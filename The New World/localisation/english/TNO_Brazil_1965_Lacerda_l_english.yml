BRA_1965_the_lacerda_presidency: "The Lacerda Presidency"
BRA_1965_the_lacerda_presidency_desc: "At last, Lacerda's years-long ambition to become President is finally realized. However, there is no time to waste. In order to achieve his ideal 'Middle-Class Revolution', he will need to wrangle his UDN colleagues; otherwise, his party will rip him to shreds in the process.\n\nLacerda's new cabinet and the UDN itself comprise a wide variety of thought and interest groups. Vice President Távora, from the pragmatic Realistas faction, will attempt to restrain Lacerda from taking any actions they deem too hasty.\n\nThe Bossa Nova faction of the party, led by Party President Magalhães Pinto, consists of statists and developmentalists who oppose the more liberal economic policies of Lacerda's Banda de Música faction.\n\nThe old guard faction, Liberais Históricos, is now heavily weakened and led by Justice Minister Milton Campos. The party's hardline anti-Varguist stance led to its defeat when Eduardo Gomes abolished the minimum wage. As long as Lacerda has not drifted too far towards the center, Campos should not be too much trouble.\n\nThe military is the elephant in the room; Lacerda appointed Golbery do Couto e Silva, an influential figure within the pragmatist Sorbonne faction, as Minister of War. If Lacerda brings too much instability, he may seek to coup the government."
BRA_varguist_devils: "Varguist Devils"
BRA_varguist_devils_desc: "Varguism cannot be completely defeated through a single election, as demonstrated by the presidency of Eduardo Gomes. Despite progress, there are still millions of people sympathetic to Varguist ideas and influential forces that continue to linger, poised to reemerge.\n\nTo prevent the return of Varguism, the government must remain vigilant. It is imperative to address the economic anxieties that populists exploit by implementing a comprehensive economic plan to stimulate growth, improve living conditions, and alleviate vulnerability to Varguist ideologues.\n\nIn addition to economic measures, it is crucial to tackle Varguist sympathies within the military and public service. Rigorous vetting procedures, transparency, and accountability are essential for identifying and removing individuals holding Varguist beliefs."
BRA_guanabaran_deluge: "Guanabaran Deluge"
BRA_guanabaran_deluge_desc: "The devastating impact of the floods in Rio is undeniably tragic, leaving behind a trail of destruction and displacing numerous individuals. However, amidst this tragedy, an opportunity exists to bolster the government's reputation, and Lacerda's personal support. Given the extensive support required to aid the displaced residents and facilitate the recovery and restoration efforts in the affected areas, it is crucial that we proactively ensure that the media recognizes and acknowledges the government's substantial contribution.\n\nThe magnitude of the disaster necessitates significant government assistance to provide relief, facilitate resettlement, and start the rebuilding and cleanup of devastated regions. We must leverage this situation to maximize Lacerda's and his administration's positive exposure and public perception. By ensuring that the media portrays Lacerda's leadership and commitment to addressing the needs of the affected communities, his personal support and the standing of the government will be bolstered in the eyes of the public."
BRA_automatic_alignment: "Automatic Alignment"
BRA_automatic_alignment_desc: "The UDN has long been an advocate for further integration with America. When they last held the presidency, Brazil was granted OFN partner status. It's a no-brainer to hitch Brazil to the giant machine that is the American economy. Our geographic proximity makes trade easy, and the American market beckons for our resources. Lacerda's administration will attempt to broker additional trade agreements with the United States and encourage investment from their companies.\n\nStrong democracies working together is imperative if the world is to be free of despotism and autocracy. Let this closer connection be the catalyst that supercharges the economy of the American continent and shows the world the superiority of liberal democracy."
BRA_uncover_varguist_crimes: "Uncover Varguist Crimes"
BRA_uncover_varguist_crimes_desc: "Lacerda's personal experience with the malevolence of Varguism runs deep; he narrowly escaped death during Vargas' regime when his minions sanctioned an attempt on his life. Although Lacerda was fortunate enough to survive, countless others were not. Tragically, many of these violent acts never saw the light of day, concealed from public knowledge. However, now is the time for restitution. The Crow, wielding the full might of the government, is determined to investigate every wrongdoing that transpired under the oppressive rule of Getúlio Vargas. The books will be opened, no stone shall remain unturned, and every individual implicated in these ignominious deeds will face the consequences of their actions.\n\nThe pursuit of justice for the atrocities committed under Vargas' regime is paramount. Let this new committee send a signal to the people of Brazil that totalitarianism will not be tolerated."
BRA_urbanize_favelas: "Urbanize Favelas"
BRA_urbanize_favelas_desc: "The 1965 election was a nail-biter. If Lacerda is to ensure a safer margin of victory in 1970, he must broaden his appeal beyond the typical UDN base of the middle class and businesspeople. Advisors have highlighted the urban poor as a possible target. Many live in squalor and without utilities in densely packed Favelas. An investment in local infrastructure will be necessary to bring wealth into these neighbourhoods and develop them further. People will be naturally grateful to see their government supporting them, and some will return our favour with their support. A growing middle class will further benefit the party as Brazil continues to grow under Lacerda's economy."
BRA_new_neighborhoods: "New Neighborhoods"
BRA_new_neighborhoods_desc: "Favelas are blights on Brazilian cities. They are hotbeds of crime and waste valuable land that should be developed. When Lacerda was Governor of Guanabara, he implemented a policy of bulldozing these Favelas and building new, modern, high-rise apartments. Now as President, Lacerda will ensure that other state governors will do the same, with the federal government's full support backing them. While there will be plenty of backlash from the urban poor, a new middle class will arise in their place. They will fuel our economic development and secure us a new loyal source of support."
BRA_perons_shadow: "Perón's Shadow"
BRA_perons_shadow_desc: "Unfortunately, Argentina has proved to be a far too unreliable neighbour. The stain of Peronism still looms large, and much like Varguism, its short-sighted populist policies have left a shadow on the Argentine economy.\n\nWhile initially there was the hope of detente, even reformers like Frondizi did not end the cold war with Argentina and have continued reckless actions like the backing of fascist Paraguay and attempted sabotage of the Transandean Treaty. They are a lost cause, and thus we must continue to be wary of them - keeping our army on alert, continuing espionage efforts in Argentina and its proxies and winning the economic war with our superior policies."
BRA_spring_tunes: "Spring Tunes"
BRA_spring_tunes_desc: "Lacerda plans a raft of reform, and to do so he must introduce a wide range of executive orders to build the foundations of this reform. No stone will be left unturned; the military, the administrative state, corruption and the bureaucracy will not be safe. These changes will improve the efficiency of the government, liberalise the country and herald a new era of prosperity for Brazil."
BRA_enemy_no_1: "Enemy No.1"
BRA_enemy_no_1_desc: "The incompetence of previous administrations has led to a persistently high level of inflation, creating a hidden tax eating at the workers' paychecks. The short-sighted populist policy they implemented may have been appealing in the short term. Still, the longer-term costs on businesses have undone any possible benefit that increased wages brought. Lacerda has a swathe of policies to implement and appeal to deal with the problem. Regulations on businesses need to be loosened, as well as the grip of unions on them - so companies need not pass so many costs onto the consumer.\n\nAnother driver of inflation has been the spending on costly infrastructure projects that have led to no results and often the embezzlement of funds. These too, must be cut to take some money out of the overheated economy. Finally, we will pause any increases to the minimum wage. While Lacerda would prefer to eliminate it entirely, the backlash from our previous attempt proved it unfeasible to do so. Therefore we must settle on it but allow it to decrease in real terms with inflation."

BRA_shield_of_the_republic: "Shield of the Republic"
BRA_shield_of_the_republic_desc: "As Lacerda takes charge, the dysfunctional relationship between the government of Brazil and her military once again threatens to flare into uncontrollable rage. Never has a government survived long without the consent of her ornery partner, a fact which Lacerda knows all too well. The beast must be fed, lest it go on the hunt.\n\nIn reluctant recognition of this fact, Lacerda has greenlit yet more funding to be granted to air and submarine research. No price is too high to maintain our friendly relationship with the military."
BRA_the_freedom_fighter: "The Freedom Fighter"
BRA_the_freedom_fighter_desc: "War is mainly fought on the ground, but it is those who control the skies that have the upper hand on the battlefield. Unfortunately, our Air Force isn't known for operating modern aircrafts, with some even dating back from the later days of the Second War! How can we make a true difference in the crusade against Nazism in places like South Africa if we can barely defend our own skies?\n\nThankfully, our Yankee friends had offered us an interesting deal: the purchase of a fair amount of one of their most advanced jets at their disposal, the Northrop F-5 Freedom Fighter. Its cheap price and maintenance, combined with its versatility and outstanding performance in combat makes it the perfect choice for us and our Air Force's needs. It is time for our brave pilots to Sentar a Púa once more!"
BRA_brazilian_fire: "Brazilian Fire"
BRA_brazilian_fire_desc: "Fire has always played an important role in the development of human civilization, it brought both safety and destruction. After all, was it not the fire that the mythical Prometheus gave us, humans? A gift that brought upon him the wrath of Olympus itself. Now President Lacerda, following the steps of the Greek hero, will bring "fire" to Brazil.\n\nNapalm, a gelling agent mixed with gasoline or other fuel, is widely used by all three superpowers. Highly effective in bombing campaigns, it brings death and destruction on a scale surpassed only by the atomic bomb. To ensure Brazil's safety and an edge over its enemies, President Lacerda will contact the United States, with the goal of acquiring napalm for the armed forces of Brazil."
BRA_early_warning_systems: "Early Warning Systems"
BRA_early_warning_systems_desc: "The threat of Argentina is ever present. They have put a lot of pride in their airforce and use it to devastating effect. They use it to harass Uruguay into being their puppet, they have used it to bomb Paraguayan freedom fighters in the Guaíra Falls invasion and have used it to reinforce their claims in Antarctica. If we were to ever fight Argentina in a war, they would use it against us to devastating effect.\n\nThat is why prevention is one of the best forms of deterrence we have. We do not war, but we will fight if we want. And while we build up our air force with the freedom fighter, we must ensure the Argentinians cannot launch a surprise attack. With early warning radar systems, we can detect a Argentinian offensive before it occurs, and scramble our fighters to defeat any surprise attack."
BRA_training_in_panama: "Training in Panama"
BRA_training_in_panama_desc: "With an influx of new fighter jets, it's crucial to ensure that our pilots have the necessary skills and knowledge to operate them. Fortunately, it appears that the United States has a solution to our problems.\n\nSchool of the Americas or SOTA in short, is an american-runned school located in Panama set up to provide training to foreign military personnel. We will send our pilots to train with the most qualified and experienced personnel OFN has to offer, there they will familiarize themselves with the newest strategies and tactics employed by OFN pilots in various conflicts across the globe."
BRA_operation_saucer: "Operation Saucer"
BRA_operation_saucer_desc: "In the North of Brazil there have been many disturbing reports. Sightings of aliens, UFOs, and angels, all harbingers of the apocalypse. But the latest report is more than just disturbing. Spy satellites and Axis weather balloons spying on critical infrastructure in the north of the country and revealing military assets.\n\nLacerda has stated he will not allow this to take place. Under the codename OPERATION SAUCER, we will launch a military operation. Publicly it will be to investigate the reports and prove that there are no such sightings. Secretly it will be a military training exercise. An operation to train pilots and destroy any fascist spy devices that are found floating in the sky."
BRA_enbrarer_investment: "Aerospace Investment"
BRA_enbrarer_investment_desc: "In the past days, we have received interesting reports from our Air Force's scientific institutions detailing the great progress they have been making on their internal project codenamed as IPD-6504. A prototype built with one bold goal in mind: to put on the skies our very first fully-national aircraft. As the representatives of the Brazilian people's will, it is our solemn duty to support this initiative and bring this dream to reality.\n\nWe will help direct into the project investments from private capital, as well as encouraging foreign specialists to contribute with their expertise. This act of goodwill will not only immensely boost the project's development and ensure its success, but also help to plant the seeds that will kickstart the growth of our own strategic national aerospace industry and begin a new era of technological development in our country."
BRA_civil_purposes: "Civilian Purposes"
BRA_civil_purposes_desc: "We've done it! The first flight of our Bandeirante (formerly known as IPD-6504) was a tremendous success, and there are already numerous calls from within and outside the country interested in it. However, to fulfill these demands, we must focus on planning the necessary procedures in order to mass produce the aircraft.\n\nPresident Lacerda will sign a series of directives that will set the steps to give the shape of an aerospace company based on the same installations and personnel behind the Bandeirante's success baptized as EMBRAER. As ordered by the President, EMBRAER will be a fully privatized company which will base most of its business on the civilian market, freeing it from the corruption and ineffectiveness of the state and serving the people's best interests. And, of course, enjoying free authority in assisting our military with research and development."
BRA_the_national_interest: "The National Interest"
BRA_the_national_interest_desc: "It is an unfortunate reality that our independence is under constant threat. Be it from our southern enemies, be it from the totalitarian snakes lurking in the shadows to subvert and enslave our people, as Operation Saucer had shown it. National defense is a business that must be taken very seriously, one that must be overseen by the State if we want to guarantee a safe future for Brazil.\n\nThus, we will help kickstart the development of our non-existent aerospace industry by investing heavily in aerospace projects and research and cooperating with private corporations. Providing much needed jobs for the common man as well as securing our skies from external threats and ensuring our dominance and might in South America."
BRA_the_super_tucano: "The Super Tucano"
BRA_the_super_tucano_desc: "With the resounding success of the Bandeirante, which showed promising results in executing military missions, we can now finally consolidate our industry in the national defense business by officializing the creation of our first company dedicated to aircraft production, the EMBRAER. A quasi-state owned company that will be primarily focused on military aircraft production.\n\nAs requests for war planes coming from our Air Force flood our desk, our dedicated engineers are already working hard on what will be our first war plane in history! Named after the famous bird that populates our forests, the EMB-312 "Tucano" will be a low-cost light attack aircraft, with a simple yet innovative design and effective lethality. With this achievement, the skies of Brazil will no longer be protected by "teco-tecos" and third-rate foreign planes, but by aircrafts manufactured by ourselves."
BRA_atomic_taboo: "Atomic Taboo"
BRA_atomic_taboo_desc: "The A-bomb, the nuke, the atom bomb - there are a number of names for the most powerful weapon ever devised by mankind, but all that truly matters are the effects. There is no single explosive so powerful as the nuclear weapon, nor is there another weapon which captures the fears and worries of the world so. In one strike, cities are wiped from the map as if God came down with a hammer and chisel, or armies are devastated and left scattered across their positions. Ever since Rotterdam was turned into a smoking crater, the great powers of the world have moved rapidly to expand their arsenals as quickly as possible, and those nations around them concerned with their own safety have looked into the nuclear option as well, for those who possess an A-bomb have all the cards against those who do not.\n\nAmong these nations, we are told, is Argentina.\n\nThe thought of the Argentines having a nuclear imbalance with ourselves is the creation of nightmares. If we cannot stop the Peronists and Colorados from building the bomb, then the best we can do is build one before them."
BRA_contact_kissinger: "Contact Kissinger"
BRA_contact_kissinger_desc: "Henry Kissinger in the States has been a fine ally of ours for many years now, and he is beyond pleased to see that our people have seen the world in a more American light ever since Lacerda ascended to office. He holds weight in places which we do not, commands power to people which we may not otherwise get through to, speaks for us when none will listen. Kissinger may be Lacerda's best friend in D.C., and friends are hard to come by in this business.\n\nIt is critical, then, that we maintain that friendship and take it as far as it will go - and a nuclear program is certainly very, very far.\n\nIt may shock him to hear something that sounds so far fetched, but we can surely get it through to him that such a program is necessary to defend both Brazilian and American interests in South America - and if we have Kissinger on our side, we might just have a chance to get the Americans with us too."
BRA_camp_david_talks: "Camp David Talks"
BRA_camp_david_talks_desc: "This is a job for Lacerda himself, he knows. He packs up his suitcase, takes his many files, adjusts his suit, and boards a direct flight from Brasília to Washington D.C. - but this is no state visit, and hardly an announced one at all. There will be no great military greeting, no President at the tarmac - instead, he will be whisked away to the refuge of Camp David for a series of secretive and very worried talks.\n\nNews of Brazil poking around the idea of a nuclear program has gone down at the Pentagon like a... well, an A-bomb. There has been much grinding and gnashing of teeth by those too cowardly and ignorant to understand our fears, who beg the President to shut us down before we start. Indeed, any program we would hope for would be instantly shuttered if the Americans forbid us from the task, as much as the prospect of bending the knee to the Yankees pains us. That is why it is crucial that we prevent that from happening.\n\nThat is why Lacerda is going himself - to ensure that, in these critical talks, the fate of Brazil will be in Brazilian hands."
BRA_camp_david_talks_tooltip: "§KBrazil§! and the §mUnited States of America§! will now undergo negotiations over §KBrazil's§! §Onuclear prospects§! - §mAmerica§! will get to choose who is in control."

BRA_silent_assassin: "A Silent Assassin"
BRA_silent_assassin_desc: "The World Wars caused a great many changes in the world, but the naval theater of combat was perhaps one of the most affected by its innovation. The dreadnoughts of old, expensive prides of the sea, were rendered obsolete by aircraft carriers, and the practice of sneaking transport ships across the oceans was too made a fool's errand by the rise of the U-Boat and submarine warfare. Naval combat today is no longer a practice of ships in lines raking one another with gunfire, but instead the silent hunt of planes for fleets and submarines for convoys.\n\nAircraft carriers are well beyond the reach of Brazil's comparatively diminutive navy, but submarines can and shall be the backbone of our future on the oceans and rivers of South America, as Lacerda sees it. The Americans surely have not shied away from this new frontier of warfare - and while we may have to shy away from the nuclear-armed cutting edge of submarine warfare, we have received word from Canberra that the Australians have a plethora of 40's vintage that are just begging for a new buyer to give them life."
BRA_silent_assassin_tt: "We will create §Y6 Gato Class Ships§! from the §mUnited States§!."
BRA_modern_tank: "The Modern Tank"
BRA_modern_tank_desc: "The Brazilian Army, while certainly well-funded and politically powerful, is no better off in terms of equipment than the Navy and Air Force is. Too often our men are equipped with the cast-offs and hand-me-downs of greater forces, from Sherman tanks to Garand rifles to World War Two-era trucks. It's time for us to change all that.\n\nFew armies in the world are greater than that of America's, and they surely have a vast stockpile of weapons and equipment which, while perhaps not their most modern gear, would surely be an improvement over the decades-old army which we field now. With our good relations with them, surely they will be willing to spare some of their more modern tank designs to give us a leg up on any rival power in the region, whomever they may be."
BRA_bargain_completed: "The Bargain Completed"
BRA_bargain_completed_desc: "Power flows through the barrel of the gun, it is said, and in Brazil that idiom is certainly more true than ever. The Army has always been a lurking force in the background of her politics, watching quietly for any movement which they thought threatened Brazil - or themselves, to be more honest - and sweeping in to restore order whenever they find that threat too great. Lott wanted this changed, wanted a depoliticized Army loyal to the state instead of the generals. It was that disconnect which Lacerda has exploited.\n\nThe Army's backing on his way to power was not the only end of this deal, however. They expect funding, arms, personal checks. Now that we hold power, all that and more can and will be delivered upon, for Lacerda is surely not foolish enough to try and challenge the Army that he just empowered so greatly. It may be tough to keep the tail from wagging the dog, but all that can be spared for later - for now, there is happy harmony between the army and the state, and so long as the checks keep flowing, all that will remain."

BRA_streamline_civil_service: "Streamline the Civil Service"
BRA_streamline_civil_service_desc: "The Brazilian administrative state continues to be a basketcase. Sometimes funds just disappear into a black hole, and many programs are terribly inefficient. Lacerda has developed several plans to deal with these problems. Reforms need to be made to cut down on the fat, excessive bureaucracy and regulation strangle any hope of efficiency - this will be reduced. Some programs can be contracted out to private enterprise, and the private sector's attitude needs to be brought into the government. The Brazilian people must know that their tax dollars are going towards something useful, and these reforms will make sure of that."
BRA_Establish_ENAP: "Establish ENAP"
BRA_Establish_ENAP_desc: "Since we have eliminated much of the corruption in the government, it is necessary to reorganize the civil service system. However, the shortage of skilled and qualified officials continues to endanger the nation. We require a team of proficient middle to high-ranking civil service workers to address this management challenge.\n\nConsequently, the National School of Public Administration will be established to handle this problem by training the brightest minds in Brazil. Providing the finest administrative education and deploying graduates to different states across the nation would be the optimal approach to serving the country effectively."
BRA_Regionalize_Administration: "Regionalize Administration"
BRA_Regionalize_Administration_desc: "Brasília nestles itself in the distant highlands, far away from most citizens, yet somehow those officials are the ones deciding the fate of the entire country. What a perfect symbol for the slow and corrupt centralized bureaucracy it houses. This separation fosters inefficiency, breeds inter-state disparity, and fuels a bureaucratic beast blind to the diverse cultures, needs, and dreams of the people it ostensibly serves.\n\nWith Lacerda at the helm, Brazil will see a seismic shift towards regional devolution. Responsibilities traditionally held by the central government would trickle down to state or local governments. The federal administration, too, would be torn from its comfortable perch in the capital, as the President commences relocating divisions closer to the constituents they serve."
BRA_anti_corruption_crusade: "Anti-Corruption Crusade"
BRA_anti_corruption_crusade_desc: "When Carlos Lacerda became Governor of Guanabara, he sacked his own mother. Politics is no place for family business. Nothing disgusted him more than rich idiots who attained power and prestige just by "knowing the right people". Simply put, they ruined democracy. They prevented those with skills and principles from ever getting to where they deserve.\n\nIn one grand crusade, he will dismantle dynasties and break up bloodlines. He will institute measures for extra transparency, mandate financial disclosure, boost existing anti-corruption agencies, and protect whistleblowers. Nepotism must be purged, and the new President will do anything he can to root it out."
BRA_competency_tests: "Competency Tests"
BRA_competency_tests_desc: "What does it take to become a bureaucrat in Brazil? Not much if we're being honest, the current requirements to enter the state bureaucracy are insultingly low for a position of such importance. Thankfully with the ascendance of Carlos Lacerda to the seat of presidency, drastic changes are about to take place.\n\nAudits, competency tests and a general overview of our current administration are just a few steps the government will take to ensure government workers have the necessary degree of technical, administrative and legal knowledge. No longer will we settle for average, only the best can serve Brazil."
BRA_Professionalize_Politics: "Professionalize Politics"
BRA_Professionalize_Politics_desc: "The average Brazilian views politics as a sort of a joke, some place where you can enter to get rich or famous. This view, real or not, is antithetical to the President's idea of how politics should function in Brazil.\n\nIn order to "professionalize politics" President Lacerda will institute background checks for politicians running for senate, more debates, be them public or not, to get the general population interested in politics, media interviews, and more. Hopefully this will be enough to begin the transformation of Brazilian politics."
BRA_lacerda_Meritocratic_Government: "Meritocratic Governnment"
BRA_lacerda_Meritocratic_Government_desc: "With reforms to the civil service enacted Brazil is on its way to for the first time in history have a government that is truly meritocratic. Skill and merit have replaced connections and status as the key requirements for joining the state bureaucracy, corruption is being dealt with and overall people take politics more seriously. A great victory has been achieved by the Lacerda administration, despite that now is not the time to rest on our laurels.\n\nWe need to ensure that the current state of affairs remains for as long as possible, unless we want to return to the Brazil of old. Regular audits and anti-corruption measures will help keep bureaucrats on their toes and ensure that our hard work won't be undone."
BRA_equalize_education: "Freyre's Vision"
BRA_equalize_education_desc: "The policy of Education is one of prime importance for Brazil. With a booming population it is imperative that all Brazilians get a good education, to ensure a economic boom. The UDN is a party divided between which approach to take. Lacerda initially wanted to appoint Flexa Ribeiro, a trusted co-worker to the Ministry of Education and they have so far led the ministry in tackling illiteracy. However due to requests from others in the party, Lacerda will officially appoint Gilberto Freyre to the position.\n\nA well known polymath and the creator of the theory of Lusotropicalism, he is a skilled manager who will ensure that the maths, sciences and humanities all get the support that they need to thrive in Brazil and create a well-educated, skilled workforce. Lacerda will, of course, ensure he keeps a eye on the ministry and, by placing Flexa as a special advisor to the ministry, can ensure the Crow's and Gilberto's aims work alongside each other."
BRA_national_literacy_campaign: "National Literacy Campaign"
BRA_national_literacy_campaign_desc: "Despite the rapid economic development in recent years, illiteracy remains a major problem, especially in the rural areas. It should be quite obvious to everyone that this cannot continue and only proper government intervention can put an end to illiteracy and uplift our people. President Lacerda has ordered a launch of a nation-wide literacy campaign with the ambitious goal of achieving a literacy rate of 90% no later than 1970."
BRA_lacerda_passed_lit_act_tt: "We have §Gpassed§! $BRA_UNIVERSAL_LITERACY_ACT$."
BRA_cooperate_church: "Cooperate with the Church"
BRA_cooperate_church_desc: "The Catholic Church is a major supporter of education throughout Brazil, with church-run schools playing an important part in our education system. As a part of a bigger education reform President Lacerda has chosen to work with the church despite Brazil's rocky history with the institution. Funds will be delivered to Catholic schools and in exchange the church will cooperate with the government, while this may rub the less conservative elements of Brazilian society the wrong way, ensuring at least a working relation with the church is crucial for the President's plans regarding education."
BRA_maintain_equality: "Maintain Equality"
BRA_maintain_equality_desc: "Brazil is a vast country, and ensuring each and every school within it meets a certain standard of quality is simply an impossible task with the current system. Education lies mostly within the carefree hands of the private sector, which allows some schools to flourish but leaves those without the funds to grease the wheels to fall by the wayside. If this continues, an entire generation of Brazilians may once again find themselves excluded from the future of their own nation. By placing education within the responsible custody of the government, we can begin making steps to escape this bleak status quo."
BRA_oligatory_lessons: "Obligatory Lessons" 
BRA_oligatory_lessons_desc: "Kids labor in the streets when they should be studying, and adults are lining up at churches to ask literate pastors to fill their registry forms. What education obligations they have solely exists on paper.\n\nHowever, we've heard word of a man who claims he taught three hundred farmers to read and write in a mere forty-five days. Sure, a background check on Paulo Freire found some unfortunate leftist leanings, but his achievements are very much real.\n\nHe suggests perhaps we help parents take their kids to school by providing them free meals. Or make timetables more flexible to accommodate both adults and kids. Or we could put his revolutionary literacy course for adults to the test."
BRA_education_education_war: "Education, Education and War"
BRA_education_education_war_desc: "Any child could tell the country has changed since Vargas, but the curriculum does not reflect that. Brazil's sons and daughters deserve a modern syllabus which reflects them and their era, where our national values are placed at the center.\n\nWe will begin a war on the antiquated system of today, starting by standardizing the education system so that all students are learning the same content across the board. They shall appreciate Brazil for what it is: a Lusotropical country, a unique blend of European and African immigrants with the native population, forming a modern, tropical bastion of freedom. Change must take people with it, however, so while we might want to call Vargas' quasi-fascist regime what it is, we will only highlight the dangers of its authoritarianism instead. At least for now."
BRA_lacerda_education_edu_war_tooltip: "Every child will leave the school knowing about the uniqueness of §KBrazil§!. The first modern tropical civilization made out of a mix of §nPortuguese colonists§!, §UAfrican slaves§!, and an §findigenous population§!, §Genhanced with a balanced view of the§! §KEstado Novo§!."

BRA_expand_universities: "Expand Universities"
BRA_expand_universities_desc: "The Lacerda administration has inherited many problems with learning in this country, but the most pressing is the state of higher education. Our burgeoning industry demands expertise from early adulthood to make it competitive, and most institutions remain out of reach of the masses which need them most. Freyre has tabled three plans to address the shame of inadequate universities. Either we focus on university expansion, engineering polytechnics which could inject industrial expertise into our workforce, or massively increase scholarships, and hence social mobility with it.\n\nWith an opposition desperate to cry mismanagement, we do not have the world to spend. We must choose wisely."
BRA_stop_funding_UNE: "Stop Funding the Student Union"
BRA_stop_funding_UNE_desc: "The UNE, or the National Union of Students has been the largest student organization in Brazil ever since it was founded in 1937. Although de facto apolitical, it has been continuously funded and supported by the PTB for some time, with the organization having strong Varguist tendencies.\n\nA large youth organization that is opposed to our cause is a concern for our administration, and so a rival student organization is to be created, hopefully without sparking too much tension with the UNE."
BRA_banish_ignorance: "Banish Ignorance"
BRA_banish_ignorance_desc: "Right on schedule, we have pushed standards up nationwide, and spectacularly at that. Nearly all children are in school systems, which are repurposed and tailored for Brazil's unique standing, and adult illiteracy is plummeting. We are in the position to give ignorance a crushing blow. While there is still work to be done, and likely more to do even for later presidencies, a turning point has surely come about. We are on the last steps on the staircase to prosperity. Brazil's future is calling from the landing."
BRA_universalize_healthcare: "Universalize Healthcare"
BRA_universalize_healthcare_desc: "Brazil, like any democracy worth its salt, envisions a society in which all men are created equal. However, as far as the current state of Brazilian healthcare is concerned, some are clearly considered more equal than others. While the prosperous south of the country enjoys solid health coverage, the north is forced to make do with more localized options that can be extortionately priced and lackluster in comparison to what is available in the south. President Lacerda seeks to rectify this gross injustice by providing universal healthcare coverage to every corner of Brazil, no matter how poor or far-flung."
BRA_universal_vaccination: "Universal Vaccination"
BRA_universal_vaccination_desc: "Brazil will never be a truly modern state until its people can live and thrive without fear of dying from preventable ailments. The scourge of smallpox may be on the decline in more affluent parts of the world, but in Brazil, it remains a serious danger to those who cannot afford the vaccine. In the interest of preventing yet more deaths that could've been avoided, we must provide universal vaccinations to the people. Once national mortality rates begin to crash, we can truly say that Brazil is on the road to modernity. Until then, however? There is work to be done, and shots to give."
BRA_dreaming_clean_water: "Dreaming of Clean Water"
BRA_dreaming_clean_water_desc: "A major source of illness in Brazil, unfortunately, comes from our own negligence. For many years, we have allowed the waters that run across our nation to become mired in pollutants, and even sources that the Brazilian people use for their drinking water have not been spared. The spread of cholera, dysentery, and other diseases could easily be prevented if action were to be taken to ensure clean drinking water for all Brazilians, and President Lacerda intends to do just that. Laws shall be put forth to tighten safety standards regarding drinking water, and to expand the aging infrastructure that delivers said water to millions of homes across Brazil."
BRA_reduce_infant_mortality: "Reduce Infant Mortality"
BRA_reduce_infant_mortality_desc: "Every day in Brazil, tens of thousands of nameless tragedies take place. The premature death of an infant is the nightmare of any mother, and, regrettably, infant mortality rates in Brazil paint a startlingly grim picture of what the poorer families of the country suffer. Tackling this issue is no small feat, and while the expansion of healthcare can certainly make a dent in this frightening statistic, we must look to success stories across the world for guidance on how to save Brazil's families from tragedy. America, Sweden, and other nations have long since ensured a reasonable expectation of survival for their sons and daughters; why not turn to them for assistance?"
BRA_rural_health_clinics: "Rural Health Clinics"
BRA_rural_health_clinics_desc: "Within the sprawling metropolises of southern Brazil, nobody, no matter how rich or poor, is outside the reach of a hospital. Anyone can get the care they need, with paramedics standing by to deal with emergencies at a moment's notice. The story in the rural regions, however, is much different. Many communities do not even have the most rudimentary of medical facilities, leaving the locals to fend for themselves with little in the way of medicine or professional expertise. At the government's expense, the President intends to put a stop to this backwards state of affairs, and fund the construction of clinics in the rural communities that need them the most."
BRA_mosquito_campaign: "Anti-Mosquito Campaign"
BRA_mosquito_campaign_desc: "With the incessant buzzing of a million tiny wings comes the infamous mass-killer of the developing world: malaria. Tens of thousands of Brazilians are lost to the mosquito-borne illness every year, especially in the forests and jungles of the rural north, and President Lacerda has decided that enough is enough. It is time to take the fight to those irritating insects once and for all and protect our people from their deadly bites! If the nets aren't enough to stop the mosquitos' advance, the liberal application of pesticides will surely be enough to stamp out the spread of malaria for good."
BRA_increase_medic_wages: "Increase Medic Wages"
BRA_increase_medic_wages_desc: "One of the biggest problems our healthcare system faces is emigration. Every year, an enormous amount of talented medical students graduate, only to move to countries like America, that can provide proper wages. As a result, we suffer from a critical shortage of qualified medical personnel, and will not be able to pursue any further healthcare reform until the problem is resolved.\n\nLuckily, the solution to the problem is fairly simple. By increasing the wages doctors, surgeons, and other advanced medics are afforded, we can stop the flow of the brain drain at the source, and restore some of the knowledge we have lost."
BRA_rely_on_market: "Rely on the Market"
BRA_rely_on_market_desc: "Lacerda has always been an advocate for the free market, so why should welfare be any different? We know that the market has the raw power needed to develop our healthcare industries, and will be a far cheaper alternative than continuing the overreliance on government spending we are trying so desperately to dismantle. After all, privatized healthcare worked out so well in the United States, why not in Brazil as well?"
BRA_government_intervention: "Government Intervention"
BRA_government_intervention_desc: "As much as Lacerda wishes otherwise, the state must take a strong stance in healthcare if the institution is to survive. He will not risk the lives of millions of Brazilians for his own personal preference, and even the free market advocates must understand the necessity of this choice. If some members of the party have complaints, let them shout; Lacerda lives in the world of reality, and shall act with reason, not ideology."
BRA_lacerda_healthcare_reform_req_tt: "Lacerda's version of §KHealthcare reform§! has been passed."
BRA_kill_first_horseman: "Kill the First Horseman"
BRA_kill_first_horseman_desc: "It is the duty of the government of Brazil to fight against the four horsemen of the apocalypse, and defend the people of the nation from their curses. In the world of today, Pestilence, Famine, War, and Death stand ready to descend upon the unprepared at the first sign of weakness, so we must always stand vigilant, as any oversight could spell disaster.\n\nToday, the UDN and Lacerda have struck a decisive blow against the horseman of Pestilence, and disrupted his foul influence over Brazil. Whichever path we have taken, we have massively strengthened our nation against the evils of disease."

BRA_lacerda_agriculture_SDA: "Establish the SDA"
BRA_lacerda_agriculture_SDA_desc: "The Brazilian countryside is on the edge of a cliff. Peasant leagues, Amazonist guerillas, militias funded by cattle ranchers, and countless other little armies all fight their tiny wars. Rural Brazil needs a intervention to save it. Some of those destabilizing factors have lasted for years, the Latifundia system has existed from colonial Portugal in the 1500's. To ensure the future success of our agricultural policies, Lacerda will create a new department, the Office of Agricultural Protection, the SDA.\n\nThis will not just be a department of paper pushers focused on increasing numbers of corn and maize grown, it will be a supervisiory system. Monitoring checking, appointing and removing corrupt officials, and trying to bring peace to a broken countryside. All the affairs of agricultural policies will be under their remit. Lacerda hopes that they can clear large amounts of corruption from agriculture, reduce the prevelance of violence in rural regions, and help foster economic development."

BRA_lacerda_rural_credit: "Rural Credit System"
BRA_lacerda_rural_credit_desc: "Farming is not the most profitable job. Many farmers are simply subsistence farmers, farming their little patches of land to ensure that they and their family produce enough food to eat. For those farmers trying to better themselves and increase development, what is disturbing was the lack of investment banks would give in loans. Small farmers lack the guarantees and returns that would get banks to invest. Instead, they continue to invest in the property of large landholders and major businesses.\n\nIt is time to take action and change the status quo. A specialized new credit system will be established to provide investment to small farm owners. Agricultural machines, chemical fertilizer, pesticides, all will be possible to be purchased using this new credit system. In return the government will take a dividend from their annual incomes until the loan is repaid. This will help us spread mechanisation across Brazil and spread the green revolution to every farm!"
BRA_lacerda_fertilise_cerrado: "Fertilize the Cerrado"
BRA_lacerda_fertilise_cerrado_desc: "In the heart of Brazil, the low rumbling calls of the southern lapwing echo across a vast rolling savanna. Hawks and vultures soar above low twisted trees and cacti. This is the Cerrado. For centuries, no one has tamed it, the soil too acidic and nutrient-poor to host domesticated crops.\n\nBut what if we could change that? Researchers repeat the same three ingredients: agricultural lime, borax, and PNX fertilizer. It's worth investigating; expand some northern farms into the region and see what happens.\n\nRemember, this land covers a quarter of Brazil! Nature reserves? National parks? We could be sitting on the new Breadbasket of the Americas, three times the size of Ukraine. This could be the start of an agricultural revolution!"
BRA_lacerda_buffer_stock: "Strategic Agricultural Reserve"
BRA_lacerda_buffer_stock_desc: "The food situation in Brazil has the rather unfortunate habit of being unpredictable in the worst of times. Severe droughts can seriously harm the supply of food to the country, and the prices have often seen fit to wildly change from one day to the next. In such an uncertain environment, it pays to be prepared for the worst. The President has seen fit to approve the establishment of new storage facilities for food reserves across Brazil, to ensure our people have food security even in the worst case scenarios."
BRA_lacerda_agri_bastion_against_radicalism: "Bastion Against Radicalism"
BRA_lacerda_agri_bastion_against_radicalism_desc: "Land reform remains a hot button issue in Brazil, with more members of the ruling coalition finding the idea to be more palatable as popular resentment against the situation grows. What these idealists fail to realize, however, is that broad land reform is simply a political impossibility. To enact such drastic measures would jeopardize our commitments to the middle class: those who we have to thank for our electoral successes. We will clamp down on any further entertaining of radical solutions, and work instead to curb the worst excesses of the land barons where it is possible."
BRA_lacerda_conservative_land_reform: "Conservative Land Reform"
BRA_lacerda_conservative_land_reform_desc: "One does not have to be a radical socialist to understand the necessity for some land reform. It is true that there are large swathes of underutilized lands that are not currently meeting their economic potential. Lacerda will enact some small land transfers to deal with this problem, leading to greater utilization and equity of land. Alongside this, Lacerda will legalize farmer's syndicates to make investment in agricultural land easier and allow smaller farmers to cooperate and coordinate with each other, and increase their combined output."
BRA_lacerda_inter_brazil_cooperation: "Inter-Brazilian Cooperation"
BRA_lacerda_inter_brazil_cooperation_desc: "Brazil is on the cusp of realizing its potential as a power player on the global stage, and it is our increased focus on inward strength that has brought us to this point. There is plenty of work yet to be done, however, to ensure that the various subdivisions of the country come together for Brazil's common benefit. The expansion of the rural regions has progressed at a wildly inconsistent pace, and the President has just the solution. New legislation has been authorized to ensure each region cooperates on the expansion of agriculture on a level playing field, with modern fertilizers and farming equipment. Let us show the world that when Brazilians work together, there is not a force in the world that could possibly get in their way!"
BRA_obliterate_lotts_folly: "Obliterate Lott's Folly"
BRA_obliterate_lotts_folly_desc: "The Trans-Amazonian Highway can be described in many ways. Among those visionaries who planned the project, it was to become the new artery of Brazil, or even South America - a bridge from East to West, crossing thousands of miles of rainforest and creating a new line of development nationwide. To the realists and the clear-eyed, it has become a bloated, overladen folly, twisted around by corrupt dealings and stalled by weather and politics. To push forwards now, against all reason, would be absurd.\n\nCarlos Lacerda is ready to make these hard decisions, unlike those who preceded him. At his word, the construction will be tied off - the offshoots either closed or attached to other roads, and the project abandoned to the jungle it once bulldozed. The funds we shall save will do nicely in the more critical pieces of the Brazilian state."
BRA_new_tools_greatest_manager: "New Tools for the Greatest Manager"
BRA_new_tools_greatest_manager_desc: "The economy is a complicated beast, and it takes all of a man's time if he wishes to manage it effectively. Of course, President Lacerda is quite the busy man, and as such it will fall to his economic minister - Hélio Beltrão - to enact his will for him. Yet there are these regulations, restraints, and laws which constrain the man's work so harshly - no doubt instated by some well-meaning liberal some years ago, but nowadays only serve to get in the way.\n\nLacerda shall let go of this leash and let his man go after the economy as swiftly and powerfully as he needs to. Only the best, most aggressive work can put together a growing country - it is past time that we got out of the way."
BRA_no_mercy: "No Mercy"
BRA_no_mercy_desc: "Austerity has become a sort of buzzword in the past, decried by whimpering liberals and leftists alike as an attack on the people of Brazil while they make off like bandits with their billions in misattributed funds. It is because of them that our state has bloated so - that we waste money on useless programs and invite financial catastrophe with our ratcheting debt. Hélio Beltrão knows how to solve this troublesome and persistent issue, but it will not be by shying away from the term - instead, we must embrace it.\n\nWhy, yes, we will be instating austerity measures. What of it? Would the leftists of this nation rather we go flying over the fiscal cliff? Are they so devoted to keeping the poor of this nation hooked to government policies, cashing welfare checks and living off the dole while never making anything of themselves? We will be throwing a bucket of cold water on the long-sleeping people of this country, and though they may complain now, they will thank us later when they see the benefits of a Brazil that is active, awake, and flourishing."
BRA_tavora_receipts: "Távora's Receipts"
BRA_tavora_receipts_desc: "A period of austerity is required if Brazil is to get its debt to a manageable level. It will be painful for some, but it is absolutely necessary. The party agrees with this - but unity breaks down regarding the extent and length of this period. Vice President Távora and the other members of the realist faction wish to implement a shorter and less harsh Austerity regime, with tax reforms being implemented in place of more cuts. Lacerda has a difficult path to thread here. His newly empowered Finance Minister Beltrão wants to go all the way with austerity.\n\nUltimately, Lacerda has decided to side with Távora; the realistas' influence is too strong to ignore. They do have a valid concern; previous radical economic reforms have led to too intense of a backlash. When President Gomes abolished the minimum wage, the UDN was swept out of power by Varguist-aligned parties, undoing much of our progress. We will not repeat this mistake with a radical austerity plan the public will reject."
BRA_increase_coffee_tax: "Increase Coffee Tax"
BRA_increase_coffee_tax_desc: "Coffee is as Brazilian as samba and Carnival, the choice drink of millions both in the nation and around the world. Without it, would our offices bustle as they do, or would our workers toil as hard as they can? These beans have become a financial goldmine for their sellers, a drug with never-ending demand - the only shame is that the government hasn't gotten in on the money too.\n\nLacerda and his fellow conservatives are not often one for tax raises - after all, it is antithetical to their ideology more often than not - but in some cases, the opportunity is too good to pass up. We can increase our revenue by millions if we raise taxes on coffee by a few percentage points, both for domestic usage and exports. There will be a fair share of justified complaints, but what can we say? What's good for business is good for the government - and for Lacerda most of all."
BRA_increase_interest_rates: "Increase Interest Rates"
BRA_increase_interest_rates_desc: "It's time to take some riskier moves. Brazil has walked into a dead end and only a tough central bank and swift, decisive policies can save its economy from being totally destroyed. By increasing the rate of loan interest, we can significantly decrease inflation. But of course, this course of action involved many risks, if Beltrão decides to execute this unpopular policy. If we fail to maintain control of interest rates, our middle class backers could turn on us with a vengeance, ensuring electoral annihilation, and this government will be remembered as one of Brazil's more incompetent ones."
BRA_national_lottery: "National Lottery"
BRA_national_lottery_desc: "To successfully implement our reforms, the government will need to grow its reserves to fund them. Policymakers have drafted up a national lottery scheme, where citizens can invest in government bonds in return for the chance to win large sums of money and a return on their investment. While it's an unorthodox tactic and may seem somewhat desperate to some, additional funds are always appreciated - wherever they come from."
BRA_death_and_taxs: "Death and Taxes"
BRA_death_and_taxs_desc: "Távora has provided a brilliant idea: simplifying taxation and reforming the tax department to enrich the financial base of this government. The inefficency of the economic department has troubled us for a long time. This makes tax simplification a vital policy to help the government regain control of its budget. Due to the nature of our project in reforming Brazil, there is an urgent need to increase our revenue streams.\n\nRedrafting the laws, random checks to ensure regulations are being followed, and cutting the amount of tax exemptions, are all methods to reform the tax system and make it more simple. Furthermore by amending the tax rates on foreign investment and corporation tax, we can make Brazil a more desirable target for investors!\n\nOur economic minister Beltrão has also agreed with these policies, stating that we can afford to spend our political capital on this policy. This is a principle that has united large segments of the UDN and our base."
BRA_centralize_banking: "Independent Banking"
BRA_centralize_banking_desc: "How can a country call itself developed if it lacks a central bank? Centralized banking is absolutely necessary if a country is to pursue effective macroeconomic policies and be taken seriously by international financiers. Lacerda plans to rectify this issue and establish a central bank to help strengthen the currency and improve economic management.\n\nA core tenet of this new Central Bank will be its independence from the government. If the Brazilian government is ever to fall to populist forces again, our monetary policy must be protected from them. An independent bank will prevent short-sighted populists from setting low-interest rates to temporarily woo voters while causing an unsustainable inflation spike in the longer term. Let the bank's newfound independce be another step in resolving Brazil's historic inflation problem."
BRA_strengthen_coffee_trade: "Strengthen the Coffee Trade"
BRA_strengthen_coffee_trade_desc: "The Coffee Trade is a large part of the Brazilian economy and produces our largest export, even more so within Lacerda's old stomping ground of São Paulo. Before the Estado Novo abolished the coffee-with-milk regime, the coffee industry dominated the politics of São Paulo. Even today, the arrangements that involve the coffee industry are opaque and intertwined with various quotas for specific growers and prices set. It is crucial for Brazil's economy that the stability of this industry is maintained - we will keep prices as high as possible to bring in more revenue."
BRA_free_people_free_trade: "Free People, Free Trade"
BRA_free_people_free_trade_desc: "Protectionism and autarky restrain the potential of the Brazilian economy. Lacerda seeks to do away with it and unlock Brazil to global trade. He will eliminate most tariffs with like-minded democratic countries which will increase economic integration between them. This will create economies of scale throughout the democratic world and allow us to create economic dominance over the tyrannical regimes occupying Europe and East Asia.\n\nBrazilian consumers will be granted greater access to the markets of America and will now have access to a wide range of consumer goods. At the same time, our export sector will be able to reach even international customers and create many more jobs for the Brazilian worker. This new economic policy will ensure increased prosperity and liberty for all throughout the democratic world. If the rest of it wishes to indulge in the wonders of free trade, that is."
BRA_guanabara_dreaming: "Guanabara Dreaming"
BRA_guanabara_dreaming_desc: "As a critical part of our economic plan, Guanabara needs millions in investment. Firstly to repair the damage of the New Year's Storm and secondly to make Rio into a centeral hub of Brazil's economic development. We shall make Rio into a cornucopia, a treasure bowl for Brazil's development. But just like all the other parts of Brazil, Rio lags behind the rest of the world. The city is restrained due various factors, Bureaucratism, corruption, political struggle, All of these internal conflicts have meant in the past Rio has lost to international competitors for investment.\n\nBut now, with more and more cash rolling into the capital, it's time to restart our ambitious infrastructure construction plan. Hundreds of projects will start to turn Rio into Brazil's grandest city."
BRA_atomic_light: "Atomic Light"
BRA_atomic_light_desc: "As we all know that light is a basic need of modern society and an important symbol of industrialization while the electricity supply has become one of the kinds of crucial, indispensable Infrastructure. Without sufficient electricity, even the City of Dreams will lose its light of hope. Due to various challenges, this government does not have the spare time and resources to make big progress.\n\nBut now, since we have removed our attention to the economy, it's time to sign a big contract. We will construct a new nuclear power station to provide electricity to the whole nation. What's more, the biggest advantage of this project is that we can make a big trade with Americans and their corporations by purchasing their uranium. All of us - the US, Brazilian people and of course the biggest meritorious, the President, will benefit greatly from such a perfect deal."
BRA_sugarloaf_racing: "The Rubens Vaz Bridge"
BRA_sugarloaf_racing_desc: "Even after all this time, Lacerda never forgot the bleeding, shivering man he held in his arms as they were driven to the hospital; how this proud soldier had looked up at him like a child in one streetlight, then fallen still in the next.\n\nLess than a ten-minute drive away, but more than ten years later, Lacerda stands on the Pão de Açúcar, his eyes sweeping across the glittering expanse of Guanabara Bay, imagining the superstructure shown to him in all the blueprints and proposals.\n\nThis mammoth edifice of steel and concrete would span the waters, a box-girder bridge that would connect the burgeoning ambitions of Niterói with the bustling heart of Rio. And when they asked him to name it, he already knew that one person alone deserved to be etched into that horizon forever."
BRA_no_room_homelessness: "No Room for Homelessness"
BRA_no_room_homelessness_desc: "Brazil's cities are plagued by a great evil, the rampant scourge of the homeless. This group brings crime, poverty, drugs and disease and turns what should be thriving neighborhoods into run down slums. Crimes cause businesses to close, the middle class to leave and allow gangs to prosper. It is time to end this.\n\nOne of Lacerda's main policies as governor of Guanabara was tackling the homelessness epidemic in Guanabara and it would have been successful, if it wasn't for some trigger happy corrupt police officers going too far. Lacerda rectified the failures of the past and worked with mayors and governors to implement sanitation policies, destroying large encampments, making infrastructure uninviting for vagrants and supporting the building of apartment blocks to house these groups. Only through this can we finally end this moral threat once and for all."
BRA_doxadis_industrial_zone: "Doxiadis Industrial Zone"
BRA_doxadis_industrial_zone_desc: "Rio is a city of hotels, restaurants, and souvenir shops; the city of Copacabana, Pão de Açúcar, and Cristo Redentor. A city that attracts millions of visitors from all over the world. What it is not is a city of industry. Unlike São Paulo's automobiles or Belo Horizonte's burgeoning steel production, Rio never excels at anything beyond tourism.\n\nBut that could change. A foreign association of Greek urban planners has arrived with a new interesting mode of thought: ekistics, the science of human settlements. Since 1964, they have been in constant contact with Lacerda, slowly studying the area. Now they've finally come to his office to make a few recommendations to turn Guanabara from a glorified tourist trap into the great metropolis of the future it was meant to be."
BRA_spare_no_expense: "Spare No Expense"
BRA_spare_no_expense_desc: "There are those who would say that trying to rebuild Guanabara to its true potential is far too expensive for too little gain. Some would say that urban renewal throughout Brazil should not come at the expense of economic growth. Some would say that Brazil should focus only on middle-class neighborhoods with quality infrastructure, while using cheap concrete for the poor. Lacerda dismisses these arguments.\n\nIf we were to cut corners here, we would only be repeating the mistakes of the past. The Guanabaran storm showed the cost of allowing cities to become favelas. Over three hundred dead and thousands injured and displaced due to rotten infrastructure. In the long run, cutting corners will cost more and hinder development than paying the full cost now. That is why we must spare no expense, we will pave the way to the future with highways of gold."
BRA_football_suggestion: "The Footballer's Suggestion"
BRA_football_suggestion_desc: "With a straight back and a thick set of binders filled to the brim with annotated reports and letters, Raphael Magalhães walked into Lacerda's office to make his case politely but directly. All these construction projects were too expensive. If he didn't do something about their cost, Brazil's debt could easily become unmanageable.\n\nThe President's desk began to fill with return-on-investment calculations and alternative plans. With each additional form laid out before Lacerda, Magalhães presented a different vision, one in which Guanabara and Rio wouldn't have to mortgage their future. Sure, corners would have to be cut but these projects could still be pursued to fruition. Perhaps Lacerda was getting ahead of himself fiscally. If he wants these proposals to succeed, he'd better make sure he can actually afford them."
BRA_south_atlantic_free_port: "South Atlantic Free Port"
BRA_south_atlantic_free_port_desc: "Attracting foreign investment is another important method to improve our economy besides adjusting our financial policy. By giving every company in the State of Guanabara special preferential tax cuts, which include massive reductions on the of corporation tax, we can make Rio de Janiero become one of the largest commercial hubs in all of South America. If everything goes well, Rio could obtain hundreds of millions of dollars in investment over the next few years, putting the city on par with Buenos Aires and New York. Gigantic successes are in store for the Brazil, Rio is ready to welcome its new bright dawn on the horizon."
BRA_free_the_market: "Free the Market"
BRA_free_the_market_desc: "It's time to push forward to continue our work of freeing the market. Since we have finished the initial reforms to make our economy and market get the basically necessary vitality, the next step to break the old chain is to provide the companies a free environment to run their normal businesses. By reducing the amount of red tape and regulations on corporations, and directly abolishing some of them. We will end the restrictive environment in Brazil, which have limited the business climate for years. The good businessmen of Brazil can finally get rid of the restrictions of Getulism. This government will abolish all of those corrupt bureaucratic regulations by passing a bill in the Senado, one clean sweep to lead to a economic revolution!"
BRA_lacerda_passed_dereg_act_tt: "We have §Gpassed§! $BRA_NATIONAL_DEREGULATION_ACT$."
BRA_shake_up_petrochemistry: "Shake Up Petrochemistry"
BRA_shake_up_petrochemistry_desc: "Petrobras is one of the key cogs of the Brazilian economy and a important revenue stream for the government. Founded by Getúlio Vargas in 1949 as a desperate ploy to keep power, since then it has been dominated by Getulism. Considering the requirement to increase efficency throughout government departments and businesses in Brazil, we have such a need to reform Petrobras' staff and itself. We shall appoint UDN members and trusted business owners in key positions in Petrobras. This is to make the business more efficent and install a profit oriented approach. These policies will lead to new revenue streams for the government."
BRA_last_vestiges_dirigismse: "Last Vestiges of Dirigisme"
BRA_last_vestiges_dirigismse_desc: "Kubitschek's National Development Council has been an unmitigated disaster, achieving very little while wasting substantial amounts of money. It is a prime example of corporate cronyism, funding useless projects where most of the funds mysteriously disappear. If these albatrosses were not coddled by government support, the market would never let them fly. In the vast majority of circumstances, the market will be far more efficient then the corrupt bureaucrats shuffling around money - and so we will shut this wasteful council down. Instead, we will allow private enterprise to flourish, with minimal public intervention - no longer wasting the tax dollars of Brazilians, but also leading to more efficient resource allocation."
BRA_investors_paradise: "Investor's Paradise"
BRA_investors_paradise_desc: "If the Brazilian economy is to grow to Lacerda's satisfaction, more investment and enterprise is required. With the greater fiscal space that previous spending cuts have freed up, we are able to responsibly reduce the financial burdens on private enterprises that have been keeping the Brazilian economy down. Not only will this further reduce financial burdens on companies and thus deal with inflation, it will also encourage an economic boom within Brazil. Foreign companies will seek out our lower tax rates and set up shop here, fueling the economy and eventually leading to even more tax revenue than the government received from its oppressive higher tax rates. Brazil will become a hub of foreign investment and an example for the world to follow.\n\nFinancial relief is not the only way Lacerda plans to grow the economy, and he also proposes scrapping many pointless building regulations. Allowing faster and more efficient construction, creating new spaces for private enterprises to develop and innovate. While some may argue against building deregulation because of safety concerns, the reality is that there is nothing more unsafe than a restrained economy that will not produce the wealth to eliminate deprivation, which can be all too deadly."
BRA_expansion_modernity: "Expansion and Modernity"
BRA_expansion_modernity_desc: "Having removed all of its ineffective ideologues, Petrobras is now poised to unlock its full potential. The company's growth will be fueled by fostering partnerships with foreign oil corporations and embracing a fresh cohort of their technologically adept staff. By forming strategic alliances with global industry leaders, Petrobras aims to leverage their expertise, advanced technology, and investment, bolstering Brazil's standing in the international energy market and further fueling Lacerda's plans of economic growth. Encouraging foreign investment will play a key role in this journey, as it will bring in vital resources and expertise, enabling Petrobras to thrive as a forward-thinking player in the global energy landscape."
BRA_stimulate_competition: "Stimulate Competition"
BRA_stimulate_competition_desc: "The Brazilian State has, in the past, given special treatment to a few large companies. This has allowed these companies to bloat and gain contracts with minimal effort. The status quo has locked any inspiring entrepreneurs out of many sectors of the economy, which are instead dominated by large corporations that act like mere extensions of the government, with all the bureaucracy and waste that the government brings too. To further stimulate the Brazilian economy, we need to end these few corporations' monopolies on government contracts. This will breed more competitiveness and efficiency and save the government millions in corporate welfare."
BRA_public_private_partnership: "Public Private Partnership"
BRA_public_private_partnership_desc: "The public sector remains bloated from the actions of previous administrations. With minimal profit motive, government departments suck up cash that often disappears into a black hole. We need to bring the entrepreneurial attitude of the private sector into government rather than bring government waste into the private sector as other administrations have done in the past. Outsourcing government programs to private enterprise will not only save money but lead to far more efficient outcomes. No longer will public servants dawdle around endlessly consulting, but private enterprise will do what private enterprise does best; Innovate, streamline and deliver results!"
BRA_come_to_nordeste: "Come to Nordeste!"
BRA_come_to_nordeste_desc: "Successive governments have neglected the Nordeste Region for too long. It trails in development from the wealthy southeast, but there is immense potential for it to develop in the future. The land is very suitable for agriculture, and the mining companies' exploration has revealed an impressive amount of minerals that could fuel a healthy mining industry within the region. Plenty of necessary investments need to be made to connect Nordeste to the rest of the country and allow for the efficient extraction of resources. With a kickstart from the central government, Nordeste's economy could eventually grow to match that of the prosperous southeast and create an economic miracle for Brazil."
BRA_lacerdanomics_enshrined: "Lacerdanomics Enshrined"
BRA_lacerdanomics_enshrined_desc: "For decades, Varguism haunted this country. Uncontrolled corruption eroded public trust and drained our coffers. State intervention stifled our potential for innovation and stunted entrepreneurial growth. And rampant hyperinflation starved our cities and devastated the livelihoods of millions. No wonder so many of our brightest professionals left for greener pastures elsewhere.\n\nNow, however, Lacerda has broken the chains and transformed the Brazilian economy. He alleviated the nation's addiction to welfare, unleashed trade and foreign investment, and replaced Kubitschek's delusions with a more realistic and pragmatic vision for Brazil's infrastructure. The market can reign free, and industry and commerce can prosper and innovate.\n\nDevelopmentalism is dead!"
BRA_lacerdanomics_enshrined_tooltip: "Lacerda has succeeded, developmentalism is dead! Now is the Era of the Free Market."

BRA_lacerda_hemispheric_defence: "Hemispheric Defence"
BRA_lacerda_hemispheric_defence_desc: "After suffering miserable defeat in the Second World War, Brazilians have understood that the only chance to defend Brazil themselves from the threat of Fascism is to strengthen the friendly relationship between Brazil and America.\n\nAmerica is a sound and natural ally, and, arm-in-arm, we will expunge tyranny's toeholds from our continent. For, as our combat in Europe and the fate of its vanquished nations tell us, if Fascism touches the land of Brazil, the only future for our country will be destruction."
BRA_support_brazilian_antarctica: "Support Brazilian Antarctica"
BRA_support_brazilian_antarctica_desc: "Considering our geographic position, the capability to defend our coasts is a vital security concern. To achieve this, we must bolster our power projection from Antarctica, an ideal location to counter enemy navies in the South Atlantic. Therefore, this government will send additional supplies to build up the Brazilian Antarctic base.\n\nBy strengthening our Antarctic Territory, we also enhance Brazil's international standing and build a strong foundation for "diplomatic relations" with neighbouring countries that aim to develop their own Antarctic Territories...."
BRA_focus_hunting_spiders: "Hunting Spiders"
BRA_focus_hunting_spiders_desc: "There is something rotten in Brazil. Across the country, a web is being weaved by insidious and strange forces that seek to put an end to Brazilian democracy. The issue of fascist spies has long been a thorn in our side - whether they be German, Italian, or even Paraguayan, they have scuttled into the crevices of our society and formed a veritable fifth column.\n\nThis will not continue. These spies will be exposed for the traitors they are and punished accordingly. With their networks ripped asunder, there will be nowhere for them to run. Fascism is not, and never will be welcome in Brazil."
BRA_token_force: "A Token Force"
BRA_token_force_desc: "We have received a diplomatic request from the OFN. They require a small group of troops to support their deployment in West Africa. Considering the recent course of the war, sending a symbolic force to satisfy their needs has no danger but will demonstrate our importance to the Americans. Besides, the support they requested would be vital in encouraging our military reforms.\n\nWe shall deploy our Smoking Snakes to West Africa, to help the Americans get out of the sinkhole. After all, they will not send our soldiers to the battlefield to die, but to easily vanquish disorganized Africans."
BRA_token_force_tt: "We can now send volunteers to aid [FFR.GetNameWithFlag]."
BRA_lacerda_65_join_OFN: "Join the OFN"
BRA_lacerda_65_join_OFN_desc: "As Brazil has already become an OFN partner and an important ally of America, clearly, the further development of our relationship is to be expected. By expressing our intention to join the OFN, we can obtain significant economic, diplomatic, and geopolitical benefits. What's more, if we join the OFN and, our country is attacked by fascists, their nuclear umbrella and vast military might will shield us from destruction."
BRA_rival_banana_fascists: "Rival Banana Fascists"
BRA_rival_banana_fascists_desc: "As the only truly democratic country in Latin America, we must fight against dictators or succumb to their malign influence. Accordingly, Lacerda will authorize our intelligence services to search for and destroy any connections between fascist dictators and Brazilian government officials. Brazil has suffered enough from Varguism, and we cannot allow it to happen again under Lacerda's leadership."
BRA_rival_banana_fascists_tt: "We will §Rdenounce§! all §.far-right governments§! in §KLatin America!§!"
BRA_OFN_policing_duties: "OFN Policing Duties"
BRA_OFN_policing_duties_desc: "The OFN has requested additional manpower to support their policing efforts. This presents a considerable opportunity to improve the relationship between ourselves and the alliance.\n\nIt is important to avoid putting our soldiers in harm's way in foreign countries, but in doing so, we can enhance Brazil's importance to America and increase the weight of our words. We will follow their instructions to send our personnel to participate in missions to Haiti or any other location they request."
BRA_cameroonian_sinkhole: "The Cameroonian Sinkhole"
BRA_cameroonian_sinkhole_desc: "Not enough. The Yankees have sent another message asking for more force to support their operation in West Africa. This is becoming a considerable investment of military resources, but ultimately we can't pay the price of reneging on our commitments. Although Brazilian citizens won't appreciate an intervention which endangers so many of our boys, we have no choice but to send more troops to Cameroon and pin our hopes on the Americans finishing the job quickly."
BRA_recognise_axis_atrocities: "Recognise Axis Atrocities"
BRA_recognise_axis_atrocities_desc: "It has been over twenty years since Brazil began its struggle against Fascism and the Axis. Due to the corruption and dictatorship of Vargas, countless soldiers lost their lives, and we missed the best opportunity to eliminate the Fascistic nightmare forever.\n\nHowever, there remains a debt that needs to be cleared: the war atrocities of the Axis. We must recognize all possible incidents in order to bring truth and justice to the Brazilian people."
BRA_lacerda_restrict_japan_trade: "Restrict Japanese Trade"
BRA_lacerda_restrict_japan_trade_desc: "The Japanese Empire has a significant hold on Brazil due to the increasing trade between the two countries. This has put the Brazilian government in an awkward position when it comes to executing independent diplomatic policies.\n\nThis economic subversion is not easily recognized by the general public, but it has a serious impact on the flexibility of the treasury and policymaking. As a result, the government will take action to investigate and reduce abnormal trade through strategic tariffs in order to protect the interests of the Brazilian people."
BRA_city_of_the_sun: "City of the Sun"
BRA_city_of_the_sun_desc: "The US already possesses the right to build their naval bases in northern Brazil. Now, as the West African War escalates, a rapid air corridor to the skies above has become vital. One that could be established via an airbase in our city of Natal.\n\nTo bring this conflict to a close, to support our ally, and to bring our boys back home, we would be proud to offer its use."
BRA_more_than_a_puppet: "More Than a Puppet"
BRA_more_than_a_puppet_desc: "Lacerda is tired of all the criticism of his presidency and of himself. The left say he is a dictator who seeks to destroy the invaluable legacy of Vargas. The media attacks his policies, claiming he is a puppet of America... Lies.\n\nLacerda has a plan. Soon he will destroy all the deceit against Brazil and himself, and bring Brazil to the place it should be."
BRA_lacerda_is_in_ofn_tt: "We have joined the §QOrganisation of Free Nations§!"
BRA_lacerda_wac_ongoing_tt: "The West African Crisis is ongoing and Free France hasn't fallen"
BRA_lacerda_wac_over: "The West African Crisis is over or Free France has fallen"

BRA_imperial_catastrophe_avoided: "Catastrophe Avoided"
BRA_imperial_catastrophe_avoided_desc: "With bravery and cunning Lacerda has vanquished the ghosts of 1955, and protected Brazil from the shackles of tyranny once again. The UDN stands triumphant behind the crow; ready and willing to do what must be done for the future of our nation. With a stroke of a pen, Lacerda can reshape the nation at will.\n\nBefore we look to impose our vision over the nation, however, we must secure our position. The enemies of Brazil still lurk in the shadows, waiting for a chance to strike our fledgling government in the crib. We must stabilize the country, and force our enemies back into the pits of obscurity"
BRA_imperial_trojan_siege: "Trojan Siege"
BRA_imperial_trojan_siege_desc: "Every day that passes without decisive action, Brazil trends closer to a state of utter anarchy. The people demand action from the street corners and city halls, shouting for the nation to be purged of autocracy and corruption, and for democratic proccedings to continue. It is our duty to listen to the will of the people, and to answer their pleas.\n\nIn his wisdom, the Crow knows what must be done. To protect the democracy of Brazil, Lacerda shall declare a national state of siege until the situation calms down. Our enemies will scream and shout, declare the Crow as a dictator and an autocrat. What of it? Lacerda is willing to make sacrifice to do what must be done."
BRA_imperial_restrained_exile: "A Restrained Exile"
BRA_imperial_restrained_exile_desc: "With Brizola in chains, and Goulart in exile, the head of the venomous snake has been cleanly severed from the body, and shall no longer threaten to poison our nation. We stand triumphant in congress, and the opposition flails wildly without a clear vision to lead them. By all accounts, the UDN is dominant, and the Crow knows this.\n\nAlthough some in our party demand retribution, and argue that our party must crush the remaining opposition, Lacerda knows better. We have gone far enough. There is no need to make a hundred martyrs."
BRA_imperial_restrained_exile_tt: "We will seek a truce with the Left to prevent outright war."
BRA_imperial_velvet_glove: "A Velvet Glove"
BRA_imperial_velvet_glove_desc: "Brazil's perceptive feel the cold touch of uncertainty; a force looms over the Government that sees everything we are as a threat to be squashed. They would overturn any right and break any oath in the pursuit of a safe Brazil, a safety they demand through fear. It is essential we do not fall to their level. Habeaus Corpus will be strictly enforced, regardless of their demands, with arrests demanding proper evidence and torture used only where absolutely necessary.\n\nThe battle is not just for Brazil, but for its soul. We must demonstrate to all that it is Lacerda - not military men - that safeguard it.\n\nWe cannot pretend we have absolute power. We must manage American opinions, trade union rebellion, hardline cabinet members, and the remaining specter of Varguism. We must moderate, even somewhat, to maintain a position that, truth be told, is fairly precarious."
BRA_imperial_velvet_glove_tt: "This will reduce support in the OAS for sanctions against us."
BRA_imperial_a_general_pardon: "A General Pardon"
BRA_imperial_a_general_pardon_desc: "Although some in our government demand harsh punishments for the entire opposition, Lacerda knows better. The PTB and PSD are parties rotten at the core, but they are still composed of many officials and leaders that would support our vision with a little bit of convincing. The Crow is not interested in fighting a bitter struggle to the end; he knows that only reconciliation can finally unite Brazil."
BRA_imperial_realist_approach: "The Realist Approach"
BRA_imperial_realist_approach_desc: "Lacerda and his administration realize that the legend of Goulart and Getulism has a powerful influence both domestically and internationally. Even following Vargas' downfall, a significant number of supporters remain in Brazil. Goulart's election victory demonstrated that he and his ideology still have a sturdy support base. This is an awkward circumstance for us. Thus, to manage the upcoming public relations crisis, Lacerda has chosen to request assistance from the OAS outside of Brazil. Though Lacarda has previously voiced criticism of them, their assistance now will aid in managing the unfavourable opinion of the public."
BRA_imperial_walk_the_fine_line: "Walking the Fine Line"
BRA_imperial_walk_the_fine_line_desc: "Every nation, no matter how much it hides it, contains different visions for the future. From the electoral primaries of the USA to the cold backrooms of Tokyo, this is an inescapable fact, and Brazil is little different. To deny this would be folly, and akin to fighting with a hand tied behind us.\n\nWe must ensure all within our Government understand that now is the time for moderatism and care. We are in a sensitive age for Brazil, and we cannot let errant cabinet hardliners, Trade Union rebellions nor American opinions derail us. The specter of Varguism hangs heavy still, and many in the nation are frightened of their countryman. Now is the time to thread the fine line, not charge into chaos.\n\nWe will have Golbery compile an extensive intelligence list on subversives, anyone in the government, military, or anyone in civil service who can prove themselves difficult to handle. Then, we must make sure they get a nice retirement."
BRA_imperial_public_execution: "A Public Execution"
BRA_imperial_public_execution_desc: "An opportunity has arisen to purge the left of Varguism. Just as Rubens Vaz was shot because of his rebellion against tyranny, Varguism will destroy the victory we have won through the sacrifice of countless warriors if such an absurd ideology and its followers escape the judgment of justice.\n\nUrgent political measures will be taken to permanently prevent the remaining PTB members from spreading any negative news about the government, especially troublemakers who must be monitored."
BRA_imperial_victor_the_spoils: "The Victor, The Spoils"
BRA_imperial_victor_the_spoils_desc: "For the rights of the Brazilian people to live in a safe, democratic country, the PTB, those degenerates of Getulism and the left of the former Partido Comunista Brasileiro, must be totally banned for the damage they have caused to the welfare of the people. The military and police will be mobilized to make sure that every unstable factor in Brazil is found and destroyed. Also, the remnants of the PTB - those governors who obtained this position by stealing the votes - will be removed and replaced by loyal protectors of democracy appointed by the President."
BRA_imperial_rely_on_the_military: "Rely on the Military"
BRA_imperial_rely_on_the_military_desc: "The OAS did not approve of our operation, and we cannot count on external support. Yet the Varguist threat remains, so we have no option but to depend on the military to maintain our legitimacy.\n\nTo avoid another coup, we have to convince them that we were the best choice to ensure Brazil's stability. Despite our disdain for the autocratic policies of recent years, they are now the only means of securing Brazil's future."
BRA_imperial_one_thorough_cleaning: "One Thorough Cleaning"
BRA_imperial_one_thorough_cleaning_desc: "A nation is not unlike a house. When it is in good condition, families can be raised safely, prosperity reigning for its inhabitants. A safe home, something that is the desire of all. However, all good houses will accumulate problems. Dust can accumulate, mold or damp in areas unnoticed, an array of problems that could lead to more serious problems if left unchecked.\n\nBrazil's institutions feel such maladies. It is no secret that there are difficult to handle individuals, from officers to civil servants to government secretaries, that could threaten the house if left unchecked. Golbery is our cleaner, we will task him to identify the mold. Then, as befitting men who have served their nation, they will be granted an honourable, lucrative retirement to be spent preferably far away from any lever of power.\n\nTime to make sure that the Banda de Música is the one faction of the UDN with the most power. Our own very ranks are filled with moderates, willing to bend over backwards for the opposition, and we have to dominate party communications and woo (or coerce) party leaders into following the Lacerdaist line."
BRA_imperial_new_udn: "A New UDN"
BRA_imperial_new_udn_desc: "When the USA's Lincoln warned against a house divided, did he realise how consistently true such warnings would be? The UDN stands at a crossroad; there remain many moderates who would be willing to work with the opposition, while interest groups continue to deal for better offers privately. While we do not reject moderation, this is a critical moment of Brazil's history. The party must be united under the Lacerdaist message.\n\nWe will ensure the tools of party communications are held by committed Lacerdaists. Banda de Música faction candidates will be favoured, with prominent UDN figures met to discuss their concerns and interests; their loyalty will be assured one way or the other. The UDN will not be a confused web of interests - it will be an electoral lion to lead Brazil into the new day.\n\nSchedule a meeting with Lincoln Gordon, America's ambassador to Brazil. Lacerda has a good feeling there are many receptive to his cause in Washington, and he will assure Gordon that we have a "new day dawning in Brasília""
BRA_imperial_head_of_the_snake: "Behead the Snake"
BRA_imperial_head_of_the_snake_desc: "Getúlio Dornelles Vargas. His nefarious Estado Novo may be gone, but the man behind it still lives on; and as long as he is still breathing, our rightful rule will be under constant danger. But we must not underestimate his power. A mere speech denouncing even his most obvious evils would cause a backlash as enormous as when Gomes abolished minimum wage. Removing his political rights and isolating him from the media's outlets will be necessary to finally curb his poisonous influence from our democracy.\n\nWe may not be able to remove the source of the Varguist cancer, but we can stop it from spreading."
BRA_imperial_reach_out_gordon: "Talk to Gordon"
BRA_imperial_reach_out_gordon_desc: "Lincoln Gordon, the USA's man in Brasília. As their ambassador, that makes him the man we need now too. Washington support will be vital in the coming years, their desire for a peaceful and prosperous South America is something that aligns with our own desire for a new Brazil. The Americans have always been difficult to appease, but recent global turmoil and Lacerdaist principles offer a more subtle partnership.\n\nAs we continue to wash away the detritus of a difficult period, we will introduce Gordon properly to the Lacerdaist vision of Brazil and, most importantly, our desire for a profitable friendship with our ally to the north. They will know a new day dawns in Brasília, and that the man to see Brazil strong and free will be ever their friend so long as that vision is shared: Lacerda."
BRA_imperial_rebirth_of_democracy: "Rebirth of Democracy"
BRA_imperial_rebirth_of_democracy_desc: "On the 10th of November, 1937, Vargas rewrote the Constitution to dissolve Congress and heavily restrict political participation.\n\nOn the 27th of December, 1939, Vargas founded the Department of Press and Advertising to control information and propagate ideology.\n\nOn the 24th of January, 1944, Vargas instituted Decreto-Lei n. 6.227 to ban criticizing commanders and illegalize anything that "compromised military operations".\n\nMany were harassed. Many were arrested. Many were killed. Only now, more than two decades later, do Varguists get a taste of their own medicine. After everything Lacerda has done, perhaps their repression can forever stay in the past."
BRA_imperial_our_work_has_only_begun: "Our Work Has Just Begun"
BRA_imperial_our_work_has_only_begun_desc: "As dawn approaches, military radios wake commanders to anticipate couriers carrying directives directly from Lacerda himself. Within hours, soldiers go back to their bases. Tanks drive out of Brasília, heavy treads leaving deep imprints on the city's boulevards.\n\nCitizens and commentators alike celebrate both the "return to order" and the "advent of a new era". Moderates breathe a quiet sigh of relief. Better the UDN than the Army in the Planalto, right?\n\nYet, Vargas' grip on the country won't dissipate that easily. Even amongst Lacerda's most ardent supporters, many voice concerns that he bolstered militant leftists with his "anti-democratic" actions.\n\nLet them talk! It's Lacerda's time to shine, and nothing can stop him now!"

#Imperial post 68 elections
BRA_imperial_the_crow_reigns_supreme: "The Crow Reigns Supreme"
BRA_imperial_the_crow_reigns_supreme_desc: "Now these rigged elections that we have arranged, with the noble assistance of the Armed Forces of the Republic of Brazil, have delivered us the perfect result. As the Pessedists and Petebists whinge and holler as loudly as they can, thinking it will somehow save them, we have what we want and need. We have attained a legislature chock-full of UDN loyalists—and by "loyalists" we of course mean people that adhere only to President Lacerda.\n\nWe cannot waste this opportunity lest the Crow be knocked off his perch. We will take decisive action to destroy the Fourth Republic and replace it with a new Fifth Republic."
BRA_imp_lacerda_full_unity_tt: "The $BRA_party_udn_c$ will become §&fully united§! behind §QLacerda§!"
BRA_imperial_birth_of_5th_republic: "The Birth of the 5th Republic"
BRA_imperial_birth_of_5th_republic_desc: "The Getulist personality cultists refuse to face reality. They do not acknowledge a fact that stands out to anyone that doesn't recite "Retrato do Velho" or some other Getulist campaign song as if it was the rosary: that the Constitution of this Fourth Republic of Brazil is diseased, rotten to the core. Perhaps the cultists refuse to do anything or acknowledge any problem because this constitution is ridden down with the tenets of Varguism—all the nonsense that Getúlio Vargas called "governance" and enshrined in law.\n\nWe need to solve this matter once and for all. We will now give the task of writing a new constitution and forming a new Fifth Republic to the loyal lawmakers in the National Congress. It is time for a new era in Brazil—a new order, as it were."
BRA_imperial_birth_of_5th_republic_tt: "It is time for §KBrazil§! to be reborn under our §Qnew dream.§!\nWe will introduce the $BRA_5TH_REPUBLIC_CONSTITUTION$ to the Senado"
BRA_imperial_constitionalise_capitalism: "Constitutionalize Capitalism"
BRA_imperial_constitionalise_capitalism_desc: "What has socialism, as promoted by the maniac Getúlio Vargas, ever gotten us but economic ruin and the spread of communistic degeneracy throughout the country? What has communism given any country but the destruction of its national identity and its defeat by foreign powers? Can there be any doubt, considering the success of the United States of Brazil, that capitalism is the way forward?\n\nOur successors must be prevented from deviating from the true path. Constitutional guarantees outlawing the formation of any union not approved by the government and affected companies will be set in stone. No less important will be the imposition of wide-ranging property protections."
BRA_imperial_plot_with_gordon: "Plot With Gordon"
BRA_imperial_plot_with_gordon_desc: "Were it not for the support of the United States—Getulists would call it "complicity"; thank God they don't know how far it goes or it'd be more ammunition for their vile rhetoric—we simply would not be here. There would be no removal of Goulart, no imperial presidency, no military law-and-order apparatus. So we owe it to Washington, D.C. to keep them on side and aware of all events.\n\nAmidst the ongoing chaos, the United States Embassy in Brasília is now fortified. We will meet with Ambassador Lincoln Gordon at the embassy to discuss the next steps and to ensure the further support of the United States. Whatever plans we have at this moment will be provided to Ambassador Gordon for his reference and necessary action."
BRA_imperial_antarctica_awaits: "Antarctica Awaits"
BRA_imperial_antarctica_awaits_desc: "Now there is a very high chance that some generals, admirals, and other assorted jackboots may actually disagree with the current approach. We have done away with obvious traitors and Getulists such as Admiral Aragão who our President so zealously cursed out. That however has not removed the possibility that there may be (smoking) snakes in the grass that still hold on to the sort of constitutionalist nonsense that nearly handed us over to communism in the last few years.\n\nFortunately, we have a means to get them out of the way. The Argentines and their Axis lovers are plotting in Antarctica again, or so we will tell the press. (There is no problem even if they are not; after all, "press statements aren't given under oath.") We will therefore stage a major operation against the Argentine Antarctic Territory. One that will need a lot of naval and army support. Constitutionalist remnants can be appointed to command these operations, and that will also remove the problem they pose for us."
BRA_imperial_a_new_dawn: "A New Dawn"
BRA_imperial_a_new_dawn_desc: "The time is now. We are free to make the moves we have to make to free our country of Getulist devilry. Within a day of the last measures being confirmed as complete, the UDN-controlled Senate will pass and approve the legislation. The President of the Senate, a UDN loyalist, will himself take the bill to President Lacerda for his approval and signature.\n\nThis will prevent our opponents from responding in any way. It will also permit us to cement our authority at this all-important time, the time during which the new, purified Fifth Republic is solidly established. While we fortify ourselves against any possible response, we are right to sit back and rejoice for a little while—for the devilry of Getúlio Dornelles Vargas has at last been purged from our nation."
BRA_imperial_5th_constition_vote_tt: "The $BRA_5TH_REPUBLIC_CONSTITUTION$ will be put to vote..."
BRA_imperial_a_new_dawn_tt: "§YIf passed:§!"
BRA_imperial_a_new_dawn_tt_2: "§QLacerda's§! crusade against §VVarguism§! begins - §YMore options in the focus tree have been unlocked§!"
BRA_imperial_enemies_at_the_gate: "Traitors at the Gates"
BRA_imperial_enemies_at_the_gate_desc: "So much for celebration! We dare not say that our goals have been met, not when we are beleaguered by the forces of Getulist reaction. The opposition—such as there is, with the National Congress under our total control—has mobilized. The unions, who we have as yet tried and failed to defang, have declared a second general strike against us and workers in countless industries are going off their jobs.\n\nAs if Getulist and trades-unionist subversion was not trouble enough, politicians across the entire political spectrum, even from within our own União Democrática Nacional, have mustered to oppose us. Worst of all is the fact that those left-wing subversives under the leadership of Marighella and Amazonas have declared some kind of "people's war" against us.\n\nDecisive action must be taken—all subversion must be crushed!"
BRA_imperial_an_illegal_gathering: "An Illegal Gathering"
BRA_imperial_an_illegal_gathering_desc: "This gathering by a conglomeration of unions to oppose the government which provides them with the services and money they need to function is a disgusting show of illegality and ingratitude. It must be met with the utmost possible force in order to prevent our government being held hostage like Gomes' was.\n\nWe already had to stop one of these beforehand. We will not be threatened by another; a final ban will be issued to prevent this devilry forevermore. No more union gatherings—crack down on anyone that goes on with this! Down with communistic "trades unionist" subversion!"
BRA_imperial_mass_layoffs: "Mass Layoffs"
BRA_imperial_mass_layoffs_desc: "These unions seem to be really fond of playing dirty in service of their corrupt leaders' interests, and will even lead their members off cliffs if the union bosses say so. But two can play a dirty game—and our President is nothing if not always willing and able to play dirty.\n\nWe have heard rumours of government workers joining these strikes of theirs. No more of that, my lord, no more of that—these fools mar all with their starting. Any government worker caught partaking in any illegal meeting or strike will be terminated for cause. That will put the fear of God and Lacerda in them—all the better to get these morons back to work."
BRA_imperial_gordons_boys: "Gordon's Boys"
BRA_imperial_gordons_boys_desc: "If there is one thing in which our President has been able to take comfort these past five years, it is his friendship and collaboration with Professor Gordon, our direct line to our friends and allies in Washington. But this friendship is not just a salve for Lacerda's personal demoralizations—it also affords significant diplomatic advantages.\n\nOne major example is securocratic in nature. Ambassador Gordon has the requisite connections with the Federal Bureau of Investigation to be able to obtain their help in Brazil at a level above and beyond our prior collaborations. The FBI indicates that it is able to help us blackmail unions and break up their gatherings without putting our own forces at risk. However, Magalhães urges caution—he asserts on solid evidence that such a decision is certain to engender controversy within the UDN."
BRA_imperial_the_eagle_watches: "The Eagle Watches"
BRA_imperial_the_eagle_watches_desc: "There is another American three-letter institution that works secretly in Brazil, despite the public mandate given to the American security services: this is the CIA. Whereas by rights the South American region is an FBI operational zone, the CIA maintains a small presence here in Brazil to fight off German influence.\n\nAs a result of a backroom deal, the CIA has now approached us to offer their support. We are being advised to accept this offer. However, there are also some loyal and trustworthy officials that warn that the CIA is prone to taking more hardline, dangerous actions that the FBI would eschew."
BRA_imperial_seahorse: "The Seahorse"
BRA_imperial_seahorse_desc: "Certain special agencies were established in the aftermath of our legitimate assertion of power against the Getulist-Peronist usurper João Goulart. For some time they have operated more or less autonomously, taking only suggestions from the Planalto—however, their leaders, being after all UDN cadres, have now put themselves at our direct disposal with the consent of the General Staff.\n\nThe "Seahorse"—DOPS, the Department of Political and Social Order—will be deployed in accordance with directives we issue. They will be sent out to tackle these guerrillas and work hand in glove with the SNI to see this objective fulfilled. Through a thorough collaboration and the leadership of the esteemed Golbery do Couto e Silva, DOPS and SNI will crack down on these guerilla groups and exterminate them."
BRA_imperial_cuban_cigars: "Cuban Cigars"
BRA_imperial_cuban_cigars_desc: "Alas for our tormented Brazilian people—it is not enough for the forces of Bolshevism and Hitlerism to attack us from within! They even have to affront our national sovereignty and honour as believers in capitalist liberal democracy by subverting our government. The accursed "Veracruz Pact", supposedly a Mexican-led alliance but in reality led by the arch-communist Cuban revolutionaries and that degenerate guerilla-Stalinist Che Guevara, are proven to be directly supplying left-wing guerrillas.\n\nAre we meant to tolerate this? Send in the DOPS, the SNI, the Coast Guard for all we care—and remove this threat from our shores!"
BRA_imperial_unleash_fluery: "Unleash Fleury"
BRA_imperial_unleash_fluery_desc: "During the riots in Liberdade, there was a notorious brute of a man that opposed us at every turn. His name is Sérgio Fleury; even after the resolution of that crisis he still wields significant influence over leftist-infected São Paulo. He puts that influence to good use, too, pouring rhetorical fire and fury into his efforts to prevent the left from seizing control of that great city.\n\nWe do well to let bygones be bygones, and embrace Fleury into our efforts. He will receive a directive permitting him to take the gloves off and conduct any operation he damn well pleases in his—no, our—efforts to remove the left from São Paulo."
BRA_imperial_out_of_sight_out_of_mind: "Out of Sight Out of Mind"
BRA_imperial_out_of_sight_out_of_mind_desc: "Transcript of a written message from the President of Brazil to Marshal Emílio Garrastazu Médici.\n\n"'To thine own self be true'—as you no doubt know since my swearing-in as President, there have always been certain things that I have never been willing to do. There are certain lines that I have never been willing to cross no matter the cost of not doing so. There are some things that I would not inflict on Adolf Hitler, let alone João Goulart or Getúlio Vargas."\n\n"But the moral law is a mere luxury right now. If the security personnel want to do something to suppress the ongoing chaos, they no longer need to ask for any permission from Planalto Palace, nor send any report for my review. Any cost is worth the restoration of civic order. I will also not investigate them when the state of emergency is lifted.""
BRA_imperial_iron_general: "The Iron General"
BRA_imperial_iron_general_desc: "The former President, Teixeira Lott, has remained apolitical for the present—even whatever public statements he is convinced (perhaps badgered) into making are neutral in nature and would be praised as commendable across-the-aisle rhetoric in the absence of a national crisis. But we have exiled his communist of a daughter, Edna Lott; for this reason we fear that he may pose a problem.\n\nGolbery has recommended that we arrest Lott for now and keep him under watch. "This will prevent him from causing us much trouble," he says. We approve of this suggestion and will sign off on whatever order Golbery manages to draw up."
BRA_imperial_flames_of_araguaia: "The Flames of Araguaia"
BRA_imperial_flames_of_araguaia_desc: "Trouble is coming to us from the north, just like sudden blizzards and storms come from the north to bedevil the Americans. In the northern states, a rebellion is brewing—the outworking of this "people's war" that the communist traitors Amazonas and Marighella have declared on us. There are now student-led riots in multiple major cities, with major settlements such as Belém and Manaus not spared.\n\nThese subversive good-for-nothings are deluded. They think they can use the ravings of a delusional old Bolshevik as inspiration for the current age. They think they can ape Fidel Castro's degenerate exploits and the prowess of those Cuban maniacs! They are wrong, and we are about to prove that reality in blood."
BRA_imperial_operation_parrot: "Operation Parrot"
BRA_imperial_operation_parrot_desc: "We now have clarity on the force dispositions of the communist-fascist guerilla movements in the Araguaia river valley. To ensure an end to the chaos that has tormented us thanks to these Bolsheviks, we need to borrow a page from Jânio Quadros' book and sweep, sweep, sweep until they are destroyed.\n\nWe have a very effective broom—or perhaps that should be a suitably heavy hammer. In order to do away with Amazonas' band of brainwashed students and other assorted degenerates, we will flood the jungles and valleys with conventional forces and destroy them in combat. They have no hope of defeating our numbers."
BRA_imperial_our_friend_huey: "Our Friend Huey!"
BRA_imperial_our_friend_huey_desc: "The helicopter nicknamed "Huey" allows for journeys both long and short, with a minimal outlay of resources and a simpler maintenance schedule. Ambassador Gordon and the assorted American defense-contractor lobbyists here in Brasília have been singing the Huey's praises for some time, well before any of this chaos started. Now it comes back to mind.\n\nThe presence of a helicopter will permit our armed forces to traverse currently inaccessible regions with ease. It will also permit more effective, and more accurate reconnaissance. We would've done so anyway, but we will make a large purchase so as to support Operation Parrot and ensure our victory."
BRA_imperial_paint_the_jungle_red: "Paint the Jungle Red"
BRA_imperial_paint_the_jungle_red_desc: "*KRRT* "For the sake of great righteousness, he exterminates his kin—" *KRRT* "—O murderous assassin, impetuous and miserable—" *KRRT* ""—there is no novelty in the 'new republic', not while torturers and generals remain unpunished—" *KRRT* "—come no closer, lest I kill you with revolver fire—" *KRRT* "—'napalm sticks to kids'? What of it—" *KRRT* "—if even he remains free from prison, is there any justice in this realm of ours—" *KRRT* "—at least workers' consciousness is burgeoning—" *BZZZZZZTTTTT*\n\n"Attention. Attention. By decree of the Executive Power, martial law has been declared in this area to combat a subversive insurrection. A bandit suppression campaign is ongoing. Citizens are ordered to shelter in place. Failure to comply with this measure will result in your being construed as an enemy combatant regardless of armaments or hostility. We expect your total cooperation with, and obedience to, this directive.""
BRA_imperial_sewers_of_diable: "The Sewers of Diable"
BRA_imperial_sewers_of_diable_desc: "Padre Anchieta's work is desecrated; hell has been emptied out and all the devils are in São Paulo! Not for nothing is it referred to as "Diable", the Devil's City, especially by Cariocas such as our President. The damn place that was once the abode of our political rival, the corrupt and accursed Adhemar de Barros is now full of leftist rebels. Why be surprised, then, when the communist-Getulist good-for-nothing Getúlio Vargas Filho gets away with openly defying our rule?\n\nWorst of all is the constantly repeated rumour, which lies like truth, that São Paulo is rumoured to be the home base of both Carlos Lamarca and his superior, the accursed Marighella. We need to do something about this; thankfully, we have an excuse in the form of widespread strikes. We must crush these communists, no matter what form they take, and exorcise São Paulo."
BRA_imperial_toppling_a_dynasty: "Toppling a Dynasty"
BRA_imperial_toppling_a_dynasty_desc: "Getúlio Vargas tried to kill our President. His henchmen and kinsfolk go to war with us day in and day out for defying his socialistic, Peronist despotism. Vargas' nuisance of a son, the so-called Governor of São Paulo, is just the latest manifestation in an evil, good-for-nothing dynasty of cranks and immoral actors.\n\nNow we hear, to our disgust, that conspiracies against us meet with Vargas Filho's sympathy. This, of course, cannot be tolerated; it also gives us an opportunity to spread our influence. We will pass an emergency law reducing his powers as governor and allowing us to intervene in the State of São Paulo at will."
BRA_imperial_tanks_on_the_streets: "Tanks on the Streets"
BRA_imperial_tanks_on_the_streets_desc: ""Attention. Attention. By decree of the Executive Power, martial law has been declared in this area to combat a subversive insurrection. The right of public assembly has been suspended in the interests of civic peace. We order all present herein, regardless of participation in illegal public meetings, to disperse at once."\n\nIn and of itself, that should in theory compel obedience. But the fact of the matter is that it does not. If we are serious about ending these street insurrections they call "protests", we need to scare the living hell out of the rioters. Deploy some tanks on the streets, then, to frighten the fools and make them go home. That'd be a proper silver bullet (depleted uranium bullet, perhaps) for our problems."
BRA_imperial_raid_favelas: "Raid Favelas"
BRA_imperial_raid_favelas_desc: "It is presently suspected that the favelas of São Paulo, just like those of Rio, are concealing communist radicals. We need, therefore, to have the police or the military go in on these favelas, find the insurgents, and crush them one way or another.\n\nWith São Paulo beleaguered by mass street protests and subject to misrule by Vargas' good-for-nothing of a son, decisive action is needed to pacify the city. Even more tanks than already present need to be deployed on the street to make these subversives rethink their choices and go home."
BRA_imperial_roars_of_truimph: "Roars of Triumph"
BRA_imperial_roars_of_truimph_desc: "The President has realized that what he needs right now is a platform from which to confront treason and encourage the Brazilian people. Accordingly Carlos Lacerda will go live in a national address defying the communist traitors, inflaming the passion of his subordinates, and assuaging the fears of the population.\n\nIf nothing else, this—like so many of President Lacerda's speeches—will make for an effective spectacle as he weaves together narratives into a coherent whole for the benefit of the country. But one does feel some small doubts as to whether a spectacle is what the country needs when it is bleeding like this."
BRA_imperial_everything_is_fine: "Everything Is Fine"
BRA_imperial_everything_is_fine_desc: ""The extent to which things have gone wrong in Lacerda's Brazil cannot be understated—BZZT—the people need reassurance that everything is in order no matter what it looks like."\n\n"The suppression of free speech, hypocritical par excellence in a newspaper editor who constantly claimed to be attacked by Vargas—KRRK—the people of Brazil must understand that there is no such thing as 'absolute' free speech permitting the dissemination of lies."\n\n"All they do is repeat the same message over and over again:—VWOOP—'People of Brazil, all is well! All is well! All is well!'"\n\n"How do you expect me to go outside when the communists and Lacerda's fascists are fighting in the streets?—KRRK—As you can see, there is nothing but peace and quiet in the streets of..."\n\n"The country is bleeding, God damn it. How am I meant to enjoy myself?—BZZT—The restaurants, parks, and bookstores are still open. The Brazilian Government encourages you to avail yourself of such cultured pleasures.""
BRA_imperial_campos_pleas: "Campos' Pleas"
BRA_imperial_campos_pleas_desc: "We have, at least, not had to struggle alone in our fight to unify the União Democrática Nacional. We have had the help of Milton Campos, who has spent virtually all his free time in attempting to plead with doubtful UDN cadres such as Távora to unite behind President Lacerda. His efforts seem to have an effect on people's hardened hearts, but he cannot get stuff done on his own.\n\nWe will back his calls to the hilt. The União Democrática Nacional must remain united and strong come what may. If now President Lacerda cannot even rely on the party whose efforts brought him to power, collapse is the only endstate we can expect."
BRA_imperial_reassure_usa: "Reassure the United States"
BRA_imperial_reassure_usa_desc: "Imagine if our government was toppled by street protests and the supporters of an exiled President whose overthrow the Americans backed. The only thing more embarrassing for the United States would be if the Canadian government was usurped by forces loyal to the British collaborationists. The Americans, no doubt aware of the possibility of embarrassment, are already intervening, but we need to secure their faith in our government.\n\nThe Yankees need to be assured of a few fundamental things. Firstly, we remain loyal to the interests of the broader free world. Secondly, our government is stable, despite the superficial appearance of unrest. Lastly, there will be no collapse—no waste of their investment in us."
BRA_imperial_pintos_support: "Pinto's Support"
BRA_imperial_pintos_support_desc: "The arch-conservative Magalhães Pinto is a prominent figure in Brazilian political life. There is an apocryphal story that says of him that a hair cannot fall off a Brazilian right-winger's head without Magalhães Pinto knowing or authorizing it. This story is made up but it illustrates the significance of his influence and the necessity of securing his support.\n\nWe must approach Senhor Magalhães Pinto as soon as possible to reach an agreement. Any concessions required are acceptable with one exception. If Magalhães Pinto demands the presidency, he can forget it."
BRA_imperial_all_in: "All In"
BRA_imperial_all_in_desc: "Diseases desperate grown,\nBy desperate appliance are relieved,\nOr not at all.\n—William Shakespeare\n\nAs if in a game of poker, we are in too deep. We cannot turn back now; we can only burn our bridges behind us and face the future, come what may. If we were to back down, all that would do is ensure the victory of Goulart, who would then return like the Nazi-fascist Tyrant and bring an end to all the good we have done.\n\nWe need to double down. More troops. More armaments. More repressions. More deployments. More, more, more, more! Any means necessary to defeat Getulism and ensure a final victory. It is worth the cost, I tell you."

BRA_imperial_lacerda_victory: "Victory"
BRA_imperial_lacerda_victory_desc: "I am victorious. I have defeated every trial put before me; I have smashed aside every obstacle. Every opponent is defeated, their will to defy me broken. The degenerate leftist opposition that nearly took my life twenty years ago is swept aside. I have forged a New Brazil—one free from the sins and vices of the past.\n\nO Vargas, I have surpassed you; O Gomes, I succeeded where you failed. Take heed, General Fonseca; I have purged your Republic of its vices. Be afraid, Amazonas, for I have broken your degeneracy. By my will and by the grace of God, Brazil WILL be beautiful once more—and at the head of the chronicle of the Fifth Republic shall stand but one name: Carlos Lacerda."
BRA_imperial_a_feast_for_crows: "A Feast for Crows"
BRA_imperial_a_feast_for_crows_desc: "I read this somewhere. I don't remember where. The man that wrote it said the following: "If the communists insist on radical and incorrigible leadership, they will fail. They will, as the saying goes, 'die on the vine.' They will wither and be forgotten; the people themselves will reject them. They should instead abide by the people's interest." Isn't that a fine encapsulation of what befell Amazonas' rabble? Ferocious monsters have been turned into so many feasts for crows.\n\nMarighella is dead and can trouble no one any longer. Leftist resistance in São Paulo is eliminated, thanks not least to Frota's hard work. All that remains is the Amazonist rebellion in Araguaia—but that pathetic rubbish festered during Lott's tenure without issue. So the threat of a communist insurgency is over."
BRA_imperial_silenced_opposition: "The Silenced Opposition"
BRA_imperial_silenced_opposition_desc: "Dear God, it's been a long four years listening to the constant wailing and bleating of the socialists. Day in and day out they would whine about my "illegitimate government" and "oppression of the workers of Brazil". It was so goddamned annoying to have to pay constant attention to their plots and complaints.\n\nWell, I say "would" and "was" for a reason—it's the past tense now! The bleating of Goulart, Edna, and Brizola from abroad has finally been silenced. The birth of the Fifth Republic is proof positive that a new era is here—an era in which the PTB and socialism plays absolutely no role."
BRA_imperial_introduce_the_heir: "Introduce the Heir"
BRA_imperial_introduce_the_heir_desc: "The Mexicans have a very interesting term for their chosen successor. "El Tapado", they call him. I have one of those myself and his name is Raphael Magalhães; I can think of no one better suited to take the reins after I leave office. Having thrown the Trabalhistas out of the halls of power it's clear to me that I have left a good house for Magalhães to live in from hereon.\n\nIt's time to introduce our Tapado to the people of Brazil. I need to go and ask Senhor Tapado—I mean, Magalhães—if he is still interested in continuing as my chosen successor. I don't doubt he'll accept; and when he does we are assured of another five years of victory for our Nation."
BRA_imperial_introduce_the_heir_tt: "It is time to introduce our §QEl Tapado§!, §&step forward herald of the future§!"
BRA_imperial_the_march_north: "The March North"
BRA_imperial_the_march_north_desc: "The rebellions in the south have been crushed and their attempts to construct a so-called socialist state out of São Paulo and Guanabara are mere historical footnotes. However, the Araguaia problem remains. I said that Lott was not troubled by it, and that is true, but that does not mean that I or my successor will have such a luxury.\n\nIt is time for the military to move north. Araguaia must be suppressed. Amazonas must be shown to have failed, so the few imbeciles that dare to support communism and leftism know that there is no hope for them here. Médici, I will rely on you in this respect."
BRA_imperial_anaconda: "Anaconda"
BRA_imperial_anaconda_desc: "Operation Parrot has failed. Médici went about it too imprecisely—as too many cooks spoil a broth, so too many soldiers just complicate matters. In the wild jungles of Araguaia it is all too easy for regular forces to make fools of themselves, exhausting their limited supplies and sapping their combat ability.\n\nWe have special troops for a reason. We will send them to the area to crush the rebellion and slowly starve it out. This in turn will reduce the ability of the Araguaia rebellion to either survive where it is or promulgate itself elsewhere."
BRA_imperial_duck_hunt: "Duck Hunt"
BRA_imperial_duck_hunt_desc: "It turns out that the deployment of special forces rather than the regular army was the correct way to go about it. The Amazonian rebellion is now on the way to total destruction. What we have heard now is that the rebellion leadership, such as Amazonas, finding no further purchase for their abominable ideology in Brazil, are attempting to flee the country.\n\nI need the security services to come up with a plan. Let's try and take out Amazonas and his inner circle before they escape and find refuge somewhere else. If we can kill them off, it'll be a crowning triumph on top of all the others we've had this year."
BRA_imperial_distraction: "A Distraction, Nothing More"
BRA_imperial_distraction_desc: "The 1970 presidential elections are rapidly approaching. There are many delusional oppositionists who believe that this is the last opportunity they have to defeat me. With hope out of all proportion to the desperation of their circumstances, they muster and picket—though they do not dare to do anything the old subversive trade unions did.\n\nI almost feel sorry for them. The game was rigged from the very start and will remain so. There will be nothing but victory for the UDN. This election is nothing more than a formality and a distraction; we will not be deterred from the victory we deserve after all we have done for the Nation."
BRA_imperial_quiet_the_psd: "Quiet the PSD"
BRA_imperial_quiet_the_psd_desc: "The Getulist coalition has been in disarray ever since the last election. With the PTB and PSP neutralized, there is only the PSD left. In a desperate gamble to return to power, they drafted Juscelino Kubitschek, one of the last vestiges of the Fourth Republic, for the presidential candidacy to oppose Braga.\n\nKubitschek is extremely popular, it is true—even I found things to commend in his presidency. But he should have stopped sleeping around before running for office. Thanks to his lecherous tendencies he has smashed any hope his party ever had of gaining power. The man has no chance of returning to the Planalto. I have credible reports in hand, incontrovertible evidence that Kubitschek has betrayed his faithful wife. It's time for a leak."
BRA_imperial_caged_bird: "The Caged Bird"
BRA_imperial_caged_bird_desc: "The PSD must not be permitted to win. In fact, thanks to the joint effort of the UDN and the Armed Forces, they physically cannot win. But this does not make them worth banning. We will not outlaw them—we are not Hitlerites; we need not demand that every seat (instead of just a majority) be under our control.\n\nThe PSD has a use—it is to serve as an outlet for frustrations against the government. The PSD will never attain any sort of power, but they have a place: as a marionette, chained to Braga's will, and Sarney's after him, and so on and so forth."
BRA_imperial_trip_to_america: "A Trip to America"
BRA_imperial_trip_to_america_desc: "Our rule having been cemented, it is finally time for my long-overdue state visit to the United States of America, that land of the free and home of the brave. I have not conferred with the President of the Free World nearly as much as I perhaps should have. With the Fifth Republic now made firm, I am now free to remedy this deficit in our diplomacy.\n\nIn the District of Columbia we will sit together in celebration. The President and I will discuss the future of the free world and the OFN. We will also discuss how I myself have contributed and will contribute to the strength of the free countries of the world."
BRA_imperial_the_special_relationship: "The Special Relationship"
BRA_imperial_the_special_relationship_desc: "It has come to this—the culmination of our diplomatic and political labours. We will now make firm the special relationship between the United States of America and this Republic of Brazil. We are closer than any other pair of countries—we are the two strongest nations on the American supercontinent, and we are united in ensuring the freedom of the Western Hemisphere!\n\nSo long as the USA and Brazil stand united, no fascistic force can threaten peace where we live. The East may be lost but the West will not fall. Not while I'm here. I swear it, on my name and honor as inaugural President of the Fifth Republic of Brazil."
BRA_imperial_thunderous_applause: "Thunderous Applause"
BRA_imperial_thunderous_applause_desc: "The União Democrática Nacional is about to have its yearly conference. Today's UDN is such a far cry from how depressing gatherings like this used to be back when Gomes had screwed everything up. Our delegates are happy and hopeful; they are coming up with policy ideas and proposals and showing the world the intellectual might of Brazilian conservatism.\n\nTo celebrate the first convention of the UDN since the establishment of the Fifth Republic I will go and give a rousing speech to my party colleagues. I will go in depth on the reforms I have implemented and the future I have built. This will cement my legacy and ensure that people know to adhere to my guidance even when I no longer inhabit Planalto Palace."
BRA_imperial_the_final_reforms: "The Final Reforms"
BRA_imperial_the_final_reforms_desc: "Beltrão, is that you? This is Lacerda. Yes, I am doing fine, Minister, thank you for asking—I hope you and the family are well. You are, and they are too? Glad to hear it.\n\nWhy am I calling? You of course know that we have come quite far in our work to defuse the inflation crisis that that lecherous fool Kubitschek set off in the Fifties. What I need you to do right now is to put the finishing touches on those economic reforms of yours. Let's work on putting a final attack on inflation to permanently end its threat to our economy—once and for all. How does that sound?"
BRA_imperial_bounty_of_brazil: "The Bounty of Brazil"
BRA_imperial_bounty_of_brazil_desc: "Ach. The closer I get to the end of the term the more eager I am not to have to hear some general rumbling on the phone line. This time the armed forces are demanding more oil extraction because of the chaos set off by those wars in the Middle East. They're saying that we need to become self-sufficient in respect to petroleum and other consumables or else the Argentines will have their way with us.\n\nLooks like I'll have to bother Beltrão again. We'll have him work with the Ministry of Trade and Itamaraty to grant permission to companies to begin exploiting the Brazilian interior. Ideally they will discover sources of oil and other natural resources which we can in turn use to fuel our economy."
BRA_imperial_midnight_hour: "Midnight Hour"
BRA_imperial_midnight_hour_desc: "The hour is late. Planalto Palace is empty, Brasília has calmed down. The election has been called and the future of this Fifth Republic is surely written in stone. Ney Aminthas de Barros Braga is now President-elect and the Varguist legacy slowly but surely fades into nothingness. I am left at home, with my family at rest, and I am beginning to woolgather.\n\nI need a chair, some flowers—do they have any aconites here? I doubt it—and a car. I want to go to Getúlio Vargas' final resting place. I need to think clearly about the past and the future. Oddly, I'm not sure that I have any appetite to gloat anymore. I just want to think, now that it's over."
BRA_imperial_a_new_rio: "A New Rio"
BRA_imperial_a_new_rio_desc: "O Guanabara, Guanabara, this city of my home! The storm tried to have its way with you—it tried to sweep you away. Unbossed and unbroken you survived, defiant and glorious, an abode of freedom under the watchful eyes of the Redeemer. Rio after the storm is now a new, stronger city—one ready to face the future and represent the Fifth Republic to the rest of the human race.\n\nThanks to my efforts I have managed to ensure a bright, productive, prosperous future for Rio de Janeiro, my home and favorite city. It is the one thing I am most proud of as President of Brazil."
BRA_imperial_coronation: "An Imperial Coronation"
BRA_imperial_coronation_desc: "I feel sorry for Magalhães, that the military stymied him from taking power like that and imposed Braga and Sarney. I've told him this repeatedly. But he told me to be quiet and count my blessings—and honestly, he is right.\n\nNey Braga, though not what I wanted, is still a safe pair of hands. There's no question about it no matter how much I whinge. He will maintain the reforms we have fought for; he will also not be a blatant puppet of the military. He will perhaps even have the wherewithal to fight back on some of the more inane demands of the men in uniform, since he is closer to them than I could ever hope to be.\n\nI will attend his coronation—I beg your pardon, his swearing-in—and watch history be made once again, just as it was when I took office. Then I am going to take a very, very long vacation."
BRA_imperial_coronation_tt: "It is §Gtime for inauguration§!."

BRA_imperial_lacerda_vengeance: "Vengeance"
BRA_imperial_lacerda_vengeance_desc: "Carlos Marighella—you miserable assassin, you traitor against the Brazilian people, you Bolshevik subhuman! Why have I tolerated your continued existence? Why have I permitted you to peddle your degeneracy among my people—the people of Brazil? If I had struck hard enough soon enough, Magalhães would still be alive!\n\nMarighella, you traitorous bastard! You kidnapped Magalhães—my friend, my protégé, the heir to this accursed Executive Power I have been made to wield. You and your degenerates kidnapped him, tortured him, and then gunned him down—a journey which he began merely by heading home to his family for Christmas!\n\nVengeance is mine, and I will have it. You and all your co-conspirators... they will pay."
BRA_imperial_parasar: "PARA-SAR"
BRA_imperial_parasar_desc: "The situation is desperate. I know not whether it is my own negligence or the results of Getulist and communist subversion, but Rio is awash in communists and the whole country is full of traitors. Everywhere one goes one finds treasonous plots and attacks against the rightful executive power. Fortunately, I have heard that the Air Force—to be precise, one General João Paulo Burnier—has a plan to root out all manifestations of opposition in Guanabara.\n\nTo anyone that whinges about the potential cost, I ask: where were you when Marighella was plotting his crimes? I say now that any cost is worthless next to the gain of catching Marighella and bringing closure to Magalhães' family. Justice must be done. I do not care if the cost is Rio itself going up in flames—the PARA-SAR Plan must be executed immediately."
BRA_imperial_parasar_tt: "§RThe Strike GUI will be removed, due to our failure in containing them.§!"
BRA_imperial_kidnap_goulart: "Operation Rubens Vaz"
BRA_imperial_kidnap_goulart_desc: "For too long these communist Getulists Brizola, Goulart, and Edna Lott have hidden in Cuba, escaping the rightful justice of the Brazilian nation. We have no way of getting hold of either Brizola or Edna—they are too well-secured and their families cannot be readily targeted. That soft moron Goulart, on the other hand, is a sitting duck. We can threaten his wife's safety, force him to return, then arrest him.\n\nIt is time to put this proposed operation into motion. When Goulart returns, he will be put in prison, never to escape. This will put paid to the first and most major threat to my rightful rule over this country."
BRA_imperial_cover_up_kubitschek: "A Cover Of Cement"
BRA_imperial_cover_up_kubitschek_desc: "You morons! How do you dare to call yourselves a "Third Army" when you cannot follow basic orders? Unable to apprehend a man, you then cause him to crash and die as he speeds away in his motorcar with his mistress! Now a former President of the Republic is dead and we are under suspicion thanks to you.\n\nWhat now can we do but drag his name into the mud to save our own hides? We must have TV Globo claim that he was driving drunk after having been caught by his wife engaging in infidelity. "Who knows what proportion of the population will believe it"? It does not matter—we have no choice. I can't hand your good-for-nothing commander over to them no matter how much I want to now, can I?"
BRA_imperial_arrest_tavora: "Vindicarei-Me-Nos"
BRA_imperial_arrest_tavora_desc: "And now we come to that lily-livered imbecile Távora. How one male can both be so cowardly and so ambitious is beyond me. That coward always craved the Presidency—he was always after my seat. If he wasn't such a craven, I would've suspected him of having a hand in Magalhães' murder. But the very suggestion is ridiculous—he is too much of a pansy to even think of murder.\n\nMurder is beyond the pale, but criticising me in such a manner as to give ammunition to my enemies is not. He denounces our administration; he refuses to show up to Cabinet meetings and is trying to sabotage the continued functioning of the government! We will not let this stand. Go at once and deploy soldiers to arrest him. The court-martials will try him for treason, and then I will pardon him of the death penalty. Call it payment for services rendered."
BRA_imperial_doubt: "Doubt..."
BRA_imperial_doubt_desc: "The doubts—they rise up to suffocate me. General Burnier never revealed the extent of this PARA-SAR plan of his. He just said it would suffice to exterminate all treason and ensure the loyalty of the military and government. It has done that, but at what cost? It is going further than I ever intended.\n\nEsther, my loyal secretary, has clearly been affected by what she has been forced to witness, or else why would she be asking to resign? Of course she insists that isn't the case, bless her heart—she just says she wants to return to Curitiba with her family. I will grant this request. She deserves peace after all her work for me.\n\nBut the fact is that I will now be left on my own with only the army around me. I suspect that isolation may be just what I deserve in the circumstances."
BRA_imperial_no_half_measures: "No Half Measures"
BRA_imperial_no_half_measures_desc: "Who do those fools in Washington think they are? These morons at the Organization of Free Nations? They accuse us of so-called "crimes against humanity", a designation that was conveniently absent against Perón or Stalin. They protest outside our embassies and consulates while journalists type up a storm of hostile invectives, complaining and raging against our persistence in the OFN.\n\nThese fools will never understand. We had to do this. The communist scum were at the gates—and who knows what they might then have done to the rest of the OFN? We will defend ourselves before the OFN and the Organization of American States come hell or high water. I do not give a damn what sanctions they inflict. I did what I had to do and nothing more or less."
BRA_imperial_crush_fota: "Crush Frota"
BRA_imperial_crush_fota_desc: "The way Sílvio Frota once behaved, you would have thought he was cut from the same cloth as Costa e Silva or Rademaker—a loyal military man and a leader of the hardliner apparatus. But that skin has been sloughed off like that of an Amazonian lizard. Now he and the Second Army have rebelled in São Paulo and are actively defying the government, declaring allegiance with Vargas' spawn who is the governor of that pesthole.\n\nAnd now listen to the sort of nonsense he proclaims over the Paulista airwaves. He calls us—us—"evil" as if he himself has not waded in blood. How many crimes has this man committed, that he now claims himself innocent while committing treason and calling it loyalty? Send in the First Army from the Argentine border and crush this traitor at once before he attacks Guanabara or the Federal Capital!"
BRA_imperial_blood_on_the_amazon: "Blood on the Amazon"
BRA_imperial_blood_on_the_amazon_desc: "At last the report has come to us from our intelligence services. The traitorous leftists who began all this misery have been conclusively located—they have holed up in the far north, hiding in the Araguaia region. They claim loyalty to João Amazonas, to Marighella, Lamarca, and a so-called "combined anti-fascist front" whose clear ambition is to hand us over to Nazi-fascism in the name of "national liberation".\n\nWe will put an end to this devilry and we will do so now. The murderers of Magalhães will pay a hundredfold for their brutality. Deploy the helicopter brigades at once, with orders to fire at will and take no quarter. I want the jungle stained as red as those Bolsheviks' stupid flags, and the Amazon dyed just as red from their spilled blood!"
BRA_imperial_mercy: "Mercy..."
BRA_imperial_mercy_desc: "Months have passed and Guanabara still burns. We need to restore order to the greatest city in the Brazilian republic. You fools of the Third Army will redeem yourselves by moving into Rio de Janeiro and restoring order. You will then cooperate with any providers of international aid and take advantage of the fact that it is not yet too late to return Guanabara to a semblance of order.\n\nAdditionally, we need to take a more moderate course. Former President Lott is in our custody. Let him and his family go into exile to be with Edna Lott. There has been enough bloodshed. Enough families have been torn apart over this devilry."
BRA_imperial_succession: "Succession..."
BRA_imperial_succession_desc: "Magalhães has been buried. I have returned from his funeral Mass and done what little I can to convey my sympathies to his family. But with him cruelly murdered by the communist degenerates we need a new successor. We have no good candidates, and the military is sending us so many demands for the next (staged) elections that they could fill up an entire textbook.\n\nI will give them what they want. We will choose the least of all evils and bring Magalhães Pinto to Brasília, offering him the presidency. This at last will put something in the gap left by Magalhães' death."
BRA_imperial_cold_southern_springs: "Cold Southern Springs"
BRA_imperial_cold_southern_springs_desc: "We have neglected our southern front, haven't we? The Argentines sit there seemingly twiddling their thumbs but are obviously awaiting a chance to strike at us. Sure, they have closed off the borders and are denying refugees heading towards the border. But only an imbecile would think that they were not amassing for an attack.\n\nTake direct action. I want the forces on the southern border doubled. If they want to set Argentina aflame so it is no less miserable than Brazil right now, let them be my guest. We must be prepared for any war coming."
BRA_imperial_illusions_end: "Illusions' End"
BRA_imperial_illusions_end_desc: "We thought ourselves safe, but our rule is beleaguered by constant threats. We considered ourselves invincible, our ideology immortal, and Varguism permanently defeated. But due to my own bloodlust and the incompetence and treason of the armed forces we have been laid low! We cannot permit the Getulists or the communists to cause matters to spiral out of control.\n\nThe risk of that is high. I have heard horrifying rumours to the effect that Che Guevara, that arch-communist brute, is travelling to Brazil to assist Amazonas in his struggle. This cannot be accepted. The rumours must be scotched. Che Guevara must be prevented from breaching our borders no matter the cost."
BRA_imperial_illusions_end_tt: "§RWe will finally end that rat Che Guevara once and for all...§!"
BRA_imperial_urban_guerilla: "The Urban Guerilla"
BRA_imperial_urban_guerilla_desc: "Perhaps this is why Frota rebelled. We have learned that the subhuman traitor Marighella is hidden in the sewers of São Paulo. He has a very nice little hideout from which he takes orders from his demonic master Amazonas on the process of his war of extermination against the Brazilian people. Would that we had known beforehand—would that I had tried to figure it out—so that Magalhães would still be alive. I—\n\nEnough of this! I need to stop whingeing. Magalhães is beyond return. But we will bring him justice. Go at once—flush the communists out of São Paulo and put paid to their treason in that state. We were not able to save Magalhães from the Bolsheviks but we can at least exterminate his murderers in his honour."
BRA_imperial_arrest_burnier: "Bullet to the Head"
BRA_imperial_arrest_burnier_desc: "This traitor João Paulo Burnier would have made for a perfect assistant to Marighella and Amazonas in another life, would he not? That Nazi-fascist bastard has conned us! When he was discussing his thrice-damned little plan to "remove subversion" he never once said he planned to collapse a dam in Rio and flood the place. He also did not tell us that he intended to destroy the fucking gasometer and thereby set fire to every favela in Guanabara!\n\nThat crypto-communist good-for-nothing thinks he is so clever, committing mass murder and high treason and calling it loyal service to defeat communism. He thinks he has rendered us a service, does he, the fucker? He'll get his goddamned reward for his demonic little service—I'll give it to him, by God, I will.\n\nMédici! Arrest this brute and shoot him in the back of the head. I want him dead in eight hours or less. Then hang him upside down from the first telephone pole you find!"
BRA_imperial_arrest_burnier_tt: "§RBurner Dies Tonight.§!"
BRA_imperial_the_other_carlos: "The Other Carlos"
BRA_imperial_the_other_carlos_desc: "There is another Carlos. It tears at my soul day in and day out that I share a name with a goddamn communist. Carlos Lamarca leads the rebels in Araguaia; he is the third of the three heads of the Hitlerite-Bolshevik hydra. Just like Marighella and Amazonas, we have forced him to go to ground, but now we need to redouble our efforts.\n\nWe must destroy their rebellion. These Nazis have managed to dupe the natives and locals into going along with their treasonous schemes. We must target the local settlements and in doing so starve out these so-called students, putting paid to their rebellion and saving our people from their schemes."
BRA_imperial_black_swans: "Black Swans..."
BRA_imperial_black_swans_desc: "What do you mean, "oil crisis"? What do you mean, "economic collapse"? We do not need this, damn you, we don't need this right now! God fucking damn it. As if things could get any worse for this country. As if they could get any fucking worse! I can't take it anymore!\n\nThis oil crisis of theirs has collapsed the Brazilian economy. The guerrillas, far from defeated, continue to attack thanks to the incompetence of our oh-so-valiant armed forces. Capitalists and investors—our country's most productive citizens and those foreigners that so often strengthened our economy—are fleeing for any safer shore they can find. Countries in Africa are now more attractive for investors than the Brazil that has been brought about on my watch.\n\nAnd I was warned, wasn't I? Wasn't I? That motherfucker Lott. He knew all this would happen. Every word he said from the start of this damn crisis was a blaring warning of this no matter how he delivered it. I ignored him. I ignored him, and now the country bleeds.\n\nWho is the greater fool? Him for offering counsel to my stoppered ears, or me for not listening?"
BRA_imperial_letting_go: "Letting Go"
BRA_imperial_letting_go_desc: "These five years are over. Even if I wanted to, I cannot go on. I can't take it anymore. I hardly could even with Magalhães around—but he is dead and I am about to join him.\n\nThis goddamn job rots away at me. This life is a cancer on my soul. The doctors insist I am in good health but I feel the rot—I feel everything destroyed within me. It wasn't meant to be like this. This is Goulart's fault, isn't it? The Varguists did this, didn't they? They made it happen. They—enough.\n\nI will never say it to anyone, but I know whose fault it really is. Having ... watched and been in the halls of power as Brazil was brought to this pass, I know that the only service I can render to my country now is to leave life and enter history.\n\nI hope the Hereafter will prove kinder to me than reality has. But do I deserve such mercy?"


# Strikes
BRA_gomes_checkmate: "Gomes's Checkmate"
BRA_gomes_checkmate_desc: "There has been scarcely an enemy so committed to opposing us and so powerful in nature as the unions and their pet parties. This bloc of fat-cat administrators who wield millions of workers to oppose us have been a never-ending thorn in the side of any conservative administration, and ours has been no exception. At every turn and with every reform, we see them organizing, seducing the working people to stand in the way of their own good - and too often we find ourselves with our hands tied behind our back to oppose them.\n\nIt is the Labour Code, that evil thing, which binds us so - a document from the Varguist days which greatly empowers the union class, letting them run riot over Brazil in pursuit of their own interest. To reform and even remove it has been a UDN tenet for decades, and it is past time we get to cutting our enemies down to size - but we must be careful. It was Gomes, after all, who tried this last, and he found himself on the wrong end of a brutal public backlash that destroyed the UDN for years altogether. We must be smarter, stronger, and better than he was - and if we hold our own, we can finish his work."
BRA_lacerda_gomes_checkmate_tt: "§QLacerda§! will embark on the §Rmain obstacle§! for him to reshape §KBrazil§!, the £GFX_BRA_ptb_texticon  §VVarguist Labor Laws§! £GFX_BRA_ptb_texticon  must be §edismantled§!."
BRA_Sisyphean_struggle: "Sisyphean Struggle"
BRA_Sisyphean_struggle_desc: "The core of the labour bloc and the reason why our efforts to break them apart have struggled so is unity - solidarity, even. These unions, though they cover different interests and different kinds of labour, are unceasing in their efforts to conspire against the true interests of their workers. After all, if the laboring classes were more prosperous, they wouldn't need the union to force their wages up - therefore, the unions work together to prevent that prosperity, using the UDN as the scapegoat for their self-inflicted woes.\n\nIn contrast, the interests of the Brazilian right are diffuse and chaotic. Populists clash with conservatives clash with free-marketers, and the leftists of Brazil get away with the whole hog. We must end this squabbling in the interest of opposing a greater evil, for our own differences cannot allow the big unions to continue on with their banditry - if we stand as united as they do, we will see that the people of Brazil truly do stand with us as well, and when the people abandon the unions, they will have no choice but to give in."
BRA_begin_media_campaign: "Begin Media Campaign"
BRA_begin_media_campaign_desc: "It is of great benefit to us that the newspapers of Brazil are, by and large, owned by rich magnates and moguls. After all, who are they to support strikers and socialists? Indeed, Lacerda has been very good to these fine gentlemen, and in return they shall deliver us their most valuable asset - positive press.\n\nThis anti-union initiative of ours is sure to ruffle many feathers - we're more than aware of this, after how poorly the first go-around went for Gomes. Therefore, when the laborers begin to pitch a fit, we must be ready for their massive disorder. Each violation will be breathlessly covered by headlines screaming of union disorder, each part of the bill will be fawned over and praised by the columnists. To the public, our enemies shall be nothing but rabble-rousers standing in the way of Brazilian progress - and when we sweep them aside, they will be more than happy to watch us do so."
BRA_preempt_unions: "Preempt the Unions"
BRA_preempt_unions_desc: "There is no doubt that our bill to weaken the unions will be met fiercely by the unions - indeed, it's rather self-explanatory. Indeed, the predictable nature of the response to come means that we can plan in advance for its consequences and get out ahead of our adversaries before they make the first move. It will be a critical skill in these coming days.\n\nThe unions will strike, we know that. They will march with banners and red flags, clogging the streets and filling the air with their chants and their soldiers. But we know their weaknesses - we know their leadership, which is corrupt and feckless, and we know how a package of dollars hand-delivered to their doorstep can weaken their resolve. It is a shame we will have to let the ringleaders of this circus make off like bandits, but without orders from on high, these strikers will be nothing more than a directionless mob for the police to properly handle."
BRA_submit_the_bill: "Submit the Bill"
BRA_submit_the_bill_desc: "Lacerda's chosen deputy shuffles up the floor, delivering his paper to the President of the Chamber, who reads it into the record. A roar goes up from the opposition, but their words of anger are drowned out by the sound of fingers hitting buttons and lights flickering above.\n\nOverlooking it all is Lacerda, watching the first shot of his greatest legislative effort be fired. He can see union cronies ducking in and out of the room, surely making calls back to Rio and São Paulo, while his allies on the other end of the room whip votes and take names of those who resist. Here, then, is his inflection point, his Rubicon - the last moment of peace before he starts an open war.\n\nThen here goes nothing, he thinks, and he nods to his deputy to open the voting."
BRA_submit_the_bill_tt: "§QLacerda§! will §Vend§! the £GFX_BRA_ptb_texticon  §VVarguist Labor Laws§! £GFX_BRA_ptb_texticon - §eor die trying§!"
BRA_counter_reaction: "Counter the Reaction"
BRA_counter_reaction_desc: "As we expected, the unions have taken the submission of our bill to break them poorly. Who wouldn't? Their places of power are now under threat by an honest government, for a change, and so they will send their underlings out in full force to break our will and shatter the political resolve of the Chamber. Across Brazil, workplaces grind to a halt and construction comes to an abrupt end as their laborers leave the job sites, taking to the picket line instead and attacking any who attempt to earn an honest day's work.\n\nIf this is a war of survival for them, however, it is just as much a war of survival for ourselves. We have seen what such a strike can bring upon a government without the spine or the muscle to break it. Gomes' attempt to cut the unions down to size came apart at this very juncture, in fact - he had neither the unity nor the backbone to keep his party men in check, and when the economy took a plunge, he was the one served on a platter to union greed.\n\nCarlos Lacerda will not let this happen again."
BRA_lacerda_strike_ongoing_tt: "We currently have ongoing strikes"
BRA_lacerda_strike_more_options_tt: "§RWe will have more options to deal with the strikers.§!"
BRA_iron_will: "Iron Will"
BRA_iron_will_desc: "One can prepare themselves all they want for the consequences of invoking a general strike, but it truly is hard to understate just how brutal these disputes can be. Weeks of no movement on the picket line has left Brazil in a state of freefall, its market collapsing and its people out of work. Increasingly, the public is wishing for nothing more than capitulation - whether from the government or the unions depends on who is asked. But the longer this goes on, the more the people of Brazil wish for the aggressors to back down and let life go on - and, as much as we deny it, the fact is that we are perceived as the aggressors here.\n\nNo matter. The benefits of a Brazil without union thugs and leeches skimming off the top is worth all the short-term pain they can inflict. If we keep this in our minds and in our hearts, we will be a force united for the future - one which no great strike nor any labor action can contain. All there is to do is stay the course."
BRA_realist_concern: "Realist Concerns"
BRA_realist_concern_desc: "The Realistas and Távora believe that our actions so far have been too harsh. They want the government to negotiate with the unions, or else they may pull support for Lacerda and the government. We cannot risk the party and government collapsing at this time, and thus, we must heed their demands. The government will reluctantly enter into talks with strike leaders and attempt to reach some sort of settlement. It will be an incredibly arduous task if to find a solution that appeases every faction."
BRA_virtue_of_patience: "Virtue of Patience"
BRA_virtue_of_patience_desc: "While it may not feel like it, there is a light at the end of the tunnel. The unions cannot muster enough resources to strike forever, and already, there are signs of them losing momentum. With the power of bosses, capital and the state on our side, it would be impossible to fumble this. The reckless actions of the unions will show the Brazilian people why these reforms are necessary. The sun will soon rise on a better Brazil that is not shut down whenever union bosses are feeling greedy, where businesses can thrive without unions strangling them and where prices are not driven up by the radical demands of organised labor."
BRA_cavalry_charge: "Cavalry Charge"
BRA_cavalry_charge_desc: "The unions have made it clear that they will not stop unless they are stopped - and it is imperative that they are called out on this bluff. They believe that Lacerda and the UDN will happily bend the knee at the slightest pressure - well, let them. The disorder brought on by the strikes has gone on long enough, and it is time that something is done about it.\n\nThe police and the media will be the cavalry of our assault against them both mentally and physically - armed officers will disperse the rioters to the wind, whilst the media will take our side in portraying them as the spoiled children acting out that they are. Combined, the strikers will stand no chance."
BRA_military_option: "Military Option"
BRA_military_option_desc: "There is no such thing as too much force when it comes to ensuring Brazil's stability. The military have kindly approached us and offered to lend their aid in resolving the current situation - and it is an offer that we shall gladly accept.\n\nThis is not a decision made lightly; President Lacerda is well aware that certain factions of the military have a history of overstaying their welcome in crises such as this, and the risk that they may do so again. However, it is a price that must be paid in order to ensure that the ongoing strikes are resolved in a quick and orderly fashion. The streets shall be cleaned and the unions will slink back to their proper place in irrelevance."
BRA_outlast_strikes: "Outlast the Strikes"
BRA_outlast_strikes_desc: "The strikers are much like a fire. They have grown from nothing into a raging inferno intent on burning the UDN down. But by that same logic, all fires peter out eventually. We have the police. We have the resources. It will be by velvet glove that Lacerda claims his victory, not by iron fist. Eventually, they will need to come back to work. For despite all the ranting and raving about the power of the working man, everyone needs to eat. And when they inevitably come crawling back, groveling on their knees for forgiveness, it will be granted happily, for this outcome was certain from the beginning."
BRA_tavora_negotiations: "Távora's Negotiations"
BRA_tavora_negotiations_desc: "Távora was the one who forced the government into dialogue in the first place. It is then just that he is the man who has to follow through and lead these negotiations. Távora will have to strike a delicate balance in his dealings. Brazil cannot go back to the days of endless strikes, and at the same time, unions and their members will need to be at least somewhat satisfied with their pay. The stakes are incredibly high here, and if Távora cannot overcome these seemingly insurmountable odds, the PSD will no doubt sweep us out of power when the next election comes."
BRA_pragmatism_over_all: "Pragmatism Over All"
BRA_pragmatism_over_all_desc: "The agreement that Távora has managed to secure with the unions will be an incredibly tough pill for the government to swallow, even if it is a necessary one. Any further prolonged strike action will seriously damage the economy and greatly reduce the UDN's electoral prospects in the future. The government will have to strike a conciliatory tone with the unions to avoid this worst outcome. While we could not go the whole way, some important reforms will be implemented under this agreement. There will still be disruptive strikes in the future, but these reforms should make them less prolonged and less severe than the status quo."
BRA_lacerda_strike_negotiations_succeed_tt: "The Távora §JNegotiations§! §Gsucceeded§!"
BRA_hold_firm: "Hold Firm"
BRA_hold_firm_desc: "Távora and the unions have drudged up a preposterous agreement; under this plan, the unions will retain most of their leverage and the ability to call burdensome strikes. This agreement is a total capitulation to those radicals and should not be allowed to stand. The government will continue to starve out the strikers, either until they cave and come to a more nuanced agreement or are crushed entirely. Brazil must hold firm against this reckless radicalism. If the government shows any further weakness, then the strikers could prevail. The existence of a prosperous Brazil hinges on that result not coming to pass."
BRA_lacerda_strike_negotiations_collapse_tt: "The Távora §JNegotiations§! §Rcollapsed§!"
BRA_crows_legacy: "The Crow's Legacy"
BRA_crows_legacy_desc: "While it took a prolonged and very costly effort, the Labour Law has finally passed, and the unions lie defeated. This will be the most foundational part of the Crow's Legacy and ensure the future economic prosperity of Brazil, secure from unexpected strikes and unshackled from the populist restrictions on our economy forced by the unions.\n\nContrary to what the unions claim, the tide raises all boats, and union members will be far better off in the long term. In time, the idea of having such high levels of union influence will inevitably fade, Brazilians will learn the advantage of this new economic regime, and eventually, the system of strong unionism will be nothing but a distant memory and an unpalatable system to which Brazil will never return."
BRA_crows_legacy_tt: "§QLacerda's legacy§! will depend on if he compromised in the strikes."
BRA_lacerda_strikes_over_tt: "§QLacerda§! has won his crusade against §VVarguism§! and §Rcrushed the strikes§!"

# Távora
BRA_tavora_presidency: "The Távora Presidency"
BRA_tavora_presidency_desc: "Pressuring Lacerda into resigning was the last thing that we wanted, but the economic situation demanded drastic action he was unwilling to commit to. The strikes have severely damaged Brazil's economic progress, and were it not for the united cabinet, the economy may very well have been shattered entirely.\n\nWith Lacerda now out of the picture and Távora in his place as President, much work is to be done. With the amount of economic struggle Brazil has experienced, uniting the nation once again will prove to be a challenge.\n\nA challenge that must be met."
BRA_united_against_varguism: "United Against Varguism"
BRA_united_against_varguism_desc: "Lacerda's removal has upset many in the UDN, both those with ties to his faction as well as former allies to Gomes. They claim that we have betrayed our core principles by removing Lacerda, but this is simply untrue. We kept true to our principles. It was Lacerda that nearly destroyed our economic projects by choosing to fight a hopeless battle. We did what was best in a bad situation, but unfortunately, many do not see it that way.\n\nAs it stands now, the UDN is splintered. It is imperative that we restore factional unity and transform the UDN into an organization whose path is guided by the party and not solely by the current President's will."
BRA_correct_the_error: "Re-Correct the Error"
BRA_correct_the_error_desc: "Lacerda repeated Gomes' mistake by attacking the Varguist project directly in an unfruitful attempt to eliminate the labor laws. Removing the aforementioned labor laws was always going to end in catastrophic failure due to the sheer volume of political opposition to such actions.\n\nUnder Távora, the process of reversing many of Lacerda's decisions will lead to both the return of many labor regulations as well as the return of stable governance."
BRA_our_natural_ally: "Our Natural Ally"
BRA_our_natural_ally_desc: "The maintenance of our relationship with the Americans is quite a significant task. They are a key ally to us and with the recent financial issues we have faced, we must quickly improve trade relations with them in order to restore their confidence in our economy. We shall send our foreign minister on a little trip to Washington to engage in the discussion of trade between our two nations.\n\nHopefully, when the Americans see our efforts in treating these matters with the urgency that they deserve, they will be more willing to work with us and re-establish their faith in our market."
BRA_the_crows_protege: "The Crow's Protégé"
BRA_the_crows_protege_desc: "The individual who opposed the removal of Lacerda as President the most was the Governor of Guanabara, Raphael Magalhães. As a close ally to Lacerda, Magalhães took a tough stance against the strikers in Guanabara, keeping Guanabara's economy afloat while the rest of the country faltered.\n\nWithin the UDN, Magalhães whispers to other members of treachery and treason, claiming that we have betrayed our principles in Lacerda's removal. In order to restore unity to the UDN, Távora will arrange a meeting with Magalhães in the hopes of smoothing over relations and working on Magalhães' many complaints."
BRA_tavora_stabilize_inflation: "Stabilize Inflation"
BRA_tavora_stabilize_inflation_desc: "A major cornerstone of the UDN's political platform was the reduction of Brazil's inflation rate, which has historically proved to be quite unstable in times of uncertainty. Former President Lacerda was many things, but his commitment to achieving stellar economic growth and a downturn in inflation was certainly not among his failings whilst in office.\n\nUnfortunately, the strikes have caused a stoppage in much economic activity, reversing much of the progress Lacerda had made. Inflation is on the rise once again, and measures must be taken before we arrive squarely in the same place we started years ago. Now that Lacerda has faltered, President Távora will take this burden upon his shoulders, and continue the fight to keep Brazilian currency from spiraling out of control."
BRA_deficit_hawks_tavora: "Deficit Hawks"
BRA_deficit_hawks_tavora_desc: "For far too long has unchecked, reckless spending wreaked havoc upon Brazil's finances. Irresponsible government budgeting has led to rising debt across the board, and President Távora's predecessor proved wholly incapable of putting a stop to this sorry state of affairs. Let us correct the oversights of the past and take a new approach towards controlling the deficit.\n\nThe UDN, as well as Távora, are in favor of balancing the budget, but serious efforts have yet to be made. It is time to slash government spending in all sectors, even if it comes at the expense of certain social programs. Only once we have actual money to spend can we get a handle on the ongoing economic downturn."
BRA_loan_sharks: "Loan Sharks"
BRA_loan_sharks_desc: "The deficit is growing out of control, causing debt to balloon to dangerous levels. Of course, this is a consequence of the UDN's long standing battle against inflation: in an effort to keep the currency under control, interest rates must remain above a certain level to avoid devaluation. Although it may seem as though we are cutting off one hand to save the other, Távora is confident that we can both keep inflation under control, while still keeping a handle on the deficit.\n\nFor one time only, we will make drastic cuts just long enough to buy us time to combat the deficit. Once the economy is no longer in danger of flying off the rails, we can then return to the usual levels to continue the fight for the Brazilian cruzeiro. This will be a tricky balance to pull off, but if anyone can accomplish it, it is President Távora."
BRA_end_guanabara_dream: "End the Guanabaran Dream"
BRA_end_guanabara_dream_desc: "The terrible storm and catastrophic damage done to Guanabara was a tragedy, but the amount of money being pumped into its reconstruction is simply unsustainable, with spending on the project going far beyond the original plans. Much of the money was not just for reconstruction, it was also granted due to it being a pet project for Lacerda, while the rest of Brazil was aiming towards economic austerity.\n\nIt is time that we end reconstruction and salvage as much as we can. In order to show our commitment to the people of Brazil, it is occasionally necessary to give up on an unfeasible dream or sacrifice a sacred cow."
BRA_guanabara_prooject_done_tt: "The §KGUANABARA RECONSTRUCTION§! megaproject has already been completed."
BRA_tavora_guanabara_dismantle_megaproject_tooltip: "We will dismantle §QLacerda's§! §Rfailed pet project§! - the reconstruction of Guanabara."
BRA_nordeste_reinvestment: "Reinvest in Nordeste"
BRA_nordeste_reinvestment_desc: "Távora, as a former governor of Ceará, is well aware of the political and economic potential of the Nordeste region. Most people who inhabit this region are unfortunately not inclined towards supporting the UDN. It has been the PTB that has historically held the most sway in this region, dominating the political scene.\n\nIf the UDN were to invest in this region, it may be able to sway thousands of voters and could potentially even swing the election in our favor."
BRA_loyal_middle_class: "Our Loyal Middle Class"
BRA_loyal_middle_class_desc: "The main support base for the UDN is the middle class. It is of the utmost importance that we maintain good relations with this group to secure the future of the party.\n\nTávora will reassure this core group that the UDN is there to defend the interests of the people and won't repeat past mistakes. To build a better Brazil, it is necessary to cater to the middle class. Their will is what decides the failure or success of the government after all."
BRA_our_subservient_middle_class: "Our Subservient Middle Class"
BRA_our_subservient_middle_class_desc: "Between the General Strikes, it is not the wealthy industrialists or the grassroots laborers who receive the largest share of the detriments. More commonly, the burdens end up relegated to the humble middle class, who do not have the option to avoid the conflicts on their own. As they lose jobs and fall into poverty, the government ought to stand up for them when they cannot do so for themselves.\n\nIs there any way for a person to become more loyal to the establishment than a public servant? If those who cannot find work are permitted to join ranks within understaffed departments, the UDN can easily consolidate its influence within the bureaucratic apparatus — so long as only law-abiding folks come and go."
BRA_meet_the_psd: "Meet the PSD"
BRA_meet_the_psd_desc: "In the wake of Lacerda's fall from grace, the UDN is finding itself increasingly isolated, and is in dire need of allies to shore up the balance of power in Brasília. Fortunately for us, President Távora has a few favors he can call in from his days as a governor. During his tenure in Ceará, he governed largely with the support of the PSD, who have long been the UDN's closest partners.\n\nLet us reach out to the PSD to see if we can reach some sort of agreement. They will no doubt ask for serious concessions in exchange for their support, but should the meetings prove fruitful, Távora's position will begin to become far less uncomfortable, and we can turn our attention to more pressing matters."
BRA_beat_the_psd: "Beat the PSD"
BRA_beat_the_psd_desc: "Let's address the elephant in the room — the remnant opposition figures that the Sorbonne somehow allowed to linger. While the majority of the PSD agreed to work with the establishment through compacts of mutual benefits, some less cooperative elements, rallied under Tancredo Neves, had chosen to continue undermining the regime's integrity with their divisive rhetoric.\n\nApproaching the 1970 election, the economic destabilization that Neves promises to bring becomes too dire to neglect. However unwilling he may be, Távora has no choice but to take this ill-intentioned dissident out of the picture. Golbery has endorsed the idea and will certainly act where his mouth talks."
BRA_beat_the_psd_tt: "£BRA_psd_texticon §YJuscelino Kubitschek§!'s popularity §Yfalls§!.\n"
BRA_tavora_big_tent: "Távora's Big Tent"
BRA_tavora_big_tent_desc: "The UDN is hardly a monolith. Ostensibly a conservative party, it has grown to become an all-encompassing menagerie of politicians of all stripes who are united in their opposition to Varguism. Liberals, conservatives, and even leftists reside within the party, and although their relations are tenuous, keeping the party united will be key to surviving the next few years.\n\nTávora and his allies will reach out to all corners of the UDN to ensure that their voices are heard, no matter how much their values stand in opposition to our own. As the party's enemies grow in number, we cannot afford a conflict to arise from within our ranks. Once the UDN is tested from without, they will find that despite our differences, the party remains united in its commitment to present a united front against the lingering influence of Vargas."
BRA_tavora_big_tent_sorbonne: "$BRA_tavora_big_tent$"
BRA_tavora_big_tent_sorbonne_desc: "$BRA_tavora_big_tent_desc$"
BRA_cement_realist_dominance: "Cementing Realism"
BRA_cement_realist_dominance_desc: "The UDN is a very syncretic party, with a large number of political positions under its wing. It's quite clear, however, that there are loose ends in this arrangement. Lacerda brought the entire party to its knees by trying to overturn the Vargas-era labor laws, and we must not do the same thing again by dividing ourselves unnecessarily. We must be careful not to allow future Lacerdas to rise up again."
BRA_cement_realist_dominance_sorbonne: "$BRA_cement_realist_dominance$"
BRA_cement_realist_dominance_sorbonne_desc: "$BRA_cement_realist_dominance_desc$"
BRA_conference_season: "Conference Season"
BRA_conference_season_desc: "The party conference of the UDN is close at hand, and many are dreading its arrival. It will be among the most difficult in the party's history: the disgraced Lacerda has been banned from participating, but many of his allies have made clear their intention to attend, which may complicate matters. Távora's own popularity within the party is tenuous at best, and it is uncertain if his presidency will survive as party divisions grow wider by the day.\n\nWill the UDN move past the mistakes of the Lacerda administration, and remain united against the rising surge of Varguism, or will it collapse and fade into the history books as a tragic lesson in the perils of politics? The result of the conference will make the answer to this question clear. Let us hope that fate rules in our favor."
BRA_conference_season_sorbonne: "$BRA_conference_season$"
BRA_conference_season_sorbonne_desc: "$BRA_conference_season_desc$"
BRA_knife_edge: "On a Knife's Edge"
BRA_knife_edge_desc: "Bar charts and statistical tables are published in newspapers and hammered into bulletin boards in every city and town in the country. The vote totals remain within percentage points of each other as the failure of the Lacerda regime haunts UDN polls.\n\nWe must use media contacts, form alliances with anyone who hates the opposition more than they hate us, and throw everything we have with our attack ads. With all our resources, we must defend conservative strongholds, strengthen the middle class, and take back the cities. We have very little time left to fight the rising leftist wave.\n\nBrazil has suffered enough. Never again shall she fall to Varguism!"
BRA_razors_grip: "Razor's Grip"
BRA_razors_grip_desc: "Brazil is a nation of the righteous and a land of the capable, as Colonel Távora built an example of valiant service to his countrymen, his successor ought to follow his proper precedent in establishing stability within Brasília's volatile political landscape.\n\nAs a fellow veteran, Ney Braga has the constitution of a man who truly has in mind the nature of the common people to pursue a policy of prosperity — Golbery knows this fully well too. The PSD will not prevail, the presidency shall be secured and there will be peace for our time."
BRA_razors_grip_tt: "£BRA_psd_texticon §YJuscelino Kubitschek§!'s popularity §Yfalls§!.\n£BRA_udn_texticon §iNey Braga§!'s popularity §Yrises§!.\n"

## Success
BRA_the_crow_triumphant: "The Crow Triumphant"
BRA_the_crow_triumphant_desc: "The years of Lacerda's presidency have been quite eventful. He has dealt with a nationwide strike, vanquished Varguism, and established a new economic order for Brazil based on free-market capitalism, low inflation, and millions in foreign investment. This new economic order has allowed him to expand every Brazilian's access to education and healthcare to banish poverty forever. All this while keeping the military loyal to the Brazilian government and ensuring Brazil is the key defender of democracy in South America.\n\nThis success has made some people say Lacerda should relax and enjoy his last year in office as he has done more to change Brazil during his presidency than his three predecessors. Lacerda, however, knows there is one last issue for him to deal with to ensure that he can preserve his legacy into the Seventies. That issue is Brazilian Democracy."
BRA_lacerda_final_challenge: "The Final Challenge"
BRA_lacerda_final_challenge_desc: "While calling democracy a problem would not be loyal to the UDN's ideal, it still is Lacerda's final challenge. While Lacerda's policies may have helped Brazil, they have also created many enemies. His main enemy is the former governor of Rio Grande do Sul, Leonel Brizola. He is a far more potent threat than Lacerda's opponents back in '65, as he has the rhetoric to rally our enemies and the backing of the movement that has previously tried to destroy Brazil. While Brizola already has the support of the PTB, some in the PSD are willing to throw away their ideals to avenge Vargas' legacy.\n\nLacerda only knows two men who can defeat Brizola. Lacerda himself, but thanks to the Brazilian constitution, he could only run for President again in 1975. That leaves the other option, the new governor of Guanabara, Raphael Magalhães. So that means Lacerda should spend his last year ensuring that Magalhães is the UDN candidate and focus a campaign effort towards isolating the PSD."
BRA_lacerda_final_challenge_tt: "To ensure his legacy is cemented, §QLacerda§! must ensure §VBrizola§! is defeated in the upcoming election."
BRA_beltraos_triumph: "Beltrão's Triumph"
BRA_beltraos_triumph_desc: "Beltrão's time as finance minister has been successful thanks to him lowering inflation and being a major player in ending the strike. Soon, the last stage of his master plan for the Brazilian economy will unfold. Thanks to our modernization efforts, we are attracting millions in foreign investment to Brazil from various OFN member states. Which is money we are using to pay off debts, fund continued modernization efforts, and fund further education and health initiatives. We should also use the money for\n\nWhile some might view this use of investment for the Brazilian economy as political gain as corrupted, many of those investing money know that a Brizola victory would threaten their investments. Members of the Finance Ministry have stated that some investors are limiting the amount of money they invest in Brazil out of the potential threat of a Brizola presidency to their investment. So, using this money towards the UDN presidential campaign will lead to even more investment."
BRA_ice_cold: "Ice Cold"
BRA_ice_cold_desc: "Some of the biggest corporations in America are beating down our doors, willing to throw millions of dollars in what is fast becoming a Brazilian economic miracle. And perhaps the most quintessential of American companies, Coca-Cola, is eyeing investment into Minas Gerais. A new bottling plant, one capable of producing enough soft drinks to keep Brazil cool and refreshed, is just the thing needed to turn Brazil's already productive and prosperous agricultural sector into the food processing powerhouse in South America. Saúdinha!"
BRA_bank_of_sam: "Bank of Sam"
BRA_bank_of_sam_desc: "The US is the financial center of the Western world, keeping the world economy afloat on a sea of dollars. Brazil is no exception. Discussions with high ranking leaders of some of the big names of Wall Street; Bank of America, J.P. Morgan, Goldman Sachs, and others have already seen positive results. Deals to take on and help manage our nation's debt are being floated, with terms that will be beneficial to all parties: reducing the federal debt, one of our campaign promises, while also giving a healthy profits to those Americans that are willing to take it on. It's frankly a no brainer!"
BRA_brazil_open_to_all_lacerda: "Open to All"
BRA_brazil_open_to_all_lacerda_desc: "There are many in Brazil who want to prop up and bolster Brazilian companies, giving them a privileged place in the economy. These "developmentists," however noble their goals to make Brazil an economic powerhouse, are rather short sighted. By coddling and protecting our companies, we are incentivizing inefficiency and stifling competition that will reduce our nation's businesses ability to compete against other companies around the world.\n\nInstead, we should foster the free market, allow foreign enterprises to set up shop here, and push our companies to adapt and overcome... or falter and die. Brazil is open for business, and Lacerda is holding the door."
BRA_brazil_hotline_rio: "Hotline Rio"
BRA_brazil_hotline_rio_desc: "The reconstruction of Rio de Janeiro is almost complete. After the disaster that has befallen our nation's biggest city, we are pleased to say that it's better than ever before. New skyscrapers, repaved roads, and all the infrastructure and services that a cosmopolitan city needs. The Jewel of Guanabara is the brightest light in Latin America; Buenos Aires, Mexico City, Caracas, and Havana couldn't match their rival. Even Miami is confronting a new rival south of the Equator.\n\nA new dawn is cresting over Sugarloaf Mountain, and Rio is basking in the glow."
BRA_setting_sun: "Setting Sun"
BRA_setting_sun_desc: "Brazil's foreign policy has had one major weakness, a dark splotch on an otherwise close relationship with our democratic partners. And that is our ties with the Empire of Japan.\n\nIn a misguided effort to promote neutrality and development, Kubitschek and Lott had drawn close to Tokyo, allowing the Zaibatsu to come in and plunder our resources and our people. They are still a fascist dictatorship, out to dominate all the "lesser" nations of the world, and the previous leaders of our nation let the Japanese simply waltz in.\n\nThere will be no proclamation or announcement though: an increase of paperwork here, a few new tariffs there. Japanese goods will become less and less viable and profitable, while we work closer with our true friends and allies in the OFN. Soon, before anyone knows it, Japan's influence will be like that of the setting sun over the Andes Mountains."
BRA_a_slow_drift: "A Slow Drift"
BRA_a_slow_drift_desc: "The threat from the Japanese is a clear and present danger to Brazil. However, after decades of investment and support, our nation is, for better or for worse, closely tied to the empire across the ocean. While some within Lacerda's administration advocate for a quick and decisive strike to end Japan's influence on our nation, the costs of doing so will be great: lost jobs, lost investment, slower growth and, horror of horrors, the possibility that Brizola and Vargas Jr. could use it against the UDN in the upcoming elections.\n\nLacerda has instead decided that we must take a careful approach. Using the tools of bureaucracy and the judicial system, fostering growth from our friends, and weaning ourselves off of the Co-Prosperity Sphere's grasp. While it will be slow, and one that will take time to be accomplished, it will be done without damaging our economy. After all, in Aesop's fable, the tortoise beat the hare by going slow and steady."
BRA_trade_war: "Trade War"
BRA_trade_war_desc: "The greatest threat to Brazil's continued prosperity is the Japanese Empire. The Zaibatsu cliques that exploit and extract, the fascist drive to undermine democracy, and the imperialist arrogance will see our great nation reduced to a puppet state, a new colony for the Greater East Asia Co-Prosperity Sphere.\n\nUnfortunately, there are some useful idiots for the Japanese in our nation. Should Brizola or, heaven forbid, Vargas Jr., win the upcoming elections, then all our efforts to ensure freedom and liberty for Brazil will amount to nothing. Therefore, Lacerda has made the decision to put new trade tariffs on Japanese products, along with new regulations against Japanese businesses and ownership of our resources and factories.This will launch a trade war against Japan, one that could hamper our current growth. But, with American investment pouring in, the damage could be not only mitigated, but easily made up for.\n\nA small price to pay to ensure our national sovereignty and safeguarding our fragile democracy."
BRA_the_new_colossus: "The New Colossus"
BRA_the_new_colossus_desc: "The Lacerda Presidency has made Brazil the new shining beacon of South America. Brazil is now a tropical colossus with a rapidly booming economy due to industrialization and millions in foreign investment. Of course, it is not only the economy that is booming. Brazil is also one of the most democratic countries in South America, with our people's freedom protected and a great social program.\n\nCelebrating our economic gains, we will broadcast our success to the world. The media will proclaim that Brazil is a new shining city on a hill, and all are welcome to come to Brazil and participate in our great nation by becoming Brazilians."
BRA_confront_argentina: "Confront Argentina"
BRA_confront_argentina_desc: "The Lacerda presidency has dealt with many foreign policy issues during its years in office, but we still have one problem remaining. That issue is our long-running cold war with Argentina. This cold war with a potential major trading partner has always held Brazil back economically. However, the efforts of Lacerda and Cunha have given Brazil more allies than Argentina, and we have a way of displaying that fact.\n\nWe can show Argentina our strength by hosting a series of wargames in cooperation with our allies throughout Latin America and the OFN. These wargames will show Argentina who the true masters of the continent are. This show of force will hopefully force them to the negotiating table so that we can end this cold war once and for all."
BRA_confront_argentina_tt: "The §QPresident§! will host a series of wargames to intimidate §DArgentina§! and bring them to the negotiating table, while high risk if this gamble pays off the £GFX_BRA_udn_texticon §QUDN§! will see a §Gmajor boost§! at the elections."
BRA_bolster_the_bulwarks: "Bolster the Bulwarks"
BRA_bolster_the_bulwarks_desc: "Of course, to conduct these wargames, we might need to convince our Latin American allies to join in. To convince them, we will send them money and weapons to both grease the wheels and ensure that their militaries are ready for the wargames. We will also send diplomats to convince our more cautious allies that they should join the wargames to mutually improve our armies through further training and supplies. We also can put some diplomatic pressure on governments who are still uncertain about their participation. All of these actions will likely convince our more cautious allies to participate."
BRA_fear_is_the_mind_killer: "Fear Is the Mind Killer"
BRA_fear_is_the_mind_killer_desc: "Sources are telling us that word of our wargames has reached the Argentine government, increasing tension between our two countries. The Argentine government has stated they are mobilizing troops along the Brazilian border in case the wargames are a smokescreen for an OFN-back invasion of Argentina. However, we must keep calm. The Argentine government is just mobilizing troops to scare us into canceling the war games. We must continue to organize them to show Argentina Our nation and our allies' strength."
BRA_diplomatic_angle: "The Diplomatic Angle"
BRA_diplomatic_angle_desc: "Argentina is continuing to react negatively to our war game plans. While we want to use these wargames to end the Cold War in South America, however, the Argentine reaction is only increasing tension. We have reports that Argentina is mobilizing soldiers toward our shared border out of paranoia that this wargame is a cover for an actual invasion.\n\nOur Foreign Minister Vasco Leitão da Cunha has suggested we set up a diplomatic backchannel with Argentina to defuse tensions. A piece of advice that we should follow on through to try to placate Argentina's fears over our international wargame."
BRA_naval_manoeuvre: "Naval Maneuvers"
BRA_naval_manoeuvre_desc: "A crucial aspect of this wargame will be the naval aspect. While most of our Latin American allies have only small navies, the OFN fleet is the central presence in the southern Atlantic, and we should learn how to better coordinate with them despite a decline in German presence in the region. These naval exercises will provide Brazil's navy with the opportunity to improve. Our sailors will get work and train with the American Navy, considered one of the best in the world. Hopefully, these exercises will improve the Brazilian navy and allow us both to secure the southern Atlantic and become the best in Latin America."
BRA_joint_army_ops_lacerda: "Joint Army Operations"
BRA_joint_army_ops_lacerda_desc: "Soon, our military will join its Latin American allies in a joint exercise to test how our forces would respond to a hot war between Brazil and Argentina. The thing that this exercise will focus on is familiarization with the terrain of the Brazilian-Argentine border, river crossing, and ensuring all our allies are familiar with OFN equipment.\n\nWhile the Americans will sadly not be sending a detachment of their military to Brazil, citing concern that American soldiers in Brazil will increase tension with Argentina to the point of no return. However, they will send advisors to provide advice and further training to the various armies at this exercise."
BRA_cisplatina_70: "Cisplatina 70"
BRA_cisplatina_70_desc: "With a name that recalls the first war fought between Brazil and Argentina, Cisplatina 70 shall be the most impressive military exercise ever seen in South American history. Cisplatina is a series of massive wargames ensuring that Brazil and its allies' militaries are better coordinated and prepared for any potential threat. After months of preparation, all our troops and allies are ready to begin the exercise.\n\nWith the likely success of Cisplatina 70, we will hopefully complete the two non-military objectives of this exercise. First, we show the Brazilian people how UDN rule has made the Brazilian military stronger and the primary defender of freedom in South America, which leads to more people voting for us in October. Second, this show of force should intimidate Argentina to the point of allowing us to open a series of backchannel talks to end the Cold War in South America finally."
BRA_tavoras_masterplan: "Távora's Masterplan"
BRA_tavoras_masterplan_desc: "We can learn an important lesson from the old saying "Divide and Conquer," Virgílio Távora learned it after the UDN defeat in 1955. Távora has taken that lesson to heart for the 1970 election and is using it as the center of his strategy for Magalhães' election. Távora's strategy is already being implemented in his home state of Ceará. This strategy is creating splits within the PSD-PTB coalition by painting Brizola and his allies as radicals who will lead Brazil down the path of Communism. A strategy that, come October, will hopefully see some of the traditional PSD voters vote for the UDN instead."
BRA_tavoras_masterplan_tt: "£BRA_udn_texticon §QRaphael Magalhães's§! popularity §Grises§! by §Y3%§! in the §YNorth-West§!."
BRA_repair_liberdade: "Repair Liberdade"
BRA_repair_liberdade_desc: "While we often talk about the UDN's many successes during the Lacerda presidency, we are far from perfect. One of the blackest stains on the Brazilian government in the last couple of years was the racist riots destroying the Liberdade district of São Paulo. The damages, combined with the lack of reconstruction, have proven a problem for Magalhães polling well in the state.\n\nTo clean up this black mark on our administration, we should rebuild the city using federal funds and use the press to ensure that the people know it's our responsibility for this reconstruction effort. Both of these will then lead to an improvement in the UDN polling numbers in São Paulo."
BRA_repair_liberdade_tt: "£BRA_udn_texticon §QRaphael Magalhães's§! popularity §Grises§! by §Y1%§! in §YSão Paulo§!."
BRA_werewolf_nightmare: "Werewolf Nightmare"
BRA_werewolf_nightmare_desc: "Everybody in the UDN's leadership can agree that a potential Brizola presidency is a disaster for Brazil. However, polling tells us this sentiment is not as common among the average Brazilian as we would prefer. To ensure that your average Brazilian will agree with our sentiment, we must instill a sense of fear into them. That common fear would be that a Brizola presidency would create a radical agenda that would only lead to a communist revolution, which would destroy Brazil as it did Russia. If our campaign is successful, it should turn many members of the educated working class, middle, and ruling elites against Brizola. Hopefully, the many people who will turn against Brizola will contribute to our campaign fund and vote for the UDN come October. If the desired result of this campaign occurs, this fearmongering will ensure our victory in October."
BRA_isolate_the_psp: "Isolate the PSP"
BRA_isolate_the_psp_desc: "While the PTB-PSD coalition is the main focus of our campaign efforts, the PSP is running a candidate, and we should at least keep tabs on them. However, our analyses see them as little threat.\n\nThe PSP is little threat because its proposed policies are too Varguist to win over UDN voters and too right-wing for PSD-PTB voters. This lack of their candidates' electability, combined with our administration's effort to expose the corruption of the PSP leadership, will make it easy for our campaign to isolate and splinter their campaign. If our efforts succeed, we will ensure that Vargas Jr. will never rise as high as his father."
BRA_doomsday_clock: "Doomsday Clock"
BRA_doomsday_clock_desc: "Time is counting towards the election in October, and we must avoid any potential repeat of the upheaval surrounding the '65 election. To prevent any potential upcoming crisis in the coming months, we must ensure that the military is loyal and will not make any power plays if the election enters a deadlock. To help ensure military loyalty, we will identify any military officer with PTB sympathy and move them away from any critical locations, to avoid any potential crisis if the PTB loses. In these final months, we also need to gather our political strength to ensure that we can complete our final policies."
BRA_squeeze_the_psd: "Squeeze the PSD"
BRA_squeeze_the_psd_desc: "Brizola's policies and stances are radical even for the PTB, so radical some of the PSD view him as a communist. This view has benefited us as most PSD voters who opposed Brizola have switched to supporting the UDN. Of course, to secure Magalhães' future presidency, we need to go further. The PSD has sensible rightist leaders like Auro de Moura Andrade and Pascoal Ranieri Mazzilli. While we can't convince them to endorse Magalhães, we can persuade them not to endorse Brizola. If we can keep them silent, that is all we need to weaken the PSD part of the PSD-PTB coalition."
BRA_squeeze_the_psd_tt: "£BRA_udn_texticon §QRaphael Magalhães's§! popularity §Grises§! by §Y2%§! in the §YSouth§!."
BRA_keeping_clean: "Keeping Clean"
BRA_keeping_clean_desc: "We have the temptation to get our hands dirty during this election cycle. We could use all the usual tricks and slander Brizola all day until all our campaign efforts become just writing libelous newspaper articles. Our campaign staffers would be pressuring every major newspaper in Brazil to write an article a day about a new affair, bribery charge, and illegal turtle that a PTB politician was involved with.\n\nHowever, this strategy could backfire on us. Brizola's base is loyal, and by attacking him and his allies, we would only be inflaming Brizola's supporters. They already see the Brazilian establishment as an enemy, so this libel campaign would only confirm those suspicions. These inflamed supporters would likely start riots and strikes if we used dirty tactics against Brizola. So, in the name of Brazil's stability, we must hold back our attack."
BRA_getting_dirty: "Getting Dirty"
BRA_getting_dirty_desc: "Brizola is doing better in the polls than expected, the UDN cannot lose yet another election.\n\nOur loss to Kubitschek in 1955 doomed Brazil to another decade of stagnancy and high inflation. Our loss to Lott, despite him being a charisma vacuum, in 1960 allowed the rot to continue. 1965 appears to be an outlier where the people realized, for a brief time, the folly of Varguism. 1970 seems to tragically be a return to form for the Brazilian people.\n\nWe must avoid a loss in October, as it would vanquish all of the effort to lead Brazil down a proper path freed from Vargaism. We must use every dirty trick in the book to ensure that Brizola's campaign crashes and burns."
BRA_getting_dirty_tt: "£BRA_udn_texticon §QRaphael Magalhães's§! popularity §Grises§! by §Y2%§! in §YRio de Janiero§!.\n£BRA_ptb_texticon §VLeonel Brizola's§! popularity §Gfalls§! by §Y3%§! in the §YSouth§!."
BRA_globo_domination: "Globo Domination"
BRA_globo_domination_desc: "Since its foundation in 1965, TV Globo has become a dominant force in the Brazilian media. As Brazil's most-watched television network, it holds a near-monopoly over the educated middle class and those in the working class who can afford a television.\n\nLuckily for us, TV Globo's ownership is aligned with our party's agenda, with Roberto Marinho being a prolific donor to our campaign. We can use this connection to set up secret backroom talks to ensure that the UDN receives positive coverage from Jornal Nacional and other Globo news programming. We will also allow TV Globo exclusive rights to the first ever televised debate between Magalhães and Brizola as long as they ensure that coverage and questions are biased in Magalhães' favor."
BRA_live_on_air: "Live on Air"
BRA_live_on_air_desc: "Soon, Brazil will have its first-ever televised debate being held and aired by TV Globo. Globo has invited the three leading presidential candidates, Magalhães, Brizola, and Vargas Jr. Given the impact that televised debates have had on the US presidential election, this debate will be a deciding factor in this year's election. In short, the 1970 Brazilian election will be the first election in Brazilian history to be decided by television.\n\nWe hope that the debate will make Magalhães appear as the sane and rational candidate compared to the radicalism of Brizola and the populism of Vargas Jr. If Magalhães keeps up his appearance and answers all the questions satisfactorily, this debate will determine the election in our favor."
BRA_lacerda_judgement_day: "Judgement Day"
BRA_lacerda_judgement_day_desc: "The final moment of choosing dawns upon us: election day. Millions of people will go to the polls to decide whether or not our government made true to our promises of freedom and liberty, whether we handled the economy aptly, and whether we made Brazil a better place by the end of our time in power.\n\nConsidering the short time we have left, we can't do anything material to convince the people. Our capabilities to affect the people's support lie not with our government anymore but with the loudspeakers and voices of our election team. President Lacerda will make his final pleas to appeal to voting for liberty, democracy, and prosperity. The rest of our ministers will do the same.\n\nAfterwards, all that remains is for us to wait until the results flood in..."
BRA_lacerda_judgement_day_tt: "£BRA_udn_texticon §QRaphael Magalhães's§! popularity §Grises§! by §Y2%§! in the §YNorth-West§!."

