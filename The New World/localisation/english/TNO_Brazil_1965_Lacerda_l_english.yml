BRA_lacerda_udn_party_state_balanced: "$MODIFIER_POLITICAL_POWER_GAIN$: §G+[?BRA_udn_pp_gain]§!\n£BRA_udn_texticon §QUDN§! monthly party loyalty will §Gslightly increase.§!"
BRA_lacerda_udn_party_state_realistas: "$MODIFIER_POLITICAL_POWER_GAIN$: §G+[?BRA_udn_pp_gain]§!\n£BRA_udn_texticon §QUDN§! monthly party loyalty will §Rslightly decrease.§!\n\n§F"You know what I think? I think I'm the only sensible adult in the room most days. Look, I know we need to open up the state, get the market in, but if we go too far the Varguists will tear our throats out. We just need to slow down, you know?"§!"
BRA_lacerda_udn_party_state_banda: "$MODIFIER_POLITICAL_POWER_GAIN$: §G+[?BRA_udn_pp_gain|2]§!\n£BRA_udn_texticon §QUDN§! monthly party loyalty will §Gslightly increase.§!\n\n§F"You know what I think? I think we shouldn't be afraid to play a similar tune to America. If we want to put Varguist tyranny in the ground, we need a model of freedom to follow. Free markets, free people, free world, you know?"§!"
BRA_lacerda_udn_party_state_bossa: "$MODIFIER_POLITICAL_POWER_GAIN$: §G+[?BRA_udn_pp_gain]§!\n£BRA_udn_texticon §QUDN§! monthly party loyalty will §Rdecrease.§!\nMonthly project development progress: [?BRA_lacerda_samba_project_boost|=%+]\n\n§F"You know what I think? I think we can't just leave it all to the market. If we want to build Brazil, we have to roll up our sleeves and lay the brickwork ourselves. I'm not talking Varguist nonsense, but... we can't subcontract our future, you know?"§!"
BRA_lacerda_udn_party_state_liberais: "$MODIFIER_POLITICAL_POWER_GAIN$: §G+[?BRA_udn_pp_gain]§!\n£BRA_udn_texticon §QUDN§! monthly party loyalty will §Gslightly increase.§!\nMonthly project development progress: [?BRA_lacerda_samba_project_boost|=%+]\n\n§F"You know what I think? I think Gomes had some good ideas. But the Varguists slit his presidency's throat, all those years ago. If only... well, if they're going to build walls between us and our goals, let's be wrecking balls, you know?"§!"

