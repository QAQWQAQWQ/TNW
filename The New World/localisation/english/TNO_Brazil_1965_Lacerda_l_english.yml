BRA_lacerdas_dream: "Lacerda's Dream"
BRA_lacerdas_dream_desc: "The last remnants of the economic fascism Vargas imposed on the Brazilian people are now firmly consigned to the wastebin of history. Liberated from corporatist shackles, Brazil's economy roars like an uncaged lion as free capital and foreign businesses rule the agenda, with the days of Kubitschek era inflation increasingly becoming a distant memory.\n\nThe PSD and PTB outwardly slam this move to free-market fundamentalism as a betrayal of Varguism. Privately, more and more members of both parties are swaying to the tune of this new economy as they see its benefits, reshaping their definition of Varguism to fit it."
BRA_black_cat_white_cat: "Black Cat, White Cat"
BRA_black_cat_white_cat_desc: "When Lacerda first became President, most assumed that the days of developmentalism were dead and buried, but this fear has not come to be. Pragmatism has won out as free-market fundamentalism has not overtaken the old Varguist orthodoxy, much to the relief of the international economic community. Some wonder if Lacerda is quietly fuming over this, that Brazil will continue to follow the economic structure set out by his hated rival.\n\nOthers believe that he has stopped caring — that ultimately, it doesn't matter if it's a black or white cat, but as long as it catches mice, it will do Brazil. And if developmentalism continues to aid capital, it will have done its job."
BRA_permanent_polarization: "Permanent Polarization"
BRA_permanent_polarization_desc: "The reputation left behind by the President will be that of a divider, a man who separated Brazilian society into Lacerdaists and Varguists. Each day in Brazil's parliament, the government and opposition fling insults of "fascist" back and forth as if it were going out of fashion. Any hopes of bipartisan cooperation, bar the odd defector, are dead in the water.\n\nThe Senate no longer feels like a place of democracy but a warzone. While the newshounds may lap up this consistent controversy, other pundits quietly worry about the state of Brazilian democracy now. Even foreign ambassadors hope this atrocious behavior won't rub off on other nations in the OFN."
BRA_permanent_polarization_tt: "§RThe $BRA_party_psd_c$ and $BRA_party_ptb_c$ will not cooperate with us in the Senado...§!"
BRA_tripartite_system: "Tripartite System"
BRA_tripartite_system_desc: "There was once a crusade against Varguism by Lacerda's government — to eradicate it from Brazil's national consciousness — but those times are dead.\n\nWith Távora's guidance, Lacerda has shed his fundamentalist beliefs for a more conciliatory approach. UDN senators regularly shake hands with their PSD counterparts, and even the PTB grows more welcome to cooperation each day. As the darlings of the right drift center, it seems likely that Vargas' legacy will remain as the undisputed bedrock of the United States of Brazil."
BRA_tripartite_system_tt: "§G75% of $BRA_party_psd_c$ senators will be guaranteed to support us.§!\n$BRA_party_udn_c$ §RLoyalty will be capped at 80%.§!"

## Strikes Mechanic
TNO_BRA_Riots_Info_tt: "§FLacerda stands on the precipice of history. With the repealing of the Varguist Consolidation of Labor Laws workers have taken to the streets to show their hatred of the President.\n\nMost of the pro-Varguist workers find themselves in the £BRA_CGT_texticon  §YComando Geral dos Trabalhadores§! £BRA_CGT_texticon - the main coalition of labor unions in Brazil. Their strength and radicalism keep rising, and controlling them is not an easy task at all. The government, however, has a small sect of supporters within the labor movement - the £BRA_MSD_texticon  §mMovimento Sindical Democratico§! £BRA_MSD_texticon. They rally behind the UDN at every moment and it is vital that they control the conversation.\n\nAs time passes and the £BRA_CGT_texticon §YCGT§! £GNG_riot_radicalism_texticon §xrioter radicalise§!, there will be severe damage to the economy of the nation. If this crisis doesn't end soon enough, the chaotic economic environment will make the UDN concerned for the safety of the nation, which can cause serious consequences to our government.\n\nWe can interact with each faction and use our connections to tilt the scales in our favor. When the MSD is able to achieve 75% control, the strikes will cease - but if the UDN is fully concerned with the status of the crisis, then it will be the end of Lacerda's reign.§!"

