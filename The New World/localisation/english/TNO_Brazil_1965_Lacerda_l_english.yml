BRA_lacerda_udn_button_realistas_tt: "Realistas"
BRA_lacerda_udn_button_realistas_tt_delayed: "Leader: §YVirgílio Távora§!\n\n\n\n\n\n\n\n£GFX_Tavora_texticon\n\n\n\n\n\n\n\n\nIt was 1950 when Eduardo Gomes won the presidency, and a future beyond Vargas, beyond authoritarian developmentalism, seemed possible. Then, in 1955, after the disaster that was the Gomes regime, Kubitschek defeated Juarez Távora, the "Viceroy of the Northeast," and the anti-Varguists' five years in the sun were over.\n\nSidelined after Juracy Magalhães' failed campaign in 1960, the Realistas tell themselves they're the only ones in the UDN who remember they're in a democracy. Although many still lean economically liberal, they fear that if they go too far, Varguism will simply rear its ugly head once more.\n\nThey know what the others say: that they're sticks in the mud, that they're pessimists and cowards. But they also know that respectability works, because Virgílio Távora, Juarez's nephew, had won the vice presidency. Now, while Juracy assures America that they will keep Brazil stable and sane, Virgílio watches Lacerda's every move, making sure his megalomania doesn't throw away the trust of the people and the future of the UDN."
BRA_lacerda_udn_button_banda_de_musica_tt: "Banda de Música"
BRA_lacerda_udn_button_banda_de_musica_tt_delayed: "[GetBandadeMusicaLeader]"
BRA_banda_de_musica_lacerda_leader: "Leader: §YCarlos Lacerda§!\n\n\n\n\n\n\n\n£GFX_Lacerda_texticon\n\n\n\n\n\n\n\n\nAfter his brush with death at the hands of Gregório Fortunato and the subsequent fall of the Estado Novo, Carlos Lacerda's meteoric rise to superstardom left a lasting mark on Brazilian history. It's no shock he's since assembled a band of economic liberals, die-hard anti-Varguists, and ardent firebrands who all pay lip service to the man who overthrew Vargas himself.\n\nWhile initially supporting Jânio Quadros' vice presidential bid, his anti-American rhetoric alienated foreign policy hawks, many of whom would flock towards Lacerda's unabashed devotion to the OFN. Half a decade later, an election came and went, and now the Banda de Música is the headlining act.\n\nWith Raphael Magalhães as Chief of Staff, Sandra Cavalcanti as Governor of Guanabara, and Aliomar Baleeiro in the Senate, the faction acts like they own the place, speaking of a new radical vision of democracy awaiting Brazil. They've been cheering for Lacerda for years. Try not to disappoint them."
BRA_banda_de_musica_maghallas_leader: "Leader: §YRaphael Magalhães§!\n\n\n\n\n\n\n\n£GFX_Maghallas_texticon\n\n\n\n\n\n\n\n\nLacerda is gone, and the Banda de Música is in shambles. Once heralds of a liberal future for Brazil, their hopes were dashed by Távora's coup. The Realistas, cautious and pragmatic, took control, making the party a new, more restrained copy of itself. Meanwhile, Lacerda seems adrift, moving from safe house to embassy, clinging to the remnants of his relevance as his former allies charted a path forward without him.\n\nYes, they lost the battle, but not the war. Raphael Magalhães has taken charge of the faction, determined to keep the flame of economic liberalism alive through the storm. Sandra Cavalcanti, with her sharp tongue and uncompromising stance, Herbert Levy, the pragmatic economist, and Hélio Beltrão, the silent architect of reforms - are on his side. Together, they hold tight to the vision of a Brazil anchored firmly in the OFN, regardless of any concessions that the Realistas may make.\n\nThe Banda de Música may have been pushed into the background, but they refuse to fade away completely. The Braga Presidency will be a difficult pill to swallow, but the 1975 elections loom on the horizon. Their melody plays on, faint but resolute, waiting for the right moment to swell into a triumphant crescendo once more."
BRA_lacerda_udn_button_bossa_nova_tt: "Bossa Nova"
BRA_lacerda_udn_button_bossa_nova_tt_delayed: "Leader: §YMagalhães Pinto§!\n\n\n\n\n\n\n\n£GFX_Pinto_texticon\n\n\n\n\n\n\n\n\nNot even the business-minded urban technocrats of the UDN can resist the spirit of populist reform. Emboldened by the unorthodox but successful campaign of Jânio Quadros for the vice presidency, the Bossa Nova, a faction of reformist politicians, grew to become the main opposition bloc within the party. Although guided by a gospel of developmentalism and statism, their strongly conservative social policies and fervent support from the Church set them apart from the PTB and the PSD.\n\nIn 1965, Magalhães Pinto, the governor of Minas Gerais and leader of the faction, ran for President but lost to the firebrand Carlos Lacerda. But perhaps as compensation, he found himself President of the UDN, helping to steady the ship as Lacerda explores uncharted waters. Now he is working with federal deputy José Sarney to maintain the UDN's commitment to the people and to keep the party in God's good graces.\n\nAnd rumor has it, Pinto isn't done with the presidency just yet..."
BRA_lacerda_udn_button_liberais_tt: "Liberais Históricos"
BRA_lacerda_udn_button_liberais_tt_delayed: "Leader: §YMilton Campos§!\n\n\n\n\n\n\n\n£GFX_Campos_texticon\n\n\n\n\n\n\n\n\nFew remember Eduardo Gomes' term fondly. Conservative pundits wrote polemics about his failure to join the OFN, as workers rioted in the streets over his abolition of the minimum wage. More than a decade later, even as he remains the eternal Minister of Aeronautics, most Brazilians have long since treated him as a bad memory. But not everyone.\n\nJokingly called the "Grupo de Bacharéis" by their opponents, the Liberais Históricos, as they like to style themselves, represent the oldest strands of conservatism in the party. While not as laissez-faire as their younger colleagues, they are the party's most ardent anti-Varguists, with decades of experience fighting the Estado Novo.\n\nBy far the weakest faction, they follow the guidance of Milton Campos, a federal deputy who retains some influence as a party founder. Dedicated to restoring the legacy of the Brigadier President, his faction will tempt Lacerda into harsher legalist measures. They no longer have a real shot at power, but perhaps it's worth learning a thing or two from them about how to run a state."
