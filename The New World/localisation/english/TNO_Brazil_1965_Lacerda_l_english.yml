BRA_lacerda_paulista_riots_desc: "The fair city of São Paulo burns within a conflagration of racial tension, and the whole country has begun to feel the effects.\n\nWhat began as an attempted lynching has steadily deteriorated into an orgy of violence directed at the Japanese immigrants of the Liberdade district. Shootings, hangings, and vehicular homicides continue to terrorize the Nikkei, forcing them to seek refuge far away from their homes. The Força Pública has been abnormally slow to respond to the riots, and it remains to be seen how the President will handle this crisis..."
