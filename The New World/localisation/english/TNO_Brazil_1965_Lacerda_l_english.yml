brazil_lacerda_samba.37.t: "Evacuation Plan"
brazil_lacerda_samba.37.desc: ""Mr. Pinto?" His secretary stuck her head in, a worried smile on her face. "I have Mr. Natel for you." Pinto responded with a confused furrow of his brow. He looked down at his phone, watched the blinking light, and picked up the receiver.\n\n"Pinto, my friend!" It was indeed Laudo Natel, with an exuberance too vibrant to be legitimate. "How's the family doing?"\n\n"Just fine, Laudo. Maria's fine?"\n\n"Doing well, thank you. We're back from Iberia, actually. Helped put Adhemar's last few affairs in order over there."\n\n"Mmhmm." Something crawled across Pinto's brain, setting his teeth on edge. A suspicion migrating from the subconscious. "How are you taking it all?"\n\n"Hmm." Pinto saw the fake smile fall from Laudo's face in his mind's eye. "I'll be straight with you, Magalhães: it's bad. Nobody knows what the hell they want out of this party anymore. With the old bull gone, there's a lot of dissent among our deputies. They think Junior's going to lead them straight off a cliff in the next election." The thought forded the river; Pinto straightened his back. "As for me? Well, I'm keeping myself busy with work. Why, I'm at my desk, looking at a list of many things. Internal polling, phone numbers of local notables, membership rolls..."\n\nThe thought knocked on the gates, and Pinto opened them. "Your party machines."\n\nThere was a brief pause. "I want something out of this, Pinto. Something upfront. And I don't want people knowing. I'll call you later." The line went dead. Pinto put the phone back into his receiver, breathed in, breathed out. Then he dashed over his desk and back to his secretary."
brazil_lacerda_samba.37.a: ""Call everyone. Tell them we've got the PSP.""

brazil_lacerda_samba.38.t: "Pinto's Counteroffer"
brazil_lacerda_samba.38.desc: "The faction leaders of the UDN all gathered in a meeting room at the National Congress, black leather chairs around a walnut conference table. Care was taken to separate them from any scrutiny. They were discussing something not meant for anyone else: a deal, brought forth by a dissident from the PSP. But Magalhães Pinto had a different idea in mind. He was in contact with someone else. Someone who could grant them a much better deal, for a fairer pri-\n\n"No, no, no. Absolutely not." The words fired from Lacerda's mouth like grapeshot. "I am not cutting a deal with a Vargas."\n\n"Junior's not his old man. He's a respectable party leader who knows the way we do things." Pinto's hands were folded together, resting on the table. "And he's offering better terms than Adhemar's janitor."\n\n"President Lacerda," said Távora, "the senate is all but ours if we take this deal. We could win 1970, just like that. And they're not asking for any changes to policy, no cushy cabinet post for Junior."\n\n"No, they're just asking for a bribe. That's much worse." Lacerda pushed his glasses up, rubbed the bridge of his nose. "Jesus. What makes you think this is acceptable?"\n\nLacerda's head snapped towards Campos. "It's a questionable deal. Many things could go wrong. Our base... might not understand it." But beneath his concerns, Lacerda could see the justifications building in Campos' mind. Lacerda finally turned to Raphael Magalhães, pleading silently for some kind of agreement. But all he received was a sheepish shrug.\n\nHe sneered at all of them. "Whatever plan you have, I want no part in it. You shouldn't be doing this at all." Lacerda's body snapped up from the chair, and he walked out without a word."
brazil_lacerda_samba.38.a: "But he did not say no, much to his shame."
brazil_lacerda_samba.38.tt: "At least §Y50%§! of the $BRA_party_psp_c$ will §Galways§! vote with us."

brazil_lacerda_samba.39.t: "Távora's Assent"
brazil_lacerda_samba.39.desc: "The faction leaders of the UDN all gathered in a meeting room at the National Congress, black leather chairs around a walnut conference table. Care was taken to separate them from any scrutiny. They were discussing something not meant for anyone else: a deal, brought forth by a dissident from the PSP. It was Magalhães Pinto who took it to this committee, and here it found an eager advocate.\n\n"We should do it," said Távora. "Laudo's a good man with some unfortunate company. I say we give him what he needs to break free of Vargas Jr.'s lot."\n\nBut Lacerda scoffed. "If he wanted to, he could always put in an application with the UDN. Instead, he wants to be bought, and we're all agreeing to this?"\n\nPinto wanted to say "that's politics", but he'd known Lacerda long enough to know that was the wrong answer. Instead, he folded his hands, placed them on the table. "We have a real opportunity here, Mr. President. In three nights, we could slit the throat of the last holdouts of Varguism."\n\nLacerda looked around the room. Campos seemed to be the only one who objected to this, and even he kept silent, though he was grinding his teeth into dust out of frustration. Everyone else seemed to agree. Even Raphael Magalhães gave it his silent approval, no matter how queasy he looked about it.\n\n"Fine," he muttered. "Fine, fine. Call him, make the arrangements. Don't involve me beyond this."\n\nWith that, the room quietly packed itself away. Campos strode out without a word. Pinto nodded. Távora smiled and said thank you. Only Lacerda and his faithful Magalhães stayed behind. When it was just them, Lacerda took off his glasses, wiped them clean, and looked back at Magalhães with an uneasy stare."
brazil_lacerda_samba.39.a: ""This isn't what I got into politics for.""
brazil_lacerda_samba.39.tt: "At least §Y15%§! of the $BRA_party_psp_c$ will §Galways§! vote with us."

brazil_lacerda_samba.40.t: "Magalhães' Plot"
brazil_lacerda_samba.40.desc: "The faction leaders of the UDN all gathered in a meeting room at the National Congress, black leather chairs around a walnut conference table. Care was taken to separate them from any scrutiny. They were discussing something not meant for anyone else: a deal, brought forth by a dissident from the PSP. And yet, it found scepticism on this table.\n\n"So, what you're saying is that the PSP's leaking quicker than the Titanic?"\n\n"It's a little more complicated, Mr. Magalhães, but yes."\n\n"Good." He turned to Lacerda. "Forget Laudo. He's a rat trying to flee the sinking ship. He's trying to get us to compromise our fundamental principles so he can buy his own lifeboat."\n\n"Agreed," said Lacerda, whose suspicious eyes never left a shrinking Pinto. "I'm not dealing with Vargas Junior. I'm certainly not resorting to corruption. Still," he turned a softer gaze to Magalhães, "do we have something in mind?"\n\n"Well," said Magalhães, suddenly making Lacerda slightly more uncomfortable, "there are good men in the PSP. Men who see things our way. Café Filho, for one. If the PSP really is dying, shouldn't we have lifeboats ready for those who're worth saving from that ship?"\n\n"Filho? Vargas' Vice President?" Magalhães tried to keep his voice down.\n\n"He's more reasonable than Junior, I'll say that much." Lacerda said nothing else, but he nodded towards Magalhães. With that, the meeting was over; everyone packed up their documents and their dreams, leaving Lacerda behind to think."
brazil_lacerda_samba.40.a: "Uncertain, still, whether he had merely tricked himself."
brazil_lacerda_samba.40.tt: "At least §Y25%§! of the $BRA_party_psp_c$ will §Galways§! vote with us."

brazil_lacerda_samba.41.t: "Campos' Demand"
brazil_lacerda_samba.41.desc: "The faction leaders of the UDN all gathered in a meeting room at the National Congress, black leather chairs around a walnut conference table. Care was taken to separate them from any scrutiny. They were discussing something not meant for anyone else: a deal, brought forth by a dissident from the PSP. Money for favours. A corrupt bargain, to be sure, but perhaps a lucrative one.\n\n"Publish it." These two words sucked the air out of the room. All eyes turned to Milton Campos, who merely stared back at everyone.\n\n"Publish it? I was told this in confidence!" Pinto realised he was suddenly standing up, but felt no need to sit down.\n\n"You'll say nothing." He looked to Lacerda, who was already leaning over the table, hands clasped and eyes fixed on Campos. "Go to the press. Tell them you've heard it from reliable sources. The corrupt PSP is dying. They tried to bribe you. For their support, they said. But you said no." He tapped once on the table. "We'll all look better for it."\n\n"Laudo will go right back to Junior!"\n\n"Good," said Lacerda. "Let them. Why would I care? It's not like the PSP has enough seats to be a genuine threat to us. And, may I remind you gentlemen, we were elected to uphold some kind of virtue in this government." He nodded towards Campos, and said nothing further. But a few days later, as the first papers arrived, Lacerda found himself regretting the decision. His condemnations were buried amongst recriminations from the PSP, who were far more united than Pinto suggested. Some of the papers even had Vargas Jr.'s face on them, taking up far more space than Lacerda's weakened mug. He told himself that it was the right thing to do, but he could not stop the doubt from spreading in his mind."
brazil_lacerda_samba.41.a: "Stubborn crow; flying against the winds just slows you down."
brazil_lacerda_samba.41.tt: "The $BRA_party_psp_c$ will §Rnever§! vote with us again!"

brazil_lacerda_samba.42.t: "Hydroelectric Renewal Bill of [GetYear]"
brazil_lacerda_samba.42.desc: "The proposal was, to the casual observer, uncharacteristic of the UDN. It called for the expansion of hydroelectric power across Brazil, with direct state involvement from conception to construction. It denounced the corruption common in the construction of critical infrastructure, which could only be solved by government intervention. It was precisely this kind of "sensible expansion of state-managed economic activity" advanced by Virgílio Távora, who stood before the Chamber with a solemn tone and an hour of their time.\n\nTávora's eyes wandered over the assembly, glancing from left to right to build a panorama of political support. His voice was clear, but the words were rehearsed; it was an automated function, while the real effort went into assessing the support for what he was speaking about. He could see masks of stony indifference on the faces of the PTB men; through cracks in the corners of their mouths or overly wide eyes they hid their pleasant surprise. The PSP deputies, who had no obligation to be openly opposed, were free to nod in agreement.\n\nThe PSD, on the other hand, seemed less open. Their eyes were narrowed in quizzical glances, and their body language was closed; arms folded, hands clasped, backs stiff or slumped, but never leaning forward. At least one of them sneered, though it failed to cut Távora off in mid-sentence. But it was heard, and heard loud enough to convince Távora not to bother negotiating with them.\n\nAnd then there were the UDN representatives in the chamber, a rich tapestry of conflicting emotions all their own. Távora recognized their faces, had them mentally categorized. The Realistas were his, the Bossa Novas nodded along while dreaming up compromises, and the Banda's roadies saw fat and gristle in half his bill. It was the arch-conservative Históricos who worried him the most. He could see fear and anger in their eyes, hungry predators who read only one thing in his proposal: kill or be killed."
brazil_lacerda_samba.42.a: "The UDN always prided itself on freedom of and diversity in political thought."

brazil_lacerda_samba.43.t: "Mas Que Nada"
brazil_lacerda_samba.43.desc: "Távora and Lacerda sat on opposite sides of a conference table, a dozen deputies and aides surrounding them and two metres of mahogany separating them. Given how both felt like they could leap out and strangle each other, these obstacles helped dampen these emotions. But neither of them were truly responsible for what brought them together, as their sides kept reminding them. It was an unfortunate reality of the political situation, a reminder of the real power in the UDN.\n\n"One of Pinto's aides dropped this off yesterday," said Távora, holding up a thick folder. He handed it to an aide, and the chain of helpful hands brought it to Lacerda, who skimmed through the first few pages. The bill had once only expanded hydroelectric dams in critical regions, where power was most required to maintain national grid stability. Pinto and the PTB had since revised it; the focus had shifted towards quality of life, and now new dams were required all over the country.\n\n"Christ," Lacerda muttered. "I knew this was a bad idea. But I didn't expect Pinto of all people to be working with the PTB." He closed the folder, glared at Távora. "Well? This is your bill. How are you going to salvage it?"\n\nTávora bit his tongue. His advisors looked at him with concern, but he waved them away. "There's a way around this. We can propose my bill straight away, tomorrow even, and get it to the Senate for a vote before Pinto has the chance to present his own. We'll need support for this. Andrade, Müller; there's PSD deputies willing to help, for terms more favourable than Brizola's lot."\n\nLacerda rubbed his temples, eyes on the front of the folder. He was losing control; Pinto had stolen the chequebook, and he was racking up expenses Lacerda might have to pay. No matter what he said when he brought his head up to the surface, Távora could hear the fatigue in his voice.""
brazil_lacerda_samba.43.a: "Call the PSD. Don't offer them anything we'll both regret."
brazil_lacerda_samba.43.b: "Stay there, Távora. Let's talk about your bill first."
brazil_lacerda_samba.43.c: "I think you've done enough, Távora. I'll be looking after this from here."

brazil_lacerda_samba.44.t: "Supporting Sensible Schemes"
brazil_lacerda_samba.44.desc: "Lacerda was four hours early in his office, waist-deep in overdue correspondence when he heard the knock on his door. In the earliest hours of the morning, when the sun had not yet peeked out from the covers, he had hoped to get some work done, but the knock on the door still found him.\n\n"Enter," he said, tossing his pen on the desk. Into his lamp-lit office stepped Virgílio Távora, alert and satisfied. Lacerda knew what this visit, that folder in his hand, was about.\n\n"President Lacerda," he said, "what are you doing at this ungodly hour?"\n\n"Honouring Him with labour, I hope." He waved a sluggish hand towards the seat. Távora took it, and set the folder down atop his letters. The stamped message on the front cover, in bright red letters, read APROVADO. Lacerda took the folder and opened it up. The executive summary had changed little since he last saw it.\n\n"It's going to the Senate, Mr. President. Thanks to our deputies, it's going through." He smiled at Lacerda, who responded only with a narrowing of his eyes. "It's the right call to make, Mr. President. This is an important piece of legislation, one that'll make a real difference in people's lives. People like our constituents."\n\nLacerda looked up at him. He wanted to gloat about it. He must have slept overnight in his office waiting for the chance to present it the moment Lacerda was inside. "Well," he said, placing the folder back on the table, "well done. Do you have support for it in the Senate?"\n\n"Ah, Mr. President, that's what I wanted to talk to you about. You see, I think this bill can do great things with the proper support, and..." He trailed off, wanting Lacerda to respond first."
brazil_lacerda_samba.44.a: ""Fine, have our support. But you owe me.""
brazil_lacerda_samba.44.b: "He slid the folder back towards him like a snake's tongue. "I just have some notes, Távora.""

brazil_lacerda_samba.45.t: "Mixing and Mastering"
brazil_lacerda_samba.45.desc: "Távora's bill was reaching a pivotal moment in its life-cycle. The pupal bill was squirming into the Senate, each aye in the Chamber peeling the cocoon away. There was an air of general assent within the party, with a majority of its Deputies agreeing with the bill, its aims and its methods. But he himself had been slowly removed from the process, and a week after he presented it he had been frozen out of the process entirely. He had seen that himself when he stepped into a conference room, filled with policy aides and deputies discussing the contents of the bill. They noticed him, and some waved to him. Távora picked up a copy on the table, left behind by a deputy who had gone to the bathroom and left his copy for all to read.\n\nIt had once been his bill, but the Banda de Música had dissected it with a hundred revisions. Handwritten amendments were like vulgar slashes of a knife; red and black markers were blood and bruises. They had pared back so much of his proposal Távora could not recognise it. He put the bill back on the table and left with more haste than seemed appropriate for the Chamber. Távora wandered aimlessly and fast-paced for a minute, seeking something he could not yet understand. When his eyes fell upon the cloakroom, and when he saw the desk was empty, then he knew it. He dove into the dim light of the cloakroom, and between the long cotton and leather coats, he breathed in, breathed out. Slow, steady breaths to calm his heart.\n\nHe knew it could pass in that condition. With the Banda behind it, half the other factions (including his own) would fall right in line. So would half the other parties. It was a sensible, practical bill made even more sensible and practical by Lacerda's paring knife. But Távora could not shake the feeling that he wanted more out of it. It was a chance to do something good for the little corner of Brazil that he called home.\n\nBesides, it was his bill."
brazil_lacerda_samba.45.a: "But he let it go, hoping that his assent could buy him a favour."
brazil_lacerda_samba.45.b: "So he left the cloakroom and went straight to Lacerda's office."

brazil_lacerda_samba.46.t: "Binding the Bill"
brazil_lacerda_samba.46.desc: "Today marked the final voting on Távora's hydroelectric expansion bill in the Chamber of Deputies, and nobody quite knew how it was going to turn out. The UDN was its usual maelstrom, even splits among its own deputies in favour of or opposition to the bill. The PTB let a few of its deputies vote yes, and regretted not putting more support into this. The PSD was split as much as the UDN. The PSP, having remained unconsulted on the matter, generally voiced their displeasure by either voting no on the measure or making a show of voting yes to catch the UDN's eye.\n\nSitting at the back of the chamber, Milton Campos oversaw the fiasco. The other factions, weak and divided, had spent long days and longer nights compromising with the bill in order to pass something. The Históricos, by comparison, had slowly gathered its own forces, pulling away at the doubts and fears of lesser-committed deputies. As the voting drew to a close, they were the last ones to cast theirs.\n\nCampos rose, and raised a hand. With practised precision, deputies under his thrall rose from their seats as well. Their collective, unified response was a resounding no. When the speaker announced that the bill had failed, Campos could not stop himself from smiling.\n\n"That fucking mummy!" was the first words out of Távora's ear when he heard what happened. He was not so petulant as to throw something around his office, but the unlucky aide who delivered the news would swear that he saw him reach for a cup full of pencils. Távora asked to be left alone, and the aide rushed out to fulfil his request. Távora sumped back into his chair, grinding his teeth. The bill was not dead. It had merely run into a roadblock. Campos only succeeded because he capitalised on the UDN's divisions. He just needed to launch into it a second time, with his own support, and Campos' lot wouldn't be able to do anything. But who? His thoughts turned and turned the conundrum in his head, assessing it like a puzzle box."
brazil_lacerda_samba.46.a: "The PTB still have regrets? Good. Távora called them to make an offer."
brazil_lacerda_samba.46.b: "He swallowed his pride and called Lacerda's office, hoping to work with him."
brazil_lacerda_samba.46.c: "He called Lacerda's office with an ultimatum: this bill gets walked through, or I walk out."

brazil_lacerda_samba.47.t: "Petitioners in Duke Távora's Court"
brazil_lacerda_samba.47.desc: "Távora could not suppress a large smile when he heard the news. The Senate had given its assent to the Hydroelectric Renewal Bill. Already, there were bureaucrats laying the foundations of a new department and planning board, ready to oversee construction and renovation of the nation's lacklustre network of dams. The parties and the drinks would come later; it was still early in the afternoon, and Távora had work to do.\n\nIt was twelve past one in the afternoon when the first calls came through. There were congratulations over the bill and praise for its author. Távora pretended to recognise some of the voices; others he knew right away. They were a procession of Northeastern notables paying tribute to him, all quietly seeking a slice of this new pie. Some were so brazen as to ask outright. Others, more graceful and tactful, merely inquired and offered their assistance if there was anything they could do for Távora's new department.\n\n"Well, of course I cannot promise anything," he would alway say, "but I appreciate your interest. How about we grab dinner sometime, discuss the details then, hm?" And then his poor secretary would have to find time in an already-busy schedule to accommodate. By the end of the day, he had no free evenings left.\n\nBut these were not the only calls he received. Though his secretary had dutifully attempted to filter out the incoming petitioners, a few commoners slipped past the cordon. For every five or six calls, Távora received one from concerned or content citizens. Some raised concerns about what the construction would do to the nearby houses, their houses. Others were grateful that the expansion meant more access to electricity, especially among the rural citizenry. At these calls, Távora was far less confident. He appreciated those who appreciated him and rushed through excuses for those who did not. At the end of the day, Távora stuck his head out of his office."
brazil_lacerda_samba.47.a: ""Get them to change my number, would you, dear?""

brazil_lacerda_samba.48.t: "Is It My Party?"
brazil_lacerda_samba.48.desc: "This party was meant to be for Távora—they did not put up a big banner emblazoned with "CONGRATULATIONS Távora" for nothing—but he seemed awkward and out of place. With a half-empty sparkling wine flute in hand, he felt ignored, deputies and party VIPs only breaking from their little groups to congratulate him with a few words. Oh yes, the Hydroelectric Renewal Bill had been signed, and bureaucrats would soon be hard at work raising the new department and planning board from the ground-up. But the board would not convene to discuss new dams if the old ones were still functioning. The department would focus instead on maintenance of what already existed. The bill was something Távora only dimly recognised, like a song heard long ago.\n\nThe real centre of gravity at the UDN offices that night was not with its author, but its editor. Carlos Lacerda sat on the edge of a desk, a quarter-full flute in his hand, talking with his deputies and aides. He thanked them all first for their own contributions towards rationalising the bill, conversations which Távora heard from his corner. He was two flutes in when he finally decided to approach his partner in this mess.\n\n"Virgílio," said Lacerda, slapping his hand on Távora's shoulder, "well done." He led them away from the crowd, into one of this office's many hallways, where the crowd's loud chattering was muffled by distance and doors.\n\n"I should be thanking you, Mr. President. You're the one who got it through the Senate."\n\n"And you're the one who proposed it. Don't be so modest, Távora. You just needed a little direction, that's all." Lacerda's hand fell from Távora's shoulder; an ugly silence hovered in the air for a few seconds. "Well, better get back to the party. There's a few people I'd like you to meet. Candidates for the new chairman of the planning board." Lacerda turned on his heels and walked back to the party."
brazil_lacerda_samba.48.a: "Távora trailed behind him."

brazil_lacerda_samba.49.t: "Places of Power"
brazil_lacerda_samba.49.desc: ""Friends and citizens, the UDN has promised you water for your farms and power for your homes, and we have delivered. God willing, the farms of this great state shall never suffer drought, thanks to the great wall you see here."\n\nVirgílio Távora felt surrounded by the vast concrete wall behind him. In its own way, it felt comforting. They were a few kilometres west of Guadalupe, where the new Boa Esperança Dam rose behind him. He could hear even from outside the whirring of turbines and the rushing flow of water through its sluices. Though his voice was amplified by speakers, they could all still hear it beneath his voice. The water flowed through the Parnaíba, and granted power in its descent through pipes and turbines.\n\n"But this project was not meant to capture a few extra votes. We embarked on this journey to make good on our promises, to uphold the guiding motto of our nation: Ordem e Progresso. Nothing less than total commitment to these ideals will be satisfactory for the UDN."\n\nPolite claps from the audience concluded his speech, his last words punctuated with the flash of cameras. He stepped off the podium and approached the crowd, to be seen shaking hands and being a man of the people. This dam, like the others before and after it, had earned Távora a great deal of acclaim. It was his initiative, and the people of Northeastern Brazil were enjoying it. And yet, in his eyes there was a genuine enthusiasm for the whole affair. It would be easy to dismiss building these dams as a populist trick, but this was the region that he called his own. He grew up closer to here than his current place of residence and business, and he felt more at home in the Northeast. The admiration of those who lived here was the admiration of his people, and he could not help but savour it more."
brazil_lacerda_samba.49.a: "The native son gives back to his native land."

brazil_lacerda_samba.50.t: "Places of Control"
brazil_lacerda_samba.50.desc: ""Ladies and gentlemen, I am proud to announce that a year after I signed the Hydroelectric Renewal Bill into law, we can report a 32% increase in electric output for all dams in the Northeast. Further, the construction of new hydroelectric power stations in underserved areas has increased electricity coverage in the Northeast by 40%. Our government has always balanced the needs of its poorest citizens with the needs of its budget. We have ensured that even destitute farmers have access to the water they and their farms need to survive, and we have done it without additional stress to our budget."\n\nThe photo behind Carlos Lacerda, blown up for even those in the back to see, was the Furnas Dam in Minas Gerais. That it was not a new dam, nor was it even a dam in the right region, was not commented on by anyone present. Its wide concrete walls, the orderly row of pipes, served as a sufficient image for all present. The water was captured, processed and released like a wild animal.\n\n"Water is a human right. It is a fundamental need for our survival, and I am proud to have implemented this project that will make that right more easily accessible to all our citizens. I look forward to reporting on the further successes of our Hydroelectric Restoration Board."\n\nThere were a few questions, mostly softball comments about the efficacy of its development. One journalist, from a rag who Lacerda had forgotten, asked what was being done about the construction of new dams in the Northeast. He demurred. It just wasn't in the budget, and he did not wish to suggest otherwise. The journalist thought of her family in the Northeast still running off rickety generators."
brazil_lacerda_samba.50.a: "What sensible approaches to governance."

brazil_lacerda_samba.51.t: "In With the Old"
brazil_lacerda_samba.51.desc: "A new dawn had broken for Brazil, at least for Milton Campos, who was exactly where he always was for new dawns- in his office, plotting. The UDN was on the march, that much was clear to him as he sifted through pages of reports, articles and documents on his desk, some of which had sat there for months. The ship of state was currently plain sailing; there should be no worry about rocking it.\n\nThe opportunity for redemption had never been so clear. An election poster from 1950 marked with the slogan "Vote for the Brigadier" hung tiredly upon a wall, beaten and worn out by Gomes' embattled legacy. But with the deck of cards the party possessed, the radicals and communists that robbed their second term a decade ago could be erased with a pen stroke.\n\nCampos began to dream of journalists describing Gomes' revival, his vindication, the rebirth of the party as it was and should be. Renewed national security, getting rid of communist scum for good either by a ban or by military boot, ministers who could assert the armed forces' interests and needs through a binding veto on military affairs, dangerous dissidents under the purview of Military Justice, an alignment with the OFN not just in name but in law.\n\nFrequent consultations with the Brigadier himself, meetings and phone calls with like-minded deputies, and of course, months and months of planning, had all come down to this. It was time to sound the alarm - the old guard of the UDN is not yet dead."
brazil_lacerda_samba.51.a: "The Liberais Históricos must also be invited to the samba of state."

brazil_lacerda_samba.52.t: "To Red-Tape the Reds"
brazil_lacerda_samba.52.desc: ""Thanks for reaching out to me, Milton, especially since you didn't have to," said Távora, smiling officiously, but not amicably. His stiff body language did not show his thanks either. "I have to say, though, I've got at least five things I need to do in the next two hours, so let's summarize."\n\nThey stood in the front section of the Vice President's office. The office holder scanned through the manila folder handed to him a couple of hours ago, sternly reviewing sentences underlined in red pen. "Getting rid of communist scum by banning them and deploying the military." Campos nodded his head. "Giving military ministers a veto on military affairs and dissidents to Military Justice. Total repealment of the Lott Act."\n\nThe former lawyer, triggered into action at some point by Távora's recounting, began to vociferate. "How else are we going to assert the principles for which we stand, Mr. Távora? This Varguist corporatist lunacy has gone on for too long, and if we don't rip it to shreds they will steal Brazil's future as well! The only good thing left to fight these communist terrorists is the military, and if strengthening it means tearing up PSD-PTB legislation then even better!"\n\n"Alright, then. Well, I have a lot on my plate, so... I hope it goes well." After the vice's eyes returned back to normal size, he rapidly paced out of the room.\n\nWhen he repeated a similar tirade at the Chamber of Deputies, whispers among members ranged from "kook" to "patriot", but certainly no verdict had been decided yet. In terms of policy, reactions were more nuanced, and vague. Whatever the mood, no verdict was clear, and the fate of the Liberais Históricos' national security bill lay in the UDN's hands."
brazil_lacerda_samba.52.a: "It's going to be a long session in the National Congress."
BRA_national_security_acts_boost_tt: "The §Yexpansion§! of the $BRA_national_security_act_law_0$ will be made §Geasier§!."

brazil_lacerda_samba.53.t: "Campos' Crusade"
brazil_lacerda_samba.53.desc: ""Thanks for reaching out to me, Milton, especially since you didn't have to," said Távora, smiling officiously, if a bit impatient to tick off a box on the itinerary. "I'm in a bit of a hurry, so let's just talk over some of the main points of the bill today."\n\nThey stood in the front section of the Vice President's office, who scanned through the manila folder handed to him a couple of hours ago. ""Getting rid of communists by banning them and deploying the military. Giving military ministers a veto on military affairs and dissidents to Military Justice." These are pretty big reforms, I'm sure you're aware."\n\n"That's correct, Mr. Távora," Campos affirmed. "However, the scale of the project of our party this presidency is also quite big, as you will definitely be aware. Our President has achieved some wonderful things for Brazil and has saved us in the short term from a communist catastrophe, but the wretched Varguist corporatist conspiracy lurks in our politics through the PSD and PTB and we must be bolder than we have. We must do more, I fear, or we shall be crushed."\n\n"Your concerns are valid, Mr. Campos, and I do not entirely disagree about our opponents. However, stringent support for the bill will be refused outright by people like Pinto and the Bossa Nova. We will try to support you however we can, for a failure to generate legislation by a UDN member is a UDN problem, but we can make no guarantees. I hope it goes well."\n\nMilton Campos was now the head of his own campaign in the National Congress, fighting one of redemption with the odds stacked against him. However many unnecessary compliments he had to pay the President, and however insane many of his colleagues may consider him by the end, the only road left was forward. He didn't plan to mess it up."
brazil_lacerda_samba.53.a: "It's going to be a long session in the National Congress."

brazil_lacerda_samba.54.t: "Constitutionalist Backlash"
brazil_lacerda_samba.54.desc: "After his surprise downfall and retirement, one could have been forgiven for writing off the former General Henrique Lott; many within the UDN had undoubtedly done so. However, Lott remained popular with many, and the efforts of the Lacerda government to overturn his work stirred anger among his supporters in the army and the public, granting him a new position to speak and criticize.\n\nBacked by Constitutionalist officers and sympathizers, General Lott has been delivering a consistent message at various events: the new National Security reforms pose a significant and immediate threat to the very fabric of Brazilian democracy.\n\n"It is both incredible and saddening to me that so many of my countrymen have so little faith in themselves and their compatriots that they would be happy to let their government, their nation, be subservient to their military and not the other way around. Liberty is precious, and we live in a world where it has become a rarity.\n\nLet us not be complacent and think, 'it couldn't happen here;' it nearly did! A decade ago, I stood in defense of Kubitschek and our democracy against lawlessness, and now I implore all of you to do the same: Brazil must not repeat the mistakes of others. It is crucial that you urge your representatives to vote NO on the new National Security laws, for the future of our democracy is at stake!"
brazil_lacerda_samba.54.a: "Could someone please shut this old man up?"

brazil_lacerda_samba.55.t: "Support from the Past"
brazil_lacerda_samba.55.desc: "Eduardo Gomes, former President and now Minister of Aeronautics, may not be as influential as he once was. Still, the news of the new National Security Reform Bill has seemingly breathed new life into his body, and he has enthusiastically attended crowds and meetings supporting President Lacerda's efforts.\n\nIt didn't take long for the old champion of UDN and democracy to use these events to advocate for the bill and galvanize support for what he sees as the natural continuation of his old presidential work. His words have proven popular within the Sorbonne wing of the military, who have assisted Gomes in finding crowds for him to speak with.\n\n"Some misguided souls have condemned the upcoming bill as a sort of democratic backslide, but nothing could be further from the truth. Indeed, I would go as far as to say it is the opposite: the uncaging of our armed forces is a vital step toward the full democratization of Brazil. After all, was it not our proud men in uniform that brought down the tyrant Vargas?\n\nTo my dearest friends in the UDN and our dear President, I wish you the best of luck in the trial ahead and urge you never to give up the fight! And to the people, I wish to remind you that the UDN has stood up to autocrats before and continues to be our nation's shield against the evils of communism and fascism alike!""
brazil_lacerda_samba.55.a: "Remind me to get him a drink sometime"

brazil_lacerda_samba.56.t: "Help from the Hardliners"
brazil_lacerda_samba.56.desc: "The National Security Reform bill has been polarising for sectors of life across Brazil, digging up old wounds from past actions by the military, with many protesting the bill and dreading what its success may bring. However, some have observed the upcoming vote with anticipation that could only be described as worrying.\n\nThe hardliners, the now dominant faction within the Brazilian armed forces, have been in near lockstep unity in support of the upcoming reforms, and General Afonso Augusto de Albuquerque Lima has been chief amongst its most vocal supporters, praising the bill's supporters in the Congresso.\n\n"If Brazil is to flourish and the welfare of the Brazilian people is to prosper, then it is necessary for us in the armed forces of Brazil to move with a strong hand so that we can crush any threat to the nation's democracy. I speak for all of my comrades when I say that we are most proud and pleased that our nation's best and brightest congressmen are making such strides for a safer Brazil.\n\nWe live in dangerous times. We have seen what lengths the enemies of democracy will go to, as the people of South Africa suffered to learn. And these threats do not exist just outside of Brazil but within it. One only needs to look to Congresso and see unrepentant communists like Brizola to understand.""
brazil_lacerda_samba.56.a: "We are... grateful for his support."

brazil_lacerda_samba.57.t: "The Army Responds"
brazil_lacerda_samba.57.desc: "The past few days have seen a series of letters appear in newspapers across Brazil in favor of the proposed national security laws, all from currently serving and former officers of the armed forces who have been bold enough to even allow their names to be printed.\n\nAll the letters explain that the army does not want to overturn the democratic rebirth in Brazil, but that they will ensure that no anti-democratic force—fascist, communist, or otherwise—will ever threaten it. At first, they appeared in UDN-aligned newspapers, no doubt arranged by the party's operatives and officials seeking to build support for the reforms, they soon spread to more non-aligned papers, and are starting to shift public support on the law.\n\nNow, many oppositionists, especially the PSD, the PSP, and the PTB, gathered in offices and conferences with worry and concern. They were all successors of the broad church that Vargas had once preached to, that now have their own worries in light of the army's full throated support.\n\nThis national security reform would give the military a voice in government they once used so ruthlessly time and time again, claiming to prevent any threats to "Brazilian Democracy" from taking power. With much of the army long since purged of Varguists, that would mean only one thing: none of them would ever be allowed to gain power, even if they would win the elections.\n\nAfter all, as they themselves knew from their mentor, "fascist" and "communist" were terms easy to manipulate and turn against any opponent. The UDN wouldn't hesitate to do so if it suited them."
brazil_lacerda_samba.57.a: "Democracy at the barrel of a gun."

brazil_lacerda_samba.58.t: "The Army Reticent"
brazil_lacerda_samba.58.desc: "A long letter published in Última Hora, signed by almost a hundred current and former officers of the Brazilian Armed Forces, has shaken the nation.\n\nAmong the many propositions in the letter is that the current government is trying to use the army as a prop, one to support their faltering regime with a brutal and authoritarian set of national security laws that would dismantle democracy and return the nation to military rule.\n\nOf course, this letter was mostly out of concern for the threat to Brazil's young democracy, hoping to preserve the image of a military that steps back, keeping out of the mud of domestic politics.\n\nNot at all had they been given bribes by figures tied to Magalhães Pinto and other politicians opposed to the reforms and seeking to see Lacerda and Campos fail in this measure. Of course not.\n\nThe letter has ignited a firestorm across the nation, widely reported amongst the Varguists with a particular glee by Samuel Wainer in his columns and publications. That the army was being used as a political prop against their will, and that maybe The Crow was about to get his wings clipped. Maybe the Varguists would survive yet?"
brazil_lacerda_samba.58.a: "For love of country, of democracy, of kickbacks."

brazil_lacerda_samba.59.t: "Securing Support"
brazil_lacerda_samba.59.desc: ""Mr. President, if we want the national security reforms to pass, we may need more Senate support on board," Milton Campos said as they sat in the President's office in the Palácio do Planalto. "While the UDN is onboard, we just simply don't have the numbers to ensure passage."\n\n"Tell me something I don't know," Lacerda sighed, rubbing his head. "Well, what do you propose?"\n\n"If we can get the PSP onboard, they have just enough senators to ensure that they will support us-"\n\n"And give in to Adhemar's corruption? I would rather give ten thousand cruzeiros to an Argentinian fascist before I give him a single centavo!" Lacerda shook his head. "The price he would demand is too high, both monetarily and morally. No, we should be able to negotiate with the PSD. They will fully understand how important it is to secure our nation's security. Besides, there are more PSD senators, so even if we couldn't convince the whole, if we can get a few, it would be enough."\n\n"Even if they are Varguists?" Campos asked, venom lacing the question. "They would never accept it. But, I leave the choice to you, Lacerda. You are the President after all.""
brazil_lacerda_samba.59.a: "They may be Varguists, but the PSD are still patriots."
brazil_lacerda_samba.59.b: "We shall see what Adhemar's price actually is."

brazil_lacerda_samba.60.t: "Bulldozer"
brazil_lacerda_samba.60.desc: ""Phone call, sir. From the President." Adhemar's secretary watched a grin light up his face.\n\n"Good afternoon, Mr. President. To what do I owe this pleasure?"\n\n"Listen, Adhemar, this bill is serious. If we don't pass it, it won't just be me who suffers. If there's anything you nee-"\n\n"I'm not approving it." Adhemar had to stop himself from laughing out loud. He let it sit for a while, delighting in listening to the man squirm. "Just a joke between friends, no need to panic. Anyway, you know I am a businessman, Carlos - I am going to need things in return for my support."\n\n"Number one. My senators will get their envelopes, these deals do not come free. Number two, I will nominate a list of upstanding men who I think deserve to be rewarded with some gainful employment. Number three. Amaury Kruel will be on that list, and he better get a job worth his trouble. If I can't have this in writing, then you can't have my party's backing, Mr. President. It's as simple as that."\n\nHe could almost hear Lacerda cursing across the phone line. Today really was his lucky day. "Have you got all that?"\n\n"...I'm thinking about it. On any other day, I'd have hung up, but you should know how patient I'm being. Magalhães will handle the details. Let's just get it over with."\n\n"Excellent choice, Mr. President. I'll speak to you soon." What's a little favor between friends, after all? If all interactions with the commander-in-chief were like this, Adhemar might as well join the party. Too bad friends are such a disposable transaction in politics, he reflected, his smile still glowing."
brazil_lacerda_samba.60.a: "The last traces of good will, shattered."

brazil_lacerda_samba.61.t: "Bonfire"
brazil_lacerda_samba.61.desc: ""So what do you think?" Aliomar Baleeiro stared at his old acquaintance, Filinto Müller, in the eye. He was regretting it with every second he took. Things weren't going well already; he was only the last PSD senator the vote organizers deemed stupid enough to go back on the very ideas they implemented. Worse still, he knew the former Federal District's old Chief of Police could smell his apprehension like a greyhound.\n\nMüller finally broke into a hearty howl of laughter. "What a joke," he began, his grin eroding into a growl. "I think you've forgotten who I am, Aliomar. You, who barely resisted the temptation to cane Vargas, are coming to the man who served under him to destroy his legacy? For a journalist, I thought you might have a better eye for things."\n\n"Well listen, that was then and this is now," Baleeiro sputtered. He needed this vote. "This bill is going to m-"\n\n"That was then and this is now? I tortured people for him. I myself personally sanctioned them and saw them happen. That's what I did for him. You know what I think? I think you're an idiot, Aliomar. Get out of my sight and get better at your damn job."\n\nAliomar did get out of his sight as instructed, and swiftly. He had the impression he had not only burned one of the last chances to pass the bill, but personally one of the last bridges with the party he used to be a part of. Only a miracle could undo the damages now."
brazil_lacerda_samba.61.a: "A smoldering heap of false hopes."

brazil_lacerda_samba.62.t: "Silence Before the Storm"
brazil_lacerda_samba.62.desc: "In the great halls of Congress, the atmosphere was tense enough to cut, yet not a soul was willing to make a sound. Only the buzzing of insects broke the silence. Lacerda and the UDN impatiently drummed their fingers and shuffled their feet, eager to see the National Security Reforms pass. The Varguists grind their teeth and clench their fists, prepared to dig in their heels and halt Lacerda's ambitions.\n\nNo one knows what will happen next, but both know that Brazil's future hangs in the balance, and so do the thousands gathered in front of Congress, chanting in favor or opposition. Across the country, military men sing praise of the UDN's efforts while their critics, such as Wainer, portray Lacerda and his military allies as the same, preparing to coup Brazil and end her democracy."
brazil_lacerda_samba.62.a: "And, at last, the voting begins."

brazil_lacerda_samba.63.t: "Eternal Vigilance"
brazil_lacerda_samba.63.desc: "As the last votes were counted for the National Security Reforms, most Brazilians could only react in shock. Complete, total success; every reform passed since the end of Gomes' presidency that limited the army's power was swept away.\n\nEven as Varguists raged and decried the outcome due to "flagrant corruption" and "military stooges," its supporters in the armed forces and the UDN toasted and celebrated, and none more than Milton Campos. The man hadn't been so happy since the Presidency of Gomes; at long last, Brazil's armed defenders were restored to their true strength by the UDN and could march forward alongside them to protect their nation against Varguism and other populist scum.\n\nSpeaking before his fellow Liberais Históricos, Campos proudly declared, "Friends, at long last, we have redeemed the legacy of the great Gomes! Never again will the Varguists break the bonds between Brazil's champions of democracy; long live the army and the UDN!"\n\nWhile Gomes' failures washed away, there remained much apprehension. Not all within the military celebrated; numerous constitutionalist and leftist officers despaired at the bill's success. Some of these men have already begun to leave the army on their own, fearful of any purges that could emerge in the aftermath."
brazil_lacerda_samba.63.a: "And, at last, the voting begins."
BRA_lacerda_security_acts_success: "The $BRA_national_security_act_law_0$ will be updated to the $BRA_national_security_act_law_1$."
BRA_lacerda_acts_const_purge: "The £BRA_constitutionalists_texticon §KConstitutionalists'§! influence will §Rdrastically decrease§!!"

brazil_lacerda_samba.64.t: "Death of the Lott Act"
brazil_lacerda_samba.64.desc: "If Campos were being entirely honest with himself, he shouldn't have been surprised that the bill itself failed to pass. Between the Varguists, wary of losing their ill-gotten power, and the misguided souls who had been misled into fearing their army, it was only natural the National Security Reforms failed to reach their full potential. But knowing Gomes' legacy would remain tarnished still stung either way.\n\nHowever, despite the bill's failure, there was still much to celebrate, namely that the works of that treacherous bastard Lott were sunk. The feeling of seeing the life's work of that self-righteous crypto-Varguist ripped to shreds, as all of its provisions were repealed, was deeply satisfying. With the Lott Act out of the way, the UDN's overtures to the military would be easier than ever. As it always should be, the UDN and the armed forces would safeguard Brazil from Vargas and his thugs."
brazil_lacerda_samba.64.a: "The military's chains loosen ever more..."

brazil_lacerda_samba.65.t: "The Cycle Of Failure"
brazil_lacerda_samba.65.desc: "In the back of a black government sedan, Campos fell into his seat with a long huff, like air from the bellows. He squeezed his eyes tight, as if trying to squeeze to death the migraine in his skull. "Drive," he muttered. "Just drive. I'll tell you when to stop."\n\nThe car exited the Congresso's parking lot, fed out into the streets of Brasília. Campos did not notice the streets twisting and changing around him; his eyelids were still welded shut, and all he could see was a dark grey, a blank canvas on which he projected the events that haunted him. Leaving the crisis meeting after the vote with a barked curse. In the Congresso hall, the procession of deputies voting against him. The single look of uncertainty on the many faces of his advisors just before they entered the hall, as the revised National Security Law was being read out.\n\nThe reel continued to roll along, the film falling further back into history. A younger Campos, consoling the Air Marshal. The riots in the streets. The rise of Vargas. Campos thought it would all play out again in reverse. Without suitable national security, the kind this bill was meant to facilitate, the government would be powerless against a populist menace. The people would drag into the Palácio another Vargas, and they would call it liberty. Bad blood still ran through the nation and the state, waiting for the chance to once again infect its organs.\n\n"Let's go home," Campos said to his driver. He had enough of doomsaying; he felt too old for it. Already he turned off the inner projector, and on the canvas of his mind he began to scribble plans and plots. It would not end here. There was still a chance to make the armed forces truly democratic; a healthy organ, producing white blood cells that could resist and remove the old tyrant's influence. He imagined them against the hordes, the virus of the Brazilian body politic, holding batons and rifles aloft, clearing them all away."
brazil_lacerda_samba.65.a: "He still had some years in which he could realise his dreams."

brazil_lacerda_samba.66.t: "Washroom Intrigue"
brazil_lacerda_samba.66.desc: ""Like all great alliances of convenience, Távora and Pinto met in an unlikely place. They met in one of the Congress chamber's washrooms; Távora and Pinto approached the sinks and caught sight of each other in the mirror. Távora seemed tired, rings around his eyes; Pinto seemed as if he had been grinding his teeth in rage for the past week.\n\n"The bill might pass," said Távora. "Lacerda's in lock-step with Campos on this one, and we both know he's got the pull to bring the deputies in line."\n\n"It's bullshit," said Pinto, running the faucet and throwing his hands into the flow of water. "It's an overreach. The Banda's trying to get sole custody of the army. I mean, what happened to our agreement? Wasn't this supposed to be a gentleman's agreement?"\n\n"It's not just the Banda," muttered Távora, applying soap from a little dispenser onto his hands. "I'm more worried about what Lacerda would do with it."\n\n"He's the President, it's his army. But it's not the Banda's, that's what impor-"\n\n"Please, Pinto. Don't tell me you can't read between the lines." Távora shook off excess water from his hands, pulled out a piece of paper from the dispenser. "With the Varguists, or what he thinks the Varguists are, out of the army, Lacerda's going to get his men in. They'll listen to him and only him. What happens when the PSP or, God forbid, the PTB win an election, and they decide the people's will is insufficient?"\n\nPinto followed the dark thought down, head hung low, looking at his soap-covered hands. "I suppose he would be unstoppable." Then he looked up, facing Távora. "Well then, I suppose we'd better do something about this, no?"""
brazil_lacerda_samba.66.a: ""Are you free for dinner tonight, Pinto? I have some ideas.""

brazil_lacerda_samba.67.t: "Nothing Like A Personal Visit"
brazil_lacerda_samba.67.desc: "Lacerda ran into Campos in the halls of the Congress chamber, aides trailing both men. They exchanged notes, and found they had been on the same crusade; whipping up votes for the upcoming national security bill. Lacerda commanded respect and fear, but when Campos stepped through the doors of a poor Deputy's office, all present could feel the temperature drop like an anvil from a tower.\n\n"They must've been shit-scared, eh?" Lacerda cracked a smirk; Campos' thin smile, the mortician's uncomfortable sympathy, curled a little further upward.\n\n"Indeed. But they understand its importance now. The bill must pass. One step closer to removing Varguism."\n\n"Well, we'll see that soon. That was my last trip, and voting begins in..." Lacerda checked his watch. "Half an hour. Care to join me?" Lacerda and Campos walked to the Chamber, only to find they were actually late by a minute; while the PTB were voicing their opposition, the UDN deputies were the first to vote, and those that had been graced with Lacerda and Campos' presence overwhelmingly and enthusiastically voted yes.\n\nIt would go through the Senate, and the only thing that mattered was whether the bill passed now or suffered some delay by the opposition. It didn't matter; it was assured. Lacerda turned to Campos and extended his hand. His grip was cold and firm."
brazil_lacerda_samba.67.a: "Another Varguist tick is pulled from the body politic."

brazil_lacerda_samba.68.t: "Reading the Room"
brazil_lacerda_samba.68.desc: ""It must be the Saraiva Law, surely?"\n\nMagalhães Pinto scratched his chin, considering how best his faction could make an impact. He was joined by an ambitious young Deputy and Bossa Nova member, José Sarney, whose own thinking was interrupted by Pinto's open question.\n\n"What do you mean?" Sarney asked.\n\n"It's a careful balancing act, something big, something possible, something we can make our own," Pinto reasoned, leaning back in his chair. "While Lacerda is being pulled in all directions, as usual, the big policy push that we need has to be focused, singular. Land reform, for example, is too big right now, but demand for land reform will be louder if we overturn the Saraiva Law and give illiterates the right to vote. Do you see?"\n\n"I can put the word out to some PTB deputies, see if they're interested in working with us on this," Sarney said, immediately on board. Both took it as self-evident that the prohibition on illiterates voting, nearly a century old, was patently out-of-date and against all democratic principles. More practically, enfranchising swathes of devout, low-education people from the countryside could create a new voting block for the UDN - or at least, for Bossa Nova.\n\n"We can cushion the amendment somewhat - if all goes well, we're looking at the '70 elections, but there's some movement. It depends on the coalition we can whip up." The two men were aligned - a plan began to form, phone calls were made, and..."
brazil_lacerda_samba.68.a: "Pinto moved ahead with a progressive coalition including significant UDN support."
brazil_lacerda_samba.68.b: "Pinto moved ahead with a progressive coalition including moderate UDN support."

brazil_lacerda_samba.69.t: "Prepare the Response"
brazil_lacerda_samba.69.desc: ""Why did nobody tell me about this?" Aliomar de Baleeiro sputtered down the phone, just finished breathlessly reporting on the new constitutional amendment José Sarney had just thrown into the chamber like a grenade.\n\n"Nobody tell you?" Lacerda blasted down the other end of the line, "what, have I bugged the chambers? Do I swaddle all of you? How could I - you think that they had my go-ahead to do this?"\n\n"So you let Bossa Nova plot under your nose?" Baleeiro huffed. "Look, I have to get back. I'll do what I can here, but you need to take action. Speak later."\n\nLacerda hesitated for just a moment when he heard the click, regaining his composure. It wasn't long until he was engaged with a new back and forth over the phone, this time with Vice President Távora.\n\nAs Lacerda had expected of the tepid Vice President, Távora's line was one of negotiation and compromise. "Just sit down with Pinto," he said. "The man isn't totally beyond sense."\n\n"I'd much rather strangle the smug bastard." Lacerda was becoming morose.\n\n"We both know the Saraiva Law won't be around forever. Pinto's jumped the gun, perhaps, but we can smooth this over if we just act smart."\n\nLacerda rubbed his brow, deciding how best to deal with this growing headache."
brazil_lacerda_samba.69.a: ""I don't like it, Távora, but fine. I'll meet with Pinto.""
brazil_lacerda_samba.69.b: ""I don't like it, Távora. If that's all you have, I'll solve this problem myself.""

brazil_lacerda_samba.70.t: "Unhappy in Its Own Way"
brazil_lacerda_samba.70.desc: ""You yourself admit that there's some movement on the illiteracy issue." Pinto spoke casually, leaning into the arm of the chair.\n\n"Yes, there may be some movement, but it's still very early; we need to account for the time it takes for the education system to do what it does." Távora spoke evenly, as if having already constructed the conversation with Pinto in his head.\n\nThe two men had been conversing about the merits and demerits of the Bossa Nova-led constitutional amendment for some time, seemingly forgetting about Lacerda's presence entirely. The neglect, and the inane conversation, left Lacerda feeling increasingly prickly. A tirade against Pinto was stuck in his throat, waiting for attention.\n\nIn the end, he was beaten to it. The three men turned as the door clicked open. Milton Campos stood in the doorway, red and indignant.\n\n"You're a traitor, Pinto! You're sleepwalking us into Varguism, and I can see right through it! Good day!"\n\nWith his point evidently made, Campos left as suddenly as he appeared, slamming the door behind him. The other UDN leaders looked at each other for a moment. Távora cleared his throat and turned his attention back to Pinto.\n\n"As I was just saying, the points of the deal are as follows; illiterates will be given the vote in municipal and governor elections in 1975. Presidential elections, we leave for future discussions. What do you think, Magalhães?"\n\nPinto allowed himself a glance at the clearly unhappy Lacerda. "I think that's a fine deal, Virgílio." But he could do better than fine. "Let's shake on it.""
brazil_lacerda_samba.70.a: "Virgílio, why do you think you're the one to make demands?"

brazil_lacerda_samba.71.t: "The Future Cannot Be Stopped"
brazil_lacerda_samba.71.desc: "It was an auspicious day in the Chamber of Deputies. José Sarney was expected to present the body of the constitutional amendment for a vote, which he and Magalhães Pinto were confident would go their way. In fact, they were incredibly confident, and after hushed conspiring between the two, the amendment Sarney presented to the floor was not quite the same as the one Pinto had agreed with Távora.\n\nThere was a murmur percolating around the Chamber as it was announced that the amendment would grant illiterates voting rights in governor and municipal elections from 1970.\n\nAs it turned out, Bossa Nova had calculated right. The voting coalition Pinto and Sarney had formed had differing views on the bills' updated timescale, but few were negative. The more progressive Deputies, in fact, were pleasantly surprised, and the coalition had enough strength that more moderate Deputies, for the most part, shrugged and accepted the new terms without fuss.\n\nLater, when the votes came in, Lacerda was unable to shrink himself further into the quiet corners of the plenary hall and stumbled breathlessly into the corridor. His back slid down the marble walls until he sat on the floor with his head in his hands, his body revolting against the crass indignity, the terrible humiliation; Pinto had outmaneuvered him, the gall of it made him dizzy.\n\nYet, when the motion passed, Lacerda made sure to be seen back in the plenary chamber. On the outside, he looked stoic, an untroubled and opaque expression on his face."
brazil_lacerda_samba.71.a: "You're hysterical."

brazil_lacerda_samba.72.t: "Can the Future Be Stopped?"
brazil_lacerda_samba.72.desc: "It was an auspicious day in the Chamber of Deputies. José Sarney was expected to present the body of the constitutional amendment for a vote, which he and Magalhães Pinto were confident would go their way. In fact, they were incredibly confident, and after hushed conspiring between the two, the amendment Sarney presented to the floor was not quite the same as the one Pinto had agreed with Távora.\n\nThere was a murmur percolating around the Chamber as it was announced that the amendment would grant illiterates voting rights in governor and municipal elections from 1970.\n\nIt quickly became apparent that Bossa Nova had miscalculated the strength of their hand. While many of the more progressive deputies were pleasantly surprised, the moderate bloc of Pinto's coalition made their discomfort apparent quickly; the hall filled with the jeers of the amendment's opposition, and as the Chamber collected itself, Lacerda appeared beside Pinto. The President had been observing from a distance and swiftly moved to usher the Bossa Nova leader to the side.\n\n"Listen to me, you cretin." Lacerda was nearly hissing. Pinto felt the President's fists resting uneasily on his shoulders, shaking with rage. "You know the difference between me and Campos, you Judas? Campos cannot back up his words. I can, you fuck. Stick to the original deal, or I'll have you and your entire clique running back up the Archbishop's skirt. Don't mess around."\n\nPinto tried his best to keep his demeanor impassive. "Alright, calm down. Sarney just got the wrong version - '75 it is.""
brazil_lacerda_samba.72.a: "The amendment 'corrected', the motion passed, and nobody was fully satisfied."

brazil_lacerda_samba.73.t: "Talking Backwards"
brazil_lacerda_samba.73.desc: "President Lacerda made his way to the head of the Chamber of Deputies, surveying the plenary hall behind his heavy frames. Passing, he regarded Pinto's feckless lieutenant Deputy Sarney, his nose turned impetuously up.\n\nSarney and his ilk would not become any happier as Lacerda came to the podium and began his speech. The pleasantries were rushed through, and he got to the meat of the issue quickly.\n\n"I am President of Brazil," said Lacerda, "and the President of every citizen of Brazil. But in times of acute wrong-headedness, I must lower myself to partisan issues. It is especially concerning when it is my fellow members of the UDN that are going astray."\n\nLacerda adjusted his glasses. "We shouldn't conceal our words - the proposed constitutional amendment, for however well-meaning it may be, is totally upside-down. One of the major struggles of this nation, and this government, is the fight against illiteracy. We wish to raise people up, make well-informed, enlightened citizens out of them. Giving the vote to a man who doesn't even understand letters dilutes civil society; it gives the man no dignity."\n\n"Any Udenista voting for this amendment is enabling demagogues to prey on the uneducated. For myself, my ambition is for everyone to have access to education - a nation of total literacy.""
brazil_lacerda_samba.73.a: "Reminded of their duty to Brazil, UDN support shriveled up, killing the bill."
brazil_lacerda_samba.73.b: "Words on deaf ears - soon after the speech, the Chamber voted for the amendment."

brazil_lacerda_samba.74.t: "Feeble Rumors Shake Your Hearts"
brazil_lacerda_samba.74.desc: "With the constitutional amendment looking set to get a majority in the Chamber of Deputies, Lacerda's frustration only grew. He was grinding his teeth again, galled that this court of imbeciles and crooks couldn't make the right choice even after he had explained it to them. He had expected it from the Varguists in the PTB, of course, but from his own party?\n\n"I should wring Pinto's neck, that bastard." Lacerda murmured darkly.\n\n"No need for dramatics." Aliomar Baleeiro leaned over and gave his old ally a sympathetic look. "God knows there were times I could've beat the wits out of Vargas - but we have to play a smarter game than that."\n\nTávora also took court with Lacerda in the quiet corner of the chamber, lingering like a gargoyle. "I don't want to tell you I told you so-"\n\n"So don't." Lacerda snapped.\n\n"Look, you're going to keep running into a wall if you insist on doing this by yourself. I can still call in some favors, talk to people - find the coalition in the chamber that'll scrap this bill."\n\n"And you think I can't do that?"\n\nTávora just rubbed the back of his neck. Baleeiro smiled softly and turned away."
brazil_lacerda_samba.74.a: ""Maybe you're right this time, Távora. Get this done.""
brazil_lacerda_samba.74.b: "Forget Távora, I can still do this on my own."

brazil_lacerda_samba.75.t: "Corrupt My Air"
brazil_lacerda_samba.75.desc: "Compromise was not readily in Lacerda's nature. He couldn't play the sycophant like Távora could, and he was rightly proud, even if it made it harder to kill Pinto's constitutional amendment in the Chamber.\n\nPTB deputies spurned him, unsurprisingly. Entreaties to the reformist deputies of the PSD and even of his own party went nowhere, their dogmatic support of the amendment freeing them of all sense. Lacerda was bouncing around the Chamber, getting nowhere.\n\nAuro de Moura Andrade would speak to him, though. Lacerda had almost written the idea off - Andrade was a prominent member of the PSD's Old Guard, a clique of the oligarchs and demagogues who had made a killing during the Estado Novo.\n\nStill, Andrade spoke easily, and Lacerda pushed past his discomfort. They had a common problem with the amendment, Andrade argued - a PSD-UDN coalition against the bill, while perhaps unconventional, would almost certainly get the job done. Perhaps they could even work together on a more permanent basis? Everything was possible - so long as the President provided the envelopes.\n\nSome deputies who were milling about turned their heads then at the sound of Lacerda yelling at Andrade. The man was livid, going red in the face - Andrade dared to talk of corruption to him? Andrade should be happy the President even stooped to his level.\n\nThe PSD politician gave it right back. The President was a fool with no business residing in the Planalto Palace. Andrade, just as incensed, vowed that he would do everything in his power to enable the amendment to pass - after all, everyone knew that illiterates voting would hurt the UDN more than it would the PSD."
brazil_lacerda_samba.75.a: "Andrade was good to his word - with some select PSD abstentions, the amendment passed."

brazil_lacerda_samba.76.t: "Whose Loves I Prize"
brazil_lacerda_samba.76.desc: "Nobody would call Virgílio Távora lazy. The statesman from Ceará lapped the Chamber as if in a fit of frenzy, speaking to any Deputy who might be convinced to vote against the constitutional amendment.\n\nYes, we can look into extra funding for schools in your state. Yes, we will build that road. Yes, your brother can have that government contract. Any promise or favor Távora was in the position to give, including offering envelopes - a cash bribe had some honest efficiency, and besides Távora didn't share Lacerda's preening 'incorruptible' image. Yes, it was hard. But Távora wasn't here for his own sake. He was doing this on behalf of his government, on behalf of the President. God knows Lacerda would've already made a fool of himself had this task been left to him.\n\nTime ran short - Távora was just finishing up a deal with a moderate PTB deputy, already preparing to leap to a PSD man he could see over the deputy's shoulder. The numbers seemed decent, and the Vice President was mentally preparing for the noise Pinto would make should the amendment fail. This was a total betrayal, whatever happened to unity in the UDN, things like that. Eventually, he would get over it, or perhaps come up with another self-sabotaging scheme to get back at Lacerda for beating him to the presidency.\n\nTávora caught his breath as the votes came in. The results..."
brazil_lacerda_samba.76.a: "Pinto's coalition was just too big - the amendment passed."
brazil_lacerda_samba.76.b: "Távora's work paid off - the amendment failed, and Pinto reacted as expected."

brazil_lacerda_samba.77.t: "And Here Remain With Your Uncertainty"
brazil_lacerda_samba.77.desc: "The Planalto Palace was quiet, save for the croaking call of a condor flying overhead. In his office, Lacerda pinched the bridge of his nose, trying to rid himself of the headache the literacy amendment, awaiting on his desk, had given him.\n\nHe had run through the options a thousand times. The presidential veto was politically impossible, thanks to the racket the bill had made as it stumbled through the Senate, leaving his only legal choice to sign the damn thing. If he gave his signature and stood by it - publicly supported the bill? It was exactly the opposite of his known opinion on the issue, and his own faction would find it a betrayal, but it was the path of least resistance - and of most credit from the reformists.\n\nThere was another option - less legal, yes, but did that matter when Brazilian democracy was on the line? One phone call to one of his friends in the military could correct the Senate and put a full stop to the matter entirely. General Albuquerque Lima would likely be game, for Lacerda knew they both shared the same concerns. This relied on the army to be in the condition to come to Lacerda's aid in political matters, of course.\n\nLacerda mulled over the choice, the pen and the phone, the circling condor."
brazil_lacerda_samba.77.a: "Swallowing his pride and doubt, Lacerda picked up the pen."
brazil_lacerda_samba.77.b: "With a grim resolve, Lacerda picked up the phone."

brazil_lacerda_samba.78.t: "One Nail One Nail"
brazil_lacerda_samba.78.desc: ""What do you call this?"\n\nWar Minister Golbery do Couto e Silva leaned back in his chair and indicated the newspapers on his desk; they had headlines - not on the front page - like 'Senators Complain of Outside Pressure' and 'Speaker's Office Reports Threats.' General Lima, standing before his superior like a castigated schoolboy, felt himself swing from wild frustration to glum acceptance.\n\n"Those articles don't name me." Lima said ruefully.\n\n"And yet I - and everyone else in the service, and in the government - know that it was you." Golbery glared at Lima over his thick spectacles, his voice neutral though his words were harsh. "I'm already aware you tried to recruit some of the others for a little political intervention, and I know that when you didn't find anyone to storm the Senate with you, you decided to leave a slew of insane phone calls to elected representatives."\n\n"I'm trying to protect democracy." Lima was swinging back to anger.\n\n"I'm trying to do my job. It makes me look rather bad when Speaker Andrade comes to me telling me he's received personal threats from a high-ranking officer. Expect this to affect your career. Dismissed." Golbery turned cooly to some assorted paperwork.\n\n"Damn it, President Lacerda told me to!" Lima clenched his fists, playing his last card.\n\nTo Lima's dismay, Golbery did not react. It was as if he did not hear him at all. As if stating the painfully obvious."
brazil_lacerda_samba.78.a: "Scraps for the condor."

brazil_lacerda_samba.79.t: "Rights By Rights"
brazil_lacerda_samba.79.desc: "The trucks were requisitioned. The armory was secured. The route was set. The men were ready. General Lima was silhouetted against the floodlight in the base garage, watching the flight of a condor as it chased the setting sun.\n\nSoldiers saluted Lima as he passed, and he moved among them with an easy confidence. Tomorrow's operation was theater, a show of force to remind the Senate that their job is to uphold democracy. He retired for the night, and slept easily, for a soldier.\n\nThings turned the other way as windswept morning came. Lima hunched over the phone, put off as one of his fellow officers didn't pick up, and puzzled as the next two did the same. The troop movements outside were strange, veering from even stepping too close to the general's quarters, for good reason. At 8:13 AM, recruits spotted General Lima being led into a truck by soldiers nobody on base recognised.\n\nLater that day, Brazil learned from the news radio broadcasts what had transpired. The Ministry of War had been alerted to a plot by some high-ranking officers to storm the Senate and overturn the recent constitutional amendment - at least one conspirator had contacted Minister Golbery, others had been captured and arrested.\n\nMany breathed a sigh of relief that military intervention had been avoided, none more so than former President Lott, whose 'Lott Act' the conspiracy had fallen afoul of. The sky was clearer, and Lott was glad to know Brazilian democracy was protected from Hardliners like Lima - or indeed, figures like Lacerda, for his fingerprints were all over the sorry plot."
brazil_lacerda_samba.79.a: "If not for the Lott Act, the whole thing would've gone down very differently..."

brazil_lacerda_samba.80.t: "One Fire Drives Out One Fire"
brazil_lacerda_samba.80.desc: "The truck convoy rolled through Brasília's empty streets under the wings of a passing condor. Some civilians made furtive glances through windows or from the rooftops, but most stayed out of sight as the Senate's edifice came into view. Coming into the promenade, the line of trucks split apart and encircled the building - dozens of soldiers spilled from the covered truck beds and secured the car park, expansive green, and the neighboring streets. At the head of the column, General Lima stepped out of his jeep and stood in the ray of the sun that cut through the Palace's twin towers.\n\nLima led a squad through the front doors and inside the Senate chamber itself, and the usual ruckus and noise dissipated quickly at the sight of their guests. Soldiers stood at the door, positioned themselves in the aisles. Lima himself made his way to the rostrum and, as if taking his natural position, produced some paper from his lapel and began to read from it.\n\n"To the assembled Senators," Lima began, paying no heed to Auro de Moura Andrade, the Senate speaker, hovering nervously behind him. "It is with regret that the armed forces have concerns that the recent constitutional amendments this body approved are not in line with Brazilian democratic values and the rule of law. For the sake of the nation, you must reconsider."\n\nAfter a brief spiel, Lima dismounted the rostrum and he and the other soldiers left the chamber as suddenly as they arrived. As Speaker Andrade retook his place and almost apologetically explained that the amendment vote would need to be repeated, President Lacerda lingered unnoticed on an upper balcony, witness and instigator of the day's military intervention. Anxious and unable to stand still, he stumbled into the corridor to catch his breath; trapped by the lengths he was forced to take, trapped by the shadow of the condor."
brazil_lacerda_samba.80.a: "When, Caius, Rome is thine, thou art poor'st of all; then shortly art thou mine."

brazil_lacerda_samba.81.t: "Party Congress"
brazil_lacerda_samba.81.desc: "Under the sun of Curitiba, Raphael Magalhães strolled into the UDN Party Congress. He just had a good trip to the capital of Paraná and was expecting an even better congress.\n\nAfter all, with the strikes finally settled, there was little to challenge Lacerda's grip on the party, and little anyone could do to prevent his nomination as party leader.\n\nEven as soon-to-be-former Party President Pinto walked past him, he maintained his smile, even exchanging a "Good morning!" with the man. But before Magalhães could receive his crown, he had to sit through congress, which, to his surprise, remained interesting.\n\nLacerda's rule over the UDN may have been absolute, but his rule over the party program was not. The floor was filled with debates and motions for a new party program.\n\nBanda de Música and Liberais Históricos endorsed a fairly run-of-the-mill platform. Expressions of support and admiration for Lacerda and his policies, calls to continue his broad political agendas, with the odd little tweak here and there.\n\nThe Bossa Nova that was far more experimental with its program. Their proposals were filled with moderate criticism of Lacerda combined with calls for radical expansions of agrarian, banking, fiscal, and urban reform, as well as more independent foreign policy.\n\nTávora's clique, predictably, proposed a compromise resolution that achieved a large degree of party unity. When it came time to swear in Magalhães as the new President, the new program was announced."
brazil_lacerda_samba.81.a: "The Lacerdist Program passes."
brazil_lacerda_samba.81.b: "The Compromise Program passes."
brazil_lacerda_samba.81.c: "The Radical Program passes."

brazil_lacerda_samba.83.t: "A Night on the Town"
brazil_lacerda_samba.83.desc: "It had been a long time since the Bovespa was this alive - the floor teeming with investors the country over, all looking to carve their little slice of fortune out of the market. From an outsider's perspective, the room seemed normal - filled with false smiles and slick with tension - but there was an electricity in the air. As the investors talked amongst themselves they too could feel it, a subtle prick on the back of their neck, or perhaps a deep pit in their stomach, but they felt it all the same.\n\nThen, as suddenly as the room was abuzz with noise and atmosphere, with the pointing of radios to the pit, it fell silent. The room swam with tension as every single man was intently listening to every single word given through the radio, the UDN had passed another bill, designed to help big business - and it got them excited. They hoped - prayed that the UDN could keep up their streak, and help them line their pockets. But, in the end, it all came down to what the men in the pit said.\n\nThe air in the room grew thicker with every passing second, nobody daring even to breathe under the conditions, for risk of missing any little bit of detail. As the radios lay pointed at the pit like daggers, all that could be done was prayer - hoping the UDN had pulled through. Then, as quick as the silence formed, the durst.\n\n'Ibovespa up - 1.2%!'\n\nWhatever said next was lost, as the room erupted into a sea of deafening cheers, they had done it! And it wasn't just Ibovespa, almost every single major company was now on the uptake, and at exceptional rates! The room became awash with relief, reactions ranging from simple smiles of relief to tears of joy. Not all were happy, however. Some worried that the UDN was presenting a model of unsustainable growth, and that eventually the bubble had to burst - and they'd be the ones to take the fall."
brazil_lacerda_samba.83.a: "That was until their investments were announced."
brazil_lacerda_samba.83.tt: "£GFX_BRA_UDN_liberalism_texticon §YEconomic Liberalism§! has reached 25%. The following effects will be applied:"

brazil_lacerda_samba.84.t: "The Freer the Markets..."
brazil_lacerda_samba.84.desc: "Bernando and Sophia couldn't be happier. It had taken God knows how long to finally get things working, but after pouring in much blood, sweat, and tears, their little slice of heaven nestled in the streets could finally be opened - and it was all thanks to the hard working men and women of the UDN.\n\nAfter all, before the UDN helped relax the relentless bureaucracy surrounding business, it was impossible for anything to get done. Try to get a business license? Some forms needed to be signed. Wanting to sign said forms? Well of course there had to be a waiting list. All this kept driving them further and further away from opening that tailor shop of their dreams, allowing the good people of Brazil to buy the finest hand-made clothes for reasonable prices, but no more, for they could finally see this dream through.\n\nOpening day was filled with anticipation, as the pair sat behind the counter waiting for the first customers to enter the door, and for all the effort they'd put into this to pay off. And then they waited a little more, and a little more still - but nothing. Not a single customer had entered their doors all day - despite all the raucous hustle and bustle that could so clearly be heard just beyond the door.\n\n"What the hell's up with this place? Do they not know we're open or something?" Bernando muttered to himself, briskly walking out the door to check if he had accidentally made some minor misstep, like forgetting to flip an 'Open' sign - but then he saw it. 'Sears'. A massive building, filled with an almost endless supply of people, buying an endless supply of cheaply-made clothes. It was almost opulent, were it not a spit in the face. Sighing, he dejectedly walked back into the store, finding a way to break the news to Sophia."
brazil_lacerda_samba.84.a: "...the freer the people?"
brazil_lacerda_samba.84.tt: "£GFX_BRA_UDN_liberalism_texticon §YEconomic Liberalism§! has reached 50%. The following effects will be applied:"

brazil_lacerda_samba.85.t: "Winners and Losers"
brazil_lacerda_samba.85.desc: "The atmosphere in the DNPM building was solemn. Nobody wanted to be the one to break the news, but they all knew it. Outsourcing. That word was never very popular with the workers of Brazil, or anywhere for that matter, but as the UDN continued their liberal march forward, many knew that it would inevitably become their reality. The note was wordlessly passed around the room, eyes scanning over every line to see if they'd been one of the lucky few who hadn't had his job pulled out from under him by a private company.\n\n'Gabriel M. - Luiz P. - Samuel R. - Pedro B.' - The list went on.\n\nNobody bothered to look past their name - there was no joy to be found in others' misery, least not when they were buried in theirs. Those that were lucky enough to stay on knew it was a pyrrhic victory, and that sooner or later their heads would be on the chopping block, and they'd be in exactly the same position their now former compatriots are.\n\nNoah had to rush out of the room as soon as his name was distinguishable - he needed to appear strong, at least in front of them. He didn't want to go back - he couldn't go back. Mist formed in his eyes as those sleepless nights he had forced himself through crept back into his mind; anything to become an inspector. Hours of backbreaking labor, day-in, day-out, all so he could climb out of the financial pit, only to have his hand stomped on just at the edge.\n\nHe found himself leaning against the wall for a moment, only able to sigh at the hand he'd been dealt. Taking a moment to collect himself, he began to walk back into the room, hoping the others didn't see him like this. Turning the corner, the faint voice of two executives could be heard just barely in earshot.\n\n"Mr. Rafael, I must admit you were right about efficiency. It's like a weight the size of Cristo Redentor has been taken off our backs!""
brazil_lacerda_samba.85.a: "Noah felt like screaming, but had nothing left to give."
brazil_lacerda_samba.85.tt: "£GFX_BRA_UDN_liberalism_texticon §YEconomic Liberalism§! has reached 75%. The following effects will be applied:"

brazil_lacerda_samba.86.t: "A Wheely Tired Brazilian Tradition"
brazil_lacerda_samba.86.desc: ""I'm gettin' really fuckin' tired of that goddamn Pedro." Edward passed a small wrench upwards. "Tellin' us to do this, not givin' us warning... I thought the UDN was gonna get rid of these nosy pricks." He slid out from under the giant steel machine, wiping his tanned brow. Another man, much paler, was focused on a bolt. Edward snapped his fingers. "Hey, Rich. You gone deaf or somethin'?"\n\nThe pale man turned around after a second, revealing a gentler face adorned with glasses. "Lay off, Ed. It's not like he's fucking Hitler or something. He's just doing his job, same as us all." Richard turned back to his work.\n\nEdward sighed, rolling his eyes and stretching his sore muscles, muttering to himself. "It's enough t'make ya wish that sonnabitch Kubitschek was back..."\n\n"...Or at least, that the UDN might start to make changes. Something more amenable to our plans for Americana." Peter pointed back to the elaborate graph projected on the wall, adorned with high-fidelity color visuals. Despite the fancy design, it displayed a less than idyllic vision of future profits. "These aren't exactly what Goodyear headquarters was hoping for."\n\nJohnson tugged at his tie, adorned with a Confederate flag design. "I understand, Pete. We're trying here. I'm certain that our pivot to an off-road model-"\n\nNicolas raised one olive-colored hand to silence his companion. "Come off, John. We shouldn't have expected the government to deregulate, no matter who is boss. I've lived here all my life...""
brazil_lacerda_samba.86.a: ""...and I doubt anyone short of God himself could dislodge Brazilian bureaucracy.""
brazil_lacerda_samba.86.tt: "£GFX_BRA_UDN_statism_texticon §YEconomic Statism§! has reached 25%. The following effects will be applied:"

brazil_lacerda_samba.87.t: "But Eventually, I Lost Interest"
brazil_lacerda_samba.87.desc: ""We're pulling out." Manuel didn't like leaving people in suspense. That didn't always do favors for him. "No. I'm sorry, but we can't. Just pay us what- listen, I'm sorry, but-" A sickening click. He shuffled through his papers, marking a checkmark next to a local up-and-coming supermarket. He sighed. He liked that one.\n\n"It's decided, then. We are going to freeze all leveraged buyouts and pull out of investments that exceeds our lowered risk tolerance level." The two other bankers who had been in on the failed scheme nodded in response. Marco checked the time, his eyes suddenly widening. "Shit. Uhm, excuse me. I've got to catch a date."\n\nAfter their boss left the room, Bernardo kicked his feet up on a nearby chair, undoing his tie. "I just can't get it, Ant. The UDN promised deregulation galore, like you Americans have. What happened?"\n\nAntonia's frigid glare met Bernardo's lax eyes. "I don't know, Bernardo." She glanced past him, out the window, seeming very far away. "We can't change the past, though. Why bother thinking about it?"\n\n"It does make sense. Bonds are good right now." Thomas lazily signed at the bottom of the order, confirming their firm was buying up thousands of municipal bonds, all the while talking on his phone. "But get this, dad- we're putting cash back into state infrastructure projects! You were right- our deregulation strategy didn't last.""
brazil_lacerda_samba.87.a: "It's another day at Banco Itaú. And another failed gambit."
brazil_lacerda_samba.87.tt: "£GFX_BRA_UDN_statism_texticon §YEconomic Statism§! has reached 50%. The following effects will be applied:"

brazil_lacerda_samba.88.t: "Day-in, Day-out"
brazil_lacerda_samba.88.desc: "The room was exhausted. Nobody at the DNPM had seen work like this since... Well, ever, really. Every bureaucrat and inspector - and everything in between had been working the night over, finally trying to appease the constant quota they needed to meet, and it was taking a toll; their eyes, dyed a raw red from the need to stay open, looked to be sinking off of their faces, closing every few seconds as they felt the specter of sleep slowly catch up. The room smelt very faintly of coffee - with enough cups scattered errantly across desks and cabinets to make the room look like an impromptu café.\n\n"God, sometimes I wish we'd never gotten this job, any more inspections and I'm worried my eyes will give in. How about you Gabriel?"\n\n"You can say that again." Gabriel paused his half-formed thought to allow for an exhausted yawn and a stretch of his aching arms. "Sometimes I wish we'd just stayed lower on the ladder y'know, doing the grunt work."\n\nThe pair took a moment to grin faintly at one another - if nothing else they knew that once their overclocked brains could switch off, they'd be able to look back on this and laugh. Gabriel let out a sight as he turned back to his inspections, making sure everything was in top quality - before the door suddenly burst open with a furious swing.\n\n"What the hell are you people doing? We don't pay you to sit around and slack off! We have quotas to fill, and we need them filled soon people!"\n\nAnd just like that, as soon as they had arrived, they were gone. Gabriel took a long, hard look at his remaining workload -the higher-ups wanted it done tonight. All the coffee in Minas Gerais wouldn't fuel him for that long, but he knew the threat of his job would. He went to pour the two of them another cup - God knew it was necessary - taking a moment to let the atmosphere take him; he knew it would be the last moment of peace he had for a good while."
brazil_lacerda_samba.88.a: "It was going to be a long, long night."
brazil_lacerda_samba.88.tt: "£GFX_BRA_UDN_statism_texticon §YEconomic Statism§! has reached 75%. The following effects will be applied:"

brazil_lacerda_samba.89.t: "We Aren't So Different, Here and Now"
brazil_lacerda_samba.89.desc: "The Brasília Palácio Hotel was the child of the modernist age. Wide windows, sharp pillars, and a splash of Cubist art defined the strange beast. Fifty years ago, it'd be hard to find a building like it outside of the metropoles of the Old World. Considering these foreign credentials, it is therefore quite curious that a die-hard nationalist group was meeting here.\n\nThis conference, the Frente Parlamentar Nacionalista, was a loose collection of senators organized around preventing foreign competition from overwhelming Brazil. Attending was a diversity of political stripes. Closet communists rubbed shoulders with liberals, and social democrats kept up polite conversation with hard-line reactionaries.\n\nBy now, the conference has ended. The speakers and their audience had all gone off to the generously-sized bar. In the past, this was where lips loosened just enough that some old Varguists would go on wild tirades against the UDN and their love for foreign capital. The few UDNites attending just had to try and ignore it. Times had changed, however.\n\nMany were expecting to hear the same rants, especially as their enemy controlled the Presidency. Yet this year, they were silent. As well, the conference had eight UDN Senators joining the group. Who could blame them? The protectionist system had been maintained, and arguably strengthened, under their party's rule."
brazil_lacerda_samba.89.a: "It's hard to fight against the Man, when the Man is on your side."
brazil_lacerda_samba.89.tt: "£GFX_BRA_UDN_cooperation_texticon §YCooperation§! has reached 25%. The following effects will be applied:"

brazil_lacerda_samba.90.t: "Going for Broke"
brazil_lacerda_samba.90.desc: ""Listen here, Frank," a financial broker intoned, remembering the Merrill Lynch sign on the opposite wall. He wouldn't be seeing it for long if he screwed it now. "Brazil's economy is booming, deals are getting done, you wouldn't want to miss such a safe bet while it's on the ground floor, would you?"\n\n"Well, I wouldn't go that far," his wealthy client retorted. "The Reader's digest report a couple weeks ago still left some doubt, and the Reader's Digest wouldn't lie."\n\n"A couple weeks ago? How about we talk about right now? Yields are decreasing, housing prices are moving nicely, and politics..." Damn it, politics. He barely knew where the capital was on the map, let alone what they were doing there. He glanced at the notes he received on party politics, and began the bluff.\n\n"We here at Merrill Lynch have been looking at Brazil for years, and this is the most united their Senate and... their Congress has been in ages. A little less political stability in the short term, sure, but things are getting done, bills are getting passed. This is the best case to cross my desk in months, my friend, and with your portfolio, it'd be the cherry on the cake."\n\nHe sat there positively red in the face, static, save for a few fidgeting fingers, as the second hand inched to twelve. He wasn't leaving this place without triple digit sales, and some dumb sonofabitch fatcat wouldn't get in his way. Just buy, for God's sake.\n\n"Tell you what: $2000 worth of index fund shares, of that much you convinced me. If it goes the way you say, I'll consider getting in touch again soon."\n\nThe broker's face regained its natural hue. "Thank you for your vote of confidence, sir. Brazil sends its regards.""
brazil_lacerda_samba.90.a: "Cooperation heals all ills, from Brasília to New York."
brazil_lacerda_samba.90.tt: "£GFX_BRA_UDN_cooperation_texticon §YCooperation§! has reached 50%. The following effects will be applied:"

brazil_lacerda_samba.91.t: "The Once Unthinkable, Now Inevitable"
brazil_lacerda_samba.91.desc: ""Today was decision day. It came down to Armando to choose a new financial analyst for Eletrobras, and while a personnel manager like himself had made choices like this more times than the company received subsidies, it felt as if he were doing so for the first time.\n\nWell, it still wasn't rocket science. There was one candidate that would get chosen every time, that is, if Eletrobras hirings were not political. To their misfortune, they were, and despite a stellar interview and good credentials, there was no sweeping this particular history with Rio labor unions and the local PTB under the rug. Worse still, his UDN friends weren't giving him any recommendations to "simplify" the process either.\n\nBut did it matter anymore? He remembered a time in the organization where everyone involved was a different shade of blue, UDN supporters, donors, members or former representatives. Now, he could walk a few meters and see a PSD associate at the desk, and honestly, maybe a PTB sympathizer or two. Just as the National Congress became more collaborative, so did public companies.\n\nEh, whatever. The UDN people don't even pay him the same dues as they used to. Might as well just hire the guy, even if he is basically a communist, and hope he doesn't cause any trouble. Maybe it could be... healthy, hearing a different viewpoint or two?""
brazil_lacerda_samba.91.a: "Every workplace benefits from new voices, surely."
brazil_lacerda_samba.91.tt: "£GFX_BRA_UDN_cooperation_texticon §YCooperation§! has reached 75%. The following effects will be applied:"

brazil_lacerda_samba.92.t: "Living Up to Your Reputation"
brazil_lacerda_samba.92.desc: "The Brasília Palácio Hotel was the child of the modernist age. Wide windows, sharp pillars, and a splash of Cubist art defined the strange beast. Fifty years ago, it'd be hard to find a building like it outside of the metropoles of the Old World. Considering these foreign credentials, it is therefore quite curious that a die-hard nationalist group was meeting here.\n\nThis conference, the Frente Parlamentar Nacionalista, was a loose collection of senators organized around preventing foreign competition from overwhelming Brazil. Attending was a diversity of political stripes. Closet communists rubbed shoulders with liberals, and social democrats kept up polite conversation with hard-line reactionaries.\n\nBy now, the conference has ended. The speakers and their audience had all gone off to the generously-sized bar. In the past, this was where lips loosened just enough that some old Varguists would go on wild tirades against the UDN and their love for foreign capital. The few UDNites attending just had to try and ignore it. Times had changed, however.\n\nDuring the conference, a group of UDN senators asked a speaker about the importance of growth versus domestic control. The speaker politely dodged the question, but even so, a fierce argument broke out between the group and other audience members. Following that incident, every UDN member walked out. They would not be returning anytime soon."
brazil_lacerda_samba.92.a: "Most people were simply surprised it hadn't happened sooner."
brazil_lacerda_samba.92.tt: "£GFX_BRA_UDN_intransigence_texticon §YIntransigence§! has reached 25%. The following effects will be applied:"

brazil_lacerda_samba.93.t: "A Sign of Schism"
brazil_lacerda_samba.93.desc: "Indústrias Romi S.A.\nSanta Bárbara d'Oeste, São Paulo\n\nDATE: [?global.date.GetDateStringNoHourLong]\n\nMEMORANDUM TO ALL EMPLOYEES\n\nSenior management has recently been made aware of an incident taking place amongst a group of employees on the second floor. It is believed this was caused by an escalated political discussion involving views belonging to various political parties and/or organizations. In response, strong disciplinary action has been taken against all those involved with this breach of company policy.\n\nThis is a reminder to all those employed at Indústrias Romi of the importance of our working community which supersedes workplace disagreements. Zero tolerance will be shown towards any altercations, political in character or not, which violate our shared values, and sanctions will be imposed on any continued misbehavior, including suspension or, if necessary, dismissal.\n\nINDÚSTRIAS ROMI SENIOR MANAGEMENT TEAM"
brazil_lacerda_samba.93.a: "Typical."
brazil_lacerda_samba.93.tt: "£GFX_BRA_UDN_intransigence_texticon §YIntransigence§! has reached 50%. The following effects will be applied:"
brazil_lacerda_samba.93.tt2: "The $BRA_party_ptb_c$ will §Rno longer§! cooperate with us in the Senado."

brazil_lacerda_samba.94.t: ""Even the Little Men are Arguing""
brazil_lacerda_samba.94.desc: "Outside of the Southeast, most parties are cooperative in local level bureaucracies. If it be due to a desire to improve the nation, or a disinterest in shaking up the status quo when said status quo feeds you and your family, is up for debate. This is no longer true in Várzea Grande.\n\n"Goddamnit. You're absolutely certain, kid?" Carlos gestured with a sense of urgency at his intern. His button-up shirt was stained with sweat. Michael nodded solemnly. "Yes. They claim the damming project would put excessive pressure on the budget and inflation, and affect fish populations-"\n\nCarlos broke into a cruel, dry laugh. "You're kidding me! Those UDN bastards care about fish now?" The intern looked questioningly at his superior. Carlos calmed somewhat. "I know you're new, kid, so listen. We do our jobs. We get our pay. We don't suddenly demand twenty-something revisions over fish."\n\nMichael flicked his eyes from his boss to the hallway, then back to his boss. "...sir, are you certain it's okay to say things like this? Isn't it literally our job - to investigate proposals?" He clenched his pen, embossed with the logo of a local public university.\n\nCarlos had to keep down another laugh. "Kid, everyone in the system either worked their ass off to get a stable career here, or had a family nice enough to get them in." He gestured to the phone. "Even those UDN men. God only knows why they're acting out. Maybe to move up. But honestly, do you see anyone else pulling this?""
brazil_lacerda_samba.94.a: "Slowly, the eternal mountain of Brazilian bureaucracy is chipped into nothingness."
brazil_lacerda_samba.94.tt: "£GFX_BRA_UDN_intransigence_texticon §YIntransigence§! has reached 75%. The following effects will be applied:"

brazil_lacerda_samba.95.t: "Left Out to Dry"
brazil_lacerda_samba.95.desc: "A trickle, and then the flood. In the form of votes, then headlines, and now the snide remarks. From his desk, Vice President Távora glowered at the Udenista careless enough to make a crack about Sur-realistas while passing in the highway. At least Távora's scowl still had enough authority to send the minor politician scuttling back to whichever dam-hating hole he had emerged from.\n\nBut the first newspaper the Vice President's eyes returned to, Tribuna da Imprensa, was little better. "PTB-UDN Hydro-Electric Plans All Wet" blared from the top of its page. Its neighbor, O Globo, proclaimed, "PTB Seduces UDN Into Northeastern Folly". Távora clenched his fist at that. Folly it had not been, nor the PTB's idea. The dams had been his prerogative, and they would have secured the Northeast as a stronghold of the right for generations if those damn Varguists hadn't convinced him to water down the bill....\n\nWell, Távora thought, folding up the papers and stuffing them into his briefcase with as much dignity as he could muster. That was not a mistake he would make again. Reaching across the aisle had resulted in personal humiliation, divisions in the UDN, several hostile squawks of the Crow, and the creation of precisely zero volts."
brazil_lacerda_samba.95.a: "So much power, wasted."

brazil_lacerda_samba.96.t: "In The Mouth, A Desert"
brazil_lacerda_samba.96.desc: "Vice President Virgílio Távora could feel his throat itch. The UDN Senators, the fellows he had wrangled with to weaken the hydroelectric bill in accordance with President Lacerda's whims, were staring at him from across the floor with a mix of shock and disgust. The compromise he had badgered them into had failed. Not enough votes.\n\nWith his soldier's bearing, Távora stood and departed. His tongue felt swollen and thick against the base of his mouth. He could hear the recriminations breaking out behind him. He could imagine the swirling mass of reporters ahead. And behind them lurked Lacerda, surely to demand an explanation for the failure of Távora's initiative.\n\nNone of them had seen the Jaguaribe flood in Ceará, the homes and the crops ripped from the earth. Families scavenging in dark streets for sodden belongings. Cities with no light, beggars lingering outside Fortaleza's vacant industrial parks...\n\nTávora slammed the door of the waiting car and curtly ordered, "Drive." Out the window, a glowing neon sign, beckoning him to drink an ice-cold cola."
brazil_lacerda_samba.96.a: "He would have spit if he could."

brazil_lacerda_samba.97.t: "he All-For-Nothing Politician"
brazil_lacerda_samba.97.desc: ""Quite the gamble, eh, Virgílio?" said Carlos Lacerda, leaning forward across the presidential desk. "Have you been studying your predecessor Quadros' methods? To be his match in both wildness and incompetence is quite the feat."\n\nVice President Távora nearly got a word in, but Lacerda's dismissive wave cut him off, "But don't think the same trick will work on me twice. Next time you threaten to resign over something as inane as this hydroelectric dam plan, I will accept. Because there is no place in this administration for fools, much less fools that cannot pass their legislation after extorting my full support."\n\nTávora's glare hardened. The thought of resigning rather than to submit to this abuse ran like a bolt of lightning through his mind. He could leave this Crow picking at the dying carrion of the UDN.\n\nNo - resigning now, at the nadir of his reputation, would just cement his Vice Presidency as a failure. It took every ounce of discipline that the Realengo Military School had drilled into him, but Távora stood and excused himself politely. And in leaving, saw in the warped mirror of a polished decorative brass, the eyes of Lacerda boring into the back of his balding head."
brazil_lacerda_samba.97.a: "And perhaps a glimpse of a world where he had compromised instead."

brazil_lacerda_samba.82.t: "The Man Behind the Sunglasses"
brazil_lacerda_samba.82.desc: "Raphael Magalhães strode onto the stage to the greatest fanfare of the night. Everyone that attended this campaign rally had come to see the Wizard of Guanabara, Lacerda's successor, headliner of the UDN's second national tour. Somewhere at the back of the crowd, sitting in the box seats, Virgílio Távora sat with a glass of wine in his hand and watched it filtered through dark sunglasses.[LacerdaConferenceParagraph2][LacerdaConferenceParagraph3][LacerdaConferenceParagraph4][LacerdaConferenceParagraph5]"
brazil_lacerda_samba.82.a: "The Wizard finds allies and familiars among Távora's lot."
brazil_lacerda_samba.82.b: "The Wizard would find little mana among Távora's lot."
BRA_lacerda_conference_p2_v1: "\n\nHe opened his speech on economic matters. Távora remembered the long nights he spent keeping Lacerda's knife from ripping apart the budget. A little fat, here and there, to sate the blade. But staring at Magalhães on stage, Távora wondered if he could grab his hand once he took the knife. He brought the wine up to his lips, sipped nervously."
BRA_lacerda_conference_p2_v2: "\n\nMagalhães opened his speech with a line about their commitment to the Brazilian people. "Horseshit," Távora muttered, sipping at his wine. Sure, the dreaded beast of inflation had been slain. But how many jobs had been lost, how many people had lost the government's guiding hand, when the Banda hacked the budget apart?"
BRA_lacerda_conference_p3_v1: "\n\nMagalhães then turned his speech towards the Northeast, and the new initiative set up by the UDN to fight the ongoing droughts there. His name would never be mentioned, but the right people knew that was Távora's work. He would be satisfied with that. It was better for the UDN overall to look good. But he thought about his home, the parched and tired land given new life, and he let himself smile a little."
BRA_lacerda_conference_p3_v2: "\n\nWith that telltale magician's flourish, Magalhães' hand flew into the air as he then spoke of the UDN's restoration of critical infrastructure. He was speaking of the compromised Hydroelectric Renewal Bill. It helped the Northeast a little bit, but there were still large pockets of desiccated land, still relying on candlelight to see through the night. Távora had seen those places. He took a longer sip."
BRA_lacerda_conference_p4_v1: "\n\nA hush had fallen over the room as Magalhães spoke of the Riots. Here, he was compelled to thank Távora by name, but it earned no smile from him. He was owed far more for pulling Brazil through that nightmare. Months of negotiation, late nights and bitter meetings, all to prevent further bloodshed in the streets, had earned him no more than some kind words. Távora brought the wine glass up and swallowed the rest of the contents."
BRA_lacerda_conference_p4_v2: "\n\nWhen the speech turned to the Riots, there was a solemn silence amongst the audience. It was thanks to the bravery of police units across Brazil that they were contained, that order prevailed against the growing chaos in the streets. A frisson of disgust rippled down Távora's arm. He saw the glass shaking in his hand, but he had drunk so much already that the liquid stayed in its glass."
BRA_lacerda_conference_p5_v1: "\n\nThey had never seen eye to eye on much, but Lacerda knew when to listen to Távora. He respected that, or at least felt compelled to respect that. When the time came, and the campaign rolled out in earnest, the Northeast would rally for Magalhães. Távora felt he owed him that much."
BRA_lacerda_conference_p5_v2: "\n\nFor five years, Távora had suffered the radical nonsense that Lacerda pushed upon Brazil. Yet Magalhães stood on stage to prolong those same impulses. When his campaign finally began, he would find nothing in the Northeast. The Realistas would campaign for themselves alone—just as the Banda had charged ahead on their own."

brazil_lacerda_cisplatina.1.t: "Icarus"
brazil_lacerda_cisplatina.1.desc: "When Carlos Lacerda crushed the strikers and secured his legacy, many who knew the President personally would say that they could feel the pride emanating from the man. People who joined him for official dinners and public occasions noticed that he was in much higher spirits than before the strikes - a glimmer in his eye and a spring in his step that had been previously absent. But when Vasco de Cunha found himself sitting in a hot afternoon in the Plantaldo with Geisel and Golbery of all people, that glimmer in the President's eye took on a whole new meaning.\n\n"The goal here is to put an end to this squabble once and for all," Lacerda began, idly swirling the ice cubes in his drink. "Show the bastards that we are done laying down and pretending that we're equals. Geisel, Golbery, I am approving a drastic increase in military funding alongside the scale of this year's wargames. And I wish for them to be on the Argentinian border."\n\nThe foreign minister's heart practically stopped, half-expecting the President to announce it was some kind of sick joke. But no such comment was made. "Surely not, sir? Tensions have increased dramatically the last few years, we'd be fools to prod them now-"\n\nLacerda held up his hand to silence Vasco, shaking his head. "That is exactly why I must do it. We are in the endgame, and we possess all the cards. I will win this." The two military men were nodding their heads up and down like the loyal hounds they were, practically slavering at the proposal. Geisel murmured something or other about timing or funds, but the foreign minister fell silent. He finally understood that the fire in Lacerda's eye was not simply pride or confidence. Not anymore."
brazil_lacerda_cisplatina.1.a: "It had become hubris."

brazil_lacerda_cisplatina.2.t: "Bolster the Bulwarks"
brazil_lacerda_cisplatina.2.desc: "Lacerda exhaled deeply.\n\nThis was the third hour of a cabinet meeting on Argentina, and they had gone through four—no, five—revisions of what to do about the upcoming war games. There were too many things to consider.\n\nFor one thing, there was the question of tensions. Sure, it's all about puffing out your chest a little bit, but it's not like they wanted a war. If they went too far, it would be 1851. Of course, Lacerda wasn't going to kowtow and give in. He still needed a demonstration of military might. But that wasn't to mention the cost and the organization of the damn thing, and who the hell was going to command it!?\n\n"Carlos?" Golbery's face stared back at the President, slightly concerned as Lacerda focused his attention again.\n\n"Yes, Minister?"\n\nGolbery looked to the side for a moment, clearly having already asked his question. "What is your decision, Mr. President?" Lacerda looked down at his desk. Three options lay before him.\n\nThe first, the most moderate of the bunch, was to simply invite advisors from the surrounding states to observe. A decision that would certainly keep tensions low, but would also be far from a strong show of force. The second was to have the aforementioned advisors participate in joint training. A strong centrist approach. The third, and most risky of all, was to send OFN and American advisors to Brazil. Sure to infuriate the Argentinians, but also sure to demonstrate the OFN's support for the Brazilian military.\n\nAdjusting his glasses slightly, Lacerda made his decision. There was much more to discuss, and stressing over the decision would do Brazil little good."
brazil_lacerda_cisplatina.2.a: "Invite the Americans."
brazil_lacerda_cisplatina.2.b: "Strike a balance."
brazil_lacerda_cisplatina.2.c: "Play it safe."

brazil_lacerda_cisplatina.3.t: "Fear Is the Mind Killer"
brazil_lacerda_cisplatina.3.desc: ""...And finally, a word to the man in Buenos Aires!" The call and response issued by Lacerda's booming voice yielded an ocean of whistling and shouting. It was a rally down to the very name. "And let us be clear that we do not mean just any man in Argentina, but those who profit off of chaos, destruction and violence. Those who foment fear, corruption and evil to excuse their own!"\n\n"From those of us proud Brazilians here in Guanabara, but any of us Latin Americans across the continent that stand with us, those of us who take pride in our ballots and in our democracy despite whatever else we may believe, do not be mistaken! Brazil will defend itself, its people and its allies! You will not take the torch away from this party, our people or our friends! Thank you all!"\n\n"Well, the printing presses are definitely heating up," da Cunha gleefully noted. "Even Última Hora can't deny the "wide appeal" of what you had to say, sir. Sure, they lament the "zombification" of the print world and are still calling it a "contrived crisis", but we have support. We will be able to press forward."\n\n"I saw that, too," Lacerda grinned. He hadn't been in that world for all that time not to be able to get them talking. "How are the Argentinians?"\n\n"More muted in their reactions, unsurprisingly. We received a memo condemning the use of the word "threat" as much as you did, though I'm sure they of all people must understand an election needs a bit of passion. In any case, I wouldn't count them out, Mr. President, we still need a hefty dose of caution. Today is not the day to start misreading the Casa Rosada.""
brazil_lacerda_cisplatina.3.a: "Words can be weapons just as effectively as missiles."

brazil_lacerda_cisplatina.4.t: "Diplomatic Games and War Games"
brazil_lacerda_cisplatina.4.desc: "The Argentine embassy in Brasília had long been a center of intrigue, smoke filled rooms that marked the nerve center of Argentine intelligence operations in Brazil. There were often cars passing through, with cover stories about diplomatic paperwork, and Brazilian authorities sat behind cameras trying to document every one. This time a car passed through the embassy gates, and this time too it was photographed, but the man inside was widely known, and the men taking the photos were journalists.\n\nForeign Minister Vasco de Cunha had an appointment with the ambassador and his staff. Ever since war games had been announced tensions had been running at a fever pitch. This meeting was Lacerda's attempt to mollify the worries of Buenos Aires, and ensure that war games remain merely games. As he steps into the meeting room and shakes the hand of the ambassador.\n\n"Thank you Honoured Ambassador for giving me this meeting." The ambassador looks like he is about to start but de Cunha strikes first knowing all too well the words that are to come. "I assure you that our war games are not intended as a threat to your nation, you understand? We are meeting with our allies, giving our troops the chance to build relationships with troops they may have to fight with, we are not doing these war games as a prelude to any aggression you must understand."\n\n"It is nice to have a meeting with someone so close to Lacerda himself. I know that you do not mean any aggression, but I also cannot deny your war games have inflamed the situation back home. The press is running story after story about how your war games are a prelude to a wider war. I want to work together to put the press' worries to rest but we do need to work together to that end, not just have you go off and do your war games without telling us, there has to be some dialogue, you must understand." The ambassador replied."
brazil_lacerda_cisplatina.4.a: "A dialogue we will have, Mr. Ambassador."

brazil_lacerda_cisplatina.5.t: "Swimming With the Sharks"
brazil_lacerda_cisplatina.5.desc: "The sea air was bracing, as always. There was a distinct chill to it in the South Atlantic that Admiral Toscano had long gotten used to but never quite tired of. Licking away the salt upon his lips, he gazed outwards at the great Brazilian fleet. When he was asked to lead a series of naval maneuvers off the coast of Uruguay, he jumped at the chance. The Lobster War had left him and the rest of the fleet eager to see some action, after all.\n\nToday, it was simulating anti-submarine action. Standing high upon none other than the pride of the fleet, the Minas Gerais herself, Toscano felt both serene and practically invincible. Was this how the great naval captains of the past felt when looking upon their own fleets? He could only wonder.\n\nBut that blessed silence was interrupted by the crackle of the radio. "Admiral Toscano, paging Admiral Toscano. This is an urgent matter. Unidentified ships have been spotted on the horizon, over." The admiral's brow furrowed. Unidentified ships? But he had it on good intelligence that the Uruguayans rarely patrolled this area. He picked up the radio, ready to speak into it before spotting on the horizon exactly what the radio meant.\n\nIn the distance, sailing at the same exact pace as the Brazilian fleet, was a vast fleet of ships comparable to their own. And whilst he could not see the exact markings adorning all of them, he could hazard a guess. He suddenly felt very small, that comfortable sea breeze taking on a much icier tone. If they were content to not interrupt, then he would pay them no mind. They were sailing in allied waters, after all. Whilst no words were exchanged between the two fleets, Toscano knew the exact message they were sending."
brazil_lacerda_cisplatina.5.a: "Try something. We dare you."

brazil_lacerda_cisplatina.6.t: "A Familiar Kind of War"
brazil_lacerda_cisplatina.6.desc: "As the American-made tanks rolled past a series of defensive lines, they quickly came under intense fire from a fortified hilltop position bristling with anti-tank guns. You could be forgiven for mistaking this scene for one from World War II rather than a setpiece from a Brazilian wargame.\n\nErnesto Geisel couldn't help but draw comparisons as he watched the mock battle through his binoculars. The carnage was all too similar to what had taken place on the green fields of Wales some twenty years ago, as were the tactics used.\n\nGeisel couldn't help but wonder if such tactics would really work against the Argentinians if, God forbid, war broke out? He shuddered to think what would happen if Brazil's rivals had taken steps to update their playbooks to the 1960s; things had certainly changed since those days.\n\nThe advent of advanced electronics, jet engines, more accurate artillery, and helicopters were worth considering, so why did the Brazilian Army seem intent on reliving past glories instead?\n\nThe sound of a plane overhead drew Geisel's eyes skyward. A jet of unknown make screamed across the sky, just as the mock tank attack had stalled just before reaching the hill. There was little doubt in his mind that it could have belonged to the Argentines.\n\nTheir participation in these war games was no secret to anyone. His radio crackled to life as he sent an order to scramble fighters to their location to scare off the intruders. If it really was Buenos Aires trying to sneak a peek, it only added to Geisel's fears.\n\nAll they would learn was that their potential enemies were stuck in the past, vulnerable to the new fangled devices of the modern age."
brazil_lacerda_cisplatina.6.a: "War never changes, or does it?"

brazil_lacerda_cisplatina.7.t: "Games of War and Chance"
brazil_lacerda_cisplatina.7.desc: "Dust clouds are kicked into the air as tanks roll across the field, the armored behemoths dwarfing the smaller infantry running alongside. Orders are barked, the tanks halt, then fire, gray gunpowder smoke mixing with the dust. A pair of helicopters fly overhead, before rockets are launched, streaking into the distance.\n\nGenerals in their best uniforms and men wearing sunglasses watch over the simulated military operation from a temporarily erected grandstand. They only look away from binoculars to write something on their notepads or answer a walkie-talkie, before returning their eyes to Cisplatina 70, one of the largest military exercises ever conducted in South America.\n\nIn another grandstand, a row of movie cameras follow the action. Reporters with smaller handheld Kodaks take snapshots, while a military attaché explains what is occuring to the untrained civilian eyes, so they can accurately report to their readers, listeners, and watchers, at what would happen if "the enemy" ever dared attacked Brazil or Uruguay. It didn't take a masters in geography to know who the unnamed adversary would be.\n\nHundreds of miles away, President Lacerda is about to climb onto a stage to rally his supporters in Curitiba.\n\n"Any news from Cisplatina?" he asked. The aide manning the secure phone line that had been hastily set up shook his head. Lacerda nods, looking at his watch. It had only just begun, so it would be some time the results would be known. It was almost time to give his speech. Soon enough, he would know."
brazil_lacerda_cisplatina.7.a: "And hopefully, it will all go according to plan."

brazil_lacerda_cisplatina.8.t: "Flex of Muscles"
brazil_lacerda_cisplatina.8.desc: ""Defense experts have stated that the Cisplatina 70 wargames that just concluded have been a great success. The Brazilian army has performed admirably in the simulated military operation, showcasing the large strides the armed forces have made in the past decade. Contingents of Uruguayan, American, and other allied forces who participated also showcased their professionalism and élan, working together as a single, well oiled machine."\n\nLacerda was giddy with excitement as he watched the news report on the TV, as video of tanks rolling over open ground and firing at distant targets, helicopters swooping overhead, and friendly soldiers from multiple nations all shared drinks and smokes. Cisplatina 70 had been a huge success, showcasing the advances the military had made since he had come to power, as well as the diplomatic alliances he had forged. Already UDN candidates across the country were loudly proclaiming the success of the operation, showing how Lacerda was defending the nation. Surely, some votes might be swung their way.\n\nThe phone suddenly rang, and an aide hastily picked up the receiver, listening for a moment before motioning for Lacerda. The President walked over, picking up the handpiece.\n\n"Mr. President, Buenos Aires has called," Minister of Foreign Affairs Vasca da Canha said. "Long story short, they want to talk on how we can decrease tensions across our borders."\n\nLacerda didn't know if he could have been more happy. Being able to show strength at home and abroad had just killed two birds with one stone."
brazil_lacerda_cisplatina.8.a: ""Tell them we accept.""

brazil_lacerda_cisplatina.9.t: "Show of Force"
brazil_lacerda_cisplatina.9.desc: ""Defense experts have stated that the Cisplatina 70 wargames that just concluded have been a good showcase of their abilities. The Brazilian army has performed well, despite some minor hiccups, in the simulated military operation, showing that they have made progress in the past decade. Friends and allies of Brazil have also participated, showing that we do not stand alone."\n\nLacerda was quite happy as he watched the news report on the TV, as video of tanks rolling over open ground and firing at distant targets, helicopters swooping overhead, and friendly soldiers from multiple nations all shared drinks and smokes. Cisplatina 70 had been a good success, though maybe not quite as flashy as he would have hoped for. It hadn't stopped some UDN candidates across the country trying to pump up the success of the military build up, showing how Lacerda and Defense Minister Magalhães were defending the nation. But it was hard to say if it was effective in really swinging the needle.\n\n"We've done decently well. Can you connect me to Minister de Canha?" An aide picked up the phone and dialed into the Foreign Ministry in Brasília, before handing it to the President.\n\n"Any word from Buenos Aries?"\n\n"No. They have stayed silent. Perhaps in a few days, once they wouldn't lose face, they may call."\n\nLacerda didn't buy it. If they weren't cowed by Brazil's military and diplomatic support, they must know something that he didn't."
brazil_lacerda_cisplatina.9.a: "They must be planning something..."

brazil_lacerda_cisplatina.10.t: "Display of Incompetence"
brazil_lacerda_cisplatina.10.desc: ""Defense experts have stated that the Cisplatina 70 wargames that just concluded have been a complete disaster. The Brazilian army's simulated war game bogged down within the first few hours, and all efforts to get back on track failed. The Ambassador of Argentina released a statement, denouncing the 'unprovoked and dangerous escalation of military force in South America.'"\n\nLeonel Brizola appeared on the TV screen, fury and scorn on his face. "It was a complete farce, a UDN failure-"\n\nThe TV was turned off with enough force to pop the dial off. Lacerda scowled as he went back to his desk, snatching the phone. "Get me Golbery!" he screamed into the receiver. A few minutes later, Defense Minister Golbery do Couto e Silva walked in, face emotionless.\n\n"That was an utter embarrassment! All that we spent on the army, and this was the best that could be done? This will spell disaster for the UDN in the election!"\n\n"Mr. President, I know it doesn't look good, but it was a learning lesson for the military: we know the officers that need to be removed, we are reevaluating training and maintenance procedures. If we had been able to convince some allies to participate, then we could have at least shown a united front."\n\n"But we need to fix these issues now. We will increase the defense budget, purchase more weapons. We will go to the media to try to do damage control. But we have to get things fixed and fast."\n\n"I understand. But just be careful, Lacerda.""
brazil_lacerda_cisplatina.10.a: ""The Military doesn't like being humbled by politicians.""

brazil_lacerda_cisplatina.11.t: "The 3 AM Call"
brazil_lacerda_cisplatina.11.desc: "A siren began to wail. Then another. Soon, a dozen were screaming into the night. Lacerda, bleary eyed, woke up as he heard footsteps running outside followed by pounding on his door. His wife Leticia groaned. "What is happening?"\n\nThe door slammed open. "Mr. President! We must evacuate now!" Several men rushed in and grabbed Lacerda and his wife Leticia, half carrying, half dragging the half dressed and half awake President and First Lady out of the Presidential residence, the Palácio da Alvorada and into a car, which raced toward the Palácio do Planalto, the Presidential workplace. The occupants were hurried down into the bunker underneath. It took less than two minutes.\n\nGeneral Ernesto Geisel pouring over maps and reports to the side. Golbery and Vasco de Canha were already there, similarly half dressed, but wide awake.\n\n"Mr. President, Argentina has struck fortified positions all along the border with artillery. Troops have been reported crossing the Uruguay River. Air strikes have hit airfields as far as Rio and Minas Giras. It's war."\n\nLacerda's eye twitched. "Filhas-da-puta! A surprise attack! I want an immediate response! Hit them with everything we have!" The General nodded, picking up a phone and barking orders.\n\n"I've already sent word to our allies, and to the US of this attack," de Canha said, his body and voice shaking. "I'm just afraid that this war will escalate."\n\n"Escalate or not, we will defend ourselves from this attack." Lacerda said."
brazil_lacerda_cisplatina.11.a: ""And we will crush Argentina, once and for all!""

brazil_lacerda_world_tour.1.t: "The Fool's Journey"
brazil_lacerda_world_tour.1.desc: "There was a long list, it seemed, of Brazilian political figures who washed up in Uruguay after they fell from grace back home; Carlos Lacerda was the latest of that unhappy lineage. The former President of Brazil now found himself plodding across Plaza Independencia like a tourist, morosely eyeing the old women feeding the pigeons on a nearby bench.\n\nMaybe Távora was right. The man had been on Lacerda's shoulder for years, preaching moderation, caution, warning against pulling the trigger at any given moment. Lacerda had thought it dull, lacking all passion, but he was here, and Távora was now President, perhaps something was to be said for that.\n\nHe had been to this plaza for the first time with his father, back when Mauricio Lacerda had been ambassador in 1930. They had also defeated his father, burdened him with a reputation, making his name sour to speak. His father hadn't been able to fight back, and Lacerda felt sorry for him, despite the man's many faults.\n\nNo, dammit, he wasn't going to let the same thing happen to him. He wasn't going to watch his every ambition float away on the Rio de la Plata, like the desperate and defeated before him. Távora, Vargas - all of them had tried to drag him down for years, and every step he took, every breath he drew, was a repudiation of their demagoguery and hate.\n\nHe moved with new vigor, startling the pigeons, as things connected in his mind. The exiles, Vargas' enemies - they were here, in Uruguay. He could meet with other Brazilians, organize them, recruit them into a real movement, the struggle against Varguism, Fascism, and Communism.\n\nIn fact, why the hell should he stop at Uruguay?"
brazil_lacerda_world_tour.1.a: "Next stop: Mexico City!"

brazil_lacerda_world_tour.2.t: "The Hermit"
brazil_lacerda_world_tour.2.desc: "There was a good crowd at the hall of the Centro Cultural Brasil-México. Lacerda allowed himself to be pleased at the turnout, that it indicated his continued relevance. That many of them were press, here for the novelty of a former President, was really neither here nor there - if they did not report on his efforts to create a movement, how else would Brazilians abroad find out about it?\n\nHe had prepared a speech on the flight over, and a rather good one, even in Spanish. Brazilians could be found near-everywhere, and their political potential had been routinely overlooked. The words flowed easily from the page, and an opportunity for oration was well-appreciated.\n\n"That's why," he was saying, "Brazilian citizens who might've left the homeland due to fear of political persecution shouldn't feel as though they must renounce being a political agent."\n\n"Thanks for your permission, Mr. President!" Someone called out from the crowd in Portuguese. A young woman stood out from her seat, staring daggers into him. "Did you ever consider that some of us left because of you?"\n\nA few people clustered around the woman jeered Lacerda - the local press craned around to see the commotion, scribbling away in their notebooks. The young woman stood her ground, and Lacerda quickly tried to regain composure. "Would you like to tell me why you ended up here, miss...?"\n\n"My name is Orlandina de Oliveira. I am from Araguari. And I am here to represent the Brazilian diaspora who condemn the planter-capitalist class you allied with, who condemn the American imperialism you collaborated with, who condemn your hypocritical little press tour, Lacerda! Remember, you were defeated by the working class of Brazil! Always remember!""
brazil_lacerda_world_tour.2.a: "As venue security took her away, Lacerda considered that this might be harder than he thought."

brazil_lacerda_world_tour.3.t: "The Magician"
brazil_lacerda_world_tour.3.desc: "Not long ago, Lacerda would've stayed at the Havana Hilton, its sleek modern style a totem of American influence in the harbor city, but this time he was at the Hotel Nacional de Cuba, whose Sevillian, art deco edifice on the seafront recalled the interwar era. From the veranda, the crystal blue waters glistened in the sun, and Lacerda took the moment of tranquility to consider his next move.\n\nHe had written letters and paid visits to some of the notable Brazilians in Cuba, at least those who were approachable. Lacerda could not expect a warm welcome from every fellow countryman who had ended up in the home of revolution, but there would likely be enough anti-Varguists and anti-fascists to make some difference.\n\n"Mind if I take a seat?" A gruff voice brought Lacerda to reality, and he turned to see a figure sporting olive-drab fatigues pulling out the chair next to him.\n\n"By all means, El Presidente." Lacerda replied, noting the hotel staff peeking out from the shaded bar at the two guests. Beside him, Fidel Castro scratched his beard, sat, and looked out onto the sea.\n\n"I had to see you when I heard about this tour of yours, Mr. Lacerda." Castro's tone was too familiar, perhaps to put the Brazilian off-guard. "Your administration and mine hardly saw eye-to-eye that much, but I didn't enjoy seeing it end like that. There's no dignity in it."\n\n"Funny, I thought you might be here to gloat."\n\n"Me?" Fidel pulled out a cigar. "That would hardly be hospitable. You fought a losing fight, that's all. Happens to anyone." The lighter clicked, the rich aroma of tobacco filled the air. "Still, Carlos, you came out of it alright...""
brazil_lacerda_world_tour.3.a: ""...Some men ended up against the wall for less.""

brazil_lacerda_world_tour.4.t: "The Devil"
brazil_lacerda_world_tour.4.desc: "Lacerda was being followed as soon as he had met the tarmac at Tempelhof. This was not surprising in the least, but he hadn't accounted for the weight of the watcher's gaze. Everything in Germania was heavy, like the air could buckle the suspensions of Hindenburgbrücke as he crossed.\n\nHe considered his situation sitting in a cafe off Potsdamer Platz. It wasn't as if he had come to Germania to find a good time - but what did he come here for? The answer was unintelligible. He sat over a coffee in the belly of the great beast he not long ago had been in a righteous struggle against. He might still have been, if not for Távora's treachery.\n\nThe cobbled streets, winding back to an old Europe, and rising between them the monuments and institutions of Nazi architects, pointing fatally to some inhuman future, suffocated Lacerda. He felt suspended in the jaws of Brandenburg Gate, behind which the dead of a continent lingered. As he approached the titanic, growing dome of the Volkshalle, the grotesque reality of its existence bruised his heart.\n\nWalking down the boulevard like a profane pilgrimage, Lacerda thought - if only he had played his cards right, if only he knew when to stop, if only he had rid himself of the jackals of the UDN that bit his heels until they buckled. If only he saw American planes above Speer's dead temple, if only the expeditionary force had done more, if only good could beat evil, if only all of history didn't foment into this moment, like the currents of an obscene black sea.\n\nLacerda awoke with a start. The hotel room was cool and still, and his heart was in his chest. Stumbling out of bed, he went to the window and gulped the night air; the New York skyline greeted him, his eyes following the lights up the length of the Empire State to touch the heavens. Meaning returned with the day."
brazil_lacerda_world_tour.4.a: "If time had not stood still..."

brazil_lacerda_world_tour.5.t: "The Chariot"
brazil_lacerda_world_tour.5.desc: "Hello, Mr. Lacerda, my name's Chodakowski, I believe you were told to expect my call. Yes. Chod-a-kow-ski, it's Polish. Family took the boat from Gdansk to Ellis Island, turn of the century. You have Poles in Brazil? Good Catholic country and all.\n\nYou've got the program, the timetable? Good, I'll just hit the main points. In the late morning, you'll be hitting the universities, giving a talk to the political departments and such. First is CCNY, and then we'll be going to Columbia. Now, we heard about what happened in Mexico City, and I can assure you that we've been in touch with administration, and we expect all the kids to be on their best behavior. No, of course you weren't worried about that, I'm just mentioning.\n\nThen in the evening, you'll be at city hall - we can squeeze in some sightseeing if you like, view on the top of the Empire State is like nothing else - and there you'll be rubbing shoulders with the city's elite. I mean civic figures, the mayor is going to honor the heck outta you - he respects you, we all do - and if I recall, the commissioner and some other guys from the NYPD want to talk to you too. They're really interested in learning the lessons of your general strike, just in case anything like that ever happens here. Yeah.\n\nHuh? No, Mr. Lacerda, I'm not from the agency. I'm with the governor's office.\n\nThe route? What about it? Oh no, Mr. Lacerda, we don't want to cut through there. It's, uh, what do you call it - Harlem's a favela. Best to avoid it, right?"
brazil_lacerda_world_tour.5.a: "The canopy of the concrete jungle."

brazil_lacerda_world_tour.6.t: "Transcript of 'Firing Line', [?global.date.GetDateStringNoHourLong]"
brazil_lacerda_world_tour.6.desc: "LACERDA: (...) and this is what I would like your audience to understand. In Brazil, we have these monolithic, deeply entrenched institutions of control, all throughout society. On the political, cultural, and economic level. In trying to dismantle one institution - that is, the labor laws of the semi-fascist Vargas regime - my administration was undermined by another institution, that being the UDN.\n\nBUCKLEY: I think an American audience can grapple with that idea - certainly one that was inundated with images of the general strike in the papers, television, of the extreme strength that had been summoned to fight your reforms. But what are we to make, now that the dust has settled, that you're, as it were, out of a job? What would you say was your Achilles heel?\n\nLACERDA: If I knew the answer to that question, I would still be President. (Laughter) I tried to achieve a certain vision for what I thought Brazil could be. The political establishment did not share this vision.\n\nBUCKLEY: Some academic circles, the usual suspects, like to see what happened as a sort of David and Goliath story, the plucky underdog of organized labor, yours a right-wing, reactionary Goliath-\n\nLACERDA: People can say whatever they like, but I would disagree with that assessment. It's not a question of left or right - these are labels used dishonestly to categorize the world into one thing or the other. In Europe and Asia, it means nothing.\n\nBUCKLEY: There's something to be said for that, perhaps. But you would repudiate claims that you ever used dictatorial powers?\n\nLACERDA: I was within the law. Everything I did was to protect Brazil. That is the heart of it."
brazil_lacerda_world_tour.6.a: "We'll be back to 'Firing Line' with William F. Buckley after these messages."

brazil_lacerda_world_tour.7.t: "The Tower"
brazil_lacerda_world_tour.7.desc: ""I'm sure you can understand why the President can't see you." The aide rubbed the back of his neck and looked at Lacerda sympathetically as they walked and talked through the Capitol. Lacerda nodded, although this cold political reality was especially frosty.\n\nHowever, this was the exception. Another Senator, crossing their path, entreated Lacerda for a handshake, and, in the same uber-friendly manner he had been treated all day, told him how much he was respected, what a pleasure it was to have him here. The impact was dulling quickly.\n\n"You can see the impact you've had, sir! Never say Washington doesn't love you," said the aide, walking swiftly as they both continued the trek from one committee room to another. "If I may say personally - I've been to the restaurant the FBI director will take you to tonight, you must try the lobster ravioli."\n\nThe USA's reach in Latin America was greater than ever. It was good to be appreciated, but appreciation was just words, and it was better to be President.\n\n"I return Washington's love," Lacerda said, "for what else are partners for?"\n\nThe aide looked at him then, and it was something very small. A slight upturn of his lips or his eyebrow cocked a certain way - some infinitesimal thing in the American's pale face that shimmered at Lacerda's choice of word - 'partners?'\n\nMinutes later, Lacerda was hunched over the bathroom sink, cold water dripping from his face. He considered the miserable figure in the mirror. It was a creature without dignity, a maligned and suffering fool - for President Lacerda had needed America, but America did not need President Lacerda."
brazil_lacerda_world_tour.7.a: "Lacerda dried his face and put his glasses back on. Then he continued down the corridors of the Tower."

brazil_lacerda_world_tour.8.t: "The World"
brazil_lacerda_world_tour.8.desc: ""And just down there is the King Edward VII sanatorium, which the Germans practically made a fortress of - appropriate place for them really." Peter Hordern, the well-heeled MP for Crawley explained. The small party he led around the rain-dappled town had come from London, thirty miles away, and was mostly made up of government functionaries. Carlos Lacerda was the guest of honor.\n\n"Crawley did see street fighting in the 43' summer offensive." Hordern continued. "Panzers rolling across the Weald... stuff of nightmares. Anyway, we should pop along to the plaque, just in the town center."\n\nRinging the green outskirts, construction zones loomed out of the still rainwater; years after the occupation ended, Lacerda was invited to commemorate the Brazilian Expeditionary Force soldiers that had tried to stop it at the start. Some Paulistas lay forever in a Sussex field, fighting fascism far from home. Now, a liberated Britain, a beacon of hope, honored the martyred dead.\n\nThe reedy MP sidled up to Lacerda. "I just want to tell you again, Mr. Lacerda, how much we appreciate you being here for the unveiling."\n\n"It's my pleasure." Lacerda smiled easily. "I remember reading in the newspaper about the Battle of Crawley, and the valiant fight of the Allied forces. It's very meaningful to me."\n\n"I've been told you're going to say a few words? Your English is excellent, of course. The statue in London for those Brazilian boys of yours, wonderful thing; I saw the photographs of the big unveiling - I do hope you don't mind the humble bit of bronze plate we have today.""
brazil_lacerda_world_tour.8.a: ""How could I mind? I walk in the footsteps of heroes.""

brazil_lacerda_world_tour.9.t: "Lacerda Toronto Tarot"
brazil_lacerda_world_tour.9.desc: "The cool breeze on this overcast day cut straight through Carlos Lacerda's suit, reminding him just how far from home he was. Yet, when he looked at the cranes beside unfinished skyscrapers, or the ceaseless rush of cars down every road, he was reminded of the warmth of his hometown, and the pride he felt watching as it was reborn as a modern metropolis under his governance. It was all the more unfortunate, then, that the Prime Minister had not even bothered responding to Lacerda's invitation to meet him on his visit to Toronto. The Globe and Mail letting him publish an Op-Ed on Brazilian-Canadian partnership was hardly consolation.\n\nWhen he toured Mexico and New York, strangers would walk up to him, remarking that they had seen him in the paper a while ago, or saying how they always wished to visit Rio. But as he ambled the streets of Toronto, going nowhere in particular, he didn't hear any snide remarks or see heads turn. Whatever the name "Carlos Lacerda" meant at home, here he was neither a great reformer nor a retrograde failure. Here, he was nobody.\n\nRetreating from the chilly wind and indifferent public, Lacerda entered a sleepy café. He ordered a cup, three parts espresso, one part steamed milk, and just a dash of sugar. He felt the warm air rising up from the mug, and took a sip of unremarkable-but most likely Brazilian-coffee. The server may not know Lacerda's name or recognize his face, but he would still reap the rewards of Lacerda's work to bring their countries closer together."
brazil_lacerda_world_tour.9.a: "Legacy outlives memory."

brazil_lacerda_world_tour.10.t: "Lacerda in Iberia"
brazil_lacerda_world_tour.10.desc: "When he arrived in Lisbon, Lacerda met with a member of the city council. Somehow, this was the only politician in all of Portugal who cared to meet with him. Nonetheless, he was optimistic going into the meeting, for even an insignificant ally could allow him access to more important politicians another day. But his optimism quickly evaporated, as the councilman made snide remarks about the São Paulo riots and drank nearly as much as Jânio. Surely there were men in Portugal who could help Lacerda restore the UDN to its former glory, but it did not take long to realize that this man was not one of them.\n\nAs afternoon turned to evening Lacerda could only sigh and admit to himself that another day would end without progress. Before returning to his hotel room for the night, he went to a park overlooking the great port and watched as a departing cargo ship vanished beneath the horizon. This was the port from which Captain Cabral began his epic voyage of discovery. Lacerda imagined what thoughts went through the navigator's mind the day before he discovered Brazil. Weeks of sailing across the deep ocean must have lead him to doubt himself. He would have felt dread slowly grow within him and begin to wonder if he would ever see land again.\n\nThe hopelessness which Lacerda felt in his stomach, that's how Cabral must have felt. But if Cabral had given up and abandoned his responsibilities, he and his crew would never have made landfall. They would never tell the tale of their discovery, and Brazil would never have come to be. Lacerda would not give up either. If he retired now, the triumph of Varguism was guaranteed. Twenty years of progress since the fall of the Estado Novo would be undone, the specter of Getúlio Vargas would once more crush Brazilians under the weight of tyranny and suffocate them by corruption and vice. No. That simply couldn't be allowed. Lacerda couldn't go home, not yet."
brazil_lacerda_world_tour.10.a: "He had his own landfall to make"

brazil_lacerda_world_tour.11.t: ""
brazil_lacerda_world_tour.11.desc: ""
brazil_lacerda_world_tour.11.a: ""

brazil_lacerda_world_tour.12.t: "Judgement"
brazil_lacerda_world_tour.12.desc: "Sitting in the backstage of the auditorium, Carlos Lacerda stared toward the mirror with a blank expression. He straightened his tie and raised his glasses, then lethargically rose from his seat. He felt weak in his chest and tried to focus only on why he was here. Lacerda raised one arm and gave the best smile he could muster as he walked onto the stage, facing an audience of Australian collegiates. He knew most were only here at their professors' insistence, and who could blame them? He had no more interest in speaking to them than they had in listening to him.\n\nUpon reaching the podium, Lacerda began with a curt greeting "Good afternoon, Canberra". There was little life to his voice. "I am Carlos Lacerda, former President of Brazil." As the audience gave polite applause, he recalled the days when he drew crowds numbering in the thousands. How many were cheering for him now? 50 people? 80? "and I've been invited here to speak with you about the friendship between my country and yours."\n\nThis event was intended as a celebration of international comradery, but Lacerda's voice was devoid of passion. He could hardly bear to listen to himself praise the Australian businesses that aided Guanabara's reconstruction, when the Varguists who had let it fall into disrepair would now lead the whole country again. Whatever hope there was that Australian tourists would soon lounge on Copacabana had vanished, now that all his progress toward eliminating crime was set to be undone. He persisted through the event, the whole time wishing he had the same freedom as the students to simply leave.\n\nAt his hotel room that night, Carlos Lacerda poured himself a glass of liquor. Damn it! Damn it all! How did it turn out like this? After all he had done as governor, after all he had done as President, why were his countrymen still so blindly loyal to the cult of Getúlio Vargas? Had they enjoyed the inflation? The corruption? The banditry? Lacerda's heart had been shattered as he listened to the election results. It wasn't a rational outcome, it went against the voters' own interest, he simply couldn't understand! And if he couldn't understand..."
brazil_lacerda_world_tour.12.a: "...how could he possibly lead again?"

brazil_lacerda_world_tour.13.t: "Judgement"
brazil_lacerda_world_tour.13.desc: "Straightening his tie and raising his glasses in the auditorium's backstage, Carlos Lacerda felt positively giddy. His protégé was now President elect, his agenda had been vindicated, and he could at last see the looming triumph at the end of his tour. Lacerda smiled widely with one arm raised as he walked onto the stage, facing an audience of Australian collegiates. He knew most were only here at their professors' insistence, but was that really so different from when Guanabarinos attended his early campaign events out of boredom or slight intrigue?\n\nUpon reaching the podium, Lacerda enthusiastically shouted "Good afternoon, Canberra!" He paused for a few seconds, breathing in the applause. "Thank you, thank you! My name is Carlos Lacerda, former President of Brazil. I've long admired Australia, and like to believe that one day my homeland will be as much a bulwark of liberty as yours!" He paused to subdued clapping. "Today, more Brazilian business than ever is funded by Australian investors, and more Australians than ever are kept awake by Brazilian coffee. Including many of you, I'm sure." Lacerda paused for laughter, but it did not come. He began to feel uncomfortably warm.\n\n"You...Perhaps your professors called you here so that I might give a geography lesson, or lecture you on the intricacies of trade agreements. But there is something more important than either of those things-it is freedom. And it is because of that freedom that Australia and Brazil stand together today!" Lacerda raised one fist into the air while giving his largest smile. This time, there was no response at all.\n\nSilence filled the auditorium, punctuated only by the scribbling of notes and whispering between students. Lacerda's eyes darted back and forth. He saw no excitement in the crowd, no passion, only confusion. His smile wavered, and for the next several seconds, he too was silent.\n\nLacerda could hardly remember the rest of the event. As he tried to fall asleep in his hotel room, the events at its beginning played over and over in his head. What was he thinking? He was there to speak about the Brazil-Australia partnership; this wasn't the campaign trail! Magalhães had won, the battle against Varguism would continue, but..."
brazil_lacerda_world_tour.13.a: "Carlos Lacerda would never again lead the charge."

brazil_lacerda_world_tour.14.t: "Judgement"
brazil_lacerda_world_tour.14.desc: "Straightening his tie and raising his glasses in the auditorium's backstage, Carlos Lacerda felt confident. Though they said it was impossible, the presidency would remain with the UDN. At last, he could at last see the looming triumph at the end of his tour. Lacerda smiled widely with one arm raised as he walked onto the stage, facing an audience of Australian collegiates. He knew most were only here at their professors' insistence, but that did not mean they were totally disinterested.\n\nUpon reaching the podium, Lacerda began "Good afternoon, Canberra. My name is Carlos Lacerda. I was previously President of Brazil." He paused for a few seconds as the audience clapped. "I've been invited here to speak with you about the friendship between our countries. Today, more Brazilian business than ever is funded by Australian investors, and more Australians than ever are kept awake by Brazilian coffee. Including many of you, I'm sure." Lacerda cracked a smile. "I believe there is great value in our partnership, and I have faith that over these next few years it shall only grow in importance."\n\n"When I was governor of Guanabara, that's the state Rio's in, I'd often hear that a factory had shut down because they couldn't acquire all their supplies. Now, go to Guanabara and you'll find hundreds of factory workers molding Australian aluminum into cans or farmers treating their fields with Australian-made fertilizers." He smiled lightly, pondered his economic and diplomatic legacy, then continued the event.\n\nAn hour later, as he wrapped up his discourse on how Australia and Brazil shaped each other, the President-elect intruded upon Lacerda's thoughts. Ney Braga never fully grasped the dream of a Brazil freed from Varguism, and São Paulo proved that most of the country did not grasp it at all. And yet, though he flew the same UDN banner that had symbolized Lacerda's dream, Braga had won over the voters.\n\nAs he lay alone in bed in his hotel room that evening, Lacerda's mind was awash with contradictory emotions. Frustration that the UDN deviated from his course, relief that the PTB had not toppled it. Dread that his reforms would forever go unfinished, confidence that existing progress would not be undone. Despair that he would no longer lead Brazil toward a brighter future..."
brazil_lacerda_world_tour.14.a: "...faith that he may not need to."

brazil_lacerda_world_tour.15.t: "The Emperor"
brazil_lacerda_world_tour.15.desc: "Alone in his office in the Palácio do Planalto, Távora let out a harsh, unhappy laugh.\n\nThe newspaper article on Lacerda's visit to Cuba did not describe an event of much relevance. The article wasn't on the front page, for one, and in Havana, Lacerda by all accounts did not find a rousing reception for his 'anti-Varguist international conservative movement', whatever that was. The photograph of Lacerda's speaking event was well-attended, perhaps, but most of those were surely curious Cubans there to gawk. With this in mind, Távora felt confident in his continued refusal to acknowledge Lacerda's international stunts.\n\nYes, easy enough to dismiss - after all, what could Lacerda do? Was he to sail into Porto Seguro with a fleet of conquest, like Pedro Álvares Cabral? This international trek of his was just a way to launder whatever reputation he had left for an intended audience assuredly to the north of Havana. Christ, the Americans would probably fall over themselves venerating Lacerda as some 'martyr of democracy' - a fine reward for years of service, perhaps.\n\nStill, Távora put it out of his mind. What further harm could he do? He had not only destroyed his own political cache, but that of the UDN. The energy around the upcoming elections was already rather morose, like a scolded dog. And instead of hurrying away quietly, as one might do after sinking the national economy, Lacerda insisted on keeping up this undignified performance.\n\nEither way, it meant nothing, for Távora had the military, and the party and Lacerda had blown it. He dismissed irrelevant Lacerda from his thoughts. Not even worth my time anymore, you egomaniac little-\n\nThe phone rang. The secretary said the Governor of Acre was here to see him. Távora shuffled the newspaper into the trash."
brazil_lacerda_world_tour.15.a: "There is no place for you in my court anymore."

brazil_lacerda_world_tour.16.t: "The Sun"
brazil_lacerda_world_tour.16.desc: "Far from McMurdo Station, a lonely figure walked through the unending snow.\n\n"There will never be pro-Lacerdaists or anti-Lacerdaists in Brazil. Politics will move past you and your stupid book."\n\nHe preferred his first trip, even if it was only a searing memory by now.\n\n"You can say you will never be a Vargas here. Only God can hear you here, and maybe a few penguins too."\n\nHe screamed it out to the Heavens. There was no response.\n\n"Of course, I thought you would have known that since '49 when we first met."\n\nHe unfurled a blood-stained shell from his parka — an ugly memento that kept him going — until now.\n\n"I remember how you screamed when they dug me out of your foot. He should have gone for the heart — but you can't hit something that isn't there."\n\nA small abyss formed in the Antarctic. The shell slipped from his fingers and fell into the silence of the snow.\n\n"I'm gone now, like you. I suppose I was never really there. Obscurity will wash over me like the snow. Let it claim you, Lacerda."\n\nHe stood there for a while, thinking to himself. He made up his mind, trudging back to McMurdo Station, knowing no one would notice his absence.\n\n"There will be nothing left..." \n"...but that's alright.""
brazil_lacerda_world_tour.16.a: "Free from the past, there was no choice but to move on."

brazil_lacerda_world_tour.17.t: "Lacerda in Portugal"
brazil_lacerda_world_tour.17.desc: ""Is that...oh my gosh it is, Senhor President!" a young man ran across the street to shake Carlos Lacerda's hand. "I never thought I'd see you in person!" Lacerda's momentary bewilderment turned to delight. It had been months since anything quite like this had happened, and he wasn't even in Brazil! "My name is Hermínio. It's...it's truly an honor to meet you. What brings you to Lisbon? Do you like it here?""I have a couple of interviews lined up, some meetings. Don't worry, I have plenty of time to talk." Lacerda smiled warmly. "Yes, it's been far too long since my last visit. Say, how do you know about me? Do you read the papers?""Actually..." the boy's eyes darted left to right. Seeing that nobody was standing too close, he nervously whispered "You're kind of a celebrity in the FPLN." Lacerda's whole body froze in place. "Thank you for saving Senhor Delgado." Lacerda could not do anything besides stare at Hermínio in stunned silence, unable to believe a word he was hearing. "Tell me, and please, be honest." Hermínio struggled to maintain eye-contact, Lacerda wondered if this boy was armed. "Is- Do you think - Portugal, are we on the path to democracy?"\n\nRealizing that he was not in danger, and sensing a familiar vulnerability in the boy, Lacerda relaxed and considered his answer. "I don't know. Democracy is...fickle. Many years ago, when I was just about your age, I took part in a communist plot to overthrow Brazil's dictator." Hermínio raised his eyebrows, Lacerda snickered. "It was stupid, I spent years in prison. And in the end, it wasn't even a revolution that brought down the bastard. The military overthrew him and restored democracy...But!" Lacerda stared into Hermínio's eyes and spoke sternly. "That was only possible because thousands of people in every city were marching and demanding free elections. Portugal can become a democracy--absolutely--but first its people must love liberty more than they fear Pereira." Lacerda softened his expression and patted Hermínio on the shoulder. "If other young men are as passionate as you, then Portugal's future is in good hands.""
brazil_lacerda_world_tour.17.a: "From one revolutionary to another"

brazil_lacerda_world_tour.18.t: "Paridise Lost"
brazil_lacerda_world_tour.18.desc: "Carlos Lacerda stood proudly atop a soapbox in the Praça do Comércio. Behind him flocks of seabirds flew over the Rua Augusta Arch. Beside him the sun's rays glinted off the Equestrian statue in the Praça center. Before him, throngs of Portuguese citizens brimmed with anticipation. "Good morning, Lisbon! How does it feel to be free?" The crowd roared in approval. "For many years, you toiled for Madrid. You lived fearful that the Axencia would disappear or silence you. But you never surrendered your hope! You rose up, because you knew that freedom is a thing worth fighting for! You expelled the Francoists and you liberated all of Portugal..." he turned and gestured toward the statute "...just as King José expelled the Bourbons!" The Praça erupted into deafening screams of ecstasy. But as he reveled in their applause, he remembered that Lisbon hadn't looked so pristine in some time. He was dreaming, and as desperately as he wished that he could continue, he awoke with a jolt of electricity down his spine.\n\nUpon his return to reality, Lacerda's confused disappointment turned into sadness and bitter contempt. The Praça do Comércio had indeed been beautiful when he visited many years ago, but the war had turned it into a heap of broken marbles. There was a time when Lacerda had admired Salazar, a fact that now made him sick to his stomach. What possibly had led Salazar to agree to an 'Iberian Union'? Did he truly believe that doing so made Portugal safer? That little Portugal could ever enjoy an equal partnership with Spain?\n\nLacerda pulled a blanket over himself and turned to his side, but a nagging memory kept him awake. It was a cartoon he saw printed in a Varguist tabloid years ago, depicting him as a wooden dummy spouting 'Free Trade', 'OFN', and 'Competition', behind whom loomed a silhouette of Uncle Sam. However crude the sketch or simple its message, it still left him uncomfortable. A ludicrous thought crept into Lacerda's head, one which he could only humor because of his dream, yet still one which kept him awake."
brazil_lacerda_world_tour.18.a: "Am I a Brazilian Salazar?"

brazil_lacerda_tiny_strike.1.t: "Drinks"
brazil_lacerda_tiny_strike.1.desc: "Two steel mill workers clinked their glasses in a toast and swiftly drank the contents. Not alcohol, but juice. They had a long day ahead of them, couldn't afford to have booze running through their system. The two friends clapped one another on the back, took their belongings, and exited their apartment to the busy streets of Rio.\n\nThe two men were joined by a handful of their coworkers. They were making their way down to the bus stop, but let their usual bus to the mill stop without anyone getting aboard. They weren't going to work today. Neither were thousands of other working-class people all around Brazil. Castelo Branco staged an unfair election for "President" Carlos Lacerda, a fierce opponent of anything Vargas-related, including the CLT. Lacerda would be forced to face a crisis immediately after the inauguration, and the only way to end the nationwide strike would be to step down and order a fair election.\n\nThe first of the demonstrators arrived at the Avenida Brasil. They ignored the protests of the few police officers. There were too many of them to haul off to jail anyway. When backup finally arrived, they were met with ten times the amount of demonstrators and a hailstorm of empty cans and pebbles. The officers retreated just as quickly as they came, much to the delight of the demonstrators."
brazil_lacerda_tiny_strike.1.a: "What will you do, Mr. President?"

brazil_lacerda_tiny_strike.2.t: "Deciding Factors"
brazil_lacerda_tiny_strike.2.desc: "A nearby desk lamp was all that illuminated the room occupied by Castelo Branco and a cadre of officers accompanied by Golbery do Couto e Silva. The men sat at a round table within one of the few meeting rooms that the Military Academy of Agulhas Negras offered. Small bands of light trickled out between the window blinds, yet they would remain shut. What followed demanded stringent secrecy, lest they all be made to look like fools in some unfortunate press leak.\n\n"What we do know," Golbery said as he peeled open a sheath of documents, "is that the protests will only grow in size if not responded adequately to. Leftist organizations have already taken command of many strike actions in major cities, such as Rio de Janeiro." Some of the men peered to the windows instinctively at Rio's mention. The city was only two hours away by car.\n\n"All the more reason to strike now and with thorough intent," Castelo responded. "The army is ready and willing to put down this leftist rabble. With force, if need be!" Castelo rose from his chair, walking to the windows. Golbery soon rose in response, shaking his head.\n\n"Any undue action on our part will only exacerbate the situation," Golbery retorted. Castelo peeked the blinds open, spotting a column of conscripts marching nearby. "We need to coordinate with Lacerda and ensure our plans are aligned. He may just wish to negotiate instead." Castelo pondered the words silently, turning back to the remaining officers present.\n\nOne of the officers, Captain Vicente, cleared his throat. "I believe that General Golbery's advice is more sound, sir. The President should make the final decision." Castelo let the words ruminate before turning back to Golbery, sighing sharply through his nostrils. A nod was given."
brazil_lacerda_tiny_strike.2.a: ""Agreed. But I alone will inform Lacerda.""

brazil_lacerda_tiny_strike.3.t: "Signs"
brazil_lacerda_tiny_strike.3.desc: "A demonstrator gripped an empty soda can and crushed it as much as he could to make it as aerodynamic as he could. He wound his arm back, taking a step for balance. He closed one eye to aim, and then let his projectile sail at his target.\n\nEven if they could somehow hit the military helicopter, it wouldn't have even scratched the paint. Yet, it was a tremendous blow to the helicopters flying above the demonstrators on the Avenida Brasil. Even with all his helicopters bristling with machine guns, Lacerda couldn't break the will of the people.\n\nFor the past several hours, not a single car could get through the Avenida Brasil, paralyzed with the thousands of workers taking a stand against the Crow. The police couldn't stop them, only contain them. The military sent helicopters for intimidation, but the demonstration continued.\n\nThe workers continued to make their advance, with some bystanders gawking, and others joining the mass. On a nearby rooftop, two men scrambled to the edge overlooking the crowd. Armed with a camera, they began to shoot the demonstrators and the hovering military helicopters. All of Brazil would soon bear witness."
brazil_lacerda_tiny_strike.3.a: "When will this end, Mr. President?"

brazil_lacerda_tiny_strike.4.t: "Sending a Message"
brazil_lacerda_tiny_strike.4.desc: "Watching Branco enter the room, Lacerda wondered if his lateness had been an international statement. It had been only mere seconds, perhaps, but the individual ticks had weighed heavily on his consciousness. Finally taken aback as Castelo Branco forced himself in, he attempted to ask a few pleasantries before being silenced.\n\n"I'm here for business, Carlos, unlike those extremists outside." Branco spoke gruffly, throwing himself down before continuing. "And frankly, I'm disappointed that it's taking you so long to decide on the correct action."\n\nLacerda knew what he meant, but hoped not to antagonise him further by immediately contradicting him. "What do you mean, sir?"\n\nBranco turned around for a second, visibly annoyed by the question before smiling at the image of his response. "Send the army out. The cowards will flee, and the real Bolsheviks among them will make good target practice for my men. If we shoot enough, we might even get rid of the lot and stop this from becoming an issue again."\n\nLacerda stayed quiet for a moment, attempting to find an alternative. He loathed the strikers, but just sending the army to shoot them risked giving the country away at the last minute. "As much as I don't want to, perhaps negotiating could help to quell their rage?" he responded, his tone questioning his very words." Not anything on returning Goulart to power, perhaps, but some token repeals that only they will care about."\n\nLacerda's ire turned back outwards again, superseded only slightly by horror. "You want to give into these clowns? When I backed you in the coup, " responded Branco, halting only to groan in sheer frustration. "But I'm not going after Golbery at this time. Negotiate if you have to, but the moment you fail, know that my guns won't be waiting for your call.""
brazil_lacerda_tiny_strike.4.a: ""They will not have to fire, Castelo.""
brazil_lacerda_tiny_strike.4.b: ""On second thoughts, sir, perhaps your fears are founded.""

brazil_lacerda_tiny_strike.5.t: "A Call"
brazil_lacerda_tiny_strike.5.desc: "As he phoned the number, Lacerda sighed yet again, turning to Golbery in a fatigued anger. He had tried calling the line for several minutes, yet each attempt had been met with radio silence. One time could've been written off as awkward timing, twice as a simple mistake. But five times? Just as his mind turned to accepting Branco's orders of a direct military offensive, the line crackled to life.\n\n"Hello, this is José, no?" asked Lacerda, suddenly forcing himself to lean forwards before continuing. "What do you strikers want?"\n\nSilence came from the other end, with any following response almost muted behind loud chants in the background. "...we want...protections for the CTB...for labour righ...new elections with Goulart allo...run."\n\nLacerda and Golbery looked around, both confused as they tried to piece together the demands. Allowing Goulart to run was an impossibility, of course, and the CTB too, but that didn't mean he had to be honest. "Can you hear me?" asked Lacerda,. "You have my word that we won't look to rescind any worker...protections, and that we will preserve the strength of the CTB."\n\nThis time, the line was far clearer. "The people of Rio will only work when Goulart is free to run." Lacerda knew that his rhetorical flourish would never have worked, but attempted to cling onto it as he flipped to outright desperation.\n\n"Listen, there are far more opponents to your actions than me, and you don't want to see what happens then. Stop this strike, and I can promise that nobody will get hurt."\n\nThe line returned, fading once again into renewed chants. "We can see through your rhetoric. Preserve the CTB and end your persecution of Goulart. Those remain our demands.""
brazil_lacerda_tiny_strike.5.a: ""Alright, fine, if you're really adamant, then I won't do anything to reduce the powers of the CTB.""
brazil_lacerda_tiny_strike.5.b: "Tell that to the army, José."

brazil_lacerda_tiny_strike.6.t: "Smooth Sailing"
brazil_lacerda_tiny_strike.6.desc: "Lacerda cursed the words that came out of his own mouth. He did not intend to genuinely concede here, of course; once he was in a better position, he knew that he had to prioritise dismantling the organisation. But for now, when he still needed to ensure that Branco had some limits to his strength, faking another concession was necessary to prevent his scheme from totally collapsing.\n\n"You sincerely promise that you won't touch the CTB at all?" asked José. It was apparent that he didn't fully trust the offer either, but the words seem to genuinely sink in.Golbery heard the words with frustration, but chose to remain silent as well.\n\nHearing the silence extend itself further, Lacerda chose to speak in response once more. "Of course. We're here to serve Brazil, not just those on the right." Still as empty as ever, but in the worst-case scenario, he could afford to wait for a few months.\n\nThe phone line went quiet once again, a few lilts of conversation audible over the din of the chants, random words only springing forth into legibility. Finally, however, the chanting began to quieten slightly. "If you're lying about this, then my men are ready to return to the streets the instant we sense you attempt to weaken its power." Whilst audibly hesitant, Lacerda knew that the deal was accepted.\n\n"You don't have to worry about that happening, José, trust me."\n\n"In that case, Carlos, we have a deal. My men will be returning to work immediately." one final response from José, his optimism marred by defeat. A few shouts came from the line once more, announcing the end of the strike and commending Lacerda's irreparable defeat on the issue of the CTB before the line truly died. Lifting himself from his chair, Lacerda sighed once more, finally offering one of relief rather than frustration."
brazil_lacerda_tiny_strike.6.a: ""Tell the army to stand down, Golbery. We have a deal.""

brazil_lacerda_tiny_strike.7.t: "Helmets"
brazil_lacerda_tiny_strike.7.desc: "Trucks and jeeps rolled through the streets of Rio, carrying a wall of helmets and masks. Policemen at their posts stood aside, as the helmets and masks took their positions. On overpasses over the mass of demonstrators, the helmets looked down upon the workers through tinted lenses.\n\nThe helicopters didn't scare them, so why would a band of faceless thugs? The demonstrators hurled insults and kept marching. Two men from the press were chased off a roof, replaced by two helmets and masks. The mass surged forward down the Avenida, until they were met by a barricade of army trucks manned by helmets and masks. That's when the order was sent out over the radio.\n\nThe mass shrieked and broke before the shooting started. A man in his twenties was hit by a rifle round in the knee, and finished off by one in the throat. The boy that shot him didn't even see him die, for he was already aiming elsewhere. A steel mill worker dragged his friend, trying to find safety. A carefully placed round entered his spine, and it was only when his own life was fading away that he realized he was carrying a corpse.\n\nAfter thirty minutes, everything was silent. Not only the Avenida, but Rio de Janeiro itself. The helmets looked down upon the corpses, making sure they were all dead. Their officers looked down upon the helmets, satisfied with their work. Carlos Lacerda looked down upon his desk, knowing his decision was for the country. Jesus Christ looked down upon Rio, silent in His judgement."
brazil_lacerda_tiny_strike.7.a: "Excellent work, Mr. President."

brazil_lacerda_tiny_strike.8.t: "A Developing Story"
brazil_lacerda_tiny_strike.8.desc: "The press office was thick with cigarette smoke, with open windows doing very little to alleviate the stench. All the journalists had to shout to communicate over the cacophony of typewriters. Silvia and Carolina, sweating through their clothes, took time to step out onto the fire escape to cool off.\n\n"Oscar was supposed to develop the photos Diego and Pio took yesterday, right?" Silvia asked, leaning onto the railing. "He was supposed to be back here half an hour ago, what do you think is holding him?" Carolina picked some lint off her sweater and flicked it off the end of the fire escape.\n\n"Maybe he got caught up in traffic, or maybe there was a queue for development." She offered, though she didn't sound so convicted in her words. "Maybe he stopped for coffee on the way back?"\n\nThe two looked down at the barren streets below them. Barely anybody had the nerve to drive, let alone to get photos developed. Oscar was very much a creature of punctuality, not one to take a detour for a drink. Then, several vehicles rounded the corner and both women froze. Hurriedly, they climbed back into the office.\n\nAs they entered, the military policemen were already bursting through the door, demanding everyone put their hands above their heads. Silvia and Carolina watched in silent horror as the soldiers began to confiscate typewriters and notebooks."
brazil_lacerda_tiny_strike.8.a: "And where the hell was Oscar?"

brazil_lacerda_tiny_strike.9.t: "No-Knock"
brazil_lacerda_tiny_strike.9.desc: "The door to the Steel Union's offices opened slowly, and a small metal object rolled in. The men and women in the lobby stood and stared, before all hell broke loose. As the smoke grenade blinded the room, the policemen burst in.\n\nFirst they grabbed the man standing closest to the door. They grabbed his arms roughly and threw him out onto the street where he was handcuffed. He wasn't even affiliated with the union, but the officers never bothered to ask. One officer was hit in the face with a paperweight, doubling over in pain. He lunged at his assailant, breaking his nose with the baton and continuing to beat the man when he was down.\n\nOnly one resident of the building found space to hide- a cramped spot under a couch. From there, he watched black boots pick off sneakers. Five days ago, he watched his friends get murdered on the Avenida. It seemed like Lacerda was out to finish the fight.\n\nIt was only hours after the last officer left that he dared to leave his hiding spot. He looked around for any police cars or unmarked vans on the street. Carefully, he pushed the door open and looked around once again."
brazil_lacerda_tiny_strike.9.a: "Alone, he slunk off into the night."

brazil_lacerda_tiny_strike.10.t: "The Crow's Call"
brazil_lacerda_tiny_strike.10.desc: "It would have been an embarrassment, no question about it. Thankfully, this particular strike was stamped out in record time, and Golbery could not get enough of himself for it. "Marvelous work, if I can be self-indulgent, Mr. President," he crooned over the phone. "The amount of hands I've shaken, I'll need to be washing mine for weeks."\n\n"Yes, yes," Lacerda replied hurriedly, slightly irritated by the five conversations he had to keep up with. "Congratulations, General. I'll have someone sent over to conduct a debrief."\n\nHe set down the phone, pausing for a moment to imagine the scene, vivid though the descriptions from officials across the board were. The Rio Steel Union, CLT, and every other three-letter acronym trade union in the city seemed to be planning quite the round of revenge, but they stared down the gleaming ranks of military and policemen alike, and realized today was not the day to break the law.\n\nMore reports of violence, resistance to arrest amongst some of the union officials; honestly, it was all becoming banal to him at this point. No more beating around the bush, he resolved, now was the time to simply say what he had already decided and be the man of the hour which the situation required. He looked into the camera, eased into the countdown, and stood still.\n\n"People of Brazil. At 6:30 this morning, an illegal strike by dangerous radicals started in the center of Rio de Janeiro. It sought to bring more misfortune to the city, divide this country, and halt us in our path of expansion and progress. Thanks to the outstanding law enforcement at the scene, that strike has ended." He took a break to let it sink in. Now to get into position."
brazil_lacerda_tiny_strike.10.a: "It was an unfortunate tragedy. But mark my words, Brazil will push on."
brazil_lacerda_tiny_strike.10.b: "But this was an act of war, and they shall be sorry they started one."

brazil_lacerda_tiny_strike.11.t: "From Violence to Vanilla"
brazil_lacerda_tiny_strike.11.desc: "Silvia and Carolina stood transfixed by the TV as Lacerda's visage flickered on. For a moment they could not believe what they were hearing, but no, he really was getting off his high horse and playing the statesman.\n\n"The turmoil that we face as a country today is not foreign to us now, nor to any country as we face the growing pains that arise from our choice to pursue our nation's motto. However, violence, rebellion and resistance to our fellow citizens do not achieve neither order nor progress. Now is not the time to take to the streets, fellow Brazilians, but to the fields and to the floors. I hope you will all agree."\n\n"He hopes we will all agree? Our good friend Carlinhos is the man of hope now, everyone, put down your weapons!" Silvia snorted, barely audible over the hubbub of the returning traffic and wailing sirens.\n\n"It's... anticlimactic, at the very least," Carolina replied. "I doubt all the people that just got taken into the police stations are going to be thrilled. They seem to want a fight, more than anything."\n\n"Well, I say we've done enough work for today, Lina." Silvia now made a large show of a yawn, indicating she was prepared to sleep by the nearest pillow even if it was eleven in the morning. "Clearly Oscar isn't coming, so maybe just get the coffee without him? Maybe a change of clothes too.""
brazil_lacerda_tiny_strike.11.a: "The bloodshed will stop, but for how long?"

brazil_lacerda_tiny_strike.12.t: "A Woozy Walk to War"
brazil_lacerda_tiny_strike.12.desc: "Oscar could barely hear the President's address from Brasília. Well, that in and of itself was not saying much, he realized in his pained but mild dizziness, only to understand that the cause of that was the fact he was in the back of a military truck. Once he had shown the men in helmets his press card, he left through the back with his hand still bracing his head. The nerve of them to see his colored bruises they made and send him away was not lost on him.\n\nSuddenly, Lacerda's voice fanned out through the air with more clarity as one of the truck's windows wound down. "...this disruption. We have been working in close contact with the local authorities, and we as the federal government of this country will bring justice ourselves..."\n\nWhere did his photo go? Oh, thank God, the camera was still with him, but damn it, he was walking away with a wound and a mission failure. He couldn't focus on the man's blathering, and kept walking in an impossibly straight line, limping towards the pavement, and resting his tired hands on a lamppost. It was becoming too much.\n\nLater that day, what he did not know but might have foreseen if his wits were not clubbed out him was the match those lines had lit in Rio. He remembered the apoplectic faces of the union associates, who saw themselves as being on the right side of justice and the UDN crooks as the pervertors of it, the violence, the dissatisfaction, the wrath.\n\nWhat happened on the Avenida Brasil would not be a cause for peace, but the birth of a new frontline: the government against its people. He would wish he could take those pictures again."
brazil_lacerda_tiny_strike.12.a: "Amidst chaos, eerie clarity."

brazil_lacerda_campaign.1.t: "Torchbearer"
brazil_lacerda_campaign.1.desc: "Raphael Magalhães, features gleaming with sweat under the spotlight, pulled the microphone tighter to his lips to close the speech. "Our country has taken unparalleled strides forward under President Lacerda, and it would be the honor of my lifetime to carry forward our party's torch into the next leg of the course. But it would not be my honor alone. Your ideas, your passions, your toil are what keep this torch of liberty and dignified government blazing for the people of Brazil. Together, the UDN will hold the flame aloft!"\n\nThe applause, the farewells, the pleasantries that followed could have been for any of the other prospective candidates. What was different was the smoke. Gray fumes poured forth from the cigars and cigarettes of the assembled party officials, who had been fighting off the temptation for speech after bloviating speech. Familiar faces sought one another out in the haze, a cloud of chatter interrupted only by puffs and the occasional long drag:\n\n"...Magalhães can win this fast. We wrap this up early and the steaks are on me."\n\nA belly-laugh, and then: "Don't rule out Governor Braga before dinner. You hear the work he's been doing in Paraná?"\n\n"-expected more pushback on the President's man from the Realistas. Lacerda won you round at last, friend?"\n\n"He wins votes. His chief of staff will win votes - Raphael's the natural successor. We just need a good pragmatic head to even out the ticket, keep the Bossa Nova on board."\n\n"Heh." A long exhale. "Brings another Magalhães to mind...""
brazil_lacerda_campaign.1.a: "And when the smoke cleared, the UDN's presidential and vice presidential candidates were announced..."
brazil_lacerda_campaign.1_tt: "§QRaphael Magalhães and Magalhães Pinto!§!"

brazil_lacerda_campaign.2.t: "Coaching Session"
brazil_lacerda_campaign.2.desc: "Box seats at Maracanã Stadium during the Clássico Fla-Flu did not come cheap. But as a gift to the son of a close friend, an ambitious and zealous chief of staff, and now a presidential candidate, Lacerda considered them unmatched.\n\nWith the whistle blown for halftime and Raphael Magalhães' favored Fluminense trotting off the field, Lacerda beckoned his protégé deeper into the box, away from cameras and lip readers. With a quick smile and a flute of champagne, Lacerda offered, "You looked more stressed during that penalty kick than during the strikes. Sit down and take the edge off."\n\nRaphael chuckled before growing solemn. "I have been a bit more anxious lately. Every speech or appearance feels like another chance to fail. Not just myself anymore, but the UDN and Brazil." Another chuckle. "No administrator is prepared for that."\n\nCarlos met his eyes. "You weren't always an administrator. I went with your father once, to one of your games in Copacabana. You flew around that beach, passing, tackling, shouting. Drenched in sweat and red-in-the-face. But you got those goals, again and again and again."\n\nLacerda's face flushed as he picked up steam, "The ball hogs, the Pintos and the Bossa Novas of the world, just want to strut and promenade. They aren't here to score, they don't even know what the goal is. You do. The goal is to improve the lives of the Brazilian people. To give them a government of dignity."\n\n"To give them dignity," Raphael raised his glass in toast, and both men drank. By the time the whistle blew, the flutes were empty and Magalhães was smiling. Lacerda put an arm across his shoulders and said:"
brazil_lacerda_campaign.2.a: ""Halftime's over. You're in.""

brazil_lacerda_campaign.3.t: "Business Lunch"
brazil_lacerda_campaign.3.desc: "The offices of Banco de Investimento do Brasil, or BIB, had ground to a pleasant halt as bankers and analysts settled in to dine on a complimentary maritime banquet. Caviar, lobster, and shrimp popped daintily off plates and into eager mouths. As the lunch hour wore into a lunch afternoon, oysters were washed down with glasses of champagne, and the toasts to the selection of Raphael Magalhães as the UDN candidate grew more exuberant, if a little sloppier. Lacerda's slashing of red tape had quadrupled the value of their investments into Brazilian steel manufacturing - why shouldn't they celebrate the selection of his handpicked successor?\n\nAt a renovated Gerdau Metallurgy plant, a recently-added jewel in BIB's financial crown, a line of line workers trekked alongside a shower of sparks from an ongoing weld. Pinched stomachs propelled them forward, mooned eyes hunting for a thermos or paper cup of coffee. But the unsmiling foreman was waiting in front of the door to the breakroom. As the line turned into a fan around him, he announced that their lunch break would be cut in half today. They needed the extra fifteen minutes to finish this batch.\n\nAs the engorged CFO of BIB finished the batch of amputated and buttered crabs, his drowsy eyes drifted to the clock. Time to order his charges back to work. But then the junior analyst, who had been left to man the stocks ticking on the firm's grand computer, burst into the hall. Their portfolio had risen another fourteen percent - Raphael-mania was sweeping the market and Gerdau was leading the charge!\n\nThe young man was swept off his feet by cheering compatriots and lifted into the air. Soon the whole of BIB's offices was roaring with the chant,"
brazil_lacerda_campaign.3.a: "For he's a jolly good fellow, for he's a jolly good fellow..."

brazil_lacerda_campaign.4.t: "Do As I Do"
brazil_lacerda_campaign.4.desc: "Raphael Magalhães was entering enemy territory. The streetcleaners' union hall was brimming with the scarlet and black of the rival Flamengo football club, and, perhaps more importantly for his campaign, pamphlets of the PTB. Escorted past a fading poster of João Goulart, presumably on purpose, Raphael found his chest tensing. Unlikely to make a dent in the left's vote here...\n\nBut when he rounded the corner, the entirety of the union was arrayed before him with a mixture of awe and... mirth? The bearded head of the local approached and stuck out his hand with a grin. When Raphael took it, he was rewarded with a firm, friendly slap on the back as well. Much of the union cheered at the display, and began crowding closer to the candidate.\n\nA wizened cleaner began: "We thought the UDN was the bosses' party, out ta fill their pockets by emptyin' ours. Thought-"\n\nA squat woman at Raphael's elbow jumped in. "Now we know that's just campaign nonsense! You tricked 'em, the North Americans. Got them to put their factories here, my cousin -" A burst of babble from the crowd cut her off, but she started right up again. "and their guns too, so we can fight the gauchos!"\n\nThe union head gave a whistle and the room quieted down. Apparently he had used the opportunity to slink back down the hall and retrieve the Jango poster, which he now held up in a meaty hand. "You UDN folks planning to keep running this country like you have been? Not like you say you will?" His mouth was smiling but his eyebrow raised.\n\nRaphael swallowed and said, "My party and I will run this country well. And that's how you want it.""
brazil_lacerda_campaign.4.a: "To hoots and cheers, the union president ripped up the poster and said, "Then we're voting UDN.""

brazil_lacerda_campaign.5.t: "Manchete's Slice"
brazil_lacerda_campaign.5.desc: "Raphael Magalhães had been surprised when Lacerda had approved the interview with Manchete - the magazine was known for its ties to former president Kubitschek. But reclined in a leather chair in Manchete's offices, having flattering headshots snapped by their photographers and fielding softball questions from a smiling interviewer, he had to admire the President's judgement. The Crow certainly knew the press.\n\nAfter his good side received another several flashes, Raphael turned back to the bemused interviewer with a ready answer: "Setting up Guanabara as a new state has given me an unparalleled understanding of how our federal system works in theory... and in practice. I look forward to a close partnership with our nation's governors."\n\nThe interviewer nodded, scribbled for a moment, and then lowered his pad. His coffee-colored eyes glinted with a fresh menace. "Manchete's readers are deeply interested in the state's role in our economy. You played a key role in President Lacerda's campaign, where he claimed that regulations were strangling Brazilian enterprise. Do you still hold that to be true? Will your administration slash regulatory safeguards further?"\n\nClick. Raphael prayed that they wouldn't use that picture, all creases of worry on his face and a stunned look in his eye. He forced a smile for the next angle, and tried to think. President Lacerda had promised a regulatory bonfire on the campaign trail, but the administration's economic middle course had been more of a campfire. Should he campaign in the poetry of his mentor? Even when deviating from the administration's current policy could be taken as a critique? Or be his own man, set out a bold new tact?"
brazil_lacerda_campaign.5.a: ""Like so many, I'm inspired by President Lacerda's vision. Let's cut the red tape holding us back.""
brazil_lacerda_campaign.5.b: ""President Carlos Lacerda has guided our economy superbly; I would be proud to take the same course.""
brazil_lacerda_campaign.5.c: ""Administrative experience lets me distinguish needed from harmful regulation. Good government is my aim.""

brazil_lacerda_campaign.6.t: "Tested Faith"
brazil_lacerda_campaign.6.desc: ""I mean, seriously, Rubens. I could have sworn I saw three Udenistas walk in here. Are you trying to get me killed?" Rubens Paiva started cackling. There were two pros to inviting Leonel Brizola on a night out: he wasn't just a good name to come with, he was good company. Given the dearth of his humorless colleagues in the Câmara, it was, at any rate, a refreshing contrast.\n\n"I heard they aren't poisonous until they get an office on the Monumental Axis," he replied, lifting his gleaming silver fork out of his vinaigrette. "If there is any justice left in this country, you should be OK for now."\n\nBrizola's wan smile retreated, now nodding. "The last few years have not been kind. Lacerda and his love for 'business' is one thing, but the way the CGT gave in with the Labor Law business is totally another. We've been so spineless."\n\nA cheeky glint appeared in Paiva's eyes. "Well, if it's about business, then maybe a Paulista on-side wouldn't be so bad," he said through one side of his mouth, firmly focused on his plate.\n\n"I..." Brizola's pupils suddenly widened. He stopped himself, gulping. "It was already agreed upon in the party that I would be running with Darcy Ribeiro. There's nothing I can do, Rubens, I'm sorry."\n\nRibeiro, then. Paiva became motionless. He remembered seeing him in the lobby of the voting chamber, scribbling like his life depended on it. To be honest, he was probably still scribbling now; they had chosen a hard worker, no doubt about it.\n\n"No, I mean, it was a joke, I didn't mean anything by it, I mean it." Realizing he had said the word 'mean' three times in the same sentence, he stiffened up, then started to nod and dig into his meal once more. "Whoever's on the ticket, I'll fight alongside you all the same. You can count on me, Leonel.""
brazil_lacerda_campaign.6.a: "In a crisis, one cannot afford to step back."

brazil_lacerda_campaign.7.t: "A More than Warm Welcome"
brazil_lacerda_campaign.7.desc: ""Bem-vindo a Curitiba!" the voice over the intercom of Raphael Magalhães' very own Douglas DC-3 roared. Its owner himself was a little less rally-prepped than his pilot apparently was. If he was to go strutting from capital to state capital every day for a week as he planned, he would need the Southeast's businessmen to make their voice heard today; that is, with some good old campaign money.\n\nBut rally day had come anyway, it seemed, except not for him. His jet-black Cadillac, on the way to the meeting, suddenly became marooned in the middle of a sea of shouts and signs. It felt hotter every minute. He and his chauffeur shot each other equally puzzled looks. The refrain of "capitalist" was an accusation which, even through the thick frame of the sturdy vessel that safeguarded him, could easily be made out. Then he became curious.\n\n"Sir, don't-!" But the window was already coming down, and Magalhães' curiosity had gotten the best of him. It was useful insight, surely, to know who was so vehemently attacking someone they knew as little of as him (he was certain they did not even know what job he had been doing before). Simple-clothed students paraded blood-red banners and placards with slogans like "Don't let M follow L!" which he found more amusing than poignant. Next, there were the caricatures of himself dressed up as any other Roman-saluting and rights-stomping fascist dictator.\n\nThen there was a burly-looking man who noticed his head peering out of the window. Seeing him push people out of the way as he hurtled towards the car, the chauffeur instinctively floored the pedal and wound out of the bottlenecked street. But in the end, they did give him food for thought: They only saw the mentor, and held him guilty for being the student."
brazil_lacerda_campaign.7.a: "At least they're doing something for society."

brazil_lacerda_campaign.8.t: "Washing the Dog"
brazil_lacerda_campaign.8.desc: "It was a quiet night in the Old Dog, a small bar in the outskirts of Uberlandia. The customers of the bar were wrapping up their night. Luiz, the owner of the bar, was cleaning up, allowing everyone to finish up for the night.\n\n"- at the time, it seemed like a good idea but now it's just, y'know, all screwed up," said Renato. He was new to the bar, but some friends had invited him to come with them.\n\n"Just like the time I voted for Lacerda," said Ricardo, a regular and favorite of Luiz, thanks to his generous tipping.\n\nAnother friend of Renato, Benicio, chuckled, "Did you actually vote for him?"\n\n"Yeah, but I didn't know all of," he made a vague gesture with his hand, "this would happen. Hopefully someone sane gets the UDN nomination so I can vote for them again."\n\nThe group laughed, "Y'know," Benicio said, "at the firm, we're currently in a political warzone. Two of the senior associates got into a fight, one of them's a big UDN supporter, the other one loves the PSD. They got into an argument and now the whole firm is caught up in it, I'm pretty sure they're reassigning offices based on political positions now."\n\nThe group laughed, Renato shared about something similar happening in the factory he worked in, and the group laughed some more, "Lacerda really knows how to piss people off doesn't he?" said Ricardo.\n\n"Well it's the only thing he's good at," replied Renato. The group was interrupted by two men in the corner of the bar who had mostly minded themselves the whole time, "Shut up," the bigger of the two slurred, "Lacerda has done more for this country than you shits ever will!"\n\n"Thank god, if I did as much as him I would I be in prison," Renato said, and his friends cackled, "or at least I should be," the group continued to laugh, and Luiz eyed the two men in the corner warily, but he had to clean, so he went back to it.\n\nDuring this moment of ignorance, the two men approached the group, the big one hit Renato over the head, Benicio spun around and kicked him in the gut. The smaller of the two slapped Benicio, and then Ricardo joined in. The fight was a flurry of punches, some missing their targets completely, some hitting the wrong side of the fight. Luiz sprung into action and tried to guide the crowd out of the bar."
brazil_lacerda_campaign.8.a: "This would take a while to clean."

brazil_lacerda_campaign.9.t: "Curveball"
brazil_lacerda_campaign.9.desc: "The broadcast room was silent for a bit as the ads played; Raphael and the radio host relaxed before getting back to the interview. The interviewer wasn't asking anything too difficult for Raphael to answer, most American interviewers didn't. After a few minutes, they went back on air and the host immediately sprung into action, "So, Raphael, is it safe to assume that if you get elected, Brazil will continue to be a committed OFN member?"\n\n"Of course, whatever our allies do we shall do in unison with them, come hell or high water."\n\n"Now one of the final questions I have for you is about the senate, assuming they, for one reason or another, disagree with the friendship with America that Lacerda has worked on, and decided to vote to move away from the US, would you accept that decision from them?"\n\nRaphael was silent for a bit, this was not how the interview was supposed to go, it was supposed to be a few more softball questions and then he leaves. He couldn't just dodge the question, millions of people across Brazil were listening as they were returning, not to mention all the favors he had to pull to get on this show. Raphael mulled over the question in his mind before answering..."
brazil_lacerda_campaign.9.a: ""It would be a disservice to Brazil's democracy to disregard the senate, even if I disagree with them.""
brazil_lacerda_campaign.9.b: ""The senate should be listened to, even if their opinions differ from mine, but ultimately the decision comes down to the president.""
brazil_lacerda_campaign.9.c: ""The senate isn't elected to handle foreign policy, the president is, it's how it works in the US and it's how it works in Brazil.""

brazil_lacerda_campaign.10.t: "The Sweetest Encouragement"
brazil_lacerda_campaign.10.desc: "It was good to be one of Brazil's most electable men this night. Riding back to a hotel after a very successful night at a packed campaign rally, Vargas Jr. recounted the evening's success to a smiling Natel. As the two fell into a comfortable silence in the back of the car, Vargas idly reached into his pocket, pulled out a series of envelopes, and began to inspect the letters he had received earlier that day. He flipped through them with an unchanging expression until he paused at one, raised an eyebrow, and then handed the letter to Natel with a smirk.\n\nNatel gingerly took the letter and scanned its contents, before rolling his eyes and shaking his head. It was a love letter; the words within were as subtle as a hippo on ice, and just as scandalous. Honestly, why would he even show him this? "While your successes outside of politics are impressive, my friend, a man should treat these matters with privacy."\n\nVargas chuckled momentarily before speaking, "Oh, I would never betray my beloved, not for anyone, but" he reached toward the letter, and moved an index finger along the sender's name. Natel looked closer and recognized the last name; it was the same as a major PSD man, from the São Paulo Municipal Chamber. "I cannot imagine how this man would feel about learning of his beloved's wayward affections. Perhaps he may be open to a change in allegiance if he knew we held evidence of it."\n\nNatel stared at him for a moment, his face a plethora of emotions."
brazil_lacerda_campaign.10.a: "Pride. Admiration. Horror."

brazil_lacerda_campaign.11.t: "Refilling the Warchest"
brazil_lacerda_campaign.11.desc: "Raphael Magalhães tapped his pencil against the paper sheets he was hunched over with growing irritation. Radio and television ads. Billboards. Rally spots. Photo ops. Equipment and transit, the cost of everything was piling up faster and faster. The campaign was already the most expensive in the UDN's history, and by a most impressive margin. Generous provisions from the UDN had kept the costs afloat. Still, if the campaign maintained its current rate, and he had carefully looked over the math for it almost a dozen times now, the campaign would bankrupt itself a month and a half before the election was over.\n\nHis grip on the pencil tightened. He thought of stretching out the budget, slowing things down. No, no, no, he needed all the publicity he could get; he couldn't afford to fail. Brazil could not afford for him to fail. His mind was filled with visions of what would happen in such a nightmare. Socialists. Nationalists. Varguist tyrants of all stripes seizing control of the country and strangling it, a second Estado Novo, with twice the ruthlessness and resources. Decades of Brazilian democracy and prosperity lost forever.\n\nThe pencil snapped. Raphael's mind exited from its haze and became focused. Discarding the broken tool, he marched toward his phone. The funds would be found, one way or another."
brazil_lacerda_campaign.11.a: "Time to call in some friends, old and new."

brazil_lacerda_campaign.12.t: "Bountiful Blessings"
brazil_lacerda_campaign.12.desc: ""That well? Yes, yes, of course! Thank you for everything! I'll see you all again at the victory celebrations." Raphael hung up the phone and grinned in triumph. The UDN body's decision was damn near unimamous: the funding requests would go through without a hitch. Oh sure, there had been some grumbling, but it had been token resistance at best; disunited and apathetic at worst. The sheer success of it all was almost dizzying, he knew better than most how cautious the party could be with its money, but this had cleared all doubt from his mind: the UDN knew what was at stake and would work as one.\n\nHell, through some bold maneuvers here and there, he even managed to get more than he asked; a bit of extra cash on top of everything else. The breathing room was appreciated, and his mind turned to some previously disregarded campaign projects with glee.\n\nIn the past, he had always chaffed at corrupt bureaucracies and government systems, at how they consistently stymied his attempts at reform or even basic duties. Today, he had to admit to himself that he was beginning to change his perspective on the matter, if only a little. Cash was king, but morality was the oft-neglected queen."
brazil_lacerda_campaign.12.a: "Raphael Magalhães was rich in both."

brazil_lacerda_campaign.13.t: "Pounds of Flesh"
brazil_lacerda_campaign.13.desc: "Raphael's morning, so far, could be summarized with two words: loud and unsuccessful. The UDN body was sharply divided over his request for more campaign funds; some support for him was there, but to his frustration, it was fractured and limited. The Bossa and Realistas, in particular, spent almost the entire damn time harping on and one about the party line of cutting wastes and maintaining a balanced budget. Even some of Lacerda's loyalists had twiddled their thumbs about "potential spending mismanagement."\n\nFurious, Raphael was ready to return to his home, replan the campaign budget, and pull through with or without extra funds until one of his critics asked to meet with him alongside his associates. Finding a secluded room within the UDN's headquarters, he spoke with a group of influential Realistas. Their offer was to the point: guaranteed positions in the upcoming government, and in return, they would make sure his campaign would get the extra funds he needed.\n\nThe blatantness of the bribe almost made him dismiss it out of hand, but could he, could Brazil, afford for him to say no? To be fair to the men, the positions they were asking for were nothing departmental, but it would give them influence over the levers of power nonetheless. That being said, a "reasonable" bribe was still a bribe, and his ego continued to chafe at the idea of it."
brazil_lacerda_campaign.13.a: "He did not like these men, but they had what he needed."
brazil_lacerda_campaign.13.b: "He wasn't a corrupt politician like those Varguist fucks, he would not bow."

brazil_lacerda_campaign.14.t: "Pyrrhic Promises"
brazil_lacerda_campaign.14.desc: "After three and a half hours... a round of applause at the conference table. It felt like pulling teeth, but Magalhães got the money which his own party ought to have owed him outright, simply by nature of being the candidate. They wouldn't shoot down their own man just yet, as much as the UDN body could wring their hands, he thought, climbing into yet another vehicle.\n\nIf he was bitter about the bureaucracy of it all before, they should check up on him now. They were always excessive: even the early 'Realistas', whatever they thought their name meant, would not spend a cruzeiro if it meant getting lunch. Now they actively got in the way of any effort he made, the urge to smash the whole structure in and let the air into the stuffy old party once and for all was certainly tempting.\n\nBut now it seemed the window of opportunity was gone. Just keeping his campaign finance afloat saddled him with a debt so dear his least favorite faction seemed untouchable. Cutting down on them, if he ever got his portrait in the Planalto, would be harder than with Lacerda, but they didn't stop him from thinking he was right to do so.\n\nOh, the irony. He put his hat into the ring to do what Lacerda could not, but he would be doomed to do no more. Maybe pretending to be a goodie-two-shoes could not last, and sometimes you needed to tip the scales..."
brazil_lacerda_campaign.14.a: "...but now was not the time to think about that."

brazil_lacerda_campaign.15.t: "Free Agent"
brazil_lacerda_campaign.15.desc: "After three and a half hours... frowns all around at the UDN body meeting. Magalhães was gutted. He felt, as much as he tried warding off pessimism his whole career, as though his campaign appeared to have died in that room that day. No funding increases, which for him would mean funding cuts, and making do with what was left.\n\nHe listened to his campaign schedule get re-written in real time, the length of his television ads get slashed, and the microphone system he had petitioned get iced. He had never been on board with the Realistas, but now he hated them with a passion. Maybe this time, they might see the grave they dug for themselves as well as the party. But he knew they would definitely not.\n\nIt didn't matter, he thought, heading towards the car with a dispassionate trod, whether this sunk his ambitions for President or whether he would turn it all around. He had made his point and stood up for it, and kept his principles even when they tore up his budget. He would treat himself to steak for dinner that night."
brazil_lacerda_campaign.15.a: "A cheap one, of course."

brazil_lacerda_campaign.16.t: "The Brow of Labor"
brazil_lacerda_campaign.16.desc: "Lacerda's presidency has not been without its detractors. The Brazilian Left, once cast aside before the indomitable power of the Lacerdaist vision, have been far from vanquished. Years of plotting have come to an end with this election; their methods clear to Raphael.\n\nLeonel Brizola had shot into the campaign trail like electricity into water. Around the country he has been meeting with crowds, delivering speeches and promises that have earned cheers. Newspapers have pictures of him meeting with senior Trade Unionists, framed handshakes proclaiming labor's allegiance. Rural halls near farmland seemingly stretching to the horizon have posters of his face and slogans posted to them, with Rapahel's nowhere to be seen.\n\nUneasy alliances, but united to a common man by a common cause; Lacerdaism must not see a second president. Each of these groups, seduced by the promises of this left-wing populist, perceive all the UDN has achieved, that Raphael wants to work towards still, as hostile to them and to Brazil. Lulled by the half truths and misrepresentations Brizola loudly proclaims, they believe themselves to be part of some perverse salvation in the service of the cynical interests of those the UDN oppose. The cynicism that would see Brazil lead to ruin in pursuit of ideological phantasms, derailing Brazil's prosperity for headlines.\n\nHowever misguided, the building momentum couldn't fail to be noticed. Raphael placed down the newspaper he had been skimming through, the latest of a huge pile haphazardly spread around the desk. He stared at the smiling face of Brizola smiling at him, eyes whispering of victory."
brazil_lacerda_campaign.16.a: "Raphael noticed this. Raphael will not let this stand. Raphael makes a call."

brazil_lacerda_campaign.17.t: "Titans"
brazil_lacerda_campaign.17.desc: "A frontline of camera flashes fired upon the stage, the glaring yellow lights bathing it in an almost midsommar haze. The raucous of the audience was overpowering, mingling with the glares like a stream of arrows. The moment of confrontation had been prepared for.\n\nOn one side of the stage, just out of view of the maddening crowd, stood the self-styled People's Champion. Brizola stood calm and motionless, a rock in a proverbial stream, his face merely hinting at the momentum coalescing around him. He had napkins stuck down his collar, some staffers applying last minute makeup touches while others went through the final strategy notes. The debate stage was not his usual haunt but an audience was - what was a debate but a dynamic rally? There were still those who feared the PSR, scared by claims of radicalism. Now was his moment to show himself as the composed statesman the people truly wanted.\n\nAcross the stage, Raphael bounced slightly on his heels, staffers similarly taking him through planned stratagems as his mind raced with images of the upcoming duel. He had character, few would deny his bravado, but he had always been an administrator. The man knee deep in the building, but rarely the headliner. Now he had to turn that character into the public persona only hinted at so far in the campaign - could he do it? He regarded the stage with sideways eyes, his vision filled with predictions.\n\n"Sir? Sir?" The staffer next to him looked at him, eyes expectant of an answer to a barely heard question.\n\nRaphael came back to his senses, returning to the conversation he had momentarily drifted from. "Strategy, yes. Well, as you said Brizola will be trying to undermine my image and discredit me, therefore...""
brazil_lacerda_campaign.17.a: ""...we should go for the jugular. Challenge him on his radicalism and vague policies; show the public the man behind the image.""
brazil_lacerda_campaign.17.b: ""...we should focus on our campaign, solidify our image and let him come for me. Show the public the man behind the image.""

brazil_lacerda_campaign.18.t: "An Early Screamer"
brazil_lacerda_campaign.18.desc: "The white-hot focus of the entire nation seemed to focus on Raphael as he prepared his attack, the palpitations of his heart becoming a little faster. As he scanned his notes up and down one more time, a determined yet modest smile appeared on his face.\n\n"Thank you, all of you, for being here today. As we face down a new decade, and we require new leadership for that decade, I could not be more proud of our country's interest in the problems we face, and the keenness of our voters to know what they are voting for."\n\n"But that brings me onto my first point. Who is it that Brazil will be voting for? Unfortunately, as one part of that choice, I do not feel Mr. Brizola has answered that question for me as a voter so far. Will anyone from your party please explain to me what it is that you stand for?"\n\nThe camera cut abruptly to Brizola, a fresh sheen of sweat coming into view, clearly unprepared for the shift. "I- Gov- Governor, I find it truly astonishing that- that-"\n\n"It is astonishing, I agree!" interrupted Rapahel, "It's astonishing that you can explain yourself as much as your communists in the Câmara. Now, another question. Could anyone ever betray this country as shamelessly as Mr. Brizola and his incompetent party already has?"\n\nNow it was Magalhães standing calm and motionless. A wild cheer erupted from off-stage, inviting much of the audience to clap furiously, leaving a gobsmacked Brizola and an irritated host, the former of which was left speechless for the world to see. The moderator repeatedly tapped the microphone."
brazil_lacerda_campaign.18.a: "One goal up - and in the first five minutes!"

brazil_lacerda_campaign.19.t: "A Stutter Step"
brazil_lacerda_campaign.19.desc: "Raphael bathed in the flashing lights, composing his words before he began. The expectant faces looked at him, a silence falling upon the room as soon as he had shaken hands with Brizola, who now stood on the opposing podium with a half grin pointed towards audience members with cameras. Raphael took a deep breath and began.\n\n"Thank you, all of you, for being here today. This debate is, for me, a deeply personal moment as it represents not only my chance to show all of you the man determined to guide Brazil into a new decade, but also the significance the event has."\n\n"I am a Laceraist, and the man behind that mantra has been a personal mentor to both me and Brazil these past years. His drive was for good governance, prosperity and efficiency; something that has improved the lives of many in this room. Most of all, he believed in Democracy, and that remains the cornerstone of the Lacerdaist outlook. This debate itself is the demonstration of the Brazilian Democracy that my predecessor loved. It is that Democracy for which I will build upon past successes, to safeguard and accelerate our progress. Thank you." He smiled, and waited for the applause.\n\nSilence.\n\nFirst came a single shout, the accent rural, decrying Lacerda as an American puppet. Then came another, accusing Lacerda of tearing down his home. Then another, and another. Within moments the room was filled with jeers, a chant beginning in one section of the crowd declaring Raphael lets the CIA fuck him up the ass. Brizola stepped off his podium, calling for calm and dignity for his opponent while the moderator tried to silence the jeering disrupters.\n\nRaphael stood, his posture small. He watched Brizola call for a respectful debate while cameras flashed upon him, and he swore he saw the ghost of a smirk cross him."
brazil_lacerda_campaign.19.a: "Shit."

brazil_lacerda_campaign.20.t: "What Is Mightier?"
brazil_lacerda_campaign.20.desc: "Raphael was calm. He had been for the last few minutes. The debate tonight had been dry, Brizola full of vinegar about government penny pinching. Eventually Raphael had mentioned education, and Brizola launched into a tirade about how UDN scrimping had only been to the benefit of the rich, which Raphael desired to continue. Raphael smiled; he had spent all night trying to lead Brizola to here and he had finally taken the bait.\n\n"For my rebuttal," he said to the audience once the Moderator invited him to speak, "I want to read this letter." He withdrew a gilded envelope holding surprisingly cheap-looking paper, torn from a workbook. "This letter is from a young boy in Mato Grosso. He says: 'President Lacerda, I hope I am not disturbing your work but I am very grateful that you have taken time to read this letter. I wanted to write to you after my success in the State Essay-Writing Competition. My family has never won such a thing before, we were always little more than a poor family working in slaughterhouses. Father said that was our lot, and we should be proud of it. None of us could write, everything beyond a signature was unknown to us.'"\n\nRaphael continued, "'I've always been inquisitive, and I inquired about the new facilities in our area where the teachers found time and resources to teach me. I wanted to know where the things that allowed me to learn to write had come from. The teachers said it was new Government funding - that it was you. Perhaps this means little, I am not rich and powerful, but you opened the way to me being able to write. I cannot thank you enough Mr. President.'"\n\nRaphael put the letter back in his pocket, an awed quiet dominating the room. "That boy, a working-class boy who never expected anything from us, is now an intern at the Tribuna. That is the legacy I want to continue. What my opponent calls scrimping, I call efficiency. What my opponent calls corruption, I call teaching children to read. I invite all of you to decide which is which.""
brazil_lacerda_campaign.20.a: "The crowd's mighty cheer served as their answer."

brazil_lacerda_campaign.21.t: "Children Left Behind"
brazil_lacerda_campaign.21.desc: "Brizola and Raphael were playing defensively now, mostly reinforcing their positions while launching some light attacks at the other on niche policy issues, like excessive deregulation. After a question on the concerns of deforestation the moderator proposed a new question.\n\n"Mr. Brizola, you've been a very vocal critic of the education policy of the UDN, but you've shied away from discussing an education plan of your own, would you care to share your plan on the topic?"\n\n"Of course, the free reign that the UDN has given the rich so many tax breaks that they've completely disregarded the underprivileged youth, leaving them with the scraps of the funding. Under my governance, such acts would not be allowed, and their money would go to education."\n\n"Mr. Magalhães, your response?"\n\nRaphael nervously scratched his face, "My educational reforms are nothing like Brizola has described. They've reduced waste in the school systems by getting rid of corrupt teachers," Brizola made a face, getting a laugh from the audience, "It, uh, also has raised our literacy rate, and refocused our schools on the students."\n\nBrizola had a devilish grin on his face, "If I may respond," Brizola pulled out a piece of paper, his trump card, "According to a recent survey by the Ministry of Education, 46% of students from grades 1 to 8 cannot point out Brasília on a map, 38% do not know when the republic was founded, 53% do not know when slavery was abolished, 29% didn't know about the Paraguayan War, and 30% didn't know that Brazil fought in World War 1. I could go on, but I believe I have made my point."\n\nThe crowd's silence stung Raphael like a thousand wasps. Lacerda had given him a horrid hand to play with."
brazil_lacerda_campaign.21.a: "Moving on, Mr. Magalhães..."

brazil_lacerda_campaign.22.t: "Went the Day Well?"
brazil_lacerda_campaign.22.desc: "The time had finally come for the closing statements. Both men had both looked forward to and dreaded its coming. No matter their rhetorical skill or factual knowledge, it came down to that single, final impression they could impress upon the nation.\n\nBrizola was invited first, and the change was notable. In the throes of the verbal battle his instincts had carried his expressive delivery, but in the face of the curtain call his enthusiasm had dampened. He called Raphael a capable candidate, quite the relative compliment from Brizola thought Raphael, but remained steadfast upon his foundation. Brazil was a proud nation that Raphael wanted to lead away into being more American in soul. He asked Brazil if they shared his concern before concluding.\n\nRaphael began his address politely, cooling the bravado that had fueled his performance so far. He said that he too thought his opponent was capable, before posing a question. "Was Alexander the Great a capable leader?" he asked, before going into a short list of renowned leaders. Julius Caesar, Richard the Lionheart, Pedro II, he asked if all these were merely capable men. Or, he challenged the audience directly, were they more than that?\n\nThe bravado returned, words effortlessly flowing to the evermore enraptured audience. "No nation can prosper unless those that lead it live on the fiery passion of its success" he declared, citing that Brazil was the greatest nation in the world and he would fight and bleed to ensure its prosperity and freedoms were kept sacred and renowned. The audience cheered as he declared that petty euphemisms about the Americans or cowardly implications of corruption were beneath him and beneath the people. He saw ahead of him a Brazil that shone as a beacon in South America to the world; the cradle of a true new power. He slammed his podium as the crowd chanted his name, asking if every man, woman and child watching were ready for the future of Liberty."
brazil_lacerda_campaign.22.a: "The Moderator and Brizola could only watch as Raphael's name was written in their hearts."

brazil_lacerda_campaign.23.t: "An Imposed Impasse"
brazil_lacerda_campaign.23.desc: "The time had finally come for the closing statements. Both men had both looked forward to and dreaded its coming. No matter their rhetorical skill or factual knowledge, it came down to that single, final impression they could impress upon the nation.\n\nBrizola began, his enthusiasm visibly dampened but very much undefeated. Rapael sighed inwardly as Brizola accused him of having an administration mindset; a capable man - decent even - but incapable of being the strong leader that was needed to protect the Brazilian people from the businesses that sought to exploit them. That he was trying to emulate America, not develop Brazil, and he posed a single question to the audience: "When business oversteps their boundaries and leaves you unemployed after injury, fired days before your mortgage is due or homeless in a Rio alleyway, what use will administrative efficiency have been?"\n\nSome applauded, continuing until Raphael began his statement. He highlighted his respect for Brizola's motives, but questioned his ability. He highlighted Brizola's lack of cohesion in his policies, decrying them as being little more than a shopping list of wants than a policy platform. Echoing his opponent, Raphael challenged the audience: "What good intentions will be when government overreach triggers recession, or when tax rises force families to choose what essentials they can afford?" He closed by stressing that being an administrator wasn't a negative, as Brizola suggested, but a positive. Brazil's growing economy needed a man who could see details and guide it in the people's interests. "That man," he declared, "is me."\n\nThe crowd was similarly split as it had been for Brizola, some clutched in silence while others clapped and cheered. As the moderator made a statement to the crowd, Brizola and Raphael looked at each other."
brazil_lacerda_campaign.23.a: "The two nodded in respect; neither had bested the other."

brazil_lacerda_campaign.24.t: "Upon a Cross of Gold"
brazil_lacerda_campaign.24.desc: "The time had finally come for the closing statements. Both men had both looked forward to and dreaded its coming. No matter their rhetorical skill or factual knowledge, it came down to that single, final impression they could impress upon the nation.\n\nRaphael was invited first, frustration clouding his mind. The debate hadn't shown the truth of Lacerdaism, the questions had been too vague and Brizola allowed to go off on tangents while the moderator blew off his explanations as "verbose". He made that case, to the audience and the cameras, his last card to play. The bias inherent in the debate, the cover they were given the vacuum which was Brizola's vision for Brazil. "He seeks to crucify our nation upon some vague ideological cross" he closed with, and he prayed it reached them.\n\nBrizola's statement, however, made that hope seem hollow. The Populist's enthusiasm hadn't abated, rather accelerated as he tore into the Lacerda Administration and its "new stooge". He called his mentor a "corrupt American puppet" who tore up the Brazilian base that Vargas had built. Condemned him personally for an "absence of wherewithal" unable to present the argument of a basic program. Raphael clutched his podium with increasing anger, a false smile thinly plastered on his face.\n\nBrizola looked across at Raphael, charming eyes above a twisted grin. "This man, Brazil, says I will put our nation upon a cross. I beg to differ; only the ideas which abuse and exploit the Brazilian people are on my ideological crosses. American Imperialism, Crony Capitalism or Raphael's Lacerdaism - and under my Brazil, they will be upon a cross of gold."\n\nCheers followed, not roof raising, but they were deafening to Raphael."
brazil_lacerda_campaign.24.a: "He could already see tomorrow's headlines, even if he closed his eyes."

brazil_lacerda_campaign.25.t: "Coffee on the Campaign Trail"
brazil_lacerda_campaign.25.desc: "Lacerda was glad to be able to meet up with Raphael in the back of a fancy cafe in Fortaleza. Raphael had taken the opportunity to brief Lacerda on all the ongoing challenges of the campaign, but also the brilliant speeches and productive discussions he had had.\n\nNow Raphael was diving into a particular story that he couldn't seem to discuss without breaking into a grin, "... And so there I was with the Free French ambassador, and he was asking me about you and your Presidency. I went to speak, and guess what I said?" After a pause, he continued, "I went and called you 'La Merda'! He dropped his coffee in shock and stained right through his shirt!" The two men shared a genuine laugh at the story.\n\nLacerda took the chance to change topics, "Raphael, are you feeling alright? I know the toll campaigning can take-"\n\nRaphael's smile faded, "I'm fine, don't worry. I look worse than I feel, but the coffee will fix that."\n\n"Are you sure, because the bags under your eyes tell a-"\n\nRaphael waved the concerns away, his smile having disappeared and his tone turned cold, "Stop. I'm fine. I'll do my job, you do yours," and so that was the end of that. The two men sat in silence as they sipped at their coffees, the jovial mood having come to an end."
brazil_lacerda_campaign.25.a: "Well, I have some documents to sign, so I should go...""

brazil_lacerda_campaign.26.t: "A Máquina"
brazil_lacerda_campaign.26.desc: "The smell of fast food lingered around Raphael's office, the empty wrappers and cups near forgotten on the side of the desk. Their place was taken by an assortment of packets, almost a dozen neat dossiers with a small description stapled to the front of each. He and his Head of Staff sat, lethargic in the glow of their meal while they looked at the dossiers.\n\n"Sir, these are proposals the staff have drawn up for where to focus our efforts. Each is detailed but for ease's sake we've - ". A raised finger and a furrowed brow silenced him. Eyes looked over each one, reading efficiently through the details of each. Disregarding each in turn.\n\nToo partisan. Too expensive. Too close in proximity to last week's campaign focus. A flurry of negatives struck Raphael as he mentally graded them into what was useful or not.\n\n"These two," he said, picking them up with still slightly greasy hands and releasing them to the other side of the desk, "these two are useful." One was entitled 'Southern Industrial Strategy' and the other 'Rural Moderation Strategy'. "As I see it," he continued, "We either try to take on the PTB in their own backyard or we blindside them and appeal to the rurals and natives. They've not put much energy into campaigning over there since we've never really courted that vote - if we can get them onside the PTB won't have time to respond.\n\nA raised eyebrow answered him. "That's a big if, also the PTB have the industrial workers in the South as a base for a reason. But, assuming all goes well, the North gives us big numbers while the South gives us a threatened PTB and a few extra large donations if we're lucky."\n\nRaphael rapped his fingers on the desk. "Blasted politics, when isn't it a risk? Everything else is a nonstarter, we have to take the risk somewhere.""
brazil_lacerda_campaign.26.a: ""The bold approach is often the winning one, let's see some factories.""
brazil_lacerda_campaign.26.b: ""Politics is about leaps of faith sometimes, lets see some farms.""

brazil_lacerda_campaign.27.t: "The Wondrous Nature of the Northeast"
brazil_lacerda_campaign.27.desc: "There were many cars fit for a president. If you asked a lot of people, a Toyota Bandeirante would not be on that list. But Raphael sat in the backseat. His bodyguard rode up front with a driver who was highly recommended, while a young photographer straight out of college sat beside him. While his other body guard and the other young and hungry reporters were in an equally rusted truck behind them.\n\nBrizola was content to sit back and let his lackies run newspaper ads; but Magalhães was here. Down with the people themselves in the parts of Brazil that most candidates never visited! Driving through Nordeste in a straight line from Salvador to Xique-Xique showed how the state was a jewel in Brazil's crown, even if it was a little tarnished. The green forestry with its colourful animals quickly gave rise to the orange sands with tall dunes which swallowed up ghost towns and farms. The only consistent in this varied and enchanting state being the clear blue sky and the gray asphalt road.\n\nWhen they got to the next small town, filled with peeling paint and a main road with more holes than a colander. Half of the townspeople turned up, although, gauging if they liked the speech was another matter as they watched him with the same placid expression. Each one keen to see if the man in front of them really cared or if he was just desperate. He tried not to worry too much about the town as he shook hands then bundled into his car. Soon, Raphael had his gaze fixed on the São Francisco River, which rushed below him as the SUV trundled along a mountain pass. He was about to give over to the serenity of his surroundings for a nap, he heard the reporter beside him clear his throat.\n\n"Mr. Magalhães, if it's alright with you, I think a shot of you overlooking the view would be good. What do you think?" The photographer asked nervously and Raphael only laughed. Even if the photo wasn't used in the campaign, it would be a nice memento of this trip. A real look at the real Brazil."
brazil_lacerda_campaign.27.a: ""Of course! Just be sure to get my good side.""

brazil_lacerda_campaign.28.t: "The Great Southern Smokestacks"
brazil_lacerda_campaign.28.desc: "The limo inched along the road to São Gonçalo, the exhaust from the countless vehicles ahead mingling with the plumes of smoke arising from its destination. Abilio, a young UDN campaign staffer, thanked God once more that he had been allowed to accompany Raphael Magalhães rather than trail behind with his fellows in the bus with the broken ventilation. Still, Abilio was receiving his fair share of hot air.\n\n"It's a testament to Brazil's economic diversification that this industrial powerhouse can thrive so close to our tourist-haven capital. Capital... capital and labor here, they both serve their purpose, keeping this great machine, this great city, running non-stop. They will struggle for dominance, no, change that to control. For control. But so long as we keep the machine running, the dollars, the pesos, the cruzeiros all flow in. It isn't beauty or culture that puts São Gonçalo on the world map - it's ceaseless, mechanical activity."\n\nAbilio's pen raced across the page. His hand was beginning to cramp under the force of this stream of consciousness turned river.\n\n"And that's why we're visiting Joaquim. His firm provides the metaphorical oil for the machine. Petrochemical research. Keeps us at the cutting edge of-"\n\nAbilio's head jerked up to greet the sudden silence. Raphael, jaw clenched, was staring out the window at two men sharing a cigarette on the roadside. Each were missing a leg. The shorter of the two leaned forward on his crutch to take a puff, eyes boring into the tinted glass that separated him from the presidential candidate.\n\nMagalhães' hand drifted toward the crank to lower the window, but the limo had moved on. The candidate thrummed his fingers on his thigh before turning to Abilio,"
brazil_lacerda_campaign.28.a: ""I wonder what machine they were caught in.""

brazil_lacerda_campaign.29.t: "The Magalhães Cut"
brazil_lacerda_campaign.29.desc: ""Get rid of any footage showing the audience," Raphael ordered, voice an icy calm. From the rear of the car, the three interns answered with a flurry of activity. Out went the images of the heckler calling him a whore for the rich and the slavedriver of the poor. Out went the red-faced man spewing spittle and invective, claiming that papa Carlos was why he couldn't feed his hungry children. Out went the shot-reverse-shot of Magalhães failing to quell the riotous crowd with a timorous thanks and then bee-lining for the waiting vehicle, followed closely by the panicking cameraman.\n\n"Now you," Raphael turned to the shocked staffers sitting beside him, "are going to tell me why that was an utter disaster. And how you are going to make sure it never happens again."\n\n"Um." Abilio chewed his lip for a moment. Then his words began tumbling out at a rapid clip, "The town's leadership was very welcoming - they even offered to pay to promote the event in the local papers. Said they were big fans of the administration's successful mechanization efforts, and that tax revenues and trade had been soaring."\n\n"Get rid of any footage showing the audience," Raphael ordered, voice an icy calm. From the rear of the car, the three interns answered with a flurry of activity. Out went the images of the heckler calling him a whore for the rich and the slavedriver of the poor. Out went the red-faced man spewing spittle and invective, claiming that papa Carlos was why he couldn't feed his hungry children. Out went the shot-reverse-shot of Magalhães failing to quell the riotous crowd with a timorous thanks and then bee-lining for the waiting vehicle, followed closely by the panicking cameraman.\n\n"Now you," Raphael turned to the shocked staffers sitting beside him, "are going to tell me why that was an utter disaster. And how you are going to make sure it never happens again."\n\n"Um." Abilio chewed his lip for a moment. Then his words began tumbling out at a rapid clip, "The town's leadership was very welcoming - they even offered to pay to promote the event in the local papers. Said they were big fans of the administration's successful mechanization efforts, and that tax revenues and trade had been soaring."\n\n"This is just a guess but... perhaps the mechanization worked a little too well? Those protestors seemed to be unemployed - they could be farmhands recently replaced with tractors."\n\nRaphael leaned closer and whispered,"
brazil_lacerda_campaign.29.a: "If only we could replace campaign staffers with tractors instead."

brazil_lacerda_campaign.30.t: "Spreading the News"
brazil_lacerda_campaign.30.desc: ""A great man!" Shouted the tanned older man, shaking Raphael's hand with a calloused grip. "You're a great man sir! Brazil's liberator!"\n\nColorful banners, phrases in bold letters, and even the occasional portrait of himself. Raphael grinned, waved, but was unsure of what to say. He'd never seen so many people attend, never had his thoughts drowned out by cheering, honking, whistling, and clapping. Maybe this was how the dictators felt. The rally devolved into more one-on-one greetings. Raphael shook more hands that afternoon than in any of the previous weeks. He'd downed a couple of shots, swayed to lively guitars and drums, and heard the workers' concerns.\n\n"Lacerda is the reason I can fill my children's plates," someone said, and that stuck with Raphael as the sun fell and the campaign started to withdraw from the town. His cheeks were strained from so much smiling, his throat dry after so much laughing and yelling.\n\nRaphael put his arms over his two staffers. "What kind of dark magic did we pull to get such a welcome?"\n\n"Frankly, we expected the opposite, sir," said one, dabbing his sweaty forehead with a handkerchief. "Local leadership made getting here at all a pain. Demanded... 'donations.'"\n\nThe other staffer assented. "One of our guys got chased out when he came here to book the venue." He scoffed. "They're lucky this town is so well situated to make it worth our while." Raphael smiled, happy for this break.\n\n"Apparently, the workers are happy we cut federal subsidies and stopped mechanization. Their jobs were protected." As the campaign moved on to their next target, Raphael promised to remember their faces, real people instead of the college critics."
brazil_lacerda_campaign.30.a: "People were happy with them for not doing something for once?"

brazil_lacerda_campaign.31.t: "A Fairly Dealt Hand"
brazil_lacerda_campaign.31.desc: "Raphael couldn't believe it. Someone finally beat him at Escopa, but not one of his usual opponents. Instead, a Kayapo boy flashed his cards with a smile while his fellow tribespeople watching their match looked equally as proud.\n\n"Looks like I beat you!" The boy exclaimed with a beaming smile.\n\n"Indeed, you have, Kauã." Raphael said, in utter disbelief at being beaten at the card game he had grown up with.\n\nWhen he came here with a photography crew, Raphael expected to shake hands with a few chiefs and move on. Instead, he and his team met with thirty or so natives from a local fishing community. They shook Raphael and the team's hands before doling out food, drink, and cultural exchanges, even offering to paint them while Raphael taught them his favourite card game, before they listened to the elders.\n\nThey spoke about being skeptical; it was no secret that the Brazilian government usually mistreated the natives by invading their lands and destroying the rivers they relied on.\n\nHowever, the villagers' lives had improved exponentially. The villagers can head into town and receive medical care from a local hospital, leading to a healthier tribe, and that didn't even mention what a boon the schools were.\n\nThe young would teach the elders how to read and write from what they learned in school, while the elders would, in exchange, teach them how to hunt based on their years of experience. Raphael was no native fetishist and was a politician at heart, but he had to admit that he couldn't give a shit about the photo-op they were originally here for; even though it was a wild success. As right now, he glowed as he was face to face with the wonderful new Brazil he was helping build."
brazil_lacerda_campaign.31.a: ""Now, who here thinks they'll be able to beat Kauã?""

brazil_lacerda_campaign.32.t: "Engagement"
brazil_lacerda_campaign.32.desc: "The heat was dizzying outside the hotel, the tall tree Raphael sat under offering shade that did little to cool him. He swore he could feel the moisture in the air as he sat on his deck chair, gazing at the treeline of the nearby forest with its single road praying for something to emerge. Nearly two days he had waited here for a promised meeting with a dozen Amazonas tribes and yet not one had arrived. Today was the last straw - his contact said a few representatives would come today. If not, they would be leaving this green pressure cooker.\n\nFanning himself with an oversized leaf he'd found, he spied movement from the road. A single man, hunched over and elderly, walked towards them precariously balanced on a walking stick. Calling for his team and their cameras, he felt a cool jolt of enthusiasm as he leapt up and closed the distance to the newcomer. Even one good meeting could be spun as a success. As he arrived though, a single examination up and down Raphael was conducted before, rather unceremoniously, the man spat in his face. "The people of Pará care not for your bribes or cameras. This is our statement to you." He stood, a cold expression regarding Raphael as he wiped the spittle from his face. Raphael's team reached the two men, stopping in surprise as they saw the encounter's hostility.\n\nRaphael's clouded mind felt punched, skin red hot with the humidity and the frustration. "I come here," he started, "to reach out to you. Yes, I want your votes you stupid bastard, but did none of you think to even talk to me to say what you wanted? What have I done to earn such disrespect?"\n\nThe old man's cold expression was unflinching. "Nothing yet. But Lacerda cared little for us. Our youth aren't richer but they are less protected. Your administrators, corrupt. You didn't care then; it's like Vargas never left. Why then should we care for you?" Raphael turned to leave, days of annoyance slipping out in a heatstroke haze."
brazil_lacerda_campaign.32.a: ""I hope spitting in my face was worth not bothering to make your case.""

brazil_lacerda_campaign.33.t: "Red Card"
brazil_lacerda_campaign.33.desc: "Raphael's limo pulled up to the Eucaliptos stadium. He was there to see a football game between Internacional and Gremio, so were some 18,000 people. He didn't care for football that much, or sports for that matter. This was a purely political move, his campaign team believed that a football game would give him some more appeal to the working class. As he got out of the car and made his way to his seat, he could tell this was a mistake. After a brief fanfare from the announcers, he felt as though the entire stadium was hostile to him. Behind he heard two Internacional fans talking.\n\n"Can you believe this guy coming here?\n\n"After Lacerda abandoned us to the dark age he just walks in here and pretends he's one of us?"\n\nRaphael tried to ignore it. He then noticed some Gremio fans side-eyeing him and gossiping about who he could only assume was him. It went on like this, until the game ended. Some Internacional executives brought him aside to talk to him before he left.\n\n"Thank you for joining us, Mr. Magalhães, we're glad to see that you're an Internacional fan."\n\n"Thank you, I've been one since the club opened. Say, I've heard some talks that you all are building a new stadium?"\n\n"We are," perked up one executive. He was interrupted by another one, "We've faced some delays in the construction, unfortunately."\n\n"Really," Raphael feigned interest in the subject, "What kind of delays?"\n\n"Federal restrictions. They've been... troubling us recently."\n\nRaphael just nodded along for a bit before excusing himself. The limousine was a nice reprise from the mess that was the game. A lot more would have to be done to win the support of the working class than just going to a football game."
brazil_lacerda_campaign.33.a: ""-and Lopes kicks the ball too fast for Álvares and scores a goal for Gremio!""

brazil_lacerda_campaign.34.t: "GOAL!"
brazil_lacerda_campaign.34.desc: "Raphael's limo pulled up to the Estádio Beira-Rio stadium. He was there to see a football game between Internacional and Gremio, so were some 38,000 people. He didn't care for football that much, or sports for that matter. This was a purely political move, his campaign team believed that a football game would give him some more appeal to the working class. As he walked into the stadium, his entrance was announced by the commentators, and he was applauded and cheered by the fans.\n\nAs he made his way to his seat, he was bombarded with compliments by Internacional and Gremio fans alike. Two men wearing Internacional jerseys tapped him on the shoulder.\n\n"We just wanted to thank you for helping get this stadium," said one of them.\n\nRaphael looked surprised, "Oh, you're welcome, just doing the best I can for Internacional."\n\n"You're a fan?"\n\n"Been one since the club opened."\n\n"Great! We'll be voting for you just for that," joked the other fan.\n\nRaphael let out a chuckle, and continued to watch the game. When the game ended and he made his way through the bustling crowds, he was interrupted by a group of Internacional executives.\n\n"Mr. Magalhães! We can't wait to see you as president!"\n\nRaphael smiled lightly, "I appreciate your enthusiasm, but there's still some uncertainty."\n\n"If you keep on building new stadiums like this there won't be any uncertainty!"\n\nRaphael let out a chuckle and returned to his limousine. Maybe the UDN was more of a party for the people than the PSP or PTB."
brazil_lacerda_campaign.34.a: ""-and Luís scores a game winning goal for Internacional!""

brazil_lacerda_campaign.35.t: "A Withdrawal"
brazil_lacerda_campaign.35.desc: ""-compared to radicals like Brizola or Vargas Jr., it's quite clear that I'm the safe choice for Banrisul," Raphael calmly stated. He was meeting with some of the heads of Banrisul in their office, in an attempt to sway them to support him. The support of the South's biggest bank would be a massive asset to the campaign.\n\nOne of the executives spoke up, "I believe I can speak for all of us here that if you're anything like Lacerda, we'll most definitely be supporting you."\n\n"The economic growth he's brought to Brazil has done amazing things for us, and the rest of Brazil of course," brought up another executive.\n\n"I've learned a lot working with him," Raphael said. As much as he appreciated the support of Banrisul, he couldn't help but think about how much they were talking about Lacerda. This was expected to some degree, but it felt like they weren't voting for him, but were voting for Lacerda again."
brazil_lacerda_campaign.35.a: "Like President, like Chief of Staff."

brazil_lacerda_campaign.36.t: "Bad Blood"
brazil_lacerda_campaign.36.desc: "He may have been used to giving appeals to rooms to officials gathered in small rooms, thought Raphael Magalhães, but the boardroom of Banrisul, blanketed by giant window panes opening into a garden filled with blossoming trees, still felt a step beyond. Normally, he would be willing to let these executives come to their own conclusion, but he couldn't afford such indecision at this stage.\n\n"I am the only serious pro-business candidate running here." he said, flatly. "I am the candidate for the status quo, and the risk that my opposition poses to this country are too great to bear. Vargas would bring us back to the days of his father, and Brizola to the days of Lenin."\n\n"You claim that we should be relaxed about the prospect of you coming to power," interrupted a wizened, elderly man, whose nametag Magalhães strained to read, "but we've seen what chaos your predecessor has allowed out onto the streets. How can we trust that you won't falter like him?"\n\nMagalhães stuttered for a moment, before shaking his head. "The instability of the past year was unprecedented, but was the result of a subversive campaign that we have since clamped down upon."\n\nThe eyes of the crowd cast themselves downwards, giving way to a protest Magalhães could hear all too well. "That may be at the moment, but how many years do you think it'll take for investors to come back to us?" replied the man, practically rolling his eyes. "Five years? Ten?"\n\nNo matter how many pledges and promises he made, no matter how many reassurances he offered, the general strike still cast a shadow on him, still left them politically homeless. The meeting hadn't been a total disaster, thought Magalhães, but beyond a few vague reassurances, any ties to business he had felt fragmentary."
brazil_lacerda_campaign.36.a: "And however muted, their knives glisten."

brazil_lacerda_campaign.37.t: "Best Left Unsaid"
brazil_lacerda_campaign.37.desc: "Rarely had the television cameras around them run so quiet, and rarely had the eyes of the audience shouted so loudly. With the election fast approaching, Magalhães had reluctantly agreed to a number of debates, first with Vargas Jr. and now with Brizola. The first two had been relatively uneventful affairs, but as election day inched forwards, he knew that he had to break the deadlock. As the moderator guided him on, Magalhães looked towards the blue glint of the cameras and began to speak.\n\n"Under Lacerda, Brazil now goes from strength to strength." shouted Magalhães, refusing to cast his gaze leftwards. "The radicalism of candidates like Brizola will jeopardise all the gains we have made since the dark days of the Estado Novo. Instead of order, we will have the jackboot. Instead of progress, we will have despair." A warm round of applause erupted, only kept short by courtesy.\n\n"I agree with Magalhães that the past has been dark, but we don't need to cast our eyes back decades to find atrocities." responded Brizola, his voice tinged with frustration. "The last few years of rule have seen the military and oligarchs cast a shadow over Brazilian politics. He won't stand up for you; I will."\n\nThe response was more muted, a few claps practically dying in the crowds arms as the moderator opened the forum up for questions. One stood up, a young woman only barely distinguished in the background. "Brizola, we have seen the progress this country has made in improving literacy over the last few years." she asked, almost mockingly. "Where would you say that Lacerda's agenda on education has faltered?"\n\nA perfect question, he thought, and one that Brizola struggled to answer. "It is good that literacy rates have improved, but what are they learning? To accept the lash of the elite?" As he continued, Magalhães relaxed. Brizola could answer their questions, but he was on the backfoot."
brazil_lacerda_campaign.37.a: "And in the crowd, the centre held."

brazil_lacerda_campaign.38.t: "Reaching Out to Nothing"
brazil_lacerda_campaign.38.desc: "Rarely had the television cameras around them run so quiet, and rarely had the eyes of the audience shouted so loudly. With the election fast approaching, Magalhães had reluctantly agreed to a number of debates, first with Vargas Jr. and now with Brizola. The first two had been relatively uneventful affairs, but as election day inched forwards, he knew that he had to break the deadlock. As the moderator guided him on, Magalhães looked into the crowd in front, seeing nothing but boredom.\n\n"Lacerda's government has brought prosperity to Brazil." Magalhães spoke, his voice barely above a whisper as his eyes continued to scour the audience. "If Brizola is elected, then we risk selling the country out to the radical trade unions that threatened to overthrow this nation's democracy. Only I am the continuity candidate." As he finished, a small wave of claps erupted, splashing over the booes in equal measure.\n\n"Lacerda's legacy has already played itself out." responded Brizola, allowing his cadence to echo across the room. "His repression of the general strike has proven that he will always stand with the elite over the commoner, and with the oligarch over the common man." Magalhães watched as a new wave emerged, spread and dissipated over booes, but saw the same voices participate.\n\nShaking it off, Magalhães turned to Brizola. "Repression?" he asked, a slight edge of condescension coming out. "Would it be repression for the police to examine a bloodied knife?"\n\nBrizola laughed in response, smiling slightly as he turned away. "Would it be repression for a soldier to look through his arsenal for the best knife to stab a protester with? Magalhães has a clear answer, and so do I." The crowd too, gave a clear answer, their silence tinged with frustration, with fatigue. As the moderator finally stepped in, Magalhães realised that most in the hall had already made up their minds."
brazil_lacerda_campaign.38.a: "His words were twisted like a blade, used to stab the hearts of all who were watching."

brazil_lacerda_campaign.39.t: "Blood in the Water"
brazil_lacerda_campaign.39.desc: "Rarely had the television cameras around them run so quiet, and rarely had the eyes of the audience shouted so loudly. With the election fast approaching, Magalhães had reluctantly agreed to a number of debates, first with Vargas Jr. and now with Brizola. The first two had been relatively uneventful affairs, but as election day inched forwards, he knew that he had to break the deadlock. As the moderator guided him on, Magalhães looked towards the walls of the hall, its brown tinged a dark red.\n\n"Lacerda's administration has crushed the working man's rights and wages, and have harmed all but a militaristic and oligarchic few." shouted Brizola, refusing to look to his right. "Magalhães will finish dragging us back to the nineteenth century; only my agenda can bring this country into the twenty-first!" A wave of applause washed over, muted only by diplomacy and the intervention of the moderator.\n\nFlattening his eyebrows, Magalhães cleared his throat. "To rewrite history like this is nothing short of comical." he responded, shaking his head. "No leader is perfect, but Lacerda's administration has brought newfound success and prosperity to Brazil. To bring us back to the Estato Novo will not push this country into any new millenium." A few booes rung out, but the crowd mostly remained silent, claps dying in their hands.\n\nIn the silence, Brizola's tirades only echoed further. "Who is succeeding? The farmer, struggling to afford a field for his crops? The labourer, his measly wage no longer boosted by the words of his union? Or the slumlord, laughing as he makes more money than ever before?"\n\nAs Brizola finished, a wave of claps erupted, now echoed by cheers. For every question Magalhães struggled through, every retort from Brizola received a cheer. The debate was fast developing into a rout, an embarrassment that he could ill afford so close to the election."
brazil_lacerda_campaign.39.a: "Across the country, Magalhães' struggles echoed through every radio and television set."

brazil_lacerda_campaign.40.t: "Setting the Record Straight"
brazil_lacerda_campaign.40.desc: "As he sat down into a plush chair, in a room painted a warm blue, Magalhães calmed his nerves. Election day was fast approaching, and he needed to reaffirm his image of an avowed, unabashed moderate. Booking an interview with Da Tribuna da Imprensa, Lacerda's own newspaper, would be crucial in this regard; a newspaper with enough eyes to successfully distribute to the masses, and enough ties to paraphrase any gaffes.\n\n"Mr. Magalhães, it's good to see you," spoke his interviewer, immediately reaching out a hand. "Cleiton Pedroso Bonfim, writer for the Tribuna for the last decade." Magalhães responded with a brief commendation, but one that received no real response. "For the last few years, you've tied yourself closely to President Lacerda. When did this begin?"\n\n"Well, my father was always close to Lacerda, both personally and ideologically," replied Magalhães, bluntly. "When I first began to look into entering politics,it was only natural that Lacerda became my protege."\n\n"And how well do you think his administration has done?" asked Bonfim, leaning forwards. An incredibly easy question, thought Magalhães, especially from a source like this.\n\n"Lacerda has been one of the best Presidents in Brazilian history," he responded, smiling. "He has brought education up to international standards, has cleaned out our bureaucracy, brought us closer to the friends of liberty, and has provided access to clean water nationally. His presidency proves that moderation is key for national success."\n\n"Certain aspects of Lacerda's presidency have been more controversial than others," continued Bonfim, bringing a pencil to his mouth. "Do you think that Lacerda's handling of the 1968 race riots were correct?" Magalhães remained quiet, but only momentarily, before responding."
brazil_lacerda_campaign.40.a: ""I am proud of the direction the UDN has taken in embracing all Brazilians.""
brazil_lacerda_campaign.40.b: ""I th-I know that it is important that the Presidency requires you to tread carefully.""
brazil_lacerda_campaign.40.c: ""I am glad that Lacerda could bring an iron fist down on those radicals.""

brazil_lacerda_campaign.41.t: "One Step Forwards"
brazil_lacerda_campaign.41.desc: "Cleiton Bonfim looked upwards from his notes for a moment, looking at Magalhães with a degree of shock curtailed and measured down to coming off as mere curiosity. "I presume this is you responding to his passage of the Racial Democracy Act?"\n\nMagalhães simply nodded. Nobody wanted to return to the destitution that the Japanese had faced beforehand, and Magalhães knew that a reminder like that would help keep them under his wing. "Of course. The status of the Nikkei community in Brazil was nothing short of a travesty, and a failure of the very duties we should be keeping as Brazilian citizens."\n\n"And how will you look to build on the work that Lacerda has already put in place?" Bonfim looked upwards, allowing his veil of pure interest to slip only slightly.\n\n"Well, we'll look to further our efforts at combating discrimination, and in helping to ensure that this perspective permeates across the entirety of the UDN." responded Magalhães, bringing a hand forwards to grasp for a cup of water.\n\n"Do you think that such action would be in line with the typical platform of the UDN?"\n\nFor a moment, Magalhães struggled to think of an answer. Internal reform was necessary, but he had to speak carefully to assuage any concerns. "The UDN is part of a tradition that has always valued hard work and ingenuity; discrimination simply hurts everybody in this regard, and I am happy to stand at the head of a new UDN that embraces this fact." He shook his head before continuing. "That line of reasoning is where Brizola fails, and why only the right can truly protect the freedoms of all Brazilians."\n\nThe pair paused for a second, shuffling through notes and papers. "So, Mr. Magalhães," asked Bonfim, almost by rote, "You would seek to solidify the progress made on civil rights?""
brazil_lacerda_campaign.41.a: ""Work still has to be done. The immigration ban, for instance, is a key area I would like to amend in office.""
brazil_lacerda_campaign.41.b: ""The cause of the Nikkei is important to us, but that doesn't mean we've thrown law and order to the wind.""

brazil_lacerda_campaign.42.t: "Conservatism with a Human Face"
brazil_lacerda_campaign.42.desc: ""Of course, if we want to talk about the importance of empathy in Lacerdaist thinking, then I only need to point to the Japanese Immigration Ban repeal. I think few could argue that it was not a statement of humanity and our perspective on it."\n\nThe interview had taken on a more candid tone, Cleiton now leaning back into his sofa across from Raphael, eagerly writing down the candidate's words. They came easy for Raphael, not simply due to the amiability of the interviewer but the sense of success that the successful repeal had carried. A concrete statement, and one upon which a proud UDN could stand.\n\n"Many have suggested, Mr. Magalhães, that the repeal revealed that the UDN is a party without a code beyond image and power. What do you say to them?" The interviewer asked his question casually, pen already at the ready.\n\n"I have a very simple answer to them. Nonsense. The UDN is committed to the advancement of the rights of all those in Brazil. The bill opposed that, so we removed it. That is what the UDN is - we won't let anything stand between us and Brazil's prosperity. We are a modern, liberal party. A party that has looked at what has worked in other nations and learned lessons. People deride our policies as "too American", but they miss the point; it is not wrong to learn. We will always learn, but we will always be Brazilian. Everything I do is for the Brazilian people so they may all share in the prosperity we create. If I am elected, that human, Brazilian stance will be able to continue."\n\n"And continue where?"\n\n"Why, to a truly free, fair and rich nation of course.""
brazil_lacerda_campaign.42.a: "The interviewer wrote keenly, the article already forming in his mind."

brazil_lacerda_campaign.43.t: "A Foundational Rock"
brazil_lacerda_campaign.43.desc: ""There are two words key to any functioning society that all Conservatives should think about. I certainly do. That is 'Law' and 'Order'"\n\nThe interview had taken on a more candid tone, Cleiton now leaning back into his sofa across from Raphael, eagerly writing down the candidate's words. Raphael pondered, how best to prove the societal commitment of the UDN? Their credentials to the Conservative bloc?\n\n"I think many will recall the General Strike last year, where the radicals within the Left and the CGT tried to upend the economy for their own ends. I want to stress, it is one thing to be opposed to our platform - we are not Varguists - but to try and hurt an entire country for political ends? This is what is unconscionable to me and my party. Think how many people would have been hurt had we not stopped the strike? How many people's welfare were the CGT going to put on the bonfire to force their goals? This isn't policy, it is anarchy."\n\nCleiton kept writing, barely lifting his gaze from his notebook. "I understand, Mr. Magalhães, that you had a role in countering the crisis. What is your perspective on the idea of UDN liberalisation that some in the media have speculated on in the wake of it? Do you think that prepares you for the Presidency?"\n\n"Certainly. I understand that some liberalisation is required, but I reject liberalism for liberalism's sake. We are moving into the last parts of this century, and the UDN already has an eye on the next. I also know that our free, democratic society has to be protected at all costs, and I think my actions in the General Strike Crisis demonstrate that. We are willing to evolve if needed, but our commitment to Brazil's core values will never change. Lacerda achieved much to serve that and I have every intention of continuing that. Brazil will have a foundational rock of sound society - with that, I dare say anything is possible.""
brazil_lacerda_campaign.43.a: "The interviewer wrote keenly, the article already forming in his mind."

brazil_lacerda_campaign.44.t: "The Rock in the Storm"
brazil_lacerda_campaign.44.desc: ""I don't think anyone in Brazil has failed to notice the momentous occasion this election is. For me, it is the ultimate test of our politics. Time moves on, memories of the dictatorship fade, how well do those looked to for governorship represent the values fought for all those years ago?"\n\nThe interview had taken on a more candid tone, Cleiton eagerly wrote down the candidate's words as Raphael's mind wandered, thoughts of history and his opposition all appearing. He leaned forward.\n\n"We have the PSP, led by the son of Vargas himself. I don't claim he carries the sins of the father, but his conduct has demonstrated his despotic streak. The PSP is famous for its corruption, is that what voters want? A step back into corrupt despotism? Maybe some have rose tinted memories so I ask this; why did Brazil need to rid itself of Vargas the way it did? Because our values are worth protecting."\n\n"Then, Brizola and the PTB. They may not necessarily share the same despotism of their ideology's namesake, but they remain Varguists. They want to use the State to smash Lacerda's successes out of a sense of ideological righteousness, whatever the cost. Recall the General Strike last year; a taste of what occurs when radicals face opposition - they resort to coercion. They speak of labor and responsibility but make no mistake, they view our very foundations as incidental."\n\nCleiton's eyes rose from his notebook. "Where do you stand amongst this?"\n\nRaphael leaned back. "Brazil needs reason in these turbulent times. Reason and the strength to recognise sweetened words and luring promises are not the making of sound government. They are the makings of chaos and discord. I offer the way to avoid that, the path of reason and moderation, and all sound minded majority of Brazil should reflect on that."
brazil_lacerda_campaign.44.a: "The interviewer wrote keenly, the article already forming in his mind."

brazil_lacerda_campaign.45.t: "What is a Country?"
brazil_lacerda_campaign.45.desc: ""In 1968, we saw something I think the majority of Brazil hoped never to see. Radicals rioting, angered that the nation would not surrender itself to their whims. Liberdade, São Paulo, how many States would have to suffer having their social fabric ripped apart because a small minority wanted to coerce the nation? The Anti-Riot Act that Lacerda passed is a demonstration of our rejection of such madness; Lacerda and myself both stood - and continue to stand - for the protection of Brazil."\n\nRaphael adjusted himself in his seat, casting his mind back to those chaotic days - a motion Cleiton picked up on. "Do you feel this event influences your current candidacy?" he asked.\n\n"How could it not? We were close to a brink. Hooligans, seeking discord, caring not for the good of Brazil but for their own petty power. Lacerda, myself and the UDN rejected them, but I fear what would have happened had it not been us? When I look at my opponents in this race, can I trust them to face them down as we would have? Or, if such turmoil were to return, would they bow down, either out of ideological alignment or self-serving cynical pragmatism? It's a question I think many in Brazil ask themselves, and none more than me."\n\nCleiton looked up from his notetaking. His expression, serious yet contemplative, searched for the phrasing of the question in his mind. "You doubt they would?"\n\n"It is as simple as this, Mr. Pedroso. What is a country? Is it a dynamic society of values and responsibilities? Is it a means to power, susceptible to the goals of the men with the loudest voices? That is the question at the core of this election, and I believe firmly in the former."\n\n"And is this influenced by your reflections on the General Strike last year?""
brazil_lacerda_campaign.45.a: "Raphael pondered for a moment, remembering his mentor's brush with organised labor."

brazil_lacerda_campaign.46.t: "A Guardian"
brazil_lacerda_campaign.46.desc: "Raphael's answer came quickly, confidence seeping into his words. "Lacerda, faced with the crisis, demonstrated the core principle of the UDN. That no matter what, the Brazilian people come first and nothing will be sacrificed if it is not in their service."\n\nCleiton nodded. "Some publications pointed to some senior figures in the UDN dissenting, for example Távora's statements in favour of negotiations rather than suppression. How do you react to that?"\n\n"While I respect Távora greatly, and those in the UDN who supported his notion, they were incorrect. The Varguist labor laws were outdated, such notions would have played into the hands of the radicals. Further, I dispute even that term, suppression. We were not suppressing people exercising rights, we were combatting traitors. A strong term, one I hate to use, but what other term is apt?"\n\nCleiton tilted his head. "How so?"\n\n"We had people attempting to coerce the people of Brazil into accepting their diktats. In old Russia that was called Communism. In Germany, Fascism. In Africa, colonialism. In Brazil? I call it treachery. We are a free people, with a system open to all attitudes. If they reject that and try to force their goals then they are our enemy, and I commit myself to Lacerda's example. Those that threaten us should not be compromised with. Freedom and prosperity must always come first; Brazil must come first."\n\n"And what example do you feel Lacerda set?"\n\n"Guardianship. Brazil does not need dictators or despots, but it does need strong leaders. Leaders with the moral conviction, and civil duty, required to value both Brazil's soul and its interests. Lacerda forged the path. I seek to continue it.""
brazil_lacerda_campaign.46.a: "The interviewer wrote keenly, the article already forming in his mind."

brazil_lacerda_campaign.47.t: "A Mediator"
brazil_lacerda_campaign.47.desc: ""Lacerda could have chosen to simply crush those rioting. Many supported that, after all, hooligans ruled many streets. He chose a different path. Why?" Cleiton sent a pondering look to Raphael in response, pen at the ready.\n\n"Proportional response for one. Had we decided to simply crush angry people, would that have addressed the anger's source? It would have led to even more discord, a knee jerk accomplishing little but more harm. Instead, Lacerda chose the path of dialogue and within the storm of anger we found legitimate concerns that could be addressed."\n\nCleiton nodded, a slight frown appearing as his own memories of that time surfaced. "I recall some in the UDN criticised Lacerda for having a soft response. How do you reflect on that?"\n\n"A perfectly natural response, I do not blame them. I do not condone anyone's rioting - those that partook in it were acting criminally. However, we should not forget that this was being sparked by some sense of injustice. Many did the same to Vargas, they were criminals too? Make no mistake, many radicals exploited that situation and were crushed as needed. However, Lacerda had the strength to identify who had the legitimate concerns and treatise with them instead."\n\n"How does this influence your views on the current race?"\n\nRaphael thought carefully for a moment. "Vargas Jr's vocabulary lacks the word compromise, whereas Brizola is too imbued with a populist sense of righteousness to accept the notion. Brazil is a dynamic society; sometimes we need to lay down the firm hand of the Law. At others, we need to think about Order. That can require mediation and the recognition of problems, even if they are not always expressed correctly. Power needs nuance to be effective, that was Lacerda's lesson to me. One I intend to remember."\n\n"
brazil_lacerda_campaign.47.a: "The interviewer wrote keenly, the article already forming in his mind."

brazil_lacerda_campaign.48.t: "No Happiness, No Tears, No Regrets"
brazil_lacerda_campaign.48.desc: "Lacerda went outside. He stood on his porch — hands resting on stone — as he watched the city lights sparkle in the distance. The unusual chill in the air did not distract from Brasília's beauty. The city may have been built by the Varguists, but he finished it, made it whole. Would whoever came to power after him tear it all down?\n\n"Vargas can't be allowed to win, even in death. Not after all he put me through."\n\nThe thought rang out in his head, the election still weighing heavily on his mind.\n\n"Magalhães is a good man, but this election isn't about him. It's about me."\n\nIt would have been selfish to exclude himself from this election. Being selfless meant that it was his fight as well. The public would see it that way anyway, so why shouldn't he fight? He fought his entire life for what was right, and even as the hairs on his head grew fewer, he still had that fight left in him.\n\n"You're going to need it for this week."\n\nOne week left. It would be one of the hardest weeks of his life. The days after the Rua Tonelero shooting would be the only point of comparison. Even his own campaign seemed so light in comparison, days he felt miserably nostalgic for, sparked whenever an old photo caught the corner of his tired eyes.\n\n"It will all be over soon; the traitors will not win."\n\nLacerda could only watch the starry sky, breathless after years of speeches, empty-headed after endless ideas. On the day, he would perform, but he could not go on after that. He stood like this for a while, until his wife called him in, returning to one of his few remaining loves in life."
brazil_lacerda_campaign.48.a: ""I gave my life for Brazil.""

brazil_lacerda_campaign.49.t: "The Line"
brazil_lacerda_campaign.49.desc: ""Listen, Lacerda, I know you don't want to hear about it, but this is something we need to consider." Raphael Magalhães was unfortunate enough to be stuck between João Figueiredo and Carlos Lacerda in the backseat of a car travelling to another event. Already, he had to endure Lacerda's fury on his behalf regarding lower-than-expected polling figures.\n\n"I don't want to give those fascist freaks an inch to breathe, João. Removing the sanctions from the PRP and allowing them to run would only legitimize them and their sick ideology." Magalhães had listened to Lacerda drone on about fascism from their many chats to know that it was a red line for him, even if Raphael never saw them as anything more than kooks.\n\n"Everyone knows how you feel about them, so why do you think that by letting them run, that they will take any votes away from you?" Magalhães never spoke to Figueiredo at length on fascism, but he knew his opinions on communism; still, it was likely just a cold calculation for the military man.\n\n"You know how I feel about Vargas Jr. and the PSP... no, I can't even risk it, no matter how slight the chance is."\n\n"Face it. This decision isn't about morality or anything like that; it's just numbers. The PSP is a threat, and the PRP is a threat to the PSP, so why not just let them run?" It was a calm and cool ruthless logic, the type of choice made in the heat of battle, and there was an appeal to it as the poll figures ran through Magalhães' head again.\n\n"Neither of us will be able to agree on this, so let's turn to the man himself. Raphael... it's your call.""
brazil_lacerda_campaign.49.a: ""They're a distraction, nothing more. Remove the sanctions.""
brazil_lacerda_campaign.49.b: ""There are some lines we can't cross; this is one of them.""

brazil_lacerda_campaign.50.t: "Divine Mandate"
brazil_lacerda_campaign.50.desc: "Plínio Salgado's first rally was a spectacle, if nothing else. At least, that's what cautious observers told themselves as the crowds massed, disenfranchised conservatives of every stripe gathering around to hear gospels from a new candidate of the right. Their raucous behavior contrasted with his austere appearance, hushing them into reverence, before he spoke.\n\n"There is a war taking place in Brazil, not with guns or bombs, but words. It is a war against the very soul of our nation, and the pillars it was built upon." The words oozed out of his mouth like honey, a soft, sweet drip into the audience's ears, soothing their particular worries.\n\n"The Marxist institutions have torn down these pillars and replaced them with three of their own: the foreign capitalist, the immoral atheist, and the lazy worker, fit only to topple Brazil. The PSP, UDN, and PSD have proven themselves to be puppets of international financiers and cultural Marxists, with the PTB showing they can operate under our noses with abandon."\n\nThe honey was replaced with venom, as boos and hisses erupted from the crowd, before Salgado hushed them once more.\n\n"For evil to prevail, righteous men must do nothing. Evil can not prevail; Brazil's beauty must be protected, no matter the cost. If you can not stand idly by as our morals are desecrated by scoundrels, perpetrators who will be behind bars if you choose to give me your vote. Fight alongside me, and eventually, we will be right."\n\nThey were on fire, electric with cheers, screaming for vengeance. But not everyone, as horrified students watched the Nuremberg display from afar. Scattered family members and friends appeared among the fanatic, unrecognizable from those they knew and loved. It was like a sickness, and they could do nothing but watch it spread."
brazil_lacerda_campaign.50.a: ""Surely, they won't actually vote for him...""

brazil_lacerda_campaign.51.t: "Backroom Backstabs"
brazil_lacerda_campaign.51.desc: ""Oh, tell him about that time the press caught you with a hooker! The favors we had to pull to squash that story..." Cigars and fine wine littered the table as if they were going out of fashion, as a host of PSP officials celebrated the arrival of a most unusual guest — Plínio Salgado — with the standard fare of partying. Eventually, the atmosphere quietened as business began.\n\n"So, you explained the details of this deal on the phone to me, but please elucidate some of our more ignorant colleagues as to what this entails?" The gorilla doing a poor impression of an educated man was meant to be a PSP Senator, something Salgado struggled to come to terms with. His friends were regional reps, city councillors, and the like.\n\n"The terms are clear: you will receive choice positions in my new administration in return for doing nothing. By nothing, I mean nothing; you will not lift a finger for your candidate. If Vargas Jr. calls, you will not answer, or you will feed him lies." Nods and murmurs of approval circulated the room, knowing none of them would get a better deal even if their guy won.\n\n"You're a pretty good businessman Plínio, so like, is that whole moral crusader shit just a schtick then if you're hanging out with slobs like us?" The remark shot across the room at Plínio — the room bursting with laughter — whose face was still, with only a twitching eyebrow betraying his fury.\n\n"That's funny, but it might not be so funny after I gather your names and addresses, and then your families' names and addresses. Men are willing to die for me; can any of you say the same?" They didn't find that very funny. The room went dead—silent with deep contemplations about what to do next, as Plínio puffed on a Cuban cigar, feeling like a million dollars."
brazil_lacerda_campaign.51.a: ""I'm so sorry, Getúlio, something else just came up...""

brazil_lacerda_campaign.52.t: "Curveball"
brazil_lacerda_campaign.52.desc: "Plínio Salgado's eyes moved through the letter's lines, first at a measured pace, then with frantic speed. Soon, he could not contain himself, as splutterings of swears so vile they would cause nuns to faint. His hands trembled before he tore it apart, sending it into smithereens of paper confetti that littered his desk.\n\nHe would remain in the cold, outside of Brazil's politics.\n\nA sympathetic UDN contact informed him of Lacerda's decision to continue repressing the integralists, that a reversal of the PRP's ban would not be forthcoming. The rumors to the otherwise — that he could be useful to their own success — proved to be just that, rumors. Back to the backstage, back to the...\n\nHang on, even if he couldn't benefit the UDN, he could certainly bring them down.\n\nThere was a man. Vargas Jr. His youthful, nationalist exuberance reminded him of his own, during the days when his old man first crushed the Greenshirts. He couldn't stay angry at the sins of his father forever, however, not when they both had a mutual enemy. His platform was malleable, in need of an ideologue, in need of Salgado...\n\nHe still had his assets, loyalists who could be temporarily diverted to aid the PSP, alongside a few statements of support from himself. It all seemed very promising, like he was granted a second chance to make his ideology the bedrock for a new regime, as he dialled some old reliables to inform them of this plan."
brazil_lacerda_campaign.52.a: "A backstage man can still change the stage's direction."

brazil_lacerda_sorbonne_campaign.1.t: "The UDN's New Look"
brazil_lacerda_sorbonne_campaign.1.desc: "The resonant voice of Cid Moreira was the same as ever, but for those lucky Brazilians crowded around the latest television sets, a new spectacle was on offer tonight. \"Tonight, we at the Jornal Nacional, are proud to present news of great importance for our nation, and with an unprecedented innovation from TV Globo. We now go live to the UDN's party conference, where Governor Ney Braga has been announced as the party's presidential candidate. For the first time, witness it all in living color.\"\n\nIn a burst, the UDN's blues, whites, and reds leapt off thousands of screens, timed perfectly with the eruption of applause. A figure in a jet black suit and sapphire tie strode across a burgundy carpet toward a lectern of oaken brown. Ney Braga's hair, a manful black speckled with hints of sagely grey, came into focus. His fair skin could not hide the smile creeping into the corners of his mouth. Words from the acceptance speech were spilling forth, but who was listening? Who was listening when they could be watching?\n\nThere was no need to linger. The cheering crowds, the friendly, athletic build of the man who would be president were enough. So TV Globo took their viewer on a tour of Braga's past, of Brazil's future, plastering colorized photos of a handsome young man in a gray-green soldier's uniform; a stern, protective Chief of Paraná's state police outfitted in a stark blue uniform; a dynamic governor in a wardrobe of camel, greys, browns, and blacks opening bridges and power plants. But also one to provide a caring hand to tousle the hair of a beaming blonde child.\n\nThe whirl of blues, whites, and reds, and greens and yellows, and smiles and a parade of Ney Bragas seemed never to end. The nomination of José Sarney as the UDN's vice presidential candidate blipped past in an instant of tan skin and teal tie, subsumed in the dark green of flourishing coffee plantations, the pitch black of newly poured asphalt, and that bright flash, again and again, of Braga's blindingly white smile. A new hypnotism being splashed across the land from a horde of little boxes."
brazil_lacerda_sorbonne_campaign.1.a: "How many words is a color picture worth?"

brazil_lacerda_sorbonne_campaign.2.t: "A Formal Exchange"
brazil_lacerda_sorbonne_campaign.2.desc: "A sombre mood. The extravagance and elation of past conferences had been muted, a few banners emblazoned with the party logo complimented only by a handful of balloons fast dropping from the ceiling. Kubitschek and Guimarães had advanced through the nomination with minimal input, and most expected them to be little more than sacrificial lambs. Whether the election would be fair, or if its results would even be accepted, was another matter entirely. This conference, they feared, was a funeral.\n\nJuscelino Kubitschek gave a slight smile weighed down by reality, looking at the draft of the speech hastily written up. Certain sentences were blacked out, relics of direct military censorship, and he quietly chose to replace even more with an empty optimism. "People of Brazil, I know that this campaign will be difficult. Many of us may fear that the worst days have yet to come. But I know the heart of this country, and I know where it doesn't stand."\n\nHe looked around, first to the fatigued applause of Ulysses Guimarães, and then to the crowd. A few looked on cautiously, hoping for more, but he knew most watching were resigned to defeat. "We will move on from years of neglect to return, from the folly of past leaders, from the ill judgement of Lacerda to the..." Kubitschek momentarily paused, reflecting the intensifier removed by a general now watching over him in a distant stand. "...force of the military to a nation standing for justice and freedom, for order and progress!"\n\nAcross Rio, the embers of the PSD lurched to life. A few volunteers huddled together, listening to the speech given with despair. There was no real policy offered, and only loose criticism of the coup. How could they run an election campaign under these conditions? As the speech concluded with applause mostly deteriorated into a formality, only one chose to stand up, sorting through the election pamphlets in her hand, a list deprived of several names and the circulation far narrower than past years."
brazil_lacerda_sorbonne_campaign.2.a: "She swore that the pamphlets of Braga and Sarney were thicker."

brazil_lacerda_sorbonne_campaign.3.t: "Supper, First and Last"
brazil_lacerda_sorbonne_campaign.3.desc: "The Crow picked at his food. The chef had been bold with this farofa, its fatty bacon glistening amidst the cassava. But all that entered Carlos Lacerda's mouth was another dollop of mush. He nearly shoved the bowl away as he directed his full attention, his full ire, to a politely grazing Ney Braga.\n\n\"Why are you running?\" Lacerda asked, knowing whatever answer Braga gave would be inferior to Magalhães', had the correct candidate been running. \"A man has to know the answer to that question before the campaign. He'll break under the pressure otherwise.\" Lacerda snapped a spiced salgado in half, before popping it into his mouth. Two gnashes of his teeth and it was gone.\n\nBraga stirred his own farofa, spoon swishing with steady, precise movements, \"Because I can be of service to Brazil. It's what I have done my whole life.\" He paused, and stilled the spoon on the side of his bowl. \"And you do not need to worry about me. When I was just beginning my career, Maria José, my wife, died of typhus. I... I was alone with my four children. Compared with that, no campaign is difficult. Nothing at all is difficult, compared to that.\"\n\nFor a moment, Lacerda's face softened, \"And what kept you moving forward?\"\n\n\"Discipline and rigor. Work. Hard work too, under the supervision of Castelo Branco at the General Staff Schoo-\" Braga continued to speak, but Lacerda heard nothing. Castelo Branco. The whelp before him nothing but another loyal soldier in the military's game. He took another bite of ashes. All these years, that's all President Carlos Lacerda had been too. A loyal little soldier without a uniform."
brazil_lacerda_sorbonne_campaign.3.a: "For dessert, Brigadeiros were served."
brazil_lacerda_sorbonne_campaign.3.a.tt: "§Y[BRA_pres_selected_region_dynamic]§!\n  §RDecreases Support§! for §L$BRA_pres_candidate_name_9$§!."
brazil_lacerda_sorbonne_campaign.3.tt: "The President will provide minimal support for his successor's campaign."

brazil_lacerda_sorbonne_campaign.4.t: "Breaking Bread Together"
brazil_lacerda_sorbonne_campaign.4.desc: "Virgílio Távora surveyed the banquet: moqueca baiana, farofa de banana, and feijão tropeiro arranged before him; a fine wine by his right hand and a cloth napkin held in his left. As he dabbed his face, Távora wondered: was this how the Emperors passed every meal? He smiled, \"A far cry from Realengo's dining hall, no?\"\n\nGovernor Ney Braga had been using the brief lull in the conversation to attack his farofa with an athlete's healthy appetite. His head rose and then bobbed in agreement, \"Though be careful of letting Ol' Ironbones hear - he might try to sentence even a President to extra drills.\"\n\nBoth laughed. But a sip of wine brought a venomous question to Távora's mind. \"Governor, these halls are quite far from Realengo. There, we were united in serving one nation. You and I may still be, but I'm afraid our party and our country have grown sharply divided after the tumult of the past few years. How will you bring them together?\"\n\nBraga set down his own wine glass and met Távora's eyes. \"My father's family was split in two by the Revolution, the Bragas and the Lacerdas. To keep peace in our small town, I would go to the União club to drink with the Bragas and then the Congresso club to dance with the Lacerdas. I'd walk home with the stars above my head, but I was everyone's friend.\"\n\nTávora's wineglass wobbled as it met the table. But it steadied. The old colonel chortled, \"The dawn sun may be over your head in this line of work! But well said. Consider yourself to have drank quite finely at the União tonight.\""
brazil_lacerda_sorbonne_campaign.4.a: "Whatever you need on this campaign, Governor, just let me know."
brazil_lacerda_sorbonne_campaign.4.a.tt: "§Y[BRA_pres_selected_region_dynamic]§!\n  §GIncreases Support§! for §L$BRA_pres_candidate_name_9$§!."
brazil_lacerda_sorbonne_campaign.4.tt: "The President will provide wholehearted support for his successor's campaign."

brazil_lacerda_sorbonne_campaign.5.t: "Under Lock and Key"
brazil_lacerda_sorbonne_campaign.5.desc: "\"I am sorry, sir, but I can do nothing. Bigger forces are at work here; security concerns are what they keep telling me: they'll never give us a permit for the rally. Some of my staff and organizers tell me they are being followed and watched wherever they go; it's just not safe enough to risk it.\"\n\n\"I understand. Thank you, nonetheless. We'll just have to find another way. Goodbye, and try to get some rest.\" Juscelino Kubitschek heaved an exhausted sigh before hanging up the phone. Another day, another campaign rally strangled in the cradle. This had been a last-ditch effort on his part, calling the mayor personally, but he should have known better.\n\n\"Bigger forces, \" he muttered to himself, \"damn them all.\" It would always be an uphill campaign, this battle for the soul of Brazil and its democracy. But, by god, the army wasn't even subtle with its influence; this story was repeating across Brazil, each with its own excuse for why the PSD and their allies couldn't go out in public.\n\n\"How do you win an election that's already been decided for you?\" He spoke to the empty room. No answer came to him."
brazil_lacerda_sorbonne_campaign.5.a: "It's hard to run with broken legs."
brazil_lacerda_sorbonne_campaign.5.tt: "§Y[BRA_pres_selected_region_dynamic]§!\n  Decreases £BRA_pres_infra_texticon §GInfrastructure§!, making future campaign decisions for §Y$BRA_pres_candidate_name_1$§! §Gless effective§!."

brazil_lacerda_sorbonne_campaign.6.t: "Safe Under Watchful Eyes"
brazil_lacerda_sorbonne_campaign.6.desc: "\"Here's to Brazil and democracy. Cheers!\" A young PSD campaign staffer hollered with a raised cup, and his colleagues mimicked him with equal enthusiasm. The past few months had been most successful for the PSD; numerous campaign events and rallies had been held without any interference from the military. Hell, they hadn't even bothered sending soldiers to the rallies, a far cry from what everyone had expected from the army's paranoid fatcats.\n\nThe staffers eagerly chatted away and celebrated; it seemed that Kubitschek and Guimarães might just have a chance at saving Brazil after all. One of the older staff members, a deskbound man who once campaigned under Castelo Branco, remarked how well it was that the vans of the political police had pestered none of the rallies.\n\nAnd then one of the staffers paused and said he'd noticed a van of such a kind observing the events he'd worked at. Another spoke up of seeing something similar, and then another, and another. Blank, unmarked vans with suspicious men, always there, always watching, just a short distance from them.\n\nThe room's atmosphere fell into quiet murmurs and cautious glances. The same young man who called for celebrations felt a nervous churning in him and slowly moved to peek out a window. Another van, just a little over a block away, was there, watching, waiting."
brazil_lacerda_sorbonne_campaign.6.a: "Plotting."
brazil_lacerda_sorbonne_campaign.6.tt: "§Y[BRA_pres_selected_region_dynamic]§!\n  Slightly Decreases £BRA_pres_infra_texticon §GInfrastructure§!, making future campaign decisions for §Y$BRA_pres_candidate_name_1$§! §Gless effective§!."

brazil_lacerda_sorbonne_campaign.7.t: "Look On My Works, Ye Mighty"
brazil_lacerda_sorbonne_campaign.7.desc: "Ney Braga noted the slipping facade of the journalist with whom he shared the car. They'd traveled for some time now and despite the consummate professionalism of the reporter he could see the slight glimmer in his eyes. He was getting somewhere.\n\n"Soon, Mr. Borges, we will enter the city." They had been driving along the Coffee Highway south from Londrina, a journey for an article showing off the new Paraná, stopping at everything from new roadside businesses to a sewage plant. Braga leaned forwards towards his chauffeur. "Chain, drive a little slower once we're in the city will you?"\n\nThe car rolled onwards, the surroundings slowly transforming ever more urban. The day was waning, shadows and silhouettes forming as the city's lights began to switch on. People continued to be seen, cast under the warm lights of the city as they drove.\n\n"As you can see, infrastructure has revolutionised the city, if I may be so bold to say. Safer streets, modern economy" he told his companion, pointing out landmarks as they passed. Municipal markets, construction projects, schools and phone lines were all highlighted and notes were furiously taken.\n\nThe car came to a stop before a hotel, draped in splendor. Braga and Borges disembarked, shaking hands. "Tomorrow Mr. Borges we shall go on to the final part of our tour at Paranaguá. The port is something to behold."\n\n"I'm sure it is Mr. Braga, and thank you for the journey so far. I'm not sure my readers will have ever read such a succinct overview of modern Paraná. I look forward to tomorrow" replied Borges, before leaving for his accommodation.\n\nThe day had been long but Braga felt warm with anticipation - that article was going to go well."
brazil_lacerda_sorbonne_campaign.7.a: "The campaign trail runs north, to São Paulo."
brazil_lacerda_sorbonne_campaign.7.b: "The road runs still southwards."

brazil_lacerda_sorbonne_campaign.8.t: "Old Friends, New Relationships"
brazil_lacerda_sorbonne_campaign.8.desc: ""Fernanda, get in here!"\n\nThe office was chaotic, awash with the furious sounds of people and typewriters. Campaign banners for Braga hung above the central room, a picture of the man smiling overlooking the throng of people responsible for his success. Fernanda barely heard the call from the Campaign Manager's office until a colleague nudged her.\n\nShe rose from her typing and half jogged into the small personal office. The door was shut behind her by her boss, a folder thrown before her onto the desk as he walked back to his desk. He sat down and leaned forward. "Here," said the Manager, "is a list of all contacts in São Paulo we are to call ahead of Mr. Braga's visit. Everyone, got it? We need to assemble a welcoming coalition for his visit for the Press and we need as many bodies as we can. I want you to call them and get them there, all the details are inside. Understand?"\n\nFernanda was taken aback but took the folder. It was large, a quick glance showing not just names but event details, notes on each person. Dozens of names throughout the folder, some she recognised too - people she wouldn't expect at a UDN event. She thought back to her half completed work at her desk "Sir, I was just-"\n\n"I know, all other work can wait. This takes priority. I don't care what you have to say to them, promise them, whatever; get them to that reception. I'm sure you saw, thanks to Mr. Braga's... flexibility in the past regarding Parties there's a wide variety of people in there. Some the UDN hasn't always seen eye to eye with. But this comes from Mr. Braga himself, it is essential we get as many of these people as possible. Can you do it?"\n\nFernanda looked at the folder in her hands for a moment. "I hope these bridges aren't burnt"."
brazil_lacerda_sorbonne_campaign.8.a: "Oh, but they are..."
brazil_lacerda_sorbonne_campaign.8.a.tt: "§Y$BRA_pres_region_8$§!\n  §RDecreases Momentum§! for §L$BRA_pres_candidate_name_9$§!."
brazil_lacerda_sorbonne_campaign.8.b: "He really is everyone's friend!"
brazil_lacerda_sorbonne_campaign.8.b.tt: "§Y$BRA_pres_region_8$§!\n  §GIncreases Momentum§! for §L$BRA_pres_candidate_name_9$§!, causing §GSupport§! to grow over time."
brazil_lacerda_sorbonne_campaign.8.tt: "This option is available due to our current £GFX_BRA_UDN_intransigence_texticon §YIntransigence§!."

brazil_lacerda_sorbonne_campaign.9.t: "Speaking to the Farmers"
brazil_lacerda_sorbonne_campaign.9.desc: "The sun shined bright over Rio Grande do Sul as his Ney Braga's horse slowed from a full gallop to a casual trot as he neared the gathering. Braga's control over the steed appeared smooth and casual, all thanks to his military training years prior. He and the other riders approached the gathering of landowners and ranchhands that marked this stop on his campaign trail, the event having been organized by a friendly magnate in the area. As the guests were served meaty dishes, Braga dismounted and made his way to a makeshift platform. Conversations around the various tables died down as the crowd turned to face Braga.\n\nBraga began with his usual stump speech and introduction, but quickly progressed to the relevant issues of the audience, \"... And I must thank you kind folks for the amazing scenery. This farm is absolutely breath-taking to ride through, and it's all because of your hard work,\" Braga paused for a moment, taking on a less jovial expression, \"During my time in the military, I saw many farms that were not so fortunate. Farms, once as beautiful as this one, broken by squatting and conflict. Thankfully, the current administration has resolved those issues, and you can rest assured that if elected, I will ensure that Rio Grande do Sul's farmers will thrive!\"\n\nAs the crowd erupted into applause, Braga had to make a call about which direction to take the next issue: the military. Rio Grande do Sul's history of military service meant he had to emphasize it in his speech, but he hadn't fully decided on the direction. With the state's notable populations of Eastern European and Jewish heritage, should he emphasize the fight against fascists across the globe? Or should he focus on matter closer to home, and emphasize security within South America? The crowd was growing quiet, it was time for Braga to continue his speech."
brazil_lacerda_sorbonne_campaign.9.a: "For eternal vigilance to the South!"
brazil_lacerda_sorbonne_campaign.9.a.tt: "§Y$BRA_pres_region_4$§!\n  §GIncreases Momentum§! for §L$BRA_pres_candidate_name_9$§!, causing §GSupport§! to grow over time."
brazil_lacerda_sorbonne_campaign.9.b: "To bring the fight for freedom against fascists worldwide!"
brazil_lacerda_sorbonne_campaign.9.b.tt: "§Y$BRA_pres_region_4$§!\n  §GIncreases Support§! for §L$BRA_pres_candidate_name_9$§!."

brazil_lacerda_sorbonne_campaign.10.t: "Economic Crossroads"
brazil_lacerda_sorbonne_campaign.10.desc: "Backstage, Ney Braga heard the introduction conclude, and so concluded his own prayer. The bulk of FEBRABAN, the banking association, stood to applaud as the presidential candidate approached the podium. He flashed a winsome smile, arranged his notes, and began.\n\n\"Not every National Economic Development Plan is announced with a notice of mourning. Let alone for a foreigner.\" Scattered chuckles. \"But I would be remiss not to thank Father Lebret, not only for the humanist and rapid development his teachings have already given São Paulo and my home state of Paraná, but for the prosperity and healing the priest-economist's vision will bring to our nation through my administration's new Plan.\" Bubbling excitement.\n\n\"I hope that the plan will become yours as well. Because public-private partnership is central to every initiative within. The patient capital of the state and the discipline of the market, joining together to develop world-leading infrastructure and high-technology innovations. New investments in Petrobras will give Brazil the oil we need in these tumultuous times. Strategic support for telecommunications and computing will allow us to capture a key role in the global markets that will define the coming decade. And your profitable investments will allow Brazil to do that all without overreliance on foreign debt.\" White hot applause.\n\n\"But, in Jesus' words, it is not just the servant with ten coins that was called to invest. So was the servant with five, and the servant with only one. Should you elect me President, I will ensure that the roads, the schools, and the hospitals that serve all Brazilians, wealthy or poor, have the support they need to offer their talents in service to our nation.\" Frigid silence.\n\n\"I invite you all to Paraná to see the modernity, opportunity, and prosperity that can be built through the conjoining of an active, prudent government, abundant private initiative, and a determination to love one's neighbor.\" Steady applause, warm but no more."
brazil_lacerda_sorbonne_campaign.10.a: "Can one serve both God and Mammon?"

brazil_lacerda_sorbonne_campaign.11.t: "Friendly Fire From Lacerda and TV Globo"
brazil_lacerda_sorbonne_campaign.11.desc: "PLACEHOLDER"
brazil_lacerda_sorbonne_campaign.11.a: "PLACEHOLDER"
brazil_lacerda_sorbonne_campaign.11.tt: "§Y[BRA_pres_selected_region_dynamic]§!\n  §RSlightly Decreases Momentum§! for §L$BRA_pres_candidate_name_9$§!.\n  Increases £BRA_pres_fatigue_texticon §RFatigue§! for §L$BRA_pres_candidate_name_9$§!."

brazil_lacerda_sorbonne_campaign.12.t: "Dead Letters"
brazil_lacerda_sorbonne_campaign.12.desc: "Ney Braga's National Economic Development Plan laid out across President Lacerda's desk as if a patient on an operating table. Gouts of red ink pooled across its surface as Lacerda hacked away at another unviable promise, another fountain of pork. His aides had warned him of its putrescence, recommended that he stick with the bulleted summary they'd prepared. But Lacerda, in the pride and curiosity he now cursed under whiskey-soaked breath, had insisted on seeing the damage Braga intended to inflict.\n\nAnd it was extensive. Lacerda's hand was cramping from writing \"administrative bloat\" and \"redundant\" again and again, with only the occasional \"unnecessary antagonism toward OFN investors\" to break the monotony. But a fresh droplet of Braga's developmentalist bile trickling across the page sent his pen slashing forth on another tirade against inefficiency and waste. Waste...\n\nWhat a waste! Lacerda's palms slammed down on his desk, sending his pen flying and setting the plan's mocking pages to flutter. Brazil was in no mood to listen to the President's prescriptions, not after half-a-decade misspent on half-measures and kludges. He had been too late in removing Vargas' labor laws, in dismantling the countless other chains holding back economic growth. His words now, after so little action, would just be a waste. He dumped Braga's plan, complete with hours-worth of critiques, into the garbage.\n\nLacerda took a consolatory swig of whiskey. At least the developmental drivel trickling from Braga was watered down. Responsibly budgeted. Hefty role for private initiative. Kubitschek would take them straight back to the bad old days: rampant inflation, soaring deficits, and Varguist corruption around every corner. A full repudiation of Lacerda's work.\n\nAnd that's why this dissected corpse of an economic proposal would never be leaving his office."
brazil_lacerda_sorbonne_campaign.12.a: "With a slug of whiskey and a lit match in the wastebasket, the critique was cremated."

brazil_lacerda_sorbonne_campaign.13.t: "Bootcamp"
brazil_lacerda_sorbonne_campaign.13.desc: "President Távora knew from personal experience that the UDN was a fractious, fissiparous party. It had to be pleaded with and prodded at until it took the appropriate course. But Colonel Távora also knew how to handle new recruits.\n\n\"Good evening,\" his voice taking on a resounding baritone that silenced the nervous chatter burbling throughout the conference room. \"I'm pleased tonight to meet the next generation of our party's legislators. And the rest of you, who won't be joining us after the elections.\" One candidate failed to stifle a gasp.\n\n\"That's right. This is a hard fight, against determined opposition, and many of you will not make it. If you want to be one of those who do, take the book under your chair. A copy of Ney Braga's National Economic Development Plan.\"\n\n\"Before you collapse in your hotel bed tonight, I expect you to have read it. Twice. Tomorrow, you'll need to be able to tell a voter what Braga's plans to reduce gas prices are, and how fast you're going to vote for them. On day three, you need to know more about Humanist Economics than Father Lebret himself, but talk about it without seeming like a priest or an egghead.\n\n\"The plan that Governor Braga put in your hands is the finest electoral weapon ever made, but only if you learn to use it.\" A staunch finger singled out a would-be legislator in the first row. \"You. From Guanabara. You talk about this new computing industry making well-paid jobs in your state. And you. From Ceará. You tell them about the poverty relief measures in chapter five. The rest of you, find your favorite piece and talk it up until the last ballot is cast. You do it well enough, Ney himself may have you on-stage.\""
brazil_lacerda_sorbonne_campaign.13.a: "\"Thank you. You'll thank me, later.\""
brazil_lacerda_sorbonne_campaign.13.tt: "§Y[BRA_pres_selected_region_dynamic]§!\n  §GIncreases Support§! for §L$BRA_pres_candidate_name_9$§!."

brazil_lacerda_sorbonne_campaign.14.t: "Considering the Opposition"
brazil_lacerda_sorbonne_campaign.14.desc: "Golbery shut the door to his office. Spread out across his desk was countless documents concerning the PSD. More polls than any one man could read through, many of the copies having been acquired from the PSD's own contracted firms. Maps of relations in the party, especially concerning any ties to former members of the PTB and PCB. Documented lists of campaign promises, speeches, and platforms, with notes on everything from municipal infrastructure plans to nationwide legislative proposals. Additionally, a large stack of conversation transcripts among the PSD's party elites was set to one side.\n\nThe decision on how far to suppress the PSD was Golbery do Couto e Silva's call to make alone.\n\nWith all this data he could estimate how likely they were to win, but that could easily be changed. The real question was did it need to be changed? How much of a threat would the PSD be if they won? How much of a threat would they be if the PSD won the presidency but not the legislature? And how much radicalization would occur if they lose?\n\nGolbery weighed the different outcomes and their benefits and flaws carefully, going back and forth across various different plans of action.\n\nAfter an hour of deliberation, Golbery made his call, and the PSD's fate for the next few months had been decided. The head of Brazilian intelligence picked up the phone."
brazil_lacerda_sorbonne_campaign.14.a: "If they step out of line, we will be on them in a heartbeat."
brazil_lacerda_sorbonne_campaign.14.b: "Preemptive measures should be taken to ensure they do not grow too brazen."
brazil_lacerda_sorbonne_campaign.14.c: "They must not be allowed to win. We will take all necessary steps."

brazil_lacerda_sorbonne_campaign.15.t: "Reviewing the Material"
brazil_lacerda_sorbonne_campaign.15.desc: "In just a few days, Kubitschek would be giving a speech that had the rare opportunity to be televised nationwide, which brought the candidate to meet with Ulysses Guimarães to review what material the campaign's speechwriters had prepared. Ulysses had brought out various drafts, and Kubitschek stifled a wince at the language. It was all far too inflammatory, and far too risky given the circumstances. Kubitschek extended his hand for a pen, and chose the script whose general structure he preferred the most of the selection. He immediately began crossing out lines and writing correction notes in the margins.\n\n\"This paragraph about the military's illegal actions against us goes too far, it needs to be cut,\" Kubitschek said as he crossed out a number of lines, \"This promise is worded too radically, cut it,\" he circled another passage, \"We can word this softer, make it less blunt.\"\n\nAfter a few minutes, Ulysses began sputtering out his protest, \"You've taken out all the substance! There's no 'Fifty Years in Five,' none of your signature rhetoric or policies, and most importantly no stance against the jackboots stomping on our necks!\"\n\nKubitschek sighed, and calmly gave his response, \"The voters will see through the soft language, and with my changes the military will have no excuse for further repression. Simply the fact that I, Juscelino Kubitschek, am speaking is enough to condemn the military.\" Ulysses didn't seem satisfied with the rebuttal, as his lips moved in anticipation of his mind.."
brazil_lacerda_sorbonne_campaign.15.a: ""People like wit, give them a punchline, something to chant.""
brazil_lacerda_sorbonne_campaign.15.b: "...but ultimately, let Kubitschek do it his way"

brazil_lacerda_sorbonne_campaign.16.t: "An Obvious Farce"
brazil_lacerda_sorbonne_campaign.16.desc: "On the charges of conspiracy, the PSD's campaign manager and three other party officials had been arrested. It was alleged by the state that they had been plotting the overthrow of the government should Kubitschek fail, and that communist paraphernalia and weapons that supposedly belong to the officials had been discovered near their residences. The prosecution planned to throw the full force of the law at these \"threats to democracy.\"\n\nThe charges were utterly ridiculous, and the whole trial was clearly a farce designed to cripple the PSD's campaign. Already Kubitschek had heard of other campaign staff and volunteers resigning from their positions out of fear of being targeted next. Despite it all, Kubitschek knew that escalating was a losing play, and that he had to take the high road if the campaign was going to recover from this newest setback. Hence the speech he was currently giving to his remaining staff and various party officials who had come to see what their candidate had to say on the matter.\n\n\"... In conclusion, I assure you all that I believe these men to be innocent, but we must remain calm in these difficult times. Instead, I ask you all to channel that energy into donations, to cover the legal costs of the trials, and to spread the word to any that would lend you their ear. I have faith that if given the resources, cooler heads will prevail, and the courts will find the four gentlemen innocent of all charges.\"\n\nIn the coming days, a number of donations would flow into the legal fund, among them a decent sum had come from an anonymous donor, accompanied only by a note reading: \"So that democracy may continue unobstructed.\""
brazil_lacerda_sorbonne_campaign.16.a: "In truth, the donor was none other than Ney Braga."
brazil_lacerda_sorbonne_campaign.16.tt: "§Y[BRA_pres_selected_region_dynamic]§!\n  §RDecreases Support§! for  §Y$BRA_pres_candidate_name_1$§!."

brazil_lacerda_sorbonne_campaign.17.t: "Rain Falls on the Campaign Trail"
brazil_lacerda_sorbonne_campaign.17.desc: "Ney Braga looked up at the Order of Military Merit framed above his desk, the light in his office captured within the polished sheen of the medal's surface. He then turned his gaze to the scene outside his window, now streaked by sheets of rain. Even amidst the harsh weather, PSD-aligned protestors had once again rallied outside the building. Braga noticed that the crowd today had also managed to surpass yesterday's gathering, in spite of the rain.\n\nSome of the protestors were getting too enthusiastic, and began shoving up against the police that manned the security line. Right on cue, the police responded to the provocation, and he saw the protestors get beaten back with batons. Other protestors were getting swept up in the reprisal, and the crowd pulled back a bit as those on the frontlines nursed their new wounds.\n\nEven through the rain Braga could spot fresh bruises and black eyes amongst many other in the crowd. He knew that they would return tomorrow with renewed anger, having channeled their pain into further conviction that these protests were necessary, and they would be bringing enraged family and friends along with them. Braga had seen this script play out week after week, and the police were not helping. Braga had never asked for this kind of repression to be performed, and it only further annoyed him that it was completely counterproductive! It was too light and indecisive to actually dissuade any activists.\n\nGrowing sick of watching the protest repeat itself, Braga returned his gaze to the Order again."
brazil_lacerda_sorbonne_campaign.17.a: "There had to be a better way."
brazil_lacerda_sorbonne_campaign.17.tt: "§Y[BRA_pres_selected_region_dynamic]§!\n  §GIncreases Momentum§! for §Y$BRA_pres_candidate_name_1$§!."

brazil_lacerda_sorbonne_campaign.18.t: "Caution and Consequences"
brazil_lacerda_sorbonne_campaign.18.desc: "Even the most well-oiled campaign sees its fair share of failures, but Ulysses Guimarães still cannot shake the feeling of disappointment as he leaves a rally that barely attracted any attention. Situated in Manaus on the banks of the Rio Negro, the PSD had high hopes for the event, but it seemed to be just another in a recent, and deeply concerning, string of failures. And for the love of God, Guimarães couldn't understand what was going wrong; they'd been playing nice with the military, and no one had noticed any interference by the army. Perhaps the UDN was up to new tricks?\n\nThe answer came to him from underneath his shoes. Still thinking of the rally, he hadn't noticed the littered pamphlets all over the ground until he heard the papers crumble under his step. Gingerly plucking one from the ground, his confusion quickly shifted towards rage. All the pamphlets were saying the same thing: accusing the PSD of being nothing but stooges and puppets for the military, propped up as fake opposition to give the dictatorship some legitimacy.\n\nHis mind raced with accusations; slander was hardly a new tactic for the UDN, but the sheer audacity shook him in fury. He turns his head, searching for the perpetrators before his eyes settle on a group of young men and women with long hair, handing out the pamphlets to those who pass by. His anger was replaced with a churning feeling in his gut, and a realization came to him. These weren't stooges for the UDN; these were true believers. Men and women whose faith in the PSD was shattered by the party's- by his timidity in the face of the military. How could people believe Kubitschek would stand up for them, when he couldn't stand up to the nation's tyrants?"
brazil_lacerda_sorbonne_campaign.18.a: "The ranks grow slimmer..."
brazil_lacerda_sorbonne_campaign.18.tt: "§Y[BRA_pres_selected_region_dynamic]§!\n  §RSlightly Decreases Support§! for  §Y$BRA_pres_candidate_name_1$§!."

brazil_lacerda_sorbonne_campaign.19.t: "Drowned Out by Success"
brazil_lacerda_sorbonne_campaign.19.desc: "For José Sarney de Araújo Costa, Brasília was a bore, but being back in São Luís, Maranhão State, his heart once filled up again with youth and warmth. He couldn't tell whether it was his distance from the Monumental Axis or the memories of his childhood visits to the city, its composure, its assuredness of itself.\n\nOr perhaps it was the fact that, once so eager to prove himself to the people of the 'Athens of Brazil', he came back a self-made man who had 'graduated' from the Northeast, and came back to feed it as it had fed him. But that was not fair on the Ilha, not on the 'Athens of Brazil': the 20th century was an unkind and anomalous break with the glorious European architecture, crimson-colored rooftops, and the unbowed attitude which defined the city. It just needed new direction, and he was there to show it.\n\nNow, setting down his notes in front of the increasingly curious mass in the square, he sought to play on its revival, and how he and his UDN team ensured it. To mention the new American tourists in their new American cars, the playful reggae which kept time of the city's movements, the new road to the south which he as a Congressman saw into reality. So he thought about all of those things, and began to speak into the microphone.\n\nBut in the short pause for air between his short introduction and policy platform, a voice from that mass went \"Vai, Lacerda!\", another went \"Avante, UDN!\" and the entire crowd fell out of control. Sarney's face became a scarlet deeper than that of the rooftops."
brazil_lacerda_sorbonne_campaign.19.a: "Seems like they're enjoying it, at least."
brazil_lacerda_sorbonne_campaign.19.tt: "§Y$BRA_pres_region_6$§!\n  §GIncreases Support§! for §L$BRA_pres_candidate_name_9$§!."

brazil_lacerda_sorbonne_campaign.20.t: "Old News"
brazil_lacerda_sorbonne_campaign.20.desc: "A little after lunch, Manoel noticed out of the corner of his eye an older man with coal-black sunglasses, a much less older electric guitar, but other than that, a fairly lonely street. Even still, the man went from chord to chord without shame, exhaustion, nor the skip of a beat. It was as if he had played this guitar his whole life, and maybe he had: it was São Luís, where music came first and money second.\n\nOne last riff, a smattering of applause, then a break. He saw the man in sunglasses dart towards his store. \"The rapadura, if you will, sir.\" He had to laugh someone might be so determined to take that of all things to eat after a busking session with everything else in this city, but he obliged. \"Oh, and the Tribuna Maranhense.\" OK, now something was definitely wrong.\n\n\"You might be the first person to ever take those two things out at a time, you know,\" Manoel drawled with a smirk. \"You sure you don't want today's Última Hora?\"\n\n\"Well, maybe I want to try something new, don't I?\" The busker's grin was even larger than Manoel's, as if buying a local newspaper nobody ever reads was more important to him than his living. The cruzeiros were smacked onto the counter, as was the Tribuna, and he began to read.\n\n\"'...The people of Maranhão find it overwhelmingly true that the Nordeste has benefited from the new boom in development under Carlos Lacerda.' Boom? Development? Carlos Lacerda? This can't be the Tribuna I know...\" he said sarcastically, as if an avid reader.\n\n\"No, that sounds more like the Tribuna da Imprensa to me,\" and the two men set off laughing at their collective wit. In truth, the Maranhense was Sarney's, but it did not matter."
brazil_lacerda_sorbonne_campaign.20.a: "Because once more, they were the party of the past."
brazil_lacerda_sorbonne_campaign.20.tt: "§Y$BRA_pres_region_6$§!\n  Increases £BRA_pres_fatigue_texticon §RFatigue§! for §L$BRA_pres_candidate_name_9$§!."

brazil_lacerda_sorbonne_campaign.21.t: "Mixed Messages"
brazil_lacerda_sorbonne_campaign.21.desc: "Independence Day, and its parade, was not political. It was not there for a candidate to redirect his own fortunes, but for a President to serve the state. That was the military's code, and however temperamental Army High Command could be, they would not breach its own norms so flagrantly.\n\nBut no one said anything about a parade which came before. So, there was the idea: a 'dress rehearsal' parade would be held. The attendees, already transfixed by the myth of might being staged before them, would have the choice of listening to Ney Braga, having effectively signed up to a rally through the convenience of the display and the difficulty to leave, would all get one.\n\nSo it was, on a chilly August morning, as few, but not many, fanned out of the regular formations on the side of the highway and the brigades of tanks stationed upon it, Braga took the stage, fidgeting. He spoke of Realengo Military Academy, the lifelong friends he made there, and the service it inspired, but choked up on one of his first words, and remained jolted as he got through the rest.\n\nSomehow, the crowd remained static and attentive, even if less encouraging. Nonetheless, Braga was able to return the favor to the military, praising and acknowledging \"great Field Marshal Castelo Branco\", his mentor and inspiration at Realengo and beyond. He was his rock not just in school, but in his wife's death, apparently. Even the life-long officer who made it his raison d'être to receive all possible decorations, be they verbal or physical, must have felt a little embarrassed.\n\nBut then he said all he had to say: God bless the military, and God bless Brazil, and his job was done. There was little for the nation to disagree with after that."
brazil_lacerda_sorbonne_campaign.21.a: "Dress rehearsal? More like press rehearsal."
brazil_lacerda_sorbonne_campaign.21.tt: "§Y[BRA_pres_selected_region_dynamic]§!\n  §GSlightly Increases Support§! for §L$BRA_pres_candidate_name_9$§!."

brazil_lacerda_sorbonne_campaign.22.t: "Braga's Background"
brazil_lacerda_sorbonne_campaign.22.desc: "Marcos and several other journalists belonging to various different papers had arrived at the cemetery to see presidential candidate Ney Braga. The weather fit the occasion, as gray clouds sat heavy in the sky, adding a somber mood to the scene of Braga laying down a wreath upon a grave. If Marcos remembered correctly, this was where the veterans of the Brazilian Expedition Force were laid to rest, those who had fought in Britain in the Second World War. Braga stood silently over the grave for a few minutes, before exiting the cemetery, a faint smile positioned itself on his face as he laid eyes upon the small gathering of reporters.\n\nAfter a brief introduction, Braga began to give a speech as the reporters started taking notes, \"... These soldiers of the Brazilian Expeditionary Force were true heroes, not just for Brazil, but for the entire world. I am proud to say that I studied alongside these brave men at Realengo, although I did choose a different path. To serve this country, I instead entered the police, and then entered politics. I can only hope that I will make them proud.\"\n\nWhile murmurs of approval made their way around the small crowd, Marcos was less impressed. Braga had very intentionally left out some convenient details from his little speech. He was a former Major, but of course with how controversial the military was these days that was apparently too risky to bring attention to. As Braga began to leave and make his way to a nearby vehicle, Marcos shouted over the background chatter, \"Mr. Braga, you said you chose a different path, but what of your two decades of service in the military?\""
brazil_lacerda_sorbonne_campaign.22.a: "He received no response."

brazil_lacerda_sorbonne_campaign.23.t: "Taking the Floor"
brazil_lacerda_sorbonne_campaign.23.desc: "The feed began with a stutter, then the sound of trumpets and horns, almost like a royal fanfare. Two men meet each other in the middle of a bare-bones wooden stage and muted background, and shake hands like foreign dignitaries. It is an eerie spectacle, designed not to offend any... particular sensibilities.\n\nNey Braga, a governor, Christian Democrat and conservative, as the host announces, sits. sits cross-legged with an unmoving grin. While he equips himself with his notepad, the camera focuses on a familiar and stony face, former President Juscelino Kubitschek. The slick-haired journalist in front of them almost forgets to say anything more; this is a man who does not need to be explained.\n\nHe steps toward the podium, slowly, poisefully. \"Brazilians, the last time I appeared to you as President, it was as a man who aimed to steer us into modernity. I am here again to steer us back onto that course. I have not only tried to be a sailor on the course of the Goals Plan, but a doctor.\n\n"Born into poverty myself, I endeavored to take the poverty of sickness away from my brave yet beaten countrymen at an infirmary in Minas Gerais. And when armed revolution struck and wounded its own Brazilians, I endeavored to heal the country as President. I have and will continue to be a healer in Brazil's hour of need, because that is what we need. More healers, not more soldiers."\n\nHe glanced at his opponent, then at a page of notes below him with two possibles routes."
brazil_lacerda_sorbonne_campaign.23.a: "Hold Ground."
brazil_lacerda_sorbonne_campaign.23.b: "Attack!"

brazil_lacerda_sorbonne_campaign.24.t: "Call and Response"
brazil_lacerda_sorbonne_campaign.24.desc: "\"Thank you, Mr. Martines,\" Braga's Paranaense drawl begins, motioning a deft hand toward his presenter. He had bided his time; now it is his time to pounce. \"My opponent has spent the last few minutes talking about, to be fair, his past. He has been a faithful servant to Brazil in more ways than one, and that cannot go unnoticed. But nonetheless, that past is still the past, and so let me focus on the present.\"\n\nBraga scans the room, reminding himself of the space and time he has in front of him. After this brief maneuver, he finds the camera lens and stares into it as if it is Brazil's eyes. \"Do you, my fellow Brazilians watching at home, feel safe today thanks to the government? Do you feel wealthy today, and do you attribute that to the decisions our country's most senior politicians have made?\"\n\nKubitschek suddenly stifles a laugh. The microphone only registers a hiccup. \"To those that would answer yes, let me assure you that will continue. But to those who would say no, I invite you to write to me, to my party and to our campaign, because you must and shall have a seat at the table as well. And let me say this: to heal is one thing, to bring together and then to deliver is another. My promise to you is to do all of the above."
brazil_lacerda_sorbonne_campaign.24.a: "A formless reply. But he has not made it easy to counter."

brazil_lacerda_sorbonne_campaign.25.t: "Pé de Valsa, Pé de Chumbo"
brazil_lacerda_sorbonne_campaign.25.desc: "Braga can't believe it. Juscelino Kubitschek has just admitted his pride in 'serving Vargas' as a doctor in 1932! He reverts to his signature smile. Then it becomes a sneer. He leans backwards, his posture making his nostrils almost visible. \"Now, now, Mr. President, now it all makes sense! Your pride for Vargas is what led you to all that debt and inflation-inducing policy. Perhaps instead of your love for a dictator you should have paid attention to the pocketbooks you ravaged.\"\n\nThe moment the barb leaves his mouth, Braga wishes it had not. The past few days, the one thing he was prepped to do was to channel the 'happy warrior'. Unfortunately for him and his strategy, he had thrown that all away in seconds. It was as if Lacerda had pushed him off of the stage and spoken for him.\n\nBut Kubitschek simply stares back, albeit incredulously. So does Mr. Martines. Then he comes back to drone on about factories and productivity figures between 1955 and 1960.\n\nWorse still, once Braga recovers from his self-inflicted bruising, he rejoins the conversation when it is too late to reply to what he would otherwise brand a lie: JK has already claimed the UDN's biggest initiative were destroying the Labor Laws, and the economy spearheaded by PSD funding. But the moment has passed, and so has his control of the debate. God damn it...\n\nJuscelino takes the lead."
brazil_lacerda_sorbonne_campaign.25.a: "A good racer is also a steady one."

brazil_lacerda_sorbonne_campaign.26.t: "The Model Men of Moral Society"
brazil_lacerda_sorbonne_campaign.26.desc: ""...I can only lament that Brazil's youth will be growing up in a culture of fear under a Braga administration, rather than a culture of hope," Kubitschek concluded his monologue on education policy, although Braga wasn't concerned.\n\nBraga smiled as he gave his response, "And yet, Brazil's youth literacy has increased dramatically over the past five years. Is a 'culture of fear' what we call young people working through their churches and their schools to help the less fortunate? Were young Bernardo and Luiz Oliveira from Porto Alegre living in fear when they organized a food drive that collected over food items through their local church to help the homeless? Was Afonso Santos of Curitiba not hopeful when he and his classmates organized after-school plays for children to help lessen the burden of working parents in their community? Was Miss Ana Pereira of Joinville not hopeful when she started a fund using her own allowance to help her fellow churchgoers after a fire burnt down several homes in their neighborhood?" Braga took some satisfaction in seeing a hint of nervousness flicker across Kubitschek's point as the man recognized he had walked into Braga's trap.\n\n"I dare say Brazil's youth are full of hope. Although, as a former basketball coach," Braga paused for a brief moment as he prepared for the finale, "I can admit Brazil is not properly supporting its future star athletes. That's why I promise that if I'm elected, I will fund new sports facilities and vocational training nationwide, so that our youth can fulfill their vast hopes!""
brazil_lacerda_sorbonne_campaign.26.a: "Braga knew he had won this topic."

brazil_lacerda_sorbonne_campaign.27.t: "A Moral Nation or a Moronic Nation?"
brazil_lacerda_sorbonne_campaign.27.desc: ""...and that's why if elected I promise to work with teachers to instill moral values in Brazil's next generations. As a former basketball coach," Kubitschek mentally noted that Braga once again had shoved in a reference to his own past, seemingly the man's favorite pastime, "I understand the need for these values to be instilled not only through studies, but also through sports."\n\nThe floor was given to Kubitschek, who kept his tone measured and calmed as he prepared his counter, "I fear my opponents focus on morals and discipline means little if Brazil's schools are not fulfilling their fundamental role in society: preparing their pupils for life," Kubitschek noted that Braga's smile stiffened when he noticed Kubitschek pull up a sheet of paper to read from. The paper outlined Brazil's literacy statistics, specifically under the Lacerda administration. They painted a disappointing picture, and Kubitschek hardly needed to explicitly say that Brazil shouldn't vote for more of this evidently failing policy, although he did say as much regardless.\n\nKubitschek put down the paper and stared into the cameras as he drove his point home, "If elected, the PSD will guarantee that schools will have enough resources to prepare both children and adults for productive, meaningful careers. 12% of the federal budget will be devoted to education, and our teachers will be required to have proper degrees to ensure only the most qualified will teach our future generations. And on the point of morals, how much more powerful will those morals seem when people can read them for themselves in our nation's great literature?""
brazil_lacerda_sorbonne_campaign.27.a: "Kubitschek knew no response could dismantle that argument."

brazil_lacerda_sorbonne_campaign.28.t: "Washed Popularity"
brazil_lacerda_sorbonne_campaign.28.desc: "The car heaved as both men stepped in, the drizzling rain sputtering on the roof and windscreens. Their faces were as grey as the sky, worn with weariness and stretched by stress. Far from the cameras, they hadn't the energy for a veneer, not anymore.\n\nJuscelino Kubitschek leaned into the sea, rubbing his eyes. He'd been awake for hours, watching the data coming in and combing over the debate performance. His eyes felt heavy, and what they had seen hadn't been good. He turned to his companion. "Ulysses, it isn't looking good, is it?"\n\nUlysses Guimarães sighed. "No, it isn't." He looked outside, pondering a growing puddle. "The polling just isn't going up..." For hours they had been pouring over the data they had commissioned. Broken it down by gender, region, anything they could think of to try and spin a win. Nothing appeared that wasn't a huge leap however, the evidence was clear - he was faltering while Braga's popularity was only growing after the debate.\n\n"Damned military stooge... have we swept the office for bugs yet?" Kubitschek's hands turned to fists as he reflected. Was it all foul play? Had he just lost his touch? How had he messed up so badly? He didn't know, and he fell back into the seat. "What now?" he asked.\n\n"I've organised for us to get something to eat this evening. Local, small place. Few cameras will be there, should be a nice feel-good piece. But first, we need to go home, get some sleep. We won't win anything looking like this."\n\nKubitschek nodded, deep in his own thoughts as Guimarães began to step out of the car. "Will the people vote for someone who wins debates, or someone who goes to restaurants?""
brazil_lacerda_sorbonne_campaign.28.a: "Guimarães stopped but didn't turn. "I don't know," he said."
brazil_lacerda_sorbonne_campaign.28.tt: "§Y[BRA_pres_selected_region_dynamic]§!\n  §GSlightly Increases Support§! for §L$BRA_pres_candidate_name_9$§!."

brazil_lacerda_sorbonne_campaign.29.t: "The Other Debate"
brazil_lacerda_sorbonne_campaign.29.desc: "The Cardosos said grace, and then tucked into their dinner. They ate in silence for a while, before the father decided to speak up. \"Ney Braga,\" he began, dabbing at his lips with his napkin. \"He kept his poise and his temper. His words were firm, and without a trace of anger.\" The son stopped eating, clutching his fork just a little tighter. \"A true leader. A true man.\" He reached over to the son and clapped him on the back. \"A man you could learn from!\"\n\n\"He only spoke of leadership,\" the son replied, gently brushing his father's hand away. \"Kubitschek has a proven record of being a capable leader of Brazil.\" The father snorted and shook his head, though the son was unfazed. \"Braga had words. Kubitschek had meaning. Braga had ideals. Kubitschek had plans. Plans to get us out of inequality and oppression that Lacerda gave us.\"\n\nThe mother watched the two men debate as she finished her plate. She thought that both of them had their points, but she opted to not intervene. Better an argument about the debate than another shouting match over the military's \"revolution.\""
brazil_lacerda_sorbonne_campaign.29.a: "\"More importantly, who's doing the dishes tonight?\""

brazil_lacerda_sorbonne_campaign.30.t: "Braga's Folly"
brazil_lacerda_sorbonne_campaign.30.desc: "Robert Borba coughed, the dusty crawl space filled with both cluttered knick-knacks and years of accumulated dust. The air hung heavy with it, his aged lungs struggling with it, but he soon fished his prize from a box - a photo album. It was majestic, its styles harkening to a different world and Robert smiled as he regarded it.\n\nHe clambered out of the crawlspace to his kitchen table. The TV was still playing in the corner, his family sat commenting idly on it, but he barely registered it as he sat and opened the album. He saw himself in his younger years, so full of vinegar at PTB rallies. They had been popular then, he'd had to take a job as a photographer just to get in close. There were even photos of himself with Vargas and Goulart. Robert pondered. Tonight, Kubitschek had shown himself clearly. He might not have the exact policies, but he saw the same honesty and bravery he had seen in the PTB. He closed the album.\n\nJoão Pessoa held the PSD banner in his hands, standing motionless before his window. He was a proud member of PSD, he'd never been in doubt of that, but he also knew the area he lived in. Everyone was UDN around here, the amount of times he'd had to politely nod and agree with some sneer directed at his own was exhausting. He was not a man who wanted confrontation. Then again, did Kubitschek? Tonight he'd shown himself as brave, confident - the man Brazil needs. If that's so, surely he could follow his example? He stepped forward to the window, and the banner hung proud for all to see.\n\nFelipe Alves was a UDN member. Felipe opened a bottle and started drinking. Felipe didn't want to think at all as he looked at the wine he'd dragged out of the recesses of his cupboards. "Bottled 1930," he read from the label with a slight slur. "Good year.""
brazil_lacerda_sorbonne_campaign.30.a: "No, the worst."
brazil_lacerda_sorbonne_campaign.30.tt: "§Y[BRA_pres_selected_region_dynamic]§!\n  §GSlightly Increases Support§! for §Y$BRA_pres_candidate_name_1$§!."

brazil_lacerda_sorbonne_campaign.31.t: "Divine Inspiration"
brazil_lacerda_sorbonne_campaign.31.desc: "It wasn't often that Ney Braga could find himself in a place of peace and quiet these days; the sheer chaos of the election had kept him busy. Some men felt that peace in a small corner with a book, some in a cold glass of alcohol, and Braga found his with a Sunday mass. It was one of the few constants he had left in life, and a place where he wasn't at the center of some speech or other matter; a place where he could just sit, listen, and think.\n\nAs the liturgy continued, his mind became filled with questions. He wondered about the Lord and what his God had planned for Brazil. He wondered if he was strong enough to fulfill that plan, if he was worthy of it. He wondered, if the worst came to pass, would he have the strength to stand up to the army?\n\nThe time for Communion came, and as Braga took in the bread and wine, he felt himself rejuvenated, and his doubts began to vanish. As the final rite concluded, he knew he needed to share his vision, help the average Brazilian realize what was at stake in the election. The only question was, where?"
brazil_lacerda_sorbonne_campaign.31.a: "The bustling hub of Rio will draw in a bigger crowd."
brazil_lacerda_sorbonne_campaign.31.b: "Curitiba is my home, they will listen."

brazil_lacerda_sorbonne_campaign.32.t: "Score to Settle"
brazil_lacerda_sorbonne_campaign.32.desc: "The sheer size of Maracanã Stadium loomed around José Sarney, its stands stacked with supporters proudly chanting slogans of endorsement, singing songs of a secure, prosperous democracy. A few soldiers had officially introduced the ceremony, giving knowing praise to its owners for their smart decision in accepting a contract, but most of the attention had been drawn to the head of the actual ticket. Applause slowly rose, then reached a fever pitch as Ney Braga marched out.\n\nIt took Braga a moment to become accustomed to the sheer magnitude of the event, from the stadium and its crowds to the soldiers standing across the hall. "It's no surprise that you all are so enthusiastic. Look at what we have accomplished in the last few years. Inflation is at a record low. Literacy is at a record high, poverty is in decline, and radicalism is being relegated to the fringe position they once inhabited. Brazil is brighter, wealthier and stronger for Lacerda, and will be under my administration as well!"\n\nFrom there, the speech settled slightly, shifting from broad campaign pledges to the minutiae, to a guided, sustained vision to maintain success. Each such promise made only received more intense cheers from the military. "If you entrust us with the next five years," shouted Braga, "you will not be disappointed. Brazil is finally on the right path, and will continue down this road towards righteousness should we be granted another full term. May the sun of liberty shine down on our skies!"\n\nThe crowd cheered, their slogans gaining a renewed burst of strength. Already, a number of journalists were practically shouting into their cameras, praising the speech as that of a visionary impatiently awaiting his upcoming coronation as President of Brazil. And yet, all he could notice as crowds finally streamed out of the stadium were the soldiers that lingered, split across the stands evenly, only later marching out in regimented order when ordered by the commandant present."
brazil_lacerda_sorbonne_campaign.32.a: "By, Braga feared, his real superior."
brazil_lacerda_sorbonne_campaign.32.tt: "§Y$BRA_pres_region_6$§!\n  §GSlightly Increases Support§! for §L$BRA_pres_candidate_name_1$§!."

brazil_lacerda_sorbonne_campaign.33.t: "An Authentic Ending"
brazil_lacerda_sorbonne_campaign.33.desc: "Given the depth and scale of Braga's campaign, its ending was quite a contrast - though still an excellent photo opportunity for the trailing press corps.\n\nHe had chosen to do so back in Curitiba, visiting local spots and catching up with old friends. He knew the city like the back of hand, and took great (and very visible) pleasure in leading the TV Globo reporters up and down the streets and from one hidden spot to another as he carried out those visits and meetings.\n\nHe made sure that they captured the authentic happiness, smiles, and laughter shared with Estela, his sister, and his children. It was great television, after all, and the stakes were very low. Everyone here, he knew, was going to vote for him regardless, keeping the pressure almost nonexistent.\n\nSo he enjoyed it. He had worked hard thus far, and took the ending in stride. Still though, it would make for great coverage. He only wondered what the public reaction would be, as any true politician would."
brazil_lacerda_sorbonne_campaign.33.a: "They loved him this much as Governor - I could vote for someone like that."
brazil_lacerda_sorbonne_campaign.33.b: "He's only so confident because the military has his back."
brazil_lacerda_sorbonne_campaign.33.tt: "§Y[BRA_pres_selected_region_dynamic]§!\n  §RSlightly Decreases Support§! for §L$BRA_pres_candidate_name_6$§!."