## Events
brazil_lacerda.1.t: "The Lacerda Era"
brazil_lacerda.1.desc: "Five minutes before seven, the new President sat anticipatingly at the head of the Supreme Meeting Room, his knees bouncing with energy. He mentally rehearsed his address while standing up, shaking hands with each incoming minister. Brazil's resuscitators, he thought.\n\n"Welcome everyone. I'm not going to beat around the bush, this is day one, but to be clear: the fact you are in this room today shows you are capable, and I want you all to feel that way." This started a wide grin above the desk marked "Hélio Beltrão, Minister of Finance", as well as a wave of applause and whistles led by "Vasco Leitão da Cunha, Minister of Foreign Affairs". The smiling President waved his hand.\n\n"First, building up Guanabara. I want to have a preliminary discussion this evening on it, and fortunately Governor Magalhães is here from Rio, so for that I want the Minister of Finance and Vice President." Virgílio Távora nodded. "Second, the highway. Look, you've all read my columns," eliciting hoots across the table, "you know how I want this done. We need to get the word out that once the roads reach a town, it's over." Beltrão nodded vigorously.\n\n"Third, a Vargas inquiry. Part of our primary agenda is clearing the way for future plans. For that, we need to set the groundwork early by publishing Varguist crimes." Távora looked anxious to interject.\n\n"Mr. President, isn't it a bit early to begin with Vargas? The PSD and PTB are still titans in Congress, they might get in the way."\n\n"That's exactly why we are beginning now, Virgílio," Lacerda immediately retorted. "While we have the initiative, we need to show that we mean business. Thank you all, and time is of the essence."\n\nThe Vice President joined the crowd of people at the door of the room. He wasn't sure of his haughtiness, but he was sure of something else: Lacerda did mean business."
brazil_lacerda.1.a: "The flaming torch of liberty blazes to life."

brazil_lacerda.2.t: "It's Over, Isn't It?"
brazil_lacerda.2.desc: "The Goulart's estate was truly a marvellous thing, large, filled with animals and crops and a house in the middle. It was an important day for the Goularts, Brizola was visiting them. The smell of Italian food coming out of the kitchen filled the room, the sound of children playing was also present, and Brizola and Goulart were at the table waiting for the food.\n\n"Can't believe he won." Brizola said while drinking some beer. "You could've won, but the people chose otherwise. We can still try to make it impossible for him to govern. Think with me, we can go straight to the heart, press offensives! I've always been good with radio."\n\n"Impulsive as ever. Maybe we should just wait, he's bound to mess up something and your antics might help him more than damage him." The two drank another cup of beer, they knew that Lacerda would be a problem for Brazil, maybe even the world.\n\nThe conversation started to get heated but right in the nick of time. "Food's ready!" Maria stopped them, deciding that now was not the time to talk about politics and rather to enjoy the scenery and the food she prepared."
brazil_lacerda.2.a: "To cut the Crow's wing."

brazil_lacerda.3.t: "Paradise Rebuilds"
brazil_lacerda.3.desc: "Some days had passed since the joyous moments during which Carlos Lacerda was elected President of Brazil. However, his successful ascension also meant an assumption of numerous burdens and responsibilities that were entrusted to him by the good sons of Brazil, among which, was of course the betterment of the quality of life, something that required better spaces and, why not? A kickstart to first benefit his fellow Cariocas.\n\nStanding at the podium, Lacerda unveiled an ambitious plan to transform Rio de Janeiro, energizing its essence, refining its streets, and orchestrating monumental investments. The vision painted was glorious, the aspirations lofty, yet the shadows of the neglected Favelas lingered in the periphery, casting a poignant contrast to the radiant tapestry Lacerda sought to weave.\n\nIn the heart of Rio, at the podium of destiny, the stage was set for a symphony of promises and aspirations. The audience stood suspended between the promise of a resplendent future and the haunting echoes of unresolved challenges."
brazil_lacerda.3.a: "Eyes set on tomorrow's Rio."

brazil_lacerda.4.t: "A Reporter's Drama"
brazil_lacerda.4.desc: ""SÃO PAULO - The Crow strikes again in his usual manner, feasting on the hard work of all. Why would we expect anything different from him? To create a "truth" commission to "investigate Vargas' crimes" is tantamount to a witch hunt towards an innocent man.\n\nThe speech given by him on a truth commission is in the same vein as those given by the Germans in the 30s and 40s! People of Brazil, do you really wish for a man as pervasive as the Crow to lead our nation away from Vargas' dream? A dream of self-sufficiency, a dream of industry, a dream of a better Brazil.\n\nHe claims that Vargas is a despot. I argue to all of you that this is mere projection, that the actions of the Crow are the same as the ones he accuses Vargas of doing. I believe that we, the Brazilian people, should not be led by a monster. Let's not forget his actions as governor, what he did to the poor and needy!\n\nBrazil could've been a greater nation had he not been shot and turned against his friends to lead a coup against Vargas. What he has done to Guanabara will be what he will do to Brazil. His position only has power from the people and if the people don't give him this power, he will fall. I will make sure that Brazil knows of his crimes, nothing will go unreported. The Crow will not fly.""
brazil_lacerda.4.a: "Última Hora, [?global.date.GetDateStringNoHourLong]."

brazil_lacerda.5.t: "Front-Page News"
brazil_lacerda.5.desc: ""You'll ruin us, you know that? Ruin us." Walking past velvet walls and plush carpets in what was once the Correio da Manhã headquarters, Távora could barely keep up with the extra spring in Lacerda's step. Not that Lacerda wanted him to follow; Távora attached himself to the President's entourage without so much as a greeting.\n\n"Just think about it for a second. Why all this fuss from the opposition? Why the anger? The vitriol? The fear-mongering?" Lacerda's grin almost burst from the energy he was holding in. "This has nothing to do with the people they claim to protect. Why are they acting so scared if they have nothing to hide?"\n\n"Because they fear you might abuse the power?"\n\n"I do not want to hear you play defense for these scoundrels. They have racked up decades of corruption, extortion, and censorship, and now, finally, democracy has had enough." This was the last place Lacerda could stand to listen to Távora's cowardice. Here, in this very building, they published Lacerda's interview with José Américo de Almeida, in which he coaxed Vargas' former ally into a caustic diatribe against the Estado Novo. It was the beginning of the end of Getulist censorship.\n\nNow, Lacerda had to finish the job. Vargas did not act alone. So many of his lackeys are still in power, having suffered not a single consequence for their actions.\n\n"You'll ruin us, you know that?" Távora repeated, yet Lacerda had long stopped paying attention. The two of them stepped onto the balcony, framed by the neoclassical façade of the hotel. Below, the narrow Gomes Freire Avenue was filled with activists, students, journalists. Lacerda could even pick out a few from the Correio himself, whose new head office was just down the road. Lacerda tightened his tie then waved."
brazil_lacerda.5.a: "He had a victory speech to give."

brazil_lacerda.6.t: "Half-Measure Headlines"
brazil_lacerda.6.desc: ""You could have ruined us, you know that?" Távora popped alongside Lacerda as he sat still, lost in thought in the pastel suites of the former Correio da Manhã headquarters, now converted to a three-star hotel. Lacerda was still figuring out what to say to the crowd; he hardly gave a passing glance to the Vice President.\n\n"Couldn't even give me a single second to rest before you heckle me? You already got what you wanted." Lacerda could barely gather the energy for a sarcastic grin.\n\n"Maybe this is an opportunity for you to take a breather. We'd have all the time in the world to fight injustice if you simply remain in the people's graces." This was the last place Lacerda could stand to listen to Távora's lecture.\n\nHere, in this very building, they published Lacerda's interview with José Américo de Almeida, in which he coaxed Vargas' former ally into a caustic diatribe against the Estado Novo. It was the beginning of the end of Getulist censorship. Now, decades later, he was President, and yet, so many of Vargas' lackeys were still in power, having suffered not a single consequence for their actions. How much longer will they continue to escape justice?\n\n"I'm barely keeping the cabinet together. You could still ruin us, you know that?" Távora chuckled as he extended a hand towards Lacerda, offering to help him stand. Outside, he could hear the excitement, the chanting. If anything, the bill's failure only emboldened his supporters' vigor.\n\nLacerda let Távora pull him up. Perhaps he was right. No rush. The two of them stepped onto the balcony. Below, the narrow Gomes Freire Avenue was filled with activists, students, journalists. Lacerda could even pick out a few from the Correio himself, whose new head office was just down the road. Lacerda tightened his tie then waved."
brazil_lacerda.6.a: "The people needed to know he would never surrender."

brazil_lacerda.7.t: "A Man and His Tools"
brazil_lacerda.7.desc: "Lacerda stepped up to the podium. He'd always imagined the podium from afar, always exalted it as something just out of reach, but today it was a tool, and a routine one at that. For what else was the podium but a tool to reach out and twist the press into the shape he wanted. Today, he wanted to shape the room to fit his agenda. Discrimination against women in the workplace was bad for women, bad for Brazil, bad for the economy. So he went to work, podium in hand, a tool to bring it all together.\n\n"Today I am here to talk about one of the problems that Brazil is facing today. It is a problem that affects our economy, our nation, and more than half of the people who live here in Brazil. It is holding us back, preventing innovation, lowering our standard of living, and creating a more calcified economy that is less resilient to shocks.\n\n"What is the problem? Something I underestimated until I took office, until I saw the numbers for myself. Until I had a member of my own staff talk to me and give me her insight. The issue I am talking about, of course, is discrimination against women in the workplace. I stand here to carry the torch of freedom and create a better Brazil for all of us to live in.\n\n"By passing these new laws that I have proposed, we will improve our economy, but we will also advance the cause of human freedom in this hemisphere. Discrimination is bad for business, it is fundamentally anti-competitive, but it also denies the basic dignity that all of our citizens share. We should all have a fair chance to fulfill our potential. That is the kind of Brazil I want to move toward."\n\nHe waved and smiled at the reporters, and he could see in their faces that his speech had once again hit all the right notes to shape the Brazil he was working toward."
brazil_lacerda.7.a: "He always knew how best to shape the crowd."

brazil_lacerda.8.t: "A Conversation"
brazil_lacerda.8.desc: "The OFN flag flew high in front of the embassy, something everyone could see for miles. Lincoln Gordon sipped his coffee in his office, knowing someone very important was coming. He looked out the window and saw him, the Foreign Minister himself, Vasco da Cunha. As he finished his coffee, he heard a knock and opened the door.\n\n"Mr. Gordon, a pleasure to meet you."\n\nGordon shook his hand firmly. "Please, Mr. da Cunha, sit down."\n\nThe office was nothing to scoff at, with the flags of Brazil and the United States behind Gordon's desk, along with pictures of both presidents. "I believe you came here to ask for further cooperation with the Organization, correct?" The ambassador had guessed correctly, and da Cunha began to speak with passion about the benefits Brazil's cooperation with the OFN would have on the world.\n\n"Don't worry da Cunha, I also believe that Brazil joining us would be a great thing," the smiling Ambassador said. "I believe Brazil will be a great way for freedom to shine in this world of darkness."\n\nThe subject quickly turned to how Brazil could defend itself against the foreign influence of the Pact and the Sphere. "Gordon, I believe that with your help, Brazil will not become another victim of two-sided pressure to become a fascist state. They already got the one to the south of us, we won't let them get another one.""
brazil_lacerda.8.a: "Liberty shines in the darkness." 

brazil_lacerda.9.t: "Beyond the Plate"
brazil_lacerda.9.desc: "The Supreme Meeting Room was extraordinarily quiet for this morning's meeting. The President had only been the President for little over a week, and was still not used to a meeting of four. The Minister of Foreign Affairs as well as Minister of War Golbery do Couto e Silva and General Castelo Branco took their places towards the front of the table. They just needed to set the record straight.\n\n"So, Argentina," began Lacerda. "What, when, why, and how? You begin, Vasco."\n\n"Thank you, Mr. President," replied Leitão da Cunha, smiling. "Argentina has been, even since the days of Vargas, a bastion of despotism on our doorstep. It is a revanchist mad dog barking at every country it can fabricate a claim upon. It stretches across the continent to the tail and the Beagle Straits, and wields control over swathes of the South Atlantic. Fundamentally, it has been on the decline since the century began and to buoy itself its politicians regularly resort to foreign aggression to keep themselves afloat. Clearly, they are a threat to Brazilian interests and should be responded to as such."\n\n"And I suppose by that you mean the Paraguay and Bolivia business," remarked the President.\n\n"Yes, but not just that," continued do Couto e Silva. "They back fascism in Paraguay and rebels in Santa Cruz, sure, but they leverage their larger army upon Chilean and Uruguayan leaders as well. They are at the center of a ring of tyrants eager to export their jingoistic ideology to secure its own."\n\n"Which leads straight back to Germania." Lacerda paused, staring into space.\n\n"And which is exactly why we need Washington," chimed in Leitão da Cunha. The President nodded, while Castelo Branco warily shook his head.\n\n"We can't just rely on Washington to deal with Argentina, Mr. President. It has been my, and the army's opinion more broadly, that it is Brazil's duty to defend its interests, as no one else is as affected and as capable of doing so. Where they move, so must we.""
brazil_lacerda.9.a: "The river between South America's giants blows cold."

brazil_lacerda.10.t: "The Wizard of Guanabara"
brazil_lacerda.10.desc: ""Oh, my love, I wish I could." Raphael Magalhães caught himself twirling the phone cord in his fingers. "If I could tear myself from all this and run straight into your arms, I would. But whether I'm in Guanabara or the Palace, I must keep Lacerda's circle around him. No, no. I know. I miss you too-"\n\nThe office door swung open. Magalhães sat up with a startle; as he pulled his hand into a more professional position, the cord tangled between his fingers pulled the phone across the table with a violent jerk. "I'll call you back, my dear." He rescued his fingers from the tangle and shoved the receiver in its crade. "Carlos, my friend! What brings you here?"\n\nLacerda fell on the seat. "We've been approaching this the wrong way. It's Getúlio's cronies, his offspring, occupying every layer of government. Not just among the Deputies, but in the bureaucracy! What good is passing a bill if there's a Varguist ready to block it, delay it, ignore its enforcement, and twist its meaning?" Before Magalhães could answer, Lacerda slapped the desk. "Raphael, my friend, we must be firm against them! Clear out the Varguists from the civil service, like mouldy fruit in a pantry, and replace them with men of character and competence!"\n\n"Carlos, my dearest friend," said Magalhães with a strained smile, "please take a breath."\n\n"I-" Lacerda paused, slouched his shoulders. "Yes, I apologise. But my God, when I think about all our good work that these Varguists could-"\n\n"It's quite alright." Magalhães walked around the desk to the empty chair on the other side. He placed one reassuring hand on Lacerda's shoulder, and with a flourish, produced a folder in his other hand."
brazil_lacerda.10.a: ""As it so happens, I've already been drafting up some ideas.""

brazil_lacerda.11.t: "A Tale of Two Cities"
brazil_lacerda.11.desc: "Lacerda always thought it was a ridiculous place. His eyes were drawn to the little star in the centre-west of the map: the one he was in, the one that rose from nothing. He could not dismiss the ingenuity of its architects, nor the dedication of its builders, but he could still not shake the feeling that all the effort to build Brasília was wasted on a cheap bit of political theatre.\n\nWorst of all, thought Lacerda, was that Kubitschek and Lott couldn't even finish the job. He stared out the window, and counted no less than a half-dozen construction sites in the middle distance. There were still ministries awaiting their new home in Brasília, still perched in Rio waiting to finally fly away. But construction was always delayed and deferred. Entire ministries had to communicate to the executive by telephone, and decisions were always impeded by time and distance. The thought of it made Lacerda snarl. Brazil's government was split in two, a thousand kilometres separating the hemispheres of its brain.\n\nLacerda's rational side cleared his mind. It was as if he had forgotten that he was President, that he could make the necessary decisions to rationalise and resolve the problems that plagued Brazil. And this one, this capital in the twilight, was a problem that could be solved. He took a pen from his desk and rose from his seat, approaching the large map on the wall.\n\nHe drew two circles over Brasília and Rio de Janeiro, and then a long line connecting the two. Within that line he imagined a cracked, pitted and rough-laid road. It took far too long to cross this line, but with some renovation of Rio itself, this arrangement could be made workable. Invest in communication, administrative initiatives to speed up travel and information between the two. Or, he thought as the pen hovered over Rio, he could cross it out entirely. Cut through the red tape, speed up construction, and complete Kubitschek's half-finished work."
brazil_lacerda.11.a: "If we are stuck with Brasília, then we shall make it a true capital."
brazil_lacerda.11.b: "A thousand kilometres might separate the two, but Brasília and Rio must be made equal."

brazil_lacerda.12.t: "Committed to... What Exactly?"
brazil_lacerda.12.desc: ""Mr. President, um, so... what angle are we taking with the Commission?"\n\nLacerda was deep in thought, but the thought of there being three hours until showtime played on his mind. What angle were they taking? It was a question worth asking, he supposed. But what was it for, purging Brazil of Vargas or of all corruption?\n\nThe General Investigation Commission was his plan to challenge bureaucratic corruption, that invisible mold which rotted the chains and pillars of the Brazilian state, as much as it pained the President to admit. It was a mold birthed during the empire, cultivated by Vargas and ignored by successors. So with that in mind, what was he going to tell the Commission meant to vanquish it?\n\nOn one hand, Vargas was a threat. If he did not extinguish his ideology from the state, it will have consumed it totally and wholly. If they could get his politics out of civil servants' minds, that would have been a victory enough.\n\nOn the other, Brazil's corruption problem was one which went across the whole political landscape. It was a truism at all ranks and posts that there was someone there to pay off and mislead, to threaten or blind. It was also the truth that they needed an honest institution to deal with it.\n\nThe speechwriter stared intently at him. He still had a message to convey."
brazil_lacerda.12.a: ""Corruption is a general problem, and the Commission will be our general solution.""
brazil_lacerda.12.b: ""Vargas has stained our country for too long. Our administration is here to clean it up.""

brazil_lacerda.13.t: "Different Shades of Blue"
brazil_lacerda.13.desc: ""This bill..." The bill was something Magalhães Pinto and his company tried not to speak about, but after minutes pursing his lips, he could not resist. He looked towards the front of the canteen, hoping to deflect his mild shame.\n\n"What about this bill, Magalhães?" Távora's innocently-posed question was injected with scrutiny. He looked at his friend from their Chamber mealtimes inquisitively, then dove back into his prato executivo.\n\n"This bill is going to be a disaster, that's what. And I know one of you is going to mention "Bossa Nova faction" in the next sentence, but it doesn't matter. You cannot put this amount of pressure on the honest lawmakers trying to deliver their mandate, it's absurd!"\n\n"No one is going to mention Bossa Nova at all, Magalhães." Herbert Levy did, in fact, have half a mind to link back to Pinto's denomination in the party. "I think you're getting needlessly worried. Lacerda is sensible, he's not going to stake some military tribunal to the Chamber as you fear. Don't we all need to act on our promise to fight corruption? We need to be determined."\n\n"It would be embarrassing to see something like "The Crow Scared Away" in the papers back home, wouldn't it," remarked Távora to Pinto's amusement. "Determination is important, sure, but is now the time? We're not in the position to be issuing edicts yet, the opposition could feel cornered and band together, and we would not necessarily win that." Despite that, Levy was probably right, he conceded to himself."
brazil_lacerda.13.a: "It's too late to turn back when the troops are all in place."

brazil_lacerda.14.t: "Venturis Ventis"
brazil_lacerda.14.desc: ""Mr. Levy, man of the hour!" Herbert Levy had rarely seen his commander-in-chief as animated as he was now, rocking in his office armchair.\n\n"Mr. President, I am looking at the only man of the hour," Levy replied, nonetheless feeling just as vindicated as him. They shared a chuckle. The Standards in Governance Act had, though barely, surpassed the threshold and would become law, with Lacerda's directing and Levy's lobbying. Illegitimate enemies of the UDN's reform plan and deputies misusing the levers of power would be placed under check, and the way Levy saw it, they probably deserved it anyway.\n\n"You know," said Lacerda, now turned towards his skyline view, "From '49, when Vargas and his cronies tried to take my life, I learned an important lesson. There is justice in fate. Providence, as I know it. Their attempt at my elimination was what sealed theirs. This city," as he swept his hand over the horizon, "was christened with the motto "Venturis ventis". To the coming winds. What you and I have achieved today is blowing us in the right direction, the path towards progress, the advance of Brazil."\n\n"We have come so far," affirmed Levy, nodding. "If you had told me we would be here today ten years ago, I would have told you to lay off the caipirinhas. They will see this date in fifty years and know that it was today when Varguism's noose around our nation's neck snapped.""
brazil_lacerda.14.a: "They thought they could hear the gusts outside themselves."

brazil_lacerda.15.t: "Glint of Opportunity"
brazil_lacerda.15.desc: "Lacerda stomped incessantly from the Planalto Entrance Hall to the State Room. Previously trying to maintain composure in front of humiliating defeats, he could now barely sit still. He scrawled names of people he would have to sit down with to answer for this mess. After all, the Standards in Governance Act was a test of their governance. If it failed, then they failed too.\n\nBut what next? As he looked up, he noticed the lapping waves of the pool outside the window, captivated by their gradual motion. No, he needed ideas. He had promised to clean up corruption and he had to do it. Maybe a press conference, talk to some newspapers, get restate the position?\n\nHe stared outside again, watching the water rippling, its glints and sparkles of lights bouncing into his eye. Wait, but there's something here. No matter how inconsequential the bill seemed, it shone the light straight back onto the National Congress. Every single deputy and senator who tried to sabotage his campaign did it... because they were afraid. They had something to hide, hell, it was probably them at the center of Brasília's villainy.\n\nA smile now washed over the President's face. Thank you very much, you bastards, he thought. You have planted your own fruit, now it's time to taste it."
brazil_lacerda.15.a: "One way or another, the bill will find its way into law."

brazil_lacerda.16.t: "End of a Dream"
brazil_lacerda.16.desc: ""My fellow citizens, I'm pleased to announce that the money drain that is the Trans-Amazonian Highway has ended. Too many cruzeiros have been wasted on driving a stretch of road through one of, if not the, most inhospitable regions of our nation, for little to no economic value, but simply as a Varguist pipe dream. Today, as I vowed on the campaign trail, we no longer will throw good money after bad, and we will invest our money where it is needed!"\n\nDozens of men in one work camp listened to the address from President Lacerda, as their work was unceremoniously ended and declared redundant. Even before the last crackling words were uttered, the construction crews began to break up. Some dejected men were already packing, while a handful more just wandered aimlessly, unsure of their future. The now unemployed foreman came up to the camp to make it official a few hours later, and the camp was entirely abandoned.Some of the excavators, graders, and tree clearing machines, most with HITACHI stenciled on, were left behind, with only a few of the most expensive and well maintained of the machines being driven away, down the few stretches of the highway that was completed.\n\nA massive rainstorm a few days after the last worker left soon washed away many of the rickety huts and caused the abandoned machinery to sink into the mud, their gears and engines forever clogged with the thick goo.\n\nIn a week, a young boy of an Amazonian tribe stumbled on the camp, with the shanties a ruin, and the machines up to the cabs in the mud. The first sprouts of weeds and foliage were already poking through as the young boy curiously poked around the outsiders debris."
brazil_lacerda.16.a: "In a month, you would forget anyone was here."

brazil_lacerda.17.t: "First Day at Freyre's"
brazil_lacerda.17.desc: "Lacerda ambled out of the presidential vehicle straight along the Esplanada dos Ministérios with his two newest advisors, walking like a parent dropping his kids off to school. On his left, Paulo Freire, the leftist bleeding-heart activist he had invited as a special advisor on illiteracy, who followed on with a wan smile. On his right, young civil servant high-flier Flexa Ribeiro, his protégé and follower tasked with being secretary for the Ministry of Education. And then there was the teacher himself.\n\n"Good morning, Gilberto, I've got some new students for you," he said to his education minister to an uneasy laugh from all three. Gilberto Freyre, after a long puff of his pipe, meekly shook the pair's hands over his office desk, but for a change these were not his students- his professoring days were done, but apparently he still needed assistants. He got out from behind his desk uneasily.\n\n"Thank you, Mr. President. I am very humbled by your nomination and feel very grateful you have called upon me to see this party's vision realized," began Gilberto, earning Lacerda's and Ribeiro's smiles. Freire politely looked on. "Our problem today is identity, as I'm sure you would all agree. We as a country are out of touch with the moderate Portuguese vision put forward in our founding. But I think we all here have an opportunity to change that. As platitudinal as it is to say, the pen is indeed mightier than the sword, education can do so much. Hopefully we can all join together in realizing Brazil as proudly harmonious, multiracial and multicultural."\n\n"...Okay, fantastic," remarked Lacerda, whose smile now carried an edge of astonishment. "Well, I'm off to the Planalto now, I wish you all good luck." He left the office slapping Ribeiro's back, motioning to his checklist, hoping they all got the message."
brazil_lacerda.17.a: "Make sure he stays within the line, Flexa."

brazil_lacerda.18.t: "A Sign of Hope"
brazil_lacerda.18.desc: "João was a simple man, living in the countryside as a teacher wasn't an easy job, one which he could barely make it, his previous busy life in the cities had given him some experience with time and money management but it wasn't enough. His school was given barely any funding and he was scraping the barrel for more resources.\n\nWalking back to his home, João was completely burned out, not a single sign of hope for the future came from his body. "The school is barely making ends meet, we will probably have to close it at this rate," he mumbled to himself, almost crying.\n\nHis home was nothing glamorous, a simple cabin for him and his wife to rest. "Honey, dinner's ready!" Said his wife, although smiling, she couldn't hide the pain from the condition her husband was in. "I've heard that Lacerda is passing a new bill for education. Maybe the school will get some money."\n\nThe words filled João's eyes with tears, tears of hope. He couldn't believe it, had he been wrong about Lacerda this whole time? He didn't expect much of the man but now he could finally have some funding. After eating his dinner and laying in his bed, João finally felt that Brazil could improve once and for all."
brazil_lacerda.18.a: "Why scare the good crow?"

brazil_lacerda.19.t: "A Cause for Celebration"
brazil_lacerda.19.desc: "A knock on the door and a genuine smile were the sight and sound in Freyre's office that night. Lacerda had come straight from the Presidential Palace to his cabinet to commemorate. In his hand he held a bottle of champagne. "Congratulations, Freyre!"\n\n"Oh, it was nothing, the bill had great support from all sides, it was bound to pass." said Freyre, embarrassed at the fact Lacerda had come to his office to congratulate him on such a popular bill.\n\n"Don't you realise Freyre? How much this will increase our popularity. We can't also forget that this act is perhaps the first step to installing true democracy in Brazil, after all, what is a people who can't read, vote for?"\n\nFreyre felt a little more confident with the words of the President. "This bill was indeed something I expected to pass, but seeing it actually becoming law is something more. Brazil will indeed change for the better." Both of them sat down and started drinking the champagne while discussing other topics."
brazil_lacerda.19.a: "The pen decides the vote."

brazil_lacerda.20.t: "Surrounded By Idiots"
brazil_lacerda.20.desc: "There had been many times in Carlos Lacerda's political career where he had genuinely questioned if he was losing his mind - but this one took the absolute cake. Just a few moments ago his secretary Esther, bless her heart, had timidly informed him that the National Literacy Bill had somehow failed to pass through the Senado, and he was taken aback in the worst possible way.\n\nHis mind raced with possible explanations as to how something so broadly popular could have failed to pass. It was a bill that helped teach people to read, for goodness sake, what could possibly have stopped it? Was it one of Adhemar's schemes? Personal vendettas? Or was his government simply filled entirely with morons who were wholly incapable of doing anything of value? He simply could not understand.\n\n"Sir? Are you alright?" Esther asked warily, already inching away from his desk. Lacerda shook his head numbly, getting up from his chair and putting on his coat. He had no energy to rant or rave about this to her today. He walked over to the door and looked back at her, trying to conceal the tiredness in his voice."
brazil_lacerda.20.a: ""I'm going home to go get some sleep, Esther. Don't let anyone contact me.""

brazil_lacerda.21.t: "New Educational Course"
brazil_lacerda.21.desc: "As the students filed into the classroom, Bruna was sifting through the sheets in the new dossier previously on her desk that morning. Some of the incoming teenagers ogled at the prominent government seal emblazoned on the folder's outside. Looking up from her reading, and embarrassed she had been caught doing her preparations at the last minute, she would snap "Sit down and give me a moment!" after having enough of the excited chatter scattering around the room.\n\n"MINISTRY OF EDUCATION: NEW EDUCATIONAL COURSE - HISTORY\n\n4.2.1. THE VARGAS ERA - ESTADO NOVO\n\nStudents are expected to learn about the authoritarian development of Getúlio Vargas' regime into the Estado Novo with the 1937 coup and the rollback of democratic reforms that followed, in particular the banning of all political parties. The role of the Cohen Plan as well as the corporatist economic system should be addressed. Students are also expected to understand the role of Fascist Germany and Italy in the identity of the state and its relationship with the people. However, they should also be able to compare Vargas' rule and the style of government by Mussolini at that time, with a clear understanding of similarities and differences. Ultimately, instructors should recognise the Estado Novo as an authoritarian government and a break from the democratic character developed years before."\n\nThe apprehensive history teacher felt puzzled. Today's questions will be fun, she mused. Was the Vargas regime truly like Italy? Not to her memory, at least. She could only imagine the reactions of the outraged parents hearing "Vargas" and "fascist" in the same sentence after school. The whole plan smacked of brusque, fanciful government planners who asked no one that might teach it. So much for standardization, thought Bruna, turning her face back towards her now-impatient cohort.\n\n"Now before we get going, write down today's title, the Estado Novo...""
brazil_lacerda.21.a: "A lesson for student and professor alike."
brazil_lacerda.21.b: "Finally, a truthful account of Brazil's history."

brazil_lacerda.22.t: "Too Little Cash, Too Little Time"
brazil_lacerda.22.desc: "Freyre slumped over his desk and stared intently at the brief, the lamplight burning his eyes. Three visibly contradicting plans to place the university system among the world's best stared back at him, but using one uncomfortable, limiting budget, now with several strokes of red pen underlining, to make it happen. Not to mention the timescale this aim was tied with. The department had only so much space in the news agenda to ensure the country was aware of the change in course, so it was time to think fast.\n\nTwo flashy plans struck him in particular. The first was to found more "engineering schools", specialized schools that could teach what the abundant new generations of workers needed to make them, and the country, more industrially competitive. Never a better time than now with mechanization in full swing, he thought.\n\nFreire's and the reformers' idea, though, was a scholarship surge. They could offer tens of thousands of new places paid for by the state to minimize poverty as a barrier to education. Despite the plan being costlier for longer, the plan objectively has merit given how elitist universities currently are.\n\nAlternatively, while Lacerda's steadfast support for keeping universities privately paid for was something Freyre previously seethed thinking about, it may just be worth its while to keep universities simple and cheap that way, expanding what already existed.\n\nAfter minutes of excessive pen tapping, Freyre decided on what to tell the department tomorrow morning."
brazil_lacerda.22.a: "Engineering schools. Our growing industry needs to be growing skills."
brazil_lacerda.22.b: "Grant new scholarships. We have to start with deprivation."
brazil_lacerda.22.c: "Expand universities. Play it safe."

brazil_lacerda.23.t: "Students for Democracy"
brazil_lacerda.23.desc: "The UNE was one of the last Varguist strongholds left in Brazil; its entrenchment in higher education had disturbed Lacerda greatly. Ideas on how to cease funding for the UNE had flooded his mind for the past few days, even now running through his head as he awaited the arrival of Flexa Ribeiro. His finger tapped an impatient dance on his desk.\n\nRibeiro pushed through the door to Lacerda's office, shutting it behind him at the President's behest. "I am going to announce a reorganization of the UNE, and I will reduce - no - cut their funding entirely when I announce the creation of the UDE,"\n\n"Too ambitious, too rapid; the students will be overwhelmed with the change. It will not go over smoothly."\n\n"What's the alternative then?" Lacerda asked, his eyes stalking Ribeiro.\n\n"Introduce the UDE first, as an alternative for the UNE. Then gradually increase its funding while reducing funding for the UNE, eventually, students will move into the UDE as it will be the only viable option." Lacerda nodded, "The UNE will be gradually left without room to breathe as the UDE expands. It won't be quick — but starved of any student support once their holdouts move on — it will be a certain death." " He stood waiting, Lacerda rubbing his chin.\n\n"It'll work," Lacerda spoke approvingly, allowing Ribeiro the weight off his chest, "Begin the preparations, I shall speak to Beltrão to allocate a sufficient amount of the budget towards the creation of the UDE. It's time to get to work." Lacerda picked up a phone on his desk, dialing a number as Ribeiro was dismissed from the room."
brazil_lacerda.23.a: "Democracy begins with our students."

brazil_lacerda.24.t: "The Students Revolt"
brazil_lacerda.24.desc: "One day, Lacerda thought, he would pass a perfectly sensible piece of legislation that didn't send half the country into an unhinged frenzy. But it seemed today was not that day. As he skimmed lazily through reports of stones being thrown through windows and militant students occupying their campuses, he could swear he felt another five years of age pilling on top of him. "All this? For a lousy union?" he asked incredulously to his advisors.\n\nGeisel nodded wearily in agreement. "A thorn in our side, certainly, but it should be simple enough to deal with. Simply evict the students, throw the most important leaders in prison, and that should be that." A tempting offer indeed - simple, but effective. But Flexa, sitting opposite Geisel, scoffed at him for suggesting such a thing.\n\n"Are you sure it would not be more prudent to simply... hear them out? Their demands are far from outrageous, perhaps equal status will be all they want." Another easy choice, but giving them an inch today was tantamount to giving them a mile tomorrow.\n\n"Mr. President, both of these solutions greatly overcomplicate the matter," Freyre piped up. "Perhaps it would be wise to... have a conversation with the more vocal leaders. Let them know what we can give them, and what could happen if they say no. Man to man." Lacerda shot the man the dirtiest look he could muster. Corruption under his presidency was a definite no. So that left Geisel and Flexa's proposals."
brazil_lacerda.24.a: ""Fine. Flexa, arrange a meeting.""
brazil_lacerda.24.b: ""Send them in.""

brazil_lacerda.25.t: "Caipirinhas and Contemplation"
brazil_lacerda.25.desc: "The evening the new report from the Ministry of Education came to print, the corridors of the Planalto Palace were filled with triumph. Ministers came to exchange gags and grins alongside exuberant civil servants who finally had something to point to as their contribution. Away from the riotous celebrations Lacerda preferred a low-key reception with the team responsible, caipirinhas all around. These emphatic successes do not come often, after all.\n\n"Frankly, I am surprised," began the Crow, as he sat down his glass, "that it all worked out as much as it did on paper. I mean, look at you three. It seems that Freyre and Freire have more in common than letters in their name!" He paused, noting the awkward yet genial smiles exchanged around. "Low-hanging fruit, but it's true. Thanks to you, and Ribeiro, of course, we have proven all it takes to fix our democracy is not to ignore illiteracy, but to fix it. God, Goulart must be green with envy that it was I who hired you and not him."\n\n"Mr. President, I simply did my job," Freire replied curtly, with a wan smile. "I tried to help Brazil how I could. If our country asks me for my hand, of course I must give it."\n\n"Whatever, Paulo, all's well as long as you're not arming the enemy. For now, you're one of us." Gilberto Freyre's toothy grin shot back at his near-namesake's furrowed brow. Ribeiro looked on, just happy to be there.\n\nLacerda scanned their faces once more. Their different stories, their different ages, experiences, beliefs. Just like his own vision of Brazil's people, they managed to look past differences- well, for the most part- and work together. They maintained Order, and advanced Progress. If only every issue could be this way, nothing held them back.\n\nRibeiro, his dazzled eyes mirroring Freyre's audacity, made a venture of his own now. "Three cheers for the President!""
brazil_lacerda.25.a: ""Please, call me Carlos.""

brazil_lacerda.26.t: "A New Kind of Care"
brazil_lacerda.26.desc: "Severino squinted at the dust devils dancing on the parched earth of Pacatuba. For years, the Farmácia do Seu Zé had been a fixture of their small town, a place where you could get remedies for a fever, gossip about the neighbors, and maybe even a little bit of credit when times were tough. Seu Zé knew everyone by name, offered herbal teas for ailments, and his prices, while not always cheap, were... manageable. Now, though, things were different.\n\nA gleaming white building had sprung up on the edge of town, stark against the familiar sun-baked adobe. 'Clínica Popular União Democrática Nacional' it proclaimed in bold letters. People whispered about it - a clinic run by the government, offering consultations with real doctors and medicines at prices that undercut Seu Zé.\n\nAt first, Severino scoffed. UDN? Lacerda? Those city slickers in Rio, what did they know about the needs of the sertão?\n\nBut then, his youngest, little Rosa, fell ill with a nasty cough that wouldn't quit. Seu Zé's remedies weren't working. Desperate, and with Rosa's fever rising, Severino reluctantly walked towards the white clinic.\n\nThe air inside was cool and clean, a stark contrast to the dusty heat outside. Nurses in crisp uniforms smiled warmly, and the doctor, a young man with kind eyes, listened patiently to Severino's worries about Rosa. The medicine he prescribed was effective, and shockingly, the total cost was less than half of what Seu Zé would have charged for just the cough syrup.\n\nWalking back home, Rosa's small hand warm in his, Severino felt a strange mix of emotions. A pang of sadness for Seu Zé, whose livelihoods were surely threatened. But also, a burgeoning feeling of... gratitude?"
brazil_lacerda.26.a: "The taste of progress, Severino thought, was... medicinal."

brazil_lacerda.27.t: "Conspiracy and Rumor"
brazil_lacerda.27.desc: "Marcelo Garcia looked over the reports that were coming into his desk, especially the one about how São Paulo's residents were starting to turn against the vaccines he was trying to provide to eradicate smallpox. Rumors on how the vaccines were being bought out by laboratories or other actors and sold off at higher prices, while the free vaccines that were being distributed were little more than water.\n\nThe Minister of Health grumbled to himself. His biggest project was to rid his nation of the disease that had killed millions throughout history. Thanks to modern technology, there was a possibility that this ancient killer could be eradicated forever. Yet, superstition and gossip were threatening to ruin it, allowing smallpox to continue to spread and poison Brazil. And it was becoming clear that the local PSP political machine was behind this, trying to tarnish UDN with corruption. Garcia snorted. Rich coming from Adhemar.\n\nNeedless to say, something must be done to solve the issue. Garcia just needed to figure out what that was."
brazil_lacerda.27.a: "A public education effort to prove that we can solve smallpox."
brazil_lacerda.27.b: "Find some way to prove the PSP is actually behind the "corruption.""
brazil_lacerda.27.c: "Don't worry: it should sort itself out soon enough."

brazil_lacerda.28.t: "The Miracle of Modern Medicine"
brazil_lacerda.28.desc: ""Thank you all for tuning into Rádio Globo! I'm your host Lorenzo Bastos, and today, we are discussing the current smallpox vaccine drive with Dr. Mariana Ambrósio, one of Rio's most distinguished epidemiologists."\n\n"Obrigado, Lorenzo," Dr. Ambrosio replied.\n\n"What are your thoughts on the current vaccine effort?"\n\n"Let me start by saying that the current government's efforts to eradicate this horrible disease are to be applauded. This is a non-partisan issue, one that should be supported not just by all political parties, but all people of the world. This disease, which has been with humans since the dawn of time, has killed pharaohs and kings, commoners and peasants alike, with no consideration for class or wealth. There are some reports that nearly 300 million have died from smallpox alone so far in the 20th century, even though we have had inoculations and vaccines for about 150 years now. Many countries have already eradicated smallpox outbreaks in their countries, and it's high time Brazil joins that exalted list of nations."\n\n"What do you say to the skeptics of the vaccine?"\n\n"I simply say that without the vaccine, you are increasing the likelihood that you will suffer one of the most horrible and painful diseases known to man. Thirty percent of those that contract the virus do not survive, and those that do are often left scarred, blind, and at risk for pneumonia, and can spread it to others. So please; if not for you, then for your loved ones. Get this miracle cure.""
brazil_lacerda.28.a: ""Thank you Doctor. Up next, João Gilberto's newest bossa nova hit!""

brazil_lacerda.29.t: "No Better Present Than a Future"
brazil_lacerda.29.desc: "She knew this pain. A soon to be mother screaming in pain, except this time she was not alone. She was not cast into the kitchen as her husband worked in the fields. The pain of childbirth was then followed by the pain of loss as her motherhood was stolen from her. She could feel that painful memory all over again. This time however it was not a kitchen and she was not alone. The clinic building stood bright blue. Before the nearest hospital was miles away, completely out of reach. This time things were different as she was carried into the clinic. A doctor stood next to her carefully taking care throughout the delivery.\n\nWhen the child was born, however, it seemed as though it had all been for nothing. There was no sound of it breathing. She was about to burst into tears as that same pain was forced on her for a second time. The doctor quickly took the child and held it upside down for a second. Then, wonder of wonders, it started crying. The moment of pain turned into relief as the child was put in her mother's arms. It held her tight. Clinging onto life. As she laid in her bed in the clinic, newborn in hand, she could not help but think that without this clinic and the doctor here she likely would not have the child in her arms. Maybe if she had the clinic and the doctor over her before then perhaps she would not have had to experience the pain of being a mother denied last time."
brazil_lacerda.29.a: "The newborn held her finger tight."

brazil_lacerda.30.t: "The Violent Land"
brazil_lacerda.30.desc: "In a faraway land where the unrelenting advance of modernization had at last started to catch up and a community on the verge of transformation started preparing itself for a long delayed future. A quick look around this remote community exposed the glaring lack of public services and the weak glimmer of optimism. Under the cover of neglect, the sons and daughters of this isolated and rural region of Brazil banded together to remedy their collective shortcomings, starting with the most basic of all grievances: health.\n\nIn the shadow of their barren terrain, the oppressed people gathered before the approaching town council, pleading for the building of a small hospital to care for their sick and hungry. This appeal struck a chord with the attendees, providing a ray of hope in a sea of hopelessness.\n\nYet, a formidable impediment loomed large—a dark, ominous figure, the cacique, wielding control over the land through squads of thugs and minions entwined in the machinations of the PSD. Unwilling to relinquish any parcel of his domain for the welfare of the downtrodden, the petit tyrant's word became the decree that sealed the fate of these weakened souls. The ruling, a resounding denial of expropriation, cast a perpetual shadow over the nascent dream of a hospital.\n\nProtests erupted, mingling with the anguished moans, tears, and pervasive despair. The cacique, a puppeteer of suffering, reveled in yet another triumph over his perceived inferiors. Little did he fathom the impending tempest—shattered windows and a cascade of shards descending upon his opulent dining room. A wrathful onslaught orchestrated by hands guided by the collective anguish of the people, the very individuals he regarded as vermin. As the tumult subsided, his eyes fell upon a stone bearing a paper note."
brazil_lacerda.30.a: "And it read: Aceite os novos tempos ou pereça."

brazil_lacerda.31.t: "In Corpore Sano"
brazil_lacerda.31.desc: "Dr. Jacinto Almeida stepped out of his consultation room, the echoes of his patient's desperate coughing still lingered in the air. Despite Mr. Andrade's insistence on pneumonia, Almeida knew better. He had dived deep into the man's medical history, recognizing the telltale signs of exposure to the pernicious fumes of a nearby chemical plant. The diagnosis was indeed chronic, but survivable, he believed, faced with Andrade's insistence, he opted to keep this reality to himself, simply giving him an incapacity note.\n\nAs he strode through the streets of Belo Horizonte, Almeida's mind became full with thoughts of his own precarious finances. Each patient seen today brought him one step closer to his payday, yet the meager earnings promised a future of continued struggle. Even so, beneath the weight of financial strain, a flicker of resolve burned within him - a steadfast commitment to his calling as a doctor, rooted in the promise he made to himself long ago.\n\nNow, faced with the harsh realities of his profession in Brazil, Almeida found himself at a crossroads. The allure of financial stability beckoned from across the ocean, a tempting offer from Mr. Goes—a position at St. Joseph General Hospital in Boston. It was an opportunity to escape the suffocating grip of financial uncertainty and continued hardships, the promise of a more comfortable life, of course, at the cost of his own altruistic ideas and his desire to serve his countrymen.\n\nThat very afternoon, as he made his way to meet Mr. Goes, Almeida paused by a newsstand, his eyes drawn to a headline that promised a glimmer of hope amidst the otherwise gloomy future he foresaw: "Better Pay for Doctors by Decree." The words ignited a renewed sense of possibility and charged his heart with optimism. Suddenly, the right decision became more apparent. Perhaps, a door was opened, one that reconciled his desires for a better life with his promise to the people of Belo Horizonte, Minas Gerais, and Brazil."
brazil_lacerda.31.a: "And so he turned around, hoping for the best."

brazil_lacerda.32.t: "Invisible Hand"
brazil_lacerda.32.desc: "Smoke wafted through the dimly lit halls of the Chamber of Deputies as Leonel de Moura Brizola interrupted the recess and walked towards his fellow partymen, but more specifically towards José de Magalhães Pinto, among the few men he felt understood his position on the state of healthcare in Brazil.\n\n"It's an outrage, you know. Health is a public concern, giving it away is nothing short of privatizing life!" Brizola declared, his unease evident in his posture, leaning towards Pinto's desk without even a greeting.\n\nMagalhães Pinto, equally opposed but resigned to the political reality, remained stoic and calm despite his colleague's abrupt entrance. "I understand your concerns, but the President has the party's backing. It's not a battle worth fighting."\n\n"But still, I will fight. This isn't over. We need to organize and resist this madness" Brizola insisted.\n\nFrom Brizola's words, it was clear that a coalition would need to form against Lacerda's healthcare reform. Pinto could already foresee the consequences.\n\n"It will certainly stir up trouble, wouldn't you agree?" he remarked.\n\n"And yet, it wouldn't be the first time acting in the name of the public has" Brizola replied.\n\nTheir discussion continued, but amidst the bustling chamber, their encounter dissolved into the conversations of other deputies. One thing was certain: the struggle ahead in the Chamber of Deputies was unpredictable."
brazil_lacerda.32.a: "Things happen by the necessity of their own nature."

brazil_lacerda.33.t: "Zero Sum"
brazil_lacerda.33.desc: "In his office, Carlos Lacerda was correcting the final details of the bill to grant governmental support to healthcare, revisiting every article and every comma in order to have more time to think about this decision. It was evident that he found the bill at least uncomfortable, knowing that his instinct dictated to go forward with privatization instead.\n\n"Mr. President, is something the matter?" Juarez Távora asked, puffing contentedly on his pipe, supportive of Lacerda's reluctance to leave healthcare in the hands of the volatile market.\n\n"It's a matter beyond our grasp, I believe," Lacerda replied, his shoulders weighed down by the burden of compromise.\n\n"Indeed, unpleasant decisions often begin with sacrifices," Távora acknowledged.\n\n"Indeed. Yet, no matter how much I read it, I'm inclined to consign this document to the flames at first notice," Lacerda remarked, glancing at Távora. "Has Brizola commented on it yet?" he inquired, his thumbs tracing the margins of the document.\n\n"He laments the bill's subjugation to corporate interests and of course, neither slow nor shy, he was quick to hold you responsible," Távora replied calmly, though Lacerda couldn't help but chuckle at the accusation, smiling at the paper before sighing once more."
brazil_lacerda.33.a: "If he's against me, then this must be alright."

brazil_lacerda.34.t: "Flawless Timing"
brazil_lacerda.34.desc: "The marble halls of the congress stood as a testament to both grandeur and neglect, their pristine surfaces marred by the debris left behind by the passing throngs of men. Sophie Walker, the custodian tasked with their upkeep, knew this struggle intimately. She had become intimately acquainted with the hygienic idiosyncrasies of every senator, her daily routine intertwining with the ebb and flow of legislative discourse.\n\nAs she meticulously scrubbed the main hall, her mind wandered back to a time before the upheaval that had driven her from Germany. The dizzying changes that had rendered her displaced played out in her memory, distracting her just enough to miss a step. With a sickening crack, she found herself sprawled upon the stairs leading to the mezzanine, pain searing through her wrist.\n\nIn that moment of vulnerability, the stark reality of her situation hit home. Had this happened yesterday, fear would have gripped her heart as she pondered the exorbitant cost of medical care. Yet, the applause she had heard earlier that morning echoed in her mind, a harbinger of change. The state, she realized, now extended its protective embrace even to the likes of her. Despite the agony pulsating through her injured wrist..."
brazil_lacerda.34.a: "...a newfound sense of hope blossomed within her soul."

brazil_lacerda.35.t: "The Other Price of Freedom"
brazil_lacerda.35.desc: ""Have a seat, Virgílio." Lacerda motioned towards the chair in front of his desk, further away than it normally was, thought Távora, shuffling awkwardly to avoid eye contact. The Standards in Governance Act was in flames, and the spearhead for the government's anti-corruption offensive was shattered. Now the job was apparently up to him to explain himself.\n\nThe President's sharp intake of breath motioned he would begin the procedure. "So, I think we'll agree we are far from our ideal world today. Do you think you might know why?"\n\n"To be frank, if I may, sir, the bill itself. Having spoken to deputy after deputy, I believe I am not the only one with that view." Lacerda leaned back into his armchair, his brow as furrowed as it ever seemed to be. "To convince the Chamber at such an early stage to be so bold was a difficult task from the outset. There were many even in our own ranks who I could not convince to abandon fear."\n\nThe Crow appeared to calculate. "Well, that was something addressed before in previous meetings, and I believe we agreed to take strides early and mobilize our base, but I take your point it might have looked... gratuitous. Távora felt as if he was at a diplomatic negotiation with his own friend. What was going through his mind? He seemed to be accusing himself of sabotage, as if there were no other conceivable way it could have come to this.\n\n"Perhaps we ought to pick this up another day." Távora agreed and briskly set off for the door without looking back, as stolid as he came in."
brazil_lacerda.35.a: "The other price of freedom is liberty to disagree."

brazil_lacerda.36.t: "The Lacerda Years"
brazil_lacerda.36.desc: "[?global.date.GetDateStringNoHourLong]\n\nThis morning O Globo reported the IBGE latest projection on national life expectancy continuing to rise to around 53.5 by the end of the decade. Lacerda was wielding the newspaper like a trophy whenever anyone came into his office. To be fair, we were being hammered by every other source of information in Rio and Brasília about any old promise we had made in the campaign, but this was a victory not even Goulart could deny.\n\nI was one of the aides Lacerda selected to review his speech for the medal-awarding ceremony. You should never miss an opportunity to witness the vainglorious moments he littered into every public announcement if you can. Enaldo Peixoto, another advisor, the secretary of state Marcelo Garcia and the health minister Raimundo de Moura Brito all got National Orders of Merit in the end. I didn't know much about minister Garcia and minister Brito, clearly too "busy" having shared 3 hour lunch breaks every day, but I only ever saw Enaldo talking to other health professionals and was never a minute off task- I'd be more worried if he didn't get one.\n\nLater in the TV breakroom some of us saw a pretty funny story about another initiative in Rio to raise awareness for healthcare access for favelados. They got a couple of local circus artists to join in and visit the children with silly routines, dancing around each other and acting like cartoon characters. The artists' costumes all suspiciously resembled crows, and some of us smirked at the idea of getting the President to do the act himself for fun. Probably not everyone saw what we did, and rumor had it Lacerda was thinking about getting a flight to Rio to have a word with their costume designers. I guess it ruffled his feathers the wrong way...\n\nThe mood in Planalto is improving and people are regaining hope, even outside the party. The hospitals don't yet have all the money they need, but now we have something to work with in that regard.\n\nLarisa"
brazil_lacerda.36.a: "Maybe you could say the situation is beginning to take off?"

brazil_lacerda.37.t: "Seeds of Change"
brazil_lacerda.37.desc: "Antônio woke up at seven in the morning, as he always did, to get to work. Today, "work" meant visiting the small "town" of Formoso on a fact-finding mission. There had been reports of rights abuses by the landowners of the area, and thanks to the SDA, he now had the power to lay down the law.\n\nAs he got out of the car to inspect one farm, he noticed about ten peasants arched over planting seeds, their hands quivering, overseen by a couple of men in coffee-brown suits, sharing a joke between them. It was eight in the morning; that wasn't a good sign.\n\n"Good morning, friends," began Antônio, "I'm with the local inspection authority. Can I ask a few questions?" After he had exactly asked a few questions, he found shotguns being brandished in his direction.\n\nFortunately the townspeople were less, well, stand-offish, and he was able to enjoy some local coffee over a friendly discussion about farming practices and the Formoso lifestyle. Thanks to the SDA, he reminded himself, if worse came to worst, he would have backup and he'd be able to ask his questions with the police or in a commissariat, if it were necessary.\n\nIn the afternoon, however, his daily nap was interrupted by bellowing men and ax blows being heard in every part of his hotel. Once the vagrants had left, he paid the manager double the cruzeiros they agreed, and tiptoed across the smashed-up glass and wood chips. This wasn't his first run-in with a local elite and their thugs, but this was always the end. Until today.\n\nA few hours later, Antônio resolved to file a report with the local police on his experience in Formoso that day, who pledged an investigation if he would cooperate. For once the gears in the administration he worked in were turning- he only hoped it would stay that way."
brazil_lacerda.37.a: "A beautiful town with an ugly story."

brazil_lacerda.38.t: "A Slice of Life on the Cerrado"
brazil_lacerda.38.desc: ""Hey! You're not a face I recognize," called out a balding old man from inside a doorway. Paulo was a little startled, taken aback. "No, it's okay, I don't bite," the man reassured him, laughing. "What's your name?"\n\n"Paulo," he replied. Well, he might as well get started with meeting the neighborhood. "So you've been here a while, I suppose."\n\n"Okay, I might be old, but I'm not ancient," replied the man, slightly offended, but still smiling. "Well, I was one of the firsts that Vargas convinced to march out west, hoping to make a life out here," then he sighed. "But 1937 was an unlucky time to start. The soil wasn't ready to farm, I bought an entire farm's worth of cow shit, hoping it would help. That worked as well as you might expect." Paulo couldn't help but grin at the story. "Now my family and I just rear cattle."\n\n"Right, right," said Paulo, smiling. "Though I suppose it's quite a bit different now, what with all the new people and techniques."\n\n"It really is," confirmed the man. "Now there's tractors, tools, not that much infrastructure but better than nothing, I guess. And there are so many young people nowadays, such as yourself. You know, half the people we knew back in the 40s have just up and left. I don't even have the same neighbors as I had three years ago! Now they're growing corn and a lot of it, things are looking up."\n\n"But I don't know," he suddenly thought, staring into space, "Now the corporations and companies and what have you, who gave us nothing for decades, now want the whole thing for themselves. I'm sick and tired of these suits and ties, I'd much rather have my neighbors back than these scroungers." The pair shared a moment of wistful silence before Paulo told the man he had to head back home. When Paulo got back, he realized something."
brazil_lacerda.38.a: "He forgot to ask for that man's name."

brazil_lacerda.39.t: "Buff Up Your Pride"
brazil_lacerda.39.desc: "Hélio Beltrão caught up with the President in the hallway outside the Supreme Meeting Room. After awkwardly jostling to be the first to speak, they agreed, speechlessly, to put aside all other duties for the moment. They had to talk about the buffer stock plan.\n\n"Mr. President, as you might probably expect, while I have heard of the concept of the buffer stock... I don't particularly like it." Lacerda knew he could be aggressive when talking to ministers, and tried to soften for a change. "I'm here to listen, Hélio," he resolved to say.\n\n"I understand prices are fluctuating a lot currently, and it might help to intervene. I am sympathetic to that. But first, artificially changing prices shows a lack of confidence in the market; second, it won't sit well with government investors; and third, it's probably too ex-"\n\n"-expensive, sure, I hear your concern, Hélio. But listen, I was elected to keep the consumer and farmer certain and secure. That's what the buffer stocks are supposed to do. Plus, it's an investment and we'll get the money later. You of all people must be aware of that, I'm sure."\n\nThe finance minister smiled. "But money famously does not grow on trees, Mr. President."\n\nLacerda smiled back. "It might as well grow on crops, Hélio. There's a reason they plant cash crops," the President gagged. "Anyway, platitudes aside, our job is to restore confidence, not leave our people out to dry. I'm sure we can forgive sacrifices like this once in a while."\n\nThe minister said his greetings and headed off to the Treasury, a little confused, but assured that the President at least had a plan."
brazil_lacerda.39.a: "Planting profits, or burdens?"

brazil_lacerda.40.t: "A Letter to Blind Men"
brazil_lacerda.40.desc: "To this wretched government,\n\nI am a farmer. You all in your Federal District have probably forgotten that word, but beware that we still exist. Unfortunately, no thanks to your government, I will no longer be one. I can only imagine that is the case for many more farmers to come.\n\nSince 1950, my family has voted for the UDN, hoping our interests would be protected. We did not want the Varguists, who did not appreciate and honor Brazil the way we did. But unfortunately, neither can we tolerate waiting nor the "alternative" this government has given.\n\nOur land is meager, fallow, and poor. Our prices remain high, and our yield does not even support my wife and four children. Violence is daily and the roads are nonexistent.\n\nNo more, we say. We have given away our only plot to the bigger farmers. As I write this on a train bound for the cities, I wish I had another option, as I love my town, my land, and my state. But I do not have one, as do the hundreds of peasants on the platform, eager to start anywhere else new. I am trapped, boxed in by impatient wives and sobbing children. This is the land we have been given.\n\nNow this government tells us it is not planning any land reform. I say that is leaving us to the dogs. We have been here for decades, some of us centuries. This pride of Brazil, the sacred art of the small farmer which feeds it, will no longer exist, and its blood will be on your hands.\n\nA farmer"
brazil_lacerda.40.a: "The paper is wrinkled from tears and sweat."

brazil_lacerda.41.t: "A Plot to Be Desired"
brazil_lacerda.41.desc: ""Land reform is here! Land reform is here!" cried the town paperboy as people gathered around in the square. The air was excited with chatter, people buzzed around the journal piles, berimbau and pandeiro filled the atmosphere.\n\nThat energy soon faded. As more and more readers in the town discovered what "land reform" really meant, jubilance fed into annoyance. What had really happened was that the Congress had passed a weak bill which did only a pair of things: only a certain size of estate would be broken up and only some farmers would get back their land. And they had to wait another half a year to see the whole process through.\n\nAs the mellowness of the evening sobered up spirits, some farmers decided it was the last straw. The square was depopulated compared to the morning; some had gone to find train tickets to the city, some had forgotten and moved on and as usual, the rest were arguing about how stupid the bill was.\n\n"But it's not stupid. Well, not entirely," one might go. "Sure, it's a struggle. But we've seen struggle, and the land is healthy. All we can do is go forward."\n\n"But they've strung us along all these years!" would be a typical reply. "The UDN is the party of the conservative, of the hard-working man, and apparently, the only such man is in São Paulo or Belo Horizonte! It's just absurd, it all is."\n\nEither with hope or with hate, they would have to work it out some way."
brazil_lacerda.41.a: "The price of compromise is that each ideal is cut in half."

brazil_lacerda.42.t: "To Prove One's Worth"
brazil_lacerda.42.desc: "Hélio Beltrão stepped decisively out of his car into the Planalto Palace with a renewed sense of authority. Today, the Palace of the Plateau, even shrouded in its silence short of humming cars, once more felt too regal. Inside the entrance hallway, he noticed how civil servants and advisors came in fours behind ministers, and made a mental note to halve that, at the very least divert one away to more pressing matters. Or maybe he would need to get rid of that one entirely.\n\nHe heard each finely-shined shoe firmly hit the polished flooring and considered the construction materials they used here. They were too obsessed with marble and metal; under him the Ministry of Finance shall learn how concrete would do. He silently bemoaned the irony of a presidency in a palace, the inflated pride these airy corridors encouraged, infringing upon the rest of the city. He shuddered to think about the electricity costs.\n\nWith his inflation numbers and growth reports in hand, he immediately started formulating a list of experts to get on top of each agenda, those he trusted, those who in recent weeks had already proven their worth. Nothing less should be expected of the highest posts in the land.\n\nAs he entered his office, a portrait of Eduardo Gomes warningly peered at him from the hallway. As they approached the economic question, he remembered how the Brigadier attempted to march upon it. But he left office with high inflation, slow growth, and a movement with direction. Noble, but unsure. If he wanted to keep this job, he had better have a direction fast, or it would be his portrait that would hang there next."
brazil_lacerda.42.a: "With great power, comes the responsibility to not screw it up."

brazil_lacerda.43.t: "Building Guanabara"
brazil_lacerda.43.desc: "The truck horn blared as Marcia jumped out of the way of the vehicle, her heart pounding after realizing that she was nearly run over when she had absent-mindedly crossed the road that she crossed every day on her way home to the small house that she had managed to scrimp and save to buy herself.\n\nThe driver shouted obscenities at the young woman, but the large American Ford flatbed truck, loaded high with lumber and plywood, rumbled by before she could respond. The street was full of such large beasts now, turning most of Rio de Janeiro's already small and crowded streets into barely moving quagmires of people, carts, and equipment.\n\nAbove her, tall cranes that pierced the heavens slowly swung massive steel beams into place for new skyscrapers, while old favelas have been demolished to make way for new suburbs. Wide new avenues were being snaked through the city to ease congestion, and new schools, hospitals and parks were being planned. The rhythmic bang, bang, bang of hammers could be heard all day, and only slightly lessened when night fell. Newly erected billboards all over the city promised a "new future for Guanabara'' and other similar slogans. And frankly, they were right.\n\nMarcia didn't know what to make of it. She was no fan of President Lacerda when he was the Governor, nor did she support his successor Magalhães either.\n\nHowever, she couldn't deny the results: half of her walk to work was now on a freshly paved boulevard. The school that her cousins were at was being rebuilt and modernized. A survey crew was just through the neighborhood the other day planning water and sewage pipes. Running water! A luxury for only the richest of the rich, but soon perhaps coming to her own house.\n\nMaybe Lacerda wasn't that bad after all?"
brazil_lacerda.43.a: "A ray of hope over Rio."

brazil_lacerda.44.t: "Marching Forward, Swords Drawn"
brazil_lacerda.44.desc: ""Gentlemen, all the numbers, charts and figures you could ever want are before you." There was a general murmur of assent and approval from the cabinet, all of whom were perusing through the report in front of them. "Nearly half of all ministries have quantifiable, inexcusable bloat costing this nation millions in expenses. Millions more are lost by outdated regulations stifling economic growth. Trim the fat and cut the chains, gentlemen: that will be the motto for our new budget."\n\nOnly one man seemed unconvinced. Távora let the report fall from his hands; the clatter of paper on wood caught the cabinet's attention. "This is all very well formatted, Mr. President, but is this the right approach?"\n\n"Are you doubting the data, Mr. Távora?"\n\n"Doubting your economists, perhaps. Learned as they may be, I suspect most of them slept through their public relations courses." He paused for a moment to let some chuckles erupt, but the rest of the cabinet was silent. "You are proposing sweeping cuts to our national budget which may, on paper, reduce our deficit. What I worry the average Brazilian might see, however, is a government withdrawing employment opportunities at a time when they need it the most."\n\n"Government jobs from a bloated budget are vectors for graft and corruption, not stable nor plentiful employment. Have you seen some of the bills for construction work in Brasília?"\n\n"Yes, and I have seen where that money goes, Mr. President. Few people will approve of a government they believe is taking away the opportunity for stable paychecks."\n\nBut Lacerda shook his head. "Perhaps it will be unpopular. Perhaps there will be great opposition to these plans. Perhaps they'll even try to shoot me in the street."
brazil_lacerda.44.a: ""But I believe in doing the right thing, Mr. Távora, not the easy thing.""

brazil_lacerda.45.t: "Changing Horses In Midstream"
brazil_lacerda.45.desc: ""Gentlemen," said Lacerda, waving a hand over the cabinet table, "you'll find in front of you folders containing the draft of our newest bill. You may open them now." Some opened them without complaint, others rolled their eyes at the needless secrecy; all of them skimmed through the executive summary, handily narrated by the President. "In short, our focus is to reduce the deficit that has plagued this country for so long. A central bank, freed from the red tape that has held other initiatives back, is but a first step towards- Mr. Beltrão, is something the matter?"\n\nBeltrão did not bother to stop shaking his head. "This plan," he said, holding up the bill, "does not go nearly far enough. I thought we had agreed to trim the fat and cut the chains."\n\n"We are taking reasonable actions." Before Lacerda could speak, Távora stepped in. "The President is committed to plans which are reasonable and achievable, not your austere-"\n\n"Thank you, Mr. Távora, but I'm quite capable of speaking about my own plans." Frustrated eyes told Távora of a more heated meeting in their future; then they snapped back to Beltrão. "I am aware of what we spoke of last time. I've since assessed the situation, consulted others and determined that this new course of action is the best course of action."\n\n"A half-measure?"\n\n"A first step towards a more rational economy." He turned his gaze back to his copy of the bill, pushing his glasses up. "Gentlemen, we have some details to discuss. If you'll turn to page sixty-two-"\n\n"This is not what we agreed to," snapped Beltrão. Lacerda's eyebrows rose over the frame of his glasses."
brazil_lacerda.45.a: ""You want to trim the fat? I say we need more muscle first.""

brazil_lacerda.46.t: "A Phone Call from a Friend"
brazil_lacerda.46.desc: ""Governor, the President is on the phone," the secretary said to Raphael de Almeida Magalhães, Governor of the State of Guanabara, and the de-facto mayor of Rio de Janeiro. He sighed, picking up the receiver. Raphael and Carlos Lacerda went back a long way, as both friends and political allies, and usually their conversations were pleasant. But today, he knew it would be anything but.\n\n"Greetings Carlos. Thank you for returning my call so soon. Hopefully we can-"\n\n"Raphael, no," Lacerda said, cutting him off. "I'm not downscaling any part of the rebuilding of Guanabara. No corners will be cut."\n\n"But Carlos, so many of these buildings are unnecessary, and expensive! All these schools, libraries, and parks... And do we really need this many roads? There will never be enough car owners in Rio to justify it. It's like what the Germans did to Berlin after the war. And look where that got them!"\n\n"Look at the big picture, Raphael," Carlos interceded. "We are planning not just for the Guanabara of today, but that of tomorrow. Someday the whole country will be rich and prosperous. We must push forward, and make Rio and Guanabara the model of the future, no matter the cost. Anyway, I'm sorry, but I must go. I do wish we had more time to chat, but I'm opening a hospital up here in Maranhão, and I only had a few minutes before the ceremony. I miss our daily visits, I really do. Adeus!"\n\nMagalhães was left holding a dead line. He shook his head, knowing that there was no convincing Lacerda now that his mind was made up. This was going to be Germania, version 2, he just knew it."
brazil_lacerda.46.a: "Sometimes the white elephants can't be contained."

brazil_lacerda.47.t: "A Phone Call from a Friend"
brazil_lacerda.47.desc: ""Governor, the President is on the phone," the secretary said to Raphael de Almeida Magalhães, Governor of the State of Guanabara, and the de-facto mayor of Rio de Janeiro. He sighed, picking up the receiver. Raphael and Carlos Lacerda went back a long ways, as both friends and political allies, and usually their conversations were pleasant. But today, he knew it would be anything but.\n\n"Greetings Carlos. Thank you for returning my call so soon. Hopefully we can-"\n\n"Raphael," the voice on the line interjected. "You don't need to convince me any further. The project is already ballooning in scale and cost, and, well... Brazil can't afford it."\n\nMagalhães couldn't believe his ears. Lacerda was listening to reason? Normally once his mind was made up, there was no changing it at all. "Carlos, I'm glad to hear that. I know you have grand plans, but we must work up to it. We can't build it all at once, like the Germans do."\n\n"Yes, yes. Anyway, I'm sorry, but I must go. I do wish we had more time to chat, but I'm opening a hospital up here in Maranhão, and I only had a few minutes before the ceremony. I miss our daily visits, I really do. Adeus!"\n\nThe line went dead in Magalhães' hand, and he slowly placed the receiver. It was a shame that their once friendly relationship had started to fray due to the pressures of politics and government, but there was little that could be done there. But, at least Magalhães was able to ensure that Lacerda's legacy wouldn't be smeared by the grandiose building project that they originally were planning."
brazil_lacerda.47.a: "Avoiding a white elephant is easier than you think."

brazil_lacerda.48.t: "Comrades and Critics"
brazil_lacerda.48.desc: ""...Mr. Beltrão, we have, of course, got to talk about the economy today as well." The older finance minister nodded with an inquisitive frown. He was not used to interviews, even less with an audience bearing down on him, but suddenly, the UDN's planning was doing its magic. "This country is suffering from continued economic pressure carried over from previous administrations. What is your government doing to change that?"\n\n"Well, I'm glad you asked. Indeed, we do have the scourge of inflation and the huge deficit inherited from our predecessors, who have done nothing but hold down our savings. But that is why the President has this week introduced a bill to free our market by slashing the bureaucracy limiting our potential." The statement elicited a chain reaction of applause amongst the exuberant audience, filling the minister with confidence. "It is now the National Congress' responsibility to see to it that our plans relieve taxes and the people, and thus minimize inflation and maximize growth."\n\n"And do you think the bill will pass?"\n\n"Well, I think if the Congress represents the nation, then it will pass. And I, like any Brazilian, would hope it does, and thus my hope says it will."\n\n"Minister of Finance, thank you for coming on," said the journalist, and with just one "Cut!" it was all over. He walked off the set, meandering through the offices of Rede Globo, and he was startled by a brigade of impassioned protesters outside the studio, raising placards behind the windows. Amongst the faces he detected that of Leonel Brizola, that damned rabble-rouser, loudspeaker in hand, beginning to attract an audience. Beltrão went to find someone who knew about another exit."
brazil_lacerda.48.a: "Not everyone can be a friend, I suppose."

brazil_lacerda.49.t: "Forwards, Onwards, and Upwards"
brazil_lacerda.49.desc: "The final votes had been cast, and all procedural motions had been taken care of. It was official, the cornerstone of Lacerda's economic plan was a reality, awaiting only a signature from the President. Beltrão's smile widened as he saw the incipient signer, the man of the hour. He stepped forward and extended his hand for a firm shake.\n\n"Mr. President," Beltrão didn't need to say anything else. The achievement stood on its own. The free market law was just the toolbox Brazil needed - dynamite to destroy the big obstacles, a shovel to remove the remains, and a flensing knife to trim the bloat. Lacerda had always known that Brazil was full of potential, held back by the rent-seekers Vargas had empowered to build his political empire.\n\nLacerda pulled out a bottle he had chosen for the occasion. He had feared it would remain in the bottom drawer of his desk, a reminder of his failure. Instead, he grabbed a tool of his own, a thin corkscrew. As he screwed it into the bottle, he knew he was releasing the pressure, breaking down the barrier to taste the sweet reward inside.\n\nThe champagne cork popped with enough pressure to hit the ceiling. Lacerda turned to fill two flutes before raising both glasses. He still had much to do, but at least for one night he could smile broadly.\n\n"So what's next for the President?" Beltrão held his flute to his mouth, miming a microphone.\n\n"Nothing much," Lacerda chuckled, "just dismantling Petrobras, fixing Sudene, you know, nothing serious." The two glasses clinked, bubbles rising to the surface."
brazil_lacerda.49.a: "For a moment, Lacerda could feel the wind in his hair and the sun on his face."

brazil_lacerda.50.t: "The Quiet Part, Spoken Out Loud"
brazil_lacerda.50.desc: "The President was not feeling very presidential. He swung through every doorway on the way to his office, his mind dull with wrath, sensing his body beginning to sweat, his nerves twitching with discomfort, his heart beating like soldiers' boots. He felt he had to walk, had to sit still, he couldn't decide how to sate his wrath.\n\n"Your evening brief, Mr. President," came Esther's neutral, but today shrill, voice. He marched up to her, yanked the file out of her hand and slammed it onto the table. Not right fucking now, he thought. Apparently, as if she had heard him, or maybe he was muttering it, the door closed with a thud.\n\nNo, it was one, call it what it was. A disaster. A total, unbridled, un-fucking-limited disaster. He had anticipated victory. Every person he had talked to that day told him the bill would pass, that Kubitschek's red tape republic would cut its strings, but it burned up, leaving his free market economy smoldering on the floors of Congress.\n\nWas it Hélio? Hélio, whose one job was to say his lines on television and talk up the entire town? No, he bet it was those damn "Bossa Nova" types who thought they were too clever to vote with their own party. The Varguists who whispered lies into everyone's ear and shot down Brazil's only path to salvation, the saboteurs... Oh, they would all pay.\n\nMaybe they could still pick it up. Maybe all they needed was the Labor Bill, maybe he would recover if he just pulled it through on loosening something. But no, someone had to foot the bill for this. His fingers itched."
brazil_lacerda.50.a: "Esther kept her ear to the door, thinking about the mess she would have to clean in the morning."

brazil_lacerda.51.t: "Another Day at the Hotel Miramar"
brazil_lacerda.51.desc: "The Hotel Miramar was popular this time of year. American tourists flocked to see the stunning beaches of the Venezuelan Riviera. For some men, however, business and pleasure were intertwined as three men, red from spending too much time in the sun, sat under an umbrella at the front of a hotel restaurant. The ocean breeze and the clink of ice in expertly mixed cocktails punctuated their conversation.\n\n"This place never gets old," one said with a sigh.\n\n"It does get a little boring year after year, always Venezuela," replied another.\n\n"It's not like we can go visit Europe."\n\n"I've been paying attention to other places near here. Have you heard of Brazil lately?"\n\nThe two pulled their chairs closer together.\n\n"That new President, that Lacerda guy, he's been passing new laws to get the economy going. He's a real stand-up guy, deregulated the economy and all that. If you're looking for a new place to invest, I'd say Brazil is more than worth a shot these days, who knows, maybe we'll be having this same conversation down there in a few years. I was actually thinking about starting a hotel down there, something like this. Less likely for things to get old if we have two different places to go between."\n\nThe two nodded, making a note to ask their brokers the next time they got to a phone, imagining the possibilities and also a nice new hotel by the sea to spend their days in."
brazil_lacerda.51.a: "There's always somewhere else to invest."

brazil_lacerda.52.t: "The Hero Returning Home"
brazil_lacerda.52.desc: "As the UDN representatives trickled into the meeting room, they each gave a slight nod to President Lacerda. An unspoken salute to the valiant warrior coming home from his conquests. Távora did not appear ill at ease at all. Lacerda wondered if he made a true believer out of him, or if Távora was simply acknowledging the reality of what Lacerda had accomplished. Not that Távora's opinion mattered.\n\nLacerda remained seated as each man entered, save one. When Beltrão arrived, Lacerda stood to greet him at the door. "Ah, and here he is, the man of the hour. Senhor Beltrão." Lacerda shook Beltrão's hand warmly, his smile reaching from ear to ear. "Your guidance was impeccable; I sincerely could not have done it without you."\n\nFor a second, Lacerda imagined what Vargas would think if he were alive to see his legacy dismantled piece by rotten piece. Vargas had left behind a mighty monster that bloated itself like a tick on a hardworking, honest Brazilian public. Now, the UDN had taken up the sword of capitalism, cut the beast in two, patched the wounds, and bestowed upon the people the beast's mighty hoard.\n\n"Think about what we've achieved." Lacerda looked around at the assembled UDN politicians and staffers. "In just one presidential term, Brazil's people now have the ability to forge their own future. The people can thrive within the market, not languish for the enrichment of government-selected bureaucrats. We have freed Brazil once and for all from the shackles of Vargas's corruption. While we will never cease working for Brazil, one grave mistake of the past has finally been righted.""
brazil_lacerda.52.a: "The UDN cheered for their hero and their country."

brazil_lacerda.53.t: "Lacerda's Blessing"
brazil_lacerda.53.desc: "Amidst the cheering and the laughing of the airbase canteen, Vicente strode past the unusually long line, taking the food he convinced a junior officer to get for him. In his left arm, a tray stuffed with feijoada and rice all for himself. In his right, everything he knew Alessandro would want: a more modest serving of moqueca with rice, complemented by a generous helping of farofa. Placing the trays on the table, Vicente watched Alessandro as he prayed to God for his meals, before sprinkling his food with the farinha.\n\n"Thank the Lord for Lacerda too while you're at it," Vicente said with a grin. However, he seemed to hesitate to touch his own meal.\n\nAlessandro smirked, "Who's to say I wasn't praying to Lacerda himself?" His grin glowed underneath the dim fluorescent lights, backlit by the sunset behind him; Vicente learned to relish that sight after a long day of exercises. It made what he was about to say so much harder.\n\n"You know, with all this new funding for the air force, they're ramping up operations. Bigger missions." Vicente paused, perhaps just to make sure Alessandro heard what he said, so he wouldn't have to repeat it. "In fact, they tapped me for something major."\n\n"Woah!" Alessandro said, the spoon midway to his mouth. "That's great. Will you be-"\n\n"I'm leaving, Alessandro. Probably very soon."\n\nPeople continued to chatter around them, about the newly resurfaced runways, the fresh paint on the aircraft hangars, the modernized training equipment, and rumors of a state-of-the-art radar system.\n\n"Ah, I see.""
brazil_lacerda.53.a: "Suddenly, the food wasn't so appetizing."

brazil_lacerda.54.t: "Plotting a New Course"
brazil_lacerda.54.desc: ""Gentlemen, thank you for coming," said Carlos Lacerda as the top generals and admirals of the Brazilian military entered the conference room of the Ministry of Defense. Next to him sat his Minister of War, Golbery do Couto e Silva, jotting down some notes on a pad of paper.\n\n"You all know very well that part of my campaign was to modernize our nation's military, and that begins today." Lacerda asked an aide to pass out some documents to the flag officers around the table.\n\n"Over the next few months, I would like all of you to submit your recommendations to Minister Silva here on how to improve the military, especially in terms of what weapons we can consider purchasing from the OFN. The government has already made contact with several American defense contractors, and they have expressed a willingness to work with us in the future."\n\n"I would also be open to hearing about new ideas and innovations that our armed forces can use to establish Brazil as the preeminent military force on the continent," Golbery said. "The era of mass armies that we saw in the world wars is coming to an end, and we should move with the times with new doctrines and tactics."\n\nThere were a few nods around the table, though General Augusto de Albuquerque Lima, a friend of Lacerda's, remained stone-faced at the remark. The President knew that Lima was an old-school hardliner, opposed to Golbery's "Sorbonne" faction of reformists, and more hesitant to align himself with the US and the OFN. But that didn't mean he wasn't a loyal soldier of Brazil. And hopefully his friendship with both men could prevent a major crisis."
brazil_lacerda.54.a: "For the Defense of Brazil!"

brazil_lacerda.55.t: "Brazilian Fire"
brazil_lacerda.55.desc: "Golbery do Couto e Silva leaned forward to see better out of the window of the helicopter that was flying over the edges of the Amazon Rainforest. Or rather, what was left of it. A long line of smoldering, eviscerated trees, stripped of their green foliage and replaced with black ash with the occasional lick of orange flames showed the true scale of the damage that napalm could do.\n\n"That is rather impressive," General Augusto de Albuquerque Lima, sitting next to the Minister of War said into the headset over his ears so that Silva could hear him, "It would have taken days, if not weeks, to clear that even with machines, and the infantry would have taken heavy casualties to clear it themselves. But one pass with an airplane, and the forest is gone, the enemy is exposed, and we can take away their cover. This would make flushing out enemies in the jungles of Africa a breeze!"\n\nGolbery turned to the general. "That may be so, but there are reports of rebels further to the north. I'm afraid that we might be using this much closer to home."\n\n"That may be so," General Lima said. "But at least we have the tools to make it much easier to combat.""
brazil_lacerda.55.a: "The fires of war, now on demand."

brazil_lacerda.555.t: "The Best Defense..."
brazil_lacerda.555.desc: "General Lima looked over the maps of the border between Argentina and Brazil, as he had many times before. Every meandering river, every village and city, every elevation change, everything that would be important to anyone going through these parts, civilian or military. These maps in particular also included features that were unavailable to the general public: bunkers, potential mine fields, staging points and army supply depots, all marked down to allow men like him to plan for any possibility.\n\nThe newest maps showed the string of early warning radars that was being proposed by the current government and Minister Silva on how best to alert the military to incursions by the potential enemy. After all, São Paulo and Rio de Janeiro were just a short distance from the border when you are in a jet powered aircraft, so it was reasonable that some warning was necessary.\n\nHowever, what would be the use of knowing if the enemy was targeting you if you had nothing to respond with? All these new and expensive radars are all well and good, but where are the jet fighters to shoot down the enemy? Or better yet, bombers and strike aircraft that could potentially launch a first strike and decapitate any threat before it materializes?\n\nGeneral Lima could only scowl at the defensive, closed-minded, and expensive proposals of his political superiors."
brazil_lacerda.555.a: "Strike first, or not at all."

brazil_lacerda.56.t: "Training in Panama"
brazil_lacerda.56.desc: "Alessandro and his crew arrived at Fort Sherman aboard an American Caribou jet to the rising Panama sun. Being flown in rather than flying himself inflated his self-esteem considerably. Earthy red, orange-brown roofs of palladian houses stood against newer cubic concrete complexes in stark white paint, and a scattering of equatorial trees peeping above the urban community. As they walked through the slits between buildings, Alessandro realized even the soldiers lived like kings in America.\n\nThe barracks itself was mellow that morning. Troops fresh off sentry duty spoke abruptly with a distinct drawl foreign to the abashed pilot. Radio operators with headphones wiring sophisticated sets of technology could be seen from the other end of the station, sending signals within seconds to the mainland thousands of miles away. Meanwhile, an ice cream parlor with neon signs and deep strawberry-colored tiling seemed to blend into the headquarters, able to accommodate homesick servicemen in such dissimilar territory.\n\nThis whole exercise was surely a good bout of training itself- in culture shock. Either way, they sure knew how to make an impression, the Americans. Or maybe this was just another day on the job, which worried Alessandro in thinking about just how far ahead they were. He remembered the measly half a plate of moqueca he ate together with Vicente back in Brazil every day, how it paled in comparison, a fly-eaten carcass compared to the artisan meal on display, in Panama no less. Vargas' tight-fistedness had definitely taken its toll even on the military..."
brazil_lacerda.56.a: "...but surely Lacerda is here to fix it."

brazil_lacerda.57.t: "Enemy Unknown"
brazil_lacerda.57.desc: "Locals were talking about strange things in the sky over the Amazon: strange lights, the ability to remain stationary, easily shifting altitude up and down, able to turn on a dime. No human made aircraft could do such feats! It could only be an OVNI, an "objeto voador não identificado."\n\nAt first Vicente Alencar dismissed the stories as simply local gossip. But with the number of reports of OVNI's increasing, even the gungho pilot was starting to question if maybe there was something otherworldly happening.\n\nAs dark clouds and fog closed in on Vicente's F-80C Shooting Star during an air patrol mission, the normally cocky and self-assured pilot was feeling increasingly jumpy and nervous as his visibility was reduced. Soon anything he could see through the blinding fog could be a threat, a danger... an OVNI.\n\nThe fog lifted a bit ahead of Vicente, and he could see a large oval object, with two white lights on it, approaching fast. His heart stopped for just a brief moment, but almost instinctively pressed the trigger, and a stream of .50 caliber bullets from his six Browning machine guns raced forward, almost striking the OVNI. Just as quickly as it appeared it was gone. Vicente radioed back to base about what had just happened.\n\nWhen Vicente's F-80 landed, still jubilant at having potentially saved the nation from an extraterrestrial threat, he was excited to see his colonel standing there. He climbed down, and only then he saw the scowl on the colonel's face, and the MPs beside him.\n\n"Lieutenant Alencar, you nearly shot down a civilian helicopter.""
brazil_lacerda.57.a: ""You are in a lot of fucking trouble.""

brazil_lacerda.58.t: "A Flying Taxi"
brazil_lacerda.58.desc: "The twin turboprops spun up as the brand new Embraer EMB-110 Bandeirante reached the runway and positioned itself for take off. With clearance from the tower, the airplane ran down the runway before lifting up into the sky, sluggishly, slowly.\n\nAt least, to Vicente it was like flying a brick compared to the jet powered Shooting Star he was used to flying: when the maximum speed of this airliner was a bit over 400 kilometers an hour compared to the nearly 600 for the fighter, and even then it was "economical" to fly at 340, it felt like walking next to a racecar.\n\nThe fact he was still flying at all should have been a blessing. The whole "shooting-down-a-helicopter-thinking-it-was-an-alien-spacecraft" debacle, and the months of investigations, the trials, and more should have been the end of his military career. Just that now he was banned from fighter aircraft for at least a few years, and would have to resign himself to flying transport planes. Not only that, but he was technically the "second" pilot now, with a higher ranking pilot taking the command position. That really rankled him.\n\nNot to mention a restructuring of the Air Force currently underway, with a cutback on the number of combat aircraft, and a focus on support roles meant that he might have been moved to this role anyway in time. It almost made Vicente contemplate leaving the military. He joined to fly fighter jets to protect Brazil from their enemies, not haul cargo to mining camps in the Amazon.\n\nOf course, if he left, there was no chance to fly fighter planes. And what airline would hire him to fly people in a big fancy jetliner if they found out about what happened? Not to mention how boring that would be."
brazil_lacerda.58.a: "Vicente sighed, and settled in for the flight."

brazil_lacerda.59.t: "A Guinea Pig"
brazil_lacerda.59.desc: "Vicente found himself sitting in an uncomfortable chair in another nondescript room at a simple wooden table, similar to the last dozen or so, since his... incident with the helicopter. It turns out that the Air Force isn't too pleased with one of their own shooting down a civilian aircraft and killing several people on the mistaken assumption that it was an alien spacecraft. The investigation had been going on for months, and it was becoming clear to Vicente that his days of flying might be almost at an end. That is, if he wasn't going to end up in jail for manslaughter.\n\nThe door opened, and two men, one in an Air Force uniform, the other in a suit, walked in. The man in the suit sat at the table across from, the uniformed men stood right behind him. "Greetings, Lieutenant Alencar," the man in the suit said. "I'm from Embraer, and I have a proposition for you." He reached into a suitcase and pulled out some papers, before sliding them across the table to Vicente. "We are currently working on a new aeronautical project for the Air Force, a Brazilian designed and built ground attack aircraft, and we are looking for test pilots."\n\nVicente picked up the paper. Embraer EMB-312 "Tucano." That was a rather silly name for what looked to be a decent little aircraft, at least stats wise. While its 458 kmh top speed couldn't compete with nearly 600 for the jet powered Shooting Star he was flying before, the guns, rockets and bombs promised to make it a small, yet heavily armed combat plane. Sure, it might not be dogfighting, but flying this would still be a service to the nation. And maybe even fun.\n\n"I will not deny that it will be dangerous. Test piloting always is," the man from Embraer continued. "But if you perform satisfactorily, we can make your current troubles disappear." The air force officer nodded. "All you have to do is sign.""
brazil_lacerda.59.a: "Vicente didn't even hesitate."

brazil_lacerda.60.t: "Mutually Assured Divide"
brazil_lacerda.60.desc: "Do Couto e Silva and Albuquerque Lima's meeting was not going well. The two men knew each other's factional loyalties intimately well, which reduced any pauses between reading sentences on the recent nuclear development report to staccato jabs at each other. As do Couto e Silva got to the end of his sentence, the Hardliner Lima's neck muscles flexed with impatience.\n\n"...which has all led to the rate of infrastructure construction halving in the previous quarter." "Come on Albo, quit looking so testy. I'm sick of it from people like you. Here we have tried and tested technology which will catapult us into the leagues of Japan and America, and then we have ancient Luddites like you who tear any glimmer of progress to shreds!" Do Couto e Silva's annoyance now turned into vociferation. "We should spend a fraction of that overhead today, not need to spend trillions twenty years ahead on millions of pairs of boots that will, let's be honest, never walk into combat!"\n\nLima's frown remained steely. "At this rate, they will, and on our own soil," he muttered. Even he didn't know whether or not that was a threat. He took a sharp intake of breath. "The army is the backbone of the state. At times, it is the state. It is the mediator, the guarantor of stability, the vanguard against chaos. It is all we have. Continuing this pipe dream isn't just impractical, it's absurd. Do you think you will get rid of the rats and radicals on our streets with shiny rockets? If you go ahead with your spending surge today, you can count any sensible tolerance of your administration out of the equation." On that note, he rose up from his chair and faced the door\n\n"And that will also happen if you call me Albo again.""
brazil_lacerda.60.a: "The stockpile remains empty, for now."

brazil_lacerda.61.t: "The Nuclear Option"
brazil_lacerda.61.desc: "Juracy Magalhães, Brazil's man in Washington, had many appointments in the capital of the free world, as it liked to be known. The ambassador was inclined to agree with the judgment: what was good for the United States was good for Brazil, his trademark adage whenever he felt a camera bearing down on him. Across the table from him was Henry Kissinger, the famed gear in the machine of American foreign policy that remained fixed as the other parts were replaced.\n\n"Mr. Ambassador," articulated Kissinger in his discernibly Bavarian intonation, "it seems we are in the good fortune of agreeing on many points, which I unfortunately never have with my own staff." Magalhães chuckled lightly. "The whole world is catching a cold, as Metternich imagined, German and Japanese incursions in Colombia and the rest of South America risk making this condition terminal. But I hope Brazil, like imperial Russia in 1848, can be the vanguard of South American order against this mutiny."\n\n"We could not be any closer in our aspirations, Mr. Kissinger. Though to ensure this position is possible, we have considered it wise to plan a... last resort." The ambassador swallowed the last syllable, hoping the light piano chords and clinking silverware masked his implication.\n\n"Yes, I understand that position entirely," muttered Kissinger gravely, unsuccessfully feigning surprise. "A last resort is a good option when there are no acceptable options left. I will continue to do all I can to get a good word into the correct ears." Magalhães considered the worlds of instability, backlash, competition, and mortality his agreement solidified. But within a minute, those thoughts were gone."
brazil_lacerda.61.a: "So, how are you finding the city?"

brazil_lacerda.62.t: "Visit"
brazil_lacerda.62.desc: "Carlos Lacerda sat alone in the quiet elegance of Camp David, his dark eyes fixed on the fireplace, where embers glowed faintly in the early evening chill. The crackling of the wood was the only sound in the room, save for the rhythmic ticking of a clock. The air was thick with unspoken words, a weight that pressed down on him. The future of Brazil hung in the balance.\n\nHe adjusted the glasses. His gaze flickered over the meticulously arranged documents spread out before him. The arguments were there, in black and white, but he knew this meeting would require more than just facts and figures. It demanded a convincing force of will, a powerful articulation of Brazil's needs. He needed to make them understand. He needed results.\n\nA window was partially open, and a soft breeze carried the scent of pine and damp earth. He glanced outside, the trees a green wall, offering no solace. His thoughts were a whirlwind: the tension gripping South America, the rise of hostile regimes, the whispers of fascist infiltration - it all demanded a response. And that response, as far as Lacerda was concerned, required more than conventional forces. Nuclear weapons weren't merely a deterrent; they were a statement, a shield for the free world.\n\nHe took a deep breath, trying to center himself. The door clicked open, and the sounds of approaching footsteps broke the silence. The United States Secretary of State entered the room followed by a small entourage of presidential advisors. Their faces were composed, betraying nothing of what they truly thought."
brazil_lacerda.62.a: "The negotiation was about to begin."

brazil_lacerda.63.t: "Return to Base"
brazil_lacerda.63.desc: "Vicente stood at the side of the runway as Alessandro was landing back in familiar territory. He'd never tell him to his face that he missed him, since it had the risk of starting a chain reaction of egomania in that inexperienced mind of his, but that was the truth.\n\n"Howdy, Vim!" Alessandro's voice could barely be heard above the thunderous hammering of the engine. His grin was as wide and gaudy as an American jeep, clearly bringing back souvenirs. "Long time no see!"\n\nThe comment disarmed Vim, staring into the clouds and away from his visitor. "I suppose so."\n\nAfter putting off his new assignment as a "part-time job" to save face, he conducted a tour for this lost traveler, as both explored the new airbase. New American equipment seemed to have traveled back with Alessandro, as the seal of the army seemed to become ubiquitous on wooden crates strewn across the supply depot. Khaki green armored cars roamed slowly through freshly-paved ring roads and newly-furnished checkpoints. Stations were manned by unsmiling veterans whose grimaces were unchanged by the new look, and personnel filed efficiently out from the canteen, but if you stopped, you could still detect the same waft of feijoada sifting through the slits of the door.\n\n"Looks like the prayers to Lacerda have been answered, don't you think?" chirped Alessandro, with a distasteful air of superiority. "I'm not standing in the same place I was a couple of months ago."\n\n"Well, I'm not surprised you think that," replied Vicente with a smirk. He thought about it, looked back up to the panorama of moving vehicles and busy officials, then took a deep, capitulatory breath. "But maybe you're right."
brazil_lacerda.63.a: "A dispute settled?"

brazil_lacerda.64.t: "Call of Duty"
brazil_lacerda.64.desc: ""My fellow Brazilians, tonight I speak to you about a matter of grave importance, a challenge that calls upon the strength and resolve of our nation. As you know, a war rages in West Africa, a battleground where the forces of freedom and oppression clash. The Free French, under the resolute leadership of General de Gaulle, stand as a beacon of resistance against tyranny, fighting against the insidious spread of the Pan-African Liberation Front, a movement clearly backed by forces hostile to our values and our way of life.\n\nThis is not simply a distant squabble. The conflict in West Africa is, make no mistake, a matter of national security for Brazil. The expansionist ambitions of the PALF, fueled by foreign powers, pose a direct threat to the stability of the South Atlantic. We cannot stand idly by while our allies face this aggression!\n\nTherefore, I have authorized the intervention of our forces. This is not a step we take lightly, but a necessary action to protect our national interests and safeguard the future of Brazil. Our brave soldiers will deploy to assist the French in their struggle, bringing with them the strength and courage of the Brazilian people.\n\nMoreover, this commitment strengthens our ties with the United States and the French Republic, nations united with us in the pursuit of liberty and democracy. As Brazil integrates further into the Organization of Free Nations, we demonstrate that we are prepared to play a leading role on the global stage!\n\nLet us stand together, united in purpose and spirit, and show the world that Brazil will always answer the call of duty. Our commitment is absolute, our resolve is unbreakable!""
brazil_lacerda.64.a: "Francisca stared at the TV screen in bewilderment."

brazil_lacerda.65.t: "A Matter of Priorities"
brazil_lacerda.65.desc: "The heavy oak door of the Presidential office slammed shut, the sound echoing in the suddenly silent room. Ambassador Gordon barely flinched. He watched as Lacerda paced back and forth, his hands clasped tightly behind his back.\n\n"Mr. Ambassador," Lacerda began, his voice tight with controlled anger, "I must be blunt. I have been... reconsidering... the situation regarding troop commitment to West Africa."\n\nGordon raised an eyebrow slightly, a gesture that didn't escape Lacerda's notice. "Mr. President," he replied calmly, "I understood from our previous discussions that Brazil was committed to increasing its contribution."\n\nLacerda stopped his pacing abruptly, turning to face the ambassador. "You must understand that I am fighting a war on multiple fronts. Not only with foreign threats, but with internal ones too. The communists! They are like rats in the walls of our nation, always plotting, always undermining, and I swear they are all in cahoots with Varguists, waiting for any chance to plunge Brazil back into the abyss. And they are in my government, Mr. Ambassador, inside the very halls of power."\n\nGordon listened patiently, carefully observing Lacerda's outburst. "Mr. President, I understand that you face challenges on the home front," he said, his tone soothing, "but the situation in West Africa requires a unified effort."\n\nLacerda waved his hand dismissively. "Rest assured, Mr. Ambassador, I have not abandoned my commitment to Free France, just like we haven't abandoned the OFN. While Brazil will maintain its current level of economical support, I simply cannot increase military aid right now. My hands are tied."\n\n"I understand, Mr. President," Gordon replied, though his expression remained neutral, hiding his true feelings. "I am sure we can find a mutually agreeable solution.""
brazil_lacerda.65.a: ""I hope so, Mr. Ambassador. I truly do.""

brazil_lacerda.66.t: "A Quandary of Generals"
brazil_lacerda.66.desc: "The cabinet room was stuffy, with Lacerda presiding over Golbery do Couto e Silva, Minister of War, and several generals with their staffs. Several of the old men fidgeted, waiting for their President to speak and get it over with. Another civilian was here as Commander-in-Chief, telling them how to do their jobs, which the hardliners feared, and even some of the more progressive generals just wanted to get back to work.\n\n"Welcome gentlemen, thank you for your service as always. I'm sure you're anxious to get started." Lacerda said with a smile. "I am sorry to have kept you waiting. Of course, I trust each and every one of you with the defense of our nation, and I apologize for taking you away from your important work of protecting and serving this country.\n\n"Today I want to talk about the Hemispheric Defense Doctrine, which, we all know, is America's approach to limiting the spread of fascism and keeping our half of the globe safe. It is in our best interests to learn from our American colleagues. Our situation is similar to theirs; we too are surrounded on all sides by Germany and Japan. But the Hemispheric Defense Doctrine is more relevant to us than it is to the Americans. It supports Argentina, the greatest threat to our territorial integrity, and Paraguay. We must ensure their defeat."\n\nThere was some noise in the room, sounds of recognition and agreement. The commander of the Third Motorized Infantry Brigade cleared his throat. Lacerda paused and nodded to the general.\n\n"Thank you for seeing us, Mr. President. Thank you for your continued support. We here recognize the threat from all sides, and provided you adequately fund us and continue to support us, it is well within our strategic capability to ensure our defense.""
brazil_lacerda.66.a: "Yet another productive meeting."

brazil_lacerda.67.t: "On the Frosted Frontiers of Freedom"
brazil_lacerda.67.desc: "Every day it seemed like there was another incident at the edge of the Ferraz Antarctic station. The Germans and Argentinians were getting closer and closer with each passing week.\n\nWhile the supply lines from home were still open, the supplies they brought often came too little, too late. Clothing was always warm enough to prevent injury, but not warm enough to stay warm, and weapons were always a bit behind those issued to the regular army.\n\nAs Lacerda drew closer to Washington, the reception of the Germans and Argentinians became frostier than anyone imagined. The commander was always worried, always thinking. What if they made an attempt on the base itself? What if they sabotaged a generator?\n\nWhen the Almirante Câmara came to shore, he expected the same supplies as always. The sailors began to unload the cargo to find warm fur coats. The latest rifles from the army, even a little booze for comfort. As it was brought ashore, cheers rang out from the shore.\n\nAs the last crates were unloaded, a single letter was hidden inside. It was from their President, Carlos Lacerda:\n\n"Here's to you, brave soldiers and sailors, defending the frontier of freedom against fascists, defending our way of life under the most extreme conditions. Let it be known this President recognizes your struggle and knows that all Brazilians thank you for your service.""
brazil_lacerda.67.a: "Keep the booze coming, it's cold enough already."

brazil_lacerda.68.t: "New Orders"
brazil_lacerda.68.desc: "The door opened to the barracks, and the soldiers inside hastily rose to stand at attention when they saw Captain Alves walk in, clutching a piece of paper in his hand.\n\n"At ease," he said, giving a casual salute to his men before looking away from the poker game going on in the far corner. The soldiers relaxed a little more. Alves wasn't your average Brazilian officer. He actually seemed to care about the men under his command.\n\n"What have you got for us today, Captain?" a grizzled sergeant asked as he was reassembling his gun, a cigarette clamped between his teeth. "You don't usually make a social call on us poor ground pounders."\n\nCaptain Alves gave a small chuckle. "Aww, and I thought you guys were looking forward to my barbeque on the weekend." the rest of the soldiers in the barracks laughed. "But I'm here to tell you that new orders just came in. We are going to the South Pacific in a week's time. So better start packing and getting ready."\n\nA few soldiers cheered, most were shocked. Even the sergeant paused at the news. "What now? Where in the Pacific? It's a pretty big place."\n\n"We are going to be working with our OFN partners by helping to garrison a few islands north of Australia, basically to tell Japan to stay the hell out. And I'm sure there will be some lovely senhoritas for you boys to get to see."\n\n"Well as long as it's not Africa, I'm for it," the sergeant said, returning back to reassembling his gun. But that sure is a long way to go.""
brazil_lacerda.68.a: ""But orders are orders.""

brazil_lacerda.69.t: "Falling Into Line"
brazil_lacerda.69.desc: "Lacerda watched the TV in his office. It was one of the new color TVs, imported directly from America. Which only made it easier to see himself on the screen.\n\n"Today the Lacerda Administration made an announcement saying that the Brazilian government would officially recognize what he called "crimes against humanity" undertaken by both the German Reich and the Japanese Empire in the past twenty years," the off screen newsreader said, as Lacerda's recorded image talked silently behind a podium."\n\nNow Lacerda from a few hours ago spoke over the TV. "The senseless cruelty undertaken by Germany and Japan in their conquered territories, the slavery and rapine in Eastern Europe, and the oppression of the South Pacific, cannot, and will not, be ignored in the eyes of history."\n\nLacerda gave a small smile. While he purposefully avoided declaring the war between Japan and China as one of those crimes, it sure wouldn't make Tokyo happy. And he already knew that Leitão da Cunha was going to have both the German and Japanese ambassadors barging down his doors today. But that's what a Foreign Minister was for.\n\nLacerda couldn't help but laugh. All they really could do was bluster and rage, but everything that he said in the conference, outlining the murders and torture... the whole massacre of the Jews in Europe especially, was all true. All the evidence was there. He didn't tell a single lie."
brazil_lacerda.69.a: "And Brazil would be on the right side of history."

brazil_lacerda.70.t: "Our American President, Carlos Lacerda"
brazil_lacerda.70.desc: "On Lacerda's desk today lay a copy of Diários Associados, his staff had circled the front page column from Samuel Wainer, titled 'Our American President, Carlos Lacerda.' The President started to read in earnest as Wainer characterized his presidency as being only in service of American and not Brazilian interests. From closer relations with the OFN which brought with it the specter of sending Brazilians to die in another foreign war for a second time, to his economic policies. Opening the door for American businessmen to exploit hardworking ordinary Brazilians. The President, spurred to action, reached for his phone. On the other end he was connected to his foreign minister Vasco de Cunha who was still getting out of bed. He hurried to a meeting with his uncharacteristically nervous President.\n\n"Carlos, I don't know why you summoned me today. Our policies have only made Brazil safer. We don't have to worry about any sabre rattling from the Argentinians with Washington right behind us. This is all just alarmist, no it's Varguist muck, exactly what he dealt with in the election campaign." The foreign minister said, wanting to go back and nap.\n\n"We need to say something, I can't have the voters thinking that I'm just some American puppet. We need to do something to capture the media narrative. Everything we've done to make Brazil safer will be for nothing if we get voted out. Wait, we just need to show them that our policies have made Brazil safer, we need actions to drown out Varguist drivel. If we worked with the OFN and showed that their power backing us up only made Brazil safer then we could diffuse this media narrative."\n\n"That is an excellent idea, I will contact my OFN counterparts shortly." The two stayed behind to talk about the details, all with de Cunha wishing for his nice warm bed."
brazil_lacerda.70.a: "Perhaps a wargame will do the trick."

brazil_lacerda.71.t: "A Nuclear Proposal"
brazil_lacerda.71.desc: ""I am most honored, Mr. President, that you've taken the time to visit our embassy." Ambassador Lincoln Gordon poured himself a drink. "Care for a taste of my home?"\n\n"No, thank you, Mr. Ambassador." Carlos Lacerda, President of Brazil, held a hand out, palm raised up. "My time is already limited, so I'd like to skip the pleasantries."\n\n"Fair enough." Gordon took a seat, set the whiskey on his desk. "So, Mr. President, what can the United States of America do for you?"\n\nLacerda folded his arms, sat back in his chair. "Some months ago, we talked briefly about the potential of expanded defence support."\n\n"Arms trades, licensing deals, training programs. I recall."\n\n"Those, yes, of course, but I meant something more substantial." He paused, unfolded his arms and leaned in with conspiracy in his eyes. "I'd like to discuss American support for Brazil's nuclear program."\n\nGordon blinked. Had he been drinking, he surely would have choked. "Well, ah, I could certainly run it by the relevant people back home. But, Mr. President, I can't guarantee success here-"\n\n"Please," said Lacerda, "do whatever is in your power, but we cannot delay this any longer. Argentina's own program grows daily. We need to ensure they do not secure nuclear material first."\n\nOne of Lacerda's bodyguards cut the meeting short; it ran beyond his appointed time. They bade each order farewell, and Lacerda left through the underground parking lot, leaving a nervous Gordon to dive for the phone and report on this request."
brazil_lacerda.71.a: "A minute later, POTUS was on the phone, asking for details."
brazil_lacerda.71.b: "An aide told Gordon that he trusted his judgement here."

brazil_lacerda.72.t: "An Outstretched Hand"
brazil_lacerda.72.desc: "Ever since the meeting in the embassy, when he quietly petitioned American support for a Brazilian nuclear arms program, a quiet anticipation had consumed Lacerda. In cabinet meetings, in public appearances, in military briefings, his thoughts briefly but persistently turned to his request. He wondered how far along their talks were. He wondered if they would say yes.\n\nOne afternoon, during an uneventful day of signing and reading reports, his secretary poked her head into the office. "Mr. President, Ambassador Gordon is on Line One."\n\nLacerda nodded politely, and once his secretary was out of the room he dove for the phone. "Mr. Ambassador, good afternoon! Good news, I hope?"\n\n"Mr. President, good afternoon. I've been authorized by the President of the United States of America to conduct negotiations on his behalf."\n\nLacerda briefly clamped his hand over the receiver to let out a small, joyous outburst. He regained his composure immediately, returning the phone to his face. "That is wonderful news, Mr. Ambassador. I really think we could do a lot of good here-"\n\n"One moment. I'm calling you directly to advise that this will be the last time we discuss this outside of a formal meeting. I appreciate that we've worked together rather cordially, but I represent the interests of the United States of America, not Brazil. I trust you understand that I can offer no special consideration based on whatever dealings we've had in the past."\n\n"Of course, Mr. Ambassador." But in his head, Lacerda felt like he won already. Gordon's curt tone eluded him. He was at the table, ready to receive American support, elated at his diplomatic acumen."
brazil_lacerda.72.a: "Little by little, he set himself up for heartbreak."

brazil_lacerda.73.t: "Northern Assent"
brazil_lacerda.73.desc: "For the past fifteen minutes, Lincoln Gordon and Carlos Lacerda sat in their respective offices, radios turned to foreign news broadcasting American senate proceedings. The former was a nervous wreck, pacing around his empty office, hearing every dissenting vote as another tile being removed below his feet. The latter was cautiously optimistic, hearing every assenting vote as another brick laid on the path towards victory.\n\nBut aside from a handful of Nos at the beginning, this nervous state lasted only a few minutes. The Ayes had it handily; the speaker banged the gavel, and sealed American support for Brazil's nuclear program. Upon hearing this news, a cheer went out in Lacerda's office. Someone broke out a celebratory bottle, and poured its contents out into glass flutes. Lacerda, for his part, fell back into his chair with a smile. Optimism wrapped around him like a warm blanket.\n\nMeanwhile, Lincoln Gordon slumped on his office couch like a deflated balloon. Anxiety drained out of him until there was nothing but a calming numbness. There, his reputation was secure. He has done his part. He was jolted out of his fugue state by the sound of his phone ringing. Sluggishly, he rose and paced towards his desk, picking up the phone and leaning in towards it. "Good morning, Ambassador Gordon."\n\n"Ambassador, it's Lacerda!" Beneath his words was a joyous static. "I just wanted to thank you for your support in delivering this outcome. I just spoke with your President, and I can assure you, Ambassador, I conveyed my deepest thanks for your professionalism in these proceedings."\n\nGordon rounded the desk, sat down. "Well, uh, thank you, Mr. President." In truth, he felt like he hadn't done a thing for Lacerda himself—he had acted, as he always did, in the United States' best interests. But he wasn't going to turn down a compliment."
brazil_lacerda.73.a: "The secrets of the atom shall be revealed to Brazil."
brazil_lacerda.73.b: "Like Prometheus, we grant fire to Brazil."

brazil_lacerda.74.t: "Southern Approval"
brazil_lacerda.74.desc: "Lacerda tapped a pen on the edge of his desk with an unbroken, steady cadence. He asked to be alone from his advisors for this moment; they were not sure whether this was a sign of confidence or uncertainty, but they respected his wishes. It was just him and a speaker connected to the Senate's chambers, broadcasting the proceedings of its latest vote.\n\nThe first ayes were expected, predictable. Lacerda's men, UDN senators, were almost universally supportive of the plan. Even the PSP lined up to voice their support. He smiled; even Adhemar's lot saw its necessity. Every tap on the table was a new vote, a new source of support lining up behind him.\n\nThere were dissenting votes, of course. The PTB seldom missed an opportunity to oppose him; why would a little thing like national security stop them? There were a few bleeding hearts that put a nay forward, even in his own party. In familiar shorthand, he scribbled down their names. Then the drum beat continued.\n\nBut dissenters were few and far between. The ayes had it; Brazil formally agreed to enter into the nuclear age alongside the other United States. In the other room he heard cheering. Lacerda got up, opened the door to the adjoining meeting room and joined in the celebrations. A piece of cork from a bottle of sparkling wine flew into the air. Beneath the reverie he felt the steady beating of his heart."
brazil_lacerda.74.a: "Lacerda's heart soared into the atmosphere."
brazil_lacerda.74.b: "They accept our gift with glee."

brazil_lacerda.75.t: "Northern Dissent"
brazil_lacerda.75.desc: "He tried to figure out why. He had been assured it was all fine; of course the folks back home would support them. He knew these people, what they wanted, how they thought. "Argentina's a big problem, Mr. President," he said. "It's in America's best interest to support Brazil down here." And he had agreed! So why were they doing this?\n\nLincoln Gordon sat alone in his office, grateful that he had no aides to send away once the vote turned. The ayes that began this vote were smothered by a sudden avalanche of dissent. But how sudden was it, really? Gordon scoffed to himself as he poured something stiff. He could read the Times and the Post every day, he could have his daily catch-ups and weekly meetings, he could hold court with visiting congressmen and businessmen, but it had been a long time since he had visited America. Out here, was there something he missed?\n\nThe phone rang. It had not been ringing since the vote, but his secretary had fended off most callers during this important time. VIPs only. That left only two candidates, and he knew that was not POTUS on the other end of the line. Sighing, he picked it up.\n\n"Ambassador Gordon," said Carlos Lacerda. "What is going on?"\n\n"President Lacerda, good morning." He cursed himself in his head; the response was too quick, too disconnected. "I can understand your frustration, but-"\n\n"I thought we had an understanding!" Gordon pulled the receiver away, surprised by the shrillness in his voice. "Or was that all a lie? Have you been stringing me along this entire time?"\n\n"Mr. President, please listen to yourself. Look, I-"\n\n"Forget it! God damn it all. I thought you Americans kept your fucking promises. No matter, no matter."
brazil_lacerda.75.a: ""We're doing this, with or without you.""

brazil_lacerda.76.t: "Southern Disapproval"
brazil_lacerda.76.desc: "In the middle of a Senate meeting room, surrounded by aides and with a single overhead fan cycling smoke-filled air around them, Carlos Lacerda stood in shock. A closed-circuit radio broadcast the proceedings inside the senate itself, where the fate of Brazil's treaty with the United States of America was being decided. He once thought it was guaranteed, but now as he heard the dissent filtering through the radio's speakers, he felt the ground falling out from under him.\n\n"Take down their names," Lacerda hissed to a nearby aide. "Take down their fucking names. I want everyone who's crossed me." He was already one step ahead: he had a pencil in hand and scribbled down every name that voiced dissent. Lacerda turned, blinked away the fog in and around his head, and made his way to the window. He opened it to allow fresh air to enter, but it did not clear his head any more. It continued to rage and roar. Lacerda watched the bustle in Brasília outside: cars driving past, people walking by, all unaware of what was taking place here.\n\n"Mr. President," said an aide entering in from the northern door, "it's Ambassador Gordon. He's returning your call."\n\nLacerda's fist balled up. "Good, fine. I'll take it in the office." He slammed the door on his way out and rushed towards the telephone, snatching it from its cradle. "Ambassador. I- I am so sorry about this-"\n\n"Mr. Lacerda," said Lincoln Gordon, "I just got off the phone with the President. He would like to know what has happened, and what you plan to do about this."\n\nHe told Gordon that he had the situation under control. Heads were going to roll in the UDN after this catastrophe. But as Lacerda spoke, he could feel the ground shifting under him. He had to leap to safety somewhere, or he and his career would be destroyed."
brazil_lacerda.76.a: "So he dove headfirst in the dark, and took his precious program with him."
brazil_lacerda.76.b: "And he could only find safety in abandoning these shifting floors."

brazil_lacerda.77.t: "Over the Hills and Far Away"
brazil_lacerda.77.desc: "The sun was setting in the distance, the hazy orange beams shining through the ornate glass of the ballroom. Inside, a few men mingled - they were early, the main event not due to start for another hour, so staff dashed around preparing. An honorary ball for the men who had gone to Britain during the War.\n\nAs Lacerda entered, the ballroom lights switched on, casting away the prior twilight and accentuating the decorated walls. It was fitting that such a fine ballroom was chosen, he reflected.\n\n"Lacerda! I did not expect you so early," a voice called from the small commune of people, "come and meet these men." Lacerda recognized the man instantly; Mascarenhas de Morais, leader of the wartime British expedition.\n\nLacerda strode over. De Morais was easily the oldest of the group, and yet somehow seemed to retain his youth in his posture. His face expressed a spirit that even some of Lacerda's younger colleagues lacked. Around him were men all clad in the uniform of the expedition, proud and well kept. Their brotherhood was self-evident. As he reached the group, he quickly shook De Morais' hand. "It is a pleasure to have you here tonight."\n\n"Likewise, but don't bother with a bore like me. Nestor here was just telling us a tale of when he caught some Germans with their pants down near London. Frankly, the story makes me laugh my pants off too!" Polite laughter followed the joke attempt.\n\n"It is an amusing story," came a voice from the group Lacerda recognized, but was shocked to hear. Out of the throng, Former President Henrique Teixeira Lott stepped forward, offering his hand. "Pleasure to see you," he said. He had come.\n\nLacerda accepted the handshake, but whispered. "Not tonight.""
brazil_lacerda.77.a: ""Not tonight," Lott concurred."

brazil_lacerda.78.t: "Against the Bull"
brazil_lacerda.78.desc: ""ADHEMAR - THE BIGGEST CORRUPTION SCANDAL IN THE HISTORY OF SÃO PAULO," read the newspaper on the President's desk. Lacerda, Távora, and his ministers were preparing a way to take the Bull down.\n\n"This is the moment we've been waiting for. Never in our history has such a scandal been discovered, Adhemar is rotten to the core and we can make sure he never faces the public again," said the President, knowing it was now or never. "Every newspaper will report this. No one will be left in the dark about Adhemar's crimes."\n\n"We'll make sure Brazil knows, we'll create a commission to investigate his crimes, and we will broadcast on Voz do Brasil. Everyone will know about what he did! We'll also arrest his cronies, make sure this never happens again." Lacerda said, sipping his water.\n\nTávora was uncertain, maybe Lacerda was going a bit overboard on this offensive. "Are you sure? You realize this is a declaration of war, right? The PSP won't go down without a fight. And what about the moderates? They'll think we're going too far and side with Adhemar."\n\nLacerda thought for a moment. "I know," he said, "but I believe that removing Adhemar's threat to Brazil justifies some political turbulence. It's better for us to make sure he never has the ability to ruin this nation." The Crow left the room, ready to strike."
brazil_lacerda.78.a: "A crow strikes in broad daylight."
BRA_lacerda_vs_adhemar_tooltip: "The corruption of Adhemarism must be exposed, no matter the political cost. Success will depend on our actions to tackle corruption, move quick."

brazil_lacerda.79.t: "The Flock Descends"
brazil_lacerda.79.desc: ""Shred it. Shred all of it. Nothing can remain."\n\nAdhemar paced restlessly across his office, his Chief of Staff Laudo Natel holding an entire folder of files in his hands. There was no other way. If anyone else had slithered their way to power then Adhemar would have had a much easier time comparatively - but Carlos Lacerda despised him. He despised Adhemar, the PSP, and everything they stood for, and he was making that abundantly clear.\n\n"All of it? All of it?!" Laudo asked, visibly stressed. "That will only incriminate us further! With how far they're looking into party finances and activities, we'll be sitting ducks!"\n\nA strange tightness made itself known in Adhemar's chest. He ran his hands through his hair, the irritation building within him. If only Lacerda had never been elected - if he were President, then life would be so much better. "Yes, all of it," he said, examining every dossier on the shelves for any hint of anything incriminating. "We can explain away the gaps as an administrative error. Fire someone." A good scapegoat always worked well in situations like these. "And while you're at it, get the papers to run stories against Lacerda. Mobilize all of São Paulo if you have to. If he wants a fight, we'll give him a fight."\n\nLaudo nodded, throwing the entire folder he was holding into the shredder. The whirring noise it made punctuated the tense atmosphere. "And what of the... emergency vacation spots?" He asked. Adhemar gulped. If the worst came to the worst, he had many places he could run to to escape the Crow's wrath, but he would rather avoid that if possible."
brazil_lacerda.79.a: ""I've survived one exile. I can easily survive another.""

brazil_lacerda.80.t: "Snivels and Snakes"
brazil_lacerda.80.desc: "It was another quiet day at the São Paulo municipal courthouse when the police arrived for Edgar.\n\nHe had been transcribing court records for around the past hour and a half, occasionally pausing to take a sip from his coffee. What with the recent anti-corruption campaigns, the courthouse had been jam-packed with new offenders ready to be sentenced, and he was the one in charge of noting it all down. It wasn't as if he minded the extra hours, frankly; his son's college fees were practically turning money to ash in his pocket, and as much as he wanted to support him, there was no magic money tree.\n\nEdgar's ruminations were interrupted by a pair of gruff-looking police officers swinging open the doors and marching over to his desk. He only caught a glimpse of them before being forced face down onto his desk, his glasses breaking. "Hey! Wh-what did I do? Officers!" he yelled, pain surging through his face. One of the officers handcuffed him as the other began ransacking his filling cabinets.\n\n"Edgar Moreira, you are under arrest for twelve recorded counts of taking bribes for political gain and corruption. Do not resist, otherwise we will have reason to use greater force upon you."\n\nHis mind was blank. Corruption? Bribery? He was a glorified clerk for God's sake. He barely had any money to begin with - taking a little extra to grease the wheels for some paperwork was simply how this city ran. Virtually anyone with even the slightest PSP connection would be guilty by that logic. He thrashed against the officer, flailing impotently as he felt a sharp stab of pain in his knees. "Backup needed, suspect is resisting arrest!" the officer cried."
brazil_lacerda.80.a: "Edgar would spend the next two weeks in hospital and the next four months in prison."

brazil_lacerda.81.t: "One Last Card Left to Play"
brazil_lacerda.81.desc: "He had been told, time and again, that Adhemar's fall would be any day now. Every arrest, they said, was a step closer to revealing his true nature. Every seizure, they said, was another link in the chain they were building between him and his crimes. They said a great deal of things, but they were wrong. He could hear his voice over the radio, shrieking about this despotic regime targeting a man without providing proof of his wrongdoing. Adhemar's voice would be all over the country, proclaiming his innocence.\n\nLacerda shut off the radio. He was getting nowhere. No matter how many people they arrested, Adhemar seemed untouchable. He was always just outside the more incriminating meetings, always three steps removed from shady business deals and backroom favours. So many threads hung from the PSP, but pull on as many as you like, and Adhemar was tied to none of them.\n\nHe threw himself back into his chair and tried to clear his mind. Breathe in. Breathe out. Attack the problem from a different angle. Why not go after him directly? Lacerda knew he was dirty. He'd felt the scum on his skin whenever protocol demanded they shake hands. Why tug at the limbs, when he could just go straight for the heart? It was a gamble, to be sure, but if the safe bets were going nowhere...\n\n"Goddamnit," Lacerda muttered, and snatched the phone from its cradle. He dialled a number he promised he wouldn't call at this time of day.\n\nThe phone rang, startling the two people in bed. Raphael Magalhães poked his head from under the sheets, looking at his partner. If the church found out about that he was still seeing her... The phone kept ringing. A nervous hand shot out of the sheets, picked up the receiver and slid it back under the covers like the head of a turtle. "Uh, hello?"\n\n"Raphael? It's Carlos. Don't ask how I know you're there, just listen."
brazil_lacerda.81.a: ""Tomorrow morning, you and the Chief of Police, my office. I want the PSP offices in Guanabara turned upside down. This is our last chance.""

brazil_lacerda.82.t: "The Bull, Tamed"
brazil_lacerda.82.desc: "Thump.\n\n"-we can't possibly shred all of it, the damn machine is nearly full-"\n\nThump.\n\n"-all of it. They didn't get some of the documents, but we need to leave nothing behind-"\n\nThump.\n\n"-okay? Adhemar!"\n\nAdhemar snapped out of his trance, his chest feeling like it was about to burst. Laudo had been speaking to him. How long had he been spaced out? Ever since the raid, life had been like some surreal nightmare, and Adhemar prayed that he would soon wake up. Lacerda had finally got him, this time. The raid had produced all the evidence he would need to throw Adhemar - and the entire PSP - in jail, and he didn't know whether he could squirm his way out of it this time.\n\nLaudo was still speaking, but none of it registered. He caught the words 'shred' and 'incriminate', but the rest of them fell away into the void. All he could hear was the thumping of his heart and the weight of years growing heavier by the second. The Adhemar of yesterday would have stayed and fought this. But the Adhemar of today could not"
brazil_lacerda.82.a: "Iberia seems nice, this time of year."
BRA_adhemar_flees_tooltip: "The Bull of São Paulo has been forced to flee to the safety of Iberia, a tremendous victory for the Crow."

brazil_lacerda.83.t: "Dom Quixote"
brazil_lacerda.83.desc: "It was hard for Lacerda to hide himself, and his pride, sky-high in the bustling Pinheiros café. He looked out of the window, overlooking the Tietê River, controlling its motion, watching it bend. São Paulo now followed his whim. But apparently Vice President Távora was hellbent on ruining that feeling.\n\n"We have probably not done the right thing here, Mr. President." There he goes again. "Let's go over it again. So in some strange undisclosed way, the local police somehow knew these Paulista politicians were part of some huge conspiracy back in Brasília, and brought in riot police to detain half the offices' workforce right in the middle of the city?" Now the gloves came off.\n\n"Are you seriously saying this right here, right now? Virgílio, contain yourself," snapped the President. "We were having a perfectly good conversation beforehand, there's no need to upset it like thi-"\n\n"Mr. President, this is serious. Not only does it look suspicious, but taking out Adhemar and his connections out of São Paulo is like sawing the legs off of a table. Aren't you worried the same criticisms we level onto the PSP and the Varguists will find their way back to us?"\n\n"...Virgílio, these people are crazy. They want to buy Brazil and keep it for themselves, we have to ensure they know no kind of corruption is safe or acceptable. You can't give them the benefit of the doubt, you can't let them win!" He sputtered with rage and thumped the table, turning the café's attention squarely onto him.\n\nThe twisted headlines in "O Estado de São Paulo" and Adhemar's cruelty, the contempt of his Paulista cronies for him, for his government, rushed through his head. They were amoral, they had no standards, they were out to get him. He was doing the right thing."
brazil_lacerda.83.a: "But all that earned him was an ocean of concerned frowns."

brazil_lacerda.84.t: "Dance of Disorder"
brazil_lacerda.84.desc: "The São Paulo office workers sat impotently under the searing sun, looking onto hanging portraits of their smiling prophet captioned "Adhemar de Barros". Some of them were going through notes, filing sheets into folders. Others were stretching, tangling telephone cords in deep conversation. You could almost forget this exact PSP office was currently embroiled in one of the worst corruption scandals in the Republic's history.\n\nThen, at eleven o'clock, the first policemen were peering through the windows. They demanded to make an inspection, to check over some papers. Then they came through the backdoors, then through normally-locked roof doors, then through shattered and smashed window panes. Some were in uniforms emblazoned with stark federal yellow lettering, and some simply touted their local department badges. The workers shook and tiptoed around their own workplace as their entire year's worth of documents were reduced to piles of sheets, as warrants to search were flashed, as they realized nobody, not the inspectors nor themselves, knew what it was they were doing.\n\nThen the choreography swept into confusion. It had been two weeks of planning, and all for a scavenger hunt list of documents that didn't exist? All for looting a ravaged building with nothing left in it? Whatever any policeman asked for, no accountant, dialer or professional could verify, let alone give directions for where to find it. As they looked again upon the scenes of bedlam on every floor, every witness alike realized that, like the sheets of paper strewn across the ground, the answers were lost in a campaign that itself did not know what it was."
brazil_lacerda.84.a: "A movement, when successful, becomes more powerful than it can know."

brazil_lacerda.85.t: "Waterloo"
brazil_lacerda.85.desc: ""Thank you, Esther." Lacerda arranged the two pieces of paper side by side, his head in his hands.\n\n"EGG ON THEIR FACE - Sampa Falls Out Of Crow's Clutches," screamed "Última Hora". Oh, Wainer, that snide bastard. "After a long and drawn-out witch-hunt coordinated by the Planalto Palace, the assault on São Paulo has turned into retreat. The Department of Federal Police announced this morning that it would suspend the inquiry into what it calls "grievous cases of corruption, embezzlement, and assault on Brazilian institutions".\n\n"After months of random raids, confused trials, and fruitless investigations, Paulistas can rest easy knowing the purge of their city is over, before remembering that Carlos Lacerda is still the President of the nation."\n\nAnd it seemed to get worse- a single-paragraph telegram sent anonymously sat defiantly on the other side of the desk.\n\n"Dear Mr. President,\nI must thank you humbly and deeply for the wonderful publicity you have provided our cause in the past few weeks. I know this is not the outcome you were expecting, but as a loyal and concerned citizen, I simply hope you catch whoever is truly threatening our great nation next time.\n-ADB"\n\nLacerda checked there was nobody hiding behind the window before launching his deskside bin into the air. The cheek of it all. The image of their double-dealings and crooked smiles was seared into the back of his mind. And the PSP and Adhemar would keep doing it, keep getting away with their banditry. Corruption did not get the killing blow that Lacerda had promised: it was he buried his face into his arms and mourned."
brazil_lacerda.85.a: "It was all a waste of time."
BRA_lacerda_loses_fight_with_adhemar_tooltip: "Another frivolous battle, another major disaster. The UDN never changes."

brazil_lacerda.86.t: "Farewell to a Rival"
brazil_lacerda.86.desc: "His eyes fluttered open against the morning sun through the window. A bouquet of local carnations laid in a vase on the windowsill. His wife held his hand, and he could barely squeeze hers. He was so weak. The flight from Lourdes to here took what little strength he had left. Doctors and nurses circled around him, swapping out IV bags and updating charts. The radio was playing something he could not hear. Cool air blew through the window, rustling the curtains and drifting over his pallid face.\n\nIn a weak voice, he asked for morphine. His chest felt as if it was strained; his heart taut like a drum, and even its weak beating was laboured. A nurse slid a needle into his veins. He thought about his life. His ambitions, all unfulfilled. His wife kept holding his hand, but he could not feel it. He closed his eyes, and felt his body and the pain it bore quietly fade away, as if his mind were packing it all away.\n\nNews of Adhemar de Barros' death came to Brazil in a few hours; Lacerda found out only a few minutes before the rest of the nation. He was in a cabinet meeting at the time, when an aide whispered the report into his ear. He did not look shocked, but for a moment his face went blank, as if unable to fully process what he had heard. He closed his eyes, breathed in, breathed out and stood up.\n\n"Gentlemen," he said, packing away his briefcase, "I must cut our time short. Adhemar passed away in Iberia." Someone gasped, two more said "my God"; Lacerda merely left to make arrangements. A figure of national importance, no matter how crooked, deserved to be buried here; he signed a request with Iberia to repatriate the body. He approved a draft of muted condolences to the family; he knew there would be many more, all overflowing with grief. But that was all he permitted himself. Lacerda worked the rest of the day as if nothing happened."
brazil_lacerda.86.a: "It did not yet seem real to him."

brazil_lacerda.87.t: "The Bull Brought Low"
brazil_lacerda.87.desc: "It was early in the morning when Adhemar de Barros breathed his last.\n\nHe had been seriously ill for many weeks, the stresses of Lacerda's anti-corruption campaign having done nothing for his health. Though he claimed to be as fit as a fiddle, he was soon confined to his bed. In the end, he died surrounded by his family, with his chief of staff and close friend Laudo Natel reportedly waiting outside.\n\nImmediately, tributes poured in for the former governor of São Paulo. The man who stole, but delivered. Mayor Getúlio Vargas Jr. - the only man many believed could succeed him at the helm of the PSP - announced that he would be buried with full honors, as he felt such a titan of Brazilian politics deserved.\n\nAnd as these scenes of mourning played out across São Paulo - and indeed, across much of Brazil - Carlos Lacerda watched them on television and felt nothing but contempt. Varguists of a feather flock together, it seemed. Lacerda did not miss him at all. Adhemar was a clown in every sense of the word - a buffoon who robbed people blind and laughed in their faces. It was beyond his comprehension how so many came to love the man - let alone how many were willing to defend him when the anti-corruption campaign came knocking.\n\nBut Vargas Jr. and his friends were still going strong. Lacerda's head pounded as he contemplated the idea of the PSP - nay, all the corrupt Varguist parties - getting a boost in popularity out of sheer nostalgia for the man. Lacerda never got him in life, and he continued to haunt him in death."
brazil_lacerda.87.a: "It wasn't fair."

brazil_lacerda.88.t: "Closing the Deal"
brazil_lacerda.88.desc: "Lincoln Gordon stood on a balcony of the Palácio da Alvorada, a glass of scotch in his hand, his forearms leaning on the railing. He watched lights dance along the surface of the Lago Paranoá, cast by the homes on the other side of the lake. The water was a deep purple, painted by the sky above as the sun tucked itself into the horizon for the night.\n\n"Mr. Gordon!" called out a familiar voice. He turned and turned up his smile at President Carlos Lacerda, holding his own glass of something Gordon could not make out in the dark. He extended a swaying hand, and Gordon clasped it in his.\n\n"Mr. President," replied Gordon. "Congratulations. I've heard that the President's extremely happy with the outcome of these talks."\n\n"And the President's happy with you. We talked, and you came up in the conversation. All good, you understand." Lacerda took a swig of his glass. "So am I, for that matter. You know, this was the right thing to do. Protecting the greatest democracy Latin America's ever seen."\n\n"I just represented America's interests, nothing more." Gordon murmured, sipping at his scotch. "If nothing else, it will give Argentina some pause." That itself gave him pause; he took a longer sip. "I only hope it doesn't hasten their own nuclear program."\n\n"Oh, Buenos Aires will kick up a fuss. They always do. But let's be honest, they were half the reason we sought nuclear arms in the first place. If they weren't so damn uncooperative..." He trailed off, staring into his drink. "But that's a matter for tomorrow. Now, come on, I think I saw your wife talking with that awful gossip columnist at the bar. Trust me, you want to catch her before she goes on the record." Gordon and Lacerda walked back into the Palace, setting their drinks on a waiter's tray and picking up fresh, filled glasses."
brazil_lacerda.88.a: "The sun disappeared under the horizon, but all the lights in Brasília were on."

brazil_lacerda.89.t: "End of a New Beginning"
brazil_lacerda.89.desc: "Taking her shoes off, Chiyoko entered her family's cramped apartment in the periphery of São Paulo. The TV was on, and it talked endlessly about Lacerda's victory. Chiyoko shuddered at the mention of that name, she couldn't bear to listen to the man she thought would make their family a villain in the eyes of the people.\n\nHiroshige had already started eating his lunch but paused to greet her. He could notice a discernible frown in his sister's face, he knew her feelings about Lacerda and the way he talked about the Japanese people. "It's a shame he won," she said while putting rice on her plate. "Even Adhemar would be better than him."\n\nSitting down on the table, she heard Lacerda's voice on the TV, it was his victory speech and she couldn't listen to it. "Turn it off, please," she said. Hiroshige decided to turn down the volume, he didn't like the man either but he knew Lacerda didn't hate the Japanese.\n\n"Chiyoko, Lacerda winning is not going to make people hate us, he only hates the empire."\n\nSumitada came through the door while Hiroshige finished his sentence. "Are you two thinking that his election will be the worst thing that happened to our people?" He chuckled, he knew that this wasn't even close to what happened in the past. "Haven't you two learned about Shindō? Under Vargas we used to have people come and kill us because of this terrorist organization."\n\nHe paused, he knew what he had done during those times, he knew that he kept it a secret from his family, he knew he was responsible for the violence of those days. "Kids, Lacerda is not the worst thing that will happen to us, these things come in waves and the people will soon forget these comments.""
brazil_lacerda.89.a: "The Brazilian-Japanese cries alone."

brazil_lacerda.90.t: "Catcher of the Spies"
brazil_lacerda.90.desc: "Spies. Brazil is a hot spot for all types of them. Japanese and German especially, and today was the day they would stop appearing. Couto e Silva had been ordered by none other than the President himself to look for evidence of spy rings lurking around in the nation.\n\n"Couto, I must warn you of something before you go," said Lacerda right after giving the orders to the General. "Be careful, we don't want this operation blowing up to be something that the people can use against us."\n\nThe general understood, but questioned his motives. "Mr. President, if we are overly careful, we won't be able to catch the criminals! They might slip right through our fingers and continue hiding in plain sight."\n\n"Very well," said Lacerda.\n\n"Don't be overly careful, just make sure not to cause a fuss." The general left the room with plans to end spies around the nation."
brazil_lacerda.90.a: "Operation Rice has been authorized."

brazil_lacerda.91.t: "Politics and Police"
brazil_lacerda.91.desc: "Liberdade was an ironic name for the neighborhood Hiroshige lived in. He kept his mouth shut every day, no matter what he wanted to talk about, because if not, the police would go after him. There was no freedom in Liberdade.\n\nMasafumi was different. He spoke his mind. The police didn't scare him. And he was Hiroshige's best friend.\n\nWalking home one night, they forgot all about the police and talked politics\n\n'Fidel Castro, he's incredible!' said Masafumi. Hiroshige was apolitical; Masafumi was a socialist, and a visit to Cuba had only excited his politics. 'He's a second Vargas! If only we could change Brazil like he did Cuba.'\n\nBefore Hiroshige could reply, his worst fear came true. A policeman showed up, baton in hand and sneering. 'What are you people doing here?' he spat. 'Brazil isn't your homeland. We don't allow that socialist crap here. We won't allow people like you to change it.'\n\nHiroshige shook in fear. One word out of his mouth, he'd be beaten and arrested in an instant. But Masafumi wasn't afraid. 'Isn't it a constitutional right to speak our mind? Why would you arrest us for exercising our freedoms, officer?'\n\nThe policeman looked him in the eye and smirked. The hateful words that came out of his mouth shook them to their very core."
brazil_lacerda.91.a: ""You Japanese aren't Brazilians. You'll never get our freedom, because you don't deserve any.""

brazil_lacerda.92.t: "Weeding"
brazil_lacerda.92.desc: "Couto e Silva pushed up his glasses, staring rigid at the man that sat across from him, draped in the darkness of his office. The air was choking with the stench of tobacco. "General, I cannot understate the gravity of the situation." Red streaks were cast across the man's face by the light seeping between the closed blinds. "Have you heard of the name Shindō Renmei before?"\n\n"One or two things."\n\n"A terror organization in service of the Japanese Empire's will in Brazil. The story's that they disbanded during the war era." He slid a black folder across the table. "I have proof that says otherwise. A list of names of spies infesting our Japanese community."\n\nAnd Sérgio Fleury put a single finger on the folder. The new police chief of São Paulo, taking another drag of his cigarette. Couto e Silva now understood why he'd been insistent about meeting.\n\n"The Japanese have long put up pretenses, and some Brazilians, unfortunately, have believed them." He shook his head, smoke swirling around him. "But no matter how many generations, or where they live, you can't sever them from their insidious ways."\n\nBefore the general could respond, Fleury raised his hand. "But we can still do some weeding around the city. All I need is assistance." At this, Couto e Silva pondered. The President had advised caution, but clearly things were past such pleasantries.\n\n"So be it. Keep it quiet, but you'll have the resources and authorization to do anything necessary to extirpate the listed subversives.""
brazil_lacerda.92.a: "We'll weed them out, no matter how deep their roots, or how painful it is to detach them."

brazil_lacerda.93.t: "Dinner at Liberdade"
brazil_lacerda.93.desc: ""Dad, could you pass me the salt," said Chiyoko. It was an uneventful evening at the Taki household. Sumitada, with a smile on his face, gave the salt to his daughter. Dinner was a moment where they could forget the hardships of their lives and be themselves.\n\n"How was your day at school Koi-"\n\nA knock was heard, then two knocks. Sumitada went to the door to check who was there, he was halfway there when a man screamed and without any prior warning, there would be no door separating the Takis from the strangers outside anymore.\n\nThe door was bust open, chaos soon ensued. The man broke everything they laid their eyes upon, plates, the television, and more. They pepper sprayed Chiyoko and Hiroshige until they couldn't take it anymore. They took Sumitada and handcuffed him.\n\n"Sumitada Taki, you are under arrest for espionage for the Shindō Renmei."\n\nHiroshige couldn't believe it. His own father, arrested. He knew his father was a common man, an innocent man! But they still took him away. "Lacerda!" he thought. "That sick son of a bitch!" He previously thought that the President was merely against the empire, but he now had evidence that he hated them.\n\nHe watched as his father was taken away from him, with Chiyoko still crying from the effects of the spray. He didn't know how to feel. Angry? Confused? Depressed? He couldn't know, all he knew it had something to do with Lacerda, and he swore to himself."
brazil_lacerda.93.a: ""That idiot's gonna learn.""

brazil_lacerda.94.t: "Grounded"
brazil_lacerda.94.desc: ""Ladies and gentlemen, welcome to Flight 573, this is Captain Torres speaking, our flight from São Paulo to New York will begin shortly, please don't forget to fasten your seatbelts and have a safe flight." Jenny Marques looked out the window, preparing for another normal flight.\n\nTwo men entered the plane. One pulled out a gun, the other, a knife. Over the speaker they announced it to everyone: "This is a kidnapping, remain in your places and nobody's getting hurt." The pilot left the cockpit to announce the start of the flight only to be met by the barrel of Masafumi's gun. He didn't shoot, but made a demand.\n\n"This flight will remain grounded until we get everything we abandoned for this mission."\n\nJenny was in shock, the thought of her being kidnapped made her want to fight them but to what avail? To die in cold blood and her husband never see her again? She started screaming for help, praying that she would be alright.\n\nHiroshige looked at her crying and went to her seat. His knife was in full display. The woman quieted down, fearing the worst. "Don't worry miss, once my father is released from prison this should be all over."\n\n"Hiroshige! Stop talking!" Masafumi said as he aimed his gun at the pilot, making him secure everything in the plane. Masafumi took over the radio to make their demands to air traffic control.\n\n"This is Masafumi speaking, this flight is now under my command, if you attempt at any moment to invade this plane, we will make sure no soul is left to tell the story. We demand the release of Sumitada Taki from prison and demand an end to the excessive policing of Japanese neighbourhoods. Do I make myself clear?""
brazil_lacerda.94.a: ""Air Traffic Tower Hash 342, understood.""
BRA_lacerda_hyjacking: "The outcomes of this crisis will have unintended consequences..."

brazil_lacerda.95.t: "Crisis Meeting"
brazil_lacerda.95.desc: ""Explain."\n\nThe Chief of Police nervously looked at Couto e Silva, who looked concerned towards Távora, who looked worried at Lacerda, who waved an impatient hand. "Mr. President," he said, clearing his throat, "at 0212 today, Flight 573 from São Paulo to New York was hijacked by a group of Japanese radicals. They belong to the Shindō Renmei, a wartime-era terrorist organisation that," and here he paused, weighed down by what came next, "that we believe may have links to the Japanese Empire."\n\n"Christ," muttered Távora. "What do they want?"\n\n"They issued a list of demands two hours ago. To summarise, they want comprehensive reform to race relation policy, a plane to Cuba, and the release of several prisoners they claim are being held without trial."\n\n"Without trial?" Lacerda's mouth hung open. "No, that's ridiculous. We don't hold people without observing due process. This isn't the Reich!"\n\n"Whatever their claims," said Couto e Silva, sharing a concerned sideways glance with the Chief of Police, "we can't let this go for too long without a statement."\n\n"I know that, Silva. For God's sake, stick with operations and leave the politics to us." Lacerda rose from his seat, peered out through the window. A baying crowd of journalists surrounded the front of Alvorada. He saw himself out there, in five minutes, squinting against flash photography like the sun reflecting off shimmering water. But what would he say to them?"
brazil_lacerda.95.a: ""We cannot, and will not, bargain with terrorists for innocent lives.""
brazil_lacerda.95.b: ""Our first priority is to the safety of the hostages onboard.""

brazil_lacerda.96.t: "Crisis, Live and Direct"
brazil_lacerda.96.desc: "Lacerda sat calculating at the head of the table, his chin resting upon his hand. The cabinet was assembled in front of him, all facing him expectantly. He had expected to deal with many things whilst on the campaign trail, but dealing with plane hijackings came very low on that list.\n\nAnd yet the militant protests seemed to be in crescendo outside the palace. He could practically feel the glare of the television cameras through the windows of the Supreme Meeting Room. Normally he liked the attention, but today he couldn't stand it: he would sit lurched over the table, his eyes strained, his hands fidgeting, for the rest of the meeting. If only anyone else was in his place right now.\n\n"Here's my assessment, Mr. President," butted in the Minister of War. "They are terrorists. Terrorists do not respond to words, they respond to action and force. They have absolutely no reason to negotiate with us, and it will probably spiral out of control if we try. We must reassure the people, mobilize the military, and take out these bastards." Thunderous table drumming followed.\n\n"Minister, I have the utmost respect for you and for the Air Force," retorted Távora, "but that plan will only jeopardize the situation." The Minister of War angrily rolled his eyes as he kept speaking. "Who knows what they will do once we start attacking? You are recklessly putting our citizens' lives in danger, and we can only avoid that through dialogue and through negotiation."\n\nThe President puffed. "There's another angle to this. These are domestic threats, and those people," he said, now gesturing with his pen towards the protesting multitudes through the glass, "are going to remember how we act here. So are the terrorists, and the Japanese, and Congress, and so on. Golbery, I understand we must be strong, and I understand your concern, Virgílio, but this is about image as well. So with that in mind...""
brazil_lacerda.96.a: ""...we must act in the interests of our citizens, and open negotiations.""
brazil_lacerda.96.b: ""...we must conduct a raid, and we must keep our security measures covert.""
BRA_lacerda_hyjacking_negotiations: "We will enter into negotiations with these Shindō Renmei terrorists."
BRA_lacerda_hyjacking_force: "We do not negotiate with terrorists. Storm the plane."

brazil_lacerda.97.t: "The Crow on the Circus Tightrope"
brazil_lacerda.97.desc: ""I'm glad you have come around to see reason, Mr. President," remarked Távora, visibly relieved. "Now, the negotiations are indeed going to be difficult, but it is preferable to seeing the faces of our citizens plastered onto tomorrow's newspapers."\n\nLacerda nodded, ignoring the chill shooting down his spine as he considered the image. "Still, we must remain cautious. Should we give too much away, they'll be screaming about something else entirely." After all, he thought regretfully, reforming policy because a hijacker told him to do so stained the President's mind and his conscience.\n\n"Exactly, but it doesn't have to go that far. I am almost positive they would stand down just for the flight to Cuba and the prisoner release..." As he said this, the anxiety seeping into Lacerda's face became palpable.\n\n"...But I don't have high hopes for giving anything less than that, considering who we're dealing with. Of course, their secret detentions would become public and could open up a ghastly Pandora's box. However, if we create an independent commission to review the use of force on the prisoners, maybe some heads will roll, but we will have some plausible deniability. That's as much as we can do."\n\nLacerda shook his head, palpably stressed. "Virgílio, you saw how Golbery was behaving even at the thought of negotiations. An independent commission will go down like a rock from the sky with the military. Once they start investigating and knocking on doors, then that will turn into a crisis." Távora just pursed his lips and looked down at his notes. There was no easy way out of this one."
brazil_lacerda.97.a: ""We can afford the risk. Give them some limited concessions, but no committee.""
brazil_lacerda.97.b: ""Those hostages are still our citizens. Hedge no bets, give them their concessions and install the committee.""

brazil_lacerda.98.t: "A Lonely Street in São Paulo"
brazil_lacerda.98.desc: ""We were young. Careless." The war. Underground newspapers. Shootings, stabbings, threats sent to and fro. The memories flowed in the darkness of Sumitada's mind.\n\nThe truck hit a pothole on the road to a place Sumitada didn't know. He'd become used to not knowing anything except the aching of the bruises dotting his back and covering his ribs. He bit his lip and didn't cry out. Even with the hood covering his eyes, he knew one of the guards sat next to him. He could smell the alcohol, and felt the cold rifle digging into his arm.\n\n"It shouldn't have been like that," he'd said once, to a friend from the old days. "We hurt people. Nowadays things are calmer in Brazil." He had thought of Hiroshige and Chiyoko back then.\n\nWith a screech, the truck halted. Gloved hands seized his shoulders, and the hood slipped out. Before his eyes could adjust—a blur, as he fell headlong into the street. Boiling asphalt seared his skin. "Hope you learned your lesson, dumb bastard!" Fleury's thugs jeered, speeding around the corner.\n\nIndeed, Sumitada had learned. The detention center taught him more about Brazil than decades of freedom ever could. Of torture and mockery from animals in uniform. Pain staining memories, refracting them in a new light. He thought of that night with his friend, and of Chiyoko and Hiroshige. It was daytime now. Clear and searing.\n\nThey'd never get peace. Brazil hated them."
brazil_lacerda.98.a: "And Shindō Renmei should have never stopped fighting."

brazil_lacerda.99.t: "Release, Camera, Action"
brazil_lacerda.99.desc: "As the clock struck noon, the plane's door opened for the first time in days. The crowd outside was ecstatic, the crisis was finally over. On the ground, there were all kinds of people, from family members to the President himself.\n\n"Friends, today is a great day," Lacerda said, looking over at the crowd. "Because of a victory in the negotiations, all those trapped in this plane are free! Their friends and family are finally going to see them again."\n\nJenny left the plane and was greeted by the Crow himself, who said he was glad she had survived and wished her well. However, Jenny didn't feel comforted by his words, feeling that this was just another political stunt by the man at the expense of the hostages."
brazil_lacerda.99.a: "The nation breathed a sigh of relief."

brazil_lacerda.100.t: "Liftoff"
brazil_lacerda.100.desc: "As the final hostage was released, Hiroshige, Masafumi, and Sumitada remained on the plane. A single scream could be heard from the outside, it was Masafumi, demanding that the pilot start the plane. His orders were heard, and soon it started moving and after that, flying.\n\n"I wonder what Chiyoko is doing," said Sumitada, he was worried about his only daughter, she would be alone at such a young age and the atmosphere for the Japanese in Brazil was still tense. "I wonder what her mother would think of me for leaving her behind."\n\nHiroshige looked at his father, the look on his face was that of pain, he was blaming himself for abandoning her. "Dad, she'll be fine." As he said this the plane started experiencing turbulence, Sumitada, already in a state of shock for what had happened became unresponsive.\n\nThe pilot took to the interphone. "Please remain seated, we are about to land in Havana."\n\nAs the pilot said this, the reality of their situation started to set in. They had little to no money and resources to live a life in Cuba, all they could hope is that the government would help them, that the people of the island nation would help them. They could only hope.\n\nLanding in Havana, police were all around the airport. One policeman picked up a megaphone, "REMAIN INSIDE THE PLANE!" Their dreams of help had come crashing down. They were locked up once again."
brazil_lacerda.100.a: "Why fight for no freedom?"

brazil_lacerda.101.t: "In the Face of Terror"
brazil_lacerda.101.desc: "The room was filled to the brim, and the crowd of cameras, people, and microphones stretched toward the podium, behind which stood Lacerda. A smile crossed his face to give the cameras what they wanted. He always knew what they wanted. He took a deep breath before beginning.\n\n"My fellow citizens, today we reflect on the terror that is attacking our Republic. To protect against this terror, I have had to make sacrifices. But despite my best efforts in the pursuit of freedom and liberty, our security forces have acted in excess."\n\n"The perpetrators of these deplorable actions have been dealt with, and my resolve to not allow the terrorists to force us to surrender our own freedoms remains as strong as ever. Those unjustly detained by our security forces will be released immediately, and I have ensured that our security services will not engage in such excesses again."\n\n"We can understand that the mistakes they made were all made in an attempt to protect the Brazil that we all hold so dear. In the face of terror, it is understandable that good people may do bad things. But we do not forget the terrorists who provoked good men to lose sight, for a moment, of the freedoms we all hold so dear."\n\n"That there are terrorists who attack us requires good men to do difficult work. Until the terror is thoroughly dealt with, good men will continue to make impossible choices. They will make better choices than before, but as long as the threat remains, we will continue to force good men to make hard choices."\n\nAs his speech came to a close, the microphones surged forward and reached for his face. Trying to force words from his mouth. He gave them a smile and a wave before making his exit."
brazil_lacerda.101.a: "Let us hope that good men no longer need to make hard choices."

brazil_lacerda.102.t: "Planning the Plan"
brazil_lacerda.102.desc: ""Let me start off by praising your rationality, Mr. President," began the Minister for War. "I am glad we agree no terrorist should ever be sat at the negotiating table. Now, the military is, as much as it pains me to say, likely not to be united on this matter."\n\nLacerda looked at do Couto e Silva with a slight tinge of regret, having hoped the confrontational option would be a little more decided. "That's okay," he sighed. "So what are the more palatable options?"\n\n"So, the Paulistas, if you could believe it, think they can conduct a raid to bring the plane into control themselves, inside of their own police department." The President did not believe it initially, then raised his eyebrows and nodded. "But I think, personally, that is a liability. One local organization in charge of a mission involving aircraft and international operatives does not fill me with confidence of the outcome."\n\n"But, in any case, that will have been their fault," Lacerda said, contemplating. "It would give us a lot of, well, plausible deniability. They might be more likely to fail, but they will not turn against us. It would give us here in this building a guarantee of sorts."\n\n"On the other hand, the military is also prepared to coordinate the raid on the plane. Even São Paulo's police chief Fleury called to say the armed forces are able to handle it acceptably. But then, of course, you have the inverse problem of what you described. I do not want to see this country's soldiers mocked and dragged through the mud for doing their duty."\n\n"Very well, thank you for the briefing, Minister." The door to the presidential office shut, and it became his responsibility to assign responsibility."
brazil_lacerda.102.a: "Allow the São Paulo Public Forces to conduct the operation."
brazil_lacerda.102.b: "Instruct the national military to conduct the operation."

brazil_lacerda.103.t: "Unclean Heads"
brazil_lacerda.103.desc: ""So you eat this every day?" Jenny asked, grabbing a handful of some smuggled fried rice.\n\n"Of course," replied the smiling kidnapper, who she only knew as "Hiroshige". "Rice is very healthy, you can have a bowl and be fed for a day."\n\nA day. What even was a day? She had completely lost track of time. All the windows had been sealed shut, the plane's interior lit using emergency candles, so it could have been hours, maybe days since her husband was taken away.\n\n"But I'm sure you must enjoy other things, too, not just rice. Don't you worry about how you will be after this is over, what you have given, what you are doing this for?"\n\nHiroshige paused, and momentarily shook his head. "No. I don't. Because it's not that simple. I have always wanted to enjoy myself and my life in this country. I love its red soil, its colors, and my family. That is my Brazil. But I hate this government, its police, its hatred for us. I've been through too much, seen too much, for it to be otherwise. So no. I don't care anymore how I will be tomorrow."\n\nThey stared at each other intently. Then gunshots. And then bangs of detonations. The hatch doors collapsed, holed out by meter-long riot shields and heavily-armored policemen. Hiroshige leapt from his seat with his rifle, his eyes as wide as they had ever been. His barrel was aimed at Jenny. No conversation mattered anymore.\n\n"Don't shoot, or I'll shoo-" and with one crack of a bullet lodged into his head, he was gone. Blood splattered onto everything surrounding him, including her, the searing reality of the event with it. When the police motioned for her to get behind them, she refused."
brazil_lacerda.103.a: "It didn't matter that she was free. She sat down and wept."

brazil_lacerda.104.t: "Unclean Hearts"
brazil_lacerda.104.desc: ""So you eat this every day?" Jenny asked, grabbing a handful of the crystalline rice smuggled in by the captors.\n\n"Of course," replied the smiling kidnapper, who she only knew as "Hiroshige". "Rice is very healthy, you can have a bowl and be fed for a day."\n\nA day. What even was a day? She had completely lost track of time. All the windows had been sealed shut, the plane's interior lit using emergency candles, so it could have been hours, maybe days since her husband was taken away. For a moment, she could have thought herself to be in some kind of stuffy, lowly New York restaurant with the dim lights and heavy murmur, the kind she might never see again, the kind she, for once, desperately missed.\n\nThe next moment, gunshots whistled against the hull of the plane, rattling and vibrating with panic. She heard thuds, possibly of makeshift bridges aggressively hoisted upon the doors, the clattering of them. She realized Hiroshige was already on the other side as she looked upon the armed men, spraying bullets and fire across the entire width of the aircraft. And then it all went black.\n\nHer eyes blearily opened, focusing upon a pool of blood inching towards her. It was from one of the people sitting in the row behind her just an hour ago. Some of the captors in their distinctive white shirts were also splayed across the floor, and it looked like Hiroshige was one of them. As she was frogmarched across the plane, vomiting and crying, she looked upon the utter carnage and realized how very lucky she was to survive the raid that day."
brazil_lacerda.104.a: "The blood will wash off, but their souls will remain stained."

brazil_lacerda.105.t: "The Wasted Crisis"
brazil_lacerda.105.desc: "The Praça da Sé in São Paulo was yet again full of festivity. The very center of São Paulo was aflame with dance and music as crowds flocked to celebrate the end of the plane hijacking and the freedom of the hostages, as samba and deep red and white engulfed the scene.\n\nWithin an hour, sobriety began to set in. In front of the Catedral Metropolitana spoke Vargas Filho, the mayor, using his opportunity to bring himself into the picture. "A couple of hours ago, the last remaining Brazilian hostage had been liberated from the plane of Flight 573, thanks to the courageous efforts of our police." Thunderous cheers, roars and even car horns all resonated at once.\n\n"Yet again, I would like to thank police chief Sérgio Fleury, without whom this operation would not be possible, and without whom the lives of all of our citizens could not be saved." Fleury surfaced from the crowd, grinning from ear to ear as he stood proudly in front of the mayor. As he shook his hand and received his medal, he tipped his cap towards the crowd, and went behind him.\n\n"Let this be a lesson to any future criminal, hijacker, bomber, terrorist, which aims to disrupt this city's beating heart, as we are in it. When you try to stop us, and attempt to destroy our freedom, you will lose. When you attempt to hurt us, you will break. To this end, we will crack down even further on crime, and to this end, you should not feel safe. Thank you, and may São Paulo prosper."\n\nFrom his office in Brasília, Lacerda turned off the TV and did not say a word. By giving them control of the mission, he had given them an opportunity to flex their muscles, to strengthen the PSP even further. By comparison, he was the idiot that let it happen. As he glanced over the new report anticipating newfound Shindō Renmei activity, the President began to consider how to set it right."
brazil_lacerda.105.a: "Don't give an enemy your problems, lest they can handle them."

brazil_lacerda.106.t: "Fleury's Fury"
brazil_lacerda.106.desc: "The lone Sérgio Fleury tapped the microphone, seated dejectedly in front of it, scanning the sea of awkward faces with a frown. Not even the mayor wanted to be seen nearby, leaving him at the front of the media room like some old Bukharinist chairman at the Party Congress. He wondered how Adhemar and the like got used to press conferences like these.\n\n"Yesterday, a raid was conducted by the São Paulo Public Force on the hijacked Flight 573 to New York. It was conducted with the aim of, with as little bloodshed as possible, freeing the hostages from the terrorist group Shindō Renmei and thus ending the siege. In the aftermath, however, it is recorded that 37 passengers have died, excluding the captors, and 44 passengers have been injured." Upon pronouncing those numbers, an audible gasp was heard from some of the journalists. Fleury grimaced at the thought.\n\n"As such, the President declared earlier this morning a state of national mourning for three days for the victims of the bloodshed." He paused to recollect himself, finding in himself a tinge of increasing anger when he spoke once again.\n\n"The Shindō Renmei are a group of killers and zealots who brutally murder our citizens, as well as those of others, aligning with our country's enemies and committed to savagely act against us. They refused negotiations to end the hijacking and opened fire against civilians and our police." He did not know it, but by this point he had descended into near shouting. "They deserve nothing but the full force of the law, and as police chief of São Paulo I pledge to ensure this. From this day forward, any known associate, abettor or supporter of this group will be located, arrested and put to trial. We must bring justice to our fallen. Thank you.""
brazil_lacerda.106.a: "The bloodshed will not end here."

brazil_lacerda.107.t: "A Smiling Victory"
brazil_lacerda.107.desc: "Lacerda walked up to the podium with his characteristic magnetic smile. He waved to the throng of reporters who crowded around him. The room was electric, and the buzz died down only when the man of the hour began to speak.\n\n"First of all, thank you for coming. Citizens of Brazil, today we stand as a triumphant nation. There have been those who have tried to intimidate our nation. Those who tried to shed the blood of our innocent civilians.\n\n"They held your brothers, your sisters, your mothers and fathers against their will. They tried to use those innocent lives to blackmail our nation. They threatened to spill the blood of our people if their outrageous demands were not met. Today, we stand in defiance of those who would try to manipulate us.\n\n"All the hostages were rescued unharmed. Thanks to the diligent work of the men of our security services, we were able to secure the hostages. We have shown our enemies that they will not be able to manipulate us. To those cowardly enough to try to blackmail us with the lives of our brothers, to try to spill the blood of the innocent on our soil, I hope this will be a lesson. Your plots will never succeed as long as I am your humble President. Our security services stand alert and ready to protect and serve our interests and protect us all."\n\nHe smiled again and waved to the reporters who had rushed forward to get a comment. But he waved and walked away quietly. He smiled all the way back to his office."
brazil_lacerda.107.a: "A spring in his step."

brazil_lacerda.108.t: "Rescue or Recon?"
brazil_lacerda.108.desc: "The Security Minister fidgeted in his seat. He had the words of the prepared speech on cue cards in front of him. He ran his mind over each word, trying to fit it into place. He could hear the reporters outside. He heard the sound of camera shutters. What were they photographing anyway, he wondered, the empty podium. Maybe they were just checking if their cameras were working. He let out a sigh. The Major looked at him, tapped his foot, and gestured toward the curtain leading into the hastily cleared mess hall of the Southeastern Military Command headquarters.\n\nHe was greeted by the flash of those cameras, and being prepared for it did not help. He cleared his throat as his mind went over the smudged ink on the cue cards.\n\n"Citizens. Members of the press. I am here today to update you on the current intelligence operations against terrorist threats. I am pleased to report that we have conducted successful reconnaissance operations today and have gained useful intelligence on the situation that will be used in an upcoming rescue operation.\n\n"However, there have been reports of a number of injuries to hostages and civilians in the vicinity. There are risks in any military operation, and we had anticipated such outcomes in planning this operation. I am pleased to report that the injuries are well below the expected negative outcomes. Do not forget that it is the terrorists who put us in this position and in the coming rescue operation we will make sure that the perpetrators are punished.."\n\nThe minister left the sage, ignoring the throng of reporters. In the barracks of the 11th Light Infantry Brigade, a captain slaps a private in the face. Such a public fiasco could not be allowed to happen again."
brazil_lacerda.108.a: "It's all a matter of perspective."

brazil_lacerda.109.t: "Drawing Lots"
brazil_lacerda.109.desc: ""Carlos, if you take responsibility, that will be it. Your career doesn't have to be a casualty as well."\n\nSandra Cavalcanti's eyes darted across the room, as if searching for bugs hidden underneath lampshades peeking in. The evening sun crept through the blinds to the Governor of Guanabara's office, a humid blanket over the replete silence of the streets outside. A nation of seventy million, brought to an abrupt stop by a singular aeroplane? She would panic too.\n\n"You don't seem to understand. Either I take responsibility or the papers make me!" Lacerda spat, before letting a moment pass in silence. "There isn't a pundit with a typewriter in Ceará who doesn't want to string me up for this. It would be better to soften the blow by beating them to the punch. Wrongfoot the bastards. What else can I do?"\n\n"Deflect, Mister President. Deflect, deflect, deflect. Fire someone. It's not an ideal scenario, but nobody wants to see you fire an air traffic controller, hm? You wouldn't be President if you couldn't handle a few more knives to your backside." Sandra's voice remained precise and succinct, like a professor lecturing a first-year student on the shortcomings of their coursework. Old habits die hard, she supposed.\n\n"And I can handle knives, but not the whole Roman Senate. We would need a specific target, and I already imagine you have one in mind." Lacerda's voice gained a modicum of composure, as the Machiavellian chessmaster retook his throne.\n\nCavalcanti sat back in her chair, letting the faux leather encompass her like a shield. Neither time nor patience was a luxury she had, to put up with Lacerda's dramatics, but at least he was starting to agree. There were the security officials. A large, Congressional inquiry into the lax behaviour of the police would sink a few no-names and drive a wedge between the President and the armed forces, sure. But nobody is going to launch a coup over a no-name.\n\nThe other option was firing indiscriminately into the Ministry of Justice or Transport and hoping that the carnage was entertaining enough to soothe the teeming masses of their vibrant democracy. It would taint the Cabinet, who would resent Lacerda for it, but it would be enough. Either way, she would have to choose her words precisely."
brazil_lacerda.109.a: ""Feed the Security Forces to the Sharks and be done with it, Carlos.""
brazil_lacerda.109.b: ""I can think of a few Cabinet Ministries that have had it good for far too long, Mister President.""
brazil_lacerda.109.c: ""Never mind. Take responsibility before they make you do so.""

brazil_lacerda.110.t: "The Final Hour"
brazil_lacerda.110.desc: "SÃO PAULO - What is Lacerda but another Hitler? He locks those he doesn't like and makes the country worse by the day. We have seen the terrible actions happening at that God-forsaken plane in our city and his mismanagement of it. This has the nation wondering, what led to this?\n\nMy answer? The Crow's Gestapo. If we actually read the demands of the kidnappers we notice that it's because the father of one of them, an innocent man, was captured by Crow's secret police some weeks ago. What we have seen is an otherwise innocent kid being driven to extremes thanks to the Crow's corrupt and criminal policies.\n\nTo be a fool is a normal thing, to be a fool as the President is truly exceptional. What we have seen is that we cannot trust the Crow to be competent in times of need. He is but a fool elected by those who seeked someone great and got someone who can't even solve a crisis."
brazil_lacerda.110.a: "With anger in his fingertips, Wainer typed."

brazil_lacerda.111.t: "Bottle Attitudes"
brazil_lacerda.111.desc: "Down the uneven steps, Francisca and her daughter carefully pieced their way down the staircase. On the outskirts of the favela, it was an area they were both unfamiliar with - a walk home from a visit to a friend being disturbed by road closures. Exactly why, and who had told them it was closed, was something they did not exactly know.\n\nBetter not to ask questions.\n\nThey cleared the narrow staircase, which had twisted around the shacks that cramped the small hill, reaching another slightly larger road, one that Francisca had vague memory of.\n\n"Found it," she turned to her daughter and said, "we can get home along-"\n\nShe stopped. She became vaguely aware of idle chatter from a narrow alley a handful of meters away next to them. The talk was jovial but unintelligible to her, distinctly Asian although Francisca could not say exactly which. Telling her daughter to stay still, she moved forward a little, seeing more of the alley.\n\nShe couldn't see the men but she could see a bottle on the ground. On it was written "Aomori", something Francisca was not familiar with, but the adjacent characters were Japanese. The language she was hearing must be Japanese. The men must be Japanese.\n\nWith a nervous step back, she turned to her daughter. "Cross the road, we don't want to get too close. Not around here." Her mind flashed images of their possible intent, the recent attack prominent. If they saw her and her daughter, what's to say they would not try to rob them, or worse?\n\nFrancisca's daughter, equally nervous, furiously nodded. They crossed the road before walking past."
brazil_lacerda.111.a: "They walked particularly quickly for the rest of the journey."

brazil_lacerda.112.t: "Tape No. 302/2"
brazil_lacerda.112.desc: "RECORDED AT THE UNITED STATES EMBASSY IN BRASÍLIA\n\nEXCERPT STARTS\n\nGORDON: Welcome Mr. Da Cunha, please sit down. I believe you understand the reason why I'm talking with you today. The kidnapping has affected both our nations profoundly. The fact that two Japanese men took over a plane with American civilians will cause severe problems between the United States and Japan.\n\nDA CUNHA: Mr. Gordon, we are doing the best we can to fix this situation.\n\nGORDON: If this is the best you got then those Americans are going to get killed. If it were us handling this kidnapping, all civilians would have already been let go and the kidnappers arrested. If Lacerda is unable to fix this, I suggest cooperation with the OFN to free the hostages.\n\nDA CUNHA: I don't think that would be necessary, the negotiations are going swimmingly.\n\nGORDON: Swimmingly? Do you know how long the hostages have been on that plane? Two weeks. It's been two weeks with no results. I believe Lacerda to be incompetent if he can't fix this situation in two weeks. You better fix this soon.\n\nDA CUNHA: Understood, Mr. Gordon."
brazil_lacerda.112.a: "EXCERPT ENDS"

brazil_lacerda.113.t: "Down to Earth"
brazil_lacerda.113.desc: "It had been weeks, maybe more, since the start of the hijacking. Everyone was dirty, some were sick, all were uncomfortable, Hiroshige was walking down the plane checking if everyone was still alive when he found Jenny. She was scared, crying and wanting to go home.\n\n"I didn't want to be here too, you know," he said looking at the woman. "I wanted to live a normal life, studying hard to lift my family out of poverty. But then they took my father away, and then he disappeared in the prison system. We couldn't go see him, we couldn't talk to him, we couldn't do anything at all."\n\nJenny looked at Hiroshige's face not with anger for the kidnapping, or fear from the weapons he had, but with sympathy. She knew what it was like being away from someone you love, it was a horrible feeling. The two exchanged small talk after this and Hiroshige continued checking the rest of the people."
brazil_lacerda.113.a: "Far from home, the American learns to understand the Japanese."

brazil_lacerda.114.t: "The Crow and the Junior"
brazil_lacerda.114.desc: "Vargas Jr. didn't think when he did his bid for governor of São Paulo he would have to deal with something like this. This crisis, this needless game of lives wasn't what he expected of his position. It was on a rainy day when he called to his office the man responsible for the start of the heavy policing of Japanese neighbourhoods, Sérgio.\n\n"This crisis might hurt us more if we don't solve it quickly. I prefer resignation than to spill one droplet of Brazilian blood in this." Vargas Jr. looked at Sérgio with a face that could be described as between anger and disappointment.\n\n"Don't worry, we already have prepared everything," said Sérgio. "We will ensure that every person in that plane comes out alive. Remember this is presidential policy, we will ensure that nothing like this can ever happen again."\n\nVargas Jr. nodded to the policeman's idea, he wanted the crisis to be over as soon as possible and wished that this couldn't happen again. If wider policing and crackdowns on the Japanese communities would ensure this, than he hoped that they could start doing it soon."
brazil_lacerda.114.a: ""Go and do your thing.""

brazil_lacerda.115.t: "The Last Smile from the Old Man"
brazil_lacerda.115.desc: "Alzira, Goulart, Brizola. All united around Vargas' bed. His age had finally caught up to him. The light in his eyes began to fade away. "Please, remember me when I'm gone," wished the old man. "That the people continue to fight what I fought for in '51. That we defeat the Crow. Please do this in my honor."\n\nVargas' words became more and more indiscernible. He looked around his room looking for someone, it was Alzira. Looking at her one final time, he gave a smile and his eyes closed, never to be open again.\n\n"He was a good man, Alzira," said Goulart. "What he did for us and the people, his will to continue fighting in moments of crisis. He was the best person I have ever met in my life. I owe him a lot."\n\nShe excused herself from the room. The look of her father's corpse was too much to bear. "I believe I should tell the others," Goulart said as he left the room. In front of Vargas' estate there were dozens of news reporters waiting anxiously on the state of the former President.\n\nGoulart appeared in front of them. "Five minutes ago, Getúlio Dornelles Vargas officially died." For once, the reporters were quiet. Some even cried. Goulart refused any more commentary, he wanted Vargas' final wish to be made into a reality before any interception from the government.\n\nHe wanted to make his mentor proud."
brazil_lacerda.115.a: "He slept among the stars, for that would be his new home."
BRA_lacerda_vargas_death_tt: "§eThe legacy of the so called "Father of the Poor" will soon be a footnote in history.§!"

brazil_lacerda.116.t: "The Old Man Rots"
brazil_lacerda.116.desc: "Lacerda couldn't believe it, after many years the man he hated the most was finally dead. In the UDN headquarters, commemorations were held, finally the dictator was gone. A small speech by Lacerda was supposed to be given but no one could find him. Truth is, Lacerda had gone home earlier today.\n\nThe bedroom he dreamt of, where he could finally destroy the flame of Varguism for good, was no longer useful. Sure, as long as Brizola and Goulart were still around, Varguism would continue existing, but now the man who gave the name to the ideology was gone.\n\nLacerda's mind was filled with dread, what would be of him without his main political adversary? Had he won? In the end, losing Vargas was worse to him than to the PTB. His words would continue to permeate Brazilian society long after his death.\n\nSitting on his desk, he tried to think of what to do. Sleeping was not an option, not today at least. Brazil needed a response from the man who brought down Vargas. They needed answers for what he thought."
brazil_lacerda.116.a: "Nevermore."

brazil_lacerda.117.t: "How to Honor Your Rival"
brazil_lacerda.117.desc: "Carlos Lacerda entered the cabinet room, and the other ministers stood up as the President approached the table, before sitting down in the open chair available. He was exhausted, having been unable to sleep all night since the news arrived. But this meeting was important, and it needed to be decided, and fast.\n\n"As you all have heard by now, former President Getúilo Vargas has died. As a former leader of Brazil, one with a, uh, contentious legacy, one that few around this table would disagree with, that doesn't mean that we can ignore what has transpired. A public statement will need to be prepared, and quickly."\n\n"What about the funeral?" Vice President Távora asked.\n\nLacerda paused. "Well... that would be a matter for the family, of course," he said.\n\n"No, it cannot. Vargas must be accorded a state funeral." Carlos nearly blanched and a few other men around the table nearly howled, but Távora continued. "Yes, I understand that he has an approval rating below that of measles around this table, but to many Brazilians, he was one of the greatest men to have walked this earth. While his populism and the fascist tendencies of his Estado Novo has caused immense damage, including the threat to your own life Carlos, he has also raised millions from poverty and fought against the Nazis and kept us independent from any foreign power. It would be smart for us to at least offer an olive branch, a state funeral, a way to not antagonize our opponents, let bygones be bygones."\n\nTávora turned to Lacerda. "But, Mr. President, it is your decision to make.""
brazil_lacerda.117.a: "For all his flaws, he was a President of Brazil. We shall host a state funeral."
brazil_lacerda.117.b: "He was a private citizen who had retired many years ago. Let his family bury him in peace."

brazil_lacerda.118.t: "Words in Death"
brazil_lacerda.118.desc: "Thousands have lined the streets of Brasília as the hour of the state funeral for General and President Getúilo Vargas drew near. Many dignitaries had already arrived at the capital; heads of state, ambassadors, governors, civil servants, current and former military officers, had already arrived at the magnificent Metropolitan Cathedral of Our Lady of Aparecida and been seated accordingly.\n\nCarlos Lacerda had also just arrived, leading the delegation of the current government and was about to enter the cathedral when he saw Leonel Brizola, one of the leaders of the PTB, and Lacerda's biggest legislative thorn, clustered with other PTB, PSD, and other Varguist figures like the newspaper man Samuel Wainer near the entrance.\n\n"Brizola... don't tell me that he's planning on speaking?"\n\nGolbery do Couto e Silva, standing next to Lacerda, turned to take a look. "He is one of the heirs of Vargas's populism, so I can see why he is." The Minister of Defense leaned in. "Of course, we could dissuade him. Say that there are credible reports of a Shindō Renmei attack planned against him." Couto e Silva glanced at his watch. "We have a few minutes to spare, and I can arrange it, if you so wish."\n\nLacerda glanced back to Brizola, who was in turn looking over to Lacerda and his delegation. Their eyes locked for the briefest of moments, the burning vitriol of political rivals barely tempered by the current somber occasion, before Brizola glanced down at the pages in his hand. The eulogy he planned to give, no doubt."
brazil_lacerda.118.a: "Let him speak. We aren't that heartless."
brazil_lacerda.118.b: "An assassination threat? Oh dear, we must let him know!"

brazil_lacerda.119.t: "Speaking Ill Around the Dead"
brazil_lacerda.119.desc: "The Archbishop of Brasília finished his sermon, speaking of duty, of honor, of piety as he spoke about the life and service of Getúlio Vargas. Carlos Lacerda kept a straight face the whole time, even though all those words, and the Bible passages that the holy man used was talking about a man who, while maybe not directly responsible, had set up the state apparatus to try to kill him thirteen years ago. Lacerda, however, felt at peace about it. He was still alive, and now the President of Brazil, and was going to make the nation better than ever before.\n\nThe archbishop stepped back from the pulpit, then it was time for Leonel Brizola to speak. The congressman rose to the stage, taking a long, sorrowful moment to glance at the casket of his political mentor, before he finally spoke, his voice heavy with emotion.\n\n"Before us is a man who has done much for the nation, one devoted to the cause of making Brazil a better place," Brizola began, his voice echoing through the cathedral and over the loudspeakers set up for the thousands who gathered outside. "Vargas's Brazil was not just for the landowners, the military, or the elite, but for all Brazilians. The first minimum wage, a codification of the rights of the worker, a unification of labor and capital for the goal of a better tomorrow."\n\nBrizola continued on, extolling the virtues of Varguism, with only minor swipes at Lacerda, the UDN and their more laissez-faire policies, but never by name. Lacerda was able to relax, satisfied that Brizola wasn't here to bring up past grudges.\n\nAt the end, as Vargas' body has lifted out and to the waiting hearse that was to take him to his hometown of São Borja, Rio Grande do Sul, Lacerda and Brizola found themselves eye to eye again. Lacerda gave a small nod, which Brizola returned."
brazil_lacerda.119.a: "Even politics can take a day to respect the deceased."

brazil_lacerda.120.t: "Speak Not For the Dead"
brazil_lacerda.120.desc: "The Archbishop of Brasília finished his sermon, speaking of duty, of honor, of piety as he spoke about the life and service of Getúlio Vargas. Carlos Lacerda kept a straight face the whole time, even though all those words, and the Bible passages that the holy man used was talking about a man who, while maybe not directly responsible, had set up the state apparatus to try to kill him thirteen years ago. Lacerda, however, felt at peace about it. He was still alive, and now the President of Brazil, and he was doing everything he could to make Brazil a successful democracy and rising economic power.\n\nThe archbishop stepped back from the pulpit, and the uniformed pallbearers marched toward the casket, preparing to take Vargas to the truck, and from there to his final resting place in his hometown of São Borja, Rio Grande do Sul. At that moment, Leonel Brizola suddenly stood up. Lacerda froze, eyes growing wide as he saw the Varguist populist. Before the service, some "credible" reports of a risk to Brizola's life had been given to him, and that "for his safety" he would not be allowed to give a eulogy for his former political mentor... but was he about to cause a ruckus at the funeral anyway?\n\nBrizola turned around to the audience, and clapped his hand over his mouth. A couple dozen other men and women stood up all around the cathedral, placing their hands over their mouths. Even from inside the modernist cathedral, Lacerda could hear the cry of anger coming from outside, as the speech that they expected Brizola to give was instead met with silence.\n\nLacerda turned to Defense Minister Golbery do Couto e Silva, who was sitting, stone faced, next to the President, and who's suggestion it was to not let Brizola speak. Lacerda wanted to cuss out Couto e Silva for this faux pas, but Lacerda knew it was his decision to go ahead with it."
brazil_lacerda.120.a: "Even politics can take a day to respect the deceased."

brazil_lacerda.121.t: "A Private Affair"
brazil_lacerda.121.desc: "The death of former Brazilian President Getúlio Vargas has sent the nation into a period of mourning. Across the nation, from the favelas of Rio to the small farming settlements along the mighty Amazon River, small commemorations and moments of silence for the leader who had done so much to help the poor and downtrodden of Brazil was observed.\n\nIn São Borja, Rio Grande do Sul, the hometown of the late President, a more structured funeral service took place, with only Vargas' closest family, friends, and political allies in attendance at the local church. His wife Darcy, cloaked in black next to the coffin, and his son Getúlio Vargas Jr. standing next to her along with Vargas' other children; Lutero, Jandira, Alzira, and Maneco. On the other side, João Goulart, Tancredo Neves and Leonel Brizola, along with a few other members of Varguist political parties like the PSP, PSD and the PTB respectfully looked on, their mentor, ally, and friend about to be committed to eternal sleep. In total, perhaps three dozen people were in attendance.\n\nThe local priest concluded the service with a prayer, followed by the pallbearers taking the coffin to the waiting hearse, and from there to the graveyard with the family. At the footsteps of the church after the hearse pulled away, Goulart, Neves and Brizola found themselves standing next to each other, and began to talk. But the words were not of fond memories of the deceased, but of vitriol and anger at the current President, Lacerda, and his disrespect at not honoring one of, if not the, most important figures in Brazilian politics of the past 50 years. No state funeral? No official mourning period? It was outrageous! Something must be done!\n\nAnd as the three men went their separate ways, they all agreed on one thing:"
brazil_lacerda.121.a: "Lacerda's disrespect toward Vargas must be avenged."

brazil_lacerda.122.t: "The Last Goodbye"
brazil_lacerda.122.desc: "Getúlio Vargas Jr. found himself standing alone next to the graveside where his father's coffin had already been lowered into. His mother and siblings had already begun walking back to their cars, ready to head back to the house and their grieving in private, but Getulinho could not yet.\n\nThere were many questions running through his head, ones that he wished he could have asked his father. Why not him? Why hadn't his own son been blessed to lead the Varguist movement? Why was Goulart and Brizola anointed as leaders of the PTB and not him? What had he done? Why was he cast aside by his own father for those two?\n\nVargas Jr. scowled. Of course in Brazil, family connections could help, but it wasn't enough to get one everywhere. You needed to prove yourself, and show that you had the ability to do it. And Goulart and Brizola? They were as cutthroat politicians as they came. Had Getulinho stayed in the PTB, he would have always played second fiddle to them, until the time finally came that they would be brought down. But who knew how long that could have been? Years? Decades? Waiting on the sidelines, a prop for them as a tie to the legendary leader of the nation?\n\nNo. With the PSP, he has been able to prove himself. He didn't need his father's blessing to prove that he could lead the nation, lead the Varguist cause. He had worked his own way up the echelons of Brazilian politics, with every speech, rally, meeting, promise and bribe, he had climbed the slippery slope.\n\nMaybe in the end, without his father's support, he had proven to be the better man, the better leader of the movement. While Vargas Jr. could never ask his father if that was the case now, it did not matter. That was perhaps the best gift his father could give."
brazil_lacerda.122.a: "Getulinho placed his hat on his head, giving a nod to his father, and joined his family."

brazil_lacerda.123.t: "A Pact of Blood"
brazil_lacerda.123.desc: "Sunset shined over Getúlio Vargas' pallid face. It was one of those minutes that felt like hours where, for various reasons, the Vargas family had all stepped away from the bed of their dying patriarch. Darcia, Lutero, dear old Getulinho, all doing something without him — all living their lives. Now, it was only him.\n\nHe was not completely alone. Death was on him. He could see it in the corner of his eye. It wasn't an unexpected visitor — its arrival had been due for months. Reaping time had come for the old man.\n\nNothing about it was right, fair, or just. Every ounce of will was put into life — living to see the day Lacerda's regime would choke itself to death on paranoia and power. But it was years since he stole the presidency from Goulart. He and Brizola would not be presidents. They would be names on a list, men who had to live forever in fear.\n\nThere was no one he could turn to, no one he could plead to save his legacy, to stop Lacerda, to preserve his vision for a beautiful Brazil. Again, an exaggeration. Vargas never gave any credence to Him. If such a being did exist... now is better than never.\n\n"Lord, I did awful things." His voice strained the vowels as if forced out at gunpoint. "But everything was for Brazil, for a better life. My legacy was meant to be democracy. Now, there will be nothing. I deserve nothing, but Lacerda, his presidency only deserves failure. I beg you, Lord, not to reward this man for destroying democracy. If Hell is what awaits me, let it await him too."\n\nA final request, a plea soaked in blood. Death would claim him, God claiming His side of the bargain perhaps? It was inevitable anyway. All that was left was final words for the dying light..."
brazil_lacerda.123.a: ""I leave life to enter history.""

brazil_lacerda.124.t: "Tyrants Fall"
brazil_lacerda.124.desc: ""Tonight, all of Brazil can sleep easy knowing this: our Hitler is dead!"\n\nThe Palácio da Alvorada was a court alight with passions. Staffers lined the halls like dukes and duchesses, all in varying states of merriment. Their king was Carlos Lacerda, doling out liquor like the last days of Rome. These were his people — joyous and free — unchained from the shackles of Varguism forever.\n\nOnce, they all lived in fear. He knew the feeling longer than anyone else, all those days of watching over his shoulder for one of Vargas' killers. He tried, and he failed. His Brazil would only remember him with one word: tyrant. A content smile bloomed across Lacerda's face at the thoughts, dragging a bottle of booze by its neck with him to the bathroom.\n\nHe couldn't help but continue to indulge himself, only stopping when his indulgences spilled onto his shirt. His hands left the drink by the sink, washing themselves and flecking droplets onto his beer-soaked clothes before bathing his eyes. Soaked, Lacerda raised his head to the mirror and saw a reflection, but not his own.\n\nVargas. His hand rested on Lacerda's shoulder, cold to the touch. His smile seemed almost like warm approval.\n\nLacerda spun and hurled the bottle at the dictator, shattering only against the wall. The momentum fell the President to the floor, collapsing like a turned-over turtle. Was that who he really was? Another dictator, another Estado Novo. No. He was better than Vargas, his intentions were pure. There will be no excess, no mistakes, and nothing else apart from a mission to see democracy right.\n\nStill, no words could soothe the pit of melancholy within him, haunting him to sleep with only spilled alcohol for company."
brazil_lacerda.124.a: "Lacerda could only dream of Vargas that night, and every night past that."

brazil_lacerda.125.t: "This Mess We're In"
brazil_lacerda.125.desc: ""My dear brother Brizola, I have just heard the news regarding Vargas' passing. It has devastated me to know that it took place during exile in Uruguay. Not only has the chance to see him off escaped us, but his grave remains captive as well, sealed away in a homeland hostile to us. Our friends fight on in Brazil, and even now, thousands of miles separate us..."\n\nA teary-eyed Goulart writes away on a desk in his homestead. He knows his way around Uruguay by now. The Batllists treat him with the respect of a legitimate leader, even if it sometimes feels more like pity. Occasionally, it just makes him feel isolated. Today, he could only feel alone, wishing for nothing more than an embrace from his brother...\n\n"It is great to hear from you again, Jango. I found out about the death of Vargas almost by accident by a chance meeting with a Brazilian expatriate. I was as floored by the news as you must have been. That ghoul Lacerda is probably dancing on his grave by now, a grave neither of us can visit until God knows when...\n\n"An exhausted Brizola composes his letter at lamplight in a New York hotel. It was the end of another night of speeches and handshakes, meeting sympathetic politicians. They still existed, but grew fewer in numbers each day as Lacerda's regime solidified itself. Vargas' death would be a blip to them. To him, a tragedy, one he couldn't even properly mourn...\n\n"...I am pleased to say that I have been in touch with Edna as well. She suggested we all meet in Cuba. It isn't Brazil, but that opportunity will not come for a long time, even if I remain hopeful. I look forward to seeing you once again, brother."\n\nAll the best,\nJoão Goulart"
brazil_lacerda.125.a: "A bond remains firm across continents."

brazil_lacerda.126.t: "Happy Days, Where Have You Gone?"
brazil_lacerda.126.desc: "The death of Getúlio Vargas seemed to provoke reactions as waves. They didn't all come together, it was as if people could not believe that the Father of the Poor had passed. Today, Francisca watched another one of these reactions live on TV.\n\nTelevision cameras followed the route of a spontaneous march, spontaneous out of necessity perhaps, to mourn Vargas' passing. Gatherings similar to it were technically not banned but deterred by the usual bureaucratic methods of denying paperwork or making applicants go through dozens of hoops. Even Lacerda was forced to exercise restraint to avoid the outburst of something worse.\n\n"And now, we will be speaking to one of the aggrieved at the scene." The reporter was accompanied by a younger man, eyes red from outbursts of emotion. "Mr. Silva, could you tell me how you knew Vargas?"\n\n"I knew him from my father. Vargas gave him a house and guaranteed work... he kept us warm during those long nights. I think that's far more than I can say about our current President." His tone had sharply changed from reminiscing about what had been lost to despising what he had. "I don't care what people say, I would take Vargas as my President any day over Lacerda."\n\nWith that, the mood of the march changed in response, going from mourning a man to mourning a nation. Chants of "Down with the dictator" permeated the crowd, only to be quickly subdued by police coming out of the woodwork. The camera captured the force putting down any dissent, all before an officer smothered its lens with his hand.\n\nFrancisca turned off the television, nothing good would come out of watching it further. She didn't like to think about the past, all it brought was pain, but she couldn't help but think back to the words of that interviewee. Brazil was a changed nation, but it didn't seem to be for the better. Nothing she could do of course, just look after her own corner and her people."
brazil_lacerda.126.a: "Inside however, she wished she could go back to 1949."

brazil_lacerda.127.t: "New Life From an Old Death"
brazil_lacerda.127.desc: "Splash! Wet soaked the trouser legs of Tancredo Neves as he got out of his car — and straight into a puddle. The weather was far from clement — dullness and dreary rain dominating the skies. Nevertheless, Neves soldiered on to the Governor's Palace.\n\nIn a word, it was austere. Gone were the decadent decorations of the Adhemar years. Today, it best resembled a funeral parlor as a weepy atmosphere held it hostage. Neves' only reprieve from the depressive quiet of suppressed sobbing was when he finally met Vargas Jr., another soul in mourning.\n\nA twin "Saúde!" rang through the palace, commemorating both a departed father and a mentor. "How are you doing after everything?" Neves could blatantly tell how the son felt, his eyes swollen with faded tears and adorned with the wounds of sleepless nights' torture.\n\n"I thought the worst of it would be missing his final breath, but seeing this naked repression against people who only want to mourn my father is a travesty against both democracy and basic decency." Neves knew they were more than these mournings often turned into anti-Lacerda protests, but didn't think it was appropriate to correct him, especially not before his proposition."\n\n"He can't stand any dissent, no matter how indirect. That's why Jango and Brizola are exiled a million miles away, and why the PTB have been reduced to headless chickens..." Neves sighed and composed himself. "...and it's why the PSD is one of the few parties still able to oppose Lacerda, but we can't keep at him alone. We need you and the PSP to join us."\n\nHe couldn't read Vargas Jr's reaction at first. That was until he suddenly embraced him, weeping tide of tears held back to the night's privacy. In between them, Neves could only make out one sentence..."
brazil_lacerda.127.a: ""Anything! Anything to see the tyrant fall...""

brazil_lacerda.128.t: "The Men Who Made Brazil"
brazil_lacerda.128.desc: "The Havana sun dazzled off the bonnet of a hired car as it escorted one Edna Lott to meet with Jango and Brizola, her co-conspirators for Brazilian democracy. They met each other to joyous tears as they went out together to the assembly hall, cameras covering the back. Applause flanked them as they walked to the stage, Edna grasping at the mic with the two men side-by-side.\n\n"Thank you. I am pleased to have the honor of addressing you all in a free and democratic nation — the same could not be said about the country we call home." Her voice took a cold inflection to move from audience niceties and instead — attack the crux of the issue. "We, alongside the rightful President with us today, have been hounded from Brazil by Lacerda for refusing to accept his dictatorship."\n\n"But we are not the only victims of his wrath." The exiled President took the mic. "Recently, the people of Brazil lost their father, Getúlio Vargas. Like the rest of our nation, we were distraught at the news, especially given that we were unable to mourn him properly. But it is not just us. Even today, he continues to oppress those who would wish to mourn him." Brizola took the mic.\n\n"'We call upon the Brazilian people to resist their dictator. Vargas' legacy must survive the obsessions of a single autocrat. All the good that has been done must live on past his paranoia. For now, we pledge to continue fighting him, however-'" A howling laugh interrupted the reading.\n\n"What a load of crap! Would you die for those idiots?" Lacerda directed the question at the staffer reading him the transcript of the Havanna declaration, but before she could answer, he finished it for her. "No. You wouldn't because you are not some deluded exile isolated from real Brazilians. Thank you for indulging me. Shred that paper before you leave." Lacerda flashed her a smile before going back to work."
brazil_lacerda.128.a: "Jango in Havana, Lacerda in Brasília, and Vargas six feet under."

brazil_lacerda.129.t: "Piano Man"
brazil_lacerda.129.desc: ""Please welcome Michel Temer." Lacerda had heard about him from all sorts of people, they talked about his talents in music and how he always dreamt of playing the piano. Today was the day he would finally meet him.\n\nThe auditorium was filled with people, mostly civil servants, all ready to listen to the classics. Temer thanked the crowd for the applause and started playing one of Mozart's most famous pieces, Rondo Alla Turca.\n\nLacerda couldn't believe what he was hearing. Smooth and soothing melodies. "He plays well," he said to his chief of staff. Temer continued playing for half an hour and the crowd cheered him every time a piece ended.\n\n"Thank you! Thank you!" said Temer.\n\nOutside of the auditorium, Lacerda went to meet with the young pianist. "Mr. Temer, I would like to say your performance was simply incredible." Temer thanked him for the compliments.\n\n"I would be nothing if it wasn't for Robert. He escaped Sealion and landed here. He taught me everything I know about music." Lacerda was quiet, he wanted to know more about Robert, a man who had seen the horrors of the German invasion, how it could make people suffer and how it did.\n\n"He's a very brave man, Mr. Temer," Lacerda said, with a smile on his face, he wondered what would've been of Robert if he didn't leave in time and what happened to those who couldn't."
brazil_lacerda.129.a: "Temer smiled as he remembered his tutor."

brazil_lacerda.130.t: "Keep Your Head Down"
brazil_lacerda.130.desc: "It had all happened in a blur of a few seconds - everything that had happened moments earlier.\n\nShe hadn't asked herself just what had happened, too paralyzed by all that had taken place around her and the sudden disappearance of her family - gone, may or may not be dead. Chiyoko wouldn't find out today, that was for sure. Behind her, the streets were ablaze - figuratively, though it wouldn't be long until it were literally true either. Hiroshige had made a martyr of himself in the hijacking and set the police's targets on the Nikkei, which Chiyoko had to thank for the aggressive interrogations she had to undergo a few times now.\n\nHalf an hour elapsed since Chiyoko crossed paths with the congregation of Brazilian thugs who were not-so-discreetly loitering by a narrow street outside the Cine Niterói, just barely avoiding catching their attention. Smoke rose to the clouds of the city skyline, and screams could only faintly be heard suppressed by the fists of angry mobs. All as the Nikkei suddenly appeared filing out of the movie theatre, without hesitation the thugs descended upon the crowd of Asiatic faces.\n\nAs word would have it, chatter could be overheard of a man "vaguely fitting the description" of one of Kōdōsha members. Whether that man was there or not seemed not to matter anymore; anyone thought to look Japanese enough was surrounded. Stabbed. Fired upon. Ran over. Anyone who looked close enough to anything like the man who hijacked the plane.\n\nInstinctively, Chiyoko bolted. In the periphery she could hear screams of rage in Portuguese, as hordes of muscular thugs chanted in unison to "burn this racial cyst to the ground". Taking advantage of the ensuing chaos, she masked her face behind her clothes and ran for dear life out of the inflamed street. The rioters spared no effort to attack anyone they suspected of being Japanese, and Chiyoko could hear some screams that were neither Portuguese nor Japanese."
brazil_lacerda.130.a: "A house of cards built on a wobbly table expectedly falls apart."

brazil_lacerda.131.t: "Controlled Chaos"
brazil_lacerda.131.desc: "Liberdade was on fire. Sérgio Fleury, chief of São Paulo's police, was acutely aware of this, thanks to the flood of panicked calls made to his building, and the rising towers of smoke visible from his office window. As the man charged to help keep order in the city, he had every reason to be concerned, and yet, he felt a remarkable mixture of apathy and amusement.\n\nHe heard a polite rap on the door behind him, breaking him from his idle stare towards the rising flames. "Come in." He didn't bother to turn around when the door opened. "João, is it? I presume you've come to tell me the same thing everyone else has? I've already told you all what to do. We're sitting this one out."\n\n"We understand that, chief. It's just that, well, the calls are getting more frequent. The riots are beginning to spread outwards, and there's reports of killings taking place. It's starting to look really bad, sir."\n\nFleury sighed, and spun around to meet the voice face-to-face. It was another nameless pencil-pusher coming to tell him how to do his job. "I know that already, I don't know why it's my problem. If you've been around this building for longer than a week, then you already know DEOPS is spread thin enough as it is. If the people want to take the crime-fighting into their own hands, who are we to stop them?"\n\n"Sir? I don't understand."\n\n"These Japanese... always causing trouble in our city, and never once thinking that one day people would have enough of putting up with their shit. You want me to give you all something to do?! How's this: send some units down there to give those folks a hand. It's about time we put those shifty bastards in their place.""
brazil_lacerda.131.a: "Gas upon a flame."

brazil_lacerda.132.t: "Kitsune"
brazil_lacerda.132.desc: ""To say the situation we've found ourselves in is difficult is... an understatement," the young man said.\n\nOnly ten minutes earlier, before she found herself backed in a corner, Chiyoko—perhaps finding herself at the wrong place at the wrong time, witnessing the mob ransack a business, presumably belonging to a Japanese owner—attracted the attention of the rioters. As their eyes met, the signal from the rioter could be universally understood - his glare, locking on to Chiyoko's pale, frightened face sent a message that transcended all linguistic barriers.\n\nChiyoko could only narrowly avoid the much larger, faster rioter for so long. Stumbling before debris left in a scuffle from another looted car, Chiyoko fell to her knees, landing palms down upon the pavement, as the rioter and his equally intimidating posse got hold and surrounded. As Chiyoko crawled backwards, the rioter quietly signaled for the others to leave the alley, while slowly drawing something—a black object—from his hip. Chiyoko gulped, as if she were to gulp knowing it would be her last moments, as the rioter reveled in the fear in her eyes, pointing what was unmistakably a pistol towards her head.\n\nThough, as she hastily tried to make peace with her inescapable doom, shutting her eyes with all her might. When the shot finally rang out, she noticed, to her amazement, that she could open her eyes! Slowly lifting her head, the body of the thug had collapsed to the floor with a great thump - and before her, stood a young man holding a rifle, katana on his hilt, face obscured by the mask of a kitsune. As the man slowly turned towards Chiyoko, chuckling cynically he unmasked himself, revealing himself to be Japanese—this not doing much to startle Chiyoko less.\n\nHe reached out his hand to pick Chiyoko up from the floor. "Come with me. Where I'll take you will certainly be a hell of a lot safer than here." As he finished his sentence, several more gunshots rang out in the distance."
brazil_lacerda.132.a: "Though foxes are known for their trickery, Chiyoko had to trust him."

brazil_lacerda.133.t: "The Fox Den"
brazil_lacerda.133.desc: "In a nondescript house just outside Liberdade, the masked young man unbrandished his katana, unmasking himself before the doorstep just before clearing his throat and producing a sentence:\n\n"I come from the countryside and would like to learn how to raise chickens."\n\nSomething thumps behind the door before it unlocks, revealing two tall Japanese men in black who take her by the shoulders. The young man follows behind and leads Chiyoko into a fortress where a tapestry on the wall depicts three characters spelling out "Kōdōsha". As she is offered a seat, Chiyoko reflects on how she made it out of that mess not only in one piece, but with only a few scratches to remind her of the story.\n\n"My name is Chiyoko Taki, I've lost my home in all the turmoil, I have nothing to my name, and no place to stay." Chiyoko responded to the men when prompted to identify herself. As her last name came out of her mouth, the eyes of an older man in the room perked up, glancing over what the fox had brought in. "Are you the daughter of Sumitada?" the older man asked, this very question catching the attention of everyone in the room. Chiyoko gave only a nod.\n\nThe room went ecstatic. Sumitada, the one and only, whose name was whispered in the halls, that very same Sumitada who could fend off ten guys with only his judo moves? The daughter of a celebrity now in the room, now looking for their help? This was the stroke of prestige that would bring the group fame among the Japanese community.\n\nWith all the chattering, Chiyoko gazed around the room, from a perspective of a guest of honor yet with no one talking to her. The shoddy makeshift base of operations, the swords, banners and other weapons hung haphazardly to the wall. It was clear these men were mostly farmers and occasionally industry workers, many of which former members of the Shindō Renmei, who, while eager to act and take up arms, certainly weren't the most organised. Chiyoko could do nothing, but push herself further into her chair."
brazil_lacerda.133.a: "And Chiyoko glanced around, glanced around..."

brazil_lacerda.134.t: "Smile for the Camera"
brazil_lacerda.134.desc: "It seemed only yesterday Shizuo wrote his article in praise of Carlos Lacerda - a conservative hardliner and champion of stability, a man with journalism roots much like himself. All the talk of racial democracy in integration, like the sound of a butterknife running against a slice of toast. Was he not the man for the job?\n\nHow wrong he was proven, when Massa got involved in that hijacking - not only did it catch Lacerda with his pants down, but it demonstrated his incompetence for the whole world to see on their television screens. After that, left and right stories came out of racist, armed thugs, in search of the Japanese guy who picked some fight with them, somehow? It wasn't quite clear how that happened. Committed a crime? Harassed them? Looked at them the wrong way?\n\nNo matter. As soon as that movie was over, it was not the audience that flooded out of the theatre in an orderly matter but bloodshed and chaos, with the thugs hanging, shooting, or just leaving the moviegoers to bleed.\n\nShizuo Osawa took his notebook and pen with him. Anything to gather information, right? Anything to hear the perspective of the Nikkei. Hustling and running past fights and conducting interviews as the violence unfolded around him. Though he initially began discreetly snagging photos with his pocket-sized camera, gradually he emboldened, capturing the chaos in all its bloodstained horror.\n\nSoon after, a few cars marked with the insignia of the police pulled up, though as minutes turned to hours it became clear those uniformed men were not here to break up the fights. Some even joined in. Shizuo, armed with nothing but his camera, could only capture the violence, for an audience who needed not to be told."
brazil_lacerda.134.a: ""Mind your head, sir, do watch your step...""

brazil_lacerda.135.t: "Shizuo Osawa Becomes Mário Japa"
brazil_lacerda.135.desc: "Being swept by a tsunami of hate mail and harassment is nothing foreign to a journalist. And being a stranger in a strange land himself, for all the harassment to be of a racist nature? Nothing too out of the ordinary. The CCC, for all their talk on "hunting communists", seemed to be dedicating more time and resources to harassing journalists and, well, the same people the communists find themselves appealing to. But something today seemed to get Shizuo to turn back on his apathy. Maybe it was a bad day, a hate mail striking at the wrong nerve, or even the letters he received discrediting all the danger he had put himself through as nothing more than a quick cash grab for a headline that would sell.\n\nSomewhere in his pile of mail, he noticed an envelope marked with a red symbol, one from a band of leftist Nikkei militants. It was reasonable, wasn't it? They made it clear to whom they bore their allegiance to, the Vanguarda Popular Revolucionária. A familiar name it was, old school buddies from the University of São Paulo having ties with them too, the same group that wooed the likes of Massafumi before even. As the letter had instructed, Shizuo found himself at the recurring VPR meeting, to be onboarded by one Dilma Rousseff. Smooth as the rest of the onboarding process had gone, all but one task was left.\n\n"First things first. Have you come up with a codename for yourself?"\n\nShizuo recalled not so long ago the voice of an old man he came across in his journey to becoming the journalist he was today. An old, homeless man by the name of Mário, abandoned by society and left to starve on the streets. Watching him sweep the streets, the story of poor old Mário emboldened Shizuo. Something to fight for, eh? If not just for himself, then for Mário and all who suffered like him.\n\n"Mário, that'll be my name."\n\n"Aha, yes. Mário Japa.""
brazil_lacerda.135.a: ""Well, that settles it. I guess that's my name now.""

brazil_lacerda.136.t: "And Thus Caesar Watched"
brazil_lacerda.136.desc: "Ring, ring.\n\nVargas Jr. had been lamenting to hear from Lacerda for a while now. Having just arrived at the Edificio Matarazzo minutes ago, for the duration of the drive it bit and scratched at Vargas Jr.'s mind what the President could possibly want from him. A list of suspects? A map of hotspots of violence? Vargas Jr. had nothing to present to him. As he reached for the phone, he gulped, eyes peering to the opposing wall on the office.\n\nOn the other end was Lacerda, expectedly livid. As Vargas Jr. had suspected, the first thing the President had on his mind was the question of details. "Have you any clue what this shitshow could do to my approval ratings? I want answers, and I want them now!" That, followed by a tirade of noise on what this spelt for his racial democracy. "Damn you, I want your men on the ground this instant! Have they not given you a single word on the situation?"\n\nVargas Jr., doing his best to de-escalate the tension in the call, scrambled to find a scapegoat. The DEOPS had apparently been nothing but incompetent and unhelpful as of lately - though at the sound of that Lacerda's voice grew only louder and more unintelligible from the line. Vargas Jr. took a deep sigh. "Mr. President, please, stay out of this. There's nothing you can do about it right now and from the looks of things, it isn't something worth losing sleep over."\n\nTaking a moment to gaze out the window of his office, on the streets below he could see tiny figures of men running down the street from a plume of smoke further along the horizon. The reports that the DEOPS did give him indicated tens of thousands - in a city of six million. Even without the maps and documents, clearly the entire city was in chaos, with calls of help coming in from each end of the city every hour. Vargas Jr. quietly mustered out one last sentence."
brazil_lacerda.136.a: ""Mr. President, just sit back. I can't promise you much, but I can promise you that we're in for a long ride.""

brazil_lacerda.137.t: "Cabinet Crossroads"
brazil_lacerda.137.desc: "Phones were ringing like the bells of a church in a besieged city. Staffers trying to build a composite of the situation, the eyes of God gazing upon a city ablaze. Inside the cabinet room, Lacerda paced as Virgílio Távora, his Vice President, leaned against a wall. War Minister Golbery do Couto e Silva strolled in. The briefing notes sat compiled but untouched. They had already heard on the radio about the scale of the riots, the unending thrashing of a city in pain. Lacerda looks the two men up and down before beginning to speak.\n\n"The riots just won't stop. It's been days, it's stretched into weeks, and every day that passes the wounds fester, and now I hear there are fascists and communists on the streets, the greatest threats to our freedom acting brazenly in the streets of a burning city. We can't let this go on. I'm calling you here for advice, but I believe we must send in the military, we must put an end to this. Lacerda said with a somber tone.\n\n"Mr. President, I have full confidence in the ability of our troops to bring these hooligans under control. Our men are well trained. I simply see no other viable option to-" Golbery said before being cut off.\n\n"Carlos. We can't just do this. Fascists and communists want to burn our freedom to the ground, but if we send in the troops, we will only be inviting the same fire.\n\n"São Paulo has always been PSP territory. If we, the federal government, send in troops, we would be participating in what amounts to a coup against the state government. We would be destroying the very freedom we claim to defend. Instead, we need to work with the state police and the PSP; we can resolve this crisis without resorting to measures that would undermine our democracy in the long run. We cannot afford to be short-sighted." Távora said, standing in front of them and staring right at Lacerda."
brazil_lacerda.137.a: ""Golbery, ready the troops.""
brazil_lacerda.137.b: ""Távora, let's go to the city ourselves.""

brazil_lacerda.138.t: "Chaos and Regression"
brazil_lacerda.138.desc: "Samuel Wainer — writing for the Última Hora — reporting from São Paulo.\n\n"Looking out of the window today, you would be forgiven for thinking that the Nazi bastards from across the water had decided to try their hand, but no. The invasion we are experiencing today is coming from our very own government in light of the recent riots, the causes of which we still have yet to ascertain, likely due to cops beating up protestors, the usual.\n\nIn any case, while the circumstances of the riots remain unclear to us, their consequences are currently becoming very clear. DEOPS and the Força Pública have proven to be able to do nothing but stick their heads into the sand, leading us to a man of the other extreme, Golbery do Couto e Silva.\n\nMr. Silva, the newly appointed military governor of São Paulo, has exploited his ill-gotten position with abandon. Say what you will about the PSP's administration, but weakening it in favor of an explicitly military presence is a much greater evil. Presumably, Lacerda thinks he can use the military for his own gain. All I can say to you, the reader, is that he will be bitterly disappointed."\n\nThere was no standing ovation for Wainer's words by the Paulistas, but the physical testament of Última Hora copies containing his write-up being unavailable to buy, having flown off the shelves as word of mouth did its magic. His feelings were far from isolation."
brazil_lacerda.138.a: "One step forward, two steps back."

brazil_lacerda.1381.t: "Pushed Off The Stage"
brazil_lacerda.1381.desc: ""Our security forces are maintaining a protective cordon around the perimeter of the airport. The Força Pública maintain control of the situation-"\n\n"With that moron in charge?" Adhemar, red-faced, threw his head back in his chair. "Christ, Lacerda! Him over me?"\n\n"-under the leadership of the Governor, with whom I am in daily contact-"\n\n"What the fuck does he know about any of this? The gall of it, I swear-"\n\n"Uh, Mr. de Barros," asked a brave PSP staffer, "who are you talking to?"\n\n"Lacerda, you dolt. Our President." He scowled at the radio, through which Lacerda's latest press conference played. "Or I should be, God damn it. I sent him a telegram, you know. Told him I knew their kind, I could be a reasonable mediator in this mess. But he didn't fucking listen to me, now did he?"\n\n"It was, uh, very short-sighted, sir. You have a meeting, by the way, with the Rio office in ten minutes."\n\n"Tell them I'll be there in fifteen. And don't bother me again until I open this door." With that, he slammed it in the aide's face and twisted the radio off. Brooding rarely did Adhemar any good, but he lacked a better way to deal with the rolling anger in him. He tried to put it aside and think about it rationally. The aide stayed by the door, awaiting his re-emergence. He had never seen him in such a bad mood, and it worried him.\n\nBut it worried him more when Adhemar opened the door with a calm smirk on his face. "Now," he said, "what's the Rio office want this time? Campaign funding?""
brazil_lacerda.1381.a: "Plans form. Gears turn. Setbacks and obstacles become opportunities."

brazil_lacerda.139.t: "Icepick"
brazil_lacerda.139.desc: "TOP SECRET\nFOR THE PRESIDENT'S EYES ONLY\n\nSÃO PAULO — SEVERE SCENES OF SOCIAL UNREST\n\nAs requested, I have attached a detailed list of the locations of troops currently stationed in São Paulo. One thing you will notice is that not all of the checkpoints are in the direct vicinity of Liberdade. In fact, some of them are quite a distance away. This decision was made after our spotters identified several hotspots of activity frequented by the rioters.\n\nOur military forces have now locked down these areas and others that are known for social congregation. The initial use of force prompted by the declaration of martial law has been met with extra sparks of unrest separate from the riots themselves, but this has now passed. As our men acclimatize to the situation on the ground, we will begin to subdue it quickly, rest assured.\n\nOnce this matter has been dealt with, I would like to investigate the cause of the riots. I have long-harbored suspicions regarding the conduct of Sérgio Fleury, and I believe his incompetence and negligence are not entirely the result of his lacking mental faculties. If you permit me this favor, I assure you it will turn up fruit.\n\nFROM THE OFFICE OF GOLBERY DO COUTO E SILVA\n\nORDEM E PROGRESSO"
brazil_lacerda.139.a: ""Silva will have whatever he needs as long as this is taken care of.""
brazil_lacerda.139.b: ""Is he serious? We won't allow this.""

brazil_lacerda.140.t: "Sledgehammer"
brazil_lacerda.140.desc: "TOP SECRET\nFOR THE PRESIDENT'S EYES ONLY\n\nSÃO PAULO — SEVERE SCENES OF SOCIAL UNREST\n\nAs requested, I have attached a detailed list of the locations of troops currently stationed in São Paulo. One thing you will notice is that not all of the checkpoints are in the direct vicinity of Liberdade. In fact, some of them are quite a distance away. This decision was made after our spotters identified several hotspots of activity frequented by the rioters.\n\nOur military forces have now locked down these areas and others that are known for social congregation. The initial use of force prompted by the declaration of martial law has been met with extra sparks of unrest separate from the riots themselves, but this has now passed. As our men acclimatize to the situation on the ground, we will begin to subdue it quickly, rest assured.\n\nI would like to use the rest of this report to detail a proposition of mine, something we can gain from these riots. The PSP has proven to be a consistent resistant against martial law in São Paulo, regularly agitating against our efforts. This can not continue. We must stop their efforts, even if it means using force. Our lives in government will be far easier if we do so.\n\nFROM THE OFFICE OF GOLBERY DO COUTO E SILVA\n\nORDEM E PROGRESSO"
brazil_lacerda.140.a: ""No need for stupid political point scoring, just do your damn job.""
brazil_lacerda.140.b: """Break them, smash them, render them asunder. They have proven too troublesome.""

brazil_lacerda.141.t: "Where Incompetence Ends and Obstruction Begins"
brazil_lacerda.141.desc: "Getúlio Vargas Jr. occupied himself with his usual work; the riots may burn, but life has to continue for the vast majority — that was what he had to do. That would have been his day had Golbery do Couto e Silva not barged into his office.\n\n"Why are the police — those meant to be stopping these riots — armed with virtual sticks and stones to break it apart?" Vargas Jr. realized he would not be allowed to answer, only listen. "DEOPS shuts down our comms; our military guys can't get a word in edgewise with them, and when we do, the support we get is never enough."\n\n"I could go on all day with my concerns about your police department's unending incompetence, but I only have one question for now: Why can't I get a straight answer from your police HQ regarding anything?" Vargas Jr. waited for a split-second — making sure he could speak — then responded.\n\n"The military always cooperates with the police — the reverse is also true. I have no interest in obstructing anything, Mr. Silva. There is no conspiracy on their part either; human errors happen. We all want to see these riots ended as soon as possible." Vargas Jr. didn't know what he had said, but it raised a storm in Silva.\n\n"There very much is a conspiracy afoot here. You might not be involved in it, but I know who is: Sérgio Fleury. I smell a rat within that man, and you can't convince me otherwise. He's too clever for his own good. Your city would be for the better if you let me remove him." Before thinking too carefully about precisely what Silva meant by "remove", Vargas Jr. intervened.\n\n"I'll handle this, please. You have my word that I will look into it so we can remove any obstructions." Vargas Jr. tried to read Silva's face after, but it was a blank. After an uncomfortable length of time, Silva gave him an answer."
brazil_lacerda.141.a: ""Fine, but work quickly — quicker than the police.""
brazil_lacerda.141.b: ""No. Civilian influence has failed time and time again. I'll deal with him.""

brazil_lacerda.142.t: "Hero of the Ever Stagnate Great"
brazil_lacerda.142.desc: ""Well, the savages here, they don't listen to reason. The only language they seem to understand is 9mm." Liberdade Avenue was a trek, and Silva's only reward for making it down here was to watch Fleury posture to TV cameras. He had a little coterie with him too — full of macho hard men — the type of cops who like to beat up black men for cheap thrills.\n\n"Some people like to criticize me, but they've never been in the thick of it." Fleury began to move with rehearsed steps like a player in the São José. To Silva's horror, he realized Fleury was inching towards his position. "They lack a common sense that's second nature to men well-used to the battlefield." Fleury posed beside Silva to the camera, much to the General's dismay.\n\n"After enduring a virtual eternity of press-baiting, Silva finally had Fleury to himself to discuss tactics, eventually. "This place is a mess. What the hell have you been doing here?" Fleury opened his mouth, but a distant gunshot followed by a scream spoke for him. Liberdade was experiencing anarchy; he thought better against lying. "Listen, we can fix this, but you must follow my instructions."\n\n"You have your riot police, yes?" Fleury nodded. "Get them to flush out the smaller streets. My boys will cordon off the major checkpoints. We'll break them down one section at a time, and they'll have nowhere to go. After that, we just need to mop up the remnants. Got it?" Fleury could only nod again like a bold child just told off.\n\n"Very well. See to getting your forces into place. I'll do my part." Silva got to work, brushing against a reporter trying to interview him. Fleury tried to attract the press man's attention but failed. The only way he would get his face in the papers would be through quelling the riots..."
brazil_lacerda.142.a: "...or as the man left standing in Liberdade's ashes."

brazil_lacerda.143.t: "Shields and Tear Gas"
brazil_lacerda.143.desc: "Today, Liberdade resembled more of a hellscape than a place people called home.\n\nOut from the haze of smoke and tear gas came a wall of riot shields, creeping closer every moment with the loud thumping of dozens of boots. Within minutes of the military's reinforcements arriving, nearly every major street that crisscrossed the Liberdade district had now been choked by a wall of policemen and soldiers. Those either too slow or too stupid to have escaped from their advance were mercilessly beaten by the faceless men, who paid little mind to the race or creed of their victims.\n\nThe rest fled for their lives, but it soon became apparent that these desperate souls had little idea of where to go for safety. After several groups ran from one cordon only to be met with the sight of another line of shields, hordes of panicked civilians began to clog the roadways. With little pause given to this sight, the police continued their merciless advance.\n\nThen, when the throngs of shouting people became too heavy to clear through intimidation, the first gunshots rang out.\n\nFor most, there was uncertainty as to who fired first. Perhaps the police had begun to fire warning shots to encourage the congestion to clear up, or perhaps desperate Nikkei felt their only option was to fight their way through. No matter what started it, the crowds looked in confused horror as several among them crumpled to the ground dead. The shouts of anger gave way to screams of fear in nearly an instant. They scurried like rats into the buildings on either side, often forcing their way in if the door proved uncooperative. To stay on the street was to gamble with your life.\n\nUnfazed by the scenes of chaos unfolding in front of them, the police continued their march, slowly choking the life out of Liberdade."
brazil_lacerda.143.a: "Order will be restored."

brazil_lacerda.144.t: "Policing the Police"
brazil_lacerda.144.desc: "Above all the possible fates that can befall a policeman, there is one that stands as the ultimate epitome of failure. Losing a partner? Tragic, but ultimately temporary. Being killed in the line of duty? At least you will be remembered with dignity. To have your fellow officers place your hands in cuffs? There, at last, is rock bottom for a man in uniform. Such was the fate of Sérgio Fleury, police chief of São Paulo, and quite possibly one of the most unpopular men in the city.\n\nHis arrest had, predictably, caused a media frenzy. The disgraced police chief was led down the steps of his own station in handcuffs, hounded by reporters chasing the scoop of the century, and facing all manner of ridicule from the citizens he had once been entrusted to protect. Fleury let loose with a flurry of expletives towards both the crowd and his own officers, his emotions twisted into knots by the cataclysmic downfall the revelations about his station's conduct had wrought. Instead of protecting and serving the city of São Paulo, it had come to light that he and his officers had instead inflamed the riots that had set Liberdade alight, which proved to be the last straw for General Golbery.\n\nWhile the media circus carried on, the mood in DEOPS headquarters was unimaginably grim and fatalistic. The press celebrated the downfall of their boss, who was widely seen by all to be incompetent at best, and utterly malevolent at worst. Yet, he wasn't alone in his crimes. If the military could have the most powerful policeman in São Paulo arrested, were any of them truly safe from prosecution? Freed from the incompetence of the local police, it was almost certain that Golbery would unleash the unrestrained force of the military upon the riots, no matter how much Governor Vargas would scream and shout.\n\nPerhaps now, for better or worse, order could be restored."
brazil_lacerda.144.a: "Good riddance."

brazil_lacerda.145.t: "Military Precision"
brazil_lacerda.145.desc: "When the police were ordered to stand down and evacuate Liberdade, there was, at first, some confusion. What was soon to take place over the next few hours, however, would put to bed any doubts as to why this order was given.\n\nA large contingent of the Brazilian army thundered into São Paulo with a full complement of armored vehicles and helicopters, while thousands of bystanders looked on with a mix of awe and fear. The local police released their grip upon Liberdade as ordered, and in their place, an ironclad cordon of soldiers surrounded the district. For a moment, there was an ominous silence as groups of rioters and army units stared each other down, with the rioters' vocal anger dying down as they quietly feared what the heavily armed men would do next.\n\nThen, in a storm of activity, the soldiers leapt into action.\n\nPersonnel carriers thundered down the streets of Liberdade, with soldiers following close behind in tactical columns. Anyone unfortunate enough to have not sought shelter was either violently detained, shot, or run over. Even some police units, who had joined with the rioters, were not spared from their efficient brutality. With checkpoints established at critical intersections, small assault groups began to enter the buildings in search of suspected ringleaders involved with the riots, short bursts of automatic fire ringing out across the city as the army's operations intensified.\n\nAfter a few hours of action, however, the silence returned. The shouts, screams, and sounds of shattering glass had given way to quiet murmurs and the distant engines of helicopters. For better or worse, Liberdade had been pacified under the boot of military might. It remained to be seen if the wounds left behind could be healed as easily."
brazil_lacerda.145.a: "A textbook operation."

brazil_lacerda.146.t: "Silence in Liberdade"
brazil_lacerda.146.desc: "The riots that have inflamed Liberdade are no more, and São Paulo has slowly begun to return to a semblance of peace and order. After merely only a few hours, the army units deployed by Golbery were able to pacify the rioters with minimal resistance, quickly establishing forward positions within the district to dissuade anyone from potentially starting another incident.\n\nFollowing a period of strict curfews, it began to become clear that there was little possibility of further unrest, and the military at last released Liberdade from their vice grip, leaving nothing but the broken remains of a once vibrant quarter of São Paulo.\n\nWhile the riots were quelled in record time, it came at a price. The military is a powerful force to be wielded with care, and their deployment to São Paulo was anything but clean and surgical. There came countless reports of civilians being wounded and even killed by soldiers when their assault began, and the troops devastated many properties in their search for troublemakers.\n\nThis has merely worsened popular discontent against the Brazilian military, but at the same time, many are pleased to see the prompt return of law and order to the streets. Both President Lacerda and Governor Vargas have been praised for their swift and decisive efforts to bring an end to the riots, and privately, the men could not be more satisfied with the results.\n\nThe bleeding has been halted, and now begins the healing. Vast sections of Liberdade will need to be repaired, families who lost loved ones in the riots still demand answers, and the city as a whole remains uncertain as to what will happen next. The coming inquiries and investigations are certain to be a headache, but with the end of the riots, however, it is clear that the worst is over."
brazil_lacerda.146.a: "When in doubt, call the army."

brazil_lacerda.147.t: "A Sudden Accusation"
brazil_lacerda.147.desc: "General Golbery do Couto e Silva practically flung the door off its hinges, fuming with a frustration that had been building for hours. Behind it, he found the object of his fury: Governor Vargas, who was found lounging at his desk with a telephone to his ear.\n\nVargas shot a confused look at the general, before saying brief goodbyes to whoever was on the other end of the line. "General? What brings you to my office? I'm a little busy."\n\n"Yes, you are very busy, aren't you? Busy making my job harder. I want to know why your city's police are still being utterly useless, stalling our operations while the city burns. I've been to their HQ and nobody's telling me a goddamn thing. Do you want us to help with the riots or not?!"\n\nVargas' confusion only grew with these words. "I... don't understand. The police may have a different way of operating, but rest assured that they are fully willing to cooperate with the army. Have you spoken to Fleury about this?"\n\n"'Different way of operating'?! I've had enough of them, of Fleury, and you. You don't think I'm aware of what you're up to? You think I haven't read the reports of your policemen joining in on the riots?!"\n\n"Have you lost your damn mind, General?! What would I possibly have to gain from burning down my own city? If you're going to start throwing such accusations around, I suggest you bring actual proof!"\n\nWith that, General Golbery stormed off with a huff. He wasn't scared of Vargas, or any of his cronies in the PSP for that matter. If the rumors of his involvement were true, he wouldn't be much of an obstacle for long..."
brazil_lacerda.147.a: "He's clearly involved. Put him in cuffs!"
brazil_lacerda.147.b: "We'll find a way around that idiot."

brazil_lacerda.148.t: "Checkmate"
brazil_lacerda.148.desc: "The telephone rang once, twice, thrice... and then silence consumed the room once again. It was the fifth or sixth time Vargas Jr. attempted to contact someone in the local government, but it seemed like the billionth time he put down that damned telephone into the receiver, getting nothing in return despite how many times he called them. He bashed his fist against the table, muttering curses as he tried to think of something else in the frustrating silence that filled the room.\n\nHe looked around in his room, trying to think of something to do as no one answered his calls. And then, he remembered that day, when Golbery came into his office, fuming and eyeing him like a lion ready to pounce. Before he could connect the points, an aide twisted the doorknob of the office's door, entering the room in a hurry.\n\n"Sir, we need to talk," the aide said, worry in his eyes, putting a stack of white papers on his desk. The mayor looked at it wide-eyed: the names of many officials of the PSP within the city were marked in the papers, alongside it, the reason for their arrests.\n\n"Spurring on riots... sabotaging police business? What the... where is Golbery?" Vargas Jr. got up from his chair, looking around in desperation and frustration at the news that he had received.\n\n"He is not available for talks, sir. He is preparing to go to Liberdade with the troops," the aide said, watching as the man in front of him buried his face in his hands, muttering so he wouldn't scream."
brazil_lacerda.148.a: ""Golbery, you goddamned bastard...""

brazil_lacerda.149.t: "Blunder"
brazil_lacerda.149.desc: ""What in God's name is this, Golbery?!" Lacerda was furious, slamming the newspaper on the desk before him. Golbery could only stare back, confused as he saw the usually calm President lashing out at him. Golbery looked down at the newspaper, seeing a picture of Vargas Jr. in cuffs being taken away by the police, all thanks to his orders and some evidence he had gotten through less-than-trustworthy means.\n\n"You told me to sideline the PSP-"\n\n"That was not what I meant, you goddamn idiot! Now we look like fools!" Lacerda screamed at Golbery, who was torn between looking him in the eyes and lowering his head like a young boy listening to his father's complaints.\n\n"Just... let him go," Lacerda said, making Golbery get up and open his mouth to talk. However, after moments of staring at him, the minister simply stopped, nodding to the presidential orders given to him. Lacerda walked out of the room, Golbery reaching for the telephone on the table.\n\nDays later, in a room not so different from the meeting room of Lacerda and Golbery, Fleury cackled like a hyena after an aide had reported the news to him: Vargas Jr. was let go by the police, everything going according to his plan. Was the evidence real? Of course, it was. Just that it wasn't the mayor's doing. Everything was going according to plan for Fleury, causing him to cackle in glee.\n\nFleury stopped laughing for a moment, shaking his head slowly as he looked down at his feet. As he momentarily gazed at the protestors outside in the streets over his window, he could only wonder."
brazil_lacerda.149.a: "What the hell was Golbery thinking?"

brazil_lacerda.150.t: "The Battle of Liberdade"
brazil_lacerda.150.desc: "What transpired in Liberdade this afternoon could only be described as pure chaos.\n\nIn the midst of an escalating political dispute between the military and the police, a hasty deployment of army units commenced, with large columns of mechanized troops establishing a secure cordon around the district. Conflicts with the police, who had received conflicting orders from their own superiors to maintain their positions, arose immediately. Some willingly complied with the military's orders to withdraw, while others steadfastly refused to give up their post, creating an awkward standoff.\n\nThe mess truly began when the military received orders to move into the district to quell the riots. Upon entering Liberdade, one unit of soldiers encountered a man wearing half of a uniform beating a Nikkei half to death, and shot him, assuming him to be one of the rioters. Their assumption was correct, but they had failed to realize that the man was also a police officer. A flurry of panicked reports flooded police channels of army units opening fire on the police, and within minutes, furious gun battles between the police and the military erupted across Liberdade.\n\nAs the chaos continued to spiral, groups of armed rioters began to join in, and citizens across São Paulo began to fear for their lives as what sounded like open warfare became audible throughout the city. Surrounded on all sides by rioters and police forces, the army began to call for reinforcements to quell the chaos, but the sight of even large forces trickling towards Liberdade caused further uncertainty for the people of the city.\n\nReportedly, an order to stand down has yet to be received by either the police or the army, and as the chaotic three-way battle continues to rage within Liberdade, many are beginning to wonder if the chaos will ever truly end."
brazil_lacerda.150.a: "There's going to be hell to pay."

brazil_lacerda.151.t: "The Fire Burns Out"
brazil_lacerda.151.desc: "While the sight of the military's arrival may have been a source of unease for some, many remained confident that their brute force would bring a swift end to the riots that had plagued São Paulo. Unfortunately, nothing could be further from the truth.\n\nShortly after the chaotic three-way battle that had rocked Liberdade began, army units became quickly overwhelmed by both rioters and furious policemen, and reinforcements were desperately called in to stabilize the situation. It took over 48 stressful hours for the military to even reestablish a secure foothold within Liberdade. Crushing the riot itself took a similar stretch of time, and proved to be no less chaotic. Sporadic gun battles raged on throughout the day and the night, but after four agonizing days, the sounds of conflict began to taper off, signaling the beginning of the end of one of the darkest chapters in São Paulo's history.\n\nIn the aftermath, the blame for this disastrous operation falls squarely upon President Lacerda's inability to effectively get the army and police to play nice, and Mayor Vargas for his indecisive attitude towards the conduct of the police. The political fallout is sure to be immense, but the burden placed on Liberdade is greater still. The district remains a blasted warzone, with countless dead lying across the streets and much of its buildings laid to waste.\n\nEven as the President orders an end to the occupation, many are left wondering where to go from here. The people demand answers as to how this all went so wrong, and Liberdade must be rebuilt. With this tragedy behind us, we can do little but move forward."
brazil_lacerda.151.a: "At least it's over now..."

brazil_lacerda.152.t: "Lacerda's Drive to São Paulo"
brazil_lacerda.152.desc: "The car radio was turned off at the President's request. He needed quiet reflection to chart the course ahead.\n\nHe glanced at the briefing materials his staff had stuffed into his car. He just needed to think. Vargas. The family name etched in history. The name etched into the chains that held this country back. Etched into the nameplate of the man he was about to meet. The man responsible for this crisis. An almost unbelievable level of political naivete and incompetence.\n\nHad Lacerda missed something? Perhaps he should hear from the man himself before jumping to conclusions. After all, that level of incompetence might be impossible. He was a boy, a son, in over his head, perhaps in need of a lifeline.\n\nThen again, no crisis is without opportunity. As the city burned, he could use the smoldering embers to destroy Vargas Jr., destroy the PSP, ruin the prodigal son. As they lurched from crisis to crisis with no help, he could shine the press on every minute failure. After all, help from the central government, the military, would clearly be government overreach.\n\nThe PSP was born slippery, always miraculously escaping consequences, either through corruption or the greater incompetence of others. Now it was time for a reckoning. They would suffer for their mistakes, certainly without any help from the presidency.\n\nIt would not be long before the countryside gave way to the city."
brazil_lacerda.152.a: "Always in crisis, opportunity."
brazil_lacerda.152.b: "The President and Prodigal Son together."

brazil_lacerda.153.t: "A Smoking Pan, a Smoking City, a Smoking Barrel"
brazil_lacerda.153.desc: "The venue was a restaurant in the center of town. At the back, cooks were frying. Lacerda was in his element being asked questions by the local press while members of the public were also allowed to spectate their President held back by a light complement of presidential security. The crowd started small and quiet but started to gain steam. The interview questions came steadily, with the first journalist stepping up to the plate.\n\n"So Mr. Lacerda you're here in your official capacity, do you have anything to say to the citizens of São Paulo?" He asked.\n\n"Thank you. I would like to say that my heart is with the people of São Paulo in these turbulent times. I would like to stress that I am respecting Vargas' wishes in allowing him to handle this situation without military intervention. I am respecting the voters' wishes from the last election and placing my faith in the authorities here and DEOPS. Together we will see how they choose to handle the situation and see if Vargas is able to do enough to earn the trust of the citizens of São Paulo." Lacerda shot the crowd a smile.\n\nThe questions continued on and the crowd seemed for the most part excited to see the President. Gradually they came to hang on every word but that was not a universal reaction. A gunshot rings out from the crowd. It was shot wide of the President but certainly in his direction. Adrenaline diffuses through Lacerda's blood as the small security detail took him into the cover of the restaurant. This was not his first time with an assassin's bullet meant for him. A bullet, the spitting oil from a frying pan about to smoke. The city was alight and unstable and all he had to do was nudge it in the right direction."
brazil_lacerda.153.a: "Lacerda still at large."

brazil_lacerda.154.t: "Vargas Alone"
brazil_lacerda.154.desc: "Vargas Jr. was not typically known as a tired man. He was known for being energetic, always trying to please. As the fires burned so too did this veneer. Phone call after phone call, journalists, the police chief, his siblings. All of them took away every free moment he had. Yet even as the riots occupied his mind wholly and completely he was in the end no closer to a resolution. The police continue to make mistake after mistake.\n\nAs the car takes him to the meeting he wonders what new concepts Lacerda and Távora intend to introduce to him. He looked out at the city, cafes were shut and there were fewer people on the street than normal, businesses miles away from the riots boarded up and Vargas could not blame them.\n\nHis car pulled up to the police station where they'd be meeting and inside where he expected to see Lacerda and Távora only, Távora stood.\n\n"Lacerda?" Vargas blurted out without thinking.\n\nTávora spoke up "We've been waiting for him here actually." He turns to a staffer. "It appears that our President is otherwise engaged in the city, and well, it appears I've been entrusted with the power to make various agreements with you here."\n\n"He wouldn't come and speak to me? In the middle of a crisis, the President has left me alone?" He looked at Távora, his eyes showed a deep exhaustion, a frustration, almost a betrayal as though he'd been left to tend to the fires without a hose.\n\nTávora stood still. He knew full well what Lacerda was up to. He had been involved with calling all the journalists for it after all. Poor, poor Vargas."
brazil_lacerda.154.a: "He never had a chance."

brazil_lacerda.155.t: "The Gunshot That Ended a Career"
brazil_lacerda.155.desc: "Vargas continues to listen to Távora, nodding while almost nodding off. He was exhausted, a man stretched too thin over the city that kept him awake. Távora is talking about the state of the police and about the need to whip them into shape again and Vargas gives a nod. Vargas shakes the hand. It'd be good to have some more federal support with an uncooperative police force. As the two shake of it and walk out into the street they're confronted with a mass of journalists. A camera flashes. A journalist with an open notepad in front of him blocks the two men's path.\n\n"Vice President, Governor, just moments ago we received news of an attempted assassination against our President. He was at a press conference in this city of yours. Do either of you have any comments? In particular President Lacerda stated that he was 'respecting Vargas' wishes to keep the military from intervening in the crisis,' any comments Governor Vargas?'\n\nExhaustion leads to slow reactions and as such it was Távora, Mr. Vice President who steps forward first and says, "Governor Vargas has not asked for military intervention and we're respecting his autonomy as governor and we are respecting his wishes to not involve the military in this crisis."\n\nVargas looked over in horror as the jaws of Lacerda's trap closed around him. Távora looks over with a smile as he waves at the crowd. Vargas stammered no comment to the army of reporters, the only army in the city and returned to his office to await the damage of the newspaper headlines. They would come in earnest. 'Weak-willed,' 'allowed the security to deteriorate to risk the life of our President.' So the columns went. Vargas picked up the phone, Golbery was on the other end of the line. Soon he held a press conference and announced his request for military support from the federal government and asking Fleury, his police chief, to allow the military to oversee operations."
brazil_lacerda.155.a: "So the military would come."

brazil_lacerda.156.t: "Two Motorcades Passing"
brazil_lacerda.156.desc: "The ride back to the capital from São Paulo felt longer than the journey there. Lacerda looked out the window as the city gave way to countryside. He could still hear the sound of the shot ringing in his ears. He could still feel the arms of his security around him taking him into cover. He could remember the adrenaline surging through his body. This time things ended a little better than last time. No-one else was hurt with the bullet marked for him. Though given that there was a city ablaze perhaps 'no-one else,' was a little bit of a misnomer. Still it was all strange how the situation rhymed, a shot that he could use to further his own goals and hasten the demise of Vargas' reputation. Exploiting his own botched assassination was in itself strangely distasteful to him. he could still smell the gunpowder, the ringing in his ears punctuated a painful sensation every time he used the assassination attempt for his own purposes. It would not leave his thoughts always coming back around and onto itself. Bending around the bullet that was marked for him. Even as he felt good about finding a use for even his own assassination attempt the sound still rang.\n\nGoing into São Paulo was a triumphant minister of war Golbery, now the newly instated military governor. He was given simple, understated and explicit orders from Lacerda. End these riots now. It was what he intended to do from the very start and now after Lacerda's fantastic political maneuvers he now had the legitimacy he would have lacked had this action been undertaken without Vargas' mistake. Golbery wears a smile as his journey draws close to its end.\n\nFleury, police chief in São Paulo, sat in his office awaiting the arrival of the military governor trying to design for himself an effective strategy. At this point it did not matter the performance of his own police. If the military came into the city and failed where he had then it could only stand to benefit him. Military incompetence could be a tool of its own and he could be the man to use it for the right purposes."
brazil_lacerda.156.a: "Golbery would have his intervention."

brazil_lacerda.157.t: "Vargas and Lacerda Shake Hands"
brazil_lacerda.157.desc: "Lacerda, Távora, walk into a room in the Edifício Matarazzo just outside the city. The man was stuck in a miasma of frenzy and exhaustion. A storm inside of him mirrored the storm inside the city. As the two men came in Vargas stood up with newfound energy to shake the two men's hands. Lacerda asked for a brief explanation of the situation and he was happy to oblige\n\n"The police have been trying to keep the situation, trying to contain the situation and ameliorate the worries of the people in Liberdade while trying to stop the riots, trying to contain. The police have been difficult. Slow to react to riots slow to keep things contained. Sluggish. I trust Fleury, he's been a good police chief all these years. Still I just need to make sure he's doing the right thing to contain the situation." Vargas stammered on before being interrupted by Távora.\n\n"We should talk to him we need to really get a handle on the situation here but we should pursue other avenues, are there any humanitarian organizations trying to work to mitigate the impacts of the riots? Maybe we could do something about that Carlos?" Távora turns towards Lacerda.\n\nHe thinks for a moment about the concessions that might be needed to work out this situation. The demands Fleury might have. He was worried but there was not a better alternative available to him. He gave the two a nod. "Let's get this done for the good of the city." He says. They stand up and shake hands before Vargas Jr. comes towards Lacerda pulling him aside. He quietly asked for a moment for the two of them to talk alone. Lacerda gives him a look of confusion but also a nod. As they left the meeting room staffers got to work planning even more meetings as the city smoldered on."
brazil_lacerda.157.a: "Even in the man's tired eyes, he looked relieved."

brazil_lacerda.158.t: "The Chief and The President"
brazil_lacerda.158.desc: "The office of Sérgio Fleury, police chief of São Paulo police. It had always been busy with a simmering activity through the offices as his orders circulated down the ranks. Since the riots had begun to burn through Liberdade his office had become far busier. This would be in line with an effective police system acting to decisively bring an end to the fires, and yet the riots burned on. Fleury was excitedly imagining the President sat in front of him, in his office with his name on the door. His newly polished portrait on the wall.\n\nWhen they arrived Fleury directed them into his office and began to speak. "Our brave officers found decisive evidence of a Japanese state connection to Shindō Renmei, they are everywhere in this city and we have been doing our best to burn out the rot. If not for the riots we would have been unable to even discover the extent of this plot to subvert our democracy and hand it over to those, Asiatic businessmen. Mr. President, Mr. Governor, Mr. Vice President. From the riots to the plots, we are stretched too thin. I have a request in order to protect the integrity of our state, to protect our democracy, it's really a small request considering the extent of the risks facing us. I am requesting a simple budget increase and some extra capabilities. Some helicopters, armored vehicles, and a 100% increase to our budget." The mood changed at his request. Where before Lacerda, Vargas, and Távora had been nodding along for the most part that number was far too high.\n\nLacerda was quiet. He didn't like the flow of conversation and a doubling of budget would be absolutely beyond the pale. "With respect Fleury, our state has many priorities to deal with, and my powers are limited but I could authorize a 75% increase in funding potentially." He sat back thinking about his options, he would only have limited resources to deal with this crisis. He could instead deny Fleury, call him out on his opportunism, and not promise him anything, saving his resources for another angle on diffusing the riots, or trust in Fleury."
brazil_lacerda.158.a: "Trust in Fleury."
brazil_lacerda.158.b: "He's asking too much, call him out."

brazil_lacerda.159.t: "The Humanitarian Committee Comes Together"
brazil_lacerda.159.desc: "The Edifício Matarazzo was where the committee meeting was to be held. President Lacerda, Vice President Távora, and Governor Vargas would all be in attendance along with representatives from Labour Unions in the city, the head nurse at a local hospital, the chief officer of the University of São Paulo's student Union, and a nun representing local churches. The meeting started off on time and in good order until the representatives in the committee room started to say their demands. Their prescribed medicine was a series of funding injections. The volume started to rise as negotiation positions jostled against each other.\n\nAs the representatives started to fall against each other Távora seeing through the posturing of each interest group cleared his throat. He starts to speak. "Thank you, all of you for coming here to help us understand this crisis that we are facing. We want to do our best to help and to target aid in the most effective way to help all of the people you represent. Acting like enemies won't help anyone. Every member of a Labour Union will need to visit the hospital, pray at a church, they may have a son in the Student Union. First and foremost we need to create a coherent, concrete document here today which we can work from to help this city get back together." The tone in the room shifted as a real working document started to swirl together. There would be funding packages for the hospital, and aid for local workers who had not been able to work due to the businesses they work at being shut among a series of other measures. As the deal came together Vargas looked with glee at the sums being discussed, how they might go into his city.\n\nLacerda sat back worried as the numbers rose and rose. Távora had kept things within the realm of possibility but it was still a painful amount of money in a crisis that had not yet been resolved and one he only had limited resources to deal with. He could take the deal coming together or try and negotiate things down even further himself."
brazil_lacerda.159.a: "Go with Távora's working document."
brazil_lacerda.159.b: "It's too much, Lacerda negotiates them down."

brazil_lacerda.160.t: "The Sins Of The Father"
brazil_lacerda.160.desc: "Days of committee meetings went on and on in the towering halls of the Edifício Matarazzo, Lacerda and Vargas took a break, Távora was busy attending to some members of the student union, leaving Lacerda and Vargas alone.\n\n"You know Lacerda, I never thought we would be working so closely together. I remember during my campaign I spent most of it talking about Gomez, the UDN, how they were threatening to destroy my father's legacy. I thought the UDN couldn't solve the problems of our country, of this city, but you worked hard for the good of this city. I'm not Adhemar, I don't lead the party, but we could consider working a little closer together in the future, coordinating a little in the press, maybe even in the next senate elections. Not an alliance, of course."\n\nVargas paused as Lacerda thought carefully, and as he was about to answer, Vargas started babbling again. "I can't believe how much my father deceived me into thinking the UDN were American puppets trying to take away our freedom, trying to ruin Brazil, I see now that my father, his policies, they were misguided. I see now that the UDN was working all along to improve Brazil, just as we were. I've worked so hard in these riots, and you've worked to help me deal with this situation, that I feel we're in a position to work together on a broader scale." Vargas extends his hand to Lacerda.\n\nLacerda sat back. This agreement felt like a trap. An attempt by the PSP, by Vargas, to undermine the UDN and use its influence for their own ends. But there was a knife in his words. It was true Vargas was seen in the press actively helping people. He was seen as a hero, working hard for the riot victims. If Lacerda jeopardized his relationship with Vargas and the PSP and called in the military, people might see it as a failure on his part to work with Vargas.\n\nPerhaps he should just take Vargas' outstretched hand..."
brazil_lacerda.160.a: "Lacerda leaves the room."
brazil_lacerda.160.b: "Lacerda shakes Vargas' hand."

brazil_lacerda.161.t: "Shots Fired"
brazil_lacerda.161.desc: "To say that the day's events had been a rollercoaster would have been an understatement of no small proportion. Heavily-armed police units established a tight cordon around Liberdade, their imposing presence causing the riots to nearly come to a total halt. Activities by Nikkei militants too became quieter still in the face of what appeared to be an impending crackdown by the police. When the shields raised from the ground and the boots began to march into the district, it appeared that everyone's assessment of their intentions had been correct. What was not expected, however, was the outcome of the attack: total and unmitigated catastrophe.\n\nThe riots almost immediately became inflamed once again as the police moved deeper into Liberdade, and cohesion between various units began to break down in mere minutes. Some less scrupulous squads ran off to join the rioters on their own volition, while others found themselves immediately pinned down by Nikkei militants in enfilade. By the time the sun fell, the São Paulo police were forced to pull out of Liberdade, but even this proved to be a difficult task with how poorly coordinated the operation had been.\n\nThese reports, naturally, caused quite a stir for Vargas Jr. once they had reached his office. Another failure to lambast Lacerda over, no doubt! Had he taken the riots more seriously, and listened to his advice, perhaps the police operation would have gone more smoothly, he thought. He quickly shoved the reports of the day's events into his desk as soon as he had finished reading, and ran out the door to his office without any hesitation. Vargas Jr. had a dire need to speak to the press, and get on top of this disaster before the President could raise any doubts about the competence of his police force. Instead, it would be Lacerda who would catch the blame for this debacle, assuming all went to plan..."
brazil_lacerda.161.a: "São Paulo will handle it. It must."

brazil_lacerda.162.t: "Calling the Cavalry"
brazil_lacerda.162.desc: "Carlos Lacerda could scarcely believe what was unfolding before him. São Paulo, one of the largest metropolises of Brazil, being held hostage by its own mayor! Lacerda was no fool. He could see Vargas Jr.'s intrigues as plain as day, and no amount of media blitzes was able to completely mitigate the damage caused by the catastrophic performance of his police yesterday.\n\nOr was it? Somehow, the idiot had managed to maneuver himself into a favorable position despite the practical demonstration of his incompetence, and shifted the blame for the disaster towards the President. Lacerda had quite enough of being lambasted over his indecision. They wanted action? Fine. They were going to get it. His hand hovered over the telephone on his desk. The number to reach General Golbery floated around quite prominently in his head.\n\n"General? I've thought more about your proposal. I'm sure you saw what happened with the police yesterday, yes? We're going to have to do their job for them, after all."\n\nThe voice on the other end hesitated. "There will be consequences. The mayor isn't going to like this one bit. He's going to sic his media sycophants on both of us. You are aware of this... right?"\n\nLacerda sighed. "Let me worry about that little bastard. Just focus on getting your men over here. Call me back when you've got everyone ready to move in." With that, he placed it back into the receiver. Golbery was right, of course, Vargas Jr. wasn't about to just let him invade his city without complaining about it. But Lacerda could deal with complaints, he just wanted these damned riots to be over."
brazil_lacerda.162.a: "Time to bring in the big guns."

brazil_lacerda.163.t: "Restoring Order"
brazil_lacerda.163.desc: "The air was tense as the São Paulo police began to cut off every road leading in or out of Liberdade, establishing a strict corridor around the entire district with barricades and lines of riot police. When the officers descended upon Liberdade to bring the riots to a swift conclusion, they did so spectacularly. With the support of both Mayor Vargas and the Brazilian government behind, the police presence had been bolstered significantly with modern gear that enabled tight coordination and the swift rout of the rioting crowds. Tear gas flooded the streets as walls of riot shield marched ominously forwards, water cannons from nearby trucks blasting anything that was able to brave the white, fiery clouds.\n\nAs the police advanced, humanitarian efforts began in tandem. Churches, hospitals, charities, and various other organizations already had hands available on the ground to aid any wounded they came across, no matter if their wounds came from the rioters or the police. These efforts safely spirited many injured Nikkei away to places where they could recover in peace, and were out of the potential clutches of militant organizations.\n\nThe action lasted well into the afternoon, but as the sun fell, the riots that had wracked Liberdade ceased, replaced instead by a heavy-handed police presence that did not seem to be going away any time soon. Vast columns of arrested militants continue to trickle out of the city and into the jails for processing, and those who have evaded the law are no doubt rethinking their life choices at this juncture. Indeed, the operation was a success, and although there were a few hundred civilian casualties, it seems that the bloodiest chapter of the Liberdade debacle has been brought to a satisfying close. None are more satisfied than Mayor Vargas and President Lacerda, whose first act in their new partnership has proven to be fruitful indeed..."
brazil_lacerda.163.a: "And now, the rebuilding may begin."

brazil_lacerda.164.t: "The Smoke Clears"
brazil_lacerda.164.desc: "Within 48 hours of the beginning of riot control operations in Liberdade, it would appear that São Paulo has returned to some semblance of peace after days of violence and uncertainty. The police presence in Liberdade remains strong indeed, with armed officers on every street corner keeping their eyes peeled for anyone brave or foolish enough to try and start trouble again. The leadership of the militants, including Mário Japa, remain at large, but have been forced deep underground. The large groups of armed policemen is still cause for some concern for the civilians, but many, particularly those who live within or in close proximity to Liberdade, are quietly thankful that there was no apparent need to call upon the brute force of the army.\n\nEven as harrowing reports of civilian casualties and corruption at the heart of DEOPS worsening the riots continue to trickle into the media cycle, the success of the police's operation has had Mayor Vargas with much to be feeling proud about. His bargain with Lacerda had paid off far more than he had anticipated, and now he had most of the country rallying around him. While many had cause to question his intentions in the midst of the riots, few can doubt his abilities now. Even now, several opinion pieces are in the works detailing Vargas Jr.'s acumen as a crisis leader.\n\nYet, in spite of all the optimism in the wake of the nightmare's end, Liberdade remains in ruins. Hundreds lay dead, and thousands more wounded, while more still who fled the district during the riots remain unaccounted for, and it is unclear if they will ever return. Reconstruction efforts must begin soon: the district must be rebuilt to its former glory, and formal investigations into the conduct of all parties involved will no doubt need to be prosecuted..."
brazil_lacerda.164.a: "It could have ended worse."

brazil_lacerda.165.t: "Among The Rubble"
brazil_lacerda.165.desc: "A thin, aquiline nose poked out from the rubble. The firefighter, using what little strength was left to him, pulled away the refuse that covered it with torn and weathered gloves. Blank eyes stared out from an ash-covered face to greet him. He lifted the mangled body out from beneath chunks of concrete and rebar and loaded it onto a nearby stretcher. Bodies like this could take weeks to ID in a crisis such as this. Some of them were never collected.\n\nRogério Chaves Mantovani's blue-steel eyes were covered in dark bags. He had not slept for a full day, having worked triple shifts to help the clean-up crews. He had coordinated the bulldozers in clearing up the densest piles of rubble, and pulled up with aching muscles the corpses of countless, nameless civilians. His superiors finally stepped in: twelve hours back at the station, ten of them in rest, and they weren't going to hear any more bullshit. Mantovani, too tired to object, acquiesced.\n\nHe clambered down makeshift stairs, clutching the rail, towards the edge of the safety cordon. A grieving crowd had gathered around the periphery; a mixture of faces and hands extending just beyond the threshold. The faces, contorted in fear and panic, begged to let past, to identify among the dead their missing. Their hands bore their photos, smiling faces from the past. Mantovani slouched through the threshold. Photos breached his peripheral vision. They wanted to know if he had seen them.\n\nNestled between this crowd was an old Nikkei; thin white hair, patchy and tangled; eyes wide as if he'd lost its lids. He held up a photo which caught Mantovani's gaze. He limped towards the old man, gently took the photo from his bony fingers. He saw the small, aquiline nose of its subject.\n\n"I'm sorry," he mumbled. The old man blinked. Mantovani handed back the photo, turned his head and walked away."
brazil_lacerda.165.a: "Away from the pain."

brazil_lacerda.166.t: "The End in Sight"
brazil_lacerda.166.desc: "Liberdade remains in a dire state, and a very large portion of its Nikkei inhabitants have been scattered to the winds, deprived of their homes in the midst of the race riots. In an effort to prevent a full out homeless crisis from taking place within São Paulo, the government has gone ahead with efforts to provide temporary housing for the displaced Nikkei. Buildings have been reused to serve as ad-hoc apartments, while tent areas and trailer parks have been established in parks around the city. While this has indeed accomplished much in stopping the bleeding, our efforts to provide housing have nevertheless begun to cause problems of their own.\n\nThe tent cities and trailer parks have been established in areas that were, before the riots, open to the public, which has caused no small amount of resentment from the locals. Perhaps more worryingly, however, is the fact that the housing presents a very easy target for rioters looking to continue what they started in Liberdade. Nevertheless, although there are scattered reports of harassment and other hate crimes, local security is effective enough to prevent the situation from spiraling out of control. The overall trend is remarkably positive considering where things were not too long ago, though it is clear that further action remains to be taken before the troubles fully subside."
brazil_lacerda.166.a: "More police to ensure order."
brazil_lacerda.166.b: "Provide more shelters, just to be safe."
brazil_lacerda.166.c: "We must focus on rebuilding!"

brazil_lacerda.167.t: "Free For All"
brazil_lacerda.167.desc: "After the frankly disastrous way the riots in Liberdade were "handled" not long ago, there were hopes that this tragedy would finally put an end to the embarrassment.\n\nHowever, disturbing reports from those involved in the recovery efforts in Liberdade paint a rather pessimistic picture. While we have successfully set up some temporary shelters for the displaced, the neighborhood itself remains largely in a state of anarchy.\n\nNikkei attempting to return to their homes in search of valuables or loved ones are quickly chased away or even attacked by scattered groups of rioters and looters who still control large parts of Liberdade in the wake of the street battles.\n\nLooting is commonplace, as even those who have remained uninvolved so far see the lack of law and order in Liberdade as a ticket to get greedy and participate in the looting. Columns of people have been seen leaving the neighborhood with ill-gotten valuables in their hands: radios, televisions, appliances, even family heirlooms.\n\nThe police, thoroughly weakened after their bloody battle with the military, are stretched thin and simply lack the manpower and energy to try to contain the chaos.\n\nPerhaps we wouldn't be in this mess if more prudent actions had been taken, but it's pointless to dwell on hypotheticals at this point. All we can do now is wait and hope the situation will improve on its own."
brazil_lacerda.167.a: "We could have handled this better."

brazil_lacerda.168.t: "Open Wounds"
brazil_lacerda.168.desc: "After months of near complete anarchy within Liberdade, government-sponsored reconstruction efforts have finally begun, though to say that the situation is under control would not be quite accurate. The looting has since subsided, and many of the more violent groups of rioters have finally dissipated, leaving nothing but a ruined ghost town in their wake. Scattered incidents still take place on a regular basis, however, and the few Nikkei that have stayed in Liberdade and have somehow survived thus far are now starving in the streets they once called home. Protests against the government's slow progress have become a regular occurrence, but having already imbibed a rather potent cocktail of corruption, draconian bureaucracy, and government incompetence in regards to how the riots were handled, there is little we can do to assuage their fears at this point.\n\nSophisticated construction equipment courtesy of Hitachi has finally been brought into the district, but even with such tools at our disposal, progress remains painfully slow. That being said, progress is progress. Reconstruction has finally begun, even if it has taken far too long, and we can finally begin to put this shameful chapter of São Paulo's history into the past. Plenty of government functionaries have already begun loudly complaining about how this whole debacle should have been handled, but it is mere shouting into the wind. We must focus ourselves on seeing reconstruction through to its conclusion, and try to take these hard lessons into account for when the next crisis appears."
brazil_lacerda.168.a: "At least something is being done..."

brazil_lacerda.169.t: "It Could Be Worse"
brazil_lacerda.169.desc: "Kazuo Maeda wiped the sweat off his brow with a rare smile. Six hours of backbreaking work well into the night had yielded its results: the foundation for a new house, on the site of one of the myriad that were burnt to the ground in the great racial crisis that had enveloped São Paulo just a few months ago. The entirety of Liberdade was undergoing reconstruction, a redevelopment of an area that had endured such cataclysmic suffering, and in recent weeks progress had sped up greatly. Many buildings are in the process of rebuilding or have already been rebuilt, including a small basalt stele inscribed with the names of a hundred victims near the starting point of the riots. It is not the grandest of monuments, thought Kazuo, but it is enough. In many places, green shoots of economic regrowth have been seen, with small shops opening their doors again. Many have not returned from their exile in rural regions of the state, fearing for their safety, but more and more people were coming home to rebuild their lives in the centre of São Paulo as the community clawed its way back to something resembling normalcy: running water, electricity, and plumbing, things so sorely lacked for months, were beginning to appear again in repaired houses and apartments.\n\nThe situation is not good in Liberdade: it is not even a shadow of what it once was, before the turbulence and violence that took so many hundreds, maybe even thousands, of lives and uprooted countless others. But the Japanese people are durable, as are the Brazilian people: despite everything, they share their grit and resilience. Kazuo closed his eyes. It would still take months, years, decades, even, to recover what was lost. But there was a feeling stirring within him, something all too rare in recent weeks: hope.\n\nAnd having been forced down to the ground, there is nothing left but to rise back up."
brazil_lacerda.169.a: "Fall seven times, stand up eight."

brazil_lacerda.170.t: "A Slow Recovery"
brazil_lacerda.170.desc: "At this stage, it would be fair to say that the district of Liberdade will never truly be the same. Reconstruction, officially, has begun to near its conclusion, but it has become increasingly clear that the extensive damage left in the wake of the riots could take years or even decades to fix, let alone a few months. Essential services such as water and electricity have returned to much of the district, but incompetence on behalf of the city and lingering harassment from the locals has slowed down its progress in a few select holdouts. And, even with services restored, the district largely remains a shell of its former self: eerily silent now that it has been reduced to a mere fraction of its pre-riot population figure.\n\nThe Nikkei who were largely chased out of the district have yet to return in serious numbers, content to seek a new life in the rural areas of Brazil and regions where anti-Japanese sentiment is far lower. The temporary shelters within São Paulo have become overcrowded, leading to an exodus out of the city and across all of Brazil; anywhere but Liberdade. Business in the district, meanwhile, has all but dried up, with prospective buyers hesitant to ply their trades in a place so recently and thoroughly wracked with civil strife. What little economic activity remains exists solely to apply more muscle to the efforts of rebuilding, and nothing more.\n\nOutside Cine Niterói, where the initial killings began, a memorial to the riots is being slowly constructed, in spite of the local challenges. A newly-planted cherry tree takes a prominent place in the monument, and it is hoped that as it continues to grow, so too will Liberdade slowly return to life. With the considerable challenges still facing the district, it remains to be seen if this will ever happen. No matter the case, the Nikkei endeavor to move forwards in spite of the tragedies that continue to persist. Even the deepest wounds will heal, given time."
brazil_lacerda.170.a: "We must move on."

brazil_lacerda.171.t: "Mário Japa Becomes Shizuo Osawa"
brazil_lacerda.171.desc: "Gripping his thick cashmere coat, Shizuo Osawa walked with a letter in hand and a sense of trepidation, but also of his body beginning to sweat, towards the São Paulo Court of Justice. He impulsively tried to take it off, but then he was sure they would ask him another question for each of the marks on his scarred skin, wounds from defending unarmed locals in the riots.\n\nOr they might start comparing composite photos with a certain Mário Japa. Hopefully it wouldn't come to that.\n\nA panel of gaijin bore down on him from twelve different angles as he sat down. They asked for his full name, then for his birthday and place of residence. Throughout the entire thing he must've had "guilty" written all over his face. But then there was no mention of crime, of a past with the Shindō Renmei, of weapons transports and illicit activities. Turns out they honestly had no idea who he was.\n\nHis correspondence with the National Consultative Commission for Civil Unrest revealed they needed him not as a suspect but as an aide. They had read his A Gazeta columns, recognized his utility as a Japanese speaker and investigator who could help with the inquiry into the riots and, albeit after a bit of sniggering, tell the different faces of those involved apart. If that was the price for not getting detained, so be it.\n\nWhile Japa wrote the columns as a militant, Osawa did so as a journalist. While Japa used his language to hold the Kōdōsha cells together, Osawa would do so to put it all behind him. While Japa would have scorned working with judicialist pigs in any form, yes, Osawa might be suspicious, but would recognise the value the Commission might bring for Nikkei, for reconstruction, and for making sure this whole chapter never had to happen again."
brazil_lacerda.171.a: "Maybe there's one thing Lacerda did right."

brazil_lacerda.172.t: "An Unimpressive Operation"
brazil_lacerda.172.desc: "The clicking of typewriters and low murmurs of discussion were suddenly interrupted by the splintering of wood as the door was kicked down. The Brazilian police swarmed into the room, forcing the Kōdōsha propagandists onto the floor. Once the room was deemed safe Shizuo Osawa entered, prepared to act as translator.\n\nThe first thing that struck him was just how pathetic the entire operation seemed - the room was dank and small, and seemed to consist of scant furniture and a few typewriters. On a large table documents were readily available for view, and just from a glance it was clear they contained all manner of significant information. There was no mention of a 'Shindō Renmei', suggesting that the conspirators did not use that phrase to refer to themselves.\n\nAn orderly interrogation took place following the apprehension of the organisation. It didn't follow the normal procedures for an interrogation, however. It was more like an interview. The prisoners were happy to divulge information, and were unusually cooperative. There was little information they were unwilling to share, and when they were unable to offer up something - like the location of a co-conspirator - it seemed to be out of genuine ignorance. Shizuo was pleased. It was rare to have a job this easy.\n\nMidway through the interrogations, an older cop interrupted him. "Sir, I recognise some of these names. They were part of the Shindō Renmei. This is some kind of a successor organisation."\n\n"Not a successful one," Shizuo observed. "But yes, I noticed too. This one is Cleusa Chiyoko Taki. I've heard that name before. I can't quite place where..."\n\nThis musing was quickly interrupted by another policeman. "Sir, are you done here? We need a translator elsewhere and we might have uncovered everything we're going to.""
brazil_lacerda.172.a: ""Hang on, I need more time. Who is this Chiyoko?""
brazil_lacerda.172.b: ""We're done here - let's go.""

brazil_lacerda.173.t: "Inspired By Real Events"
brazil_lacerda.173.desc: "The tokkōtai walked in perfect formation towards their foe. A hundred metres away, a corpulent police colonel sipped coffee on a streetside café table. The leader held a pesticide bag filled with shrapnel, a short fuse poking out of the top; the rest held their 'sweet beaks'—mustard gas bombs the size of a baseball. The shrapnel bomb came first; the mustard gas was to deter would-be heroes.\n\nThe colonel didn't see it coming. The leader threw it in a perfect arc, over his head and on the centre of the table; his head snapped back and took the rest of his body with him, his face covered in shards and blood. The tokkōtai, their mission complete, ran across the road. One of them tripped over. His group had to keep moving. As he looked up, blood streaming from his forehead, his hand instinctively moved over to a tanto of last resort.\n\n"Excuse me," said Shizuo, "but they gutted themselves in this street?"\n\n"No." The storyteller's eyes never lit up, the corners of his mouth never twitched. "That was later." He leaned in to whisper to the group. "In their yellow lairs." The policemen next to him wrote it all down.\n\nHe turned his attention away from this interview, hoping nobody could see the frustration in his eyes. They fell on another person, sitting in the café across the road; right where the police colonel allegedly was. She seemed familiar. Flashes of Masafumi's friend intruded his inner eye, frames spliced into a film reel. He found himself sitting down at her table.\n\n"Ma'am, do you know someone named Hiroshige?"\n\nChiyoko's head snapped towards Shizuo, eyes wide like a deer's before a bright light."
brazil_lacerda.173.a: ""Yes. I do.""

brazil_lacerda.174.t: "Refuge and Renewal"
brazil_lacerda.174.desc: ""Thanks for helping me, sir," chirped Chiyoko from the back of Shizuo's Toyota Bandeirante. Third time she said that today. He replied with a nod and a curl of his lip, refocusing on the road to good old Santo André. He took a right turn upon sight of a familiar corner store announcing itself onto the street as "Osawa Local", his father's store, now a sanctuary from the war in the city.\n\n"So, have you been to our place yet? Is it getting repaired now?" Shizuo shook his head, stepping onto a floor decked with shelves of soda, snacks of different nationalities and cabinets of liquor which he locked shut again for good measure.\n\n"It's... really not in good condition at the moment," he sighed lamentingly. "Don't worry, Santo André isn't so bad. It's a little, well, conservative - heh, I couldn't even go to the cinema because none of us owned a suit and tie, actually - but it's quiet. You'll be safe here." While giving her his briefing he had neglected to notice her head buried in her hands.\n\n"I- my family- I have- nobody here. Everyone - every relative, sibling - gone!" Oh God, how to deal with this.\n\n"Listen, Chiyoko," he uttered, a hand on her shoulder, "It's, uh, not the best time ever outside. But I promise you my father and I will ensure you have a place here. You don't even need to help out with running anything. If you want, I'll even get your story in print and everyone will know what happened to you."\n\nShe wiped herself off. "Fine. I guess you do owe me for saving you from the Kōdōsha," she said, snorting. "And I swear to help with the store, to uphold my duty and the strength of our nation!"\n\nThe line startled Shizuo. Old habits die hard, he mused, mustering a fake smile."
brazil_lacerda.174.a: "She's got the spirit, at least."

brazil_lacerda.175.t: "Adhemar, Hero of the Japanese"
brazil_lacerda.175.desc: "The Nikkei of Brazil need a hero. They need a knight in shining armor to save them. A champion to protect and serve them, to defend them from racist oppression, to beat back the tyranny of Lacerda. That champion, that knight, that hero is Adhemar de Barros. At least, that's what he says. Across Brazil, Adhemar's funds and connections have been used to shore up the legal defenses of hundreds of Nikkei defendants, in particular those affiliated to Kōdōsha. His funds go beyond mere bail bonds, however, with many of the afflicted Nikkei families receiving large sums from Adhemar and even personal visits from the man himself, all heavily publicized, of course. With no legitimacy but his own word, Adhemar has declared himself the Hero of the Japanese.\n\nFor Vargas Jr., this is nothing more than embarrassing showboating, for Lacerda and the UDN it's bordering on suspicious, and for the vast majority of urban and leftist Japanese-Brazilians it is pandering in its most blatant, hollow form. But, despite the naysayers, there are some Nikkei, largely within the rural regions, that have begun to sympathize with Adhemar, that, maybe, have started to believe his spiel about his heroism. A spiel he hopes will become far more effective once he deals with a thorn in Kōdōsha's side. A Nikkei translator for the police who will soon be receiving an arrest warrant from Adhemar's men in law enforcement.\n\nThe very translator, ignorant of his coming detainment, was far too busy staring at his dorm room door at the University of São Paulo. Shizuo Osawa traced the paint with his fingers, staining them red. It had been graffitied in Japanese."
brazil_lacerda.175.a: ""Traitor to the Nation"."

brazil_lacerda.176.t: "A Day of Surprises"
brazil_lacerda.176.desc: "A shuffling of papers and the scraping of chairs against the floor marked the end of yet another meeting. Shizuo Osawa shook the hands of a few minor functionaries. They had nothing but praise for the work he had done for the commission. A few perfunctory compliments were expected, but Shizuo was surprised by their sincerity. He grabbed his briefcase and headed out from the office, down the stairs, and outside, on what should be another uneventful day.\n\nHe was surprised when he saw three squad cars parked outside, and several police officers approaching him. Thoughts began to race in his mind, and he almost missed the first time the officer in charge asked him if he was Shizuo Osawa. Unable to speak, he nodded his head, and acquiesced when he was asked to follow him. Placed into the back of the squad car, Shizuo's mind started racing. Had they found out he was Mário Japa? Had someone talked? Where could he have possibly made a mistake? Did he say something that he thought was innocuous? Did he speak a little too loudly somewhere? However it had happened, they knew he was a communist agitator, and that would earn him nothing but a miserable end. He racked his brain for every single way he could have possibly exposed himself, and brought his whole movement to ruin.\n\nBut after he was brought into the station, they sat him in an empty office with a guard. No interrogation, no beatings, and most of the police officers who saw him appeared confused that he was even there. Apparently, there was even no official arrest warrant signed by a judge, just an order for detention from the police chief. One man, an officer he had worked with in the past, wondered if the whole thing was a mix-up, and advised Shizuo just to stay out of sight for a few days, and hopefully whatever happened would all be cleared up."
brazil_lacerda.176.a: "A bullet dodged, for now."

brazil_lacerda.177.t: "Damage Control"
brazil_lacerda.177.desc: "Shizuo Osawa and the Commission officers entered the University of São Paulo campus grounds. On the surface, Shizuo appeared calm, determined, another man amongst a squad determined to find the truth. Internally, he was smiling. He had informed Lamarca to ensure that everything was well-hidden, and that any potential informants were already well-paid, and that nothing could incriminate the VPR. The Commission members would find nothing, because Lamarca had already moved it.\n\nIt had taken all of his strength not to smile when he heard what the Commission had believed Mário Japa was capable of. Some had said that he held an army tens of thousands strong, and he was just biding his time. Others said he had informants among a thousand offices and knew everything even before Brazilian government did. If you believed the water cooler talk, Mário Japa was a shadowmaster with his writhing tentacles everywhere. If Shizuo ever felt depressed, he could hear how powerful his other self was every day, no longer a man but a living legend.\n\n"Officers, I'm so glad you're here," a bespectacled man looked relieved as he approached Shizuo and one other. "One of the leftists is right here. You can arrest her."\n\n"Really?" Shizuo asked, hoping to intercept the problem, "Who?"\n\n"Her name is Dilma Rousseff. She claims to be a reporter, but I know she helped out in the last bank robbery."\n\nShizuo spoke quickly to cut off anyone else. "Rousseff? Are you kidding? We already know who she is. Loudmouth activist but harmless. Too terrified of her own shadow to even think about stealing a bicycle, let alone participate in a robbery. Stop jumping at ghosts and wasting our time, we have bigger fish to fry.""
brazil_lacerda.177.a: "Across the room, Shizuo gave Dilma a goofy grin and a thumbs-up."

brazil_lacerda.178.t: "The Blame Game"
brazil_lacerda.178.desc: ""Due to new data provided, Governor Vargas, in his colorful terms, recommended that the Força Pública be fully audited for their role in the recent riots and a reform program be pushed through." The National Consultative Commission for Civil Unrest chair spoke to the assembled staffers and commissioners in a gray conference room deep in one of many government buildings within São Paulo. "We shall be following this recommendation as it aligns with the results of our preliminary investigations."\n\n"That is not to say that DEOPS is unrelated to this endeavor, but their cooperation at the conclusion of events was invaluable and shows a need for mild internal reforms in which they can perform themselves adequately." Another Commission bureaucrat stated as a matter of fact. His small eyes peered above his perfectly organized binder of pages as he spoke to the assembled group. The data and figures found within would act as a shield from any negative, emotional response. "The failure to keep the peace shall be placed conclusively on Força Pública. We have found that the Força Pública's poor performance was the result of, in part, a mismanagement of resources. Their strategy placed oversized importance on the Japanese community's threat to rural areas, so they split their forces between there and the critical urban sectors. This rural threat never materialized, crippling their potential response in actual problem areas." The suit closed his binder, which definitively ended his report and discussion. Any more information would have to be read in the report and analyzed on one's own time.\n\nShizuo Osawa was immensely disappointed. Shizuo, a lowly translator and journalist, slumped at a far-off table. Despite the power of the commission, no change would come for the Nikkei, who not only lacked security in their daily lives but were actively threatened by the DEOPS. Shizuo quickly ripped out a loose page from his usually pristine notebook and began drafting recommendations for better racial policy. The scrap of paper could spread rapidly, the weight of the words propelling it, but ultimately, it was easily disposable."
brazil_lacerda.178.a: "The Blame Game rarely has winners."

brazil_lacerda.179.t: "Reform by Penpoint"
brazil_lacerda.179.desc: "Getúlio Vargas Jr. sifted through the National Consultative Commission for Civil Unrest on the recent race riots. Every page was worse than the last.\n\nThe Commission's audit concluded, in as devastating a vocabulary as the uncreative bureaucrats could muster, that the security institutions tasked with preventing and containing such riots were shown to be fundamentally flawed. Stuck to each page and every point were the furious notes by Golbery do Couto e Silva, who ravaged the Força Pública and DEOPS in language that the Commission would never dare to pen. However, neither document could adequately explain why DEOPS performed so poorly.\n\nVargas sighed deeply as he set down the documents. Despite the unified condemnation from the Commission and Golbery, he knew the final decision rested on his shoulders. Their words, no matter how well-researched, paled compared to the needed action. The polls might not react favorably, but Vargas was resolute in his action. He reached for an elegant pen, and with smooth strokes, he drafted an order that would be typed by his assistants later. The order was clear: a thorough retraining of everyone in both forces, establishing more specialized units, a deeper examination of their crowd control tactics, and a comparatively simple budget increase.\n\nEventually, the bureaucratic machine is activated, and the Governor's preliminary orders are disseminated through the relevant channels.\n\nOn the far side of the São Paulo executive complex, lowly translator and journalist Shizuo hears the official orders and the Commission's supportive statements. He reads the pages repeatedly, disappointed by his lack of surprise. Any faith he may have had in the Commission was misplaced since there are no real provisions for better racial policy. Shizuo began drafting recommendations for better racial policy on the first piece of paper he could get his hands on. Despite his foot being in the door of the halls of power, he doubts whether anyone in the Commission will take him seriously."
brazil_lacerda.179.a: "It is through words that a nation is governed, and actions that a nation is transformed."

brazil_lacerda.180.t: "Achtung, Baby!"
brazil_lacerda.180.desc: ""There, that's all of it." The heave of papers onto her desk by Shizuo Osawa frightened the secretary; this would take her weeks. "Let me know if you need anything else." He flashed her a wry smile that was not returned before he made his way to the door. That was the plan anyway until a figure froze him in place with their entrance.\n\n"Hey gorgeous. Did anything come in while I was busy putting bad guys away?" It was Sérgio Fleury, the monster in the flesh. Years of stoicism immediately came into effect to stop Shizuo from strangling the beast on the spot. His face turned to stone, but his blood turned and boiled, caught between fear and anger.\n\n"That big TV guy sent in something for you. You know him; I can never think of his name." She responded in a tired fashion, used to Fleury's faux charm. Meanwhile, Shizuo was still in shock. This ape — responsible for years of abuse and evil — still stands as police chief. His force should be in tatters, his career should be over after Vargas Jr.'s police reforms...\n\n...and he most certainly should not be standing here with that big dumb grin stitched onto his face.\n\n"Fantastic news. Thanks, darling." Sérgio looked at Shizuo, still caught in place. "What's up with you? Stick up your ass?" He burst out laughing, pleased with his own joke — no one else was. "I'm just kidding my light-skinned friend. Hope Gabriela took care of you. She's a doll." He gave Shizuo a hearty slap on the back before moving to the desk, encouraging him to leave.\n\nShizuo left immediately, no point in dwelling on him further. Once the reforms were put in place, racial abuse would see its sunset, and men like that would be history. Still, he couldn't help but hear some final words from Fleury, behind the door:"
brazil_lacerda.180.a: ""What were those documents that Asiatic fella left in here?""

brazil_lacerda.181.t: "The Nikkei Tango"
brazil_lacerda.181.desc: "For the Nikkei, few men fought for them. Yukishigue Tamura was one of these people, and today was the day he and his law firm would try to, and hopefully be able to, free the rioters. The prosecution presented every case, it was horrible for the defense team. Every member of the Kōdōsha had confessed, they wouldn't be able to save them.\n\nTo defend is an art, and Tamura would be its artist. "Endo Hiroko, 21, arrested five months and four days ago." A leftist student, one of the people who, after the hijacking, Brazilians hated the most. He knew that even with irrefutable evidence of his innocence, the jury would vote against him. Tamura tried, but failed.\n\n"Ogasawara Kazuo, 43, arrested five months and two days ago." His worst nightmare, a first generation immigrant who still held the ideas of fascism in his mind. Defending him would be hard, freeing him would be impossible. Tamura fought, he tried to free the man even though he didn't agree with him on anything, but failed.\n\nHours passed, dozens of cases were heard. People confusing names and faces, the trial was a nightmare for Tamura. Some went free, others had their sentences reduced, but many were kept locked up. It was a tiring and demeaning job.\n\nAs he left the courtroom for the day, he found a small crowd cheering him. His defense of the Nikkei was so fierce, so powerful, that many of them believed to have found a leader to rally behind. A man who could free them."
brazil_lacerda.181.a: "The courts know no mercy."

brazil_lacerda.182.t: "THE PEOPLE v. CABRAL ALMEIDA, JOÃO FIGUEIREDO, et al."
brazil_lacerda.182.desc: "The gavel banged for the first time, the trial had started. On the defence, a group of white supremacists who participated in lynchings and a few policeman. They were there for several reasons: hate crimes, homicide, coercion.\n\n"João Figueiredo, 34, arrested for targeting a Japanese business." The defence team was not thrilled to work with people with extensive history of Japanophobia. They would, however, try their best to defend them. The case against Figueiredo was especially difficult, he had set fire to a building, which had spread and affected white businesses, during the riots while screaming obscenities against its owner. His sentence was given shortly after the defence gave their side.\n\n"Cabral Almeida, 37, allegedly participated in a lynching." The prosecutors could notice a clear lack of knowledge in the defense team; they clearly were not prepared to defend this many criminals. The case against Cabral was muddier for the prosecution. Eyewitnesses said that they saw the man during the lynching, but there was no further evidence. The man was set free.\n\nCase after case was heard, the media ostensibly reported every detail. Every policeman was let free due to their violence being somewhat "justified". Most of the others indicted had their charges reduced. Only ten individuals were sent to jail. They would serve for no more than 8 years in prison."
brazil_lacerda.182.a: "Who will cry for the dead?"

brazil_lacerda.183.t: "SÉRGIO PARANHOS FLEURY v. UNITED STATES OF BRAZIL, et al."
brazil_lacerda.183.desc: "The prosecution was called to state their case. Fleury was nervous, this moment could land him in jail. "Ladies and gentlemen of the jury, what we have before us is a perfect example of a police officer abusing his power and becoming deluded with his own ideas. Sérgio Fleury is without a reasonable doubt unable to be an officer since his actions have hurt hundreds."\n\nSome shock befell the jury, had they been wrong about denying previous charges? The embezzlement, the abuse, and the corruption, could they actually have been real? The prosecution continued. "Eight months ago, the military surrounded the neighbourhood of Liberdade with armed men, helicopters, and tanks."\n\n"The reason for this? A lie created and believed by Fleury, that the neighbourhood was filled with Japanese spies. Fleury fully believed this, so much that he ordered a crackdown on the protests. The Nikkei, as they call themselves, were beaten, arrested, and murdered in cold blood due to a lie."\n\n"Your Honor, what we have seen here is a pure display of incompetence from a man who should not have been in this position from the start. Someone so fearful of their fellow Brazilians should not be in a position of power. I rest my case."\n\nThe judge and jury were not impressed; such a narrative could be easily dismissed as there were no written records of Fleury ordering the crackdown, no audio or video tapes of him thinking there were spies in Liberdade. The jury knew about the incident in Liberdade, about the murders and they knew Fleury was the chief of police during that period, those were facts. But there was a missing link, something, anything, that could fully connect Fleury to the case.\n\n"The jury has come to a decision. Sérgio Fleury can no longer be considered a police officer, but under the proof presented here, he is not guilty of corruption, embezzlement, or abuse of power.""
brazil_lacerda.183.a: "For the Nikkei, the murderer of Liberdade goes free."

brazil_lacerda.184.t: "Goodnight, PSP"
brazil_lacerda.184.desc: ""Bribery, corruption, embezzlement of funds." For the PSP, this was a disastrous trial, exposing their crimes to the whole nation. One had to wonder how they were found, the justification for their arrests was the riots, but none of the crimes had to do with it.\n\nThe first one to be put on the stand was Paulo Percenhas, he was merely a secretary for city hall but all the information on the expenses of the government passed through him. They were trying him for being an accomplice to the crimes. It was quick and short, he was sentenced to 5 years.\n\nThen came Pedro Matias, high ranking official and implicated in a myriad of corruption scandals, his defense team tried, but failed, to have him walk free. Although not being involved in the riots or their control, he was put in jail for 8 years.\n\nTheir sentences were delivered so quickly and they were so harsh that some people started wondering if Lacerda was behind all of this, was this merely a play for him to gather more power to himself? The PSP would definitely feel the effects of this trial for a long time."
brazil_lacerda.184.a: "Adhemar's dreams, defeated."

brazil_lacerda.185.t: "The Commission's Results"
brazil_lacerda.185.desc: ""...the Brazilian security forces lack the equipment and training that could help them deal with such situations." This was the verdict of the National Consultative Commission on the police intervention in the Liberdade riots.\n\nLacerda had anticipated this obvious conclusion. For several days, he was busy with phone calls and face-to-face meetings with members of the UDN, working out the details of a forthcoming bill.\n\nSaid bill would allow for an expansion of the police presence in urban areas that have been historically understaffed, along with a general increase in funding for the procurement of equipment and better training in urban warfare. The details were still being worked out, but he was confident of its passage, as improving and expanding law enforcement was a key point that had been driven home after the disastrous failure to quell the riots.\n\nThis bill would not only allow for better security now, but would also provide Lacerda with a powerful tool to quell violent uprisings and mass public unrest that might arise in the future as a result of his policies. Carlos removed his glasses and stretched his arms. There was still much work to be done.\n\nA few days later, in a distant office, Samuel Wainer was writing articles at a frenetic pace. "A Push Toward Militarism," "A Bill of a Wolf in Sheep's Clothing," "The Incoming Danger": the names spoke for themselves. Lacerda's repressive policies were only going to grow, and if this bill was not stopped, Wainer knew it would be another step toward totalitarianism. As a journalist, what could he do but write?\n\nSo write he did, all night long."
brazil_lacerda.185.a: "Under God and for the Brazilian people, we work."

brazil_lacerda.186.t: "Peace Through Power"
brazil_lacerda.186.desc: "Within a nameless police station in São Paulo, there were smiles all around. Uniformed men cracked open newly delivered crates of heavy equipment, courtesy of Brazil's newly passed legislation, as though they were excited children on Christmas morning. These particular presents contained toys of an entirely different nature altogether. Military-grade combat vests designed to stop common pistol rounds, high-caliber long guns that wouldn't look out of place in a battlefield, and even armored vehicles not unlike those that were seen used by the military during the riots. All of these and more were passed around amongst amused policemen, who cracked jokes at thinly built recruits struggling to carry some of the new ordinance, and wondered aloud when they would get to put their new "toys" to use.\n\nMany of these uniforms would inevitably be seen across the more unruly streets of São Paulo, including the formerly embattled district of Liberdade. Among the Nikkei, the sight of heavily armed policemen who looked more like soldiers than officers of the law was a troubling sign: a silent message from their government that their concerns were secondary to those of the police. How could they find any comfort when such terrifying implements of war were handed to the very same policemen who flagrantly took part in the crimes committed against them?\n\nYet, fury towards the Anti-Riot Act was markedly subdued. Despite some protests from labor organizers decrying the vague wording of the police's expanded powers, the people remained largely satisfied that a riot on the scale of Liberdade would be far less likely with a more well-funded and trained police force. For those who had experienced the riots for themselves, however, they hoped that they would not soon find themselves on the receiving end of the bill's effects..."
brazil_lacerda.186.a: "Law and order."

brazil_lacerda.187.t: "Failure of the Anti-Riot Bill!"
brazil_lacerda.187.desc: ""So, Júnior, you're really telling me that this bill couldn't make it?" António took a sip of his coffee, reading the morning Estadão newspaper. The headline, large and damning, read, 'Lacerda's Riot Bill Fails!', and António read on with growing consternation.\n\n"After those fucking riots, I'd have thought this would've been common sense. Politics shouldn't get in the way of defending our country." He sighed, scratching his cheek.\n\nJúnior shrugged. "In my eyes, it's a good thing it didn't. Lacerda would've gotten too much with that bill. He kept talking about how we need to lay down the law but I think it was just an excuse to empower himself."\n\nFurther into the day's paper was an opinion article written by a group of anonymous conservative members of the UDN, complaining about Lacerda's failure to properly negotiate the bill in the way he had promised the party. He had said that this would be a simple victory, but it had been anything but. António agreed with them. It should've been unanimously agreed upon if he had done a good job explaining it to the other political parties.\n\nMeanwhile, Júnior was reading the day's Última Hora, which itself featured various commentaries on the bill: the most striking one, to him, was one by a popular leftist orator who happened to be the chief editor of the paper. 'Tyrant Fails In Expanding Powers' was the title, and reading on, as expected, it was a scathing critique of Lacerda's bill as a method to seize more control for himself. Júnior believed Lacerda's ambition was exactly that.\n\n"Politics, huh? Sometimes I don't know what's happening with this country anymore."\n\nAntónio smiled. "On that, I think we can both agree, my friend.""
brazil_lacerda.187.a: "A blow to Lacerda's ambitions."

brazil_lacerda.188.t: "The (Lack of a) Racial Democracy"
brazil_lacerda.188.desc: "Piles of papers filled the Presidential desk. Lacerda frantically looked through the report given to him by the National Consultative Commission, it was small and almost went unnoticed by the President, but in one of the last pages of the report something was written.\n\n"...we firmly believe that Brazil has not reached its goal of being a racial democracy."\n\nLacerda took away his glasses. He could not believe it, his actions had transformed Brazil into something he despised. Sure, he did not enjoy the Nikkei, several times he had fought them in the press and the streets.\n\nHe read it again and again, it was clear as day that Brazil had systematically discriminated against the Japanese, since the immigration ban, they had suffered in all ways possible. Relegated to the slums. He was finishing reading the last couple pages one more time when Távora opened the door.\n\n"Is this report correct Távora?"\n\n"It's the result of weeks of debating and evidence gathering, it must be." The Vice President had something in his hand. "At least we have a plan," he said as he showed Lacerda the file. "It's a racial democracy bill, the UDN is debating it right now." It wasn't much, it allowed the return of Japanese schooling, separated the Nikkei from the empire and put limited penalties on discriminatory practices.\n\n"It was pushed by Freyre, you know he's been like this since Vargas instituted the initial ban." Lacerda was taken aback, would he really want to approve this? The people were angry and the Nikkei wanted to be free from any form of discrimination. "I believe... this is fine." He remembered the hijacking, what the hostages demanded of him."
brazil_lacerda.188.a: "Brazil would follow his lead."

brazil_lacerda.189.t: "The Racial Democracy Bill Passes!"
brazil_lacerda.189.desc: "Walking the streets of a destroyed Liberdade, Shizuo read the newly released edition of the Estado de São Paulo. Big bold letters were put on the first page of the newspaper, considering the circumstances, it was a necessary typeface. "LACERDA APPROVES RACIAL DEMOCRACY BILL!"\n\nShizuo continued reading the paper, he reached the opinions part of it.\n\n"MÁRIO TANAKA, 34 - This bill is perhaps the best example of Lacerda's attempt at racial democracy. A failed compromise that hurts more than helps. It gives no provisions to help our people and in fact, can't even ban discrimination against a whole ethnic group. Lacerda is a vile person if he thinks this will help anything."\n\n"JOÃO DA SILVA, 27 - Although I believe that this bill could've been better, the final result does help in ending some of the discrimination against the Japanese population. It is proof that Lacerda is doing his best to help the people and that Brazil is heading in the right direction."\n\nOsawa scoffed at the notion that Lacerda was doing his best. He just had to look around to see it, all of his home neighbourhood was in ashes, destroyed, ruined. Sure, the bill did help remove some bans implemented by Vargas but finding any homeless Nikkei without people harassing them was impossible.\n\nDown the streets, signs were found on some homes. "NOW ENROLLING! JAPANESE LESSONS," he knew that these schools already existed before the ban removal, hidden for sure, but they were still real. It was nice to see that the people of Liberdade were free to teach their language.\n\nThe text of the bill was oddly familiar to Shizuo, he noticed many of the core ideas of the text were his. Had someone in the UDN read his articles and used it as a base for this bill? He couldn't be sure but in a sense, he hoped his writing changed Brazil for once."
brazil_lacerda.189.a: "A ray of light in a pile of ashes."

brazil_lacerda.190.t: "The Racial Democracy Bill Fails!"
brazil_lacerda.190.desc: "Lacerda's fingers were tapping the table. He had just received the results of the vote - the bill had not passed. "At least this isn't that big of a deal," he muttered to himself. Even with the failure of this bill, he knew that at least the opposition wasn't unified on this issue. What could he do after all, it was up to Congress to pass these things, not him.\n\nHe started asking himself several questions: How had the Japanese gotten powerful enough to start something like these riots? Especially in a racial democracy such as ours. "Damn commies, damn nazis..." he murmured, he was certain that these people were stirred up by some outside force.\n\nAnnoyed with the fact his anti-rioting measures had not passed Congress, Lacerda pondered if there would be any way to send the military and the police after these rioters. A way to clear them out of the city and make way for a better São Paulo.\n\nIn Liberdade, Shizuo stopped by a newsstand and bought the new edition of the Estado de S. Paulo. He could not believe it. "That fucking idiot!" He said after reading the headline, how could such a bill have failed Congress, why couldn't Lacerda have supported it more so it would pass?"
brazil_lacerda.190.a: "What is freedom in Liberdade?"

brazil_lacerda.191.t: "A Movement for Change"
brazil_lacerda.191.desc: ""I am proud of Brazil. We are a nation of peace, honesty and love for our fellow man. Yet still, many apparent whites seek to block the gift of freedom from every hand." Freyre grimaced sharply. "But I know we will see these racists put to shame. We are a democracy that has had at least one illustrious mulatto as President of the Republic. We will achieve our racial democracy, one struggle at a time, until not one man is unequal!" The crowd burst into thunderous applause.\n\nTávora and Lacerda's meeting was about to end, but one important point remained. Távora pulled out a large piece of paper. "Mr. President. Some men in the party have found... articles you wrote in the past, in the Nikkei. Eleven. Enough to fill a book."\n\nLacerda sighed. "Yes. I see. Well, I suppose it was inevitable. But please understand, I'd like to hear other points of view."\n\nTávora smiled slightly. "That is exactly what I wanted to ask. You see, with the Nikkei back in the public consciousness, some in the UDN want to lift the constitutional ban." Lacerda scoffed almost unconsciously. "I understand your skepticism. It's a small movement. But if you support it... I'm almost certain we could get it passed."\n\n"All right. I'll consider it. Thank you for bringing it to my attention." Lacerda nodded quietly. "Of course." Távora left the office. Alone, Lacerda began to think. If this worked, it could unify the UDN, deal another blow to Vargas' legacy, and win some votes. However, if it failed—and with a 2/3 vote requirement, it well might—it would be a spectacular waste of time. And if it succeeded? Did he really want more Japanese influence in the nation?"
brazil_lacerda.191.a: "Does opportunity knock, or do the Greeks, bearing their horse?"

brazil_lacerda.192.t: "Who Are the Fascists?"
brazil_lacerda.192.desc: ""We talk about 'racial democracy' as if it is a given — as if all we have to do is say the word and hey presto — here it is. That is not — and never will be — the case." Gilberto Freyre's oration remained unbroken in the heat of Congress, sustained even as his fellow UDN congressman shot him glares of contempt, appalled one of their own would argue for the rights of fascists.\n\n"The Constitutional Ban on Japanese Immigration turns this principle of our Republic into a farce. It is a Varguist stain of authoritarianism on our flourishing democracy. A failure to overturn it is the equivalent of bowing down to the fascists who once ruled us." Not everyone from the UDN was against his words. Others cheered the new trade opportunities this repeal would bring.\n\n"The hypocrisy of this ban is as stunning as its gross unfairness. If we are to ban every fascist from touching Brazilian soil, then how come the Germans or the Italians aren't banned from Brazil too? Is it because they are white? Does the apparently white government feel they have something in common with them?" He was not alone here either.\n\n"If you feel the same way I do on any of those points, then I urge you with all my heart to vote to repeal this legislative abomination that lies in our constitution. Vote if you have a semblance of a heart; we need everything we can get. This effort is for nothing if we have even a fraction less than two-thirds of this congress." Freyre finally resigned the mic as lines were drawn."
brazil_lacerda.192.a: "Hearts twitch as they prepare to make or break a racial democracy."

brazil_lacerda.193.t: "Mixed Reviews"
brazil_lacerda.193.desc: "With debates swirling around the potential repeal of the constitutional amendment banning immigration from Japan, it seems that each and every corner of Brazilian politics has been thrown into chaos. The ruling UDN have found themselves split right down the middle as was expected: the amendment proved to be divisive within the party when it was first passed, and old wounds have been reopened, with some calling the amendment "inhuman", and others dreading the possibility of Japanese influence creeping into Brazil via the immigration offices. Fortunately, with encouragement from the President, the skeptics of the party have been swayed by portraying the amendment as a Varguist misstep, while the Realistas have required little persuasion to voice their support.\n\nYet, bizarrely, the most vocal opponents of the repeal from the mainstream sector have come from the PTB-PSD bloc, who fear the loss of jobs to Japanese immigrants, and have stoked panic about "racial cysts" of communities that may form a fifth-column on behalf of the Empire. Perhaps less shockingly, Adhemar and the PSP have predictably come out in favor of the repeal, seeing first-hand the effects of racial hatred upon the city of São Paulo, and sensing an opportunity to ride populist sentiment.\n\nThe strangest developments, naturally, have come from the radicals. As they were among the amendment's most ardent supporters, Prestes and the Communists have been quite vocal in their opposition to the repeal, viewing this move as Brazil bending to the whims of a fascist government in Tokyo, and they too have stoked fears of hostile infiltration by Japan's intelligence services. Salgado and the Integralists, meanwhile, have not only embraced the repeal, but have already welcomed several Nikkei into their ranks in the wake of the riots. It seems that while the Axis alliance may be dead to the Germans and Japanese, the idea remains alive and well in the minds of Brazil's far right."
brazil_lacerda.193.a: "This was bound to stir the pot, wasn't it?"

brazil_lacerda.194.t: "An Eastern Sunrise"
brazil_lacerda.194.desc: "Fireworks dotted the night sky as the Nikkei's spirits flew as high as the pyrotechnics they set off. The UDN actually pulled it off; immigration from Japan to Brazil had now been legalized after so long. The Empire they called home would no longer be so alien, and they would not be so alone. Soon, their kin would come across the sea and join them, hand in hand, for a brighter future.\n\nThe good news would also travel across the sea. In Tokyo, a higher-up for the Matsushita Electric Company raises a toast to President Carlos Lacerda, followed by all his colleagues. They talk about a good man who has righted a wrong but talk in greater depth about the opportunities waiting for them in Brazil, practically salivating at the thoughts.\n\nIn Guangdong, the story is much the same. A Zhujin junior marketer is instructed to write an article detailing what awaits the corporations in Brazil. He waxes poetically in his damp Honkon apartment on the country, its sunset vistas, and the markets ripe for plunder. As he writes, he finds himself nostalgic for a land he never knew. After finishing, he cries for a land he will never see.\n\nIn Kōshū, a Chinese dissident finds himself holding the finished article. Rain soaks the pages as he imagines the possibility of a place that never rains. Water blurs the words into mush, but he doesn't care; his mind has already been made up. In the future, he will gather his meager belongings. There will be a boat — he will be the stowaway. On a distant shore, he will be free."
brazil_lacerda.194.a: "Brazil calls and a people answer."

brazil_lacerda.195.t: "Rising Suns Rise No More"
brazil_lacerda.195.desc: "Lacerda's desk contained a man but no face. The face was buried within his hands, desperately trying to avoid the reality of his current situation. He had blown it. So many within the party had tried to warn him, told him that this would not go his way, but he knew his biggest fault.\n\nThat he was a fool for trying to bend the knee to the Japanese.\n\nHe should have told the radicals in his party to go to hell at the suggestion of bowing down to fascists. If only he had a little bit more of a backbone.\n\nIn São Paulo, Shizuo Osawa agreed with the last part. His words poured onto the page with fury, labeling Lacerda as a member of the "extreme right". Once the stinging condemnation was complete, he submitted the article to his newspaper and left for his alleged home at the university dorm.\n\nWith his coat pressed up against him to cover against the chilly streets, Osawa was met with only strangers as he walked with his head to the pavement. These were not or never would be his people; they had shown the feeling to be mutual. He wondered whether the immigration ban's continuation would even be mentioned in the Diet. Probably not.\n\nHe pressed against his door and entered. The bed was a familiar cold. No one else was inside; everyone else was doing something without him. It would never not be the case for him and the Nikkei — a people forgotten — even by their homeland. Even for a proud people, it can be so very alone when trapped in such a vast continent on the other side of the world. So very alone..."
brazil_lacerda.195.a: "He cried into his pillow, mourning the Empire and the Republic he would never know."

brazil_lacerda.196.t: "Preserve the Sun, Protect Its Heat"
brazil_lacerda.196.desc: "The sun rose, its vibrant light catching Lacerda's body as it took him from his bed. The radio forecasted a gorgeous day on the horizon without any black clouds or scenes of civil disobedience but with signs of Japanese capital entering the country. The party was united behind him — as were the Nikkei — and his legacy was already proving more positive than Vargas'.\n\nAnd then he went on about his day because he had more important matters to attend to.\n\nIn São Paulo, the chilly streets didn't feel as cold as they used to for Shizuo Osawa as he walked to his university dorm with a spring in his step. The immigration ban repeal would barely get a mention in the Diet — let alone interest most ordinary Japanese — but it meant everything to him and his fellow Nikkei. He could now take comfort that they were not so alone anymore.\n\nAfter this and the passing of the Racial Democracy bill, it was almost enough to make him consider voting for Lacerda.\n\nIf only it didn't take a hijacking and a citywide race riot for progress to make it to this point.\n\nStill, the pain and misery of those days would fade, but the measures taken in its wake would not. São Paulo will rebuild itself to be stronger than ever before. That was good enough for him. It was even good enough to give his vote to the UDN for the next election."
brazil_lacerda.196.a: "Lacerda is a bastard, but he's my bastard."

brazil_lacerda.197.t: "A Peak of One's Own"
brazil_lacerda.197.desc: "The bus opened its doors onto a São Paulo street, and out stepped a man from Santo André, one Shizuo Osawa. A breeze breached his coat, sending a chill down his spine, but his spirit wouldn't break easily. He finally had his chance to study in the big city. If Vargas still ruled, it would be a place in one of his prisons instead.\n\nOsawa looked around. Hardship was still rife here, far from exclusive to the Nikkei. But with Lacerda, there was also hope. In 1965, he gave him his vote. In [GetYear], he watches the President with hope.\n\nElsewhere, the Taki family sat down for dinner. The wallpaper peeled, and one giant rat was still scurrying around somewhere, but it was home. The youngest of the brood, Chiyoko Taki, had a question.\n\n"My teacher mentioned Carlos Lacerda today. What do you know about him?" The question was spoken with naive adolescent innocence.\n\n"He's an American lapdog. I don't like him, and by how he rails against Japan, he clearly hates our kind." Sumitada Taki didn't bother to hide his contempt — she had just started high school — no need to hide life's realities from her. "If only Adhemar were elected instead. There's a man who cares about us."\n\n"I don't know if he hates Japan specifically, but he's doing a good job of hurting us regardless. He learned well from America's wanton apathy for the poor, for the downtrodden, for us." Hiroshige Taki didn't learn his hate from his father but learned it on his own. "The Nikkei are only fuel for his economic murder machine."\n\nThat was Chiyoko's mind made up. Her father and brother were always so wise. They don't need Lacerda, and neither does she. Let's hope he doesn't mess with what peace they have."
brazil_lacerda.197.a: "With starry eyes, they all watch on to make sure the good life does not escape them."

brazil_lacerda.198.t: "Ships Passing in the Light"
brazil_lacerda.198.desc: "Long, sullen faces pock the viewports of a passenger vessel heading east out of the port of Santos. These travelers are Nikkei. After a long, arduous life in Brazil, their yearning hearts have forced them back to their Empire. Most have found the money they were so desperately searching for. Their accounts are balanced, but the total cost is still being calculated. In a nation of immigrants, they were treated as outsiders. Despite returning to a shared language and similar faces, the Nikkei don't know what they'll face in Japan. They know that in the supposed perfect homogeneity of the Empire, formerly friendly faces will look at them as dekasegi, corrupted by their work abroad. But the ship sails regardless. At least it will be better than Brazil.\n\nAnother ship passes them. Lit by a bright sun, a new wave of diverse, fresh-faced immigrants arrive from Japan. Some are dissidents looking for a covert escape, a few hope to expand some of their businesses in Brazil, not only for many of the hundreds of thousands of Japanese who could be a potential market but to tap into Brazil's rising status in the global economy, others are just retirees looking for a safe adventure. A few of the passenger's mouths smile wider and chatter louder, their hope and determination palpable. Fascist proselytes and religious missionaries from the new religion 'Seichō no Ie.' The mixed group eye each other carefully, sharing nothing but the same homeland. But on foreign soils, that is often good enough.\n\nDespite the majority of Brazilians within Brazil this afternoon, the Santos' docks were stuffed with crowds of Japanese. They gathered, cheered, and hoisted fascist imagery for the new arrivals, ecstatic to meet people from the Empire. To them, the shores of Brazil were not an escape from the empire but another front within it, and each new boat carried new heroes to come to save the Colonia.\n\nAbove it all, native Brazilians looked down on the display with disgust, scorn, or passing interest."
brazil_lacerda.198.a: "They will assimilate or leave just like the rest."

brazil_lacerda.199.t: "Their Man in Congress"
brazil_lacerda.199.desc: "As news of the Senado election results filtered in across the country, the people of São Paulo would awaken to a shocking turn of events. The status quo of their city, which had long since been a bastion of PSP power, had been broken by a man who transgressed in two different ways; he was both Japanese and an Integralist.\n\nShiro Kyono has proven a divisive figure amongst the city's Nikkei community. To the Kōdōsha, his victory is a grand triumph that represents their first step on their path to glory. To the leftists, his victory is an abomination that represents their own failure to capture power. But to the ordinary Nikkei, he represents something else entirely; hope.\n\nPerhaps one day, many thought, as they incredulously read the results in the newspaper, there could be more people like them in Congress. Perhaps their lot really would improve, one day.\n\nOf course, the rest of the country had many thoughts upon Kyono's victory. PRP men toasted to his name that night, gleeful over penetrating Adhemar's personal fiefdom. Others decried it as the first step of Fascist - and indeed, Japanese - encroachment into Brazil. While the Nikkei would celebrate the ascension of one of their own, they would do so with the blinds shuttered."
brazil_lacerda.199.a: "Significant, regardless."

brazil_lacerda.200.t: "To a Generation of Destroyers"
brazil_lacerda.200.desc: "In recent weeks, a new celebrity appeared to emerge out of the chaos, Brazil's very own John Dillinger. A spate of bank robberies occurring in areas grievously stricken with striker activity have been linked by witnesses to a certain "Mário Japa", the alleged mastermind behind these plots. Together with his cronies in the VPR, he has become the latest scourge against capitalism.\n\nHowever, the truth was far more mundane than what was published in newspapers.\n\nThe bank robber known to the press as Mário Japa was, in fact, several men. These men all shared one important characteristic with Mário Japa — they were all Nikkei. As most Brazilians only knew one Nikkei — that being the famed Mário Japa — most assumed it was him, especially once the reports began coming in. Of course, the real Mário Japa was long gone from the VPR.\n\nThis story served only to obscure the very real story of an oppressed people taking arms against the people who oppressed, namely, the administration that let Liberdade turn to ash during the riots. These men and women joined the Vanguarda Popular Revolucionária with two words in mind — never again.\n\nNever again should they feel under threat. Never again should their fellow men and women — no matter the color of their skin — be pushed around by jackbooted thugs masquerading as justice. And never again will Lacerda have a day of peace."
brazil_lacerda.200.a: "And yet for the average Brazilian, they still remain invisible."

brazil_lacerda.201.t: "End of the Line"
brazil_lacerda.201.desc: "'WORST GOVERNOR IN STATE HISTORY?'\n\n'VARGAS POLLS LOWER THAN EVER'\n\n'THIRD LYNCHING OF WEEK HITS SUBURB'\n\nVargas Jr. felt his jaw clenching further and further after every headline. His once pristine office in the Governor's mansion was now in a state of disarray - newspapers scattered across his desk, the curtains half-shuttered, and the wastepaper bin overflowing well beyond what it should have been. Nobody visited him often, as his temper had grown short as of late.\n\nThe months following the Liberdade riots had not been kind to him. It wasn't as if he had simply ignored what had happened in those fateful weeks; hell, he had tried to assist in reconstruction wherever he could. But any attempts he had made to reconcile with his beloved city simply refused to stick.\n\nIt seemed like no matter what he did, those damnable riots would stain his legacy forever. And if headlines like these kept coming out and further dirtying his reputation, then he stood next to no chance in the next election. Was this what his father would have wished to be remembered for? A scuffed riot and an awful relationship with the press? Was he doomed to be just another failed footnote in Brazil's history?\n\nVargas glanced at another newspaper's front page, spotting the headline. 'MISSING IN ACTION', it boldly proclaimed, next to a rather unflattering picture of his face. Feeling that familiar stab of rage, he ripped the front page off and crumpled it up into a ball, launching it at the basket."
brazil_lacerda.201.a: "The ball only bounced off of the overflow, landing on the hardwood floor."
brazil_lacerda.201.tt: "Vargas Jr.'s election chances in São Paulo will §Rworsen.§!"

brazil_lacerda.202.t: "The Start of Something Beautiful"
brazil_lacerda.202.desc: "'VARGAS JR. RANKED AMONGST BEST STATE GOVERNORS!'\n\n'VARGAS POLLING AT HISTORICAL HIGHS!'\n\n'LIBERDADE COMES TOGETHER'\n\nAs Carlos Lacerda scanned these headlines, he could only feel a heavy mix of jealousy and regret. Quashing the Liberdade riots without Mayor Vargas' help would have been an incalculably harder job, sure - but in doing so, he had made a monster. Instead of throwing Vargas to the wolves as he had expected, the people of São Paulo embraced him.\n\nIt wasn't perfect, of course; Lacerda had told his contacts in the press to try to remind the public of this as often as possible. But apparently that didn't matter to the people of Brazil, as the little Prince's influence across the country seemed it was only growing by the day.\n\nIt felt as if the man adorned almost every newspaper he could find. Parades with him at the head, pictures of him holding some nice old woman's grandchild, flyers with that smug grin aimed directly at him. And the worst part was that he couldn't even attack the man for playing off of his father's legacy, as his handling of the riots had built him an entirely new legacy separate from the old Getúlio altogether.\n\nThe Crow paced around his office nervously, mulling the PSP's new champion. He would undoubtedly be a tough opponent on the campaign trail for whoever succeeded him, but that was fine. He had beaten one Vargas, he could help beat another."
brazil_lacerda.202.a: "He had to."
brazil_lacerda.202.tt: "Vargas Jr.'s election chances in São Paulo will §Gimprove.§!"

brazil_lacerda.203.t: "The Pressure of Iron Bars"
brazil_lacerda.203.desc: "Chiyoko Taki's eyes were empty, her body broken and battered by years of holding cells she was shuffled between. One police station she remembered the cell was so tight she had to be pinned against the bars. The cold iron pressing into her leaving marks that she could still remember. For what? In the end, she had not done anything wrong. A scared little girl forced to join the only organization that could give her some feeling of safety. She did not fight anyone, she did paperwork, letters, copying, nothing that deserved the force of the law pressing against her. The police knew it too and after months of processing she was released.\n\nEven in freedom she was alone. Her family has been split up, all the people she knew were behind bars. She shuffled not from holding cell to holding cell anymore but from house to house finding whatever lodgings she could. She was always forced to move on for as long as those lodging her saw fit to exploit her for money, for labor, or for 'favors,' in their words. Yet she always was able to find a way to move forward even as her body ached. The long nights in temporary houses, or on the street pressed into her too.\n\nAfter years of that life, she ran into a man who preached the good book, the gospel of Seichō no Ie. The House of Growth, the God which was not the same as the God that she had once heard about. It had come from Japan with the people who arrived every day with the immigration ban repealed. Yet despite coming from Japan it had many followers across wider society. When she went to the man to introduce herself as a prospective follower initially he was not looking for a Chiyoko, but when she was a Cleusa the doors started to open. She pressed their teachings into her mind and in doing so pressed up the ranks of the cult, and there she found a place to be. She was sent to Tupã where the cult had a base and there she met more Nikkei."
brazil_lacerda.203.a: "The pressure of all those memories..."

brazil_lacerda.204.t: "The Father's Journey"
brazil_lacerda.204.desc: "Sumitada Taki had not eaten in three days. His last meal was a bowl of white rice and a pickled plum, a meal that looked like the Japanese flag. With the hunger of days as a spice he did truly enjoy the meal. If only the ideals he had fought for could provide nourishment like that. It had been a long journey, of buses, of trains, and his own two feet. His boots had been worn thin. It had originated in a holding cell. As the cells filled more scrutiny was placed on each occupant and his relative lack of wrongdoing and no trial led to his release. From there he traveled at other people's good will, or ignorance of his lack of ticket. He had slept under bus stations, in gardens, the cold earth his only bedfellow. Still he pressed forward.\n\nHe had arrived at the place. It was a small convenience store, he could see the bottles of rum and various other alcohol lined up behind the counter. There was a cigarette display next to him as he walked in. It was owned by the father of Gentaro Shizuo. This had to be the place. In his travels he had read the article about the brother of a hijacker. It had to be Chiyoko, his daughter. The eyes of the other patrons and the man behind the counter, Gentaro himself, were fixed in his direction. His clothes were threadbare. He was out of place in a nice neighborhood like this. It was exactly the place he would have avoided while still on the road, rich conservative suburbs always full of people with too much time on their hands to hassle a frail old homeless man such as himself. Even so he'd always hated Santo André.\n\nGentaro comes towards him to try and shoo away the interference, as he was pushed back into the direction of the door, suddenly something pressed against his back. It was two arms, hugging him. He almost fell over. It was Chiyoko, it was his girl. The person who he had walked all this way for."
brazil_lacerda.204.a: "I'm home."

brazil_lacerda.205.t: "A Long Awaited Reunion"
brazil_lacerda.205.desc: "There was cheering in the streets of Tupã, the man at the center of it all Sumitada Taki was not best pleased. They were cheering for him, for the legend he was. The man who was trained at Judo, the man who had blood on his hands from his days in Shindō Renmei. The blood that broke the bonds of his marriage, that left him isolated and alone. Yet he could not stay angry at this entourage. They knew where he wanted to go, they knew where the Kōdōsha operated from nowadays. Where Chiyoko Taki, where his daughter would be.\n\nHe rounded a corner and there she was. Word had gotten out and she too was drawn to him like the crowd, yet hers was the face had been so longing to see. She was surrounded by whatever remained of the Kōdōsha, some faces were familiar to him. The place was familiar to him, this was after all where Shindō Renmei was founded all those long years ago. He didn't remember running towards her, or her running towards him. He hugged her, holding her tight for all the years that he could not. He felt himself about to cry. He could not undo all the time they had been apart. He could not undo the empty space left by Hiroshige.\n\nThey ended up finding themselves in a bar where he got to meet Chiyoko's new boyfriend. A man with a smile that never seemed to leave his face. It was uncanny. He belonged to the same cult Chiyoko had found herself a part of, Seichō no Ie. They kept on talking about their God on and on, as they both worked hard to bring him into the family of faith."
brazil_lacerda.205.a: "Even family requires some coaxing."

brazil_lacerda.206.t: "I Know I Have to Go"
brazil_lacerda.206.desc: "6500 km away from São Paulo, Sumitada Taki lay on the simple bed of his morose Havana apartment, listening to the tropical storm howl outside; the shutters shook, and a heavy veil of rain seemed to seep impossibly through the concrete. Weighed down by his years, Sumitada had thought he was used to weather like this. It was an altogether different kind of storm that had shattered his life.\n\nHis thoughts often lingered bitterly on his wife and daughter. Chiyoko's mother was gone, but he at least knew now that his sweet daughter was alive and well, thanks to Hiroshige pulling a lot of strings with the VPR. As for the boy, he was away most of the time now, working for Massafumi, play-acting as Che and Fidel. It's the folly of youth to waste your precious time with fantasies, but he would learn that lesson soon enough. The elder Taki had no more energy to teach him.\n\nSlowly, deliberately, Sumitada rose from the bed and went to his desk, the sound of unforgiving rain in his ears. Since they had made contact, Chiyoko had been able to write a few times, and he returned to her letters often. This had not become easier to do.\n\n"Otousan, it makes my heart sing to know you and Hiroshige are well and safe..." "I found myself an orphan, so alone in the world, and the city had gone mad. I must admit, there were some dangers..." "I had no place to stay, and I didn't know when I would eat next. When I did eat, I thought of happy memories around the dinner table with you all..." "I hope that knowing I am now fine will give you some peace. I hope that somehow, all of us will soon find ourselves united again, as a family."\n\nIt was not rain that stained the letters; the storm stopped just as suddenly as it began. Sometimes the sun crept in, the guilt lifted from the old man's bones, and he shared his daughter's hope and held it like a child."
brazil_lacerda.206.a: "It's hard, but it's harder to ignore it."

brazil_lacerda.207.t: "Bastion"
brazil_lacerda.207.desc: "The smoke, thick and acrid, stung Osvaldo's eyes as he braced himself against the worn wooden doors of the Igreja Santa Cruz das Almas dos Enforcados - the Church of the Suffocated Souls. Around him, Liberdade was convulsing in rage. The mob, a rabid beast, had tasted blood. First the Nikkei, then any face that hinted of Asia. Now, their hate turned, with chilling predictability, to the Black community, to families who had lived in Liberdade since before it was Liberdade, since it was still the site of the 'Cemetery of the Afflicted'.\n\nOsvaldo, a carpenter and deacon, knew the history etched into these streets, into these very church walls. This small Catholic temple, built upon the grounds of public executions. It was here, in what was once Largo da Forca, the 'Square of the Gallows,' that Francisco José das Chagas - 'Chaguinha' - was hanged in 1821. Hanged for daring to ask for better wages for Brazilian soldiers. The ropes broke twice, they said, a miracle in the eyes of the watching crowd, a sign of his innocence. But the authorities, deaf to divine signs and popular pleas, persisted until he was dead.\n\nInside the church, families huddled, a mix of faces - Japanese, Korean, Chinese, and Black - united by fear and a desperate hope for sanctuary. Osvaldo saw Dona Helena, her rosary beads clicking softly in her trembling hands. He saw young Kaito, whispering to his mother in Japanese. And in the dim light, flickering from candles placed before the altar - some whispered to be on the very spot of the old gallows - Maria began to sing a mournful canto in Yoruba, a lament for the lost, a prayer for the living.\n\nOsvaldo tightened his grip on the chair leg, a poor weapon against the storm outside. Here, in the Church of the Suffocated Souls, haunted by history, consecrated by defiance, they would stand again."
brazil_lacerda.207.a: "They would breathe. They would endure."

brazil_lacerda.208.t: "Japan Reacts"
brazil_lacerda.208.desc: "Downtown Tokyo buzzed with activity, even in the wee hours of the day. Flowing in and out, a river of men in tailored suits filtered through convenience stores and newsstands, leafing through the morning news on their way to the office.\n\nIf they went deep enough, past the recurrent passages about the escalating tensions with Washington, they would see a short editorial cornered in one of the back pages:\n\n"PRESIDENT LACERDA TAKES A STEP TOWARDS PEACE - JAPANESE IMMIGRATION BAN REPEALED"\n\nLacerda's name had been uttered by the Tokyo press before, usually paired with "U.S-backed," or "Pro-OFN." Today, he was lauded for ending Brazil's long-despised Japanese Immigration Ban. The Racial Democracy Act was described by one paper as "an encouraging first step towards once and for all vanquishing the racist discrimination suffered by the Nikkei in Brazil."\n\nIt was a "sign of rapprochement from Brasília," even heralding "future friendship." Amidst the fires sprouting in every continent, drawn paths of nuclear warheads, and theatrics of diplomatic squabbling, some good news.\n\nAn frail gentleman felt a rush of joy for his distanced family in Brazil. A secretary delivered the headlines, alongside cups of coffee, to corporate types hungry for good weather in foreign markets. In the Brazilian embassy, warm handshakes and cheers were shared."
brazil_lacerda.208.a: "To Lacerda, and a new era in Japanese-Brazilian relations!"

brazil_lacerda.209.t: "The Golden Path"
brazil_lacerda.209.desc: "The assembled heads of the UDN rose as Carlos Lacerda, victorious over the strike, walked into the room. He looked over each man's face in order: Távora, Magalhães Pinto, Milton Campos, Beltrão, Finally, Raphael Magalhães, who if everything went well would be the next man of the hour. There was no applause, but there didn't need to be any, the deed stood on its own merits. With the strikes defeated, the UDN remained on strong footing. All of their efforts would be for naught, however, if they could not secure electoral victory. That meant ensuring that the factions stayed united in the months ahead.\n\n"Gentlemen. First, I must thank and congratulate you all." Lacerda began, looking at each man in turn. "It was thanks to your support that we were able to successfully defeat the strikes and secure ourselves in a strong position. Take a moment for yourselves and for each other to appreciate our victory." Lacerda paused. Flattery was a simple weapon, but it was effective when used well. Lacerda's true flourish was to allow them to share in the victory of the others, to help prepare the ground for his next message.\n\n"However, we cannot rest on our laurels, but instead work to turn this position into future success. That is why I am asking you to support Mister Raphael Magalhães to represent the UDN in the next election." Lacerda let the words sit for emphasis. "He has the energy, dedication, and capability to carry the UDN forward to handle the next great challenges. With the full strength of the party behind him, I am certain that he can succeed come October."\n\nThe assembled faction heads looked at each other before looking at Raphael. Then, a scattered chorus of ayes as the faction heads, one and all, shouted their approvals for Raphael's candidacy. Raphael looked at the new men, and spoke: "Gentlemen, with the strength of our party, we will complete the fight against Varguism. I swear, I will not let you down.""
brazil_lacerda.209.a: "The new face of the future."
BRA_lacerda_magalhaes_chosen_tt: "§mRaphael Magalhães§! will be chosen as the §QUDN§! candidate for the §Y1970 Presidential Election§!"

brazil_lacerda.210.t: "Who Only Brazil Know"
brazil_lacerda.210.desc: "Paulistas gathered in their masses as cameras filmed from the wings, aimed for the kill at a new prospective President, a man cut from a very different cloth than their current man. He lingered by the microphone, taking in the passion of a people trampled upon. He looked on at the scenes of destruction still visible. He took it all in, and they responded with their chants.\n\n"Brizola! Brizola! Brizola!" Each one went off like a rifle round, a sound they were all uncomfortably familiar with. With a fist in the air, it was all silenced. The air was thick. Then, he spoke.\n\n"I see you all today: the poor, the sick, and the tired. You live in ashes, the ruins of a great city crushed into the earth by a tyrant trying his best to crush Brazil's freedoms. If his lackey gets into power, he'll have won." Boos and hisses emitted from the crowds. "That Magalhães, his protégé, is nothing but a crook, an immoral liar, and a seducer of married women."\n\nThe last comment provoked immense vitriol from the crowd. "He's nothing but Lacerda's way of subverting our democracy — his little pawn to rule from behind the shadows — to continue his assault on our freedoms. This is why I must run against him, and it is why I ask for your support today. To help me teach this tyrant and his sycophant a lesson, I ask of you one thing."\n\n"Vote Brizola for a better Brazil, the Brazil we know." As the chants of his name resumed, Brizola had his answer.\n\nIn Brasília, a TV was flickered off by the President. His tongue moved around inside his mind as Lacerda pondered something only known to him as a war room raged in his mind. His fingers tapped an election cadence, his lips wordlessly practiced campaign speeches, and finally, his vocal cords gave off the two words of war:"
brazil_lacerda.210.a: "Game on."
BRA_lacerda_brizola_chosen_tt: "§VLeonel Brizola§! will be chosen as the §VPTB§!-§YPSD§! candidate for the §Y1970 Presidential Election§!"

brazil_lacerda.211.t: "Belief in Things Large and Small"
brazil_lacerda.211.desc: ""Coca-Cola. For extra fun, take more than one!" came the jaunty jingle over the radio, bringing a smile to Sofia Wainer's face. Since fleeing Germany, she had finally started to feel comfortable in her own skin. She had been lucky. She found a well-paying job on the cleaning staff for the Senado. The hours were long and the work was monotonous, but she was safe, ate well enough, and had a roof over her head.\n\nWhen the hours were long, her mind often wandered back to the Reich. The American continent was full of nothing but degeneracy and decadence. Their industrialists polluted the bodies of their consumers with poison like Coca-Cola as they sucked the people and their nation-state dry with their greed.\n\nNo sense of the people and their fatherland, only the pursuit of capital and the exaltation of the self over the Volk. She never tried Coca-Cola, she never had the opportunity, but with the new plant, now it could be sold in every corner store.\n\nShe shook the nasty thought from her mind. The Reich was in the past, and this was the future. Not that some in Brazil weren't trying to transform Brazil into the new Atlantic Reich and bring her more uncomfortable reminders. Every other day, it seemed, some Brazilian politician talked about autarky or greed or one of the many words Hitler used to rally the people to his new order.\n\nLacerda, it seemed, was the only one willing to challenge the Axis's influence in the Americas. He stood against them, made strong statements against fascism. More than that though, he sought to bring investment to Brazil, to ensure that the people were prosperous and had something to believe in.\n\nThat didn't just mean lofty statements about what a nation and its people believed in. It meant having a home and a job. It meant being able to listen to music at a restaurant or walk on the beach and smell the salt air. It meant, after a long day, she would drink a refreshing Coca-Cola, because it was something she wanted."
brazil_lacerda.211.a: "She resolved to vote for Lacerda in October, and drink Coca-Cola for the first time after work."

brazil_lacerda.212.t: "Parry and Riposte"
brazil_lacerda.212.desc: ""The investment programs we've developed will transform Brazil and lead us into a new unprecedented era of economic vitality and strength. The Coca-Cola Company's investment in a plant in Minas Gerais is just the first step. Soon, more plants will open across the country. Combined with investments from our friends in Australia, Canada and the United States, our citizens will enjoy well-paying jobs and more affordable goods, raising the standard of living throughout the country." Beltrão announced, smiling broadly.\n\nReporters crowded around, hoping to ask questions. After a pregnant pause to allow the people at home to appreciate the weight of his statements, he pointed to the reporter from TV Globo.\n\n"Marcos Serra Canto of TV Globo. Minister, could you be more specific about the material gains for the average Brazilian?"\n\n"Certainly, Mr. Canto. These investment programs will allow us to reopen closed factories, expand existing industries, and provide competitive employment. Since the amount of goods we'll be producing will increase, overall prices will lower as the supply increases. Thanks for the question." Beltrão looked over and spotted a young fresh-faced reporter who seemed eager to ask a question.\n\n"Mário Gimenes Coehlo of Última Hora. Minister, what do you have to say to the analysts who have predicted that this will increase economic inequality and disproportionately benefit the wealthy?"\n\nBeltrão continued to smile, never letting on whether the question irritated or upset him. "That is a completely unfounded accusation. The increased employment will directly affect workers in the rural and industrial sectors, the increased tax revenue will go toward better funding of our public sector and infrastructure, and the increased economic activity is a boon that will be felt by all.""
brazil_lacerda.212.a: ""It is truly a pity that there are some who would prefer we remain in poverty," Beltrão replied, to Mário's stunned silence."

brazil_lacerda.213.t: "The City of Opportunity"
brazil_lacerda.213.desc: "Raphael Magalhães was used to being surrounded by crowds. Whether it was at the stadium before a game or in front of the crowds of people he hoped to represent. He remembered how the city looked after the storm, the damage was considerable. So many homes had collapsed, infrastructure that had taken years to build gone in a single night. Yet they had been able to rebuild, with new modern boulevards, homes that were bigger and built with better materials. All done by him and Lacerda, hand in hand. He looked down at his speech, at the crowd, once more before he began.\n\n"Hello, Rio de Janeiro." He paused for a moment, letting the crowd's energy have another second to dissipate. "We have been through hardship, all of us. The storm wiped out so much of the progress we had made, taking houses that had stood strong for decades and turning them into rubble. At that moment, I looked at the damage and felt despair. But now, with Lacerda and my policies, we have been able to rebuild the city beyond what it once was. Out of the dust and rubble, we have built new, modern homes, spacious and comfortable.\n\n"With the destruction of the storm, we finally had a reason to update our old streets and rebuild new modern boulevards, just like those in America. The average person who lives in our city today lives better than any Argentinean, any Paraguayan, any Chilean, we live on the same level as those in the United States. Our city is a city of hope, a city of possibilities. I hope that in the coming elections we can bring the rest of Brazil up to our level, to give them all the opportunities that we enjoy! Vote UDN!" He raised his fist to the crowd.\n\nIn that crowd was Francisca, still conflicted about who to vote for. While the dust of the storm had settled and the city was getting back on its feet, the chaos of the labor strike was also due to the UDN's policies. Anyway, it did not seem as cut and dry as he seemed to make it in his speech."
brazil_lacerda.213.a: "Opportunity for the UDN to spread its message."

brazil_lacerda.214.t: "Anti-Imperialism in Action"
brazil_lacerda.214.desc: "The radio crackled into life as the hour hit 7 pm.\n\n"The time is seven in the evening and you're listening to A Voz do Brasil, today there have been developments in the important arena of international trade with President Lacerda announcing a set of new tariffs on the Empire of Japan and several members of the Greater Asia co-prosperity sphere, in particular an extra 10% tariff on any goods imported from the Empire of Manchuria. Our reporters would like to note that it appears preferential trading agreements between our nation and the State of Guangdong remain unaffected by this latest round of tariffs.\n\nIn announcing his tariffs President Lacerda mentioned he was motivated by a need to 'contain,' the 'Imperialist powers which continue to threaten our freedom.' In particular his speech hinged on the need for Brazilians to make some sacrifices to defend global freedom, and how any sacrifices we would have to make being 'far less than those who continue to live under the oppression of the Japanese Empire.'\n\nNow onto the latest news from the Senado..." The radio trailed off as Lacerda's attention turned away from it. This would show the voters his real commitment to anti-imperialism.\n\nWalking down the corridor his foreign minister Vasco de Cunha walks into the office. "I heard the broadcast, you followed my advice in the end Mr. President. Thank you for trusting me. You did the right thing, this is going to benefit us both with the voters here and with the Americans abroad." He smiled at Lacerda.\n\n"Well either way the die is cast. It's not like we can go back now. I hope I was right to believe in you Vasco, but it remains to be seen how the wind will blow." Lacerda said in reply."
brazil_lacerda.214.a: "I wonder if Hitachi will have anything to say..."

brazil_lacerda.215.t: "Tariffs, Polls, and Plots"
brazil_lacerda.215.desc: "It was mid-morning when Lacerda sat in his office, as he always did at this time of day. Across the top of the newspaper was the headline, "The Empire Strikes Back," as it listed the dozens of retaliatory tariffs the Japanese had imposed in response to his tariffs.\n\nFactories were in chaos, as the Hitachi tire factory had chains across its gates. Workers were left outside wondering about their future.\n\nBrizola's name was on the byline of an editorial denouncing the new tariffs as hurting Brazilian workers the most, and once again talking about how Lacerda had no time for hardworking Brazilians and how his political pageantry was once again putting their livelihoods in jeopardy, as well as throwing the entire Brazilian economy into a tailspin for no good reason.\n\nSame as always with Brizola, Lacerda thought to himself, smiling. The economic hit had been planned in advance. While it would be noticeable, it would hardly be significant, and the economy would be able to absorb the shock.\n\nThat had been the point of his policy all along, to build a resilient Brazilian economy that could afford to decouple from despots.\n\nThe editorial was accompanied by a poll showing that the middle class, in particular, not only supported the current round of sanctions, but that there was support for tougher sanctions. Nothing is off limits in the fight against imperialism.\n\nIn the end, the tariffs had worked well, weakening an imperialist enemy and solidifying his support among voters who could be persuaded to vote for him, while alienating only those who would never vote for him in the first place."
brazil_lacerda.215.a: "Everything going to plan."

brazil_lacerda.216.t: "Insecticide"
brazil_lacerda.216.desc: "Brizola was thankful that the stage faced south, keeping his eyes out of the bright sun. He needed to inspire the people, it wouldn't do to squint. He looked out over the people, laborers, fishermen, teamsters. People with calloused hands and hopeful hearts, hoping that he could help them. He looked on them and saw faith, and knew that he couldn't let them down.\n\n"I ask you, people of Recife, what have the UDN economic policies given you? They crow on and on about how they are increasing investment, creating a more prosperous Brazil. They talk about lines on charts, but what does that actually do for you, the working people? Do they reduce your rent? Do they pay you more? Or do they just keep it all for themselves and build themselves an ever-larger ivory tower to look down on you from?" The crowd erupted into cheers, shouting undistinguished cries against their poverty.\n\n"They have eroded your rights in the workplace to line their pockets. Every time one of your fellows loses a hand to industrial machinery, every time you are forced to work extra hours without overtime, it's the UDN that's to blame. If you want inequality to rise ever higher, by all means, punch your ballot for the UDN." Brizola's voice rose to a fever pitch, whipping up the crowd.\n\nThen, as quickly as he escalated, he quieted himself down. "But if you're tired of poverty, if you're tired of being taken advantage of, then the PTB-PSD coalition are the political party for you. As your President, my solemn pledge is this. We will take that ill-gotten wealth, extracted from the workers, and bring it back to those who have given their blood, sweat, and tears for it. Poverty is the disease that these mosquitos have afflicted us with, and only the PTB-PSD is the cure.""
brazil_lacerda.216.a: "The cheers of the people blanketed the square like a fog."

brazil_lacerda.217.t: "The Need for Moral Foreign Policy"
brazil_lacerda.217.desc: ""You hear so much," said Lacerda, almost to himself, "about Germany's crimes. But rarely about Japan's." He scoffed, idly rolling a pen along the air like a conductor. "Psychotic generals ripped entire states from the Chinese and handed them over to greedy tycoons, shackling the natives with drugs. They butcher women and children like animals in Indochina. Even their vassals, backing terrorists and tyrants in West Africa. Even terrorists here." A frown had set deep over Lacerda's face. "But the rest of the world—I'm talking about the free world here, our world—see them as an acceptable alternative. It's sickening. It's..."\n\n"Appalling?"\n\n"You're not a thesaurus, Vasco. But yes, appalling." He leaned back in his chair. "Trade sanctions. That's the kind of clear moral stance we need. We will not benefit from their injustices any longer."\n\nVasco de Cunha nervously fiddled with his watch. "With respect, Mr. President, trade with the Sphere accounts for a not-insignificant portion of our economy, even accounting for increased trade in the Americas. I'm not saying we shouldn't take a firm stance, but-"\n\n"-you're more concerned with the balance sheet?"\n\n"I'm more concerned about the election. Any kind of dangerous fluctuation in the economy is going to ripple through our polling numbers." Lacerda opened his mouth, but Vasco jumped in first. "Look, I know that it's the right thing to do, I'm not saying you should abandon the idea. But perhaps we start with something measured? Frame it as much of a protectionist measure as a moral one. Then, once the election is over, we can take that as a mandate to push for more... stronger declarations.""
brazil_lacerda.217.a: "Lacerda shook his head. "No. Our statement's meaningless if it's a half-measure.""
brazil_lacerda.217.b: "Lacerda chewed his lip. "I suppose there's merit to that, Vasco.""
BRA_selected_trade_war_focus: "We have chosen a firm approach."
BRA_selected_slow_drift_focus: "We have chosen a careful approach."

brazil_lacerda.218.t: "If a City Is Set Upon a Hill"
brazil_lacerda.218.desc: "For so long, Shizuo Osawa thought he would never hear anything bar the sounds of fury in the streets. He was never so glad to be wrong. Industry filled the air as construction went underway, renovations aimed at healing the wounds caused during the Liberdade riots.\n\nCar and trucks marked with the sigils of governmental agencies sped toward the deprived neighborhoods he had become all too familiar with over the riots. Houses were being rebuilt, one by one. Local men and women who had been unemployed for years were now getting work on public works projects. Shizuo thought it was all too good to be true.\n\nWell, it was certainly true, but there was a catch.\n\nThis was an election year after all.\n\nThe cynicism of it all made him sick to his stomach. He wondered how long it would have taken Lacerda to rebuild Liberdade if there weren't any votes to be won from doing so. Still, Shizuo couldn't bring himself to stay angry at this development. Liberdade was finally getting the attention it deserved, and its scars would heal.\n\nAnd with that, Shizuo continued his walk from work. Even if these good deeds were for less than pure purposes, he still got to see its results."
brazil_lacerda.218.a: "Liberdade. Burnt by a mob. Rebuilt by votes."

brazil_lacerda.219.t: "Fixing the Odds"
brazil_lacerda.219.desc: "In any smoky backroom, the odds of any number of powerful men enjoying cigars and brandy was never zero.\n\nBrizola made the first move, though the two men had already imbibed several drinks already. "Mister Wainer. I will be honest with you, the UDN enjoys a commanding advantage in the media. While we have made great strides with the Diretizes and Última Hora newspapers, but it is nowhere near sufficient."\n\nWainer nodded. "It is very difficult to overcome an institutional advantage the likes of which the UDN can command." He flicked some of the ash from his cigar into his ashtray. "My wife might be able to help in that regard. You remember Danuza? She knows a few journalists that would be amenable to putting pressure on Magalhães. I envision a few hard-hitting pieces on his character, his impiety and his numerous extra-marital affairs. That will positively destroy his standing with the conservatives and fracture any potential coalition that could stand against the PTB-PSD. He'll be so busy trying to mend fences that he won't have the capacity to build momentum in the electoral campaign."\n\nBrizola frowned. "I'd rather find a way to fight him on the economic front. If people are talking about that in the election, it would position us better after we win the election to enact policy faster."\n\n"You'll bore the people to death that way," Wainer crushed out his cigar. "The people want dirt. They want scandal. People don't vote with their heads, they vote with their guts. And if their gut says that they hate the guy for being a philanderer, then that's what they'll do.""
brazil_lacerda.219.a: ""I don't like it, but I don't like the idea of the UDN in power even more. Do it." Brizola nodded."

brazil_lacerda.220.t: "How It Looks From Here"
brazil_lacerda.220.desc: "Távora rose from his seat at the booth of the Moquecasa. Benedito Guimarães Rodrigues, Globo's chief of broadcasting. Rodrigues had been looking forward to meeting Távora for a long while, and Távora had been hoping to meet Rodrigues to establish a positive relationship before the debates.\n\n"Mister Távora, I am pleased to meet you." Rodrigues's handshake was firm, and his smile warm. "I'm looking forward to the debates. They'll be a fine spectacle for the people."\n\n"And good for ratings." Távora joked. "That's actually something I wanted to discuss with you, the future of Globo's relationship with the next President."\n\n"Presumptuous, I like it." Rodrigues kept his shark smile. "I know how powerful the media can be, but that power is dependent on many things. The press depends on access to function, and no one can trust a journalist who remains on the outside looking in."\n\nTávora let loose a sly smirk of his own. "Of course, that is one place where the media relies upon the government. And of course, in the media world, speed wins. Everyone listens to the broadcaster who has the scoop first." He paused. "It's actually quite fascinating how the media can present the same action in two different ways. All it takes is a single turn of phrase, and someone turns from confidence to struggle in a heartbeat."\n\n"Of course, all it requires is the right...context. I believe we understand each other fully." Rodrigues's smile grew ever brighter, and the dance reached its conclusion."
brazil_lacerda.220.a: "The two men shook on it, and to them, the future looked a little brighter for the both of them."

brazil_lacerda.221.t: "How It Looks From There"
brazil_lacerda.221.desc: ""Certainly, João. My economic plans are designed with the entire population in mind. Broad-based economic growth is the only way to raise living standards for all Brazilians. High production puts downward pressure on prices, trade increases product diversity, and brings in more money to fund government services without shackling the next generation with rising interest payments to service the federal debt. Thank you."\n\nFrancisca listened intently to Magalhães' answer as she stirred her coffee. What he said made sense, a booming economy had plenty of advantages to provide to people of all stripes. Magalhães was quite deft at handling the moderator's questions; he really felt like he had a plan for the Presidency, and had the expertise to get it done.\n\n"Mr. Brizola, over to you. You've made your case that the PTB-PSD is the only party equipped to tackle poverty, but what do you have to say about unemployment and inflation actually increasing under your coalition's stewardship?"\n\nBrizola paused for a moment. "Those allegations are baseless. As for unemployment, that was due to a myriad of factors, most of which were actually caused by the increased ease with which businesses could fire employees. Inflation was primarily caused by price gouging due to a lack of sufficient controls."\n\nFrancisca coughed, nearly spilling her mug. Brizola was stumbling badly, almost as if was stunned that someone would even ask him a pointed question. On the campaign trail, Brizola had been positively electric, but here, when someone actually challenged him, he stumbled. That didn't inspire Francisca with confidence; if Brizola couldn't handle someone who didn't believe his promises, how could he handle running a country where a good percentage of the public didn't vote for him?"
brazil_lacerda.221.a: "The only thing Francisca knew for certain was that she didn't know anything."
brazil_lacerda.221_tt: "£BRA_udn_texticon §QRaphael Magalhães§!'s popularity §Grises§! by §Y2%§! in the §YCentral-West§!."

brazil_lacerda.222.t: "Countdown"
brazil_lacerda.222.desc: "Lacerda's family was asleep, but he couldn't close his eyes for a second. A flurry of emotions had taken hold as he revisited mementos of his Presidency. He wondered what the people would think of him after he died. Today wasn't about him though. It was about Raphael Magalhães, his protégé, the man who would win the incoming elections — the man who would carry on his legacy.\n\nElsewhere, Magalhães talked to his advisors. Words came out of his mouth, his mind was focused on other matters. A part of him was happy that the campaign was ending, regardless of the outcome. Muckrakers combed over his past, his private affairs exposed, and his name dragged through the mud. Hopefully, it was worth it. Hopefully, he would be President.\n\nBrizola's voice was hoarse. He screamed until he couldn't scream anymore. All for them, all to see the UDN be defeated. Brazil deserves that much, as does Vargas, the man who built it up today. Their time was not yet over — Brazil would not leave them behind — there was still so much work that had to be done.\n\nTV Globo blared away in Francesa's tiny apartment. Brazil was at a crossroads, a decision between barbarism and civility. She hoped reason would prevail, that Brizola would win, but she didn't know which way their land would turn. She gave him her vote, but she knew lots of people who voted for Magalhães. She would have her answer as the TV piped up for an announcement:"
brazil_lacerda.222.a: ""I think we can safely say that the next President of Brazil will be...""

brazil_lacerda.223.t: "The Encroaching Storm"
brazil_lacerda.223.desc: "As the morning mist settled over Porto Alegre, Mayor Tristão Sucupira Viana stood at the edge of Morro de Santa Teresa, looking at the distant sea. The city seemed to sprawl endlessly, its streets bustling with life. However, his mind was consumed by unseen forces shaping their future.\n\nHe could feel the growing influence of the United States. American ships occasionally docked in the city's port, with sailors freely spending time in local bars and shops. Across the neighborhoods, billboards for Coca-Cola and Marlboro cigarettes towered over traditional signage, and the streets hummed with the chatter of American tourists filling the hotels. The promise of prosperity and protection felt hollow to Tristão, and he worried about the costs of it for Porto Alegre and Brazil.\n\nThough, it wasn't just the Americans who occupied his thoughts: across the sea, the shadow of Argentina loomed larger every day. Viana could see the silhouettes of naval vessels through the morning fog. Argentina's expansionist rhetoric had grown sharper, leaving Porto Alegre exposed as the first potential target in any conflict. Flipping through a file of military assessments, his frown deepened. Strategic evaluations painted Porto Alegre as a critical target, with its industries and location essential in a possible war.\n\nViana didn't need convincing to support Lacerda's initiative. If Brazil joined the OFN, it might guarantee security for Porto Alegre against Argentina's ambitions. Still, at what cost? His heart sank as he considered the future, one where Porto Alegre might lose its soul to foreign influence or even its existence to war. With a heavy heart, he descended the hill, ready to endorse UDN's plan, all the while wondering."
brazil_lacerda.223.a: "If this city's survival meant sacrificing its independence?"
brazil_lacerda_223_tt: "§FWe will §Ggain§! Senado support for the §Ybill§! depending on how high §lSouth American Cold War Tensions§! are.§!"

brazil_lacerda.224.t: "The Rooster and the Crow"
brazil_lacerda.224.desc: "The two presidents walked side by side. Lacerda gave deference to Charles de Gaulle's slow pace due to his age, but despite his laggardly gait, the old Frenchman was full of spirit. "France stands now. Your support, my friend, made it possible for the dream to continue."\n\n"Indeed, Mister President. Your victory over the PALF has shown the world exactly the strength needed to triumph over barbarism. The Brazilian people and I were glad to play a role in the defense of your nation and your ideals."\n\nDe Gaulle nodded his head, but stopped to look in the distance. A ruined building, leveled by an artillery shell. "The scars of this conflict will not be easily forgotten. We will need to rebuild if we ever hope to build ourselves up enough to return to our homes."\n\n"Agreed. Brazil is pleased to work with you as well in that regard. There are firms that can help rebuild roads and mines, so that you can begin to put your economy back on track. Our industries can also sell you a true bounty of our agricultural output, to help alleviate supply shortages, as well as provide doctors to help rebuild your medical services and get everything back under control."\n\n"Very good, President Lacerda. Your support is invaluable in these trying times. I know that history will look back on this moment and say that when the time truly came to be tested, it was Brazil who stood up not just for itself, but for its ideals across the globe. That, my friend, is what makes your nation truly great."\n\n"Indeed, Mister President. My trade delegates have already prepared the first drafts for trade and partnerships, and will deliver them at your earliest convenience." Lacerda smiled. He knew precisely how to do well by doing good."
brazil_lacerda.224.a: "Spread wings cast a long shadow."

brazil_lacerda.225.t: "Lost to the Forest"
brazil_lacerda.225.desc: ""It may not have been Brazil's war, yet all the same its loss was Brazil's to bear. As the final troops - and their casualties - are delivered home from across the South Atlantic, the reaction is muted outrage from those families who were torn apart directly by its losses and with no strategic national advancement to show for it. It was a waste of lives for unmet objectives, and Carlos Lacerda is the man to blame.\n\nFor the more politically involved, there is no such silence. For them, there was anger not just at the war's dead, but an active and failed contribution either to an "imperialist project" or to insouciant Washington-based policymakers. Pop-up rallies by the PCB and sometimes the PTB in major cities have been protesting Brasília's aid of a doomed colonial France for months. With little victory to show for it, those arguments may now be taken more seriously.\n\nCries that "Lacerda lied, thousands died" have been dodged so far, but this crisis will eventually need to be recognized for what it is: a preventable and major national embarrassment. The men of the barracks will not forget the fall of Abidjan so easily.""
brazil_lacerda.225.a: "Por que morremos pela França?"

brazil_lacerda.226.t: "Like Samson" # de gaul x lacerda yaoi scene
brazil_lacerda.226.desc: ""My heart goes out to you, President. To have your continent lost to fascism must be excruciating. It is a thought that haunts me every day, that makes me grateful that I live in Brazil, and not France."\n\nThey were in a room, somewhere. The where didn't matter to Lacerda, the who did, it being the legendary Charles de Gaulle. His tired face spoke volumes of the trauma he had seen, the scars of war, and the pains of losing a home. And yet, he seemed the model of a modern statesman, a figure Lacerda was in awe of.\n\n"The need for security is something that I have become acutely aware of in my old age, the need for a people to be safe, and to claim their deserved voice on the world stage." He sighed deeply, a lament for a lost history where their voice would have been respected.\n\n"It is a natural desire for any nation; it is why I am here today. The nuclear option is the only one left which guarantees our safety from fascism, and we are aware of Niger's uranium deposits." Very carefully, Lacerda made his proposition. "If Brazilian businesses were allowed access, we could help you find your voice."\n\n"Oh, what we could do if we had a nuclear option." De Gaulle's wistful thoughts were a mystery to Lacerda, apart from the glint of anger in his eyes. "But that time has passed us. However, with what you are offering us, I would be a fool not to allow you to develop your own option." A sense of relief cascaded over Lacerda; the hard part was over.\n\n"Thank you, President. It would be remiss of me to go just yet." Lacerda pulled out a vintage year from a once-free land. "Please, share this glass with me. For one night, we can imagine France as it once was." And they did, as the memories were shared as freely as the wine, and the hopes that happy memories could be made once again in Paris."
brazil_lacerda.226.a: "Brazil will only die alongside Argentina."

brazil_lacerda.227.t: "The Songs of Freedom"
brazil_lacerda.227.desc: ""You're listening to a Voz do Brasil special radio bulletin, as the Brazil-America treaty has been ratified today. This marks a trend of deepening diplomatic and commercial ties between Brasília and Washington..." A production assistant rushed over to turn the radio down as the studio filled. Jânio Quadros stood in the room uncharacteristically commanding as he was ushered into a chair.\n\n"Good afternoon," said the presenter "and welcome to Rede Tupi de Noticias. We're pleased to welcome Jânio Quadros to our studio to give his opinion on the latest developments in relations between our country and the United States of America."\n\n"It's good to be here. I have made my opinion known many times and the fact that our president continues to ignore the obvious drawbacks to taking a side internationally is something I find deeply worrying. It makes me afraid for the future of Brazil because we have so much to gain as a nation through being a dependable diplomatic partner for all nations across the globe."\n\nThe interview was interrupted in the streets by a brick through a window. The sound of smashing glass was the bassline, and the chorus went "Down with American Imperialism!" Separated from that crowd was another running in parallel. The blue flag of the OFN flew in the wind as they retorted with "Fascist puppets!" and "Down with Nazi Imperialism!"\n\nIn the back rooms of the presidential office Lacerda and Gordon met. There was the sound of a bottle opening. "Well Lacerda you finally got down to it." Gordon said with an electric smile. "There has never been a freer, more secure America, as the two strongest nations on the continent stand together."\n\n"I am just doing my part to defend international freedom." Lacerda said, smiling back."
brazil_lacerda.227.a: "The flags of Brazil and America fly together."

brazil_lacerda.228.t: "Kanchigai"
brazil_lacerda.228.desc: "The loudspeakers mounted on the wall crackled to life, each prisoner wincing as its feedback reverberated throughout the mugshot booth. "Face away from the wall and hold up your placard," rasped a cigarette-laden voice. Two police officers could dimly be seen by a microphone, squinting behind wireframe glass as a flickering fluorescent lightbulb hummed from above. The prisoners lazily complied. Flash. "Turn, please." Flash.\n\nThe prisoners, three men of Japanese descent, were handcuffed once more before the local chief of police entered the booth, scowling upon sight of them. "Shit. Can't get rid of those Shindō Renmei thugs so easily, can we? They're like damn cockroaches." The two officers murmured in agreement, despite the visible confusion of the prisoners. The rightmost prisoner scoffed.\n\n"Where'd we catch these punks at, anyway?" The Chief folded his arms, scratching at a shoddy five o'clock shadow.\n\n"Well, the two on the left," one of the officers pointed to the leftmost prisoners, "were protesting alongside socialist and communist groups in Vila Mariana. Anti-government crap, per usual. Of course, the protest got hot, and they then started fighting the same group..." The officer shifted his finger to the rightmost prisoner. "...That this one was a part of: Kōdōsha."\n\nThe Chief sighed, murmuring. "So, not Renmei?" The officer shook his head. "In any case," the Chief clapped his hands together, "we'll keep them here for another round of questioning. With any luck, we'll catch ourselves some more stragglers from Shindō Ren—"\n\n"Kōdōsha, sir. Shindō Renmei has been gone for some time.""
brazil_lacerda.228.a: ""Yeah, right," the Chief muttered."

brazil_lacerda.229.t: "Cor de Corrida"
brazil_lacerda.229.desc: "Barrios de Limão was a window into Brazilian life that much of the country, let alone the world, rarely looked through. Like New York City's Harlam, Limão had a similar cultural importance to São Paulo, for much the same reason. Little wonder, then, why the UDN were so thoroughly unwelcome there.\n\nBrazil's conservative establishment decided to at least try to appeal to the Afro-Brazilian population. Udenist campaigners would attempt a small gesture of public outreach, which they believed would benefit their public-relations efforts at little cost.\n\nSigns of a bad outcome were clear from the start, even as a section of road was cordoned off to make room for a stage in an urban residential neighborhood near the Marginal Tietê. The local shopkeepers and working-class families stared at their UDN visitors with jaded eyes, not buying the pomp and pageantry for a moment.\n\nThe UDN representative, a silver-haired old guard with a journeyman's talent for public speaking, did not (or, perhaps, could not) do much to improve the Udenist image in Limão. Hostile stares and derisive murmurs crescendoed into a chorus of jeering, booing, and profanity.\n\nA freshly emptied bottle of Bohemia stole the show, missing the head of the UDN spokesman by about an inch. This first volley was followed by a barrage. The whole crowd erupted as what seemed like a thousand kinds of trash were pelted at spokesman and party functionaries alike, until they were forced from the stage and had to be ushered away in a Mercedes, the stage and street littered with debris. The UDN did deliver on its objectives, in a very topsy-turvy way: the Limão population had a lot of fun, but it was all at Udenist expense"
brazil_lacerda.229.a: "When interviewed, attendees at the rally called it 'an enjoyable time for the whole family.'"

brazil_lacerda.230.t: "Report: On the Activities of the 'Movimento Negro Unificado'"
brazil_lacerda.230.desc: "At the request of the Office of the President, find attached the department's summary of activities of the Movimento Negro Unificado (the 'Movement'), following its identification as an activist organization of concern.\n\nThe Movement is, as can be expected from its name, primarily Afro-Brazilian in membership. Fundamentally subversive and anti-governmental in nature, it recruits from portions of the population who consider themselves to have been wronged by sitting state officials, and is committed to frequent and direct action in as visible a manner as possible. Any external funding sources, domestic or otherwise, are currently unknown (either in existence or in scope).\n\nImportantly, the Movement's ideology of resistance is centered upon opposition to the specific figure, reputation, and government policies of the President and the Cabinet. Though this increases the Movement's visibility considerably when government policy is executed, it also ensures that its focus and activism is not frequently upon general State initiatives. This can allow for the development of an approach to mitigate its effectiveness in fomenting unrest.\n\nShould the Office of the President desire further information or investigation, it can be provided."
brazil_lacerda.230.a: "Concerning. Very Concerning."

brazil_lacerda.231.t: "The Birds Have Stopped Singing"
brazil_lacerda.231.desc: "Lonely nights at the office seemed to be a recurring element for the last weeks of Lacerda's Presidency. It didn't feel right going back to his family, preferring the comforts of staring into the night's sky, an empty void that would not judge him for his failure to protect Brazil from Argentina.\n\nThey were the north star, isolated from anything else resembling light, a beacon to salvation. But what good was that beacon when it was trapped by everything else? They were alone in Latin America, their neighbors had turned their back to them, cast aside as an "American puppet".\n\nMeanwhile, Argentina was celebrated as a bastion of defiance, convincing Latin America that kowtowing to fascists could be called anti-imperialism. The less said about the strikes and the economy, the better. If he didn't know any better, he'd say the Varguists were on Argentina's payroll for all the damage they did to Brazil.\n\nAnd now, that idiot Brizola is trying to make a Presidential campaign out of the problems his cronies caused, and... well, he did have a point. The UDN did not make Brazil stronger, they, we left our nation alone.\n\nHe could only look to Raphael for hope, that he would get right what Lacerda got wrong, the pledges that the crusader forgot about when he took office. Raphael could do it, he had to, lest the whole continent was left to polish the boots of the men in Buenos Aires."
brazil_lacerda.231.a: "Goodbye to the crusade that never was."

brazil_lacerda.232.t: "Rain Or Firestarter?"
brazil_lacerda.232.desc: "Lacerda was being driven through the streets of Guanabara to a Magalhães rally, and he wasn't sure what was drearier. The weather which had settled into an overcast mizzle, his general mood which wasn't helped by his lack of sleep or the mood of the people. Who shambled around like the living dead and Lacerda for his part could only cringe on their behalf. He knew why, He'd promised the people a Brazil they could put their faith in, something to believe in! While he was trying his best and doing so for the most part, Brazilian still saw themselves as inferior compared to their Argentine neighbours. It was understandable as well, it seemed like Brazil was always one step behind them when it came to politics.\n\nBrazil gets a trade deal with Venezuela, Argentina gets one with better terms from Chile. Rough sea conditions mean a Brazilian ship has to be dry docked, while those same conditions lead to an Argentine ship only needing minor repairs. The Brazilians unveil a squadron of licensed LTV A-7's, the Argentinians unveil a squadron of Mitsubishi F-1's the next month!\n\nThe only silver lining in all this, was that they were only one step behind! All their hard work wasn't for not and there were still areas and places the Brazilians could pull ahead.\n\nRight now, Brazil's people were like damp tinder. All they needed was their moment in the sun to dry out and for the next president to ignite the flames of passion for themselves and their nation, he knew it had to be Raphael! Anyone else would be like leaving the Brazilian tinder in a monsoon!\n\nSo, as the car arrived at the Magalhães rally and he firmly shook his hand with a tight smile, he only had one thing to say to his young protege:"
brazil_lacerda.232.a: ""Be the match!""

brazil_lacerda.233.t: "Smooth Sailing"
brazil_lacerda.233.desc: "Lacerda looked out the window of the presidential palace. He had a clear view of the Paranoá Lake, which was an excellent sight on such a clear day. Its waters were calm and he could make out a couple of fishing boats bobbing and a sailing yacht leisurely drifting. He took a deep, calming breath in at the picturesque sight and held it for a moment. All this fighting, all this struggle, this is what it was all for.\n\nFor most of this tense standoff with Argentina, it seemed like they were neck and neck, but as the days go on; it seems like Brazil is inching further and further ahead. Just as they were meant to be. Lacerda then found his calm broken by a secretary running in with a telegraph from Ambassador Gordon, he opened it and started to read and as he did so, his easy going smile returned:\n\n"Dear Mr. President. I am sending you this telegram to congratulate you and your administration on your handling of Brazil and her foreign policy. Our countries have an allyship forged in the fires of WW2 so it is good to see you continuing this tradition. We will miss your stalwart leadership and hope whoever wins the next election and becomes your successor will act as you did. Yours faithfully, Lincoln Gordon."\n\nLacerda didn't hope his successor did so, he knew he would! Magalhães was edging ahead in the polls, the Brazilian public rewarding Lacerda and his party for a job well done. But the job wasn't finished, there was still a lot to do to secure Luso dominance of the continent and Brazil can have its time in the sun. With Raphael being the only man capable of doing it. Lacerda asked his secretary to write up a reply to Gordon as his sight returned to the fishing boats. Confident that the future of Brazil was to be trusted in the perfect helmsmen and pair of sturdy hands that was Raphael; and as his secretary returned with a pen and paper to begin dictating, the fishermen caught a bite and Lacerda smiled as he began."
brazil_lacerda.233.a: "Dear Ambassador Gordon, thank you for the kind message..."

brazil_lacerda.234.t: "A Conductor And His Symphony"
brazil_lacerda.234.desc: "Lacerda stood, the cheering crowd in the arena feeding off his energy as the TV cameras tracked his movements to the wooden podium with the Brazilian government's seal on it. He waved for them before holding one hand up to quiet down the crowd with a wide and comfortable smile.\n\n"Friends, Countrymen, Brazilians! I stand before you today as not only your faithful president! But as a proud man. A man proud of not just of himself, but of his country too! For years, Argentina and their cronies sought to impose their will onto this great continent; while the Judases of Vargas Jr. & Brizola would sell our dignity like Brazil was some sort of lady of the night!". The crowds booed and hissed at the mention of the two men, while Lacerda theatrically shook his head in disapproval while waiting for the crowd to calm themselves before continuing.\n\n"But! It is thanks to our fine military, and you; hard working men and women of this great nation! That Argentina and her Generals quake in their boots; while South America and its people stride towards freedom!" The crowd roared mightly, and Lacerda raised his fist in triumph as he basked in the stage lights and the lens of the various cameras dotted in the front row. Then, like the conductor of a symphony, he waved his hands to beg for quiet as he paced the rhythm of the crowd.\n\n"To make sure that our great work can continue, there's only one man I trust to get it right! Ladies and gentlemen, please welcome to the stage; Raphael Magalhães!" The stadium burst into applause as Lacerda stepped aside and shook Raphael's hand as he made his way to the podium. Raphael looked out into the sea of supporters and Lacerda couldn't help but look out himself. Each one of those people represented something concrete. Not just a heart swayed or a mind convinced, but a living testament that Vargas will be dethroned as Brazil's greatest president and defender, and would be replaced by him. As Lacerda let himself be whisked off by these fantasies, Magalhães shuffled his papers and began his speech."
brazil_lacerda.234.a: "Thank you Mr. President, and thank you all, my friends and fellow countrymen..."

brazil_lacerda.999.t: "All Hands Meeting"
brazil_lacerda.999.desc: "There was a radio down the hall, distantly reading out the weather. The staff were too exhausted to unplug it and so it was left talking into a void. Lacerda had called a cabinet meeting all hands on deck, and so Távora his Vice President, Beltrão the foreign minister and Golbery the war minister were dredged from their much needed post election rest. They washed up into the cabinet room to a smiling Lacerda standing at the helm.\n\n"Good morning," Lacerda said simply. "I believe the elections have now concluded. As of today we now have the longest stretch of time until the next election. The longest stretch of time in which to prove our case to the voters. The time we have now is an opportunity and we have to put it to use, for the good of this nation of ours. We cannot afford to let this opportunity pass us by. It is time to finally remove the straight jacket of Vargas' labor laws once and for all." The room fell silent for a moment as Lacerda let the impact of his words be absorbed.\n\nAfter a moment of hesitation Beltrão begins to tap the table in agreement which soon spread to the rest of the room."I know that this will be one of, if not our most difficult challenge in government, however we owe it to the future of Brazil to repeal these laws. We will remove this straight jacket and allow the ingenuity of all Brazilians to finally be freed from Varguist restraints! Let us come together and free our country!" Even as Lacerda smiled he knew the seas ahead would be rough. Perhaps his smile might carry them through the coming storm."
brazil_lacerda.999.a: "A smile to guide through the heart of the storm"
BRA_lacerda_load_strike_tree_tt: "§QLacerda's§! crusade against §VVarguism§! begins - §YMore options in the focus tree have been unlocked§!"

brazil_lacerda_strikes.1.t: "Opening Moves"
brazil_lacerda_strikes.1.desc: ""Dear loyal citizens of Brazil. Today, we face a crisis of an unprecedented scale..." The SFICI station chief dryly read out the memo to his colleagues, all assembled with martial stature in a momentary break from the task of protecting the nation. "...extremist groups will likely use our turmoil against us for their own radical agendas, infiltrating strikes to undermine our government."\n\n"Already, we are seeing reports of violence, particularly in Rio and São Paulo..." The Polícia Militar marched into the locker rooms to equip their riot gear, barely cold since its last use and faintly stained with traces of blood. "...it is vital that instigators are isolated and neutralized with extreme prejudice." A police radio blares reports of riots in the North.\n\n"With the situation on the ground being as critical as it is, we must strictly advise all emergency services to keep operations to a minimum." An ambulance driver eyed the memo before stubbing out her last cigarette onto it. Break time was over — she was in the business of saving lives — not following orders.\n\n"Our government is committed to defending our businesses in this trying time..." In the head office of a Pão de Açúcar store, a manager phones his friends, pleading for them to come over as soon as possible. His sons watch solemnly with rifles by their side before they hear noises outside, rushing themselves to the roof. "...we will do our best, but the safety of your livelihoods cannot be guaranteed."\n\n"To everyone else, I ask you to stay in your homes. The following weeks will be tough and unpredictable. The only other advice I can offer you is this:""
brazil_lacerda_strikes.1.a: ""Prepare for battle.""

brazil_lacerda_strikes.2.t: "Herding Cats"
brazil_lacerda_strikes.2.desc: "Vice-President Virgílio Távora took a deep breath, eyeing the crowd: a veritable who's who of the Brazilian right wing. Factional representatives from the UDN, the PTN, the right wing of the PDC and PSD, key military men of the Sorbonne and Hardliner variety, and MSD figureheads. Not to mention the conservative press squeezed into the room.\n\nA ready man, Távora marched to the podium. "Thank you all for coming today. I appreciate the sacrifices you have already made for your country, but I need you to make one more sacrifice." Choose your words carefully, appease them all, don't miss a beat, or they'll have your head.\n\n"Lacerda is fighting the hardest battle of his life against an entrenched establishment who have ruled this country since the dictatorship." Távora was annoyed that this hero couldn't even attend the speech — allegedly too busy with some unknown matter — typical. "We all must do our part to aid him."\n\n"To our valued contacts in the press — you have been invaluable in combatting Última Hora's propaganda — all I can ask is that you redouble your efforts in this new stage of the fight." Those in attendance gave a nod — we hear you.\n\n"To the honorable members of our military, I ask you to stand by and stand still. The road ahead may seem dark and uncertain, but I assure you that the light is within our grasp." Respected to them as he may be, many officers remained skeptical. Távora just hoped they trusted him more than Lacerda.\n\n"We must unite. We must not be broken by socialist tyranny, by those who wish to break our nation. Together, we will prevail!" Applause and cheers came from the floor, an unthinkable feat before. He thanked them again and left the stage, but he didn't leave their minds as some thought about what a more cooperative leader could do for Brazil..."
brazil_lacerda_strikes.2.a: "Távora's star ascends a little as Lacerda's dims slightly."

brazil_lacerda_strikes.3.t: "Sharpening Blades"
brazil_lacerda_strikes.3.desc: "Hello Eduardo, please see this list of changes to be made to your most recent article "Lacerda and Labor: The Legacy of a Dictatorship".\n\nIn the first section, please substitute the word "great" for "brilliant" during your initial listing of Lacerda's previous reforms. I need you to add commas after "military", "crisis", and "authoritarianism". Your description of the Vargas dictatorship could go into more depth when it comes to his brutality. I think the current phrasing is a bit too soft and could be emphasized.\n\nDuring your account of the CGT's history, I believe you have accidentally left out the party's close association with the PTB and their apologism for Vargas' dictatorial reign. You should also try to draw links between this and their defense of the Varguist Labor Code that they are currently striking to protect. Additionally, I'd also like for you to throw in a few positive parallels for the MSD.\n\nIn the next section, replace the usage of "trade unionist" with "communist" when discussing the CGT. When describing the strike paralyzing our country, you appear to have criticized the lawful conduct of police forces a bit too strenuously — I will need you to tone this down a bit. You can replace the gaps in your article by detailing CGT striker attacks against our businesses.\n\nI'd like the message at the end of the article in support of Lacerda, but I believe it could be made more powerful. We really need to emphasize to our readers that our President is fighting for the soul of our country. Don't be afraid to re-emphasize the damage the strike is doing to Brazil and our economy.\n\nI will need all of these changes to be made as soon as possible. In this economy, it can be painful to find a new job. Therefore, I trust you will heed my advice imminently. Thank you."
brazil_lacerda_strikes.3.a: "The truth can always be edited."

brazil_lacerda_strikes.4.t: "Making Friends"
brazil_lacerda_strikes.4.desc: "In a break from the war for workers' rights, strike leaders took their lunch to the park benches, still able to view their workers from afar. Their chats started with the usual small talk, but it quickly evolved as one leader informed the rest about a peculiar letter from Lacerda. Standing up on the table and addressing the rest in his most Presidential and American voice, he read it.\n\n"Luiz Pereira, I speak to you today not as your President but as your fellow Brazilian — your friend." The workers were already unable to stifle their laughter any longer. Incensed feelings of being called 'friend' by the arch-capitalist leech of the ruling class were buried by the sheer audacity of it. "And now, I ask you for the good of the nation to stand down and end this chaos."\n\n"I speak to your heart. I ask you to think of the decent men out fighting your wars. They are not class warriors — they are simple folks wishing for a fair wage to feed their families." The group response was a predictable sigh — as if to say, 'Yes, that's why we fight.' "I can't dissuade your dogma, but I ask you to spare the men and women forced to fight on your behalf."\n\n"If not your heart, I can try speaking to your pocket. My administration is prepared to offer you enough to put you and your family comfortably above the breadline. You will not get a better deal than that, so for your sake, I ask you to stand down and spare your workers from what will come next." He looked up from the letter as the crowd stood still. Then, he tore up the letter, sending them into a wild fervor.\n\nBut somewhere between these celebrations of comradeship and loyalty, others noticed something. There was one less worker here or there — the picket lines looked a little sparser — less weight behind the barricades. And then, they thought on Lacerda's offer. Perhaps it was enough to dissolve more than one resolve..."
brazil_lacerda_strikes.4.a: "The price of a fairweather friendship is thirty pieces of silver."

brazil_lacerda_strikes.5.t: "Finishing Touches"
brazil_lacerda_strikes.5.desc: "It passed, but that was a certainty for Lacerda anyway. What intrigued him was the scenes unfolding outside his perched view of the Chamber of Deputies.\n\nThe Petebistas were the first in his eye. They cried injustice on how the idealized worker would find themselves poorer and poorer after this bill. One even got up on the table, ranting and raving on Vargas' legacy, provoking only a laughing fit from Lacerda. The only alarming sight was the PTB men retreating in mass to plot their next move.\n\nThe Pessedistas found themselves fractured and far from the unanimity of the PTB or UDN, their divisions on full display when it came to the vote. Party deputies screamed bloody murder at one another as men and women discovered where colleagues really stood with aghast. Some had to be restrained as others were escorted out to avoid a total descent into anarchy.\n\nThe Udenistas walked with pride, undaunted by the heckles and jeers from their deputies on the ideological left. They met with their bedfellows in the PSP, the deputies who committed themselves to the UDN line not out of love but out of the base desire to line their pockets. They chuckled and smiled to themselves as self-praise was handed out in heaps.\n\nSome UDN deputies tried to find Lacerda among the glass booths as he watched over them, smiling at their leader as eyes occasionally met. An indulgence for the President, a token before the real fight began in the Senate — the moment of truth for his life's work.\n\nVargas' legacy would be that of a dictator with this bill, not that of "the great savior of the poor". He and his Labor Code would be history, and Lacerda would be the future, the thought of which was enough to drive him giddy. There was only one final roadblock before Brazil could reach greatness, and he was ready for it."
brazil_lacerda_strikes.5.a: "The final showdown between Varguism and Lacerdaism draws close."

brazil_lacerda_strikes.6.t: "Open House"
brazil_lacerda_strikes.6.desc: "The final votes were tallied as the Senate was silent in anticipation, the nation frozen in time. A verdict had been reached as Auro de Moura Andrade announced who Brazil cared for more: Vargas or Lacerda.\n\n"Having reached the requisite number of votes, the UDN's bill has been passed by the Senate and will soon become law."\n\nWhat happened next was an ecstatic blur where Lacerda felt he was not there on the Senate floor but somewhere ethereal. It was as if he was being ascended to the annals of history as the man who fixed Brazil. An almighty sense of power was infused into his being, the feeling that nothing was impossible now, that Brazil was his to sculpt into a utopia.\n\nLacerda returned to Earth as a crying UDN senator hugged, tears pouring out joy onto his suit. He was just one of the many cheering his name as even Távora and his backseat critics had to smile for Lacerda's success. He had shown them — they were firmly his men now.\n\nElsewhere in the Senate, the scenes were far from joyous. The Petebistas found themself as broken as their hero's legacy — their mighty pride in tatters as their ambitions were thoroughly humbled. The Pessedistas remained silent as if they were mourning their electoral future. Other senators kept quiet too — either out of grief or a desire to keep their bribes a secret.\n\nAs soon as the radio announced the results, it was turned off. Union men and women exchanged sober looks as if they knew what it meant but also knew that it could not end like this. With a redoubled resolve, they made their way to streets as fierce as ever, determined to make Lacerda suffer for this, to avenge their rights, and to fight for a future where they can put bread on the table."
brazil_lacerda_strikes.6.a: "Crushed, bruised, and bleeding, the unions will fight on until their very last breath."
BRA_riots_start_tt: "§VOur minimum wage and labor organization laws will worsen. The Brazilian workers won't react well to this - a new decision category is unlocked.§!\n"

brazil_lacerda_strikes.7.t: "Subsidence"
brazil_lacerda_strikes.7.desc: "The final votes were tallied as the Senate was silent in anticipation, the nation frozen in time. A verdict had been reached as Auro de Moura Andrade announced who Brazil cared for more: Vargas or Lacerda.\n\n"Having failed to reach the requisite number of votes, the UDN's bill has been rejected by the Senate."\n\nThat was it — Varguism had prevailed against all.\n\nLacerda felt sick at the back of his throat — like he had been poisoned. He felt powerless after its taste — left only as a weak and pathetic man who had let everyone down right at the moment of truth, right when they could finally move on from Vargas' corroding legacy. Was this his legacy? To be remembered as a coward and a failure who could not give Brazil the tough love it needed?\n\nThe reaction of the senators around him all screamed an affirmative to him. His party looked sullen — once proud men burying their heads in their hands — their minds waving goodbye to visions of a prosperous and free Brazil. The other parties were pleasantly pleased at a job well done. After all, they were the opposition, and what is an opposition if it does not oppose?\n\nBut beyond the self-gratification of defeating a man who tried to turn their nation into his own, some couldn't help but spy his next moves carefully. Lacerda carefully got up, straightened his tie, and promptly walked out of the Senate. There would be no grandiose speech, no emphatic denouncements of the people who killed his bill, no anything.\n\nThe only clue anyone had for what he had planned next was a most peculiar smile resting on his face and contorted with spite..."
brazil_lacerda_strikes.7.a: "Lacerdaism spits out blood as it prepares one last gambit."

brazil_lacerda_strikes.8.t: "Renovation"
brazil_lacerda_strikes.8.desc: "The dedicated workers of the CGT banner rallied today not to protest but to celebrate their victory in Lacerda's defeat. Some felt they were unstoppable — that this was only the start of a great social revolution against all of Brazil's ills. However, most were just happy for this victory, either too tired for anything grander or too pessimistic to expect the momentum to last for long.\n\n"Quiet! Quiet! Our dearly beloved President is speaking on the radio!" An attentive few beside the conduit for Lacerda's voice, twisting the knob so others could hear him. It was unexpected, but most relished the chance to listen to the miserable weasel cry his way through a eulogy for his plans to gut their rights.\n\n"People of Brazil, there comes a time for choosing. When institutional rot gets in the way of real progress, when the failings of the past block the road to the future, and when good men must make difficult decisions." There weren't any laughs, just confused and worried people wondering what would happen next.\n\n"To rid Brazil of Vargas, it is necessary to become a Vargas. I will see this bill to fruition by any means necessary, the Senate be damned! I ask you all to contain any anger you may have at this decision — your children will thank me for this."\n\nAny calm earned with the bill failing to pass was now only a distant memory as the union retook to the streets. Their screams were louder than ever as if they were the last defense against Lacerda's incoming assault against democracy.\n\nBut they weren't. In a well-kept office, a hand switches off the radio. Vice-President Virgílio Távora marched out the door to meet some old contacts, his head ringing with one thought for the new Vargas' speech:"
brazil_lacerda_strikes.8.a: ""What an idiot!""

brazil_lacerda_strikes.9.t: "Demolition"
brazil_lacerda_strikes.9.desc: ""Right, Golbery, how are the men? I'm sure they adore their new American guns—who wouldn't?" Lacerda's carefree voice seemed oblivious to the chaos arising from his speech as he walked back to his office. Golbery couldn't respond as he and his fellow Sorbonne officers found their minds preoccupied.\n\nTávora stood face-to-face with his President, guarding the corridor from further steps. "We need to talk, Lacerda, now!"\n\n"Of course, Virgílio. We have a huge agenda ahead of us." His words talked past Távora rather than to him. "I'd like you to start—"\n\n"You have nothing ahead of you." Martial authority affected his voice. "The only thing you can do for me, the party, and the people of Brazil is to hand in your resignation."\n\n"What? Why are you saying these things, Távora?" His ears detected a metal shudder from Golbery's jacket.\n\n"'Become a Vargas?' Are you an idiot? What did you think was going to happen?" His tone changed to that of an angry father. "There will be no discussion — you will resign now. All I can do now is try and clean up the mess you have left for us."\n\nGolbery clamped his hand onto Lacerda's arm as the other officers moved to subdue him. "I order you to release me now." No response. "I am your President." Still nothing. "Let go of me!" The only response to these attempts at resistance was a gun barrel jutting into his back.\n\nTávora left him to his fate as he walked to his new office. Lacerda could only watch as his supposedly loyal UDN comrades, Gilberto, Vasco, Hélio, and even Raphael, moved past him without a second glance, leaving him to the history books."
brazil_lacerda_strikes.9.a: "Lacerda became Vargas, and so, Távora became Lacerda."
BRA_tavora_takeover_tt: "§YA new focus tree is available.§!"
brazil_lacerda_strikes.9.tt: "£BRA_udn_texticon §QUDN§! loyalty will be reset to §Y75%§!."

brazil_lacerda_strikes.10.t: "Reconstruction"
brazil_lacerda_strikes.10.desc: "The new President was not treated to a lavish inauguration — his ceremony was meeting the countless people Lacerda aggrieved while in office — shaking hands with the party ranks from each faction in a vain attempt to glue together some sort of unified image from its shattered remnants. It was barely enough. The less said about his efforts wrangling the military and strikes, the better. At least he could look forward to Ney Braga's opening campaign speech.\n\n"When I look at the strife across Brazil today, I must admit, it is something rather alien to me. I love Rio and São Paulo, but Paraná will always be my home. I was given Christian values like cooperation, and then the military reinforced those and taught me others, like loyalty." Távora felt a twinge after that line but thought little of it, certain that he did the right thing.\n\n"Honest workers have been corrupted by a radical few, socialists who wish to see our businesses suffocate and die. But we also have those committed to free-market fundamentalism — the results of which have only brought turmoil." The President wasn't surprised to see Braga distance himself from Lacerda. It would be political suicide otherwise.\n\n"Therefore, I ask you all to strive for a future where Brazil goes forward as one — a future with Ney Braga at the helm. Vote Braga at the polls! Thank you!" Cheers and claps could be heard clearly from the audience, a surprising amount of enthusiasm from Brazil's demoralized right wing. It was enough to give Távora hope for the future.\n\nElsewhere, a miserable Magalhães, the former heir apparent, was quickly discovering that he belonged to the past, having been denied entry to the campaign speech. His attempts to disavow his close associations with Lacerda were not enough, and now he was a pariah to the party. Frustrated, he contemplated his next move, a move that may or may not belong with the PSD..."
brazil_lacerda_strikes.10.a: "The future of the right now belongs to the PDC, not the UDN."

brazil_lacerda_strikes.11.t: "Burn 'Em Out"
brazil_lacerda_strikes.11.desc: ""I'm afraid, President, that far from curtailing the strikes, what we are seeing after the labor bills is a second wind for the strikes..." Not only had Lacerda to endure some suit from the MSD talking at him, he had to do so while Távora's put on his best impression of the most condescending man in the world. "...simply put, we suggest a change in tack... with all due respect."\n\n"I see. Thank you, Paulo. Looking at these optics, negotiations may not necessarily be a bad idea..." Of course, that's what he would say. Távora always wanted to be the good guy — the nice guy. Nice is nothing in politics. Vargas wasn't nice, why should we be? Why should we come so far only to back down to this pack of communists, lunatics who- "...but, what do you think, Lacerda?"\n\n"There won't be any negotiations. We're going to smoke these rats out one-by-one."\n\nAt least if there are, they'll be on Lacerda's terms, not on Távora's. "Golbery." His peaked cap rose at the call. "We've got the military deployment plan on standby, yes?" He nodded. "Boost their numbers. Have them warmed up. Put the word out that they may be needed sooner rather than later."\n\n"Távora." The Vice-President's tired face looked at him, resigned to his next brilliant move. "Get on the wire to the police leaders in each district. Tell them to rally in union hotspots — their usual meeting places. If they have to crack some skulls to send a message, so be it. Let them know that we won't be crucifying any heroes in their department to the media."\n\n"You're the boss, Lacerda. I'll get them the memo now." He gave the MSD men a look of his pity as he dismissed them. "Go home to your wives. This will be a long week." Lacerda smiled as they all left the meeting room. Second wind, more like their death throes. He'll give them their long war, and they'll all go home — crying about the man who put manners on them."
brazil_lacerda_strikes.11.a: "Consensus is a word best left dead and buried."

brazil_lacerda_strikes.12.t: "Virtue of Patience"
brazil_lacerda_strikes.12.desc: ""In a building as big as the American embassy in Brazil, there was always paranoia that information leaked out of the building. As Lincoln Gordon followed Juracy Magalhães into an overlooked meeting room, this thought rang through their heads — firmly shutting the door behind them. These were matters of national security — there could be no mistakes.\n\n"Let me start by restating the obvious — Lacerda has our full support. However..." Magalhães cringed; there were always caveats. "...but, our support is tied by ...restricting factors. Congress doesn't understand the battles here, so whatever aid is negotiated must be thoroughly disguised."\n\n"Of course, we all have our conduits, and not everyone is completely pleased with our President's course of actions..." Least of all, the Realistas. "...but, we must give him our total support. Previously, I believe you mentioned the FBI would be able to help here?"\n\n"Yes. We can fund the government through a couple of fronts, generous grants to businesses to buttress for turbulence to come, and wage subsidies, tax breaks, scabs..." Gordon trailed off, realizing he needed to get to the core of the issue. "Look Juracy, within reason, the American government will do whatever it can to aid this administration — it is in our interests."\n\nMagalhães sensed an incensed tone from the ambassador but didn't push further, unwilling to spoil a good thing. "Thank you. We'll be able to starve them from the barricades back to the workplace. Lacerda isn't a man for waiting, but he's willing to learn from the rest of us — it's all he can do if we want to show these strikers what for." Gordon went to the door, leaving him one final piece of advice:"
brazil_lacerda_strikes.12.a: ""For your sake, let's hope Lacerda has the bottle to survive this.""

brazil_lacerda_strikes.13.t: "Cavalry Charge"
brazil_lacerda_strikes.13.desc: "Hundreds stand eye-to-eye with hundreds, a showdown on a sunny avenue in Rio de Janeiro that would not look out of place in Rourke's Drift. Workers fling missiles against the phalanx of the military police who stand there waiting, watching, and praying for their chance to retaliate.\n\nA commander listens to his radio; the cavalry has arrived. Mounted units line up behind the shields — his ace in the hole. He read the latest memo from Lacerda — he knew his duty — to beat the strikers into submission to stop their tyranny. There would be no better time for it. He passes an order down the chain of command — the formation begins to shift.\n\nThe shields open to reveal a horde of horses, riders steering them into the protests with abandon. Batons fly into the skulls of the young, old, and bold without discrimination. The jackboots follow in their warpath, mopping up the wounded and those still left standing using extreme prejudice. An hour later, there is nothing left but blood and the cries of the once brave.\n\nPolice pose for pictures carting off strikers to jail. Captains give interviews to sympathetic right-wing journalists accusing the "mob" of having provoked the charge, claims that firebombs and firearms were used by them, yet not a trace of either would ever be found. Glowing articles are written praising the police as heroes who protected the common man's freedom.\n\nIn the days following the assault, hospitals will still be full with hundreds of injured strikers. Última Hora will run a front page spread on the incident as a "serious overreaction"; other opposition papers contain similar stories. In the coming weeks, every arrested worker will be freed from jail without charges as protests for an inquiry into the attack fall on deaf ears."
brazil_lacerda_strikes.13.a: "To kill the working classes in the name of liberty."

brazil_lacerda_strikes.14.t: "Survival Mode"
brazil_lacerda_strikes.14.desc: "When Mauricio heard the announcement of martial law in São Paulo and the northern states, he wondered what it would mean. Today, the message was clear: President Lacerda has declared war on his own country.\n\nThe feeling of watching an M41 Walker Bulldog tank roll down a Fortaleza street was alien to him. He was an aged man, but never someone who felt fear until today. Its steel chassis exuded an unnatural feeling of authority towards him, enough to render any thoughts of dissent against the state nil, to teach them obedience.\n\nSome could resist: trade union leaders who believed they could use the declaration of martial law to galvanize public support for them as fighters against a totalitarian regime. Sympathetic journalists attempted to reinforce this image, but it was futile. Anyone inspired by this only needed to step outside and see the APCs to shake off this rebel bravado.\n\nIt was too much — no Brazilian wanted to be crushed under tank tread. And while the striker's barricades continued, the atmosphere was far different. Their camaraderie was gone, replaced with grim strife for survival as they watched the weapons of war from afar. Locked down in their bunkers, all they could do was wait.\n\nFor other Paulistas, there was nothing they could do but watch as their city continued under siege. They were bystanders to the brutality, unwilling and unable to lift a finger, only able to sit at home and watch the tanks roll past their windows..."
brazil_lacerda_strikes.14.a: "The unions once fought against Lacerda. Now, they fight for survival."

brazil_lacerda_strikes.15.t: "Time Stands Still"
brazil_lacerda_strikes.15.desc: "The sun's arrival scorch upon the pavements marked a new day but the same old battle. The military police returned to their battled battlegrounds, all lined up like a Roman phalanx. Their opposition stood across for them, slightly more ragged than yesterday. Their missiles strike against the shields once more, hitting all the familiar cracks with ease.\n\nThe commanders rode on their houses shouting words of encouragement to anyone who could hear them over the sounds of war. As the hours passed, the shields drooped lower as their holders found sweat covering them — their visors barely capable of seeing the strikers. All they could do was silently pray that none of them would falter, that they would survive until their shift's end.\n\nThe real fight for survival was endured by the strikers across from them. They were a people's army, unarmed by any government, equipped solely with makeshift munitions. Their only grace was an unending will driven by a fight for what was right as comrades stood beside comrades.\n\nAt times, this will fell — some days harder than others. Every time a comrade was carted off to jail. Every time they watched a family member assaulted with tear gas. Every time a friend was beaten black and blue by batons. It was all a matter of time — their inevitable savior — and the dagger in their mind.\n\nFar from the carnage was one Golbery do Couto e Silva watching from a distance. He was on a fact-finding mission to a police station, and the facts he found troubled him, to say the least. His men were burning alive as the conflict stood still. What a joke. The President would hear what he had to say, and if he was wise, he would pay attention."
brazil_lacerda_strikes.15.a: "Time, the great deadener of all things."

brazil_lacerda_strikes.16.t: "At The Table"
brazil_lacerda_strikes.16.desc: "The motorcade cruised through Brasília with little resistance. Távora stared out the window, where the wide streets shaded by tall trees bore few cars and fewer pedestrians. Normally, long travel might give a man cause for introspection, to reflect and wonder. Távora did not have luxury. While his team of negotiators traded figures back and forth around him, Brasília passed him by. He locked himself in his own head, bringing every fact and record and number into order within his mental catalogue.\n\nAt the Ministry of Labor and Social Security, a large crowd had gathered, ringing a segmented semi-circle around its entryway. At this outer edge were protesters, carrying placards and shouting slogans Távora ignored. A thin membrane of riot shields separated them from an arc of journalists, reporting from just before the threshold. As the car approached, the membrane spread forward, cleaving the protesters in two and clearing space for the cars to pass through.\n\nTávora exited the car out front and walked alone, clutching an immaculate briefcase, while his negotiators trailed behind, unifying their thoughts. Through the building, their footsteps echoed along the tiles, and civil servants stood to the side as they charged through the halls. Already running behind schedule, they did not wait, all but charging through the conference room door as soon as they arrived.\n\nAt the end of the conference table were about twenty union leaders, all clustered together on their side. Their chattering ceased the moment the doors opened; though they did not stand at attention, they hushed themselves and turned all their eyes to Távora. He took his place at the head of the table, opening his briefcase and neatly, carefully, patiently arranging his files. This negotiation would last months, and they would be in this room a dozen times more, but waiting for Távora was the longest five minutes either side would feel in these proceedings."
brazil_lacerda_strikes.16.a: ""Gentlemen, let's begin.""
BRA_Riots_tavora_negotiations_start_tt: "The §JStrike Negotiations§! begin, £BRA_CGT_texticon §YCGT§! £GNG_riot_radicalism_texticon §xprotest fervor§! must fall below §w5%§! to agree. Either the £BRA_MSD_texticon §mMSD§! or §YCGT§! will end §Jnegotiations§! if their respective §epower§! and §xprotest fervor or militancy§! go over §w60%§! and §w40%§!. You will §rnot§! get a second chance at this."
BRA_Riots_Tavora_Negotiations_7_days: "The next §.Demand§! will be in §Y7 days§!"
BRA_Riots_Tavora_Negotiations_10_days: "The next §.Demand§! will be in §Y10 days§!"
BRA_Riots_Tavora_Negotiations_14_days: "The next §.Demand§! will be in §Y14 days§!"
BRA_Riots_Tavora_Negotiations_20_days: "The next §.Demand§! will be in §Y20 days§!"

brazil_lacerda_strikes.17.t: "The Seeds of Dissent"
brazil_lacerda_strikes.17.desc: "A cool afternoon breeze tickled Távora's shoulders as his wife idly chatted about her day thus far. Today had thus far been an absolute nightmare, and the cafe veranda's calm atmosphere was exactly the kind of respite he had needed. As of late, every time had felt the same; he would walk into the Planalto, Lacerda would dump a bucket full of problems onto his lap, leave to go create even more, and he would spend the next ten or so hours trying desperately to resolve them. The man's intransigence was beyond grating at the best of times, but now it was reaching levels he would previously have never dreamed possible. If they weren't careful, it would turn into yet another 1955.\n\n"By the way - sorry to bring up work, but did you hear that Maria's husband has joined the strikers too?" his wife asked, prodding at her salad with a fork.\n\nTávora shook his head, disapproval written on his face as he sipped his coffee. "No, not at all. How unfortunate. Why would he do such a thing?"\n\n"She said it was about solidarity with their nephew, or something. You can imagine what I was thinking, but she didn't blame you for the strikes being as bad as they are or anything." Távora snorted. That was encouraging, at least. "And you know what?" she continued. "I can only agree. If you were the one in charge right now, Virgillio, this would have been over months ago!"\n\nWhat Luiza Távora said was intended as a joke - one her husband definitely found amusing. But little did either of them truly know at the time, that off-handed comment would plant itself in the Vice President's mind. And later that night, as Távora stared at his bedroom ceiling, it grew into an idea. One he had considered many times. He was always the calmer, more reasonable man out of himself and the President. He was well-liked and well-connected. If the negotiations with the strikers kept failing and the blame fell onto Lacerda..."
brazil_lacerda_strikes.17.a: "...then the Presidency would be his."
BRA_Riots_Tavora_coup_warning_tt: "This happened because UDN Despair was higher than 40% and £GFX_BRA_UDN_intransigence_texticon §YIntransigence§! was higher than 40%. §xprotest fervor and militancy§! will now increase at a faster rate. Be §Rcareful§!!"

brazil_lacerda_strikes.18.t: "The Edge of Oblivion"
brazil_lacerda_strikes.18.desc: "Távora's stony expression masked a thumping headache. Rios paced up and down the lobby, concern written across his face. That last round of negotiations had been long, unproductive, and nerve-wracking. "I can't believe they're trying to wheedle even more out of us," Rios said distractedly. "We're giving them so much already, it's not like we're made of money for goodness sake, if this carries on then-"\n\nHe was interrupted by the slamming open of a door. The CGT leader stormed out of the room, followed soon by the negotiator. "Am I a joke to you both? Your man here certainly seems to think so!" he said, jabbing his finger at the negotiator. "If you're that keen on making me look like a fool, then forget it! These negotiations are over!"\n\nTávora shot out of his chair intent on stopping the man, but the words died in his throat. It was as if he had been frozen in place. A pang of shame shot through him. Here he was - a former colonel and the second most powerful man in the country, standing around like an idiot.\n\nThankfully, Rios was unimpeded. He strode forwards, a calm urgency in his gait. "Please, don't be rash," he said, a great look of desperation in his eyes. "If you leave now, then we can no longer help you. Lacerda will do everything he can to crush you, and none of us want that. Please, just sit down, and we can look at this again."\n\nThe silence was deafening. "Alright, fine," the leader said after a few moments. "But this is your last chance. One more slight like that, and this is over.""
brazil_lacerda_strikes.18.a: "Távora could have fainted with relief."
BRA_Riots_CGT_warning_tt: "This happened because £BRA_CGT_texticon §YCGT§! £GNG_riot_radicalism_texticon §xprotest fervor§! was higher than 60% and £BRA_CGT_texticon §YCGT§! £GNG_riot_strength_texticon §epower§! was higher than 40%. The negotiations will fail if this threshold is reached again."

brazil_lacerda_strikes.19.t: "Death March"
brazil_lacerda_strikes.19.desc: "Távora's military composure would never let him show it as he walked past the mobs of flash photography and whispering journalists, but his nerves twinged as he walked to another round of negotiations. It was peculiar, especially as everything else was normal. José Arthur Rios gave him the brief as always, and as he opened the door, he would soon see the CGT.\n\nExcept the CGT weren't inside, only Rios and a group of shell-shocked negotiators.\n\n"Távora, my deepest apologies. I tried to get a message sent out to you in time, but I was evidently unsuccessful." Rios looked desperate — a man who just got stabbed in the back — crying out for help to the vultures circling his body. "I've tried calling them dozens of times now with whoever's phone I can beg off them. It's always the same answer: 'No deal'."\n\n"I see." The men around Távora tried to discern a reaction from him to no avail. His true feelings were buried behind a stony expression that could compete with the faces of Easter Island. Everything had got in, but nothing would get out.\n\n"But what do we do now? The CGT won't stop; they'll only get worse from here on out." Távora's mind flashed to São Paulo. The strikers on the streets sacrificed cars, torched on a pyre as blasphemy against capital, that evil that has enslaved them for so long. But today, its inevitable end appeared closer than usual.\n\n"We end the strikes. Either they lose, or Brazil does." A simple rallying cry, but enough to rally the men. Távora breathed as he imagined Lacerda's smug face staring at him. At least the jeering journalists would be a far more pleasant sight than him. Then, he opened the door; the press, then the strike, all by any means necessary."
brazil_lacerda_strikes.19.a: "Once more unto the breach."

brazil_lacerda_strikes.20.t: "Tipping Point"
brazil_lacerda_strikes.20.desc: "Vice President Virgílio Távora looked at the notes that had just been pushed into his hands. Some were from a typewriter, some in scrawled handwriting... but all of them had the same message. The biggest businesses in Brazil, both local and international, were threatening "consequences," and "re-evaluation" of their current situation within the nation if the current negotiations started getting too radical for their tastes. An even more ominous note from the Minister of Defense over the current mood in the military, and how there was possibilities that the situation could not be kept under control if it came down to it. It was clear that the MSD wasn't happy, and they were drawing a line in the sand.\n\nTávora looked up to Lacerda who had handed him these notes when Távora had arrived at the Ministry of Labor for the day's negotiations. Rios was looking at several of the other messages, clearly shaken and nervous.\n\n"I promised them no more concessions," Lacerda said, his voice threatening, but with an undercurrent of fear. "Do not let this get out of hand."\n\nWith that, the President walked over to his waiting limo, climbing inside before it drove away, back to the Presidential Palace.\n\n"What do we do?" Rios asked, hands trembling as he read the notes.\n\nTávora, stone faced as he neatly tucked the papers into his jacket, before turning toward the Ministry."
brazil_lacerda_strikes.20.a: "Whatever we have to do."
BRA_Riots_MSD_warning_tt: "This happened because £BRA_MSD_texticon §mMSD§! £GNG_riot_radicalism_texticon §xprotest militancy§! was higher than 60% and £BRA_MSD_texticon §mMSD§! £GNG_riot_strength_texticon §epower§! was higher than 40%. The §Jnegotiations§! will fail if this threshold is reached again."

brazil_lacerda_strikes.21.t: "End of the Road"
brazil_lacerda_strikes.21.desc: "While there had been some setbacks and some slowdowns to the discussions, Vice President Virgílio Távora walked into the Ministry of Labor and Social Security with his negotiation team, hopeful that maybe today they could get everything back on track. He gave a small smile to the row of journalists that were waiting in the lobby, like they always were, but before he could talk to any of them, there was a loud commotion down the hallway. Távora and the journalists looked over, to see armed police officers and security guards roughly manhandling the representatives of the CGT that he was supposed to be negotiating with being led away, under a barrage of curses, vitriol and anger.\n\nFollowing behind them was Minister of Labour José Rios, who then approached the Vice President. His suit jacket and tie were askew, his hair messed up, and it looked like he hadn't gotten much sleep.\n\n"Sorry for the lack of forewarning," Rios sad with a sad smile. "But the President has decided they are no longer needed here."\n\nTávora blankly looked ahead, making eye contact with one of the last of the CGT representatives as they were escorted past him and out of the building. Betrayal, anger, confusion.The union leader's face was a mixture of emotions, and Távora couldn't blame him."
brazil_lacerda_strikes.21.a: "Slamming the door."

brazil_lacerda_strikes.22.t: "The Proposal"
brazil_lacerda_strikes.22.desc: "Vice President Virgílio Távora was sitting comfortably on a couch in the office of the Minister of Labor and Social Security as José Arthur Rios entered his office, folders full of papers tucked under his arm.\n\n"The CGT is playing hardball," Rios said as soon as the door was closed, before handing Távora the list of demands from the trade union. The Vice President read over them silently. A full amnesty for a rather long list of people fired due to the strikes and "redundancy overreach," a massive minimum wage increase, opening investigations into harassment of some very powerful businesses and businessmen, limiting the use of certain police methods on protestors and strikers, and a laundry list of other policy actions and law proposals that Lacerda would almost certainly veto should they ever reach his desk, if Congress could even pass them in the first place.\n\n"This is totally ridiculous," Távora said as he looked up. "This sounds like a Marxist wishlist rather than a reasonable negotiation platform. Lacerda would never agree to this."\n\n"True, but if it will end the strikes, maybe this is what we will need to do?" Rios replied. "They are the ones who started the strike, and if we don't want to destroy our chances of re-election, or worse lead to violence, then we should consider this.""
brazil_lacerda_strikes.22.a: "You might be right. Tell them we accept it."
brazil_lacerda_strikes.22.b: "This is just their opening position. We can haggle them down."

brazil_lacerda_strikes.23.t: "The Proposal"
brazil_lacerda_strikes.23.desc: "Vice President Virgílio Távora was sitting comfortably on a couch in the office of the Minister of Labor and Social Security as José Arthur Rios entered his office, folders full of papers tucked under his arm.\n\n"The CGT is being surprisingly reasonable," Rios said as soon as the door was closed, before handing Távora the list of demands from the trade union. The Vice President read over them silently. A full amnesty for people fired due to the strikes, a moderate minimum wage increase, opening investigations into harassment of some very powerful businesses and businessmen, limiting the use of certain police methods on protestors and strikers, and some reasonable ideas for mandating lunch and water breaks..\n\n"This is surprisingly fair," Távora said as he looked up. "This is even more reasonable than I ever thought they would accept. But I know Lacerda will never agree to it."\n\n"True, but these proposals are so moderate and acceptable, most of the UDN would agree to it, even if the President doesn't." Rios replied. "Rejecting this out of hand will not look good from a political or a humanitarian perspective. It would severely damage our party in the next election.""
brazil_lacerda_strikes.23.a: "It's a good start, but offer a counter that even Lacerda would agree to."
brazil_lacerda_strikes.23.b: "We can't turn this down. Tell them we accept."

brazil_lacerda_strikes.24.t: "Deal's Off"
brazil_lacerda_strikes.24.desc: "Virgílio Távora's walk toward the Ministry of Labor on what could be the final stretch of negotiations over the General Strike had him in a good mood. He had accepted the hardline deal of the CGT, and now it was just to clear up the final details. At least, until he saw the limo of the President parked outside, and a very angry Lacerda standing next to it.\n\n"You asshole!" he bellowed at Távora "You have no authority to agree to any deal with those socialist bastards!"\n\n"Mr. President, keep your voice down," Távora calmly replied. "We are in public, and others can hear us."\n\n"You are my intermediary, and you don't make the calls," Lacerda replied, slightly quieter than before. "I do. I'm the President of Brazil. I've done so much for this country, to put it on the right path, and you are going to fucking ruin it! You are only where you are because I named you my running mate. Now I can destroy you as easily as I built you. I will make sure that the UDN will never nominate you for another job again, not even as a councilor in some Amazon village."\n\n"Mr. President, I'm sure we could negotiate-"\n\n"No, there are no more negotiations. I've already told those commies at the CGT that we are done. No deal." Lacerda was panting, worked up into a fury. "Now, wrap this bullshit up, and we can get back to fixing this nation properly." Lacerda turned on his heel, climbed back into his car and slammed the door.\n\nAs the black limo pulled away, Távora looked up to see Rios standing to the side. He was clearly shaken, having heard a chunk of that conversation, but forced a small smile to Távora nevertheless before scampering into the ministry. As usual, no emotion breached Távora's face."
brazil_lacerda_strikes.24.a: "After all, Lacerda had just walked into his trap."

brazil_lacerda_strikes.25.t: "No Deal"
brazil_lacerda_strikes.25.desc: "Virgílio Távora's walk toward the Ministry of Labor on what could be the final stretch of negotiations over the General Strike had him in a good mood. He had accepted the moderate deal of the CGT, and now it was just to clear up the final details. At least, until he saw the limo of the President parked outside, and a very angry Lacerda standing next to it.\n\n"You idiot!" Lacerda seathed as Távora approached. "You said you were going to negotiate with these socialist morons. Not just give into them!"\n\n"Mr. President, their demands are reasonable and just-"\n\n"Hell no!" Lacerda barked. "They are the dreams of some lazy, no good for nothing Marxist! You are going to put all the companies in Brazil out of business like this. And that will look really good on the UDN next election when you trigger a goddamned recession!"\n\n"Mr. President, I'm sure we could negotiate-"\n\n"No, there are no more negotiations. I've already told those commies at the CGT that we are done. No deal." Lacerda was angry, but managed to keep his temper under control. "So tell them to get back to work, and we can finish fixing this country." Lacerda turned back to the car, got in and closed the door.\n\nAs the black limo pulled away, Távora looked up to see Rios standing to the side. He was clearly shaken, having heard a chunk of that conversation, but forced a small smile to Távora nevertheless before scampering into the ministry. As usual, no emotion breached Távora's face."
brazil_lacerda_strikes.25.a: "After all, Lacerda had just walked into his trap."

brazil_lacerda_strikes.26.t: "Passive Immunity"
brazil_lacerda_strikes.26.desc: "Between half-thoughts and slurred memories, there was the music of the protestors in Brasília — a powerful yet invisible thing. But when each grabbed their speaker and ran, the heart of the movement suffered an arrhythmia.\n\nIn another city, the thick, acrid smoke would have clung to the throats of the looters if they hadn't already made off with the valuables long ago — treating burning stores like firecrackers thrown at the police.\n\nBut no matter where you went, chaos was followed by the sound of rubber boots against the tarmac. The state might have arrived late, but it always did arrive — always.\n\nIn the end, there was silence. But not just the absence of a sound. This silence — the nothingness left behind by the workers' movement giving up — was like an outline of something lost.\n\nTávora — accompanied by Lacerda — emerged from a sleek limousine outside a police station. Lacerda moved further ahead, brushing his finger against the medal that awaited one of the officers. Távora, in the meantime, took in this void — felt its contours.\n\nThe charred burn marks were bruises on their beautiful cities, while the disbanded barricades and makeshift weapons were the antigens left after an infection. For the first time in years, the streets were quiet. Nobody wanted to be outside anymore — and who could blame them?\n\nIn a way, it was liberating. In a way, it was terrifying."
brazil_lacerda_strikes.26.a: "Unrest has genuinely been crushed... for now."
BRA_lacerda_success_tt: "§YMore options will be available in the focus tree.§!"

brazil_lacerda_strikes.27.t: "The Conclusion"
brazil_lacerda_strikes.27.desc: "A sense of calm has descended across Brazil. The placards and banners have been lowered, the songs and shouts of protest have died down. Factories and businesses across the nation, long shuttered, silent and dark, begin to stir back to life. Lights flicker on, trucks begin rolling, and in a few days, it will be like nothing has happened.\n\nThe CGT have begun to stand down, quietly returning back to work, while the leaders of the MSD celebrate their victory in defending the workers of Brazil from the excesses of both Marxism and Authoritarianism. But among the ranks of the millions of everyday workers, lethargically shuffling off to work, a sense of disappointment hangs over. While they may have won a few concessions from their bosses by their collective action, it was still a debate if it was worth it? Weeks without pay, for just a minor pay increase and a few crumbs? Maybe it was worth it, but just as a small step to a better future.\n\nIn Rio, at a business conference in the luxurious Hotel Glória, President Lacerda found himself confronted with the captains of finance and industry of Brazil. Accusations of giving in to communism, turning his back on his pro-business platform flew through the air, while Lacerda found himself trying to defend a policy that wasn't his.\n\nAnd sitting in his room at the same hotel, but still able to hear the vigorous discussions, Távora quietly sipped a glass of whiskey. Maybe he wouldn't become President right now; a minor disappointment really. But he had reigned in Lacerda, and helped save the nation from turmoil and instability. Távora took another drink as he reclined in the chair and turned on the TV."
brazil_lacerda_strikes.27.a: "The glass of whiskey would have to be his reward for now."

brazil_lacerda_strikes.28.t: "Over the Radio"
brazil_lacerda_strikes.28.desc: ""Shut up! It's hard to hear!" someone snarled next to Dante Pelcani, as he and other members of the CGT leadership tried to listen over the crackling static of the old two-way radio. They were huddled around a table in an otherwise empty bar in Salvador, as one person tried to make some adjustments to the set to get a better reception.\n\n"-Távora pushed back. He wants to discuss some other things. Constantly haggling, dragging everything on," Dante heard over the crackle of the radio. "They are still wanting a deal though, and are willing to keep talking."\n\n"Alright, sounds good," Dante said into the microphone. "Keep us up to date."\n\n"The government negotiators are being huge dicks about this," one woman complained. "And Minister Rios is such a simpleton. I bet he only got the job because Lacerda wanted a puppet to fill the chair."\n\nThere were some laughs, as well as a few cracks at the expressionless Távora who had spearheaded the whole negotiations to begin with. But Pelcani didn't pay much attention to the jokes. He was far more concerned about the strikes themselves. So many poor Brazilians had marched out in protest to Lacerda's harmful policies, sacrificing their livelihoods with the possible chance to just mitigate the worst effects. Hopefully it will be enough, and the strikes will bring at least some positive change for the nation."
brazil_lacerda_strikes.28.a: "They were sending a loud and clear message to all of Brazil."
BRA_Riots_CGT_demand_info: "The £BRA_CGT_texticon §YCGT§! will put forward §.Demands§!, getting more and more serious as the strikes move forward. Accepting, haggling them down, or rejecting them will lower or raise £BRA_CGT_texticon §YCGT§! and £BRA_MSD_texticon §mMSD§! £GNG_riot_radicalism_texticon §xprotest fervor and militancy§!. You must get £BRA_CGT_texticon §YCGT§! £GNG_riot_radicalism_texticon §xprotest fervor§! below §w10%§! before agreeing to a deal."

brazil_lacerda_strikes.29.t: "Over the Radio"
brazil_lacerda_strikes.29.desc: ""Shut up! It's hard to hear!" someone snarled next to Dante Pelcani, as he and other members of the CGT leadership tried to listen over the crackling static of the old two-way radio. They were huddled around a table in an otherwise empty bar in Salvador, as one person tried to make some adjustments to the set to get a better reception.\n\n"-Távora has rejected the deal. Despite how much we compromised, he still says no." Dante heard over the crackle of the radio. "Now he's preparing to come back with his offer, but it's going to be rough."\n\n"I hear you," Dante said into the microphone. "Let us know when it comes."\n\n"I know those UDN jackals would never work with us," one woman sighed. "All for the bosses, nothing for the workers."\n\nThere were some more grumblings, some downright melancholic, that the strikes were faltering, the negotiations were on the verge of collapse. Pelcani knew this, and didn't like this at all. All the possible damage that Lacerda's policies could mean for the millions of poor Brazilians who struggled to survive. But, so long as the protests continued, there was the chance, a faint glimmer of a hope, that at least some positive change could be made."
brazil_lacerda_strikes.29.a: "The message is being lost in the static."

brazil_lacerda_strikes.30.t: "In The Lobby"
brazil_lacerda_strikes.30.desc: ""Excuse me, Mr. Vice President? Minister Rios?" one man in a light tan suit said as Távora and Rios were walking together through the foyer of the Ministry of Labor and Social Security.\n\n"I'm sorry, but we are very busy," Rios started, before the man and a few others like him blocked the way toward the negotiating room.\n\n"Oh, I'm sure, we will be but a moment. We are representatives of the MSD, and we wish to help you bring a... satisfactory end to the current troubles."\n\nTávora barely blinked. He knew full well that the MSD was really just a front for IBAD, the Brazilian Institute of Democratic Action, which was just the tool of some of Brazil's biggest corporations and the conservatives that support them, to try to influence the nation, a "think-tank" as the Americans called it. And he was sure he knew what they wanted.\n\n"We are simple workers, much like the rest of those on strike right now," the man continued, though it sure didn't look like he had ever done a hard day's labor in his life. "However, we do not agree with the CGT's communist positions. The stability of the nation is paramount, and they would push Brazil to break apart, much like Soviet Russia did many years ago. We do believe, however, that there is some common ground between capital and labor, and wish to explore this further with both of you. Either as a party to the current negotiations or somewhere where the CGT could not interfere."\n\nRios glanced over to Távora, who's face gave no hint at all to his opinion. Rios swallowed hard. "Well-uh-we would never turn down the possibility of bringing the strikes to an end. And if you have some proposals, we can at least consider them."\n\n"Excellent!" the man in the tan suit said, giving a large smile, before shaking hands with both men. "We will be back soon with our proposal. Have a wonderful day!""
brazil_lacerda_strikes.30.a: "A possible solution? Or a poisoned chalice?"
BRA_Riots_IMAD_offers_tt: "This happened because £BRA_MSD_texticon §mMSD§! £GNG_riot_radicalism_texticon §xprotest militancy§! was above §w20%§!. The £BRA_MSD_texticon §mMSD§! representatives, or rather the £BRA_MSD_texticon §mIBAD§! lobbyists, will also put forward their own §.Demands§! as long as £BRA_MSD_texticon §mMSD§! £GNG_riot_radicalism_texticon §xprotest militancy§! remains above §w20%§!."

brazil_lacerda_strikes.31.t: "Legal Complaint: Compelled Urban Labor"
brazil_lacerda_strikes.31.desc: "Complaint submitted to the Honorable Committee as follows:\n\nIn brief, this is a complaint filed by a Bolivian Foreign Worker for illegal working conditions, nonpayment, and confiscation of identity documents by business owners. Complaint cites 14 hour workdays in workshops in São Paulo, with unsafe working conditions in industrial centers that result in lost limbs and permanent blindness due to improper use of caustic chemicals and poor safety procedures. Complaint cites numerous examples of debt bondage, with wages withheld and docked for arbitrary expenses.\n\nComplaint also is filed on behalf of the family of Gabriel Carita, an itinerant farm worker. Gabriel contracted for seasonal work with one Hugo Berrocal, a local labor contractor, who sold his contract to a plantation. Gabriel's passport and work permit was confiscated, leaving him unable to prove his status. His compensation was frequently unpaid, with the plantation owner citing expenses incurred due to Gabriel's misuse of farm equipment without documentation. Following an altercation with work overseers, Gabriel was beaten severely and tied to a post without food or water for 24 hours. Following this maltreatment, Gabriel suffered a heart attack, which was attributed to alcoholism.\n\nThe ILO proposes that an agency be given investigatory and enforcement capability to appropriately handle exploitative practices for farms and factories, with the ability to fine and imprison business owners found to be in violation of labor laws, and in extreme cases, to establish temporary oversight of workplaces to ensure changes can be made."
brazil_lacerda_strikes.31.a: "Távora proposed the immediate establishment of an agency to end the practices."
brazil_lacerda_strikes.31.b: "Távora authorized an inquiry to investigate the matter more comprehensively."
brazil_lacerda_strikes.31.c: "Távora proposed tabling the issue indefinitely."
BRA_Riots_Negotiations_effects_tt: "If the §Jnegotiations§! are §Gsuccessful§!, the following §weffects§! will immediately occur:"

brazil_lacerda_strikes.32.t: "The Matter of Robotics"
brazil_lacerda_strikes.32.desc: "Date: [?global.date.GetDateStringNoHourLong]\n\nChairman: Távora\n\nCGT Negotiators: Dante, Heitor\n\nGovernment Negotiators: Sílvio\n\nItem 34: At 11:26 AM, Chairman opened discussion on the issue of automation. Dante highlighted the risks that automation poses to line employees. Heitor concurred, stating unequivocally that robotics were going to completely replace their workers and would negatively contribute to the worsening unemployment situation.\n\nSílvio retorted that such discussion was baseless, citing the rudimentary capabilities of robotic technology being unlikely to replace workers in the near-future.\n\nDante proposed, and Heitor seconded, to create a new agency with the goal of restricting robotics. Dante states the agency's objective will be to ensure robust regulatory restrictions on automation in the interests of employment security.\n\nChairman issued a statement on the proposed agency."
brazil_lacerda_strikes.32.a: "Chairman concurred with the proposal to regulate and restrict automation."
brazil_lacerda_strikes.32.b: "Chairman counter-proposed to establish advisory commission on robotics with CGT input."
brazil_lacerda_strikes.32.c: "Chairman rejected proposal, citing the cost-saving benefits of automation."

brazil_lacerda_strikes.33.t: "Days Turned to Minutes"
brazil_lacerda_strikes.33.desc: "Meeting called to Order at 9:04 AM. Government and CGT negotiating parties in attendance at the Ministry of Labor and Social Security, Brasília.\n\nDiscussion returns from previous meetings to estabilidade provisions. CGT representative Lopes states their opposition to the Government's plans to rescind estabilidade, stating it is a source of security and a safety net for workers who otherwise wouldn't have it, and would wish to see loopholes, such as allowing employers to fire workers before their 10th year of service with the company to avoid estabilidade should be banned...\n\n...Minister Rios says the estabilidade is inefficient and in need of reform to allow workers and employers more flexibility in ever changing market situations, also stating this is a red line for the President as he wants it abolished, and failing to do so could result in the President ending the negotiations...\n\nLopes states that keeping the estabilidade is a requirement for the CGT...\n\n...Both Government and CGT agree that further discussion with the parties required to make a breakthrough. No decision made. Session adjourned at 3:35 pm."
brazil_lacerda_strikes.33.a: "Keep the estabilidade, it will make the CGT reasonable elsewhere."
brazil_lacerda_strikes.33.b: "Maybe we can reform it to satisfy both parties?"
brazil_lacerda_strikes.33.c: "Lacerda wants it gone, so gone it shall be."

brazil_lacerda_strikes.34.t: "Mind the Miners"
brazil_lacerda_strikes.34.desc: "The Comando Geral dos Trabalhadores wish to bring to attention the current crisis facing Brazilian miners in the states of Pará and Minas Gerais who focus on the extraction of zinc, borax, and tin that is vital to the Brazilian economy have been undercut by cheaper imports from Bolivia. This has threatened the livelihood of thousands and could lead to economic and social distress in the states mentioned...\n\nThe CGT, in line with the current negotiations underway, proposes the following solutions to this crisis of Brazilian mining:\n\n-Trade barriers on Bolivian mining imports of zinc, borax, and tin be immediately implemented\n\n-Encouraging and/or mandating Brazilian businesses source local sources of zinc, borax, and tin\n\n-The establishment of import quotas for Bolivian zinc, borax, and tin, to be undertaken at the earliest convenience of the government\n\n-Retraining and Relocation programs for heavily impacting miners and their families\n\n-Establish a Brazilian-Bolivian task force to harmonize regulations to ensure that Brazilian miners are on a level playing field with Bolivian miners...\n\n...the long term health and stability of our nations miners, their families, their communities and Brazil as a whole require swift action by the government."
brazil_lacerda_strikes.34.a: "Maybe not the most business friendly action, but some tariffs are in order."
brazil_lacerda_strikes.34.b: "Quotas and Retraining will do fine for the moment."
brazil_lacerda_strikes.34.c: "I'm sure we can get our Bolivian friends to come to a deal."

brazil_lacerda_strikes.35.t: "The Law of Two-Thirds"
brazil_lacerda_strikes.35.desc: "Date: [?global.date.GetDateStringNoHourLong]\n\nChairman: Távora\n\nCGT Negotiators: Dante, Heitor\n\nGovernment Negotiators: Sílvio\n\nItem 25: At 9:08 AM, Chairman opened discussion on the subject of the Law of Two-Thirds. Dante stated that the Law of Two-Thirds is vital to maintaining health within the labor force. Heitor concurred, and added that protecting Brazil from foreign influence as a compelling matter of state.\n\nDante proposed an official government statement reaffirming the importance of the Law of Two-Thirds to assuage CGT fears of potential foreign influence. Sílvio cites statements by President Lacerda regarding his opposition to the policy on the grounds that protectionism harms trade, restricts innovation and best practices from entering Brazil and improving the efficiency of its workplaces, and limits social mobility in favor of entrenched interests, and suggests that the law be abolished to promote efficiency and reduce costs.\n\nChairman issued a decision regarding the Law of Two-Thirds."
brazil_lacerda_strikes.35.a: "Távora affirmed the Law of Two-Thirds as critical to state security."
brazil_lacerda_strikes.35.b: "Távora proposed amending the law to make exemptions for skilled labor."
brazil_lacerda_strikes.35.c: "Távora cited the negative consequences to mobility and innovation and proposed abolishment."

brazil_lacerda_strikes.36.t: "The Shadow of the Rising Sun"
brazil_lacerda_strikes.36.desc: "Meeting called to Order at 9:12 AM. Government and CGT negotiating parties in attendance at the Ministry of Labor and Social Security, Brasília.\n\n...CGT representative Pinheiro comments on how Japanese immigrants have been arriving in Brazil in large numbers, making it very difficult for local Brazilian workers to find better places to live or work due to the (REDACTED)...\n\n...further discussion on the topic regarding large corporations from Japan and Guangdong, and their flouting of already existing labor laws and regulations. CGT representative Guedes makes remarks about Japanese managers and how they abuse their Brazilian employees, calling them (REDACTED)...\n\n...CGT representatives request a short break to discuss these issues among themselves. Government accepts, meeting breaks at 10:45 am.\n\nMeeting called back to order at 1:06 pm. CGT representatives present demands regarding Japanese immigration and business activity:\n\n-Ban or otherwise restrict further immigration\n\n-Ensure Japanese companies are following rules and regulations already implemented\n\n-Disallow further Japanese investment into Brazil.\n\nGovernment asks to end the session for today to allow discussion. CGT agreed, and the meeting ended at 1:27 PM."
brazil_lacerda_strikes.36.a: "We can put immigration quotas and requirements and crack down on businesses."
brazil_lacerda_strikes.36.b: "We will strengthen enforcement and regulation of their companies."
brazil_lacerda_strikes.36.c: "We won't do anything, it could only harm the economy further."

brazil_lacerda_strikes.37.t: "Equality of Work and Workers"
brazil_lacerda_strikes.37.desc: "The Comando Geral dos Trabalhadores has long made the self worth and dignity of all workers a top priority for our movement. Only when workers are treated as human beings and not simply as numbers or pieces of equipment will a true equal and free society be established. It is with a heavy heart though that we have to say that we are far from such an equal society...\n\n...The biggest source of the inequality in Brazil is between the races and the sexes. As a general rule, men of European descent and lighter skin are given better jobs, more avenues of advancement and promotion, and better pay, while those men of African, Indian, or pardo descent are consistently discriminated against. They are prevented from getting jobs in careers they are as qualified in working as a white man, and often paid less in the work they are hired to do. Women of all races and backgrounds are just as discriminated against, many women forced to remain at home or work as domestic servants and cleaners...\n\nNo nation in history has yet fully resolved discrimination between many peoples of different races and creeds, nor that between men and women, but that should not prevent Brazil from stepping forward and making a nation of equals, where all men and women are treated with the dignity and respect, paid the same wage, and offered the same opportunities."
brazil_lacerda_strikes.37.a: "Brazil shall become a nation of equals! Mandate equality among all!"
brazil_lacerda_strikes.37.b: "We can't do it overnight, but we can start the process of equality among all today."
brazil_lacerda_strikes.37.c: "Nice sounding words, but in reality we aren't all equal."

brazil_lacerda_strikes.38.t: "Dignity of Work and Workers"
brazil_lacerda_strikes.38.desc: "The Comando Geral dos Trabalhadores has long made the self worth and dignity of all workers a top priority for our movement. Only when workers are treated as human beings and not simply as numbers or pieces of equipment will a true equal and free society be established. It is with a heavy heart though that we have to say that we are far from such an equal society...\n\n...Many workers across Brazil are treated little better than when slavery was the law of the land. Our members report physical and verbal harassment and abuse on a constant basis by their employers and managers, as well as from clients and customers. This makes working in our current system of low wages and lackluster benefits even more abusive and daunting for a majority of Brazilian workers who are the ones that keep the nation running...\n\n...The abuse and punishment that men and women receive for minor infractions or by simply working low wage jobs that are seen as "undignified" or "beneath one's status" is corrosive and damaging to one's health and well being. Too many people in Brazil feel that their status in life is dictated by their jobs and their suffering due to the unrelenting pressure and assaults on human dignity, and many have simply given up on trying to make themselves better people. This is wrong and false, and we encourage the government to promote equality and dignity for all sectors of society. We are all Brazilian, and we should all be treated as such."
brazil_lacerda_strikes.38.a: "We will enact anti-harassment and anti-abuse policies to protect everyone!"
brazil_lacerda_strikes.38.b: "Some people just don't know, so education should be enough to solve the issue."
brazil_lacerda_strikes.38.c: "Oh, grow a backbone! It builds character!"

brazil_lacerda_strikes.39.t: "The Fallout of the Strike"
brazil_lacerda_strikes.39.desc: "Date: [?global.date.GetDateStringNoHourLong]\n\nChairman: Távora\n\nCGT Negotiators: Dante, Heitor\n\nGovernment Negotiators: Sílvio\n\nItem 52: At 4:42 PM, Chairman opened discussion on the repercussions of the President's law regarding the CGT General Strike. Dante insisted that the strikers who were fired must be rehired without delay. Sílvio disagreed, citing that the law changes were fair and that rehiring all members would be technically unfeasible and introduce widespread inefficiency into the labor pool.\n\nHeitor pounded on the table, stating that the government must not only rehire all workers but must introduce new labor protections to prevent workers from simply being fired again. Chairman issued a point of reprimand to Heitor for his outburst. Heitor apologized, citing the long day of negotiations, and excused himself to the washroom. Dante apologized on Heitor's behalf and repeated the demand for labor protections and rehiring. Sílvio suggested a third-party review to ensure only qualified members were hired. Dante strenuously disagreed, noting that the pace of rehires would be glacial under individual adjudication.\n\n"
brazil_lacerda_strikes.39.a: "Chairman proposed rehiring dues-paying members, staged based on seniority."
brazil_lacerda_strikes.39.b: "Chairman proposed rehiring senior and critical personnel only."
brazil_lacerda_strikes.39.c: "Chairman proposed individual adjudication and limited rehires to the most exceptional performers."

brazil_lacerda_strikes.40.t: "Minimum Compensation for Work and Workers"
brazil_lacerda_strikes.40.desc: "The Comando Geral dos Trabalhadores is not striking out of hatred for Brazil. Indeed, it is out of love for the men and women who keep our great nation running that we chose to act. We stand against the UDN's corrupt and short-sighted attempts at removing the minimum wage. While not our only goal, we were forced to strike to prevent this disastrous mistake from occurring...\n\n...We cannot be content to keep the minimum wage as it is. It is essential that the equivalent purchasing power for our labor be maintained. In the face of still-present inflation and rising costs of living, a strong and adjusting minimum wage is essential. To begin with, we request a 30% hike, and yearly increases in accordance with the economic factors that would alter the value of pay...\n\n...In addition, we would like confirmation that the current government of Brazil will not act to dismantle our guarantees of livable wages. We understand that the President is willing to be conciliatory on this issue, and for that we are appreciative. However, we would like a signed promise from the government that the minimum wage will be maintained in perpetuity...\n\n...The welfare of our families and of the impoverished and working-class of Brazil is always chief in our minds and hearts. They are why we fight. We sincerely hope that the government will act to uplift these downtrodden souls. If it proves that our organization is alone in our goals, and that our government is in the pockets of businesses, we cannot in good faith end our actions anytime soon..."
brazil_lacerda_strikes.40.a: "We will guarantee and raise the minimum wage as they have demanded."
brazil_lacerda_strikes.40.b: "We can promise to raise wages yearly, but we cannot raise them now."
brazil_lacerda_strikes.40.c: "We will not indulge in further distortions of the free market. No changes."

brazil_lacerda_strikes.41.t: "Temporary Employment for Businesses"
brazil_lacerda_strikes.41.desc: "The meeting officially began at 12:42 PM. The representative of the MSD, Miguel Zorzella, arrived twenty minutes prior. José Arthur Rios came into the negotiations room twelve minutes prior. Before negotiations officially began, both representatives exchanged pleasantries, and organized the ordering of the topics they would discuss, as well as who would begin discussing each.\n\nThe first topic was temporary employment. Miguel stated that their main concern was the welfare of temporary laborers. Many companies were afraid that they'd be liable for legal action if they hired temporary employees, since they could be accused of replacing strikers. Combined with overbearing regulation on temporary labor companies, most "temp workers" were out of a job.\n\nIn addition to the plight of the "temp worker", Miguel claimed that these troubles were forcing companies to shutter operations. To remedy this, he suggested that temporary workers should be allowed to work with longer assignment lengths, exemptions from mandatory benefits, and fewer background checks. As well, explicit legal protection should be given to companies hiring temporary workers.\n\nRios asked Miguel if he thought that the temporary workers would truly be helped by these changes, since they'd be receiving less and working more. Miguel fiercely retorts that he knows many temporary workers would prefer the chance to work hard for their income today over potential far-off handouts, unlike the communistic CGT. Miguel then asked if he would agree with their sentiment."
brazil_lacerda_strikes.41.a: "We agree wholeheartedly. We will loosen their burdens, and legally protect their employers."
brazil_lacerda_strikes.41.b: "We will allow companies to hire some temps, but only if they keep up the same benefits."
brazil_lacerda_strikes.41.c: "We won't have temps acting as pawns in the war between capital and labor. No deal."

brazil_lacerda_strikes.42.t: "Minimum Wage Loopholes for Businesses"
brazil_lacerda_strikes.42.desc: "The negotiations continued on, switching to a new topic by 2:56 PM. This topic was minimum wage flexibility. Miguel introduced the topic by stating how they all knew about the powerful minimum wage in the nation, and how beloved it was. He stated that, while he appreciated the intent of providing more income for workers, it more often than not resulted in crushing unemployment.\n\nMiguel stated that he understood how difficult it'd be to eliminate this minimum. Instead, he proposed augmenting it with different rules, to ensure flexibility for companies that operated differently. With looser restrictions and more options, businesses could lower their per-employee expenses and subsequently hire more workers.\n\nIn particular, Miguel suggested that companies could be allowed to factor transportation, food, and housing into wage calculations. Some companies may be better situated to provide these than pure cash, allowing strong compensation for employees without excessive costs. He added that many companies would like to experiment with new "zero-hour" contracts, where companies would not be required to guarantee working hours.\n\nMiguel finished his statement by suggesting that Rios should particularly appreciate these requests. Rios asked why. In response, the MSD representative stated that the lessened regulatory burden would reduce inspection costs for the Ministry of Labor. He said that Rios could use that extra cash for other initiatives, or possibly to improve compensation."
brazil_lacerda_strikes.42.a: "Being inflexible and unchanging will get our country nowhere. We agree to all of your requests."
brazil_lacerda_strikes.42.b: "We believe in balance. We will maintain a lower baseline in hours and , but allow for some flexibility."
brazil_lacerda_strikes.42.c: "We will not contort our laws. I personally do not appreciate your corrupt undertones."

brazil_lacerda_strikes.43.t: "Protected Informal Workers for Businesses"
brazil_lacerda_strikes.43.desc: "After a quick intermission for a late lunch, representatives Miguel and Rios restarted discussions at 4:24. Rios opted to introduce the subject this time, which was informal businesses. He said that, as he understood it, these were businesses and workers who operated illegally on the margins of society. He added that they didn't adhere to labor laws or regulations primarily due to costs.\n\nHe mentioned that the government had been trying for years to figure out how to either expunge or reconcile these businesses without breaking labor laws. He then asked why Miguel decided to bring them up. Miguel said that he believed he had a solution, which was special protection provisions for them. Rios asked for clarification.\n\nMiguel elaborated that the MSD was requesting legal pathways for these informal groups to be recognized as special contractors and vendors, who would only have to obey some regulations. In addition, they were requesting an eased regulatory and tax burden on companies working with these informal groups to encourage this relationship, and to shift it away from being "off-the-books".\n\nRios explained that, by enacting these provisions, they were essentially legitimizing illegal business activities. Miguel retorted that these workers were already working every day. By legitimizing their toil and encouraging businesses to work with them officially, they could uplift those currently on the outskirts of the economy. Miguel sharply asked if Rios would stand against such a noble goal."
brazil_lacerda_strikes.43.a: "We both want more people working officially. We can definitely make this work."
brazil_lacerda_strikes.43.b: "A pathway to legitimacy is paramount. But we insist on minimum wage and inspections."
brazil_lacerda_strikes.43.c: "You aren't the first man to try and change this system. We won't be to blame for your mistakes."

brazil_lacerda_strikes.44.t: "Looser Regulations for Rural Businesses"
brazil_lacerda_strikes.44.desc: "The next topic for discussion between the two representatives began at 6:10 PM. Miguel introduced the topic, as typical. These were a whole host of recommendations, but were centralized around rural regulation reform. He specified that these were intended solely for the rural workers, and not for an urban setting- and therefore, should be considered in that context\n\nMiguel started with the idea of more mechanization funding and permits. He says that having more skilled jobs benefits all stratus in the economy, and would lead to the phasing out of many dehumanizing aspects of a farmer's life. In addition, he suggested that there be relaxed regulations on housing standards for workers, and the legalization of the piece-rate pay models.\n\nRios appeared very confused. He interrogated Miguel by asking him if he genuinely believed these would benefit workers. Miguel responded coldly by saying that workers who produced more ought to earn more than slackers. Also, less-regulated housing is cheaper housing, which allows workers to put their earnings elsewhere. It's simply more freedom of choice and wasn't that outlandish, Miguel stated.\n\nRios countered by saying that many of these systems could lower standard of living for many agriculturalists. Miguel responded by asking if he'd ever actually worked in a field, and could know what you'd really care about in that situation. Rios asked if Miguel himself knew what that life was like. Miguel curtly asked him to just tell him what his government wanted."
brazil_lacerda_strikes.44.a: "You have an interesting approach, but I trust it. We'll move to this new system."
brazil_lacerda_strikes.44.b: "It's not impossible, but right now, we can only allow mechanization. You understand."
brazil_lacerda_strikes.44.c: "Your façade is thin, Miguel. I'll pretend like you never even brought up these ideas."

brazil_lacerda_strikes.45.t: "Child Labor for Businesses"
brazil_lacerda_strikes.45.desc: "There was only one topic left for the two representatives, which officially began discussion at 7:23. Miguel offered to introduce the topic, as he hadn't brought it up beforehand. The topic was lowering the minimum employment age from 14 to 12. Rios' asked if he was making a joke. Miguel sharply said that he wasn't, and that he'd quite like to explain his point properly.\n\nMiguel said that Rios probably already knows about the prevalence of kids on the streets, especially those who are already in vulnerable communities. He added that Rios in particular, as Minister of Labor, should know that the government was woefully underequipped to help them. He said that businesses would like to help by providing them with steady employment, but doing so was illegal right now.\n\nRios asked how these kids being employed could help them in the long-term, as opposed to proper schooling. Miguel countered that education did little to provide employment opportunities for these kids, but on-the-job vocational training could open them up to better-paying opportunities. Also, Miguel mentioned, many kids under 14 were already working- legalization was just recognizing that fact.\n\nMiguel then said to Rios that, honestly, this request wasn't for the good of the workers. He revealed that he knew the increase in labor supply was bound to be less than popular with those he represented. However, it was a moral imperative that they act to uplift the many struggling impoverished children of Brazil."
brazil_lacerda_strikes.45.a: ""It won't be popular, you're correct. But we agree. We'll lower the age as you've requested."
brazil_lacerda_strikes.45.b: "We agree. However, we insist upon strict regulations and keeping working kids in school."
brazil_lacerda_strikes.45.c: "I thought we left this barbarism behind in the 30's. I won't allow any more discussion on this."

brazil_lacerda_strikes.46.t: "Regarding Sick and Family Leave"
brazil_lacerda_strikes.46.desc: "Rios opened the meeting at 8:14 AM. Dante began by requesting the negotiations to begin with family and sick leave. Rios said that would be fine, and said they'd start with family leave.\n\nRios explained that the CLT guaranteed 1) twelve weeks of paid maternity leave, 2) two weeks of miscarriage leave, and 3) a prohibition on mothers being fired for taking leave. Rios stated that these laws were expensive for companies, and a more reasonable possibility was four weeks after childbirth, with 70% pay.\n\nDante interjected that these laws allowed many women to raise families while working. Rios replied that he knew this, and regretted that financial burdens would keep women from their God-given gift. Rios then added they should return to this after going over sick leave.\n\nRios explained that currently the CLT gave 1) 15 days of employer-paid sick leave, with 2) all further sick days paid by the INSS. Rios explained that this service was costly and rife with fraud. Rios said they've considered one month of sick leave per year, with 10 days paid by the employer.\n\nDante countered that Jesus healed the sick without telling them to return to work in ten days, and that he thought Rios would do the same. Rios said that such a comparison was irrelevant. Dante asked for Rios' final offer regarding leave, so they could get on with it."
brazil_lacerda_strikes.46.a: "Rios said they would be willing to maintain the status quo, for the good of the nation."
brazil_lacerda_strikes.46.b: "Rios maintained that his compromises would be the best outcome for everyone."
brazil_lacerda_strikes.46.c: "Rios explained that any regulation right now would simply be impossible."

brazil_lacerda_strikes.47.t: "Regarding Building and Workplace Restrictions"
brazil_lacerda_strikes.47.desc: "At 11:06 AM, Rios suggested that they discuss building and workplace restrictions, as they had shelved the topic an hour prior. Dante said it would be alright. Rios then listed off the main regulations up for discussion. Some laws guaranteed access to water, seating, or various amenities, while others mandated fire escapes or similar emergency equipment.\n\nRios stated that these laws were entirely unfeasible for the future. Dante said that keeping them was of utmost priority for the CGT. Rios countered that they were too inflexible, and cost an excessive amount to implement for small businesses. Dante interjected that it was far worse to screw over the poor laborer than some already rich business owner.\n\nRios took out some papers from a file on the CLT. He pointed to a section titled "Article 182". He explained that this law made it mandatory that the sun would not fall onto the workplace. Dante asked why this was relevant. Rios explained that, due to ventilation technology, keeping a workplace cool was possible without blocking the sun. In fact, Rios added, some workers liked access to natural light, and this law barred that.\n\nDante countered by saying that this was only possible if the building was fitted with expensive new tech, and that only an idiot would think every building would have it. Rios stated it was merely a mental exercise. Dante said that he should stop with the theoretical bullshit and spit out what their offer was."
brazil_lacerda_strikes.47.a: "Rios admitted that, in lack of a good substitute, the laws should be allowed to continue."
brazil_lacerda_strikes.47.b: "Rios offered to maintain the laws for blue collar industries, as long as some flexibility was afforded."
brazil_lacerda_strikes.47.c: "Rios said that the laws must go, but that some minimal regulations would stay."

brazil_lacerda_strikes.48.t: "Regarding Meal and Rest Breaks"
brazil_lacerda_strikes.48.desc: "At 3:42 PM, Rios said he'd like to get onto the meal and rest breaks. Dante said he would prefer to go over amnesty for strikers, but said it'd be fine to go over breaks first. Rios said that the main issue up for debate was the rules regarding rest periods between work days, weekly rest periods, prohibiting national holiday work, and requiring government permission for Sunday work.\n\nRios added he'd like to discuss the 20% premium for night work, and the meal and rest intervals for longer shifts. Dante interrupted Rios by saying that, with the exception of prohibiting work on national holidays, night premiums, and permission for work on Sundays, all of these were not things that the CGT was willing to give up.\n\nRios said that such a blanket statement was simply not good negotiation form. Rios added that Dante should consider how many workers want to work more. Dante interjected that he had a few reasons for his position in his jacket. Dante then took out pictures of skeletal women and men, taken in black and white. Rios observed the pictures for a few minutes.\n\nDante said that people were a collection of weavers in Santa Catarina. They were attending their first church service in a month, after an emergency shift extension kept them to one meal and four hours of sleep a day. Dante added that none of them would survive after the year. Dante said that Rios should shut the fuck up about form, and just tell him what position his government is taking."
brazil_lacerda_strikes.48.a: "Rios said that the government would keep these regulations, if it was such a sensitive issue."
brazil_lacerda_strikes.48.b: "Rios offered to keep the essential laws, in exchange for axing those Dante didn't care about."
brazil_lacerda_strikes.48.c: "Rios muttered that there's nothing he could do, and walked out of the room, holding a rosary tightly."

brazil_lacerda_strikes.49.t: "Regarding High-Profile Harassment"
brazil_lacerda_strikes.49.desc: "At 7:47 PM, Dante said that there was only one more subject that he'd like for them to go over, that being an investigation of harassment. Rios said that he thought it would be a fine way to end the negotiations. Dante pulled out a file containing a list of approximately seventy names of various businesses and corporations, and said he wanted the government to investigate their abuses against workers.\n\nRios took a read through them, taking out a pen and underlining a few. Rios said that he didn't think (REDACTED) would ever get caught. He muttered that (REDACTED) was a real curveball, considering that they were in bed with the PTB. Dante then asked Rios why he seemed so pleased to be looking through these names.Rios replied that, while he might seem cold-hearted, he had dealt with many of these companies representatives before during his time as Coordinator of Social Services. He said he knew how desperately they tried to get out of paying their share of funding for his agency, spitting in the face of the Republic and its values. Rios admitted that he too wanted to see these crooks taken down.Dante said that it was up to him and his government if they were willing to piss off the businesses that much, but that he'd be quite more favorable to these negotiations if these investigations were made. Ideally, Dante said, in public, so that he'd know if the government was being lenient on their wealthy friends."
brazil_lacerda_strikes.49.a: "Rios said that every company here would be investigated to the fullest extent of the law, in public."
brazil_lacerda_strikes.49.b: "Rios admitted that they couldn't investigate publicly, but that they'd confidentially review all claims."
brazil_lacerda_strikes.49.c: "Rios said that they couldn't in good faith hold these investigations, as it was too risky."

brazil_lacerda_strikes.50.t: "Against All Odds"
brazil_lacerda_strikes.50.desc: "They had done it. Somehow, they had accomplished what seemed to be impossible. Távora looked on as Rios signed his name onto the draft agreement to end the strikes that they had painstakingly hammered out. Távora couldn't help but let out a tiny sigh, followed by a small smile breaking through his facade, as the flash of photographers and the whir of TV cameras documented the event, followed by the applause of much of the room it was being recorded in. Rios, after setting down his pen, joined in the applause and cheering.\n\nAbout the only people who weren't jubilant at that moment were the representatives of the CGT, who gave some forced smiles and polite handshakes for the media. Back in Salvador, Dante Pelacani and the other leaders of the union were exhausted, deflated. They had managed to wring some minor concessions from the government after the arduous General Strike, but it wasn't really an improvement for the workers of Brazil. At best they ensured that they weren't going to be falling back further into poverty and degradation.\n\nBut the momentum was gone. The drive wasn't there. Everyone was tired and exhausted, the strike had run its course. Soon the placards and banners would come down, and the factories and farms would begin working again.\n\nAnd in the end, Távora had won. He had beaten the CGT, not with brute force and unrelenting pressure like Lacerda would have, but through the most unyielding force of the cosmos."
brazil_lacerda_strikes.50.a: "Távora had beaten them through time."

brazil_lacerda_strikes.51.t: "Out Of Steam"
brazil_lacerda_strikes.51.desc: "The crowds were growing smaller. In some places, only a few die hards still stood on the picket lines, but otherwise businesses and stores were reopening. The workers who had for so long fought for better pay and conditions now resigned, desperate to provide for their families and themselves as it became clear that the General Strike was faltering, and in many cases had sputtered out completely.\n\nA bar in Salvador, where Dante Pelacani and the CGT leadership had coordinated the strikes for months, now sat empty. A row of posters showing scary images of communist agitators stabbing the backs of Brazilian workers now covered the outside walls. The propaganda of the MSD and their corporate masters had unraveled the unity of the masses, the fear of communism stronger than the desire for worker solidarity and pushing for a better life.\n\nAnd in Brasília, the Minister of Labor sat across from the Vice President, who was pouring some wine into glasses to share. Rios was disappointed, hoping that the negotiations could have reached a conclusion that would at least give some benefits to the people... but in the end, the stability of Brazil was more important than corralling the CGT cats into making a deal. So, with the machinery out of fuel and sputtering on fumes, Távora told Rios to end the negotiations just a few hours earlier. The CGT representatives barely fought back, meekly accepting that it was over."
brazil_lacerda_strikes.51.a: "With a sigh and shudder, the engine ceases."

brazil_lacerda_strikes.52.t: "Change of Plans"
brazil_lacerda_strikes.52.desc: "Rios sat at the conference table, trying his best not to look too impatient. Távora was not the kind of man to be inexplicably late to a meeting, yet the Vice President wasn't here, and hadn't given a message that he would be late. The CGT representatives across from the Minister of Labor were just as politely anxious, but simply shuffled through their notes and made small talk between themselves.\n\nThe door slammed open, making everyone in the room jump. Several men walked in, men that Rios don't think he had ever seen before, which immediately raised concerns.\n\n"Excuse me, but this is confidential negotiations..." Rios started.\n\n"The President has decided the negotiations are over," one of the men who just arrived said, which made everyone in the room freeze. Rios could feel his heart sinking into his stomach, realizing.\n\n"President Távora has announced that he will be withdrawing the labor reform law in its entirety. The CLT will remain in force for the time being, and any attempt at reform under the new leadership will be done only with proper consultation with all parties."\n\n"Távora is the President now? You... you are serious, aren't you?" Rios asked. The man who spoke gave a curt nod.\n\nThere was a moment of silence, before the CGT members suddenly started laughing and cheering, hugging and slapping each other on the back. Rios just leaned back in his chair, stunned at the news. He suspected that Távora was planning something... but this was crazy.\n\nThe man who spoke to the crowd turned to Rios:"
brazil_lacerda_strikes.52.a: ""The President would like to invite you for a drink, since you aren't going to be busy later.""

brazil_lacerda_strikes.53.t: "End of the Road"
brazil_lacerda_strikes.53.desc: "Minister of Labor José Rios met Távora as he stepped out of his car, flustered and nearly out of breath. The Vice President was about to greet his colleague, but Rios shook his head.\n\n"It's over. The CGT have walked out. The negotiations are done."\n\nTávora barely even blinked, his face as cool and emotionless as ever. But inside, he was secretly delighted. After all, with the economy in free fall, the strikes now only getting worse, the economy near collapse, and Lacerda not even trying to appear reasonable, and in fact seemingly more aggressive and deranged by the day... then it might be time to prepare for the future. The Vice President gave a curt nod to Rios, before returning his car.\n\nHundreds of miles away, the bar in Salvador that was the makeshift headquarters of the CGT was now empty. Not because of a police crackdown or a successful end to the strikes... oh no. Outside, Dante Pelacani was in the midst of an impassioned speech in front of some hastily assembled microphones.\n\n"Workers of Brazil! The government has made it clear that they will not negotiate in good faith, nor give us anything but the barest of crumbs. So now we must make our voices heard! Our demands are for fairness and justice! And until we get that, we shall remain on the streets and out of the factories and the fields! For equity! For the workers of Brazil!"\n\nAs the crowds all across Brazil heard the news of the failed negotiations and the resurgence of the General Strike, now darker rumors of what the police, or heaven forbid, the army was about to do began to fill the nation, but it wasn't enough to end the strikes... not yet at least."
brazil_lacerda_strikes.53.a: "Brazil is teetering on the edge."
BRA_Riots_tavora_backup_plan_tt: "§QTávora's§! backup plan has now been set into §omotion.§!"

BRA_Riots_tavora_coup_end_negotiations_tt: "§JNegotiations§! have been made irrelevant. All of §QLacerda's changes§! have been reversed. Stability has returned."

brazil_lacerda_strikes.54.t: "Hot Coffee"
brazil_lacerda_strikes.54.desc: "The farms stretched for as far as the eye could see, it was expected of the countryside to look like this, but they were all growing one specific thing. Coffee beans. Brazil being the biggest exporter of coffee to the world was no surprise once you saw the view. Zooming in, into the state of Minas Gerais, through the trees and bushes, was Ricardo. His task evident by the coffee beans in the satchel on his side.\n\nThis farm was different from the others, though. While normally coffee season is around June, Ricardo picked another bean from the stem; this particular type of bean, a seemingly local cacique house bean, was actually imported from Azad Hind. It was some far-away land that Ricardo would recall, and it did explain the different season times. He grunted as he trudged onwards, the grueling work getting to him, it reminded him of some recent fuss about labor laws in the cities. What it was about, don't ask him.\n\nThe orange licked the horizon, the red sun slowly drifting below the hills, and Ricardo collapsed onto the ground, his work completed. It took him a minute for the orator's voice from further away to reach him, he stumbled back up and strided towards the entrance of the farm. Rural workers needed to strike, the man said, to organize in leagues of peasants and band together with the urbanites for worker rights threatened even more by Lacerda.\n\nRicardo chuckled as he got closer to the orator, hell, he could go for getting at least some form of lunch break during his work. The gathering grew, and soon enough, they were on the move. Workers from nearby parts of the farm seized the precious and abundant coffee beans, and with the very same fist, raised it high up in the air. Ricardo joined them, and joined the strike."
brazil_lacerda_strikes.54.a: "Hundreds of kilometers apart, their fists in the air united as one."

brazil_lacerda_strikes.55.t: "Like a Ball of Iron"
brazil_lacerda_strikes.55.desc: "Gonçalo dabbed his sweaty forehead with his handkerchief, his mouth getting dry as he watched the locker room empty and the workers march out of the steel mill like a funeral procession. The grinding machinery and titanic blast furnaces stood inert, and when Gonçalo looked back at the floor and the gate, he saw his hopes evaporate, a mirage in the sun-shaken air.\n\n"My friends! My friends! We can still talk about this!" He spoke to nobody in particular, any of the men filing past him. "Gerdau steel is the pride of Porto Alegre! I count all of you as heroes - Alfonso, you're more artist than engineer-"\n\n"Cut it, Gonçalo!" Someone said - was it Alfonso? "Embarrassing yourself won't make up for squeezing us for years."\n\nGonçalo had been a decent manager, so he thought - but he put the thought aside, huffed in frustration, and said what he wished he didn't have to. "Alright, come on everyone. I've read your demands and, in actuality, Gerdau has invested me with the power to say that most of it can be met. Let's head to my office and work out a deal here."\n\nThe procession shuffled to a halt, and Gonçalo was momentarily taken aback by how easy that was, but then one of the metalworkers, a towering man of Italian heritage, came out of the crowd suddenly and grabbed the manager's collar.\n\n"It's not about that." His voice was low and intense. "It's about letting the UDN know they can't strip us of the rights Vargas gave us. It's about showing Lacerda he can't spit in our face. We're leaving."\n\nThe metalworker melted back into the crowd, which now marched into the street; Gonçalo regained his senses and, dabbing his forehead again, retreated to his office to consider his options."
brazil_lacerda_strikes.55.a: "There's always plenty of people willing to work - and less willing to intimidate their innocent manager."
brazil_lacerda_strikes.55.b: "Oh yeah, what if I accept your terms? That'll really show you."

brazil_lacerda_strikes.56.t: "Riding Along the Wind"
brazil_lacerda_strikes.56.desc: "It takes only a small gust of wind, and paper goes for a ride. It slowly rides the current, gliding down to its destination only once even the faintest of gales dissipates. The Suzano company based its paper plant in the municipality of Suzano, close to São Paulo, the plant being innovative for being the first to produce paper purely from eucalyptus fibers. Yet, not even the relaxing, calm paper could be spared from the strikes.\n\nThe MSD agitators rolled in one day, setting up shop and starting their enlistment, clashes soon following. The clashes evolved into unadulterated violence on a limited scale, the embers of their rage following the breeze, licking the paper, setting them ablaze. Each beacon of flames spreading to the next, the winds carrying them aloft, like lanterns.\n\nWorkers of the plant were the ones that halted production, that was an undeniable fact. Yet even after the dust had settled, the ashes had returned to the soil, and the paper fell back down, they would not restart production. Not after such a slap in the face from the Government."
brazil_lacerda_strikes.56.a: "The beacons illuminated the path ahead; an inferno."

brazil_lacerda_strikes.57.t: "Poking the Eagle"
brazil_lacerda_strikes.57.desc: ""Where's Jerome?" asked someone in the back of the crowd. Normally, the factory workers here would be clustered around Jerome, their local union representative, who would run a hand along his bald scalp and poke his beak out into the air whenever talk of a strike rippled through it. He was General Motors' man, and everyone in their São José dos Campos facility knew it.\n\nJerome, the broad-shouldered "manager of efficiency" was not here. Instead, Dante Pelacani stood upon a solid wood crate used to ship parts north. Thin arms shot out from a bulbous frame, pointing towards the sky. His voice boomed across the shop floor. Around him were murmurs, steadily growing in their approval.\n\n"What has Lacerda done for the working man of Brazil? Given you a fair wage, good conditions? No! He spits upon the working class! He strips away your rights as workers! He takes money from your pockets and stuffs it back into the arms of American businesses!"\n\nThe crowd's eyes followed his wild gesticulation, rapt in attention. A young metalworker stood in the centre of the crowd, his mouth agape, hanging on every word.\n\n"The CGT wants something more for you, my friends. Decency! Dignity! Prosperity!" Pelacani punctuated each promise by smacking a closed fist into an open hand. "I ask you to join us on the picket line and bring this crooked government to its knees! Who will follow me, and fight for a better Brazil?"\n\nA loud cheer followed. All but a few stragglers. A young metalworker was among them, still caught up by the speech that seemed to know every doubt and answer every question in his mind.\n\n"Coming, Lula?" asked a passing worker. The young metalworker smiled back and joined the crowd marching out."
brazil_lacerda_strikes.57.a: "They were met at the threshold of the factory by baton-wielding police. They received the order to move in."
brazil_lacerda_strikes.57.b: "They walked out through the gates, undeterred by police sneering behind their riot shields."

brazil_lacerda_strikes.58.t: "Rapture"
brazil_lacerda_strikes.58.desc: "Sérgio Fleury glanced across the many boxes in the room, his hand gliding over the metallic surface of the crate, the title of 'NON-LETHAL AMMUNITION' passing by as quickly as his footsteps to the next crate. So on, and so on, his steps reverberated in the quiet storage chamber, only being one area of noise, the other, being internal. 'This time,' Fleury began, 'I have enough equipment.'\n\nHis thoughts rambled onward as he rummaged through the inventory papers in his other hand, 'Those striking cockroaches, they have yet to find out the true strength of law and order, but that mistake will be quickly rectified.' The inventory said it all, sure he had a lot more of the same equipment, but the new contenders were the main attraction; water cannons and the newest development from the USA, rubber bullets.\n\nA loud bang interrupted him, fast-forwarding him to the shooting range, testing out the bullets from the United States. The way they hit the board, how they still manage to damage wood, it would be easy for a bone to be broken, or an eye to be lost. His joy was unfathomable, the traitorous strikers would pay the true price, and order would once again reign.\n\nRoars cut through him again, this time, Fleury and his squad finally stepped foot on Praça da Sé, the main square of São Paulo, full of strikers. He gave the order, and finally, his justice would be delivered. The strikers rushed towards the lines of his squadron, and the squadron lifted up their rifles, delivering unto them the law."
brazil_lacerda_strikes.58.a: "The traitors broke; the strikers, struck from history."
brazil_lacerda_strikes.58.b: "The union prevailed; the strikers struck back with each pipe and stone in hand."

brazil_lacerda_strikes.59.t: "Feeling"
brazil_lacerda_strikes.59.desc: "Anger. A curious feeling; one that dominated the streets, strikes prolonging to lengths of time though unfeasible, yet there they were, chanting. The clashes got worse, more numerable, the CGT threw themselves against the MSD, and the police squadrons that came at them. It is with this perfect cauldron, bodies thrown against one another, of anger purified that birthed its evolution.\n\nRage. A dreadful feeling; one that became the new language of the streets of Rio, yet it was all dwindling down. The CGT felt themselves dragged by exhaustion, tired of constantly combating against foes from seemingly all sides. Yet there still remained that putrid, perfect, emotion. Rage only needed a spark, and the CGT would deliver unto the enemy who created the spark their full power, no matter how tired they were.\n\nSo, it was given to the CGT. A strike leader who died in custody, which was found later to be a heart attack, the spark was given. They dragged themselves up from their stupor, collecting bats, pipes, Zhdanov cocktails, anything that rage demanded of them. The mob marched towards the newly opened MSD headquarters and incinerated it entirely. First with their attacks, then with gasoline.\n\nThe local MSD leaders knew of the rage on their doorstep, having enough instinct to flee from the area, or crying in front of the attackers, abetting their rage, being granted their mercy. The police blared the sirens of their vehicles, curfews for the entire district, as they tried to search for those who perpetrated the attack. They instead found dust and wind, the slums being the new harborer of the attackers, undetected."
brazil_lacerda_strikes.59.a: "The MSD demanded, and the favelas were torn apart, the attackers being scooped up from their hiding place."
brazil_lacerda_strikes.59.b: "Through the city they marched, replacing rage with calls for non-violence."

brazil_lacerda_strikes.60.t: "Workers' Playtime"
brazil_lacerda_strikes.60.desc: "Keeping to shadow, the youths emerged from the warehouse and burst away into the night - the street was silent but for the buzzing electric streetlight. The warehouse gate stood ajar, but aggressive splashes of red paint was the extent of the damage to the building's edifice. Inside was much the same; shelves of Sony products now empty, the chemical smell of chloroform in the air.\n\nIn the warm innocence of day, the liberated contraband was put to good use, as music filled the air in one corner of São Paulo. The strongest man, who had grappled two warehouse guards the night before, swayed with the music. The quickest woman, who had grabbed as much merchandise as she could and ran, now danced carefree on the uneven pavement. The mastermind behind the heist, a mustachioed fitter, mouthed the words to Alegria, Alegria while sitting on his mother's doorstep. The whole neighborhood had come out to enjoy the sound.\n\nThey were the newest speakers, fresh from the factories across the Pacific; the crisp sound cut through the thrum of the city, and people - not just the thieves, but other strikers, their neighbors, their families - felt the music in their chests. Melodies patterned out new dreams, voices soulful and caustic spoke of courage and life. People held portraits and icons - Marx, Pelacani, Vargas, the Virgin Mary.\n\nThe struggle would be hard, but today, they played while music was in the air."
brazil_lacerda_strikes.60.a: "Start your own revolution and cut out the middle man."

brazil_lacerda_strikes.61.t: "Cool Air"
brazil_lacerda_strikes.61.desc: "Pedro would be pacing up and down his office, if the heat hadn't settled so heavily into the valley that afternoon. Any more exertion would be liable to send the rotund manager of the small mine in Minas Gerais into a frenzy, so he instead leaned precariously back on his chair, feet on the desk, stewing in his predicament while swatting away some annoying insects.\n\nOutside his shack, the machines were silent, the elevator suspended lamely at the mine entrance. Since this General Strike business flared up, Pedro was practically stuck watching a hole in the ground while the jungle crawled back in. No workers meant no gold. No gold meant no profit. No profit meant no promotion. No promotion meant no other option but to sweat his ass off watching an empty hole in the ground.\n\nDamn! In frustration, Pedro swung his palm at one of the irritant gnats. He missed, but he felt the chair shift under him, and suddenly he was tumbling backwards, landing with a hard thunk.\n\nHe stood up and rubbed his back. As he leant down to pick up the chair, he noticed something - a metallic glint between the wooden floorboards. With some exertion he pried away the board, knocked out of place by his fall, to reveal a footlocker. The lock had rusted - inside, to Pedro's surprise, a nice amount of cash.\n\nThat old bastard, the previous supervisor, really did hide away emergency funds like he said, Pedro thought. He thought immediately to take the money and run, but dismissed the idea. Mama had raised a smarter man than that. Best to think about the long term.\n\nA bead of sweat fell from his brow and landed on the proud face of Efígie da República. He could do with one of those Matsushita air conditioners right now."
brazil_lacerda_strikes.61.a: "The miners could do with those too - that'll get 'em back to work..."

brazil_lacerda_strikes.62.t: "Overheating"
brazil_lacerda_strikes.62.desc: "An injury to one was an injury to all.\n\nFrenzied flames lapped at the arsonist's feet.\n\nOn the warehouse signage, the curved Fujitsu emblem was scorched to illegibility. In the office room, bills of ladings, filing cabinets went up in flames.\n\nIt had begun from a whisper campaign. Someone's brother worked in the Japanese embassy, and word spread about the conditions in the Pearl Delta, about how the Chinese population was treated by their corporate rulers.\n\nMeanwhile, the Brazilian police kept databases of dissidents on and ran their brutal crackdowns from Fujitsu-brand computers. It indicated the existence of a common struggle. In the name of solidarity, Ibuka's outposts in the country began to go up in flames. The CGT proscribed Fujitsu products. Truck drivers thought twice before moving them. People began to make a genuine connection between their lives and the lives of workers on the other side of the Pacific.\n\nIbuka and Lacerda, the tyrants. Fire cleared away the rotten old world. Spring waited underneath."
brazil_lacerda_strikes.62.a: "The silicon cord is burned away."

brazil_lacerda_strikes.63.t: "Pickled"
brazil_lacerda_strikes.63.desc: "Nobody here had any idea how tsukemono was meant to taste, Maki thought. His coworkers had once extolled the virtues of Brazil's Japanese population, but he had yet to be impressed - and the crude culinary skill of his erstwhile countrymen was just one of many issues the gourmand Hitachi employee had with this moronic country. An excess underclass such as here would've been put to meaningful work in the home islands or back in Hsinking, for one. Another thing, some local teens had thrown tomatoes at him the other day, staining his best suit.\n\nApart from being insulted, Maki also felt a little confused. Wasn't communism illegal here? It just wouldn't have happened like this had he been reassigned to Guangdong like the others.\n\nBesides this, the reports he was sending back to the Pearl Delta only got more concerning. As soon as these strikes had started, the trend among these criminals was to destroy Hitachi products on sight, justifying it on some myopic moral grounds.\n\nThe Brazilian public had happily enjoyed Hitachi industrial equipment, factory parts, and consumer products - reliable too, and cheap - for some time, but bleating from the bleeding hearts about conditions for Chinese factory workers had catapulted this anti-Hitachi crusade into the official program of the CGT.\n\nThat American stooge in Brasília was evidently too weak to shut this organization down, and as a result, Hitachi sales in the country were trending towards zero. Whispers of a withdrawal had already circulated around the Rio office, much to Maki's delight. The flight back to Tokyo, or Kōshū, Hsinking - hell, he'd take Saigon - was likely the next best chance he had for a decent meal."
brazil_lacerda_strikes.63.a: "Just be happy nothing like this could ever happen back home."

brazil_lacerda_strikes.64.t: "Aid From the Americanos"
brazil_lacerda_strikes.64.desc: "There were few organizations in the world that had the reputation that the United States' Federal Bureau of Investigation possessed. Thewell trained, professional, incorruptible few standing against the tides of crime and foreign intelligence operations, keeping Americans safe from the likes of the brutal Mafia and insidious German spies.\n\nAnd they didn't need much convincing to come to the aid of other democratic states in the midst of their own problems. It started with some meetings between FBI agents flown to Brazil on "vacation" meeting up with their counterparts in the SFICI. The newest in wiretapping tech, access to information that the American's had gathered, as well as lessons in the newest counter-intelligence operations and tricks of the trade were soon passing from American to Brazilian hands.\n\nThe SFICI could now redouble their efforts into cracking the CGT. Tracing funding of foreign and domestic sources to the CGT. Finding any and all ties that the strikers could be tied to Marxist and Communist groups. Infiltration of the CGT to uncover any info of escalations or threats of violence that the union could undertake. Personal info on leaders and radicals of the movement that could be used for... particular purposes.\n\nBut now they could also go on the offensive as well. Spreading disinformation to weaken the public support of the strikers. "Investigations" of the families of CGT leaders and members. Funneling money from the United States' infamous black budget to bolster the MSD. And of course, if all else failed, blackmail was always an option.\n\nThe question is, just how far does one go in the defense of the nation?"
brazil_lacerda_strikes.64.a: "Better to be quiet and lurk in the shadows."
brazil_lacerda_strikes.64.b: "If we tighten the screws, the strikes will end sooner."
brazil_lacerda_strikes.64.c: "There is no limit to the methods we will engage in."

brazil_lacerda_strikes.65.t: "The Raids"
brazil_lacerda_strikes.65.desc: "Smash. Bang. Crash. Doors burst open, glass shatters, men in bullet proof vests sweep in, guns drawn, barking orders. Panic. Screams. Chaos. Pandemonium.\n\nAll across the big cities of Brazil, multiple regional headquarters of the CGT are raided by the SFICI in a massive operation weeks in the planning. With the aid of the American FBI and their expertise, wiretaps, informants and interrogations had uncovered many of the union's bases. Dozens have been arrested and hauled to local police stations, while detectives scour the documents and papers of the CGT looking for something, anything that would tie them to foreign agents or communists. A single copy of the Communist Manifesto, flyers with a hammer and sickle on it, of friends outside of Brazil is more than enough for the SFICI to prove their case.\n\nAfter all, it has to be foreign influence and communist agitators that started the General Strike that has ground the nation to a halt. No true Brazilian would stoop to such a level to ruin their country."
brazil_lacerda_strikes.65.a: "Striking the head of the snake."

brazil_lacerda_strikes.66.t: "Knock-On Down"
brazil_lacerda_strikes.66.desc: "Dr. Joaqim Paz pursed his lips as he heard the news. The strikes had gotten larger, now the teamsters were striking along with most of the factory workers and even some office workers had joined the efforts. EMS Pharma was almost completely shut down. Joaqim would never strike, he was a doctor and his duty was to his patients, but that sentiment was not shared among the hospital staff. Many of the orderlies had been on strike, as had some of the nurses, leaving a great deal of work on those that remained, from the chief of medicine down to the janitorial staff. He was no exception, the director of the pharmacy had to roll up his sleeves and dispense medications for lack of junior staff.\n\nThe supplies were diminishing. When the farmers had gone on strike, everyone spoke of what that would do to food prices but nothing about the impact to penicillin molds or attapulgite clay. That EMS Pharma factory was the chief supplier of drugs in São Bernardo do Campo, and they were making next-to-nothing. When he had tried to place an order, the few people that were working at EMS told him that they had nothing more save what was in their warehouses, and once that was gone that would be it. And with the delivery drivers striking, even if they had the money to buy from the Americans, they'd never get the supplies from the port to his pharmacy.\n\nThe numbers weren't good. At this rate, the hospital would be completely out of barbiturates in a couple of weeks, Dr. Paz might be able to add another week if he cut the pills and reduced the dosage. Perhaps the his Hippocratic Oath might blanch at the notion, but it was better to have all of his patients in some pain, rather than run out of the supply and have everyone suffer. They had aspirin enough for this month and most of the next, but that could easily change. One of his subordinates had tried to cultivate penicillin mold on bread to no success, that meant they had roughly four weeks of penicillin for antibiotics. Dr. Paz had instructed his doctors not to prescribe pseudoephedrine unless it was an emergency, that had given him perhaps one month, probably a little more if they were lucky. The patients had already noted that their drugs were longer in coming, and Dr. Paz had no answer that was satisfactory. They had come to him to get better, and now for no fault of their own, they were left to suffer for the actions of others.\n\n"Bastards," Dr. Paz cursed the strikers."
brazil_lacerda_strikes.66.a: "Every action has its equal but opposite reaction."

brazil_lacerda_strikes.67.t: "Marshaling the Troops"
brazil_lacerda_strikes.67.desc: "Deep in the favelas, there was a wholly different economy, unaffected by the strikes. The informals, everything from extra hands at a construction site hired for the day to gardeners and maids for the well-off in Rio. There were hawkers running their goods from shoddy carts to deckhands who lurked on the piers hoping to unload a few crates in exchange for pocket change and food. This economy was almost as large, if not larger, than the conventional one. This economy was not yet under the thrall of the strikers, and Osmar Guimarães Coehlo knew that they could be a powerful tool in the hand of the CGT or the MSD, depending on who persuaded them first.\n\n"There is a false friend that many of you may have met before. He smiles, welcomes himself into your home, and pretends that he wishes nothing more than to help you, empower you." Osmar began, talking to a crowd of people that had crowded around him at the Rio Antigo flea market. "Yet with honeyed words, it seeks to destroy you, and subordinate you into itself. Its name is communism, and I say with no exaggeration that it requires nothing else but destroying your whole way of life.""\n\n"Do you want to continue to work as you do? You won't be able to if the communists had their way. You'd be forced to join their party, to give them half your income as party dues. They would be responsible for handing out the jobs, and who do you think they'd favor? They'd give the choice assignments to their loyalists, and leave you out to starve until you've surrendered your autonomy, your freedom, to them."\n\n"And why is that? Because they fear what you are. They fear that you have found a way to live without them. Because it is a movement that fears those who can thrive outside of its shadow. Anything that you have that you have earned without them, even the humblest cruzerio, is seen as an affront. So, if you want to protect your way of life, work with us, the MSD, and stand up to these totalitarian cowards.""
brazil_lacerda_strikes.67.a: "In a few days, new souls began to show up to defend the MSD... or to break the CGT pickets."

brazil_lacerda_strikes.68.t: "Viva o Brizola"
brazil_lacerda_strikes.68.desc: "Brizola cleared his throat as he began walking towards the rally. On his side was Tancredo Neves representing the PSD. He was noticeably less excited about the whole ordeal, but it did little to dampen Brizola's enthusiasm. Already, he could see hundreds, possibly thousands, of people participating, and as he saw them, they saw him. At first it was just a few double glances, a couple whispers, maybe a cheer here and there, but as he walked up onto the stage, the crowd went silent. A local leader from the CGT handed him the microphone and he looked out at the crowd. Thousands of faces stared at him, eagerly awaiting his words. A swell of emotion surged in his heart as a smile crept across his face. He opened his mouth to speak.\n\n"Viva, Viva, Viva o Brizola!" a spindly man a few meters away from him began chanting, clapping his hands in rhythm as he did. "Viva, Viva, Viva o Brizola!" his words became more confident as Brizola stared at him. He was stepping side to side now, bumping into the woman beside him. Soon others joined him, "Viva, Viva, Viva o Brizola!" Brizola looked back at Neves, whose eyebrows had raised in surprise. He looked back at the crowd. They were all chanting, clapping their hands in time as they shouted out his name. Their voices carried across the street, the clapping almost deafening as it sounded out for what had to be a kilometer at least. Brizola's smile grew wider as the strikers went on. His foot tapping to the rhythm. He quickly shouted out across the crowd, beginning his speech."
brazil_lacerda_strikes.68.a: "But he knew the best part was over."

brazil_lacerda_strikes.69.t: "The Lord's Peace"
brazil_lacerda_strikes.69.desc: "With a quick sign of the cross, Cardinal Agnelo Rossi began. "In trying times, it is the Lord which gives us our strength." as he spoke, the sounds of a nearby demonstration just a block away rang out, albeit muffled and calmer than usual. With a short inhale, the Cardinal continued "But more than strength, the Lord provides peace. Peace in our mind, peace in our heart, and peace in our society. He gives us the tranquility necessary to do his bidding, and to follow his will."\n\nRossi adjusted his glasses slightly. He looked down at the prayer rally, "While there are many voices in our nation" the Cardinal eyed the worshipers who were glancing at the protest, "-and many ideas on where our nation should go" he turned his attention to the handful of police monitoring the rally, "Remember that the Lord has granted us the virtue of peace, and that we should use it. So, in the name of the Lord's peace, let us pray for stability and tranquility in our nation.""
brazil_lacerda_strikes.69.a: "Amen."

brazil_lacerda_strikes.70.t: "The Lord's Workers"
brazil_lacerda_strikes.70.desc: "Archbishop Hélder Câmara stared out at the crowd. Among them he recognised a few strike leaders, eagerly awaiting his words. With a tap of his crucifix, he began, "Our country has seen demonstrations and protests unprecedented in their size or conviction." a few small nods spread out across the crowd, "Working people have taken to the streets and aired out their demands, as is their right under the law and under God." The Archbishop glanced at the attending police officers for a moment before continuing,"But, to the dismay of the Lord and his followers, there have been those who seek to harm this movement of liberation"\n\nWith a flourish, Câmara pulled out a working paper, clearly labeled as belonging to the National Conference of Brazilian Bishops, "Myself and the Church at large condemn, in the fullest terms, the violence perpetrated by the likes of the MSD and their commanders in the IBAD. Through associated groups such as the Anti-Communist Command, these men have engaged in acts of assault, property damage, and, in some cases, outright murder. All in their attempt to dismantle the voice of God's Workers." murmurs rang out across the crowd as attendants whispered amongst each other. With a nod, Câmara put down the paper and put out his hands, "I ask those attending to join me in prayer. To pray for safety from these extremists, and for a safe nation for us all. May the Lord grant them mercy, and may their violence come to a swift end.""
brazil_lacerda_strikes.70.a: "Amen."

brazil_lacerda_strikes.71.t: "The Lord's Anger"
brazil_lacerda_strikes.71.desc: "Bishop Paulo Evaristo Arns looked out at the crowd. Just a few blocks away, he could hear the strikers, on the verge of fighting with police. He sighed, shaking his head. He made a small prayer to himself, before he looked back up again. The worshippers stared at him eagerly. Their faces betrayed their fear, fear for their lives. He frowned and shook his head again. With the sign of the cross, he began.\n\n"We are in trying times. Radicals and extremists on both ends of the political spectrum threaten to tear our nation apart." he glances over at the protest before continuing "Both the CGT and MSD, in their partisan aims, have forgotten the Lord's word. They are so devoted to their causes that they have forgotten the greatest cause of all, that of Christ. As a result, they have engaged in acts of violence and anarchy that only seek to incite the Lord's Anger." He glanced down at the working paper of the National Conference of Brazilian Bishops, condemning the violence on both sides, "Myself and the Church at large wholeheartedly condemn these acts and condemn any who engage in them. May the perpetrators find the Lord's light, and may peace return to our nation.""
brazil_lacerda_strikes.71.a: "Amen."

brazil_lacerda_strikes.72.t: "The Lord's Authority"
brazil_lacerda_strikes.72.desc: "Archbishop Geraldo de Proença Siguad glanced at the crowd. He recognised a few MSD leaders among them, eagerly awaiting his words. He adjusted his glasses before beginning,"Our nation is being tested. Tested by the Lord. Communists and Socialist agitators, seeking to bring ruin to our nation and its values, flood our streets and attempt to organize revolution. Acting as their mouthpiece, the CGT has enabled their acts of revolutionary violence against the Brazilian people and Brazilian institutions."\n\nThe crowd's faces hardened, the Archbishop could hear hushed curses and whispers. With a nod, he pulled up a document from the National Conference of Brazilian Bishops, condemning the CGT, "Myself and the Church condemn the CGT for their acts of violence and radicalism. They seek to undermine the Lord's Authority in all matters personal and political, and so shall enjoy his complete opposition." Siguad held his other hand up, putting the document down. "May these communists realize the errors of their ways and join the light of Christ. May we be protected from their ways, and may our traditions and ways of being remain under the teachings of the Lord.""
brazil_lacerda_strikes.72.a: "Amen."

brazil_lacerda_strikes.73.t: "The Fires of Counter-Revolution"
brazil_lacerda_strikes.73.desc: "Where there is revolution, there is always counter-revolution. As the CGT strike has continued, so has the opposition. Not just from the jackboots of the state's law enforcement, but from vigilantes, anti-communist thugs, and other extrajudicial entities. Plays deemed unsupportive of Lacerda or supportive of the strike have been attacked, with armed radicals storming the stages and beating cast members. Improvised explosives, set up in union rallies and left-wing coffee shops, have killed dozens. Universities, both those with large activist populations and otherwise, have been subject to harassment and vandalism. But the largest group of these extremists, the Command for Hunting Communists (CCC), have turned their sights to more ambitious projects.\n\nThrough 'investigation', little more than stalking certain CGT leaders, the CCC found the newest meeting place of the union's local chapters. With nothing but alcohol and fire they attacked it. Firebombs torched the interior, setting the building, a converted theater, alight. The explosions of Zhdanov cocktails mixed with the screams of their victims. The scent of seared flesh and ash filled the air, and soon the entirety of the building was on fire. Of those the fire brigades managed to save, third degree burns and abhorrent scars cover their skin. Looking over the internal report about the attack, the CGT's organizers realize that they are being targeted by not just the government, but groups like the CCC aswell. They walk away with a solution."
brazil_lacerda_strikes.73.a: "Let's improve the secrecy of our headquarter"
brazil_lacerda_strikes.73.b: "Let's organize some armed security for our meeting places"

brazil_lacerda_strikes.74.t: "A Short Circuit at IBM"
brazil_lacerda_strikes.74.desc: "Alex stretched his arms, his back cracking in response. He had been working on his third redesign for punch card packaging since lunch, so it was high time for a break. Walking by rows of gray-and-white cubicles, he saw two senior engineers near the cooler. They seemed in the thick of conversation. Sipping his water, Alex eavesdropped- perhaps he could glean something useful.\n\n"Of course I love this company. They've paid me more this month than my father earned in a year. And despite what the CGT's been saying, we don't need a union. They already listen to us." Alex nodded silently. An IBM position was the golden goose for students such as himself. After the '68 World's Fair put IBM Brazil in the spotlight for their textile loom control terminals, salaries have gone up massively. "But even I'm pissed with how they've been handling the sabotage."\n\nAlex nearly choked on his drink. Sabotage? "They should've told us when they found the acid in the lathes, or the shredded blueprints." He was still reeling from what the first man said when the second chimed in. "It's fine. They know it's a CGT mole. One of those progressive student intern fucks, I bet. They'll get what they deserve soon enough."\n\nAlex walked back to his desk, feeling sick. He tried to work, to focus on his tasks, but he couldn't help but worry. His contacts at the UNE never told him that they'd go this far, and certainly not this fast. Would he have to shovel shit in Rio Grande like his father? Unbeknownst to Alex however, his manager had been trailing him, observing his every move. At the end of the day, Alex's manager stopped by his desk and..."
brazil_lacerda_strikes.74.a: "...presented him with a pink slip while wearing an apologetic smile."
brazil_lacerda_strikes.74.b: "...interrogated him for a while, but otherwise left him alone."

brazil_lacerda_strikes.75.t: "WEG S.A. Runs Out Of Gas"
brazil_lacerda_strikes.75.desc: "Eggon João da Silva leaned back in his chair, looking up at the ceiling of his bourbon brown office. He was tired, tired of the chaos, tired of saying pleasant reassurances and vague promises. He could not rest, however- not yet. Now that all the fires in the board were put out and the strikes were mostly contained, he had to make a plan.\n\nHe considered the key problems facing his company. First, and most obviously, strikes had halted production in all WEG factories except those in his home province. Next, despite their support for the party, the UDN had agreed with strikers to regulate robotics in factories. Robotics that happened to be the crux of WEG's next stage of expansion, and Eggon's vision.\n\nHe didn't wish to push employees out of their jobs- far from it. Eggon wanted the people of Jaragua do Sul, whom he and his father loved, to no longer toil in indignity. Robots would work, so his people could take higher roles. The UDN's betrayal had made this impossible. So, it was time for retaliation. Eggon sketched out the plan in his mind. Cut off all ties with the party, and sponsor journalists to reveal their rotten underbelly.He would obviously have to back a rival party, but if so, which?\n\nThe telephone rang. When Eggon picked up, a voice said that the last factories had officially gone on strike. Eggon's fist tightened as the caller rattled off their demands. He slammed the phone down. God damn it! Even his people had been seduced by the CGT. This was the last straw. He dialed a new number."
brazil_lacerda_strikes.75.a: ""Adhemar! I'm glad you are available. Listen, I have a proposal...""
brazil_lacerda_strikes.75.b: ""Ah, is this the office of the PSD? I am Eggon João da Silva....""

brazil_lacerda_strikes.76.t: "Tragedy Strikes Lojas Renner"
brazil_lacerda_strikes.76.desc: "Paulo was the emblematic Lojas Renner man. For the past twenty years, he worked fervently to provide for his clientele from the new class of bourgeoisie progressives. He had been successful too, until recently. Since the strikes began, his unionized workers, both the in-house seamstresses and salesmen, reluctantly followed suit.\n\nPaulo understood why his men had left. It was their duty to fight for the oppressed by striking in sympathy. If he was in their shoes, he would've done so too. The locks on the door to the storeroom clicked into place. If the warning he got was right, it would only be a matter of minutes.\n\nHe looked out through a small crack in the storeroom's door to see a crowd of angry men burst into the store. They smashed sewing machines, pilfered the registers, and snatched outfits. Some favela boys took leather belts and cracked them in the air like whips. When they were done, they heaved piles of unused textiles into the street and set it ablaze in a grand bonfire.\n\nA police siren coming from a few streets away caused the raiders to disperse. However, the damage had already been done. Paulo's chest tightened up, and he crumpled to the floor. He looked up, seeing a great bright light. He saw Andreas. He looked as handsome as the night of their first kiss, stolen secretly under the Pelotas moonlight. He was reaching out with a gentle hand. Paulo smiled as he took it."
brazil_lacerda_strikes.76.a: "The city wept for the man. The man wept no longer."

brazil_lacerda_strikes.77.t: "No One's Buying Bob's"
brazil_lacerda_strikes.77.desc: "Bob Falkenburg wiped the sweat from his brow as he entered his country club house. He hung up his racket, and dialed a familiar number. "FALKENBURG! Thank God you've called. It's madness down here. The protests have gotten bigger, and much fucking angrier!" Falkenburg responded calmly. "Hold on, Afonso. You said you had an idea for dealing with them. What is it?"\n\n"Well, obviously we need guards around each Bob's. Maybe we could use them to break up the protests. Perhaps we could hire some gang-'' Before he went any further, Falkenburg softly hushed his VP. "Afonso, what would our customers think, seeing the shit get beaten out of peaceful protestors? Just let me handle it, please." He heard muttered swearing from the other end. "Okay. But please, don't wait. This'll get dangerous soon."\n\nFalkenburg's strategic mind got to work. He dialed up the head of each department, and told them his new plan. They would slash prices to all burgers by one-third, and advertise a newly-introduced milkshake that uses cheap imported Ovomaltine. That way, they could attract new price-conscious customers that the protestors could not sway. No bad press, no hassle.\n\nThe VP of distribution, his last call, interrupted him. "Sir, this is a great plan. But we have bad news. Three Bob's locations were hit with Zhdanov cocktails today. Some of our employees are too afraid to come into work, sir." Falkenburg heaved a deep sigh. Perfect."
brazil_lacerda_strikes.77.a: ""It's fine. We'll just have to deal with it.""

brazil_lacerda_strikes.78.t: "Pão de Açúcar Supermarkets Get Jumbo Demand"
brazil_lacerda_strikes.78.desc: "Celso stared at his watch, tapping his foot on the floor. As the manager of the first Jumbo supermarket in Rio de Janeiro's former favelas, he was responsible for its continued success. He knew that strikes would come to his store, just like the rest of the country. To deal with it, he decided on a plan. Well, half of a plan.\n\nAfter the workday was finished, Celso called all employees to the back storage area. They were clearly agitated, so he tried to act commanding. "You've all heard about the strikes. I implore you. Do not act rashly like they did." The crowd grumbled. A few turned to walk out. "BUT. I understand this is a difficult time. Thus, we have instituted a 30% increase in all paychecks, effective immediately."\n\nThe men burst into a wild cheer. They surged forward, grabbed Celso, and paraded him around the room, despite his resistance. It was several minutes of uncomfortable celebration before they finally left. As he walked back to his office, his mind jumped to the next problem- prices. If they remain unchanged, profits will drop, and there will be hell to pay with his superiors. If they increase prices...\n\nCelso stared out the window. This whole land was stained with tears from inception. Just to build the Jumbo, a favelado protest and a strike by construction workers were forcefully put down. And for what? So homeless drunkards may wallow outside skyscrapers, and poor families can squat beneath bustling highways? Would he really squeeze these unfortunates even more?"
brazil_lacerda_strikes.78.a: "He couldn't. Not for all the money in Rio."
brazil_lacerda_strikes.78.b: "He closed his eyes and sighed. At least they'd be in the green."

brazil_lacerda_strikes.79.t: "The Utilities Strike"
brazil_lacerda_strikes.79.desc: "Gabriel gently stopped the garbage truck at the side of the road. Davi checked his cracked watch, and counted down with his fingers. "Three... two... one... alright, boys, we're on strike." Gabriel and Davi left the front, and Bernando hopped off the back. Gabriel brought with him a portable radio, and the three silently set up the crude device in an empty alleyway.\n\nGabriel tuned into the pre-agreed station. Silence. The wait felt like hours. Finally, something came through. "This is Oca da Verdade. Congratulations, good citizens. Brazil has stopped."\n\nThe three men broke into an uproarious cheer. Gabriel slapped his brother-in-arms on the back. Davi wiped tears from his eyes. Bernando tossed spray paint cans to the others. "Now we can finally put this bastard truck to good use." They painted a slogan on the side of the truck- "Odeio o cheiro? É uma merda do Lacerda." A large arrow pointed from the words to the contents of their truck, now dumped in a pile.\n\nOnce finished, they broke out a pack of beer and sat around a trash can fire, singing victory songs and playing rounds of Escopa. As afternoon turned to evening, their celebrations were interrupted. They heard a vehicle approach, and when they investigated, they spotted men shoveling their trash into another truck. They were about to start a fight with the scabs when they spotted two men holding automatic rifles. Military-grade. At that moment, Gabriel, Davi, and Bernando decided to..."
brazil_lacerda_strikes.79.a: "...retreat, for the cause was not worth their lives."
brazil_lacerda_strikes.79.b: "...steel themselves, for the cause was worth fighting for."

brazil_lacerda_strikes.80.t: "One Bank Brings a Warning"
brazil_lacerda_strikes.80.desc: "President." José Luiz de Magalhães Lins entered Lacerda's office with his usual monotonous grace. The UDN's symbiotic relationship with the National Bank of Minas Gerais had brought them together in the past. Lacerda respected the man, mainly for his sponsorship of the arts. Unlike most bankers, he seemed to care for something beyond profits. "Hello, Lins. You wanted to talk?" The banker daintily took a seat. "Of course. Allow me to get straight to business."\n\n"Last night, eight of our banks were pelted with projectiles, two were set alight, and one was robbed at gunpoint. Our asset losses total two million and four employees." Lacerda's eyes widened, and he grimly shook his head. "I will keep their families in my prayers, Lins. That is a tragedy." Lins raised a hand up. "One that we can avoid repeating, sir. If we have government protection for our assets."\n\nLacerda raised an eyebrow. "You understand how stretched our troops are, yes? Dealing with strikes and riots..." Lins eyes remained fixed, looking through the President. "And we are prepared to subsidize this endeavor with our reserves. But if we cannot have security, we will be forced to stop many of our operations, including funding for... valuable institutions."\n\nThe President recognized the veiled threat. No guards, and funding for many UDN-aligned businesses would be cut off. But was it worth trespassing the rules of a free market, and giving up valuable troops?"
brazil_lacerda_strikes.80.a: ""Your request has merit, Lins. Will five thousand men be enough?""
brazil_lacerda_strikes.80.b: ""I cannot provide anything beyond my most sincere condolences.""

brazil_lacerda_strikes.81.t: "The Banks Can't Take It Anymore"
brazil_lacerda_strikes.81.desc: "Taxes. That, and death, are the only certainties in life- at least, according to a tired American saying. However, there were a few people who objected to that belief. For instance, the several banks who had sent letters to Lacerda.\n\nThese banks were mainly regional or national institutions, but a small group of foreign creditors backed up this burgeoning movement. Their letters were kind or cold according to how well the UDN had treated them in the past. Yet they all made their demands clear. Either Lacerda would fix the strikes, or, since they were clearly not being put to good use, fix their taxes. If not, they'd cease operations in the country.\n\nLacerda was already frustrated from dealing with the demands of the strikers, and this "bank strike" was just about to push him over the edge. These men were pulling the plug from a struggling country. Like vultures, they'd turned against him at his weakest point. Why should he agree to their blackmail?\n\nYet he had allowed the nation to slide this far. His ideals of a free market, a free people, a strong nation with dignity as its foundation, had been on the verge of death since the strikes began. If what it took to save his country was to grant some special favors to the banks, wouldn't it be worth it? And considering how much influence these institutions had, could he really say no?"
brazil_lacerda_strikes.81.a: "The banks will get their special privileges."
brazil_lacerda_strikes.81.b: "I am still President, goddamnit, and I will not bend to the banks!"

brazil_lacerda_strikes.82.t: "Bleed Me Dry"
brazil_lacerda_strikes.82.desc: "Calls flooded the lines of the central logistics for the police. They all told a similar story: "We need fuel." The stories did, however, vary in style — albeit all tied together with a common root.\n\nIn Pará, a fuel tanker sits still on a jammed highway that shows no sign of relief. The driver taps his dash in a monotonous fashion as he peers over the horizon. Demonstration in the distance. If he rolls down his driver-side window, he can hear the yells up ahead. "Down with Lacerda," "Fight for your rights, "For the working man." Hmph. What about the working man here?\n\nIn Amapá, a police station fights for what it has left. Without fuel shipments arriving, their silos run dry. But the misfortune does not end there. Signs of sabotage. Fuel consumption not lining up with projections. Strange gaps in perimeter fences. Strikers coming very close to the station. All put together, they made up for one alarming supply shortage.\n\nIn São Paulo, strikers surround a local filling station. Batons provide the only answer law enforcement has to their demands as they attempt to protect one of their dwindling sources of resources. Their batons work for today, but whether they work for tomorrow remains another question. While they still have it easier than their rural counterparts, it is never a walk in the park.\n\nAll this has led central logistics to look to a higher power for help: President Carlos Lacerda. With the infinite wisdom of his advisors, he was presented with several options to alleviate the logistics dilemma. The police officers fighting his war could do nothing but wait with bated breath as Lacerda made his decision."
brazil_lacerda_strikes.82.a: "Let our public transport can take the fuel hit so our police force doesn't have to."
brazil_lacerda_strikes.82.b: "Tap into the military fuel reserve. They'll understand."
brazil_lacerda_strikes.82.c: "Divert all our fuel to our police operations. Our men need all the help they can get."
brazil_lacerda_strikes.82.d: "We can't do anything about the current situation. Just buckle down and ration fuel."

brazil_lacerda_strikes.83.t: "Minor Turbulence"
brazil_lacerda_strikes.83.desc: ""Why aren't they moving already? There's not that many." The petulant demands of the Brazilian President were only heard by his passenger, Golbery do Couto e Silva, who maintained an increasingly contrasting calm composure. The Presidential Guard were doing their best to remove the blocking strikers, but their lack of success wore on Lacerda's nerves.\n\nSilva, for his part, remained in serene silence. Lacerda spied his nonchalance, wondering if Silva knew something he didn't. He got his answer as the sounds of an army mobilizing in the distance. Tanks, helicopters, and everything else under the sun approached to disperse the protestors.\n\nTheir pleas were met only with merciless tank treads. There would be no dialogue today, no communication, just a growing antagonism furthered by today's brash actions. For his part, President Lacerda was pleased, eying an emerging smile on Silva's face. He did not interrupt the General, allowing him his moment in the sun.\n\n"I understand you have your ways, President, but this is my way." The radio's hiss inside the vehicle indicated that the CGT's blockage was cleared. "A soft approach can be nice, but nice should never get in the way of doing what is right. Make sure you know that when it comes to dealing with these strikes." Silva never raised his voice above a polite tone, but Lacerda felt his words.\n\nAs they arrived at their destination, they both looked at an accompanying military helicopter. Silva felt the occasion was appropriate to deliver a second reminder, leaning over Lacerda's ear to whisper a few magic words:"
brazil_lacerda_strikes.83.a: ""Never forget who really holds power in Brazil, President.""

brazil_lacerda_strikes.84.t: "A Big Black Cloud Comes"
brazil_lacerda_strikes.84.desc: "In Recife, it wasn't just water flooding the streets — the people also came along with the tide. Today's protest was on an unmatched scale, taking an avenue under siege. Water pounded the asphalt alongside the people's voices, screaming out bloody murder for injustice after injustice suffered. Eventually, the self-proclaimed justice arrived to dole out its reckoning.\n\nTear gas is a peculiar compound. Despite its name, the substance is at a loss in heavy rain, and its effects are severely diminished. Pernambuco's police department discovered this lesson today as their gas barrage barely made a dent into the overwhelming crowd. Left without their devices, the way ahead to restore justice could only be accomplished with familiar brutality.\n\nA loose formation of lawmen marched against the protestors, bringing batons against flesh. But where the pleasures of armor would be useful, they were only a hindrance today as fogged visors obscured their vision. Numbers on both sides, mainly law enforcement, could not keep balance in the thick rain. The law slipped and slid, a joke to the protestors.\n\nAs the police fought into a humiliating night, protests continued unabated, only diminished by a growing bloc party evolving from within. Inside his station, the district commander called his higher-ups, desperately asking for whatever support could be provided to rectify his embarrassment. His pleas went all the way to the very top and finally met with an answer:" 
brazil_lacerda_strikes.84.a: ""They need more men. Give them the numbers. Put an end to this farce.""
brazil_lacerda_strikes.84.b: ""Tell him to get his men in shape. Discipline them. It can't be that hard.""
brazil_lacerda_strikes.84.c: ""Have them retreat. This is pathetic. We'll let them win... for now.""

brazil_lacerda_strikes.85.t: "Battle of Recife"
brazil_lacerda_strikes.85.desc: "It was a gray, clouded day in Recife, as foreboding as the rainfall it was heralding. The GCT and the Riot Police had been mobilized throughout the streets, the sounds of sirens, shouts, and chants drowning out the howling winds and distant thunder. The sheer size of the protest, one of the largest in the nation's history, left so much as deploying the police difficult, and they responded to the vast numbers with tear gas and tight formations.\n\nBut the rains came down, and the pains of the tear gas diminished. And in one avenue, the protestors marched forward, closer and closer to the police, chanting louder and louder. However, the police did not break. Instead, they closed ranks and held their ground, patiently awaiting reinforcements, their superior training shining through.\n\nTheir aid came not just in the form of more men but better equipment: high-pressure tear gas guns and water-resistant tear gas canisters blasted into the huddled masses of the protestors. Drenched by the rain, frustrated by the officer's refusal to budge, and left deliberated by the gas, the march faltered and began to dissipate. By the time the rains stopped, the streets had become emptier and under police control."
brazil_lacerda_strikes.85.a: "It seems that the Anti-Riot Bill was worth the trouble..."

brazil_lacerda_strikes.86.t: "Tug of War"
brazil_lacerda_strikes.86.desc: "Walking through the halls of the University of São Paulo, two of its students, Shizuo Osawa, or 'Mário Japa', and Dilma Rousseff, discussed the recent strike. With a smile, Dilma said "Mário, you know there's not-"\n\nCRASH. As the pair turned a corner they saw Raimundo, a fellow student, on the floor, surrounded by riot police. His cry of "Fascist!" was met with the crack of a baton. On the side, a professor was in a shouting match with a different officer, seemingly their commander. "Communist terrorists!" shouted out the officer. Mário and Dilma quickly turned around, only to be greeted by a column of riot police marching towards them. In a flash, Dilma, seeing the open doorway past Raimundo and the officers, grabbed Mário's hand and ran.\n\nIn a flash a flurry of blows came down upon them. Pain rippled through Dilma's back as batons rained down, but, nevertheless, they pushed through. Sprinting out the other side, she saw Raimundo alongside them, having used the opportunity to slip through the police cordon.\n\nAt this point, the hallway was filled with students and protesters pushing against the police. She watched as Raimundo, nose bloody and beaten, chanted alongside the staff and students, "Down with Lacerda!". The commanding officer responded with a simple "FORWARD!" as the police phalanx pushed into the mass of bodies. Not hesitating, Dilma and Mário continued to run. But as they did, they only saw people running towards the clash, running to help Raimundo and the others."
brazil_lacerda_strikes.86.a: "More protesters join the tug of war."

brazil_lacerda_strikes.87.t: "Double Edged Swords"
brazil_lacerda_strikes.87.desc: "With a whisper, Lacerda and his aides had shoved themselves into the closest office room of Ceará's UDN Party Headquarters. The previous inhabitants, PR Specialists getting debriefed on how to cover the strike, were quickly moved out as Lacerda read the document placed in his hand. It was a report from some local party officials, a little dossier with photographs to boot. Apparently, one of Távora's federal deputies, a regional powerbroker for the Realistas, had been talking with local leaders in the middle of a strike action, and Ceará's finest paid them a visit. Police trashed the building they were staying at, and harassed and abused both the leaders and the deputy himself.\n\nLacerda scowled under his breath,"Fucking thugs". An aide spoke up,"Sorry, Mr. President?" Lacerda waved his hand dismissively "Nothing". The President looked back down at the report, and its accompanying photos. Police shoving and humiliating a UDN official on the front pages of Brazil's newspapers. Távora would have his head, and the UDN would fracture at the worst possible moment. He'd have to censor it, wipe the story off the face of the earth. Though... he could make an example of the deputy. He could use him as a cudgel to bring the Realistas under his fist. Scare them into cooperation. The Crow shoved the dossier into an aide's hand as he walked out of the office room."
brazil_lacerda_strikes.87.a: ""Make it disappear, nothing gets to the press.""
brazil_lacerda_strikes.87.b: ""Let them publish it. It speaks for itself.""

brazil_lacerda_strikes.88.t: "How To Break The Tide"
brazil_lacerda_strikes.88.desc: "Muffled chants, police orders, and insults filtered through the São Paulo DEOPS Headquarters and into Lacerda's ears. Across from the President sat Police Chief Fleury, undisturbed by the conflict outside.. In a calm tone, he spoke,"São Paulo has been hit the hardest of any Brazilian city by these terrorists. Already-" Lacerda heard tear gas being deployed outside. Pained choking joined the chorus of the riot. Fleury continued on, his tone unwavering "My officers have been pushed to their limits. Without federal aid, I cannot maintain law and order." he glared at Lacerda,"I trust you understand the severity of our situation, sir, and that you will support Brazil's finest."\n\nLacerda thought back to Fleury's words as he stepped out of the car. He hadn't promised anything, but the Chief wasn't wrong, São Paulo's situation was dire. However, just as he considered Fleury's proposition, he spied Milton Campos coming out of the doors of Belo Horizonte's Câmara Municipal. Adjusting his glasses, Campos gave Lacerda a small smile as the two walked past each other. He had been pestering Lacerda to bring in the military to resolve the strike.\n\nThe President couldn't say he was against the idea, Fleury and the rest of the nation's law enforcement had been floundering in the face of strikers, and, as Campos pointed out, there was the very real possibility that Fleury would appropriate any aid given for his own self-interest. Of course, Fleury, in turn, harbored a deep resentment of the military, and both Campos and Fleury could be simply wrong and the police have it under control. Lacerda sighed as he entered the Câmara Municipal. The sounds of protests outside, already faint, became inaudible. He waved over an aide and made his decision."
brazil_lacerda_strikes.88.a: ""Tell Campos and Fleury to stop bothering me.""
brazil_lacerda_strikes.88.b: ""Tell São Paulo to expect incoming support.""
brazil_lacerda_strikes.88.c: ""Request the military's support in handling the riots.""

brazil_lacerda_strikes.89.t: "The March of One Hundred Thousand"
brazil_lacerda_strikes.89.desc: "Born from the blood of André Túlio, a flood has come to engulf São Paulo. A flood that will wash away the government's crimes, the injustices of its police forces, and the wrongs of the President's administration. Workers from all walks of life comprise its waters. Farmers from the rural regions, those living paycheck to paycheck, and committed trade unionists. They all join to form the flood, and they all have begun to amass just outside the city. While only half of their promised numbers are there, and they are yet to reach their planned routes, they only continue to grow. Brazil's working classes, from as far as Paraná and Rio, are on their way, and there is little the dambuilders of São Paulo can do to stop them.\n\nThe leader of these builders, Police Chief Fleury, is being pressed on all sides. He worries and worries as he sees the tide recede and the water grow. The marine life of the city, criminals, looters, and so on, have been let loose with only the greatest of catches, such as the elusive Mário Japa, are still sought after, while the rest are left to their own devices. Rather than fishing, Fleury has turned his attention to levees. The roadblocks, separation points, and rallying points for law enforcement, constructed by Fleury alongside Governor Vargas Jr. and Mayor Natel. They hope it will be enough to stem the tide, split the disorganized masses and prevent the submerging of São Paulo. Some believe they will hold, thousands hope they don't, and some still vainly hope compromises can be made."
brazil_lacerda_strikes.89.a: "And now, all of São Paulo braces for the flood."

brazil_lacerda_strikes.90.t: "The Levees Hold"
brazil_lacerda_strikes.90.desc: "Despite the flood, the waves that crashed against the dikes, and the thousands that marched into São Paulo, the levees held. With the support of reinforcements, and extra equipment, Fleury's dambuilders held the line, and now the flood has been broken. Puddles trapped in pockets around the city, split up and unable to communicate with one another, are being rounded up and dispersed. The greatest waves of the tsunami, the union leaders, agitators, and organizers, have been tamed and arrested, thrown into police wagons and driven out of city bounds.\n\nThe levees were so effective that, for some, they barely even noticed the waters at all. Shops continued their operations, the rich elites of the city continued business as usual, and beyond the odd crackdown or checkpoint, the flood dealt little damage. Already, MSD has begun to collect some of the remaining water pockets, stripping them of their fervor and strength."
brazil_lacerda_strikes.90.a: "The waters recede, and São Paulo and its stains survive another day."

brazil_lacerda_strikes.91.t: "The Levees Break"
brazil_lacerda_strikes.91.desc: "With the crashing of waves, the levees broke, and São Paulo was submerged. Police, vainly attempting to break up the tide, found themselves split up and scattered. Individual units corralled or otherwise separated from one another by the overwhelming force of the strikers. Where strikers have to push through or fight past blockades and checkpoints, they waltz past dozens more as they are abandoned by the disorganized police force. Some officers, out of fear of the tide, fire at protesters, killing some small number. In retalation, some officers are drowned by the tide. Despite this, there is little resistance to the march.\n\nNone are free from the floodwaters. Businesses are hastily shut down, every corner of São Paulo coated in a sheen of liquid. The rich, the military, and the reactionaries watch in horror as the flood goes by. Socialist and Communist melodies fill the streets just as much as the actual marchers. The entire nation listens from their radios or views the scenes from their TVs. More than one hundred thousand of Brazil's huddled masses moving through São Paulo virtually unopposed. By the time Lacerda called in the military, it was too late. The water damage has brought rot and ruin to São Paulo's most wealthy and most oppressive. Officers and generals sat huddled, already planning for the President's removal as the songs of the working class rang out across the country."
brazil_lacerda_strikes.91.a: "The waters flood São Paulo, washing away the stains of reaction."

brazil_lacerda_strikes.92.t: "Strung Up If I Spoke"
brazil_lacerda_strikes.92.desc: "The tide had changed. Stretched to their limit, São Paulo's military police had stepped back, and the actual military had taken their place. Civilian travel by road was minimal; armored cars, half-tracks, and American-made light tanks ruled the streets. Army checkpoints dotted the city. Government forces reoccupied abandoned factories, fortified with sandbags and machine gun nests, and turned into forward operating bases.\n\nThis did not mean, however, that the military zones were peaceful. Almost as soon as the military took command, the MSD increased their vigilante activities across the city; evidently the police had failed, or been uninterested, in repressing them. Most could be considered no more than common thugs, lacking a soldier's discipline, and, to an outside eye, a clear hierarchy of command, though it was an open secret the business leaders of IBAD were bankrolling them.\n\nSometimes hours apart, the MSD would be connected to a violent street brawl, an arson case, incidents of looting. This had encouraged similar, or perhaps interrelated, incidents both from bored soldiers and from other anti-striker groups. The gang of enthusiastic right-wing students and frustrated police officers known as the 'Command for Hunting Communists' had lynched a mixed-race man one night after misidentifying him as Carlos Marighella, the Marxist outlaw.\n\nAll of these reports would end up on Minister Golbery's desk, and it was up to him how the army, now they were in control, would handle the MSD in São Paulo and other cities where they had a presence."
brazil_lacerda_strikes.92.a: "The MSD are petty criminals undermining our operations. Keep them in line."
brazil_lacerda_strikes.92.b: "The MSD are rough, but they're on our side. Leave them be."

brazil_lacerda_strikes.93.t: "Apollyon"
brazil_lacerda_strikes.93.desc: "Suddenly, the black van appeared everywhere. Across the country, in different neighborhoods, in the dead of night or cold light of day, the black van would roll up to a given address - the van would linger there for a moment, engine still rolling awake. Then, with a burst of activity, armed men would exit the vehicle, storm the building, and would shortly return to the van with their persons of interest in tow. Then the black van was gone, and people sometimes didn't hear from the victim again. This scene happened again and again.\n\nSometimes the men from the van wore olive drab, with rifles on their backs - sometimes they wore civilian clothes and carried handguns. Sometimes the van would come to a favela, an apartment block, a bar, a workingmen's club, a union office. The targets were organizers, shop stewards, political radicals. Sometimes neighbors would shout in alarm, hoping to drive the van away, or hurl insults at the squad of interlopers as they left - mostly people silent, if they even noticed in time, that they had been passed over by the angel of death.\n\nIt started slowly at first, but people were not blind - as the arrests and disappearances continued, word of mouth spread. Reports appeared in the media, even in some publications that took a neutral stance on the strike.\n\nGeneral Golbery was visiting one of the destination points for the black vans - this one was a few clicks outside the city, a black site on the jungle verge. Beyond the barbed wire fence, the natural and primordial logic of murder, behind it was its rationalization. Walking past the cells, Golbery considered the future of his pet operation as the element of secrecy wore off."
brazil_lacerda_strikes.93.a: "The heat is growing - scale back the operation, stick to high-priority targets."
brazil_lacerda_strikes.93.b: "Keep it under wraps - spend more resources to suppress knowledge of the operation."
brazil_lacerda_strikes.93.c: "Forget the attention - broaden the sweeps."
brazil_lacerda_strikes.93.d: "No such thing as bad press - publicly announce the arrests to make an example."

brazil_lacerda_strikes.94.t: "Quietly Into The Day?"
brazil_lacerda_strikes.94.desc: "Golbery's eyes scanned over the list yet again, making sure he kept track of each name penned down. Some opposition agitators here - some fervent pro-strike radicals there - but all needing to be dealt with one way or another. Though as he kept scanning the words over and over again, a question kept blooming in his head: How? How exactly would he deal with them?\n\nMaybe a bribe? A helping of real would help keep them quiet for the time being, and even if they did want to lodge some complaint, it wasn't like they were big enough names to make a scene. Why bother with the bribes then, when an arrest would do just the same? Golbery spent a moment internally debating the idea, before dropping the list with a sudden flash of brilliance. Why bother with arrests, or bribes, when there was a much more effective way to solve things?\n\nThe plan would be simple. The opposition would just go about their day, entirely unaware of Golbery's Plan. Maybe they continued in their politicking, or maybe they took the day off instead - however all invariably would meet the same fate. A quick beating from some 'rowdy youth' on a street corner; perhaps a handful of 'disgruntled civilians' jumping out the back of a van with a 'message.' But what matters most is that they'd get the message. 'Stay in line.'\n\nBut what of the media? He wondered, though he soon realized it'd be a non-issue. After all, this General Strike was the story of the year, bar none, who'd go out of their way to report some assault at a time like this? Even if some outlet did pick up on it, it'd be all too easy to frame the crime as some act of idiocy by overzealous MSD boys, or yet another case of CGT proselytizing. As he made the calls, he could only hope they got the message."
brazil_lacerda_strikes.94.a: "Tomorrow's top headlines would only prove him right."

brazil_lacerda_strikes.95.t: "Peace and Plenty"
brazil_lacerda_strikes.95.desc: "Milton Campos was enjoying this morning more than usual. Maybe it was the gentle breeze in the air, or perhaps it was the cafe's faint aroma - maybe it was just an exceptionally good night of sleep prior. Milton didn't know, and he didn't care much to find out; he was too preoccupied waiting for his cafezinho after all. For just a moment, the morning felt almost perfect.\n\nAlmost. Just barely in earshot, the undignified yells of those damned strikers echoed throughout the city, being fended off by a cavalcade of soldiers and military vehicles. Though, as much as he expected it to, this didn't ruin his mood - in fact, it seemed to heighten it, with a rather contented grin breaking onto his face.\n\nAfter all, it was better to be just barely in earshot than to be roaring throughout the entire city, no? Loyal Brazilian patriots were defending the good men and women of Belo Horizonte, and Lacerda was doing things right.\n\nThat train of thought was cut short by the sound of his cafezinho arriving, and Campos taking a deep inhale of the aroma. He could stop thinking about strikes, or about Lacerda, or about any of the chaos in Brazil, and just soak in the beautiful morning. The gentle chatter of fellow patrons, the warm sun faintly shining on his face, the welcoming atmosphere of Belo Horizonte. The city was safe - and there was no problem in relishing in that."
brazil_lacerda_strikes.95.a: "If only for a moment, Brazil felt normal."

brazil_lacerda_strikes.96.t: "The Disappearance of André Túlio"
brazil_lacerda_strikes.96.desc: "André Túlio's disappearance was a rather quiet case. While it seemed all too suspicious to the general public that an outspoken proponent of the general strike had suddenly "disappeared" out of nowhere, there wasn't much that could be done about it, especially since most of the newspapers were still obsessed with the strike itself. After all, no one would take time out of such an intense event to cover the disappearance of a journalist, would they?\n\nFor the most part, this sentiment was true.\n\nWhile Túlio's newspaper published an article about the affair, and some locals criticized the inaction of the São Paulo police, the incident seemed to have largely died down. At least until the body turned up.\n\nIt was a messy affair, the body hastily dumped on the side of the road, covered with hundreds of cuts and bruises - a very clear murder. And with Túlio's blood now on the road, Golbery's was in the water.\n\nThe fallout was deceptively small. Once again, Túlio's paper was the only one to publish anything about the case, denouncing the Lacerda government as "murderers" and "terrorists" in an issue devoted entirely to mourning and mudslinging - but this time it was the spark that set the nation on fire.\n\nOvernight, the scandal erupted across Brazil, with newspapers eagerly jumping on the controversy and denouncing the administration as 'no better than the tyrants in Germania!'\n\nThings would only get worse as the resentment in the country began to organize - several papers wrote articles in solidarity with the "unjust killing of an innocent journalist" and encouraged the "March of One Hundred Thousand" beginning to organize in São Paulo. The vultures had begun to circle, and Golbery had to be the one to shoot them down."
brazil_lacerda_strikes.96.a: "Brazil knows chaos by Golbery's hand, but will it know peace?"

brazil_lacerda_strikes.97.t: "The Failed March"
brazil_lacerda_strikes.97.desc: "When the GCT and various labor unions came together to protest the Lacerda government, some boasted that they were planning the largest protest in Brazilian history, a march with more than a hundred thousand or even a million souls. Many believed them and hoped this would be the fatal blow to Lacerda's Presidency. However, no one took them more seriously than the government that opposed them.\n\nHow can one organize such a protest when their leadership is harassed, beaten, or arrested? How can labor leaders plan with one another when communication falls apart, carefully nipped in the bud by clinical military precision? When the day of the March of the One Hundred Thousand came, it lacked even a fraction of the numbers promised, and the wider population even forgot or ignored it. What little remained quietly frittled away in the face of failure and bored police units.\n\nAlthough labor opposition remains high against the ever-controversial Carlos Lacerda and the UDN, the march's failure highlights the shortcomings of their leadership and the ruthlessness of the President and his allies. As the rhetoric of the MSD and IBAD continues to gain ground, the President has overcome one of his biggest hurdles."
brazil_lacerda_strikes.97.a: "Let's hope they don't try anything else."

brazil_lacerda_guanabara_recon.1.t: "The Marvelous City"
brazil_lacerda_guanabara_recon.1.desc: ""Once we escape this cloud, you'll see Rio as it is now, trapped in its concentric form, piling pressures upon its center, discouraging expansion of its anthropareas outward. We must reshape her morphology along an east-west axis to free her arterial flow. For example, you'll observe how inadequate the hustreets and surfaceways alongside Copacabana are compared to its mecstreets."\n\nWith each invented term C.A. Doxiadis dropped, Lota de Macedo Soares cast an apologetic glance at the President for not having brought him up to speed on the finer points of ekistics. Not that Lacerda could pay much attention through the helicopter's sway and the sun's glare.\n\nHe knew the basic ideas anyway, having overseen Doxiadis Associates for years as Governor. The latest price tag of the proposals worried him, though. Raphael had held nothing back in his sternly worded memo, questioning his laissez-faire credentials, lambasting the project's balance sheet, and detailing every time the Greek Technician spoke above his station.\n\nAn updraft ruffled the President's thinning hair as they entered clear sky and the Marvelous City laid in full view. It was no new sight for him, and Doxiadis must've thought himself clever for this grand gesture. But as Lacerda watched cars clog street corners and sirens flash through highways all caked in smog and poverty, he couldn't look away from the one place he could call home.\n\n"Those modernists know only to build from scratch. They'd destroy centuries of history to construct their artificial utopias, instead of freeing anthropos to expand how he sees fit. We can do better." Doxiadis needed only to see Lacerda's solemn gaze to know his plan was pushing through.\n\n"And those favelas..." Doxiadis pointed to the hills. "...let's do something about them, shall we?""
brazil_lacerda_guanabara_recon.1.a: ""You've read my mind.""

brazil_lacerda_guanabara_recon.2.t: "The Favelas"
brazil_lacerda_guanabara_recon.2.desc: "In one room, a woman was giving birth. In another, a woman was dying of tuberculosis. All the vastness of life, dancing to the rhythm of gunshots and samba, compressed into tiny boxes of porous concrete stacked upon one another, a labyrinth of corrugated metal suffocating in the scent of fresh fruit, sweat, and death.\n\n"It's beautiful, is it not? Centuries of human ingenuity in action. Alas, it is a consequence of the morphology of this city, its spatial syntax folding into itself as mass crept up the hills, the arteries of human settlement constricted into narrow meandering capillaries.\n\n"It is a wonder seeing how culture has evolved here. I feel very fortunate to have seen Black Orpheus before I flew in here, wonderful movie, and I am in awe at its celebration of life that is now reflected before me here." He and the President took in a view that overlooked the suffering of the favela and the grandeur of Guanabara Bay. Doxiadis turned around, at the still-fresh debris of some of the first buildings they demolished. "If we get rid of the favelas, what will happen to culture?"\n\nLacerda, hardly enraptured at the sight of slumdogs crashing into trashbins as they fought over scraps of moldy rib steak, noticed a morbid nostalgic aura came upon the man from Athens. "Second guessing? Now?"\n\n"I lived in places like this in Bulgaria. The new communities should have the same spark of human spirit this place has."\n\nWhatever Doxiadis said, perhaps it didn't fully transmit amidst the sounds of the old man on a chair by his door coughing over his coffee and the kids screaming at a cat to chase a few chickens down. However, Lacerda could see as clear as day the hours of relentless debate the Greek technician would no doubt put him through if he didn't shut him down right this instant."
brazil_lacerda_guanabara_recon.2.a: ""Fine. We can redesign the neighborhoods but we are not stopping relocation.""
brazil_lacerda_guanabara_recon.2.b: ""Didn't you just praise their ingenuity? They can handle themselves.""

brazil_lacerda_guanabara_recon.3.t: "The Marvelous City's Mood"
brazil_lacerda_guanabara_recon.3.desc: ""Constantinos, I have a lot of respect for you and your style," murmured a slow-talking Lúcio Costa, gesturing atop Sugarloaf Mountain towards Rio's cityscape, "but I would ask you to think again upon what this means for Guanabara. This is not a planned city, but an evolving one, a growing one! You cannot simply determine with a dictator's assuredness the fates of pe-"\n\n"Mr. Costa, you are a modernist, correct? In that case, you would understand the need for form to follow science, befitting our modern age. Now, applying ekistics, we have the chance to invigorate city life through better planning, a better understanding of dynamics. I fail to understand why modernists such as yourself oppose this."\n\nA group of American tourists nearby clapped, one in a suit and tie letting out a hearty "Well said!" as a wry smile emerged on Doxiadis' face. He felt his case had been made rather aptly. A couple of Brazilian planners flanking Costa did not seem to agree, brows furrowed, likely with the experience of Brasília's construction in mind.\n\n"That is your opinion, then," Costa replied, demuring. "You should know, however, there are many of us Brazilians who know what it takes to maintain the Marvelous City, and will keep doing just that. It's been a pleasure." The Greek Technician shook the hand of the Brazilian, and the battle lines were drawn.\n\nDoxiadis sighed. He turned back towards the city, once again ruminating over its constricted form, boxed into the center. Building a building is not easy, much less so a city. Whatever the modernist intelligentsia wanted, that was what he intended to do."
brazil_lacerda_guanabara_recon.3.a: "An engineer's greatest enemy turns out to be spite."

brazil_lacerda_guanabara_recon.4.t: "Cidade de Hoje"
brazil_lacerda_guanabara_recon.4.desc: "On the edge of the Cidade de Hoje, there is little.\n\nA child with a pistol that barely fits between his fingers stands invisible in the night, a kind of sentry fulfilling his duties ten years too early. There is little to look at, save for the neon "Hotel Vegas" sign struggling to keep its luster, scarcely illuminating the barren earth beneath him. The thundering screams and shots inside the inn tempt him to disobey his teenage compatriots' orders. But his fingers itch. He goes in.\n\nInside the building, the teens run out with bags in hand, as if escaping a heist. The struggle is over, blood stains the rooms, the cries of pain begin to subside. The boy follows on innocently unsatisfied, disappearing once more into the surrounding empty darkness. As the Cidade expanded, the only question was when the same story would repeat itself.\n\nIn the core of the Cidade de Hoje, there is plenty.\n\nA vibrant Pão de Açúcar store thrusts boldly into the street as its strokes of fresh red paint looms over a crowd of evening walkers. Its customers wear golden crucifixes, laugh loudly, and walk under bright yellow fairy lights, enjoying the area as if it had always looked this way.\n\nBefore, clay-like constructions of abandoned social housing told a different story, its cubicles arranged like bricks upon the hill. It is now a forgotten memory, surrendered in the spread of the wealthy shops, streets and services that took their place. The song of samba no longer fills the alleyways. All that remains is the residue of scrap and stone, repurposed for the newcomers to tread upon.\n\nWhatever the wishes of its designers, the Cidade de Hoje is not really one city, but two."
brazil_lacerda_guanabara_recon.4.a: "All they really share is the name."

brazil_lacerda_guanabara_recon.5.t: "The Tired Tragedy of Lota"
brazil_lacerda_guanabara_recon.5.desc: ""It's just... impossible, trying to work with Doxiadis and the others. They've got such different visions." Elizabeth sipped as she listened, pouring herself her fifth cup of tea. Lota's coffee had long since gone cold. "Roberto keeps telling us to think about how our project might impact the environment. Sometimes it seems like he prefers petunias to humans." Elizabeth had to chuckle at that one.\n\nThe pair had been involved for over twelve years. Yet still, Elizabeth thought, they didn't have this romance thing down. "And Sérgio- he does good work, but he wants me to 'focus on the love imbued in your craft'. How does... I mean, am I not doing that?" Lota heaved a sigh in frustration. "It's... well, I don't know, Liz. You've heard everything. I just don't know what I'm doing anymore."\n\nElizabeth laid a gentle hand on her lover's arm. The sights and smells of Flamengo Park flowed around them like light across a stained glass window. "Lota, you put love into everything you do." A blanket of comfort in a snowstorm. "This park is more than proof enough. So, whatever you choose to do... I'll support you wholeheartedly."\n\nLota felt her cheeks grow warm again. It was a rare moment when they supported, rather than damaged, each other. She knew of Elizabeth's affairs, of her alcoholism, of her hate for Rio, and of her tendency towards self-isolation. She prayed these softer moments might make up for the years of heartache. "You're right. I've decided. I'm going to...""
brazil_lacerda_guanabara_recon.5.a: ""...tell Doxiadis to stop being so controlling. These people know what they're doing, and he needs to lay off.""
brazil_lacerda_guanabara_recon.5.b: ""...tell Sérgio and Roberto they need to listen to Doxiadis more. He's in charge for a reason, and I trust him.""

brazil_lacerda_guanabara_recon.6.t: "Doxiadis' Triumph"
brazil_lacerda_guanabara_recon.6.desc: "It had taken much blood, sweat, and tears, but it was done. Doxiadis had finally realized his vision, and Rio was reborn. Every face of every pedestrian had a content smile, as they could feel the change in the air. Every street was as clean as the day it was paved, every road as smooth as could be. Rio had finally become the prosperous city the Portuguese had once envisioned it as, and the people couldn't have been happier for it.\n\nLacerda considered himself one of those people. As he overlooked Rio - no, His Rio, he felt his heart soar with pride, he was the one who spearheaded this project, he was the one who pushed to make the difference in people's lives, and he was the one who gathered the brains and manpower to see it all through. And so, as he finally took that first sip of coffee, he took it knowing that it was all worth it.\n\nLota, on the other hand, felt empty. Not angry, not burnt out, not even sad, just hollow. She had toiled away on the project, in both body and mind, and had got nothing out of it. Payment? Enough to keep her going, but not much else. Credit? Almost all of it went to the men on the team, only ever receiving token platitudes. Recognition? She knew nobody would remember her name being attached to this project by month's end. And, as the final twist of the dagger, Elizabeth hadn't returned her calls.\n\nDoxiadis himself was stirred by his work. He shaped and moulded Rio as he saw fit, transfiguring it from a city of favelas to something truly of the 20th century, and just as Lacerda did, he felt his own heart swell with pride. The kind of pride only shared by a father witnessing his newborn, or an artist reflecting upon his magnum opus. Though, unlike Lacerda, this pride was short-lived - broken by the ringing of a telephone."
brazil_lacerda_guanabara_recon.6.a: ""Mr. Doxiadis? It's the Australian ambassador. How do you feel about coming to Melbourne?""

brazil_lacerda_guanabara_recon.7.t: "Megalopolis"
brazil_lacerda_guanabara_recon.7.desc: "Doxiadis could scarcely keep himself from bursting over the desk and strangling the puny little figure who was tossing out his life's work, balance sheet by balance sheet. Maybe give the Catete another dead President to haunt its musty old ballrooms. Well, while they were together, he could at least make his final case.\n\n"I hope you recognize our trajectory toward ecumenopolis is non-negotiable. The industrareas I propose are pivotal conduits that will free Rio's metabolic processes. Your Heimatkunde is of places like Fortaleza, so it might not dawn on you the salience of ensuring the Brazilian Southeast emerges as a thriving megalopolis."\n\nTávora looked up. Right at him. Through his thin metal glasses. The Greek Technician suddenly didn't feel so clever.\n\nA secretary downstairs looked up from her magazine as a chill ran down her spine, the guards at the empty project sites along Copacabana felt the Atlantic wind drop a few degrees, and even Lota, semi-delirious on her velvet couch as she chugged her Château Margaux alone, buried herself in her bathrobe to escape the chill creeping in. Wait, through the wine fumes, Lota could faintly hear the tiny voice of a tiny man say five simple English words. With how hard he pronounced his t's, he must've been a Northeasterner.\n\n"Get out of my country."\n\nThe air hostess placed Varig's signature lobster thermidor before him, and Doxiadis looked out the window; Rio left unfinished, still echoing the shouting of remnant labor strikers, even as the city shrank away. Underneath the 727's rumble, he could hear the faint sobbing of one Elizabeth Bishop, slumped in cashmere a few rows ahead of him. He knew better not to greet or regard her."
brazil_lacerda_guanabara_recon.7.a: ""Back to America for both of us, it seems.""

brazil_lacerda_guanabara_recon.8.t: "Muddy Eyes"
brazil_lacerda_guanabara_recon.8.desc: "The tractors had done their work.\n\nMud ruled the land, a sea of brown stretching out across the hills, interrupted only by the haphazard waste piles of scrap metal and broken brick that peppered their sides. Detritus of what once was, open-air graves for the shacks that had clung together with the tractors that dug them still parked by their side. It was warm, humid even, the day's heavy rain finally receding into an uncomfortable warmth.\n\nThe day was fast departing, a nearby highway being the only remaining witness to that part of the cleansed land, cars driving by on their daily commutes with drivers barely noticing the sudden change in their environment. Perhaps they noted the absence of eyesores, or the bulldozers and trucks that caused such traffic chaos during the day. Did they notice the relocated families? The broken homes? The loss of agency?\n\nDid they even care at all?\n\nNear the entrance to the site, half buried in the muck, was a rabbit. A stuffed rabbit toy, white fur spoiled by mud and rain, lying abandoned beside the tracks of trucks that had carried away the people who once called this place home. It bore the marks of wear, stitched repairs and a missing ear visible above the pooled brown. A single black, plastic eye remained elevated above the dirt, staring blankly at the empty site. Nothing moved.\n\nThe waning sun faded. The night was opaque. Only when dawn broke did light return to cast the shadows aside. The rabbit kept staring. Workmen slumberly meandered into the worksite as instructions being given, tools handed out and engines rumbled to life.\n\nThe rabbit kept staring."
brazil_lacerda_guanabara_recon.8.a: "Another successful slum removal."

brazil_lacerda_guanabara_recon.9.t: "King of Kings"
brazil_lacerda_guanabara_recon.9.desc: "Doxiadis and Lota looked at their creation. The complex and port were complete, after many setbacks and struggles. It may have just started, but the land was already changing around its new inhabitant, the trees cut down, and the water murkier. Workers began their shifts; it was a small group, but more would be coming as people began to move to the area. There were already talks of some companies working there, tempted by the new workforce.\n\nDoxiadis was rambling, something about how the new complex would change the morphology, which was clear with the new tourist port and international airport. Lota nodded out of courtesy, but she wasn't paying attention to him. She was looking at what she made. A magnificent land for the modern age, one that would bring innovation and future to Brazil. One that changed the land itself, into an industrial powerhouse. It was her legacy. It was a part of her that she had put on earth."
brazil_lacerda_guanabara_recon.9.a: "Look on my works, ye Mighty, and despair!"

brazil_lacerda_guanabara_recon.10.t: "Poly and Ticks"
brazil_lacerda_guanabara_recon.10.desc: "From the seat of the limousine, Doxiadis could see naked steel beams rising above a concrete foundation. He saw the familiar sight of staff trailers, cement mixers, piles of lumber and rebar. Orange traffic cones and yellow-striped caution tape lined the area around it.; As much as Doxiadis knew these were meant for the construction site before him, they had a dual purpose for the affairs unfolding in real time.\n\nCarlos Lacerda's face took up the marque among the picket signs in the crowd, highlighted by a red circle with a slash through it. Second to that was a similar profile featuring a crossed-out Raphael Magalhães, thirded by the ones that read with the admittedly catchy "UnDo-Nacional" slogan. The protestors were by no means slow in organizing their vocal displeasure with the Lacerda-Doxiadis Plan, little wonder they chose a construction site where a recently demolished favela used to be.\n\nSlower was Lacerda himself in keeping his promise in a timely manner, enough to stave off the political witch hunt in response to the slum clearings. Local opposition in Rio was screeching in the press that sites like this one were a keen example of the inefficiency and incompetence on display. The picketers raised their fists to the sky, joining in a chant to vote the UDN out in the upcoming election. Doxiadis knew it would take a great deal for his reputation to recover from this. Even if UDN got re-elected, the government's trust in him was gravely damaged.\n\nDoxiadis felt his heart skip a beat as the signs rose upwards in tandem with the crowd as he spied another sign, this emblazoned with a more immediately targeted attack at the establishment: 'Doxliouco' written in stark black letter on white. Doxiadis instinctually leaned forward to tap his driver on the shoulder, who promptly sped away before the protest could catch wind of the city planner panicking in the backseat."
brazil_lacerda_guanabara_recon.10.a: "Work faster, Carlos. It isn't just your hide on the line here."

brazil_lacerda_guanabara_recon.11.t: "The Elephant Beneath the Tower"
brazil_lacerda_guanabara_recon.11.desc: "The ribbon was cut with magnanimous flair, the oversized shears in Raphael Magalhães' hand doing little to take away from the majesty of the event. The freshly constructed suburban division was almost American in its idyllic charm.; The greenest grass, picturesque family homes worthy of Eisenhower's era, all beneath bright blue sky in a warm Brazilian summer. Press cameras crackled like gunfire and a chorus of cheers arose as the president's heir held the shears to the sky, a beaming smile on his face.\n\nThe best and brightest of Lacerda's administration responsible for this achievement flanked him at either side.; Lacerda himself was there, Goulart was there, so was Soares and Doxiadis. The team of technicians that worked with the latter two stood alongside them, as did the team of construction workers who built the neighborhood with their own hands. All would have praised heaved on them throughout the day, honorifics well deserved for all parties involved.\n\nSomething that was also present was less welcome. As Magalhães made the rounds of shaking hands and kissing babies alongside Lacerda, an inescapable sight could be scouted just ahead of the gathered crowd, past the guard rail on the road leading to the hilltop enclave.: Even amidst the tranquil setting of the new suburb, one could not fail to notice the ever present sight of the favela below.\n\nIt was not by any means a mirror of the favela demolished to make way for the new neighborhood around them, all fevelas were unique in their own pestilential way. But that uniquely rustic painting always bore the same elements.; The same rickety, uroboros-like shanty towns, the same chronic squalor and lack of hygiene. But most of all, as always, the same specter of newer shacks being erected in the far distance, spreading further across the otherwise pristine cityscape like a disease."
brazil_lacerda_guanabara_recon.11.a: "It'll be fine. Magalhães hid his frustration and disgust behind his smile. Just... don't look down."

brazil_lacerda_guanabara_recon.12.t: "Nightmare on the January River"
brazil_lacerda_guanabara_recon.12.desc: "It took several tries before Lota de Macedo Soares could hear the voice: "Hello, Elizabeth Bishop speaking."\n\n"Elizabeth..." Lota's voice was hoarse from weeping, her lungs ached. "Guanabara..."\n\n"I know." Elizabeth was calm as ever.\n\n"What am I going to do, Elizabeth?" The newspaper image had seared into her soul; a towering inferno where her life's used to be.\n\n"You need to leave." Elizabeth sounded cold. "Doxiadis and the others have done the same."\n\nLota was stunned: "What? When? Already? Wh-"\n\n"Lota." Elizabeth was curt. "This is not going to go away, lawyers can only be drawing up cases as we speak.\n\nLota's hand tightened around the phone in her hand.\n\n"You need to leave the country." Elizabeth added.\n\n"I don't care what the lawyers do, or about Doxiadis and the others." Lota felt desperate. "Let me come with you."\n\nClick.\n\n"Elizabeth?" Lota's voice was heard by no one but her.\n\nShe re-dialed, a lump forming in her throat.\n\nNo response, the dial tone was all that remained, white noise echoing between her ears."
brazil_lacerda_guanabara_recon.12.a: "Calling... Calling... Still calling... Still calling..."

brazil_lacerda_guanabara_recon.13.t: "Hopes Dashed"
brazil_lacerda_guanabara_recon.13.desc: "The complex wasn't going to be completed. Doxiadis knew it the second he saw the election results. It was too scary for the investors, apparently, and they pulled out a couple of days later.\n\nHe was thinking about where to go next as he was getting ready to leave his apartment at Copacabana. Mexico might want some of his ideas, they've been building a lot recently. Japan is always cooking something up. When he left, he stopped thinking about where to go. He looked at Rio, a city full of potential, a city that was a perfect canvas for him, a city he felt he was born to work on. Now he had to leave it in the dust, where it would rot and erode.\n\nLota returned to her home in Ouro Preto. It was more or less abandoned while she was working, and it showed. The plants were overgrown, someone graffitied some vulgarities on the wall, and a window was broken. No one, except maybe some stray cats and animals, was staying there. At least she wasn't in Rio.\n\nLota sat in the living room. She couldn't work in Brazil anymore; she was an embarrassment to Brazil and the architectural community worldwide. Doxiadis probably has something new to work on already. She looked at the phone sitting on the side table next to her. She had two people who might help her, but they were longshots. She dialed Elizabeth's number. It rang once, then twice, then thrice, and a few more times until Lota gave up. Next was Mary. Still nothing. She put the phone back on the receiver, and tried to calm herself."
brazil_lacerda_guanabara_recon.13.a: "It didn't work."

brazil_lacerda_guanabara_recon.14.t: "A Most Noble Builder"
brazil_lacerda_guanabara_recon.14.desc: ""Yes Mr. President, I saw your Federation's proposal. I have it on my desk right now. Fascinating, I also saw those charming people you organised to stand outside my house shouting all last night. And my worksites today. Oh, that wasn't you? Is that so?"\n\nConstantinos leant on his desk, worn elbows feeling like they were digging into the wood. He had no idea how the Federation of Favela Associations of the State of Guanabara - a mouthful of an organization as he had ever heard - had gotten a hold of his office's phone number; Whoever had passed it to them now was now a sworn enemy.\n\nDespite exasperation creeping ever into his voice, he wasn't lying. Before him a folder was cast open with plans and documentation regarding his plans for the favelas. Urbanisation proposals, renewal ideas avoiding or minimising permanent relocations. An out of date plan, large parts dedicated to sites already cleared, but nonetheless charming. Interesting even. Not more than that however.\n\n"Yes, I know your organisation has the best intere... Well so do... How about I meet you halfway. Praia Pinto and Maria Angu are the next clearance sites. Let me examine these... suggestions more and we can talk further. Yes, my utmost consideration. Tomorrow? Possibly. Goodbye."\n\nDoxiadis nearly threw the phone down. How long had that president pestered him? Looking at the clock he couldn't be certain. He stood up, crossing the room to look outside. His window offered a view of the city, bustling with cars and people dashing everywhere and nowhere. He pondered. How does this happen? How are cities and populations revitalised? From where comes prosperity? He knew his answer of course, it was the core of his plan after all. Ekistics, and that, at its core, was Change. Sometimes it wasn't pleasant, or easy, but therein was success. He smiled at the nobility of the sentiment before returning to the phone."
brazil_lacerda_guanabara_recon.14.a: ""Ágata dear, about the number that just called. Can you speak to the building's operator, and block it from calling again? Thank you so much.""

BRA_guanabara_dismantle_megaproject_tooltip: "The reconstruction of Guanabara has been §Gsuccessfully completed§! - the project will now end."
BRA_guanabara_cancel_megaproject_tooltip: "The reconstruction of Guanabara has been §Rcanceled§!."

brazil_lacerda_imp.1.t: "Broadcast from Brasília"
brazil_lacerda_imp.1.desc: ""My fellow citizens. I come before you today with the gravest of news about our great nation."\n\nThe President of Brazil, Carlos Lacerda, was sitting at his desk, a forest of microphones in front of him, with several TV cameras and bright lights pointed at him. He was wearing a black suit, his face as stern as he could muster.\n\n"It was come to the attention of the government that the ongoing general strikes and recent elections have been subverted by foreign powers, namely that of the Greater German Reich." He spat out the name, giving it the disdain it deserved. "Agents of that vile fascist regime have undermined our nation's stability, crippling our economy, and casting doubt on the validity of our democratic institutions, all for the end goal of overthrowing our nation and turning us into puppets of that vile, evil regime.\n\n"To this end, I am hereby declaring that Brazil is under a state of siege. All actions that can and must be taken to save our Republic, save our young democracy, will be undertaken. However, I promise that these measures, while severe, will be temporary. Until our nation is free from the threats of tyranny and destruction, I shall not rest. I will strive with every effort, every strength I have, to save Brazil from ruin."\n\nBut as the lights flicked off one by one, Lacerda was uneasy. The speech went well, he was sure. It was short and to the point. However, it was but words, words, words. The actions that came next were much more important. Many dangers lay before him, and he knew that they would have been actions his younger self would blanch at. But, it was necessary. To save Brazil."
brazil_lacerda_imp.1.a: "The evil that men do lives after them. The good is oft interred with their bones."

brazil_lacerda_imp.2.t: "Practice Makes Perfect"
brazil_lacerda_imp.2.desc: "The office was frigid. Men sat silently, none saying a word as they waited with only the dull whirring of the ceiling fan penetrating the silence. Behind the office's large desk, a suited man toyed with his cufflinks absently while across from him uniformed men sat nearly frozen and straight. They waited, and soon the harsh swinging of the door informed them their reason had arrived.\n\n"Pull those men away from that airport Golbery, Esther just told me what's happening there." Lacerda's striking figure bursting in through the door, pointing an accusatory finger at the assembled men. They turned to him, and nodded in greeting.\n\nThe Minister of War spoke first as Lacerda closed the gap to the desk. "It seemed necessary to drill the men in proximity to infrastructure. It was properly cleared." The uniformed men nodded, earning a scoff from Lacerda.\n\n"A competency test, that was what was called for, something to improve the military you all owe your jobs to. Now the press is talking about disruption in São Paulo and I'll have to nod and pretend it's all going to plan because you," he pointed at the men sitting beside him, "want a shot across the bow."\n\nGolbery leaned back. "The Army -"\n\n"The Army's competency was questioned," interjected one of the uniformed men, "so we displayed our competency. We can show more if you would like." The words were dripping.\n\nLacerda stood and considered. He'd known the outcome of this meeting from the moment his secretary had informed him of the exercise - he couldn't win, even if he'd no desire to meekly accept. However, he'd pushed too far. He concealed a sigh."
brazil_lacerda_imp.2.a: ""No General, I think we can see eye to eye on the matter.""

brazil_lacerda_imp.3.t: "Henry"
brazil_lacerda_imp.3.desc: "The last seat had been called, yet another victory for the UDN. With a content sigh, Carlos Lacerda looked over the colored poster representing the new seats after the Senate elections. Two crescent moons dominated by dark blue, with other colors sprinkled throughout. The election was only a formality; Lacerda already knew his allies would ensure a UDN majority by a large margin. Regardless, the President couldn't have been more pleased.\n\nEsther announced the arrival of Raphael Magalhães, and Lacerda greeted his second-in-command with open arms. "Raphael!" Lacerda announced, clapping Magalhães on the back. "A new era has come for Brazil, one where we can sweep aside the populist posturing of Vargas." Magalhães smiled and nodded politely. "It's a rebirth, a time for Brazil to cast away the shackles of our past."\n\n"Carlos..." Magalhães began, pulling away from the embrace. "I understand the desire to free ourselves from Vargas... but I fear what we've done may be a step too far." He took a seat in front of Lacerda's desk. "This may only embolden the radicals."\n\nBefore he could continue, he found a glass of red wine set before him. "Then let them talk. They don't have the power for anything else!" Lacerda raised his glass. "A toast, Raphael! For the future!" Uneasily, Magalhães raised his as well. "Once more into the breach, dear friends, once more...""
brazil_lacerda_imp.3.a: ""...Or close the wall up with our Brazilian dead.""

brazil_lacerda_imp.4.t: "Casa Blanca"
brazil_lacerda_imp.4.desc: "Raphael Magalhães could feel the coming of Christmas in the air, warm days marked with renewed religious devotion. Magalhães looked right for a moment, then turned his gaze leftwards, stomach gripped with a sense of dread. Unrest had been rampant since Lacerda staged his coup, and he feared the consequences of remaining in public for so long. For a brief moment, Magalhães tried to dwell on other topics, attempting to conjure up memories of jokes from the cinema already forgotten.\n\nTwo cars interrupted that. They drove too carefully, slowed down too intentionally for it to be written off. Maghaelas walked forwards, hoping to speed past the protests of the radicals he expected, but was forced into turning around as a pair of young revolutionaries, communist militants proudly wearing a militant's uniform, burst out. Rendered mute and immobile by the shock, he could only watch as they brought out their guns, shouted praise for João Amazonas, and fired their bullets.\n\nThe echo of the gunshots gave way to ringing in his ears, leaving him deaf to anything but the clamour of nearby footsteps. His mistress fell to his right, her head blown open by the first and falling onto his shoulder. With searing and crushing pain crashing down across his body, Magalhães only choked inaudibly as the bodyguards fired their bullets, too late to provide any real impact. As tunnel vision blurred into total oblivion, he watched the car drive away, his last seconds of life faded into scratches on a car's chassis.\n\nElsewhere, Carlos Lacerda was struggling. For every document he had read through, five more emerged. For every bill he helped to draft through the Senate, notes from the military came demanding five more amendments. Just as he turned to a glass of water, a phone call came in from Guanabara, coming with a voice he didn't know, and notifying him of the news; that Raphael Magalhães, close friend and Governor, had been assassinated alongside his mistress."
brazil_lacerda_imp.4.a: "Collapsing into his chair, Lacerda cared not for the water spilt by his shattered glass."

brazil_lacerda_imp.5.t: "Rotting in the Gutter"
brazil_lacerda_imp.5.desc: "General Médici had ceased his habitual busywork for this momentous occasion of the favelas' capitulation. Outside the soulless office blocks, the midday sun has risen bright, anticipating the many grim fates the rioters will face. The brave agitators, led by the illustrious Carlos Marighella, now scuttled back into the sewers like the rat he is, had dispersed into disorganized bands of roving men and women. The usually insidious Sérgio Fleury barely flinched at this joyous news, yet his ruddy face could scarcely hide his excitement.\n\n"The popular front is only as effective as the populace." The long-faced general murmured in mockery as he let the giddy Fleury pronounce his meticulously gathered report. "Marighella didn't escape far, found the scum in a lowbrow restaurant in Liberdade, seems as good as dead. He had gone through rough times after abandoning his little coterie and probably hasn't any fight left." As Médici swiftly sent off his secretary, who'd come in with another fresh stack of papers, the smiling brute spoke again. "Just a matter of time before the Reds can hang with red dripping down their damned faces."\n\nWhat in return replied was but a gaze — one of simultaneous calm and disapproval. Fleury looked across the room, the clock, the table, and everything. They had not moved an inch. A good trooper can hide whatever they have in mind. Perhaps Médici was planning on making him a pioneer in the matter — or maybe the general was equally overjoyed as he was. None such thoughts mattered as a second stack of files piled atop the towering first — Médici dismissed the saluting secretary soon after. But the ever-paranoid butcher thought he'd caught on a few familiar words as the doors slammed shut in awkward silence again."
brazil_lacerda_imp.5.a: "The rat is dead."

brazil_lacerda_imp.6.t: "The Spark"
brazil_lacerda_imp.6.desc: "The workers of the Gasômetro de São Cristóvão heard the broadcast over loudhailers mounted onto helicopters: "We have reports of a terrorist threat. A military operation is in progress. All staff are ordered to make their way to the southern warehouse immediately. Refusal to obey this order will be treated as intrusion." Bewildered, they followed its order as soldiers rappelled down the choppers and corralled them.\n\nJavier scanned the room. Herds of workers, penned in by black-clad soldiers. The union hadn't told him anything about this; some new trick to fish out reps like him? Odd; Javier counted thirty soldiers, and twenty of them were here; ten wasn't enough to sweep the gasometer for a bomb. When a frustrated scuffle on the other side of the herd broke out and the guards' attention was diverted, Javier slid into the shadows and out through a window. Outside, the night air was cold and still; Javier crouched low, drew up the collar on his jumpsuit. Just a few minutes, he told himself. Look around, get back before they do another roll call.\n\nHe followed the pipes to the main gas holder, where he saw a helicopter's lights illuminating soldiers at work. He crept in closer; without any binoculars, he strained his eyes to make out what the distant figures were doing. They were blobs in the distance, unfocused caricatures, and yet-\n\nSomething loud and sharp echoed across the gasometer. Javier stumbled, clutched at a bullet wound in his side. He turned to the source of his pain. One of the masked men, a beret adorning his head, held a smoking pistol. There was a squawk on his radio. Javier's vision started to fade as the officer picked up his radio.\n\n"Control, be advised. I've located the terrorist." Javier gasped for air, struggling to stay even on his knees. The officer turned off his radio, raised his pistol and put another bullet in Javier's chest."
brazil_lacerda_imp.6.a: "The soldiers mounted explosives on the gasometer."

brazil_lacerda_imp.7.t: "The Fire"
brazil_lacerda_imp.7.desc: "It began with a bright flash of light, and a great yawning from hell. The people of Rio de Janeiro turned to its source: a large fireball in the near distance, a night sun proudly rising over the horizon. At first, they thought that it was The Bomb, that Argentina finally dropped it. As the fires rose and arced over the city, they realised this was something else. The flames fell upon the city, soon becoming the only illumination in Rio. The lights started to go out, one by one: first in the favelas, then metastasising outwards. Soon, only infernal light lit up the sky.\n\nAs the sounds of hell faded, whirring rotors like insects' wings echoed across the city. They passed by overhead, flitting above the terrified and the blind. They cried out for salvation, for answers, but their prayers went unheard. The helicopters were all heading towards the favelas, soon lit up by their searchlights. A bleary-eyed family stepped out from their home into the light. An old man winced as he raised a wrinkled hand to shield himself from its brilliance. Impromptu medics and abandoned clinicians brought out the wounded, hoping for stretchers and supplies. For a moment, they thought it was the light of God.\n\nA hundred demons flew out from the shadows. Those unfortunate enough to step into the spotlight are suddenly seized by soldiers in dark gear. Some are merely beaten back into their homes. Others are dragged back into the darkness. A select few are shot as soon as the light is turned on them. Their bodies are left in the streets and passageways: warnings to the brave, cautionary tales to the foolhardy, messages to the world they reviled.\n\nAs soldiers descended upon the favelas of Rio, the inhabitants of its darkest corners knew and feared what it meant. It was the desperate seizure of control by a flailing tyrant. It was payback for years of frustration, deviance and insurrection. It was suppression. It was revenge."
brazil_lacerda_imp.7.a: "It was PARA-SAR."

brazil_lacerda_imp.8.t: "Fall From Grace"
brazil_lacerda_imp.8.desc: "The rich could have just sailed away; put the fires behind them, go away for a weekend, come back when the bodies have been pulled out of the nicer streets. Yet half of the ships in this marina remained in port, and the desperate crowds that gathered around its edges took their absence as a sign that they could use them to escape the helicopters that still flew overhead.\n\nThree families took command of one of these yachts. Among them was a former fisherman, and had enough knowledge of sails and engines to act as skipper for this voyage. They fled from the marina, leaving behind more people than they cared to consider. Most of the women, some of the men and all of the children went downstairs, while the impromptu crew took a crash course in sailing. Behind them, the hills were lit by columns of fire and smoke. Helicopters buzzed around the plague-ridden corpse of Rio. Christ the Redeemer was blinded by the smoke.\n\n"We'll go east," said the impromptu captain, trying to swat at an invisible fly. "Find somewhere to dock at Cabo Frio. Stay the night." He watched the black seas from the cockpit, hoping not to see another ship or spotlight. Nobody noticed them. When at last Rio was just before the horizon, the captain snuck onto the deck for a cigarette. He lit one up, saw the smoke disappear in the night sky. He saw the moon hidden by the clouds, and heard that interminable buzzing sound from some figure in the sky that marked the clouds above.\n\nHe blinked. The fly was falling, growing. No, something fell from it—and then he yelped, jumped out of the way. A corpse landed on the deck, an ignoble splat crushing bone and ejecting bodily fluids. Above, a helicopter which either took no notice or care of the yacht flew away. Beneath the cover of the black night sky, there were others, dropping their own cargo. The captain saw his crew gesturing and screaming, and he looked overboard to see what had aroused their fear."
brazil_lacerda_imp.8.a: "The seas were dotted with corpses thrown from the sky: face down, floating, bobbing with the waves."

brazil_lacerda_imp.9.t: "A Tarnished Prize"
brazil_lacerda_imp.9.desc: "The Congress hall was always a cacophony, but today it was even more so.\n\nThe new members of the UDN were being sworn in today, the finale of a scripted election. Most of the new faces were UDN candidates who "won" a convincing enough plurality of the votes that the masses would swallow it. A few of the more senior UDN members with established followings won their own districts, and they watched on as the new members were sworn in. The ceremony kept getting disrupted by the shouting, as the opposition members who were allowed to win took every moment to swipe at the UDN.\n\n"Lacerda is an army puppet!" "Your elections were fake!" "You could have never won on your own." "You spit on our democracy."\n\nThe UDN members tried to counter the shouts with volume, but without any sense of order or unified message, it all became a jumble of ill-formed accusations and meek defenses. Half of the UDN didn't even bother saying anything, they either resigned themselves that the election was faked and elected not to make any noise about it, or simply didn't care enough to show their claws. All that left the opposition shouts to sound clear as a bell, as the UDN devolved into the generalized noise of a cat walking across a piano.\n\nLacerda looked onto the proceedings with dread. On paper, he had control of the Congress. That was what he wanted, and this was the result. He had wanted a unified party that could save Brazil from the scourge of communism. Instead, he had half of his party uninterested, the other half uncoordinated. He didn't have a party, he had a herd of housecats."
brazil_lacerda_imp.9.a: "Victory tastes like defeat"

brazil_lacerda_imp.10.t: "Foundations"
brazil_lacerda_imp.10.desc: "His work complete for the day, Lacerda looked out over the capital, baking in the early afternoon sun, and decided that today, he needed to look toward the future, not merely occupy himself with the business of the present. The energy of today felt foundational, and so he looked to make a foundational move. He turned from the city to face his secretary.\n\n"Esther, I'll need you to type up the following for distribution to all UDN leadership cadres in the National Congress. First and foremost, we must utilize our mandate to promulgate a new Constitution, with the ultimate goal being the establishment of a new and vibrant Fifth Republic of Brazil. We shall ensure that the new country we build will be capable of building the institutions and foundations for a robust and functional state by clearly enumerating the powers of the President, the Congress, and the courts. We must ensure that we have explicit language within the Constitution that socialism, Varguism, communism, and anarchism are anathema to Brazilian republicanism and unconstitutional as a result. Also add..."\n\nLacerda would dictate the basics of what the constitution needed to possess and other instructions for the UDN as Esther clacked away on the typewriter's keys. Every so often he'd take a swig of water, chew on his lip, take a few paces, then turn and tell Esther the next thing to type up. Dutifully, the secretary pecked away at her keyboard, bringing Lacerda's words to life.\n\nAt the declaration of 'finished,' Esther gracefully took the paper from the typewriter and handed it to Lacerda. He read his own words back to himself silently, pleased that he was able to concoct what was needed from him to establish a new Constitution. Lacerda sat at his desk, signed the order, and told Esther to find someone to run it over to the National Congress. Pleased, Lacerda took a swig from his flask, felt the wonderful burn of a new Brazilian sun, and envisioned what the new Fifth Republic would be."
brazil_lacerda_imp.10.a: "A new dawn."

brazil_lacerda_imp.11.t: "A Constant Refrain"
brazil_lacerda_imp.11.desc: "Ney Braga looked over the new draft articles and felt a migraine coming on. He instinctively reached to shut off the office lamp and pondered what he just read in his office, trying to beat the throbbing in his head.\n\nBanning any and all labor unions? What was Lacerda trying to do, hand Amazonas every single worker on a silver platter? He could only do better to radicalize the population against him if he had ordered factory bosses to gun down workers if they were late to their shifts. And what was this jumbled world salad "constitutional guarantees for property protection?" Did that mean that a landowner could cut off someone's foot if they stepped over a property line? That they could fire tenant farmers, then immediately have them thrown in jail for trespassing?\n\nBraga felt the twin engines of anger and disappointment rise in him, feeding his migraine like a hungry furnace. Was Lacerda so angry at Vargas's legacy that he was trying to spite it to satisfy himself? Was he doubling down to avoid admitting that he might have made a mistake? Capitalism didn't need bloody-handed champions like this, and the opposition now had the perfect excuse to unify and paper over their differences, all because of Lacerda's latest excess.\n\nIn the dim light through his curtains, Braga saw the outline of his office crucifix. He stood up, crossed himself, and knelt."
brazil_lacerda_imp.11.a: ""O Lord, bless the capital and rain brains down upon it.""

brazil_lacerda_imp.12.t: "Imperfect Victory"
brazil_lacerda_imp.12.desc: ""With the final votes being tallied, it appears that the proposed Constitution for the Fifth Republic has passed. Approximately 75% of Congressional members voted in favor of the proposed constitution, with the overwhelming majority of votes coming from freshman UDN members and members who have long associated with President Lacerda. The President is no doubt elated to hear the results."\n\nCarlos Lacerda was nowhere close to elated as he turned the television off. Only 75% of the members? He had hoped for closer to 85%. Many of the established UDN members who hadn't relied upon him had been ambivalent about the new constitution. They hadn't rejected the need for a new constitution, but had asked for multiple rounds of revision. In chambers, when they had called for segments to be put into committee to solicit input, they had received wild applause from the opposition. That had stuck with Lacerda, to have members of his party so openly seeking the approval of the opposition. They had joined with the Christian Democrats to prove to be a sizable enough bloc that they believed that they could extract concessions from him. He did not have their loyalty, and that would be a problem going forward.\n\n"Oh, sorry, sir." Esther had tripped over her own feet trying to bring him a plain manila folder. "From Golbery, sir." The president nodded. If Golbery had sent him a report, it was probably urgent, and he needed something to cleanse his palate from the show of disloyalty from the moderate camp. Esther handed the folder to him and walked back to her desk.\n\nThe report was typed, with the headline in all capital letters. GENERAL STRIKE IMMINENT. As Lacerda read the report, his expression darkened. Golbery had detailed that workers had hoped to paralyze Brazil, to destroy the economy if the Constitution went through. They had the will and the means to organize, and they intended to do so with ferocious vigor. If the disloyalty of the UDN was a body blow, something that could rattle Lacerda, this was a punch to the head, which could render him insensate."
brazil_lacerda_imp.12.a: "Lacerda slumped in his chair, gulping as he envisioned the trials to come."

brazil_lacerda_imp.13.t: "When It Rains, It Pours"
brazil_lacerda_imp.13.desc: "Across the country, lines formed outside stores, even as the doors were shuttered. The pickets were set and the crowds were filled with signs. Pictures of Lacerda in a German uniform, pictures of Lacerda stabbing a woman dressed in the Brazilian flag. The crowd chanted out slogans against Lacerda, against the UDN, and that the people needed to stand up and take their country back. Police officers, outnumbered though not outgunned, kept a hefty distance, partially out of compliance with their own regulations, and partially out of fear.\n\nThe fire burned in the halls of the Congress as well. The opposition was united in demanding the rescinding of the new Fifth Republic Constitution. To Lacerda's eternal consternation, even a pair of UDN members had crossed the aisle to support the opposition's new proposal demanding that the President not certify the Constitution. Over eighty other members of the party had demanded moderation, that Lacerda should restrain his excesses and pursue a moderate path. In chamber, his own party called him a dangerous paranoid, and that he was going to deliver the nation into the hands of the communists. Lacerda couldn't imagine the disrespect and insubordination that the party had in their heads if they were making all of these statements on the official record.\n\n"If I might address the illustrious chamber, I have an intelligence report of significant concern," a deputy stood up, before the speaker yielded the floor. He cleared his throat and began. "As of yesterday, João Amazonas and Carlos Marighella have declared a 'full and total people's war against Carlos Lacerda and the Brasília government.' The report has stated that communist guerrillas have already been spotted in outlying jungles and rural regions, and that they have clear and credible intelligence that attacks against military facilities are imminent."\n\nThe country paralyzed, the people in uproar, and now, the news that the country itself was about to erupt in violence."
brazil_lacerda_imp.13.a: "First silence as the news sinks in, and then the floodgates open."

brazil_lacerda_imp.14.t: "Doors, and Where They Hit When They Close"
brazil_lacerda_imp.14.desc: "Lacerda threw the latest report on the ground. Civil servants were joining the strikers in sympathy. The bureaucrats who depended on the federal largesse were standing against them, to support people who would happily have them shot in any other circumstance. What was he to do when his people steadfastly refused to do anything remotely rational?\n\nHe angrily rubbed his fingers together, got up from his desk, paced around it, then rubbed his fingers again. He grabbed a sheet of paper and an ink pen. His first attempt to write had him tear through the paper, Lacerda balled the torn sheet and threw in the trash hard enough that his follow through caused him to bang his hand on the desk. Cursing yet another indignity, he grabbed another sheet and began to write again.\n\n"Let it be hereby known by order of the President of the Republic of Brazil. Any employee of the Brazilian federal government or employed by any estado government is hereby prohibited from participating in any type of unauthorized labor strike, an illegal meeting, or joining an organization that participates in any of these actions. Failure to comply with this order will result in the termination of employment with cause."\n\nLacerda stormed out of his office, paper in hand and the ink still wet on his signature. Esther looked up from her desk, surprised to see the President in such a mood. Gripping the paper so hard it started to crease, he shoved it in Esther's face. With the professional bearing of a veteran soldier, Esther kept her expression firm as he shouted. "Implement it! Now!""
brazil_lacerda_imp.14.a: ""Right away, sir.""

brazil_lacerda_imp.15.t: "The Long Arm of Another Man's Law"
brazil_lacerda_imp.15.desc: "Four men sat in an office in the Planalto, behind shuttered windows and a closed door. Pale light slithered through the gaps in the blind, the afternoon sun casting a narrow, slotted spotlight on the machinations this room would witness. Magalhães was there, as was Golbery and Ambassador Gordon, as was Carlos Lacerda. Fine liquor mingled with the scent of cigars as the scheme was hatched.\n\n"J. Edger Hoover has asked to deliver a message." The Ambassador began. "The Office of the President of Brazil can readily rely on the assistance of the Federal Bureau of Investigation to aid his government in isolating and targeting far-left agitators on the ground, for the safety and security of their country as well as their own." They did not need to be told what that implied; union blackmail, strike-breaking, anything the FBI could get their hands on that kept the UDN and Lacerda's hands clean.\n\nGolbery was practically giddy, nodding vigorously. "The PTB are dead in the water after this, with the PCB not far behind; SAUDE!" Golbery did not wait to clink glasses and greedily down the drink in his hand, not that anyone blamed him. They all downed their glasses all the same; good brandy, a vintage year, soothing to the taste.\n\nMagalhães was more subdued, downing the glass with practiced etiquette. His expression told more, staring into the bottom of his glass, saying very little. Lacerda did find him to be a worrier at times. He has an idea of what he wanted to say, thus a raised eyebrow as the President refilled his glass was all the prompting he needed.\n\n"This is not going to go over as well as we want it to." Magalhães adjusted his tie. "Containing social radials is all well and good, but the party is already getting agitated and this might just put them over the edge. Can we really risk that at this juncture?" Lacerda rubbed upper lip with his index finger, not able to discern if his colleague was being wise or over-complicating things; Any tool against the far-left is welcome, but was this inviting an uproar within the UDN?"
brazil_lacerda_imp.15.a: ""We'll send a bottle of our finest alcohol to Mr. Hoover with our best wishes..."
brazil_lacerda_imp.15.b: "...to take the sting out of our polite refusal of his offer.""

brazil_lacerda_imp.16.t: "Another Man's Law, Another Man's Justice"
brazil_lacerda_imp.16.desc: ""Affidavit from American Ambassador, STOP." Carlos Lacerda read aloud.\n\n"An arrangement from the office of the Central Intelligence Agency, STOP." Lacerda raised an eyebrow, feigning a lack of foreknowledge.\n\n"CIA to aid Brazil in containing domestic threats, STOP." Now both eyebrows were up.\n\n"Framed for public consumption as Anti-German Counterintelligence, STOP." As Lacerda placed the telegram down, he knew already that Gordon himself had no qualms in backing the proposal; the CIA's reputation was as lauded as it was infamous, for they were just as ruthless and conniving as any member of the Abwehr or the Kempeitai. That said, the sheer potential of having them at Brazil's beck and call to counter the influence of communist agitators...\n\nGolbery was less enthused; "If the FBI is akin to a blunt instrument, the CIA is sharp like a knife, alternatively wielded by a surgeon or a butcher depending on the occupant in the White House." He glowered. "I am sure Médici can be brought on board, but are we to trust the Yanquis to show restraint when ordered? The FBI may be heavy handed, but they at least have limitat-"\n\n"NAO!" The men in the room almost jumped as Magalhães slammed his fist into his desk. "This is UNACCEPTABLE!" Magalhães wringing his hand shakily as he composed himself, turning to Lacerda with a look on his face halfway between terror and rage: "Pardon my impudence, President, but this cannot stand. This isn't sending a goon squad to wave a stick at unruly university students, this is the unraveling of the fabric of our country; Letting the Yanquis run roughshod over our own people would hand Luís Prestes a revolution on a silver platter. Please, sir, tell Gordon to back down.""
brazil_lacerda_imp.16.a: "A sigh from Lacerda: "Very well, the CIA will remain stateside.""
brazil_lacerda_imp.16.b: ""Calm yourself, Raphael." Lacerda grinned. "Washington has our best interests at heart!""

brazil_lacerda_imp.17.t: "Direct Control"
brazil_lacerda_imp.17.desc: "Golbery do Couto e Silva quietly left his office, glancing from end-to-end the scantly occupied halls of the Departamento de Ordem Política e Social. With a sigh, he tucked a sleeve of papers underneath his left arm before continuing down the leftmost hall. New orders had arrived with little time to spare in their execution. He couldn't help but let out a disquieted murmur at this, his worries mounting in the recesses of his mind. Such was the nature of the present, he thought.\n\nHe had been coordinating collaborative operations between DOPS and the SNI by order of Lacerda, yet the President's newest directive would see permanent lines of communication established between both agencies to the Planalto. Lacerda was calling the shots from now on, at least officially. There was a bitter irony in how little this affected the power structure—he had already been calling the shots for some time now.\n\nGolbery finally swung open the doors of Meeting Room 1B, meeting the gaze of just about a dozen agents sitting at a roundtable. Upon it, a map of Southeast Brazil was spread across the mahogany surface, spanning from Porto Alegre to Salvador; Brasília was highlighted with a small, golden miniature statue, surrounded by countless red and blue counters. "We have our orders," Golbery announced to the table, "so let's get started. His Excellency has asked for our cooperation with the SNI against demonstrators in these key locations..."\n\nThe meeting continued for the better half of the day, the evening sun's light slowly trickling from the slit-windows of the meeting room. As counters shifted across the map and strategies were altered alongside new reports of communist activity, Golbery kept a telephone close at hand, barking new orders to officers on the other line as they faced off against increasingly complex demonstrator formations. This was a novel form of warfare, one of internal response and militarized police, yet he would see that their efforts would not be in vain."
brazil_lacerda_imp.17.a: "Meet the new boss—same as the old boss."

brazil_lacerda_imp.18.t: "The Dictate of Occam"
brazil_lacerda_imp.18.desc: "After reading the sixth after-action report, Golbery threw the rest away. Every single one of them said the same thing: there was absolutely nothing here.\n\nLacerda had been adamant, and personally issued a directive that SNI, DOPS, and Coast Guard detachments in the northeast were to "find and exterminate all traces of Veracruz influence" in Brazilian waters. Lacerda was absolutely convinced that rebels were being supported via covert drops of men, supplies, and weapons. Through Coast Guard patrols, interrogating local smugglers, and good old-fashioned shoe leather, Golbery had tried to run down every lead he could. He was certain, when this whole escapade started, he'd find something that would satisfy Lacerda's monomaniacal fixation on communist infiltration across the Caribbean.\n\nEverything had turned up blank. The worst thing they found were a few illicit substances being smuggled. Some locals that held secret sympathies for the Veracruz Pact did get caught, but knew very little. Sometimes Golbery's teams found something that almost looked like it would yield results, only to find that whoever it was had vanished into the night, with no smuggled radios or weapons to confirm their presence. If there were any Veracruz Pact smugglers running high levels of supplies through the northeast, they were either extremely talented or extremely lucky. But more likely than either of those two options was the simplest: Golbery couldn't find them because they didn't exist.\n\nLacerda wouldn't like to hear that at all. He'd try to find a reason why these phantom weapons shipments didn't exist, and if Lacerda's latest temper was any indication, he'd likely react violently. If the simplest solution was best, Lacerda's conclusion would be predictably simple. Golbery couldn't find them because he was either incompetent or co-opted. That would merit a simple response, bashing Golbery's head in until he ceased to be a problem.\n\nGolbery thought for a moment, and wondered what to do. If he fudged the reports, he'd have to find some prisoners or weapons to provide as evidence. If he told the truth, he put his own life in jeopardy. As he stewed in the possibilities, the most effective solution came to him: say nothing. Occam's razor cut cleanly, one more time."
brazil_lacerda_imp.18.a: "The simplest solution is always best."

brazil_lacerda_imp.19.t: "Clean Sweep"
brazil_lacerda_imp.19.desc: "Sérgio Fleury had the vision, the mandate, and the manpower. Now, he had permission, and São Paulo would pay dearly for it.\n\nThe bureaucrats of Brasília had dragged their feet for long enough; a coordinated response was required if they were to break the grip of the leftists and trade unionists upon the State of São Paulo, lest it all be reduced to rubble and ruin. Thus, the order was given: the combined forces of DOPS, CENIMAR, and the SNI would be handed over to Sérgio Fleury's command for purposes of "suppressing civil unrest via combined tactics and equipment." A carte blanche, in all but name, to see a land razed. Sérgio bristled at the thought. If that was what needed to be done, then so be it.\n\nThe time was 12:43 when Sérgio oversaw the successful pacification of the Conde do Pinhal, a street tucked deep within the city of São Carlos. The magnificent cathedral of St. Charles Borromeo, its exterior walls scrawled with anti-government graffiti, loomed overhead. Sérgio's heart stirred at the sight of his men at work, dragging a group of demonstrators away as distant clouds of tear gas slowly dissipated. Whether such feelings were indeed of a patriotic nature or indicative of a latent sadism hardly troubled him. They were reclaiming the streets—no, an entire city!\n\nYet, his eyes drew to the nearby clerk offices and local government buildings. Shadows of men and women constantly shifted from behind the windows, occasionally peering down into the streets below. The rebels were taking refuge within, surely biding their time to strike. His subordinate officers would return with reports of streets being occupied again, despite only just being recaptured. Their momentum, albeit initially successful, couldn't last. Would the occupation hold once they had vacated this city? He cast aside such thoughts with a huff; he had a job to do, and he would be damned if anyone stopped him from restoring order to these godforsaken anarchists!"
brazil_lacerda_imp.19.a: "One city down. The rest would soon follow."

brazil_lacerda_imp.20.t: "The Tragedy of Order and Progress"
brazil_lacerda_imp.20.desc: "The Dance of the Knights was somehow as jaunty as it was impetuous, a small wonder how Profokiev penned the piece in exile after the fall of the WRRF. The brass of the orchestra below the balcony boomed so loud, it was incredible the opera house did not shake in its foundation. The symbolism of an old Bolshevik composition reverberating through the ears of Brazil's principle leadership was not a coincidental similarity; it was indeed why Lacerda had invited Médici to the symphony tonight.\n\nThe President did not wait to speak, adjusted his tuxedo in his as he turned in his chair to Médici. "Deafening in their attempt at majesty, aren't they?" A rhetorical question, Lacerda continued. "There was a time in my life I did try to listen; to understand what made men see answers in Lenin and Bukharin; heroes and martyrs to half the world even in failure, a demon haunting Europe even in death. Surely, there was something to be gleamed?"\n\nThe gilded sparkling of the chandeliers above refracted off of Lacerda's glasses. "Words... words..." He mused bitterly. "A cacophony of childlike babbling is what I gleamed, one conducted to be so loud as to deafen to the world as to make it dance a single, solitary tune." Médici attempted to speak, Lacerda held up a reassuring hand. "I have another stanza to put before them, one that I had the hope you might be my star soprano for."\n\nLacerda turned from him as he continued. "I will be candid with you, Médici,. There are powers held by my office I have been hesitant to use. Government authorizations of actions of the most...unpresentable kind. I would not reserve such a thing even for criminals like Adolf Hitler, to say nothing of Getúlio Vargas or João Amazonas. Yet be that as it may..." Lacerda rubbed his chin. "Moral law has become a luxury and in short supply."\n\nHe turned to Médici again. "To the point; Whatever it is that you and your colleagues require, you will have it. Anything and everything that you need to accomplish your task without impediment, you need only ask. No permission needed, no review or oversight. I will ensure there is no investigation and, in return, I only ask for an end to this crisis... Can I count on you, Don Médici?""
brazil_lacerda_imp.20.a: "Médici smiled, offering the only word Lacerda needed or wanted to hear: "Sim.""

brazil_lacerda_imp.21.t: "There and Back Again"
brazil_lacerda_imp.21.desc: "Lott had ended up right back where he started and had to laugh. He remembered about two weeks ago, when the police had arrived at his home to place him under arrest. The fresh-faced kids looked almost apologetic as they took him into custody. Almost as soon as he got there, Lacerda had issued an order that Lott be removed from prison and placed under house arrest instead. So two weeks later, he sat in his living room with another set of police officers awkwardly working his cuffs, this time to remove them.\n\nLott had kept calm about the entire affair. Practically speaking, he was five years too late to say anything if he didn't want this to happen, so speaking up now did no one a lot of good. He also simply didn't have the heart to make these young kids' lives any more stressful than they already are. It wasn't that bad, all things considered, and so he calmly greeted the guards at the start of their shifts, shaking their hands and even chatting with them on occasion.\n\n"It's an... honor to meet you, General Lott, even..."\n\nOne of the new kids said, tripping over himself to find the words.\n\n"Under these circumstances? Don't worry, young man. I know you're just doing your job." Lott's smile seemed to calm the poor kid down.\n\n"What do you think though... about all this?" The kid asked, wondering what the great General Lott would have to say.\n\n"Honestly?" Lott rolled his tongue thinking of the best way to say it. "Lacerda is overcorrecting. Pulling too hard on the steering wheel during a skid. If he doesn't tamp down on the brakes, he's liable to have a full crisis.""
brazil_lacerda_imp.21.a: "Távora, upon reading the transcript, put his head on his desk. "God damn it all, he's right.""

brazil_lacerda_imp.22.t: "That Sanguine Vintage"
brazil_lacerda_imp.22.desc: ""These subversive good-for-nothings are deluded. They think they can use the ravings of a delusional old Bolshevik as inspiration for the current age. They think that a long-dead philosopher somehow divined the true reality of the world. They think they can ape Fidel Castro's degenerate exploits and the prowess of those Cuban maniacs! Yet they failed so spectacularly in Russia. It is not prosperity or equality they wish, but control. They cling to a failed philosophy, because it is the only way that they can rationalize themselves as masters. They are wrong, and we are about to prove that reality in blood."\n\nJoão Amazonas laughed contemptuously at the radio broadcast even as the Udenists assembled cheered louder and louder, the applause coming through like static pops on the old transceiver. Lacerda had certainly thrown himself into a fit attacking him and his movement. If a fit is all that it was, it would be something to laugh at, but Lacerda had brought more than just a grandiose speech for his supporters to clap at. Military operations, police investigations, counterintelligence operatives, he had backed his words with enough force that if he didn't plan well, it would be the death of everything he held dear. His people, his movement, they depended on him, and if he failed, then all that awaited them was a shallow grave.\n\nIn blood, Lacerda said. He certainly made sure to drink his fill. He and his capitalist ilk, draining the workers until they were husks and then casting them out for their children. Blood seemed to be the only measure of devotion in these times of war. Lacerda spoke of blood, as if he was willing to shed his own to enact his own reality. In his heart, Amazonas knew that the blood Lacerda truly desired was Amazonas's own, blood to mortar the bricks of oppression."
brazil_lacerda_imp.22.a: "If he wanted blood, he would have to take it."

brazil_lacerda_imp.23.t: "After-Action Calamity"
brazil_lacerda_imp.23.desc: "It wasn't supposed to be this way.\n\nWhen the orders for Operation Parrot had come down, many Brazilian soldiers had been excited, stepping over each other to volunteer for the mission. Intelligence expected to find disorganized communist volunteers in a half-dozen camps, wearing makeshift uniforms dyed red, with surplus rifles and barely any communications gear or body armor. It would be a lightning assault on an unprepared foe, they'd kill most of them in a quick firefight, take a few prisoners for interrogation, and be back in time to have lunch. After all, they had columns of infantry, this should have been no problem.\n\nThe first thing the soldiers saw was something they never saw. Men blended in with the jungle around them, crack shots with rifles taking off the heads of officers from their camouflaged positions in the trees. Concealed mantraps lined with spikes covered in excrement took out the legs of point men. Blinded soldiers ran into killzones and entire platoons wiped out in minutes. The guerillas engaged from close distance to render their artillery support worthless. Supply lines were cut, and men ran into the jungle, confused, unloading their weapons at any moving piece of foliage, only to be cut down.\n\nIt was a complete disaster. The roadways were choked with bodies. Supply trucks were abandoned and captured. Some of the men, those who had ties to the Sergeant's Movement so many years ago, tore red pieces of cloth around their arms, waving anything red they could find to signal their intent, so they could defect to the enemy.\n\nGolbery emptied his flask in a large gulp. This was an absolute disaster. Overconfidence had led them all to ruin. Golbery briefly entertained the idea of eating his gun before he simply put his head on his desk to sulk."
brazil_lacerda_imp.23.a: "Operation Parrot had quickly become Operation Mockingbird."

brazil_lacerda_imp.24.t: "Birds of Prey"
brazil_lacerda_imp.24.desc: "President Lacerda, accompanied by an entourage of generals, strutted down the tarmac of Brasília Air Force Base. On both sides, he was greeted by a line of pilots and crew chiefs. Behind them, were shining green Bell UH-1 helicopters. Most of the helicopters had paintings of the pilot's wife or girlfriend, but one of them stood out to the President.\n\nLacerda strode up to one of the Hueys. He tapped his finger on the pristine roundel, and then moved his finger up to the only customization on the bird. "Psalm 18:2." Lacerda read aloud. He grinned, and clapped the young pilot on the back. "God is on our side."\n\nHe continued to walk around the helicopter, looking down at the spot where a machine gun could be mounted. Underneath the wings were spots for rockets. The President imagined death raining down upon whatever foe would be foolish enough to face Brazil. The Argentinians maybe.\n\nThen, his smile disappeared. There was a voice at the back of his head, something rotten from his youth. The fear that it would be Brazil's children facing the wrath of the machines. Lacerda shook the thoughts away. If it came to that, it would only be against those deserving. He turned to a nearby air force officer."
brazil_lacerda_imp.24.a: ""When's the weapons demonstration?""

brazil_lacerda_imp.25.t: "Enemy Suppression Tactics"
brazil_lacerda_imp.25.desc: "When canisters of napalm were issued to the military, there was a brief moment of uncertainty. Clubs and guns were an acceptable escalation to them, but these cruel devices were once constrained to the velds of South Africa, where they were dumped upon enemy soldiers. These bombing campaigns were against Nazis, and now they deployed them against their own people.\n\nTheir commanding officers corrected them on this point: they were enemy soldiers.\n\n"Attention. Attention." The tinny announcement succeeded the first wave of fire. "By executive decree, martial law has been declared in this area to combat insurrection. Citizens are ordered to shelter in place. Failure to comply will result in your classification as an enemy combatant regardless of armaments."\n\nIn the town of Coari, nestled between trees along the Amazon river, terrified civilians scattered and ran between their neighbours, friends and family caught in the bombing. They dashed between crumbling concrete and shattered tone. Haunting screams came from those with the strength to do so. Searing flesh filled the air. Those who were still mobile fled into the river, immersing themselves in water polluted by the corpses of those who did not make it.\n\nThe soldiers who approached the town from the south road wore gas masks. There was intel that the communists lurking here had access to homemade mustard gas; the top brass just didn't want anyone to see their faces. They gathered the survivors of the town by the stock of their guns and brought them all to the closest structure that could hold them. The church was full that night of the broken and the terrified; Christ seemed silent beneath the wails of His children. They clutched their burns and wounds, they prayed to the Lord God for salvation, they questioned why this was happening to them."
brazil_lacerda_imp.25.a: "Beyond the walls, there were screams. Fires lit up the stained glass."

brazil_lacerda_imp.26.t: "The Report on Sewer Rats"
brazil_lacerda_imp.26.desc: "Mr. President, as you have granted me the opportunity to make a detailed report on the State of São Paulo and its various agitations, I have gone into as much detail as I can."\n\nEmílio Médici's face, ripe with concern, and his signature arched eyebrow of prejudice, both remained fixed while his aide passed the binder to Lacerda. Lacerda's face flitted between a respectable neutrality and slight bemusement at how little a man could change. "Now, what I will say now is not conjecture, it is not speculation. It is fact. São Paulo's streets are overrun by communists."\n\n"Now, there are rumors that these communists are receiving Vargas Filho's support, but they are, as I say, rumors. Fittingly, they use the sewers as hiding spots, as well as other locations associated with the underground. It is our own people who are betraying us, and the countless citizens who do not report them and permit them. All that remains of order there are the churches."\n\n"At the end of the report, you will have noticed that there are a list of suggestions which should be enacted, one of which is support to deal with these counter-democratic and electrifying movements by supporting its resistance. Do not delay, sir. The enemy from within is always the most dangerous."\n\nThe general rose to his feet and sauntered out. So much for not delaying, Lacerda thought. But no, even with all the palpable accusation in the man's voice, there was truth in it. All of Brazil crossed through São Paulo somehow, yet under his own watch, it was falling to the sewers, and they all sat around to let it happen. He had a rat problem, at least that was certain. He banged the table."
brazil_lacerda_imp.26.a: ""Caralho!""

brazil_lacerda_imp.27.t: "He's Laughing"
brazil_lacerda_imp.27.desc: ""...And per His Excellency's orders, you are also restricted from passing any further local ordinances and will comply with federal authority on any new directives." To Sérgio Fleury, the words dribbled from his mouth like sweet honey. To humble a child of Vargas like this was a great personal pleasure, and he barely could contain his glee as Vargas Filho's expression grew more bitter by the second. And then, silence followed. Filho's office was still as stone, save for the rhythmic ticking of a nearby clock and the indiscernible chirpings of birds outside Filho's window.\n\nFilho sighed, resuming his calm demeanor. "It wasn't enough that you had to spit on his legacy," he succinctly muttered. "You think you will be better than him. You think yourself a moral paragon compared to my father, as defenders of the law and order." A dry, short chuckle came from him. "You are wrong. Lacerda thrives on lawlessness, and he achieved the presidency through lawlessness."\n\nFleury's expression contorted with rage, yet Filho rose from his seat. "Lacerda may prattle about the importance of an orderly and civil society, yet he destroyed any semblance of civil order after that catastrophic election! His 'orderly society' is barely holding this nation together; if it weren't for that pathetic constitution, my streets wouldn't need your men!"\n\n"You..." The words tensed within Fleury's throat, tightening upon his larynx. "You fucking communist."\n\nOne could drop a pin within the room and shatter the tension in the air, yet Filho did not respond. Instead, he let out a chuckle. Then, a heaving laughter came from him, and all Fleury could offer in return were exasperated sputters. The laughter twanged and bounced across the room, reverberating harshly within his mind. The sound of glass shattering outside soon intensified, forcing Fleury to withdraw from the room, yet the riotous echoes of Filho would haunt his soul for days to come."
brazil_lacerda_imp.27.a: "He's laughing. He's laughing. He's laughing."

brazil_lacerda_imp.28.t: "A Prisoner In Your Own Home"
brazil_lacerda_imp.28.desc: "Vargas Filho felt his blood run cold at the sight: columns of smoke rising above São Paulo. It was a chill that no fire could thaw. Beyond the suburb in the near-distance, the trees that surrounded these homes still with fear in the night, his city was raging and quaking with blind terror. The army had the city locked down in the morning, and in the afternoon tanks were rolling down the streets. The population was restive, though none of them had reached the Palácio dos Bandeirantes. They were stuck in the city, penned in by barricades and cordons, filed away into isolated clusters.\n\n"Attention, attention," said the radio, tuned to the only channel permitted to make a public broadcast. "By executive decree, martial law has been declared. The right of public assembly has been suspended in the interests of civic peace. All citizens, regardless of participation in illegal meetings, are to disperse at once."\n\nFrom the second floor of his palace, he watched from a distance the suppression of the city. He was as isolated from the world as the houses below, huddled up in their wooden cocoons, terrified that their hour might come around. He no longer had any authority over security in São Paulo; Lacerda's state of emergency had robbed him of all but a praetorian guard assigned to his home. They were on edge; the gunshots and screams that echoed around them kept fingers on triggers.\n\nSomewhere in that city, bullets rippled through and tanks rolled across enemies of the state. Vargas Filho, who had never once feared for his safety, now downed shot after shot in a shaking hand. He had seen the hatred in Lacerda's eyes before all this. Back then, it was just politics, and Vargas knew how to protect himself there. Now, as the army put the torch to São Paulo, burning out the roots of treason and dissent in the country, he wondered if his poisoned family tree might feel those flames."
brazil_lacerda_imp.28.a: "He fell to his knees, prayed to God and the Mother of Aparecida, but could not feel their presence."

brazil_lacerda_imp.29.t: "A Guerra Acabará Se Você Quiser"
brazil_lacerda_imp.29.desc: "Military high command had a free reign to purge the Paulista favelas of communist insurgents and criminal elements; on the ground, those qualifiers vanished, and the narrow winding passages of the favelas were stained with blood and littered with bodies. Those who survived were often dragged away into trucks or makeshift prisons, beaten and tortured for information on Marighella that few possessed, but many offered. Those who could flee in those first precious hours found sanctuary in the See Cathedral, where their archbishop had gathered every resource in his power to protect them.\n\nPaulo Evaristo Arns had been called by the Vatican to evacuate, knowing that he would refuse. He had already used his position against Lacerda for years, pushing at the boundaries of the Church's protection with his protests against the regime. When the army first cordoned off the city, he called in every favour, exhausted every resource he had to gather supplies in the cathedral and opened its doors. That had been enough for the army to surround the cathedral, firing a volley of shots into its front door as a statement of intent. Inside, hundreds of parishoners and refugees flinched and screamed when they heard the gunfire; stray bullets peppered the apse with lead.\n\n"Enough!" Arns, robed in vestments and crozier in hand, strode out onto the steps of the cathedral. The doors quickly shut behind him as guns were drawn on him. A commanding officer immediately barked orders to hold fire, then met the archbishop halfway up the steps.\n\n"Archbishop," he said, "you are harbouring enemies of the state. Send them all out now."\n\n"Or what? You'll shoot everyone inside? Blow up the Cathedral?" He saw the officer take a step forward, raised his crozier and pushed the head up to his chest. "This is a house of God. I won't let you foul it with blood.""
brazil_lacerda_imp.29.a: "But behind him, two parishioners had already bled out upon the nave."

brazil_lacerda_imp.30.t: "Another Broadcast from Brasília"
brazil_lacerda_imp.30.desc: ""Long Live Our Free Brazil!" Lacerda was practically shouting at the TV cameras pointed at him in the Presidential Office. The presidential address went incredibly well, Lacerda was positive. After all, he spoke passionately, from the heart, and made his positions clear: Communists were trying to destroy the nation, and he was the only one that could stop them, and he would go to any length to do so! His cabinet and advisors tried to tell him to tone it down, but that's not what the moment called for. It calls for swift, bold action! And by God, he delivered!\n\nSeveral generals on the other side of Brasília muted the TV in the conference room, with worried glances at each other. Just when they thought that maybe they had a handle on things, their Commander-in-Chief just threw an entire tanker car's worth of fuel on the fire, and they would have to now go tackle the blaze.\n\nFrom his home in Fortaleza, Virgílio Távora could only slump in his chair, hanging his head in his hands as his wife Luiza turned off the radio after the speech. Lacerda was driving Brazil off a cliff with his vitriolic rhetoric. How could no one else see it? Why didn't anyone stop him?\n\nWithin days, half of the clergy in the nation had denounced Lacerda's speech for his hatred and denunciation of his opposition. Leftists felt a new fire that they hadn't in a long time, their protests and strikes gaining more strength and power. Even the average person on the street were starting to feel concerned, some even going so far as to say that the speech they just heard sounded a lot like what the Nazis would say, despite Lacerda's avowed anti-fascist position. About the only people in Brazil who wholeheartedly supported the speech were the hardline UDN members, but they weren't that large majority of the population."
brazil_lacerda_imp.30.a: "Mind your speech a little, lest you should mar your fortunes."

brazil_lacerda_imp.31.t: "Ambassadorial Meeting"
brazil_lacerda_imp.31.desc: "Lacerda sat behind his desk, his tie slightly askew, his hair slightly messed up, his suit a bit rumpled. He gave a slight twitch as he shuffled papers around, a clutter that normally wouldn't have been presented to guests.\n\nBut Lincoln Gordon wasn't any ordinary person to meet the President of Brazil, and not simply because he was the Ambassador for the United States. He could see the stress and strain that was weighing down on his friend from the past while, and Gordon couldn't help but worry for Lacerda's health and stability.\n\n"Gordon, I assure you, everything is under control," Lacerda said, the conclusion to his update for the Ambassador, and his friend, his voice cracking just a little bit. "Brazil is stable, its position is secure, and our friendship with the United States is unshakably strong."\n\nGordon gave a small, sorrowful nod. He knew it wasn't true though; the fact that a brigade of soldiers and security had to escort him from the already heavily guarded US Embassy to the even more heavily guarded Planalto made the words from Lacerda feel more like a fantastical wish than a realistic statement.\n\n"I will tell the State Department, and make sure they know," Gordon said, taking the pipe from his mouth. "I will make sure that Washington knows that you have everything under control, and the images in the newspaper and on the news is overblown.""
brazil_lacerda_imp.31.a: "I just hope your words are true, Mr. President. My Friend."

brazil_lacerda_imp.32.t: "To Be, Or Not to Be"
brazil_lacerda_imp.32.desc: "Thunder rumbled, lighting flashed, the dark sky poured rain. Perhaps the perfect setting for the mood that Lacerda was in. A half dozen books sat on the President's desk, all by the same man: William Shakespeare. For being an Englishman some 350 years dead, he was truly timeless, the master at understanding the human condition, especially those of embattled leaders of nations on the brink of destruction and ruin. Was he looking for guidance? A path? A warning? Even Lacerda didn't know, but still he kept reading.\n\nWas he the mythical King Lear, demanding adoration and praise from sycophants, turning away those that would give the truth of himself and the nation he governed? Maybe he was Hamlet, struggling to reconcile his given duty with his personal feelings, delaying the inevitable outcome that he knows he must undertake to finish, which only leads to madness, feigned or real, the further he delay? Or was he Macbeth, ambition and lust for power driving him to commit more and more violence to ensure his place on a blood drenched throne, forever staining his hands as he tries to maintain his power?\n\nThe phone rang on his desk as a flash of lightning and a crack of thunder shook the building. Lacerda picked it up.\n\n"Mr. President..."\n\n"Médici! Get more, more, more!" He bellowed. "Helicopters, guns, soldiers! Send them out! Damn the repressions, do them all!"\n\nThere was a brief silence on the line. "Y-yes, Mr. President." The line went dead.\n\nLacerda slammed the receiver down, pausing for a moment, before he slumped into his chair, Macbeth falling from his hands to the floor."
brazil_lacerda_imp.32.a: "I had most need of blessing, and 'Amen' stuck in my throat."

brazil_lacerda_imp.33.t: "Goulart, In Flight"
brazil_lacerda_imp.33.desc: "Golbery was summoned to Lacerda's office with the vague agenda of "state security", and knew what it was about. There was one name that had been on Lacerda's mind, ever since the man who bore that name took flight a week ago. When they found Lacerda, his tie was loose and the button on the top collar. His suit was rumpled, as if he'd been sleeping in it, yet he looked like he hadn't slept in days. A pile of unfinished work lay in one corner of his desk. A sheen of sweat covered his forehead, reflecting light, yet Golbery felt the cold air conditioning hit him as soon as he entered.\n\n"Goulart," he said, pointing at the seats in front of his desk. Golbery and the generals took their seats as Lacerda crossed the width of the room again. "Goulart, what's being done about him?"\n\n"He's in Havana," said Golbery, nodding his head to one of the generals who produced a file detailing that and more. "The man's a guest of their government—if not officially. Someone there's sympathetic to his cause."\n\n"Goddamnit," Lacerda muttered, pulling out a document from the middle of his stack, pulling the files on top of it with him. He slammed the letter down on top of this new mess. "João Goulart is a traitor and a deserter. He couldn't face the music, so he ran off. No, no, I won't accept that. Brazil will not be safe as long as he's still out there, plotting."\n\nThe general to Goulbery's right cleared his throat. "On that note, Mr. President, there is the matter of Operation Rubens Vaz." He saw the manila folder he sent Lacerda in that mess. "If you give us the go ahead, we can-"\n\n"Yes, of course." Lacerda waved a hand in front of him, as if trying to swat away a fly. The name conjured up old memories, and a flared pain in his foot. "Do what you must, just leave me out of the sordid details.""
brazil_lacerda_imp.33.a: ""Of course, Mr. President.""

brazil_lacerda_imp.34.t: "Goulart, In Exile"
brazil_lacerda_imp.34.desc: "João Goulart felt like a coward. While the rest of his country had Lacerda's hand wrapped around his throat, he was enjoying sunshine and beaches on Havana's shoreline. His family, though protected by unwritten rules of conduct, were still there. Goulart told himself that they were something to keep him tethered to Brazil. If they were with him, how easy would it be to just let it go, enjoy the rest of his life here with—\n\nHe heard an urgent knocking on the door. He had been staring out the window for so long that he didn't hear the visitor. With his face slightly flush, he walked to the front door. Outside was a postal clerk, one of the employees well-paid to carry sensitive mail for a man who shouldn't be there. Goulart apologised for his tardiness, took his letters and bade farewell. He set them upon the kitchen counter, turned the radio on (some American station with a relay here) and flicked through the letters. Letters of support, petitions to return, and one letter with "OPEN" scrawled upon it. He raised an eyebrow, but tore open the envelope and unfolded it. Inside was a photograph of his wife and child, taken from a distant, clandestine camera.\n\nWE KNOW WHERE YOUR WIFE LIVES WE KNOW WHERE YOUR CHILD LIVES COME BACK TO BRAZIL OR WE WILL HURT THEM IN YOUR PLACE\n\nGoulart stared at the letter longer than the photograph. The American ditty on the radio was reaching a saccharine crescendo, and Goulart switched it off so quickly he broke the dial. When it would not stop, he threw the radio across the room. It smashed into the wall and stopped. His body retched with sobs. He broke down, curled up into a ball of the kitchen floor, thinking only of his wife and child in a house that was not his home.\n\nWhen at last the tears had stopped, he rose from the floor and took out a new envelope and a fresh piece of paper. He breathed in and out until his hands stopped trembling."
brazil_lacerda_imp.34.a: ""To President Lacerda: I will return. Sincerely, João Goulart.""

brazil_lacerda_imp.35.t: "Goulart, Back Home"
brazil_lacerda_imp.35.desc: "The tarmac on Galeão International Airport had been cleared out on the arrival of a small jet plane, personally chartered by the Cuban government as a reluctant gesture of goodwill to its lead passenger. Around this plane, a police cordon grounded other flights until this one was fully disembarked. After all, it was important that its lead passenger return to their care. There were handcuffs and a police car's backseat reserved for him.\n\nJoão Goulart asked them to delay the disembarking for a few more minutes. "Tell them it's an equipment malfunction," he muttered to the co-pilot, "I don't give a shit. Just hold them." Then, walking away from the cockpit, he returned to his seat and looked out the window. He saw the distant figures of policemen on the tarmac, and he thought they could see him too. They would have to wait. Goulart had a little more soul-searching to do before he could relinquish himself as a free man.\n\nHe traced back his path from this moment, walking along the stones that he laid along this road. The Vargas presidency, when he made Goulart Minister of Labour, Industry and Trade. The stupid stunt that Gregório Fortunato pulled, when Lacerda felt the cold hand of Vargas brush his soul and strike eternal fear into him. The 100 Days Crisis, when Lacerda's fear drove him to slit democracy's throat under the guise of protecting it from Goulart. The man in the jet plane closed his eyes, walking back along those stones, trying to find the one that could have sent him elsewhere.\n\nThere was none. The decision was out of his hands. God, or perhaps a force more malign than Him, had decreed something different for him. There was no path before, nor was there any path now, that could prevent what would happen next—he could only defer his fate by a few minutes, and those minutes were now up. Goulart rose, sighed, and asked the crew to prepare his descent."
brazil_lacerda_imp.35.a: "He walked down the stairs, offered his wrists, and felt cold iron clasp them tight."

brazil_lacerda_imp.36.t: "Janota Matreiro, I"
brazil_lacerda_imp.36.desc: "The rotors of helicopters whirred overhead, and below in the streets there was fire and screaming. None of it reached the tenth floor of a Copacabana apartment building, in which Juscelino Kubitschek and his mistress did their best to relax on the couch. Bossa nova was playing from a turntable's speakers, the soft strumming of guitars and the piano's keys a defense against chaos.\n\nHe'd blown off a social event at Niterói without telling anyone, choosing instead to ring every number in his address book to figure out the reasoning behind PARA-SAR's rampage. The PSD were stumped. The PSP stayed silent. The PTB were probably being dragged in chains or a body bag. Nobody from the UDN returned his calls, save a single staffer returning her boss' call: "madness" was all she said. By seven o'clock, the lines were dead. The radio called it an emergency measure.\n\nThe night promised to be violent, so Kubitschek fled to the safety of his Copacabana apartment. He tried not to think of his wife with his arm wrapped around Pedroso's shoulder. He had perhaps an hour's peace before he felt a tap on the shoulder. Geraldo Ribeiro—his chauffeur, his confidant, his chevalier—cocked his head towards the kitchen.\n\n"I'll go out tomorrow morning," he said. "There's not enough food for all three of us long-term. You stay here and-"\n\n"No, I'll go with you." Kubitschek put a hand on his shoulder. "I'm not letting you go all by yourself. Besides, I need to see-" He paused, looking back. "I need to make sure my wife and children are safe. When this is over, I-"\n\nHe stopped. Kubitschek and Ribeiro caught a glimpse of something in their peripheral vision. Through the bedroom's doorframe, they saw an intruder rifling through a jewelry box. He wore the fatigues and body armour of PARA-SAR."
brazil_lacerda_imp.36.a: "Como poderei viver, como poderei viver..."

brazil_lacerda_imp.37.t: "Slow News Day"
brazil_lacerda_imp.37.desc: "It was one of the finer Apartments in Washington, hidden under the twilight as two men sat slumped in its living room sofas. A copy of The New York Times lay discarded on the ground where the two men had thrown it, long since having traded print for liquor. "MORE BARBARITY IN BRAZIL" it declared in bold, the front page covered in sensationalism about the recent turmoil in their homeland. Ambassadors to the OFN and OAS Organisations, they'd been working constantly against the tide but now the cold steel grip of defeat lingered on them.\n\n"It's a nice place you have," Emílio, OAS Ambassador, mused as he poured himself yet another glass. He wasn't sure what the drink was, neither had thought to check, but it burned in his throat. "I wonder if you'll get to keep it? The things I heard today I'm not sure I'll be in Washington much longer."\n\nCarlos, his OFN ambassador counterpart, guffawed. "We're ambassadors to a place whose leaders are now spoken about in the same breath as Hitler and Himmler, I'm not sure our accommodation is the important part here."\n\n"I guess." The men had been on the phones and called to meetings for two days incessantly. They'd read the advance copies of the American Press as the news had trickled in, listened to the threats of assets and investments being withdrawn from their nation by nearly every official they met. They were out of favors and out of time. A tranquility hung over them now as they sat slumped, minds lightly hazed from their drinks. Acceptance.\n\n"Carlos, did you see Buckley's rant on Firing Line?" Emílio lazily looked at Carlos and saw the affirming nod. "Can you actually think of any counter to what he said?" A shaking head was his response. Emílio finished his glass.\n\n"Me neither.""
brazil_lacerda_imp.37.a: ""Just our luck this happened on a slow news day.""

brazil_lacerda_imp.38.t: "Icarus Wept"
brazil_lacerda_imp.38.desc: "Juarez Távora sat with as much dignity as he could while in his nightclothes upon his living room's sofa, grimly regarding the men with assault rifles before him. To their credit, their eyes spoke of soft apologies, as they had just kicked in his door, but such sentiments clearly didn't stay their hands.\n\n"Juarez Távora, I have been instructed to present these documents to you and answer any queries you might have." An officer, sharply dressed, handed him a pile of documents firmly but respectfully. The old general took them, not sparing a verbal thanks to his captor but offering a nod in compromise.\n\nHe almost chuckled as he read, the defeat the pages offered him matched only by their absurdity. He had resigned all his affiliations, been arrested, tried, sentenced to death then shown clemency with his sentence commuted to house arrest all within ten pages. Lacerda was many things it seems, but he couldn't fault the efficiency.\n\n"So, I'm a criminal now. It's been a while I suppose, hence my name no longer carries a title." joked Juarez, seeing little else to do in the situation but maintain a grim humour. Within him, barely restrained however, lay only fury whose impotence he recognised only too well.\n\n"Unfortunately so." affirmed the officer. Juarez observed him. He was young, barely out of his twenties. He probably never expected to be arresting the Vice-Rei do Norte himself. "We will remain here for the remainder of the night, in the morning a more permanent stewardship will be provided for you."\n\n"May I stand?" he asked the officer. After a moment of contemplation, the officer accepted. He watched as Juarez walked to his drinks cabinet and poured out a tall drink. He then gazed out from the window next to his cabinet in silence; there was nothing but darkness - the night had long since set in."
brazil_lacerda_imp.38.a: "The First Republic's end lingered in Juarez's mind. He cursed his age and complacency."

brazil_lacerda_imp.39.t: "A Pleasant Day"
brazil_lacerda_imp.39.desc: "Sunlight streamed through the windows as Vargas Filho gazed over his mansion grounds. The weather was nice, the landscaping as pristine as ever, but one detail was different today compared to any other morning. The soldiers, normally so rigid and methodical, seemed relaxed. He saw rifles slung lazily over shoulders as guards chatted, and some soldiers even neglected to salute officers that walked by, and yet received no reprimand.\n\nWalking out into the garden, the men were alert enough to salute the governor as he strolled by. A lieutenant, who Vargas Filho recognized as usually being respectful and quiet, instead walked directly up to him and asked, "Any orders, sir?" The confusion on Vargas Filho's face must have been obvious, as the officer rolled his eyes slightly and asked, "General Frota hasn't told you yet, has he?"\n\nA soldier quickly brought over a radio, and Frota's voice emerged from the speakers, "Lacerda's control over the country is crumbling, and each passing day Brazil heads closer and closer towards utter chaos. The time to take up arms against his government is now, and my forces are currently fighting off the First Army in the southwest. If you have any desires, Governor, myself and my men are at your disposal."\n\nUpon hearing the radio message, a weary smile crept across Vargas Filho's face. The lieutenant looked up at him expectantly, and the governor's replied, "If that is the case, then...""
brazil_lacerda_imp.39.a: ""... I think I shall go for a walk.""

brazil_lacerda_imp.40.t: "Falling Upon the Amazon"
brazil_lacerda_imp.40.desc: "It had been over a day since Golbery had given the order for helicopter brigades to be deployed en masse to the Araguaia region. The objective was to fall upon the Amazonists hiding in the region, and to bombard them into submission. Golbery had turned to ask an aide to bring him a drink given the hot temperature, when he spied the officer he had tasked with assessing the results of the Araguaia deployment approaching him.\n\nAfter a quick salute, the officer spoke, "Sir, I have the reports from Araguaia."\n\n"Was the offensive successful?" Golbery wanted the good news out of the way first, to cushion the inevitable discussion of costs and casualties that was to follow.\n\n"Um, no, sir. The Amazonists have become highly skilled at evading bombardments. It's reported that even their own comrades struggle to see through their camouflage, and so enemy casualties appear to have been minimal."\n\n"If that's the report on the enemies' casualties, then what of our own?"\n\n"Sir, a number of our own soldiers have... defected. This included one of our anti-air regiments," as the officer paused for a moment, Golbery could guess where this was going, "They began directing fire on their former fellows, and our brigades were forced to retreat after suffering heavy losses.""
brazil_lacerda_imp.40.a: "No steps forward, two steps back."

brazil_lacerda_imp.41.t: "A Formality"
brazil_lacerda_imp.41.desc: ""Lacerda looked up as Esther entered his office and sat down opposite of Lacerda. Her hands were shaking as she placed a document down on the table between them, and quietly said, "I would like to resign as secretary."\n\nLacerda opened his mouth to question why, but stopped himself. There was no good that could come from hearing her reasons, what she thought of him. He could hardly blame her for leaving; She had seen too much. Too much stupidity, too much cruelty. It was only sensible that she'd want to escape from here, to go back to helping her family in Curitiba.\n\nLacerda looked down at the paper, it was a simple document approving her departure. The wording was cold and formal, there wasn't so much as a word expressing Lacerda's gratitude. He signed it, and moved to begin writing in the space remaining, but Esther pulled the paper back, "That won't be necessary," Lacerda simply nodded in understanding. Once she was done packing her office effects, Lacerda bid her farewell.\n\nIn the coming weeks, the secretary's office remained empty of any permanent staff. The function instead was filled by lieutenants and warrant officers, shifted out frequently according to the whims of the top brass."
brazil_lacerda_imp.41.a: "In Lacerda's opinion, it was all deserved."

brazil_lacerda_imp.42.t: "A Night Alone"
brazil_lacerda_imp.42.desc: "Lacerda's feet dragged along the floor as he returned from yet another memorial mass for Magalhães. This must have been at least the fifteenth one, if Lacerda hadn't lost count. He grabbed an unopened bottle of whiskey - he had emptied all the opened ones - and drank one... two.. three shots of whiskey.\n\nAfter the third shot, Lacerda remembered there was one last thing he wanted to do before he descended into a drunken haze, and dialed Médici. The man's voice came over the phone, its tone curt and succinct, "Mr. President."\n\n"I approve."\n\n"Approve what, sir?" There was some apprehension in the voice on the other end, or at least that's what Lacerda thought he heard.\n\n"All of it. The elections. Hold them however you like. Magalhães Pinto can have the presidency."\n\nMédici probably stated his appreciation, but Lacerda didn't pay attention to it. With what was effectively a grunt in response, Lacerda hung up the phone. He grabbed the bottle, and poured out what he guessed was three more shots. Trying to avoid thinking about what he had just agreed to too deeply, Lacerda laid down flat on the soda, bottle still in hand."
brazil_lacerda_imp.42.a: "He remained there for the rest of the night."

brazil_lacerda_imp.43.t: "A Deal For The General"
brazil_lacerda_imp.43.desc: "CL: General Lott. I'm glad to hear from you.\n\nHTL: Mr. President. I heard of your order to send the Third Army to restore order to Rio. Good, if overdue.\n\nCL: Hmm. General, I believe that it would be... beneficial for both of us if we avoided further bloodshed. Too many families have been torn apart by this madness our country is embroiled in.\n\nHTL: Yes.\n\nCL: As such, you will be released, and your family will be allowed to leave peacefully, with my best wishes.\n\nHTL: How generous, Mr. President.\n\nCL: Please, Henrique. I won't let them harm you. You can go, you can-\n\nHTL: Will Jango be released as well?\n\nCL: What? What do you care about-\n\nHTL: Will he be released? The man has served his country faithfully, as I have. But you've separated him from his family too.\n\nCL: No, no! Goulart is a terrori-\n\nHTL: It's simple, Mr. President. Either we both leave, or neither of us leave. I won't be a beneficiary of your half-hearted mercy.\n\nCL: I- I can't. I can't do it.\n\nHTL: Then I suppose I'll be staying right here."
brazil_lacerda_imp.43.a: "CL: I... I understand."

brazil_lacerda_imp.44.t: "An Example of Leadership"
brazil_lacerda_imp.44.desc: "João Figuereido rested his head in his hands. His FBI contact sat across from him, the man's brow furrowed as he took in the information Figuereido had provided of the nation's current sorry state. The man flipped to the next page of his notebook, and asked a question Figuereido had not wanted to hear: "And what is President Lacerda's perspective on the matter? What's his plan?"\n\nFiguereido couldn't stop a chuckle from escaping his lips, "What is Lacerda's plan? That is an excellent question, and one I've been asking myself for weeks now! There are two possibilities: He has gone completely insane and we now have a delusional lunatic sitting in the President's seat, or he has taken his own brain out of his head and eaten it! It's anyone's guess as to which is the truth."\n\n"Lacerda didn't seem significantly mentally unstable from prior reports... If you could elaborate. In English, if you would."\n\nFiguereido hadn't even noticed he had slipped into Portuguese in the middle of his rant, and he concentrated a bit more as he continued, "Just earlier today, I witnessed him ordering for the forces on the southern border doubled. What forces are we supposed to deploy? There are none! They're either getting shot by communists, searching for this rumored Brizola insurrection, or are stuck rebuilding Rio. Where are we supposed to find enough forces to 'double' our southern border's defenses? How are we supposed to drive the Argentines back when we can barely assert control over our remaining territory? There's no point! If that isn't madness, then I don't know what is.""
brazil_lacerda_imp.44.a: "The report back to Washington was not an optimistic one."

brazil_lacerda_imp.45.t: "A New Man Among The Resistance"
brazil_lacerda_imp.45.desc: "In a country full of enemies, Golbery do Couto e Silva had one on his mind. Intelligence had been tracking his movements through the jungles for weeks, but nobody could follow, for every agent they had in-country was split between five other tasks and ten other enemies. When news of a new appearance crossed his desk, Golbery snatched up the report from his towers of unread folders and ran into the nearest meeting room, where he knew intelligence officers were in conference.\n\nHe slammed the folder down, but nobody knew what it was about. Behind them were maps and drawings of the countryside, marking rebel-held regions and expected troop movements; a dozen lines, going nowhere, anywhere and everywhere. They had no idea where Golbery's particular quarry was among those lines; they were tracking a dozen rebel officers, and they tried to hold their tongue when he said this one was far more important. He wasn't just any communist: he was a professional revolutionary, and he had to be stopped.\n\nBut the agents stared at him, blank-eyed. They knew who he was, but they had no idea if he was even in the country. They didn't want to say as much to Golbery. Seeing those faces, he screamed: "Can someone tell me where the fuck he is?"\n\nDeep in the Amazon, Golbery's nemesis opened up a box of cigars. He offered one to João Amazonas, who lit it up and coughed on the first inhale. "Christ, that's strong," he muttered.\n\nChe Guevara chuckled, retrieving and lighting up his own. "So, has anyone said anything?"\n\n"No, no. Lacerda's turned your name into some kind of curse. Not a single broadcast has dared utter it." Amazonas poured two shots of whiskey, offered a glass to Che. "And army intel's so useless, I doubt they even know you're here.""
brazil_lacerda_imp.45.a: "Che grinned, took the glass. "Well, comrade, here's to another successful revolution.""

brazil_lacerda_imp.46.t: "Friends Today, Enemies Tomorrow"
brazil_lacerda_imp.46.desc: "There are towns beyond Lacerda's reach, where Carlos Marighella could go walking down their main roads without fear of death. On his way through one of these towns, he saw people exiting the local church: communists on one side, soldiers on another. Marighella, taking note of some of this odd pair leaving, stopped in his tracks and watched them.\n\nThese soldiers who worshipped next to his comrades were Frota's men, disgruntled soldiers rebelling against Brasília. Today, they had been allies of circumstance; an armoured column led by Fleury had arrived yesterday, and though neither Marighella nor Frota liked each other, they both understood that Fleury's tanks could only be felled by joint effort. Tomorrow, these bonds were almost guaranteed to shatter under gunfire.\n\nHe saw the priest step out of his church, waving goodbye to this temporary alliance. The churches would stand even in their territory, an order from Amazonas obeyed by himself and Prestes. Marighella understood the logic: religion remained a cornerstone of rural existence, and as long as they needed to hide in the jungle, keeping good relations with local priests was necessary. Some of them, sympathetic to or followers of liberation theology, even sheltered guerillas against particularly cruel or infamous soldiers.\n\nAmazonas said it was about fighting for hearts and minds, but Marighella thought that he didn't appreciate how more than one side desired them. Frota had thrown his lot in with Vargas Filho, and the governor was doing all he could to prove he could be the liberating force in Brazil. He'd been doing well, putting a friendly face to the army, protecting them from the worst impulses of Fleury's forces."
brazil_lacerda_imp.46.a: "But for every heart Vargas Filho won, Marighella was winning three."

brazil_lacerda_imp.47.t: "Once and For All"
brazil_lacerda_imp.47.desc: "First Lacerda had been drinking, the opiate of all the government now, reading the final report on Burnier.\n\nThen Médici had drank; a fiery Lacerda slurring as instructions and broken diatribes were presented equally.\n\nThen Médici's men had drank, openly disregarding conduct after their orders had been read to them. They marched through the Rio streets, Médici before them, a parody of Roman General on a Triumph. To the people he declared treason and treachery as he passed, the crimes which infected the nation and that all must pay for. His men shouted that he was Lord and he felt as God.\n\nIn the air was a sweet tune, the thronging mass moving towards the Headquarters of Rio's Most Wanted. Sunlight danced upon their faces, their eyes unseeing to their folly. The soldiers sang a discordant song, fully of fire and faith. They passed a cathedral; its Bishop had no eyes.\n\nEventually, the hooligans came to the Headquarters, beating down the unlocked doors with a cheer. None remained but a single man, a proud man, but the sorry men felt they could not recall his name. Ridden with bullets he declared loyalty to Brazil. No leader remained; they hunted for others and in closets and side streets they found them. In time, a cheer rang out for the thrill of victory, seeing the mountains, fields and jungles that lay on the ground before them in shades of red and purple and they laughed and laughed and laughed."
brazil_lacerda_imp.47.a: "Run home and close the door; do not ask for me no more."

brazil_lacerda_imp.48.t: "This Very Night"
brazil_lacerda_imp.48.desc: "BURNIER DEAD was the first headline in the newly-opened Tribuna da Imprensa. In addition to whatever other diktats Médici had, he had also ordered the staff and journalists of Lacerda's newspaper back to work—clearly attempting to curry favor. Reading the article, Cardinal Eugênio de Araújo Sales, Archbishop of São Sebastião, felt himself overheating and had to bite off several curses.\n\nAt the next Mass, the Metropolitan Cathedral was packed as had become the norm in recent days. Waving the newspaper around during the homily, Sales cried out: "Our brave soldiers have made us so proud with how finely they twiddle their thumbs! Well done, the Brazilian Armed Forces—creating a problem at the cost of countless innocent lives ruined or ended, then solving it themselves!" Contemptuous laughter and shouts of disgust from the congregation.\n\n"The city was too communist, too red, so Burnier bled it white! The poor and helpless were too miserable; there was a threat of subversion. So they were slaughtered on false pretences, right there where Christ the Redeemer Himself could see them bleed out. Oh, well done, good and faithful servants; enter into the joy of your crow-mauler of a master!"\n\nRage for God's house and people consumed the cardinal. He slammed his fist on the pulpit until it bled. "And why did all this devilry take place? Anarchy had to be prevented, so they let João Paulo Burnier create anarchy! That was their way to drive the Bolsheviks out of this city! So 'soul, take your rest; eat, drink, be merry': the Reds are gone! Not in hiding, not martyrized! All gone!"\n\nTears, laughter, and rage abounded as he continued on. At last Sales' voice became deathly quiet. The parishioners strained to hear his words. "Brothers and sisters, for such loyal service there is but one reward." In a mere whisper: "It is written: 'You fool! This very night your life will be demanded of you.'""
brazil_lacerda_imp.48.a: "In a sight never seen before in the Cathedral, the parishioners rose and shouted their approval."

brazil_lacerda_imp.49.t: "Dies Irae"
brazil_lacerda_imp.49.desc: "Hélio Beltrão was one of the last survivors from Lacerda's 1965 cabinet, and was determined to keep surviving. Now, his career hung in the balance as he entered Carlos Lacerda's office, clutching his hands to keep them from shaking. A gruff shout of "What the hell do you want?" served as the president's greeting.\n\n"Mr... Mr. President." Beltrão began, looking up at a disheveled Lacerda. "We're experiencing an oil shock.. The Middle East is at war... our oil imports are gone." He watched Lacerda to gauge his reaction. The President narrowed his eyes.\n\n"I read the newspaper, Beltrão," Lacerda spat. "We'll open the reserves to get prices down. Do you have something else to say?"\n\nBeltrão swallowed nervously. "Mr... Mr. President... the economy..." He looked down at his feet. "We're headed for economic collapse... unemployment's going up... prices..." He didn't get to finish before the president started screaming at him.\n\n"God fucking damn it!" Lacerda leapt up from his chair, slamming his hands on his desk. "I can't take it anymore!" Beltrão slowly took steps toward the door. Lacerda shoved all the papers off his desk; his words became more incoherent. "Arabs, can't keep themselves together...greedy bastards can't take a hike in gas prices...This is your job Beltrão, fix it now!""
brazil_lacerda_imp.49.a: "An Army officer escorted Beltrão out before the staplers flew."

brazil_lacerda_imp.50.t: "Mea Culpa"
brazil_lacerda_imp.50.desc: "It was all coming to an end. This time, it really was. A shaking, uneasy hand groped against the carpeting of his dimly lit office in search of the bottle. No, he thought. The hand went still. Nothing could purge the sour taste in his mouth, no matter how much he tried to drown it. Lacerda dreaded the day he would face judgment for what he had wrought for Brazil—no amount of personal bargaining to either himself or his immediate staff could change this—for that would be his lowest point. His final defeat.\n\nAnd so, prostrate, he lay upon the floor of his office, surrounded by the discarded papers and shattered glass of a previously fitful rage. In his head, the same voice echoed and spattered against the halls of his mind: Lott, the self-righteous bastard, and the warnings he had voiced so long ago regarding Brazil's ever-increasing instability. He always spoke with this subtle tone of disgust that weaved between his words; it sickened and annoyed Lacerda greatly, no matter how true they might have proven to become. "Dire consequences," he would prattle, "may soon follow if the course of Brazil's leadership does not radically change."\n\nA quiet groan came from Lacerda, whose eyes soon fell upon a cracked framed portrait upon the floor. It was of him and Letícia, taken during a holiday in Montevideo some years ago. He exhaled sharply at the memory before breaking into bitter laughter. He could deny it all he wanted, yet the consequences Lott had warned of now rested upon his shoulders. He chose to ignore him, and now all of Brazil would pay the price; a lamb bleeding upon the altar, with Lacerda clutching its dagger. The question now, of course, was simple.\n\nWho was the greater fool: Lacerda, for denying Lott's counsel, or Lott and his men for even trying at all?"
brazil_lacerda_imp.50.a: "Between intermittent chuckles, there came weeping."

brazil_lacerda_imp.51.t: "O, I Die, Horatio"
brazil_lacerda_imp.51.desc: "José de Magalhães Pinto, second President of the Federative Republic of Brazil, was sworn into office in the Palácio do Planalto itself, surrounded by concentric circles of barbed wire and armed soldiers in pillboxes. None were present but a judge, the general staff, and a few Udenist legislators. There was no ceremony, no celebration, nothing—not even a dinner. The investiture was not broadcast.\n\nCarlos Frederico Werneck de Lacerda packed up his things and left the Planalto Palace via a side entrance after an almost perfunctory, hollow talk with Magalhães Pinto. Leaving, he did not look back. As the now-former President approached Guanabara, contrition took hold. "What was I blaming Vargas for? What fault did Jango really have? What have I—"\n\nWhen the convoy entered Rio, a colonel opened the car door and blanched. The former President was rocking back and forth in the passenger seat praying the Rosary. Their fear deepened when Lacerda reached the Tribuna da Imprensa, shoved the rosary beads in his pocket, and swore at "the stupid fucking brown-noser Médici" in front of its door.\n\nLacerda then sent everyone away; nine degrees of his kindred were sent on flights away from Brazil at his own expense. They were followed by all his staffers. This process took several days of frenetic preparation and arguments, but the man that had bulldozed Brazil as it once was bulldozed all objections and sent his loved ones and friends away. He would face it all alone.\n\nAt last Lacerda went to his empty house; even the servants had been sent away with his blessing. He looked out the window and blanched at what he saw: the ruined buildings and people being dragged away by jackboots. "My God! Was this all Burnier's—no, my—doing? I..." Kneeling on a cushion facing outward, Lacerda resumed his prayers, his hands shaking violently as he shifted his fingers between the beads with each Ave Maria."
brazil_lacerda_imp.51.a: "The rest is silence."

brazil_lacerda_imp.52.t: "The Holes In His Thesis"
brazil_lacerda_imp.52.desc: "Few were surprised as another brigade of helicopters flew over Água Limpa, but few remained still as it began to fire on the village itself. An order on the map had warned of a small communist presence in the village, telling them to take no prisoners. There had been a small handful of devotees beforehand, mostly operating between other twins, pitching limited battles against individual soldiers. But between the smouldering ruins of farmland and housing, their ranks swelled to hundreds.\n\nFurther north, in Jacundá, Father Romeu Jesus Silveira preached words of fire at the pulpit. A fellow bishop, and a good friend of his, had been among those rounded up on charges of sympathies to communism by the military, massacred without so much as a show trial. His sermon rapidly turned political, praising Jesus and mocking Lacerda in equal measure. The diocese did not back opposing Lamarca, and so he filled the gaps, turning to tepid praise of a man fighting, like the prophets of yore, against injustice.\n\nFurther inland, outside of Bacabal, Benedito Rezende Dias watched the movement of new vehicles inland. He would not be questioned, of course, they presumed he was a simple construction worker, itinerant and moving between what jobs survived the latest rounds of attacks. Soon, he knew that they would return to a new bombing route, one with only loose instruction, an exercise in bourgeois fear. Finally, he turned to his bag, rummaging through for supplies. The local army was long overdue for sabotage.\n\nIn Brasília, generals goose-stepped across rooms to compile lists of new reports. Records on declining ordnance reserves came between surges in recruitment for Lamarca and warnings of reduced army mobility in regions affected by bombings. They painted a clear picture. With each attack, and for each militant injured by shrapnel, the situation only got worse for the Brazilian military. And with each stratagem, only withdrawal became more appealing."
brazil_lacerda_imp.52.a: "And yet, enamoured by their new orthodoxy, the bombing rounds continued."

brazil_lacerda_imp.53.t: "The Lone and Level Sands"
brazil_lacerda_imp.53.desc: "The reports actually came in over the course of several days, but given the course of the recent past, it seemed like they came in one right after the other. In the west, communist guerillas had lost many of their main bases, with most of their key braintrust either killed in action or safely in custody. Cities and villages where police feared to show their face saw officers in uniform working without fear. Lacerda's associates began reaching out to him, no longer hiding their support for fear of an assassination or bombing. Journalists at the Tribuna da Imprensa reported that the streets in Rio were free from redshirt intimidation and even the protests had largely quieted down, with most of their supporters abandoning the cause.\n\nIndeed, the public squares were replaced by a new type of demonstration. Signs in support of Lacerda's actions against the communists, and support for the UDN's efforts to safeguard Brazil. "People's warfare kills people," was the mantra making the rounds from city squares to the favelas. The communists were killing them, demanding that they die to ennoble themselves as masters of the world, with no gods nor kings except them. The war of public opinion had won, and Lacerda stood alone.\n\nAs Lacerda sat in his office, eating his lunch and idly leafing through the reports, it had finally hit him, and he dropped his fork on the table in surprise. He had won, conclusively and decisively. "Canaan has fallen. Ashekelon is devastated," he said, idly remembering something from his university days. "Vargas has been surpassed and Gomes's failure avenged." In the empty office, a small part of Lacerda's brain said that he should be cheering, but the rest seemed to just ponder the depth of his success, and wonder why more of him wasn't as animated as that small part."
brazil_lacerda_imp.53.a: "The summit of the mountain is hollow."

brazil_lacerda_imp.54.t: "Endangered"
brazil_lacerda_imp.54.desc: "The Amazonist lieutenant hissed insults in a fit of blind rage at the village headman. The headman only blinked, waiting for him to finish his rant. "When you are finished, tell your men to pack their things and leave," the headman stated, deadpan. "We are giving you this opportunity to run. Otherwise, we will call the soldiers." The Lieutenant glared with bloodshot eyes, but stood up, kicking the seat aside, muttering something about backwards tribalists.\n\nOn a Veracruz Pact smuggling route, a terrified truck driver came to a stop at gunpoint. "Hands! Hands!" The driver raised two trembling hands as the Brazilian soldiers marched up to his window. He felt extra weight on his truck bed as more men came aboard to search his cargo. He heard something about finding rifles, and he knew he was finished. In the blink of an eye, he was dragged out of the truck, begging for mercy.\n\nIn another part of the Amazon, two officers watched a massacre unfold. "Welcome back to the army, Captain Borges." Captain Reyes grinned, clapping his counterpart on the back. The first time the two captains met, Reyes nearly gunned him down—he was a known defector to the Amazonists. Thankfully, Reyes' brief hesitance allowed Borges to explain how he and his men wanted to return. As a sign of loyalty, they pointed them toward a rebel camp. Now, the two Captains watched the survivors get dragged away into the forest by their combined soldiers. "I speak for us all when I say we're glad for your return." Borges offered a weak smile in return."
brazil_lacerda_imp.54.a: ""I hope I may be forgiven for my treason.""

brazil_lacerda_imp.55.t: "Dry Papers"
brazil_lacerda_imp.55.desc: "There was something strange about this morning's newspaper. Carlos Lacerda turned through its pages, trying to determine what it was. News about construction projects in Rio, the latest sports scores, and then the international section. Yes, that was it. Nothing was wrong. Usually, there would be some sort of scalding criticism of his administration, both from the PTB and from dissidents in the UDN.\n\nThe President put the newspaper down, turning his seat to face out the window of his office. Things were quiet these days- with even Juarez Távora acting friendlier toward the administration. Nothing heard from Goulart, Edna, or even Brizola. It seems like whatever they said wasn't deemed important enough to be reported to Lacerda.\n\nWhat was Samuel Wainer writing these days? It didn't matter. No matter what he published, it wouldn't be any real threat to Lacerda or the UDN anymore. This wonderful silence was cause for celebration. Not with fine liquor, but for water from Brazil's own mineral springs."
brazil_lacerda_imp.55.a: "He needed a clear mind to savour his hard-earned peace."

brazil_lacerda_imp.56.t: "Leaps and Strides of Faith"
brazil_lacerda_imp.56.desc: ""...Just in the past few years, we have made leaps and strides to make the whole world envy- argh, it's droning on too long, we need a break somewhere." That was the fifth time he had done that today. Esther was typically the more patient of the two of them, but today it felt like they had switched roles. Surely he could just let someone else write the whole thing?\n\nLacerda watched her discard another almost untouched piece of paper, then his face lit up like a lightbulb. "How about this..." his mouth stood agape for a couple of moments, as he shuffled the paperweights on his desk, almost as if they, too, ought to listen.\n\n"In the last five years alone, this land has been utterly transformed, and much to its advantage. For of all that I have understood from my exchanges with you, the people of Brazil, it is that even in times of trouble, even when our faith in our nation and in ourselves was tested, we have stood firm, and we have stepped forward. We have made strides, but we must make yet more, not stand still: that is what I have every confidence that Raphael Magalhães will do."\n\nHe positively beamed, waiting for Esther's fingers to finish thundering across the typewriter. She looked at it skeptically, worried that her boss would once again decree that the draft be cast into the pile. Instead, he maintained it for almost an eerie duration as he read through the copy of his recently-uttered words, and enthusiastically drifted the pen around as he signed it.\n\nWell, at least he's happy with it, she mused. Here he was, presenting his successor with the air of a Roman emperor, even while all the arms were still pointed at the state. Hopefully the men with those arms were happy with his scheme too."
brazil_lacerda_imp.56.a: "There would be hell to pay for if not."

brazil_lacerda_imp.57.t: "Nought's Had"
brazil_lacerda_imp.57.desc: "Lacerda sputtered. "What do you mean, no? Why wouldn't Raphael Magalhães be suitable?"\n\nCosta e Silva and Médici looked at each other, then at Lacerda. They then laughed at him for about fifteen seconds before Médici elaborated. "Mr. President, are you drunk out of your mind, or just especially stupid today?" Lacerda almost puffed up in outrage, which added to the generals' hilarity. "Pfft—ha, ha, ha, just look at him. See here, Mr. President, you like Magalhães so much but you're practically alone in that sentiment, aside from the stupidest 20% or so of the UDN. He's just you without any energy."\n\n"But—"\n\nWith a condescending smirk on his face, Costa e Silva took up the argument. "And look what you in your infinite wisdom managed to pull off! General strikes all over the place. Trade unionists besieging government buildings. Civil wars in a party controlling the entire Brazilian legislature. Almost handing over power to the goddamn communists! How on earth did you manage to almost fritter away that many advantages?"\n\n"I—"\n\nMédici dealt the finishing blow as Costa e Silva, realizing just how close things had come to a disaster, stopped smirking and rubbed his temples. "As such, Mr. Lacerda, the military is united in making sure you have no, repeat, no influence over the choice of your successor. We have reached a decision: it will be retired Major Ney Braga, Governor of Paraná, who will run for office."\n\nThe red-faced Carlos Lacerda, taken down several pegs, had only more incoherent sputtering for an answer."
brazil_lacerda_imp.57.a: "It was all Médici could do not to tell Lacerda to get out of his office."

brazil_lacerda_imp.58.t: "Consolation"
brazil_lacerda_imp.58.desc: "When Magalhães had finally found Lacerda, the president had grown no calmer, furiously wringing his hands in a vain attempt to rid himself of the humiliation he had received at Médici's hands. He had stopped ranting to himself, but that was perhaps the only improvement to his previous state. Magalhães approached Lacerda with a sigh and a look of concern. "What's the matter, Carlos?"\n\nLacerda popped his head up quickly, but his features softened on seeing Magalhães. "Raphael, didn't you hear? The generals denied you the Presidency."\n\nMagalhães nodded. "I did." Lacerda got up from his chair, his face apologetic, but Raphael stopped him before he could say anything. "No need to say anything. Perhaps it's a blessing in disguise. The position isn't all it's cracked up to be; after all, look at what it did to you. You look like you've aged fifteen years; your nerves are frayed. It has to be torture."\n\n"Still, I thought you could have..."\n\n"No need to worry about that. It's not like they've gone out and found the second Goulart. Ney Braga isn't some Amazonas goon, he's a safe pair of hands that we can all rely on. I say this as your friend, Carlos. You need to pick yourself, stop feeling sorry for yourself, and count your blessings."\n\nLacerda thought for a moment as Magalhães left the room. The General Strike was over, Goulart couldn't ruin the country, the communists had been driven from their warrens in the countryside. Maybe Raphael was right, this position was destroying his mind. The man before the presidency would have taken pride in just one of those accomplishments, and all the man he was could seem to do was be angry that he couldn't have any more."
brazil_lacerda_imp.58.a: ""Count my blessings, huh?""

brazil_lacerda_imp.59.t: "Where the Parrots Fly"
brazil_lacerda_imp.59.desc: ""General Médici," said Lacerda's voice, "how's the hunt?"\n\nIn a command tent at the edge of Araguaia's jungles, Médici cradled a receiver against his sweat-sheen face. "Troops have been deployed in the interior, and we're discovering new cells every day." He looked towards the entrance of his tent; if he opened it, he would see the soldiers drilling, honing themselves for further operations. "They're keeping in shape, and time in the jungle has given them crucial experience. When the time comes, we'll be able to rout the communists."\n\n"Good. Good." Lacerda's voice seemed distant, and Médici held his breath. "General, I think it may be time to think in terms beyond reconnaissance. Decisive blows are needed. The chaos in this country has exceeded what the public will stomach, and we need to bring our boys out of the jungle as soon as possible."\n\nMédici exhaled away from the receiver. "I understand, Mr. President. We may be able to expedite an offensive for next month, once we've confirmed the location of—"\n\n"Next month? Too late, too late. Subversion in this country is already unacceptably high. Decisive action, General. We need decisive action."\n\nMédici felt something sharp between his shoulders and chest. Outside, the camp was better suited to the conditions than the start of this mess, but they were still inefficient. Patrols lost their way more times than anyone cared to admit. Excess fuel consumption remained a problem for the convoys, and intelligence reports, however succinct, had thin gaps between the actionable knowledge through which entire companies could fall into and disappear."
brazil_lacerda_imp.59.a: "But the president wanted decisive action."

brazil_lacerda_imp.60.t: "How the Parrots Die"
brazil_lacerda_imp.60.desc: "General Médici tried to stifle his nerves. At the base camp on the edge of the jungle, soldiers in their barracks stirred with rumours and uncertainty. The jungle before them was a thick mass of green hiding reds, and though they'd cut through it over the past few months, their blades were seen by Brasília as too dull and short. So Médici waited outside, seeing a new convoy arrive, twenty trucks bearing death.\n\nThe soldiers guided them through the gates, directed them to new facilities, and waved them down to park in a disused corner where they could do the least harm. From the first convoy stepped out the commander of this battalion: a thick-necked parody of a military officer with eyes ill-fitting of the stereotype: beady and cunning, rodential. He jumped out of his truck, offered his hand to Médici, who shook it firmly.\n\n"Captain, glad you could join us," said Médici. "Your boys have jungle experience?"\n\n"In the Amazon, General. Commie hunts, just like this one. We dealt with them there, we'll deal with them here." Médici waved to his east and silently beckoned the spec ops officer to walk with him. "So," continued the officer, "you found their hiding place and now we get to deal with him."\n\n"Yes," he said, passing by soldiers on maintenance, patrol, smoke break. "It's a hammer and anvil plan. The bulk of our forces will be concentrated south. You'll sweep through from the north, targeting key officers. Amazonas himself should be your priority. Once the base is compromised, the guerrillas will try to retreat south. We'll be waiting for them."\n\nThe officer chuckled, drawing a cigarette from his fatigues. "We'll save some for you, General. Don't you and your boys worry about that.""
brazil_lacerda_imp.60.a: "Médici hoped the plan was solid enough. He wondered if it truly was."

brazil_lacerda_imp.61.t: "Settled"
brazil_lacerda_imp.61.desc: "Lacerda felt like celebrating after hearing the latest report. Almost all of Araguaia was finally back under military control. The special operations battalion had reported successful raids on most of Amazonas's facilities. They had even found his command headquarters, though the rat had managed to abandon the facility and flee into the wilderness before they could approach. The men had pursued and had killed several of his key lieutenants and closest friends, though the man himself escaped despite the furious pursuit. Most of the guerrillas weren't so lucky - within 96 hours of the initial operation, the lieutenant colonel had reported that they had confirmed the deaths of approximately 75% of the main guerrilla force. Many of Amazonas's faithful had opted to commit suicide rather than face capture.\n\nLacerda's first instinct was irritation. After all this, Amazonas had escaped after all? After all that effort, through the setbacks and successes, Amazonas couldn't face righteous judgment. He wouldn't be able to tell the Brazilian people that the architect for all the death and destruction had reaped that which he had spent his entire adult life sowing? Why couldn't he grasp a single, decisive victory? Why did every prize he earned seem to fall to dust the moment he took it? Was there a leak somewhere? A traitor? Or was he just cursed?\n\nHe sighed, then he thought back to that moment with Raphael. Sitting, fuming, and then a friend came to him. The presidency was destroying his brain. His troops had successfully defended the nation from the communist threat. The red menace may have not lost its head, but it had lost its arms and legs, and could do nothing. Amazonas has led his people to ruin, and all who knew would know that following him was punching their ticket to hell. The man lived to see the disaster he had wrought. He had lost an army. He would not gain another."
brazil_lacerda_imp.61.a: "Lacerda forced a smile, and counted another blessing."

brazil_lacerda_imp.62.t: "Do Not Fear Them; Pity Them"
brazil_lacerda_imp.62.desc: "Hundreds gathered at a public park in Rio, a sea of angry voices and furious placards. They spoke in vague terms, never naming and shaming, merely angry laments for the future of Brazil. Inside the crowd, there was an agitated shifting in place. Surrounding them were cars and clubs; a police cordon formed around the park, leaving only one point of egress open so that the faces who came in and out could be photographed for future reference.\n\nNormally, Carlos Lacerda stood as far away from these moments as possible; past experience had taught him to be conscious of those who hated him in public. But he had taken a meeting at a state office and found himself at the building opposite the park, and even from the sixth floor he could see the gathering. On his order, a bodyguard flagged down an officer, and he went back to Lacerda with his report. "Blowing off steam," they said.\n\nWhen the meeting was done, Lacerda hung around to watch the proceedings from his distance. He felt a brief sympathy for them, recalling his own hand at public demonstrations during the Vargas era. He could not see their faces but the bodyguard had brought back surveillance reports. Dozens, old and young, trudged through the gates. Placards with meaningless slogans, mere grumblings of dissatisfaction. It all felt so feeble, so weak, that he did not bother to call for their removal.\n\nWhat would be the point? A feeble fire in the rain. They called for new leadership, but nobody here would put their name forward. They called for an end to oppression, but dared not name Lacerda or the UDN. They wanted something different, but to speak it would invite the wrath of what was present. Lacerda understood why the police let this go ahead; better a vague protest than a concentrated one. All the while, the future of this country was being guided by safer hands, a delicate dance of pressure exerted upon Brazil by the UDN's gentle, experienced touch."
brazil_lacerda_imp.62.a: "Lacerda forgot all about the protest when he was back in the palace."

brazil_lacerda_imp.63.t: "Temptation"
brazil_lacerda_imp.63.desc: "He had to read through the copies again. It was too good to be true. Juscelino Kubitschek was sleeping with other women- and Carlos Lacerda had concrete proof of it in his hands. First, there were letters sent from Kubitschek to his mistress, under an alias of course.\n\nFlight logs and hotel records corroborated these letters. "Mr. Joaquim Lopes" was to meet the woman in São Paulo the same time Kubitschek booked a hotel there. Kubitschek left his hotel room an hour before his meeting with the mistress. "Mr. Lopes" promised to bring fine wine, and a liquor store employee saw Kubitschek enter the store thirty minutes before the meeting time.\n\nLacerda smirked, dropping the letters back onto his desk. This wasn't the work of the military, or even Golbery's boys. His own journalists and colleagues at the Tribuna da Imprensa brought him this delightful news.\n\nLacerda took some liquor and poured it into a glass. This was a call for celebration, after all. He all but murdered one of his biggest rivals. As he drank, he couldn't help but feel a little dirty. It was Kubitschek's personal business after all. Lacerda shook this feeling off. Kubitschek only had himself to blame for the consequences of his temptation. The President raised a toast to himself, and to his rival."
brazil_lacerda_imp.63.a: ""Thank you for your infidelity, Juscelino.""

brazil_lacerda_imp.64.t: "Losing Fifty Years in Five"
brazil_lacerda_imp.64.desc: ""More fallout today following the bombshell exclusive report brought to you from us at TV Globo. Juscelino Kubitschek, disgraced former President of Brazil, has been sued for divorce by his wife Sara on the grounds of infidelity. The court case cited multiple reports of infidelity, and the judge in the case wasted no time granting full custody of the couple's two children to Sara. According to the judge's statement on the case, the evidence was clear and overwhelming, and that his decision was made in the interest of the children's health and welfare."\n\n"The PSD has distanced themselves from their one-time leader after numerous corruption scandals came to light following our exclusive report. In a recent statement, the PSD was quoted as saying: 'We feel deeply betrayed by the personal and professional misconduct of Senor Kubitschek. Those are not the values that we as a party embody, and we will endeavor to lead by example with new figures in our party.' Other parties accuse the PSD of having knowledge of Kubitschek's corruption and covering it up for personal and political gain, such accusations have yet to be proven, but the public expresses strong support for an official inquiry to determine the extent of the corruption for other PSD political officials. The UDN has given no word on any future inquiries, but they did issue a number of statements expressing their disgust and their support for the Brazilian people in their moment of outrage."\n\n"Archbishop Augusto Álvaro da Silva issued a stunning condemnation two Sundays ago during his homily in Bahia. He urged Brazilians everywhere to stand up for morality and living a virtuous life free from sin. This sentiment has resounded in churches across the country, with public church demonstrations calling for a return to decency in public life to serve as an example for all Brazilian citizens."\n\n"For more on this issue and other breaking news across Brazil, keep tuned to TV Globo.""
brazil_lacerda_imp.64.a: "Rumor had it Kubitschek was last seen in Mexico, drowning his sorrows in mezcal."

brazil_lacerda_imp.65.t: "Sing Our Tune, Dear Bird"
brazil_lacerda_imp.65.desc: "His bodyguards protested, but Carlos Lacerda insisted on meeting Tancredo Neves where he sat. There was no sense in him going to the Planalto like a supplicant before a king; "that sets the wrong message." Lacerda stared out the window of his car as he spoke. "It's important that we acknowledge the PSD, even now." Outside, the streets were still. Pedestrians stopped where the convoy rolled through.\n\nInside the PSD's national office, Lacerda saw through the ranks of bodyguards that surrounded him crestfallen faces, dour party hacks buried into their work, empty spaces on the wall where their disgraced leader's campaign material was once framed. Waiting for Neves outside his office, giving him this small impression of control, Lacerda stared at a campaign poster of Henrique Lott's 1960 campaign. Lott's face beamed against the poster's faded colours.\n\nNeves opened the door and waved Lacerda in. The two shook hands, exchanged greetings. As the door behind them shut, Neves took a seat and Lacerda remained standing.\n\n"Deputy Neves," said Lacerda, "I came to assure you of my intentions. Despite this... unfortunate business, I have no intention of subverting our country's democratic processes."\n\nNeves nodded. "I assure you, Mr. President, nobody here suggests you have anything less than the health of our political institutions in mind."\n\nA small resistance, a mosquito's bite, so small that Lacerda didn't feel it. "Of course, the voters are free to make up their own minds about Kubitschek's lack of fidelity. We've both seen the polls. I just came to assure you that I do not feel the PSD warrants the kind of scrutiny that I assigned to the PTB." He nodded, giving a smile that hid his teeth. "I look forward to seeing your party's name on the ballot.""
brazil_lacerda_imp.65.a: "You're not evil. You're just weak. And I need weak men to oppose me."

brazil_lacerda_imp.66.t: "The Crow Flies"
brazil_lacerda_imp.66.desc: "The last few days were exhausting for Carlos Lacerda, his face sore from smiling for the constant throng of journalists. He enjoyed every second of it. The second he disembarked from the aircraft that took him from Brasília to Washington, he was whisked away to a meeting with the President. The meeting couldn't have gone smoother for Lacerda, with the news cameras capturing every second.\n\nNext, it was an address to the joint houses of Congress. There, Lacerda made the same pledges as he did to the President the day before, all in fluent English. Continued cooperation between North and South America, mutual economic prosperity, and defeat of enemies back home. When he finished, he was greeted by rapturous applause. Some of the congressmen were enthusiastic, others had looks of disgust on their faces, poorly concealed by their polite clapping.\n\nIt was now the third day of the trip, and Lacerda was seated in a comfortable armchair. For the past hour, he was interviewed by Bill Buckley on his show- Firing Line. Something nagged at the Crow during the interview, but he waited until the cameras were out to ask. "Mr. Buckley, it seems there aren't many neutral opinions on me here in the states." The President remarked. "Either, I am a savior or a demon." Buckley huffed in laughter.\n\n"Mr. Lacerda, a strongman like yourself can't be anything other than polarizing here in the states." He explained. "Some people see your actions as necessary for your continued success. Others are more bleeding hearts, who nag about your methods."\n\nLacerda nodded slowly, before rising to shake hands with his interviewer. Quite a few congressmen were the "bleeding hearts" that Buckley described."
brazil_lacerda_imp.66.a: ""I hope those critics won't cause trouble down the line.""

brazil_lacerda_imp.67.t: "The Special Relationship"
brazil_lacerda_imp.67.desc: "President of the Republic of Brazil Carlos Lacerda had a smile that stretched from ear to ear as he finished signing the leather bound document to finalize the Special Relationship with the United States of America. Beside him, President [USA.GetLeader] finished signing their document, before standing up, handing over his piece of parchment as Lacerda handed over his, and the two shook hands. Camera flashes filled the East Room of the White House, and both Presidents smiled for the cameras.\n\n"Brazil and the United States are closer than ever before; closer than any two countries can be," Lacerda said to the reporters and the TV cameras that filmed the historic event, after his American counterpart gave their own comments. "Our two great nations of both the North and South, are united in our shared goal in defending the freedom and liberty of all in the Western Hemisphere. Together, as friends and partners, we will go forward and keep the Americas free."\n\nThere was a round of polite applause as Lacerda smiled to the cameras, and leaned over to give a friendly hug to [USA.GetLeader].\n\nBack home, politicos and editors were giving their opinions; that was just a cynical ploy to keep the Yankees happy, selling out to the United States, forever subserving themselves to the whims of whoever was currently in the White House.\n\nBut Lacerda was 6800 kilometers away right now, and even if he heard them, he wouldn't have cared."
brazil_lacerda_imp.67.a: "I count myself in nothing else so happy as in a soul remembering my good friends."

brazil_lacerda_imp.68.t: "In Concert"
brazil_lacerda_imp.68.desc: "The UDN conference thundered with applause as Lacerda took the stage. The announcer had introduced the President with a new title, the "Conqueror of the Communists." To hear the applause, Lacerda must have single-handedly strode into the wilderness, emerging shirtless and dragging a column of prisoners by a rope held in his teeth. Lacerda drank in the spectacle, for all the days where he had to sit and stew, these days were ones that he could take it and enjoy to their fullest.\n\nWhile it didn't earn him as grandiose a title as Conqueror, Lacerda took perhaps even more pride in the fact that under his leadership, the UDN had finally been unified. Almost every member of the party had turned up to the conference, that hadn't happened since its founding back in 1945. The votes in the National Congress were consistent and reliable. UDN motions would pass through both houses of Congress with a minimum of complaint, and any opposition bills could be safely quashed or incorporated into UDN initiatives as Lacerda and the party preferred. It was truly marvelous to see the party in action, and in the noise, Lacerda could at last feel the stress leaving his body. In these moments, he was both the President with the country behind him, and a little boy with the future ahead of him, and he couldn't help but smile.\n\nJuarez Távora may have been applauding, but he certainly wasn't smiling. On the surface, it appeared that this would be everything that the party would want - a united legislature, an active executive, and a great victory to sell to the people. But how long would this last, and what did it cost them, when all was said and done? The fallout from all of this had yet to be felt, but Távora knew that it could easily engulf everything the UDN could have ever accomplished. In ten years, would Lacerda be looked at by another president the same way Lacerda looked at Vargas? And where would Távora be? Would he be forced into the wilderness, or, possibly worse, would he be forced to clean up the same messes again, a dirty chorus in the song of his life."
brazil_lacerda_imp.68.a: "The music changes, but the dance remains."

brazil_lacerda_imp.69.t: "Missing the Moment"
brazil_lacerda_imp.69.desc: "Delfim Netto had finished his report. Inflation had finally been tamed, and with the exception of Lacerda, the chamber seemed to treat the entire affair with polite, disinterested applause. Lacerda could scarcely believe it. Kubitschek's legacy had finally been erased, and Brazil had finally broken free from the shackles of debt, and yet no one could be bothered to care.\n\n"What did this program of austerity cost the middle class and the working Brazilian?" came a question from the opposition. Delfim gave a muted answer about inflation eroding the purchasing power of poorer Brazilians, to no one's great satisfaction. The generals' eyes were glazed over, barely paying attention beyond basic decorum.\n\nEven the UDN, Lacerda's very own party, couldn't seem to care. Half of the party exhibited no surprise of any kind. They must have already known the results and didn't seem to give a damn. The other half matched the generals' polite disinterest. This moment of significant importance was simply left like another line item.\n\n50 years in five, Kubitschek had said, and all Brazil had to show for it was 100 years of debt. Lacerda had pushed and prodded to put inflation under control, to give Brazil an economic future, and no one cared! He frowned, how could anyone not notice what was happening? Did they simply feel so burned out by the campaign in Araguaia or the General Strike that they missed it? How could they though? 100 years of debt erased in ten, twice the accomplishment with twice the reward, and Brazil's political elite just simply let it pass them by."
brazil_lacerda_imp.69.a: "The president stewed, steeped in silence."

brazil_lacerda_imp.70.t: "Green is Green"
brazil_lacerda_imp.70.desc: ""Very well gentlemen, let me hear what you have." Beltrão and Médici had been pressing to gain some time in Lacerda's busy schedule to discuss their plans for commercializing the Brazilian interior. Lacerda had been interested, but it always seemed to be the wrong time - there was always a more pressing issue somewhere, and their plans had seemed too focused in the future that seemed tenuous at best. Now, however, with the future secured, Lacerda could look toward the horizon.\n\n"Ideally, we can prospect for oil and natural gas in the Brazilian interior. Our geological estimates do indicate that there is a wealth of energy resources as outlined on the map on page four. Domestically-produced fuel would drastically decrease energy costs for the nation and provide a sizable amount of steady, well-paying jobs. Other rare natural resources are dispersed throughout the region. Infrastructure will be difficult, but we have plenty of seed investment and we can expect a positive return on our investment in the medium term. Itamaraty and the Ministry of Trade are fully on board, we can find the foreign partners and expertise we need."\n\n"There's also advantages to military facilities in the area. Besides the obvious protection of our border, having camps that far in can be used for jungle training and our special forces. And if there were any subversive elements, no matter if they're indigenous or funded by the Reich, we can combat them more effectively by ensuring we have a presence in the interior."\n\nIt sounded like they were overpromising, but Lacerda understood the need for security. By hook and by crook, Brazil's interior would be opened up to the light of day, and the light of trade."
brazil_lacerda_imp.70.a: "Like any nut, the tougher the shell, the sweeter the center."

brazil_lacerda_imp.71.t: "Leave Me Speechless"
brazil_lacerda_imp.71.desc: "The city was quiet at night for the first time in a long time. The fires against the Fifth Republic had burned themselves out, the election had been called, and the future was as clear as the night sky. Lacerda looked out over Brasília from his balcony. All of his family were asleep, and yet he found himself possessed of unusual energy. He grabbed some flowers from the planters next to him, took a folding chair under his arm, and went downstairs to summon one of the fresh-faced young members of the Presidential Guard that had served as his drivers. To the poor lad's confusion, he ordered him to load the chair in the trunk and drive to the cemetery; he wanted to go to Vargas's mausoleum.\n\nAs the car wound through the streets, Lacerda wondered what to say to his deceased rival. Should he laugh? Should he strike a single slash on his headstone to mark the final tally - Lacerda one, Vargas nil? The car sped off to a quiet night, no riots, no protests, no poppets of Lacerda burning in effigy. This was his victory, even more so than becoming President. Any fool could take the top office, it took a true visionary to reshape the country and leave a legacy.\n\nAs he got out toward the empty cemetery, he ordered the driver to find something to eat for the two of them. Alone, Lacerda unfolded the chair and stared at the headstone, and a lump welled in his throat. He made the sign of the Cross and clasped his hands, waiting for the words to come out. As they hung in his throat, Lacerda thought about the past. His opposition to Vargas and how close he came to death. The sudden reversal of their fortunes, with Lacerda the President and Vargas the oppositional semi-outlaw. It was a twist too poetic; it'd be a hackneyed story if it were fiction.\n\nVargas was dead and he was here. It was neither fulfilling nor painful, it simply was. The words didn't hang in his throat because they were difficult to say. They hung there because they realized they simply could not be. Nothing was sufficient. The moment was simply there, for only God and Lacerda to witness."
brazil_lacerda_imp.71.a: "Lacerda felt the need to pray."

brazil_lacerda_imp.72.t: "The City on the Hill"
brazil_lacerda_imp.72.desc: "The warm evening air felt like a blanket upon Carlos' skin, his lounging form finally able to experience some time alone after what felt like eternity. He sat upon his balcony, the city before him, watching it pass by. Sleep, invited by the night's drinking and eating, beckoned him but he remained yet free of its embrace. He could only look at the City.\n\nIn the pit of his stomach, he felt uneasy, the prospect of leaving was something that scared him. He was not fool enough to lie to himself - someone else may have done it wrong. Someone yet may still do it wrong. He'd tried to put such concerns aside for this vacation but now, as the murmuring Rio sounds below him voiced a city forever changed, his tired mind was awash with thoughts.\n\nThe years had brought renewal. Was it worth it? Tonight he had feasted and danced - let himself go for the first time in years. Surrounded by family and friends, for once not caring about the tribulations tomorrow would bring or the weight yesterday carried. His eyes searched along the mountains behind the city, his eyes finding the illuminated symbol of Christ, his arms outstretched.\n\nCarlos' eyes pooled as he considered the symbol. Arms wide and accepting, looking upon both poor and rich, criminal and innocent with equal respect upon this City of God. He sat up and looked around at the skyline, bright lights of cars and buildings, their radiance visible into the sky above them, a soft golden haze that battled the oppressive night. Despite all his years of work, he had never felt so small, but he turned again to Christ.\n\n"Thank you," he said to it, a whispered prayer amidst the changed city. Carlos slumped back in his chair, his moment passed as the vacation's efforts finally drew him to rest.\n\n"
brazil_lacerda_imp.72.a: "His wife found him shortly after, snoring ugly and drooling upon the chair."

brazil_lacerda_imp.73.t: "The Velvet Sword of Damocles"
brazil_lacerda_imp.73.desc: "His sash had been given to Braga two hours ago, but Lacerda could still psychosomatically feel the weight of it. It had been a constant refrain of his presidency. From the highest highs to the lowest lows, that sash always felt like it was clipped around his chest even when it wasn't there. A lingering ghost to remind him of the heavy burden of the office. They said that the presidency changes a man, and perhaps that meant it made them at least a little mad.\n\nCountless photo ops and a surprisingly bland dinner despite the gravity of the event later, Lacerda made sure to find a quiet moment to spend with Braga. "The night finding you well, Braga?" Lacerda asked, sipping from a glass of wine in his hand.\n\n"Well enough, it's a momentous occasion. You look like you have some advice for me."\n\n"Well, you know it already, but I'll tell you anyway. Watch how much you give to the hardliners, and don't accede to their demands just because they're the military. You know not to trust them, but you have to know that they can't intimidate you. They'll take whatever you give them." Lacerda touched the sash around Braga's shoulder, then gave Braga a reassuring pat on the shoulder. "Remember, you're the President, not them."\n\n"You have my word. I have plans, and I will make sure I take your advice to heart."\n\nLacerda sighed with relief. The phantom sash unclipped itself from his chest, and Lacerda felt a hundred pounds lighter."
brazil_lacerda_imp.73.a: "His shoulders felt unburdened, and finally, he was simply Carlos Lacerda, the man."

brazil_lacerda_imp.74.t: "Janota Matreiro, II"
brazil_lacerda_imp.74.desc: "Juscelino Kubitschek blinked. The PARA-SAR agent paused. The two looked into each other's eyes, both considering the other unexpected. A single second stretched out between the two, linked by panic and fear.\n\nThen Kubitschek was on the floor. The PARA-SAR agent raised his gun; Ribeiro threw them both down to avoid the first flurry of bullets. There was a scream from the living room. Kubitschek got up, saw Pedroso grabbed by another PARA-SAR man. Then he was in the air, colliding with him, telling Pedroso to run. His perspective started to skip, a montage with a dozen ellipses. Images loosely connected: PARA-SAR through the windows, pistols drawn; Kubitschek running through the hallway, crouched low, dodging bullets; Ribeiro returning fire and covering his exit out of the apartment.\n\nThe three ran to the elevator. Pedroso hit the button for the basement; an errant bullet rang for the fifth floor. Luck held the elevator for them already, for the doors opened immediately. Kubitschek and Pedroso ran in and hid out of sight. Ribeiro expended his last bullets holding off PARA-SAR while the doors closed. Inside, tears flowed, sobs suppressed. It stalled at the fifth floor, precious seconds wasted, but the doors closed just as the fire escape door was kicked open.\n\nThe basement garage held Kubitschek's Ford, a luxury car that had survived the looting. Kubitschek swung the passenger door open, letting Pedroso go in first while Ribeiro fumbled around for the keys. The garage door was open—skid marks along the floor suggested hasty escapes they would join. Ribeiro hit the ignition and slammed his foot on the pedal as soon as the engine allowed.\n\nThey cleared the ramp up to the street, but in their haste they lost a critical moment. They failed to notice another car, and when it collided with them, Kubitschek's world went black."
brazil_lacerda_imp.74.a: "...sem a tua, sem a tua..."

brazil_lacerda_imp.75.t: "Janota Matreiro, III"
brazil_lacerda_imp.75.desc: "Kubitschek was folded over, half his body hanging out of the car. He lifted his body up with great effort and looked in front of him. Ribeiro's head hung loose, his chest caved in by the steering wheel. Pedroso's head limped over, shards of glass decorating her neck. His head was ringing, the world around him was blurry, he felt blood trickling down his body and he failed to move or feel his left arm.\n\nAnimal instinct took over. Kubitschek lifted his body up from the car, shambling away from the crash, trailing blood and glass. His world was a slideshow of five-second intervals, missing reels and blurring lights. His journey was short: he found himself stumbling into an alleyway, and as if he were a puppet whose strings snapped, he collapsed onto a pile of trash bags, sharp cardboard poking the wounds in his side.\n\nHis breathing was ragged, and his vision was fading. He looked around the alleyway. Someone from the shadows emerged: a street urchin, probably fleeing the cops too. He looked at Kubitschek, recognition in his eyes. From a poster, maybe. The boy took tentative steps towards him. Kubitschek realised he was mumbling a name the boy couldn't hear, and when he was close, Kubitschek grabbed his arm, yanked him closer.\n\n"Lacerda," he whispered. "Lacerda." His eyes were wide in anger, as if the sockets were never there. The boy stared at him for a moment, but yanked himself free and ran back into the darkness when others approached.\n\nFrom the light, two PARA-SAR men sauntered over to Kubitschek. One of them took out his pistol. "Hello, Governor. You know, I voted for you in the last election." He raised his pistol, pressed it against Kubitschek's head. "What a strange world, with such strange turns."\n\nKubitschek stared at him, glassy-eyed, without the strength to respond."
brazil_lacerda_imp.75.a: "...sem a tua companhia?"

brazil_lacerda_imp.76.t: "Blocks, Stones and Worse than Senseless Things"
brazil_lacerda_imp.76.desc: "The uniforms shuffled into the meeting room quietly, taking seats around the large table within and moving around the silent figure already sitting at its head and the small throng of generals behind him. He stared at them, fire in his eyes yet posed frozen as he watched them sit. Few of the newcomers could match the gaze, but fewer more wanted to meet the steely eyes of their superiors standing behind him.\n\nAfter a moment, the first salvo came. "Here, gentleman," said the man at the head gesturing to a folder before him, "is a report I was handed a few hours ago regarding the death of Kubitschek. I find that not only was it a tragedy, it was a tragedy that you were all involved with."\n\nThe men all shifted nervously. They were staffers for the Air Force, not conspirators, but their superior's tone was unmistakable. One of the braver souls spoke up. "Your Excellency, we were just following the -"\n\nThe man at the head stood up and exploded. "What part of the operation included the murder of former Presidents you cretin? All of you, what the hell is wrong with you? You are supposed to be Brazil's finest, not a bumbling Mafia."\n\nMost of them sank in their seats. Another soul dared speak. "But-"\n\nHe wasn't offered a chance to continue. "But nothing. He was a President of Brazil, and you saw to it he was shot like a dog! This was not done in my name, nor Brazil's, and I only regret I can't think of something senseless enough to describe you all as."\n\nThe man at the head of the table stopped, leaning down on the desk staring at the perturbed men before him. In his eyes was disgust, lessened only by total grouping of his prey. Time to spring the trap.\n\nLacerda turned to the generals behind him."
brazil_lacerda_imp.76.a: ""Médici, place these men under arrest and get anything you can about Burnier from them. After that, do what you will.""

brazil_lacerda_imp.77.t: "Reckoning"
brazil_lacerda_imp.77.desc: "Alone. That's how Carlos Lacerda felt as he sat hunched over his desk in his dimly lit office. Several newspapers were laid out before him, all bearing the same headline. RAPHAEL MAGALHÃES ASSASSINATED! MAGALHÃES GUNNED DOWN BY REDS! Magalhães was dead, and Lacerda was alone.\n\nWas it all his fault? Alongside the newspapers were reports from all the intelligence and police agencies Lacerda could put on the case. The reds killed Magalhães, of course. Only recently was Lacerda targeting the Communists, it could've been his own actions that painted a target on Magalhães. He gripped his head harder as it continued to throb. No—it wasn't his head. Esther was knocking at the door.\n\n"Mr. President? Your family is trying to contact you." She gently opened the door, positioning herself so she could use it as a shield from flying objects. The room was dark, and she could barely make out Lacerda's slouched silhouette. She timidly took a few more steps, after the President didn't move. "Mr. President? Your—"\n\nCarlos Lacerda's head rose from his hands. His wide-open eyes were bloodshot. Stubble covered his usually clean-shaven face. Bottles and glasses were used to weigh down some of the papers.\n\n"Leave." Lacerda rasped. He had no more energy to shout at her. Esther looked to the carpet, nodding. As she turned, the President spoke again. "Call Médici." Lacerda ordered. "Brigadier João Paulo Burnier as well.""
brazil_lacerda_imp.77.a: "Tell them it's about PARA-SAR."

brazil_lacerda_imp.88.t: "Closing In"
brazil_lacerda_imp.88.desc: "Virgílio Távora found himself enamored by the concrete walls that surrounded him. Its surface, so cold and sterile, invoked a primal dread from deep within him, a sort of agoraphobic instinct that threatened to burst from the annals of his mind, desperate to claw his way out of this room. He felt trapped, yet the thought silently amused him. In a way, they were all trapped, albeit in a cage of their own design.\n\n"We've accomplished so much," Lacerda resounded, "and in such little time!" Almost on cue, the ministers of the roundtable broke into applause, Távora included. Such was the crisis upon the surface that nearly all aspects of higher governance had to be evacuated into a system of bunkers beneath Brasília, once intended as transportation links for the military. Now, they housed Lacerda's entire cabinet, as well as the President himself. And for good reason, thought Távora. He had lost count of the government buildings razed by riotous mobs and terrorist bombers. God forbid they manage to find them down here.\n\n"Despite it all, our government has remained stable and willing to defend our republic from Goulart's petty despotism. Make no mistake; what we achieve in the coming weeks shall be felt and enjoyed not only by our children, but for generations beyond." Lacerda reached for a nearby glass of water, gulping down a small swig. "We are fighting for a free Brazil that will stand the test of time, free from the taint of Vargas. Free from the Labourites who claim to carry his torch. Free from want and fear, spearheading towards a brighter future for all of Brazil to enjoy!"\n\nEach minister rose in rapturous applause, cheering Lacerda's name within the confined space of the conference room. Távora applauded all the same despite his innermost concerns. What truly awaited them after this crisis? How far would they have to go to patch this country back together? Was it even possible?"
brazil_lacerda_imp.88.a: "Just how far could this go on?"

brazil_lacerda_imp.89.t: "The Man of the Moment"
brazil_lacerda_imp.89.desc: "The table had the collective weight and breadth of the UDN around it. Lacerda looked at the members, titans of the party one and all. He had to make his case clear to the braintrust here in this room. Otherwise his presidency could vanish as quickly as it had appeared, like fog burning away in the morning.\n\n"Gentlemen, we stand at a historic moment. We have prevailed against Goulart's electoral fraud but we still have a country that could easily tear itself apart if we do not lead it correctly. We must remember that we are elected officials, not conquerors. We must stand up, one and all, and become a shining example of the rule of law. Therefore, we must not initiate any actions against the PTB if they obey the laws in place."\n\nLacerda looked at the assembled men. Half maybe looked to be nodding along, they had likely already believed what he was telling them. "They will expect us to attack them. Some even hope for it, so that they might prove to the people that we are every bit the butchers they say we are. We must not give them that opening."\n\n"The people want stability. They want a government that they can trust to be rational, to comply with the laws that it sets for itself. When we demonstrate this, we will win them over, and our victory will be assured. We will be seen as the saviors of Brazilian democracy."\n\nMore nods, as members once stony-faced began to slightly smile, convinced by the President's appeals. Regrettably, maybe one in six men still looked visibly confused, upset, even politely angry. They'd never deign to show it, but they didn't believe in Lacerda, didn't believe in his amnesty, and if given half a chance, would destroy Brazil's future in a fit of violent pique."
brazil_lacerda_imp.89.a: "Magelhaes, tell Golbery we have a few who warrant...extra scrutiny."

brazil_lacerda_imp.90.t: "Acting Presidential"
brazil_lacerda_imp.90.desc: "As Lacerda entered the room, the general called the room to attention. The group snapped up, boots hitting the ground as one loud jolt, then the sound of twenty-five sleeves crisping as each man rose to salute their commander. The move was a courtesy owed by virtue of Lacerda's position, he never would receive such a display were he not the President. It was a gesture performed with perfunctory belief. Lacerda gritted his jaw, he knew he had to speak with the authority that his position conveyed, or this would never work.\n\n"Gentlemen, I will be brief, as I know you are all busy men. You are the protectors of our great country from threats from without and within, and with this new guidance we will be better. I know this will be a significant change, but it is the will of the President and the interest of our nation. I wish it to be known that as of now, I am strengthening oversight into police and military conduct in cases of public order.\n\nThe use of torture in interrogation or as a punishment by law enforcement or military intelligence is to be forbidden without explicit permission. Secret facilities will hereby be closed, and rioters or dissenters will be informed of the charges they face, with public records kept and audited. Arrests will be made on the basis of evidence, not theory, with all case files containing relevant evidence that will be made available for internal oversight. Failure to comply with these directives will result in severe disciplinary action."\n\nPresident Lacerda looked toward the sea of faces, masks of calm, and tried to see which would be the first to momentarily lose their bearing and betray what he thought. The President looked each man in the eye, letting each of them know his conviction. He may only have the authority by virtue of his position, but that authority was his. "I know you are all men of courage and professional bearing, so I know there will be no trouble complying with my orders and avoiding such cowardly behavior. I expect each of you to carry out this order and disseminate it to the people below you. Gentlemen, you are dismissed.""
brazil_lacerda_imp.90.a: "A new era was upon Brazil."

brazil_lacerda_imp.91.t: "Decree Law Number 45"
brazil_lacerda_imp.91.desc: "Herein be proclaimed by the Office of the President of Brazil the following Act in the Interest of Public Safety.\n\nWherein the Office of the President of Brazil notes with concern regarding the published policy of the PSD and PTB and remarks that such ideologies have disturbing implications for the Republic of Brazil's public safety, the Office recognizes the right of publication of matters of opinion for political parties. The Office of the President of Brazil thus that the publication of such materials without the intent to cause harm to any persons or property is to be respected.\n\nFurthermore, the Office of the President of Brazil instructs all Federal Peacekeeping Officers that, in the interests of Public Safety and Unity, that non-officer members of the PSD and PTB are not to be prosecuted for misdemeanor offenses committed against persons or property during the transition period that ended with the inauguration of President Carlos Lacerda. It is understood that these actions were ordered by the party leadership of the PSD and PTB, and thus by the doctrine of command responsibility and vicarious liability, these individuals shall be held accountable for crimes committed against the Brazilian nation and her people during this period.\n\nOfficers are instructed that failure to comply with this regulation, and that acts of retaliation taken against members of the PSD and PTB for actions taken during the aforementioned period are considered contrary to good order and discipline, and will be treated as an Act of Insubordination."
brazil_lacerda_imp.91.a: "So ordered, [GetDateStringNoHourLong]"

brazil_lacerda_imp.92.t: "The Needs of Diplomacy"
brazil_lacerda_imp.92.desc: ""Thank you for seeing me on such short notice, Ambassador," Lacerda said, as he guided the diplomat from the Organization of American States toward a couch in his office. The President of Brazil himself sat in a chair just opposite the Ambassador.\n\nThe diplomat's face held his impressively neutral expression as Lacerda settled himself into his chair, shuffling back and forth to find the right spot. "The OAS has a vital role to play in the stability of the continent, and the Republic of Brazil is grateful for its work in preventing conflict and-"\n\n"Mr. President, your kind words are much appreciated," the ambassador said, though he knew just as well as anyone that Lacerda's words were anything but genuine and heartfelt. "What can the Organization assist you with?"\n\nLacerda sighed. "The situation here is difficult, to say the least. Opinion of the new status of Brazil has caused... concerns. If the OAS could assist me in this delicate time to maintain stability in the Americas, I would be sure to repay the favor."\n\nIn other words, the recent power grab has pissed a lot of people off, both in and outside of Brazil, and now Lacerda needed help, as the Ambassador read between the lines. "Of course, Mr. President. I'm sure the OAS could look into helping you in these difficult times."\n\nLacerda gave as generous a smile as he could, even though he knew very well that the Ambassador had little intention of actually assisting to the fullest degree that the OAS could."
brazil_lacerda_imp.92.a: "Fake smiles and fake gestures."

brazil_lacerda_imp.93.t: "Diary Thoughts"
brazil_lacerda_imp.93.desc: "Cabinet meeting today. Updates on the current financial situation and discussion on how to encourage new businesses.\n\nNote from the Ambassador to the US about Washington's public concerns and private support for the administration.\n\nTrade Unions in São Paulo and Rio are acting up, with rumors of strikes and work stoppages. A situation we can only keep an eye on at the moment and can't act as of yet.\n\nThen the question of dealing with the Varguists.\n\nMade it clear to the cabinet that we are currently in a delicate position, so it is vital that we walk carefully and not act too hasty. Too many slips will cause the whole situation to crumble beneath us.\n\nSome ministers keep pushing for the hardline measures, to go all out and stamp out Varguism, and simply do not understand why we can't just do what the old regime had done to us before.\n\nI understand their frustration, and if I was in their shoes I would be just as upset and want to go as far and as fast as we can. But we cannot, less the whole building collapses."
brazil_lacerda_imp.93.a: "Moderation is always the hardest choice."

brazil_lacerda_imp.94.t: "Disunion"
brazil_lacerda_imp.94.desc: ""The left wing of the PTB is supposed to disband at once? What the fuck is this?" Jonas read the notice to his friends around the table. "All affiliated with the anti-Brazilian wing are hereby ordered to cease contact and refrain from subversive activity against the state under..."\n\n"Here's what I think of Lacerda's little threat!" Arnoldo grabbed the paper out of Jonas's hand, tore it, then threw it on the ground, to the cheers of everyone. "That little tyrant will never stop me!"\n\n"I don't know..." Jonas rubbed his hands together nervously. "With the new baby on the way I'm not sure I can risk any trouble. It might be better to just swear off politics entirely." Several of his fellows nodded their heads. It was easy to talk big when you didn't have people relying on you.\n\n"Tell your wife to buy double the diapers then," Arnoldo shot back, jeers erupting from his supporters and Jonas turning red.\n\n"I think I'll take on a new name. That way my family won't have to worry." Sérgio suggested to the group. "Lacerda thinks he's the only one who can use the press, he has another thing coming."\n\n"Bull!" Arnoldo thundered. "No half-measures. If this is what the PTB is good for, then maybe I need to find better pastures. I hear that the PCB are actually brave enough to fight Lacerda, to stand up for all of us. What I thought the PTB was supposed to be when I signed on." Arnoldo pointedly looked at Jonas with contempt in his gaze. "Maybe they can use us.""
brazil_lacerda_imp.94.a: ""If we're treated as criminals, we might as well act like it.""

brazil_lacerda_imp.96.t: "A Nation Bled White..."
brazil_lacerda_imp.96.desc: "Day after day, hour after hour, minute after minute, Lacerda's Brazil is becoming a beast that cannot be fed. Not content merely with a just political witch hunt against the PTB, the President and his supporters in his party and the military are ratcheting up the measures being taken to target anyone and everyone with the potential to pose opposition within the establishment political left.\n\nIn an initiative eerily reminiscent of the senator Joseph McCarthy and spearheaded by Golbery, the Lacerda regime has all but declared open warfare against the left opposition. From the military, to research and development, to the administrative wing; every single solitary record or archive held anywhere in the government was upturned and ransacked in pursuit of potential 'subversives', with none, absolutely none, to be spared from the purge that followed.\n\nMany of those caught in the crosshairs of Lacerda and Golbery's crusade soon found themselves summarily dismissed on either flimsy or entirely non-existent grounds for termination. If Lacerda was ever upholding a facade for commitment to due process, he has entirely abandoned it now, and the mounting concern for the President's extremism is becoming difficult even for his supporters to ignore.\n\nEven some of the UDN's backers in the Brazilian Military are looking Lacerda's action in muted horror. While the President's most ardent military supporters take little issue with his increasingly flagrant abuse of power, with the General Costa e Silva calling it a 'worthy sacrifice', cohesion within the armed force is showing signs of fracturing. A growing number in the upper officer corps believe Lacerda to be a stone's throw away from throwing Brazil into chaos.\n\nThis last piece of ominous news comes hot on the heels of something even worse. With the civil service constantly disrupted by the UDN's attacks and the R&D wing similarly under constant attack, a growing number on the Brazilian left are experiencing a level of distrust and contempt for the government not seen since the early 1930s. Many dissatisfied leftists now find themselves flocking to Luís Prestes and the PCB, a paradigm shift that once seemed impossible and is now on the road to becoming a political reality."
brazil_lacerda_imp.96.a: "...can only see red."

brazil_lacerda_imp.97.t: "Speech to the Generals"
brazil_lacerda_imp.97.desc: ""Esteemed officers of Brazil," President Lacerda said, as he stood in front of the General Staff, the generals and admirals in their uniforms dripping with medals and gold braids, looking to their new Commander-in-Chief. "The nation is about to embark on a crusade against those that would undermine the state; socialists, radicals and Marxists all. A thorough and aggressive effort is to be undertaken to root out all those that would oppose the new UDN mandate that will bring economic, political and social stability to our nation.\n\n"Brazil has been left to drift, rudderless and directionless, for too long. My new government will ensure we are stabilized and straightened out, ready to move forward. Once those that oppose the new direction are dealt with, Brazil will emerge stronger, richer, and more united than ever before!\n\n"Those that support the UDN and my administration will be rewarded, not simply with material gains, but with pride and satisfaction at saving Brazil at it's moment of crisis. Together we will go forward, and together we will win!"\n\nMost of the General Staff began to applaud; those that Lacerda knew as Sorbonneists were the most enthusiastic, while the hardliners were more polite in their praise, but Lacerda knew they were on board, if just for the chance to get rich or crack some skulls. It was the Constitutionalists, already a minority as only a handful showed up, who sat in stoney silence. But Lacerda did not care for their opinion, for most would soon find themselves cashiered out or on the retired list anyway."
brazil_lacerda_imp.97.a: "So long as the guns are on our side."

brazil_lacerda_imp.98.t: "High and Low"
brazil_lacerda_imp.98.desc: "As Lacerda stepped onto the stage following his introduction, he could not help but take in the moment. The UDN, one and all, were applauding him so fiercely, it almost felt like they were shaking the very foundations of the building. They were many hands, but with one thunderous noise. He waved to the party, and they cheered ever louder for their President. For him.\n\nYet they were not only there simply to applaud him. The Congress had been in a bevy of activity and had shown their unity as a party by voting through almost every motion placed on the docket. There was token dissent on a few key bills, motions that ran contrary to the passion projects of the individual UDN members that Lacerda could not fault them for. The result was what mattered, the success of his legislation and the strength of his leadership as a party. This was his night.\n\n***\n\nOutside the conference, Juarez Távora wondered if Lacerda would even notice how many chairs were empty. The UDN followed him like a cadre of trained dogs, barely a whimper of independent thought within any of their skulls. Men like him though, saw the danger in Lacerda's presidency, and Távora sat, angrily smoking with two of them.\n\n"Damn Lacerda. If he keeps on like this, he'll push the whole country into the hands of the communists. They won't need to raise a finger, everyone will flock under their red banner, believing it's the only shelter they have from the rain." Távora angrily turned against a strong breeze that threatened to extinguish his nicotine.\n\n"Well, what are we going to do, Távora?""
brazil_lacerda_imp.98.a: "Távora wanted to say "save Brazil," but he was unsure how."

brazil_lacerda_imp.99.t: "By Fair Play and Foul"
brazil_lacerda_imp.99.desc: ""By Presidential Decree, due to numerous political crimes committed during his presidency, Former President Getúlio Dornelles Vargas is hereby forbidden from engaging in political activity. He is no longer permitted to join a political party, run for public office, or endorse a candidate in any federal or state election. He is not to be granted interviews by the media. Failure to comply with this directive will result in criminal prosecution."\n\nVargas chuckled a bit as he put the decree down on his coffee table. Lacerda had actually done what he set out to do. Vargas's chuckle threatened to become a full-on laugh. In some small way, Vargas couldn't exactly blame Lacerda for his actions; Vargas brought at least some of this on himself. He could hardly be mad at a dictatorial action when he himself had a deft hand in dictatorship. And so, all Vargas could do was laugh.\n\nWith him out of the way, the Udenists finally could no longer blame every single one of their mistakes on him. There would be no more accusations of secret Varguist sabotage to throw around the next time the UDN made fools of themselves. They wanted to be the only ones in the kitchen, and now when the roast was burned and the floors a mess, they will only have one man to blame. The man who took control of the country and drove it into the ground.\n\nSchadenfreude was one thing, but there were going to be lasting consequences in the fallout from Lacerda's inevitable collapse. Stuck here in São Borja, there was only so much he could do, but he wouldn't have been very presidential if he let his pride get in the way of serving his country, even in a neutered capacity. Perhaps he should give a call to Prestes, and make a show of a little humility. If he could break bread with a man he threw in jail, why, he could do anything."
brazil_lacerda_imp.99.a: "Strange circumstances make strange bedfellows."

brazil_lacerda_imp.100.t: "A Chat With an Old Friend"
brazil_lacerda_imp.100.desc: ""Mr. President."\n\n"Mr. Ambassador."\n\nThe formalities concluded, both men smiled to each other, before sitting down, Lacerda and Lincoln Gordon starting with small talk of how each other's families were doing.\n\n"Anyway, this wasn't just a social call, was it?" Ambassador Gordon asked, as he pulled out his pipe and lit it. "What can I help you with today?"\n\n"Well, in light of the current situation here in Brazil, I just wished to understand the current view from Washington."\n\n"Officially, the United States is still 'studying the situation' and will reserve comment for the moment." Gordon puffed on his pipe, a whiff of smoke rising into the air. "Unofficially, you have some powerful supporters at all levels, including in the West Wing, Congress and Langley. William Buckley on 'Firing Line' in particular has been your best friend in America. So I'm confident that whatever you require will be made available for you as you need it."\n\nLacerda grinned. "If that's the case, I do have a bit of a shopping list, in particular to ensure support for the UDN in the next election and ensuring the stability of the Republic until then."\n\nMore smoke came from the pipe before Gordon removed it from his mouth, and pulling out a notepad. "Then let's work on the details.""
brazil_lacerda_imp.100.a: "Always nice to have friends in high places."

brazil_lacerda_imp.101.t: "The Responsibilities of a President"
brazil_lacerda_imp.101.desc: "Carlos Lacerda looked at the papers on his desk. It hadn't been long before he was sworn in and the reports had already formed a sizable stack. The police and domestic intelligence had been busy; in each report was a detailed description of Varguist groups or individuals and what matters were being taken to curtail their activities. Lacerda couldn't help but smile, wondering what Vargas must have been thinking to see the shoe on the other foot. Vargas, the bastard, loved to sic his DOPS dogs on anyone who sneezed in the wrong direction toward an essential organ of his Estado Novo. If only Major Vaz could have lived to see it. Vaz had taken a bullet meant for him, he would have beamed with pride to see Lacerda take action against his murderers.\n\nLacerda shook himself from his reverie. He was a President, not a daydreamer. These reports were affairs that could be handled by his security services, not something for him to read to take a petty visceral thrill. He had a country to lead and couldn't very well do it if his head was in the clouds.\n\nHe had a country to lead and couldn't very well do it if his head was in the clouds.\n\nThe President took a long drink of water and tapped his intercom, and it took less than a second for his secretary to respond. "Esther, could you bring in the paperwork I need to look through today, and file the documents I have on my desk where they need to be?"\n\n"Right away, Mister President. Do you need a second cup of coffee?"\n\n"No, Esther. Being the President is everything I need to get me wide awake.""
brazil_lacerda_imp.101.a: "No rest for the wicked."

brazil_lacerda_imp.102.t: "Normal Time"
brazil_lacerda_imp.102.desc: "Things were getting back to normal. The president had gone incognito, using an unmarked car and wearing sunglasses and a hat to hide his facial features. He had wanted to see with his own eyes what the true state of everything was. Lacerda gave himself a quick smile from the back seat of his car as he saw four soldiers take down a makeshift checkpoint, loading the equipment into the back of an army truck. The emergency was over, the enemies were defeated, and once the shock had worn off from the extreme circumstances, they would recognize who had led them to victory through an unprecedented threat to the Republic. All the people needed was a little time.\n\nThings were finally returning to normal. Two neighbors laughed as they were able to leave their homes for fun, for the first time in a long time. Home had been safe, and unless they needed to leave for food or medicine, they kept themselves and their families with the door securely locked. But now, peace was returning in the wake of the soldiers returning home. They popped a bottle of champagne in the street and laughed. As they gulped down the sparkling wine with the fervor of a man in the desert finding an oasis, the external facade of their celebration faded away. They were laughing at how they were still alive, at how things could have gone so differently, and how precious the little time they had really was.\n\nThings were, at last, reverting to normal. In Curitiba, Ney Braga and Juarez Távora watched the soldiers disband and return to base. The two men shook their heads. Certainly, Brizola and Prestes needed to be kept away from power, but this? Lacerda nearly destroyed the state to save it. Not a correction, but an overcorrection, swerving the car into a cliff to avoid it going over the mountain. It was unstable, and both men were apprehensive, over how little time they may have had."
brazil_lacerda_imp.102.a: "A relaxed tempo, for now."

brazil_lacerda_imp.103.t: "Make the News"
brazil_lacerda_imp.103.desc: "Emanuel wasn't a political man. He was a proud Brazilian, of course, but he was more concerned about his family and his job, with only a passing interest in the news of the day and what was going on in Brasília and on the world stage. Picking up a newspaper on his daily bus commute in São Paulo to his factory job, and then watching the news after supper was more than enough to keep up to date with the news of the day. With the presidential election coming before the end of the year as well, Emanuel knew that the news was soon to be nothing but politics.\n\nBut even now in March, he was noticing a lot more articles about Carlos Lacerda, the candidate for the UDN, pop up in his daily newspaper, as well as pieces on the television news and even from campaigners in the streets: campaign promises on how to improve the nation and the economy, fluff pieces, how he had risen up as a journalist under the Varguist dictatorship, the attempt on his life by the Vargas regime. They all seemed to portray Lacerda as a family man, not just for his own family, but for the nation at large. He stood up to tyranny and fascism, and he had overcome it all.\n\nSoon enough, as the flood of news and the image of Lacerda on the TV and the newspapers, Emanuel's view on Lacerda had shifted from indifference to something approaching tepid support. He seemed like an alright guy, someone who had the best interests of the nation in heart. Someone that Emanuel could support and feel okay having done so."
brazil_lacerda_imp.103.a: "However, Emanuel wasn't a political man."

brazil_lacerda_imp.104.t: "Raise the Temperature"
brazil_lacerda_imp.104.desc: "Emanuel wasn't a political man. But even though he didn't pay attention to the grime, corruption, and mudslinging and backroom dealings of the political class, he knew enough that what was happening now in Brazil was not for the best of the nation.\n\nHe was just a boy when Vargas ruled, and while most of his memories of that time were fuzzy, he could remember how the fear and paranoia of the time, the instinctual memory of police officers or soldiers on the streets and the terror that they were about to barge into someone's home and take away men and women who disagreed with the Caudilho.\n\nHe was also fully aware of the anarchy and terrorism that the socialists wrought, with their undermining of democracy, their efforts to form a new Soviet Union in Brazil, of how they would turn everyone into working slaves for a monstrous regime just as bad as Vargas. Emanuel was learning more and more how to interpret the slogans that sounded good by radical agitators but in reality were hiding the truth, that they were trying to appeal to the masses with their lofty rhetoric, while in reality trying to break the nation.\n\nWhenever he picked up a newspaper on his daily commute or watched the TV now, or even when the factory boss took some time from his busy schedule to talk to the workers in the factory, he knew what to look out for, how to pick out the Varguist and Socialist propaganda from the truth. And the truth was, there was only one man that could ensure that the nightmare of authoritarianism and Marxism would never be allowed to set up roots in Brazil again: Carlos Lacerda."
brazil_lacerda_imp.104.a: "However, Emanuel wasn't a political man."

brazil_lacerda_imp.105.t: "Tip the Scales"
brazil_lacerda_imp.105.desc: "Emanuel wasn't a political man. However, that did not mean that he wouldn't do his civic duty and vote in elections. Democracy, after all, required everyone to participate, politically active or not. So as he took time off from his factory job to go to his polling station, to do his civic duty and vote for the one man, the one party, that could save Brazil from corruption and tyranny.\n\nAs he entered the community center, flanked by soldiers in their olive green uniforms, he could hear someone shouting outside the perimeter of how the election was being rigged, how dead people had voted, how some had voted multiple times, more and more. Emanuel shook his head. Of course, that's what the Varguists and the Socialists were doing! How else were they able to win in the past when what they wanted to do was destroy the nation?\n\nWhen Emanuel was finally able to be given his ballot, he looked at the page at the several names listed as candidates. But the name he was looking for was right at the top of the list; Lacerda, Carlos. It was simple enough to check off that name, before leaving the booth and depositing the ballot into its secure, sacrosanct box.\n\nAnd that night, even as the TV was refuting the charges of vote inflation, vote buying, discrimination, and more, Emanuel knew as well as anyone in Brazil that it was simply the cries of poor losers, who's own attempts to sway the vote and rig it in their own direction had failed. He knew that the right choice would be made, for the betterment of the nation."
brazil_lacerda_imp.105.a: "However, Emanuel wasn't a political man."

brazil_lacerda_imp.106.t: "Conqueror's Rest"
brazil_lacerda_imp.106.desc: "After the speeches, the pictures, and being baked under what seemed to be a thousand stage lights, all Carlos Lacerda wanted to do was be in a cold, quiet place. He had finally retreated to his home office, well past three in the morning. He kicked off his shoes and cracked his toes, reclining in his chair. Despite his fatigue, he wasn't the least bit sleepy. What seemed impossible had finally happened; he had won. He was the President of Brazil.\n\nThe simple facts had sunk in well enough, but the sheer magnitude threatened to eclipse him entirely. The UDN had an overwhelming majority in both chambers of the National Congress and even most of the state governorships. The UDN was in complete control of Brazil. As long as he could maintain party unity, he could enact almost any law that the Constitution allowed him to do. Such a mandate could have crushed anyone, just by its scope. If he had wanted to, he could become a dictator the likes of which Vargas and Goulart dreamed about.\n\nBut that wasn't the type of man he was. He thought about transforming Brazil, of making it a jewel where the people were prosperous and happy. Where Brazil was a member of the OFN in good standing, fighting back against the scourges of communism and populism that had infected so many of the people and taking a stand against the brutality of the Germans and the Japanese who bled their people like stuck pigs. Where Brazil was an example.\n\nBrazil could be so much more than it was. He knew it was worth fighting for."
brazil_lacerda_imp.106.a: "Sunrise found Lacerda dozing in his chair, dreaming of what was to come."

brazil_lacerda_imp.107.t: "Repercussions"
brazil_lacerda_imp.107.desc: ""....banning foreign observers from polling stations..."\n\nA bead of sweat was forming on the Ambassador of Brazil's forehead, and it wasn't just because the Foreign Ministry in Havana had its windows open, allowing the warm heat of a Caribbean day to flood the room. The Foreign Minister, his voice still a monotone that barely hid his anger and contempt, continued to read from the rather lengthy diplomatic protest his government had summoned him for.\n\n"...stuffing ballot boxes with fraudulent ballots..."\n\nThat one drop of perspiration was all that the Ambassador could think about as it hung on his forehead, torturing him by simply remaining where it was for as long as it could. He had to restrain himself from wiping it away.\n\n"...opposition candidates being illegally prevented from running..."\n\nThe bead of sweat finally ran off his forehead, between his eye and his nose, over his lip, before finally dropping off his face and landing on his suit jacket. It took every ounce of his willpower to maintain his composure.\n\n"...hereby the Government of Cuba denounces the United States of Brazil for their blatantly fraudulent and corrupt elections." The Foreign Minister finally set down the last page. "Ambassador, if you could transmit this message to Brasília at your earliest possible convenience."\n\nThe Ambassador stood up, even more sweat dripping from his forehead. He gave as polite a smile as he could as he was handed the fat stack of paper, but it could only be described as one that a young boy would give after being yelled at by his father for breaking a window."
brazil_lacerda_imp.107.a: ""Of course, I will make sure my government receives the message.""

brazil_lacerda_imp.108.t: "Ill Wind From the North"
brazil_lacerda_imp.108.desc: "Given its relevance to the upcoming OAS vote, we have decided to reprint in full the recent declaration of the National Executive Committee of Mexico's ruling Partido Revolucionario Institucional (PRI).- Brazilian Embassy in Mexico.\n\n"The Partido Revolucionario Institucional condemns the so-called elections held in the Brazilian republic. Blatant fraud and violence perpetrated by Carlos Lacerda, his oligarchic and military allies, and sinister foreign forces have subverted the will of the Brazilian people.\n\n"To protect the Brazilian worker and peasant from imperialist exploitation akin to that seen under the Porfiriato in this country, to prevent a military rule all too similar to that we suffered under Huerta, and to defend against an aggressive, fascistic regime taking root in the Americas, our government has assumed a leading role in rallying friends of the Brazilian people against this threat.\n\n"Accordingly, our government and those of every state within the Veracruz Pact will demand a motion to censure Brazil through the Organization of American States...""
brazil_lacerda_imp.108.a: "The PRI lecturing us on electoral fraud? What a joke!"

brazil_lacerda_imp.109.t: "New York Times: OAS Motion Backfires, Vote to Condemn Brazil Fails"
brazil_lacerda_imp.109.desc: "DATELINE, BRASÍLIA; It is clear that the recent shift in Brazil's politics has caught much of the free world off-guard, made evident by the impasse reached by the member-state constituency regarding formal denunciation of the increasingly authoritarian regime of President Carlos Lacerda and his backers in the Brazilian military.\n\nOriginally elected on an ostensibly liberal-leaning platform, Lacerda has taken advantage of popular dissatisfaction with Brazil's institutional corruption to target his political opposition at a frightening pace; from labour politicians to liberal writers, an ever growing list of peoples have faced political oppression and legal harassment as the UDN tightens its grip over Brazil's already fragile democracy.\n\nOAS delegations across the Americas and abroad have not been idle in expressing their horror at Brazil's nascent use of overtly anti-democratic repression of dissent, with many drawing correlations to the autocratic regime of the late Getúlio Vargas Sr. It is rumored, however, that some of the leaders of the OAS see Lacerda as a lesser evil among many greater ones.\n\nOriginally taken up by Cuban ambassador to the OAS and finding more voice to echo the sentiment since then, accusations about that the United States of America utilized veto power as the principle leadership of the OFN to shut down the motion to denounce the UDN regime. Whether this is due to the larger threat of the Japanese in the Pacific, the Nazis in Europe, or simply a desire not to upset a longstanding regional alliance, remains up to speculation.\n\nWhen asked for comment, President Lacerda referred to the affair as 'a victory for diplomacy' in response to the OAS decision."
brazil_lacerda_imp.109.a: "He might be a son of a bitch..."

brazil_lacerda_imp.110.t: "Resolution"
brazil_lacerda_imp.110.desc: ""Top story of the hour. The Organization of American States has finished the vote considering Cuban condemnation of the Brazilian election. The OAS chairman issued the following statement: 'The 1968 election of Carlos Lacerda appears to have been conducted with relative transparency and integrity. Recordkeeping mistakes of double counting and misidentified voter identification numbers appeared to be largely isolated and did not affect the overall electoral outcome. In other news, the general strike promised by the PTB in protest of the vote has failed to manifest. On the first day, there was lackluster support for the strike with many places of business still open and after less than a week, many strikers have returned to their jobs, citing economic pressure and a desire to return to normalcy."\n\nBrizola angrily slammed his hand down on the table, the impact jostling something loose in the old radio which caused it to lose audio with an audible pop. "Cowardly bastards. Lacerda asked his Uncle Sam to fix the vote and the OAS went on with it like a gaggle of baby ducklings. And the workers! No sense of loyalty or commitment!"\n\nGoulart, rubbing his hands together and visibly sweating. He took the flask from his hip, popped the cap, and began to drink. It blew past a sip, exceeded a gulp, and before long the sound of Goulart swallowing the brew continued to echo off the conference room walls. When he idly dropped the flask on the table, the metal echoed, the flask empty. "This is a catastrophe. We have barely anything that will help us."\n\nEdna Lott, at the affair, muttered a small prayer under her breath and gave the Sign of the Cross. With one large exhale and a quiet Amen, she looked both men face to face, her eyes twinkling with resolve. "We have more than we think. We cannot fall into despair, gentlemen. Tempers are hot, but we will need to comport ourselves. We see our problems, let us think of solutions.""
brazil_lacerda_imp.110.a: "Defeat is a choice."

brazil_lacerda_imp.111.t: "A Single-Use Toolbox"
brazil_lacerda_imp.111.desc: "Across the country, PTB governors were escorted by soldiers out of their offices, marched out to the street. Two men, one exile, and one cardboard box full of personal effects, pictures of their wives and children, small tokens from important voting groups in their districts, minor knick-knacks like Newton's Cradles and stress balls, all taken and packed impersonally into a single cardboard box. The detritus of a political career set out onto the street, taken away with the rest of the garbage.\n\nMost governors went quietly. Some gave vain, impassioned speeches in front of their staff interrupted by the police. A few had to be marched at literal knifepoint, prodded with a bayonet to keep walking and not make a scene. But a scene was made, and it was seen by all. The Petebistas were understandably upset, but they weren't the only ones. Moderates knew that once one party could be banned for no other reason than membership, any of them could be. Even members of the UDN feared the political backlash. Goulart was a threat, but this was the equivalent of removing a weed by burning down the garden.\n\nNey Braga heard the voice of the members of his party. The fear of a backlash, the thought that by exiling the Petebistas, Lacerda made violence more likely, not less. That he secured less control over the political establishment, and that further overreactions would only cause the country to spiral further - a madness without to match the madness of Lacerda's mind.\n\nSlowly, word began to trickle back to those who feared Lacerda's actions that Braga had taken notice. Braga never gave an official statement on what he thought, but through the grapevine, one question kept being asked: "Does this man have no other tool than a hammer?""
brazil_lacerda_imp.111.a: "The first words of a new voice"

brazil_lacerda_imp.112.t: "The Jackboots' Pockets"
brazil_lacerda_imp.112.desc: "Lacerda studied Golbery's face as the general stood over Lacerda's desk. The look on the man's face was unfamiliar. It was sympathetic, almost apologetic in its fixture. He had to admit that it was almost unnerving. Chiefly because in no world was such an expression made in order to deliver good news.\n\n"What is it, Golbery?"\n\n"My colleagues..." Golbery looked uncomfortable as he continued, "Have... requested that you stop the investigation into the PSP. They believe the anti-corruption purges are going too far."\n\nThe office was dead silent as Lacerda swore he had begun seeing red. Any effort to suppress his own rising anger was fruitless, as he exploded at Golbery, "Why? I have given the military everything they could have dreamed of, and I have done nothing except try to save this country from its worst impulses! Your jackbooted colleagues have been given the world, and yet they still feel the need to fill their pockets!" Lacerda was standing now, and caught his breath as he sat back down, his hands still shaking.\n\nLacerda looked at Golbery, and figured he was done shooting the messenger, "Fine, they win. Tell your colleagues they and the PSP are safe from further investigations," Golbery nodded silently and turned to leave.\n\nAlone in his office, Lacerda rested his head in his hands."
brazil_lacerda_imp.112.a: "There was nothing to be done."

brazil_lacerda_imp.113.t: "Cracks in the Foundation"
brazil_lacerda_imp.113.desc: "The 5th Constitution was going to be passed today and the UDN couldn't care less. Everyone knew it would pass, the UDN had all the seats needed, and the opposition was nothing more than a speedbump. Lacerda was chatting with Silva. No one was paying attention to the counting of the votes. But they should have.\n\nSlowly, the room went silent. Lacerda looked confused and worried. "What happened? Did we win?" said Silva. An aide was the first to speak up. "N-no sir, the constitution failed to pass."\n\n"What!?!" Silva yelled, and nearly jumped out of his seat. "There has to be something we can do," said Lacerda. "I thought you had everything under control!" Silva shouted at Carlos. "I-I did, everyone was going to vote for it-" Lacerda was interrupted by some generals who were invited by Silva.\n\nBefore they could say anything Silva spoke, "Get the soldiers in to fix this shit!" The generals quickly left. "I don't want anything like this happening again." Lacerda sat in his seat, with his head resting in his hand, as the soldiers came in and started to yell at the opposition, some raising their guns at them. The constitution was voted on again. It passed."
brazil_lacerda_imp.113.a: "Lacerda was still worried."

brazil_lacerda_imp.114.t: "Wake Up Call"
brazil_lacerda_imp.114.desc: ""Good morning, President. How can I help you today?" President? Lacerda was the President. Yet, this President was talking to the other like a bold child... superpower or not, it felt off as he listened to the leader of the free world speak on the other end of the line.\n\nHe looked at the empty chairs in his office, fingers still like captive prisoners on the phone, knowing no amount of prayers would save Brazil's face now.\n\n"You can't be serious... suspended? No one has been suspended from the OFN before." His throat had a lump, and his eyes would not stop blinking, flashing like the mugshot photographer's camera. A stoic voice lectured him and explained what was happening, that Brazil had become an embarrassment to America and the OFN.\n\n"Please... you can't suspend me — us." His voice quivered; an idle hand was paroled to wipe his eyes, while a laundry list of human abuses, authoritarian conduct, and propaganda from its resistance was read out to him in a dry and merciless voice.\n\n"I understand." He went into autopilot for the rest of the conversation. America was doing this to save face, cutting off deadweight for the OFN. The writing was on the wall, or more accurately, his tombstone: his government's days were numbered.\n\n"Thank you for your call. We hope to be re-admitted to the OFN someday." The phone slammed onto the receiver. Someday. He felt small, miserable, and sick to his stomach. What went wrong? The unflappable confidence of yesterday, the knowledge that those he fought were truly evil, all disappeared. What good had Lacerda accomplished for Brazil?\n\nAs he left his office, a large part of Carlos Lacerda died, leaving only a hollow caricature of the democratic crusader."
brazil_lacerda_imp.114.a: "The sun closes its eye on Brasília."

brazil_lacerda_imp.115.t: "Minibiography of Carlos Marighella"
brazil_lacerda_imp.115.desc: "1934, to his crying parents: "I know you're unhappy I'm not graduating. I... I know. But there's more important things... the world, mom. It's the world that's at stake..."\n\n1936, staring out into the world through metal bars: "Honestly, one little poem and Juracy thinks he can throw me in jail."\n\n1939, writing in a cramped little cell: "And should I be tortured for you / I'll be happy, indifferent to pain, / And die smiling, whispering your name..."\n\n1964, watching tanks in the streets: "Confronted with democracy, bourgeois as it was, the forces of capital preferred to tear the mask apart instead of wearing it."\n\n1966, setting pen to paper: "It is impossible to ignore the obvious and repeated ideological mistakes displayed by the Brazilian communist leadership. The lack of ideological fortitude in the Marxist leadership led to a political line with little hope to succeed, ending in defeat."\n\n1967, impatient with the Party: "We sit here and praise the great work of Comrade Che, yet when it comes time to confront our own fascists, we talk of passivity! Are we so afraid of picking up a gun that we would rather stand in front of one?"\n\n1968, escorted out of Party chambers: "Lacerda will be the death of us all! We cannot sit back and let his dogs tear our throat out! We have to-"\n\n1969, with renewed purpose: "The urban guerrilla's reason for existence, the basic condition in which he acts and survives, is to shoot. The urban guerrilla must know how to shoot well, because it is required by this type of combat.""
brazil_lacerda_imp.115.a: "1970, gun in hand, before his new ALN: "I didn't have time to be afraid.""

brazil_lacerda_imp.116.t: "Sunset"
brazil_lacerda_imp.116.desc: "Fresh out of the printing presses. "JOSÉ PINTO WINS A STUNNING VICTORY." The headlines are worded differently, the articles are the same. In Brasília, in São Paulo, where the officers of the law prance around in their shiny boots, the people exchange weary glances. "Well, what else did you expect?"\n\nA gunshot cracks the silence of the jungle. The barrel of the gun steams, and an instructor congratulates the young comrade on her improvement. He reads the underground newspapers. "PUPPET CANDIDATE JOSÉ PINTO WINS FARSE ELECTIONS"\n\nDown a dusty trail, the guerrilheiros descend into misty villages, cut telephone wire, and riddle military convoys with holes. Reports of the encounters reached far, far into the headquarters.\n\nAnd the officers smiled at each other. Their faces shone with sweat, as they huddled around in a barely lit room, surrounding a map of Brazil. The people no longer believed, and the guerrillas no longer feared them.\n\nIn their calculus, that meant abject failure. It was time for the hardliners to put their foot down. It was them, or the revolution marching out of the Amazonas."
brazil_lacerda_imp.116.a: "By force, if need be."

brazil_lacerda_imp.117.t: "Democracy in Action"
brazil_lacerda_imp.117.desc: "Fresh out of the printing presses. "NEY BRAGA WINS A STUNNING VICTORY OVER KUBITSCHEK." The headlines are worded differently, the articles are the same. In Brasília, in São Paulo, where the officers of the law prance around in their shiny boots, the people exchange weary glances. "Well, what else did you expect?"\n\nBanners with Braga's smiling face hung over the streets, sagging. Colorful ribbons fluttered limp, and a janitor methodically washed a wall clean of torn electoral posters. A young couple passed him by, and hung their heads low, for having had the gall of expecting something more, for having voted for Kubitschek and his PSD.\n\n"They didn't even try to disguise the fraud," the boyfriend spat. "The day we have something else, these bastards will see their day in court."\n\nThe girl shook her head. "If we have something else"\n\n"Of course we will," he said, glaring.\n\nNext to them, a police officer pressed his boot into a drunkard's face, for pissing on Ney Braga's face painted on the wall. He bent the man's gunt with a low punch."
brazil_lacerda_imp.117.a: "If we have something else."

BRA_start_civil_war_tt: "§RThe Lacerda presidency has left a scar on Brazil and her people...§!"

brazil_lacerda_tavora.1.t: "A Clean Slate, Stained With Memory"
brazil_lacerda_tavora.1.desc: "The Presidential Office. It was a picture perfect reflection of that day, when his hand was forced, when his alliance came down. Távora scanned warily across the room, observing each nook and cranny. He'd learned to tell when a book was slightly disjoint, or a folder askew, and that the President was sure to be in a fit. It suddenly came to him that now, he'd never need that skill.\n\nThe clack of the new boss' shoes resounded as he came closer to the desk. It was a mess. Screaming union letters and bleak pollster reports, all crumpled, were strewn around. Távora's expression slowly contorted into a grimace. It was unsightly, for such a dignified office to be in this state. He picked up a few pieces and tossed them into the bin. That needed to be emptied still- another little chore.\n\nStill, it was a nice distraction from the mess that Brazil was embroiled in, that Lacerda had left him in. The unions had shut up since the former firebrand President lost his fire, but the strikes remained far too plentiful for Távora's tastes. He swept a few crumbs off. They had to end soon, even if the terms had to be generous. It was not only a sensible move, but it was the right one.\n\nAlso, the polls looked more grim by the day. It was as if they were thrust back into the days of Gomes, but somehow worse. They had to shift towards winning that election, no matter what. The desk was now clean, but he still had chores. The nation needed a janitor, a caretaker who could make tough decisions. He had to be that man. It didn't matter if he wanted to or not."
brazil_lacerda_tavora.1.a: "The responsibility weighed on him like a lead crown."

brazil_lacerda_tavora.2.t: "The Start of a New UDN"
brazil_lacerda_tavora.2.desc: "The UDN's main office was mostly empty, typical for a late night. However, one room stayed lit. A meeting was being hosted by Távora, attended by José de Magalhães Pinto, Milton Campos and Raphael Magalhães. Each was tamed by his own vices, cigar smoke wafted, whiskey glasses clinked on ice. They needed to keep their nerve.\n\n"Our party is in freefall." Pinto announced, breaking the brief silence. All the other faces nodded quietly. "And it's because of that slimy crow, Lacerda. If he hadn't pecked at the union's beehive, maybe our election prospects wouldn't look so bleak."\n\nRaphael glared at the banker. "Don't slander Carlos, you pig. He did the best he could under the circumstances."\n\n"Don't make me laugh. He reaped exactly what he sowed."\n\nTávora watched the bickering from a distance. Even through the smoke and noise, he could tell that Raphael's hands were shaking more than the others. It wasn't unreasonable, considering his precarious position in the party. "Men, I believe we have a clear choice of action. To save what we can, we must appease the unions." Milton chimed in to support Távora's words. "Exactly. Otherwise we'll end up like we did under Gomes."\n\nRaphael stood up, almost spilling his drink. "But we've invested so much! We can't just give in. We could at least demand some kind of..."\n\nPinto cuts him off, his words slightly slurred. "If you don't want us to be lame ducks until the elections, we have to withdraw. But, Virgílio, I have to ask. What will our dear Economy Minister Beltrão think? Won't he have any objections?""
brazil_lacerda_tavora.2.a: "Beltrão should decide that for himself. It doesn't change what we're going to do."

brazil_lacerda_tavora.3.t: "Exit Strategy"
brazil_lacerda_tavora.3.desc: ""My fellow countrymen..." It was a phrase the nation had grown to associate with Carlos Lacerda. But now they had to get used to someone else. He focused on the camera like nothing else in the room existed, hardly an emotion to be detected. "I speak to you for the first time as President. As my predecessor President Lacerda has resigned, I have already begun to serve in his place."\n\nHis voice faltered only once on the airwaves as he realized his presence in millions of homes and began to get used to it. "I do not want to overstay my welcome, so I will be brief. Today, I have signed a deal with the CGT to bring an immediate end to the general strikes which have plagued this country. Labor rights and laws will remain as they were at the start of this presidency, and we will find new ways to move forward as a nation."\n\n"Consequently, I have also implemented the agreement's conditions using executive powers and allow the National Congress to pass a new bill in the meanwhile. I have no doubt in the Chamber of Deputies or the Senate to perform their duties and pass the bill as I have done mine."\n\nFor one last time, he stared into the dark of the life-sized machine whirring at him, his gaze softening, his brows falling. "During my time in office as Vice President I have had to make some very difficult decisions. The judgment taken to reform this government and take on this role was the hardest in my life. This will continue, as it has when negotiating such difficult demands. But I do so in the hope that we may come out and do so together, with greater confidence, unity and strength than before. I thank everyone for your attention."\n\nThe whirring stopped. Now for the next decision. Who would replace Beltrão as finance minister? He would have to give either Pinto or Campos a call, and fast: time does not forgive those with little of it."
brazil_lacerda_tavora.3.a: "An introduction which feels more like a conclusion."

brazil_lacerda_tavora.4.t: "A Tale of Two Buildings"
brazil_lacerda_tavora.4.desc: "Of all of President Távora's frequent visits to the U.S. Embassy in Brasília, this one was already his least favorites. One of the first to be built in the new capital, it stood in rivalry, but not in opposition, to the Alvorada or the Planalto, but he couldn't tell which one today.\n\nThe approaches to the chalk-white colossus were lined with double the guards on patrol than he was used to, a persistent rumble of helicopter traffic descending and ascending from the landing pad. Even the familiar square structure seemed estranged to him.\n\n"Good afternoon, Mr. President, I hope you've been enjoying the reception so far," drawled Ambassador Gordon, referring to a never-ending throng of fanfare, pleasantries and music. The President simply smiled and nodded.\n\n"Yes, of course, Your Excellency, it is as if nothing has changed since last time," he added. Now the atmosphere really seemed to thicken between the two. The ambassador's smile became lopsided, having tried a chuckle to clear the air.\n\nIt grew clear to Távora that Gordon did not just take Lacerda's removal professionally, but personally. Between all the dancing words of diplomacy, he wondered whether it came out of a loss of a friend, or the gain of an "ally" whose description required definition.\n\n"In any case, Mr. President, one thing is clear," Gordon muttered, leaning into his guest's ear, "The United States will continue to support this national friendship and this government's agenda."\n\nNo matter how far the Embassy and the President's palaces seemed to be, Távora and his party would continue to be patron of America's support in large and small means. That was all he came to hear."
brazil_lacerda_tavora.4.a: "Unconditional friendship, tested."

brazil_lacerda_tavora.5.t: "Cuts and Class Wars"
brazil_lacerda_tavora.5.desc: "Leonel Brizola's office was spacious, one of the perks that came with years of service. He settled into his chair and turned off the radio. It was a good chair. A good way to start the day, newspaper in hand, as he looked over the latest priorities and atrocities of the new regime.\n\nAs he read down the page, his eyes were drawn to the newly announced cuts. It was deeper in the paper, past the fonts and editorials, and light on details. It did say, however, that the cuts were deeper and broader than before. Environmental affairs. This was not surprising; it has always been the capitalist way to let corporations fill the lungs of the masses with soot from their factories. Cuts there were just par for the course.\n\nThe others were more surprising, as he read about deep cuts in health and education. Of course, this is how Távora would play the game. Leave the working class out to dry so that he can "stabilize public finances" to appease his middle class base. Távora did not seem to remember that there were people on the other side of those slogans and spreadsheets. Brizola put down the newspaper and began punching in the number of Tancredo Neves, one of his allies. The phone rang for a while before Neves picked up.\n\n"I take it you've seen the news, Leonel," Neves said.\n\n"We can't let Távora get away with this. The people need to know what their new President is up to. What's the point of something like this sitting on the back page of the newspaper, if we can get the people to see what's going on, there's no way they're going to agree with Távora's plans," Brizola replied.\n\n"I had the same thought Leonel, I've been trying to arrange a meeting with Mr. Wainer, this is our chance to get things moving."\n\n"One thing's for sure, we can't let Távora get away with class warfare.""
brazil_lacerda_tavora.5.a: "If Távora wants a war we can give him one."

brazil_lacerda_tavora.6.t: "Still Life"
brazil_lacerda_tavora.6.desc: "On her way home from work in Guanabara, Francisca liked to observe the progress of one of the city's renovations — a new shopping mall. She remembered how Lacerda himself came to break the soil on the project. After that day, bit by bit it came to fruition. Sometimes, she wondered what marvelous stores would be inside once it opened.\n\nToday, it was boarded up, not a sign of progress. Just left behind Hitachi equipment.\n\nHer fingers clung onto the wire fence, eyes piercing through at what could have been. She thought back to when it was first announced and when they demolished the favelas on this site. Francisca was skeptical at the news, but Lacerda's promises won her over. All the wonder, all that glitz and dazzle in his sales pitch — nothing but snake oil.\n\nNothing would change — but that was just wishful thinking on her part. It would change — for the worse.\n\nWith the Guanabara Reconstruction Project ending, there would be no chance of a similar project taking its place here. Realistically, it would be sold off to private investors, and people would live here again — the wealthy people. Luxury flats were the new money-maker, concrete blocks blotting out the sun.\n\nAnd for the rest of them? The favelas would return — only further up the hills — until they were demolished again. At least nothing changed for her. Really, she should be grateful she didn't build her hopes up much. The disappointment wasn't so severe this time."
brazil_lacerda_tavora.6.a: "If the past was another country, she wondered how she could travel there."

brazil_lacerda_tavora.7.t: "The Consolidation of Man"
brazil_lacerda_tavora.7.desc: "Távora's cigarette burned away to a nub, swiftly replaced by shaky hands. This was the crunch — Braga's speech for the united UDN-PDC parties was imminent. Months of negotiations and a failure to find a suitable candidate from any of the four sides of the UDN had brought them here. The shame of it was buried by desperation and a need for political survival.\n\nNey Braga approached the stage, smiling at Távora before the moment of truth. So many favors had been called in to smooth his path for the candidacy — a veritable PR firestorm. His budget was spent, but was it enough to persuade them all? He'd get his answer soon as the applause subsided.\n\n"Thank you, thank you all for putting your faith in me." The microphone worked wonders for his booming voice, amplifying the orator's style tenfold. "Faith... is sadly something we Brazilians all seem to be in short supply of these days. We lack faith in our democratic institutions — we lack faith in our economy — we even lack faith in the Almighty Himself."\n\n"It can be disheartening at times, but this does not mean we surrender. No, we must fight for what we know is right. That is what I pledge to do as President. I will restore our economy to the stable developmentalist standard that we have thrived under. I will strengthen our democratic institutions to prevent them from falling to demagogues and strongmen.\n\nAnd most of all, I will return God to our country after our predecessors have forsaken Him for so long. So if you long to live in a moral Brazil, I ask you to fight for me today. Thank you."\n\nBraga left the stage, soundtracked by rapturous cheering and clapping as his name was chanted like a prayer to the Heavens. They loved him. It was almost enough to bring a tear to Távora and break his usual stone-faced complexion..."
brazil_lacerda_tavora.7.a: "...pleased that all the pain would be for something."

brazil_lacerda_tavora.8.t: "The Leftovers"
brazil_lacerda_tavora.8.desc: ""Restore our economy to the stable developmentalist standard?" What the hell was Braga talking about? Were they all fools blind to what Lacerda had achieved in his short reign? And what was all that crap about a "moral Brazil"? It all sounded like Varguist dogma to Raphael Magalhães, rhetoric completely alien to the UDN he loved. Then, the realization hit him.\n\nThe UDN he loved no longer existed, and the UDN of today had rejected him and his kind.\n\nTo be a Lacerdaist was to be a political leper. Their time in power was at an end, and now it was time for the long cold — the wilderness years. Even Lacerda has isolated them, gone off on his fancy world tour while those connected to him suffered. There would be no book deals for men like him, just hard realities.\n\nAll this information did nothing to enlighten Magalhães, only serving to make him miserable. That was until another realization hit him. There was no guarantee Ney Braga would win this upcoming election. If he lost, his rigid conservatism would be discredited as a vehicle for the UDN, forcing them to turn back to the ideology that led to their greatest success — Lacerdaism.\n\nSo if Magalhães could not lead, he would oppose. He would oppose Brizola if he became President and would do the same for Braga. The conference had ended as he finalized his plans. Time to see the mistress; she would help clear his mind, ready it for the next move. So he left, singing a Sinatra tune to his new fortunes."
brazil_lacerda_tavora.8.a: "Luck be a lady tonight..."

brazil_lacerda_tavora.9.t: "A Deadman's Dues"
brazil_lacerda_tavora.9.desc: ""So, President Távora and his goons are off trying to put out a thousand fires, the UDN is so intellectually bankrupt they now need to rely on other parties to supply them, and you will soon have to clean up all their mistakes like usual." Jango ambled around his Rio Grande do Sul ranch on a bad leg with Brizola by him, Brazil's next President. He smiled at his friend's comments.\n\n"Yes, we have inadvertently unleashed a horror on the rest of the world by allowing the lunatic to visit other countries. I can only hope to God they don't think all Brazilians are like that." Jango broke out laughing at the thought — thinking they should have pinned a sign saying such on his back. "Vargas this, Vargas that," a brief sigh, "you can only blame so many faults on a dead man."\n\nThe smile withered from Jango's face. "Two years since he passed. When they say time heals all wounds, they lied."\n\nBrizola understood his pain too well. "If Lacerda could dig up Vargas' corpse for another Cadaver Synod, he would." The joke fell on deaf ears. Brizola couldn't find any humor either. "I don't know anymore, bar that I must win. I just wonder what the old man must think about what's down here from up there."\n\nJango's wounded leg twitched back into an upright position, halting as he contemplated Brizola's words. Finally, he gave his answer:"
brazil_lacerda_tavora.9.a: ""All he would want is for Lacerda to leave his legacy alone.""

brazil_lacerda_tavora.10.t: "Hollows of Devotion"
brazil_lacerda_tavora.10.desc: "It was another evening by the fire for Raphael Magalhães, but he couldn't enjoy himself even with a Pinot Noir in his hand. His mind was gripped by an all-consuming fear of what would happen next to him, thoughts blazing in his head going over countless scenarios following the election.\n\nLacerda was gone in all sense of the word — except that he was still on this mortal coil — even if plenty of people wished he wasn't. "Carlos's Crusade!" That's what the newspapers titled it. Almost certainly as futile as the actual crusades. So while their former President got to swan about touring the world with his new book, his followers had to stay and fight.\n\nIt was infuriating beyond belief. He could not stop Lacerda from hurting himself when he was screaming about being betrayed by an inner cabal within the UDN. It made him seem like a loon, and it didn't reflect well on his men either. Raphael's reputation was being ruined by a man half the world away, and there was nothing he could do.\n\nNothing except continue to fight.\n\nHe knew he would not be the UDN's candidate in this upcoming election. And Lacerda, the former idol, was nothing but a disappointment now. However, that didn't mean his ideals should die with his political career, nor should his career die with Lacerda's. Whatever came next — it didn't matter — Magalhães would fight on. Brazil was far too beautiful to surrender."
brazil_lacerda_tavora.10.a: "A struggle against the death of dreams begins."

brazil_lacerda_tavora.11.t: "Last Few Desperate Hours"
brazil_lacerda_tavora.11.desc: ""Praying in the Oval Office like a penitent thief, Virgílio Távora heard his electronic priest whisper the prelude to his judgment. The electoral polls would be closing shortly, soon to seal his fate as either the man who saved Brazil... or an opportunist who doomed it to a return to Varguism. He switched off the radio, returning to his prayers in a desperate plea for absolution from God and the nation.\n\n"This is the moment we have waited for! For a new Brazil, vote Brizola today!" A saturated white shirt clung to Leonel Brizola's back as his hoarse voice screamed slogans to a baying crowd before the day closed in. Legs weak, he could barely stand, exhausted from nonstop campaigning. His mind swirled with colors, but Vargas' face remained crystal clear. It was all for him.\n\n"I solemnly thank you all for everything today. Win or lose, each of you has made me proud." The eyes of the PDC war room were pinpointed towards Ney Braga, pale and bloodshot, addressing his campaigners as they waited for the results to come in. Hope — fear — sorrow, it was all plastered on their faces. All that could be done now was to drink the nerves away.\n\nIn a quiet Australian bar, someone else easily took to the suggestion of a drink. Carlos Lacerda, the former President of Brazil, slugged back a shot of scotch in a break from his book tour. The astute barfly could hear him mumble "fucking Távora..." under his breath. What they couldn't listen in on was his mind, contained within, a traitorous thought — the hope that Brizola would win...""
brazil_lacerda_tavora.11.a: "...and show that pack of Judases the Christ they crucified."

brazil_lacerda_udn.1.t: "To Jump or Not to Jump"
brazil_lacerda_udn.1.desc: ""It's all a joke, isn't it," a senator said, waving his fork at his barely-touched galinhada. "Well, by 'it', I just mean the President, to be honest. You know, if I started betting against Lacerda the way those PSP hacks spend their money, I wouldn't even need to be here." He grinned at his joke, for he knew it was not one: the only thing more mediocre than his meal was his pay.\n\n"Right," replied the other. "The UDN can barely call itself a Union anymore. I can't remember the last time I went into a party meeting and people agreed on something. It's driving me mad. Even Salgado's goons look more electable than us right now."\n\n"At least Salgado's goons have a leader," spat the first speaker. "The Banda de Música- no, I don't even want to talk about it. But what are we gonna do, two old farts and a combined amount of status as a committee leader? Old donkeys don't learn new languages, we're good as gone anyway.\n\n"Gone... from the party, maybe. The PSD, the PSP, everyone else is looking stronger than us right now - Marcel, maybe even becoming independents is less suicidal than sticking to this. It's complicated, sure, but there is one thing I can assure you...""
brazil_lacerda_udn.1.a: ""...We're not the only ones thinking it.""
brazil_lacerda_udn.1_tt: "You need to keep your party loyal, or the senators will leave the party."

brazil_lacerda_samba.1.t: "The Last Bus Out of Tonelero Street"
brazil_lacerda_samba.1.desc: "It was more than ten years ago, but if Lacerda blinked, he could travel back to Tonelero Street.\n\nThe gunman came at them with full force, an obvious showcase of Vargas' heavy-handedness. He survived — only a gunshot to the foot — Major Rubens Vaz wasn't so lucky. That was the day Lacerda's fight truly began.\n\nAll he had was his voice back then, so he screamed as loud as he could so that even the Varguist establishment could not drown him out. President after President showcased the decrepit nature of the dictatorship, men living off his corporatist nature, daring not to go against his principles as if Vargas were a God.\n\nGomes was elected to undo the years of Varguist decay by the people, but he failed, and Lacerda was left to finish the job. As the President opened his eyes, he saw a new Brazil before him, one without the taint of Varguism. It glistened with cranes and construction, the sounds of innovation and industry fluttering through the air, the melodies of a liberated people.\n\nCapital had won over corporatism, another victory against the fascism pervasive across the world. Not everybody had realized this victory yet; there were those still deluded by the propaganda. Yet Lacerda knew the generations spared by his action would thank him later as the pain of Tonelero Street gradually faded from his mind."
brazil_lacerda_samba.1.a: "Unhappy memories... yet you give me the strength to fight on..."
brazil_lacerda_samba.1.tt: "£GFX_BRA_UDN_liberalism_texticon §YEconomic Liberalism§! has reached 100%. The following effects will be applied:"
brazil_lacerda_samba.1.tt2: "§Y$BRA_lacerdas_dream$§! will end once £GFX_BRA_UDN_liberalism_texticon §YEconomic Liberalism§! reaches 0%."

brazil_lacerda_samba.2.t: "The Fourth Head of Varguism?"
brazil_lacerda_samba.2.desc: "It took a lot for Lacerda to hold his tongue and not curse out Távora as he made his way through the television studio. His begging must have just been too much. "Lacerda, think of all the opportunities and good publicity." Távora never realized that some men care more about principles than publicity. Besides, his 'co-host' here will soon eat him alive on air.\n\nAs Lacerda entered the talk show set, he saw former President Juscelino Kubitschek, an embodiment of Varguism in the flesh. "Good evening, President. Thank you for joining me today. I can understand most men in your situation being apprehensive about coming on to such a program, having to delve through a state of Brazilian economics firmly shaped by your actions."\n\n"Thank you. Looking at Brazil today only brings me pride. I'd like to think we have improved people's lives considerably, but..." Alright, now it was time to lay it on him. If this smug retiree thinks he has anyone cornered, he's dead wrong. "...I was only continuing the work started by yourself. You were a visionary." What? Why were these words coming out of his mouth?\n\n"Why thank you, President, it means a lot coming from you." Alright, now why was he saying this? There wasn't even a trace of sarcasm in his voice. "During the elections, I would have loved to have won. Today, I can't help but feel like your Presidency has been a far better continuation of my work than I could have ever achieved. Even Vargas would be impressed."\n\nSome audience members found themselves bitterly disappointed about how this alleged debate to the death turned into a self-congratulatory conversation. For others, it was a surreal experience that made them question their own politics, leaving them with one lingering question. If the PSD and UDN can govern the country so well, both separately and together..."
brazil_lacerda_samba.2.a: "...then why would anyone support the PTB anymore?"
brazil_lacerda_samba.2.tt: "£GFX_BRA_UDN_statism_texticon §YEconomic Statism§! has reached 100%. The following effects will be applied:"
brazil_lacerda_samba.2.tt2: "§YThe cat§! will stop catching mice once £GFX_BRA_UDN_statism_texticon §YEconomic Statism§! reaches 0%."

brazil_lacerda_samba.3.t: "The Death of a Rebel"
brazil_lacerda_samba.3.desc: "Julio remembered all the horror stories of the old Vargas regime that his father told him, the dictatorship that whisked men and women away in the night to be tortured for days, deporting dissidents to Germany's concentration camps until it was no longer politically convenient. It was why he joined the UDN, the one party willing to oppose the worship of quasi-fascism.\n\nIf they stayed that way, he would have had no issues, but they didn't. Carlos Lacerda, the great radical who promised Julio and many others that his reign would not bend its knee to Varguism, was compromised. And now, where quarreling and brawls once sliced Congress in half, there was an unpleasant air of cooperation.\n\nParty lines had distorted into a faded mess, degenerating their identities and ideas into a disgusting cocktail sourced from the same Varguist well of thought. Julio watched the fellow politicians he once stood shoulder-to-shoulder with denouncing the excesses of Kubitschek and Lott now caroused merrily with the opposition, as a horrible epiphany slowly crept over him.\n\nHe no longer knew what his party stood for anymore.\n\nWhat was there to unite them if their policies were coming straight from the PSD's playbook? The answer for Julio was a dismal "not much". Not much to drive him, not much to fight against, and not much left in him to support a President he once cared for."
brazil_lacerda_samba.3.a: "In Paraná, a discarded UDN badge fades away under the tides."
brazil_lacerda_samba_3_tt: "£GFX_BRA_UDN_cooperation_texticon §YCooperation§! has reached 100%. The betrayal of the grassroots by the party elites will §Rharm§! §Yfuture campaigns...§!"

brazil_lacerda_samba.4.t: "The Crow's New Nest"
brazil_lacerda_samba.4.desc: "It was the last dinner the Lacerda household would have in Rio before the family were to pack up and move to the presidential palace the next day - and the family patriarch could not be happier.\n\nHe slurped down the plate of rice, beans, and pork that his wife Leticia had cooked up for them, as the children bickered amongst themselves. "But you always got the bigger room!" his daughter Cristina shouted at her brothers, incensed by their teasing that she would be saddled with the smaller of the Alvorada's bedrooms. She always had been a headstrong one, much like himself in that respect.\n\n"Oi!" his wife scolded. "No arguing in front of your father at the dinner table, he has a long day ahead of him tomorrow!" Cristina looked dejected, as Sebastião and Sérgio chuckled at her misfortune.\n\nCarlos shook his head good-naturedly at their antics. The boys really should know better, being six years her senior. "Let them have their fun, I'm just happy we're all here together." He was proud of them all in their own ways - Sebastião who spent his time translating books, Sérgio who had taken up his responsibilities at the Tribuna da Imprensa, and his daughter for being a strong girl in a man's world. They would all go far.\n\nA hand brushed against his under the table. It was his wife, who was looking at him with concern. He immediately knew where she was coming from. She was worried that being President would give him even less time with them. He squeezed it reassuringly; with people like Magalhães, Cavalcino, Levy, and others from the Banda de Música on his side, those five years would surely pass in a blink."
brazil_lacerda_samba.4.a: ""And we'll stay together no matter what.""
brazil_lacerda_samba.4.tt: "Only time will prove if optimism is enough to succeed..."

brazil_lacerda_samba.5.t: "Chega de Saudade"
brazil_lacerda_samba.5.desc: "José de Magalhães Pinto, governor of Minas Gerais, greeted his secretary, took the mug of coffee off her desk, and entered his office. A mountain of work lay on his desk, ready to be scaled. Under normal circumstances he would have attended to the challenge immediately, but instead he sat back in his chair and took pensive sips.\n\nHe had been lost in thought ever since he heard President Lacerda on the radio coming into work. He might have appointed Pinto Party President, but that was the consolation prize he got for losing the true nomination. Neither man trusted each other. Where the rest of Brazil saw someone making a clean break with their Varguist past, Pinto only saw a dog who bit through his leash, running around and shitting on what was one a well-kept front lawn.\n\nPinto winced; his tongue flared up with searing pain from too long of a sip. He slammed the coffee mug down too hard, and some of the coffee jumped free of the mug and landed on his desk. He muttered something caustic and retrieved from his pocket a handkerchief. As he wiped it away, his burning tongue turned his thoughts towards petty hatred. He should have been President of the whole nation, not merely the party. If not for Lacerda's lot, he and his kind would be guiding the nation. They still might; 1970 was not so far away.\n\nCleaning away the droplets of coffee soothed Pinto's mind. His thoughts turned away from despair. He had his nephew. Nephew Lins, director of the National Bank of Minas Gerais, the UDN's piggy bank. Nephew Lins, patron of the arts, with friends in every major media outlet across Brazil. Dear nephew Lins, who owed his success to his uncle's good name. It would not be begging; it would be the collection of a bill long overdue.\n\nHe wiped away the last drop, neatly folded the handkerchief and stuffed it back into his pocket. The mountain went unsurmounted, but he had a bigger goal in mind. He picked up the phone. "Be a dear and place a call to Lins' office, please.""
brazil_lacerda_samba.5.a: "Mas se ela voltar, se ela voltar, / Que coisa linda, que coisa louca..."
brazil_lacerda_samba.5.tt: "Can the UDN change its colors?"

brazil_lacerda_samba.6.t: "The New Viceroy"
brazil_lacerda_samba.6.desc: "Below an immaculate office, the great sea of concrete known as Brasília hustled and bustled, all to the pleasure of the ever-watching Virgílio Távora. It was one of the perks of the Vice-Presidency, one that he had certainly earned.\n\nThis role wasn't just for him — it was for all the Realistas that came before him and tried before being consigned to history. His uncle Juarez, the Viceroy of the Northeast, was just one of them. He laid the groundwork for his own rise to power, making it a simple affair for a man as capable as himself after he inherited his uncle's vast network of connections.\n\nIt was easy after. You build a few roads here, buy some new schoolbooks for the kids there, and as usual in Brazil, grease some palms where necessary. Common bribery and corruption were never his forte, of course. Távora prided himself on patronage, finding jobs for any party supporter where available. After a while, Ceará belonged to the Távora family.\n\nIt was his apex, and it did not go unnoticed by the party establishment. Carlos Lacerda had a radical reputation, but he pleased the people — he just needed someone by his side who could also please the party. Enter Virgílio Távora, the new running-mate of Carlos Lacerda.\n\nHe was not the first Távora near the Presidential stage — that was Juarez back in 1955. He did not succeed like his succeeding Realista candidate, Juracy Magalhães. But where they had failed, he succeeded. It was his time.\n\nSure, Lacerda was an occasional radical, but he surely was not above listening to his peers from time to time. As Távora settled into his work, he was confident the Realistas would soon rub off on him..."
brazil_lacerda_samba.6.a: "....hopeful that even the most intransigent of souls could be taught cooperation."
brazil_lacerda_samba.6.tt: "The Statesman from Ceará will fight for pragmatism."

brazil_lacerda_samba.7.t: "An Unwelcome Past"
brazil_lacerda_samba.7.desc: "A sunray peers through cheap plastic blinds, pouring more sweat beads onto the tired head of one Milton Campos, another drop in the sea of indignities. At a glance, even well-versed politicos would be hard-pressed to say that the hunched-over figure, scrutinizing almost decade-old documents, was the current leader of the UDN's Liberais Históricos faction.\n\nHe looked at photos from the glory days carefully as old policy documents and manifestos scattered around his desk. Back then, Brazil was at their fingertips with Eduardo Gomes in charge of the party and nation. The rest of the UDN couldn't get enough of them — he was thronged with hundreds of Lacerdas back then, friends far more fairweather than he would have cared for.\n\nThen came the Labor Code — an abomination representing all the excesses of that dictator, Vargas. If they were to progress further, they would inevitably have to deal with it — the whole party was rooting behind them, but then came the flood. They took out the first block — minimum wage — and then it was as if the world turned against them, no amount of middle-class applause could save them.\n\nThe PSD-PTB beast came back at them brutally. Their bill to join the OFN was dead on arrival, and their government had as much legislative weight as a dead duck. If Gomes had announced he was a communist, he wouldn't have been as unpopular.\n\nTen years later, the damage still hadn't subsided. Where they had the Presidency, now they only had a handful of deputies, one or two senators, and no governor would touch their faction. At least the party was in power, and as such, there were opportunities to crawl back from the brink. Luckily, Campos knew just the man as he dialed the phone for one more attempt to escape oblivion..."
brazil_lacerda_samba.7.a: ""Hello Eduardo. Tell me, who in the army could we rely on for backing?""
brazil_lacerda_samba.7.tt: "The die is cast - the fight for the soul of the UDN begins."

brazil_lacerda_samba.8.t: "Buried in Hate"
brazil_lacerda_samba.8.desc: "Mauricio was in his twilight years, but life had treated him well up to this point. For the last five years, he made the same trip to and from the local cafe to meet his friend Osvaldo and talk about life, passing by the same Vargas statue in Porto Alegre each time. Today, he gasped at the sight of it daubed in red again. It hadn't escaped his mind by the time he met Osvaldo.\n\n"It's insanity, the cheeks of these hoodlums to vandalize the statue of the Father of the Poor." Osvaldo couldn't stop his friend if he wanted to; he hadn't seen him this worked up in decades. "Once, I could let slide, but this has been happening over and over again. It's our damned President, Lacerda. If he could, he would blame the rise of the Nazis on Vargas."\n\n"They are just kids, Mauricio. They don't know what we went through. They hear Lacerda talking about dictatorship this and dictatorship that, but never about the long and cold nights that came before him. We might know them well, and the days of Gomes, where we practically had to beg for food after our wages were slashed in half after his minimum wage reforms."\n\n"'Reforms...'" The word lingered as he remembered those dark times following its abolition, deciding he would prefer not to revisit them further. "A lot of people slander Kubitschek, but he has my eternal respect for getting us out of two years of hardship... and now it seems like Lacerda will put us right back in that hole...."\n\nHe sighed — all this talk had done nothing but depress him. "We'll know who the real Vargas was — not some power-crazed fascist described by our President to distract us from the fascist running our country — but our hero, and we'll be damned before we let Lacerda's history triumph over ours." They hugged as if to cement this pact before departing for their new mission."
brazil_lacerda_samba.8.a: "The young and old — fighting a war of two men to define Brazil"
brazil_lacerda_samba.8.tt: "£GFX_BRA_UDN_intransigence_texticon §YIntransigence§! has reached 100%. No longer shall the £BRA_udn_texticon §QUDN§! compromise on freedom!"

brazil_lacerda_samba.9.t: "Four Paths To Freedom"
brazil_lacerda_samba.9.desc: "Before Lacerda were four photos, lined up single file on his desk like soldiers on parade. He would have preferred to discuss them without the visual aids, but Magalhães couldn't help but wave the photos around as he spoke of them. "There's two safe options here." He held up one photo. "You've got Campos, who'll probably have you driving more nails into Vargas' sealed coffin." He held up the other photo. "Then we have Baleeiro. He's smart, still young for our lot, and he's firmly in our camp."\n\n"Baleeiro's interesting, I won't deny it. Still," plucking the relevant photo from Magalhães' hand, "Campos knows the UDN rank and file. We're still early in our term, and I don't intend to lose the next election to a couple of disloyal deputies."\n\nMagalhães cleared his throat, set the other photo back into line. "Speaking of which," his hands hovering to the right, "there's these two." His fingers tapped on both their photos. "I know how you feel about Távora and Pinto, but I wouldn't dismiss them so early."\n\n"Raphael," he said, bordering on a hiss, "I'm not interested. I don't want to sully our first term in power with compromise."\n\n"Even in your own party? Look," tapping on the bald head, "Pinto's in with the churches, his nephew runs the Minas Gerais bank. That's campaign funds straight to you from their discretionary funds, all legit. And Távora-"\n\n"-is a snake?"\n\n"-is close to the oligarchs. Rich men, Lacerda, who'll run to Adhemar the second we give them an excuse." With a sweep of his hand, the row of photos merged into a pile. "Carlos, it's good politics to keep some of them happy, at least.""
brazil_lacerda_samba.9.a: ""Alright, alright, fine. I'll hear Távora out.""
brazil_lacerda_samba.9.b: ""I'd rather keep them disciplined than happy. Let's talk with Campos.""
brazil_lacerda_samba.9.c: ""I still like what Baleeiro's been saying. Schedule a meeting.""
brazil_lacerda_samba.9.d: "He said nothing, but looked at the photo of Pinto, and let out a long sigh."

brazil_lacerda_samba.10.t: "Necessary Favours"
brazil_lacerda_samba.10.desc: ""Beautiful day, isn't it?" Távora tore open a satchel of sugar and poured it into his coffee. He offered another to Lacerda, who shook his head. The two had been engaged in a pleasant conversation on a balcony overlooking Fortaleza's beaches. It had been a brief reprieve from the tensions in Brasília, right up until the moment when Távora tried to gently discuss a few key appointments. He clammed right up, made some comment about the weather.\n\n"Don't change the subject, please. Say what you meant to say."\n\nTávora sighed, set the mug down on the table. "Carlos, you have to understand. The UDN has to be a party that supports everyone. We're meant to link everyone's hands. But we inherited a machine and a system of machines. You work with the machines you have while building better ones." He considered saying "that's politics," but thought better.\n\n"So you're saying that corruption is necessary? Mandatory, even?" He sipped his bitter coffee; a rush of energy bounced between his shoulders.\n\n"I never said corruption. I'm not asking you to bribe a judge or a police captain." Távora stirred the flecks of sugar in his own mug. "But there are some posts in our government that should go towards even our enemies. The PSP, for instance." He stared out onto the beach. "There's a city council race here. Three seats are guaranteed to be ours, but there's another..." He trailed off, staring at his coffee first and then back at Lacerda. "We are meant to be a party for everyone. And that sometimes means we need to compromise, give space even to our enemies for the sake of national stability."\n\nA face flashed in each other's minds. Lacerda shifted in his seat, and then grabbed a satchel of sugar."
brazil_lacerda_samba.10.a: "I'll keep it in mind."
brazil_lacerda_samba.10.tt: "These decisions will be more powerful if we will be $BRA_lacerda_udn_party_thinking_with_the_realistas$..."

brazil_lacerda_samba.11.t: "Se É Tarde Me Perdoa"
brazil_lacerda_samba.11.desc: ""So, how do you like the renovation?" Magãlhaes Pinto waved his hand. "I had the cardinal over here earlier, loved the Niemeyer feel. He says hello, by the way."\n\n"Mmhmm." That was all Lacerda could muster as they walked up the marble stairs and through the mahogany doors. The walls beside him were wood; the wall facing them was glass, through which natural light flooded the office. A red shallow strip of concrete ran through the top quarter of the walls surrounding them. Lacerda, though hardly a student of architecture, was sure that this was not Niemeyer's work.\n\n"Now, President Lacerda," Pinto said, slumping into his office chair, "I know we've had our differences, which is why I appreciate you reaching out to me, so I'll tell you what the Brazilian people want: reform. A clean break from our Varguist past is all well and good, but you can't dwell on the past. You need to tell the people just what they voted for."\n\n"I am aware, Pinto. I thought I'd made myself quite clear to them on the campaign trail."\n\n"Touring's one thing, but now you're the concert headliner. It's a different show." He leaned in, elbows on his desk. "That's where my nephew comes in. Now, he knows every newsman from here to Amazonia. He'll get your message out there, long as you keep him happy." Lacerda's nose wrinkled; Pinto pretended not to notice. "All you need to do is to feed him. And what do you feed him? Victories. You pass reforms, you make executive decisions that benefit the UDN and the people, and his people will cover you every step of the way."\n\nLacerda sighed. "I'm not new to this, Pinto, and if he wants victories, he'll have to contribute to them as much as we do." He adjusted his glasses, braced himself. "Now, you were saying something about sensible reforms?""
brazil_lacerda_samba.11.a: "Trago desencantos / De amores tantos pela madrugada..."
brazil_lacerda_samba.11.tt: "These decisions will be more powerful if we will be $BRA_lacerda_udn_party_playing_the_bossa$..."

brazil_lacerda_samba.12.t: "Rehearsal"
brazil_lacerda_samba.12.desc: ""Wonderful view," said Aliomar Baleeiro, sitting with his legs crossed and sipping on his mug of coffee on the balcony overlooking the palace's reflecting pool. "Are these the perks of leadership I hear so much about? Wonderful homes and a late morning start?"\n\n"Trust me, I don't think of this as mine." Lacerda chuckled, sipped his own coffee. "More like a working holiday home. Besides, I am working. Talking with you about party business is work."\n\n"Because it's so exhausting?"\n\nAnother chuckle from Lacerda, who sat his mug down. "Let's get down to business. I read your letter, and I'm intrigued about this sponsorship idea."\n\n"I'm glad to hear it. It'll work, President Lacerda. Sponsoring debate clubs shows your commitment to freedom of political expression, something Vargas would've never allowed. Libraries show your dedication to educating the Brazilian people, and every now and then you throw some cash to festivals to show you're not a stick in the mud. Slap a UDN sticker on all of them, and they'll know who to vote for when they next go to the polls."\n\n"As long as it doesn't cost too much. And as long as we draw clear lines between us and Vargas. I want that clear, Mr. Baleeiro: we're putting his tyranny past us, and anyone who can't get behind that can step aside." As Baleeiro's eyes rested on the pool, koi swimming placid through its waters, Lacerda ran a finger across the rim of his mug. "Tell me, what's the most important thing for our party?"\n\n"Unity, Mr. President?"\n\nLacerda smiled, brought the mug up to his lips and took a long sip."
brazil_lacerda_samba.12.a: "The band has to play in time and in tune, no?"
brazil_lacerda_samba.12.tt: "These decisions will be more powerful if we will be $BRA_lacerda_udn_party_playing_the_banda$..."

brazil_lacerda_samba.13.t: "The Old Guard's Tomb"
brazil_lacerda_samba.13.desc: "Surely, Lacerda thought, an old-timer like Campos wouldn't stay in such a dimly-lit office? Though every light was on—two in the ceiling, one on the desk—he still felt as if he was in a deep cave, working by candlelight. His eyes turned to the brightest sight he could find; a photo on the wall, of younger and happier times. Campos with an old friend, Eduardo Gomes. "He says hello, by the way." Campos snapped Lacerda back into reality. He took a seat, earlobes burning.\n\n"Now, regarding your proposal," Lacerda said, handing back the file Campos sent him. "I'm interested. You're right about one thing: discipline will be important in the coming months. We haven't been a party in power for long, and there will always be unscrupulous people in an unfamiliar position. We need to make sure we keep them on the right path."\n\n"Agreed." Campos sat forward in his chair. Lacerda could have sworn he never blinked. "Keep an eye on them. Test them, even. Being in the UDN is a privilege. They should work for it."\n\n"My thoughts exactly." Lacerda let himself settle back in his own chair. "Still, I was a little confused by your previous message. You don't think that party discipline is a primary issue?"\n\n"It's the bureaucracy. Rife with Varguists. Rusted-on. Cleaning it up should be a priority, Mr. President. Remove the rust, polish it until it shines. Good UDN men in the right offices will help."\n\nThe word partifição crossed Lacerda's mind, but he would not be the one to say it. Instead, he coughed, and said "In any case," before wiping the last traces of dust from his finger. "In any case, I think there's a lot we can do to work together. I'll be in touch, Mr. Campos." They shook hands; Lacerda tried to ignore how cold and clammy Campos' hand was."
brazil_lacerda_samba.13.a: "Lacerda's eyes flicked again to the picture, and understood why he hated the Varguists still."
brazil_lacerda_samba.13.tt: "These decisions will be more powerful if we will be $BRA_lacerda_udn_party_together_with_the_liberais$..."

brazil_lacerda_samba.14.t: "Triumph of the Nuclear Family"
brazil_lacerda_samba.14.desc: "The chair still felt far too big for Sérgio. The financial straits of "La Tribuna" were quite well known at that point. Turning from opposition firebrand to government supporter was a unique challenge. But he was still Carlos' son. Despite the troubles, he had managed to keep the newspaper on a steady course and feel proud of his publications. That day, he felt especially proud.\n\n"Today, countrymen, is one of national jubilation." The clacking of the typewriter reminded the young man of overhearing his father write furious editorials. "Our country, along with the auspicious United States of America, have officially entered into a treaty of technological proliferation. As we speak, our scientists are being supplied with all that is required to construct our own nuclear system."\n\n"Of course, it is not without struggle that we have achieved this guarantee of sovereignty." Sérgio looked at the picture of his father, framed in mahogany. A man of simultaneous composure and honesty. "My father worked to transform the great city of Rio from a tired hovel into a prosperous bastion. Today, he continues to act fearlessly to elevate our people and our nation, now as our esteemed President!"\n\n"There is still work to do. There are still citizens to uplift, idlers to give work, criminals to ensnare, and traitors to expel." Sérgio paused, and started thinking. Years ago, he would've thought about what his father would say. But today, he is Sérgio, not Carlos. He had come up with something entirely his own, yet inspired by his father still, traces within the new whole. He typed the final lines with unforeseen tears welling up."
brazil_lacerda_samba.14.a: "...But today, we shout, for a Brazil forever free!"

brazil_lacerda_samba.15.t: "Everything Goes Better With Cauim"
brazil_lacerda_samba.15.desc: "The bar here catered to privileged clientele; it was a favoured haunt of diplomats, politicians and their overindulged children. Blackwashed concrete absorbed secrets, and bright stage lights flooded the dance floor. The ground floor was for partying, but the balcony above was for more private conversations; the jukebox speakers barely surfaced, and one could hold court with a reasonable expectation of privacy.\n\nThe balcony had been cleared out. The arrival of two special guests demanded it. Sitting in a booth overlooking the main bar and dance floor, two men clutched their cauim and commiserated alone.\n\n"Defeated. Fucking tore apart in our own Goddamn Senate." Eduardo Gomes, former hero and current Minister for Aeronautics, took a swig. And another. "This is just like when I was rejected by the party. The first time, I mean. The Goddamn hurt."\n\nCarlos Lacerda was much more reserved about his consumption, but he had already finished off a mug and was quickly on his way to a second. Bossa nova played below him; it sounded like the party was underwater.\n\n"I mean, why? This is a PTB constituency, you know. PTB men voted to kill it. Vargas' lot. Who does that? Who votes for tyrants?"\n\nLacerda did not answer straight away. He polished off his second mug of cauim—it tasted sickly sweet, like cough syrup, and though the taste disagreed with him he had three more cups in his future tonight—and looked at the crowd. Young and old couples danced to the music, their bodies whipping like cords around the polished floor. At the bar, lovers laughed and brushed each other's hair. White-collars gathered at tables, gossiped, drank, giggled at their jokes.\n\nLacerda's imagination wrenched them out of the club and into war. He saw the young man in the velvet shirt torn apart by an Argentine mine. The group of women on the left side of the bar hurried along an overburdened field hospital, nurse's smocks stained with blood. Old men at a table in the corner huddled around a dark conference room, using the chaos to draft new laws against the Brazilian people. All of this, made more possible because the safety of a nuclear umbrella was now gone. How could they not know?"
brazil_lacerda_samba.15.a: "Did any of them want to be free?"

brazil_lacerda_samba.16.t: "Vivo Sonhando"
brazil_lacerda_samba.16.desc: ""Mr. President!" called out a familiar, frustrating voice. Lacerda had hoped to spend the rest of the day in Planalto, in his office, but he could not even make it to the front door without Magalhães Pinto stepping out from underneath the ramp. "Mr. President, could I have a word?" Lacerda stared at Pinto for a moment; his shoulders slumped as he nodded, and he waved away the guards. The two walked to Lacerda's office without exchanging another word.\n\n"I just wanted to express my condolences," said Pinto, who rejected the seat that Lacerda offered. "I know that the vote didn't go according to expectations, bu-"\n\n"It was out of our hands." Lacerda spoke quickly, clearly, as if it were rehearsed. He said nothing else. They sat in silence for a few seconds. Lacerda's eyes seemed unfocused, drifting lazily between Pinto and the desk. Pinto paused, before clearing his throat.\n\n"Mr. President, do you remember what Quadros said about foreign policy? 'Freedom, independence, and non-interference.' Flowery nonsense, yes, but there's a kernel of truth to it. We don't need the Americans to tell us how to run our country, and we certainly don't need their assistance to pursue a nuclear program. Moreover, perhaps we should be more willing to embrace independent foreign policy. Charting our own course in the world."\n\nLacerda kept staring at him. A small silence hung in the air. "That's all, Mr. President. Give it some thought." Though Pinto turned to leave, he lingered at the doorway, then faced Lacerda. "Remember, the Americans abandoned you. Not us."\n\nPinto closed the door behind him. Lacerda turned in his chair to face the window. Clouds gathered over the sun. Cars passed by the palace. An ordinary day, thought Lacerda, punctuated by an extraordinary event: Pinto being right about something."
brazil_lacerda_samba.16.a: "Você não vindo, não vindo a vida tem fim..."

brazil_lacerda_samba.17.t: "My Place Is Here, In Your Heart"
brazil_lacerda_samba.17.desc: "Jânio Quadros had once been largely content with staying out of the spotlight. Sure, there was the occasional radio interview, a newspaper article here and there. He still made time to attend fundraising dinners and the occasional rally. He did not fall from the face of this Earth, though he did slip quietly into its shadows.\n\nBut as a nation slowly crawled out of the riots, Quadros crawled out from those shadows. He made a sudden appearance on Rádio Bandeirantes, just after the 7 o'clock update. Even the anchor seemed surprised, hesitating just before he spoke his name. From that moment, Quadros spoke and did not stop, and most of Brazil tuned in to hear what he had to say.\n\n"...and if anyone is to blame for the disaster in the streets, they should look to that rabble under Adhemar! It's the PSP that got people so riled up, playing up divisions just so they could take a few seats from Lacerda! But you know what he did? You know what? He bridged them. He bridged the divides. He brought true equality, gave the Nikkei a real franchise..."\n\nNobody quite knew what brought about this change of heart. While he said nothing public about Lacerda again, Quadros would play his part in helping heal Brazil after the riots ceased. He held shovels, he shook hands, he bathed himself in the warm light of the camera's flash wherever reconstruction was being held. He gave speeches wherever there was a platform and a microphone.\n\nThe morning after Quadros' first broadcast, Lacerda dragged himself to the breakfast table where, next to his coffee, Quadros' broad grin shot out of the newspaper's front page. With more than a little petulant haste, he turned the page. There was more news of reconstruction hidden behind his smile. Pictures of construction crews and emergency workers lined the sides, along with a familiar man holding a shovel. Lacerda scoffed, but didn't turn the page."
brazil_lacerda_samba.17.a: "At least he'd help Lacerda play a bit better in São Paulo."

brazil_lacerda_samba.18.t: "Protecting the Protectors"
brazil_lacerda_samba.18.desc: "When the Liberais Históricos gathered, they eschewed public spaces. The years of the Estado Novo taught them that nothing was as secure as their own homes. Tonight, they gathered at the home of Milton Campos, their seemingly eternal leader. In the modest two-story Ponte Nova house, a dozen knights of Eduardo Gomes' legacy gathered to discuss matters meant for their ears only. Most nights, it was more of an excuse to get drunk and complain about Lacerda's perceived slights.\n\nCampos, however, had something more productive in mind. He excused himself briefly from the larger discussion, and summoned to his private study two other men: a captain in the Federal Police and a major from the Brazilian Army. He held in a claw grip a glass of red wine, some local vintage whose name they had not bothered to recall. Warm light from the lamp on his desk reflected against his glasses, obscured his eyes.\n\n"Lacerda's seen reason. He's authorised further funding for the police." He took a sip. "After the last few weeks, he's had to."\n\n"We're grateful for it, certainly." The captain's moustache twitched as he spoke. "With the new funding that's coming in, we'll have a force equipped to meet the next set of riots, God forbid."\n\n"No. You need more for that." His eyes turned to the major. "Much more."\n\nThe major breathed in slowly. Cold sweat formed at the top of his spine. "You're talking about turning arrests into executions with equipment like that."\n\n"Incorrect and obscene." Campos finished his glass with a single swig. "I'm talking about protection. The silly Japanese and their riots—it never would have been as destructive if you'd been better equipped. Real guns, real shields." He set the glass down on his desk."
brazil_lacerda_samba.18.a: ""I'll take care of it. You'll have what you need.""

brazil_lacerda_samba.19.t: "Great White Saviors of Brazil"
brazil_lacerda_samba.19.desc: "The life of Wilson Leite Passos was often a difficult one when it came to squaring his own political beliefs with those of his party, especially under Lacerda. When Passos would take two steps back, Lacerda would take two steps forward. But on this day, the administration and Passos were perfectly locked together in step, if not by choice.\n\nThe attempted repeal of the ban on Japanese immigration to Brazil had failed in the Senate as common sense had prevailed over a twisted attempt to degenerate the Brazilian nation further. Good riddance, he thought, hadn't countries like America already been polluted heavily with their immigration policies? The Asian races couldn't be allowed even more of a foothold.\n\nBut with this personal victory came a few other delights, notably, the similar opinions of a few other congressmen. Passos' politics were allowed to blossom as he and his new intellectual bedfellows discussed immigration — their views echoing some of his. It was fantastic to have the ban from Japan upheld, but what about other nations?\n\nChina? Yes, that was certainly a candidate to ban immigration from. What about a ban for the whole CPS? Well, that would be political suicide to get out at once, but maybe if done piecemeal. What about Africa? I'm sure nobody cares about most nations there apart from Angola and Mozambique; they would be ripe for bans.\n\nThese were just some of their proposals, some far-fetched, some not. In Passos' mind, there would be a day when they would all become possible, where his views would become that of the majority."
brazil_lacerda_samba.19.a: "A Nazi's day in the limelight."

brazil_lacerda_samba.20.t: "Necessary Stain"
brazil_lacerda_samba.20.desc: "In the grand halls of the Planalto Palace, Carlos Lacerda sat in contemplative silence — his hands and feet crossed. The recent pacification had cemented UDN as the ruling elite, but it was hard being happy about this. This sweep was as much of a pacification as piling and burning of bodies was a plague control.\n\n"Thank you for managing the situation," Lacerda straightened his back and cleared his throat. Gomes and Campos looked at each other and then back down at the President sulking over the damage assessment.\n\n"Without decisive action, the crisis would have only worsened," Gomas assured.\n\n"Sure it would," the President knew that much, slowly getting up from his desk. "But how will the Brazilians see me now? He clicked his tongue, sitting back down. "This isn't just a negativity bias. This was a stain," he violently pointed down at a picture of a college student with his skull cracked open during the protest — his blood forming into a dark puddle near the gutter.\n\n"As far as I am concerned," Campos flipped the photography over, "this was a provocation — Varguist provocation." He nodded as if he had just said something profound. "Cause and effect."\n\nLacerda raised a hand. "You're dismissed." Alone in his office, Carlos made a nasty face while tucking the damage report into his desk. He loved this country. He loves these people. The idea that they could see him as worse than Vargas felt like a betrayal — even if it were all in his head (or so he would like to believe). He wanted to be a candy shop owner but was forced to be the doctor delivering bitter medicine. If no Varguist trade unions had to be dismantled in the 1st place, there would never be that crisis, right — right? Shifting in his chair, the President's shoulder bumped into a coffee cup, spilling the dark liquid all over the wood."
brazil_lacerda_samba.20.a: "Cause and effect."
brazil_lacerda_samba.20.tt: "£GFX_BRA_UDN_cooperation_texticon §YCooperation§! with the Political Establishment will become §Rimpossible§!."

brazil_lacerda_samba.21.t: "The Labors of Heracles"
brazil_lacerda_samba.21.desc: "Cigarette dangling from his lips, Sérgio Fleury rubbed his sore knuckles. He had never been one to shy away from interrogation, God forbid, but it had never been so physically taxing.\n\nEven a month after the strikes ended, suspects kept crawling out of the underbrush like insects, one after another. Some cried, some cursed, some spat their blood back in his face, but no matter what he did to them, there was another one chasing behind.\n\nA good example was the communist he had jumped this morning - that had been frustrating. Solid as a rock, even after he was beaten near-dead; he bled so easy they had to hose down the interrogation room early, teeth collecting in the drain. Dumb fuck could've saved himself a lot of trouble - that was all to be said about it.\n\nHis shirt was dirtied. What was he, some thug? Psychology was as important as anything - the Yankees had stressed that. Maybe the suspect, once he's out the ward, wouldn't play so dumb if his family were on the line.\n\nSérgio had to admit one thing - it was tough work, but it wasn't thankless anymore. For his role in ending the strikes, he was treated like the king of São Paulo, invited to fancy events, rubbing shoulders with the high and mighty. Yet when he'd come back to the office, the suspect list just got bigger, his duties ever more expansive. Nearly enough to make a man go crazy.\n\nDarling Maria, my wife, my angel, you help me get through the day."
brazil_lacerda_samba.21.a: "Cigarette burns on a perp's back like the crater-strewn surface of the moon."

brazil_lacerda_samba.22.t: "Twilight President"
brazil_lacerda_samba.22.desc: "Pinto dialed the number, his fingers drumming lightly on the desk while waiting for the connection. It rang twice before a familiar voice finally answered. "Távora. My friend," he began.\n\n"Pinto," an older voice responded. "Do you need me in the office?"\n\n"No. Nothing like that," Pinto leaned out of the window — the setting sun still bright enough to bask his face. "I am simply calling to congratulate you on the negotiations."\n\n"It needed to be done."\n\nThe way in which he spoke only reaffirmed his resolve. "You know, I see a new opening for the UDN," he extended his hands in a one-sided theatrics while holding the handset with his shoulder. "To be part of the establishment — a party of stability. And for that, we need a strong leader at the helm." There was a pause, with only Távora's cough coming through the landline. "Long story short: I see you as President."\n\n"President," a horse laugh echoed through the device. "I'm too old for such ambitions. Isn't it time for the youngsters to lead the party?"\n\n"Nonsense. Every household needs a father — Brazil needs a father."\n\n"Listen, Pinto," Távora began talking like a parent distracting his child. "I've recently heard a lot about the governor of Paraná, Ney Braga. He's already a titan of local politics and seems ready to continue the legacy of the UDN on the national stage. Give him a chance." As Távora hung up the phone, Pinto turned back towards the sunset."
brazil_lacerda_samba.22.a: "Give him a chance, huh?"

brazil_lacerda_samba.23.t: "Brasília Armistice"
brazil_lacerda_samba.23.desc: "Pinto, as party leader, stood at the head of this party meeting. Yet all eyes were turned towards the one who really brought them together, who sat to Pinto's left, his hands folded together, his eyes hidden behind dark lenses. Nobody knew what cards he held. Pinto folded already, but Milton Campos held his hand tight and Raphael Magalhães seemed ready to throw his cards away, jump over the table and throttle Távora.\n\n"Gentlemen," said Pinto, clearing his throat, "given the extraordinary circumstances of these recent events, I felt it prudent to hold this emergency meeting. We are here to-"\n\n"You," said Campos, his eyes never leaving Távora. "What have you done?"\n\n"Something nobody else had the courage to do." Campos grit his teeth. Magalhães' clenched fist trembled under the table. "If we'd left him to his own devices, the Riots would've been a bloodbath. Can you ever trust a man like that?"\n\n"Enough, both of you," said Pinto, who placed his palms on the table. "All this infighting is making the UDN look weak and distracted, and I want it to stop now, before we're destroyed in the next election."\n\n"What do you propose?" hissed Campos. "Working with him?"\n\n"If you don't like it," said Távora, "leave. Go join Gomes on the sidelines."\n\n"You fucking trai-"\n\n"Enough!" screamed Pinto, so loud it burst every thought bubble. "No more infighting, no more bickering. Until the party conference is over, we all circle the wagons, give our support for Távora, and we all shut the fuck up. Is this clear?""
brazil_lacerda_samba.23.a: "With the greatest of reluctance, they all accepted."

brazil_lacerda_samba.24.t: "The Convention Starts"
brazil_lacerda_samba.24.desc: "Virgílio Távora shifted in his chair on the stage as the auditorium began to fill up. It had been five short years since the last time the UDN held their convention, when Lacerda had rode in on the wave of populism and charisma to win not just the nomination but the Presidency itself. However, we all know how that turned out.\n\nTávora, as the sitting President but with no inclination to run for the top job himself, now sought to steer the party away from the self-destructive Bandas, exemplified by the disastrous strike, and toward the Realistas, namely Távora's pick Ney Braga, Governor of Paraná.\n\nThe first order of business was that of the UDN party presidency, currently held by Magalhães Pinto. One delegate, who had last week spoken to Távora, proposed postponing the vote for President of the UDN until after the election. After a voice vote, it was agreed.\n\nBut more important now was to determine who would be at the top of the ballot for 1970. Another delegate, whom Távora had long discussions with, nominated Braga. A few other delegates nominated a handful of lesser known candidates, most of whom would have had little chance due to their lack of name recognition or their spotty track records in their current positions.\n\nBut then someone else announced they supported Raphael Magalhães for President, and now Távora sat up. A Banda and once one of Lacerda's most loyal followers, his nomination could drive them back to the political wilderness. While Távora remained stone faced outwardly, inside part of him was screaming. They just saw what happened when Lacerda was in charge, and they wanted to do that again?"
brazil_lacerda_samba.24.a: "Távora could only hope that sanity prevails."

brazil_lacerda_samba.25.t: "Safe Landing"
brazil_lacerda_samba.25.desc: "Távora couldn't help but drum the fingers of his right hand on one of his knees, one of the few silent figures within the headquarters of the UDN. On paper, he had nothing to worry about; Lacerda's dramatic fall from grace had kneecapped the UND's most radical elements and left his would-be successors practically poisonous for votes. The men of the UDN, however, were nothing if not dedicated; what if they doubled down on-\n\nThe voting commission's spokesman rose, his voice cutting through the tension. "Ney Braga, triumphant on the first ballot!" The declaration reverberated through the room, triggering a wave of jubilant cheers, and Távora felt all tension leave his body. Finally, things were turning around for the UDN.\n\nOvercoming the old guard of aggressive anti-Varguists and their ilk had been a difficult road, but the party was on the right track now; it was finally on the road to becoming Brazil's bastion of reason and republicanism. Even the Lacerdists, considering the scale of Braga's success, had seen where the wind was blowing. Everything he and Pinto had worked for had been worth it. Standing up with a stretch, he reached the closest phone. He and Braga had much to discuss for the future."
brazil_lacerda_samba.25.a: "There is still much to be done."

brazil_lacerda_samba.26.t: "Deadlock"
brazil_lacerda_samba.26.desc: "Virgílio Távora was known as a patient man; methodical, quiet, even downright Manchivellian. That was how he became President, after all. However, even his famously stony expression was starting to show signs of cracking as the UDN conference dragged on and on and on.\n\nBallot after ballot came back inconclusive to determine who the party's candidate for President would be: Nineteen tries, and they still couldn't decide between Ney Braga and Raphael Magalhães, or any of the other smaller candidates who kept throwing their hats in the ring, getting a few votes, then offering their votes to one of the larger candidates in return for favors, only for the whole process to break down again and again. Távora would very much prefer to see the moderate Braga as the leader, since he would be more likely to ensure the party doesn't go down the self-destructive path that Lacerda was dragging the UDN down. But even at this point, Távora was almost ready to accept any choice, so long as it ended this nightmare.\n\nAfter the twentieth ballot failed again, with groans and boos from the crowd, there was a sudden loud bang of a hand hitting a table.\n\n"Enough is enough!" Aliomar Baleeiro bellowed, his voice cutting through the crowd, before going to the microphone to ensure he could be heard through the room clearly. "If we cannot pick a unified candidate, then we might as well have two! All in favor?" There was a chorus of agreement, and few to no voices of opposition.\n\nTávora blinked. The party was divided. He had failed. Or was it more Lacerda who lead the UDN to this point, and there was nothing he could have done? Maybe it was both.\n\nBut that didn't matter. Now it was to try to campaign for Braga, and ensure he could win, not just against the Vargidists and the Socialists... but from the radicals of his own party as well."
brazil_lacerda_samba.26.a: "Sometimes a divorce is inevitable."

brazil_lacerda_samba.27.t: "A Thousand Words"
brazil_lacerda_samba.27.desc: "The streets were damp and dark. Wilson Leite Passos was sitting beneath the designated meetup spot, a small newsstand that sold imported European periodicals and sweets. He was reading a German magazine from about a decade prior, detailing the successes of recent eugenics programs. He smiled, marking a few statistics with his pen. Perhaps, someday, purity could be brought to their nation too.\n\nSomeone tapped him on the shoulder. "Excuse me, sir. Have you seen my black eagle?" Passos turned around to see a broad-shouldered man in a suit.\n\n"Of course. It passed by Rua Uruguaiana an hour ago." The stranger's rigid eyes relaxed somewhat. He gave Passos a small tin of Swiss chocolates.\n\nPassos opened it to find a set of high-quality photographs. They showed the whorish Lacerda meeting with two men whom he had allegedly disavowed. Prestes, the slimy communist, and Amazonas, the terrorist, were drinking and chatting with the President like old friends. It was sadly not a surprise. No Marxist trash could ever really change their stripes, least of all Lacerda.\n\n"Perfect." Passos handed over a wad of cash. "This should be enough to cover your expenses. Give my thanks to the ambassador." He pocketed the tin and his magazine, and began walking home, a childish sense of giddiness welling up in his heart. The German agent who had forged the pictures stared dumbfounded as his target left."
brazil_lacerda_samba.27.a: "Were all Brazilians that easy to deceive?"

brazil_lacerda_samba.28.t: "They Call It Murder, I Call It Justice"
brazil_lacerda_samba.28.desc: "There was a calm across the Chamber of Deputies that day. The fall weather was remarkably pleasant, a much-appreciated rest between the scorching summer months and the chilling winter. Topics were much less intense that day, alternating between perfunctory law renewals, or uncontroversial medal awards.\n\nThe last topic was requested by Wilson Leite Passos as a last-minute request. He had an impromptu presentation to deliver. Most members of the Chamber were expecting a simple rant about how the government wasn't doing enough to expunge the communists from the country, or yet another request for the establishment of an official eugenics program, by that name or another.\n\n"Gentlemen of the Chamber. I have come here with a heavy heart. I have discovered that our President, a man whom I trusted, has maintained his allegiance to the most detestable of ideologies- communism." He passed around two files between the representatives. "He has met with known terrorist Amazonas, and sent sympathizing letters to Amazonas' associates with promises of amnesty. Please, inspect for yourselves."\n\nAs the papers were passed around, several UDN members murmured to each other about the act of betrayal. "It's a travesty." "These pictures are clearly forged." "This isn't even Lacerda's handwriting!" On the opposite side, a group of PSD and PTB members started talking of the potential. "If we got these published..." "His electoral chances simply can't recover!" "Such a scandal shouldn't go to waste.""
brazil_lacerda_samba.28.a: "The calm falls apart, and the plots begin to form."

brazil_lacerda_samba.29.t: "A Weighing of the Conscious"
brazil_lacerda_samba.29.desc: "Mauricinho Lacerda sat on the porch of his home, sipping a cup of coffee. He had prepared himself to write another letter of critique towards the government in general and his younger brother more specifically, but something in the news caught his eye. Mauricinho kept track of the opposition to his brother in both left-wing and right-wing newspapers, and this right-wing periodical had a strange headline.\n\n"CARLOS LACERDA'S TRUE COLORS? HIDDEN MEETING WITH COMMUNISTS AND TERRORISTS; SYMPATHETIC LETTERS AND PHOTOGRAPHIC PROOF REVEALED INSIDE."\n\nApparently, that crypto-fascist Passos had shown evidence that Carlos Lacerda was actually still a communist at heart. It said he had made alliances with Amazonas and Prestes, and was planning on a self-coup with the help of left-wing militias to install a socialist dictatorship. Mauricinho couldn't help but smile when he read it. The evidence was obviously fabricated, but if it were true... he'd be doing a lot better in life right now.\n\nHe considered, for a brief moment, if he'd want to write that critique about his brother but spin it around this breaking news. He dismissed the thought. He'd be more than willing to call out Carlos for what he actually did, but he couldn't slander him. And besides, the kid had been doing fewer awful things and extending more olive branches recently. He'll cut him some slack."
brazil_lacerda_samba.29.a: "Cain laid down his arms and sipped his coffee."

brazil_lacerda_samba.30.t: "Sharing a Laugh"
brazil_lacerda_samba.30.desc: ""And then he asks me-" Pinto holds his chest, wheezing with laughter. "He asks me if I'd support his impeachment attempt. Even after I shouted at him every single fault that proved his shitty contrived evidence wrong, that rat was still trying to get me on board! I tell you, President, for a man so obsessed with eugenics, he's certainly struck me as unfit for survival of the fittest."\n\nLacerda clinked a glass with his ally. Unlike most days, the President's eyes had a renewed vitality to them. "Well, you should've expected this sort of behavior. I never trusted him, not even from the start." Pinto holds up his hands defensively. "Hey, now I don't either. He's a worm, and worse yet, a traitor! It's obvious we've got to kick him out."\n\nLacerda twirled a finger in the air. The taste of several fine wines stuck on his lips. "Not just that, Pinto! We all will condemn him in a formal letter. I've got a draft written up on my desk, if you'd care to take a peak. I'm open to edits-" Pinto shakes his head, having just finished his glass. "Listen, Carlos. As long as it's dignified, I won't raise a fuss. I'll sign off on it whenever you'd like."\n\n"But I suspect you have something more in your sleeve than just a pink slip and a firmly-worded letter, President. Am I right?" Pinto stared expectantly. Lacerda sniffed his glass, taking a generous sip of a '56 Tuscan Sangiovese. It tasted richer that day. Everything did. "I'm planning on making a full investigation into all of his affairs. The whole nine yards. And if I find anything but spotless activity on his record...""
brazil_lacerda_samba.30.a: "...the last iron cross he'll ever see will be his cell window."

brazil_lacerda_samba.31.t: "A Pragmatist's Guide to Bomb Defusal"
brazil_lacerda_samba.31.desc: ""After I had told him that his evidence was both shoddy and unprofessional, he still asked that I join him against you. I, of course, sent him on his way."\n\nThe sound of clinking ice in whiskey filled the Presidential Office of the Palácio do Planalto. Távora sipped gingerly. The drink tasted bitter on his tongue. "I suspect his little crusade will go nowhere from here."\n\nLacerda was feeling calmer than he was when he had heard news of this disaster going down. Yet, he still kept a tight grip on his glass and a keen eye on his VP.\n\n"I see. Well, I appreciate your piety. But I think it is time we discuss what punishment we mete out?" Lacerda looked over expectantly.\n\nTávora motioned to him with an unfazed smile. "Oh, yes. Tell me your plan, President."\n\nLacerda didn't like how he motioned. It made him feel like he wasn't in control. "It is obvious to me that our champion of eugenics should be withdrawn from the party. After that, I would quite like to investigate his ties with the Germans, but..."\n\nTávora's monotonous expression lapsed into a grimace. "Oh, no, this won't do. We can't kick him from the party."\n\nLacerda slammed his glass on the table, his face red. "Virgílio, have you lost your mind? This man tried to impeach me! Our party cannot simply let this slide!"\n\nTávora gestured outwards vaguely, his expression souring slightly. "I understand, President, I really do. But we must emphasize unity. We will censure him firmly, and teach him loyalty, I can promise that. But he's too important.""
brazil_lacerda_samba.31.a: ""Fine. We will keep the rat around, for now.""

brazil_lacerda_samba.32.t: "Secrets in the Attic"
brazil_lacerda_samba.32.desc: ""Honey?" asked Isa Motta, "what are you doing up there?"\n\nMauricinho Lacerda looked up, a small flashlight pressed between his teeth, shining a beam of light on Isa's torso. He brought up a hand and pulled out the flashlight like a baby's pacifier. "Oh, Isa, good. Can you hold this, please?" Isa took the flashlight and hovered it over Mauricinho's prey: an old wooden chest, with its lid lifted, papers and photos shoved inside.\n\n"All that business in the Chamber," he said, shuffling through those papers, "the impeachment? I think we can use this." He pulled out a few family photos, Carlos and Mauricinho with empty smiles in front of their father; he set them aside. "If there's anything I can do to help it along, I'll find it here. Wainer can help us publish it."\n\n"Why didn't you check before, back when we first tried to stop him?" The light in Isa's hand hovered between the pile on the floor and the remaining papers in the chest. The question did not immediately register with Mauricinho, but when he took out an old photograph of Carlos and Mauricinho fishing by a riverbank, he slowly froze. He looked at the photo. He didn't recognise either child.\n\n"I don't know. I guess I didn't think he would win."\n\n"But now that he has, all he's done to the working class..." Isa's light shone on a document at the top of the pile. She spun it around, scanned it, and then spun it back, tapping hard on its front. "This one. This one will hurt him."\n\nMauricinho looked at the paper. Gears turned in his head; he could see where a good journalist could run with something as damning as this. One happened to be right in front of him."
brazil_lacerda_samba.32.a: ""Let's do it, my love.""

brazil_lacerda_samba.33.t: "Soundcheck"
brazil_lacerda_samba.33.desc: "Aliomar Baleeiro had thought about what kind of approach he would take with the Congress. He would save the fiery proclamations for Campos, and he couldn't pull off the disappointed father like Távora. He could not play the victim, and he could not seek the chamber's forgiveness as obsequious as Pinto could. He knew, too, that any kind of mimicry of Lacerda's own quirks would invite unfavourable comparisons. When he stood before the Chamber, he wore a frown of fraternal disappointment; the big brother had come home to find the middle bullying the younger.\n\n"The charges that have been laid against Carlos Lacerda are, frankly, as imbecilic as they are incorrect. For over fifteen years, Carlos Lacerda has been a staunch ally of democracy, fighting against the tyranny of the despotic Estado Novo regime since its horrific conception. How many of the gentlemen in this chamber can say the same? How many can turn to each other and say 'not me, my hands were clean, I wanted nothing to do with Vargas'?"\n\nIndignant cries echoed from the chamber. Shouts of "traitor", "hypocrite" and the occasional curse bounced off the walls. Baleeiro breathed in, counted to three, and breathed out. Gavels struck wood and called for calm.\n\n"Whatever the sins of his past, they were committed by childish whims, and the consequences were far less severe than his opponents. And in his time since his conversion, Lacerda has shown us nothing but conviction. All he wants- all he needs, my friends, is to build a better Brazil. A stronger Brazil, one committed to democratic values. It is my wish that you forget this foolish notion, vote no in impeachment and allow him to serve the rest of his term upholding the values that we are all meant to share. The rest, gentlemen, I leave to your own judgement after his term is concluded.""
brazil_lacerda_samba.33.a: "Aliomar's words were praised for their passion, but not truly heard."

brazil_lacerda_samba.34.t: "Another Baseless Attack"
brazil_lacerda_samba.34.desc: ""I see before me," said Campos, the same cowards and liars. The same. They haven't aged a day, when they threw President Gomes to the wolves." An exasperated cry went up from the chamber, but Campos' cold eyes met the instigators, and they fell silent. "This is not about ensuring purity in our Republic. This is about the death of the UDN. This is about ripping away a pillar of the democracy we have sworn to defend.\n\n"Look around you, gentlemen. Who stands with you? Who stands with the impeachers? Varguists. The corrupt. The greedy. But worst of all, hypocrites." At this, he looked directly at the PTB deputies, whose reactions were a mixture of confusion, exasperation and frustration. "You slander him because you fear him. Not only what he can do, but what he should do to you. But because of what you see in the caricature you make him. You count among your ranks men like Brizola. Communists." He spat out the word with such venom that at least one deputy recoiled from it. "You would hand over Brazil to the Reds in a heartbeat. You know who you are. So you try to hide it, and you slander a good man. A man who saw through your lies and said: 'no more.'"\n\n"Mr. Campos," said the Speaker, "refrain from your own slander."\n\nHe grunted. "The UDN stands firm. The UDN stands united. Against all the liars in this world. We will not be broken by any force on Earth. Not the PTB, nor anyone else. To those who are not yet poisoned, I say this and only this: spare yourselves the indignity and vote against this impeachment. The future shall look upon you kindly for it.""
brazil_lacerda_samba.34.a: "An old man's ravings did not move the needle."

brazil_lacerda_samba.35.t: "Mugged by Reality"
brazil_lacerda_samba.35.desc: ""Many years ago," Carlos Lacerda said, his voice turning into a squeak before the Chamber. He cleared his throat. "Many years ago, when I was still a student, I met a girl. Like many young men, I had a great desire to please her. She was a member of the Communist Party of Brazil, and with little more than a lower compass to guide me I attended some meetings." He paused, hoping the joke would land. The faces just stared back.\n\n"Then they threw in their support for Vargas. I could not understand it, but, fool that I was, I followed them. Then I committed the most grievous sin that a communist can make: I criticised the Party. I wrote an article in one of their newspapers, about how the condition for Marxism did not exist in the Estado Novo. For this sin, I was expelled from the party for counter-revolutionary activity. You won't find this on any of the numerous articles on my past, of course, which is why I have my office distributing a copy to every major news outlet and deputy's office in Brazil. I thought you might want to hear at least some of the truth."\n\nThe faces were still silent, but Lacerda felt an energy rising in him. His grip on the lectern loosened. "There are those among me who would see who wish to use this to destroy my career, my Presidency. But in the face of all this slander, I can only say this: thank you. Thank you to the PCB, who showed me that communism is a baseless promise. Thank you to the UDN, who took me in and showed me that democracy is the only viable form of government for our great nation. And I must give special thanks to my colleague, Wilson Passos, for giving me the opportunity to reflect and reaffirm my commitment to our democratic system. To them all, I say: thank you."\n\nLacerda bowed his head and turned away from the podium, walking out the chamber. Nobody else clapped, but the tension in the air had been lifted. Lacerda had never felt lighter."
brazil_lacerda_samba.35.a: "The impeachment vote was narrowly defeated."

brazil_lacerda_samba.36.t: "Placeholder"
