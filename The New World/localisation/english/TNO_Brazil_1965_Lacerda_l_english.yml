BRA_lacerda_hide_udn_decisions: "Hide Party Ideology Decisions"
BRA_lacerda_udn_info_tt: "The UDN has never been unified by any means, not since it was founded in 1950 on the sole principle of anti-Varguism. As much as the President wishes it weren't so, the party has factions that don't see eye-to-eye, and each faction offers benefits and drawbacks for leaning their way.\n\nFocuses, event choices, and decisions affect how the administration leans. The liberalism-statism axis gauges Brazil's embrace of laissez-faire capitalism, influencing centralization and inflation. The cooperation-intransigence axis gauges the administration's willingness to strike consensus or stick to the President's convictions, determining how often opportunities arise to reach across the political aisle.\n\nLastly, keep an eye on Party Loyalty. Lose the faith of your senators and they may fall prey to the charms of other parties."
BRA_lacerda_udn_seal_tt: "[GetBRA_lacerda_udn_seal_tt]"
BRA_lacerda_udn_party_loyal_loyal_desc: ""The UDN's been good to me. It's my party, and it represents the things that I believe in. Party leadership's good, rank and file's good - truth be told, I can't imagine being anywhere else.""
BRA_lacerda_udn_party_loyal_fence_desc: ""Look, the UDN's my party, but I look at it sometimes and I don't recognise it. You've got some problems below and more above - truth be told, I'm finding reasons to support it when it should be handing me those reasons.""
BRA_lacerda_udn_party_loyal_disloyal_desc: ""Have you seen this? This fucking headline! This is my party? God, all this bickering at the top, and this weakness at the bottom - truth be told, I've been invited to some meetings from the PSP, and I might just take them.""
