BRA_Liberdade_in_Ashes_desc: "After a few tense days of violence and hatred, the city of São Paulo has fallen silent.\n\nThe Liberdade district, home to one of the largest Japanese communities outside of Japan itself, is in ruins, and while efforts are being taken to reconstruct it, there is no doubt that a deep wound has been struck within the Nikkei. Although racial crimes are on the decline for the first time since the riots began, the fallout continues to force many into an exodus away from Liberdade. The bleeding may have been stopped, but it is clear the healing will take a great deal of time."
