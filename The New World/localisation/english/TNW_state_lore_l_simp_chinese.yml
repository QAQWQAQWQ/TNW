 state_lore_initials.1: " GER "
 state_lore_name.1: "日耳曼尼亚"
 state_lore_desc.1: "世界之都日耳曼尼亚表面看起来是元首的光辉杰作，但她庞大的根基却已腐烂殆尽。\n\n在施佩尔设计的典雅大道与希特勒野心意志象征之下的数百米处，受世界之都重压的宏伟钢筋混凝土结构已是苦不堪言。水泵日夜不息地工作，以防旧柏林的沼泽吞噬了元首的宏伟愿景。\n\n重建柏林所耗费的庞大又不可告人的开支远胜于从诸国掳掠来的财富，而在市中心大礼堂萦绕着的窃窃私语之外，旧柏林人仍然像日耳曼尼亚拔地而起前一样，住在提供给失业人群的廉价公寓楼里。"
 state_lore_initials.2: " TYO "
 state_lore_name.2: "東京"
 state_lore_desc.2: "在日本帝国“东部京城”的强盛外表之下，在皇居的幕布和喧闹的选区幕后，在这座城市灯红酒绿的浮华背后，隐匿着无尽的悲伤和斩而不绝的腐败。\n\n大本营里，陆海争锋；各怀鬼胎、倾轧不休；而那些乐于携手合作的将领们，正要计划着下一个行动，前往共荣圈的某处消灭当地的抵抗分子。\n\n再看那国会厅中，政客云集；各执一词，争吵不休。腐败如血，在每个人的血管中肆意流淌；人人都追逐金钱，早已不复当年美好初衷。\n\n也许，最好把这些事情抛在脑后，专心欣赏这座象征旭日光辉的宏伟城市。"
 state_lore_initials.3: " YOK "
 state_lore_name.3: "横濱"
 state_lore_desc.3: "世界上很少有“孪生城市”，大多数城市都与邻近的城市有这样或那样的区别，但横滨和东京却并非如此。\n\n乍一看，这两个城市可被看作彼此的完美复制品。就人口规模而言，东京和横滨分别是日本最大和第二大的城市，她们对大日本帝国的经济至关重要，而且都是大型港口城市，每天都有数百艘船舶在两地停泊。\n\n横滨作为港口城市的突出地位可以追溯到江户时代的尾声，佩里准将首次登陆此地，开始了日本的近代史。\n\n现在，除了民用船舶以外，横滨还是大日本帝国海军舰队的一个重要基地，让其得以在本岛周围贯彻帝国的意志，也是整个共荣圈和太平洋的海军行动中心。"
 state_lore_initials.4: " LAX "
 state_lore_name.4: "洛杉矶"
 state_lore_desc.4: "西海岸最大的城市，美国第三大城市，也是美国——甚至可以说是世界，娱乐业的家园。\n\n洛杉矶的故事众说纷纭，但没人会说她十分无趣。洛杉矶最初是一个沿海小镇，在十九世纪末开始迅速发展，一直持续到第二次世界大战，甚至在日本夺取港口后的50年代，其如日中天的势头也丝毫未减。\n\n作为好莱坞的故乡，洛杉矶赢得了光彩浮华之地的美誉；但在这座不断增长的城市中，也生长着诸多处于贫困之中的多元化社区，正迎着美国民权运动的潮头冲上浪尖。"
 state_lore_initials.5: " LA-P "
 state_lore_name.5: "[Statelore_Get_Losangeles_name]"
 state_lore_name.5_USA: "洛杉矶港"
 state_lore_name.5_JAP: "羅府港（洛杉矶港）"
 state_lore_desc.5: "在二战烽火愈演愈烈之时，洛杉矶港曾一度雇佣了近十万名美国人。如今，每天来港口上班的人只有这个数字的一小部分，而港口中来去的军舰早不再挂着星条旗了。\n\n作为与美国本土接壤的两个日本租界之一，洛杉矶港一直是一举一动都能引来世界关注的热点地区。美国和日本士兵从他们各自的检查站后方互相监视，而大日本帝国海军的水手和洛杉矶的居民们都希望这些尴尬的近距离接触永远不会升级为敌对状态。\n\n尽管一些人要求美国政府采取行动，再次主张对两地的所有权，他们的呼吁被无视，§R至少是现在§!。§Y也许某天，一位有着非凡勇气的总统将夺回这些港口，或许还会收复更多失地§!。"
 state_lore_initials.6: " SFO "
 state_lore_name.6: "旧金山"
 state_lore_desc.6: "在1848年的淘金热之后，旧金山成为了北美西海岸最大的城市。虽然她的规模被洛杉矶和圣迭戈等城市后来超越，但她仍然保持着其作为美国的一大金融和文化中心的重要性。\n\n长久以来，旧金山连绵起伏的山丘和铺着电车轨道的街道一直是美国更为古怪的元素和正在萌生的反主流文化（最近的表现是50年代的“垮掉的一代”运动）的家园，尽管许多人怀疑这只是这个海湾城市即将发生的事情的一个角落。"
 state_lore_initials.7: " SF-P "
 state_lore_name.7: "[Statelore_Get_Sanfran_name]"
 state_lore_name.7_USA: "旧金山港"
 state_lore_name.7_JAP: "桑港（旧金山港）"
 state_lore_desc.7: "正如其欧洲同名城市一样，这座“西方巴黎”同样在二战中蒙受屈辱。尽管城区主体仍在美国掌控之下，但奥克兰西部的港口设施自1945年起便为日本所据守。作为日本帝国最遥远的海外领地之一，旧金山湾港区成为共荣圈的重要战略资产。\n\n这片狭小的飞地与南边的洛杉矶港区，始终是两大超级强国间的摩擦源。但只要日本仍保有随时威胁整个西海岸的能力，他们便甘愿承受这般代价。\n\n虽然美国国内不时响起武力收复港口的呼声，但§R眼下§!这些诉求尚未得到响应。§Y或许某天，一位足够果敢的总统会收回这些港口，乃至更远大的目标。§!"
 state_lore_initials.8: " NYC "
 state_lore_name.8: "纽约市"
 state_lore_desc.8: "纽约市正是不眠之城的代名词，她是一代又一代勤劳个体的劳动结晶，每天都有数量惊人的商业活动在此地进行。\n\n1624年，荷兰人首先此殖民，并命名为新阿姆斯特丹，几个世纪以来，这里几经易手，现在成为美国自由的骄傲堡垒，港口的自由女神像便是例证。无数不同的文化在这座城市扎根发芽，长期以来，世界各地被压迫人民不远万里来到这座城市，将其视为躲避故乡暴政的避难所。\n\n然而，与这座城市的开放精神同样吸引人的是开放的市场，她是国际贸易以及金融的主要中心之一，也是美国强大经济实力的展示。在纽约，任何愿意付出适当代价的人都会有事可做。"
 state_lore_initials.9: " D.C. "
 state_lore_name.9: "华盛顿特区"
 state_lore_desc.9: "要想描述华盛顿哥伦比亚特区，“城市”这个词显然不甚妥当。哥伦比亚特区并非建筑和道路的组合，也非人类意志的汇集，更非二者强行糅合在一起的都市。\n\n绝非如此，真正的哥伦比亚特区是那山巅之城——自由与安全的故乡，在这个暴政横行的世界更显得尤为可贵。在国会大厦里，议员们为至关重要的议题不懈斗争着，这自由不单是为了这座城市的居民，而是为了整个国家全体公民的未来。\n\n民主之风席卷而来，未来形势波谲云诡，这民主的自由不再只是保障自由的手段，更是在这动荡时刻所要坚守的信念，愿它们永远保佑我们。"
 state_lore_initials.10: " ROM "
 state_lore_name.10: "罗马"
 state_lore_desc.10: "罗马，永恒之城，地中海的明珠，意大利帝国的首都。拂去掩在罗马城上的千年尘埃，忆起罗慕路斯在台伯河边的过往，几乎没有哪座城市能够拥有如此辽远的历史。这座城市的每一寸土地、每一块砖石，都蕴含着罗马帝国的遗产，意大利历史的骄傲。\n\n尽管罗马曾遭受入侵、沾染瘟疫、蒙遭祸难，但罗马城总能从废墟中崛起，再度重建，并在这一过程中奠定了自身作为意大利中心的地位。这里，是国王、教宗和领袖的居所，是意大利政府的驻所，也是来自世界各地的艺术家、烹饪大师和浪漫主义者的欢聚之处。\n\n罗马已长存千年，她无疑将继续长存下去——除非末日来临。"
 state_lore_initials.11: " MAD "
 state_lore_name.11: "马德里"
 state_lore_desc.11: "曾被西班牙内战中长达两年的围攻所摧残的马德里，在今日已经恢复为了全伊比利亚最庞大与富有的城市。\n\n马德里独特而多变的“格兰维亚大道”得到了全世界建筑师与艺术家的赞许。全国最聪明的思想在这里的大学汇集，几乎所有的伊比利亚企业在此生产，而伊比利亚的大企业们也在此设立了总部。\n\n随着越来越多喜好城市的伊比利亚人离开乡村，每年都有成千上万的人移居马德里。快速增长的人口几乎让马德里变为全欧洲最大的城市——而人口增长的趋势看起来永无尽头。"
 state_lore_initials.12: " HAM "
 state_lore_name.12: "汉堡"
 state_lore_desc.12: "作为汉萨同盟的成员，汉堡坐落于易北河河口。她是仅次于维也纳和日耳曼尼亚的德国第三大城市。汉堡也是汉萨同盟的诞生地，自中世纪起便是连结德国与世界的优良港口。新秩序确立后，其声望地位有增无减。\n\n然而，此地局势却不甚安稳。十九世纪以来，汉堡便是自由主义骚乱的温床，而当下的汉堡更是出现了大分裂，改革派、保守派，甚至是阴影下的反法西斯革命派潜伏于此。\n\n不过，对于那些被盖世太保抓住的颠覆分子，可怕的命运正在数公里外的上游等着他们。那里坐落着诺因加默，德国境内最大的集中营。几乎全世界都将此视为纳粹暴行的刺眼标志。"
 state_lore_initials.13: " FRA "
 state_lore_name.13: "美因河畔法兰克福"
 state_lore_desc.13: "美因河畔法兰克福坐落于中欧人口最为稠密、产业最为发达的地带之中心，在许多方面都堪称德国工业的丰碑。每年都有国内成千上万的天才头脑和优秀工人来法兰克福安家。\n\n而在希特勒掌权之前，则会有全欧洲的天才头脑和优秀工人，来到法兰克福安家。法兰克福曾是德国最大犹太社区的所在地，被广泛认为是德国自由主义的发源地，并被公认为欧洲劳工运动的中心。然而数十年来，她一直停滞不前，失去了以往活力，其过去的精湛技艺与独创才智，现已让位于方便好用的奴隶劳工。\n\n不过，该城仍是德国最大的城市之一，并且是连结莱茵兰与国内其他地区的主要铁路枢纽。"
 state_lore_initials.14: " MUC "
 state_lore_name.14: "慕尼黑"
 state_lore_desc.14: "明兴，这是她的德语名，英语则称为慕尼黑。几个世纪以来，这座城市在德国的历史中发挥了关键作用。其作为巴伐利亚王国的首都，接待了包括马克斯·普朗克和理查德·瓦格纳在内的思想家和创作者。而在过去的半个世纪内，她则拥有了更为深远的意义：纳粹党的摇篮。\n\n德国在第一次世界大战中战败，慕尼黑随之陷入混乱。在这里，两个互相竞争的社会主义革命政府，和街上的自由军团针锋相对。也正是在此环境中，一小帮民族主义理论家和心怀不满的老兵组成了德国工人党。\n\n其成员之一，生于奥地利的老兵，阿道夫·希特勒，此后爬上高位，成了党首，并将其改造为德意志民族社会主义工人党。而正是在慕尼黑的啤酒馆中，希特勒铺下了第一块权力基石，并于1923年发动了一场失败的政变。也正是在此处，纳粹党建立了他们的全国总部。还是在此处，希特勒说服了英国人和法国人，让他们决定将捷克斯洛伐克割让给他，以此确保他自身也无意侵犯的世界和平。时至今日，慕尼黑仍然是纳粹主义的坚强壁垒，而在此具有强大影响力的人，便能掌握纳粹的核心区域。"
 state_lore_initials.15: " BIO "
 state_lore_name.15: "毕尔巴鄂"
 state_lore_desc.15: "坐落在伊比利亚最肥沃的河口旁一座铁矿山上的毕尔巴鄂，注定要成为伊比利亚最大的工业城市之一。但同时，毕尔巴鄂也是巴斯克民族的文化之都，他们已经在伊比利亚居住了至少数百年（实际大概有上千年），比拉丁民族更为久远。\n\n自治权被逐渐剥夺，传统文化被西班牙干扰，这一切自然使得这个城市的年轻人将“伊比利亚团结”视作镇压的委婉代名词。在未来几年，毕尔巴鄂无疑会成为许多政治斗争的战场。"
 state_lore_initials.16: " BCN "
 state_lore_name.16: "巴塞罗那"
 state_lore_desc.16: "加泰罗尼亚的首府和心脏曾是伊比利亚半岛上第一个完全步入工业化的城市，但最近几十年中，这座伊比利亚最大的地中海城市的人民经历了一段艰难的时期。\n\n在西班牙内战的两年半中，巴塞罗那曾是失败的无政府主义者们占据的首府。这座城市之后又被镇压加泰罗尼亚人的政策所伤害，经济发展停滞更是在她的背后捅了一刀，但革命的记忆却始终存在于人们心中。\n\n而巴塞罗那在最近几年经济的持续衰退中也难逃厄运。假如情况仍无法得到改善，那么积蓄已久的反政府和分裂主义的情绪将会变得不可阻挡。"
 state_lore_initials.17: " POR "
 state_lore_name.17: "波尔图"
 state_lore_desc.17: "葡萄牙的第二大城市曾是中世纪葡萄牙王国的诞生地，也是开始了萨拉查政治生涯的1926年革命发源地。\n\n虽然里斯本的快速发展降低了波尔图的重要性，但她依然是全国最大的制造业中心。同葡萄牙的平均相比，波尔图人更为保守，也比里斯本人更支持伊比利亚团结。"
 state_lore_initials.18: " LIS "
 state_lore_name.18: "里斯本"
 state_lore_desc.18: "经由尤里乌斯之手铸造的世界欲望之光——里斯本，早已因多年的衰落而黯淡。然而，随着里斯本的竞争对手悉数为希特勒的疯狂野心所摧毁，这块垂老的土地又得以再度焕发光辉，以西欧最重要港口城市的身份，担当起美洲东行客们商业与移民的指路明灯。这座位于特茹河入海口，由基督巨像所守护的城市，无疑是所谓“伊比利亚计划”结出的最丰硕的果实。\n\n在空前繁荣的暗面，这座城市的居民们却并不拥戴统治他们的政府。于卡律布狄斯的喉中，里斯本大学校长卡埃塔诺正以改革主义影响着整座城市；而六妖兽的头颅间隙中，坐在市政厅内的则是博尔热斯与他的保守派盟友；在政府之外，自由主义与社会主义的思想已在里斯本扎根；在码头工人与大学生的交谈声中，这座城市俨然已成为改革思想的灯塔。话虽如此，这座争论不休的城市却依然屹立在20世纪的欧洲，在野蛮环绕中担当着和谐的堡垒。可是未来会如何？或许只有于沉寂中守望着城市的基督，才能给出答案。"
 state_lore_initials.19: " SVL "
 state_lore_name.19: "塞维利亚"
 state_lore_desc.19: "塞维利亚，西班牙帝国过去的心脏，亦曾是前现代欧洲社会中最大、最富有、最宏伟的城市。如今，塞维利亚正被其他城市所超越，在经贸活动方面只能屈居于罗马、汉堡甚至里斯本之下。随着城市的商业活动被严重的洪涝灾害和不寻常的暴雨所阻挠，塞维利亚甚至被一度定性为灾害地区。\n\n然而，随着城市工业区的不断扩张以及其中人口逐年增长，塞维利亚似乎要成为伊比利亚联邦最繁荣的城市之一了。同时，塞维利亚是伊比利亚联邦当中最大的地下自由主义政治组织中心之一，有传言称这座城市是非法工会活动的活跃温床。一些人对这一情况感到忧心忡忡，而另一些人则对此充满信心。"
 state_lore_initials.20: " G-DZ "
 state_lore_name.20: "直布罗陀大坝区"
 state_lore_desc.20: "[Statelore_Get_gibraltardam_desc]"
 state_lore_desc.20_unfin: "50年代的纳粹自大狂们并没有满足于将全欧洲重塑在他们的新秩序之下，反而将其推向了高潮——一座横亘直布罗陀海峡的巨型混凝土大坝排空了地中海，永久地改变了地球的面貌。\n\n尽管斥资巨大，但在德国经济崩溃后，大坝项目就此烂尾搁浅，现在只不过是一座凸显着纳粹虚荣心的腐朽纪念碑——日耳曼尼亚根本没有考虑其中的困难，自顾自地将这个烂摊子丢给了伊比利亚联盟。\n\n这座大坝消耗的混凝土比世界上其他任何建筑都要多，其规模超乎人类的想象，而她对欧洲和地中海带来的影响也是如此：海水被大量排出，这是几千年来全球最重大的地理变化。大坝的修复和竣工需要巨额的投资，但如果大坝真的能建成，那她发电的潜力也无疑是极为庞大的……"
 state_lore_desc.20_fin: "50年代的纳粹自大狂们并没有满足于将全欧洲重塑在他们的新秩序之下，反而将其推向了高潮——一座横亘直布罗陀海峡的巨型混凝土大坝排空了地中海，永久地改变了地球的面貌。\n\n尽管斥资巨大，但在德国经济崩溃后，大坝项目就此烂尾搁浅，现在只不过是一座凸显着纳粹虚荣心的腐朽纪念碑——日耳曼尼亚根本没有考虑其中的困难，自顾自地将这个烂摊子丢给了伊比利亚联盟。\n\n这座大坝消耗的混凝土比世界上其他任何建筑都要多，其规模超乎人类的想象，而她对欧洲和地中海带来的影响也是如此：海水被大量排出，这是几千年来全球最重大的地理变化。大坝的修复和竣工需要巨额的投资，但如果大坝真的能建成，那她发电的潜力也无疑是极为庞大的……"
 state_lore_initials.21: " BES "
 state_lore_name.21: "布雷斯特"
 state_lore_desc.21: "在过去的漫长岁月中，法国堪称海上强权。除开其海外领土，法国紧邻大西洋的漫长海岸线同样功不可没。布雷斯特位居布列塔尼半岛的最西端，是法国最引以为豪的前哨之一。她坚定地守望着海洋，矗立着无数灯塔，为众多迷途水手照亮了前路。\n\n不过，基伯龙半岛最近异常平静，如今有些流言蜚语在布列塔尼传播。“不满现状的民族主义者决定采取行动”的消息甚嚣尘上，或许，黑暗即将达成大西洋所未能做到的成就：一举吞没布雷斯特，乃至整个布列塔尼。"
 state_lore_initials.22: " PIS "
 state_lore_name.22: "普瓦捷"
 state_lore_desc.22: "在恺撒到来前，高卢部落就已经建立了普瓦捷，她见证了法国在图尔战役中的辉煌，亦旁观过百年战争中法国的落败。\n\n几个世纪以来，这座大学城都是宗教冲突的温床，也是一座驻军城市。现在，普瓦捷地位微妙，她刚好坐落于巴黎和波尔多的正中间。这座法国中西部的小城又一次成为了三股水火不容的势力试图统治其西欧领土的战略要地。"
 state_lore_initials.23: " BOD "
 state_lore_name.23: "波尔多"
 state_lore_desc.23: "人称“月亮港”的波尔多是法国最大、人口最多的城市之一。法国屡次遭受折辱，动荡频仍，但她相对来说并未受到什么影响。波尔多以其沁人心脾的葡萄酒享誉世界，历史古迹更是她骄傲的源泉，今日，她也确是这个国家最重要的城市之一。\n\n然而，波尔多的一帆风顺并非某种奇迹。阿德里安·马尔凯市长全心全意的合作，以及在四十年代末成立的、法国人民党的拥趸波尔多政治学院，让这座城市被视为民族革命的堡垒，免受改良主义和布尔什维主义的不良影响。然而，风云骤变、巨浪在即，这安宁的港湾又能坚持多久？"
 state_lore_initials.24: " MRS "
 state_lore_name.24: "马赛"
 state_lore_desc.24: "马赛建于公元前600年，是欧洲最古老的城市之一，自古希腊发迹到归属于当代法国，马赛还从未被击垮过。\n\n内战、蛮夷、围城、瘟疫、革命和战争，种种天灾人祸密谋着摧毁这座古城。二战差点把这座城市丢进了修罗炼狱之中，但她的人民依旧挺了过去。\n\n这座城市还见证了法国国歌《马赛曲》的诞生。如今，这座古城是法国最大的城市之一；愿上帝保佑马赛再延续几个世纪。"
 state_lore_initials.25: " PAR "
 state_lore_name.25: "巴黎"
 state_lore_desc.25: "问起巴黎人1901年的巴黎，他会说那是祖国的心脏；问起巴黎人1919年的巴黎，他会答那是世界的中心；问起巴黎人今日的巴黎，他只会眼中噙泪，追忆已然破碎的荣耀与梦想。宏伟的光之城，已多年未蒙上帝眷顾。\n\n往昔首都的万千悦动只剩飘摇的黯影。奥斯曼式建筑对着街上的德国士兵蹙额颦眉，而巴黎的居民则忍受着苦难尽力谋生。正如同法兰西的每个子女都心知肚明般：无论高低贵贱，他们都只能向绝望卑躬屈膝，苟且偷生。"
 state_lore_initials.26: " N-PR "
 state_lore_name.26: "北巴黎"
 state_lore_desc.26: "自党卫队尝试在德国发动政变，并被尽可能地放逐到日耳曼尼亚以西后，半壁光之城就陷入了黑暗中——塞纳河曾不经意间划开大地，而巴黎墙的峻石与铁网则刻意地将城市撕开。\n\n希姆莱政权的铁蹄碾碎了沦陷区巴黎人所珍视的一切，并用野兽派日耳曼文化纪念碑和一望无际的岗哨取而代之，而每栋建筑，每个家庭都处于探照灯的监视之下。\n\n岁月如梭，这种破坏只会越来越彻底——当每一个新生儿都用德语，而不是法语作洗礼时，破坏更变得愈发难以挽回。如果问欧洲哪里将新秩序的无尽梦魇体现得最淋漓尽致，那这个地方就是北巴黎。"
 state_lore_initials.27: " C-FR "
 state_lore_name.27: "克莱蒙-费朗"
 state_lore_desc.27: "环绕着克莱蒙-费朗大学城的谢讷德皮火山链就像一颗跳动的心脏。这座城市的居民一看到它，都不禁感受到某种安全——不管这火山会不会爆发，都远没有威胁他们国家主权的外部势力危险。\n\n来自法国和欧洲各地的人们前往克莱蒙-费朗大学学习，欣赏城市的文化和历史。从巴洛克风格的主教座堂到遍布全城的浪漫主义艺术，所有来客都能证明法国仍然是一个美丽和传统的国家。"
 state_lore_initials.28: " BRN "
 state_lore_name.28: "伯尔尼"
 state_lore_desc.28: "在阿尔卑斯山脉以北的高原上，坐落着瑞士至宝般的首都。她代表着世界上现存最古老的邦联之一。作为神圣罗马帝国与法国革命时期的领土，这座城市有着有趣的法德文化融合。\n\n如今，这座城市就如千百年前一样享受着孤立。社会主义国际在一战时坐落于此，而二战同盟国与轴心国那数不清的刺探与周旋也发生于此。虽然伯尔尼受到了德国深远的影响，但瑞士军队依旧将在这动荡的时代保障瑞士那千百年如一日的独立。"
 state_lore_initials.29: " AMS "
 state_lore_name.29: "阿姆斯特丹"
 state_lore_desc.29: "阿姆斯特丹曾有过繁荣的文化与经济。作为荷兰首都的她曾是世界上最富有的城市之一。阿姆斯特丹是梵高和伦勃朗的故土，她还有着世界上最古老的证券交易所。但她也并非没有坎坷的过去，她曾沦入西班牙人和法国人之手，现在又处于纳粹德国的影响之下。\n\n尽管如此，阿姆斯特丹正在缓慢恢复她的旧日荣耀，并巩固她作为欧洲主要贸易城市的地位。"
 state_lore_initials.30: " DIJ "
 state_lore_name.30: "[Statelore_Get_dijon_name]"
 state_lore_name.30_BRG: "第绍"
 state_lore_name.30_normal: "第戎"
 state_lore_desc.30: "当太阳从东方升起时，第戎城内的许多人都不禁觉得这是勃艮第黑太阳即将到来的预兆。无论大人小孩，一提勃艮第都会为之色变，就像小行星坠落法国，或是核战争毁灭人类，暴风雨来袭时警报器的尖叫——勃艮第边境如漆黑之墨蔓延而来，让所有人都感到无比恐惧。\n\n所有这些厄运和阴郁都强加在古罗马定居点第维奥的继承人上。当这座美丽城市的教徒去做弥撒时，他们都会向圣彼尼诺祈祷，祈求勃艮第风暴永远不会到来，他们可以继续平静地生活。"
 state_lore_initials.31: " LYO "
 state_lore_name.31: "里昂"
 state_lore_desc.31: "这是又一个反映了法国的古老与美丽的城市，她再次提醒人们，法国，一个罗曼语族国家，是罗马的继承人之一。里昂坐落于罗讷河和索恩河的交汇处，其中心反映了自罗马三高卢人的圆形剧场建成以来两千年的历史，其瑰丽的建筑艺术展现出中世纪和文艺复兴时期的风采。里昂这伟大的城市坐落在法国腹心，提醒人们这个国家依然伟大。\n\n里昂的人口与轻工业终日滋润着法国的残躯，有朝一日，法国将借此重绽往日的光辉。"
 state_lore_initials.32: " BRU "
 state_lore_name.32: "[Statelore_Get_brussels_name]"
 state_lore_name.32_BRG: "布吕塞尔"
 state_lore_name.32_normal: "布鲁塞尔"
 state_lore_desc.32: "布鲁塞尔正式建城于公元979年，当时法兰克王子，洛林的查理在塞讷河边的一个无名小村子里筑起了城堡。一千多年过去，城市的统治者来来去去，继勃艮第人、西班牙人、奥地利人、法国人和独立的比利时王国之后，布鲁塞尔又落入了来自勃艮第的德国人手中。纳粹在入侵时将布鲁塞尔设为比利时专员辖区的首府，这种状况维持了十余年，直到这片领土被移交给海因里希·希姆莱的党卫队勃艮第骑士团国为止。该城的市民们以及党卫队佛兰德师和党卫队瓦隆师对此不屑一顾，但希姆莱只一心想在这座城市和其他治下的所有城市中，恢复德国神话般的伟业。"
 state_lore_initials.33: " DUB "
 state_lore_name.33: "都柏林"
 state_lore_desc.33: "与爱尔兰的其他城市不同，都柏林的建立者既非爱尔兰人，也非英格兰人。这座城市于10世纪由维京海盗建立，并于1171年成为诺曼人在岛上的第一个据点。随后的750年里，都柏林一直是英格兰人在爱尔兰的行政中心，后来成为不列颠在爱尔兰的统治中心，直到1921年爱尔兰独立。\n\n爱尔兰共和国选择了此城作为首都，而这也是翡翠之岛最光彩动人的宝石。四十年过去了，现在的都柏林是这座统一（表面上）岛屿的首府，也是饱受宗派问题困扰的政府所在地。"
 state_lore_initials.34: " BFS "
 state_lore_name.34: "贝尔法斯特"
 state_lore_desc.34: "尽管贝尔法斯特在新石器时代就有人居住，但在17世纪开展贸易以及移民涌入之前，她一直是一个名不见经传的村庄。不过她在19世纪进一步发展，成为爱尔兰的工业中心，尽管其不断膨胀的人口导致天主教和新教居民之间的嫌隙加剧，但她仍然是一个由亲英的统一主义者控制的城镇，并在爱尔兰南部独立后成为北爱尔兰的首府。\n\n这一切在20世纪40年代发生了变化，当时德国人横扫英伦三岛，共和国趁机占领了整个爱尔兰岛。现在的贝尔法斯特躁动不安，作为自治区的首府，当地民众对他们目前的政治地位可以说是心怀不满。"
 state_lore_initials.35: " TRU "
 state_lore_name.35: "特鲁罗"
 state_lore_desc.35: "尽管特鲁罗因其在康沃尔文化中的核心地位、宏伟的主教座堂和采锡历史而闻名，但今日的“三河之城”却在苦苦挣扎。曾经，乔治和维多利亚时代的古朴街巷能引来腰缠万贯的矿业巨鳄，但现在的她却不幸沦为驻英德军的集结点，豪华酒店上高高飘扬的万字旗无疑是欧洲之主施展铁腕的明显象征。在城市的某个角落，你可能会偶遇英国自由军团的成员，他们无法无天、随心所欲，或于深街暗巷、或于城市广场，光天化日把人打个半死，无需半点理由。\n\n但最显著的变化却不在这些，而在这座城镇的精神、本质和灵魂。熙熙攘攘的周日集市不复存在，孩子们放学后也不再迈着轻快的步伐去商店购物。正如一蹶不振的康沃尔语，这座城市变得紧张压抑。人们不再看向窗外，向路过的士兵友善地挥手示意，而是在恐惧中紧闭窗户。长筒靴与警棍铿锵作响，将他们的希望砸得粉碎。如今，只有奇迹才能使这片土地再次焕发曾经的生机与活力。\n\n夜晚，城市的灯火不复往日辉煌。为何这样？因为每一个踏入夜色的脚步，都可能面对冰冷的枪口。"
 state_lore_initials.36: " CAR "
 state_lore_name.36: "加的夫"
 state_lore_desc.36: "威尔士的首府在德意志的铁蹄下忍受了三十年的磨难。三十年代至今，对威尔士煤炭的需求不再旺盛，加的夫随之一蹶不振。战争到来，她迎来短暂的复苏，但又在德国的枪林弹雨下蛰伏。\n\n现在的加的夫形势微妙，政府控制不稳。从心怀不满的工人，到泛舟海上的女王忠仆，再到小股流窜的威尔士民族主义者，加的夫坐立难安。\n\n若是当局最终瓦解，谁知道会有什么吞没这城堡之城。"
 state_lore_initials.37: " EDI "
 state_lore_name.37: "爱丁堡"
 state_lore_desc.37: "在英国政府的辖治之下，苏格兰的古都爱丁堡正遭受无尽的折磨。\n\n爱丁堡曾是苏格兰最伟大的城市之一，现如今却沦为了贫民窟的代名词。破败的街道上是穷困潦倒的居民，空气中弥漫着对伦敦的恨意。尽管如此，这座古都的每一个角落都被警察和士兵严密地监视。德国长靴和英国走狗四处巡逻，将爱丁堡置于严苛的控制之下。\n\n伦敦统治苏格兰，日耳曼尼亚统治伦敦。苏格兰人不会忘记的。"
 state_lore_initials.38: " GLA "
 state_lore_name.38: "格拉斯哥"
 state_lore_desc.38: "格拉斯哥是欧洲首批人口达到百万的城市之一，但她已不复十九世纪的荣光。在那个年代，新行业新科技吸引着八方移民，诸如格拉斯哥地铁、米切尔图书馆、开尔文格罗夫公园和米尔加维水处理厂之类的建筑巨作纷纷奠基筑成。\n\n这一切并不长久。一零年代的经济衰退和二三十年代的大萧条激起激进社会主义，也就是§R红色克莱德赛德§!运动。二战爆发后，这座城市的复苏进程先是被轰炸机投下的炸弹打断，后又被伦敦合作政权肆意摆弄。\n\n在这个简直能被美其名曰为现代贫民窟的城市，唯一从南方、从伦敦送来的东西就是越来越多的警察。克莱德班克闪电战没造成什么损害，但英国政府有意冷落格拉斯哥，让这座城市走向长久的衰退。英国局势日趋紧张，§R也许鲜红的克莱德赛德也将顺势而起。§!"
 state_lore_initials.39: " LDN "
 state_lore_name.39: "伦敦"
 state_lore_desc.39: "十八世纪末，塞缪尔·约翰逊曾断言：“厌倦伦敦等于厌倦生活，因为伦敦即是生活的全部。”此般辉煌持续了一个半世纪之久——工业革命的齿轮在这座雾都轰鸣，世界首条地下铁道在此蜿蜒，茶室氤氲的香气与新生地标交相辉映，更不消说其作为日不落帝国心脏与全球金融枢纽的无上荣光。\n\n然而大轰炸的烈焰撕裂了这般盛景。三万亡灵长眠废墟，连绵街巷沦为瓦砾，仓皇出逃的人潮涌向乡野。若止于此劫，伦敦或尚可浴火重生，但希特勒的战争机器为不列颠明珠备下了更残酷的终章。\n\n历经国防军漫长血腥的围城战，伦敦最终沦陷。外城区的巷战惨烈程度堪比东线，幸而市中心在守军投降后免遭屠戮。但战争的伤痕早己深深刻入砖石：三十年代曾彻夜笙歌的酒吧，如今常陷于死寂；白厅政客的谈笑风生早被萧瑟夜风裹挟而去，唯余一座衰败之城的绝望叹息。"
 state_lore_initials.40: " PSM "
 state_lore_name.40: "朴次茅斯"
 state_lore_desc.40: "朴次茅斯港曾经是孕育了英国海军的摇篮，她也是自罗马人入侵以来矗立在英国南部的海岸要塞。自罗马人在波切斯特建造防御工事开始，朴次茅斯在亨利二世和他的继任者们的治下被不断扩建，最终成为了英格兰最大的海军基地，同时也是入侵欧洲大陆的一大跳板。朴次茅斯拥有世界第一座干船坞和第一条大型生产线，而工业革命时期人们又见证了她转变为世界上最大的要塞城市，她的港口里驻扎着一支当时地球上任何政权都无法匹敌的舰队。\n\n不过，傲慢是一项大罪，而英国和朴次茅斯都将为此付出沉重的代价。皇家海军先是被德国军队所击败，随后又被他们的新秩序所束缚，她的规模被削弱到只有原来的冰山一角。如今，德国军队在朴次茅斯的大街上颐指气使，对哪怕一丝丝不满都重拳出击。迎接踏入港口水手的不再是他们的家人，而是那帮子检查他们是否有为抵抗运动走私武器的德国探子。\n\n作为曾经的征服者和如今的被征服者，朴次茅斯明白了那个她的舰队曾经让世界上许多地方领悟到的残酷的谚语的含义：成王败寇。"
 state_lore_initials.41: " NWI "
 state_lore_name.41: "诺维奇"
 state_lore_desc.41: "诺维奇是古代爱西尼部落的家园，反抗外国残暴统治的传统古已有之。国家遭罗马人篡夺、身受鞭笞之辱时，布狄卡女王率领布立吞人揭竿而起，挡在了入侵者的军团面前。然而，诺维奇的抵抗正如往日布狄卡的抵抗一般，在烈火中化作悲惨的灰烬。\n\n诺维奇遭到大轰炸毁坏的严重程度远远超出了其他任何一座英国城市，德国空军的狂怒之火将这里的中世纪建筑群彻底撕成了残垣断壁。战后，伦敦的新政府按照此前制定的重建计划，将诺维奇的大片白地重建为巨大的建筑群，拥有百年历史的古建筑则被无情地摧毁。\n\n可是，诺维奇的重建和扩张给伦敦政府带来了他们意想不到的后果。随着英格兰的衰败，许多城镇已遗弃腐朽，诺维奇因而成了对英格兰铁腕统治心怀不满的人们的朝圣之地。"
 state_lore_initials.42: " BHM "
 state_lore_name.42: "伯明翰"
 state_lore_desc.42: "工业之火已在伯明翰燃烧了数个世纪。这里是米德兰兹的经济中心，诞生了瓦特蒸汽机、世界首台机械纺纱机等推动工业革命的伟大发明。在侵略者踏上英国海岸之际，伯明翰的汽车与制造业再度挺身而出，将一辆辆坦克、一门门火炮送往前线，阻挡德寇进攻的步伐。然而，这一切最终只是杯水车薪。\n\n伯明翰的工厂被德国空军升级一新，大街小巷则遍布巡逻的国防军士兵。城市的工业之火依然熊熊燃烧，不过如今却换了主人。工人的工时越来越长，德国对汽车和设备的需求也越来越多。曾一度被德军摧毁的厂房，在戴姆勒-奔驰和国家工厂的指导下得到重建，以便日后效劳二者。\n\n德国人贪婪的大手紧攥伯明翰不放，但他们很快就会学到一点：生起火苗易，§R控制火势难§!。"
 state_lore_initials.43: " LPL "
 state_lore_name.43: "利物浦"
 state_lore_desc.43: "利物浦真正的历史始于一个名为利夫浦尔的市镇，由“无地王”约翰一世特许建立。尽管这里一开始只是个小地方，但她乘上了跨大西洋贸易的东风。随着财富不断涌入，利物浦发展成为了全英国第二大城市。\n\n然而，近年来，利物浦的商埠贸易几近绝灭，城市的好运亦随之走到了尽头。跨大西洋商路的断绝和纳粹闪电战的蹂躏接踵而至，在德国人的军靴之下，利物浦都仿佛蒙上了一层惨淡阴郁的暗影。如今，这里仅存的财富甚至都不属于城市，而是流到了来自法兰克福那群衣冠楚楚的笑面虎手中。\n\n尽管如此，利物浦对大洋彼岸的希冀仍未彻底死去。在破烂的小酒吧里，在陈旧的俱乐部中，年轻人们围坐在一起，模仿大西洋另一边的美国乐队演奏弹唱，反抗笼罩着天空的阴霾。利物浦在枷锁中失去了一切，但反抗的精神仍在延续。"
 state_lore_initials.44: " MAN "
 state_lore_name.44: "曼彻斯特"
 state_lore_desc.44: "最初，罗马人建立起了曼彻斯特，以屏卫约克和切斯特的定居点。但数百年过去，曼彻斯特却已远远地让这两座城市望尘莫及。到16世纪时，曼彻斯特就已经是兰开夏最为繁荣昌盛的纺织业城市。城市一路高歌猛进，直至20世纪，工业、财富和政治理念在曼彻斯特聚集激荡。与此同时，这里也催生出了大规模的贫困和永无节制的贪欲。\n\n时至如今，唯有贫困与贪欲依旧驻足于城市之中。往日的曼彻斯特已然零落飞散，如今的她被彻底重塑，只为侍奉法兰克福和日耳曼尼亚那心血来潮的狂想。工人们蜷缩在贫民窟之中，IG法本和西门子则疯狂攫取着利润。诸如1956年起义等一系列反抗的结果唯有德国驻军迅猛恶毒的报复。渐渐地，黑暗弥漫，覆盖了这里的每一寸土地。曼彻斯特的精魂已不复存在，她的使命就是为德国劳动，直至最终被彻底抛弃。\n\n或者说，德国驻军是这么以为的。但实际上，曼彻斯特和利兹正是不列颠岛上最为强固的抵抗运动堡垒。起义的希望、工厂主的冷酷无情、在深夜失去音信的受害者，这里的人们从未遗忘。\n\n曼彻斯特永不遗忘。"
 state_lore_initials.45: " NEW "
 state_lore_name.45: "泰因河畔纽卡斯尔"
 state_lore_desc.45: "纽卡斯尔，曾为北海上最繁忙的港口，工业革命的摇篮，如今在德国阴影之下与其他千百座工业城市一同沉浮。战争带来的创伤从未真正愈合；她或多或少，被德国用来深度剥削这座城市而制造的假象所掩盖。\n\n但这样的剥削不会永远持续下去。总有一天，纽卡斯尔或将再度奋起，夺回北英格兰坚城壁垒的头衔。"
 state_lore_initials.46: " CPH "
 state_lore_name.46: "哥本哈根"
 state_lore_desc.46: "在那些不幸位于希特勒征服之路上的城市中，哥本哈根相对幸运。她坐落于厄勒海峡之畔，几个世纪以来，她一直是丹麦最大的财源。得益于她较低的战略优先级，哥本哈根几乎没有受第二次世界大战战火的侵扰。\n\n现在，只能旁观祖国运作的丹麦政府也只好安坐在克里斯蒂安宫中，祈祷这座城市的好运长存不竭。"
 state_lore_initials.47: " OSL "
 state_lore_name.47: "奥斯陆"
 state_lore_desc.47: "奥斯陆曾享有一段自诩自由的岁月，但自从第一个德国伞兵在席卷一切的威悉河行动中落地之后，她就一去不复返了。奥斯陆是挪威的首都，一个坐落于该国最南端的美丽城市。她是世界上最繁忙的港口，也由此有着全世界最大的海运公司。但尽管她有积淀千年的悠远美韵，纳粹二十年的占领却给奥斯陆留下了丑陋的伤疤。\n\n奥斯陆被认为足够雅利安化，也就不需要像华沙那样遭到激烈的改造。德国只在奥斯陆留下了种种宣传海报和国防军驻军。尽管如此，奥斯陆依旧在纳粹的铁靴下挣扎着，渴望重获自由的那一天。"
 state_lore_initials.48: " PDX "
 state_lore_name.48: "斯德哥尔摩"
 state_lore_desc.48: "斯德哥尔摩是瑞典的权力所在，其居住人口不仅在全瑞典，也在整个斯堪的纳维亚半岛位居榜首，该城因其横跨14个岛屿的独特区位而闻名。斯德哥尔摩有数所全欧洲顶尖的大学，有资金充足，维护良好的地铁，而她建城的历史更可以追溯至七个世纪以前。现在，宏伟美丽的她已成为瑞典的文化，社会与经济中心。\n\n不过，斯德哥尔摩也成为了瑞典在民族社会主义新秩序中地位的缩影——她的港口向德国和美国船只开放，两国也同时在这里设立了大使馆。瑞典政府现在不得不游走于OFN和团结协定之间，以平衡其作为欧洲最后“中立”势力之一的地位。"
 state_lore_initials.49: " HEL "
 state_lore_name.49: "赫尔辛基"
 state_lore_desc.49: "在芬兰内战后重建的赫尔辛基，已经在二十世纪转变为芬兰繁荣的行政与经济中心。\n\n在芬兰迅速城市化的同时，赫尔辛基成为了功能主义建筑运动的中心，这也让全城的面貌与世界其他城市截然不同。大片建筑都由批量生产的混凝土制成，但其颜色鲜艳，外表全然现代化。赫尔辛基日益被誉为芬诺斯堪的亚最美丽的城市之一。"
 state_lore_initials.50: " VII "
 state_lore_name.50: "维普里"
 state_lore_desc.50: "中世纪时瑞典十字军所建立的维普里，几个世纪以来都担任着斯堪的纳维亚和俄罗斯之间的门户。谁控制了距圣彼得堡只有130千米的卡累利阿地峡，就掌握了控制波罗的海贸易的能力，这也使得俄罗斯于18世纪占领此地。\n\n在沙皇被推翻后，维普里成了新独立的芬兰的第二大城市，至今也依然如此。随着苏联1940年的入侵，几乎所有人都逃离了这个城市，但就在一年后，芬兰军队又回到了这个城市，护送难民们回归他们的老家。\n\n自那时起，维普里就成了芬兰最著名的港口之一。现在，和其他芬兰城市一样，随着许多农村人口的迁入，维普里正经历着迅速的人口增长。"
 state_lore_initials.51: " MUR "
 state_lore_name.51: "摩尔曼斯克"
 state_lore_desc.51: "一战的血雨腥风中，为避免向俄国输送补给的盟国船只遭受德国潜艇袭击，沙皇尼古拉二世下令于白海沿岸新建一座港口。摩尔曼斯克由此诞生，得益于重要的战略地位，寥寥数年时间，她便迅速发展为北极圈内规模最大的城市。\n\n虽一度抵挡住了轴心国的兵锋，摩尔曼斯克还是在二战的最后几个月间沦陷，变成了芬兰的第二大城市。由于城中的俄族人口占到芬兰全国的三分之一以上，加之其偏僻的地理位置，同化工作几乎毫无进展，反让摩尔曼斯克成为了俄罗斯民族主义的温床。同时，只要芬兰人还控制着这座城市，她就会一直是芬兰与纳粹之敌通商的门户。"
 state_lore_initials.52: "[Statelore_Get_kyiv_initials]"
 state_lore_initials.52_UKR: " KYV "
 state_lore_initials.52_GER: " KIE "
 state_lore_name.52: "[Statelore_Get_kyiv_name]"
 state_lore_name.52_UKR: "基辅"
 state_lore_name.52_GER: "基辅"
 state_lore_desc.52: "基辅曾是一座美丽的城市，在苏联治下繁荣地发展着。那时，她为自己的历史感到自豪。随着德军和德国殖民者的到来，曾经的一切都天翻地覆。德军围困城市，先是炮火轰炸，然后大军开进，将基辅彻底化为齑粉。食物开始短缺，不能喂饱所有人，乌克兰人流落首都街头，饥馑遍地。\n\n战争接近尾声之时，建筑物又重新在基辅城内出现，但此时的它们却如德意志人的一把利刃，在乌克兰人民的心头留下创伤。这个国家的历史已经荡然无存。绝望笼罩着这座城市。现如今，过去的一切似乎都在重演，基辅又一次被炸得粉碎——只是这次，德国人并不是凶手。"
 state_lore_initials.53: " THE "
 state_lore_name.53: "狄奥多里克港"
 state_lore_desc.53: "少有哪座城市如狄奥多里克港一样见证过战争的恐怖。她原名塞瓦斯托波尔，在1942年夏巴巴罗萨行动的炮火轰鸣声中轰然倒塌。在俄罗斯沙皇和苏维埃主席的年代，她是实现俄罗斯在黑海温暖、碧蓝水域野心的重要军事港口。然而，随着“新秩序”笼罩欧洲，塞瓦斯托波尔也不得不跪拜在飘扬的纳粹旗帜之下，就像曾经拜服在俄罗斯人脚下那般。\n\n狄奥多里克港现驻有全欧洲，乃至全世界最大的一支舰队。卡尔·邓尼茨上将随时随地关切这只舰队的一举一动，令所有人都艳羡不已。今天，狄奥多里克港的民众依然在这个海滩度假胜地狭窄的鹅卵石走道上生活、工作与恋爱。\n\n德意志人，为祖国献上荣誉与忠诚、并为此骄傲的德国人民，凝视着海上金色的地平线——他们知道，他们的子子孙孙都将在这座他们曾生活的城市里欢快玩耍。很少有人意识到，塞瓦斯托波尔的斯拉夫居民也有着同样的想法。也许下次，胜利者将会把居民埋葬在浅浅的坑中，再立上一块著有名姓的墓碑。"
 state_lore_initials.54: " MIN "
 state_lore_name.54: "明斯克"
 state_lore_desc.54: "即使曾与其他东欧城市一样同面德国入侵和随后的破坏，明斯克之上的伤痕还是比其他城市要深重许多。城内曾有相当规模的犹太社区被连根拔除，而余下的居民则深陷绝对贫困与压迫。\n\n这里远离里加，日耳曼化还不那么高。而城内的大部分政治权力，正日益落入愈发反叛的白俄罗斯合作者手中。"
 state_lore_initials.55: " RIG "
 state_lore_name.55: "里加"
 state_lore_desc.55: "里加曾是拉脱维亚的首都，但她现在是德国东方专员辖区的行政中心。\n\n积年累月的轰炸，种族灭绝和德国移民的涌入让里加变得面目全非。她现在是“模范殖民地”的“模范城市”，更是德国广袤殖民帝国中的一处秀丽风景。"
 state_lore_initials.56: " PRA "
 state_lore_name.56: "布拉格"
 state_lore_desc.56: "布拉格曾是欧洲伟大的国际都市中心之一，其丰富的建筑和文化遗产显示出这座城市在数个世纪里深受的捷克、犹太和哈布斯堡文化影响。但在德国占领时期，这座城市的文化和建筑都被残酷的重塑了。\n\n不管是街道还是市场，大学还是剧院，教堂还是礼拜堂，只有德语被允许使用。而随着一代代人的逝去，对往昔的记忆也越来越模糊。\n\n然而，尽管占领十分残酷，布拉格的工业产出却有增无减。近年来这里作为大日耳曼国的后勤和技术中心的地位已越来越明显，这正反映出她即将融入德国及其文化圈的事实。"
 state_lore_initials.57: " KRK "
 state_lore_name.57: "[Statelore_Get_KRK_name]"
 state_lore_name.57_GGN: "克拉考"
 state_lore_name.57_POL: "克拉科夫"
 state_lore_desc.57: "[Statelore_Get_KRK_desc]"
 state_lore_desc.57_GGN: "克拉科夫是波兰的文艺中心，而非实际首都，这里的基础设施在战争期间并未遭受严重破坏——但这并不意味着她毫发无损。\n\n城中大部分人口在夜雾中消失的无影无踪，整个街区空无一人，寂静无声。大学关了门，教堂变了样，规模庞大的工厂建筑群和附属的劳改营意味着克拉科夫陷入了工业化转型的可怕梦魇，而这场梦魇又被贪得无厌的德国随意摆布。\n\n虽然被毁灭的华沙对波兰民族来说是德国新秩序的短期破坏，但被奴役的克拉科夫以痛苦提醒人们，德意志的长期意图是消灭波兰引以为傲的一切事物。"
 state_lore_desc.57_POL: "克拉科夫是波兰的文艺中心，而非实际首都，这里的基础设施在战争期间并未遭受严重破坏——但这并不意味着她毫发无损。\n\n城中大部分人口在夜雾中消失的无影无踪，整个街区空无一人，寂静无声。大学关了门，教堂变了样，规模庞大的工厂建筑群和附属的劳改营意味着克拉科夫陷入了工业化转型的可怕梦魇，而这场梦魇又被贪得无厌的德国随意摆布。\n\n但是，随着波兰人再次统治克拉科夫，变革正在席卷这座城市。虽然数十年的压迫和日耳曼化不可能一天就被改写，但长期踩在纳粹长靴下的克拉科夫公民却有了新的决心。克拉科夫的新面貌将会是什么样子，以及她能否在波兰和德国之间看似不可避免的敌对行动中幸存下来，还有待观察。"
 state_lore_initials.58: " BRA "
 state_lore_name.58: "布拉迪斯拉发"
 state_lore_desc.58: "布拉迪斯拉发曾是罗马帝国的边境要塞，在7世纪成为萨莫王国，第一个有记录的斯拉夫部落政治联盟的首都。布拉迪斯拉发于1536至1783年成为匈牙利王国的首都，在历史上一直是一个文化大熔炉，展示了斯拉夫（斯洛伐克）、匈牙利和德意志文化交汇下的独特社会景观。\n\n捷克斯洛伐克解体后，布拉迪斯拉发成为约瑟夫·蒂索领导的法西斯斯洛伐克共和国首都。在德国霸权支配下的斯拉夫文化城市中，布拉迪斯拉发受到的影响较小，被允许继续稳步发展成为一个现代工业城市。未来会是繁荣昌盛，又或者是滑向崩溃？只有时间，或者德国人能告诉我们答案。"
 state_lore_initials.59: " BUD "
 state_lore_name.59: "布达佩斯"
 state_lore_desc.59: "坐落于多瑙河畔，占据肥沃的匈牙利平原中心的布达城和佩斯城一直是商业中心。当1873年匈牙利的首都设立于此，并整合为“布达佩斯”后，这座城市蓬勃发展，很快便成为了欧洲最大、最繁荣的城市之一。\n\n第二次世界大战中，匈牙利的征服为她带来了短暂的繁荣，但随后便是对城内犹太人的清洗，与罗马尼亚和斯洛伐克毁灭性的战争，以及五十年代的经济崩盘，整座城市的现状岌岌可危。处于铁腕统治下的布达佩斯外部面临着德国和意大利联合入侵的威胁，而随着越来越多的民众质疑政府的统治基础，内部也将迎来不断增长的动荡。"
 state_lore_initials.60: " BUC "
 state_lore_name.60: "布加勒斯特"
 state_lore_desc.60: "在十九世纪六十年代这一短时间内，布加勒斯特就从一个徒有规模的无名罗马尼亚城市变成了全巴尔干半岛上最为现代化的城市，城里有着现代化的下水道、电缆、路灯和工厂。邻近油田的发现让布加勒斯特成为了真正的经济中心，这座城市也由此开始不断地扩张着自己的人口和财富。\n\n现在，布加勒斯特作为仅次于伊斯坦布尔和雅典的巴尔干第三大城市，她拥有的人口和资源让罗马尼亚的邻居们垂涎三尺。布加勒斯特的富饶是会让罗马尼亚保持强大，还是招致灭顶之灾，有待于进一步观察。"
 state_lore_initials.61: " CSI "
 state_lore_name.61: "基希纳乌"
 state_lore_desc.61: "还有哪座城市能比基希讷乌更频繁地在各国之间易手？在短短三十年间，这座白石之城曾摆脱俄罗斯的枷锁赢得独立，纳入罗马尼亚的掌中；随后又被苏联夺回，但在二战中又重归罗马尼亚治下。大多数人都对现状相当满意：基希讷乌的民众基本都讲罗马尼亚语，享受着和布加勒斯特的同胞们一样的生活标准。但由于历史遗留问题，基希讷乌以及其周边的摩尔多瓦省在民族上远比罗马尼亚其他地区更加多元化。\n\n成千上万的俄罗斯人、乌克兰人、保加利亚人乃至世界上绝大多数的加告兹人都认为这里是自己的故乡。在日益隔离化的欧洲，这种独特的多元文化环境使得基希讷乌的社会明显有别于罗马尼亚其他任何城市。"
 state_lore_initials.62: " ZAG "
 state_lore_name.62: "萨格勒布"
 state_lore_desc.62: "据说，克罗地亚是二战的战胜国之一，那为什么萨格勒布还会遭受这样的苦难？作为乌斯塔沙的策源地、克罗地亚主要的文化中心，萨格勒布曾在19世纪和20世纪初享受着繁荣的发展。\n\n但自战争爆发以来，法西斯政府开始残酷地压迫城市中的非克罗地亚少数族裔，共产党叛军则转移到了农村中继续战斗，越来越多的克罗地亚人也或多或少地由于这种暴力冲突而移居到了萨格勒布。\n\n但在城市成长的同时，其经济却停滞不前，被暴力、无能的官僚机构和意大利的压力所腐蚀。随着克罗地亚的立国基础受到越来越多的质疑，萨格勒布似乎注定要卷入动荡之中。"
 state_lore_initials.63: " SJE "
 state_lore_name.63: "萨拉热窝"
 state_lore_desc.63: "萨拉热窝有着传奇的历史和复杂的民族背景。萨拉热窝成立于1461年，作为奥斯曼帝国的一个区域权力中心，她迅速发展为巴尔干地区最大、宗教和文化最多样的城市之一。几个世纪以来，东正教徒、天主教徒和穆斯林一直混居于此。\n\n正是在这里，上演了第一次世界大战乃至于之后二十世纪所有冲突的导火索，弗朗茨·斐迪南大公遇刺案。萨拉热窝及其人民的命运就此陷入了混沌。\n\n第二次世界大战之间，乌斯塔沙在其控制区内对塞尔维亚人进行了种族灭绝，导致萨拉热窝的人口减少了百分之十以上，还使得曾经和谐的克塞两族间关系产生了持续至今的巨大裂痕。今天，萨拉热窝是一个快速成长和工业化的城市，如果能解决迫近的种族冲突，她将能够迎来真正的繁荣。"
 state_lore_initials.64: " BEO "
 state_lore_name.64: "贝尔格莱德"
 state_lore_desc.64: "在萨瓦河和多瑙河的交汇处，一座古老的城堡屹立在高高的山岗之上。贝尔格莱德是罗马皇帝约维安的出生地，也是今天塞尔维亚的首都，拥有得天独厚的防守地利。\n\n在漫长的历史中，贝尔格莱德曾受到无数国王和皇帝的觊觎，在这里爆发过数十次战役和围城战，甚至在现在还在防备着潜在的敌人。\n\n虽然被德国军事统治压制了几十年，但要求建立真正独立的塞尔维亚的呼声仍然不断高涨。目前为止，贝尔格莱德是塞尔维亚最大的城市，并且还在迅速扩张，她在未来只会越来越重要，塞尔维亚的自由梦想也会随之而不断壮大。"
 state_lore_initials.65: " SOF "
 state_lore_name.65: "索非亚"
 state_lore_desc.65: "肥沃的土壤和温泉长久以来吸引着定居者迁往索非亚。索非亚是希腊之外欧洲最古老的城市之一，罗马时代就已跻身巴尔干地区的大城市行列，但在1880年左右常住人口却因连年的战争和经济萧条下降到寥寥千人。自1878年独立以来，政府对工业和基础设施的密集投资使索非亚的命运得以逆转，她又跃入巴尔干大都市的行列。\n\n索非亚在第二次世界大战后几乎与原样无异，在一个由动乱、种族冲突和外国统治主导的地区，她成了一个异常稳定而独立的堡垒。"
 state_lore_initials.66: " TSA "
 state_lore_name.66: "塞萨洛尼基"
 state_lore_desc.66: "数个世纪以来，塞萨洛尼基一直是世界上最大的犹太人占多数的城市，也是显现巴尔干地区宗教宽容的中心。德国对此可不会坐视不管。随着希腊基督徒从小亚细亚涌入，犹太人已经成为城市中的少数民族，二战期间，德国对犹太人大加屠戮，逃过一劫者纷纷逃亡，犹太社区遭彻底摧毁。\n\n不过，这座城市并不只是纳粹邪行的纪念碑。尽管她最近才从她的前主人奥斯曼人手中交给希腊，但在第一次世界大战的大部分时间里，她一直是敌对政府的中心，控制着爱琴海的贸易。塞萨洛尼基现在正与雅典竞争行政和经济中心的位置，人们公认她是希腊非官方的第二首都。"
 state_lore_initials.67: " ATH "
 state_lore_name.67: "雅典"
 state_lore_desc.67: "[Statelore_Get_athens_desc]"
 state_lore_desc.67_init: "雅典是西方文明和民主制度的发祥地，其历史远比现代希腊悠久，正因为如此，雅典才在1834年时被新独立的希腊选定为首都，尽管当时雅典不过是座蕞尔小城。\n\n在接下来的岁月里，雅典历经了激进的城建扩张和工业化，对土战争后，成千上万难民涌入城市，将这座沉寂的落后小城转变为巴尔干最大的城市。但贪婪的意大利帝国盯上了希腊，雅典的好运也走到了头。\n\n雅典城区从破败的卫城一直延伸到地中海大港比雷埃夫斯港。但在政府拼命维持的稳定表象之下，却是暗潮涌动的现实，清算即将到来……"
 state_lore_desc.67_edes: "雅典是西方文明和民主制度的发祥地，其历史远比现代希腊悠久，正因为如此，雅典才在1834年时被新独立的希腊选定为首都，尽管当时雅典不过是座蕞尔小城。\n\n在接下来的岁月里，雅典历经了激进的城建扩张和工业化，对土战争后，成千上万难民涌入城市，将这座沉寂的落后小城转变为巴尔干最大的城市。但贪婪的意大利帝国盯上了希腊，雅典的好运也走到了头。\n\n雅典城区从复兴的卫城一直延伸到地中海大港比雷埃夫斯港。虽然合作者给城市留下的创伤仍未褪去，但雅典现在摆脱了过去的束缚，重拾起古代的民主传统。"
 state_lore_desc.67_eam: "雅典是西方文明和民主制度的发祥地，其历史远比现代希腊悠久，正因为如此，雅典才在1834年时被新独立的希腊选定为首都，尽管当时雅典不过是座蕞尔小城。\n\n在接下来的岁月里，雅典历经了激进的城建扩张和工业化，对土战争后，成千上万难民涌入城市，将这座沉寂的落后小城转变为巴尔干最大的城市。但贪婪的意大利帝国盯上了希腊，雅典的好运也走到了头。\n\n雅典城区从复兴的卫城一直延伸到地中海大港比雷埃夫斯港。虽然合作者给城市留下的创伤仍未褪去，但雅典现在仍是新希腊的中心，而这个国家也意图在国际舞台上占据一席之地。"
 state_lore_initials.68: " IST "
 state_lore_name.68: "伊斯坦布尔"
 state_lore_desc.68: "伊斯坦布尔，横跨东西的桥梁，曾是先后两大帝国的帝畿所在，又是渐露帝国风范的共和国之都，她见证了无数政治巨擘、艺术天才、博学学者的灿烂轨迹，种种辉煌，自不必提。但这，只是这座“人类欲望之城”的冰山一角。随着不肖其祖的奥斯曼苏丹躲进豪华宫殿日渐颓废，这座城市的形象也随之悄然转变。\n\n到1923年10月6日阿塔图尔克踏入这座城市之时，伊斯坦布尔被世人视作是精英主义、奢华挥霍与飞扬跋扈的所在，这种形象使她不再适合作为新土耳其共和国的首都。如今，虽不十分情愿，作为土耳其的商业与文化中心的伊斯坦布尔只能位居安卡拉之后。不过，这仅限于政治地位：作为商业中心与经济重地，她依旧充满生机与活力。"
 state_lore_initials.69: " ANK "
 state_lore_name.69: "安卡拉"
 state_lore_desc.69: "如果说伊斯坦布尔象征着帝国时代的过去，那么安卡拉则代表着共和时代的未来。回想当初，这座土耳其的首都不过是一个名为“安西拉”的定居点。独立战争期间，安卡拉因其战略位置和远离传统奥斯曼价值观的特点被阿塔图尔克选为模范城市。\n\n安卡拉见证了土耳其的涅槃重生，历经了她的种种荣耀与耻辱。她是共和国搏动的心脏，也是全体市民和整个土耳其国家的骄傲。正如《安卡拉进行曲》中那句歌词所唱：“安卡拉，安卡拉，美丽的安卡拉，你是不幸之人梦寐以求的港湾。”"
 state_lore_initials.70: " DMA "
 state_lore_name.70: "大马士革"
 state_lore_desc.70: "无数次黎凡特战争的发生地，叙利亚的首都大马士革，是这片历史悠久地区中最古老的城市之一。对于大马士革来说，土耳其是一长串帝国主义压迫者名单中最新的那一位，而复兴党的抵抗运动则一直潜伏在地下。\n\n反抗法国殖民者的叙利亚起义和土耳其对城市守卫者的屠杀为最近的战争画上了句号。大马士革既记载着叙利亚数不清的失败，但也是她抵抗精神的象征，将来也许还会有更多的战争发生于此。"
 state_lore_initials.71: " HLB "
 state_lore_name.71: "阿勒颇"
 state_lore_desc.71: "阿勒颇曾是黄沙之中一座充满活力的城市，长期以来都是地区行政和商业中心，北叙利亚绝大多数的工业也聚集于当地。此外，阿勒颇还是古丝绸之路的起点之一，数百年的繁荣由此而肇始。\n\n奥斯曼帝国灭亡后，阿勒颇迅速衰落，曾经的光辉岁月一去不复返。法国委任统治时期，当地曾是一处关键的行政中心，但随着新首都大马士革愈发重要，权力与影响力渐渐离开了北方。\n\n二战期间，当地法军没有对土耳其的进攻做出任何实质性抵抗，叙利亚成为了盟友的“姊妹共和国”。人们开始担心这座城市会遭遇和哈塔伊一样的命运，被安卡拉政府收入囊中，然而，忧虑并不能扭转命运。\n\n如今，阿勒颇已沦为一座颓废之城。她如今只是平凡的边境城市，工商业基础被抽取到北方，充当安纳托利亚发展的燃料。而与此相对的是，大马士革摆脱了靠近土耳其边境的负担，从阿勒颇的衰落中受益颇多。阿勒颇的居民们祈祷着，日子有一天能再好起来。"
 state_lore_initials.72: " NAP "
 state_lore_name.72: "那不勒斯"
 state_lore_desc.72: "自中世纪以来，那不勒斯始终都是地中海沿岸最著名的港口城市之一，现在的她是一座巨大的港口，意大利的第三大城市，因自己独特的文化和各种社会矛盾而闻名。作为一个重要的商业中心，这座城市富裕的山顶区和贫困的郊区之间有着巨大的社会鸿沟：控制着港口业务和房地产开发的富有精英们始终通过或合法或非法的强力手段牢牢地把控着那不勒斯。"
 state_lore_initials.73: " PAL "
 state_lore_name.73: "巴勒莫"
 state_lore_desc.73: "西西里王国的旧都曾经历过一段美好的岁月，但那中世纪旅行者们称其为“最辉煌的城市”时光早已一去不复返了。\n\n20世纪50年代的高速发展和猛兽般的过度城市化用水泥和沥青吞没了巴勒莫古老的历史街区。不管是在光天化日之下做到的，还是说用了一些不那么干净的手段，法西斯主义都将整座城市变成了西西里岛行政机器中的一个齿轮。"
 state_lore_initials.74: " TIR "
 state_lore_name.74: "地拉那"
 state_lore_desc.74: "阿尔巴尼亚的首都因法西斯统治改变了面貌，但这些改变在很大程度也只是触及皮毛。地拉那在现代还是一副巴尔干地区的典型矛盾样貌：理性、宏伟的行政区里满是现代化宏伟建筑，而贫民窟里塞满了古老、狭小的房屋。地拉那的成长更多是法西斯政策强行垒就，远非是真正的成功。想要把地拉那真正带到二十世纪，还有许多工作要做。"
 state_lore_initials.75: " MIL "
 state_lore_name.75: "米兰"
 state_lore_desc.75: "米兰是意大利第二大城市，也是她主要的工业中心。\n\n自罗马时代以来，这里就在不断地扩张发展。米兰坐落于波河谷地的中心，在经济上占据着战略性的地位，这最终帮助她发展出了强大的工业部门，围绕着像布雷达以及倍耐力这样的大工厂实现了快速的工业化，近来一波一波的移民潮也因此涌入这座城市。\n\n就像所有大都市一样，米兰也兼具国际性与复杂性，这里既是早期法西斯运动的策源地，也是后来反法西斯抗议的主要中心。"
 state_lore_initials.76: " TOR "
 state_lore_name.76: "都灵"
 state_lore_desc.76: "在很长一段时间里，都灵曾经是撒丁-皮埃蒙特王国的首都，因此这座城市与萨伏依王朝之间有着崇高而古老的纽带。\n\n但如今，都灵更多地是作为一个主要工业城市而为人所知：这里是菲亚特公司的所在地，与米兰和热那亚共同构成了意大利的“工业三角”。意大利最具贵族气息的城市之一已经转变成了一个主要居住着工人阶级的工业城镇，这其中包含着社会以及经济的彻底转型。"
 state_lore_initials.77: " MEX "
 state_lore_name.77: "墨西哥城"
 state_lore_desc.77: "纵观墨西哥历史，不论是共和国、帝国、总督辖区还是革命委员会，都有一个共同的首都——墨西哥城。自建国时起，这座城市一直是墨西哥搏动的心脏。她于1524年建立在阿兹特克帝国首都特诺奇蒂特兰的废墟和被填平的特斯科科湖之上，旋即成为西班牙殖民帝国在北美的政治和经济中心。\n\n凭借其遥遥领先的发展程度，墨西哥城顺理成章地于1824年被独立的墨西哥选作首都，并在不久后的1837年升格为“联邦区”。一个世纪过去，1928年，奥夫雷贡将军为平息围绕城市爆发的政变和叛乱，将其有效地置于联邦管辖之下，决定取消墨西哥城的种种权利。这一状态持续至今，不少人因此心生愤怒。\n\n作为进步思潮的中心、墨西哥文化的摇篮，日新月异的墨西哥城是国家当之无愧的枢纽。她的人口是第二大城市的四倍，其影响力往往令众多城市相形见绌。官僚和议员在政府大楼里共商国是，争论不休，懊恼于腐败的政治机器。而在方块状的街区和贫民窟中，市场蓬勃发展，活动家们聚集抗议。\n\n不管墨西哥的未来如何，都将在这座神圣的首都内决定。"
 state_lore_initials.78: " TIJ "
 state_lore_name.78: "蒂华纳"
 state_lore_desc.78: "这座被誉为“两洋之心”的城市坐落于下加利福尼亚的西北角，俯瞰着浩瀚的太平洋。她是墨西哥最大的城市之一，也是北美一个重要的制造业中心。\n\n紧邻美国给蒂华纳带来了许多好处，加利福尼亚的游客们蜂拥而至，美国人也在禁酒令期间来到这座城市避开酒水禁令。今天，这座神奇的海滨城市吸引着美国和日本，也是一座墨西哥人足以为之自傲的美丽城市。"
 state_lore_initials.79: " VER "
 state_lore_name.79: "韦拉克鲁斯"
 state_lore_desc.79: "拥有数百万人口的韦拉克鲁斯是墨西哥最大最古老的港口，在历史上一直扮演着举足轻重的角色。1519年韦拉克鲁斯由埃尔南·科尔特斯建立，其名源于耶稣受难日。建成后，韦拉克鲁斯作为新西班牙殖民地的门户吸引了大量欧洲移民和珍宝船队的富商，一度超越墨西哥城。正是这些因素，使韦拉克鲁斯成为了宣告墨西哥独立的《科尔多瓦条约》的签署地。\n\n然而，韦拉克鲁斯也是多场侵略的起始点：马西米连诺一世在此踏上墨西哥的土地；美国军队在革命时期占领这座城市长达七个月，为美墨关系留下了难以愈合的创伤。\n\n尽管同旧世界的贸易随着二战结束近乎断绝，但当地融合了西班牙、美洲原住民和加勒比黑人文化的商业依然蓬勃发展。时至今日，韦拉克鲁斯仍是加勒比海地区重要的贸易中心，而她跌宕起伏的历史或许还未画上句号。"
 state_lore_initials.80: " GUA "
 state_lore_name.80: "瓜达拉哈拉"
 state_lore_desc.80: "最初由巴斯克征服者建立的瓜达拉哈拉在当地发现大量银矿后才走上发展的快车道。作为墨西哥的第二大城市，她处于许多历史事件的前沿，特别是墨西哥独立战争期间第一个革命政府就建立于此。\n\n这座城市和她周围的地区产生了墨西哥文化的几个支柱象征，例如龙舌兰酒，还有标志性的墨西哥流浪乐队这一音乐流派，直到今天，她仍是一个重要的文化和经济中心。"
 state_lore_initials.81: " MRR "
 state_lore_name.81: "蒙特雷"
 state_lore_desc.81: "这个位于东马德雷山脉，墨西哥北部的小镇自十六世纪西班牙帝国就存在了，她的地理位置使其成为了圣安东尼奥，坦皮科和墨西哥城之间一个重要的贸易站。\n\n正是在这里，墨西哥人挡住了美军的入侵，尽管他们仍没能赢得那场美墨战争；在同一个地方，墨西哥人也见证过法国在法墨战争中的撤退。这座城市经历了相当多的冲突，但在今天，她还是墨西哥钢铁产业的重要支柱。"
 state_lore_initials.82: " KŌS "
 state_lore_name.82: "廣州"
 state_lore_desc.82: "广州城，或者按洋人的惯称，“坎顿”城，一直以来都是大江边矗立的一颗耀眼明珠。两百多年前，她曾是世界上最大的商业中心之一；四十年前，国民党的灼灼白日亦是以此地作为核心。然而，岁月之江流不停涌动、溢出泡沫、又彼此冲撞，过往之潮流终是未能为此明珠找到归宿。\n\n事与愿违，在第二次中日战争尘埃落定后，广州城便与其余亚洲领土一样，落入了新秩序的掌控之中。新来的日本主子对她吆五喝六，要将这里的残垣断壁，重塑成理想模样。广州将成为新兴技术的中心、崭新国度的首都，在此处，无尽的可能将舒展枝条，灿然盛开，直至千秋万代。今日之城市被异样的口音唤着，其显露的不再是勃勃生机，而是灯泡的炽热光芒——那些光焰闪烁摇晃、无孔不入，穿梭于刺眼的广告牌间，流动在拥挤的楼房间，飘摇在剧毒的烟雾间——这一切都勾勒了这座城市的崭新轮廓。\n\n这座城市里还有些相对健康的地方，那里聚集着日本来的承包商、工头和商业人才。那些人正共商计谋，意图将城市其余地方的视线也尽数阻挡。在他们眼里，那大部分的中国人中，有多少断了手脚，是根本无需在意的。广州确实是广东国的首都和珠三角的中心：她是泛亚共荣圈的关键营垒，姿态挺拔，直插云霄，整个世界有目共睹。"
 state_lore_initials.83: " HKN "
 state_lore_name.83: "香港"
 state_lore_desc.83: "香港已与中国分别近两个甲子，但新来的统治者却为这里的一切带来了剧变。日本人带来了他们的语言，带来了他们的人民——他们现在占据了近30%的城市人口。但，最要命的是他们那残酷无情的企业文化。\n\n在这里，身着黑西装的人在空调房若无其事地下达决策，让无数人沦为奴隶，供应整个共荣圈的野蛮机器；在这里，汇聚着常人难以想象的财富；在这里，在商场华丽辞藻的掩盖下，最为险恶的斗争正悄然上演。\n\n可正是在这里，人们不知疲倦地工作着，他们知道企业正榨干自己身上的每一滴油水，但他们依旧做着爱拼才会赢的白日梦。渔夫们仍在撒网，耐不住性子的学生们一块踢足球，老人们和孙辈们一起吃饭。激烈的竞争吞噬着所有人，但人们找到了暂时忽视这一切的方法。\n\n香港是珠三角最主要的金融商业中心，美丽动人的同时却又残酷无情。广东的脏污、残暴与无情，似乎都与这座布满摩天大楼的城市毫无干系。"
 state_lore_initials.84: " MAK "
 state_lore_name.84: "澳門"
 state_lore_desc.84: "曾被冠上“富丽堂皇的东方之门，妈祖女神的璀璨明珠”美誉的澳门，现在从贸易方面来看，只是一个依偎在珠江三角洲岸边不起眼的港口，这里见证又经历了几个世纪的繁荣动荡，岁月流逝，不断变迁。\n\n葡萄牙的探险家与水手曾经在这片海岸上安营扎寨，造就了一个繁华的贸易中心，吸引世界各地的商人和旅行者驻足。这个利润丰厚的港口也因妒羡或是争斗而卷入冲突之中，但将葡萄牙人彻底赶出这片土地的，却并非荷兰或是英国人，而是冉冉升起的旭日帝国与贪得无厌的广东企业。\n\n今日的澳门赌场遍布，霓虹璀璨，犹如绚烂月光；财富随轮盘上的数字来了又走，地下活动与无忧享乐如无止境的漩涡；而那身为葡萄牙港口的小小身影早已化作历史的尘埃。"
 state_lore_initials.85: " NAN "
 state_lore_name.85: "南京"
 state_lore_desc.85: "南京，六朝古都，虎踞龙盘。清朝覆灭后，她再次成为国家的首都，这是一座与中国革命休戚与共的城市。早在太平天国起义之时，连绵不断的战争，让这座城市流尽鲜血。\n\n辛亥革命后，南京被选为首都。三十年代巨大的经济增长与建设让她改头换面，以现代化都市的样貌成为全中国名副其实的中心。但，好景不长。第二次中日战争期间，侵华日军在南京奸淫掳掠，使城市变为丘墟，人民惶惶不可终日。\n\n出于行政考量，改组国民政府重新将这座遭到残忍对待的城市作为首都。战争过后，近十余年来的种种暴行逐渐淡去，城市于喘息之间也渐渐恢复过来。如今，南京成为了中国人民坚忍不拔的见证。街头巷尾，阴暗角落，流言蜚语不绝于耳，谋划着彻底挣脱日本人的枷锁……"
 state_lore_initials.86: " BEI "
 state_lore_name.86: "北京"
 state_lore_desc.86: "尽管曾经深居紫禁城内的皇帝正在国境线的另一侧统治着一场巨大的殖民实验，北京依然是中华民族至关重要的一座城市。作为中国为数不多的工业和金融中心之一，北京吸引着来自全国各地的移民，这座城市对中国经济的贡献大得不成比例——尽管南京早已取代她成为最重要的城市。\n\n自卢沟桥事变以来，北京也成了日本控制中国的一个重要环节，接待了数千名日侨和军队，同时也扮演着东京和她最重要的共荣圈成员之间关键纽带的角色。\n\n然而，北京也以其暗含巨大割裂的社会成为中国最真实的写照——民族与民族之间、富庶与饥贫之间、传统与现代之间，尤其是合作政府和隐于地下的反抗者组成的隐秘巨网之间，一场由“随机事件”和街头袭击组成的战争在阴影中缓缓燃烧，伴着涌入城市的人群起起伏伏。随着这曾经的北方首府蹒跚着步入现代，这本就如同鸿沟一般的裂痕变得愈发明显——这一切，迟早都会得到解决。"
 state_lore_initials.87: " S-PB "
 state_lore_name.87: "圣彼得堡"
 state_lore_desc.87: "这座现在被称作圣彼得堡的城市在历史上经历的重命名可比许多家庭中的孩子数量都要多。当彼得大帝建城时，她被称为圣彼得要塞，随后被改为圣彼得堡。1914年，她更名为彼得格勒，而在1924年列宁逝世后，她又被改名为列宁格勒。在她被征服后，城名随之被转写为原名的德语名称。\n\n那融合了西欧和俄罗斯精华的旧城区在战后被夷为平地，并按纳粹美学得以重建。就如莫斯科一样，市中心的无数工人和普通民众被迫迁往郊区。不过，由于许多参与重建的工人在城市完工后被允许留在当地，因此圣彼得堡的隔离和流动限制没有莫斯科那么严格。但与莫斯科一样，工业化的种族灭绝还在继续，大批俄罗斯人在城中劳作至死，好让德裔的“主人种族”能取而代之。"
 state_lore_initials.88: " PAU "
 state_lore_name.88: "保卢斯堡"
 state_lore_desc.88: "这座现在被称作保卢斯堡的城市，最早建立于1589年，当时她还只是一座要塞，名为察里津。到了十九世纪，这座要塞已经成为伏尔加河上重要的河港和商贸中心，城内人口也大幅膨胀。1917年，察里津被苏维埃军队攻克，但白军依然围绕她做了三年的艰苦奋战方才消停。白军被击败五年后，她被重新命名为斯大林格勒，以此纪念在战斗中发挥关键作用的约瑟夫·斯大林。直到第二次世界大战，保卢斯元帅征服该城为止，她都叫这个名字。\n\n如今，保卢斯堡是继莫斯科后莫斯科专员辖区内的第二中心。原城的一半被夷为平地，并按照德国人的想法加以重建。无数俄罗斯人被驱离城市，要么就得在工厂里拼命工作，这使得保卢斯堡成为整个莫斯科专员辖区内部“最德意志”的城市。"
 state_lore_initials.89: " MOS "
 state_lore_name.89: "莫斯科"
 state_lore_desc.89: "莫斯科，俄语如是称呼，在近五百年来一直是统一俄罗斯国家的中心。她领导了俄罗斯无数次对外的征服与防御，哪怕在沙皇倒台后，莫斯科也维持了苏联首都和革命始源地的地位……直到德国人打破这一切为止。\n\n今天的莫斯科，便是莫斯科专员辖区地狱上的皇冠。那些曾经亲手建造过她的人肯定认不出来了。克里姆林宫和其他历史建筑虽然被完璧保留，但它们也被装饰上了纳粹的符号。莫斯科城外的郊区被重新规划，种族隔离制度被引入其中，而成千上万的俄罗斯人被赶到郊区，在奴隶工厂里日夜劳作。"
 state_lore_initials.90: " AFA "
 state_lore_name.90: "安托法加斯塔"
 state_lore_desc.90: "想象一架飞机从东向西飞越智利北部。当它掠过安第斯山脉的峰巅后，将继续穿越这个国家北部广阔的沿海沙漠带。突然之间，阿塔卡马单调的沙质平原上矗立起了一片由玻璃与钢铁造就的森林，这便是人类曾为之流血争夺的安托法加斯塔城。\n\n这座现代矿业重镇是智利庞大的采矿工业枢纽，自诞生之日起就始终是安第斯诸国垂涎的瑰宝。最初作为玻利维亚硝酸盐采矿定居点建立的“拉钦巴”，在19世纪中后期成为了智利大规模移民浪潮的核心。\n\n这座坐落在国际边境、聚集着多元族裔的矿业富邑，自然成为冲突的焦点。智利与玻利维亚围绕领土争端以及玻方对智利硝石企业征收重税的矛盾不断升级，最终引爆了持续四年的太平洋战争。尽管形势严峻，智利仍在这场战争中击败了玻秘联军，将蕴藏丰富资源的玻利维亚海岸线尽收囊中，安托法加斯塔亦随之易主。\n\n如今，这里拥有全球规模最大的硝酸盐与铜矿开采产业。随着电化学领域的创新突破，矿业公司开始大量开采该地区丰富的锂矿资源。安托法加斯塔俨然是一座冉冉升起的明星城市，无愧于“北方之珠”的称号。"
 state_lore_initials.91: " VAL "
 state_lore_name.91: "瓦尔帕莱索"
 state_lore_desc.91: "就在圣地亚哥以北75英里处、靠近智利海岸线死角的地方，那里坐落着“太平洋的宝石”。瓦尔帕莱索，简称瓦尔波，是智利的大港，也是智利一切经济以及军事海事活动的中心。虽然受到地缘政治秩序变化带来的干扰，但智利庞大的海运业仍在运转，为这座城市带来日益萎缩的收入，以及一网又一网数不尽的海鱼。\n\n瓦尔帕莱索本身也像一个已过黄金时代的港口城市一样，变得无精打采。城中许多著名的缆车不再运行，在迷宫般的鹅卵石街道中漫步也不再安全。由于缺乏重大投资和关注，这座城市已经渐渐变得藏污纳垢、疏离世间。肮脏与疏远会带来极端主义，瓦尔帕莱索因此成为智利社会主义运动的中心：众所周知，码头工人工会是全国最不稳定、最受意识形态驱动的工会之一，他们领导了许多次罢工和示威活动。\n\n在红色横幅和老旧的造船厂之间，每天都有标有OFN白色火炬标志的船舶停靠在城中的港口。对于思想开放的智利人来说，这展示了智利和美国之间的合作关系，也证明了强大的外国投资；对不满现状的智利人来说，这代表着美国人对智利自然财富的不正当开发。瓦尔帕莱索可能已经不再像宝石一样熠熠生辉，但她仍然是智利重要的经济和文化中心；即使是最明哲保身的瓦尔波市民，也仍然怀抱着一个闪亮城市的梦想。"
 state_lore_initials.92: " SAN "
 state_lore_name.92: "圣地亚哥"
 state_lore_desc.92: "从拉莫内达宫的树干式新古典主义立柱到埃尔普洛莫山神圣的山顶，圣地亚哥是一座充满火焰和希望的城市。这里是智利的政治、文化和经济中心，因此，她也是智利人日益增长的极端主义心理的中心。抗议者们戴着各色的臂章、挥舞着各种口号标语，他们火热的激情似乎已经准备好要将这座城市引进一场势不可挡的烈火之中。\n\n无论圣地亚哥是化作废墟还是解脱出极端主义的热潮，对这座城市的灵魂来说都并不重要：圣地亚哥曾经数次被夷为平地，而每次重建后她都会比之前更加宏伟，不屈不挠地反抗着虚无主义和死亡。\n\n有人说，智利在苦难中找到了稳定。如果这是真的，那么就还没有人告诫过圣地亚哥的民众——他们太痴迷于意识形态，根本就无法保持稳定；他们的抗议活动也太频繁，这也让他们没有时间去忍受痛苦。在圣克里斯托瓦尔山顶上，一座洁白而光芒四射的圣母玛利亚雕像正带着骄傲和信仰注视着她心爱的城市。"
 state_lore_initials.93: " CON "
 state_lore_name.93: "康塞普西翁"
 state_lore_desc.93: "康塞普西翁是一座乐观的城市。她的建立充满鲜血，而之后的历史也一次次被鲜血所浸泡。智利首任总督，征服者佩德罗·德·瓦尔迪维亚在距离马普切人的土地只有几英里的地方建起一个重要的军事据点，这就是康塞普西翁的开端；这座城市在1554年的毁灭是不可避免的，而西班牙人也对马普切人的报复则是加倍奉还。\n\n1939年和1960年的两场地震都是有史以来最大的地震之一，她们将这座城市的历史拉入了几个世纪以来都没经历过的最低点。而针对马普切人的阿劳科战争给这座城市带来了不亚于大地震的巨大伤亡。不过换而言之，既然康塞普西翁是一座不断失血的要塞城市，那政府就得给她不断输血，康塞普西翁也就因此不断繁盛。她从未重建失败过，无论是地震中破碎的大地或是激烈的战争都未曾摧毁她。\n\n在阿劳科战争后，康塞普西翁迅速从一个军事城市转型为文化城市，经济的飞速增长无疑使其成为了智利南部跳动的心脏。尽管马普切人两次夷平了这座城市，尽管大地起起伏伏，尽管整个智利，特别是南方陷入了经济和政治困境，康塞普西翁始终都将作为智利南部的象征和领头羊，屹立不倒。"
 state_lore_initials.94: " ARE "
 state_lore_name.94: "蓬塔阿雷纳斯"
 state_lore_desc.94: "蓬塔阿雷纳斯（桑迪岬），这座名字不起眼的城市处在世界的边缘。蓬塔阿雷纳斯守卫着具有战略意义的麦哲伦海峡，是世界上最南端的城市之一，这样的地理位置意味着她对跨越麦哲伦海峡的力量投射至关重要。\n\n维多利亚时代，欧洲列强们并没有忽视蓬塔阿雷纳斯的战略位置。虽然智利声明了主权，英国和法国依然派遣了一系列远征队，试图控制该地区。智利总统曼努埃尔·布尔内斯于1843年建立了布尔内斯堡以重夺该地主权。智利人比法国人早了一天到达此地，而英国人则更晚。如果智利人晚一会儿到达，这座城市可能就不会叫做蓬塔阿雷纳斯，而应该叫桑迪岬，或者萨布莱岬了。\n\n随着时间日益扩大。1848年，布尔内斯堡在拉斯米纳斯河边重建。堡垒的一部分是流放地，其住民点成为了后来的蓬塔阿雷纳斯。城市的地理位置使她成为大西洋-太平洋贸易无可争议的中枢，加上金矿的发现，使得城市在十九世纪迎来巨大成长。随着巴拿马运河开通，该城转瞬间成为贸易的边缘位置，城市发展陷入停滞。但是，蓬塔阿雷纳斯依然在战略和文化上拥有不可忽视的重要性。城市的座右铭是“劳动创造一切”，看起来蓬塔阿雷纳斯还没有失落传承至今的勤劳与热情之火。"
 state_lore_initials.95: " JKT "
 state_lore_name.95: "雅加达"
 state_lore_desc.95: "雅加达原名巴达维亚，几个世纪以来一直都是广大印尼群岛的中心所在。不论是印尼本地的各王国与苏丹国，还是荷兰的殖民者，又或是解放后的印度尼西亚共和国，都把这座城市当成了它们的首都，至今已有几百年的历史了。或许这座城市在接下来的几个世纪中依然会作为某个国家的首都而存在。\n\n这座城市本身是非常……奇特的。雅加达作为“一个强大国家的象征”，这个国家最伟大的城市，其繁荣和发达与印尼其他地区的贫穷与落后形成了鲜明的对比。如今，苏加诺日益增强的自豪感正推动着这座城市继续向前发展，同时将印尼其他地区和大多数印尼百姓远远地甩到了后面。或许，未来情况会有所转机……\n\n又或许，会一如既往、一成不变。"
 state_lore_initials.96: " JOG "
 state_lore_name.96: "日惹"
 state_lore_desc.96: "古老的日惹市，是了解印度尼西亚过去和未来的窗口。这里既有古代爪哇苏丹国留下的遗迹，也有最先进的文艺机构。日惹是传统爪哇风俗和文化的典范，其富有活力的纺织品艺术和独特的木偶戏闻名世界。\n\n日惹的行政管理是该群岛漫长历史的遗迹：一个独立于周围有组织的省份的自治苏丹国，由苏丹哈孟库布沃诺九世总揽大权，他通过宣扬甚至吹捧民族英雄苏加诺的魅力来巩固自己的统治。这位苏丹掌管着一座渴望拥抱潮流和未来的城市，她是教育和卓越的典范，这里大量的学生将代表着这个国家的未来。\n\n日惹如同一幅画像，描绘了一个民族的历史，但她的未来仍不明朗。从这颗位于默拉皮山南坡的宝石中，我们可以收获很多。"
 state_lore_initials.97: " SEM "
 state_lore_name.97: "三宝垄"
 state_lore_desc.97: "热闹的三宝垄市是爪哇中心的黄金地带，她恰好位于雅加达和苏腊巴亚这两个国际大都市之间。当三宝垄建立时，她还只是马塔兰苏丹国那段被遗忘的时期中的一个不起眼的渔村；18世纪时，此地被移交给荷兰东印度公司以偿还债务。\n\n归于殖民者统治下的三宝垄始终没有其他大都会显著，但这段时期也给三宝垄带来了网状的街区和欧式建筑，将这座有着古老历史的小镇将变成了一座更大、更繁荣的城市。当印度尼西亚也进入工业化时代时，伴随着铁路的到来和贸易机会，三宝垄进入了经济持续增长期，随着大邮政路的开通一跃成为了农业中心。\n\n三宝垄的成功今天仍然回荡在新生的印度尼西亚。她不仅成为了一个繁华的商业和工业城市，而且还得到了当地稍有规模的华人少数群体支持。人们对未来抱有无限的憧憬，因为这座城市有着无限的潜力。"
 state_lore_initials.98: " BAN "
 state_lore_name.98: "万隆"
 state_lore_desc.98: "万隆如同一颗璀璨的宝石，镶嵌在层峦叠翠、郁郁葱葱的群山之间。这座繁华的城市曾经拥有“爪哇巴黎”的迷人绰号，荷兰定居者在万隆修建的豪华的咖啡馆和酒店正是她富足的象征；与现代化的雅加达那摩肩接踵、车水马龙的场景不同的是，在万隆你可以一窥欧洲那优雅的风貌。荷兰人非常欣赏当时如田园诗般的小镇，于是起草了搬迁首都的计划，著名的基础设施项目，大邮政路正起源于此，这是统治者青睐的定居点。\n\n日本军舰和士兵的到来预示着万隆市进入了一个新时代。这座小镇发展成为一座灯火通明、知识分子云集的城市，荷兰人留下了整个群岛闻名的大学和宏伟的建筑作品；万隆理工学院的一名学生将彻底改造他的国家，使之成为现在的样子。\n\n今天，万隆在民族独立时代仍然保持着她的重要性，她是西爪哇省的首府，这座古老的城市坐落在芝加本隆河的河畔。"
 state_lore_initials.99: " SBY "
 state_lore_name.99: "苏腊巴亚"
 state_lore_desc.99: "苏腊巴亚，爪哇三大名城的最后一员。苏腊巴亚毗邻马都拉岛，其历史意义为众人所铭记。中国的史官和海员于15世纪下西洋时记录了这个贸易港口，并称赞了其水“甘淡可饮”。\n\n苏腊巴亚在很长一段时间内都是荷兰东印度公司镀金王冠上闪闪发光的明珠，在如今的雅加达崛起之前，苏腊巴亚是其领土内最大、最繁荣的城市。荷兰人利用这一天然良港，一度将其转变为群岛上最大的海军基地，其国力强大可见一斑。地理优势得天独厚的苏腊巴亚周边布满了利润丰厚、郁郁葱葱的种植园，以及伴随工业时代到来的一座座工厂。\n\n荷兰人遭到驱逐后，印尼迎来了所谓的民族独立。苏腊巴亚仍然保持着当地商贸中心的地位，同时也是这个岛屿富足的象征。"
 state_lore_initials.100: " RdJ "
 state_lore_name.100: "里约热内卢"
 state_lore_desc.100: "[Statelore_Get_Rio_Desc]"
 state_lore_desc.100_pre_storm: "南十字星下，基督展开石质双臂，迎接所有原住民与新移民来到巴西合众国的明珠——里约热内卢。在巴西利亚建成前，这里曾为巴西各共和国、帝国、军政府——甚至葡萄牙自身的首都。  \n\n作为南半球最负盛名的旅游城市，里约热内卢汇聚着全巴西最活跃的多民族社群，在文学、音乐与戏剧领域引领风潮。这些艺术形式每年二月在狂欢节的彩车与桑巴舞步中绚烂绽放，但盛装游行掩盖不了城市顽疾：贫民窟仍在膨胀，巴西利亚新都的光鲜外表不断蚕食着旧都的就业机会。然而这座经历过王国倾覆、共和国更迭的古老都城，早已将此类阵痛视若尘埃。"
 state_lore_desc.100_post_storm: "里约热内卢遭遇了史无前例的特大洪水。1966年1月2日，一场特大暴雨席卷瓜纳巴拉湾，创纪录的降雨量引发了山洪和山体滑坡，导致超过321人丧生。社区被夷为平地，数百万美元的财产化为乌有，成千上万的居民流离失所，城市陷入了前所未有的黑暗时刻。然而，希望依然存在。里约热内卢的居民以坚韧不拔的精神直面洪灾，一幢幢建筑自废墟之中拔地而起，政府的重建工作也在稳步推进。前路艰难险阻，唯有继续前行，才能迎来新的曙光。"
 state_lore_initials.101: " SAO "
 state_lore_name.101: "圣保罗"
 state_lore_desc.101: "圣保罗的座右铭“不甘人后，敢为人先”生动地概括出这座城市的进步本质。作为巴西发展最快的城市（近日抢了里约热内卢“巴西人口最多城市”的头衔），圣保罗的工业蓬勃发展，其科学技术贡献更是令其他城市望尘莫及。除此之外，圣保罗还是混同无数文化的大熔炉，成千上万的犹太人、日本人、意大利人、阿拉伯人在此地安家置业。\n\n然而，没有哪座城市完美无缺，作为巴西人口最多的大都市，圣保罗是这巴西无尽政治斗争的避雷神针。飓风穿城而过，她的市长，一位名叫阿德马尔·德·巴罗斯的男人，正身处风暴之眼。他的眼，连同风暴之眼，一齐指向巴西利亚，等待着独属于自己的机会。"
 state_lore_initials.102: " BRA "
 state_lore_name.102: "巴西利亚"
 state_lore_desc.102: "现代又开放的巴西利亚是一座铺满林荫大道与圆角建筑的城市。靛蓝色的泳池反射着宝石般的光芒，零散的雕像与道路就如山羊角一般弯曲。她是儒塞利诺·库比契克在20世纪细心栽培的成果。\n\n卢西奥·科斯塔与奥斯卡·尼迈耶将巴西的新首都设计成一架翱翔于天际的飞机，国家的官僚们居住在这架飞机的机翼中，并成为国家运转的燃料。巴西利亚并不是一座适合步行的城市，她那严格规划的城区也提供不了什么夜生活。\n\n但巴西利亚是否如库比契克期待的那样代表了巴西呢？不，差得远了。换个方面讲，让巴西遵循如此多的规矩也不太厚道。但巴西利亚如同一张字帖一般，前人负责书写，后人只需跟随即可。"
 state_lore_initials.103: " MNA "
 state_lore_name.103: "马瑙斯"
 state_lore_desc.103: "马瑙斯是一座被行走棕榈树的矛状根系所支撑，和亚马孙雨林融为一体的城市。建城时，马瑙斯被命名为“黑水河边缘之城”，恰好说明了她位于内格罗河与苏里摩希河的汇合点，亚马孙雨林的心脏。\n\n马瑙斯还是一座前沿科学之城，新立的国立亚马孙流域研究所是植物学、昆虫学和人类学研究的最前沿。马瑙斯的经济部门主要由橡胶采集业构成。曾经，橡胶带来的巨大财富吸引了多种多样实验性作家和艺术家。\n\n然而，亚马孙剧院业已倒闭近六十年，马瑙斯的文化影响力近乎荡然无存。巴西的其他地区只将马瑙斯看作橡浆的龙头罢了。"
 state_lore_initials.104: " P-AL "
 state_lore_name.104: "阿雷格里港"
 state_lore_desc.104: "阿雷格里港，欢乐之港，坐落在南美洲最大的潟湖——帕图斯湖的附属水道瓜伊巴河的西岸。自1769年建城以来，伴随着渡船的汽笛声和码头工人的号子，这座城市的经济随之共振，并在二者的加持下走向繁荣。\n\n作为破衫汉战争的开篇之地，阿雷格里港是高乔人，这群活跃在南锥体地区老谋深算、绝不屈服、艺高人胆大的骑士们神话的起点，他们也在南美文学经典中留下了浓墨重彩的一笔。在近两百年的时间中，阿雷格里港码头上的喧嚣始终响彻着整个南美；而之后这座欢乐之港又将敲响什么样的钟声呢？"
 state_lore_initials.105: " REC "
 state_lore_name.105: "累西腓"
 state_lore_desc.105: "累西腓是巴西仅次于巴西利亚的第二大城市，这归功于前总统儒塞利诺·库比契克阁下的大力建设。累西腓曾是美洲第一个奴隶港，由于经济困难，这座城市长期依赖甘蔗种植园。\n\n库比契克总统认识到东北地区欠发达的现状，于1959年设立了东北部发展管理局，试图将这一地区发展为现代工业中心，而累西腓正是计划的核心。\n\n然而，计划没有实现她的转型目标。超过百分之六十的东北部住民，其中超过百分之三十五处于极端贫困，收入依然小于巴西最低工资标准。对于超过一百万的累西腓居民，生活在渐渐好转，但依然十分艰难。"
 state_lore_initials.106: " TAO "
 state_lore_name.106: "青岛"
 state_lore_desc.106: "青岛，这座崛起于齐鲁故地的新兴港城，自诞生之日起便承载着地缘政治的宿命。其扼守黄海门户、俯瞰中原腹地的战略价值，引得列强轮番争夺：1898年德意志帝国在此开埠建城，1914年日军趁欧战烽火取而代之，1922年虽短暂回归北洋政府治下，又在抗战烽烟中再度沦陷。如今，她以特别市身份被纳入南京政府的版图。\n\n依托“大青岛建设方略”的宏伟蓝图，战后城市版图迅猛扩张。如今青岛已是仅次于京津的华北第三大城市，坐拥区域内规模首屈一指的海军基地。假以时日，青岛有望跃居经济强市乃至媲美珠三角——当然，只是假设。"
 state_lore_initials.107: " DAI "
 state_lore_name.107: "大連 £GFX_dairen_texticon"
 state_lore_desc.107: "大连与烟台一道，同为拱卫辽东湾的两大门户，保护着通往天津等华北富庶之地的海面。这座城市坐落于辽东半岛南端，极具战略价值，每位占领者都赋予她不同的名字。清朝治下，这里是金州，然后是鸦片战争期间，这里因英国军官威廉·亚瑟而得名亚瑟港。\n\n1895年俄罗斯帝国占领城市后，将其更名为达里尼，直到日俄战争中日本最终将其占据。熬过这段较为动荡的时期后，大连终于稍微安宁了一些，但其军事上的重要地位仍然不减，毕竟关东军与南满洲铁道株式会社的总部都曾驻扎于此。"
 state_lore_initials.108: " FZA "
 state_lore_name.108: "釜山"
 state_lore_desc.108: "釜山最大的不幸，可能就是离日本太近。朝鲜王朝时期，这座城市是朝鲜半岛的主要港口，能与亚洲其他地区进行贸易的国际性城市，然后日本帝国踏上了这片土地。\n\n从此，釜山就成为了将朝鲜劳工运往日本本岛的主要港口，釜山的光彩黯淡下来。每一天，都会有成千上万的人被送往东方，他们的终点是财阀的工业园，他们将在那里劳动至死。\n\n与此同时，日本当局也在建设更多的工业设施，对城市本身进行激烈的改造，以将釜山打造成朝鲜半岛的工业重镇。日本也许为釜山带来了现代化，但他们绝对没有为釜山人民带来幸福和财富。"
 state_lore_initials.109: " HGH "
 state_lore_name.109: "杭州"
 state_lore_desc.109: "杭州这座伟岸之城雄踞杭州湾畔，遥望前方浩瀚汪洋。她以通达全球的商路和完美无瑕的自然景观闻名于世，在中国崎岖蜿蜒的海岸线上傲然崛起，已成为一方繁荣的灯塔。\n\n植根于古老王朝的土壤，杭州在历史长河中渐次舒展身姿。历代文人墨客无不折服于她的山水灵秀，春日里的西子湖更是一方声名远播的安宁乐土，碧波潋滟处寄托着千年诗意。\n\n这片土地铭刻着华夏枢要的印记——当蒙古铁骑南侵之际，巍然成为南宋王朝的都城，在抵御外侮的风雨中守护着华夏文明的星火，绽放出艺术与创造的不朽光芒。如今的杭州虽然历经日寇铁蹄的践踏，依然屹立于共荣圈内最繁华大邑之列，焕发着东方明珠的璀璨光华。"
 state_lore_initials.110: " HBN "
 state_lore_name.110: "哈尔滨 £GFX_harbin_texticon"
 state_lore_desc.110: "既有历史积淀，又不乏摩登气息。这，便是远东的双面城——哈尔滨。这里既有金朝遗都上京会宁府，也有俄罗斯人沿着中东铁路开辟的近代新城。中国劳工带着满身风尘走进东正教堂的穹顶下寻求慰藉，沙俄的落魄贵族弯下腰为日本新贵擦拭皮靴，波兰移民在此搭建木椽房屋，流亡的犹太人觅得商机发家致富。\n\n而这座灯火通明的城市背后暗藏着什么？由白俄侨民构建的远东法西斯主义巢穴，自成立以来就持续迫害着生机勃勃的犹太社区，直至四十年代中期俄罗斯法西斯党与日本盟友产生分歧方才收敛。他们始终暗地里筹划着重返故土、从布尔什维克手中“拯救俄罗斯”的疯狂计划。苏联崩溃终于使他们得偿所愿，可无论他们走向何方，这座城市都再不是他们的故园。\n\n或许，某些神秘的建筑中会传出令人毛骨悚然的异响——但那又何妨？酒馆里的狂欢乐曲、教堂的庄严钟声，足以淹没断续的呜咽。这座日新月异的城市，你可以尽情在霓虹灯下哭泣，也可以戴上假面投入时代的漩涡。"
 state_lore_initials.111: " HIR "
 state_lore_name.111: "廣島"
 state_lore_desc.111: "广岛是一个传统上具有浓厚军事色彩的城市，最初是强大的毛利家的都城。戊辰战争后，许多当地旧武士摇身一变，成为现代化日本帝国的军官和官僚。19世纪80年代的港口建设后，广岛建设了大量军工产业，成为了帝国陆军重要的后勤和补给基地。\n\n第二次世界大战结束后，广岛产业开始向第三产业转型，围绕着广岛县产业奖励馆建设的商业区是其产业繁荣的标志。广岛历史上的勇武激发了许多广岛市民的自豪，激励他们参加帝国陆军或海军来报效国家。广岛现在，且在可以预见到的未来，依然是一座军武之城。"
 state_lore_initials.112: " XNJ "
 state_lore_name.112: "新京 £GFX_xinjing_texticon"
 state_lore_desc.112: "尽管君主与其宫阙仍在诉说着千年的古老天命，新京自诞生之日起，便是天命终结的产物。当十九世纪曙光初现，商旅洪流冲开柳条边垒，这片苦寒之地最初以“长春”之名降生，寄托着住民对永恒暖春的祈盼。然而新京真正的历史脉络，始终与钢铁轨道同频共振。作为满铁线路的终点，这座城在火车的轰鸣中飞速膨胀权势，却在肌理中裂解出双生图景——铁路之城，与中国人之城。\n\n当关东军的马蹄席卷而来，日本规划师以崭新国度为布匹凭空剪裁时，新京注定成为他们的惊世之作。有别于满洲国其他城市浓烟蔽日的熔炉，这里的蓝图是图书馆、体育馆与绿地构成的乌托邦，其规模甚至远超东京。即便在今日，政府机关林立的中央大道两侧，御座慵懒俯视子民之处，昔年规划依然在结出硕果。但在日渐蔓延的烟霭深处，在本地人世代栖身的裂痕之间，另一个新京正在生长——那里每分每秒都有千百声呐喊，被湮灭在时代的褶皱里。"
 state_lore_initials.113: " KEI "
 state_lore_name.113: "京城"
 state_lore_desc.113: "也许有一天，“汉城”这个名字将被全人类所忘却，流失在历史长河中，永远不再被重拾。自从1910年《日韩合并条约》签署以来，曾经的大韩帝国就被大日本帝国占领至今，并被认为是日本不可分割的一部分——虽然当地居民并不对此表示认同。\n\n曾被预测的朝鲜文化的“迅速同化”并未发生，随着旭日帝国将其对朝鲜半岛的控制越收越紧，所带来的只有当地人的苦难而已。随着独立运动和游击武装席卷整个半岛，日本的反击措施也越来越强硬，一些叛军部队甚至撤离到了外满洲。\n\n也许只有京城这里避免了外面的混乱，日本化和工业化的目标也在某种程度上得到了实现。也许有一天，和平终会到来。也许，在汉江水平静无澜之时，“汉城”这个名字将依然存在于其人民心中。"
 state_lore_initials.114: " KUN "
 state_lore_name.114: "昆明"
 state_lore_desc.114: "云贵高原上，宁静祥和的崇山中，白雪皑皑的峻岭间，闪耀着一颗明珠，那是永远生机勃勃的昆明城，云南的代表城市，在其延展千年的历史中为各方来财所眷顾。\n\n昆明由当时尚属异族的南诏人民建立，从一开始就发挥着商贸中心的作用，在东部无数商路的熙熙攘攘中得享盛名。元朝时期，蒙古人为此地带来了中国的文化信仰，并将此城改造成为了区域内儒家伦理与佛教信仰的典范。\n\n欧洲船只堪堪抵达中国海岸之时，昆明首先出现在了法国视野中，并在此后受到了其财富权势之影响。时至今日，坐落于山地与湖泊之间的昆明城，已然光彩不再，最终于日本在亚洲大胜凯旋后，成了军阀政权的首府。无论如何，这座城市经受住了考验，其人民已经准备好迎接未来的一切。"
 state_lore_initials.115: " MUK "
 state_lore_name.115: "奉天 £GFX_mukden_texticon"
 state_lore_desc.115: "奉天城昔称沈阳，因满语“穆克敦”得名，汉译“天眷盛京”。这座满洲腹心的城市，曾见证张作霖麾下奉系军阀的崛起。多年后的1928年，随着大元帅蹊跷殒命，其子张学良通电南京易帜，北洋政权至此画上句点。\n\n但这些终成前尘旧事。据称张学良部破坏南满铁路，关东军遂以护路之名长驱直入。真相或许另有隐情，然历史终由胜者书写，世人已无从知晓。\n\n在满洲国治下，奉天承袭奉系遗产，稳居满洲工商冠冕——堪称日本的第二个大阪。然而当你漫步于奢华商肆，品味珍馐美馔时，却几乎不见本该拥有这座城的本地人踪影。"
 state_lore_initials.116: " NAG "
 state_lore_name.116: "長崎"
 state_lore_desc.116: "长崎位于九州岛的最西端，海对面的亚洲大陆曾在长崎历史上留下重要影响。长崎的地理位置使得她成为一个天生的贸易城市，在德川幕府时期，长崎更是唯一一个面向外国的通商口岸。今天，不同种族背景的劳工来到长崎海岸，他们是日本殖民帝国残酷的战利品，是日益增长的财阀所消耗的“资源”。三菱集团所有的造船厂监督建造的日本帝国海军，今日仍在旭日旗下统御太平洋。\n\n尽管如此，这座城市依然保持着她丰富的文化与宗教多样性，日本最大的教堂——浦上天主堂正是其突出标志。尽管受到压迫，长崎仍然保留了她独特的文化，而她的居民也将在圣母玛利亚越发警觉的注视下继续生活。"
 state_lore_initials.117: " NGY "
 state_lore_name.117: "名古屋"
 state_lore_desc.117: "在十六世纪迎来织田信长的降生后，名古屋就利用她位于京阪神都市圈与东京都市圈中间的地理位置，发展为日本第三大经济中心。\n\nA6M零式战斗机的制造商，三菱飞机公司的总部仍设在该市，而日本汽车工业的核心，丰田汽车总部也位于临近的丰田市。虽然满洲和广东一定程度上成为了新的工业中心，名古屋，日本重工业的心脏依然不知疲倦地工作着。"
 state_lore_initials.118: " OSA "
 state_lore_name.118: "大阪"
 state_lore_desc.118: "在淀川的入海口处，坐落着一个由摩天大楼和钢筋混凝土组成的巨大城市群，掌控着濑户内海——她就是大阪，日本本岛的第三大城市。尽管这里的氛围华丽而现代，但大阪的起源可以追溯到古坟时代，那时她被称为难波。\n\n这座城市位于沃野之间的山丘之上，具有重要的战略地位，因此也成为了日本近世主要的商业和制造业中心。许多现代的日本公司，例如松下电器和藤田组，都在大阪起家。战后，来自日本新征服领土的商品和原材料纷纷涌入大阪的港口，城市的财富也变得比以往任何时候都要更充裕。然而，如果人们愿意抛开剥削不谈、沐浴在霓虹灯光辉中的大阪仍是一个欢乐而又迷人的城市。"
 state_lore_initials.119: " SHA "
 state_lore_name.119: "上海"
 state_lore_desc.119: "夜上海，夜上海，你是个不夜城。作为金融、贸易、制造业与科研中心，上海熙熙攘攘的街道未曾冷清过。与世间万物一样，上海有着颇为卑微的起始，在唐宋时期不过是座不起眼的小镇，直到清朝时才急速成长，成为当地的贸易中心。\n\n随着清朝不断的衰弱，欧洲势力将这座城市如馅饼般瓜分。当象征着大战的炸弹呼啸着落在这座城市的建筑时，这座城市进行了顽强的抵抗。日军洗劫了外国欧洲人的租界，为上海带来了一个新时代时，这座城市见证了中国人的英勇抵抗。上海虽然表面上光鲜亮丽，但实际上却暗流涌动；犯罪、腐败、走私。日本人的统治并没有抹去历史的污点，上海永远被她的过去所束缚。"
 state_lore_initials.120: " TIA "
 state_lore_name.120: "天津"
 state_lore_desc.120: "天津，天子津渡，国际闻名的中心城市与港口，货物与产品在这里装载上船，输往共荣圈各地。在古代，天津在大运河的交汇中发展起来，并成为向现北京附近的元大都输送粮食的漕运枢纽。\n\n凭借其靠近全帝国行政中心的地位，天津引起了西方势力的不懈关注，随着清朝不断衰落及其对西方列强的持续让步，天津成为一个通商口岸。义和团拳民在这里战斗过，而短短三十多年后，日本人便在铁靴踢踏与炮弹轰鸣声中再次踏足这里。至于现在，天津再稳定不过了，这里是中国与共荣圈日常贸易中的又一个繁荣港口。"
 state_lore_initials.121: " URA "
 state_lore_name.121: "浦鹽"
 state_lore_desc.121: "有的城市如婴儿顺产，凭借丰沃水土、天险屏障，经百年积淀自然生长。符拉迪沃斯托克却似剖腹产儿，《瑷珲条约》的刀锋将其从满洲腹地剜出，成为沙俄远东舰队的战略支点。颇具宿命意味的是，如今她仿佛重回三位母亲的怀抱——名义上托付华人当局，未来或归顺满洲皇室，眼下实权却尽在日本之手。\n\n浦盐街头仍多见斯拉夫面孔，既有旧移民，亦有众多逃避战火的流亡者。尽管斑驳的大理石建筑与东正教堂外匆忙镶嵌着汉字霓虹灯牌，但整座城市依稀可见旧时容貌，为流离之人拼凑故园幻影。暗潮依然涌动——俄罗斯人避走码头之地，如今已成华人聚集之所；而朝鲜族群，则如夹缝中的扁舟，在日本与母国间进退维谷。\n\n这是座被往事禁锢的城市，难以融入日本或满洲。年复一年，她正渐渐淡出俄罗斯人的集体记忆。或许终有一日，她将成为独立的生命体，化作所有曾以远东为家者的永恒丰碑。"
 state_lore_initials.122: " KYO "
 state_lore_name.122: "京都"
 state_lore_desc.122: "旧都屹立千载，如磐石伫守岁月长河。尽管政治经济的光环渐次褪却，大阪、名古屋与东京已交织成冠绝亚洲的产业走廊，京都至今仍是和风雅韵与学术瑰宝的圣殿。\n\n帝国的臣民在日益都市化的街巷间，仍可于星罗棋布的数百座神社佛阁寻得片刻安宁；京都帝国大学的学子们以学术自矜，与东京帝大那些功利至上的同侪分庭抗礼。而廊檐深处，旧华族簪缨门第的茶席间，犹传诵着五百年前那场将千年古都卷入血雨腥风的应仁之乱。"
 state_lore_initials.123: " SAP "
 state_lore_name.123: "札幌"
 state_lore_desc.123: "1880年，作为明治政府殖民开发北海道工作的一部分，札幌被正式纳入日本版图。此时的她和其他诸岛迥然相异，象征着日本的现代边疆。\n\n从建立之初，札幌便是一座经过周详规划的城市，拥有日本城市中独一无二的网格状布局。城市围绕着大通公园向外拓展，将自然景观融入城市的核心地带。北海道的严冬使得札幌成为日本探索发展北极运动的焦点，并被选为1940年冬季奥运会的主办城市，但又因二战的爆发而被取消。不过，这座城市依然可能在不远的将来再获提名。"
 state_lore_initials.124: " CHA "
 state_lore_name.124: "长沙"
 state_lore_desc.124: "数万年前，长沙这片地区便已有人居住。多年来，这座城市见证了无数朝代的此起彼落、兴衰沉浮。晚清时，长沙因清政府于上海签订的《通商行船条约》而被迫对外开放——首先是对日本，之后是对各国列强。辛亥革命之后，长沙依然是一座商业发达而工业相对薄弱的城市。\n\n这里还是毛泽东的故乡，中国共产主义者曾经的大本营，直到国民党在1927年发动清洗，屠杀了上千名“共党”和“革命分子”为止。第二次中日战争期间，日本意识到，作为华南地区的交通要地，长沙具有重要的战略意义。日本对长沙不间断地发动袭击，大日本帝国陆军围绕这座城市发起了四次战役。由于1938年中国军队错误地对该城执行了焦土战术，再加上四次旷日持久、残酷无比的战役，当日军最终于1944年攻克长沙时，这座城市已是满目疮痍，面目全非。\n\n1947年，日本最终取得了战争的胜利，这座城市则需要数十年才能抹平战争带来的创伤。\n\n二十世纪六十年代的长沙和三四十年前那个长沙相比，已是物是人非。数十年来，长沙在各方势力和军队手中数次易手，如今这座城市终于归于一个政府的统治之下。战争的结束或许能为这座城市带来来之不易的和平，但第二次中日战争的伤痕却依然触目惊心。"
 state_lore_initials.125: " CHE "
 state_lore_name.125: "成都"
 state_lore_desc.125: "作为一座有着超过四千年历史的城市，四川首府成都一直以来都有着举足轻重的地位。虽然隔壁的重庆有时会更加引人注目，但毫无疑问的是，四川盆地中部的成都地位依旧不容忽视。成都在历朝历代都是四川——有时甚至是中央政府的中心。\n\n在第二次中日战争期间，重庆作为临时首都和军事总指挥部时，成都便成了诸多军事指挥部所在地和部队安全重整之处——前提是没有敌机来袭。战争期间，重庆和成都两座城市都遭受着日军的不间断空袭，对此中国空军也无力发起有效反击。当日军最终于1947年开进成都时，这座城市已化为一片废墟。\n\n由于成都人口众多，四川盆地资源丰富，成都在战后以惊人的速度恢复；又因为当日军离开这片土地，由改组国民政府接手进行统治时，成都距离南京有1600多公里的距离，反抗势力也如雨后春笋般发展起来，这些势力中有共产党、国民党、农民、土匪，和其他各类反抗中央政府，为谋求中国之自由而奋斗者；当然，也有些人仅因个人利益而投身反抗。尽管成都有着号令四川的能力，但这里各方势力鱼龙混杂，暂时还难成什么气候。"
 state_lore_initials.126: " CHO "
 state_lore_name.126: "重庆"
 state_lore_desc.126: "规模庞大、四通八达的重庆是中国西南的一头巨兽。这座具有至少三千年历史的城市总是处于中国政治的核心地带，多个政权都曾定都于此。中日战争期间，蒋介石的国民党政府便在此驻跸。作为盟军在中国和东南亚战场的指挥中心，重庆遭到了日军的猛烈空袭。尽管大部分百姓得以躲入防空洞避难，但城市的工业设施遭受重创，当日军在战争末期最终占领这里时，整座城市已所剩无几。\n\n当然，重庆人民不会甘愿接受满目疮痍的现状。坐拥四川盆地得天独厚的地理条件，重庆拥有充沛的复兴资源。凭借庞大人口优势，其重建速度远超中国多数城市。不过故事至此尚未讲完。\n\n远离南京中央政府的地理位置，使四川始终是改组国民政府的统治盲区。共产党游击队、国民党残部与不满的农民频繁起义，如同持续不断的火山喷发，让重庆积累的财富始终难以被中央政府顺利攫取。相较于山西等省份，南京当局更不愿将四川的丰富资源交给军阀势力。这种微妙的平衡局面，使得重庆虽坐拥金山银山，却始终无法完全释放其经济潜能。可以说，掌控重庆乃至整个四川盆地，是中国政府想要实现成功的必经之路。"
 state_lore_initials.127: " FUZ "
 state_lore_name.127: "福州"
 state_lore_desc.127: "坐拥闽江口的福州不仅是福建省会，更是华南地区承载七千年文明积淀的滨海要津。1911年武昌首义烽火燃起，这座古城亦如整个华南般迸发出澎湃的革命激情。1933年，十九路军异帜另立福建人民政府，然在中央政府经济封锁与邻近江西苏区袖手旁观中，这朵理想之花仅绽放月余便零落成泥。\n\n1937年抗战烽烟骤起，福州亦陷入战云笼罩。1938年5月初，厦门的陷落使福州门户洞开。闽江口外持续月余的海空激战，最终以日军胜利为休止符。\n\n但与其他城市不同，未遭大规模战火摧残的福州奇迹般在硝烟散尽后迅速复苏，如今俨然成为组国民政府在华南最举足轻重的通商口岸。"
 state_lore_initials.128: " JIN "
 state_lore_name.128: "济南"
 state_lore_desc.128: "中国被迫向世界敞开国门之际，济南承受了不平等条约的极大冲击。十九世纪末，德意志帝国以青岛租借地为跳板，将触角深入山东腹地。直到1919年，日本依“二十一条”全面接管德国在鲁势力范围——包括连接济南与海岸的胶济铁路命脉。待到抗日战争烽烟四起，这座战略要冲便成为日军首批重点打击目标。\n\n1937年凛冬，日本铁骑强渡黄河直扑济南。守军弃城撤退时奉命焚毁官署建筑及日领馆，权力真空导致全城陷入无政府乱局。六日内日军入城镇压，凭借德国与日本多年经营打下的工业基础，将济南化作支撑侵华战争机器的血汗工厂。\n\n随着日军撤离，改组国民政府的治理弊病暴露无遗。尽管坐拥工业重镇的优势，但贪腐横行、措施失当加之主政者颟顸无能，使得济南经济陷入长期停滞。"
 state_lore_initials.129: " TAI "
 state_lore_name.129: "太原"
 state_lore_desc.129: "太原于二十世纪初发展为一座制造业城市，同时她也从商贸中赚取利润。辛亥革命的混乱后，太原处于军阀阎锡山的控制之下。在阎锡山治下，太原工业蓬勃发展，太原兵工厂迅速成为中国最大的兵工厂之一。\n\n第二次中日战争期间，阎锡山和共产党将领朱德在太原组织起顽强抵抗，日军评价说：“没有哪个地方的中国人战斗得如此顽强。”1937年底，日军占领太原后，充分利用起太原的种种资源。太原城为日本陆军提供物资，从而支持着日军清剿共产党根据地的一次次行动。这段时间，山西山区的资源和材料都被统统喂进日本的战争机器，太原的发展陷入停滞。但由于其制造业的重要意义，太原依然是新政府打算着手控制的重要城市。\n\n然而，当地局势愈发混乱，对改组国民政府来说不是什么好事。由于无法在当地建立稳固的政权，南京政府与阎锡山结盟，将整个山西的实际控制权交给了他。阎锡山去世，傅作义继承了他的职务，统治山西，但他比阎锡山要保守得多。虽然太原依然是中国的制造业重镇，但其他城市都在不断发展，目光更是相对长远，相较之下，似乎不日即可赶超。"
 state_lore_initials.130: " XIA "
 state_lore_name.130: "西安"
 state_lore_desc.130: "迈向二十世纪的西安乃是革命的温床。1911年辛亥革命爆发，西安城内的起义部队攻屠满城，此后，两战之间的整个历史时期中，西安都一直由革命力量牢牢掌握。1936年，日本侵略者的铁蹄逐渐逼近。以西安事变为标志，中国内战正式宣告结束，第二次统一战线形成，共产党和国民党联合起来，对抗日本。\n\n在第二次中日战争的早期阶段，共产党八路军在晋陕山区坚持抗战，西安则遭受着猛烈的轰炸。虽然民国空军第五驱逐大队的飞行员英勇作战，挫败了日本空军的气焰，但日军最终还是击穿了中国军队围绕秦岭太行的防线。\n\n随着晋陕两地被移交给阎锡山和后来的傅作义，西安现在坐落在改组国民政府的边境附近。尽管远离南京和中央政府，西安依然是华北的重镇。"
 state_lore_initials.131: " WUH "
 state_lore_name.131: "武汉"
 state_lore_desc.131: "武汉虽作为一个行政实体，直到1927年国民党将汉阳、汉口、武昌三镇合并才正式诞生，但自公元前1500年先民在此筑城起，这片江汉交汇之地已承载了三千余载的文明薪火。\n\n1911年武昌首义的枪声在此划破长空，武汉由此被推上中国近现代政治舞台的中心。1937年国民政府西迁，武汉短暂担纲战时陪都，旋即成为日军在侵华战争中的重要战略目标。1938年旷日持久的武汉会战中，百万将士以血肉之躯铸就防线，终究难抵日军现代化装备的碾压，至深秋时节，江城终告陷落。\n\n战后满目疮痍的武汉被迫展开漫长重建，历经数年方恢复战前规模。如今这座浴火重生的城市，竟成动荡时局中少有的安稳绿洲。"
 state_lore_initials.132: " XUZ "
 state_lore_name.132: "徐州"
 state_lore_desc.132: "江苏重镇徐州，历来为兵家必争之地。辛亥风云中，张勋的军队迅速占领此城作为据点。北伐军剑指江苏时，国民党与盘踞此地的北洋军阀反复拉锯，最终于1927年末将其纳入掌控。对国民政府而言，扼守徐州就等于扼住了黄河流域的命脉。\n\n1938年烽火连天之际，日军突袭徐州令中国高层陷入恐慌。仓促组织的防线虽在局部战役中偶现胜绩，终究难挽败局。为掩护大军撤退，国府决开黄河花园口堤坝，滔天洪水瞬间吞噬徐州城廓，连带周遭十余县化为泽国。\n\n二十载沧桑过眼，这座浴火重生的城市再度闪耀于华北平原。但若断言中日战争创伤已然痊愈，无异于痴人说梦。在改组国民政府经济泥潭中挣扎的徐州，其重建之路步履维艰。"
 state_lore_initials.133: " ARI "
 state_lore_name.133: "阿里卡"
 state_lore_desc.133: "在阿里卡山巨大的断崖下，永春之城坚定而自由地屹立着。\n\n阿里卡距离最近的秘鲁城市塔克纳只有区区几公里，这并非是一个巧合。阿里卡是智利于南美的太平洋战争中攫取的又一个战利品。不过，这座城市优雅地适应了智利的统治，并成为了阿里卡和帕里纳科塔大区的首府。\n\n阿里卡还是距离内陆国家玻利维亚最近的港口，因而也是一个自由港，商品流通免除关税。这些便利条件促使阿里卡成为无可争议的地区工商业中心，并允许智利的北境军队警觉地看护阿塔卡马沙漠的红沙。"
 state_lore_initials.134: " VAL "
 state_lore_name.134: "瓦尔迪维亚"
 state_lore_desc.134: "瓦尔迪维亚仿佛遭受了天谴。就在几年前，山崩地裂，河水泛滥；就在几年前，无数父母子女溺死在烂泥里。1960年的瓦尔迪维亚被大地震彻底毁灭了。但瓦尔迪维亚依然坚定，就算重建是一个漫长（也许永远无法完成）的过程，但众所周知，蚁群还是回到了它们山上的家园。\n\n由于西班牙人在殖民时期修筑了大量的堡垒，瓦尔迪维亚被誉为新大陆上最难攻克的堡垒。也许正是物理上的强韧给予了瓦尔迪维亚人精神上的强韧。就算是在灾难和衰退时期，瓦尔迪维亚人依旧坚守着他们的信条——他们是最高贵，最忠诚的。"
 state_lore_initials.135: " MTT "
 state_lore_name.135: "蒙特港"
 state_lore_desc.135: "莱茵河离延基韦湖其实没有看起来那么遥远。1853年，一群逃离了1848年革命的德裔定居者来到了这里；而在数年之前，智利人就已经在此处建立了梅利普利——因此在蒙特港，智利文化和德国文化水乳交融。尽管蒙特港邻近相当活跃的卡尔布科火山，但这里依然是相当受欢迎的旅游胜地，近期竣工的埃尔特普阿尔机场也会进一步鼓励旅游业的发展。\n\n蒙特港既是延基韦省的省府，也是更高一级的湖区的首府，常常被称作通往智利巴塔哥尼亚的门户，同样也是通往奇洛埃岛唯一的交通枢纽，更加增强了这里作为事实上的智利南部中心的声誉。就算撇开这些不谈，蒙特港也是世界上少数几个能品尝到正宗的德国牛生（一种类似鞑靼牛肉的经典德裔智利人菜肴）还有拉格啤酒的地方。"
 state_lore_initials.136: " IQU "
 state_lore_name.136: "伊基克"
 state_lore_desc.136: "伊基克可以说是智利北部的缩影。它最初是秘鲁的一个硝石矿镇，在太平洋战争中被智利占领。光是把伊基克描述成一个长期贫困的地方，并不能描述它的全貌，事实上，对于过去的伊基克人来说，“贫困”这个词远远不能描绘出他们真实面貌的千分之一二。\n\n不止查尔斯·达尔文一个人这样描述小镇“非常缺乏水和柴火之类的日常必需品”。1907年圣玛丽亚学校大屠杀中有超过两千名硝石矿工及其家属因罢工被政府屠杀。不过，现在的伊基克人就大不一样了。自打伊基克成为智利仅有的两座自由港之一，并且接受了二十世纪初的大规模欧洲移民后，这座城市已经迎来了巨大发展。现在，伊基克是一个骄傲的城市，它以智利北部许多硝石矿镇共有的高贵方式战胜了动荡的过去。\n\n伊基克保税区是南美最大的自由港之一。现在，这座城市有博物馆和大学，甚至有传言说要成立一个职业足球俱乐部。尽管如今的伊基克是一座田园诗般的现代城市，但其野蛮而堕落的历史永远不会被遗忘。就如同整个智利北部共同的那样，鲜血和钠硝石就埋在阿塔卡马沙漠的红沙之下。"
 state_lore_initials.137: " COQ "
 state_lore_name.137: "科金博"
 state_lore_desc.137: "葡萄酒、黄金、水果和铜矿；它们共同构成了科金博这座城市的灵魂。作为大拉塞雷纳都市圈中的一个小老弟，科金博有着独特的历史以及抗争与自由的传统。\n\n起初，这里只是当地的一个小渔村，一代又一代的人们栖息于此，直到1550年，佩德罗·德·瓦尔迪维亚以西班牙王国之名夺取了这里。可即便是在那时，科金博人民独立的精神也无法被轻易地击倒——这里的天然良港固然有利于王室的宝藏舰队，但同样也能成为海盗和私掠者的乐园。在天然的海湾、无尽的金矿还有“自由放任”的文化氛围之中，科金博真正成为了海员们的巢穴；甚至直到现代，科金博联合足球俱乐部的绰号还依然是“海盗”。\n\n从各种意义上来说，这座城市都不能算是智利的文化或者经济中心，但这里的民众热情洋溢、快乐自由，这里的沙滩也洁白细腻、引人入胜。"
 state_lore_initials.138: " MER "
 state_lore_name.138: "梅里达"
 state_lore_desc.138: "取自玛雅古城特奥的石料由西班牙人的手筑成了梅里达城，尤卡坦半岛上最大的城市，也是墨西哥殖民历史的永久纪念。大概是一个名义上被征服者的伟绩所抹去民族的反抗，即使是现在，玛雅人在饮食、服装、甚至语言方面还深刻影响着这座城市的文化。\n\n波菲里奥政权时期开拓的黑纳金树种植业依然为梅里达带来源源不断的财富。这一行业催生了许多百万富翁，他们修建的精致豪宅是梅里达独特的景观。随着时间流逝，一些豪宅渐渐倒塌，但许多也屹立至今。美丽的自然景观和丰富的文化遗产吸引着全世界的游客，梅里达自豪地向游客夸耀着辉煌的尤卡坦半岛及其历史。"
 state_lore_initials.139: " ADJ "
 state_lore_name.139: "阿卡普尔科-德华雷斯"
 state_lore_desc.139: "阿卡普尔科-德华雷斯，简称作阿卡普尔科，坐落于太平洋沿岸。她是格雷罗州的首府，地势平坦与该州崎岖的岩石地貌迥然不同。这座城市的悠久历史可以追溯到1550年，到独立战争前已经成为了新西班牙地区最大的港口，非洲人、华人、菲律宾人与西班牙拓殖者共同于此劳作，组成了一个繁荣而多元的社区。但在独立战争期间，血腥的围城战见证了港口的毁灭。十九世纪墨西哥的兴衰更是记下了这座城市接下来一个半世纪颓靡的注脚。\n\n革命之风拂过又散去，阿卡普尔科依旧贫穷。直到二十世纪四十年代米格尔·阿莱曼上台，情况才终于有所变化，阿莱曼总统从这座城市辉煌的历史和沿海的区位优势中发掘出了属于她的投资机会。大量资本涌入阿卡普尔科，她仿佛重拾起殖民年代的辉煌。1954年国际机场落成，随之纷至沓来的美国日本游客好奇地环视着这座墨西哥冉冉升起的城市新星，更是加快了她人口增长和经济脉动的速度。历史长河浩荡流转进入二十世纪下半叶，这座城市的前景显露出灿烂的曙光。"
 state_lore_initials.140: " VIL "
 state_lore_name.140: "比亚埃尔莫萨"
 state_lore_desc.140: "比亚埃尔莫萨，在西班牙语中意为“美丽的村庄”，是塔瓦斯科州的首府。这座城市最初名为“卡莫纳别墅”，历史上共计历经八次更名。城市旧城中心满是融合了摩尔风格和哥特风格的殖民时期建筑。\n\n比亚埃尔莫萨曾多次被外国势力、革命者和叛军攻占。尽管如此，这座城市的自然资源依然吸引了大批投资者，成就了比亚埃尔莫萨经济快速增长的美名。糖、烟草、硬木、酒精和雪茄是这座城市的主要商品，但比亚埃尔莫萨的美丽和丰富的前殖民历史使其日益成为饱受好评的旅游景点。"
 state_lore_initials.141: " LEO "
 state_lore_name.141: "莱昂"
 state_lore_desc.141: "莱昂是瓜纳华托州人口最大的城市。虽然并不是该州首府，莱昂依然保有瓜纳华托州的市政席位。1863起，该城被法国人占领了三年，期间马克西米利安一世于1864年访问了莱昂。城市解放后，多人被政府军打伤。差不多一个世纪后，一群学生因抗议博尼法西奥·萨利纳斯当选被杀害。\n\n莱昂因为集中了墨西哥多数制鞋业，还被称作“墨西哥鞋业之都”。外国投资者对这座城市工业扩张的潜力非常感兴趣，但只有时间才能告诉我们，这颗巴吉奥的明珠能否做出比制革更大的成就。"
 state_lore_initials.142: " DUR "
 state_lore_name.142: "杜兰戈"
 state_lore_desc.142: "杜兰戈，正式名为杜兰戈州维多利亚，以墨西哥第一任总统瓜达卢佩·维多利亚的名字命名，是杜兰戈州的首府。1563年这座城市作为一个银矿小镇建立起来，后来却围绕着梅卡多山的大型铁矿发展起来。矿业的繁荣使得杜兰戈市中心有许多殖民时代的建筑。\n\n独立战争期间，许多领导人于1812年7月17日在杜兰戈被处决。1911年，杜兰戈加入了墨西哥革命，但1913年，叛乱分子占领并焚烧了杜兰戈，使这座城市陷入了长达数十年的萧条。过去十年，随着干旱和工业发展将农村移民推向杜兰戈，经济复苏才刚刚开始。"
 state_lore_initials.143: " CHH "
 state_lore_name.143: "奇瓦瓦"
 state_lore_desc.143: "奇瓦瓦州首府奇瓦瓦市有着三条突出的美德传统：勇气、忠诚和好客。奇瓦瓦市位于楚维斯卡河和萨克拉门托河的交汇处，是一个农业中心，大部分人对它的印象就是向美国麦当劳输送牛肉的交易站。\n\n奇瓦瓦尘土飞扬的市中心除了12英尺高的发光招牌一无所有。这却掩盖了这座城市十分复杂的历史。\n\n奇瓦瓦曾是贝尼托·华雷斯流亡政府的首都和潘乔·比利亚的北方农民义军司令部。米格尔·伊达尔戈被俘后也是在此处遭到处决。奇瓦瓦还是新西班牙新比斯开州的实际首府，奇瓦瓦这个名字也来自于远在西班牙征服之前的纳瓦特尔语，意为“两河之间”。这一时期，奇瓦瓦这一“沙漠里的所多玛”还是只有走投无路的人或者蠢货才会去的鬼地方。\n\n但波菲里奥·迪亚斯时代那银行家和商人的城市将会回归，随着美国带来的商业机会不断增加（边界以南有几家制造业工厂），它肯定会比任何人预期的更快回归。"
 state_lore_initials.144: " SLP "
 state_lore_name.144: "圣路易斯波托西"
 state_lore_desc.144: "常常被简写为“SLP”的圣路易斯波托西城是与其同名的圣路易斯波托西州的首府。这座城市以及这个州的名字有一半来源于法国国王、圣人路易九世，另一半则比较令人困惑，它取自玻利维亚城市波托西，其中的逻辑在于希望邻近的矿区也能像玻利维亚的波托西附近一样深邃而储量丰富。\n\n这座城市位于墨西哥城、瓜达拉哈拉和蒙特雷形成的三角地带的正中心，一些关键的墨西哥制造业部门也坐落于此，因此该城的经济地位十分重要，生活水平也相对较高。历史上，由于当地原住民武力抵抗西班牙人的浪潮，这一地区也曾经被称为“大刺梨”。尽管征服者和传教士的时代已然远去，但圣路易斯波托西的民众依旧为他们的城市而骄傲。一个建在山脉连绵的墨西哥高原之巅的城市能被誉为“花园之城”，不得不说是一个奇迹。"
 state_lore_initials.145: " PBL "
 state_lore_name.145: "普埃布拉"
 state_lore_desc.145: "普埃布拉是普埃布拉自由主权州的首府，正式名称为埃罗伊卡普埃布拉-德萨拉戈萨。这座城市是人类现存至今最古老的规划市镇之一。普埃布拉位于从墨西哥城通往重要的大西洋港口韦拉克鲁斯的道路上，由于其悠久的历史和多样的建筑，它自称为“美洲的圣髑盒”。墨西哥巴洛克风格的主教座堂坐落在现代主义的伊比利亚美洲大学的校园里，证明了这一称号的真实不虚。\n\n就算是那些不太熟悉墨西哥历史的人可能也会知道1862年5月5日，600名墨西哥士兵在普埃布拉击败了6500人法兰西第二帝国精锐部队。这一日期成为了普埃布拉和临近美洲人庆祝的五月五日节。\n\n在经济方面，普埃布拉像许多墨西哥大城市一样经历了大规模的制造业繁荣，尤其是福特汽车公司最近在该市开设了美国外最大的福特工厂。这座墨西哥的第四大城市似乎将会永远繁荣下去。"
 state_lore_initials.146: " HER "
 state_lore_name.146: "埃莫西约"
 state_lore_desc.146: "埃莫西约是索诺拉州最大的城市，也是州首府。埃莫西约最初是三个独立的村庄，直到1828年，才颁布了将它们合起来建立一座城市的法令，并以一位将军的名字命名。\n\n在墨西哥革命中，忠于潘乔·比利亚的军队被逐出了这座城市。在1913年弗朗西斯科·马德罗遇刺后，贝努斯蒂亚诺·卡兰萨在埃莫西约开启了他的宪政运动，这也让该城被誉为“国家革命之都”。在经济上，埃莫西约与墨西哥乃至世界上的其他地方仍然相当隔绝，但这里邻近太平洋和美墨边境的地理位置引起了美国以及日本投资者的兴趣，他们很有可能会带领这座城市走进现代。"
 state_lore_initials.147: " REY "
 state_lore_name.147: "雷克雅未克"
 state_lore_desc.147: "冰雪之城雷克雅未克在20世纪下半叶开始时，经历了其最有意思的发展时期。由于美国在这里投入了大量军力，这个曾经不发达的城市一下子变成了这个寒冷岛屿上的一个繁华都市。\n\n然而，占领部队带来了战争机器，军事基地、空军基地和海军设施点缀着冰岛的地图，为的是能让美国人在受到威胁的时候打击欧洲，这在雷克雅未克也有很大的体现。也许有一天，在遥远的未来，冰岛人民将真正彻底获得自由。"
 state_lore_initials.148: " MVI "
 state_lore_name.148: "蒙得维的亚"
 state_lore_desc.148: "蒙得维的亚是一座活力四射的城市。这座城市于1724年在西班牙和葡萄牙帝国两大殖民巨头，围绕南美洲普拉塔地区的冲突与博弈中诞生，那是一场没有硝烟的战争。乌拉圭的国土横跨蜿蜒漫长的拉普拉塔河，如今再一次成为了国与国之间勾心斗角、尔虞我诈的风暴中心。\n\n如今，乌拉圭再一次处于两个大国的夹缝之间。一边是南锥体地区准备大展宏图的阿根廷共和国，另一边则是老牌地区强国巴西合众国，蒙得维的亚就这么孑然立于二者之间，誓要在两国惊天动地的斗争中牢牢守住乌拉圭的和平安定。当然，蒙得维的亚还不止于此；这座城市同样也是世界间谍之都。来自五湖四海的特工在颠覆地区大国的斗争中正试图从颠覆地区政权中谋取利益。无论接下来将发生什么，蒙得维的亚都将成为南美洲一切重大事件的中心。"
 state_lore_initials.149: " LIM "
 state_lore_name.149: "利马"
 state_lore_desc.149: "作为西班牙殖民之前印加帝国的统治中心，利马如今也卷入了日美冷战的漩涡之中。在南美洲大部分仍未被染指的土地上，利马是对华盛顿和东京而言都十分重要的地缘政治桥头堡。\n\n日本财阀商人频繁出入于利马的圣伊西德罗中央商务区，形形色色的人物每天在美国大使馆进进出出。利马乃至整个秘鲁地区最终将鹿死谁手呢？目前这个问题的答案依然是个未知数。"
 state_lore_initials.150: " ASN "
 state_lore_name.150: "亚松森"
 state_lore_desc.150: "始建于1537年的亚松森曾一度是拉普拉塔平原最重要的城市，也是西班牙在这一地区的权力中心。它一度被人们称作“城市之母”——不过，那都是过去的事情了。\n\n如今的巴拉圭虽是一个封闭的内陆国家，亚松森依然十分重要，因为它是巴拉圭唯一的大型城市，其GDP、工业和文化产出占全国总量中相当大的比例。如果说这座城市居于大陆中心的位置有什么意义的话，那就是亚松森可以有效地影响该地区的诸多事务。"
 state_lore_initials.151: " LPA "
 state_lore_name.151: "拉巴斯"
 state_lore_desc.151: "拉巴斯圣母城这座城市证明，即便是在最极端的条件下，生命依然也能蓬勃发展。它坐落于海拔3600米的安第斯山脉的世界之巅，是地球上海拔最高的首都，没有之一。\n\n拉巴斯由征服者阿隆索·德·门多萨于1548年建立，一开始并不是征服者的落脚地。在此之前，它是南美洲有史以来最伟大帝国——印加帝国的重要贸易中心。它连接着南安第斯山脉和阿根廷宽阔的草场，以及北安第斯山脉和哥伦比亚郁郁葱葱的热带雨林，是延伸至整个南美大陆的重要脊柱。\n\n在征服印加人之后，西班牙皇室的许多人认为拉巴斯无关紧要，在其巨大的殖民帝国中只不过是个落后且不值一提的蕞尔小城。然而事实证明，他们大错特错。拉巴斯的原住民两次围攻该城，联合起其他地区的南美人民一起拿起武器反对西班牙，摆脱了他们的统治。现在，拉巴斯，一座闪亮的城市，亭亭伫立于山巅之上，准备好迎接一切狂风骤雨的到来。"
 state_lore_initials.152: " BOG "
 state_lore_name.152: "波哥大"
 state_lore_desc.152: "[Statelore_Get_bogata_desc]"
 state_lore_desc.152_normal: "波哥大的原住民历史最早可以追溯到一万多年前，还有过穆伊斯卡联盟这样辉煌的过往，不过现在的波哥大城依然是在十六世纪西班牙殖民者建立的圣菲市的基础上发展而来。\n\n由于定居率和地区影响力不断上升，西班牙人于1717年宣布波哥大为新格拉纳达总督区的首府。十九世纪初，波哥大成为共和革命的中心。西班牙被拿破仑军队击败后，新格林纳达王国的最高军政府接管了该城。在拉美独立战争期间，这座城市在保皇党和革命党之间屡次易手，但最终为了纪念穆伊斯卡人而更名波哥大，新生的哥伦比亚国家也将此城定为首都。\n\n自独立一个世纪多以来，波哥大目睹了许多动荡和变乱。这座城市仍在从1948年波哥大暴动和随后席卷了整个哥伦比亚的内战中恢复过来。然而，这座城市的居民仍然对它抱有信心，“南美雅典”也将继续前进。"
 state_lore_desc.152_COL: "波哥大的原住民历史最早可以追溯到一万多年前，还有过穆伊斯卡联盟这样辉煌的过往，不过现在的波哥大城是在十六世纪西班牙殖民者建立的圣菲市的基础上发展而来。\n\n由于定居率和地区影响力不断上升，西班牙人于1717年宣布波哥大为新格拉纳达总督区的首府。十九世纪初，波哥大成为共和革命的中心。西班牙被拿破仑军队击败后，新格拉纳达王国的最高军政府接管了该城。在拉美独立战争期间，这座城市在保皇党和革命党之间屡次易手，但最终为了纪念穆伊斯卡人而更名波哥大，新生的哥伦比亚国家也将此城定为首都。\n\n自独立一个世纪多以来，“南美雅典”已经牢牢确立了自己作为哥伦比亚重要文化中心的地位。打败了三个超级大国的傀儡之后，哥伦比亚共和国宣布，哥伦比亚可以在没有境外势力干预的情况下自由规划自己的未来。哥伦比亚鼓起勇气，独自开辟了一片新天地，而波哥大这颗跳动的心脏，会助其扶摇直上。"
 state_lore_desc.152_CLL: "波哥大的原住民历史最早可以追溯到一万多年前，还有过穆伊斯卡联盟这样辉煌的过往，不过现在的波哥大城依然是在十六世纪西班牙殖民者建立的圣菲市的基础上发展而来。\n\n由于定居率和地区影响力不断上升，西班牙人于1717年宣布波哥大为新格拉纳达总督区的首府。十九世纪初，波哥大成为共和革命的中心。西班牙被拿破仑军队击败后，新格林纳达王国的最高军政府接管了该城。在拉美独立战争期间，这座城市在保皇党和革命党之间屡次易手，但最终为了纪念穆伊斯卡人而更名波哥大，新生的哥伦比亚国家也将此城定为首都。\n\n自独立一个世纪多以来，“南美雅典”再次成为哥伦比亚自由与共和的堡垒。随着哥伦比亚革命联盟在暴力时期笑到了最后，民主复兴和左翼理想主义成为了波哥大的主流思潮，而美国资金的涌入为这座城市的重建工作增添了一份力。哥伦比亚在OFN的簇拥下开辟了一片新天地，准备将民主价值观、人权观念，尤其是豪尔赫·盖坦引以为豪的遗产根植于所有哥伦比亚人的内心。"
 state_lore_desc.152_CLC: "波哥大的原住民历史最早可以追溯到一万多年前，还有过穆伊斯卡联盟这样辉煌的过往，不过现在的波哥大城是在十六世纪西班牙殖民者建立的圣菲市的基础上发展而来。\n\n由于定居率和地区影响力不断上升，西班牙人于1717年宣布波哥大为新格拉纳达总督区的首府。十九世纪初，波哥大成为共和革命的中心。西班牙被拿破仑军队击败后，新格林纳达王国的最高军政府接管了该城。在拉美独立战争期间，这座城市在保皇党和革命党之间屡次易手，但最终为了纪念穆伊斯卡人而更名波哥大，新生的哥伦比亚国家也将此城定为首都。\n\n自独立一个世纪多以来，“南美雅典”已沦为极权主义的玩物。当阿文达尼奥和他的黑衫军进军波哥大时，这座曾经风光无限的城市现在满是恐惧与不安的情绪。雇佣军、黑衫军和其他极右翼极端分子走上街头，恐吓持不同政见者，并在全国推行法西斯新秩序。哥伦比亚，或者更确切地说，新格拉纳达，在日本的支持下开辟了一片新天地，准备向新格拉纳达乃至整个世界传播法西斯主义和领袖的理想。"
 state_lore_desc.152_CLD: "波哥大的原住民历史最早可以追溯到一万多年前，还有过穆伊斯卡联盟这样辉煌的过往，不过现在的波哥大城是在十六世纪西班牙殖民者建立的圣菲市的基础上发展而来。\n\n由于定居率和地区影响力不断上升，西班牙人于1717年宣布波哥大为新格拉纳达总督区的首府。十九世纪初，波哥大成为共和革命的中心。西班牙被拿破仑军队击败后，新格林纳达王国的最高军政府接管了该城。在拉美独立战争期间，这座城市在保皇党和革命党之间屡次易手，但最终为了纪念穆伊斯卡人而更名波哥大，新生的哥伦比亚国家也将此城定为首都。\n\n自独立一个世纪多以来，“南美雅典”已不复存在，取而代之的是“南美斯巴达”。随着第二爱国军在暴力时期笑到了最后，雅利安-克里奥尔已位居高堂之上，城内外挂满了印着帝国鹰和万字符的旗帜。波哥大曾是自由与共和的堡垒，现在却被民族社会主义荼毒。哥伦比亚与它的德国兄弟一道开辟了一片新天地，准备传播雅利安霸权和斯巴达理念。民族社会主义的雄鹰展翅翱翔，盘旋在即将成为猎物的劣等人之上。"
 state_lore_initials.153: " CRC "
 state_lore_name.153: "加拉加斯"
 state_lore_desc.153: "1567年，西班牙殖民者在小威尼斯远征队官员的帮助下建立了加拉加斯圣地亚哥-德莱昂，而在此之前，加拉加斯谷地曾经是当地原住民马里切的家园。\n\n十年后的1577年，这里成为了帝国委内瑞拉省的首府，因此在西班牙殖民时代里享有着作为贸易、文化以及政治中心的影响力。然而讽刺的是，这座城市也是西班牙帝国最激烈的反抗者之一——西蒙·玻利瓦尔的故乡。在大哥伦比亚崩溃后，这里则成为了独立的委内瑞拉共和国的首都。\n\n尽管不像邻国的首都那样宏伟，加拉加斯也依然在永恒的春日中昂首屹立。石油生产正持续不断地让国家富裕起来，加拉加斯也必将借此成为二十世纪下半叶最伟大的拉美城市之一。"
 state_lore_initials.154: " PAN "
 state_lore_name.154: "巴拿马城"
 state_lore_desc.154: "也许对于缺乏了解的外国人来说，巴拿马这个国家就是围绕着那条将全国一分为二的巴拿马运河而建的。但对于巴拿马人来说，在太平洋入口岸的巴拿马城才真正记录了这个国家成功和失败的过往。\n\n巴拿马城紧邻太平洋，是巴拿马的第一大城市。作为欧洲人在太平洋地区的第一个定居点，它的历史与整个巴拿马有着不可分割的联系。该城的建筑从西班牙殖民地风格的楼宇到安第斯山脉的联排别墅应有尽有，充分彰显着巴拿马的多元文化。巴拿马城内贫富差距极大，令人想起美国人为修建运河而将一些地区据为己有，极具讽刺意味的现实在国内外都表露无疑。窗外的一切并不尽如人意，但无论如何，这就是巴拿马的现实。"
 state_lore_initials.155: " PA-C "
 state_lore_name.155: "巴拿马运河"
 state_lore_desc.155: "一个人，一项计划，一条运河。美国所有学龄儿童对这句描述巴拿马运河竣工的口号都耳熟能详。但大多数人都不知道，为了保护巴拿马运河，美国到底花费了多少人力，经历了多少年紧张规划。随着大日本帝国在波涛汹涌的太平洋获得了最终的胜利后，美国对地球最大一片海洋仅剩的一点控制，就必须得变得坚不可摧。作为美利坚帝国的大动脉，巴拿马运河不仅是连接东西方的关键纽带，它还是整个西半球最关键的战略要地。\n\n如果哪天又爆发了太平洋战争，人们很难不认为日本不会考虑巴拿马。于是，从无数防空武器构成的精致防御网，到无数准备消灭任何登陆部队的混凝土要塞，世上很难能找到另一块比这条丛林包围的领土还要武装到牙齿的地方。"
 state_lore_initials.156: " HAV "
 state_lore_name.156: "哈瓦那"
 state_lore_desc.156: "哈瓦那，征服者和奴隶贩子眼中的珍宝，更是全加勒比最伟大的岛屿上最伟大的城市。\n\n哈瓦那拥有无数旧式西班牙别墅和主教座堂，仿佛让人置身于新世界的中世纪伊比利亚。这座城市在暴君、总统、独裁者手中几经流转，但现在，哈瓦那是加勒比革命热情的中心。"
 state_lore_initials.157: "[Statelore_Get_santo_domingo_initials]"
 state_lore_initials.157_tru: " TRJ "
 state_lore_initials.157_normal: " SDQ "
 state_lore_name.157: "[Statelore_Get_santo_domingo_name]"
 state_lore_name.157_tru: "特鲁希略城"
 state_lore_name.157_normal: "圣多明各"
 state_lore_desc.157: "作为过去欧洲殖民者在新大陆的定居点之一，圣多明各历经了历史的风吹雨打，一直挺立到了今天。如今，这座城市被重新命名为特鲁希略，以纪念多米尼加的总统拉斐尔·特鲁希略，但许多城内人和外人都还继续用着“圣多明各”这个名字。对一些人来说，这样做无疑是在谴责特鲁希略的独裁统治；而另一些人则认为，这样一座如此非凡意义的城市就这样草草改名，这种做法未免太过俗套了。\n\n不过，无论叫什么名字，圣多明各都是多米尼加共和国的文化、经济和政治中心。不论是在和平时期还是危难之中，这一点都从未改变。"
 state_lore_initials.158: " PaP "
 state_lore_name.158: "太子港"
 state_lore_desc.158: "尽管该城自欧洲人首次到来时就一直具有重大影响力，太子港于1770年才成为法国殖民地圣多明各的首都。\n\n海地脱离法国独立后，太子港仍然是海地社会的中心，同时是海地南部共和国和统一后全国的首都所在。这座城市在许多方面至今仍受海地革命以来欧洲列强的制裁，以及一战期间美国军事占领的影响。尽管如此，太子港依然永远是海地人民温暖的家园。"
 state_lore_initials.159: " KIN "
 state_lore_name.159: "金斯敦"
 state_lore_desc.159: "1693年，金斯敦城从皇家港的废墟上建立起来，其本身就是牙买加和当地人民的坚韧与奉献精神的象征。\n\n到了18世纪末，该城已成为岛上最重要的港口，到了1872年，牙买加所有的政府职能都转移到了该市。在20世纪，它是加勒比地区最大的城市之一，也是自由国家组织的一个重要前哨。"
 state_lore_initials.160: " COP "
 state_lore_name.160: "科皮亚波"
 state_lore_desc.160: "时间定格在1850年。灼热的蒸汽从钢铁巨兽的咆哮中喷涌，裹挟着永恒的气息升腾。它拂过台下仰首的铜矿工、士兵与实业家们，掠过胡安·戈多伊的青铜像——这位发现了科皮亚波最深银矿的传奇人物雕像至今矗立，又缱绻在科皮亚波主教座堂的尖顶上，垂暮神父正在此处静默体悟圣灵。蒸汽越过苍翠农田与科皮亚波河清波，若你攀着蒸汽之梯直抵苍穹之巅，会看见阿塔卡玛嶙峋峭壁间一道蜿蜒的生命线。随着汽笛轰鸣，钢铁巨兽开始震颤前行。南美洲第一条铁路——科皮亚波-卡尔德拉铁路正式开通，这座沙漠之城从此改写了命运。\n\n作为智利北部的明珠，富饶的矿业重镇科皮亚波集工业、文化与政经枢纽于一身。地下银铜矿脉纵横千年，地表上则深埋着印第安古冢（部分遗骸可追溯至万年前）。这里的居民达观、温厚且精诚协作，商业繁荣催生着城市新貌。从建城之初的“科皮亚波丛林圣弗朗西斯科”之名，到如今依然如沙漠绿洲般鲜活，她始终是阿塔卡玛的灵魂。"
 state_lore_initials.161: " TAL "
 state_lore_name.161: "塔尔卡"
 state_lore_desc.161: "塔尔卡或许不是智利的行政中心、文化中心或经济中心，但它可能是智利人民的精神家园。塔尔卡始建于1692年，并于1742年重建，或许在1818年贝尔纳多·奥伊金斯在智利中央山谷签署从西班牙独立的正式声明时可以算作第三次建立。这座城市是智利民族主义的发源地。\n\n塔尔基诺人有一句谚语：“塔尔卡、巴黎和伦敦”。他们为自己的过去感到自豪，但同样对自己的现状感到满意，并对未来充满信心。这座城市以葡萄酒和小麦而闻名，但新兴的制造业经济也正在快速发展，这座城市必将冲破过去的桎梏，成为一座更加伟大的城市。随着时间的推移，“塔尔卡、巴黎和伦敦”将从一句自嘲式的玩笑话变成一种自豪的态度。至少，眼中有星辰大海的塔尔基诺人坚信着这一点。"
 state_lore_initials.162: " BAI "
 state_lore_name.162: "布宜诺斯艾利斯"
 state_lore_desc.162: "在美利坚合众国的国民神话中，“山巅之城”被用来指代美国。在美国人的民间传说中，它代表着人们对和平与理性终将遍布人间的真诚希望。现在，这座城市似乎多了一个孪生兄弟。\n\n布宜诺斯艾利斯，或“晴空之城”。这座城市由胡安·德加雷于1580年6月11日建立。那时，布宜诺斯艾利斯还是一座灯塔，指引着无数人抵达白色的沙滩。这座城市也曾遭遇过袭击、摧毁、烧毁或封锁，历经过无数次的考验和磨难。然而，它仍坚定不移地挺立于此。“南美洲的女王”可以长久地统治四方，还有着一个关键的因素：\n\n在每一个角落，这座城市都自豪地展示着它的光彩。德国人、英国人、法国人、西班牙人——当然还有意大利人，这些人构成了这座城市最大的移民群体，他们都在这座美丽的城市扎下了根。阿根廷的命运可能会随着海上的浪潮而迭起兴衰，但形形色色的人都愿意聚集在同一面旗帜之下。原因为何？因为布宜诺斯艾利斯是一座山巅之上闪闪发光、充满希望的城市。朝气蓬勃的希望胜过世间万物。"
 state_lore_initials.163: " AVE "
 state_lore_name.163: "阿韦亚内达"
 state_lore_desc.163: "阿韦亚内达市最初被称为“南巴拉卡斯”，后来以前总统尼古拉斯·阿韦利亚内达的名字重新命名，是阿根廷的一个主要铁路和工业中心。作为大布宜诺斯艾利斯的一部分，阿韦亚内达拥有大量的码头设施，使阿根廷的出口产品能够被运往世界各地。\n\n市内的工人日夜在食品加工厂、纺织厂、炼油厂和锻造厂工作，使该市成为阿根廷经济的重要组成部分。阿韦亚内达的阿根廷中央农产品市场曾经是世界上最大的批发商场，但在过去十年中，它的急剧衰落使其不可避免地遭到关闭。若把布宜诺斯艾利斯称为山巅之城，那阿韦亚内达应该被称作梦想之城。"
 state_lore_initials.164: " MdP "
 state_lore_name.164: "马德普拉塔"
 state_lore_desc.164: "马德普拉塔是阿根廷最重要的旅游中心之一。最初在1857年建立时，马德普拉塔不过是一个咸肉工厂，但商人帕特里西奥·佩拉尔塔·拉莫斯通过带来一系列新的商业事务和就业机会，让该镇重新焕发了活力。\n\n从1890年到1910年，马德普拉塔成为多个酒店的所在地，吸引了布宜诺斯艾利斯的精英人士。随着庇隆主义运动的兴起和庇隆福利政策的实施，该市经历了一场大规模的旅游热潮。成千上万的外国人从国外带来了丰厚的财富，这座城市成为阿根廷日益壮大的中产阶级的象征。只要阿根廷的经济依旧繁荣，马德普拉塔的海滩便会一直被五月的太阳所祝福。"
 state_lore_initials.165: " LPl "
 state_lore_name.165: "拉普拉塔"
 state_lore_desc.165: "拉普拉塔在1952年至1955年期间曾短暂地改名为伊娃·庇隆市。在1880年阿根廷联邦化后，该市成为了布宜诺斯艾利斯州的首府。拉普拉塔是一个以卫生为中心的规划城市，其城市中心严格排列成网格状。穿过城市街区的道路彼此穿插，形成了完美的图案，成千上万的树木在城市街道上排列，如同一柄绿色的保护伞遮挡住了天空。\n\n拉普拉塔是阿根廷的重要文化和旅游中心，有几十个艺术中心、剧院、博物馆、图书馆和电影院。拉普拉塔被世界博览会称为“未来之城”。随着艺术的繁荣兴盛，拉普拉塔的未来一片光明。"
 state_lore_initials.166: " CRV "
 state_lore_name.166: "里瓦达维亚海军准将城"
 state_lore_desc.166: "里瓦达维亚海军准将城（简称准将城）既是南纬45度线最大的城市，也是新成立的丘布特省中最大的城市。这座城市于1901年根据政令建立，并以阿根廷首任总统贝尔纳迪诺·里瓦达维亚的孙子命名。\n\n第二次布尔战争后，阿非利卡人大量移居到这里。他们最初打算寻找安全的水源，结果却发现了石油。石油的发现加速了这座城市的发展，目前这座城市关联着阿根廷经济的命脉。\n\n尽管气候寒冷，寒风刺骨，工人们还是涌向这座城市，希望凭着黑金发家致富。这座“石油之都”既点燃了阿根廷人的梦想，但也有可能陷入一片火海。"
 state_lore_initials.167: " SFE "
 state_lore_name.167: "圣菲"
 state_lore_desc.167: "圣菲-德拉韦拉克鲁斯（通常简称为圣菲）是圣菲省的首府，也是首位美洲出身的总督埃尔南达里亚斯的安息之地。圣菲是一个重要的商业和运输中心，服务着周边富饶肥沃的农田。\n\n谷物、植物油还有各种肉类在这里通过铁路运往布宜诺斯艾利斯和阿韦亚内达进行加工。围绕着这里的农村景观，旅游业也应运而生，吸引着城里人来到这里打猎钓鱼、度假放松。尽管圣菲的面貌相当自然，但在过去十五年间，曾有两次制宪会议于此召开，而假如阿根廷再次出现黑暗的转折，这里还可能会召开第三次制宪会议。"
 state_lore_initials.168: " ROS "
 state_lore_name.168: "罗萨里奥"
 state_lore_desc.168: "罗萨里奥是圣菲省的最大城市，也是阿根廷最大的非首府城市。罗萨里奥被建立在巴拉那河的西岸，是阿根廷工业走廊的中心。尽管在内战中遭受了巨大的损失，但罗萨里奥的伟大征途已是命中注定。罗萨里奥的铁路和港口是圣菲和布宜诺斯艾利斯之间的一个重要枢纽。\n\n它拥有相当大小的化学工业和期货交易所，生产总值仅次于布宜诺斯艾利斯。作为一个文化中心，拥有着众多剧院、博物馆和电影院的罗萨里奥可以与拉普拉塔相媲美。罗萨里奥是阿根廷真正的“中心地带”，这个称号是其他城市永远无法窃取的。"
 state_lore_initials.169: " COR "
 state_lore_name.169: "科尔多瓦"
 state_lore_desc.169: "科尔多瓦是科尔多瓦省的首府，也是阿根廷的第二大城市。科尔多瓦以西班牙的同名城市命名，到处都是殖民时代留下的建筑，而最引人注目的则是该市三个多世纪以来一直保存完好的耶稣会街区。与其保存完好的过去相比，科尔多瓦还是阿根廷的重工业和技术中心。汽车、飞机和铁路工厂遍布全城，还有阿根廷城市常见的农产品加工厂。\n\n科尔多瓦同时也被称为“夜生活之城”，因为它有着丰富的音乐、葡萄酒和奶酪文化。如果说有哪个城市能让阿根廷勇敢地迈向未来，那就是科尔多瓦。"
 state_lore_initials.170: " USH "
 state_lore_name.170: "乌斯怀亚"
 state_lore_desc.170: "在巴塔哥尼亚开阔的干燥平原上，矗立着一块小小的木牌。它的高度不超过7英尺，上面印着一句标语：“欢迎来到乌斯怀亚，通往南极的大门”。然而，这句标语在本地人心中还有第二个版本：“欢迎来到乌斯怀亚，欢迎来到世界的尽头”。作为雅加民族世代居住的家园，千百年来，乌斯怀亚不过是南锥体底部的一片弹丸之地。这里冬季严寒、夏季潮湿，生存条件恶劣。然而时至今日，它却被赋予了特殊的意义。\n\n一个昔日的渔村所难承载的意义。乌斯怀亚成为了阿根廷的一颗棋子，加入到同智利间一场漫长且复杂的对弈当中。两国都渴望得到“世界最南端城市”这一诱人的称号。这背后不仅是强大的虚荣心作祟，更潜藏着无比巨大的利益。胜者将控制整个麦哲伦海峡，进而主宰围绕该海峡的所有贸易——即便是在巴拿马运河开通后，许多货轮和军舰仍会从此地通行。但无论谁是赢家，都不会影响乌斯怀亚的居民像过去一万年间那样，继续生活在世界的尽头。"
 state_lore_initials.171: " BKK "
 state_lore_name.171: "曼谷"
 state_lore_desc.171: "帝释天旨述，工巧天神筑，天子御驻，极宫浮出，九玉乐都，宏伟盛处，金汤天固，玉佛永属之天神京都——这是泰国人给他们的首都曼谷所起的名字。\n\n曼谷城坐落于湄南河的河口，不论是在象征意义还是实际意义上都是国家的中心，也是泰国政治与商业的中心，还是大元帅和总统本人的府邸所在。除了美丽的河畔景点外，游客们还经常惊叹于阅兵游行的盛况和现役军人的英姿之中。\n\n与共荣圈的其他地区相比，曼谷市民可以称得上是高枕无忧，因为他们知道，由于泰国在东京政治和军事联盟中的独立地位，日本人绝不会不请自来，惹出什么事端，这也使得这座城市的人口和财富得以持续增长。"
 state_lore_initials.172: " HNO "
 state_lore_name.172: "河内"
 state_lore_desc.172: "从表面上看，河内和中南半岛上的其他城市并没有什么两样：工业化驱动的快速城市化，在金碧辉煌的法属殖民地时期建筑旁快速出现的大片贫民窟，以及被日本财阀完全把控的经济。然而，很少有人知道，河内才是整个东亚最大的火药桶。\n\n在日本对法属中南半岛展开入侵时，河内成为了越盟运动的发源地，并且河内乡间还爆发了一场持续数年的抵抗运动，但最终他们还是眼睁睁地看着日军占领了整座城市。如今，河内表面上波澜不惊，但实际上整座城市的街道上都有大日本帝国陆军日夜不停地巡逻，而越盟势力也做好了殊死一搏的准备。终有一日，河内将向世界宣告，越南究竟会鹿死谁手。"
 state_lore_initials.173: " MAY "
 state_lore_name.173: "马尼拉"
 state_lore_desc.173: "每个国度都有一颗跳动的心脏，维系着民族生命的律动。或许没有哪座城市能比马尼拉更淋漓尽致地诠释这种重要性——自西班牙统治群岛以来，这座“东方明珠”便以独特的建筑肌理与殖民历史交织出举世无双的画卷。\n\n漫步城中，美式混凝土公寓楼与西班牙古堡比邻而立，庄园别墅的雕花拱廊映照着现代建筑的玻璃幕墙。这般时空交错的马赛克拼图，让整座城市成为一扇既能窥见往昔荣光、又氤氲着摩登气息的橱窗。\n\n若细察这些景致，还能发现上一场战争遗留的伤痕，只是需要眯起眼睛才能辨认。覆盖在战争疮痍之上的，是日本占领烙下的印记：摩天大楼与寺庙间，旭日旗猎猎飘扬。空气中悬浮着某种不安的震颤，仿佛在无声祈求马尼拉能免遭必然将至的试炼。"
 state_lore_initials.174: " THU "
 state_lore_name.174: "顺化"
 state_lore_desc.174: "顺化是越南最大的城市，也是越南皇宫的所在地。帝国主义铁拳征服下的顺化还留存着那个已经逝去的帝国的回忆，它那丰富的历史也是帝国主义犯下滔天罪行的证据。如今的顺化，只不过是过去那个顺化一抹残存的影子。\n\n阮氏王朝曾统治着中南半岛的大部分地区，并以其征服为荣——直到法国和日本先后将魔爪伸向了这里。但至少，越南帝国的荣光似乎已然再一次照耀在半岛之上，而保大和他的王朝将再一次真正地统治整个越南——但他们不知道自己已经犯下了怎样的弥天大错。"
 state_lore_initials.175: " SAI "
 state_lore_name.175: "西贡"
 state_lore_desc.175: "西贡一开始并不属于越南。12世纪，高棉人在此地建立了一个名为普利安哥的小型定居点，用于同周遭地区进行贸易。之后，湄公河三角洲被越南帝国征服，此地更名为西贡。在法属印度支那统治下，西贡开始从小港口迅速发展成为殖民统治的大城镇。\n\n即使在法国离开印度支那之后，城市化进程仍在继续，因为日本试图将这座城市变成泛亚主义的光辉典范。然而，西贡仍然是一个充满矛盾的城市：贫民窟是妓女、吸毒者、乞丐和孤儿的家园；而老城中心却有着宏伟的法殖建筑和优美的林荫大道，本地的贪官则和日本富豪沆瀣一气。西贡离一座功能齐全的现代化都市还有很长的路要走。"
 state_lore_initials.176: " SIN "
 state_lore_name.176: "新加坡"
 state_lore_desc.176: "过去上百年间，新加坡都是大英帝国在东方的皇冠明珠。新加坡坐落于马六甲海峡枢纽之上，曾是世界上最繁忙的港埠之一，华人、马来人和印度人在殖民统治下生活工作。在英国人眼中，这里堪称“东方直布罗陀”，是捍卫太平洋门户最为强固的堡垒——1942年，新加坡沦陷，这一幻象彻底崩塌。\n\n日占“昭南岛”的统治已延续了将近一代人的时间。1960年，日本将此地改制为自由市及共荣圈托管地——这一精心筹谋的策略旨在赢得南洋华人的忠诚，其成效亦远超预期：如今的新加坡已成为吸引商人避险、知识分子逃亡、各个家族寻求庇护的磁石。码头永不停歇，源源不断涌入的移民携带着他们的财富、技艺与政治立场，将这座城市变成了全共荣圈最具活力、也是最为动荡的都市之一。\n\n新加坡由南洋华人的豪商巨贾所开创铸就，其对财富积累的热情与对祖国政局的执着关注同样惊人。公开台面上，听命于南京的海外国民党掌控着强大的商业委员会；而实际上，新加坡却宛如皮影戏的舞台，重庆派大商人在当地的影响力是公开的秘密，大陆军阀的资金滋养着这座城市的自由经济；在此之上，最为重要的是，旭日的暗影从未远去。\n\n昭南的幸存者们深谙这一事实，帝国海军始终驻扎于此，提醒着他们，这座城市的“自由”不过只是附带条件的特权。这一特权出自统治者的仁慈，服务于东京的利益，随时都可以化为乌有——新加坡是一处围城，它的高墙正是镀着金子的囚笼。"
 state_lore_initials.177: " KUA "
 state_lore_name.177: "吉隆坡"
 state_lore_desc.177: "吉隆坡原为华人及马来锡矿工聚居的蕞尔村落，1857年正式建埠，后由英国殖民势力擢升为地区首府。伴随二十世纪初雪兰莪橡胶业勃兴，该城迅速崛起，今已成为马来亚第一大城市。\n\n这座无正式政府管辖的工业重镇，历经二十年日军铁腕统治，既是兵家必争的战略枢纽，亦是殖民压榨的剥削核心。"
 state_lore_initials.178: " DEL "
 state_lore_name.178: "德里"
 state_lore_desc.178: "帝国之都，印度无可争议的权柄所在——无论谁主沉浮，欲治次大陆必先据德里。有史可稽之初，此地便孕育了征服大半个南亚的王朝基业：先有德里苏丹国定鼎，继以莫卧儿帝国称雄，终随英国人东来易帜，直至殖民当局迁政加尔各答而暂敛锋芒。\n\n然纵是异族入主，终难抗拒德里之魅。权杖再度西移，这座古城重焕帝国枢机之光，在征服者治下蜕变新生。建筑、文化、族群——德里处处镌刻着历代统治者不可磨灭的印记，恰如印度共和国引以为傲的多元图景：英国人虽已驱逐，印人治印成为现实，但德里仍为权力渊薮。\n\n不过，只是大部分时间如此。"
 state_lore_initials.179: " KOL "
 state_lore_name.179: "加尔各答"
 state_lore_desc.179: "加尔各答虽为自由印度政府驻地，民族主义与爱国主义思潮激荡之所，其肇始却非寻常古村旧邑，实乃帝国主义野心的具象化身——东印度公司欲以资本铸就帝国的勃勃雄心催生了这座城邦。随着公司野心膨胀，加尔各答亦随之扩张，直至逾越藩篱，商贾之庞大产业终蜕变为殖民巨兽之广袤疆域。\n\n然印度步入现代之际，此城亦焕发新生：肇启文化复兴，引领工业革命，更在变革浪潮中成为民族独立斗争之中心。而今作为印度斯坦平等同盟的大本营，加尔各答再度承载着撼动德里次大陆霸权的运动，俨然成为囊括印度广袤疆域的宏图伟业之基。\n\n这广袤，究竟可鲸吞万里，抑或只会反噬己身？"
 state_lore_initials.180: " KAR "
 state_lore_name.180: "卡拉奇"
 state_lore_desc.180: "坐落于印度河入海口，卡拉奇凭借天然良港与密集铁路网，成为串联印度西部与内陆之命脉。其人口汇聚四方移民，堪称次大陆主要人口枢纽与军工重镇，毗邻笼罩区域阴云的冻结冲突前线。\n\n此地亦为巴基斯坦运动与印度国大党反分治联盟激烈争夺的焦点：一旦争端逾越政治博弈的边界，这座多元之城恐将陷入族群撕裂。历史昭示：暴民嗜血的狂欢，瞬息可令血亲睦邻之谊灰飞烟灭……"
 state_lore_initials.181: " MDR "
 state_lore_name.181: "马德拉斯"
 state_lore_desc.181: "马德拉斯自古以来便是南印度重镇，英属印度倚此掌控德干以北——该区域多由早早归顺的大土邦主宰，故能保全封邑。纵使在印度猝然独立、诸封建领地宣告瓦解之后，此地依然是新共和国南方政策的核心所在，也是国大党建制派和新生的“达罗毗荼”运动、泰卢固语和泰米尔语运动激烈争夺的焦点，甚至平等同盟在此地也有相当势力。\n\n在政治领域之外，马德拉斯堪称南印工业化急先锋，城区及周边规划了多项重大建筑与发展项目。不论如何，这座城市正经历着日新月异的变化，不断地重塑自己，向未来迈进——这也是全印度共同的精神。"
 state_lore_initials.182: " HYD "
 state_lore_name.182: "海得拉巴"
 state_lore_desc.182: "提及印度显赫土邦，海得拉巴自是首屈一指——这片最辽阔、最强盛、最富庶的领地曾向英属印度宣誓效忠。纵使昔日尼扎姆贵为寰球首富，其子民却困于中世纪式封建枷锁，此等境况直至大英帝国猝然崩解方告终结。挣脱宗主国羁縻后，尼扎姆妄图自立门户，欲使海得拉巴以独立国家之姿跻身世界舞台。印度国民军陈兵边境之际，他恍然惊觉：失去的岂止是效忠义务，如今可再没了英军为他弹压臣属。\n\n如今，纵使王朝不复，海得拉巴仍是一座壮丽都城，既是多个少数民族聚居之邦的行政中枢，亦是共产党与（地下）平等同盟组织的重要据点。如今西印度各邦行政区划正待重组，只有时间才能告诉我们这座城市会走向何方。"
 state_lore_initials.183: " BOM "
 state_lore_name.183: "孟买"
 state_lore_desc.183: "也许这世上没有哪座城市会像孟买那样受到英国人和印度独立运动的关注。从西方的视角来看，这座城市同时是前英属殖民地和独立印度的标志；印度的金融与铁路中心正坐落于当地，在此发起的“退出印度运动”也最终伴随着一系列后续事件宣告了英属印度的终结。\n\n作为一个具有印度特质的种族多元化城市、孟买邦属于印度西部地区的中心，这里也往往是激烈政治斗争的焦点。近年来，马哈拉施特拉邦运动的势头愈发凶猛，不论是孟买市，还是这片土地的未来，似乎都不太明朗。然而，得益于爆炸式人口增长、显著的政治动员和纺织领域的快速工业化，以及印度海军主要后勤基地的地位，孟买依旧是印度与世界沟通交流的门户。"
 state_lore_initials.184: " CHI "
 state_lore_name.184: "芝加哥"
 state_lore_desc.184: "坐落于密歇根湖畔的“风城”芝加哥，是美国少数不临海却跻身大都会之列的城市。凭借连接密西西比河的运河网络，它跃升为全美人口第二稠密、生产力最旺盛的都市之一。早在新移民踏足前数千年，芝加哥周边的运输要道就已是原住民贸易迁徙的重要枢纽，正是这得天独厚的地理优势，吸引了来自东海岸与路易斯安那的拓荒者蜂拥而至。短短几十年间，芝加哥从一个仅有200人的边陲聚落，骤变为超11万人口的繁盛之城。1871年的冲天烈焰吞噬了整座木构之城，却自灰烬中浴火重生——世界上首座钢架摩天大楼在此竖立，昭示着钢铁与混凝土构筑的现代大都会就此诞生。\n\n如今，芝加哥雄踞五大湖区工业经济之冠。轰鸣的轧钢厂源源不断吐出钢材，既铸造美军坦克战机的钢筋铁骨，也构筑起平民百姓的广厦万间。繁荣的工业机器需要千万双劳动者的手，这使得移民潮始终在此涌动。自十九世纪始，爱尔兰、德意志、东欧各族移民在此落地生根，非裔美国人亦在城市中谋求生存——尽管红线歧视与房屋唆卖仍然随处可见。"
 state_lore_initials.185: " BOS "
 state_lore_name.185: "波士顿"
 state_lore_desc.185: "波士顿，这座马萨诸塞州的首府与新英格兰地区的最大都市，承载着作为美国最古老城市之一的荣光。1630年，清教徒殖民者在此建立了根基。在美国独立战争的历史洪流中，波士顿更是扮演了关键角色——波士顿惨案、倾茶事件、邦克山战役等重大历史时刻在此轮番上演。北大西洋最繁忙的港口地位，使它成为爱尔兰移民追寻美国梦的首批登陆点，开启了改变美国社会面貌的早期移民浪潮。\n\n如今，哈佛大学的学生群体与多元文化共生的市民结构，使波士顿稳踞美国自由主义重镇。这座城市与爱尔兰裔移民的羁绊尤为深厚，其中肯尼迪家族堪称传奇。自老约瑟夫·肯尼迪在政坛崭露头角以来，这个家族始终在民主党光谱中占据核心地位。尽管老肯尼迪本人颇具争议，但他为自由主义思潮续存了火种，其子约翰·F·肯尼迪与罗伯特·F·肯尼迪更是将政治理想薪火相传。若后辈中能诞生入主白宫之人，波士顿这座积淀深厚的历史名城，必将因孕育首位爱尔兰裔美国总统而再添华彩。"
 state_lore_initials.186: " ATL "
 state_lore_name.186: "亚特兰大"
 state_lore_desc.186: "桃树溪口，查塔胡奇河畔，佐治亚州首府坐落于此。亚特兰大始建于19世纪早期，初为一座人口不足万人的小镇，因地处美国东南部铁路干线的终点而闻名。内战爆发后，亚特兰大凭借其战略地位一跃成为至关重要的后勤枢纽，直至谢尔曼发起向大海进军，令亚特兰大全城毁于战火。然而正如凤凰涅槃一般，亚特兰大人利用重建时期让城市重获新生，也因此催生了日后的人口激增。\n\n当今的亚特兰大乃是东南部最大城市，活力四射、经济雄厚，以可口可乐和达美航空为代表的各大企业纷纷选址此地。可光鲜亮丽的背后却暗藏不断发酵的种族问题，占城市总人口40%的黑人在吉姆·克劳法的重压下艰难度日。纵然如此，当地的黑人社区仍坚持不懈，努力在城市中开辟一席之地：自主创业、自办学堂、发起反种族歧视运动等不一而足。在无数争取民权的身影中，一位名叫小马丁·路德·金的本地人脱颖而出，将黑人群体面临的困境放大至全美各地。亚特兰大在诸多方面可谓南方的写照——热情好客，却深受种族主义的束缚。但也只有亚特兰大，能让人们感受到变革之风的吹拂。全体黑人市民都殷切盼望着：在未来的某天，他们能真正将这种城市唤作自身的归属。"
 state_lore_initials.187: " HOU "
 state_lore_name.187: "休斯敦"
 state_lore_desc.187: "虽然得克萨斯的官方首府是奥斯汀，但每一个自豪的休斯敦人都知道得克萨斯真正跳动的心脏在何处。不是多管闲事之都奥斯汀，也不是那车水马龙的地狱达拉斯，那里的市民被吐出的汽车尾气深深折磨着。不，答案是气候温暖、面积广大的大都会休斯敦。以带领得克萨斯人民粉碎了墨西哥暴政的枷锁的革命英雄山姆·休斯敦将军命名的这座城市，在孤星州依旧闪耀着光芒，照耀着下方一切。\n\n至于为什么？因为休斯敦有一个让自己和其他城市与众不同的秘密武器。在1900年加尔维斯顿大飓风给这座城市造成了前所未有的破坏之后，人们在它的城郊有了一个奇特发现——石油。成千上万桶量的石油。纺锤顶油田被发现后，好几千人涌进了这个地区，贪婪地挖掘着墨西哥湾的红沙所隐藏的黑金。曾经的工业矿镇，也就因此成为了企业家、梦想发财致富的人和被东海岸建制派压榨的落魄流民的避难所。无序喧嚣的休斯敦不需要一座巨像来炫耀自己。它并不需要什么老化的青铜巨像，或是什么装饰风、新巴洛克风或其他花哨风格的纪念碑来证明自己。休斯敦所需要的……就只是休斯敦而已。"
 state_lore_initials.188: " DEN "
 state_lore_name.188: "丹佛"
 state_lore_desc.188: "以“一英里高城”为绰号的丹佛，于1858年由一群淘金者建立，当初只是一个采矿小镇。作为科罗拉多的首府，丹佛成为了落基山脉地区最大的城市之一——而19世纪的众多淘金热中，正因这点使它成为了那些拓荒者西进路上的休息站。现在，派克峰淘金热的光辉岁月早已远去，而那个时代留下的唯一遗产则是州议会大厦顶上那独特的金箔圆顶，像宝石一样在城市的天际线上闪闪发光。\n\n作为美国腹地的进步灯塔，丹佛是美国最早成立民权委员会的城市之一，也是全国少数几个愿意为拉丁裔、非裔和日裔美国人提供公平租赁公共住房政策的城市。丹佛这自由宽容的风气也因此吸引了全世界的移民，该市五分之一的人口有拉丁裔背景。虽然丹佛市郊山脉的金矿已经枯竭，但其市民的热心比任何贵金属都要闪亮。"
 state_lore_initials.189: " NOR "
 state_lore_name.189: "新奥尔良"
 state_lore_desc.189: "在这座号称“应允之城”的都市，有时人们或许更渴望说出拒绝。密西西比河上的明珠新奥尔良，曾以“南方女皇”之姿傲立——她在密西西比河三角洲的战略要冲，正是其存在之本。在往昔盛世，这位“大河女皇”的霓虹华彩与狂欢节的繁复盛装，本应成为蒸腾的路易斯安那沼泽与凋敝庄园之上的文明灯塔。\n\n如今新奥尔良的黄金时代已成往事。尽管女皇仍以女神之姿行走言说，她的臣仆们却已行将谢幕。受过教育的非裔美国人正从南方迁往阳光炙烤的加州与暴雨侵袭的曼哈顿，而休斯顿与迈阿密的璀璨都会正觊觎着王座。曾作为力量源泉的巨型港口，已被近邻远邦的港口取代；金融业亦撤离本州，投向更繁荣的港湾。尽管如此，新奥尔良依然昂首挺立，目光如炬眺望地平线。纵使暗箭难防，她的子民——无论是市中心西装革履的精英，还是法国区满面风霜的议员——仍将对这位君主恪尽职守。"
 state_lore_initials.190: " SEA "
 state_lore_name.190: "西雅图"
 state_lore_desc.190: "紧紧依偎皮吉特湾水域、群岛和海湾的这个熙熙攘攘的繁华中心城市，正是西北地区的明珠。\n\n在经历了繁荣和萧条、火灾和劳工动乱后，西雅图在大萧条期间遭受了严重打击。在全球贸易萎缩，胡佛政府贸易保护主义政策，以及激烈的劳工冲突等因素的影响下，这个城市煊赫一时的海上交通受到了冲击。该市的缓慢复苏被第二次世界大战的爆发所打断，但战争也带来了政府合同和新的繁荣，甚至打破了封闭的新兴日本社区。\n\n西雅图曾因伐木和木材而繁荣，而今却在喷气时代工业和大量政府合同的加持下蓬勃发展。新建的太空针塔就是一个直观的例子，它是该市天际线上一道靓丽的风景。然而，该市的码头仍然破败。西雅图曾经是劳资纠纷的温床，与东亚市场的隔离使西雅图的港口又蒙上了大萧条前情势的阴影。"
 state_lore_initials.191: " DET "
 state_lore_name.191: "底特律"
 state_lore_desc.191: "汽车之城底特律坐落在伊利湖畔与休伦湖入湖口之间。这座繁盛的工业中心正是美国人聪明才智的丰碑，也是一座反差巨大、具有典型美国特色的城市。\n\n底特律曾是法国皮毛贸易港，此地历经战争和西进扩张，但福特汽车公司的创立真正地永久改变了这座城市，就是从这里开始，这座五大湖都市成长为了美国汽车工业跃动的心脏。高耸的厂房和新开设的生产线为全世界源源不断地生产着汽车。\n\n底特律饱受大萧条打击，在二战时作为美国“民主兵工厂”的核心短暂复兴，但战后岁月对底特律却并不友好。需求波动和大规模裁员催生了工人运动，而黑人居民与白人移民的种族冲突则把这座城市推到了民权运动的最前沿。\n\n尽管如此，汽车之城坚持下来了，仍继续为自由世界供应着汽车。希望与陷阱弥漫在底特律，几乎势力均等，只有时间才能告诉我们，汽车之城会何时开始衰败。"
 state_lore_initials.192: " LUB "
 state_lore_name.192: "卢比亚纳"
 state_lore_desc.192: "历史上，卢布尔雅那曾是哈布斯堡王朝的南部前哨，作为尔虞我诈的中欧诸国与战火纷飞的巴尔干半岛间的宁静绿洲而繁荣。奥地利与斯拉夫文化在此共生了数个世纪，直至一战结束，卢布尔雅那随南斯拉夫建国归属其版图。二战期间，城市沦入意大利之手并改名“卢比亚纳”，在法西斯铁蹄下饱受摧残，一度被实质改造为镇压斯洛文尼亚抵抗运动的大型集中营。此后局势虽有所缓和，但当局仍通过大规模城市化工程强行植入意大利社群，压制斯洛文尼亚民族性。然而，这座在城堡荫庇下的古老而骄傲的城市尚未屈服；往昔苦难的余烬下，抵抗的火种仍在暗燃……"
 state_lore_initials.193: " DMM "
 state_lore_name.193: "达曼"
 state_lore_desc.193: "坐落于波斯湾畔的达曼，其历史底蕴远不及沙特王国西海岸诸城那般厚重辉煌。这座最初仅由古老要塞与零星临时棚屋构成的聚落，直至巴林岛流亡而来的达瓦西尔部族迁入才稍具规模。而其真正蜕变为沙特举足轻重的工业重镇，则要待到二十年后阿美石油公司的进驻——周边油田的发现，终使这座微末小城赢得政府与资本的双重垂青。阿拉伯各地的劳工如潮涌入，浓烟如墨染天际，油河自地脉奔涌，工业的轰鸣昼夜不息。尽管达曼已崛起为沙特王国最璀璨的现代都市，但这条石油命脉亦成诅咒：心怀怨怼的石油工人不断在这座年轻城市的根基处播撒动荡的种子。"
 state_lore_initials.194: " SYD "
 state_lore_name.194: "悉尼"
 state_lore_desc.194: "还有什么景象能比港湾大桥更能体现悉尼的内核呢？港湾大桥由一个骑在马背上的法西斯分子吊诡矜奇地开放，如今却在两侧竖起了保卫民主的塔楼。悉尼是一座漂浮在植物学湾上的大都市，心怀普世理想，枪口一致对准日本。这里居住着澳大利亚最多样化的人口，其中有移居的英国人、法国人和荷兰人，逃难的犹太人和苏联人，还有少数通过白澳政策躲避日本在亚洲暴政的印度人和中国人。悉尼的澳大利亚原住民，承受着几千年刺眼的灼热光芒、沉重的铁项圈、被偷走的世代，以及其他种族灭绝政策，他们承受着，并将继续承受下去。他们注视着植物学湾，就像他们长久以来所做的那样。他们注视着，似乎在相当长的一段时间里，这座城市因为对太平洋彼岸的恐惧而团结在一起。"
 state_lore_initials.195: " ZAC "
 state_lore_name.195: "萨卡特卡斯"
 state_lore_desc.195: "深藏在马德雷山脉腹地的萨卡特卡斯城，成立于1564年，曾是西班牙帝国最重要的矿业殖民地之一，以“玫瑰砂岩为颜，白银铸就心脏”闻名——其矿场与采石场出产的粉红砂岩与银矿石令其声名远播。西班牙不仅垂涎其金银宝藏，更看重其战略要塞地位，腓力二世国王更钦赐其“至忠之城”与“至贵之城”双料封号。\n\n墨西哥独立战争期间，萨卡特卡斯人展现出非凡的英勇爱国精神。在“多洛雷斯呼声”响彻天地数日后便积极响应伊达尔戈的起义号召，与西班牙殖民者鏖战十年，终于在1823年与墨西哥共同挣脱枷锁，成为新生自由州萨卡特卡斯的首府。\n\n步入十九世纪，随着波菲里奥·迪亚斯独裁时期掀起的现代化浪潮，这座山城逐渐蜕变为艺术重镇。然而墨西哥革命的烽烟打断了这场文化觉醒——1914年，潘乔·比利亚麾下的义军与维多利亚诺·韦尔塔政府军在这片土地上展开传奇之战，这场被后世奉为革命史最惨烈战役的厮杀，为城市肌理刻下新的历史断层。\n\n当历史车轮驶入二十世纪后半叶，萨卡特卡斯陷入困顿：革命创伤引发的人口锐减与经济衰退将城市推入深渊，银矿资源枯竭与国际资本冷眼更令衰退持续发酵，部分城区几成空巷。\n\n但这座凝固时光的城邦在困境中觅得转机——未被现代化浪潮裹挟的它，完整保留了最纯正的墨西哥传统风貌。如今凭借独特的殖民时期建筑群与粉砂岩景观，萨卡特卡斯正将经济重心转向旅游业与商业，在转型之路上虽步履蹒跚，却已可见新生曙光。"
 state_lore_initials.196: " KCM "
 state_lore_name.196: "堪萨斯城"
 state_lore_desc.196: "1850年，密苏里河的涓流目睹着一座城市从零开始的伟大历史，它，便是堪萨斯城。堪萨斯城是美国政治地域上的一个十字路口，它连接着堪萨斯州与西部尚未建州的地区，而在1854年堪萨斯-内布拉斯加州法案签订后，堪萨斯城又在政治领域上成为了一座充满矛盾的城市——在血流堪萨斯时期，它被夹在蓄奴派与自由派的争斗旋涡中，并最终在内战里被忠于南北的不同准军事组织所撕裂。\n\n南北战争后，这座城市仍然发挥着它“十字路口”的功能——作为密苏里跨河大桥与联合车站的所在地，这座城市的经济也一并搭上了纽约-堪萨斯-新奥尔良铁路线一路飞升，而这也导致另外两座城市倾斜而下的文化在这里得到交融与汇聚。\n\n随着二战落下帷幕，州际公路系统也逐渐建起，堪萨斯城的诅咒又再次如约而至，但这一次，却同时带来了一股机遇之风。由于I-70与I-35两条公路的交织而过，这座城市几乎影响着全美的交通运输，而在未来，老旧的铁路系统的翻新计划也将提上日程，在这个世纪剩余的时间里，这座城市已经完全做好成为全美城市中最璀璨的那颗明珠的准备了。"
 state_lore_initials.197: " OTT "
 state_lore_name.197: "渥太华"
 state_lore_desc.197: "这座曾名为拜敦的小聚落，于1855年正式获名渥太华建城。因其地处中央、易守难攻的战略要位，维多利亚女王钦定其为加拿大省首府，如今已发展为全国大都会。这里更成为众多英伦流亡者的避风港，最引人注目的当属伊丽莎白二世女王与前首相温斯顿·丘吉尔。近年渥太华盛装蜕变，将工业气息浓郁的旧貌革新为摩登悦目的现代都市景观。议会山麓，哥特式尖塔辉映下的建筑群，正是加拿大政府运作的中枢。随着魁北克与西部诸省对安大略的疏离感日增，众目聚焦渥太华——维系国家统一的重任，此刻正系于此城之身。"
 state_lore_initials.198: " MNT "
 state_lore_name.198: "蒙特利尔"
 state_lore_desc.198: "蒙特利尔始建于1642年，时名玛丽镇，坐落于圣劳伦斯河与小圣皮埃尔河汇流处，如今是加拿大与魁北克省第一大城市。作为全国经济首善之区，唯有内陆多伦多堪与之匹敌，二者差距日渐消弭。这座城市不仅是经济枢纽，更是加拿大法裔文化的脉搏所在。数百座天主教堂星罗棋布，英法传统在此水乳交融，铸就独特的文化品格，蒙城子民誓以生命守护这份精神印记。其政治分量更不容小觑——凡触怒法语族群的政客，瞬间会遭遇数十万选民的集体反制。"
 state_lore_initials.199: " CLG "
 state_lore_name.199: "卡尔加里"
 state_lore_desc.199: "卡尔加里是加拿大最大的城市之一、阿尔伯塔省之冠，更是西部省份的心脏。这座城市最初是建于1876年的一座堡垒，直到1883年加拿大太平洋铁路延伸至此。那时的卡尔加里如同美国狂野西部的众多城镇缩影——运行低效的地方政府、滞缓的经济。尽管起步艰难，这座城却迅速蜕变为经济与文化重镇。每年一度的卡尔加里牛仔节跻身全球最大规模牛仔竞技盛事之列。石油资源的发现使其成为城市经济命脉，却也化作阿尔伯塔省与中央政府争议的核心矛盾。卡尔加里的自由精神映射着安大略省与西部日益扩大的鸿沟，这片土地上的人们仍在叩问：何时才能全然平等相待？"
 state_lore_initials.200: " VAN "
 state_lore_name.200: "温哥华"
 state_lore_desc.200: "温哥华生来便是一座商贸主导的都市。1886年建市，同年，加拿大太平洋铁路的贯通更将其推向西海岸第一大港的宝座。远洋贸易的闸门由此洞开，财富积累与城市扩张皆得益于此。\n\n然而二战硝烟散尽，法西斯阵营与民主世界割席而立，温哥华的命运迎来转折。随着OFN于五十年代对共荣圈实施禁运，太平洋贸易逐渐凋敝，如今出入温哥华港的商船愈发稀少。惟有改弦易辙的彻底变革，方能力挽颓势。"
 state_lore_initials.201: " TOR "
 state_lore_name.201: "多伦多"
 state_lore_desc.201: "多伦多不仅是加拿大第二大城市、第二富裕之都，更是整个国度雄心与希望的象征。这片曾由易洛魁人建起两座村落的土地，如今已蜕变为商贸与创新的繁华都会，与蒙特利尔分庭抗礼。纵然二战失利与尼克松冲击使经济遭受重创，来自五湖四海的移民、难民仍不断涌向这座机遇之城，助其实现逆势崛起。金融、工业与科技领域尽显锋芒，文化中心汇集数十国艺术瑰宝，体育战队在赛场上与美国劲敌竞逐，彰显不屈气魄。维系北境之星的璀璨光耀至关重要——若此处光芒黯然，则希望安在？"
 state_lore_initials.202: " HLF "
 state_lore_name.202: "哈利法克斯"
 state_lore_desc.202: "哈利法克斯乃新斯科舍省府，更是加拿大坚韧与顽强的精神丰碑。这座始建于1749年的城市，建城伊始便触发与米可马克原住民的战火。1917年，法国军火船勃朗峰号与其他船只相撞爆炸，酿成加拿大史上伤亡最惨重的灾难——1.1万人罹难。波士顿伸出的援手将两城命运紧紧相系，成为美加团结的永恒象征。此后哈利法克斯始终雄踞要津，既是规模宏大的渔业捕捞基地，更是加拿大造船业的心脏。这座城市铭刻着往昔的耻辱和伤痛，誓言永不再让历史重演。"
 state_lore_initials.203: " DFW "
 state_lore_name.203: "达拉斯-沃思堡"
 state_lore_desc.203: "根据询问对象的不同，达拉斯-沃思堡可能是极右翼精英主导的火药桶，也有可能是新思想的试验场。在三层高的古老宅邸窗前，邦联旗与星条旗并排飘扬。身着貂皮大衣的女士们在尼曼百货门外谈笑，戴着珠宝的手指间夹着约翰·伯奇协会的宣传册。沿着主街走过罗马式法院大楼，达拉斯光洁的砖石建筑群外，成片没有自来水的破败棚屋正在洪泛区上缓缓沉降。沃思堡牲畜围栏区开裂的电话线杆上，钉着一张醒目的海报：“拯救你的种族，加入美国国家先锋队。”\n\n当然，并非所有人都沉醉于这种氛围。在这片都市圈的每个角落，都有无数美国人反对泰德·迪利之流——这位报业大亨的极端保守派报纸将尼克松与肯尼迪统统斥为社会主义、共产主义和教宗的盟友。尽管浸信会大牧师W·A·克里斯威尔不断咆哮全国有色人种协进会和美共的威胁，仍有无数人为抗议学校中的种族隔离走上街头。但在这座三K党曾经的巢穴，白人愤怒的阴云始终挥之不去。很快，激进分子将不会满足于空谈。某些人，或许就要采取行动了。"
 state_lore_initials.204: " STL "
 state_lore_name.204: "圣路易斯"
 state_lore_desc.204: "“西部之门”已不复往日荣光。自战争结束以来，圣路易斯内城白人外流的景象比全美任何地方都要触目惊心。人口锐减近十万，本就根深蒂固的种族鸿沟日益加深。\n\n但若就此断言“土丘之城”气数已尽，未免太过轻率。作为华盛顿大学与圣路易斯大学这两所顶尖学府的所在地，这里始终是大平原上的教育重镇。悠久历史在城中镌刻下永恒印记，林立的纪念碑与纪念堂仍在传颂着开拓先驱与当年建立此城的法国商贾的传奇。依托钢铁带边缘的区位优势，工业根基依然深厚。\n\n圣路易斯是中西部跳动的心脏。密西西比与密苏里两条大动脉在此交汇，将商贸传统与开拓精神注入这座城市的血脉——放眼全美，再没有哪座城市能像她这般，将这两种气质熔铸得如此浑然天成。"
 state_lore_initials.205: " PHX "
 state_lore_name.205: "菲尼克斯"
 state_lore_desc.205: "菲尼克斯所处的地带是美国西南鲜有的沃土，这座城市从前哥伦布文明的灰烬上崛起，向着广袤的沙漠和环绕的群山展开双翼。菲尼克斯曾经不过是个不起眼的农村，但铁路、水坝和军事基地的兴建，以及科技业的发展，让这里实现了爆炸性的增长。\n\n依托空调和汽车这两大现代奇迹，菲尼克斯成为了二十世纪美国新城市的典范：摩天大楼高耸入云，周围成片的住宅向远处无限延伸，每家每户都有草坪和车库。赛季前的好天气也吸引来了美国各大棒球队，这是他们开展春季训练的宝地。\n\n但是，菲尼克斯反映的可不只是自由之地美妙的现代生活：古老部落曾定居的土地正被不断开发；在高尔夫球场之外，非裔美国人正饱受排斥歧视；汽车数量激增，交通拥堵也成了让人头痛的问题。可以说，菲尼克斯就是现代美国的缩影，但是这究竟是好是坏，还难以做出定论。"
 state_lore_initials.206: " LAS "
 state_lore_name.206: "拉斯维加斯"
 state_lore_desc.206: "拉斯维加斯坐落在莫哈维沙漠盆地，周围群山环绕。城市别号“罪恶之城”，可以说是美国的赌徒、花花公子和漂泊者眼中的绿洲。拉斯维加斯的尼龙灯光和活力十足的夜生活照亮了空荡荡的内华达南部，城市的经济建立在旅游业和博彩业之上，游人访客纷至沓来。城市经济繁荣，法律宽松，渴望大发横财的犯罪组织纷至沓来，他们的势力蔓延到了城市的各个角落。不过，只要金钱继续流动，演出照常进行，人们就不会对这些勾当有什么微词，毕竟，在维加斯发生的事，留在维加斯。"
 state_lore_initials.207: " MSP "
 state_lore_name.207: "明尼阿波利斯-圣保罗"
 state_lore_desc.207: "自墨西哥湾出发，沿着密西西比河北上，便来到了树木繁茂的水源地艾塔斯卡湖。宽阔湍急的河水宛如鬼斧神工，塑造着周边的地貌，正是在这里，老人河从明尼阿波利斯和圣保罗中间穿流而过，将双子城一分为二。\n\n明尼阿波利斯起初只是个军事基地，圣保罗也不过是对几个小村庄的统称。人们都说，圣保罗是东部最后一座城市，明尼阿波利斯则是西部的第一座城市。前者保持着经典的维多利亚风格，而后者则以其城市翻新和现代风建筑闻名，双子城虽被河流分隔开来，在许多方面上也不尽相同，但两城间的纽带却不断蓬勃发展，在这严寒地带创造出了丰富的历史与文化。七次夺冠的金地鼠队、新近成立的维京人队、名副其实的双城队，以及经济繁荣和对本州政治的强大影响力，都为两城所共享。\n\n即便明尼苏达州气候寒冷，两城间的竞争也依然火爆，甚至足以称之为城市历史的一部分：从主教座堂建造竞赛到拉黑建筑师，甚至是绑架统计普查员，只为避免对方的统计数据比自己好看。虽然两城自由派势头旺盛，但他们都怀有根深蒂固的歧视，满足于维持非正式的种族隔离。人口衰减和劳动纠纷是两城共通的问题。两城都竭尽全力，将自己和其他全美瞩目的中西部制造业大都会切割开来。\n\n历经暴雪和龙卷风、罢工与暴乱、工业衰退和冷战对抗的考验，明尼阿波利斯和圣保罗坚持了下来，开辟了新局面。人们望向夜空，那最明亮的便是北极星：无论未来有何变数，双子城都已做好万全准备，不惧一切挑战。"
 state_lore_initials.208: " OMA "
 state_lore_name.208: "奥马哈"
 state_lore_desc.208: "在拓荒者跋涉俄勒冈小道的年代，东部的家庭穿越茫茫荒野西进，密苏里河畔的繁盛城镇往往是他们启程前最后的休憩之地。这便是内布拉斯加的奥马哈——通往西部的门户。\n\n如今的奥马哈高居大平原第二大都会，三十万人口正持续涌入。乔布斯峡谷巍峨的砖砌厂房构成了蓬勃发展的肉类加工与农业核心产业，城外金色原野翻滚着小麦、玉米与各色谷物。南郊数英里处矗立着本州最高学府内布拉斯加大学，“玉米收割者”橄榄球队在此重振雄风。当草原落日西沉，北区的剧院与音乐厅便会让爵士与蓝调在街头流淌——这座拥有庞大非裔社区的城市，孕育着独特的音乐血脉。\n\n但正如天际积雨云预示暴风雨将至，危机也在向城市蔓延。铁路与肉类加工业重组的传闻，恐将在贫困的北区掀起裁员浪潮，非裔劳工首当其冲。尽管内布拉斯加从未有过种族隔离或蓄奴的官方历史，但无形的红线政策与社区隔离的秘密协议始终笼罩着这里，直到近年才遭遇挑战。白人与非裔的财富鸿沟位列全美前茅。随着民权运动风起云涌，长期暗涌的种族矛盾一触即发——若1919年血色之夏的教训仍有镜鉴，这场爆发将意味着骚乱、私刑、流血与死亡。\n\n奥马哈正立于时代的悬崖：经济如底特律、托莱多般风雨飘摇，种族关系似伯明翰、蒙哥马利般岌岌可危。她的命运既系于自身，更系于整个国家的走向。美国将走向何方，或许将决定这座草原之城迎来的是晴空万里还是飓风肆虐。"
 state_lore_initials.209: " NAS "
 state_lore_name.209: "纳什维尔"
 state_lore_desc.209: "未睹其城，先闻其声。驱车翻越纳什维尔环抱的丘陵，美国顶尖乡村金曲的吉他弦音便悄然入耳。渐行渐近，爵士与灵魂乐的萨克斯风与管风琴声裹挟着鼓点贝斯奔涌而来。当L&C塔楼映入眼帘，声浪铺天盖地席卷而至，你便知已抵达这座音乐圣殿。这里是“音乐之城”，全美最富才华的乡村音乐人逐梦扬名的应许之地。\n\n纳什维尔发轫于独立战争时期的军事要塞。坐拥坎伯兰河战略要冲，这座兼具军事与经济价值的据点迅速崛起，随着美国人翻越阿巴拉契亚山脉西迁而迎来爆发式增长。南北战争的烽火大多绕城而过，仅经历联邦军早期占领与1864年纳什维尔战役的洗礼。正因未遭重创，这座城得以在重建时期及之后持续繁荣。医疗产业、音乐事业以及范德堡大学、贝尔蒙特大学、田纳西州立大学等学府，共同铸就了城市经济文化命脉，为其赢得“南方雅典”的美誉。\n\n然而这座“南方雅典”始终深陷奴隶制的原罪泥淖。种族隔离与歧视的基因深植于城市血脉——建城之初便役使黑奴修筑街道。南北战争虽终结了黑人的直接奴役身份，重建时期却未带来种族进步。联邦之女联合会在此安营扎寨，三K党最早在此播撒仇恨火种。埃弗拉姆·吉泽德遭遇的骇人私刑，不过是漫长残酷的平权斗争序章。\n\n民权运动的浪潮持续激荡着纳什维尔。近年虽在平权道路上取得些许进展，但官方与非官方的种族隔离体系仍根深蒂固。霓虹灯下的俱乐部与录音棚内，种族矛盾如暗火隐燃。但纳什维尔人依然心怀希冀：医疗产业蓬勃发展，外来企业争相落户，音乐界的星光大道始终通向田纳西。当吉他琴弦再度震颤，管风琴音符重新流淌，音乐之城终将在律动中守望破晓的曙光。"
 state_lore_initials.210: " SLC "
 state_lore_name.210: "盐湖城"
 state_lore_desc.210: "1847年，一万四千名耶稣基督后期圣徒教会信徒，在美国新教与天主教主流社会的法律与法外威胁下，决定西迁寻找不受迫害的应许之地。二月寒冬中，他们告别诺伍，跋涉向未知的荒野，泥泞裹足，翻山越岭。直至1847年7月，第一批摩门教徒的目光才触及大盆地腹地的盐湖谷与毗邻的浩瀚水域——当杨百翰眺望这片景象时，他深知这就是天选的新家园。\n\n尽管美国政府在三年内便将疆域扩展至此，但摩门教徒再未离去。历经饥荒、严酷气候、武装冲突与疫病，他们以顽强姿态在这片新土地上扎下根基。今日美国的城市版图中，盐湖城独树一帜：全国最大的摩门教徒聚居地，摩门教会总部所在地，巍峨的盐湖圣殿矗立其间。宗教气息渗透于文化肌理、高等学府、政治生态乃至居民生活的方方面面，堪称美国信仰最统一的都市。\n\n但若仅将这座“西部十字路口”视为宗教符号，则是对近二十万居民多元文化的漠视。环抱谷地的壮美山峦举世无双，由此衍生的滑雪与徒步文化蔚然成风。皑皑雪峰之下，自1850年代起便埋藏着银矿与金属矿脉，铸就了这片土地的财富根基。城区以恢弘的街区规划与六车道大道勾连，剧院、公园与小而蓬勃的音乐场景点缀其间。当然，还有赋予城市名字的大盐湖——数百万候鸟的栖息地，步道纵横的旅游胜地。\n\n盐湖城自有其隐忧：增长陷入停滞，人口预计将现负增长，教会影响力亦成双刃剑。但纵使前路坎坷，杨百翰初见此城时的箴言或许依然适用：\n\n“正是此处，继续前进。”"
 state_lore_initials.211: " CHS "
 state_lore_name.211: "查尔斯顿"
 state_lore_desc.211: "在美国，鲜有城市如南卡罗来纳州的查尔斯顿般浸润着历史的厚重。这座英国殖民者最早建立的定居点之一，自诞生之日便承载着移民、理念——与黑奴的血泪。独立战争时期，它是革命最前线；南北战争第一枪在此炸响，邦联军将炮口对准血脉相连的同胞。如今，它虽是南方繁华都会，却始终笼罩在压迫与偏见的阴霾之下。正如过往的每个历史转折点，查尔斯顿注定要在这场定义美国历史新纪元的冲突中，再度成为风暴之眼。"
 state_lore_initials.212: " RIC "
 state_lore_name.212: "里士满"
 state_lore_desc.212: "里士满，弗吉尼亚的首府，正处在命运的十字路口。它比一般城镇更繁荣，但在全美大都会中却愈发相形见绌。它不属于现代化且世界性的东北城市群，而是南方诸州的哨戒。它正在转变为一个代表着进步与学习的城市，但作为故美利坚联盟国的首都，这段过去仍让每个非洲裔居民饱受奴隶制和种族隔离的残余困扰。六十年代的里士满正是美国自身的一个缩影——既是社会和科技进步的希望，顽固保守和各类歧视又未曾远去。"
 state_lore_initials.213: " MIA "
 state_lore_name.213: "迈阿密"
 state_lore_desc.213: "迈阿密始建于1856年，如今已是佛罗里达州最大的城市之一。它坐落于佛罗里达半岛东海岸，凭借其劲爆的夜生活、秀丽的海滩和高度的政治关联性而闻名，在州和联邦选举中常常占重要地位。这座城市同时还以拥有大量非裔和犹太裔人口著称。此外，无数古巴人因不堪富尔亨西奥·巴蒂斯塔的统治逃亡迈阿密，由此催生了当地规模可观的古巴裔社区。"
 state_lore_initials.214: " PTL "
 state_lore_name.214: "波特兰"
 state_lore_desc.214: "波特兰坐落于濒临太平洋的威拉米特河谷，如今它正处在城市定位的十字路口。该市有一个规模客观的亚裔少数族裔群体，他们为该州带来了繁荣，也为这座城市创造了新的机会。尽管如此，亚裔仍饱受制度性压迫和社会歧视之苦。\n\n纵观整个波特兰，白人怨愤的迹象隐藏在平静的外表下。即使进步思想得以传播，但许多人仍对这座城市所发生的定位转变感到不满。伴着终年常青的喀斯喀特山脉，这座城市不出所料的成为了蓬勃发展的嬉皮士运动的活跃地带。无论波特兰的未来驶向何方，它必将出乎所有人的预料。"
 state_lore_initials.215: " STŌ "
 state_lore_name.215: "汕頭"
 state_lore_desc.215: "汕头在宋代仅为渔村聚落，后来逐步发展为海防要塞。当其毗邻的潮州府拒绝屈从于外来的商贸侵蚀时，这座城市却因1858年《天津条约》的签署成为中国最早、最重要的通商口岸之一，自此背负上对外贸易与资本的双刃剑。至三十年代中期，它已跃升为中国第三大港口及东南地区重要的物资集散枢纽，这既得益于其长期相对安稳的区位优势，然而1939年日军炮火直指汕头湾，此地的宁静顷刻瓦解。\n\n如今的汕头虽仍占据着交通枢纽的战略地位，但已全然处于严密的监控与桎梏之下。所有的经济果实都被强制纳入大东亚共荣圈的体系之中，成为其专擅独享的战利品。"
 state_lore_initials.216: " MOM "
 state_lore_name.216: "茂名"
 state_lore_desc.216: "茂名得名于西晋时期一位道教神医，千百年来虽从容涉过历史长河的激流险滩，却始终偏安一隅，默默无闻。即便被强行从中国本土版图撕裂，与西面的湛江分隔，作为广东国西部边陲而存在，这片土地依旧处于边缘地位——直至五十年代日本勘探队在其地层深处发现丰厚的油页岩矿藏，这是原广东省境内屈指可数的油页岩富矿区之一。\n\n如今茂名大地上遍布矿坑与精炼厂的疮痍，宪兵队与日本陆军征调的苦役者身影在烟囱投下的阴影中蠕动，地底涌动的黑金滋养着珠三角永不餍足的贪欲。"
 state_lore_initials.217: " CHK "
 state_lore_name.217: "肇慶"
 state_lore_desc.217: "肇庆地处两广地理分野的临界线，在历史舞台上几度沉浮。隋朝时这里因军事重镇而崛起；至明朝更一度成为统摄两广的总督衙署驻地。但这片内陆城池的辉煌注定短暂——当岭南明珠广州重新攫取海权优势后，肇庆的荣光便悄然退去。更迭的惊雷在近代接踵而至：清廷倾覆于革命浪潮，神州陆沉于东瀛铁蹄，却都未能逆转这座城市渐趋边缘的轨迹。\n\n如今的广州霓虹璀璨，俨然昭示着未来图景；而肇庆却如同褪色的雕梁，在时代巨轮的碾压下沦为偏僻落后的象征，仅在偶尔提及的只言片语中黯然蜷缩。"
 state_lore_initials.218: " SHŌ "
 state_lore_name.218: "韶關"
 state_lore_desc.218: "韶州之名，自清朝始易为韶关；“关”字尾缀的由来，却可上溯至更早——那些常年往来此地的旅商，在缴纳重重关津税赋之时，便将这座城邑唤作“税关之城”。作为南粤最北端的重镇，1916年粤汉铁路的贯通更使其成为连通珠三角港口与华中腹地的咽喉要冲。\n\n而此刻静卧于边界的韶关正将“关”的意象具象化：铁路沿线上赫然矗立的边检站与海关哨所，无一不是政治区隔与强权意志的冰冷注脚。"
 state_lore_initials.219: " ADD "
 state_lore_name.219: "亚的斯亚贝巴"
 state_lore_desc.219: "亚的斯亚贝巴是埃塞俄比亚的行政首都，意大利人也从这里对整个意属东非发号施令，但和非洲之角的千年传统相比，这座城市的历史其实算不上悠久。十九世纪，埃塞俄比亚皇帝孟尼利克将此地打造成了真正的帝都，商贸不断涌入，新生帝国贫困地区的居民纷纷来此定居，城市迅速繁荣起来。埃塞俄比亚的第一条铁路也落成于此，这大大加快了这个非洲独立国家的发展，虽然在意大利占领之下，这条铁路被赋予了新的意义。\n\n亚的斯亚贝巴是意大利东非殖民领最大的城市，殖民地纹章更让城市得名“帝国之花”，自然这里也是总督的驻节地，为了给意式建筑腾出空间，相当一部分的旧城区都被拆除了。宽阔的大道、宏伟的胜利拱门以及现代意式街区，无疑会给到访者留下深刻印象。城市贫民窟的规模不断扩大，败敌的贵族和中产阶级都被赶入这里，任何人胆敢挑战意大利秩序，都会被黑衫军和非洲人警察残酷无情地镇压下去。\n\n亚的斯亚贝巴是非洲之角上最大的城市：城市人口五十万，工业区规模庞大，行政系统精密复杂。自然，这里实行的制度也和殖民地其他地区有所不同：城区规模太大，而且还在不断扩张，实行全面控制并无可能，自然，种族法的执行也不甚严格。贫困殖民者和本地人一起生活工作并不鲜见，此种共存在意属东非其他地方并不存在，这也促成了一种独有的地下文化。"
 state_lore_initials.220: " MGD "
 state_lore_name.220: "摩加迪沙"
 state_lore_desc.220: "摩加迪沙是索马里最大的城市，也是这个国家的行政首都。摩加迪沙的历史悠久漫长，早在中世纪时，这里就是重要的商贸枢纽，更有“百寺之城”的美名。当地统治者将城市出售给了意大利商人，这里很快就变成了意大利殖民扩张的策源地：城市稳步扩张，越来越多的殖民者离开母国，来此开启新生活，他们的数量逐渐超过了当地非洲人，他们将当地人赶入城郊的大贫民窟，并依照意式风格重建城市中心。\n\n虽然摩加迪沙不如亚的斯亚贝巴和阿斯马拉发达，但也是一座重要的城市。数十万人居住于此，城市的纺织业和果业也值得称道，摩加迪沙正缓缓地从传统农贸城镇转型为现代工业城市。摩加迪沙还是意大利通往印度洋的主港，港口设施非常发达：每天都有几十艘货船入港，装上索马里的水果和纺织品，将这些货物出口到意大利和其他国家。"
 state_lore_initials.221: " ASM "
 state_lore_name.221: "阿斯马拉"
 state_lore_desc.221: "阿斯马拉这座古老城市的历史可以追溯到中世纪，当时这里被称作阿尔巴特阿斯马拉，这是为了纪念建城的四个当地部族。阿斯马拉是意大利早期殖民地之一，得益于不断涌入的殖民者，城市自十九世纪末以来增长迅速，意大利建筑师几乎将城市推翻重来了一遍：从省长府到宽阔大道，所有建筑无一不体现着意式风格，法西斯审美也随后融入其中，这也是为什么阿斯马拉昵称“非洲罗马”。\n\n在意大利征服埃塞俄比亚后，阿斯马拉成了亚的斯亚贝巴与马萨瓦港的中转站，发展更上一层楼。这座地区首府人口近二十万，其中约三分之二是意大利人，城市工业发达，在意属东非仅次于亚的斯亚贝巴，多家意大利企业在此开设分公司，如FIAT和安萨尔多。这里还是土著军的募兵中心——土著军可以说是殖民驻军的顶梁柱，其退伍军人基本都会分配到土地，还能领到养老金，因此他们的地位也因此远超其他非洲同胞。\n\n在繁荣城市的光鲜外表之下，藏匿着殖民占领的丑恶现实。在市中心的美丽公园和现代办公楼之外，贫民窟统治着城郊的天际线，那里有成千上万生活在极度贫困之中的非洲人，根深蒂固的行政实践虽没有明文规定，但足以扼杀当地人改变命运的尝试，除非他们选择参加土著军。罗马不但知晓这一情况，更暗中予以支持，这都是为了推行厄立特里亚的意大利化。"
 state_lore_initials.222: " ESS "
 state_lore_name.222: "埃森"
 state_lore_desc.222: "埃森坐落于鲁尔区的中心地带，是德国的能源之都。虽最初是作为一个教会公国而成立，但在十九世纪，通过对炼钢业的大力发展，摇身一变成为了德国重要的工业中心。\n\n这座城市对国家的能源供应至关重要，它拥有着世界上数一数二的煤矿群——关税同盟煤矿建筑群，并且也是德国主要能源供应商——克虏伯公司本部的所在地，时至今日，该市的经济活动也已多样化，包括建筑、化工、玻璃加工、纺织。埃森还以文化艺术的大都市而闻名，是过去与未来的象征。"
 state_lore_initials.223: " DOR "
 state_lore_name.223: "多特蒙德"
 state_lore_desc.223: "多特蒙德市坐落于埃姆歇河与鲁尔河畔，是鲁尔区的行政、商业和文化中心。尽管在中世纪被摧毁又重建了数次，由于煤铁资源的开发，多特蒙德成为了交通与工业的主要中心。\n\n钢铁、机械、电子设备、机动车、煤炭和啤酒等主要经济活动维持着城市的运转。这座鲁尔区首府的历史遗产同样不容小觑，四座近乎完整的中世纪教堂，四座拥有护城河的城堡，以及萨克森和加洛林王朝的堡垒遗址坐落于此。"
 state_lore_initials.224: " DUS "
 state_lore_name.224: "杜塞尔多夫"
 state_lore_desc.224: "杜塞尔多夫坐落于莱茵河与杜塞尔河的交汇处，是德国最大的城市之一。这一贝格公国祖地不仅是莱茵-鲁尔区的中心，也是金融和工业中心，拥有钢铁、化工、玻璃和纺织等诸多产业。尽管如此，这座城市在文化上更为知名，因它那活力四射的夜生活，还有引领潮流的时尚界。杜塞尔多夫的博览展会和狂欢节游行同样引人注目。"
 state_lore_initials.225: " KÖL "
 state_lore_name.225: "科隆"
 state_lore_desc.225: "科隆离日耳曼尼亚很远，离巴黎更远。多年以来，这里是法德两大文明殊死搏斗的战场中心。法国犹如笼中困兽，好不容易才被压制在西欧；而德国文明则被各种各样的公爵、选侯和皇帝把持，他们竞相在神圣罗马帝国的疆域内争夺权势。科隆位于这场大决战的最前线。法国已经被暴戾的国防军残酷而高效地征服，战争以德国的胜利而落下帷幕。\n\n前线隐入尘烟，争斗偃旗息鼓，但劫灰里还剩下了什么呢？早在德国彻底征服欧洲之前，科隆就给希特勒提供了一个掌控全德国的台阶。希特勒正是在这里与冯·巴本见面，共同建立了一个搞垮冯·施莱歇尔政府的秘密联盟。\n\n就为了这事，希特勒也欠着科隆一句感谢呢。"
 state_lore_initials.226: " STU "
 state_lore_name.226: "斯图加特"
 state_lore_desc.226: "斯图加特被誉为德国自动化工业的心脏——准确来说，是德国军工产业的心脏。因其作为符腾堡王国首都的历史地位，更因其坐落于德国南部具有最优越地理条件的内卡河畔，斯图加特成为了德国的交通与制造业枢纽。随着大众甲壳虫及其军用衍生品Kübelwagen装甲车，以及德国战争后期的几款超重型坦克在这座城市陆续诞生，斯图加特的名声越发显赫。现如今，向沃尔夫斯堡等城市进行的工业产能迁移丝毫没有影响到斯图加特的地位，无论是对诸如保时捷，戴姆勒-奔驰等德国工业巨头，还是对那无数或自由或被奴役的，不断驱动着那些巨型工厂的劳工而言，这座城市都是他们绝不可能抛弃的风水宝地。"
 state_lore_initials.227: " WIE "
 state_lore_name.227: "维也纳"
 state_lore_desc.227: "曾经，维也纳是欧陆体系的中心；曾经，维也纳是各大帝国谈判分赃的会场；曾经，奥地利是地图上的一个独立国家。而如今，这一切早已不在。苏莱曼、腓特烈和拿破仑未竟的野心，最终却在她的子民手中得以完成。他们剥夺了奥地利的主权和尊严，悍然将其全盘吞并。\n\n1938年德奥合并令奥地利与其兄弟国家合为一体。然而，征服了欧洲的德国人将夺取的土地细分为一个个大区与军区，扼杀了各个地区崛起的可能。流逝的时间，连同高强度的宣传攻势，已然在维也纳市民的灵魂中深深打上了德国的烙印，以至他们的后代将只知晓德国的存在。\n\n奥地利的人民，已不知奥地利为何物。"
 state_lore_initials.228: " LPZ "
 state_lore_name.228: "莱比锡"
 state_lore_desc.228: "莱比锡位于北部低地的最南端，距离柏林160公里，是德国最重要的城市之一。自神圣罗马帝国时代以来，这座贸易展览城市一直是贸易和文化中心，并以集市和音乐而闻名。\n\n正因如此，德国才得以从建国初期的经济崩溃中解脱出来，这要归功于这座城市的贸易博览会以及它对罗马尼亚和保加利亚等国传播的影响力。\n\n因此，莱比锡依旧是德国的贸易中心和维护经济的工具，就像千百年来它所做的那样。"
 state_lore_initials.229: " DRE "
 state_lore_name.229: "德累斯顿"
 state_lore_desc.229: "萨克森国家大区的首府仍依然是德国的工业和文化中心，茨温格宫、德累斯顿圣母教堂和森柏歌剧院并未遭到时间的摧残。在市中心周围，一座座生产汽车、精密光学仪器和医疗设备的精密工厂标志着德累斯顿成为了德国东部最大的工业中心之一，并且有余力供应一支守卫德国东部边界的驻军。"
 state_lore_initials.230: " DAN "
 state_lore_name.230: "但泽"
 state_lore_desc.230: "纳粹德国战争机器的首个袭击目标并非某个国家，而是因第一次世界大战后特殊际遇而获得自治权的城邦。坐落在同名海湾之畔的但泽，自建立伊始就深深刻上了波兰与德意志双重文明的烙印。1933年其市参议院被纳粹党渗透把控后，这座城邦便开始践踏境内波兰裔与犹太居民的权利，并最终在二战爆发的初始阶段被德国吞并。\n\n数十载沧桑变迁后，重归平静的但泽已成为一座以造船业与国际贸易为命脉的典型德意志城市。面朝碧海凝望前方的城市，身后是日耳曼尼亚在追寻所谓种族优越道路上用无数无辜生命铺就的深重血色。"
 state_lore_initials.231: " BRS "
 state_lore_name.231: "布雷斯劳"
 state_lore_desc.231: "从罗马人、波希米亚人、波兰人、匈牙利人、奥地利人，到普鲁士人，布雷斯劳对这些人来说是一座拥有许多不同名字的城市。它是日耳曼尼亚以东的最大都市，也一直是通向东方的重要铁路交通枢纽，以及西里西亚地区的工业中心。\n\n现在，这座古城被集中营团团包围，其中既有劳役营也有灭绝营。这里早就是纳粹党的坚实堡垒，甚至在纳粹党掌权前就在大力支持纳粹。几百万奴隶在布雷斯劳周边的大型企业集团工作到死，但布雷斯劳的居民却没法也没有哪怕多看他们一眼。\n\n布雷斯劳曾因它源远流长的历史和多元文化的遗存而闻名于世，现在却已完全被纳粹恶魔吞没湮灭。它已化作一块象征东方的墓碑，其下掩埋着成百上千万斯拉夫人民和他们的文明。"
 state_lore_initials.232: " LTZ "
 state_lore_name.232: "利茨曼施塔特"
 state_lore_desc.232: "当下，若向利茨曼施塔特投去一瞥，人人都会认为这是一座普通的德国城市：德国居民、用哥特式字体书写的标语，以及烂大街的民族主义口号。甚至，它的名称都源于半个世纪前攻占该地的德国将军——卡尔·利茨曼。\n\n但表象终究只是表象，难以掩盖无数波兰人惨遭杀害和驱逐的事实。他们的一声声哀嚎和控诉依然回荡在城市的条条街道之上，然而却再也得不到回答。\n\n一小部分波兰人仍生活在利茨曼施塔特，地位低贱、受尽他人使唤。每当他们看向街头，映入眼中的标志、旗帜和行人无不提醒着他们：这座城市已不再属于自己，而是属于它的征服者。"
 state_lore_initials.233: " HAN "
 state_lore_name.233: "汉诺威"
 state_lore_desc.233: "汉诺威坐落于德国北部的公路与河流交汇的交通要道之上，它将汉萨同盟的港口城市与通往低地诸国和德国东部各州的通道紧密连接起来。现在，这座城市依然是德国商业和中间工业的中心。石油、橡胶和化工厂在这座因其慷慨资助知识分子和高等研究而举世闻名的城市中随处可见，但其与德意志的犹太社群和英国之间的旧有联系则早就被扫进了历史的垃圾堆。"
 state_lore_initials.234: " KÖN "
 state_lore_name.234: "柯尼斯堡"
 state_lore_desc.234: "柯尼斯堡地处普鲁士传统意义上的心脏地带，它高耸入云的尖塔和鬼斧神工般的桥梁更是德国的标志性建筑。在拿破仑的大军蹂躏欧洲、占领普鲁士的那段黑暗岁月里，柯尼斯堡成为了国王腓特烈·威廉三世至关重要的庇护所。正如彼时和大选侯时代一样，这座城市犹如一个中转站，将德国腹地同东欧分隔开来。\n\n柯尼斯堡各地都矗立着为希特勒征服东欧的暴行歌功颂德的雕像与纪念碑，几乎每一条街道上都悬挂有希特勒本人的肖像。纳粹党内的拍马者对每一处细节都精雕细琢，力图把他们的元首描绘成四十年宣传中所塑造的、新亚历山大般的英雄人物。\n\n当希特勒魂归西天之后，他很快就会发现，自己比想象中更像亚历山大。"
 state_lore_initials.235: " TUN "
 state_lore_name.235: "通哈"
 state_lore_desc.235: "[Statelore_Get_tunja_desc]"
 state_lore_desc.235_alive: "尽管豪尔赫·盖坦早已离世，但他的社会主义梦想、他建立民主哥伦比亚的美好愿景仍然活在所有哥伦比亚人民的心中。这一点在通哈表现得最为突出，这里是哥伦比亚革命联盟的首都，也是盖坦在哥伦比亚的理想堡垒。\n\n革命联盟致力于维护盖坦的梦想，他们公开宣布支持盖坦的左翼激进主义与公平慈善的理念，也继承了盖坦对美国的友好态度。自然，这最后一条原则引起了OFN的注意，这使得联盟得到了他们的大力支持，包括武器运输、橄榄绿的贝雷帽和通哈政府大楼里穿着西装的特工。\n\n如果暴力时期重现哥伦比亚，联盟就会收到亲密而友好的OFN的鼎力支持；但如果人们不再崇敬盖坦、不再投身于他的梦想，通哈的未来将是一片黑暗。"
 state_lore_desc.235_dead: "尽管哥伦比亚革命联盟与压迫者反动派展开了艰苦残酷的斗争，但通哈却依旧陷落于敌手，盖坦建立真正民主哥伦比亚的梦想也随之破灭。今日，反革命势力在街道上巡逻，击碎抗议者的头颅，掘地三尺铲除盖坦留下的思想。曾经充满街道的希望和乐观一扫而空，取而代之的是寂静的恐惧与不安，弥漫在通哈的角角落落，这里的未来愁云惨淡。\n\n尽管革命联盟和盖坦的遗产似乎已经消亡于暴力时期的漩涡之中，支离破碎，但他们仍然没有死去。他们继续活在通哈城的深处和人们的心底，静静地等待着人民能够再次为自由哥伦比亚而骄傲前进的一天，尽管这一天可能会在很久很久之后才会到来。"
 state_lore_initials.236: " CAL "
 state_lore_name.236: "圣地亚哥-德卡利"
 state_lore_desc.236: "[Statelore_Get_cali_desc]"
 state_lore_desc.236_alive: "圣地亚哥-德卡利，简称卡利，曾是非裔哥伦比亚文化的中心，更是哥伦比亚繁荣程度数一数二的大都市。然而，自暴力时期以来，这座城市在领袖希尔韦托·阿尔萨特·阿文达尼奥的领导之下发生了天翻地覆的变化。这座曾经阳光明媚的共和主义城市现在成了反动主义的温床，哥伦比亚法西斯主义的触角自此处蜿蜒而出。\n\n在近乎永久的宵禁之下，卡利成了暴徒肆无忌惮、反动明目张胆的无法无天之地。这条街上，黑衫军上门恐吓不同政见者；那条街上，寡头们在财富的海洋中徜徉。与此同时，就在一街之隔的卡利总主教区，哥伦比亚最极端的天主教徒在诅咒他们的犹太敌人下地狱，而街头的流血不过是为主做出的牺牲。\n\n如今的卡利是亡命之徒、法西斯分子和雇佣兵沆瀣一气的巢穴，非裔哥伦比亚人在重重恐怖和迫害之下逃离这里。卡利的遗产已遭彻底玷污，这座城市如何才能从十一年法西斯严酷统治之下脱身而出，无人知晓。"
 state_lore_desc.236_dead: "沉重枷锁加身、压迫十一年岁月之后，卡利的无尽噩梦终于宣告结束。阿文达尼奥麾下的雇佣军和暴徒统统被赶进海里，卡利的市民透过窗户警惕地看着新来的士兵在破坏殆尽的街道上行进，喊着解放和变革的口号。\n\n尽管不再是新格拉纳达的所在地，但新哥伦比亚谨慎地看待这座城市，而卡利也回以小心翼翼。十一年的法西斯统治不会在一夜之间消失，卡利疲惫不堪的人民对将来的日子早有预料。当局必将以反法西斯的名义加强其军事存在，受损的建筑和基础设施却遭到忽视，黑衫军和寡头民兵也将动员起来发动叛乱。\n\n尽管卡利可能已经摆脱了她肮脏的过去，但他们能否自阿文达尼奥的军靴之下赢来真正解放，一切尚未可知。"
 state_lore_initials.237: " BAQ "
 state_lore_name.237: "巴兰基亚"
 state_lore_desc.237: "[Statelore_Get_baq_desc]"
 state_lore_desc.237_hidden: "长久以来，巴兰基亚一直是哥伦比亚德意志人的家园，也是迄今为止德意志民族向哥伦比亚输出影响力的窗口与门户。德意志民族社会主义于二战前后取得辉煌胜利，德国也耗费大量时间精力，在境外的德意志人群体中扩大影响。在哥伦比亚，他们利用克里奥尔贵族中长期存在的种族主义，使其相信自身纯正的雅利安血统。这让国家的形势愈发紧张，德意志人组成的联盟及其哥伦比亚盟友对哥伦比亚共和国愈发不忠。\n\n在巴兰基亚和大西洋省的阴影之中，第二爱国军如蛇般盘桓蛰伏。它静静地等待着一个机会，等待着以完美的姿态破腹而出、向世界展现自己的存在，并令哥伦比亚折服于民族社会主义。"
 state_lore_desc.237_reveal: "历经十一年的分裂、鲜血与刺杀，暴力时期卷土重来，将哥伦比亚再次卷入内战的无底深渊。但一个全新派系现于战乱之中，他们早已盼着哥伦比亚的当今乱局，那就是第二爱国军。\n\n第二爱国军于巴兰基亚，这座德国在哥伦比亚影响力的大本营之中雄起。他们将追寻高贵克里奥尔人的仇外主义之梦，以民族社会主义与雅利安克里奥尔主义的名义而战。用巴兰基亚作跳板，他们将让全哥伦比亚都归于民族社会主义。\n\n话音未落，德国的装备与雇佣兵已源源不断的涌入此城，巩固着这座新世界的德国堡垒。至于巴兰基亚与第二爱国军究竟是将哥伦比亚变成民族社会主义根据地，还是在哥伦比亚内战的高压中走向崩溃，世人只能拭目以待。"
 state_lore_desc.237_loss: "十一年前，政府海军曾炮击这座城市；如今，巴兰基亚再度燃起大火。战火燃遍乡野城镇，哥伦比亚的纳粹据点化为废墟，哥伦比亚德意志人民联盟在这座城市的存在被彻底抹除。联盟已死，巴兰基亚的德意志人口也因遍及全城的暴力事件大幅减少。\n\n目前尚不清楚哥伦比亚新政权对巴兰基亚以及仍在那里以雅利安乌托邦的名义继续抵抗的第二爱国军残部有何打算。也许她将重现战前时光的繁荣与发达，又或许她将沦为一个二流城市，永远无法抹去内战的伤痕。\n\n对于巴兰基亚来说，唯一确定的是，德国对她的控制已经不复存在，但哥伦比亚的民族社会主义者将在将来的岁月里继续利用哥伦比亚德意志人民联盟的遗产。"
 state_lore_initials.301: " PAT "
 state_lore_name.301: "帕特雷"
 state_lore_desc.301: "希腊是个山地之国，但国家的命脉却不在山岭之间，而是蕴藏在环绕半岛的海洋之中，搭乘在乘风破浪的船上。即便几十年来意大利宗主强推禁运，贸易也依然主导着希腊经济，没有哪个希腊城市比帕特雷更能体现这一点了。\n\n帕特雷的历史始于数千年前，同大多数希腊城市一样漫长而悠久。但凭借坐落地中海中心的优势，帕特雷一直都是重要的经济和工业中心。\n\n在希腊革命期间，帕特雷惨遭破坏，而在重建之后，这座古老的海港化身为巴尔干最现代化的城市之一，如同山丘哨兵一般，俯瞰着帕特雷湾与远方的爱奥尼亚海。"
 state_lore_initials.302: " NUK "
 state_lore_name.302: "努克"
 state_lore_desc.302: "努克——这座坐拥世界第一大岛却仅有七千余居民栖身的“最大城市”，近年间被动接纳了成倍增长的外来人口。曾经静默的渔港如今沦为冷战最出乎意料的牺牲品：没有独裁者的铁蹄践踏，亦无导弹与轰炸的嘶吼，却被冷暴力式的漠视所吞噬。\n\n从中石器时代便有人类在此繁衍生息，但真正使其名载史册的是1728年建立的戈特霍布要塞。即便在当时，这个殖民据点也不过是文明世界的边缘弃子。丹麦统治者以文化压制与经济桎梏将因纽特原住民推向赤贫深渊，如此畸形状态持续数百年，直到大西洋两岸的冷战阴云将这片冰川大陆推上战略高地。随着山姆大叔突然挥师占领格陵兰，数千美军如星火般散落各处军事基地，开启了新一轮殖民篇章。然而对于努克而言，只不过从昔日丹麦人的冷宫里，转入了美利坚帝国的遗忘角落。\n\n如今的努克在资金短缺、目光无视与尊严尽失的困境中挣扎。当环绕城郭的美军基地享受着优渥补给，这座命途多舛的城市却被其新晋宗主视为地缘棋局中的无名卒子。格陵兰全境的民众虽暂时屈从于苦难现实，但历史的经验昭示：压制的弓弦终有崩断之日。"
 state_lore_initials.303: " CAY "
 state_lore_name.303: "卡宴"
 state_lore_desc.303: "[Statelore_Get_cay_desc]"
 state_lore_desc.303_GUC: "巴西军队占领法属圭亚那已逾二十载，卡宴城始终不曾屈服。这座坐落于卡宴河入海口的殖民地最大城市，被占领当局设为行政中枢，空气中凝结的怨念几乎可咀嚼成块。数万巴西移民的涌入，更将这片土地化作南美洲怨气最炽的坩埚——在这块本就饱经殖民创伤的大陆上，如此苦涩的配方并不罕见。\n\n二战尾声，法国权威崩塌之际，巴西在美国视其为解决潜在隐患的默许下，挥师跨境夺取了这片殖民地。自此，法属圭亚那与卡宴陷入诡异的悬置状态：随着移民潮将这片土地与巴西本土越绑越紧，巴西利亚的财政输血不断注入地区发展，这片区域正不可逆转地坠入巴西势力范围的漩涡。卡宴固然因人口与就业机会涌入而获益，但当地区自治与文化特征日渐消逝，这份交易的酸涩远胜最初的甜蜜。\n\n法属圭亚那与卡宴的前景仍笼罩迷雾。这座城市早已摆脱昔日流放地的阴霾，狭窄街巷跃动着文化与生命的活力，居民生活品质持续提升，但这座困在历史夹缝中的城市，还能在钢丝绳上行走多久？"
 state_lore_desc.303_BRA: "历经二十年军事占领的卡宴城，早已褪去当年巴西刚接管时的边陲小镇模样。随着本地庄园主阶层逐渐坐大，军事管制的铁腕近年来悄然退居次席。最初前来淘金的割胶工们羽翼渐丰，开始用橡胶林构筑权力网络。操法语的克里奥尔原住民对此并不意外——圭亚那丰饶静谧的土地，谁能抗拒？正如当年在此拓殖的欧洲庄园主，巴西利亚的官僚们也放任诱人的橡胶产量涌入市场，对支撑原料产地的压榨体系视若无睹。对普通卡宴市民而言，在这新生的寡头统治下，生活不过比旧日略好半分。\n\n联邦层面，卡宴终被列为巴西“准州\"，即名义上拥有文官政府。尽管分离主义者质疑其法统，新圭亚那政府仍可自诩为巴西不可分割的组成部分——即便这是个区域性的少数派政权。自二战期间瓦加斯初次接管以来，当局始终致力于将卡宴居民塑造为亚马孙巴西人的同源群体，但法语克里奥尔人仍难与鲜少涉足本地事务的葡语主流族群产生认同。现行体制下，选举等公民权利仍是奢望，他们唯有勤习葡语，冀望两三代后能被视作真正的国民。"
 state_lore_initials.304: " THN "
 state_lore_name.304: "托尔斯港"
 state_lore_desc.304: "托尔斯港，法罗群岛第一大城市兼首都，在诸多层面上都是多次异族统治的产物。这座因中世纪贸易垄断政策而兴起的城市，在接踵而至的外来占领中几度沉浮。在近代历史的大部分时间里，它处于丹麦治下；二战伊始被英国接管，战争结束后又落入美国之手。1946年，它成为了《法罗群岛独立宣言》的签署地，继而升格为这个新生共和国的摇篮。\n\n如今，这座城市承载着这段复杂关系的所有馈赠与创伤。托尔斯港的百年建筑在美国资本的注入下焕发现代光彩，但街道上仍充斥着外国企业与OFN士兵的身影。究竟哪一面更能定义这座城市的本质？这不仅取决于观察者的视角，更是一场持续至今、剑拔弩张的政治角力。"
 state_lore_initials.305: " PBM "
 state_lore_name.305: "帕拉马里博"
 state_lore_desc.305: "荷兰的首都不该坐落在南美洲海岸。这种根本性错位本身就是一种原罪——宗主国的历史被强加于长期殖民的土地之上，流亡者的梦想更置于本地诉求之前。然而现状对当权的流亡者群体而言亦是慢性毒药：他们清醒地认知自己的身份，知晓故土的方向，也深知这片海外飞地与母国遥不可及的距离。这种撕裂感，让岁月在他们日渐衰老的躯体上刻下无情的印记。\n\n帕拉马里博则成为这场历史闹剧不情不愿的舞台。这座十七世纪殖民者在原住民村落遗址上建立的城市，本身就带着命运的讽刺。如今它已蜕变为多元文化熔炉：逃奴、印裔、克里奥尔人、爪哇人、原住民与荷兰殖民者后裔在此共生。现代民主政治在此生根发芽，议会选举竞争激烈；外资扶持的经济体系运转良好，让这座“苏里南的巴黎”保持着表面的光鲜。\n\n经济依附美国固然不尽如人意，活成荷兰的苍白倒影更非众人所愿，但环顾四周动荡的邻邦，帕拉马里博人不得不承认：当其他选项都显得更糟时，眼下的安稳未尝不是一种幸运。这座城市或许尚未找到完美定位，但至少在这片多舛的大陆上，它已为自己争取到难得的喘息之机。"
 state_lore_initials.306: "[Statelore_Get_antananarivo_initials]"
 state_lore_initials.306_normal: " ATR "
 state_lore_initials.306_colonial: " TNR "
 state_lore_name.306: "[Statelore_Get_antananarivo_name]"
 state_lore_name.306_normal: "安塔那那利佛"
 state_lore_name.306_colonial: "塔那那利佛"
 state_lore_desc.306: "[Statelore_Get_antananarivo_desc]"
 state_lore_desc.306_normal: "塔那那利佛在梅里纳王国统治下，是一座独树一帜的城市。它融合了欧洲和当地的独特风格，并依靠新兴的非洲贵族蓬勃发展。之后，法国人炸了一座宫殿，然后将这座城市占为己有。\n\n在法国人的统治下，塔那那利佛遭受了所有非洲殖民地都经历过的悲惨遭遇——城市的扩张，以及“现代化”。然而，维希政府失败了，他们的殖民地破旧萧条，官僚机构陷入困境。\n\n即使是现在，这座城市仍然留有殖民的伤痕。然而，一个崭新的共和国屹立于这座城的城墙上。慢慢地，它着手于修复、铺设和搭建。慢慢地，它咬牙坚持，继续前行。"
 state_lore_desc.306_colonial: "塔那那利佛在梅里纳王国统治下，是一座独树一帜的城市。它融合了欧洲和当地的独特风格，并依靠新兴的非洲贵族蓬勃发展。之后，法国人炸了一座宫殿，然后将这座城市占为己有。\n\n在法国人的统治下，塔那那利佛遭受了所有非洲殖民地都经历过的悲惨遭遇——城市的扩张，以及“现代化”。然而，维希政府失败了，他们的殖民地破旧萧条，官僚机构陷入困境。\n\n在塔那那利佛的城墙之外，暴力肆虐，自由战士试图再次创立他们的国家。人们只得希望他们能够打破这座城市的城墙，救其于水深火热之中。"
 state_lore_initials.307: " POS "
 state_lore_name.307: "西班牙港"
 state_lore_desc.307: "充满活力的西班牙港远不止是一处旅游胜地，更是维系西印度群岛联邦这一内讧不断的共同体之锚。作为特立尼达和多巴哥的首都及埃里克·威廉斯权力中枢的这座城市正处于上升期，但这一切都取决于它能否在汹涌浪潮中保持领先。\n\n数百年前西班牙人在此建立定居点的历史无需赘言，这里曾是蔗糖生产与奴隶贸易的枢纽。很快，它又成为列强殖民争夺的关键据点，最终从西班牙易手英国。随之而来的是新一波殖民者——来自当时英属印度的移民，与早已在此扎根的欧洲人、非洲人及原住民混居交融。\n\n当现代曙光降临，特立尼达自诩为世界上文化最交融之地，而其首都所属的国度亦堪称全球最多元国家之一。西印度群岛联邦在官方辞令中被美化为兼容并蓄，现实中被形容为机能失调，更被广泛传言濒临解体。这个将加勒比海旧殖民岛屿强行捏合而成的联邦，俨然是个僵持不下、争吵不休且四分五裂的政治实体，其存在似乎仅依赖于人们表面的认可。当然，西班牙港自身也面临困境——威廉斯的统治地位或许名正言顺，但他对种族问题的回避态度令多方不满，而联邦的羸弱更招致冷战各方势力的渗透干预。尽管如此，无可否认的是，整个世界仿佛在加勒比海岸的这座城市面前徐徐展开。倘若一切顺利，他们或许真能伸手触及并驾驭这片天地。"
 state_lore_initials.308: " GEO "
 state_lore_name.308: "乔治敦"
 state_lore_desc.308: "起初，定居此地的法国殖民者以隆尚命名之。荷兰将此地再度纳入治下后，易名斯塔布鲁克。尔后此地落入英国之手，更名乔治敦以彰显国王荣光。如今，英国人业已携家什离去，数以万计圭亚那人称此地为家园。\n\n即使名义为独立，玷污圭亚那数世纪之久的殖民主义实则并未离去。美国短暂占领遗留下该国同OFN盘根错节的联系，及置于美国掌控之下的经济。英国人已去，资本与商人却驻留于此。尽管圭亚那与欧洲远隔重洋，却不由得背负着冷战的忧虑，是为盘桓于其夙愿之上的阴霾。国境线旁，委内瑞拉人蠢蠢欲动，自恃可将所宣称的半数领土据为己有，只待该国与美国脱钩之时付诸行动。\n\n然而……乔治敦风平浪静，至少维系着脆弱的安宁。林荫大道与运河昭示着经济增长，街旁植被苍翠葱郁，市民安居乐业。立法机构或许分歧不休，国家或许危如累卵，这座城市本身却仿佛定格于世外桃源之景。如此景象是否不再，唯有时间能予以解答。"
 state_lore_initials.309: " STC "
 state_lore_name.309: "圣克鲁斯"
 state_lore_desc.309: "[Statelore_Get_santa_cruz_desc]"
 state_lore_desc.309_normal: "几十年前，圣克鲁斯-德拉谢拉还不过是赤贫的穷乡僻壤，地处玻利维亚最不宜居的地区中心。东北两面是沼泽地和疾病肆虐的草原；南面则是地狱般的查科。若不是此地发现了大量石油储备，这种情况还将一直持续下去。\n\n圣克鲁斯似乎是一夜间成为了一座重镇。它成为了查科争端的暴风眼，玻利维亚与巴拉圭不惜为其兵戈相向。结果是，此城在巴拉圭的监督之下成功独立。自那以后，一切都开始好转了。\n\n这座城市的变化天翻地覆，向着所有可能的方向扩张。暴利为城镇化与基础设施项目提供了资金，工业扩张紧随其后。防洪设施、大规模灌溉工程、崭新的铁路、桥梁和公路接踵而至，这座城市永远地被改变了。当目睹家乡巨变后的面貌时，那些曾经生活在圣克鲁斯-德拉谢拉贫民窟中的人们会发誓，他们看到的是一座今非昔比、如乌托邦般的城市。\n\n无需多言，如今圣克鲁斯-德拉谢拉享受着高水准的生活，经济与人口的繁荣似乎没有尽头，它是拉丁美洲发展最快的城市之一。"
 state_lore_desc.309_bolivia: "几十年前，圣克鲁斯-德拉谢拉还不过是赤贫的穷乡僻壤，地处玻利维亚最不宜居的地区中心。东北两面是沼泽地和疾病肆虐的草原；南面则是地狱般的查科。若不是此地发现了大量石油储备，这种情况还将一直持续下去。\n\n圣克鲁斯似乎是一夜间成为了一座重镇。它成为了查科争端的暴风眼，玻利维亚与巴拉圭不惜为其兵戈相向。结果是，此城在巴拉圭的监督之下成功独立，并持续了一段时间。\n\n在这期间，这座城市的变化天翻地覆，向着所有可能的方向扩张。暴利为城镇化与基础设施项目提供了资金，工业扩张紧随其后。圣克鲁斯-德拉谢拉享受着高水准的生活，经济与人口的繁荣似乎没有尽头，它是拉丁美洲发展最快的城市之一。\n\n如今玻利维亚政府已经恢复了对这座叛逆城市的控制，这种情况会改变吗？不会。石油毕竟还在那里，即使拉巴斯方面对开采石油课以重税。即使圣克鲁斯不再独立，它也拥有很大的自主权。即使圣克鲁斯不再是自己家园的主人，它对整个玻利维亚也有很大的影响力。所以它理应如此——圣克鲁斯如今是玻利维亚最富有的城市。这一点没有理由改变；黑金带来的增长将持续下去。"
 state_lore_initials.310: " BLZ "
 state_lore_name.310: "伯利兹城"
 state_lore_desc.310: "[Statelore_Get_belize_city_desc]"
 state_lore_desc.310_old: "昔日英属洪都拉斯的繁华首府伯利兹城如今已然支离破碎。1961年，飓风哈蒂横扫伯利兹城，为这座城市及其居民带来了深重苦难：70%的建筑被毁，整座城市沦为废墟。尽管当局尽全力支援重建工作，但伯利兹城要想重回往日的辉煌尚需很长时间。与此同时，伯利兹国民大会正激烈地争论：是否要搬离这片前人传下来的故土，转而找寻别处落地生根。"
 state_lore_desc.310_new: "伯利兹的历史首都如同浴火重生的凤凰一般归来了，而且胜于以往。作为伯利兹的旧都和经济中心，这座城市体现了中美洲面对大自然所表现出来的智慧和坚韧。尽管这座城市身为旧都仍驻留了不少大使馆，国民议会还是同意搬到其他地方，这样它就可以不受日常政治的影响而存在。"
 state_lore_initials.311: " BMP "
 state_lore_name.311: "贝尔莫潘"
 state_lore_desc.311: "伯利兹作为一个国家，经受了一次又一次的自然灾害，也让这个国家的政治精英经常担惊受怕。正是出于这个原因，贝尔莫潘被打造成伯利兹的新首都，这样即使飓风像1961年的哈蒂那样肆虐伯利兹城，国家也可以正常运作。作为一个相对较小且发展缓慢的城市，国民议会兴致勃勃地来到这座远离海洋的新城市，并将其视为伯利兹人民聪明才智的证明。"
 state_lore_initials.312: " SOS "
 state_lore_name.312: "滨海绍森德"
 state_lore_desc.312: "绍森德曾只是普里特韦尔村庄南端的一片荒滩，在一位地主出售了后来成为绍森德主街两侧的土地之前，这里不过是几户贫苦渔民棚屋的所在。随着驿站马车连通伦敦，酒店与度假场所渐次兴起；铁路的到来与卡罗琳公主的造访更助推了其发展。十九世纪，悬崖镇开发区与绍森德码头相继落成，吸引了无数夏日游客——时至今日，后者仍是全球最长的游憩码头。\n\n但这一切都已成为过往云烟。昔日的滨海绍森德是熙熙攘攘的海滨度假胜地，如今却在近年经济萧条的侵蚀下形同空壳。战前兴盛一时的诸多场所，如今已因无人维护而彻底荒废。"
 state_lore_initials.313: " DOV "
 state_lore_name.313: "多佛"
 state_lore_desc.313: "多佛是一座历史悠久的城市。从石器时代和铁器时代的远古居所，到凯尔特人和罗马人的城堡壁垒，再到盎格鲁-撒克逊人的到来。后来，诺曼人成为了这里的统治者，他们将多佛指定为五港同盟的一员，为它建立了抵御敌人进攻的要塞和引导船只往来航行的灯塔。在袭击者面前，多佛港是必须逾越的坚固堡垒。\n\n多佛抵挡住了拿破仑和法国的攻击，但却在德国人的铁蹄前败下阵来。在海狮行动中，多佛港是首日目标之一，在两周的抵抗后宣告沦陷。战后，德国和英国都认为多佛是重建中的首要工作之一，因此他们恢复了港口的辉煌。今天，多佛是除了伦敦和鹿特丹之外最重要的跨海峡航运港口。"
 state_lore_initials.314: " YRK "
 state_lore_name.314: "约克"
 state_lore_desc.314: "坐落于乌斯河与福斯河交汇处的约克城，自石器时代便有人类定居。罗马人称其为埃布拉库姆，维京人唤作约维克，诺曼人谓之埃弗维克——这座古城承载的异族征服印记多如繁星。对约克而言，德意志人不过是漫长征服者队列中的最新来客。\n\n战前岁月里，利兹与赫尔的光环使这座古城黯然失色，全赖铁路运输与糖果产业维系着存在感。不同于饱受闪电战轰炸摧残的赫尔，约克在战后迎来了蒂森克虏伯集团的垂青，其铁路网络得以大规模扩建。作为交通枢纽，约克至今仍是通往北方要地的重要门户，约克车站更是伦敦与苏格兰边境之间不可或缺的中转站。\n\n约克城墙诉说着帝国兴衰的沧桑史诗。今日城中精美建筑间虽点缀着克虏伯的商标，但昔日亦曾飘扬过罗马鹰旗与诺曼战旗。帝国或许会君临约克，但终究也会悄然退场。"
 state_lore_initials.315: " CJS "
 state_lore_name.315: "华雷斯城"
 state_lore_desc.315: "华雷斯城，自由人的避难地、共和国的守护者。在法国干涉的战火硝烟中，曾在格兰德河岸边昏昏欲睡的军团和要塞实现了自己的伟大，正是在此处，贝尼托·华雷斯担起领袖之责，与外国暴君展开了艰苦卓绝的斗争。时光飞转，地处美墨边境的华雷斯城日渐繁荣，但仍然是自由战士们栖身的绝佳之处：马德罗、卡兰萨、维拉，他们都异常重视这座城市的象征意义、后勤物流和经济上的重要性。\n\n如今，华雷斯城的未来看似愈发光明。边境工业化项目带来了河对岸的美国公司和就业机会，新殖民主义架构的美化项目在此推行：华雷斯城是墨西哥北方的中心，成千上万的墨西哥移民和美国游客纷至沓来。这座拥有悠久反抗传统的城市正经历着迅猛蓬勃的经济发展，华雷斯城正越来越贴近人们想象中墨西哥的模样。"
 state_lore_initials.316: " TRC "
 state_lore_name.316: "托雷翁"
 state_lore_desc.316: "在一个历史悠久到早于哥伦布发现新大陆时期的国家当中，建立于1907年的托雷翁城也许就像是时间长河当中的一叶孤舟般渺小。然而，铁路建设带来的爆炸性人口增长以及潘乔·比利亚的战斗传奇将托雷翁城留了地图上。不过更臭名昭著的则是她见证了当地对华人居民的迫害的开始，托雷翁大屠杀导致了城中的亚洲人大量遇害。\n\n如今，托雷翁城是科阿韦拉州最大的城市之一，在纺织品、服装还有金属加工领域发展迅猛。优秀的水利工程也给该地的农业和棉花加工提供了不错的条件。就像任何一座北方城市一样，牧场距离托雷翁城不过一箭之隔。对一座在人们记忆当中曾只有290人的小镇来说，这并不坏。"
 state_lore_initials.317: " OAX "
 state_lore_name.317: "瓦哈卡"
 state_lore_desc.317: "瓦哈卡山谷曾一次又一次地沦于暴君统治，占领和苦难构成了当地历史的主旋律。瓦哈卡人曾一次又一次地抵抗，期待着世界会有所不同。然而，西班牙的到来没有改变这里；建国独立没有改变这里；甚至哪怕是瓦哈卡土生土长的儿子贝尼托·华雷斯击败了入侵的法国人，也没能改变时局；马贡主义者的运动也没能为这里留下长久的变化。\n\n今天的瓦哈卡不过只是墨西哥南部一座普普通通的城市，每年都有越来越多的贫穷土著农民迫于农村恶劣的生活条件蜂拥而至。这些人远远超出了城市原有的承载能力，他们挤进不断扩大蔓延的城市，加入了这里的失业大军。随着人口增长，对土地和自由的渴望再度萌芽。瓦哈卡已准备好一如既往地奋勇战斗，像祖先一样勇敢地面对暴政。"
 state_lore_initials.318: " REX "
 state_lore_name.318: "雷诺萨"
 state_lore_desc.318: "在北方封锁南方邦联的岁月里，塔毛利帕斯州北部曾一度成为得克萨斯州的整个世界。如今封锁虽已解除，美国内部的纷争亦一定程度上得到解决，但雷诺萨及其周边城镇再度成为通往世界的门户。\n\n科阿韦拉的银矿原石与煤炭运往新拉雷多，新莱昂州的钢材与汽车零件输向雷诺萨，塔毛利帕斯的棉花与石化产品直抵马塔莫罗斯。这些物资与共荣圈的商品在此汇聚，而河对岸的美国城镇亦以自有资源进行公平贸易。格兰德河入海口这片区域，其文化多元性与经济活力举世罕见——只要地理格局不变，这份特质便将永续长存。"
 state_lore_initials.319: " CPE "
 state_lore_name.319: "坎佩切"
 state_lore_desc.319: "坎佩切州圣弗朗西斯科这座小城市从来没有太大的变化。这里曾经是西班牙早期殖民活动的聚集地，保留了数量惊人的殖民时代建筑，从要塞工事到历史悠久的教堂，再到安达卢西亚和卡里根风格的住宅。郁郁葱葱的原始丛林环抱城市，许多玛雅和前哥伦布时代的遗迹触手可及：对于想要饱览尤卡坦半岛悠久历史的游客而言，这座城市无疑是一颗瑰丽璀璨的宝石。\n\n不幸的是，停滞不前的坎佩切只适合游客遍赏风光。这里的许多居民仍然如同数百年来一样，被困在咖啡园里拼命劳作，把浸满汗水的劳动成果送到他们永远都不会踏足的土地，但只能得到劳动价值的一小部分作为回报。坎佩切还会像以前一样，保存已然渐渐倾圮的殖民时代建筑吗？有人想要修复这座城市，而有人想要彻底改变这里……"
 state_lore_initials.320: " CVJ "
 state_lore_name.320: "库埃纳瓦卡"
 state_lore_desc.320: "小城镇往往拥有着悠久的历史。追溯到前西班牙时代，频频化作战场的库埃纳瓦卡就一直是重要的文化发展地，阿兹特克人与邻近民族在此发生的冲突不胜枚举。科尔特斯在这里建造最初的殖民地建筑，叛乱分子在动荡的后革命时代在这里站住了地盘，盘踞于此的萨帕塔威胁着国会大厦，美国侨民则在战间期四处游荡。\n\n新时代降临于这座沉睡的城市。长久以来，库埃纳瓦卡都是连接墨西哥城和墨西哥山谷其他地区的重要纽带。如今，比以前在此战斗的军队都要更强大的新事物来了：公路。每天，沥青都会延伸数英里，越来越多的人蜂拥而至。铺设公路、为车辆提供服务，这就是库埃纳瓦卡的使命。数百年以来，人们在这里战斗牺牲；现在，公路将把这片土地连接成为一体。"
 state_lore_initials.321: " YNT "
 state_lore_name.321: "烟台"
 state_lore_desc.321: "在古老中国的渤海之滨，有一个地方见证了北洋水师的兴起与覆灭，它就是曾经的威海卫，抵御外国侵略者的海岸要塞。但自觊觎这里战略地位的英国人将它夺去后，它的命运就走上了另一条轨迹。再后来，日本又凭借着蛮力将威海卫纳为己有。\n\n如今，这里是烟台市的一部分，充当中华民国的一处海军基地，俯瞰着孔孟之乡山东。然而，正如接受武士“指导”的诸多城市一样：港口中虽仍停泊着钢铁艨艟，但无人以此为豪，因为这舰队并非他们的守护者，而是中国逝去荣光的象征。"
 state_lore_initials.322: "[Statelore_Get_warsaw_initials]"
 state_lore_initials.322_GGN: " WAU "
 state_lore_initials.322_POL: " WAW "
 state_lore_name.322: "[Statelore_Get_warsaw_name]"
 state_lore_name.322_GGN: "华绍"
 state_lore_name.322_POL: "华沙"
 state_lore_desc.322: "[Statelore_Get_warsaw_desc]"
 state_lore_desc.322_GGN: "华沙，在第一次世界大战的烈火中重生的波兰民族选择了这里，直到1939年以前，她一直是这个不屈民族引以为傲的首都。华沙居住着近130万人口，其中包括约35万犹太人，是象征波兰文化和历史的繁华之心。\n\n在德国人眼中，这一切不过是在这个饱受磨难的城市身上画了个大大的指标。华沙自被占领之日起就一直处于系统性的人口灭绝和破坏计划之下，居民有些饿死街头，其他不是逃往其他城市，就是流亡乡野，在没被德国奴隶种植园占据的土地上艰难求生。当然，那35万犹太人的下场更为悲惨。\n\n如今，这座曾经辉煌的城市被德国人称作华绍。如今的她形容枯槁、一蹶不振。这一切再清楚不过，她正是这个民族命运的象征。"
 state_lore_desc.322_POL: "华沙，在第一次世界大战的烈火中重生的波兰民族选择了这里，直到1939年以前，她一直是这个不屈民族引以为傲的首都。华沙居住着近130万人口，其中包括约35万犹太人，是象征波兰文化和历史的繁华之心。\n\n在德国人眼中，这一切不过是在这个饱受磨难的城市身上画了个大大的指标。华沙自被占领之日起就一直处于系统性的人口灭绝和破坏计划之下，居民有些饿死街头，其他不是逃往其他城市，就是流亡乡野，在没被德国奴隶种植园占据的土地上艰难求生。当然，那35万犹太人的下场更为悲惨。\n\n但是，百般折辱之下，总有一丝希望。华沙再次成为独立波兰的首都，此刻的她武装到牙齿，准备再一次直面欧洲之主。没有什么能带回昔日的城市，也没有什么能让时光倒流回1939年前。但也许，一个新的华沙会从旧的灰烬中重生——正如波兰民族一般。"
 state_lore_initials.323: "[Statelore_Get_lviv_initials]"
 state_lore_initials.323_GGN: " LMB "
 state_lore_initials.323_POL: " LWO "
 state_lore_initials.323_UKR: " LVI "
 state_lore_name.323: "[Statelore_Get_lviv_name]"
 state_lore_name.323_GGN: "伦贝格"
 state_lore_name.323_POL: "利沃夫"
 state_lore_name.323_UKR: "利沃夫"
 state_lore_desc.323: "[Statelore_Get_lviv_desc]"
 state_lore_desc.323_GGN: "这座城市有过许多主人，也有过许多名字。它一开始叫做利维哥罗德，以建城者的继承人命名。而后来的几个世纪里，这里为人所知的名字则是波兰语的利沃夫。在波兰立陶宛联邦治下，利沃夫发展成一座繁荣的城市，越来越多的波兰人到这里居住。1772年，利沃夫又成为奥匈帝国的一部分，得到了又一个新名字：伦贝格。但是，城市的繁荣并未因此中断。\n\n然而，二十世纪对伦贝格并不友好。城市的厄运始于第一次世界大战中被俄国人占领——此时，它的拼写又发生了变化——随即，这里又见证了波兰第二共和国对加利西亚的血腥吞并。乌克兰人、俄罗斯人、波兰人、德意志人之间的种族冲突永无休止，繁荣岁月已是过去的梦幻。\n\n在总督府治下，伦贝格的存续已然岌岌可危。政府试图利用种族矛盾为己谋利，于是对乌克兰民族主义者相对宽容，放他们到这里来治理加利西亚。不过，考虑到波兰人和乌克兰人之间剑拔弩张的关系，这座城市的未来恐怕要蒙上一层阴影。"
 state_lore_desc.323_POL: "这座城市有过许多主人，也有过许多名字。它一开始叫做利维哥罗德，以建城者的继承人命名。而后来的几个世纪里，这里为人所知的名字则是波兰语的利沃夫。在波兰立陶宛联邦治下，利沃夫发展成一座繁荣的城市，越来越多的波兰人到这里居住。1772年，利沃夫又成为奥匈帝国的一部分，得到了又一个新名字：伦贝格。但是，城市的繁荣并未因此中断。\n\n然而，二十世纪对伦贝格并不友好。城市的厄运始于第一次世界大战中被俄国人占领——此时，它的拼写又发生了变化——随即，这里又见证了波兰第二共和国对加利西亚的血腥吞并。乌克兰人、俄罗斯人、波兰人、德意志人之间的种族冲突永无休止，繁荣岁月已是过去的梦幻。\n\n如今，随着波兰起义的胜利，伦贝格再次变成了利沃夫，意图重现昔日的辉煌。然而，对这里有着不同称呼的乌克兰人却不打算将这座城市拱手让予宿敌。看来，只有洒下更多的鲜血，才能让这片苦难的土地重获和平。"
 state_lore_desc.323_UKR: "这座城市有过许多主人，也有过许多名字。它一开始叫做利维哥罗德，以建城者的继承人命名。而后来的几个世纪里，这里为人所知的名字则是波兰语的利沃夫。在波兰立陶宛联邦治下，利沃夫发展成一座繁荣的城市，越来越多的波兰人到这里居住。1772年，利沃夫又成为奥匈帝国的一部分，得到了又一个新名字：伦贝格。但是，城市的繁荣并未因此中断。\n\n然而，二十世纪对伦贝格并不友好。城市的厄运始于第一次世界大战中被俄国人占领——此时，它的拼写又发生了变化——随即，这里又见证了波兰第二共和国对加利西亚的血腥吞并。乌克兰人、俄罗斯人、波兰人、德意志人之间的种族冲突永无休止，繁荣岁月已是过去的梦幻。\n\n今天，利沃夫已经回到了它的根，新的统治者如是说着。他们坚持认为，波兰人占据这座城市几个世纪，但利沃夫的灵魂永远都属于曾经的鲁塞尼亚、今天的乌克兰。在近千年的外国统治间，成千上万勤劳的乌克兰农民耕种土地，供养着这座城市。如今，加利西亚的旗帜正是为他们而飘扬在利沃夫的上空。"
 state_lore_initials.324: " CTG "
 state_lore_name.324: "卡塔赫纳-德印第亚斯"
 state_lore_desc.324: "雄壮的卡塔赫纳-德印第亚斯，镌刻于历史长河之中的坚固堡垒。这座被人们亲切地称为“英雄之城”的城市诞生在命中注定的1533年7月1日，她坚定地矗立在玻利瓦尔省的最北端，自谓首都。纵观历史，卡塔赫纳屡次面对战火考验，英勇抵抗外敌入侵。她的海岸见证了无数战将的勇武，他们毫不退缩地守卫城市的荣誉，先是对抗胆大妄为的英国掠夺者，后又在革命风暴中与西班牙王室抗争。故此，这座城市的诸多称号可谓当之无愧。\n\n然而，二十世纪的考验却让这哥伦比亚的珍宝蒙上阴霾。临近的巴兰基亚在蓬勃发展，卡塔赫纳则经受着逆境的残酷打击。受近年“暴力时期”重创之后，这座坚韧的城市正努力重建辉煌，以坚定的希望再度迈向繁荣。今天，它是哥伦比亚的主要军事港口，守护着她曾经作为各方军队进出的战略要地的历史。\n\n在卡塔赫纳的古老街道中，英烈的声音仍在空中回响，而在其灵魂深处，抵抗的精神依然长盛不衰。"
 state_lore_initials.325: " BGA "
 state_lore_name.325: "布卡拉曼加"
 state_lore_desc.325: "带着对进步孜孜不倦的追求，布卡拉曼加终从灰烬中崛起，迎来自己的春天。点缀各处的葱郁公园不断为城市注入新的活力，桑坦德省这熙攘的工业城市早已今非昔比，不过旧日记忆仍在时光长廊中若隐若现。\n\n回望历史，1622年12月，人们建立了布卡拉曼加这一不起眼的前哨站，以支撑潘普洛纳省日益繁荣的采矿业。自一开始，这座城市就经历了风风雨雨：在动荡的第一共和国时期这里饱受内战的蹂躏；而在黑暗的“暴力时期”，市郊又爆发了多场战斗。但它始终坚韧不屈，最终克服了困难种种，成为了哥伦比亚最负盛名而又受人喜爱的中心都市之一。\n\n然而，历史的伤痕依然刻骨铭心，布卡拉曼加默默见证了诸多骇人听闻的种族灭绝暴行和无数的颠沛流离：此处的原住民社群蒙受了难以言表的恐怖；德国移民因1846年叛乱而流离失所。尽管如此，这些悲伤过往盖不住这座城市的倔强。有这些坚定不移而又不屈不挠的市民做后盾，布卡拉曼加将继续展翅高飞。"
 state_lore_initials.326: " MDE "
 state_lore_name.326: "麦德林"
 state_lore_desc.326: "麦德林，迷人的四季春城，工业化大生产将旧日奇迹化作日常。在祥瑞的1616年3月2日，安蒂奥基亚的征服者豪尔赫·罗夫莱多建立了该城。时至今日，麦德林已经成长为一个活力四射而又颠覆想象的国际大都会。这曾鸡犬不相闻的城市，如今成了不屈不挠进步的见证者。\n\n风景如画的亚布拉谷将麦德林捧若珍宝，雄伟的群山将其拱卫，这哥伦比亚的经济工业重镇，也是派萨文化的中心。安蒂奥基亚人民在此举办各类奢华庆典，骄傲展示着不挠的骨气与不懈的热情。有别该国许多地方，麦德林很大程度上免于“暴力时期”的魔爪：法西斯民兵渗透南部谷地的尝试失败了。因此尽管重要合作社大量迁往考卡河谷，麦德林也仰仗这份和平安宁得以繁荣昌盛。\n\n麦德林不断攀升的天际线，正是安蒂奥基亚人民坚定不移意志的见证。是他们建设了这哥伦比亚第一的工业经济体，这独属他们的欢乐与骄傲之源。"
 state_lore_initials.327: " IBE "
 state_lore_name.327: "伊瓦格"
 state_lore_desc.327: "伊瓦格，有时被誉为哥伦比亚的民俗圣地，她的根源与永无止境的冲突、清洗和种族屠杀的惨淡历史相互交织。这座城市初建于1550年，最初名为圣温弗里德堡（圣博尼法斯的伊瓦格堡）；相较于卡尔达斯等其他城市，这座久经挣扎的城市或许稍显逊色，但她一直屹立在战事的最前线。她见证了西班牙殖民者与坚忍不拔的皮豪土著间爆发的剧烈摩擦，连绵的战火催生出莫汉这样的传说形象。后来，在哥伦比亚血腥的十九世纪，伊瓦格又沦为自由派与保守派的交锋之地。\n\n时光更迭，伊瓦格的近代篇章愈发黯淡。她是军队和法西斯民兵较量的关键战场，深陷镌刻于美洲历史的社会清洗的恐怖情景之中。军队和令人闻风丧胆的丘拉维塔民兵都将矛头对准了他们眼中的“叛徒”，为了所谓胜利不择手段肆意猎杀，致使无数市民流离失所。\n\n伊瓦格，这历经三百年风雨、被无尽的战乱与纷争摧残的城市，进入六十年代又卷入了另一场冲突，却以哥伦比亚文化灵魂的身份求得了慰藉。她傲然展示自身的饮食文化，举办盛大的国家庆典，与喜闻乐见的音乐形式和声共鸣。冲突再次爆发的阴霾之下，她的未来尚未可知——但伊瓦格城边的巍峨雪山，仿佛以某种坚韧，预示着她的命运。"
 state_lore_initials.328: " MZL "
 state_lore_name.328: "马尼萨莱斯"
 state_lore_desc.328: "可敬的马尼萨莱斯，在19世纪兵荒马乱的哥伦比亚中抵御了南方自由派无数次围攻，在饱受战争之苦的民众中赢得了“鹰巢”的美名。自1849年建城以来，马尼萨莱斯迅速发展为一座经济重镇，并自卡尔达斯省于1905年成立就光荣地履行着其首府的职能。而在过去十年，马尼萨莱斯的变化也惹人注目，她褪去了旧的建筑与文化外衣，转而拥抱新个性。这曾围教堂而建的小城，如今工厂与混凝土建筑连甍接栋，固若金汤的聚居地主宰着城市全景。\n\n但好运不常在，在黑暗的“暴力时期”，马尼萨莱斯的主子变化无常。保守派和法西斯民兵首先控制了这座城市，但遭到了国民军的猛烈反击。战火肆虐，直至1956年的停火，动乱仍频的马尼萨莱斯似乎成了法西斯党的囊中之物。然而天数有变，控制全市乃至全省的最高经济委员会和国家法西斯党间的内部权力斗争造成了管辖真空，英勇的何塞·华金·马塔利亚纳抓住这一机会，于1960年初带领国民军策划了一次大胆的入侵，迅速控制了马尼萨莱斯和整个卡尔达斯省。马尼萨莱斯看来注定要成为一场无止境战争的前线。"
 state_lore_initials.329: " PSO "
 state_lore_name.329: "圣胡安-德帕斯托"
 state_lore_desc.329: "命运多舛的1559年，圣胡安-德帕斯托奠基于风景秀丽的阿特里斯山谷；长久以来，她一直是分歧与偏见的焦点所在。在争取独立的斗争中，帕斯托成为保皇派的坚实壁垒，对帕斯托人的仇视与偏见由此产生。他们背负起叛徒的骂名，受尽了迫害与冷落，在哥伦比亚血腥的十九世纪忍受着历届政府的愤怒。仅仅提及帕斯托的存在便能激起一池怒涛，仿佛国家集体记忆中挥之不去的污点。\n\n1904年，纳里尼奥省成立并尊帕斯托为首府，希望的曙光曾一度出现。然而，这一抹微光却在1944年迪奥赫内斯·希尔对总统阿方索·洛佩斯的荒唐政变中迅速熄灭。安全法与诸多限制接踵而至，如重重枷锁扼杀了她的精神。之后，便是“暴力时期”的至暗时刻，玻利瓦尔的复仇欲望——把帕斯托变成军事殖民地——得以实现，帕斯托成了一个饱受压制和严密监视的边境地带。至今，它仍是新格拉纳达国家中最受压迫的地区之一，其居民受到严格审查和政治打压，唯有神圣的宗教地标能免受残忍镇压之苦。"
 state_lore_initials.330: " PPN "
 state_lore_name.330: "亚松森-德波帕扬"
 state_lore_desc.330: "德波帕扬，著名的“白城”，是哥伦比亚的天主教圣地，也是拉丁美洲著名的宗教雕塑艺术的创作中心。这座城市建于1537年，巍峨的主教座堂和令人生畏的宗教建筑装点其间，守护着曾经属于西班牙帝国的宗教瑰宝和古代典籍，这其中就包括名震天下的安第斯王冠。\n\n时间在德波帕扬织出一幅永恒的织锦，以十足的坚韧抵御了暴力时期的动荡和哥伦比亚历史的变迁。城市伫立于绿意盎然的田野之间，恪守古老的传统，没有高楼大厦，也无现代都市的喧嚣。这或许是上天眷顾，令帕亚尼斯人得以远离都市化的繁忙与纷扰，又免受荼毒国家的战乱之苦。\n\n在这片和谐的净土，时光仿佛放慢了脚步，让城市的原本魅力得以保留，居民也都保持着怡然宁静的生活节奏。作为传统和信仰的坚定代表，德波帕扬的街头巷尾都承载着诚善勤毅的信仰故事。在永恒的守护之下，“白城”继续吸引着来自世界各地的游客，教他们沐浴她神圣的光环，沉浸于眼前活生生的历史。"
 state_lore_initials.331: " VVC "
 state_lore_name.331: "比亚维森西奥"
 state_lore_desc.331: "比亚维森西奥是拉诺斯文化充满活力的中心，是哥伦比亚景观中与世隔绝的堡垒。这座城市坐镇东部平原门户，仿佛伫立在奥里诺科河盆地中的孤独哨兵。她的确切建立时间至今仍是未解之谜，但据史书记载，1840年，比亚维森西奥被波哥大省议会正式确立为自治市，其共和国城市的地位随之奠定。在此前的殖民时期，这里只是耶稣会的一个传教中心，连接临近的庄园，助力农产品向城镇流通。\n\n比亚维森西奥位于雄伟的安第斯山脉以东，又有蓬勃发展的石化工业，令她远离了暴力时期的恐怖景象。毁灭性的动乱在西部和北部肆虐，这座城市却免受了内乱的冲击。但这并不妨碍它成为了像瓜达卢佩·萨尔塞多和伊绍罗·约萨这样的革命领袖的集结之地，正是从这座城市及其周边地区，他们召集起大批的支持者。"
 state_lore_initials.332: " DND "
 state_lore_name.332: "邓迪"
 state_lore_desc.332: "黄麻、果酱、出版业：三个词，三颗心脏。\n\n这就是苏格兰的港口都市邓迪，也是这里能够在蹂躏英伦三岛的军靴之下依苟活的原因所在。或许在另一个时代，黄麻磨坊会因外国竞争而销声匿迹，但它们现今仍在嘎吱作响，呜咽抽泣，为二十年前击败英国的军事强权提供廉价的绳索和纺织品。邓迪的出版社曾经为伟大的英国人民奉上真理，但现在却只能出产日耳曼尼亚制造的谬论，沦为唐宁街乃至团结协定利益的喉舌。这是一座饱尝失败之苦的城市。\n\n不过，假如传言不虚，那么希望就仍然存在。邓迪人从不轻言放弃。在某处偏僻的小巷里，你或许能偶然捡到一份国内印刷的《华盛顿邮报》；如果是更幽深的地方，那甚至还会遇到奇异的事物：并非是当地特产的果酱，而是驻军的鲜血。邓迪的三颗心脏已经沾染了污浊，但它的灵魂仍未屈服。当时机到来，它将再次为人民带来欢乐。"
 state_lore_initials.333: " YJI "
 state_lore_name.333: "延吉"
 state_lore_desc.333: "自日本占领以来，朝鲜民族从未放弃独立的希望。1919年“三一运动”失败后，抵抗运动的重心就转移到了半岛之外。间岛，本意“江中小岛”，由于朝鲜族人口众多，这里成为了中国东北地区朝鲜独立运动的重要基点。1920年大屠杀并未熄灭朝鲜人民的精神，三十年代以来，在中国共产党的支持下，当地朝鲜人曾发动数次武装起义，遭到了奉军和日本的残酷镇压。幸存者北上遁入东北腹地，继续着自己的斗争。\n\n满洲国成立后，朝鲜移民潮纷至沓来，日本人也进驻当地以镇压反抗。数十年来，满洲国军中以朝鲜人为主的间岛特设队始终残酷地镇压着同族的人民，血腥的过往仍留在这座城市的记忆中，挥之不去。"
 state_lore_initials.334: " ULK "
 state_lore_name.334: "乌兰哈达"
 state_lore_desc.334: "“红山”、乌兰哈达、赤峰。数百年来，归功于在此开垦土地的华北移民，契丹辽朝的龙兴之地始终繁荣昌盛、熙熙攘攘。然而，现如今，鸦片占据了这里的大片沃土，粮食产量长期不足。\n\n在满洲国的威逼利诱下，许多农民放弃了粮食种植，转而播下了罂粟种。耕地被挪用生产鸦片，粮食作物则只能在贫瘠的坡地上艰难生存。这导致了农业经济崩溃、农民流离失所、还有大规模的饥荒。\n\n如今，乌兰哈达已经成了罂粟的王国，瘾君子的安乐窝。大烟馆内，烟雾缭绕，道德与准则在虚实之间隐匿无踪。"
 state_lore_initials.335: " ANS "
 state_lore_name.335: "鞍山 £GFX_anshan_texticon "
 state_lore_desc.335: "鞍山的地下蕴藏着丰富的铁矿矿藏，开采历史甚至可以追溯到汉朝。然而，兴起于中国东北的清王朝在百年间插柳结绳，禁止在龙兴之地采矿。清王朝灭亡后，鞍山也就此遗弃。\n\n但是，满铁在当地发现大量铁矿贮存后，一切都变了。鞍山制铁所于1919年成立，不久后又改组为昭和制钢所。为了所谓“工业用途”，满铁兼并了大片土地扩建居民区，最终形成了今天的鞍山市。\n\n满业成立后，昭和制钢所的控制权转入其麾下，直至今日。作为全球钢铁制造业的领头羊，鞍山城提出了一个发人深思的问题：它的生存，究竟是取决于以外国天皇命名的钢铁厂，还是取决于当地民众日日夜夜的辛劳与付出？"
 state_lore_initials.336: " FSN "
 state_lore_name.336: "抚顺 £GFX_fusi_texticon "
 state_lore_desc.336: "抚顺，意为“抚绥顺导”，在它平静的表面下，潜藏着一个漆黑的秘密：一股强大的黑金之力正在蠢蠢欲动，蓄势待发。\n\n日俄战争让日军攫取了这座城市，煤炭需求激增，抚顺的煤矿也随之变得多了起来。贪图煤炭的满铁开出一个个矿坑，越挖越深、越挖越广，这些矿坑终于合而为一，形成一个巨大的深渊——西露天矿，它是亚洲最大的露天煤矿，也是满洲煤炭工业的巅峰。\n\n抚顺是有福的，因为她坐落在储量不可计数的煤炭与石油之上。抚顺是有祸的，因为她以发展之名扫平了许多村庄。有些悄无声息自此被人遗忘，有些被愤怒的子弹刺刀从历史中抹去。幸与不幸，欲与毁灭，在此相伴相随。然而，这一切都浸满血泪——浓重的血腥味，自平顶山、栗家沟和千金堡的旧址散发出来。"
 state_lore_initials.337: " BXH "
 state_lore_name.337: "本溪湖"
 state_lore_desc.337: "本溪湖市得名自世界上最小的天然湖泊。但在这座城的地下，埋藏着全世界有史以来最严重的矿业悲剧——本溪湖煤矿事件。\n\n随着日本在满洲的势力扩张，日本全盘控制了这座原本是中日合办开采煤铁资源的煤矿。1942年4月26日，瓦斯煤尘爆炸。日本管理方封锁了矿井，切断了空气供应，导致一千五百多名矿工缓慢而痛苦地死去。日本人只在乎一个人，把他救起——一个享有特权的日本监工。\n\n但没人来讲述这段历史。它被深藏遮蔽、不为世人所知，也许会一直这样下去。在共荣的旗帜下，深埋地底痛苦死去的矿工发出的呼喊在历史的重压下湮灭，成为发展与进步的宏大叙事中被遗忘的一章。"
 state_lore_initials.338: " QQH "
 state_lore_name.338: "齐齐哈尔 £GFX_qiqihar_texticon "
 state_lore_desc.338: "数个世纪以来，齐齐哈尔一直是北满的心脏与灵魂，扼四达之要冲、为诸城之都会。它是北满地区文明的交融之处，满洲国皇后婉容的血脉郭布罗家族正是发源于此。\n\n九一八事变，关东军施暴虐于辽吉，还图谋吞并黑龙江。但在齐齐哈尔，马占山将军挺身而出，领导了江桥战役，打响了中国军队有组织抗击日本侵略者的第一枪。尽管江桥抗战最终失败，但这场战斗激起了无数人民的斗志。人们从此知道，中国不会亡——他们会战斗下去，向着希望的光芒。\n\n齐齐哈尔活了下来，但她已是今非昔比。在东郊，潜藏着一个可怕的秘密。嫩江啜饮着它的黑暗，混沌与污浊在水体中静静扩散。"
 state_lore_initials.339: " JLN "
 state_lore_name.339: "吉林"
 state_lore_desc.339: "吉林城因水而生，旧称“吉林乌拉”，意为“沿江之城”。旧日列国在此地建立了码头和海军基地，制造运输军队、货物和贡品的船只。这里也是清政府建造战舰，训练水师的据点。\n\n然而，满洲的大城市都有着迭起兴衰、新旧更替的历史。就像傲立北疆的齐齐哈尔被俄国人建立的哈尔滨夺去风头一样，曾是南满数一数二大都市的吉林也被日本人建立的新京取而代之。列强塑造并粉碎了满洲的命运，满洲人民却只能听任命运的摆布。\n\n纵使百年间风云变幻，吉林仍是一座因河道交汇而生、由历史浪潮塑造的城市。在吉林的街头巷尾，回荡着那些早已被遗忘的古老传说，回荡着荒废已久的村落的低语，回荡着商人与士兵的呢喃，还有那些，编织起此城地基的梦想。"
 state_lore_initials.340: " BHR "
 state_lore_name.340: "伯力 £GFX_bohori_texticon "
 state_lore_desc.340: "伯力位于黑龙江和乌苏里江的交汇处，战略地位极其重要，得伯力便可遥控广袤的外满土地。然而，《北京条约》将其割让给俄罗斯帝国。它被改称哈巴罗夫卡，然后是哈巴罗夫斯克，来源于俄罗斯入侵者、第一个觊觎这片土地的人，叶罗菲·哈巴罗夫。俄国人在这片土地上建立起城市和军营，吸引了想要升官发财的移民。铁路连接港口，工厂带来革新，几十年过去，这里成了外满最重要的交通枢纽和工业中心。\n\n但和平与安宁总是短暂，伯力的命运未曾注定。消息传来，苏联崩溃，远东在混乱与动荡中折腾了好几个年头，直至五十年代的干涉让她回归到爱新觉罗家族的统治之下。至少形式上是这样。\n\n然而，在这片被权力的浪潮反复席卷的土地上生存下来的人民，才是自己命运的主人。不管他们叫她伯力还是哈巴罗夫斯克，不管他们是效忠帝国还是共和国，他们都坚守着自我。满洲国紧握着伯力的缰绳，但身下的马儿和她统御的广大人民一样，早已精疲力竭。"
 state_lore_initials.341: " B-L "
 state_lore_name.341: "[Statelore_Get_brest_name]"
 state_lore_name.341_GER: "布列斯特-立陶夫斯克"
 state_lore_name.341_UKR: "布列斯特-立陶夫斯克"
 state_lore_desc.341: "[Statelore_Get_brest_desc]"
 state_lore_desc.341_GER: "现在，几乎没有证据能证明战前布列斯特-立陶夫斯克有近一半的人口是犹太人。这里没有犹太学校、商店、犹太教堂或墓地。墓碑上没有犹太人的名字，巴伐利亚风格的图书馆里没有犹太书籍，也没有犹太劳工。德国人觉得，要是还不能在伊甸园里过上躬耕农亩的生活，那他们在东方的铁路枢纽至少看起来得像是他们的家乡。所以，布列斯特-立陶夫斯克的犹太人被运往索比堡，要么被党卫队和乌克兰仆从军带到布罗纳古拉的屠杀场，要么在隔都里被枪杀、毒毙、殴打和谋杀——现在那里成了个柏林风格的公寓群。\n\n如今，布列斯特-立陶夫斯克是铁路枢纽，排列着满载谷物开往德国的火车。当他们停下来加煤的时候，乌克兰和白俄罗斯的机械师们在不动声色的抗拒中默默工作。他们低声谈论着往日的城市，谈论着过去的事情。他们吃着几片肉干，打卡下班，从德国士兵身边走过，回到安静的家和床上。下里，那些劳累不堪、一无所有的人都在苦苦思索，他们能为明天、为今天做些什么。他们不时啜泣，但一到清晨，他们就擦一擦脸，忘掉这一切，然后继续劳作。"
 state_lore_desc.341_UKR: "掐紧脖子，勒住气管，德国宣告窒息。铁道工的模范园，已经不再。布列斯特-立陶夫斯克再度属于乌克兰。铁锈煤尘的灰黑换成了蓝黄，大地上冒出斑斓的颜色。兴高采烈的市民含泪高歌，悼念失去的亲人，他们相互鼓舞继续前行。这座城市自由而快乐，尽管她已是满目疮痍。\n\n德国既已败退，重建城市和牢记历史便成了眼前的任务。布列斯特-立陶夫斯克的人民不能坐以待毙。边界太近，美丽的地平线又太遥远。此时此刻，需要力量与联结，需要在巨大的困难面前团结一致，需要无人敢于忘却的勇气。那艰辛劳苦、一无所有的人，不再低头俯首。眼泪已经流尽，所余唯有鲜血。"
 state_lore_initials.342: "[Statelore_Get_reichenaustadt_initials]"
 state_lore_initials.342_GER: " RNS "
 state_lore_initials.342_UKR: " KNS "
 state_lore_initials.342_UKS: " DNP "
 state_lore_name.342: "[Statelore_Get_reichenaustadt_name]"
 state_lore_name.342_GER: "赖歇瑙施塔特"
 state_lore_name.342_UKR: "卡捷琳诺斯拉夫"
 state_lore_name.342_UKS: "第聂伯罗彼得罗夫斯克"
 state_lore_desc.342: "[Statelore_Get_reichenaustadt_desc]"
 state_lore_desc.342_GER: "赖歇瑙施塔特得名于征服此地的纳粹将领瓦尔特·冯·赖歇瑙，原名第聂伯罗彼得罗夫斯克。与哈尔科夫一样，这里曾经是苏联工业化计划的核心区域，坐拥耗资甚巨的公共工程项目、崭新的大学与技术院校，以及其他共产主义项目的组成部分。可随着装甲车冲进城市郊区，如此愿景宣告破灭。二战浩劫让这座城市倒退成了农业地区，饥荒也随之复返；战火和极其恶劣的生活条件导致人口骤减，幸存者只能勉强维持生计。\n\n赖歇瑙死了，但他和纳粹国家给乌克兰人民带来的梦魇并未消散。受压迫者的愤怒、为自由乌克兰而战的决心，都在锤炼和挑战着它——但它从未远去。它仍然存在于赖歇瑙施塔特的事物与风土之间，存在于渗入他战争和治理活动的意识形态之中。他下达的指示以简练的军事语言，阐明了乌克兰专员辖区的统治哲学：\n\n“许多所谓的反苏人士打算作壁上观，必须取代以积极合作的明确决定。如果谁没做到，那就别抱怨自己被视为苏维埃体制的成员并受到相应对待。德国人采取应对措施带来的震慑一定要压倒四处弥漫的布尔什维克残余势力造成的威胁。”"
 state_lore_desc.342_UKS: "天空中，铜蓝与明黄交相辉映，令向日葵田相形失色。不再有黑白红三色，不再有深褐色衬衫，不再有漆黑万字符，不再有野战原野灰，不再有黑底衬白骨，不再有金底小圆盘。时隔多年，第聂伯罗彼得罗夫斯克再一次爆发出乌克兰的色彩——如醉如梦般的欢乐充盈着人群，这种情感比他们所曾设想的任何胜利景象都更加鲜活、更富生机。\n\n尽管第聂伯罗彼得罗夫斯克再次遭受了战争的蹂躏，但她的人民却突然振作起来，投入到重建工作中去。即使第聂伯河水电站留下了战火的痕迹，但看到上面飘扬的三叉戟旗帜，人们都感到无比欣慰。没有关系，他们很快就会建起一座属于自己的大坝。他们会重建旧有的房屋、剧院和医院，铲掉纳粹恣意生长的根系，种下某种新旧交融的文化。工作不会结束，时光无法倒流。但或许，通过自由且不受干预的真相传述，那过去的谎言可以得到澄清。"
 state_lore_desc.342_UKR: "天空中，铜蓝与明黄交相辉映，令向日葵田相形失色。不再有黑白红三色，不再有深褐色衬衫，不再有漆黑万字符，不再有野战原野灰，不再有黑底衬白骨，不再有金底小圆盘。时隔多年，卡捷琳诺斯拉夫再一次爆发出乌克兰的色彩——如醉如梦般的欢乐充盈着人群，这种情感比他们所曾设想的任何胜利景象都更加鲜活、更富生机。\n\n尽管卡捷琳诺斯拉夫再次遭受了战争的蹂躏，但她的人民却突然振作起来，投入到重建工作中去。即使第聂伯河水电站留下了战火的痕迹，但看到上面飘扬的三叉戟旗帜，人们都感到无比欣慰。没有关系，他们很快就会建起一座属于自己的大坝。他们会重建旧有的房屋、剧院和医院，铲掉纳粹恣意生长的根系，种下某种新旧交融的文化。工作不会结束，时光无法倒流。但或许，通过自由且不受干预的真相传述，那过去的谎言可以得到澄清。"
 state_lore_initials.343: "[Statelore_Get_charkow_initials]"
 state_lore_initials.343_GER: " CHV "
 state_lore_initials.343_UKR: " KHV "
 state_lore_name.343: "[Statelore_Get_charkow_name]"
 state_lore_name.343_GER: "哈尔科夫"
 state_lore_name.343_UKR: "哈尔科夫"
 state_lore_desc.343: "[Statelore_Get_charkow_desc]"
 state_lore_desc.343_GER: "哈尔科夫萨克森军营间的空地，犹如裸露的肋骨勾勒着血肉消逝的轮廓。这些空白是德国人在战后懒得缝合的疮疤——曾经的文艺宫、剧院、学校、养老院、酒吧与狭长公园，如今都化作上班族抄近道的荒径。\n\n但重建的哈尔科夫拖拉机厂，依然是这座城市的经济命脉。专员辖区需要拖拉机、卡车、压路机、深耕犁、割晒机与联合收割机，来修剪与翻新这片苍黄的平原。从罗斯托夫到第聂伯河，专员辖区几乎每座农场都有哈尔科夫的机械，但绝大多数收成仍要西运德国。在罗斯托夫，骨瘦如柴的乌克兰人日复一日劳作果腹。时光模糊成影，骨骼浸透酸痛，岁月在日渐低矮的犁壁堆中丈量流逝。乌克兰人制造的方正机械时刻提醒着：这座城市的每丝脉动，都需经德国人首肯。正因如此，哈尔科夫仍在制造拖拉机；或许明日，亦复如是。"
 state_lore_desc.343_UKR: "乌克兰人不需要靠时钟计算自己被奴役了多久。解放这座城市时，他们砸碎了工厂墙上巨大的钟表——那些印着粗黑数字的圆盘，曾在流水线尽头默默丈量时光。如今钟表尽毁，生产重归自主。在这条通往乌人治乌的漫漫长路上，这虽是微小一步，却足以涤荡灵魂。\n\n哈尔科夫终复旧名。蓝黄旗帜迎风飘扬，再没有身着灰绿制服的蝗虫吞噬粮食。弹坑遍布全城，但乌克兰人毫不在意——他们将按照自己的意愿重建街道与天际线。哈尔科夫拖拉机厂将遵循乌克兰人的时间运转，为乌克兰人的需求制造拖拉机、卡车、深耕犁与联合收割机。待萨克森军营拆除之日，他们会重设属于这片土地的时钟。怀着希望，他们终将挣脱德国的利爪，在铭记伤痕中拥抱自由——那是万物运行的星轨上，永不磨灭的印记。"
 state_lore_initials.344: "[Statelore_Get_hughesdorf_initials]"
 state_lore_initials.344_GER: " HSD "
 state_lore_initials.344_UKR: " YZK "
 state_lore_name.344: "[Statelore_Get_hughesdorf_name]"
 state_lore_name.344_GER: "胡格斯多夫"
 state_lore_name.344_UKR: "尤济夫卡"
 state_lore_desc.344: "[Statelore_Get_hughesdorf_desc]"
 state_lore_desc.344_GER: "胡格斯多夫是顿涅茨盆地煤矿的一处卫星城。当地的矿工们或是蜷缩在露天矿山旁摇摇欲坠的窝棚里，或是被扛着步枪的士兵囚禁殴打，或是栖身于胡格斯多夫荒芜的远郊。在前去市中心添置日用和柴火的时候，他们会走过如今已经化作白地的城市街区。胡格斯多夫的地图看起来就像是一条小行星带，互不相连的小居民区环绕着中心，这座破碎城市中唯一还称得上完整的地方。\n\n重建起来的市中心完全服务于煤炭生产：工具车间遍布主干道两旁，工厂烟囱中涌出滚滚黑烟，凿岩机、宽体船舶、被奴役的码头工人们拖上岸的铰链翻斗车，无一不诉说着现实。然而，这些机器仍旧没能替代矿井中的镐头、采石桶、撬棍和沉重的鹤嘴锄。乌克兰专员辖区当局在向谁提供最新式设备的事情上异常谨慎；莫斯科专员辖区则只有在保证煤炭供应稳定的前提下，才会投资胡格斯多夫的经济发展。现今的体制每时每刻都在谋杀当地的乌克兰人和俄罗斯人，也是胡格斯多夫全新经济结构中受到欢迎、且故意而为之的特征。"
 state_lore_desc.344_UKR: "在新获解放的尤济夫卡，有人计划熔掉虎式坦克，用里面的铁重塑塔拉斯·舍甫琴科的雕像。他们计划重建普希金大道沿线的绿道，阿尔捷马街上五颜六色的商店、公寓和芭蕾舞剧院，以及切柳斯金齐夫街角的理工学院。在尤济夫卡的每一个角落，都将充盈着乌克兰人民的复兴和他们对纳粹主义的胜利。\n\n顿巴斯宫不再是盖世太保的办公室，尽管它要用来干什么还是个有争议的话题。一些市民希望完成塔顶部的圆顶，其他人则不这么想。这种辩论正是尤济夫卡的人民在危险消失、可以无所畏惧地生活之后，每天都希望进行的；他们的城市将成为民族的肖像，她受折辱磨难，却在他们的欢乐和泪水中重生。"
 state_lore_initials.345: "[Statelore_Get_rostov_initials]"
 state_lore_initials.345_GER: " RAD "
 state_lore_initials.345_UKR: " RND "
 state_lore_name.345: "[Statelore_Get_rostov_name]"
 state_lore_name.345_GER: "顿河畔罗斯托夫"
 state_lore_name.345_UKR: "顿河畔罗斯托夫"
 state_lore_desc.345: "[Statelore_Get_rostov_desc]"
 state_lore_desc.345_GER: "罗斯托夫是纳粹经济体系中的重要枢纽，关键交通线汇集于此，产出重要的小麦、铁和木材资源。罗斯托夫城连同其繁忙的港口一道成为了德国各地驻军、武器和原材料的物流中心。\n\n更为重要的是，罗斯托夫是黑海贸易与几大专员辖区之间的战略交通节点。自高加索而来的运油船沿伏尔加河从阿斯特拉罕出发，途经保卢斯堡附近的伏尔加-顿河航道，最终抵达罗斯托夫出海口。它不仅仅是各类货运的便捷通道，也是德国维持对东欧剥削的核心堡垒。"
 state_lore_desc.345_UKR: "歌声与士兵们的叫喊声杂糅，罗斯托夫的大街小巷迎来了大变样。地雷被清理干净，捷克佬也被赶去边境。街道上坑坑洼洼的地面已被混凝土填平，自由的人们来来往往。剧院，博物馆和学校都再度向公众开放，各司其职。纵使冲突仍未远去，过去留下的伤痕尚存，罗斯托夫的市民们怀揣着热情，决心重塑他们的城市。他们的努力将一同构筑乌克兰的明天。\n\n罗斯托夫的人民经受住了占领时期的狂风暴雨，他们就如同城中河畔旁古老的主教座堂那般屹立不倒，审视着这片他们赖以生存的土地，这里的一草一木、一房一屋都为他们所有，且不会拱手让与外人。罗斯托夫绝不会向德国的铁蹄屈服，不自由，毋宁死。"
 state_lore_initials.346: " TAM "
 state_lore_name.346: "坦皮科"
 state_lore_desc.346: "坦皮科坐落于塔毛利帕斯的海岸，是该州的主要城市之一。把时间拨回16世纪20年代，那时坦皮科还是一个小港口，直到1823年才正式得名圣安娜-德坦皮科。此处是墨西哥的重要集散地，六年后独立战争的终局之战也在这打响。墨西哥人于此取胜，断绝了西班牙再征服的可能。然而命运女神却对坦皮科另有安排。法国的占领掐灭了这座港口城市发展壮大的任何机会，它的一切都戛然而止。\n\n就此坦皮科被世人遗弃了，徒留满身疮痍，数十年后人们才重建坦皮科。直到世纪之交，这座城市又被源源不断的石油推向了新的机遇。但好景不长，坦皮科遇到了新的挑战。1914年，坦皮科爆发了一场小型反美冲突，随后升级为美国对韦拉克鲁斯的入侵。1920年，坦皮科再次被奥夫雷贡将军占领，但城市从战火中奇迹般地恢复了过来，甚至成为了航空等多个行业的领头羊，还拥有墨西哥第一家可口可乐工厂。"
 state_lore_initials.347: " MLM "
 state_lore_name.347: "莫雷利亚"
 state_lore_desc.347: "莫雷利亚坐落于群山之间，一旁就是以炎热闻名的铁拉卡连特低地。1541年征服者们在西行征途中建立了该城，数世纪以来，此地渐渐成为了现代化的心脏，其繁荣与重要性在19世纪末达到了顶峰。然而20世纪初的一场大火却将这一切焚烧殆尽。1911年，马德罗主义者占领了这座城市，但三年后该城又陷于军事独裁政权之手。被洗劫一空后这里又被付之一炬，滑向了衰落的深渊。即使革命结束，莫雷利亚也难得一日安宁。在基督战争期间，此地仍是基督军与联邦军队无止境冲突中的热点。\n\n尽管其相对衰落，这片土地仍具重要的历史意义。大量的学生人口孕育出的青年运动方兴未艾。随着失意青年们的成长，冲突是否会被永远刻在莫雷利亚的历史上，我们拭目以待。"
 state_lore_initials.348: " EDM "
 state_lore_name.348: "埃卡特佩克-德莫雷洛斯"
 state_lore_desc.348: "埃卡特佩克-德莫雷洛斯，也称作圣克里斯托瓦尔-埃卡特佩克，或简称为埃卡特佩克，位于墨西哥城北部，地处一条由墨西哥谷延伸至瓜达卢佩山脉的山谷中。她最初是阿兹特克人的定居点，文字记载最早出现在1168年的定居点分布记录中，但实际历史可能还能向前追溯几个世纪。西班牙人征服这片土地后，这座城市继续发展；进入二十世纪后，随着人口数的急剧膨胀，今日其城区已与人口密集的墨西哥谷紧密相连。\n\n尽管埃卡特佩克发展历史长达数百年，并紧邻首都墨西哥城，但其经济发展却相对滞后。与美国城市外缘那些繁华、规模宏大的郊区形成鲜明对比的是，这座城市的棚户区和贫民窟里遍布着成千上万的非法自建房屋，几乎找不到任何植被的踪影。墨西哥城工业化的脚步加速向前，而这些贫民窟似乎只会继续野蛮生长。"
 state_lore_initials.349: " SLT "
 state_lore_name.349: "萨尔蒂约"
 state_lore_desc.349: "萨尔蒂约市是科阿韦拉州首府，地处墨西哥北缘半干旱气候区，坐落在一片绿洲中，西北部和东部接莽莽大漠。1577年，征服者们在新西班牙北部建立起这座城市，扼守通往得克萨斯和新墨西哥领地必经之路的关口，此地因而得以发展，第一批居民大多是被赶出家乡为西班牙商人工作的原住民。作为独立战争的起事之城，战后这里成为了得克萨斯州和科阿韦拉州的首府，但在美国攫取得州后又失去了得州首府的身份，随后这座城市愈发黯淡无光。直到十九世纪八十年代的工业化浪潮袭来，才逐渐走出了低谷。\n\n墨西哥革命期间，这里又最先响应了卡兰萨的号召，但最终被军政府攻陷，许多人被迫逃往美国，这座城市因此再度陷入颓废。时间来到1962年，这里已逐渐从二十世纪上半叶的泥沼中走出。尽管现在还只是一座不起眼的小城，但这里已然望见了美国企业投资浪潮的风口，这似乎也是墨西哥迈入本世纪下半叶变革前夕的曙光。"
 state_lore_initials.350: " CVA "
 state_lore_name.350: "维多利亚城"
 state_lore_desc.350: "按照墨西哥的标准，建立于1750年的维多利亚城（意为胜利之城）可谓是一座相对年轻的城市。当时西班牙人和生活在墨西哥东北部的印第安人爆发持续冲突，于是作为据点的维多利亚城应运而生。她在十九世纪经历了稳步发展，现在是毛利帕斯州的首府。与墨西哥的其他城市不同，维多利亚城在革命时期并未经历明显的衰落，反而在冲突的考验中相对完好地存续下来。\n\n近几十年来，在墨西哥奇迹的推动下，维多利亚城工业蓬勃发展，呈现出巨大的增长势头。许多人将维多利亚城的成功视为繁荣典范，誉为全墨西哥全力追求的黄金标杆。"
 state_lore_initials.351: " LAP "
 state_lore_name.351: "拉巴斯"
 state_lore_desc.351: "拉巴斯建立于1535年，是南下加利福尼亚州首府和最大城市。城市地势平坦，濒临科尔特斯海，得天独厚的地理位置赋予她兴旺发达。在墨西哥历史的大部分时间里，这座城市相对低调，与其他城市一同经历风雨沧桑。然而，在五十年代，这座曾默默无闻于半岛荒野的城市，却在繁荣浪潮中产生了翻天覆地的变化，崛起为商业和旅游的中心。\n\n如今的拉巴斯是墨西哥奇迹的见证，是墨西哥人民繁荣进取的象征。它象征着下加利福尼亚半岛蓬勃革新的力量，或许预示着曾被世人遗忘的西北地区正要展露锋芒。"
 state_lore_initials.353: " CDO "
 state_lore_name.353: "奥夫雷贡城"
 state_lore_desc.353: "奥夫雷贡城位于索诺拉州南部，其历史相对较短。1906年，连接美国和墨西哥各地的索诺拉铁路向南修建，这座城市由此诞生，并随着时间的推移不断发展。革命期间，它是首批受到席卷的城市之一，并被奥夫雷贡和卡兰萨的部队占领。\n\n二十年代汽车产业的繁荣促成了当地的经济腾飞，而这座城市也被改名为奥夫雷贡城，以此纪念阿尔瓦罗·奥夫雷贡将军。时过境迁，奥夫雷贡城从一个铁路小城一跃成为了索诺拉州的第二大城市。一望无际的沙漠并没有阻挡这座城市发展的脚步，恰恰相反，靠近山谷的地理位置吸引了大量农业实验来此进行，在这片土地上掀起了一场“绿色革命”。"
 state_lore_initials.354: " CLY "
 state_lore_name.354: "塞拉亚"
 state_lore_desc.354: "塞拉亚市坐落于瓜纳华托州的群山之中，其历史可追溯至1570年建立该城的西班牙定居者。鉴于其位于巴希奥地区的战略要地，塞拉亚在墨西哥历史中一直相当重要：在独立战争中此地被围攻，后来法国入侵墨西哥时这里又遭到攻击，而1876年波菲里奥·迪亚斯也在政变中占领了该城。塞拉亚还见证了1915年潘乔·比利亚和阿尔瓦罗·奥布雷贡的鏖战，那是墨西哥革命中最血腥的战役之一。\n\n此后，塞拉亚成了一片荒地，重振希望渺茫。但，塞拉亚一如既往，摆脱了过去的桎梏，转而拥抱未来。到了20世纪60年代，经济复苏带着塞拉亚又一次崛起了。得益于完善的基础设施和繁荣的商业，“巴希奥的金门”正蒸蒸日上。"
 state_lore_initials.355: " AGU "
 state_lore_name.355: "阿瓜斯卡连特斯"
 state_lore_desc.355: "阿瓜斯卡连特斯市坐落在宽广的阿瓜斯卡连特斯河河谷中，她也是与其同名的阿瓜斯卡连特斯州的首府。这个名字在西语中的意思是“热泉”，来源于城市所在河谷里星罗棋布点缀着巴希奥山脉的温泉。1575年，西班牙冒险家建立起了这座城市，起初是为了保护连接墨西哥中部各矿区的道路。随后的数个世纪里，城市的人口不断增加，她也逐渐发展偏离了建城之初的目的。波菲里奥时期，其工业迅猛发展。1914年阿瓜斯卡连特斯会议于此召开，这一会议旨在团结全墨西哥的革命者于同一面旗帜之下，也记下了历史长河中属于阿瓜斯卡连特斯的厚重一笔。\n\n今天的阿瓜斯卡连特斯和以往一样，得益于地处富足的巴希奥地区中心地带的区位优势，经济稳步发展向前。但只有时间才能说清，阿瓜斯卡连特斯的历史是会永远向前迈步，还是会有某一天风云突变到来。"
 state_lore_initials.356: " TPC "
 state_lore_name.356: "特皮克"
 state_lore_desc.356: "特皮克市坐落于墨西哥西部边陲，西邻太平洋，周围群山环绕，丛林茂密。1531年，由埃尔南·科尔特斯带领的一支西班牙征服者建立了这座城市。在而后的数十年间，墨西哥身份认同的建构改变了其城名，她也成为了新加利西亚省的首府。由于其适宜的海拔和临海的区位，特皮克连入了横跨菲律宾、瓜达拉哈拉和墨西哥城的贸易网络。接下来的数个世纪里该城人口数持续增加，但在十九世纪后，随着其他城市的兴起又有所减少。\n\n尽管特皮克市已不显昔日盛况，但她依旧是纳亚里特州的首府。二十世纪上半叶，该市努力推进工业化的同时也带来了人口的增长。由于其对墨西哥经济和贸易网络而言地位依旧举足轻重，而墨西哥在太平洋地区贸易份额持续增加，特皮克正努力打造成为该地区贸易的中心节点。她的未来似乎一片光明。"
 state_lore_initials.357: " IZM "
 state_lore_name.357: "伊兹密尔"
 state_lore_desc.357: "伊兹密尔，当地的海军与贸易中心，若自最初的定居点追溯至今，能数出长达约九千年的悠久历史。她是爱琴海的明珠，也是阿塔图尔克毕其功于一役将希腊人赶下海的地方。\n\n环绕伊兹密尔的海湾留存有许多港口——古时的士麦那是小亚细亚的大门，罗马人、希腊人以及无数其他民族都经由这里来往贸易、组织入侵和移民。今天的伊兹密尔决心展望未来：她完全接受了阿塔图尔克颁布的改革措施，成为土耳其世俗主义和凯末尔主义改革的光辉灯塔。"
 state_lore_initials.358: " KYA "
 state_lore_name.358: "科尼亚"
 state_lore_desc.358: "这座曾经接待过塞琉古、莫拉维·贾拉鲁丁·鲁米与霍加·纳斯尔丁的城市，如今是土耳其的粮仓，阿塔图尔克的乡村复兴计划给这片曾被称为以哥念的广阔平原带来了繁荣。\n\n然而，科尼亚并没有如阿塔图尔克及其继承者所希望的那样完全实现现代化。由于鲁米、鲁米影响的哲人诗人以及无数其他以科尼亚为家的神职人员的影响，伊斯兰教在科尼亚影响颇深。因此，土耳其革命的价值观很难深入科尼亚周围许多保守的城镇和村落。"
 state_lore_initials.359: " BUR "
 state_lore_name.359: "布尔萨"
 state_lore_desc.359: "很久以前，布尔萨曾是后来名震世界的奥斯曼帝国的三京之一。那时的布尔萨因其景色翠绿秀美和城内随处可见的公园绿地而被称为“绿色布尔萨”。\n\n但今日，若卡拉戈兹和哈奇瓦特在他们的故乡四处张望，便会发现这里已是面目全非。工业增长带来的浓烟灰尘正在慢慢抹去她昔日的自然之美，让她成了“土耳其的底特律”。然而，也正是这些冒出刺鼻烟雾的工厂，生产出为土耳其及其公民创造繁荣的商品。随着土耳其的工业化，布尔萨的色彩可能会变得更为黯淡，但她的人民会变得更加富有。"
 state_lore_initials.360: " ADA "
 state_lore_name.360: "阿达纳"
 state_lore_desc.360: "在奇里乞亚（当地居民称为切库罗瓦）平原的炎炎烈日下，坐落着一座拥有悠久历史、但其潜力尚未完全开发的城市。\n\n阿达纳资源十分丰富，涵盖矿物、水电、农业、贸易及现代生活的诸多领域。如果有朝一日这些资源能得到充分利用，阿达纳完全可能成为地中海地区最大的城市之一。从古至今，赫梯人、希腊人、罗马人、亚美尼亚人等都曾经过此地，但阿达纳是否能发挥其全部潜力，还得由今天居住在这的土耳其人来决定。"
 state_lore_initials.361: " DIY "
 state_lore_name.361: "迪亚巴克尔"
 state_lore_desc.361: "迪亚巴克尔乃安纳托利亚东南部最大的城市，此城在某些特定时期的状态，已经成为评估现代土耳其国家与其境内少数民族互动模式的重要标志。\n\n作为库尔德人占多数的城市，迪亚巴克尔成为了第四总督察区的总部，并由此直接受到土耳其化的深远影响。新的铁路线、道路、经济投资以及学校、医院和其他前所未有的社会服务接踵而至，然而，这也伴随着意图消弭地方文化、强调国家统一的法律——以及为执行这些法律而存在的强大军事力量。"
 state_lore_initials.362: " AMO "
 state_lore_name.362: "厦门"
 state_lore_desc.362: "厦门，古称思明，是中国百年屈辱真实而深刻的写照。追溯到19世纪，厦门依仗坚固的城防堡垒将东方贸易汇聚于此；后来，鸦片战争让厦门闽商发了财，当地成为茶叶贸易的中心，金流滚滚不绝，直到中国茶园在全球经济中的地位为印度种植园所取代。\n\n茶叶走出去，洋人走进来，鼓浪屿亦以其殖民时代的建筑而闻名。可与此同时，厦门却是一座破败之城，全中国最肮脏的城市。如今，情况仍未真正好转。虽然日本和东亚各国都在厦门设栈通商，但当地依旧人气清冷，街巷仍然破败脏乱，居民苦无转运机遇。厦门要想摆脱困境，需要我们共同的努力。"
 state_lore_initials.363: " SUZ "
 state_lore_name.363: "苏州"
 state_lore_desc.363: "苏州人称园林之城，也是现代“改组民国”境内还看得过去的地方之一。朝鲜时代文人崔溥在他的日记《漂海录》中记载云：“天下以江南为佳丽地，而江南之中以苏杭为第一州，此城尤最。”那个时代，苏州就已有园林星罗棋布。事实证明，无论是清朝的崛起，还是太平天国的起义，甚至百年屈辱的混乱，都无法真正压垮苏州。\n\n苏州邻近南京和日本，故而二战后能再度相对富裕起来也是必然。拙政园、留园等古典园林得以恢复旧观，经济步步攀升。苏州城的许多街道都由河流、小溪或是运河与乡村相连，若是管理得当，当可善加利用。"
 state_lore_initials.364: " WEN "
 state_lore_name.364: "温州"
 state_lore_desc.364: "温州古称永嘉，僻处群山之中，当地方言与文化可谓独树一帜。温州的建城规划出自风水堪舆鼻祖郭璞之手，这座城市与它的居民因而享有吉祥成就的好名声。许多温州人都移居他处，过上了成功的生活。\n\n无论风水堪舆之说是真是假，温州都拥有超乎寻常的韧劲。二战期间，温州是少数几个没有被日军占领的城市之一。在南京政府治下，温州没有直面过日军兵锋，因而未遭受严重破坏。五十年代初，贸易恢复，温州随之重回往日的繁荣，伤痕渐渐愈合。"
 state_lore_initials.365: " HEF "
 state_lore_name.365: "合肥"
 state_lore_desc.365: "合肥又称庐州，是一座既年轻、又古老的城市。从逍遥津之战到淮军建立，合肥见证了中国千年以来的许多重大历史瞬间。而最近的一次正是中日战争，将之置于南京政府掌控之下。\n\n早年林柏生担任安徽省长时，在旁人看来，合肥的形象还是不如省内的传统中心城市安庆和徽州。因此，林柏生出于自己的野心，将合肥选作“新模范市”，为当地带来了迅速的发展和城市化，大大压过了省内其他地方的风头。\n\n随着新铁道线和内河港口的建设，合肥重要交通枢纽兼工业中心的重要性与日俱增，最终得以取代安庆，成为安徽的新省会、林柏生的铁地盘。毫无疑问，在新的现代化计划下，合肥将继续释放潜力，为中国的现代化发光发热。"
 state_lore_initials.366: " NAC "
 state_lore_name.366: "南昌"
 state_lore_desc.366: "南昌东临鄱阳湖，西依九岭山脉，乃是内陆省份江西的省府所在。历史上，南昌曾是一处商贸中心，北方南下广州的陆路由此经过，但太平天国起义给当地造成了极为严重的破坏，其经济地位因此而渐渐衰落。1927年，国民党与共产党也正是在此处首次交锋，共军成功占领了南昌数日，随后撤离，以躲避国军的围攻。\n\n国民党的胜利使得南昌成为了蒋介石政府的坚固堡垒。1939年春，南昌被日军攻陷，但它并未轻易屈服于武力，也没有接受通敌者的统治。江西省政府搬迁到了九江，一直到战争结束——这座城市的抵抗意志之强烈可见一斑。\n\n南昌终究还是安定了下来，但即便时至今日，仍有许多南昌人对所谓的“中华民国”心怀不满；反过来，南京中央政府对这里的态度自然也是加倍奉还，用于发展的资金逐年减少，空出来的钱都拨给了警察弹压地面。作为省会，南昌名义上依然是江西的核心城市，且对中央政府而言仍具有相当重要的战略意义，但随着周边诸如九江、赣江等新兴城市悄然壮大，它已然不复往日的辉煌。"
 state_lore_initials.367: " GAN "
 state_lore_name.367: "赣州"
 state_lore_desc.367: "赣州地处华东、华南交界，客家人众多，是中国历史上许多著名人物的故乡。虔城赣州历史文化悠久，地理位置重要，扼守赣江、广东、福建、湖南四省交界，因此成为了省会的选址佳处。\n\n在与何应钦将军率领的蒋系部队停火后，赣州担负起了民国政府与西南军政委员会边境部队补给中心的重任。任个眼明心亮的人都能看出来，西南对南京的服从仅仅只是流于表面——当然赣州城与赣江也是如此。"
 state_lore_initials.368: " QUA "
 state_lore_name.368: "泉州"
 state_lore_desc.368: "泉州素有“七闽都会”的美誉，是闽南文化的重要发祥地，在闽台两地民众心中有着特殊的地位。充满活力、风姿绰约的泉州城不仅是华南规模最大的港口之一，也是许多中华英雄的故乡，还是孙中山先生最早掀起反清革命的地方。虽然其他城市，例如厦门的崛起逐渐遮掩了泉州在华南的重要地位，但这里的居民仍为家乡而无比自豪。\n\n泉州是幸运的，未曾在日军燃起的战火中蒙受巨大损失；然而，每一个自豪的泉州人心中都刻下了永远的伤痕。日本帝国海军的舰艇和民国国徽上的黄色小旗不断提醒着人们，中华民族曾遭受了怎样的失败；日货随着来来往往的货轮一波接一波地涌入，国货早已在货架上消失无踪。若是揭开繁华都会的外衣，深藏城市之中的，是日军铁蹄之下黯淡的希望。"
 state_lore_initials.369: " YIC "
 state_lore_name.369: "宜昌"
 state_lore_desc.369: "宜昌是湖北的第二大城市，规模仅次于原省会武汉，后者为南京政府直辖后，它便成为了新的湖北省府。宜昌扼守经由长江三峡进入四川的门户，无论在经济上还是军事上都拥有重要的战略地位。但也正因是要冲地方，这里成为了第二次中日战争中蒙受战火蹂躏最为严重的城市之一，人口因战乱而急剧减少。\n\n然而，战后从农村乡镇和邻近各省涌入的移民潮极大地促进了宜昌的重新振兴。近年来，商贸机会日益增多，经济活动渐趋繁荣：毫无疑问，这其中要托柑橘和茶叶两大畅销出口货的福。\n\n在繁荣的外衣之下，宜昌本地人依然没有忘记、自然也谈不上原谅日本侵略者和南京傀儡的暴行。的确，或许仍然有人会高呼抵抗，但越来越多的移民淹没了这样的不满情绪：他们只希望能在新兴的省府之地，讨得一份好生计而已。"
 state_lore_initials.370: " HEN "
 state_lore_name.370: "衡阳"
 state_lore_desc.370: "时间可以愈合鲜血淋漓的伤口，但这只是掩盖了对侵略者的仇恨。衡阳建城于战国时代，扼守要冲地方；唐朝时期，它成为湖南首府，管辖周边；五代十国的浪潮中，又随着湖南割据而易名；然后，它又变作占领者的眼中钉肉中刺，抗粮抗丁、反对元朝统治的起义在此爆发。\n\n此后数百年中，这座城市不断发展，常常随统治者的需要而变换名字。到十九、二十世纪之交时，随着商业活动向内陆的迁移，衡阳成为了一处繁华的商贸中心。然而，第二次中日战争的前线来到了这里，最为激烈的战斗就此爆发。在燃烧弹和毒气的摧残之下，城市近乎被夷为平地，硝烟散去，唯余残垣断壁。\n\n几乎没有什么发生了改变。在重建城市的努力之下，大量投资注入衡阳，意在重新将其塑造成泛亚主义的璀璨明珠，街市业已恢复旧观。衡阳的商业仍在蓬勃成长，改组国民政府向当地投入了海量资源，试图将其打造成对抗其余地方割据政权的桥头堡。然而，这样的贿赂并不能消解衡阳人对南京政权的厌恶，他们痛苦着、梦想着，希望有朝一日能挣脱傀儡政权的枷锁，迎来解放。"
 state_lore_initials.371: " NAN "
 state_lore_name.371: "南阳"
 state_lore_desc.371: "历史上曾经兴旺繁华的南阳城坐落于其同名盆地的中心，是新近建立的河南省省会。在最鼎盛的岁月里，它曾是中华帝国最为欣欣向荣的城市之一，位于古丝绸之路的地理位置和蜚声海内外的独山玉吸引着自四海而来的行商与工匠。然而近年来，它已落后于附近的新兴城市，例如东南边的信阳。若究其原因，可以找出许多：铁路改变了商道的轨迹，曾经对物资和人员流动至关重要的内河运输就此落寞；渔业资源和森林的过度开发、民国时代的军阀掠夺、无情自然灾害带来的饥荒，凡此种种，不一而足。\n\n因此，当地的农民匪患极为猖獗，南京政府对此心知肚明。改组国民政府意识到了掌控这里的重要性，便改组建立了河南省，将其权力集中于南阳，以其为南阳盆地剿匪行动的出发基地。虽然这第一步还算不错，但仅仅重绘地图显然不能解决实际困难。艰辛谋生的当地人正在等待，希望南京能加倍努力，做些好事，彻底根除这一问题。"
 state_lore_initials.372: " ZHE "
 state_lore_name.372: "郑州"
 state_lore_desc.372: "1938年黄河大洪水、经年长久的匪患、历任统治者的残暴，这一切的一切都让郑州市民对南京中央政府报以麻木淡漠的态度。这里的人们常常说，“事儿不能更材坏了”，而不是去给通敌政府送什么爱国支持。改组国民政府意识到了当地成长为国家重要城市的价值和潜力，与日本就就此地进行了艰苦的磋商谈判，要求将其治权由华北政务委员会交予南京政府。最终，日本勉强同意了这一请求，此后，郑州就一直都是中原省省会，未曾改变。\n\n与其他城市相比，郑州对改组国民政府的统治更为顺从，也更愿意接受，因而是政府资金和援助的主要受益者之一，再加上其作为贸易兼交通枢纽的战略地位，故此成为了全国发展最为迅速的城市之一。它已经超越了位于东部的开封，跃升为地域核心城市，在棉纺、煤机、机械制造等领域引领着新的发展。同时，郑州也是南京改组国民政府在华北政务委员会进行秘密活动的基地，监视着昔日盟友的一举一动。"
 state_lore_initials.373: " SHI "
 state_lore_name.373: "石门"
 state_lore_desc.373: "前清时代，石门还叫做石家庄，与北京、保定这样的华北雄城比起来，算不上个重要地方。虽然石门是重要的交通枢纽、华北平原上旅客必经的中转站，但讽刺的是，直到日据时期，石门这个名字才广为人知。\n\n日本发动侵华战争后，石家庄被日本陆军充作重要的军事基地，石家庄在此期间被更名为石门。战后，根据汪精卫国民政府与华北政务委员会的新行政区划，石门成为新河北省的省会，地位得以大大提升，促进了城市经济的发展。然而，在华北政务委员会的压迫统治之下，石门市民想过上好日子可以说是无从谈起。"
 state_lore_initials.374: " BAO "
 state_lore_name.374: "保定"
 state_lore_desc.374: "有证据表明，早在商朝建立数千年前，就有人类聚居于保定地区；传说中，黄帝正是在此宣告了华夏统一；而作为现代城市，保定的历史真正发端于战国，由燕昭王建立。此后，当地划为上谷郡，逐渐兴旺起来。北宋时期，当地得益于与皇室的联系，保定成为驻军重镇、河北雄城，直到在1213年为蒙古帝国洗劫一空。\n\n尽管如此，这座城市还是因其地理位置而得以恢复重建，再次成为迅猛发展的人口中心，于1667年成为直隶省府。晚清时期，保定慢慢启动了工业化进程，一所新学校在此建立，肩负起现代化军队中坚力量的角色，各方关注随之云集于此。在第二次中日战争之初，保定便落入日军之手，迅速被整合进了占领政府之中。\n\n时至今日，保定依然追溯着它悠久的历史。保定军校是中国现代军事战术的摇篮，也是许多大人物最初成长起来的地方，因此始终享有盛誉。然而，声望终究不能给一座城市带来全部。尽管保定又一次成了直隶省会，但天津、石门等地的崛起和日本剥削都导致了保定日趋衰落，只能从北京指缝里流出来的利益里捡些好处。当下，保定城仍有反弹发展的希望，从它数十年的军事教育土壤中获益，但这益处能否延展到军校之外，只能交给时间来检验。"
 state_lore_initials.375: " WEI "
 state_lore_name.375: "潍坊"
 state_lore_desc.375: "潍坊坐落于青岛与莱州之间。在过去，胶济铁路与坊子炭镇的相继建成，使得潍坊成为连接山东半岛与内陆之间的关键交通枢纽。因此其战略重要性迅速提升，最终被晋升为新山东省的省会。\n\n然而，让其闻名于世的并不是上述所言。而是其坐拥全中国乃至全亚洲最大的“平民集会中心”。此地最早是由美国长老会所建立的传教基地“乐道院”，后在二战期间被改建为外国“囚犯”关押处。然而即便在战争结束之后，一切也并未恢复如初。“乐道院”建筑群仍然被日本人所用，且传闻其中正发生着骇人听闻的事件……\n\n岁月悠悠五十载，潍坊如今依然是山东半岛仅次于青岛市的都市圈。平民百姓的生活一成不变，日本军队的调动虽偶有发生，但已无人再探其因……"
 state_lore_initials.376: " WAN "
 state_lore_name.376: "万州"
 state_lore_desc.376: "当日本陆军逼近蒋介石国民党最后的堡垒重庆之时，万州在北方挡住了侵略者冲向民国陪都的步伐。血腥的万州保卫战打了整整七天七夜，几乎所有能动弹的男男女女都加入了国军部队，与强大的敌人战斗，阻拦他们向重庆发动进攻。前前后后数万人因此丧生，万州城血流漂橹，然而守军等来的却是一纸投降电令——这是背叛。\n\n在那场战役中幸存下来的人们从未忘记这背叛。万州人民憎恨向日本主子摇尾乞怜的通敌汉奸，但更憎恨让他们白白流血牺牲的混蛋：蒋介石国民党及其在贵州的残余势力。对他们来说，中国必须解放，但这解放绝不属于青天白日。"
 state_lore_initials.377: " LAN "
 state_lore_name.377: "兰州"
 state_lore_desc.377: "兰州古称金城，位居中国大西北第二大城市，其边疆重镇的角色始终与反叛传统纠缠共生。该城始建于公元前86年，彼时是汉廷谋划北击匈奴的战略据点。617年，此地爆发的民变令城池惨遭夷平。619年重建后，兰州作为陆上丝绸之路枢纽重焕生机，商队辐辏连接旧大陆各文明。\n\n随着丝路式微，边陲军事价值转而凸显。明清两代持续增兵于此，构筑防御游牧袭扰的军事屏障。虽惨遭同治回乱冲击，仍维系着地方行政中枢地位，更成为苏联势力渗入西北的据点，援华物资经此输入抗日民族统一战线。抗战期间，中日空军鏖战屡屡映红兰州天际，国府依托其战略纵深苦撑危局。\n\n而今兰州作为大东亚共荣圈西北要冲角色依旧，但裂痕已现。虽然仍挂着陇西省会的虚衔，武威惨败后实权机关已迁至天水。驻屯重兵虽可辐射华北大部，但零星弹压难遏此起彼伏的反抗浪潮。随着国民救国军日渐得势，改组国民政府正面临填补统治真空的困局。"
 state_lore_initials.378: " KAL "
 state_lore_name.378: "喀拉干"
 state_lore_desc.378: "喀拉干是一处历史悠久的边贸口岸，其蒙语意为“门户”。正是在此，日本建立了蒙疆政府。尽管如今政府驻地已迁往厚和豪特，但其实权仍牢牢掌握在最初的首都——喀拉干。这座城市的重要性不仅源于其作为经济核心的地位，更是基于其为日本帝国陆军重要驻扎地的缘由。从这座城市出发，日军将其意志强加于整个蒙疆乃至华北腹地。从各个意义上说，如今的喀拉干都称得上真正的“门户”。\n\n地理条件造就了喀拉干经久不衰的地位。它扼守长城要冲，天生便是联结蒙古草原、满洲以及中国的通道枢纽。主要的公路、铁路、商路——其中也包括通向西伯利亚的万里茶道，统统于此交汇，将这里打造成了蒙疆政权无可置疑的经济引擎。从鸦片到煤炭，繁多芜杂的各类资源涌入当地市场：它是商业和掌控政权的命脉，失去它，蒙疆就将崩溃。\n\n蒙疆政府正积极地试图摆脱减少对喀拉干的依赖，竭尽所能地将资源投入腹地以削弱其影响力，然而这样的努力大多都是徒劳无功。喀拉干不但拥有便利的基础设施、强大的商帮，还有根深蒂固的驻屯日军，地位着实难以撼动。厚和豪特的官员们尽可以随心为政权绘制蓝图，但真正说了算的人，都在喀拉干的军营和董事会里。"
 state_lore_initials.379: " HOH "
 state_lore_name.379: "厚和豪特"
 state_lore_desc.379: "中华民国治下的数十年间，这座城市都被称作归绥，是汉人统治下的绥远省府；但对蒙古人而言，自俺答汗在十六世纪筑城于此，这里就始终都是青城，他们的历史和精神中心。正是因为这份深厚的历史积淀，德穆楚克栋鲁普亲王早在日军到来之前便在此地筹谋自治、指挥军队。故此，战事结束之后，德王便将蒙疆政府从汉族人主导的边贸枢纽喀拉干迁往了厚和豪特——这既是重归历史渊源的象征，也是将文官政府与军方核心相统一的权力整合。\n\n搬迁甫一完成，政府宣传机器就开始宣扬“新汗八里”的宏伟远景。纪念蒙古英雄的高大碑塔设计落成，政府积极以新都为核心构建民族复兴的叙事——这一切的终极目标都是将这座城市打造成为泛蒙合法性的象征。它终将摆脱昔日作为归绥城的中国印记，在共荣圈内赢得其尊严。\n\n然而，这座新都实则是沙上建塔，浮寄孤悬。倡导民族复兴的蒙古精英在城中仅为极少数，行政体系、经济命脉和技术劳动力仍由汉人占据绝对主导。更重要的是，日本势力同样无处不在——来自东京的“顾问”肆无忌惮地上下其手，影响力在所有政府部门都随处可见。厚和豪特正困于两难之中：渴望重现辉煌的过去，却又无法摆脱屈从的现实。"
 state_lore_initials.380: " WUW "
 state_lore_name.380: "武威"
 state_lore_desc.380: "武威的历史纵贯千载，却从未沉寂。这座古称凉州的要塞，曾是抵御匈奴铁骑的屏障，亦是丝绸之路驼铃悠扬的驿站。戈壁黄沙中，西汉的奔马、西夏的石碑，无不诉说着这座虽稍逊长安帝都气象，却独拥边塞风华的城市记忆。\n\n如今的武威正重焕生机。兰州陷落后，西北国民革命军总指挥部迁驻于此，武威同西宁一道并列为西北“双头政权”的军政中枢。络绎不绝的移民潮，正令城市渐渐回归丝绸之路时期的繁华。"
 state_lore_initials.381: " GUI "
 state_lore_name.381: "桂林"
 state_lore_desc.381: "从某种意义上而言，桂林始终走在中国历史潮流的前沿。这座自公元前314年便坐落于漓江之畔的古城，最早是华夏初代王朝治下百越族群的聚居地。秦始皇时期沟通湘江和漓江的灵渠落成，桂林从中受益匪浅，成为新兴的商业中心。中国向南方的征服每迈出一步，它的地位便随之重要一分。\n\n唐高宗时期桂林被定为地方治所，在唐宋两代持续繁荣，成为中央政府经略南疆的枢纽要冲。明代靖江王朱守谦在此开府建藩，进一步巩固了桂林作为广西首府的地位。民国初年，广西省会虽短暂迁至南宁，但1932年出于安全考量又复归桂林。抗战期间，桂系军队成功抵御日军进犯，但随着主政广西的夏威宣布拥护泛亚理念，桂林也随之变样。\n\n广西省与桂林当局对南京政权的效忠，终究只是虚与委蛇。夏威虽在公开场合高唱泛亚主义论调，私下里还是国民党的拥趸。凭借雄厚的军事实力，广西成为众多抗日志士的庇护所。反日反伪的思潮在此地蓬勃涌动，呈星火燎原之势。随着桂林经济持续繁荣，加之广东传来的种种传言令桂人不安，这座千年雄镇或将重拾其战略要冲的地位。"
 state_lore_initials.382: " XIN "
 state_lore_name.382: "西宁"
 state_lore_desc.382: "两千年来，西宁始终是河西走廊边的商贸中心、抵御外来入侵者的强固堡垒，对昔日的游牧部落如此，于今日的叛军而言亦然。宗喀巴圣地塔尔寺、东关清真大寺等诸多地标坐落于此，因而这座城市对藏人等非汉族群具有特殊意义。\n\n自1928年脱离甘肃省建制成为青海省会以来，这里就一直是全省核心，也是青海马家军的大本营。正因如此，当地也是西北流亡政府双头政权的另一中枢。尽管人流涌入之势不如武威显著，百姓仍源源不断迁徙至此。因为他们明白，与东方的改组国民政府相比，这里能享有更多的安全与自由。"
 state_lore_initials.383: " LHA "
 state_lore_name.383: "拉萨"
 state_lore_desc.383: "圣城拉萨，青藏高原上的璀璨明珠，是藏族人民和佛教信徒共同向往的朝圣之地。这座城市古称“逻些”，意为“坚固之城”，于公元633年由松赞干布选定为吐蕃王朝都城。随着藏传佛教的发展，拉萨逐渐成为世人熟知的神圣之地，这也塑造了她独特的城市面貌。\n\n吐蕃王朝瓦解后，青藏高原长期陷入豪强割据的混乱局面，拉萨的神圣光辉也一度黯淡。直到十六世纪甘丹颇章政权建立，拉萨才重现辉煌，自此之后，拉萨就一直是西藏的心脏，哪怕历经岁月洗礼，布达拉宫的壮丽景色依旧巍然屹立。\n\n然而，即便是圣地也无法永远避开历史的洪流。从清朝到民国，从英国人到印度人，外来影响逐渐渗透拉萨，打破了西藏人民长久以来的生活格局。在年轻达赖喇嘛的注视下，拉萨的未来充满不确定性，这座城市如何应对未来的风风雨雨，唯有时间才能揭晓答案。"
 state_lore_initials.384: " GUY "
 state_lore_name.384: "贵阳"
 state_lore_desc.384: "贵阳始见于春秋时期，作为中国西南边陲聚落存在。其前身为夜郎政权都城，汉朝征服该地后，“夜郎自大”的典故便源自其末代君主的传说。该城在被征服后虽成为地方行政区划建制，但此后数百年逐渐沉寂，直到宋代文献中出现矩州这一称谓——即唐朝节度使辖境内遗留下来的唯一历史地名。\n\n元朝统一进程中，称为顺元城的贵阳得到了强化军民治理的行政资源投入。永乐年间首度作为贵州省会确立地位，1622年曾遭围城焚毁。清朝恢复建置后的贵阳逐步扩大在西南地区的行政辐射范围，所属行省历经多次析置改称，直至辛亥革命后仍持续变动，甚至在日占时期仍进行过区划重组。\n\n贵阳始终保持着贵州省会城市的政治地位，抗日战争期间作为西南军政长官公署驻地进一步抬升其战略价值。虽然城市经济资本不及东南富庶之地，但持续涌入的黄金储备与人力资源维持着区域核心地位。众多外籍人士以考察西南边疆史地之名到访此地，实际处于驻军的严密监视管制之下。"
 state_lore_initials.385: " NAN "
 state_lore_name.385: "南郑"
 state_lore_desc.385: "南郑堪称反直觉的典范——它从容接纳了历史的善意忽视。这座城市的起源已不可考，自秦代始设县治，更曾短暂成为汉高祖刘邦的建都之地。作为汉中地区长期的政治经济中心，南郑统辖过多个地方行政区域。战国烽烟中，南郑顺势崛起。扼守入蜀咽喉的险要地势，使其在三国抗魏、宋金对峙时皆为兵家必争的前线重镇。\n\n然而随着时移世易，南郑的耀眼光芒渐趋黯淡。即便军事价值仍被称道，其地位终被周边新兴城市超越。北洋政府式微之际，这座古城落入国民军与国民革命军的控制，最终随着抗战烽火渐熄，被纳入大东亚共荣圈的松散版图。\n\n战后省级行政区划调整中，南郑名义上成为汉中省省会。但现实却充满荒诞——由于党团势力盘根错节，加之邻省对其虎视眈眈，数十年来设立的政府机构始终形同虚设。吊诡的是，监管的真空反而孕育出地下经济的畸形繁荣：毒品军火走私网络在此生根，黑市交易昼夜不息。这种剑走偏锋的“发展模式”，却让这座沉寂数百年的古城以意想不到的方式焕发出病态的活力。"
 state_lore_initials.386: " DIH "
 state_lore_name.386: "迪化"
 state_lore_desc.386: "十三国故地迪化，曾是丝绸之路上扼守要冲的聚落群。中国经略西域的宏图跨越历代千年，直至现代迪化所在之地渐次形成管理边陲的行政据点。1755年准噶尔灭族之役后，迪化城始建，环绕军营与另一座新城渐次扩展。\n\n十九世纪双城并起，汉、回、满移民潮催生商贸繁荣。随着城市迅猛发展，这座被誉为中华文化西渐典范的边城于1884年成为新疆省治。民国崩解、军阀四起，迪化城头风云变幻，在维吾尔人与汉人的矛盾斗争中挣扎求存。及至日本制霸东亚、统一战线退守内陆，这座边城方在时局冰封中渐趋僵化。\n\n如今的迪化矗立于十字路口，再度徘徊于故土与腹地之间。持续推行的汉民屯垦徒然激化全疆维吾尔人的怒火，国民党当局在残留中共势力及亲华维回团体协助下勉力维持统治。这座与世隔绝、凝固在三十年代时光中的城市正走向衰微。或许它还能在停滞中苦撑十年——但下一个十年呢？"
 state_lore_initials.387: " KAN "
 state_lore_name.387: "康定"
 state_lore_desc.387: "曾名打箭炉的康定，自古便是通往华夏之外世界的门户。汉朝建城以来，这座游离于中原掌控之外的边陲重镇历经千年晦暗历史，逐渐演化为藏地文明的延伸。十世纪虽经中原王朝经略，仍保持超然于地方官府的自治传统，直至1727年随藏地并入清廷版图，划归四川省辖。\n\n自此康定成为经略康区要冲，1905年巴塘事变更显其战略地位。1911年清室倾覆后，大英帝国染指西藏，这座商贸重镇曾短暂设立领事机构。抗战期间康定坚定支持国民党与抗日民族统一战线，成为国军将士退守内陆开展游击的庇护所。\n\n名义上康定仍是西康省府，维系着汉藏纽带的行政职能。然则日本制霸中华的变局已悄然改变格局——虽声名犹在，权贵多已迁居雅安、西昌，真正的权力中心东移，远离昔日门户。走私活动仍是当地特色，但如今最引人注目的“舶来品”却是那些对日渐式微的总教区表现出莫名兴趣的欧洲访客。"
 state_lore_initials.388: " KHU "
 state_lore_name.388: "库伦"
 state_lore_desc.388: "这座城市的遗址上遍布更古老的废墟，匈奴王陵在此星罗棋布。1639年，库伦最初作为游牧寺院诞生于半被遗忘的古代君主骸骨之间，在虔诚信徒与僧侣的追随中日益壮大。这座流动圣城逐渐承担起汗王廷与司法机构的行政职能，在皮毛、布匹与茶叶贸易中成长为要冲，十八世纪时已引起沙俄的瞩目。\n\n当清帝国走向崩溃之际，库伦成为短暂而动荡的蒙古独立政权之都。得益于尼古拉·布哈林推行的西伯利亚计划，这座都城开启了工业化进程。西伯利亚干涉时期，夹在苏联解体与日军进逼之间的库伦历经磨难。虽失去法定首都地位，它仍是蒙古首屈一指的司法与商贸枢纽。\n\n如今的库伦牢牢保持着在蒙古的至尊地位。作为宗教圣地，每逢节庆便涌动着朝圣的人潮。布哈林的思想幽灵与旧政权的残骸仍在街巷间游荡，成为日军铁腕镇压下不绝如缕的抗争火种。随着其政治遗产被悄然继承，这座古城将在蒙古融入共荣圈的进程中扮演关键角色。"
 state_lore_initials.389: " PAF "
 state_lore_name.389: "法兰西港"
 state_lore_desc.389: "若以最宽泛的标准衡量，法兰西港堪堪算得上一座“城市”。她的数百名半永久居民，正在世界尽头的凛冽雾霭中忧郁地生活。尽管法国宣称拥有这片领土已有数世纪之久，但直到五十年代的南极争夺战，凯尔盖朗群岛上才真正出现文明的萌芽。作为德国征服新施瓦本的中转站，仓促搭建的设施与密集投资将嶙峋群岛改造成功能完备的军事基地，机场与港口一应俱全。\n\n以法军为主、德军为辅的驻防模式下，法兰西港居民的生活鲜有改变。困守分崩离析帝国的巴黎当局，仅以最低限度投资维持这座新施瓦本补给站的光鲜门面。从混凝土浇筑的风之圣母礼拜堂到摇摇欲坠的面包坊，种种营造家园感的尝试皆告徒劳。海岸线上铁丝网与防御工事星罗棋布，如今却只困住企鹅的粪便。入侵威胁遥不可及，随着德军精锐调往关键战区，饱经风霜的驻防部队日渐凋零。\n\n在这片阴郁之地，唯有追逐捕鲸业暴利或新兴海洋学机遇的冒险者尚存生气——以电影人兼探险家雅克·库斯托最为耀眼。然而即便银幕魔法也难掩法兰西港的苦难，证明库斯托将镜头聚焦海豹企鹅而非人类邻居，实乃明智之举。"
 state_lore_initials.390: " KWS "
 state_lore_name.390: "川崎"
 state_lore_desc.390: "当世人谈及大东京地区的城市时，总是津津乐道于横滨与东京的璀璨霓虹与熙攘街巷。鲜少有人提及川崎，即便是日本人自己，也难以数说这座城市的荣光。\n\n川崎是座错失机遇的城市。虽然早在四世纪便有人定居，但这座现代都市迟至1924年才正式建制，此后数十年间始终在停滞与遗忘中徘徊。夹在东京与横滨之间的川崎，其工业废气和外界尘土混合后形成遮云蔽日的雾霾，令市民笼罩在全日本最严重的污染之下。\n\n在这座拥挤的都市里机遇难寻，唯有一个名字让川崎在日本乃至世界版图上保有一席之地：富士通株式会社。这家诞生且仍扎根于川崎的企业，其光芒正刺破新秩序的迷雾幽幽闪烁。"
 state_lore_initials.391: " MCP "
 state_lore_name.391: "马卡帕"
 state_lore_desc.391: "尽管靠近海岸，但马卡帕却是巴西最为僻远的城市之一，只能通过轮渡与贝伦相连。当里约和圣保罗都正在建设成为现代化大都会时，马卡帕仍然鲜少工业，甚至连自来水都不通。然而，二战改变了马卡帕，这里建起了空军基地，经历了爆发式的发展。近来发现锰矿后，以州首府为中心的私人投资不断涌现，每年都吸引着成千上万人的帕拉人定居于此。马卡帕现今已经打下了坚实的经济基础，再加上当地邻近卡宴带来的军事战略重要性，或许这座城市僻处一隅的时代即将画上句号。"
 state_lore_initials.392: " BVA "
 state_lore_name.392: "博阿维斯塔"
 state_lore_desc.392: "茂密的雨林、酷热的气候——亚马孙盆地的绝大部分地区都与大城市这个词格格不入，罗赖马或许已经是当地最适合人居的地方了。由于地处偏远，直到19世纪末，欧洲殖民者和巴西拓荒者才涉足此处，而在此之前，这里还是原住民部落的天下。即使时至今日，这里也只有一处值得一提的定居点：博阿维斯塔。博阿维斯塔位于全亚马孙盆地最干旱的地区，稀树草原景观取代了亚马孙随处可见的雨林，因此这里无法像巴西北部其他地区一样发展橡胶产业，但却非常适合种植大豆和牛群的放牧养殖，为亚马孙州和帕拉州的居民出产食物。当地电力供应依赖委内瑞拉，河流交通更是除了小船之外都完全无法停泊，因此，博阿维斯塔需要大量全新的基础设施建设，才能彻底摘下穷山恶水的帽子。"
 state_lore_initials.393: " PVH "
 state_lore_name.393: "波多韦柳"
 state_lore_desc.393: "过去几十年里，玻利维亚的橡胶工业始终受制于一段无法通航的急流，阻碍了亚马孙河下游乳胶的运输。为了解决这道难题，玻利维亚向巴西提出，如果巴西同意出资修建一条绕过河流的铁路，玻利维亚就将阿克里的土地交予巴西。条约于1903年正式签署，工程很快启动，波多韦柳就位于铁道线的尽头，担负将乳胶从火车转运到货轮上的职责，这几乎是朗多尼亚全部的经济活动。但是近年来，当地发现了丰富的锡矿矿藏，再加上对木材和牛肉需求的快速增长，当地经济正在迅速多元化，波多韦柳也在同步发展。这并非没有代价，早在哥伦布时代前就维持着完整的原住民社区察觉到，巴西定居者和他们带来的疾病正威胁着社区的生存。"
 state_lore_initials.394: " RBR "
 state_lore_name.394: "里奥布朗库"
 state_lore_desc.394: "阿克里州是巴西最后的边疆，19世纪80年代才有欧洲人涉足这里，1903年前还正式归属于玻利维亚，全州大约三分之一的人口定居在里奥布朗库。1882年，一群雄心勃勃的殖民者发现阿克里的气候异常适合橡胶种植，里奥布朗库应运而生。他们很快与其他来自巴西和玻利维亚的数百名殖民者汇合，为了满足对乳胶生产的欲望，他们将数以千计的原住民置于奴役之下，成为了统治阿克里州至今的“橡胶男爵”。玻利维亚开始出手在当地维持治安后，男爵们便起事反抗，当地在1903年并入巴西版图。由于日本的限制，美德两国难以获取东南亚的橡胶，故而，里奥布朗库对全世界各国的军方和汽车制造商而言都至关重要。"
 state_lore_initials.395: " FLN "
 state_lore_name.395: "弗洛里亚诺波利斯"
 state_lore_desc.395: "在大航海时代，船只往往需要经常停下来补充淡水。正是因此，葡萄牙水手们在圣卡塔琳娜岛定居下来。这个前哨站最初被命名为德斯特罗，葡萄牙语的意思是“流放地”。即使19世纪圣卡塔琳娜州大陆地区的人口逐渐增多，它孤悬岛上的首府依然规模很小，发展不足。1927年，联结弗洛里亚诺波利斯与大陆的大桥竣工通车。仅仅几十年过后，这里就变成了一座颇为庞大的富裕城市。如今，弗洛里亚诺波利斯是南部地区主要的文化中心，这里的博物馆、海滩和久负盛名的大学吸引着全巴西各地的学生、艺术家、退休老人和观光客。"
 state_lore_initials.396: " CGB "
 state_lore_name.396: "库亚巴"
 state_lore_desc.396: "自建城以来，库亚巴就是世界上最偏僻的城市之一，即使是在今天，想从库亚巴去到最近的大城市，也得走上八百多公里。这里是淘金者们为了寻找黄金而走到的最远处，离安第斯山脉的距离比离大西洋还要近些，而且气候炎热潮湿，难以忍受。铁路问世之前，想要造访这里近乎是不可能的。若不是成了马托格罗索州的首府，这座城市甚至很难在18世纪淘金热消退之后幸存下来。在如今的20世纪，库亚巴的人口也始终停滞不前，居民生活极为贫困。然而，近年来开发内陆的努力为它的命运注入了新活力，让它成为了巴西农业现代化迅速发展的见证者。"
 state_lore_initials.397: " CGR "
 state_lore_name.397: "大坎普"
 state_lore_desc.397: "马托格罗索州幅员辽阔，南北差异极大：一边炎热潮湿，遍布佃农耕作的大庄园地产；另一边则气候温和，尽是个人经营的小农农场。1872年，大坎普这个名字首次出现在历史中，当时这里是一个移民农民们交换货物的小村庄。到了1900年，大坎普已发展成为马托格罗索南部农民向沿海转运大豆和棉花的桥梁。由于南部与库亚巴联系极少，再加上德国和意大利移民传统文化的独特性，当地发展出了独一无二的身份认同和基本独立的经济体系。大坎普的规模已经远远超过了库亚巴，随着这一差距不断拉大，要求分割马托格罗索州、将已成为南部实际首府的大坎普扶正的呼声也日益高涨。"
 state_lore_initials.398: " CTB "
 state_lore_name.398: "库里蒂巴"
 state_lore_desc.398: "库里蒂巴最初是一个集镇，巴拉那的牧场主们通过这里将产出外运到沿海地区。但19世纪中后期，随着巴西政府鼓励欧洲移民进入内陆的努力，库里蒂巴摇身一变，成为了工业重镇和民族大熔炉。德国人和波兰人将他们的文化与当地融合在一起；一零年代，日本移民也加入其中。如今，库里蒂巴是巴西最大、最富庶的城市之一，但冷战已经撕裂了世界，库里蒂巴嬗变成了自我分裂的都会。当地日裔经常受到骚扰，而德裔老板的工厂则助长着针对巴西的纳粹阴谋论。各种不同背景的库里蒂巴人看向邻居的目光中，怀疑正与日俱增。"
 state_lore_initials.399: " NTR "
 state_lore_name.399: "尼泰罗伊"
 state_lore_desc.399: "矗立于瓜纳巴拉湾西岸的里约热内卢名扬四海，然而东岸的双子城尼泰罗伊却常遭世人遗忘。自1613年圣克鲁斯堡垒落成起，这座要塞便如警惕的哨兵俯瞰着每一艘入湾的船舶：殖民时代的它曾抵御海盗侵袭，至1894年更成功镇压了意图颠覆总统的海军哗变。1846年毛阿巨型造船厂的兴建，更是令尼泰罗伊跃升为巴西造船业心脏，其规模至今仍冠绝南美。然而，繁荣背后潜藏着隐忧。城市的急速扩张令基础设施不堪重负，每日常有逾十万民众乘轮渡往返两地。民众对高昂且不靠谱的轮渡服务积怨已久，最终在1959年爆发骚乱。上至官员下至百姓，无不思考着将海湾两岸更为紧密连接的可能。"
 state_lore_initials.400: " VTA "
 state_lore_name.400: "维多利亚"
 state_lore_desc.400: "维多利亚坐落在河中小岛之上，周围尽是茂密的雨林，数百年来近乎与世隔绝。20世纪初时，维多利亚是巴西各州首府中规模最小的，常住居民仅有万人上下。然而，米内罗的大亨们看中了当地的潜力，认为这里地理位置优越，十分适合建立一处新港口，担当起外运咖啡和矿产资源的重任。随后数十年，他们投入了大量的资金，港口终于在1940年建成开放。时至今日，维多利亚已成为了一处繁荣的贸易中心。由于城市发展较为滞后，维多利亚周边的热带雨林得以完整保留下来，当地以其优美的自然风光而驰名全国；而且由于并无重工业工厂，维多利亚可能称得上是全巴西污染最轻的城市。由于这两个原因，巴西富豪纷纷在近年来涌入这座城市，逃离笼罩其他地方的烟尘雾霾。"
 state_lore_initials.401: " BHZ "
 state_lore_name.401: "贝洛奥里藏特"
 state_lore_desc.401: "19世纪末，米纳斯吉拉斯州旧首府欧鲁普雷图的规模已经超过了当地小山谷的承载能力。州政府便将目光转向了位于州内中心、气候温和、宽阔而又少人居住的谷地，希望在曾经只有牛群放牧的地方建设一座米纳斯吉拉斯州前所未有的大都会。1897年，新州府贝洛奥里藏特落成。此后三十年里，贝洛奥里藏特发展成为了巴西第一座真正意义上的内陆大城市。在此之前，米纳斯吉拉斯州的腹地只是将原材料出口到沿海港口；而如今，同样的原材料则供应着首府欣欣向荣的钢铁厂和水泥厂。四十年代期间，在儒塞利诺·库比契克市长的领导下，当地经济快速增长，基础设施得到了全面扩建。库比契克的政治生涯由此地而肇始，他将在日后成为总统，把自己的手段推广到全国的城建发展之中。贝洛奥里藏特的经济正日益多元化，一如既往地快速增长。不久的将来，这里几乎肯定会超过累西腓，成为巴西的第三大城市。"
 state_lore_initials.402: " GNA "
 state_lore_name.402: "戈亚尼亚"
 state_lore_desc.402: "就在短短几十年前，戈亚斯州还只是衰败落后的穷乡僻壤，土地集中在少数几个效率极低的地主手中，甚至连与巴西其他地区相通的土路都寥寥无几。除了家庭作坊式的小工场外，当地没有任何工业。1932年，瓦加斯发起了巴西的西进运动，承诺为内陆腹地带去现代化，戈亚尼亚正是这一计划的核心：这里将是戈亚斯州的新首府，公园占城市建成区面积的三分之一。1937年落成之后，戈亚尼亚便迅速成为农业综合企业的中心枢纽，超过了城建规划者最乐观的预测。1950年至1960年间，得益于当地发展和巴西利亚的建设，戈亚尼亚的人口增加了两倍。今天，戈亚尼亚出产的化肥、农机和植物油供应着养育全国的面包篮。"
 state_lore_initials.403: " BEL "
 state_lore_name.403: "贝伦"
 state_lore_desc.403: "当最初的葡萄牙定居到达贝伦时，他们并不知道身边的亚马孙河乃是世界第一大河，但他们知道当地土著在河岸集市上交易的香料有多么独一无二。自那时起，贝伦便维持着这一独特商品对外门户的地位。19世纪末，贝伦的统治者们又为这一门户找到了更有价值的商品——橡胶。很快，城市官员们都过上了国王般的生活，贝伦迅速富裕起来，权贵们已经能买得起与巴黎和柏林相媲美的奢侈品；然而同时，贝伦周边的帕拉州却仍是全国最贫困的地区。尽管许多炫耀城市财富的纪念碑依然矗立在城中，可橡胶业的繁荣却无法永远延续下去。如今，数以十万计的人们蜂拥而至，造就了城里不断膨胀的贫民窟。"
 state_lore_initials.404: " SLS "
 state_lore_name.404: "圣路易斯"
 state_lore_desc.404: "圣路易斯岛三面环水，海面宽阔，水深适宜，是天然的优良锚地。在优越的地理条件下，这座殖民时期的港口城市渐渐繁荣起来，因知识分子的活动而声名远播，被冠上了“雅典”的美称。然而，席卷而来的工业革命为许多城市注入了新的活力，圣路易斯却落在了后面。长久以来，巨大的潮汐涌浪使得港口设施的开发建设和现代化变得极为复杂。自独立以来，许多人都曾梦想过重振圣路易斯的荣光，但由于缺乏自然资源、与其他城市联通不足，再加上港口发展因潮涌而停滞不前等诸多原因，种种设想尝试都以夭折告终。要恢复巴西雅典的荣光，或许需要直面波塞冬，战而胜之。"
 state_lore_initials.405: " TRS "
 state_lore_name.405: "特雷西纳"
 state_lore_desc.405: "早在库比契克总统梦想为巴西建设一个新首都之前，萨赖瓦顾问就已梦想过为皮奥伊州建设一个新首府。他认为，皮奥伊要发展，就需要在州内两条干流的交汇处建立一座城市。1852年，特雷西纳在建城十周年之际成为巴西北部第一座大型内陆城市，并且成为了未来所有规划城市的参照模板。考虑到当地恶劣的气候和自然环境，特雷西纳的成功更加令人印象深刻：这里酷热难耐，终年狂风大作，唯一的优势可能就是湿度极高加上夏季暴雨，可以使得城市免遭野火威胁。然而，这些条件几乎没有拖慢城市的发展，特雷西纳与巴西最温暖而环境优美的城市一样，正承受着巨大的人口压力。"
 state_lore_initials.406: " FOR "
 state_lore_name.406: "福塔莱萨"
 state_lore_desc.406: "塞阿拉州的土壤条件既不适合种植谷物，也不适合种植甘蔗，因此在殖民时代，这是个落后的地方，福塔莱萨只是沿海一个平静的小镇而已。但是，随着轧棉机的问世，大型的奴隶棉花种植园在整个塞阿拉如雨后春笋般拔地而起。福塔莱萨迅速发展成为繁荣的制造业城市，当地制衣纺织厂的开业标志着巴西工业革命的肇始。即使现今奴隶制早已废除，服装制造也依旧是福塔莱萨的特色产业。但是，由于这座城市仍然严重依赖产量年年波动的棉花，故而常常面临经济萧条与大规模失业的难题。经济多元化的努力尚未取得成果，这一问题在过去十年间愈发深刻。福塔莱萨与巴西其他大城市一样，正经历着快速的城市化进程。"
 state_lore_initials.407: " NAT "
 state_lore_name.407: "纳塔尔"
 state_lore_desc.407: "与巴西其他城市相比，纳塔尔的历史更像是个有关军队的故事。纳塔尔起初是个为了打击法国走私者而建立起的要塞，在荷兰入侵巴西时抵御过多次袭击，其战略地位早已获得公认：这里不仅是新大陆最靠近欧洲的港口，而且是几乎所有从巴拿马、纽约前往印度洋航线的必经之地。1930年，现代化的水上飞机基地竣工；1932年，海军基地建成——纳塔尔由此成为巴西参与同盟国反潜行动的主要基地。战后，纳塔尔始终是巴西军事航空创新的中心，也是本国同OFN展开合作的实际总部。"
 state_lore_initials.408: " JPA "
 state_lore_name.408: "若昂佩索阿"
 state_lore_desc.408: "帕拉伊巴州首府的名字本身就象征着巴西大众民主与寡头政治之间永恒的冲突。若昂·佩索阿州长因反对帕拉伊巴州根深蒂固的寡头政治而备受爱戴，但他自己其实也是寡头的一员。1930年，佩索阿遭到谋杀，引起了全国范围内的愤怒，他所治理的城市也依照他的名字重新命名。但时至今日，若昂佩索阿面前的问题比腐败还要更加直击根本。这里是现在东北地区最不发达的港口城市，几乎没有任何工业可言，同两个世纪前一样，它仍旧完全只是帕拉伊巴州农村奢侈品作物出口的枢纽而已。可是，与其他各州首府相同，若昂佩索阿也面临着严重的人口压力，商品价格持续下跌，迫使帕拉伊巴的农村贫困人口涌入若昂佩索阿的城郊，寻找更好的工作生计。"
 state_lore_initials.409: " MCE "
 state_lore_name.409: "马塞约"
 state_lore_desc.409: "马塞约的海滩是世界上最纯洁干净的海滩之一，这里的自然美景或许只有马塞约海岸附近的珊瑚礁才能与之相媲美。上天赐予了这里美丽，可精英阶层的富裕却染满了奴隶劳工的鲜血，倚仗掌权者间根深蒂固的利益网络维持至今。与其他巴西东北部主要港口相比，马塞约的民用基础设施与公共服务严重落后。不过，尽管这座城市沉疴在身，但真正希望的迹象正在地平线上浮现。近来发现的石油贮藏催生了当地新型的能源行业；而且随着客运航空的兴起，马塞约堪比加勒比海的美丽风光也将会吸引许许多多的美国游客涌向这里的海滩。"
 state_lore_initials.410: " AJU "
 state_lore_name.410: "阿拉卡茹"
 state_lore_desc.410: "巴西北海岸几乎所有大城市的起源都可以追溯到殖民时代，阿拉卡茹却并非如此。虽然早在1699年，这里就有了个名唤阿拉卡茹的小渔村，但直到很久之后的1855年，人们才意识到塞尔希培州需要一个好港口，于是开始着手规划城市。起初，城市建设十分缓慢，但随着20世纪初巴西城镇化进程的全面加速，阿拉卡茹渐渐发展成为了一座真正的现代化城镇。近年来，阿拉卡茹仍在加速成长，州政府在交通、电力、制糖产业等多个方面为城市划拨了大量资金，力图将阿拉卡茹打造成为能够与任何旧殖民地时代港口城市等量齐观的大都会。"
 state_lore_initials.411: " SVD "
 state_lore_name.411: "萨尔瓦多"
 state_lore_desc.411: "长久以来，在许多人的想象中，巴伊亚萨尔瓦多都是巴西与世界的门户；但对无数人而言，这道门户只能单向通过：被贩卖到萨尔瓦多的非洲奴隶比其他任何殖民地港口都要多，当地因此发展成为了非裔巴西人族群和文化的中心。萨尔瓦多是桑巴舞的发源地，以音乐和新颖的烹饪菜式闻名，既对巴西文化产生了不可忽视的影响，又独特地有别与更广泛流行的巴西文化。然而，这里的不平等现象比巴西其他任何地方都要更加明显。一条横断城市的高大悬崖将萨尔瓦多一分为二，一边是困顿贫困、以黑人居民为主的“下城”，一边是生活富裕、以白人居民为主的“上城”。如今，成千上万生活在农村的非裔巴西人正离开甘蔗和水果种植园，去往城里讨生活，这些问题只会随之愈来愈尖锐。"
 state_lore_initials.412: " KTW "
 state_lore_name.412: "湛江"
 state_lore_desc.412: "湛江从前名唤广州湾，原先只是一座平静的小村庄，直到法国注意到此地控扼雷州半岛的战略潜力，才出手将其租借为自由港，取名叫做“白雅特城”，是法国唯一的在华殖民地。抗战期间，广州湾是少数几个受列强保护的安全港埠之一，因此有大量难民涌入其中，带来了短暂的繁荣。但法国政府向日本投降后，难民潮也随之迅速消退。\n\n中国恢复和平后，根据《广东协定》，湛江与海南岛归还南京政府。然而，这是一块南京鞭长莫及的飞地，湛江很快就化作了叛乱与异见的温床，最终在1955年的危机中彻底陷入混乱，西南各军阀趁机借“戡乱”之名，出兵驱逐了南京在当地派出的官员。此后，湛江便一直处于军阀的控制之下。\n\n作为西南唯一的主要港口，湛江因其繁荣而得到了急需的资源与投资倾斜。毋庸置疑，湛江是西南自治的重要支柱，它的地位只会越来越高，即使某些外部势力对此并不乐见。"
 state_lore_initials.413: " HAI "
 state_lore_name.413: "海口"
 state_lore_desc.413: "海口的历史可以追溯到宋朝，长久以来都是中国最南方省份的门户，扼守通向中国南海的大门。由于其战略地位，海南在近代史上吸引了各大帝国主义列强的目光，但幸运的是，列强之间的内讧使得海南未曾沦入殖民统治——直到日本帝国吞并此处，当地才陷入空前的最黑暗、最血腥的时代。\n\n抗战结束后，《广东协定》签署，日本帝国海军无奈将海南岛移交予民国政府。如今，广东全省已经基本落入日本和地方军阀之手，海南则是南京控制下最后的地盘。南京方面允许海南以“特别行政区”的名义自治，希望以此争取广东民众。\n\n现在的海口是海南特区首府，民国最繁忙的中转港口之一。然而，在海口繁荣的背后，是沉默的大众，他们从未忘记帝国主义留下的伤痕，以及不仅对暴政视而不见，甚至还要背叛祖国的通敌者。"
 state_lore_initials.414: " BAK "
 state_lore_name.414: "巴库"
 state_lore_desc.414: "“若我们没能得到巴库的石油，战争就失败了。”\n\n正是希特勒的一番话，让国防军开进了阿塞拜疆的油田，里海明珠蒙受军靴践踏，这座高加索首富之城的百年故事就这样打上了休止符。\n\n据阿塞拜疆民间传说，“巴库”得名于波斯语的“巴德库贝”，意为“风吹之城”，数世纪以来，这一特征决定了这座阿塞拜疆祖先之城的命运。从阿契美尼德波斯帝国和亚历山大帝国的希腊人，到古罗马人和拜占庭人，再到奥斯曼人与俄罗斯帝国，一直到苏德战争，地处欧罗巴、伊斯兰世界与西亚交界的巴库接待过半个世界的征服者。\n\n一战后，世界对石油的需求与日俱增，巴库人很快就意识到了巴库对于阿塞拜疆庞大的石油开采业何等重要，更别说外地人了。因此，当德军向布哈林俄国进军，击垮阿塞拜疆苏维埃社会主义共和国，将其纳入高加索专员辖区后，巴库很快就成为了第三帝国资源开采机器的核心。只要巴库的石油还在源源不断地流淌，德国就仍能享有高加索解放者的美誉。\n\n就同德国生存空间最南疆的其他地方一样，巴库以黑金换取安宁。德国人授予阿塞拜疆人的有限自治权在该市“行之有效”。然而，不安的阴云笼罩着城市。每当看到国防军的半履带式坦克在希尔万沙宫下游行时，一些人不禁怀疑，这座大城市的未来是否会更为灰暗……"
 state_lore_initials.415: " TNS "
 state_lore_name.415: "突尼斯"
 state_lore_desc.415: "伟大的迦太基，神话与远古的历史在此交织——如今矗立在这片土地上的是大都市突尼斯，化为罗马征服缩影的布匿故土早已在千年时光中随风而逝。如今的这里变得更为现代，阿拉伯传统与殖民色彩于此交叠变幻。\n\n有史以来，突尼斯就是海纳百川——闪米特腓尼基人在这片土地上建立起强大的帝国，而罗马人则在短短数月之内将这一切夷为平地。这二者相继陨落之后，阿拉伯人大量迁入，开启了重建与伊斯兰化的时代，突尼斯市民成为虔诚的穆斯林，向众多哈里发俯首称臣。从穆瓦希德王朝到奥斯曼土耳其帝国，突尼斯人始终忠心无二。\n\n无论换上什么主子，突尼斯始终处于兴衰更迭的不断循环之中。数十年前抵达突尼斯的法兰西帝国用商业挽救了日暮西山的贝伊国。而随着法属非洲的土崩瓦解，墨索里尼迫不及待地将这罗马秩序的心脏纳入囊中。\n\n虽然法西斯恶魔从未登陆迦太基海岸，也未曾效法罗马人撒盐灭城，突尼斯的精英们还是明智地选择不与他们对抗。随着这可怕的盟约在过去十多年间日益巩固，明眼人都看得出来，如今的新推罗不过是罗马铁腕下任人摆布的傀儡。"
 state_lore_initials.416: " NEM "
 state_lore_name.416: "内马"
 state_lore_desc.416: "尽管奥卡尔沙丘寸草不生，穿行撒哈拉商道的图阿雷格人仍能找到更宜居的部分安居落户——对于阿扎瓦德人来说，内马就是这样一个庇护所。\n\n在法兰西于二战陨落之前，内马就已经是法属西非当局治下毛里塔尼亚为数不多的几个主要定居点之一。就如其他传统的柏柏尔人领地一般，法军于19世纪开始以外交统一与军事征服非洲土著王国等手段包围、控制这些游牧的土地。在沦为法国殖民地的这段时期，该区域多数摩尔人仍是牧民——但还是有个别聚居点形成，充当贸易据点和行政管理中心。内马客观上缺乏可耕地，其核心职能是给牧民们充当驿站而非一个自给自足的城镇，这就使这里更像一个自治区，而非一个管理统一的行政区。\n\n正如阿扎瓦德其他地方，内马立于庞大奴隶贸易网的中心之上——尽管在前法国政府明令禁止这一行为，阿拉伯埃米尔与精英们仍经营着这暴利的买卖。如今，西非崩溃已经成为无从逃避的事实，但只要他们的人民能继续与世无争、一成不变，当地的王族名贵就会继续默不作声、恪守中立。"
 state_lore_initials.417: " MON "
 state_lore_name.417: "蒙罗维亚"
 state_lore_desc.417: "自由与勇气之地——利比里亚正是美国在西非的缩影。蒙罗维亚就是她的华盛顿，也是少数几个在英法崩溃时幸免于难的地方。尽管真辉格党政府从独裁专制到营私舞弊无恶不作，但不可否认的是，伟大的蒙罗维亚早已摆脱了最初简陋棚屋的样貌。\n\n蒙罗维亚诞生自美国杰出白人的构思，是美国殖民协会就被解放的非裔奴隶所面临的文化问题所提的建议。他们大都认为种族融合不可想象，并一致同意这些自由人必须回到非洲大陆。在詹姆斯·门罗总统的鼎力支持下，1824年这一构思经充足准备终于开花结果，该城也就此冠以门罗之名。利比里亚肇基于91名殖民者，而他们中的88人都是美国黑人。\n\n然而事实上，这种遣返的尝试只是转嫁了美国的种族冲突。操克鲁语的土著并不把这些同样黑皮肤的人视作同胞——这些操着外语的人对他们来说与其他帝国主义者别无二致。而美国殖民者，或是今天的美裔利比里亚人，明显也排斥原住民。当1847宪法确立了立法框架，利比里亚定都蒙罗维亚，远渡重洋而来之人也就成了这片土地的主人。\n\n作为一个西非城市，尽管蒙罗维亚凭着美国援助显著富裕了起来，其社会结构却依然落后。城中每一座珠光宝气的豪宅背后都有数不清的贫民窟。物质财富在这有如商品，始终只集中在少数人手中。"
 state_lore_initials.418: " NIA "
 state_lore_name.418: "尼亚美"
 state_lore_desc.418: "几处不起眼的村落出于殖民需求被整合成一座城镇，如此诞生的尼亚美就是对“不自然”的完美诠释。如今索科托苏丹国控制着这法属尼日尔的前首府，毗邻着西非的一隅安宁之地。\n\n尼亚美的故事始于十九世纪最后一段时光。二十世纪二十年代，干旱与饥馑长期肆虐农村，大量村民涌入了当时人口稀疏的城市，而靠近法国港口的区位优势也使得尼亚美人口激增。约在三十年代末，也就是二战前夕，政府决定展开小规模城市规划，就此构建了大致的人口分布结构。与此同时法国进一步推行天主教，但遭到了占多数的穆斯林的反对，最终徒劳无功。\n\n随着巴黎落入维希法西斯的手中，昔日法国对撒哈拉的控制也烟消云散。时值多事之秋，阿玛济格酋长们控制了艾尔的群山，而随着越来越多的人来尼亚美避难，这片贫瘠土地的负担也愈发沉重。"
 state_lore_initials.419: " ACR "
 state_lore_name.419: "阿克拉"
 state_lore_desc.419: "加纳的土地之上，正肆虐着一场可怕的瘟疫：白色恶魔的入侵。在阿克拉，人们的生活近乎停滞了，但实话实说，若是国家向伤痛屈服，那么还有什么能留下来呢？\n\n早在英国征服此地区前，阿克拉便已沾染了欧洲殖民主义的罪恶。丹麦航海家发现这座城市后，将它的名字从当地加纳人所称的恩克兰腐蚀成了如今的阿克拉。自那时起，欧洲与加纳之家的交易始终都是单向的。\n\n殖民时代，荷兰与英国接踵而至，他们都将这里称作“黄金海岸”，原因自然是此处盛产黄金。然而，劳苦的当地人创造了许多的财富，却从未能从中获得属于他们的劳动果实。1877年，英国将阿克拉定为殖民地首府。自此以来，这座城市就在不断地改建，专门要设计成为对黑人市民最分层、最压迫的形式。劳工每辛苦赚到一盎司，殖民者就能窃取数吨重的黄金，流入外国官员放浪形骸、纵情享乐的富人区之中。\n\n英国早已在德国战争海军面前屈膝下跪——压迫者离开了，阿克拉不觉得这有什么不好。然而，德国征服者并没有欢迎他们步入自由世界。或许，海湾终会吹拂起变革之风，非洲国家联合起来，北方钢铁艨艟的阴影终将散去。"
 state_lore_initials.420: " AGD "
 state_lore_name.420: "阿加德兹"
 state_lore_desc.420: "对于游牧的图阿雷格人而言，与其说阿加德兹是一个定居点，不如说是一处休憩地。它的确是游牧部落在沙海中的锚地，但从来都不是什么稳定的首都，而只是在穿越沙丘的旅途中躲避疲劳的简陋场所。\n\n与艾尔山脉的其他地区一样，阿加德兹也是个贫瘠的地方。它的重要性源于其在中世纪跨撒哈拉商路贸易中扮演的角色：当时，商队常常不得不横穿西撒哈拉，抵达北方各个穆斯林王国。然而，当地环境对远来的旅人并不友好，柏柏尔部落便决定以阿加德兹为起点，开辟出一条属于自己的贸易商道。于是，“食盐之路”应运而生，影响力逐渐扩大到附近的土地，城市随之发展成为了一个苏丹国。由于这里人口稀少且位于撒哈拉中心区域，从桑海帝国到奥斯曼，再到法兰西帝国，许多外来统治者都觊觎着此处。不过，绝大多数时间里，城市都维持着独立的运转体系。传统上，阿加德兹由蓄奴的民族酋长联盟领导，大部分政权接管当地后，都会将其保留为自治附庸。\n\n法兰西第三共和国轰然倒塌之后，艾尔山脉的游牧民们再次回归往日飘忽不定的生活。他们仍然沿袭着自己的亲缘传统，摆脱了数百年来统治这片土地的霸主。然而，迎接他们的并非自由：撒哈拉贫瘠的土地意味着极度的贫困。如今，仅有涓涓细流一般的篷车商队维持着阿加德兹的微弱呼吸；沙漠中，难民随处可见；经济早已危如累卵——唯有对英明苏丹的信仰，维系着这个如同火药库的国家。"
 state_lore_initials.421: " LPD "
 state_lore_name.421: "利奥波德维尔"
 state_lore_desc.421: "[Statelore_Get_Leopoldville_desc]"
 state_lore_desc.421_COG_COL: "利奥波德维尔是欧洲殖民主义的产物。德军及其合作者踏过前比利时殖民地刚果时，这里的人民不过是迎来了另一个暴君。这片最初作为荒淫国王玩物的土地，在过去数十年间始终在压迫性统治的更迭中沉浮。\n\n利奥波德维尔诞生之前，这片区域是亨利·斯坦利率领的国际刚果协会远征队夺取的河畔聚落群，旨在为利奥波德二世的刚果自由邦建立运输总部。其开放港口的地位为橡胶、象牙等资源开采业提供了丰沛原料，代价则是当地部族村庄的毁灭与无数原住民的奴役。约1910年，当刚果从利奥波德二世私产转为比利时殖民地时，利奥波德维尔迎来投资热潮，从贸易枢纽升级为规划城市。随着人口与基建规模逐渐匹配首都地位，1926年它正式取代博马成为总督府驻地。\n\n纵贯这段历史，利奥波德维尔始终是等级森严之地：欧洲殖民者肆意歧视剥削非洲居民，刻意规划的种族隔离区与强制劳役维系着资源掠夺基地的扩张。自德国接管以来，刚果湖的畸变造物使疾病与生态灾难肆虐城郊，民众生活愈加困苦。显然，穆勒的爪牙滞留此地不过是为本土投资集团的贪欲榨取土地残存的资源。希望或许尚存于世，但绝不会眷顾这座苦难之城。"
 state_lore_desc.421_COG_IND: "利奥波德维尔的故事是一幕悲剧，也属于挥之不去的理想主义。虽然穆勒的雇佣军暴徒不再横行霸道，过渡政府也在一定程度上稳定了刚果的局势，但这个饱受蹂躏的国家要从废墟中恢复过来，还有很长很长的路要走。\n\n利奥波德维尔摆脱了旧日压迫者的控制，但提供国家大部分资金的德国企业集团已经撤离，再加上德属中非驻军的困兽犹斗，城市几乎已经被夷为平地。通往刚果湖的物流道路和港口已化作废墟，轰炸使得该城及其周边的大片农田都无法耕种。尽管OFN提供了人道主义援助，能让居民免于饥饿，但比利时和德国支撑利奥波德维尔的产业早已荡然无存。混乱之下，许多昔日的奴隶和劳工四散奔走，空留下荒凉的工厂与房舍。\n\n利奥波德维尔残余的居民正竭尽全力，试图将这里变回以往大都市的样子。然而，从刚果湖引出来的管道因缺乏维护而破烂不堪用，疟疾爆发也是火烧眉毛的难题；至于城郊，虽然疾病较少，但也没好到哪里去，德国人和比利时人的叛乱仍未平息，人们根本无从过上平静的生活。表面上乍看，这里还是与往常一般贫穷破旧，但也有人自我安慰地说，去殖民化将是稳定而艰辛的过程。且不论事实是否如此，但就当下来看，尽管利奥波德维尔失去了一切，但希望还是回到了这片支离破碎的土地之上。"
 state_lore_initials.422: " LUS "
 state_lore_name.422: "卢萨卡"
 state_lore_desc.422: "[Statelore_Get_Lusaka_desc]"
 state_lore_desc.422_LUS_COL: "在德国从大英帝国手中抢来的诸多战利品之中，卢萨卡是战间期英属北罗得西亚殖民政府的行政中心。它曾是英属非洲一处发展中的官僚枢纽，如今则被许蒂希变成了他和同僚们的玩物，一片建立在血腥之上、满是幻梦与机会的土地。\n\n卢萨卡的诞生始于罗得西亚早期地区铁路系统的扩张，许多矿工随着铁路北上来到了铜矿山，在道路交汇点形成了一处聚居地，充当交通枢纽和给水站。虽然这里的早期殖民者都是寻生计的阿非利卡人，但北罗得西亚由英国南非公司移交予皇家后，城镇的地位变得更加重要：殖民政府认为位于南部的利文斯敦交通和基础设施并不完善，转而将新兴的卢萨卡指定为殖民地新首府。\n\n将罗得西亚所有基础设施和体制都迁移到卢萨卡的过程缓慢而零散。该计划从一开始就受到无利可图和缺乏伦敦资金支持的困扰，再加上投资者的大量撤资，该计划只能依赖于贷款才得以继续推动。然而，尽管存在种种障碍，但由于在二战前后的一段时期内，英国战争军工生产所需的资源开采激增，当地曾短暂地恢复了活力。可是，随着本土落入德国侵略者之手，梦想终究迎来了破灭。\n\n德国攫取的卢萨卡是一个半成品，承载着未完成的努力和许多梦想——它们将为新主人而服务，直到生命的最后一刻。"
 state_lore_desc.422_LUS_IND: "罗得西亚和许蒂希留下的遗产并不美丽。但是，在赞比亚等待重建的满目疮痍之中，卢萨卡成为了一个朦胧的写照，昭示着旧主子与后继者都绝无可能再将未曾化作现实的事物复现于世。\n\n英国人建造的基础设施早已在旷日持久的冲突中化作一片焦土，如今的卢萨卡早已难觅过去殖民者引以为豪的旧铜带中心的踪迹。人们在用人道主义援助和捐款人送来的材料匆忙搭建的简陋营地里休息，而不那么幸运的人则被困在了经年累月辛苦劳作的工地上面。铁路系统是北罗得西亚的明珠，但在残暴非人的怪物统治下，铁路也只是城市繁荣时代所留下的残存遗迹。\n\n物质上的破坏似乎已经是非常严重，但更为严重的破坏是生于斯、长于斯的人们的精神。百年来，卢萨卡的居民始终身在社会底层，几乎没有人把他们当作同胞看待，更不用说给他们进步提升的机会了。党卫队甚至比英国人还要更不关心所谓“下等人”的事务，因此，卢萨卡现今的管理机构不仅要面对伤痕累累的环境，而且也没有办法做到更好。\n\n名义上，赞比亚人民已不再是欧洲入侵者的奴隶，但遥远国度所留下的贫穷与枷锁，注定了卢萨卡将与锈迹斑斑的镀金往日交织在一起，无从摆脱。"
 state_lore_initials.423: " BRT "
 state_lore_name.423: "贝鲁特"
 state_lore_desc.423: "贝鲁特坐落于地中海东岸，是黎巴嫩最大的城市和文化中心。这是一座历史悠久的城市，历史始于五千多年前。在全世界历史未曾中断的城市之中，贝鲁特是最古老的地方之一。从腓尼基人、希腊人再到罗马人，从穆斯林到基督徒，再从奥斯曼、意大利到法兰西，黎巴嫩与贝鲁特遇到过各种各样的征服者，但它仍保持着自己独特的地位。城市建筑中折射着它的厚重历史与独立认同，这里有巴黎风格的林荫大道，有罗马帝国留下的古迹遗址，还有中世纪的基督教堂和装点着阿拉伯式花纹的街巷民宅。\n\n19世纪后半叶，欧洲贸易迅速增长，马龙派基督徒涌入当地，贝鲁特迅速成长为了一处重要的商业枢纽，并在奥斯曼帝国治下获得了更广泛的自治权，由此奠定了贝鲁特现代格局的基础。此后，由于法国的优惠待遇与意大利殖民政府较为宽松的政策，贝鲁特又赢得了发展的空间与机遇。\n\n尽管穆斯林与基督徒之间的教派分歧正越来越严重，但贝鲁特仍在蓬勃发展，成为地中海畔最明亮的明珠之一：她是旅游客心中的胜地，金融投资的去处，商人、工人、艺术家与哲学家的家园。贝鲁特不仅仅只是一座城市，它是通向中东的锁钥，通向风起云涌与遍地机遇的门户。"
 state_lore_initials.424: " ABU "
 state_lore_name.424: "阿布扎比"
 state_lore_desc.424: "大英帝国土崩瓦解之后，意大利接手了特鲁西尔诸国。彼时，这只是个争吵不休、无人在意的部落联盟。但是，黑金渗透着这里的每一寸土地，落后的阿布扎比酋长国摇身一变，成了阿拉伯海湾的王冠，它的首都自然随之成为闪亮的明星。\n\n阿拉伯语之中，“阿布扎比”意为“羚羊之地”，酋长国起源于一个内志定居者氏族，自18世纪以来就掌控着当地。后来的屡次冲突之中，纳赫扬家族占据了海湾半岛尖端的部分土地，成为了氏族中最具影响力的分支，迪拜东北部则在此后分裂了出去。19世纪，大英帝国以条约和优遇为手段将各酋长国合并，以保护对外贸易、遏制海盗劫掠并开发资源。岛屿城市阿布扎比的发展由此发轫。\n\n直到本世纪二十年代时，阿布扎比的收入都还仰赖于季节性的珍珠采收，但珍珠养殖技术的发明和一战后的经济萧条近乎掐断了这条财路。此后，当地一度陷入极度贫困，英国因此于1935年首次授予其特许权，希望这里能像其他波斯湾国家一样找到石油。然而，在一眼望不到边的沙漠面前，投资者纷纷望而却步，石油勘探工作万分困难。墨索里尼和意大利当时接过的，就是这样一个烂摊子。\n\n但是，近十年中，特鲁西尔地区发现了极为丰富的石油矿藏。乌姆沙伊夫油田钻出第一口油井之后，阿布扎比上层精英的投资纷至沓来，投入到钻机和精炼设备的建设之中。在意大利主子的鼓励之下，新油田在阿布扎比附近雨后春笋般拔地而起，所有公司都对这个曾经落后孤立的弹丸之地所蕴藏的财富垂涎三尺。"
 state_lore_initials.425: " MUS "
 state_lore_name.425: "马斯喀特"
 state_lore_desc.425: "马斯喀特是阿拉伯国家与波斯之间的门户，它生而注定会为外国势力所觊觎。过去数百年间，马斯喀特一直都在葡萄牙与奥斯曼脆弱的控制之下，双方不断争夺着阿曼海的入口，实现自己的帝国雄心。在殖民者大大小小的争吵之中，这座港口城市的统治者自古以来保持着重商主义的思维，在俯首称臣与孤立之间摇摆徘徊。\n\n19世纪末，这样的贸易游戏终于走到了尽头：英国在中东的影响力与日俱增，各种条约与文件埋葬了阿曼的独立之梦。尽管失去了名义上的自治权，但赛义德王朝的苏丹们仍牢牢控制着马斯喀特及其周边城市。伦敦霸主为他们抵御部落入侵，以此换取扼守海峡的地理优势，攫取隐性的利益。在此期间，马斯喀特仍在继续与印度、波斯等传统伙伴继续进行贸易活动。\n\n英国本土沦陷后，笼罩在中东上空的阴云即刻随之消散，意大利趁此空当，急吼吼地将黎凡特与海湾的大片土地收入囊中。虽然阿曼不愿再重蹈覆辙，落入欧洲人的支配，但当下看来，宽松合作似乎是最安全的道路。"
 state_lore_initials.426: " COI "
 state_lore_name.426: "哥印拜陀"
 state_lore_desc.426: "哥印拜陀坐落在西高止山的阴影之中，曾经是扼守帕拉卡德山口的战略要地，可以由此穿越群山，经由狭长平坦的道路前去西海岸和喀拉拉邦。数百年来的历代王朝都意识到了它的重要性，朱罗、毗奢耶那伽罗、迈索尔乃至波犁迦罗等等统治者都曾来到这里，英国则是最后的征服者。随着殖民者的降临，各个试图控制当地的敌对王朝纷纷灭亡，逃离孟买的棉花产业再次刺激了哥印拜陀的新增长。\n\n1920年初，哥印拜陀迎来了第一波纺织业的繁荣。随后数年里，机械化农业、甘蔗加工、发电厂、工学院和最为重要的机械纺织业都得到了迅猛发展。印度过渡至独立之后，中央经济政策又带来了资金、人员和原材料，哥印拜陀快速发展，跃升成为了泰米尔的第二大工业城市。"
 state_lore_initials.427: " COC "
 state_lore_name.427: "科钦"
 state_lore_desc.427: "历史上，科钦是重要的香料贸易转口港。罗马人、阿拉伯人、犹太人、中国人——五湖四海的商人都曾在这里相知相会，讨价还价，然后荷包空空，满载而归。后来，西方的葡萄牙取代了罗马，东方的中国退出海洋，扎莫林试图征服这个港口。在欧洲帝国主义与内部纷争的浪潮之中，土邦应运而生，平衡依然存在。英国人来了又走，摩诃罗阇走下王位，然而城市依旧矗立，它对访客依旧兼容并包。\n\n虽然香料早已不再是全球贸易唯一的驱动力，但科钦经济已经开始走向世界：邦政府和国家都正寻求在此建起一座崭新的超大港口，将目光投向阿拉伯海。同时，海军也计划在此建立海军基地，容纳新生海军和走向蓝水霸主的梦想。"
 state_lore_initials.428: " MDU "
 state_lore_name.428: "马杜赖"
 state_lore_desc.428: "当启蒙运动的曙光还未照耀世界其他地方时，桑冈与泰米尔文学语言的黎明就已浮现在马杜赖的地平线之上。潘地亚王朝的心脏坐落于此，朱罗王朝将此夺为己有。后来的数百年间，北方的突厥人、西北的泰卢固人、东边的尼扎姆王公，再到最后远在大洋天边的大英帝国，无一不觊觎着马杜赖的宝座。如今，一切往事随风消逝，但城市往日的辉煌与它孕育的文化却从未消亡。\n\n马杜赖仍然是泰米尔语圈的重要城市，拥有关键的政治地位。国会议员正竭尽全力保住当地的控制权，共产党则在不断壮大。此外，苏巴斯·鲍斯的党羽仍在暗处潜伏，伺机而动。马杜赖曾是前马德拉斯管辖区的枢纽之一，如今，它依然是泰米尔纳德邦南部、乃至南印主要的行政、教育和官僚中心。"
 state_lore_initials.429: " VNT "
 state_lore_name.429: "万象"
 state_lore_desc.429: "老挝绝大多数地方仍然困在历史之中，处于封建社会阶段，而万象则代表着不同的事物——现代化。\n\n在老挝王国的传说中，一位嫉妒的王子失去了继承王位的资格，在弟弟的帮助下建立了万象城。根据七头娜迦的建议，他将城市基址选定于此。而实际上，历史学家研究认为，万象城起源自早期的孟族聚居地，后来曾为高棉帝国所统治。最终，高棉帝国走向灭亡，佬人将此地据为己有，同化了残余的高棉人。三百多年来，万象始终都是老挝澜沧王国的中心，将神话变成了现实。\n\n然而，繁荣并未能持续下去。澜沧王国灭亡后，万象沦于暹罗宗主之手，数次被征服并夷为平地，王国流传下来的财富四散无遗，城市在雨林之中荒废，等待后人重建……直到法国到来。殖民者将万象指定为新首府，当地得以恢复旧观，然后获得了日本送来的“独立”。现今，这座城市是老挝全国上下向往的典范、与亚洲接轨的榜样，而这一切都离不开日本的帮助。"
 state_lore_initials.430: " PMP "
 state_lore_name.430: "金边"
 state_lore_desc.430: "当旭日的光芒洒向这片大陆，金边“亚洲明珠”的盛誉却未曾褪色——这座百万华灯之城，数十万生灵仍在柬埔寨的中心舞台翩然起舞。\n\n这座五世纪建立的平凡聚落，渐次绽放为声名远播的壮丽村落，终引天意垂青。传说中，边夫人于河岸发现一株浮木，内藏四尊佛像与毗湿奴神像。人们视此为神启，遂建塔山寺供奉佛像，城市由此得名。高棉帝国倾覆后，暹罗攻陷吴哥通王城，奔哈亚国王迁都金边，使其成为王朝数十年根基。然因王位争夺引发的内乱，都城遭弃置，孤悬尘世三百六十载，直至诺罗敦一世重振王权。\n\n法国殖民时期，金边沦为建筑实验的温床，各式先锋设计如旋风般将其推向现代。这般际遇使其成为殖民统治的少数受益者，却也在某些人眼中沦为现代性痼疾的堕落纪念碑。日本人的到来未改此局，浮华表象下腐败暗涌。华裔商人遭疑忌，被共和派与民族主义者斥为毒瘤。娼妓横行无忌，政治禁锢森严，金三角的毒品洪流日益汹涌。崩裂之音，终将响彻。"
 state_lore_initials.431: " MED "
 state_lore_name.431: "棉兰"
 state_lore_desc.431: "共和国并不善待棉兰。\n\n无边无际的灌木丛与藤蔓掩盖着富丽堂皇的宫殿与往昔光荣的纪念碑。这里曾是生产香料与烟草的繁华之地，是苏门答腊岛鎏金生辉的汇聚之地，散发着独一无二的光芒。然而，它却沦为了一片残垣断壁，王权的象征成了黄金时代转瞬即逝的警示。\n\n这是1945年炮火洗礼下的棉兰。如今，崩塌破碎的王都重生为商业与发展之城。矿业公司与信贷经纪人的新办公室取代了过去苏门答腊王室与荷兰人的建筑。新活力让棉兰重焕生机，由爪哇岛而来的大波移民潮源源不断，他们双手空空，眼眸中却满是机遇的光芒。尚还在世的老苏丹仍留在城中，眼睁睁地目睹祖先留下的遗产面目全非，陌生但又古怪地令人兴奋。他不知该如何看待这一切，永远地沉浸在麦蒙宫的迷梦之中——宫殿不仅是棉兰的象征，也是印度尼西亚的象征，象征着已然失落的时代。\n\n从逐渐崩毁的废墟之中，新黎明在城市中崛起，从旧时代走向新时代。"
 state_lore_initials.432: " KUC "
 state_lore_name.432: "古晋"
 state_lore_desc.432: "在沙捞越河淤积的河口旁，古晋狭窄的街道见证着士兵们整齐划一的步伐与孩童嬉闹的零乱足印，粗制滥造的人力车辚辚作响的车轮与爱侣漫步时默契的步调。与周遭的聚落别无二致，古晋的社会政治等级最终都汇聚于一位欧洲人身上——他是帝国的化身，是外来统治与殖民剥削的具象。然而古晋的统治者并不栖身于总督官邸，他的合法性既不来自伦敦的王座也不源于巴黎的议会，他自有旌旗在风中猎猎飘扬，俯瞰着码头上匆忙的工人与被明艳碧色浸染的风景。\n\n在古晋，这位白人君主的头顶佩戴着庄严的冠冕。他的居所即宫殿，他的顾问即廷臣，他的名字被冠以优雅的“拉惹”尊称。这个国家的权杖被一位冒险家握在手中，他的政令之重在这座城市烙下难以磨灭的印记。即便他的旗帜从旗杆上被扯下，换上另一位帝国主宰者的红白旗，人们仍能察觉到旧政权挥之不去的残影：古老的石砌堡垒尽管驻守着新主麾下的士兵，却依然保留着鲜明的英伦风格；王室的纹章仍镌刻在仓促掩藏的牌匾之上；老国王名字的音节仍不时从叻沙碗边压低的交谈中迸出。往昔的幽灵依然在古晋徘徊，始终不愿舍弃它的身份印记。"
 state_lore_initials.433: " TAP "
 state_lore_name.433: "臺北"
 state_lore_desc.433: "人们或许会认为，台湾岛首府的历史底蕴，应该与其所属岛屿整体一样深厚丰富。但事实并非如此。台北的殖民史，始于西班牙与荷兰在淡水建立的据点，而后被清廷驱逐并取而代之。此时的台北不过是众多落后港口城市中的一员，直到英法日列强对中华大陆的扩张主义浪潮，才为这座稚嫩的台湾城市勾勒出未来发展的蓝图。\n\n鉴于台北对中国大陆的战略重要性，清政府将其定为台湾省首府并启动快速现代化进程。然而甲午战败的宿命，终使该岛被纳入日本帝国版图。虽远离台湾历史中心且驻军稀少，但因其与日本本土列岛隔海相望的地理优势，更名后的台北仍成为日本在台统治的核心。\n\n自并吞之日起便深受本土青睐的台北，蜕变为日本现代化建设的原型典范。其给排水系统甚至早于东京竣工，日本为台北设计的街景城市规划更成为1923年关东大地震后东京重建的蓝图。\n\n尽管满洲国边疆城市与广东繁华都会竞相吸引东京目光，但无论本土日本人、大陆中国人、台湾乡民或原住民如何看待，台北人——无论是闽南籍还是日籍——都深信台北是全亚洲最先进、最美丽、最卓越的都市。"
 state_lore_initials.434: " PYG "
 state_lore_name.434: "平壤"
 state_lore_desc.434: "自日本炮火穿过城墙，粉碎亚洲千年不变之现状的那一刻起，平壤便永远改变了。首当其冲的是名称——虽然汉字未变，却换成了日语读法。然后是基建，平壤如今是联通南北以及远方的铁路枢纽。建筑物、发电厂、航道、电力，这里有现代城市所需的一切（以及维持殖民统治所需的一切）。但最后一样濒危的事物，人民的文化，却幸存了下来。经历了传教士的洗礼、城市的更名、对语言的破坏、还有对五一运动的镇压，种种事件后，朝鲜文化仍在她的第一座城市中踽踽而行。\n\n可希望之光正日益黯淡。多数学生接受了一生的日语教育，市民们开始遗忘这座城市的旧名。时值1962，汽车在平壤挂满汉字和假名招牌的街道上缓缓驶过，城市的夜空也为现代的玻璃混凝土所割裂，在拥挤的公寓间，过去的记忆愈发模糊。"
 state_lore_initials.435: " HMH "
 state_lore_name.435: "咸興"
 state_lore_desc.435: "咸兴，朝鲜王朝的龙兴之地，八百年来为石墙所护，安然自立山水间。1906年6月，日本人企图按照自己的意愿重塑这座城市，石墙被摧毁，咸兴就此从废墟中新生，成为帝国在朝鲜半岛上的一条重要动脉，并连通着化肥厂、水力发电站和港口设施，形成了朝鲜最大的工业集群之一。\n\n战后，为了满足贪得无厌的亚洲新秩序，咸兴的人口爆炸增长，土地无序扩张。西靠湖建川，东邻城川江，公路网死板地贯穿城市景观，古老的市中心湮没在单调乏味的居民楼和商场中。这里比起旧大陆更像新大陆。不过，咸兴仍在发展，乡村居民拼命涌入此地，渴望寻得新生活，而咸兴的主子们也乐此不疲。"
 state_lore_initials.436: " PER "
 state_lore_name.436: "珀斯"
 state_lore_desc.436: "珀斯常常被认作是澳大利亚最为与世隔绝的州首府，偏远的地理位置和与浩淼印度洋的联系塑造了它的样貌。1829年，珀斯以英国殖民地的名义建立，起初只是大陆西陲一处不起眼的前哨。时光流逝，依托19世纪末淘金热和西澳大利亚矿产资源带来的财富，它逐渐发展成为了繁华的商贸中心。到本世纪中，珀斯已是一座充满活力的城市，现代摩天大楼与殖民时代的老建筑交相辉映；弗里曼特尔港口则是繁华的航运中心，推动着珀斯的经济增长，将澳大利亚西海岸与全世界连为一体。\n\n如今，日本是太平洋的霸主，共荣圈的势力范围遍及亚洲，珀斯因此成为了澳大利亚国防最西端的堡垒，也提供了避开东部危险海域的另一条航线。珀斯的产业曾一度以矿业和农业为中心，后来又有部分转向支持国防，它孤悬大西的地理位置既是优势，也是软肋。\n\n无论如何，坐落在蜿蜒天鹅河畔、美丽海滩之滨的珀斯仍在新秩序中继续昂扬向上的步伐。广阔的郊区、翠绿的公园与海岸边繁忙的海军活动形成了鲜明的对比。从市政厅到国王公园，许多走过百年历史的建筑依旧俯瞰着城市，象征着澳大利亚西疆的坚定不移。"
 state_lore_initials.437: " ADE "
 state_lore_name.437: "阿德莱德"
 state_lore_desc.437: "阿德莱德一直都是澳大利亚各州首府中的佼佼者。它建立于1836年，起初便是一处自由民的定居点，而非罪犯流放地，因此，当地早期发展的动力源于公民与宗教自由的原则。从宽阔的林荫大道到宏伟的殖民建筑，阿德莱德的初创者们憧憬着建起一座模范城市，文化、工业、社区能够在此和谐发展。很快，得益于周边的农场，阿德莱德成长为重要的工农业中心，出产全澳大利亚最醇美的葡萄酒和最优质的谷物。\n\n阿德莱德是澳大利亚国内贸易网络的重要一环，远离太平洋的地理位置赋予了它安全的周边环境，世界的风云变幻总是要滞后些才能来到这里。与澳大利亚的沿海大城市相比，阿德莱德不需要时刻警惕外界，它之所以能够继续维持乃至发扬其独特的魅力，多半都要归功于此。\n\n林荫道、公园与典雅的建筑依旧是阿德莱德的名片，在激荡的世界浪潮之中给人以安稳和平静。当地仍然拥有作为文化中心的崇高声誉，近年来开办的阿德莱德艺术节和艺穗节吸引着世界各地的艺术家与表演者。在愈发警惕的国家之中，阿德莱德代表着难得的喘息之机，也是未来希望的象征——希望有一天，澳大利亚所有的城市都能像南澳大利亚州首府一样，回归田园牧歌般的平和美丽。"
 state_lore_initials.438: " MEL "
 state_lore_name.438: "墨尔本"
 state_lore_desc.438: "墨尔本建城于1835年，彼时正值澳大利亚城市快速扩张的经济繁荣期。此后，墨尔本迅速发展为该国最重要的城市之一。该城以其宽阔的林荫大道、优雅的维多利亚式建筑和活力四射的氛围而闻名，成为这个年轻国家精致的文化灯塔。作为澳大利亚的教育、艺术和体育之都，墨尔本的街道两旁遍布画廊、剧院和咖啡馆，城区内随处可见宏伟的历史建筑和现代化的摩天大楼。\n\n第二次世界大战后，墨尔本与澳大利亚的其他地区一样，在全球新秩序中岌岌可危。虽然墨尔本远离北海岸，却还是成为了该国战略规划和军事生产的重要中心。曾为经济繁荣提供动力的工厂基本都被改造重建，为国防计划添砖加瓦。但是，墨尔本作为文化重镇的身份从未动摇。\n\n纵使世界局势风云变幻，这座城市的艺术与文化仍在蓬勃发展，城市各处的剧院与大学也在继续培育着文化界的新一代知识分子。许多殖民时期的地标性建筑，如弗林德斯车站、皇家展览馆和议会大厦等，无一不是这座城市历史渊远流长的象征。同时，墨尔本广阔的郊区和充满活力的市中心也在不断发展，将过去与现在融为一体。在坚守其文化之都身份的同时，墨尔本亦已成为工业、智慧和创造力的汇聚之地。"
 state_lore_initials.439: " CNB "
 state_lore_name.439: "堪培拉"
 state_lore_desc.439: "在澳大利亚东南连绵起伏的丘陵与一望无垠的平原之间，坐落着澳大利亚新生的首都。堪培拉的选址位于墨尔本与悉尼这对竞争对手的中间地带，设计宗旨是与自然景观完美融合，担当繁荣民主国家的首都。精心规划的街道两旁，政府大楼、郁郁葱葱的公园、澳大利亚历史纪念碑相映成趣，反映着城市建设着眼于未来的理念。国会山顶上，国会大厦巍然屹立，见证着自数十年前联邦成立以来，年轻国度对善政与团结的渴望。\n\n在世界新秩序之中，堪培拉和平的表面掩盖了水面之下的紧张局势。尽管这里依旧是政治与文化生活的中心，但它依然不得不去适应急剧变化的世界舞台。眼下的威胁暂时还比较演员，但太平洋的日本霸权阴影早已无法忽视。政府官员高度警惕，不断评估区域力量平衡，努力保护着澳大利亚岌岌可危的地位。\n\n堪培拉的生活一如既往，大学培养着新一代学者，官僚机器继续运转。日本威胁仍然挥之不去，但正是韧性与挑战定义了堪培拉的模样。"
 state_lore_initials.440: " BRS "
 state_lore_name.440: "布里斯班"
 state_lore_desc.440: "自1824年作为流放地建立以来，布里斯班历尽沧桑，演化为了农工业发达的商贸中心。亚热带气候和布里斯班河畔的优越位置令城市成为了周边地区制糖业和畜牧业的集散地，其港口更将昆士兰连接到太平洋以至更广大的世界。在腹地的丰富资源助力下，布里斯班日新月异、机会遍地，但这里相对孤立于发达的南方城市，这也为它带来了一股边疆城市的不羁风格。\n\n麦克阿瑟将军曾在此设立总部，虽然功败垂成，但也在布里斯班的记忆中留下了难忘的一笔。日本势力向太平洋四处扩张，因毗邻北方争议海域，布里斯班成为了澳大利亚的军事要冲，工厂高速运转，供应大批国防物资，港口也为海军提供坚实的支持。\n\n虽然战后世界充满未知数，但城市人口继续增长，生机勃勃的街区和阳光明媚的海滩吸引着全国各地的人。富有亚热带特色的露天晚餐、悠闲生活方式和户外娱乐将勤劳工作与昆士兰的自然美景结合起来，形成了独有的社会氛围。早年的边疆精神仍是布里斯班的核心价值观，这座城市不怕艰难险阻，誓要走向辉煌。"
 state_lore_initials.441: " LYL "
 state_lore_name.441: "莱亚尔普尔"
 state_lore_desc.441: "莱亚尔普尔地处旁遮普省，是一座大型工业城市，由一位英国殖民地官员建立，并以他的名字命名。英国人离开后，莱亚尔普尔的纺织业如雨后春笋般迅速崛起，时至今日仍在蓬勃发展。\n\n然而，如此迅速的增长却要以无数工人的汗水、泪水与鲜血为代价。随着时间的推移，剥削工人的现象愈发严重，其中尤以来自农村地区的贫困移民为甚。"
 state_lore_initials.442: " QUI "
 state_lore_name.442: "基多"
 state_lore_desc.442: "几个世纪前，基多曾面临灾难。印加帝国征服了基多，瓦伊纳·卡帕克很快平息了众多部落的叛乱。他因病去世后，印加内部爆发继承危机，就此分裂，无力抵抗即将登陆美洲的西班牙帝国。基多的建设进展相当缓慢，自1534年拥有教堂起，居民改信基督教，当地领导人因反抗西班牙统治而被捕遇害，标志着受奴役历史的开端。\n\n后来，这场灾难渐渐淡入历史。1541年，基多被赋予城市地位，在接下来的数百年里不断发展，1717年从秘鲁割让予新格拉纳达。1765年和1809年的两次起义曾在城市及其周边短暂地建立独立政府，为厄瓜多尔建国奠定了基础；最终，瓜亚基尔自由省摆脱了西班牙的控制。\n\n如今，基多再次面临灾难。军事政变此起彼伏，与三头同盟结盟的企图招致了更大的毁灭，经济停滞不前，与秘鲁的军事冲突屡战屡败——最终，国家蒙羞，傀儡政府上台。无数难民流亡哥伦比亚，但彼处的政治动荡又迫使他们逃回了南方，挤进贫民窟和匆忙搭建的难民营。厄瓜多尔领导层茫然无措，基多的未来里，美好无处可寻。"
 state_lore_initials.443: " BAM "
 state_lore_name.443: "巴马科"
 state_lore_desc.443: "巴马科坐落于尼日尔河谷地中最坚实、最繁荣的土地之上，乃是商贸与国际化的堡垒。虽然它比不上丹吉尔或者突尼斯宛若绿宝石一般熠熠生辉，但仍在非洲的疾病瘴疠之中屹然不倒，这无疑是为人所低估的壮举。\n\n巴马科起初属于班巴拉人治下，是再也典型不过的沿河聚居地。在法国远征尼日尔之前，这里并不引人注目。上塞内加尔行政长官在此布置了工事，围困这个小酋长领地长达两个月的时间。出于软弱，巴马科选择了投降，法属苏丹由此建立，通过主导商业经济的手段，霸权不可阻挡，殖民扩张随之而至。\n\n巴马科地势平坦，尼日尔河滚滚奔流，为官僚们提供了一处行政管理的天堂。随后的半个世纪里，他们压迫性地统治着马里领土。讲法语的官员和少数被同化的精英高喊着现代化和文明的口号，成千上万的人们遭到奴役，在种植园和矿山中劳作，形成了极其鲜明的矛盾对比。这一由暴力垄断维持的绝对悖论相当顽固，它带来了工业进步，又引导了当地民众。直到卑鄙的自由法国分崩离析，现状才得以彻底打破。\n\n虽然当下盘踞象牙海岸的可耻顽固派根本无从对萨赫勒事务指手画脚，但马里仍然处于与以前一样的专制统治之下——不是由人、而是由贫瘠的土地和动荡的时局带来的无情压迫，以正人君子自居，唱着以未来为名的催眠曲。"
 state_lore_initials.444: " LAG "
 state_lore_name.444: "拉各斯"
 state_lore_desc.444: "埃科，最为富饶、最为多姿多彩的土地，拉各斯是葡萄牙殖民者赋予它的名字。尽管境内外冲突不断，但人类的摇篮、河流与湿地之城，都将喂养西非的人民。从熙熙攘攘的港口到不起眼的种植园，这座潟湖城市是所有在萨赫勒草原上繁衍生息的约鲁巴人栖息的庇护所。\n\n拉各斯长久以来都是西非与欧洲大陆之间的门户纽带。城邦深度参与了跨大西洋奴隶贸易，发展成为了一处繁荣的航海基地，吸引了英国商人的目光。1851年，在获解放的克里奥尔人意愿和遭到废黜的酋长请求之下，英国对拉各斯海岸展开了长达两个月的炮击，随后接受了投降，巩固了英国在现代约鲁巴兰的立足点。\n\n奥巴再次登上王位意味着拉各斯成为大英帝国广袤领土中的又一块殖民地，由加纳驻军负责管辖。1900年，弗雷德里克·卢格德将南尼日利亚保护国与拉各斯殖民地合并，将这座因棕榈油生产和渔业而兴起的大都市定为了殖民地首府。\n\n此后，拉各斯政府铁路及其配套项目的发展为当地带来了大踏步的现代化。然而，民众的自由似乎从来都不是殖民管理者优先考虑的问题。大英帝国已经不复存在，拉各斯赢得了史无前例的自治，但贫困和管理的挑战也随之而来——除了约鲁巴人自己的意志，再也没有什么能够支配他们的命脉。"
 state_lore_initials.445: " DOU "
 state_lore_name.445: "杜阿拉"
 state_lore_desc.445: "杜阿拉，中非的搏动心脏，破败的外表也难掩她的魅力。这泛非主义的诞生地如今日益式微，深居德国势力范围，似乎毫不起眼，却有着最顽强的意志。每每从欧洲帝国手中夺回一个小据点，自由与社会主义的火焰便又旺盛一分。\n\n就像黑暗大陆上殖民主义的其他受害者一般，杜阿拉的故事常见如跳蚤——德国人首先将此处置为保护国，压迫当地酋长近半个世纪。而在凡尔赛一纸合约终结了第二帝国的非洲雄心后，法国人在艳羡下取而代之，以家长制的作风，在这诸多村镇组成的城市里强行建立起了西方企业，无情地压榨着托管领。\n\n多米诺骨牌一旦倒下就不会停止。随着伦敦陷落，戴高乐的愚行在屈辱中葬送了法兰西殖民帝国。尽管后来的维希政府仍想在西非尽力保有立足之地，但乱局下崛起的民族解放力量终究驱逐了法国人——这是杜阿拉杰出的知识分子们和统一战线的合作成果，而这一切注定不会长久。\n\n在持续的崩坏面前，喀麦隆与杜阿拉的民主原则无济于事。一个残破不堪的首都，巩固不了自由政府的合法性。欧洲匪帮群狼环伺——对全身心投入伟大革命的志士来说，投降成了最简单却又最可耻的出路。"
 state_lore_initials.446: " WND "
 state_lore_name.446: "[Statelore_Get_Windhoek_name]"
 state_lore_name.446_SAF: "温得和克"
 state_lore_name.446_GER: "温得和克"
 state_lore_desc.446: "[Statelore_Get_Windhoek_desc]"
 state_lore_desc.446_GER: "在纳粹拼凑起来的英法殖民地中，温得和克却是一座典型的德国城市。这座居住着路德宗教徒和开普非洲人的城市，是德意志影响在黑暗大陆上的重要历史据点。\n\n城市得名于西开普的温得和克山脉，最初是十九世纪四十年代逃离南非的奥尔拉姆部落成员建立的边疆城镇。巧合的是，几乎在同一时期，莱茵传教士也开始在此地传播福音。起初，德国移民与纳马人之间的关系似乎相当和谐，直到发生了几次部落冲突，定居点也逐渐荒废。\n\n1890年，应吕德里茨殖民商人的请求，温得和克开始重建，因为它是相互交兵的两大部落纳马和赫雷罗之间的战略要地。自1884年德意志帝国为西南非殖民地划定边界以来，作为纳米比亚首都的温得和克便专注于发掘南部非洲的宝贵资源。一战前夕，部族冲突逐渐平息，土著居民也开始涌向这座城市寻求就业机会。\n\n凡尔赛条约后，艾伯特和兴登堡并未放弃对这颗“黑珍珠”的主权声索。出乎意料，梦想竟然成真——二战结束，英国衰落，温得和克又重新回到了德意志的怀抱。如今，喷气式飞机的轰鸣和繁忙的机械声回荡在这座重生的都市之中，仿佛在为专员辖区治下的工业成就和无尽攫取高唱赞歌。"
 state_lore_desc.446_SAF: "为再度并吞南部非洲、实现其狼子野心，德国人玩弄权术、策划阴谋，孕育出法西斯疯狂行径的巅峰之作：非洲之盾。这噩兆的产物被自由世界联手压制，最终土崩瓦解。西南非托管地的废除曾对英国在非影响力造成重创，如今旧秩序得以恢复，历史也不再重演：温得和克将被并入南非，并在解放者的引领之下，逐渐恢复其原有风貌。\n\n德国资本撤出后，温得和克仿佛在一夜之间失去了生机，城市变得荒芜冷清，只剩下贫困的民众与满目的砾石。为维持城市的基本功能，南非不得不求助于美国政府的人道援助，以控制混乱局面、赈济困顿饥民。结果，温得和克城郊成了由外国物资拼凑而成的贫民窟，远非理想的社区模样，反而比德国殖民时期还要贫困凄凉。\n\n纳米比亚的土地上，孕育着一种坚韧不拔的精神。不论“临时统治”会持续多久，这里的人们早已习惯了风雨兼程。德国殖民时期的漫长岁月，只是人生旅程中的一段插曲；而英国人的家长制管理，也只是另一场必须面对的考验，一个或许能赋予他们生存勇气的新的阶段。"
 state_lore_desc.446_IND: "西南非不似刚果或许蒂希治下的畸形产物——这种“温和”统治不过是第二帝国时期殖民地的延续。但对纳米比亚人民而言，这种相对温和的法西斯统治，与被掠夺和奴役的深渊并无二致。首都温得和克如今呈现出最赤裸丑陋的形态，刺耳的喧嚣与颂歌尽数消散，沦为一片枯槁疲惫的土地，在经年压迫中耗尽了生机。\n\n申克留下的并非如其他殖民地般满目疮痍的废墟——温得和克的天空归于沉寂，既无暴乱也无动荡，却也丧失了所有抱负。摆脱德国强盗的劫掠后，民众的健康与财富有所改善，但这个新生国家却难觅有价值的产业与资源。克虏伯与弗利克集团无意驻留这片不久前还任其蹂躏的土地。这座西南非都会如今遍布被毁的棚屋、锈蚀的机械，以及一副被德国资本家蚕食殆尽的空壳。\n\n往昔篇章以灾难收场，但废墟中诞生的新政府终得摆脱奴隶主的枷锁——虽仍等级森严、贫困交加，却是纳米比亚人可称之为家园的存在。温得和克或许无法重现往昔荣光，但从灰烬中涅槃重生的，或许将是一个自诞生之初便不再背负原罪的新生国度。"
 state_lore_initials.447: " KAT "
 state_lore_name.447: "加德满都"
 state_lore_desc.447: "作为喜马拉雅山区最大的城市和通往世界屋脊的门户，加德满都有着令人难以置信的悠久历史，最早的人类定居记录可追溯到公元185年。此地北部最初只有佛教寺院，随着大批释迦族难民在此定居，尼瓦尔佛教应运而生。随后，许多定居点如雨后春笋般出现，其中一些最早的村庄在古纳卡玛德瓦国王的领导下实现了统一，现代加德满都的雏形就此诞生。\n\n从此，加德满都便逐渐发展为重要的贸易、旅游和艺术中心，也成为了连接中国和印度的纽带。十三世纪，加德满都因地震和异族侵扰而饱受摧残，但其迅猛发展的势头丝毫不减，逐步整合了更多山谷中的城邦。加德满都在廓尔喀帝国征服尼泊尔后成为了首都，军事得到了长足发展，却因战争不断导致经济停滞不前。在被迫向英国殖民者做出许多让步后，加德满都的经济在拉纳家族的统治下因闭关锁国而陷入萎靡，1934年的一场大地震又使本就不甚乐观的形势雪上加霜。\n\n然而，加德满都仍是尼泊尔最重要的中央定居点，亦是众多贸易路线的必经之地。 该城已从地震中恢复元气，并正在逐渐翻新老旧不堪的基础设施。皇室从拉纳家族手中夺回了权力，在尼泊尔建立起受控的多党民主制，但其恢复与印度外交关系的努力却把这座城市推到了鲍斯和尼赫鲁权力斗争的风暴之眼。没人会把军队派到喜马拉雅山去送死，但另一场战争可能会让世界屋脊轰然崩塌。"
 state_lore_initials.448: " PLB "
 state_lore_name.448: "巴邻旁"
 state_lore_desc.448: "两种物质定义了巴邻旁这座苍翠而古老的城市，这两种物质为生命所必要、为运转所必需，是人类的命脉。在这里，浑浊晦暗的液态烃和纯净清澈的河水融汇流淌，现代工业的摇篮体现了人类的智慧和耐力。杂乱无章的建筑像万花筒一样排列组合，映照在穆西河淤塞的水面之上。\n\n巴邻旁曾是一颗璀璨的明珠，金色的屋顶、富丽堂皇的寺庙点缀着帝国王权，潮汐的威严塑造了这座城市。由此出发，室利佛逝建立了属于河海与稻米的王国；由此出发，印度尼西亚的民族认同开始孕育。当炼油厂如同棕榈树一般在这永恒之城四周拔地而起，它的光芒似乎再次熠熠生辉，权杖回到城中，自海上强国消失以来，无与伦比的复兴辉煌光环重又浮现。然而，如今的权力寄宿在油井和机器的轰鸣声中，栖居在钢筋水泥和高楼大厦之内，淹没于无情单调的行人洪流里。巴邻旁的命运将它推向了现代化，它的名字仍能令人回想起辉煌的古都，但那曾经的一切早已面目全非。"
 state_lore_initials.449: "GNT"
 state_lore_name.449: "甘托克"
 state_lore_desc.449: "甘托克，虽在锡金语中意为“山巅”，但这座锡金的都城却致力于远离周围事务。有关甘托克的记载最早可能要追溯到1716年，当时大清帝国出手支持锡金抵抗廓尔喀人，但这座城市并未受到太多关注，直到1840年成为朝圣中心。\n\n1894年，在英国统治下，甘托克又添上了锡金首都的职能，城市连接起了外部世界，为这个隐士王国带来了一点点的现代成就。\n\n现在，英国人离开了，取而代之的是日本这个东方霸权。锡金夹困在野心勃勃的自由印度政府和奉行孤立的西藏和不丹之间，也许唯一能让这座城市保持清醒的就是却嘉府的灯光，尝试在锡金孤立未来的钢丝绳上保持平衡。"
 state_lore_initials.450: "THP"
 state_lore_name.450: "廷布"
 state_lore_desc.450: "和年轻的不丹王国的其他部分一样，廷布并不是一座统一的城市，而是对一群坐落在山谷里的小村庄的总称。直到1885年，这些定居点才巩固了他们在不丹历史中的地位：乌颜·旺楚克出身于此，他成功地统一了不丹，并自立为国王。\n\n早在英印势力衰退直至消亡前，廷布就已经是外国势力远征的目标，先是中国，然后是英国，现在又来了日本和自由印度，这座城市希望能不再受外国使团打扰，但也许这份渴望永远无法成真了。"
 state_lore_initials.451: " OKJ "
 state_lore_name.451: "岡山"
 state_lore_desc.451: "回溯至室町时代的草创岁月，冈山以其得天独厚的地理要冲与丰饶资源，逐步崛起为古备前国的核心标识。当历史的风云旋涡席卷战国乱世，这片土地便成了群雄逐鹿的修罗场，见证过无数决定天下大势的龙争虎斗。直至明治维新废除封建制度前夕，冈山仍作为德川幕府治下的重要藩领存在——由姬路池田家统御的冈山藩，其城下町的繁荣盛景与巍峨的冈山城互为映照，堪称武家政权鼎盛期的经典缩影。\n\n如今作为冈山县当仁不让的行政中枢，这座城市在大东亚战争中几乎毫发无损地挺过了战火淬炼。依托战后日本倾力推进的经济建设规划，它已稳步跻身现代化城市前列。"
 state_lore_initials.452: " KKJ "
 state_lore_name.452: "北九州"
 state_lore_desc.452: "位于日本帝国版图内较晚建立的北九州，其命名恰如其分地体现了坐拥九州岛最北端与关门海峡要冲的地理特征，这座新兴都市堪称日本列岛最年轻的都会定居点群中的翘楚。\n\n追根溯源，这座城市的雏形萌发于明治政府褪去封建桎梏、蹒跚学步的初生期。若说北九州诞生的契机，其既源于大东亚战争的战火淬炼，也得益于日本作为泛亚主义阵营中虽年轻却无可争议的主导者——或更贴切地称为“兄长”——所取得的惊人胜利果实。\n\n虽尚属新兴都会，北九州却已然成为一颗蓬勃跳动的心脏：钢铁工业基地拔地而起，计算机技术研发的前沿阵地在此铺就，处处彰显着日本的经济雄心。"
 state_lore_initials.453: " WUX "
 state_lore_name.453: "无锡"
 state_lore_desc.453: "纵以汉字直解作“无锡”，这座城市的得名实则源于两千年前岭南某夷语的音译，讽刺的是周遭矿脉恰恰富含锡矿。拥有与古老语言同寿的历史，无锡或肇基于商代，春秋时期更被吴国定为都城。在传统农耕文明中，此地以桑蚕丝织之利闻名，并于唐代随漕运勃兴跃升为江南交通枢纽。\n\n至清季，无锡不仅延续经济繁荣，更堪称帝国版图上最早的近代工业萌芽——尽管在全球列强映照下仍显落后。这一发展轨迹在太平天国之乱中戛然而止，惨烈的屠城事件为古城历史烙上难以愈合的伤痕，至今仍未复原。\n\n更可悲的是，这座在封闭帝国中率先迈入现代的门户，先是因上海开埠抽空经济命脉，继而在国民政府“黄金十年”的实业救国浪潮中短暂回春，最终随着大东亚战争对工商业的毁灭性打击，所有积累尽毁于日寇兵燹。\n\n如今的无锡虽存续于世，却笼罩在日本“共荣圈”阴影下，连南京改组政府亦对其漠然置之。若先民目睹今日衰景，只怕会扼腕叹息。"
 state_lore_initials.454: " TVS "
 state_lore_name.454: "唐山"
 state_lore_desc.454: "这座与中原万千城邑同样拥有四千年沧桑史的北方重镇，经历着比大多数名城更为复杂的轨迹。\n\n唐山肇基于商代边陲之地，历经王朝鼎革，始终是华北平原天命更迭的见证者。其历史虽屡经产业转型，最为人铭记者当属明清两代矿业勃兴——当权者以重金投入工程技艺与工业改良，试图在古老帝国的疲敝躯壳中注入现代生机，然城市真正的转折须待新的主宰降临：既非满清，亦非短命的民国，而是日本人在“泛亚主义”新旗号下带来的东亚新秩序。\n\n原冀东防共自治政府与中华民国临时政府后归并于大东亚战争催生的新政权，为现代唐山奠定根基。作为紧邻满洲国的工业巨擘，该城既是泛亚主义最早的殖民样板，又是连接资源富集的满洲与华北精炼厂区的运输枢纽。\n\n相较于其他在战火中满目疮痍的都会，唐山因其对大陆殖民体系的战略价值得以保存元气。每逢时局动荡，华北各地的难民潮水般涌入，或谋食于城郊工矿聚落，或试图突破锦州边界寻觅生路。近年来随着边境行政体系不堪重负，当局已严令禁止此类非法边贸问题——毕竟连现有居民的生计都岌岌可危。\n\n然而即便“枪口督政”渐成常态，仍难阻各地绝望者在为前往满洲铤而走险。这座城市的未来如同风雨飘摇的国运般难以捉摸，国民党各派系正撕裂着这片大地的命脉，谁又能预言华夏明日将坠向何方？"
 state_lore_initials.455: " KAI "
 state_lore_name.455: "开封"
 state_lore_desc.455: "开封乃是中国八大古都之一，历史悠久而辉煌。它从战国的混乱中脱颖而出，坐落于黄河岸边，是大河上下最宏大、最活跃的贸易中心之一。它经历过许多次的摧毁和重建、坐拥千余年的声望和财富，随后，开封走上了顶峰，在宋朝成为帝都，也是当时世界上最大的城市。\n\n可惜，昔日的辉煌只能是如今衰落的证明。靖康之变以降，金朝和女真军队席卷开封，打断了大宋的脊梁，开封从此逐渐沦为一座无关紧要的城市，甚至在近代被冷漠的郑州超越。虽然它仍中原第二大城，但要恢复昔日的荣光无疑还需要巨大的努力，但南京却始终对开封不闻不问，个中原因自然是它与华北政务委员会在过去的联系。\n\n不过，也有人认为这是不幸中的万幸：毕竟，开封越是衰落，就越有机会逃开日本人和通敌者的窥视。"
 state_lore_initials.456: " NIN "
 state_lore_name.456: "宁波"
 state_lore_desc.456: "宁波是中国最古老的城市之一，历史可追溯到六千多年前，长久以来都是中国最大、最重要的贸易港口之一，这一传统甚至延续到了现代。宁波商帮发源于此，甬商则是清朝最重要的民间商团之一，对大上海的崛起做出了巨大的贡献。\n\n宁波并没能在野蛮的侵华战争中独善其身，在旭日之下蒙受着痛苦，作为蒋委员长的出生地，代表日本统治的通敌政府也有意忽视了这座古城。然而，如此政策却为宁波带来了意料之外的好处：随着它渐渐走出三四十年代的衰退，厌倦政治干预的商界看中了这里。宁波的政治地位或许不高，但经济为它插上了翅膀。现今，宁波仅次于上海，是中国第二繁忙的贸易港埠。"
 state_lore_initials.457: " DAT "
 state_lore_name.457: "大同"
 state_lore_desc.457: "大同作为华北的一大权力中心，拥有悠久而传奇的历史传承。这里曾是鲜卑游牧民族建立的北魏帝国都城，契丹辽朝与女真金朝定其为西京，明朝时期则是抵御蒙古入侵的边塞重镇。然而，厚和豪特的新政权却刻意遗忘了这段历史。对德王及其亲信而言，大同的过往毫无意义——他们只关注当下：这座汉人大城的扩张在文化上与他们的泛蒙抱负格格不入，成了难以忍受的意识形态尴尬。然而，这份尴尬他们又不得不忍受，因为这座城市庞大的财政收入正是维系蒙疆政府生存的黄金枷锁。\n\n这笔巨额财富来源于华北开发株式会社，它掌控着庞大的工业生产机器。大同素有“煤都”之名，如今这里四处遍布露天矿坑、机车制造厂和水泥厂，产出资源来支持共荣圈的军事存在。大同工业综合体只有一个使命，那就是为华北方面军和日本本岛开采资源并出口获利。在这片工业炼狱之上，云冈石窟的佛陀们俯瞰着大地，融合了丝路艺术与游牧信仰的古老石刻正慢慢为工业煤灰织成的厚重毛毯所吞噬遮盖。\n\n当下的大同产出着巨额的财富，同时也造就着不安定的局势。在厚和豪特，蒙古精英对南部边境的“汉人瘤病”抱怨不休；在它的南方，山西省则徒劳地抗议着“领土被窃”；而华北开发会社则对这两个附庸间的口水仗不屑一顾——它的主人只有东京，它的眼里只有利润，它只需保证大同的财富能源源不断，至于谁声称要统治这片土地、地图上的边境线怎么画，谁又会在乎呢？"
 state_lore_initials.458: " BEN "
 state_lore_name.458: "蚌埠"
 state_lore_desc.458: "与中国诸多历史悠久的省府不同，蚌埠是一座诞生于现代的城市。大约一个世纪前，它还不过是凤阳县辖下一座地处河滨、名唤“蚌步集”的小市镇。后来，随着津浦线建成，蚌埠迅速发展为集交通要冲与商业中心于一身的大城市，成为了皖北无可争议的经济心脏。\n\n权力沿着铁轨一路延伸。倪嗣冲等军阀将蚌埠作为实际的统治中心，安坐在火车站旁的宅邸内统御全省。这一地位在日本扶植的南京政府治下得到进一步巩固，蚌埠凭借其难以比拟的物流和工业基础正式被确立为皖省省会。彼时彼刻，蚌埠头上政治与经济两顶桂冠似乎已是要融为一体。\n\n然而，正如人头上的王冠不能永远稳固，蚌埠也是一样。在战后大刀阔斧式的行政改革之中，南京的一纸命令剥夺了它的地位。旧省界重新划定，新冒出来的淮海省粗暴地将蚌埠并入其中，失去省府的安徽省则在总统的个人偏好之下将新省会迁往政治上更为顺从的合肥。蚌埠就此沦为无冕之城。\n\n可是，地图能够重绘，铁路却无法迁移。无论政治权谋风云变幻，蚌埠的战略地缘始终是无可辩驳的事实。官僚们选择了合肥，但贯穿蚌埠的津浦线和淮河依然是江淮大动脉，这座沉睡的引擎正等待着属于它的时刻。"
