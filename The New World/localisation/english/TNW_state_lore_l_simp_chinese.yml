 state_lore_initials.990: " EUS "
 state_lore_name.990: "翁贝托二世皇帝站"
 state_lore_desc.990: "在遍布无数壮美风光与宜人气候的意大利帝国版图上，位于加林德斯岛的翁贝托二世皇帝站如同一枚刺目的冻疮。即便以南极洲的标准衡量，这座岛屿也堪称苦寒凄惨之地。\n\n阿根廷把从南极分到最烂的那块肉丢到了意大利人的手上。这里阴冷潮湿，永无休止的雨水就像是腐尸旁的蝇群一般，在天空中嗡嗡作响；锋利陡峭的岩石钻进海岸线，宛若地上爬行的蛆虫。阿根廷建造的站点早已化作断壁残垣，浸没在水中，永远见证着加林德斯岛的萧瑟荒凉。\n\n翁贝托二世皇帝站的住民们蜷缩在临时搭建的帐篷里瑟瑟发抖，似乎只能在梦中见到温暖的阳光。几艘破旧的船只停泊在港口为这些不幸的灵魂守夜，在狂风肆虐的海面上随波飘荡。\n\n对本国的政治家们来说，基地的建立似乎是帝国威望的证明。但对不得不驻守在这遥远前哨的人们来说，这里没有什么荣耀可言，只有肺炎和泥泞。"
 state_lore_initials.991: " RES "
 state_lore_name.991: "鲁佩尔托·艾利切利贝尔蒂南极科考站"
 state_lore_desc.991: "在与世隔绝的鲁佩尔托·艾利切利贝尔蒂南极科考站，天真的野心撞上了冷酷的现实。他们孤身地处内陆数公里，举目四望皆是贫瘠的荒原，临近纳粹帝国的前线，探险队最初怀抱的希望与热情慢慢钙化为绝望。一条细如脐带的海岸补给线为科考站里的几十个人运送着仅供维持生存的食物与燃料，宛若绝望灵魂与温暖世界联系的唯一纽带。\n\n没有人相信，乌拉圭能凭借微薄的防御力量和有限的物资抵御住纳粹的反击乃至黑暗大陆上的任何可能的危险，甚至连他们奇思妙想不断的领袖穆索博士也不相信。他们既没有反击的弹药，也没有能供队员们穿越冰原撤退的雪地靴，希望OFN增援补给的急切请求永远得不到回应。然而，尽管如此，科考队员们仍然尽其所能，捱过一天又一天，进行科学实验和地质勘测，在极夜的序幕中防卫着未来。"
 state_lore_initials.992: " BHG "
 state_lore_name.992: "恩里克·阿里斯蒂德斯·吉列姆站"
 state_lore_desc.992: "与其说恩里克·阿里斯蒂德斯·吉列姆站是一个南极基地，倒不如说是纳粹占领下南极大陆的一处永久性滩头堡。几十顶勉强能用的帐篷在寒风中摇曳，外面是一圈壕沟网，身处其中的陆战队员们则陷人了睡觉、巡逻、睡觉、巡逻这样永久而悲惨的循环。可怜的士兵们发觉，他们所面临的战斗与预演大相径庭:他们空有大量物资，但却根本无从对抗真正的敌人——南极大陆本身。\n\n在冻伤和肺炎面前，枪炮弹药和烧火棍、土坷垃也没什么分别。在大块浮冰和刺骨海水之外，巴西探险队的真正核心隐约可见:拉德马克上将在远处的米纳斯吉拉斯号航母上注视着他的部下，只有有限的数架直升机运送来日益严苛的命令和愈来愈少的补给。艨艟巨舰仿若《旧约》中的上帝一般，俯瞰着它苦难的羊群，而羊群则勉力侍奉着它的突发奇想，等待着即将到来的战斗、征服新的土地。"
 state_lore_initials.993: " AGB "
 state_lore_name.993: "阿蒂加斯站"
 state_lore_desc.993: "阿蒂加斯站是一片充满梦想与希望的土地。穆索博士一直梦想着能实现乌拉圭对南极的声索，但斯尼佩岛之战和随之而来的瓜分南极让他的希望化作泡影。现如今，他的雄心终于实现了。穆索似乎想要重现一个从未存在过的时代，在1954年初步探险后为贪婪所夺走的发现时代。穆索的居住地看起来并不像纳粹恐怖边缘的堡垒，而是一处50年代的南极民用基地，非常适合科学探索以及在南极大陆过上舒适的生活。\n\n作为一名南极探险家，穆索已经失去了过去的人生岁月。他的军事随员和OFN顾问都在恳求他做更多的准备，比如囤积更多的枪支、派驻更多的人，以应对似乎不可避免的纳粹反击。可是，不知是出于对美国的怨恨，还是因为心怀一丝渺茫的希望，认为非军事化可能会让德国人忽视这里，穆索博士仍然在OFN增援的问题上不断含糊搪塞。然而，就连穆索本人也在怀疑，平静究竟能持续多久。德国大军是否会冲破皑皑白雪，再次将这片梦幻之地变作噩梦之境？"
 state_lore_initials.994: " BGH "
 state_lore_name.994: "贝格尔海姆"
 state_lore_desc.994: "德属新施瓦本殖民地撤退期间，一批最有“能力”的德意志骨干被小心翼翼地集中到基斯冰架建立新基地：贝格尔海姆。这个名字来源于无畏的雅利安探险家布鲁诺·贝格尔，而这座祖先遗产学会要塞的使命是寻找发掘一些能够支持基本科学理论的证据。\n\n相较于其他南极洲宣称者，贝格尔海姆的人口较少，只有250人，分为祖先遗产学会科学家与武装党卫队内卫部队。它有一处负责考古任务的直升机场，以及党卫队和勃艮第维持与基地沟通，传递关键补给的秘密潜艇基地。\n\n贝格尔海姆名义上也是德属新施瓦本的一部分，但两大机构的联络是稀少而不友好的，尤其是党卫队在本土的政变企图中，这种关系更加恶化了，所有人都想知道这种敌意的共存能持续多久。祖先遗产学会以极端秘密的方式运作，贝格尔海姆内部的情报很少流出要塞的高墙，但只要他们发出点什么，势必让世界为之震撼。"
 state_lore_initials.995: " SSA "
 state_lore_name.995: "昭和基地"
 state_lore_desc.995: "昭和基地是强权政治见利忘义的象征，也是瓜分南极时火上浇油的推手。该基地位于从前所称的玛丽·伯德地，这里可能是南极大陆上环境最恶劣的沿海地区。然而，昭和基地除了能让日本对当地的主权要求略微合法一些外，几乎没有其他任何作用，此处居民对此都心知肚明。由于港口几乎常年为厚实的冰层所覆盖，因此抵达的补给船队极为稀少，居民只能依靠最低限度的必需品维持生存。此外，昭和基地在名义上隶属于日本帝国海军南极特遣舰队，但其军事价值可谓是微乎其微，因此海军亦对此地不甚上心，只有象征性规模的士兵出于无聊进行例行巡逻，防御设施更是放任其自生自灭。帝国极地研究所的官僚、工人和偶尔现身的科学家也执行着同样琐碎无用的小任务，演出着昭和南极基地正常运转的哑剧。\n\n近年来，海军已将许多日常管理事务移交给了日水会社，后者利用昭和基地为其在附近海域捕鱼和捕鲸的专有权取得了合法依据。私有化的寒流正日益逼近，如今，日水的运输船似乎比海军护航舰队更频繁地造访这里，带来补给。日水也是造成当地景观为数不多显著变化的原因之一：巨大的鲸骨墓地、曾经用于加工鲸油和鲸肉的各种恐怖设备。如今，这个屠宰场已经很少使用，但这可怕的景象却永远提醒着栖身于此的人们，如果情况急转直下，他们的命运将会何去何从。"
 state_lore_initials.996: " ESB "
 state_lore_name.996: "埃斯佩兰萨站"
 state_lore_desc.996: "当豪尔赫·埃德加·莱亚尔于1953年在特里尼蒂半岛顶端的霍普湾登陆时，他需要一个基地来管理他的行动和后勤。正是为了这个目的，埃斯佩兰萨站得以建成。它成为阿根廷在该地区力量投射的基础，并确保其影响力扩大到足以确立对其南极主张的坚定主权。\n\n埃斯佩兰萨站现在是南极大陆上最功能多元化的基地之一，是阿根廷南极领地和阿根廷本国的海军港口、军事前哨和行政综合体。今天，埃斯佩兰萨站的军事方面尤其突出，因为阿根廷军方正利用该基地扩大其实力并寻求自己的目的……"
 state_lore_initials.997: " APB "
 state_lore_name.997: "阿图罗·普拉特站"
 state_lore_desc.997: "作为南极洲最古老的考察站，格林尼治岛上的阿图罗·普拉特站也是智利的首座南极基地，由智利探险队建立于1947年。这座基地的力量投射也是智利在南极争夺中脱颖而出的重要原因，确立了其牢固的主权宣称，让海军能够在智利-阿根廷争端最紧张的时刻保护格林尼治岛。\n\n实际上，这座基地也是智利在斯尼佩岛之战期间的防御中心，即使周围地区沦陷，普拉特站的防御力也足以抵抗任何阿根廷的潜在入侵。\n\n严格来说，这座海军基地可以容纳少量船只，如果形势必要，普拉特站将成为智利海军对抗阿根廷未来姿态的关键港埠。"
 state_lore_initials.998: " MMS "
 state_lore_name.998: "麦克默多站"
 state_lore_desc.998: "在OFN势力范围的最南边，有一个最奇怪的基地。麦克默多站是南极大陆上最大的基地，在盛夏时有1500人驻扎，拥有一个相当大的港口，并有附近的威廉姆斯机场为其提供航空运输服务。\n\n这座南极荒原上的庞然大物坐落于南极洲罗斯属地，一片在新西兰主权范围内但由美国南极开发指挥部管理的地区。在瓜分南极时的第一次深冻行动期间，该基地被建在了火山岛罗斯岛上。\n\n在它的许多特色中，最独特的是它为解决基地的燃料问题而建造的核电站。虽然它提供了大量的电力并减少了对燃料的需求，但在新兴的核能领域，它仍然是个未知数，可能会产生毁灭性的后果。"
 state_lore_initials.999: " SLP "
 state_lore_name.999: "席尔马赫站"
 state_lore_desc.999: "德意志帝国的触爪遍及世界各地，在他们统治的边缘，席尔马赫站孤独地对抗着南极洲的荒凉。基地矗立在一处冠以第三次德国南极远征期间发现这片土地的里夏德-海因里希·席尔马赫之名的绿洲上，这是一片通常不被冰雪覆盖的土地，坐拥通往淡水湖的便捷通道，有25公里长，3公里宽，是南极争夺期间定居的有利地点。\n\n席尔马赫站起初是为德国向冰冻大陆输送移民建立的军事对应设施，然而，这项长期、昂贵的移民政策超出了人类的极限，席尔马赫站成了萦绕在废弃殖民地上的幽灵。\n\n基地最多容纳500人，临近基地也生活着差不多的人口，但依赖席尔马赫站的口粮和补给维生，促使双方结成相互依赖的关系。虽说如此，但席尔马赫站缺少一个海军港埠和空军基地，不得不使用临近的施佩伯爵海军上将纪念港和和实验飞机测试基地。"
 state_lore_initials.1000: " PVM "
 state_lore_name.1000: "佩德罗·比森特·马尔多纳多站"
 state_lore_desc.1000: "佩德罗·比森特·马尔多纳多站堪称史上最离奇外交联盟的产物，它诞生于一场醉醺醺的谈判旋风与绝望的政治交易之中。基地坐落于格林尼治岛北岸，距阿图罗·普拉特站仅数公里之遥，时刻提醒着世人：在世界尽头，国家命运竟能如此诡异地交织缠绕。\n\n这座基地以划定赤道线的伟大科学家命名，它本身就是活着的的悖论——一个赤道国家，却拥有企图在南极这座冰封地狱建立据点的雄心。站房预制模块上的新漆尚未剥落，设备仍闪着崭新的光泽。相比起一旁饱经风霜的智利邻居，它是个天真又野心勃勃的新来者。\n\n厄瓜多尔基地的生存完全仰赖于智利守护者的善意与经验：每一条发电机维修建议、每一次额外补给、每一份气象预报——都是“大哥”伸出的援手。表面看起来，厄瓜多尔人追求着宏伟的目标：地缘政治影响力、海洋学研究、乃至国家声望；但回到现实，他们的日常都在同经验不足和持续的孤立感搏斗，强大邻居的存在更加剧了他们的孤立感。\n\n对智利而言，这是外交胜利的象征；对厄瓜多尔而言，这是登上世界舞台的契机——但在南极大陆看来，这不过是人类傲慢的又一缕微弱火苗，随时可能湮灭在凛冽的寒风之中。"
 state_lore_initials.1001: " MPB "
 state_lore_name.1001: "马丘比丘科学考察站"
 state_lore_desc.1001: "[Statelore_Get_Maccu_Picchu_Base_desc]"
 state_lore_desc.1001_a: "马丘比丘站矗立在血染的土地上——这里是温克岛，曾建有一处智利前哨站，如今已被阿根廷人从地球表面抹去，化作焦黑的废墟。当下，秘鲁国旗正在此飘扬。马丘比丘站的建立不仅出于善意的外交姿态，更是地缘政治博弈中的精妙一手：在巴西与阿根廷冷战骤然升温的背景之下，智利将秘鲁站点当作了战略缓冲。智利非常清楚，若是阿根廷再次发动攻击、且这次针对的是中立国家，那么就必将引发布宜诺斯艾利斯难以承受的国际事件。秘鲁人将营地建在了悲剧遗址之上，无意间成了异国墓园的守灵人，而此地这源自印加帝国坚不可摧的堡垒、气势恢宏的名字，此刻听来却如残酷的嘲弄。\n\n基地此刻热闹非凡。秘鲁科学家们正满怀热忱地架设设备、采集首批样本，坚信他们的研究将为祖国赢得荣耀，但这份乐观正似海岸边小水洼上的薄冰一般脆弱。发电机勉强维持运转，单薄的墙壁根本挡不住日渐狂暴的寒风。\n\n他们满怀希望地眺望地平线，却不知放逐大陆早已为他们准备了第一次——或许，也是最终的——考验。"
 state_lore_desc.1001_b: "马丘比丘站矗立在血染的土地上——这里是温克岛，曾建有一处智利前哨站，如今已被阿根廷人从地球表面抹去，化作焦黑的废墟。当下，秘鲁国旗正在此飘扬。马丘比丘站的建立不仅出于善意的外交姿态，更是地缘政治博弈中的精妙一手：在巴西与阿根廷冷战骤然升温的背景之下，智利将秘鲁站点当作了战略缓冲。智利非常清楚，若是阿根廷再次发动攻击、且这次针对的是中立国家，那么就必将引发布宜诺斯艾利斯难以承受的国际事件。秘鲁人将营地建在了悲剧遗址之上，无意间成了异国人墓园的守灵人，而此地这源自印加帝国坚不可摧的堡垒、气势恢宏的名字，此刻听来却如残酷的嘲弄。\n\n国旗甫一升起，这座基地便遭遇了烈火般的严酷考验——准确来说，是冰封的洗礼。一场猛烈的暴风雪骤然袭来，将科考队逼入了绝境，不得不做生死的搏斗。那场风暴的幽灵至今仍笼罩着基地，也永远地决定了它的的命运，将之化作智利与秘鲁兄弟情谊的象征——这份情谊在救援行动中铸就，坚不可摧。\n\n当下，马丘比丘站的生活始终处于高度戒备。科学家们正持续开展气候和地质研究，试图证明基地存在的价值。但是，每阵极地狂风、每次发电机故障，都在提醒着他们生死仅有一线之隔。他们深知，能活着留在这里，都是托了邻居的大福。"
 state_lore_initials.1002: " OCB "
 state_lore_name.1002: "奥坎波站"
 state_lore_desc.1002: "奥坎波站以塞瓦斯蒂安·德·奥坎波命名，他是首位证实古巴是一座岛屿的航海家。这处古巴基地旨在划清界线，乃是大陆冰壳上真正的革命堡垒，如同锋锐的匕首直指阿根廷位于亚历山大岛周边的南侧腹地，以及驻扎于加林德斯岛的意大利侵略者。奥坎波站的外围布满了深堑壕和派克瑞特冰加固的机枪堡垒群。\n\n古巴士兵们在热带丛林游击战中饱经历练，而此刻的他们却置身于全然陌生的炼狱。革命烈火正承受着最严酷的考验——来自放逐大陆的考验：最大的敌人并非背信弃义的法西斯，而是这片大地本身。无情的狂风、单调的白色荒原，要比任何反宣传都能更快令人疯狂。\n\n但他们并非孤军奋战，智利海军陆战队同他们在一起。一支陆战队精锐小分队作为教导派驻此地，传授古巴士兵在极寒环境下如何尽善尽美地维护武器，例如普通的润滑油会凝固成胶状，水汽凝结可能会永远把闭锁系统冻住；他们还教会了古巴士兵如何穿越冰川而不坠入隐蔽的裂隙、如何辨别稳固的冰架与和致命的浮冰陷阱。在学员身上，陆战队员们既看到了坚毅的意志，也察觉到了他们行动中危险的生疏。或许终有一日，驻守南极的古巴士兵能真正与智利海军陆战队并肩作战——但前提是，他们必须首先学会如何战胜那个既没有国旗、也没有意识形态的敌人。"
 state_lore_initials.1003: " QUB "
 state_lore_name.1003: "夸德拉站"
 state_lore_desc.1003: "这座基地的名字承载着南极最为残酷的讽刺——它以胡安·弗朗西斯科·德拉博德加-夸德拉命名，这位无畏的航海家曾驾驶小帆船向太平洋发起挑战，绘制阿拉斯加未知海岸的海图。然而，他的后裔如今驻守在智利领地的最边缘，守着一片静静的雪原荒地：不是为了探索，只是为了监视。夸德拉站位于智利南极领地与日领南极的边界线旁，是一处眺望白濑矗地残酷荒原的孤寂前哨——白濑矗地被公认为南极大陆环境最为恶劣的区域。\n\n表面看来，夸德拉站的使命是充当外交缓冲区。得益于墨西哥与日本之间的友好关系，其存在应能得以缓和乃至遏制东京的领土野心。然而，这座基地的真正目的要远远比这更为朴实、绝望：它是一座瞭望塔，为抵御日水捕鲸船队的掠夺而建。每天，驻站人员都会眺望辽阔的洋面，追踪公然侵入智利海域的日本捕鲸船。在它们身后，只留下了血迹斑斑的航迹与捕捞一空的海洋。\n\n夸德拉站的生活基本一成不变。在一小群墨西哥科学家和工程师之间，一个略带苦涩的笑话已经深入人心：“夸德拉和一个英国佬共同分享了一座岛屿，结果自己的名字被从地图上抹去了；我们且看看，和日本人分享边界会是什么结果。”\n\n他们是没有船的水手、没有航图的探险家。夸德拉曾经发现了一方新的天地，至于他们，就只能发现日本捕鲸船队——又一次越境了。"