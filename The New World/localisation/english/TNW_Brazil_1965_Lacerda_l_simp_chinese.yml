 brazil_lacerda_sorbonne_campaign.22.t: "布拉加的背景"
 brazil_lacerda_sorbonne_campaign.22.desc: "马科斯和几家报社的同行一起赶到了墓地，总统候选人内伊·布拉加正在那里。天衬哀景，乌云沉重的压在天空上。布拉加正往一座墓碑上献花圈，周遭的一切让这场景平添了几分庄重。如果马科斯没记错的话，这里就是巴西远征军的老兵们长眠的地方，二战时在英国捐躯。布拉加在墓前沉默地站了几分钟，然后走出墓园，看到记者时，脸上挤出一丝微笑。\n\n简单寒暄后，布拉加开始演讲，记者们也纷纷动笔：“……巴西远征军的将士们是真正的英雄，不仅是巴西的，也是全世界的英雄。我能很自豪的说，我曾在雷阿伦戈军校和这些勇士做过同学，虽然我后来选了另一条路，为了报效国家，我进了警队，后来又从了政。我只希望我所做的一切能让他们感到骄傲。”\n\n周围响起几声赞同，马科斯却不以为然。布拉加这番话，很巧妙地把自己的一些履历给“忘”了。布拉加曾是少校，可眼下军队是个敏感话题，提这个显然太冒险了。眼看布拉加要走，马科斯扯开嗓子喊道：“布拉加先生，您说您选了另一条路，那您为什么又在军队里面服了二十年的兵役呢？”"
 brazil_lacerda_sorbonne_campaign.22.a: "他未作回应。"
 brazil_lacerda_sorbonne_campaign.23.t: "当仁不让"
 brazil_lacerda_sorbonne_campaign.23.desc: "画面开始时有些卡顿，随即响起小号与圆号之声，犹如皇室的开场号曲。两名男子在一座陈设简陋、背景柔和的木制舞台中央相会，两人相敬如宾地握了握手。这景象透着一股说不出的怪异，显然是为了不得罪任何一方的“敏感神经”而精心设计的。\n\n主持人介绍完，州长、基督教民主派、保守派内伊·布拉加坐下了。他盘腿而坐，脸上带着雷打不动的笑容。他拿起笔记本，镜头则对准了一张人们再熟悉不过的冷峻面容——前总统儒塞利诺·库比契克。站在两人面前的那个油头粉面的记者几乎忘了自己该说什么；毕竟眼前这人根本不需要介绍。\n\n他缓步踱向讲台，脚步从容不迫。“各位巴西同胞，我上一次以总统身份出现在各位面前时，是作为一个立志要引领我们走向现代化的人。今天我回来，就是要带大家重新回到正轨。我不仅想当‘目标计划’这艘航船的舵手，更试图成为一位医者。”\n\n“我出身贫寒。我曾在米纳斯吉拉斯的诊所里，为我那些勇敢却备受折磨的同胞解除病痛的折磨。革命爆发，同胞相残，我则以总统之身，拼尽全力去治愈这个国家。在巴西需要之时，我过去是，将来也永远是一名医者。因为这才是我们真正需要的——我们需要更多的医者，而不是更多的士兵。”\n\n他扫了一眼对手，目光又落回讲稿上，上面有两条不同的思路。"
 brazil_lacerda_sorbonne_campaign.23.a: "坚守阵地。"
 brazil_lacerda_sorbonne_campaign.23.b: "进攻！"
 brazil_lacerda_sorbonne_campaign.24.t: "召唤与回应"
 brazil_lacerda_sorbonne_campaign.24.desc: "“谢谢你，马丁内斯先生。”布拉加用他那标志性的巴拉那口音说道，同时手势娴熟地向主持人致意。他一直在等待机会，现在，轮到他出招了。“我的对手，恕我直言，刚刚花了好几分钟来讲他的过去。他为巴西尽心尽力，这一点我们不能否认。但尽管如此，过去终究是过去，所以，还是让我来谈谈现在吧。”\n\n布拉加扫视全场，提醒自己身处何处。调整好状态之后，他直视镜头，仿佛凝视巴西的双眼。“各位在家里看着电视的巴西同胞，我问你们，今天的你们，因为这个政府而感到安全了吗？今天的你们，感到富裕了吗？你们会把这一切，归功于我们国家最高层领导的决策吗？”\n\n库比契克突然没绷住，噗嗤一声笑了出来，麦克风里只听到一声杂音。“对那些回答‘是’的人，我祝福你，好日子还在后头呢。对那些回答‘不’的人，我邀请你们给我写信，给我们党和我的竞选团队写信，因为你们必须、也必将在议事桌上占有一席之地。这么说吧，光会抚慰伤痛是一回事，能把大家团结起来、说到做到，那又是另一回事了。而我对你们的承诺，是二者得兼。”"
 brazil_lacerda_sorbonne_campaign.24.a: "空泛的回应，但也令人无从反驳。"
 brazil_lacerda_sorbonne_campaign.25.t: "一着不慎"
 brazil_lacerda_sorbonne_campaign.25.desc: "布拉加简直不敢相信自己的耳朵。儒塞利诺·库比契克竟然承认，他为1932年以医生身份“帮助瓦加斯”而自豪！布拉加先是挂起招牌式的微笑，随即，微笑变成了毫不掩饰的轻蔑。他姿态倨傲地向后一仰，开始用鼻孔看人。“原来如此啊，总统先生，这下全明白了！就是因为你为帮助瓦加斯自豪，才让你弄出来那些债台高筑、通胀失控的政策。你不如少爱那个独裁者一点，多关心一下被你掏空了的老百姓的钱包！”\n\n话音刚落，布拉加马上就后悔了。这几天，团队千叮万嘱，让他扮演好“阳光斗士”的形象。结果，就因为一时冲动，他居然说了一堆极不专业的傻话，把一切都毁了。那一瞬间他感觉自己像是被拉塞尔达附了体，替他把话都说了。\n\n可库比契克只是难以置信地看着他，一言不发。主持人马丁内斯先生也一样。然后，库比契克继续滔滔不绝地阐述1955到1960年间工厂和生产力的变化。\n\n更要命的是，等布拉加从自己捅的娄子里缓过神来，再想加入对话时，已经晚了。库比契克已经把功劳全都揽了过去，声称全民盟就只搞了废除劳动法，而经济增长全靠社民党的钱。布拉加本可以说这些全都是谎言，可反驳的最佳时机早已错过，辩论的节奏早就不在他的掌控范围内了。该死的……\n\n库比契克占了上风。"
 brazil_lacerda_sorbonne_campaign.25.a: "好的棋手一定老成持重。"
 brazil_lacerda_sorbonne_campaign.26.t: "道德社会的模范人士"
 brazil_lacerda_sorbonne_campaign.26.desc: "库比契克在结束关于教育政策的发言时总结道：“……我很痛心，巴西的年轻一代将在布拉加政府制造的文化恐惧而非希望中成长。”然而布拉加对此毫不在意。\n\n他笑着回应道：“可过去五年我国青少年的识字率大幅提升。阿雷格里港的贝尔纳多和路易斯·奥利韦拉通过教会组织募捐活动，为无家可归者筹集食品时，他们活在恐惧中吗？库里蒂巴的阿丰索·桑托斯与同学为儿童组织课后表演，帮助社区双职工家庭减轻负担时，他没有怀抱希望吗？若因维利的安娜·佩雷拉小姐用零用钱设立基金，在社区火灾后援助教友时，她不正是充满希望吗？”看到库比契克眼中闪过一丝慌乱，意识到自己落入话术陷阱的模样，布拉加露出了满意的神色。\n\n“我敢说巴西青年充满希望。不过——”布拉加刻意停顿，为收官之语蓄势，“身为前篮球教练，我必须承认国家没有给未来的体育明星足够支持。因此我承诺，当选后会在国内新建体育设施和职业培训中心，让年轻人的每个希望都有实现的舞台！”"
 brazil_lacerda_sorbonne_campaign.26.a: "布拉加知道，在这个话题上是自己赢了。"
 brazil_lacerda_sorbonne_campaign.27.t: "道德之国还是愚鲁之国？"
 brazil_lacerda_sorbonne_campaign.27.desc: "“……所以，如果我当选，我将与教师合作，为巴西的下一代树立道德的价值观。我以前当过篮球教练，”库比契克暗想，布拉加这家伙又来了，三句话不离之前的职业，真是说不腻，“我明白，树立价值观，不仅需要读书，也需要体育。”\n\n轮到库比契克发言了，他调整了一下情绪，语气平稳地准备反击：“我担心的是，如果学校连最基本的教书育人的职责都做不到，那我的对手天天把道德和纪律挂在嘴边，又有什么用呢？”库比契克拿出一张纸，布拉加的笑容顿时僵住了。那是巴西识字率的数据，特别是拉塞尔达执政时期的数据。这数字可不太好看，库比契克甚至都不用说话，大家就知道不该再给这种失败的政策投票——当然，他最后还是把话说了。\n\n库比契克放下文件，目光直视镜头，发言直击要害：“如果我当选，社民党将为学校提供足够的资源，帮孩子们和成年人做好准备，帮助他们取得正经的、有意义的工作。我们将把联邦预算的12%投入教育，我们的老师必须持证上岗，只有最优秀的人才有资格教育我们国家的未来。至于道德，既然我们能让人们亲自从我们国家的伟大文学作品中学习这些道理，难道这不比空谈道德强得多吗？”"
 brazil_lacerda_sorbonne_campaign.27.a: "库比契克知道，任何反驳都是无用功。"
 brazil_lacerda_sorbonne_campaign.28.t: "江河日下"
 brazil_lacerda_sorbonne_campaign.28.desc: "两人开门上车，车身向下一沉，淅淅沥沥的雨点落在车顶和玻璃上。两人的脸色与天空一般灰暗，因疲惫而憔悴，因压力而紧绷。远离镜头之后，他们连最后一点伪装的力气都没有了。\n\n儒塞利诺·库比契克靠进座椅，揉了揉眼睛。他好几个小时之前就醒了，一直在看传来的数据，复盘自己的辩论。眼皮沉重，而他看到的消息也同样沉重。他转向同伴：“乌利塞斯，情况不妙，是吧？”\n\n乌利塞斯·吉马良斯叹了口气，“是啊。”他望向窗外，凝视着一个不断扩大的水洼。“民调死活上不去……”他们已经埋头研究了好几个小时的数据，按性别、按地区、按一切可能按的方式，恨不得把数据掰碎了，想从中找出一点能赢的希望。可怎么看都像是痴人说梦，事实摆在这里——他的支持率在下滑，而布拉加的声望只增不减。\n\n“妈的，军方的走狗……办公室查过窃听器没？”库比契克一边反思，一边攥紧了拳头。是有人在背后搞鬼？还是自己真的江郎才尽了？怎么会搞成这样？他想不通，无力地瘫在座位上。“接下来呢？”他问。\n\n“我安排好了，我们今晚去吃点东西。一个本地的小馆子，没什么记者，正好可以搞一篇亲民的报道。但首先，我们得回家睡一会儿。就我们现在这副鬼样子，怎么都赢不了。”\n\n库比契克点了点头，深陷在自己的思绪中，吉马良斯正要下车。“你说，老百姓是会把票投给一个会辩论的，还是一个会下馆子的呢？”"
 brazil_lacerda_sorbonne_campaign.28.a: "吉马良斯顿了顿，“我不知道。”"
 brazil_lacerda_sorbonne_campaign.28.tt: "§Y[BRA_pres_selected_region_dynamic]§!\n  §G略微提高§!§L$BRA_pres_candidate_name_9$§!的支持率。"
 brazil_lacerda_sorbonne_campaign.29.t: "又一场辩论"
 brazil_lacerda_sorbonne_campaign.29.desc: "卡多佐一家做完祷告，便安静地吃起饭来。过了一会儿，父亲开口说话，“内伊·布拉加，”他用餐巾擦了擦嘴，“他全程都保持镇定，没发一点脾气。话语很有力度，也不带火气。”儿子停止吃东西，紧紧攥着手中的刀叉。“这才叫领袖，这才叫男人。”父亲伸手拍了拍儿子的背，“你该学学人家！”\n\n“他只是空谈领导而已，”儿子答道，不动声色地把父亲的手抖开，“库比契克的能力是经过实践证明的。”父亲不屑地哼了一声，摇了摇头，但儿子不加理会。“布拉加有的是漂亮话，库比契克有的是真东西。布拉加有的是理想，库比契克有的是计划——能带我们走出拉塞尔达留下的不公和压迫的计划。”\n\n母亲默默地吃完了饭，看着父子俩争论。她觉得两人都没说错，但没打算插话进去。为一场辩论争吵，总比为军方那场“革命”吵翻天要好。"
 brazil_lacerda_sorbonne_campaign.29.a: "“重点是，今晚谁来洗碗？”"
 brazil_lacerda_sorbonne_campaign.30.t: "布拉加的愚行"
 brazil_lacerda_sorbonne_campaign.30.desc: "罗伯特·博尔巴咳了几声，堆满旧物的储藏室里尘土飞扬，呛得他上了年纪的肺直难受。不过很快，他就从一个箱子里掏出了他的宝贝——一本相册。相册的风格华美靓丽，让他想起了另一个时代，不禁莞尔一笑。\n\n他爬出来，坐到餐桌旁。角落里的电视机放着节目，家人正有一搭没一搭地聊着，他却充耳不闻，径直翻开相册。当年工党集会上，那个朝气蓬勃的年轻身影跃入眼帘。那时候他们多受欢迎啊，他为了能挤到前排，还特意当了摄影师。相册里甚至还有他和瓦加斯、古拉特的合影。罗伯特沉思，今晚，库比契克已经证明了自己。政策或许与当年不尽相同，但他身上有和当年工党如出一辙的诚实和勇气。他合上了相册。\n\n若昂·佩索阿手持社民党的旗帜，一动不动地站在窗前。他为自己是党员而自豪，这点毋庸置疑，可他也知道自己住的是什么地方。这儿全是全民盟的人，他不知多少次去附和别人对自己同志的冷嘲热讽，这让他十分烦闷：他不是个想惹事的人。可转念一想，库比契克会怎么做？今晚，他是那么的勇敢、自信——这才是巴西需要的领袖。既然如此，自己为什么不能学他一样？他走到窗边，将旗帜骄傲地悬挂起来，让所有人都能看见。\n\n全民盟成员费利佩·阿尔维斯开了一瓶酒，自顾自地喝了起来。他看着这瓶从橱柜底翻出来的酒，什么都不愿去想了。“1930年的酒，”他含混不清地念着酒标，“真是个好年份。”"
 brazil_lacerda_sorbonne_campaign.30.a: "然而事实恰好相反。"
