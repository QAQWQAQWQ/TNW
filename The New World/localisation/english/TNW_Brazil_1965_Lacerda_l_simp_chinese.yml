 brazil_lacerda_samba.82.t: "墨镜下的人"
 brazil_lacerda_samba.82.desc: "在欢呼声中，拉斐尔·马加良斯伴走上了今晚的舞台。瓜纳巴拉的魔法师，拉塞尔达的接班人，全民盟冲击第二任期的领袖，在场的所有人都是为他而来。在人群后的一间包厢里，戴着墨镜的维尔吉利奥·塔沃拉将酒一饮而尽。[LacerdaConferenceParagraph2][LacerdaConferenceParagraph3][LacerdaConferenceParagraph4][LacerdaConferenceParagraph5]"
 brazil_lacerda_samba.82.a: "魔法师找到了盟友，还拉近了同塔沃拉间的关系。"
 brazil_lacerda_samba.82.b: "魔法师在塔沃拉的拥趸中寻不到多少魔力。"
 BRA_lacerda_conference_p2_v1: "\n\n他的讲话以经济问题打头。塔沃拉还记得，为了不让拉塞尔达一刀把预算捅穿，他曾熬了无数次的夜，也曾一次又一次地东拼西凑，只为能让那利刃得到满足。但现在，他盯着讲台上的马加良斯，想着如果这人又一次举起匕首，他还能不能把这只手摁住。塔沃拉举起酒杯，紧张地抿了一口。"
 BRA_lacerda_conference_p2_v2: "\n\n马加良斯以他们对巴西人民的承诺开篇明义。“净放屁，”塔沃拉抿了一口杯中酒，喃喃自语着。确实，通货膨胀这头恶兽已经倒下了，但在乐队派对预算横加干涉时，有多少人失去了工作，又有多少人失去了政府的帮扶？"
 BRA_lacerda_conference_p3_v1: "\n\n随后，马加良斯将话题转向了东北方，以及全民盟为缓解持续干旱提出的新建议。他的名字绝不会被提起，但明眼人都知道，这是塔沃拉的主意。他这就已经很满意了。这对全民盟的公众形象确实很好，但一想到他那干涸而疲惫不堪的家乡将要获得的新生，塔沃拉不禁露出了一丝微笑。"
 BRA_lacerda_conference_p3_v2: "\n\n魔术师又开始用华丽的辞藻搬弄是非了。当谈到全民盟对关键基础设施的修复时，马加良斯的手高高指向了天空。他是在说那份水电翻新法案。这确实让东北地区看到了一线光明，但还有大片干旱的土地等待着烛光。塔沃拉曾见过那些地方。他又抿了一口。"
 BRA_lacerda_conference_p4_v1: "\n\n当马加良斯谈到那场暴动时，会场内鸦雀无声。而他也不得不明确向塔沃拉发出感谢，但这并没让塔沃拉露出笑容。他欠塔沃拉的比这多得多。是他带领巴西走出了那场噩梦，为了不让街头出现更多的流血事件，他几个月来一直在谈判，进行了无数次直至深夜的痛苦会面，而他所得到的却只是几句好话。塔沃拉举杯，将杯中酒一饮而尽。"
 BRA_lacerda_conference_p4_v2: "\n\n当马加良斯谈到那场暴动时，会场内鸦雀无声。多亏了全国各地警力的英勇奋战，暴乱才得以控制，秩序才能战胜街头不断恶化的混乱。厌恶之情沿着塔沃拉的手臂开始蔓延。手中的酒杯正微微颤抖，若不是他已将杯中酒饮了大半，那液体绝对会被抖落出来。"
 BRA_lacerda_conference_p5_v1: "\n\n他们在绝大多数时候意见都不一致，但拉塞尔达知道到底什么时候该听塔沃拉的。他很尊重这一点，至少他觉得自己很尊重这一点。当时机成熟，竞选开幕时，东北地区将会为马加良斯摇旗呐喊的。塔沃拉觉得，这是马加良斯欠他的。"
 BRA_lacerda_conference_p5_v2: "\n\n五年来，塔沃拉一直忍受着拉塞尔达对巴西那近乎天方夜谭的愿景。但马加良斯正站在台上，要把这些疯话延续下去。当他的竞选活动开始时，他将在东北部一无所获。务实派将只为自己而战——就和冲锋在前的乐队派一样。"
 brazil_lacerda_cisplatina.1.t: "伊卡洛斯"
 brazil_lacerda_cisplatina.1.desc: "卡洛斯·拉塞尔达镇压罢工并巩固他的政治遗产时，许多熟悉这位总统的人都感受到他身上那种难以掩饰的骄傲。无论是在官方晚宴上，还是出席公开场合，大家都注意到，自从罢工事件平息后，总统的情绪明显高涨许多——眼中闪烁着光芒，步伐也变得轻快。然而，就在一个闷热的下午，高原宫内，瓦斯科·达·库尼亚与盖泽尔和戈尔贝里等人对坐时，他忽然意识到，总统眼中的那抹光芒已赋予了完全不同的含义。\n\n“我们的目标，是彻底结束这场纷争，”拉塞尔达开口道，手中漫不经心地搅动着杯中的冰块。“让那些混蛋明白，我们不再装模作样，不再假装彼此平等。盖泽尔，戈尔贝里，我已经批准了大幅增加军费的计划，今年的军事演习规模也将升级。我希望这次演习安排在阿根廷边境。”\n\n外交部长的心脏几乎要跳出胸膛，他半信半疑地怀疑总统是否在开一个病态的玩笑。然而，解释随之而来，这并不是一个玩笑。“总统阁下，这不可能吧？过去几年局势已然高度紧张，如若挑衅对方，我们岂不是在自找麻烦——”\n\n拉塞尔达举起手示意瓦斯科停下，摇了摇头。“正因如此，我才必须这么做。我们已走到最后阶段，手中握有所有王牌。我会赢下这场战斗。”两名军方高官如忠诚的猎犬般点头应和，几乎对这个提议垂涎三尺。盖泽尔低声讨论着时机与资金的问题，而外交部长却沉默了。他终于明白，总统眼中的那抹光芒，已不再仅仅是骄傲或自信。"
 brazil_lacerda_cisplatina.1.a: "傲慢成了狂妄。"
 brazil_lacerda_cisplatina.2.t: "加固壁垒"
 brazil_lacerda_cisplatina.2.desc: "拉塞尔达深深地吐了一口气。\n\n这是关于阿根廷问题内阁会议的第三个小时，他们已经反复修改了四——不，五次关于即将到来的军事演习的方案。需要考虑的事情实在太多。\n\n首先是紧张局势的问题。展示武力当然无可厚非，但这并不意味着他们希望挑起战争。如果处理不当，可能会重演1851年的局面。当然，拉塞尔达并不打算妥协退让，他仍需展示军事实力。然而，这还未考虑演习的成本、组织工作，以及究竟谁来指挥这一切！\n\n“卡洛斯？”戈尔贝里的脸在他面前晃动，总统回过神来，发现对方略带关切地看着自己。\n\n“怎么了，部长？”\n\n戈尔贝里侧了侧头，显然他已经问过了自己的问题。“总统先生，您的决定是什么？”拉塞尔达低头看着桌子，面前摆着三个选项。\n\n第一个选项最为温和，仅邀请周边国家的观察员前来观摩。这一决定无疑能有效维持低紧张态势，但缺乏任何武力展示的力度。第二个选项则是让上述观察员参与联合训练，属于一种相对中立而坚决的策略。而第三个选项则风险最大：邀请OFN和美国顾问来巴西。这一举动必然会激怒阿根廷，但同时也能明确表明自由世界对巴西军队的支持。\n\n拉塞尔达微微调整了一下眼镜，做出了自己的决定。还有太多事情需要讨论，过分纠结这个选择，对巴西并无益处。"
 brazil_lacerda_cisplatina.2.a: "邀请美国人。"
 brazil_lacerda_cisplatina.2.b: "求得平衡。"
 brazil_lacerda_cisplatina.2.c: "小心谨慎。"
 brazil_lacerda_cisplatina.3.t: "恐惧乃心灵杀手"
 brazil_lacerda_cisplatina.3.desc: "“……最后，我要向布宜诺斯艾利斯那位先生说句话！”拉塞尔达以洪亮嗓音发出的号召立即激起此起彼伏的口哨与呐喊声浪，就连集会的名称都充满火药味。“必须明确，我指的并非阿根廷普通民众，而是那些从混乱、破坏和暴力中牟利之人。那些煽动恐惧、腐败和邪恶来为自己开脱的恶徒！”\n\n“从我们这些抬头挺胸、齐聚瓜纳巴拉的巴西人，到整个拉丁美洲大陆与我们并肩的同胞，无论信仰如何分歧，我们都为手中的选票和民主制度感到自豪，不容误解！巴西必将捍卫自身、子民及盟友！你们休想从这场运动、我们的人民或朋友手中夺走火炬！感谢诸位！”\n\n“看来印刷机要忙不过来了，”达·库尼亚兴奋地说，“就连《最后时刻报》也无法否认您演讲的‘广泛感召力’，总统先生。虽然他们哀叹印刷媒体正在‘僵尸化’，仍称这是‘人为制造的危机’，但我们赢得了支持。可以继续推进议程。”\n\n“我也注意到了，”拉塞尔达咧嘴一笑。混迹政坛多年，他深谙如何制造舆论焦点。“阿根廷方面反应如何？”\n\n“不出所料，他们表现得较为克制。我们收到备忘录，对方对‘威胁’一词的谴责力度与您相当。不过依我看，他们比谁都清楚选举需要激情造势。总之，总统先生，我们仍需高度谨慎，切莫误判玫瑰宫的动向。”"
 brazil_lacerda_cisplatina.3.a: "言辞可作利刃，其锋芒不逊导弹。"
 brazil_lacerda_cisplatina.4.t: "外交对弈，沙盘对垒"
 brazil_lacerda_cisplatina.4.desc: "巴西利亚的阿根廷大使馆向来是阴谋的温床，那些烟雾缭绕的房间便是阿根廷情报网的神经中枢。常有车辆以处理外交文件为掩护进出其间，而巴西当局则守在摄像机后，试图记录下每一个进出者。这一次，驶入使馆的轿车同样被拍摄下来，但车内人物举世皆知，而拍照者，则是记者。\n\n外交部长瓦斯科·达·库尼亚前来会晤大使及其幕僚。自军演消息公布以来，两国关系极为紧张。此次会晤，正是拉塞尔达试图安抚布宜诺斯艾利斯方面的忧虑，并确保军事演习仍仅限于演习的尝试。他走进会议室，与大使握了握手。\n\n“感谢大使阁下拨冗会见。”大使正要说话，但达·库尼亚对对方要说什么一清二楚，便抢先开口。“我在此向您保证，我们的军事演习并非意在威胁贵国。军演的目的，是与盟友进行交流，让我方部队与未来潜在的战友们磨合关系、增进默契。我们的演习绝不无任何侵略意图，这一点请您务必理解。”\n\n“能与拉塞尔达总统如此亲近的人士会晤，实属我的荣幸。我自然相信贵国无意挑衅，但我也无法否认，贵国的军事演习已经激化了我国国内的局势。媒体正连篇累牍地报道，称军事演习是全面战争的前奏。我希望能与贵方共同努力，平息媒体的忧虑，但前提是双方应当协同合作，而非贵方在不告知我方的情况下自行其是。双方必须要有对话，这一点请您务必理解。”大使回应道。"
 brazil_lacerda_cisplatina.4.a: "我们会开展对话，大使阁下。"
 brazil_lacerda_cisplatina.5.t: "与鲨共泳"
 brazil_lacerda_cisplatina.5.desc: "南大西洋的海风还是一如既往地提神醒脑。风儿总带着一股独特的凉意，托斯卡诺上将早已习以为常，却也百闻不倦。他舔了舔嘴唇上的盐粒，凝视着劈波斩浪的巴西舰队。接到指挥乌拉圭外海军演的命令时，这位经历过龙虾战争的老将欣然领命。毕竟，龙虾战争之后，他和整支舰队都憋着一股劲儿，想找个机会一展身手。\n\n今天演练的是反潜。托斯卡诺正昂首立于舰队的骄傲——米纳斯吉拉斯号的舰桥之上，俯瞰全局，心中既觉平静，又感到自己几乎战无不胜。他不禁想道，过去那些伟大的海军名将，在看着自己的舰队时，是否也会是这般的心境？\n\n但这珍贵的寂静，却被无线电的杂音划破。“呼叫托斯卡诺上将。紧急情况。海平面发现不明舰队，完毕。”上将的眉头皱了起来。不明舰队？情报上说乌拉圭人很少到这片海域来。他拿起无线电，刚要开口，眼角的余光便瞥见了地平线上的异样。\n\n远处，一支规模庞大的舰队正以与巴西舰队完全相同的航速齐头并进。虽然看不清船上的旗号，但他心里已经有了答案。那一瞬间，他觉得自己渺小无比，连那原本令人惬意的海风也变得冰冷起来。既然对方无意打扰，那他便也无意理会。毕竟，这里是盟友的水域。虽然双方舰队未做任何通讯，但托斯卡诺读懂了这片沉默传递的讯息。"
 brazil_lacerda_cisplatina.5.a: "有种上，谁怕谁。"
 brazil_lacerda_cisplatina.6.t: "熟悉的战争"
 brazil_lacerda_cisplatina.6.desc: "美制坦克纵队突破层层防线，但又旋即遭遇山顶反坦克炮阵地的密集火力。若有人误以为这是二战场景重现，而非巴西军演的预设环节，也实在情有可原。\n\n埃内斯托·盖泽尔透过双筒望远镜观察模拟对抗，二十年前在威尔士青葱原野上的惨烈厮杀不禁浮现眼前，甚至连战术运用都如出一辙。\n\n他不禁质疑：若与阿根廷爆发冲突（但愿不会），此类陈旧战术能否奏效？敌人已开始运用六十年代战术的可能更令他不寒而栗，毕竟自那时以来，战场规则早已面目全非。\n\n电子设备日新月异，喷气发动机、精准火炮和直升机也都值得重视，可为何巴西陆军仍沉湎于往日荣光？\n\n空中传来的尖啸声将盖泽尔的视线引向天际。模拟进攻的坦克群止步山脚，一架不明型号的喷气机划过上空。他几乎可以肯定，这是阿根廷的飞机。\n\n阿根廷人监视军演不是什么秘密。盖泽尔抓起无线电下令战机紧急升空，驱赶不速之客。若真是布宜诺斯艾利斯方面在窥探，他只会更加忧心忡忡。\n\n对方将发现，他们的假想敌固步自封，在新时代的尖端装备面前毫无抵抗之力。"
 brazil_lacerda_cisplatina.6.a: "战争从未改变，还是说并非如此？"
 brazil_lacerda_cisplatina.7.t: "战争与机会的游戏"
 brazil_lacerda_cisplatina.7.desc: "坦克碾过原野扬起尘云，装甲巨兽的阴影笼罩着侧翼奔跑的步兵。号令骤响，钢铁洪流戛然而止，炮弹出膛的灰烟与沙尘共舞。双翼直升机掠过天际，火箭弹拖着尾焰刺向远方。\n\n临时搭建的观礼台上，戎装笔挺的将军与西装革履的政客们正透过望远镜观摩这场模拟军事行动。他们偶尔放下望远镜，在笔记本上记下几笔，或是用步话机通话，旋即又将目光投向“西斯普拉蒂纳70”——南美史上最大规模军演之一。\n\n另一边的看台上，一排电影摄像机正在追踪战况，记者们则手持柯达相机不停地拍摄。一名武官正向那些外行的平民讲解着战况，确保他们能准确地向各自的受众报道——若是“敌人”胆敢来犯，巴西或乌拉圭将如何应对。而那个所谓的“敌人”是谁，无需学过地理也能了然于胸。\n\n数百英里外，拉塞尔达总统正要登台，为他在库里蒂巴的支持者们发表讲话。\n\n“西斯普拉蒂纳有消息吗？”他问。负责保密线路的助手摇了摇头。拉塞尔达点点头，瞥了一眼手表。演习刚刚开始，要知道结果还得等上一阵子。快到他演讲的时间了。很快，答案就会揭晓。"
 brazil_lacerda_cisplatina.7.a: "但愿一切皆照计划。"
 brazil_lacerda_cisplatina.8.t: "肌肉秀"
 brazil_lacerda_cisplatina.8.desc: "“防务专家盛赞刚刚落幕的西斯普拉蒂纳70军演取得圆满成功。巴西军队在军演中的表现堪称完美，充分体现了过去十年间武装力量的巨大飞跃。乌拉圭、美国等盟国参演部队也展现出极高的专业素养与精神风貌，各方配合默契，浑然一体。”\n\n拉塞尔达兴奋得手舞足蹈，电视屏幕里坦克推进，向指定目标开火，直升机呼啸而过，各国士兵友好地共享烟酒。西斯普拉蒂纳70完美展示了他执政以来的军事发展与外交成就。全民盟候选人已在全国各地展开宣传攻势，将此次胜利塑造成总统捍卫国家利益的铁证——此举无疑将为选情带来一些积极影响。\n\n电话突然响起。一名助手匆忙拿起听筒，听了片刻后向拉塞尔达示意。总统走过去，接过听筒。\n\n“总统先生，是布宜诺斯艾利斯，”外交部长瓦斯科·达·库尼亚的声音传来，“简单来说，他们想就缓和边境紧张局势展开对话。”\n\n总统嘴角扬起胜利者的弧度。国内彰显军威，国外赢得外交主动，这记组合拳可真谓是一举两得。"
 brazil_lacerda_cisplatina.8.a: "“告诉他们我们会接受。”"
 brazil_lacerda_cisplatina.9.t: "彰显实力"
 brazil_lacerda_cisplatina.9.desc: "“防务专家表示，刚刚结束的西斯普拉廷70军演充分展示了巴西军队的能力。尽管存在一些小问题，但总体而言巴西军队在模拟军事行动中表现出色，显示出过去十年间取得的进步。巴西的友邦和盟国也参与其中，表明我们并非孤立无援。”\n\n拉塞尔达看着电视新闻，心情十分愉悦——电视屏幕里坦克推进，向指定目标开火，直升机呼啸而过，各国士兵友好地共享烟酒。西斯普拉蒂纳70算是一次成功，虽然场面上没有他预想中那么声势浩大，却也并不妨碍各地的全民盟候选人拿这次军事成功来大肆宣传，渲染拉塞尔达与国防部长马加良斯如何守护国家。只是，这类宣传到底能不能改变选民的想法，还不好说。\n\n“我们确实做得不错。帮我接达·库尼亚外长。”助理拿起电话拨通巴西利亚的外交部，随后将听筒递给总统。\n\n“布宜诺斯艾利斯方面有消息吗？”\n\n“没有。他们保持沉默。或许过几天面子过得去时才会来电。”\n\n拉塞尔达并不相信这个说法。要是巴西的军事和外交支持没能震慑住他们，那他们一定掌握了某些他不知道的情况。"
 brazil_lacerda_cisplatina.9.a: "他们一定在策划着什么……"
 brazil_lacerda_cisplatina.10.t: "无能毕现"
 brazil_lacerda_cisplatina.10.desc: "“防务专家一致认定，刚刚落幕的西斯普拉廷70军演是一场不折不扣的灾难。军演才开场几个小时，巴西军队就陷入僵局，之后所有的补救措施全都失灵。阿根廷大使也发表声明，谴责“无端且危险的军事升级危害南美和平”。”\n\n电视屏幕里，莱昂内尔·布里佐拉正怒不可遏地痛斥：“这简直是一场丑剧，全民盟的败笔——”\n\n拉塞尔达猛地一拧关掉电视，手劲大到把旋钮都弹飞了。他阴沉着脸回到办公桌前，抓起电话，对着话筒吼道：“让戈尔贝里过来！”几分钟后，国防部长戈尔贝里·多·科托-席尔瓦推门而入，面容如大理石般冷峻。\n\n“奇耻大辱！军费砸了这么多，就换来这种结果？选情要完蛋了！”\n\n“总统先生，虽然闹得很难看，但对军队来说，也算是个教训：我们明确了需要撤换的军官，也能得以重新审视训练和保养流程。要是当初能拉上几个盟友一起组织演习，起码还能摆出一个团结的样子。”\n\n“但我们现在必须解决这些问题。我们要增加国防预算，采购更多武器装备。要通过媒体进行舆论管控。事情要办好，动作要快。”\n\n“明白。但请务必谨慎，拉塞尔达。”"
 brazil_lacerda_cisplatina.10.a: "“军队不喜欢被政客压一头。”"
 brazil_lacerda_cisplatina.11.t: "凌晨急电"
 brazil_lacerda_cisplatina.11.desc: "警报器发出哀嚎。一道，两道，而后十几道声浪撕裂夜幕。拉塞尔达在纷乱的脚步声与敲门声中睁开睡眼，妻子莱蒂西娅嘟囔着：“出什么事了？”\n\n房门轰然洞开。“总统先生！请立即撤离！”几名特勤人员冲进来架起总统夫妇，半拖半架地将衣衫不整、半梦半醒的第一家庭带离晨曦宫，塞进疾驰向高原宫的车辆。不到两分钟，众人已置身总统办公地下方的掩体。\n\n埃内斯托·盖泽尔将军正在侧翼伏案研究作战地图，戈尔贝里与瓦斯科·达·库尼亚早已到场，二人同样衣衫不整，却目光如炬。\n\n“总统先生，阿根廷炮兵正在全线轰击边境要塞，部队已渡过乌拉圭河，空袭范围波及里约与米纳斯吉拉斯的机场。战争爆发了。”\n\n拉塞尔达眼角抽搐：“婊子养的！搞偷袭！我要全面反击！用所有可用武力打击！”将军抓起电话咆哮指令时，他补充道：“通知美国大使馆没有？”\n\n“已向盟国及美国通报袭击，”达·库尼亚身体微颤，“恐怕战事会进一步升级。”\n\n“管不了这么多，”总统斩钉截铁道，“先挡住这波进攻再说。”"
 brazil_lacerda_cisplatina.11.a: "“然后，把阿根廷人揍出屎来！”"
 brazil_lacerda_world_tour.1.t: "愚者的旅行"
 brazil_lacerda_world_tour.1.desc: "似乎有一份漫长的名单，记录着那些在巴西失势后流亡乌拉圭的政客。而如今，卡洛斯·拉塞尔达成了这份不幸名录上的最新一员。这位前巴西总统，此刻正像个落魄的游客般缓步走过独立广场，阴郁地看着附近长椅上那些喂鸽子的老妇人。\n\n也许塔沃拉是对的。那个男人这些年来一直在他耳边喋喋不休，劝诫他要克制、要谨慎，警告他不要随意扣下扳机。拉塞尔达曾经觉得这些话枯燥乏味，毫无激情。然而现在，他流亡至此，而塔沃拉却成了总统。或许，这种谨慎确实有它的道理。\n\n他第一次踏上这片广场，还是与父亲一起。那时，毛里西奥·拉塞尔达是1930年巴西驻乌拉圭的大使。然而，历史同样击垮了他的父亲，使他的名字蒙上了耻辱，让人们不愿再提及。父亲没能反抗，他因此深感痛惜——尽管父亲并非没有过错。\n\n不！该死的！他不会让同样的事情发生在自己身上。他不会眼睁睁看着自己所有的抱负像那些绝望的失败者一样，随拉普拉塔河的水流远去。塔沃拉、瓦加斯——这些人多年来一次又一次想要将他拖垮。而自己迈出的每一步、呼吸的每一口空气，都是对他们煽动民粹与仇恨的有力反驳。\n\n他的步伐突然坚定起来，惊扰了地上的鸽群。种种思绪在脑海中迅速串联起来。那些流亡者，那些瓦加斯的敌人——他们就在这里，就在乌拉圭。他完全可以与其他流亡的巴西人接触，将他们组织起来，招募他们加入一场真正的运动，一场反对瓦加斯主义、法西斯主义和共产主义的斗争。\n\n实际上，他为什么要止步于乌拉圭？"
 brazil_lacerda_world_tour.1.a: "下一站：墨西哥城！"
 brazil_lacerda_world_tour.2.t: "隐士"
 brazil_lacerda_world_tour.2.desc: "巴西-墨西哥文化中心的礼堂人头攒动。拉塞尔达对到场人数暗自满意——这证明自己仍具政治影响力。虽说多数是冲着前总统名号，前来猎奇的媒体，但若没有他们的报道，海外巴西人又怎能知晓自己正在创建新运动？\n\n他在航班上准备的演讲稿堪称佳作，甚至贴心地译成了西班牙语。巴西侨民遍布全球，他们的政治潜力却长期被忽视。纸页上的文字如溪流般自然流淌，此刻正是施展雄辩之才的良机。\n\n“因此，”他正色道，“那些因恐惧政治迫害而背井离乡的巴西公民，不应认为自己必须放弃政治参与权。”  \n\n“多谢总统先生开恩！”观众席突然爆出葡萄牙语喊声。一位年轻女子霍然起身，目光如刀：“您可曾想过我们中有些人正是因您而流亡？”\n\n簇拥在她周围的几人发出嘘声，当地记者们伸长脖子记录骚动。女子岿然不动，拉塞尔达强作镇定问道：“女士可否告知您为何来此？敢问芳名……”\n\n“我是奥兰迪娜·德·奥利韦拉，来自阿拉瓜里。我今天代表全体巴西侨民，谴责你勾结的种植园资产家、谴责你谄媚美帝、谴责你这虚伪作秀之旅！记住，你是被巴西的工人阶级击败的！永远记住！”场馆的保安将她带离现场时……"
 brazil_lacerda_world_tour.2.a: "拉塞尔达心中不禁暗自思索：或许，这比他想象的要难得多。"
 brazil_lacerda_world_tour.3.t: "魔术师"
 brazil_lacerda_world_tour.3.desc: "不久前的拉塞尔达还会下榻哈瓦那希尔顿酒店——那座线条流畅的现代主义建筑曾，曾是美国对这座港城影响力的图腾。但这次他选择了古巴国家酒店，海滨的塞维利亚风格装饰艺术建筑令人想起战间期岁月。站在露台上远眺，水晶般的碧波在阳光下粼粼闪烁，拉塞尔达借这片刻宁静思忖着下一步棋。\n\n他已向古巴的巴西名流寄出信函并登门拜访，至少那些尚可接触之人。拉塞尔达不指望每个流落革命之国的同胞都热情相迎，但反瓦加斯派与反法西斯分子应足以形成气候。\n\n“介意我坐这儿吗？”粗哑嗓音将拉塞尔达拽回现实。转头看见身着橄榄绿野战服的身影正拉开邻座藤椅。\n\n“请便，总统先生。”拉塞尔达应道，余光瞥见酒店员工从遮阳酒吧间偷瞄这两位贵客。身旁的菲德尔·卡斯特罗挠了挠络腮胡落座，目光投向海平面。\n\n“我一听说你这趟巡游，就知道必须得见见你，拉塞尔达先生。”卡斯特罗的语气过分熟稔，或许意在令巴西人放松警惕，“贵政府与我的政权虽不投契，但我不乐见它如此收场——太不体面。”\n\n“有意思，我还当您是来幸灾乐祸。”\n\n“我？”菲德尔抽出雪茄，“这可有违待客之道。您打了场败仗，仅此而已。谁都可能经历。”打火机咔嗒作响，醇厚烟香弥漫空中，“不过啊卡洛斯，您倒还算体面……”"
 brazil_lacerda_world_tour.3.a: "“有些人没干什么，就倒在了墙边。”"
 brazil_lacerda_world_tour.4.t: "恶魔"
 brazil_lacerda_world_tour.4.desc: "机轮触及滕珀尔霍夫机场跑道的那一刻，拉塞尔达便感知到了尾随者的目光。日耳曼尼亚的重压如影随形——兴登堡桥的钢索在浊重空气里呻吟，仿佛下一秒就会崩断。\n\n他蜷缩在波茨坦广场某间咖啡馆的阴影里。此趟日耳曼尼亚之行绝非寻欢，可究竟为何而来？答案在浓缩咖啡的氤氲中愈发模糊。不久前还在为对抗这头巨兽而战，如今却深陷其脏腑。若不是塔沃拉的背叛，他本可……\n\n鹅卵石街道蜿蜒回溯旧欧洲的残影，纳粹建筑师的畸形巨构却如利剑刺向非人化的未来。拉塞尔达穿行其间，恍若被悬在勃兰登堡门的獠牙间，身后是整片大陆徘徊不去的亡灵。当人民大厅的穹顶如山岳压顶而来，荒诞现实几乎碾碎他的心脏。\n\n这趟渎神的朝圣路上，无数“如果”在拉塞尔达脑中炸裂：若当年棋高一着，若懂得及时收手，若能摆脱全民盟那群鬣狗的撕咬；若施佩尔的死亡神殿上空曾有美军战机掠过，若远征军多坚持一刻，若正义终能战胜邪恶——可历史浊流终究汇成此刻的黑海，吞没所有假设。\n\n拉塞尔达在冷汗涔涔中惊醒。酒店空调送着冷风，曼哈顿的夜灯透过落地窗流淌进来。他踉跄着扑向窗边，帝国大厦的尖顶直刺云霄，星光在玻璃幕墙间流转。黎明的纽约正将意义重新注入他的血管。"
 brazil_lacerda_world_tour.4.a: "若时间没有停滞不前……"
 brazil_lacerda_world_tour.5.t: "战车"
 brazil_lacerda_world_tour.5.desc: "“您好，拉塞尔达先生。我是霍达科夫斯基——相信有人预告提过这通电话。对，霍，达，科，夫，斯，基，波兰裔。家族世纪初从格但斯克乘船到埃利斯岛。巴西也有波兰移民吧？毕竟同属天主教国家。”\n\n“行程表收到了？很好，我简要梳理重点。上午安排高校巡讲，先在纽约市立大学政治系座谈，接着转场哥伦比亚大学。墨西哥城学生闹事的风声我们有所耳闻，校方已加强管控，保证不会有愣头青造次。啊当然，您这样的人物怎会担忧，只是例行通报一下。”\n\n“晚上会送您到市政厅。若您有兴趣，可插空安排帝国大厦观景台行程，曼哈顿夜景堪称绝景——届时有机会和各界名流对话。市长准备隆重表彰阁下功绩，警局高层也盼着讨教镇压大罢工的经验，防患于未然嘛。”\n\n“什么？不不，拉塞尔达先生，我不是中情局的，我在州长办公室工作。”\n\n“行车路线？哈莱姆区？恕我直言，那片区就是个贫民窟，还是绕行为妙。”"
 brazil_lacerda_world_tour.5.a: "水泥丛林的树冠。"
 brazil_lacerda_world_tour.6.t: "《火线》节目摘录，[?global.date.GetDateStringNoHourLong]"
 brazil_lacerda_world_tour.6.desc: "拉塞尔达：“……这就是我希望您的观众理解的。在巴西，我们有这些深深扎根、庞大无比的权力体系，遍布社会的各个层面，包括政治、文化和经济。在试图拆解一个体制——即半法西斯主义的瓦加斯政权的劳工法时，我的政府却被另一个体制所破坏，那就是全国民主联盟。”\n\n巴克利：“我想美国的观众能够理解这个观点——尤其是那些在报纸、电视上看到总罢工画面的观众，看到反对您改革所动员的强大力量。但现在，尘埃落定，您似乎已经‘失业’了。我们该如何解读这个现象呢？所以说，您认为，您的‘阿喀琉斯之踵’是什么？”\n\n拉塞尔达：“如果我知道这个问题的答案，我现在还是总统呢。（笑）我曾试图实现一个我认为巴西可以成为的样子。但政治精英并没有分享这个愿景。”\n\n巴克利：“某些学术界的声音，特别是一些常见的观点，喜欢把巴西发生的事看作是一个‘大卫与歌利亚’的故事——工会的弱者顽强抗争，而您本人则是一个右翼且反动的歌利亚——”\n\n拉塞尔达：“人们想说什么，那是他的自由，但我不同意这种看法。这不是一个左右的问题——这些标签被不诚实地用来将世界划分成一个或另一个。在欧洲和亚洲，这些标签毫无意义。”\n\n巴克利：“听着有点道理。但您是否否认自己曾经使用过独裁的权力？”\n\n拉塞尔达：“我一切所做都在法律允许的范围内。所有的行动都是为了保护巴西。这就是核心所在。”"
 brazil_lacerda_world_tour.6.a: "稍后，我们将继续播放由威廉·F·巴克利主持的《火线》节目。"
 brazil_lacerda_world_tour.7.t: "塔"
 brazil_lacerda_world_tour.7.desc: "“我相信您能理解总统为什么不能见您。”助手一边擦着后颈，一边与拉塞尔达走过国会大厦，表情带着些许同情。拉塞尔达点了点头，尽管这种冷漠的政治现实让他感到格外寒冷。\n\n然而，这种情况并非普遍。另一位参议员恰好从他们身边经过，热情地伸手要求与拉塞尔达握手，并以今天同样一样的友好语气，表示自己对他的尊敬，能见到他是多么高兴。可这份热情，很快迅速消散，仿佛未曾存在。\n\n“您不也看到了自己带来的影响吗，先生？别再说华盛顿不爱您了。” 助手一边快步走，一边语气轻松地说道，“如果我可以私下提一句——今晚FBI局长带您去的餐厅我去过，您一定得尝尝他们的龙虾饺子。”\n\n美国在拉丁美洲的影响力比以往任何时候都要强大。得到认可固然好，但这种认可终究不过是空洞的言辞，真正重要的，还是当总统时的权力。\n\n“我也会回报华盛顿的爱，” 拉塞尔达说，“不然，伙伴到底是为了什么呢？”\n\n助手转头看了看他，脸上似乎闪过一丝微妙的变化。那是嘴角轻微上扬，还是眉头稍微挑了挑，抑或是那张苍白的美国人面孔上，不易察觉的微小波动——似乎对拉塞尔达说的“伙伴”二字，产生了某种微妙的反应。\n\n几分钟后，拉塞尔达弯腰站在浴室的洗手池前，冷水从脸上滴落。他凝视着镜中的自己，那可悲的身影映入眼帘——一个失去尊严、受尽羞辱与煎熬的傻瓜。拉塞尔达总统曾需要美国，而美国却并不需要拉塞尔达总统。"
 brazil_lacerda_world_tour.7.a: "拉塞尔达擦干脸，戴上眼镜，继续走过塔楼的走廊。"
 brazil_lacerda_world_tour.8.t: "世界"
 brazil_lacerda_world_tour.8.desc: "“就在那儿，是爱德华七世国王疗养院，德国人几乎把它改造成了堡垒——其实，这也算是个适合他们的地方。”克劳利的富裕议员彼得·霍登说道。他带领的小团体在这座雨滴斑驳的小镇上游走，队伍大部分是来自伦敦的政府官员，离伦敦三十英里远，拉塞尔达是这次活动的贵宾。\n\n“克劳利在‘43年夏季攻势中，确实经历了街头战斗。”霍登接着说，“坦克横扫了韦尔德……简直像是噩梦的场景。好了，我们去看看那块纪念牌吧，就在镇中心。”\n\n在郊外的绿意中，建筑工地若隐若现，雨水还未完全消散。尽管占领早已结束多年，拉塞尔达仍受邀来纪念那些当年试图阻止占领的巴西远征军士兵。一些来自圣保罗的士兵永远长眠在萨塞克斯的田野中，他们远离故土，为抗击法西斯主义而战。如今，已经解放的英国，作为希望的灯塔，向那些为国捐躯的烈士致敬。\n\n瘦弱的议员悄悄走近拉塞尔达，“我只想再次告诉您，拉塞尔达先生，您来参加揭幕仪式，我们真是感激不尽。”\n\n“这是我的荣幸。”拉塞尔达轻轻一笑，“我记得曾在报纸上读到过克劳利战役，读到过盟军英勇作战的事。这对我来说，意义重大。”\n\n“我听说您准备说几句话？您的英语真是太棒了，当然了。伦敦为那些巴西小伙子们立的雕像，真是个美好的举措；我也看过揭幕时的大照片——不过今天我们这块小小的铜牌，您可别介意。”"
 brazil_lacerda_world_tour.8.a: "“怎么会介意呢？我走在英雄们的足迹上。”"
 brazil_lacerda_world_tour.9.t: "拉塞尔达：多伦多的塔罗牌"
 brazil_lacerda_world_tour.9.desc: "在这个阴云密布的日子里，凉风刺骨地穿过卡洛斯·拉塞尔达的西装，让他深刻感受到自己身在何方，离家有多远。然而，当他看到那些未完工的摩天大楼旁的起重机，或是看到每一条街道上的车流如织，心中总会不禁涌起对故乡的怀念——想起自己曾经领导下的家乡，如何焕然一新，成为一座现代化的大都市。可惜的是，总理竟然连拉塞尔达邀请他在多伦多会面的提议都未曾回应。即便《环球邮报》允许他发布一篇关于巴西与加拿大合作的专栏，这份遗憾依然无法弥补。\n\n每当他在墨西哥或纽约旅行时，陌生人总会走过来告诉他，自己曾在报纸上看到过他的名字，或者说他们一直梦想着能去里约看看。但当他漫无目的地走在多伦多的街头时，却听不到任何嘲笑，也看不到人们转头的目光。无论“卡洛斯·拉塞尔达”在家乡意味着什么，在这里，他既不是伟大的改革者，也不是倒退的失败者。在这里，他什么也不是。\n\n躲避着寒风和冷漠的目光，拉塞尔达走进了一家冷清的咖啡馆。他点了一杯，八成的浓缩咖啡、一半的蒸奶，再加一点糖。他感受到杯中升腾的热气，轻轻抿了一口那平淡无奇的——但很可能是巴西的咖啡。服务员或许既不认识拉塞尔达的名字，也不记得他的面孔，但他仍然能够享受因自己为促进两国关系所做贡献而带来的回报。"
 brazil_lacerda_world_tour.9.a: "遗产，终将超越记忆。"
 brazil_lacerda_world_tour.10.t: "拉塞尔达在伊比利亚"
 brazil_lacerda_world_tour.10.desc: "拉塞尔达抵达里斯本时，他与一位市议会成员见了面。不知为何，这成了葡萄牙唯一愿意与他会面的政客。尽管如此，他依然对这次会面抱有一线希望，因为即使是一个微不足道的盟友，也能为他提供通向更重要政治人物的桥梁。然而，这份希望很快就破灭了。那位议员不仅对圣保罗的骚乱发表了尖刻的评论，而且喝得几乎与夸德罗斯一样多。显然，葡萄牙中肯定有能帮助拉塞尔达恢复全国民主联盟辉煌的人，但他很快意识到，这个人并不是这位议员。\n\n随着下午逐渐转向傍晚，拉塞尔达不禁叹了口气，承认今天又将毫无进展。回到酒店之前，他去了附近的一个公园，俯瞰着那座伟大的港口，目送一艘货船渐行渐远，消失在地平线的尽头。这就是卡布拉尔船长开始伟大航程的港口。拉塞尔达想象着，在发现巴西的前一天，航海家脑海中或许闪现的想法。经过数周的深海航行，他一定开始怀疑自己。恐惧感逐渐滋生，开始怀疑自己是否还能再次见到陆地。\n\n拉塞尔达胃中那股无望的感觉，正是卡布拉尔当时的感受。可如果卡布拉尔放弃，抛下了自己的责任，他和他的船员永远也不会抵达陆地。也没有什么“新大陆”的故事可以讲述，巴西也不会因此诞生。拉塞尔达也不能放弃。如果他现在就选择退缩，瓦加斯主义的胜利便会变得不可避免。自“新国家”体制倒台以来的二十年进步将被彻底抹去，热图利奥·瓦加斯的幽灵将再次笼罩巴西，带来暴政的压迫，腐败与堕落的阴影将重新窒息人民。不能让这样的事发生。拉塞尔达不能回家，至少现在不能。"
 brazil_lacerda_world_tour.10.a: "他也有自己的“登陆点”要到达。"
