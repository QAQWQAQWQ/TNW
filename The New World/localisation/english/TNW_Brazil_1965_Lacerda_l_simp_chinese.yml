 brazil_lacerda.1.t: "拉塞尔达时代"
 brazil_lacerda.1.desc: "七点不到，新总统已经满怀期待地坐在了最高会议室的主座上。他不停抖动双腿。脑中反复排练站起身，和到场的部长们握手讲话的场景。那可都是巴西的救星啊，他如是想到。\n\n“先生们，客套话就不讲了。上任第一天，我想告诉各位：能进到这个房间说明你们都很优秀，要有这样的心态。”此言一出，财政部长埃利奥·贝尔特朗和外交部长瓦斯科·莱唐·达·库尼亚双双鼓起掌来。总统面带微笑地摆了摆手。\n\n“首先是瓜纳巴拉的建设问题。今晚我就想初步讨论一下，正好马加良斯州长从里约赶来，我希望财政部长和副总统也一同参与。”维尔吉利奥·塔沃拉点了点头，“然后是公路，在座的都读过我的专栏吧，”这句话引起阵阵哄笑，“我的想法都写在上面了。告诉民众，只要公路接通一座城镇，项目就彻底结束。”贝尔特朗用力地点了点头。\n\n“第三件事，调查瓦加斯。我们大方针的一部分就是为未来扫清道路，因此我们要尽快揭露瓦加斯分子的罪行。”这时，塔沃拉不安地打断了他。\n\n“总统先生，瓦加斯这事是不是有点急了？社民党和工党还在国会里，他们说不定会使绊子。”\n\n“所以我才说要尽快。”拉塞尔达马上反驳道，“虽然我们有主动权，但是我们必须摆明，我们是认真的。谢谢各位，时间就是关键。”\n\n副总统加入了门口的人群，不禁怀疑起自己的傲慢，现在他明白了：拉塞尔达的确是认真的。"
 brazil_lacerda.1.a: "自由火炬熊熊燃起。"
 brazil_lacerda.2.t: "结束了，吗？"
 brazil_lacerda.2.desc: "古拉特的庄园堪称壮观：庄稼连片，牲口遍地，中间还有幢大房子。布里佐拉今天来做客，这是古拉特家的大日子。意大利菜的香气从厨房里飘出，孩子们嬉笑打闹，布里佐拉和古拉特正等着上菜。\n\n“居然是他赢了。”布里佐拉说着，喝了口啤酒，“本来这个总统该由你当，可惜选民另有他想。不过我们联手，可以让他政令不出总统府。派媒体穷追猛打，直击要害！搞新闻我还是在行的。”\n\n“你别这么激动，我看还是等等，他早晚要闯祸，你这么一折腾反倒适得其反。”两人边喝边说。他们知道，拉塞尔达肯定会给巴西乃至全世界带来大麻烦。\n\n“上菜了！”二人聊得正火热时，玛丽亚端着热气腾腾的饭菜走了过来。现在该把政治放到一边，好好欣赏美景，享受美食了。"
 brazil_lacerda.2.a: "斩断鸦翼。"
 brazil_lacerda.3.t: "重建天堂"
 brazil_lacerda.3.desc: "当选的狂喜渐渐褪去，取而代之的是身为总统的重担。卡洛斯·拉塞尔达必须不负巴西好儿女寄予他的厚望，其中最重要的当然是改善生活质量，提供更好的环境。以此作为回馈里约老乡的第一步，岂不善哉？\n\n拉塞尔达站在讲坛上，揭晓了改造里约热内卢的宏大计划：激发活力、修葺街道，还要组织大规模的投资活动。他描绘了一幅目标崇高、志向远大的图景，但被忽视的贫民窟却如阴影一般挥之不去，与这光鲜亮丽的绘图形成了尖锐的对比。\n\n在里约之心，在这命运的讲坛上，承诺与雄心的舞台已经搭好。观众们站在辉煌未来的许诺和未竟之事的回响之间，沉默不语。"
 brazil_lacerda.3.a: "放眼明日里约。"
 brazil_lacerda.4.t: "记者的戏法"
 brazil_lacerda.4.desc: "“圣保罗——乌鸦又使出了惯用伎俩，贪婪吮吸着全体国民的血汗。我们还能指望这头嗜血禽兽有何新意？所谓‘成立真相委员会调查瓦加斯罪行’，不过是对无辜者的猎巫审判。\n\n此獠关于真相委员会的演说，与三四十年代德国纳粹的蛊惑如出一辙！巴西同胞们，难道你们真的希望任由这只阴魂不散的乌鸦，将我们的国家带离瓦加斯的伟大梦想，带离那份关于自给自足、工业腾飞、巴西崛起的蓝图？\n\n他诬称瓦加斯是暴君。我要向所有人揭穿，这不过是贼喊捉贼的伎俩——乌鸦的所作所为，正是他强加于瓦加斯的罪名。我们巴西人民岂能受此妖魔摆布？切莫忘记他担任州长时对贫苦百姓的暴行！\n\n若非他当年遇刺后背叛友人，引发推翻瓦加斯的政变，巴西本可成就更伟大的未来。他对瓜纳巴拉州犯下的罪孽，必将重现在整个巴西。他的权力根基全系于民意，而我将确保所有罪行曝光于世——乌鸦永无展翅之日！”"
 brazil_lacerda.4.a: "《最后时刻报》，[?global.date.GetDateStringNoHourLong]"
 brazil_lacerda.5.t: "头版新闻"
 brazil_lacerda.5.desc: "“你知道吗？你这样做会毁了我们。”塔沃拉追赶着拉塞尔达的步伐，踏在原《清晨邮报》总部的奢华地毯上，经过一面面天鹅绒墙壁。拉塞尔达根本不想让他跟着，而塔沃拉也没打算请示，硬生生插进了总统的随行队伍。\n\n“好好想想，为什么反对派会闹得沸反盈天？为什么他们如此愤怒，恶语相向，到处制造恐慌？”拉塞尔达嘴角挂着笑意，几乎压抑不住心中的激动。“这一切和他们口口声声保护的民众毫无关系。如果他们真是光明磊落，又何必如此恐惧？”\n\n“因为他们怕你滥用权力？”\n\n“我不想听你为那些无赖辩护。”拉塞尔达的耐心在这里已经耗尽，塔沃拉的软弱令他不屑。正是这栋楼里，拉塞尔达曾刊登了一篇对若泽·阿梅里科·德·阿尔梅达的专访，成功诱使瓦加斯的昔日盟友发表猛烈抨击新国家体制的言论，那是瓦加斯审查制度走向终结的开始。\n\n但现在，拉塞尔达必须完成这一使命。瓦加斯不是一个人在战斗，许多昔日的爪牙仍然盘踞高位，从未为他们的恶行付出代价。\n\n“你不明白？你会毁了我们的。”塔沃拉再一次提醒，但拉塞尔达已不屑回应。他们走上阳台，站在酒店新古典主义风格的外墙前，俯瞰下方狭窄的戈梅斯·弗雷雷大道。大街上挤满了活动人士、学生和记者，拉塞尔达甚至认出了几位《清晨邮报》的旧员工，他们的新办公室就在不远处的街角。拉塞尔达整理了领带，向人群挥了挥手。"
 brazil_lacerda.5.a: "他得去做一场胜选演讲。"
 brazil_lacerda.6.t: "无足轻重的头条"
 brazil_lacerda.6.desc: "“你差点就毁了我们，你知道吗？”塔沃拉凑到拉塞尔达身边，他正坐在昔日《清晨邮报》总部改建成的三星级酒店套房里，神情凝重地出神。拉塞尔达正琢磨着如何对外面汹涌的人群发言，连瞥都没瞥副总统一眼。\n\n“不能让我安静一会儿吗？你已经得到你想要的了。”拉塞尔达挤出一丝嘲讽的笑意。\n\n“也许这是个让你喘口气的机会。只要你能继续得到民众的支持，我们就能有时间与不公抗争。”塔沃拉的劝说声让拉塞尔达的耐心几近耗尽，这种时刻，他已不再愿意听这些空洞的劝慰。\n\n当年正是在这栋楼里，拉塞尔达曾刊登了一篇对若泽·阿梅里科·德·阿尔梅达的专访，成功诱使瓦加斯的昔日盟友发表猛烈抨击新国家体制的言论，那是瓦加斯审查制度走向终结的开始。而如今，时光荏苒，他已身居总统高位，瓦加斯的爪牙却依旧盘踞权力中心，从未为过去的恶行承担责任。这些人究竟还要躲避正义多久？\n\n“我好不容易稳住了内阁，而你，随时可能让我们一败涂地，你知道吗？”塔沃拉一边笑着，一边伸手扶拉塞尔达起身。窗外喧嚣不断，抗议声与口号此起彼伏。法案的失败反倒激起了支持者们更高昂的斗志。\n\n拉塞尔达让塔沃拉把他拉了起来，或许他是对的，这不是急于一时的战场。他们一同走上阳台，迎面而来的热浪夹杂着群众的呐喊声。下方狭窄的戈梅斯·弗雷雷大道上，挤满了激动的活动人士、热情的学生和辛勤的记者。拉塞尔达认出了几张熟悉的面孔，那些是《清晨邮报》的旧员工，他们的新办公室就在不远处的街角。拉塞尔达整了整领带，平静地挥了挥手，迎接人群的目光。"
 brazil_lacerda.6.a: "人们需要知道，他绝不会投降。"
 brazil_lacerda.7.t: "男人与他的工具"
 brazil_lacerda.7.desc: "拉塞尔达走上演讲台。一直以来，他总是在远处仰望着演讲台，将它视作高不可攀的位置。但今天，演讲台不过是一个工具，日常的工具，用来将舆论引导成他所希望的样子。今天，他要重塑舆论风向，让它顺应自己的政治议程。工作中对女性的歧视对女性有害、对巴西有害、对经济有害。所以他开始工作，走上讲台，利用它实现自己的意志。\n\n“今天，我在这里讨论的主题，是当代的巴西面临的问题之一。这一问题影响着我国的经济、我们的国家，以及半数以上的巴西人民。它阻碍了我国的发展与创新，损害了人民的生活质量，导致我国经济更加缺乏弹性，难以抵御冲击和风险。”\n\n“这个问题是什么？直到我走上这个位置，直到我亲眼看见这些数据，直到我的一位女下属向我提出了她的见解，我才真正意识到这一问题的危害。我说的这个问题，就是工作场所中对女性的歧视。我此刻站在这里，就是为了高举自由的火炬，创造一个全体人民所共享的、更美好的巴西。”\n\n“我提出的立法动议不仅能促进我国的经济发展，还能进一步促进我们这一半球的人权事业。歧视对商业是有害的，它在根本上是反竞争的，还否定了全体公民与生俱来的基本尊严。我们要为全体公民提供平等的竞争机会来充分发挥我们的潜能。这就是我志在打造的巴西。”\n\n他挥着手，对着记者们微笑。他能从记者的表情上看出来，他的演讲再一次切中了塑造崭新巴西的又一个要害。"
 brazil_lacerda.7.a: "他总是知道怎么塑造民意。"
 brazil_lacerda.8.t: "谈话"
 brazil_lacerda.8.desc: "OFN的旗帜在美国大使馆前迎风飘扬，几英里外清晰可见。林肯·戈登坐在办公桌前品着咖啡，静候一位重要的来客。不多时，巴西外交部长瓦斯科·达·库尼亚的身影出现在了走廊上。戈登刚喝完咖啡，一阵“咚咚”声便紧接着响起，他连忙起身开门。\n\n“戈登先生，幸会幸会。”\n\n戈登用力地同外交部长握了握手。“请坐吧，达·库尼亚先生。”\n\n戈登办公室的陈设十分正式：桌子两侧分别摆放着美国和巴西的国旗，墙上还挂着两国元首的照片。“我没猜错的话，您是想加深与OFN的合作吧？”大使说得很对，下一秒，达·库尼亚就滔滔不绝地谈论起了巴西与OFN合作的潜在好处。\n\n“您大可放心，达·库尼亚先生。在这件事上，我和您的看法是一致的。”大使笑着说道，“在这个充满黑暗的世界里，巴西就如同一盏耀眼的自由明灯。”\n\n话题很快转移到了如何保护巴西免受团结协定和共荣圈的影响上。“戈登先生，相信有了您的帮助，巴西就不会在两面夹击下沦为法西斯主义的受害者。我们绝不会步南方邻居的后尘。”"
 brazil_lacerda.8.a: "自由的微光在黑暗中闪耀。"
 brazil_lacerda.9.t: "拉普拉塔河彼岸"
 brazil_lacerda.9.desc: "最高会议室笼罩着反常的寂静。拉塞尔达就任刚满一周，仍不习惯四人决策小组的会议模式。外交部长莱唐·达·库尼亚与战争部长戈尔贝里·多·科托-席尔瓦分坐长桌两侧，身旁的卡斯特洛·布兰科将军正襟危坐。他们需要厘清战略方向。\n\n“关于阿根廷，”拉塞尔达用钢笔轻敲记事本，“时间、动机、手段——瓦斯科，你先说。”\n\n“感谢总统先生。”达·库尼亚翻开文件夹，“自瓦加斯时代起，这个专制堡垒就盘踞在我们后院。它是条复仇主义的疯狗，对邻国虚构领土主张，控制南大西洋航道与比格尔海峡。自本世纪起，其国势日衰，政客惯用对外侵略转移矛盾。显然，他们严重威胁巴西利益。”\n\n“你指的是巴拉圭和玻利维亚问题？”总统挑眉。\n\n“不止于此，”多·科托-席尔瓦接话，“他们在巴拉圭扶植法西斯政权，资助圣克鲁斯叛军，还用庞大军队威逼智利和乌拉圭领导人。他们处于暴君圈的核心，渴望输出自己的侵略主义意识形态来巩固地位。”\n\n“最终都指向日耳曼尼亚。”拉塞尔达停顿片刻，目光失焦。\n\n“所以我们需要华盛顿介入。”达·库尼亚插话。总统颔首时，布兰科将军却缓缓摇头。\n\n“不能全指望美国人，总统先生。军方普遍认为，捍卫自身利益是巴西的义务——毕竟我们受影响最深，也最有能力反击。阿根廷每进一步，我们就必须跟进一步。”"
 brazil_lacerda.9.a: "南美大国间，江水寒风起。"
 brazil_lacerda.10.t: "瓜纳巴拉的巫师"
 brazil_lacerda.10.desc: "“亲爱的，我真希望我能做到。”拉斐尔·马加良斯无意识地用手指缠绕着电话线。“如果我能抽身而退，我一定会毫不犹豫地飞奔到你身边。但无论是在瓜纳巴拉还是在总统府，我必须留在拉塞尔达的身边。是的，我知道，我也想你——”\n\n办公室的门忽然被推开。马加良斯立即坐直，勉强摆出一副公事公办的模样，却不慎把电话线缠在手指上，电话被猛地扯到了桌子的另一端。“我待会儿再打给你，亲爱的。”他挣脱缠绕，将话筒匆匆放回座机。“卡洛斯，我的朋友！什么风把你吹来了？”\n\n拉塞尔达直接坐到椅子上，神情凝重。“我们一直在用错误的方式处理问题。是热图利奥的爪牙，那些旧党的余孽，渗透在政府的每一个角落。不只是国会，还有整个官僚体系！通过法案又有什么用？只要有一个瓦加斯主义者在旁边阻挠，拖延，漠视法律，甚至扭曲法案的初衷？”拉塞尔达重重拍了拍桌子，不给马加良斯留任何插话的空隙。“拉斐尔，我们必须采取强硬措施！清理掉公务系统中的瓦加斯主义者，就像清理那些腐烂的水果，换上正直且有能力的人！”\n\n“卡洛斯，我的老朋友。”马加良斯勉强笑了笑，“先冷静下来，深呼吸。”\n\n“我——”拉塞尔达顿了顿，疲惫地低下头，肩膀微微颤抖。“抱歉，我太激动了。但只要一想到这些瓦加斯主义者会——”\n\n“没事的。”马加良斯走到桌子的另一边，靠近拉塞尔达，一只手安慰地搭在他的肩膀上，另一只手从容地抽出一个文件夹。"
 brazil_lacerda.10.a: "“正好，我已经在起草相关计划了。”"
 brazil_lacerda.11.t: "双城记"
 brazil_lacerda.11.desc: "拉塞尔达始终认为这是个荒谬的地方。他的目光被地图中西部那颗小星星吸引——那是他此刻所在之地，从荒原中拔地而起的新都。他无法否认设计者的巧思，亦不能抹杀建设者的热忱，但内心深处总有个声音在说：倾尽所有建造巴西利亚，不过是为了上演一出廉价的政治作秀。\n\n最可悲的是，拉塞尔达望着窗外鳞次栉比的建筑工地暗想，库比契克和洛特连这场戏都没能唱完。仍有几个部门像候鸟般栖在里约的枝头，迟迟等不到迁往新巢的时机。施工进度永远在延期，整个政府不得不通过电话与千里之外的行政中枢沟通，重大决策总被时空的裂隙吞噬。总统想到这儿怒从中来：这个国家的政府正被活生生劈成两半，大脑的两个半球相隔一千公里。\n\n理性如晨钟敲醒了他：自己此刻端坐总统府，完全有能力用一纸政令终结这场荒诞剧。这座暮色中的新都，不过是等待解决的诸多难题之一。他起身抓过钢笔，大步走向墙上的巨幅地图。\n\n笔尖在巴西利亚与里约热内卢之间划出蜿蜒的虚线，仿佛看见龟裂的公路在尘土中呻吟。若对里约进行现代化改造，铺设通讯网络，建立快速通道，用行政手段缝合时空裂隙，或许能让双城记勉强运转。笔锋在里约上空悬停片刻，总统突发奇想：何不彻底抹去这个坐标？只要冲破官僚主义的桎梏，加速建设进度，就能替前任完成那半途而废的迁都大业。"
 brazil_lacerda.11.a: "若无法抛开巴西利亚，那就让它成为真正的首都。"
 brazil_lacerda.11.b: "里约和巴西利亚虽相隔千里，但必须一视同仁。"
 brazil_lacerda.12.t: "究竟承诺了什么？"
 brazil_lacerda.12.desc: "“总统先生，那么……我们该用什么角度来应对委员会？”\n\n拉塞尔达沉默了片刻，心中萦绕着即将登台演讲的紧迫感，时间仅剩三小时。他们究竟该从什么角度切入？这个问题确实值得深思。究竟是要肃清巴西的瓦加斯主义，还是彻底根除腐败？\n\n总统发起的总调查委员会计划，目标是打击官僚系统中无形却强大的腐败，这种看不见的霉菌正侵蚀着巴西的根基和支柱。腐败的根源可以追溯到帝国时期，经由瓦加斯的助长和后来的不作为逐渐蔓延。面对这样的局面，他该如何在这个调查和铲除腐败的委员会前发言？\n\n一方面，瓦加斯主义是个巨大的威胁。如果不能将这种意识形态从国家体制中连根拔除，它将如毒瘤般吞噬整个系统。将瓦加斯主义从公务员的思想中清除出去，这本身就已是一场胜利。\n\n但另一方面，腐败的问题已蔓延至巴西的各个层面。无论在哪个阶层或职位，总有人在暗箱操作，行贿受贿、误导、威胁、蒙骗。这不仅仅是某一个意识形态的问题，而是整个政治生态的毒瘤。更何况，巴西急需一个公正、可信的机构来治理这一切。\n\n撰稿人焦急地注视着拉塞尔达，而他也明白，此刻他需要给出一个清晰明确的答案。"
 brazil_lacerda.12.a: "“腐败是一个普遍存在的问题，而调查委员会才是全面的解决方案。”"
 brazil_lacerda.12.b: "“瓦加斯危害国家久矣。我们的政府就是来打扫卫生的。”"
 brazil_lacerda.13.t: "深浅不同的蓝"
 brazil_lacerda.13.desc: "“这份议案……”马加良斯和他的团队一直在避免谈论这份法案，但在几分钟艰难的心理斗争后，他最终还是放弃了抵抗。他看向餐厅的前方，希望能稍稍缓解一下他的尴尬。\n\n“谈谈这份议案吧，马加良斯？”塔沃拉的提问看似无害，实则笑里藏刀。他好奇地看的了一眼自己的议会朋友们在吃什么，然后就又低头吃起了自己的公务餐。\n\n“因为这份议案只会是一场灾难。而且，我知道你们中有人会在下一节里写上‘波萨诺瓦派’之类的字眼，但这也无关紧要了。你们不能给那些忠于职守的立法者施加这么大的压力，太荒唐了！”\n\n“没有人会提到波萨诺瓦，马加良斯。”实际上，埃尔贝托·莱维确实这么做了。一半的原因是为了将其与党内的平托派系联系起来。“我觉得你们多虑了。拉塞尔达是很明智的人，他不会像你们担心的那样在议会里大开军事法庭。我们该做的不就是兑现反对腐败的承诺吗？我们必须保持坚定。”\n\n“要是到时候报纸上印着‘乌鸦吓跑了’，那就很尴尬了，不是吗。”塔沃拉的话把平托逗乐了。“坚定是好事，但也得看时机。现在不是递交这份提案的时候，如果我们把其他反对党逼得太死，他们就会串联起来，到时候我们就没有完全的胜算了。”尽管如此，他在心底还是不得不承认，莱维可能是对的。"
 brazil_lacerda.13.a: "箭在弦上，不得不发。"
 brazil_lacerda.14.t: "变革之风"
 brazil_lacerda.14.desc: "“莱维先生！我们的大明星！”埃尔韦托·莱维几乎从没见过自己的领导这么高兴的样子，他正激动地摇着自己的扶手椅。\n\n“总统先生，您才是最受瞩目的那一位啊。”莱维的回答简直像是慌忙地为自己开脱。他们都愉快地笑了起来。《治理标准法案》在议会得到了足够的赞成票，即将正式成为法律，这是拉塞尔达的领导和莱维的游说共同缔造的成果。那些动用种种非法手段阻挠全民盟改革计划的敌人和滥用权力的议员将受到审查。在莱维看来，他们本来就罪有应得。\n\n“你知道的，”拉塞尔达望向远处的地平线，说：“1949年，当瓦加斯和他的爪牙试图杀掉我的时候，我深刻地意识到了一点。命运终将带来正义，这便是我所知的天意。他们过去试图消灭我的尝试，现在却成了束缚他们自己的镣铐。这座城市啊，”他抬起手，扫过眼中映照的天地，“它的座右铭是‘疾风将至’。今天，你和我一起取得的成就，就是那股将我们导向正道的疾风，带我们驶向进步、先进的巴西。”\n\n“我们已经走过了很长的路，”莱维点了点头，表示赞同，“放在十年前，如果您说我们会站在这里，我只会劝你再来一杯鸡尾酒。未来五十年，人们都将铭记这一天——我们的国家粉碎瓦加斯主义的束缚的这一天。”"
 brazil_lacerda.14.a: "他们仿佛已经听见了天边呼啸的风声。"
 brazil_lacerda.15.t: "一瞬机遇"
 brazil_lacerda.15.desc: "拉塞尔达拖着沉重的步伐，从高原宫入口大厅走向总统办公室。他实在没法在这场耻辱性的大败后继续假装冷静了。他在笔记本上潦草地记下那些他要叫来问责的人。毕竟，《治理标准法案》是他们治国理政的一次考核。它的失败，就是他们的失败。\n\n但接下来怎么办？他抬起头来，望向池中粼粼的波光。不，他得想想办法。他承诺要扫清腐败，而且他必须做到。召开新闻发布会？和报社沟通？还是重新确定他的立场？\n\n他再次望向窗外，看着水面的波纹。在水面的反射下，闪烁的波光映入他的眼中。等一下，他有注意了。虽然这份法案没能通过，但它依然能像水面一样反映出国会众人的真面目。每个尝试破坏这项法案的议员之所以会这么做……是因为他们害怕了。他们背后有见不得光的东西——那就是他们在这个国家的首都巴西利亚犯下的罪行。\n\n总统释然地笑了。我可太谢谢你们了，王八蛋们。你们自己露出了马脚，现在是该让你们自食其果了。"
 brazil_lacerda.15.a: "无论如何，这份议案总会在法律上发挥该有的作用。"
 brazil_lacerda.16.t: "梦想终结"
 brazil_lacerda.16.desc: "“巴西同胞们，我很高兴宣布，吞噬资金的跨亚马孙公路工程就此终止。我们曾耗费无数克鲁赛罗，只为在我国最荒凉的地区修筑一段毫无经济价值的公路，这不过是瓦加斯主义的空想。正如我在竞选时承诺的，从今天起，我们不再将宝贵资金投入无底洞，而是要把钱花在真正需要的地方！”\n\n某处工棚里，几十名工人听着拉塞尔达总统的广播，他们毫无预兆地被告知工程终止。未等广播里沙哑的尾音消散，施工队已开始解散。有人垂头丧气地收拾行囊，更多人茫然四顾，不知前路何方。几小时后工头正式宣布解散，营地彻底人去楼空。印着日立字样的挖掘机、平地机和伐木机大多被遗弃，只有少数保养精良的昂贵设备沿着已完工的短促路段撤离。\n\n最后一批工人离开数日后，暴雨冲垮了摇摇欲坠的工棚，废弃机械深陷泥潭，齿轮引擎永远被黏稠泥浆封存。\n\n一周后，亚马孙部落的少年偶然闯入这片废墟。棚屋倾颓，机械深埋，野草嫩芽已从泥泞中探头。少年好奇地翻检着外来者遗留的残骸，新生枝叶在他脚下悄然蔓延。"
 brazil_lacerda.16.a: "一个月后，这里将回归原始。"
 brazil_lacerda.17.t: "弗雷雷的第一天"
 brazil_lacerda.17.desc: "拉塞尔达走出总统座驾，和他的两位顾问一起闲庭信步地走在政府过道上，就像个送小孩上学的家长。他的左手边是保罗·弗莱雷，他是一位富有同情心的左翼活动家，也是拉塞尔达的文盲问题特别顾问，他强撑着苦笑跟在拉塞尔达身后。在右手边，是弗莱沙·里韦罗，这位前途无量的年轻公务员是拉塞尔达的门生和支持者，并将担任他的教育部秘书。\n\n“早上好，吉尔贝托。我给你带来了几位新学生。”他对新任教育部长招呼道。三人都有些拘谨地笑了笑。吉尔贝托·弗雷雷长吸一口烟斗，坐在桌后和善地和几人握手。但作为交换，眼前的几个人终究不是他的学生。他的教育生涯已经结束了，但很显然，他依然需要助手。他艰难地从桌子后挪出来。\n\n“谢谢您，总统先生。您任命我来主持实现我们党的愿景，我感到不胜荣幸。”听着吉尔贝托的话，拉塞尔达和里韦罗都笑了。弗雷雷礼貌地看着他们，说：“我相信各位都同意，今天我们最大的问题是身份认同问题。我们国家已经偏离了建国时提出的温和葡萄牙文化观，但我认为我们有机会扭转它。老话说得好，笔比剑更有力量，教育可以实现很多东西。我希望我们能齐心协力，为了让巴西成为和谐而自豪的多种族多文化国家而奋斗。”\n\n“……嗯，很不错，”拉塞尔达回应道，他的笑容中有一丝惊讶。“啊，我现在要去高原宫了，祝各位万事顺利。”走出办公室时，拉塞尔达拍了拍里韦罗的背，示意他看看那张工作清单。拉塞尔达希望所有人都能明白他的意图。"
 brazil_lacerda.17.a: "别让他越界了，弗莱沙。"
 brazil_lacerda.18.t: "希望渐现"
 brazil_lacerda.18.desc: "若昂是一名普通的教师。在乡下，教书育人并不是一份简单的工作，他常常觉得自己无法胜任。大城市里的生活虽然给了他一些管理时间和金钱的经验，但放在当下仅仅是杯水车薪。学校几乎拿不到一分钱，他只能想办法东拼西凑一些资源。\n\n回家的路上，若昂精疲力尽，心如死灰。“学校天天亏损，再这样下去，怕是要倒闭了。”他自言自语道，泪水差点夺眶而出。\n\n他走着走着，回到了家，那不过是一间简朴的小屋，堪堪够自己和妻子居住。“晚饭做好了，亲爱的！”妻子走出厨房，面带微笑，可这份笑容也难以弥补若昂内心的失落。“我听说拉塞尔达要通过新的教育法案，说不定以后学校就有钱了。”\n\n若昂听完，双眼又一次湿润了，但这次是因为希望。他简直不敢相信，难道自己一直错看了拉塞尔达吗？他从未对这个人抱有任何期待，然而现在，这个人却要给他的学校提供资金。吃完晚饭，若昂躺在床上，他第一次觉得巴西的未来会更好。"
 brazil_lacerda.18.a: "为何要怕一只好乌鸦？"
 brazil_lacerda.19.t: "可喜可贺"
 brazil_lacerda.19.desc: "热情的敲门声和真诚的笑容来到了今晚弗雷雷的办公室门前。拉塞尔达从总统府径直来到他阁员的办公室，只为和他一起庆祝。他手里拿着香槟：“恭喜，弗雷雷！”\n\n“啊，您太客气了。这份议案有各方面的大力支持，是肯定能通过的。”这份本来就没有什么阻力的法案成功通过，居然让拉塞尔达亲自上门来祝贺他，这让弗雷雷感觉有些尴尬。\n\n“你没意识到吗，弗雷雷？这能提高我们的多少支持率啊！也别忘了，毕竟，这份法案或许会成为在巴西建立真正的民主制度的第一步。毕竟，连字都看不懂的人投的票怎能代表真正的民意？”\n\n总统的话让弗雷雷安心了一点：“确实，我是相信这份议案能够顺利通过的。但它真正成为法律时，我又有了截然不同的感受。巴西必将成为一个更美好的地方。”两人坐下来，一边喝着香槟，一边又讨论起了其他的事务。"
 brazil_lacerda.19.a: "选票取决于笔尖。"
 brazil_lacerda.20.t: "举目皆愚"
 brazil_lacerda.20.desc: "在卡洛斯·拉塞尔达的政治生涯中，他无数次怀疑自己是否已经接近崩溃，但这一次的打击几乎让他彻底陷入疯狂。几分钟前，他的秘书埃丝特小心翼翼地告诉他，全国扫盲法案竟然在参议院没能通过。这消息如同晴天霹雳，让他深感震惊。\n\n他的脑海中飞快掠过各种可能的原因，这样一个备受欢迎的法案，竟然会在国会失利？这可是要帮助民众识字的扫盲法案，到底是什么阻挡了它的通过？是阿德马尔的阴谋作祟？私人恩怨？还是他的政府真的如传言那般，充斥着一群无能的废物，根本干不出任何有意义的事情？他实在无法接受这个结果。\n\n“先生，您还好吗？”埃丝特小声问道，眼看着拉塞尔达的神情越来越阴沉，她不由自主地往办公桌外退去。拉塞尔达只是茫然地摇了摇头，站起身，随手拿起外套披在肩上。今天，他实在没有力气再对她发脾气了。他走到门口，忽然回头望了她一眼，竭力压抑着声音里的疲倦和失望。"
 brazil_lacerda.20.a: "“我要回家睡一觉，埃丝特。别让任何人联系我。”"
 brazil_lacerda.21.t: "新课程"
 brazil_lacerda.21.desc: "学生们鱼贯而入时，布鲁娜正翻看着今晨出现在她办公桌上的新教案。几个少年好奇地打量着文件夹封面上醒目的教育部钢印。她从案卷中抬头时，正撞见学生们交头接耳的兴奋模样，不由得因临阵磨枪备课被撞破而面颊发烫，终于忍无可忍地喝道：“都坐下！安静！”\n\n“教育部新版历史课程大纲\n\n4.2.1 瓦加斯时代——新国家体制\n\n学生应学习热图利奥·瓦加斯通过1937年政变建立的新国家独裁体制，及其对民主改革的全面废止，特别是取缔所有政党的举措。需讲解科恩计划的作用及法团主义经济体系。学生应理解法西斯德国与意大利对国家意识形态的影响，及其与民众关系的转变。同时需对比瓦加斯统治与墨索里尼政府模式的异同。教师必须明确指出新国家政权是独裁统治，是对巴西早年民主传统的背离。”\n\n忧心忡忡的历史教师感到困惑。今天的课堂提问会很有趣，她心想。瓦加斯政权真与意大利相似吗？至少在她记忆中并非如此。她几乎能预见放学后，当家长们听到“瓦加斯”与“法西斯”出现在同一句话中会如何暴跳如雷。整套教案都透着教育部那些刚愎自用的规划者天马行空的臆想——他们显然从未征询过一线教师的意见。标准化教育不过如此，布鲁娜想着，将视线转回躁动不安的学生们。\n\n“讲课之前，先把今天的标题记下来——新国家体制……”"
 brazil_lacerda.21.a: "一堂令师生共同困惑的课程。"
 brazil_lacerda.21.b: "巴西历史终获真相。"
 brazil_lacerda.22.t: "钱少时间紧"
 brazil_lacerda.22.desc: "弗雷雷趴在办公桌上，目光紧锁在眼前的简报上。台灯的强光刺得他眼睛隐隐作痛。桌上摊开的三份计划书内容相互矛盾，而他的任务是将大学系统提升至世界一流水平。可他手头的预算却令人头疼，不仅数额有限，还被红笔划上了多处强调的标记。更何况，这一改革还被压上了紧迫的时间表。这个部门在新闻媒体上能占据的版面有限，他必须得迅速拿出一个有效的方案。\n\n其中有两项计划格外引人注意，虽然都显得有些浮夸。第一项是创建更多的“工程学院”，通过这些专业学校，培养新一代工人所需的技能，以增强国家的工业竞争力。机械化正如火如荼，眼下正是大力推进的最佳时机，弗雷雷心想。\n\n然而，他和改革派更倾向于大幅增加奖学金名额。他们设想由国家资助，提供数万个新名额，尽量减少贫困对教育的阻碍。虽然这一计划从长远来看成本更高，但在大学普遍带有精英主义色彩的现状下，这一措施显然更具社会意义。\n\n尽管拉塞尔达坚决支持维持大学私立收费的做法曾令弗雷雷颇为反感，但他不得不承认，这种方式可能值得保留，因为它可以保持大学体系的简洁与低成本，同时扩展现有的教育资源。\n\n弗雷雷沉思片刻，手中的笔轻轻敲打桌面。几分钟后，他决定明早在部门会议上阐述自己的选择——"
 brazil_lacerda.22.a: "工程学院。蓬勃发展的工业需要相匹配的技术培训。"
 brazil_lacerda.22.b: "奖学金名额。我们得减少贫困。"
 brazil_lacerda.22.c: "做事要稳妥，扩建大学。"
 brazil_lacerda.23.t: "民主为学生"
 brazil_lacerda.23.desc: "全国学生联盟是巴西瓦加斯主义最后的几个堡垒之一，它在高等教育界的影响力让拉塞尔达相当头疼。他一直在构思着切断全国学生联盟资金来源的计划，现在正在等弗莱沙·里韦罗来的拉塞尔达也是如此。他的手指不耐烦地敲打着桌面。\n\n里韦罗推开门，走进了拉塞尔达的办公室。在总统的示意下，他关上了门。“我将宣布改组全国学生联盟的计划，在民主学生联盟成立后，我将削减……不，彻底切断他们的资金来源。”\n\n“这有些太理想化，太快了。这种级别的改革势必会激怒学生，没法顺利推行下去的。”\n\n“那应该怎么做？”拉塞尔达盯着里韦罗。\n\n“先成立民主学生联盟，让它挑战全国学生联盟的地位。然后逐步提高民主学生联盟的预算并削减全国学生联盟的预算。最终，意识到这是唯一可行选项的学生们就会转投民主学生联盟。”拉塞尔达点了点头，“民主学生联盟的扩张将会挤掉全国学生联盟最后一丝呼吸的空间。这个过程不会很快，但只要那些顽固分子负隅顽抗的时候得不到任何学生的支持，那就无异于整个组织的死亡。”他站在拉塞尔达面前，等着他的回应。拉塞尔达则揉了揉自己的下巴。\n\n“我看行。”拉塞尔达赞同地说，这让里韦罗长舒一口气，“开始准备吧，我会和贝尔特朗谈谈建立民主学生联盟的经费问题。是时候开始工作了。”当拉塞尔达拿起桌上的电话，开始拨号时，里韦罗已经离开了房间。"
 brazil_lacerda.23.a: "民主要从学生抓起。"
 brazil_lacerda.24.t: "学生骚乱"
 brazil_lacerda.24.desc: "总有一天，拉塞尔达想，他能在不激怒另外半个国家的前提下通过一份完美、明智的立法，但显然不会是今天。他懒洋洋地扫视着关于学生骚乱和激进的学生占领校园的报告，感觉自己又老了五岁。“就为了个失败的联盟？”他怀疑地问着自己的顾问。\n\n盖泽尔疲惫地点了点头，表示同意：“这确实是个棘手的问题，但也很好解决。只要驱逐学生，把最重要的头目关进监狱，就差不多了。”这确实是一个很有吸引力的建议，简单但有效。但坐在盖泽尔对面的弗莱沙对此嗤之以鼻。\n\n“你不觉得，更稳健的做法应该是……倾听他们的诉求吗？他们的诉求并不过火，也许他们只是希望得到公平的对待。”这也是个简单的选择，但今天让出一寸，谁能保证明天他们不会再进一尺？\n\n“总统先生，这些做法都把问题复杂化了。”弗雷雷说道，“也许，最合理的做法是……和更多的意见领袖沟通，让他们知道我们能给他们什么好处，以及拒绝我们的后果。挨个当面谈。”拉塞尔达鄙夷地瞥了他一眼。他的治下绝不容忍一丝一毫的腐败。那么，能考虑的只有盖泽尔和弗莱沙的方案了。"
 brazil_lacerda.24.a: "“很好，弗莱沙，组织会面吧。”"
 brazil_lacerda.24.b: "“开始行动。”"
 brazil_lacerda.25.t: "卡琵莉亚与沉思"
 brazil_lacerda.25.desc: "教育部新报告付梓当晚，高原宫的走廊里洋溢着胜利的喜悦。部长们与欢欣鼓舞的公务员们互相打趣说笑——他们终于有了值得称道的政绩。拉塞尔达却避开喧嚣的庆典，选择与项目团队低调庆功，人手一杯卡琵莉亚鸡尾酒。毕竟，如此耀眼的成就并不常有。\n\n“说实话我很惊讶，”乌鸦放下酒杯开口道，“计划竟能如此完美落地。看看你们三位，弗雷雷和弗莱雷除了名字相近，居然还能心有灵犀！”他顿了顿，看着众人交换尴尬而不失礼貌的微笑，“虽是陈词滥调，但事实如此。多亏诸位——当然还有里贝罗——我们证明了要修复民主，不是靠对文盲视而不见，而是靠扫盲教育。天呐，古拉特此刻定嫉妒得发狂，后悔没能抢先招揽你们。”\n\n“总统先生，我只是尽本分而已。”弗莱雷挂着苍白的微笑简短回应，“用我的方式为巴西尽绵薄之力。若祖国需要我的双手，自然义不容辞。”\n\n“行了保罗，”吉尔贝托·弗雷雷咧着满口白牙，朝这位眉头紧锁的“准同名者”揶揄道，“只要你不给敌人递刀子，咱们就是一条船上的人。”里贝罗在一旁微笑旁观，庆幸自己能参与其中。\n\n拉塞尔达的目光再次扫过众人的脸庞。不同的出身、年龄、经历与信仰，正如他对巴西人民的期许——他们超越了分歧（至少大部分时候），携手共进。他们守护秩序，推动进步。若所有问题都能如此迎刃而解，前路将再无阻碍。\n\n里贝罗眼中跃动着与弗雷雷如出一辙的锐气，此刻也鼓起勇气举杯：“为总统三呼万岁！”"
 brazil_lacerda.25.a: "“叫我卡洛斯就好。”"
 brazil_lacerda.26.t: "新型关照"
 brazil_lacerda.26.desc: "塞维里诺眯起眼睛，望着帕卡图巴龟裂土地上旋转的尘卷风。多年来，“泽叔叔药店”一直是这座小镇不可或缺的存在——不仅能买到退烧药，还能听到街坊邻里的闲话，甚至在天灾人祸时获得些赊账的余地。老泽记得每个顾客的名字，会根据病症调配草药茶，价格虽不便宜……总归还能承受。可如今，情况不同了。\n\n在小镇边缘，一座洁白的建筑物拔地而起，与周围晒得发白的土坯房形成刺目对比。“全国民主联盟大众诊所”的金字招牌熠熠生辉。人们窃窃私语：这家政府运营的诊所聘用了真正的医生，药品价格比老泽店里的还低。\n\n起初塞维里诺嗤之以鼻。全国民主联盟？拉塞尔达？里约那些城里来的滑头，哪里懂得内陆旱区百姓的疾苦？\n\n直到小女儿罗莎患上顽固的咳嗽。老泽的草药不见成效，眼见罗莎的体温节节攀升，塞维里诺终于咬着牙走向那座白色建筑。\n\n诊所内凉爽洁净的空气让他恍如隔世。护士们雪白的制服纤尘不染，戴着眼镜的年轻医生耐心听完他对罗莎病情的描述。开出的药物立竿见影，更令人震惊的是总费用还不到老泽止咳糖浆报价的一半。\n\n归途上，握着罗莎发烫的小手，塞维里诺心中五味杂陈。他为老泽即将失去生计感到酸楚，但另一种陌生的情绪正在萌芽——或许是……感激？"
 brazil_lacerda.26.a: "进步是一剂……良药，他心想。"
 brazil_lacerda.27.t: "阴谋和流言"
 brazil_lacerda.27.desc: "马塞洛·加西亚仔细阅读了桌上的报告，特别是关于圣保罗居民如何抗议他所提供的天花疫苗的那一份。流言四起，说疫苗已经被实验室或囤积居奇者抢购，随后以高价出售，而那些所谓的免费疫苗不过是些普通的生理盐水罢了。\n\n卫生部长加西亚陷入了沉思。他的最大目标是让巴西彻底摆脱这个历史上夺走数百万条生命的病魔。得益于现代科技，这个古老的杀手本该被永远消灭。然而，迷信和流言的蔓延让天花的阴影依旧笼罩着巴西。显然，当地的社会进步党是幕后推手，他们试图借机抹黑全民盟，诬陷政府腐败无能。加西亚冷笑了一声，这些行贿的手段大多源自阿德马尔的阴谋。\n\n毫无疑问，必须立即采取行动来解决这个问题。加西亚现在唯一需要做的，就是决定如何应对。"
 brazil_lacerda.27.a: "一场证明我们可以解决天花的公共教育。"
 brazil_lacerda.27.b: "找点办法证明社进党才是“腐败”的幕后黑手。"
 brazil_lacerda.27.c: "无需顾虑：它很快就会自己解决。"
 brazil_lacerda.28.t: "现代医学的奇迹"
 brazil_lacerda.28.desc: "“感谢各位收听环球电台！我是主播洛伦索·巴斯托斯。今天，我们有幸邀请到里约首屈一指的流行病学专家，玛丽安娜·安布罗西奥博士，与我们共同探讨当下的天花疫苗接种运动。”\n\n“荣幸之至，洛伦索。”安布罗西奥博士回应。\n\n“关于目前推行的接种工作，您的观点是？”\n\n“开门见山地说，为根除这一恶疾，本届政府付出的心血值得称道。此事无关党派，各政党加以倡导之余，更应得到全世界人民支持。上述疾病与人类历史相伴随行，不论法老国王、平民农奴，不分阶级与贫富，无可幸免。虽说接种牛痘苗预防的历史已逾150年，据报告所示，二十世纪以来，天花仍造成近3亿人身亡。不少国家已在境内消灭了天花，巴西也该加入这一光荣行列了。”\n\n“您有什么想和对此持怀疑论的人说呢？”\n\n“简而言之，未经接种疫苗的人相对更易染疾患病，那是已知危害最大、最为痛苦的疾病之一。三成人感染此种病毒后无法存活，余下七成则大概率遗留瘢痕、失明，罹患肺炎的风险升高，还可传染他人。正因如此，不为您自己，也请为您所爱的人，接受这行之有奇效的防治手段吧。”"
 brazil_lacerda.28.a: "“感谢您，博士。接下来，请欣赏若昂·吉尔贝托的全新波萨诺瓦佳作！”"
 brazil_lacerda.29.t: "未来是最好的礼物"
 brazil_lacerda.29.desc: "她对这种痛苦再熟悉不过了。临盆的母亲痛苦地尖叫，但这一次，她不再是孤身一人，不再被孤零零地丢在厨房里，任由丈夫在田间劳作。分娩的剧痛让她再次想起那失去的伤痛，当她初为人母的权利被无情夺走时，那段无法承受的记忆仿佛再次袭来。只是这次，她不在厨房，也不再孤独无助。诊所大楼的墙壁映照着明亮的蓝色，过去，最近的医院远在数英里之外，但这一次，她被及时送进了诊所。医生站在她的身旁，温柔且专注地帮助她渡过这一切。\n\n孩子出生的那一刻，她的心却瞬间坠入深渊，没有听到期待中的啼哭声。那种熟悉的恐惧几乎让她崩溃。医生快速将婴儿倒立起来，轻轻拍打小小的背脊。奇迹般地，孩子突然发出嘹亮的哭声，瞬间打破了她心中的阴霾。那一刻的恐惧化作无尽的宽慰，婴儿被小心翼翼地放进她的怀中。孩子的小手紧紧抓住她，仿佛抓住了生命的希望。她躺在诊所的病床上，怀中是那温暖的生命，她忍不住想到，如果没有这家诊所和医生的帮助，自己或许会再度面对失去的痛苦。如果放在过去，她也能有这样的医疗条件和温柔的守护，那段失去孩子的痛苦，也许就不会发生。"
 brazil_lacerda.29.a: "新生儿紧紧握住了她的手指。"
 brazil_lacerda.30.t: "暴力之地"
 brazil_lacerda.30.desc: "某个遥远的国度里，现代化的步伐终于开始逼近，一个濒临转型的社区正在为迟来的未来做准备。只需环顾这个偏远的地区一眼，便能感受到公共服务的严重缺乏和那仅存的一丝微弱希望。在这个被遗忘的角落，这片与世隔绝的巴西乡村，世代子孙团结起来，想要从最基本的健康问题入手，为彼此弥补生活的缺憾。\n\n在荒凉的土地上，饱受压迫的民众聚集在镇议会门前，恳求政府修建一所小小的医院，为病痛缠身的家人和饥饿无助的邻里带来一丝生机。这个简单的诉求打动了议员们，为这片困顿已久的土地燃起了一丝希望。\n\n然而，一道不可逾越的障碍挡在了他们面前——卡西克，这片土地的土皇帝，靠着一群流氓地痞和忠心走狗掌控着这里的一切，和社会民主党勾结在一起。这个小暴君不愿为困苦的百姓让出哪怕一块地，他的每一句话都是对弱者的无情打压。随着他一声冷酷的否决，征地的请求被彻底驳回，那刚刚燃起的医院梦顷刻间熄灭。\n\n愤怒的呼喊在镇子里响起，抗议声此起彼伏，痛苦的哭泣与绝望的叹息交织在一起。卡西克，这个用恐惧操控一切的小人，再次因为打压这些他眼中卑微如尘的人们而得意洋洋。然而，他未曾料到，风暴已经悄然到来——破碎的窗户伴随着四散的玻璃，砸进他那奢华的餐厅。那是民众怒火的宣泄，是他们用愤怒的双手掀起的反抗。骚乱平息后，卡西克的目光落在一块石头上，上面贴着一张简单的纸条。"
 brazil_lacerda.30.a: "纸条上写着：“顺潮流者昌，逆潮流者亡。”"
 brazil_lacerda.31.t: "健康体魄，健康人生"
 brazil_lacerda.31.desc: "雅辛托·阿尔梅达医生走出诊室时，病人那绝望的咳嗽声仍在空气中回荡。尽管安德拉德先生坚称自己患的是肺炎，但阿尔梅达清楚真相。他仔细翻阅过患者的病历，那些暴露在附近化工厂毒烟中的典型症状早已说明一切。诊断结果确实是慢性病，但并非不可治愈，只是面对固执的病人，他选择将真相藏在处方笺后，只递出一纸无工作能力证明。\n\n穿过贝洛奥里藏特的街道时，医生的思绪被诊金压得发沉。今天接诊的每个病患都在将他推向发薪日，可微薄的收入预示着永无止境的挣扎。然而在这令人窒息的经济压力之下，他心底却始终燃烧着一簇执着的火苗——那是多年前对白大褂许下的誓言，是扎根在这片土地上的医者仁心。\n\n此刻站在人生十字路口的阿尔梅达，正被大西洋彼岸的诱惑牵动心弦。戈伊斯先生提供的波士顿圣约瑟夫综合医院职位，像一块磁石吸引着困顿的医者。只要接受这份邀约，他就能挣脱经济枷锁，在舒适的生活里安享太平。代价不过是与那些悬壶济世的理想诀别，与守护同胞的初心渐行渐远。\n\n就在这个决定命运的午后，阿尔梅达赴约途中经过报亭，一则新闻标题突然刺破了他眼前的迷雾：“政府颁布法令提高医生待遇”。字里行间闪烁的希望的曙光，让他的脉搏突然涌动着乐观的悸动。命运仿佛突然掀开了一道帷幕，显露出既能兑现对米纳斯吉拉斯州同胞的承诺，又能拥抱崭新人生的通途。"
 brazil_lacerda.31.a: "他转过身，希望日子会越来越好。"
 brazil_lacerda.32.t: "看不见的手"
 brazil_lacerda.32.desc: "烟雾在昏暗的众议院大厅中飘荡，莱昂内尔·德·莫拉·布里佐拉打断了休会，径直走向他的党内同僚，特别是若泽·德·马加良斯·平托——少数几个理解他对巴西医疗状况立场的人之一。\n\n“这简直是个耻辱，你知道的。健康是公共事务，把它交出去无异于将生命私有化！”布里佐拉愤愤地说道，情绪在他的姿态中显而易见，他甚至没有打招呼就倾身靠近平托的桌子。\n\n马加良斯·平托同样反对，但他对政治现实表示无奈，尽管同僚突然出现，他仍保持镇定。“我理解你的担忧，但总统得到了党的支持。这不是一场值得争斗的战斗。”\n\n“但我仍然会战斗。这还没有结束。我们需要组织起来，抵制这场疯狂。”布里佐拉坚持道。\n\n从布里佐拉的话中可以看出，需要组建一个联盟来对抗拉塞尔达的医疗改革。平托已经预见到了后果。\n\n“这肯定会引发麻烦，你不觉得吗？”他评论道。\n\n“然而，以公众名义采取行动也不是第一次了。”布里佐拉回应道。\n\n他们的讨论继续进行，但在熙熙攘攘的众议院中，他们的谈话渐渐被其他议员的对话所掩盖。有一点是确定的：众议院即将面临的斗争充满了不可预测性。"
 brazil_lacerda.32.a: "事物的发展是其自身性质的必然结果。"
 brazil_lacerda.33.t: "零和博弈"
 brazil_lacerda.33.desc: "卡洛斯·拉塞尔达在他的办公室里，反复修改着那份政府支持医疗的法案。他一遍又一遍地检查每一条款和每一个逗号，试图为自己争取更多的时间来思考这个决定。显然，这项法案让他感到有些不安，因为他的直觉告诉他，医疗应该走向私有化。\n\n“总统先生，有什么问题吗？”茹阿雷斯·塔沃拉满意地抽着烟斗，他理解拉塞尔达不愿将医疗体系完全交给市场调控的立场。\n\n“我觉得这已经超出了我们的掌控，”拉塞尔达回答，肩头沉重，妥协的压力让他感到负担。\n\n“确实如此，令人不快的决定往往伴随着牺牲，”塔沃拉点头认可。\n\n“是的。但无论我怎么看这份文件，我都想立刻把它烧掉。”拉塞尔达说道，瞥了一眼塔沃拉。“布里佐拉对此有什么评论吗？”他问道，拇指轻轻摩挲着文件的边缘。\n\n“他对法案向企业利益妥协感到遗憾，并毫不犹豫地把责任归咎于您。，”塔沃拉平静地回答。拉塞尔达听后不禁露出一丝笑意，微笑着看了一眼手中的文件，然后又一次叹了口气。"
 brazil_lacerda.33.a: "“如果他反对我，那就说明我做对了。”"
 brazil_lacerda.34.t: "无懈可击的时机"
 brazil_lacerda.34.desc: "国会的大理石大厅既是宏伟的象征，也是被忽视者的见证，其洁白的表面早已被来往人群的脚印和碎屑所玷污。负责维护这些大厅的清洁工索菲·沃克，对这种不懈的斗争再熟悉不过。她已习惯了每位参议员的卫生习惯，她的日常工作也与立法讨论的风云变幻紧密交织。\n\n当她仔细擦拭主大厅的地板时，思绪不由得回到了那个动荡的年代，那场使她流离失所的动荡让她被迫离开了德国。那些令人头晕目眩的变化在她的记忆中不断重演，以至于让她失神，没注意到脚下的楼梯。随着一声骇人的脆响，她发现自己摔倒在通往夹层的楼梯上，手腕传来剧痛。\n\n在那一瞬间的脆弱中，现实的残酷让她倍感无助。若是昨天发生这种事，昂贵的医疗费用会让她感到无比恐惧。然而，早上听到的掌声在她脑海中回响，仿佛预示着一种新的变革。她突然意识到，国家如今甚至将保护覆盖到了像她这样普通的人身上。尽管受伤的手腕疼痛难忍……"
 brazil_lacerda.34.a: "……但一种新生的希望已在她心中悄然萌发。"
 brazil_lacerda.35.t: "自由的另一种代价"
 brazil_lacerda.35.desc: "“坐吧，维尔吉利奥。”拉塞尔达朝办公桌前的椅子示意——那椅子比平日离得更远。塔沃拉局促地挪动身子，避开对方的目光。《治理标准法案》已成废纸，政府精心策划的反腐行动折戟沉沙，此刻他坐在这里，仿佛要为整场溃败承担解释之责。\n\n总统深吸一口气，示意谈话开始：“显然，我们离理想局面还有距离。你认为症结何在？”\n\n“恕我直言，问题出在法案本身。与多位议员沟通后，我发现持此观点者绝非仅我一人。”拉塞尔达深陷扶手椅中，眉头紧皱，“在执政初期就要求众议院接受如此激进的提案，这本就是不可能完成的任务。即便在本党内部，我也无法说服所有人放下顾虑。”\n\n乌鸦似乎在斟酌字句：“这些风险在前期会议中已有讨论，当时我们一致同意要抢占先机、动员基本盘。你现在说这种话有些……不太合适吧？”塔沃拉恍若置身于与挚友的外交谈判。总统究竟在想什么？那语气仿佛在指控他蓄意破坏，好像除此之外再无其他解释。\n\n“或许改天再谈比较妥当。”塔沃拉匆匆应和，起身走向房门时仍保持着进门时的木然姿态，始终不曾回头。"
 brazil_lacerda.35.a: "自由的另一种代价，是不惧分歧的自由。"
 brazil_lacerda.36.t: "拉塞尔达年代"
 brazil_lacerda.36.desc: "[?global.date.GetDateStringNoHourLong]\n\n今早《环球报》报道了巴西地理统计局最新预测，本十年末国民预期寿命将持续攀升至约53.5岁。每当有人走进办公室，拉塞尔达总像展示战利品般挥舞着这份报纸。平心而论，里约和巴西利亚的各方舆论正对我们竞选时许下的种种承诺穷追猛打，但这项成就即便是古拉特也无法否认。\n\n作为负责审阅授勋典礼演讲稿的助理之一，我见证了拉塞尔达在每份公开声明里精心点缀的浮华时刻——这样的机会可不容错过。最终，另一位顾问埃纳尔多·佩肖托、州务卿马塞洛·加西亚以及卫生部长雷蒙多·德·莫拉·布里托都获得了国家功绩勋章。我对日日共享三小时午餐的“大忙人”加西亚和布里托部长知之甚少，倒是常见埃纳尔多与医疗工作者们交谈，工作时分秒必争——若他未能获奖，我反而会觉得奇怪。\n\n后来在电视台休息室，我们偶然看到一则关于里约贫民窟医疗普及宣传的趣闻。当地马戏团艺人扮成卡通人物，以滑稽动作逗弄孩童，彼此追逐起舞。那些缀满羽毛的戏服总让人联想到乌鸦，有人窃笑着提议该让总统亲自上阵表演。这玩笑显然未被所有人领会——据说拉塞尔达正考虑飞往里约与服装设计师“谈谈心”，看来这身行头着实触了他的逆鳞……\n\n高原宫的气氛日渐回暖，连党外人士都重燃希望。虽然医院尚未获得充足资金，但至少我们已迈出关键一步。\n\n拉丽莎"
 brazil_lacerda.36.a: "或许形势好起来了？"
 brazil_lacerda.37.t: "变革的种子"
 brazil_lacerda.37.desc: "安东尼奥清晨七点如常醒来，开始为一天的工作做准备。今天的“任务”是前往一个名为福尔莫索的小镇，进行实地调查。传闻当地地主侵犯农民权益，而如今，凭借农业保护部的授权，他终于有权将这些问题公之于众。\n\n抵达第一片农场时，安东尼奥下车便见到大约十名农民弯腰撒种，双手因劳累而微微颤抖。几米之外，两个身着咖啡色西装的男子一边监督农活，一边谈笑风生。刚刚早上八点，眼前的景象已透出一丝不安的气息。\n\n“早上好，朋友们，”安东尼奥开口道，“我是本地监察机关的，能问你们几个问题吗？”话音刚落，几支猎枪便对准了他。\n\n幸运的是，镇上的普通居民态度相对友善。安东尼奥得以在一场轻松的交谈中，品尝了当地的咖啡。他们讨论着农耕技术和福尔莫索的生活方式。尽管局势复杂，安东尼奥心知，凭借农业保护部的支持，他随时可以寻求警方的协助，必要时甚至可以在警察局或审问室继续调查。\n\n然而，下午的例行午休被突如其来的呼喊声和酒店内四处传来的劈砍声打断。当地的流氓闯入后，将现场弄得一片狼藉。他支付给经理比事先约定价格高出一倍的钱，然后小心翼翼地穿过满地的碎玻璃和木屑。这已不是他第一次与当地权贵及其手下打交道，以往到了这一步，事情通常就此结束。但今时不同往日。\n\n数小时后，安东尼奥决定前往当地警局，将当天在福尔莫索的所见所闻详细记录下来。警方承诺，如果他配合，他们将展开调查。他破天荒地感到自己所服务的行政系统开始发挥作用了。他只希望这种变化能够持续下去。"
 brazil_lacerda.37.a: "美丽的镇子，丑陋的故事。"
 brazil_lacerda.38.t: "塞拉多高原的一隅"
 brazil_lacerda.38.desc: "“喂！看着面生啊，”一位秃顶老人从门廊里探出身来招呼道。保罗略感意外地怔了怔。“别紧张，我又不吃人，”老人大笑着安抚道，“怎么称呼？”\n\n“保罗，”他答道，心想正好借此机会认识下邻居。“您在这儿住了有些年头了吧？”\n\n“嘿，我是年纪大，但还没老糊涂呢，”老人佯装不悦地笑着反驳，“当年瓦加斯鼓动大伙西迁拓荒时，我可是头批响应的人。”说着他叹了口气，“可1937年真不是个好年景。土地贫瘠得种不出庄稼，我买了整整一农场的牛粪改良土壤——结果嘛，你猜得到。”保罗听到这里不禁莞尔。“如今我们全家就养些牲口糊口。”\n\n“是，是，”保罗笑着附和，“不过现在肯定大不一样了，来了这么多新人，还有新技术。”\n\n“可不，”老人点头道，“如今有了拖拉机、农具，基础设施虽不完善总比没有强。像你这样的年轻人也多了——知道吗？四十年代认识的邻居走了一半，三年前的老街坊现在全换新面孔了！现在大伙都种玉米，收成不错，日子有奔头。”\n\n老人突然目光放空：“可那些几十年不管我们的公司和集团，现在倒想全盘接手。我受够了这些穿西装的吸血鬼，宁可换回从前的好邻居。”两人陷入短暂的怅然沉默，直到保罗告辞回家。踏进家门那刻，保罗忽然意识到一件事。"
 brazil_lacerda.38.a: "他忘了问那位老人的名字。"
 brazil_lacerda.39.t: "增强信心，稳定市场"
 brazil_lacerda.39.desc: "埃利奥·贝尔特朗在最高会议厅外的走廊上追上了总统。两人略显尴尬地抢着想要率先开口，最终却默契地选择暂时搁置其他事务，专注于缓冲库存计划的讨论。\n\n“总统先生，您大概已经料到了，我虽然听说过缓冲库存机制……但实话说，我并不太喜欢它。”贝尔特朗直言道。拉塞尔达知道自己与部长们讨论时往往语气咄咄逼人，这一次，他努力让自己缓和些许。“我会倾听你的意见，埃利奥。”他做出了承诺。\n\n“我理解，当前价格波动很大，政府干预或许有助于稳定局势。我对此持同情态度。但首先，人为干预价格会削弱市场信心；其次，政府投资者不会乐见这样的举措；最后，它可能太——”\n\n“——太贵了，对，埃利奥，我明白你的担忧。”拉塞尔达打断道，“但听着，我参政当总统是为了让消费者和农民放宽心。这正是缓冲库存的作用。而且，这是一项投资，我们迟早能回本。这一点，你比任何人都清楚，不是吗？”\n\n财政部长微微一笑，“但钱可不是从树上长出来的，总统先生。”\n\n拉塞尔达回以一笑，“它倒是可以长在农田里，埃利奥。不然为什么要叫经济作物呢？”总统笑着打趣道，随即话锋一转，“不过，空话就说到这儿。我们的任务是恢复信心，而不是让人民自生自灭。偶尔做出一点牺牲，我们还是能承受的，对吧？”\n\n贝尔特朗向总统告别，随后前往财政部。他的内心仍有些困惑，但至少，总统的确有一个计划。"
 brazil_lacerda.39.a: "是播种利润，还是加重负担？"
 brazil_lacerda.40.t: "致瞎子的一封信"
 brazil_lacerda.40.desc: "给那些聋子哑巴一样的政府：\n\n我是个种地的农民，你们听懂没？农民！你们这些缩在联邦区的城里人估计早就把我们这些人忘干净了吧？可别以为我们不存在！不过话说回来，照你们这当官的作派，我这农民估计也干不了多久了。到时候啊，整个国家的农民怕都得跟我一个下场。\n\n从1950年开始，我们家就傻乎乎地给全民盟投票，以为你们能照顾我们这些苦哈哈的农民。我们烦透了那些瓦加斯主义者，因为他们根本就不知道啥叫爱巴西。可你们倒好，等了这么多年，等来个啥？啥也没等到！别跟我扯那些没用的“替代方案”，我听腻了！\n\n我们那块地，穷得都快长不出草了，收成连填饱肚子都不够，更别提养活我老婆和四个孩子。村子里打架斗殴天天上演，连条像样的路都没！\n\n老子受够了！把家里那点可怜巴巴的地卖给了一个大地主，现在正坐火车往城里跑呢，写着这封信。说实话，我是真不想走，我爱我的家乡，爱那块破地，也爱我的州，可我还能咋办？你们逼得我没路可走！车站那成百上千的农民，跟我一样的下场，个个眼巴巴地盯着这破火车，想着去陌生的地方讨口饭吃。我呢？坐这火车上，身边老婆吵得我头疼，孩子哭得心烦意乱。你们说，这就是你们安排给我们的命吗？\n\n现在你们倒好，还厚着脸皮说什么没有土地改革计划？我呸！这是明摆着把我们往绝路上赶嘛！我们祖祖辈辈在这块地上刨食，有些人家都活了几百年了。巴西的小农传统，你们知道那是啥吗？那可是养活了你们这帮狗官的神圣活计啊！可现在呢，全让你们给毁了！以后啊，这血债可都算你们头上！\n\n一个农民"
 brazil_lacerda.40.a: "纸上满是泪痕与汗渍。"
 brazil_lacerda.41.t: "可望而不可及"
 brazil_lacerda.41.desc: "“土改来啦！土改来啦！”报童呼喊着冲入了广场上密集的人群。空气中回荡着激动的喊声，拨铃波的琴声与潘代罗的鼓声，人们朝着报堆聚了过来。\n\n民众的热情很快烟消云散，在越来越多的镇民读懂“土地改革”真正的含义后，满腔的喜悦都化作了忧愁。实际上，国会通过了一项软弱无力的法案，只会干两件事：只有达到特定规模的庄园才会被分割，只有一部分农民才能拿回自己的土地。而他们也还得再等上半年才能看到法案生效。\n\n夜晚醇厚的空气让人更加清醒，许多农民都将这项法案视作压垮骆驼的最后一根稻草。与早晨相比，广场上的人少了很多：有人忙着买票进城，有人当作无事发生，有人怒骂着这项法案究竟有多愚蠢。\n\n“但说实话，这法案也没蠢到哪里去。”兴许有人会这么说。“是啊，这是一场斗争，我们看惯了斗争，而土地却永远肥沃。这日子总得过下去。”\n\n“但这帮政客这些年来都把我们跟他们绑在了一起！”很经典的回答。“全民盟是保守的党，是努力工作的国民的党。到头来，他们只是圣保罗和贝洛奥里藏特的城里人的党！真是荒谬可笑。”\n\n不管是心怀希望，还是忿忿不平，他们总得解决这个问题。"
 brazil_lacerda.41.a: "妥协的代价便是让所有的理想大打折扣。"
 brazil_lacerda.42.t: "展现价值"
 brazil_lacerda.42.desc: "埃利奥·贝尔特朗大步流星跨出汽车，踏入高原宫的步伐摇曳生姿。今天的高原宫虽说除汽车引擎的轰鸣声外十分寂静，但依然富有那一贯的王者风范。走进门厅，他瞧见有四个不是公务员就是顾问的家伙跟在部长屁股后面，暗自决定要把人数砍掉一半，或者至少要调个人去干更要紧的事情。要么干脆赶走得了。\n\n贝尔特朗听着油光锃亮的皮鞋蹬在精光瓦亮的地板上发出的金石之声，揣测着各处用了什么建筑材料。自然，不是大理石就是金属；而在他的领导下，财政部会找到新的方向。他默默地为这座堂皇宫殿暗寓的讽刺意味感到惋惜，这些敞亮的走廊将虚荣的气泡愈吹愈大，挤占着城市的空间。他一想到电费就不寒而栗。\n\n拿到通胀数据和增长报告之后，贝尔特朗着手制定名单，列满了这段时间大展身手又备受信任的各路专家。既然是位高权重的国家高官，就应对其做最严格的要求与期待。\n\n贝尔特朗走进办公室，走廊上爱德华多·戈梅斯的肖像凝视着他。他们聊起经济问题，他想起准将是怎么处理经济问题的。他离任时，通胀高企，增长缓慢，走势低迷。总之，华而不实，游移不定。如果他想干好，最好赶快找个方向，否则下一个挂在那里的就是他的肖像了。"
 brazil_lacerda.42.a: "大权在手，重担在肩。"
 brazil_lacerda.43.t: "建设瓜纳巴拉"
 brazil_lacerda.43.desc: "玛西娅连跑带跳地穿过了车道，身旁卡车的鸣笛声震耳欲聋。她每天回家时都会漫不经心地穿过这条道路，但她今天险些被车撞到。玛西娅意识到了这一点，她的心脏止不由地狂跳了起来。\n\n司机大声辱骂着这位年轻的女士，但在玛西娅反击前，这辆满载着木材和胶合板的美国福特大卡车就已经伴着隆隆的轰鸣声驶向了远方。现在满大街都是这样的工业巨兽，把里约热内卢本就狭窄拥挤的街道变成了人、车、设备都难以动弹的大沼泽。\n\n在她的头上，一台台塔吊直入云端，缓缓地将巨大的钢梁移动到为摩天大厦预留的位置，而昔日的贫民窟则被彻底拆除，为新建的郊区腾地。宽阔的大道贯穿城市，缓解了交通堵塞。崭新的学校、医院、公园也纷纷提上日程。城中整日回响着砰砰的敲击声，只有等到入了夜才会稍显安静。城里随处可见“瓜纳巴拉新未来”一类的宣传口号。说实话，全民盟所言不虚。\n\n玛西娅感到一丝矛盾。在拉塞尔达总统还是瓜纳巴拉州长的时候，她并不喜欢这个家伙。至于他的继承人马加良斯，玛西娅也同样无感。\n\n然而，她无法否认这些结果：她上班要走的路线已有半数升级为了新大道。她表弟就读的学校正在经历重建与现代化改造。几天以前，还有名调查员在规划供水与排污管道。这可是活水啊！富人手里的奢侈品，如今很快就要通到她的屋子里了。\n\n或许拉塞尔达并没有那么坏？"
 brazil_lacerda.43.a: "里约的一线希望。"
 brazil_lacerda.44.t: "亮剑前行"
 brazil_lacerda.44.desc: "“先生们，你们需要的一切数据、表格和图片都在这儿了。”内阁官员们阅读着眼前的报告，小声嘟囔着表示认可。“有一半部门都有可以量化，且不可原谅的人事膨胀问题。它们让巴西损失了数百万雷亚尔，而剩下的钱则消耗在了过时的法规当中，阻碍了我国的经济发展。剐去油脂，斩断铁链，先生们，这就是新预算的座右铭。”\n\n只有一人似乎没被总统说服。塔沃拉任由报告从手中滑落，纸张落在桌面上的动静引起了内阁的关注。“您说得在理，总统先生，但这么做当真正确吗？”\n\n“你是在质疑我的数据吗，塔沃拉先生？”\n\n“或许只是在质疑您手下的那些经济学家。他们学富五车不假，但我有理由相信这帮人都在公共关系课上打盹。”塔沃拉稍作停顿，让笑声尽情释放，但仍有许多内阁成员沉默不语。“您提议大幅削减预算，从理论上来说，或许可以降低我们的财政赤字。但我担心的是，要是让巴西民众知道了这个计划，他们会以为政府是打算从他们手中剥夺急需的就业机会。”\n\n“臃肿预算之下的政府工程不过是贪污腐败的载体，这样的就业既不稳定也不充足。你看到巴西利亚的建设账单了吗？”\n\n“是的，总统先生，我知道这笔钱的去向。但人民不会支持一个收走他们铁饭碗的政府。”\n\n拉塞尔达摇了摇头。“或许我们的政策不会受到欢迎，或许我们的计划会遭到强烈的反对，或许我走到街上就会被人一枪打死。”"
 brazil_lacerda.44.a: "“但我相信人应当做正确的事，而不是容易的事，塔沃拉先生。”"
 brazil_lacerda.45.t: "临时变卦"
 brazil_lacerda.45.desc: "“先生们，”拉塞尔达说着，向内阁会议桌略略挥手，“各位面前的文件夹装有最新议案的草案，现在可以翻阅了。”一些人毫无怨言地翻开文件夹，另一些人则对无谓的保密举措嗤之以鼻。而后经由总统叙说，全体与会者大致浏览了摘要。“简而言之，重点是消减长期阻碍我国发展的赤字。破除制约央行自主性的繁文缛节，不过是第一步——怎么了，贝尔特朗先生？”\n\n贝尔特朗不住地摇头。“这份方案，”他举起议案，“还远远不够。我本以为我们已取得共识，要剐去油脂，斩断铁链。”\n\n“此为合理可行的举措。”拉塞尔达尚未开口，塔沃拉便接过话头。“总统推行的方案切合实际，而非你那苦行——”\n\n“谢谢，塔沃拉先生。不过我完全明白如何谈论自己的方案。”失落的目光投来，似向塔沃拉昭示着今后的会面愈发难以太平。视线随后转向贝尔特朗。“上次会谈的结果我很清楚。此后，我又进一步评估形势、征求他人意见，确定了上述新版行动方案，即目前的最佳方案。”\n\n“是什么权宜之计？”\n\n“是迈向更合理经济模式的第一步。”他再次望向议案副本，推了推眼镜，“先生们，有部分细节尚待讨论，请翻到第62页——”\n\n“这并非我们同意的内容，”贝尔特朗厉声打断。镜框之后，拉塞尔达扬起眉毛。"
 brazil_lacerda.45.a: "“你想剐去油脂？依我所见，增长肌肉才是首要任务。”"
 brazil_lacerda.46.t: "友人来电"
 brazil_lacerda.46.desc: "“州长先生，总统来电。”秘书对瓜纳巴拉州长，以及实际任里约热内卢市长的拉斐尔·德·阿尔梅达·马加良斯说道。后者轻叹一声，接过听筒。拉斐尔与卡洛斯·拉塞尔达相识多年，既是友人，也在政治方面结盟，二人间的对话往往轻松愉快。不过他清楚，今时不同于往日。\n\n“你好，卡洛斯，感谢如此及时的回电。希望我们——”\n\n“别想了，拉斐尔。”拉塞尔达打断他的话，“我拒绝削减和瓜纳巴拉重建相关的一切成本，绝不允许偷工减料。”\n\n“可是，卡洛斯，不少建筑实属多余，造价又高！尽是些学校、图书馆和公园……还有，我们当真要这么多条公路？里约永远不可能有这么多车主。这和德国人战后对柏林做的有什么不同，看他们落得个什么下场！”\n\n“要顾全大局啊，拉斐尔。”卡洛斯晓之以理、动之以情，“我们不仅为当下的瓜纳巴拉规划，还得放眼明日，全国上下终将富裕繁荣。应当积极推进，不惜代价，树立里约与瓜纳巴拉的未来模范地位。对了，不好意思，我得挂电话了。真希望能多聊聊，可惜我要出席马拉尼昂一家医院的开幕仪式，还有几分钟开场。好怀念我们每天会面的时光，真的。再见啦！”\n\n马加良斯被晾在一边，手持挂断的电话。他摇摇头，明白拉塞尔达打定主意后再无可能劝阻。日耳曼尼亚的翻版已成定局，他早就知道。"
 brazil_lacerda.46.a: "有时候，人就是抛不掉华而不实的东西。"
 brazil_lacerda.47.t: "友人来电"
 brazil_lacerda.47.desc: "“州长先生，总统来电。”秘书对瓜纳巴拉州长，以及实际任里约热内卢市长的拉斐尔·德·阿尔梅达·马加良斯说道。后者轻叹一声，接过听筒。拉斐尔与卡洛斯·拉塞尔达相识多年，既是友人，也在政治方面结盟，二人间的对话往往轻松愉快。不过他清楚，今时不同于往日。\n\n“你好，卡洛斯，感谢如此及时的回电。希望我们——”\n\n“拉斐尔，”电话那头的声音打断了他，“你不用再劝我了。这项工程的规模和成本已经膨胀得太离谱了，嗯……巴西承受不起。”\n\n马加良斯几乎不敢相信自己的耳朵。拉塞尔达竟然愿意听从理智？他平时可是一向不走回头路。“卡洛斯，听到你这么说我很高兴。我知道你有宏伟的计划，但我们得一步步来。我们不能像德国人那样，一次性全建起来。”\n\n“是啊，是。总之，很抱歉，我得挂了。我也希望能多聊聊，但我这边在马拉尼昂要为一家新医院主持开幕仪式，现在只有一点时间。真想念我们每天的交谈，真的。再见！”\n\n电话挂断了，马加良斯缓缓放下听筒。他感到遗憾，他们之间曾经亲密的关系因为政治压力逐渐疏远。但这是无可奈何的事。不过，至少马加良斯成功阻止了拉塞尔达的宏伟建筑计划，这才避免了一个让后人诟病的华而不实的工程。"
 brazil_lacerda.47.a: "抛掉累赘没有想象中那么难。"
 brazil_lacerda.48.t: "同志们与批评家"
 brazil_lacerda.48.desc: "“……贝尔特朗先生，我们今天要继续谈论经济问题。”老财政部长点点头，有些好奇的挑了挑眉 。他对采访并不习惯，更不习惯面对观众，但很快，全民盟的策划便大展神威。“我国正遭受从前几届政府继承而来的经济持续下行压力。您的政府打算如何扭转这种趋势？”\n\n“很高兴你这么问。事实上，我们的确从前几任政府那继承了通货膨胀与巨额赤字的祸害，他们除了压低我们的预算之外什么都没做。但正是如此，我们的总统这周颁布了一项议案，旨在通过削弱限制了我们潜力的官僚机构以进一步开放市场。”这份申明在热情的听众们中引起了热烈反响，使得部长信心倍增。“现在，国会有义务确保我们减少税收和解放人民的计划顺利实施，从而实现通胀最小化和增长最大化。”\n\n“那您觉得这项议案会通过吗？”\n\n“我认为如果国会真的代表国家，那它就该通过。而且，我，和其他巴西人民一样，希望这项议案通过，所以我希望它能通过”\n\n“财政部长，感谢您接受我们的采访。”记者这样说道，一声“咔！”结束了这次采访。他离开了片场。在环球电视台的办公室来回踱步，而后他被一群慷慨激昂的抗议者吓到了，这群抗议者在窗边举起示威标语牌。  在抗议者里他发现了一个熟面孔，莱昂内尔·布里佐拉，那个混蛋煽动者，手持扩音器在那吸引听众。贝尔特朗打算找个人问有没有另外的出口。"
 brazil_lacerda.48.a: "我想，不是所有人都能做朋友。"
 brazil_lacerda.49.t: "百尺竿头，更进一步"
 brazil_lacerda.49.desc: "最终投票结束，所有的程序性动议已处理完毕。这是官方的，拉塞尔达经济计划的基石已然成真，只待总统签字。贝尔特朗在看到这个当红明星签下字时笑得更欢了。他走上前去，紧紧握住了总统的手。\n\n“总统先生，”贝尔特朗不需要再说任何话了。这份成就已经足够说明一切。自由市场法正是巴西所需的趁手工具——一包可以炸毁巨大阻碍的炸药，一把铲除残留的铲子，还是一把能除去膨胀的利刃。拉塞尔达早已知道巴西潜力充沛，只是被瓦加斯赋权组建政治帝国的那群寻租者所阻。\n\n拉塞尔达拉出一瓶他特意为现在这个时候准备的香槟。他曾担心它会一直留在这桌子底下，好像在提醒他的失败。与之相反，他拿出了属于他的趁手工具，一个小小的开瓶器。当他把开瓶器塞进瓶子里时，他知道他是在疏解压力，想要破开障壁获得奖励。\n\n香槟塞砰地一声弹出，几乎达到了天花板。拉塞尔达转过身来，用香槟填满两只杯子，并举杯。他还有很多事要做，但至少这个晚上他能开怀地笑。\n\n“所以总统接下来有何打算？”贝尔特朗把酒杯抵近嘴巴，好像举起了麦克风一样。\n\n“没什么，”拉塞尔达微微一笑，“就是把巴西石油公司拆掉，修复一下东北开发局，仅此而已。”两杯相碰，气泡渐渐浮出水面。"
 brazil_lacerda.49.a: "有那么一刻，拉塞尔达如沐春风。"
 brazil_lacerda.50.t: "打破宁静"
 brazil_lacerda.50.desc: "总统此刻毫无“总统”的样子。他怒气冲冲地穿过每一扇通往办公室的门，脑中充斥着愤懑，身体开始冒汗，神经微微抽动，心脏像士兵的皮靴一般急促跺动。他觉得自己既需要走动，又需要静坐，可他不知该如何平息心中的怒火。\n\n“您的晚间简报，总统先生。”埃丝特温和的声音，在今天却显得格外刺耳。他快步走到她面前，一把夺过文件，狠狠摔在桌上。他心中咒骂着：不想看这该死的玩意儿。可能是因为他无意间喃喃出声，门随即“砰”地关上了。\n\n这不是问题，而是灾难——彻头彻尾、无法遏制的灾难。他本以为胜利唾手可得。那天，每个人都告诉他法案会通过，告诉他库比契克的“红带共和国”将被剪断束缚。然而，结果却是梦想被烧成灰烬，留下一地破碎的自由市场经济。\n\n是埃利奥的错吗？那个只需要在电视上念台词的人搞砸了一切？不，其实他更愿怪罪那些波萨诺瓦派，他们自以为聪明绝顶，却不肯跟随党派投票。还有瓦加斯主义者，他们四处散播谎言，低语蛊惑，将巴西唯一的救赎之路毁得一干二净。那些破坏者……哦，他们全都得付出代价。\n\n也许还有希望，也许只要抓住《劳工法》，在某些地方松松手，他就能挽回局势。但……这事总得有人付出代价。他的手指微微发痒，仿佛在寻找发泄口。"
 brazil_lacerda.50.a: "门外，埃丝特紧贴着耳朵，默默想着明天她将不得不收拾的烂摊子。"
 brazil_lacerda.51.t: "米拉马尔酒店的一天"
 brazil_lacerda.51.desc: "米拉马尔酒店的旺季又来了。美国游客蜂拥而至，只为一睹委内瑞拉河畔迷人的海滩风光。然而，对一些人来说，工作与享受总是交织在一起。在酒店餐厅的伞下，三名晒得通红的男人正坐着闲聊，海风轻拂，冰块在调制精妙的鸡尾酒中清脆作响，为他们的对话增添了几分惬意。\n\n“这个地方真是百来不厌，”其中一人舒了口气说道。\n\n“每年都来委内瑞拉，确实有点腻了。”另一个接话。\n\n“我们也去不了欧洲，不是吗？”\n\n“不过，我最近关注了一些附近的地方。你们最近听说过巴西吗？”\n\n两人将椅子拉得更近了一些。\n\n“那个新总统，拉塞尔达，好像正在通过一些新法案刺激经济发展。他是个实在人，放松了对经济的管制什么的。如果你们想找新的投资地，我觉得如今的巴西绝对值得一试。谁知道呢？或许几年后我们会在巴西谈论这些。我还在考虑在那里开一家酒店，像这样的地方。如果能在两个不同的地方来回切换，也许就不会觉得无聊了。”\n\n两人点点头，暗自记下下次打电话时要问问经纪人，脑海中已经开始勾勒未来的画面——在海边新建一座酒店，既是投资，也能舒舒服服地消磨时光。"
 brazil_lacerda.51.a: "总有新的地方可以投资。"
 brazil_lacerda.52.t: "英雄归来"
 brazil_lacerda.52.desc: "全国民主联盟的代表们陆续步入会议室时，每个人都微微点头向拉塞尔达总统致意。这是一种无言的敬礼，献给这位凯旋的勇士。塔沃拉的神态自若，完全没有流露出丝毫的不安。拉塞尔达暗自琢磨，他是真的被自己说服了，还是仅仅在承认眼前的既成事实？不过，塔沃拉的看法并不重要。\n\n拉塞尔达一直端坐着，直到一个特别的身影出现。他在贝尔特朗出现时起身，走到门口迎接他。“啊，这位可算是今天的功臣了。贝尔特朗先生。”拉塞尔达热情地握住贝尔特朗的手，脸上挤满了笑容。“你的指导真是无懈可击，没有你，我绝对做不到这些。”\n\n片刻间，拉塞尔达想象着如果瓦加斯还活着，看到自己的遗产一块块被拆解时会作何感想。瓦加斯留下了一头庞然巨物，那怪物就像一只吸饱了勤劳正直的巴西人民血汗的蜱虫。如今，全民盟高举资本主义的利剑，将这头野兽斩成两半，治愈了创伤，并将野兽守护的宝藏归还于人民。\n\n“想想我们取得的成就吧。”拉塞尔达环视着聚集在场的全民盟政治家和工作人员。“仅仅在一个总统任期内，我们就让巴西人民重新掌控了自己的命运。他们终于能够在自由市场中追求繁荣，而不再为填满政府官僚的口袋而苦苦挣扎。我们彻底解放了巴西，将这个国家从瓦加斯腐败体制的枷锁中解救出来。当然，我们的奋斗绝不会停止，但那些曾经拖累这个国家的重大错误，今天，终于被彻底纠正了。”"
 brazil_lacerda.52.a: "全民盟为他们的英雄和祖国欢呼。"
 brazil_lacerda.53.t: "拉塞尔达的祝福"
 brazil_lacerda.53.desc: "空军基地的食堂里，欢声笑语此起彼伏，维森特绕过了那长得夸张的队伍，从一个他曾劝说过的年轻军官手中接过了餐盘。他左手端着一盘豆子炖肉，满满当当，都是给他自己的；右手拿着另一盘，是亚历山德罗钟爱的清淡海鲜炖菜，配着米饭和一大勺木薯粉。把两盘餐食放到桌上后，维森特看着亚历山德罗闭上眼睛，低头祈祷，为这顿饭向上帝献上感恩，然后撒上木薯粉。\n\n“顺便也感谢一下拉塞尔达吧。”维森特笑着说，但他却有些迟疑，自己的饭菜迟迟没动。\n\n亚历山德罗抬起头，笑容在昏暗的荧光灯下格外明亮：“谁知道我是不是在向拉塞尔达祷告呢？”他的背后是落日的余晖，映得食堂更加温暖。一天的训练下来，这样的时刻变得弥足珍贵，让维森特接下来说的话显得更加艰难。\n\n“你知道吗，空军刚拿到新资金，正在扩大行动规模，任务也越来越多。”维森特顿了顿，确认亚历山德罗在认真听，不想让他错过任何一个字。“他们已经决定让我去执行一个重要任务。”\n\n“哇！”亚历山德罗惊喜地叫了一声，手中的勺子停在半空中。“太好了！你会——”\n\n“我要走了，亚历山德罗。可能很快。”\n\n食堂里，周围的声音依旧热烈。人们在谈论新铺好的跑道、重新粉刷的机库、更新换代的训练设备，还有传闻中最先进的雷达系统。\n\n“啊，我明白了。”"
 brazil_lacerda.53.a: "突然间，饭菜变得不那么合口了。"
 brazil_lacerda.54.t: "规划新路线"
 brazil_lacerda.54.desc: "“诸位，感谢你们的到来。”当巴西军方的最高将领们陆续走进国防部的会议室时，卡洛斯·拉塞尔达开口说道。在他身旁，战争部长戈尔贝里·多·科托-席尔瓦正低头在笔记本上记录些什么。\n\n“你们都很清楚，我在竞选期间承诺过，要对国家的军队进行现代化改革，而这一进程，从今天就正式开始。”随着拉塞尔达的话音落下，一名助手迅速将文件分发给围坐在桌旁的将领们。\n\n“接下来的几个月，”拉塞尔达继续说道，“我希望你们能够向席尔瓦部长提交关于军队改进的详细建议，特别是我们可以从OFN采购哪些武器。政府已经与几家美国国防承包商建立了联系，他们表示愿意在未来与我们展开合作。”\n\n“此外，各位的创新建议我也洗耳恭听，看看我们如何通过这些想法来确立巴西在南美洲的军事主导地位。”戈尔贝里说道。“两次世界大战中那种依靠大规模军队的战争模式已经逐渐成为历史，我们应该与时俱进，采用新的军事理论和战术。”\n\n会议桌旁几位将领微微点头，表示赞同，但拉塞尔达的老朋友、奥古斯托·德·阿尔布克尔克·利马将军的神情却依然严肃。拉塞尔达心里清楚，利马将军一向是旧派战争学说的坚定拥护者，对戈尔贝里的“索邦派”改革理念抱有保留意见。他对同美国及OFN结盟一事更是态度谨慎，认为过于依赖外部势力可能会危及巴西的独立性。然而，拉塞尔达也明白，利马无疑是一位忠诚的爱国者，无论他的观点如何，这一切都出自他对巴西的忠诚和责任感。拉塞尔达心中默默希望，自己与利马和戈尔贝里之间的个人友谊，可以避免一场危机爆发。"
 brazil_lacerda.54.a: "为了保卫巴西！"
 brazil_lacerda.55.t: "巴西火"
 brazil_lacerda.55.desc: "戈尔贝里·多·科托-席尔瓦将身子前倾，透过直升机舷窗凝望下方的亚马孙雨林边缘——或者说，曾经是雨林的地方。凝固汽油弹肆虐后的土地上，闷燃的焦木如被解剖的巨兽般倒塌在地，苍翠林冠化作焦黑余烬，被掏空的树干间不时窜起橙红火舌，昭示着这场焦土战术的毁灭性规模。\n\n“非常震撼，”坐在战争部长身侧的奥古斯托·德·阿尔布开克·利马将军对着耳麦说道，确保席尔瓦能听清每一个字，“就算动用机械也要耗时数日甚至数周才能清理出这样的通道，要是让步兵清剿肯定伤亡惨重。可只需一架战机掠空而过——密林化为焦土，敌军无所遁形，天然屏障就此瓦解。把这套战术拿到非洲打那帮德国鬼子肯定不错！”\n\n戈尔贝里转身面向将军：“或许如此，但据报北部仍有叛军活动。恐怕不久后我们就要在那边用上这招了。”\n\n“不管怎样，”利马将军回应道，“至少我们掌握了让平叛事半功倍的利器。”"
 brazil_lacerda.55.a: "战争之火，随时待命。"
 brazil_lacerda.555.t: "最好的防御……"
 brazil_lacerda.555.desc: "利马将军审视着巴西与阿根廷边境的地图，如同往日无数次那样。每一道蜿蜒的河川、每个村庄与城市、每处地势起伏，所有对穿越这片区域的军民至关重要的地理特征都尽收眼底。这些特殊地图还标注着对公众保密的军事机密：地堡坐标、潜在雷区、部队集结地与军需仓库，每个标记都在为像他这样的将领推演各种可能提供支撑。\n\n最新版地图上增添的，是现政府与席尔瓦部长提议建设的预警雷达链布局图，详细规划着如何向军方传递潜在敌人越境入侵的最佳预警方案。毕竟，当喷气式飞机只需片刻就能飞抵圣保罗与里约热内卢时，建立预警机制确有现实考量。\n\n但若缺乏有效反击手段，即便提前知晓敌机来袭又有何用？这些造价高昂的新型雷达固然精妙，可击落敌机的喷气式战斗机身在何处？更遑论能发动先发制人打击、将威胁扼杀于萌芽的轰炸机群与攻击机队？\n\n利马将军对着军政高层提出的防御性、思维僵化且耗资巨大的方案皱起眉头，眉宇间凝着化不开的阴云。"
 brazil_lacerda.555.a: "要么先发制人，要么按兵不动。"
 brazil_lacerda.56.t: "巴拿马的训练"
 brazil_lacerda.56.desc: "亚历山德罗和队员们乘坐美制驯鹿运输机抵达谢尔曼堡时，正值巴拿马的晨曦初露。由专机接送而非亲自驾驶，让他的自尊心空前膨胀。帕拉第奥式建筑的红土色和橙褐色屋顶，与纯白立方体混凝土建筑群形成鲜明对比，赤道特有的树木从社区中探出枝桠。穿过建筑物间的狭缝时，亚历山德罗意识到连普通士兵在美国都过着帝王般的生活。\n\n那天的军营透着股慵懒气息。刚下哨的士兵操着陌生的拖腔交谈，无线电操作员戴着耳机摆弄精密设备，顷刻就信号传达至数千公里外的大陆。更令人称奇的是，霓虹灯招牌与草莓深红色瓷砖装点的冰淇淋店竟与指挥部浑然一体，在这片异域之地抚慰着思乡军人的心。\n\n这整场行动本身就是一场文化冲击。亚历山德罗心想，美国人果然深谙震慑之道，又或着这只是他们的日常？这念头令他不安，恍然惊觉双方差距之大。他想起在巴西时与维森特共食的那半盘寒酸炖鱼，此刻与眼前巴拿马基地的精美餐食相比，简直像是遭苍蝇品鉴过的残羹剩饭。瓦加斯的吝啬作风连军队都深受其害……"
 brazil_lacerda.56.a: "……好在拉塞尔达会解决这些问题。"
 brazil_lacerda.57.t: "未知敌人"
 brazil_lacerda.57.desc: "当地人议论纷纷，关于亚马孙上空那些令人匪夷所思的现象：奇异的光点在空中悬停，能轻松垂直升降，转向迅捷无比。没有哪种人类制造的飞机能做到这些！唯一的解释便是一个OVNI，即“未确认飞行物”。\n\n起初，维森特·阿伦卡尔对这些传闻不以为然，认为不过是当地人的闲言碎语。然而，随着关于OVNI的报告层出不穷，连这个一向敢作敢为的飞行员也开始动摇，开始怀疑或许真的有什么异乎寻常的事情在暗中酝酿。\n\n一次例行的空中巡逻任务中，乌云和迷雾悄然包围了维森特的F-80C“流星”战斗机，这位平日里自信满满的飞行员忽然感到一阵不安和紧张，视野被迷雾完全吞没，前方未知的任何东西都可能是潜伏的威胁，是危险……是那个被称作OVNI的神秘存在。\n\n就在雾气稍稍散开的瞬间，维森特看见一个庞大的椭圆形物体，前端亮着两盏耀眼的白灯，正以惊人的速度逼近。他的心脏骤然一紧，但几乎出于本能，他立刻扣动了扳机，六挺勃朗宁机枪瞬间喷射出一连串.50口径的子弹，直射向那个神秘的OVNI。它来得突然，去得也快。维森特连忙通过无线电向基地汇报刚才惊心动魄的一幕。\n\n当维森特的F-80战机终于着陆时，他仍沉浸在可能刚刚挽救国家于外星威胁的激动之中，远远地看见上校站在那里迎接。他激动地下了飞机，却发现上校满脸怒色，身旁站着几名神情严肃的宪兵。\n\n“阿伦卡尔中尉，你差点击落了一架民用直升机。” "
 brazil_lacerda.57.a: "“你惹上大麻烦了。”"
 brazil_lacerda.58.t: "飞的"
 brazil_lacerda.58.desc: "双涡轮螺旋桨引擎开始轰鸣，崭新的巴西航空工业EMB-110“先锋号”滑入跑道准备起飞。获得塔台许可后，这架飞机笨拙而缓慢地在跑道上加速，最终腾空而起。\n\n在维森特看来，这与他驾驶惯了的“流星”喷气式战斗机相比，简直像在开砖头——这架民航机的最高时速仅四百余公里，而他驾驶的战斗机可达近六百公里，更别说上头为了省油要求保持三百四十公里的“经济航速”，这种差距就像让赛车与行人竞速。\n\n能继续飞行本该是种幸运。那次“误将直升机当作外星飞船”的丑闻，和随后长达数月的调查审讯，差点终结他的军旅生涯。如今他被禁止驾驶战斗机数年，不得不改飞运输机，而且名义上仅仅是“副驾驶”，由军衔更高的飞行员执掌操纵权，这尤其令他如鲠在喉。\n\n何况空军正在进行编制调整，削减作战机群规模，侧重支援任务的趋势意味着他迟早会被调离原岗。这几乎让维森特萌生退役念头——他参军本是为驾驶战机保卫巴西，而非为亚马孙矿场运输物资。\n\n然而，若真退役就再无机会驾驶战斗机。况且哪家航空公司会雇佣他这个有“险些击落民用直升机”前科的人驾驶豪华客机？更别提那该有多乏味。"
 brazil_lacerda.58.a: "维森特轻声叹气，专注于眼前的任务。"
 brazil_lacerda.59.t: "试飞员"
 brazil_lacerda.59.desc: "维森特坐在一间简陋的房间里，面前是一张简单的木桌，这已经是他自直升机事件以来经历的第十几个审讯房间了。空军对飞行员击落民用飞机、误杀多人的行为极为不满，尤其是基于那架飞机是外星飞船的荒谬假设。调查已经持续了几个月，维森特逐渐意识到，他的飞行生涯可能要完蛋了，若处理不慎，甚至还可能因过失杀人而面临牢狱之灾。\n\n房门打开，两名男子走了进来，一人穿着空军制服，另一人穿着西装。西装男坐在桌子对面，空军军官则站在他身后，面无表情。“阿伦卡尔中尉，您好。”西装男率先开口，“我是巴西航空工业公司的，有一个提议想和您谈谈。”说罢，他从公文包中取出几份文件，推到维森特面前。“我们目前正在为空军开发一款新的航空项目，这是一款由巴西自主设计制造的地面攻击机，现在正在招募测试飞行员。”\n\n维森特拿起文件，封面赫然写着：巴西航空工业公司EMB-312“巨嘴鸟”。这个名字听起来有点滑稽，但文件中的数据却让人眼前一亮。虽然这架飞机的最高时速只有458公里，远不及他曾驾驶的喷气式“流星”战斗机近600公里的时速，但其装备的机炮、火箭和炸弹却让它成为一架小而精悍的武装战斗机。虽然并非专为空战设计，但它依然可以为国家效力，并且操作起来可能会相当有趣。\n\n“我不否认，这项工作有一定的风险，测试飞行本来就充满挑战。”西装男继续道，“但如果你在这个项目中表现出色，我们可以让你目前的麻烦都烟消云散。”空军军官点了点头，示意维森特认真考虑。“你只要在这里签个字就行了。”"
 brazil_lacerda.59.a: "维森特毫不犹豫地签了字。"
 brazil_lacerda.60.t: "相互保证分裂"
 brazil_lacerda.60.desc: "多·科托-席尔瓦与阿尔布开克·利马的会议陷入僵局。两人彼此深知对方的派系立场，这种针锋相对的关系让他们在翻阅最新核发展报告时，每一次停顿都像是一场微妙的攻防战，每一句话都夹杂着隐隐的火药味。当多·科托-席尔瓦读完手中的句子后，强硬派的利马颈部肌肉紧绷，显然已是极度不耐烦。\n\n“……这导致了上季度基础设施建设速度减半。”席尔瓦心中嘀咕：别再一脸不快了，阿尔博，我早就受够你们这些人了！我们手上有经过检验的先进技术，可以将我们推向与日本和美国并肩的高度，而你们这些抱残守缺的老古董却把所有进步的希望撕得粉碎！席尔瓦的恼怒逐渐升级，语气变得激烈起来：“我们现在只需要花一小部分预算，二十年后就不必在毫无意义的军备上浪费数以万亿计的钱，买成千上万双永远不会踏上战场的靴子！”\n\n利马依然板着脸，神情冷峻。“按照这样的局势，那些靴子迟早会派上用场——而且，是在我们的土地上。”他低声说。连他自己都不清楚，这句话到底是不是一种威胁。他深吸一口气，语气更加冷硬：“军队不仅是国家的支柱，有时候更是国家本身。它是调解者，是稳定的基石，是混乱的最后防线。这是我们稳定的唯一保障。而你，竟然寄希望于那些华而不实的火箭，来清除街头的老鼠和极端分子？简直荒谬至极！如果你今天执意推动这场预算的膨胀，那么，别指望你的政府还能得到任何理智的容忍。”说完，他站起身，转身朝门口走去。\n\n“还有，别再叫我‘阿尔博’，除非你希望今天的情况再发生一次。”"
 brazil_lacerda.60.a: "库存依旧空空如也。"
 brazil_lacerda.61.t: "核选项"
 brazil_lacerda.61.desc: "巴西驻华盛顿大使茹拉西·马加良斯在这自由世界（这地方总喜欢被这么叫）的首都干过很多岗位，这位大使倾向于同意如下论断：对美国好就是对巴西好；每当有摄像机镜头对准他时，他就会吐出这句标志性的格言。桌子对面坐着大名鼎鼎的亨利·基辛格，美国外交政策机器中久经考验、老而弥坚的齿轮。\n\n“大使先生，”基辛格的声音带着明显的巴伐利亚口音，“十分荣幸，我们在许多问题上都意见一致。这挺少见的，幕僚们从来不同意我的看法。”马加良斯轻笑，“当今局势恰如梅特涅所想，巨头冷战、剑拔弩张，德日对哥伦比亚和南美地区的入侵可能导致热战的爆发。我希望巴西能像1848年的俄罗斯帝国一样成为南美秩序的保卫者，粉碎这场叛乱。”\n\n“基辛格先生，我们的立场是一致的。为稳固我们的地位与共同的利益，我们认为应当准备……最终手段。”大使吞下最后一个音节，希望轻柔的钢琴和弦和觥筹交错之声能让这话的涵义含蓄一些。\n\n“好的，我完全理解，”基辛格严肃地嘟囔着，似乎并不惊讶。“要是局面变得不可收拾，最终手段也是一种选择。我会尽我所能，将你们的态度传达上去。”看着眼前这个混乱无序、冲突四起的世界，马加良斯的态度变得更加坚定。但过去片刻之后，这些想法又消失得无影无踪。"
 brazil_lacerda.61.a: "你觉得华盛顿这儿怎么样？"
 brazil_lacerda.62.t: "出访"
 brazil_lacerda.62.desc: "卡洛斯·拉塞尔达独自坐在戴维营宁静而优雅的房间里，漆黑的双眼凝视着壁炉，火焰在初春的寒意中微微闪烁，余烬发出隐约的红光。除了木柴燃烧的噼啪声，房间里唯一的声音便是时钟有节奏的滴答声。空气中弥漫着未曾说出口的沉重话语，如千钧般压在他的肩头。巴西的未来悬而未决。\n\n他调整了一下眼镜，目光掠过面前整齐摆放的文件。这些文件上的论据清清楚楚，黑白分明，但他明白，这场会面所需的不仅仅是事实与数据。他必须展现出一种令人信服的意志力，一种能够清晰阐述巴西需求的强大表达力。他需要让他们明白，更需要看到成果。\n\n窗户微微敞开，一股柔和的微风夹带着松木与湿润泥土的气息飘入房间。他瞥了一眼窗外，树木如一堵绿色的墙，无法带来任何安慰。他的思绪翻腾如潮：南美洲紧张的局势、敌对政权的崛起、法西斯渗透的传言——这一切都需要一个果断的回应。而这个回应，在拉塞尔达看来，绝不只是依赖常规武装力量。核武器不仅是威慑，它更是一种宣示，是自由世界的护盾。\n\n他深吸一口气，试图让自己平静下来。这时，门锁轻轻一响，随之而来的脚步声打破了寂静。美国国务卿走进房间，身后跟着几位总统顾问。他们的面容沉稳，丝毫未透露出真实的想法。"
 brazil_lacerda.62.a: "谈判即将开始。"
 brazil_lacerda.63.t: "返回基地"
 brazil_lacerda.63.desc: "维森特站在跑道旁，注视着亚历山德罗降落回到这片熟悉的土地。他绝不会当面告诉亚历山德罗自己有多么想念他，因为这可能会让这个缺乏经验的小子自满得不可一世，但他心里确实如此感受。\n\n“你好啊，小维！”亚历山德罗的声音几乎被引擎的轰鸣声淹没。他的笑容灿烂得如同一辆美式吉普车的车灯，显然还带回了一些纪念品。“好久不见！”\n\n这句话让维森特有些措手不及，他抬头望向云层，避开了亚历山德罗的目光。“是啊。”\n\n为了挽回颜面，维森特把自己推迟的新任务称作“兼职工作”，并带着这个迷途的旅人参观新的空军基地。亚历山德罗似乎带回了不少美式装备，军队的印章几乎无处不在，仓库里散落着标记着军方符号的木箱。卡其色的装甲车缓慢地在新铺的环路上行驶，穿过重新装饰的检查站。每个站点都有严肃的老兵驻守，他们的表情并未因基地的新面貌而有所软化。食堂里，人员有序地进出，如果你稍作停留，仍能闻到从门缝中飘出的费若阿达的香味。\n\n“看起来拉塞尔达的祷告应验了，不是吗？”亚历山德罗轻快地说道，带着一丝让人不快的优越感。“我已经不是几个月前站在这里的那个人了。”\n\n“嗯，我并不惊讶你这么想，”维森特带着一丝讥讽回应。他思索了一会儿，回头看向忙碌的车辆和繁忙的官员，然后深吸了一口气，略带无奈地说：“不过，也许你说得对。”"
 brazil_lacerda.63.a: "争端解决了吗？"
 brazil_lacerda.64.t: "使命召唤"
 brazil_lacerda.64.desc: "“巴西同胞们！今天，巴西的国运与各位休戚相关。此刻西非战火正酣，自由与暴政正展开生死较量：自由法国的勇士们正擎着戴高乐将军传承的火炬，与那所谓的泛非解放阵线殊死搏斗。这帮空有“解放”之名的散兵游勇背后，分明是境外势力敌视文明的黑手！\n\n西非战事，绝非无关痛痒的小小摩擦。得到境外势力支持的泛非阵线野心膨胀，已经对南大西洋的稳定构成严重威胁！难道我们要坐视豺狼撕碎友邦，任由毒藻在自由民主的海域恣意滋长？\n\n为此，我已签署总统令，授权巴西军队出兵介入。这不是轻率的举动，而是守护巴西人民的断腕之举！英勇的巴西将士将以巴西人民的英勇无畏，筑起鲜血浇筑的钢铁防线！\n\n美利坚的星条旗、法兰西的三色徽，此刻都与巴西雄鹰血脉相连！随着巴西在自由国家组织中发挥更大作用，我们正用实际行动向世界表明巴西担当领导者的决心！\n\n让我们团结一致、上下一心，昭告世界：巴西永远恪守职责！巴西的承诺重于泰山，巴西的意志坚若磐石！”"
 brazil_lacerda.64.a: "弗朗西丝卡盯着电视屏幕，一脸迷茫。"
 brazil_lacerda.65.t: "优先事宜"
 brazil_lacerda.65.desc: "总统办公室沉重的橡木门砰然关闭，响声在突然寂静的房间里回荡。戈登大使伫立原地，看着拉塞尔达双手紧握背在身后，在房间里来回踱步。\n\n“大使先生，”拉塞尔达开口时声音紧绷，压抑着怒火，“我必须直说，向西非派遣部队一事，我一直在……重新考虑……”\n\n戈登微微扬起眉毛，这个细微动作没有逃过总统的眼睛。“总统先生，”他平静回应，“根据之前的讨论，我以为巴西会加大投入。”\n\n拉塞尔达突然停下脚步面向大使：“你必须明白我正在多条战线作战。不仅有外部威胁，还有内部敌人。那些共产党人！就像寄生在国家墙壁里的老鼠，不停密谋破坏。我敢肯定他们都和瓦加斯分子勾结，随时等着把巴西推回深渊。他们就在我的政府里，大使先生，就在权力中枢内部。”\n\n戈登耐心聆听，观察着怒气冲冲的总统。“总统先生，我理解您面临的国内挑战，”他安抚道，“但西非局势需要共同应对。”\n\n拉塞尔达不以为然地挥手：“放心，大使先生，我从未放弃对自由法国的承诺，就像我们从未放弃OFN。巴西会保持现有经济支持力度，但目前确实无法增加军事援助。我实在力不从心。”\n\n“我理解您的立场，总统先生，”戈登回答时表情波澜不惊，将真实情绪深藏心底，“相信我们一定能找到双方都满意的解决方案。”"
 brazil_lacerda.65.a: "“我真心希望能，大使先生。”"
 brazil_lacerda.66.t: "将军们的困境"
 brazil_lacerda.66.desc: "内阁会议室里闷热难耐，拉塞尔达总统正主持着由战争部长戈尔贝里·多·科托-席尔瓦与数位将军及其幕僚参加的会议。几位老将军在座位上坐立不安，等待他们的总统开口结束这场煎熬。又一位文官以总司令的身份在这里对他们指手画脚——这正是强硬派最忌惮的情形，就连相对开明的将领们也只想赶紧回去处理军务。\n\n“欢迎各位，感谢你们为国效劳。”拉塞尔达微笑着开口，“很抱歉让你们久等。当然，我对各位保卫国家的能力深信不疑，也为自己耽误了各位保家卫国的要务致歉。”\n\n“今日我想谈谈半球防御学说。众所周知，这是美国遏制法西斯蔓延、守护西半球安全的战略方针。向美国同行取经对我们大有裨益——毕竟我们同样被德国与日本势力包围。但较之美国，这一学说对巴西更具现实意义，能够针对阿根廷——我国领土完整的最大威胁——以及巴拉圭。我们必须击溃它们。”\n\n会议室里响起一片低语，夹杂着理解与附和的声响。第三摩托化步兵旅指挥官清了清嗓子。拉塞尔达暂停讲话，向那位将军点头示意。\n\n“感谢总统接见。感谢您一直以来的支持。”将军说道，“在座各位都清楚国家面临的威胁。只要您提供充足的军费和资源，以我军的战略能力，保家卫国绝非难事。”"
 brazil_lacerda.66.a: "又是一场富有成效的会议。"
 brazil_lacerda.67.t: "自由的冰封前线"
 brazil_lacerda.67.desc: "费拉斯南极科考站的边界几乎每天都会爆发事端。德国人与阿根廷人的身影正以肉眼可见的速度逼近。\n\n虽然来自本土的补给线仍在运作，但运送的物资总是杯水车薪且姗姗来迟。御寒衣物勉强够防止冻伤，却不足以驱散刺骨严寒；配发的武器也总比正规军落后半代。\n\n随着拉塞尔达政府与华盛顿愈发亲密，德阿两国对科考站的态度比预期更加冷淡。指挥官终日忧心忡忡——他们会不会突袭基地？会不会破坏发电机？\n\n卡马拉上将号靠岸时，士兵们本以为又是例行补给。水手们卸货时却发现了厚实的毛皮大衣、最新的制式步枪，甚至还有少量慰藉身心的烈酒。物资搬上岸的那一刻，欢呼声在冰原上回荡。\n\n最后几个板条箱底藏着总统卡洛斯·拉塞尔达的亲笔信：\n\n“致最勇敢的陆海军将士：你们在极境中守卫自由边疆，抗击法西斯爪牙，捍卫我们的生活方式。请记住，总统深知你们的艰辛，全体巴西人民都感谢你们的付出。”"
 brazil_lacerda.67.a: "多送些酒来，这里老冷了。"
 brazil_lacerda.68.t: "新命令"
 brazil_lacerda.68.desc: "门一打开，阿尔维斯上尉走了进来，手里拿着一张纸，营房里的士兵们立刻匆忙站好，立正敬礼。\n\n“放松点吧，”他随意地向手下敬了个礼，然后看到角落里正在进行的扑克牌游戏。士兵们稍微放松了些。阿尔维斯并不是那种典型的巴西军官，他似乎真心关心他的士兵。\n\n“今天有什么新任务，上尉？”一名满脸胡茬的中士一边给他的枪上膛，嘴里叼着一支烟，问道。“你可不常来我们这些可怜的陆军士兵这儿串门。”\n\n阿尔维斯上尉轻笑了一声。“啊，我还以为你们都盼着周末能来参加我的烧烤呢。”营房里的其他士兵都笑了起来。“不过，我今天来是告诉你们，新的命令刚刚下达。一周后我们要前往南太平洋。所以，赶紧开始收拾行装，做好准备。”\n\n几名士兵兴奋地欢呼起来，但大多数人都显得很震惊。连那名中士听到这个消息时也愣了一下。“去哪里？南太平洋的哪个地方？那地方可不小。”\n\n“我们要和OFN的伙伴们一起，驻守在澳大利亚北部的几个岛屿，任务主要是阻止日本人的行动。我敢说，那里一定有些美丽的姑娘等着你们去见识。”\n\n“只要不是非洲，我就没意见，”中士说着，又继续给他的枪上膛。“不过，那可真是个遥远的地方。”"
 brazil_lacerda.68.a: "“但命令就是命令。”"
 brazil_lacerda.69.t: "按部就班"
 brazil_lacerda.69.desc: "办公室里，拉塞尔达正看着电视。这是台从美国进口的新型彩电，能让他的形象在屏幕上更加清晰。\n\n“拉塞尔达政府今天发表声明称，巴西将正式承认日耳曼国和日本帝国于过去二十年间犯下的‘反人类罪行’。”播报员说话的同时，拉塞尔达发表演说的影像出现在了画面的左上角。\n\n几小时前的拉塞尔达如今正在电视上滔滔不绝。“德国和日本在其征服领土上实施着毫无意义的暴行，不论是在东欧的奴役和奸淫，还是在南太平洋的剥削和压迫，都不会也不应被历史所遗忘。”\n\n拉塞尔达扬起嘴角。虽然他有意避开不谈日本在中国的所作所为，但东京必不会因此善罢甘休。他已经能想象到两国大使找上达·库尼亚，向其讨要说法的场面。不过，这不正是外交部长的职责所在吗？\n\n拉塞尔达忍不住笑了。任这群人渣鬼哭狼嚎去吧，他在会上说的一切，那种种杀戮和酷刑，尤其是针对欧洲犹太人的大屠杀，都是字字为真、句句属实。证据就摆在世人面前，他不过是在阐述事实罢了。"
 brazil_lacerda.69.a: "而巴西将会站在史书中正义的一方。"
 brazil_lacerda.70.t: "拉塞尔达，美国人的总统"
 brazil_lacerda.70.desc: "拉塞尔达的办公桌上摊着一份《联合日报》，幕僚已用红笔圈出萨穆埃尔·魏纳的专栏头条——《拉塞尔达，美国人的总统》。总统认真读着文章，只见魏纳将他的执政描绘成唯美国马首是瞻，全然不顾巴西利益——从与OFN深化关系可能让巴西人再次为异国战争送命，到其经济政策为美国商人剥削勤劳的巴西百姓大开方便之门。总统怒不可遏地抓起电话，另一头的外交部长瓦斯科·达·库尼亚尚在晨起更衣。他匆忙赶赴这场突如其来的会面，面对一反常态焦躁的总统。\n\n“卡洛斯，我不明白你为何如此焦虑。我们的政策明明让巴西更安全了。有华盛顿撑腰，阿根廷那些虚张声势根本不足为惧。这不过是危言耸听，不，根本是瓦加斯派的污蔑，和竞选时如出一辙。”外交部长说着，暗自怀念温暖的被窝。\n\n“必须有所回应！不能让选民觉得我是美国傀儡。我们要夺回舆论主导权。若因此败选，所有安保成果都将付诸东流。听着，只需向民众展示政策实效，用行动淹没瓦加斯派的聒噪。若能联合OFN彰显其支持带来的安全保障，舆论风向自会扭转。”\n\n“好主意，我马上联络OFN的同僚。”二人继续商讨细节，达·库尼亚部长心底仍惦记着那张柔软的大床。"
 brazil_lacerda.70.a: "也许一次军事演习能达到目的。"
 brazil_lacerda.71.t: "核动议"
 brazil_lacerda.71.desc: "“总统先生大驾光临，本馆不胜荣幸。”林肯·戈登大使给自己倒了杯酒，“有兴趣尝尝我家乡的酒吗？”\n\n“不用了，谢谢，大使先生。”巴西总统卡洛斯·拉塞尔达抬起手来，示意不必：“我的时间有限，客套话就免了吧。”\n\n也行。”戈登坐下来，把威士忌放在桌上。“所以，总统先生，美利坚合众国能为您做些什么？”\n\n拉塞尔达双手抱胸，靠在椅子上：“几个月前，我们简要讨论了扩大防务合作的可能性。”\n\n“军购，生产许可，军事训练。我记得的。”\n\n“是的，是这些。但我想谈更实质的内容。”拉塞尔达张开双臂，眼中闪过一道寒芒。“我想讨论美国支持巴西核项目的问题。”\n\n戈登眨了眨眼睛，要是他把那酒喝了下去，此刻定会呛到：“啊，嗯，我可以帮您在美国游说有关人士。但，总统先生，我无法保证成——”\n\n“请您一定。”拉塞尔达说，“尽您力所能及的一切努力，我们没时间了。阿根廷的项目每天都在迅速推进。绝对不能让他们搞到核原料。”\n\n拉塞尔达的保镖上前示意，预定的会面时间已经结束。他们互相告别，拉塞尔达从地下停车场离开，而紧张的戈登拿起电话，汇报拉塞尔达的要求。"
 brazil_lacerda.71.a: "片刻之后，美国总统拿起听筒询问细节。"
 brazil_lacerda.71.b: "一位助手告诉戈登，相信自己的判断。"
 brazil_lacerda.72.t: "伸出的手"
 brazil_lacerda.72.desc: "自从大使馆会面之后，拉塞尔达一直暗自期待着美国对巴西核武器计划的支持。这种希冀挥之不去，无论是在内阁会议上、公开露面，还是军事简报中，他的思绪总会不由自主地回到那个请求上。他急切地想知道，谈判进展如何？他们会不会答应？\n\n某个签读文件的寻常午后，秘书探头进了办公室：“总统先生，戈登大使在1号线上。”\n\n拉塞尔达礼貌地点点头，待秘书离开后，他立刻抓起电话。“大使先生，下午好！有什么好消息吗？”\n\n“总统先生，下午好。我已获授权代表美利坚合众国总统进行谈判。”\n\n拉塞尔达将手捂住听筒轻声欢呼，心中喜悦难以言表。他迅速恢复镇定，把电话贴回耳边。“真是个好消息，大使先生。我们的合作定会——”\n\n“容我说两句。我得提醒您，这将是我们最后一次在正式会议之外讨论这个问题。之前的合作很愉快，但我要明确一点，我代表的是美利坚合众国的利益，不是巴西的利益。我希望您能明白，我不会因过去的私谊做出特殊关照。”\n\n“当然，大使先生。”拉塞尔达嘴上应道，但在心里，他觉得已经自己赢了。戈登语气的冷峻并未引起他的注意，他满心以为自己胜券在握，为即将获得美国的支持而感到兴奋。"
 brazil_lacerda.72.a: "一点一点地，他为自己的失望埋下了伏笔。"
 brazil_lacerda.73.t: "北方的同意"
 brazil_lacerda.73.desc: "在过去的十五分钟里，林肯·戈登和卡洛斯·拉塞尔达分别坐在他们的办公室里，收听着美国参议院会议的外部新闻广播。前者如同困兽般在空荡荡的办公室里来回踱步，每听到一张反对票，仿佛都感觉到脚下的地砖在一块块被移走。而后者则保持着谨慎的乐观，每听到一张赞成票，就像在胜利之路上又铺了一块砖。\n\n这种紧张的状态仅持续了几分钟。除了开头的几张反对票外，赞成票很快占据了压倒性的优势；议长敲响法槌，确认了美国对巴西核计划的支持。当这个消息传来时，拉塞尔达的办公室里爆发出一阵欢呼声。有人拿出了庆祝用的酒瓶，将酒倒进了高脚杯中。拉塞尔达靠在椅子上，脸上浮现出微笑，乐观的情绪如同温暖的毯子包裹着他。\n\n与此同时，林肯·戈登瘫倒在他办公室的沙发上，像个泄了气的气球。焦虑感逐渐从他体内消退，只剩下一种平静的麻木。他的名誉得到了保障，他已经尽了自己的职责。他的恍惚状态被电话铃声打断。他缓慢地起身，踱步走向办公桌，拿起电话，凑近耳边。“早上好，戈登大使。”\n\n“是我，拉塞尔达！”电话那头传来兴奋的声音，透着喜悦的激动。“我只是想感谢您在促成这一结果上的支持。我刚刚与贵国总统通了电话，并向他表达了对您在整个过程中的职业精神的深深感谢。”\n\n戈登绕过办公桌，坐了下来。“哦，谢谢您，总统先生。”事实上，他觉得自己并没有为拉塞尔达做什么——他只是像往常一样，出于美国的最佳利益行事。但他不会拒绝这番赞美。"
 brazil_lacerda.73.a: "原子的秘密向巴西揭示。"
 brazil_lacerda.73.b: "如同普罗米修斯一样，我们将火种赐予巴西。"
 brazil_lacerda.74.t: "南方的支持"
 brazil_lacerda.74.desc: "拉塞尔达用笔轻轻敲击着桌面，节奏稳健而持久。他要求与顾问独处，没人能猜测这是否源于自信或不安，但大家都尊重了他的意愿。此时，只有他和一台连接着参议院会议室的扬声器，正播报着最新的投票进展。\n\n如他所料，最初的赞成票接连而至，几乎所有全民盟的参议员都全力支持这个计划，就连社进党也纷纷表态支持。他露出了微笑，看来阿德马尔的阵营也意识到了这一决策的必要性。每一次敲击桌面的声响，似乎都在为这一新的支持增添分量。\n\n当然，反对的声音也不乏其人。工党几乎总是借机反对他，国家安全这种小事又怎么能阻止他们呢？即便在自己的党内，也有几位同情心泛滥的议员提出异议。他在纸上熟练地记下了他们的名字，随后继续有节奏地敲着桌子。\n\n最终，反对者寥寥无几，赞成票占了主流；巴西正式决定与美利坚合众国一同迈入核时代。在隔壁房间，他听见了欢呼声。拉塞尔达站起身，打开与会议室相邻的门，融入了庆祝的行列。香槟瓶塞如子弹般飞向空中，欢庆的氛围中，他能感受到心脏砰砰直跳。"
 brazil_lacerda.74.a: "拉塞尔达的心早已飞向了天外。"
 brazil_lacerda.74.b: "他们笑纳了我们的礼物。"
 brazil_lacerda.75.t: "北方的否决"
 brazil_lacerda.75.desc: "他一直在苦苦思索其中的原因。他原以为一切都在按计划顺利进行，家乡的民众必定会支持他们的行动。他深知这些人的需求和想法——这些曾经让他自信满满的因素此刻却变得遥不可及。“阿根廷是个大问题，总统先生，”他曾这样说过，“美国支持巴西，这符合他们的最佳利益。”总统也曾表示赞同！那么，为什么事情会走到这一步？为什么结果会背道而驰？\n\n林肯·戈登独自坐在办公室里，脑海中浮现的是一种庆幸——投票之后，他并不需要解雇任何助手。尽管最初的赞成票被迅速涌起的反对浪潮所淹没，但真的可以称之为“突如其来”吗？他自嘲地笑了笑，倒了一杯烈酒。每天他都能读到《纽约时报》和《华盛顿邮报》，听取每日的汇报，参加每周的会议，接待来访的国会议员和商人。但他已经很久没有回过美国了。在这个他如今身处的远方，他是否错过了什么？\n\n电话突然响起，自投票以来，这个电话几乎再也没有响过。秘书在这段关键时期屏蔽了大多数来电。现在，剩下的来电者只可能是两个人之一，而他清楚电话那一头绝不会是美国总统。叹了口气，他接起了电话。\n\n“戈登大使，”电话那头传来卡洛斯·拉塞尔达的声音“到底发生了什么事？”\n\n“早上好，总统先生。”戈登迅速回应，心里却在暗骂自己反应得太快，显得疏离而冷淡。“我理解您的沮丧，但——”\n\n“我还以为我们已经达成了共识！”拉塞尔达的声音瞬间变得尖锐，戈登下意识地将话筒拿远了一些。“难道这一切都是谎言？你们是在哄骗我吗？”\n\n“总统先生，请您冷静下来，听我说——”\n\n“算了，见鬼去吧！我还以为你们美国人是讲信用的。没关系，没关系。”"
 brazil_lacerda.75.a: "“无论有没有你们的支持，我们都会继续做下去。”"
 brazil_lacerda.76.t: "南方的反对"
 brazil_lacerda.76.desc: "震惊的拉塞尔达站在参议院会议室的中央，副手们围着他，头顶的风扇卷着弥漫着烟味的空气。闭路广播播送着参议院的投票进程，它将决定巴美条约的命运。他本以为胜券在握，但当他听见广播另一头传来的异议声浪时，他感觉天都塌下来了。\n\n“记下他们的名字。”拉塞尔达咬牙切齿地对副手说：“记下这帮人他妈的名字。我要看看是谁在忤逆我。”他已经开始了：他手里拿着铅笔，记下每一个投反对票的人。拉塞尔达转过身去，眨了眨眼，试着扫去脑海中繁杂的思绪。他往窗口走去，打开窗通风。但新鲜的空气也没能让他的脑袋清醒过来。他的心依然在愤怒地号叫。拉塞尔达看着窗外喧嚣的巴西利亚：车流熙熙，行人攘攘，但没有人注意到正在这里发生的事。\n\n“总统先生，”从北门走进来的副手说，“戈登大使回电。”\n\n拉塞尔达攥起了拳头：“行，好。我回办公室就接。”他重重地甩上门，快步赶到电话前，拿起听筒：“大使先生。我——我很抱歉——”\n\n“拉塞尔达先生。”林肯·戈登说，“我刚刚和总统通了电话。他想知道现在是什么情况，以及你准备怎么应对。”\n\n他告诉戈登，情况仍然可控。这场灾难后，全民盟的高层将有一场大换血。但正在打电话的拉塞尔达感到自己的脚下已经不再牢固。如果他找不到新的落脚点，他和他的统治势必毁于一旦。"
 brazil_lacerda.76.a: "于是，他带着自己的宝贵计划，潜入黑暗。"
 brazil_lacerda.76.b: "只有抛弃这块松动的地面，才有一线生机。"
 brazil_lacerda.77.t: "远山之外"
 brazil_lacerda.77.desc: "夕阳逐渐沉入地平线，金黄色的余晖透过宴会厅的精致玻璃洒在室内，给整个大厅蒙上了一层柔和的光芒。厅内寥寥数人正在低声闲谈，他们来得有些早，距离主活动的开始还有一个小时，工作人员们正忙碌地布置场地。这场荣誉舞会是专为那些在战争期间前往英国的巴西英雄们举办的。\n\n当拉塞尔达走进大厅时，灯光瞬间亮起，驱散了黄昏的余韵，照亮了四周装饰华丽的墙壁。他站在门口，环顾了一圈，觉得这样的精致舞厅是为这次活动量身定做的，既不失庄重，又充满着对英雄们的敬意。\n\n“拉塞尔达！没想到你来得这么早。”一声熟悉的声音从人群中传来，“过来，我给你介绍几个人。” 拉塞尔达一听便知道是马斯克林·德·莫赖斯，他是战争期间带领巴西远征军前往英国的指挥官。\n\n拉塞尔达大步走过去，德·莫赖斯虽然是这群人中年纪最大的，却依然挺拔有力，脸上洋溢着活力，显得比许多年轻人还精神。他身边站着几位穿着整洁制服的远征队老兵，彼此间流露出的兄弟情义不言而喻。当拉塞尔达走近时，他迅速握住了德·莫赖斯的手：“今晚能见到您，真是我的荣幸。”\n\n德·莫赖斯笑着回应：“彼此彼此，不过别理我这个老头了。内斯托刚才正讲他在伦敦附近抓住几名德国士兵时的趣事，老实说，这故事可把我笑翻了！”他笨拙的笑话引来了一阵善意的笑声。\n\n“确实是个好故事。”一个熟悉又出乎意料的声音从身后传来。拉塞尔达转过身，见到前总统恩里克·特谢拉·洛特正朝他走来，面带微笑，伸出手：“很高兴见到你。”他真的来了。\n\n拉塞尔达握住了洛特的手，但低声提醒道：“今晚别提那些事。”"
 brazil_lacerda.77.a: "“今晚别提那些事，”洛特同意了。"
 brazil_lacerda.78.t: "对抗公牛"
 brazil_lacerda.78.desc: "“总统办公桌上的报纸头条写道：‘阿德马尔——圣保罗有史以来最大的腐败丑闻’。拉塞尔达、塔沃拉和部长们正策划如何打倒公牛。\n\n‘我们等到今天，就是为了这一刻。这是我国历史上前所未有的丑闻，阿德马尔已经烂到了根子里，我们要做的就是让他再也没脸面对公众。’总统说道，心里深知机不可失的道理，‘全国所有报纸都会报道这一消息，民众再也无法对阿德马尔的罪行一无所知。’\n\n‘我们要让全巴西都知道这件事，成立委员会调查他的罪行，并通过《巴西之声》广而告之。所有人都将知晓他所犯下的种种罪行！同时，我们会将他的党羽一网打尽，确保这种事不再重演。’拉塞尔达边喝水边说道。\n\n塔沃拉感到有些犹豫，拉塞尔达会不会干得太过火了？“您确定吗？您应该清楚这样无异于宣战吧？社会进步党不可能束手就擒，而且温和派又会怎么想？肯定会觉得我们有些过分，跑去跟阿德马尔结盟吧。”\n\n拉塞尔达思索了片刻，答复道：“我知道，但我觉得，如果能消灭阿德马尔对巴西的威胁，政界出点动静也没什么大不了。我们还是应该确保他没有能力毁灭国家。”乌鸦做好了攻击的姿态，飞出了房间。"
 brazil_lacerda.78.a: "光天化日下，乌鸦出击了。"
 BRA_lacerda_vs_adhemar_tooltip: "无论政治方面付出什么代价，我们必须揭露阿德马尔党羽的腐败行径。是否成功取决于我们怎么应对腐败，快点行动吧。"
 brazil_lacerda.79.t: "鸦群蔽空"
 brazil_lacerda.79.desc: "“销毁。全部销毁。一张纸都不能留。”\n\n阿德马尔焦躁地在办公室踱步，幕僚长劳多·纳特尔抱着一整摞文件僵立着。若是换了别人上位，阿德马尔或许还能周旋——偏偏是卡洛斯·拉塞尔达，这个对他乃至整个社进党都深恶痛绝的宿敌。\n\n“全部？真要全部销毁？”劳多额头渗出汗珠，“这只会坐实我们的罪名！他们现在跟猎犬似的嗅探党派资金流向，销毁记录等于自投罗网！”\n\n阿德马尔感到胸腔发紧。他抓乱精心打理的头发，书架上的每份档案都在刺痛神经。若当年胜选的是自己……“就说是行政疏漏，找个替罪羊。”他抽出几本卷宗摔在桌上，“再让报社炮轰拉塞尔达，必要时动员整个圣保罗。他要战，我们便战。”\n\n劳多将整摞文件塞进碎纸机，机械碾碎纸张的声响撕扯着空气。“那……特殊度假地呢？”阿德马尔一时语塞。他当然留有后路，但此刻尽量不去想这些。"
 brazil_lacerda.79.a: "“我熬过了一次流亡，自然能熬过第二次。”"
 brazil_lacerda.80.t: "眼泪与毒蛇"
 brazil_lacerda.80.desc: "今天是圣保罗市法院平静的一天，而警察找上了埃德加的门。\n\n过去的一个半小时里，他正在抄录法庭记录，偶尔歇一下，嗦一口咖啡。最近的反腐行动开始后，法院里就堆满了嫌疑人的卷宗。他负责的正是把这些东西记录下来。实际上，他不在乎加班，他儿子的大学学费几乎是只吞金兽。世上没有摇钱树，要想支持自己的儿子就只能勤勤恳恳地工作了。\n\n他的沉思被两个突然闯入的粗鲁警察打断了。他们推门而入，直接冲到了他桌前。他才来得及瞥了他们一眼，就被摁在了桌子上，他的眼镜也被压碎了。“喂！我干什么了！警察先生！”他大喊道，脸上传来了剧痛。一名警察给他戴上了手铐，另一人则开始洗劫他满当当的柜子。\n\n“埃德加·莫雷拉，你涉嫌十二项受贿罪和腐败罪。不许抵抗，否则我们有权升级强制手段。”\n\n他的大脑一片空白。腐败？贿赂？上帝作证，他一直都是个有荣誉感的职员。一开始，他只是拿了一点点钱来打点一下。毕竟，钞票就是这座城市运行的方式。很显然，按这个逻辑，哪怕是和社进党有一丝丝关联的人都会被判有罪。他挣扎着反抗警察，膝盖的剧痛让他一个趔趄。“请求支援，嫌犯暴力抗法！”警察大喊道。"
 brazil_lacerda.80.a: "埃德加将在医院里躺两个星期，然后在监狱里蹲四个月。"
 brazil_lacerda.81.t: "底牌"
 brazil_lacerda.81.desc: "幕僚们一再向他保证，阿德马尔倒台指日可待。每逮捕一人，他们都说离揭露其真面目更近一步；每查封一处资产，他们都说是在编织其罪证锁链。他们说得天花乱坠，却错得离谱。收音机里传来那人尖锐的嗓音，声嘶力竭地控诉政府独裁专制，在拿不出罪证的情况下迫害无辜。此刻他的声音正通过电波传遍全国，高呼自己清白。\n\n拉塞尔达关掉收音机。一切努力都徒劳无功——无论逮捕多少亲信，阿德马尔始终纤尘不染。他永远游离于关键会议之外，永远与黑金交易和暗室操戈隔着三重帷幕。从社进党牵出的线索千头万绪，却无一能牵出阿德马尔。\n\n他重重跌坐回扶手椅，试图理清思绪。吸气。呼气。换个角度破局。何不直取要害？拉塞尔达深知此人满身污秽，每次礼节性握手时都能感受到对方掌心的黏腻。既然斩断羽翼无济于事，何不直捣黄龙？这固然是场豪赌，但若稳妥之策皆无胜算……\n\n“该死！”拉塞尔达咒骂着抓起听筒，拨通了那个他发誓不会在此时叨扰的号码。\n\n铃声在卧室炸响时，床上的两人惊得弹起。拉斐尔·马加良斯从被单里探出头，先看了眼女伴——若教会发现自己仍与她私会……接着望向电话。颤抖的手从被单中伸出，抓起听筒又迅速缩回，宛如受惊的乌龟。“呃……哪位？”\n\n“拉斐尔？我是卡洛斯。别问我怎么知道你在这儿，仔细听好。”"
 brazil_lacerda.81.a: "“明早和警察总长一块儿来我办公室。抄了瓜纳巴拉的社进党办公室。这是我们最后的机会。”"
 brazil_lacerda.82.t: "公牛顿首"
 brazil_lacerda.82.desc: "砰砰。\n\n“……销毁不完了，天杀的碎纸机快被塞满了……”\n\n砰砰。\n\n“……全部。虽然他们漏掉了一些文件，但我们不能留在这儿了……”\n\n砰砰。\n\n“……阿德马尔？阿德马尔！”\n\n阿德马尔猛地回过神来，胸口难受得像压着块巨石。劳多一直冲他讲着什么。自己刚才走神了多久？那场突击搜查之后，他的人生就演变成了一场噩梦，不知何时才能醒来。他最终还是被拉塞尔达将了一军，落入法网的证据足以将他乃至整个社进党打入大牢。这一次，他没有信心能够逃过一劫。\n\n劳多依然讲个不停，但在千言万语中，他只听清了两个词：“销毁”与“有罪”。怦怦的心跳声、滴答的时钟声，在此刻宛如惊天巨响，震耳欲聋。昨日的阿德马尔会坚守阵地，而今日的阿德马尔只能落荒而逃。"
 brazil_lacerda.82.a: "这个时节，去伊比利亚再合适不过。"
 BRA_adhemar_flees_tooltip: "乌鸦大胜，圣保罗的公牛被迫远走伊比利亚。"
 brazil_lacerda.83.t: "堂吉诃德"
 brazil_lacerda.83.desc: "熙熙攘攘的皮涅鲁斯咖啡馆里，拉塞尔达的自负几乎要突破天际。他临窗俯瞰铁特河，仿佛湍急的水流都在他掌心蜿蜒。此刻的圣保罗俨然是他意志的延伸——直到塔沃拉副总统执意要撕碎这种幻觉。\n\n“总统先生，我们或许走错了这步棋。”副总统再次开口道，“容我复述这荒谬的剧本：圣保罗警方通过某种不可告人的渠道，得知本地政客涉嫌参与巴西利亚的惊天阴谋，于是调动防暴队当街扣押半数市政官员？”\n\n“你当真要在此时此地质疑我？维尔吉利奥，注意你的言辞。”总统厉声打断，“我们原本谈得很愉快，何必——”\n\n“总统先生，这件事非同小可。不仅程序可疑，单说铲除阿德马尔派系——这就像砸断圣保罗政治生态的承重梁。您就不担心我们抨击社进党和瓦加斯派的那些罪名，迟早会反噬自身吗？”\n\n“……维尔吉利奥，这些人是疯狗。”总统冷冷回答，“他们想买下整个巴西塞进保险箱！必须让他们知道，任何腐败行径都将付出代价。不能姑息，不能让步！”他突然暴怒地捶向桌面，惊得四周纷纷侧目。\n\n《圣保罗州报》的头条在他脑海中扭曲成毒蛇，阿德马尔阴鸷的面容在眼前晃动，圣保罗权贵们轻蔑的嗤笑在耳畔回响。这些道德真空的鬣狗，这些毫无底线的赌徒，他们正磨牙吮血等着将他撕碎。但他是正义的，而正义不会轻易屈服。"
 brazil_lacerda.83.a: "然而在他周围，是清一色的担忧面孔。"
 brazil_lacerda.84.t: "不协调的舞蹈"
 brazil_lacerda.84.desc: "圣保罗办公室的职员们无力地瘫坐在灼热的阳光下，仰视着悬挂的先知肖像——画中人阿德马尔·德·巴罗斯正露出政客式的微笑。有人翻动着笔记簿，将文件归档；有人伸着懒腰，在电话线缠绕的深谈中消磨时光。若非亲眼所见，谁又能想到这座办公楼正深陷共和国史上最严重的贪腐丑闻？\n\n十一点整，第一拨警察出现在窗外。他们要求检查文件，随后从后门涌入，撬开天台的暗锁，砸碎玻璃窗强行突入。有人制服上印着醒目的联邦黄色字样，有人只佩戴着当地警局徽章。当一整年的档案化作满地狼藉，当搜查令在眼前晃动，当意识到连执法者都一头雾水时，职员们战战兢兢地在办公室里走动，仿佛置身他人领地。\n\n这场精心编排两周的闹剧最终沦为荒诞剧。难道大费周章只为寻找一份根本不存在的文件清单？难道要洗劫一座早已被掏空的建筑？面对警察的质询，无论是会计、接线员还是专业人士，既无法证实任何指控，更无人能指明文件所在。当目睹每一层楼的混乱景象，所有目击者都意识到：就像散落一地的纸页，真相早已湮灭在这场连发起者都混沌不明的运动中。"
 brazil_lacerda.84.a: "一场成功的运动，其威力往往超乎自身的认知。"
 brazil_lacerda.85.t: "滑铁卢"
 brazil_lacerda.85.desc: "“谢了，埃丝特。”拉塞尔达将两份报纸并排摊在桌上，双手深深插入发间。\n\n《最后时刻报》头版赫然写着：“颜面尽失——圣保罗挣脱鸦爪”。该死的老滑头魏纳。“经过高原宫长达数周的猎巫行动，这场针对圣保罗的突袭最终以撤退告终。联邦警察总署今晨宣布，将暂停调查所谓‘严重危害国家机构的贪腐、挪用公款及暴力案件’。”\n\n“历经数月混乱搜查、荒唐庭审与无效调查，圣保罗市民终于可以安心入眠，前提是他们能暂时忘记卡洛斯·拉塞尔达仍是这个国家的总统。”\n\n更刺眼的是办公桌另一侧那份匿名电报，短短三段却字字诛心：\n\n“尊敬的总统先生：\n请允许我以最谦卑的姿态，为您近几周对我们事业的绝佳宣传致以诚挚谢意。虽然结局与您预期相左，但作为忠诚的国民，我衷心祝愿您下次能成功揪出真正威胁伟大祖国的蛀虫。\n——ADB”\n\n拉塞尔达确认窗外无人窥视后，将废纸团狠狠砸向半空。那些政客虚伪的笑脸在他脑海中灼烧——社进党与阿德马尔仍会继续他们的强盗行径。腐败并未如他承诺般被斩草除根，此刻伏案哀叹的，反而是他自己。"
 brazil_lacerda.85.a: "一切都是在浪费时间。"
 BRA_lacerda_loses_fight_with_adhemar_tooltip: "又一轮无趣的战斗，又一场重大的灾难。全民盟毫无长进。"
 brazil_lacerda.86.t: "永别了，死敌"
 brazil_lacerda.86.desc: "熹微晨光刺得他睫毛颤抖。窗台上插着一瓶本地产康乃馨。妻子握着他的手，可他连回握的力气都没有。太虚弱了，从洛尔德斯起飞的航班榨干了他最后一点元气。医生护士在周围来回走动，更换输液袋，更新病历卡。收音机在播放他听不清的节目。晨风掀起窗帘一角，拂过他惨白的面颊。\n\n他用游丝般的声音乞求一剂吗啡。胸膛好似被绳索勒住，心脏如紧绷的鼓皮，连微弱的跳动都是奢求。护士将针头滑进静脉。他开始回想这一生。壮志未酬，夙愿难偿。妻子仍握着他的手，可他已感受不到温度。他合上眼，感到身体连同痛楚正悄然消逝，仿佛意识正将它们一件件收入行囊。\n\n阿德马尔·德·巴罗斯的死讯数小时后传遍巴西。拉塞尔达只比全国早了几分钟得知——当时他正在内阁会议上听取汇报，秘书附耳低语时，他神色骤然空白，仿佛无法消化这消息。他闭目深吸一口气，随即起身。\n\n“诸位，”他边收公文包边宣布，“会议提前结束。伊比利亚传来消息，阿德马尔去世了。”有人倒抽冷气，有人低声祷告，而他已离场处理后事。这等显赫人物，纵使满身污点，也该落叶归根。他签发公文要求伊比利亚送回遗体，审阅那份措辞克制的官方唁电——他知道民间会有无数更动情的悼词，但官方只能止步于此。签完最后一份文件，拉塞尔达继续办公，仿佛方才什么都没发生。"
 brazil_lacerda.86.a: "仿佛这一切都是幻梦。"
 brazil_lacerda.87.t: "公牛陨落"
 brazil_lacerda.87.desc: "阿德马尔·德·巴罗斯咽下最后一口气时，晨光初透。\n\n他缠绵病榻数月之久，与拉塞尔达掀起的反腐风暴不无关系。尽管他声称自己身强体健，很快却只能卧床静养。最终他在家人陪伴中离世，据传幕僚长兼密友劳多·纳特尔始终守候在侧。\n\n圣保罗前州长的哀荣旋即如潮水般涌来。社进党唯一公认的合格继任者——小热图利奥·瓦加斯市长更是宣布要以国葬规格安葬这个满手污秽却政绩斐然的矛盾体，称如此规格才配得上“巴西政坛泰斗”。\n\n悼念浪潮席卷圣保罗乃至整个巴西时，卡洛斯·拉塞尔达盯着电视画面，心中唯有轻蔑。果然是天下乌鸦一般黑，瓦加斯派更不例外。他丝毫不想念这位“小丑政客”——那个把选民当提款机还要当面讥笑的跳梁小丑。直到此刻他仍无法理解，为何民众会对这等人物趋之若鹜，更遑论反腐调查启动时那些替他辩护的荒唐论调。\n\n但小瓦加斯一党依旧风头正劲。想到社进党乃至整个瓦加斯派，可能借着对故人的追思重新得势，拉塞尔达就觉得太阳穴突突作痛。生前未能扳倒的对手，死后仍是挥之不去的梦魇。"
 brazil_lacerda.87.a: "这不公平。"
 brazil_lacerda.88.t: "交易达成"
 brazil_lacerda.88.desc: "林肯·戈登端着一杯苏格兰威士忌，倚靠在晨曦宫阳台的栏杆上，眺望着远处的帕拉诺阿湖。湖对岸的房屋亮着灯，在宽广的湖面上投下粼粼波光。夜幕降临，夕阳躲入地平线下，湖水被漆黑的夜空染成了深紫色。\n\n“戈登先生！”一个熟悉的声音响起。他转过头去，对卡洛斯·拉塞尔达总统笑脸相迎。后者手上也拿着一个杯子，但在黑暗中看不清装了什么。拉塞尔达伸出一只手，戈登紧紧握住了它。\n\n“总统先生，”戈登回道，“恭喜，我听说您对谈话的结果很满意。”\n\n“彼此彼此。我们之前不也交流过吗？挺好，都挺好的。”拉塞尔达豪饮一口，“说到这个，我有同感，我们理应捍卫拉丁美洲有史以来最伟大的民主。”\n\n“我只是为美国谋利益，仅此而已。”戈登嘀咕道，啜饮起他的威士忌，“这会让阿根廷停下脚步。”他自己也停顿下来，小饮了一口酒，“希望能拖延他们的核计划吧。”\n\n“哦，布宜诺斯艾利斯会气得跳脚的，他们就这副德行。不过话说回来，这也是我们追求拥核的原因之一。但凡他们多配合一些……”拉塞尔达不再往下说，目光盯着杯中的饮料。“哎，这些都是后话了。你爱人好像在酒吧和那个写八卦的蠢蛋聊得火热，最好赶在她祸从口出之前过去。”戈登和拉塞尔达走进室内，把饮料放回服务员的托盘，换上一杯满的。"
 brazil_lacerda.88.a: "夕阳西下，华灯初上。"
 brazil_lacerda.89.t: "新开端之终末"
 brazil_lacerda.89.desc: "千代子脱掉鞋，迈进圣保罗城郊的逼仄公寓。电视里循环播放着拉塞尔达胜选的新闻，听到那个名字时她不禁打了个寒颤——这个企图把他们一家打成过街老鼠的政客，她连多听一句都嫌脏了耳朵。\n\n裕成正扒拉着午饭，抬头冲妹妹笑了笑。他瞧见千代子眉心拧成的疙瘩，自然明白她对拉塞尔达那些排日言论的愤懑。“他这种人居然能当选。”千代子往碗里盛着米饭，瓷勺磕在碗沿叮当作响，“阿德马尔都比他强太多了。”\n\n刚落座，电视里就传来拉塞尔达胜选演说的聒噪。她猛地撂下筷子：“关了吧。”裕成把音量拧到最低。他同样厌恶这个政客，却觉得妹妹反应过激。\n\n“拉塞尔达再猖狂，矛头对准的也是日本帝国，犯不着把咱们侨民都恨上。”\n\n话音未落，纯忠推门而入。“你俩以为这就是最糟的了？”他轻笑一声，“当年臣道联盟闹腾时，瓦加斯政府可是派兵围剿过日系人的。”他顿了顿，往事涌上心头——那段经历他始终瞒着家人，深知自己要对当年的腥风血雨负责。\n\n“孩子们，拉塞尔达掀不起多大风浪。反日浪潮总是此起彼伏，等民众新鲜劲过了，谁还记得这些疯话。”"
 brazil_lacerda.89.a: "巴西日裔孤独呐喊。"
 brazil_lacerda.90.t: "间谍猎手"
 brazil_lacerda.90.desc: "巴西堪称各国间谍的温床，尤其是日德两国的谍报网盘根错节。但今天，就是他们销声匿迹的日子——总统亲自下令，命科托-席尔瓦将军在全国范围内搜集间谍组织的罪证。\n\n“科托，行动前务必谨记。”拉塞尔达在办公室叫住正要离去的将军，“小心行事，别让这次行动演变成民众攻击我们的把柄。”\n\n将军颔首称是，却难掩困惑：“总统先生，若束手束脚，如何能将那些阴沟里的老鼠一网打尽？只怕又要让他们金蝉脱壳，继续潜伏在光天化日之下。”\n\n拉塞尔达若有所思，“那么……”\n\n“无需太过谨慎，不引起骚乱即可。”将军领命而去，一场针对全国间谍网络的清剿即将拉开帷幕。"
 brazil_lacerda.90.a: "稻米行动已获批准。"
 brazil_lacerda.91.t: "政治与警察"
 brazil_lacerda.91.desc: "在裕成看来，“自由区”实在是个讽刺的名字。每天无论有多少话想说，他都得紧紧闭上嘴——只要稍有差池，警察就会闻风而至。在这片名为自由的街区里，呼吸不到半点自由的空气。\n\n正记却是例外。他总是不吐不快，警棍与手铐的威慑对他毫无作用。这个天不怕地不怕的青年，偏偏是裕成最要好的朋友。\n\n某日结伴回家时，两人完全忘记了警方的存在，在暮色中聊起了时政。\n\n“菲德尔·卡斯特罗真是了不起！”正记激动地说。裕成对政治向来漠不关心，而作为社会主义者的正记自从古巴考察归来，胸中的理想之火便愈燃愈烈。“他就是第二个瓦加斯！要是能像他改造古巴那样改变巴西……”\n\n话音未落，裕成最恐惧的场景降临了。拎着警棍的警察从暗处踱出，嘴角挂着冷笑：“你们在聊什么呢？”他朝地上啐了一口，“巴西可不是你们这些人的祖国。这里容不得赤色分子撒野，更轮不到你们来指手画脚。”\n\n裕成浑身发抖。此刻只要说错一个字，立刻就会遭到毒打和拘捕。但正记依然昂首挺立：“宪法不是保障言论自由吗？您凭什么逮捕行使正当权利的公民？”\n\n警察的嘴角扭曲成狰狞的弧度，阴森的话语从他齿缝间迸出："
 brazil_lacerda.91.a: "“你们日系不是巴西人，不配享有言论自由。”"
 brazil_lacerda.92.t: "斩草除根"
 brazil_lacerda.92.desc: "科托-席尔瓦推了推眼镜，凝视着端坐在办公室阴影中的男人。浑浊的烟草气息在密闭空间里翻涌，几乎令人窒息。“将军，事态严重，不容低估。”紧闭的百叶窗缝隙中透出的光线在他脸上投下道道红痕，“您听说过臣道联盟吗？”\n\n“略有耳闻。”\n\n“那是巴西境内效忠日本帝国的恐怖组织。官方说法是战争年代就解散了。”他将黑色文件夹滑过桌面，“但我有证据表明他们仍在活动。这是潜伏在我国日系社区的间谍名单。”\n\n塞尔吉奥·弗勒里的食指按住了文件夹。这位新任圣保罗警长深吸一口香烟，席尔瓦终于明白对方为何坚持要面谈。\n\n“日本人向来善于伪装，可悲的是有些巴西人竟信以为真。”他摇摇头，周身烟雾缭绕，“无论繁衍多少代，无论生活在何处，他们骨子里的阴险秉性永远割不断。”\n\n将军刚要开口，弗勒里抬手制止：“但我们仍能在城里做些清理工作。只需要一点协助。”席尔瓦陷入沉思。总统曾告诫要小心行事，但显然局面已容不下这些客套。\n\n“那就放手去做，保持低调。我会给你资源和授权，务必将名单上的颠覆分子尽数消灭。”"
 brazil_lacerda.92.a: "尽皆拔除，不留后患。"
 brazil_lacerda.93.t: "自由区的晚餐"
 brazil_lacerda.93.desc: "“爸爸，能把盐递给我吗？”千代子说道。泷家的夜晚一如既往地平静。纯忠脸上挂着微笑，将盐罐递给女儿。晚餐时光是他们暂时忘却生活艰辛、享受天伦之乐的时刻。\n\n“今天在学校——”\n\n突然传来叩门声，又加重为两下捶打。纯忠起身查看，刚走到半途就听见门外传来男人吼叫。未及反应，门板便轰然碎裂。\n\n木屑纷飞间，几个壮汉破门而入。他们疯狂打砸目之所及的一切——碗碟、电视机、家具。辣椒水喷向千代子与裕成，二人蜷缩在地痛苦呻吟。纯忠被反铐双手按在墙上。\n\n“泷纯忠，你涉嫌为臣道联盟从事间谍活动，跟我们走一趟。”\n\n裕成浑身发抖。父亲只是个普通人，怎么会是间谍？“拉塞尔达！”他咬破嘴唇，“你这个婊子养的杂种！”原以为总统只是厌恶日本，此刻才明白他是无差别仇恨全体日系人。\n\n警笛声中，父亲被拖上囚车。千代子仍在呛咳流泪。愤怒？迷茫？绝望？裕成分不清胸中翻涌的情绪，但有一点无比清晰——这一切定与拉塞尔达有关。他攥紧拳头，指甲深深陷入掌心。"
 brazil_lacerda.93.a: "“那个畜生会付出代价的。”"
 brazil_lacerda.94.t: "滞留地面"
 brazil_lacerda.94.desc: "“女士们先生们，欢迎搭乘573号航班，我是本次的航班的机长托雷斯。我们即将起飞从圣保罗前往纽约，请在座位上系好安全带，注意安全。”机舱里响起广播，珍妮·马克斯望着窗外，准备度过又一段无聊的旅程。\n\n突然，两个男人冲上了飞机，一个人举着枪，另一人拿着刀，用扩音器向乘客们喊道：“这架飞机已被劫持，待在原地，没有人会受伤。”飞行员走出驾驶舱，本打算宣布起飞的消息，迎面却是黑洞洞的枪口。但正记没有开枪，相反命令道：\n\n“在我们的要求得到满足之前，这架飞机不许起飞。”\n\n珍妮吓坏了，一想到自己沦为人质，她顿时有了反抗的冲动。可反抗有什么用？白白死去，和丈夫天人两隔吗？于是她转而大声呼救，哭着祈祷自己能平安无事。\n\n裕成听见哭声，径直走向她的座位，用寒光闪闪的匕首作为威胁。珍妮立马闭上嘴，生怕自己最坏的设想成为现实。“冷静，小姐，只要他们释放我父亲，一切就会结束。”\n\n“别说了，裕成！”正记用枪抵着飞行员的脑门，要他维持机上的秩序，而后通过无线电，向塔台提出了他们的要求。\n\n“我的名字是正记，这架飞机现在在我的控制下。别想强攻，否则我们就杀光人质。我们只要求两件事，释放泷纯忠，停止针对日裔社区的过度执法。听明白了吗？”"
 brazil_lacerda.94.a: "“航空管制塔台，编号342，收到。”"
 BRA_lacerda_hyjacking: "这场危机将带来意料之外的后果……"
 brazil_lacerda.95.t: "危机会议"
 brazil_lacerda.95.desc: "“告诉我情况。”\n\n警察总长惴惴不安地看了看面面相觑的科托-席尔瓦和塔沃拉，又看了看满脸不耐烦的拉塞尔达，清了清嗓子说道：“总统先生，今天凌晨两点十二分，预定从圣保罗飞往纽约的573号航班被一伙日裔激进分子劫持。劫机者隶属于一个叫臣道联盟的组织，后者据信……”他停顿了一下，随后以沉重的语调继续道，“和日本帝国存在联系。”\n\n“老天，”塔沃拉发出一声惊呼，“他们有何目的？”\n\n“两小时前他们提出了一系列要求，归纳起来大致有三点。一是全面改革族裔政策，二是安排一架飞往古巴的飞机，三是释放几名据说未经审判就遭羁押的囚犯。”\n\n“未经审判？”拉塞尔达目瞪口呆，“无稽之谈，以为我们是纳粹德国吗？”\n\n“不管怎样，”科托-席尔瓦瞟了警察总长一眼，说道，“我们都得发表一份声明，一直拖着不是办法。”\n\n“我当然明白，席尔瓦。看在上帝的份上，可否请你守好本分，把政治交给我们来处理？”拉塞尔达说完，从椅子上起身，走到窗前向外张望。恍惚间，他仿佛看见自己站在黑压压的记者面前，对着眩目的闪光灯发表言论。届时他会说什么呢？"
 brazil_lacerda.95.a: "“我们不能，也不会为了人质的性命向恐怖分子低头。”"
 brazil_lacerda.95.b: "“保障机上人质的安全是我们的第一要务。”"
 brazil_lacerda.96.t: "紧要关头"
 brazil_lacerda.96.desc: "拉塞尔达坐在主座上，双手托着下巴，大脑飞速运转。两侧的阁僚纷纷朝他投来焦急的目光。早在竞选之时，他就预料到自己会经手各种难题，但处理一场劫机显然不在其列。\n\n屋外，抗议活动正愈演愈烈，照相机的闪光甚至透过窗户，打在了最高会议室的墙上。放在平时，如此级别的关注会让他喜笑颜开，但此时此刻，他只觉得人群是一个巨大的包袱。接下来的时间，他只是斜身靠在椅子上，目光死死盯着桌面，双手微微颤抖。要是有谁能接过他的担子，那该多好啊。\n\n“依我看，先生，”战争部长打破了沉默，“对于恐怖分子，只能打不能谈，他们也不会和我们谈，执意谈判只会让局面失控。我们应该出动军队，消灭这群害虫，让人民放心。”顷刻间，四周响起一阵热烈的掌声。\n\n“部长，我无意冒犯你和空军，”塔沃拉出言反驳，“但这样做无异于火上浇油。”部长翻了个白眼。“若是强攻，谁能预知他们的反应？鲁莽行事必然会将我国公民置于险境，避免惨剧的唯一办法就是对话。”\n\n总统深吸一口气。“换个角度想，这是巴西国内的问题，而那些人，”他用笔尖指了指窗外的抗议者，“还有恐怖分子、日裔居民、国会都会记住我们的选择。戈尔贝里，我理解你的强硬立场，至于维尔吉利奥，你的担忧也并非空穴来风。综上，我认为……”"
 brazil_lacerda.96.a: "“……要优先考虑人质，进行公开谈判。”"
 brazil_lacerda.96.b: "“……要全力隐蔽行踪，展开利落突袭。”"
 BRA_lacerda_hyjacking_negotiations: "我们将同臣道联盟的恐怖分子谈判。"
 BRA_lacerda_hyjacking_force: "我们不与恐怖分子谈判，强攻飞机。"
 brazil_lacerda.97.t: "乌鸦栖于钢索"
 brazil_lacerda.97.desc: "“我很高兴您做出了明智的决定，总统先生。”塔沃拉说道，他显然松了一口气。“现在谈判进行得并不顺利，但能在明天报纸的头条上印上被困公民的近况照片依然是个积极的进展。”\n\n拉塞尔达点了点头，把他打量这些照片时背后升起的一股寒意抛在脑后：“尽管如此，我们还是要小心。如果我们做出了太大的让步，他们一定会得寸进尺。”毕竟，拉塞尔达有些遗憾地想着，在劫机犯的压力下推行改革实在是有辱他作为总统的主见和良心。\n\n“是的。但我们也没必要做到那个地步。我很乐观地认为，允许他们飞往古巴并同意释放囚犯就足以达成妥协……”听着塔沃拉的话，拉塞尔达的脸上流露出了紧张的神色。\n\n“……但考虑到我们打交道的对象，我并不认为允诺比这两项条件更少的让步能成功。当然，政府里某些人的秘密逮捕行为也会公之于众，这无疑会打开潘多拉魔盒。但如果我们能够设立一个独立委员会来审查有关部门对嫌疑人使用武力的正当性，也许一些人会落马，但我们也能借此和丑闻划清界限。这就是我们能做的事了。”\n\n拉塞尔达摇了摇头，显然压力很大：“维尔吉利奥，你也看见提出和恐怖分子谈判的时候戈尔贝里是什么反应了。建立一个独立委员会无疑是在抽军方的脸。要是他们找上门来讨说法，那绝对会变成一场危机。”塔沃拉沉默着，低头看着自己手里的笔记本。除此之外，也没有别的什么好方法了。"
 brazil_lacerda.97.a: "“我们不能冒这个险。做出有限的让步，但是不要设立调查委员会。”"
 brazil_lacerda.97.b: "“这些人质终究是我们的公民。不要冒险，同意让步并开始谈判。”"
 brazil_lacerda.98.t: "圣保罗的孤街"
 brazil_lacerda.98.desc: "“那时我们年轻，轻率。”纯忠回忆起过去，战争、地下报纸、枪击、刺杀……那些危险在他脑海中像暗河般涌动，不断翻滚。\n\n卡车碾过路面上的坑洼，驶向一个他不知道的地方。这种无知他早已习惯，唯一清晰的感知就是背部和肋骨上不断传来的疼痛，淤青仿佛成了他身体的一部分。他咬紧牙关，强忍住不发出声响。尽管头上被套着布罩，眼前一片黑暗，他仍能感觉到身旁有个警卫。空气中弥漫着浓重的酒气，步枪冰冷的枪口轻轻顶在他的手臂上。\n\n“事情本不该是这样的。”他曾对一个老友低声说过，“我们伤害了他人。现在的巴西，平静多了。”他的话语中带着回忆，脑海里闪现着裕成和千代子的身影。\n\n卡车突然发出一声刺耳的刹车声，随之猛然停下。还未等纯忠反应过来，戴着手套的手重重地按住了他的肩膀，粗暴地把他拉下车。头套滑落，他还没等眼睛适应外界的光线，身体便失去了平衡，重重摔在沸腾的柏油路面上，炽热的地面烫得他皮肤发痛。“希望你学到了教训，蠢货！”弗勒里的手下发出讥笑，车轮扬起尘土，伴随着呼啸声驶离街角。\n\n纯忠确实学到了。在拘留中心，所受的折磨教会了他远比几十年自由生活更多的东西。他体验到了穿着制服的野兽们如何肆意折磨与嘲弄，痛苦赋予了记忆新的质感，那些曾经模糊的过往在疼痛中变得更为鲜明。纯忠再次回想起那夜与朋友的谈话，想起了千代子和裕成。如今阳光照耀在他的身上，清澈而炽热。\n\n他们永远无法得到安宁。巴西憎恨他们。"
 brazil_lacerda.98.a: "而臣道联盟不该停止战斗。"
 brazil_lacerda.99.t: "发表，镜头，现场"
 brazil_lacerda.99.desc: "钟声敲响正午时分，飞机的舱门终于在数日封锁后缓缓打开。外面的群众爆发出一阵欢呼，激动之情溢于言表，危机终于结束了。地面上，人群熙熙攘攘，从焦急等待的家属到亲自到场的总统拉塞尔达，无不聚集于此。\n\n“朋友们，今天是个伟大的日子。”拉塞尔达面对人群，声音洪亮而充满自信，“通过谈判取得的胜利，这架飞机上所有被困的人都得到了自由！他们的朋友和家人终于能再次相聚，重获安宁。”\n\n随着话音落下，珍妮从飞机上走了下来。迎接她的是拉塞尔达本人，这位被称为“乌鸦”的总统微笑着对她表示庆幸她能平安归来，并祝她一切安好。然而，珍妮却感受不到他言语中的安慰。相反，她只觉得这不过是拉塞尔达一次精心策划的政治作秀，用人质的安全换取自己的政治资本。"
 brazil_lacerda.99.a: "整个国家松了一口气。"
 brazil_lacerda.100.t: "起飞"
 brazil_lacerda.100.desc: "在最后一位人质获释后，裕成、正记和纯忠三人留在了飞机上。正记的喊声在飞机外都能听见，他要求飞行员立刻起飞。飞行员遵守了他的命令，飞机在跑道上滑行，然后起飞。\n\n“不知道千代子现在怎么样了。”泷纯忠说，他很担心自己唯一的女儿怎样了。巴西对待日裔的态度依然相当不友好，她却要在这么小的年纪独自生活下去。“我在想，孩子她妈妈会怎么看待把她抛下逃命的我。”\n\n泷裕成神色痛苦地看向他的父亲，抛下妹妹也让他很自责。“爸爸，她会没事的。”他正说着，飞机突然晃动了起来。但已经对不久前的可怕经历感到麻木的泷纯忠并没有什么反应。\n\n飞行员对着机内广播说：“请留在座位上，我们马上要在哈瓦那着陆了。”\n\n飞行员的话让他们想起了自己所面对的现实。他们身无分文，根本没法在古巴生活。他们只能希望政府或者这个岛国的人民会愿意接济他们。他们但愿如此。\n\n飞机在哈瓦那着陆时，警察已经包围了机场。一位警察拿起麦克风，大喊道：“留在飞机上！”他们的梦想破碎了。他们再次成为了阶下囚。"
 brazil_lacerda.100.a: "为什么要为不存在的自由而战？"
 brazil_lacerda.101.t: "直面恐惧"
 brazil_lacerda.101.desc: "房间里人满为患，镜头、麦克风和人群挤向演讲台，而拉塞尔达站在台后。他露出一个微笑，给镜头们提供了他们想要的画面。他总能知道他们想要什么。在正式开始讲话前，他深吸了一口气。\n\n“亲爱的公民们，今天，我们对攻击我国的恐怖主义做出了回答。为了保护我国免于恐怖主义的恐吓，我们必须做出牺牲。虽然我始终致力于贯彻自由与解放的原则，但我国的安全机关中依然出现了过度执法的情况。\n\n这些令人痛心的事件的肇事者已被惩处。而我也下定决心，我们绝不会被个别恐怖分子吓倒，以至于背弃这无可撼动的伟大自由。被我国安全机关不正当扣押的人将立刻获释，并且我在此承诺，此类过度执法行为绝不会再次发生。\n\n我们能够理解，他们是为了捍卫我们热爱的巴西祖国而犯下了错误。面对恐怖主义，好人也许会犯错。但我们不会忘记那些恐怖分子，他们煽动好人，让他们片刻间忘记了我们珍视的自由。\n\n正是这些恐怖分子的存在迫使好人做出艰难的选择。只有彻底铲除恐怖主义，好人们才不会被迫做出无法避免的艰难选择。他们将会在未来做出比过去更加明智且正确的抉择，但只要恐怖主义的威胁依然存在，好人们就依然会被迫做出艰难的决定。”\n\n演讲临近尾声时，麦克风们蜂拥而至，迫不及待地靠近他的脸。他露出微笑，挥了挥手，然后转身离开。"
 brazil_lacerda.101.a: "让我们祝愿，好人们再也不需要做出艰难的决定吧。"
 brazil_lacerda.102.t: "筹划行动"
 brazil_lacerda.102.desc: "“首先，我要称赞您的理性，总统先生，”战争部长多·科托-席尔瓦开口说道，“我很高兴我们在原则上达成了一致，绝不能让恐怖分子登上谈判桌。然而，很遗憾的是，军方内部在这个问题上可能无法完全团结一致。”\n\n拉塞尔达注视着席尔瓦，略显失望地叹了口气。他原本希望军方能有一个更明确、更果断的对抗性方案。“没关系，”他叹息道，“那么，还有哪些更合适的选择？”\n\n“您可能很难相信，但圣保罗方面居然认为他们的警察部门可以发起突袭，控制飞机。”拉塞尔达起初有些不以为然，但随后挑了挑眉，思索片刻后点了点头。“不过，我个人觉得这样做存在相当的风险。让一个地方组织负责这起牵涉飞机和国际行动的任务，这让我无法完全信任他们的能力。”\n\n“不过，不管怎样，这是他们自己的责任。”拉塞尔达若有所思地说道，“如果让他们来执行，即便失败了，我们也有了一个合理的推托之词。他们可能会失败，但至少这样，他们不会反过来责怪我们。这样一来，这栋大楼里的人也有了些许的安全保障。”\n\n“另一方面，军方也表示愿意协调并实施对飞机的突袭行动。甚至圣保罗警察局长弗勒里也特地打来电话，表示武装部队有能力妥善解决此事。然而，正如您所说，这也有相反的问题。我不希望看到这个国家的士兵在执行职责时受到指责或遭到抹黑。”\n\n拉塞尔达点了点头“好的，谢谢您的简报，部长。”总统办公室的门关上了，责任落在了他的肩上。"
 brazil_lacerda.102.a: "允许圣保罗武装力量进行这次行动。"
 brazil_lacerda.102.b: "允许军队进行这次行动。"
 brazil_lacerda.103.t: "恶念"
 brazil_lacerda.103.desc: "“所以你每天就吃这个？”珍妮问道，一把抓起偷运过来的炒饭。\n\n“当然，”眼前这个她只知名为“裕成”的绑匪微笑着回答道，“米饭相当健康，吃一碗管一天呢。”\n\n一天，一天是什么概念来着？如今的她几近丧失了时间感。所有窗户都被封得严严实实，舱内只使用应急蜡烛维持照明，自她的丈夫被带走后可能已经过去了几个小时甚至几天。\n\n“但我相信你除了米饭外一定还有其他喜欢的东西。话说回来，你不担心等这一切结束后你会落得什么下场，你会付出什么代价吗，而且你做这些又是为了什么？”\n\n裕成顿了一下，摇了摇头，“不，我一点儿也不担心。因为事情没那么简单。一直以来，我都想在这个国家尽情享受自我、享受人生。我热爱这片红土，热爱它的颜色，还有我的家人。这就是我心中的巴西。但我痛恨它的政府、它的警察，痛恨他们对我们的仇视。我经历了太多，也见识了太多，早就没什么好怕的了。所以，我丝毫不在乎明天会怎么样。”\n\n两人紧紧对视。随后枪声响起，爆炸过后，一群全副武装的警察用长达一米的防暴盾冲破了舱门。裕成旋即拿起步枪从座位上一跃而起，瞪大双眼。他将枪口对准了珍妮，此时此刻，任何谈话都再无意义。\n\n“不准开枪，否则我就开——”随着一声枪响，子弹从他的脑袋横贯而出，一颗鲜活的生命就此定格。血液横溅四周，裹挟着现实的炽热向她袭来。当警察示意她躲到自己身后时，她拒绝了。"
 brazil_lacerda.103.a: "自由与否已不重要，她瘫坐在地，泪如雨下。"
 brazil_lacerda.104.t: "邪心"
 brazil_lacerda.104.desc: "“所以你每天就吃这个？”珍妮问道，一把抓起偷运过来的炒饭。\n\n“当然，”眼前这个她只知名为“裕成”的绑匪微笑着回答道，“米饭相当健康，吃一碗管一天呢。”\n\n一天，一天是什么概念来着？如今的她几近丧失了时间感。所有窗户都被封得严严实实，舱内只使用应急蜡烛维持照明，自她的丈夫被带走后可能已经过去了几个小时甚至几天。恍惚间，她仿佛置身于纽约一家闷热的小餐馆，微弱的灯光映衬着她的脸颊，顾客的喃喃低语萦绕在耳畔。而此时此刻怀揣着无尽期冀的她或许再也无缘见到这份光景了。\n\n下一刻，枪林弹雨划破了机身，飞机伴随着人群的恐慌吱呀晃动。她听见了重物撞击的声音，那或许是临时桥梁碰到舱门的声音吧。当她看见武装人员向全机倾泻子弹和火力时，她才终于发现裕成已经被挡在了另一边。随后黑暗逐渐吞噬了她的意识。\n\n她迷迷糊糊地睁开双眼，看着地面上那滩不断向她逼近的血泊，那是一个小时前坐在她身后的人留下的血。几名身着白色衬衫的绑匪倒在地上，貌似裕成也是其中之一。当她被强行带离飞机时，她环视着这场彻彻底底的屠杀现场，反胃的感觉一下涌上心头，泪水夺眶而出，直至此刻，她才意识到自己能从那天的袭击中活下来是多么的幸运。"
 brazil_lacerda.104.a: "血渍终将洗去，灵魂永遭玷污。"
 brazil_lacerda.105.t: "错失良机"
 brazil_lacerda.105.desc: "圣保罗的主教座堂广场今天洋溢着节日的气氛。人群在圣保罗城的中心载歌载舞，庆祝劫机事件的解决和人质们的得救。视野里满是桑巴舞和红白的色彩。\n\n大约一个小时后，现场开始肃静起来。小瓦加斯市长在大都会教堂前开始了讲话，他要好好利用这个出镜的机会：“几小时前，最后一位被困在573号航班上的巴西人质已经得救，在此感谢我们的警察做出的英勇贡献。”雷鸣般的欢呼、喊叫甚至鸣笛声在刹那间一同响起。\n\n“因此，我要感谢塞尔吉奥·弗勒里警长，没有他，就没有这场行动的成功；没有他，被困的公民们就无法获救。”笑得合不拢嘴的弗勒里走出人群，骄傲地站在市长面前。在与市长握手并受勋后，他向人群敬礼，并退到小瓦加斯身后。\n\n“这场胜利，将给未来所有妄想伤害这座城市跳动的心脏的罪犯、绑匪、恐怖分子敲响警钟，因为我们在这里。妄图阻止我们、破坏我们自由的，将被迎头痛击；妄图加害我们的，必将粉身碎骨。最终，所有罪行都将被绳之以法；最终，所有罪犯都将无路可逃。谢谢大家，愿圣保罗繁荣昌盛。”\n\n在巴西利亚的办公室里，拉塞尔达关掉了电视，一言不发。把任务的主导权交给他们给了社进党政府施展本事的机会，从而进一步强化了社进党的力量。而他就是导致这一局面发生的蠢材。总统看向预测臣道联盟活动的最新报告，总统思考着把一切带回正轨的方法。"
 brazil_lacerda.105.a: "不要把你的问题推给敌人，万一他们解决了呢？"
 brazil_lacerda.106.t: "弗勒里之怒"
 brazil_lacerda.106.desc: "塞尔吉奥·弗勒里孤零零地坐在话筒前，指节无意识地轻叩着金属网罩。他颓然扫视台下尴尬的面孔，连市长都刻意与他保持距离，让他活像党代会上被孤立的布哈林派主席。真不懂阿德马尔等人是如何习惯这种记者会的。\n\n“昨日，圣保罗武装力量对遭劫持的573号航班展开突击行动，该航班原计划飞往纽约。此次行动旨在以最小伤亡解救被臣道联盟恐怖分子挟持的人质，终结这场危机。但根据最新统计，除劫机者外，共有37名乘客遇难，44人受伤。”话音刚落，台下此起彼伏的吸气声让他太阳穴突突作痛。\n\n“鉴于此，总统今晨宣布全国哀悼三日。”他停顿片刻。再度开口时，声线里已挟着压抑的怒火。\n\n“臣道联盟是群嗜血的狂热分子，他们残杀我国公民与友邦民众，勾结敌国势力，誓要将野蛮行径进行到底。在劫机事件中，他们不仅拒绝和谈，更率先向平民与警察开火。”此刻他几乎是在咆哮却不自知，“法律必将严惩这群暴徒！作为圣保罗警长，我在此立誓：从今日起，任何与该组织有关系者都将被逮捕并接受审判。我们必须为逝者伸张正义。谢谢。”"
 brazil_lacerda.106.a: "流血事件不会就此结束。"
 brazil_lacerda.107.t: "笑到最后"
 brazil_lacerda.107.desc: "拉塞尔达带着他那特有的迷人微笑走上了讲台，向围绕在四周的记者挥手致意。现场群情鼎沸，直到这位主角开始发表讲话，人群的喧闹才渐渐平息。\n\n“首先，我要感谢诸位的光临。巴西的公民们，今日，我们作为一个胜利的民族站在这里。曾有人妄图恐吓我们的国家，用平民百姓的鲜血威胁我们。”\n\n“他们囚禁你们的兄弟姐妹，还有父母双亲，用这些无辜的生命来勒索我们的国家。要挟称若是不满足他们的荒唐要求，他们就会让我国人民血溅当场。而今天，我们对这帮企图操纵国家的不轨之徒予以了有力打击。”\n\n“所有人质均已安全获救。感谢安保部门的辛勤付出，我们才能顺利完成营救任务。我们向敌人证明，巴西永远也不会任他们摆布。对于那些妄图用骨肉同胞的生命行敲诈勒索之事、让无辜之人血洒巴西土地的懦夫，我希望今天发生的一切是一种警示。只要我这个卑微的小总统在任一刻，你们的阴谋就绝对别想有得逞的那一天。安保部门会严阵以待，时刻准备捍卫巴西的合法权益，保护全体国民。”\n\n他再次面露微笑，向冲上前来采访的记者挥手致意。随后，他安静地转身离开，带着满面春风回到了办公室。"
 brazil_lacerda.107.a: "步伐轻松而又自信。"
 brazil_lacerda.108.t: "营救还是侦察？"
 brazil_lacerda.108.desc: "安全部长有些坐立难安。他握着面前准备好的演讲稿，一个字一个字的看着，试图把它们刻入脑海。他觉察到了外面的记者，听到了相机拍照的声音。他们在拍啥，安全部长这样思索着，讲台不是空的吗。也许记者们只是在检查相机有没有坏吧。他轻叹一声，一位少校盯着他，踱了几步，示意安全部长途径刚打扫干净的东南军区指挥部，然后登台演讲。\n\n他被记者们的长枪短炮包围，即便他早已做好准备，但他仍有些慌乱。他清了清嗓子，然后回想起那准备就绪的演讲稿。\n\n“公民们，还有各位记者们。今天我在这里向大家简要对近期展开的反恐行动作一个报告。我很高兴能在这里告诉各位，我们成功完成侦察并已获得重要情报，不日就能对人质展开救援行动。”\n\n“然而，在恐怖分子活动地区，我们收到了一些人质与平民的伤亡报告。任何军事行动都有意外，我们在策划这次行动时对此也早已预料。我很高兴地告诉各位，伤亡人数远低于我们所做的最悲观预料。我们绝不能忘记，是恐怖分子让我们陷入这等境地，而在即将到来的救援行动中，我们保证那些恐怖分子必将受到严惩。”\n\n部长无视了记者们的连珠炮弹，离开了会场。在第十一轻步旅，一位尉官扇了一个列兵一巴掌。这样的公众惨剧不能再发生了。"
 brazil_lacerda.108.a: "这完全是角度问题。"
 brazil_lacerda.109.t: "抽签"
 brazil_lacerda.109.desc: "“卡洛斯，你要是选择自己背黑锅，那就全完了。你没必要搭上自己的政治生命。”\n\n桑德拉·卡瓦尔坎的目光扫视着整个房间，似乎在寻找藏在灯罩下的窃听器。夕阳透过百叶窗洒进瓜纳巴拉州长的办公室，湿热的空气笼罩在窗外寂静的街道上。一个坐拥七千万人口的国家机器，居然因为一架飞机突然陷入停滞？换作是她，心中也会惴惴不安。\n\n“看来你还没明白眼下的局势。现在，我要么主动承认错误，要么被媒体逼着认错！”拉塞尔达沉默了片刻，随后继续说道，“塞阿拉州的那些评论家恨不得把我吊起来。最好的办法就是先发制人，让这些家伙措手不及。除此之外我还能干啥？”\n\n“转移注意力，总统先生。转移、转移再转移。解雇某位官员，虽然此举不尽理想，但没人想看到你解雇个空管，嗯哼？要是连背后挨几刀都忍受不了，那你这个总统还不够格。”桑德拉的声音简短有力，犹如教授在给一年级学生讲解课程短板。旧习果然还是难改啊，她不禁在心中暗叹。\n\n“区区几把刀我倒是可以解决，但我可镇不住整个罗马元老院。我们需要一个具体的目标，我猜你心中应该已经有人选了。”拉塞尔达的声音恢复了一丝镇定，这位为达目的不择手段的象棋大师终于重执王座。\n\n卡瓦尔坎靠在椅背上，任由那人造皮革的椅子像一面盾牌般包围着她。此刻，她没有心情去应付拉塞尔达的表演，但至少，他同意了她的建议。让安全官员成为替罪羊，这倒是个可行的方案。国会对警方失职的大规模调查，肯定能让几个人掉脑袋，同时在总统与军方之间制造裂痕。而且，不会有人为了那些无名之辈而发动政变。\n\n另一个选择是对司法部或交通部进行大规模清洗，借此安抚愤怒的民众。这种做法虽然会玷污整个内阁，让内阁成员对拉塞尔达心生不满，但只要达到了目的，也就足够了。不管怎样，她必须谨慎斟酌自己的措辞。"
 brazil_lacerda.109.a: "“牺牲安保部队，然后了结这件事，卡洛斯。”"
 brazil_lacerda.109.b: "“依我看，某些内阁部委养尊处优的日子早该结束了，总统先生。”"
 brazil_lacerda.109.c: "“没关系。与其被人逼着，不如主动揽责。”"
 brazil_lacerda.110.t: "最后时刻"
 brazil_lacerda.110.desc: "圣保罗——拉塞尔达，难道不就是另一个希特勒？他随意将那些不顺从他意志的人投入监禁，使国家一天天滑向更糟的境地。看看那架被诅咒的飞机在我们城市上空发生的恐怖事件，以及他对这场危机的拙劣处理，全国上下都在质问：这一切究竟是如何走到这一步的？\n\n我的答案？是“乌鸦”的盖世太保。如果我们真正去剖析劫机者的动机，就会发现其中一人的父亲——一位无辜者——仅仅在几周前，就被“乌鸦”的秘密警察强行拘捕。这一切，正是一个原本清白的年轻人，被“乌鸦”腐败且冷酷的政策逼上极端之路的真实写照。\n\n愚蠢本就不足为奇，一个蠢蛋攀升至总统才令人震惊。而事实一再证明，在国家面临危机之际，我们无法指望“乌鸦”展现丝毫的领导能力。他不过是被那些渴求伟人的蠢才捧上了权力的高位，实际上他连最基本的危机都无法应对处理。"
 brazil_lacerda.110.a: "魏纳怀着满腔怒火，指尖敲打着打字机。"
 brazil_lacerda.111.t: "瓶中的态度"
 brazil_lacerda.111.desc: "沿着那坑坑洼洼的台阶，弗朗西丝卡和她的女儿小心翼翼地走下楼梯。在贫民窟的边缘地带，这片区域对她们母女来说十分陌生——原本是走亲访友后回家的路，却因为道路封闭而被迫绕道。究竟是为什么封闭，谁告诉她们封路的，这些都不甚清楚。\n\n最好还是别问太多。\n\n她们终于走下了那条狭窄的楼梯，这条楼梯蜿蜒盘绕在拥挤的小屋之间，最终通向了一条略宽一些的道路。弗朗西丝卡对这条路依稀有些印象。\n\n“找到了。”她转向女儿说道，“我们可以顺着这条路回家——”\n\n她的话戛然而止。几米外的小巷中，传来了一阵闲聊声，听起来语气轻松，却让人难以听懂。那是种明显的亚洲语言，但弗朗西丝卡无法分辨究竟是哪种语言。她让女儿原地待着，自己则往前挪了一步，试图看清小巷里的情况。\n\n她看不见说话的那些人，却看见地上有一个玻璃瓶。瓶子上写着“Aomori”，弗朗西丝卡不认识这个词，但旁边的字符显然是日文。她听到的语言，应该是日语。这些人，恐怕是日本人。\n\n她紧张地后退了一步，转身对女儿说道：“过马路，我们不要靠得太近。这地方可不安全。”她脑海中闪过了近期发生的袭击事件，恐惧瞬间涌上心头。如果那些人注意到她和女儿，谁能保证他们不会打劫，甚至做出更可怕的事呢？\n\n她的女儿同样紧张不已，使劲地点了点头。母女俩迅速穿过马路，绕到另一侧继续前行。"
 brazil_lacerda.111.a: "接下来的路上，她们走得格外匆忙。"
 brazil_lacerda.112.t: "302/2号磁带"
 brazil_lacerda.112.desc: "记录于美国驻巴西利亚大使馆\n\n摘录开始\n\n戈登：欢迎，达·库尼亚先生，请坐吧。您应该知晓我今天请您来的目的。这起劫机事件在我们两国造成了极其重大的影响。两名日本人劫持了一架载有美国公民的客机，这无疑会为美日关系蒙上一层阴影。\n\n达·库尼亚：戈登先生，我们正尽最大努力解决问题。\n\n戈登：恐怕您所谓的“努力”只会害死机上所有美国公民。换作我们早已救出乘客，逮捕劫机者了。如果拉塞尔达无能为力，我建议贵国政府与OFN合作解救人质。\n\n达·库尼亚：我想不必了，谈判目前正在顺利开展。\n\n戈登：顺利？您知道机上的人质已经被困多久了吗？两个星期了。换言之，您所说的谈判整整两个星期都没有取得成果，这显然证明了拉塞尔达的无能。我希望您能够尽快做出调整。\n\n达·库尼亚：知道了，戈登先生。"
 brazil_lacerda.112.a: "摘录结束"
 brazil_lacerda.113.t: "回归现实"
 brazil_lacerda.113.desc: "劫机事件已经持续了数周，甚至可能更久。机舱内每个人都又脏又疲惫，有些人已经生病了，所有人都感到极度不适。裕成缓缓地在机舱中走动，逐一确认乘客是否还活着。就在这时，他发现了珍妮。她蜷缩在座位上，满脸惊恐，泪流满面，不断哽咽着想回家。\n\n“你知道吗？我也不想在这里。”他低头看着她，声音低沉地说道，“我曾经也想过过正常的生活，努力学习，好让我的家人摆脱贫困。但后来，他们把我父亲抓走了。他在监狱里人间蒸发了，我们无法探望，无法通话，甚至什么都做不了。”\n\n珍妮凝视着裕成的脸，眼中没有因劫持而生的愤怒，也没有因他持有武器的恐惧，而是流露出一丝同情的神色。她明白那种与至亲分离的痛苦，那是一种撕心裂肺的折磨。两人接着简单地交谈了几句，随后裕成继续检查其他乘客的状况。"
 brazil_lacerda.113.a: "远离家乡，这位美国人开始理解了眼前日本人的苦衷。"
 brazil_lacerda.114.t: "乌鸦与后辈"
 brazil_lacerda.114.desc: "小瓦加斯在竞选圣保罗州州长时，万万没有料想到，自己会陷入如此棘手的局面。这场危机，这场毫无必要的生命赌博，远远超出了他对这份职务的预期。那是个阴雨连绵的午后，沉闷的雨声敲击着窗玻璃。他将负责对日侨社区严厉治安行动的负责人——塞尔吉奥，叫到了自己的办公室。\n\n“如果我们不能尽快平息这场危机，恐怕后果将更加无法收拾。”瓦加斯·儒尼奥尔的目光紧紧锁住塞尔吉奥，声音低沉而坚定，“我宁愿辞职，也绝不愿让一滴无辜的巴西人血白白流失在这场冲突中。”\n\n塞尔吉奥沉默片刻，随即平静地回应：“请放心，我们已经制定了周密的行动方案。我们的目标是确保机上的每一个人都能平安获救。更重要的是，请您记住，这是总统的既定政策，我们会确保这种悲剧永远不再重演。”\n\n小瓦加斯深深看了他一眼，缓缓点头，默认了这位警官的计划。他迫切渴望尽快结束这场危机，同时也希望这种灾难永远不再发生。如果对日本社区加强警力巡逻与镇压，能换来更持久的安全，他希望尽快付诸实施。"
 brazil_lacerda.114.a: "“去吧，按你的计划执行。”"
 brazil_lacerda.115.t: "老人的最后一笑"
 brazil_lacerda.115.desc: "阿尔齐拉、古拉特、布里佐拉，他们都聚在瓦加斯的床边。衰老终于追上了他，他眼中的光芒开始消散。“拜托了，在我死后也要记住我。”老人希望着，“让人们继续我在51年奋斗的事业，打败那只乌鸦。以我的名义，再一次打败他。”\n\n瓦加斯的话越来越模糊。他的视线在房间里寻找着，找到了阿尔齐拉的身影。他看了她最后一眼，微笑着闭上了眼睛，再也没有睁开。\n\n“他是个好人，阿尔齐拉。”古拉特说，“他为我们和人民所做的一切，他在危机中坚持斗争的意志。他是我这辈子见过最伟大的人。我亏欠了他太多。”\n\n她走出了房间，因为她实在不忍心再多看一眼父亲的遗容。“我应该把噩耗告诉其他人。”古拉特说着，也走出了房间。此时，一群记者已经聚在了在瓦加斯的住宅前，焦急地等待着前总统的最新情况。\n\n古拉特出现在了他们面前。“五分钟前，热图利奥·多内莱斯·瓦加斯逝世了。”记者们一瞬间安静了下来，一些人甚至开始痛哭流涕。古拉特拒绝接受采访和发表评论，他希望能在政府阻挠之前实现瓦加斯最后的愿望。\n\n他要让导师为自己骄傲。"
 brazil_lacerda.115.a: "他安眠于群星之中，因那将是他的新居。"
 BRA_lacerda_vargas_death_tt: "§e所谓“穷人之父”的传奇将成为历史的一个注脚。§!"
 brazil_lacerda.116.t: "暮气沉沉"
 brazil_lacerda.116.desc: "拉塞尔达感到难以置信。这么多年过去，那个他恨之入骨的老东西终于死了。全民盟的总部举行了庆祝活动来庆祝这个独裁者的死亡。拉塞尔达本该在现场发表简要的讲话，但所有人都找不到他。实际上，拉塞尔达今天很早就回家了。\n\n在这间卧室里，他曾经在梦中想象着成功扑灭瓦加斯主义之火的那一天，但现在他用不着这个白日梦了。确实，只要布里佐拉和古拉特还活跃在政坛上，瓦加斯主义就会继续存在，但今天，为这一意识形态赋予名字的人已经死了。\n\n拉塞尔达的心中十分不安。失去了他最重要的政治宿敌之后，他又该怎么做呢？他胜利了吗？到最后，相比于工党，瓦加斯之死对他的负面影响反而更大。在他死后，他的话语和主张仍将在巴西社会中蔓延。\n\n他坐在桌前，想着接下来要怎么办。睡觉不是个好主意，至少今晚不是。巴西需要推翻瓦加斯之人的回答。他们想要知道他在想什么。"
 brazil_lacerda.116.a: "永不复还。"
 brazil_lacerda.117.t: "何以悼念你的对手"
 brazil_lacerda.117.desc: "卡洛斯·拉塞尔达走进了内阁会议厅，其他部长们都站了起来迎接总统，直到拉塞尔达在会议桌旁的一把空椅子上落座。他很疲惫，自从那个消息传来后，他失眠了一整晚。但这场会议很重要，有一件事需要做出决定，而且必须尽快。\n\n“如你们所见，前总统热图利奥·瓦加斯死了。作为巴西的前国家元首，他留下的政治遗产，呃，是富有争议的。在座的各位应该都同意这一点。但这不意味着我们可以假装已经发生的事情不存在。我们需要尽快发布一份官方声明。”\n\n“那葬礼呢？”副总统塔沃拉问。\n\n拉塞尔达顿了顿：“嗯……当然有，但这应该是私事。”他说。\n\n“不，不是。瓦加斯应该有一场国葬。”卡洛斯·拉塞尔达的脸色一下子变得唰白，桌旁的另外几个人几乎要愤怒地喊叫起来，但塔沃拉没有停下，而是接着说：“是的，我理解他在这张桌子上的支持率比麻疹的患病率还低，但对很多巴西人来说，他就是人间最伟大的人物之一。虽然他的‘新国家体制’带有的民粹主义和法西斯倾向造成了巨大的破坏，甚至威胁到了卡洛斯您的生命，但他还是让数百万人摆脱了贫困、对抗纳粹并维系了巴西的独立，让她在大国间保持独立。我们至少应该抛下一根橄榄枝，为他办一场国葬，这样来软化我们的对手，好让过去的人永远留在过去。”\n\n塔沃拉看向拉塞尔达：“但，总统先生，决定权依然在您手上。”"
 brazil_lacerda.117.a: "哪怕他犯下了如此大错，他依然是巴西的前总统。我们将举办国葬。"
 brazil_lacerda.117.b: "他已经退休多年，只是一位普通公民而已。让他的家人安葬他吧。"
 brazil_lacerda.118.t: "悼词"
 brazil_lacerda.118.desc: "前将军暨总统热图利奥·瓦加斯的国葬时刻临近，数千民众沿巴西利亚街道肃立。各国元首、使节、州长、公务员及现役与退役军官等政要已陆续抵达宏伟的阿帕雷西达圣母总主教座堂，按序入座。\n\n卡洛斯·拉塞尔达率现政府代表团抵达时，恰见工党领袖之一、也是自己在国会最大绊脚石的莱昂内尔·布里佐拉，正与工党、社民党等瓦加斯派要员及《最后时刻报》主编萨穆埃尔·魏纳聚集在入口处。\n\n“布里佐拉……他该不会打算致辞吧？”\n\n立于拉塞尔达身侧的战争部长戈尔贝里·多·科托-席尔瓦循声望去：“他是瓦加斯民粹主义的继承人之一，动机很充足。”他倾身低语，“当然，我们可以‘劝退’他。比如放出风声，说有可靠情报显示臣道联盟正策划暗杀他。”席尔瓦瞥了眼腕表，“若您同意的话，还有几分钟操作时间。”\n\n拉塞尔达回望布里佐拉，对方亦正打量总统及其随行。两人目光短暂交汇，此刻肃穆场合也难以平息政敌间剑拔弩张的敌意。布里佐拉随即垂首看向手中文稿——那无疑是精心准备的悼词。"
 brazil_lacerda.118.a: "让他讲吧，我们没那么绝情。"
 brazil_lacerda.118.b: "暗杀威胁？天啊，得赶快通知他！"
 brazil_lacerda.119.t: "勿于亡者前出恶言"
 brazil_lacerda.119.desc: "巴西利亚总主教结束布道，谈及责任、荣誉与虔诚，追忆热图利奥·瓦加斯的一生功绩。卡洛斯·拉塞尔达全程面色凝重——尽管那些溢美之词与神父引用的圣经段落所描述的，正是十三年前虽非直接下令、却默许国家机器试图暗杀他的政敌。然而此刻的拉塞尔达内心平静：他仍活着，且贵为巴西总统，誓将带领国家迈向前所未有的繁荣。\n\n总主教退下讲坛后，轮到国会议员莱昂内尔·布里佐拉发言。他缓步登上讲台，长久凝视着政治导师的灵柩，最终以饱含情感的沉重嗓音开口：\n\n“眼前这位伟人为国家鞠躬尽瘁，毕生致力于建设更美好的巴西。”他的声音通过扩音器回荡在主教座堂内外，传向聚集在广场的数千民众，“瓦加斯缔造的巴西不只属于庄园主、军人或精英阶层，而是属于全体国民。他推行首个最低工资标准，立法保障劳工权益，让劳资双方携手追求更光明的未来。”\n\n布里佐拉继续颂扬瓦加斯主义的功绩，仅以隐晦措辞批评拉塞尔达及其所属全民盟的自由放任政策，始终未直呼其名。见对方无意重提旧怨，拉塞尔达逐渐放松下来。\n\n最后，瓦加斯的灵柩被抬向等候的灵车，它将载着这位伟人回到南里奥格兰德州圣博尔雅的故乡。拉塞尔达与布里佐拉的目光再度交汇，总统微微颔首致意，布里佐拉亦点头回应。"
 brazil_lacerda.119.a: "即使政治也有时间为死者哀悼。"
 brazil_lacerda.120.t: "勿为亡者言"
 brazil_lacerda.120.desc: "巴西利亚总主教结束布道，谈及责任、荣誉与虔诚，追忆热图利奥·瓦加斯的一生功绩。卡洛斯·拉塞尔达全程面色凝重——尽管那些溢美之词与神父引用的圣经段落所描述的，正是十三年前虽非直接下令、却默许国家机器试图暗杀他的政敌。然而此刻的拉塞尔达内心平静：他仍活着，且贵为巴西总统，正倾力将国家塑造成成功的民主政体与经济崛起的新星。\n\n总主教退下讲坛，身着制服的护柩者列队走向灵柩，准备将瓦加斯遗体运上卡车，送往其故乡南里奥格兰德州圣博尔雅安葬。就在这时，莱昂内尔·布里佐拉突然起身。拉塞尔达瞳孔骤缩，死死盯着这位瓦加斯派民粹领袖。葬礼前，他曾收到所谓“可靠”情报称布里佐拉面临生命威胁，“安全起见”禁止其发表悼词……难道他仍要在葬礼上制造事端？\n\n布里佐拉转身面向人群，以手掩口。霎时间，数十名男女从主教座堂各处站起，做出相同手势。即便身处现代主义风格的主教座堂内，拉塞尔达仍能听见外界汹涌的愤怒声浪——布里佐拉被噤声的悼词，此刻化作沉默的惊雷。\n\n拉塞尔达转向身旁面色铁青的战争部长戈尔贝里·多·科托-席尔瓦，正是此人建议封堵布里佐拉发声。总统正欲痛斥席尔瓦的拙劣决策，却意识到最终拍板者正是自己。"
 brazil_lacerda.120.a: "即使政治也有时间为死者哀悼。"
 brazil_lacerda.121.t: "私事"
 brazil_lacerda.121.desc: "巴西因前总统热图利奥·瓦加斯的逝世陷入哀悼。从里约热内卢的贫民窟到亚马孙河沿岸的小型农业定居点，全国各地都举行了小型纪念活动和默哀，向这位为巴西劳苦大众作出巨大贡献的领袖致敬。\n\n在已故总统的家乡——南里奥格兰德州圣博尔雅，一场更为正式的葬礼在当地教堂举行，仅瓦加斯的至亲、密友及政治盟友出席。遗孀达茜身披黑衣立于棺椁旁，儿子小瓦加斯与其他子女——卢特罗、让迪拉、阿尔齐拉和马内科——陪伴在侧。另一边，若昂·古拉特、坦克雷多·内维斯和莱昂内尔·布里佐拉，以及来自社进党、社民党和工党等瓦加斯主义政党的成员肃穆伫立，目送他们的导师、盟友与挚友即将长眠。现场总人数约三十余人。\n\n当地神父以祈祷结束仪式，护柩者将灵柩抬上等候的灵车，家属随车前往墓地。灵车驶离后，古拉特、内维斯与布里佐拉在教堂台阶前驻足交谈。然而话题并非追忆逝者，而是对现任总统拉塞尔达的猛烈抨击——这位当权者竟拒绝为过去五十年巴西政坛最重要的人物之一举行国葬，亦未宣布官方哀悼期，是可忍孰不可忍！必须采取行动！\n\n三人分别之际，在一个问题上达成了共识："
 brazil_lacerda.121.a: "总有一天要清算拉塞尔达对瓦加斯的无礼之举。"
 brazil_lacerda.122.t: "最后的告别"
 brazil_lacerda.122.desc: "小热图利奥·瓦加斯独自伫立在墓穴边缘，父亲的棺椁已埋入墓穴。母亲与兄弟姐妹正走向车队，准备回家服丧，唯独小瓦加斯迟迟不愿离去。\n\n无数疑问在他脑中翻涌——那些本应向父亲质询却永远失去机会的问题。为何偏偏不是他？为何亲生骨肉反被排除在瓦加斯主义运动领导权之外？为何古拉特与布里佐拉能晋升工党领袖，而自己却被亲生父亲弃如敝屣？\n\n小瓦加斯眉头紧锁。在巴西，家族纽带固然重要，却不足以铺就通天之路。必须证明自身能力方能登顶。至于那两位？他们本就是政坛嗜血之徒。若当初留在工党，自己将永远屈居次席，直至他们倒台——可那要等待多久？十年？二十年？充当名为“国父之子”的吉祥物，在权力边缘虚度光阴？\n\n不。他在社进党内证明了自身价值。无需父亲指点，他照样能引领国家、继承瓦加斯主义大业。通过一场场演讲、集会、密谈，靠着一次次承诺与贿赂，他在这条布满荆棘的险峻阶梯上一步步攀爬。\n\n或许最终，正是父亲的冷落成就了更好的自己——一位优秀的运动领袖。虽永远无法向九泉之下的父亲求证，但这已无关紧要。或许这才是父亲馈赠的最佳遗产。"
 brazil_lacerda.122.a: "小瓦加斯戴上帽子，对父亲的坟墓深鞠一躬，转头追赶远处的家人。"
 brazil_lacerda.123.t: "以血作契"
 brazil_lacerda.123.desc: "残阳为热图利奥·瓦加斯苍白的脸庞镀上血色。在这度秒如年的时刻，瓦加斯家族的成员因各种缘由暂时离开了垂危族长的病榻——达茜、卢特罗、小瓦加斯，都在他弥留之际继续着各自的人生。此刻，唯有死神相伴。\n\n他不是孤独一人。死神正端详着他。余光中那个存在已徘徊数月，此刻终于到了收割的时刻。\n\n这不公平，不合理，不正义。他倾尽毕生心力等待——等待看拉塞尔达政权在猜忌与权欲中窒息而亡。但自古拉特被窃取总统之位已逾数载，他与布里佐拉注定无缘总统宝座，终将成为流亡名单上的符号，在永恒的恐惧中苟活。\n\n无人可托付遗志，无人能阻止拉塞尔达，无人守护他心中那个美好巴西的愿景。或许该向祂祈求？瓦加斯毕生不曾虔信上帝。若祂当真存在……此刻忏悔总好过永不。\n\n“主啊，我犯下诸多罪孽。”他每个元音都像被枪口逼出喉间，“但皆是为巴西，为苍生福祉。我本愿以民主为政治遗产，而今尽付东流。我罪有应得，但拉塞尔达的总统任期更该遭天谴。求您勿为这个摧毁民主的恶徒降下恩典。若地狱是我归宿，也请为他备好熔炉。”\n\n这是浸透血腥的临终祷词。死神即将收割灵魂，上帝会履行这桩交易吗？结局早已注定。唯有最后呓语在暮色中飘散……"
 brazil_lacerda.123.a: "“我离开尘世，走入历史。”"
 brazil_lacerda.124.t: "暴君倒下"
 brazil_lacerda.124.desc: "“今夜，全体巴西人都可安枕无忧，因为我们的希特勒已死！”\n\n晨曦宫内灯火通明，恍若狂欢宫廷。幕僚们如公爵贵妇般列立廊柱之间，沉浸在不同程度的欢庆中，卡洛斯·拉塞尔达则如罗马末代君主般挥霍美酒。这些人是他的子民——挣脱瓦加斯主义枷锁，永远自由欢愉的子民。\n\n往昔，他们活在恐惧中。他比任何人都更熟悉这种滋味——那些年总要提防瓦加斯派来的杀手。他尝试过，也失败过。瓦加斯的巴西终将以“暴君”二字铭记他。想到这里，拉塞尔达嘴角绽开餍足笑意，拎着酒瓶踉跄走向盥洗室。\n\n他放纵痛饮，直至酒液浸透衬衫才稍作停顿。将酒瓶搁在洗手台边，他掬水净面，水珠溅在浸透啤酒的衣襟。抬头望向镜面时，映出的却不是自己。\n\n是瓦加斯。那只冰冷的手正搭在他肩头，笑容竟似带着温暖的赞许。\n\n拉塞尔达猛然转身，酒瓶脱手砸向独裁者的幻影，却在墙面迸裂成碎片。他瞬间失去平衡，如翻倒的龟鳖般摔落地面。难道这才是他的真面目？又一位独裁者，又一个新国家。不，他比瓦加斯高尚，他的初衷纯粹。不会有暴政，不会有谬误，唯有拨乱反正的使命。\n\n然而任何说辞都无法填补内心深渊般的悲怆，他只得在酒精的陪伴下入睡。"
 brazil_lacerda.124.a: "此后每晚，拉塞尔达都会梦见瓦加斯。"
 brazil_lacerda.125.t: "我们的多事之秋"
 brazil_lacerda.125.desc: "“亲爱的布里佐拉妹夫： 惊闻瓦加斯辞世噩耗，更痛心他竟在乌拉圭流亡途中阖然长逝。我们不仅错失与他诀别的机会，连他的墓碑也困锁在敌视我们的故土。此刻巴西的战友仍在抗争，而我们却相隔万里……”\n\n泪眼朦胧的古拉特在乌拉圭寓所伏案疾书。他已熟悉蒙得维的亚的街巷，巴特列主义者待他的礼节如合法元首那般——尽管有时更像怜悯。这种尊重常令他倍感孤寂，此刻他只想得到妹夫的拥抱……\n\n“久疏问候，见字如晤。我竟是从一位侨民口中偶然得知瓦加斯死讯，震惊程度想必不亚于你。此刻拉塞尔达那具行尸走肉，怕正在他坟茔上欢庆狂舞吧？而我们连祭奠之日都遥遥无期……”\n\n疲惫不堪的布里佐拉在纽约酒店台灯下回信。又一夜演说与握手的轮回刚结束，怀抱同情心的政客日渐稀少——随着拉塞尔达政权日益稳固，瓦加斯之死于他们不过是转瞬即逝的新闻，于他却是连哀悼都不得的悲剧……\n\n“……幸与埃德娜取得联系，她提议我们赴古巴相聚。虽非故土，但这样的相聚机会在可预见的未来都难再有，尽管我仍怀抱希望。期待与你重逢，兄弟。”\n\n此致\n若昂·古拉特"
 brazil_lacerda.125.a: "就算身处美洲的另一头，二人的联结也一样坚不可摧。"
 brazil_lacerda.126.t: "快乐的日子去哪了？"
 brazil_lacerda.126.desc: "热图利奥·瓦加斯的死讯如同涟漪般在巴西激荡。人们迟迟不愿相信“穷人的慈父”已然离世，哀恸的浪潮此起彼伏。此刻，弗朗西丝卡正通过电视直播见证又一轮余波。\n\n镜头追随着一场自发的悼念游行——或许通过这种方式，人们才能表达哀思。此类集会虽未被明令禁止，但官僚体系自有千百种阻挠手段：拒绝审批文件、设置层层关卡。即便强横如拉塞尔达，也不得不对镇压有所克制，以免激起更猛烈的风暴。\n\n“现在让我们采访现场一位悲痛的民众。”记者将话筒转向双眼通红的青年，“席尔瓦先生，您是如何认识瓦加斯的？”\n\n“从我父亲那里。瓦加斯给我们房子，保证工作……漫漫长夜都是他给我们温暖。”男人语调突变，从追忆转为愤懑，“比起现在这个总统，瓦加斯强过千万倍。我不管别人怎么说，我宁愿天天选瓦加斯当总统，也不要拉塞尔达。”\n\n游行氛围随之质变，从追思个人转向哀悼国运。“打倒独裁者”的呼声响彻人群，旋即被从暗处涌出的警力镇压。镜头记录下暴力清场全过程，直到一名警官用手掌粗暴遮蔽了镜头。\n\n弗朗西丝卡关掉电视。继续观看只会徒增烦忧。她本不愿回首往事——那里只有伤痛，但受访者的话语挥之不去。巴西确实变了，却未见变得更好。她无能为力，唯愿守护自己的方寸天地与身边之人。"
 brazil_lacerda.126.a: "但内心里，她希望能回到1949年。"
 brazil_lacerda.127.t: "死亡孕育新生"
 brazil_lacerda.127.desc: "哗啦！坦克雷多·内维斯刚跨出轿车，就不巧踩进一滩水洼，裤管浸透了雨水。天色阴云密布，冷雨潇潇，但这位政治家仍冒雨走向州长官邸。\n\n这座建筑堪称肃杀。阿德马尔时代的奢靡装饰早已荡然无存，此刻更像被哀戚气氛挟持的灵堂。直到遇见同样沉浸在悲痛中的小瓦加斯，内维斯才从压抑的啜泣声中获得片刻喘息。\n\n两声“敬健康！”的祝酒词在厅堂回响，既悼念逝去的父亲，亦缅怀精神导师。“经历这一切后，您还好吗？”内维斯直视对方红肿的双眼——那布满失眠折磨痕迹的眸子已流不出新泪。\n\n“原以为最痛莫过于未能见父亲最后一面，可如今连悼念他的人都遭赤裸镇压，这既是对民主的践踏，更是对人伦的亵渎。”内维斯心知那些悼念活动常演变成反拉塞尔达示威，但觉得此刻纠正并不合时宜，尤其在提出结盟建议前。\n\n“他容不得半点异见，哪怕是隐晦的也不成。所以古拉特和布里佐拉流亡万里，工党被逼成无头苍蝇……”内维斯轻叹后正色道，“……所以社民党是少数还能制衡拉塞尔达的力量，但孤军难支。我们需要您和社进党加入联盟。”\n\n他起初读不懂小瓦加斯的反应。直到对方突然拥抱他，将本应留给深夜独处的泪潮倾泻而出。在哽咽的潮声中，内维斯只听清一句话……"
 brazil_lacerda.127.a: "“要我做任何事都行！只要能打倒那个暴君……”"
 brazil_lacerda.128.t: "缔造巴西之人"
 brazil_lacerda.128.desc: "哈瓦那的骄阳在租赁轿车的引擎盖上折射出刺目光晕，埃德娜·洛特正乘车前去与杨戈、布里佐拉这两位流亡的巴西民主斗士会面。三人在会议厅前相聚，镜头记录下他们喜极而泣的拥抱。步入会场时掌声如潮，埃德娜与两位男士并肩而立，握紧了麦克风。\n\n“感谢大家。能在自由民主的国度发表演说，我深感荣幸——而我们的祖国巴西，此刻却与自由无缘。”她的话锋陡然冷冽，从礼节性寒暄直刺要害，“我们与流亡至此的合法总统，皆因拒绝屈服于拉塞尔达的独裁统治而遭驱逐。”\n\n“但我们并非其暴政的唯一受害者。”流亡总统接过话筒，“近日，巴西人民痛失了国父热图利奥·瓦加斯。我们与所有同胞一样悲痛万分，尤其痛心于无法亲临吊唁。但受压迫者岂止我们？即便此刻，那些试图悼念他的人们仍在遭受镇压。”布里佐拉接过话头。\n\n“‘我们呼吁巴西人民奋起反抗独裁者。瓦加斯的政治遗产岂能葬送于一介暴君的偏执？所有惠民之政都该超越他的猜忌长存。在此我们立誓，无论代价如何都将持续抗争……’”一阵狂笑打断了秘书的朗读。\n\n“一派胡言！你会为这些蠢货卖命吗？”拉塞尔达质问正在诵读“哈瓦那宣言”的秘书，未等她开口便自行回答：“当然不会。因为你并非那些脱离巴西实际的妄想狂。有劳了，离开前把文件碎掉。”总统展露职业性微笑，旋即重新投入工作。"
 brazil_lacerda.128.a: "杨戈于哈瓦那，拉塞尔达于巴西利亚，瓦加斯于黄泉之下。"
 brazil_lacerda.129.t: "钢琴师"
 brazil_lacerda.129.desc: "“有请米歇尔·特梅尔。”拉塞尔达对这名字并不陌生，不少人谈及他的音乐天赋，还有他长久以来倾心于演奏钢琴一事。今天，他终于得以亲身见证。\n\n礼堂内座无虚席，其中大多是公务员，期盼着倾听古典名作。掌声热烈，特梅尔向众人致谢，而后开始演奏莫扎特最为知名的作品之一——《土耳其进行曲》。\n\n拉塞尔达讶异于他听到的一切。旋律流畅，扣人心弦。“弹得不错啊。”他同幕僚长说道。特梅尔接着演奏了半小时，每一乐章结束之时，台下欢呼喝彩声不绝于耳。\n\n“谢谢！谢谢各位！”特梅尔回应着。\n\n走出礼堂，拉塞尔达前去会见这位青年钢琴家：“特梅尔先生，依我所见，您的演奏真是完美无缺。”面对夸奖，特梅尔表示衷心感谢。\n\n“如果没有罗伯特，我什么都不是。他作为海狮行动的幸存者抵达这里，教会了我关于音乐的一切。”拉塞尔达沉默不语，他想了解罗伯特其人，一位亲眼目睹德国入侵阴霾的人，一位了解其造就的苦难以及缘由的人。\n\n“他很勇敢，特梅尔先生。”拉塞尔达面带一抹微笑开口。他思忖着，倘若罗伯特并未及时撤离，他的命运会如何；而那些无法及时撤离的人，他们的命运又成了什么模样。"
 brazil_lacerda.129.a: "念及导师，特梅尔露出了笑容。"
 brazil_lacerda.130.t: "把头低下"
 brazil_lacerda.130.desc: "这一切都发生在电光石火的几秒钟里——方才的种种变故如走马灯般掠过脑海。\n\n千代子甚至来不及思考究竟发生了什么。周遭的惨剧与家人骤然消失的阴影将她钉在原地，他们可能生还，也可能早已罹难。但至少今天，她注定无法知晓答案。身后的街道正在沸腾——这并非比喻，很快这里就会燃起真正的火焰。裕成在劫机事件中将自己塑造成了殉道者，却让日系社群沦为警方追查的焦点，千代子已因此经历了数次近乎暴力的审讯。\n\n半小时前，当千代子与那群在尼泰罗伊影院外窄巷徘徊的巴西暴徒擦肩而过时，她几乎能嗅到空气中躁动的火星。城市天际线腾起的黑烟遮蔽云层，愤怒人群的拳脚将惨叫声碾成碎片。就在日系观众鱼贯而出的瞬间，暴徒们如嗅到血腥的鬣狗般扑向那些东方面孔。\n\n流言在混乱中疯长：有人瞥见某个“疑似皇道社成员”的男子。但此刻是否真有此人都已不再重要，但凡眉眼间带着大和民族特征者，皆被刀光枪影笼罩。被刺伤、被枪击、被碾压——任何与劫机者形貌稍似之人，都成了泄愤的活靶。\n\n千代子本能地拔腿狂奔。耳畔掠过暴徒们用葡语齐声嘶吼的“将这颗种族毒瘤彻底铲除”，她扯起衣襟掩面，在燃烧的街道上夺命奔逃。暴民们对疑似日系者展开无差别攻击，此起彼伏的惨叫声中，渐渐混杂着既非葡语也非日语的悲鸣。"
 brazil_lacerda.130.a: "摇摇欲坠的纸牌屋，终究要轰然倒塌。"
 brazil_lacerda.131.t: "受控的混乱"
 brazil_lacerda.131.desc: "自由区在燃烧。圣保罗警长塞尔吉奥·弗勒里透过办公室的落地窗，望着地平线上腾起的烟柱。报警电话如潮水般涌来，但这位本应维持城市秩序的人，此刻却感到某种奇异的愉悦与漠然交织在胸腔里。\n\n礼貌的叩门声打断了他的凝视。“进。”他没有转身。门轴转动时带起的气流拂过后颈，“是若昂吧？又想来复述那些陈词滥调？我已经说过了，我们不会插手。”\n\n“可是警长，暴乱正在向周边扩散，凶杀案频发……”\n\n弗勒里转过身，与这个战战兢兢的文员四目相对，对方显然是个刚调来的菜鸟。“你以为我不知道？”他语气中透着不耐烦，“政治社会秩序部的人手捉襟见肘，既然民众想自己动手除暴安良，我们又何必阻拦？”\n\n“我不太明白……”\n\n“这些日本人——”弗勒里突然倾身向前，鼻尖几乎抵上对方苍白的脸，“在我们的地盘惹是生非这么多年，早该料到会有清算之日。非要找点事做的话……”他抓起对讲机扔过去，“派几队人去给暴民们搭把手，是时候让那些狡诈的小日本尝尝厉害了。”"
 brazil_lacerda.131.a: "火上浇油。"
 brazil_lacerda.132.t: "狐面"
 brazil_lacerda.132.desc: "“情况很糟糕啊。”面前的年轻人说道。\n\n千代子之所以陷入这般绝境，还要从十分钟前讲起。她不幸于错误的时间出现在错误的地点，恰好与一伙打砸日裔店铺的暴徒对上视线。后者的眼神传递着超越语言的信息：他死死盯着千代子苍白的惊恐面容，如同锁定猎物的猛兽。\n\n她东躲西逃，想要甩开身后壮硕如牛的暴徒。钻过一辆汽车的残骸后，她一个趔趄跪倒在地，双手被脚下的路面磨得生疼。一眨眼的工夫，暴徒及其同伙便将她团团包围。在她向角落退却的同时，那名暴徒将其他人支离了小巷，而后从腰间拔出一个漆黑的物体。千代子大口喘着气，仿佛预见了即将发生的事情。她目光中流露出恐惧，这让暴徒变得更加兴奋，随即用枪抵住她的额头。\n\n千代子闭上双眼，试图在平静中迎接厄运。但当枪声响起，她却惊奇地发现：自己竟还能睁开眼睛！她于是慢慢抬起头，只见暴徒的身躯轰然倒地，面前赫然站着一个手握步枪、腰佩武士刀、头戴狐狸假面的年轻人。年轻人转头看向千代子，冷笑着掀起假面，一张日本人的面孔映入眼帘，然而这一幕并未减少千代子的不安。\n\n年轻人伸出手，帮助千代子重新起身。“跟着我，我带你去比这儿更安全的地方。”话音刚落，远处又传出了几声枪响。"
 brazil_lacerda.132.a: "狐狸是狡猾的动物，但此刻千代子唯有选择相信。"
 brazil_lacerda.133.t: "狐穴"
 brazil_lacerda.133.desc: "在自由区郊外一间毫不起眼的房子前，戴着面具的年轻人缓缓放下手中的武士刀，在门前摘下面具，清了清嗓子，开口道：\n\n“我从乡下来，想学养鸡。”\n\n门内传来一声沉闷的响动，紧接着锁被拧开。两个身穿黑衣的高大日本男子出现在门口，他们一左一右挟着千代子的肩膀，将她引入室内。年轻人随行，带领她穿过一座如堡垒般的建筑。墙上挂着一幅斑驳的锦缎，上面书写着三个醒目的大字——“皇道社”。千代子被按坐在椅子上，脑中回想着自己是如何从那场混乱中侥幸脱身，仅留下几道擦伤作为那场梦魇的印记。\n\n“我叫泷千代子，在这场动荡中失去了家园，现在身无分文，也无处可去。”在被要求自报身份时，千代子如此答道。当“泷”这个姓氏从她嘴里说出时，房间角落里一位年长男子的眼神猛地一亮。他注视着面前这个人，像是在细细品味狐狸送来的猎物。“你是泷纯忠的女儿？”老人问道。这一句话，瞬间让房间里的气氛为之一变。所有人都将目光聚集在她身上，而千代子只是点了点头。\n\n刹那间，房间沸腾了。泷纯忠，那传说中的名字，仿佛在他们耳边激起阵阵回响。正是他，凭借柔道技艺独战十人的英雄？如今，他的女儿竟然出现在这里，还在寻求他们的帮助？这对皇道社来说，简直是一个可以为日本社区赢得声望的天赐良机。\n\n在众人激动的议论声中，千代子环顾四周。尽管她是被捧为“贵客”的身份，却没有人真正与她交谈。这间简陋的临时指挥部显得局促而紧张，墙上杂乱无章地挂满了剑、旗帜以及各种武器。看得出，这些人大多是农民，多数还是臣道联盟的前成员。他们渴望行动，渴望拿起武器，但显然缺乏组织性。千代子无所适从，只能深深地陷在椅子里，无法自拔。"
 brazil_lacerda.133.a: "千代子的目光扫过四周，一次又一次……"
 brazil_lacerda.134.t: "笑对镜头"
 brazil_lacerda.134.desc: "大泽静夫提笔为卡洛斯·拉塞尔达撰写颂词的场景恍如昨日——那位以铁腕捍卫稳定的强硬保守派，与自己同为报人出身。关于种族融合民主的高谈阔论，犹如餐刀划过吐司般刺耳。难道他不是最合适的人选？\n\n当正记卷入劫机事件时，现实给了静夫一记耳光。拉塞尔达不仅丑态毕露，更在全球电视直播中暴露了无能。此后，左右两派媒体竞相报道武装暴徒的种族主义暴行：他们四处搜捕某个挑衅的日系青年，缘由却暧昧不明——是犯罪？骚扰？抑或仅仅一个不善的眼神？\n\n不重要了。电影散场时，秩序井然的退场人群瞬间被混乱吞噬。暴徒们或绞杀或枪击，任由观众在血泊中挣扎。\n\n静夫抓起笔记本与钢笔冲入风暴。在拳脚与刀刃间穿梭，他捕捉着日系社群的泣血证言。起初只是用微型相机谨慎偷拍，渐渐地，他开始直面淋漓的鲜血，将人间地狱定格成影像。\n\n不久后，几辆警车呼啸而至。然而时间一分一秒流逝，制服者们非但没有制止暴乱，甚至有人加入施暴行列。手无寸铁的静夫唯有不停按下快门，为无需注解的暴行留存铁证。"
 brazil_lacerda.134.a: "“低头，小心脚下……”"
 brazil_lacerda.135.t: "从大泽静夫到“日本佬马里奥”"
 brazil_lacerda.135.desc: "对记者而言，被仇恨邮件与骚扰的浪潮吞没并不陌生。身为异乡异客，遭遇种族主义攻讦更是家常便饭。那个自诩“猎共先锋”的剿共突击队，比起追捕共产主义者，似乎更热衷于骚扰记者——以及共党惯常争取的弱势群体。但今天的某封信件，终于击穿了大泽静夫冷漠的铠甲。或许是连日阴郁的情绪作祟，或许是这封诋毁信精准刺中了神经——对方将他舍生忘死的报道贬低为博眼球的敛财把戏。\n\n在堆积如山的邮件中，一枚印着红色标志的信封引起他的注意。来自某个日系左翼武装组织的信函。合情合理不是吗？他们旗帜鲜明地效忠于“人民革命先锋队”——这个曾在圣保罗大学校友圈中耳熟能详的名字，连当年的正记都为之倾倒。按照指引，静夫来到人民革命先锋队的例行集会，接待他的是迪尔玛·罗塞夫。整个入会流程顺利得不可思议，只剩最后一道手续。\n\n“首先，想好你的代号了吗？”\n\n静夫忆起记者生涯初期偶遇的流浪汉。那个被社会遗弃、蜷缩街角等死的老人马里奥。目睹对方清扫街道的佝偻身影时，悲愤曾如岩浆喷涌——总得为点什么而战吧？就算不为自己，也要为马里奥，为所有像他一样受苦的人。\n\n“马里奥，就这个了。”\n\n“啊哈，好极了。日本佬马里奥。”"
 brazil_lacerda.135.a: "“挺好的，这就是我的代号了。”"
 brazil_lacerda.136.t: "由是恺撒注目"
 brazil_lacerda.136.desc: "叮铃铃，叮铃铃。\n\n小瓦加斯最不想接的就是拉塞尔达的电话。他刚抵达马塔拉佐大厦不过十分钟，这一路上总统可能提出的要求像毒虫般啃噬着他的神经：是要嫌犯名单？还是暴动热点分布图？可他根本交不出任何像样的报告。他深吸一口气抓起听筒，目光不自觉地飘向办公室对面的墙壁。\n\n线路那头果然传来拉塞尔达的咆哮。正如小瓦加斯所料，总统劈头就问细节：“你他妈知道这场闹剧会让我的支持率跌到什么鬼样子吗？我要答案！立刻！马上！”接着是长达三分钟关于种族民主议程的咒骂。“你这蠢货，立刻让你的人上街！难道他们连半句情况汇报都没有？”\n\n小瓦加斯一边安抚总统情绪，一边手忙脚乱地寻找替罪羊。他推托说政治社会秩序部无力应对当前的乱局——但这话显然让电话那头的咆哮又升高了八度。他长叹一声：“总统先生，请您暂时不要过问。您此刻做不了什么，而且从目前态势看，也不用您劳神费心。”\n\n他转头望向窗外，楼下的街道上蚂蚁般的人群正从地平线升起的烟柱下奔逃。政治社会秩序部呈报的数据显示暴乱规模超过万人，而全城人口总共六百万。即便不看那些那些地图文件，也知道整座城市已经陷入混乱，每个街区的求救电话都在整点准时响起。小瓦加斯对着话筒吐出最后一句话："
 brazil_lacerda.136.a: "“总统先生，请您耐心。我没法保证太多，但我敢肯定这会是一场持久战。”"
 brazil_lacerda.137.t: "十字路口"
 brazil_lacerda.137.desc: "电话铃声如围城教堂的丧钟般此起彼伏。幕僚们试图拼凑局势全貌，恍若上帝之眼俯瞰燃烧的都市。内阁会议室里，拉塞尔达来回踱步，副总统维尔吉利奥·塔沃拉倚墙而立。战争部长戈尔贝里·多·科托-席尔瓦踱步而入。简报文件整齐码放却无人问津——他们早已通过广播听闻暴动规模，知晓这座痛苦之城正承受着永无止境的鞭笞。拉塞尔达将二人上下打量一番，终于开口。\n\n“暴乱根本停不下来。持续数日，蔓延数周，伤口每天都在溃烂。现在听说法西斯分子和共产党人竟敢在燃烧的街道上横行——这些自由之敌正肆无忌惮地威胁着我们。必须终结这一切。我召集你们商议对策，但依我看，唯有调遣军队方能平息事态。”总统语气凝重。\n\n“总统先生，我对部队的平乱能力充满信心。我们的士兵训练有素，这是唯一的——”戈尔贝里话音未落便被截断。\n\n“卡洛斯，此举万万不可。法西斯与共产党固然想摧毁我们的自由，但若动用军队，无异于引火烧身。”\n\n“圣保罗向来是社进党的势力范围。联邦政府若派兵镇压，形同对州政府发动政变。我们将亲手摧毁誓言捍卫的自由。当务之急是联合州警与社进党，通过政治手段化解危机。决不能为短期维稳牺牲长远民主根基。”塔沃拉站在二人面前，目光灼灼直视总统。"
 brazil_lacerda.137.a: "“戈尔贝里，让部队做好准备。”"
 brazil_lacerda.137.b: "“塔沃拉，我们亲自去现场一趟。”"
 brazil_lacerda.138.t: "混乱与倒退"
 brazil_lacerda.138.desc: "萨穆埃尔·魏纳，《最后时刻报》圣保罗讯：\n\n“今日凭窗远眺，你或许会误以为大海对岸的纳粹渣滓大举入侵，实则不然。这场入侵源于我们自己的政府——鉴于近期骚乱（起因至今未明，大抵又是警察殴打示威者的老戏码），当局正以空前力度介入。\n\n无论如何，虽然骚乱原委仍扑朔迷离，其后果已日渐清晰。政治社会秩序部与公共内卫部队除了采取鸵鸟政策外束手无策，这让我们不得不将目光投向另一个极端——新任圣保罗军政长官戈尔贝里·多·科托-席尔瓦。\n\n席尔瓦先生正肆意滥用其非法攫取的权位。任你如何批评社进党的执政，但削弱文官政府以强化军事存在无疑是更大的恶行。拉塞尔达总统或许自诩能将军方玩弄于股掌之间，但笔者敢断言，他终将自食其果。”\n\n圣保罗市民虽未对魏纳的檄文报以掌声，但《最后时刻报》的零售点前，载有其专栏的当期报纸甫经面世便被抢购一空，民众的口耳相传便是最有力的共鸣。这位报人的忧思，绝非孤鸿哀鸣。"
 brazil_lacerda.138.a: "进一步，退两步。"
 brazil_lacerda.1381.t: "赶下舞台"
 brazil_lacerda.1381.desc: "“我们的内卫部队正在机场外围构筑警戒线。公共内卫部队在州长指挥下——”\n\n“让那个白痴指挥？”阿德马尔涨红了脸，猛地将头仰靠在椅背上，“天啊，拉塞尔达！选他不选我是吧？”\n\n“——已完全掌控局势，本人每日与其保持密切沟通——”\n\n“他懂个屁！简直厚颜无耻——”\n\n“呃，德·巴罗斯先生，”一位社进党工作人员斗胆问道，“您在和谁说话？”\n\n“拉塞尔达，蠢货。我们的总统。”他冲着正在播放总统最新记者会的收音机冷笑，“他妈的，本该是我坐在那个位子上才对。我给他发电报，告诉他我了解那帮人的脾性，能在这场闹剧中当个称职的调解人，可他压根没他妈听进去！”\n\n“这确实……呃，有点缺乏远见了，先生。另外，您十分钟后要和里约办公室的同僚开会。”\n\n“告诉他们我十五分钟后到。在我开门前别来烦我。”话音未落，他砰地关上门，把助手挡在外面，随手拧掉收音机。阴郁的沉思很少能给阿德马尔带来好处，但此刻他找不到更好的方式平息胸中翻涌的怒火。助手守在门外，忧心忡忡——他从没见过上司如此暴怒。\n\n但看到阿德马尔带着一抹平静的冷笑推开门，助手的忧虑更深了。“好了，”他掸了掸袖口，“里约那帮人又想要什么？活动经费？”"
 brazil_lacerda.1381.a: "计划成型，齿轮转动，将挫折化为机遇。"
 brazil_lacerda.139.t: "冰锥"
 brazil_lacerda.139.desc: "绝密\n仅供总统阁下阅示\n\n圣保罗——社会动荡严峻\n\n遵照指示，随附圣保罗驻军布防详图。请注意，并非所有检查站均设于自由区周边。事实上，部分布防点距该区域甚远。此部署系因侦察人员发现多处骚乱分子频繁活动的热点区域后所定。\n\n我军现已对上述区域及已知社会集会场所实施封锁管控。戒严令颁布初期采取的武力措施虽引发独立于骚乱之外的新一轮动荡，但此类事件已平息。随着部队逐步适应当地态势，局势将迅速得到控制，请阁下放心。\n\n待当前危机处置完毕，本人恳请彻查骚乱根源。长期以来，本人对塞尔吉奥·弗勒里之行事心存疑虑，认为其渎职与玩忽职守非全因智力欠缺所致。若蒙授权调查，定能有所斩获。\n\n戈尔贝里·多·科托-席尔瓦办公室 呈\n\n秩序与进步"
 brazil_lacerda.139.a: "“只要能解决，席尔瓦要多少给多少。”"
 brazil_lacerda.140.t: "重锤"
 brazil_lacerda.140.desc: "绝密\n仅供总统阁下阅示\n\n圣保罗——社会动荡严峻\n\n遵照指示，随附圣保罗驻军布防详图。请注意，并非所有检查站均设于自由区周边。事实上，部分布防点距该区域甚远。此部署系因侦察人员发现多处骚乱分子频繁活动的热点区域后所定。\n\n我军现已对上述区域及已知社会集会场所实施封锁管控。戒严令颁布初期采取的武力措施虽引发独立于骚乱之外的新一轮动荡，但此类事件已平息。随着部队逐步适应当地态势，局势将迅速得到控制，请阁下放心。\n\n本人欲借此报告详述一项提议——我们可从此番骚乱中谋取政治利益。社进党始终顽固抵制圣保罗戒严令，屡屡煽动对抗我军的行动。此等行径断不可续。即便动用武力，亦须遏止其阻挠。剪除该党势力后，政府施政将事半功倍。\n\n戈尔贝里·多·科托-席尔瓦办公室 呈\n\n秩序与进步"
 brazil_lacerda.140.a: "“不要多管闲事，把你的手头工作干好。”"
 brazil_lacerda.140.b: "“狠狠收拾他们。太岁头上动土，胆子也太大了。”"
 brazil_lacerda.141.t: "障碍的病根"
 brazil_lacerda.141.desc: "小热图利奥·瓦加斯照常处理着公务。暴乱再喧嚣，绝大多数人仍要继续生活，这正是他必须坚守的准则。若非戈尔贝里·多·科托-席尔瓦突然闯入办公室，这本该是平静的一天。\n\n“为什么负责镇暴的警察手中只有棍棒石块？”小瓦加斯意识到自己只能聆听而无权辩解。“政治社会秩序部切断我们的通讯，军方连句话都递不进去，好不容易接通又总是得不到足够支援。”\n\n“你们的失职我能数落一整天，但现在只问最关键的问题：为什么从警察总部得到的答复永远模棱两可？”小瓦加斯等待片刻，确认对方允许自己开口后才谨慎作答。\n\n“军方与警方素来相互配合。我无意阻挠任何事务，席尔瓦先生。这背后也不存在什么阴谋，是人都会犯错。没人希望暴乱一直持续。”这番说辞在他自己听来都苍白无力，果然激起了席尔瓦的怒火。\n\n“阴谋确实存在，只是你不知情罢了。我清楚幕后黑手——塞尔吉奥·弗勒里。我在这人身上嗅到了叛徒的气息，你休想说服我改变看法。他那点小聪明早晚会害死圣保罗。你若允许我清除这颗毒瘤，对整座城市都是好事。”小瓦加斯来不及细想“清除”二字的深意便急忙打断。\n\n“请交给我处理。我以名誉担保会彻查此事，扫清所有障碍。”他试图从席尔瓦脸上读出情绪，却只看到一潭死水。令人窒息的沉默持续良久，对方终于给出回应："
 brazil_lacerda.141.a: "“好吧，但动作要快——赶在警察之前。”"
 brazil_lacerda.141.b: "“不行，文官政府向来靠不住。我要亲自处理。”"
 brazil_lacerda.142.t: "永滞之城的英雄"
 brazil_lacerda.142.desc: "“这些野蛮人根本听不懂人话，”席尔瓦穿越自由区的硝烟时，正撞见弗勒里在摄像机前搔首弄姿，“他们只认得9毫米口径的真理。”这位警长身边簇拥着满脸横肉的跟班，正是那种以殴打黑人为乐的暴戾之徒。\n\n“总有些坐在办公室指手画脚的家伙，”弗勒里突然迈着圣若泽剧院演员般的台步逼近，“他们永远不懂战场淬炼的生存法则！”席尔瓦惊觉自己竟成了对方表演的布景——弗勒里故意与他并肩而立，在镜头前摆出夸张的造型。\n\n苦苦等到这场表演结束，席尔瓦抓住弗勒里商讨对策：“看看这烂摊子！你这些天都在梦游吗？”弗勒里刚要辩解，远处枪声与惨叫替他作了答。自由区已成人间炼狱，谎言在此刻显得太过苍白。“听着，现在补救还来得及，但你必须按我说的做。”\n\n“你的防暴队在吧？”见对方点头，席尔瓦继续下令：“让他们清扫支巷，我的部队封锁主干道。我们分区蚕食，困死这群暴徒，最后瓮中捉鳖。明白？”弗勒里像个挨训的顽童连连称是。\n\n“立刻整队！”席尔瓦拂袖而去，撞开想要采访的记者。弗勒里拼命朝镜头挥手，却只拍到满地瓦砾。此刻他终于明白：要么成为平息暴乱的英雄……"
 brazil_lacerda.142.a: "……要么化作自由区焦土中的遗骸。"
 brazil_lacerda.143.t: "防暴盾与催泪瓦斯"
 brazil_lacerda.143.desc: "如今的自由区已不再是人们安居乐业的家园，倒更像一幅地狱绘卷。\n\n在催泪瓦斯与硝烟交织的迷雾中，防暴盾牌组成的铜墙铁壁正随着军靴踏地的闷响步步紧逼。增援部队抵达后短短数分钟，自由区纵横交错的街道就已被军警重重封锁。那些来不及逃跑或不知所措的民众，不论种族肤色信仰，转眼便沦为镇压者棍棒下的牺牲品。\n\n幸存者慌不择路地奔逃，但很快发现根本无处可逃。好不容易冲出封锁线，迎面却又撞上另一堵盾墙。惊惶的人群如决堤洪水般堵塞街道，然而军警并未因此驻足，依然冷酷地推进着包围圈。\n\n当恐吓驱散对汹涌人潮收效甚微时，第一声枪响划破天际。\n\n究竟是谁先扣动扳机？或许是警方鸣枪示警试图驱散人群，又或许是走投无路的日系人决心杀出一条血路。无论是何原因，有人中弹倒地的那一刻，恐惧与困惑瞬间取代了此起彼伏的怒吼。人们如老鼠般仓皇逃窜，疯狂撞击街道两侧紧闭的门户。此刻留在街上，无异于将性命押上赌桌。\n\n而对眼前这幕人间炼狱视若无睹的军警们，仍在有条不紊地收紧绞索，将自由区最后一丝生机缓缓扼杀。"
 brazil_lacerda.143.a: "秩序将被恢复。"
 brazil_lacerda.144.t: "整顿警察"
 brazil_lacerda.144.desc: "在一名警察可能面临的所有结局中，有一种堪称终极失败。失去搭档固然悲痛，但终归是暂时的创伤；因公殉职至少能赢得体面的哀荣。而当同僚将手铐扣上你的双腕时，那身制服便成了最刺眼的耻辱烙印。圣保罗警长塞尔吉奥·弗勒里此刻正经历着这样的至暗时刻——这位可能是全城最遭人唾弃的执法者，正亲身品尝着法律的重锤。\n\n不出所料，这场逮捕引发了媒体狂欢。这位身败名裂的警长戴着手铐走下自己警局的台阶时，追逐世纪猛料的记者们如嗅到血腥的鲨鱼般蜂拥而至，曾经受他庇护的市民则投来形形色色的嘲弄。弗勒里对人群和昔日同僚爆出一连串粗口，这位枭雄的理智早已在愤怒中扭曲，治下警局的丑闻断送了他的仕途——调查显示，他非但没有守护圣保罗的安宁，反而纵容属下在自由区煽动暴乱，这终于让戈尔贝里将军忍无可忍。\n\n媒体马戏团喧嚣沸腾的同时，政治社会秩序部总部却笼罩在令人窒息的阴郁中。记者们为他们顶头上司的倒台欢呼雀跃，弗勒里成了所有人眼中即蠢又坏的恶棍。但这场清算不会止步于他一人。既然军方连圣保罗最有权势的警察都能逮捕，他们之中还有谁能免于起诉？而随着地方警力式微，即便瓦加斯州长暴跳如雷，戈尔贝里将军也必将毫无顾忌地动用军队铁腕镇压暴乱。\n\n或许此刻，无论代价如何，秩序终将回归。"
 brazil_lacerda.144.a: "大快人心。"
 brazil_lacerda.145.t: "军工级精度"
 brazil_lacerda.145.desc: "当警方奉命撤离自由区时，最初的困惑很快被随后数小时的血腥镇压驱散——这道命令的深意，此刻昭然若揭。\n\n军队在装甲车与直升机的轰鸣中浩浩荡荡开进圣保罗，成千上万市民屏息凝望这支钢铁洪流。地方警力依令撤出自由区，取而代之的是荷枪实弹的士兵构筑起环形钢铁防线。暴乱分子与军队对峙的瞬间，整座街区陷入诡异的死寂，暴徒们的怒吼在武装到牙齿的士兵面前渐次低哑。\n\n骤雨般的行动在下一秒爆发。\n\n装甲运兵车碾过自由区的沥青路面，士兵们以战术纵队紧随其后。来不及躲避的倒霉鬼或被暴力拘捕，或被子弹贯穿，甚至惨遭履带碾轧。就连混入暴乱队伍的警员，也未能在这台战争机器面前获得丝毫怜悯。随着关键路口架起检查站，突击小队开始逐栋清剿可疑头目，自动武器的短促点射声在城市上空此起彼伏。\n\n几小时后，喧嚣重归死寂。玻璃爆裂声与哭喊被直升机螺旋桨的嗡鸣取代。无论代价几何，自由区终究在军靴下恢复了“秩序”。只是那些深可见骨的创伤，能否如创口般轻易愈合？"
 brazil_lacerda.145.a: "教科书式的行动。"
 brazil_lacerda.146.t: "静静的自由区"
 brazil_lacerda.146.desc: "肆虐自由区的暴乱之火终告熄灭，圣保罗正逐渐恢复表面的和平与秩序。戈尔贝里将军的部队仅用数小时便镇压了暴动，迅速在街区内建立前沿阵地，震慑任何妄图再掀波澜的宵小，整个过程几乎未遇抵抗。\n\n宵禁令执行一段时日后，局势已无反复之虞，军方终于解除了对自由区的铁腕控制，留下的只有圣保罗这个曾经繁华街区的残破废墟。\n\n尽管此次平叛堪称神速，代价却触目惊心。军队本应是慎用的利剑，但此番在圣保罗的部署却难称精准克制。行动伊始便不断传出平民遭流弹所伤的噩耗，士兵们为搜捕滋事者更是将无数商铺民居夷为平地。\n\n这无疑加剧了民众对军方的愤怒，但另一方面，街头重现的法治也让不少市民如释重负。拉塞尔达总统与瓦加斯州长因果断平息骚乱而广受赞誉，私下里，两人对这样的结局再满意不过。\n\n创口虽已止血，愈伤之路方才启程。自由区大片区域亟待重建，痛失亲人的家庭仍在追问真相，整座城市依然笼罩在未知的迷雾中。即将展开的质询与调查注定令人头疼，但至少当暴乱的余烬冷却时，人们终于确信：最黑暗的时刻已经过去。"
 brazil_lacerda.146.a: "有问题，叫军队。"
 brazil_lacerda.147.t: "突如其来的指控"
 brazil_lacerda.147.desc: "戈尔贝里·多·科托-席尔瓦将军恼火地推开门，积蓄数小时的怒火喷薄而出。门后，瓦加斯州长正懒洋洋地倚着办公桌打电话，这副悠闲模样更激得他青筋暴起。\n\n瓦加斯困惑地抬眼，匆匆挂断电话：“将军？什么风把你吹来了？我这会儿有点忙——”\n\n“你确实很忙，”将军一拳砸在桌面上，“忙着给我的平叛工作使绊子！我倒要问问，为什么警方至今还在消极怠工？我的部队在前线镇压暴徒，他们却在后方拖后腿！我亲自去警察总部问，那帮废物连个屁都不放一个！”他猛地撑住桌面逼视对方，“你到底想不想让我们帮忙镇压暴乱？！”\n\n州长的困惑转为错愕：“我……不明白。警方或许有他们的执法特色，但我保证他们绝对愿意配合军方。你和弗勒里警长沟通过吗？”\n\n“‘执法特色’？！我受够你们这套官腔了！受够了弗勒里，更受够了你！真当我看不透你们的小把戏？要我念几段警员参与暴乱的报告给你听吗？”\n\n“你他妈疯了吗将军？！”瓦加斯拍案而起，紫涨着脸吼道，“烧了自己的城市对我有什么好处？要指控就拿出证据！”\n\n将军径直摔门而去，他从不忌惮这个靠社进党撑腰的政客——若传闻属实，这位州长大人的好日子也快到头了。"
 brazil_lacerda.147.a: "小瓦加斯也干了，逮捕他！"
 brazil_lacerda.147.b: "绕过这个白痴另想办法。"
 brazil_lacerda.148.t: "将杀"
 brazil_lacerda.148.desc: "电话响了一次、两次、三次……然后寂静再次吞噬了整个房间。这是小瓦加斯第五次或第六次试图联系地方政府官员，但放下那个破电话听筒时，他感觉像是已经重复了亿万次这个动作。他用拳头砸向桌子，在令人窒息的寂静中低声咒骂着，试图转移自己的注意力。\n\n无人接听电话，他环顾自己的房间想找点事做。突然，他想起那天戈尔贝里冲进他办公室，像头蓄势待扑的狮子般怒视着他。在他能将点连成线之前，一名助手转动办公室门把手，急匆匆地闯了进来。\n\n“长官，我们需要谈谈。”助手眼中带着忧虑，将一叠白纸放在他的办公桌上。市长睁大眼睛看着文件：市内许多社进党官员的名字被标注在纸上，旁边列着他们的逮捕理由。\n\n“煽动骚乱……妨碍警务？这到底……戈尔贝里在哪儿？”小瓦加斯从椅子上跳起来，绝望而愤怒地环顾四周，仿佛这突如其来的消息具象化在了房间里。\n\n“现在恐怕不行，长官。他正带着部队准备前往自由区。”助手话音未落，就看到眼前的人把脸埋进手掌，用压抑地喃喃自语起来，不然他绝对会爆发出怒吼。"
 brazil_lacerda.148.a: "“戈尔贝里，你妈逼的……”"
 brazil_lacerda.149.t: "棋差一着"
 brazil_lacerda.149.desc: "“戈尔贝里，这他妈是怎么回事？！”拉塞尔达总统将报纸狠狠摔在桌面上，向来沉稳的面容因暴怒而扭曲。戈尔贝里将军怔怔望着上司——那版面上赫然印着小瓦加斯戴着手铐被押走的照片，正是他动用不那么光明正大的手段罗织罪证的“杰作”。\n\n“是您让我压制社进党——”\n\n“我他妈没让你搞这种拙劣把戏！现在全巴西都在看我们笑话！”总统的怒吼响彻房间。将军像个挨训的孩童般低头不语。\n\n“赶紧……把人放了。”拉塞尔达疲惫挥手。将军刚欲争辩，却在对方恶狠狠的注视下噤声，机械般点头领命。总统摔门离去的巨响中，将军抓起电话的手微微发抖。\n\n数日后，在某间与总统办公室格局相仿的房间里，弗勒里警长正对着战战兢兢的助手发出鬣狗般的咯咯笑声——小瓦加斯果然被无罪释放了，一切尽在他算计之中。那些证据当然货真价实，只不过幕后黑手并非市长大人。\n\n助手退下后，弗勒里突然止住笑声，缓缓摇头望向窗外。游行人群的呐喊随风飘入，他凝视着自己映在窗户上的身影，嘴角扬起一抹玩味的弧度。"
 brazil_lacerda.149.a: "戈尔贝里到底在想啥？"
 brazil_lacerda.150.t: "自由区混战"
 brazil_lacerda.150.desc: "今日午后的自由区堪称一团混乱。\n\n军方与警方的政治角力骤然升级，机械化部队仓促开拔，在街区外围筑起钢铁防线。然而奉命驻守的警察部门因高层指令混乱陷入分裂：有人顺从地撤出阵地，有人则誓死不退，双方在街垒间形成诡异的对峙僵局。\n\n真正的噩梦始于军方受命进入街区平叛。某支作战单位刚踏入自由区，便撞见一名身着半截制服的暴徒正对日系居民施暴——士兵们果断击毙了施虐者，却未意识到对方竟是在籍警员。警报如潮水般涌入警用频道，短短数分钟内，暴怒的警察与军方在街巷间展开血腥交火。\n\n混乱如瘟疫般蔓延，武装暴徒趁机浑水摸鱼。整座圣保罗城在枪炮轰鸣中战栗，市民蜷缩家中，恍惚间竟如置身战场腹地。腹背受敌的军方紧急呼叫增援，但更多军车涌向自由区的场景，却让整座城市的不安攀升至顶点。\n\n据最新消息，军警双方至今仍未收到停火指令。当暴徒、警察与士兵在街垒间陷入三方混战不休时，人们不禁要问：这场噩梦，究竟何时才是尽头？"
 brazil_lacerda.150.a: "代价必定惨重。"
 brazil_lacerda.151.t: "烈火焚城"
 brazil_lacerda.151.desc: "军方铁骑初现时，虽令部分市民不安，但更多人坚信这股蛮力能迅速终结肆虐圣保罗的暴乱。可现实却给了所有人一记响亮的耳光。\n\n自由区三方混战的硝烟刚起，军队便陷入暴徒与愤怒警员的双重夹击，不得不仓促求援。整整48小时的鏖战，才勉强在街区内重建立足点。而彻底扑灭暴乱的火星，又耗费了同等时长。此间昼夜不息的零星交火，将这座城市的神经撕扯得支离破碎。直到煎熬的四天后，枪声渐息，圣保罗史上最黑暗的篇章才缓缓合上。\n\n这场灾难性行动的苦果，最终由拉塞尔达总统与瓦加斯州长共同咽下——前者无力调和军警矛盾，后者对警界乱象优柔寡断。政治余震必将撼动政坛，但自由区承受的创痛更为深重。如今的街区已成满目疮痍的战场，尸横遍野，断壁残垣间飘荡着未散的硝烟。\n\n即便总统已下令撤军，迷茫的阴云仍笼罩在人们心头。民众亟待真相，自由区渴盼重生。当这场血色风暴终于远去，唯一能做的，只有在废墟上蹒跚前行。"
 brazil_lacerda.151.a: "至少结束了……"
 brazil_lacerda.152.t: "拉塞尔达的圣保罗之行"
 brazil_lacerda.152.desc: "车载收音机应总统要求关闭。他需要寂静的沉思来规划前路。\n\n他瞥了眼幕僚塞进车内的简报材料。此刻他只需思考。瓦加斯——这个镌刻在历史中，镌刻在束缚这个国家的锁链上，也镌刻在他即将会面之人档案上的姓氏。正是此人酿成这场危机，其政治幼稚与无能简直令人难以置信。\n\n拉塞尔达是否遗漏了什么？或许在妄下结论前，该听听当事人说辞。毕竟，无能到这般程度多少有些匪夷所思。那不过是个涉世未深的公子哥，或许正需要救命绳索。\n\n但危机总与机遇并存。趁城市燃烧之际，他可用余烬焚毁小瓦加斯，摧毁社进党，让这个浪子身败名裂。当他们在接踵而至的危机中孤立无援时，媒体将放大每个微小失误，而联邦政府对此爱莫能助——这显然是越权之举。\n\n社进党向来狡猾，总能奇迹般逃脱惩罚——或靠腐败，或仰赖他人更甚的无能。如今清算时刻已至。他们必将为错误付出代价，总统绝不会施以援手。\n\n不多时，窗外的景色从乡村变为了城市。"
 brazil_lacerda.152.a: "危机总与机遇相伴。"
 brazil_lacerda.152.b: "总统与浪子携手。"
 brazil_lacerda.153.t: "冒烟的铁锅，冒烟的城市，冒烟的枪管"
 brazil_lacerda.153.desc: "市中心的一家餐厅里，后厨煎炒声此起彼伏。拉塞尔达从容应对着当地媒体的提问，少量总统卫队维持着现场秩序，允许市民围观。人群起初稀疏安静，渐渐聚集涌动。某位记者率先发问：\n\n“拉塞尔达先生，您此次以官方身份到访，有什么话想对圣保罗市民说？”\n\n“感谢提问。在这动荡时刻，我的心与圣保罗人民同在。需要强调的是，我尊重瓦加斯不借助军事干预自主处理局势的意愿，尊重选民在上次选举中表达的意志，并将信任赋予地方政府及政治社会秩序部。让我们共同见证他们如何处理危机，看瓦加斯能否赢得市民信任。”拉塞尔达向人群报以微笑。\n\n提问持续进行，围观群众大多为见到总统而兴奋。渐渐地，人们开始专注聆听他的每句话——但并非所有人都如此。人群中突然响起一声枪响。子弹虽偏离目标，却分明是朝总统方向射来。肾上腺素在拉塞尔达血液中奔涌，安保小组迅速将他护送至餐厅掩体。这已不是他第一次遭遇刺杀——子弹如同即将冒烟的煎锅迸溅的油星。整座城市正处在混乱当中，而他只需往正确的方向轻推一把。"
 brazil_lacerda.153.a: "拉塞尔达再次逃过一劫。"
 brazil_lacerda.154.t: "孤独的瓦加斯"
 brazil_lacerda.154.desc: "小瓦加斯素以精力充沛、殷勤逢迎著称，此刻却难掩倦容。电话响个不停——记者、警长、兄弟轮番蚕食着他的空闲时间。尽管暴乱占据了他的全部心神，解决方案却依然遥不可及。警方仍在接二连三地犯错。\n\n前往会晤的途中，他揣测着拉塞尔达与塔沃拉又将抛出什么新说辞。车窗外，咖啡馆闭门歇业，街道行人稀落，远离暴乱中心的商铺也钉上了木板——他无法责怪这些商户的自保之举。\n\n警局前，他本以为会见到两位要员，却只见塔沃拉孑然而立。\n\n“拉塞尔达呢？”小瓦加斯脱口而出。\n\n“事实上我们也在等他。”塔沃拉看向随员，“看来总统正忙于视察，他授权我在此和你达成各项协议。”\n\n“危机当前，总统对我居然避而不见？”他凝视塔沃拉，眼中翻涌着深重的疲惫、挫败，近乎被背叛的痛楚——仿佛被遗弃在火场却无水枪可用。\n\n塔沃拉静立如松。他太清楚拉塞尔达的盘算——毕竟那些蜂拥而至的记者，都是他亲自联络的。可怜的小瓦加斯。"
 brazil_lacerda.154.a: "他没机会了。"
 brazil_lacerda.155.t: "结束工作的一枪"
 brazil_lacerda.155.desc: "瓦加斯强打精神听着塔沃拉的陈述，点头时几欲昏睡。他疲惫不堪，被这座不眠之城榨干了最后一丝精力。塔沃拉正谈论整顿警队的必要性，瓦加斯机械式颔首。面对难以合作的警方，让联邦增派支援终归是好的。\n\n握手礼毕，二人步出警局即被记者群包围。镁光灯闪烁，手持速记本的记者堵住去路：“副总统先生、州长先生，我们刚获悉总统遭遇未遂刺杀，当时他正在市内召开记者会。您对此有何回应？特别是拉塞尔达总统声称‘尊重瓦加斯自主处理局势的意愿’，州长您有何评价？”\n\n倦意拖慢了反应速度，塔沃拉率先上前：“瓦加斯州长从未请求军事干预，我们尊重其作为州长的自治权，也尊重他不愿军队介入危机的意愿。”\n\n拉塞尔达的陷阱铿然合拢，瓦加斯惊恐地望向侃侃而谈的副总统。塔沃拉向人群挥手致意，嘴角含笑。面对这支城中唯一的“军队”——记者军团，瓦加斯嗫嚅着“无可奉告”退回办公室，静待报纸头条的审判。“优柔寡断”、“安保失职危及总统性命”——专栏文章如约而至。他抓起电话，听筒那端传来戈尔贝里的声音。数小时后，瓦加斯召开记者会，宣布向联邦政府请求军事介入，并要求警长弗勒里接受军方指挥。"
 brazil_lacerda.155.a: "军队即将到来。"
 brazil_lacerda.156.t: "两对车辙"
 brazil_lacerda.156.desc: "返程的车队驶离圣保罗，窗外都市渐次退为乡野。拉塞尔达凝视着玻璃上掠过的倒影，耳畔仍回荡着那声枪响。安保人员环护他寻找掩体的触感犹在，肾上腺素激涌的颤栗仍蛰伏在肌肉记忆里。这次比上次幸运些——那颗本该射向他的子弹，最终只撕裂了空气。不过在这座燃烧的城市里，“无人伤亡”或许是个伪命题。事件走向堪称奇妙，刺杀未遂竟成为加速瓦加斯政治死亡的催化剂，这种对自身遇袭事件的利用令他泛起异样的恶心。硝烟气息挥之不去，每当他将刺杀案纳入政治棋局，耳鸣便化作尖锐的刺痛。子弹的轨迹在他思维中不断折射，即便为这枚射偏的子弹找到用途的快意，也难掩金属嗡鸣的余震。\n\n戈尔贝里以胜利者姿态进入圣保罗，军装上的金星此刻象征着军政长官的权柄。拉塞尔达的指令简洁明确：即刻终结暴乱。这本就是他最初的意图，如今借由总统精妙的政治操盘，这场镇压行动披上了瓦加斯亲手递来的合法性外衣。专车即将抵达时，将军嘴角扬起志得意满的弧度。\n\n圣保罗警长弗勒里呆坐办公室，趁军政长官驾临的间隙谋划着棋局。此刻警队表现已无关紧要——若军方入城后重蹈他的覆辙，反而能成为他翻盘的筹码。军方无能自有其利用价值，而他恰是擅用此道之人。"
 brazil_lacerda.156.a: "戈尔贝里即将介入。"
 brazil_lacerda.157.t: "瓦加斯和拉塞尔达的握手"
 brazil_lacerda.157.desc: "拉塞尔达与塔沃拉走进马塔拉佐大厦的一间会议室。瓦加斯深陷在焦躁与疲惫的泥沼中，他内心的风暴与这座城市的动荡遥相呼应。两人推门而入的刹那，瓦加斯突然焕发出新的活力，起身与二人握手。拉塞尔达要求简要了解局势，瓦加斯立即滔滔不绝起来。\n\n“警方一直在努力控制局面，试图遏制自由区骚乱的同时安抚民众。但他们的反应太迟钝了，行动迟缓得像蜗牛。弗勒里警长这些年做得不错，但我必须确认他的措施是否得当……”瓦加斯语速急促，直到被塔沃拉打断。\n\n“我们需要直接与弗勒里沟通，但也要另辟蹊径。现在有哪些人道组织在参与善后？卡洛斯，或许我们可以在这方面有所作为？”塔沃拉看向拉塞尔达。\n\n拉塞尔达思忖着可能需要的妥协，揣测弗勒里会提出什么条件。虽然忧心忡忡，但他别无选择。“为了圣保罗的未来，去做吧。”他点头道。三人起身握手的瞬间，小瓦加斯突然将拉塞尔达拉到角落，低声要求单独谈话。拉塞尔达面露困惑却仍点头应允。在他们离开时，秘书们已开始筹备新的会议，而窗外的浓烟仍在城市上空盘旋。"
 brazil_lacerda.157.a: "他眼神疲惫，却如释重负。"
 brazil_lacerda.158.t: "警长与总统"
 brazil_lacerda.158.desc: "圣保罗警察总长塞尔吉奥·弗勒里的办公室。往日这里就像蜂巢般忙碌，警令通过无线电层层下达。自从自由区的骚乱升级为燎原之火，此地更添焦灼。若在高效运转的警务体系下，这本该是扑灭暴乱的指挥中枢，可此刻暴徒仍在街头肆虐。弗勒里正陶醉于幻想——总统亲临这间刻着他姓名的办公室，墙上新裱的肖像在日光下熠熠生辉。\n\n当三位政要步入时，弗勒里立即进入状态：“我们英勇的警员已掌握确凿证据，证实臣道联盟与日本政府存在勾连。这些毒瘤遍布全城，我们正全力清剿。若非这场骚乱，我们还蒙在鼓里——他们竟妄图颠覆民主，把巴西卖给亚洲财阀！总统先生、州长先生、副总统先生，如今我们既要镇暴又要锄奸，实在分身乏术。”他身体前倾，双手撑住桌面，“为捍卫国家主权与民主制度，我恳请将警局预算翻倍，并增配直升机与装甲车。当下正值危机，这要求并不过分。”\n\n此言一出，气氛骤变。原本频频附和的三人顿时僵住——这数字远超预期。拉塞尔达沉默不语。预算翻倍简直荒谬，但断然拒绝恐生变数。“弗勒里警长，”他斟酌着开口，“政府要统筹多方，我的权限至多批准75%的预算增幅。”他后仰靠向椅背，脑中闪过其他选项：揭露警长的投机嘴脸，拒绝承诺任何支援，将资源投向其他平乱渠道；或者，继续押注眼前这个贪婪的赌徒。"
 brazil_lacerda.158.a: "相信弗勒里。"
 brazil_lacerda.158.b: "他胃口太大了，让他滚一边去。"
 brazil_lacerda.159.t: "人道主义委员会会议"
 brazil_lacerda.159.desc: "马塔拉佐大厦即将召开委员会会议。拉塞尔达总统、塔沃拉副总统与瓦加斯州长将联袂出席，同席的还有来自市工会的代表、本地医院护理部主任、圣保罗大学学生会主席以及代表本地教会的修女。会议准时开始，起初秩序井然，直到各代表在议事厅内陆续提出诉求。他们开出的药方是一系列资金注入方案。随着各方谈判立场激烈碰撞，声量逐渐升高。\n\n代表们剑拔弩张之际，塔沃拉已洞悉各利益集团的姿态，清了清嗓子开始发言：“感谢各位到场，协助我们梳理当前危机。我们必将竭尽所能，以最高效方式调配资源，惠及各位所代表的群体。彼此敌视无济于事——工会成员需要就医，需要去教堂祈祷，他们的子女可能正在学生会担任职务。当务之急是共同制定一份连贯、具体的文件，作为城市重建的行动纲领。”随着切实可行的方案逐渐成形，会场氛围为之一变。最终版本的协议包括：为医院提供专项资金，向因企业停摆而失业的工人发放补助等系列措施。看着文件里不断攀升的数字，瓦加斯欣喜地盘算着这些资金将如何流入他的城市。\n\n拉塞尔达却随着金额的不断叠加愈发忧心忡忡。尽管塔沃拉已将方案控制在可行范围内，但在危机尚未解除且政府资源有限的情况下，这笔开支仍令人如坐针毡。他面临抉择：接受这份初步协议，或是亲自介入进一步压缩预算。"
 brazil_lacerda.159.a: "接受塔沃拉促成的协议。"
 brazil_lacerda.159.b: "开销太大，拉塞尔达要求削减开支。"
 brazil_lacerda.160.t: "父辈之罪"
 brazil_lacerda.160.desc: "马塔拉佐大厦高耸的议事厅内，委员会会议日复一日地持续着。趁着塔沃拉忙于安抚学生会成员的间隙，拉塞尔达与瓦加斯暂离会场稍作休憩。\n\n“知道吗拉塞尔达，”瓦加斯倚着大理石廊柱开口，“我从未想过会与你密切共事。当年竞选时，我总在痛斥戈梅斯与全民盟，说你们要毁掉我父亲的遗产。我曾坚信全民盟无力解决巴西尤其是这座城市的痼疾，但你为圣保罗殚精竭虑的行为令我改观。”他压低声音，“虽然我不像阿德马尔那样执掌社进党，但或许未来我们能在舆论场稍作配合，甚至在参议院选举中形成默契——当然并非正式的联盟。”\n\n拉塞尔达正欲回应，瓦加斯突然急切地继续道：“父亲当年总说你们是美国傀儡，要夺走巴西的自由。如今我才明白，他那些政策何其偏颇。这场骚乱让我看清，全民盟和我们殊途同归，都在为巴西的明天奋斗。”他伸出手，“这些日子我们携手的场景，不正是未来更广阔合作的基石吗？”\n\n拉塞尔达凝视着悬在半空的手掌。这分明是瓦加斯与社进党设下的陷阱——假意合作实则蚕食全民盟的影响力。但对方言辞间暗藏机锋确是不争的事实：报纸头版尽是瓦加斯亲临现场的英姿，民众早已视其为救世主。若此刻拒绝橄榄枝转而求助于军方，舆论恐将倒戈相向。\n\n或许该握住这只手……"
 brazil_lacerda.160.a: "拉塞尔达离开了房间。"
 brazil_lacerda.160.b: "拉塞尔达握住了瓦加斯的手。"
 brazil_lacerda.161.t: "枪声响起"
 brazil_lacerda.161.desc: "若用“过山车”形容今日事态发展都显得过于轻描淡写。全副武装的警察部队在自由区外围构筑严密封锁线，其威慑力几乎令骚乱完全平息。面对警方即将展开的清剿行动，日系激进分子的活动也愈发沉寂。防暴盾牌林立地面、军靴踏响街道，似乎所有人都明白了执法者的意图——唯独无人料到这场行动会演变成彻头彻尾的灾难。\n\n随着警力深入自由区腹地，骚乱在瞬息间再度爆发，各单位间的协调性短短几分钟内便土崩瓦解。某些纪律涣散的小队擅自加入暴乱者行列，另一些则立即陷入日系武装分子的交叉火力压制。至日落时分，圣保罗警方被迫撤离自由区，但这场混乱不堪的行动连撤退都举步维艰。\n\n当报告最终呈递至小瓦加斯案头时，自然引发轩然大波。毫无疑问，这又是个抨击拉塞尔达的绝佳把柄！他心想：若当初没把自己的话当耳旁风，警方行动本可更顺利。匆匆阅毕报告后，他立即将文件塞进办公桌，毫不犹豫地冲出办公室。小瓦加斯亟需召开记者会，赶在总统质疑警方能力之前掌控舆论——只要计划顺利，这场惨败的罪责终将落在拉塞尔达头上……"
 brazil_lacerda.161.a: "圣保罗会挺过去的，一定会的。"
 brazil_lacerda.162.t: "叫骑兵来"
 brazil_lacerda.162.desc: "卡洛斯·拉塞尔达真不敢相信自己眼前的景象。圣保罗，巴西最宏伟的都会，居然被自己的市长扣作人质！拉塞尔达不是傻子，小瓦加斯这几天玩弄的阴谋被他看了个一干二净。任凭他在媒体前疯狂造势，昨日警方的灾难性表现和造成的损失都是不争的事实。\n\n这就是小瓦加斯的算盘吗？这废柴麻溜地爬上了道德高地，把灾难的责任都推到了总统头上，真不知道他是怎么想的。拉塞尔达不想再因优柔寡断遭人抨击了。他们想要行动？好，那么好。拉塞尔达的手悬在电话的听筒上，回忆着戈尔贝里将军的号码。\n\n“将军？我已经充分考虑了你的方案了。我想你已经见识过警察们昨天的表现了吧？到头来，还是要靠我们给他们擦屁股。”\n\n另一头的声音略显迟疑。“这么做会产生严重的后果。市长先生可不希望军队下场，他会让新闻界的马屁精诽谤我们。您应该清楚这些后果的吧？”\n\n拉塞尔达叹了口气。“小王八蛋那头交给我来对付就行，你把人给我带来就好。等你的人都准备好了，再给我回话。”说完后，他搁下了话筒。戈尔贝里说得不错，但小瓦加斯绝不会在军队进到他的城里时候保持沉默。拉塞尔达能应付得了这些抱怨，他只想终结这场暴动。"
 brazil_lacerda.162.a: "该给他们来点大的了。"
 brazil_lacerda.163.t: "恢复秩序"
 brazil_lacerda.163.desc: "圣保罗警察着手切断了每一条进出自由区的道路，市区的通道上遍布路障与防暴特警，城中气氛无比紧张。警官们步入了自由区，动手清除暴动，成果非常喜人。在瓦加斯市长与巴西政府的支持下，警方实力大幅增强。有了现代装备的协助，警察紧密合作，迅速地冲垮了暴乱分子。防爆盾墙大步推进，催泪瓦斯淹没了整条街道，卡车上的高压水炮则摧毁了一切胆敢迎着烟雾靠上来的东西。\n\n人道主义工作也跟着警方一同前进，教会、医院、慈善机构等等组织已经赶到现场，为所有伤员提供帮助——无论打伤他们的是暴徒还是警察。他们将日系带到了可以安心养伤的地方，帮他们摆脱了激进组织的控制。\n\n行动一直持续到下午，当太阳落山的时候，破坏自由区的暴动已近尾声，取而代之的是云集而来的警察部队，看样子他们还会在这里驻扎很久。警察逮捕了大批武装分子，将他们押出自由区，送进监狱听候发落。那些躲过法律制裁的暴恐分子，则可以借着这个关键机会，好好掂量掂量自己关于未来的选择。虽然此次行动造成了数百平民伤亡，但它仍可谓一场胜利，自由区灾难中最血腥的一章似乎就要翻篇了。瓦加斯市长与拉塞尔达总统对此感到非常满意，事实证明二人的伙伴关系确实卓有成效……"
 brazil_lacerda.163.a: "而现在，或许可以开始重建了。"
 brazil_lacerda.164.t: "烟消云散"
 brazil_lacerda.164.desc: "自由区骚乱管控行动发起48小时后，历经暴力与动荡的圣保罗似乎重归表面平静。自由区依旧遍布武装警察，每个街角都有警员警惕任何胆敢滋事者。尽管包括“日本佬马里奥”在内的武装分子头目仍逍遥法外，其势力已被迫转入地下。密集的警力部署令市民略感不安，但许多自由区及周边居民暗自庆幸——毕竟无需动用军队的钢铁洪流。\n\n尽管平民伤亡与政治社会秩序部腐败加剧骚乱的骇人传闻仍在媒体发酵，警方的成功已让小瓦加斯市长志得意满。与拉塞尔达的交易回报远超预期，如今大半个国家都站在他身后。尽管骚乱期间不乏对其动机的质疑，如今已无人质疑其手腕。多家媒体正在撰写专题，盛赞这位“危机处理大师”的政治智慧。\n\n然而噩梦虽散，自由区已满目疮痍。数百具尸体横陈街头，数千伤者亟待救治，更有无数逃离者在混乱中下落不明。重建迫在眉睫：这片街区亟待恢复往日荣光，针对各方的正式调查必将展开……"
 brazil_lacerda.164.a: "不幸中的万幸。"
 brazil_lacerda.165.t: "瓦砾之墟"
 brazil_lacerda.165.desc: "瓦砾堆中露出一根高挺的鼻梁。消防员罗热里奥·沙维斯·曼托瓦尼用磨损的手套刨开碎砖，灰烬覆盖的面庞上，空洞的瞳孔正与他对视。他将这具扭曲的躯体从钢筋水泥中剥离，送上担架时，混凝土碎屑还在簌簌坠落。这样的无名尸首，在大灾难中通常要数周才能确认其身份——前提是真有人前来认领。\n\n曼托瓦尼冷铁般的眸子下挂着眼袋。连续三班倒的救援已让他双臂肌肉痉挛，却仍在指挥推土机清理最顽固的废墟堆。直到长官强行下令：回消防站休息十小时，违者严惩。他这才发现自己的双腿抖得像地震仪指针。\n\n抓着临时楼梯的扶手踉跄而下，警戒线外翻涌的声浪扑面而来。哀恸的人群举着照片试图突破封锁，那些镶在塑料相框里的笑脸，此刻已消陨在余烬未熄的焦土之中。\n\n忽然有道佝偻身影撞进视野——日系老人稀疏的白发沾满尘絮，眼皮因过度圆睁而外翻，枯枝般的手指擎着张泛黄照片。曼托瓦尼跛着脚靠近。照片里少女的鼻梁与瓦砾堆中那具尸体如出一辙。\n\n“抱歉。”他嘶哑道。老人眨了眨浑浊的眼球，相纸在两人指尖传递时，消防员别过脸走向消防车。"
 brazil_lacerda.165.a: "远离痛苦。"
 brazil_lacerda.166.t: "终点在望"
 brazil_lacerda.166.desc: "自由区仍深陷困境。种族骚乱中，大批日系居民被迫逃离家园，如风中柳絮四散飘零。为防止圣保罗爆发全面住房危机，政府紧急启动临时安置计划：将空置建筑改造为临时公寓，在市区公园搭建帐篷营地与拖车营地。这些权宜之计虽暂缓燃眉之急，却滋生出新的社会病灶。\n\n昔日向公众开放的绿地如今遍布临时居所，引发原住市民强烈不满。更令人忧心的是，这些简易安置点犹如暴乱余烬中的干柴——零星骚扰事件与仇恨犯罪时有发生，幸而安保力量及时介入，未使局势再度失控。纵观全局，相较于月前炼狱般的景象，现状已堪称曙光初现。但若要彻底平息动荡，显然仍需更多雷霆手腕。"
 brazil_lacerda.166.a: "动用更多警力维持秩序。"
 brazil_lacerda.166.b: "保险起见，提供更多庇护所。"
 brazil_lacerda.166.c: "我们必须专注于重建！"
 brazil_lacerda.167.t: "人人得自由"
 brazil_lacerda.167.desc: "自由区暴乱的“善后”工作（若那堪称灾难性的处置手段也能称为善后的话）曾让人冀望这场悲剧至少能终结先前的耻辱。\n\n然而，参与重建的工作人员传回的报告，却勾勒出令人心寒的图景。临时庇护所虽然勉强搭建好，整个社区仍深陷无政府状态。\n\n试图返家搜寻财物或失联亲眷的日系居民，往往被盘踞街巷的暴徒驱赶甚至袭击——这些在巷战后控制自由区的残党依然在阴影中徘徊。\n\n趁火打劫已成常态。原本置身事外的市民见法纪荡然，纷纷化作秃鹫扑向腐肉。目击者称，携带着收音机、电视机、家电乃至传家宝的盗掠者，正络绎不绝地逃离这片废墟。\n\n警队在与军队血战后元气大伤，如今既要维持全城秩序，又要防范暴乱死灰复燃，早已左支右绌。\n\n若当初的应对手段更加明智，结局或许会大不相同。然而世上没有后悔药，只能祈祷这团乱麻能自行解开。"
 brazil_lacerda.167.a: "我们本可以做得更好。"
 brazil_lacerda.168.t: "开放性创伤"
 brazil_lacerda.168.desc: "历经数月无政府状态后，政府资助的自由区重建工作终于启动，但若说局势已得到控制仍为时尚早。虽然大规模抢劫已基本平息，暴力团体也多作鸟兽散，但留下的只有满目疮痍的鬼城。零星的暴力事件仍在持续上演，而少数留守家园并奇迹般存活的日系居民，此刻正在街道上忍饥挨饿。对政府重建迟缓的抗议已成常态，鉴于当局在应对骚乱时暴露出的腐败、严苛官僚作风与行政失能，我们已无力安抚民众的恐慌。\n\n日立提供的先进施工设备终于运抵当地，但即便拥有这些助力，重建进度依然举步维艰。即便如此，进展终究好过停滞。纵然过程艰难曲折，圣保罗历史上这段耻辱的篇章终将翻页。不少政府官员已开始高谈阔论这场危机本该如何处置，但这些言论不过是事后诸葛亮。当务之急是确保重建工作善始善终，并谨记这些惨痛教训，以应对未来可能出现的危机。"
 brazil_lacerda.168.a: "至少，进度有在推进了……"
 brazil_lacerda.169.t: "本可更糟"
 brazil_lacerda.169.desc: "前田和夫用衣袖擦了擦额头的汗珠，难得地露出笑容。六个小时挑灯夜战的高强度劳作终于有了成果——在数月前席卷圣保罗的种族危机中，这片街区数以千计的房屋被付之一炬，如今新房的基桩已深深夯入焦土。整个自由区正处于灾后重建阶段，这片饱经沧桑的街区近几周明显加快了复兴步伐。许多建筑正在修复或已完成修复，暴乱起始点附近甚至竖起了一座小型玄武岩纪念碑，镌刻着百余名遇难者的姓名。虽称不上恢宏壮丽，但足够庄重，和夫如是想。经济复苏的萌芽随处可见，街角便利店陆续重新开张。仍有不少逃离到圣保罗农村的居民因安全顾虑选择观望，但越来越多的人正重返市中心，在修缮一新的公寓里恢复水电供应，重建生活秩序——这些曾中断数月的基础设施，正让社区艰难却坚定地回归正轨。\n\n如今的自由区远非昔日模样：骚乱与暴力夺走数百甚至上千条生命，迫使无数人流离失所，往日的繁华早已荡然无存。但正如日本民族的坚韧，巴西人民同样拥有不屈的脊梁。和夫闭目沉思。要抚平创伤可能需要数月、数年，甚至数十年。然而某种久违的情感正在他胸腔涌动——那是过去几周近乎枯竭的，名为希望的力量。\n\n既然已被命运击倒在地，除了重新站起外别无选择。"
 brazil_lacerda.169.a: "七次跌倒，八次爬起。"
 brazil_lacerda.170.t: "缓慢的恢复"
 brazil_lacerda.170.desc: "此刻或许可以断言，自由区已永远失去往日光华。尽管官方宣布重建工程接近尾声，但暴乱遗留的深层创伤显然需要数年乃至数十年疗愈。水电等基础设施虽在大部分区域恢复，市政管理的低效与残留的地方抵制仍在某些角落拖缓进度。即便基础服务重建，整个街区仍像具空壳——暴乱前三分之二的人口消散后，街道终日笼罩诡异的寂静。\n\n多数被驱逐的日系巴西人选择在反日情绪较淡的农村地区重建生活，而非回归故土。圣保罗临时庇护所人满为患，引发向全国扩散的迁徙潮——只要不是自由区，哪里都可以。本地商业生态近乎枯竭，潜在投资者对这片刚经历社会撕裂的土地望而却步。仅存的经济活动也只为重建工程输血，再无其他生机。\n\n在暴乱起源地尼泰罗伊影院外，一座纪念场所正艰难成形。新栽的樱花树占据纪念碑核心位置，人们期待它的生长能唤醒自由区的复苏。面对重重困境，这个愿景能否实现仍是未知数。但日系族群仍在伤痛中执着前行——再深的伤口，也终将在时光中结痂。"
 brazil_lacerda.170.a: "日子还要继续。"
 brazil_lacerda.171.t: "从“日本佬马里奥”到大泽静夫"
 brazil_lacerda.171.desc: "大泽静夫裹紧厚实羊绒外套，攥着司法传票的手指在寒颤中渗出冷汗。圣保罗法院的门扉在他面前洞开，宛如巨兽之口。他下意识想扯开衣领透气，却猛然顿住——那些在暴乱中为保护平民而留下的伤疤，每道都是指控他参与地下活动的铁证。\n\n更怕被法警比对出通缉令上“日本佬马里奥”的合成画像。\n\n十二道异族目光从环形审判席刺来。他机械应答着姓名、生辰与住址，每个音节都在大理石穹顶下激起回响。预想中的诘问并未降临——没人提及臣道联盟的往事，没有追查武器运输网的痕迹。原来当局真当他只是个精通日语的调查员。\n\n国家民间动乱咨询委员会的橄榄枝来得荒诞：他们读过他在《新闻报》的专栏，需要一双能辨认骚乱参与者日系面孔的眼睛。当法官们嗤笑着将案件卷宗推向他时，大泽明白这是全身而退的赎罪券。\n\n昔日“日本佬马里奥”用笔锋串联起皇道社的秘密网络，而今大泽以记者身份书写真相；曾几何时他用暗语调度抵抗力量，如今却要以流利日语协助司法调查。若说从前的雅帕会唾弃与体制合作，那么此刻的大泽正将过往焚毁于理性之火——唯有借委员会之手重建日系社区，方能确保血色往事永不重演。"
 brazil_lacerda.171.a: "拉塞尔达在这件事上或许做对了。"
 brazil_lacerda.172.t: "平平无奇的行动"
 brazil_lacerda.172.desc: "打字机的咔嗒声和低沉的讨论声被木门被踹裂的巨响骤然打断。巴西警察涌入房间，将皇道社的宣传人员按倒在地。确认安全后，翻译员大泽静夫踏入房间。\n\n首先震撼他的是这个组织的寒酸——阴暗狭小的房间里仅散落着几件家具和打字机。长桌上随意摊开的文件一览无余，仅扫一眼就能看到各类重要情报。奇怪的是所有文件都未提及“臣道联盟”，暗示着阴谋分子并未如此自称。\n\n逮捕后的审讯异常顺利。与其说是审问，更像一场访谈。囚犯们不仅积极配合，甚至主动吐露情报。偶有无法回答的问题——比如同谋藏身之处——也纯粹出于不知情。静夫心情愉悦，这般轻松的工作实在罕见。\n\n审讯中途，一位老警察突然插话：“先生，这些名字我认得，都是臣道联盟余孽。这组织怕是他们的继承者。”\n\n“显然没成气候。”静夫翻动案卷应道，“不过你看这位泷千代子，我总觉得耳熟……”\n\n话音未落，另一名警员匆匆打断：“先生，这边完事了吗？其他组急需翻译，而且该挖的线索都差不多了。”"
 brazil_lacerda.172.a: "“等等，再给我点时间。这位千代子究竟是谁？”"
 brazil_lacerda.172.b: "“没问题，这就来。”"
 brazil_lacerda.173.t: "受真实事件启发"
 brazil_lacerda.173.desc: "特攻队踏着整齐划一的步伐逼近目标。百米开外的露天咖啡馆里，肥胖的警长正啜饮咖啡。队长手握装满弹片的农药袋，引信在顶端滋滋作响；队员们攥着棒球大小的“甜喙”——芥子气弹。弹片炸弹率先划出完美弧线，芥子气则是为阻截追兵准备的。\n\n警长甚至来不及抬头。炸弹精准落向桌心，巨大的冲击波将他掀翻在地，玻璃碎片与鲜血在面庞炸开。完成使命的特攻队开始撤退，有人绊倒在柏油路上。队伍不能停下，他挣扎起身，额角淌血的瞬间，手指本能地摸向腰间短刀。\n\n“恕我冒昧，”静夫打断讲述者，“他们当街切腹了？”\n\n“不。”讲述者面无表情，“那是在他们的老巢里发生的事。”他压低声音补充道，身旁警员飞速记录。\n\n静夫别开视线，强忍烦躁望向街对面的咖啡馆——正是警长殒命之处。临窗女子的侧影似曾相识，记忆胶片突然闪现正记友人的面容。他鬼使神差地落座对面。\n\n“小姐，你认识一个叫正记的人吗？”\n\n千代子猛然转头，双眼瞪大如受惊的小鹿。"
 brazil_lacerda.173.a: "“认识。”"
 brazil_lacerda.174.t: "庇护与重振"
 brazil_lacerda.174.desc: "“先生，谢谢您帮我。”千代子清脆的嗓音从大泽静夫的丰田班代兰特后座传来。这已经是她今天第三次道谢了。他抿嘴点点头权作回应，重新将注意力集中在通往圣安德烈的公路上。转过熟悉的街角时，“大泽百货”的招牌映入眼帘——那是父亲的杂货铺，如今成了躲避城内战火的庇护所。\n\n“所以……您去我家附近看过了吗？有在重建了吗？”静夫摇摇头，踩着咯吱作响的地板走进店内。货架上摆满各国零食的汽水瓶，酒柜被他习惯性重新锁好。\n\n“现在……确实不太平。”他叹息着扯了扯领口，“不过圣安德烈也没那么糟。虽然有点保守——呵，我连电影院都去不成，哪个日裔家里会备着西装领带？但这里足够僻静，你会安全的。”他絮絮说着，没注意到少女把脸深深埋进掌心。\n\n“我……我的家人……都不在了。所有亲戚，兄弟姐妹……全都不在了！”天啊，这要怎么安慰。\n\n“听着，千代子。”他搭上少女颤抖的肩头，“外面的确很糟，但我和父亲保证你有容身之所，你也不用帮忙看店。愿意的话，我可以把你的故事登报，让所有人都知道你的遭遇。”\n\n她抹了把脸。“好吧。但是我欠您一份人情，要不是您从皇道社手里救了我……”她突然挺直腰板，“我发誓会帮忙经营店铺，恪守本分，为国尽忠！”\n\n静夫被这突如其来的口号惊得一愣。积习难改啊，他苦笑着扯了扯嘴角。"
 brazil_lacerda.174.a: "至少她打起精神来了。"
 brazil_lacerda.175.t: "阿德马尔，日本人的英雄"
 brazil_lacerda.175.desc: "巴西的日系社区正急切地盼望一位英雄。他们需要一个身披闪亮铠甲的骑士，需要一个能拯救他们的救世主——一位为他们而战、保护他们免遭种族歧视，抵抗拉塞尔达专制统治的斗士。而这位自称英雄、骑士、救世主的人，正是阿德马尔·德·巴罗斯。至少，他一直是这样向世人宣称的。在巴西各地，阿德马尔凭借自己的资金和关系网，为数以百计的日系被告提供法律援助，特别是那些与皇道社有关联的人。然而，他所提供的远不止保释金：很多遭受冲击的日系家庭收到了他的大笔捐款，甚至得到了他本人亲自探望——当然，这一切都被大肆宣扬。没有任何合法授权，他就擅自对外宣布自己是“日本人的英雄”。\n\n在小瓦加斯看来，这只是浮夸又尴尬的炒作；在拉塞尔达和全民盟眼里，这甚至已经到了值得怀疑的地步；而对绝大多数城市与左翼的日系巴西人而言，这无异于最空洞的迎合。可尽管质疑声不断，还是有不少日系，尤其是乡村地区的日系开始对阿德马尔心生好感，他们大概已经相信了阿德马尔那套“英雄主义”的说辞。阿德马尔希望，在拔除皇道社眼中那根“刺”之后，他的说法能更具说服力。那根“刺”，正是警察系统里一位日系翻译，他即将收到阿德马尔的“执法团队”下达的逮捕令。\n\n此刻，这位翻译对即将到来的危险毫不知情。他只是一动不动地盯着圣保罗大学宿舍的门，看着自己指尖拂过的油漆染上一抹鲜红。大泽静夫低头望向门板，上面用日语喷涂着一行刺目的标语："
 brazil_lacerda.175.a: "“国贼。”"
 brazil_lacerda.176.t: "惊魂一日"
 brazil_lacerda.176.desc: "纸张窸窣与椅腿刮擦声中，又一场会议落幕。大泽静夫与几名基层官员握手道别，对方对他在委员会的工作赞不绝口。他本预料只是些客套恭维，却意外感受到真诚。提起公文包走出办公室时，他以为这不过是寻常一日。\n\n楼梯转角处惊见三辆警车停在室外，数名警员迎面而来。大泽太阳穴突突直跳，带队警官询问“你是大泽静夫？”时，他竟失语片刻才僵硬点头。直至被请入警车后座，他仍未从震惊中回过神来：莫非“日本佬马里奥”的身份败露了？是线人告密？是哪个环节出了纰漏？某次自以为无害的发言？某个场合声音太大？无论如何，共产主义煽动者的罪名足以让他万劫不复。记忆如走马灯般回溯每个可能暴露的瞬间，唯恐整个地下网络因此崩塌。\n\n然而羁押过程出人意料。警局内既无审讯室刺目的白炽灯，也无橡胶警棍的闷响，只有空荡的办公室与沉默的看守。走廊里偶遇的警员面露困惑，有位曾共事过的老警察甚至暗示这可能是乌龙事件——原来连法官签署的逮捕令都没有，仅有警察局长的一纸拘留令。对方好心劝慰：暂时避避风头，真相过几天就会水落石出。"
 brazil_lacerda.176.a: "勉强躲过一劫。"
 brazil_lacerda.177.t: "损害控制"
 brazil_lacerda.177.desc: "大泽静夫与调查委员会官员踏入圣保罗大学校园。表面看来，他镇定自若，与所有渴望真相的同僚别无二致。心底却在冷笑——他早已通知拉马尔卡藏匿罪证，重金封口，确保人民革命先锋队无懈可击。委员会注定徒劳无功，因为关键证据早已转移。\n\n听闻委员会对“日本佬马里奥”的臆测时，他几乎要笑出声。有人说他手握数万大军伺机而动，有人说他在上千个机关都有线人，比巴西政府更早知晓一切。若信了那些茶水间传言，“日本佬马里奥”便是触手遍及四方的暗影之主。每当郁结难舒，大泽只需听听这个“另一个自己”如何被神化——不再是凡人，而是活生生的传奇。\n\n“谢天谢地你们来了！”戴眼镜的男子如释重负地迎上大泽等人，“那个左翼分子就在这儿，快逮捕她。”\n\n“哦？”大泽抢先开口，试图掌控局面，“你指的是谁？”\n\n“迪尔玛·罗塞夫。自称记者，但我知道她参与了上次银行劫案。”\n\n大泽迅速截断话头：“罗塞夫？开什么玩笑？我们早就摸清了她的底细。不过是个虚张声势的激进派，连偷自行车都不敢的胆小鬼，怎么可能抢劫？别疑神疑鬼耽误正事，我们还有大鱼要抓。”"
 brazil_lacerda.177.a: "大泽对躲在远处的迪尔玛微微一笑，竖起大拇指。"
 brazil_lacerda.178.t: "甩锅比赛"
 brazil_lacerda.178.desc: "“鉴于最新数据，瓦加斯州长要求我们对公共武力在近期暴乱中的角色展开全面审计，并推进改革方案。”国家民间动乱咨询委员会主席在圣保罗某栋政府大楼深处的灰色会议室里发言，目光扫过参会的幕僚与委员们，“这与本机构初步调查结论高度契合，我们将采纳这项建议。”\n\n另一位委员随即补充道：“但这并不意味政治社会秩序部能置身事外，他们在事件收尾阶段的配合极为可贵，说明其内部存在温和改良的空间。”说话者将文件夹里的纸张排列得工整如仪，细窄双眼从文件堆上投来的目光不带感情，似乎这些数据表格能消解所有质疑。他合上活页夹发出脆响，有关战略失误的定论已成铁案：“治安失控的主责明确在公共内卫部队。我们查实，其低效源于资源配置失当——该部门夸大了日系群体对农村地区的威胁，将兵力分散部署在乡村与关键城区之间。而事实上乡村始终风平浪静，导致他们在真正的问题区域捉襟见肘。”\n\n大泽静夫瘫坐在远处的会议桌旁，身为翻译员兼记者的他深感无力。这个手握重权的委员会终究不会为日系带来改变——他们不仅得不到基本安全保障，反而要时刻提防政治社会秩序部的滋扰。纸张撕裂声突兀响起，向来整洁的笔记本上飘落一页。静雄潦草写下改良族裔政策的建言，墨迹未干的字句承载着重量，而纸页本身却薄如蝉翼。他知道这类碎片极易被丢弃，正如散落会场的官方文件终将归于废纸篓。"
 brazil_lacerda.178.a: "甩锅比赛没有赢家。"
 brazil_lacerda.179.t: "笔尖上的改革"
 brazil_lacerda.179.desc: "小热图利奥·瓦加斯翻阅着国家民间动乱咨询委员会呈交的种族骚乱调查报告。每一页上的文字都比前一页更加骇人听闻。\n\n报告中，那些缺乏想象力的官僚用尽毕生最尖刻的词汇得出结论：负责预防和遏制骚乱的治安机构暴露出根本性缺陷。报告边缘密密麻麻贴着戈尔贝里·多·科托-席尔瓦的批注，这位上校以委员会不敢复述的激烈措辞痛斥公共内卫部队和政治社会秩序部。但两份文件都未能揭示后者的失职根源。\n\n瓦加斯重重搁下文件。虽然委员会和戈尔贝里达成共识，他却知道最终裁决仍需自己落笔。那些纸页上精密编织的修辞，在实际行动面前都显得苍白。这或许会动摇选民支持，但他已下定决心，提笔写下指令：对两支武装力量全体成员进行再培训、增设战术分队、重新评估镇暴方案、适度增加预算。\n\n最终，行政机器开始运转。州长法令通过各个层级向下渗透。\n\n在圣保罗行政建筑群另一端的走廊里，翻译员大泽静夫攥着新鲜出炉的公告。他反复阅读委员会声明与州长令，对其中只字不提族裔政策改良毫不意外。沾着油墨的手指在废报纸边缘疾书建言——尽管心知这些文字终将被官僚主义的扫帚清理殆尽。"
 brazil_lacerda.179.a: "治国以言，变革以行。"
 brazil_lacerda.180.t: "注意，宝贝！"
 brazil_lacerda.180.desc: "“全在这儿了。”大泽静夫将文件摞砸在秘书桌上，惊得打字机旁的女士钢笔脱手——这堆纸够她忙活半个月。“需要补充随时叫我。”他扯出个干笑转身，却在门口与来人正面相撞。\n\n“甜心，我不在时有重要信件吗？”塞尔吉奥·弗勒里倚着门框，活脱脱是具会走路的恶魔标本。静夫用七年修得的禅宗定力才扼住掐死这畜生的冲动，血管在恐惧与暴怒间鼓胀，面色冷硬如石。\n\n“那边那位记者先生给您送了些文件，您知道的——我总记不住他名字。”秘书倦怠应答，显然对警长的惺惺作态早已免疫。静夫指甲陷进掌心：这个虐囚成性的人渣怎还戴着警徽？明明小瓦加斯的改革该让这支恶棍队伍分崩离析……\n\n……更不该让这张挂着浮夸笑容的丑脸在此招摇。\n\n“妙极了。辛苦啦宝贝。”弗勒里突然转向僵立原地的静夫：“撞邪了？瞧你这屁股里插着通条似的站姿！”他为自己低俗的“幽默”放声大笑，“开个玩笑嘛浅肤色的朋友。加布里埃拉伺候得可好？她真是个小可爱。”蒲扇般的手掌重重拍在静雄肩头，推搡之意昭然若揭。\n\n静夫夺门而出。改革既已启动，这等渣滓早晚作古，何必纠缠。临别时，他听见弗勒里在门后的低语："
 brazil_lacerda.180.a: "“那个亚洲佬送的啥文件过来？”"
 brazil_lacerda.181.t: "日系探戈"
 brazil_lacerda.181.desc: "对于巴西的日系来说，愿意为他们挺身而出的人寥寥无几。田村雪成，正是那为数不多的英雄之一。今天，他与他的律师事务所将为因骚乱被捕的日系群体争取自由。然而，检方的指控一桩接一桩，形势对辩护方而言糟糕透顶。更糟的是，所有皇道社成员都已认罪，几乎看不到任何扭转局势的希望。\n\n在田村看来，辩护是一门艺术，而他正是那位艺术家。“远藤广子，21岁，五个月零四天前被捕。”她是一名左翼学生——在绑架事件之后，这类群体一度成为巴西社会最为排斥的对象。田村非常清楚，哪怕证据再清白，也很难改变陪审团早已形成的偏见。尽管他竭尽全力，结果依旧无功而返。\n\n接着，“小笠原一男，43岁，五个月零两天前被捕。”这是整场噩梦中最棘手的一幕：第一代移民，却依然抱持着法西斯主义的立场。为这样的人辩护本就艰难，要让他获释更是近乎天方夜谭。即便田村与他的信念背道而驰，却仍努力把辩护做到极致，可最终依旧以失败告终。\n\n时间如流水，案件一个接一个地进行。无数名字与面孔在法庭上轮番出现，对于田村来说，这犹如一场漫长的噩梦。有些人无罪获释，有些人刑期减免，但更多的人依旧被判继续羁押。这样的工作既让田村身心俱疲，也让他倍感屈辱。\n\n然而，当一天的庭审结束，田村走出法庭时，却见到门外聚集了一小群人为他鼓掌欢呼。他为日系所作的坚定辩护，让不少人相信：也许，他们终于找到了一个可以团结在身后的领袖，一个能够带领他们走向自由的希望。"
 brazil_lacerda.181.a: "法不容情。"
 brazil_lacerda.182.t: "人民诉卡布拉尔·阿尔梅达、若昂·菲格雷多等人案"
 brazil_lacerda.182.desc: "木槌第一次落下，审判开始。被告席上坐着参与私刑的白人至上主义者与数名警察，他们被控仇恨犯罪、杀人罪、胁迫罪等多项罪名。\n\n“若昂·菲格雷多，34岁，因袭击日资企业被捕。”辩护律师团对代理这群有长期排日劣迹的被告兴致索然，但仍竭力辩护。菲格雷多的案情尤为棘手——暴乱中他焚烧建筑时高喊针对日裔业主的污言秽语，火势蔓延波及白人商铺。辩方陈词甫毕，判决随即下达。\n\n“卡布拉尔·阿尔梅达，37岁，涉嫌参与私刑。”检方察觉到辩护团队的专业漏洞，他们显然无力应对如此多被告。针对阿尔梅达的证据链存在瑕疵：目击者指认其出现于私刑现场，但缺乏直接物证，最终当庭释放。\n\n案件接连审理，媒体事无巨细报道。涉案警察均以“正当执法”为由脱罪，多数被告获刑期减免。最终仅有十人入狱，最高刑期不超过八年。"
 brazil_lacerda.182.a: "谁会为死者哭泣？"
 brazil_lacerda.183.t: "塞尔吉奥·帕兰若斯·弗勒里诉巴西合众国等案"
 brazil_lacerda.183.desc: "当控方被传唤上庭陈述指控时，弗勒里的内心几乎要绷断了弦。这一刻，他的命运悬在刀尖之上，稍有不慎，就会身陷囹圄。“陪审团的各位——”检察官开口，“本案正是一起典型的、警官滥用职权并沉溺于自己妄想的恶劣事件。毫无疑问，塞尔吉奥·弗勒里根本不具备继续担任警官的资格，因为他的行为已经对数百名无辜者造成了不可逆的伤害。”\n\n陪审团中一片低声惊叹——他们之前驳回的那些指控，难道真的错判了吗？贪污、虐待、腐败，这些罪名难道真的全是事实？控方继续陈述。“八个月前，军方出动全副武装的士兵、直升机与坦克，围住了自由区整个街区。”\n\n“原因呢？完全出自弗勒里的一己之念——他坚信那里藏匿着日本间谍。他深信不疑，甚至下令武力镇压当地的抗议活动。结果呢？那些自称‘巴西日系’的人，被殴打、逮捕，甚至在光天化日下遭到屠杀，而一切的根源，不过是弗勒里编织的谎言。”\n\n“法官大人，今天我们所目睹的，是一个从一开始就不该身居高位之人的彻底失职。这种对自己同胞充满恐惧的人，根本不配掌握权力。”控方停顿片刻，“我的陈述完毕。”\n\n然而，法官与陪审团的脸上，并没有露出太多动容之色。这样的陈述固然冲击力十足，可实际操作起来，破绽也同样明显——没有书面记录证明弗勒里亲自下达镇压命令，没有录音、录像能证明他曾口口声声认定自由区充斥间谍。陪审团当然知道自由区的惨剧，他们知道那些谋杀的存在，他们也清楚弗勒里正是事发时的警察局长——这些是铁打的事实。但那关键的一环始终缺失——一条足以将弗勒里与整起屠杀无缝对接的决定性证据。\n\n“陪审团已经达成一致裁决：塞尔吉奥·弗勒里，鉴于其严重失职，不再适合继续担任警官。然而，基于目前证据，他的贪污、滥权和虐待罪名并不成立。”"
 brazil_lacerda.183.a: "对于自由区的日系而言，那个血债累累的屠夫，就这样逍遥法外。"
 brazil_lacerda.184.t: "晚安，社进党"
 brazil_lacerda.184.desc: "“受贿、腐败、挪用公款。”对社进党而言，这场灾难性审判将他们的罪行暴露在国民面前。人们不禁质疑：这些罪证从何而来？逮捕令上赫然写着镇压暴乱，可指控罪名却与之毫不相干。\n\n首个被推上被告席的是市政秘书保罗·佩尔塞纳斯。这个经手所有政府开支的小职员，被检方指控协同犯罪。速审速决，五年刑期尘埃落定。\n\n随后是深陷无数贪腐丑闻的高级官员佩德罗·马蒂亚斯。辩护律师竭力为其脱罪未果——既未参与骚乱亦未参与镇压的他，最终被判八年监禁。\n\n判决之迅捷严苛引发猜疑：拉塞尔达是否幕后操盘？这究竟是肃贪风暴，还是总统揽权戏码？可以肯定的是，这场审判的余震将在社进党阵营持续经年。"
 brazil_lacerda.184.a: "阿德马尔之梦，破碎。"
 brazil_lacerda.185.t: "委员会的结论"
 brazil_lacerda.185.desc: "国家动乱咨询委员会关于自由区骚乱警方处置的最终报告赫然写道：“巴西执法部门在装备与训练方面存在重大缺陷，无力应对此类突发事件。”\n\n这个结论拉塞尔达早有预料。连续数日，他穿梭于电话会议与密室协商之间，与全民盟要员推敲新法案细则。\n\n草案核心是扩充警力、增加经费、强化城市反暴训练——尤其在历史警力薄弱的贫民区。虽然条款尚在完善，但总统确信法案必能通过：骚乱镇压失败的惨痛教训已让改革派占据舆论高地。\n\n此法案不仅着眼当下治安，更为未来埋下伏笔。当改革政策引发暴力抗争时，这支升级版警力将成为总统手中王牌。卡洛斯摘下眼镜揉按鼻梁，改革蓝图才初现轮廓。\n\n千里之外的新闻编辑部，萨穆埃尔·魏纳正笔走龙蛇。《军国主义抬头》、《披着羊皮的恶狼法案》、《危机倒计时》——标题已道尽千言。他深知，若放任法案通过，巴西将向极权深渊再进一步。作为报人，除却秉笔直书，还能何为？\n\n由是他彻夜未眠，打字声如密雨。"
 brazil_lacerda.185.a: "蒙主庇佑，为民服务。"
 brazil_lacerda.186.t: "以武止暴"
 brazil_lacerda.186.desc: "圣保罗某无名警局内洋溢着节庆般的欢愉。制服警员们如圣诞清晨拆礼物的孩童般，雀跃地开启政府新近通过的《反暴乱法案》所配发的装备箱。这些“礼物”装载着性质迥异的“玩具”：能抵御普通手枪弹的军用级防弹背心、媲美战场的制式大口径长枪，乃至镇压暴动时军方专属的装甲运兵车。兴奋的警员们传看着新式装备，对着被重武器压弯腰的新丁发出哄笑，热切讨论何时能让这些“玩具”见血。\n\n很快，这些武装到牙齿的“执法者”将游荡在圣保罗最动荡的街区，包括曾爆发激烈冲突的自由区。对日系居民而言，眼前这些宛如战争机器的警察传递着不祥之兆——政府正以默许姿态宣告：秩序高于民权。当施暴者手握屠刀完成合法化武装，受害者怎能安枕？\n\n然而针对《反暴乱法案》的抗议声浪却异常微弱。虽有劳工组织谴责法案赋予警方的模糊执法权，但多数民众乐见财政充盈的警队能遏制自由区事件重演。唯独亲历过镇压噩梦的人们暗自战栗，祈祷自己不会成为法案试刀的下一批祭品。"
 brazil_lacerda.186.a: "法律与秩序。"
 brazil_lacerda.187.t: "反暴乱法案未获通过！"
 brazil_lacerda.187.desc: "“所以，小瓦加斯，这法案当真没有通过？”安东尼奥抿了一口咖啡，扫了眼《圣保罗页报》的晨间板报，头条上赫然写着“拉塞尔达的暴乱法案未获通过！”他是越读越惊讶。\n\n“经历了这些该死的暴乱之后，我是知道那句话是怎么说的了：政治不该妨碍保卫我们的国家的进程。”他叹一口气，抓了抓自己的脸。\n\n小瓦加斯耸耸肩，“依我看，这倒是件好事。拉塞尔达想从那法案上得到的太多。他反复说我们该怎么尊法守法，但我觉得这只是他重掌权柄的借口罢了。”\n\n仔细翻了翻今天的报纸，还有一篇是全民盟的一个烦人的保守成员写的文章，这篇文章抱怨着拉塞尔达在协商此法案时的失误，他并没有兑现他在党内的承诺。他说过这是一场易如反掌的胜利，但事实却远非如此。安东尼奥同意这种说法。要是拉塞尔达当时能把这一条法案向众反对党解释清楚的话，它早全票通过了。\n\n与此同时，小瓦加斯还在看今天的《最后时刻报》，这上面有不少对法案的评论，而对他而言，最打动他的一条来自一位知名的左翼演说家，他正好也是此报的主编。“暴君失败的权力扩张”正是此文章的标题，他接着读，不出所料，这篇文章严厉批评了拉塞尔达的法案，还认为此法案是他扩大控制权的企图。小瓦加斯认为拉塞尔达的野心正是那样。\n\n“政治，懂吧？有时我也不知道这个国家发生了什么。”\n\n安东尼奥笑了，“在这件事上，我觉得我们能达成一致，我的朋友。”"
 brazil_lacerda.187.a: "拉塞尔达野心的一次挫折"
 brazil_lacerda.188.t: "种族无民主"
 brazil_lacerda.188.desc: "总统的办公桌上堆满了文件。拉塞尔达快速浏览国家动乱委员会呈递上来的报告，这份报告内容不多、并不起眼，但最后一页却赫然写着：\n\n“……我们认为巴西远未达到实现种族民主的目标。”\n\n拉塞尔达摘下眼镜。简直不可理喻，他之前的行为居然让巴西成了他无比鄙夷的地方。他不喜欢日系人，他曾多次在媒体和街头与他们打过交道。\n\n他读了一遍又一遍，很明显，巴西有系统地歧视日本人，自从移民禁令颁布以来，日裔群体被排挤到贫民窟，饱受各种歧视。他正读完最后几页，塔沃拉推门进来。\n\n“这份报告属实？”\n\n“这是数周辩论和证据收集的结果，不会有错。”副总统手里拿着什么东西。“不过我们有一个计划，”他一边说一边给拉塞尔达看手中的文件，“这是一份种族民主法案，全民盟正在对此进行审议。”法案的内容十分温和，允许日本教育，将日系与日本帝国切割，对歧视行为进行象征性的处罚。\n\n“弗雷雷推的。你也知道，自从瓦加斯颁布禁令他就没停过。”拉塞尔达吃了一惊，他真的要批准这个吗？人们很愤怒，日系则希望摆脱任何形式的歧视。“我觉得……这还行。”他还记得那次劫机时人质对他的要求。"
 brazil_lacerda.188.a: "巴西将追随他的脚步。"
 brazil_lacerda.189.t: "种族民主法案获得通过！"
 brazil_lacerda.189.desc: "走在满目疮痍的自由区上，大泽静夫手中握着新发行的《圣保罗州报》。在这特殊的时刻，头版上的大字标题格外引人注目：“拉塞尔达通过《种族民主法案》！”\n\n大泽继续翻阅报纸，来到意见专栏。\n\n“马里奥·田中，34岁——这项法案或许是拉塞尔达尝试实现种族民主的最佳尝试，但这却是一场失败的妥协，弊大于利。法案中未包含任何具体帮助我们族群的条款，甚至未能全面禁止针对特定族群的歧视行为。如果拉塞尔达真的认为这会有所助益，那他简直面目可憎。”\n\n“若昂·达·席尔瓦，27岁——尽管我认为这项法案本可更加完善，最终的结果确实有助于减少对日系群体的某些歧视。这表明拉塞尔达正在尽力为民众谋福祉，巴西正朝着正确的方向迈进。”\n\n大泽对拉塞尔达“尽力而为”的说法嗤之以鼻。他只需环顾四周便能见证真相——他的家乡已化为废墟，残破不堪。诚然，这项法案确实废除了瓦加斯时期的一些禁令，但要找到一个不受骚扰的无家可归的日系几乎是不可能的。\n\n街道两旁的某些房屋贴着标语：“现正招生！日语课程。”他知道这些学校早在禁令解除前便已存在，虽隐藏在暗处，却真实存在。如今，看到自由区上的人们能够公开教授自己的语言，让他感到一丝欣慰。\n\n在阅读法案条文时，大泽感到一阵奇异的熟悉感。他注意到，法案的核心理念与自己曾撰写的许多文章颇为相似。难道全民盟中有人读过他的文章，并以此为基础起草了这部法案？他无法确定，但在某种程度上，他希望自己的文字曾在某个时刻真正改变了巴西。"
 brazil_lacerda.189.a: "灰烬中的一线希望。"
 brazil_lacerda.190.t: "种族民主法案未获通过！"
 brazil_lacerda.190.desc: "拉塞尔达的手指在桌面上轻轻敲击着。他刚刚收到投票结果——法案未能通过。“至少这不算什么大事。”他低声自语道。即便法案失败了，他至少可以确定，反对派在这一问题上尚未形成统一战线。毕竟，这是国会的事务，他又能做些什么呢？\n\n他不断自问：日本人究竟如何变得如此强大，竟能引发这样的骚乱？尤其是在我们这样一个倡导种族民主的社会中。“该死的共产主义者，该死的纳粹……”他低声咒骂，坚信这些人一定是受到了某种外部势力的煽动。\n\n对国会未能通过他的反骚乱措施感到焦躁不安，拉塞尔达思索着是否有办法动用军队和警察来对付这些骚乱者。他渴望清理这些人，为建设一个更加美好的圣保罗铺平道路。\n\n与此同时，在自由区上，大泽静夫停在一家报摊前，购得一份新发行的《圣保罗州报》。他几乎不敢相信自己的眼睛。“那个混蛋！”他愤怒地念出头条。这样的法案怎么会在国会落败？拉塞尔达为什么不能更加坚定地支持这项法案，让它顺利通过呢？"
 brazil_lacerda.190.a: "自由区的“自由”在哪呢？"
 brazil_lacerda.191.t: "变革之风"
 brazil_lacerda.191.desc: "“我为巴西感到自豪。我们是一个崇尚和平、诚信与关爱同胞的国家。然而，仍有许多表面光鲜的白人，试图剥夺每个人的自由权利。”弗雷雷的脸庞瞬间绷紧。“但我坚信，这些种族主义者终将自食其果。我们是一个民主国家，甚至曾有一位杰出的混血人士担任共和国总统。我们将通过一次次的斗争，实现真正的种族平等，直至没有人再受不公待遇！”听后，人群雷鸣般地响起掌声。\n\n塔沃拉与拉塞尔达的会谈接近尾声，但还有一个关键议题悬而未决。塔沃拉拿出一份重要文件。“总统先生，党内有些人发现了……您过去写过关于日系社区的新闻，共计十一篇，多到足以汇成一本书。”\n\n拉塞尔达叹了口气：“是啊，我明白。看来这是不可避免的。但请您相信，我只是在倾听不同意见。”\n\n塔沃拉微微一笑：“正是我想提的。您看，随着日系社群重新进入公众视野，全民盟内部有一些人希望撤销宪法中的相关禁令。”拉塞尔达轻哼一声。“我能理解您的顾虑。这只是一个小举动。但如果您支持这件事……我几乎可以确定，我们能够促成其通过。”\n\n“好吧，我会考虑的。感谢您提出此事。”拉塞尔达平静地点了点头。“当然。”塔沃拉离开了办公室。办公室里只剩下拉塞尔达一人，他陷入了沉思。如果这次尝试成功，不仅能够凝聚全民盟的力量，还可以进一步削弱瓦加斯的政治遗产，赢得更多选票。然而，如果失败了——毕竟这项法案需要三分之二的票数通过，失败的可能性不容小觑。如果失败了，大把的时间也就浪费掉了。即便成功了呢？他真的希望看到日本势力在这个国家的影响力进一步扩大吗？"
 brazil_lacerda.191.a: "机遇是在敲门，还是请君入瓮？"
 brazil_lacerda.192.t: "谁是法西斯？"
 brazil_lacerda.192.desc: "“我们聊这个所谓的‘种族民主’，仿佛把它当做什么默认的东西一样，只要喊出‘种族民主’四个字，马上就民主了，但这可能吗？压根就不可能。”国会内，吉尔贝托·弗雷雷顶着肃杀的气氛慷慨陈词，哪怕全民盟同僚认定他在为法西斯辩护，投来锋利如刀的眼神。\n\n“宪法对日本移民的禁令把我们共和国的原则变成了笑话。这是瓦加斯主义遗毒在我们蓬勃发展的民主精神上留下的污点。不把它废除，就等于向曾经统治我们的法西斯低头。”台下有嘘声，也有掌声。有人为禁令废除带来的新贸易机会欢呼。\n\n“除此之外，还有非常严重的双重标准。要是因为他们是法西斯就禁止入境，那为何德国人跟意大利人就能畅通无阻？难不成就因为他们是白人吗？因为是白人，所以我们白人政府就觉得跟他们有共同之处吗？”此言一出，台下又开始议论纷纷。\n\n“倘若在座各位与我有同样的感觉，那么我恳请你与我一同投票，废除这宪法之耻。如果你良知尚存，请你出马投票。我们需要三分之二多数，少一票我们都会满盘皆输！”弗雷雷放下麦克风。"
 brazil_lacerda.192.a: "人们的心在颤抖。"
 brazil_lacerda.193.t: "毁誉参半"
 brazil_lacerda.193.desc: "随着围绕废除禁止日本移民的宪法修正案的辩论愈演愈烈，巴西的政治舞台顿时陷入一片混乱。执政的全民盟正如外界所料，在这一议题上再次出现严重分裂：早在修正案首次通过时，党内便已硝烟四起，如今旧伤重提，裂痕更是难以弥合。有些人斥责这项修正案“毫无人道”，也有人担心，日本或将凭借移民政策逐步渗透巴西。幸运的是，在总统的强力推动下，那些原本心存疑虑的党员最终接受了修正案，认定旧有禁令是瓦加斯主义的一次失策；而主张自由市场的务实派更是几乎不需要任何劝说，就已公开表示支持废除。\n\n让人意想不到的是，强烈反对废除修正案的主要生硬竟然来自主流的工党-社民党联盟。他们宣称，废除移民禁令会让日本移民夺走本地人的工作，煽动起对“种族寄生”社区的恐惧，甚至暗示这些社区会沦为日本帝国潜伏在巴西的“第五纵队”。相较而言，阿德马尔和他的社会进步党对废除修正案的支持则毫不令人惊讶：他们在圣保罗亲眼见识过种族仇恨的破坏力，也敏锐地察觉到可以借助民粹主义情绪，进一步提升自身的政治声望。\n\n更加出人意料的转折来自各个极端派系。普列斯特斯及其共产党同僚原本就是修正案最坚定的支持者，如今对废除修正案持同样强烈反对态度，认为这等同于巴西向日本法西斯政府低头。他们还不断炒作日本情报机构暗中渗透的恐惧。而与之形成鲜明对比的是，萨尔加多和他的整合主义者完全拥护这项废除提议，甚至在近期骚乱平息后接纳了数名日系巴西人加入其阵营。尽管二战时的德日轴心早已成为历史，但在巴西极右翼势力的脑海中，似乎仍留存着那段阴暗思潮的残余。"
 brazil_lacerda.193.a: "这场风波注定要搅动局势，不是吗？"
 brazil_lacerda.194.t: "东方日出"
 brazil_lacerda.194.desc: "烟花点亮夜空，日系的欢欣正如他们点燃的烟火般直冲云霄。全民盟竟真的办成了——从日本移民巴西在漫长抗争后终于合法化。故国将不再遥远，异乡亦不再孤独。不久后，跨海而来的同胞将与他们携手共创光明未来。\n\n喜讯同样漂洋过海。东京松下电器的高管举杯致敬卡洛斯·拉塞尔达总统，同僚们纷纷应和。他们称赞总统拨乱反正，更热切讨论着巴西市场的机遇，仿佛已嗅到利润的芬芳。\n\n广东的情形大同小异。某位珠人初级营销员受命撰写巴西商机报告。在潮湿的香港公寓里，他对着从未踏足的土地展开诗意想象：晚霞浸染的港口，亟待开垦的市场蓝海。笔尖游走间，竟对陌生国度生出乡愁。文稿收尾时，泪水为永难抵达的彼岸而流。\n\n广州某处，持不同政见的华人攥着被雨水浸透的报道。铅字在晕染中模糊，他却浑不在意——那个终年无雨的应许之地已占据全部思绪。来日收拾微薄行囊，混迹偷渡船舱，远岸即自由。"
 brazil_lacerda.194.a: "巴西一呼，群起响应。"
 brazil_lacerda.195.t: "太阳不再升起"
 brazil_lacerda.195.desc: "拉塞尔达的办公桌前，一个男人痛苦地捂着他的脸，绝望地试图逃避他面对的现实。他搞砸了。党内有那么多人警告过他这行不通，但直到现在他才知道自己铸成了怎样的大错。\n\n他竟然蠢到试图向日本人让步。\n\n如果他还有点骨气的话，他当时就应该坚决否决党内的激进派向法西斯妥协的提议。\n\n圣保罗的大泽静夫也是这么想的。他愤怒地在文章中把拉塞尔达打成了“极右翼分子”。写完这一连串的谴责后，他把文章投递给了报纸，然后往他位于大学宿舍的“家”走去。\n\n街上寒风萧瑟，大泽裹紧了自己的外套，在路上，所有人都与他形同陌路。他们永远不是他的朋友，他也永远不会将他们视作同胞。他想日本议会会不会重新讨论起废除移民禁令的问题。或许再也不会了。\n\n他推开门，走进房间。他的床单还是像往常那样冰冷。寝室里没有人，大家都在做自己的事——并且不需要他。这就是他，乃至所有日系人的处境，被巴西——甚至他们的祖国日本遗忘。即使是对最自负的人来说，被独自困在世界另一端的广袤大陆上也是如此的孤独。如此的孤独……"
 brazil_lacerda.195.a: "他埋头痛哭，为了那个从未属于他的帝国和共和国哀痛。"
 brazil_lacerda.196.t: "守护阳光，延续热望"
 brazil_lacerda.196.desc: "晨光初现，跃动的光线轻抚拉塞尔达的身躯，将他从床榻唤醒。广播里播报着晴好天气的预告——天际线处没有阴云密布，也未见街头骚乱的场景，却有日本资本入境的迹象。全党上下团结在他身后，日系社群亦鼎力支持，他的政治遗产正显现出比瓦加斯更积极的光芒。\n\n随后他便开始了新一天的日程，毕竟还有更重要的事务等待处理。\n\n在圣保罗料峭的街头，大泽静夫步履轻快地走向大学宿舍，寒意似乎比往日消退许多。移民禁令的废除在国会几乎无人提及——更遑论引起普通日本民众的兴趣——但对像他这样的日系巴西人而言，这字字千钧。此刻他终于能确信，他们不再是孤军奋战。\n\n随着《种族民主法案》的通过，这些变化几乎让他萌生在下届大选中投票给拉塞尔达的念头。\n\n若非那场劫机事件与全城种族暴动为代价，社会进步或许还不会来得如此迅猛。\n\n尽管那些日子的伤痛终将淡去，但由此催生的变革却将长存。圣保罗将在废墟中涅槃重生，变得比往昔更加强大。对他而言，这已足够，甚至足以让他在下次选举时将选票投给全民盟。"
 brazil_lacerda.196.a: "拉塞尔达是个恶棍，但他是我们的恶棍。"
 brazil_lacerda.197.t: "个人之巅"
 brazil_lacerda.197.desc: "公交车门在圣保罗的街道上开启，大泽静夫从圣安德烈远道而来。寒风穿透大衣令他脊背发凉，眼中却燃烧着倔强的火焰。终于等到在大都市求学的机会——若还是瓦加斯当政，此刻他该在某个牢房里。\n\n静夫环顾四周。苦难在这座城市随处可见，远不止日系群体独有。但拉塞尔达带来了希望。1965年他投下赞成票，[GetYear]年依然对总统满怀期待。\n\n城市的另一隅，泷家正在用晚餐。墙纸剥落的陋室里，硕鼠在墙角窜动。大女儿千代子咬着筷子发问：\n\n“今天老师讲了卡洛斯·拉塞尔达，他是怎样的人？”少女的天真在灯光下摇曳。\n\n“美国的走狗。”泷纯忠毫不掩饰轻蔑——女儿都上高中了，该见识真实的世界了。“成天诋毁日本，分明是憎恶我们。要是阿德马尔当选该多好，那才是为我们着想的人。”\n\n泷裕成往饭碗里戳着筷子冷笑：“倒未必专恨日本，但他效仿美国漠视贫苦大众的嘴脸学得十足。日系不过是他经济绞肉机的燃料。”他的憎恶并非继承自父亲，而是在街头巷尾淬炼而成。\n\n千代子垂下眼帘。父兄总是睿智的。他们不需要拉塞尔达，她也不需要。只盼那位总统先生别来搅扰这方寸之间的安宁。"
 brazil_lacerda.197.a: "他们瞳孔发亮，誓要守护这份美好。"
 brazil_lacerda.198.t: "光影中的航船"
 brazil_lacerda.198.desc: "一艘客船从桑托斯港向东驶去，船舷旁的窗户映出旅客们愁容满面的面庞。这些日系人士怀揣着难以平息的乡愁，历经巴西的重重磨难后，正踏上归国之路。大多数人终于积攒够了当初拼命追寻的钱财，账目似乎已算清，但真正的代价尚未完全结算。在这个移民之国，他们始终被视为外人。即便回到熟悉的语言环境和相似的面孔中，日系们依旧不确定在日本等待着他们的将会是什么。在这个以“完美同质性”闻名的帝国，昔日的友善面孔或许会将他们视为“出外务工者”，认为他们已被异国生活所腐化。然而，船只依旧在破浪前行。至少，这总比留在巴西强。\n\n另一艘船则从相反方向驶来。沐浴在明媚的阳光下，一群崭新且多元的面孔正从日本抵达巴西。这些人中，有的是秘密逃离体制的异见者，也有人希望在巴西拓展事业，既能为成千上万潜在的日系客户提供服务，也能借助巴西在全球经济中的崛起分一杯羹；还有一些人则只是寻求一场安全又充满冒险的退休生活。这群人中，有的满怀希望，笑容灿烂，交谈热烈，彼此的决心几乎触手可及。他们中既有法西斯主义的布道者，也有新兴宗教“生长之家”的传教士。这个混杂的群体谨慎地打量着彼此，除了“同一故乡”外，他们似乎毫无交集。然而，在异国他乡，仅仅这一点，有时就已足够。\n\n尽管下午的桑托斯港依旧是巴西人的领地，但码头上却挤满了欢呼的日系人群。他们挥舞着旗帜，高举法西斯标志，为新抵达的同胞们喝彩，热烈欢迎这些来自帝国的人们。在他们眼中，巴西的海岸不是逃离帝国的避风港，而是帝国的另一个战场，每一艘新船都载满了拯救殖民地的新英雄。\n\n在这一切之上，本地巴西人或是满脸厌恶，或是投以嘲讽，抑或仅仅只是冷漠地旁观着。"
 brazil_lacerda.198.a: "这些人要么融入，要么走人，迟早的事。"
 brazil_lacerda.199.t: "国会代言人"
 brazil_lacerda.199.desc: "参议院选举的结果陆续传遍全国，圣保罗市民从睡梦中惊醒时，迎面而来的是一场惊天变局——这座被社进党经营成铜墙铁壁的城市，其固有秩序竟然被一位双料异端打破：此人既是日系，又是整合主义者。\n\n京野四郎的胜选在圣保罗日系社区掀起了轩然大波。于皇道社而言，这是迈向荣耀的第一步；于左翼团体而言，这是自身失势的耻辱象征；但对广大日系而言，他代表着全然不同的意义——希望。\n\n人们颤抖着抚过报纸油墨未干的铅字，某种悸动在胸中悄然滋长——或许有朝一日，国会中将坐着更多他们的同胞；或许终有一日，他们的命运真会泛起微澜。\n\n当然，整个巴西对这出政治剧码有着截然不同的解读：民代党人举杯庆祝在阿德马尔的城墙上轰开了一个大洞；反对者疾呼此为法西斯主义和日本势力渗透巴西的序章；日系家庭则纷纷拉下百叶窗，低声庆祝属于自己的胜利。"
 brazil_lacerda.199.a: "无论如何，这都是一场意义非凡的胜利。"
 brazil_lacerda.200.t: "致一代的毁灭者"
 brazil_lacerda.200.desc: "近几周，巴西的混乱中诞生了一位“本土迪林杰”——人称“日本佬马里奥”的银行大盗。在罢工活动重灾区接连发生的多起银行劫案，目击者均指认与这位传说中的人物有关。据称，此人携手人民革命先锋队的同伙，已成为资本主义的最新克星。\n\n然而真相远比报纸渲染的平淡。\n\n被媒体统称为“日本佬马里奥”的劫匪，实则为多名日系男子。这些人与本尊唯一的共同点，仅是流淌着相同的血脉。由于多数巴西人只识得声名狼藉的“日本佬马里奥”，当劫案报道接踵而至时，民众自然将罪名归于此人。可事实上，真正的“日本佬马里奥”早已脱离人民革命先锋队多年。\n\n这场舆论狂欢，掩盖的是一群受压迫者武装反抗的真实故事——矛头直指那个放任自由区在暴乱中化为焦土的政府。这些男女带着“永不再让”的誓言加入人民革命先锋队：\n\n永不再让恐惧笼罩心头；永不再让同胞——无论肤色——遭受假借正义之名的暴徒践踏；永不再让拉塞尔达的政权安享太平。"
 brazil_lacerda.200.a: "然而在普罗大众眼中，他们仍然籍籍无名。"
 brazil_lacerda.201.t: "尾声"
 brazil_lacerda.201.desc: "“史上最糟糕的州长？”\n\n“小瓦加斯的民调创下历史新低”\n\n“本周第三起私刑事件发生在郊区”\n\n每看到一条标题，小瓦加斯的下巴就愈发紧绷。他曾经一尘不染的州长官邸办公室，如今却凌乱不堪——桌面上散落着报纸，窗帘半遮半掩，废纸篓也堆得比它应有的多得多。没人常来拜访他，因为最近他的脾气变得异常暴躁。\n\n自从自由区骚乱发生后的这几个月，对他来说过得并不轻松。并非是他对那几周的动乱置若罔闻；说实话，他尽力在任何能帮助重建的地方出一份力。然而，他所做的任何尝试都似乎无法让他和这座心爱的城市重新建立联系。\n\n看起来不管他做什么，那场该死的骚乱都会永远玷污他的政治遗产。如果像这样的标题继续出现，不断地抹黑他的声誉，那么他在下一届选举中几乎没有任何机会。这难道就是他父亲希望他被铭记的方式吗？一场肮脏的骚乱和一段糟糕的媒体关系？难道他注定只是巴西历史中又一个失败的脚注吗？\n\n小瓦加斯瞥了一眼另一份报纸的头版，看到上面醒目的标题——“失踪”。旁边还贴着一张相当不讨喜的照片，是他的脸。那股熟悉的愤怒再度袭来，他撕下了这份报纸，愤怒地把它揉成一团，狠狠地扔进了废纸篓。"
 brazil_lacerda.201.a: "纸团在桶沿上弹了一下，落在实木地板上。"
 brazil_lacerda.201.tt: "小瓦加斯在圣保罗当选的几率将§R更小§!。"
 brazil_lacerda.202.t: "方兴未艾"
 brazil_lacerda.202.desc: "“小瓦加斯荣膺最佳州长！”\n\n“瓦加斯民调创历史新高！”\n\n“自由区大和解！”\n\n卡洛斯·拉塞尔达翻阅这些头条时，只觉喉间泛着酸涩的妒意。若没有瓦加斯市长协助镇压自由区骚乱，局势本会棘手得多——但代价是亲手豢养了一头政治怪兽。他原以为圣保罗民众会将这个纨绔子弟撕成碎片，谁知人们竟张开双臂拥戴他。\n\n当然并非完美。拉塞尔达早已授意喉舌媒体反复提醒公众这点。但巴西民众似乎毫不在意，这位“太子”的声望正如野火燎原。\n\n几乎每家报纸上都能看到他的丰功伟绩。游行队伍最前列的身影，怀抱老妪孙辈的温馨照片，还有宣传单上直刺他眼底的倨傲笑容。最可恨的是，他竟无法指责对方消费父亲的政治遗产——小瓦加斯处理骚乱的手段，已然让他摆脱了老热图利奥的阴影。\n\n乌鸦在办公室焦躁踱步，思量着社进党推出的这位新锐。毋庸置疑，此人将成为继任者竞选路上的劲敌，但无妨。他曾击垮过一个瓦加斯，自然能再击垮第二个。"
 brazil_lacerda.202.a: "他必须能。"
 brazil_lacerda.202.tt: "小瓦加斯在圣保罗当选的几率将§G更大§!。"
 brazil_lacerda.203.t: "铁窗的重压"
 brazil_lacerda.203.desc: "泷千代子的双眸空洞无光，历经数年辗转羁押的躯体早已支离破碎。她记得某个警察局的牢房逼仄得要将她卡在铁栏上，冰冷铁栏在皮肤上压出淤痕，至今仍隐隐作痛。可这一切究竟为了什么？她终究没有犯下任何过错。当年不过是个惊惶少女，为了寻求些许庇护才投身那个组织。她不曾与人争斗，终日只是处理文书、誊写信件，何至于招来牢狱之灾？警察心知肚明，数月盘查后终究放了她。\n\n自由之身同样形单影只。家人离散，故交尽在囹圄。从此不再辗转牢房，却开始漂泊于形形色色的屋檐下。收留者总在她暂居时露出獠牙——索要钱财，役使劳力，或如他们所言需要“特别关照”。纵然浑身伤痛，她仍咬牙辗转求生。临时栖所的漫漫长夜，街头蜷缩的寒凉，都成了刻入骨髓的记忆。\n\n这般颠沛数年后，她遇见手持“生长之家”经卷的布道者。这个源自日本的教派随着移民潮涌入巴西，虽异于传统神道，却在民间开枝散叶。初时她以本名自荐，对方无动于衷；而当她自称“克雷乌萨”，紧闭的大门忽然洞开。教义如符咒烙入脑海，她在教团阶梯上步步攀升，终于找到安身之所。后来她被派往图庞教区基地，在那里遇见更多日系信徒。"
 brazil_lacerda.203.a: "记忆的重压……"
 brazil_lacerda.204.t: "父亲的旅途"
 brazil_lacerda.204.desc: "泷纯忠已经三天没吃东西了。最后一餐是白米饭配一颗腌梅子——这搭配倒是像日本国旗。连日饥肠辘辘下，这顿简餐竟格外美味。若他为之奋战的理念也能这般滋养人该多好。漫长的旅途始于牢房，当囚室渐满，狱卒开始逐个盘查，他因罪证不足获释。此后便靠着他人施舍或检票疏忽，辗转巴士、火车与徒步。车站屋檐下、公园长椅上，或者干脆以冰冷大地为席。\n\n此刻他伫立在目的地前。便利店的玻璃橱窗后，朗姆酒瓶在柜台列队。推门时身旁的香烟展示架微微晃动。这是大泽源太郎的店铺。跋涉途中读到的那篇报道，里面有提到“劫机犯的妹妹”，那一定说的是千代子。店内顾客与柜台后的源太郎都投来审视的目光。他褴褛的衣衫与这体面社区格格不入，这种保守的富人区本是他最该避开的——多得是闲人爱找流浪汉麻烦。更何况他向来厌恶圣安德烈。\n\n源太郎正要上前驱赶这个碍眼的存在，推搡间忽然有双臂膀环住纯忠嶙峋的脊背。他几乎踉跄倒地。是千代子，他的女儿，他踏遍千山万水也要找到的那个丫头。"
 brazil_lacerda.204.a: "我回来了。"
 brazil_lacerda.205.t: "久别后的重逢"
 brazil_lacerda.205.desc: "图庞的街道上，欢呼声此起彼伏，而处于风暴中心的泷纯忠却毫无喜色。人们为这个活着的传奇欢呼，为这个精通柔道、在臣道联盟时便沾满鲜血的男人喝彩。正是那些血渍撕裂了他的婚姻纽带，把他推向了孤独无依的深渊。可面对簇拥的人群，他终究无法真正动怒。这些人知晓他的目的地，知晓如今皇道社的据点所在，知晓千代子——他的女儿所在之处。\n\n转过街角时，他看见了那个身影。消息早已传开，她如同被磁石吸引般出现在这里，而那张面容正是他魂牵梦萦的存在。残存的皇道社成员簇拥在她周围，几张面孔依稀可辨。此地他再熟悉不过，这正是当年神道联盟的发源地。他已记不清是谁先奔向对方，只记得自己紧紧抱住女儿，仿佛要将错失的岁月都揉进这个拥抱。喉头涌起的酸涩提醒他，那些分离的时光与裕成留下的空缺，终究无法弥补。\n\n最终他们走进了一家酒吧，在那里他见到了千代子的新男友。那个男人脸上永远凝固着诡异的笑容，与千代子同属新兴宗教“生长之家”。两人不断谈论着他们的神明，热切地试图将这位父亲也纳入信仰的大家庭。"
 brazil_lacerda.205.a: "即便是家人，有时也略需劝诱。"
 brazil_lacerda.206.t: "我必须启程"
 brazil_lacerda.206.desc: "距圣保罗6500公里外，泷纯忠躺在哈瓦那逼仄公寓的单人床上。热带风暴在窗外嘶吼，百叶窗震颤不止，滂沱雨幕似要渗入混凝土深处。年迈的身躯本应习惯这般天气，可真正撕裂他人生的，却是另一场无形的风暴。\n\n苦涩的思绪总在妻女身上盘桓。千代子的母亲已逝，但至少通过裕成在人民革命先锋队的斡旋，他得知掌上明珠依然平安。至于那个总在扮演切·格瓦拉与菲德尔·卡斯特罗的愣头青，如今跟着正记四处奔波——年轻人总爱把光阴虚掷在幻梦里，不过教训迟早会来，老纯忠已无力教导。\n\n雨声如诉中，他缓缓起身走向书桌。自父女取得联系后，千代子来过几封信，那些泛黄的信笺他时常重读，却始终不敢轻易触碰。\n\n“父亲大人，得知您与裕成平安，令我欢欣不已……彼时孤身飘零，整座城市陷入癫狂，确曾遭遇险境……不知何处栖身，不知何时果腹，每当进食总会想起全家围坐餐桌的时光……唯愿我的安好能慰您心怀，更盼终有一日，我们全家能够重聚……”\n\n信纸上的水渍并非雨水所染。风暴总在骤起后戛然而止，偶尔阳光透窗而入，愧疚如潮水退去，老人便如孩童般紧攥着女儿寄来的希冀。"
 brazil_lacerda.206.a: "再困难，也好过视而不见。"
 brazil_lacerda.207.t: "堡垒"
 brazil_lacerda.207.desc: "奥斯瓦尔多撑在绞刑犯灵魂圣十字教堂腐朽的木门上，浓厚的烟雾气味刺鼻，迷住了他的眼。在他周围，自由区的居民盛怒难却。人群就像一头凶猛的野兽，渴望着鲜血。目标首先是日系人，后来就到了所有像亚洲人的人。如今他们的仇恨又再次转向，指向了黑人社区，指向了这些在自由区划定之前就在此居住的家庭，一想到这里正是“受难者公墓”的所在地，就令人不寒而栗。\n\n奥斯瓦尔多是一位木匠，也是一位执事，他很熟悉这篇街区的历史，尤其是这座教堂。这座小小的天主教堂建在昔日公开处决的地方。这里曾被称作“绞刑架广场”，即弗朗西斯科·若泽·达斯沙加斯——也就是“沙吉尼亚”在1821年被吊死的地方。他因为替巴西士兵争取更高的军饷而被吊死。时人说，吊死他时绳子断了两次，人们都相信这是一个奇迹，证明他无罪的奇迹。但是当时的权贵对此充耳不闻，无视了神迹与人民的呼喊，坚持吊死了他。\n\n无数家庭蜷缩在教堂内，他们面孔各异：有日裔、韩裔、华裔，还有黑人，恐惧、绝望和对庇护的渴求让他们聚在一起。奥斯瓦尔多看向多娜·海伦娜，她的玫瑰念珠在颤抖的手中咔咔作响。他又望向了年轻的海藤，他正用日语对母亲呢喃着什么。圣坛上的蜡烛火光摇曳，昏暗的光下，昔日绞刑架的位置传来窃窃私语，玛丽亚用约鲁巴语唱响悲歌，为逝者哀叹，为生者祈祷。\n\n奥斯瓦尔多紧握着椅子腿，与屋外的风暴相比，这样的武器实在寒酸。在这里，在绞刑犯灵魂圣十字教堂，在历史的风暴眼，在神圣的抗争中，他们绝不会再次倒下。"
 brazil_lacerda.207.a: "他们还可以呼吸。他们还可以挺住。"
 brazil_lacerda.208.t: "日方反应"
 brazil_lacerda.208.desc: "东京市中心即使在凌晨时分，依旧熙熙攘攘、人声鼎沸。西装革履的上班族川流不息，穿梭于便利店和报刊亭之间，赶往办公室，顺手翻阅着当天的晨报。\n\n但如果他们能稍加深入阅读手中的报纸，跳过那些关于美日关系日益紧张的常规报道，便能在报纸角落里发现一则简短的社论：\n\n“拉塞尔达总统迈出和平的一步——日本移民禁令被废除”\n\n“拉塞尔达”的大名此前也曾见诸东京媒体，只不过总与“美国扶持”或“亲OFN”等字眼并列。但今日不同——日本媒体为其废除巴西广受诟病的日本移民禁令而喝彩。新通过的《种族民主法案》被一家日媒称为“彻底消除日系巴西人所正遭受的种族歧视的第一步”。\n\n这是“来自巴西利亚的和解信号”，甚至被视为“未来日巴友好关系的预兆”。在世界各地战火频仍、核武阴影笼罩、外交舞台闹剧不断的当下，法案的通过无疑是一则令人欣慰的好消息。\n\n一位年迈的日本老人因此为远在巴西的家人感到欣喜不已；秘书们把这则头条连同热腾腾的咖啡一起送到办公室，为那些渴望海外市场利好的公司职员带来好心情；在巴西驻日大使馆内，人们彼此握手致意，四处洋溢着欢声笑语。"
 brazil_lacerda.208.a: "敬拉塞尔达，也敬日巴关系的新纪元！"
 brazil_lacerda.209.t: "黄金大道"
 brazil_lacerda.209.desc: "卡洛斯·拉塞尔达大胜而归。迈入会议室，全民盟的各派领袖纷纷起身迎接。他依次环视了每个人的面孔：塔沃拉、马加良斯·平托、米尔顿·坎波斯、贝尔特朗，最后是拉斐尔·马加良斯——如果一切顺利，这位将成为下一个聚光灯下的焦点人物。没有掌声，但也不需要，功绩本身便足以说明一切。罢工的失败为全民盟保住了稳固的地位，但所有努力仍然可能付诸东流，若他们无法赢得接下来的选举胜利。这意味着在未来几个月中，各派必须保持团结。\n\n“先生们，首先，我要感谢并祝贺各位。”拉塞尔达开口，目光逐一扫过在座的每一位，语气中透着真挚的热情。“正是因为有了你们的支持，我们才能成功击退罢工的威胁，并在此过程中巩固了我们的地位。请大家花一点时间，为自己的努力，也为彼此的贡献鼓掌喝彩。”拉塞尔达停顿片刻。恰到好处的赞美虽是简单的武器，却常常十分有效。他的高明之处在于让每个人都能感受到共享胜利的喜悦，这为他接下来要传达的信息铺平了道路。\n\n“然而，我们不能因此而自满，而是必须将这一胜利转化为未来更大的成就。”拉塞尔达的语调逐渐加重，话语间透出不容置疑的力量。这正是我请求大家支持拉斐尔·马加良斯先生，作为全民盟下次总统选举候选人的原因。他拥有充沛的精力、坚定的奉献精神以及卓越的能力，足以带领我们迎接未来的伟大挑战。有了全党的鼎力相助，我相信他一定能够在十月胜出。”\n\n在场的各派领袖互相对视，然后纷纷看向拉斐尔。接着，一阵稀疏却迅速汇聚的赞同声响起，各派领袖齐声表示支持拉斐尔的候选资格。拉斐尔看着这群同僚，开口道：“先生们，有了我们党的力量，我们一定能够完成对瓦加斯主义的斗争。我向你们保证，我绝不会让你们失望。”"
 brazil_lacerda.209.a: "未来的新面貌。"
 BRA_lacerda_magalhaes_chosen_tt: "§m拉斐尔·马加良斯§!将作为§Q全民盟§!候选人参加§Y1970年总统大选§!"
 brazil_lacerda.210.t: "唯巴西知晓"
 brazil_lacerda.210.desc: "圣保罗的人群熙熙攘攘，摄像机在场外全景捕捉着这一切，聚焦于他们的新希望——一位与现任截然不同的总统候选人。他站在麦克风前，静静地感受着被压迫民众炽热的情感。目光穿越仍存的废墟与破坏，细致入微地捕捉每一处细节。人群的呼喊，正是他最有力的回应。\n\n“布里佐拉！布里佐拉！布里佐拉！”每一声呐喊，宛如步枪射出的子弹，那熟悉得令人不安的声音。他高举右拳，瞬间令四周陷入寂静。空气中弥漫着厚重的气氛。他开口了。\n\n“今天，我看到了你们：穷人，病患，疲惫不堪的群众。你们生活在废墟之中，身处这座伟大城市的尘埃里，而这一切，都是一个暴君对巴西自由的践踏。如果他派出的爪牙上台，他就赢了。”人群中顿时爆发出嘘声与咒骂。“那个马加良斯，不过是他的傀儡，他是一个骗子，一个不道德的伪君子，一个勾引人妻的流氓。”最后一句话，点燃了人群的愤怒。\n\n“他不过是拉塞尔达颠覆我们民主的工具——一个在幕后操纵的小卒——一个不断攻击我们自由的工具。这就是我为什么要与他竞选，也是我今天向你们请求支持的原因。为了让我能够教训这个暴君和他的走狗，我只向你们提出一个请求。”\n\n“投票给布里佐拉，为了更美好的巴西，一个我们所熟知的巴西。”当人群再次高呼他的名字时，布里佐拉已经获得了他们的响应。\n\n在巴西利亚，总统关闭了电视。他的舌头在嘴里打转，脑中思索着只有他自己知道的念头，仿佛一场战局在他脑海中激荡。他的手指敲打出一段竞选的节奏，双唇默默练习着演讲，最终，他的声带发出两个字，带着战争的宣告："
 brazil_lacerda.210.a: "“开始了。”"
 BRA_lacerda_brizola_chosen_tt: "§V莱昂内尔·布里佐拉§!将作为§Y社民党§!-§V工党§!候选人参加§Y1970年总统大选§!"
 brazil_lacerda.211.t: "小爱好，大信仰"
 brazil_lacerda.211.desc: "收音机里传出欢快的广告歌：“可口可乐。多拿一杯，欢乐加倍！”。索菲亚·魏纳闻言露出微笑。逃离德国后，她终于开始感受到久违的放松。她很幸运，能够参议院的保洁部门找到一份薪水不错的工作。虽然工作时间长且内容单调，但至少安全无虞，温饱有保障，还有栖身之处。\n\n值班时，她的思绪总会不由自主飘回德国。这片美洲大陆充满腐朽与堕落——那些工业家们用可口可乐这样的毒药荼毒消费者的身体，他们的贪婪正将民众与国家榨干。\n\n这里的人们心中没有民族与祖国，只知道追逐资本，将个人凌驾于民族之上……她摇了摇头赶走这些阴暗的念头。她从未尝过可口可乐，过去没机会，但随着新建的灌装厂投产，现在连街角杂货铺都能买到。\n\n如今故国已成往事，此地才是未来。倒不是说某些巴西人不想把这里打造成新的大西洋帝国，总让她如芒在背。每隔几天就有巴西政客谈论自给自足或贪婪本性，赫然是希特勒用来号召民众拥护新秩序的说辞。\n\n拉塞尔达是似乎唯一敢于挑战轴心国在美洲影响力的人。他不仅公开反对法西斯主义，更重要的是致力于为巴西招商引资，让民众过上富足充实的生活。\n\n这不只是空谈国家信仰，而是要让人们有家可归、有工可做，能坐在餐厅听听音乐，去海边闻闻咸腥的海风。就像现在，漫长一天结束后，她想喝瓶清凉的可口可乐——仅因这是她想要的生活。"
 brazil_lacerda.211.a: "她做了两个决定：一是在十月投给拉塞尔达，二是下班后试试可口可乐。"
 brazil_lacerda.212.t: "招架与反击"
 brazil_lacerda.212.desc: "“我们的投资计划将彻底改变巴西，引领我们迈入前所未有的经济活力与繁荣新时代。可口可乐公司在米纳斯吉拉斯的建厂只是第一步。不久，全国各地将陆续有更多工厂落成。加上来自澳大利亚、加拿大和美国的投资，我们的国民将获得高薪工作，享受更实惠的商品，整体生活水平将显著提升。”贝尔特朗面带微笑地宣布道。\n\n记者们蜂拥而上，争相提问。在一个意味深长的停顿后，为了让电视观众充分感受到声明的分量，他指向了来自环球电视台的记者。\n\n“环球电视台的马科斯·塞拉·坎托，部长先生，您能具体说明普通巴西人将获得哪些实际收益吗？”\n\n“当然可以，坎托先生。这些投资计划将促使我们重新启动已关闭的工厂，扩展现有产业，并提供具有竞争力的就业机会。随着商品产量的增加，供需关系的改善将推动整体物价下调。感谢您的提问。”贝尔特朗随后转向另一位年轻且充满热情的记者，他显然急切地想发问。\n\n“我是《最后时刻报》的马里奥·吉梅内斯·科埃略。部长先生，有些分析人士认为这将加剧经济不平等，让富人受益更多，您如何回应这样的看法？”\n\n贝尔特朗依旧面带微笑，神情自若，丝毫看不出任何被冒犯或不悦的迹象。“这是毫无来由的指责。新增的就业机会将直接惠及农村和工业部门的劳动者，增加的税收收入将用于更好地支持我们的公共部门和基础设施建设，日益活跃的经济活动将惠及每一个人。”他停顿片刻，随后接着说道："
 brazil_lacerda.212.a: "“真是遗憾，还有人宁愿我们继续陷于贫困之中。”马里奥听后哑口无言。"
 brazil_lacerda.213.t: "机遇之城"
 brazil_lacerda.213.desc: "拉斐尔·马加良斯早已习惯了站在热闹的人群中。不论是球赛开始前的体育场，还是面前这些他希望能代表的选民。他记得那场风暴后的城市模样，破坏触目惊心。无数房屋倒塌，耗费数年建成的基础设施一夜之间毁于一旦。然而，他们最终还是重建了这座城市。崭新的现代化大道、宽敞坚固的新房拔地而起，而这一切都离不开他与拉塞尔达的共同努力。他低头看了眼演讲稿，又看向面前的群众，深吸一口气，开始了他的讲话。\n\n“你好，里约热内卢。”他稍作停顿，给人群的热情更多的时间平息。“我们共同经历了艰难的考验，所有人都一样。风暴摧毁了我们辛苦积累的成果，将那些屹立数十年的房屋变成废墟。那一刻，我站在废墟前，内心充满绝望。但今天，靠着拉塞尔达和我的政策，我们已经让这座城市实现了蜕变。在尘埃与瓦砾中，我们建起了崭新的现代化住宅，宽敞且舒适。\n\n“风暴带来的破坏，终于让我们有机会改造那些老旧的街道，重建如同美国那样的现代大道。如今，我们这座城市普通居民的生活，比阿根廷人、巴拉圭人、智利人都要来得好，甚至已经达到了美国人的水准。我们的城市，是希望的城市，是充满无限机遇的城市。我希望在即将到来的选举中，我们能够将巴西的其他地方也提升到这样的水平，让所有人都能享受我们今天的机遇！请投票给全民盟！”他挥起拳头，高声呼喊。\n\n人群中，弗朗西丝卡正在犹豫投票的选择。虽然风暴的尘埃早已落定，城市也逐步重获新生，但劳工罢工的混乱同样是因全民盟的政策而起。在她看来，事情远不像他的演讲那样简单明了。"
 brazil_lacerda.213.a: "这是全民盟传播理念的机遇。"
 brazil_lacerda.214.t: "反帝行动"
 brazil_lacerda.214.desc: "收音机在七点整刺啦作响。\n\n“现在是晚间七点整，您正在收听巴西之音。今日国际经贸领域迎来重大动向，拉塞尔达总统宣布对日本帝国及大东亚共荣圈部分成员国加征一系列新关税，特别对满洲国进口商品追加10%特别关税。本台记者注意到，我国与广东国之间的优惠贸易协定暂未受此轮关税影响。\n\n拉塞尔达总统在声明中表示，此举旨在‘遏制’那些‘持续威胁我国自由的帝国主义强权’。总统演说强调巴西人民需为捍卫世界自由作出必要牺牲，并称‘与仍受日本帝国压迫的生灵相比，我们的付出微不足道’。\n\n接下来是参议院最新动态……”随着总统移开目光，广播声渐弱。这份声明必将向选民展露他反帝的坚定立场。\n\n走廊传来脚步声，外长瓦斯科·达·库尼亚推门而入：“我收听了演说，您终究采纳了我的建议。感谢总统信任。这个决策既能赢得国内选票，又有助于巩固与美国的友谊。”他朝总统微笑。\n\n“木已成舟，多说无益。”拉塞尔达回应道，“风向如何，还需拭目以待。瓦斯科，希望你的判断没有错。”"
 brazil_lacerda.214.a: "日立会作何反应呢？"
 brazil_lacerda.215.t: "关税、民调与布局"
 brazil_lacerda.215.desc: "同往常一样，拉塞尔达在办公室落座读报时已是正午。报纸头版标题印有“帝国施以反击”字样，正文则列出了日方为回应关税调整而加征的数十项报复关税。\n\n工厂一片混乱，日立轮胎厂大门紧闭，其上挂有数道锁链。工人们被拒之门外，不知该何去何从。\n\n布里佐拉的名字出现在一篇社论的署名位。上述社论对新关税加以谴责，直言前者伤及巴西工人最深，并再次谈论拉塞尔达如何无暇顾及辛勤工作的巴西公民，以及他那虚浮的政治表现会怎样再度危及他们的生计，致使巴西经济无端地陷入全面危机。\n\n还是老样子啊，布里佐拉，拉塞尔达面带笑意自忖。经济所受打击事先已有应对计划。尽管无法忽视，却也并无大碍，此外，经济本身将可消减冲击。\n\n一直以来，他的政策关键便是如此，即构建有弹性的巴西经济，据此得以承受同专制政权脱钩的负面影响。\n\n社论另附一份民意调查，表明中产阶级不仅尤为支持本轮制裁，还对更为严厉的制裁加以支持。反对帝国主义的斗争无需顾忌。\n\n总而言之，关税调整成效显著。削弱帝国主义对手之余，拉拢了可能支持他的选民，疏远的不过是那些原本就不会票选他的人。"
 brazil_lacerda.215.a: "一切都在计划之中。"
 brazil_lacerda.216.t: "杀虫剂"
 brazil_lacerda.216.desc: "布里佐拉庆幸演讲台朝南而建，刺目阳光不会直射双眼。他需要鼓舞民心，眯眼皱眉可不成体统。目光掠过台下人群——码头工人、渔夫、车夫，那些布满老茧的双手托举着殷切期盼，都在仰望他能带来改变。他从那些目光中读出了信仰的分量，深知自己决不能辜负这份重托。\n\n“累西腓的父老乡亲，全民盟的经济政策究竟给你们带来了什么？他们喋喋不休地吹嘘增加投资、缔造繁荣巴西，可那些报表上的数字，对你们这些用双手谋生的人有何实际意义？他们可曾降低过你们的房租？可曾为你们涨过薪水？还是把财富尽数中饱私囊，用民脂民膏搭建俯瞰众生的象牙塔？”人群爆发出雷鸣般的欢呼，此起彼伏的抗议声控诉着深重苦难。\n\n“他们蚕食劳工权益以填私囊。每当有工友在机器旁失去手掌，每当你们被迫无偿加班，背后都是全民盟在作祟。若你们甘愿让不公愈演愈烈，大可在选票上继续勾选他们！”布里佐拉的声浪攀至顶点，如风暴席卷全场。\n\n旋即他话锋陡转，声调渐趋沉郁：“但若你们已厌倦贫苦，若你们不愿再做待宰羔羊，工党-社民党联盟就是你们的选择。作为总统候选人，我在此庄严宣誓：定要将那些从劳工身上榨取的不义之财，归还给为之倾注血汗的创造者。贫穷是这些吸血蚊虫带来的顽疾，唯有用工党-社民党联盟这剂良药方能根治。”"
 brazil_lacerda.216.a: "欢呼声淹没了广场。"
 brazil_lacerda.217.t: "道义外交之需"
 brazil_lacerda.217.desc: "“你整天听到这么多关于德国罪行的控诉，”拉塞尔达仿佛在自言自语，“可关于日本的却少之又少。”他冷笑一声，手中的钢笔像指挥棒般在空中划出漫不经心的弧度，“那群日本疯子从中国人手里夺走整个省份转交给贪婪的财阀，用毒品奴役当地百姓。在印度支那像宰杀牲畜般屠戮妇孺。连他们的仆从国都支持西非的恐怖分子与独裁者——甚至我们这里也有爪牙。”总统眉间的沟壑更深了，“但国际社会——我是指自由世界，我们的世界——竟觉得他们是可以接受的替代选项。这简直恶心，简直是……”\n\n“骇人听闻？”\n\n“没必要显摆词汇量，瓦斯科。不过没错，骇人听闻。”总统向后仰靠在椅背上，“贸易制裁。我们需要这样旗帜鲜明的道德立场。再不能从他们的暴行中牟利了。”\n\n瓦斯科·达·库尼亚不安地拨弄着自己的腕表：“恕我直言，总统先生，即便算上扩大后的对美贸易量，共荣圈仍占我国经济相当可观的份额。我不是反对采取坚定立场，但——”\n\n“——你更关心利润表？”\n\n“我更关心大选。任何经济波动都会在选票池激起涟漪。”拉塞尔达正要开口，却被瓦斯科抢过话头：“听我说，我绝对支持道义为先，绝非劝您放弃原则。但或许可以先采取节制手段？将之包装成贸易保护主义与道义各占一半的政策。等大选尘埃落定，再以民意授权推进更……强有力的宣言。”"
 brazil_lacerda.217.a: "拉塞尔达摇头：“不行，不温不火的宣言等于废纸一张。”"
 brazil_lacerda.217.b: "拉塞尔达咬紧嘴唇：“有道理，瓦斯科。”"
 brazil_lacerda.218.t: "山巅之城"
 brazil_lacerda.218.desc: "长久以来，大泽静夫以为街道上除了愤怒的呐喊再不会有其他声响，所幸他错了：工地的噪音震耳欲聋，旨在治愈自由区骚乱创伤的修缮工程正如火如荼展开。\n\n喷绘着政府机构徽章的轿车与卡车，正朝着他在骚乱期间早已熟稔的贫困社区疾驰。房屋正被逐栋重建，那些失业多年的男女居民如今在市政工程中找到了工作。静夫觉得这一切美好得近乎虚幻。\n\n不，是真实的——只是附带着条件。\n\n毕竟这是选举年。\n\n这种政治算计让他反胃。他忍不住想：如果重建自由区不能带来选票，拉塞尔达政府要等多久才会行动？然而，静夫发现自己终究无法对眼前的变化感到愤怒。自由区终于获得了应有的关注，它的伤口终将愈合。\n\n怀着这样的思绪，静夫继续下班后的漫步。纵使善举背后藏着不纯粹的动机，他依然能见证它结出果实。"
 brazil_lacerda.218.a: "自由区，毁于暴民，建因选票。"
 brazil_lacerda.219.t: "调整赔率"
 brazil_lacerda.219.desc: "在烟雾缭绕的密室中，权贵们叼着雪茄啜饮白兰地的场景永远不会缺席。\n\n布里佐拉率先开口，尽管两人面前的酒杯早已空过数巡。“魏纳先生，恕我直言，全民盟在媒体界占据压倒性优势。虽然我们通过《方向报》与《最后时刻报》取得进展，但这还远远不够。”\n\n魏纳点头同意：“要撼动全民盟建制派的根基确实困难。”他轻弹雪茄，灰烬簌簌落入烟灰缸。“或许我夫人能略尽绵薄。您记得达努扎吧？她熟识几位擅长向马加良斯施压的记者。我设想通过几篇重磅报道——揭露他的道德缺陷、渎神行径与诸多婚外情——足以摧毁他在保守派中的声望，瓦解任何可能对抗工党-社民党联盟的阵营。届时他疲于修补形象，自然无力组织有效竞选。”\n\n布里佐拉皱眉：“我更希望在经济战线上交锋。若能将竞选焦点引向经济议题，胜选后推行政策会更顺畅。”\n\n“用经济议题竞选只会让民众昏昏欲睡。”魏纳掐灭雪茄，“民众渴望丑闻，渴求戏剧性。他们不用头脑投票，而是凭直觉。当直觉告诉他们该唾弃这个浪荡子时，选票自然就来了。”"
 brazil_lacerda.219.a: "“我不喜欢这个主意，但我更讨厌全民盟在台上，就这么办。”布里佐拉点点头。"
 brazil_lacerda.220.t: "此山之景"
 brazil_lacerda.220.desc: "塔沃拉从莫克卡萨餐厅的卡座起身。眼前是环球电视台广播总监贝内迪托·吉马良斯·罗德里格斯。罗德里格斯期待这次会面已久，塔沃拉也希望在辩论前与他建立良好关系。\n\n“塔沃拉先生，幸会。”罗德里格斯握手有力，笑容热络，“我期待接下来的辩论，对民众而言，这会是一场精彩的表演。”\n\n“对收视率也有好处。”塔沃拉打趣道，“其实，我正想与您谈谈环球电视台与未来总统的关系。”\n\n“野心不小，我喜欢。”罗德里格斯咧嘴笑道，“我深知媒体的力量，但这力量依赖诸多条件。媒体需要接触权才能生存，没人会信任一个被拒之门外的记者。”\n\n塔沃拉嘴角扬起狡黠的弧度：“当然，这是媒体仰仗政府的一环。而媒体世界里，速度决定胜负。谁先拿到独家，谁就能掌控舆论。”他顿了顿，“更妙的是，同一件事换种措辞，公众形象就能从从容不迫跌入狼狈挣扎——不过转瞬之间。”\n\n“只需赋予恰当的……语境。我想我们已达成共识。”罗德里格斯的笑容愈发灿烂，这场交锋圆满落幕。"
 brazil_lacerda.220.a: "两人再次握手，彼此眼中，前路似乎更明亮了几分。"
 brazil_lacerda.221.t: "他山之景"
 brazil_lacerda.221.desc: "“若昂，我的经济计划是为全体国民设计的。普惠式经济增长才是提升巴西人生活水平的唯一途径。产能提升能平抑物价，贸易扩展可丰富商品种类，更重要的是能为公共服务注入资金——无需让下一代背负滚雪球般的国债利息。”\n\n弗朗西丝卡搅拌咖啡的手势渐缓。马加良斯的答辩逻辑严密，经济腾飞确实能让各阶层雨露均沾。这位候选人对主持人的刁钻提问游刃有余，举手投足间尽显运筹帷幄的总统气度。\n\n“布里佐拉先生，您声称工党-社民党联盟是唯一能解决贫困的政党。但贵党执政期间失业率与通胀率双升，对此作何解释？”\n\n布里佐拉稍作停顿。“这是无稽之谈。失业问题源于企业解雇门槛降低等多重因素，通胀则是监管缺位导致的奸商哄抬物价……”\n\n弗朗西丝卡被咖啡呛住，杯盏险些倾覆。曾在竞选集会上慷慨激昂的布里佐拉，此刻在质询中竟支吾如迷途羔羊。若连质疑者都招架不住，又如何统领这个半数选民未曾投票给他的国家？"
 brazil_lacerda.221.a: "她只知道自己对此一无所知。"
 brazil_lacerda.221_tt: "£BRA_udn_texticon §Q拉斐尔·马加良斯§!在§Y中西部§!的支持率§G上升§!§Y2%§!。"
 brazil_lacerda.222.t: "倒计时"
 brazil_lacerda.222.desc: "拉塞尔达的家人已经入睡，但他却无法合眼片刻。他重新审视总统任期，万千思绪涌上心头。他好奇死后人们会如何评价自己。不过今天的主角不是他，而是拉斐尔·马加良斯——他的门生，即将赢得选举的继承者，那个会延续他政治遗产的人。\n\n在城市的另一端，马加良斯正与顾问们交谈。他的口中虽然说着话，思绪却飘向别处。无论选举结果如何，他内心有一部分为竞选即将结束而欣喜。调查记者们深挖他的过往，将他的私生活暴露在公众视野，令他的名誉蒙尘。但愿这一切都是值得的。但愿他终能入主总统府。\n\n布里佐拉的声音已经嘶哑。他声嘶力竭地呐喊，直到再也发不出声音。这一切都是为了他们，为了见证全民盟的溃败。巴西值得这样的胜利，缔造今日巴西的瓦加斯也值得这份胜利。他们的时代尚未落幕——巴西不会抛弃他们——仍有太多未竟的事业亟待完成。\n\n在弗朗西丝卡狭小的公寓里，环球电视台的播报声不绝于耳。巴西正站在十字路口，在野蛮与文明间作出抉择。她期盼理性能够取胜，盼望布里佐拉获胜，却无法预知这个国家将转向何方。她投出了支持他的一票，但也知道许多人都选择了马加良斯。当电视上播出公告时，她将见证答案的揭晓："
 brazil_lacerda.222.a: "“根据可靠测算，下一任巴西总统将是……”"
 brazil_lacerda.999.t: "全体会议"
 brazil_lacerda.999.desc: "走廊深处的一台收音机正在播报未来数日的天气。疲惫不堪的工作人员无力去拔掉它的电源插头，任由它对着虚空徒劳自语。拉塞尔达总统召集了全体内阁成员，副总统塔沃拉、外交部长贝尔特朗和战争部长戈贝里不得不从选举后亟需的休整中抽身赶来。众人拖着步子踏入内阁会议室，看到拉塞尔达正站在主座前微笑致意。\n\n“早上好，”总统简明地开场，“选举业已落幕。从今天起，我们将迎来下届大选前最长的施政窗口期。这是向选民证明我们执政理念的黄金时间。”他双手撑住桌面，目光在与会者间逡巡，“当前这个历史机遇必须牢牢把握，为了巴西的复兴，我们一定要抓住良机——是时候彻底挣脱《瓦加斯劳工法》的桎梏了！”话音落处，会议室陷入短暂的寂静。外交部长贝尔特朗最先回过神来，手指在桌面上敲出清脆的节拍，很快整个内阁都随着这个节奏叩响桌面。\n\n“我深知这将是本届政府最艰巨的挑战，”拉塞尔达提高声调，“但为了巴西的未来，我们责无旁贷！”他的话语在穹顶下激起回响：“让我们携手砸碎瓦加斯主义的枷锁，释放全体巴西儿女的智慧与力量！”如潮的掌声中，总统保持着标志性的微笑。但他心知肚明：前路注定波涛汹涌。或许此刻这个从容的笑容，就是为即将到来的惊涛骇浪预备的定海神针。"
 brazil_lacerda.999.a: "带着微笑，穿越暴风之眼。"
 BRA_lacerda_load_strike_tree_tt: "§Q拉塞尔达§!清除§V瓦加斯遗毒§!的征程开始了，§Y国策树中更多选项已解锁§!"
 brazil_lacerda_strikes.1.t: "开场第一幕"
 brazil_lacerda_strikes.1.desc: "“亲爱的巴西公民们。今天我们正面临前所未有的危机……”联情反情局站长干巴巴地念着讲稿，同僚们以军人姿态列队聆听，这是捍卫国家使命中难得的休憩时刻。“极端分子企图趁乱煽动罢工，以激进议程颠覆政府。”\n\n“里约与圣保罗已现暴力端倪……”军警们冲进更衣室穿戴防暴装备，护甲上未褪的血渍尚带余温。警用对讲机爆出北部骚乱的嘶吼。“……必须对煽动者采取极端手段。”\n\n“鉴于当前严峻形势，所有应急部门务必最大限度缩减行动。”救护车司机把通告揉成一团，碾熄最后一支烟。休息结束——她的天职是救人，而非服从命令。\n\n“政府将全力保障企业权益……”糖面包山总店的经理正疯狂拨打电话，两个儿子持枪肃立窗前。屋顶突然传来异响，年轻人抄起武器冲了上去。“……但无法确保各位的财产安全。”\n\n“请全体国民居家避难。未来数周充满变数。最后，赠予各位一句忠告：”"
 brazil_lacerda_strikes.1.a: "“准备战斗。”"
 brazil_lacerda_strikes.2.t: "如人牧猫"
 brazil_lacerda_strikes.2.desc: "副总统维尔吉利奥·塔沃拉深吸了一口气，打量着人群：现在来的都是巴西右翼中名副其实的精英了。全民盟与国家工党的派系代表、基民党与社民党的右翼人士、索邦派与强硬派的军方要人以及民主工会运动的高层，更别提挤在房间里的各路保守派媒体了。\n\n塔沃拉做好了准备，走向讲台：“感谢诸位今天能莅临现场。我对大家为祖国所做出的牺牲表示由衷感谢，但我需要你们再次做出牺牲。”此时遣词造句一定要万分谨慎，顾及全体，不出纰漏，否则他们一定会让你小命不保。\n\n“拉塞尔达正在与自独裁时代以来一直主宰着这个国家、根深蒂固的权势集团进行着一生中最为艰难的斗争。”塔沃拉对这位大英雄甚至不能亲临演讲现场尤为恼火——据说这家伙正忙于什么事务——还是真是他的一贯作风。“我们必须竭尽全力去支援他。”\n\n“对于我们在媒体界的宝贵联络人——你们在对抗《最后时刻报》的宣传战中发挥了关键作用——我对你们的唯一期望，就是在这场斗争的新阶段中加倍努力。”与会的媒体代表点头示意——我们听到了。\n\n“对于我们可敬的军方成员，我希望你们原地待命，不要擅自行动。前途未卜，暗流涌动，但我向你们保证，光明触手可及。”尽管塔沃拉深受军方敬重，但此番话语还是勾起了他们心中的疑虑。塔沃拉只希望他们对自己的信任胜过拉塞尔达。\n\n“我们必须精诚团结，绝不能屈从于社会主义暴徒，被这帮妄图摧毁我们国家的人打败。只要团结一致，我们必将胜利！”前所未有的掌声与欢呼声响彻全场。塔沃拉再次向大家致谢，随后离开了讲台，但他的身姿依旧萦绕在众人的脑海，有些人不禁开始思考，如果让一个更务实合作的领袖来领导巴西会怎么样……"
 brazil_lacerda_strikes.2.a: "塔沃拉冉冉升起，拉塞尔达则略显黯淡。"
 brazil_lacerda_strikes.3.t: "好文多改"
 brazil_lacerda_strikes.3.desc: "你好，爱德华多，以下是对你近期发表的《拉塞尔达与工人：独裁余毒》的修改意见。\n\n在第一节中，请将“相当出色”一词替换为“震古烁今”，用于描述拉塞尔达过去的改革。同时，请在“军事”、“危机”、“威权”等词语后添加逗号。此外，你对瓦加斯独裁统治的描写应该更加深刻，以体现他的为人残暴，目前的表述有些轻描淡写。\n\n在介绍工人总指挥部的部分，你似乎遗漏了该组织同工党里外勾连以及美化瓦加斯独裁统治的事实，可以尝试将此与该组织支持《瓦加斯劳工法》一事相关联。同时，希望你能侧面烘托民主工会运动的正面形象。\n\n下一节中，在讨论工总时，请用“共产主义者”一词替换“工会分子”。在描写致使全国瘫痪的大罢工时，你对警方的批评过于严苛，应进行删减，可添加工总罢工分子袭击企业的详细内容来填补空白。\n\n文章末尾对拉塞尔达的声援是点睛之笔，但应该更强而有力，要向读者强调总统是在为巴西之魂而战。无需顾虑，大可就罢工对国家和经济的破坏畅所欲言。\n\n请你尽快做出相应的改动。当前经济形势下，找到一份新工作恐怕不容易。因此，我相信你不会将上述意见束之高阁。感谢你的配合。"
 brazil_lacerda_strikes.3.a: "真相永远是任人打扮的小姑娘。"
 brazil_lacerda_strikes.4.t: "结交朋友"
 brazil_lacerda_strikes.4.desc: "在工人权利争取战的间歇，罢工领袖们带着午餐坐在公园的长椅上，在这里他们依然能远远看见他们的工人。众人随即开始了闲聊，话题从平日的寒暄很快转向了拉塞尔达寄来的一封奇特信件。收信人站在桌子上，操着极具总统风范和美国口音的腔调将信的内容念了出来。\n\n“路易斯·佩雷拉，今天，我以你的同胞、你的朋友而非你的总统身份与你对话。”工人们再也憋不住笑意，放声大笑起来。被统治阶级的大资本家吸血鬼称为“朋友”，这一厚颜无耻之举将众人心中本该燃起的怒火一冲而散。“现在，我希望你为了国家的利益，收手并结束这场混乱。”\n\n“我在与你的内心对话。我请求你想想那些为你而战的正派人士。他们不是什么阶级斗士——他们只是平民百姓，希望得到合理薪资养家糊口。”人群长嗟一声，仿佛在说，’对啊，这就是我们为之奋斗的初衷。‘“我无法改变你的意识形态，但我期望你能放过那些被迫为你卖命的男女老少。”\n\n“如果我的言语无法打动你的内心，那我可以试着打动你的钱包。我的政府已经为你准备了足够的资金，能让你的家庭安安稳稳地过上体面生活。你可寻不到比这更筹码丰厚的交易了，因此，为了你自己，我希望你能就此收手，让你的工人免受将至的灾厄。”收信人抬起头环视众人，大家都站在原地，一动不动。随后，他大手一挥，将信件撕了个稀巴烂，人群旋即爆发了一阵欢呼。\n\n但在同志情谊与忠诚试炼的欢庆之余，有人也注意到了些许异样。工人数量渐渐减少，罢工人墙日趋稀疏，路障后的重量也缺斤少两。而后，他们开始在心底考虑拉塞尔达开出的条款，也许他的这一击足以动摇更多人的决心……"
 brazil_lacerda_strikes.4.a: "千金难换真友情。"
 brazil_lacerda_strikes.5.t: "收尾工作"
 brazil_lacerda_strikes.5.desc: "法案通过了，但对于拉塞尔达而言，这本就是板上钉钉的事。真正引起他兴趣的，是透过众议院观览席所看到的场面正逐渐展开。\n\n首先映入他眼帘的是工党。他们哭喊着不公，声称这项法案将使理想中的劳动者变得越来越贫困。其中一人甚至跳上了桌子，高声咆哮着瓦加斯的遗产，结果只换来了拉塞尔达的讥笑。然而，真正令人不安的，是工党议员成群退场，显然是在策划着他们的下一步行动。\n\n社会民主党则陷入了分裂，与工党或全民盟那样的团结形成了鲜明对比。在投票过程中，他们内部的裂痕暴露无遗，议员们在众目睽睽下互相怒斥，彼此震惊地发现同僚的真实立场。有些人甚至需要被强行拉开，而另一些则被护送出场，以免整个场面彻底失控。\n\n全民盟的议员们则带着自豪的神情穿行在议会大厅，对左翼议员的嘲讽与嘘声毫不动摇。他们与社会进步党的议员并肩，这些人并非出于理念上的认同，而是纯粹为了自身利益，甘愿追随全民盟的路线。他们彼此交谈，笑容满面，在自我吹捧中洋洋得意。\n\n几位全民盟议员在议会的玻璃观览席中寻找着拉塞尔达的身影。当他们的目光偶尔交汇，便对这位领袖报以微笑——这是对总统的讨好，一份象征性的礼节。然而真正的战斗尚未开始，那将是在参议院的较量，也是对拉塞尔达一生事业的终极考验。\n\n瓦加斯的遗产，在这项法案通过后，将被定格为独裁者，而不再是“穷人的大救星”。他与那部劳工法典都将成为历史，而拉塞尔达才是未来。这个念头足以让他心潮澎湃。通往巴西伟大的道路上，只剩下最后一道障碍，而他，已然准备好迎战。"
 brazil_lacerda_strikes.5.a: "瓦加斯主义与拉塞尔达主义的最终对决，已然迫近。"
 brazil_lacerda_strikes.6.t: "开放的舞台"
 brazil_lacerda_strikes.6.desc: "最终的票数被清点完毕，参议院陷入了寂静，整个国家仿佛被时间凝固般屏息以待。奥罗·德·莫拉·安德拉德宣布了巴西人民更忠于谁：瓦加斯，还是拉塞尔达。\n\n“鉴于已达到法定票数，全民盟的法案已由参议院通过，并将很快成为法律。”\n\n接下来的场景如同一场令人陶醉的幻境，拉塞尔达仿佛不再置身于参议院，而是被升华至更高的境界，被铭刻进历史的篇章，成为那个“纠正了巴西”的人。一种无与伦比的权力感注入他的灵魂，他享受着了一种无所不能的支配感，仿佛整个巴西都已化作他的雕塑，等待他将其打造成理想国度。\n\n拉塞尔达终于回到了现实，一位哭泣的全民盟参议员紧紧拥抱着他，激动的泪水打湿了他的西装。这只是众多欢呼着他名字的人之一，就连塔沃拉和那些曾在背后批评他的党内异见者，也不得不为他的胜利露出笑容。他已用事实向他们证明了一切，如今，这些人甚至已开始成为他的追随者。\n\n然而，参议院的其他角落，情景却截然不同。工党如同他们的英雄遗产一样被击垮，他们曾经的骄傲如今支离破碎，曾经的抱负被彻底碾碎。社会民主党则一言不发，仿佛在为他们岌岌可危的政治前途默哀。其他参议员也保持沉默——有人因悲痛无言，有人则是为了掩盖那无法示人的贿赂交易。\n\n当收音机播报投票结果的瞬间，工会成员立刻关掉了广播。男人和女人彼此沉默地交换着凝重的目光，他们明白这意味着什么，但同时，他们也明白事情绝不能就此结束。带着重新燃起的斗志，他们再次走上街头，愤怒如火，誓要让拉塞尔达为此付出代价，为捍卫他们的权利，为了一个能够养家糊口的未来而战斗。"
 brazil_lacerda_strikes.6.a: "即使被压垮、受创、鲜血淋漓，工会仍将战斗到最后一口气。"
 BRA_riots_start_tt: "§V我们的最低工资和工会法将恶化。巴西工人不会给我们什么好脸色的——新决议组已解锁。§!\n"
 brazil_lacerda_strikes.7.t: "陷没"
 brazil_lacerda_strikes.7.desc: "最终的票数被清点完毕，参议院一片寂静，整个国家仿佛被时间凝固般屏息以待。奥罗·德·莫拉·安德拉德宣布了巴西人民更忠于谁：瓦加斯，还是拉塞尔达。\n\n“由于未能达到法定票数，全民盟的法案被参议院否决。”\n\n就这样——瓦加斯主义彻底战胜了一切。\n\n拉塞尔达感到一阵恶心，仿佛喉咙深处被毒液灼烧。他被失败的苦涩感吞噬，彻底失去了力量。现在的他，只剩下一个软弱无能的失败者，一个在关键时刻让所有人失望的人。本来，他本可以引领国家摆脱瓦加斯那腐朽遗产的时刻，如今却成为了终极的挫败。这就是他的历史定位吗？一个懦弱的失败者，一个没能给予巴西必要“严厉之爱”的失败者？\n\n环顾四周，参议员们的反应仿佛无声地印证了他的感受。他的党派一片灰暗，那些曾经自豪的盟友埋着头，双手掩面，心中不禁与那个自由繁荣的巴西梦想作别。而其他政党则满脸得意，仿佛完成了一项伟大的任务。毕竟，他们是反对派，不反对又算什么反对派？\n\n然而，在这场因打倒一个妄图将国家私有化的政客而引发的自鸣得意与狂欢之外，仍有一些人紧盯着拉塞尔达的举动。只见他缓缓起身，整理了一下领带，随即径直走出参议院。没有激昂的演讲，没有对那些阻挠他法案的政客作出强烈谴责，什么都没有。\n\n唯一能透露他下一步意图的，是那抹扭曲着怨恨的诡异微笑……"
 brazil_lacerda_strikes.7.a: "拉塞尔达主义含着血迹，正准备孤注一掷的最后一搏。"
 brazil_lacerda_strikes.8.t: "维新"
 brazil_lacerda_strikes.8.desc: "工人总指挥部旗下顽强的工人们齐聚一堂，不是为了抗议，而是为了庆祝拉塞尔达的失败。有些人觉得不该止步于此——这只不过是根除巴西一切顽疾的伟大社会革命的开始。然而，更多人只是纯粹地为这场胜利感到高兴，他们或是太过疲惫，无意追求更宏大的目标，或是对斗争的冲劲能持续多久感到悲观。\n\n“肃静！肃静！我们敬爱的总统阁下要发表广播讲话啦！”。播放着拉塞尔达声音的收音机旁的几个人拧了一下旋钮，好让其他人能听见。这倒是很意外，但大家都乐得听听这只可怜的黄鼠狼要怎么鬼哭狼嚎地给自己剥夺工人权利的阴谋念悼词。\n\n“巴西的人民们，选择的时刻到来了。当腐败的制度阻挠了真正的进步，当往日的失败封死了通往未来的道路，就是一个正直的人不得不做出艰难抉择的时刻。”笑声消失了，困惑、忧虑的人们在想知道接下来会发生什么。\n\n“为了让巴西摆脱瓦加斯主义，就必须成为瓦加斯。我将利用一切必要手段通过这一法案，让参议院滚蛋吧！我告诉你们，收收你们对这个决定的仇恨吧，你们的孩子会感谢我的。”\n\n法案未能通过的结果带来的平静已经荡然无存，工会再次走上了街头。他们的抗议前所未有的响亮，仿佛他们是阻止拉塞尔达破坏民主的最后防线。\n\n但他们并不孤单。在受到严密保护的办公室里，一只手关上了收音机。副总统维尔吉利奥·塔沃拉走出房门去见几位老朋友。他心底对“当代瓦加斯”的演讲只有一句评价："
 brazil_lacerda_strikes.8.a: "“真是个蠢货！”"
 brazil_lacerda_strikes.9.t: "崩塌"
 brazil_lacerda_strikes.9.desc: "“对了，戈尔贝里，军队状态如何？我相信他们会很喜欢新式美式装备的……谁不喜欢呢？”在走回办公室的路上，拉塞尔达的口气十分轻松，仿佛全然无视了他演讲引发的混乱。戈尔贝里没有回答，他和他的索邦派同僚们都心事重重。\n\n塔沃拉面对面地站在了总统面前，拦下了他的脚步：“我要和你谈谈，拉塞尔达，现在！”\n\n“当然，维尔吉利奥。我们接下来还有很多安排要做。”他的话几乎不是在对塔沃拉说，“你可以先从……”\n\n“你无事可做了。”他的话语蕴含着强大的威压，“你能为我，为党，为巴西人民能做的唯一好事，只有辞职。”\n\n“什么？你在说什么塔沃拉？”他听见了戈尔贝里的制服下金属碰撞的声音。\n\n“成为瓦加斯？你脑子糊涂了吗？你以为接下来会发生什么？”他愈发愤怒地斥责道，“没什么好谈的——你现在就要辞职。我要做的就是收拾你给我们留下的烂摊子。”\n\n戈尔贝里摁住了拉塞尔达的胳膊，其他军官也一拥而上把他控制起来。“我命令你们放开我！”没有人回答。“我是你们的总统！”没有人回答。“放开我！”拉塞尔达的挣扎只换来了一把顶到他背后的枪。\n\n塔沃拉抛下了拉塞尔达，径自走向了他的新办公室。拉塞尔达只能看见，他自以为忠诚的全民盟同僚们走过他身边时，吉尔贝托、瓦斯科、埃利奥和拉斐尔，没有一人多看他一眼。他们将他抛在了身后的历史中。"
 brazil_lacerda_strikes.9.a: "拉塞尔达成为了瓦加斯，于是塔沃拉成为了拉塞尔达。"
 brazil_lacerda_strikes.9.tt: "£BRA_udn_texticon §Q全民盟§!忠诚度将被重置为§Y75%§!。"
 brazil_lacerda_strikes.10.t: "重建"
 brazil_lacerda_strikes.10.desc: "新总统的就职没有豪华的典礼，只有与不计其数的愤恨拉塞尔达的人一场又一场的会面。他和党内各个派系的大小人物握手，徒劳地尝试从这片废墟中重新拼凑起一点最起码的共识。结果差强人意。越少的人谈论他和军方及罢工者的争吵越好。至少，他可以看看内伊·布拉加的竞选演讲。\n\n“当冲突蔓延整个巴西，我必须承认，这样的场景对我来说太过陌生。我爱里约和圣保罗，但巴拉那才是我永远的家。我笃实的履行着合作友爱的基督美德，而军人们不仅再次践行了它，更是告诉了我何为忠诚的美德。”塔沃拉感到有些不快，但他没有多想。毫无疑问，他做了正确的事。\n\n“一小撮激进分子的腐朽思想荼毒了勤劳诚实的劳动者们，那些社会主义赤党意图削弱、摧毁我们国家的经济。但同时，自由市场原教旨主义分子也难逃其咎。他们的行径只带来了严重的混乱。”总统并不奇怪布拉加把自己和拉塞尔达切割开来，否则那绝对是政治自杀。\n\n“所以，我请求在座的各位为了巴西团结的未来——内伊·布拉加领导的巴西共同奋斗！投给布拉加！谢谢你们！”广播里传出了热烈的欢呼和掌声，迸发出了如今士气低迷的巴西右翼中难得的热情。这足以带给塔沃拉期待未来的勇气。\n\n与此同时，可怜的马加良斯，曾经毋庸置疑的接班人，意识到自己也被抛弃了。竞选演讲的现场不允许他进入。他试图否认自己与拉塞尔达的联系，但这远远不够，现在他已经成了党内的贱民。他沮丧地开始计划自己的下一步，可能会，也可能不会与社进党有关……"
 brazil_lacerda_strikes.10.a: "右翼的未来属于基督教民主党，不属于全民盟。"
 brazil_lacerda_strikes.11.t: "烧光他们"
 brazil_lacerda_strikes.11.desc: "“总统阁下，我担心，这种做法和阻止罢工的目标背道而驰。在劳工法案后，我们现在的方针会引爆第二轮罢工高潮的。”拉塞尔达要应付的不只有民主工会运动的诉求和质疑，还要说服塔沃拉——他现在仿佛是全世界最顽固的人。“……简而言之，我们主张改变当前的做法……抱歉，我无意冒犯。”\n\n“我懂了，谢谢你，保罗。大体上看，谈判也未必是个坏主意……”当然，他口头上当然要这么说。塔沃拉总想做个和和气气的好人。但在政坛上，和气一毛不值。瓦加斯可一点都不和气，凭什么我们要和气地对待他的支持者？凭什么我们好不容易走到了今天，却又要向这帮共党、颠佬卑躬屈——“不过，你怎么看，拉塞尔达？”\n\n“没有谈判。我们要把这窝硕鼠一只只地熏出来。”\n\n哪怕有谈判，拍板的权力也只会属于拉塞尔达，而不是塔沃拉。“戈尔贝里。”听见总统的话，他的军帽抬了起来。“军队部署计划准备好了，是吧？”他点了点头。“让他们准备就绪，让他们知道，很快就需要他们出马。”\n\n“塔沃拉。”副总统疲惫地看着他，顺从地服从了他的决定。“通知各地的警察长官，在那些游行集会最频繁的热点地区集结警力。如果他们一定要等脑子开瓤了才听得懂人话，那就让他们长长记性！让警察们知道，我们绝不会把任何一位打击暴徒的英雄出卖给媒体，钉上十字架。”\n\n“你是领袖，拉塞尔达。我立刻把命令传下去。”他遗憾地看了一眼民主工运的代表们，让他们离开了。“回去陪陪你们的妻子吧，这周会很漫长。”人们离开了会议室，拉塞尔达则笑了。第二波罢工潮不过是他们的回光返照。他会奉陪到底，直到他们嘟囔着那个教会他们礼义廉耻的男人的名字逃回家。"
 brazil_lacerda_strikes.11.a: "共识是个早该丢进垃圾堆的词。"
 brazil_lacerda_strikes.12.t: "耐心的美德"
 brazil_lacerda_strikes.12.desc: "在一座和美国大使馆差不多大的建筑里，所有人都时刻防备着消息从这里走漏出去的可能。林肯·戈登跟着茹拉西·马加良斯走进了一间受到严密把守的会议室里后，想起这一点的他们随即紧紧地关上了背后的门。事关国家安全，不能有一点闪失。\n\n“我要先说明的是，毫无疑问——我们完全支持拉塞尔达。不过……”马加良斯有点局促不安。他必须提出警告。“但是，我们的支持受到了……某些因素的制约。议会方面不理解这场斗争的意义所在。所以，谈判约定的任何援助都必须秘密进行。”\n\n“当然，我们都有各自的中间人。虽然不是所有人都认同总统的举措……”——至少务实派不太认同，“……但我们还是要竭尽全力地支持他。之前，您是不是提到过FBI能提供一些帮助？”\n\n“是的。我们可以通过一些渠道为政府提供资金，通过商业上的大力支持帮助贵方渡过即将到来的冲突。还有工资补贴，税收豁免，破坏罢工……”戈登的声音低了下来，他意识到自己需要回到正题。“总之，茹拉西，美国会全力以赴地支持拉塞尔达政府——这符合我们的利益。”\n\n马加良斯从大使的口气中听出了一丝恼怒的语气，但他没有深究，以防搞砸了刚刚成功的商讨。“谢谢您。我们可以把那些人从街垒里饿回岗位上。拉塞尔达不是一个喜欢久等的人，但他也很吸收其他同僚的意见——如果他想给那些罢工分子上上眼药的话。”戈登走向门口，给他留下了最后的忠告："
 brazil_lacerda_strikes.12.a: "“就当是为了你好，但愿拉塞尔达能挺过去吧。”"
 brazil_lacerda_strikes.13.t: "骑警冲锋"
 brazil_lacerda_strikes.13.desc: "在里约热内卢阳光明媚的大街上，数百罢工者与警察剑拔弩张地对峙着，仿佛他们正身处罗克渡口的战场上。工人们用投掷物攻击着武装警察的阵线，警察们则等待着、寻找着、暗自祈祷着反击的机会。\n\n指挥官听着自己的无线电台：骑警已经就位。这些盾牌阵列后的高大单位是他的杀手锏。他读了拉塞尔达最新的备忘录，他很清楚自己的职责，那就是击溃罢工分子，阻止他们的暴行。而现在就是最好的机会。他将命令往下传——阵型开始变化了。\n\n盾阵为骑警让开了突击口，骑警们旋即策马冲入了示威者的队伍中，将警棍一视同仁地砸在了所有人的头上，无论老少。皮靴向前推进，清理掉他们身后的伤者和依然在顽抗的人。一个小时后，街道上只剩下遍地的血迹和那些曾经勇敢之人的哭泣和哀嚎。\n\n警察摆拍着把罢工者押往拘留所的照片。警长接受了热情的右翼记者们的采访，他指责“暴徒”的行为导致了警察不得不武力执法，他们朝警察投掷了燃烧瓶并使用了枪支——尽管没有任何物证。新闻稿连篇累牍地称赞警察，将他们描绘成捍卫群众自由的英雄。\n\n在这场镇压后的几天里，医院里还有着数百名受伤的罢工者。《最后时刻报》的头条将此次事件形容为“严重的过度反应”，其他反对派报纸也持有类似的观点。在接下来几周里，所有被捕的罢工者都会被无罪释放，毕竟要求对这场弹压行动进行调查的示威全都未被理睬。"
 brazil_lacerda_strikes.13.a: "以自由的名义，对工人举起屠刀。"
 brazil_lacerda_strikes.14.t: "生存模式"
 brazil_lacerda_strikes.14.desc: "毛里西奥听闻圣保罗及北方诸州颁布戒严令时，尚在揣度其中深意。此刻答案已昭然若揭：拉塞尔达总统正在向自己的国家宣战。\n\n有生以来，他第一次目睹M41沃克斗牛犬坦克碾过福塔莱萨的街头。这个年迈的男人平生未尝恐惧滋味，直到钢铁履带裹挟着压倒性的威权气息碾碎所有反抗意志，将驯服的烙印刻进每个市民的骨髓。\n\n总有人试图负隅顽抗：工会领袖们幻想借戒严令点燃民众对极权的怒火，同情者笔下的抗争叙事在街头巷尾流转。然而当装甲运兵车的阴影笼罩街道，任何虚张声势的反抗勇气都会在金属怪兽的轰鸣中烟消云散。\n\n没有巴西人愿成为履带下的亡魂。罢工者的街垒仍在，气氛却已天翻地覆。昔日的同志情谊化作困守街垒的惨烈，人们隔着封锁线遥望战争机器的寒光，在绝望中等待命运的裁决。\n\n更多圣保罗人沦为暴政的旁观者。他们瑟缩在窗后，望着坦克碾过熟悉的街巷，既无勇气亦无能力施以援手，只能坐在家中，眼睁睁看着钢铁巨兽将故土蹂躏成陌生模样……"
 brazil_lacerda_strikes.14.a: "工会曾为反对拉塞尔达而战，现在他们为生存而战。"
 brazil_lacerda_strikes.15.t: "时间静止"
 brazil_lacerda_strikes.15.desc: "烈日灼烤着人行道，开启新一日轮回的仍是旧战场。军警如罗马方阵般严阵以待，对面罢工者的阵线比昨日更显凌乱。投掷物雨点般砸向盾墙，精准叩击着每道昨日留下的裂痕。\n\n指挥官策马穿行于战阵，嘶吼着鼓舞士气的号令。日头渐高，盾牌在汗透重甲的警员手中愈发沉重——面罩模糊了视线，他们只能机械地维持战线，暗自祈祷同袍莫要倒下，祈求换岗时刻早日降临。\n\n真正的生存之战属于盾墙彼端的人们。这支“人民军队”没有制式武装，唯有临时拼凑的燃烧瓶与砖块。支撑他们的，是并肩作战的信念，是坚信公理必胜的执念。\n\n但信念亦有溃堤之时。每当目睹同志被拖进囚车，亲人遭催泪瓦斯蹂躏，友人被警棍殴得遍体鳞伤，某种比绝望更锋利的东西就在胸腔里生长。他们知道，心口插着的这把利刃，终将在某个时刻化作刺向暴政的锋芒。\n\n远离硝烟处，戈尔贝里·多·科托-席尔瓦正蹙眉远眺。这位前来警察局巡视的将军，眼前所见令他忧心忡忡：对峙僵局中，他的士兵正在被活活炙烤。何等荒谬。总统必须听取他的谏言——若那位阁下尚存理智的话。"
 brazil_lacerda_strikes.15.a: "时间，磨灭万物。"
 brazil_lacerda_strikes.16.t: "谈判桌上"
 brazil_lacerda_strikes.16.desc: "车队畅通无阻地驶过巴西利亚，塔沃拉望向窗外，宽阔的街道在高大的树荫下显得空旷寂静，车辆稀少，行人更少。通常，长途旅程会让人有片刻沉思的机会，可以反省、遐想。然而，塔沃拉没有这种奢侈。身边的谈判团队正激烈地交换着各种数据和数字，而他则封闭在自己的思维中，在脑海里精确整理每一项事实、记录和数据，让它们各归其位。\n\n当车队抵达劳工与社会保障部时，大批抗议群众已经在建筑前聚集。他们围成了一个分割式的半圆，抗议者站在最外围，高举标语、高喊口号，但塔沃拉对他们视若无睹。介于人群之间的是一层薄薄的防暴盾牌，将示威者与前方的记者们隔开。随着车队驶近，盾牌前推，军警强行驱散开抗议人群，清出一条道路。\n\n塔沃拉在大楼门口下车，独自迈步向前，手中紧握着一只一尘不染的公文包，而他的谈判团队则跟在身后，默契地调整着思路。穿过大楼时，皮鞋踏在瓷砖地板上的回声回荡在走廊间，旁侧的公务员纷纷避让，为他们让出通道。他们已经比预计的时间晚了一些，因此不可多留，几乎是直接冲进了会议室。\n\n会议桌的另一端，二十余名工会领袖聚集在一起，正窃窃私语。然而，当大门开启的那一刻，所有交谈瞬间停止。他们没有起立，但却自觉噤声，所有的目光都投向塔沃拉。塔沃拉走到会议桌的主位坐下，打开公文包，一丝不苟地取出文件，并耐心而精确地将它们摆放整齐。这场谈判将持续数月，他们会在这间会议室里见面十数次。然而，在这一刻，双方所经历的最漫长的五分钟，便是等待塔沃拉开口。"
 brazil_lacerda_strikes.16.a: "“先生们，我们开始吧。”"
