 BRA_lacerda_oas_support_tt: "§G支持§!拉塞尔达的自由巴西愿景。"
 BRA_lacerda_oas_at_risk_tt: "§Y可能§!撤回对拉塞尔达政府的支持。"
 BRA_lacerda_oas_withdraw_tt: "§R不再§!支持拉塞尔达政府。"
 BRA_lacerda_oas_hostile_tt: "§R敌视§!巴西和拉塞尔达政府。"
 BRA_1965_the_lacerda_presidency: "拉塞尔达任期"
 BRA_1965_the_lacerda_presidency_desc: "拉塞尔达夙愿得偿。然而，他没有时间可浪费。为了实现他的“中产阶级革命”愿景，拉塞尔达需要说服他的全民盟同僚们，否则在成功前他就会被自己的党大卸八块。\n\n拉塞尔达的新内阁和全民盟本身就涵盖着多样的政治理念和利益团体。副总统塔沃拉属于奉行实用主义的务实派，他会阻止拉塞尔达推行任何他们认为太过鲁莽的政策。\n\n党主席马加良斯·平托领导着由集权派和发展主义者组成的波萨诺瓦派，他们敌视拉塞尔达的乐队派以及自由化的经济政策。\n\n司法部长米尔顿·坎波斯领导着已经大大削弱的历史派。在爱德华多试图废除最低工资制时，这些人强硬的反瓦加斯主义立场导致了失败。只要拉塞尔达没有过于偏离中道，坎波斯就不会是个大问题。\n\n军方是房间里的大象。拉塞尔达已经任命戈尔贝里·多·科托-席尔瓦为战争部长，他是奉行实用主义的索邦派中一位颇具影响的人物。如果拉塞尔达带来了太多不稳定因素，他或许会对本届政府发动政变。"
 BRA_varguist_devils: "瓦加斯主义之魔"
 BRA_varguist_devils_desc: "爱德华多·戈梅斯的任期早已证明，瓦加斯主义不可能被一次小小的选举彻底打败。尽管我们已经取得了不小的进展，但仍有数百万人对瓦加斯主义抱有同情。他们的势力正四处游荡，等待着归来的那一天。\n\n为了防止瓦加斯主义卷土重来，政府必须保持警惕。当务之急就是通过制定综合性的经济计划来解决对经济的悲观预测——民粹主义者们正借此煽风点火。我们要刺激经济增长并改善生活条件，进而堵上这个会被瓦加斯主义利用的漏洞。\n\n除了经济政策之外，处理军事部门和公共服务部门内部的瓦加斯主义同情者也至关重要。我们将通过严格的审查程序、透明行政和问责制度来识别和清除那些瓦加斯主义的信徒们。"
 BRA_guanabaran_deluge: "瓜纳巴拉大洪水"
 BRA_guanabaran_deluge_desc: "里约洪灾造成了毁灭性的影响，让无数人流离失所，这无疑是一场悲剧。但在这场悲剧中，也潜藏着一个机会，一个能为政府赚取声望、提高拉塞尔达支持率的机会。要援助灾民、重建家园，需要投入大量资源，而我们必须主动出手，确保媒体看到并承认政府在其中扮演的关键角色。\n\n洪灾破坏甚重，需要政府大力介入，提供救援、安置灾民、清理废墟、启动重建。我们必须利用这个机会，把拉塞尔达和他政府的正面形象最大化地展示给公众。只要让媒体不断描绘拉塞尔达的领导力，去展现他为灾区民众尽心尽力解决问题的承诺，那么他在民众眼中的形象和政府的威望，都将得到巩固。"
 BRA_automatic_alignment: "自动靠拢"
 BRA_automatic_alignment_desc: "全民盟一直主张与美国进一步靠拢。在美国的上一个轮值主席国任期里，巴西被授予OFN伙伴国地位。巴西与美国经济这个巨无霸的捆绑也是理所当然了。两国相近的地理位置使贸易变得无比简单，美国的市场正在向我们的资源招手呢。拉塞尔达政府将尝试与美国达成附加的贸易协定，并鼓励该国企业的投资。\n\n如果世界想要免于专制独裁之苦，民主大国们就必须携起手来。这种更紧密的联系将成为美洲经济发展的催化剂，向全世界展示自由民主的优越性。"
 BRA_uncover_varguist_crimes: "揭露瓦加斯主义之罪恶"
 BRA_uncover_varguist_crimes_desc: "拉塞尔达对瓦加斯主义之罪恶有着切身的体会：在瓦加斯的统治之下，他的狗腿子批准了对拉塞尔达的暗杀计划。他侥幸免于一死，而别人却没有。可悲的是，这罄竹难书的罪恶却有很大一部分未公之于世。现在，该让一切重见天日了。乌鸦决定动用本届政府的一切力量，把热图利奥·瓦加斯任内的一切不法行为全都调查清楚。资料将被公开，阴影将被揭露，每一个与这些可耻行径有牵连的人都将为他们的行为付出代价。\n\n为瓦加斯主义暴行的受害者们伸张正义至关重要。我们的新委员会向巴西人民发出信号：极权主义已是天理不容。"
 BRA_urbanize_favelas: "贫民窟城市化"
 BRA_urbanize_favelas_desc: "拉塞尔达在1965年选举中险胜，若他想在1970年扩大优势，那便不能局限于获取中产阶层和商人的支持——他们是全民盟的基本盘。顾问们强调，可以争取城市中的贫民。他们许多人挤在连墙接栋的贫民窟中，环境肮脏，而且缺乏公共设施。有必要对当地基建进行投资，带动当地进一步发展。看到政府支持他们，人们自然会心怀感激，用选票回报我们。巴西经济在拉塞尔达领导下蓬勃发展，中产阶级日益壮大，这一切都对我们有利。"
 BRA_new_neighborhoods: "新街区"
 BRA_new_neighborhoods_desc: "贫民窟毒害着巴西的各大城市。它们滋生犯罪，阻碍了当地的发展。当拉塞尔达还是瓜纳巴拉州州长时，他曾推行政策，夷平了各贫民窟并建起新的现代高层公寓楼。现在作为总统，他希望各位州长也能这么做，联邦政府会全力支持他们。虽然城市贫民们会强烈反对，但一个新的中产阶层将取而代之。他们将会刺激巴西经济发展，并为我们赢得新的忠诚。"
 BRA_perons_shadow: "庇隆的阴影"
 BRA_perons_shadow_desc: "不幸的是，事实证明阿根廷是个极不可靠的邻居。庇隆主义的污点始终挥之不去，其短视的民粹主义政策就如瓦加斯主义般给阿根廷经济蒙上了阴影。\n\n起初缓和希望尚存，但即使是弗朗迪西这样的改革主义者也没能结束和我们的冷战，反而鲁莽行事，支持巴拉圭法西斯并企图破坏跨安第斯条约。他们已经无可救药了，我们必须提防他们——保持军队警戒，继续渗透阿根廷及其代理人政权，并且凭借我们更优越的政策打赢经济战。"
 BRA_spring_tunes: "春之曲调"
 BRA_spring_tunes_desc: "拉塞尔达策划了一场改革，为奠定这场改革的基础，他必须出台大量的行政命令。军队、行政机关、腐败与官僚主义将无一幸免。这些变革将提升政府的运作效率，实现国家自由化，并昭告巴西将进入繁荣昌盛的新时代。"
 BRA_enemy_no_1: "头号大敌"
 BRA_enemy_no_1_desc: "前几任政府的无能使得通胀率长期居高不下，让工人们的工资一直在被无形的个税盘剥着。短视的民粹主义政策或许颇有吸引力，但企业因此付出的代价就直接把工资上升带来的利好全都抵消了。为了解决这个问题，拉塞尔达需要推动一系列政策的落实。政府和工会对企业的监管与控制都必须被放松，免得资方把成本全都转嫁给消费者。\n\n通胀的另一个成因是那些耗资巨大的基建项目。这些项目不光是没有任何成果，而且经常挪用其他项目的基金。为了能从过热的经济中抽出些钱来，这些项目也必须被砍掉。最后，最低工资的上涨也要暂停。拉塞尔达确实希望直接把最低工资完全取消掉，但我们先前的尝试引发了相当烈度的反弹，这个计划也就泡汤了。因此，我们还是要保留最低工资，并使其随着通货膨胀率的上升而缩水。"
 BRA_shield_of_the_republic: "共和国之盾"
 BRA_shield_of_the_republic_desc: "巴西政府和军方之间的关系本就不和，而拉塞尔达的胜选使双方撕破脸皮的风险愈发严重了。拉塞尔达相当清楚，没有哪届政府能在他们那暴脾气的朋友不点头的情况下长期执政。要不把这头野兽喂饱的话，它可就要自己出来觅食了。\n\n拉塞尔达咬着牙认了，并给空军和潜艇的研究项目批了更多的资金。只要能和军方保持关系和睦，要多少我们就给多少。"
 BRA_the_freedom_fighter: "自由斗士"
 BRA_the_freedom_fighter_desc: "战争的主战场是陆地，而只有掌握了制空权才能占据上风。但很可惜，我们的空军并不以战机的先进而闻名，有的老爷机甚至还是二次大战后期的老古董呢！要是连保卫我国的领空都做不到，我们又怎么能在南非等地与纳粹的斗争之中真正发挥作用呢？\n\n谢天谢地，我们的美国朋友向我们提供了一笔有趣的交易，购入他们最先进的喷气机型之一：诺斯罗普F-5自由斗士。该机型价格低廉、维护方便、用途广泛、性能出众，是满足我们空军需求的最佳选择。现在，让我们勇敢的飞行员独霸蓝天吧！"
 BRA_brazilian_fire: "巴西火"
 BRA_brazilian_fire_desc: "火一直在人类的发展史中扮演着重要的角色。它既带来了安全，也带来了毁灭。这毕竟是由普罗米修斯赠予的礼物，而他也正是因此承受了奥林匹斯的怒火。现在，拉塞尔达总统将会效仿这位希腊的英雄，把“火”带到巴西。\n\n凝固汽油弹乃是一种由汽油和其他燃料混合而成的胶凝剂，三个超级大国都在广泛使用这种武器。它使轰炸任务变得极其高效，还能带来仅次于原子弹的伤亡和破坏。为了确保巴西的安全和我们对敌人的优势，拉塞尔达总统联系美国，为巴西军队要得凝固汽油弹。"
 BRA_early_warning_systems: "早期预警系统"
 BRA_early_warning_systems_desc: "阿根廷的威胁如阴影般挥之不去。他们正用他们那引以为豪的空军执行着各种破坏行动。他们骚扰乌拉圭，让该国成了他们的傀儡；他们轰炸进入瓜伊拉瀑布的巴拉圭自由战士；还用空军力量在南极洲巩固他们宣称的领土。如果我们和阿根廷交战，他们肯定就会出动飞机对付我们，造成灾难性的后果。\n\n这就是为什么预防是最好的威慑。我们不打仗，但如果我们想打的话，我们也能打。在我们利用自由斗士增强空军力量的同时，我们必须确保阿根廷人无法发动突然袭击。有了预警雷达系统，我们就能在他们发起攻击之前将其发现，并出动我们的战机将其尽数击落。"
 BRA_training_in_panama: "巴拿马训练"
 BRA_training_in_panama_desc: "新式喷气战斗机正在大量列装，确保我们的飞行员能够掌握必须的操作技能和知识已经成了当务之急。幸运的是，美国似乎能帮我们解决这个问题。\n\n美洲学校（简称SOTA）是美国在巴拿马开办的一所学校，专门培训外国的军事人员。我们将派遣我们的飞行员们去和OFN那些最模范、最老练的人一起接受训练，并在那里熟悉OFN飞行员们在全球冲突中运用的各种技战术。"
 BRA_operation_saucer: "飞碟行动"
 BRA_operation_saucer_desc: "在巴西北部地区，接连传出令人不安的目击报告。外星生物、不明飞行物乃至天使现身的传闻，都被视作末日征兆。但最新情报已远超“令人不安”的范畴——轴心国的间谍卫星与气象侦察气球正窥探我国北部关键基础设施，甚至暴露了军事部署。\n\n拉塞尔达已明确表态绝不容忍此类行径。代号“飞碟行动”的军事行动即将展开，对外宣称将核查目击事件以证伪，实则暗藏玄机：这场军事演习的真正目的，是锤炼我军飞行员战力，同时歼灭所有漂浮在领空中的法西斯间谍装置。"
 BRA_enbrarer_investment: "投资航空业"
 BRA_enbrarer_investment_desc: "几天前，我们收到了来自空军科学部门的几份有趣的报告，其中详细介绍了他们在某个代号为IPD-6504的项目上取得的巨大的进展。这个原型机计划相当大胆：让第一架完全由我国制造的飞机飞上天空。作为巴西人民的民意代表，我们有责任支持这一计划，让梦想变为现实。\n\n我们将会引导民间资本向这一项目投资，并鼓励外国专家贡献他们的专业知识。这种善意之举不仅将会极大地促进项目的开发，并且可以为明天播下种子，创立我们自己的战略性国家航空航天工业，开启我国科技发展的新时代。"
 BRA_civil_purposes: "人民福祉"
 BRA_civil_purposes_desc: "我们做到了！正式编号为IPD-6504的先驱者号飞机的首飞取得的圆满成功引起了国内外的广泛兴趣。然而，为了大规模生产该型客机以满足这些需求，我们必须集中精力规划一系列必要的工作。\n\n拉塞尔达总统将签署一系列行政令，基于先驱者号项目组的配套设施和人员建立巴西航空工业公司的雏形。根据总统的指示，巴西航空工业公司将成为一家绝大部分业务面向民间市场的私营企业，好让它远离政府的腐败和低效而只为增进人民的福祉服务。当然，除此之外，它也将拥有与军方合作开展研发工作的完全自主权。"
 BRA_the_national_interest: "国家利益"
 BRA_the_national_interest_desc: "不幸的事实是，我国的独立始终面临着严峻的威胁。正如飞碟行动向我们揭示的，这些威胁来自我国南方的敌人，来自那隐藏在阴影中，意欲颠覆我们的国家、奴役我们的人民的极权毒蛇。国防是生死攸关的大事，必须严肃对待。如果我们想确保未来巴西的安全，国家就必须着重于国防事务。\n\n因此，我们将大力投资航空项目和研发计划并与私人企业开展合作以从零开始建立我国的航空工业。这一举措不仅可以创造大量工作岗位，还可以保护我国的领空不受那些永恒威胁的侵害，并确保我国对南美洲的战略主导地位。"
 BRA_the_super_tucano: "超级巨嘴鸟"
 BRA_the_super_tucano_desc: "在先驱者号令人瞩目的成功展现了其不菲的潜在军事价值后，我们终于可以正式成立我国第一家航空工业公司——巴西航空工业公司来整合我国的国防工业了。这家准国有企业将着重于生产军用飞机。\n\n空军方面有关新战机的申请书已经堆满了我们的办公桌，我们敬业的工程师们也已经开始废寝忘食地研发我国的第一款国产战斗机！EMB-312“巨嘴鸟”是一种低成本轻型战斗机，有着简单但新颖的设计和有效的战斗力，其代号取自一种栖息在我国森林里的著名鸟类。有了它，我们将不再仰赖老旧的螺旋桨战斗机和进口三代机，而是驾驶着我们自己生产的战机保卫巴西的天空。"
 BRA_atomic_taboo: "原子禁忌"
 BRA_atomic_taboo_desc: "A炸弹，核武器，核炸弹——人类有史以来制造出的最强大的武器有许多称呼，但真正有价值的从来只有它的威力。从没有什么爆炸能与核武器相媲美，也没有别的什么兵器能让整个世界如坐针毡。只需一击，一座城市就将从地图上抹去，大军也将粉身碎骨、化为随风飘散的齑粉，如同神罚降临一般。自从安特卫普沦为了一座冒着浓烟的大坑，几大强国就开始了激烈的核军备竞赛，它们周边的国家也开始寻求拥核以保证自身的安全，毕竟无核国家面对拥核国家实在是无计可施。\n\n在这些国家中，我们说的就是阿根廷。\n\n假如阿根廷对我国拥有单方面的核优势，那将是彻头彻尾的噩梦。如果我们不能阻止庇隆主义者和红派开发他们的核武器，那最好的选择就是赶在他们之前造出我们自己的。"
 BRA_contact_kissinger: "接触基辛格"
 BRA_contact_kissinger_desc: "美国的亨利·基辛格是我们多年的老朋友。随着拉塞尔达就职，他也乐见我国的人民正以越来越美国的方式看待世界。他手握我们鞭长莫及的权柄，指挥着我们无从影响的人物，在我们被无视的时候为我们仗义执言。基辛格是拉塞尔达在华盛顿最好的朋友，对于搞政治的人来说，交上朋友实在是难能可贵。\n\n我们需要维持并尽可能地发展与美国的关系，这对我们十分关键。而核计划也同样需要推进，而且得推进得非常、非常深。\n\n如此激进的计划可能会把他的眼镜都吓掉，但我们一定能够说服他，让他相信为了保护巴西和美国在南美的利益，这一计划是必要的。如果我们能争取到基辛格的支持，我们也许就有机会得到美国的支持。"
 BRA_camp_david_talks: "戴维营谈判"
 BRA_camp_david_talks_desc: "拉塞尔达知道，这是必须由他亲自来做的事。提起公文包，带上文件，整理衣冠，登上从巴西利亚飞往华盛顿特区的航班。但这并不是一场国事访问，甚至不是一场公开访问。停机坪上不会有盛大的仪仗队，也不会有总统亲自来迎接。相反，他将立刻前往戴维营，开始一系列内容令人担忧的秘密谈判。\n\n巴西公开宣布要开展核计划的消息就像一枚核弹一样砸进了五角大楼。那些懦弱且无知的小人无法理解我们的担忧和关切，他们施展浑身解数试图阻挠我们的计划，乞求美国总统赶在我们开始前阻止我们。确实，如果美国人禁止我们进行研究，那么我们希望开展的任何项目都永远不可能实现，这几乎就是在向伤害我们的老美卑躬屈膝。正因如此，我们必须阻止这种情况发生。\n\n所以，拉塞尔达要亲自前往戴维营——从而保证在这场关键的谈判中，巴西的命运将掌握在巴西人手中。"
 BRA_camp_david_talks_tooltip: "§K巴西§!和§m美国§!将就§K巴西§!的§O核利用问题§!展开磋商-§m美国§!将选定主持谈判的人选。"
 BRA_silent_assassin: "无声猎手"
 BRA_silent_assassin_desc: "两次世界大战带来了诸多变革，而受此影响最深的莫过于海军。曾经的大炮巨舰被航空母舰彻底淘汰，而绕道运输也在神出鬼没的潜艇面前沦为空谈。战舰一字排开互相对射的场景已成过去，当今的海战更多是舰载机对舰队，潜艇对运输船的高效猎杀。\n\n在拉塞尔达看来，以巴西海军的体量，装备航母实属好高骛远。相比之下，尽管我们无法像美国那样毫不顾忌地配备核武，但将潜艇作为制霸南美海域的主力仍是上策。正好堪培拉有消息称，澳大利亚一艘四十年代的老潜艇正在出售，急需一位买家让它重获新生。"
 BRA_silent_assassin_tt: "我们将部署6艘§m美国§!的§Y猫鲨级潜艇§!"
 BRA_modern_tank: "现代坦克"
 BRA_modern_tank_desc: "虽然巴西陆军拥有充裕的经费和强大的政治影响力，但论武器装备还是比不上海军和空军。我们的士兵装备的几乎都是超级大国的二手货和老古董，如谢尔曼坦克、加兰德步枪和二战时期的卡车之类。是时候做出改变了。\n\n世界上少有能与美国陆军匹敌的武装力量，他们拥有庞大的武器装备库存。尽管这些装备也不是最先进的，但对于落后了几十年的我军来说也是极大的助力。基于两国之间的良好关系，他们自然会愿意提供更加先进的坦克设计以帮助我国抗衡区域内的竞争对手，无论是谁。"
 BRA_bargain_completed: "合作成交"
 BRA_bargain_completed_desc: "有人说，“枪杆子里出政权”，对巴西而言，这句话再正确不过了。巴西军方始终是潜藏在巴西政坛背后的一股强大力量，时刻沉默地关注着那些他们认为会威胁到巴西——确切来说，主要是他们自己的举措，并在他们感到威胁迫在眉睫的时候重拳出击，恢复秩序。洛特希望能够改变这一切，他希望去政治化的巴西军队将忠于国家而不是忠于将军。拉塞尔达正是利用了这种错位。\n\n然而，军队对拉塞尔达掌权的支持并不是双方合作的全部。他们希望获得军费、武器和钞票。现在我们已经掌握了权力，手头上有的是可用的资源，拉塞尔达自然不会蠢到尝试挑战刚刚在他的支持下实力大大增强的军方。今后要如何避免军方独走下克上可能会是个大问题，但这个问题可以以后再深究——至少现在，军队和国家能够和睦相处。只要支票还在流动，这种合作关系就能继续下去。"
 BRA_streamline_civil_service: "降本增效"
 BRA_streamline_civil_service_desc: "巴西的官僚机构就像一个漏水的竹篮子，有时候经费就像掉进了黑洞一样消失无踪，许多项目的成效也一塌糊涂。拉塞尔达制定了一系列计划来解决这些问题。他的改革要大刀阔斧地削减臃肿的官僚体系和阻碍效率的限制措施。一些政府项目将被私有化，另一些私营部门则将交由政府管理。巴西人民必须明白，他们的税金将会被用到切实有用的地方，这些改革将会确保这一点。"
 BRA_Establish_ENAP: "建立ENAP"
 BRA_Establish_ENAP_desc: "在我们扫清了政府中绝大部分的腐败后，接下来的重要工作就是重组政府机关了。然而，缺乏专业称职官员的问题依然是我们国家的隐患。我们需要一大批合格的中高级公务员来解决这一管理上的难题。\n\n所以，我们将建立国家公共行政管理学校、培训巴西最聪明的头脑来解决这一难题。为学生提供最好的行政管理教育并将毕业生分配到全国各州将为我国的行政效率带来改观。"
 BRA_Regionalize_Administration: "行政分区化"
 BRA_Regionalize_Administration_desc: "巴西利亚深处内陆，与绝大部分巴西人民相隔甚远。然而，这座城市中的官员却掌握了决定整个国家命运的权力。由此产生的是一套何等经典的低效、腐败的集权官僚体系。这种疏离带来了低效、滋生了国内的发展不均、养肥了一只无视它表面上服务的人民的多样文化、诉求与梦想的官僚野兽。\n\n随着拉塞尔达掌握了权力，巴西将迎来一场轰轰烈烈的地方分权化改革。传统上属于中央政府的职能将被下放到州与地方政府。联邦政府也将迁出舒适的首都，因为总统要求将联邦政府的各部门重新安排到更接近他们服务的人民的地方。"
 BRA_anti_corruption_crusade: "反腐风暴"
 BRA_anti_corruption_crusade_desc: "卡洛斯·拉塞尔达当上瓜纳巴拉州长后，他就开除了自己的母亲。政治容不得家庭私情从中作梗。没有比那些富有的无能之辈打着“选贤举能”的幌子攫取权力和特权更让他作呕的事了。简单来说，他们践踏了民主。他们妨碍了那些真正有才有德的人才挣得他们应得的地位。\n\n在这场反腐风暴中，他将粉碎那些靠着血缘关系盘根错节的世家大族。他将推行一系列政策以增进政府透明化，包括强制性财务公开、强化现存反腐机关和证人保护措施。裙带主义必须被粉碎，新总统会不惜一切代价将之连根拔起。"
 BRA_competency_tests: "能力测试"
 BRA_competency_tests_desc: "在巴西，普通人该如何成为一名官僚？老实说，现如今进入这一重要职位的门槛低得令人发指。不过随着拉塞尔达成功当选总统，一场剧烈的改革即将展开。\n\n政府将会对官僚进行审计与能力测试，并且考察他们对目前行政管理的总体概念，以确保所有政府人员都具备相应的技术、行政和法律知识。对于官僚的选择，我们不应该满足于平均水平，而是要做到万里挑一。"
 BRA_Professionalize_Politics: "政治专业化"
 BRA_Professionalize_Politics_desc: "政治在巴西人眼里基本就是个笑话，是个用来让人飞黄腾达或者名声大噪的地方。无论这种看法是否正确，都和总统心目中巴西的政治理应运作的方式完全不同。\n\n为了实现“政治专业化”，拉塞尔达总统将设立背景调查机制以审查竞选议员的政客，并开展更多的公开讨论以增进广大群众对政治的兴趣，如媒体访谈节目等。希望这些举措足以带来巴西政治的变革。"
 BRA_lacerda_Meritocratic_Government: "优绩制政府"
 BRA_lacerda_Meritocratic_Government_desc: "随着行政改革的推进，巴西将史无前例地拥有一个真正唯才是举的政府。专业素养和品德将取代裙带关系和个人背景，成为官员进入国家机关工作的必要条件。腐败将被根除，广大人民也将以更严肃的态度参与到政治活动中来。拉塞尔达政府已经取得了重大的胜利，尽管现在还不是可以躺在功劳簿上睡大觉的时候。\n\n如果我们不想让巴西倒退回过去的老样子，就应该确保当前的良好局面能够尽可能地延续下去。定期审计和反腐措施将确保官僚们在自己的岗位上兢兢业业的工作，并确保我们的努力得以成功。"
 BRA_equalize_education: "弗雷雷的构想"
 BRA_equalize_education_desc: "教育大业对巴西至关重要。随着人口爆炸，巴西人均受教育水平亟待提高，以推动经济繁荣。然而全民盟对教育部长的人选产生了分歧：拉塞尔达本想指派备受信任的弗莱沙·里贝罗，他们长期以来共同领导教育部推动扫盲。但应党内其他人要求，拉塞尔达最终任命了吉尔贝托·弗雷雷。\n\n作为葡萄牙热带主义的创始人，弗雷雷久负盛名而博学多闻，他将合理安排，支持数学、科学以及人文学科在巴西的蓬勃发展，并培养出一大批受过良好教育的技术型人才。为了让他与乌鸦能相互配合，弗莱沙也会担任教育部特别顾问帮拉塞尔达监督教育部。"
 BRA_national_literacy_campaign: "国家扫盲运动"
 BRA_national_literacy_campaign_desc: "尽管这几年来经济腾飞，文盲问题依旧严重，尤其在农村地区。谁都应该知道不能再这样了，政府必须适当干预，这样才能扫盲并提高人民素质。拉塞尔达总统已下令在全国开展扫盲运动，旨在于1970年前使全国识字率达到90%。"
 BRA_cooperate_church: "同教会合作"
 BRA_cooperate_church_desc: "天主教会支撑着巴西教育，教会学校在我们的教育系统中举足轻重。尽管巴西与教会间曾有诸多不快，为了庞大的教育改革事业，拉塞尔达总统还是选择与他们共事。政府会为教会学校提供资助，而作为回报教会将与政府合作。这可能会激怒巴西社会中的某些非保守派，但为了总统的教育改革大业我们必须确保同教会的合作关系。"
 BRA_maintain_equality: "维护教育公平"
 BRA_maintain_equality_desc: "巴西幅员辽阔，要保证国内每所学校都达到相同的教学质量标准在现行体制下毫无可能。如今教育为私企所鱼肉，有些学校欣欣向荣，那些缺乏资金的学校却举步维艰。若不改变现状，国家的未来将再次离整整一代巴西人而去。政府必须对教育负责，这样我们才能采取措施摆脱惨淡的现状。"
 BRA_oligatory_lessons: "实施义务教育"
 BRA_oligatory_lessons_desc: "孩子们在本应学习时辛劳街头，家长们则在教堂前大排长龙，请识字的牧师帮自己填表。所谓义务教育不过一纸空言。\n\n然而，我们听闻有个人宣称自己仅用四十五天就教会了三百个农民读写。尽管这位保罗·弗莱雷据调查有点左翼倾向，他的成就依然不可否认。\n\n他建议我们提供免费餐饮以助孩子们上学，抑或制定更灵活的时间表以便家长和孩子，也可以试试他开设的成人革命性扫盲课程。"
 BRA_education_education_war: "教育战争"
 BRA_education_education_war_desc: "是瓦加斯改变了这个国家，每个孩子都一清二楚，教材上却仍含糊不清。巴西儿女们急需一个教纲，一个能够基于国家价值观反映他们自身及其时代的现代教纲。\n\n今日我们就要对陈腐的教育体系开战！首先得规范教育体系，统一学习内容。学生们将认识到他们的美丽祖国为何：葡萄牙热带主义的热土、欧非移民与原住民的独特结合、屹立热带的现代自由堡垒。不过变革须与人民同在，我们只会强调瓦加斯政权威权主义的危害，至少是现在，尽管我们更希望将其定性为准法西斯体制。"
 BRA_lacerda_education_edu_war_tooltip: "在§K巴西§!，每一个孩童在离开学校时都会了解其祖国的独特。第一个由§n葡萄牙殖民者§!、§U非洲奴隶§!以及§f原住民§!所构成的现代热带文明，并学会以§G客观的态度看待§!§K新国家§!。"
 BRA_expand_universities: "兴办大学教育"
 BRA_expand_universities_desc: "拉塞尔达政府接手了我国教育系统中的不少烂摊子，但其中最为紧迫的问题在于高等教育。我国迅速发展的工业需要大量专业的青年劳动力以确保其竞争力，然而绝大部分最需要这种人的单位依然招不到足够的高素质人才。弗雷雷已经提出了解决大学不足问题的三项可能方案。我们可以致力于扩大大学规模，建立能为我国培养更多高级工业人才的理工学院，或者大幅提升奖学金，借此促进社会流动。\n\n反对派正在鬼哭狼嚎地抱怨着管理不善，我们手头可没有那么多可供挥霍的资源。我们必须做出最明智的选择。"
 BRA_stop_funding_UNE: "停止资助学生联盟"
 BRA_stop_funding_UNE_desc: "UNE，即全国学生联盟，自其于1937年成立以来就是巴西最大的学生组织。尽管并非政治组织，但该组织曾长期受巴西工党的资助，这导致了其强烈的瓦加斯主义倾向。\n\n政府决不希望看到一个如此庞大的学生组织与我们的事业为敌，因此我们将成立一个与之对立的学生组织，希望这不会加剧和UNE的摩擦。"
 BRA_banish_ignorance: "消灭无知"
 BRA_banish_ignorance_desc: "按照计划，我们在全国范围内逐步提高了教育水准，而成果十分喜人：绝大多数儿童得以走入学校，学习依巴西国情精心设计的课程；成人识字率直线上升，文盲在社会上几乎绝迹。虽然要做的工作还有很多，但可以肯定，转折点已经来到，我们正稳步迈向最终的繁荣。巴西的美好未来近在眼前。"
 BRA_universalize_healthcare: "扩展医疗保健"
 BRA_universalize_healthcare_desc: "就如任何名副其实的民主国家一样，巴西寻求建立一个人人平等的社会。然而，就巴西医疗保障的现状而言，有些人显然比其他人更“平等”：相比有着坚实的医疗保障网的发达南方，北方只能采用价格高昂且乏善可陈的地方医保。拉塞尔达总统要让医疗保障覆盖巴西每处穷乡僻壤，以纠正这极大的不公。"
 BRA_universal_vaccination: "普及疫苗接种"
 BRA_universal_vaccination_desc: "巴西若想成为一个现代国家，就必须保障其人民安居乐业，不必担心死于可预防的疾病。比如天花，其危害在全球富裕地区或许正在减轻，但在巴西，其对于那些负担不起疫苗的人群仍是极大的威胁。为了减少本可避免的死亡，我们必须向人群普及疫苗。直到全国死亡率下跌了，我们才能说巴西正走向现代化。而在那之前呢？任重道远，还有很多疫苗等着接种呢！"
 BRA_dreaming_clean_water: "洁净水之梦"
 BRA_dreaming_clean_water_desc: "可叹，巴西疾病的一大来源正是我们自己的疏忽。数年来，我们任由全国各地的水域被污染，连巴西人民的饮用水源也未能幸免。若巴西人民的饮用水卫生能得到保证，污染导致的霍乱、痢疾等疾病的扩散，都能够轻易预防。而拉塞尔达总统正欲如此。饮用水安全标准将会依法提高，老化的基建也会得到扩建翻新，将饮用水送抵巴西的千家万户。"
 BRA_reduce_infant_mortality: "降低婴儿死亡率"
 BRA_reduce_infant_mortality_desc: "在巴西，每天都有成千上万的无名惨剧上演。婴儿早夭是每位母亲的梦魇，而巴西的婴儿死亡率向我们描绘了我国贫困家庭都经历了何等惊人而又可悲的苦难。解决这一问题绝非易事，尽管医保推广能一定程度上降低这可怕的数据，我们还必须借鉴世界各地的成功案例，让巴西家庭免于悲剧。美国、瑞典等国早已将婴儿存活率保持到了理想水平，我们为什么不向他们求助呢？"
 BRA_rural_health_clinics: "乡村健康诊所"
 BRA_rural_health_clinics_desc: "在巴西南部的大城市中，贫富贵贱都能病有所医。医护人员随时待命，准备处理紧急情况。然而乡村的情况却截然不同。许多社区甚至连最基本的医疗设施都没有，缺乏医疗专业知识的当地人只得自力更生。为了结束这落后的状况，总统计划由政府出资，在最有需要的农村地区兴建诊所。"
 BRA_mosquito_campaign: "灭蚊运动"
 BRA_mosquito_campaign_desc: "蚊虫嗡嗡，带来了发展中国家挥之不去的梦魇——疟疾。每年它都会夺去成千上万的巴西人的性命，尤其是在北方紧挨雨林的农村。对此，拉塞尔达总统已经忍无可忍。为了保护人民免受这些恼人的小虫子的致命叮咬，是时候与之一决雌雄了！如果虫网阻挡不了蚊子的步伐，大量使用杀虫剂肯定能杜绝疟疾的传播。"
 BRA_increase_medic_wages: "提高医疗薪资"
 BRA_increase_medic_wages_desc: "移民正是我们医保体系最头疼的问题之一。每年我们大量毕业的医疗人才都迁往了美国这样的国家以求劳有所获，这导致了我们严重的医务人员短缺。这个问题不解决医保改革便无从谈起。\n\n所幸，解决之道也相当简单。我们可以提高医生等高级医护人员的薪资，从源头上阻断人才流失，恢复我们失去的部分知识。"
 BRA_rely_on_market: "交给市场吧"
 BRA_rely_on_market_desc: "拉塞尔达长期呼求着市场自由化，社会福利方面也不例外。众所周知市场能推动医疗保健业发展，这方面我们长期过度依赖政府，却又徒劳地尝试削减支出，而市场化将是一个远为低廉的选择。毕竟医保私有化在美国很成功，在巴西又何尝不可？"
 BRA_government_intervention: "政府也要管"
 BRA_government_intervention_desc: "为了医疗机构的存续，国家必须在医疗方面保持强硬，尽管这并不遂拉塞尔达之意。但他也不会出于个人喜好去拿数百万巴西人的生命冒险，作为自由市场拥趸的他也理解这一必要选择。如果有党员抱怨就随他们去吧，拉塞尔达活在当下，比起意识形态狂热，他会选择理性。"
 BRA_lacerda_healthcare_reform_req_tt: "拉塞尔达对于§K医保改革§!的愿景业已实现。"
 BRA_kill_first_horseman: "击垮瘟疫骑士"
 BRA_kill_first_horseman_desc: "巴西政府必须保护国民对抗天启四骑士的诅咒。在当今世界，瘟疫、饥荒、战争和死亡随时会降临在毫无准备的人身上，任何疏忽都可能招致灾难，我们必须时刻警惕。\n\n如今，全民盟与拉塞尔达对瘟疫骑士打出了致命一击，粉碎了他在巴西的邪恶势力。今后无论如何，我国抵御疾病的能力都大大增强了。"
 BRA_lacerda_agriculture_SDA: "成立农业保护部"
 BRA_lacerda_agriculture_SDA_desc: "巴西乡村如履危崖，亟需我们出手拯救。农民社团、阿马佐纳斯主义游击队、牧场主的民兵和无数的小型武装在其中争斗不休，许多不稳定因素更是由来已久，比如自十六世纪葡萄牙殖民时代延续至今的大庄园体系。为此拉塞尔达将设立农业保护部，即SDA，以保证我们农业政策未来的成功。\n\n这将是一个监督系统，而不是一个只会玩弄作物种植数据的部门。他们的职权涵盖所有的农业政务，包括监察、任命官员、罢免其中的腐败者，并努力为伤痕累累的乡村带来和平。拉塞尔达希望能以此扫除农业领域的大量腐败现象，减少乡村地区暴力的盛行并促进经济发展。"
 BRA_lacerda_rural_credit: "农村信贷系统"
 BRA_lacerda_rural_credit_desc: "务农基本无利可图。许多农民只是守着一亩三分地自食其力。而那些想要有所作为的农民却苦于银行不愿投资贷款。因为小农既缺乏投资担保又没什么回报，银行选择投资大地主和巨企。\n\n是时候行动起来改变现状了。我们将建立一个专门的新信贷系统为小农提供投资，以及农业机械、化肥和农药供购买。作为回报，政府会从他们的年收入中抽取红利，直至贷款还清。这将在全国推广农业机械化，并把绿色革命带到每处农场！"
 BRA_lacerda_fertilise_cerrado: "滋养塞拉多"
 BRA_lacerda_fertilise_cerrado_desc: "凤头距翅麦鸡低沉的叫声在广袤起伏的稀树草原上回荡，鹰隼与秃鹫翱翔于低矮扭曲的树木与仙人掌之上。这里是塞拉多，巴西的心脏。数个世纪以来这里从未被驯服，酸性而贫瘠的土壤也无法耕作。\n\n但如果我们能改变现状呢？研究人员反复实验了三种化合物以期改良土壤：农用石灰、硼砂和PNX肥料。我们将会在此地扩展北部部分农场并观察成效。\n\n记住，这片土地占巴西国土面积四分之一！自然保护区？国家公园？我们将坐拥一个三倍乌克兰大小的美洲新粮仓！这将是农业革命的开端！"
 BRA_lacerda_buffer_stock: "战略农业储备"
 BRA_lacerda_buffer_stock_desc: "不幸的是，巴西的粮食状况向来难以预料。大旱会严重损害巴西的粮食供给，粮价也一天一个样。在如此不确定的环境下，我们往往要做好最坏的打算。总统已批准在全国建立新的粮食储备设施，以保证我们的民众最糟情况下的粮食供应。"
 BRA_lacerda_agri_bastion_against_radicalism: "对抗激进主义的堡垒"
 BRA_lacerda_agri_bastion_against_radicalism_desc: "土地改革仍是巴西热点：民众对现状的不满与日俱增，诉求着土地改革，执政同盟的部分成员也注意到这想法愈发易于接受。然而这群空想家没意识到，广泛的土地改革政治上是不可能的。采取这般激进的措施无异于背叛了为我们带来胜选的中产阶级。我们将取缔任何越界的激进措施，并尽可能遏制土地大亨们的恶劣暴行。"
 BRA_lacerda_conservative_land_reform: "保守土地改革"
 BRA_lacerda_conservative_land_reform_desc: "并不是只有激进的社会主义者才理解土地改革的必要。目前确实有大片土地蕴含的经济潜力亟待开发。为此拉塞尔达将批准一些小规模土地转让，以提高土地利用率并确保用地公平。借此机会，拉塞尔达还将合法化农民社团以吸引农业领域投资，并允许小农间的合作协调，以提高综合产出。"
 BRA_lacerda_inter_brazil_cooperation: "国内合作"
 BRA_lacerda_inter_brazil_cooperation_desc: "得益于我们对内部潜力的深度挖掘，巴西这样一个大国如今走到了世界舞台的中央，正欲大展身手。然而，要想让全国上下为国家利益拧成一股绳，尚有许多工作要做。例如，我们的农村地区的发展速度极不统一，而为解决此事，总统已经批准新的法律，让各个地区在公平的竞争环境中合作推动农业发展，同时使用现代肥料和农业设备。世人将看到，团结的巴西人无人可挡！"
 BRA_obliterate_lotts_folly: "终结洛特的愚行"
 BRA_obliterate_lotts_folly_desc: "不同人眼中的跨亚马孙公路有着不同的意义。在那些规划了这一项目的空想家眼中，它将穿越千里雨林，贯通东西，成为巴西乃至南美洲的交通大动脉。但在现实主义者和清醒的人眼中，它已经被无孔不入的腐败、恶劣的自然环境和政治生态扭曲成了臃肿的愚行。在这些因素的干扰和破坏下还想着继续推进这一项目实在是愚不可及。\n\n不像他的前任，卡洛斯·拉塞尔达已经准备好做出这项艰难的决定。他要中止亚马孙公路的建设计划，其支线要么被封死，要么和其他道路相连，项目将被遗弃在为了建设它而推平的雨林中。由此省下来的费用将用在更能造福巴西的关键方向上。"
 BRA_new_tools_greatest_manager: "新工具配大管理家"
 BRA_new_tools_greatest_manager_desc: "经济是一头难以捉摸的野兽，任何试图成功驾驭它的人得花上一辈子的时间。当然，拉塞尔达总统日理万机，所以这项重任就落到了他的经济部长埃利奥·贝尔特朗身上，由他来执行总统的意志。然而，繁杂的规章、限制和法律严重妨碍了他的工作。虽然这些规章是自由主义者们在多年前出于善意制定的，但现在它们只是我们施政的阻碍而已。\n\n拉塞尔达要剪断这些束缚，让他的人在他的要求下高效且有力的掌控经济管理工作。过去我们偏离了正道，事实证明，只有最卓越、最激进的手段才能领导一个日新月异的国家。"
 BRA_no_mercy: "绝无怜悯"
 BRA_no_mercy_desc: "近来，“财政紧缩”已经成了大呼小叫的自由派和左派嘴里挂着的流行词，他们宣称这是对巴西人民的伤害。然而正是他们从被滥用的数以亿计的资金中窃取了巨额财富。正是他们让我们的政府变得如此臃肿，让我们把大笔资金浪费在无用的项目上，不断积累债务以至于陷入财政危机。埃利奥·贝尔特朗知道如何解决这延宕已久的难题，但我们的解决方案并不是逃避这个词——而是拥抱它。\n\n为什么不呢？我们将会执行财政紧缩政策。怎么，你不服气？左派宁可我们的国家摔下财政崩溃的深渊吗？他们就那么想让这个国家的穷人全靠吃政府补贴和福利吊着一口气，却从来不踏踏实实地用自己的双手创造任何东西？我们就是要给这帮人泼一盆冷水。他们现在或许会抱怨，但在他们享受到一个富有活力、生机勃勃的巴西带来的种种好处之后，他们会感激我们的。"
 BRA_tavora_receipts: "塔沃拉的税条"
 BRA_tavora_receipts_desc: "为了让巴西的负债率回落到可接受水平，一段时间的财政紧缩是必须的。对一些人来说，这一过程会很痛苦，但对国家而言是绝对必要的。党内在其必要性这一问题上达成了共识，但在紧缩政策的规模和持续时间上又产生了分歧。塔沃拉副总统和务实派的其他成员希望紧缩政策的力度更温和、时间更短，并用税收改革取代更多的支出削减措施。拉塞尔达如今陷入了两难境地，因为他新任命的财政部长贝尔特朗希望执行全盘的紧缩计划。\n\n最终，拉塞尔达还是决定支持塔沃拉，他不能无视务实派的强大影响力。他们的观点是正确的，原本激进的经济改革方案很可能造成严重的副作用。当年戈梅斯总统试图废除最低工资的时候，全民盟就败在了瓦加斯主义联盟手下，令我们的心血功亏一篑。我们不会重蹈覆辙，贸然执行一份社会上广泛反对的激进紧缩计划。"
 BRA_increase_coffee_tax: "提高咖啡税"
 BRA_increase_coffee_tax_desc: "咖啡之于巴西，地位正如桑巴与狂欢节，此为海内外数百万人日常不可或缺的饮品。若失了它，难道我们的办公室还会同往日一样热闹，工人们还会同往常一样不辞劳苦？看看这些豆子，经销商借此日进斗金，不失为一剂需求无止境的良药。唯一憾事则是政府尚未参与其中。\n\n通常而言，拉塞尔达和他的保守派同僚们并不赞成增税，此举毕竟同他们的意识形态相悖。不过，有些时候机不可失，时不再来。如果我们将咖啡税提高数个百分点，不论国内贸易抑或出口，增加的收入均可以数百万计。或许不少人会心存芥蒂，确实情有可原，但我们还能说什么呢？经济繁荣，政府获利，于拉塞尔达本人更是如此。"
 BRA_increase_interest_rates: "升高利率"
 BRA_increase_interest_rates_desc: "是时候下险棋了。巴西正在往地狱里冲，只有强硬的中央银行和迅速、果断的政策可以挽救她的经济不至于完全崩溃。我们可以通过提高利率大幅降低通胀。但同样的，如果贝尔特朗决定执行这一不受欢迎的政策，也会带来许多风险。如果我们无法维持对利率的控制，我们的中产阶级支持者很可能与我们反目，导致我们输掉选举，而我们的政府也会就此沦为巴西历史上最脆弱的政府之一。"
 BRA_national_lottery: "国家彩票"
 BRA_national_lottery_desc: "政府需要更多的资金以成功落实我们的改革。政策制定者们已经起草了一份国家彩票项目，好让公民通过为政府提供资金换取赢得高额奖金回报的机会。尽管这项非传统政策对某些人来说可能太过极端了，但额外的收入总是多多益善——无论它从哪里来。"
 BRA_death_and_taxs: "死亡与税收"
 BRA_death_and_taxs_desc: "塔沃拉提出了一项出色的提议：简化税法并改革税务部门以扩大政府的财政收入。财政部门的无能始终是个困扰我们的大问题，因此，为了恢复政府对财政收入的掌控力，税务简化是至关重要的举措。而且我们也正迫切需要扩大现金流收入以满足改革计划的需要。\n\n我们将通过修订法律和抽检机制以保证落实有关规定，同时废除一系列免税政策以改革、简化税收系统。除此之外，我们还将修订外国投资和企业的税收标准以让巴西成为更受欢迎的投资目的地。\n\n我们的经济部长贝尔特朗也同意这些政策，他表示我们有足够的政治资本推进这一举措。这正是将全民盟和我们的基本盘的不同派系团结起来的共同原则。"
 BRA_centralize_banking: "独立央行"
 BRA_centralize_banking_desc: "一个没有中央银行的国家怎么能被称之为“发达国家”？对于制定高效的宏观经济政策与吸引国际间投资者的注意，中央银行的作用不言而喻。拉塞尔达计划去纠正这一巴西体制内的痼疾，建立中央银行，加强金融管理，并使得巴西货币具有较强的竞争力。\n\n新建中央银行的核心原则便是独立于政府的管控。若假以时日巴西政府再次受到民粹主义的操控，我们的货币政策必须免受其影响。一家独立的中央银行将避免目光短浅的民粹主义者在短时间内设定低利率以吸引选民为其投票，而造成在长期内不可持续的通货膨胀。使巴西央行从政府中独立，将是解决巴西长期通货膨胀问题的又一大步。"
 BRA_strengthen_coffee_trade: "扩大咖啡贸易"
 BRA_strengthen_coffee_trade_desc: "咖啡贸易是巴西经济中的重要一环，咖啡也是我们出口量最多的产品，这一状况在拉塞尔达总统的故地圣保罗更是如此。在新国家终结咖啡牛奶体制之前，咖啡产业主导了圣保罗的政治形式。即便今日，咖啡行业背后的水仍深不可测，而且与针对特定种植者的各种配额和制定的价格交织在一起。保持行业的稳定对于巴西经济至关重要—我们需要尽可能保持其高价格以增加收入。"
 BRA_free_people_free_trade: "自由人民，自由贸易"
 BRA_free_people_free_trade_desc: "保护主义与封闭经济限制了巴西经济发展的潜力。拉塞尔达决定改变这一现状，使巴西融入世界贸易的体系。他将取消与友好民主国家之间的大部分关税，促使经济一体化。这将进一步扩大民主世界国家之间的规模经济，并使我们能够对占领欧洲和东亚的专制政权建立经济主导地位。\n\n巴西消费者将获得更多在美国市场内消费的机会。与此同时，我们的出口部门也能接触到更多的国际客户，为巴西工人创造更多的就业岗位。这项新经济政策将确保整个民主世界更加繁荣与自由，前提是其他国家也享受自由贸易所带来的便利。"
 BRA_guanabara_dreaming: "瓜纳巴拉之梦"
 BRA_guanabara_dreaming_desc: "作为我们经济计划的重要组成部分，瓜纳巴拉需要数百万美元的投资。这首先会将消弭新年洪水带来的创伤，其次这会让里约成为巴西经济增长的引擎、丰饶的聚宝盆。但就像巴西其他地方一样，里约如今与世界脱轨。官僚主义、腐败、政治斗争，所有这些内部因素都将投资推给了国际竞争对手。\n\n而如今资金滚滚而来，是时候重启我们雄心勃勃的基建计划了。上百个项目将会让里约成为巴西最伟大的城市。"
 BRA_atomic_light: "原子光辉"
 BRA_atomic_light_desc: "众所周知，照明可谓是现代社会的基本需求，同样可称为工业化水平的重要体现，供电系统即为基础设施的重中之重。倘若电力供应短缺，梦之城也难抵黯然失色的结局。不过，事务芜杂繁多，政府日不暇给，相关建设依旧停滞不前。\n\n今时则不同往日。既然我们着眼经济，何不趁热打铁，签订大型工程合同。我们计划落成一座新核电站，其供电范围涵盖全国。此外，该项目的最大利好便是购入铀原料之时，可同美方及其公司进行大宗贸易。如此完美的交易自然是面面俱到，美国、巴西人民，当然还有我们劳苦功高的总统，都将受益颇多。"
 BRA_sugarloaf_racing: "鲁本斯·瓦斯大桥"
 BRA_sugarloaf_racing_desc: "纵使时光荏苒，拉塞尔达仍未能忘却那日的景象，忘却那位在他怀中颤抖、血流如注的战士。他们竭尽所能地驶向医院，夜幕之下，街灯点亮了他孩童般的双眼，须臾之间，却又黯然失色。\n\n医院与会场近在咫尺，仅有数分钟车程之远，可十数年过去了，拉塞尔达却仍未能走出那一天。现如今，他孑然屹立于糖面包山之巅，极目远眺，俯瞰着瓜纳巴拉湾的璀璨波光，心中勾勒出一道宏伟的曲线。\n\n这将是一座以钢铁与混凝土铸就的巨型构筑物，跨越宽阔的河道，将里约热内卢的现在与尼泰罗伊的未来紧密相连。至于它的名字，拉塞尔达心中早有答案。唯有一人之名，值得永远镌刻在这片天际线上。"
 BRA_no_room_homelessness: "不许流浪"
 BRA_no_room_homelessness_desc: "巴西诸城深受流浪人员之害。上述群体携犯罪、贫困、毒品与疾病而来，本应繁荣的街区因此沦为贫民窟，一幅破败萧条光景。案件频发，致使企业倒闭，中产阶级迁出，地下势力滋长横行。该结束这一切了。\n\n拉塞尔达任瓜纳巴拉州长期间，主要政策之一即是解决瓜纳巴拉州的流浪人员泛滥问题。若不是部分动辄开枪、以权谋私的警官不知分寸，他那政策本该顺利推行。前事不忘，后事之师。当下，拉塞尔达同各州长及市长合作，施行打击流民的政策，摧毁大型宿营地，建设反流浪基础设施，并支持建设公寓安置上述群体。唯有如此，才能一劳永逸地终结这类道德失范现象。"
 BRA_doxadis_industrial_zone: "佐克西亚季斯工业区"
 BRA_doxadis_industrial_zone_desc: "众人皆知，里约热内卢是一座以酒店、餐馆与琳琅满目的纪念品商店而闻名的城市。科帕卡巴纳海滩、糖面包山与救世基督像赢得了全世界观光客的青睐。但在工业领域，相较于圣保罗的汽车工厂与贝洛奥里藏特的炼钢高炉，里约热内卢则未曾拥有什么过人之处。\n\n然而，变革的机遇已悄然临近。一伙来自希腊的城市规划师决意将他们新颖的理念——“人类聚居学”带至此地。自1964年起，他们便与拉塞尔达州长维持着密切沟通，并对这片土地进行了细致地考察。现如今，他们将一沓沓改革建议送上了州长的办公桌，旨在将瓜纳巴拉改造成金光熠熠的大都会，展露其应有的光辉。"
 BRA_spare_no_expense: "不惜代价"
 BRA_spare_no_expense_desc: "有些人说，改造瓜纳巴拉、焕发其生机的计划实在得不偿失。有些人说，巴西各地的城市更新项目不应以经济下行为代价。还有人说，国家注重中产阶级社区基础设施的质量即可，贫困人口使用廉价混凝土足矣。针对上述观点，拉塞尔达予以驳斥。\n\n若在此敷衍了事，只会重蹈覆辙。任由城市遍布贫民窟，代价几何，瓜纳巴拉暴雨已有明证：由于基础设施老化失修，共计三百余人死亡，数千人受伤与无家可归。相较于当下尽力而为，从长远看，偷工减料只会因小失大、阻遏发展。正因如此，我们必须不惜代价，用真金白银铺就前路。"
 BRA_football_suggestion: "球员之见"
 BRA_football_suggestion_desc: "拉斐尔·马加良斯挺着胸，夹着一文件夹的写满批注的报告和信件走进了拉塞尔达的办公室。他礼貌但直率地表示，这些建设项目都太过昂贵了。如果他不做出适当的成本调整，巴西的债务问题很快就会失控。\n\n总统的办公室桌上不久就堆满了投资回报率计算表和各种替代方案。马加良斯将一张张表格放在了拉塞尔达面前，提出了不同的主张，好让瓜纳巴拉和里约不会为了未来背上沉重的债务。诚然，许多细枝末节的开支都会被砍掉，但这些项目的主体依然能够完工并产生回报。也许拉塞尔达已经在财政学上做得太过火了。如果他想要实现这些计划，那他最好保证自己付得起这个钱。"
 BRA_south_atlantic_free_port: "南大西洋的自由港"
 BRA_south_atlantic_free_port_desc: "除了调整财政政策，吸引外资亦是提振经济的关键手段。倘若政府能为瓜纳巴拉州内的所有企业赋予税收减免政策，尤其是对商业税的大幅度调整，便有望将里约热内卢打造为南美洲最为顶尖的金融大都会。未来几年将有数百万美金的投资涌入此地，使里约热内卢成为与布宜诺斯艾利斯，甚至是与纽约比肩的资本焦点。成功近在眼前，里约整装待发，时刻准备迎解光明的新时代。"
 BRA_free_the_market: "市场自由化"
 BRA_free_the_market_desc: "是时候继续推进市场自由化的进程了。在最初的一系列改革为我国经济和市场注入了必要的活力后，下一步就是打碎陈腐的枷锁，为企业提供自由的经营环境。我们将通过削减和废除一系列繁琐程序和管制条款终结阻碍了巴西经济发展的管制性经济环境。巴西的优秀商人们将挣脱热图利奥主义的束缚。本届政府将在国会通过一项议案，废除一切腐败的官僚主义管制条款，扫清前路，为经济革命开道！"
 BRA_shake_up_petrochemistry: "整顿石化行业"
 BRA_shake_up_petrochemistry_desc: "巴西石油公司是驱动本国经济增长的关键一环，同时提供了可观的财政收入。1949年，热图利奥·瓦加斯迫于维系权力所需，不得已而创设该公司。自此，该公司受热图利奥主义左右。鉴于目前巴西政府部门与各公司尚待提效，应当改组巴西石油、调整公司岗位。我们将委派全民盟党员及可靠的企业家任巴西石油公司要职，此举旨在提升经营效率，落实利润导向的原则。上述政策将为财政收入开辟新来源。"
 BRA_last_vestiges_dirigismse: "统制经济之余孽"
 BRA_last_vestiges_dirigismse_desc: "库比契克的国家发展委员会自成立至今，占据了大量的政府开支，却是收效甚微。由其主导的项目往往缺乏实际价值，资金流向亦掩藏在迷雾之中。若非政府掷重资予以扶持，这些项目将难以在市场中自持。大多数情况下，市场机制的运作效率将远超此等腐钝的官僚机构。因此，我们将终止该委员会的运作，转而鼓励私营企业的发展，减少政府干预。不再将巴西人民的税款投入这个无底洞，以实现资源的有效配置。"
 BRA_investors_paradise: "投资天堂"
 BRA_investors_paradise_desc: "要想让巴西的经济如拉塞尔达所愿实现腾飞，就需要更多的外来投资。凭借大刀阔斧的支出削减政策，我们有了更宽松的财政调整空间可用来负责任地削减导致我国经济持续低迷的私人企业经济负担。这项政策不仅可以为企业减负，还能控制通胀，促进巴西的经济发展。低税率也将吸引外国公司在我国投资建厂，进一步刺激经济发展并，最终为我国带来比起抑制性高税率下更高的财政收入。巴西将成为国际投资的焦点和世界各国竞相学习的模范。\n\n拉塞尔达的经济刺激计划并不只有削减企业的负担这一项，他还提议废除一系列毫无意义的建筑业限制性法律，由此提高工程建设效率，为私营企业提供更多更宽敞的发展与创新空间。虽然某些人会因为安全问题反对废除建筑业限制性法律，但最为危险的，不恰恰是受到重重约束而难以发展的经济无法创造足以消灭贫困的财富吗？这才是最为致命的问题。"
 BRA_expansion_modernity: "扩建与现代化"
 BRA_expansion_modernity_desc: "把那些低效的理论家空谈扫进垃圾堆后，巴西石油公司全部的潜能正在得到解放。与外国石油公司的积极合作和来自这些公司的技术专家将为巴西石油的发展注入磅礴动力。巴西石油致力于和全球各大工业巨头建立战略合作伙伴关系以提高其生产技术、科技水平并扩大投资来源，进而扩大巴西在全球能源市场上的份额并助力拉塞尔达的经济发展计划。在这一计划中，鼓励外国投资是最关键的一环，它将带来至关重要的资金和技术，让巴西石油公司成长为全球能源行业的领头羊。"
 BRA_stimulate_competition: "促进竞争"
 BRA_stimulate_competition_desc: "此前，国家对少数大型企业予以优待，后者借机大肆扩张，轻而易举地收揽合同。现状如此，致使当下业内有志者无缘涉足诸多经济领域；上述领域自然由这类大型企业把持，其恰似政府的分支，沾染的官僚主义与铺张浪费风气别无二致。为求进一步刺激巴西经济增长，我们须终结个别企业对政府合同的垄断。这将促进竞争、提升效率，且依托企业福利节省的预算可以百万计。"
 BRA_public_private_partnership: "公共私营合作制"
 BRA_public_private_partnership_desc: "拜往届政府所赐，时至今日，公共部门依旧臃肿不堪。政府各部疏于营利，吞入的资金往往一去不返。理应将私营部门的创业风范引入政府，而非仿效往日行事，将政府的铺张浪费风气加之于私营部门。将政府项目交由私营企业外包，不仅可节约支出，还事半功倍。公职人员无须囿于无尽的商谈会议、踟蹰不前，私营企业则得以尽其所长：创新，提效，以及达成业绩！"
 BRA_come_to_nordeste: "到东北去！"
 BRA_come_to_nordeste_desc: "历届政府对东北地区的长期忽视，致使其发展远远落后于富庶的东南地区。然而，东北地区蕴藏着巨大的发展潜力，其土壤肥沃，适宜种植各类经济作物。矿业公司的勘探报告亦揭露出该地巨大的矿藏资源。若要对其加以利用，则必要投入大量资金，加强东北地区与国内其他地域的联系。在政府的支持下，东北地区有望实现经济腾飞，以至于能够与繁荣的东南地区相媲美，为巴西带来一场经济奇迹。"
 BRA_lacerdanomics_enshrined: "拉塞尔达经济熠熠生辉"
 BRA_lacerdanomics_enshrined_desc: "数十年来，瓦加斯主义如幽灵般萦绕这个国家。无节制的腐败侵蚀着民众的信任，使国库财匮力绌。政府在经济领域的过度干预，使企业的创新进取之精神心余力绌。恶性通货膨胀于乡野间肆虐，摧毁了无数人的生计。无怪乎众多才华横溢的巴西精英纷纷远赴他乡，以寻求更广阔的天地。\n\n不再如此。拉塞尔达打破束缚，引领巴西经济实现了蜕变。他缓解了政府对福利政策的路径依赖，使贸易与外国投资更具活力，将库比契克的空想领向更为务实的道路，也为巴西的未来描绘了一幅清晰的蓝图。市场自由发展，工商业方能取得繁荣与创新。\n\n发展主义已死！"
 BRA_lacerdanomics_enshrined_tooltip: "拉塞尔达成功了，发展主义已死！现在是自由市场的时代。"
 BRA_lacerda_hemispheric_defence: "半球防务"
 BRA_lacerda_hemispheric_defence_desc: "在经历第二次世界大战的惨败后，巴西人已经明白，抵御法西斯扩张的唯一方法便是加强其与美国之间的友好关系。\n\n美国是一个天然的可靠盟友，巴西与美国将会携手抹除暴政在我们大陆上的立足点。因为，正如我们在欧洲并肩战斗的经历，与那些战败国的命运所警示我们的那样，若法西斯主义扩张到了巴西的土地，未来，我们国家的命运注定是毁灭。"
 BRA_focus_hunting_spiders: "猎捕蜘蛛"
 BRA_focus_hunting_spiders_desc: "巴西的内部隐藏着一些腐朽的敌人。一股隐匿于黑暗中的诡异势力在巴西全境编织起了一张大网，试图摧毁巴西的民主。法西斯间谍始终都是我们的眼中钉、肉中刺，无论他们背后的主子是德国人、意大利人甚至巴拉圭人。他们渗透进了巴西社会的缝隙中，形成了名副其实的第五纵队。\n\n这种情况不会再继续下去。我们将揪出这些间谍，因为叛徒必将受到惩罚。随着他们的网络分崩离析，他们也将无路可逃。法西斯主义现在且永远不受巴西欢迎。"
 BRA_token_force: "象征性部队"
 BRA_token_force_desc: "我们收到了来自OFN的外交请求，他们请求我国派出一支小规模部队协助他们在西非的部署行动。考虑到最近的战争局势，派出一支象征性的部队来满足他们的要求不仅没有任何风险，还可以向美国人展现我们的重要性。而且，他们所需的军事支援对促进我国军事改革也有重要的价值。\n\n我们要把“抽烟眼镜蛇”派到西非去，好把美国人从泥潭里拉出来。毕竟，他们不会把我们的士兵派上真正的战场送死，不过是去碾压那些非洲的乌合之众而已。"
 BRA_token_force_tt: "我们现在可以向[FFR.GetNameWithFlag]派遣更多的志愿军。"
 BRA_lacerda_65_join_OFN: "加入OFN"
 BRA_lacerda_65_join_OFN_desc: "既然巴西业已跻身OFN伙伴国行列、与美国结为坚实同盟，我们之间的关系自然有望更上一层楼。表明加入OFN的意向，于经济、外交和地缘政治方面大有裨益。此外，倘若加入OFN，待法西斯分子染指我国时，核保护伞及百万之师或许会救我们于水火。"
 BRA_rival_banana_fascists: "紧盯“香蕉法西斯”"
 BRA_rival_banana_fascists_desc: "作为拉丁美洲唯一真正秉持民主精神的国度，我们理应与毗邻于此的独裁政权划清界限，以免遭受这些邪恶势力的侵蚀。为此，拉塞尔达将授予情报机构特别搜查权，使我国官员与法西斯独裁者间的往来彻底断绝。巴西苦瓦加斯主义久矣，我们绝不容许这般惨剧再度发生。"
 BRA_rival_banana_fascists_tt: "我们将§R谴责§!§K拉丁美洲§!所有的§.极右翼政权§!"
 BRA_OFN_policing_duties: "OFN维稳任务"
 BRA_OFN_policing_duties_desc: "OFN请求我方派出更多人员支持他们的维稳行动。这是个改善我国和盟友间关系的好机会。\n\n避免让我们的士兵在外国的土地上以身涉险很重要，但这么做确实可以增强巴西对美国的重要性并扩大我国的话语权。我们将根据OFN的要求，对海地及其他他们有需要的地方派出人员参与有关行动。"
 BRA_cameroonian_sinkhole: "喀麦隆泥潭"
 BRA_cameroonian_sinkhole_desc: "不够，还不够。扬基佬希望我们派遣更多部队，以支援他们在西非的军事行动。这无疑会使我国军力受损，但我们无法背弃自己作下的承诺。尽管巴西民众不会赞同这次极为危险的干预，但我们别无选择，只得向喀麦隆增派兵力，并寄希望于美国佬们能尽快结束战斗。"
 BRA_recognise_axis_atrocities: "追缉轴心国暴行"
 BRA_recognise_axis_atrocities_desc: "巴西军民携手抗击法西斯，二十年于兹矣。可叹瓦加斯政府的腐败无能，致使千百名战士马革裹尸，也错失了一举消灭轴心国势力的最佳时机。\n\n仍有许多未竟之事，我们还未曾对轴心国的战争暴行予以清算。我们必须整合所有事件讯息，为巴西人民带来真相与正义。"
 BRA_lacerda_restrict_japan_trade: "限制对日贸易"
 BRA_lacerda_restrict_japan_trade_desc: "介于两国间日益增长的贸易往来，来自大洋彼岸的势力得以在巴西植入根系。政府在外务问题的处理上往往受制于此，难以大展拳脚。\n\n此般经济渗透难以为公众所察觉，但却对财政部的政策制定影响颇深。因此，政府应当采取行动，对日本商品施以高额的保护性关税，以保卫巴西人民的利益。"
 BRA_city_of_the_sun: "日出之城"
 BRA_city_of_the_sun_desc: "美国已经获得了在巴西北部建设海军基地的权利。而现在，随着西非战争愈演愈烈，以我国的纳塔尔空军基地为枢纽开辟一条快速空中走廊就有了极为关键的战略价值。\n\n为了结束这场冲突、帮助我们的盟友，更为了让我们的小伙子早日回家，我们很乐意这么做。"
 BRA_more_than_a_puppet: "绝非傀儡"
 BRA_more_than_a_puppet_desc: "拉塞尔达已经听够了对他本人和他的统治永无止境的批评。左派声称他是个意图摧毁瓦加斯无价遗产的大独裁者，媒体抨击他的政策，声称他是美国的傀儡……这都是谎言。\n\n拉塞尔达有一份计划。他要粉碎那些抹黑巴西和他自己的谎言，让巴西赢得它应有的地位。"
 BRA_lacerda_is_in_ofn_tt: "我们已经加入了§Q自由国家组织§!"
 BRA_lacerda_wac_ongoing_tt: "西非战争正在进行且自由法国没有停止抵抗"
 BRA_lacerda_wac_over: "西非战争已经结束或自由法国停止抵抗"
 BRA_imperial_catastrophe_avoided: "灾难得避"
 BRA_imperial_catastrophe_avoided_desc: "以勇气和谋略为剑，拉塞尔达战胜了1955的幽灵，再一次保护了巴西免受暴政荼毒。斗志昂扬的全民盟团结在乌鸦身后，准备好了为国家的未来做出一切必要的努力。拉塞尔达将画下蓝图，依他的意愿将这个国家塑造成他想要的样子。\n\n然而，在我们依照自己的愿景改变这个国家之前，我们必须巩固自己的地位。巴西的敌人依然隐藏在阴影中，在密室中密谋着推翻我们这个蒸蒸日上的政府。我们必须稳定国家，让我们的敌人滚回阴暗的角落里。"
 BRA_imperial_trojan_siege: "特洛伊之围"
 BRA_imperial_trojan_siege_desc: "每拖一天做出决断，巴西就离彻底陷入无政府状态更进一步。从街头巷尾到厅堂之上，人民呐喊着要求采取行动，要打倒独裁、打倒腐败、保卫民主。倾听人民的呼声、应允人民的诉求是我们的职责。\n\n乌鸦很清楚他必须做什么。为了捍卫巴西的民主，拉塞尔达将颁布戒严令，直至局势恢复稳定。我们的敌人会歇斯底里地大呼小叫，声称乌鸦是大独裁者。是又怎么样？为了完成必须做的事，拉塞尔达不惜任何代价。"
 BRA_imperial_restrained_exile: "点到为止的流放"
 BRA_imperial_restrained_exile_desc: "布里佐拉被捕入狱，古拉特逃亡海外，毒蛇的头颅已经斩下，它再也不能毒害我们的国家了。我们以胜利者之姿站在国会中央，群龙无首的反对派则乱成一团。乌鸦知道，从任何角度看，全民盟都已然掌握大局。\n\n虽然我们党内的一些成员要求反攻倒算、彻底粉碎残余的反对派势力，但拉塞尔达心里有数。我们已经走得够远了，没有必要再为敌人制造烈士。"
 BRA_imperial_restrained_exile_tt: "我们将寻求与左派休战以防爆发全面冲突。"
 BRA_imperial_velvet_glove: "天鹅绒手套"
 BRA_imperial_velvet_glove_desc: "巴西的有识之士们已经感到了未知带来的阵阵寒意。一股力量笼罩在政府头顶，将我们的一切都看作必须消灭的威胁。他们将会打着保卫巴西的旗号，剥夺一切权利、背弃任何誓言，用恐惧铸成所谓的“国家安全”。我们绝不能和他们同流合污。无论他们怎么想，人身保护令都将大幅加强。并且，只有在有明确证据的前提下才能展开逮捕，也只有完全必要的情况下才允许刑讯逼供。\n\n我们不仅为巴西而战，更为她的灵魂清白而战。我们要让所有人都知道，是拉塞尔达——而不是军人——在守护她。\n\n我们也不能假装自己已经掌握了绝对权力。我们必须同时应付美国人的意见、工会的反抗、强硬派的政府成员和瓦加斯主义残存的幽灵。我们必须中庸行事，这样才能保住我们，说实话，风雨飘摇的权力。"
 BRA_imperial_velvet_glove_tt: "这将减少美洲国家组织对我们的制裁支持率。"
 BRA_imperial_a_general_pardon: "大赦天下"
 BRA_imperial_a_general_pardon_desc: "虽然政府中的一些成员要求对所有反对派进行严厉惩罚，但拉塞尔达心里有数。工党和社民党的核心腐朽不堪，无可救药，但我们只需稍稍劝说，他们帐下的众多官员和政客就会转而站到我们这边。乌鸦可不想“艰苦奋战”到底，他明白，只有和解才能将巴西团结起来。"
 BRA_imperial_realist_approach: "务实手段"
 BRA_imperial_realist_approach_desc: "拉塞尔达及其政府意识到，古拉特和热图利奥主义在国内外都有强大的影响力。即使在瓦加斯倒台后，他在巴西依然有着大批支持者。古拉特的胜选表明他和他的意识形态依然有着强大的基本盘，这对我们极为不利。因此，拉塞尔达选择向美洲国家组织求助来应对眼下的公关危机。虽然拉塞尔达曾经批评过他们，但他们的支持确实能帮助我们压制社会上的反对舆论。"
 BRA_imperial_walk_the_fine_line: "走钢丝"
 BRA_imperial_walk_the_fine_line_desc: "每个国家内部都有着对于国家未来的不同愿景，无论它们隐藏得有多深。从美国的大选初选到东京的密室政治，这一事实都是无可辩驳的。而巴西也没有什么不同。试图否定这一点是愚蠢的，就像打擂台时把一只手绑在身后。\n\n我们必须确保政府中的所有人都明白，现在是走温和与和解路线的时候了。我们正处在巴西历史上一个极为微妙的时刻，正因如此，我们更不能放任偏激的激进派内阁成员、工会反抗和美国人的意见扰乱我们的路线。瓦加斯主义的幽灵依然十分强大，而许多百姓则畏惧着他们的军人。是时候走上正道，不要再煽风点火了。\n\n我们将让戈尔贝里制定一份针对所有政府成员、军方以及任何怀有二心的公务员的扩大监控名单。然后，让他们体面地退休。"
 BRA_imperial_public_execution: "公开处刑"
 BRA_imperial_public_execution_desc: "将瓦加斯主义一扫而空的机会已经来到。如果如此荒谬的意识形态和他的走狗逃过正义的审判，那么瓦加斯主义总有一天会反攻倒算，摧毁我们的胜利。鲁本斯·瓦斯等无数为了反抗暴政而死的烈士的鲜血就白流了。\n\n我们将立刻采取政治措施，永久性地禁止残余的工党成员散布政府的负面消息，尤其是那些受到重点监视的闹事分子。"
 BRA_imperial_victor_the_spoils: "赢者通吃"
 BRA_imperial_victor_the_spoils_desc: "为捍卫巴西人民能够生活在一个安全、民主的国家的权利，由于他们对人民福祉的深重危害，腐朽的热图利奥分子组成的巴西工党和原巴西共产党的残余将被彻底查禁。军队和警方将动员起来，揪出并铲除巴西的每一丝不稳定因素。此外，那些巴西工党的残党，靠着选举舞弊窃得官位的州长们也将被罢免，由总统任命的、忠诚的民主卫士取而代之。"
 BRA_imperial_rely_on_the_military: "仰赖军方"
 BRA_imperial_rely_on_the_military_desc: "美洲国家组织并不赞成我们的行动，所以我们不能指望外部援助了。然而，瓦加斯主义威胁依然存在，我们别无选择，只能靠依赖军队的力量维护我们的合法性。\n\n为了避免另一场政变，我们必须说服他们，让他们相信我们是保证巴西稳定的最佳选择。虽然我们蔑视近年来的一系列专制政策，但为了保卫巴西的未来，我们别无他法。"
 BRA_imperial_one_thorough_cleaning: "打扫彻底"
 BRA_imperial_one_thorough_cleaning_desc: "国家好比一个家，当它蒸蒸日上的时候，家庭成员们就可以在安全与繁荣中成长。有一个安全的家，是所有人的心愿。然而，再好的屋子也会慢慢积累起问题。阴暗的角落里藏污纳垢，霉菌孳生。如果不加以整顿，无数的小问题累积起来就可能导致严重的后果。\n\n巴西的政府也是这样藏污纳垢。毫无疑问，人心最为难测。如果不加以审查，从公务员到政府秘书都可能成为威胁这座屋子的隐患。戈尔贝里就是我们的清理工，我们把鉴别霉斑的责任交给了他。然后，他们作为曾经为国家尽忠职守的人将得到光荣且富足的退休生活，从此远离任何权力。\n\n是时候让乐队派成为全民盟中最强大的派系了。中间派在党内的各个等级都占据主导，但反过来说他们也很容易服从我们的意志。我们还要控制党务传媒并且敦促（或者迫使）党内高层支持拉塞尔达路线。"
 BRA_imperial_new_udn: "崭新全民盟"
 BRA_imperial_new_udn_desc: "当美国总统林肯警告人们“分裂之家无以立”时，他会料想到这句话在未来也依旧正确吗？如今，全民盟正站在十字路口上：党内还有许多乐于和反对派合作的温和派，利益集团也仍在进行着幕后交易，试图得到更有利的报价。尽管我们并不否定温和路线，但现在正是巴西历史的转折点，整个党都必须团结在拉塞尔达派的旗帜下。\n\n我们将确保拉塞尔达派掌控党务传媒工作。乐队派的候选人将得到优先支持，还会有全民盟内的要员与他们会面，讨论他们的政治关切和利益。无论如何都要确保他们的忠诚。全民盟不会沦为一团由利益输送织成的腐败网络——它将在选举中高歌猛进，领导巴西走向未来。\n\n去安排一场和美国驻巴西大使林肯·戈登的会面。拉塞尔达相信，华盛顿会有许多人对他的做法感兴趣，他也可以向戈登承诺我们将迎来“巴西利亚的新曙光”。"
 BRA_imperial_head_of_the_snake: "斩断蛇头"
 BRA_imperial_head_of_the_snake_desc: "热图利奥·瓦加斯，他邪恶的新国家体制早已毁灭，但站在这套体系后的他却依然活着。只要他还在人间，我们正当的统治就面临着永恒的威胁。但我们不能小看他的力量，仅仅是在演讲中公开批判他最毋庸置疑的罪行就会引发堪比戈梅斯废除最低工资标准时的反弹。要让他极其有毒的影响力永远与我们的民主体制隔离开来，就必须剥夺他的政治权力并禁止他在媒体上公开露面。\n\n我们也许无法剔除瓦加斯主义癌症的病根，但至少我们能阻止它的蔓延。"
 BRA_imperial_reach_out_gordon: "和戈登谈话"
 BRA_imperial_reach_out_gordon_desc: "林肯·戈登，美国驻巴西大使。这一身份也使得他成为了我们现在迫切需要接触的人。在未来，华盛顿的支持将是不可或缺的。他们希望南美洲实现和平与发展，这与我们对新巴西的愿景不谋而合。虽然美国人一直都不是好应付的，但近年来动荡的全球局势和拉塞尔达派的原则让双方如今有了更加微妙的关系。\n\n在继续清扫这段艰难时期留下的遗毒的同时，我们将正式向戈登展示拉塞尔达派为巴西摹画的蓝图。更重要的是，我们要通过他传达我们希望与北方的盟友建立更具建设性的伙伴关系的愿望。他们要知道，巴西利亚已经迎来了新的曙光，只要双方能够达成共识，这位让巴西强大且自由的领袖就将是他们永远的朋友——他就是拉塞尔达。"
 BRA_imperial_rebirth_of_democracy: "民主的重生"
 BRA_imperial_rebirth_of_democracy_desc: "1937年11月10日，瓦加斯修改宪法，解散国会，严格限制政治参与。\n\n1939年12月27日，瓦加斯成立了新闻和广告部，负责控制舆论和宣传意识形态。\n\n1944年1月24日，瓦加斯颁布了第6.227号法令，禁止批评指挥官，并将任何“危及军事行动”的行为列作非法。\n\n无数人被恐吓。无数人被逮捕。无数人被杀害。现在，二十年后，瓦加斯主义者们终于要亲口咽下他们自己酿成的毒酒了。在拉塞尔达做完这些事之后，也许他们的暴政才终于没入了历史的陈迹。"
 BRA_imperial_our_work_has_only_begun: "工作仍将继续"
 BRA_imperial_our_work_has_only_begun_desc: "黎明时分，军用电台叫醒了睡梦中的将军们，提醒他们去接见带着拉塞尔达本人命令的信使。不久，士兵们就赶回了他们的基地。坦克驶出巴西利亚，沉重的履带在城市的路面上留下了深深的印痕。\n\n市民与评论家们都在欢庆着“秩序的恢复”和“新时代的到来”。温和派也松了一口气，让全民盟坐上高原宫的位子总比让军队坐好，是吧？\n\n然而，瓦加斯主义对这个国家的荼毒不会如此轻易地消散。即使是拉塞尔达最热情的支持者里，也有不少人觉得他的“反民主”行为是在加强左派激进分子的力量。\n\n随他们怎么说吧！现在是拉塞尔达大展宏图的时刻，没有人能阻止他！"
 BRA_imperial_the_crow_reigns_supreme: "乌鸦至高无上"
 BRA_imperial_the_crow_reigns_supreme_desc: "如今，借着巴西共和国武装力量英勇无畏的协助，我们精心策划、操纵的选举终究以完美的局面收场。尽管社民党与工党正嚎啕大哭，妄想以此扭转败局，但我们早已得偿所愿——国家立法机关早已被全民盟牢牢把持。当然，那些所谓的“忠诚者”，他们效忠的并非全民盟这个名号，而是拉塞尔达总统本人。\n\n我们不能错失良机，否则“乌鸦”恐怕就要被人拽下高位。必须采取果断行动，我们要彻底埋葬第四共和国，代之以新的第五共和国！"
 BRA_imp_lacerda_full_unity_tt: "$BRA_party_udn_c$将§&完全团结§!在§Q拉塞尔达§!周围"
 BRA_imperial_birth_of_5th_republic: "第五共和国的诞生"
 BRA_imperial_birth_of_5th_republic_desc: "狂热的热图利奥主义者冥顽不化，不愿面对现实。在他们眼中，凡是不把《老人的肖像》或其他瓦加斯竞选颂歌奉若圣经的人，便毫无价值可言。然而，所有清醒之士都能洞悉真相——第四共和国的宪法早已腐朽至极，病入膏肓。或许，正因为这部宪法充斥着瓦加斯主义的陈词滥调。热图利奥·瓦加斯所谓的“治国理念”依旧被奉为不朽的法律，这才使得这些狂热者宁愿视而不见，甚至袖手旁观。\n\n如今，时机已到，必须彻底斩断这根毒瘤。我们将把起草新宪法、建立第五共和国的重任，托付给国会中那些忠诚正直的立法者。巴西的新纪元已经悄然降临，新秩序正待揭开序幕。"
 BRA_imperial_birth_of_5th_republic_tt: "是时候让§K巴西§!怀揣§Q新梦想§!重生了。\n我们将向参议院提出$BRA_5TH_REPUBLIC_CONSTITUTION$"
 BRA_imperial_constitionalise_capitalism: "资本主义写入宪法"
 BRA_imperial_constitionalise_capitalism_desc: "狂人热图利奥·瓦加斯所提倡的社会主义除了经济灾难和蔓延全国的赤色腐化还给我们带来了什么？共产主义除了摧毁一个国家的国格，令它在外敌面前土崩瓦解外还有什么作用？看看美国和巴西取得的成功，还有什么必要怀疑资本主义不是唯一的正道吗？\n\n我们的后继者绝不能偏离正道。制度将禁止组建任何未经政府批准的工会，受到影响的公司也将恢复常态。实施广泛的财产保护措施也同样重要。"
 BRA_imperial_plot_with_gordon: "同戈登密谋"
 BRA_imperial_plot_with_gordon_desc: "如果没有美国的支持——瓦加斯派口中的“共谋”；谢天谢地，他们不知道这种支持有多么的强烈，否则这又将为其卑劣说辞增添弹药——我们根本不可能走到今天，亦不会有若昂·古拉特的倒台，不会有帝王总统，更不会存在军事治安机构。所以，我们有必要争取华盛顿方面的好感，并让他们知悉事态进展。\n\n在持续的混乱之中，美国驻巴西利亚大使馆已经加强戒备。我们将于大使馆会见林肯·戈登大使，商讨后续行动，并确保美国继续提供支持。我方目前拟定的所有计划将被提交至戈登大使，以供参阅，并采取必要行动。"
 BRA_imperial_a_new_dawn: "新曙光"
 BRA_imperial_a_new_dawn_desc: "时机已至。我们会采取必要行动，将国家从瓦加斯分子的魔爪下解放出来。最后一批议案确认完成后，全民盟控制下的参议院就会立即通过并批准相关立法。作为全民盟的忠实拥趸，参议院议长会亲自将法案呈递拉塞尔达总统，由他签字批准。\n\n现在正是打造崭新而纯洁的第五共和国的关键时刻，该法案将彻底阻断反对派可能的反制措施，我们的权威也能随之得到巩固。在筑牢防线和防范任何潜在反击的同时，我们也需稍作休整，来一次小小的庆贺：庆祝我国终于彻底铲除了热图利奥·多内莱斯·瓦加斯的魔咒。"
 BRA_imperial_a_new_dawn_tt: "§Y如果通过：§!"
 BRA_imperial_a_new_dawn_tt_2: "§Q拉塞尔达§!清除§V瓦加斯遗毒§!的征程开始了，§Y国策树中更多选项已解锁§!"
 BRA_imperial_enemies_at_the_gate: "门前叛徒"
 BRA_imperial_enemies_at_the_gate_desc: "庆祝就到此为止吧！瓦加斯主义者的反动势力一日还在围攻我们，就一日不能宣布达成目标。尽管全民盟已经彻底掌控了国会，但反对派业已开始动员。我们此前曾数次削弱工会但依然未能驯服他们，现在他们已经宣布发起针对我们的第二次总罢工，各行各业的工人纷纷涌上街头。\n\n如果说瓦加斯主义者和工会破坏分子所造成的麻烦还不够多的话，整个政治光谱内的政客们都已经联合起来反对我们，其中甚至有我们全民盟的成员。更糟糕的是，马里盖拉和阿马佐纳斯所领导的左翼颠覆分子已经宣称要对我们发起某种“人民战争”。\n\n立即行动起来！消灭所有颠覆分子！"
 BRA_imperial_an_illegal_gathering: "非法集会"
 BRA_imperial_an_illegal_gathering_desc: "大量工会组织聚集起来反对政府，然而恰恰是政府所提供的服务和资金才能维持它们的运作。这种集会不仅违法，还尽显他们忘恩负义的丑恶嘴脸。我们的政府必须以最严厉的手段发起回击，以免重蹈戈梅斯政府遭工会挟持的覆辙。\n\n我们之前已被迫制止了一次此类行动。这样的威胁手段不会再奏效了，我们会下达最终禁令，彻底杜绝如此恶行。完全禁止工会集会，抗令者严惩不贷！拿下所有共产“工会”颠覆分子！"
 BRA_imperial_mass_layoffs: "大裁员"
 BRA_imperial_mass_layoffs_desc: "这些工会倒是热衷于为他们的贪腐头目出谋划策，只要上头一声令下，他们甚至会将自己的成员抛下悬崖。不过，我们的总统阁下也会玩玩下三滥手段。要是总统阁下不愿意也不懂得玩这些下三滥手段的话，他就当不了总统。\n\n我们最近听闻有公务员掺和他们的罢工闹剧。阁下，这种事情，绝对不能再发生了——这群蠢货会毁掉一切。所有涉嫌参与任何非法集会或罢工的公职人员，将被革职查办。如此，我们就能将对神和拉塞尔达的恐惧，深深刻进他们的脑子里——好让这群蠢货滚回去干活。"
 BRA_imperial_gordons_boys: "戈登的部下"
 BRA_imperial_gordons_boys_desc: "若说过去五年间我们的总统从何寻得慰藉，那便是他与戈登教授的友谊——这位我们与华盛顿盟友之间的直接纽带。这份情谊不仅是抚慰拉塞尔达个人挫败的良药，更带来了显著的外交优势。\n\n最显著的例证便是安全事务。戈登大使凭借在FBI的深厚人脉，能使FBI为巴西提供的协助远超以往合作层级。FBI表示，他们可协助我们通过勒索手段瓦解工会集会，且无需让我国内卫部队承担风险。然而马加良斯力主审慎——他以确凿证据断言，此类决策必将在全民盟内部引发争议。"
 BRA_imperial_the_eagle_watches: "雄鹰的注视"
 BRA_imperial_the_eagle_watches_desc: "按理说，美国在南美洲负责美情报行动的应当是FBI，但在巴西，还有一家神秘的美国三字母机构却在暗中活动，那就是CIA。尽管FBI在此地区的行动已经得到了公开授权，CIA依然维持着一支小规模力量，专门对抗德国势力的渗透。  \n\n如今，CIA通过一场幕后交易，主动向我们伸出援手。有人建议我们接受这一提议。然而，也有一些忠诚可靠的官员警告道，CIA一向手腕强硬，且往往采用FBI所不屑的极端手段，与他们合作可能暗藏风险。"
 BRA_imperial_seahorse: "海马"
 BRA_imperial_seahorse_desc: "在对热图利奥-庇隆主义篡权者若昂·古拉特合法接管权力后，若干特殊机构应运而生。长期以来，这些机构基本自主运作，仅接受高原宫的建议性指导——但各部门负责人终究是全民盟干部，现经总参谋部批准，他们已完全听命于我们直接调遣。\n\n“海马”（政治社会秩序部）将严格遵照我们发布的指令行动。该部门将与国家情报局密切配合，共同清剿游击队，达成战略目标。在尊贵的戈尔贝里·多·科托-席尔瓦将军领导下，两部门的深度协作，必将彻底肃清这些游击组织。"
 BRA_imperial_cuban_cigars: "古巴雪茄"
 BRA_imperial_cuban_cigars_desc: "遗憾的是，虽然巴西人民早已饱受磨难，但阻止布尔什维克和希特勒分子从内部攻击我们依然不足以挫败他们的野心！他们意图颠覆我国政府来破坏我国主权和我们作为资本主义自由民主体制拥护者的骄傲。可恶的“韦拉克鲁斯协定”表面上是一个由墨西哥领导的联盟，实际上却是由极端共党、古巴革命分子、腐朽的游击斯大林主义者切·格瓦拉领导。有证据表明他们在直接支持左翼游击队。\n\n是可忍孰不可忍！为了我们在乎的一切，派出政治社会秩序部、国家情报局和海岸警卫队，把威胁赶出我们的海岸！"
 BRA_imperial_unleash_fluery: "放出弗勒里"
 BRA_imperial_unleash_fluery_desc: "在自由区暴乱期间，有个臭名昭著的野蛮人处处和我们作对。他就是塞尔吉奥·弗勒里。即便在那场危机结束后，他依然对深受左派影响的圣保罗有着巨大的影响力，不过他也把这种影响力用在了正确的地方，用倾注着滔天怒火的铁拳阻止了左派掌控这座大都市。\n\n我们最好不计前嫌，欢迎弗勒里为我们当下的计划效力。他将得到直接授权，允许他不受束缚地执行任何他认为有助于他——不，我们把左派赶出圣保罗这一目标的行动。"
 BRA_imperial_out_of_sight_out_of_mind: "眼不见，心不烦"
 BRA_imperial_out_of_sight_out_of_mind_desc: "巴西总统致埃米利奥·加拉斯塔苏·梅迪西元帅的一封电讯。\n\n“‘忠于自我’——你应该知道，自我宣誓就职巴西总统以来，有些事情我是绝对不想去做的。无论不越雷池的代价有多么沉重，我也始终不愿越过那些红线。我不愿意效仿阿道夫·希特勒，更别提若昂·古拉特和热图利奥·瓦加斯了。”\n\n“但现在，坚守道德是如此的奢侈。如果内卫部队要采取措施平定当前的乱局，从现在开始他们无需向高原宫请示，无需向我做汇报。为了恢复社会秩序，一切代价都是值得的。我不会在如此危急的情况下约束他们。”"
 BRA_imperial_iron_general: "铁腕将军"
 BRA_imperial_iron_general_desc: "前总统特谢拉·洛特已隐退多年，他（或许是在软磨硬泡下）发表的公开声明也都是站在中立角度。若非国家有难，这些言论本可获得跨党派赞誉。但我们流放了他那个共产党女儿埃德娜·洛特过后，他本人自然成了隐患。\n\n戈尔贝里建议我们立即逮捕洛特并实施监控，“免得他后面制造出什么大麻烦”。我对此完全同意，戈尔贝里起草的任何逮捕令我都将予以批准。"
 BRA_imperial_operation_parrot: "鹦鹉行动"
 BRA_imperial_operation_parrot_desc: "我们已经明确了平定阿拉瓜亚河谷的共党-法西斯运动的军事部署方案。为了一劳永逸地终结这帮布尔什维克分子制造的折磨我们如此之久的混乱，我们要向雅尼奥·夸德罗斯学习，扫荡、扫荡、扫荡到他们被彻底粉碎为止。\n\n我们手里正有一把趁手的扫帚——或者说是一把合适的重锤。我们的正规军将向森林和山谷发起全面进攻，在正面战斗中消灭阿玛佐纳斯手下被洗脑的学生和各种各样的反动分子。在绝对的人数优势下，他们只能束手就擒。"
 BRA_imperial_our_friend_huey: "我们的朋友休伊！"
 BRA_imperial_our_friend_huey_desc: "这款昵称为“休伊”的直升机适用于各种距离的飞行任务，能耗低，维护便利。戈登大使和各种各样的美国国防承包商说客早在如今的混乱爆发以前就在巴西利亚不停地夸赞休伊的种种优点。现在，我们又想起了它。\n\n这款直升机的出现使我们的军队可以轻易穿越当下无法从地面上通行的区域，也让侦察行动更加高效、精确。虽然目前我们还没有这么做，但现在我们将立刻大规模采购这款直升机以支持鹦鹉行动，直到赢得胜利。"
 BRA_imperial_paint_the_jungle_red: "血染丛林"
 BRA_imperial_paint_the_jungle_red_desc: "*滋滋滋*“为了崇高的事业，他杀了他的孩——”*滋滋滋*“——啊，残酷的刺客，鲁莽又可悲——”*滋滋滋*“——‘新共和国’里没有新鲜事，除了从不会被惩罚的拷问者和将军们——”*滋滋滋*“——不要再靠近了，否则我会毙了你——”*滋滋滋*“——‘凝固汽油弹烧到了孩子’？谁在乎——”*滋滋滋*“——如果连他都能逍遥法外，人间哪还有正义可言——”*滋滋滋*“——至少工人阶级的革命意识在觉醒——”*滋滋滋滋滋——*\n\n“注意，注意。为打击颠覆活动，根据行政令，这一区域已经开始戒严。剿匪行动正在进行。所有公民必须留在家中。不服从者将无条件视同叛军处置。我们希望各位配合，以及服从，这一命令。”"
 BRA_imperial_sewers_of_diable: "魔窟阴沟"
 BRA_imperial_sewers_of_diable_desc: "安谢塔神父的遗泽如今遭人亵渎；地狱已空，群魔尽出，全都聚在了圣保罗！人们才叫它“魔窟”不是没有道理的，尤其是我们的总统，一个里约热内卢人，对此更是深恶痛绝。这个城市，过去是我们政敌阿德马尔·德·巴罗斯的地盘，那个满身腐臭的家伙。而现在呢？成了左翼叛徒的窝点。想想都让人作呕。既然如此，那个信奉共产主义与瓦加斯主义的卑劣之徒、小热图利奥·瓦加斯，他公然抗命、置我们于不顾，又有什么可惊讶的？\n\n让我更在意的，是那个疯传的流言。说圣保罗已经成了拉马尔卡的老巢，而他背后的指使者，是那个马里盖拉……是的，就是那个一直躲在阴影里的毒瘤。我们不能继续装作没看见了。此起彼伏的罢工正好成了我们的突破口。无论这些共产党披着什么外衣，我们都必须将他们连根拔除，将圣保罗这座城市，从魔鬼的手中彻底净化！"
 BRA_imperial_toppling_a_dynasty: "颠覆王朝"
 BRA_imperial_toppling_a_dynasty_desc: "热图利奥·瓦加斯曾试图杀死我们的总统。因为我们反对他的社会主义个人独裁，如今他的走狗和亲属依旧在不依不挠地对抗我们。瓦加斯那个该死的儿子，所谓的圣保罗州长也不过是他那满是怪人和道德败坏的演员、邪恶而无能的政治王朝的新近造物。\n\n令我们作呕的是，据称小瓦加斯也对反对我们的阴谋很感兴趣。这当然是不可容忍的，但这同时也给了我们扩大影响力的机会。我们将通过一项紧急法律来削弱他的权力，以便我们可以随心所欲地干预圣保罗州的事务。"
 BRA_imperial_tanks_on_the_streets: "坦克上街"
 BRA_imperial_tanks_on_the_streets_desc: "“请注意！根据行政当局的命令，为应对反国家的颠覆性行为，本地区已进入戒严状态。为维护社会稳定，公共集会权力已被暂停。无论是否参与非法集会，请所有人员立即撤离。”\n\n理论上讲，这一公告已经足以让人屈服。但事实并非如此。如果要彻底终结这些被称为“抗议”的街头暴乱，我们必须让这些暴徒感到真正的恐惧。那么，就在街头部署些坦克吧，让那些被吓傻的蠢货们乖乖滚回家去。这才是解决问题的万能药（或者说——贫铀弹）。"
 BRA_imperial_raid_favelas: "扫荡贫民窟"
 BRA_imperial_roars_of_truimph: "胜利的咆哮"
 BRA_imperial_roars_of_truimph_desc: "总统已经意识到我们当下需要的是一个能够对抗叛徒、激励巴西人民的纲领。因此，卡洛斯·拉塞尔达总统将发表全国讲话，谴责赤匪叛徒、鼓舞支持者，并且安抚群众。\n\n不出意外的话，这场演讲——会和拉塞尔达总统平常的许多演讲一样，通过把一系列孤立的主张整合成一套旨在捍卫国家利益的连贯叙事来取得积极的反响。不过，也难免有些人怀疑，当巴西正血流成河的时候，这种反响是不是这个国家需要的。"
 BRA_imperial_everything_is_fine: "诸事顺遂"
 BRA_imperial_everything_is_fine_desc: "“在拉塞尔达的统治下，局势恶化的速度已经不能轻描淡写地……*滋滋滋*……无论表面上发生了什么，都应该告诉人们一切安好。”\n\n“那些宣称自己被瓦加斯迫害过的报社编辑们压制言论自由，真是无耻至极……*滋滋滋*……巴西人民要知道，言论自由不包括散播谣言的自由。”\n\n“他们就这么重复着同一句话：……嘟……‘巴西人，一切正常！一切正常！一切正常！’”\n\n“共党和拉塞尔达的法西斯在外面打得头破血流，我哪里敢听你的出去？……”*滋滋滋*……如你们所见，街上一切如常……”\n\n“我们的国家在流血，他妈的。我哪还有心情找乐子？……*滋滋滋*……餐馆，公园和书店如常营业。巴西政府鼓励大家在其中陶冶情操，享受生活。”"
 BRA_imperial_campos_pleas: "坎波斯的请求"
 BRA_imperial_campos_pleas_desc: "终于，我们不再需要独自维系全民盟的团结了。我们得到了米尔顿·坎波斯的支持，他将自己的全部时间都用在了争取塔沃拉等心存疑虑的全民盟骨干们的支持上，让他们团结在拉塞尔达总统背后。他的努力确实可以打动人们铁石般的心灵，但仅靠他自己依然是不够的。\n\n我们将全力以赴地支持他的呼吁。无论可能发生什么，全民盟都必须团结一致。如果拉塞尔达总统连这个把他抬上高位的党都没法指望，那唯一的下场就是摔得粉身碎骨。"
 BRA_imperial_reassure_usa: "安抚美国"
 BRA_imperial_reassure_usa_desc: "设想一下，我们的政府被街头抗议者和流亡海外的前总统支持者推翻，而当时正是美国支持了推翻那个总统的行动。对美国来说，也只有忠于亲德英国政府的派系夺取了加拿大政权能更让他们颜面扫地。美国人当然在意他们的国际观瞻，因此他们目前已经介入。但我们依然需要确保他们对我们政权的信心。\n\n老美需要保证几个基本问题。首先，我们拥护更广大的自由世界的利益；其次，虽然表面上有些动荡，但我们的政府依然是稳定的；最后，我们的政府绝不会垮台——他们的投入不会打水漂。"
 BRA_imperial_pintos_support: "平托的支持"
 BRA_imperial_pintos_support_desc: "极端保守的马加良斯·平托是巴西政坛上的重要人物。有个笑话说，巴西右翼的头发们如果没有向马加良斯·平托申请许可，就绝不能从头上掉下来。这故事当然是虚构的，但也显示了马加良斯·平托的强大影响力以及争取他支持的必要性。\n\n我们必须尽快与马加良斯·平托先生接触以达成协议。任何妥协都是可以接受的，除了一点——如果马加良斯·平托想当总统，那他最好还是忘了这件事。"
 BRA_imperial_all_in: "全部押上"
 BRA_imperial_all_in_desc: "应付非常的局势，\n只有用非常的手段，\n不然是不中用的。\n——威廉·莎士比亚\n\n我们现在好比身处一场扑克牌残局。再无退路，无论将会发生什么，唯有破釜沉舟，直面未来。如果我们退缩了，那只会意味着古拉特的胜利。他将会像个纳粹法西斯暴君一样杀回巴西，毁掉我们拼命创造的一切。\n\n是时候梭哈了。更多军队。更多武器。更多镇压。更多部署。更多、更多、更多、更加多！用尽一切手段消灭瓦加斯主义，直到最终胜利。我告诉你，这一切就是值得的！"
 BRA_imperial_lacerda_victory: "胜利"
 BRA_imperial_lacerda_victory_desc: "我胜利了。我渡过了每一道考验，粉碎了所有的障碍。意图置我于死地的反对派也成了手下败将，反对派们的左翼思想在二十年前几乎置我于死地，如今也被一扫而空。我缔造了全新的巴西——她已然从过去的罪恶中解放。\n\n哦，瓦加斯，我超越了你；哦，戈梅斯，我实现了你未竟的事业。看吧，丰塞卡将军，我为您的共和国洗去了肮脏的罪恶；颤抖吧，阿马佐纳斯，你们的腐朽已经被我粉碎。依吾之意志，蒙天主恩典，巴西必将再次美丽——《第五共和国编年史》的卷首只会有一个名字：卡洛斯·拉塞尔达。"
 BRA_imperial_a_feast_for_crows: "群鸦的盛宴"
 BRA_imperial_a_feast_for_crows_desc: "我在某处读过这段话，一时想不起来是哪了，作者如此写道：“共产党人若是执迷于极端且无可救药的领导路线，必将走向败亡。正如老话那样，他们将‘从根上烂掉’，他们会枯萎、会被遗忘，人民自会排斥它们。他们本应遵从人民利益而行。”这不正是阿马佐纳斯那群暴民结局的绝佳写照吗？凶残的巨兽已化作群鸦啄食的腐肉。\n\n马里盖拉已死，再也不会祸害人间了。圣保罗的左翼抵抗势力被连根拔起——弗洛塔厥功至伟。唯有阿拉瓜亚地区的阿马佐纳斯叛乱还没有荡清，然此等可悲的垃圾在洛特任期内肆意滋长。至此，共产党叛乱终告终结。"
 BRA_imperial_silenced_opposition: "噤声反对派"
 BRA_imperial_silenced_opposition_desc: "天主在上啊，这漫长的四年来，社会主义分子喋喋不休的抱怨和抗议一直纠缠着我们。他们每天都在抨击着我的“非法政府”以及“对巴西工人的压迫”。在过去，持续地防备他们的阴谋和抗议实在是件烦心事。\n\n不过，这里的过去时态可不是乱用的——他们的威胁已经是过去的事了！流亡在外的古拉特，埃德娜和布里佐拉他们终于闭嘴了。第五共和国的诞生是新时代来临的光辉时刻，在这里，没有工党和社会主义的立锥之地。"
 BRA_imperial_introduce_the_heir: "引荐继承人"
 BRA_imperial_introduce_the_heir_desc: "墨西哥人有一套十分有趣的总统接班人机制，他们称之为“幕后接班人”。接班人选我已有打算，那就是拉斐尔·马加良斯。我不认为有谁比他更适合在我退休后接过权柄。自他把工党赶出权力中枢后，我就已经决定为马加良斯留下无量前途。\n\n是时候让巴西人民认识一下我们的幕后接班人了。我要去问问幕后接班人先生——也就是马加良斯，有没有兴趣成为我的继承者，我相信他会答应的——他将引领我们的国家走向又一个胜利的五年。"
 BRA_imperial_introduce_the_heir_tt: "§Q承前启后§!，§&继往开来§!。"
 BRA_imperial_the_march_north: "向北进军"
 BRA_imperial_the_march_north_desc: "南方叛军已经被彻底碾碎，他们在圣保罗和瓜纳巴拉外建立所谓“社会主义政权”的春秋大梦也已沦为历史微不足道的注脚。但阿拉瓜亚问题依然存在。我说过，这对洛特来说不是个问题，事实也的确如此，但这不代表我或者我的接班人也会这么幸运。\n\n是时候派兵北上了，阿拉瓜亚必须被平定。让他们好好看看阿马佐纳斯的失败，让那些胆敢支持共党和左翼运动的蠢货们知道他们已经没有希望了。这件事就靠你了，梅迪西。"
 BRA_imperial_anaconda: "蟒蛇"
 BRA_imperial_anaconda_desc: "鹦鹉行动失败了。梅迪西的把计划执行的太过粗糙——三个和尚没水喝，太多的士兵也只会把军事行动复杂化。在阿拉瓜亚的密林中，平庸的军队很容易把自己搞得晕头转向，白白浪费掉有限的补给，削弱自己的战斗力。\n\n因此，我们要派出特种部队。我们要派他们去当地粉碎叛军，慢慢地将他们困死。这可以同时削弱阿拉瓜亚叛军在本地维系自身存在的能力和扩张到其他地区的能力。"
 BRA_imperial_duck_hunt: "猎鸭"
 BRA_imperial_duck_hunt_desc: "看来部署特种部队而不是常规部队是正确的选择。亚马孙叛军已经离彻底失败不远了。最近有消息称，叛军头目阿马佐纳斯等人认为已经无法再在巴西境内传播他们恶毒的政治思想，准备逃离这个国家。\n\n我要求安全机关制定计划，赶在阿马佐纳斯和他的心腹们逃出巴西并在他国得到庇护前逮捕他们。如果能把他们全部击毙，那无疑是这一年来最大的胜利。"
 BRA_imperial_distraction: "走走过场"
 BRA_imperial_distraction_desc: "1970年总统大选很快就要到了。许多反对派还在痴心妄想地以为这是他们打败我的最后机会。出于对自己处境的绝望，他们孤注一掷地开始密谋、拉起罢工纠察线——尽管他们不敢像以前那些颠覆分子组成的工会那样做任何出格的事情。\n\n我甚至都开始对他们感到愧疚了。这场选举游戏从一开始就受到了操纵，未来也是如此。除了全民盟的胜利外不会有任何别的结果。这场选举不过是为了走个正式流程，顺便分散一下人们的注意力。我们绝不会在为这个国家付出了这么多血汗后放弃我们应得的胜利。"
 BRA_imperial_quiet_the_psd: "让社民党噤声"
 BRA_imperial_quiet_the_psd_desc: "自上次大选以来，热图利奥主义者的联盟就已经陷入了混乱。工党和社进党已经不再是威胁后，就只剩下社民党要料理了。为了夺回权力，他们孤注一掷地提名了儒塞利诺·库比契克，第四共和国的残党之一参加总统竞选，对阵布拉加。\n\n库比契克非常受欢迎——即使是我也认为他的执政颇有可取之处。但在他竞选之前实在是得管牢下半身。多亏了他的好色举止，他率领自己的党夺回权力的所有希望都被他自己亲手毁掉了。他再也没有机会回到高原宫了。我手里有可靠的、无可争议的铁证证明库比契克背叛了他忠实的妻子。是时候放出消息了。"
 BRA_imperial_caged_bird: "笼中鸟"
 BRA_imperial_caged_bird_desc: "社民党绝不能赢。实际上，多亏了全民盟和军方的共同努力，他们在物理意义上就不可能获胜。尽管如此，这也不代表有必要禁止他们。我们不会直接宣布他们是非法政党——我们毕竟不是希特勒分子。我们也不需要让他们的每一个席位都在我们的掌控下。\n\n社民党有它的用处——那就是作为承载反政府负面情绪的垃圾桶。社民党永远无法得到任何权力，却仍然有一席之地——作为随着布拉加，还有接下来的萨尔内的意愿起舞的木偶。"
 BRA_imperial_trip_to_america: "去美国旅游"
 BRA_imperial_trip_to_america_desc: "我们的统治已然得到巩固，是时候重启延宕许久的对美访问了——那自由的土地，勇士的故乡。我还没有和自由世界的领袖充分交流过。现在第五共和国已经巩固，我也终于有精力弥补我在外交上的缺憾了。\n\n我们将共同出席哥伦比亚特区的典礼。我将与美国总统讨论自由世界和自由国家组织的未来。我们还会讨论到我本人在过去以及未来为自由国家贡献的力量。"
 BRA_imperial_the_special_relationship: "特殊关系"
 BRA_imperial_the_special_relationship_desc: "终于，我们等到了我国外交和政治努力收获硕果的高光时刻。我们将巩固美利坚合众国与巴西共和国之间的特殊关系，这一关系比任何国家之间的双边关系都更加紧密——我们是美洲大陆上最强大的两个国家，我们团结一致，共同捍卫西半球的自由！\n\n只要美国与巴西团结并肩，就没有法西斯势力能威胁到我们的和平生活。东方已然沦陷，但只要我一息尚在，西方就绝不会陨落。我，巴西第五共和国的就职总统，以我的名誉和荣耀发誓。"
 BRA_imperial_thunderous_applause: "掌声如雷鸣"
 BRA_imperial_thunderous_applause_desc: "全国民主联盟年度全国代表大会召开在即。秋风起落人间换，如今的全民盟不再是戈梅斯乱政时期的那个绝望同盟了。我们的代表满怀信心与热忱：他们笔下的议案正勾勒着未来巴西的政策蓝图，向全世界展示出巴西保守主义的智识力量。\n\n值此第五共和国成立后全民盟首届全国代表大会之际，我将亲临会场向党内同仁发表一篇鼓舞人心的讲话。届时我将深入阐述已推行的系列改革举措和精心擘画的未来图景。这不仅将铸就我的政治遗产，更能确保即便在我卸任总统离开高原宫后，巴西民众仍将继续遵循我制定的发展方略前行。"
 BRA_imperial_the_final_reforms: "最终改革"
 BRA_imperial_the_final_reforms_desc: "贝尔特朗，是你吗？我是拉塞尔达。对，我这边没问题，部长，谢谢你的关心。也祝你和你的家里人身体健康。都很好吗？那很好啊。\n\n为什么打电话来？你当然知道我们为了遏制通胀危机——那个蠢货库比契克在五十年代捅出来的篓子，做了很多事情。现在我需要你落实你那份经济改革方案的最后部分。是时候给通胀最后一击，一劳永逸地结束它对我国经济的威胁了。你觉得如何？"
 BRA_imperial_midnight_hour: "午夜时分"
 BRA_imperial_midnight_hour_desc: "时候不早了。高原宫空无一人，巴西利亚已经入眠。大选已经开幕，而第五共和国此刻也在历史上留下了它的印记。内伊·阿明萨斯·德·巴罗斯·布拉加已经当选总统，瓦加斯主义的遗产将缓慢而切实地化为乌有。我和家人们一起待在家里休息，思绪却早已飞到了九霄云外。\n\n我需要一把椅子，一些花——有卖附子的吗？我不清楚……还有一辆车。我要去热图利奥·瓦加斯的坟头。我要好好想想过去和未来的事。很奇怪，我似乎没有幸灾乐祸的兴致了。我只是想好好地思考，这已然落下帷幕的一切。"
 BRA_imperial_a_new_rio: "新里约"
 BRA_imperial_a_new_rio_desc: "哦，瓜纳巴拉，瓜纳巴拉，我的家乡！风暴企图压垮你——将你从世上抹去。但顽强不屈、不可战胜的你坚持了下来，依然是救世基督的注视下无畏而光荣的自由之乡。经历风暴的里约如今焕然一新，更加强大，它已经准备好迈向未来，向世人展现第五共和国的崭新面貌。\n\n这要归功于我为里约热内卢，我的故乡与我最深爱的城市缔造的光明、进步、繁荣的未来。作为巴西总统，这是我最为自豪的功绩。"
 BRA_imperial_coronation: "加冕仪式"
 BRA_imperial_coronation_desc: "我实在替马加良斯感到惋惜，军方竟然用这种手段挡住了他通往总统宝座的路，硬是把布拉加和萨尔内塞到他头上。这件事我已经对他抱怨过不知多少次了。可他只是让我闭嘴，好好知足——老实说，他说得对。\n\n内伊·布拉加虽然并非我的理想人选，但他至少行事稳健，这点毋庸置疑。无论我再怎么抱怨，事实就是如此。他会延续我们辛苦争取到的那些改革成果，也不会赤裸裸地充当军方的傀儡。甚至，他或许还有足够的胆识和底气，去顶回军方那些最荒唐的要求——毕竟，他跟军队的关系，比我一辈子加起来都要近得多。\n\n我会去参加他的加冕典礼——哦，抱歉，口误，他的就职仪式——亲眼见证历史再次书写，就像当年我宣誓就职时那样。然后，我要去放个很长很长的长假。"
 BRA_imperial_parasar: "伞降搜救队"
 BRA_imperial_parasar_desc: "形势危殆。不知是我疏忽大意，还是瓦加斯派与共党颠覆的结果，里约热内卢遍布赤色分子，全国各地尽是叛徒。无论走到哪里，都能发现针对合法政权的阴谋与袭击。所幸，听说空军——确切地说是若昂·保罗·布尔涅将军——拟定了肃清瓜纳巴拉所有反对势力的计划。\n\n有些人老抱怨潜在的代价，那我问你们：马里盖拉策划犯罪时你们在哪？现在我宣布，只要能抓住马里盖拉、告慰马加良斯的家属，任何代价都微不足道。必须伸张正义，哪怕里约化为火海也在所不惜——伞降搜救队计划必须即刻执行。"
 BRA_imperial_kidnap_goulart: "鲁本斯·瓦斯行动"
 BRA_imperial_kidnap_goulart_desc: "布里佐拉、古拉特、埃德娜·洛特——这群共产主义热图利奥派躲在古巴太久了，逃避着他们应得的制裁。布里佐拉和埃德娜我们动不了，他们安保严密，家人也不好下手。但古拉特却是个软柿子，拿他老婆的安危吓唬吓唬，他保证乖乖回国落网。\n\n是时候开始这项行动了。等古拉特一回来就判他终身监禁，这样我合法统治巴西的第一大威胁就能彻底消除。"
 BRA_imperial_cover_up_kubitschek: "水泥封顶"
 BRA_imperial_cover_up_kubitschek_desc: "你们这些白痴！连基本命令都执行不了，怎么敢自称“第三军”？没能抓住人不说，还让那家伙带着情妇飙车逃窜时车毁人亡！现在共和国前总统遇害，多亏你们，害我们成了所有人的怀疑对象！\n\n怎么办？抹黑他来保全自己呗！让环球电视台狠狠报道，就说他被妻子捉奸后酒驾身亡。“有多少人会相信”？无所谓，我们别无选择。虽然我倒是想，但这个节骨眼上还能把你们那个废物指挥官交出去吗？"
 BRA_imperial_arrest_tavora: "我为自己复仇"
 BRA_imperial_arrest_tavora_desc: "现在说说塔沃拉这个软蛋怂包。真他妈活见鬼，又怂又野心的男人是怎么炼成的？这孬种天天觊觎总统宝座——总想抢我的位置。要不是怂成这样，我都要怀疑他参与谋害马加良斯了。不过这想法太荒唐——他娘炮得连杀人的念头都不敢有。\n\n话虽如此，给敌人递刀子捅我倒是有能耐。这货公开抨击政府，内阁会议玩失踪，还他妈想搞垮政府运作！绝不能惯着。马上调兵抓人，送军事法庭判他叛国罪——最后我会特赦免他死刑，算是还他以前的人情。"
 BRA_imperial_doubt: "疑虑……"
 BRA_imperial_doubt_desc: "疑虑——充满了我的内心。布尔涅将军从来没有让我看过他那份伞降搜救队计划的内容。他说只要消灭一切叛国行为并且确保军队和政府的忠诚，就够了。它做到了，但代价是什么呢？它的影响似乎已经远远超出了我的想象。\n\n埃丝特，我忠诚的秘书，她只能眼睁睁地看着的这一切对她显然也有冲击，否则她为什么会辞职呢？当然她坚称原因不是这个，愿天主保佑她的灵魂——她只是说自己想要回库里蒂巴陪她的家人。我会同意她的请求。她为我做了这么多事，理应享受清闲的生活。\n\n但事实是，我已经孑然一身，身边只有军方的人。我怀疑，这种孤家寡人的处境就是我在这种情况下必然的结果。"
 BRA_imperial_no_half_measures: "不再妥协"
 BRA_imperial_no_half_measures_desc: "华盛顿那帮蠢货以为自己是谁？自由国家组织里这些白痴又算老几？他们指控我们搞什么“反人类罪”——当年对庇隆、斯大林怎么不见提这茬？抗议者跑到我们的使领馆门口闹事，记者们写文章喷口水，质问我们凭什么待在OFN。\n\n这群傻子永远不会懂。我们别无选择。共党渣滓都打到家门口了——天知道他们接下来会怎么祸害其他成员国？管他天崩地裂，我们都要在OFN和美洲国家组织面前自证清白。制裁算个屁！该做的我做了，仅此而已。"
 BRA_imperial_crush_fota: "拿下弗罗塔"
 BRA_imperial_crush_fota_desc: "当初看西尔维奥·弗罗塔那作派，还以为他跟科斯塔-席尔瓦和拉德马克一样，是个铁杆军头强硬派。结果这孙子跟亚马孙蜥蜴似的说蜕皮就蜕皮。现在他带着第二军在圣保罗造反，公然对抗政府，投靠了盘踞在那鬼地方的瓦加斯余孽州长。\n\n听听这厮在圣保罗电台放的什么狗屁！居然骂我们“邪恶”——他自己血都淹到裤裆了。这家伙自己手上沾了这么多血，现在倒装起清白，把叛国说成效忠？立刻从阿根廷边境调第一军过来，趁他还没进攻瓜纳巴拉和联邦首都，马上剿灭这叛徒！"
 BRA_imperial_blood_on_the_amazon: "血洗亚马孙"
 BRA_imperial_blood_on_the_amazon_desc: "我们的情报局终于有了报告。制造了这一切悲剧的左翼叛匪，他们的位置已经被锁定——他们躲藏到了北方的阿拉瓜亚区域。他们忠于若昂·阿玛佐纳斯、马里盖拉、拉马尔卡和所谓的“联合反法西斯阵线”，打着“民族解放”的旗号，试图把我们的国家拖下纳粹-法西斯主义的深渊。\n\n我们要粉碎他们的恶行，立刻、现在。杀害马加良斯家人的凶手们要为他们的残暴罪行付出百倍的代价。立刻部署直升机部队，自由开火、毫不留情。我要把森林染得像那些布尔什维克的愚蠢旗帜一样红，让亚马孙的赤匪溺死在自己殷红的鲜血中！"
 BRA_imperial_mercy: "怀柔……"
 BRA_imperial_mercy_desc: "几个月过去，瓜纳巴拉依旧熊熊燃烧。我们要恢复巴西共和国最大城市的秩序。你们第三军的蠢货们要进驻里约热内卢恢复秩序来给自己赎罪。接下来，你们要和国际援助者合作。庆幸吧，现在重返瓜纳巴拉恢复秩序还为时未晚。\n\n另外，我们需要采取更加温和的手段。前总统洛特已经在我们的控制下。把他、他的家人还有埃德娜·洛特驱逐出境即可。流血已经够多了。这场闹剧已经让太多的家庭支离破碎了。"
 BRA_imperial_succession: "继业者……"
 BRA_imperial_succession_desc: "拉斐尔·马加良斯已经入土为安。我刚从其安魂弥撒归来，并向其家属略表哀悼。马加良斯惨遭共匪毒手，我们亟需一位继任者。眼下可堪重任之人寥寥无几，军方对下届选举（作秀）的要求更是连篇累牍。\n\n那我就满足他们的要求，将马加良斯·平托迎入巴西利亚，让他担任总统。这实在是万般无奈之举，不过，至少我们能够以此稍补马加良斯遇害的空缺。"
 BRA_imperial_cold_southern_springs: "南国铁幕"
 BRA_imperial_cold_southern_springs_desc: "我们是否对南线过于疏忽了？阿根廷人看似按兵不动，实则伺机而动。诚然，他们封锁了边境，并拒绝难民入境。不过，只有蠢货才会相信他们不是在暗中积蓄力量。\n\n立即采取行动。我要加倍扩编南部边境驻军。他们要是执意让阿根廷沦为巴西现在这般境地，那就让他们放马过来好了。我们必须做好万全准备。"
 BRA_imperial_illusions_end: "南柯一梦"
 BRA_imperial_illusions_end_desc: "我们曾以为高枕无忧，但政权正被接连不断的威胁围困。自诩战无不胜、思想永存，以为瓦加斯主义已被彻底击溃，却因我的嗜血冲动与军队的无能叛变而一败涂地！绝不允许热图利奥派或共党分子让局势失控。\n\n当前形势岌岌可危。有可怕传闻说那个共党头子切·格瓦拉要来巴西支援阿马佐纳斯的斗争。必须掐灭这种谣言。不惜一切代价阻止切·格瓦拉越境。"
 BRA_imperial_illusions_end_tt: "§R我们终于能一劳永逸地解决切·格瓦拉这只老鼠了……§!"
 BRA_imperial_urban_guerilla: "城市游击队"
 BRA_imperial_urban_guerilla_desc: "难怪弗罗塔会造反。我们已查明那个畜生叛徒马里盖拉藏在圣保罗下水道里。这杂种有个漂亮的小窝，正听从他的恶魔主子阿马佐纳斯的指令，策划灭绝巴西人民的战争。要是我早点察觉，马加良斯就不会死。要是我——\n\n够了！别他妈自怨自艾了。马加良斯回不来了，但我们要还他公道。立即行动——把圣保罗的共党分子清剿干净，彻底粉碎他们的叛国巢穴。我们没能从布尔什维克手里救下马加良斯，但至少能为他报仇雪恨。"
 BRA_imperial_arrest_burnier: "一枪爆头"
 BRA_imperial_arrest_burnier_desc: "若昂·保罗·布尔涅这叛徒要是在别处投胎，绝对能给马里盖拉和阿马佐纳斯当金牌助手。这纳粹法西斯杂种骗了我们！当初他大谈特谈那个天杀的“清除颠覆分子”计划时，可没说要炸里约的大坝搞洪水！更没提要炸掉该死的煤气厂，一把火烧光瓜纳巴拉的贫民窟！\n\n这个披着反共皮的共党窝囊废自以为聪明，搞出大屠杀来还敢说是为国尽忠？狗东西以为自己立了大功呢，等着吧，老子亲自送他下地狱领赏！\n\n梅迪西！限你八小时内抓住这个畜生，一枪毙了他，把尸体倒挂在电线杆上晒足一百八十天！"
 BRA_imperial_arrest_burnier_tt: "§R布尔涅活不过今晚。§!"
 BRA_imperial_the_other_carlos: "另一个卡洛斯"
 BRA_imperial_the_other_carlos_desc: "这世上还有另一个卡洛斯，天天折磨着我的灵魂——那个该死的共产党居然和我同名。卡洛斯·拉马尔卡在阿拉瓜亚领导叛军，他就是希特勒-布尔什维克三头蛇的第三个脑袋。正如对付马里盖拉和阿马佐纳斯那样，我们已迫使他转入地下，但现在必须加倍努力。\n\n我们必须粉碎这场叛乱。这些纳粹分子竟能忽悠原住民和当地居民参与他们的叛国勾当。必须针对当地聚居区采取行动，切断这些所谓“学生”的补给，彻底粉碎他们的叛乱，把人民从他们的阴谋中解救出来。"
 BRA_imperial_black_swans: "黑天鹅……"
 BRA_imperial_black_swans_desc: "“石油危机”？“经济崩溃”？我们不需要这个，他妈的，现在根本不需要！操他妈的。这个国家还能更糟吗？还能他妈糟到什么地步！我受够了！\n\n那个什么石油危机已经拖垮了巴西经济。游击队根本就没被消灭——拜我们英勇无畏的军队所赐，他们还在不断袭击。资本家和投资人，那些最会创造财富的国民，那些曾经提振经济的老外，全都跑去了安全地带。连非洲国家都比现在的巴西更吸引投资！\n\n有人警告过这一切。是吧？是吧！洛特那个狗娘养的。他早知道会这样。自从这场该死的危机开始，他说的每个字不管用什么方式表达都是警钟。我无视了他，我忽略了他，结果整个国家现在七窍流血。\n\n谁更蠢？是对牛弹琴的他，还是充耳不闻的我？"
 BRA_imperial_letting_go: "随它吧"
 BRA_imperial_letting_go_desc: "五年任期结束了，我也撑不下去了。真的撑不住了，当初有马加良斯在还能勉强应付——可他现在死了，我也快随他去了。\n\n这该死的职务把我折磨得不成人样。活着就是灵魂的癌变。医生们说我身体硬朗，但我能感觉到体内一切都在崩坏。本不该这样的。都是古拉特的错对不对？都是瓦加斯派搞的鬼是不是？是他们——够了。\n\n我永远不会说，但我知道真正的罪魁祸首是谁。看着巴西沦落至此……自己也身处权力漩涡，现在唯一能为祖国效力的方式，就是离开人世成为历史。\n\n但愿另一个世界能比现实待我更仁慈些。可我配得上这份仁慈吗？"
 BRA_gomes_checkmate: "戈梅斯的教训"
 BRA_gomes_checkmate_desc: "再没有比工会和他们的傀儡政党更顽固、更难缠的敌人了。这个操控百万工人的巨型官僚集团，就像扎在保守派政府脊梁上的毒刺——我们这届也不例外。每次改革推进，他们就煽动工人要为自己的利益挺身而出，而我们往往被捆住手脚无力反击。\n\n都是那部邪恶的劳工法作祟——这份瓦加斯时代的遗产赋予了工会太大权力，让他们为私利横行巴西。改革乃至废除该法是全民盟几十年来的纲领，早该给这些敌人点颜色瞧瞧——但必须谨慎。上次戈梅斯就栽在这事上，民意反噬让全民盟元气大伤。我们要比他更精明、更强硬、更周全——只要顶住压力，就能完成他未竟之业。"
 BRA_lacerda_gomes_checkmate_tt: "§Q拉塞尔达§!将开始解决阻挡他重塑§K巴西§!的§R主要障碍§!。£GFX_BRA_ptb_texticon §V瓦加斯劳工法§!£GFX_BRA_ptb_texticon 必须被§e废除§!。"
 BRA_Sisyphean_struggle: "西西弗斯之战"
 BRA_Sisyphean_struggle_desc: "工会联盟的领导核心如此强大、破坏他们的努力也如此艰难的原因就在于他们的一致性——甚至可以说团结。这些工会虽然囊括了不同的利益诉求和不同行业的工人，但他们都在不依不挠地破坏真正符合工人根本利益的决策。毕竟，如果工人阶级过上了好日子，他们就不需要工会来要求提高工资了。所以，这些工会串通起来阻止这种情况发生，并把他们自作自受的苦难归咎于全民盟。\n\n而在另一边，巴西右翼的诉求就显得错综复杂，相当混乱。民粹派和保守派针锋相对，保守派和市场自由派争吵不休，巴西左派却完全没有这类困扰。为了消灭这莫大的邪恶，我们必须停止内斗，否则我们就无法凝聚起足够的力量打击左派的恶行。如果我们像他们一样团结，那么巴西人民也终将会拥护我们。到那时，被人民抛弃的左派联盟也将别无选择，只能拱手来降。"
 BRA_begin_media_campaign: "舆论宣传"
 BRA_begin_media_campaign_desc: "巴西的报纸大都由富豪大亨控制，这是我们重大的优势。毕竟，他们怎么会去支持罢工分子和社会主义者？所以，拉塞尔达和报纸背后的各位先生关系相当不错。作为回报，他们会献上他们最有价值的资产——正面报道。\n\n我们的反工会计划势必引起轩然大波。在领教了针对戈梅斯的第一波批评引发了多么巨大的反对之后，这点我们再清楚不过了。所以，当工人开始愤怒起来的时候，我们就必须为接下来的大规模混乱做好准备。每一丝出格的举动都会被报纸头条夸大成可怕的工会暴乱，法案的每一个部分都会得到专栏作者不遗余力的称赞。在大众眼里，我们的敌人将沦为只会煽动暴乱阻挠巴西进步的小丑。当我们把他们踢到一边时，只会得到社会上下的全场喝彩。"
 BRA_preempt_unions: "先发制人"
 BRA_preempt_unions_desc: "毫无疑问，我们削弱工会的法案将会导致工会激烈的反弹，这是不言自明的。也正因如此，既然我们已经预见了即将到来的反对声浪，也就可以提前做好应对准备并且在他们开始行动前抢先出手。在接下来的日子里，这将是关键的技巧。\n\n工会会罢工，我们知道。他们会举着标语和红旗游行，挤满街道，到处都是口号声和他们的民兵。但我们知道他们的弱点——我们很清楚他们腐朽无能的领导层是什么货色，也知道带着多少钱去他们家友好访问就可以动摇他们的决心。让这帮小丑的头目们像流寇一样逃走实在是可耻，但如果罢工者们失去了高层的指示，他们就只是无头苍蝇一般的暴徒而已，警察可以轻易收拾他们。"
 BRA_submit_the_bill: "提交议案"
 BRA_submit_the_bill_desc: "拉塞尔达指定的副手走上前去，将手中的文件递给议长，请他过目。反对派爆发出了激烈的叫骂声，但他们愤怒的声音很快就被按下投票键的声音和指示灯亮起的声音淹没了。\n\n拉塞尔达俯瞰着一切，看着他最重要的立法计划的第一步是如何开始的。他看见工会的联络人们匆忙地进进出出，打电话给里约和圣保罗；与此同时，在另一头的房间里，他的盟友正在监督投票，并记下那些反对者的名字。他已经越过了卢比孔河，此刻，是一场全面战争爆发前最后的宁静。\n\n也不过如此。他想着，向着副手点了点头，示意投票开始。"
 BRA_submit_the_bill_tt: "§Q拉塞尔达§!将尝试§V废除§!£GFX_BRA_ptb_texticon §V瓦加斯劳工法§!£GFX_BRA_ptb_texticon ——§e不成功，便成仁§!"
 BRA_counter_reaction: "应对抗议"
 BRA_counter_reaction_desc: "正如我们所料，工会认为我们递交的议案严重损害了他们的利益。谁不会这么觉得呢？我们这个诚实可靠的政府做出的改变威胁到了他们的权力，所以，他们自然会放出走狗，不遗余力地阻挠我们的意志并且试图推翻国会做出的决议。在巴西全境，工厂停摆，工地停工，因为工人们都离开了他们的岗位，走上纠察线，攻击任何尝试勤恳工作的人。\n\n这场斗争关乎他们的生存，但更关乎我们的。我们都见识过这种规模的罢工会对没有骨气或能力镇压它的政府带来多大的危害。戈梅斯试图削弱工会的时候，他实际上既没有团结的共识、也没有忠诚的骨干来保证党内的团结。所以当经济陷入危机时，他就成了工会贪婪欲望的盘中餐。\n\n卡洛斯·拉塞尔达绝不会让这种事情重演。"
 BRA_lacerda_strike_ongoing_tt: "我们正在应对罢工"
 BRA_lacerda_strike_more_options_tt: "§R我们将拥有更多选择来应对罢工者。§!"
 BRA_iron_will: "顽强意志"
 BRA_iron_will_desc: "你可以在引发一场罢工前做足所需的一切应对措施，却无法轻描淡写地低估这些混乱带来的创伤。纠察线每安然无恙一个星期，巴西的自由落体就不会停止，市场在崩溃，人民在失业。大众越发迫切地希望有一方会选择让步——无论是政府还是工会，具体是哪个取决于你问的人。但罢工如果继续拖延下去，越来越多的人就会希望发起挑衅的人主动屈服，让生活恢复正常。而如果我们不断地拒绝罢工者的要求，那么被看作是那个首先挑起事端的一方的恐怕是我们。\n\n没有关系。铲除巴西身上吸血的工会暴徒和寄生虫带来的好处值得我们忍受这一时的痛苦。只要我们将这一点铭记在心，我们就将是一支永远团结一心、争取美好未来的力量。那样的未来绝不是大罢工或任何工人运动能闹出来的。我们要做的就是坚持到底。"
 BRA_realist_concern: "务实手腕"
 BRA_realist_concern_desc: "务实派和塔沃拉认为我们最近的行动已经太过火了。他们希望政府和工会展开谈判，否则他们可能会对拉塞尔达政府的支持率造成更严重的损害。我们现在不能冒着可能令我们党和政府崩溃的风险行事，因此，我们必须听从他们的诉求。政府会勉为其难地和罢工领导者开始谈判，尝试达成协议。通过协商得出让每个派系都满意的解决方案绝不是什么轻松的工作。"
 BRA_virtue_of_patience: "耐心品德"
 BRA_virtue_of_patience_desc: "虽然和我们的主观感受相悖，但胜利实际上就在前方。工会没有让罢工永远继续下去的资源，他们现在已经有些强弩之末了。我们拥有雇主、资本和国家机器的力量，绝无可能错过这一良机。工会的野蛮行为将向巴西人民证明改革的必要性。朝阳将照耀着一个更美好的巴西。国家不会因为工会头目的贪婪而停摆，没有工会束缚的公司能够蓬勃发展，物价也不会被工人组织的激进要求一而再地推高。"
 BRA_cavalry_charge: "骑兵冲锋"
 BRA_cavalry_charge_desc: "事实表明，除非被迫，否则工会绝不会停手。而现在由于他们制造的这一系列混乱，就更有必要出动出击。他们妄想只要施加一点点压力，就能让拉塞尔达和全民盟滑跪投降——他们高兴就好。罢工造成的混乱已经持续得够久了，是时候做些什么了。\n\n警察和媒体是我们在思想和物理上对他们发起冲锋的骑兵。武装警察将把暴徒打回原形，同时媒体会站在我们这边，把他们的罢工描绘成被宠坏的熊孩子在大吵大闹，实际上也是如此。双管齐下，罢工者毫无胜算可言。"
 BRA_military_option: "军事手段"
 BRA_military_option_desc: "要想保障巴西的稳定，我们从来不嫌枪杆子太多。军方表示愿意提供帮助以应对当前的局势，而我们也很乐意接受这份好意。\n\n这并不是个轻松的决定。拉塞尔达总统明白军队中的某些派系过去就有在危机中行事越界的不良记录，这种情况很可能再次发生。但是，为了尽快且有序地解决这场愈演愈烈的罢工，这是必须的代价。街道将被扫清，工会也将被打回原形，变得无足轻重。"
 BRA_outlast_strikes: "拖延罢工"
 BRA_outlast_strikes_desc: "罢工就如同凭空燃起的熊熊烈火，妄图把全民盟烧成灰烬。但同样的，没有永不熄灭的火焰。我们有警察，我们有资源。拉塞尔达将戴着天鹅绒手套摘下胜利果实，而非挥出铁拳。最终，他们还是得回去工作。再怎么聒噪地喊着咱们工人有力量的口号的人也照样得吃饭。当他们最终走投无路地爬回我们脚下，跪下来恳求我们原谅的时候，我们将欣然接受他们的投降。从一开始，这种结果就是注定的。"
 BRA_tavora_negotiations: "塔沃拉的谈判"
 BRA_tavora_negotiations_desc: "塔沃拉是第一时间要求政府展开谈判的人。随后，他就成了直接参与并领导这一系列谈判的人。塔沃拉需要在他的谈判中保持微妙的平衡。既不能让巴西回到罢工如同吃饭喝水的旧时代，也要让工会及其成员大体上得到满意的成果。我们下了太多的赌注，如果塔沃拉无法克服这重重困难，社民党无疑将在下次大选中把我们赶下台去。"
 BRA_pragmatism_over_all: "务实优先"
 BRA_pragmatism_over_all_desc: "尽管它是必要的，但塔沃拉与工会达成的这份协议依然是政府难以咽下的苦药。在未来，任何一场延宕不止的罢工都会严重损害国民经济和全民盟的支持率。政府需要以更温和的态度与工会交涉来避免最糟糕的结果。虽然我们不会永远遵守它，但我们依然靠这份协议落实了一些重要的改革措施。未来依然会有颇具破坏性的罢工活动，但这些改革能缩短它们的持续时间，其危害也会比现在更轻。"
 BRA_lacerda_strike_negotiations_succeed_tt: "塔沃拉§J谈判§!§G成功了§!"
 BRA_hold_firm: "寸步不让"
 BRA_hold_firm_desc: "塔沃拉和工会达成了一项荒谬的协议。在这份计划里，工会将保留其绝大部分的影响力和发动大规模罢工的能力。这项协议是在向那些激进分子有条件投降，我们绝不能接受。政府将继续镇压罢工者，他们要么接受一份更合理的协议，要么就被彻底粉碎。巴西必须坚决地反对肆意妄为的激进主义。如果政府表现出了软弱和让步，那么罢工者就会得寸进尺。要想实现巴西的繁荣就必须让这种情况再不发生。"
 BRA_lacerda_strike_negotiations_collapse_tt: "塔沃拉§J谈判§!§R失败了§!"
 BRA_crows_legacy: "乌鸦的遗产"
 BRA_crows_legacy_desc: "在漫长且代价高昂的斗争后，《劳工法》终于通过了，工会也被击败了。这是乌鸦的遗产中最具基石意义的一部分，它确保了未来巴西经济的繁荣不再受突如其来的罢工冲击，也不再受工会和民粹主义分子缠上的枷锁束缚。\n\n与工会叫嚣的歪理相反，时代的大潮会带上每一个人，哪怕是工会成员也会在长远的未来得到更多的好处。随着时间的推移，认为工会应当拥有强大影响力的观念将不可避免地淡去人们的脑海，巴西人将明白新经济模式的优越性，最终，强大的工会将会变为遥远而模糊的记忆，成为巴西永远不会重新拾起的毫无意义的体制。"
 BRA_crows_legacy_tt: "§Q拉塞尔达的遗产§!取决于他是否会在处理罢工时选择妥协。"
 BRA_lacerda_strikes_over_tt: "§Q拉塞尔达§!已在与§V瓦加斯主义§!的圣战中得胜，并已§R摧毁了罢工§!"
 BRA_tavora_presidency: "塔沃拉任期"
 BRA_tavora_presidency_desc: "拉塞尔达被迫下台是我们最不希望看到的情况，然而他拒绝接受挽救经济形势所必须的激进措施。罢工已经重创了巴西的经济增长，如果没有一个团结的内阁，我国的经济恐怕会滑落彻底崩溃的深渊。\n\n既然拉塞尔达已经下台，塔沃拉成为了新任总统，我们还有很多工作要做。由于巴西当前面对的经济挑战，如何重新把整个国家团结起来将是我们重大的考验。\n\n必须克服的考验。"
 BRA_united_against_varguism: "团结反对瓦加斯主义"
 BRA_united_against_varguism_desc: "拉塞尔达下台让全民盟的许多成员感到了不安，既有和拉塞尔达同属一个阵营的人，也有曾与戈梅斯结盟的人。他们声称我们让拉塞尔达下台的行为是背叛了我们党的核心原则，但这并非事实。我们始终恪守着我们的信条，是拉塞尔达为了一场赢不了的战争几乎摧毁了我们的经济。我们只是在糟糕的情况下做出了最正确的决定，但很不幸，许多人并没有认识到这一点。\n\n如今，全民盟已经陷入了分裂。我们必须恢复党内各派的团结，并将全民盟改造成一个路线方针由党组织而非在任总统的个人意愿决定的党派。"
 BRA_correct_the_error: "纠正错误"
 BRA_correct_the_error_desc: "拉塞尔达又一次重复了戈梅斯犯下的错误，试图通过废除《劳工法》来直接打击瓦加斯主义势力，但这毫无意义。试图废除这项法律的尝试总会由于激烈的反对声浪而以失败告终。\n\n在塔沃拉治下，一系列劳工法律与稳定可靠的治国方式将在纠正拉塞尔达的一系列决策的进程中恢复过来。"
 BRA_our_natural_ally: "天然盟友"
 BRA_our_natural_ally_desc: "维持我们与美国的良好关系是重中之重。他们是我们的关键盟友，再加上我们当前面临的财政危机，我们必须尽快改善巴美贸易关系来保住他们对我国经济的信心。我们将派出外长访问华盛顿进行有关两国贸易关系的磋商。\n\n希望美国人看见我们确实以足够的紧迫感和重视程度处理这些问题的时候，他们会更乐意与我们合作并且恢复对我国市场的信心。"
 BRA_the_crows_protege: "乌鸦的门徒"
 BRA_the_crows_protege_desc: "最为激烈地反对罢免拉塞尔达的人是瓜纳巴拉州长，拉斐尔·马加良斯。作为拉塞尔达的亲密盟友，马加良斯在对罢工分子重拳出击的同时，也在整个国家的经济都陷入动荡的时候让瓜纳巴拉的经济保持了稳定。\n\n在全民盟内部，马加良斯与那些心怀反意的党员暗中勾连，声称我们罢免拉塞尔达是背叛了我们的信条。为了恢复全民盟的团结，塔沃拉将和马加良斯会面，希望能够修复彼此之间的关系并且解决马加良斯抱怨的一些问题。"
 BRA_tavora_stabilize_inflation: "稳定通胀"
 BRA_tavora_stabilize_inflation_desc: "全民盟最重要且根本的政治主张之一就是削减巴西的通胀。历史经验表明，在不稳定的时期，通胀也会更加不稳定。前总统拉塞尔达也许做错了很多事情，但这并不包括他对经济快速发展和削减通胀的承诺。\n\n很不幸的是，罢工导致大量经济活动停摆，让拉塞尔达的许多成就付诸东流。通胀再次开始攀升，我们必须在它变回我们上台时的原样前行动起来。既然拉塞尔达没能把握住，那么就由塔沃拉总统接过他的担子，继续努力稳定巴西的货币，防止通胀螺旋彻底失控。"
 BRA_deficit_hawks_tavora: "低赤字鹰派"
 BRA_deficit_hawks_tavora_desc: "长期以来，不受约束的肆意开支给巴西的财政带来了灾难。不负责任的政府开支导致政府负债全方位上升，塔沃拉总统的前任却完全无力扭转这种危险的状况。我们要把视线从过去的宏伟计划中转回当下，采取新措施来控制政府赤字。\n\n全民盟和塔沃拉本人都赞成控制政府开支的必要性，但我们尚未做出正式的决策。是时候全方位的削减政府开支了，即使是某些社会项目的开支也包括在内。只有手里握住了可供支配的真金白银，我们才有了应对当前经济下行的本钱。"
 BRA_loan_sharks: "高利率恶鲨"
 BRA_loan_sharks_desc: "我国的高赤字导致我国的国债规模正在膨胀到极其危险的水平。当然，这是全民盟长期以来试图压制通胀的副作用。为了让通胀率回落到可接受水平，就必须将贷款利率提高到高位来防止货币贬值。虽然这种行为会被某些人看作是在拆东墙补西墙，但塔沃拉相信我们可以在控制好通胀的同时让赤字保持在安全水平。\n\n我们将一次性大幅削减开支来为控制赤字争取时间。只要我国的经济脱离了危险，就可以将开支恢复到正常水平，继续为巴西克鲁赛罗而战。这不啻于在悬崖上走钢丝，但如果说有谁能走到终点，那一定是塔沃拉总统。"
 BRA_end_guanabara_dream: "终结瓜纳巴拉之梦"
 BRA_end_guanabara_dream_desc: "瓜纳巴拉地区遭遇的灾难性风暴及其带来的毁灭性打击确实是一场悲剧，但被用于当地重建工作的巨额资金投入已经远超最初的计划，是不可持续的。投入如此多的资金并不只是为了重建，更是因为拉塞尔达本人对此寄予厚望，但与此同时，巴西的其他地区却在压缩开支，执行财政紧缩政策。\n\n是时候结束重建工作，亡羊补牢了。为了向巴西人民证明我们的决心，有时割舍掉不切实际的幻梦或者打破不可逾越的铁律是很有必要的。"
 BRA_tavora_guanabara_dismantle_megaproject_tooltip: "我们将取消§Q拉塞尔达§!§R失败的私人项目§!——瓜纳巴拉重建工程。"
 BRA_nordeste_reinvestment: "再投资东北"
 BRA_nordeste_reinvestment_desc: "作为塞阿拉州的前州长，塔沃拉十分关注东北地区的政治和经济潜能。然而，不幸的是，居住在当地的大部分群众对全民盟并不感冒，历史上一直是工党主宰着当地的政坛。\n\n如果全民盟加大对当地的投资，也许就能让数以千计的选民倒向我方，甚至在选举中完全扭转我们党在当地的劣势地位。"
 BRA_loyal_middle_class: "忠实的中产阶层"
 BRA_loyal_middle_class_desc: "全民盟最主要的票仓是中产阶层。要想让我们的党在政坛上长久立足，第一要务就是与这一群体维持良好的关系。\n\n塔沃拉将向我们的核心选民承诺，全民盟依然在为了广大人民的利益而奋斗，而且绝不会重演过去的错误。为了建设更美好的巴西，最关键的就是要迎合中产阶层。毕竟，能决定政府成败的是他们的意愿。"
 BRA_meet_the_psd: "会见社民党"
 BRA_meet_the_psd_desc: "由于拉塞尔达的下台，全民盟正日益孤立，急需找到盟友来维持巴西利亚的权力平衡。很幸运的是，塔沃拉总统正有一些州长时期留下的人脉。在塞阿拉州主事的时候，他的施政很大程度上有赖于社民党的支持，他们一直都是全民盟最亲密的盟友。\n\n我们要和社民党进行沟通，试着去和他们达成某种形式的协议。他们无疑会提出一些苛刻的条件来换取对我们党的支持，但如果会谈取得成效，塔沃拉执政的阻力就会减少许多，我们也就能腾出更多精力去解决一系列更紧迫的问题。"
 BRA_tavora_big_tent: "塔沃拉的大帐篷"
 BRA_tavora_big_tent_desc: "全民盟并非铁板一块。这个名义上的保守主义政党已经在事实上成为了反对瓦加斯主义的各路派系的大杂烩，有自由派，保守派，甚至左派。虽然他们之间的关系十分紧张，但我们的党要想继续坚持下去，就势必要维护党内的团结。\n\n塔沃拉和他的盟友将会和全民盟内部的各个派系交流来保障他们的意见能够传达到党的核心层，无论他们的意见在多大程度上和我们相左。面对越来越强大的外部压力，我们经受不起在这种时候爆发内斗的后果。当我们的党经受住了来自外部的严峻考验，他们才会意识到我们依然团结一致，为了根除瓦加斯主义的流毒而战。"
 BRA_cement_realist_dominance: "巩固现实主义"
 BRA_cement_realist_dominance_desc: "全民盟是一个内部派系林立、政见各异的党派。这种格局的弱点过于明显，无需赘述；拉塞尔达试图通过推翻瓦加斯时期的劳工法强迫全党上下服从他的意志，我们绝不能再重蹈覆辙，像他那样毫无意义地分裂我们的统一战线。我们必须小心行事，绝不能让拉塞尔达式的政客再次得势。"
 BRA_conference_season: "大会季"
 BRA_conference_season_desc: "全民盟的全党大会召开在即，但许多人对此只有恐惧。这将是我们党历史上最为艰难的一场全会：名声扫地的拉塞尔达被禁止出席会议，可他的许多盟友坚决要求与会，这可能会让事情变得更加复杂。塔沃拉在党内本就根基不稳，眼看党内裂痕一天天扩大，他这个总统还能不能当下去，谁也说不准。\n\n全民盟是将走出拉塞尔达政府铸成的错误，继续为对抗瓦加斯主义的回潮而团结一心，还是将在政治危机里土崩瓦解，沦为史书中的悲剧教训？大会的结果将揭晓这个问题的答案。但愿命运会做出我们祈求的裁断。"
 BRA_knife_edge: "刀尖之上"
 BRA_knife_edge_desc: "条形图与统计表被刊登在报章之上，张贴于全国各地大小城镇的公告栏中。拉塞尔达的失败如梦魇一般挥之不去，双方的支持率始终在毫厘之间。\n\n我们必须动用媒体关系，与所有“恨敌胜于恨我”之人结成联盟，把所有资源都砸进广告、发起宣传战役。我们必须用尽一切办法，捍卫保守派的阵地，巩固中产阶级的支持，夺回对城市的控制权。左翼浪潮正在反扑，我们的时间不多了。\n\n巴西已经承受了太多苦难。绝不能让她再度落入瓦加斯主义的魔爪！"
 BRA_the_crow_triumphant: "乌鸦得胜"
 BRA_the_crow_triumphant_desc: "拉塞尔达的总统任期过得非常充实，他处理了一场全国大罢工，收拾了瓦加斯主义者，以自由市场资本主义、低通胀和海量外资为巴西建立起了新的经济秩序。在这一新秩序下，更多的巴西人享受到了教育与医疗服务，永远地摆脱了贫困的囚笼。与此同时，拉塞尔达还保证了军队对政府的忠诚，让巴西成为了南美大地上的民主卫士。\n\n此等辉煌成就已经够拉塞尔达躺在功劳簿上，悠闲地享受他最后一年任期了。毕竟他为改善巴西做出的贡献，可比前三任总统加起来都要多。不过，拉塞尔达很清楚，若要让自己的政治遗产顺利步入七十年代，他就得再去处理一件大事。那便是巴西的民主。"
 BRA_lacerda_final_challenge: "终极挑战"
 BRA_lacerda_final_challenge_desc: "虽说把民主说成一个问题有悖全民盟的理想，但它仍是摆在拉塞尔达面前的终极挑战。总统的政策让我们的国家蒸蒸日上，但也为他树立了不少敌人。拉塞尔达最关键的对手就是前南里奥格兰德州州长莱昂内尔·布里佐拉，他比总统在65年那会儿面对的对手更加危险。此人能靠花言巧语将我们的敌人都团结到自己麾下，甚至还为要至巴西于死地的运动摇旗呐喊。布里佐拉得到了工党的支持，与此同时社民党中还有不少人不惜舍弃理想，也要为瓦加斯的政治遗产报仇雪恨。\n\n拉塞尔达认为，普天之下只有两人有望战胜布里佐拉。一个是拉塞尔达自己，但在巴西宪法的限制下，他只有等到1975年才能再度竞选总统。他只剩下一个选择，瓜纳巴拉的新州长，拉斐尔·马加良斯。也就是说，拉塞尔达要在最后的这段时光里确保马加良斯成为全民盟的参选代表，同时尽可能地孤立社民党。"
 BRA_lacerda_final_challenge_tt: "为了巩固遗产，§Q拉塞尔达§!必须在接下来的选战中击败§V布里佐拉§!。"
 BRA_beltraos_triumph: "贝尔特朗的胜利"
 BRA_beltraos_triumph_desc: "贝尔特朗在财政部长的位子上大获成功，他降低了通货膨胀，还为结束罢工出力良多。不久以后，他为巴西经济规划的最后一章也将徐徐展开。我们在现代化方面付出的努力赢来了回报，来自各个OFN成员国数以千万计的投资正在涌入巴西。这一笔又一笔的资金可以用来偿还债务，也可以继续支持现代化事业，还能进一步投资教育与卫生事业。此外，我们还应该用这笔钱支持竞选。\n\n虽然有人会说这样挪用境外投资是贪污腐败，但投资方都很清楚布里佐拉的胜利会对他们的资金产生怎样的威胁。财政部的官员们表示，一些投资人正在限制涌入巴西的资金，因为他们都担心布里佐拉的当选会损害他们的收益。因此，将这笔资金用在全民盟的竞选事业中还能为巴西赢得更多投资。"
 BRA_ice_cold: "冰凉爽口"
 BRA_ice_cold_desc: "美国一些规模最为庞大企业正在敲打着巴西的大门，想要注资千万以助巴西经济腾飞。可口可乐，或许称得上是最典型的美国企业，正打算投资米纳斯吉拉斯。他们要在那里盖一座新的装瓶厂，光这座工厂生产出来的汽水就足以让全国享受到冰凉与清爽。巴西正计划着从生产力颇丰的农业国转型为南美的食品加工强国，这条可乐产线就是我们需要的东西。干杯！"
 BRA_bank_of_sam: "山姆大银行"
 BRA_bank_of_sam_desc: "美国是西方世界的金融中心，整个星球都在美元的海洋中起起伏伏。我们同华尔街的大亨们：美国银行、摩根大通、高盛等公司进行了会谈，成果颇丰。双方正在探讨由华尔街接管巴西债务的相关事宜，其中的条款对各方都大有裨益：它将遵照我们的竞选承诺降低联邦债务，同时还能为接手我国债务的美国人带去合理的利润。真是不费吹灰之力呀！"
 BRA_brazil_open_to_all_lacerda: "大门常开"
 BRA_brazil_open_to_all_lacerda_desc: "许多巴西人都希望我们支持国内的公司，赋予他们经济特权。无论背后的经济强国目标有多高尚，这些“发展主义者”也都是只短视者。溺爱和保护我们的公司只会鼓励低效、扼杀竞争，巴西公司将再难与世界各国大厂同台竞技。\n\n恰恰相反，我们应该打造自由市场，允许外国资本前来巴西开展业务，强迫国内公司适应竞争，不断超越……否则唯有死路一条。巴西大门常开，拉塞尔达便是它的门童。"
 BRA_brazil_hotline_rio: "里约热线"
 BRA_brazil_hotline_rio_desc: "里约热内卢的重建工作已近尾声。在我国最大的城市遭灾后，时至今日，我们总算可以拍着胸脯说它正处在有史以来的最佳状态了。崭新的摩天大楼，重新铺设的道路，国际大都会所需的一切基础设施与服务都已准备万全。瓜纳巴拉的明珠成为了拉美最亮的明星：布宜诺斯艾利斯、墨西哥城、加拉加斯和哈瓦那都无法与之媲美。就连迈阿密都把它当作了赤道以南的全新对手。\n\n黎明的朝阳爬上了面包山头，里约正沐浴在阳光之下。"
 BRA_setting_sun: "残阳西下"
 BRA_setting_sun_desc: "巴西外交政策中的一大命门，同时也是我们在民主同伴面前的一大污点，就是我国同日本帝国的商贸往来。\n\n为了保持中立与发展经济，库比契克与洛特误入歧途，靠向了东京，任由财阀闯入巴西掠夺资源，剥削国民。日本依旧是个法西斯独裁国家，仍妄图主宰世上的一切“弱国”，而前总统们却就这样看着他们大摇大摆地走了进来。\n\n我们不会发布任何公告，也不会放出一点消息，只会让繁文缛节更加恼人，顺带再添上一点新税。依靠此举让日本商品在巴西越发步履维艰、无利可图，同时我们还会跟OFN的真朋友们越走越近。不久以后，日本的影响力就会在不知不觉中如安第斯山脉上的残阳一般，消失得无影无踪。"
 BRA_a_slow_drift: "钝刀割肉"
 BRA_a_slow_drift_desc: "日本对巴西的威胁无比清晰又迫在眉睫。然而，在数十年的投资与支持后，无论好坏，我们都和大洋彼岸的帝国紧密地联系在了一起。拉塞尔达政府内不少官员都建议发起迅速猛烈的打击，一举扫清日本的影响，但此举代价无比高昂：工人失业、投资流失、增长放缓，更恐怖的是布里佐拉和小瓦加斯可能会利用这个契机，在接下来的大选中向着全民盟火力全开。\n\n拉塞尔达拿定了主意，我们必须小心行事，利用官僚与司法系统，推动源自友邦的经济发展，让巴西摆脱共荣圈的控制。这一策略进展缓慢，耗时颇多，但它不会损害我国的经济。毕竟，在伊索寓言中，行动缓慢但稳扎稳打的乌龟最终战胜了狡兔。"
 BRA_trade_war: "贸易战"
 BRA_trade_war_desc: "日本帝国乃是巴西持续繁荣道路上最大的恶敌。敲骨吸髓的财阀，毁灭民主的法西斯分子，再加上帝国主义的狂妄无知，势必要让巴西沦为日本的傀儡，变成大东亚共荣圈的又一块殖民地。\n\n值此危难时刻，巴西国内却多了一批能为日本大开方便之门的蠢货。要是布里佐拉或是那杀千刀的小瓦加斯赢得了大选，我们为自由所做出的一切努力就都将付诸东流。为此，拉塞尔达决定对日本产品征收新的关税，并进一步降低我国资源与工厂对日企的开放程度。此举将会挑起对日贸易战，巴西的经济增长也可能会受到影响。但只要等来了美国的投资，我们不仅能减小这些损失，还可以把它们全给补上。\n\n为了维护巴西的主权，为了我们脆弱的民主，这只是微不足道的一点代价。"
 BRA_the_new_colossus: "新巨人"
 BRA_the_new_colossus_desc: "拉塞尔达总统将巴西打造成了照耀南美的新灯塔。今日的巴西是热带的巨人，它的经济蒸蒸日上，工业化进程如火如荼，还有数以千万计的外资不断涌入。当然，蓬勃发展的可不只有经济。如今的巴西还是南美洲最民主的国家之一，人民的自由安全无虞，伟大的社会项目遍地开花。\n\n为经济成就尽情喝彩吧，我们要让全世界听到巴西的成功。在媒体的笔下，巴西是一座崭新的山巅之城，而我们也欢迎世界各地的人民来到巴西，融入巴西，为我们伟大的国家添砖加瓦。"
 BRA_confront_argentina: "直面阿根廷"
 BRA_confront_argentina_desc: "拉塞尔达总统在他的任期内处理了一系列外交问题，但如今还有一项难题正摆在我们面前，这就是同阿根廷展开的长期冷战。阿根廷是我们潜在的重要贸易伙伴，这场漫长的冷战一直都是经济发展之路上的拦路虎。不过，在拉塞尔达与库尼亚的努力之下，巴西的盟友数量早已在阿根廷之上，现在我们想到了一种可以让此事实大白于天下的方法。\n\n我们可以通过和拉美以及OFN的盟友一同开展一系列军事演习来大秀肌肉，让阿根廷看清巴西的实力，告诉他们谁才是南美洲真正的主人。通过这场武力展示，我们有望将阿根廷逼到谈判桌前，一劳永逸地结束南美冷战。"
 BRA_confront_argentina_tt: "§Q总统§!将通过一系列军事演习恐吓§D阿根廷§!，让他们到谈判桌前。若这场豪赌成功，£GFX_BRA_udn_texticon §Q全民盟§!将在选举中获得§G重大支持§!。"
 BRA_bolster_the_bulwarks: "加固壁垒"
 BRA_bolster_the_bulwarks_desc: "当然，为让演习顺利开展，我们可能得向拉美盟友们派出说客。我们要用金钱和武器来说服他们，让拉美的兄弟们为演习做好万全的准备。还要让外交官去游说那些更加谨慎的盟友，让他们明白联合军演可以从训练与补给这两个方面提升两军的实力。此外，我们还可以向那些摇摆不定的政府施压，让他们早做打算。上述外交行动都有望说服那些谨慎盟友参加军演。"
 BRA_fear_is_the_mind_killer: "恐惧乃心灵杀手"
 BRA_fear_is_the_mind_killer_desc: "有消息显示，阿根廷政府已经知晓了我们演习的意图，两国关系持续紧张。阿根廷政府正在将军队派往巴西边境，声称这是为了防止OFN借演习为名入侵阿根廷。但我们必须保持冷静，阿根廷人不过是想靠着动员军队来吓退我们。巴西必须继续组织军演，向阿根廷展示我国与盟友的实力。"
 BRA_diplomatic_angle: "外交策略"
 BRA_diplomatic_angle_desc: "阿根廷持续对我方军演做出消极的反应。我们虽想通过此举终结南美冷战，但阿根廷却在不断加剧紧张的局势。我们接到的报告称，阿根廷正在向两国边境集结大军，他们执拗地认定联合军演只是全面入侵的幌子。\n\n外交部长瓦斯科·莱唐·达·库尼亚建议我们建立特殊外交渠道，缓解两国剑拔弩张的态势。政府应当采纳这条建议，通过外交策略缓解阿根廷对联合军演的恐惧。"
 BRA_naval_manoeuvre: "海军演练"
 BRA_naval_manoeuvre_desc: "海军是联合演练中的一大重点。我们拉美盟友的海军规模大多很小，但OFN舰队可是南大西洋的定海神针。虽然此处的德国势力正在不断衰退，但巴西仍应当学着同OFN协调作战。我国海军从这些演习中获得了自我提升的绝佳机会。世人普遍认为，美国拥有史上最强大的海军，而我们的水手将要同他们一起工作训练。希望这些训练可以改善巴西海军，让我们获得保卫南大西洋的实力，成为拉美最强大的海上小霸。"
 BRA_joint_army_ops_lacerda: "联合军事行动"
 BRA_joint_army_ops_lacerda_desc: "不久以后，巴西军队就会同拉美盟友们开展联合军演，一探我军究竟该如何应对同阿根廷间爆发的热战。此次演习的重点在于熟悉巴西-阿根廷边境上的地形与河流走势，同时确保我们的盟友都能适应OFN的军事装备。\n\n美国人不希望刺激阿根廷，让事态无法挽回，因此不会向我国派遣一兵一卒。此事着实可惜，但美国顾问将在此次演习中为各国部队提供建议，并安排进一步的训练。"
 BRA_tavoras_masterplan: "塔沃拉的大计"
 BRA_tavoras_masterplan_desc: "老话说得好——“分而治之，各个击破”，维尔吉利奥·塔沃拉从全民盟在1955年的失败中学到了这个道理。塔沃拉将昔日的教训牢记于心，并将其打造为马加良斯1970大选的核心策略。塔沃拉已经在自己的老家塞阿拉试行了这一对策，他将布里佐拉和他的盟友们描述成要让巴西走进共产主义死胡同的激进分子，借此在社民党-工党联盟中制造分裂。凭此策略，在十月，我们或许能让传统派社民党选民转投全民盟一票。"
 BRA_tavoras_masterplan_tt: "£BRA_udn_texticon §Q拉斐尔·马加良斯§!在§Y西北地区§!的支持率§G上升§!§Y3%§!。"
 BRA_repair_liberdade: "重建自由区"
 BRA_repair_liberdade_desc: "虽然我们总说全民盟在拉塞尔达总统的任期内大获成功，但本届政府同样远非完美。在过去数年的时间里，全民盟政府沾上的最大黑点便是在种族暴乱中摧毁了圣保罗的自由区。当时造成的破坏，再加上之后潦草重建酿成的恶果，已经反应在了马加良斯的圣保罗州民调当中。\n\n为清除这一污点，我们应当动用联邦资金重建这座城市，同时通过媒体让全体国民都认识到是全民盟在开展这项工程。这两项对策都可以改善全民盟在圣保罗的民调状况。"
 BRA_repair_liberdade_tt: "£BRA_udn_texticon §Q拉斐尔·马加良斯§!在§Y圣保罗§!的支持率§G上升§!§Y1%§!。"
 BRA_werewolf_nightmare: "狼人梦魇"
 BRA_werewolf_nightmare_desc: "全民盟的每一位党员都知道，布里佐拉的胜选乃是巴西的灾难。然而，根据民调显示，这样的意见在巴西平民当中远不及在党内那样常见。为让巴西大众支持全民盟，我们必须在他们心中种下恐惧的种子。要让民众担心布里佐拉会在当选后推动激进的政策，引发共产主义革命，害巴西落得俄国一样的下场。这一计划若能成功，受教育的工人阶级、中产阶级与统治精英就会掉转矛头对准布里佐拉。希望反对布里佐拉的选民们可以为全民盟的十月大选募得充足的资金。一切顺利的话，播撒恐惧的策略会帮助我们赢下大选。"
 BRA_isolate_the_psp: "孤立社进党"
 BRA_isolate_the_psp_desc: "虽说工党-社民党联盟才是全民盟的主要政敌，但社进党也推出了一位候选人，我们至少得要盯住他们。不过根据分析显示，社进党不会对我们构成任何威胁。\n\n社进党势单力薄，对全民盟的选民来说它的瓦加斯主义气质太过强烈，对社民党-工党联盟的选民来说它又右倾过了头。他们的候选人缺斤少两，再加上全民盟政府一直在努力揭露社进党高层的贪腐问题。对我们而言，分裂和孤立社进党简直易如反掌。只要完成这一计划，我们就能确保小瓦加斯一辈子都没法上升到他爹的高度。"
 BRA_doomsday_clock: "末日之钟"
 BRA_doomsday_clock_desc: "离十月大选又近了一分，我们绝不能再让65年选举的动荡再次上演。为防接下来数月间发生突变，我们必须确保军队的忠诚，倘若选举陷入僵局，也不能让他们再度玩起权力的游戏。为此，我等要锁定军中同情工党的军官，将他们调离关键岗位，绝不能让他们在工党落选时节外生枝。在这最后数月的时间里，我们还应当凝聚政治力量，确保最终的政策顺利落地。"
 BRA_squeeze_the_psd: "挤压社民党"
 BRA_squeeze_the_psd_desc: "布里佐拉的一些政策与立场甚至对工党来说都显得有些激进了，也难怪一些社民党人会说他是共产主义者。我们从中受益良多，毕竟大多反对布里佐拉的社民党选民都转到了全民盟门下。但为了让马加良斯坐稳总统之位，我们必须再进一步。社民党内不乏明智的右派领袖，比如奥罗·德·莫拉·安德拉德和帕斯库亚尔·拉涅里·马齐利。虽然我们没法说服他们支持马加良斯，但至少能让他们停止支持布里佐拉。只要他们闭上嘴巴，社民党-工党联盟的社民一侧就会遭受重创。"
 BRA_squeeze_the_psd_tt: "£BRA_udn_texticon §Q拉斐尔·马加良斯§!在§Y南部§!的支持率§G上升§!§Y2%§!。"
 BRA_keeping_clean: "盗亦有道"
 BRA_keeping_clean_desc: "在选举期间，我们一不留神就会弄脏自己的双手。我们可以从早到晚使出浑身解数诽谤布里佐拉，直到整个竞选活动都变成在报纸上刊登小作文。全民盟的选举团队可以向每家主流媒体施压，要求他们每天写一篇关于工党政客的风流韵事、受贿指控，甚至是非法捕捞海龟的新闻。\n\n然而，这一策略后患无穷。布里佐拉拥有忠实的票仓，向他本人和盟友开火，只会让工党的支持者火冒三丈。左派已经把建制派视作敌人了，这些诽谤只会落实他们心中的猜疑。对布里佐拉用上肮脏的策略，或许还会在愤怒的左翼当中激起暴动与罢工。为了巴西的长治久安，我们必须有所收敛。"
 BRA_getting_dirty: "不择手段"
 BRA_getting_dirty_desc: "布里佐拉的民调状况比我们预想的好得多，全民盟绝不能再输掉这场选举。\n\n我们在1955年输给了库比契克，害得巴西陷入了十年滞涨。我们在1960年输给了洛特，虽然他确实是个极具魅力的家伙，但还是没能止住国家腐烂的颓势。1965年似乎成了例外，巴西民众在那段短暂的时光里总算看清了瓦加斯主义的愚蠢之处。时间到了1970年，悲剧似乎又要再度缠上巴西的百姓。\n\n十月的大选输不得！我们呕心沥血地带领巴西摆脱瓦加斯主义，踏上正道，如今种种努力都要灰飞烟灭。我们要用上古往今来的一切阴谋诡计，定要叫布里佐拉崩溃，让他的团队燃烧。"
 BRA_getting_dirty_tt: "£BRA_udn_texticon §Q拉斐尔·马加良斯§!在§Y里约热内卢§!的支持率§G上升§!§Y2%§!。\n£BRA_ptb_texticon §V莱昂内尔·布里佐拉§!在§Y南部§!的支持率§G下降§!§Y3%§!。"
 BRA_globo_domination: "环球电视台霸权"
 BRA_globo_domination_desc: "自打1965年成立以来，环球电视台一直都是巴西媒体的中坚力量。作为巴西收视率最高的电视台，它基本上垄断了受过教育的中产阶级与买得起电视的工薪阶级的休闲时光。\n\n我们撞了大运，环球电视台的老板跟全民盟是一路人，罗伯托·马里尼奥是马加良斯竞选活动的大金主。我们可以通过他的渠道建立秘密的往来关系，确保环球电视台名下包含国家新闻在内的节目都会为全民盟奉上正面报道。此外，我们还会允许环球电视台直播马加良斯与布里佐拉史无前例的电视辩论，前提是他们提的问题都对要利于马加良斯。"
 BRA_live_on_air: "现场直播"
 BRA_live_on_air_desc: "不久之后，巴西就将开展首次电视辩论，此次辩论将由环球电视台全权负责。电视台邀请了三位关键候选人，马加良斯、布里佐拉与小瓦加斯。电视辩论对美国总统大选的影响可谓有目共睹，此次辩论的胜负也会成为巴西大选的决定性因素。简而言之，1970大选将成为巴西历史上第一届由电视左右的选举。\n\n我们希望，这次辩论可以通过布里佐拉的激进思想与小瓦加斯的民粹理念反衬出马加良斯的沉稳与理智。只要马加良斯保持冷静，得体地回答所有问题，这场辩论必定会利于全民盟的竞选事业。"
 BRA_lacerda_judgement_day: "审判之日"
 BRA_lacerda_judgement_day_desc: "一切选择的兑现时刻已至：选举日来了。我们是否实现了自由的承诺？我们是否改善了巴西的经济？我们的执政是否让巴西变得更加美好？千百万国民将前往投票站做出回答。\n\n时间所剩无几，我们已经没有进一步说服选民的方法了。政府已不再能影响人民、换取支持，接下来只能靠竞选团队的喇叭与嗓门了。拉塞尔达总统将做最后一次呼吁，希望群众为自由、民主与繁荣投出宝贵一票，其余部长也会纷纷跟进。\n\n在此之后，唯余等待……"
 BRA_lacerda_judgement_day_tt: "£BRA_udn_texticon §Q拉斐尔·马加良斯§!在§Y西北部§!的支持率§G上升§!§Y2%§!。"
