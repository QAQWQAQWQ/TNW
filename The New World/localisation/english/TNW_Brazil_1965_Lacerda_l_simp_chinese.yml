 brazil_lacerda_sorbonne_campaign.10.t: "经济十字路口"
 brazil_lacerda_sorbonne_campaign.10.desc: "后台的内伊·布拉加听到开场白结束，便也结束了自己的祷告。他走向讲台，巴西银行联合会的一众成员起立鼓掌。他挂上一丝迷人的微笑，理了理讲稿，开了口。\n\n“并非每一个国家经济发展计划的公布，都会伴随着一则讣告，更何况悼念的还是一位外国人。”台下传来几声轻笑。“但若不向勒布雷神父致谢，便是我的疏忽。他的教诲，不仅为圣保罗和我家乡巴拉那州带来了人文关怀与快速发展，更因为这位神父与经济学家的愿景，将通过我的新政，为国家带来繁荣与新生。”现场的气氛开始升温。\n\n“我希望，我们的计划也能成为在座各位的计划。因为每一项举措的核心，都是公私合营——由国家提供的长期稳定资本与市场规律相结合，共同打造世界顶尖的基础设施和高新科技。对巴西国家石油公司的新投资，将在时局动荡之际保障我们的石油供应。对电信与计算机产业的战略扶持，将让我们在未来十年的全球市场中抢占先机。而在座各位的投资，则会让巴西在不依赖外债的情况下，实现这一切。”掌声雷动，经久不息。\n\n“但正如耶稣所言，被要求投资的，不光是那个有十枚银币的仆人，有五枚的、只有一枚的，都同样有份。若诸位推选我为总统，我向大家保证，那些服务全体巴西民众的公共设施——道路、学校、医院——无论他们是贫是富，都能得到应有的支持，以服务于国家的发展。”会场陷入冰封般的静默。\n\n“我邀请各位去巴拉那看看，看看一个积极审慎的政府、活跃的私人资本，以及一颗仁爱邻里之心相结合，能创造出怎样的现代化、机遇和繁荣。”平稳而克制的掌声再度响起。"
 brazil_lacerda_sorbonne_campaign.10.a: "一个人怎能既侍奉上帝，又侍奉玛门呢？"
