 BRA_Liberdade_in_Ashes_desc: "度过充满暴力与仇恨的几天后，圣保罗恢复了寂静。\n\n自由区，日本本土之外最大的日本人社区之一，已经化为废墟。虽然重建工作已经开始，但这场事件无疑已经在日系心底刻下了深深的伤痕。虽然自暴乱开始以来，种族犯罪的发生率第一次有所下滑，暴乱的余波依然让许多日系选择搬离自由区。流血已经终止，但很显然，治愈创伤还需要很长的时间。"
