 brazil_lacerda_sorbonne_campaign.33.t: "完美收官"
 brazil_lacerda_sorbonne_campaign.33.desc: "布拉加的竞选活动搞得声势浩大、旷日持久，但结尾却轻松平常得多，形成鲜明对比——当然，对跟在他身后的记者们来说，这依然是抓拍新闻的好机会。\n\n他决定回到库里蒂巴为竞选收尾，去些老地方，见些老朋友。他对这座城市熟悉得就像自家的后院，带着环球电视台的记者们在城里七拐八绕，从一个老街坊逛到另一个小馆子，脸上挂着的那种发自内心的享受任谁都能看得出来。他就在这走走停停中，完成了访亲会友的行程。\n\n他刻意让镜头捕捉下自己与姐姐埃斯特拉及孩子们共享天伦之乐的真实画面——那些发自内心的幸福、快乐与笑声。毕竟，这是电视节目的绝佳素材，而且在这儿也没什么可担心的。他知道，这里的选民无论如何都会投他，所以根本没什么压力。\n\n于是他乐在其中。他已经拼了那么久，有这么轻松的结尾似乎也不错。不过话说回来，这仍会是一篇很好的报道。他唯一想知道的，是民众会怎么看——任何一个政客都会想知道这个的。"
 brazil_lacerda_sorbonne_campaign.33.a: "他们爱戴他们的州长——我会为这样的人投票。"
 brazil_lacerda_sorbonne_campaign.33.b: "他自信是因为有军队撑腰。"
