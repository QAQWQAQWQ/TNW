 brazil_lacerda_sorbonne_campaign.9.t: "对农民的讲话"
 brazil_lacerda_sorbonne_campaign.9.desc: "南里奥格兰德艳阳高照，内伊·布拉加胯下的骏马由疾驰转为缓步，朝人群聚集处踱去。得益于早年军旅生涯的锤炼，他操控缰绳的动作显得游刃有余。他和同行的骑手们来到地主和牧场工人的集会点，这是他竞选活动的一站，由当地一位富豪朋友组织。客人们对着烤肉大快朵颐，布拉加则翻身下马，走向临时搭建的木台。桌边的谈笑声渐渐消失，众人纷纷把目光投向这位演说者。\n\n布拉加先是发表了一番他那套经典的开场白，但很快便转入了听众关心的话题：“……我必须感谢诸位让我领略如此壮丽的风景，驰骋在这片农场真是令人心旷神怡，而这一切，都是你们辛勤耕耘的结果。”布拉加顿了顿，神情严肃起来：“我当兵的时候，见过很多没这么幸运的农场。那些地方，也曾像这里一样美丽，却被非法占据和暴力冲突毁掉了。好在，现任政府解决了这些问题。大家可以放心，如果我当选，我保证会让南里奥格兰德州的农民都过上好日子！”\n\n台下掌声雷动，布拉加必须立刻决定下一个话题的方向：军事。南里奥格兰德州有着悠久的从军传统，这个话题他非讲不可，但具体怎么讲，他还没想好。考虑到州里有大量的东欧和犹太后裔，他是该强调全球反法西斯的斗争？还是该把重点放在切身关切的南美问题？人群安静下来，等待布拉加继续他的演讲。"
 brazil_lacerda_sorbonne_campaign.9.a: "永远警惕南方！"
 brazil_lacerda_sorbonne_campaign.9.a.tt: "§Y$BRA_pres_region_4$§!\n  §G提高§!§L$BRA_pres_candidate_name_9$§!的竞选势头，且使§G支持率§!随时间推移而增长。"
 brazil_lacerda_sorbonne_campaign.9.b: "为全世界被法西斯压迫的民众争取自由！"
