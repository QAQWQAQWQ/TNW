 brazil_lacerda_sorbonne_campaign.31.t: "神圣启示"
 brazil_lacerda_sorbonne_campaign.31.desc: "这些日子，内伊·布拉加想找个清净地方待会儿，仿佛都成了奢望；选战的喧嚣让他一刻都不得安宁。有人在书斋一角寻得内心平静，有人在杯中之物求得片刻忘忧，而布拉加，则是在周日的弥撒中找到了属于自己的那份安宁。这是他生命中仅存的几个恒常不变的慰藉之一，也是一处能让他不必成为演讲或各类事务焦点的地方，一个能让他只是坐着、听着、想着的地方。\n\n礼拜仪式在继续，他的思绪却充斥着许多问题。他想着上帝，想着祂为巴西安排了怎样的命运。他问自己，是否有足够的力量去实现，自己又能否担当得起这份重任。如果发生了最坏的情况，他是否有勇气与军队抗衡？\n\n领圣餐的时刻到了，布拉加吃下那饼与酒，他感觉自己仿佛恢复了活力，疑虑也随之消散。最后的仪式结束，他知道，他必须去分享他的愿景，必须让每一个普通的巴西人都明白这场选举的利害所在。唯一的问题是，该去哪里分享呢？"
 brazil_lacerda_sorbonne_campaign.31.a: "里约是繁华的都会，能吸引来庞大的人群。"
 brazil_lacerda_sorbonne_campaign.31.b: "库里蒂巴是我的故乡，那里的人民会倾听我的声音。"
 brazil_lacerda_sorbonne_campaign.32.t: "一决胜负"
 brazil_lacerda_sorbonne_campaign.32.desc: "若泽·萨尔内被笼罩在马拉卡纳体育场的庞大阴影下，看台上，支持者们正骄傲地呼喊着口号，高唱着歌颂安定繁荣与民主的赞歌。几位军人主持开场仪式，他们对主办方签署合约的“明智决定”给予了“高度评价”，但全场的焦点，显然还是聚焦在候选人身上。掌声响起，内伊·布拉加迈步登场，现场气氛也随之达到了顶点。\n\n布拉加花了一会儿才适应眼前的阵势，从宏伟的场馆、汹涌的人潮，到大厅两侧肃立的士兵。“大家都很热情，但我一点都不意外。看看我们这几年取得的成绩吧，通胀率史上最低，识字率史上最高，贫困人口持续减少，极端势力也被赶进了阴沟。拉塞尔达让巴西更光明、更富裕、更强大，而我的政府也会跟他一样！”\n\n之后，演讲的重心略有下沉，从宏大的竞选口号转向具体的执行细节，描绘出一幅如何维持成功的、清晰而持久的蓝图。军队对这类承诺的反应尤其热烈。“把未来五年交给我们吧，”布拉加高呼，“我们绝不会让你们失望！巴西总算走上了正轨，只要再给我们一个任期，我们便能沿着这条康庄大道继续前行。愿自由的阳光照耀我们的长空！”\n\n人群爆发出震天喝彩，口号声浪也再度高涨。现场的记者已近乎疯狂，他们对着镜头高声断言，在这篇充满远见的演说之后，剩下的不过是一场等待已久的加冕礼。可萨尔内却注意到，人群散去时，那些士兵并没有跟着离开。他们均匀地分布在看台上，纹丝不动，直到指挥官发出指令，才排着整齐的队列离去。"
 brazil_lacerda_sorbonne_campaign.32.a: "布拉加只觉背脊发凉。"
