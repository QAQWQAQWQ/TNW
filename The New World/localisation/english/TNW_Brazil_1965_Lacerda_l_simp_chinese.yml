 brazil_lacerda_sorbonne_campaign.17.t: "雨洒竞选路"
 brazil_lacerda_sorbonne_campaign.17.desc: "内伊·布拉加抬头望向办公桌上方装裱在镜框中的军功章，办公室的灯光在奖章光滑的表面上流转。他又将目光转向窗外，窗玻璃上正划过道道雨幕。即使在如此恶劣的天气里，社民党组织的抗议者还是聚集在楼下。布拉加发现，今天的人，居然比昨天还多，显然雨水浇不灭那些人的怒火。\n\n有几个抗议者开始上头，开始推搡守着警戒线的警察。警察也恰到好处地还了手，他看着那几个人被警棍打了回去。旁边的人也跟着遭了殃，前排的人捂着伤口，人群稍稍后退了些。\n\n隔着雨，布拉加都能看到人群里又多了些青一块紫一块的面庞。他知道，这些人明天还会回来，而且会憋着一肚子火回来。他们会把身上的疼，变成心里更坚定的念想，觉得非得继续闹下去不可。而且，他们还会把自家的亲戚朋友都给带来。这出戏，布拉加已经看腻了，警察的做法根本于事无补。他从没下令要以这样的方式“镇压”，更烦人的是，这帮吓不住人的软脚虾纯粹是在帮倒忙！\n\n看烦了这没完没了的闹剧，布拉加的视线又回到墙上的勋章上。"
 brazil_lacerda_sorbonne_campaign.17.a: "一定还有更好的方法。"
 brazil_lacerda_sorbonne_campaign.17.tt: "§Y[BRA_pres_selected_region_dynamic]§!\n  §G提升§!§Y$BRA_pres_candidate_name_1$§!的竞选势头。"
 brazil_lacerda_sorbonne_campaign.18.t: "谨慎与后果"
 brazil_lacerda_sorbonne_campaign.18.desc: "就算是最成功的竞选活动，也难免有失手办砸的时候，可当乌利塞斯·吉马良斯离开这场冷冷清清的集会时，失望的感觉还是挥之不去。此次集会位于尼格罗河畔的马瑙斯，社民党本希望能大获成功，结果却只不过是近期接二连三的失败后，又一次令人忧心的重演罢了。吉马良斯真是想破了头也想不通，到底是哪里出了问题？他们对军方一直客客气气，也没发现军方有什么小动作。难道是全民盟在背后搞鬼？\n\n答案就在他脚下。他还想着集会的事，直到听见纸张在鞋底碎裂的声响，才注意到满地散落的传单。他小心地拈起其中一张，满心的困惑瞬间变成了滔天怒火。所有传单印的都是一样的东西：骂社民党就是军方的走狗和傀儡，是被扶植起来假装反对派的，好让独裁统治看起来更名正言顺一些。\n\n他气得发抖，无数思绪在脑中翻涌。全民盟搞污蔑也不是头一次，但这也过于厚颜无耻，令他怒火中烧。他转头四顾，想找出散发传单的人，目光最终落在了一群留着长发的年轻男女身上。那一刻，翻涌的酸楚取代了怒火，一个可怕的念头在心中浮现。这些人不是全民盟的爪牙，而是社民党的信众，是那些因为党——因为他——在军方面前的怯懦，而彻底心碎失望的人。库比契克连头顶的暴君都不敢反抗，人民又怎么会相信他会保护他们？"
 brazil_lacerda_sorbonne_campaign.18.a: "队伍日渐单薄……"
 brazil_lacerda_sorbonne_campaign.18.tt: "§Y[BRA_pres_selected_region_dynamic]§!\n  §R略微降低§!§Y$BRA_pres_candidate_name_1$§!的支持率。"
 brazil_lacerda_sorbonne_campaign.19.t: "成功的阴影下"
 brazil_lacerda_sorbonne_campaign.19.desc: "在若泽·萨尔内看来，巴西利亚沉闷无趣，可一旦回到马拉尼昂州的圣路易斯，他的心便又被青春与暖意填满了。他分不清这究竟是因为他远离了那条纪念轴大道，还是因为童年时对这座城市的记忆——记忆里它的从容与自信。\n\n又或者，是因为他曾那般渴望向这座“巴西雅典”的人民证明自己，如今，他功成名就，从东北“毕业”归来，回来报答这片养育他的土地。可这么想，对圣路易斯岛、对“巴西雅典”是不公平的：二十世纪是一段无情而反常的断裂，粗暴地割裂了这座城市的光荣与理想——那些欧式建筑，那些深红屋顶，还有那永不低头的意志。它只是需要一个新的方向，而他，就是来指引方向的人。\n\n此刻，面对广场上好奇的人群，他放下讲稿，准备好好讲讲这座城市的复兴，讲讲他和他的全民盟团队是怎么做到这一切的。他想提到那些开着美国新车的美国游客，提到那和着城市脉搏的雷鬼音乐，提到那条他担任议员时亲眼看着建成的南下公路。他思索着这一切，然后对着麦克风开口。\n\n可就在他简短的开场和正题之间那一口换气的工夫，人群里突然有人喊了一嗓子“拉塞尔达加油！”，又有人跟着喊“全民盟前进！”，全场顿时乱成一团。萨尔内的脸，一下子涨得比屋顶的颜色还红。"
 brazil_lacerda_sorbonne_campaign.19.a: "至少他们喜欢。"
 brazil_lacerda_sorbonne_campaign.19.tt: "§Y$BRA_pres_region_6$§!\n  §G提高§!§L$BRA_pres_candidate_name_9$§!的支持率。"
 brazil_lacerda_sorbonne_campaign.20.t: "旧闻"
 brazil_lacerda_sorbonne_campaign.20.desc: "午饭过后不久，马诺埃尔的余光瞥见一个戴着墨镜的老头，背着一把挺新的电吉他。除了他，街上冷冷清清。可那老头照样弹得起劲，既不害臊，也不嫌累，一个节拍都不带错的。似乎他这辈子都在弹这把琴，可能事实真是这样：毕竟这里是圣路易斯，在这里，音乐至上，金钱次之。\n\n最后一个扫弦，几声稀稀拉拉的掌声，老头收工了。马诺埃尔看见那墨镜老头直冲着他的店来了。“老板，来块红糖砖。”马诺埃尔差点笑出声。在这城里，一个卖唱的，放着那么多好吃的不要，偏要啃这玩意儿，真是个怪人。不过他还是把吃的递了过去。“哦，再来份《马拉尼昂论坛报》。”得，这下绝对有鬼。\n\n“我跟你说，同时买这两样东西的，你可是头一个，”马诺埃尔拖长了语调，嘴角带着一丝揶揄。“你真不要今天的《最后时刻报》？”\n\n“怎么，我就不能换换口味吗？”那卖唱的笑得比马诺埃尔还欢，好像买一份根本没人看的本地报纸比他吃饭还重要似的。几个克鲁塞罗啪地一声拍在柜台上，报纸一摊，他这就读了起来。\n\n“‘……马拉尼昂人民一致认为，在卡洛斯·拉塞尔达的领导下，东北地区的发展取得了巨大成功。’成功？发展？卡洛斯·拉塞尔达？这不是我知道的那个《论坛报》吧……”他阴阳怪气地念叨着，装得自己跟个老读者似的。\n\n“哈哈，要我说，这听着倒像是《新闻论坛报》的调调，”说完，两人为这心照不宣的笑话哈哈大笑。其实吧，《马拉尼昂论坛报》是萨尔内的人办的，不过那都不重要了。"
 brazil_lacerda_sorbonne_campaign.20.a: "这帮家伙属于过去罢了。"
