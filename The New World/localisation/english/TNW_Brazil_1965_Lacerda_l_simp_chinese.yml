 brazil_lacerda_samba.91.t: "曾经不可思议，如今顺理成章"
 brazil_lacerda_samba.91.desc: "今天，是决策之日。阿曼多的任务，是为巴西电力公司挑选一位新的财务分析师。像他这样的老牌人事经理，干这种事的次数，比公司领到的补贴还要多。但今天，他却有种陌生的感觉，仿佛这是他人生中的第一次选人。\n\n当然，这事儿还不至于难到登天。要是电力公司的招聘流程不掺政治的话，那个最优秀的候选人，早就稳稳上岸了。可偏偏，这里从来都是个政治染缸。尽管对方面试表现出色，资历也无可挑剔，但他的那段“光辉历史”——跟里约工会眉来眼去，还沾了本地巴西工党的光——这可不是轻轻一盖就能遮过去的。更糟的是，那些全民盟的朋友们，这回居然连个推荐人选的“暗示”都懒得给他。\n\n可这些，真的还重要吗？阿曼多回忆起早年进公司的时候，整栋大楼里，从高层到基层，清一色是全民盟的蓝徽，要么是全民盟的铁粉，要么是捐款人，要么干脆就是退下来的议员。可现在呢？随便走几步，桌前坐的可能就是个社民党的熟面孔，说不定还混着一两个工党的同路人。国会变得讲求“合作政治”，国企自然也学着“与时俱进”了。\n\n罢了罢了。反正全民盟的人现在连以前那点“人情面子”都给不起了。那就干脆把这位“几乎是个共产主义者”的候选人招进来吧，只要他别给我惹出什么大乱子就行。或许，听听不一样的声音，没准还有点好处呢？"
 brazil_lacerda_samba.91.a: "凡是工作场合，总需要点新的意见嘛。"
