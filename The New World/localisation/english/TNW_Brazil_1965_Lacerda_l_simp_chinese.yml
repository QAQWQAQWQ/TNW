 BRA_lacerda_paulista_riots_desc: "美丽的圣保罗正在种族矛盾的烈火中燃烧，整个国家已经开始感受到它带来的影响。\n\n最初的私刑未遂事件已然升级为针对自由区日本移民的暴力狂欢。枪击、绞刑和驾车冲撞等暴力行径恐吓着日系居民，迫使他们逃离家园。当地警方对这场暴乱的反应异常缓慢，总统会如何应对这场危机也尚未可知……"
