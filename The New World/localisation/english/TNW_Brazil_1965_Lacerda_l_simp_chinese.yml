 BRA_lacerda_udn_party_state_balanced: "$MODIFIER_POLITICAL_POWER_GAIN$：§G+[?BRA_udn_pp_gain]§!\n£BRA_udn_texticon §Q全民盟§!每月党派忠诚度将§G小幅增加§!。"
 BRA_lacerda_udn_party_state_realistas: "$MODIFIER_POLITICAL_POWER_GAIN$：§G+[?BRA_udn_pp_gain]§!\n£BRA_udn_texticon §Q全民盟§!每月党派忠诚度将§R小幅减少§!。\n\n§F“你们知道我是怎么想的吗？我觉得大多数时候，这屋子里就我是理智的成年人。听着，我知道我们得开放国家，引入市场机制，但要是步子迈得太大，瓦加斯主义者会把我们置于死地的。我们只需要步子迈小一点，明白吗？” §!"
 BRA_lacerda_udn_party_state_banda: "$MODIFIER_POLITICAL_POWER_GAIN$：§G+[?BRA_udn_pp_gain|2]§!\n£BRA_udn_texticon §Q全民盟§!每月党派忠诚度将§G小幅增加§!。\n\n§F“你们知道我是怎么想的吗？我们不应该害怕走上与美国相似的道路。如果我们要把瓦加斯主义的暴政送进坟墓，那我们就得效仿一个自由的榜样。自由的市场，自由的人，自由的世界，懂吗？”§!"
 BRA_lacerda_udn_party_state_bossa: "$MODIFIER_POLITICAL_POWER_GAIN$：§G+[?BRA_udn_pp_gain]§!\n£BRA_udn_texticon §Q全民盟§!每月党派忠诚度将§R减少§!。\n月度项目建设进展：[?BRA_lacerda_samba_project_boost|=%+]\n\n§F“你们知道我是怎么想的吗？我觉得我们不能把一切事情都交给市场。如果我们想建设巴西，就得撸起袖子，一砖一瓦地干。我不是在说瓦加斯主义的那些胡话，但……我们的未来不能外包出去，你懂吧？”§!"
 BRA_lacerda_udn_party_state_liberais: "$MODIFIER_POLITICAL_POWER_GAIN$：§G+[?BRA_udn_pp_gain]§!\n£BRA_udn_texticon §Q全民盟§!每月党派忠诚度将§G小幅增加§!。\n月度项目建设进展：[?BRA_lacerda_samba_project_boost|=%+]\n\n§F“你知道我是怎么想的吗？我觉得戈梅斯确实有一些不错的主意。但他任上那几年瓦加斯主义者一直掐着他脖子。如果当初不是那样的话……唉，不过既然现在他们要在我们和我们的目标之间筑墙，那我们干脆就当个破坏球，把它们撞碎，明白吗？”§!"
