 brazil_lacerda_imp.1.t: "来自巴西利亚的广播"
 brazil_lacerda_imp.1.desc: "“诸位国民同胞，我今日怀着沉痛至极的心情立于诸君面前，必得将一桩攸关吾等伟大国家的可怖消息昭示天下。”\n\n巴西总统卡洛斯·拉塞尔达端坐案前，话筒林立，群灯灼灼，众摄影机尽皆对准于他。他身着一袭肃穆的黑西装，容颜沉郁至极。\n\n“政府已然查明，当下肆虐全国的罢工风潮，以及方才结束的选举，皆为境外势力阴谋扰乱，尤以大日耳曼国为甚！”此名出口之际，他似乎咬碎了牙齿，满怀厌恶与愤恨。“此邪恶之法西斯政权，其奸细深入我国之疆土，扰乱社会之安定，重创经济之根本，妄图动摇吾国民主政制之根基。他们之最终目的，乃是颠覆吾国之基业，使吾辈尽沦为彼等之傀儡！”\n\n“因此，我郑重宣布——共和国自即日起，进入紧急之状态。为卫护共和国，为拯救吾辈年轻之民主，我辈将施行一切必要手段。纵然此诸措施严峻非常，我可向诸位立誓，它们皆属暂时之权宜。然则，只要暴政与毁灭之威胁尚未消退，我誓必永不止步。我将竭尽我所能，穷尽一切力量，守护巴西，免遭坠入深渊之灾！”\n\n可当聚光灯一盏盏熄灭，拉塞尔达心中之忐忑反而日渐加剧。他深知，今日之辞简洁而力透纸背，情绪高涨。然则，言语终归不过言语而已，真正要紧者，乃是随之而至、即将践行之“行动”。眼前险境四伏，而他明白，许多即将发出之命令，必将令昔年意气风发之自己亦为之胆寒。但此皆为必要之举，一切皆为拯救巴西而行。"
 brazil_lacerda_imp.1.a: "人们做了恶事，死后免不了遭人唾骂。\n可是他们所做的善事，往往随着他们的尸骨一齐入土。"
 brazil_lacerda_tavora.1.t: "洁净的白纸，记忆的污渍"
 brazil_lacerda_tavora.1.desc: "总统办公室。这里的一切都精准地映射出那天的情景：他被迫出手，他的同盟分崩离析。塔沃拉警觉地环视整个房间，目光扫过每一处缝隙。他曾学会分辨书本的微小错位，文件夹的轻微歪斜，每当这些异常出现时总统必定雷霆大作。此刻他突然意识到，这些技巧永远无需再用了。\n\n新上司的皮鞋敲击声随着走近办公桌愈发清晰。杂乱的景象扑面而来——揉皱的工会抗议信、字迹惨淡的民调报告散落成堆。塔沃拉的面容渐渐扭曲成痛苦的表情。如此庄严的办公室却这般模样，实在有碍观瞻。他随手拾起几张纸团掷入废纸篓，那个桶还需要清理——又一桩琐碎差事。\n\n不过这倒是能暂时逃避笼罩巴西的烂摊子，逃避拉塞尔达留给他的泥潭。自从那位烈火总统熄了火，工会的喧嚣倒是平息了，可罢工浪潮仍多到令塔沃拉难以忍受。他掸去桌角的食物碎屑。必须尽快结束这场乱局，即便要开出优渥条件。这不仅明智，更是正义之举。\n\n更糟的是每日更新的民调数据，活像倒退回戈梅斯时代，甚至更甚。他们必须倾尽全力赢回选举，无论如何。办公桌总算整洁如新，但他仍需应付无数杂务。这个国家需要清洁工，需要勇于断腕的守夜人。他必须成为那个人，不管自己是否愿意。"
 brazil_lacerda_tavora.1.a: "责任压在他的身上，犹如一顶沉重的王冠。"
 brazil_lacerda_tavora.2.t: "全民盟的新开端"
 brazil_lacerda_tavora.2.desc: "全民盟总部大楼人去楼空，深夜本该如此。但有一间会议室依然亮着灯，塔沃拉正主持秘密会议。若泽·德·马加良斯·平托、米尔顿·坎波斯与拉斐尔·马加良斯各自倚着座椅，雪茄烟雾袅袅，威士忌杯中的冰块叮当作响。这群被权力欲望豢养的男人竭力维持镇静。\n\n“我们党的支持率正在断崖式下跌。”平托打破短暂的沉默。在座众人默默颔首。“都怪那个肮脏的乌鸦拉塞尔达。要不是他招惹工会蜂窝，我们的选情何至于此。”\n\n拉斐尔怒视着这位银行家：“别抹黑卡洛斯，你这蠢货。他已经尽力了。”\n\n“省省吧，纯属自作自受。”\n\n塔沃拉冷眼旁观这场争执。隔着氤氲烟雾，他注意到拉斐尔的手比其他人都抖得厉害——考虑到此人在党内岌岌可危的地位，这倒不奇怪。“先生们，我认为行动方案很明确。要挽救残局，必须对工会进行安抚。”米尔顿立刻附和道：“没错，否则我们又要重蹈戈梅斯时期的覆辙。”\n\n拉斐尔猛地起身，酒液险些泼出：“可我们投入那么多！不能就这么认输，至少该要求……”\n\n平托醉醺醺地打断他：“要想在选前不当跛脚鸭，就必须后撤。不过维尔吉利奥，”他看向塔沃拉，“我们亲爱的经济部长贝尔特朗会怎么想？他不会有意见吗？”"
 brazil_lacerda_tavora.2.a: "“无所谓，不影响我们接下来要做的事情。”"
 brazil_lacerda_tavora.3.t: "脱身之道"
 brazil_lacerda_tavora.3.desc: "“巴西同胞们……”这个开场白早已成为卡洛斯·拉塞尔达的个人烙印。如今民众却要适应新的声音。他的目光仿佛穿透摄像机，办公室里其他存在都化作虚无：“这是我作为总统首次向各位讲话，由于前任总统拉塞尔达辞职，本人已正式接任其职务。”\n\n当意识到此刻有千万家庭正注视着自己，他的声线出现瞬间震颤，随即恢复平稳：“为避免冗长，我将言简意赅。今日我已同工人总指挥部签署协议，立即终止肆虐全国的罢工潮。劳工权益与法律框架将与本届政府就职时保持一致，我们将以全新方式推动国家前行。”\n\n“根据协议条款，我已行使行政权力颁布实施令，同时授权国会在此期间制定新法案。对众议院和参议院履行职责、通过法案的能力，我抱有绝对信心。”\n\n最后时刻，他凝视着摄像机，眉间坚冰稍融：“担任副总统期间，我被迫做过诸多艰难抉择。重组政府与接任总统的决定，堪称人生至难。正如此次谈判般，未来仍将面临更多挑战。但惟愿我们能勠力同心，以更坚定的信念、更团结的姿态、更强大的力量共克时艰。谢谢各位。”\n\n机器轰鸣停息。现在要处理下个难题：谁来接替贝尔特朗的财长之位？他必须立即致电平托或坎波斯——时光从不宽恕优柔寡断之人。"
 brazil_lacerda_tavora.3.a: "这段开场更像是一个总结。"
 brazil_lacerda_tavora.4.t: "双楼记"
 brazil_lacerda_tavora.4.desc: "塔沃拉总统曾无数次造访美国驻巴西利亚大使馆，但此次堪称最煎熬的会面。这座新首都首批建筑之一与晨曦宫、高原宫呈现微妙竞合关系，但今日他无心分辨其中奥妙。\n\n通向白色庞然大物的道路上，巡逻卫兵数量翻倍，直升机在起降平台轰鸣盘旋。连这熟悉的方形建筑都裹着陌生疏离感。\n\n“下午好，总统先生，希望您喜欢我们的欢迎仪式。”戈登大使拖着长音说，目光扫过延绵的礼乐队列。总统只是礼节性点头微笑。\n\n“承蒙款待，没觉得有什么特别之处。”这句回答让空气骤然凝滞。大使嘴角的弧度变得僵硬，试图用轻笑打破僵局。\n\n塔沃拉忽然明悟：戈登对拉塞尔达下台的反应不仅出于职业考量，更掺杂私人情绪。从那些外交辞令中，他看不出这究竟是痛失朋友的惆怅，还是收获定义模糊的新“盟友”的隐忧。\n\n“总之，”大使突然倾身耳语，“美方将继续支持两国友谊与贵政府议程。”\n\n无论总统府与使馆在地理上相隔多远，塔沃拉及其党派都注定继续仰仗美国的全方位支持。这才是他此行的唯一目的。"
 brazil_lacerda_tavora.4.a: "无条件的友谊，经受住了考验。"
 brazil_lacerda_tavora.5.t: "预算削减与阶级斗争"
 brazil_lacerda_tavora.5.desc: "莱昂内尔·布里佐拉的办公室很宽敞，这是多年公职生涯带来的福利。他坐进办公椅时顺手关掉了广播。这是张好椅子，读着报纸浏览新政权最新的施政纲领和暴行新闻，不失为开启一天的好方式。\n\n他的目光随着报纸版面下移，停留在最新公布的预算削减方案上。这则消息被深埋在报纸内页，既不在头版也没有配发社论，说明内容极其简略。不过文中明确指出此次削减的力度与广度远超以往。环境事务部被砍经费理所当然——资本家向来只在乎让企业烟囱里的煤灰填满民众的肺腑。\n\n但随着继续阅读，健康与教育领域的深度削减却令人震惊。塔沃拉果然在玩这套把戏：牺牲工人阶级利益为其“稳定公共财政”的口号买单，以此稳固其中产阶级基本盘。这位新总统似乎完全忽略了那些口号与报表背后的血肉之躯。布里佐拉摔下报纸，开始拨打盟友坦克雷多·内维斯的号码。铃声响了许久才被接起。\n\n“你也看到新闻了吧？”内维斯的声音传来。\n\n“我们必须揭露塔沃拉的把戏。人们有权知道新总统的算盘——凭什么把这些要闻埋在报纸边角？只要让民众看清真相，绝不会有人认同他的计划。”\n\n“英雄所见略同，我正设法联络魏纳先生，眼下正是采取行动的最佳时机。”\n\n“至少有一点可以肯定：我们决不能让塔沃拉的阶级战争阴谋得逞。”"
 brazil_lacerda_tavora.5.a: "“塔沃拉要是想斗，我们就跟他斗到底。”"
 brazil_lacerda_tavora.6.t: "静物"
 brazil_lacerda_tavora.6.desc: "下班经过瓜纳巴拉改建区时，弗朗西丝卡总会驻足观察那栋在建商场的施工进度。她记得拉塞尔达曾亲自主持过奠基仪式。彼时一铲土落下，城市新生的愿景似乎触手可及。有几次她还会畅想商场开张时，那些流光溢彩的店铺该是怎样光景。\n\n如今围挡后的工地一片死寂，工程铭牌旁只剩下日立的锈蚀器械。\n\n她的手指扣紧铁丝网，试图穿透尘埃窥见未兑现的承诺。当初推土机碾碎这片棚户区时，弗朗西丝卡也曾对搬迁公告将信将疑，却被拉塞尔达天花乱坠的说辞糊住了眼睛——他说会还给市民明珠般的商业地标，此刻想来不过是江湖骗术。\n\n“至少一切都没改变。”这念头刚从心底冒头，她就苦涩地咽了回去。不，这不过是自欺欺人。\n\n当瓜纳巴拉重建计划宣告中止，工地不会重生为新的梦想，现实是工程地皮会被甩卖给私人投资者，而重新在此居住的只会是富人。那些豪华的公寓楼宛如吸金石，混凝土方块终将遮天蔽日。\n\n至于其他人呢？无非是在更陡峭的山坡上搭建新的棚屋，直到某天推土机再度袭来。弗朗西丝卡下意识裹紧了旧披肩，暗自庆幸这回没抱太多期待。看那商场废墟时，心口泛起的疼竟比当年柔和许多。"
 brazil_lacerda_tavora.6.a: "如果“过去”是一个国家，她真想去那里旅行。"
 brazil_lacerda_tavora.7.t: "凝聚人心"
 brazil_lacerda_tavora.7.desc: "塔沃拉的香烟即将燃至滤嘴，颤抖的手立刻续上另一支。关键时刻来临——布拉加即将代表全民盟-基民党联盟发表演说。数月的谈判磋商，全民盟内部四派系始终未能推举出合适候选人，最终才走到了这一步。政治生存的迫切需求，暂时掩盖了权宜之计带来的耻辱。\n\n内伊·布拉加走向演讲台，在开始前向塔沃拉报以微笑。为铺就这条候选之路，他们动用了所有人脉资源平息反对声浪，舆论战场更是硝烟弥漫。政治资本已挥霍殆尽，但足够说服全场吗？当掌声渐歇之际，便是答案揭晓之时。\n\n“感谢各位的厚爱，将信念托付于我。”麦克风将他洪亮的嗓音放大十倍，完美契合演说家的风范。“信念……可悲的是，这恰是当今巴西最匮乏之物。我们对民主制度失去信念，对经济前景失去信念，甚至对至高无上的主也渐行渐远。”\n\n“虽令人气馁，但这绝非投降的理由。不，我们必须为心中正义而战。这正是我作为总统的庄严承诺：恢复经济至我们赖以繁荣的稳定发展主义模式，强化民主制度以防其沦为蛊惑者与强权者的玩物。”\n\n“最重要的是，在前任政府长久背弃信仰后，我将让上帝重归巴西。若各位渴望生活在道德重振的国度，就请在今天为我而战。谢谢。”\n\n布拉加在震耳欲聋的掌声中退场，听众的欢呼犹如圣咏直贯云霄。人群为他疯狂。这般狂热几乎要融化塔沃拉磐石般冷峻的面容，令他热泪盈眶……"
 brazil_lacerda_tavora.7.a: "……他感到欣慰，所有的痛苦都是值得的。"
 brazil_lacerda_tavora.8.t: "残局"
 brazil_lacerda_tavora.8.desc: "“恢复经济至稳定的发展主义模式？”布拉加这混蛋在胡扯什么？拉斐尔·马加良斯攥紧拳头，难道这些蠢货都瞎了眼，看不到拉塞尔达总统在短暂任期内创造的奇迹？还有那套“道德国度”的陈词滥调，听起来简直像瓦加斯主义者的教条，与他挚爱的全民盟理念背道而驰。猛然间，他如遭雷击。\n\n他所热爱的全民盟早已消亡，如今的全民盟不仅抛弃了他，更将整个拉塞尔达派视若敝屣。\n\n身为拉塞尔达主义者如同患上政治麻风病。他们的掌权时代已然终结，接下来要面对的是漫长的政治寒冬——被放逐的岁月。就连拉塞尔达本人也抛弃了他们，自顾自开启环球巡游，徒留旧部在政敌清算中煎熬。像他这样的失势者不会获得著书立说的殊荣，唯有在现实的铜墙铁壁前碰得头破血流。\n\n这些认知非但未能让马加良斯豁然开朗，反而加深了他的苦闷。直到某个灵光乍现的瞬间——内伊·布拉加未必能赢得即将到来的大选。若他败选，这套僵化保守主义路线将作为全民盟的失败策略被唾弃，迫使党内重拾曾带来巅峰辉煌的意识形态——拉塞尔达主义。\n\n既然无缘领导，那便成为反对派。若布里佐拉当选总统，他会抗争；若布拉加胜出，他同样会斗争。会议在掌声中落幕，他的谋划已然成型。该去见情妇了，她的温存能涤清思绪，为下一步棋做好准备。他哼着辛纳屈的小调离场，仿佛在为新运势谱写乐章。"
 brazil_lacerda_tavora.8.a: "好运今夜垂青佳人……"
 brazil_lacerda_tavora.9.t: "死者的份额"
 brazil_lacerda_tavora.9.desc: "“所以说，塔沃拉总统和他那群喽啰正在四处救火，全民盟已经思想枯竭到需要靠其他党派输血维生，而你很快又要像往常那样收拾他们的烂摊子。”杨戈拖着伤腿在南里奥格兰德州的牧场踱步，身旁的布里佐拉——巴西下任总统候选人——正与他交谈。他对挚友的犀利点评报以苦笑。\n\n“是啊，我们放任那个疯子环球巡游，无意间向世界散播了恐怖。只能祈求上帝别让外人以为所有巴西政客都这般癫狂。”杨戈突然被自己的想象逗得大笑，说真该在拉塞尔达背后贴张“此人行为与本国无关”的告示。“瓦加斯这个，瓦加斯那个——”他短暂叹息，“不能总把过错推给死人。”\n\n笑容从杨戈脸上凋零。“都走了两年了。他们说时间能治愈一切伤痕，都是谎言。”\n\n布里佐拉太理解这种痛楚。“让拉塞尔达把瓦加斯的尸体挖出来再搞次审判，他绝对乐意。”这黑色幽默无人应和，连他自己也笑不出来。“我如今只剩必须获胜的执念。只是忍不住想，那位老人家在天上会如何看待人间乱象。”\n\n杨戈受伤的腿突然抽搐着绷直。他沉吟良久，最终给出回答："
 brazil_lacerda_tavora.9.a: "“肯定巴不得拉塞尔达离他的遗产越远越好。”"
 brazil_lacerda_tavora.10.t: "信仰空洞"
 brazil_lacerda_tavora.10.desc: "拉斐尔·马加良斯又一次枯坐炉火旁，即便手握黑皮诺也品不出滋味。他的心神被无边的恐惧攫住。选举后的无数种情况在脑海中如野火肆虐。\n\n拉塞尔达在各种意义上都已离去，除了肉体尚存尘世——虽然无数人巴不得他早登极乐。“卡洛斯开启十字军东征！”报纸如此嘲讽这场环球巡游，其注定如同中世纪圣战般徒劳无功。前总统携新书在世界舞台闪亮登场之际，追随者们却要留守战场浴血搏杀。\n\n这种屈辱实在难以承受。拉塞尔达歇斯底里控诉全民盟内部阴谋集团的背叛，马加良斯却无力阻止总统自毁长城。癫狂举止不仅令当事人沦为笑柄，更让旧部蒙羞。此刻马加良斯的政治声誉正被半个地球外的疯子摧毁，而他束手无策。\n\n除了继续战斗，别无选择。\n\n他心知肚明，自己不会是全民盟本届大选推举的候选人。而昔日的政治偶像拉塞尔达，如今不过是令人失望的残破神像。但这不意味着理想应当随政治生命湮灭，更不意味着他的仕途必须与拉塞尔达共沉沦。无论前方是上刀山还是下火海，马加良斯都将战斗到底。巴西如此瑰丽，岂能拱手相让。"
 brazil_lacerda_tavora.10.a: "保卫理想的战斗，就此打响。"
 brazil_lacerda_tavora.11.t: "最后的绝望时刻"
 brazil_lacerda_tavora.11.desc: "维尔吉利奥·塔沃拉跪在总统办公室如忏悔的窃贼，电子神父正宣读审判的序章。投票站即将关闭，巴西将宣判他究竟是救国者……还是引狼入室的投机政客。他关掉广播，继续向上帝与国民祈求赦免。\n\n“这是我们等待已久的时刻！为新巴西，今天请投布里佐拉！”莱昂内尔·布里佐拉的嘶吼穿透暮色，汗透的白衬衫紧贴脊背。虚浮的双腿几乎无法支撑连日奔波的躯体，眼前一片模糊，唯独瓦加斯的面容始终清晰——这场战役正是为了故人。\n\n“我衷心感谢各位的付出。无论胜负，你们皆令我骄傲。”基民党战况室内，面色苍白双目充血的内伊·布拉加正在发表演说。团队成员们脸上凝结着希冀、恐惧与哀戚，此刻唯有酒精能浇熄神经的灼烧。\n\n地球另一端的澳洲酒吧里，某个男人正践行着这条真理。巴西前总统卡洛斯·拉塞尔达暂别新书签售会，仰头灌下威士忌。邻座酒客听见他含糊咒骂“该死的塔沃拉……”，却窥不见他脑中翻涌的叛念：期待布里佐拉笑到最后……"
 brazil_lacerda_tavora.11.a: "……让那帮犹大看看被他们钉上十字架的耶稣。"
 brazil_lacerda_udn.1.t: "跳槽还是留下"
 brazil_lacerda_udn.1.desc: "“这完全是一场闹剧，不是吗？”一位参议员说，向他没怎么动过的加利尼亚达鸡肉饭挥舞着叉子。“当然，实话实说，我指的只是总统。你知道的,如果我像那些社进党的书呆子花钱跟拉塞尔达对着干，我甚至都不用来了。”他被自己的笑话逗乐了，因为他知道这已经快不是个笑话了——唯一比他的饭菜更寒酸的就是他的薪水了。\n\n“说得对，”另一个人附和，“全民盟已经很难说自己是一个‘联盟’了。我都忘了上一次有人们能达成一致的事务的党内会议是猴年马月了。我都快被整疯了。甚至萨尔加多那帮子土匪都比我们赢面更大。”\n\n“至少萨尔加多的土匪们有个头儿”，第一个人打趣道。“叫什么乐队派——算了，我都不想说。但我们究竟该怎么办？让两个老顽固当联盟的领袖？老家伙都不懂变通，我们也就比完全消失好些”\n\n“也许……是时候从党内消失了。社民党，社进党，现在其他党派看起来都比我们强大——马塞尔，就算成为无党派人士也比在这里自生自灭强。的确，局势很复杂，但我可以向你保证一件事……”"
 brazil_lacerda_udn.1.a: "“……这样想的不光是我们。”"
 brazil_lacerda_udn.1_tt: "你需要让你的党保持忠诚，否则参议员们就会退党。"
 brazil_lacerda_samba.1.t: "托内莱罗大街的末班车"
 brazil_lacerda_samba.1.desc: "那已经是十多年前的往事了，但每当拉塞尔达闭上双眼，他仿佛又回到了托内莱罗大街。\n\n那一天，子弹无情地扫射而来，瓦加斯残暴统治的阴影再次笼罩在他们头顶。拉塞尔达侥幸存活，只是在脚上中了一弹，然而鲁本斯·瓦斯少校却再也无法醒来。正是那一刻，拉塞尔达的真正战斗才拉开了序幕。\n\n当时，他手中唯一的武器就是自己的声音。他喊出了心中不屈的怒吼，哪怕瓦加斯主义的权力机关再如何庞大，也无法压制住他的呼声。总统们接连上台，而每一位新上任者不过是腐朽独裁体系的延续，依旧深陷瓦加斯的法团主义教条，仿佛瓦加斯就是不可违抗的神明，无法脱离他的影子。\n\n戈梅斯当选时，肩负着清除多年瓦加斯主义顽疾的重任，可是他未能成功，那巨大的责任最终落在了拉塞尔达的肩上。每当他睁开双眼，便看见一个全新的巴西正从废墟中崛起，一个摆脱了瓦加斯主义束缚的国度。在他眼前，起重机的臂膀高高举起，建筑工地上机器轰鸣，创新与工业的气息在空气中回荡，那是一个重获自由的民族正在奏响的凯歌。\n\n资本主义最终战胜了法团主义，这不仅是巴西的胜利，也是对全球法西斯主义的一次有力回击。尽管当时并非所有人都能看清这一胜利的意义，仍有不少人被舆论蒙蔽，但拉塞尔达坚信，未来的几代人会铭记这场变革，会感谢他所作出的努力。即便托内莱罗大街的惨痛记忆永远萦绕在他的心头，那已然成为了推动他不断前行的力量。"
 brazil_lacerda_samba.1.a: "不幸的记忆…却赋予了我继续战斗的力量……"
 brazil_lacerda_samba.1.tt: "£GFX_BRA_UDN_liberalism_texticon  §Y经济自由主义§!已达到100%，将应用以下修正："
 brazil_lacerda_samba.1.tt2: "若£GFX_BRA_UDN_liberalism_texticon §Y经济自由主义§!达到0%，§Y$BRA_lacerdas_dream$§!将彻底终结。"
 brazil_lacerda_samba.2.t: "瓦加斯主义的第四头？"
 brazil_lacerda_samba.2.desc: "拉塞尔达紧握双拳，竭力压抑住内心翻涌的怒火，尽量不在当场对塔沃拉发作。他一路疾步走向电视演播室，耳边回响的依然是塔沃拉那令人厌烦的哀求：“拉塞尔达，别忘了，这可是个极好的机会，宣传效果绝佳啊。”塔沃拉显然还没有意识到，有些人看重的是原则，而不是那些虚张声势的宣传数据。而且，待会儿与他同台的“联合主持”人，恐怕只等着在直播中将他言辞上彻底击溃。\n\n拉塞尔达踏入访谈节目现场，目光立刻落在了对面——前总统儒塞利诺·库比契克，瓦加斯主义活生生的化身。“晚上好，总统先生。感谢您今天能出席节目。我想，大多数人在您的位置上，都会对参与这样一场讨论有所犹豫，毕竟我们今天要谈的巴西经济，与您执政时期密不可分。”\n\n库比契克微笑着点头，略带自豪地说道：“谢谢你。今天的巴西让我感到无比自豪。我相信，我们确实在很大程度上改善了人民的生活，然而……”说到这里，拉塞尔达心里冷笑了一下。好了，时候到了，是时候发起攻击了。如果这位自满的老政客以为能把他逼入绝境，那他可真是低估了自己。 “…我不过是延续了您所开创的事业。您是一位极富远见的领导者。”等等，他怎么会说出这种话？\n\n“非常感谢，总统先生，您这番话对我意义重大。”拉塞尔达微微一怔，为什么他会这样回应？更奇怪的是，他的语气里竟然没有丝毫的嘲讽。“在选举时，我也曾希望自己能取得胜利。但今天，我不得不承认，您的任期不仅延续了我所开始的工作，甚至比我原本能做到的还要更好。就连瓦加斯本人见了，恐怕也会赞叹不已。”\n\n观众们开始骚动，有人感到失望，他们期待中的、针锋相对的辩论竟然演变成了互相恭维的谈话。而另一些人则陷入了迷惑的沉思，他们开始质疑自己的政治信仰。这场对话带来的震撼甚至让他们产生了一个挥之不去的疑问：如果社会民主党与全国民主联盟，无论是单独执政还是联合执政，都能如此卓越地治理国家……那么他们的分歧到底在哪里呢？"
 brazil_lacerda_samba.2.a: "……那还有谁会支持巴西工党呢？"
 brazil_lacerda_samba.3.t: "叛逆者之死"
 brazil_lacerda_samba.3.desc: "儒利奥仍记得父亲讲述的那些关于旧瓦加斯政权的恐怖故事——那个独裁政权常在深夜将男女掳走施以酷刑，将异见者遣送至纳粹集中营，直到这种行径在政治上变得不再便利。正是这些暴行驱使他加入了全民盟，这个唯一敢于反对准法西斯主义崇拜的政党。\n\n倘若他们能保持初心，儒利奥本不会有任何困扰，可现实并非如此。卡洛斯·拉塞尔达，那位曾向儒利奥与众多追随者发誓绝不向瓦加斯主义屈膝的激进领袖，已然妥协。如今，国会中曾将议席割裂为二的激烈争吵与肢体冲突，已被一种诡异的合作氛围所取代。\n\n政党界限扭曲模糊，将他们的身份认同与核心理念统统退化为一杯源自瓦加斯主义思想的可憎鸡尾酒。儒利奥眼睁睁看着昔日并肩谴责库比契克与洛特政府过激政策的同僚们，此刻却与反对派觥筹交错。残酷的现实如毒蛇般悄然爬上他的脊背。\n\n他再也不明白自己的政党究竟代表什么。\n\n当他们的政策与社民党的执政纲领如出一辙时，还有什么能凝聚这个政党？对儒利奥而言，答案是凄凉的四个字：所剩无几。没有多少信念驱使他前行，没有哪个敌人值得对抗，更没有什么能支撑他继续支持那位他曾无比敬重的总统。"
 brazil_lacerda_samba.3.a: "一枚被遗弃的全民盟徽章在巴拉那的潮水中褪尽颜色。"
 brazil_lacerda_samba_3_tt: "£GFX_BRA_UDN_cooperation_texticon §Y合作§!已达到100%。党内精英对草根阶层的背叛将§R损害§!§Y未来的竞选活动……§!"
 brazil_lacerda_samba.4.t: "乌鸦的新巢"
 brazil_lacerda_samba.4.desc: "这是拉塞尔达一家在里约的最后一顿晚饭。明天，他们就要收拾行李搬进总统府了，一家之主对此满心欢喜。\n\n拉塞尔达吃着妻子莱蒂西娅烹制的豆饭烤肉，孩子们则在一边大吵大闹。“次卧归你！”两个儿子正揶揄妹妹克里斯蒂娜，少女气得双颊绯红：“凭什么总是我住小房间！”这倔强模样倒与自己如出一辙。\n\n“好了！”妻子训斥道，“别在爸爸面前吵闹，明儿个他可要忙一整天呢！”两个年长六岁的儿子窃笑，克里斯蒂娜则一脸沮丧。\n\n看着孩子们吵架，拉塞尔达笑着摇了摇头。哥哥年纪大这么多，应该懂得礼让：“让他们闹去吧，一家人整整齐齐就好。”长子塞巴斯蒂昂沉迷文学翻译，次子塞尔吉奥在《新闻论坛报》帮忙，幼女在这男人世界里倔强生长——各有各的精彩前程。\n\n有人在桌下捏了捏他的手，是莱蒂西亚，她关切地看着拉塞尔达。他心下了然：她怕自己当上总统之后，就没时间陪家人了。他回握着妻子的手：有马加良斯、卡瓦尔西诺、莱维和乐队派的其他人一起，这五年不过转瞬之间。"
 brazil_lacerda_samba.4.a: "“无论发生什么，我们都要在一起。”"
 brazil_lacerda_samba.4.tt: "乐观主义能否成就一番事业，我们拭目以待……"
 brazil_lacerda_samba.5.t: "思念满盈"
 brazil_lacerda_samba.5.desc: "米纳斯吉拉斯州州长若泽·德·马加良斯·平托与秘书点头致意，顺手端起她案头的咖啡杯踱进办公室。文件山在桃木办公桌上静静耸立，他却靠着椅背浅啜深褐液体，任思绪漫游。\n\n晨间广播里拉塞尔达总统的演讲仍在耳畔嗡鸣。那个授予他党主席头衔的任命，不过是竞逐总统提名失败的安慰奖。两条政治猎犬互相提防着——当全巴西欢呼总统与旧日的瓦加斯主义决裂时，唯有平托看清这是条咬断锁链的疯犬，正肆意玷污精心修剪的权力草坪。\n\n舌尖突然传来灼痛，他失手将咖啡杯重重砸向桌面，褐色液体溅上待签文件。平托咒骂着掏出手帕，擦拭动作因暴怒而变形。入主高原宫的本该是自己！若没有拉塞尔达派作梗，此刻指引巴西航向的当是平托的人马。好在希望尚存：1970年并不遥远。\n\n最后一道污痕消失时，平托已恢复从容。他想起自己的王牌——担任米纳斯吉拉斯国家银行行长的外甥林斯。这个掌管全民盟小金库的年轻人，既是艺术赞助人，更在各大媒体织就关系网。而林斯今日的权势，全赖舅舅当年提携。\n\n平托将手帕叠成规整方块塞回口袋。文件山依然高耸，但他已锁定更高目标。电话被拎起的瞬间，州长声线如丝绸般平滑：“麻烦接林斯的办公室。”"
 brazil_lacerda_samba.5.a: "可若是她回来，回到这里，那将多么美好，多么疯狂……"
 brazil_lacerda_samba.5.tt: "全民盟会变换色彩吗？"
 brazil_lacerda_samba.6.t: "新副王"
 brazil_lacerda_samba.6.desc: "在巴西利亚钢筋水泥的海洋之上，副总统办公室的落地窗前，维尔吉利奥·塔沃拉俯瞰着车水马龙的行政大道。这种凌驾众生的视角是副总统特权的延伸，更是对他多年苦心经营的犒赏。\n\n此刻的权柄不仅属于他，更属于那些在历史长河里沉浮的务实派先辈。那位被称为“东北副王”的叔父茹阿雷斯·塔沃拉，不过是其中一座里程碑。当维尔吉利奥继承叔父遍布北方的政治网络时，通往权力巅峰的道路早已铺就。\n\n余下的不过是些例行公事：这里修几条公路，那边捐几车课本，必要处疏通关节。当然，低级贿赂从来不是他的作风。塔沃拉更擅长编织恩庇网络，为每个党羽安插合适职位。不出数年，塞阿拉州便尽入其家族彀中。\n\n这般纵横捭阖自然逃不过党内元老的法眼。卡洛斯·拉塞尔达虽以激进改革者形象示人，但其民意根基正需老成持重者调和。于是维尔吉利奥·塔沃拉作为竞选搭档应运而生。\n\n他并非首个接近总统宝座的塔沃拉——叔父茹阿雷斯在1955年就曾角逐大位，继任者茹拉西·马加良斯亦功败垂成。但前人未竟之业，终由他完成。这是属于他的时代。\n\n诚然，拉塞尔达偶有惊人之举，但终究需要倾听同僚谏言。当塔沃拉在副总统办公室落座时，他深信务实派的政治智慧终将浸润这位狂热的改革者……"
 brazil_lacerda_samba.6.a: "……希望就算是最死硬的人也能学会妥协。"
 brazil_lacerda_samba.6.tt: "这位来自塞阿拉州的政治家将为实用主义而战。"
 brazil_lacerda_samba.7.t: "不受欢迎的往事"
 brazil_lacerda_samba.7.desc: "廉价塑料百叶窗漏进一缕阳光，为米尔顿·坎波斯汗涔涔的额头再添灼痛。若此刻有政坛故旧踏入这间斗室，定难将伏案研读十年前旧公文的老者，与叱咤风云的全民盟历史派领袖联系起来。\n\n泛黄照片里的黄金年代在桌案上铺陈：爱德华多·戈梅斯执掌党政时，整个巴西仿佛都在他们掌心翻覆。那时的全民盟趋之若鹜——无数个拉塞尔达簇拥着他，而所谓盟友不过是群见风使舵之徒。\n\n直到《劳工法》改革。这本该是肃清瓦加斯遗毒的关键战役，全党都在屏息以待。他们率先推倒最低工资制这块多米诺骨牌，却瞬间引燃滔天巨浪。中产阶层的掌声救不了崩坍的民意。\n\n社民党-工党联盟的巨兽凶残反扑。加入OFN的提案胎死腹中，政府立法权威荡然无存。纵使戈梅斯宣布皈依共产主义，怕也不会招致更汹涌的敌意。\n\n十年弹指，创伤未愈。曾经执掌总统府的历史自由派，如今只剩零星议员在国会苟延残喘，连州长们都避之不及。好在执政联盟的光环犹存，悬崖边缘尚存一线生机。坎波斯枯瘦的手指伸向电话机，某个名字在喉头翻滚——这是挣脱湮灭的最后契机……"
 brazil_lacerda_samba.7.a: "“你好，爱德华多。你说说军队里我们能依靠谁？”"
 brazil_lacerda_samba.7.tt: "骰子已经掷下——全民盟的灵魂之战已然打响。"
 brazil_lacerda_samba.8.t: "陷于仇恨"
 brazil_lacerda_samba.8.desc: "毛里西奥年纪大了，但迄今为止，他的人生都很安稳。过去五年，他总是雷打不动地路过阿雷格里港的瓦加斯雕像，去当地的咖啡馆找他的朋友奥斯瓦尔多谈天说地。今天，他看到那座雕像又被涂上了红漆，这让他不禁倒吸一口冷气。直到他碰见了奥斯瓦尔多，这一幕依然在脑海中挥之不去。\n\n“太疯狂了，这帮流氓哪来的胆子，敢这么侮辱穷人的慈父！”就算奥斯瓦尔多想让毛里西奥冷静下来，也实在做不到。他几十年没见毛里西奥发这么大火过。“一次也就算了，但这种事在接二连三地发生。都怪那天杀的总统拉塞尔达。如果他敢，他会说纳粹崛起也是瓦加斯干的。”\n\n“他们只是毛头小子，毛里西奥。他们不知道我们经历了什么。他们只听到拉塞尔达独裁独裁的乱叫，却从来不知道瓦加斯上台前是怎样的漫漫长夜。我们可太清楚那些人的真面目了，在戈梅斯的最低工资改革后，我们的工资跌了一半，只能靠讨饭过活。”\n\n“改革……”这个词让他回想起了随这个词汇而来的剥削带来的黑暗时代，他绝不想再回到那种日子里。“很多人都在批评库比契克，但我永远尊敬他，因为他带我们走出了最艰难的那两年……现在，拉塞尔达估计是要把我们推回那个火坑里去……”\n\n他长叹一声。这些话除了让他更加糟心外没有任何用处：“我们知道真正的瓦加斯——他才不是沉迷于权力的法西斯暴君，而是我们的英雄，是那些统治着我们国家的、真正的法西斯分子血口喷人。如果让拉塞尔达的历史叙事压倒了我们的，我们就完蛋了。”他们拥抱在一起，仿佛是要在履行他们的新使命之前牢牢地结下约定。"
 brazil_lacerda_samba.8.a: "为了心目中的巴西，两代人走上擂台。"
 brazil_lacerda_samba.8.tt: "£GFX_BRA_UDN_intransigence_texticon §Y强硬§!已达到100%。£BRA_udn_texticon §Q全民盟§!将不再就自由问题作出妥协！"
 brazil_lacerda_samba.9.t: "通往自由的四条路"
 brazil_lacerda_samba.9.desc: "四张照片整齐地列在拉塞尔达面前。他并不太想在讨论的时候用它们来示意，但马加良斯还是在谈到它们的时候情不自禁地拿着照片挥舞起来：“我们有两个稳妥的选择。”他拿起一张照片，“首先是坎波斯，他也许能在瓦加斯钉死的棺材板上再来上几颗。”他又举起另一张：“还有巴莱罗。他很聪明，跟我们比起来也很年轻，而且他绝对是我们这边的人。”\n\n“巴莱罗是个有意思的人，我会再看看。”拉塞尔达从马加良斯手里拿过照片，“坎波斯知道全民盟的内部结构和内部文件。距离我们的任期结束还早，我可不想因为几个不忠的议员输掉下一场大选。”\n\n马加良斯清了清嗓子，把其他照片摆正：“说到这些，”他的手放到右边，“还有他们俩。”他的手指点着两人的照片。“我知道您对塔沃拉和平托的看法，但我个人认为不该现在就把他们排除在外。”\n\n“拉斐尔。”拉塞尔达的话中传出了一丝怒意，“我不感兴趣。我可不想让妥协玷污了我们的第一个任期。”\n\n“包括您自己的党内吗？您想，”马加良斯点着自己光秃秃的脑门，“平托和教会关系密切，他的侄子经营着米纳斯吉拉斯银行。他们的自由预算为您提供了竞选经费，全都是合法的。而塔沃拉……”\n\n“是条毒蛇？”\n\n“和寡头们关系密切。富人们，拉塞尔达，稍有不慎他们就会倒向阿德马尔。”马加良斯把照片整成一叠，“卡洛斯，所谓良政，起码得让他们中的一些人高兴。”"
 brazil_lacerda_samba.9.a: "“行行行，我会听塔沃拉的意见的。”"
 brazil_lacerda_samba.9.b: "“我宁愿让他们守纪也不愿意让他们好过。和坎波斯谈谈吧。”"
 brazil_lacerda_samba.9.c: "“我还是喜欢巴莱罗说的话。安排个会吧。”"
 brazil_lacerda_samba.9.d: "他一言不发，只是盯着平托的照片，随后发出了一声长叹。"
 brazil_lacerda_samba.10.t: "必要的甜头"
 brazil_lacerda_samba.10.desc: "“今天天气真不错，是吧？”塔沃拉撕开一袋砂糖，倒进咖啡里。他想给拉塞尔达的那杯也加上，但拉塞尔达摇了摇头。在这座俯瞰着福塔莱萨沙滩的阳台上，暂时躲开了巴西利亚紧张氛围的两人聊得很高兴。不过，塔沃拉一尝试和拉塞尔达谈起一些关键问题，轻松的氛围也就烟消云散了。他忽然停下，然后突兀地谈起了今天的天气。\n\n“不要转移话题，好吗？有话直说。”\n\n塔沃拉叹着气，把杯子放在了桌子上：“卡洛斯，你得明白。全民盟应该是一个支持所有人的党。我们要凝聚起所有人的力量。但我们也是既有组织及其体制的继承者，你在创造更好的体制的同时，也应当和现存的体制合作。”他本想说“这就是政治”，但他终究没有说出口。\n\n“所以你的意思是，腐败是必要的？甚至是必然的？”拉塞尔达抿了一口苦涩的咖啡，他感到有一股力量在冲击着他的心口。\n\n“我没说过腐败。我也没有撺掇你去贿赂法官或警察。”塔沃拉搅拌着自己杯里的糖和咖啡。“但我们政府中的一些职位甚至应该对我们的敌人开放。比如说社进党。”他望向沙滩，“这里正在举行市议会选举。三个席位是我们的，但其他的……”他的声音低了下来，看了一眼自己杯中的咖啡，又看向拉塞尔达。“我们既然要成为一个为所有人服务的政党，有时候就应该妥协。为了国家的稳定，要给我们的对手留下余地。”\n\n两人的脑海中都闪过了某个人的面孔。拉塞尔达挪了一下他的椅子，也拿起了一包糖。"
 brazil_lacerda_samba.10.a: "我会记住的。"
 brazil_lacerda_samba.10.tt: "如果我们$BRA_lacerda_udn_party_thinking_with_the_realistas$，这些决议将更强大……"
 brazil_lacerda_samba.11.t: "如果太晚，请原谅我"
 brazil_lacerda_samba.11.desc: "“那么，你觉得这装修如何？”马加良斯·平托摆了摆手“之前红衣主教来过，他对这种尼迈耶风格非常推崇。还特别让我代他向你问好。”\n\n“嗯哼。”拉塞尔达点头回应，脸上却掩不住一丝不情愿。他们沿着大理石铺就的楼梯缓缓向上走，经过那些雕工精细的红木门。木质的墙壁温润厚重，对面却是一整面玻璃，阳光透过玻璃大方地洒入，将办公室照得通透明亮。墙的上四分之一镶嵌了一道红色浅条混凝土。尽管拉塞尔达对建筑不甚了解，但他确信这并非尼迈耶的手笔。\n\n“现在，拉塞尔达总统，”平托在办公桌前坐下，继续说道，“我知道我们过去有些意见不合，我很感激你现在愿意主动联系我。让我告诉你，巴西人民需要的是什么：改革。我们与瓦加斯主义的过去彻底决裂，这是好事。但你不能总是纠缠于过去。你得告诉民众，他们究竟投票支持了什么。”\n\n“我明白，平托。我以为在竞选期间我已经把这些都说得很清楚了。”\n\n“竞选演讲只是一回事，现在你已经是这台大戏的主角，情况不一样了。”他俯身靠近桌子，双肘支撑在上面，带着几分狡黠的神情，“这就是我侄子能派上用场的时候了。他认识从这里到亚马孙的所有记者。只要你能让他满意，他就会把你的声音传遍每个角落。”拉塞尔达微微皱起眉头，平托佯装没看见。“你只需要给他‘食物’。什么样的食物？胜利。你通过改革，做出有利于全国民主联盟和人民的行政决定，他的人会全程支持你。”\n\n拉塞尔达叹了口气，“我不是新手，平托。如果他想要胜利，就必须跟我们一起出力。”他推了推眼镜，准备好迎接接下来的对话，“现在，关于你刚才提到的那些‘理性的’改革，能否具体说明？”"
 brazil_lacerda_samba.11.a: "满怀深情而来，却带着破碎的梦归去\n经历过无数次爱情的失意，在破晓前迎接晨光……"
 brazil_lacerda_samba.11.tt: "如果我们$BRA_lacerda_udn_party_playing_the_bossa$，这些决议将更强大……"
 brazil_lacerda_samba.12.t: "彩排"
 brazil_lacerda_samba.12.desc: "“这儿的风景真不错。”阿利奥马尔·巴莱罗坐在阳台的藤椅上，双腿交叠，悠闲地喝着咖啡，眺望着宫殿前倒影池里的波光，缓缓说道，“这就是所谓的领导者特权吗？豪华的住处，还有无忧无虑的清晨？”\n\n“相信我，这不算是我的家。”拉塞尔达笑了笑，啜了一口咖啡。“更像是个带景观的工作地点吧。而且，我也没闲着，现在和你讨论党的事务，可是正经工作。”\n\n“因为这里的工作太累人了？”\n\n拉塞尔达放下杯子，笑着点头：“那就开工吧。我看过你的信了，对你提到的那个赞助计划很感兴趣。”\n\n“真高兴你感兴趣，拉塞尔达总统。”巴莱罗笑意盈盈，“我相信这计划一定会奏效。赞助辩论俱乐部，可以彰显你对政治言论自由的支持——这是瓦加斯从未允许的事。再建立几座图书馆，展示你对巴西人民教育的重视。偶尔资助一些节日庆典，让大家看到你并非冷酷无情的政客。只要这些活动都贴上全国民主联盟的标志，下次选举他们自然会知道该投谁。”\n\n“如果开销不是很大的话。”拉塞尔达若有所思地说道，“我们必须明确地与瓦加斯主义决裂。让我说清楚一点，巴莱罗先生：我们已把他的独裁统治留在了历史中，不能接受这一点的人最好识趣点，别挡道。”巴莱罗的目光依旧停留在池中悠然游动的锦鲤身上，而拉塞尔达则用手指轻轻敲了敲杯沿，“告诉我，你认为对我们党而言，最重要的是什么？”\n\n“团结，总统先生。”巴莱罗答道。\n\n拉塞尔达笑了，端起杯子，悠长地抿了一口咖啡。"
 brazil_lacerda_samba.12.a: "乐队演奏既要合拍，又要合调，不是吗？"
 brazil_lacerda_samba.12.tt: "如果我们$BRA_lacerda_udn_party_playing_the_banda$，这些决议将更强大……"
 brazil_lacerda_samba.13.t: "守旧派的墓地"
 brazil_lacerda_samba.13.desc: "拉塞尔达心中暗自疑惑：像坎波斯这样年长的老人，怎么会在这间阴暗的办公室中度过时光？尽管天花板上有两盏灯，桌上还摆着一盏台灯，整个房间依然让人觉得宛如身处黑暗的山洞，仿佛他只能借着微弱的烛光来完成日常工作。拉塞尔达的目光游移着，最终落在墙上唯一的亮点——一张老旧的照片。那是坎波斯与他的挚友爱德华多·戈梅斯并肩的合影，显得轻松又充满了欢乐，令人不禁感叹时间的流逝。坎波斯忽然开口，打断了拉塞尔达的思绪：“对了，爱德华多让我向你问好。”拉塞尔达被唤回现实，耳根微微发烫，坐了下来。\n\n“关于您的提议，”拉塞尔达边说边把坎波斯递来的文件递回，“我很感兴趣。您说得没错，未来几个月里，纪律确实至关重要。我们执政的时间还短，难免有人会在新的职位上犯错或者恣意妄为。我们必须确保他们走在正道上。”\n\n“我同意。”坎波斯微微前倾，拉塞尔达几乎可以确定，他的目光灼灼，毫不眨眼地盯着自己。“得紧盯他们，甚至磨练他们。加入全国民主联盟，是一种荣誉，他们应该为此竭尽全力。”\n\n“正合我意。”拉塞尔达靠向椅背，稍稍松了口气。“不过，我有些困惑。之前您提到，党纪并非当务之急？”\n\n“确切来说，是官僚体系的问题，那是长期受瓦加斯主义侵蚀的领域，沉疴难愈。清理它们应当是我们当前的重中之重，先生。去锈、擦亮每一个角落，让正直的全民盟党员出任要职，这样才能把事情做得干净彻底。”\n\n拉塞尔达脑海中闪现出“清党”这个词，但他并未说出口。他清了清嗓子，继续道：“总之——”他用指尖抹去桌上最后一点灰尘。“总之，我相信我们会有很多合作的机会。我会再联系您，坎波斯先生。”说罢，两人握手道别，拉塞尔达尽量不去在意坎波斯那双冰冷湿润的手。"
 brazil_lacerda_samba.13.a: "拉塞尔达再次瞥向那张照片，顿时明白了自己为何依旧憎恨瓦加斯主义者。"
 brazil_lacerda_samba.13.tt: "如果我们$BRA_lacerda_udn_party_together_with_the_liberais$，这些决议将更强大……"
 brazil_lacerda_samba.14.t: "核子家庭的胜利"
 brazil_lacerda_samba.14.desc: "塞尔吉奥依然觉得，自己坐在这张椅子上显得有些不合适。《论坛报》的财务困境早已众人皆知，从曾经是反对派的激进分子，转变为如今政府的支持者，这样的角色转换无疑是一种特殊的考验；但他永远是卡洛斯的儿子。尽管困难重重，他依旧维持着报纸的运作，并且为它感到自豪。而今天，他尤其感到骄傲。\n\n“亲爱的巴西人民，今天是我们举国欢庆的时刻。”打字机的咔嗒声在房间中回响，带着一种熟悉的韵律，让塞尔吉奥不由自主地回想起儿时的场景。那时，他常常听到父亲愤怒地敲打字键，写下那些激烈的社论。“今天，我们的国家，连同伟大的美利坚合众国，正式签署了一项至关重要的技术扩散条约。此时此刻，我们的科学家们正在得到所有必要的支持，打造我们自己的核体系。”\n\n他停顿了一下，目光转向墙上那幅挂在红木框里的父亲照片。照片中的卡洛斯，神情镇定，目光如炬，无畏领袖正应如此。“当然，这份主权保障的胜利并非轻易得来。”塞尔吉奥接着写道，脑海中浮现出父亲那不屈的斗争精神。“我的父亲，他曾为将疲惫的里约改造成充满活力的繁荣之城而不懈奋斗。今天，他依然勇敢无畏，为我们的国家与人民不懈努力。如今，总统先生依然在为国家鞠躬尽瘁！”\n\n“我们还有许多事情要做。要让更多的百姓过上好日子，让闲散的人有活干，把罪犯绳之以法，把叛徒清除出去。”接下来，他停住了，陷入短暂的沉思。几年前，或许他还会反复思考，父亲会如何措辞，会如何书写这些话语。但今天，他已经不仅仅是卡洛斯的儿子，他是塞尔吉奥。他的笔下流淌出属于自己的声音，尽管那声音依然带着父亲的影子。那些影子与他的自我交织，化为一个崭新的篇章。他吸了口气，擦了擦意外涌出的泪水，稳稳地敲下了最后几个字："
 brazil_lacerda_samba.14.a: "……今天，我们高呼，为了一个永远自由、强大、独立的巴西！"
 brazil_lacerda_samba.15.t: "浊酒相伴"
 brazil_lacerda_samba.15.desc: "这家酒吧服务于特权阶层，外交官、政客及其过度纵容的子女们常来光顾。黑色的混凝土墙悄无声息地吞噬着这里的秘密，明亮的舞台灯光笼罩着喧嚣的舞池。一楼为派对而设，热闹非凡；而楼上的阳台，则为那些更私密的对话提供了安静的庇护。点唱机的声音在阳台上低低回荡，足够轻柔，让人在交谈时还能保有一丝隐秘感。\n\n此刻，阳台上的其他人早已散去，只留下两个特殊的客人。他们并肩坐在俯瞰整个酒吧和舞池的座位上，手中捧着卡伊姆酒——一种巴西原住民的发酵饮料，默默地互相安慰着。\n\n“完了。我们自己的参议院，竟把我们撕了个粉碎。”爱德华多·戈梅斯，那个曾经的英雄、现任航空部长，猛地灌下一大口，又接着灌了一口。“这让我想起当年党拒绝我的时候，简直是一样该死的痛。”\n\n卡洛斯·拉塞尔达显然谨慎得多，但他手中的杯子已经空了。他默默地倒上第二杯，准备再来一杯。楼下的酒吧里，波萨诺瓦的音乐缓缓流淌，仿佛从水底深处传来。\n\n“我说，到底为什么？这里可是巴西工党的选区啊！工党的人投票把它给扼杀了。瓦加斯的那些余党！到底是谁，居然投票支持暴君？”\n\n拉塞尔达没有立刻回应。他端起第二杯卡伊姆酒，一口饮尽——这酒甜得像咳嗽糖浆，尽管拉塞尔达对它的味道并不特别喜欢，但今晚他可能还会再喝三杯。他的目光落在楼下的舞池里。年轻的、年长的情侣们在音乐中摇曳起舞，像是鞭子在光滑的地板上挥舞着他们的身躯。在吧台旁，情侣们轻笑着，温柔地抚摸彼此的头发。白领们围坐在桌边，边饮酒边八卦，互相嘲笑着彼此的玩笑。\n\n但拉塞尔达的想象却将这些欢笑声从夜总会带到了战争的残酷现实中。他仿佛看见那穿着天鹅绒衬衫的年轻人在阿根廷的地雷中被炸得粉身碎骨。吧台左边的那些女人，匆忙穿梭于满是伤员的野战医院中，护士服上沾满了鲜血。角落里的老头们则躲在黑暗的会议室里，利用战乱草拟出一条又一条新的法令，继续压迫着巴西的人民。而所有这些，都是因为如今他们失去了核保护伞，他们怎么就是不明白这个道理呢？"
 brazil_lacerda_samba.15.a: "他们真的想要自由吗？"
 brazil_lacerda_samba.16.t: "我活在梦中"
 brazil_lacerda_samba.16.desc: "“总统先生！”一个熟悉且令人心烦的声音突然从后方传来。拉塞尔达本以为自己可以在高原宫的办公室里度过余下的时光，静静思考接下来该如何行动，但他甚至还没走到大门口，就被马加良斯·平托从坡道下方叫住了。“总统先生，我能和您谈几句话吗？”拉塞尔达停住脚步，盯着平托看了片刻，最终耸耸肩，点了点头，挥手让护卫们退下。两人并肩无言地走向拉塞尔达的办公室。\n\n“我只是想来表示我的慰问。”平托拒绝了拉塞尔达为他准备的椅子，站在那里，双手交握。“我知道，投票的结果不如人意，但——”\n\n“这已经超出了我们的掌控。”拉塞尔达的回答果断且干脆，仿佛早已在脑海中反复演练过。他不再多说，房间陷入了短暂的沉默。拉塞尔达的目光游离在平托与办公桌之间，漫不经心地扫过，好像眼前的对话并不足以引起他的兴趣。平托停顿了一下，深吸了一口气，清了清嗓子。\n\n“总统先生，您还记得夸德罗斯关于外交政策曾说过的话吗？‘自由、独立和不干涉。’这些话听上去似乎是空洞的漂亮话，但其中不乏真理。我们不需要美国人来告诉我们如何管理自己的国家，也不必依赖他们来协助推进我们的核项目。或许，我们应该更加果断地拥抱独立的外交政策，在国际舞台上走出我们自己的道路。”\n\n拉塞尔达继续默默地注视着他，房间里的空气似乎凝滞了片刻。平托仿佛感受到了什么，随即微微鞠了一躬，转身向门口走去。“就这些，总统先生，好好想想吧。”他走到门口时停下了脚步，回过头又加了一句：“别忘了，是美国人抛弃了你，不是我们。”\n\n平托关上了门，拉塞尔达站在原地，一动不动，盯着窗外的天空。厚重的乌云在太阳上空聚集，道路上的车辆依然川流不息。拉塞尔达沉思良久，心中感到一种说不清的沉重与不安。这是平凡的一天，但却因为一件不寻常的事而显得格外不平凡：平托居然说对了一件事。"
 brazil_lacerda_samba.16.a: "你不来，生活就此止步……"
 brazil_lacerda_samba.17.t: "我的归宿，在你心中"
 brazil_lacerda_samba.17.desc: "雅尼奥·夸德罗斯曾经对远离公众聚光灯的生活感到满足。他偶尔接受一次电台采访，偶尔在报纸上发表几篇社论，时不时参加筹款晚宴和集会，但从未完全退出公众视野，尽管他确实悄然退居幕后，享受着相对安静的生活。\n\n然而，当国家逐步从动荡中恢复时，夸德罗斯也随之走出了阴影。他突然出现在巴西旗帜电台的广播中，时机恰到好处，就在晚上7点新闻播报结束后。连节目主持人都显得有些措手不及，略显迟疑地报出了他的名字。从那一刻起，夸德罗斯便滔滔不绝，整个巴西似乎都屏息聆听他接下来要说的话。\n\n“……如果你要问街头的混乱该怪谁，那就去看看阿德马尔手下那帮暴徒！就是社会进步党在煽动民众，制造分裂，目的无非是为了从拉塞尔达手中抢几个席位！但你们知道拉塞尔达做了什么吗？你们知道吗？他弥合了这些分歧，架起了沟通的桥梁，带来了真正的平等，赋予了日系巴西人应得的权利……”\n\n没有人完全理解为什么夸德罗斯突然改变态度。尽管此后他再也没有公开谈论过拉塞尔达，但在动乱平息后，夸德罗斯积极投身于帮助巴西的重建。他手持铁锹，握手寒暄，参与每一个重建项目，总是在闪光灯的焦点中。他到处演讲，只要有讲台和麦克风，他的身影就一定会出现。\n\n夸德罗斯首次广播的第二天早晨，拉塞尔达拖着疲惫的身躯走到早餐桌旁，随手翻开了放在咖啡旁边的报纸。封面上，夸德罗斯那灿烂的笑容格外醒目，拉塞尔达微微皱眉，带着些许不耐烦急躁地翻过了这一页。可翻过去后依然是关于重建的新闻，图片中，建筑工人和救援人员忙碌着，而夸德罗斯手持铁锹的身影再一次映入眼帘。拉塞尔达冷哼一声，然而手指却停住了，没有继续翻页。"
 brazil_lacerda_samba.17.a: "至少，夸德罗斯出面能帮他在圣保罗的形象更好看一些。"
 brazil_lacerda_samba.18.t: "守护守护者"
 brazil_lacerda_samba.18.desc: "历史派商谈之时，他们往往会避开公共场所。新国家时期的苦涩教训让他们明白，最最安全的地方莫过于自己的家中。今晚，他们齐聚在米尔顿·坎波斯家——这位看似永远的领袖。他的简朴两层小楼坐落在蓬特诺瓦，仿佛守护着那些为爱德华多·戈梅斯遗产而奋斗的忠诚骑士们。十几位宾客齐聚于此，围绕着那些只能被他们耳朵听到的秘密展开讨论。通常，这类聚会更像是一次放纵的借口，大家喝酒、畅谈，并发泄对拉塞尔达冷漠态度的不满。\n\n但今晚，坎波斯有更为具体的目标。他悄然从聚会中抽身，走进书房，叫来了两位特殊的客人：一个是联邦警察的队长，另一个是巴西军队的一名少校。他们借着昏暗的灯光坐下，坎波斯手中握着一杯本地酿造的红酒，酿酒人的名字早已被岁月遗忘。桌上的灯光反射在他的眼镜上，掩盖了他的眼神。\n\n“拉塞尔达终于清醒过来了。他已经批准了追加拨款给警察部队。”坎波斯抿了一口酒，“在过去几周所发生的事情之后，他别无选择。”\n\n“我们对此深表感谢。”警长的胡子随着他的话语微微抖动。“有了即将到来的这笔资金，我们的警力就能更好地应对未来的动荡，愿主保佑我们。”\n\n坎波斯的目光转向少校，缓缓地摇了摇头。“不，你们要做的远不止这些。”他的声音带着一种冷酷的意味。“不仅仅是资金。”\n\n少校紧张地吸了一口气，脊背泛起阵阵凉意。“您这是在暗示，用这些装备将逮捕变成就地处决？”\n\n“荒唐，可笑。”坎波斯一口将杯中的红酒饮尽，动作干脆果断。“我说的是保护。那些愚蠢的骚乱——日裔巴西人的抗议，你们如果有更好的装备，根本不会让局势失控到如此地步。真枪实弹，真正的防护盾牌。”他轻轻将空酒杯放回桌上，声音在书房中回荡。"
 brazil_lacerda_samba.18.a: "“我会搞定的。你们会得到所需的一切。”"
 brazil_lacerda_samba.19.t: "巴西的伟大白人救世主"
 brazil_lacerda_samba.19.desc: "威尔逊·莱特·帕索斯的政治生涯一向充满了矛盾，尤其是在拉塞尔达领导的时代。他的个人信仰与他所在政党的立场时常相左，每当帕索斯退让一步时，拉塞尔达似乎总是在向前迈进两步。然而，今天，帕索斯出人意料地与政府在某个议题上站在了同一阵线，尽管这并非他真正的意愿。\n\n废除日本移民禁令的提案在参议院被成功否决，那些试图进一步削弱巴西民族的声音最终被理智压制。帕索斯心中顿感轻松，他不由得暗自庆幸：难道像美国那样的国家，不正是因为移民政策的放宽而被严重“污染”了吗？亚洲人种的扩张绝不能在巴西再有任何机会。\n\n这个议题的胜利让帕索斯在政治上获得了些许安慰，特别是他与一些志同道合的议员建立了联系。他发现，这些新结交的同僚在移民问题上与他不谋而合。维持日本移民禁令无疑是一项巨大的成就，但帕索斯的思绪并不止步于此。他开始思考，其他国家的移民呢？\n\n中国？毫无疑问，也应该被禁止。至于整个大东亚共荣圈的移民呢？虽然一次性全面禁止可能会引发政治风暴，但如果逐步实行呢？非洲的移民呢？除了与巴西有紧密历史联系的安哥拉和莫桑比克，其他非洲国家的移民几乎无人会关心，也完全可以成为禁令的目标。\n\n这些构想只是帕索斯与他同伙们的部分讨论内容。有些提议看似遥不可及，而有些则并非如此。在帕索斯的眼中，尽管道路漫长，总有一天，这些理念会成为现实，他的观点终会被大多数人接受，成为主流共识。"
 brazil_lacerda_samba.19.a: "一个纳粹分子的光辉时刻。"
 brazil_lacerda_samba.20.t: "必要的污点"
 brazil_lacerda_samba.20.desc: "高原宫宏伟的厅堂内，卡洛斯·拉塞尔达静静地坐着，陷入了沉思。他双手交叉，双脚叠放，显得焦虑不安。最近的平定行动虽然巩固了全国民主联盟作为统治集团的地位，但拉塞尔达却难以感到满足。在他看来，这次“平定”与其说是平息动乱，不如说更像是瘟疫肆虐时堆积并焚烧尸体般的控制手段。\n\n“感谢你们处理好了局面。”拉塞尔达挺直了背，清了清嗓子，打破了沉默。站在他面前的戈梅斯和坎波斯对视了一眼，然后低头看着总统，桌上摆着一份损害评估报告。\n\n“如果没有果断的行动，危机只会继续恶化。”戈梅斯安抚道。\n\n“是啊，当然会。”拉塞尔达轻声回应。他缓缓站起身，又坐回椅子上，目光锁定桌上的一张照片——那是一个在抗议中被打裂头骨的大学生，他的鲜血流进排水沟，形成了一片触目惊心的血泊。\n\n“据我所知，”坎波斯伸手将照片翻了过去，“这是一次挑衅——瓦加斯主义者的挑衅。”他点了点头，“因果关系。”\n\n拉塞尔达举起一只手。“你们可以走了。”两人离开后，他把那份损害报告塞进抽屉，脸上浮现出痛苦的表情。他爱这个国家，爱这些人民。但他无法忍受民众可能将他视为比瓦加斯更残酷的统治者。这种感觉令他倍感背叛，即便他希望这只是内心的错觉。他挪动椅子时不小心碰倒了桌上的咖啡杯，深色的液体洒在木质桌面上，渗入其中，留下了难以抹去的污迹。"
 brazil_lacerda_samba.20.a: "因果关系。"
 brazil_lacerda_samba.20.tt: "§R无法§!再与£GFX_BRA_UDN_cooperation_texticon §Y建制派§!合作。"
 brazil_lacerda_samba.21.t: "赫拉克勒斯的劳动"
 brazil_lacerda_samba.21.desc: "塞尔吉奥·弗勒里用拇指碾着发红的指节，嘴角斜叼着半截香烟。上帝作证，他从不畏惧审讯——可这般体力透支倒是头一遭。\n\n罢工浪潮平息月余，嫌犯仍如雨后虫豸般从阴沟里涌出。有人哀嚎，有人咒骂，有人将带血的唾沫啐在他脸上。可无论他施加何等手段，总会有新的猎物在暗处滋生。\n\n今晨逮住的共产党分子便是明证——那真是场败兴的审讯。花岗岩般的硬骨头，即便被殴至濒死仍不发一语；伤口渗血太快，逼得他们提前冲刷审讯室地砖，碎牙在排水沟里积了薄薄一层。蠢货本可少受些罪，他最后只抛下这句结案陈词。\n\n衬衫溅满污渍。他岂是街头混混之流？美国人教官反复强调过，心理战术与肢体手段同等重要。或许等那家伙出了医务所，拿家属作筹码时，装傻的戏码就演不下去了。\n\n塞尔吉奥不得不承认：这差事虽苦，却不再是无用功。因镇压罢工有功，他俨然成了圣保罗的无冕之王，穿梭于名流盛宴，与权贵们碰杯调笑。可每当回到警局，嫌犯名单仍在疯长，权柄却在无限膨胀。这般重压足以逼疯常人。\n\n亲爱的玛丽亚，我的爱妻，我的天使，你是我撑过漫漫长日的唯一光亮。"
 brazil_lacerda_samba.21.a: "犯人背上烫痕宛如月球表面的陨石坑。"
 brazil_lacerda_samba.22.t: "暮光里的总统"
 brazil_lacerda_samba.22.desc: "平托拨通了号码，手指轻轻敲打着桌面，伴随着电话的嘟嘟声，他静静等待。电话响了两声，一个熟悉的声音终于传来。“塔沃拉，我的朋友。”平托开口说道。\n\n“平托，”电话那头是一道年长而沉稳的声音，“你要我来办公室吗？”\n\n“不，不是那样的。”平托靠在窗边，夕阳的光芒仍旧明亮，映在他脸上，仿佛将他的思绪映射得更加清晰，“我只是想打电话祝贺你，谈判圆满结束。”\n\n“这是必须做的事。”塔沃拉的语气依旧坚定，一如既往。\n\n平托微微笑了一下，接着说道：“你知道吗，我觉得全国民主联盟有了新的契机。”他一边用肩膀夹着电话，一边空闲的手做了个夸张的手势，仿佛在独自表演，“成为体制的一部分，成为稳定的象征。而要实现这一点，我们需要一个强大的领袖来掌舵。”电话那头传来塔沃拉轻轻的一声咳嗽。平托没有停顿，继续说道，“我就长话短说吧：你应该当总统。”\n\n“总统？”电话里传来一声沙哑的笑声，“我已经老了，没那个野心。难道不该让年轻人来领导党派吗？”\n\n“胡说，每个家庭都需要一个父亲——而巴西也需要一个父亲。”\n\n“听着，平托，”塔沃拉的语气像是在哄劝一个好奇的孩子般耐心，“我最近听到不少关于巴拉那州州长内伊·布拉加的消息。他已经是地方政坛里的巨鳄，似乎已经准备好在全国舞台上延续全民盟的政治遗产。给他一个机会吧。”塔沃拉随后挂断了电话。平托站在原地，目光穿过窗外，望向那渐渐沉入地平线的夕阳。"
 brazil_lacerda_samba.22.a: "给他一个机会吧？"
 brazil_lacerda_samba.23.t: "巴西利亚的休战"
 brazil_lacerda_samba.23.desc: "作为党的领袖，平托站在会议室最前方。然而，房间里所有人的视线都集中在他左侧的那个人身上——真正将他们凝聚在一起的人。他的双手安静地交叠在一起，眼睛隐藏在深色的墨镜后，没人能看透他在想什么，也没人知道他手里究竟握着什么牌。平托早已放弃试图控制局面。米尔顿·坎波斯的双手紧握，而拉斐尔·马加良斯则一副随时准备掀桌子的模样，仿佛恨不得跳过去掐死塔沃拉。\n\n“诸位，”平托清了清嗓子，试图稳住局势，“鉴于最近发生的特殊情况，我认为有必要召开这次紧急会议。我们今天聚在这里是为了——”\n\n“你。”坎波斯毫不留情地打断了他，目光始终锁定在塔沃拉身上。“你到底做了什么？”\n\n塔沃拉毫不动摇，冷冷回应：“我做了别人不敢做的事。”坎波斯的咬牙切齿地问道。马加良斯的拳头在桌下轻微颤抖，显然已经难以压制心中的怒火。“如果我们什么都不做，骚乱将演变成一场血腥屠杀。你能相信那样的人吗？”塔沃拉的声音平静，仿佛事实已然摆在眼前。\n\n“够了，你们两个。”平托猛地将双掌拍在桌上，试图用力量让争吵平息。“内斗只会让全民盟显得软弱和分心，我们不能再浪费时间了。我希望这一切现在就结束，否则在下一次选举前，我们会被彻底摧毁。”\n\n“你的建议是什么？”坎波斯咬着牙切齿地问道，“跟他合作？”\n\n塔沃拉微微扬起下巴，冷冷说道：“如果你不喜欢这个安排，大可以离开，跟戈梅斯待一块去。”\n\n“你这个该死的叛——”坎波斯几乎无法控制住自己，话还没说完，已准备站起身。\n\n“够了！”平托的吼声如雷贯耳，打断了所有人的思绪。“不准再内斗，不准再争吵！直到党内大会结束，我们所有人都必须团结一致，去支持塔沃拉，然后闭上你们的嘴。听明白了吗？”"
 brazil_lacerda_samba.23.a: "尽管极不情愿，但他们最终都接受了。"
 brazil_lacerda_samba.24.t: "党代会开幕"
 brazil_lacerda_samba.24.desc: "维尔吉利奥·塔沃拉在主席台上调整坐姿，看着礼堂逐渐坐满人群。距离上次全民盟党代会不过短短五年光景——彼时拉塞尔达挟民粹主义浪潮与个人魅力席卷而来，不仅赢得党内提名，更问鼎总统宝座。但结局如何，世人皆知。\n\n作为现任总统却无意连任的塔沃拉，此刻正试图将政党从自取灭亡的乐队派（以灾难性罢工事件为标志）转向务实派，即他属意的巴拉那州州长内伊·布拉加。\n\n首项议程是选举党主席，现任为马加良斯·平托。一位上周与塔沃拉密谈过的代表提议将党主席选举推迟至大选之后。经过口头表决，提案通过。\n\n但眼下更紧要的是确定1970年大选候选人。另一位与塔沃拉长谈多日的代表提名布拉加。零星几位代表又推举了几位知名度较低的候选人，这些人或因籍籍无名，或因现任职位政绩斑驳，注定难成气候。\n\n直到有人宣布支持拉斐尔·马加良斯竞选总统，塔沃拉猛然挺直脊背。这位乐队派干将曾是拉塞尔达最忠实的追随者，他的提名可能将全民盟重新拖入政治荒原。塔沃拉表面不动声色，内心却有个声音在咆哮：他们刚见证拉塞尔达执政的惨剧，竟然又想重蹈覆辙？"
 brazil_lacerda_samba.24.a: "塔沃拉只能寄希望于理智最终能够占上风。"
 brazil_lacerda_samba.25.t: "平稳着陆"
 brazil_lacerda_samba.25.desc: "塔沃拉不由自主地用右手指在膝盖上轻轻敲打着，他成了全民盟总部内少数保持沉默的人之一。按理说，他本不该有丝毫担忧。拉塞尔达那场戏剧性的垮台，早已重创了全民盟内最激进的“乐队派”，使得那些曾有可能接替他的人，如今在选民眼中几乎成了政治毒药。然而，他深知全民盟的固执与偏执——如果他们执意继续走极端呢？\n\n计票委员会的发言人站起身，声音如利刃般划破了弥漫在空气中的紧张气氛：“内伊·布拉加，在第一轮投票中胜出！” 这句话在大厅中回荡，片刻的寂静后，是如潮水般涌来的欢呼声。塔沃拉紧绷的神经终于松弛了下来。全民盟终于走回了正轨。\n\n击败那些激进的反瓦加斯主义元老派是一段艰难曲折的旅程，但现在，党终于迈向了正确的方向。全民盟正逐步成为巴西理性与共和主义的坚固堡垒。即便是拉塞尔达的残余支持者，面对布拉加压倒性的胜利，也不得不看清大势已去。他与平托所付出的心血，终于证明了一切都是值得的。塔沃拉缓缓站起身，舒展了下有些僵硬的身体，走向最近的一部电话。他和布拉加，还有许多关于未来的事情需要商讨。"
 brazil_lacerda_samba.25.a: "未来，仍有许多工作要完成。"
 brazil_lacerda_samba.26.t: "僵局"
 brazil_lacerda_samba.26.desc: "维尔吉洛·塔沃拉以沉稳与耐心著称——他行事谨慎、寡言少语，甚至带着几分深不可测的心机。这种隐忍克制，正是他能够登上总统大位的关键。然而，此刻，即便是他那向来冷静的表情，也在这场漫长而僵持的全民盟党代会上显露出了一丝难以掩饰的疲惫与焦躁。\n\n一轮又一轮的投票，却始终无法决出党的总统候选人。十九轮了，内伊·布拉加与拉斐尔·马加良斯的对决依旧胶着，僵持不下。其他一些候选人不断参与，却仅能收获零星的支持票数，随后又将手中的选票交易给更具优势的一方，以换取政治利益。会议一次次陷入僵局，投票仿佛成了一场毫无尽头的拉锯战。塔沃拉的内心始终希望温和派布拉加能够胜出——只有他，才可能确保全民盟不会重蹈拉塞尔达那灾难般的结局。然而，到了这一刻，他几乎已疲惫到可以接受任何结果，只要这场令人煎熬的闹剧能尽快结束。\n\n第二十轮投票又是毫无结果，现场响起了失望的哀叹与嘘声。突然间，一声重重的拍桌声响彻会场。\n\n“够了，他妈的够了！”阿利奥马尔·巴莱罗怒吼道，他的声音穿透了人群的嘈杂。他走向麦克风，环顾全场，确保每个人都能听清他的声音：“如果我们选不出一个统一的候选人，那就选两个！同意的请表态？”片刻的寂静之后，附和声如潮水般响起。几乎无人反对。\n\n塔沃拉愣住了。党内分裂了。他失败了。又或者，这本就是拉塞尔达留给全民盟的沉疴旧疾？那个曾将党派拖向极端与混乱的阴影，至今仍困扰着他们？而他，终究还是无力扭转这场乱局？\n\n但这一切已不重要。接下来的任务，是全力为布拉加争取胜利，他不仅要战胜瓦加斯主义者与社会主义者……更要击败党内那些固执的激进派。"
 brazil_lacerda_samba.26.a: "有时候，分裂是不可避免的。"
 brazil_lacerda_samba.27.t: "千言万语"
 brazil_lacerda_samba.27.desc: "街道又湿又暗。威尔森·莱特·帕索斯坐在约定的会面地点下——一家小型报摊，它出售进口的欧洲期刊和糖果。他手中拿着一本十年前的德国杂志，内容是关于近期优生学计划的成功案例。他微笑着，用笔标记了一些统计数据。或许，总有一天，他们的国家也能迎来如此的纯粹。\n\n有人轻轻拍了拍他的肩膀。“不好意思，先生，您见过我的黑鹰吗？”帕索斯转过身，看见一个宽肩的西装男子。\n\n“当然，我刚才还看见它从乌拉圭大街飞过。”陌生人的紧绷的目光稍稍缓和了些。他递给帕索斯一盒瑞士巧克力的小铁盒。\n\n帕索斯打开铁盒，里面整齐地摆放着一组高质量的照片。他逐张翻看，照片中清晰地捕捉到那个虚伪的拉塞尔达与两位他公开声称早已决裂的人坐在一起。普列斯特斯，这个狡诈的共产党煽动者；还有阿马佐纳斯，这个臭名昭著的恐怖分子。他们三人举杯畅饮，言笑晏晏，俨然一副亲密无间的老朋友模样。不过，倒也不算出人意料。毕竟。没有哪个马克思主义的垃圾会真正改变本性，拉塞尔达更不例外。\n\n“完美。”帕索斯递出一叠钞票。“这应该足够支付你的开销了。代我向大使表达谢意。”他将铁盒和杂志一起塞进口袋，兴冲冲地朝家走去，心中涌起一种孩童般的得意。伪造这些照片的德国特工呆呆地站在原地，目送目标离开，心中满是错愕。"
 brazil_lacerda_samba.27.a: "难道巴西人都这么容易上当受骗吗？"
 brazil_lacerda_samba.28.t: "谋杀也可称为正义"
 brazil_lacerda_samba.28.desc: "那天，众议院一片平静。秋日的天气格外宜人，恰如其分地夹在炙热的夏季与刺骨的寒冬之间，让人倍感舒适。当日的议题也轻松不少，大多围绕形式化的法律续签或毫无争议的人物授勋展开。\n\n最后一个议题是由威尔森·莱特·帕索斯临时提议的。他说自己有一场即兴的演讲要发表。大部分议员都以为这不过是他又要抱怨政府未能彻底清除国内的共产主义，或者提出新一轮建立官方优生学计划的请求，无论用什么名头。\n\n“各位议员先生们，我怀着沉重的心情站在这里。”他说道，语气中透着失望与愤怒。“我们的总统，一个我曾无比信任的人，仍然效忠于最为可憎的意识形态——共产主义。”他一边说着，一边将两份文件递给在场的议员们传阅。“他不仅与臭名昭著的恐怖分子阿马佐纳斯秘密会面，还向阿马佐纳斯的同伙送去了包含赦免承诺的同情信件。这些文件清楚地记录了他所做的一切，请各位亲自查看。”\n\n文件在议员之间传递着，许多全民盟党员开始低声讨论这一“背叛行为”。“荒谬！”“这些照片显然是伪造的。”“这根本不是拉塞尔达的笔迹！”与此同时，另一边的社会民主党和巴西工党却看到了机会。“如果我们让这些文件曝光……” “他的选举根本无力挽回！” “这种丑闻绝不能浪费。”"
 brazil_lacerda_samba.28.a: "平静被打破，阴谋悄然酝酿。"
 brazil_lacerda_samba.29.t: "良知的权衡"
 brazil_lacerda_samba.29.desc: "小毛里西奥·拉塞尔达坐在门廊藤椅上啜饮咖啡。他本打算再写一篇檄文，将政府——尤其是胞弟——钉上耻辱柱，但眼前某则新闻让他瞳孔微缩。他向来关注左右翼媒体对卡洛斯的攻讦，而这份右翼周刊的标题格外离奇：\n\n《卡洛斯·拉塞尔达的真面目？密会共党与恐怖分子，亲笔信及影像证据首度曝光》\n\n原来那个隐蔽法西斯分子帕索斯抛出所谓铁证，指控卡洛斯骨子里仍是共产主义者。报道称其与阿马佐纳斯及普列斯特斯结盟，计划借助左翼民兵发动自我政变，建立社会主义独裁。小毛里西奥读着忍俊不禁——证据显然是伪造的，但若属实……如今他的人生该是何等风光。\n\n他短暂思忖是否要借这则新闻重写批判文章，旋即打消念头。他乐于揭露卡洛斯的真实行径，但不愿污蔑构陷。何况这小子近来收敛许多恶行，甚至频频递出橄榄枝。就暂且放他一马吧。"
 brazil_lacerda_samba.29.a: "该隐放下武器，继续喝他的咖啡。"
 brazil_lacerda_samba.30.t: "会心一笑"
 brazil_lacerda_samba.30.desc: "“然后他居然问我——”平托捂着胸口，笑得喘不过气来。“他问我是不是会支持他的弹劾企图！就算我已经当着他的面把那些破绽百出的伪造证据一一骂了个遍，这个鼠辈还是想拉我站到他那边！我告诉你，总统，一个如此痴迷优生学的人，居然让我觉得他自己完全不适合‘适者生存’的原则。”\n\n拉塞尔达与这位盟友碰了碰杯。不同于往日，总统的眼中多了一丝生机与活力。“好吧，你该早料到这种行为。我从一开始就不信任他。”平托举起双手，仿佛辩解一般。“喂，现在我也不信他了。他是条蛆虫，而且还是个叛徒！显然，我们得把他踢出去。”\n\n拉塞尔达在空中转动着手指，唇间残留着几种上好红酒的味道。“不仅如此，平托！我们所有人都要在一封正式信件中谴责他。我桌上已经有了一份草稿，如果你愿意的话可以去瞧一眼。我对修改意见持开放态度——”平托摇了摇头，刚刚干完杯中的酒。“听着，卡洛斯。只要措辞得体，我不会反对。我随时可以签字。”\n\n“不过，我猜你不仅仅是想让他收拾东西走人，然后再附上一封措辞严厉的信，对吧，总统？”平托期待地盯着他。拉塞尔达嗅了嗅酒杯，随后痛快地抿了一口1956年的托斯卡纳山吉欧维榭。这一天，酒的味道更浓郁了，一切都如此。“我准备对他的所有事务展开全面调查，绝不放过任何细节。而且，如果我发现他的记录上有哪怕一丁点不干净的地方……”"
 brazil_lacerda_samba.30.a: "……他最后看到的‘铁十字’恐怕只有牢房的铁窗了。"
 brazil_lacerda_samba.31.t: "实用主义者的拆弹指南"
 brazil_lacerda_samba.31.desc: "“在我指出他的证据粗制滥造且缺乏专业性后，他居然还妄想拉拢我反对您。”\n\n总统府办公室回荡着威士忌冰块碰撞的清脆声响，塔沃拉小心翼翼地抿了一口，舌尖泛起苦涩，“当然，我当场就把他打发走了。依我看，这场闹剧注定要无疾而终。”\n\n拉塞尔达听着副总统的汇报，最初的震怒已稍稍平复。但他仍紧握着水晶杯，目光始终锁定着对方。\n\n“明白了。感谢你的忠心。不过现在，我们是否该讨论如何处置这家伙？”\n\n塔沃拉漫不经心地做了个请便的手势，嘴角挂着若有似无的笑意：“悉听尊便，总统先生。”\n\n这个轻佻的动作让拉塞尔达感到权威被冒犯。“当务之急是将这个优生学爱好者逐出本党。之后我打算彻查他与德国方面的联系，但……”\n\n副总统原本古井无波的面容突然扭曲：“万万不可。开除党籍绝不可行。”\n\n“维尔吉利奥！”水晶杯重重砸在桌上，拉塞尔达涨红了脸，“这个疯子企图弹劾我！难道党内还要纵容这种叛徒？”\n\n塔沃拉抬手做了个安抚的姿势，眉宇间微微阴沉：“我理解您的愤怒，阁下。但此刻必须强调团结。我保证会予以严厉申斥，教会他忠诚。只是这人身系要职……”"
 brazil_lacerda_samba.31.a: "“好吧。那就暂时留着这个鼠辈。”"
 brazil_lacerda_samba.32.t: "阁楼中的秘密"
 brazil_lacerda_samba.32.desc: "“亲爱的？”伊萨·莫塔仰头问道，“你在阁楼上找什么？”\n\n小毛里西奥·拉塞尔达咬着微型手电筒，光束在伊萨的腰际游移。他抬手像拔婴儿奶嘴般取出光源：“啊伊萨，来得正好。能帮我照着吗？”伊萨接过手电筒，光圈笼罩着小毛里西奥面前的猎物——一只掀开盖子的老旧木箱，塞满泛黄文件与相片。\n\n“国会里那些事，”他哗啦啦翻动纸张，“弹劾案的话……我觉得这里有料可用。”他抽出几张全家福，卡洛斯和小毛里西奥在父亲面前挂着空洞微笑的照片被随手丢开。“只要能推动进程的东西，肯定藏在这儿。魏纳可以帮我们发表。”\n\n“当初我们第一次阻止他时，你怎么不翻这些？”伊萨手中的光晕在满地狼藉与箱内残页间游移。小毛里西奥没有立即回应，直到他抽出一张照片——河岸边垂钓的卡洛斯与幼年的自己。他忽然僵住了，凝视着相片中两个陌生孩童。\n\n“不知道。大概没料到他会赢。”\n\n“现在他赢了，看看他对工人阶级做的那些……”光束扫过文件堆顶端的纸张，伊萨快速浏览了一遍：“就是这份，肯定能让他痛不欲生。”\n\n小毛里西奥注视着文件。脑海中齿轮转动，他仿佛看见记者们如何将这份致命证据化作利刃。而最锋利的刀锋，此刻正站在他面前。"
 brazil_lacerda_samba.32.a: "“放手去做吧，亲爱的。”"
 brazil_lacerda_samba.33.t: "声调校准"
 brazil_lacerda_samba.33.desc: "阿利奥马尔·巴莱罗在踏入国会大厦前反复思忖着应对策略。他知道坎波斯擅长慷慨陈词，塔沃拉能扮演痛心疾首的严父，平托可以卑躬屈膝地乞求宽恕——这些都不是他的风格。若拙劣模仿拉塞尔达的作派，更会招致东施效颦之讥。最终他选择以兄长式的失望神情登上讲坛，仿佛大哥回家撞见老二欺负老幺的情景。\n\n“针对卡洛斯·拉塞尔达的指控，”他沉声道，“既荒谬又失实。十五年来，这位民主斗士始终站在抗击新国家暴政的最前线。在座的各位谁敢说自己同样清白？谁能坦然面对同僚说‘我与瓦加斯毫无瓜葛’？”\n\n议席间顿时炸开了锅。“叛徒！”、“伪君子！”的斥骂与零星脏话此起彼伏。巴莱罗深呼吸三秒，待议长敲响木槌平息骚动后继续：\n\n“即便他年少轻狂时犯过错，其后果也远不及某些人严重。改弦更张后的拉塞尔达，展现的唯有赤诚。朋友们，他毕生所求不过是建设更美好的巴西——一个坚守民主价值的强大国度。恳请各位摒弃荒谬指控，否决弹劾案，让总统完成任期内的使命。至于其他……”他环视全场，“待任期结束后，相信各位自有公断。”"
 brazil_lacerda_samba.33.a: "台上激情四射，台下无人聆听。"
 brazil_lacerda_samba.34.t: "毫无根据的攻击"
 brazil_lacerda_samba.34.desc: "“看看眼前这群人，”坎波斯冷眼扫视议席，“同一批懦夫，同一批骗子。多年前把戈梅斯总统推向深渊时是这副嘴脸，多年后竟毫无长进！”抗议声浪骤起，但当他鹰隼般的目光锁定叫嚣者时，喧嚣顿时化作死寂。“这根本不是维护共和国纯洁性，而是全民盟的葬礼，是要拆毁我们誓死捍卫的民主支柱！”\n\n“环顾四周吧，先生们。你们当中站着谁？支持弹劾的是谁？瓦加斯余孽、贪腐之徒、利欲熏心之辈——但最可耻的，是伪善者！”他猛然指向工党议员席，那片区域立刻爆发出困惑与愤怒交织的骚动。“你们诽谤他，只因畏惧他。不仅怕他的雷霆手段，更怕他揭穿你们的画皮。看看你们阵营里的布里佐拉之流，看看那些……”他嘴中吐出恶狠狠的音节，“共党分子！”这个词让至少三名议员下意识后仰。“你们恨不得立刻把巴西献给赤匪。心虚之人自然明白，所以要用污蔑掩盖真相，诋毁这位看穿谎言、挺身而出的勇士！”\n\n“坎波斯先生，”议长敲响木槌，“请注意言论尺度。”\n\n他鼻腔里哼出冷笑：“我们全民盟成员团结一心，面对世间所有谎言，我们绝不会被击垮——无论是工党还是其他魑魅魍魉。最后奉劝尚未被毒害的同僚：为保全颜面，请否决弹劾。历史终将为此铭记各位的明智。”"
 brazil_lacerda_samba.34.a: "但老人愤怒的演讲，终究未能撼动局势。"
 brazil_lacerda_samba.35.t: "现实的冲击"
 brazil_lacerda_samba.35.desc: "“许多年前，”卡洛斯·拉塞尔达正在议会厅里发言，声音因紧张而略显尖锐。他清了清嗓子：“许多年前我还是学生时，曾遇到一位姑娘。像所有年轻小伙子一样，我迫切想要讨她欢心。她是巴共党员，于是我这个小头控制大头的愣头青，也跟着参加了几次集会。”他顿了顿，期待能听到些许笑声，台下却一片死寂。\n\n“后来他们公开支持瓦加斯政权。虽然无法理解，但愚蠢如我还是跟从了。接着我犯下了共产主义者最不可饶恕的罪过——批评党组织。我在他们的报纸上撰文，指出新国家体制根本不具备马克思主义的生存土壤。就因这个‘罪状’，我被扣上反革命的帽子丢掉了党籍。”他举起一叠文件晃了晃，“当然，诸位在关于我的无数报道里绝对找不到这段往事，所以我的办公室正在向巴西所有主要媒体和议员办公室派发相关资料。我想你们至少该听听部分真相。”\n\n议员席依然鸦雀无声，但拉塞尔达感到体内有股力量在升腾。他松开紧握讲台的手：“在座某些人正企图用这段历史摧毁我的政治生涯，乃至总统职位。面对所有诽谤，我只有这句话要说：感谢。感谢巴共让我看清共产主义不过是空中楼阁；感谢全民盟接纳我，证明民主制才是我们伟大祖国唯一的可行政体；更要特别感谢威尔逊·帕索斯议员，他给了我反思而后支持民主的机会。”他张开双臂，“我要对他们所有人道一句感谢。”\n\n拉塞尔达低头行礼，转身离开议席。没有掌声响起，但紧绷的空气已然消散。他从未感觉脚步如此轻盈。"
 brazil_lacerda_samba.35.a: "弹劾案最终以微弱差距被否决。"
