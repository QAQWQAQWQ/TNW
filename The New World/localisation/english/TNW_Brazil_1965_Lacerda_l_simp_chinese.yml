 brazil_lacerda_sorbonne_campaign.6.t: "重围监视"
 brazil_lacerda_sorbonne_campaign.6.desc: "“为巴西和民主干杯！”一个年轻的社民党职员扯着嗓子喊道，其他人也热情地举杯响应。过去这几个月，社民党确实干得顺风顺水，开了无数场活动和集会，军方一次都没来找麻烦。他们甚至都懒得派兵来看一眼，跟之前大家想的那帮神经过敏的大佬作派相去甚远。\n\n大家兴高采烈地闲聊庆祝，似乎库比契克和吉马良斯拯救巴西这事真的有戏。一个坐办公室的老文员——当年他还在卡斯特洛·布兰科手下工作过——感慨道，政治警察居然没有开着面包车来集会上捣乱，可真是难得。\n\n话音刚落，一个年轻职员突然不说话了，他说，他好像见过那种车，就在他办活动的时候。另一个也说他见过，然后一个接一个，都说见过。那种什么标志都没有的面包车，里面坐着些可疑的人，总是在那儿，总是在不远处盯着他们。\n\n屋里的气氛一下子冷了下来，只剩下窃窃私语和互相交换的眼神。最开始那个提议庆祝的年轻人只觉胃里一阵翻腾，他凑到窗边，偷偷往外看去。就在一个街区外，又一辆那样的车，停在那里，监视着，等待着。"
 brazil_lacerda_sorbonne_campaign.6.a: "密谋着。"
 brazil_lacerda_sorbonne_campaign.6.tt: "§Y[BRA_pres_selected_region_dynamic]§!\n  略微减少£BRA_pres_infra_texticon §G基础设施§!，使§Y$BRA_pres_candidate_name_1$§!的选举决议§G效果更差§!。"
 brazil_lacerda_sorbonne_campaign.7.t: "盖世功业"
 brazil_lacerda_sorbonne_campaign.7.desc: "内伊·布拉加注意到同车记者逐渐松懈的伪装。他们已同行多时，尽管这位记者保持着完美的职业素养，但他仍能捕捉到对方眼中闪烁的微光，突破口即将出现。\n\n“博尔热斯先生，我们马上要进城了。”他们沿着咖啡公路从隆德里纳南下，为展示新巴拉那州的专题报道进行采风，从新兴的路边商铺到污水处理厂都留下了足迹。布拉加倾身对司机说：“沙因，进城后开慢些。”\n\n车辆继续前行，周遭景致逐渐被都市风貌取代。暮色渐沉，城市华灯初上，勾勒出流动的剪影。暖色路灯下，行人身影在车窗外不断掠过。\n\n“恕我直言，如你所见，基础设施彻底改变了这座城市。”他指着途经的地标向同行者介绍，从市政市场、在建工程到学校与通讯网络，记者飞速记录着每个细节。“更安全的街道，更现代化的经济。”\n\n轿车最终停在一座富丽堂皇的酒店前。两人下车握手时，布拉加说道：“明天就是行程的最后一站巴拉那瓜港了，那里的景象绝对震撼。”\n\n“肯定的，布拉加先生。感谢您今天陪同。”博尔热斯回应道，“我的读者中，恐怕没人见过这般浓缩的现代巴拉那州全景。期待明日再会。”说罢他便走向客房。\n\n尽管奔波了一整天，布拉加却因期待而心潮澎湃——那篇报道定会大获成功。"
 brazil_lacerda_sorbonne_campaign.7.a: "竞选路线向北前往圣保罗。"
 brazil_lacerda_sorbonne_campaign.7.b: "路线继续向南延伸。"
 brazil_lacerda_sorbonne_campaign.8.t: "老朋友，新联系"
 brazil_lacerda_sorbonne_campaign.8.desc: "“费尔南达，进来！”\n\n办公室里一片混乱，人声与打字机的嘈杂声交织成一片。布拉加的竞选横幅高悬在中央大厅上方，横幅中的男人正微笑着俯视这群为他奔波的工作人员。直到同事用手肘轻推，费尔南达才听见竞选经理办公室的召唤。\n\n她停下打字工作，小跑着进入那间狭小的私人办公室。上司在她身后关上门，将一份文件夹甩到桌上，自己则踱回办公桌后坐下，身子前倾。“听着，”经理开口，“这是布拉加先生访问圣保罗前需要联络的对象。每个人都要通知到位，明白吗？我们得给媒体准备一个盛大的欢迎团，人越多越好。你负责打电话落实，细节都在里面。清楚了吗？”\n\n费尔南达怔了怔，接过沉甸甸的文件夹。匆匆一瞥间，她不仅看到密密麻麻的姓名，还有活动细则和每位联系人的备注。整份文件列着数十个名字，其中不少令她诧异，有些根本不像是会出席全民盟活动的人。想到自己桌上未完成的工作，她迟疑道：“先生，可我正忙着——”\n\n“我知道，其他工作都往后稍稍。这事优先。我不管你怎么跟他们说，许什么承诺，总之必须让他们出席接待会。你应该发现了，多亏布拉加先生过去在党派问题上的……灵活性，这份名单上什么人都有。”他意味深长地停顿，“有些人与全民盟并非总是意见一致。但这是布拉加先生亲自下达的指示，能争取多少争取多少。能做到吗？”\n\n费尔南达低头凝视手中的文件夹。“但愿和这些人还没闹僵。”"
 brazil_lacerda_sorbonne_campaign.8.a: "但他们是……"
