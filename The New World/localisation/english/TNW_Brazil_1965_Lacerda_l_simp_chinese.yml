 BRA_lacerda_udn_dot_tt_delayed: "描述"
 BRA_lacerda_udn_dot_liberalism: "自由主义"
 BRA_lacerda_udn_dot_statism: "国家主义"
 BRA_lacerda_udn_dot_cooperation: "合作"
 BRA_lacerda_udn_dot_intransigence: "强硬"
 BRA_lacerda_udn_button_realistas_tt: "务实派"
 BRA_lacerda_udn_button_realistas_tt_delayed: "领袖：§Y维尔吉利奥·塔沃拉§!\n\n\n\n\n\n\n\n£GFX_Tavora_texticon\n\n\n\n\n\n\n\n\n1950年爱德华多·戈梅斯入主高原宫时，巴西似乎即将摆脱瓦加斯主义与威权发展主义的阴影。然而随着戈梅斯政权倾覆，1955年库比契克击败“东北副王”茹阿雷斯·塔沃拉，反瓦加斯主义者五年的辉煌就此终结。\n\n茹拉西·马加良斯在1960年大选折戟后，务实派逐渐边缘化。他们自诩为全民盟内唯一恪守民主精神的派系。尽管多数成员仍倾向经济自由主义，却时刻警惕过度改革会招致瓦加斯主义借尸还魂。\n\n他们清楚旁人的讥诮——守旧派、悲观者、懦夫。但威望确能带来实权：茹阿雷斯的侄子维尔吉利奥·塔沃拉便成功当选副总统。如今，茹拉西向美国承诺维系巴西稳定之际，维尔吉利奥正紧盯着拉塞尔达的每个举动，严防这位狂人的野心践踏民意，葬送全民盟的未来。"
 BRA_lacerda_udn_button_banda_de_musica_tt: "乐队派"
 BRA_lacerda_udn_button_banda_de_musica_tt_delayed: "[GetBandadeMusicaLeader]"
 BRA_banda_de_musica_lacerda_leader: "领袖：§Y卡洛斯·拉塞尔达§!\n\n\n\n\n\n\n\n£GFX_Lacerda_texticon\n\n\n\n\n\n\n\n\n在格雷戈里奥·福尔图纳托策划的暗杀中侥幸逃生后，卡洛斯·拉塞尔达在新国家体制崩塌的浪潮中，以迅雷不及掩耳之势成为巴西政坛巨星。这位亲手推翻瓦加斯的斗士麾下聚集起经济自由派、顽固反瓦加斯分子与狂热煽动者，实属意料之中。\n\n拉塞尔达曾支持雅尼奥·夸德罗斯竞选副总统，但后者的反美论调最终令外交鹰派敬而远之——这些人大都转而投奔拉塞尔达对OFN的坚定立场。五年弹指，当大选尘埃落定，乐队派已然登台主唱。\n\n如今拉斐尔·马加良斯执掌幕僚长要职、桑德拉·卡瓦尔坎蒂坐镇瓜纳巴拉州长之位、阿里奥马尔·巴莱罗雄踞参议院，乐队派俨然以国家主人自居，描绘着巴西民主的崭新蓝图。他们为拉塞尔达摇旗呐喊多年，切莫令其失望。"
 BRA_banda_de_musica_maghallas_leader: "领袖：§Y拉斐尔·马加良斯§!\n\n\n\n\n\n\n\n£GFX_Maghallas_texticon\n\n\n\n\n\n\n\n\n拉塞尔达去职下台，乐队派也分崩离析。他们曾是巴西自由主义的希望与先驱，但却被塔沃拉发动政变搞得元气大伤。谨慎务实的务实派上台掌权，在党内推行温和路线。拉塞尔达本人则在各个避难所辗转流离，试图维持其残余的影响力，而他曾经的盟友则在没有他的情况下继续前进。\n\n是的，他们输掉了这场战役，但还没输掉整场战争。拉斐尔·马加良斯接过了乐队派的领导权，誓要在风暴中守护自由主义的火种。言辞犀利、立场坚定的桑德拉·卡瓦尔坎、务实的经济学家埃尔贝托·莱维，以及沉默的改革建筑师埃利奥·贝尔特朗，团聚在他的周围。他们信念坚定，矢志不移：无论务实派如何妥协退让，巴西都必须牢牢锚定在OFN阵营之中。\n\n乐队派或许被迫退居幕后，但他们绝不会就此谢幕。布拉加的总统任期是一颗难以下咽的苦果，但1975年大选的曙光已经若隐若现。乐队的乐章仍在低声吟唱，微弱却坚定，静候着再度奏响凯歌的时刻。"
 BRA_lacerda_udn_button_bossa_nova_tt: "波萨诺瓦派"
 BRA_lacerda_udn_button_bossa_nova_tt_delayed: "领袖：§Y马加良斯·平托§!\n\n\n\n\n\n\n\n\n£GFX_Pinto_texticon\n\n\n\n\n\n\n\n即便全民盟中那些崇尚商业的都市技术官僚，也难抵民粹主义改革风潮的席卷。受雅尼奥·夸德罗斯以非正统策略成功当选副总统的鼓舞，由改革派政客组成的波萨诺瓦派逐渐壮大为党内主要反对阵营。尽管奉行发展主义与国家主义信条，但其强硬的保守社会政策与狂热的教会支持，使之与工党及社民党泾渭分明。\n\n1965年，派系领袖、米纳斯吉拉斯州州长马加良斯·平托角逐总统宝座败北，输给风头正盛的卡洛斯·拉塞尔达。或许是作为补偿，他接任全民盟主席，在拉塞尔达探索新政时为其稳定大局。如今他与联邦众议员若泽·萨尔内携手，既要维系联盟对民众的承诺，更要确保政党蒙主眷顾。\n\n而传言称，平托对总统之位尚未死心……"
 BRA_lacerda_udn_button_liberais_tt: "历史派"
 BRA_lacerda_udn_button_liberais_tt_delayed: "领导人：§Y米尔顿·坎波斯§!\n\n\n\n\n\n\n\n\n£GFX_Campos_texticon\n\n\n\n\n\n\n\n鲜有人会深情地回忆起爱德华多·戈梅斯的任期。保守派的评论家们撰写檄文，抨击他未能加入自由国家组织；工人们则因他废除最低工资而走上街头。十多年后的今天，即便他仍是那位“永远的航空部长”，大多数巴西人也早已将他视作一段不愉快的记忆。但并非所有人都如此。\n\n他们被政敌戏称为“学士集团”，但更喜欢自称为“历史派自由党人”，代表着党内最古老的保守主义流派。尽管不像年轻同僚那般信奉自由放任，但他们却是党内最坚定的反瓦加斯主义者，拥有与新国家体制斗争数十年的丰厚经验。\n\n这是党内最小的一个派系，在创党元老、联邦众议员米尔顿·坎波斯的指导下运作，此人尚有些影响力。该派系致力于复兴“准将总统”的政治遗产，试图诱使拉塞尔达采取更严苛的法制手段。他们已无缘真正染指权力，但或许，从他们身上学一两招治国之术，也并非毫无益处。"
