 BRA_lacerda_success_tt: "§Y国策树中新选项将可用。§!"
 brazil_lacerda_samba.95.t: "众叛亲离"
 brazil_lacerda_samba.95.desc: "先是涓涓细流，然后洪水滔天。选票，新闻头条，满是嘲讽与挖苦的社论都是如此。副总统塔沃拉坐在办公桌后，怒视着眼前给极端现实派带来了大麻烦的全民盟政客。至少塔沃拉的怒容还能把这个小喽啰塞回他钻出来的狗草的大坝破洞里。\n\n但副总统手头的第一份报纸《新闻论坛报》也没好到哪里去。“工党-全民盟水电大坝一溃千里”的字样赫然印在报纸头版上。《全球报》则宣称“工党把全民盟拉下了东北骗局”。塔沃拉攥紧了拳头。这原本绝不是个愚蠢的决策，也不是工党的主意。这些大坝是他一手规划的，如果不是那些该死的瓦加斯主义者说服他降低了预算，它们本可以让东北地区在未来几代人的时间里成为右派的忠实票仓……\n\n行吧，塔沃拉想着，强忍着保持体面，把报纸塞进了自己的公文包。他不会再犯这样的错误。跨党派合作的努力为他带来了耻辱，带来了全民盟的分裂与乌鸦敌意的聒噪，唯独没有一张选票。"
 brazil_lacerda_samba.95.a: "付诸东流。"
 brazil_lacerda_samba.96.t: "唯余荒芜"
 brazil_lacerda_samba.96.desc: "维尔吉利奥·塔沃拉感到自己的喉咙阵阵刺痛。全民盟的议员，他的同事们正盯着他，眼里满是惊恐和憎恶。他曾经为了满足拉塞尔达总统的要求和他们争辩，以求他们同意降低水电议案的支出。他和他们达成的妥协已经彻底破裂了。票数不足。\n\n在他们的目光下，塔沃拉站起身来离开了。他感觉自己的舌头又肿又沉，死死地顶着下颚。他听见了背后传来的骂声。他完全想得到前方会有多少记者围着他转。他们身后的人是恼火的拉塞尔达，他绝对会要求塔沃拉就他动议的失败做出解释。\n\n但没有人在意塞阿拉州的雅瓜里比河洪水淹没了多少村庄和农田。不知多少个家庭在漆黑的街上搜寻着湿透的物件。陷入黑暗的福塔莱萨城里，乞丐们在空荡荡的工业园里游荡……\n\n塔沃拉甩上了他车的门，简短地命令道：“走。”在窗外，霓虹灯闪烁着，似乎在招呼他来一杯冰可乐。"
 brazil_lacerda_samba.96.a: "如果可以的话，他本该来一杯的。"
 brazil_lacerda_samba.97.t: "徒劳无功的政客"
 brazil_lacerda_samba.97.desc: "“真够冒险的，对吧，维尔吉利奥？”卡洛斯·拉塞尔达身子前倾，越过总统办公桌说道，“你是不是研究过你的前任夸德罗斯的手段？能在疯狂和无能这两方面都跟他不相上下，这可真了不起。”\n\n副总统塔沃拉想说点什么，但拉塞尔达不屑地挥手打断了他：“不过别以为同样的把戏能在我这儿玩两遍。下次你再因为像这种水电站计划这种蠢事威胁辞职，我就接受。因为我的政府里容不下蠢货，更别提那种连自己的法案都通不过，还非要勒索我全力支持的蠢货。”\n\n塔沃拉更加怒目圆睁。他脑海中闪过宁愿辞职也不愿再忍受这种侮辱的念头。他可以离开这个乌鸦，去啄食全民盟行将就木的腐肉。\n\n不，在正值声誉的最低谷辞职，只会让这段副总统任期彻底宣告失败。塔沃拉竭力克制住自己，这是在里亚尔戈军事学校养成的纪律习惯，他站起身来礼貌告辞。在转身离开时，他从一面抛光的装饰用黄铜镜中看到拉塞尔达的眼睛正死死地盯着自己后脑勺那块日渐稀疏的头发。"
 brazil_lacerda_samba.97.a: "或许，还能瞥见一个自己已经妥协的世界。"
 brazil_lacerda_tiny_strike.1.t: "小酌"
 brazil_lacerda_tiny_strike.1.desc: "两名钢铁厂工人举杯相碰，将杯中液体一饮而尽。但杯中之物并非酒精，而是果汁。今天还长着呢，可不能喝个酩酊大醉。两个朋友互相拍了拍对方的背，拿起自己的东西，走出公寓，汇入里约热内卢熙熙攘攘的街道。\n\n工友们加入两人的行列，下楼前往常去的公共汽车站。但今天他们在车站停了下来，任由惯常的那班巴士空载离去。不，今天他们不去上班，巴西各地成千上万的工人阶级也是如此。卡斯特洛·布兰科为“总统”卡洛斯·拉塞尔达操办了一场不公平的选举，这位所谓的总统极端反对任何与瓦加斯有关的事情，《联合劳工法》自然也在其中。因此，他不得不在就职典礼后就立刻面临一场全国性的罢工危机，而结束这场风暴的唯一途径就是辞职，并下令举行公平选举。\n\n首批示威者涌入巴西大道，零星警力压根拦不住他们，难不成他们还能把这么多人投入监狱不成？当支援警员终于抵达时，示威人群却已经翻了十倍不止。警察们来得挺快，但终究只能在漫天飞舞的空罐与石块，以及示威群众的欢呼声中以更快的速度仓皇逃遁。"
 brazil_lacerda_tiny_strike.1.a: "你要如何应对，总统先生？"
 brazil_lacerda_tiny_strike.2.t: "决定因素"
 brazil_lacerda_tiny_strike.2.desc: "卡斯特洛·布兰科和戈尔贝里·多·科托-席尔瓦所领的军官团正在密谈。他们目前正围坐在黑针军事学院为数不多的几间会议室之一的桌前，百叶窗关得严实，仅有丝缕阳光才能从中穿过，除此之外，便只有一盏台灯以作照明之用。此番谋划必须严格保密，一旦泄露给媒体，在座诸公有一个算一个，全都得去马戏团扮小丑。\n\n“依照现有情报看，”戈尔贝里翻开文件封套的声音打破了寂静，“如果应对失当，这场抗议还将继续扩大。很多主要城市的罢工行动已经被左翼组织所掌控，比如里约热内卢。”听到里约热内卢这个名字，许多人都不由自主地看向窗外……毕竟，从这里过去不过两小时车程。\n\n“那不正该重拳出击？”卡斯特洛回应道，“军队有能力，也有意愿镇压这帮左翼暴徒。如有必要，动用武力！”他从椅上起身，走到窗边。而戈尔贝里也很快站起身，摇头表示反对。\n\n“莽撞行事只会恶化局势。”戈尔贝里说道。卡斯特洛悄悄翻开百叶窗的一行，看到一队义务兵正在附近列队。“我们需要与拉塞尔达协调，确保我们步调一致。他可能只是希望谈判。”卡斯特洛默默地思索着这句话，转身面对在场的其余军官。\n\n军官团的其中一人，维森特上尉，清了清嗓子说道：“我认为戈尔贝里将军的建议更合理，先生。应当由总统做最终决定。”卡斯特洛把这句话在脑中反复咀嚼，然后转身对着戈尔贝里，重重地哼了一声。他终究还是点头同意了。"
 brazil_lacerda_tiny_strike.2.a: "“同意。但由我独自知会拉塞尔达。”"
 brazil_lacerda_tiny_strike.3.t: "征兆"
 brazil_lacerda_tiny_strike.3.desc: "一名示威者抓起一个空的汽水罐，将之尽可能压扁，以降低空气阻力。他摆臂过头，双腿一前一后迈开保持平衡，闭起一只眼睛瞄准，然后将自己的炮弹掷向目标。\n\n先不提能不能击中军方的直升机，就算是打中了，恐怕也没法擦花直升机的油漆。然而，盘旋在巴西大道示威者头顶上的直升机群依然为此受到了巨大打击。虽说卡洛斯·拉塞尔达的直升机上都满载着机枪，他也无法摧毁人民的意志。\n\n在过去的几个小时里，没有一辆车能通过巴西大道，成千上万名反对乌鸦的工人将之完全瘫痪。警察无力阻止他们，只能尽量控制。军队派出直升机恐吓他们，但示威仍不停歇。\n\n工人们不断向前挺进，围观群众有的瞠目结舌，也有些陆续加入人群的洪流。附近的某个屋顶上，两名男子匆忙爬到可以俯瞰人群的边沿，举起相机开始拍摄示威者与盘旋的军用直升机。整个巴西即将见证这一切。"
 brazil_lacerda_tiny_strike.3.a: "何时才能结束，总统先生？"
 brazil_lacerda_tiny_strike.4.t: "表态"
 brazil_lacerda_tiny_strike.4.desc: "看着卡斯特洛·布兰科走进房间，拉塞尔达不禁怀疑他迟到是刻意为之。或许只迟了几秒钟，但每一秒的滴答声都在他意识里沉重回响。终于，布兰科粗暴的动作把拉塞尔达拉回了现实。他试图寒暄几句，却被对方直接打断。\n\n“我不是外面那些极端分子，我是来谈正事的，卡洛斯。”布兰科粗声说着，重重坐下，“说实话，我对你迟迟不做正确决定很失望。“\n\n拉塞尔达自知弦外之音，但还是不想直接跳脸反驳：“您指的是？”\n\n布兰科转身瞪了一眼，对这个提问明显不悦，随即又因即将说出口的话露出笑意：“派军队镇压。懦夫会逃跑，里面的布尔什维克正好给我的人当靶子。子弹够多的话，说不定能一劳永逸。”\n\n拉塞尔达沉默片刻，思索着替代方案。他憎恶罢工者，但直接武力镇压可能让国家先前的成绩功亏一篑。“虽然我也不是不愿意，但谈判或许能平息他们的怒火？”他试探性问道，“当然，我不是说让古拉特复权，而是来些无关痛痒的让步。”\n\n布兰科旋即火冒三丈，甚至还带着一丝惊惧：“你要向这群小丑让步？当初我支持政变时——”\n\n说到这里，他梗住了，失望地恼叹道：“我现在可不会去对付戈尔贝里。要谈就去谈，但若失败，我的枪可不会等你通知。”"
 brazil_lacerda_tiny_strike.4.a: "“卡斯特洛，他们不必开火的。”"
 brazil_lacerda_tiny_strike.4.b: "“长官，转念一想，或许你的担忧是有道理的。”"
 brazil_lacerda_tiny_strike.5.t: "通话"
 brazil_lacerda_tiny_strike.5.desc: "拉塞尔达拨通电话时再次长叹，疲惫而恼怒地看向戈尔贝里。他连着拨号几分钟，无一例外皆是忙音。一次或许还能归咎于时机不巧，两次尚可解释为简单失误。但五次？就在他几乎要接受布兰科直接军事镇压的命令时，电话那头突然传来杂音。\n\n“喂，是何塞吗？”拉塞尔达突然前倾身体追问道，“你们罢工者到底想要什么？”\n\n电话那头陷入沉默，随后传来的回应几乎被背景中震耳欲聋的口号声淹没：“我们要求……保护巴西工人联盟……劳工权利……允许古拉特参……新选举。”\n\n拉塞尔达与戈尔贝里交换眼神，两人都在努力拼凑这些破碎的话语。允许古拉特参选当然绝无可能，保留巴西工人联盟也是，但这并不意味着他需要实话实说。“能听清吗？”拉塞尔达提高声量，“我承诺不会取消任何工人……保护政策，也会保留巴西工人联盟的合法地位。”\n\n这次对方的回应清晰得多：“除非古拉特获得参选自由，否则里约人民绝不复工。”\n\n拉塞尔达心知自己的文字游戏不管用，却仍不死心：“听着，反对你们的势力远不止我这一方，你们不会想看到他们出手的后果。停止罢工，我保证没有人会受到伤害。”\n\n电话那头的声音再次淹没在新一轮的口号声中：“我们能看穿你的话术。保留巴西工人联盟，停止迫害古拉特。这就是我们的诉求。”"
 brazil_lacerda_tiny_strike.5.a: "“好好好。既然你们这么坚持，那我不会削减联盟的力量。”"
 brazil_lacerda_tiny_strike.6.t: "一帆风顺"
 brazil_lacerda_tiny_strike.6.desc: "拉塞尔达嘴里骂骂咧咧。他当然不打算在这里让步，一旦他形势好转，自己必须立马解散这个组织。但目前为止，在他仍需保证布兰科能适可而止的时候，为了防止他的计谋彻底崩溃，还是得假装再让步一下。\n\n“你真保证完全不碰工联？”何塞问。看来他也不完全相信这个提案，不过话确实说进了他心里。戈尔贝里沮丧的听着，但选择一言不发。\n\n不忍房间继续沉默，拉塞尔达选择再次回应：“当然，我们来服务的是巴西，不只是右翼。”仍是老一套空话，但最坏的情况下，他也还能等几个月。\n\n电话线那头又静了下来，从群众呼喊的嘈杂中，偶尔传来几句断断续续的对话，时不时只蹦出来几个能听得出来的词。“如果你撒谎，但凡听到你想削弱工联的一点动静，那我们就马上重新上街。”虽然听着带点犹豫，拉塞尔达知道他们接受了。\n\n “不用担心这个，何塞，相信我。”\n\n “那这样的话，卡洛斯，我们达成一致了。我们的人马上复工。”听完何塞最后的答复，他的乐观情绪被失败打散。电话那头再次传来几声叫喊，宣布结束罢工，顺便好一番赞赏了拉塞尔达在巴西工人联盟问题上的彻底失败，才挂断电话。拉塞尔达从椅子上起身，又叹了口气，不过里面终于沮丧感，而是解脱感。"
 brazil_lacerda_tiny_strike.6.a: "\"通知军队撤退，戈尔贝里。我们谈妥了。”"
 brazil_lacerda_tiny_strike.7.t: "头盔"
 brazil_lacerda_tiny_strike.7.desc: "卡车与吉普车碾过里约街头，钢铁洪流载着头盔与面罩组成的移动城墙。执勤警察退避三舍，任凭那些头盔与面罩接管岗位。天桥之上，示威人群的头顶悬着无数张防弹面罩，有色镜片后射出的目光如探照灯般扫视工人队伍。\n\n直升机轰鸣吓不退他们，何况区区无面暴徒？示威者咒骂不断，继续向前挺进。两名记者被赶下天台，取而代之的是两具头盔与面罩。人潮沿着巴西大道奔涌，直到迎面撞上由头盔与面罩把守的军用卡车路障。此刻无线电里传来指令。\n\n人群在枪声响起前尖叫溃散。二十来岁的青年膝盖中弹跪地，旋即被一枪命中咽喉，当场毙命。开枪的少年甚至没看清他咽气的模样，准星早已移向下个目标。钢铁厂工人拖着同伴寻找掩体，一记精准的子弹贯穿脊柱，直到生命流逝殆尽时才惊觉自己拖拽的已是尸体。\n\n三十分钟后，万籁俱寂。不仅是巴西大道，整座里约热内卢都陷入死寂。头盔们俯视着尸体，逐具确认死亡。军官们俯视着头盔，对成果深感满意。卡洛斯·拉塞尔达俯视着办公桌，坚信自己的决策利国利民。耶稣基督俯视着里约，在沉默中作出审判。"
 brazil_lacerda_tiny_strike.7.a: "干得漂亮，总统先生。"
 brazil_lacerda_tiny_strike.8.t: "显影进行时"
 brazil_lacerda_tiny_strike.8.desc: "新闻办公室内烟雾缭绕，即使窗户大敞，也丝毫未能驱散刺鼻的烟味。此起彼伏的打字机噪音中，记者们全都只能靠扯高嗓门才能交流。西尔维娅和卡罗琳娜的衣衫被汗水浸透，抽了个空，躲到防火梯上透透气。\n\n“奥斯卡是去冲洗迭戈和皮奥昨天拍的照片了吧？”西尔维娅倚着铁栏杆问，“按道理半小时前就该回来，你说他到底被什么事绊住了？”卡罗琳娜拈起毛衣上的一粒线头，轻轻弹下防火梯。\n\n“堵车了？冲印店排长队？\"她随口应道，语气却透着不确定，\"或者半路跑去喝咖啡耽搁了？”\n\n两人低头看向下方空荡荡的街道。这跟头怕是没人敢开车，更别提跑去冲印照片了。而且奥斯卡向来守时，也不是会绕道买饮品的人。忽然几辆军车转过街角，两个姑娘瞬间僵住，慌忙跑回办公室。\n\n刚踏进门槛，军警已破门而入，厉声喝令所有人高举双手。西尔维娅与卡罗琳娜惊恐地看着士兵们开始收缴打字机和笔记本。"
 brazil_lacerda_tiny_strike.8.a: "奥斯卡到底他妈在哪？"
 brazil_lacerda_tiny_strike.9.t: "破门"
 brazil_lacerda_tiny_strike.9.desc: "钢铁工会办公室的门缓缓开启，一枚金属小物件骨碌碌滚入。大厅里的人们刚起身张望，刺目烟雾瞬间吞噬整个大厅。警察破门而入时，防毒面具下的呼吸声如同机械兽的低吼。\n\n离门最近的男子首当其冲。四名警员粗暴钳住双臂，将他抛向街道铐在灯柱。他不过是个送报员，但没人有兴趣核实身份。某位警长被镇纸击中颧骨，痛得躬身如虾，旋即暴起扑向袭击者，一记警棍砸断鼻梁，又在对方倒地后继续鞭挞。\n\n整栋建筑唯有一人觅得藏身之所——沙发底下的狭缝。透过灰尘弥漫的缝隙，他目睹黑色军靴碾过帆布鞋。五天前阿维尼达大道的屠杀犹在眼前，拉塞尔达政府显然要赶尽杀绝。\n\n待最后一道靴声消失在街角数小时后，他才敢从藏身处爬出。贴着龟裂的玻璃窗，他数遍街道上所有警车与无标识厢型车。手指触到门把时又缩回，再三确认才推开生锈的铁门。"
 brazil_lacerda_tiny_strike.9.a: "他孤身隐入黑夜。"
 brazil_lacerda_tiny_strike.10.t: "乌鸦的呼唤"
 brazil_lacerda_tiny_strike.10.desc: "这次罢工无疑令人困窘，但值得庆幸的是，它也以创纪录般的速度被平息了，而戈尔贝里对此很是得意。“容我自夸一句，总统先生，简直是完美绝伦。”他在电话里低声说道，“如果握手之后要洗个手的话，那我简直是要洗上好几周。”\n\n“嗯，哦，是啊。”拉塞尔达快速回道，他有些恼火——事情多着呢，哪有时间来听这些有的没的。“恭喜你啊，将军，我会派专人过来听取你的汇报的。”\n\n他撂下听筒，眼前浮现起各部呈报的画面：里约钢铁工会、《联合劳工法》，还有那些三字母缩写工会谋划的复仇行动，但他们只能怒视着军警锃亮的刺刀与枪膛，掀不起半点波澜。\n\n更多有关暴力的报道，拒捕的工会官员；说真的，他现在觉得这些都不是什么大事了。还有什么好拐弯抹角的，他暗暗下定决心，是时候宣布既定的决策，成为顺应时局的风云人物了。待倒数开始，他看向镜头站定。\n\n“巴西人民们，今晨六点三十分，一伙激进分子在里约市中心发起非法罢工，企图在这座城市制造动乱、分裂国家、阻挠我们扩张与进步的进程。幸有英勇的执法力量及时处置，这场罢工已告终结。”他停顿了一下，给予观众一些理解的时间，随即进入了状态。"
 brazil_lacerda_tiny_strike.10.a: "这是一场不幸的悲剧。但记住我的话，巴西仍将奋勇前行。"
 brazil_lacerda_tiny_strike.10.b: "但这是一场战争，他们定会为挑起战火而悔恨终生。"
 brazil_lacerda_tiny_strike.11.t: "自激烈至平息"
 brazil_lacerda_tiny_strike.11.desc: "西尔维娅与卡罗琳娜呆呆地站在电视机前，卡洛斯·拉塞尔达的面容在荧屏上闪动。有那么一瞬，她们几乎以为自己在幻听——他居然能卸下高傲姿态，扮起了政治家？\n\n“我国今日所面临的动荡并非异事，我们选择践行国家之座右铭，并因此而遭遇愈发深刻的苦痛，而这对于所有如此选择的国家都绝非异事。然而，暴力、反叛与对抗同胞无法创造秩序，也无法实现进步。巴西人民们，请离开街头，回到田地与工厂。我希冀你们的应允。”\n\n“希冀？应允？\"咱们的好朋友卡林霍斯倒成希望之人了？诸君，放下武器罢！”西尔维娅从鼻子里发出嗤笑，窗外渐起的车流轰鸣与警笛哀鸣几乎吞没她的嘲讽。\n\n“至少可以说是……虎头蛇尾吧。”卡罗琳娜回复道，“刚被押进警局那些人可不会为此激动，他们想做的只有继续战斗。”\n\n“行啦，丽娜，今天咱们干的活够多了。”西尔维娅打了个大大的呵欠，表明她想就地找个枕头睡下去——虽然眼下才刚上午十一点。“奥斯卡显然是来不了了，要不丢下他自个儿去喝杯咖啡吧？要不再换身行头？”"
 brazil_lacerda_tiny_strike.11.a: "血流终将止，然其续几时？"
 brazil_lacerda_tiny_strike.12.t: "于眩晕中步入战争"
 brazil_lacerda_tiny_strike.12.desc: "奥斯卡几乎无法听清总统在巴西利亚的演讲。但他意识到——在疼痛及轻微的眩晕中——这好像也没什么大不了的，因为他发现自己正身处一辆军用卡车的尾部。他向某个戴着钢盔的士兵出示了记者证，手扶着头从车尾又被放走了。这些人在他身上留下大片淤青，还就这么把他赶走了，这让他耿耿于怀。\n\n突然，卡车车窗摇下，卡洛斯·拉塞尔达的声音一下子变得清晰起来。“……这场骚乱，我们始终与地方当局保持了密切沟通，联邦政府将为这个国家亲自伸张正义……”\n\n照片去哪儿了？噢，感谢上帝，相机还在他手里呢。操他妈的，不仅没能完成工作，还平添了一身伤口。他无力继续将精力集中在那人的喋喋不休上，只是机械地沿直线一瘸一拐地走向人行道，疲惫的双手扶在路灯杆上以图喘息。天哪，真的遭不住了……\n\n那天晚些时候，如果不是被棍棒打得无力思考，他本可以预见到里约热内卢闪起的火星将如何引燃。他还记得那些工会成员激愤的面容，他们认为自己是正义的一方，而全民盟则是妄图破坏正义的骗徒，还有暴乱、怨愤与怒火。\n\n发生在巴西大道上的事件不会带来和平，而是标志着一条新战线的诞生：政府与人民的对立。他多希望能重新拍摄那些照片啊。"
 brazil_lacerda_tiny_strike.12.a: "万般混沌里，一线诡清明。"
 brazil_lacerda.223.t: "风暴将至"
 brazil_lacerda.223.desc: "晨雾笼罩着阿雷格里港，市长特里斯唐·苏库皮拉·维亚纳伫立在圣特雷莎山丘边缘，目光穿透薄雾投向远方的海平线。这座城市的脉络在脚下无限延伸，街道上涌动着市井的喧嚣。但此刻占据他心神的，是那些正在重塑未来的无形力量。\n\n他清晰地感受到美利坚日益膨胀的存在感。美国舰船不时停泊在港口，水手们流连于街边的酒馆与商铺。可口可乐与万宝路的巨幅广告牌俯视着传统店招，酒店大堂里此起彼伏的美式英语让整座城市都浸染着异国腔调。所谓的繁荣承诺与安全保障在特里斯唐听来空洞无物，他忧虑着阿雷格里港乃至整个巴西将要支付的代价。\n\n然而盘踞在他脑海的不仅是北方的巨影——越过拉普拉塔河口，阿根廷的阴影正日益逼近。晨雾中若隐若现的战舰轮廓让维亚纳眉头紧锁。布宜诺斯艾利斯日渐尖锐的扩张主义论调，已让这座边境城市沦为最脆弱的前哨。他翻阅着军情简报的手指微微发颤，战略评估报告将阿雷格里港标注为兵家必争之地，这里的工业设施与战略位置注定使其成为战争中的首要目标。\n\n无需更多游说，维亚纳已然倾向于支持拉塞尔达的提案。若巴西加入OFN，或许能为阿雷格里港筑起抵御阿根廷野心的屏障。只是这屏障的代价呢？想到这座城市或许要在强权倾轧中丧失灵魂，甚至可能在战火中灰飞烟灭，他的心情愈发沉重。踏着山径上的露水缓步而下时，市长终于决定签署全民盟的计划书，但那个终极疑问始终萦绕心头："
 brazil_lacerda.223.a: "若想保全这座城，是否必须牺牲独立？"
 brazil_lacerda_223_tt: "§F根据§l南美冷战紧张度§!的高低，§Y法案§!将在参议院§G获得§!相应的支持。§!"
 BRA_imperial_5th_constition_vote_tt: "将对$BRA_5TH_REPUBLIC_CONSTITUTION$进行投票表决……"
 BRA_imperial_raid_favelas_desc: "目前大家怀疑圣保罗的贫民窟就像里约的一样，藏着共产主义激进分子。因此，我们要让军警进入这些贫民窟，找到那些叛匪，再这样那样歼灭。\n\n由于圣保罗被大规模抗议群众所围困，还为瓦加斯那无能儿子的蠢政所害，这座城市需要果断行动才能平息。街道上还需要更多坦克，让那些闹事者三思决定回家。"
 brazil_lacerda_imp.2.t: "熟能生巧"
 brazil_lacerda_imp.2.desc: "办公室里冷得刺骨。几名男子静静坐着，谁也不开口，只有天花板上的风扇发出低沉的嗡嗡声，在寂静中回旋。大办公桌后，一名身着西装的男人百无聊赖地拨弄着自己的袖扣，对面几名穿着军装的人则像石雕一般坐得笔直、一动不动。他们在等，直到那扇门被猛地推开，才终于等到了此行的主角。\n\n“把那些人从机场撤下来，戈尔贝里。”拉塞尔达怒气冲冲地冲进房间，指着在座诸人咄咄逼人地喊道，“埃丝特刚告诉我那边的情况。”他步履如风，身形挺拔，一进门便牢牢掌控了全场的气氛。军官们纷纷起身点头致意。\n\n战争部长最先开口，在拉塞尔达走到桌前时说道：“在重要基础设施附近演练，是出于战术必要，也都经过了审批。”其他军官齐声点头，引来拉塞尔达一声冷笑。\n\n“是‘能力测评’，这是我批准的内容，一个提升军队素质的演练——毕竟你们的饭碗还是靠这支军队才端得稳。”他语气凌厉，“现在媒体纷纷报道圣保罗局势动荡，我只能强作镇定、装出一切尽在掌握的样子。而原因是因为你们——”他一指身旁坐着的军官们，“只想‘试探一下水温’。”\n\n戈尔贝里往椅背上一靠：“陆军——”\n\n“陆军的能力被质疑，”一名军官冷冷插话，“于是我们展示了自己的能力。若总统阁下还想看，我们可以展现得更多。”语气里透着不加掩饰的锋芒。\n\n拉塞尔达站在那里，陷入短暂的沉思。自秘书通报演练之事那一刻起，他就已料到这场会议的结局——他赢不了，尽管他也不愿就此服软。只是，如今他确实逼得太紧了。他压下叹息。"
 brazil_lacerda_imp.2.a: "“不必了，将军，我想在这件事上我们能达成共识。”"
 brazil_lacerda_imp.3.t: "亨利五世"
 brazil_lacerda_imp.3.desc: "末一席之胜负既已分晓，全国民主联盟又大获全胜矣。卡洛斯·拉塞尔达欣然吐一长息，眼光巡睇那斑斓之选举图——两道深蓝之新月辉耀疆域，其他诸色星罗棋布，寥若疏星。虽此役早成虚仪之势，拉塞尔达亦明察于心：其同盟早已布局在前，令全国民主联盟以势不可挡之锐气，占据绝大多数之席位。然即便如此，总统之心亦自欣喜无量。\n\n埃丝特通报：“拉斐尔·马加良斯至矣。”拉塞尔达舒展双臂，迎其副手。“拉斐尔！”他高声呼唤，厚实之掌热忱拍抚其背，“此乃巴西新纪元之始，足以扫荡瓦加斯虚妄民粹之乱象！”马加良斯微笑颔首，其神情既谦和又自持。“此实乃吾辈之重生，”拉塞尔达继言之，“巴西终可脱却昔日桎梏矣。”\n\n“卡洛斯……”马加良斯自拥抱中缓缓抽身，“我深解阁下欲摆脱瓦加斯阴影之切念……但吾虑及吾辈所为，或已逾越适当之界限。”遂就案前之席而坐，“此举或将反激极端之徒，壮其斗志矣。”\n\n言犹未竟，一杯红酒已轻然置于其前。“且听其吠噪罢，彼辈徒有虚言，何能及吾等之壮志？”拉塞尔达举杯笑语，“拉斐尔，为未来之荣光同饮此杯！”马加良斯微露迟疑，终于亦举杯相应。“好朋友们，再接再厉，向缺口冲去吧……”"
 brazil_lacerda_imp.3.a: "“……冲不进，就拿咱们巴西人的尸体去堵住这座城墙！”"
 brazil_lacerda_imp.4.t: "白宫"
 brazil_lacerda_imp.4.desc: "拉斐尔·马加良斯感受到空气中弥漫着圣诞将近的气息，那是一种既温暖又神秘的气息，仿佛连信仰也在此刻悄然复燃。他先向右望了一眼，又慢慢转向左方，心头浮起一阵莫名的不安。自从拉塞尔达发动政变以来，社会愈发动荡，暴力如同街头垃圾般四处堆积，令人无从回避。他担心自己在公众视野下停留过久，会招来某种不可言状的危险。于是他努力转移注意力，设法从记忆深处抓回几段久已淡忘的电影笑话，以此安抚自己逐渐浮躁的心绪。\n\n但两辆汽车的出现终结了这一短暂的安宁。它们驶近的方式太过小心，减速的动作亦显得过于刻意，几乎毫不掩饰地宣告着来者不善。马加良斯立刻加快脚步，想要避开这突如其来的威胁，他原以为只是几个激进的抗议者罢了。但他还是下意识地回过头去。就在那一刻，两名年轻的革命者猛然从车中跃出，身披共产主义武装分子的制服，步伐中透出毫不掩饰的骄傲与使命感。马加良斯愣在原地，恐惧如毒液一般迅速麻痹了他的四肢与声带，他动弹不得，亦无法出声，只能眼睁睁看着他们高喊着“若昂·阿马佐纳斯”的名字，随即扣下扳机。\n\n枪声在耳边炸裂，继而化为沉沉耳鸣。除了四周混乱的人声与脚步，他已听不清任何声音。他的情妇倒在他的右侧，第一颗子弹击穿了她的头颅，她的身子如失去骨骼般滑落，伏在他肩上。灼热的剧痛瞬间从胸口席卷全身，他微张着嘴，无声地喘息，而他的保镖终于开火还击——但一切都太迟了。他的视野如隧道一般急速收窄，最终陷入彻底的黑暗。他最后所见，是刺客乘坐的车辆卷绝尘而去，生命的最后几秒随着汽车底盘的划痕一起消失。\n\n与此同时，卡洛斯·拉塞尔达仍在苦战之中。他桌案上堆着的文件刚扫完一页，便有五页新的从走廊尽头接连送来；他好不容易推动参议院通过一项法案，军方便立刻要求增补五项附带修正。他正欲端起水杯润喉，瓜纳巴拉州政府的电话铃声骤响。一个陌生的声音在话筒那头冷静地传来：他的密友、州长拉斐尔·马加良斯，连同他的情妇，刚刚遭到暗杀，死于街头。"
 brazil_lacerda_imp.4.a: "拉塞尔达瘫坐在椅子上，根本不在乎玻璃破碎后洒出的水。"
 brazil_lacerda_imp.5.t: "阴沟里腐烂"
 brazil_lacerda_imp.5.desc: "梅迪西将军今天罕见地放下了手头惯常的公务，只为亲自见证这一历史性时刻——贫民窟的全面溃败。窗外，正午的烈阳炽烈无情，仿佛在预示那些暴徒即将迎来的灰暗命运。那群自诩“勇敢”的煽动者，如今早已四散而逃，其中的“领袖”卡洛斯·马里盖拉也不例外，这位声名狼藉的激进分子，如今也不过像条老鼠般，仓皇逃回下水道。而那位一贯阴狠的警探塞尔吉奥·弗勒里，即便在这一“喜讯”面前也只是微微动了一下眉毛，然而他那泛红的脸颊却出卖了他内心的兴奋。\n\n“人民阵线的效力还是取决于‘人民’。”梅迪西阴阳怪气地低声嘲讽着，一边听弗勒里兴致勃勃地汇报着那份他苦心收集的情报。“马里盖拉逃不了多远，我们在自由区一家低档餐馆里找到他。那个家伙看上去已经是半截入土。他离开小圈子后过得不怎么样，现在大概连还手的力气都没了。”随着秘书送上一叠新文件、又匆匆退场，这个笑里藏刀的屠夫继续说道：“等着吧，那群赤匪迟早得血淋淋地吊在绞刑架上。”\n\n但将军只回以有一个眼神，冷静中隐隐带着不屑。弗勒里环顾四周：墙上的钟，桌上的物件等等。他知道，一个合格的老兵，总能将内心所思完美隐藏。他猜不透梅迪西的心思，是不是想让他“打头阵”；也许将军跟他一样心花怒放——但这些想法，在第二叠厚厚的文件摞到桌上那一刻，便已不值一提。随着第二位秘书行礼退下，房门再次“砰”地一声关上。片刻的尴尬沉默中，弗勒里似乎捕捉到了几句熟悉的词汇。"
 brazil_lacerda_imp.5.a: "鼠辈已死。"
 brazil_lacerda_imp.6.t: "火星"
 brazil_lacerda_imp.6.desc: "圣克里斯托旺煤气厂的工人们听到了从头顶直升机扬声器中传来的广播：“接到恐怖威胁情报，目前正进行军事行动。所有员工立即前往南侧仓库集合。拒绝执行命令者，一律视为非法入侵处理。”众人面面相觑，却还是照办了——一批全副武装的士兵正从直升机上索降，步步逼近，将他们驱赶集中。\n\n哈维尔环顾四周。数十名工人像牲口般被黑衣士兵包围着。工会毫无预警，这是在诱捕像他这样的代表吗？他隐隐觉得不对劲：数了数，现场有三十名士兵，但二十名都围在这里，剩下十人，根本不足以在整个煤气厂内搜捕所谓的“炸弹”。就在另一侧爆发一阵推搡骚乱、士兵们注意力被分散时，哈维尔悄然滑入阴影，从一扇窗户钻了出去。\n\n夜风冷冽、寂静无声。他弯下身子，将连体工作服的领子拉高。只需几分钟，他对自己说——看看情况，再在下一轮点名前赶回来。他顺着管道摸索至主气罐，远处直升机探照灯正照亮着一组士兵的身影。他悄悄逼近，努力瞪大眼睛辨认那些模糊身影在做什么。在没有望远镜的情况下，那些人影像是一幅幅失焦的涂鸦——然而就在此时——\n\n一道尖锐巨响划破空气。哈维尔踉跄倒地，捂住侧腹的伤口，鲜血如注。他转头望去，只见一名蒙面的军官正举着仍冒烟的手枪，头戴贝雷帽。对方耳机中响起嘶嘶的通话声。哈维尔的意识开始模糊，他艰难喘息，努力跪直。军官按下耳机：“控制组注意，我已发现目标——恐怖分子。”\n\n他说完，关掉无线电，毫不犹豫地又朝哈维尔的胸口补了一枪。"
 brazil_lacerda_imp.6.a: "与此同时，士兵们开始在煤气罐上安装炸药。"
 brazil_lacerda_imp.7.t: "烈焰"
 brazil_lacerda_imp.7.desc: "一切始于一道刺眼的白光，仿佛地狱骤然张开血盆大口，将夜空从喉间吞吐出第一道火焰。里约热内卢的市民纷纷回首，只见天际腾起一颗巨大的火球，恍若第二个太阳从夜色中破壳而出，骄傲地、凶猛地照亮天边。最初，人们以为那是核弹，以为阿根廷终究动手了。但当火焰跃起、腾空，在城市上空划出一弯血色的弧线时，他们才明白——这不同于任何一场战争。火焰迅疾蔓延，吞噬一切光源，最后竟成夜的唯一灯盏。灯火一盏盏熄灭：先是贫民窟，后是沿线街区，如病灶般扩散至全城。至终，唯有火海照亮这一片沉默的天幕。\n\n轰鸣沉寂，空中传来螺旋桨有节奏的振翅之声，如昆虫薄翼扇动夜风。直升机接连掠过天际，飞临惊惶的人群之上，黑暗中目光迷茫、手足无措。人们呼号、祈祷、乞求救赎与答案，所获的回应唯有沉默。所有直升机皆朝着贫民窟而去，探照灯如利剑一般划破夜幕。一户人家踉跄走出屋外，迷蒙的双眼迎向炽白的光芒。老者举手欲遮，指节枯槁、皱纹交错。几名义务救护员与弃守的医护拖着伤员前行，冀求一副担架、一瓶药液。那一刻，他们几乎以为，那道光，是上帝的荣光。\n\n但在那光之后，潜伏的，却是恶魔。上百黑影自暗中奔出，如夜的触须扑向光中之人。那些被灯光照亮的，无不被黑衣兵士一把扣住：有人被殴打回屋，有人被拖入幽暗的角落，更有人，在光芒照亮的一瞬被当场击毙。尸体弃于街巷之间，成为写在水泥上的血书——是对勇者的警告，是对愚者的惩戒，是仇恨向世界宣示其存在的宣言。\n\n当铁靴踏入贫民窟的土径，栖身于阴影中的众人早已知晓，也不得不知晓——这意味着什么：那是一个日渐失控的暴君，绝望抓紧权力的最后一搏；是多年挫败、背叛与抗争之后的清算；是镇压；是复仇。"
 brazil_lacerda_imp.7.a: "是伞降搜救队。"
 brazil_lacerda_imp.8.t: "失主恩宠"
 brazil_lacerda_imp.8.desc: "富人们原本可以悄然出航，逃离火光，把混乱抛在身后，去某个度假岛悠闲度过周末，待尸体被清理出干净街区后再归来。但在这片码头，近半数游艇依旧停泊原地，而聚集在港口边缘的穷人们，则将这种“沉默”视作默许——他们认定，那些船，是他们逃离天上盘旋直升机的唯一机会。\n\n有三户人家抢占了一艘游艇。其中一人曾做过渔夫，懂得如何操作帆船与引擎，便临时担任起这趟航程的船长。他们自码头逃离，将更多哀号求助者抛在身后，他们甚至不敢细想那些目光中包含了什么。大部分女人、一些男人与所有小孩都躲进了船舱底部，而临时拼凑的水手们，则在甲板上快速学习如何扬帆操舵。身后，山丘被火柱与浓烟点燃，直升机盘旋在尸斑遍布的里约上空，救世基督像的面庞，早已被烟雾吞没。\n\n“往东走。”匆忙上任的船长喃喃道，一边挥手驱赶着想象中的飞虫，“去卡布弗里奥，找个码头靠一晚。”他透过驾驶舱望向漆黑大海，祈祷不要再见到任何船只或搜索灯。幸而，无人注意到他们。直到里约的轮廓渐渐消失在天边，他才悄悄溜出舱外，点上一支烟。烟雾在夜风中倏然散去，月亮藏在云后，而他耳畔响起那熟悉却令人作呕的嗡鸣——某种从天际传来的机械轰鸣声扰动着夜空。\n\n他眨了眨眼。那不是苍蝇，而是从高空坠落的什么东西。他惊呼一声，迅速侧身躲开。砰的一声！一具尸体重重砸落在甲板上，发出惨不忍睹的闷响，骨骼碎裂、血肉飞溅。上方，一架直升机若无其事地掠过天际，完全无视这艘渺小船只的存在。黑夜掩护之下，还有更多直升机，在投下属于它们的“货物”。船长惊恐地看着同伴们在甲板上手足无措地尖叫，他冲到船边，顺着他们的目光低头望去——"
 brazil_lacerda_imp.8.a: "波涛之中，漂浮着从天而降的尸体。面朝下，在水面上翻滚起伏。"
 brazil_lacerda_imp.9.t: "蒙尘的奖杯"
 brazil_lacerda_imp.9.desc: "议会大厅向来嘈杂，今天尤其喧闹。\n\n今天是全国民主联盟新议员的宣誓就职日，也是这场精心安排的选举的尾声。大部分新面孔都是全民盟的候选人，他们“赢”得的选票优势足以让公众勉强接受。少数拥有一定支持基础的资深全民盟议员也赢下了自己的选区，此刻他们正静静地观看新议员们的宣誓。仪式不断被反对派议员的叫喊声打断——他们在选举中得以保住席位，便抓住一切机会痛斥全民盟：\n\n“拉塞尔达是军方的傀儡！”“你们的选举就是一场骗局！”“靠你们自己永远无法取胜！”“你们践踏了我们的民主！”\n\n全民盟的议员们试图用更大的音量予以还击，但由于缺乏秩序与统一的口径，很快演变成了一团乱七八糟的指责与软弱无力的辩护。半数全民盟议员甚至都懒得回应，他们要么早已默认了选举舞弊的事实而不想再发出声音，要么根本就不在乎展现自己的立场。如此一来，就显得反对派清晰有力的叫喊更加显眼，而全民盟只能发出如同猫咪踩在钢琴键盘上的杂乱噪音。\n\n拉塞尔达忧心忡忡地看着眼前的场景。从纸面上看，他控制着国会。这正是他所想要的结果——他希望建立一个统一的政党，救巴西于共产主义的水火之中。然而事与愿违：他的一半党员毫不关心政治，另一半则是一盘散沙。他手里根本没有一个真正的政党，只有一群难以控制的家猫。"
 brazil_lacerda_imp.9.a: "胜利的滋味，却如同失败一般苦涩。"
 brazil_lacerda_imp.10.t: "奠基"
 brazil_lacerda_imp.10.desc: "今日事务已然告一段落，卡洛斯·拉塞尔达眺望着眼前这座在初夏阳光下炙热滚烫的首都城市。此刻，他不愿再将心思局限于眼前的琐务，而是决意将目光投向更遥远的未来。今日之势，似乎隐隐蕴藏着“奠基”之意——于是，他要做一件“奠基”的事。他转身背对城市，望向秘书。\n\n“埃丝特，我需要你为我誊写一份备忘，并发给全民盟在国会的所有骨干成员。”“首先，我们必须借助我们手中的执政授权，推动一部新宪法的颁布，其最终目标是建立一个崭新而充满活力的‘第五共和国’。我们要确保，新国家必须具备足以支撑强大而高效政体的制度与根基，通过明晰界定总统、国会与法院三权的职能，实现稳定运转，我们必须在宪法中写明：社会主义、瓦加斯主义、共产主义和无政府主义，皆与巴西共和体制格格不入，皆应被视为违宪。此外还要加入……”\n\n拉塞尔达继续口述着他对新宪法的设想，以及对党内的各项部署，埃丝特则飞快地敲击着打字机键盘，将他的语言敲铸成字句。他不时停下，喝口水，咬着嘴唇踱几步，再转身继续下达新的内容。每一道意图，每一个修辞，都精准有力。\n\n当他一声“好了”落下，埃丝特优雅地将那张滚热的纸从打字机上抽出，递至拉塞尔达面前。他默默阅读着自己的文字，满意地点了点头——他知道，这便是他为新宪法勾勒出的蓝图。他坐回办公桌，签下命令，吩咐埃丝特找人立刻将其送至国会。意气风发的他，仰头饮下一口酒壶中的烈酒，任那股灼烧的热度在胸膛回荡，仿佛感受到新巴西的阳光已洒落身上。他看见了第五共和国的曙光，已悄然来临。"
 brazil_lacerda_imp.10.a: "新曙光。"
 brazil_lacerda_imp.11.t: "反复回想"
 brazil_lacerda_imp.11.desc: "内伊·布拉加翻阅着新一轮宪法草案，头痛欲裂。他下意识地伸手关掉办公桌上的灯，任由昏暗洒满房间，只为在这片刻的昏沉中理清方才读到的那些字句，试图压制那如鼓点般跳动的偏头痛。\n\n全面取缔工会？拉塞尔达到底在想什么？是打算把亚马孙的工人全都双手奉送给激进派当礼物吗？要是他再下令让厂主枪毙迟到的工人，那也不过是更进一步罢了。还有那句像拼字游戏一样混乱的废话——“宪法保障财产安全”？这话是说，地主就能随意砍掉越界者的脚？还是说，可以先把佃农开除，然后再以“擅闯私人土地”之名把他们送进监狱？\n\n愤怒与失望像两台轰鸣的引擎在布拉加胸中燃烧，为他的头痛添薪加柴。他不禁想问，拉塞尔达究竟是对瓦加斯的遗产怨恨至此，非要如此极端地“报复”？还是他只是不肯承认自己错了，一错到底、强行加码？资本主义不需要带血的卫道士。而如今反对派找到了完美借口，团结一致，将分歧暂时掩盖，只因拉塞尔达的过分越界。\n\n帘缝透进的一缕幽光中，布拉加望见办公室墙上的十字架轮廓。他缓缓起身，划了个十字，跪了下来。"
 brazil_lacerda_imp.11.a: "“主啊，垂怜这座首都吧，愿祢从天降下智慧，使众人得以苏醒。”"
 brazil_lacerda_imp.12.t: "残缺的胜利"
 brazil_lacerda_imp.12.desc: "“最后一轮计票已经结束，第五共和国宪法草案成功通过。近75%的国会成员投票支持宪法草案，大部分支持者都来自全民盟的新成员和先前就与拉塞尔达总统有联系的人。总统听到这个消息一定会非常高兴。”\n\n卡洛斯·拉塞尔达关掉了电视，但他并没有如想象的那样高兴。只有75%吗？他本期望要到85%呢。全民盟里许多不那么信任他的老资历对宪法的态度相当矛盾。他们并不否认制定新宪法的必要性，但要求对其进行多轮修改，甚至在他们要求成立委员会讨论其中的部分条款时，他们还得到了反对派的掌声。他们让拉塞尔达如鲠在喉，党里竟敢有人公开寻求反对派的支持。他们站在基督教民主党一边，形成了一股不可忽视的力量，期望以此逼迫总统让步。他们并不忠于总统，这在将来会变成一个严重的问题。\n\n“啊，抱歉，先生。”埃丝特想进门递给总统一封信，却不小心把自己绊倒了。“是戈尔贝里寄来的，先生。”总统点点头。既然是戈尔贝里发来的报告，那想必很紧急了，那些不忠于他的温和派都能上桌了，是该好好清洗一下了。埃丝特把信封递给他，走回了自己的办公桌。\n\n这份报告是打印的，标题全是大写字母：《总罢工迫在眉睫》。拉塞尔达每读一字，脸色便阴沉一分。戈尔贝里表示，如果宪法通过，工人便会以摧毁经济、瘫痪巴西作为回应。他们确有组织的能力和意愿，也有高昂的热情。如果说全民盟的不忠像是一拳打在肚子上，让拉塞尔达心慌意乱，罢工就是对准脑门的一记重拳，足以让他陷入昏迷。"
 brazil_lacerda_imp.12.a: "拉塞尔达瘫倒在椅子上，想到将来的挑战，他不禁咽了咽口水。"
 brazil_lacerda_imp.13.t: "屋漏偏逢连夜雨"
 brazil_lacerda_imp.13.desc: "全国各地，人们在商店门外排起了长队——即使那些商铺早已紧锁大门。抗议者的标语已经举起，街头人山人海。有人高举拉塞尔达身穿德军制服的照片，也有人展示他刺杀一位身披巴西国旗女子的漫画。人群齐声高呼口号，反对拉塞尔达，反对全民盟，呼吁人民站起来，夺回自己的国家。警察虽不缺武力，但在人数上远远不敌，只得退居一旁——一方面是出于自身规章的约束，另一方面则是不折不扣的恐惧。\n\n国会大厦内的局势同样火光冲天。反对派团结一致，强烈要求废除第五共和国新宪法。令拉塞尔达震怒的是，竟然连两名全民盟的议员也跨过党派界线，支持反对派提出的新动议，要求总统拒绝签署宪法。而另有八十多名同党议员则呼吁温和派治国，要求拉塞尔达收敛其激进政策，走上更为稳妥的道路。在议会辩论中，他的党友直言不讳地称他是“危险的偏执狂”，甚至警告说他会将国家拱手让给共产党人。拉塞尔达难以想象，这些在官方记录上公然说出如此大不敬之言的人，脑子里究竟是怎么想的。\n\n“请让我向尊敬的议会报告——我有一份情报，情况十分危急。”一名议员站起发言，议长点头应允。他清了清嗓子，继续说道：“截至昨日，若昂·阿马佐纳斯与卡洛斯·马里盖拉已正式宣布，发动‘对卡洛斯·拉塞尔达及巴西利亚政府的全面人民战争’。报告称，目前已有共产党游击队出现在边远丛林与乡村地区，我们掌握的情报显示，他们正策划对军事设施发动袭击，这份情报具体且可信。”\n\n乡村地区已瘫痪，民众群情激奋，而现在，又传来国家即将全面陷入暴力冲突的消息。"
 brazil_lacerda_imp.13.a: "消息传来，先是一片死寂，旋即场面乱成了一团。"
 brazil_lacerda_imp.14.t: "扫地出门"
 brazil_lacerda_imp.14.desc: "拉塞尔达猛地将最新的报告摔在地上。公务员开始声援罢工者了。这些靠联邦财政养活的官僚，竟然倒戈支持那些在其他情境下会毫不犹豫吊死他们的人。他还能指望什么？当自己的人民连最基本的理性都不肯维持时，他还能做什么？\n\n他怒气冲冲地搓着指尖，从办公桌后站起身，绕着桌子来回踱步，指尖不断地摩擦着，好似要把愤怒逼出指节。他抓起一张纸和一支钢笔，试图起草命令——但第一笔就把纸划穿了。拉塞尔达怒吼一声，把撕裂的纸团扔进垃圾桶，力道之猛让他的手还撞到了桌角。他咒骂着，又是一道羞辱般的创痛，然后抽出第二张纸，继续书写。\n\n“兹由巴西共和国总统下令通告：凡属联邦政府及各州政府雇员，均不得参与未经授权的任何形式罢工、非法集会，亦不得加入参与上述活动的组织。违者将被依法即刻解雇，且不予赔偿。”\n\n拉塞尔达气势汹汹地冲出办公室，手中紧握那纸刚签完字、墨迹未干的命令。秘书埃丝特抬起头，看见总统满脸怒容，微微一愣。他将文件几乎贴到她脸上，纸张都被他攥得起了褶。她如老兵般稳如泰山地接过，脸上毫无波澜。“立刻执行！马上！”"
 brazil_lacerda_imp.14.a: "“遵命，先生。”"
 brazil_lacerda_imp.15.t: "他人律法之手"
 brazil_lacerda_imp.15.desc: "在高原宫的一间密室里，四个男人围坐于厚重的桌边。百叶窗紧闭，门扉深锁，微弱的阳光透过缝隙，如刀锋般在室内投下一道道斜影，仿佛预示着此地即将酝酿出的种种谋算。拉斐尔·马加良斯在座，高尔贝里也在，美国大使戈登坐于一侧，而主位则是卡洛斯·拉塞尔达。酒香氤氲，雪茄燃尽半截，计划悄然成形。\n\n“埃德加·胡佛托我传达了一则口信。”戈登大使开口道，“美国联邦调查局将随时准备协助巴西总统，在巴西境内识别并打击极左分子，为了贵国的安全，也为了美国自身的利益。”他无需解释太多——这意味着什么，他们心知肚明：工会讹诈、破坏罢工、打击激进分子，一切可以由FBI动手的肮脏活儿，只要能让全国民主联盟和拉塞尔达两手干干净净，他们都可以做。\n\n戈尔贝里几乎欣喜若狂，连连点头，“工党这下彻底死水一滩，巴西共产党也好不到哪儿去——干杯！”他甚至等不及碰杯便一口灌下，杯中是年份上好的白兰地。众人无不随之举杯，饮尽杯中烈酒，既为同谋，也为庆祝。\n\n只有马加良斯显得尤为克制，他以娴熟的礼仪喝下杯中酒，却并未开口。他低头凝视空杯，沉默胜言。拉塞尔达早已习惯他那令人不安的沉思。他知道这位老搭档心里有话，于是轻轻一挑眉，便给了他开口的信号。\n\n“这事儿恐怕不会如我们想象那般顺利。”马加良斯调了调领带，语气平稳，“控制社会激进派固然重要，但党内已经出现躁动，再加一把火，可能就要烧到我们自己身上了。在这个节骨眼上，我们真的担得起这样的风险吗？”拉塞尔达用食指摩挲着上唇，一时难以判断这番话是冷静的理智，还是无谓的顾虑。他当然明白，凡是能用来打击左翼的工具都值得欢迎——但问题在于，这双伸来的“他人之手”，会不会也在内部激起风暴？"
 brazil_lacerda_imp.15.a: "“送上一瓶最上等的烈酒给胡佛先生，附上我们最诚挚的祝福……”"
 brazil_lacerda_imp.15.b: "“婉言谢绝，不过态度还是要客气点。”"
 brazil_lacerda_imp.16.t: "他者的法律，他者的正义"
 brazil_lacerda_imp.16.desc: "“美国大使的书面证言，完。”卡洛斯·拉塞尔达朗声读道。\n\n“中情局办公室的一项安排，完。”拉塞尔达挑了挑眉，假装对内容一无所知。\n\n“中情局将协助巴西应对国内威胁，完。”这时，他两边的眉毛都皱了起来。\n\n“对外说辞为反德情报工作，供公众消化，完。”拉塞尔达放下电报，心里却早已了然。戈登本人对这项提议毫无异议——中情局的名声一如既往，既受尊敬，也饱受诟病。他们的冷酷与狡诈，与阿勃维尔或宪兵队中的任何一员相比都毫不逊色。话虽如此，若真能让中情局为己所用、用以对抗国内的共产主义煽动者……\n\n戈尔贝里则远没那么兴奋：“FBI像一把钝器，而CIA则是利刃——是手术刀，还是屠刀，全看白宫里坐的是谁。”他满脸阴郁。“我相信梅迪西是可以争取的，但我们真要指望那些扬基佬在接到命令后还能克制自己？FBI固然粗暴，起码还有些规矩——”\n\n“不了！”马加良斯一声怒吼，猛地一拳砸在桌上，屋内众人几乎被吓了一跳。他手不住地颤抖，强作镇定，转头看向拉塞尔达，那神色像是在恐惧与愤怒之间挣扎：“总统阁下，恕我无礼，这事绝不可行！这可不是派几个爪牙去吓唬几个大学生的问题，而是我们国家的根基正在被人掀翻；若是让扬基佬在我们头上为所欲为，那不就是亲手把革命的祭坛摆好，等着路易斯·普列斯特斯来接手么？求您了，让戈登收手吧。”"
 brazil_lacerda_imp.16.a: "拉塞尔达叹了口气：“行吧，中情局就留在美国吧。”"
 brazil_lacerda_imp.16.b: "“冷静点，拉斐尔。”拉塞尔达咧嘴一笑。“华盛顿最关心的是我们的利益！”"
 brazil_lacerda_imp.17.t: "直接控制"
 brazil_lacerda_imp.17.desc: "戈尔贝里·多·科托-席尔瓦默默无言地走出办公室，余光扫过政治社会秩序部寥寥数条走廊。他轻叹一声，左臂挟起一沓文件，而后继续沿着最左侧的走廊走去。命令纷至沓来，着实应接不暇。顾念于此，他不由得焦虑地咕哝着，内心惴惴不安。他自觉现状正是如此堪忧。\n\n奉拉塞尔达之命，他向来负责协调政治社会秩序部与国家情报局间的合作。不过据总统最新指示，上述机构将和高原宫建立持续联系：从今往后施行决策的是拉塞尔达本人，至少名义上如此。鉴于他已着手施令多时，权力结构所受影响实则微乎其微，何其讽刺。\n\n戈尔贝里推开1B会议室大门，目光同圆桌前的十几名特工相汇。桃花心木圆桌上摊着一幅巴西东南部地图，南起阿雷格里港，北抵萨尔瓦多。巴西利亚处摆放有一枚金色微缩雕像，不计其数的红色、蓝色标记环绕其间。“有新命令，”戈尔贝里告知众人，“开始行动吧。阁下要求我们和国家情报局协作，在以下要地打击示威人群……”\n\n会议持续了十余小时，斜阳余晖缓缓洒入会议室狭长的窗户。地图上标记移动时，战略随共产主义活动报告更新而改动时，戈尔贝里始终紧攥手中的听筒，厉声向警官们发布新命令，此刻后者正与日渐纷乱庞杂的示威人群对峙。这是不同以往的战争形态，其与内部反应和武装警察息息相关，而他须竭力避免他们所做的一切付之东流。"
 brazil_lacerda_imp.17.a: "老调重弹。"
 brazil_lacerda_imp.18.t: "奥卡姆的准则"
 brazil_lacerda_imp.18.desc: "在看完第六份行动报告后，戈尔贝里干脆把剩下的统统丢进了垃圾桶。每一份写的都一模一样：什么都没有发现。\n\n拉塞尔达坚持己见，甚至亲自下令，要求军事情报局、政治社会秩序部和海岸警卫队在东北沿海“彻底铲除一切韦拉克鲁斯势力的踪迹”。他坚信，叛乱分子正通过秘密空投的方式获得人员、物资与武器的支持。为此，戈尔贝里动用了海警巡逻、对本地走私者的审讯，乃至亲力亲为地踩点调查，可谓用尽了手段。他一开始还满怀信心，认为一定能找到什么线索，好安抚拉塞尔达那近乎偏执的“加勒比共产主义渗透论”。\n\n结果却是一片空白。他们发现即便是最严重的问题，也不过是些毒品走私罢了。确实逮到几个暗中同情韦拉克鲁斯协定的当地人，可那些人所知甚少。有时他们会以为找到了点什么，可最终总是扑了个空——目标已经连夜逃遁，现场也找不到无线电设备或武器来佐证他们的存在。如果韦拉克鲁斯协定真的有走私分子在巴西东北大量活动，那这些人要么天赋异禀，要么运气逆天。但更有可能是戈尔贝里之所以找不到，是因为这些人压根就不存在。\n\n拉塞尔达不会喜欢这个说法的。他会开始想方设法为这些“秘密武器运输线”消失的原因找借口。而如果参考他最近越来越暴躁的脾气，他恐怕不会光用嘴巴解决问题。如果“最简单的解释通常是正确的”这句话成立，那拉塞尔达的结论也将不言而喻：戈尔贝里之所以找不到，是因为他无能，或是早已被收买。而这种人，只需要一个简单的处理方式——把他脑袋砸个稀烂，让问题永远消失。\n\n戈尔贝里沉思片刻，开始权衡利弊。如果伪造报告，那就得找些“证物”，比如俘虏或缴获的武器。但如果说了实话，自己就性命难保了。就在他左右为难之际，最有效的办法忽然浮现在脑海中：干脆什么也别说。奥卡姆剃刀，又一次精准落下。"
 brazil_lacerda_imp.18.a: "最简单的解决方案总是最好的。"
 brazil_lacerda_imp.19.t: "一扫而空"
 brazil_lacerda_imp.19.desc: "塞尔吉奥·弗勒里拥有远见、授权与人手——如今，他又得了那份“许可”，而圣保罗，终将为此付出惨重代价。\n\n巴西利亚的官僚们早已拖延得太久。若要破除左翼分子与工会势力对圣保罗州的钳制，便须合力出击，齐步而行，否则此地将沉沦于灰烬与瓦砾之中。于是号令终于下达：政治社会秩序部、海军情报中心与国家情报局三方之力，悉数归于弗勒里麾下，名义上为“借合成战术与精良装备镇压内乱”，实则授予他不明说的权力，让他得以焚尽此地而无所顾忌。塞尔吉奥心中一震，毫不退缩——倘若这是所需之道，那便如此行事罢了。\n\n时为12时43分，弗勒里亲临圣卡洛斯市深处，督导平定皮尼亚尔伯爵街之战事。圣卡洛·博罗梅奥主教座堂巍峨肃立，其墙面早已为反政府之涂鸦所污。弗勒里的部属正将一群示威之徒拖曳而行，远方催泪烟尚在风中渐散。此情此景，令他心潮翻涌。那一瞬之悸动，是爱国热情？抑或是藏于心底的施虐快感？他毫不在意。他们正在夺回街道——不，是整座城市！\n\n但他的目光旋即投向不远处的政务大楼与文书处。窗后人影幢幢，时或有人伏窗而望，暗窥街头。叛乱之徒必匿其中，正伺机而动。他麾下将官频频回报：方才克复之街道，又为贼众据守。初时之攻势虽捷，恐怕难以久持。弗勒里微哼一声，将一切忧思抛诸脑后——他自有其任在身，若有人胆敢阻他荡平这群可憎的无政府之徒，他便叫那人知晓何谓“秩序之归来”！"
 brazil_lacerda_imp.19.a: "一座城市拿下，其余城市很快也会拿下。"
 brazil_lacerda_imp.20.t: "秩序与进步的悲剧"
 brazil_lacerda_imp.20.desc: "乐曲《骑士之舞》既轻快活泼，又不失奔放，谁敢想，它竟出自流亡异乡、亡国失阵之后的普罗科菲耶夫之手？楼下的铜管咆哮，喧声震屋，几欲动摇这座剧院的根基。布尔什维克的亡灵在音符间作响，巴西的主政者耳听此声，心知其意——这绝非偶然。今夜，拉塞尔达将梅迪西邀至此间，所图者，正是这一场不得言说的象征。\n\n总统未待曲终，便起身理襟，偏过身对梅迪西道：“他们欲显其威仪，倒教人耳聋心烦了，是不是？”话出口，却非问语，仿佛自己也未听见。他又接道：“我人生中曾有那么一段时候，想要倾听，想要理解，为何人们要在列宁与布哈林的名义下寻求救赎。他们失败了，却仍被半个世界称作英雄、烈士；他们死了，却依旧像魔鬼一般在欧洲徘徊不去。莫非，他们真的藏着什么真理的影子？”\n\n镀金的吊灯在他眼镜上晃动，碎金摇曳，他低声自语，声音苦涩：“言辞……尽是言辞。我所听见的，不过是孩童般的叽叽喳喳，偏偏说得这般响亮，响到世人都听不见别的声音了，响到这世界都只剩下一支曲子可跳。”梅迪西似要开口，拉塞尔达却举手制止，神情淡然却坚定：“我已另谱一曲，欲献于众人，而你——也许你正是我所盼的男高音。”\n\n他转过身去，背影沉重，言语低沉了几分：“我就开门见山吧，梅迪西。我手中握有几道命令，自知其不堪示人，故迟迟未用。那是政府所授之权，即便面对希特勒，我都未曾动用，又岂肯用来对付瓦加斯或阿马佐纳斯？然而现在……世道变了。他摸了摸下巴，缓缓说道：“道德律法，如今已是一种奢侈品，而其存世，亦愈来愈稀。”\n\n他回身望着梅迪西：“说到底，你们要什么，我便给什么。一切所需，无论是人力、兵械、命令、纵容，我统统交与你们之手。不必禀报，不设审查，我会确保没有人追问、没有人阻碍。只求一点——尽快了结这场动乱……梅迪西先生，我能信得过你吗？”"
 brazil_lacerda_imp.20.a: "梅迪西微微一笑，他说出了恰是拉塞尔达所盼、所需的唯一言辞：“是的。”"
 brazil_lacerda_imp.21.t: "去而复返"
 brazil_lacerda_imp.21.desc: "洛特兜兜转转，最后竟又回到了原点，他不禁失笑。他记得大约两周前，警方来到他家中，要将他逮捕。那几个稚气未脱的年轻人面露歉意，仿佛对自己的任务都感到不好意思。几乎在他被带走的同时，拉塞尔达便下令将他从监狱转为软禁。于是两周后，他就坐在自家客厅里，看着另一批警员笨拙地帮他解开手铐。\n\n洛特对此一直保持着镇定。说到底，如果他真的不想走到这一步，五年前就该有所作为。如今再多说，也无济于事。他也实在不愿再给这些年轻人平添压力。整体而言，这段日子其实也不算太糟。他每天都会平静地迎接值勤的警卫，和他们握手，偶尔还聊上几句。\n\n“能……能见到您是我的荣幸，洛特将军，尽管……”\n\n“在这样的情况下？别担心，年轻人，我明白你只是履行职责。”\n\n洛特微笑着回应，这让那孩子明显放松了下来。\n\n“可您怎么看呢……对这一切？”那孩子忍不住问道，想知道这位传奇将军究竟作何感想。\n\n“老实说？”洛特咂了咂嘴，斟酌着如何作答，“拉塞尔达矫枉过正了。就像汽车打滑时，他猛打方向盘。如果他再不踩刹车，迟早要全车翻覆。”"
 brazil_lacerda_imp.21.a: "当塔沃拉读到这段问答记录时，只能把头埋进办公桌上。"
 brazil_lacerda_imp.22.t: "陈年血酿"
 brazil_lacerda_imp.22.desc: "“这些颠覆分子尽是愚妄。他们竟以为，一个患妄想症的老布尔什维克的胡言乱语，能为当下指点迷津；他们竟以为，一个早已死去的哲人，能洞悉世界的真理；他们竟以为，只需效仿菲德尔·卡斯特罗那堕落不堪的行径，与古巴疯子们的莽撞武功，便能有所成就！但他们在俄罗斯败得如此彻底。说是追求繁荣与平等，其实不过渴望掌控。他们紧抱着那套破产的哲学不放，只因那是他们自诩为主人的唯一遮羞布。他们错了——而我们，将以血证之。”\n\n若昂·阿马佐纳斯面对那场广播演讲，冷笑一声。而身边的全民盟党员们的欢呼声愈发响亮，掌声透过老旧收音机如噼啪电流般迸发。拉塞尔达确实失态了，对他与他的运动破口大骂。若只是一场情绪宣泄，也许还有些可笑之处；但这一次，他带来的不止是一篇夸夸其谈的演说，供追随者们哄然鼓掌。他的身后，还有军事行动、警方调查与反间人员，言语之后，是铁与火。他不是在耍嘴皮子——他是在下杀手，若筹谋稍有不周，他所珍视的一切都将灰飞烟灭。他的人民，他的事业，皆以他为系；若他失败，那等待他们的便只有一座浅浅的墓穴。\n\n拉塞尔达说：“以血为证。”他确实饮尽那杯血。他与那些逐利的资产者一般，把工人榨得只剩躯壳，再连同他们的孩子一同弃之如草芥。在战争年代，血仿佛成了唯一能衡量忠诚的量杯。拉塞尔达谈论鲜血，就好像他真愿意为自己的现实流血殉道。但阿马佐纳斯心知肚明——拉塞尔达真正想要的，是自己的血。是那可以拿来砌墙、筑牢压迫基石的血。"
 brazil_lacerda_imp.22.a: "——若他想要血，那就亲手来取。"
 brazil_lacerda_imp.23.t: "战后惨剧"
 brazil_lacerda_imp.23.desc: "事情本不该是这样的。\n\n“鹦鹉行动”一声令下，不少巴西士兵跃跃欲试，几乎争先恐后地报名参战。情报部门曾预估，他们将面对的不过是几处散乱的共产党志愿兵营地——对手身穿染红的旧军装，手里拿的也只是些老掉牙的步枪，既没有通讯设备，也缺乏像样的防护。这本该是一场轻而易举的闪电战，一场针对毫无准备之敌的短暂交火。几轮枪响，干掉大多数敌人，剩下几个活口带回去问几句话，然后就能打道回府，甚至赶得上营地里的午饭。毕竟，他们可是成建制的步兵部队，又岂会将这些散兵游勇放在眼里？\n\n然而，他们真正遇见的，却是从未设想过的景象——那些敌人，竟仿佛与这片丛林融为一体。他们潜伏在树梢之间，悄无声息地一枪爆掉指挥官的脑袋；脚下的地面，埋着插满涂有粪便的尖刺陷阱，尖兵踏上去便腿断筋折；方向一旦迷失，整排士兵跌入伏击圈，不出几分钟便被歼灭殆尽。游击队贴身肉搏，迫使火炮支援无用武之地；补给线被切断，部队孤立无援，惊慌失措中见影就打，最后一个个倒在密林深处，尸体渐渐被藤蔓和泥土吞噬，连他们自己也成了这片丛林的一部分。\n\n这是一场彻头彻尾的惨败。公路被尸体堵塞，补给卡车或被被弃、或被敌人缴获。一些人与“军士运动”渊源未绝的士兵，在臂上缠红布、挥动任何能找到的红色物件以示投诚，妄图脱离败军、归附敌方。\n\n戈尔贝里仰头干尽了酒壶中最后一滴烈酒——这简直是一场灾难。自负将他们引入万劫不复。他一度动了举枪自尽的念头，但终究只是将额头抵在桌面，长叹一声，陷入沉思。"
 brazil_lacerda_imp.23.a: "“鹦鹉行动”，转瞬沦为“嘲鸫惨剧”。"
 brazil_lacerda_imp.24.t: "掠食猛禽"
 brazil_lacerda_imp.24.desc: "总统拉塞尔达迈着昂扬的步伐，走在巴西利亚空军基地的停机坪上，身后是一众将军随行。停机坪两侧整齐列队的是飞行员与地勤军士，每个人神情肃穆。那一排排翠绿闪亮的贝尔UH-1直升机，在阳光下犹如潜伏的猛禽。多数机身上绘有飞行员妻子或恋人的画像，但其中一架，却吸引了总统的特别关注。\n\n拉塞尔达径直走向那架休伊，用手指轻敲机身上的圆形徽章，然后顺势移至唯一一处自定义的字样——“诗篇18章第2节”。 他轻声念出，露出会心微笑，随后拍了拍那位年轻飞行员的后背。“上帝与我们同在。”\n\n他绕着直升机继续巡视，目光落在那可以安装机枪的转轴上，又扫过机翼下为火箭弹预留的挂点。总统闭上眼睛，脑中浮现出某个愚蠢敌人胆敢与巴西对抗的景象——接下来便是死亡从天而降。他想到的，或许是阿根廷人。\n\n然而，笑容很快从他脸上消失。脑海深处，一道腐烂已久的回音从少年时代传来——若面对死亡的是巴西的孩子们呢？一瞬间，他感受到一股突如其来的冷意，一如记忆中的惧怕。拉塞尔达猛地甩甩头，将那些杂念驱散。如果真到了那一步，那也是对“该死之人”的惩罚。他转身看向一位近旁的空军军官："
 brazil_lacerda_imp.24.a: "“武器演示，什么时候开始？”"
 brazil_lacerda_imp.25.t: "镇敌之策"
 brazil_lacerda_imp.25.desc: "凝固汽油弹罐被发放给军队时，营地中曾短暂沉入一片犹疑。棍与枪支，他们尚可视为局势升级所需之手段；但这般残酷的武器，过去只出现在南非草原的战场上，只是倾倒给敌军的烈焰。那是用来轰炸纳粹的弹药，而如今，它却将落向同胞的屋顶。\n\n他们的上级很快予以纠正。那些人，不再是市民，而是敌方士兵。\n\n“请注意，请注意。”广播在第一轮火雨后响起，铁皮喇叭中传来刺耳的回声。“根据政令，此区域现已进入戒严状态，以打击叛乱行为。所有居民应立即就地避难。拒不服从者将不论是否持械，一律视为敌对武装。”\n\n在科阿里镇，那座藏在亚马孙河畔森林之间的城镇里，惊慌失措的人群在街巷奔逃。他们从邻居家穿过，从亲人身边掠过，脚步在崩塌的混凝土和碎裂的石板间乱窜。还有力气的人发出撕心裂肺的哭喊，灼热的血肉味在空气中弥漫不散。那些还能奔跑的，纷纷跳入河水，潜入已被死者浸染的水流。没能逃出的人，早已沉入水底。\n\n从南边道路推进的士兵戴着防毒面具。军方声称，共产主义者在此地制造了芥子毒气，但真正的原因，只是他们不愿让人看清自己的脸。他们用枪托驱赶着剩余的幸存者，将人群赶入镇上唯一尚能容纳他们的建筑。那晚，教堂挤满了伤者与惊恐的哭号。基督沉默地俯视着这一切，面对祂子民的哀号，一言不发。他们抱紧烧灼的皮肤，捂住正在化脓的创口，跪在地上祈求救赎，又颤声问着，这一切为何降临在他们身上。"
 brazil_lacerda_imp.25.a: "教堂外尖叫声此起彼伏，火光照亮了彩绘玻璃。"
 brazil_lacerda_imp.26.t: "关于“下水道老鼠”的报告"
 brazil_lacerda_imp.26.desc: "“总统先生，您既已授权我撰写关于圣保罗州及其各类骚乱的详尽报告，那我便尽己所能，事无巨细地加以记录。”\n\n埃米利奥·梅迪西满脸凝重，带着他那一贯带偏见意味的眉峰微挑，神情未变，助手将厚厚一册文件夹递给拉塞尔达。拉塞尔达翻阅时，脸上时而保持庄重的中立，时而流露出些许玩味——似乎惊讶这人居然还是老样子，毫无变化。“要我说，这不是猜测，更不是推测，而是事实。圣保罗的街头，已然被共产党人占据。”\n\n“当然，也有传言称这些共产党人得到了小瓦加斯的支持。但正如我所说，这些只是传言。不过他们确实藏匿在下水道与各类地下设施之中，正如他们所信仰的‘地下’世界那般贴切。背叛我们的人，是我们自己人，还有那些沉默不语、默许包庇的市民。如今在那里，仅剩下教堂尚能维持一点秩序。”\n\n“您在报告末尾会看到，我列出了若干应当立即执行的建议，其中一条，是建议政府加强对抗这些反民主、极具煽动性的势力，并全力支持一切抵抗运动。总统先生，请不要犹豫。来自内部的敌人，永远最危险。”\n\n将军起身，悠悠踱步离去。拉塞尔达心中冷哼：说得冠冕堂皇，还不是照样撂下一句话就走。但他很快冷静下来——即便那人话语里充满控诉，他说的却并非全无道理。巴西这块大陆的脉络，终究都汇聚于圣保罗。可就在他任上，这座城市却一点点沉入下水道深处，而他们居然就这么坐视发生。他确实有鼠患问题——这一点毫无疑问。他猛地一拍桌子。"
 brazil_lacerda_imp.26.a: "“操他妈的！”"
 brazil_lacerda_imp.27.t: "他在狂笑"
 brazil_lacerda_imp.27.desc: "“……依总统之命，你将被剥夺制定任何新地方法令的权力，自此一切，皆须遵联邦指令，无有例外。”对塞尔吉奥·弗勒里而言，这番话仿佛甘蜜自唇边滴落，一字一语都叫人心醉。羞辱瓦加斯之子的机会，何其珍贵，何其快意。他几乎按捺不住得意的笑容，眼看小瓦加斯的神色一寸寸暗沉下去，便觉百味生香。随之而来的，是一片寂静。小瓦加斯的办公室静得仿佛凝固了一般，只剩下墙边时钟那规律的滴答声，和窗外隐隐传来的鸟鸣。\n\n小瓦加斯缓缓吐出一口长气，神情重新归于平静。“你们羞辱我父亲的名声，尚觉不够；你们竟妄自尊大，自以为比他更高洁。你们口称法律的卫士，秩序的守护，殊不知实则连他背影都赶不上。”他轻笑一声，短促而干涩。“你错了。拉塞尔达是以混乱为阶梯，他是靠着目无法纪，登上了这高位。”\n\n弗勒里满面怒容，面孔几近扭曲。但小瓦加斯已自座中起身。“拉塞尔达口口声声言秩序，谈文明，可自那场灾难选举之后——是谁亲手将那秩序粉碎？今日这国家，如同将倾之屋，靠一纸可怜宪章强撑其表。若非如此，我的街头岂需你的人来行使暴力！”\n\n你……”弗勒里咬紧牙关，仿佛如鲠在喉。“你这……该死的共产党。”\n\n一瞬间，空气紧绷至极点。一根针掉在地上都能震碎这凝固的气氛。然而，小瓦加斯没有回应。他只是笑了，紧接着爆发出一阵低沉却越发激烈的大笑。弗勒里气得语无伦次，脸色发青，而那笑声却震彻四壁，刺耳地敲击着他的神经。不久，外头传来玻璃碎裂的声音，那声音越来越响，弗勒里再无法承受，只得仓皇离去。而那肆意回荡的笑声，却像魔咒一般，几日几夜缠绕在他心头，挥之不去。"
 brazil_lacerda_imp.27.a: "他笑着。他在笑。他仍在笑。"
 brazil_lacerda_imp.28.t: "宫中之囚"
 brazil_lacerda_imp.28.desc: "小瓦加斯看着在圣保罗周围的缕缕烽烟，感到浑身冰凉。那是多么热烈的火都无法融化的寒意。在城市中心，连屋旁的树木都因恐惧在深夜中瑟瑟发抖，整座城市都笼罩在极大的恐怖中。上午军队宣布封锁城市，下午坦克就开上了大街。人们焦躁不安，却没有一个人能到达班代兰蒂斯宫。他们被困在城市里，被路障和警戒线分割成了一个个孤立的集群。\n\n“警告，警告，”广播里传来声音，这是唯一一个被允许播送的频道。“根据行政令，城市实施戒严。为了维护社会稳定，公共集会权已被中止。全体市民，无论是否参加非法集会，都必须立即解散。”\n\n在班代兰蒂斯宫的二楼，他可以很清楚地看到这座城市是如何被镇压的。他和下方仿佛身处两个世界，市民们蜷缩在木制的茧中，害怕有一天枪口会指向他们。他现在已经不再对圣保罗的安全事务有任何话语权，拉塞尔达的紧急状态剥夺了他的一切，只剩一位贴身警卫。听着屋外的枪声和尖叫，他们紧张地把手指放在了扳机上。\n\n在城市某处，枪林弹雨，坦克碾过了所谓“国家的敌人”。小瓦加斯之前从来没有为自己的安全担心过，但是现在他也不得不用颤抖的手，向着楼下射出子弹。他曾经见识过拉塞尔达眼中的怒火，但那时，一切只是政治，小瓦加斯也知道如何保护自己。但现在，军队在圣保罗燃起了熊熊烈火，烧尽了叛国与异见的根源，他只想知道他家族的先人能否能感受到今日的火焰。"
 brazil_lacerda_imp.28.a: "他跪倒在地，向上帝和阿帕雷西达圣母祈祷，但感觉不到他们的存在。"
 brazil_lacerda_imp.29.t: "战争在你一念之间"
 brazil_lacerda_imp.29.desc: "军方高层已被赋予全权，清洗圣保罗贫民窟中的共产叛乱者与犯罪分子。然而在执行层面，这些界限迅速消失不见。那些狭窄蜿蜒的巷弄，很快被鲜血染红，横陈着无数尸体。尚存性命者常被拖入卡车，或丢入临时拘留所，在一连串殴打与酷刑中被逼问马里盖拉的行踪。这个名字，知者寥寥，却几乎人人都咬牙供出，只为换得一线生机。而在那最初宝贵的几个小时里，能逃脱的人纷纷奔入主教座堂——他们的总主教早已倾尽一切，只为守住这最后的庇护所。\n\n圣座早已来电，命保罗·埃瓦里斯托·阿尔恩斯立即撤离；而他们知道，他绝不会答应。多年来，他已将教职化作利剑，直指拉塞尔达政权的心脏。在教会的庇护之限内，他尽其所能高声抗争，咆哮、揭露、警醒。当军队封锁全城之际，他便倾尽人脉，搜尽库存，将粮食、药品与被褥集中于座堂之内，并向城中所有逃难者敞开大门。军方的回应，是将教堂重重包围，并向大门齐射数轮，以示警告。枪声响起时，堂中数百名教民与避难者惊声尖叫，子弹穿入祭坛后殿，在圣所的墙面留下一颗颗铅弹痕迹。\n\n“够了！”阿尔恩斯身披法衣，执着牧杖，毅然走出主教座堂的石阶。他的背后，大门随即闭合，士兵拔枪对准他的胸口。一名军官立刻怒喝制止，并亲自走上石阶，迎向这位不肯退让的总主教。\n\n“总主教阁下，”军官沉声道，“你正在窝藏国家之敌。立即将他们全数交出。”\n\n“否则如何？”阿尔恩斯反问，“你们要开枪扫射？炸毁教堂？”他见军官逼近一步，遂举起牧杖，杖首直抵其胸口，目光如炬：“这是上帝的殿堂，我不准你们在此洒下鲜血。”"
 brazil_lacerda_imp.29.a: "但就在他身后，两名教民已在圣坛前流尽了最后一滴血。"
 brazil_lacerda_imp.30.t: "又一个来自巴西利亚的广播"
 brazil_lacerda_imp.30.desc: "“自由的巴西万岁！”对着总统办公室里那些电视镜头，拉塞尔达几乎是在怒吼。此次演说似乎至臻圆满，他声情并茂，慷慨陈词，所言皆出肺腑，立场分明无疑：共产党人欲将这片国土撕碎，而唯有他，方能挽狂澜于既倒。他誓言，不惜一切代价。内阁与幕僚屡劝他收敛言辞，可今时今日，岂是克制能解危局？所需者，乃是雷霆手段！而天知地知——他确已出手！\n\n在巴西利亚另一头的会议室里，几位将军默然关掉电视，彼此交换着忧虑的眼神。他们原以为局势渐稳，谁知总统这一番滔天言辞，简直像将整桶汽油倒入烈焰之中——如今火起，他们得设法熄灭。\n\n遥远的福塔莱萨，维尔吉利奥·塔沃拉伏坐椅中，头埋双掌，形容憔悴。妻子路易莎沉默无言地关掉了收音机。拉塞尔达正携这国家驶向深渊。他不禁悲叹：他人何以看不清前路？又为何无人出手阻止？\n\n不过数日，全国已有过半神职人员公开谴责这场演说，斥其充满仇恨，缺乏容忍。他对反对派的羞辱，反而激起了左翼久违的斗志。抗议与罢工风起云涌，声势日盛。街头巷尾，百姓也开始议论纷纷：这番话，听来竟与纳粹无异——尽管拉塞尔达自称是坚定的反法西斯主义者。放眼全国，似乎只有全民盟中的强硬派依旧全力支持他。可他们，终究不是这个国家的大多数。"
 brazil_lacerda_imp.30.a: "把你的话修正修正，否则你要毁坏你自己的命运了。"
 brazil_lacerda_imp.31.t: "大使会晤"
 brazil_lacerda_imp.31.desc: "拉塞尔达坐在办公桌后，领带微微歪斜，头发有些凌乱，西装也显得有些褶皱。他一边翻弄着桌上的文件，一边下意识地抽搐了一下。眼前这一团混乱，换作平日，他绝不会在来客面前呈现出这样的状态。\n\n可林肯·戈登并非寻常访客——不仅因为他是美国驻巴西大使，更因为他是拉塞尔达过去的老朋友。他能看出老友身上沉重的压力与疲态，这让戈登不禁开始担心拉塞尔达的健康与精神状态。\n\n“戈登，我向你保证，一切尽在掌控之中。”拉塞尔达的声音有些沙哑，这句话是他对大使、也是对老友通报现状的结尾，“巴西很稳定，我们的局势很稳固，巴美之间的友谊坚不可摧。”\n\n戈登微微点头，带着几分惋惜。他当然知道这不是真的。他是从已经戒备森严的美国大使馆，在整整一个旅的军人和安保人员护送下才抵达高原宫的。这一切让拉塞尔达的话听起来更像是一种自我安慰的幻想，而非现实的判断。\n\n“我会如实向国务院汇报，”戈登说着，缓缓将烟斗从嘴中取下，“我会让华盛顿知道你在掌控局势，媒体上的画面不过是夸大其词。”"
 brazil_lacerda_imp.31.a: "我只是希望，你说的是真的，总统先生。我的朋友。"
 brazil_lacerda_imp.32.t: "生存还是毁灭"
 brazil_lacerda_imp.32.desc: "雷声滚滚，电光撕裂夜空，乌云压顶，大雨如注。如此天气，或许正与拉塞尔达此刻的心境相得益彰。总统的办公桌上，堆着六本书，全出自同一位作者——威廉·莎士比亚。一个三百五十年前就死了的英国人，今日却依然不朽，依然洞察人心——尤其是那些身处危局、执掌命运的统治者们。他在寻找什么？指引？出路？还是警示？连拉塞尔达自己也说不清。但他仍不停地读下去。\n\n他是否是那位传说中的李尔王？渴求虚伪的颂扬，却将敢言真相者逐出视野，最终在狂风骤雨中迷失了自我，失去了国家？又或是哈姆雷特？在责任与情感之间痛苦拉扯，迟迟无法行动，任由命运将自身拖向必然的毁灭——越是延宕，便越靠近癫狂的边缘？还是麦克白？在权力与野心的驱使下，一步步踏入血泊，愈陷愈深，不断用暴力巩固王座，终将双手染满洗不净的血？\n\n闪电再次划破天际，雷鸣震动整座建筑。电话骤然响起。拉塞尔达抓起话筒。\n\n“总统先生……”\n\n“梅迪西！——多派些人，多派！”他怒吼道，“直升机、枪、士兵！统统出动！管它什么镇压，统统给我办了！”\n\n片刻的沉默。“……是，是的，总统先生。”电话随即挂断。\n\n拉塞尔达猛地砸下听筒，沉默片刻，随即瘫坐在椅子中。《麦克白》从他手中滑落，摔落在地。"
 brazil_lacerda_imp.32.a: "我才是最需要上帝恩垂的，可是“阿门”两个字却哽在我的喉间。"
 brazil_lacerda_imp.33.t: "逃亡的古拉特"
 brazil_lacerda_imp.33.desc: "因“国家安全”的名义，戈尔贝里来到了拉塞尔达的办公室，虽然议程含糊，但他心知肚明。这事关一个名字——那个一周前逃离巴西、始终盘踞在拉塞尔达脑海中的名字。他们刚走进办公室，只见拉塞尔达的领带松垮，衬衫领口的扣子也解着，西装一片褶皱，仿佛刚从沙发上醒来，可他那双布满血丝的眼睛却表明他已有多日未曾合眼。办公桌一角堆满了未完成的公文。他额头覆着一层冷汗，在空调的寒气中反射着灯光的亮芒。空气冰冷，却压抑得令人喘不过气。\n\n“古拉特。”拉塞尔达开口，手指点向桌前座椅。戈尔贝里与几名将军坐定，他本人却在房间里来回踱步。“古拉特那边，我们采取了什么措施？”\n\n“他在哈瓦那。”戈尔贝里答道，同时示意旁边的将军递上情报文件。“名义上没有官方庇护，但当地有人对他的立场颇为同情。”\n\n“该死。”拉塞尔达低声咒骂，一把抽出文堆中间的某份文件，带着上面的几张资料一起拽了出来，重重地拍在桌上。“若昂·古拉特是个叛徒，是个逃兵。他不敢面对现实，只会落荒而逃。不，我不能容忍这样的人存在。只要他还在外头图谋不轨，巴西就永无宁日。”\n\n坐在戈尔贝里右侧的将军轻咳一声：“总统先生——我们或许可以启动‘鲁本斯·瓦斯行动’。”他的目光掠过那份黄色文件夹，“只要您点头，我们立刻——”\n\n“可以，当然可以。”拉塞尔达挥了挥手，仿佛在赶走一只苍蝇。这名字唤醒了他旧日的记忆，也牵动了他脚上的旧伤。“做你们该做的事，但别把那些龌龊细节拿来烦我。”"
 brazil_lacerda_imp.33.a: "“没问题，总统先生。”"
 brazil_lacerda_imp.34.t: "流亡的古拉特"
 brazil_lacerda_imp.34.desc: "若昂·古拉特感到自己像个懦夫。整个国家都被拉塞尔达紧紧扼住喉咙，而他，却在哈瓦那的阳光与海滩中虚度光阴。他的家人仍留在巴西，虽受到一些不成文规则的庇护，却仍置身于危墙之下。古拉特常对自己说，是他们让他与巴西之间尚存一丝牵绊。如果他们也在他身边，那他是否会轻易放手，干脆留在这儿，享受余生，与——\n\n门外突然传来急促的敲门声。他一直望着窗外，竟未察觉来客的脚步。脸上泛起些许尴尬的红晕，他走向前门。门外站着的是邮政人员——为古拉特这位“不该在此”的人专门传递机密信件的高薪雇员之一。古拉特为开门迟缓致歉，接过信件，道别关门。他将信封随手搁在厨房操作台上，顺手打开了收音机（是某个美军电台的转播频道），一边翻阅信件：有支持者的来信，有请他归国的联名信，还有一封信封上歪斜写着“立刻开启”的信。他挑了挑眉，但还是撕开了信封，展开纸页。信中夹着一张偷拍的照片，是他妻子与孩子的身影，取景距离遥远，显然出自某台秘密相机。\n\n我们知道你妻子住在哪里，我们知道你孩子住在哪里，回巴西来，否则我们会用他们的痛苦来代替你。\n\n古拉特盯着信件看了许久。收音机里正播放一首美国老歌，情绪正堆叠至那种腻人的高潮，他猛地一把关掉，这动作竟将音量旋钮拧断。收音机仍未停歇，他怒吼一声，将其掷向墙角。伴随着破碎的声响，音乐戛然而止。他整个人瘫软下来，呜咽不止，蜷缩在厨房地板的一角，脑中只剩下妻儿的模样，还有那栋早已不属于他的“家”。\n\n待到哭干眼泪，他终于从地上站起，取出一只新信封与一张空白信纸。他深吸几口气，缓缓吐出，直到双手不再颤抖。"
 brazil_lacerda_imp.34.a: "“致拉塞尔达总统：我会回来的。真挚的，若昂·古拉特。”"
 brazil_lacerda_imp.35.t: "返乡的古拉特"
 brazil_lacerda_imp.35.desc: "加利昂国际机场的跑道已为这架小型喷气式飞机的降落清空——这是古巴政府破天荒以个人名义包租的专机，勉强算是对主宾表达善意的姿态。飞机四周拉起警戒线，所有航班停飞等候，直至机上人员全部离舱。毕竟这位贵宾的“归案”非同小可，手铐与警车后座早已虚位以待。\n\n若昂·古拉特却要求机组再拖延几分钟着陆。“就说机械故障。”他低声嘱咐副驾驶，“照做就是，给我咬死了！”说罢离开驾驶舱回到座位，舷窗外远远晃动着的警察身影刺痛着他的眼睛。他知道对方必然也看见了自己，可他需要这点时间——在交出自由之身前，他还要完成最后一场灵魂拷问。\n\n从此刻溯游而上，他重走自己铺就的每一块命运基石。瓦加斯总统委任他担任劳工、工业与贸易部长的发轫；格雷戈里奥·福尔图纳托那场愚蠢刺杀，让拉塞尔达从此活在瓦加斯阴影中的转折；百日危机期间，拉塞尔达打着“防止古拉特专政”旗号扼杀民主的闹剧。闭目沉思间，这位困在机舱里的男人反复检索每块石板，妄图找出那条本可选择的其他路径。\n\n终究徒劳。命运从来不由他主宰。上帝——或者某个更邪恶的存在——早已为他写下截然不同的脚本。过往无路可走，当下亦无计可施，他所能争取的不过是将终局推迟些许时光。而此刻，最后几分沙粒正从指间流尽。古拉特长叹起身，示意机组开启舱门。"
 brazil_lacerda_imp.35.a: "他走下舷梯，伸出双腕，冰冷的铁铐随即紧紧扣住了他的手臂。"
 brazil_lacerda_imp.37.t: "新闻荒的日子"
 brazil_lacerda_imp.37.desc: "华盛顿某处，一间高级公寓静卧在暮色之中，客厅里的两名男子疲惫地瘫坐在沙发上。《纽约时报》的报纸被随意地扔在地上，他们早已弃读文字，转而借酒消愁。头版的大字标题写着：“巴西再现野蛮行径”，充斥着对祖国最新动荡局势的骇人报道。两人分别是巴西驻美洲国家组织和自由国家组织的驻外大使，他们连日来一直在逆流中挣扎，如今失败的寒意却紧紧攫住了他们的心。\n\n“你这地方真不错，”OAS大使埃米利奥一边自斟一杯又一杯，一边若有所思地说道。他已不确定自己喝的是什么酒了，两人根本没去看标签，只知酒液灼喉。“我倒想知道你还能不能保得住这公寓？今天我听到的事，让我觉得我在华盛顿待不了多久了。”\n\n他的同僚、OFN大使卡洛斯放声苦笑：“我们可是代表着一个现在被人跟希特勒、希姆莱相提并论的政权，你觉得我们住哪儿还重要吗？”\n\n“也是。”两人已连续两天接打电话、参加会议，不断地从美媒提前稿件中得知新闻风声，听尽各界官员威胁撤资与冻结资产的警告。他们早已山穷水尽，身无长物。此刻，他们陷在沙发里，神志在酒精中轻微晃动，一种近乎释然的静默包围着他们。\n\n“卡洛斯，你看到《火线辩论》里巴克利的咆哮了吗？”埃米利奥懒洋洋地瞥了他一眼，见他点头回应。“你能想出哪怕一句有力的反驳吗？”卡洛斯默默地摇了摇头。埃米利奥举杯饮尽最后一口酒。\n\n“我也想不出。”"
 brazil_lacerda_imp.37.a: "“偏偏今天新闻这么少。”"
 brazil_lacerda_imp.38.t: "伊卡洛斯垂泪"
 brazil_lacerda_imp.38.desc: "茹阿雷斯·塔沃拉身着睡衣端坐在客厅沙发上，竭力保持着最后的尊严。他面色阴沉地注视着眼前这群持枪闯入者。平心而论，这些人的眼神中透着些许歉意——毕竟他们刚刚踹开了他的大门——但这份歉意显然未能阻止他们的行动。\n\n“茹阿雷斯·塔沃拉，奉命向您呈递这些文件并解答疑问。”一名制服笔挺的军官以恭敬而不失强硬的姿态递过一叠文件。老将军接过来，没有向拘捕者道谢，只是勉强点了下头。\n\n翻阅文件时他几乎要笑出声来，字里行间的荒谬中带着彻底的败意。短短十页纸就记录了他被解除所有职务、逮捕、审判、判处死刑又获特赦改为软禁的全过程。拉塞尔达这厮虽恶名昭彰，但这办事效率倒是无可指摘。\n\n“看来我现在是罪犯了。久违的身份啊，难怪文件上我的名字前连头衔都不配有了。”茹阿雷斯苦中作乐地调侃道，此刻除了黑色幽默他实在别无选择。然而在那强自镇定的外表下，翻涌着只有他自己才清楚有多么无力的滔天怒火。\n\n“确实如此。”军官确认道。茹阿雷斯打量着这个年轻人——不过二十出头，恐怕从未想过有朝一日会亲手逮捕“北方副王”本人。“我们今晚会在此值守，明天将有长期看守人员接替。”\n\n“我能站起来吗？”得到军官迟疑的许可后，他走向酒柜斟了满杯。随后伫立在柜旁的窗前沉默凝望，窗外只有浓稠的黑暗——夜幕早已降临。"
 brazil_lacerda_imp.38.a: "茹阿雷斯回忆起第一共和国的终结，他咒骂起自己的年迈与迟钝。"
 brazil_lacerda_imp.39.t: "美好一日"
 brazil_lacerda_imp.39.desc: "阳光透过窗户洒满了整个房间，小瓦加斯凝视着庄园的庭院。天气温和宜人，园艺一如往常地修剪得一丝不苟，但与往日清晨相比，今天却有一处细节显得不同寻常——那些一向严整刻板的士兵们，此刻竟显得松弛自在。他看见卫兵将步枪随意地挂在肩上，三五成群地低声交谈，甚至还有人对路过的军官视而不见，既无敬礼，也未受到训斥。\n\n他漫步走进花园，士兵们虽神情轻松，却仍不忘向州长行礼。一位中尉迎面走来——小瓦加斯记得，这人平日一向沉默寡言、恭谨守礼。可今天，他却径直走上前来问道：“长官，有什么指示吗？”小瓦加斯脸上的困惑显而易见，中尉微微翻了个白眼：“弗罗塔将军还没告诉您，是吧？”\n\n一名士兵迅速拿来一台无线电，扬声器中传来弗罗塔的声音：“拉塞尔达对国家的控制正在迅速崩解，巴西日复一日地滑向彻底的混乱。如今，正是拿起武器反抗其政府的时机。我已在西南方与第一军激战正酣。如果您有意愿，州长，我与我的部队将听候您的调遣。”\n\n听完这段广播，小瓦加斯的嘴角缓缓扬起一丝疲惫却意味深长的微笑。中尉仰头望着他，眼中满是期待。而州长只是淡淡地答道：“既然如此——”"
 brazil_lacerda_imp.39.a: "“那我想，我就出去散个步吧。”"
 brazil_lacerda_imp.40.t: "坠入亚马孙"
 brazil_lacerda_imp.40.desc: "自从戈尔贝里下令将空突部队大规模部署到阿拉瓜亚地区已经过了一段时间。任务目标是空降到阿玛佐纳斯分子躲藏的地区，并用大规模轰炸迫使他们投降。那名负责评估阿拉瓜亚行动结果的军官走到了戈尔贝里面前，他还给戈尔贝里带了一杯冷饮解暑。戈尔贝里看向了他。\n\n军官简短地敬了一个礼，说：“长官，有阿拉瓜亚的报告。”\n\n“攻击行动顺利吗？”戈尔贝里希望立刻听到好消息，这样再谈代价和伤亡就不会太过尖锐。\n\n“呃，不，长官。阿玛佐纳斯分子现在非常善于规避轰炸行动，报告称哪怕是他们的同伙也很难分辨出他们的伪装。所以敌人的损失恐怕十分微小。”\n\n“这是敌人的损失，我们的呢？”\n\n“长官，很多士兵已经……遭受损失。包括一个防空团。”军官顿了顿，戈尔贝里已经猜到发生什么事了，“他们朝着自己的友军开火，空突旅在遭受严重损失后被迫撤退。”"
 brazil_lacerda_imp.40.a: "寸步难行，又退两步。"
 brazil_lacerda_imp.41.t: "一纸手续"
 brazil_lacerda_imp.41.desc: "拉塞尔达抬起头，看着埃丝特走进办公室，在他对面坐下。她的双手微微颤抖，将一份文件放在桌面之间，低声道：“我想辞去秘书一职。”\n\n拉塞尔达张了张嘴，原想问个为什么，却终究忍住了。听她的理由，又能有什么意义？她会如何看待他，他心中岂会不知？她选择离开，他实在怪不得她。她见得太多了——太多的愚行，太多的残忍。她想逃离这里，回库里提巴去照顾家人，本就是再正常不过的决定。\n\n他低头看了看那份文件——一纸简单的离职批文，措辞冷峻，严谨得仿佛是处理某项无关紧要的事务。信上连一句感谢的话都没有。他签了字，正准备在空白处写点什么，却被埃丝特抽回了文件。“这就够了。”她轻声说。拉塞尔达只是点了点头，表示理解。等她收拾好办公室，准备离开时，他向她道别。\n\n往后的数周，秘书室始终无人常驻。其职务被频繁轮换的中尉、准尉们代行，由高层随意调遣。"
 brazil_lacerda_imp.41.a: "拉塞尔达觉得确实应当如此。"
 brazil_lacerda_imp.42.t: "孤夜"
 brazil_lacerda_imp.42.desc: "拉塞尔达拖着沉重的步伐走进屋内，又一场为马加良斯举行的追思弥撒结束了。这场应该已经是第十五场了吧？他已经懒得去数了。他从柜中抽出一瓶未曾开封的威士忌倒了一杯……又一杯……再一杯，至于那些开过的早已被他一饮而尽。\n\n第三杯下肚后，拉塞尔达忽然想起，在彻底陷入醉意之前，还有一件事必须了结。他拨通了梅迪西的电话。对方的声音冷峻简短，一如往常：“总统先生。”\n\n“我同意。”\n\n“您同意什么，先生？”电话那头语气中似乎带着一丝迟疑，或许是拉塞尔达醉意中自作多情的揣测。\n\n“一切。选举，怎么搞都行。马加良斯·平托要当总统，那就让他去当。”\n\n梅迪西大概表示了感谢，但拉塞尔达没在听。他只是含混地哼了一声作为回应，随即挂断了电话。他又倒了三杯酒，手上没再去计量，只是估了个大致的量。为了避免自己去深想刚才那个决定意味着什么，拉塞尔达干脆一头躺倒在沙发上，手里还攥着那瓶威士忌。"
 brazil_lacerda_imp.42.a: "他就那样躺了一夜，始终未曾挪动分毫。"
 brazil_lacerda_imp.43.t: "同将军的交易"
 brazil_lacerda_imp.43.desc: "拉塞尔达：洛特将军，听到您的声音我很高兴。\n\n洛特：总统先生，我得知您下令调动第三军恢复里约秩序。做得好——虽然来得有些晚了。\n\n拉塞尔达：（沉吟）将军，我认为……若能避免进一步的流血，对你我双方而言，都是有益之事。我们国家已陷入疯狂，太多家庭因此支离破碎。\n\n洛特：确实如此。\n\n拉塞尔达：因此，我决定释放您，您的家人也将被平安送离，并附上我最诚挚的祝福。\n\n洛特：（冷笑）真慷慨啊，总统先生。\n\n拉塞尔达：请，恩里克。我不会让他们伤害你。你可以离开，你可以——\n\n洛特：若昂·古拉特也会被释放吗？\n\n拉塞尔达：什么？你为什么要在意他——\n\n洛特：他会被释放吗？这个人就像我一样，衷心为国效力过。但你也将他与家人拆散了。\n\n拉塞尔达：不，不行！古拉特是个恐怖——\n\n洛特：很简单，总统先生。要么我们一同离开，要么就都不走。我不会接受你这种不情不愿的怜悯。\n\n拉塞尔达：（支吾）我——我做不到。我真的做不到。\n\n洛特：那我就留在这里吧。"
 brazil_lacerda_imp.43.a: "拉塞尔达：我……明白了。"
 brazil_lacerda_imp.44.t: "领导力的“典范”"
 brazil_lacerda_imp.44.desc: "若昂·菲格雷多将头埋进双手之间。他对面坐着一位FBI联络官，正眉头紧锁，认真听他汇报国家目前那副惨不忍睹的局势。那人翻开笔记本的新一页，问出了菲格雷多最不愿面对的问题：“那么，拉塞尔达总统怎么看？他打算怎么办？”\n\n菲格雷多忍不住笑出声来，“拉塞尔达的计划？好问题，我自己这几周也一直在问呢！现在看起来只有两种可能：要么他已经彻底疯了，一个精神错乱的疯子正坐在总统宝座上；要么，他亲手把自己的脑子挖出来吃了！是哪种情况……谁都说不准。”\n\n“拉塞尔达此前的心理评估并没有显示出明显的不稳定迹象……能否详细说说？最好用英语。”\n\n菲格雷多这才意识到，刚才那通咆哮自己不知不觉切换回了葡萄牙语。他稍稍集中精神，继续说道：“就在今天早上，我亲眼看到他下令要求‘将南部边境部队数量加倍’。我就问——加倍？拿什么加？哪来的兵？我们的部队不是在被共产党追着打，就是在全国找那传说中布里佐拉的叛乱，要不就是在里约忙着重建。我们哪来的兵力去‘加倍’防线？我们连控制现有领土都困难重重，哪还有余力去把阿根廷人赶回去？这根本没意义！如果这不叫疯，那我真不知道什么才叫疯。”"
 brazil_lacerda_imp.44.a: "送往华盛顿的报告，毫无疑问，绝不是什么乐观之辞。"
 brazil_lacerda_imp.45.t: "抵抗战士里的新面孔"
 brazil_lacerda_imp.45.desc: "在这个四处皆敌的国度里，戈尔贝里·多·科托·席尔瓦的脑海中，却始终盘旋着一个人的身影。他的情报系统已经在丛林深处追踪那人数周，可无人能够真正靠近——因为国内的每一个特工至少要执行五个任务、盯梢十个敌人，早就疲于奔命，顾此失彼。这天，一则新情报被送到他办公桌上，戈尔贝里几乎是掀翻了一摞未读的档案，从中抽出那份报告，拎着它一路冲进了最近的情报作战室。\n\n他“砰”地一声把文件甩到桌上，屋里的人却全都一脸茫然。墙上挂着几张地图，密密麻麻画满了红线和标记：叛军控制区、预判的部队动向……十几条战线交错纵横，却都像走进迷雾，没有一个明确的终点。他们根本不知道戈尔贝里要找的人在哪条线上；他们正追踪十几个不同的反政府指挥官，而戈尔贝里却咬定其中一人“至关重要”。“他不是一般的共产党，”他压低声音，像是在咬牙，“他是职业革命者，必须除掉。”\n\n可屋里的人只是沉默，面无表情地盯着他。他们知道这个人是谁，却没有任何确凿的情报能证明他真的出现在国内。他们不愿戳穿事实——也许是怕他发火。戈尔贝里瞪着这些冷冰冰的脸，猛然吼出一句：“谁他妈能告诉我，他到底在哪儿？”\n\n而此时，在遥远的亚马孙腹地，戈尔贝里的死对头正打开一盒古巴雪茄。他递了一支给若昂·阿马佐纳斯，阿马佐纳斯点上烟，一口呛住，咳嗽着骂道：“妈的，这味儿够烈。”\n\n切·格瓦拉咧嘴一笑，也取出一支点燃。“所以，有什么动静吗？”\n\n“啥也没有。”阿马佐纳斯耸耸肩，一边倒了两杯威士忌，“现在拉塞尔达连你的名字都当成禁词，电台连提都不敢提，恨不得把你从记忆里抹掉。”他将一杯酒递过去，继续说：“军方的情报更是差得可笑，八成连你是不是在国内都搞不清。”"
 brazil_lacerda_imp.45.a: "切·格瓦拉微笑着接过酒杯。“那么，同志——为另一场革命的胜利，干杯。”"
 brazil_lacerda_imp.46.t: "今日为友，明日为敌"
 brazil_lacerda_imp.46.desc: "在那些拉塞尔达权力鞭长莫及的小镇上，卡洛斯·马里盖拉可以毫无顾忌地走在镇中心的街道上。他路过其中一座小镇时，正赶上教堂做完弥撒，人群陆续从教堂走出：一边是共产党人，一边是士兵。这诡异的组合并肩从教堂中出来，让他不禁停下脚步，盯着他们看了片刻。\n\n那些与他同志并肩做礼拜的士兵，是弗罗塔的部队。这支部队已与巴西利亚公开决裂，里面满是愤怒的军人。今日，他们是形势使然的盟友。弗勒里率领的装甲纵队昨日才抵达此地，马里盖拉和弗罗塔虽彼此看不顺眼，甚至内心厌恶对方，但两人都明白，要想击退弗勒里的坦克，就只能联手。只是这场结盟来得快，去得也快。明天一到，这脆弱的同盟十有八九会在枪火中土崩瓦解。\n\n他看见神父走出教堂，向这临时的结盟者挥手道别。即便是在他们控制的地盘上，教堂依旧矗立——这是阿马佐纳斯亲自下达的命令，他和普列斯特斯都严格遵守。马里盖拉理解这条命令背后的理性逻辑：宗教仍是乡村生活的根基，只要游击队仍需藏身丛林，与地方教士维持良好关系就至关重要。其中一些神父，特别是信奉“解放神学”的，更会在面对残暴且臭名昭著的军官时，冒险庇护游击队员。\n\n阿马佐纳斯说，这是“争取人心”的斗争。但马里盖拉觉得，阿马佐纳斯并未真正理解：想赢得人心的不止他们一方。弗罗塔已经投靠了小瓦加斯，而这位州长正在竭尽全力证明，自己才是巴西真正的“解放者”。他做得还不赖——用温和的面孔代表军队，保护百姓免受弗勒里军队的极端暴行。"
 brazil_lacerda_imp.46.a: "可每当小瓦加斯赢得一次民心，马里盖拉便赢下三次。"
 brazil_lacerda_imp.47.t: "一劳永逸"
 brazil_lacerda_imp.47.desc: "最初，拉塞尔达喝着酒——如今这已成为政府的集体麻醉剂——审阅着关于布尔涅的最终报告。\n\n随后梅迪西也开始痛饮；醉醺醺的拉塞尔达口齿不清，将行动指令与破碎的谩骂混作一团宣讲。\n\n待到梅迪西的部众也饮完酒，他们在听取命令后便公然藐视章法。这支队伍在里约街头开拔，为首的梅迪西活像凯旋式上的罗马将军。沿途他向民众痛斥叛国与奸诈的罪行，称这些病毒正侵蚀国家，人人都需付出代价。部下高呼他为主宰，而他也自觉如同神明。\n\n甜美的曲调飘荡空中，乌泱泱的人群朝着里约头号通缉犯总部挺进。阳光在他们脸上跳跃，双目却对自身的愚行视而不见。士兵们唱着不协调的歌谣，充满狂热与信仰。他们途经一座主教座堂，但那里的主教已被剜去双眼。\n\n这群暴徒最终欢叫着撞开未上锁的总部大门。楼内仅剩一名孤傲的男子，可惜这群可悲之徒早已记不起他的姓名。在弹雨穿透身躯时，他仍高呼效忠巴西。首领们早已撤离——暴徒们展开搜捕，最终在巷陌壁橱里发现了目标。当血色与紫痕交织的山野丛林尽数伏尸脚下，胜利的快感终于激起震天欢呼。他们笑着，笑着，笑着。"
 brazil_lacerda_imp.47.a: "回家锁好门，别再把我问。"
 brazil_lacerda_imp.48.t: "就在今晚"
 brazil_lacerda_imp.48.desc: "“布尔涅已死”——这是新近复刊的《新闻论坛报》头版大字标题。那是布尔涅，一个让这座城流尽鲜血的人。梅迪西阁下真是仁慈得很。他不仅下达种种命令，还让拉塞尔达的报社记者重返岗位。真是恩威并施、刚柔并济啊。显然，他是在讨好某人。读着那篇报道，圣塞巴斯蒂昂总主教、红衣主教欧热尼奥·德·阿劳若·萨莱斯感到怒火上涌，几度咬牙才把咒骂压回喉间。\n\n弥撒照常进行，总主教座堂内座无虚席，这是近来的常态。萨莱斯在讲道时挥舞着那份报纸，怒吼道：“我们英勇的军人，真令人骄傲。看看他们的英姿，看看他们如何旁观世界沉沦。真是干得好。是啊，干得好，巴西的武装部队。先是制造灾难，毁了无数无辜者的家庭与性命，然后再冠冕堂皇地跳出来‘解决问题’！”教堂中响起一片嬉笑怒骂。\n\n“他们说城市太红，太左，于是布尔涅便让它流尽了血，露出森森白骨。那些贫穷无助之人，因太可怜就成了威胁，于是他们被挨个屠杀，在救世基督像的注视下倒毙街头。若这便是所谓的“忠仆”，那么我说，好仆人哪，好仆人，你们已得主的赏赐。去吧，去进入你们的主人，那只残暴乌鸦的喜乐中去吧。”\n\n他心中对上帝的殿与子民的愤怒几乎将他吞噬。他重重砸向讲坛，直至拳头血流不止。“他们说，要防止无政府状态，于是便派出保罗·若昂·布尔涅，让他亲手缔造无政府。他们说要赶走布尔什维克，便将整个城市赶入沉默。你们听他们说：‘灵魂啊，歇息吧；吃吧，喝吧，快乐吧。’红色恐怖已被驱除，不是藏匿，也非殉道，而是彻底，被血与火清除干净。”\n\n泪水、怒火与嘲笑交织充斥着圣堂。萨莱斯的声音渐渐低了下去，教友们屏息凝神，努力捕捉他最后的话语。“我告诉你们，这样的忠仆，该得何等的报偿？”他低声呢喃：“因为经上记着：‘无知的人啊，今晚就要取走你的命！’”"
 brazil_lacerda_imp.48.a: "主教座堂内从未见过如此景象——会众们齐声高呼，震天动地地呼应着这场怒火洗礼。"
 brazil_lacerda_imp.49.t: "震怒之日"
 brazil_lacerda_imp.49.desc: "埃利奥·贝尔特朗是拉塞尔达1965年内阁中仅存的几位幸存者之一，而他下定决心——自己必须继续“幸存”下来。如今，他的仕途悬于一线。他走进拉塞尔达的办公室，双手紧握，努力止住颤抖。一声粗暴的吼叫“你他妈来干什么？”便是总统的迎接方式。\n\n“总统阁下……”贝尔特朗开口，抬头看着那个衣衫不整、面容憔悴的拉塞尔达，“我们遭遇了石油冲击……中东战争爆发了……我们的石油进口，已经断了。”他试图揣测总统的反应。拉塞尔达眯起眼睛。\n\n“我又不是不会看报，贝尔特朗。”拉塞尔达咬牙切齿地说，“我们会动用国家储备，把油价压下来。还有别的要说的吗？”\n\n贝尔特朗咽了口唾沫，声音愈发颤抖：“总……总统阁下……经济……”他垂下头，“我们快撑不下去了……失业率在飙升……物价……”他话没说完，便被总统的怒吼打断。\n\n“他妈的！”拉塞尔达猛地从椅子上跳起，双手猛拍在办公桌上，“我受够了！”贝尔特朗战战兢兢地向门口挪去。拉塞尔达把桌上的文件全都扫到地上，开始语无伦次地咆哮，“阿拉伯人，一团乱麻……贪得无厌，一涨价就受不了……这本来是你负责的事，贝尔特朗，马上给我解决掉！”"
 brazil_lacerda_imp.49.a: "还不等订书机飞出去，一名军官已快步将贝尔特朗护送离开。"
 brazil_lacerda_imp.50.t: "我有罪"
 brazil_lacerda_imp.50.desc: "一切都在走向终结。这一次，是真的了。一只颤抖、不安的手在昏暗办公室的地毯上摸索着酒瓶。他突然停住了动作：不，这一口苦涩，不论喝多少，都无法冲淡。他已经知道，那一天终会到来——那审判的日子，他将不得不直面自己为巴西带来的全部恶果。无论他如何向自己，或向幕僚们辩解，都无法改变这点。那将是他最卑微的时刻，他的彻底溃败。\n\n于是他俯卧在地，四周散落着纸张和怒火发作时打碎的玻璃残片。脑海里不断回响的，是洛特的声音——那个自命清高的混账，他早年提出的警告如今如咒语般在他脑中来回回荡。洛特总是带着一种隐隐的厌恶语气，将劝诫编织其中，那腔调令拉塞尔达反胃，却又讽刺地，一一成真。“若国家的领导不做出根本性的转变，”他曾说，“那后果，将不堪设想。”\n\n拉塞尔达低声呻吟，目光扫向地上一幅摔裂的相框。那是他与莱蒂西亚数年前在蒙得维的亚度假时的合影。他猛然一吸气，随即放声苦笑。无论他如何否认，洛特所言的后果，如今已沉沉压在他肩上。他选择了无视，如今整个巴西要为此买单——就像一只在祭坛上流血的羔羊，而拉塞尔达，正紧握着那把刀。问题已经不在于代价，而在于：\n\n谁才是更蠢的那个人？是不接纳洛特劝言的拉塞尔达，还是明知不可为而为之的洛特及其同仁？"
 brazil_lacerda_imp.50.a: "苦笑间泪水溢出，化作轻声抽泣。"
 brazil_lacerda_imp.51.t: "我死了，霍拉旭"
 brazil_lacerda_imp.51.desc: "巴西联邦共和国第二任总统，若泽·德·马加良斯·平托，于高原宫内宣誓就职。四周围布铁丝网，碉堡中列兵持枪而立。此地无嘉宾，无记者，唯有一名法官、数位总参谋军官与寥寥数名全民盟议员在场。无仪式、无庆典，甚至连一场晚宴也未设。这场就职，不曾播音传世，亦不许万民共观。\n\n卡洛斯·弗雷德里科·韦尔内克·德·拉塞尔达将物品收拾停当，经高原宫之侧门悄然离去。与马加良斯·平托之间的交接，不过是例行敷衍之语，空洞如唇齿间残风。他未曾回首，只是径直前行。然当车队驶向瓜纳巴拉，悔意便如阴霾悄然笼罩心头。“我那时，责怪瓦加斯什么？杨戈又有何过错？而我——我究竟做了什么？”\n\n车队驶入里约时，一名上校打开车门，脸色瞬间发白。那卸任的总统，正于副座低声祈祷，手执玫瑰念珠，身形来回摇晃。抵达《新闻论坛报》门前时，他将念珠猛地塞入口袋，踉跄下车，怒目咒骂：“那个该死的马屁精梅迪西！”\n\n接下来的几日，他遣散所有至亲——共有九人，由他亲出费用，送往海外。其后是所有幕僚，无一例外。整个过程中，喧扰如狂，争执四起，然他一如既往，执拗如山，推开一切劝阻，犹如当年横推旧巴西之人，如今再度举手遣别所有至爱。他已决意——要独自面对这一切。\n\n最终，他归抵那座空无一人的宅邸。连仆人也携着他的祝愿离去。他伫立窗前，望向窗外，面色忽变惨白——满目残垣，街角民众被兵士拖行，哀声未绝，画面如梦魇般将他吞噬。“主啊！这难道……是布尔涅一人之罪？不，是我，是我一手促成了这一切。”他跪倒在面向窗前的祷垫上，双手颤抖，复又取出念珠，一颗一颗拨动。每念一声《圣母经》，指尖便在珠与珠之间战栗浮动。"
 brazil_lacerda_imp.51.a: "此外仅余沉默而已。"
 brazil_lacerda_imp.52.t: "理论中的破洞"
 brazil_lacerda_imp.52.desc: "又一支直升机旅飞过阿瓜林帕，没人觉得稀奇；可当它突然朝村庄本身开火时，全村顿时陷入惊愕。地图上的命令写得明明白白：村中疑有共党分子，一律格杀勿论。早前，确有零星的游击队员出没于此，在几个村镇之间徘徊，偶尔与巡逻兵短兵相接。但如今，曾是农田的焦土与倒塌的砖瓦间，反抗者的队伍已经扩张至数百人。\n\n而在更北的雅昆达，神父罗梅乌·热苏斯·席尔韦拉正站在讲坛上慷慨陈词。他那位主教好友，因被控“亲共”而遭军方秘密拘捕，连象征性的审判都未获一场，便与其他神职人员一同遇害。他的布道很快转为政治演说——一边颂扬基督之爱，一边暗讽拉塞尔达的暴政。他所属的教区不敢明言支持拉马尔卡领导的起义，但他用含混的话语巧妙绕开限制，把拉马尔卡比作古代的先知——为正义奋战的先驱。\n\n再往内陆，在巴卡巴尔郊外的一个施工工地边上，贝尼迪托·黑森德·迪亚斯正默默注视着几辆军用卡车驶入丛林深处。没人对他起疑。所有人都把他当成一个再普通不过的建筑工人，在炸弹频落的废墟之间谋一口饭吃。他心里清楚，那些飞机很快就会重新起飞，再度洒下火雨。这次，他们并没有明确目标，只是为了发泄资产阶级的恐惧。翻开背包，他开始检查物资。按计划，当地的补给线，很快就该“出点状况”了。\n\n与此同时，在巴西利亚，将军们踏着整齐划一的步伐穿梭于各个作战指挥室，忙着汇总前线情报。最新通报显示：军火库存大幅缩水，拉马尔卡的征兵人数却节节攀升，多个遭轰炸地区的部队已严重失去机动性。每一轮轰炸，每一个负伤的游击队员，看似都是胜利的代价，实则都在削弱军方的战略态势。撤退——这原本无法想象的字眼，此刻正变得越来越吸引人。"
 brazil_lacerda_imp.52.a: "将军们沉醉在自己构筑的信念中，轰炸仍在继续。"
 brazil_lacerda_imp.53.t: "寂寞平沙空莽莽"
 brazil_lacerda_imp.53.desc: "数天内陆续收到的报告置于案头，不过结合现状发展，上述报告似乎接踵而至。西部地区共产主义游击队多数据点失守，绝大部分骨干成员或被歼，或受严密羁押。在那些警方畏葸不前的城镇与村庄，此刻是身着制服的军官赴汤蹈火。拉塞尔达的同僚们一反既往对暗杀或袭击的担忧，转而公开表示支持。据《新闻论坛报》记者报道，里约街头已不见赤衫军的威胁恫吓，就连抗议也基本平息，其拥护者大多放弃继续活动。\n\n确切而言，广场集会由一类不同以往的游行取而代之。标语高高扬起，支持拉塞尔达打击共产主义的行动及全民盟保卫巴西的举措。自城市广场至贫民窟，“人民战争残害人民”的口号此起彼伏。共产主义分子正戕杀他人，利用他人的牺牲成为天下的主人；没有神明，也没有主人，他们自己却是例外。舆论战已决胜负，唯拉塞尔达一人稳如磐石。\n\n办公室内，拉塞尔达正享用午餐，一手随意地翻阅着报告。倏忽间他领悟了什么，心中一惊，叉子随之跌落桌面。这是他的胜利，是他笑到最后，笑得最好。“客纳罕地已陷落，阿市刻隆已遭受灭亡。”他自言自语，无端忆起大学生活的片段。“让瓦加斯无法企及，也为戈梅斯雪耻。”办公室别无他人，拉塞尔达脑海中一小部分认为此时该欢欣雀跃，余下部分却唯有思索成功的深意，与并未同那部分一道意气风发的缘由。"
 brazil_lacerda_imp.53.a: "高处不胜寒。"
 brazil_lacerda_imp.54.t: "濒危"
 brazil_lacerda_imp.54.desc: "阿马佐纳斯一派的中尉怒火中烧，咬牙切齿地朝村长大骂。可村长只是眨了眨眼，静静地站在那里，等他骂完。然后，他面无表情地回了一句：“骂够了，就收拾走人。我们现在还给你这个机会。再不走，我们就叫军队来。”中尉眼中布满血丝，死死瞪着他，最后猛地站起身，一脚踢翻椅子，嘴里嘟囔着什么“落后的部落民”，转身离开。\n\n在韦拉克鲁斯协定的一条走私路线旁，一辆货车被迫停下。司机惊恐地举起双手——几个巴西士兵荷枪实弹围了上来。有人跳上车厢，一边搜查一边喊话。不久，一声大喊传来：“找到了！是步枪！”司机整个人都僵住了。还没来得及多想，他便被拖下卡车，连连求饶。\n\n而在亚马孙另一片潮湿的密林中，两名军官正站在小山丘上，冷眼看着山下的屠杀场面。“欢迎回到部队，博尔热斯上尉。”雷耶斯笑着拍了拍这位老相识的肩。当年两人初次见面，差点就成了永别。雷耶斯当时举起枪，差点当场毙了他。那时候，博尔热斯是个投奔阿马佐纳斯的叛徒。幸亏雷耶斯迟疑了几秒，才听他说完。原来他想带人归顺，为了表忠心，他们还交出了一个游击队营地的位置。“我代表大家说一句——很高兴你能回来。”雷耶斯道。博尔热斯露出一抹勉强的笑容："
 brazil_lacerda_imp.54.a: "“只希望……我的背叛还能得到原谅。”"
 brazil_lacerda_imp.55.t: "干涸的纸页"
 brazil_lacerda_imp.55.desc: "今天早上的报纸，有些奇怪。卡洛斯·拉塞尔达一页一页地翻着，试图找出那不寻常之处。里约的基建新闻、最新的体育比分、国际版的消息……没错，就是这个问题——一切都“没问题”。往常，总有工党或全民盟的异见者对他政府的尖锐批评，如今却悄然无声。\n\n总统放下报纸，转过椅子，望向办公室窗外。这些日子里，空气格外安静——就连以往咄咄逼人的茹阿雷斯·塔沃拉，如今也对政府态度和缓。古拉特、埃德娜、甚至布里佐拉也都毫无动静。仿佛他们说什么，已经不足以传进拉塞尔达耳中。\n\n萨缪尔·魏纳如今又在写些什么？他不在意。不论魏纳再写出怎样的文章，也不可能再对他或全国民主联盟构成真正威胁。这份美妙的沉寂，值得庆贺。但不是靠一瓶好酒，而是以一杯来自巴西本土的矿泉水。"
 brazil_lacerda_imp.55.a: "他需要一颗清明的头脑，好细细品味这来之不易的宁静。"
 brazil_lacerda_imp.56.t: "信念的飞跃"
 brazil_lacerda_imp.56.desc: "“……就这短短几年，我们的进步已经足以让全世界刮目相看——不行，还是太啰嗦，得找个地方断一断。”这是他今天第五次这样念叨了。埃丝特向来比他更沉得住气，可今天两人像是换了角色。明明完全可以让别人代笔，不是吗？\n\n她又把一张几乎空白的稿纸撂到一旁，拉塞尔达却突然像被什么点亮了似的，整张脸闪着光。他张了张嘴，愣了几秒，开始拨弄桌上的镇纸，好像那几块沉甸甸的石头也得为他即将出口的金句让位。\n\n“仅在过去五年里，这片土地已经彻底改头换面，迈出了意义非凡的一步。而在我与诸位，也就是巴西人民的无数交流中，我最深刻地体会到的是：即便在困顿时期，即便我们的信念、对祖国与自我的信仰遭遇考验，我们依旧坚定站立、迈步向前。我们已取得长足进展，但我们不能止步，仍需继续前行——而这正是我对拉斐尔·马加良斯满怀信心的原因。”\n\n他面带喜色地等待着埃丝特在打字机上敲出那段话的最后一字。她神色怀疑地看着纸张，担心这又会像之前那样被他一句话扔进废稿堆。但拉塞尔达只是沉默地看着稿件，神情专注得近乎诡异，接着，他拿起钢笔，在稿纸上满怀热情地划出签名。\n\n此刻的拉塞尔达，看起来更像一位即将退位的罗马皇帝，亲手将桂冠戴在下一任人选的头上。尽管宫廷之外，仍是刀光剑影、暗流汹涌——只希望，那些握着枪的人，也能满意他这番“传位诏书”。"
 brazil_lacerda_imp.56.a: "否则，等待他们的将是清算。"
 brazil_lacerda_imp.57.t: "一无所有"
 brazil_lacerda_imp.57.desc: "“你说什么？”拉塞尔达颤声问道：“不行是什么意思？拉斐尔·马加良斯有什么不合适的？”\n\n科斯塔·席尔瓦和梅迪西对视一眼，随即爆出一阵毫不掩饰的大笑，笑足整整十五秒。梅迪西笑着摇头，说：“总统先生，您是喝醉了脑子糊涂，还是今天特别迟钝？”拉塞尔达气得脸都红了，猛地站起身来。结果，两位将军笑得更放肆了。“哈哈哈！你看看他那副样子！”梅迪西道，“是，你确实挺喜欢马加良斯。但除了全民盟那20%的死忠分子，没人认同你。他就像你——只不过少了点精气神。”\n\n“可是——”\n\n科斯塔·席尔瓦接过话头，语气带着刺：“看看你的‘英明领导’：全国罢工不断，工会围攻政府大楼，立法机关和国会全是你们党的人，结果党内却内讧成这样。就连共产党都能进来掺和一下，你是怎么把一副好牌打烂的？”\n\n“我——”\n\n拉塞尔达话还没出口，梅迪西已经补上最后一刀：“别说了，浪费口水。”他语气冷得像霜，“军方已经一致决定，不会——我再强调一遍，绝对不会让你在继任人选上插手半句。人选我们已经定了——巴拉那州州长，退役少校，内伊·布拉加。”\n\n脸色涨得通红的卡洛斯·拉塞尔达，原本趾高气扬，如今却落魄至此，只剩下语无伦次地支支吾吾。"
 brazil_lacerda_imp.57.a: "梅迪西差点当场把拉塞尔达轰出办公室。"
 brazil_lacerda_imp.58.t: "安慰"
 brazil_lacerda_imp.58.desc: "马加良斯终于找到拉塞尔达时，总统的情绪仍未平复，正愤怒地搓着双手，仿佛想借此将梅迪西加诸他的羞辱一并揉碎。他虽然不再自言自语地咒骂，但相比之前，似乎也只是多了一丝勉强的沉默。马加良斯叹了口气，走上前，神情里多了几分担忧：“怎么了，卡洛斯？”\n\n拉塞尔达猛地抬起头来，但当他看清来人是马加良斯，脸色便缓了下来。“拉斐尔……你还不知道？那些将军已经否决了你出任总统的可能。”\n\n马加良斯点点头：“知道了。”拉塞尔达站了起来，满脸愧疚，似乎想说点什么。但马加良斯伸手拦住他：“别说了。或许这反倒是件好事。那个位子……远没外界想的那么风光。你看看你现在的样子，头发白了这么多，眼神也疲惫得不像话，像是老了十五岁。说实话，我看着都心疼——这根本就是慢性折磨。”\n\n“可我还是觉得……你应该有机会……”\n\n“不必再为这事烦心。他们又不是选了第二个古拉特。内伊·布拉加可不是阿马佐纳斯那群疯子，他稳得住局面，也配得上这个位置。我是以朋友的身份对你说这些话的，卡洛斯。你得清醒点。别沉浸在自怜里了。想想你还掌握着什么，别让一场政变毁掉你的全部。”\n\n马加良斯转身离开房间，拉塞尔达却仍静静地站着，沉思良久。全国大罢工早已平息，古拉特被送上了历史的审判席，共产党也被驱逐出乡间的暗巢。马加良斯或许是对的——总统这个位置，真的让他一点点地失去了自己。他曾是那个意气风发、言辞犀利的“未登基者”，靠着一项项政治胜利筑起声望；可如今，他只是一个在高位上走下来的旧人，惶惶不安地计算着自己还剩下什么，失去了多少。"
 brazil_lacerda_imp.58.a: "“细数我的福祉，是吗？”"
 brazil_lacerda_imp.59.t: "鹦鹉飞去哪了"
 brazil_lacerda_imp.59.desc: "“梅迪西将军，”拉塞尔达的声音自电话中传来，“狩猎进展如何？”\n\n在阿拉瓜亚丛林边缘的一座指挥帐篷内，梅迪西将军将话筒贴在被汗水打湿的脸颊上。“部队已深入丛林腹地，我们每天都在发现新的敌方据点。”他看向帐篷入口——若走出去，便能看到士兵们正在操练，为下一次作战反复锤炼自己。“他们的状态保持得很好，丛林中的时间也为他们积累了关键的实战经验。到时候，我们必能将共产党人彻底剿灭。”\n\n“很好，很好。”拉塞尔达的声音显得有些遥远，梅迪西屏住呼吸。“将军，我想现在也许该跳出侦察的框架了。我们需要的是决胜一击。这个国家的混乱程度，已经远超民众的忍耐底线，我们必须尽快让小伙子们离开这片丛林。”\n\n梅迪西偏过头，对着话筒外长长地吐了口气。“我明白，总统先生。如果我们能确认目标位置，下个月或许就能提前发动一轮攻势——”\n\n“下个月？”拉塞尔达打断他，“太迟，太迟了。到时候全国上下都被渗透完了。将军，我们需要的是果断行动。”\n\n梅迪西只觉一阵沉重从背脊一直压到胸膛。帐外的营地，虽然比最初混乱时好上许多，但依旧效率低下。巡逻队迷路的次数多得令人难以启齿；车队的燃油消耗仍然居高不下；而即便是最简洁的情报简报，也在“可执行信息”的缝隙中藏着空白——整个连队都可能陷入其中，凭空消失。"
 brazil_lacerda_imp.59.a: "但总统希望采取果断行动。"
 brazil_lacerda_imp.60.t: "鹦鹉如何死去"
 brazil_lacerda_imp.60.desc: "梅迪西将军努力压抑着内心的不安。在这座位于丛林边缘的前线营地里，士兵们在营房中低声议论，流言四起，充满了焦虑与不安。眼前的丛林，是一片浓密的绿色迷宫，而在那绿影深处，藏着的是“红色”的敌人。过去几个月，他们已奋力斩开这片密林，然而在巴西利亚的眼中，他们的刀锋仍嫌迟钝，力道不足。于是梅迪西站在营地外，眼见一支新的车队驶入——二十辆卡车，载来死亡。\n\n士兵们引导车队穿过营门，指挥他们驶往新建的设施，并将车队停在一片废弃角落——那里“危害最小”。第一辆卡车上跳下了一名营指挥官：脖子粗壮，身形夸张得近乎讽刺，却有一双与常人印象格格不入的眼睛——细小、狡黠，像啮齿类动物。他从车上跳下，向梅迪西伸出手，将军用力握住。\n\n“上尉，欢迎你们加入。”梅迪西说道，“你们的人有丛林作战经验？”\n\n“在亚马孙打过，长官。专门对付共匪，和这回一样。我们在那儿解决过他们，这里也不例外。”梅迪西朝东方一挥手，默默示意这位特种部队军官与他并肩而行。“那么，”对方继续道，“你们已经找到了他们的藏身地，这回轮到我们清理了。”\n\n“是的，”他边走边答，途经正在维修、巡逻、抽烟休息的士兵们。“这是锤与砧的战术。我们主力将集中在南线，你们将从北方扫荡，重点清除他们的指挥官——阿马佐纳斯本人，这是你们的首要目标。一旦他们的基地陷落，游击队必定往南撤退——我们会在那里等他们。”\n\n那军官笑了笑，从军装口袋里掏出一支烟。“我们会‘留一些’给你们的，将军。你和你的人大可放心。”"
 brazil_lacerda_imp.60.a: "梅迪西心中希望这套计划足够周密。可他依然不敢确定。"
 brazil_lacerda_imp.61.t: "解决"
 brazil_lacerda_imp.61.desc: "看完最新战报，拉塞尔达顿感胜利在望。阿拉瓜亚地区几乎全境重归军方掌控。特别行动营汇报称，他们成功突袭了阿马佐纳斯麾下多数军事据点，甚至端掉了其指挥总部——只可惜这只老鼠在合围前弃巢逃脱，遁入荒野。尽管官兵们衔尾追击时击毙了他多名核心副手和心腹战友，但此人依然在枪林弹雨中得以脱身。相比之下，绝大多数游击队员可没这般好运：行动发起96小时内，中校提交的报告显示，叛乱军主力已有约75%被歼灭。阿马佐纳斯的不少死忠宁愿自杀也不肯投降。\n\n一丝烦躁率先掠过拉塞尔达心头。闹了半天，阿马佐纳斯还是逃之夭夭了？这场历经波折的围剿行动到最后，仍未能让罪魁祸首接受正义审判。他该怎样向巴西民众交代？难道要宣布这位制造无数死亡的元凶，终究没能为其毕生所为付出代价？为何总与决定性胜利差之毫厘？为何每次唾手可得的战果总在最后关头化作泡影？是情报网存在漏洞？军队里有内鬼？抑或自己遭到天谴？\n\n他长叹一声，忽然记起与拉斐尔那次谈话。那时他正拍案震怒，是老友过来开解。总统职权正蚀刻着他的理性。毕竟麾下将士已成功捍卫国家免遭赤色威胁——即便共产主义毒瘤尚未斩首，却也断了手脚再难兴风作浪。阿马佐纳斯亲手将追随者引向毁灭，明智之士都该明白效忠此人无异于踏上黄泉路。这条丧家之犬纵然活着，也只能眼睁睁看着亲手缔造的事业土崩瓦解。他耗尽毕生心血打造的部队灰飞烟灭，永远无法东山再起。"
 brazil_lacerda_imp.61.a: "拉塞尔达挤出微笑，又暗自庆幸了一回。"
 brazil_lacerda_imp.62.t: "无需恐惧；应当怜悯"
 brazil_lacerda_imp.62.desc: "里约的一处公园里，数百人聚成一片怒涛般的人海，高举着标语牌，呐喊声此起彼伏，像某种难以名状的野兽在嘶吼。他们的话语模糊不清，却又处处指向同一个方向——对巴西未来的哀悼与不信。警车沿着街边一字排开，防暴警察列队而立，警棍握得死紧，在公园外围筑起一道无形高墙。只有一道出入口被留了出来，便于逐一拍照登记。\n\n换作平时，卡洛斯·拉塞尔达绝不会靠近这种场面。他太清楚民众的情绪有多难控——他也曾亲身领教过他们的愤怒。但那天，他碰巧在对面的州政办公楼出席会议。即便在六楼，他也能一眼看见窗外那片汹涌的人潮。他让贴身保镖去找警官过来，不多时，对方带回一句冷漠的简报：“只是情绪宣泄。”\n\n会议结束后，拉塞尔达没有立即离开。他站在窗前，沉默地俯瞰着。那一刻，他竟浮现出一丝若有若无的怜悯——他也曾是街头的一员，在瓦加斯时代，他就和如今这些人一样。他看不清人群的脸，但保镖带回了监控截图：男女老幼都有，面无表情地穿过那扇登记门。牌子上的标语空洞无力，像是敷衍的抱怨。他只觉得这场抗议软弱得可笑，毫无威胁。甚至懒得开口命令驱散。\n\n又何必呢？不过是雨中一簇微弱的火星罢了。他们喊着要新领袖，却没人敢站出来；他们要求结束压迫，却不敢指名点姓地提到他和全民盟；他们渴望变革，却连一句直白的怒斥都不敢出口，因为一旦说了，就可能引来现政权的打击。拉塞尔达明白，警方之所以放任这场集会继续，不是无能，而是聪明。模糊的怨气比激烈的对抗更容易掌控。与此同时，国家的未来正在由更“稳妥”的双手牵引前行，在全民盟那温和老练的操纵下，巴西正被巧妙地施以压力，引导走向他们所设定的方向。"
 brazil_lacerda_imp.62.a: "拉塞尔达回到总统府时，早已把公园那点喧嚣抛在脑后。"
 brazil_lacerda_imp.63.t: "诱惑"
 brazil_lacerda_imp.63.desc: "他又把那些复印件翻出来重新看了一遍——实在好得令人难以置信。儒塞利诺·库比契克竟然与别的女人私通，而卡洛斯·拉塞尔达手中，握有铁证如山的材料。最先是一封封情书，库比契克写给情妇的，当然，用的是化名。\n\n接着是航班记录与酒店登记单，印证了这些信件的内容。“若阿金·洛佩斯先生”与那位女子在圣保罗会面，而库比契克正好在同一时间预订了酒店。他在约会前一小时离开房间。“洛佩斯先生”说要带好酒前来，一位酒铺员工确实在约定时间前三十分钟，看见库比契克进了店里。\n\n拉塞尔达嘴角上扬，把信件丢回桌面。这可不是军方干的，也不是戈尔贝里的手下，这一切，全是《新闻论坛报》麾下的记者与同僚带来的惊喜。\n\n他倒了点酒，慢慢地斟入杯中。值得庆贺，不是吗？他几乎“解决”掉了那个最棘手的对手。只是，当他抿下一口时，心里却泛起一丝不适——毕竟，这是库比契克的私生活。但他很快将这份愧意抛之脑后。欲望惹祸，他自食其果。于是，这位总统为自己，也为他的政敌，举杯庆祝。"
 brazil_lacerda_imp.63.a: "“多谢你的私通，儒塞利诺。”"
 brazil_lacerda_imp.64.t: "五年失去五十年"
 brazil_lacerda_imp.64.desc: "“今天，又一波余震袭来，源头正是我们环球电视台独家爆料的后续发展。前总统儒塞利诺·库比契克，如今声名狼藉，不仅被妻子萨拉以‘婚内不忠’为由一纸诉状送上法庭，还在审判中被彻底击溃。法庭采信多份出轨证据，审判长毫不留情地将两个孩子的全部监护权判给了萨拉。在裁决声明中，法官措辞严厉：证据确凿、无可争辩，判决是出于对子女身心健康的最大保护。”\n\n“丑闻曝光后，社会民主党迅速割席，发表声明切割昔日领袖。声明写道：‘我们对库比契克先生在个人与职业操守上的背叛深感失望。他的行为背离了本党的核心价值，我们将以全新面貌与道德典范重新出发。’但这一番话，并未堵住悠悠众口。其他政党反指社民党早已知情，甚至为图谋私利而选择沉默。真相如何仍有待厘清，但舆论已沸腾，要求展开全面调查的呼声日益高涨。有传言称，社民党内或有更多高层牵涉其中。全国民主联盟目前未明确表态是否介入调查，但已连发数则声明，强烈谴责这一丑闻，并承诺将与全体国民一同，挺过这段愤怒与耻辱交织的时期。”\n\n“两周前，巴伊亚主教奥古斯托·阿尔瓦罗·达·席尔瓦在主日讲道中，罕见地发出激烈谴责。他呼吁全国信徒挺身而出，捍卫道德底线，重建一个无罪高尚的生活方式。他的言辞激起千层浪，全国各地教堂纷纷响应，民众走上讲坛与街头，要求公共生活回归廉洁正直，成为全体巴西人的新楷模。”\n\n“更多独家内幕，更多真相追击，敬请锁定环球电视台。”"
 brazil_lacerda_imp.64.a: "据传，库比契克最后一次露面，是在墨西哥的一家小酒馆里借酒消愁。"
 brazil_lacerda_imp.65.t: "唱吧，亲爱的鸟儿"
 brazil_lacerda_imp.65.desc: "尽管贴身保镖再三劝阻，卡洛斯·拉塞尔达仍坚持亲自前往探视坦克雷多·内维斯。他不愿让对方上门到高原宫觐见自己，那太像在朝见一位国王。“那样传达出的意味不对。”他望着车窗外，语气沉静而笃定，“在这个节骨眼上，我们依然必须给予社会民主党应有的体面。”车外街道异常安静，行人纷纷驻足，静静注视着车队缓缓驶过。\n\n走进社会民主党全国办公室，拉塞尔达透过一圈保镖，看见的是一张张沮丧的面孔，一群埋首文书的沉闷党棍，还有一面面空白的墙壁——那里曾挂着如今声名狼藉的领袖的竞选宣传画。他在内维斯办公室外静候片刻，为的是给对方留下一点掌控感。墙上还残留一张恩里克·洛特1960年竞选时的旧海报，色彩褪去，洛特的笑容却依旧耀眼。\n\n内维斯打开门，示意他进来。两人握手、寒暄。房门关上，内维斯坐下，拉塞尔达仍站着。\n\n“内维斯议员，”拉塞尔达开口，“我来此是想向您郑重表明，尽管最近局势令人遗憾，但我并无意破坏我国的民主制度。”\n\n内维斯点点头：“请放心，总统先生，我们从未怀疑您是为捍卫国家政治制度的健康而努力。”\n\n这微弱的反抗，就像蚊虫叮咬，轻到拉塞尔达甚至未觉其痛。“当然，选民有权自行判断库比契克的忠诚是否值得信赖。”他顿了顿，话锋一转，“我们都看过民调。我此行，只是想让您放心——我并不打算把曾施加在工党身上的那种‘关注’，再套用在社会民主党身上。”他点了点头，脸上浮现出一个温和的笑容，那笑容里却藏着锋芒：“我真心期待，在选票上看到贵党的名字。”"
 brazil_lacerda_imp.65.a: "你不是邪恶，你只是软弱。而我正需要一些软弱之人，来扮演我的对手。"
 brazil_lacerda_imp.66.t: "乌鸦振翅"
 brazil_lacerda_imp.66.desc: "这几天对卡洛斯·拉塞尔达而言可谓精疲力尽——脸上的肌肉甚至因长时间对记者群保持微笑而隐隐作痛。但他享受着每一刻。刚从飞机踏下、从巴西利亚抵达华盛顿那一刻起，他便被迅速接引去会见美国总统。这场会晤对拉塞尔达而言顺利至极，新闻镜头全程记录了这一切。\n\n接下来，他又在国会两院的联合会议上发表演讲。他所承诺的内容与前一天对总统所言如出一辙——英语流利无碍：持续推进南北美洲之间的合作，争取共同经济繁荣，以及坚决击败国内的敌人。他一讲完，全场掌声雷动。有些议员满脸热忱，而另一些则强作礼貌地鼓掌，却掩不住眼中的厌恶。\n\n这是访问的第三天，拉塞尔达坐在一张舒适的扶手椅中，接受比尔·巴克利的访谈节目《火线》采访。采访过程中，“乌鸦”心中总有些许疑虑，但他一直等到摄像机关掉后才开口发问：“巴克利先生，我发现美国人对我似乎没有什么中立看法。”总统若有所思地说道，“要么我是救世主，要么就是恶魔。”\n\n巴克利笑出了声：“拉塞尔达先生，像您这种铁腕人物，在美国这样的地方，自然只能是极端的存在。”他解释道，“有些人认为您所作所为是政绩所必需，另一些‘多愁善感’的家伙则不断唠叨您的手段有问题。”\n\n拉塞尔达缓缓点头，起身与采访者握手。的确，有不少议员正是巴克利口中那些“多愁善感”的人。"
 brazil_lacerda_imp.66.a: "“希望这些批评者，将来不会惹出麻烦。”"
 brazil_lacerda_imp.67.t: "特殊关系"
 brazil_lacerda_imp.67.desc: "巴西联邦共和国总统卡洛斯·拉塞尔达露出了灿烂的笑容，他刚刚在那本皮革封面的文件上签下了名字，正式完成了与美利坚合众国的“特殊关系”协议。在他身边，美国总统[USA.GetLeader]也签署完自己的那份文件，随后站起身来，将卷轴递给拉塞尔达，而拉塞尔达也递出自己的，两人握手致意。白宫东厅中闪光灯此起彼伏，两国元首在聚光灯下微笑合影。\n\n“巴西与美利坚，如今比以往任何时候都更加亲密，而且是世界上最亲密无间的两个国家。”在美国总统致辞之后，拉塞尔达面对记者和电视镜头如此说道，“我们这南北两大国，如今肩并肩，团结一致，正为整个西半球捍卫自由与正义的信念。接下来，我们将以朋友的身份同行，以盟友的姿态前进，共同守护这片美洲大陆上的自由边疆。”\n\n场内响起了一阵礼貌的掌声。拉塞尔达笑着面向镜头，随后俯身，友好地拥抱了[USA.GetLeader]。\n\n而在大洋彼岸的故国，政客与媒体人议论纷纷：这不过是讨好美国佬的权宜之计，是将国家利益廉价出售，是向白宫里那位一时坐在宝座上的人俯首称臣。\n\n但此刻，拉塞尔达身在六千八百公里之外。即便听见了，他也绝不会在意。"
 brazil_lacerda_imp.67.a: "“世间能令我感到最幸福的，莫过于在灵魂深处记得我的好朋友。”"
 brazil_lacerda_imp.68.t: "协奏之中"
 brazil_lacerda_imp.68.desc: "拉塞尔达登上讲台，全民盟大会的掌声如浪潮奔涌，震耳欲聋。主持人高声宣布，为总统冠以新称号——“征服共产主义者”。听这阵阵欢呼，仿佛他曾孤身闯入亚马孙丛林，赤裸上身，嘴叼绳索拖着一串俘虏凯旋而归。他尽情享受着这一刻——在那些只能坐等发愁的日子之后，他终于可以，毫无顾虑地咀嚼胜利的滋味。\n\n尽管这个称号不如“征服者”那般威风凛凛，拉塞尔达却对另一项成就尤为自豪——在他的领导下，全民盟终于实现了真正意义上的团结。这次大会，全体几乎无一缺席，自1945年建党以来从未有过的场面。国会投票也前所未有地稳定，党提出的议案几乎不费吹灰之力便能通过参众两院。反对党的提案，不是被轻描淡写地否决，就是被顺水推舟地纳入全民盟版本，完全按照拉塞尔达的意思重写一遍。这种政党运作的默契与高效令人赞叹，而在这喧嚣的掌声中，拉塞尔达感受到多日的疲惫与压力一点点从他身体中散去。此刻的他，既是背后有全国支持的总统，又仿佛是那个胸怀未来的小男孩，他不禁露出满足的微笑。\n\n而站在一旁鼓掌的茹阿雷斯·塔沃拉，虽举手同庆，却始终未曾展颜而笑。表面上看，这一切正是全民盟梦寐以求的局面——立法团结、行政活跃、战功辉煌，简直是一张完美的成绩单。但这一切能持续多久？又付出了怎样的代价？或许这场胜利，只是爆炸前的静默余响。真正的震荡还没来。一旦来临，极可能吞没全民盟多年累积的全部成果。十年后，是否会有另一个总统，用拉塞尔达今日的目光，回望拉塞尔达的政绩？而他塔沃拉，又将何去何从？下一次，也许他将彻底被流放出局，还是再度起身收拾残局？在生命的旋律中，一遍遍重复那肮脏的合唱。"
 brazil_lacerda_imp.68.a: "曲调在变，舞步却未曾改变。"
 brazil_lacerda_imp.69.t: "错过时机"
 brazil_lacerda_imp.69.desc: "德尔芬·内托终于把报告念完了。通货膨胀被压下去了。可台下的反应，却冷得像冰窖。除了拉塞尔达，没有人鼓掌，或者说，没人真心在乎。他简直不敢相信自己的眼睛。库比契克一手打造的经济“遗产”，如今彻底扫进了历史的垃圾堆；巴西，好不容易摆脱了债务束缚——可迎接它的，只有敷衍的掌声和集体走神。\n\n“那么请问，”反对派有人站起来发问，“这一轮紧缩政策，对中产和工人阶级造成了什么样的代价？”德尔芬低声应答，提了提什么“通胀侵蚀了低收入群体的购买力”，言辞温吞，毫无力量。这番话并未打动任何人。将军们面无表情，眼神涣散，仿佛只是在走形式。\n\n更讽刺的是——连全民盟也没反应。这个拉塞尔达一手拉扯大的政党，像死水一样静。一半人根本不惊讶，显然早就拿到了结果，却毫不在意；另一半人，只是出于礼貌点头，连个象征性的表态都懒得做。这原本意义重大的成果，就这样被打包塞进议程的角落，像是一份不痛不痒的公文，被轻飘飘地带过。\n\n“在五年内完成五十年的建设。”库比契克当年这样承诺，而巴西最终留下的却是百年的债务。拉塞尔达倾尽心力推动通胀治理，为的是给国家争一个经济未来，而如今，竟无人关心！他蹙眉沉思，这究竟是怎么回事？是阿拉圭亚的平叛、还是应付大罢工耗尽了整个国家的精力，让他们根本无暇顾及？可他们怎能错过这一刻？百年债务在十年内化为乌有，这是前所未有的壮举、应得双倍掌声的奇迹，而巴西的政治精英们却眼睁睁看它被淹没在沉默中。"
 brazil_lacerda_imp.69.a: "总统默默煎熬着，郁郁难平。"
 brazil_lacerda_imp.70.t: "绿即是金"
 brazil_lacerda_imp.70.desc: "“很好，诸位，说说你们的计划吧。”为了在拉塞尔达那堆满事务的日程中争取这一小段时间，贝尔特朗与梅迪西已筹谋多时。他们所提出的，是一个早就引起拉塞尔达兴趣的构想——将巴西内陆全面商业化。只是过去总有更紧急的政务挡在前头，而他们那套面向未来的蓝图，又显得遥远而脆弱。如今，未来似乎终于稳了下来，拉塞尔达也终于有余裕放眼更远的地平线。\n\n“我们的初步计划，是在内陆展开石油与天然气的系统性勘探。”梅迪西拿出资料，指向图纸，“根据地质调查，第四页所示区域蕴藏着丰富能源。能源若实现国产化，将大幅压低进口成本，同时创造大量稳定且高薪的就业岗位。除此之外，该地还分布着若干稀有资源。虽说基础设施建设难度不小，但我们的启动资金充足，中期回报相当可观。外交部和贸易部已明确表态支持，我们也有信心引入国外的合作力量与先进技术。”\n\n“此外，从军事角度看，这片区域同样至关重要。不仅便于加强边境防卫，设立基地后还可作为特种部队的训练营地，尤其适合丛林作战。若有任何潜在的颠覆势力——无论是本地原住民的激进派，还是德意志资助的地下组织——我们都能依托对内陆的控制，予以有效压制。”\n\n这话听起来似乎有些画饼充饥，但拉塞尔达深知“安全”的价值。无论靠的是利益的诱惑，还是强硬的威慑，巴西的内陆终将被阳光照亮，也终将迎来属于它的贸易之光。"
 brazil_lacerda_imp.70.a: "毕竟，坚硬的果壳之下，往往包裹着最甘甜的果肉。"
 brazil_lacerda_imp.71.t: "无话可说"
 brazil_lacerda_imp.71.desc: "长夜初寂，这座城市多年来第一次如此安静。反对第五共和国的熊熊烈火已然燃尽，大选结果尘埃落定，未来的道路如夜幕般澄澈分明。拉塞尔达伫立阳台俯瞰巴西利亚，家眷皆已酣眠，他却感到异样的精神抖擞。随手从花槽折下几枝鲜花，腋下夹着折叠椅下楼，召唤了总统卫队那个总替他开车的面庞稚嫩的新兵。在年轻士兵困惑的目光中，他吩咐将椅子塞进后备箱，驱车前往公墓——他要造访瓦加斯墓。\n\n轿车穿行街道时，拉塞尔达思量着该如何面对这位死去的对手。是放声大笑？还是在墓碑刻下一道痕迹作为最终比分——拉塞尔达一分，瓦加斯零分？夜色中的车速愈快，沿途却不见暴乱、抗议，更无人焚烧他的诅咒人偶。这才算真正的胜利，远比就任总统更甚。凡夫俗子皆可身居高位，唯有真正的洞见者方能重塑国运、名垂青史。\n\n走进空荡荡的墓园，他打发司机去给两人找些吃食。独自展开折椅直面石碑时，突感一阵哽咽。他划着十字双掌交握，等待着倾吐之词，却只感到某种存在沉甸甸地悬在喉头。往事如走马灯掠过：昔日他对抗瓦加斯的峥嵘岁月，那些命悬一线的时刻；后来时运倒转，他贵为一国元首，瓦加斯却沦为半非法的反对者——这戏剧性反转若写成小说，怕是要被诟病陈腐滥套。\n\n如今瓦加斯已成黄土，而他屹立于此。没有得偿所愿的快意，亦无锥心之痛，只是存在本身。沉默绝非因言辞难以启齿，而是骤然领悟世间已无合适语汇。此刻无需任何旁白，这是专属于上帝与拉塞尔达的寂静时分。"
 brazil_lacerda_imp.71.a: "拉塞尔达决定祈祷。"
 brazil_lacerda_imp.72.t: "山巅之城"
 brazil_lacerda_imp.72.desc: "夜晚的空气温暖如织，仿佛一层轻柔的毯子，悄悄覆上卡洛斯的肌肤。他懒懒地倚在阳台椅上，终于在整日的喧嚣过后，找回了一丝久违的宁静。城市在脚下流动，车灯如潮，霓虹如雾。他只是静静地望着，不说话。酒足饭饱之后，睡意悄然降临，却尚未完全将他纳入怀中。他只能凝望着这座城市。\n\n心底却泛起一阵不安——“离开”这个念头像是从黑暗中冒出来的幽灵，在脑海中盘旋不去。他不是天真的人，更不会自欺。他知道，就算自己走了，未来依然可能被搞砸——因为人总会搞砸。他本想用这个假期把这些烦念抛在脑后，但夜色中的里约却像在低语，诉说着一座被重塑后的城市，既熟悉又陌生。\n\n这些年来，他亲手推行的改革确实改变了国家。但这一切……真的值得吗？今晚，他痛饮高歌，在亲人和老友的包围中尽情放纵。久违的轻松，久违的笑声。他不再计较明天的权谋，不再回头看昨日的血与火。他的目光掠过城市背后的群山，最终落在那座被灯光点亮的救世主雕像上，那双张开的手臂仿佛在拥抱天地。\n\n泪水在眼眶中打转。那双张开的手臂接纳着一切，无论贫富、善恶、忠奸，皆一视同仁。他缓缓坐起，环顾四周的天际线，那些车灯与楼宇的光辉刺破黑夜，在天幕中洒下一层柔和的金辉。纵然多年辛劳，他从未像此刻这般感受到自己的渺小，他再次望向基督雕像。\n\n“谢谢你。”他低声呢喃，仿佛在这座变了模样的城市中悄悄献上一句祈祷。\n\n卡洛斯缓缓靠回椅背。夜风拂面，那一刻像波纹轻轻划过水面，转瞬即逝。而假期的疲惫终究将他引入沉沉睡梦之中。"
 brazil_lacerda_imp.72.a: "不久之后，他的妻子便找到了他——只见卡洛斯躺在椅子上鼾声震天，嘴角还流着口水。"
 brazil_lacerda_imp.73.t: "达摩克利斯之剑"
 brazil_lacerda_imp.73.desc: "拉塞尔达的绶带早在两个小时前便交给了布拉加，但那份沉重却依然如影随形。他清楚这不过是“心因性”的幻觉，可幻觉有时比现实还要真实。自他就任总统以来，那条绶带仿佛成了他身体的一部分——无论高光时刻还是低谷沉沦。对他而言，那是一个幽灵——一个时时提醒他，权力从不是荣耀，而是负担的幽灵。人们常说，总统之位会改变一个人。或许，这句话真正的意思是：那个职务最终会让人变得有些疯癫。\n\n无数合影、和一顿味道出奇平淡的晚宴过后，拉塞尔达终于找到了片刻清静，与布拉加独处片刻。“今晚还算如意吧，布拉加？”拉塞尔达手中持酒，轻啜一口问道。\n\n“尚可吧，毕竟是个意义非凡的夜晚。你似乎有些忠告要给我？”\n\n“你其实早就知道，但我还是想说一遍。”拉塞尔达缓缓开口，语气中掺着些微疲惫，“别让鹰派拿走太多。别因为他们穿了军装，就默认他们有资格开口要什么。你知道他们不能被轻信，但你也必须明白——你不能被他们吓住。他们会得寸进尺。”拉塞尔达轻轻碰了碰披在布拉加肩上的绶带，随即又拍了拍他的肩膀，“记住，你才是总统，不是他们。”\n\n“我保证。我已有腹案，也一定会谨记你的忠言。”\n\n拉塞尔达如释重负地叹了口气。那条幽灵般的绶带仿佛终于从他胸前解开，他顿觉身轻如燕。"
 brazil_lacerda_imp.73.a: "他不再是总统卡洛斯·拉塞尔达，仅仅只是人类拉塞尔达。"
 brazil_lacerda_imp.76.t: "石块、投石和比愚行更荒谬的事"
 brazil_lacerda_imp.76.desc: "会议室的门悄无声息地打开，一群身着制服的军官鱼贯而入，默默在长桌四周坐下。他们绕过那位早已端坐主位的人——他身后还站着几位面色凝重的将军。那人一动不动，目光如炬，死死盯着他们落座。在场诸人几乎无人敢与之对视，更没人胆敢看向他们背后那些手握军权的上级。\n\n片刻沉默后，第一声“炮火”终于响起。那人缓缓指向自己面前的一份档案，说道：“各位先生，这是我几小时前接到的关于库比契克之死的报告。我认为，这不仅是一场悲剧，更是一场你们所有人都参与制造的悲剧。”\n\n军官们顿时坐立不安。他们不过是空军的参谋，并非命令的签发者，可从上峰的语气中，他们已经听出了不容辩解的怒意。终于有个胆子大些的开了口：“阁下，我们只是遵照——”\n\n话未说完，那人猛然起身，怒不可遏：“哪个环节写着要你们去谋杀前总统？你们这群白痴到底怎么回事？你们是巴西的精英，不是乌合之众，更不是黑手党！”\n\n众人纷纷低下头，如坐针毡。又有一人试图辩解：“可是——”\n\n他也没能说完就被打断了。“没有‘可是’！他是前总统——而你们让他像条狗一样死在街头！不是以我的名义，更不是以巴西的名义。我只恨我词穷，想不出一个足够蠢、又不至于侮辱智商的词，来形容你们这些人。”\n\n他停下，俯身撑在桌上，凝视着眼前一张张惊惶失措的面孔。他眼中的厌恶已经压过了怒火，猎场布好，刀已出鞘。现在，是时候收网了。\n\n拉塞尔达缓缓转向他身后的将军们。"
 brazil_lacerda_imp.76.a: "“梅迪西，将这些人全部逮捕，逼他们交代关于布尔涅的一切。之后想怎么处置随你。”"
 brazil_lacerda_imp.77.t: "清算"
 brazil_lacerda_imp.77.desc: "孤独——这是卡洛斯·拉塞尔达此刻最真实的感受。他弯着腰，坐在昏暗办公室的书桌前。整张桌面铺满了报纸，每一份头条都赫然印着同样的字眼：《拉斐尔·马加良斯遇刺！马加良斯遭红色分子枪杀！》马加良斯死了，只剩拉塞尔达孤身一人，留在这世上。\n\n这是他的错吗？报纸旁边，是一叠厚厚的报告，是他动用所有情报系统和警察资源收集来的证据——凶手无疑是共产党人。而他，也正是在不久前，才将打击的矛头明确指向他们。是他的决定，把马加良斯推上了靶心？他抱紧头，指节发白，额角的疼痛越来越剧烈。但这并非头痛，而是——\n\n“总统先生？您的家人想要联系您。”门口传来轻轻的敲门声。是埃丝特。她推开门的一瞬，身体仍小心翼翼地藏在门后，就像那扇门能替她抵挡任何可能飞来的愤怒。办公室里一片漆黑，她几乎看不清总统那道佝偻的身影。他没有反应，她怯生生地向前挪了几步：“总统先生？您的——”\n\n卡洛斯·拉塞尔达缓缓抬起头来。他的双眼布满血丝，见有人来便睁大了眼睛望向她。他的下巴上已满是胡茬，早已不见他昔日整洁利落的模样。酒瓶和酒杯压在几张纸上，像是为了防止它们被夜风吹乱。\n\n“出去。”他声音嘶哑，低沉而疲惫，只吐出这两个字，连呵斥的力气都没有。埃丝特点点头，低着头正要离开，背后又传来他的声音：“给梅迪西打电话。”他命令道，“还有若昂·保罗·布尔涅准将。”"
 brazil_lacerda_imp.77.a: "通知他们出动伞降搜救队。"
 brazil_lacerda_imp.88.t: "步步逼近"
 brazil_lacerda_imp.88.desc: "维尔吉利奥·塔沃拉竟对四周这冰冷的混凝土墙面生出几分近乎病态的迷恋。那无菌、灰白、毫无表情的表层，唤起了他内心深处某种原始的恐惧——一种幽闭带来的焦躁不安，仿佛是天性本能在记忆深处的裂隙中翻涌挣扎，想要冲破禁锢，逃离这间密闭的地底房间。他确实感到自己被困住了，但这个念头反倒令他轻声笑了出来。某种意义上，他们全都被困住了，只不过这囚笼是他们自己亲手铸成的。\n\n“我们取得了如此多的成就，”拉塞尔达的声音在会议室内回响，“而且，仅仅用了这么短的时间！”仿佛早有默契，圆桌旁的部长们立即鼓掌欢呼，塔沃拉也跟着拍了拍手。此刻，整个巴西的权力核心已退入巴西利亚地下的掩体系统——那些原本供军方作战指挥使用的密道，如今成了拉塞尔达内阁的最后避风港，总统本人也身处其间。塔沃拉明白，这一切并非出于胆怯，而是现实的残酷逼迫。他已记不清，有多少政府大楼在过去几周内被暴民或恐怖分子的炸弹夷为废墟。他只祈祷，上天别让他们发现这里。\n\n“尽管如此，我们的政府仍然稳如磐石，坚定捍卫共和国不被古拉特的低劣专制所玷污。别搞错了——我们即将完成的事业，不只将惠及我们的子孙后代，更将光耀未来数代！”拉塞尔达举起水杯，喝了一口水，“我们正为一个能够经受时间考验的自由巴西而战。一个不再受瓦加斯阴影笼罩的国家！一个摆脱自诩为‘薪火传人’的工党魔爪的国家！一个摆脱贫穷与恐惧，奔向光明未来的国家！”\n\n掌声如雷，部长们齐声高呼“拉塞尔达！拉塞尔达！”声音在这狭小空间内震荡回响。塔沃拉依然拍着手，即便他的内心充满了疑虑：危机过后，他们将面对怎样的现实？为了拼凑这个支离破碎的国家，还要付出多少代价？而这一切……真的可能实现吗？"
 brazil_lacerda_imp.88.a: "他们究竟，还能走多远？"
 brazil_lacerda_imp.89.t: "风云人物"
 brazil_lacerda_imp.89.desc: "这张桌子，承载着全民盟的分量与广度。拉塞尔达环顾四周，皆是党内举足轻重的人物。在这个屋子里，他很清楚：若无法让这些人接受他的主张，那他的总统梦，恐怕会像晨雾般，在阳光初升前悄然蒸发。\n\n“诸位，”他沉声开口，“我们正站在历史的岔路口。虽然我们成功阻止了古拉特的选举作弊，但国家仍旧摇摇欲坠，一旦处理不当，便可能分崩离析。我们不是征服者，我们是人民选出来的代表。我们必须成为法治的楷模、秩序的灯塔。只要工党不违法，我们就绝不能先动手。”\n\n屋内一阵沉默，但已有几人点头应和，显然早已默默站在他这一边。他继续说道：“他们指望我们出手——甚至巴不得我们先出手。他们好借此向百姓证明，我们就是他们口中的刽子手、独裁者。我们绝不能掉进这个陷阱。”\n\n“人民渴望稳定，渴望一个理性而守法的政府。只要我们展现出这种姿态，人民终将站到我们这一边，而我们的胜利也将稳如磐石。届时，我们将被视作巴西民主的拯救者。”\n\n更多的点头随之而来，原本沉默寡言的面孔也露出几分笑意，被总统的诚恳说服。然而，仍有大约六分之一的面孔写满迷惘、恼怒，甚至带着一丝克制下的愠怒。他们不会明说，但他们从未真正信服拉塞尔达，更不信什么赦免。他们若得一丝机会，便会在冲动的怒火中亲手葬送巴西的未来。"
 brazil_lacerda_imp.89.a: "“马加良斯，告诉戈尔贝里，有几位，值得‘特别关照’。”"
 brazil_lacerda_imp.90.t: "总统有令"
 brazil_lacerda_imp.90.desc: "拉塞尔达步入房间，将军高喊“立正”。全体人员骤然起立，军靴砸向地面的声响犹如雷霆轰鸣，紧接着二十五只袖管甩动发出整齐的唰声——士兵们集体向最高指挥官敬礼。这番礼遇纯粹源于拉塞尔达的身份；若非总统之尊，他永远不会获得这样的仪式待遇。那些敬礼的姿势透着一丝敷衍了事的意味。拉塞尔达咬紧牙关，他深知必须运用职位赋予的权威发声，否则一切将徒劳无功。\n\n“先生们，我长话短说。”总统扫视着这群身兼要职的军官，“你们是为我国抵御内外威胁的守护者，而通过新颁布的指导方针，我们将更臻完善。虽然这是个重大变革，但这是总统的意志，更是国家利益所在。即日起，我将强化针对治安案件中军警行为的监管力度——”\n\n“禁止执法部门或军情机构在审讯或惩戒过程中使用酷刑——特批情况除外；秘密关押设施即日取缔；骚乱者与异议分子须获知所受指控，并建立可追溯的公开审查档案。逮捕行动必须基于确凿证据而非推理假设，所有案卷须包含可供内部监督调阅的完整佐证材料。违反者将面临严厉惩戒。”\n\n拉塞尔达凝视着波澜不惊的面容之海，试图捕捉谁会率先失态泄露真实想法。他逐一与军官们对视，用目光传递坚定不移的意志。或许他的权威仅来自职务，但这权威不容置疑。“诸君皆为具有职业操守的勇者，想必不会阳奉阴违，更不屑怯懦劣行。我期待各位严格执行并向下级传达这项命令——解散。”"
 brazil_lacerda_imp.90.a: "巴西的新时代已然到来。"
 brazil_lacerda_imp.91.t: "45号法令"
 brazil_lacerda_imp.91.desc: "巴西总统府特此颁布以下《公共安全特别法令》。\n\n鉴于总统府对社会民主党及巴西工党所发布之政策纲领深表关切，并认为其所持意识形态可能对巴西共和国的公共安全构成不容忽视的风险，然总统府亦重申，所有政党在出版及表达其政治主张方面，依法享有宪法保障之自由。是以，对于未意图危害个人或财产之该类出版物，国家将给予应有之尊重与保障。\n\n为维护社会稳定与国家团结，总统府特此指示全体联邦治安官：在卡洛斯·拉塞尔达总统就任前的过渡时期内，社会民主党与巴西工人党一般党员所涉及之轻微违法行为，若并未造成实质人身或财产损害，概不予追诉。此类行为多出于服从政党指令，依照“指挥责任”及“替代责任”原则，应由相关政党领导层承担其对国家与人民所犯之罪责。\n\n总统府亦进一步强调，凡违反本通令，或对两党成员上述时期之行为实施任何形式报复者，皆属扰乱军纪之行为，必将依“违抗法令”罪严肃追究。"
 brazil_lacerda_imp.91.a: "特此签署，[GetDateStringNoHourLong]"
 brazil_lacerda_imp.92.t: "外交事宜"
 brazil_lacerda_imp.92.desc: "“大使先生，感谢您这么快就接见我，”拉塞尔达说着，把美洲国家组织的外交官领到了他自己办公室的沙发上，而他本人则坐在面对大使的椅子上。\n\n外交官面无表情地注视着来回调整座位的拉塞尔达。“美洲国家组织对于维护该地区的稳定至关重要，巴西共和国感谢其在防止冲突中发挥的作用——”\n\n“感谢您的溢美之词，总统先生，”大使如期回复道，尽管他十分清楚，拉塞尔达言语中透露着虚伪。“有何力所能及之事，请总统阁下指示？”\n\n拉塞尔达叹息。“时局维艰啊，巴西国内的状况引起了……不少人的担忧。如果美洲国家组织能够在这个微妙的时刻帮助我维持美洲大陆的稳定，我将感激不尽。”\n\n而真相是，巴西近日的国内权力斗争激怒了不少民众，无论国内国外，拉塞尔达都急切需要援助，大使当然也领会到了他的言外之意。“当然，总统先生。我向您承诺美洲国家组织将会伸出援手，协助巴西度过这段时期。”\n\n拉塞尔达试着挤出微笑，他也非常清楚，大使并不打算让美洲国家组织给予最大的援助。"
 brazil_lacerda_imp.92.a: "伪笑和虚礼"
 brazil_lacerda_imp.93.t: "日记感想"
 brazil_lacerda_imp.93.desc: "今天召开了内阁会议，通报了当前的财政状况，并讨论了如何鼓励新企业的发展。\n\n收到驻美大使的来信，提到华盛顿方面在公开场合有所担忧，私下却给予政府相当的支持。\n\n圣保罗和里约的工会又开始蠢蠢欲动，传言将有罢工和停工行动。目前我们只能静观其变，还无法立即应对。\n\n随后又谈到了如何应对“瓦加斯派”的问题。\n\n我向内阁明确指出，当下局势极其微妙，唯有步步为营，绝不可贸然行事。一步走错，整个局势便可能土崩瓦解。\n\n部分部长仍坚持要采取强硬手段，主张对瓦加斯主义痛下杀手。他们不明白，为什么我们不能像当年旧政权对付我们那样，果断处理。\n\n我理解他们的愤怒，如果换作是我，也许同样会怒不可遏，恨不得一步登天、立刻清算。但我们不能这样，否则整栋大厦都可能顷刻倒塌。"
 brazil_lacerda_imp.93.a: "克制永远是最艰难的选择。"
 brazil_lacerda_imp.94.t: "分裂"
 brazil_lacerda_imp.94.desc: "“工党左翼应被立刻取缔？这他妈是什么鬼？”乔纳斯把通知分享给了桌旁的同志。“特此通告，所有人应停止与有关人士接触，以防参与颠覆国家活动……”\n\n“对此这就是我的态度！”阿诺尔多一把抢过乔纳斯手上的报纸，撕碎扔散在地上。“这个小暴君永远阻止不了我！”\n\n“我不清楚……”乔纳斯焦虑地搓着手指。“家里还有新生的子女需要照顾，我不确定是否还能承担这样的风险。也许彻底远离政治对我来说是更好的选择。”他身旁的几个人随即点了点头。当人无重担之时，做事往往毫无顾忌。\n\n“那就下次就叫你的老婆买两片尿布吧，一片给你，”阿诺尔多反驳道，嘲笑声从他身旁的支持者中传出，乔纳斯的脸涨得通红。\n\n“我觉得应该换一个新名字。这样就不会牵连到家人了。”塞尔吉奥提议道。“拉塞尔达想当然认为只有他一个人能利用媒体，等着吧。”\n\n“牛啊！”阿诺尔多咆哮道。“绝不妥协，工党从不干这样的勾当，要是工党擅长妥协我早跑其他地方去了。在我加入工党之初，我便坚定认为工党有着带领所有党员反抗拉塞尔达暴政的勇气。”阿诺尔多轻蔑地看着乔纳斯。“也许这便是我们挺身而出的时机。”"
 brazil_lacerda_imp.94.a: "“如果我们被当做罪犯，我们也会像罪犯一样行事。”"
 brazil_lacerda_imp.96.t: "你白刀子进……"
 brazil_lacerda_imp.96.desc: "日复一日，天复一天，分复一分，拉塞尔达治下的巴西已然成为了欲壑难填的野兽。总统不满足单纯对工党成员进行无休止的政治迫害，借助党内与军界支持者的帮助，拉塞尔达已将大手伸向了建制派左翼中的持不同政见者。\n\n在戈尔贝里将军的带领下，拉塞尔达政权几乎对左翼公开宣战，这不禁令人联想到约瑟夫·麦卡锡的所作所为。军队，科研与发展部，行政部；在政府内的所有地方，每一份单独的资料与档案都被搜查，以追查潜在的“颠覆分子”，无一人能够幸免于难。\n\n许多被拉塞尔达与戈尔贝里猎巫运动盯上的人被草草解雇，他们发现理由要么站不住脚，要么干脆凭空捏造。如果说过去的拉塞尔达坚持着程序正义的承诺，现如今可以说他将承诺完全抛之脑后，总统日益极端化的倾向连他的支持者们都不得不开始重视。\n\n以至于全民盟在巴西军队内的支持者都开始为拉塞尔达的行为感到担忧。而作为军队内最狂热的支持者，席瓦尔将军对总统滥用权力的行为表达理解，称其为“必要的牺牲”，这也导致军队内部产生了裂痕。越来越多的高级军官认为，拉塞尔达治下的巴西距离深渊只有一步之遥。\n\n更糟糕的消息接踵而至。由于全民盟对公共设施建设与科学发展部门的不断破坏，越来越多的巴西左翼人士表达了自1930年代未以来曾有过的不满。许多不满的左翼人士投入了路易斯·普列斯特斯的怀抱，加入了巴西共产党，这样曾经不可能的转变已慢慢变为了政治上的事实。"
 brazil_lacerda_imp.96.a: "……只可能“红”刀子出。"
 brazil_lacerda_imp.97.t: "对将领们讲话"
 brazil_lacerda_imp.97.desc: "“尊敬的各位将领，”拉塞尔达总统站在总参谋部将领们面前高声陈词，眼前这些制服上挂满勋章与金色穗带的陆海军将领们，正凝视着他们的新任统帅。“我们的国家即将发动一场圣战，清剿那些企图颠覆政权的势力——包括社会主义者、激进分子和马克思主义者。为了捍卫全民盟的新政纲，我们必须采取彻底而强硬的行动，将一切反对势力连根拔起。这项新政将为巴西带来经济、政治与社会的全面稳定。”\n\n“长期以来，巴西就像失去舵手的航船，在风雨中飘摇无依。我的新政府将力挽狂澜，让国家重回正轨，全速前进。只要铲除那些阻挡改革道路的障碍，巴西必将浴火重生——比历史上任何时期都更强大、更富庶、更团结！”\n\n“所有支持全民盟及其政府的有功之臣，你们获得的将不仅是物质回报，更是在国家危难之际力挽狂澜的无上荣光。携手并进，胜利终将属于我们！”\n\n将官们发出阵阵掌声，其中索邦派的军官最为狂热，强硬派将领虽然保持克制，但拉塞尔达心知他们已然归顺——即便这些人只是为了攫取财富或大开杀戒。只有零星几名护宪派将领如石像般沉默端坐，但拉塞尔达根本不屑一顾，他很清楚这些少数派很快就会被打入冷宫，或是登上退休名单。"
 brazil_lacerda_imp.97.a: "只要枪口仍对着敌人就行。"
 brazil_lacerda_imp.98.t: "无处不在"
 brazil_lacerda_imp.98.desc: "拉塞尔达在掌声中走上讲台，他不由得沉浸在这一刻的荣耀中。全体全民盟代表为他鼓掌，掌声之猛烈几乎震动了大楼的地基。无数只手发出的，却是一道雷霆之声。他向党人挥手，换来更热烈的欢呼——这都是为了他，为了总统。\n\n然而，他们不仅仅是来为他喝彩的。国会这段时间政令频出，全民盟更是展现出空前的团结，几乎全票通过了所有列入议程的法案。虽有几项关键议案遭遇象征性反对，那不过是少数议员出于个人立场的表达，拉塞尔达并不因此苛责。最终结果才是重要的：法案得以通过，他的领导地位也更加稳固。这一晚，属于他。\n\n而在会场外，茹阿雷斯·塔沃拉站在风口，望着那座灯火辉煌的大楼，心头却像压了一块石头。他忍不住嘀咕了一句：“他有没有注意到，那些空着的座位？”在他看来，全民盟已经变了，像是一群被驯服得服服帖帖的猎犬，党内几乎再听不到一丝不同的声音。塔沃拉和几位同样忧心的人坐在一起，他愤愤地点燃香烟，对着狂风吸了一口。\n\n“见鬼的拉塞尔达，”他咬牙低声说，“照他这么搞下去，巴西迟早会自己把国家送进共产党的怀里。他们甚至不需要动手，人民会主动奔过去，把那面红旗当成最后的庇护所。”\n\n“那我们怎么办，塔沃拉？”"
 brazil_lacerda_imp.98.a: "塔沃拉很想脱口而出：“拯救巴西。”但他不知道该怎么办。"
 brazil_lacerda_imp.99.t: "无论光明正大，还是卑鄙龌龊"
 brazil_lacerda_imp.99.desc: "“依总统令，鉴于前总统热图利奥·多内列斯·瓦加斯于其任内犯下多项政治罪行，现宣布如下决定：即日起，瓦加斯被永久剥夺一切政治权利——不得参与任何政党活动、不得竞选任何公职、不得为任何候选人背书或站台，媒体亦不得对其进行任何形式的采访。若有违令，将依法追究刑事责任。”\n\n瓦加斯放下手中那份官方声明，身子往长沙发一靠，忍不住笑了出来。拉塞尔达真的干了。这件事，他嘴上说了好几年，如今终于成了真。说到底，这也不能全怪对方——他自己早年那套独裁铁腕，也为今天的结局埋下了种子。一个曾经挥拳镇压异见、掐死反对派的前总统，如今被新掌权者用同样手段封杀，又有什么资格去喊冤？\n\n所以他唯一能做的，就只有苦笑。从现在开始，他将不再是政坛的棋手，而只是棋盘边的弃子。全国民主联盟再也无法把每一次失败都推给他这个“背后搞鬼的瓦加斯分子”。下次再出丑，他们就只能自己担责。当初他们急着赶他出厨房，那么等锅糊了、地板油滑、厨房起火——就别想再赖到他头上。\n\n幸灾乐祸是一回事，但在拉塞尔达注定崩塌的体制中，还会有更深远的后果。如今的他，被困在圣博尔雅的宅邸里，能做的事情不多。可如果还有点所谓的“总统风度”，那就不能让个人恩怨拖累国家的未来。哪怕他是个被彻底边缘化的政治废人，他也还有最后一点责任。或许他该打电话给普列斯特斯，放下面子，示好一番。毕竟，连曾经下令囚禁的政敌都能握手言和，那他还怕什么？"
 brazil_lacerda_imp.99.a: "世事荒诞，缘起荒诞之时。"
 brazil_lacerda_imp.100.t: "与老友的谈话"
 brazil_lacerda_imp.100.desc: "“总统先生。”\n\n“大使先生。”\n\n礼节性寒暄一结束，两人便相视一笑，随即落座。拉塞尔达与林肯·戈登先从各自家人的近况谈起。\n\n“当然，你今天来，不只是叙旧吧？”戈登大使点燃了烟斗，袅袅白雾氤氲在空气中。“我今天能为你做些什么？”\n\n“嗯，鉴于巴西当前的局势，我只是想了解一下华盛顿方面目前的态度。”\n\n“官方来说，美国政府仍在‘研究局势’，暂时保留评论。”戈登吸了一口烟，语气平静。“非官方的话嘛，你在各个层级上都有强有力的支持者，包括白宫、西议会山和兰利。特别是在《火线辩论》上，威廉·巴克利几乎成了你在美国最好的朋友。所以我可以很有信心地说——只要你需要，任何资源都会为你敞开。”\n\n拉塞尔达露出笑容：“既然如此，我确实有个‘购物清单’。特别是在下一次选举中，我希望争取到更多全民盟的支持，同时也要保障共和国在此期间的稳定。”\n\n戈登吐出一缕烟雾，随即从口袋里掏出一本笔记本，烟斗从嘴角移开。“那么——我们来谈谈细节吧。”"
 brazil_lacerda_imp.100.a: "有个身居高位的朋友真好。"
 brazil_lacerda_imp.101.t: "总统的职责"
 brazil_lacerda_imp.101.desc: "卡洛斯·拉塞尔达凝视着办公桌上的文件。他刚宣誓就职没多久，报告就已经堆得像座小山。警察和国内情报机构这些日子可没闲着——每份报告都详细记录了瓦加斯主义者的组织和个人活动，以及国家是如何着手打击他们的。拉塞尔达忍不住笑了。他心想，不知瓦加斯如果在天有灵，会作何感想，看着如今风水轮流转。那个混账当年最喜欢的事，就是把他那群“政治社会秩序部”狗腿子派出去，对任何稍稍对“新国家”咳嗽一声的人下手。要是鲁本斯·瓦斯少校还活着该多好——那颗子弹本是奔着自己来的，最后却由他替自己挡下了。拉塞尔达心想，要是鲁本斯看到自己如今替他讨回这笔血债，怕是得笑出声来。\n\n他摇了摇头，把心里的念头甩开。他是总统，不是沉湎幻象的幻想家。这些报告，安全部门自然会处理，他没理由沉迷于这些报复性快感。\n\n他肩上扛着国家的命运，不能一边想着清算一边治理巴西。\n\n他端起水杯喝了一口，按下内线按钮，不到一秒钟，秘书就回应了。“埃丝特，麻烦你把我今天要审阅的文件带进来，把我桌上的这些材料归档。”\n\n“好的，总统先生。还需要再来一杯咖啡吗？”\n\n“不用了，埃丝特。当总统，已经足够让我保持清醒了。”"
 brazil_lacerda_imp.101.a: "恶人永无宁日。"
 brazil_lacerda_imp.102.t: "回归常态"
 brazil_lacerda_imp.102.desc: "一切似乎正在回归正轨。总统悄然隐身，乘坐一辆没有任何标识的黑色轿车，帽檐压低，墨镜遮面。他不想被人认出——他只是想亲眼看看，这个国家现在是什么模样。拉塞尔达坐在车后座，望见四名士兵正拆除临时哨卡，将设备装进军用卡车，不禁对着车窗自顾地笑了笑。紧急状态结束了。敌人已经瓦解。而等民众从这场空前危机中恢复过来时，他们终将认清，是谁在最危险的关头带领共和国挺过难关。他们，只需要一点时间。\n\n一切终于恢复如常。两位邻居在街头开怀大笑——这大概是他们久违地为“玩乐”而出门。去那段日子里，家是唯一的避风港。除了买菜买药，他们甚至不敢碰门把手。如今，士兵撤离，枪声远去，空气中隐隐浮现出和平的气息。他们在街头打开一瓶香槟，泡沫飞溅，笑得像一对刚穿越沙漠、在废墟中找到绿洲的旅人。那笑声，起初只是对庆祝的模仿。但渐渐的，它剥落了表面的浮光，露出埋在深处的真实情绪——笑的是我们还活着；笑的是一切曾眼看着要崩塌；笑的是，原来连这些平凡琐碎的日常，都值得如此用力去珍惜。\n\n一切，终究回到“常态”。在库里奇巴，内伊·布拉加与茹阿雷斯·塔沃拉站在一旁，看着部队解散归营，心中却百感交集。的确，布里佐拉与普列斯特斯不应接近权力核心，但拉塞尔达这番所作所为——这真的是“拯救”吗？他几乎把国家撞进了深渊，为的只是让它别偏离正轨。这不是纠正方向，而是矫枉过正。就像一辆本已失控的汽车，为了避开悬崖急打方向盘，却狠狠撞上了对面的山壁。现在表面看似平静，实则依旧暗流涌动。两人都明白，他们也许没有太多时间。"
 brazil_lacerda_imp.102.a: "如今，只是稍稍松口气的片刻罢了。"
 brazil_lacerda_imp.103.t: "媒体轰炸"
 brazil_lacerda_imp.103.desc: "埃马努埃尔并不关心政治。他当然是一个爱国的巴西人，但他更在乎他的家人和生计，他看报纸只是随便翻翻，看看巴西利亚发生了什么，再看看世界舞台上又发生了什么。他每天坐公交上班的时候会拿一份看看，吃了晚饭后再拿一份看看，这样这一天的新闻就算看全了。今年年底就要大选了，埃马努埃尔知道，很快报纸上就只剩政治了。\n\n但现在才三月，他就看到了一大堆写那个全民盟候选人卡洛斯·拉塞尔达的文章，这些文章每天都充斥着他报纸的版面，更不要说电视上的轮番轰炸和街上的活动者了，他们承诺要安定国家，发展经济，漂亮话而已，他们还讲他如何在瓦加斯的独裁统治下从一个小记者一步步崛起，瓦加斯又是多么想要他的命。他们还把拉塞尔达说得好像是什么顾家好男人一样，说他不仅热爱他自己的小家庭，还热爱祖国的大家庭。面对法西斯暴政，他挺身而出，然后战胜了它们。\n\n没有多久，看着报纸和电视上成片累牍地报道拉塞尔达，埃马努埃尔渐渐地也开始有点支持拉塞尔达了。他看起来就是那个对的人，像是那种会以国家利益为先的爱国者，像是那种值得埃马努埃尔发自内心支持的人。"
 brazil_lacerda_imp.103.a: "然而，埃马努埃尔并不关心政治。"
 brazil_lacerda_imp.104.t: "升温"
 brazil_lacerda_imp.104.desc: "埃马努埃尔并不关心政治。但尽管他不关心政客的那点蝇营狗苟，他也明白巴西如今并不乐观。\n\n在瓦加斯时代，他还只是个孩子，他对那个时期的记忆虽大多是模糊的，他也能想起那时候的恐惧与疑虑，他会不由得想起街上巡游的警察和士兵，他会害怕他们突然闯进别人的家里，带走那些和考迪罗做对的人们。\n\n对于社会主义者们带来的混乱与恐慌，他也心知肚明，他们蔑视民主，想在巴西复活苏联，然后奴役所有人为他们的恐怖统治添砖加瓦，那也不见得比瓦加斯强。埃马努埃尔逐渐学会了看破那群鼓动者们那些光鲜的标语，那之后往往隐藏着真相，他们以花言巧语打动群众，然后颠覆国家。\n\n不论是在班车上看报纸，还是像现在这样看着电视，哪怕是厂长抽出空来和厂里的工人谈话，他都能从中看出端倪，从瓦加斯主义者和社会主义者们的宣传中找出真相。而真相就是，巴西只有一个人能够阻止威权主义和马克思主义的幽灵卷土重来，他就是卡洛斯·拉塞尔达。"
 brazil_lacerda_imp.104.a: "然而，埃马努埃尔并不关心政治。"
 brazil_lacerda_imp.105.t: "打破平衡"
 brazil_lacerda_imp.105.desc: "埃马努埃尔并不关心政治。但这并不代表他不会行使公民权利参加选举。毕竟，不管你关不关心政治，民主就是要人人都参与才行。所以他放下厂里的活来到投票站，行使他光荣的权利，将那一票投给那个能够挽救巴西于腐败和暴政的党和人。\n\n他走进社区中心，只见两旁都是身穿橄榄色军装的士兵，他能听见有人在外边叫喊着选举被操纵了，有假借死者名义投票的，还有人投了好几次，不绝于耳。埃马努埃尔只是摇摇头。当然，这不就是瓦加斯主义者和社会主义者的老把戏吗！他们以前怀着颠覆国家的狼子野心时，是如何赢下选举的呢？\n\n终于轮到埃马努埃尔投票了，他看了看选举人名单，而他要找的那个名字就在最上方，那就是卡洛斯·拉塞尔达。在选票上勾上他的名字，然后投进那庄严神圣的票箱里，最后满意离去，一切都是如此简简单单。\n\n那一夜，电视上满是有关虚报、贿选和歧视的指控与辩解，但埃马努埃尔和其他巴西人都明白，这不过是败者的哭喊罢了，他们操纵选举好从中得利的企图已经失败了。他知道，为了国家的福祉，正确的人选一定会当选的。"
 brazil_lacerda_imp.105.a: "然而，埃马努埃尔并不关心政治。"
 brazil_lacerda_imp.106.t: "征服者的小憩"
 brazil_lacerda_imp.106.desc: "经历无数演讲、照相，还被成百上千聚光灯对着烤了不知道多久之后，卡洛斯·拉塞尔达现在只想做的就是在一个凉爽安静的地方待着。他终于缩回自己家中办公室，已过凌晨三点，踢掉鞋子揉了揉脚趾，倚靠在椅子上。尽管疲惫不堪，他却没有一点睡意。\n\n简单的事实他已了然于心，但那背后千钧之重的意义仿佛要将他完全吞没。全民盟在国会两院都取得压倒性多数，甚至控制大部分州长职位，已然完全控制巴西。只要谈能保证党内团结，他就能颁布宪法允许内的任何法律，如此权威单是其规模就足以压垮任何人。如果他想，他就能成为瓦加斯和古拉特都梦寐以求的独裁者。\n\n但他不是那种人。他想着的是改变巴西，让它成为人人安居乐业的瑰宝。而巴西是自由国家组织的优秀成员，抵御感染无数人的共产主义和民众主义祸害，挺身面对把百姓敲骨吸髓的德日暴政。巴西是个闪亮的范例。\n\n巴西还能成就如此之多，他知道这值得为之奋斗。"
 brazil_lacerda_imp.106.a: "拉塞尔达在椅子上睡着了，梦到了未来，一直到天亮。"
 brazil_lacerda_imp.107.t: "后果"
 brazil_lacerda_imp.107.desc: "“……禁止外国观察家进入投票站……”\n\n一串汗珠渗出巴西大使的额头，这可不只是因为哈瓦那的外交部长开了窗户，让加勒比炎日的热流涌进屋而已。外交部长的语调依旧没有起伏，毫不掩饰其中的愤怒与轻蔑，继续朗读政府让他传唤的冗长外交抗议。\n\n “……以假票填满投票箱……”\n\n大使脑子里只想着额头挂着的那颗汗珠，只因其丝毫不动弹就让他倍感折磨，他必须得控制自己不去擦掉。\n\n “……反对党候选人被非法阻止参选……”\n\n那颗汗珠终于流下额头，落在眼鼻之间，然后是嘴唇上，最终从脸上滴下落在他的西装外套上。他每一点意志力都用来保持沉着。\n\n “……古巴政府特此谴责巴西合众国公然欺诈和选举腐败行为。”外交部长终于放下最后一页。“大使先生，望您能将此消息尽快转达巴西利亚方面。”\n\n大使起身，额头上滴下更多汗水。他尽力挤出一个礼貌的微笑接过一大沓纸，但笑得只像是一个打破窗户而被父亲大骂的小男孩。"
 brazil_lacerda_imp.107.a: "“收到，我会将信息转达贵国政府。\""
 brazil_lacerda_imp.108.t: "阴风自北来"
 brazil_lacerda_imp.108.desc: "鉴于其与即将举行的美洲国家组织投票息息相关，我们决定全文转载墨西哥执政党，即革命制度党全国执行委员会近期的声明。——巴西驻墨西哥大使馆\n\n“革命制度党谴责巴西共和国当下所谓的选举。这场选举充斥着卡洛斯·拉塞尔达、他的寡头和军方盟友以及险恶的外国势力所策划的公然舞弊与暴力，是对巴西人民意志的彻底违背。\n\n为了保护巴西工人和农民免受类似我国在波菲里奥时期所经历的帝国主义剥削，阻止类似韦尔塔统治下的军事独裁，并抵御一个激进的法西斯政权在美洲扎根，我国政府已承担起团结巴西人民朋友，共同对抗此威胁的领导角色。\n\n因此，我国政府以及‘韦拉克鲁斯协定’内所有成员国政府将要求美洲国家组织对巴西提出谴责动议……”"
 brazil_lacerda_imp.108.a: "革命制度党敢数落我们选举舞弊？可笑！"
 brazil_lacerda_imp.109.t: "《纽约时报》：美洲国家组织动议事与愿违\n谴责巴西的投票未能通过"
 brazil_lacerda_imp.109.desc: "巴西利亚电：显而易见，巴西政治近期的急剧转向令自由世界措手不及。这一点，在美洲国家组织成员国试图正式谴责总统卡洛斯·拉塞尔达及其军方支持者日益专制的统治，但最终陷入僵局一事中展现得淋漓尽致。\n\n拉塞尔达原本是以自由倾向的纲领当选总统，但如今却利用公众对巴西体制性腐败的不满，以惊人的速度打击其政治对手。从工党政客到自由派作家，越来越多的人士遭遇政治压迫和司法骚扰，而全民盟则进一步加强了对巴西本已脆弱的民主制度的掌控。\n\n美洲国家组织各成员国的代表团在美洲及全球范围内已对他们对巴西出现这种公然压制异议人士的反民主行径表示震惊。许多人将拉塞尔达的政权与已故独裁者热图利奥·瓦加斯的统治模式相提并论。然而有传闻称，美洲国家组织的一些领导人认为，相比其他更大的威胁而言，拉塞尔达可能是较轻的一个。\n\n最初由古巴驻美洲国家组织大使提出的谴责动议，得到了更多成员的呼应。然而，批评者指责美利坚合众国作为自由国家组织的主要领导者，却利用否决权否决了正式谴责全民盟政府的动议。至于美国此举究竟是由于太平洋上日本构成的威胁、欧洲纳粹的威胁，抑或仅仅是不愿扰乱长期以来地区联盟的稳定，目前仍属猜测。\n\n当被要求对此发表评论时，拉塞尔达总统将美洲国家组织的决定称作“一场外交上的胜利”。"
 brazil_lacerda_imp.109.a: "他这狗娘养的……"
 brazil_lacerda_imp.110.t: "决心"
 brazil_lacerda_imp.110.desc: "“本时段头条消息。美洲国家组织已就古巴对巴西选举的谴责动议完成投票。主席发表如下声明：‘1968年卡洛斯·拉塞尔达当选总统的选举过程看起来整体上较为透明、公正。虽出现的重复计票与选民身份识别号错误等记录问题，但基本为个别现象，并未对选举结果构成实质影响。其他方面消息，工党此前宣布的抗议选举结果的全国大罢工并未如期发生。罢工首日响应者寥寥，大量商家仍照常营业，不到一周，许多参与罢工者已陆续返回工作岗位，称经济压力巨大，渴望回归正常生活。’”\n\n布里佐拉怒不可遏地一巴掌拍在桌面上，这一击把老旧的收音机震松了，声音“啪”的一响便戛然而止。“一群懦夫！拉塞尔达让他的山姆大叔帮忙操控选举，美洲国家组织的这群跟屁虫都跟着附和！还有那些工人！敢做不敢当！”\n\n古拉特搓着双手，额头冒出清晰可见的汗珠。他从腰间掏出酒壶，拔开瓶盖，开始灌起酒来。不一会儿，古拉特咕咚咕咚吞咽烈酒的声音便在会议室里回荡着。喝完后，他漫不经心地将酒壶扔在桌上，空荡荡的金属壶砸在桌面上，声音尤为刺耳。“真是糟透了，这下我们手里什么牌都没了。”\n\n一旁的埃德娜·洛特在这一片混乱中，低声念起了祷词，随后轻轻地划了个十字架。她长长地吐出一口气，低声说了句“阿门”，随即以坚毅明亮的眼神直视着眼前的两人：“我们手里还有的牌比我们想象得要多。先生们，千万不要陷入绝望。发完脾气就得冷静下来。我们清楚自己的问题，让我们一起想办法解决。”"
 brazil_lacerda_imp.110.a: "失败是一种选择。"
 brazil_lacerda_imp.111.t: "一次性工具箱"
 brazil_lacerda_imp.111.desc: "全国各地，工党州长们在士兵押送下离开办公室，被驱赶上街头。两名军人押解一位流放者，外加一个塞满私人物品的纸箱——妻儿的相片、选区重要选民团体赠送的小纪念品、诸如牛顿摆和减压球之类的小摆件，所有物品都被冷漠地塞进同一个纸箱。政治生涯的残骸就这样被弃置街头，如同垃圾般被清运。\n\n多数州长沉默地接受命运。有人在幕僚面前发表徒劳的激昂演说，最终被警察打断。少数人不得不在刺刀威逼下前行，刀尖抵着后背以防他们驻足抗议。但这场政治清洗的戏码已然上演，全国人民都看在眼里。工党支持者的愤怒情有可原，但不安情绪远不止于此。温和派人士心知肚明：当某个政党仅因党员身份就能被取缔时，所有政党都岌岌可危。就连全民盟成员也担忧政治反噬——古拉特固然是威胁，但这般铲除异己的手段，无异于为除草而焚毁整座花园。\n\n内伊·布拉加听到了党内同仁的呼声。人们担忧这场政治清算会适得其反，拉塞尔达放逐工党成员非但不能遏制暴力，反而可能激化矛盾。这种过度反应只会导致国家进一步失控，如同以疯狂应对拉塞尔达的癫狂。\n\n风声渐渐传到那些质疑拉塞尔达行动的人耳中：布拉加已注意到事态。这位政坛元老虽未正式表态，但坊间始终流传着他的诘问：“此人除铁腕之外，就无他策可施了吗？”"
 brazil_lacerda_imp.111.a: "破晓初声。"
 brazil_lacerda_imp.112.t: "铁靴私囊"
 brazil_lacerda_imp.112.desc: "戈尔贝里站在桌前，拉塞尔达好好研究了将军的脸色。他的表情让拉塞尔达倍感陌生，上面带着怜悯，甚至有几分歉意。不得不说这样确实让拉塞尔达很不安，没有人是挂着这个表情来说好消息的。\n\n “怎么了，戈尔贝里？”\n\n “我的同僚们……”戈尔贝里看着很不自在，继续说着，“……请求您停止深入调查社进党。他们认为反腐清洗已经太过头了。”\n\n办公室陷入死一般的寂静，而拉塞尔达气得两眼血红。任何息怒的尝试都是徒劳的，他冲着戈尔贝里大发雷霆：“为什么？军方想要什么我全都两手奉上，我尽心救国救民，防止国家自我毁灭！而你那帮穿军靴的同事都有了全世界，还想着塞满自己口袋！”拉塞尔达现在站着上气不接下气，两手颤抖着。\n\n拉塞尔达看着戈尔贝里，觉得没必要再拿传话人撒气，“行，他们赢了。告诉你同事，他们和社进党不会被进一步调查了，”戈尔贝里默默点头，转身离开。\n\n拉塞尔达一个人在办公室里，两手托着脑袋。"
 brazil_lacerda_imp.112.a: "无能为力。"
 BRA_imperial_parasar_tt: "§R由于我们未能控制局势，罢工GUI将关闭。§!"
