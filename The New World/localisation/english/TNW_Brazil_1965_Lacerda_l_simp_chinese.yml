 brazil_lacerda_samba.93.t: "分裂的迹象"
 brazil_lacerda_samba.93.desc: "罗米工业公司\n圣保罗州西圣巴巴拉\n\n日期：[?global.date.GetDateStringNoHourLong]\n\n致全体员工的备忘录\n\n公司高层近期获悉二层员工间发生了一起冲突事件。经查证，此次事件源于员工间涉及不同政党及/或组织立场的政治性讨论。针对此次违反公司政策的行为，公司已对所有涉事人员采取了严厉纪律处分。\n\n特此提醒罗米工业全体员工：维护企业共同体和谐的重要性凌驾于一切职场分歧之上。公司对任何违背共同价值观的冲突行为一律采取零容忍态度，无论是否涉及政治立场，并将对持续不当行为实施包括停职以至解雇解雇在内的必要性处罚。 \n\n罗米工业高级管理团队"
 brazil_lacerda_samba.93.a: "不出所料。"
