 brazil_lacerda_samba.94.t: "“小人亦有高论”"
 brazil_lacerda_samba.94.desc: "在东南部以外的地方，大多党派的基层官员都乐意展开合作。有人说这是为了国家的进步，也有人是无意改变现状，毕竟一点风吹草动都可能害得一家人丢了饭碗。其中缘由多种多样，暂无定论，但在大瓦尔泽亚这里，情况截然不同。\n\n“他妈的，你小子敢肯定吗？”卡洛斯咄咄逼人地指着手下的实习生，他衬衫的纽扣上都覆着一层汗水。迈克尔严肃地点了点头。“我能肯定，他们声称修建大坝会加重预算负担和通货膨胀，鱼类数量也会——”\n\n卡洛斯冷笑道：“扯淡！全民盟的犊子们还关心上小鱼了？”实习生疑惑地看着领导，卡洛斯则稍稍平复了一下心情。“孩子，我知道你是新来的，所以听好了。我们干一份活儿领一份钱，绝不会为了几条鱼去改好几版方案。”\n\n迈克尔把目光从卡洛斯的身上移开，望向了走廊，然后又移了回来。“……先生，您确定这话没问题吗？我们的工作……难道不就是调研提案吗？”他握紧了手中的钢笔，那上面还印着一所本地大学的校徽。\n\n卡洛斯忍不住地再次笑出了声。“小子，这儿只有两类人。第一类人为了份稳定的工作忙得不分白天黑夜，第二类人则投了个好胎，轻松走马上任。”他指了指电话。“全民盟的那帮人也一样。鬼知道他们要干什么，或许只是太想进步了吧。但说实话，你看还有谁会这么做呢？”"
 brazil_lacerda_samba.94.a: "巴西官僚主义的大山逐渐崩塌。"
