 brazil_lacerda_samba.36.a: "Placeholder"
 brazil_lacerda_samba.37.t: "逃跑计划"
 brazil_lacerda_samba.37.desc: "“平托先生？”他的秘书把头伸了进来，她的脸上带着不安的笑容：“纳特尔先生的电话。”平托有些困惑地皱起了眉头，他低下头，看着电话机闪烁的灯光，还是拿起了话筒。\n\n“平托，我的朋友！”那确实是劳多·纳特尔，他热情得有些过头了。“你们家最近过得怎么样啊？”\n\n“很好，劳多。玛丽亚也好吧？”\n\n“一切顺利，谢谢你。实际上，我们从伊比利亚回来了。我们在那里处理了阿德马尔最后的几件事。”\n\n“嗯……”一些想法浮出了平托的脑海，让他咬紧了牙关。他下意识地怀疑了起来。“你是怎么处理的？”\n\n“嗯。”平托仿佛已经隔着电话线看见劳多脸上的假笑是怎么消失的了。“我就直说吧，马加良斯：很糟糕。没有人知道他们还想从这个党里得到什么。老牛走了以后，异议弥漫在我们的同僚之间。他们认为小瓦加斯只会让他们在下次大选中一败涂地。”平托的思路逐渐清晰，他直起身来。“至于我？啊，我一直在忙着工作。就比如说，我正在办公桌前看着一张张的清单。内部选举，地方显要的电话号码，成员名单……”\n\n平托恍然大悟，直截了当地说：“你们的党务资料。”\n\n电话那一头顿了一下：“我希望比这更高的回报，平托，先收款再交货的那种。我也不希望任何人知道。我过会再打电话给你。”电话挂断了。平托放下话筒，深吸一口气。他从桌前站起身来，赶去找他的秘书。"
 brazil_lacerda_samba.37.a: "“告诉所有人，我们抓住社进党的七寸了。”"
 brazil_lacerda_samba.38.t: "平托的提议"
 brazil_lacerda_samba.38.desc: "全民盟各派领袖齐聚在国会的一间会议室内，围坐在胡桃木会议桌旁的黑色皮椅上。他们小心翼翼地隔绝外界的视线，讨论一项不容外人知晓的交易。这是一位来自社会进步党的异见者提出来的。但马加良斯·平托另有打算。他与另一位人物联系密切，那个人能够提供更优厚的条件，代价也更公平——\n\n“不，不，不。绝对不可能。”拉塞尔达的话如霰弹般喷出。“我绝不会和瓦加斯做交易。”\n\n“小瓦加斯可不是他父亲。他是个值得尊敬的党派领袖，知道我们的行事规则。”平托双手交叉，放在桌上。“而且，他开出的条件比阿德马尔那个清洁工要好得多。”\n\n“拉塞尔达总统，”塔沃拉开口道，“如果我们接受这个交易，参议院几乎就是我们的囊中之物。1970年，我们可以轻松获胜。而且他们并没有要求改变政策，也没有要给小瓦加斯安排什么优厚的内阁职位。”\n\n“不，他们只要求贿赂。这糟糕得多。”拉塞尔达推了推眼镜，揉了揉鼻梁。“哎呀，你们为什么会觉得这种事可以接受？”\n\n拉塞尔达的目光猛地转向坎波斯。“这是个问题重重的交易，可能会出很多岔子。我们的基本盘……可能无法理解。”但在他担忧的言辞下，他可以看出坎波斯的脑海中已经开始构建合理化的理由。最后，拉塞尔达将视线转向了拉斐尔·马加良斯，无声地祈求着某种支持。然而，他得到的只是一个带着几分窘迫的耸肩。\n\n他鄙视地扫视了所有人一圈。“无论你们打算干什么，我都不会参与。你们根本就不该做这种事。”拉塞尔达猛地从椅子上站起，没再多说一句，转身离开了。"
 brazil_lacerda_samba.38.a: "但他终究没有直接说不，为此他羞愧不已。"
 brazil_lacerda_samba.38.tt: "至少§Y50%§!的$BRA_party_psp_c$参议员将§G始终§!投票支持我们。"
 brazil_lacerda_samba.39.t: "塔沃拉的认可"
 brazil_lacerda_samba.39.desc: "全民盟各派领袖齐聚在国会的一间会议室内，围坐在胡桃木会议桌旁的黑色皮椅上。他们小心翼翼地隔绝外界的视线，讨论一项不容外人知晓的交易。这是一位来自社会进步党的异见者提出来的。但马加良斯·平托另有打算。他与另一位人物联系密切，那个人能够提供更优厚的条件，代价也更公平——\n\n“我们应该接受这个提议。”塔沃拉说道，“劳多他人还不错，只是交友不慎。我建议我们给他所需的支持，帮助他摆脱小瓦加斯那帮人。”\n\n但拉塞尔达冷笑了一声。“如果他真的愿意，他随时可以递交加入全民盟的申请。可现在，他想要被我们收买，而你们居然都对此表示同意？”\n\n平托本想回答“这就是政治”，但他对拉塞尔达足够了解，知道这话绝非明智之选。于是，他交叉双手，将它们放在桌上。“总统先生，我们眼前有一个真正的机会。三天内，我们就能彻底铲除瓦加斯主义最后的残余。”\n\n拉塞尔达环顾四周。坎波斯似乎是唯一反对这项提议的人，但即使是他也保持沉默，只是在恼怒中几乎要把牙齿咬碎了。而其他人显然都表示同意。就连拉斐尔·马加良斯也给出了默许的点头，尽管他的神情中透出几分不安。\n\n“好的，”他低声咕哝道，“好吧，好吧。打电话给他，做安排。但别让我再参与这事。”\n\n话音落下，会议室迅速恢复了寂静。坎波斯一句话没说就走了出去。平托点了点头，塔沃拉则微笑着表示感谢。最后，只剩下拉塞尔达和他忠实的拉斐尔·马加良斯留在房间里。等到四下无人，拉塞尔达摘下眼镜，擦拭干净后，带着一抹不安的目光看向马加良斯。"
 brazil_lacerda_samba.39.a: "“这可不是我踏入政坛的初衷。”"
 brazil_lacerda_samba.39.tt: "至少§Y15%§!的$BRA_party_psp_c$参议员将§G始终§!投票支持我们。"
 brazil_lacerda_samba.40.t: "马加良斯的谋划"
 brazil_lacerda_samba.40.desc: "全民盟各派领袖齐聚在国会的一间会议室内，围坐在胡桃木会议桌旁的黑色皮椅上。他们小心翼翼地隔绝外界的视线，讨论一项不容外人知晓的交易。这是一位来自社会进步党的异见者提出来的。然而，这个提议在会议桌上遭遇了不少质疑。\n\n“所以，你的意思是，社进党现在沉得比泰坦尼克号还快？”\n\n“事情稍微复杂一些，马加良斯先生，但差不多就是这样。”\n\n“很好。”他转向拉塞尔达。“别管劳多了。他不过是只想逃离沉船的老鼠，为了自己能弄条救生艇，就想让我们出卖根本原则。”\n\n“同意。”拉塞尔达说道，他怀疑的目光始终没有离开显得有些局促的平托。“我不会和小瓦加斯打交道，也绝不会诉诸腐败。然而，”他的话语稍稍柔和了一些，目光转向马加良斯，“你是不是有什么计划？”\n\n“确实有。”马加良斯说道，语气让拉塞尔达感到些许不安。“社进党里还是有一些好人的，那些能认同我们立场的人。比如小若昂·卡费。如果社进党真的快完蛋了，我们是不是该准备好救生艇，把那些值得救的人接上来？”\n\n“小若昂·卡费？还是瓦加斯的副总统？”马加良斯试图压低声音。\n\n“比小瓦加斯更通情达理，这点我可以肯定。”拉塞尔达没有再说什么，但向马加良斯点了点头。会议随之结束；与会者纷纷收拾起自己的文件和各自的野心，留下拉塞尔达独自沉思。"
 brazil_lacerda_samba.40.a: "他依然不确定，这是否只是自欺欺人。"
 brazil_lacerda_samba.40.tt: "至少§Y25%§!的$BRA_party_psp_c$参议员将§G始终§!投票支持我们。"
 brazil_lacerda_samba.41.t: "坎波斯的要求"
 brazil_lacerda_samba.41.desc: "全民盟各派领袖齐聚在国会的一间会议室内，围坐在胡桃木会议桌旁的黑色皮椅上。他们小心翼翼地隔绝外界的视线，讨论一项不容外人知晓的交易。这是一位来自社会进步党的异见者提出来的：金钱换取支持。这显然是一场腐败的交易，但或许也会是一笔划算的买卖。\n\n“公开它。”简短的两个字让房间里的空气瞬间凝固。所有人都转头看向米尔顿·坎波斯，而他只是直视着众人。\n\n“公开？这事是他私下告诉我的！”平托突然发现自己已经站了起来，但他并不觉得有必要坐下。\n\n“你别再说了。”坎波斯转头看向拉塞尔达，而后者已经倾身靠向桌子，双手交叉，目光牢牢锁定在坎波斯身上。“去找媒体。告诉他们你从可靠消息源得知，腐败的社进党正在崩溃。他们试图贿赂你，为了换取支持。可你拒绝了。”他用手指轻轻敲了一下桌面。“这会让我们看上去更光明磊落。”\n\n“劳多会立刻回到小瓦加斯那边！”平托急声说道。\n\n“那就让他去吧。”拉塞尔达冷冷回应。“我为什么要在意？社进党根本没有足够的席位对我们构成真正的威胁。而且，各位先生，请记住，我们当选的初心，是为了维护政府中的某种美德。”他向坎波斯点了点头，随后保持沉默。几天后，当第一批报纸送到时，拉塞尔达开始后悔这个决定。他的谴责淹没在社进党的反击声中，而社进党的团结远远超过平托的预估。有些报纸甚至以小瓦加斯的大幅照片占据头版，而拉塞尔达那张略显疲惫的脸则被挤到不起眼的角落。他不断告诉自己这是正确的决定，但心中的疑虑却挥之不去。"
 brazil_lacerda_samba.41.a: "倔强的乌鸦逆风飞行，终究还是拖慢了自己。"
 brazil_lacerda_samba.41.tt: "$BRA_party_psp_c$将§R再也不会§!投票支持我们。"
 brazil_lacerda_samba.42.t: "[GetYear]年水电翻新法案"
 brazil_lacerda_samba.42.desc: "粗略观之，这项提案与全民盟的固有形象格格不入。它主张在全国范围内扩建水电设施，由国家主导水电工程全周期建设，痛陈基建领域积弊唯有政府介入方能肃清。当维尔吉利奥·塔沃拉以肃穆语调开启耗时一小时的演说时，这种“合理扩展国家主导经济活动”的论调，正从其唇齿间倾泻而出。\n\n塔沃拉目光逡巡于议事厅，在左右顾盼间丈量政治支持的疆域。他声线清越却言如排演，真正心力皆灌注于评估各方反应。工党议员们戴着冷若冰霜的漠然面具，但嘴角的抽动与瞳孔的震颤泄露了惊喜；社进党议员们则悠然颌首，乐得展现开放姿态。\n\n社民党阵营弥漫着不以为然的气息。他们或抱臂蹙眉，或佝偻僵坐，肢体语言筑起无形藩篱。某位议员嗤笑出声，虽未能打断演说，却足以令塔沃拉将其划出谈判名单。\n\n最诡谲的涟漪涌动于本党席次。塔沃拉以目光为刀，剖解着同僚们的情绪光谱：务实派稳若磐石，波萨诺瓦派一面附和一面酝酿妥协，乐队派在法案条款中挑拣着肥肉与软骨。最令他如芒在背的是历史派元老——那些瞳孔里跃动着嗜血光芒的守旧者，将他的提案视作你死我活的宣战书。"
 brazil_lacerda_samba.42.a: "全民盟一直以思想自由和政治多样性为傲。"
 brazil_lacerda_samba.43.t: "无所谓了"
 brazil_lacerda_samba.43.desc: "塔沃拉与拉塞尔达分坐长桌两端，十二名议员与幕僚如楚河汉界般将两人隔绝在两米开外。若非这些屏障，他们几乎要扑向对方扼住彼此咽喉——但双方随从不断提醒：促成这场会面的并非个人恩怨，而是全民盟内部权力格局使然。\n\n“平托的幕僚昨天送来这个。”塔沃拉举起厚重文件夹，经人链传递至拉塞尔达手中。后者快速翻阅前几页：原本聚焦关键地区水电基建以维护电网稳定的法案，已被平托与工党联手改造成强调民生福祉，要求全国大兴土木的版本。\n\n“见鬼。”拉塞尔达合上文件怒目而视，“早就知道是个馊主意，可没想到平托居然和工党沆瀣一气。”他指尖敲击着封面，“说吧，这可是你的法案，打算怎么收拾局面？”\n\n塔沃拉咬住舌尖压下愠怒，挥退欲劝解的幕僚。“还有一个办法。明天直接将我的原案送往参议院表决，抢在平托的版本面世前。需要争取安德拉德、穆勒等社民党人的支持，他们开价可比布里佐拉派公道。”\n\n拉塞尔达揉着太阳穴凝视文件扉页。平托已窃走支票簿，正在挥霍可能要他买单的信用。当他终于抬头时，嗓音里尽是倦意："
 brazil_lacerda_samba.43.a: "“联系社民党。别开出让人后悔的条件。”"
 brazil_lacerda_samba.43.b: "“稍安勿躁，塔沃拉。不妨先谈谈你的法案。”"
 brazil_lacerda_samba.43.c: "“你做得够多了，塔沃拉。后面由我接手。”"
 brazil_lacerda_samba.44.t: "支持合理计划"
 brazil_lacerda_samba.44.desc: "拉塞尔达提前四小时抵达办公室，深陷积压如山的公文时叩门声响起。晨光未露的凌晨时分，他本欲处理公务，可不速之客已至。\n\n“进。”他掷笔于案。台灯照亮维尔吉利奥·塔沃拉神采奕奕踏入的身影，手中的文件夹令拉塞尔达瞬间了然。\n\n“总统先生，”来客语带戏谑，“这么早就来办公？”\n\n“起早贪黑，心头踏实。”他倦怠摆手示意落座。塔沃拉将印有猩红“批准”字样的文件夹压在那叠信函上。拉塞尔达翻开扉页，法案纲要与旧版相差无几。\n\n“法案即将送抵参议院，仰赖同僚们的鼎力支持，终于顺利过关。”塔沃拉笑意盈盈，却见总统眯起双眼。“此乃明智之举，总统先生。本法案关乎民生大计，尤其利好我党选民的福祉。”\n\n拉塞尔达抬眸审视。这家伙定是彻夜守候，专待他现身便来邀功。“挺好，”他将文件夹掷回桌面，“参议院可有你的援手？”\n\n“正打算和您商量这件事。您看，若是有足够支持，法案必将大放异彩……”他刻意留白，静候总统接茬。"
 brazil_lacerda_samba.44.a: "“支持你没问题，但这个人情欠下了。”"
 brazil_lacerda_samba.44.b: "拉塞尔达把文件夹滑到桌子另一头：“我只有一点笔记，塔沃拉。”"
 brazil_lacerda_samba.45.t: "混音与母带制作"
 brazil_lacerda_samba.45.desc: "法案行至生死攸关的隘口。当众议院的一记记赞成票剥开蛹壳，这只蜕变中的法案即将破茧飞入参议院。党内虽弥漫着大体认同的氛围，多数同僚对其宗旨与手段颔首称是，但塔沃拉本人却被悄然放逐——提案一周后，他彻底沦为局外人。某日误入会议室时，满室政策顾问与议员正热议法案细节。有人向他挥手致意，他拾起某位如厕议员遗落的文本。\n\n这曾是他的法案，却被乐队派用上百处修订凌迟。手写修正案如粗鄙刀痕，红黑批注似脓血淤青。他们剔骨削肉至塔沃拉几欲不识。他将文件摔回桌面，近乎失态地冲出议事厅。疾行于长廊时，某种未名的渴望在胸腔鼓胀，直到瞥见空无一人的衣帽间——他闪入幽暗，在呢绒与皮革的褶皱间吞吐气息，试图平复雷鸣般的心跳。\n\n他心知如此形态的法案仍能过关。有乐队派背书，半数派系（包括己方）将乖乖就范，其他党派亦会半推半就。经拉塞尔达的剔骨刀雕琢后，它已成为一份理智而务实的法案。但塔沃拉无法抑制内心贪求——这本该是为故乡巴西一隅谋福祉的良机。\n\n更何况，这曾是他的法案。"
 brazil_lacerda_samba.45.a: "但他选择放弃，希冀自己的同意能换来一份人情。"
 brazil_lacerda_samba.45.b: "于是他离开衣帽间，径直走向拉塞尔达的办公室。"
 brazil_lacerda_samba.46.t: "装订法案"
 brazil_lacerda_samba.46.desc: "今日众议院迎来塔沃拉水电扩建法案的终局表决，结局扑朔迷离。全民盟内部如常陷入漩涡，同党议员赞成与反对势均力敌；工党放任少数议员投出赞成票，此刻懊悔未加码支持；社民党分裂程度不遑多让；社进党因未被征询意见，或投反对票泄愤，或作态支持以博眼球。\n\n坐镇议事厅后排的米尔顿·坎波斯冷眼旁观这场闹剧。其他派系在漫长斡旋中支离破碎，历史派却悄然收编游移分子。当计票临近尾声，他们成为最后亮剑者。\n\n坎波斯抬手示意，麾下议员如提线木偶般整齐起立。随着齐刷刷的反对声浪，议长宣布法案流产的刹那，他嘴角扬起胜利者的弧度。\n\n“那个老僵尸！”——这是塔沃拉闻讯后的第一声怒吼。虽未失态砸物，但送信的助手坚称瞥见他攥紧了满筒铅笔。屏退众人后，他深陷椅背咬紧牙关：法案未夭折，只是遭遇路障。坎波斯能得手全凭利用本党分裂。只需重整旗鼓再战，届时对方将无计可施。但突破口何在？他如解九连环般反复推演着困局。"
 brazil_lacerda_samba.46.a: "工党是否后悔？塔沃拉致电他们，提出了新的提议。"
 brazil_lacerda_samba.46.b: "他放下自尊致电拉塞尔达，乞求后者出手相助。"
 brazil_lacerda_samba.46.c: "他向拉塞尔达下达最后通牒：要么法案过关，要么他辞职走人。"
 brazil_lacerda_samba.47.t: "塔沃拉公爵的请愿者"
 brazil_lacerda_samba.47.desc: "塔沃拉听到消息时，他几乎无法抑制脸上的笑容。参议院已经通过了水电翻新法案。现在，官僚们已经开始为新部门和规划委员会的成立铺路，准备监督全国范围内这些日益老旧的水坝建设和翻修工作。庆祝派对和酒水会稍后举行；此刻仍是下午早些时候，塔沃拉还有许多工作要做。\n\n下午一点十二分，第一通电话打了进来。电话中满是对法案的祝贺和对塔沃拉的赞扬。他假装认出了其中一些声音，也确实对某些人一听便能辨认无误。电话那头是一群东北地区的名流，纷纷向他表达敬意，同时隐晦地寻求从这块新蛋糕中分得一杯羹。有些人直接开口请求，毫不避讳；另一些则显得更加委婉，轻描淡写地询问，同时表达愿意为塔沃拉的新部门提供帮助的意愿。\n\n“当然，我不能承诺什么，”他总是这样回答，“但我非常感激你们的关心。这样吧，我们找个时间一起吃顿晚餐，到时候再讨论细节，怎么样？”每次如此答复后，他的秘书便不得不在已排满的日程中挤出空档来安排这些聚会。到了一天结束时，塔沃拉几乎没有空闲的晚上了。\n\n然而，这些并不是他接到的唯一电话。尽管秘书尽职尽责地试图筛选来电者，仍有一些普通市民成功突破了层层阻隔。每隔五六个电话，塔沃拉就会接到一通来自普通民众的来电。有些人担忧建设可能对附近的房屋，尤其是自己的家，造成影响；另一些人则对扩建项目能够为更多人，特别是农村居民，带来电力福利表示感激。对于这些电话，塔沃拉显得不那么自信。他对那些感激他的人表示欣慰，而对那些不满的人则匆忙应付。一天结束时，塔沃拉从办公室探出头来。"
 brazil_lacerda_samba.47.a: "“能让他们帮我换个号码吗，亲爱的？”"
 brazil_lacerda_samba.48.t: "这是我的党派吗？"
 brazil_lacerda_samba.48.desc: "这场派对本是为塔沃拉准备的，毕竟上面还挂着一个“祝贺塔沃拉”的标语。然而塔沃拉本人却显得既尴尬又格格不入。他手中拿着半满的香槟酒杯，感到自己被忽视。议员们和党内的贵宾们只在自己的小圈子里低声交谈，偶尔才停下来和他寒暄几句。哦，水电翻新法案已经签署了，官僚们很快就会忙着从头建立新部门和规划委员会。但如果旧的大坝仍在运行，委员会就不会开会讨论新大坝的事。这个部门的重点将是现有设施的维护。对塔沃拉来说，法案仿佛一首久远的歌，记忆已然模糊。\n\n当晚，全民盟办公室的真正中心并不是法案的作者，而是它的编辑。卡洛斯·拉塞尔达坐在桌边，手中拿着一杯四分之一满的香槟，正与他的议员和助手们交谈。他首先感谢了他们在法案理顺过程中所做的贡献，塔沃拉从角落里听见这些对话。他喝了两杯后，最终决定去找他的合伙人，那个在这场混乱中起到关键作用的人。\n\n“维尔吉利奥，”拉塞尔达拍了拍塔沃拉的肩膀，“干得好。”他带着塔沃拉走进了办公室的一个门厅，远离人群喧闹的地方，隔着门扇，嘈杂的谈话声渐渐消失。\n\n“我应该感谢您，总统先生。是您让它通过了参议院。”\n\n“而你才是提出法案的人。别这么谦虚，塔沃拉。你只需要一点方向感，仅此而已。”拉塞尔达的手从塔沃拉的肩膀上落下，空气中笼罩着一片尴尬的沉默。几秒钟后，他打破了沉默：“好吧，还是回去参加派对吧。还有几个人我想让你认识一下。新规划委员会主席的候选人。”拉塞尔达转身，朝派对走去。"
 brazil_lacerda_samba.48.a: "塔沃拉默默跟在后面。"
 brazil_lacerda_samba.49.t: "力量之地"
 brazil_lacerda_samba.49.desc: "“朋友们，同胞们，全民盟曾向你们承诺过灌溉农田的清水与点亮家园的电力，如今我们兑现了诺言。在上帝庇佑下，这座雄伟堤坝将永远护佑本州沃土免遭干旱之苦。”\n\n维尔吉利奥·塔沃拉站在演讲台上，身后巍峨的混凝土堤坝让他恍若置身群山环抱。这种被守护的感觉令他心安。此刻他们身处瓜达卢佩市以西数公里处，身后正是新落成的博阿埃斯佩兰萨水电站。即便站在坝体外，依然能听见涡轮机组的嗡鸣与泄洪道奔涌的水声。虽然麦克风将他的声音传遍全场，但轰鸣始终如低音和弦般在话语下涌动。巴纳伊巴河的激流正通过管道与轮机，在重力作用下转化为源源不断的电能。\n\n“但这项工程绝非为博取选票的权宜之计。我们踏上这条征程，只为兑现承诺，践行镌刻在国旗上的立国箴言——秩序与进步。全民盟唯有以赤诚之心恪守此道，方能不负人民重托。”\n\n彬彬有礼的掌声为演讲画上句点，最后几个音节淹没在相机闪光灯的海浪里。他走下讲台步入人群，与民众握手寒暄，展现着亲民风范。这座水坝如同之前与之后的诸多工程，为塔沃拉赢得了如潮赞誉。作为项目发起者，他让巴西东北部的百姓切实受惠。而在他眼底跃动的，是对这项事业发自内心的热忱。或许有人会将筑坝之举贬为收买民心的伎俩，但这里是他真正的故乡——比起如今经商居住的都市，生于斯长于斯的他更觉东北部的土地亲切。此刻收获的掌声来自血脉相连的同胞，这份认同令他格外珍视。"
 brazil_lacerda_samba.49.a: "乡土之子回馈着他的故土。"
 brazil_lacerda_samba.50.t: "掌控地区"
 brazil_lacerda_samba.50.desc: "“女士们先生们。值此《水电翻新法案》生效一年之际，我自豪地向各位宣布——东北部所有水电站发电量已提升32%。我们在电力匮乏地区新建的水电站，更使东北地区供电覆盖率提升40%。本届政府始终将贫困民众的民生需求与财政预算相统筹：既保障赤贫农户及其耕地获得生存必需水源，又未给财政增添额外负担。”\n\n拉塞尔达身后巨幅背景照片是米纳斯吉拉斯州的富尔纳斯水坝。这座既不新颖、地理方位亦不吻合的水利工程，在场无人质疑其地域错置。混凝土堤坝的雄浑线条与整齐排列的输水管，已为所有与会者构筑起足够具象的认知图景——水流被驯服、加工、释放，如同驾驭猛兽。\n\n“水资源是基本人权，是维系生命的根基。我荣幸能推进这项惠及全民的水利工程，期待未来继续向诸位汇报水电修复委员会的丰硕成果。”\n\n记者提问环节多是关于工程成效的温和质询。某家不入流小报的记者追问东北部新水坝建设进展时，这位政客选择避而不答。财政预算未列支的项目不宜妄言，他深谙此道。提问记者却想起东北故乡的亲人，此刻仍倚靠着老旧的发电机度日。"
 brazil_lacerda_samba.50.a: "真是明智的治理思路。"
 brazil_lacerda_samba.51.t: "新瓶装旧酒"
 brazil_lacerda_samba.51.desc: "巴西迎来了新的黎明，至少对米尔顿·坎波斯而言是如此——他依旧如往常一样，待在办公室里，谋划着未来。全民盟的步伐正在稳步前行，这一点对他来说并不陌生。桌面上堆满了报告、文章和文件，其中一些已经静静躺了几个月。国内的局势风平浪静，似乎没有什么值得担忧的，眼下不必担心会掀起什么风浪。\n\n然而，救赎的机会前所未有地清晰。墙上挂着一张1950年的竞选海报，上面写着“为准将投票”字样。戈梅斯的遗产如今早已湮没，皱巴巴的海报也已破旧不堪。但如今，凭借党内掌握的底牌，那些曾在十年前窃取他们第二个任期的激进分子和共产主义者，可以轻易地被一笔抹去。\n\n坎波斯开始幻想，记者们将如何描述戈梅斯的救赎，他的冤屈得以洗清，党派迎来重生，恢复到应有的模样。更新的国家安全体系，将彻底清除那些共产主义渣滓——无论是通过禁令还是依靠军队的力量。部长们将拥有对军事事务的最终否决权，坚决维护武装力量的利益，危险的异见分子交由军法审判，且与美洲国家组织保持一致不再是表面上的形式，而是从法律层面得到落实。\n\n与准将的频繁会晤，和志同道合议员们的接触，当然，还有几个月来的精心策划，一切都指向了这一刻。是时候吹响号角了——全民盟的守旧派并未死去。"
 brazil_lacerda_samba.51.a: "历史派必须受邀参与这场国家的桑巴舞。"
 brazil_lacerda_samba.52.t: "用繁文缛节对付红色势力"
 brazil_lacerda_samba.52.desc: "“感谢你主动联系我，米尔顿，尤其是在你完全没有必要这么做的情况下。”塔沃拉一边笑着，尽管笑容看起来正式，却毫无友善之意，身体语言也完全没有表现出一丝感谢之情。“不过我得说，接下来两个小时里，我至少有五件事要处理，所以我们还是长话短说吧。”\n\n他们站在副总统办公室的前厅，办公室的主人正翻阅着几个小时前塔沃拉递给他的文件夹，严肃地审视着用红笔标出的句子。“通过禁令和部署军队来清除共产主义渣滓。”坎波斯点了点头。“让军事部长对军务拥有否决权，把异见分子交给军法审判。彻底废除洛特法案。”\n\n在塔沃拉述说这些内容时，这位前律师似乎被触动了，他愤怒地喊道：“我们还能怎么确立我们所坚持的原则，塔沃拉先生？瓦加斯的法团主义狂潮已经持续得太久了，如果我们不把它撕得粉碎，他们就会窃取巴西的未来！唯一能与这些共产主义恐怖分子对抗的，只有军队。如果加强军队意味着撕毁社民党-工党的法案，那简直再好不过了！”\n\n“好吧。”塔沃拉说，“我手头的事很多，祝你好运。”副总统眼神恢复正常后，迅速走出了房间。\n\n当他在众议院发表类似言辞时，议员们的低语声从“疯子”到“爱国者”不等，但显然尚未达成一致结论。至于具体政策方面，反应更为复杂且模糊。无论气氛如何，结论始终未明，历史派的国家安全法案，最终掌握在全民盟手中。"
 brazil_lacerda_samba.52.a: "这将是一次漫长的国会会议。"
 BRA_national_security_acts_boost_tt: "§Y拓展§!$BRA_national_security_act_law_0$将§G更为容易§!。"
 brazil_lacerda_samba.53.t: "坎波斯的信念之战"
 brazil_lacerda_samba.53.desc: "“感谢你主动联系我，米尔顿，尤其是在你完全没有必要这么做的情况下，”塔沃拉笑着说，语气正式，却隐隐带着一丝急切，似乎迫不及待地想完成日程中的某项任务。“我有点急事，所以今天我们就直接讨论一下法案的几个主要内容。”\n\n他们站在副总统办公室的前厅，塔沃拉翻阅着几个小时前交到他手中的文件夹。“‘通过禁令和部署军队来清除共产主义者，赋予军事部长对军事事务的否决权，把异见分子交由军事司法处理。’这些都是相当重大的改革，我相信你很清楚。”\n\n“没错，塔沃拉先生。”坎波斯肯定地回答，“不过，你也很清楚，我们党在本届总统任期内同样承担了庞大的项目。我们的总统为巴西做出了许多杰出贡献，短期内避免了共产主义灾难的发生。然而，可悲的是，瓦加斯主义法团阴谋依旧通过工党和社民党渗透到我们的政治领域。我们必须比以往更加大胆，必须投入更多行动，否则就会被彻底压垮。”\n\n“你的担忧不无道理，坎波斯先生，你对手的看法，我也不算完全不认同。”塔沃拉回应道，“不过，像平托和波萨诺瓦派，恐怕会直接拒绝对这项法案给予大力支持。我们会尽力帮你，毕竟如果全民盟无法推动立法，那就是我们自己的问题。但我无法做出任何保证。希望一切顺利。”\n\n此时，米尔顿·坎波斯已经成为了自己发起的国会运动的核心人物。他带着一份救赎的信念，在诸多不利条件下艰难前行。无论他向总统献上多少不必要的奉承话，无论最终有多少同事认为他疯癫，唯一的道路就是向前走。他不打算搞砸这次机会。"
 brazil_lacerda_samba.53.a: "这将是一次漫长的国会会议。"
 brazil_lacerda_samba.54.t: "护宪派强烈反对"
 brazil_lacerda_samba.54.desc: "有人曾断言，恩里克·洛特已退出历史舞台——这种误解确实值得谅解，全民盟内部亦不乏持此观点者。但这位老元帅的群众基础依然深厚，而拉塞尔达政府试图推翻其政治遗产的举动，不仅激起了军中支持者的愤怒，更引发了民众的强烈不满，反倒为他开辟了新的舆论阵地。\n\n在护宪派军官及支持者的簇拥下，洛特元帅近期频频在公开场合露面，不断地向外界传达明确的讯息：新国家安全法改革正对巴西民主制度构成迫在眉睫的威胁。\n\n这位老将的发言始终掷地有声：“令我深感震惊与痛心的是，广大巴西人民竟对自身和手足同胞如此缺乏信心，甚至甘愿让政府与国家沦为军队的附庸而非领导者。自由何其珍贵，而当今世界已使这种权利愈发稀缺。\n\n切莫心存侥幸地认为巴西能幸免于难——这种危机十年前就险些降临！当年我挺身捍卫库比契克总统与民主法治，如今我恳请诸位也采取行动：巴西决不能重蹈他国覆辙。值此民主存亡之际，务必敦促你们的代表对新国家安全法案投下反对票！”"
 brazil_lacerda_samba.54.a: "能不能让这个老东西闭嘴？"
 brazil_lacerda_samba.55.t: "来自过去的支持"
 brazil_lacerda_samba.55.desc: "虽已大权旁落，屈居国家航空部长，前总统爱德华多·戈梅斯在听闻新版国家安全改革法案的消息后，如同枯木逢春般重焕活力，频频在支持拉塞尔达总统的集会上露面。\n\n这位全民盟元老兼民主斗士抓住机会，在各类活动中为法案摇旗呐喊，将其视为自已总统任内事业的延续。他的言论在军方索邦派中引发强烈共鸣，后者正积极为戈梅斯组织演说集会。\n\n“某些误入歧途者将这项法案污名化为民主倒退，这实在是荒谬至极。恰恰相反——解除军队的枷锁，正是巴西彻底实现民主化的关键一步。须知当年正是我们光荣的军人推翻了瓦加斯的暴政！\n\n致各位全民盟同仁与尊敬的总统：愿诸君在接下来的考验中旗开得胜，永不言弃！致全体国民：请始终铭记，全民盟将永远是抵御共产主义与法西斯主义双重威胁的坚实护盾！”"
 brazil_lacerda_samba.55.a: "等有空了记得提醒我请他喝一杯。"
 brazil_lacerda_samba.56.t: "强硬派伸出援手"
 brazil_lacerda_samba.56.desc: "国家安全改革法案在巴西社会各界引发严重分歧，军方过往行径留下的历史伤疤被重新揭开。众多抗议者不仅反对法案本身，更对其可能带来的后果深表担忧。然而某些群体对即将到来的投票表现出的期待，却透露出令人不安的气息。\n\n作为巴西军队当前的主导力量，强硬派展现出近乎整齐划一的支持姿态。阿丰索·奥古斯托·德·阿尔布开克·利马将军作为法案最激进的拥护者，始终站在声援前线，多次公开对国会中的法案支持者表示赞同。\n\n“若要使巴西繁荣昌盛、人民福祉永续，我军必须采取强硬手段，彻底粉碎任何威胁国家民主制度的隐患。在此我代表全体同僚声明：我们为国会中最杰出的议员们推动建设更安全的巴西所取得的进展，感到无比骄傲与欣慰。\n\n我们身处危机四伏的时代。南非人民的惨痛经历已证明民主之敌会不择手段。只需看看国会里布里佐拉这类死不悔改的共产主义分子，就会明白这些威胁不仅来自境外，更潜伏于国内。”"
 brazil_lacerda_samba.56.a: "我们……感谢他的支持。"
 brazil_lacerda_samba.57.t: "军队回应"
 brazil_lacerda_samba.57.desc: "过去数日，巴西各大报纸接连刊发现役及退役军官的联名公开信，力挺拟议中的国家安全改革法案。这些军官甚至大胆署上真名，字里行间传递着铁与血的气息。\n\n所有公开信均强调，军方绝不意图颠覆巴西民主新生政权，但将誓死防范任何反民主势力——不论是法西斯、共产党还是其他形式的威胁。起初，这些信件仅见于全民盟系媒体，显然是该党为争取民意支持进行的舆论造势，但很快蔓延至中立报刊，民意天平正随之悄然倾斜。\n\n此刻，反对派阵营陷入惶惑。社民党、社进党与工党——这些曾共同沐浴在瓦加斯“广厦庇荫”下的政治继承者们纷纷召开紧急会议。面对军方高调站台，他们嗅到了致命危机。\n\n改革一旦通过，军方将重获曾屡次滥用的政府话语权，以“捍卫巴西民主”之名扼杀任何潜在威胁。而今军队早已清洗瓦加斯余孽，法案的真实意图昭然若揭：即便反对派赢得选举，也永无执政可能。\n\n正如他们从导师瓦加斯处习得的政治智慧，“法西斯”与“共产党”从来都是可以随意扣向政敌的帽子。只要时机成熟，全民盟定会毫不犹豫地挥舞这两顶“帽子”，将对手钉死在反民主的耻辱柱上。"
 brazil_lacerda_samba.57.a: "枪杆子里出民主。"
 brazil_lacerda_samba.58.t: "军队沉默"
 brazil_lacerda_samba.58.desc: "《最后时刻报》刊载的一封由近百名巴西现役及退役军官联署的公开信震动全国。\n\n信中诸多主张直指现政府正试图将军队作为政治道具——通过一系列残酷专制的国家安全法案，用这支捍卫民主的力量来支撑摇摇欲坠的威权统治，最终使国家重回军人干政的黑暗年代。\n\n当然，这封公开信全然出于对巴西稚嫩民主的忧虑，旨在维护军队超然于国内政治泥潭的清誉。\n\n绝无可能受到马加良斯·平托等反对改革、意图看拉塞尔达与坎波斯折戟的政界人士的暗中资助。绝无可能。\n\n信件在全国引发舆论风暴，瓦加斯派喉舌萨穆埃尔·魏纳在其专栏与出版物上尤为欢欣地大肆报道。军队正违背自身意志沦为政治玩偶，或许那只“乌鸦”即将被剪去羽翼？瓦加斯主义者们是否将迎来转机？"
 brazil_lacerda_samba.58.a: "出于对国家的热爱、对民主的热爱、对回扣的热爱。"
 brazil_lacerda_samba.59.t: "争取支持"
 brazil_lacerda_samba.59.desc: "“总统先生，若要通过国家安全改革法案，我们还需要更多参议院支持。”米尔顿·坎波斯在高原宫总统办公室说道，“虽然全民盟已表态支持，但现有票数仍不足以确保法案通过。”\n\n“说点我不知道的。”拉塞尔达揉着太阳穴叹息道，“你有什么建议？”\n\n“如果能争取到社进党的支持就好了，他们刚好有足够参议员……”\n\n“向阿德马尔的腐败集团低头？我宁可给阿根廷那帮法西斯一万克鲁赛罗，也不会给那个混蛋一分钱！”拉塞尔达摇头道，“他要价太高了——无论是金钱还是道义。不，我们应该争取社民党，他们完全能理解国家安全的重要性。况且社民党参议员更多，就算不能争取全体，说服一部分也足够了。”\n\n“即使他们是瓦加斯派？”坎波斯带着讥诮反问，“他们绝不会接受。不过决定权在您，毕竟您才是总统。”"
 brazil_lacerda_samba.59.a: "社民党人是瓦加斯分子不假，但他们仍然是爱国的。"
 brazil_lacerda_samba.59.b: "我们应该看看阿德马尔到底想要什么。"
 brazil_lacerda_samba.60.t: "推土机"
 brazil_lacerda_samba.60.desc: "“总统来电。”秘书话音刚落，阿德马尔脸上瞬间绽开笑容。\n\n“下午好，总统先生。不知有何贵干？”\n\n“阿德马尔，这份法案关系重大。要是不通过，遭殃的可不止我一个。如果你有什么条件——”\n\n“我反对。”他差点笑出声来，故意停了两秒，耳畔传来衣料摩挲的窸窣声，“开个玩笑，别紧张。卡洛斯啊，咱们生意人有话直说——想要我支持，得拿真金白银来换。”\n\n“第一，社进党参议员的信封要填满，天下没有免费的午餐。第二，内阁改组时我要举荐几位德才兼备的人选。第三，阿毛里·克鲁埃尔必须位列其中，待遇要对得起他流过的血。这三个条件不签字作保，社进党就继续当反对派。总统先生，事情就这么简单。”\n\n他仿佛看见拉塞尔达在总统府暴跳如雷。今天运气实在太好了。“考虑好了吗？”\n\n“……算你走运。换作平时，我早挂电话了。条款细节马加良斯会处理。抓紧弄完吧。”\n\n“明智的决定，总统先生。”挂断电话时他嘴角仍挂着笑，政坛哪有什么朋友？不过是待价而沽的人情罢了。要是每次和总统打交道都这么痛快，他还真想跳槽到对面去。"
 brazil_lacerda_samba.60.a: "最后一丝善意，破灭了。"
 brazil_lacerda_samba.61.t: "篝火"
 brazil_lacerda_samba.61.desc: "“你怎么想？”阿利奥马尔·巴莱罗直视着老相识菲林托·穆勒的双眼，每秒钟都在后悔这个决定。作为社民党最后一位可能被说服的参议员，投票组织者认定穆勒蠢到会背弃本党立场。然而此刻他清晰感受到，这位前联邦区警察总长正像猎犬般嗅着他的惶恐。\n\n穆勒突然爆发出洪亮的笑声。“真是天大的笑话，”他咧开的嘴角逐渐扭曲成低吼，“看来你忘了我是谁，阿利奥马尔。当年连鞭挞瓦加斯都不敢的家伙，这会儿竟然来找他的旧部摧毁其政治遗产？既然当过记者，我以为你该更有眼力些。”\n\n“听着，今时不同往日……”巴莱罗语速加快。他太需要这张赞成票了，“法案会——”\n\n“今时不同往日？”穆勒猛然拍桌，“我曾为他拷打政敌，亲笔签署刑讯令状，站在审讯室玻璃后欣赏惨叫。这就是我为他做的事。”他倾身向前，阴影笼罩住来访者，“知道我怎么想吗？你是个白痴，阿利奥马尔。滚出我的视线，先学会怎么当条称职的走狗。”\n\n巴莱罗落荒而逃。他不仅搞砸了争取法案通过的最终机会，更亲手焚毁了与昔日同僚最后的桥梁。如今唯有神迹能挽回这场灾难了。"
 brazil_lacerda_samba.61.a: "虚假的希望熊熊燃烧。"
 brazil_lacerda_samba.62.t: "山雨欲来"
 brazil_lacerda_samba.62.desc: "国会大厦内的气氛紧张到足以被利刃划破，却无人敢发出丝毫声响，唯有飞虫的嗡鸣刺破死寂。拉塞尔达与全民盟的同僚们焦躁地叩击桌面、来回踱步，迫不及待要见证国家安全改革法案的通过。瓦加斯派的议员们则咬牙切齿紧握双拳，誓要站稳脚跟全力阻遏拉塞尔达的野心。\n\n无人知晓下一幕将如何上演，但双方都心知肚明巴西的未来正悬于千钧一发。而在国会穹顶之外，成千上万的民众聚集成群，呼喊着支持或反对的口号。军人们传唱着对全民盟的赞歌，魏纳等反对者则将拉塞尔达及其军方盟友塑造成行将发动政变、摧毁巴西民主的妖魔。"
 brazil_lacerda_samba.62.a: "最后，投票开始了。"
 brazil_lacerda_samba.63.t: "永远警惕"
 brazil_lacerda_samba.63.desc: "当国家安全改革法案的计票结果出炉时，大多数巴西人唯有震惊。这是一场完胜；自戈梅斯时代落幕后，所有旨在限制军权的改革法案，此刻已被尽数废除。\n\n瓦加斯派暴跳如雷，痛斥这是“无耻腐败”和“军方走狗”操弄的结果，而军方和全民盟支持者则弹冠相庆，其中最高兴的莫过于米尔顿·坎波斯。自戈梅斯时代以来，他就没这么舒心过。全民盟终于让巴西的武装卫士们恢复了应有的力量，双方即将并肩作战，从瓦加斯主义与民粹渣滓手中保卫国家。\n\n面对历史派同僚，坎波斯骄傲地宣称：“朋友们，我们总算为伟大的戈梅斯正名了！瓦加斯主义者休想再离间巴西民主的卫士！军队万岁！全民盟万岁！”\n\n然而，即便戈梅斯的失败看似已成过眼云烟，不安的情绪却仍在蔓延。并非所有军人都为此欢欣鼓舞，护宪派和左翼军官对法案通过深感绝望。其中一些人已主动请辞，唯恐改革后可能掀起的清洗浪潮。"
 brazil_lacerda_samba.63.a: "最后，投票开始了。"
 BRA_lacerda_security_acts_success: "$BRA_national_security_act_law_0$将变更为$BRA_national_security_act_law_1$"
 brazil_lacerda_samba.64.t: "洛特法案之终结"
 brazil_lacerda_samba.64.desc: "如果坎波斯愿意面对现实的话，他就不应该对这份议案的失败感到惊讶。在那些不想失去他们窃得的权力的瓦加斯主义者和那些被蒙蔽以致于会畏惧他们的军队的人们的围堵下，国家安全改革未能完全实现一点也不奇怪。但看那戈梅斯的遗产依然在日渐褪色，还是让人心痛不已。\n\n然而，虽然这份议案未获通过，还是有些可喜可贺的事情，那个背信弃义的王八蛋洛特留下的成果也被推翻了。看着他那毕生的心血，自以为是的隐形瓦加斯主义法案被撕成碎片，所有的条款都被废止，实在是令人身心愉悦。洛特法案被废除使得全民盟与军方搭上线变得从未如此容易。全民盟与军方将携手保护巴西免收瓦加斯和他走狗的侵害，正该如此。"
 brazil_lacerda_samba.64.a: "军方的锁链变得摇摇欲坠……"
 brazil_lacerda_samba.65.t: "失败的轮回"
 brazil_lacerda_samba.65.desc: "坎波斯坐在黑色政府轿车的后座，长长地叹出一口气，声音像风箱里泄出的浑浊空气。他紧紧闭上双眼，像是要把脑中翻滚的头痛活活压死。“开车吧。”他低声吩咐，“别问，等我说停的时候再停。”\n\n汽车驶出国会的停车场，缓缓汇入巴西利亚的街道。坎波斯无心去看窗外那些扭曲蜿蜒的街景，他的眼皮依旧死死合上，视线里只剩下一片浓稠的灰暗，那是一块空白的画布，任由他将脑海里挥之不去的场景逐一投射其上：离开危机会议的瞬间，他甩下一句咒骂；国会大厅里，一连串反对票无情地落下；走进会场前，他的顾问们脸上闪过的犹豫神情——就在那时，修改后的《国家安全法》正被逐字逐句地宣读。\n\n记忆的胶片继续倒带，回到更久之前的画面——年轻的坎波斯在街头暴动后安慰空军元帅；巴西的街头沸腾翻涌；瓦加斯崛起的身影再次浮现。坎波斯曾以为历史会倒转重演：如果没有一部足以维护国家安全的法律，政府迟早会被下一个民粹煽动者摧毁，人民会像抬举瓦加斯一样，将新的“救世主”迎进总统府，并将这种行径称之为自由。历史的坏血依旧潜伏在国家的血脉里，等待着时机，再度侵蚀这个病体。\n\n“回家吧。”坎波斯对司机说。他已经受够了这套宿命论的剧本，觉得自己老得连悲观都嫌费力。他关闭了脑中的“放映机”，取而代之的，是一张重新铺开的草图——上面写满了计划与谋划。这事还没完，至少现在还没有。他依然有机会，将武装力量真正变成一个健康的器官，源源不断地产生能清除暴君余毒的白血球。他看见那支军队，手举警棍与步枪，肃清整个巴西政治的毒瘤，驱散一切腐朽与感染。"
 brazil_lacerda_samba.65.a: "他还剩下几年时间，足够他去追逐这个梦想。"
 brazil_lacerda_samba.66.t: "卫生间里的密谋"
 brazil_lacerda_samba.66.desc: "正如所有那些“各取所需”的伟大联盟一样，塔沃拉和平托的相遇，发生在一个再寻常不过的地方——国会厅的洗手间。两人前后脚走到洗手池边，在镜子里对上了视线。塔沃拉神情倦怠，眼圈深黑；平托的脸色更糟，像是整整一周都在咬牙切齿，愤怒刻进了牙缝里。\n\n“法案可能要通过了。”塔沃拉开口道，“拉塞尔达这次跟坎波斯步调完全一致。你我都清楚，他手上那点人脉足够把众议员们敲成一排。”\n\n“他妈的。”平托猛地拧开水龙头，把手伸进冰冷的水流里，“这已经过界了！乐队派想把军队彻底攥在手里？说好的君子协定呢？这不就是个摆着好看的幌子吗？”\n\n“岂止是乐队派。”塔沃拉一边嘟囔，一边从小皂液器里挤了点肥皂在手上，“更让我不安的，是拉塞尔达拿到军权以后，会干些什么。”\n\n“他是总统，军队归他管，这没错。但军队不是乐队派的，这才是——”\n\n“拜托，平托。”塔沃拉甩掉手上多余的水，从纸巾盒里抽出一张擦手，“别告诉我你还看不穿这背后的门道。只要把瓦加斯派，或者说他认定的瓦加斯派，彻底从军队里清干净，拉塞尔达就能安插他自己的人进去。从此以后，这帮人只听他的命令，谁也插不上手。到那时候，万一社进党，甚至天杀的工党哪天赢了选举，想凭‘人民的意志’来改天换地，结果你猜会怎样？”\n\n平托顺着这条黑暗的思路一路想下去，低头看着自己满是泡沫的双手，脸色沉重。“恐怕，到那时，他真就无人可挡了。”接着他抬头，直视塔沃拉：“那咱们总得做点什么吧，不是吗？”"
 brazil_lacerda_samba.66.a: "“今晚有空吃个饭吗，平托？我正好有点主意。”"
 brazil_lacerda_samba.67.t: "登门拜访最有效"
 brazil_lacerda_samba.67.desc: "拉塞尔达在国会走廊与坎波斯不期而遇，两人身后都跟着助手。两人交换了一下信息，发现彼此竟一直在进行着同一场“圣战”：为即将到来的国家安全法案四处拉票。拉塞尔达能唤起敬畏与恐惧，而当坎波斯踏进某位普通议员的办公室时，在场的所有人都能感到空气瞬间凝固，沉重得仿佛从天而降的铁块。\n\n“他们肯定吓得要尿裤子了吧？”拉塞尔达咧嘴笑道。坎波斯则报以他那标志性的、仿佛入殓师一般悲悯而又令人发毛的微笑，只是弧度更大了些。\n\n“确实。不过他们现在明白法案的重要性了。法案必须通过，这样我们离肃清瓦加斯余毒就又近了一步。”\n\n“拭目以待吧。我刚结束最后一轮游说，投票将在……”拉塞尔达瞥了眼腕表，“半小时后开始。一起去看看？”二人走向议事厅，却发现已迟到一分钟，工党议员还在声嘶力竭地反对，但全民盟议员已经开始投票了。那些被拉塞尔达和坎波斯“拜访”过的议员，正以绝对的热情投下赞成票。\n\n接下来法案还要过参议院，唯一的问题无非是现在通过，还是被反对派拖延一下。但结果已经注定了。拉塞尔达转向坎波斯，伸出手。他的手掌冰冷有力。"
 brazil_lacerda_samba.67.a: "又一枚瓦加斯的毒刺被拔出国家肌体。"
 brazil_lacerda_samba.68.t: "察言观色"
 brazil_lacerda_samba.68.desc: "“就得是萨赖瓦法了，对吧？”\n\n马加良斯·平托挠了挠下巴，思索着如何放大他这一派的影响力。在他身边的是若泽·萨尔内，一位年轻气盛的波萨诺瓦派议员。平托的问题打断了他的思绪。\n\n“什么意思？”萨尔内问。\n\n“那是一份谨慎且平衡的法案。它重要，可行，而且我们可以独自推进这件事。”平托解释着，又靠回了椅子上。“拉塞尔达又在被其他人拉扯。现在，我们要集中力量办大事。比如当下声势浩大的土地改革，但如果我们能废除萨赖瓦法，赋予文盲公民投票权，支持土地改革的声音就会更强大。你怎么看？”\n\n“我可以把这件事告诉工党的议员们，看看他们有没有兴趣合作。”萨尔内立刻表示了支持。他们都一口咬定，在近一个世纪的时间里禁止文盲公民投票不仅落伍，而且有悖于任何的民主原则。更实际点说，赋予农村地区大批虔诚且受教育水平低的居民投票权可以为全民盟——至少为波萨诺瓦派，开辟一片新票仓。\n\n“我们可以软化一下这份法案的措辞……如果一切顺利，我们就会冲击70年大选，但还是有风险的。这取决于我们能拉到多少盟友。”两人达成了共识，一份计划渐渐成形，一部部电话响起，并且……"
 brazil_lacerda_samba.68.a: "平托和进步派联手，并得到全民盟的大力支持。"
 brazil_lacerda_samba.68.b: "平托和进步派联手，并得到全民盟的适当支持。"
 brazil_lacerda_samba.69.t: "准备回应"
 brazil_lacerda_samba.69.desc: "“怎么没人通知我？”阿里奥马尔·德巴莱罗一接起电话就开始怒吼。他刚刚才看到若泽·萨尔内提交的宪法修正案，就像丢进议会的一颗手榴弹，让人下意识屏息凝神。\n\n“没人通知你？”拉塞尔达也在电话那头提高了音量。“你什么意思？非得让我在议会装窃听器吗？要我像照顾婴儿一样照顾你们吗？我怎么……你为什么会觉得这是我点头同意的？”\n\n“所以你就放任波萨诺瓦派在你眼皮子底下大声密谋？”巴莱罗生气了。“行了，我要走了。我会做我该做的，你也得采取行动，一会再说。”\n\n听到咔哒一声，拉塞尔达愣了一下，但很快恢复了平静。没过多久，总统就打了一通新的电话，这次是打给副总统塔沃拉的。\n\n正如拉塞尔达所料，这位温和的副总统的路线是谈判和妥协。“和平托坐下来谈谈就好了，”他说。“这个人又不是一点道理不讲。”\n\n“我真想掐死这个混蛋。”拉塞尔达郁郁寡欢。\n\n“我们也知道萨赖瓦法不可能长久，但是平托有点操之过急了，那么，也许我们只要处理得当就能度过危机。”\n\n拉塞尔达扶了扶额头，思考着如何处理这个令人头疼的危机。"
 brazil_lacerda_samba.69.a: "“我不喜欢这主意，塔沃拉，但行吧。我会和平托谈谈的。”"
 brazil_lacerda_samba.69.b: "“我不喜欢这主意，塔沃拉，要是你就这点能耐，那我自己解决这个问题。”"
 brazil_lacerda_samba.70.t: "各有各的不幸"
 brazil_lacerda_samba.70.desc: "“你自己也承认，在扫盲问题上确实有了一些进展。”平托随意地说道，身子倚在椅子的扶手上。\n\n“是的，或许有一些进展，但这才刚开始。教育体系要发挥作用，总需要时间。”塔沃拉平静地回应着，语气里带着一丝预设对话情节的从容。\n\n两人已经围绕由波萨诺瓦派推动的宪法修正案争论了许久，似乎完全忘了拉塞尔达的存在。这种忽视，加上毫无营养的争论，让拉塞尔达愈发感到不快。一段关于平托的怒斥堵在他的喉咙里，等待时机爆发。\n\n但最终，他被抢了先机。三人同时转头看向门口，随着一声轻响，米尔顿·坎波斯出现在门框中，满脸通红，怒不可遏。\n\n“你是个叛徒，平托！你正一步步把我们引向瓦加斯主义，我看得一清二楚！再见！”\n\n坎波斯怒气冲冲地完成这番指责后，突然转身离开，并猛地甩上了门。几位全民盟领导人面面相觑了一会儿。塔沃拉清了清嗓子，重新将注意力转回平托身上。\n\n“正如我刚才所说，协议的主要条款如下：1975年，非文盲将被允许在市政和州长选举中投票。至于总统选举的部分，我们可以留待未来讨论。马加良斯，你怎么看？”\n\n平托瞥了一眼明显不悦的拉塞尔达，随后转向塔沃拉，“我觉得这是一项不错的协议，维尔吉利奥。”不过，他能做到的不止是“不错”。“我们还是握手言和吧。”"
 brazil_lacerda_samba.70.a: "维尔吉利奥，你凭什么认为自己能开这个条件？"
 brazil_lacerda_samba.71.t: "未来不可阻挡"
 brazil_lacerda_samba.71.desc: "今天是众议院的一个重要日子。若泽·萨尔内将向议会提交宪法修正案的文本进行表决，他和马加良斯·平托对此势在必得。事实上，他们信心十足。在两人私下密谋后，萨尔内提交给议会的修正案，已经悄悄修改了一部分，这和平托之前与塔沃拉达成的协议显然有所出入。\n\n修正案内容公布后，议会内顿时掀起了一阵低声议论——这项修正案将允许文盲从1970年起在州长和市政选举中拥有投票权。\n\n波萨诺瓦派显然计算得当。他们的投票联盟中，对修正案时间表调整持不同看法的成员虽有不少，但几乎没有负面意见。事实上，更为进步的议员们对修正案的新条款感到颇为惊喜。而联盟力量足够强大，以至于多数温和派议员也只是耸耸肩，毫无异议地接受了这些新条件。\n\n稍后，投票结果出炉时，拉塞尔达已经无法再将自己隐藏在议会大厅的角落。他踉跄地冲出会场，瘫坐在走廊的大理石墙边，背靠着墙滑下，双手掩面。他的身体对这赤裸裸的羞辱和可怕的屈辱发出抗议；平托彻底将他摆了一道，这份傲慢无礼让他感到头晕目眩。\n\n然而，就在动议最终通过时，拉塞尔达又出现在了议会大厅。他的脸上波澜不惊、不动声色，仿佛什么也没有发生过。"
 brazil_lacerda_samba.71.a: "你太歇斯底里了。"
 brazil_lacerda_samba.72.t: "未来可被阻挡？"
 brazil_lacerda_samba.72.desc: "众议院内一派祥和气象。若泽·萨尔内即将向议会提交宪法修正案草案进行表决，他与马加良斯·平托对此举胸有成竹。这两位政客的自信其实已然膨胀到了危险边缘——窃窃私语，一番密谋后，萨尔内最终提交的修正案版本，竟与平托先前与塔沃拉达成的协议大相径庭。\n\n议长宣布修正案将赋予文盲群体自1970年起参与州长及市政选举的投票权，整个议事厅仿佛被投入石子的湖面，泛起阵阵惊愕的涟漪。\n\n波萨诺瓦派显然错估了局势。正当进步派议员们为这个意外之喜交头接耳时，平托联盟的温和派阵营已是如坐针毡。反对声浪在穹顶下轰然炸响，议场陷入混乱之际，拉塞尔达如幽灵般出现在平托身侧。这位总统始终在远处冷眼旁观，此刻箭步上前将波萨诺瓦派领袖拽至角落。\n\n“给我听好了，白痴。”拉塞尔达的嘶声仿佛毒蛇吐信。平托能感受到总统攥住自己双肩的拳头正因暴怒而颤抖：“知道我和坎波斯最大的区别吗，犹大？那个懦夫只会空谈，而我——”他几乎是从牙缝里挤出字句，“说到做到。要么按原计划执行，要么就带着你的党羽滚回总主教的裙底。别耍花样。”\n\n平托竭力维持着面部的平静：“冷静，阁下。萨尔内只是拿错了版本——七五年实施，就这么定了。”"
 brazil_lacerda_samba.72.a: "修正案“修正”了，表决终获通过，却无人称心如意。"
 brazil_lacerda_samba.73.t: "逆流之言"
 brazil_lacerda_samba.73.desc: "拉塞尔达总统缓步走向众议院议长席，透过厚重镜片扫视身后议事厅。经过旁侧时，他瞥见平托麾下那位无能的副手众议员萨尔内——那人正傲慢地鼻孔朝天。\n\n当总统登上讲台开始演说时，萨尔内之流的神情愈发阴沉。寒暄草草带过，他直指问题核心。\n\n“我是巴西总统，”拉塞尔达说道，“是每个巴西公民的总统。但面对严重谬误时，我不介意插手党派之争。尤其令人忧心的是，这次误入歧途的竟是我全民盟同仁。”\n\n他扶了扶眼镜：“不必讳言——这项修正案无论初衷如何良善，实属本末倒置。扫除文盲，是本届政府与国家的重要使命。我们要提升国民素质，培养见多识广的开明公民。赋予目不识丁者投票权，非但不能给予尊严，反将稀释公民社会。”\n\n“任何支持此修正案的全民盟议员，都是在纵容蛊惑者剥削蒙昧者。至于我本人的夙愿一贯是让全民享有教育，缔造一个彻底扫除文盲的国度。”"
 brazil_lacerda_samba.73.a: "在爱国责任的感召下，全民盟人幡然醒悟，法案终成泡影。"
 brazil_lacerda_samba.73.b: "忠言逆耳——演讲结束后不久，众议院便投票通过了修正案。"
 brazil_lacerda_samba.74.t: "轻微的谣言动摇你的心"
 brazil_lacerda_samba.74.desc: "眼看宪法修正案似乎即将在众议院取得多数支持，拉塞尔达的怒火更盛。他又开始咬牙切齿，满腔怒意地想，这群蠢货与骗子组成的议会，竟然连明摆着的正确选择都做不出来，哪怕他已费尽口舌地向他们阐明利弊也无济于事。他当然预料到了工党里那些瓦加斯主义者会如此，但他自己党内的人竟也跟着反对？\n\n“我真该拧断平托那个混蛋的脖子。” 拉塞尔达低声咒骂道。\n\n“没必要这么夸张。” 阿利奥马尔·巴莱罗俯过身来，同情地看了看这位多年老友，“我向上帝发誓，我过去也恨不得把瓦加斯狠狠揍一顿——但现在我们必须更聪明一些才行。”\n\n塔沃拉也跟着来到议会大厅角落的安静处，像个石像鬼般阴魂不散地在一旁说道：“我本来不想再重复‘我早告诉过你’这种话了——”\n\n“那你就闭嘴。” 拉塞尔达冷冷地打断了他。\n\n“听着，如果你非得一个人坚持到底，那就只能一直撞墙了。我还能再动用一些人情关系，和其他人谈谈——或许能在议会里凑出一个能够废掉这条修正案的联盟来。”\n\n“你是觉得我做不到吗？” 拉塞尔达反问道。\n\n塔沃拉无奈地摸了摸自己的后颈。巴莱罗则淡淡一笑，默默转过身去。"
 brazil_lacerda_samba.74.a: "“也许这次你是对的，塔沃拉。把事办妥。”"
 brazil_lacerda_samba.74.b: "别管塔沃拉了，我自己能办到。"
 brazil_lacerda_samba.75.t: "污染我的空气"
 brazil_lacerda_samba.75.desc: "妥协，本就不是拉塞尔达的性格。他不像塔沃拉那样善于阿谀逢迎，他也确实以此为豪，尽管这会使他在众议院中否决平托提出的宪法修正案更为艰难。\n\n毫无意外。工党的议员们对他嗤之以鼻。他向社民党的改革派议员乃至自己党内的议员发出的恳求都毫无进展，这些人对宪法修正案的坚决支持，早令让们失去了理智。拉塞尔达在议会四处碰壁，毫无头绪。\n\n不过，奥罗·德·莫拉·安德拉德倒是愿意与他交谈。拉塞尔达本几乎要打消这个念头——毕竟安德拉德是社民党保守派的重要成员——这群寡头和煽动家在新国家体制那会就借着体制大发横财、臭名昭著。\n\n尽管如此，安德拉德的态度却异常随和，于是拉塞尔达勉强拉下脸进行交流。安德拉德认为，他们对修正案都有着共同的不满，社民党与全民盟的联合虽然不合常理，但却能有效阻击修正案。或许，他们甚至可以建立一种更为持久的合作关系？只要总统愿意给点“信封”，一切皆有可能。\n\n一些原本在四处走动的议员们纷纷回头，瞧见拉塞尔达冲着安德拉德大发雷霆。他怒不可遏，脸涨得通红——安德拉德竟敢在他面前大言不惭地提及贿赂？安德拉德应当庆幸，总统肯屈尊与他这种人交谈！\n\n这位社民党的政客也毫不示弱。他怒斥总统不过是个傻子，根本不配待在高原宫。安德拉德怒火中烧，扬言自己一定会不遗余力地推动宪法修正案通过——毕竟是个人都知道，文盲投票权对全民盟的打击可远大于社民党。"
 brazil_lacerda_samba.75.a: "安德拉德说到做到——在部分社民党议员弃权的情况下，修正案获得通过。"
 brazil_lacerda_samba.76.t: "我轻视你们的好感"
 brazil_lacerda_samba.76.desc: "没人会说维尔吉利奥·塔沃拉懒散。这位塞阿拉州出身的政治家在会场内快步穿梭，只要遇到可能被说服对宪法修正案投反对票的议员便立即上前交涉。\n\n“您所在州的学校额外拨款？当然能争取。”“那条公路建设？包在我们身上。”“您兄弟的政府合同？不成问题。”权力所及之处，塔沃拉给出的承诺与便利堪称无所不包——有时甚至会递上信封行贿，毕竟现金交易自有其高效之处，何况他本就无需像拉塞尔达那样维持“清廉不可收买”的作派。这场拉锯战固然艰辛，但他并非为己谋利，而是代表政府、代表总统奔走斡旋。若将此事交由拉塞尔达处理，天知道那位同僚会如何当场出尽洋相。\n\n时间所剩无几——塔沃拉刚与一名温和派的工党议员达成协议，视线已越过对方肩头锁定下个目标社民党议员。票数估算相对乐观，副总统已在心里预演着平托可能爆发的怒火：若修正案流产，这位同僚必将高喊“这是全民盟的彻底背叛”“党内团结何在”云云。不过到头来，他终会接受现实，或者另起炉灶策划些损人不利己的计谋，报复拉塞尔达夺走总统之位的旧恨。\n\n当计票结果揭晓时，塔沃拉屏住了呼吸。最终结果是……"
 brazil_lacerda_samba.76.a: "平托的实力还是太强大了——修正案通过了。"
 brazil_lacerda_samba.76.b: "塔沃拉的付出是值得的——修正案被否决，而平托的反应也在预料之中。"
 brazil_lacerda_samba.77.t: "让你的游离不定留下吧"
 brazil_lacerda_samba.77.desc: "高原宫笼罩在诡异的寂静中，唯有秃鹰嘶哑啼鸣划破天际。拉塞尔达总统揉捏鼻梁，试图驱散办公桌上“文盲修正案“”引发的偏头痛。\n\n他已将选项推演千遍：由于法案已在参议院引发轩然大波，动用总统否决权无异于政治自杀，而依法签署尽管能换取改革派支持，却也意味着背叛己方阵营。钢笔在指尖打转，墨迹未落的签名将彻底颠覆其政治形象。\n\n还有条幽暗小径：致电军中旧友。阿尔布开克·利马将军或愿施援，毕竟二人的忧虑同频共振。在巴西民主岌岌可危的当下，这不失为一种选择。当然，前提是军方仍甘为总统的政治棋子。\n\n拉塞尔达凝视窗外秃鹰盘旋的轨迹，在钢笔与电话间悬而未决。"
 brazil_lacerda_samba.77.a: "拉塞尔达放下自尊与疑虑，提笔签字。"
 brazil_lacerda_samba.77.b: "拉塞尔达神情冷峻，拿起听筒。"
 brazil_lacerda_samba.78.t: "一颗钉子打掉另一颗钉子"
 brazil_lacerda_samba.78.desc: "“你要作何解释？”\n\n战争部长戈尔贝里·多·科托-席尔瓦深陷椅背，指尖叩击着办公桌上数份报纸——内页标题赫然印着《参议员控诉外部施压》《议长办公室接获恐吓》。利马将军如受训学童般杵立，情绪在狂躁与颓唐间摆荡。\n\n“报道上没点我的名字。”利马涩声辩解。\n\n“但军界、政界，包括我，都清楚是你。”戈尔贝里透过厚镜片冷眼扫视，语调平静如解剖刀，“你试图策动同僚搞政治冒险，无人响应便疯狂致电议员威胁。”\n\n“我在捍卫民主！”利马眼底猩红翻涌。\n\n“而我在履行职责。”戈尔贝里旋开钢笔，“当议长亲诉遭高阶军官恐吓，你该考虑军旅生涯是否到此为止。退下吧。”\n\n“见鬼！这是拉塞尔达总统授意！”利马攥拳甩出底牌。\n\n戈尔贝里纹丝未动，仿佛听见孩童陈述太阳东升般的基本事实。"
 brazil_lacerda_samba.78.a: "兀鹰的残骸。"
 brazil_lacerda_samba.79.t: "权利仍是权利"
 brazil_lacerda_samba.79.desc: "军车征调完毕，武器库完成管控，行军路线已设定，士兵整装待发。利马将军在基地车棚的探照灯下凝成剪影，目送秃鹰追逐落日残阳。\n\n士兵们敬礼如潮，将军从容穿行其间。明日行动不过是场政治戏剧——用武力提醒参议院守护民主的本分。他安然入眠，带着军人特有的踏实。\n\n晨风骤变局势。利马弓身伏在电话机上，错愕于同僚接连失联。营区异动频现，新兵们目睹将军被陌生士兵押上军车，时间定格在8点13分。\n\n当日午间，广播向全巴西播报未遂政变：战争部及时粉碎高级军官冲击参议院推翻修宪案的阴谋，主谋之一反水向戈尔贝里部长告密，余党尽数落网。\n\n民众为避过军事干预庆幸，前总统洛特尤甚——政变者正撞上他制定的《洛特法案》枪口。晴空如洗，洛特欣慰巴西民主屏障尚存，既阻截了利马等强硬派，也让阴谋幕后黑手拉塞尔达无所遁形。"
 brazil_lacerda_samba.79.a: "若没有洛特法案，事件走向将截然不同……"
 brazil_lacerda_samba.80.t: "一团火焰驱走另一团火焰"
 brazil_lacerda_samba.80.desc: "秃鹰掠过天际的阴影下，军车纵队碾过巴西利亚空寂的街道。参议院穹顶渐近时，零星市民从窗缝与天台窥视，多数人选择隐匿。车队行至议会大道骤然分流，如铁钳合围建筑——帆布篷内涌出的士兵瞬间控制停车场、绿茵广场及毗邻街区。利马将军跨出吉普，立于议会双塔投下的光刃中。\n\n将军率小队破门闯入议事厅，鼎沸人声在枪械反光中骤然凝滞。士兵扼守出入口，利马径直奔向主席台，如同回归本位般从军装内袋抽出文件：\n\n“致诸位参议员，”他无视身后颤抖的议长安德拉德，“军方遗憾指出，贵院近期修宪决议违背巴西民主法治精神。为国之故，请诸位复议。”\n\n简短宣言后，将军率部如潮退去。当安德拉德议长嗫嚅着宣布重投修宪案时，拉塞尔达总统正隐匿上层观礼台。这场军事恫吓的见证者与操盘手焦躁踱步至走廊喘息，既困于自己布设的棋局，亦困于秃鹰羽翼投下的永恒阴翳。"
 brazil_lacerda_samba.80.a: "卡厄斯，等你征服全罗马，就成了穷光蛋，到时候别想逃出我的手心。"
 brazil_lacerda_samba.81.t: "党代会"
 brazil_lacerda_samba.81.desc: "在库里蒂巴的阳光下，拉斐尔·马加良斯信步走进全民盟党代会场。他刚刚顺利结束了巴拉那州首府的行程，期待着党代会只会更成功。\n\n毕竟随着罢工平息，鲜少有人能挑战拉塞尔达对党的掌控，更无人能阻挡他获得党魁提名。\n\n即便平托党主席卸任在即，他也依然保持着微笑，甚至与对方互致“早上好！”。但在加冕之前，他必须全程参与这场会议，不得不说，这一次确实充满看点。\n\n尽管拉塞尔达对全民盟的统治堪称绝对，但对党纲的掌控却不尽然。会场上充满了关于新党纲的辩论与动议。\n\n乐队派与历史派提出了相当常规的纲领。文件中满是对拉塞尔达及其政策的支持与赞美，呼吁延续其广泛的政治议程，仅在某些细节处稍作调整。\n\n相比之下，波萨诺瓦派的纲领则更具实验性。提案中包含对拉塞尔达的温和批评，同时要求大幅扩展土地改革、银行业改革、财税改革与城市改革，并主张更加独立自主的外交政策。\n\n不出所料，塔沃拉派提出了实现高度党内团结的折中方案。马加良斯宣誓就任新总统时，这份调和的新党纲终于正式公布。"
 brazil_lacerda_samba.81.a: "拉塞尔达派的党纲得到通过。"
 brazil_lacerda_samba.81.b: "折中的党纲得到通过。"
 brazil_lacerda_samba.81.c: "激进的党纲得到通过。"
 brazil_lacerda_samba.83.t: "城市之夜"
 brazil_lacerda_samba.83.desc: "巴西证券交易所已许久未如此热闹——交易大厅挤满了来自全国各地的投资者，人人都想在市场中分得一杯羹。在外人眼中，这个充满虚伪笑容与紧绷气氛的场所看似平常，但空气中分明涌动着某种电流。当投资者们交头接耳时，他们同样能感受到这种异样：或是后颈微微发麻的刺痛，或是胃部揪紧的沉重感，虽然表现形式不同，但所有人都真切地感知到了这种躁动。\n\n然而，就在房间里的喧闹和紧张气氛达到顶点时，新闻忽然报道起交易池动态，整个空间骤然陷入死寂。每个人都屏息凝神地聆听收音机里传来的字眼，凝重的空气几乎能拧出水来——全民盟刚刚通过了一项旨在扶持大型企业的新法案。投资者们的心跳随着电波声不断加速，他们暗自祈祷这个政党能延续其政策惯性，继续为他们铺就财富之路。但最终，一切仍取决于交易池里那些操盘手的决断。\n\n时间在令人窒息的沉默中缓慢流逝，没有人敢发出丝毫声响，唯恐错过任何细微的信息。当收音机像匕首般齐刷刷对准交易池时，人们能做的只剩下无声的祈祷，期盼全民盟的政策能够奏效。突然，犹如黎明刺破黑夜般，寂静被一声呐喊打破：\n\n“巴西股指上涨1.2%！”\n\n后续的播报完全淹没在了震耳欲聋的欢呼声中。他们成功了！不仅是股指，几乎所有主要上市公司都开始以惊人的速度大涨！交易大厅瞬间被狂喜的洪流席卷，有人如释重负，有人喜极而，但并非所有人都沉浸在喜悦中——部分人担忧全民盟描绘的不过是海市蜃楼般的增长幻象，这个泡沫终将破裂，而届时首当其冲的，恐怕正是此刻欢呼的人群。"
 brazil_lacerda_samba.83.a: "直至他们的投资数据被公之于众。"
