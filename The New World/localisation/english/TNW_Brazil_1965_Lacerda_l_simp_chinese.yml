 brazil_lacerda_samba.84.t: "市场越自由……"
 brazil_lacerda_samba.84.desc: "贝尔纳多和索菲亚感到无比幸福。天知道他们花了多少个寒暑，才让隐藏在街角的小小天堂得以开张——这全都要归功于全民盟的辛勤付出。\n\n没有全民盟精简审批流程，任何事都寸步难行。想申请营业执照？得先填一堆表格。填完表格？当然还要排队等候。重重阻碍曾让他们与梦想中的裁缝店渐行渐远，但如今，那个让巴西百姓能以合理价格购买优质手工服装的愿景终于化为现实。\n\n开业当天夫妻俩充满期待，两人坐在柜台后等待第一位顾客光临，期盼付出能换来回报。时间一分一秒流逝，店内始终鸦雀无声。尽管喧闹的人声近在咫尺，可整日下来，竟无一人踏进他们的店铺。\n\n“怎么回事？忘了翻牌子吗？”贝尔纳多喃喃自语，出门检查是否犯了什么低级错误。但眼前的景象让他愕然：不远处的“西尔斯百货”里人潮汹涌，顾客们争相购买流水线生产的廉价成衣。本应喜庆的场景，于他却像一记响亮的耳光。他长叹一声，垂头丧气地回到店里，思忖着该如何向索菲亚陈述这个噩耗。"
 brazil_lacerda_samba.84.a: "……人民越自由？"
 brazil_lacerda_samba.84.tt: "£GFX_BRA_UDN_liberalism_texticon §Y经济自由主义§!已达到50%，将应用以下修正："
 brazil_lacerda_samba.85.t: "赢家与输家"
 brazil_lacerda_samba.85.desc: "巴西国家矿业局大楼内气氛凝重。没人愿意第一个开口说破，但每个人心里都明白——“业务外包”。这个词，不管是对巴西工人还是世界上任何地方的劳动者来说，都是个让人作呕的噩梦。而随着全民盟推着自由化的步伐一路狂奔，这个噩梦终究还是降临了。一张纸条默不作声地在办公室里传递开来，所有人低头逐行扫视，只想找到自己的名字，看看自己是不是那少数几个幸运儿——没有被私营企业挖掉饭碗的人。\n\n“加布里埃尔、路易斯、萨缪尔、佩德罗”——名单一个接一个，写满了整张纸。\n\n没有人愿意往下看别人的名字——现在没工可做，自己头顶的天都塌了，哪还有心思去看别人的笑话？留下来的那群人，心里也透亮得很，他们的“胜利”无非是惨胜，随时可能轮到自己脖子上悬起那把刀，变成今天那些“前同事”中的一员。\n\n诺亚的名字刚一映入眼帘，他立刻拔腿冲出了办公室。他不能让同事们看到自己脸上的颓败，他必须表现得强硬些，哪怕是装的。可他根本不想回到那个房间——甚至，他连踏回那片地板的力气都快没有了。眼眶泛起薄雾，数不清的失眠夜晚像潮水一样涌上心头。那些夜晚，他咬紧牙关硬撑着，拼命把自己磨成一名合格的矿业督察，为的就是从贫困的泥沼里爬出来。可如今，好不容易爬到坑边，伸出去的手，却被狠狠踩了回去。\n\n他靠在走廊的墙上喘息了一会儿，只能无声叹息，任命运的牌面嘲笑他的天真。他努力平复呼吸，准备回到办公室，祈祷自己狼狈的样子没人看见。转过拐角时，前方隐约传来两个高管的对话声——\n\n“拉斐尔先生，我不得不承认，您对效率的判断太准确了。现在整个人就像卸下了一座救世基督像那么大的重担！”"
 brazil_lacerda_samba.85.a: "诺亚想嘶吼些什么，但已经没有力气了。"
 brazil_lacerda_samba.85.tt: "£GFX_BRA_UDN_liberalism_texticon  §Y经济自由主义§!已达到75%，将应用以下修正："
 brazil_lacerda_samba.86.t: "巴西的老毛病"
 brazil_lacerda_samba.86.desc: "“我真他妈快被那个佩德罗烦死了。”爱德华一边把扳手递上去，一边抱怨，“整天发号施令，连个招呼都不打……当初不是说好全民盟上台以后，这帮爱管闲事的家伙就该滚蛋吗？”他从那台庞大的钢铁机器底下滑出来，抹了一把被汗水浸湿的黝黑额头。\n\n另一个皮肤白得多的男人，正低头摆弄着一颗螺栓，根本没理他。爱德华不耐烦地打了个响指：“喂，里奇！你耳朵聋了吗？”那白脸男人慢悠悠地回过头来，鼻梁上的眼镜让他看起来多了几分斯文气。“少嚷嚷吧，爱德华。他又不是希特勒，犯得着这么上火吗？他就是干份差事，跟咱们一样。”说完，他又埋头回去继续拧螺丝。\n\n爱德华翻了个大大的白眼，伸展着酸痛的肩膀，一边自言自语：“弄得我都开始怀念那个狗娘养的库比契克了……”\n\n“……至少，全民盟也该多少动动手，搞点符合我们美洲发展规划的事吧。”彼得指了指墙上投影着的一张精美图表，彩色图像清晰锐利。然而，这华丽外表下的数据，却描绘出一幅并不乐观的盈利前景。“这些业绩，可完全不是固特异总部想看到的。”\n\n约翰逊拽了拽他那条印着南方邦联旗的领带：“我懂你意思，彼得。我们也在努力调整嘛。我相信，转向越野轮胎的策略——”\n\n尼古拉斯抬起一只黝黑的手，打断了他：“算了吧，约翰。咱们当初就不该对政府放松监管抱什么幻想，不管谁坐在总统椅上。”他耸耸肩，苦笑道：“我在这地方活了一辈子了……”"
 brazil_lacerda_samba.86.a: "“除非上帝亲自下凡，否则谁也别指望能把巴西的官僚机器撬动半寸。”"
 brazil_lacerda_samba.86.tt: "£GFX_BRA_UDN_statism_texticon §Y经济国家主义§!已达到25%，将应用以下修正："
 brazil_lacerda_samba.87.t: "我没兴趣了"
 brazil_lacerda_samba.87.desc: "“我们撤资吧。”曼努埃尔从不喜欢卖关子，话向来说得干脆直接，尽管这种直来直去的风格并不总是对他有利。“不是，抱歉，我们真的不行了。就照原定价格结算吧——听着，我很抱歉——”电话里传来一声让人头皮发麻的“咔哒”，曼努埃尔翻着手头的文件，随手在一家刚起步的地方超市旁画了个勾。他叹了口气，这家店他其实挺喜欢的。\n\n“就这么定了。”他环顾会议桌，“我们暂停所有杠杆收购，同时撤出超过新风险承受上限的投资。”一起搅和这场失败操作的另外两位银行家点头表示同意。马尔科看了一眼表，突然瞪大眼睛：“糟了，我……我约了人吃饭，先失陪。”\n\n老板前脚刚走，贝尔纳多立马把脚搭到旁边的椅子上，顺手扯松领带：“我真是想不明白，安东尼娅。全民盟不是拍着胸口保证，要给我们搞一整套美式大放权吗？结果呢？”\n\n安东尼娅冷冷地瞥了他一眼，那目光像冰碴子一样扎人：“我怎么知道？”她的视线越过贝尔纳多，落到窗外的远方，语气听起来像是早已心如死灰。“过去的事儿，想那么多有什么意义？”\n\n“其实也没那么糟。”托马斯懒洋洋地在订单底部签了字，确认他们的公司正大量购入市政债券。电话那头，他还在跟父亲闲聊：“爸，你猜怎么着？我们又把钱砸回去搞国家基建项目了！您说对了——全民盟的‘放权大计’，果然没撑多久。”"
 brazil_lacerda_samba.87.a: "这就是伊塔乌银行的又一天，又一次落空的豪赌。"
 brazil_lacerda_samba.87.tt: "£GFX_BRA_UDN_statism_texticon §Y经济国家主义§!已达到50%，将应用以下修正："
 brazil_lacerda_samba.88.t: "日复一日"
 brazil_lacerda_samba.88.desc: "整个办公室都透着一股筋疲力尽的死气。自打进了矿业局，没人见过这种架势——甚至可以说，这种工作量根本前所未有。所有的文员、督察，还有那些不上不下的职位，全都熬了一整夜，只为了赶上那份永远填不满的配额。疲惫把他们压得睁不开眼，血丝爬满了眼白，整张脸仿佛要被拉垮下去，每隔几秒就被睡意的幽灵拉向黑暗。空气里还残留着淡淡的咖啡味，办公桌和文件柜上乱七八糟地摆满了空杯，整个房间看上去像是临时搭起来的破败咖啡馆。\n\n“天啊，有时候真后悔接了这份工作，再查几批矿我感觉眼睛都要报废了。你说是吧，加布里埃尔？”\n\n“可不是嘛。”加布里埃尔打着呵欠，伸直僵硬的胳膊，话到一半已经疲得说不下去。“有时候真想一直待在底层干粗活算了，至少那会儿不用操这么多心。”\n\n两个人相视一笑，这种时候除了苦笑还能怎样？他们心里清楚，只要脑子哪天不用这么超负荷运转，回过头来，他们或许真能拿这段日子当笑谈。加布里埃尔叹了口气，重新低头核对那些检验单，确认每项指标都合格。就在这时，办公室的门被人猛地推开，门板狠狠撞在墙上，震得桌上的杯子都晃了三晃。\n\n“你们这群家伙到底在干什么？公司不是养你们来偷懒的！配额！我们要的配额还没交上来，赶紧给我把活干完！”\n\n劈头盖脸骂完，高管甩袖子走了个干净，来去如风。加布里埃尔沉默地盯着那堆还没动过的文件，长长吐了一口气。上头的意思很明确——今晚必须全部搞定。米纳斯吉拉斯所有的咖啡加起来，恐怕都不够撑他熬到天亮。但他知道，真能让他撑下去的，从来不是咖啡，而是饭碗悬在头顶的那把刀。他默默走向茶水间，给自己和同事又倒了两杯苦涩的浓黑饮料。他站在原地，任由这片刻的安宁笼罩自己，他很清楚，这大概是未来很长一段时间里，唯一属于他的平静时刻。"
 brazil_lacerda_samba.88.a: "今夜会很漫长。"
 brazil_lacerda_samba.88.tt: "£GFX_BRA_UDN_statism_texticon §Y经济国家主义§!已达到75%，将应用以下修正："
 brazil_lacerda_samba.89.t: "此时此刻，我们并无差别"
 brazil_lacerda_samba.89.desc: "巴西利亚帕拉西奥酒店是现代主义的产物。宽阔的落地窗、锐利的立柱造型与局部点缀的立体派艺术元素，共同构成了这座风格奇异的建筑。五十年前，这种设计在欧洲传统大都会之外还极其罕见。鉴于其鲜明的海外文化印记，选择在此集会的强硬民族主义组织便显得格外耐人寻味。\n\n这场名为“民族主义议员阵线”的会议，是由一批致力于对抗外资对巴西经济渗透的参议员发起的松散同盟。参与者的政治光谱相当驳杂——未公开身份的共产主义者与自由派人士密切交谈，社会民主主义者则与强硬派保守主义者维持着礼貌的交流。\n\n此刻会议已告结束。演讲者与听众纷纷涌入宽敞的酒吧。往昔此地总会上演传统戏码：几杯下肚后，某些瓦加斯主义者开始激烈批判全民盟及其对外资的谄媚态度。在场少数全民盟成员只能强忍不快。然而时代在变。\n\n今年多数人以为会听到相似的论调，尤其是当下总统职位正被对手把持，但他们却意外选择了沉默。与此同时，竟有八名全民盟参议员加入到这个联盟——倒也情有可原，毕竟在全民盟执政期间，原有的贸易保护政策不仅得到延续，甚至在还变本加厉。"
 brazil_lacerda_samba.89.a: "当有人站在你这边时，你很难和他过不去。"
 brazil_lacerda_samba.89.tt: "£GFX_BRA_UDN_cooperation_texticon §Y合作§!已达到25%。将应用以下修正："
 brazil_lacerda_samba.90.t: "孤注一掷"
 brazil_lacerda_samba.90.desc: "“听着，弗兰克，巴西经济现在一路飙升。”这位金融经纪人盯着对面墙上美林的徽标——要是现在搞砸了，自己在这地方也待不长了。他压低嗓音道：“交易都在顺利进行，这么稳赚的好机会刚起步，您可不想错过吧？”\n\n富豪客户捻着胡须：“别说得这么武断，《读者文摘》两周前那篇报道还有点存疑呢，他们总不会造假。”\n\n“两周前？看看现在的情况吧？债券收益率下挫，房价涨势喜人，至于政治——”经纪人喉咙一梗，他上个月才在地图上找到巴西利亚的位置。偷瞄着夹在文件夹里的党政备忘录，他硬着头皮继续道：\n\n“美林观察巴西市场十几年了，现在他们的参众两院简直是空前团结。虽然短期政治波动难免，但各项法案推进得那叫一个利索。这可是我经手过最优质的标的，以您的资产配置来说，绝对值得添上这枚棋子。”\n\n他保持端坐的姿势，只有指尖在不停摩挲领带，眼睁睁看着挂钟秒针就要走完一圈。今天不签下个七位数订单别想下班，就是天王老子也别想拦着。买啊，赶紧痛快下单吧！\n\n客户突然站起身：“这样吧，先投两千块指数基金试试。真像你说的那么神，咱们下次再详谈。”\n\n经纪人面色由潮红转向正常：“感谢您的信任，巴西人民会记住您的。”"
 brazil_lacerda_samba.90.a: "从巴西利亚到纽约，合作包治百病。"
