 BRA_lacerda_udn_increase_y: "推动自由市场思想"
 BRA_lacerda_udn_increase_x: "加强对对手的口头攻击"
 BRA_lacerda_udn_decrease_y: "支持经济集中化"
 BRA_lacerda_udn_decrease_x: "淡化民粹说辞"
 BRA_lacerda_hide_udn_decisions: "隐藏党派意识形态决议"
 BRA_lacerda_udn_info_tt: "自1950年成立并将反瓦加斯主义作为唯一的准则起，全民盟就从未团结一致过。尽管总统不愿如此，但党内仍有许多意见不一的派别，也都有各自的好恶。\n\n国策、事件的选项和决议都会影响政府的倾向。自由主义-国家主义轴衡量的是巴西对自由放任资本主义的拥护程度，影响集权度和通货膨胀；而合作-强硬轴衡量的是政府是否愿意达成共识或坚持总统的意愿，它决定了跨派别政治接触的可能性。\n\n最后，注意党的忠诚度。若是失去了参议员们的信任，他们就有可能被别的党派所吸引。"
 BRA_lacerda_udn_seal_tt: "[GetBRA_lacerda_udn_seal_tt]"
 BRA_lacerda_udn_party_loyal_loyal_desc: "“全民盟对我一直很好。这是我的党，代表着我所信仰着的东西。党的领导层很好，一般的党员也很好——说实话，我真不能想象去别的地方。”"
 BRA_lacerda_udn_party_loyal_fence_desc: "“你看，全民盟是我的党，但有的时候，我都认不出来它了。下层有问题，上层也有毛病——说实话，我有点找不到支持它的理由了，而这本应是党来告诉我的。”"
 BRA_lacerda_udn_party_loyal_disloyal_desc: "你看到了吗？这个狗操的头条！这还是我的党吗？上帝啊，上层争斗不休，下层虚弱无力——说实话，社进党已经邀请我去参加他们的一些会议了，我说不定哪天就真去了。"
