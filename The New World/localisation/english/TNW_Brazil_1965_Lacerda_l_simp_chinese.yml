 BRA_razors_grip: "剃刀柄"
 BRA_razors_grip_desc: "巴西是正直的国度，这里的规矩是有能者居之。正如塔沃拉上校为同胞树立了英勇服务的榜样，他的继任者也应遵循他的先例，为巴西利亚动荡的政治格局建立稳定。\n\n作为一名退伍军人，内伊·布拉加真正为人民着想、追求繁荣政策——戈尔贝里对此也深有体会。社会民主党不会得逞，总统宝座屹立不摇，这将是我们时代的和平。"
 BRA_razors_grip_tt: "£BRA_psd_texticon §Y儒塞利诺·库比契克§!的支持率§Y降低§!。\n£BRA_udn_texticon §i内伊·布拉加§!的支持率§Y上升§!。\n"
 brazil_lacerda.227.t: "自由之歌"
 brazil_lacerda.227.desc: "“您现在收听的是巴西之音电台特别快讯——巴美双边条约已于今日正式签署生效，标志着巴西利亚与华盛顿之间的外交商贸关系正迈向更紧密的新阶段……”随着录音棚内人员到齐，一名场务人员快步上前调低了收音音量。雅尼奥·夸德罗斯站在房间里，一反常态地显露出威严气度，紧接着被引导入座。\n\n“下午好，”主持人开口，“欢迎收看图皮新闻频道。我们非常荣幸邀请到雅尼奥·夸德罗斯先生来到演播室，就我国与美利坚合众国关系的最新动向发表见解。”\n\n“很荣幸参与节目。我已多次表明观点，我国总统长期忽视国际站队带来的明显弊端，这种态度令我深感忧虑。身为一个本可成为各国可靠合作伙伴的国家，巴西明明能从更开放的外交政策中获得巨大利益，现况怎能不让人为我国的未来担忧？”\n\n街头的骚乱打断了访谈进程。伴随玻璃碎裂的低沉声响，暴徒高呼“美帝国主义滚出去”，另一支与之对峙的游行队伍擎着OFN的蓝色旗帜，用“法西斯走狗”和“打倒纳粹帝国主义”的口号进行反击。\n\n总统府的密室里，拉塞尔达与戈登正在秘密会晤。烈酒开瓶的声响中，戈登眼底泛着亢奋的光：“拉塞尔达，你总算动手了。美洲两大强国携手，这片大陆将前所未有地自由和安全。”\n\n“捍卫国际自由本是我的分内之事。”拉塞尔达报以心照不宣的微笑。"
 brazil_lacerda.227.a: "巴西与美国的国旗一同飘扬。"
 brazil_lacerda_imp.115.t: "卡洛斯·马里盖拉个人小传"
 brazil_lacerda_imp.115.desc: "1934年，面对泪流满面的父母：“我知道你们为我没能毕业而痛心……我知道。但，还有比这更重要的事……妈妈，是这个世界啊。这个世界正岌岌可危……”\n\n1936年，透过冰冷的铁栏：“说到底，也不过是一首诗。可在茹拉西眼里，这就够让我坐牢了？”\n\n1939年，在狭小的牢房中写下诗句：“若是为你受尽酷刑／我也会欣然赴死，无惧疼痛／含笑而终，轻唤你的名字……”\n\n1964年，看着坦克碾过街头：“面对民主，即使它只是资产阶级的伪装，资本的走狗也宁愿撕下那副面具，而不肯再演这场戏。”\n\n1966年，伏案疾书：“我们不能再忽视巴西共产党反复暴露出的意识形态软弱。马克思主义者若没有思想的坚定，党所走的路线就注定没有前途，只能走向溃败。”\n\n1967年，在一次争论中拍案而起：“我们在这儿大谈切·格瓦拉的英雄事迹，可一到我们自己要对抗法西斯，就只剩下‘克制’二字！我们究竟在怕什么？是宁可被枪口指着，也不愿反击？”\n\n1968年，在被赶出党内会议的一刻怒吼：“拉塞尔达正把我们逼向绝路！我们不能坐看他的走狗撕开我们的喉咙！我们必须——”\n\n1969年，信念重燃：“城市游击队之所以存在，它赖以生存与战斗的唯一方式，就是开火。游击队员必须是射击的能手——这是最基本的生存法则。”"
 brazil_lacerda_imp.115.a: "1970年，身旁是新成立的民族解放阵线：“我根本没时间害怕。”"
 brazil_lacerda.228.t: "误会"
 brazil_lacerda.228.desc: "墙上的扩音器突然响起刺耳的电流杂音，囚犯们在拍照间里不约而同地缩起脖子。沙哑的烟嗓命令道：“背对墙壁举起编号牌”。两名警官的身影模糊地映在钢化玻璃后，头顶频闪的荧光灯管发出嗡嗡声，照着他们眯眼审视的模样。囚犯们懒洋洋地照做。闪光灯骤亮。“现在转身。”又是一道刺目的白光。\n\n三名日裔男子再次被铐上手铐时，当地警察局长皱着眉头踏进隔间：“妈的，臣道联盟那些杂碎还真阴魂不散。”两名警员附和着低语，完全无视囚犯们困惑的表情。最右侧的囚犯忽然冷笑出声。\n\n“这帮小混混在哪儿抓的？”局长抱着胳膊挠了挠没刮干净的胡茬。\n\n左侧的警员指着两名犯人汇报道：“这俩在马里亚纳镇跟共产党游行，照例又是那些反政府口号。后来示威升级……”，他的手指移到最右侧，“就跟他们自己人——‘皇道社’的人干起来了。”\n\n“意思是……不是臣道联盟？”局长低声追问。得到否定答复后，他啪地一拍手：“没关系，先送去再审一轮。说不定能钓出更多臣道联盟的漏网——”\n\n“是‘皇道社’，长官。臣道联盟早就解散了。”警员小心翼翼地纠正道。"
 brazil_lacerda.228.a: "“行行行，知道了。”局长嘟囔道。"
 brazil_lacerda.229.t: "五彩缤纷"
 brazil_lacerda.229.desc: "利芒区曾是窥见巴西乃至全球社会的一扇窗口，但本国人却鲜少注目。正如哈莱姆区之于纽约的文化意义，利芒对圣保罗有着同等分量，其原因如出一辙。难怪全民盟的造势活动在此遭遇了彻骨寒意。\n\n巴西保守建制派决定尝试争取非裔群体的支持。全民盟竞选团队策划了一场小型街头宣传活动，他们盘算着以最小成本为政党形象镀金。\n\n不祥之兆从开场便已显现。当工人们在蒂埃特河滨大道附近的居民区封锁路段搭建舞台时，本地商户和工人家庭就用倦怠的眼神冷眼旁观，对这番政治作秀丝毫不买账。\n\n那位满头银发的全民盟元老代表，虽具职业政客的演说才能，却无力（或根本无意）扭转该党在利芒的负面形象。充满敌意的目光与讥讽的窃语逐渐汇聚成倒彩的洪流，其间夹杂着不堪入耳的咒骂。\n\n一只波西米亚啤酒瓶抢尽风头——它擦着全民盟代表耳际飞过，仅一寸之遥。这记“开幕礼炮”旋即引发连锁反应。人群如火山喷发，上千种垃圾暴雨般砸向代表与随行干部，最终迫使他们弃台而逃，钻进奔驰车仓皇离去。舞台上、街道间，只余满地狼藉。全民盟确实以荒诞的方式实现了目标：利芒居民收获了整晚欢乐，只不过代价全由该党买单。"
 brazil_lacerda.229.a: "接受采访时的民众称这是“一次阖家欢的娱乐活动”。"
 brazil_lacerda.230.t: "报告：关于“统一黑人运动”活动"
 brazil_lacerda.230.desc: "应总统办公室要求，随函附上该部门对统一黑人运动（“运动”）活动的摘要，其已被定性为应密切关注的激进组织。\n\n由其名称可知，该“运动”主要由非裔巴西成员构成，本质上有颠覆性与反政府倾向，从自认受到现任政府官员不公对待的部分群体中招募成员，且致力于以尽可能高调的方式频繁地采取直接行动。目前尚不清楚是否有外部资金来源（无论是否存在或是否在位）。\n\n重要的是，“运动”的反政府意识形态以反对具体人物、声誉、及总统和内阁的政府政策为核心。这虽然大大提升了该运动在政府政策执行中的可见度，但也确保了其关注点和行动不会频繁地集中在一般的国家举措上。这有利于研究出一种降低其煽动骚乱有效性的方法。\n\n若总统办公室有进一步了解或调查的需要，该部门将予以配合。"
 brazil_lacerda.230.a: "令人担忧。非常担忧。"
 brazil_lacerda_guanabara_recon.14.a: "“阿加塔，亲爱的，我得跟你说说刚才打过来的那个号码。你能不能跟这栋楼的接线员说一下，别让它打过来了？非常感谢。”"
 brazil_lacerda_guanabara_recon.14.desc: "“是，会长先生，我看到您的提案了。就在我桌上呢。写得很好，我昨晚也看见您叫来的那群绅士们在我家外边吵个不停了。还有今天在我的工地上也是。噢，您说那不是您干的？是吗？”\n\n康斯坦丁诺斯趴在桌上，他的胳膊酸痛得简直要嵌进桌面了。他怎么也想不通瓜纳巴拉州贫民窟协会这么个名字拗口得要死的组织是怎么拿到他办公室的电话号码的，他恨不得宰了那个泄密的。\n\n尽管他的声音里怒气冲冲，但他确实没有说谎。他面前的文件夹里都是他对贫民窟的规划和文件。还有城市化方面的提议，以及为尽可能避免或是减少永久搬迁而提出的翻新方面的建议。这上边的提议大多都已经过时了，上边提到的许多地方都已经完工了，不过仍然值得一看，甚至还能勾起他的兴致。但也仅此而已。\n\n佐克西亚季斯放下了电话。这个会长缠着他多久了？他看了看表，但又拿不准。他站起来，穿过房间看向窗外，在此俯瞰城市的车水马龙。他想，这一切是怎么来的呢？城市和居民是如何焕发新生的呢？繁荣又是从何而来？而他对这答案心知肚明，这一切正是源于他的计划。人类群居学的核心正是变革。而变革的进程或伴有阵痛，有时也并非一帆风顺，但若排除万难，终能修成正果。他为自己的高尚情操而露出了微笑，然后回到电话前。"
 brazil_lacerda_campaign.1.t: "火炬手"
 brazil_lacerda_campaign.1.desc: "拉斐尔·马加良斯站在聚光灯下，额角渗出细密汗珠，在灯光中闪烁。他紧贴麦克风，准备为演讲画下句点：“在拉塞尔达总统的领导下，我们的国家已迈出前所未有的步伐。而若能将我党之火炬继续传承，引领我们走完下一段征途，那将是我一生的荣耀。但这并非我一人的荣耀——是你们的思想、你们的热忱、你们的辛劳，点燃了这火炬，让自由与有尊严的治理继续为巴西人民而燃。让我们一起，将全民盟的火焰高高举起！”\n\n随之而来的掌声、送别与寒暄，和其他几位潜在候选人无异。唯独不同的，是那缭绕的烟雾。灰白的烟气自一支支雪茄和香烟中冉冉升起，聚集的党内高层官员们已在一连串空洞冗长的演说后，拼命克制着点烟的欲望。熟悉的面孔们在烟雾中彼此探寻，漫天话语中，间或夹杂几声深深的吸气与吐息：\n\n“……马加良斯这一仗会赢得很快。早点定下来，今晚牛排我请。”\n\n一阵爽朗笑声响起，接着有人说道：“可别在晚餐前就把布拉加州长排除出局。他在巴拉那的政绩可不小。”\n\n“——本以为‘务实派’会对总统的人选起点反弹，怎么，拉塞尔达终于把你说服了？”\n\n“他有选票。他的幕僚长也有选票——拉斐尔是顺理成章的继承人。我们只需要一个务实稳健的副手，来平衡搭档，稳住波萨诺瓦派。”\n\n“呵。”长长一口烟气喷出，“这话倒让我想起另一个马加良斯……”"
 brazil_lacerda_campaign.1.a: "当那烟雾散尽，全民盟的总统与副总统候选人也随之揭晓……"
 brazil_lacerda_campaign.1_tt: "§Q拉斐尔·马加良斯和马加良斯·平托！§!"
 brazil_lacerda_campaign.2.t: "指导环节"
 brazil_lacerda_campaign.2.desc: "里约德比期间，马拉卡南体育场的包间票可不便宜。但要作为赠予自己好友之子，手下雄心勃勃且狂热的参谋长兼当下总统候选人的礼物，拉塞尔达觉得没什么能比得上它。\n\n中场休息哨声吹响，拉斐尔·马加良斯所看好的弗鲁米嫩塞队小跑着离开球场，拉塞尔达招手示意自己的门徒来到包间深处，避开相机镜头与窥视者。拉塞尔达面带徽笑，端起一杯香槟说道：“弗鲁米嫩塞罚点球的时候你看起来比处理罢工那时还紧张，坐，好好休息休息。”\n\n拉斐尔笑了笑，随后严肃地说：“最近我有点焦虑。每次一到演讲或出席我生怕自己出丑。毕竟我不止代表个人，更代表着全民盟与巴西。”他轻轻一笑。“没有哪个行政官员能做好万全准备。”\n\n卡洛斯盯着拉斐尔的双眼，说道：“你不总是一位行政官员。我曾与你的父亲一同去科帕卡巴纳海滩看你的比赛。你在沙滩上飞奔、传球、铲球、叫喊着，把自己弄得汗流浃背，满脸通红。但你总能进球得分，一次又一次反复得分。”\n\n拉塞尔达涨红了脸，同时也抬高腔调说：“那些球霸，平托的手下和世上的波萨诺瓦派，他们只想着走T台炫耀自己。这些人不是来干实事的，甚至都不知道该以何为目标。但你不一样，你很清楚目标就是改善巴西民众的生活，让他们在政府治下有尊严的活着。”\n\n“敬每个人的尊严。”拉斐尔举杯敬酒，两人一饮而尽。等到哨声再次吹响时，杯中美酒已尽，马加良斯开怀大笑。拉塞尔达将一只手搭在他肩上，说道："
 brazil_lacerda_campaign.2.a: "“中场休息结束，该你上场了。”"
 brazil_lacerda_campaign.3.t: "商务午餐"
 brazil_lacerda_campaign.3.desc: "巴西投资银行的办公室里，一场愉悦的午餐正如火如荼地进行。银行家和分析师们安坐席间，享用着银行提供的海鲜盛宴。鱼子酱、龙虾和明虾从餐盘优雅地跃入饕客口中。当午宴逐渐延伸成午后狂欢时，生蚝就着香槟被送下喉咙，人们为拉斐尔·马加良斯当选全民盟候选人的祝酒辞越发热烈，虽然祝词渐渐变得语无伦次。拉塞尔达总统大刀阔斧简化行政审批后，他们对巴西钢铁制造业的投资已增值四倍——如今举杯庆祝他钦定的继任者有谁会说不是呢？\n\n在格戴冶金厂这块巴投行金融皇冠上新晋的明珠之地，焊花飞溅中，一排排流水线工人拖着脚步前行。紧缩的胃袋催促着脚步，饥饿的眼神搜寻着保温杯或纸杯里的咖啡。但面色阴沉的工头已守候在休息室门前。人群如扇形将他围住时，他宣布今天的午休时间要减半——需要额外挤出十五分钟赶完这批订单。\n\n巴投行那位脑满肠肥的财务总监消灭完最后一只黄油蟹钳，惺忪睡眼恰好瞥见时钟。该催员工回来干活了。但这时，那位被留守在大机房监控股票走势的年轻分析师冲进了宴会厅——投资组合又涨了14%，全市场正在疯狂追捧“拉斐尔概念股”，而格戴正是领头羊！\n\n欢呼的同事们将年轻人高高抛起。很快整层办公楼都回荡起震耳欲聋的口号："
 brazil_lacerda_campaign.3.a: "“他是个快活的好小伙儿，是个快活的好小伙儿……”"
 brazil_lacerda_campaign.4.t: "以行服人"
 brazil_lacerda_campaign.4.desc: "拉斐尔·马加良斯正在进入敌方领土。环卫工工会大厅里红黑相间，满是竞争对手弗拉门戈足球俱乐部的装饰，不过对他的竞选更重要的或许是工党的小册子。拉斐尔经过一张褪色的若昂·古拉特海报，他的胸口好像故意似的突然一紧。左派的选票在此难以动摇……\n\n不过他一转过拐角，就看到全工会都列在面前，脸上带着敬畏之情……和笑容？那个大胡子的本地人走进他，咧嘴笑着递出手。拉斐尔一握，那人赏以结实而友好地一巴掌拍在他背上。这一幕让大半个工欢呼雀跃，纷纷开始挤向候选人。\n\n一个老态龙钟的环卫工开口：“我们以为全民盟都是老板的党，光知道掏空咱们口袋往他们那塞。还以为—— ”\n\n一个不过拉斐尔手肘的矮胖女人插话：“现在咱知道那都是搞选举的瞎说啦！你骗到了他们——北美佬。让他们在这开工厂，我表——”人群突然爆发出一阵嘈杂打断她，但她马上捡起话头，“还有他们的枪，给咱们又能打那帮高乔人啦！”\n\n工会领头吹了声哨静下屋子。看来他趁这档子偷溜回大厅取下杨戈的海报，现在握在他肉乎乎的手里。“你们全民盟的人是打算像以前一样管这个国家？还是照你们现在说的那样办？”他嘴上微笑着，眉毛却扬了起来。\n\n拉斐尔咽了咽说：“我和我党会好好治国，也正是你们所期望的。”"
 brazil_lacerda_campaign.4.a: "一片喝彩叫好声中，工会主席撕开那张海报说：“那咱们就投全民盟。”"
 brazil_lacerda_campaign.5.t: "《头条》一瞥"
 brazil_lacerda_campaign.5.desc: "听闻拉塞尔达总统批准《头条》杂志的专访时，拉斐尔·马加良斯着实吃了一惊——这份刊物与前总统库比契克的密切关系人尽皆知。但此刻他斜倚在《头条》编辑部真皮沙发里，任由摄影师拍摄奉承般的肖像照，应对着满脸堆笑的记者抛来的软柿子问题，他不得不佩服总统的判读力。乌鸦果然深谙媒体之道。\n\n又一阵闪光灯掠过他轮廓分明的侧脸后，拉斐尔转向那位故作困惑的记者，答案早已成竹在胸：“新建瓜纳巴拉州的经历，让我对联邦体制的理论运作……以及实际操作有了独到见解。我期待与各州州长建立紧密合作关系。”\n\n记者点头速记片刻，突然放下采访本。他咖啡色的眼眸里闪过一丝新的锋芒：“《头条》读者最关心的是政府在经济中的角色。您曾帮助拉塞尔达总统竞选，想必知道他曾主张监管正在扼杀巴西企业，您如今还坚持这个观点吗？您的政府会进一步削减监管保障吗？”\n\n咔嚓。拉斐尔暗自祈祷别用这张照片——上面的人物眉头紧蹙，眼神愕然。他强撑笑容迎接下一个拍摄角度，大脑飞速运转。竞选时拉塞尔达总统确实许诺要砸碎监管枷锁，但执政后的经济政策充其量只是温吞水。该沿用导师那套诗意的说辞吗（即便可能被视为对现行政策的暗讽）？还是该另辟蹊径，亮出全新主张？"
 brazil_lacerda_campaign.5.a: "“跟大多数人一样，我深受拉塞尔达总统宏图的鼓舞，志在清除阻碍我们的条条框框。”"
 brazil_lacerda_campaign.5.b: "“卡洛斯·拉塞尔达总统出色地引导了我们的经济，能延续他的政策是我的荣幸。”"
 brazil_lacerda_campaign.5.c: "“我的行政经验足以区分有效监管和过分监管。我更向往良法之治。”"
 brazil_lacerda_campaign.6.t: "久经考验的信仰"
 brazil_lacerda_campaign.6.desc: "“我认真的，鲁本斯。我敢发誓我亲眼看到三个全民盟的人闯进来。你是想害死我吗？”鲁本斯·派瓦笑逐颜开。跟他晚上一起出来玩的莱昂内尔·布里佐拉有两点好：他不仅人缘好，而且是个好伙伴。鉴于众议院那边缺乏幽默感的同事，这人还算不错。\n\n“我听说他们在纪念轴大道弄到个办公室之前还没这么多事”他拿起蘸着油醋汁的银叉，回答道。“如果这个国家尚存一丝正义，你现在应该不会有事。”\n\n布里佐拉脸上苍白的笑容消失了，只得点点头。“过去几年不太好啊。拉塞尔达和他对“生意”的热爱是一回事，可工总指对劳动法的让步完全是另一回事。我们太没骨气了。”\n\n派瓦的眼中闪过一丝玩味的光芒。“好吧，要论生意上的事，或许找个圣保罗人帮帮忙也不错。”他撇着嘴说道，目光紧紧地盯着自己的盘子。\n\n“我……”布里佐拉的瞳孔猛地瞪大。他顿时停了下来，咽了口唾沫。“党内已经说好让我和达西·里贝罗一起竞选了。我无能为力，鲁本斯，对不起。”\n\n是里贝罗。派瓦突然僵住了。他想起刚才在投票大厅走廊看见了那家伙的模样——拿着钢笔在纸上奋笔疾书，仿佛那关系着他的身家性命。说实话，那家伙此刻估计还在写写画画，他们这次选了个拼命三郎，这点毋庸置疑。\n\n“不，我的意思是，这只是个玩笑，真没别的意思，我就是这个意思。”意识到他三度提及“意思”这个词，他愣住了，然后点了点头，接着用餐。“无论谁是候选人，我都会和你并肩作战。你可以相信我，莱昂内尔。”"
 brazil_lacerda_campaign.6.a: "危机当前，退无可退。"
 brazil_lacerda_campaign.7.t: "“热烈”的欢迎"
 brazil_lacerda_campaign.7.desc: "“欢迎来到库里蒂巴！”拉斐尔·马加良斯的道格拉斯DC-3专机广播里传来激昂的宣言。这位主人显然不如他的飞行员那般热衷于集会造势。若真要按照计划，连续一周每天辗转各州首府演讲，他今天必须让东南部的商贾们发声力挺——说白了，就是掏出些竞选老本。\n\n但集会日终究来临了，只不过主角不是他。前往会场的路上，他那辆乌亮的凯迪拉克突然陷入口号与标牌的汪洋。车内温度似乎每分钟都在攀升。他与司机交换着同样困惑的眼神。即使隔着防弹轿车的厚重装甲，“资本家”的指控声仍清晰可辨。突然间，他心头涌起一丝好奇。\n\n“先生，别——”可车窗已经降下，马加良斯终究没能按捺好奇心。他心想，了解是谁在猛烈抨击一个素不相识的人（他敢打赌这些人甚至不知道他先前从事什么职业），总归是宝贵情报。身着简朴衣裳的学生们高举血红横幅，标语写着“勿让M步L后尘”，荒诞更甚于尖锐。接着映入眼帘的，是他被丑化成行罗马礼、践踏人权的法西斯独裁者的漫画。\n\n这时人群中有个魁梧男子发现了探出车窗的脑袋。见对方横冲直撞推开人群扑来，司机猛踩油门冲出堵塞的街道。但这场意外终究给了他警示：众人眼中只认师徒，弟子竟要替导师担罪。"
 brazil_lacerda_campaign.7.a: "至少他们心系社会。"
 brazil_lacerda_campaign.8.t: "醉狗互咬之夜"
 brazil_lacerda_campaign.8.desc: "这是一个在乌贝兰迪亚郊区，一家被称为“老狗”的小酒吧里安静的晚上。酒吧里的顾客们正在消磨他们的夜晚。酒吧老板路易斯正在打扫战场，宣布今晚打烊了。\n\n“当时觉得这主意挺靠谱，现在嘛……算是吹了。”雷纳托说道。他本来就不怎么去酒吧，但几个朋友硬是拉着他一起来了。\n\n“就像上次我投票给拉塞尔达一样。”里卡多说道，他是这家酒吧的常客，也是老板的爱客，因为他常会给点小费。\n\n雷纳托的另一个朋友贝尼西奥打趣道：“所以你真把票投给他了？”\n\n“是啊，但我并不完全知情，”他胡乱地打着手势，“果然搞成这样了。但愿全民盟能提名个靠谱的人，好歹让我的票有人可投。”\n\n众人哄笑起来，”知道吗，\"贝尼西奥说道，\"事务所里现在简直是个政治炼狱。两个高级助理干了一架，一个是全民盟的铁杆支持者，另一个是社民党的狂热拥趸。两人吵得不可开交，现在整个事务所都被卷了进去。我敢打赌，他们现在分配办公室绝对是按政治站队来的。”\n\n众人哄笑起来，雷纳托也分享了他在工厂遇到的类似闹剧，引得大伙儿又是一阵哄笑,“拉塞尔达这家伙可真会挑事，是不是？\"里卡多说道。\n\n“呵，他也就这点本事了，”雷纳托讥讽道。角落里的两个男人突然打断了众人的谈笑，他们原本一直自顾自喝着闷酒。“闭嘴，”其中块头更大的那个口齿不清地吼道，“拉塞尔达为这个国家做的贡献，比你们这群废物加起来都多！”\n\n“得了吧！要是我干了他那些‘壮举’，早该蹲大牢了，”雷纳托反唇相讥，同伴们爆发出一阵怪笑，“少说也得判个无期！”众人笑声未落，路易斯却警觉地瞥向角落那两个男人，可手头的清洁活儿还得干，只得悻悻转回身去。\n\n就在这群人毫无防备的当口，那两个男人突然逼近，大块头抡起酒瓶砸向雷纳托的脑袋，贝尼西奥一个转身飞踹，正中对方腹部。这时，较瘦的那个反手就给了贝尼西奥一耳光，里卡多见状立刻加入混战。霎时间拳影翻飞，有的砸了个空，有的竟误伤了自己人。路易斯一头扎进人群中，连推带搡地把围观人群往酒吧外赶。"
 brazil_lacerda_campaign.8.a: "这下可有得收拾了。"
 brazil_lacerda_campaign.9.t: "曲线球"
 brazil_lacerda_campaign.9.desc: "广告播放期间，演播室短暂沉寂，拉斐尔与电台主持人稍作放松后重回访谈。采访者提出的问题对拉斐尔而言都不算刁难——多数美国记者确实如此。几分钟后直播恢复，主持人立即切入正题：“那么拉斐尔，是否可以认为若您当选，巴西将继续作为OFN的坚定成员？”\n\n“当然，无论风雨同舟，我们都将与盟友保持步调一致。”\n\n“我的最后一个问题是关于参议院的：假设他们出于某些原因，反对拉塞尔达总统苦心经营的对美友好政策，并投票决定疏远美国，您会接受他们的决议吗？”\n\n拉斐尔陷入短暂沉默。这偏离了预设的采访流程——本该是几个轻松问题后便圆满收场。但此刻全巴西数百万返程听众正收听着节目，更遑论他为争取这次露面所动用的种种人情。他凝视着悬浮在空中的问题，字斟句酌地开口……"
 brazil_lacerda_campaign.9.a: "“即便意见相左，忽视参议院的意见也是对巴西民主的伤害。”  "
 brazil_lacerda_campaign.9.b: "“即便意见相左，参议院的意见也不容忽视，但最终决定权仍在总统手中。”"
 brazil_lacerda_campaign.9.c: "“参议院不负责处理外交事务，这在美国和巴西都一样。”"
 brazil_lacerda_campaign.10.t: "最甜蜜的鼓舞"
 brazil_lacerda_campaign.10.desc: "今夜，能成为巴西最具胜算的政客之一着实令人愉悦。在挤满支持者的竞选集会上大获成功后，小瓦加斯乘车返回酒店，向面带微笑的纳特尔讲述当晚的盛况。当两人在轿车后座陷入惬意的沉默时，瓦加斯漫不经心地摸向口袋，掏出一叠信封，开始检视当天收到的信件。他面无表情地快速翻阅，直到在某封信前突然停顿，挑起眉毛，随后挂着玩味的笑容将信递给纳特尔。\n\n纳特尔小心翼翼地接过信件扫视内容，随即翻了个白眼摇头。这是封情书——字里行间的暗示如同冰面上的河马般笨拙露骨。这家伙为何要给他看这个？“虽然你在政坛之外的‘战绩’令人印象深刻，但老兄，这种私事总该谨慎些。”\n\n瓦加斯短促地笑了笑：“噢，我绝不会背叛我的爱侣，任谁都动摇不了。不过——”他伸手点住信纸，食指缓缓划过寄件人的姓氏。纳特尔凑近辨认出这个与圣保罗市议会某位社民党大佬相同的姓氏。“不知这位先生若知晓心上人四处留情会作何感想。倘若我们手握证据，或许能让他重新考虑政治站队。”\n\n纳特尔凝视他片刻，脸上掠过万千情绪。"
 brazil_lacerda_campaign.10.a: "自豪，仰慕，以及畏惧。"
 brazil_lacerda_campaign.11.t: "充实备战金"
 brazil_lacerda_campaign.11.desc: "拉斐尔·马加良斯用铅笔不断敲击着面前堆积如山的文件，烦躁情绪随着敲击声节节攀升。电台广告、电视宣传、户外广告牌、集会场地、公关活动照片、器材运输——各项开支如滚雪球般疯狂膨胀。这场竞选已成为全民盟史上最烧钱的政治战役，且金额差距堪称骇人听闻。尽管党内慷慨拨款勉强维持着资金链，但根据他反复核算十余次的账目，若按当前开支速度继续，竞选资金将在投票日前一个半月彻底枯竭。\n\n他攥紧铅笔。削减预算放缓节奏的念头刚浮现就被否决——不，他需要铺天盖地的宣传造势，这场战役根本输不起。巴西也承受不起他失败的代价。噩梦般的图景在脑海中翻腾：社会主义者、民族主义者、形形色色的瓦加斯式暴君将扼住这个国家的咽喉，用双倍于新国家时期的残暴手段与资源重建独裁统治。巴西数十年民主繁荣的根基将就此崩塌。\n\n啪。铅笔断成两截。拉斐尔从混沌思绪中猛然清醒，扔掉残笔大步走向电话。无论通过什么手段，必须搞到资金。"
 brazil_lacerda_campaign.11.a: "该和新老朋友们聊聊了。"
 brazil_lacerda_campaign.12.t: "慷慨奉献"
 brazil_lacerda_campaign.12.desc: "“谈妥了？太好了！感谢诸位支持！我们庆功宴上再聚。”拉斐尔挂断电话，嘴角扬起胜券在握的笑容。全民盟的拨款决议近乎全票通过——那些零星的抱怨不过是装装样子的阻挠，充其量只是些不成气候的杂音。这惊人的顺利甚至让他有些目眩，毕竟没人比他更清楚党内对资金审批的严苛程度。但此刻所有疑虑都烟消云散：全民盟上下深知此战关乎存亡，已然拧成一股绳。\n\n更妙的是，他凭借几手漂亮的操作，还争取到了超额资金。这笔意外之财让他愉悦地摩挲起先前因预算不足而搁置的竞选方案。\n\n曾经他最痛恨腐败的官僚体系如何阻挠改革甚至日常政务。但此刻他不得不向自己承认：观念正在微妙地转变。金钱是所向披靡的国王，而道德——不过是常年遭人冷落的王后罢了。"
 brazil_lacerda_campaign.12.a: "拉斐尔·马加良斯两者兼得。"
 brazil_lacerda_campaign.13.t: "数磅血肉"
 brazil_lacerda_campaign.13.desc: "拉斐尔今晨的遭遇用两个词概括再贴切不过：喧闹与挫败。全民盟内部对他追加竞选资金的请求产生了严重分歧——虽然不乏支持者，但这些声音支离破碎，令他倍感沮丧。尤其是波萨诺瓦派与务实派，几乎全程喋喋不休地重复着“削减浪费、维持预算平衡”的车轱辘话。就连拉塞尔达的部分心腹也以“可能存在资金管理漏洞”为由袖手旁观。\n\n怒火中烧的拉斐尔正欲打道回府，重新规划竞选预算，准备抛开资金问题背水一战时，一位批评者突然要求携同僚与他密谈。在全民盟总部僻静的会议室里，这群颇具影响的务实派开门见山：用新政府职位换取竞选资金如数追加。\n\n如此露骨的贿赂几乎让他当场拂袖而去。但扪心自问，他拒绝得起吗？巴西又承担得起这个后果吗？平心而论，这些人索要的并非部门要职，却足以撬动权力杠杆。可即便“合理”的贿赂终究是贿赂，这个念头仍如芒刺般折磨着他的自尊。"
 brazil_lacerda_campaign.13.a: "他不喜欢这群人，但不代表会拒绝他们。"
 brazil_lacerda_campaign.13.b: "他才不是腐败透顶的瓦加斯派，不会为此折腰。"
 brazil_lacerda_campaign.14.t: "皮洛士式承诺"
 brazil_lacerda_campaign.14.desc: "经过三个半小时的煎熬……会议桌周围终于响起一片掌声。马加良斯觉得这简直像拔牙般痛苦，但毕竟为自家候选人争取到了应得的竞选资金。他钻进轿车时心想，即便全民盟那帮人急得直搓手，眼下总不至于朝自己人开火。\n\n如果说先前他对这些官僚作派只是暗恼，现在他们真该来看看他的脸色。这帮人向来行事过火：就连早期那些“务实派”（不管他们自以为这名号多崇高）也绝不会为了一顿午餐动用国库分毫。如今他们处处掣肘，让他恨不得砸烂这套腐朽体制，让新鲜空气彻底灌进这个陈腐的老党派。\n\n可惜时机之窗已然关闭。光是维持竞选资金不断流，就让他背上了沉重债务，连最厌恶的派系都不敢轻易开罪。即便将来真能入驻高原宫，要收拾这帮人恐怕比对付拉塞尔达还难——但这并不妨碍他认定自己做得对。\n\n何其讽刺。他挺身参选本是为了完成拉塞尔达的未竟之事，却注定只能止步于此。也许伪善者的面具终究戴不长久，有时必须亲手拨动天平……"
 brazil_lacerda_campaign.14.a: "……但现在不是想这些的时候。"
 brazil_lacerda_campaign.15.t: "自由自在"
 brazil_lacerda_campaign.15.desc: "经过三个半小时的煎熬……全民盟会议室内人人眉头紧锁。马加良斯心如死灰。尽管他整个政治生涯都在竭力避免悲观情绪，此刻却感觉自己的竞选之路已在这个房间里夭折。没有追加经费对他而言等同于削减预算，只能勒紧裤腰带苦撑。\n\n他听着自己的竞选日程被当场修改，电视广告时长惨遭腰斩，申请多时的麦克风系统也被束之高阁。他向来与务实派势不两立，如今更是恨之入骨。或许这次，他们终将看清自己为全党掘好的坟墓，但他心知肚明，这些人永远不会醒悟。\n\n无所谓了。他迈着机械的步伐走向轿车，心想无论这场败局会葬送总统梦，还是自己能绝地翻盘，至少他已阐明立场、坚守原则，即便他们撕碎了他的预算案。今晚，他要犒劳自己一顿牛排。"
 brazil_lacerda_campaign.15.a: "当然，要点个便宜点的。"
 brazil_lacerda_campaign.16.t: "劳工的眉脊"
 brazil_lacerda_campaign.16.desc: "拉塞尔达的任期历来饱受非议。巴西的左翼曾屈服于拉塞尔达的威压之下，但却死而不僵。而此次选举终于彻底粉碎了他们多年来的阴谋，拉斐尔早已看破了他们的技俩。\n\n莱昂内尔·布里佐拉在竞选活动上如鱼得水。他遍访全国，直面选民，以雄辩和承诺赢取阵阵喝彩。报纸长篇累牍地报道他会见工会高层，同他们谈笑风生，重申联合工会。乡野间到处都是他的海报和标语，而丝毫不见拉斐尔的踪迹。\n\n虽然联合并不容易，但他们却还是为着一个理由团结在一个人周围：是时候终结拉塞尔达主义了。他们所有人都被这位左翼民粹主义者的花言巧语蒙蔽，将拉斐尔想要守护的那些全民盟的伟业统统当成了眼中钉。他们被布里佐拉那振振有词的春秋笔法乃至信口开河欺瞒，自认为是在为某种恶行救赎，而事实上不过是被全民盟内的反对派当了枪使。而这只会让巴西为了虚无缥缈的意识形态而走向毁灭，到那天，全世界都将见证巴西繁荣的终结。\n\n然而哪怕失之毫厘，亦能导致差之千里。拉斐尔放下最新的报纸，他的桌上早已杂乱无章地铺满了一大堆。他盯着报上布里佐拉的笑容，只见那眼中闪烁着胜利的光芒。"
 brazil_lacerda_campaign.16.a: "拉斐尔看在眼里。拉斐尔不能坐视不管。拉斐尔打了个电话。"
 brazil_lacerda_campaign.17.t: "强强对决"
 brazil_lacerda_campaign.17.desc: "闪光灯如箭雨般射向舞台，刺眼的黄色灯光将整个台面笼罩在仲夏夜般的朦胧里。观众的喧嚣声与刺目的光线交织，形成压倒性的声浪。这场对决的时刻已经准备就绪。\n\n舞台一侧，在狂热人群视线不及之处，自称“人民冠军”的布里佐拉如中流砥柱般静立。他神情淡然，唯有眉宇间隐约凝聚着蓄势待发的锋芒。工作人员正忙着将餐巾塞进他的西服口袋，有人进行最后的补妆，有人反复核对战术要点。辩论台虽非他惯常的战场，但面对观众他驾轻就熟——政治辩论不过是一场动态集会罢了。仍有人被激进主义论调所惑，对人民社会党心存畏惧。此刻正是他向国民展现沉稳政治家形象的最佳时机。\n\n舞台另一端，拉斐尔正轻轻踮着脚跟晃动。幕僚们同样在为他梳理既定策略，而他脑海中已浮现出即将展开的唇枪舌战。没人能否认这位行政官僚的胆识，但他向来是幕后操盘手，鲜少站到聚光灯下。如今他必须将这种特质转化为竞选期间若隐若现的公众形象——他能做到吗？他用余光扫视舞台，眼前仿佛浮现出各种预演场景。\n\n“先生？先生？”身旁的幕僚注视着他，期待他回答那个几乎被喧嚣淹没的问题。\n\n拉斐尔恍然回神，重新接上中断的对话：“战术安排，对。如你所说，布里佐拉必定会试图瓦解我的形象并诋毁我，所以……”"
 brazil_lacerda_campaign.17.a: "“……我们应当直击要害。就其激进主张与模糊政策发难，让民众看清漂亮话背后的真面目。”"
 brazil_lacerda_campaign.17.b: "“……我们应当聚焦于自身竞选主张，稳固形象，让他主动攻讦。让民众看清漂亮话背后的真面目。”"
 brazil_lacerda_campaign.18.t: "先发制人"
 brazil_lacerda_campaign.18.desc: "拉斐尔摩拳擦掌准备发起攻势，仿佛举国上下的目光聚焦在他身上，让他的心跳也稍微快了一些。他又扫了一眼手中的笔记，脸上露出坚定而谦逊的笑容。\n\n“感谢大家今天来到这里。面对崭新的十年，我们需要崭新的领导力量。我为我国民众对国家大事的关注，以及选民们了解投票意向的热切，感到十分骄傲。”\n\n“这引出了我的第一个问题。巴西将会投票给谁？很遗憾，我作为一名选民，至今还未从布里佐拉先生那里得到答案。贵党是否有人愿意向我阐明，你们到底代表着什么？”\n\n镜头突然切换到布里佐拉，他额头冒出一层细汗，显然是猝不及防。“我——州长——州长，我很震惊——这——”\n\n“确实震惊，没错！”拉斐尔打断道，“真令人震惊！您竟然能像您在众议院的共产党人一样含糊其辞。现在，下一个问题。有没有人能像布里佐拉先生和他那无能的政党已经做的那样，毫无廉耻地背叛这个国家？”\n\n马加良斯平静地站着，纹丝不动。场外爆发出一阵狂热的欢呼，引得大部分观众也跟着热烈鼓掌，只剩下目瞪口呆的布里佐拉和面露不悦的主持人，布里佐拉在众目睽睽之下已是瞠目结舌。主持人敲打着麦克风。"
 brazil_lacerda_campaign.18.a: "开场五分钟便取得领先！"
 brazil_lacerda_campaign.19.t: "虚晃一枪"
 brazil_lacerda_campaign.19.desc: "拉斐尔沐浴在闪烁的灯光中，胸有成竹地组织着言辞。台下是无数充满期待的面孔，拉斐尔与布里佐拉握手，房间里立刻安静下来，布里佐拉站在对面的讲台上，带着半是微笑的表情看向那些拿着相机的观众。拉斐尔深吸一口气，开始讲话。\n\n“感谢大家今天来到这里。这场辩论，对我来说意义重大，它不仅是让我有机会向大家展示——我，这个决心引领巴西迈入新十年的人——更彰显了这场活动本身的分量。”\n\n“我是一个拉塞尔达主义者。过去这些年，提出它的人，既是我个人的导师，也是巴西的领路人。他追求善治、繁荣与高效；这些都实实在在地改善了在座许多人的生活。最重要的是，他相信民主——这至今仍是拉塞尔达主义的根本基石。这场辩论本身正是我前任所挚爱的巴西民主的一个展示。为了民主，我将在过去的基础之上继续努力，以维护和加速我们的进步。谢谢。”他微笑着，等待掌声响起。\n\n回应他的只有寂静。\n\n首先传来一声呐喊，带着乡音，咒骂拉塞尔达是美国走狗。接着又有人怒吼，控诉拉塞尔达拆了他的家。叫骂声此起彼伏，转眼间，会场充满了嘘声和嘲笑，人群开始齐声高喊“拉斐尔让CIA操屁眼”。布里佐拉走下讲台，呼吁大家保持冷静、尊重他的对手，主持人则试图制止那些起哄闹事的人。\n\n拉斐尔僵立着，身形微缩。他看着布里佐拉不断呼吁，摄像机对着他闪个不停。他分明看到，布里佐拉嘴角掠过一丝难以察觉的讥笑。"
 brazil_lacerda_campaign.19.a: "妈的。"
 brazil_lacerda_campaign.20.t: "何为力量？"
 brazil_lacerda_campaign.20.desc: "拉斐尔很平静。这几分钟他一直是如此平静。今晚的辩论枯燥乏味，布里佐拉一直在指责政府抠门。直到拉斐尔提到教育，布里佐拉立刻猛烈抨击，说全民盟的节俭只肥了富人，而拉斐尔还想继续这么干。拉斐尔笑了，他布了一整晚的局，就为引布里佐拉上钩，现在对方终于咬钩了。\n\n“我来回应一下，”主持人示意他发言后，他对观众说道，“我想给大家念封信。”他取出一个金边信封，里面却装着一张出奇廉价、像是作业本上撕下来的纸。“信是马托格罗索州一个小男孩写的。他说：‘拉塞尔达总统，希望没打扰您工作，但我非常感激您抽空看这封信。我在州作文比赛得了奖，想写信告诉您。我家以前从没得过这种奖，我们不过是屠宰场干活的穷苦人家。爸爸说这就是我们的命，要认命。家里没人会写字，除了签名，别的字一概不认识。’”\n\n拉斐尔接着念：“‘我总爱问东问西，后来问了问我们这儿新开的辅导班，老师们挤出时间、用上资源来教我。我就想知道，让我能学会写字的东西是哪来的。老师说那是政府新拨的款——是您安排的。也许这不算啥，我没钱也没势，但您给我开了一条能写字的路。总统先生，我实在不知道怎么感谢您。’”\n\n拉斐尔把信收回口袋，全场鸦雀无声。“那个男孩，一个本对我们毫无指望的工人家庭的孩子，现在已经是《论坛报》的实习生了。这便是我矢志延续的遗产。我的对手称之为吝啬，我称之为效率。我的对手称之为腐败，我称之为教育。孰是孰非，要请大家自行判断。”"
 brazil_lacerda_campaign.20.a: "群众的欢呼便是他们的回答。"
 brazil_lacerda_campaign.21.t: "被抛下的孩子"
 brazil_lacerda_campaign.21.desc: "布里佐拉和拉斐尔均处守势，在主要巩固自身立场的同时挑一些小众政策稍作抨击，比如过度放松管制。讨论完对森林砍伐的关切之后，主持人抛出新的问题：\n\n“布里佐拉先生，您一直猛烈抨击全民盟的教育政策，但却一直回避自己的教育政策，您愿意就此问题分享一下自己的计划吗？”\n\n “当然，正因全民盟对富人完全放任，给予如此之多税收优惠，才导致弱势青年被完全无视，留给他们的经费微不足道。这种行为在我的治理下没有余地，那些钱都将投入教育。”\n\n “马加良斯先生，您如何作答？”\n\n拉斐尔紧张地挠了挠脸，“我的教育改革与不里佐拉所述完全不同。其通过开出腐败教师减少学校系统的浪费，”布里佐拉摆了个鬼脸，引得台下讥笑，“呃……还抬高了识字率，让学校重新以学生为本。”\n\n布里佐拉狡黠一笑，“容我回答，”掏出一张纸，这是他的王牌，“据教育部的最近调查，46%的一到八年级学生没法在地图上指出巴西利亚，38%不知道哪年建国，53%不知道奴隶制哪年废除，29%不知道巴拉圭战争，且30%不知道巴西参加了一战。我还可以往下说，但我觉得已经讲清楚了。”\n\n台下的寂静好像无数黄蜂蜇在拉斐尔身上，拉塞尔达可给他留了一手烂牌。"
 brazil_lacerda_campaign.21.a: "请继续，马加良斯先生……"
 brazil_lacerda_campaign.22.t: "大局已定？"
 brazil_lacerda_campaign.22.desc: "结束陈词的时刻到了。对这一刻，两人既期盼已久，又心怀忐忑。无论口才多么出众，事实多么翔实，最终都取决于这最后一搏，给国家留下了怎样的印象。\n\n布里佐拉首先受邀发言。他的变化十分明显。辩论交锋之时，他凭借本能展现出富有感染力的表达，然而，面对这谢幕时刻，他的热情却有所消退。他称拉斐尔是位“有才干的候选人”——这在拉斐尔看来，已是布里佐拉难得的赞许——但他依然坚持自己的立场。他指出，巴西是一个骄傲的民族，而拉斐尔却想引导它走向一个更像美国的方向。他询问巴西人民是否与他怀有同样的忧虑，随后结束了发言。\n\n拉斐尔语气和缓地开启了他的演讲，收敛了此前贯穿全场的那股豪迈之气。他表示，对手同样很有 才干，然后提了一个问题：“亚历山大大帝算不算有能力的领袖？”他紧接着又列举了几位声名显赫的统治者：尤利乌斯·恺撒、狮心王理查、佩德罗二世。他问道，这些人难道仅仅是有能力吗？又或者——他直视观众，更进一步地发问道——他们远远不止于此？\n\n那股熟悉的锋芒突然回归，言辞如行云流水般倾泻而出，令听众如痴如醉。“一个国家的繁荣，”他宣告，“必须由领导者为其成功燃起炽热的激情！”他宣称巴西是世界上最伟大的国家，他将不惜流血奋战，以确保她的繁荣与自由神圣不可侵犯，世界闻名。他宣告，那些关于美国的粉饰美化和窃自腐败的行为，他本人和民众不屑为之！台下观众爆发出阵阵欢呼。他描绘的未来巴西，将是南美照亮世界的灯塔，一个新生力量的摇篮。民众高呼着他的名字，他一拳砸向讲台，大声问道：“电视机前的男女老少，你们——准备好迎接自由的未来了吗？”"
 brazil_lacerda_campaign.22.a: "主持人和布里佐拉只能眼睁睁地看着。"
 brazil_lacerda_campaign.23.t: "平分秋色"
 brazil_lacerda_campaign.23.desc: "结束陈词的时刻到了。对这一刻，两人既期盼已久，又心怀忐忑。无论口才多么出众，事实多么翔实，最终都取决于这最后一搏，给国家留下了怎样的印象。\n\n布里佐拉开始发言，他的热情明显减退，但斗志未失。拉斐尔在心里叹了口气，因为布里佐拉指责他只有“官僚思维”：说他是一个有能力的人——甚至还算正派——但不够强硬，当不了保护巴西人民、抵抗那些剥削企业的领袖。他还说，拉斐尔只是在模仿美国，而非发展巴西，最后他向观众抛出一个问题：“当企业横行霸道，让你工伤后丢了饭碗，房贷到期前几天将你扫地出门、让你流落里约街头时，那些所谓的‘行政效率’又有何用？”\n\n有人鼓掌，掌声持续到拉斐尔开始陈述。他强调他尊重布里佐拉的动机，但质疑后者的能力。他指出布里佐拉的政策缺乏连贯性，批评它们不过是一堆愿望，而不是可行的施政纲领。效仿对手的做法，拉斐尔向观众提问：“当政府过度干预导致经济衰退，或者当增税迫使家庭不得不挑三拣四地生活时，再好的初衷又有何意义？”他最后强调，拥有行政能力不是对手所暗示的弱点，而是一种优势。巴西蓬勃发展的经济，正需要一个能明察秋毫、为人民利益掌舵的人。“那个人，”他宣称，“就是我。”\n\n台下观众的反应与布里佐拉发言时如出一辙：有人沉默不语，有人鼓掌欢呼。主持人向人群致辞，布里佐拉和拉斐尔彼此对视。"
 brazil_lacerda_campaign.23.a: "两人相互颔首：这是一场平局。"
 brazil_lacerda_campaign.24.t: "黄金十字架上"
 brazil_lacerda_campaign.24.desc: "结束陈词的时刻到了。对这一刻，两人既期盼已久，又心怀忐忑。无论口才多么出众，事实多么翔实，最终都取决于这最后一搏，给国家留下了怎样的印象。\n\n拉斐尔第一个上台，他的思绪被沮丧所蒙蔽。这场辩论没能显现拉塞尔达主义之真理，提给他的问题过于含糊，而布里佐拉就可以把话题聊跑题，主持人还嫌拉斐尔的辩解“啰嗦”。他把这些事当成面向观众和摄像机的最后一张牌，他要指出辩论过程中的偏见，还有台方给布里佐拉那空洞的巴西愿景所打的掩护。“ 他要把我国钉死在某种模糊不清的意识形态十字架上。”他以此作结，祈祷能传达给众人。\n\n然而，布里佐拉的陈辞让他的期望落空。这位民众主义者的激情反而有增无减，继续猛烈抨击着拉塞尔达政府及其“新奴才”。他管拉斐尔的前辈叫“迂腐的美国傀儡”，撕碎了瓦加斯为巴西奠定的基础。他还攻击拉斐尔本人“毫无应变能力”，连基本的施政纲领都说不清楚。拉斐尔死死抓着演讲台，心中怒火升腾，脸上勉强挂着一丝假笑。\n\n布里佐拉眺望着拉斐尔，自信的眼神下挂着讥讽的笑容。“巴西呀，这人说我要把我国挂上十字架。请容我反驳；要钉上我意识形态十字架上的只有残害、剥削巴西人民的思想。就是美帝国主义、裙带资本主义，还有拉斐尔的拉塞尔达主义——而在我治下，它们全都要钉上黄金十字架。”\n\n随后是阵阵掌声，虽然不足以把屋顶掀翻，但已经够把拉斐尔掀翻。"
 brazil_lacerda_campaign.24.a: "他闭着眼都能看到明天头条会写什么。"
 brazil_lacerda_campaign.25.t: "在竞选活动间喝咖啡"
 brazil_lacerda_campaign.25.desc: "拉塞尔达很高兴能和拉斐尔在福塔莱萨一家高档咖啡馆的后庭碰面。拉斐尔借此机会向他汇报了竞选过程中面临的各种挑战，还称赞了他发表的精彩演讲和一系列富有成效的讨论。\n\n此刻，拉斐尔正在讲述一个他不得不憋着笑才能说出口的故事：“……于是我就跟自由法国的大使坐在一起，他问我关于你和你总统任期的事。我刚准备开口，你猜我说了什么？”他停顿了一下，然后继续说：“我张口就叫你‘大便’！他惊得当场把咖啡撒了，整件衬衫都给染上了！”两人听到这儿，真心实意地笑了起来。\n\n拉塞尔达趁机转了个话题：“拉斐尔，你还好吗？我知道竞选对人身心的消耗有多大——”\n\n拉斐尔的笑容渐渐褪去，“我没事，别担心。比外表看上去好多了，只要喝点咖啡就好了。”\n\n“你确定吗？可我感觉你的黑眼圈已经有点——”\n\n拉斐尔挥手打断他，脸上的笑容已经彻底消失，语气变得冷漠：“够了。我说了我没事。我会做好我的事，你也做好你的。”话到此为止。两人沉默地坐着，慢慢啜着咖啡，刚才的欢快气氛早已烟消云散。"
 brazil_lacerda_campaign.25.a: "“好吧，我还有些文件要签，先告辞了。”"
 brazil_lacerda_campaign.26.t: "政治老虎机"
 brazil_lacerda_campaign.26.desc: "拉斐尔的办公室里全是快餐的味道，许久未收拾的餐盒和杯子被推到桌边，新摆上了各类文件一大袋，里边整整齐齐归类有十来个文件夹，开头各附有简短说明。酒足饭饱的余韵中，拉斐尔和幕僚长慵懒地翻阅着这些文件。\n\n“先生，这些下级起草的建议提供了若干后续工作重点，都很详细但为了节约时间起见，我们……”拉斐尔眉头紧锁，朝他举起手指，立时噤声。目光从词间一一掠过，提取出细节，又一一否决。\n\n党派色彩太重、成本太高、和上周竞选焦点太近似……拉斐尔默默把提案分为有用无用两类，无用提案之多着实让他震惊。\n\n“这两项，”他用略带油渍的手挑出两份文件，放在桌子另一头，“这两项很有用。”文件分别名为“南方工业战略”和“农村缓和战略”。“我觉得，我们要么试着在工党的后院里和他们干一仗，要么就出其不意主攻农村和原住民选民。我们之前不够重视他们，所以工党也没投入过太多精力。如果我们能把他们拉出来投票，肯定能打工党个措手不及。”\n\n幕僚长挑了挑眉回应道“这是个相当大胆的假设，另外工党的南方工人基本盘相当稳固。但假设一切顺利，我们在北方能拉来大笔选票，南方也能给工党带来不小威胁。同时如果运气好，还会有不菲的捐款收入。”\n\n拉斐尔重叩两下桌子。“该死的政治，什么时候能不用冒风险？其他选项都不可行，我们必须选择一项冒险。”"
 brazil_lacerda_campaign.26.a: "“无畏的选择往往指向胜利，我们去视察工厂。 ”"
 brazil_lacerda_campaign.26.b: "“政治有时需要孤注一掷，我们去视察农场。”"
 brazil_lacerda_campaign.27.t: "大美东北部"
 brazil_lacerda_campaign.27.desc: "适合总统乘坐的轿车有很多款，但若询问众人，丰田班代兰特绝不会出现在推荐清单上。此刻拉斐尔却正坐在这辆车的后座，前排是保镖与一位备受推崇的司机，身旁则挨着刚大学毕业的年轻摄影师。其余保镖和那群初出茅庐的记者们，则挤在后方锈迹斑斑的卡车里。\n\n布里佐拉安坐后方，任由手下在报纸上刊登广告，而马加良斯却亲临此地。他深入巴西那些候选人们从不踏足的腹地，与民众面对面！从萨尔瓦多到希克希克纵贯东北部的旅程，恰似揭开了这颗巴西皇冠上明珠的面纱——纵然蒙尘依然璀璨。葱郁雨林里斑斓的兽群转眼化作橙黄沙海，高耸沙丘吞噬着废弃小镇与农场。在这片变幻莫测的魔幻大地上，唯有湛蓝晴空与灰黑沥青公路亘古不变。\n\n车队驶入下一个斑驳墙皮剥落的小镇，主街道的坑洼比漏勺还密集。半数居民木然观望，他们凝固般的平静表情令人无从揣测演讲效果。每道目光都在审视：眼前之人是真心关切，还是穷途末路的表演？拉斐尔匆匆握手后钻回车内，刻意不去深想这座小镇的命运。当越野车盘旋山道时，他的目光久久停留在脚下奔流的圣弗朗西斯科河上。正欲沉醉于山水小憩片刻，身旁记者突然清了清嗓子。\n\n“马加良斯先生，不知能否请您在观景处拍张照片？应该会是不错的素材。”摄影师紧张地提议，拉斐尔闻言失笑。纵使这张照片不会出现在竞选海报上，至少能成为此次旅程的珍贵留念——一个真实巴西的切面。"
 brazil_lacerda_campaign.27.a: "“当然可以！记得拍好看一些。”"
 brazil_lacerda_campaign.28.t: "南方大烟囱"
 brazil_lacerda_campaign.28.desc: "豪华轿车缓缓驶向圣贡萨洛，前方无数车辆排出的尾气与目的地升腾的烟柱交织在一起。年轻的全民盟竞选助理阿比里奥再次感谢上帝，让他得以陪同拉斐尔·马加良斯，而不是和其他同事挤在那辆通风系统瘫痪的巴士里。不过此刻他正承受着另一种形式的热浪。\n\n“这座工业重镇能与旅游胜地般的首都比邻而居，正是巴西经济多元化的明证。资本……这里的资本和劳动力，都各司其职，让这台伟大机器、这座伟大城市永不停转。它们会争夺主导权——不，改成控制权。为了控制权。但只要保证机器运转，美元、比索、克鲁赛罗都会源源不断流入。让圣贡萨洛闻名于世的不是美景或文化，而是永不停歇的机械运动。”\n\n阿比里奥的钢笔在纸上疾走。在这意识流化作的滔滔洪水下，他的手腕开始发酸。\n\n“所以我们要拜访若阿金。他的公司就像给这台机器提供润滑油的——石化研究。让我们始终站在技术最前——”\n\n突如其来的寂静让阿比里奥猛然抬头。只见拉斐尔下颌紧绷，正盯着窗外路边共吸一支烟的两个男人。他们各自缺了一条腿。较矮的那个拄着拐杖俯身嘬烟时，目光穿透了将他和总统候选人隔开的茶色玻璃。\n\n马加良斯的手移向车窗摇柄，但轿车已驶过那两人。这位候选人用手指在大腿上敲打片刻，转头对阿比里奥说："
 brazil_lacerda_campaign.28.a: "“不知道他们是卡在了哪台机器里。”"
 brazil_lacerda_campaign.29.t: "马加良斯剪辑版"
 brazil_lacerda_campaign.29.desc: "“把所有拍到观众的镜头都删掉。”拉斐尔命令道，声音冷若冰霜。车厢后部的三名实习生立刻手忙脚乱地执行起来——那个骂他是富豪婊子、穷人工头的挑衅者消失了；那个涨红着脸唾沫横飞，控诉卡洛斯老爹让他孩子吃不饱的愤怒男人消失了；还有马加良斯用怯懦的道谢试图平息骚动人群未果后，仓皇冲向等候车辆的镜头，以及紧随其后惊慌失措的摄像师，全都消失了。\n\n“现在，”拉斐尔转向身旁惊魂未定的幕僚们，“讲一下为什么这次活动彻底搞砸了。以及如何确保这种事不会再发生。”\n\n“呃。”阿比里奥咬着嘴唇迟疑片刻，随即语速飞快地说：“当地官员非常热情——他们甚至自掏腰包在地方报纸上宣传这场活动。说他们是政府机械化改革成果的拥趸，还说税收和贸易额都在飙升。”\n\n“我猜……可能机械化改革有点太成功了？那些抗议者看起来像是失业的农民——说不定就是刚被拖拉机取代的雇农。”\n\n拉斐尔倾身向前轻声说："
 brazil_lacerda_campaign.29.a: "“要是能用拖拉机代替竞选团队就好了。”"
 brazil_lacerda_campaign.30.t: "广而告之"
 brazil_lacerda_campaign.30.desc: "“伟人啊！”一个皮肤黝黑的老汉喊道，用布满老茧的手紧握着拉斐尔的手。“您真是伟人，先生！巴西的解放者！”\n\n五颜六色的横幅、粗体标语，甚至还有几张他的肖像画。拉斐尔咧嘴笑着，挥手致意，却一时不知道该说些什么。他从未见过这么多人参加集会，也从未经历过自己的思绪被欢呼声、汽车喇叭声、口哨声和掌声彻底淹没的情形。也许独裁者就是这种感觉。集会渐渐变成了密集的单独问候。那个下午，拉斐尔握的手比这几周加起来都要多。他灌下几杯烈酒，随着欢快的吉他鼓点摇摆身体，聆听着工人们的诉求。\n\n“多亏了拉塞尔达，我才能让孩子们吃饱饭，”有人说道。夕阳西下，竞选团队开始撤离小镇，这句话深深印在了拉斐尔心里。笑得太多，脸颊都僵了；喊得太多，喉咙也干了。\n\n拉斐尔伸手揽住两位助手的肩膀。“到底是施了什么魔法，才能换来这样的欢迎呢？”\n\n“说实话，先生，我们还以为来这儿会热脸贴冷屁股，”其中一位用手帕擦拭着汗湿的额头说，“地方上的头头脑脑就够难缠了。张口就要……‘捐款’。”\n\n另一位助手点头附和。“我们有个伙计来订场地，直接被轰出去了。”他哼了一声。“算他们走运，这镇子位置重要，才值得我们跑这一趟。”拉斐尔笑了笑，为这次意外成功感到欣慰。\n\n“看来工人们很满意我们砍了联邦补贴、叫停机械化。他们的饭碗保住了。”当竞选团队开赴下一站时，拉斐尔暗下决心，要记住这些面孔——他们才是真实的人，而不是学院里那些批评家。"
 brazil_lacerda_campaign.30.a: "人们会因为他们不做某事而高兴吗？"
 brazil_lacerda_campaign.31.t: "平等相待"
 brazil_lacerda_campaign.31.desc: "拉斐尔简直不敢相信。居然有人能在埃斯科帕牌上赢了他，而且这人竟然还不是平日里经常交手的老对手，而是一个卡亚波族的小男孩。男孩笑着摊开牌，他身后的族人们也个个面露自豪。\n\n“我好像赢了你哦！”男孩高声说着，脸上洋溢着灿烂的笑容。\n\n“是啊，你赢了，考昂。”拉斐尔简直难以置信，居然会在自己从小玩到大的纸牌游戏上输给别人。\n\n当初带着摄影团队来到这里时，拉斐尔本以为就是跟几位酋长握个手，拍几张照，然后走人。没想到，接待他们的是一个渔猎部落的三十多号人。他们热情地跟拉斐尔一行人握手，端出好吃的、好喝的，和他们交流彼此的文化，甚至要给他们画上部落的彩绘纹饰。而拉斐尔则教他们玩自己最爱的纸牌游戏，最后大家一起听部落长老讲故事。\n\n长老们说，他们一开始是怀疑的。毕竟巴西政府欺负原住民是出了名的，抢他们的地，毁他们的河，这些斑斑劣迹早就无人不知无人不晓。\n\n可现在，村里的生活发生了翻天覆地的变化。村民能进城去医院看病，部落整体健康水平显著提升，学校带来的好处就更不用提了。\n\n年轻人从学校学了知识，回来教长辈们读书写字；长辈们呢，就反过来，把一辈子的打猎经验教给年轻人。拉斐尔骨子里是个政客，他可不是那种对原住民文化有过分幻想的人，但他必须承认，他现在对最初那个拍照作秀的目的，真是一点兴趣都没有了——尽管这场秀本身非常成功。此时此刻，他正亲眼见证自己亲手参与缔造的美好新巴西。"
 brazil_lacerda_campaign.31.a: "“还有谁觉得自己能赢考昂的？”"
 brazil_lacerda_campaign.32.t: "交锋"
 brazil_lacerda_campaign.32.desc: "酒店外的热浪令人晕眩，拉斐尔坐在高大的树荫下，那点阴凉却丝毫驱不散燥热。他瘫在躺椅上，能感觉到空气中黏稠的湿气，目光紧盯着森林边缘那条孤零零的小路，期盼着能出现些什么。为了一场与亚马孙十几个部落的会面，他已在此苦等近两天，却始终不见人影。今天是最后期限——联络人保证过至少会有几位代表今日抵达。若再落空，他们就将撤离这座绿色蒸笼。\n\n正当他用随手摘的大叶片扇风时，小路上突然有了动静。一个佝偻着背的枯瘦老者正拄着拐杖踉跄走来。拉斐尔立刻召唤团队架起摄像机，兴奋的凉意驱使他箭步上前。哪怕只谈成一个部落，也能包装成政绩。可当他靠近时，老人只上下扫视他一眼，竟直接朝他脸上啐了口唾沫。“帕拉州人不要你的贿赂和镜头。这就是我们的答复。”老人拄着拐杖冷眼旁观，看着拉斐尔抹去脸上的秽物。赶来的团队目睹这场冲突，全都愕然止步。\n\n湿热与挫败感让拉斐尔面颊发烫，他感到太阳穴突突直跳。“我千里迢迢过来，”他声音发颤，“是为了倾听你们的声音。没错，我是想要选票，你这老蠢货，但你们连提要求的机会都不给？我到底做了什么要受这种侮辱？”\n\n老人冰冷的眼神纹丝未动：“还没做什么。但拉塞尔达当年也对我们不闻不问。我们的年轻人没变富裕，却连基本保障都没了。你们派来的官员，个个贪腐。当年你们跟瓦加斯一样不在乎，现在我们凭什么要在乎你？”拉斐尔转身离去，连日的烦躁在中暑般的眩晕中彻底爆发。"
 brazil_lacerda_campaign.32.a: "“但愿朝我脸上吐这一口唾沫，比说出你们的诉求更值得。”"
 brazil_lacerda_campaign.33.t: "红牌"
 brazil_lacerda_campaign.33.desc: "拉斐尔的豪华轿车停在桉树体育场外。他来看国际队和格雷米奥队的比赛，场内还有一万八千多人。他对足球没什么兴趣，或者说，对体育运动都兴趣不大。此行纯粹是一次政治作秀，竞选团队认为看场球赛能让他更受工薪阶层的欢迎。可他一下车，迈向看台，心里就知道此行怕是要弄巧成拙了。播音员热情洋溢地介绍了他之后，整个体育场看他的眼神都不对了。他听到身后两个国际队球迷在说话。\n\n“真不敢相信，这家伙还有脸来？”\n\n“是啊，拉塞尔达把我们坑得那么惨，他倒好，跑来这里装得跟自己人一样？”\n\n拉斐尔试着装作没听见。随即，他又注意到几个格雷米奥队的球迷也正对他挤眉弄眼，嘀嘀咕咕，不用想也知道是在说他。整场比赛，他就这么如坐针毡地熬了过去。离场前，国际队的几个高层把他请到一边说话。\n\n“感谢您大驾光临，马加良斯先生，很高兴您也是我们国际队的粉丝。”\n\n“谢谢，俱乐部刚成立我就是球迷了。对了，我听说你们在筹建新场馆？”\n\n“没错，”一个高管兴奋起来，但立刻被另一个打断了，“可惜，工程最近有些耽搁。”\n\n“哦？”拉斐尔假装很关心，“怎么耽搁了？”\n\n“联邦那边的条条框框。最近……总来找我们麻烦。”\n\n拉斐尔附和着点了点头，便抽身告辞了。比起那场乱糟糟的球赛，豪华轿车里总算能让人喘口气。看来，要赢得工人阶级的支持，光是看一场足球赛还远远不够。"
 brazil_lacerda_campaign.33.a: "“——洛佩斯一脚抽射！阿尔瓦雷斯扑救不及，球进了！格雷米奥队再下一城！”"
 brazil_lacerda_campaign.34.t: "得分"
 brazil_lacerda_campaign.34.desc: "拉斐尔的豪华轿车停在桉树体育场外。他来看国际队和格雷米奥队的比赛，场内还有一万八千多人。他对足球没什么兴趣，或者说，对体育运动都兴趣不大。此行纯粹是一次政治作秀，竞选团队认为看场球赛能让他更受工薪阶层的欢迎。他一走进体育场，评论员播报了他的到来，球迷们随即报以掌声和欢呼。\n\n在他走向座位的途中，来自双方球迷的赞美声将他包围。两名身穿国际队队服的男子拍了拍他的肩膀。\n\n“我们真得感谢您，是您帮助我们建成了这座体育场。”其中一人说道。\n\n拉斐尔佯装惊讶：“哦，不客气，我只是为国际队尽我所能罢了。”\n\n“您是球迷？”\n\n“从俱乐部成立起我就是了。”\n\n“太棒了！就冲这个，我们就得投您的票。”另一名球迷开玩笑说。\n\n拉斐尔轻笑一声，继续看比赛。比赛结束，当他穿过熙熙攘攘的人群时，又被几位国际队的高管拦了下来。\n\n“马加良斯先生！我们等不及要看您当总统了！”\n\n拉斐尔微微一笑：“感谢各位的热情，选举结果还没定呢。”\n\n“只要您继续给我们建体育场，就不会有什么悬念啦！”\n\n拉斐尔轻笑一声，返回了他的豪华轿车。也许，全民盟比社进党或工党更称得上是人民的政党吧。"
 brazil_lacerda_campaign.34.a: "“——路易斯打入致胜一球！国际队拿下胜利！”"
 brazil_lacerda_campaign.35.t: "提款"
 brazil_lacerda_campaign.35.desc: "“——与布里佐拉或小瓦加斯那样的激进分子相比，我显然才是南里奥格兰德州银行最好的选择。”拉斐尔语气平淡地说道。他正在南里奥格兰德州银行的办公室里，和几位银行高层会面，试图说服他们支持自己。这家南部最大银行的支持，对选战来说至关重要。\n\n一位高管开口说道：“我想我能代表大家说句话，如果您跟拉塞尔达是一路人，那我们肯定支持您。”\n\n另一位高管也附和道：“他给巴西带来的经济增长，对我们、对整个国家来说，都是意义深远。”\n\n“与他共事期间，我学了很多东西。”拉斐尔说道。尽管他很感激南里奥格兰德州银行的支持，但他脑子里却一直在想，这些人句句不离拉塞尔达。虽然这也在预料之中，可这让他产生了一众莫名的感觉。他们根本不是在选他，而是在选拉塞尔达的影子。"
 brazil_lacerda_campaign.35.a: "有其总统，必有其幕僚长。"
 brazil_lacerda_campaign.36.t: "宿怨"
 brazil_lacerda_campaign.36.desc: "拉斐尔·马加良斯觉得，他可能习惯了在小会议室里对官员们讲话，但南里奥格兰德州银行的这间会议室给他的感觉很不一样，巨大的玻璃墙外就是开满鲜花的花园。换作平时，他会等着这些高管自己想明白，但在眼下这个节骨眼，他实在是等不起了。\n\n“我是这里唯一亲商的候选人。”他开门见山地说，“我代表的是现状。我的对手会给这个国家带来难以承受的风险，小瓦加斯会让我们倒退回他爹的时代，而布里佐拉会带我们回到列宁的时代。”\n\n“您说对您上台这事儿，我们不用操心，”一个精瘦的老人打断了他，马加良斯努力想看清他胸前的名牌，“可我们都见识过了，您的前任把国家搞得有多乱。我们凭什么相信您不会跟他一样靠不住？”\n\n马加良斯一时语塞。他摇了摇头：“去年的动乱确实史无前例，但那是一场已经被我们镇压下去的颠覆活动搞出来的。”\n\n在场众人的目光纷纷垂下，这种无声的抗议，马加良斯再明白不过。“您说是就是吧，可您觉得，那些投资人得花多少年才肯回来？”那人差点就翻白眼了，“五年？还是十年？”\n\n不管他怎么承诺，怎么打包票，总罢工的阴影始终笼罩着他，让他们这些人在政治上像没了根的浮萍。会谈倒也不算彻底失败，马加良斯想，但除了几句模棱两可的安抚之外，自己和商界的关系依旧是若即若离。"
 brazil_lacerda_campaign.36.a: "言语虽歇，锋芒未敛。"
 brazil_lacerda_campaign.37.t: "尽在不言中"
 brazil_lacerda_campaign.37.desc: "摄像机镜头鲜少如此安静，观众的眼神从未如此喧嚣。大选在即，马加良斯不情不愿地答应了几场辩论，先是跟小瓦加斯，现在又对上了布里佐拉。前两场还算风平浪静，可眼看投票日越来越近，他知道，必须得拿出点真本事，打破眼下的僵局。在主持人的引导下，马加良斯望向摄像机那蓝色的微光，开始了他的发言。\n\n“在拉塞尔达的领导下，巴西蒸蒸日上！”马加良斯高喊，他刻意不去看左边，“像布里佐拉这样的激进分子，会毁掉我们自黑暗的新国家时代以来的一切成就。到那时，我们得到的不会是秩序，而是军靴的践踏；不会是进步，而是彻底的绝望。”话音刚落，一阵热烈的掌声响起，但因礼节考虑没有持续太久。\n\n“我同意马加良斯先生，过去确实黑暗，但要说暴行，何须倒退几十年。”布里佐拉回应道，语气里透着一丝沮丧，“这几年来，军方和寡头统治着巴西的政坛。他不会为你们挺身而出，但我会。”\n\n这次的掌声稀稀拉拉，还没传开便消失了。主持人开始让观众提问。一个年轻女人站了起来，她的身形淹没在背景里，难以分辨。“布里佐拉先生，我们都看到过去几年国家在扫盲方面进步不小，”她的提问带着嘲讽，“那您觉得，拉塞尔达的教育政策，到底是哪儿不行呢？”\n\n问得太好了，马加良斯心想，这个问题够布里佐拉喝一壶的。“识字率是高了，可他们学的是什么？是学会逆来顺受，挨精英的鞭子吗？”听着布里佐拉的话，马加良斯心里一块石头落了地。布里佐拉或许是在回答问题，但他已经陷入被动了。"
 brazil_lacerda_campaign.37.a: "任尔东西南北风。"
 brazil_lacerda_campaign.38.t: "徒劳无功"
 brazil_lacerda_campaign.38.desc: "摄像机镜头鲜少如此安静，观众的眼神从未如此喧嚣。大选在即，马加良斯不情不愿地答应了几场辩论，先是跟小瓦加斯，现在又对上了布里佐拉。前两场还算风平浪静，可眼看投票日越来越近，他知道，必须得拿出点真本事，打破眼下的僵局。在主持人的引导下，马加良斯望向面前的人群，但举目所见的唯有带有倦容的神情。\n\n“拉塞尔达的政府给巴西带来了繁荣。”马加良斯的声音细若游丝，眼睛却还在扫视人群。“如果布里佐拉当选，我们便要冒着把国家卖给激进工会的风险，而正是这些工会，曾经扬言要推翻我们国家的民主。只有我，才是能维持稳定的候选人。”话音刚落，稀稀拉拉的掌声响起，刚好和嘘声打了个平手。\n\n“拉塞尔达那一套已经完蛋了。”布里佐拉回应道，洪亮的声音在大厅里回响。“他对总罢工的镇压，足以证明他永远只会站在精英和寡头那边，而不会站在平民和普通人这边。”马加良斯看着新一轮的掌声和嘘声涌起又消散，他注意到，鼓掌的和喝倒彩的，居然是同一拨人。\n\n他把这事抛到脑后，转向布里佐拉。“镇压？”他问道，语气里带着一丝轻蔑，“警察检查一把带血的刀，这也叫镇压？”\n\n布里佐拉笑了，转身时嘴角还挂着一丝笑意。“那么，士兵从自己的武器库里，挑一把最锋利的刀去捅抗议者，这叫不叫镇压呢？马加良斯心里有数，我心里也有数。”观众用行动给出了答案，他们的沉默里满是失望和厌倦。直到主持人最后发言，马加良斯才意识到，在场的大多数人心里早就有了谱。"
 brazil_lacerda_campaign.38.a: "话语如利刃，字字伤人心。"
 brazil_lacerda_campaign.39.t: "群起攻之"
 brazil_lacerda_campaign.39.desc: "摄像机镜头鲜少如此安静，观众的眼神从未如此喧嚣。大选在即，马加良斯不情不愿地答应了几场辩论，先是跟小瓦加斯，现在又对上了布里佐拉。前两场还算风平浪静，可眼看投票日越来越近，他知道，必须得拿出点真本事，打破眼下的僵局。在主持人的引导下，马加良斯望向大厅的墙壁，棕色的墙面透着一股猩红。\n\n“拉塞尔达政府打压工人的权利与工资，除了一小撮军人和寡头，所有人都被他伤害了！”布里佐拉高喊，他的眼睛根本不往右边瞟一下，“马加良斯只会把我们带回十九世纪；只有我的方案，才能把国家带进二十一世纪！”话音刚落，掌声四起，只是碍于面子和主持人的干涉才没那么响亮。\n\n马加良斯眉头一皱，清清嗓子。“搞岁月史书是吗，真是可笑。”他摇着头反驳，“没有哪个领导人是完美的，但拉塞尔达政府确实给巴西带来了前所未有的成功与繁荣。把我们带回新国家的老路，可进不了什么新千年。”几声嘘声响起，但人群大多保持沉默，也没有掌声。\n\n场内越是安静，布里佐拉的控诉就越是震耳发聩。“到底是谁在‘成功’？是那些连块种庄稼的地都买不起的农民？是那些工资微薄、再也得不到工会撑腰的工人？还是那些赚得盆满钵满、正在放声大笑的贫民窟房东？”\n\n布里佐拉话音刚落，掌声雷动，随即引来了欢呼。马加良斯这边每回答一个问题，布里佐拉的每一句反驳都能赢得一阵喝彩。这场辩论正在迅速演变成一场一边倒的屠杀，一场在选举前夜他万万承受不起的惨败。"
 brazil_lacerda_campaign.39.a: "马加良斯的窘迫，正通过千家万户的收音机和电视机，传遍全国。"
 brazil_lacerda_campaign.40.t: "正本清源"
 brazil_lacerda_campaign.40.desc: "在一间漆成暖蓝色的房间里，马加良斯坐进一张柔软的扶手椅，感觉紧绷的神经得以舒缓。大选迫在眉睫，他必须再次向大众宣传自己的温和派形象。接受拉塞尔达的报纸——《新闻论坛报》的专访，是非常关键的一步。这家报纸读者够多，能把他的声音传出去；双方的关系也够硬，万一他说错了话，也能帮忙打圆场。\n\n“马加良斯先生，幸会，”采访者说着，伸出手来，“我是克莱顿·佩德罗索·邦芬，为《新闻论坛报》写了十年稿子了。”马加良斯客套地赞扬了一句，对方对此没什么反应。“过去几年，您一直与拉塞尔达总统走得很近。能说说这是从什么时候开始的吗？”\n\n“嗯，我父亲一直和拉塞尔达很亲近，私交和政见都是如此，”马加良斯坦率地说，“所以，很自然地，我在踏入政坛时便将拉塞尔达视作我的导师。”\n\n“那您觉得，他的政府干得怎么样？”邦芬身体前倾，追问道。这个问题太简单了，马加良斯心想，尤其还是从自己人的报纸嘴里问出来。\n\n“拉塞尔达是巴西有史以来最棒的总统之一，”他笑着回答，“他把教育搞到了国际水平，整理了官场风气，拉近了我们和自由世界的距离，还让全国人民都用上了干净的水。他的执政经历证明，温和的执政风格才是国家成功的关键。”\n\n“拉塞尔达总统任内有些事的争议可不小，”邦芬继续说，一边把铅笔头往嘴里送，“比如1968年的种族暴乱，您认为他处理得对吗？”马加良斯沉默几秒，随即开口作答。"
 brazil_lacerda_campaign.40.a: "“我为全民盟能朝着包容全体巴西人民的方向发展而感到自豪。”"
 brazil_lacerda_campaign.40.b: "“我——我知道，担任总统需要小心谨慎，这一点至关重要。”"
 brazil_lacerda_campaign.40.c: "“就该用铁腕来收拾那帮激进分子，看到拉塞尔达这么干我很高兴。”"
 brazil_lacerda_campaign.41.t: "向前一步"
 brazil_lacerda_campaign.41.desc: "克莱顿·邦芬的视线从笔记上抬起，看向马加良斯，眼神里的震惊一闪而过，随即被恰到好处的好奇心掩盖。“我猜，您这是在评论他通过的《种族民主法案》？”\n\n马加良斯点点头。没人想再回到日裔侨民过去那种穷困潦倒的日子，他也清楚知这样一句提醒将有助于让他们继续拥护自己。“没错。日系社区在巴西的处境糟糕透顶，这是我们这些当政者的失职。”\n\n“那您打算如何在拉塞尔达已有的工作基础上继续推进呢？”邦芬抬起头，他那副之前只有纯粹好奇的面具，似乎出现了一丝裂缝。\n\n“我们会加大力度打击歧视，让我们的理念深入到全民盟的每一个角落。”马加良斯答道，伸手去拿水杯。\n\n“您觉得，这么做，跟全民盟一贯的调性合拍吗？”\n\n马加良斯一时语塞，努力思考措辞。内部改革是必须的，但话必须说得小心，不能引起党内的疑虑。“全民盟的传统，一向是推崇勤奋与才智；搞歧视，对谁都没有好处。我很高兴能带领一个新的、能正视这一事实的全民盟。”他摇了摇头，继续说，“布里佐拉就是想不通这个道理，所以他才会失败。这也是为何只有右翼才能守护所有巴西人的自由。”\n\n两人都停顿了一下，翻着各自手中的材料。“所以，马加良斯先生，”邦芬此刻仿佛在照本宣科，“您会设法巩固在民权方面取得的进展，是吗？”"
 brazil_lacerda_campaign.41.a: "“还有很多工作要做。比如，移民禁令就是我上任后要着手调整的事项之一。”"
 brazil_lacerda_campaign.42.t: "带有人性面孔的保守主义"
 brazil_lacerda_campaign.42.desc: "“当然，若论共情在拉塞尔达思想中的重要性，废除日本移民禁令就是最佳例证。我想没人能否认，这既是对人道主义的宣言，也体现了我们的价值观。”\n\n采访氛围愈发坦诚，克莱顿向后靠进沙发，与拉斐尔相对而坐，热切记录着候选人的话语。对拉斐尔而言，这些回答信手拈来，不仅因为采访者的亲和力，更源于禁令废除带来的成功光环——这是全民盟足以自豪的实质性政绩。\n\n“马加良斯先生，有人认为废除禁令暴露出全民盟除了形象与权力外缺乏核心纲领，您如何回应？”记者语气随意，笔尖却已蓄势待发。\n\n“我的回答很简单：无稽之谈。全民盟致力于推进全体巴西人的权利。既然该法案与此相悖，我们便废除它。这就是全民盟的本心——决不允许任何事物阻碍巴西的繁荣。我们是现代化的自由派政党，善于借鉴他国成功经验。总有人讥讽我们的政策‘过于美国化’，但这恰恰暴露了他们的短视——学习何错之有？我们将永远保持学习姿态，但也永远坚守巴西本色。我的一切作为都是为了巴西人民，让他们共享我们创造的繁荣。若我当选，这种立足巴西、以人为本的立场必将延续。”\n\n“延续至何种境地？”\n\n“自然是建设一个真正自由、公平且富强的国度。”"
 brazil_lacerda_campaign.42.a: "记者笔下生风，一篇大作已在脑海中成形。"
 brazil_lacerda_campaign.43.t: "坚固地基"
 brazil_lacerda_campaign.43.desc: "“所有保守派都应当明白，任何一个社会想要正常运转，都离不开两个词，这两个词就是‘法律’和‘秩序’。我也不例外。”\n\n采访的气氛变得坦诚起来，克莱顿往后靠进沙发，奋笔疾书，生怕漏掉一个字。拉斐尔心中盘算，如何才能最好地证明全民盟对社会的责任感？如何证明他们对保守派阵营的价值？\n\n“我想很多人还记得去年的总罢工吧，左派和工总的激进分子，为了自己的小算盘差点把整个国家都掀翻了。我想强调，你反对我们的政策，这是一回事——我们毕竟不是瓦加斯——可为了政治目的，就想绑架整个国家？这在我看来、在我们党看来，是断然不可接受的。你们想想，要是我们没拦住那场罢工，得有多少人遭殃？工总打算牺牲掉多少人的安稳日子来换取他们的政治筹码？这不是在搞政治，这是在搞破坏。”\n\n克莱顿埋头记录，眼皮都没抬一下。“我明白，马加良斯先生，您在那次危机中确实出了力。事后有媒体猜测，全民盟是不是要搞自由化，您对此怎么看？您觉得这对您担任总统有帮助吗？”\n\n“当然。我认为，某些方面的自由化是需要的，但我反对为了自由而自由。我们正身处世纪之末，而全民盟早已着眼于未来。我也知道，我们这个自由民主的社会，必须拼尽全力去守护，我想我在总罢工危机里的所作所为已经证明了这一点。如果需要，我们愿意改变，但我们对巴西核心价值的坚守，永远不变。拉塞尔达在这方面成就卓著，我也会将它继续保持下去。巴西将建立起一个根基稳固的健全社会——有了这个，我敢说，没什么不可能的。”"
 brazil_lacerda_campaign.43.a: "记者笔下生风，一篇大作已在脑海中成形。"
 brazil_lacerda_campaign.44.t: "中流砥柱"
 brazil_lacerda_campaign.44.desc: "“我想，巴西没人会看不出这次选举有多关键。对我来说，这就是对我们政治体制的终极考验。时间会流逝，对独裁者的记忆会淡忘，而那些被寄予厚望的执政者，有几个能对得起当年人们为之奋斗的理想呢？”\n\n采访的气氛变得坦诚起来，克莱顿奋笔疾书，拉斐尔则思绪万千，历史的片段与对手的身影交错浮现。他向前倾了倾身子。\n\n“先说社进党，领头的是瓦加斯的亲儿子。我不是说要搞父债子偿，但他自己的所作所为，已经暴露出他骨子里的独裁倾向。社进党出了名的腐败，选民想要这个吗？想要退回到腐败专制的旧时代吗？或许有些人的记忆套了一层怀旧滤镜，那我要在这里问了：当初巴西为什么要用那种决绝的方式推翻瓦加斯？因为有些价值，我们必须守护。”\n\n“再说布里佐拉和工党。他们那一套，可能不像他们的老祖宗那么独裁，但骨子里还是瓦加斯主义。他们纯粹出于某种意识形态狂热，就想动用国家力量，不计代价地毁掉拉塞尔达的功绩。想想去年的总罢工，那就是个例子，让你看看激进派遇到反对时会怎么样——他们只会用强。他们嘴上说着劳动和责任，但可别被他们骗了，在这些人眼里，我们的立国之本不过随时可以牺牲的东西。”\n\n克莱顿不再盯着笔记本：“那您在其中的定位是什么？”\n\n拉斐尔向后一靠。“在眼下这个乱世，巴西需要的是理性。需要一种能看穿花言巧语和空头支票的智慧，因为这些东西建立不了好政府，只会带来混乱。我提供的，就是一条避开这些陷阱的路，一条理智、稳健的道路，所有头脑清楚的巴西人都该好好想想这一点。”"
 brazil_lacerda_campaign.44.a: "记者笔下生风，一篇大作已在脑海中成形。"
 brazil_lacerda_campaign.45.t: "何为国家？"
 brazil_lacerda_campaign.45.desc: "“1968年，我们看到了一幕我想大多数巴西人此生都不愿再看到的景象。激进分子发起骚乱，就因为国家不肯对他们的胡来低头。自由区，圣保罗——究竟还要有多少个州，要因为一小撮少数派想绑架整个国家，而任由社会秩序被撕得粉碎？拉塞尔达通过的《反骚乱法》表明了我们对这种疯狂的态度。无论过去还是现在，我和拉塞尔达都站在守护巴西的第一线。”\n\n拉斐尔在椅子上挪了挪身子，思绪又回到了那些日子——克莱顿注意到了这个细节。“您觉得，这件事对您现在的竞选有影响吗？”他问。\n\n“那怎么可能没影响？我们当时差一点就完了。一群流氓，唯恐天下不乱，根本不顾巴西的死活，只想着自己那点小权力。拉塞尔达、我和全民盟顶住了他们。可我总在后怕，要是当时不是我们，会怎么样？再看看我现在的这些对手，我能相信他们会像我们一样，敢跟那些人硬碰硬吗？还是说，要是再发生那种事情，他们会因为理念相同或者纯粹是自私自利，直接选择屈服了事？我想，巴西有很多人都在问自己这个问题，而我对此思考得比谁都要多。”\n\n克莱顿停下笔，抬起头来，他神情严肃而又若有所思，在脑海中斟酌着措辞。“您是怀疑他们会屈服？”\n\n“佩德罗索先生，道理很简单。到底什么是国家？它是一个有活力、有价值观、有责任感的社会？还是一个争权夺利的工具，谁嗓门大就听谁的？这才是这次选举最核心的问题，而我坚信答案是前者。”\n\n“那您这个想法，是受到了去年总罢工事件的影响吗？”"
 brazil_lacerda_campaign.45.a: "拉斐尔沉思片刻，想起他的导师与劳工组织的摩擦。"
 brazil_lacerda_campaign.46.t: "守护者"
 brazil_lacerda_campaign.46.desc: "拉斐尔的回答来得很快，话语中满满都是自信。“拉塞尔达在危机面前，展现了全民盟的核心原则。那就是无论如何，巴西人民的利益高于一切，任何东西，只要不是为了人民的利益，都可以被牺牲。”\n\n克莱顿点了点头：“有些媒体曾指出，全民盟党内一些高层有不同看法，比如塔沃拉就主张谈判，而非镇压。您对此怎么看？”\n\n“我非常尊敬塔沃拉，也尊敬党内那些支持他的人，但他们错了。瓦加斯那套劳动法早就过时了，按他们的想法来，只会掉进激进分子的圈套。而且，我不认同‘镇压’这个词。我们不是在压制人民行使权利，我们是在打击叛徒。我知道这个词很重，我也不想用，但没有哪个词比这个词更恰当了不是吗？”\n\n克莱顿歪了歪头：“此话怎讲？”\n\n“当时有人想逼着巴西人民听从他们的号令。这种事，在俄国叫共产主义，在德国叫法西斯，在非洲叫殖民主义。而在巴西呢？我管它叫背叛。我们是自由的人民，我们的制度对所有人都开放。如果他们不认同这一点，还企图强迫我们实现他们的目标，那他们就是我们的敌人。在这点上，我以拉塞尔达为榜样，对威胁我们的人绝不妥协。自由和繁荣永远是第一位的，巴西永远是第一位的。”\n\n“那您觉得，拉塞尔达树立了一个什么样的榜样？”\n\n“守护者。巴西不需要独裁者，也不需要暴君，但它需要强有力的领袖。这种领袖，必须有道德信念和公民责任感，既要守护巴西的灵魂，也要捍卫巴西的利益。拉塞尔达开辟了这条道路，而我，会沿着这条路继续走下去。”"
 brazil_lacerda_campaign.46.a: "记者笔下生风，一篇大作已在脑海中成形。"
 brazil_lacerda_campaign.47.t: "调解者"
 brazil_lacerda_campaign.47.desc: "“拉塞尔达当时完全可以直接镇压那些闹事的人。毕竟街上流氓横行，很多人都支持直接镇压。可他没那么干，为什么？”克莱顿看着拉斐尔，眼神里带着探究，手中的笔随时准备记录。\n\n“首先，我们应该做出恰当的反应。你想想，难道直接镇压愤怒的民众，就能消除他们的愤怒？那只会把事情搞得更糟，是一种除了添乱外什么用都没有的冲动之举。相反，拉塞尔达选择对话，在那场愤怒的风暴里，我们找到了需要解决的问题。”\n\n克莱顿点了点头，他自己对那段时期的记忆在脑海中浮现，眉头不禁微蹙。“我记得，当时党内有人批评拉塞尔达的回应过于软弱。您如何看待此事？”\n\n“那种反应很正常，我不怪他们。我绝不为任何骚乱辩护——参与其中就是犯罪。但我们不能忘了，这事的起因是社会的不公。当年也有很多人上街反对瓦加斯，难道他们也是罪犯？当然，很多激进派利用了当时的局面，我们也依法处理了他们。但拉塞尔达的过人之处在于，他有能力分辨出谁是真的有苦衷，并与他们对话谈判。”\n\n“那么，这对您眼下的选战有什么影响？”\n\n拉斐尔认真想了想。“小瓦加斯的字典里没有‘妥协’这个词；而布里佐拉呢，又太把自己当回事，总觉得真理在握，也听不进别人的话。巴西社会是复杂活跃的，是充满变化的；有时候我们必须拿出法律施行铁腕，有时候又得考虑秩序和稳定。这就需要调解，需要去承认问题的存在，哪怕别人表达的方式不对。权力要用得好，就得有分寸感，这是拉塞尔达教给我的，我一直记着。”"
 brazil_lacerda_campaign.47.a: "记者笔下生风，一篇大作已在脑海中成形。"
 brazil_lacerda_campaign.48.t: "无笑，无泪，无悔"
 brazil_lacerda_campaign.48.desc: "拉塞尔达走到屋外，站在门廊上，双手撑着石栏，看着远处的城市灯火。空气中带着一丝不寻常的凉意，却无碍于巴西利亚的美景。这城市或许是由瓦加斯派打下的地基，但却是他将她建成，赋予了她完整。他身后掌权的人，会将这一切都推倒重来吗？\n\n“不能让瓦加斯赢。就算他死了也不行。他让我吃了太多的苦。”\n\n念头在他脑海中盘桓，选举仍然沉重地压在他的心头。\n\n“马加良斯是个好人，但这次选举的主角不是他，是我。”\n\n置身事外才是自私。无私，意味着这也是他的战争。反正民众也不会管那么多，那他为何不战？他为正义奋斗了一辈子，就算头发日渐稀疏，他的斗志也从未熄灭。\n\n“这周你会用得上它的。”\n\n还有一周。这将是他人生中最难熬的几周之一，能与之相比的恐怕只有当年托内莱罗路枪击案后的那段日子。就连他自己的选战，回想起来都显得那么轻松，以至于每当眼角余光瞥见旧照片，他都会涌起一阵苦涩的怀旧之情。\n\n“这一切很快就会结束。卖国贼赢不了的。”\n\n拉塞尔达只能望着星空，说了太多话，如今口干舌燥；想了太多事，如今只剩空虚。到了那天，他会完成他的表演，但之后，他真的撑不下去了。他就这样站了许久，直到妻子在屋里呼唤，他才转身，回到他生命中为数不多的爱与归宿之中。"
 brazil_lacerda_campaign.48.a: "“我为巴西献出了一生。”"
 brazil_lacerda_campaign.49.t: "底线"
 brazil_lacerda_campaign.49.desc: "“听着，拉塞尔达，我知道你不想听，但我们必须考虑一下。”倒霉的拉斐尔·马加良斯被夹在若昂·菲格雷多和卡洛斯·拉塞尔达中间，三人挤在车后座，准备去参加活动。因为民调数字不好看，他已经替拉塞尔达的助理们挨了一通臭骂了。\n\n“若昂，我连一点喘息的机会都不想给那帮法西斯疯子。取消对民代党的禁令、让他们参加选举，只会让他们那套恶心的歪理邪说登堂入室。”拉塞尔达对法西斯主义深恶痛绝，马加良斯也听他念叨过无数次，知道这是他的底线——虽然在拉斐尔看来，那帮人充其量就是一群傻逼。\n\n“谁都知道您怎么看他们，可您为什么会觉得，让他们出来选，就能抢走您的票呢？”马加良斯没跟菲格雷多怎么聊过法西斯，但他知道这人对共产主义的看法；不过，对这个军人来说，这些大概率都会变成一道冷冰冰的数学题。\n\n“你知道我怎么看小瓦加斯和社进党……不行，我不能冒这个险，不能让他们有一丝一毫的可能。”\n\n“现实点吧。这事跟道不道德之类的玩意没半点关系，纯粹是数字游戏。社进党是个威胁，而民代党能威胁到社进党，那为什么不让他们出来搅局呢？”这是一种冷静到冷酷的逻辑，一种只有在战场上才会做的选择。当那难看的民调数字再次浮现在马加良斯脑海里时，他竟觉得这逻辑居然他妈的还有点道理。\n\n“我看是谁也说服不了谁了，还是问问正主吧。拉斐尔……你来拿主意。”"
 brazil_lacerda_campaign.49.a: "“分票的，仅此而已。取消禁令。”"
 brazil_lacerda_campaign.49.b: "“有些底线我们不能放弃，而这就是其中之一。”"
 brazil_lacerda_campaign.50.t: "天命"
 brazil_lacerda_campaign.50.desc: "普利尼奥·萨尔加多的第一场集会，即使不提别的，起码场面上是够唬人的。当那些感觉自己被抛弃的、三教九流的保守派如潮水般聚集而来，聆听这位新晋右翼候选人的“福音”时，清醒的旁观者们只能这么安慰自己。人群闹哄哄的，但他一出场，神情肃穆，全场立刻鸦雀无声，充满敬畏。\n\n“一场战争正在巴西上演，不是用枪炮，而是用言语。这是一场针对我们国家灵魂、针对我们立国之本的战争。”话语如蜂蜜般从他口中缓缓流出，柔和而甜美地滴入听众的耳中，抚慰着他们各自的忧虑。\n\n“马克思主义的毒素摧毁了我们政权的支柱，换上了他们自己的东西：外国资本家、伤风败俗的无神论者，以及懒惰的工人——这帮人只会毁掉巴西。事实证明，社进党、全民盟和社民党全都是国际金融寡头和文化马克思主义者的傀儡，而工党更是在我们眼皮子底下肆意妄为。”\n\n蜜糖瞬间变成了毒药，人群中爆发出阵阵嘘声与怒骂，萨尔加多示意他们安静下来。\n\n“邪恶之所以能得胜，只因正义之士袖手旁观。绝不能放纵邪恶；必须不惜代价，守护巴西的美丽。如果你们不愿眼睁睁看着我们的道德被这帮流氓践踏——只要你们投票给我，这帮罪犯就得进监狱——那就跟我一起战斗吧。最终，胜利必将属于我们。”\n\n人群彻底沸腾了，他们嘶吼着，欢呼着，渴望复仇。但不是所有人都这样。远处，一些惊恐的学生正注视着这纽伦堡的一幕。狂热的人群里，还能看到一些人的家人和朋友，他们已经完全不是过去那个为人熟知、为人所爱的模样了。这就像一场瘟疫，而清醒的人，只能无助地看着它肆意蔓延。"
 brazil_lacerda_campaign.50.a: "“他们不会真的投票给他吧……”"
 brazil_lacerda_campaign.51.t: "幕后暗算"
 brazil_lacerda_campaign.51.desc: "“哎，快给大伙说说你被记者拍到嫖娼那回！我们可是动用了多少关系才把新闻压下去……”雪茄与名贵红酒在桌面上横陈，仿佛即将过时的装饰品。一群社进党高官正以惯常的派对规格，迎接这位不同寻常的客人——普利尼奥·萨尔加多。直到酒过三巡，喧嚣才逐渐被严肃议题取代。\n\n“电话里你已经跟我把这事儿的细节讲清楚了，但还是请你再跟我们这儿几位脑子不太灵光的同事解释一下，具体要怎么操作？”那个故作斯文却活像大猩猩的社进党参议员令萨尔加多暗自皱眉。他周围这帮家伙，也不过就是地区代表、市议员之流的人物。\n\n“条件很简单：你们什么都不用干，我的新政府里就会有你们的位置。我说的‘什么都不用干’，就是一动都不要动——要是小瓦加斯打来电话，你要么就拒接，要么就说点别的搪塞过去。”满屋响起附和的低语，众人都心知肚明，就算自己人赢了，也捞不到比这更大的好处。\n\n“普利尼奥你可真是生意好手啊。既然跟咱们这群下三滥厮混，你整天鼓吹的道德圣战该不会是装腔作势吧？”这句挑衅引得满堂哄笑，萨尔加多面沉如水，唯有抽搐的眉梢似乎道明了心中的怒意。\n\n“是挺好笑的。不过，等我把你们的名字、地址，还有你们家人的名字、地址都搞到手之后，恐怕就没那么好笑了。有人愿意为我而死，你们呢？谁敢说自己也行？”笑声戛然而止，所有人都陷入沉思。萨尔加多点起一支古巴雪茄，此刻他志得意满，感觉一切尽在掌握。"
 brazil_lacerda_campaign.51.a: "“哎呀，热图利奥，不好意思我有急事……”"
 brazil_lacerda_campaign.52.t: "曲线球"
 brazil_lacerda_campaign.52.desc: "普利尼奥·萨尔加多的目光在信纸上移动。起初还显得从容不迫，随即成了一目十行的狂放。很快，他便无法自制，嘴里迸发出一连串恶毒至极的咒骂，足以让修女当场晕厥。他双手颤抖着，将信撕得粉碎，纸屑撒满了桌面。\n\n他将继续被排斥在外，远离巴西的政治中心。\n\n一位同情他的全民盟内部人士通知他，拉塞尔达决定继续打压整合主义者，民代党的禁令不会被解除。那些说他可能对全民盟有用的风声，到头来不过是风声罢了。他又得回到幕后，回到那……\n\n等等，他帮不了全民盟，但他绝对能把他们拉下马。\n\n有一个人：小瓦加斯。他身上那股年轻的、民族主义的狂热劲儿，让萨尔加多想起了当年的自己，想起了他爹第一次粉碎“绿衫军”的时候。可他总不能永远记着父辈的仇，尤其是在他们有了共同敌人的时候。小瓦加斯的政纲是一块璞玉，正需要一个理论家来雕琢，正需要萨尔加多……\n\n他手头还有人马，可以把手下的追随者暂时调去帮社进党一把，他自己再发几份声明支持一下。看起来很有希望，就像老天又给了他一次机会，让他能把自己的思想变成新政权的基石。他一边想着，一边拨通了几个老伙计的电话，告诉了他们这个计划。"
 brazil_lacerda_campaign.52.a: "身居幕后之人，仍可左右大戏的走向。"
 BRA_Riots_Econ_Damage: "经济损害"
 brazil_lacerda_guanabara_recon.14.t: "最伟大的建造者"
 brazil_lacerda.231.t: "鸟儿不再鸣唱"
 brazil_lacerda.231.desc: "拉塞尔达总统任期的最后几周，孤独的深夜似乎成了办公室的常态。他始终觉得，回家面对家人是一件不自然的事——相比之下，独自凝望夜空更令人安慰。那是一片沉默的虚空，不会因他未能保护巴西免受阿根廷威胁而对他投来审判的目光。\n\n天边的星辰宛如北极星，孤悬于漆黑宇宙，仿佛是通往救赎的指引。但当那道光也被重重困境所囚，又有何意义？巴西如今孤立于整个拉美大陆，四邻翻脸，无人理会。邻国将其轻蔑地称为“美国的傀儡”。\n\n而与此同时，阿根廷却被颂为反抗强权的“灯塔”，竟能让整个拉丁美洲信以为真——对法西斯俯首帖耳，也能被包装成“反帝国主义”。至于罢工与经济的问题，越少谈越好。如果他不是再清楚不过，他几乎要怀疑瓦加斯派是不是收了阿根廷的钱，才会对巴西造成如此破坏。\n\n如今，那蠢货布里佐拉还想把他那帮人搞出来的烂摊子，反过来当作竞选总统的资本……说来讽刺，他竟也有几分道理。全国民主联盟从未让巴西变得更加强大，反而是我们亲手让这个国家陷入孤立。\n\n如今，他只能寄望于拉斐尔，希望他能改正拉塞尔达犯下的错，希望他能履行那场“圣战”最初许下的诺言，那些在权力面前早已被遗忘的誓言。拉斐尔必须做到，否则整个大陆都将屈膝于布宜诺斯艾利斯的靴下。"
 brazil_lacerda.231.a: "告别这场从未启程的圣战。"
 brazil_lacerda.232.t: "雨滴还是火星？"
 brazil_lacerda.232.desc: "拉塞尔达乘着车穿行在瓜纳巴拉的街头前往马加良斯的竞选集会，一路上他都拿不准到底什么更令人沮丧：是这阴翳沉沉的毛毛细雨，是他自己因睡眠不足而低迷的情绪，还是周遭行尸走肉般的民众——看着他们游魂似的步履，拉塞尔达不禁替他们感到揪心。他心知肚明缘由，他曾向国民许诺会打造一个值得信赖的巴西，可即便自己殚精竭虑，多数巴西人仍觉得自己较之阿根廷邻居低人一等。这般心态情有可原，毕竟在政治博弈中，巴西似乎总比对方慢上半拍。\n\n巴西刚与委内瑞拉达成贸易协定，转头阿根廷就和智利签下条款更优的条约；汹涌的海况迫使巴西舰船进坞大修，同场风暴中阿根廷舰队却只需简单维护；巴西列装特许生产的LTV A-7舰载机中队的新闻还在发酵，次月阿根廷便亮出三菱F-1战机编队！\n\n万幸的是，他们只落后半步！所有努力并非徒劳，巴西仍有弯道超车的机会。\n\n此刻的巴西民众就像受潮的火绒，只需等待阳光晒去阴霾，等待下任总统点燃他们心中对家国的赤诚——拉塞尔达确信这簇火种非拉斐尔莫属！换作旁人，简直就是把巴西的火种弃置于季风雨中！\n\n因此当轿车抵达马加良斯集会现场，他与这位年轻门生紧握双手露出笃定的微笑时，他只对弟子说了一句话："
 brazil_lacerda.232.a: "“你要成为那根火柴！”"
 brazil_lacerda.233.t: "一帆风顺"
 brazil_lacerda.233.desc: "拉塞尔达从总统府的窗口向外眺望。帕拉诺阿湖的风景一览无余，在如此晴朗的日子里格外迷人。湖面平静如镜，几艘渔船随波轻晃，一艘帆船悠闲漂荡。他对着这幅如画风光深吸一口气，将宁静的芬芳在胸腔里酝酿片刻。所有的争斗，所有的拼搏，不正是为了守护这番景象吗？\n\n在这场与阿根廷的紧张对峙中，多数时候双方势均力敌。但随着时间的流逝，巴西正逐渐取得优势——正如命运应有的轨迹。当秘书拿着戈登大使的电报匆忙闯入时，拉塞尔达的宁静才被打破。展开电报细读间，他从容的笑容重新浮现：\n\n“尊敬的总统先生：谨此致电恭贺阁下及贵国政府妥善处理巴西外交事务。我们两国在二战的烽火中铸就盟谊，欣慰看到您延续这一传统。吾等必将怀念您坚如磐石的领导力，祈愿无论下届选举结果如何，继任者都能延续您的道路。此致敬礼，林肯·戈登。”\n\n何止是期望，拉塞尔达确信继任者必将如此！马加良斯在民调中逐渐领先，巴西民众正用选票回报拉塞尔达及其政党的卓越政绩。但使命尚未完成，要确立葡语国家在南美大陆的主导地位，让巴西登上辉煌的巅峰，仍有许多工作亟待推进——而拉斐尔正是唯一能托付重任之人。拉塞尔达吩咐秘书起草回函时，目光仍流连在渔船上。他坚信巴西的未来可以放心交给拉斐尔这位完美的舵手，那双稳健的手掌足以把稳航向。当秘书取来纸笔准备记录口述时，恰见渔民提竿收线，拉塞尔达在鱼跃水花的声响中微笑着开口。"
 brazil_lacerda.233.a: "“尊敬的戈登大使，感谢您的善意来函……”"
 brazil_lacerda.234.t: "指挥家与交响乐"
 brazil_lacerda.234.desc: "拉塞尔达站定在印有巴西政府徽章的木质讲台前，电视镜头追随着他的身影。竞技场里欢呼的群众被他的气场所感染。他扬起标志性的从容微笑向人群挥手致意，随后举手示意大家安静。\n\n“朋友们！同胞们！巴西的儿女们！今天我不仅是作为诸位的总统站在这里——”人群中爆发出雷鸣般的掌声，拉塞尔达故意停顿片刻，等声浪稍平才展开双臂高呼，“更是作为一个自豪之人！一个不仅为自己，更为祖国深感骄傲之人！”他的声音在穹顶下回荡，“多年来阿根廷及其附庸妄图将意志强加给这片大陆，而小瓦加斯与布里佐拉这些犹大，竟想将巴西的尊严低价贱卖！”一提到这两个名字，看台立即响起嘘声，拉塞尔达配合地做出痛心疾首的表情，待嘘声渐消才继续。\n\n“但是！多亏我们英勇的军队和在座诸位——这片热土上勤劳的儿女们，此刻阿根廷的将军们正吓得发抖，而南美人民正昂首迈向自由！”观众席爆发出地动山摇的欢呼，拉塞尔达在一片闪光灯中高举胜利的拳头。随后他如同交响乐指挥家般优雅控场，示意人群平静下来。\n\n“为确保我们的事业永续，唯有一人可堪重任。女士们先生们，有请拉斐尔·马加良斯！”拉塞尔达侧身让位，全场起立鼓掌。马加良斯走向讲台前与拉塞尔达握手。当前者环视台下如海潮般的支持者时，拉塞尔达不由顺着他的目光看去——每张面孔都不再是模糊的民意符号，而是活生生的见证：见证他如何取代瓦加斯，成为巴西史上最伟大的总统与捍卫者。正当拉塞尔达沉浸在这幻想中时，整理演讲稿的窸窣声将他拉回现实。马加良斯清了清喉咙，开始了他精心准备的演说。"
 brazil_lacerda.234.a: "“感谢总统先生，感谢台下的各位同胞……”"
 BRA_selected_trade_war_focus: "我们已选择果断行事。"
 BRA_selected_slow_drift_focus: "我们已选择谨慎行事。"
 brazil_lacerda_imp.116.t: "夕照将尽"
 brazil_lacerda_imp.116.desc: "“若泽·平托大胜出线！”——崭新的头条刚从印刷机中滚滚而出。虽然标题各异，但文章内容却大同小异。在巴西利亚，在圣保罗，锃亮长靴踏响街头节奏，警察成群巡逻。而路边摊前、公交站里、咖啡馆角落，百姓们交换着疲惫的眼神：“唉，还能指望什么呢？”\n\n与此同时，一声枪响划破丛林静寂，年轻女兵站起身来，收起她的步枪。教官点头称许，说“终于像个战士了”。他手里还攥着一张地下报纸，上头写着：“傀儡候选人若泽·平托赢得一场选举闹剧。”\n\n在尘土飞扬的小路上，游击队员悄然进入被雾气笼罩的村庄，剪断电话线，伏击军方车队，一阵弹雨将其打成筛子。战况报告迅速传回总部。\n\n而此时，在数百公里外的首都军事大楼，几位军官在昏黄的灯光下围坐一圈，相视而笑。他们身前摊着一张巨大的巴西地图，红线交错，战报密布。汗水沁湿了他们的脸颊，却难掩神色中的冷意\n\n依照他们的判断，失败已成定局。现在，轮到强硬派出场了。要么他们赢，要么那股从亚马孙丛林深处涌出的革命洪流，将把一切碾成齑粉。"
 brazil_lacerda_imp.116.a: "必要时，不惜一战。"
 brazil_lacerda_imp.117.t: "民主在行动"
 brazil_lacerda_imp.117.desc: "刚刚出炉的报纸头条上赫然印着：“内伊·布拉加大胜库比契克！”虽说各家标题略有不同，但文章内容无一例外、如出一辙。在巴西利亚，在圣保罗——那些穿着锃亮军靴的警察官员来回踱步，街上的民众只是交换了一个个疲惫的眼神：“还能有什么别的结果呢？”\n\n布拉加笑脸盈盈的宣传横幅悬挂在街头，却已显得有些塌软无力。五彩缤纷的彩带软绵绵地飘在空中，清洁工正一丝不苟地擦洗墙上的残缺海报。一对年轻情侣从他身边走过，低着头，仿佛为自己曾天真地期待过不同的结果、为投了库比契克和社会民主党一票而感到羞愧。\n\n“他们连作假的工夫都懒得做了。”男孩咬牙低语，“等哪天真有点别的可能，这帮狗娘养的一个都跑不了。”\n\n女孩轻轻摇了摇头：“还有别的可能？”\n\n“当然会有。”他瞪着前方，眼神坚定。\n\n就在他们身旁，一名警察正用靴子狠狠碾住一名醉汉的脸，只因他朝墙上的布拉加画像上撒了泡尿。警察低身一拳，打得那人惨叫连连。"
 brazil_lacerda_imp.117.a: "“如果，我们还有点别的可能。”"
 brazil_lacerda_campaign.41.b: "“日系对我们确实很重要，但这不代表我们就得置法律和秩序不顾。”"
 BRA_imperial_flames_of_araguaia: "阿拉瓜亚之焰"
 BRA_imperial_flames_of_araguaia_desc: "麻烦正从北方逼近，就像暴风雪总是从北方席卷而来、给美国人带去灾祸一样。在北部各州，一场叛乱正在发酵——就是阿马佐纳斯和马里盖拉那两个共产主义叛徒，对我们发动的所谓“人民战争”搞出来的名堂。现在多个主要城市都爆发了由学生领导的骚乱，连贝伦和马瑙斯这种稍微大点的地方都没能幸免。\n\n这帮成事不足败事有余的颠覆分子，脑子都不清楚了。他们竟以为，能将一个痴心妄想的老布尔什维克的疯言疯语，当作当今时代的精神感召。他们竟以为，他们能弄出菲德尔·卡斯特罗堕落的“丰功伟绩”，能效仿那帮古巴疯子的“敢打敢拼”！他们大错特错，而我们，就要用鲜血来教他们做人。"
 BRA_imperial_bounty_of_brazil: "巴西的馈赠"
 BRA_imperial_bounty_of_brazil_desc: "唉。这任期越是快到头，我就越不想听那帮将军在电话里抱怨个没完。这次，军队又拿中东的破事当借口，要求进行更多的石油开采。他们说，我们在石油和其他消费品方面必须实现自给自足，不然就会被阿根廷人拿捏得死死的。\n\n看来又得去麻烦贝尔特朗了。我们让他跟贸易部和外交部那边打个招呼，批几个许可给那些公司，让他们去巴西内地勘探开采。理想情况下，他们会发现石油和其他自然资源，这样我们就能用这些东西来给经济加把火了。"
 BRA_cisplatina_70: "西斯普拉蒂纳70"
 BRA_cisplatina_70_desc: "“西斯普拉蒂纳70”这个名字让人回想起巴西与阿根廷之间的第一次战争，而这场演习本身，也将成为南美历史上规模最为恢弘的军事演习。西斯普拉蒂纳是一系列大规模军事演习，旨在提高巴西军队与盟友军队的协调作战能力，为应对一切潜在威胁做好准备。经过数月的筹备，我们和盟友的部队都已经到位，随时可以开始演习。\n\n我们期望，在“西斯普拉蒂纳70”圆满成功之余，还能一并达成两个非军事目标。其一，是向巴西人民展示，巴西军队是如何在全民盟治下得以强大，并承担起捍卫南美自由的重要职责，以此在十月大选中赢得更多选民的支持。其二，用武力展示震慑阿根廷，促使其同意开启一系列秘密会谈，从而结束南美的冷战。"
 brazil_lacerda.139.b: "“他认真的吗？我们不会允许。”"
