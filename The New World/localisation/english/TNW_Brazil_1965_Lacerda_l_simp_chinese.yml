 brazil_lacerda_strikes.17.t: "异心的种子"
 brazil_lacerda_strikes.17.desc: "凉爽的午后微风轻轻拂过塔沃拉的肩膀，他的妻子正随意地絮叨着一天里发生的琐事。对于塔沃拉来说，今天简直糟糕透顶，而这家咖啡馆露台上难得的平静，正是他迫切需要的一点喘息。最近，每一天都如出一辙：他一走进高原宫，拉塞尔达就甩过来一整桶烂摊子，然后自己转身去制造更多新的麻烦，而塔沃拉只能在接下来的十来个小时里，拼命收拾残局。\n\n拉塞尔达的固执早就让他头疼不已，而如今，这种固执已经发展到一种他从前连想都不敢想的境地。如果再不小心应对，这一切怕是要重演1955年的乱局了。“对了——抱歉，又要提到工作了。”妻子一边用叉子拨弄着沙拉，一边问道，“你听说了吗？玛丽亚的丈夫也加入罢工队伍了。”\n\n塔沃拉摇了摇头，脸上显露出明显的不悦，端起咖啡抿了一口：“没听说，真是太不应该了。他怎么会做这种事？”\n\n“她说是因为想支持他们家的那个外甥之类的。其实我当时脑子里在想什么，你也能猜到。不过她倒是没把罢工闹得这么凶怪到你头上。”塔沃拉冷哼一声，至少这是个好消息。“你知道吗？”卢伊莎·塔沃拉继续说道，“其实我也挺同意的。如果现在是你负责谈判，维尔吉利奥，这事几个月前早就平息了！”\n\n这句随口的打趣，本是夫妻间的玩笑话，塔沃拉也确实笑了出来。然而，虽是无心之言，却像颗细小的种子，悄悄埋进了副总统的心底。而到了夜晚，塔沃拉平躺在床上，凝视着天花板时，这颗种子竟开始悄然发芽。那个他曾无数次掂量、无数次压下的想法，逐渐成型——他向来比总统更冷静、更理智；人缘好，关系广；如果与罢工者的谈判一再破裂，而所有的怨气都冲着拉塞尔达而去……"
 brazil_lacerda_strikes.17.a: "……那么，总统的位置，或许就该是他的了。"
 BRA_Riots_Tavora_coup_warning_tt: "该事件触发的原因是全民盟绝望度高于40%，且£GFX_BRA_UDN_intransigence_texticon §Y强硬§!高于40%。§x抗议热情或战斗性§!的增长速度将加快，请§R谨慎行事§!！"
 brazil_lacerda_strikes.18.t: "命悬一线"
 brazil_lacerda_strikes.18.desc: "塔沃拉铁青的脸色掩饰着他剧烈的头痛。里奥斯满脸忧虑，在休息室里来回踱步。最后一轮谈判是冗长、艰难而且极其折磨的。“难以置信，他们居然还想从我们这里榨出更多好处。”里奥斯筋疲力竭地说，“我们已经给了他们够多了，我们可不是金子做的，如果这种情况继续下去……”\n\n忽然推开的门发出的巨响打断了他。工人总指挥部的领袖带着他的谈判代表们冲出了房间：“对你们来说我就是个笑话是吧？我看，你的手下就是这么想的！”他说着，用手指着一旁的里奥斯。“如果你们真把我当成个傻子，以后你们就用不着这么想了！谈判已经结束了！”\n\n塔沃拉猛地从椅子上站起来，想要劝阻他，但他想说的话却噎在了喉咙里，就好像他僵在了原地。他的心中屈辱不已。他曾经是一位州长，如今是这个国家第二有权势的人，如今他却呆若木鸡地站在这里，像一个不折不扣的蠢货。\n\n万幸的是，里奥斯没有掉链子。他沉着地走上前去：“请不要这么草率地做出决定。”他的眼中流露出了绝望，“如果你们走了，那我们就再也帮不上你们了。拉塞尔达会不择手段地毁灭你们，这不是我们想看到的结果。拜托了，请坐下吧，我们可以继续商讨。”\n\n一阵沉默。“行吧，”片刻后，工总领袖说，“但这是你们最后的机会。要是再出现这种情况，就再也没得谈了。”"
 brazil_lacerda_strikes.18.a: "塔沃拉几乎释然地昏死了过去。"
 BRA_Riots_CGT_warning_tt: "此事件触发是由于£BRA_CGT_texticon §Y工人总指挥部§!的£GNG_riot_radicalism_texticon §x抗议热情§!高于60%且£BRA_CGT_texticon §Y工人总指挥部§!的£GNG_riot_strength_texticon §e实力§!高于40%。若再次达到该阈值，谈判将失败。"
 brazil_lacerda_strikes.19.t: "决死行进"
 brazil_lacerda_strikes.19.desc: "穿过闪光灯与窃窃私语的记者群时，塔沃拉依然保持着军人般的笔挺身姿。但当他走向新一轮谈判会场时，心中却不由得紧张起来——这很反常，毕竟一切理应如常运转：若泽·阿图尔·里奥斯像往常那样递来简报，推开门的瞬间本该看到工人总指挥部的代表团。\n\n可会议室里只有里奥斯和一群惊魂未定的谈判代表，工总的人根本不在。\n\n“万分抱歉，塔沃拉。”里奥斯仿佛一个向秃鹫求救的濒死之人，“我试过及时通知你，但没成功。我给他们打了十几次电话，每次接通都是同一句话：‘没得谈’。”\n\n“知道了。”随行官员们试图从塔沃拉脸上捕捉情绪，却只看到一张复活节岛石像般冷硬的面孔。所有风暴都被锁在冷峻的面具之下。\n\n“现在怎么办？工总不会停手，局势只会更糟。”塔沃拉的视网膜上闪过圣保罗街景：罢工者将轿车堆成火葬堆，用焚车作祭，祭奠奴役他们多年的资本恶灵。而今日，这场献祭的烟柱比往常更接近天际。\n\n“终结罢工。要么他们输，要么巴西输。”简洁的檄文已足够点燃在场者的眼神。塔沃拉闭目时，拉塞尔达讥诮的面容在黑暗中浮现。至少门外聒噪的记者比那张脸可爱得多。他猛然推开门——先解决媒体，再碾碎罢工，不择手段。"
 brazil_lacerda_strikes.19.a: "再次陷阵。"
 brazil_lacerda_strikes.20.t: "临界点"
 brazil_lacerda_strikes.20.desc: "副总统维尔吉利奥·塔沃拉翻阅着刚被塞进手中的文件。有些是打字机敲出的规整文字，有些是潦草的手写体……但所有纸张都传递着相同的信息——巴西国内外的大型企业正发出威胁，如果谈判触及他们的底线，将重新评估在巴西的布局。更令人不安的是战争部长的密函，字里行间暗示军方情绪暗涌，局势可能失控。民主工会运动显然已失去耐心，正在划下红线。\n\n塔沃拉抬头望向拉塞尔达总统，今早他抵达劳工部准备谈判时，后者将这份文件交给了他。里奥斯正颤抖着翻阅其他文件，额角渗出细密汗珠。\n\n“我向他们保证不会再让步了。”总统的声音裹挟着威胁，却难掩心中的恐惧，“别让事态失控。”\n\n说罢，这位国家元首径直走向等候的防弹轿车。引擎轰鸣中，车队载着他消失在通往总统府的方向。\n\n“我们该怎么办？”里奥斯攥着文件的手指不住发抖。\n\n塔沃拉面无表情地将文件整齐地塞进西装内袋，转身走向劳工部大楼。"
 brazil_lacerda_strikes.20.a: "尽一切所能。"
 BRA_Riots_MSD_warning_tt: "此事件触发是由于£BRA_MSD_texticon §m民主工会运动§!的£GNG_riot_radicalism_texticon §x抗议战斗性§!高于60%且£BRA_MSD_texticon §m民主工会运动§!的£GNG_riot_strength_texticon §e实力§!高于40%。若再次达到该阈值，§J谈判§!将失败。"
 brazil_lacerda_strikes.21.t: "道路尽头"
 brazil_lacerda_strikes.21.desc: "尽管讨论中有些挫折和阻碍，副总统维尔吉利奥·塔沃拉还是带着谈判团队走进了劳工与社会保障部，希望今天一切都能回到正轨上。像往常一样，他向在大厅中等待着的记者们微微一笑，但还没来得及和他们说话，走廊上就传来了一阵骚动。塔沃拉和记者们望去，只见武警和保安们粗暴地拽着带走了本来应该和他谈判的工人总指挥部代表，只剩下了怒火与咒骂。\n\n跟在后面的是外套和领带都已歪歪扭扭，头发乱成一片，看起来没怎么睡觉的劳工部长若泽·里奥斯。他向副总统走了过来。\n\n“抱歉没有提前通知你，”里奥斯的笑看起来无比悲伤。“但总统已经决定，这里已经用不上他们了。”\n\n塔沃拉茫然地盯着前方，被护送着离开了大楼。他和最后一位工总代表的眼神交会了，工会领袖的脸上交织着各种情绪：被背叛，愤怒，困惑……而塔沃拉又怎么能责怪他呢？"
 brazil_lacerda_strikes.21.a: "大门被猛地关上了。"
 brazil_lacerda_strikes.22.t: "提案"
 brazil_lacerda_strikes.22.desc: "副总统维尔吉利奥·塔沃拉正舒舒服服地躺在劳工与社会保障部长办公室的沙发上，若泽·阿图尔·里奥斯带着一堆文件走了进来。\n\n“工人总指挥部态度强硬。”里奥斯关上门后，随即将工会的要求清单呈递给塔沃拉。副总统默默地浏览着文件，上面的内容包括对因参与罢工与“过度裁员”而惨遭解雇的人员实施全面特赦，大幅提高最低工资，调查一些强势企业与商人的骚扰行为，限制警方对抗议者与罢工工人采取的手段，以及一连串的政策方针与法律提案。就算他们过的了国会那一关，拉塞尔达也肯定会在签署法案时否决这些提案。\n\n“荒谬至极，”塔沃拉抬头道，“这玩意儿听起来更像帮马克思主义者的愿望清单，而非合情合理的谈判纲领。拉塞尔达绝不会同意这些条件。”\n\n“确实如此，但如果这能结束罢工，或许我们也只能硬着头皮上了？”里奥斯回复道，“毕竟他们是罢工的发起方，如果我们不想毁掉连任的机会，或是引发进一步的暴力事件，那我们就应该好好考虑一下他们的条款。”"
 brazil_lacerda_strikes.22.a: "你说得对，告诉他们我们接受条件。"
 brazil_lacerda_strikes.22.b: "这只是开价而已，还有讨价还价的余地。"
 brazil_lacerda_strikes.23.t: "提案"
 brazil_lacerda_strikes.23.desc: "副总统维尔吉利奥·塔沃拉正舒舒服服地躺在劳工与社会保障部长办公室的沙发上，若泽·阿图尔·里奥斯带着一堆文件走了进来。\n\n“挺意外的，工人总指挥部还蛮讲道理。”里奥斯关上门后，随即将工会的要求清单呈递给塔沃拉。副总统默默地浏览着文件，上面的内容包括对因参与罢工而惨遭解雇的人员实施全面特赦，适度提高最低工资，调查一些强势企业与商人的骚扰行为，限制警方对抗议者与罢工工人采取的手段，以及引入午间饮食休息的合理规定。\n\n“出奇的公平，”塔沃拉抬头道，“比我想象中的还要合理。但拉塞尔达还是不会同意这些条件。”\n\n“确实如此，但这些提案立场温和且在接受范围之内，就算总统不同意，全民盟的大部分成员也会支持这些提案。”里奥斯回复道，“不论是从政治还是人道主义的角度上看，一口回绝这份提案都绝非明智之举，这样做绝对会在下次选举来临之际损害我党形象。”"
 brazil_lacerda_strikes.23.a: "它开了个好头，但还是再改一份能让拉塞尔达同意的提案出来吧。"
 brazil_lacerda_strikes.23.b: "我们别无选择。告诉他们我们接受。"
 brazil_lacerda_strikes.24.t: "谈判终止"
 brazil_lacerda_strikes.24.desc: "维尔吉利奥·塔沃拉心情愉悦地漫步在通向劳工部的小路上，马上就是总罢工谈判的最后阶段了。他已经全盘接受工人总指挥部的强硬条款，眼下只需处理一些细则问题。直到他看见停在外面的总统豪华专车，一旁站着的是勃然大怒的拉塞尔达。\n\n“你这混蛋！”他向塔沃拉咆哮道，“你没有任何权力同那帮社会主义贱畜达成任何协议！”\n\n“总统先生，小声点儿，”塔沃拉冷静地回复道，“这是公众场合，其他人会听到的。”\n\n“你是我的全权调解人，没错，但你没有决定权，”拉塞尔达稍微压低了声音，“我来发号施令，我才是巴西总统。我为了这个国家肝脑涂地，把它引上正轨，而你现在要他妈把一切都毁了！你能有今天都是因为我提名你为竞选搭档。我当年能捧着你让你节节高升，现在也能轻而易举地捏死你。我完全可以让全民盟今后不提名你出任任何职务，哪怕是亚马孙村庄的议员。”\n\n“总统先生，我相信我们还可以谈——”\n\n“不，没有谈判余地。我已经告知工总的那帮共党分子到此为止了，我们之间没有交易可谈。”拉塞尔达喘着大气，怒斥道，“现在，赶紧把这堆破事处理干净，然后滚回去好好整顿这个国家。”拉塞尔达转身钻回车内，砰的一声关上了门。\n\n黑色高级轿车缓缓驶离，塔沃拉抬头发现里奥斯站在一旁。看样子他完全被刚才那段对话吓住了，但他还是勉强向塔沃拉挤出了一丝微笑，随后匆忙回到了部里。而塔沃拉则一如既往，不动声色。"
 brazil_lacerda_strikes.24.a: "毕竟，拉塞尔达已经落入了他的圈套。"
 brazil_lacerda_strikes.25.t: "免谈"
 brazil_lacerda_strikes.25.desc: "维尔吉利奥·塔沃拉心情愉悦地漫步在通向劳工部的小路上，马上就是总罢工谈判的最后阶段了。他已经全盘接受工人总指挥部的温和条款，眼下只需处理一些细则问题。直到他看见停在外面的总统豪华专车，一旁站着的是勃然大怒的拉塞尔达。\n\n“你这白痴！”塔沃拉走近了愤怒异常的拉塞尔达，“你说过会和那帮社会主义蠢猪谈判，但可没说过直接向他们低头让步！”\n\n“总统先生，他们的要求非常合理公——”\n\n“公你个头！”拉塞尔达怒吼道，“一群懒得一无是处的马克思主义者又在做白日梦！你的所作所为会让全巴西的企业尽数破产，引发一场该死的经济衰退，到时候全民盟的下季选情就有的好看的了！”\n\n“总统先生，我相信我们还可以谈——”\n\n“不，没有谈判余地。我已经告知工总的那帮共党分子到此为止了，我们之间没有交易可谈。”拉塞尔达十分生气，但还是控制住了自己的脾气，“行了，告诉他们回去工作吧，我们可以将这个国家导向正途。”拉塞尔达转身钻回车内，关上了门。\n\n黑色高级轿车缓缓驶离，塔沃拉抬头发现里奥斯站在一旁。看样子他完全被刚才那段对话吓住了，但他还是勉强向塔沃拉挤出了一丝微笑，随后匆忙回到了部里。而塔沃拉则一如既往，不动声色。"
 brazil_lacerda_strikes.25.a: "毕竟，拉塞尔达已经落入了他的圈套。"
 brazil_lacerda_strikes.26.t: "被动免疫"
 brazil_lacerda_strikes.26.desc: "大音希声，大象无形。惝恍迷离间，抗议者们的乐声延绵在巴西利亚的上空，音韵严丝合缝，浑然一体。也正因此，当他们拾起散落一地的扩音器四散之时，这份打破音律的缄默才会显得这般刺耳，如同失常的心律。\n\n移步另一座城市，若非财物早已遭人抢掠一空，浓烈刺鼻的烟尘便会攫住他们的咽喉。商铺燃烧的缘由，与掷向警方的鞭炮并无二致。\n\n不过，无论去往何处，混乱之后，靴底踏过柏油路面的声响接踵而至。国家权力也许会迟到，但绝不会缺席，绝不。\n\n唯余沉寂。除却环境悄然无声，这片沉寂、这片工人运动中止所遗留的虚无，反倒醒目地显露出此处本应存在的事物。\n\n警局外，拉塞尔达伴着塔沃拉一同走出豪华专车。拉塞尔达领先数步，手指拂过等候在此的一名警官佩戴的奖章。与此同时，塔沃拉体味着这片虚无，感受它的轮廓。\n\n纵火焚烧的痕迹无异于美丽城市的创面，残破的街垒与粗制武器则是与感染相关的抗原。多年来，大街小巷第一次鸦雀无声。无人愿意再走出家门，又能责怪谁？\n\n这可称作自由，同样可称作恐怖。"
 brazil_lacerda_strikes.26.a: "动乱终受镇压……至少当下如此。"
 brazil_lacerda_strikes.27.t: "尘埃落定"
 brazil_lacerda_strikes.27.desc: "寂静笼罩巴西。标语和横幅纷纷撤下，抗议与呐喊宣告平息。长期关闭的企业与工厂恢复生机，重新运作。灯光闪烁，卡车开动，再过几天，一切就会像什么都没发生过一样。\n\n工总偃旗息鼓、回去工作，民主工运的领导人觥筹交错，就保护巴西工人免受马克思主义和威权主义的侵害举杯欢庆。但是，在数百万无精打采赶着上班的打工人心中，一种失望感挥之不去。用集体行动向老板示威换取让步，几周没有工资换来一些加薪，究竟值不值得？也许值得吧，但这只是一小步而已。\n\n里约热内卢，格洛丽亚豪华酒店的水晶吊灯下，拉塞尔达总统被工商巨头紧紧包围。“向赤色分子低头！”“背弃自由市场理念！”的指责不绝于耳，而拉塞尔达却发现自己在为一项他绝不会支持的政策出言辩护。\n\n塔沃拉坐在套房里，静静地喝了一杯威士忌，紧闭的房门压不住屋外的声浪。也许他不会成为总统……真的有点失望。但他曾驾驭过拉塞尔达，帮助这个国家摆脱了动荡。塔沃拉又饮下一杯，他斜靠在椅子上，打开电视。"
 brazil_lacerda_strikes.27.a: "这杯酒就是他的奖赏。"
 brazil_lacerda_strikes.28.t: "无线电中"
 brazil_lacerda_strikes.28.desc: "“别吵了！我都听不见了！”丹特·佩尔卡尼身边的一个人吼道。这时，他和工人总指挥部的其他高层成员正在试着听清满是静电杂音的双向无线电里传来的声音。他们正挤在萨尔瓦多一家空荡荡的酒吧的桌旁，其中一个人正试着调试无线电好让信号好一点。\n\n“——塔沃拉退让了。他希望讨论更多议题。谈判不停的来回拉扯，进展缓慢。”丹特听见无线电里传来的噼啪声，“但他们依然希望达成协议，我们也愿意接着谈下去。”\n\n“行，听起来不错。”丹特对着麦克风说，“汇报一下目前的情况。”\n\n“政府谈判代表对现在的情况很恼火。”一个女人抱怨道：“而里奥斯部长就是个傻逼。我希望拉塞尔达把他放到这个位子上的唯一原因是他想要一个听话的傀儡。”\n\n酒吧里充满了欢快的笑声，还有人对开启了谈判、总是板着脸的塔沃拉打趣。但佩尔卡尼并不怎么在意这些笑话。他更关心的是罢工本身。那么多穷困的巴西人民走上街头抗议拉塞尔达的倒行逆施，牺牲了个人的生计却只能争取到减轻最糟糕的后果的可能性。希望这一切已经足够，但愿罢工能为这个国家带来一些积极的改变。"
 brazil_lacerda_strikes.28.a: "他们向巴西发出了洪亮而清晰的讯号。"
 BRA_Riots_CGT_demand_info: "随着罢工推进，£BRA_CGT_texticon §Y工人总指挥部§!将提出愈发严苛的§.诉求§!。接受、讨价还价或拒绝诉求将同步影响£BRA_CGT_texticon §Y工人总指挥部§!和£BRA_MSD_texticon §m民主工人运动§!的£GNG_riot_radicalism_texticon §x抗议热情或战斗性§!。你必须让£BRA_CGT_texticon §Y工人总指挥部§!的£GNG_riot_radicalism_texticon §x抗议热情§!低于§w10%§!才能同他们达成协议。"
 brazil_lacerda_strikes.29.t: "无线电中"
 brazil_lacerda_strikes.29.desc: "“别吵了！我都听不见了！”丹特·佩尔卡尼身边的一个人吼道。这时，他和工人总指挥部的其他高层成员正在试着听清满是静电杂音的双向无线电里传来的声音。他们正挤在萨尔瓦多一家空荡荡的酒吧的桌旁，其中一个人正试着调试无线电好让信号好一点。\n\n“……塔沃拉拒绝了谈判。无论我们做出了多少妥协，他都一概拒绝。”丹特听见无线电里传来的噼啪声，“现在他准备提出反要求，但我估计会更加苛刻。”\n\n“知道了。”丹特对着麦克风说，“告诉我们下一轮谈判什么时候开始。”\n\n“我就知道全民盟永远不会和我们合作的。”一个女人叹气道，“给老板鞍前马后，对工人一毛不拔。”\n\n队伍里传来了一些抱怨，还有人沮丧地说罢工已经要到头了。佩尔卡尼当然清楚这一点，绝也不喜欢这种结果。拉塞尔达的政策带来的一切潜在恶果都会结结实实地砸在数百万挣扎在温饱线上的巴西穷人身上。但只要示威继续下去，微弱的希望之光就依然存在。至少，他们能带来一些积极的改变。"
 brazil_lacerda_strikes.29.a: "杂音盖过了无线电里的消息。"
 brazil_lacerda_strikes.30.t: "前厅里的游说"
 brazil_lacerda_strikes.30.desc: "“您好，副总统先生？里奥斯部长？”穿着淡褐色外套的男人在塔沃拉和里奥斯一起走过劳工与社会保障部的门廊时叫住了他们。\n\n“抱歉，但我们现在很忙。”里奥斯说到。但那个男人和他的几个同伴挡住了他们去往谈判室的路。\n\n“哦，但我肯定这不会花两位太多时间。我们是民主工运的代表。我们希望能够帮助二位，给当前的麻烦事态带来一个……令人满意的结果。”\n\n塔沃拉连眼睛都没有眨一下。他很清楚所谓“民主工会运动”只是“巴西民主行动研究所”的白手套。而这个机构也只是他们背后的巴西大企业和保守派用来影响这个国家的工具罢了，按美国人的说法，它是一个“智库”。他也很清楚他们想要什么。\n\n“我们都是很简单的工人，和那些正在罢工的人一样。”那个男人接着说道，尽管怎么看他都不像是干过重体力活的人。“但是，我们不敢苟同工人总指挥部的共产主义立场。国家的稳定高于一切，而他们只会把巴西推向分裂，落得苏俄那样的下场。因此，我们相信劳资之间是有共同立场的，并且希望和两位一起努力，找到这些共同立场——无论是作为当前谈判里的一方，还是作为一股工人总指挥部无法染指的力量。”\n\n里奥斯看了一眼塔沃拉的表情，但什么态度都看不出来。里奥斯咽了口口水：“呃，嗯，我们绝不会放弃结束罢工的任何机会。如果你们有什么提议，我们至少可以讨论一下。”\n\n“太好了！”穿棕色外套的男人笑着说，然后和两人握手。“我们很快就会把提议带过来。祝你们工作顺利！”"
 brazil_lacerda_strikes.30.a: "可能的解药，还是金杯中的毒酒？"
 BRA_Riots_IMAD_offers_tt: "这一事件发生，是因为£BRA_MSD_texticon §m民主工会运动§!的£GNG_riot_radicalism_texticon §x抗议战斗性§!高于§w20%§!。£BRA_MSD_texticon §m民主工会运动§!的代表，和£BRA_MSD_texticon §m巴西民主行动研究所§!的游说团，也会有他们自己的§.要求§!，只要£BRA_MSD_texticon §m民主工会运动§!的£GNG_riot_radicalism_texticon §x抗议战斗性§!依旧高于§w20%§!"
 brazil_lacerda_strikes.31.t: "诉状：城市中的强迫劳动"
 brazil_lacerda_strikes.31.desc: "谨向贵委员会提交如下申诉：\n\n本案系一名玻利维亚籍外来务工人员针对企业主非法用工条件、拖欠薪资及扣押身份证件提出的控诉。诉状指出，圣保罗市多家工厂存在每日14小时超时工作现象，工业中心安全条件恶劣，因腐蚀性化学品使用不当及安全规程缺失，已造成多起肢体残缺与永久性失明事故。诉状列举大量债务奴役案例，包括以任意名目克扣、拖欠工资等行为。\n\n本诉同时代表流动农业工人加布里埃尔·卡里塔家属提起。加布里埃尔与当地劳务承包商乌戈·贝罗卡尔签订季节性用工协议后，其合同被转卖给某种植园。种植园主扣押其护照与工作许可，致使其无法证明合法身份。其劳动报酬屡遭拖欠，园主以“设备操作不当产生费用”为由拒绝支付且未出示任何书面凭证。在与监工发生冲突后，加布里埃尔遭暴力殴打并被捆绑于立柱上24小时禁食禁水。经此虐待，加布里埃尔突发心脏病身亡，死因被归咎于酗酒。\n\n国际劳工组织建议设立具备调查权与执法权的专门机构，以有效遏制农场及工厂剥削行为。该机构应有权对违法企业主处以罚款及监禁，在极端情况下可对工作场所实施临时监管以确保整改措施落实。"
 brazil_lacerda_strikes.31.a: "塔沃拉提议立即成立该机构以终止上述行径。"
 brazil_lacerda_strikes.31.b: "塔沃拉批准启动更全面的调查程序。"
 brazil_lacerda_strikes.31.c: "塔沃拉建议无限期搁置此议题。"
 BRA_Riots_Negotiations_effects_tt: "如果§J谈判§!§G成功§!，以下§w效果§!将立即生效："
 brazil_lacerda_strikes.32.t: "机器人问题"
 brazil_lacerda_strikes.32.desc: "日期：[?global.date.GetDateStringNoHourLong]\n\n主席：塔沃拉\n\n工人总指挥部谈判代表：丹特，埃托尔\n\n政府谈判代表：西尔维奥\n\n日程34：早上11：26，主席开始关于自动化议程的讨论。丹特指出自动化对流水线工人带来的潜在冲击。埃托尔同意，并明确表示机器人将完全取代工人并进一步加剧失业问题。\n\n西尔维奥反驳称这些讨论是没有依据的，理由是当前机器人科技的基本水平不足以在近未来彻底取代人类劳工。\n\n丹特提议，并且埃托尔支持，设立一个新机构以限制工业机器人的应用。丹特表示，这一机构的目标是对自动化进行严格的规章限制以确保就业安全。\n\n主席就这一提议发表意见。"
 brazil_lacerda_strikes.32.a: "主席同意了规范和限制自动化的提议。"
 brazil_lacerda_strikes.32.b: "主席反提议，设立一个有工人总指挥部参与的机器人咨询委员会。"
 brazil_lacerda_strikes.32.c: "主席否决这一提议，理由是自动化有降低成本的价值。"
 brazil_lacerda_strikes.33.t: "光阴虚耗"
 brazil_lacerda_strikes.33.desc: "会议于上午9时04分在巴西利亚劳动与社会保障部正式召开。政府与工人总指挥部的谈判代表均出席本次会议。\n\n议程接续前次会议，重回关于“长期雇佣保障制度”条款的讨论。工总代表洛佩斯表示，反对政府废除该制度，强调该制度是工人们赖以为生的安全保障与最后一道防线，他还希望填补漏洞，如禁止雇主在雇员服务期满十年之前将其解雇以逃避责任……\n\n……劳工部长里奥斯指出，长期雇佣保障制度效率低下，必须在适应经济形势变化的基础上进行改革，为劳资双方提供弹性。 他特别补充，总统将废除该制度视为谈判底线，若无法实现，政府可能退出协商……\n\n……洛佩斯重申，保留长期雇佣保障制度是工总的核心要求……\n\n……双方同意继续进行磋商以寻求共识。本次会议并未达成任何决议。会议于下午3:35休会。"
 brazil_lacerda_strikes.33.a: "保持现状，应该能让工总在其他议题上做些让步。"
 brazil_lacerda_strikes.33.b: "也许我们能通过改革使双方满意？"
 brazil_lacerda_strikes.33.c: "拉塞尔达想让它消失，那就这样吧。"
 brazil_lacerda_strikes.34.t: "矿工问题"
 brazil_lacerda_strikes.34.desc: "巴西工人总指挥部提请关注帕拉州与米纳斯吉拉斯州锌矿、硼砂及锡矿从业者面临的生存危机。这些维系巴西经济命脉的战略矿产，如今却遭受着玻利维亚的廉价进口矿产的严重冲击。数万矿工的饭碗已是岌岌可危，可能在上述地区引发严重的经济和社会问题……\n\n值此谈判之际，工总针对矿业危机提出如下解决方案：\n\n-立即对原产自玻利维亚的锌矿、硼砂及锡矿实施贸易壁垒；\n\n-通过政策引导或强制手段，要求巴西企业优先采购本土矿产；\n\n-制定玻利维亚矿产进口配额制度，并由政府尽快落实；\n\n-为受冲击最严重的矿工及其家庭提供转岗培训与异地安置方案；\n\n-组建巴玻联合工作组，协调两国矿业监管标准，确保公平竞争环境……\n\n……为保障我国矿工群体及其家庭、社区乃至国民经济的长远健康发展，政府必须果断出手。"
 brazil_lacerda_strikes.34.a: "对商业确有影响，但加征关税势在必行。"
 brazil_lacerda_strikes.34.b: "配额制与转岗培训制度眼下可作权宜之策。"
 brazil_lacerda_strikes.34.c: "相信我们能与玻利维亚朋友协商出妥善方案。"
 brazil_lacerda_strikes.35.t: "三分之二法"
 brazil_lacerda_strikes.35.desc: "日期：[?global.date.GetDateStringNoHourLong]\n\n主席：塔沃拉\n\n工人总指挥部谈判代表：丹特，埃托尔\n\n政府谈判代表：西尔维奥\n\n日程25：上午9：08，主席开始关于“三分之二法”的讨论。丹特表示，三分之二法对维持劳工群体的健康十分重要。埃托尔表示同意，补充称保护巴西免受外国影响是国家的重要职责。\n\n丹特提议发表一份正式的政府声明，重申三分之二法的重要性以安抚工总内部对潜在外国影响力的担忧。西尔维奥指出，让拉塞尔达总统做出这一贸易保护主义的声明有违已经落实的政策，并且会损害贸易、科技创新和对巴投资，也无益于提高生产效率。它只会限制社会流动且只对既得利益群体有利，因此西尔维奥提议废除这一法律以提高生产效率并降低成本。\n\n主席做出了有关三分之二法的决定。"
 brazil_lacerda_strikes.35.a: "塔沃拉同意三分之二法对国家安全而言十分重要。"
 brazil_lacerda_strikes.35.b: "塔沃拉提议修订该法律以授予熟练工人豁免权。"
 brazil_lacerda_strikes.35.c: "塔沃拉指出该法对社会流动和创新的负面影响并提议将之废除。"
 brazil_lacerda_strikes.36.t: "升阳翳影"
 brazil_lacerda_strikes.36.desc: "会议于上午9:12开幕，政府方与工人总指挥部的谈判代表团在巴西利亚的劳工与社会保障部出席。\n\n……工总代表皮涅罗指出，由于（已删去），大量日本移民进入巴西，导致巴西本地工人难以改善待遇和居住条件……\n\n……之后的讨论提及了来自日本和广东国的大型企业以及它们藐视已有劳动法律法规的行为。工总代表格德斯在会谈中提及了日本经理和他们虐待巴西雇员的行径，称他们为（已删去）。\n\n……工总代表要求中场休息以进行内部讨论。政府方同意，会谈于上午10:45暂停。\n\n会议于下午1:06继续。工总的代表团提出涉及日本移民和日本商业活动的以下要求：\n\n-禁止，或至少限制对巴移民；\n\n-确保日本公司遵守现有法律法规；\n\n-不允许扩大日本对巴西投资规模。\n\n政府方提出结束当天谈判日程以进行内部讨论。工总方同意，会议于下午1:27结束。"
 brazil_lacerda_strikes.36.a: "我们可以设定移民配额并打击企业。"
 brazil_lacerda_strikes.36.b: "我们将加强对日资企业的监管。"
 brazil_lacerda_strikes.36.c: "我们什么都不会做，这只会损害我国的经济。"
 brazil_lacerda_strikes.37.t: "劳动平等"
 brazil_lacerda_strikes.37.desc: "工人总指挥部始终将全体劳动者的自我价值与尊严置于最高优先级。唯有当工人被视作有血有肉的人，而非冰冷的数字或生产工具时，真正平等自由的社会才能建立。然而我们不得不痛心指出，当下的巴西距离这样的理想社会仍相去甚远……\n\n……我国最严重的结构性不平等根植于种族与性别歧视。总体而言，拥有欧洲血统与较浅肤色的男性往往占据更优渥的职位，享有更多晋升与发展通道，收入水平也显著高于非洲裔、印第安裔或混血裔男性群体。后者在求职过程中持续遭受系统性歧视——即便具备同等资质，他们仍被排斥在白人男性主导的行业之外，即便获得雇佣，薪酬待遇也普遍低于同岗位白人。而不同种族背景的女性同样面临严重歧视，大量女性被迫困守家庭，或只能从事家庭佣工和清洁工等职业……\n\n纵览人类历史，尚未有国家能彻底消除种族信仰差异与性别歧视，但这不应阻碍巴西迈出这一步，创建一个真正平等的国度，让所有男女都能享有尊严与尊重，获得同工同酬的待遇，共享平等的发展机遇。"
 brazil_lacerda_strikes.37.a: "巴西必将成为平等的国度！权利平等乃不可违逆之天命！"
 brazil_lacerda_strikes.37.b: "虽然无法一蹴而就，但我们可以从今天开始全民平等的进程。"
 brazil_lacerda_strikes.37.c: "动听的口号固然鼓舞人心，但现实中的众生远非平等。"
 brazil_lacerda_strikes.38.t: "劳动尊严"
 brazil_lacerda_strikes.38.desc: "工人总指挥部始终将维护全体劳动者的自我价值与尊严作为运动的核心理念。唯有当工人被视作有血有肉的人而非冰冷的数字或生产工具时，真正平等自由的社会方能建立。然而我们不得不沉痛指出，在巴西实现这样的理想社会依然遥不可及……\n\n……在这个国家的许多角落，劳工的处境与奴隶制时代相比几无改善。我们的成员持续报告着来自雇主、管理者乃至客户的身心虐待——肢体暴力与言语羞辱如同阴云般笼罩着工作场所。当微薄薪资与匮乏福利的剥削机制，叠加这种系统性的人格践踏，对于支撑国家运转的广大劳动者而言，无异于在伤口上撒盐……\n\n……那些因从事所谓“有失体面”或“配不上身份”的低薪工作而遭受的苛待与惩罚，正在侵蚀着数百万巴西人的身心健康。太多人被困在由职业标签定义的人生牢笼里，在尊严持续受损的高压环境下逐渐丧失自我提升的动力。这种将人的价值与工种挂钩的扭曲观念必须被破除！我们敦促政府采取切实行动，促进社会各领域的平等与尊严。无论肤色、性别或职业，我们是巴西人，理应获得同等尊重。"
 brazil_lacerda_strikes.38.a: "我们将制定反骚扰与反虐待政策，守护每一位公民的正当权益！"
 brazil_lacerda_strikes.38.b: "人们只是不自觉，这个问题通过教育就能解决。"
 brazil_lacerda_strikes.38.c: "有点骨气吧！吃得苦中苦，方为人上人！"
 brazil_lacerda_strikes.39.t: "罢工的余波"
 brazil_lacerda_strikes.39.desc: "日期：[?global.date.GetDateStringNoHourLong]\n\n主席：塔沃拉\n\n工人总指挥部谈判代表：丹特、埃托尔\n\n政府谈判代表：西尔维奥\n\n第52项议程：下午4时42分，主席就针对工总总罢工所颁行的总统法令的后续影响开启讨论。丹特坚持要求必须立即重新雇佣所有被解雇的罢工者。西尔维奥表示反对，称法律修订是公平的，全面复聘实际不可行，且会导致劳动力市场普遍低效。\n\n埃托尔拍案而起，指出政府不仅要重新雇佣所有工人，还必须出台新的劳动保护措施以防工人再次被随意解雇。主席训诫了埃托尔的失态行为。埃托尔以谈判漫长为由致歉，并暂时离席前往卫生间。丹特代表埃托尔致歉，重申劳动保护与复聘诉求。西尔维奥建议通过第三方审查确保仅雇佣合格人员。丹特强烈反对，指出在逐个审查的情况下，重新雇佣的进度将如冰川移动般缓慢。\n\n"
 brazil_lacerda_strikes.39.a: "主席提议按资历分阶段复聘缴纳会费的会员。"
 brazil_lacerda_strikes.39.b: "主席提议仅复聘资深及关键岗位人员。"
 brazil_lacerda_strikes.39.c: "主席提议通过个别审核，仅限复聘绩效最优秀员工。"
 brazil_lacerda_strikes.40.t: "劳动补偿"
 brazil_lacerda_strikes.40.desc: "工人总指挥部发动罢工绝非出于对巴西的憎恨。恰恰相反，正是出于对那些维系伟大祖国运转的男男女女的热爱，我们才选择采取行动。我们坚决反对全民盟企图废除最低工资标准的腐败短视行径。尽管这并非我们唯一的诉求，但为避免这场灾难性的错误，我们不得不发起罢工……\n\n……我们绝不能安于维持现有最低工资标准。必须确保劳动报酬的实际购买力不受侵蚀。面对依然存在的通胀压力与生活成本攀升，建立强劲且动态调整的最低工资机制至关重要。我们首先要求将最低工资上调30%，并每年根据物价指数、生活成本等经济指标进行相应调整……\n\n……此外，我们要求巴西现政府做出书面承诺，永不废止可维持基本生活的现行工资保障体系。我们知悉总统阁下在此议题上展现出和解姿态，对此深表感激。但为确保法律效力，我们仍需政府签署永久性保障最低工资标准的承诺书……\n\n……巴西贫困阶层与工人阶级家庭的福祉始终牵挂我们的心。他们正是我们为之奋斗的理由。我们诚挚期盼政府能采取切实行动改善这些受压迫同胞的境遇。若事实证明在此崇高目标上，本组织孤立无援，而政府已沦为资本利益的傀儡，我们的良心将绝不允许我们在短期终止抗争行动……"
 brazil_lacerda_strikes.40.a: "我们会根据他们的要求提高最低工资水平。"
 brazil_lacerda_strikes.40.b: "我们承诺逐年提升工资标准，但不会现在就提高。"
 brazil_lacerda_strikes.40.c: "我们不会扭曲自由市场的。不做改变。"
 brazil_lacerda_strikes.41.t: "企业临时工问题"
 brazil_lacerda_strikes.41.desc: "会议于中午12时42分正式召开。民主工运代表米格尔·佐尔泽拉提前二十分钟抵达会场。若泽·阿图尔·里奥斯提前十二分钟进入谈判室。在正式谈判开始前，双方代表互致问候，并就议题讨论顺序及发言次序进行了协调。\n\n首个议题聚焦临时工问题。米格尔表示，这方面的主要问题是临时工的待遇。他指出，由于担心雇佣临时工可能会被认为是要替代罢工者而面临法律诉讼，对临时工中介机构的监管又十分严格，多数企业已停止雇佣临时工，导致大量临时工陷入失业困境。\n\n米格尔进一步强调，陷入困境的不单是临时工群体，还有许多企业因此濒临停业。为此他提出解决方案：允许延长临时工工作期限、免去强制福利、简化背景审查流程，并为雇佣临时工的企业提供明确法律保护。\n\n里奥斯质疑米格尔是否真认为这些改革能惠及临时工群体，因为这只会导向“更少收入与更多劳动”。米格尔反驳道，与奉行共产主义的工总不同，临时工宁可选择当下辛勤工作获取收入，而非等待虚无缥缈的救济金，并反问对方是否认同这种务实态度。"
 brazil_lacerda_strikes.41.a: "我们完全同意。我们将在减轻他们负担的同时，依法保护他们雇主的权利。"
 brazil_lacerda_strikes.41.b: "我们将允许公司雇佣更多临时工，但不能降低临时工的待遇标准。"
 brazil_lacerda_strikes.41.c: "我们不会支持临时工法案，给劳资战争中的任一方做工具人。没得谈。"
 brazil_lacerda_strikes.42.t: "最低工资问题"
 brazil_lacerda_strikes.42.desc: "谈判继续进行，至下午2点56分转入新议题——最低工资的自主调整。米格尔开场时指出，强制全国推行的最低工资制度虽出于保障劳动者收入的善意，但往往导致严重的失业问题。\n\n米格尔坦言，他深知彻底废除现行最低工资制度难度极大。为此，他提出通过制定差异化配套规则完善现有制度，为运营模式各异的企业预留弹性空间。通过放宽限制、增加选项，为企业降低人均用工成本，进而扩大雇佣规模。\n\n米格尔提出，应允许企业将交通、食品及住房等非货币福利纳入工资体系。某些企业可能更擅长提供实物福利而非现金，这样既能确保员工获得优渥待遇，又可避免企业负担过重。他还特别提到，许多企业希望试行新型“零工时”合同制度，也即非固定工作时长制。\n\n结束发言前，米格尔暗示里奥斯部长这些提议对他有益。面对追问，这位民主工运代表解释道：监管负担的减轻将大幅缩减劳工部的检查支出，省下的资金既可投入其他民生项目，亦可用于提升公务员待遇。"
 brazil_lacerda_strikes.42.a: "固守成规、不思变通只会让国家裹足不前。我们同意贵方的全部诉求。"
 brazil_lacerda_strikes.42.b: "我们坚信平衡之道，工时等基准指标上将维持较低标准，但保留适度弹性空间。"
 brazil_lacerda_strikes.42.c: "我们不会为此扭曲法律，我个人对贵方暗指腐败的弦外之音感到遗憾。"
 brazil_lacerda_strikes.43.t: "保护非正式劳动者"
 brazil_lacerda_strikes.43.desc: "短暂休会用过午饭后，米格尔和里奥斯代表于16时24分重启会谈。这次里奥斯提出了非正规经济的议题。他表示，这些游离于社会边缘非法经营的商户与劳动者之所以不遵守劳动法规，主要是出于成本考量。\n\n里奥斯提到，多年以来，政府一直在探索如何在维护劳动法前提下，对这些灰色经济实体进行清理或收编，他随即询问米格尔重提此事的用意。米格尔坦言，通过为这些群体设立特别保护条款，这个问题可以得到解决。里奥斯要求具体说明。\n\n米格尔详细阐述道，民主工运建议为这些非正规群体开辟合法通道，使其获得特殊承包商与供应商资质，仅需遵守部分法规。同时提议对与之合作的企业实施监管减负与税收优惠，以此激励企业将此类合作从“暗账”转为明面交易。\n\n里奥斯指出，此类条款实质上是将非法经营合法化。米格尔立即反驳道，这些劳工日夜辛勤已是既成事实，通过承认其劳动价值，并引导企业建立正规合作，才能真正帮助经济边缘群体融入主流。他厉声质问里奥斯是否要与如此崇高的社会目标作对。"
 brazil_lacerda_strikes.43.a: "我们都希望更多人参与正规劳动，只要通力合作，一定可以找到解决方案。"
 brazil_lacerda_strikes.43.b: "合法化是重中之重，但是我们坚持实行最低工资和劳动监察。"
 brazil_lacerda_strikes.43.c: "你不是第一个尝试改变体制的人，我们不怪你。"
 brazil_lacerda_strikes.44.t: "放松农村企业监管"
 brazil_lacerda_strikes.44.desc: "两位代表的新一轮讨论于18时10分展开。按惯例由米格尔率先抛出了一整套聚焦农村监管改革的建议方案。他强调这些措施应在农村放语境下进行考量，因其仅适用于农村劳动者，不涉及城市环境。\n\n米格尔首先提出加大机械化投资力度，并放宽许可审批。他认为创造更多技术岗位将惠及各个阶层，并逐步淘汰农业生产中许多摧残人性的劳作方式。此外还建议放宽劳动者住房标准，并将计件付薪模式合法化。\n\n里奥斯面露困惑，质询米格尔是否真心认为这些举措有益于劳动者。米格尔冷冷回应道：工作效率更高者理应比怠工者获得更高报酬；宽松监管的住房成本更低，劳动者可将收入用于其他方面。他强调这只是赋予选择自由，并非异想天开。\n\n里奥斯反驳称，此类制度可能拉低多数务农者的生活水准。米格尔反诘对方是否真正下过田地，是否能体会那种境遇下的真实诉求。里奥斯又反问米格尔的生活经历，米格尔则直接要求对方干脆阐明政府立场得了。"
 brazil_lacerda_strikes.44.a: "你的方案剑走偏锋，但我姑且信你一次，我们将着手推行这套新体制。"
 brazil_lacerda_strikes.44.b: "这并非不可行，但是现在我们只能放开机械化，希望你能理解。"
 brazil_lacerda_strikes.44.c: "米格尔，你说的这些东西根本站不住脚，我就当你刚才没提过。"
 brazil_lacerda_strikes.45.t: "童工问题"
 brazil_lacerda_strikes.45.desc: "谈判双方于7:23正式开始讨论最后一个议题。米格尔主动地提出了这一此前从未提及的话题，即把最低雇佣年龄从14岁降低到12岁。里奥斯询问他是否是在开玩笑，而米格尔明确表示他是认真的，并且会为此做出合理的解释。\n\n米格尔说，里奥斯可能已经知道那些不安全的社区里有多少孩子在街上游荡。他特别指出，里奥斯作为劳工部长应该清楚，政府并没有能力帮助他们。他表示，企业可以通过提供稳定工作来帮助他们，但这种做法现在是违法的。\n\n里奥斯问，对这些孩子的长远发展来说，到底是尽早就业还是接受妥善的教育更能改善他们的处境。米格尔回答道，教育几乎不能为这些孩子带来更好的工作机会，但在实际工作中接受职业培训可以让他们以后找到更高薪的工作。此外，米格尔提到，许多14岁以下的孩子已经在工作了——法律要做的只是承认这一事实。\n\n米格尔对里奥斯表示，坦白说，其实这项提议不是为了改善工人的待遇。他承认他知道扩大劳动人口供应不会受到他所代表的人的欢迎。然而，他们迫切需要采取行动来改善那些挣扎在贫困线上的巴西孩子的生活状况。"
 brazil_lacerda_strikes.45.a: "“你说得对，这不会受欢迎的。但我们同意。我们将根据你们的诉求降低最低雇佣年龄。”"
 brazil_lacerda_strikes.45.b: "我们同意。然而，我们要保持严格监管，确保有工作的孩子同样上学。"
 brazil_lacerda_strikes.45.c: "我认为我们已经离开野蛮的三十年代了。这个话题到此为止。"
 brazil_lacerda_strikes.46.t: "病假和家事假问题"
 brazil_lacerda_strikes.46.desc: "里奥斯于上午8:14召开会议。丹特提出首先讨论家庭假和病假问题，里奥斯表示同意，并表示首先讨论家庭假问题。\n\n里奥斯介绍道，《联合劳工法》保证了（1）12周的带薪产假；（2）2周的流产假；以及（3）禁止由于以上假期开除母亲。里奥斯称遵守这些法律对公司来说太过昂贵了，更加现实的规定是带70%工资的四周产假。\n\n丹特反对称这些法律让许多女性能够在工作的同时抚养子女。里奥斯回答说他知道，并且对于额外的经济压力导致女性无法运用她们由上帝赋予的能力感到遗憾。随后里奥斯补充道，他们应该在讨论完病假问题后继续这一话题。\n\n里奥斯介绍道，现行法律赋予了员工（1）15天带薪病假，并且（2）超过这一时限的工资由社保局（INSS）支付。里奥斯表示这项服务成本过高而且骗补问题猖獗。因此里奥斯表示他们考虑将该法律修订为每年一个月带薪病假，其中10天由雇主承担。\n\n丹特反驳道，耶稣治好了病人，但并没有让他们在十天内就立刻回去工作。所以他想，里奥斯的本事怕是比耶稣还大。里奥斯说这种比较已经跑题了。丹特问里奥斯在特殊假期问题上的最终报价是什么，好让谈判继续下去。"
 brazil_lacerda_strikes.46.a: "里奥斯表示，为了国家的利益，他们会维持现状。"
 brazil_lacerda_strikes.46.b: "里奥斯依然认为他的折中方案是对所有人来说最好的结果。"
 brazil_lacerda_strikes.46.c: "里奥斯称保留当前的任何规定都是不可能的。"
 brazil_lacerda_strikes.47.t: "建筑业和工作场所规章问题"
 brazil_lacerda_strikes.47.desc: "早上11:06，里奥斯提议开始讨论一个小时前搁置的建筑业和工作场所规章问题。丹特表示同意。里奥斯在讨论中列出了主要的规章内容。一些法律保证劳动者获得饮用水、座位和其他便利，另一些法律规定工作场所要配备逃生出口和其他应急设施。\n\n里奥斯称这些法律已经不合时宜了。丹特表示工人总指挥部的首要目标就是保留这些规章。里奥斯反驳称这些法律太过僵化，并且给小微企业带来了额外的负担。丹特打断了他，表示压榨贫穷的劳动者比苦一苦已经很富有的企业主糟糕得多。\n\n里奥斯从谈判桌上拿起了《联合劳工法》文件。他指着其中的“第182条”，说这项法律要求工作场所不能被阳光直射。丹特询问这和现在的话题有什么关系，里奥斯解释道，由于通风科技的进步，哪怕没有遮阳也可以让工作场所保持凉爽。里奥斯补充道，实际上一些工人更喜欢在自然光下工作，但这项法律禁止了这种做法。\n\n丹特反驳说，只有那些应用了昂贵的新科技的建筑里才有这种条件，说所有楼房都这样纯属胡说八道。里奥斯说这只是个思维实验。丹特让里奥斯不要再用这些谬论打哈哈，直接把他们的条件说出来。"
 brazil_lacerda_strikes.47.a: "里奥斯承认，由于缺乏良好的替代方案，这些法律将得到保留。"
 brazil_lacerda_strikes.47.b: "里奥斯同意为体力劳动者保留这些规定，只要能增加一些灵活性即可。"
 brazil_lacerda_strikes.47.c: "里奥斯称这些法律必须废除，只有一小部分规定能保留下来。"
 brazil_lacerda_strikes.48.t: "用餐和工休问题"
 brazil_lacerda_strikes.48.desc: "下午3:42，里奥斯表示他希望能先去吃饭，让大家休息一段时间。丹特说他更希望能让工人们争取到休息，但现在休息一下也没问题。里奥斯说，现在的主要议题就是讨论涉及休息日间隔、禁止国家假日期间工作以及周日工作需要政府审批的法律法规。\n\n里奥斯表示，他希望讨论20%夜间工作加班费，以及长班次工作的餐食与中间休息问题。丹特打断了里奥斯，他说除了调整完全禁止在国家假日期间工作以及周日工作需要审批的规定，工人总指挥部绝不会在其他问题上让步。\n\n里奥斯则说，这种拉清单式的表态可不是谈判的好方法。他还补充说，丹特要想想多少工人希望能够多干一段时间。丹特说，他完全有理由坚持自己的立场。他拿出了印着瘦骨嶙峋的男女的黑白照片。里奥斯看了一会这些照片。\n\n丹特说他们是圣卡特琳娜的一群纺织工人。他们在一轮加急加班之后，在整整一个月里第一次去了教堂。在那以前，他们每天只能吃一顿饭，一天只能睡四个小时。丹特补充道，他们中没有人能活过今年。丹特说，里奥斯可别在形式问题上瞎扯淡了。他只需要告诉自己政府的立场是什么。"
 brazil_lacerda_strikes.48.a: "里奥斯表示如果这个问题确实这么敏感，那么政府会维持现状。"
 brazil_lacerda_strikes.48.b: "里奥斯同意保留那些最必要的法律，以换取丹特接受废除那些他不关心的规章。"
 brazil_lacerda_strikes.48.c: "里奥斯低声说他也无能为力。随后，他走出了房间，紧紧攥着手中的玫瑰念珠。"
 brazil_lacerda_strikes.49.t: "所谓“高调骚扰”"
 brazil_lacerda_strikes.49.desc: "下午4:47，丹特说他只需要再讨论一个问题，那就是骚扰调查。里奥斯表示他认为这是个让谈判圆满结束的好问题。丹特拿出了一份有着约七十家公司和企业的名单，表示他希望政府对这些公司虐待工人的行为进行调查。\n\n里奥斯浏览了这份名单，拿笔在其中几个名字下画上了标记线。里奥斯说他不认为（已删去）会被处罚。他低声说（已删去）也在这份名单里实在是出人意料，因为他们和工党关系密切。丹特询问里奥斯为什么他看着这些公司的名单还显得这么轻松。里奥斯回答道，虽然他看起来是个冷血的人，但他以前做社会保障部门协调员的时候和这些公司的代表打过交道。他知道这些公司有多么抗拒承担对他的部门应付的捐款份额，有多么唾弃共和国和它代表的价值。里奥斯承认，他也想搞倒这些王八蛋。丹特说，这要取决于总统和他政府的态度，如果他们确实不怕激怒这些公司的话。不过，如果这些调查可以开展，他也确实会更加支持把谈判继续下去。最好，丹特说，是公开调查，这样他就知道政府是否会对他们的富豪朋友们网开一面。"
 brazil_lacerda_strikes.49.a: "里奥斯表示，名单上的每一家公司都会依法进行全面的公开调查。"
 brazil_lacerda_strikes.49.b: "里奥斯承认他们无法进行公开调查，但他会仔细地核查每一项举报。"
 brazil_lacerda_strikes.49.c: "里奥斯说他们实在无法开展这些调查，风险太大了。"
 brazil_lacerda_strikes.50.t: "排除万难"
 brazil_lacerda_strikes.50.desc: "他们做到了。他们做到了仿佛不可能的奇迹。塔沃拉看着里奥斯在协议上签下自己的名字来结束这场他们竭力平息的罢工。塔沃拉也情不自禁地轻轻松了口气，脸上露出了微笑。这一刻被照相机的闪光和摄像机的嗡鸣声记录了下来，随后，摄影机记录下了房间里众人的鼓掌声。里奥斯放下了手里的签字笔，也加入了鼓掌和欢呼的行列。\n\n这时，唯一没有那么高兴的人是工人总指挥部的代表们。他们强颜欢笑，在媒体面前礼节性地握手言和。回到萨尔瓦多，丹特·佩拉卡尼和工会的其他领导们都已经筋疲力竭。在这场艰难的总罢工后，他们成功地让政府做出了一系列小让步，但这并没有从根本上改变巴西工人的处境。至少，工人阶级不会陷入更深的贫穷和堕落了。\n\n但这场运动已经到了强弩之末，大家再也没有了冲劲。所有人都已经疲惫不堪，罢工已经结束了。很快，标语和横幅会从街上消失，工厂和农场将重新开始运作。\n\n最终，塔沃拉赢了。他打败了工人总指挥部，不是靠拉塞尔达那样的暴力和极限施压，而是靠宇宙中最为强大的力量。"
 brazil_lacerda_strikes.50.a: "塔沃拉用时间打败了他们。"
 brazil_lacerda_strikes.51.t: "泄气"
 brazil_lacerda_strikes.51.desc: "人群越来越稀疏了。在一些地方，只有个别强硬人士还坚持在纠察线上，但绝大部分的公司和商店都已经重新开业。随着大罢工走向强弩之末，甚至于完全失败，一直在为争取更高的薪酬和工作条件而斗争的工人们也退缩了。他们急于为自己和家人赚钱糊口。\n\n在萨尔瓦多的酒吧里，丹特·佩拉卡尼和工人总指挥部的高层在过去几个月中组织罢工的地方，现在空无一人。现在张贴在酒吧外墙上的是一排描绘着共党煽动分子将刀刺入巴西工人阶级后背的可怕宣传海报。民主工会运动与他们的资本金主粉碎了人民的团结，对共产主义的恐惧压过了工人阶级团结起来、为更好的生活斗争的愿望。\n\n而在巴西利亚，劳工部长坐在给他的玻璃杯里倒酒的副总统对面。里奥斯有些失望，他本希望这场谈判至少可以给人民带来一些好处……但最后，比起和工人总指挥部的那些家伙达成妥协，还是巴西的稳定更为重要。所以，在罢工的引擎已经彻底燃尽了燃料，只能徒劳地喷吐着烟雾之时，塔沃拉在几个小时前让里奥斯结束了谈判。工人总指挥部的代表甚至没有抗议两句，而只是驯服地接受了这一切已经结束的事实。"
 brazil_lacerda_strikes.51.a: "随着一声叹息和一阵颤抖，引擎熄火了。"
 brazil_lacerda_strikes.52.t: "计划有变"
 brazil_lacerda_strikes.52.desc: "坐在谈判桌前的里奥斯尽力地让自己显得不那么焦躁。塔沃拉不是会莫名其妙地开会迟到的人，但副总统就是没有出现，也没有提前通知他会晚来。坐在劳工部长面前的工人总指挥部代表也一样耐着性子，但他们只是一边翻着自己的笔记，一边小声地交头接耳。\n\n门砰的一声打开，把房间里的每个人都吓了一跳。几个里奥斯从来没见过的人走进了房间，这让他感到十分奇怪。\n\n“抱歉，但这里是秘密谈判会场……”里奥斯说。\n\n“总统决定，谈判结束了。”走进来的人之一说。他的话让房间里的所有人都僵住了。里奥斯感觉他的心仿佛已经沉到了胃里。\n\n“塔沃拉总统宣布他将完全取消劳工法改革。《联合劳工法》依然有效。在新政府治下，改革尝试都将在与各方进行充分磋商后再落地。”\n\n“塔沃拉现在是总统？你……你是认真的吗？”里奥斯问。那个人短促地点了点头。\n\n一阵沉默，然后工总的代表们欢呼大笑了起来。他们互相拥抱、击掌。里奥斯靠回了椅子上，他依然对这件事感到难以置信。他怀疑塔沃拉在计划着什么……但这太疯狂了。\n\n之前对众人说话的那个男人又看向里奥斯："
 brazil_lacerda_strikes.52.a: "“总统希望邀请你去喝一杯，因为你接下来也不会忙了。”"
 brazil_lacerda_strikes.53.t: "前路已尽"
 brazil_lacerda_strikes.53.desc: "塔沃拉刚下车，劳工部长若泽·里奥斯便迎了上去，他神色慌张，几乎上气不接下气。副总统正要开口寒暄，里奥斯却连连摇头。\n\n“全完了。工人总指挥部退出了。谈判破裂了。”\n\n塔沃拉冷峻如常的面庞纹丝未动，内心却暗自窃喜。毕竟经济直线下坠，罢工愈演愈烈，国民经济濒临崩溃，拉塞尔达连表面功夫都懒得做，反而日渐暴戾癫狂……是时候为未来做准备了。副总统向里奥斯微微点头，随即转身上车。\n\n千里之外的萨尔瓦多市，充当工总临时总部的酒吧此刻人去楼空。倒不是因为警方镇压或罢工胜利……并非如此。门外，丹特·佩拉卡尼正站在话筒前慷慨陈词：\n\n“巴西的工友们！政府已表明他们毫无诚意，只愿施舍残羹冷炙。此刻我们必须发出怒吼！我们要求公平与正义！在诉求实现前，我们将坚守街头，让工厂农田继续停摆！为了平等！为了巴西劳动者！”\n\n谈判破裂与总罢工再起的消息传遍全国，关于警察——老天保佑千万别是军队——即将采取行动的不祥传闻开始蔓延。但这些还不足以浇灭罢工的烈焰……至少目前还不能。"
 brazil_lacerda_strikes.53.a: "巴西正身处危崖边。"
 BRA_Riots_tavora_backup_plan_tt: "§Q塔沃拉§!的备用计划§o启动§!了。"
 BRA_Riots_tavora_coup_end_negotiations_tt: "§J协商§!已无意义，§Q拉塞尔达的改革§!已悉数扭转，一切重归稳定。"
 brazil_lacerda_strikes.54.t: "热咖啡"
 brazil_lacerda_strikes.54.desc: "咖啡田绵延至天际，这本是巴西乡间寻常景致，但此刻每片土地都生长着同一种作物。咖啡豆在米纳斯吉拉斯州的灌木丛间闪烁，农夫里卡多挎着塞满豆荚的帆布包穿梭其中，汗珠顺着古铜色脖颈滚落。\n\n这片种植园有些特别。寻常咖啡六月成熟，而他此刻采摘的深褐色豆荚实为从自由印度引进的特殊品种。里卡多对那个遥远国度毫无概念，只记得监工说过这种豆子能错峰收获。他咕哝着拨开带刺枝叶，苦役般的劳作让他想起城里最近在闹什么劳工法——具体内容他可没兴趣打听。\n\n夕阳将咖啡树染成金红时，里卡多瘫坐在田埂上。远处隐约传来演讲声，他支起酸痛身躯走向庄园入口。那个戴眼镜的城里人正挥舞传单：拉塞尔达要剥夺我们的劳工权利，我们必须联合城市工人大罢工！\n\n里卡多嗤笑着挤进人群，心想能争取个午休时间也不错。抗议队伍如野火蔓延，当邻近田区的工友们冲进仓库扛出成袋咖啡豆时，他毫不犹豫加入了他们。夕阳下，无数个攥着咖啡豆的拳头举向天空。"
 brazil_lacerda_strikes.54.a: "相隔万里，意念合一。"
 brazil_lacerda_strikes.55.t: "铁球般的倔强"
 brazil_lacerda_strikes.55.desc: "贡萨洛用手帕不断擦着汗湿的额头，嗓子干得像冒烟。他眼睁睁看着更衣室一点点空下来，工人们列队走出钢厂，像一支送葬的队伍。厂房里，那些曾经隆隆作响的机器和巨大的高炉，如今全部沉寂。贡萨洛回头看了一眼空旷的厂区和那扇铁门，他的希望像烈日下的幻影，在炙热空气里晃晃悠悠，然后彻底蒸发。\n\n“朋友们！朋友们！我们还能再谈谈嘛！”他冲着任何还愿意听的人喊道。可没人搭理他，工人们一个接一个从他身旁走过，连余光都懒得瞥一眼。“格尔道钢铁可是阿雷格里港的骄傲啊！你们每一个人，都是我的英雄——阿方索，你那手艺比工程师还要精——”\n\n“行了吧，贡萨洛！”人群里有人回了一句，是阿方索吗？“你现在丢人现眼，也补不回这些年把我们压榨的账。”\n\n贡萨洛一直觉得自己是个还算不错的经理——至少他自己是这么想的。但此刻，他只能把这个念头甩到一边，憋着气说出那些他其实很不想说的话。\n\n“好吧好吧，各位听我说。我看过你们的诉求，实际上，公司已经授权我，可以满足你们大部分的条件。咱们回办公室，坐下来谈个妥当。”队伍终于停下了脚步，贡萨洛一瞬间还以为事情这么简单就摆平了。可下一秒，人群里窜出来一个高大的金属工人，他身上带着浓浓的意大利血统，大手一把揪住贡萨洛的衣领，把他拽到自己眼前。\n\n“这不是条件的问题。”那人的声音低沉而带着压迫感，“这是要告诉全民盟，他们别想把瓦加斯留给我们的权利剥个干净。这是要让拉塞尔达知道，他别想在我们脸上随便吐痰。我们走了。”\n\n话音落下，那名工人重新没入队伍，整个队伍继续浩浩荡荡地走向街头。贡萨洛这才回过神，手帕又一次抹过额头，灰溜溜地缩回办公室，琢磨接下来还有什么招数可想。"
 brazil_lacerda_strikes.55.a: "反正嘛，外头永远不缺想干活的人——更不缺那些不会吓唬“无辜经理”的新人。"
 brazil_lacerda_strikes.55.b: "哦等等，如果我说我接受呢？我会让你相信我的。"
 brazil_lacerda_strikes.56.t: "同风起"
 brazil_lacerda_strikes.56.desc: "仅需一阵轻风，纸张便会随之而起，顺着气流缓缓地飘游，待其消散殆尽才落向终点。苏扎诺公司的造纸厂位于毗邻圣保罗的苏扎诺市，该厂开创了完全采用桉木浆造纸的先河。可是，当下连一片平静的纸张也安放不得，造纸厂未能免于罢工。\n\n民主工会运动的煽动家在某天涌入，旨在开业并募集人手，冲突接踵而至。冲突继而发展为小范围内的无限制格斗，满腔怒火于微风吹拂之下舔舐着纸张，将其点燃。火势向四周蔓延，又随风徐徐上升，如盏盏天灯。\n\n造纸厂工人们停产罢工，事实确是如此。不过，纵使尘埃落定，尘归于土，纸张落回原点，他们也拒绝复工。遭受政府一记响亮的耳光后，他们自然拒绝如此。"
 brazil_lacerda_strikes.56.a: "灯火照亮前路，如炽焰燃烧。"
 brazil_lacerda_strikes.57.t: "剑指白鹰"
 brazil_lacerda_strikes.57.desc: "“热罗姆去哪了？”人群后方传来询问。往常这个时候，圣若泽-杜斯坎普斯工厂的工人们总会围聚在工会代表热罗姆身边。每当罢工的流言在车间里蔓延时，这个通用汽车的代言人就会用手摩挲着光秃秃的头皮，把鹰钩鼻探向空中——所有人都心知肚明他的立场。\n\n此刻，那位号称“效率总监”的宽肩男人不见踪影。取而代之的是站在运送零件的实木货箱上的丹特·佩拉卡尼。肥壮身躯上探出的细瘦手臂直指天空，浑厚的声音响彻整个车间。此起彼伏的附和声在他周围逐渐高涨。\n\n“拉塞尔达为巴西工人做过什么？给你们公平的薪酬？良好的工作环境？不！他朝工人阶级脸上吐唾沫！剥夺你们作为工人的权利！从你们口袋里抢钱塞回美国公司的腰包！”\n\n人群的目光追随着他夸张的手势，如痴如醉。一位年轻的金属加工工人站在人群中央，张大嘴巴一字不漏地听着，每个字都敲打在他心坎上。\n\n“工人总指挥部能给你们更多，朋友们。体面！尊严！繁荣！”佩拉卡尼每喊出一个词就用拳头击打掌心，“加入我们的纠察队，让这个腐败的政府屈服！谁愿与我同行，为更好的巴西而战？”\n\n震耳欲聋的欢呼声中，只有零星几人迟疑。那位年轻工人仍在回味演讲——那些话语仿佛能洞悉他所有疑虑，解答他每个困惑。\n\n“卢拉，走啊？”路过的工人招呼道。年轻人咧嘴一笑，汇入游行的人潮。"
 brazil_lacerda_strikes.57.a: "手持警棍的警察在车间门口拦住了他们，把他们赶了回去。"
 brazil_lacerda_strikes.57.b: "他们不惧手持防暴盾牌的警察，径直走出大门。"
 brazil_lacerda_strikes.58.t: "飞升"
 brazil_lacerda_strikes.58.desc: "塞尔吉奥·弗勒里扫视着满屋的板条箱，手掌掠过标有“非致命弹药”的金属箱面，脚步与思绪同样迅疾。军靴在寂静的仓库激起回响，而内心的喧嚣更为澎湃。“这次，”他摩挲着另一只手上的物资清单，“装备足够彻底解决问题了。”\n\n纸页在指尖沙沙作响：“那些罢工的蟑螂还没领教过法律铁拳的威力，不过这个错误很快就会被纠正。”清单上密密麻麻的同类装备不足为奇，真正令他兴奋的是新式武器——水炮与来自美国的最新科技橡胶子弹。\n\n突然一声巨响打断了他的思绪。射击场上，美制橡胶弹穿透木板的闷响令他血脉偾张。这样的冲击力足以折断骨骼，剜出眼球。难以言喻的喜悦在他胸腔膨胀——背叛秩序的暴民终将付出代价，正义的统治即将重临人间。\n\n震天的怒吼再度撕裂耳膜。此刻的圣保罗主教座堂广场上，弗勒里率领防暴部队踏入示威者海洋。随着他一声令下，钢铁洪流般的步枪阵列抬起，将法律的惩戒倾泻向涌动的人潮。"
 brazil_lacerda_strikes.58.a: "反贼一触即溃，罢工者四散奔逃。"
 brazil_lacerda_strikes.58.b: "工会屹立不倒，罢工者以铁管石块顽强反击。"
 brazil_lacerda_strikes.59.t: "感情"
 brazil_lacerda_strikes.59.desc: "愤怒。一种奇异的情绪；它如热病般在街头巷尾蔓延，罢工的浪潮本应难以为继，却仍在示威者的嘶吼中延烧。冲突愈演愈烈，工总的工人们与民主工运成员短兵相接，同镇压的警队正面冲撞。正是在这口沸腾的熔炉里，在血肉相搏的炼狱中，愤怒完成了自我淬炼。\n\n暴怒。一种可怖的情绪；它化作里约街头新的语言，而抗争之火正在式微。工总的斗士们被疲惫拖拽，厌倦了四面受敌的处境。但那份腐臭而完美的激情仍在发酵。暴怒只需一粒火星，即便精疲力竭，工总也必将向点燃火星的仇敌倾泻全部怒火。\n\n于是火种降临。一位在押期间“突发心脏病身亡”的罢工领袖，成为了点燃引信的火星。他们从麻木中挣扎起身，搜集球棒、铁管、燃烧瓶——暴怒索要的一切凶器。暴民们冲向民主工运新建的总部，先用凶器开路，再以汽油收尾，将整座建筑付之一炬。\n\n当地的民主工运领袖嗅到了门外的血腥气，有人凭着本能仓皇出逃，有人涕泗横流地跪在暴怒者面前乞怜，侥幸获得宽恕。警笛在街区间呼啸，宵禁令覆盖整个城区，警察四处搜捕纵火者，最终却只捕获扬尘与穿堂风——贫民窟的褶皱里，暴徒们如盐粒溶于海水般无迹可寻。"
 brazil_lacerda_strikes.59.a: "民主工运指使里外搜查贫民窟，暴徒们最终落网。"
 brazil_lacerda_strikes.59.b: "他们游行穿过城市，抵制暴力，呼吁和平。"
 brazil_lacerda_strikes.60.t: "工人时间"
 brazil_lacerda_strikes.60.desc: "少年们隐入暗影，悄然潜出仓库。夜色中唯有街灯电流嗡鸣，铁门虚掩处，红色油漆如血泼溅在建筑外墙上，成为这座仓库唯一的伤痕。库房内同样狼藉，原本堆满索尼产品的货架空空荡荡，空气中残留着氯仿刺鼻的气味。\n\n当白昼的暖意涤尽夜色，这些劫掠来的走私品在圣保罗的街角绽放新生。昨夜徒手制服两名守卫的壮汉，此刻正随音乐摇晃身躯；那位抢运最多货物的矫捷女子，在凹凸不平的路面上忘情起舞。蓄着八字胡的策划者坐在母亲家的台阶上，对着《欢愉，欢愉》的旋律无声哼唱。整片街区的居民都循声而来。\n\n这些最新款音响刚从太平洋彼岸的流水线下线，清越音浪穿透都市的喧嚣。不止是劫掠者，罢工的工人、街坊邻居、携家带口的市民，都感觉胸腔与旋律共振。音符编织着崭新的梦境，或深情或激越的歌声咏叹着勇气与生活。人们高举画像与圣像——马克思、佩拉卡尼、瓦加斯、圣母玛利亚。\n\n抗争之路注定艰难，但此刻他们让音乐响彻云霄。"
 brazil_lacerda_strikes.60.a: "要掀起自己的革命，就请抛开中间商。"
 brazil_lacerda_strikes.61.t: "冷气"
 brazil_lacerda_strikes.61.desc: "佩德罗本想在办公室里来回踱步，奈何午后的热浪早已灌满山谷。米纳斯吉拉斯州这座小金矿的圆胖经理最终选择把椅子危险地后仰，双脚搭上办公桌，边拍打蚊虫边盘算困境。\n\n工棚外机械静默，升降机像断线木偶悬在矿洞口。自从大罢工风潮席卷，佩德罗只能眼睁睁看着雨林重新吞噬矿坑。没工人就没黄金，没黄金就没利润，没利润就没晋升——到头来只剩他汗流浃背看守着空洞的矿井。\n\n该死！烦躁的佩德罗一掌拍向苍蝇却挥空，椅子随之失衡，整个人轰然仰倒。\n\n他揉着后腰起身，弯腰扶椅时瞥见木地板缝隙闪过金属光泽。撬开因撞击松动的木板，一只锈迹斑斑的储物箱赫然显现。掀开箱盖瞬间，佩德罗惊喜地发现成沓旧钞。\n\n“前任主管那老混蛋还真藏了应急资金。”他摩挲着印有共和国女神像的钞票，油墨味混着霉味钻进鼻腔。卷款跑路的念头刚冒头就被掐灭，母亲教出的儿子可没这么蠢，得为长远打算。\n\n汗珠从眉骨滴落，在女神庄严的面庞上晕开。佩德罗此刻无比渴望一台松下空调。"
 brazil_lacerda_strikes.61.a: "也给矿工们配几台，好让他们干活……"
 brazil_lacerda_strikes.62.t: "过热"
 brazil_lacerda_strikes.62.desc: "一人受难，众人同当。\n\n狂乱的火焰舔舐着纵火者的脚踝。\n\n仓库招牌上，富士通标志性的弧线商标已被烧得焦黑难辨。办公室内，提货单与档案柜在火舌中扭曲翻卷。\n\n这场燎原之火始于耳语相传。某人的兄弟任职于日本大使馆，珠江三角洲的惨状、中国劳工在日资企业统治下的遭遇，就这样在街巷间悄然蔓延。\n\n当巴西警察用富士通电脑建立异见者数据库，挥舞着电棍镇压示威时，两场斗争合而为一。以团结之名，巴西境内的富士通据点次第燃起火光。工总明令禁用富士通产品，卡车司机在运输时踌躇再三。太平洋此岸的人们，开始真切体会到彼岸劳工的呼吸与心跳。\n\n暴君井深大，暴君拉塞尔达。烈火涤荡腐朽旧世界，春天在灰烬下静候。"
 brazil_lacerda_strikes.62.a: "硅晶之线熊熊燃烧。"
 brazil_lacerda_strikes.63.t: "腌渍"
 brazil_lacerda_strikes.63.desc: "这里没人知道腌菜本该是什么味道，真纪心想。同事们曾盛赞巴西日裔社区的正宗，但他至今未觉惊艳，而昔日同胞拙劣的厨艺，不过是这位日立美食家眼中这个愚蠢国度的诸多问题之一。单说这过剩的底层阶级，若在日本或新京早该被安排做有意义的工作了。更别提前些天几个本地少年朝他扔西红柿，弄脏了他最好的西装。\n\n除了感到被冒犯，真纪还有些困惑。这里共产主义不是非法的吗？要是像其他人那样被调往广东，根本不可能遇到这种事。\n\n更令他忧心的是发回珠江三角洲的报告。自从罢工潮兴起，暴徒们一见日立产品就砸，还搬出些短视的道德理由当借口。\n\n巴西民众明明一直乐于使用日立的工业设备、工厂零件和消费品——物美价廉又可靠——可圣母心们对中国工厂工人处境的聒噪，居然让这场反日立运动登堂入室成了工人总指挥部的正式议程。\n\n巴西利亚那个美国傀儡显然软弱到无力取缔这个组织，结果日立在巴西的销售额正朝零俯冲。里约办公室已流传着撤资的风声，真纪对此喜闻乐见。飞回东京、广州、新京——哪怕是西贡——的航班，或许就是他下一顿正经饭的希望所在了。"
 brazil_lacerda_strikes.63.a: "还好这种情况不会发生在老家。"
 brazil_lacerda_strikes.64.t: "美国佬的援助"
 brazil_lacerda_strikes.64.desc: "世界上鲜有机构能拥有美国联邦调查局那样的声誉。这支训练有素、专业且廉洁的精英队伍，始终站在打击犯罪浪潮和外国情报行动的第一线，保护美国民众免受凶残黑手党和阴险德国间谍的侵害。\n\n而在其他民主国家陷入困境时，FBI也会伸出援手。最初，一些以“度假”名义飞抵巴西的FBI探员开始与巴西联情反情局的同行会面。很快，最先进的窃听技术、美国人搜集的情报资源，以及最新的反间谍行动经验和行业诀窍便开始从美国流向巴西。\n\n有了这些支持，联情反情局得以加倍努力瓦解工总。他们追踪国内外流向工人总指挥部的资金，挖掘罢工者与马克思主义及共产主义团体的一切关联，渗透工会以获取其可能升级暴力行动的迹象，收集运动领导人和激进分子的个人信息——这些信息或将用于……某些特殊用途。\n\n但如今他们还能主动出击：散布虚假信息削弱罢工者公众支持；对工总领导人及成员家属展开“调查”；从美国臭名昭著的黑预算中调拨资金壮大民主工会运动。当然，若所有手段都失效，敲诈勒索永远是备选方案。\n\n问题是，为了保卫国家，究竟可以做到什么程度？"
 brazil_lacerda_strikes.64.a: "深藏暗处，悄无声息。"
 brazil_lacerda_strikes.64.b: "强势出击，罢工早息。"
 brazil_lacerda_strikes.64.c: "放下束缚，放开手脚。"
 brazil_lacerda_strikes.65.t: "袭击"
 brazil_lacerda_strikes.65.desc: "随着砰砰砰的敲击声，房门和玻璃接二连三的被撞开敲碎。一群身着防弹背心的人持枪闯入，厉声喝令。混乱裹挟着混乱和尖叫四处蔓延。\n\n各大城市的工人总指挥部支部遭到了联情反情局的突袭。这场策划多周的行动已经初步成功。在联邦调查局的协助下，通过窃听、线人和审讯，情报人员掌握了多个工会据点的具体位置。无数人被逮捕押往当地警局，与此同时，侦探到处翻查着工总的资料，寻找任何能够将其与外国势力或共产主义联系起来的证据。一份共产党宣言，一张印有镰刀锤子的传单，与外国友人的通信——都足以让工总坐实指控。\n\n毕竟，只有外国势力和共产主义煽动者才会发动让全国停摆的大罢工。真正的巴西人绝不会自甘堕落到破坏自己国家的地步。"
 brazil_lacerda_strikes.65.a: "斩断蛇头"
 brazil_lacerda_strikes.66.t: "连环罢工"
 brazil_lacerda_strikes.66.desc: "若阿金·帕斯医生抿紧嘴唇。罢工浪潮正以前所未有的规模蔓延——卡车司机工会与大多数工厂工人联合行动，连白领都加入罢工行列。EMS药厂几近瘫痪。他当然不会参与罢工，身为医者的职责是守护病人，可这种信念并非人人共有。从医技楼到住院部，护工们集体罢工，部分护士也加入行列，使得从主任医师到清洁工都不得不加班连轴转。低级职员全都不在岗位，身为药房主任的他只得亲自挽袖配药。\n\n药品库存急速见底。农民罢工，人人都在谈论粮价暴涨，却没人料到青霉素菌种与凹凸棒黏土的供应危机。作为圣贝尔纳多-杜坎普市最主要的药品供应商，EMS药厂的产能已趋近于零。他试图下订单，却被留守人员告知没法补货——库存清空之日即是断供之时。即便能筹措资金向美国人采购，送货司机的罢工也注定让任何医疗物资永远滞留在港口与药店之间。\n\n数字令人窒息。按现在的消耗速度，两周之后全院的巴比妥类药物就将告罄。若将药片切开并减少剂量，帕斯医生或许能再争取一周。虽违背希波克拉底誓言，但总好过让所有病患在毫无镇痛药的情况下痛不欲生。阿司匹林储量足够撑过本月及下月大半，但变数随时可能发生。试验室曾试图用面包培育青霉素菌株未果，这意味着抗生素储备仅剩四周用量。帕斯医生已下达指令，非紧急情况不得开具伪麻黄碱处方。如果幸运的话，这项禁令或许能延长一个月库存。病患们早已注意到药品供应日渐迟缓，而帕斯医生却做不出任何令人安心的答复。他们本为求医问药而来，如今却无辜要为他人的抗争承受煎熬。\n\n“混蛋。”帕斯医生对着罢工者咒骂。"
 brazil_lacerda_strikes.66.a: "作用力总伴随着反作用力。"
 brazil_lacerda_strikes.67.t: "动员队伍"
 brazil_lacerda_strikes.67.desc: "深藏在贫民窟的经济圈仿佛自成一方天地，罢工的浪潮丝毫未能波及这里。从建筑工地按天计酬的临时工，到中产家中的园丁和女佣；从推着破车叫卖的小贩，到蹲守码头、指望卸几箱货换点零钱和吃食的装卸工——它的体量甚至不输外面的传统经济体系。奥斯马尔·吉马良斯·科埃略站在里约老城跳蚤市场的人群中，深知这样一股游离在工会总指挥部和民主工会运动之外的生力军，正是制胜的关键。\n\n“你们或许都遇到过那种口蜜腹剑的家伙。他们笑着登堂入室，假装一心只想帮你、让你过上好日子。”奥斯马尔向聚拢的人群挥动手中的传单，嗓音洪亮得像是教堂布道。“但甜言蜜语背后，那个叫共产主义的妖魔正在企图毁掉你们的生活。不客气地说，它存在的意义就是践踏各位赖以生存的一切！”\n\n“想想看，要是让赤色分子得逞了，你们还能像现在这样自由接活吗？不，他们会逼你入党，拿走你一半收入当党费。他们垄断工作分配，到时候肥差都是亲信的，各位要么饿着肚子投诚，要么就等死吧！”\n\n“为什么？因为他们怕啊！共产主义最恨的，就是有人能在它的阴影之外活出精彩。就连你们用血汗挣来的每一枚克鲁赛罗，在他们眼里都是冒犯。所以各位，跟着我们民主工运干，把这帮极权懦夫赶回阴沟里去！”"
 brazil_lacerda_strikes.67.a: "几天后，一些人开始站出来支持民主工运……或者袭击工总的纠察队。"
 brazil_lacerda_strikes.68.t: "布里佐拉万岁"
 brazil_lacerda_strikes.68.desc: "布里佐拉清了清嗓子走向集会讲台，身侧是社民党代表坦克雷多·内维斯。这位同僚对整场活动兴致缺缺，却浇不灭布里佐拉胸中的炽热。此刻他眼中已映出成百上千的民众，而人群也认出了他——起初只是零星的侧目低语与欢呼，待他登台瞬间，整条街道陷入寂静。工人总指挥部地方领袖递来话筒，他望向台下：千万张面孔屏息以待。笑容不觉爬上嘴角，胸腔涌起澎湃热流。\n\n“万岁！万岁！布里佐拉万岁！”距讲台数米处，一名瘦高男子突然踩着节奏击掌高呼。在布里佐拉的注视下，他的呼喊愈发铿锵，身形挪移变换，甚至撞到身旁妇女。很快，声浪便蔓延开来，“万岁！万岁！布里佐拉万岁！”布里佐拉回望内维斯，后者正惊讶挑眉。当他再度看向街道，声浪已裹挟着震耳欲聋的掌声席卷整条街区，至少传出一公里远。随着罢工者们持续呐喊，布里佐拉嘴角弧度不断扩大，脚尖不自觉打起节拍。随即，他对着人海开始大声演讲。"
 brazil_lacerda_strikes.68.a: "可惜最精彩的部分已经结束了。"
 brazil_lacerda_strikes.69.t: "主的和平"
 brazil_lacerda_strikes.69.desc: "阿格内洛·罗西枢机主教快速划了个十字，开始布道：“时局艰难，主赐予我们力量。”话音未落，耳边隐约响起示威声浪，纵使比往日温和许多，但仅相隔一个街区。枢机微微吸气，继续道：“但主赐予的不只是力量，更是和平——心灵的安宁、胸怀的澄明、社会的和谐。祂赐下践行圣意的宁静。”\n\n罗西轻轻扶了扶眼镜，俯视着祷告集会：“纵使国家陷入争议——”他瞥向频频张望抗议人群的信众，“对前路各执己见——”目光扫过警戒的警察，“但请谨记，主已赐予我们和平的美德。让我们以主之和平的名义，为国家的安定与祥和祈祷。”"
 brazil_lacerda_strikes.69.a: "阿门。"
 brazil_lacerda_strikes.70.t: "主的工人"
 brazil_lacerda_strikes.70.desc: "埃尔德·卡马拉总主教俯视人群，几位罢工领袖的面容映入眼帘，正翘首以盼他的箴言。他轻叩胸前的银十字架，朗声开讲：“巴西大地正经历着规模与信念皆史无前例的示威浪潮。”台下人群零星颔首，如涟漪荡开；“劳动人民走上街头伸张诉求，这是法律赋予的权利，亦是主的恩典。”他目光扫过警戒的警员，继续道：“但令天主与信徒痛心的是，竟有人妄图玷污这场解放运动。”\n\n总主教扬起一纸印有“巴西全国主教大会”字样的文件，“吾与教会以最严厉措辞，谴责民主工会运动及民主行动研究所同党犯下的暴行。他们通过绑架、纵火甚至谋杀等行径，妄图掩去上帝子民的声音。”细碎的议论声在人群中扩散。卡马拉放下文书，张开双臂：“大家与我一同祈祷。祈愿暴戾止息，家园得庇佑。愿主赐予施暴者悲悯，愿暴虐如朝露消散。”"
 brazil_lacerda_strikes.70.a: "阿门。"
 brazil_lacerda_strikes.71.t: "主的愤怒"
 brazil_lacerda_strikes.71.desc: "保罗·埃瓦里斯托·阿恩斯主教凭栏远眺。三个街区外，罢工者与军警的怒喝如雷涌动。他喟然叹息，不住摇头，默默划了记十字，重新面对台下信众。礼拜堂内无数双眼睛焦灼地仰望讲坛，每张面孔都浮动着对时局的惊惧。主教眉间深锁，再次摇头，在十字架下张口说道：\n\n“如今局势艰难。极左与极右的极端分子，正在撕裂我们的民族。”他转向示威声浪的方向，继续道，“工人总指挥部与民主工会运动痴迷党同伐异，早已遗忘主的教诲。他们如此沉醉于世俗纷争，竟将基督的至高使命抛诸脑后。于是，暴力行径与无政府主义酿成恶果，天父震怒不已。”主教扫过全国主教大会的公报文件——那上面陈列着双方的暴行，“吾与教会坚决反对这种种恶行，绝不容忍任何施暴者。愿迷途之人重沐主恩，愿和平早日重临大地。”"
 brazil_lacerda_strikes.71.a: "阿门。"
 brazil_lacerda_strikes.72.t: "主的权柄"
 brazil_lacerda_strikes.72.desc: "热拉尔多·德·普罗恩萨·西瓜德总主教扫视人群，望见几名民主工会运动要员正急切地等待着他的发言。他扶正镜框，然后开讲：“巴西正经历天主的试炼。共产主义与社会煽动者占领街头，妄图颠覆国家。工人总指挥部为其充当喉舌，纵容革命暴力戕害国民、动摇国本。”\n\n听众神情凝重，座席间浮动着低沉的咒骂与窃语。总主教颔首示意，擎起全国主教大会谴责工总的文书：“吾与教会痛斥工总的暴行与极端行径。妄图颠覆天主权威者，必遭吾主唾弃。”言毕，他垂手落卷，举起另一只手：“愿这些共产主义者迷途知返，皈依基督圣光。愿主庇佑我等远离异端邪道，使巴西传统永沐天主真谛。”"
 brazil_lacerda_strikes.72.a: "阿门。"
 brazil_lacerda_strikes.73.t: "反动之火"
 brazil_lacerda_strikes.73.desc: "哪里有革命，哪里就有反革命。随着工人总指挥部的罢工持续，反对力量也不断滋生。不仅仅是来自政府执法机关的镇压，还有治安团，反共暴徒以及来自其他不法势力的威胁。那些被认为不支持拉塞尔达或同情罢工的戏剧演出均遭到了袭击。武装的激进分子闯入舞台，殴打演员。更有甚者在工会集会点和左翼咖啡馆安放了自制炸弹，导致了数十人的死亡。大学也遭到了攻击破坏，那些没有多少激进派的院校也没有幸免。但在这些极端组织中，猎共司令部最为庞大，志向也更为远大。\n\n通过“调查”——也就是跟踪工总的领导人，猎共司令部发现了工会地方支部的最新集会地点。仅凭着酒精与火焰，他们发动了袭击。这座剧院改造而来的建筑被燃烧弹化为了一片火海。在日丹诺夫鸡尾酒的爆炸声中还夹杂着受害者的尖叫声。空气中顿时弥漫着焦肉和灰烬的刺鼻气味，不久后整座建筑就被火焰吞没。那些被消防队成功救出的幸存者也被严重烧伤，终其一生将被疤痕所折磨。在翻阅内部报告后，工总的组织者们迅速意识到，除了政府外，自己还成了猎共部等组织的目标。他们很快有了对策。"
 brazil_lacerda_strikes.73.a: "加强总部的保密措施。"
 brazil_lacerda_strikes.73.b: "在会议地点组织武装卫队。"
 brazil_lacerda_strikes.74.t: "IBM短路时刻"
 brazil_lacerda_strikes.74.desc: "阿莱士伸展着僵硬的四肢，脊背发出咯吱声响。午饭过后他就在重新设计打孔卡包装，这已经是第三次修改了。该歇会儿了。穿过灰白格子间时，他瞥见两位资深工程师在饮水机旁激烈交谈。他端着水杯凑近，心想着或许能偷师学艺。\n\n“我老爱这家公司了。一个月工资抵得上我爸一年的收入。别看工人总指挥部整天嚷嚷，咱根本不需要工会，公司早把咱们当人看了。”阿莱士暗自点头。能进IBM对他这样的学生而言简直是中了头彩。自1968年世博会上IBM巴西凭纺织机控制终端一鸣惊人，薪资便水涨船高。“可他们对破坏事件的处理连我都看不下去。”\n\n阿莱士差点呛水。破坏事件？“机床里发现了强酸液，设计图被人撕成碎片，结果一直都没通报！”他还没从震惊中缓过神，另一人接口道：“安啦，肯定是工总安插的卧底。我赌是那帮进步学生实习狗干的，迟早要遭报应。”\n\n回到工位的阿莱士心神不宁。他强迫自己盯着图纸，思绪却飘向全国学联的熟人——他们从没说过要搞这么大动作，更别说如此迅速。难道要像父亲那样在里奥格兰德挖粪度日？然而，阿莱士并不知道，他的经理一直在跟踪他，观察他的一举一动。下班铃响时，主管的身影停在了他的办公桌旁。"
 brazil_lacerda_strikes.74.a: "他手里拿着解雇通知书，一脸歉意。"
 brazil_lacerda_strikes.74.b: "他问了一些问题，随后便离开了。"
 brazil_lacerda_strikes.75.t: "WEG工厂停摆"
 brazil_lacerda_strikes.75.desc: "埃贡·若昂·达·席尔瓦仰靠在波旁棕色的办公室皮椅里，盯着天花板的裂纹。疲倦如潮水漫过四肢——疲于应付乱局，疲于编造粉饰太平的漂亮话与暧昧承诺。但此刻还不能松懈，董事会的火势甫熄，罢工浪潮勉强受控，他必须为未来布局。\n\n他列举公司面临的死结：最显见的困局是全巴西的WEG工厂纷纷停产，唯余圣卡塔琳娜的业务尚且如常。其次，全民盟虽受企业资助，却与罢工者达成协定要限制工业机器人应用——而机器人技术恰是WEG下一阶段扩张的关键，更是他勾画的理想之核。\n\n他何尝愿意让工友失业？埃贡毕生所求，是让自己与父亲深爱的南雅拉瓜乡亲们不再如牛马般劳作。机械臂替代枯燥工序后，工人们本可晋升技术岗位，可盟友的背叛令蓝图几近破碎。既然如此，唯有让叛徒付出代价。埃贡在脑海中勾勒计划：切断与全民盟所有联系，资助记者揭露其腐败内幕。往后自然要转投其他党派，只是该选哪一个？\n\n电话铃突响。接线员通报最后几家工厂正式罢工。随着诉求一条条念出，埃贡握紧拳头。他砸下听筒：“操他妈的！”连家乡子弟都被工人总指挥部蛊惑。最后一根稻草压断脊梁。他快速拨通另一个号码。"
 brazil_lacerda_strikes.75.a: "“阿德马尔！很高兴你有空，我这儿有个计划……”"
 brazil_lacerda_strikes.75.b: "“请问是社民党办公室吗？我叫埃贡·若昂·达·席尔瓦……”"
 brazil_lacerda_strikes.76.t: "洛加斯零售的悲剧"
 brazil_lacerda_strikes.76.desc: "保罗一直是洛加斯零售集团的标杆。过去二十年，他兢兢业业地拉拢出身新兴资产阶级的客户。直到此刻，他都可以被称作成功人士。罢工开始后，不只是工会成员，就连企业内部的女裁缝和销售员也不情不愿地参与了罢工。\n\n保罗清楚伙计们因何而去。为了受压迫者而罢工是他们的职责。如果他在那个位置，他也会这么做的。储藏室的门咔哒一下锁上了。如果预警属实，风暴只要几分钟就会停歇。\n\n他把储藏室的门打开了一条小缝，只见一群愤怒的人冲入了店铺。他们打砸缝纫机，偷走收银机，抢走了服装。一些贫民窟的孩子拿起皮带，像鞭子一样在空中抽得噼啪作响。在那之后，他们把崭新的纺织品拿到街上，堆成小丘，燃起熊熊烈火。\n\n几条街区外的警笛声驱散了袭击者，但损失已经无法挽回。保罗深吸一口气，瘫倒在地板上。抬眼一看，只看见一束明亮的光，他看见了安德烈亚斯，如初吻之夜时一样英俊，这是只有佩洛塔斯的月光才知道的秘密。他伸出一只温柔的手，保罗微笑着紧紧握住。"
 brazil_lacerda_strikes.76.a: "整座城市为他落泪，他却停止了抽泣。"
 brazil_lacerda_strikes.77.t: "鲍勃汉堡无人光顾"
 brazil_lacerda_strikes.77.desc: "鲍勃·法尔肯堡走进他的乡村俱乐部会所，抹了抹额头上的汗。他把球拍挂在一边，熟练地拨通了一个号码。“法尔肯堡！感谢上帝你终于打电话过来了。这外面的人都疯了，抗议的人越来越多，火气也越来越大！”法尔肯堡气定神闲地回答道：“别急，阿方索。你说过你有个应付他们的主意，是什么？”\n\n“嗯，显然我们要给每家鲍勃汉堡店配上安保。也许我们可以让他们阻止抗议者。或许我们可以雇一些黑……”他正要接着说下去，法尔肯堡就温和地打断了副手的话。“阿方索，如果让顾客看见和平抗议者被打得屁滚尿流，他们会怎么想？这事请让我来办吧。”他听见电话另一头传来了闷闷的咒骂声：“行吧，但是请搞快点。局面很快就会更加严峻的。”\n\n法尔肯堡的战略头脑转了起来。他打电话给每个部门的负责人，告诉他们自己的新计划。他们要给所有的汉堡打六六折，并且打广告宣发用便宜的进口阿华田做的新款奶昔。这样，他们就可以吸引到对价格敏感的新客户，那些抗议者们是绝对不会错过的。没有丑闻，没有麻烦。\n\n分销副总裁的最后一个电话打断了他的思绪：“先生，这是个好计划，但现在有个坏消息。三家鲍勃汉堡店被日丹诺夫鸡尾酒（燃烧瓶）攻击了。一些员工很害怕，不敢来上班了，先生。”法尔肯堡长叹一口气。太好了。"
 brazil_lacerda_strikes.77.a: "“行吧，我们只需要解决这个问题。”"
 brazil_lacerda_strikes.78.t: "糖面包山超市的巨大需求"
 brazil_lacerda_strikes.78.desc: "塞尔索盯着手表，脚尖不耐烦地点着地面。他是里约热内卢贫民窟旧址上首家巨无霸超市的经理，肩负着维持门店持续盈利的责任。塞尔索明白，罢工风波迟早也会席卷自己的门店，就像全国其他地方一样。为此，他心中已经想出了一个应对方案——好吧，其实只想出了半个。\n\n一天工作结束后，塞尔索把全体员工召集到超市后方的储物区。员工们显然群情激愤，塞尔索只能尽量拿出一副威严的样子，开口说道：“大家一定都知道，最近全国各地闹罢工的事情。但我恳请大家保持冷静，别像他们那样冲动行事。”人群中随即响起低声抱怨，还有一些人转身欲走。“但是，”他提高音量，“我也明白，现在是困难时期。因此，我们超市全体员工将加薪三成，即刻生效。”\n\n话音刚落，人群顿时爆发出热烈的欢呼声。他们冲上前簇拥着塞尔索，把他高高举起，围着储物间转了好几圈，塞尔索则不断挣扎着，想要下来。这场热烈却令他极度尴尬的庆祝游行持续了好几分钟，员工们才陆续散去。走在回办公室的路上，塞尔索的脑海已转向下一个棘手的问题——价格。如果售价维持不变，超市的利润就会大幅缩水，届时恐怕要被上级问责。但如果他提高价格的话……\n\n他望向窗外。这片土地自超市开张以来便充满了眼泪。光是建造这家超市本身，就伴随着对贫民抗议与建筑工人罢工的武力镇压。而这一切又是为了什么呢？是为了让无家可归的醉汉在摩天大楼下沉沦？让贫穷的家庭流离失所，只能挤在公路桥下求生？而他，真的还要进一步压榨这些不幸者吗？"
 brazil_lacerda_strikes.78.a: "他做不到。哪怕把整个里约的钱都给他，他也下不去手。"
 brazil_lacerda_strikes.78.b: "他闭上眼，叹了口气。至少这样，超市还能保持盈利。"
 brazil_lacerda_strikes.79.t: "公共服务罢工"
 brazil_lacerda_strikes.79.desc: "加布里埃尔小心地把环卫车停到了路边。达维看着他破旧的手表，用手指点着倒数：“三……二……一……好，后生们，我们要罢工了。”加布里埃尔和达维跳下驾驶室，贝尔南多则从后门下车。加布里埃尔手里还提着一台收音机，三人就这样在小胡同里调起了这台粗糙的设备。\n\n加布里埃尔调到了约定好的频道。一片寂静。他们仿佛等待了几个小时。终于，收音机里传来了声音：“这里是真理之屋（Oca da Verdade）。祝贺各位公民们。巴西已经罢工了。”\n\n三人欢呼起来。加布里埃尔搭着兄弟们的肩膀，达维抹着眼泪，贝尔南多则随手把喷漆罐丢给了他们俩：“现在我们可算能用这辆破车整点有用的活了。”他们在卡车旁边喷上了标语：“这个味道恶心不？拉塞尔达一坨屎！”一个大大的箭头从标语处指向已经从卡车里倒出来、堆成一堆的垃圾山。\n\n大功告成后，他们开起了啤酒，坐在被点燃的垃圾桶周围，一边唱着胜利的歌，一边打着牌。但在天黑之后，车辆驶来的声音打断了他们的庆祝。他们正要查看发生了什么，就看见有批人正在把他们的垃圾收到另一辆卡车上。他们正想好好收拾这些工贼，就看见了两名拿着自动步枪的武装人员。军队来了。此时加布里埃尔、达维和贝尔南多决定……"
 brazil_lacerda_strikes.79.a: "撤退，不值得为此丢掉性命。"
 brazil_lacerda_strikes.80.t: "一家银行的警告"
 brazil_lacerda_strikes.80.desc: "“总统先生。”若泽·路易斯·德·马加良斯·林斯带着平日的高雅步入拉塞尔达的办公室。全民盟与米纳斯吉拉斯国家银行的共生关系曾多次将两人联系在一起。拉塞尔达敬重这位银行家，主要是因其对艺术的赞助——与大多数银行家不同，他的眼中并非只有利润。“你好，林斯。你要谈什么？”银行家优雅落座：“请允许我开门见山。”\n\n“昨夜我们八家分行遭到投掷物袭击，两家被纵火，一家遭遇持枪抢劫。资产损失达两百万，四名员工遇难。”拉塞尔达瞳孔微张，沉痛地摇头：“我会为他们的家人祈祷，林斯。这真是场悲剧。”林斯抬手打断：“我们可以避免悲剧重演——只要政府能为我们的资产提供保护。”\n\n总统挑眉：“你清楚军队现在多捉襟见肘吧？要处理罢工和暴乱……”银行家的目光刺向总统：“我们愿意用储备金补贴这项开支。但若无法获得安全保障，我们只能暂停大部分业务，包括为某些……重要机构拨款。”\n\n总统听出了弦外之音：不派护卫，大量亲全民盟企业的资金链就会断裂。但为此逾越自由市场法则，牺牲宝贵兵力，值得吗？"
 brazil_lacerda_strikes.80.a: "“我明白了，林斯。五千人够不够？”"
 brazil_lacerda_strikes.80.b: "“除了表示沉痛哀悼外，我无能为力。”"
 brazil_lacerda_strikes.81.t: "银行不堪重负"
 brazil_lacerda_strikes.81.desc: "美国有句古话，叫做“税收与死亡，人生中只有两件事不可避免”。但总有人对此持有异议，比如此刻将信件堆满拉塞尔达案头的各大银行。\n\n这些机构多为地方或全国性银行，但也有少数外国债权人加入这场愈演愈烈的运动。这些信函或温和或冷硬，取决于全民盟过往对其的态度好坏，但诉求殊途同归：要么总统平息罢工浪潮，要么调整税收政策——这根大棒显然未用到实处，否则他们将全面撤资。\n\n刚应付完罢工者的拉塞尔达，转眼又被这场“银行罢工”逼至绝境。这群趁火打劫者恰似秃鹫盘旋在奄奄一息之人上空。他凭什么接受要挟？\n\n可正是他放任国家跌落至此。自由市场、自由人民、以尊严立国的理想，早在罢工伊始就濒临消亡。若挽救国家需要给予银行特殊优待，何尝不值得？更何况这些金融巨擘手握如此权柄，他真能拒绝吗？"
 brazil_lacerda_strikes.81.a: "给予各银行特殊优待。"
 brazil_lacerda_strikes.81.b: "堂堂巴西总统，怎么可能给银行家下跪！"
 brazil_lacerda_strikes.82.t: "油尽灯枯"
 brazil_lacerda_strikes.82.desc: "警方的后勤总部热线被此起彼伏的来电淹没。所有诉求都指向同一个主题：“急需燃料”。虽然具体情节各有不同，但核心根源如出一辙。\n\n在帕拉州，一辆油罐车瘫痪在望不到头的车流中，司机百无聊赖地敲打着仪表盘。地平线尽头，示威人群的轮廓隐约可见。摇下车窗，“打倒拉塞尔达”、“为权利而战”、“工人万岁”的呐喊便随风涌入耳中。他冷笑一声——坐在这儿的工人又算什么？\n\n阿马帕州的警局正为最后的燃料储备而战。补给中断导致储油罐日渐枯竭，而厄运远不止于此。蹊跷的破坏痕迹随处可见：燃油消耗与预期严重不符，围栏神秘破损，罢工者步步紧逼——所有这些，共同编织成一张令人窒息的能源危机网。\n\n圣保罗的加油站则被示威者围得水泄不通。面对日益稀缺的资源点，警察只能以警棍作为回应。今天他们暂时守住了阵地，但明天的命运仍是未知数。尽管相比偏远地区的同僚，这里的处境已算幸运，但每一次对峙都无异于在刀尖上起舞。\n\n这一切迫使后勤总部将目光投向最高层——卡洛斯·拉塞尔达总统。在智囊团的精心策划下，总统案头摆着数套破解困局的方案。然而此刻，前线殊死作战的警察们唯有屏息以待，等待拉塞尔达的最终抉择。"
 brazil_lacerda_strikes.82.a: "苦一苦公共交通，减轻警方压力。"
 brazil_lacerda_strikes.82.b: "动用军方燃料储备，他们会理解的。"
 brazil_lacerda_strikes.82.c: "将所有燃料转用于警察行动，尽我们所能。"
 brazil_lacerda_strikes.82.d: "别整这些有的没的，全力保障燃料供应即可。"
 brazil_lacerda_strikes.83.t: "小小逆流"
 brazil_lacerda_strikes.83.desc: "“怎么还没赶走？明明没多少人。”巴西总统焦躁的质问只传入同车的戈尔贝里·多·科托-席尔瓦耳中，而这位将军却一直沉着气。总统卫队正竭力驱散堵路的罢工者，但进展迟缓令拉塞尔达神经紧绷。\n\n席尔瓦始终保持缄默。拉塞尔达瞥见他气定神闲的模样，暗忖是否将军有所隐瞒。答案随着远方军队调动的轰鸣声揭晓——坦克、直升机等如洪流般逼近清场。\n\n罢工者的恳求只换来无情的坦克履带。今日注定没有对话与沟通，唯有因莽撞镇压而激化的对立。总统面露悦色，注意到席尔瓦嘴角渐起的笑意。他没有打断将军，任其享受这高光时刻。\n\n“我明白您有您的行事方式，阁下，但这是我的风格。”带着电流杂音的车载电台宣告工总的路障已被清除，“怀柔政策固然优雅，但优雅不该妨碍正义之举。处理罢工时请务必牢记这点。”席尔瓦始终保持着彬彬有礼的语调，却字字千钧。\n\n抵达目的地时，二人目光同时落向随行的军用直升机。席尔瓦觉得此刻适合再赠一言，遂倾身贴近拉塞尔达耳畔低语魔咒："
 brazil_lacerda_strikes.83.a: "“阁下，别忘了这个国家真正掌权的是谁。”"
 brazil_lacerda_strikes.84.t: "黑云压城"
 brazil_lacerda_strikes.84.desc: "在累西腓，淹没街道的不止是雨水，还有如潮水般涌动的人群。今日的抗议规模空前，整条大道陷入重围。雨水拍打沥青路面的声响与民众的怒吼交织，对经年累月的不公发出血泪控诉。最终，自封的正义使者登场执行“审判”。\n\n催泪瓦斯是个奇妙的化合物。滂沱大雨中，这种物质名不副实，效力大打折扣。伯南布哥州警局今日亲历了这场教训——他们的瓦斯弹幕在浩荡人海前收效甚微。当科技手段失效，恢复“正义”的途径便只剩原始暴力。\n\n警员们列着散乱的队形向抗议者推进，棍棒砸向血肉之躯。但防暴装备带来的安全感此刻反成累赘，起雾的面罩遮蔽了视线。双方人数——主要是警方——在暴雨中难以保持平衡，执法者在湿滑路面上踉跄跌倒的模样，成了抗议者眼中的滑稽剧。\n\n当警察在屈辱中鏖战整夜时，抗议浪潮未见消退，唯有从内部逐渐壮大的团体开始分化。辖区警局内，分局长疯狂致电上级，乞求任何能挽回颜面的支援。他的哀求直达权力金字塔顶端，终于得到了回应："
 brazil_lacerda_strikes.84.a: "“给他们送去人手，尽快解决这场闹剧。”"
 brazil_lacerda_strikes.84.b: "“让他们坚守阵地，咬咬牙就挺过去了。”"
 brazil_lacerda_strikes.84.c: "“通知他们撤退，这一局……暂且认输吧。”"
 brazil_lacerda_strikes.85.t: "累西腓之战"
 brazil_lacerda_strikes.85.desc: "累西腓铅云密布的天空酝酿着暴雨，刺耳的警笛、呐喊与口号声压过呼啸狂风。工人总指挥部与防暴警察对阵街头，这场巴西史上规模空前的示威让警力调度捉襟见肘。催泪瓦斯与密集方阵成为应对人潮的唯一手段。\n\n暴雨骤降时，催泪瓦斯的灼痛在雨水中消减。某条主干道上，抗议者高歌挺进，步步紧逼警方防线。但训练有素的警队未露怯意，他们收缩阵型固守待援，钢盔下的目光冷静如铁。\n\n增援带来新型高压催泪枪与防水瓦斯罐，金属风暴撕开抱团人群。雨水浸透衣衫，警方寸步不让的意志与刺鼻烟雾终使游行阵脚大乱。待雨歇云散，街道已重归警徽统治，唯余满地狼藉见证方才的惊涛骇浪。"
 brazil_lacerda_strikes.85.a: "反暴乱法案有其价值……"
 brazil_lacerda_strikes.86.t: "拉锯战"
 brazil_lacerda_strikes.86.desc: "大泽静夫（即“日本佬马里奥”）与迪尔玛·罗塞夫穿行在圣保罗大学的走廊间，二人正讨论最近的罢课。迪尔玛刚笑着开口：“马里奥，你听我说……”\n\n哗啦！拐角处传来巨响。只见同学雷蒙多瘫倒在地，被防暴警察团团围住。他高喊“法西斯！”的瞬间，警棍已砸出裂骨之声。一旁，某位教授正与看似指挥官的另一名警察激烈争执。“共党恐怖分子！”警官咆哮道。迪尔玛与马里奥转身欲逃，却迎面撞上整队逼近的防暴警察。电光石火间，迪尔玛瞥见雷蒙多身后敞开的门洞，拽住马里奥的手狂奔。\n\n霎时间警棍如雨点般落下。迪尔玛后背炸开剧痛，却咬牙冲破包围。冲出走廊时，她发现鼻青脸肿的雷蒙多竟也趁乱钻出了警戒线。\n\n此刻整条走廊已化作沸腾的战场，师生们正与警察推搡对峙。满脸鲜血的雷蒙多与教授、同学们齐声高呼“打倒拉塞尔达！”，回应他们的只有指挥官冰冷的“前进！”。防暴盾墙轰然压向人潮，迪尔玛和马里奥继续奔逃，沿途却见更多人群逆流而上，冲向混战现场营救雷蒙多等人。"
 brazil_lacerda_strikes.86.a: "抗议者们前赴后继。"
 brazil_lacerda_strikes.87.t: "双刃剑"
 brazil_lacerda_strikes.87.desc: "拉塞尔达与幕僚们耳语间挤进了塞阿拉州全民盟总部最近的办公室。原本正在接受罢工舆情管控简报的公关专员们被迅速清场，总统低头翻阅手中文件。这是地方党部呈交的报告，附有现场照片——塔沃拉麾下某位联邦众议员、务实派地方实权人物，竟在罢工期间与工会领袖密谈，而塞阿拉警方“恰巧”突袭了会场。警察捣毁临时住所，对工会代表乃至议员本人大肆羞辱。\n\n“狗娘养的。”拉塞尔达从牙缝里挤出咒骂。幕僚小心翼翼询问：“您说什么，总统先生？”他挥手示意无事，目光仍锁定在报告与照片上：全民盟要员遭警察当街凌辱的画面若登上巴西各大报纸，塔沃拉定会兴师问罪，全民盟将在最关键时刻分裂。必须封锁消息，让这个丑闻彻底消失。不过……或许能拿那个议员开刀，借此威慑务实派屈服。想到此处，乌鸦将文件甩给幕僚，大步流星走出办公室。"
 brazil_lacerda_strikes.87.a: "“堵住渠道，不能让这件事登报。”"
 brazil_lacerda_strikes.87.b: "“纸终究包不住火，让他们报道便是。”"
 brazil_lacerda_strikes.88.t: "力挽狂澜之法"
 brazil_lacerda_strikes.88.desc: "圣保罗政治社会秩序部内，示威口号、警方指令与辱骂声穿透墙壁，萦绕在拉塞尔达耳畔。总统对面端坐着警长弗勒里，屋外的骚乱仿佛与他无关。“这些恐怖分子对圣保罗的破坏远超巴西其他城市。”弗勒里以平静语调开场，此时催泪瓦斯爆破声骤然响起，呛咳声加入抗议合奏。他不为所动地继续陈述：“我的部下已到极限。没有联邦支援，治安体系必将崩溃。”目光如刀刺向总统：“相信您明白事态严重性，会全力支持巴西最优秀的执法者。”\n\n拉塞尔达步出座驾时，弗勒里的话仍在耳畔回响。他虽未作出承诺，但警长所言非虚——圣保罗局势危如累卵。正权衡间，却瞥见米尔顿·坎波斯从贝洛奥里藏特市议会大厦走出。眼镜后闪过微妙笑意，两人擦肩而过。坎波斯连日来不断施压，要求总统动用军队镇压罢工。\n\n平心而论，拉塞尔达并不反对此议。正如坎波斯所言，弗勒里之流面对罢工潮节节败退，更可能将联邦援助中饱私囊。当然，警长对军方的深恶痛绝也是隐患——或许两人都判断失误，警方其实尚能掌控局面？总统叹息着踏入市议会，隔音墙体将声浪过滤成遥远嗡鸣。他招手唤来幕僚，作出了决定。"
 brazil_lacerda_strikes.88.a: "“让坎波斯和弗勒里别来烦我。”"
 brazil_lacerda_strikes.88.b: "“让圣保罗准备好接受援助。”"
 brazil_lacerda_strikes.88.c: "“要求军队启动镇暴程序。”"
 brazil_lacerda_strikes.89.t: "十万人大游行"
 brazil_lacerda_strikes.89.desc: "由安德烈·图利奥鲜血孕育的洪水，正奔涌着吞噬圣保罗。这洪流将涤荡政府的罪行、警暴的不义与总统内阁的昏聩。组成这洪水的，是各行各业劳动者的血汗——乡野的农夫、寅吃卯粮的工薪族、矢志不渝的工会斗士。他们在城郊汇聚成滔天巨浪，虽仅达承诺人数之半，尚未抵达预定路线，却仍在不断壮大。从巴拉那到里约，巴西劳动阶级正星夜驰援，圣保罗的筑坝者已无力阻挡。\n\n筑坝者的首领——警察总长弗勒里正腹背受敌。眼见潮水退而复涨，他忧心如焚。城中的“水生生物”——罪犯、劫掠者之流——早已放任自流，唯有“日本佬马里奥”这等狡黠大鱼仍在追捕名单，余者皆任其自生自灭。弗勒里无心垂钓，转而专注堤防：与小瓦加斯州长、纳特尔市长共同构筑的路障、分流点与警力集结点，冀望以此劈开散漫的人潮，遏止洪峰淹没圣保罗。有人相信堤坝将固若金汤，更有人祈祷它土崩瓦解，但仍有人徒劳地期盼着妥协的可能。"
 brazil_lacerda_strikes.89.a: "如今，全圣保罗都在静候洪水滔天之日。"
 brazil_lacerda_strikes.90.t: "堤坝屹立"
 brazil_lacerda_strikes.90.desc: "尽管洪水肆虐，浪潮不断冲击堤坝，成千上万的抗议者涌入圣保罗，但堤坝依然屹立不倒。在增援部队和额外装备的支持下，弗勒里的筑坝者们坚守防线，如今洪水已被击退。那些被困在城市角落、分散孤立且无法相互呼应的水坑，正被逐一围捕驱散。这场“海啸”中最汹涌的浪潮——工会领袖、煽动者和组织者们——已遭制服和逮捕，被塞进警车押送出城。\n\n堤坝的防护效果显著如斯，以至对某些人而言，他们几乎不曾察觉这场洪水的存在。商铺照常营业，富人区的白人精英们照常经营生意，除了零星的镇压和临时设立的检查站，这场洪水几乎没有掀起任何波澜。此时，民主工运已开始收编残余的水洼，剥离其中的激进成分。"
 brazil_lacerda_strikes.90.a: "潮水退去，而圣保罗的污渍又幸存一天。"
 brazil_lacerda_strikes.91.t: "堤坝崩坏"
 brazil_lacerda_strikes.91.desc: "浪潮奔涌，堤坝决堤，圣保罗陷入汪洋。警方徒劳地试图驱散这股浪潮，却被罢工者以压倒性的力量冲散。单个警队或被围困，或彼此失联。罢工者突破路障与检查站，轻松穿越被混乱警力遗弃的防线。部分警察因恐惧向抗议者开火，造成少量伤亡，亦有警员被愤怒的人群反扑、吞没。但总体而言，这场行进几乎未遇实质抵抗。\n\n无人能逃过洪流席卷。商铺仓促闭门，圣保罗的每个角落都覆上一层粼粼水光。富人、军人与反动派惊恐地目睹洪峰过境。社会主义与共产主义的旋律随游行队伍一同淹没街道，整个国家通过广播与电视见证着这一切。十余万群众在圣保罗畅行无阻。待拉塞尔达总统调遣军队时，为时已晚——洪水的侵蚀已使圣保罗最富有、最暴虐的阶层腐朽溃烂。当工人阶级的歌声响彻全国，抱团取暖的将领们已在谋划罢黜总统。"
 brazil_lacerda_strikes.91.a: "洪流吞没圣保罗，洗尽铅华。"
 brazil_lacerda_strikes.92.t: "如果我开口，就会被绞死"
 brazil_lacerda_strikes.92.desc: "风向发生了变化。被逼到极限的圣保罗军警将阵地移交给了军队。路上几乎没有一辆民用车，街上满是装甲车、半挂卡车和美制轻型坦克。军队检查站遍布全城，政府军重新控制了废弃的工厂，并用沙袋和机枪火力点将其加固成前进据点。\n\n然而，这也不意味着军队控制区就很平静。几乎在军队接管治安的同时，民主工会运动就大大提高了他们手下志愿治安队的活动烈度。显然，警方无力，或者没有意愿镇压他们。其中的绝大多数看起来和普通的暴徒无异，毫无军人的纪律可言。但从第三方的视角来看，显然他们背后有人在操纵着这一切。尽管巴西民主行动研究所的商业领袖们在背后资助他们早已是公开的秘密。\n\n有时，每过几个小时就会发生一起与民主工会运动有关的街头斗殴、纵火或抢劫案。这些事件又导致疲劳的士兵和其他反罢工团体挑起与之相似或是直接相关的事端。据沮丧的警察们所知，一个由狂热的右翼学生组成，号称“共党猎杀指挥部”的帮派在一天晚上私刑杀害了一名混血男性，因为他们把他错认成了马克思主义逃犯卡洛斯·马里盖拉。\n\n所有这些报告都会交到戈尔贝里的案头。他要做出决定，是否要在军队已经接管的圣保罗等城市遏制民主工会运动的活动。"
 brazil_lacerda_strikes.92.a: "民主工会运动就是一帮妨碍我们行动的蟊贼。让他们老实点。"
 brazil_lacerda_strikes.92.b: "民主工会运动做得过火了，但他们站在了我方。让他们继续吧。"
 brazil_lacerda_strikes.93.t: "恶魔现身"
 brazil_lacerda_strikes.93.desc: "一夜之间，黑色的面包车出现在全国各地。在乡村，在各个街区，在死寂的月色或阴冷的日光下，黑色的面包车驶向它收到的地址。面包车不会在那里久留，引擎也不会熄火。然后，车里的武装人员就会一齐跳下车，冲进楼里，不久就押着他们要找的人回到车上。黑色的面包车也就扬长而去，许多受害者的下落再也不为人知。这样的情景一次又一次地上演。\n\n有时候车里的人穿着橄榄色制服，背着步枪；又是他们的衣着和平民无异，拿着手枪。面包车有时会开进贫民窟，有时则是公寓街区，酒吧或者工人俱乐部。它的目标是工会组织者，工人代表，政治激进分子。有时候他们的街坊邻居会警惕起来，大声叫喊，试图把黑色的面包车赶走，或者在这些不速之客离开时大声辱骂他们。其中大部分的人都再也不会出声了。如果他们甚至在第一时间意识到发生了什么事，那死神就要来收人了。\n\n一开始，消息传播得非常缓慢，但人们可不是瞎子。随着被捕和失踪的人越来越多，流言也传播开来。哪怕是在罢工中持中立态度的媒体也开始报道这些消息。\n\n戈尔贝里将军来到了黑色面包车的其中一个目的地——这是一个坐落在森林边缘的秘密据点。将原始而野蛮的杀戮逻辑变为现实的人此刻正站在铁丝网外。走过一间间囚室，戈尔贝里思忖着他的计划要在保密渐渐失效之际走向何方。"
 brazil_lacerda_strikes.93.a: "太过火了——缩减行动规模，重点针对高价值目标。"
 brazil_lacerda_strikes.93.b: "务必严格保密。要加大资源投入，全面压制关于此次行动的一切消息。"
 brazil_lacerda_strikes.93.c: "不必在意——扩大扫荡规模。"
 brazil_lacerda_strikes.93.d: "没什么坏消息——公开宣布逮捕是为了杀鸡儆猴。"
 brazil_lacerda_strikes.94.t: "无声步入白昼？"
 brazil_lacerda_strikes.94.desc: "戈尔贝里又一次扫视名单，逐个核对那些手写的人名。这边是几个反对派煽动者，那边有些闹罢工的激进分子——总得想办法收拾。可越看这些名字，他脑子里的疑问就越发强烈：怎么搞？具体怎么收拾这帮人？\n\n塞钱？给点真金白银暂时堵住嘴，就算他们想闹，凭这些喽啰也掀不起大浪。不过既然抓人也能达到同样效果，何必费这钱？戈尔贝里在脑子里反复权衡，突然灵光一闪把名单往桌上一拍——抓人塞钱都弱爆了，明明有更见效的法子！\n\n计划很简单。反对派们照常过日子，完全不知道戈尔贝里在布局。他们可能继续搞政治，也可能在家歇着——但最终都会“殊途同归”。要么在街角被“混混”暴揍，要么被“面包车上跳下来的愤青”送个“温馨提示”。关键是让他们记住：老实点。\n\n至于媒体？他刚担心半秒就释然了。眼下这场大罢工是年度头条，谁家有空报道这种小袭击？就算有媒体揪着不放，大可以把锅甩给“过激的民主工运小青年”或者“工总又在搞事”。拨通电话时，他只盼那些蠢货能识相。"
 brazil_lacerda_strikes.94.a: "明天的头条将证明他是对的。"
 brazil_lacerda_strikes.95.t: "和平与繁荣"
 brazil_lacerda_strikes.95.desc: "米尔顿·坎波斯觉得今早格外舒坦。或许是因为晨风温柔，或许是咖啡香气氤氲，又或许只是昨夜睡得香甜。他懒得深究，只顾盯着侍者端来的小杯浓缩咖啡。有那么片刻，这个早晨堪称完美。\n\n几乎堪称完美。\n\n远处隐约传来罢工者的刺耳呐喊，与军车轰鸣交织成城市的背景音。但出乎意料的是，这噪音非但没毁掉他的好心情，反倒让他嘴角泛起餍足的笑意——毕竟，比起满城鼎沸的骚乱，眼下这点动静实在算不得什么。忠诚的巴西爱国者正在守护贝洛奥里藏特的良民，拉塞尔达干得漂亮。\n\n咖啡杯轻叩桌面的脆响打断思绪。坎波斯深吸一口醇香，罢工、拉塞尔达、巴西的乱局都暂时抛诸脑后。此刻只有晨光温柔，邻座絮语轻柔，整座城市在安全中苏醒——安心享受这份宁静又有何不可呢？"
 brazil_lacerda_strikes.95.a: "这个瞬间，巴西回归了常态。"
 brazil_lacerda_strikes.96.t: "安德烈·图利奥失踪"
 brazil_lacerda_strikes.96.desc: "安德烈·图利奥的失踪案起初并未掀起波澜。尽管公众普遍怀疑这位大罢工的直言支持者突然人间蒸发必有蹊跷，但当时几乎所有报纸仍聚焦于罢工本身——毕竟，谁会在这等紧要关头分神报道一个记者的失踪？\n\n这种判断基本正确。\n\n虽然图利奥供职的报社刊发文章，谴责圣保罗警方的消极应对，但事件热度很快消退。直到尸体被发现。\n\n现场触目惊心：尸体被草草丢弃在路边，布满数百道割伤与淤青——显然是他杀。随着图利奥的血迹渗入柏油路面，戈尔贝里的名字也坠入舆论漩涡。\n\n后续影响起初看似有限。图利奥的报社再次成为唯一发声者，在特刊中以“杀人犯”、“恐怖分子”等字眼痛斥拉塞尔达政府。但这次，火星点燃了整片草原。\n\n一夜之间，丑闻席卷巴西。各家报纸争相转载，疾呼“当局与日耳曼尼亚的暴君别无二致！”\n\n随着民怨开始凝聚，事态急转直下——多家媒体声援“无辜记者被不义杀害”，声援圣保罗正在组织的“百万人大游行”。秃鹫开始盘旋，而戈尔贝里必须成为那个举枪的猎手。"
 brazil_lacerda_strikes.96.a: "巴西已尝过戈尔贝里酿造的混乱苦果，可会迎来他许诺的和平吗？"
 brazil_lacerda_strikes.97.t: "失败的游行"
 brazil_lacerda_strikes.97.desc: "当工人总指挥部与各工会组织联合发起对拉塞尔达政府的抗议时，有人扬言要组织巴西史上规模空前的百万人游行。许多反对派相信这将是对总统的致命一击。然而，最认真对待这个威胁的，恰恰是他们的对手——政府。\n\n当工会领袖们不断遭受骚扰、殴打乃至逮捕，抗议又如何能有效组织起来？当通信网络被精准的军事手段掐断，工运领袖们又如何串联谋划？待到所谓“十万人大游行”当日，实际参与者不及宣称规模的零头，普通民众甚至无人记起这场运动。仅存的零星抗议者在防暴警察的呵欠声中，如晨雾般悄然消散。\n\n尽管劳工阶层对争议缠身的卡洛斯·拉塞尔达及其全民盟仍怀有强烈敌意，但这场溃败暴露出反对派领导层的致命缺陷，也彰显了总统及其盟友的铁腕手段。随着民主工会运动与民主行动研究所的政治话语持续扩张，总统已跨过了执政路上最险峻的关隘之一。"
 brazil_lacerda_strikes.97.a: "希望他们别又想出新的花招。"
 brazil_lacerda_guanabara_recon.1.t: "奇迹之城"
 brazil_lacerda_guanabara_recon.1.desc: "“一旦我们飞出这片云层，您就能看清里约现在的困境——层层叠嶂将她囚禁在同心圆结构中，所有压力都堆积在中心区域，阻碍人类居住带向外自然延展。必须将城市肌理重塑为东西轴向，这样才能疏通她的生命动脉。比如您很快会发现，科帕卡巴纳的道路网络和地面交通，其容量完全无法支撑机械道路的需求。”\n\nC·A·佐克西亚季斯不断抛出新鲜术语的同时，洛塔·德·马塞多·苏亚雷斯频频向总统投去歉意的目光——她早该让人详细讲解人居学的精妙之处。不过总统此刻也无暇细听，直升机在气流中颠簸，舷窗外阳光刺目。\n\n总统基础理论早已知根知底——毕竟他作为州长时就与佐克西亚季斯事务所合作了三年。真正让总统分神的是那份备忘录，拉斐尔用最严厉的辞藻对项目的财政平衡表提出质疑，历数希腊专家多次僭越本分的言论，最后更是直接指责总统自由放任的态度。提案的最新预算数字仍在刺目地闪烁。\n\n当直升机钻出云层时，上升气流撩起总统日渐稀疏的头发，整座奇迹之城豁然展开。这是再熟悉不过的景色，佐克西亚季斯选择空中视察显然自诩匠心独运。但总统的目光却被某个角落死死攫住：拥堵在街口的车队，公路上此起彼伏的警笛，还有贫民窟上方永不消散的雾霾——在这个他唯一愿意称之为故乡的地方。\n\n“现代主义者只会推倒重来。他们宁可摧毁数百年积淀来建造人工乌托邦，也不愿给人类真正的自由去拓展生存空间。我们不妨另辟蹊径。”佐克西亚季斯只需瞥一眼总统凝重的眼神就知道提案即将通过。\n\n“至于那些贫民窟……”希腊人指向山腰，“是时候彻底整治了，您说呢？”"
 brazil_lacerda_guanabara_recon.1.a: "“你看穿了我的心思。”"
 brazil_lacerda_guanabara_recon.2.t: "贫民窟"
 brazil_lacerda_guanabara_recon.2.desc: "一间陋室里，女人正在分娩；相邻的房间中，垂死的妇人咳出带血的结核菌痰沫。生命的浩瀚在枪声与桑巴的节奏中共振，最终坍缩成彼此堆叠的多孔混凝土囚笼。波纹铁皮构筑的迷宫里，新鲜瓜果的清香、汗液的咸腥与尸体的腐臭纠缠成致命的氤氲。\n\n“看看这人类智慧的结晶！几个世纪的自发营建已然昭示了形态上的必然——当人类定居点沿山脊扩散，原本的交通动脉就会扭曲成蜿蜒脆弱的毛细血管。”\n\n“更令我惊叹的是此间文化的嬗变。所幸来之前看过《黑人俄耳甫斯》，那种对生命力的礼赞此刻竟真切展现在眼前。”两人俯瞰着贫民窟的苦难与瓜纳巴拉湾的壮丽。佐克西亚季斯转身指向远处尚未清理的拆迁废墟：“若铲平这些社区，这里的文化该何处安放？”\n\n总统漠然看着衣衫褴褛的孩童为争夺发霉的肋排撞翻垃圾桶，察觉到雅典人身上散发的病态念旧：“这时候开始舍不得了？”\n\n“我曾在保加利亚住过类似的地方。新建的社区理应保留这种……人文气息。”\n\n老人的咳嗽混着咖啡杯碎裂声，孩童的尖叫追着逃窜的母鸡掠过残垣断壁。佐克西亚季斯的话有多少传进总统耳中不得而知，但拉塞尔达清楚地预见到：若不立即打断，这个希腊人必将用整整一下午的辩论折磨他的神经。"
 brazil_lacerda_guanabara_recon.2.a: "“行吧。社区可以重新设计，但搬迁工作不能停。”"
 brazil_lacerda_guanabara_recon.2.b: "“既然你这么欣赏他们的智慧，不应该相信他们能够自行克服吗？”"
 brazil_lacerda_guanabara_recon.3.t: "奇迹之城的心情"
 brazil_lacerda_guanabara_recon.3.desc: "“康斯坦丁诺斯，我非常尊重您和您的风格，”卢西奥·科斯塔在甜面包山上对着里约城市天际线抬手说道，“但我恳请您重新考虑这对瓜纳巴拉湾意味着什么。这不是座人为规划的城市，而是不断演化和成长的生命体！您不能像独裁者那般武断决定市民的命——”\n\n“科斯塔先生，您不是现代主义者么？”佐克西亚季斯眼角浮起狡黠的笑意，“既然如此，就该理解形式需顺应科学规律的道理。借助人居学，我们能以动态规划激发城市活力。倒是你们这些现代主义者何以对此退避三舍，实在令我费解。”\n\n旁边几位美国游客突然鼓起掌来，一位西装革履的中年人甚至朗声赞了句“说得好！”。佐克西亚季斯脸上得意之色更甚，自认这场论证堪称完美。簇拥在科斯塔身边的几位巴西规划专家却皱紧眉头——想来是忆起巴西利亚建设时的惨痛教训。\n\n“看来是理念不同吧。”科斯塔最终颔首示礼，“但您该知道，巴西自有深谙奇迹之城养护之道的人，这份初心也永不会改。幸会。”希腊技术专家与巴西建筑师握手言别时，无形战线已然划开。\n\n佐克西亚季斯转身望向拥挤的市中心。规划单体建筑尚属不易，遑论营建整座城市。然而无论现代派知识精英作何想，他终将执意践行自己的理念。"
 brazil_lacerda_guanabara_recon.3.a: "恶意似乎是工程师最大的敌人。"
 brazil_lacerda_guanabara_recon.4.t: "今日之城"
 brazil_lacerda_guanabara_recon.4.desc: "在今日之城的边陲，万物荒芜。\n\n一个身形瘦小的男孩攥着比他指缝大出两圈的左轮手枪，如幽灵般踟蹰在夜色里。霓虹斑驳的“维加斯旅馆”招牌在他头顶明灭闪烁，投下一圈勉强照亮身下荒土的光晕。旅馆深处传来的惨叫与枪响不断撩拨他的耳膜，几乎要让这个早慧的哨兵违抗大孩子们的禁令——可他终究抵不过掌心传来的金属触感，抬脚走进那片猩红光影。\n\n当少年们嬉笑着冲出旅馆大厅时，那些沾血的帆布包活像刚洗劫完金库的劫匪行囊。撕打声已平息，呻吟渐渐微弱，只有他仍意犹未尽地尾随而去，最终消逝在更浓稠的黑暗里。随着城市不断膨胀，这样的故事注定会在某个街角重演。\n\n在今日之城的核心，万物繁荣。\n\n“糖面包山”分店的鲜红招牌嚣张地探向街道，新漆的艳色将晚归人群笼罩其中。那些脖颈挂着鎏金十字架的顾客们放肆谈笑，在暖黄小彩灯串下漫步，仿佛此地亘古以来便如此流光溢彩。\n\n而在十年前的记忆褶皱里，陶土般粗粝的旧社会住宅楼曾如蜂巢填满山丘。如今它们化作碎石瓦砾，被新贵们踏着金砖铺就的香榭大道碾进尘埃。桑巴舞曲不再回响于陋巷，唯有残垣断壁上新涂的彩绘在诉说：昔日居所已被取而代之的金色商街吞噬。\n\n无论规划者的初衷如何，今日之城并非真正意义上的一座城市——而是两重天地。"
 brazil_lacerda_guanabara_recon.4.a: "除名字外，再无相同。"
 brazil_lacerda_guanabara_recon.5.t: "疲惫的洛塔与一出悲剧"
 brazil_lacerda_guanabara_recon.5.desc: "“简直……没法跟佐克西亚季斯他们共事，”洛塔在长椅上扶额，冬季的寒风裹挟着弗拉门戈公园的花草香，“他们的理念天差地别。”伊丽莎白啜着第五杯红茶，洛塔的咖啡早已凉透。“罗伯托总让我们考虑工程对生态的影响，有时我都怀疑他爱矮牵牛胜过爱活人。”伊丽莎白闻言扑哧笑出了声。\n\n她们相伴十二载，伊丽莎白暗忖，可这对恋人至今仍未参透何为琴瑟和鸣。“塞尔吉奥倒是能干，可偏要念叨‘对作品倾注爱意’。我哪次……没做到这点？”洛塔懊恼地长叹一声，“说真的，莉兹，我突然感觉自己在做无用功。”\n\n伊丽莎白纤手轻轻搭上爱人的手臂，仿佛暴风雪中递来一袭羊毛毯。“洛塔，你做的每件事都浸透了爱意，这座公园就是明证。所以无论你作何抉择……我都全力支持。”\n\n洛塔感觉双颊又泛起红潮。这是难得不彼此伤害的温柔时刻。她知晓伊丽莎白的酗酒、知晓她对里约的憎恶、知晓那些露水情缘与自我放逐。她祈祷这些零星的温存能抵偿经年累月的创痛。“你说得对。我决定了，要……”"
 brazil_lacerda_guanabara_recon.5.a: "“……告诉佐克西亚季斯，别再那么专断了。大家知道该做什么，他得放手。”"
 brazil_lacerda_guanabara_recon.5.b: "“……告诉塞尔吉奥和罗伯托，让他们多听佐克西亚季斯的意见。他坐上这个位子是有原因的，我信任他。”"
 brazil_lacerda_guanabara_recon.6.t: "佐克西亚季斯的胜利"
 brazil_lacerda_guanabara_recon.6.desc: "热血、辛劳、眼泪和汗水终于浇灌出了硕果。佐克西亚季斯实现了他的愿景，里约迎来了新生。空气清新香甜，街道整洁如初，马路平坦宽阔，行人喜笑颜开。葡萄牙人设想中繁荣之城如今化为现实，而民众对此满怀欣喜。\n\n拉塞尔达自认与民同乐。每当他俯瞰里约——他的里约，自豪感便油然而生。领导项目的人是他，为民生殚精竭虑的人是他，组织人力物力财力的人也是他。此刻他啜饮着第一口咖啡，明白这一切都是值得的。\n\n而在另一边，洛塔心中只有空虚。不是愤怒，不是疲惫，甚至不是悲伤，只是一片彻底的空虚。她为这个项目奉献了身心，换来的回报却少得可怜。报酬？仅够维持生计。荣誉？只有象征性的赞许，功劳几乎全归男性。认可？不出一个月，没人会再记得她的付出。最致命的一击则来自伊丽莎白：她没有回电话。\n\n佐克西亚季斯对眼前的作品十分满意。他依自己的意愿重塑了里约，把这座贫民窟遍地的城市改造为二十世纪该有的模样。和拉塞尔达一样，他心中也充满了自豪，如同一位父亲注视着新生的婴儿，或是一位艺术家欣赏着自己的巅峰之作。但不同的是，他没能徜徉其中太久，因为一阵电话铃声打断了他的思绪。"
 brazil_lacerda_guanabara_recon.6.a: "“佐克西亚季斯先生？我是澳大利亚大使，您有兴趣光临墨尔本吗？”"
 brazil_lacerda_guanabara_recon.7.t: "大都市圈"
 brazil_lacerda_guanabara_recon.7.desc: "佐克西亚季斯几乎要掀翻办公桌，掐死这个正将他毕生心血化作财务报表碎纸片的侏儒。兴许该让卡特蒂多一具总统冤魂，在霉味扑鼻的宴会厅游荡。但此刻与对方同处一室，他至少还能作最后陈词。\n\n“但愿您明白普世城的构想不容置喙。我提议的产业枢纽是疏通里约代谢的关键经络。您这般乡土学者习惯了福塔莱萨的景观，自然不会领悟让东南部崛起为大都市圈的战略深意。”\n\n塔沃拉从金属框眼镜后投来直视。希腊规划师突然觉得自己像是解剖台上的标本。\n\n楼下秘书翻杂志的手指骤然僵住，科帕卡巴纳空置工地的保安觉出海风刺骨，就连裹着天鹅绒睡袍独饮玛歌酒庄佳酿的洛塔，也醉眼朦胧地往浴袍深处瑟缩。酒气氤氲中，她恍惚听见某个侏儒用英语吐出几个单词——卷舌音那么生硬，定是个东北佬。\n\n“滚出我的国家。”\n\n空乘端上巴西航空招牌焗龙虾时，佐克西亚季斯望向舷窗外尚未完工的里约。罢工者的呐喊仍在楼宇间回响，而城市已随云海远去。波音727的轰鸣下，他分明听见几排座位前传来伊丽莎白·毕晓普的啜泣。羊绒围巾包裹的憔悴女人，他自然不会上前相认。"
 brazil_lacerda_guanabara_recon.7.a: "“看来，我们俩都要回美国了。”"
 BRA_guanabara_dismantle_megaproject_tooltip: "瓜纳巴拉重建已§G顺利完成§!——项目将画上句号。"
