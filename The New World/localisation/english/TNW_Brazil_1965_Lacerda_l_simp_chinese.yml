 BRA_lacerda_acts_const_purge: "£BRA_constitutionalists_texticon §K护宪派§!的影响力将§R大幅削弱§!！"
 brazil_lacerda_sorbonne_campaign.1.t: "全民盟新形象"
 brazil_lacerda_sorbonne_campaign.1.desc: "席德·莫雷拉浑厚的嗓音一如既往，但对那些有幸挤在最新款电视机前的巴西人而言，今晚将上演的是一场前所未有的视觉盛宴。“今晚，《国家新闻》将为您播报一则意义重大的特别消息，并呈献来自环球电视台前所未有的技术革新。我们将实时转播全国民主联盟党代会的现场，内伊·布拉加州长已被正式提名为该党的总统候选人。您将首次通过彩色画面，见证这历史性的一刻。”\n\n话音刚落，全民盟的蓝、白、红三色旗帜，伴随着雷鸣般的掌声，从成千上万的屏幕上跃然而出。一个身着黑色西装、系着宝蓝色领带的男人，走过酒红色的地毯，站到了橡木讲台前。镜头拉近，内伊·布拉加那浓密的黑发间，夹杂着几丝象征智慧的灰白；白皙的面庞上，一抹微笑正不由自主地从嘴角漾开。他开始致辞，滔滔不绝的演讲词从口中涌出，但谁还在乎他说些什么？当视觉的盛宴开启，听觉便退居其次。\n\n无需在此流连。沸腾的人群，以及这位未来总统亲和而矫健的身姿，便已说明一切。于是，环球电视台引领着观众，开启了一场穿越布拉加的过去、通往巴西未来的时空之旅：一张张被染上色彩的老照片，记录着他身着灰绿色军装的青春年少；身着警蓝色制服的巴拉那州警察局长，严厉的守护者；以及那位身着驼色、灰色、棕黑色西装、正在桥梁、电厂前剪彩的实干派州长。当然，还有他伸出手，慈爱地抚摸一个金发孩子头发的温情瞬间。\n\n那蓝、白、红的漩涡，那绿、黄的国旗，那一张张布拉加的笑容剪影，绘制出一场永不停歇的视觉游行。提名若泽·萨尔内为副总统候选人的消息一晃而过，仅留下一抹古铜肤色与青绿领带的模糊印象，随即被淹没在更为宏大的叙事之中——咖啡种植园的苍翠，道路沥青的墨黑，以及那反复闪现的、布拉加那亮得晃眼的招牌微笑。一种全新的催眠术，正从千家万户的荧屏之中喷薄而出，席卷整个国家。"
 brazil_lacerda_sorbonne_campaign.1.a: "一张彩色的画面，抵得上多少言语？"
 brazil_lacerda_sorbonne_campaign.2.t: "形式交换"
 brazil_lacerda_sorbonne_campaign.2.desc: "气氛凝重。往届大会那种铺张奢华、意气风发的场面，如今已不见踪影。几面印有党徽的横幅孤零零地挂着，唯一的点缀是天花板上正慢慢漏气的几个气球。库比契克和吉马良斯几乎是毫无波澜地拿到了提名，在多数人看来，他俩不过是走个过场的炮灰。至于选举会不会公平，结果会不会被承认，那又是另一码事了。这次大会，恐怕要办成一场葬礼了。\n\n儒塞利诺·库比契克脸上挂着一抹被现实压弯的苦笑，目光落在手里那份仓促写就的讲稿之上。稿中几处句子已被涂黑，是军方大手审查的杰作——别无他法的他暗自决定，要把更多的内容换成乐观的空洞口号。“巴西人民，我知道这场选战将会十分艰难。许多人或许会担心，更糟糕的日子还在后头。但我懂这个国家，我知道它的心站在哪一边，不站在哪一边。”\n\n他环顾四周，先是迎上乌利塞斯·吉马良斯那有气无力的掌声，然后望向台下。有几个人带着些许期待，审慎地看着他，但他知道，大多数人早就认命了。“我们将告别多年的忽视，告别过去领导人的愚蠢，告别拉塞尔达的错误判断，告别……”库比契克顿了一下，想起了那个被远处看台上某个将军删掉的词，“告别军方的强权，奔向一个代表着正义、自由、秩序与进步的国家！”\n\n在里约的各个角落，社民党的残存火种又萌出些许生机。几个志愿者聚在一起，听着这段绝望的演讲。没有实在的政策纲领，对政变的批评也如同隔靴搔痒。这种情况下还怎么搞竞选？当演讲在几乎已沦为例行公事的掌声中结束时，只有一个女人站了起来，整理着手里的宣传册——册子上的名单比往年少了好几个名字，印数也少了许多。"
 brazil_lacerda_sorbonne_campaign.2.a: "她敢断定，布拉加与萨尔内的传单比这要厚实得多。"
 brazil_lacerda_sorbonne_campaign.3.t: "头尾餐"
 brazil_lacerda_sorbonne_campaign.3.desc: "乌鸦啄食着盘中的食物。厨师倒是挺舍得给这道法罗法放料，肥美的培根丁在木薯粉里闪着油光。可到了卡洛斯·拉塞尔达嘴里，却仿佛成了一团嚼之无味的烂泥。他差点把碗推开，好把自己的满腔怒火倾泻到对面那个像食草动物一样慢条斯理地吃着东西的内伊·布拉加身上。\n\n“你为什么要参选？”拉塞尔达问，他心里知道，不管对方怎么回答都比不上马加良斯；要是当初出来参选的是那个对的人就好了。“任何一个候选人，在参选前都必须想明白这个问题，不然迟早会被压力压垮。”拉塞尔达抓起一个加了香料的炸点心，一掰两半塞进嘴里，嚼了两下便吞下肚去。\n\n布拉加用勺子搅着自己的法罗法，动作平稳而精准。“因为我能为巴西效劳。这是我毕生的志向。”他顿了顿，将勺子靠在碗沿。“而且您不必为我担心。我刚入行那会儿，我妻子玛丽亚·若泽得伤寒去世了。我……我一个人拉扯四个孩子。跟那时候比起来，没什么选战是难的。就没有难的事情。”\n\n那一刻，拉塞尔达的脸色柔和起来：“是什么让你挺过来的？”\n\n“纪律，严谨，还有工作。在总参谋部学校，在卡斯特洛·布兰科手下埋头苦——”布拉加还在说，可拉塞尔达已经听不见了。卡斯特洛·布兰科。他明白了，眼前这个毛头小子，不过是军方棋盘上又一颗忠心耿耿的棋子。他又吃了一口，味同嚼蜡。这些年来，卡洛斯·拉塞尔达总统何尝不是如此？一个不穿军装听指挥的小兵罢了。"
 brazil_lacerda_sorbonne_campaign.3.a: "甜点端上的是巧克力糖球。"
 brazil_lacerda_sorbonne_campaign.3.a.tt: "§Y[BRA_pres_selected_region_dynamic]§!\n  §R略微降低§!§L$BRA_pres_candidate_name_9$§!的支持率。"
 brazil_lacerda_sorbonne_campaign.3.tt: "总统将为其继任者的活动提供最低限度的支持。"
 brazil_lacerda_sorbonne_campaign.4.t: "共进晚餐"
 brazil_lacerda_sorbonne_campaign.4.desc: "维尔吉利奥·塔沃拉打量着面前的盛宴：巴伊亚风味炖鱼、香蕉法罗法、牛仔豆，右手美酒，左手餐巾。他擦了擦脸，心想：当年的皇帝是不是顿顿都这么吃？他微笑道：“跟雷阿伦戈军校的食堂比，可真是一个天上、一个地下，是吧？”\n\n州长内伊·布拉加正趁着谈话间隙，狼吞虎咽地吃着自己那盘法罗法。他抬起头表示同意：“小声点，别让‘老铁骨’听见了，不然他连总统都敢罚去加操。”\n\n两人哈哈大笑。塔沃拉轻抿一口酒，一个不怀好意的问题浮现在脑海里。“州长，这里跟雷阿伦戈军校可差远咯。在那里我们都一心为国。如今你我初心未改，可我们的党、我们的国家，已经被这几年折腾得四分五裂了。你打算怎么把大家重新团结起来？”\n\n布拉加放下酒杯，迎上塔沃拉的目光。“我父亲的家族因革命而分裂，一边是布拉加家，一边是拉塞尔达家。为了在我们那个小地方维持和平，我白天去联盟俱乐部跟布拉加家的人喝酒，晚上又去国会俱乐部跟拉塞尔达家的人跳舞。回家总是搞到很晚，但我跟两边都关系不错。”\n\n塔沃拉的酒杯在触及桌面时晃了晃，最后还是稳住了。老上校爽朗地笑道：“干我们这行，回家的时候太阳都出来了！不过你这话说得漂亮。今晚，就算是你在联盟俱乐部这边敬过酒了。”"
 brazil_lacerda_sorbonne_campaign.4.a: "“州长，这次竞选你有任何需要尽管吩咐。”"
 brazil_lacerda_sorbonne_campaign.4.a.tt: "§Y[BRA_pres_selected_region_dynamic]§!\n  §G提高§!§L$BRA_pres_candidate_name_9$§!的支持率。"
 brazil_lacerda_sorbonne_campaign.4.tt: "总统将全力支持其继任者的活动。"
 brazil_lacerda_sorbonne_campaign.5.t: "万马齐喑"
 brazil_lacerda_sorbonne_campaign.5.desc: "“实在抱歉，先生，我真的尽力了。有更大的势力在背后插手；他们翻来覆去就一句话：安全问题。他们绝对不会给我们集会许可的。我手下的人也告诉我说他们不管走到哪儿都有人盯着。冒这个险不值得。”\n\n“我明白。还是谢谢你。我们再想别的办法吧。再见，你也多休息。”儒塞利诺·库比契克长叹一声，挂了电话。又是一天，又一场集会胎死腹中。亲自给市长打电话已经是他的最后一搏了，可他早就知道这根本没用。\n\n“更大的势力，”他低声念叨，“真他妈一群混蛋。”为了巴西的灵魂和民主而战，这场选战从一开始就是一场硬仗。可是，天哪，军方的手也伸得太长了，连演都不演了；同样的事情在巴西各地反复发生，每次都有个冠冕堂皇的理由，反正就是不让社民党和他们的盟友抛头露面。\n\n“别人已经帮你定好了结局，那你要怎么赢呢？”他对着空荡荡的房间问道。"
 brazil_lacerda_sorbonne_campaign.5.a: "瘸腿跑步，难上加难。"
