 BRA_lacerdas_dream: "拉塞尔达之梦"
 BRA_lacerdas_dream_desc: "我们已经将瓦加斯强加于巴西人民的经济法西斯主义流毒丢进了历史的垃圾桶。巴西的经济挣脱了法团主义的枷锁，如同出笼的雄狮般，在自由资本和跨国企业的引领下勇往直前。库比契克时代的高通胀也已经成了遥远的回忆。\n\n社民党和工党愤怒地抨击着我们基于自由市场的经济政策，声称这是对瓦加斯主义的背叛。但在微观上，这两党中越来越多的人在看到我们的新经济带来的种种利好后改变了观点，并改变他们自己对瓦加斯主义的定义来适应它。"
 BRA_permanent_polarization: "永远的撕裂"
 BRA_permanent_polarization_desc: "总统身后留下的，只有导致巴西社会撕裂成拉塞尔达派和瓦加斯派两极的恶名。执政党和反对党每一天都在议会里互相指责对方是“法西斯”，仿佛不这么说就不够时髦。除了个别行事古怪的叛逃者外，任何跨党派合作的希望都已经在政治极化中溺毙。\n\n参议院不再像是一座民主机构，而更像一片战场。嗜血的媒体可能会对此喜闻乐见并连篇累牍地报道，但另一些评论家则打心底里对巴西民主的现状感到不安。就连外国大使们也希望这样恶劣的政治冲突不会蔓延到自由国家组织的其他国家。"
 BRA_permanent_polarization_tt: "§R$BRA_party_psd_c$和$BRA_party_ptb_c$将不会在参议院同我们合作……§!"
 BRA_tripartite_system: "三头体制"
 BRA_tripartite_system_desc: "拉塞尔达政府曾发起过一场旨在把瓦加斯主义从巴西的民族意识中剔除的圣战，但那早已成了过眼云烟。\n\n在塔沃拉的指导之下，拉塞尔达已经放弃了他的原教旨主义信仰，转向了和解的态度。全民盟参议员和他们的社民党同僚握手言和，就连工党也正一天天地开始支持合作。作为右翼倾向中间派阵营的核心力量，瓦加斯的政治遗产或许仍将是巴西合众国不容撼动的立国根基。"
 BRA_tripartite_system_tt: "§G$BRA_party_psd_c$保证75%的参议员支持我们。§!\n$BRA_party_udn_c$§R忠诚度上限将被设定为80%。§!"
 TNO_BRA_Riots_Info_tt: "§F拉塞尔达已站到了历史的悬崖边。随着瓦加斯派的统合劳动法的废除，工人们已经走上了街头，宣泄他们对总统的憎恨。\n\n大多数亲瓦加斯主义的工人都已经加入最为主要的巴西工会联合体，也就是£BRA_CGT_texticon §Y工人总指挥部§!£BRA_CGT_texticon 。他们的实力和激进度不断增长，控制他们可不是件容易的事。但政府在工运中也有些许拥趸——也就是£BRA_MSD_texticon §m民主工会运动§!£BRA_MSD_texticon。他们是全民盟的坚定战友，因此也控制了话语权。\n\n随着时间的流逝和£BRA_CGT_texticon §Y工人总指挥部§!£GNG_riot_radicalism_texticon §x暴徒愈发激进§!，国家经济将遭受严重破坏。若这场危机不能迅速结束，经济环境的混乱将使全民盟忧虑国家安全，给本届政府带来严重的后果。\n\n我们可以与各派系互动，并使用我们的人脉来让天平向我们倾斜。当民主工会运动的控制度达到75%时，罢工就将终止——但若是全民盟对危机的忧虑达到峰值，拉塞尔达的任期就将终结。§!"
