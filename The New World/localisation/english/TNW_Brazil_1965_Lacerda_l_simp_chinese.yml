 brazil_lacerda_sorbonne_campaign.12.t: "废纸一堆"
 brazil_lacerda_sorbonne_campaign.12.desc: "内伊·布拉加的国家经济发展计划恰似一具摊在拉塞尔达办公桌上的尸体，等着他动刀解剖。拉塞尔达大笔一挥，又砍掉一个不切实际的承诺、一个用来收买人心的油水项目，纸上便又多出一滩刺目的红墨。助手们早就跟他说过这份计划有多烂，建议他只看他们准备的摘要就行。可拉塞尔达，就因为那该死的骄傲与好奇心，偏要亲眼看看布拉加想把国家糟蹋成什么样——现在，他只能灌着威士忌，在心里咒骂当初的自己。\n\n糟蹋得不轻。拉塞尔达的手都快写抽筋了，批注翻来覆去就是“机构臃肿”、“职能重叠”，偶尔换个“多此一举，得罪OFN投资人”调剂一下。但当又一段布拉加发展主义的胡言乱语映入眼帘时，他的笔又一次狂舞起来，痛斥着低效与浪费。浪费……\n\n真他妈的浪费！拉塞尔达一掌拍在桌上，笔飞了出去，计划书的纸页散了一桌。在在各种半吊子政策与修修补补上浪费五年多的光阴之后，巴西已经没心情再听他这位总统指点江山了。废除瓦加斯劳动法、解除经济枷锁的举措，全都为时已晚。光说不做假把式，现在搞这些全都是浪费时间。他抓起布拉加的计划，连同他那几个小时的心血批注，一股脑儿扔进了垃圾桶。\n\n拉塞尔达灌了一大口威士忌。至少布拉加还没精神失常，定下的预算还算正常，也给私营企业留了位置。要是换了库比契克，那家伙只会把国家带回万劫不复的旧时代：通胀失控，赤字飞天，瓦加斯的腐败遍地开花。那将把他拉塞尔达的一切功绩都给抹杀了。\n\n总之，这份被他解剖得支离破碎的经济提案，永远别想离开他的办公室。"
 brazil_lacerda_sorbonne_campaign.12.a: "一杯威士忌下肚，一根火柴丢进纸篓，一切都化为灰烬。"
 brazil_lacerda_sorbonne_campaign.13.t: "训练营"
 brazil_lacerda_sorbonne_campaign.13.desc: "塔沃拉总统在政坛混迹多年，早就知道全民盟这个党山头林立、一盘散沙，得又哄又赶才能让它走对路子。不过，塔沃拉上校也懂得该怎么带新兵蛋子。\n\n“晚上好。”他一开口，那洪亮的男中音便让会议室里不安的窃窃私语瞬间消失。“今晚，很高兴见到本党新一代的议员们。也见到了你们当中，那些选后将与我们无缘的其他人。”底下有位候选人没忍住，倒抽一口凉气。\n\n“没错。这是一场硬仗，对手很难缠，你们中很多人都会被淘汰。如果你们想留下来，就拿起椅子下面那本书，那是内伊·布拉加的《国家经济发展计划》。”\n\n“我要求你们，今晚回酒店睡觉前，必须把它通读两遍。明天，你们就得跟选民说清楚，布拉加打算怎么降低油价，你们又会以多快的速度推动立法。到了第三天，你们得比勒布雷神父还懂人文主义经济学，但讲起来绝不能像神棍或者书呆子。”\n\n“布拉加州长给你们的这份计划是天底下最好的选举武器，但你们得学会怎么用它。”他伸出手指，指向前排某个准议员，“你，瓜纳巴拉州的，你就去讲新的计算机产业怎么给你们州带来好工作。还有你，塞阿拉州的，你就去讲第五章的扶贫政策。剩下的人，都去找自己最喜欢的部分，然后给我翻来覆去地讲，直到投票结束。你们要是干得漂亮，内伊他自己会来请你们上台跟他站一块儿的。”"
 brazil_lacerda_sorbonne_campaign.13.a: "“谢谢，你们后面也会回来谢我的。”"
 brazil_lacerda_sorbonne_campaign.13.tt: "§Y[BRA_pres_selected_region_dynamic]§!\n  §G提高§!§L$BRA_pres_candidate_name_9$§!的支持率。"
 brazil_lacerda_sorbonne_campaign.14.t: "考虑野党"
 brazil_lacerda_sorbonne_campaign.14.desc: "戈尔贝里关上了办公室的门。桌上摊满了社民党的材料——民调报告堆积如山，其中不少还是从社民党自己的合作公司搞来的；错综复杂的党内人际关系图，特别是与前工党和共党分子的牵连；还有各种竞选承诺、演讲和纲领的汇编，从城市基建规划到国家立法，无所不包；另外还有一大摞社民党高层的谈话录音稿。\n\n要如何处置社民党，火候如何拿捏，全凭戈尔贝里·多·科托-席尔瓦一人定夺。\n\n有了这些情报，他可以算出对方有多大胜算，但要在上面动动手脚也不难。问题在于，有必要去动这个手脚吗？如果社民党赢了，威胁有多大？如果他们只赢了总统，没拿下国会，威胁又有多大？如果他们输了，又会把事情闹到多僵？\n\n戈尔贝里仔细掂量着每一种结果的利弊得失，在不同的行动方案间反复权衡。\n\n一个小时后，戈尔贝里做出了决断，社民党之后数月的命运就此决定。这位巴西情报界的巨头，拿起了电话。"
 brazil_lacerda_sorbonne_campaign.14.a: "如果他们敢越界那就马上行动。"
 brazil_lacerda_sorbonne_campaign.14.b: "应该先发制人，防止他们蹬鼻子上脸。"
 brazil_lacerda_sorbonne_campaign.14.c: "采取一切必要手段，不能让他们赢。"
 brazil_lacerda_sorbonne_campaign.15.t: "审阅材料"
 brazil_lacerda_sorbonne_campaign.15.desc: "再过几天，库比契克就要发表一场全国电视讲话，这可是个难得的机会。为此，他找到乌利塞斯·吉马良斯，一同审阅竞选团队的演讲撰稿人写的稿子。乌利塞斯拿出几份草稿，库比契克一看那上面的话，就直皱眉头。外头风声紧，这么写也太煽动、太冒险了。他要来一支笔，挑了份他觉得结构最好的稿子，直接上手，又是划线又是批注。\n\n“这一段，说军方对我们搞非法勾当，话说得太过了，删了，”库比契克一边划，一边说，“这个承诺，太激进了，也删了，”他又圈了一段，“这儿可以换个委婉点的说法，别这么直截了当的。”\n\n过了几分钟，乌利塞斯忍不住了，磕磕巴巴地抗议道：“您这把内容都删没了！‘五年跨越五十年’的口号没了，您那些招牌的豪言壮语和政策也没了，最要命的是，连反对军头的立场都没了！”\n\n库比契克叹了口气，心平气和地回答：“民众看得懂我们说这些的。我这么改，是要让军方找不到镇压的借口。光是我儒塞利诺·库比契克还站在这里讲话，这个事实本身，就是对军方最大的谴责。”乌利塞斯好像对这套说辞并不买账，嘴唇动了动，还想说些什么。"
 brazil_lacerda_sorbonne_campaign.15.a: "“民众喜欢俏皮话，你得给他们点睛之笔，一句能让他们喊出口的口号。”"
 brazil_lacerda_sorbonne_campaign.15.b: "……但最终，他还是同意了库比契克的做法。"
 brazil_lacerda_sorbonne_campaign.16.t: "荒唐的闹剧"
 brazil_lacerda_sorbonne_campaign.16.desc: "社民党的竞选经理和另外三名官员被抓，罪名是策划阴谋。官方的说法是，他们一直在策划阴谋，只要库比契克败选就推翻政府，还称在他们的住所附近搜出了所谓的共产主义宣传品和武器。看来，检方打算使劲浑身解数来对付这些“民主的威胁”。\n\n这些指控简直荒唐透顶，分明就是一场打压社民党竞选的闹剧。库比契克已经听到风声，说有些竞选团队的人因为怕被盯上，已经辞职不干了。尽管如此，库比契克知道，把事情闹大肯定会死得很惨，要想从这次打击里缓过气来，就必须表现出高姿态。于是，便有了他此刻对他手下的人以及那些来听信儿的党内官员的这番讲话。\n\n“……总而言之，我向各位保证，我相信他们是清白的，但在这种艰难时刻，我们必须保持冷静。我恳请大家，把你们的力气都用在捐款上，好支付审判的法律费用，也请大家把实情告诉每一个愿意倾听的人。我相信，只要资源到位，理智最终会战胜一切，而法庭也会还这四位先生一个清白。”\n\n之后几天，法律基金收到了不少捐款，其中有一笔不小的数目来自一位匿名人士，来款只附了张纸条，上面写着：“为使民主之路，畅行无阻。”"
 brazil_lacerda_sorbonne_campaign.16.a: "捐赠者不是别人，正是内伊·布拉加。"
