 brazil_lacerda_samba.92.t: "不负名声"
 brazil_lacerda_samba.92.desc: "巴西利亚帕拉西奥酒店是现代主义的产物。宽阔的落地窗、锐利的立柱造型与局部点缀的立体派艺术元素，共同构成了这座风格奇异的建筑。五十年前，这种设计在欧洲传统大都会之外还极其罕见。鉴于其鲜明的海外文化印记，选择在此集会的强硬民族主义组织便显得格外耐人寻味。\n\n这场名为“民族主义议员阵线”的会议，是由一批致力于对抗外资对巴西经济渗透的参议员发起的松散同盟。参与者的政治光谱相当驳杂——未公开身份的共产主义者与自由派人士密切交谈，社会民主主义者则与强硬派保守主义者维持着礼貌的交流。\n\n此刻会议已告结束。演讲者与听众纷纷涌入宽敞的酒吧。往昔此地总会上演传统戏码：几杯下肚后，某些瓦加斯主义者开始激烈批判全民盟及其对外资的谄媚态度。在场少数全民盟成员只能强忍不快。然而时代在变。\n\n就在会议期间，一群全民盟参议员向演讲者抛出“经济增长与国家控制孰轻孰重”的质询。演讲者虽以巧言化解，场面却仍演变成该群体与其他听众的激烈论战。此事后，所有全民盟成员集体退席——短期内怕是难觅他们的身影了。"
 brazil_lacerda_samba.92.a: "大多数人只把这当成早晚的事。"
