 brazil_lacerda_sorbonne_campaign.21.t: "弦外之音"
 brazil_lacerda_sorbonne_campaign.21.desc: "独立日，还有独立日游行，本不该和政治扯上关系。那不是给某个候选人翻盘的戏台，而是总统为国尽责的场合。这是军方的规矩，就算军方高层再怎么胡作非为，也不会明目张胆地坏了规矩。\n\n但是，规矩没说游行前不能有别的游行。于是，一个主意应运而生：搞一出游行“彩排”。那些被眼前这出“强权神话”迷住的观众，将“有幸”成为布拉加演讲的听众。既来之、则安之，既然离场麻烦，那便顺水推舟——观众们将参加一场为他们量身定做的集会。\n\n就这样，在一个寒凉的八月清晨，公路边列队的士兵和坦克中，一小队人马从队列中走出，向两侧散开。布拉加有些紧张，走上讲台。他讲起雷阿伦戈军校，讲起在那儿结交的一辈子的朋友，讲起那段经历如何激励他报效国家，可刚说了一会儿，他就有些哽咽，后面也一直没缓过劲来。\n\n奇怪的是，虽然演讲的内容有些平淡，但台下的人都在安安静静地听着。布拉加投桃报李，赞扬并感谢了“伟大的陆军元帅卡斯特洛·布兰科”，说他是自己在军校乃至一生的导师和榜样。布兰科不仅是他在军校时的支柱，也是他在妻子亡故时的依靠。即使是那位将获得一切口头与物质荣誉当作毕生追求的职业军官，听到这番话想必也会有些尴尬。\n\n最后，他说了该说的话：上帝保佑军队，上帝保佑巴西。他的任务便完成了。自此，全国便没有了反对的声音。"
 brazil_lacerda_sorbonne_campaign.21.a: "游行彩排？不如说是公关彩排。"
