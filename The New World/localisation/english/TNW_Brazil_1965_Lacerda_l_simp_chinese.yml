 brazil_lacerda.225.t: "迷失在丛林里"
 brazil_lacerda.225.desc: "“这场战争或许不是巴西的战争，但它失败的后果，却由巴西来承担。”当最后一批部队连同他们在异域所付出的伤亡，从南大西洋彼岸归来时，迎接他们的，是一种压抑沉郁的愤怒。那些在战火中失去亲人的家庭悲痛欲绝，而国家却未曾获得哪怕一丝战略上的收获。这场战争毫无成果，目标尽失，而众人毫不犹豫地将矛头指向了卡洛斯·拉塞尔达。\n\n对于在政治上更加敏感的人而言，沉默根本无从谈起。他们的怒火不仅源自战争中的死者，更直指这场失败的“帝国主义投机”，以及那些漠然旁观的华盛顿政客。过去几个月里，巴西共产党与工党在各大城市不断发起突发集会，抗议政府对注定失败的法国殖民势力提供援助。如今几无胜果，这些抗议的声音势必愈加尖锐，愈发不可忽视。\n\n“拉塞尔达撒了谎，成千上万的人为此丧命。”这样的怒吼虽然尚未造成实质性的震动，但终有一日，这场危机将不得不被正视为它原本的模样——一场本可以避免的重大国耻。而军营中的士兵，也绝不会轻易忘记阿比让陷落的那一刻。"
 brazil_lacerda.225.a: "我们为何要为法国而死？"
 brazil_lacerda_imp.113.t: "地基崩裂"
 brazil_lacerda_imp.113.desc: "《第五共和国宪法》本应今天就该通过，而全民盟对此毫不关心。众所周知，这部宪法铁定会通过——全民盟掌控了足够席位，而反对派不过是路边的减速带。拉塞尔达正与席尔瓦闲聊，没人在意票数统计的过程。但他们本该在意。\n\n渐渐地，会场陷入寂静。拉塞尔达神情迷惑，隐隐流露出不安。“怎么了？我们赢了吗？”席尔瓦问道。一名助理最先开口：“不……不，先生，宪法……没有通过。”\n\n“什么！？”席尔瓦猛地跳起。“一定还有办法！”拉塞尔达急切地说。“我还以为你掌控一切了！”席尔瓦怒吼着冲着他喊。“我——我是掌握住了的，所有人都答应投赞成票——”拉塞尔达话音未落，便被席尔瓦请来的几位将军打断。\n\n将军们还未开口，席尔瓦便抢先下令：“把士兵叫进来，把这破事给我摆平！”几位将军当即离场。席尔瓦冷冷道：“我不想再看到这种事发生。”拉塞尔达坐在原位，一只手扶着额头，而士兵们已经冲进会场，对反对派大声呵斥，有的甚至举起了枪。宪法再次被提交表决。这一次，它通过了。"
 brazil_lacerda_imp.113.a: "但拉塞尔达，依旧忧心不已。"
 brazil_lacerda.224.t: "公鸡和乌鸦"
 brazil_lacerda.224.desc: "两位总统并肩而行。拉塞尔达特意放慢脚步，以迁就年迈的戴高乐迟缓的步伐。尽管这位法国老人步履蹒跚，眼神却格外炯炯有神。“法兰西站起来了。正是阁下您的支援，才让这个梦想得以延续。”\n\n“诚如您所言，总统先生。您成功击败泛非解放阵线，向世界展示了战胜野蛮所需的真正力量。能够为贵国的国防事业与理想捍卫略尽绵力，巴西人民与我本人都深感荣幸。”\n\n戴高乐微微点头，却忽然驻足凝望远处的断垣残壁——那是座被炮火夷平的建筑。“这场冲突留下的伤疤不会轻易消退。若想重振旗鼓收复故土，我们必须先完成家园重建。”\n\n“我完全赞同。巴西也十分乐意在此领域与贵国开展合作。我国拥有专业基建公司能协助修复道路与矿区，使贵国经济逐步重回正轨。我们还可以出口丰沛的农产品缓解供应短缺，同时派遣医疗团队帮助重建卫生服务体系。”\n\n“妙极了，拉塞尔达总统。艰难岁月里的扶持弥足珍贵。历史终将铭记，当考验真正来临之际，巴西不仅守护了自己，更捍卫了普世理想。这正是贵国的伟大之处。”\n\n“您过誉了。我国贸易代表团已拟定合作草案，随时可供审议。”拉塞尔达唇角微扬。他深谙济世利己之道。"
 brazil_lacerda.224.a: "展翅之时，投下悠长暗影。"
 brazil_lacerda_strikes.79.b: "……他们紧握决心，因为这一事业值得奋战。"
 brazil_lacerda_guanabara_recon.8.t: "泥泞的双目"
 brazil_lacerda_guanabara_recon.8.desc: "拖拉机已然完成了它们的使命。\n\n泥土统治着这片土地，棕褐色的海洋漫过山丘，只有在那些随意堆放着废金属与残砖的垃圾堆处才稍有间断。这些往昔的残骸，如同露天坟场，埋葬着曾经鳞次栉比的棚户——如今那些推倒它们的拖拉机仍停泊在侧。天气湿热难当，滂沱大雨消退后只留下令人不适的闷热。\n\n白昼迅速遁去，唯有邻近公路仍是这片净土的见证者。往来通勤的车辆飞驰而过，驾驶者浑然不觉周遭剧变。或许他们觉察了碍眼之物的消失，或是那些白日里引发交通混乱的推土机与卡车。可曾注意迁徙的人家？破碎的屋舍？被剥夺的自主权利？\n\n他们究竟可有半分在意？\n\n工地入口处的淤泥里半埋着一只兔子。那是只毛绒玩具兔。白色绒毛已被泥水污损，被遗弃在运走原住户的卡车辙印旁。它身上带着磨损痕迹，缝合的补丁和缺失的耳朵在褐色水洼中依稀可辨。唯一剩存的黑色塑胶眼珠高踞于脏污之上，空洞地凝视着萧瑟的场地。万物静止。\n\n残阳渐逝。夜色如墨。直至破晓时分，曙光才驱散阴影。兔子仍继续凝视。睡眼惺忪的工人们拖着脚步进入工地，听着指令领取工具，引擎声随之轰鸣苏醒。\n\n兔子始终凝视着。"
 brazil_lacerda_guanabara_recon.8.a: "又迁走了一片贫民窟。"
 brazil_lacerda_guanabara_recon.9.t: "吾乃万王之王是也"
 brazil_lacerda_guanabara_recon.9.desc: "佐克西亚季斯和洛塔看着自己的杰作，历经挫折困苦，建筑群和港口终于完工。虽然才刚刚开始，但周边的土地已经发生了变化，树木被砍伐倒地，海水变得更加浑浊，工人们也开始轮班工作——虽然现在现在只是小小一群，但随着人们迁入当地，会有更多的人加入进来，新涌入劳动力的诱惑之下，部分公司已经开始在当地着手开展业务。\n\n佐克西亚季斯滔滔不绝地讲述着新的复合体将如何改变这里的一切，新的旅游港口和国际机场建成就是最好的证明。出于礼貌，洛塔点了点头，但她并未当真将注意力放到佐克西亚季斯身上，而是审视着自己的成果：一方现代化的宏伟土地、一方为巴西带来创新与未来的土地。它改变了土地本身，将这里塑造成为工业基地。这是她的遗产、在土地上留下的事物。"
 brazil_lacerda_guanabara_recon.9.a: "“盖世功业，敢叫天公折服！”"
 brazil_lacerda_guanabara_recon.10.t: "钢筋与扁虱"
 brazil_lacerda_guanabara_recon.10.desc: "豪华轿车内，佐克西亚季斯望着水泥地基上裸露的钢梁骨架。那些熟悉的工地板房、混凝土搅拌机、成堆木材和钢筋再次映入眼帘，四周环绕着橙色路障和黄色警示带。他心知肚明这些物件固然是为眼前工地准备的，却也成了当下政局风云的双重注脚。\n\n人群中最高耸的标语牌上赫然印着卡洛斯·拉塞尔达的面容，血红圆圈配上斜杠将肖像打了个渗人的叉。紧随其后的是同样被划叉的拉斐尔·马加良斯，再往后则是朗朗上口的“全民盟下台”口号标语。抗议民众展示敌意的效率确实惊人——选择这座刚拆除贫民窟的空地作为反拉塞尔达-佐克西亚季斯计划集会的地点，可谓用心险恶。\n\n倒是拉塞尔达本人兑现承诺的迟缓态度更令人咋舌，竟然放任政敌借贫民窟清理大做文章。里约本地反对派在媒体上歇斯底里地叫嚣，称此类工地正是政府无能的确凿证据。示威者高举拳头朝天挥舞，齐声呐喊要在下次选举中推翻全民盟。佐克西亚季斯明白，自己声誉的修复之路必然漫长崎岖，即便全民盟成功连任，政府对他的信任也早已支离破碎。\n\n当瞥见那幅写着“疯子佐克”的白底黑字标语牌随人潮陡然竖起时，这位城市规划师的心脏猛然抽紧。他本能地前倾身体拍了拍司机肩膀，未等抗议者发现后座惊惶失措的贵客，黑色轿车已疾驰着逃离了现场。"
 brazil_lacerda_guanabara_recon.10.a: "动作快点，卡洛斯。这可不光是你一个人掉脑袋的事儿。"
 brazil_lacerda_guanabara_recon.11.t: "塔下大象"
 brazil_lacerda_guanabara_recon.11.desc: "拉斐尔·马加良斯手握巨型剪刀，以恢弘气势剪断彩带的刹那，丝毫不减这场盛典的庄严气象。这座刚落成的郊区新镇洋溢着田园牧歌式的魅力，几乎可与美国郊区比肩——翠绿如茵的草坪，艾森豪威尔时代风格的如画家宅，统统沐浴在巴西盛夏的碧空艳阳下。当这位总统继承人高举剪刀向天致意时，快门声如枪鸣四起，欢呼声如雷涌动。\n\n这项成就背后站着拉塞尔达内阁最杰出的智囊团要员，此刻众人分列左右；拉塞尔达亲临现场，古拉特如约出席，苏亚雷斯与佐克西亚季斯亦联袂而至。后两位专家的技术团队，以及亲手筑造这片社区的施工队伍齐集一堂。整个白日里，美誉将如雪片般纷至沓来，各方人士受之无愧。\n\n然而现场也有令人不快的存在。当马加良斯与拉塞尔达挨个与民众握手、亲吻孩童时，任何人都无法忽视聚集人群前方——越过通往山顶住宅区道路的护栏——那片挥之不去的景象：即便在新郊区宁静的氛围中，山脚下贫民窟的阴影依旧触目惊心。\n\n这绝非为腾挪新区而拆除的旧贫民窟翻版，每个贫民窟都以各自污浊的方式独树一帜。但那些原始画卷总由相同元素构成：蛇形盘踞的危房群落，恒久的肮脏与污秽。而最令人窒息的，永远是远处如瘟疫般不断蔓延的新棚户，正一寸寸蚕食着原本纯净的城市天际线。"
 brazil_lacerda_guanabara_recon.11.a: "没关系。马加良斯用微笑掩饰着内心的沮丧与厌恶。只要……别往下看就行。"
 brazil_lacerda_guanabara_recon.12.t: "里约噩梦"
 brazil_lacerda_guanabara_recon.12.desc: "洛塔·德·马塞多·苏亚雷斯拨了好几次号码，终于听到了声音：“你好，我是伊丽莎白·毕肖普。”\n\n“伊丽莎白……”洛塔的声音因抽泣而喑哑，她只感到肺疼，“瓜纳巴拉……”\n\n“我知道。”伊丽莎白还是一如既往的镇静。\n\n“我该怎么办，伊丽莎白？”报纸上的景象已经深深烙印在她的灵魂深处，她曾经的家园如今成了人间地狱。\n\n“你得走了。”伊丽莎白的声音冰冷了起来，“佐克西亚季斯还有其他人就已经走了。”\n\n洛塔惊惧不已：“什么？什么时候？已经？那——”\n\n“洛塔，”伊丽莎白言简意赅，“这事没那么容易过去，说话的工夫，律师们已经在起草诉讼书了。”\n\n洛塔紧握着听筒。\n\n“我才不在乎那群律师，我也不管佐克西亚季斯还有其他什么人，”洛塔此刻已是万念俱灰，“我只想和你在一起。”\n\n“咔”\n\n“伊丽莎白？”此刻只剩洛塔的声音在孤独地回荡。\n\n她又拨了一次号码，只觉如鲠在喉。\n\n没有应答，唯有拨号声与白噪音在她耳畔萦绕。"
 brazil_lacerda_guanabara_recon.12.a: "呼叫…呼叫…仍在呼叫…仍在呼叫…"
 brazil_lacerda_guanabara_recon.13.t: "希望破灭"
 brazil_lacerda_guanabara_recon.13.desc: "那片建筑群注定无法完工了。佐克西亚季斯刚一看到选举结果就明白了这一点。显然，这对投资者而言太过骇人，两天后他们便集体撤资。\n\n收拾行李离开科帕卡巴纳的公寓时，他正思考着下一站去向。墨西哥近来大兴土木，或许会青睐他的设计理念；日本也总在酝酿新项目。但当他真正迈出房门，这些思绪都消散了——眼前是里约热内卢，一座承载着无限可能的城市，宛如为他量身定制的画布，他命中注定要在此挥毫泼墨。而现在，他只能任其化作身后扬尘，由着这座城在岁月中腐朽崩塌。\n\n洛塔回到了欧鲁普雷图的居所。久未打理的房子处处透着衰败：草木疯长，墙上遍布污言涂鸦，窗户碎了一角。除了流浪猫狗，这里早无人迹。不过总比留在里约强。\n\n她跌坐在客厅里。巴西的建筑界已无她立足之地，全世界同行都将她视为行业之耻。此时此刻，佐克西亚季斯或许早有了新项目吧。目光掠过身旁茶几上的电话机，她想起两个可能施以援手的人——尽管希望渺茫。她先拨通伊丽莎白的号码。忙音响过三声、五声、最终归于沉寂。接着打给玛丽，依然无人应答。挂回听筒时，她强迫自己深呼吸。"
 brazil_lacerda_guanabara_recon.13.a: "无人施以援手。"
 brazil_lacerda.226.t: "就像参孙一样"
 brazil_lacerda.226.desc: "“我很同情您，总统阁下。您的国家被法西斯奴役定是件很折磨人心的事。法西斯一直都是我的心魔，我很庆幸我出生在巴西而非法国。”\n\n二人身处某个房间。对拉塞尔达而言，在哪不重要，重要的是对面的人，英雄夏尔·戴高乐才是最重要的。戴高乐那饱经风霜的脸，还有那沧桑的声调让他似乎看到了战争在戴高乐身上留下的疤，还有失去家乡对戴高乐的无尽痛苦。与之同时，他又是一位令拉塞尔达望而生畏的典范政治家。\n\n“安全的需求是我晚年才意识到的一件事，一个民族需要安全，更需要能在世界发声的力量。”他深深叹了一口气，这是对一段灰暗的历史中，那从未被尊重的声音的叹息。\n\n“这是每个国家都有的最朴素的渴求；而这也就是为什么今天我来到这里。拥核是唯一能保证我国不受法西斯威胁的选择，而我们能从尼日尔的铀矿中获得它。”拉塞尔达小心翼翼地抛出了他的提议，“如果巴西人的生意能获准入内，我们就能帮你们找到自己的声音。”\n\n“啊，如果我们当时能拥核，我们确实会多很多选择。”除了眼底里闪过的那些愤怒，戴高乐忧郁的思想对拉塞尔达而言一直是个谜，“但那时已经过去了，阻止你拥核会有些愚蠢。”拉塞尔达如释重负，最难的一部分已经结束了。\n\n“谢谢您，总统。聊完就走将会是我的失职。”拉塞尔达从这个曾经自由的国家身上收获颇丰。“请和我喝一杯吧。就今晚，我们可以好好追忆一下曾经的法兰西。”他们也真这么做了，回忆如酒般自由倾泻，正如在巴黎再续喜悦的回忆的希望一样。"
 brazil_lacerda.226.a: "巴西只会和阿根廷同归于尽。"
 brazil_lacerda_imp.114.t: "晨间通话"
 brazil_lacerda_imp.114.desc: "“早上好，总统阁下。今天我能为您做什么？”总统？拉塞尔达就是总统。然而现在，这位总统却像一个有些拘谨的孩子一样和另一位总统聊天......不管是不是超级大国，当总统听到自由世界的领袖在电话另一段发言时，这种感觉消失了。\n\n他盯着办公室那空椅子看，手指就像电话的俘虏一样，他早知道现在再多的恳求也没法挽回巴西的颜面。\n\n“你不是认真的吧……除名？之前可从未有过国家被OFN除名。”他如鲠在喉，眼睛止不住地眨了又眨，就像拍大头照摄影师的相机一样闪烁。一道泰然自若的声音训斥了他，并解释了发生了什么，那就是巴西已经成为了美国与OFN的一大耻辱。\n\n“不……你们不能把我——我们除名。”他的声音颤抖着；另一只空闲的手被用来擦拭眼睛，而电话对面用一种干巴巴而毫不仁慈的语调宣读起了他对人民的暴行与独裁行径，当然还有抵抗运动那点事，就像读流水账一样。\n\n“我明白了。”接下来的会谈他进入了自动回复模式。美国这样做是为了保全面子，也是为了给OFN甩掉负担。墙上，更准确地说，他的坟墓上刻着：他的政府快完蛋了。\n\n“感谢您的来电，我衷心希望某天我们能重返OFN。”电话咔嚓一声挂断了。他感到了自己的渺小，察觉了自己的痛苦，还感到胃疼。哪出问题了？昨天那股镇定自若的信心，那股认为自己的敌人一定邪恶的信息，都消散了。而他拉塞尔达又为巴西做了什么好事呢？\n\n当他离开办公室时，卡洛斯·拉塞尔达的心也随之死去，只留下一具民主斗士的空壳。"
 brazil_lacerda_imp.114.a: "巴西利亚的太阳合上双眼。"
