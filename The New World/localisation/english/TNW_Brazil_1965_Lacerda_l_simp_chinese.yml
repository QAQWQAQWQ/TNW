 BRA_our_subservient_middle_class: "顺从的资产阶级"
 BRA_our_subservient_middle_class_desc: "在大罢工的浪潮中，受害最深的，既不是富可敌国的实业巨头，也不是勉强糊口的底层劳工。说到底，背锅的还是那些夹在中间的中产阶级，他们没得选，也躲不开。当他们丢了饭碗、陷入贫困又无力自救的时候，政府就该站出来替他们说话。\n\n还有什么比当公务员更能让人忠于体制的吗？如果允许失业者加入那些常年缺员的政府部门，只要他们都规规矩矩，全民盟就能轻而易举地把自己的势力渗透进整个官僚系统。"
 BRA_beat_the_psd: "打倒社民党"
 BRA_beat_the_psd_desc: "来谈谈一个显而易见的现实——索邦派不知何故，放任反对派残党。虽然大多数社民党人同意通过互惠协议与建制派合作，不过一些不那么愿意合作的派别聚在坦克雷多·内维斯旗下，决定继续用煽动性言论破坏政权威信。\n\n1970年大选将至，内维斯承诺要带来的经济动荡已严重到无法忽视。不管他情不情愿，塔沃拉都别无选择，只能请出这位不怀好意的意见人士。戈尔贝里也赞成，并且定会言出必行。"
 BRA_beat_the_psd_tt: "£BRA_psd_texticon §Y儒塞利诺·库比契克§!的支持率§Y降低§!。\n"
