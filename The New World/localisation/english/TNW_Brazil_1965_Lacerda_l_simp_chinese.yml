 brazil_lacerda_world_tour.11.a: ""
 brazil_lacerda_world_tour.12.t: "审判"
 brazil_lacerda_world_tour.12.desc: "坐在礼堂后台，卡洛斯·拉塞尔达面无表情地盯着镜子。他整理了一下领带，推了推眼镜，然后懒散地从座位上站起。胸口的沉重让他感到一阵虚弱，他强迫自己集中注意力，试图理解自己为何会站在这里。拉塞尔达举起一只手，勉强挤出一个微笑，走向舞台，面对那群澳大利亚的大学生。他知道，大多数人是应教授的要求才来听他的演讲，谁能怪他们呢？他对与他们交谈的兴趣，和他们对听他演讲的兴趣一样冷淡。\n\n当他走到讲台前，拉塞尔达简短地打了个招呼：“下午好，堪培拉。”他的声音毫无生气。“我是卡洛斯·拉塞尔达，曾任巴西总统。”观众给予了一些礼貌的掌声，他想起了曾经吸引成千上万观众的日子。现在，多少人还为他欢呼呢？五十人？八十人？“今天，我受邀在这里与大家分享我与贵国之间的友谊。”\n\n本次活动本是为了庆祝国际友谊而举行的，但拉塞尔达的声音却毫无激情。他几乎无法忍受在台上称赞那些曾帮助瓜纳巴拉重建的澳大利亚企业，而如今，正是那些曾让巴西沦陷的瓦加斯派将重新掌控整个国家。曾经希望澳大利亚游客能够在科帕卡巴纳海滩悠闲度假的梦想，已彻底破灭。所有他在打击犯罪方面的努力，现在都将付诸东流。拉塞尔达坚持完成了这场演讲，但心中一直想着：如果能像这些学生一样自由地离开该有多好。\n\n回到酒店房间后，拉塞尔达给自己倒了一杯酒。“操蛋！这可恨的一切！”他愤怒地想到，怎么会变成这样？自己作为州长和总统所付出的一切，如今为什么自己的同胞们依然如此盲目地崇拜热图利奥·瓦加斯？他们难道享受通货膨胀？享受腐败？享受那些像土匪般的政治势力？当他听到选举结果时，拉塞尔达的心彻底碎了。这不是理性的结果，完全违背了选民的利益，他根本无法理解！如果他自己都无法理解……"
 brazil_lacerda_world_tour.12.a: "……那他怎么可能再度领导巴西呢？"
 brazil_lacerda_world_tour.13.t: "审判"
 brazil_lacerda_world_tour.13.desc: "在礼堂后台，拉塞尔达整理了一下领带，推了推眼镜，心中涌动着一种难以抑制的兴奋。他的门徒如今已当选为总统，自己的议程得到了验证，而他终于可以在这场演讲的终点看到胜利的曙光。拉塞尔达露出灿烂的笑容，举起一只手，走向舞台，面对那群澳大利亚的大学生。他知道，大多数人是应教授的要求才来这里，但这与当初瓜纳巴拉人参加他早期竞选活动的情形又有何不同呢？他们多半也是因为无聊或者些许的好奇。\n\n走到讲台前，拉塞尔达热情地喊道：“下午好，堪培拉！”他停顿了几秒，沉浸在掌声中。“谢谢，谢谢！我是卡洛斯·拉塞尔达，曾任巴西总统。我一直钦佩澳大利亚，并且相信有一天我的祖国也能像你们一样，成为自由的坚强堡垒！”他稍微停顿，等待掌声平息。“今天，更多的巴西企业得到了澳大利亚投资者的支持，更多的澳大利亚人正在喝巴西咖啡提神。我相信你们之中有不少人也在享受这些。”拉塞尔达停顿，期待着笑声，但它并未到来。他开始感到一阵闷热。\n\n“你们……或许你们的教授把你们叫来，是希望我给你们上一堂地理课，或者讲解贸易协议的复杂性。但有一样东西，比这些更为重要——那就是自由。正是因为自由，今天澳大利亚和巴西才站在了一起！”拉塞尔达举起一只拳头，面带灿烂的笑容。这一次，台下依旧没有任何反应。\n\n礼堂里弥漫着一种压抑的寂静，唯一打破沉默的，是学生们笔记本的翻动声和低声的窃窃私语。拉塞尔达的目光迅速扫过全场，眼前没有激动、没有激情，只有困惑。他的笑容开始动摇，接下来的几秒钟，他也愣住了。\n\n接下来的演讲内容，拉塞尔达几乎已经不记得了。躺在酒店房间里，努力让自己入睡时，刚才的情景在他脑海里反复上演。他究竟在想什么？他是来谈巴西与澳大利亚的伙伴关系的，这不是竞选之路！马加良斯赢了，反对瓦加斯主义的斗争将继续，但……"
 brazil_lacerda_world_tour.13.a: "卡洛斯·拉塞尔达再也无法领导这场战斗了。"
 brazil_lacerda_world_tour.14.t: "审判"
 brazil_lacerda_world_tour.14.desc: "拉塞尔达整理了一下领带，推了推眼镜，感到一种久违的自信在涌动。尽管人们都说这几乎不可能，但他知道总统职位终究还是属于全民盟的。终于，自己所走过的漫长巡演的终极胜利触手可及。拉塞尔达露出灿烂的笑容，举起一只手，走向舞台，面对着一群澳大利亚大学生。他清楚，大多数人只是应教授的要求来听讲座，但这并不意味着他们完全没有兴趣。\n\n走到讲台前，拉塞尔达停顿了一下，调整了一下语气：“下午好，堪培拉。我是卡洛斯·拉塞尔达，曾任巴西总统。”他停了几秒，听着台下的掌声。“今天，我很荣幸受邀来这里，与大家分享我们两国之间的深厚友谊。如今，越来越多的巴西企业得到了澳大利亚投资者的支持，而更多的澳大利亚人也因巴西咖啡而彻夜难眠——包括你们中的许多人，我相信。”他嘴角上扬，露出一丝微笑。“我坚信，我们的伙伴关系有着巨大的潜力，未来几年它只会愈加重要。”\n\n“当我还在里约担任瓜纳巴拉州的州长时，我常听到一些工厂因为无法获取所有的供应材料而不得不关停。现在，瓜纳巴拉，你会看到成百上千的工人正在用澳大利亚的铝材制造罐头，农民们也在使用澳大利亚制造的肥料来改良他们的土地。”他微微一笑，眼中闪烁着些许自豪，回想着自己在经济和外交上的成就。接着，他继续着演讲。\n\n一个小时后，当他结束关于澳大利亚和巴西相互影响的讲座时，巴西当选总统的影像不由自主地浮现在拉塞尔达的脑海。内伊·布拉加从未完全理解脱离瓦加斯主义的巴西梦想，而圣保罗的现状也证明了大多数人根本没有理解这一点。然而，尽管布拉加高举着与拉塞尔达梦想相同的全民盟旗帜，最终他还是赢得了选民的支持。\n\n那晚，拉塞尔达独自躺在酒店房间的床上，心中充满了矛盾的情感。一半是对于全民盟偏离他路线的沮丧，另一半则是对于巴西工党未能推翻它的庆幸。他深感自己未完成改革的恐惧，但又对现有的进展充满信心，认为它不会轻易被推翻。对于不能再亲自带领巴西走向更光明未来的绝望感，也在心头萦绕……"
 brazil_lacerda_world_tour.14.a: "……但他也充满信心，或许他不需要再去做这些。"
 brazil_lacerda_world_tour.15.t: "皇帝"
 brazil_lacerda_world_tour.15.desc: "独坐在高原宫的办公室里，塔沃拉发出了一声尖锐不悦的笑声。\n\n报纸上有关拉塞尔达访问古巴的文章，并没有描述什么重要的事情。首先，这篇文章甚至不在头版；其次，在哈瓦那，拉塞尔达似乎并没有为他的“反瓦加斯主义国际保守运动”（无论那到底是什么）赢得多么热烈的欢迎。报纸上的拉塞尔达演讲活动的照片倒是人头攒动，但塔沃拉相信，其中大多数人不过是一些凑热闹的古巴人罢了。想到这点，塔沃拉更有信心对拉塞尔达的那些国际噱头不屑一顾。\n\n这些确实不值一提——毕竟拉塞尔达又能做什么呢？难道他要像探险家佩德罗·阿尔瓦雷斯·卡布拉尔那样，率领征服舰队驶入塞古鲁港？他这趟国际行程，恐怕只不过是为了在北美观众面前粉饰残存的声誉罢了。天啊，那些美国人或许还会争相奉他为“民主的殉道者。”或许，这倒算得上是对他多年“忠实服务”的一个体面报偿。\n\n不过，这些念头很快被塔沃拉抛之脑后。拉塞尔达还能再掀起什么风浪？他不仅毁掉了自己的政治资本，也拖垮了整个全民盟。眼下即将到来的大选氛围早已如一条被训斥的狗一般低迷。而拉塞尔达，却没有像搞垮了国家经济的人那样知趣地悄然退场，反而坚持继续他这场不体面的表演。\n\n无论如何，这一切都无关紧要了。塔沃拉掌控着军队，而党派已经被拉塞尔达彻底玩砸了。他将这个无关紧要的拉塞尔达逐出了自己的思绪。这个自负的小丑，连让我再浪费时间的资格都没有——\n\n电话铃声突然响起。秘书通报说，阿克里州州长来拜见他。塔沃拉随手将报纸揉成一团，扔进了垃圾桶。"
 brazil_lacerda_world_tour.15.a: "“我的宫廷里，已不再有你的一席之地。”"
 brazil_lacerda_world_tour.16.t: "太阳"
 brazil_lacerda_world_tour.16.desc: "远离麦克默多站，一个孤独的身影行走在无尽的雪原上。\n\n“在巴西，不会有亲拉塞尔达派，也不会有反拉塞尔达派。政治会抛弃你和你那本蠢书。”\n\n即使仅仅是灼热的记忆，他仍更喜欢第一次的旅程。\n\n“你可以说你永远不会成为瓦加斯。但在这里，除了上帝，或许只有几只企鹅能听见你。”\n\n他对着苍天嘶吼，却得不到任何回应。\n\n“当然，我以为你早在‘49年我们第一次见面时就明白了这一点。”\n\n他从风雪中那件厚重的外套里掏出一颗染血的弹壳——一件丑陋却支撑他活下去的纪念物，直到此时为止。\n\n“我记得，当他们从你脚上取出我的时候，你是如何尖叫的。他本该瞄准你的心脏——可你连心都没有，又怎么能击中呢？”\n\n南极的冰原上，一个小小的深渊在脚下形成。他松开手指，弹壳滑落，沉入无声的雪中。\n\n“我走了，就像你一样。我想，我或许从未真正存在过。无名的雪将淹没我，也会淹没你，拉塞尔达。”\n\n他站在那里，独自沉思良久。终于下定决心，转身向麦克默多站走去，明白无人会注意到他的缺席。\n\n“不会留下任何东西……” \n“……但这样也好。”"
 brazil_lacerda_world_tour.16.a: "既然摆脱了过去，他就别无选择，只能向前迈步。"
 brazil_lacerda_world_tour.17.t: "拉塞尔达在葡萄牙"
 brazil_lacerda_world_tour.17.desc: "“那是……天哪，真的是您，总统先生！”一个年轻人跑过街道，紧紧握住了卡洛斯·拉塞尔达的手。“我从没想过能在现实中见到您！”拉塞尔达片刻的错愕随即化为愉悦。他已经好几个月没有经历过这样的场面了，而且这还是在巴西以外的地方！“我叫埃米尼奥。能够见到您……实在是我的荣幸。是什么让您来到里斯本？您觉得这里怎么样？”“我有几场采访，还有一些会议。不过别担心，我有充足的时间跟您聊聊。”拉塞尔达温暖地笑着，“是啊，自上次来访之后，确实已经过了太久。说说看，您是怎么知道我的？您看报纸吗？”“其实……”年轻人眼神左右飘动，确认周围没有人站得太近后，他紧张地低声说道，“您算是我们FPLN的名人。”拉塞尔达的全身顿时僵住了。“谢谢您拯救了德尔加多先生。拉塞尔达只能呆呆地盯着埃米尼奥，简直不敢相信自己听到的一切。“告诉我，请务必诚实。”埃米尼奥努力维持着与拉塞尔达的目光接触，而拉塞尔达心中则不禁思索，这个年轻人是否携带了武器。“葡萄牙……您觉得我们在走向民主的道路上吗？”\n\n意识到自己并未处于危险中，同时从男孩的眼神中捕捉到一份熟悉的脆弱，拉塞尔达放松下来，认真地考虑了片刻，才缓缓说道：“我不知道。民主……是个脆弱的东西。很多年前，我大约和你一般年纪时，曾参与过一个共产主义的阴谋，想要推翻巴西的独裁者。”埃米尼奥扬起眉毛，而拉塞尔达忍不住笑了起来：“那是愚蠢至极的事情，我为此坐了好几年牢。最后，推翻那个混蛋的根本不是革命，而是军队，他们发动了政变，恢复了民主……不过！”拉塞尔达紧盯着埃米尼奥的眼睛，语气变得严厉：“这只是一种可能，因为每座城市有成千上万的人在游行，要求自由选举。葡萄牙完全可以成为一个民主国家，绝对可以！但首先，葡萄牙人必须更爱自由，而不是再惧怕佩雷拉。”拉塞尔达的表情变得柔和，他轻轻拍了拍埃米尼奥的肩膀。“如果其他年轻人都像你一样充满激情，那么葡萄牙的未来必然掌握在稳妥的双手中。”"
 brazil_lacerda_world_tour.17.a: "从一个革命者到另一个革命者。"
 brazil_lacerda_world_tour.18.t: "失乐园"
 brazil_lacerda_world_tour.18.desc: "卡洛斯·拉塞尔达骄傲地站在商业广场的一个临时讲台上。他的身后，成群的海鸟飞过奥古斯塔街凯旋门；他的旁边，太阳的光辉折射在广场中心的骑马雕像上。他的面前，正是一群满怀期待的葡萄牙市民。“早上好，里斯本！自由的感觉如何？”人群的欢呼声如潮水般响起。“多年来，你们为马德里辛劳；害怕反分裂局会无声无息地将你们人间蒸发。但你们从未放弃希望！你们站了起来，因为你们知道，自由是值得为之奋斗的！你们赶走了佛朗哥主义者，解放了整个葡萄牙……”他转身指向雕像，“……正如若泽国王曾驱逐波旁家族一样！”广场顿时沸腾，尖叫与欢呼声震耳欲聋。然而，就在拉塞尔达陶醉于人们的掌声中时，他突然意识到，眼前的里斯本并不如现实中的模样。他在做梦。尽管他无比渴望沉醉其中，一股电击般的刺痛却让他从梦中惊醒。\n\n回到现实后，拉塞尔达的迷茫与失落转变为深深的悲伤与苦涩的愤慨。商业广场确实曾经美丽无比，那还是他许多年前造访时的印象。但战争将它摧毁，如今只剩下一堆破碎的大理石。曾几何时，拉塞尔达对萨拉查怀有钦佩之情，但这段往事现在让他感到一阵阵恶心。是什么让萨拉查选择同意所谓的“伊比利亚联盟”？他真的相信这样能让葡萄牙更安全吗？难道他真以为小小的葡萄牙能够与西班牙平起平坐？\n\n拉塞尔达拉过毯子，翻身躺下，但脑海中挥之不去的记忆让他难以入睡。那是一幅多年前他在瓦加斯主义小报上看到的漫画，画中他被描绘成一个木偶，嘴里喊着“自由贸易”“OFN”“竞争”，而在他身后，山姆大叔的剪影若隐若现。尽管那幅漫画的构图粗陋，信息简单，却仍令他感到不适。一个荒唐的念头悄然浮现。也许是因为方才的梦，他一时无从摆脱这个念头，只能勉强让自己去琢磨它。可即便如此，这个念头还是让他彻夜难眠。"
 brazil_lacerda_world_tour.18.a: "我是巴西的萨拉查吗？"
 BRA_black_cat_white_cat: "黑猫白猫"
 BRA_black_cat_white_cat_desc: "拉塞尔达初任总统时，多数人认为发展主义时代已彻底终结。然而这种担忧并未成真——令国际经济界长舒一口气的是，实用主义最终占据了上风，自由市场原教旨主义并未取代古老的瓦加斯主义正统。有人揣测拉塞尔达正为此暗自恼火：巴西竟要继续遵循其宿敌奠定的经济架构。\n\n另一些人则认为他已不再执着——归根结底，正如一句话所言：“不管黑猫白猫，捉到老鼠就是好猫”。只要发展主义能持续为资本增殖提供助力，便算完成了历史使命。"
 brazil_lacerda_samba.2.tt: "£GFX_BRA_UDN_statism_texticon §Y经济国家主义§!已达到100%，将应用以下修正："
 brazil_lacerda_samba.2.tt2: "若£GFX_BRA_UDN_statism_texticon §Y经济国家主义§!达到0%，§Y猫§!捉老鼠将停止上演。"
 BRA_start_civil_war_tt: "§R拉塞尔达的任期给巴西与巴西人民留下了一道伤痕……§!"
 BRA_imperial_lacerda_vengeance: "复仇"
 BRA_imperial_lacerda_vengeance_desc: "卡洛斯·马里盖拉——你这卑鄙的刺客！巴西人民的叛徒！布尔什维克渣滓！我当初就该用铁腕碾碎你们这帮害虫！若非妇人之仁，马加良斯怎会惨遭毒手！\n\n你这背信弃义的杂种！绑架我的挚友、我的继承人、这该死的行政权的继承者！你和你那些堕落的爪牙，竟敢在圣诞归家途中掳走他，用酷刑摧残他，最后将他射杀在血泊中！\n\n此仇必报，我以圣灵之名起誓：你和所有同谋者……将偿还每一滴血债。"
 brazil_lacerda_imp.36.t: "机灵时髦客·其一"
 brazil_lacerda_imp.36.desc: "直升机旋翼在头顶轰鸣，街道上烈焰与尖叫声此起彼伏。但在这座科帕卡巴纳公寓楼的十层，儒塞利诺·库比契克和他的情妇依然蜷缩在沙发上。黑胶唱机流淌着波萨诺瓦，吉他和钢琴的柔板在混乱中筑起屏障。\n\n他爽约了尼泰罗伊的社交酒会，忙着给通讯录上的每个号码致电——要搞清楚伞降搜救队为何突然发难。社民党语焉不详，社进党保持缄默，工党的人恐怕已戴上镣铐或被塞进裹尸袋。全民盟无人应答，唯有个接线员替上司回电：“全乱套了”。到七点钟，所有线路都断了。收音机说这是紧急措施。\n\n今夜注定不平静，库比契克遂躲进科帕卡巴纳的庇护所。他搂着佩德罗索的香肩，尽量不去想正妻此刻身在何处。安宁持续了一小时，直到有人轻拍他肩膀。司机兼心腹热拉尔多·里贝罗朝厨房偏了偏头。\n\n“我明天一早就离开，”他说，“这点食物不够三个人吃。您继续留在这儿——”\n\n“不，我和你一起走。”库比契克的手按在他肩头，“不能让你孤身犯险。再说我要去确认……”他顿了顿，回望卧室方向，“得保证妻儿平安。等这一切结束，我——”\n\n话音戛然而止。库比契克与里贝罗的余光同时捕捉到异动。透过卧室门框，他们看见闯入者正翻检首饰盒。那人身穿伞降搜救队的迷彩服与防弹背心。"
 brazil_lacerda_imp.36.a: "我该如何活下去，我该如何活下去……"
 brazil_lacerda_imp.74.t: "机灵时髦客·其二"
 brazil_lacerda_imp.74.desc: "儒塞利诺·库比契克眨了眨眼。伞降搜救队员的动作凝固了。两人目光相撞，都从对方眼中看到了始料未及的惊恐。在恐惧编织的丝线上，这一秒钟被无限拉长。\n\n下一瞬库比契克就栽倒在地。伞降搜救队员的枪口扬起，里贝罗将两人扑倒的瞬间，子弹已在地毯上炸开朵朵絮云。客厅传来尖叫——佩德罗索被另一名伞降搜救队员擒住。库比契克腾身而起撞向那人，在翻滚中嘶吼着让情人快逃。记忆开始跳帧，纷乱画面在瞳孔震颤：窗外悬停的直升机映着枪火，走廊里佝身疾奔的库比契克，里贝罗以手枪掩护着撤退路线。\n\n三人冲向电梯。佩德罗索颤抖的指尖按下地下室按钮，流弹在五楼走廊炸响。电梯门奇迹般立即开启，库比契克拉过佩德罗索闪入厢内。里贝罗打光最后几发子弹退入轿厢，铁门合拢的瞬间，安全通道传来破门声。电梯在五楼诡异地停顿，宝贵的几秒钟被白白浪费，但终究在追兵抵达前继续下行。\n\n地下车库里，库比契克的福特轿车奇迹般未被洗劫。库比契克拽开副驾车门，刚把佩德罗索塞进座椅，里贝罗已找到钥匙。车库大门洞开，轮胎摩擦地面的焦痕昭示着前人的仓皇。引擎轰鸣的刹那，里贝罗将油门踩到底。\n\n斜坡尽头的光明近在咫尺，但仓促间他们忽略了一个致命细节。另一辆汽车从侧面撞来的瞬间，库比契克的世界陷入漆黑。"
 brazil_lacerda_imp.74.a: "……若没有你，若没有你……"
 brazil_lacerda_imp.75.t: "机灵时髦客·其三"
 brazil_lacerda_imp.75.desc: "库比契克的身体折成诡异的弧度，上半身悬挂在车门外。他用尽力气支起残躯，眼前的景象令瞳孔剧震：里贝罗的头颅软垂，胸膛与方向盘融为一体；佩德罗索的脖颈盛开着玻璃的霜花。耳鸣如潮水般涨落，左臂失去知觉，鲜血在西装褶皱里蜿蜒成河。\n\n求生本能接管了躯体。他踉跄着挣脱变形的车门，在柏油路上拖出血色足迹。世界以五秒为间隔闪烁，记忆胶片不断跳帧。蹒跚的逃亡很快终结于暗巷，当后背撞上垃圾袋堆时，锋利的纸板边缘楔入肋间伤口。\n\n喘息在潮湿的砖墙间回荡，视线开始晕染墨色。暗影里钻出个流浪儿——或许是躲避军警的漏网之鱼。男孩认出了这张时常出现在海报上的面容，踟蹰着靠近。库比契克察觉自己正嗫嚅着某个名字，在男孩俯身的瞬间突然攥住他手腕。\n\n“拉塞尔达……”嘶哑的气声在喉头滚动，“拉塞尔达……”怒睁的双目撑裂眼眶，空洞的眼眶仿佛从未存在过。男孩挣脱桎梏逃进黑暗时，军靴声已在巷口响起。\n\n两名伞降搜救队员闲庭信步般逼近。其中一人拔出手枪：“你好啊，州长先生。知道吗，上届大选我还投过您的票呢。”冰凉的枪管贴上太阳穴，“这世道真是……荒诞得有趣。”\n\n库比契克的瞳孔映着枪口寒光，干裂的嘴唇翕动着，说不出话来。"
 brazil_lacerda_imp.75.a: "……若没有你的陪伴？"
