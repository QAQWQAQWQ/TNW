 CA_debug_decisions_category_desc: "嘿，如果你读到了这段文字，我生活在亚的斯亚贝巴，这里真不错。天气温和，人更温和。我希望有一天你也能体验这份感受，不论你是谁。§RVolkorel诚挚敬上:)§!\n\n§RPacifica万岁。§!\n\n我是Janey，中亚内容非常厉害，你应该赞扬我\n\nKrone到此一游，真不懂大家咋这么乐观呢\n\n我是Tarepa，记住，我是真猛男"
