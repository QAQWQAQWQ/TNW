 GER_Increase_German_Support:0 "加强德国支援"
 GER_Increase_German_Support_desc: "没有什么能够阻挡我们实现自己的目标——我们动用了一切可能的手段，确保忠于德国的代表将会增多。"
 GER_Support_Agent_Operations:0 "特工支援行动"
 GER_Support_Agent_Operations_desc: "[getIntelAgencyShort]是当今世界上最杰出的情报机构，现在轮到它上场了。不管是发动炸弹袭击抑或是密谋暗杀，我们将显著提高大会中的紧张度。"
 GER_Brute_Force_Delegates: "胁迫代表"
 GER_Brute_Force_Delegates_desc: "谎言、勒索、恐吓，没有人能比我们的情报人员更懂得如何使用这些手段。他们会继续发挥他们在这方面的专长，在代表团中为我们争取更多的支持。"
 GER_increase_tension: "挑拨紧张关系"
 GER_increase_tension_desc: "尽管这是一项艰巨的任务，但我们必须设法保持德国在中亚地区的主导权。"
 GER_send_advisors_to_the_legion: "向军团派遣顾问"
 GER_send_advisors_to_the_legion_desc: "这不是我们第一次向同盟国家派出来自国防军的顾问，也绝不会是最后一次。我们将帮助突厥斯坦军团建立起其应有的，足以自卫的军事力量。"
 GER_attack_samarqand: "命令突厥斯坦军团攻占撒马尔罕"
 GER_attack_samarqand_desc: "撒马尔罕地处要冲，必须占领此地。我们会“说服”突厥斯坦军团出手相助解决这一问题。这将大幅提高紧张度。"
 GER_attack_ishkoshim: "命令突厥斯坦军团攻占伊什科希姆"
 GER_attack_ishkoshim_desc: "伊什科希姆地处要冲，必须占领此地。我们会“说服”突厥斯坦军团出手相助解决这一问题。这将大幅提高紧张度。"
 GER_attack_tashkent: "命令突厥斯坦军团攻占塔什干"
 GER_attack_tashkent_desc: "塔什干地处要冲，必须占领此地。我们会“说服”突厥斯坦军团出手相助解决这一问题。这将大幅提高紧张度。"
 USA_Increase_Support: "加强土耳其支援"
 USA_Increase_Support_desc: "凭借政治交易、增派代表、许诺权力等手段，我们帮助土耳其人确立了他们在突厥人大会中的主导地位，将有更多代表站在我们一边。"
 USA_lower_tensions: "保持稳定"
 USA_lower_tensions_desc: "我们得赶在局面彻底失控之前发表一些演讲并给出我们的承诺，为眼下日益紧张的形势降温。"
 USA_increase_suspicion: "激发对日本的怀疑"
 USA_increase_suspicion_desc: "暗中交易、私下允诺、幕后操作，我们将利用这些手段制造混乱，提高大会各方对日本代表的怀疑度。"
 USA_propose_an_alliance_of_central_asian_solidarity: "提议建立中亚团结联盟"
 USA_propose_an_alliance_of_central_asian_solidarity_desc: "土耳其已经摆脱了德国的控制，我们完全有希望在中亚复刻他们在欧洲的成功。我们提议由与会各方共同建立一个联盟，这要求支持土耳其的代表超过半数。"
 USA_send_military_advisors_TK: "派遣军事顾问"
 USA_send_military_advisors_TK_desc: "突厥斯坦地区的紧张局势已逼近临界点。我们必须向那里派出军事顾问，以缓和当地的紧张局势。"
 JAP_delay_the_conference: "延迟大会"
 JAP_delay_the_conference_desc: "情况没有如我们预期般发展。为了扭转这一局面，我们需要说服那些不支持结盟的代表采取实际行动拖延大会的进程。这将极大幅度提高怀疑度。"
 JAP_bribe_officials: "贿赂官员"
 JAP_bribe_officials_desc: "我们可以通过挑拨谈判代表和政府官员之间的关系使他们互相猜忌，减少对我们特工的猜疑。这只会对我们有利，并帮助我们达成目的。"
 JAP_remove_foreign_influence: "消除境外影响"
 JAP_remove_foreign_influence_desc: "我们拥有最杰出的情报机构。在它的帮助下，不管是通过金钱贿赂，还是威胁与绑架，我们将争取到更多参会代表的支持。同时他们也会非常清楚地知道，如果不同我们合作将会有怎样的下场。"
 JAP_blow_it_up: "在大会现场引爆炸弹"
 JAP_blow_it_up_desc: "是时候利剑出鞘，实施我们的计划了。"
