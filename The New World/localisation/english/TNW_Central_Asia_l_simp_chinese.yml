 TNO_CA_Conference_medium_tension_tt: "各国间的互不信任阻碍了统一对话。"
 TNO_CA_Conference_highmedium_tension_tt: "关系日渐紧张，善意蒸发殆尽，各国对别国仍然心怀恶意。"
 TNO_CA_Conference_violent_tension_tt: "交流蜕化为咆哮，谈判恶化为威胁。若再不及时干涉，突厥斯坦之梦将就此死去。"
