 TNO_CA_Conference_delegate_overview_tt: "有[?TRK.TK_delegates^1]名代表支持§V土耳其§!\n\n有[?TRK.TK_delegates^2]名代表支持§q团结协定§!\n\n有[?TRK.TK_delegates^0]名代表支持§C仍未决定立场§!"
 TNO_CA_Conference_delegate_overview_tt_delayed: "分裂的中亚诸国精心挑选的一千名代表被派往土库曼斯坦，他们将在那里讨论大突厥斯坦的未来规划和各种可能性。这将是一个名副其实的唇枪舌剑的战场，是对我们外交人员最艰巨的考验，他们肩负着为我们在未来的统一国家中谋求理想局面的重任。"
 TNO_CA_Conference_suspicion_overview_tt: "共荣圈的§P怀疑度§!"
 TNO_CA_Conference_suspicion_overview_tt_delayed: "就在来自土耳其和团结协定的代表们为了各自阵营的利益而四处活动，竭力在这一千名代表中争取更多支持的时候，共荣圈的代表们却意外地显得毫不在意，接连缺席了数场谈判和会议。\n事出反常必有妖，日本人非常可疑。谨慎起见，他们将不再被允许参加这次大会。"
 TNO_CA_Conference_tension_overview_tt: "各国间的§R紧张度§!"
 TNO_CA_Conference_tension_overview_delayed: "想想这片平原上的无数人，他们将彼此携手并肩、永无争执——简直是异想天开。在这一历史性时刻之下，数十种斗争冲突与社会学上的不和正在蔓延，无论是意识形态还是种族问题，都在酝酿之中。\n而若紧张度过度激化，联盟势必凋零，且或将再无重启之日。"
