 CA_Bormann.1.t: "中亚动向"
 CA_Bormann.1.desc: "但凡阅读这份报告的时间稍微迟了点，它可能就被各种记有“重要事件”的其他文件盖住了：这是份关于伊朗-土库曼边境地区动向的报告。然而，或许是因为命运之神的怪癖，这份报告现已被分析，而分析的成果比预期结果重要得多；尽管，从大局看来，仍然微不足道。\n\n在报告中，一位驻扎在伊朗的特工收集了一些信息，昭示着土库曼斯坦边境地区上所发现的一群武装团伙的崛起。那些部落士兵持有现代化的武器，以组织良好的面貌出现，远强于过去。偶尔，能听到关于当地小型冲突的消息；但由于缺乏证人，这些消息无法得到证实。\n\n报告预测称，当地极有可能发生冲突，且随着时间流逝越来越可能发生。\n\n一直以来，我们对这一地区的态度完全一向是居高临下的不闻不问；不过，阿尔弗雷德·艾辛格军官仍被派遣往当地以监控局势。正如我们所愿，他很快就适应了自己的新角色：一个相当平静无事的小人物。"
 CA_Bormann.1.a: "谁在乎啊？"
 CA_Bormann.2.t: "死而复生"
 CA_Bormann.2.desc: "几个小时前，侦察总局中亚部的阿尔弗雷德·艾辛格军官放下了送来的紧急报告，其含义不可忽视。根据伊朗人最近的发现，的确发生了更大的事情。然而，还有一个远比这些更重要的启示：\n\n突厥斯坦军团，存续至今。\n\n起初，阿尔弗雷德都想不起那是什么；直到他翻阅了一批几十年前的故纸堆后，他才反应过来：他们是地区性的反苏合作者。在当时，他们的作用说得好听点也只是好坏参半，而且他们最后被击败了。许多人猜想，他们一败涂地后便解散了。然而，事实证明情况并非如此：他们不仅存续了下来，而且至今仍由韦利·卡尤姆领导。\n\n军官很好奇，军团的创始人在这些年是怎么活下来的？无论答案如何，这确是德国介入中亚的一条潜在途径——只要那些土库曼斯坦的旧合作者愿意接受我们的支持便可。而且，看起来他们的确需要所有可能的援助。\n\n根据该报告，即使以最宽容的标准来看，军团的现状都极为糟糕。与正规武装力量相比，他们更像是土匪。他们装备落后，纪律涣散，猎杀孤立无援的部落和旅人，受内斗与糟糕的领导能力所困，不像是一支能占领某处小镇的军队，更别说报告表明他们想要袭击的地方：撒马尔罕，乌兹别克斯坦的主要城市。\n\n他们有足够理由直接调查此事。是时候跟一些老盟友重叙旧情了——看看军团对他们是否还有用处。"
 CA_Bormann.2.a: "一日合作者，终身合作者。"
 CA_Bormann.3.t: "军团匪王"
 CA_Bormann.3.desc: "侦察总局特工斯特凡感到一阵恶心。\n\n接到与韦利·卡尤姆及残存突厥斯坦军团接洽的任务时，他早料到不会是什么美差。档案里那些不堪的记录，在亲眼目睹营地实况后更显触目惊心——这群乌合之众能把帐篷支起来都算奇迹。恶臭与汗酸味裹挟的空气中，他强压着作呕的冲动执行国家任务。\n\n而直面韦利本尊，堪称精神污染。\n\n醉眼惺忪的军阀以夸张热情迎接德国特使，趔趄着带他巡视营地：东倒西歪的酗酒士兵，针头散落的吸毒角落，连所谓“统帅行辕”也不过是满地油污的帐篷，此刻他们正坐在唯一还算完整的餐桌旁。\n\n“能与德国重修旧好实乃幸事，”韦利咀嚼着烤肉含糊道，“我敢担保，军团愿做德国在中亚最忠实的……”他打了个酒嗝，“盟友。”\n\n斯特凡攥紧茶杯。眼前这酒糟鼻男人连醉汉都统御不了，遑论军队。更不堪的是，当某个衣不蔽体的女人——韦利的众多妻妾之一——扭着腰肢添水时，他瞥见帐篷深处更多类似装束的女性身影。\n\n“所以您意下如何？”韦利挂着涎水的笑容逼近，混着羊肉与伏特加的气息喷在德国人脸上，“德国与军团的盟约，今日可否重铸？”"
 CA_Bormann.3.a: "“我会向上级汇报，保持联络。”"
 CA_Bormann.4.t: "决定军团的道路"
 CA_Bormann.4.desc: "鲍曼抿紧嘴唇审阅着突厥斯坦军团近况报告，白纸在指尖沙沙作响。\n\n这份来自中亚荒原的档案，字里行间渗透着令人作呕的颓靡气息。\n\n韦利·卡尤姆的形象在情报官笔下栩栩如生——酗酒成性、骄奢淫逸、庸碌无为的土匪头子，仅凭创始者身份苟居统帅之位。当读到特使描述其接见场景时，鲍曼的眉峰几乎拧成死结。如此草包竟能执掌军团十余年，无怪乎当年国家在中亚的布局功亏一篑。纸张在掌中皱缩，他仿佛嗅到帐篷里混杂着酒精与体臭的浊气。\n\n“简直荒唐。”他低声咒骂着，心情愈发阴郁。国家重启中亚战略的曙光竟要寄托在这等货色身上？报告翻动间，特工附注的密语引起他的注意——原来嗅觉敏锐的情报官早已暗中物色替代者。\n\n名为“瞎子”的雇佣兵跃入眼帘。浩罕酋长后裔，矢志反俄的雇佣兵首领，能力尚可却难驯如狼。鲍曼的指尖在橡木桌敲出节拍，野心家虽如双刃剑，但恰是撬动权力更迭的绝佳支点。\n\n白纸最后几行墨迹犹新：拜米尔扎·海伊特，军团元老，深恨韦利，更令人惊异的是个狂热的希特勒崇拜者。鲍曼的嘴角终于松动，虽然这两个选项都远非完美，但在中亚这片权力荒漠里，能寻得几株带刺的毒草已属不易。"
 CA_Bormann.4.a: "韦利·卡尤姆。尽管并非理想选择，但贸然撤换的后果难以预料。"
 CA_Bormann.4.b: "“瞎子”。操纵此人轻而易举。"
 CA_Bormann.4.c: "拜米尔扎·海伊特。他会接受我们的价码。"
 CA_Bormann.5.t: "“瞎子”的最后一搏"
 CA_Bormann.5.desc: "“瞎子”扶正墨镜，打量着部队驻扎的山谷。这片开阔地带令他隐隐不安——若遭遇突袭，机动性强或人数占优的敌军很容易完成合围。风险始终如影随形。\n\n此次深入敌后有两个目的：侦察乌兹别克斯坦进攻路线，同时避开某些“意外”。醉鬼韦利虽然昏聩，但对政敌的嗅觉依然敏锐。当越来越多的士兵开始越过指挥官直接向“瞎子”请示时，危机便已埋下伏笔。\n\n随行的士兵虽少，却是值得托付的兄弟，这在当下已是稀缺品。他正盘算着下一步计划——\n\n枪声撕裂寂静。营地外围的哨兵应声倒地。更多枪响汇成死亡交响曲，“瞎子”抄起步枪时仍在惊疑：这支精锐小队怎会暴露行踪？\n\n交火中他很快意识到大势已去。匆匆一瞥间，来袭者虽身着乌兹别克军装，但精准的枪法与战术协同远非乌军水准。枪林弹雨间，他捕捉到敌军的呼喊声，寒意瞬间爬上脊梁：\n\n那竟是德语？\n\n狙击步枪的子弹终结了所有思绪。雇佣兵的躯体颓然倒地，步枪从指间滑落，墨镜跌入尘土，镜片上最后的倒影是硝烟弥漫的天空。"
 CA_Bormann.5.a: "他的部下亦难逃厄运。"
 CA_Bormann.6.t: "抽支烟，歇一会"
 CA_Bormann.6.desc: "拜米尔扎·海伊特难得展露欢颜。暮色四合时分，他与军团新来的志愿者攀谈——这个数日前才投效的德国青年，在晚风中显得格外健谈。\n\n这位突厥军官心知肚明：日耳曼尼亚方面既已获悉军团幸存，必会派遣特使联络韦利。而德国对那个酒鬼首领的不满，或许正酝酿着……权力更迭。无论眼前青年是真心投效还是另有图谋，与其交好总归有益无害。\n\n篝火跃动间，拜米尔扎刻意强调对希特勒与民族社会主义的景仰，又不失时机地流露出对韦利的不满。德国青年始终微笑颔首，间或讲述二十年来故国风云。当提及元首逝世时，拜米尔扎适时流露哀戚，转而盛赞新继任者的雄才大略。\n\n“抽烟吗？”青年突然在谈话间隙问道。\n\n拜米尔扎挑眉：“当然。”\n\n青年咧嘴一笑，掏出一包香烟：“正宗日耳曼尼亚货，尝尝？”烟卷递来的刹那，拜米尔扎仿佛看见权力之路在硝烟中延展。他深吸一口，品味着异国烟草的醇香……这味道着实独特……\n\n咽喉突如其来的灼痛打断遐思。拜米尔扎惊恐地扼住脖子，视野中的德国青年褪去温文假面，冷眼欣赏着他扭曲的面容。当最后一丝空气挤出肺叶，突厥枭雄瘫倒在篝火旁。"
 CA_Bormann.6.a: "特工随后从容离去。"
 CA_Bormann.7.t: "小刀、钞票、崭新人生"
 CA_Bormann.7.desc: "月光如银刃刺破云层，德国特工蛰伏在突厥斯坦军团主营地两公里外的沙丘背阴处。怀表指针滑过第三个钟点，他开始担忧是否行动败露——尽管那些醉醺醺的哨兵形同虚设，但夜风中的不确定性始终如影随形。\n\n沙砾摩擦声由远及近，他扣住手枪的拇指微微发白。来者裹着不合身的军团制服，兜帽下散落的金发在月色中泛着冷光。\n\n这拙劣的伪装或许能骗过醉鬼，但明眼人一望便知是女子。可眼下刺杀韦利的方案屈指可数，唯一能近身的只有他那些妻妾——幸好其中某位早存弑夫之心，只要价码合适。\n\n“钱呢？”女人掀起面罩，淤青的眼角在月光下泛紫。\n\n特工将铝制手提箱横置于沙地，弹簧锁弹开的脆响惊起夜枭。成沓的马克在月华下泛着青灰光泽，足够买断她未来二十年的自由。“如约奉上。”\n\n“还有房子——”\n\n“卡尔希的宅邸已完成产权登记。”特工抢先答道，将匕首与钱箱同时推过，“事成之后，专车送您远走高飞。”他破例预付全款，因为这女人眸中的恨意比任何契约更可靠——早在德国开出价码前，她已无数次幻想割开丈夫的喉咙。\n\n女人利落颔首。“他活不过破晓。”"
 CA_Bormann.7.a: "“我们会等着的。”"
 CA_Bormann.8.t: "为荣耀冲锋，为胜利前进"
 CA_Bormann.8.desc: "拂晓时分，进攻正式开始。\n\n突厥斯坦军团正以征服者的姿态推进。这支昔日形同散匪的乌合之众，如今已蜕变为足以颠覆国家的战争机器——褴褛布衣换成统一军装，老旧载具升级为武装卡车，锈蚀枪械更替为日耳曼尼亚运抵的精良装备。\n\n涅槃重生的军团如黑潮涌动。\n\n他们踏碎乌兹别克斯坦的疆界，不带半分犹疑与仁慈。为荣耀而战，为尊严而战，为复仇而战。\n\n但所有征伐的终点，终究只为镌刻胜利之名。\n\n第一声枪响炸裂晨雾，混杂着遭遇突袭的守军惊呼。猝不及防的慌乱转瞬即逝，首战即定乾坤。军团士兵在军官与随军德国顾问的号令下展开战术队形，枪炮声渐成有序韵律。\n\n侦察总局狙击手抢占制高点，德国志愿者穿梭战线督战。某处山脊上，一名德国军事顾问透过望远镜凝视战场。为打造这支钢铁洪流，政府倾注了无数人力财力。质疑声始终如影随形，认为这是对资源的无谓挥霍。\n\n此刻，当军团战吼响彻乌兹别克平原，他期盼这场豪赌终见回报。因为所有人都清楚：若此役失败，挺进中亚的通道将永远闭合。"
 CA_Bormann.8.a: "成败在此一举。"
 CA_Bormann.9.t: "熟识的魔鬼"
 CA_Bormann.9.desc: "“瞎子”无声审视着长桌对面的众人。墨镜是绝佳的屏障——遮住了他病疤纵横的双眼。德国人厌恶变数，他能感受到这种遮掩令他们不适，但却没有人敢叫他摘下墨镜，或许他们只是不愿施压过甚。\n\n毕竟，他刚刚征服乌兹别克斯坦，命运轮回谁人可料。但他渴求更多，德国人亦然。正因如此，此刻这间屋内才挤满侦察总局特工、如坐针毡的官僚，乃至鲍曼元首的特使。纵是变数，德国还是需要他；不幸的是，他也需要德国。\n\n“日耳曼尼亚再次向您致贺，‘瞎子’，”为首的官员清嗓开口，“这场胜利可真是意想不到，您说呢？”\n\n他点了点头，却缄默不语。他非愚者，深谙德国人的行事法则，亦知自己不过是枚棋子，虚妄的褒奖毫无意义。“我们都清楚，这并非终局。”\n\n侦察总局特工闻言挑眉，接过话头：“中亚可是角力场，那些怀抱野心的人，是不会容忍您和军团继续存在的，我们必须将目光投向更广阔的疆域。当然，是携手并进，在中亚，您唯有一条路可走。”\n\n“携手”，只是暂时的安排罢了。“瞎子”心知肚明：一旦他成功掌控中亚，德国必会物色言听计从之徒取而代之。他绝非提线木偶，如此便必有被暗箭所伤之虞。但时势所迫，他只能虚与委蛇，独眼窥伺暗潮涌动。"
 CA_Bormann.9.a: "“齐心协力，统一中亚指日可待。”"
 CA_Bormann.10.t: "散播狂热"
 CA_Bormann.10.desc: "尘埃落定。\n\n拜米尔扎·海伊特伫立在月光浸染的城墙上，任由胜利的余韵在胸腔震荡。乌兹别克斯坦已尽在军团掌控，那个酒鬼韦利终其一生都未能企及的伟业，此刻正在他手中绽放。庆功宴的篝火在营地绵延，德国盟友与突厥勇士的欢歌穿透夜空，但他此刻更需要冷月般的清醒。\n\n中亚的未来版图在他眼前徐徐展开——这里将矗立起民族社会主义照耀亚洲的灯塔，辉映整个世界。\n\n正是这份宏愿，促使他邀约两位随军多时的侦察总局特工月下漫步。清辉洒在撒马尔罕古城墙上，拜米尔扎解开军装领口：“请告诉我一切。”与世隔绝的岁月让他对日耳曼尼亚的风云变幻几近无知，而即将执掌国运的统治者，必须洞悉寰宇棋局。\n\n两名特工在驼铃声中回溯岁月：党卫队政变的血色黎明，西俄战争的钢铁洪流，内战硝烟里重生的日耳曼尼亚……当听闻希特勒的死讯，拜米尔扎指节捏得发白，直到确认元首在睡梦中安详离世，紧绷的肩头才稍稍松弛。所幸，鲍曼的新秩序让火炬得以传承。\n\n夜风卷起军氅，拜米尔扎面向西方抬起右臂：“在最晦暗的时刻，德意志仍向我们伸出援手。我以突厥之鹰的名义起誓——民族社会主义的火种，必将燃遍整个突厥斯坦。”\n\n为首的侦察总局特工笑着点点头："
 CA_Bormann.10.a: "“你的忠心元首都看在眼里，未来定有重赏。”"
 CA_Bormann.11.t: "最后一次感谢"
 CA_Bormann.11.desc: "“兄弟们，举杯痛饮！”韦利擎着酒盏纵声咆哮，“庆贺这场属于军团的胜利！如今谁敢与我军团争锋！”\n\n醉醺醺的欢呼声震得帐篷簌簌作响。“瞎子”虽放纵畅饮，却不得不承认自己错看了此人——乌兹别克斯坦的胜利固然仰赖德军援助，但韦利终究是名义上的统帅。当庆功宴邀约传来时，他决定暂且隐忍，权当忍受一场醉酒胡言。\n\n“我从不讳言前路艰险，”韦利声线陡然低沉如绷紧的弓弦，“亦知有人质疑本帅抉择。”“瞎子”后颈汗毛倒竖。但见韦利仰颈饮尽杯中残酒：“而今异见皆成过往——军团上下当同心勠力！”\n\n冷汗瞬间浸透内衫。“瞎子”环视帐内：拜米尔扎所部、自己的亲信、高阶军官……所有曾质疑韦利之人尽数在列。眼角余光瞥见武装士兵悄然封住出口，他霍然起身——\n\n韦利笑意森然：“诸君劳苦功高。”话音未落，枪火已洞穿拜米尔扎胸膛。\n\n屠杀在盛宴高潮时猝然降临。醉卧席间的军官尚未起身便被割喉，喷涌的血雾浸透烤全羊的金黄脆皮。“瞎子”刚摸到枪柄，喉间已掠过寒芒。当鲜血渗入泥土的刹那，他竭力抬头仰望。"
 CA_Bormann.11.a: "最后映入眼帘的是韦利一脸得意的神情。"
 CA_Bormann.12.t: "“最后一次”酒吧"
 CA_Bormann.12.desc: "韦利卡尤姆端起盛满了伏特加的短杯，一个仰脖将杯中酒全部灌进嘴里。但是杯子装得太满，很多酒直接洒在了衣服上，这反倒让他的心情更加糟糕。于是他决定再浅浅地倒一杯，喝完之后便让人把一直等在门外的德国特工们请进来谈话。可德国人前脚才踏进房间，韦利就后悔了。喝完最后一杯之后真应该再多等一会，最好等肚子里的伏特加发挥作用了再让他们进来，韦利如此想到。\n\n“卡尤姆先生，我们这次来，主要是为了祝贺您取得的成功。希望在德国与军团未来的合作中，您能够在这次的基础上，以更加积极主动的姿态和更高的热情对待我们共同的伟大事业。实不相瞒，您并不是我们在军团内部的唯一联系人，这绝非是对您本人有任何意见，只是为了确保我们在军团当中能够拥有更加广泛的影响力，还请您理解。”\n\n“没事，我明白，我全都明白。我知道现在无论说什么都已经晚了。白费功夫，全都是白费功夫。”韦利其实能猜得到在德国人的合作名单上，第一个肯定不是自己，第二个很可能也不是，但当对方亲口承认这一点的时候，他还是没法强装镇定。一瞬间，漆黑沉重的绝望感笼罩在韦利心头，再加上一点酒精的作用，他竟然在德国人面前小声啜泣起来。韦利明白自己只有依靠德国人这一条路可走，必须用尽一切手段向德国人证明自己还有被利用的价值，这样才能勉强争取一条活路。不过除了德国人以外，他还有些自尊，想要向自己证明自己不是个一事无成的废物。\n\n“好了，统一不是靠哭出来的，我们要在最短时间内见到你的实际行动。这次就看你的了。”\n\n特工同韦利随便握了握手，接着一言不发地离开了。片刻之后，韦利感觉到一阵虚脱，头向后仰着瘫倒在了椅子上，两只眼睛瞪得大大的，盯着天花板一动不动。\n\n最后，他又给自己倒了一杯伏特加。"
 CA_Bormann.12.a: "暂且记下，戴罪立功"
 CA_Bormann.13.t: "惨败！"
 CA_Bormann.13.desc: "特工斯特凡收到了军团进攻失利的消息。他今天的心情本来就不是很好，前线传来的消息直接点燃了他的怒火，是时候该找那个无能的家伙算算总账了。斯特凡举着枪，一脚踢开了那个自封的军团领导人的房门，甚至连手指都已经死死地扣在了扳机上。\n\n“[UTL.GetLeader]，你脑袋里装的是浆糊吗？这次的行动全让你给毁了！我今天要好好听你解释解释这到底是怎么回事，你要是说不出个一二三来，就别怪枪里的子弹不长眼睛。”\n\n斯特凡对面的男人显然已经被吓破了胆，只能苦苦哀求斯特凡放自己一马，像赌徒发毒誓保证自己再也不上赌桌一样地向斯特凡保证下一次行动肯定能成功，还说什么这次损失的人员和武器都不算多，很快就能重整旗鼓发动下一轮进攻。但斯特凡从来不是那种以慈悲为怀的人，尤其是对于面前这个已经辜负过太多次他本人和他背后代表的德意志国的信任的家伙，更没必要手下留情。\n\n斯特凡举起手枪瞄准目标，手指已经压下了一半的扳机。枪口下的那个男人，离死神只剩下另一半扳机按下需要的距离。"
 CA_Bormann.13.a: "我们给过你机会了。"
 CA_Bormann.13.b: "要是下一次行动还不成功，有什么后果，你自己心里清楚。"
 CA_Bormann.14.t: "绝不轻饶"
 CA_Bormann.14.desc: "“我们给过你机会了。”\n\n这是[UTL.GetLeader]生前听到的最后一句话。特工斯特凡压下扳机，子弹正中眉心，取走了他的性命。这一切发生得非常迅速，从斯特凡冲进办公室开始算起，到这时也不过几分钟时间。\n\n斯特凡立刻离开了房间，并试图在最短时间内理清头绪。目前可以确定的一点是，一旦消息传开，军团将立刻变得群龙无首，陷入一片混乱之中。在进攻受挫和失去领导人的双重打击下，军团士兵们的士气极度低落，而且他们的武器装备情况也不会好到哪里去。\n\n眼下最需要的，是一个能临危受命，带领军团走出绝境的下一任军团领导。希望房间里那具已经冷掉的尸体能让这位新的继任者深刻理解德国人对他的期望。"
 CA_Bormann.14.a: "那是一顶由荆棘编成的王冠。"
 CA_Bormann.15.t: "最后一丝喘息的机会"
 CA_Bormann.15.desc: "“要是下一次行动还不成功，有什么后果，你自己心里清楚。”\n\n[UTL.GetName]本以为自己这条命今天肯定是要交代在斯特凡手里了，突然听到对方打算再给自己一次机会，反倒一下愣在了那里。直到斯特凡不再拿枪指着他，他才终于意识到自己可以不用死了。\n\n“特工先生，您的恩情我没齿难忘。我一定不会让您失望的，下一次行动一定能成功。”\n\n“说得好像你还有再失败一次的机会一样……你已经没有退路了。”特工斯特凡终于冷静了下来，语气没有刚才那么激动了。他把枪收进枪套，转身穿过那扇刚刚被他踹开的大门离开了房间。\n\n[UTL.GetName]送走了斯特凡，赶紧摇摇晃晃地从地上爬起来，开始准备组织军团下一步的行动。尽管他在斯特凡面前信誓旦旦地立了军令状，但他也明白接下来的战斗可一点都不简单。大量军团部队在这次失败的行动中被击溃，幸存下来的士兵则士气极度低迷。把军团这艘被困在风暴里快要散架的航船拉回到正确的航线上，将是一件非常艰巨但又是当务之急必须完成的工作。"
 CA_Bormann.15.a: "这是仅有的仁慈了。"
 CA_Bormann.16.t: "建立立足点"
 CA_Bormann.16.desc: "阿尔弗雷德·艾兴格将报告搁在办公桌上。自同突厥斯坦军团合作行动以来，这几个月经手的文件不计其数，但这份报告堪称重要里程碑。\n\n乌兹别克斯坦，已尽在军团掌控。\n\n他不禁舒了一口气。若这番心血付诸东流，真不知该如何收场。坦白讲，以军团此前的散漫积习，多少个深夜他都因担心功亏一篑而辗转难眠。所幸德意志同胞的谋略终令军团以及祖国占据上风。\n\n元首一定会感到满意。\n\n通往中亚的门户就此稳固，德国与军团的纽带亦将牢不可破。但艾兴格深知，这不过是漫长棋局的第一步。随着中亚倒向德国势力范围，日耳曼尼亚的大人物们正摩拳擦掌——很快，就会有大批物资与钱财注入这个项目。\n\n他们确实需要这些。\n\n此刻，其他中亚国家及其背后的列强正虎视眈眈。据线报，一场区域峰会即将召开，或将决定中亚是走向联合还是战火重燃。军团必然与会，那将是对其影响力的真正考验。\n\n若局势终须诉诸兵戈，德国也必将让这支新锐之师枕戈待旦。"
 CA_Bormann.16.a: "我们会奉陪到底。"
 CA_US.1.t: "中情局来电"
 CA_US.1.desc: "发：(-姓名被抹除-)德里\n致：中情局局长、国务卿\n\n仅供中情局局长、国务卿阅览\n\n后布哈林时代的俄罗斯无政府状态正趋于政治统一，世界各大国，特别是已难以直接影响从维亚特卡到上乌金斯克的俄罗斯事务的那些大国，将目光转向了前苏联的前邻国和边境地区，试图在某种程度上收买它们，从而影响俄罗斯事务。对于美利坚合众国而言，我已经决定，我们的最佳机会是通过土库曼斯坦影响中亚地区。\n\n土库曼斯坦政府目前正由一位前苏联战争英雄控制，其名为波达·安瑙拉佐夫；尽管如此，只要我们采取了正确行动，他便很容易受我们影响，从而符合我们和自由国家组织的目标。然而，中情局目前只有与中东和两个印度相关的部门机构，我不认为我们能在中亚取得足够影响力的同时保持对伊朗和印度次大陆的注意力。\n\n因此，我的结论是，应当成立一个特别专注于中亚事务的新部门。如此一来，我们就能更轻松的影响中亚局势；若我们回避这一建议，相关事务会变得困难得多。因此，我建议，除非我们全无干涉该地区的意图，否则不应拒绝此提议。\n\n(-姓名被抹除-)"
 CA_US.1.a: "他说的在理。设立部门。"
 CA_US.1.b: "拒绝，那片风景优美的地方能给我们带来什么呢？"
 CA_US.2.t: "土库曼斯坦的机遇"
 CA_US.2.desc: "“又来？”中情局老军官低下报纸，不知他是否是听错了，接着瞥了一眼那个年轻的分析员——他叫啥来着，马克斯吗？不论他是谁，他肯定是捎着重要新闻来的。\n\n“土库曼斯坦，先生。”他重复了一遍，“那边有些新发展。土库曼总统已宣布将举行选举。”\n\n土库曼斯坦——对了，就中亚那块啊。他上次处理那地方的事情已经是好久之前了。就在一小阵子前，中情局在那连个办公室架子都没有。那里除了专制者、部落民和前苏联领土外啥也没有。可以说，美国的利益在那也没什么机会可言——不过，选举？这下有点意思了。他把报纸放下，全身面向那位分析员：“这事情有多重要？”\n\n“非常重要，先生。”马克斯在原地稍稍晃了一下，似乎因自己被认真对待而手足无措，“那位总统这些年来一直维持着一个‘过渡政府’。选举对他来说是一大步，先生，他基本上肯定能赢下选举。他是人民的英雄啊。”\n\n“对，对…那总统是谁来着？”\n\n“波达·安瑙拉佐夫，先生。”马克斯提醒道，“你可能有印象，他就是那个击退了伊朗沙阿的入侵的人。”\n\n啊，他现在有些记起来了。而就像马克斯说的那样，如果他现在举行选举，说明他很可能对自己相当自信。然而，他不会是第一个因在选举中过度自负而适得其反之人。如果说美国有什么影响中亚的机会，那就是这事了——又或者，归根结底，这只是浪费时间。"
 CA_US.2.a: "“我认为我们能利用此事。我会下传相关事宜的。”"
 CA_US.2.b: "“土库曼斯坦那地方没什么值得一提的东西。”"
 CA_US.3.t: "摆出选项"
 CA_US.3.desc: "马克斯竭力使自己镇静下来。毕竟，能在中情局高层面前作简报的机会并不多见，更别提今天在场还包括外勤行动主管。上级对土库曼斯坦情报的重视程度显然远超他的预想，此刻整个行动规划已在酝酿中，他的任务就是解析三名候选人。\n\n“目前主要有三位人选。”他点开第一页幻灯片，“首先是现任总统波达·安瑙拉佐夫，最被看好的选项。至于原因，他既是战争英雄，更是在伊朗入侵时捍卫领土完整的关键人物。”激光笔光束在总统肖像旁画了个圈，“顺带一提，他对德国的憎恨与其坚定的共产主义信仰同样鲜明。”\n\n第二张照片跃上幕布时，会议室响起轻微的骚动。“济亚丁·巴巴汉，”他继续道，“一个特立独行的存在。虽非军人，却拥有教长般的号召力。”画面切换到他主持礼拜的场景，“这位虔诚的穆斯林试图将社会主义理论与伊斯兰教法相融合，因此在宗教群体中极具人气。相较而言，他是最温和的选项，对我们利益的契合度也最高。”\n\n最后一张幻灯片亮起时，有人轻吹了声口哨。“米尔赛义德·苏丹-加利耶夫，”马克斯迎上主管们好奇的目光，“早先和布尔什维克结盟，曾想借共产主义为穆斯林争取权益——不过后来闹翻了。”照片里鹰钩鼻男人正在激昂演说，“他是这批人里最激进的民族主义者，对德国深恶痛绝的同时，更是个坚定的反帝国主义者。容我直言，这点可能让我们碰钉子。”\n\n当会议室灯光亮起时，他看见几位要员交换着眼神。提问环节精准打在情报痛点上，显然高层已做过功课。“三个都带红色底色，确实不算理想选项。”外勤主管摩挲着下巴与同僚低语片刻，最终一位高级分析师向他点头示意：“我们决定好该选谁下注了。”"
 CA_US.3.a: "波达·安瑙拉佐夫是个稳妥的选择。"
 CA_US.3.b: "济亚丁·巴巴汉最容易利用。"
 CA_US.3.c: "米尔赛义德·苏丹-加利耶夫能够遏制第三方干涉。"
 CA_US.4.t: "自生自灭"
 CA_US.4.desc: "迈克尔向来清楚外勤特工的刀尖生涯。德国与共荣圈境内特工遭捕受刑的传闻不绝于耳，但他万没料到会在中亚腹地阴沟翻船。\n\n任务本该易如反掌——潜入土库曼斯坦，发展线人，必要时动用武力，辅以欺诈手段左右选举。这类常规操作在如此闭塞的国度理应手到擒来。\n\n可他失算了。\n\n至今仍想不通哪个环节出了纰漏。或许是在选举办公室外逡巡时露了马脚，或许早被暗处的眼睛盯上。此刻他苏醒在马背上，口舌被封，绳索深勒皮肉，生平第一次嗅到死亡气息。\n\n马匹骤停，他被粗暴掀落沙地。挣扎起身时，终于看清绑架者——是个满面怒容的部落青年。迈克尔颤抖着举起被缚的双手，却见寒光闪过，绳索应声而断。可未及欣喜，黑洞洞的枪口已抵上眉心。\n\n“走，”生硬的英语混着风沙，“别再回来。”\n\n举目四望，他顿悟这“仁慈”的本质：方圆百里皆是戈壁，或许仍在土库曼，或许已近哈萨克——都不重要了。等待他的将是烈日下的脱水而亡。“可我会死在这里。”青年冷笑颔首："
 CA_US.4.a: "“你说得没错，外国佬。”"
 CA_US.5.t: "每天早晨的惯例"
 CA_US.5.desc: "在情报分析部门工作的每一分每一秒都充满乐趣，伊恩·德罗德兰打心底同意这一点。他为自己能效力于中央情报局感到骄傲，也为自己的祖国美利坚感到自豪。\n\n伊恩每天早上都有着固定的安排：搭着公交车来到单位，然后在办公室旁边的休息处给自己倒杯咖啡，再拿张报纸，如果有自己关注的新闻就再多拿几张。他看报纸不是为了休闲，而是因为有很多消息与其等着那些特工们给他汇报，还不如自己从报纸上直接看来得更快一点。\n\n今天早上，伊恩也照例一边哼着小曲，一边小心翼翼地端着自己的咖啡走进办公室。由于近期土库曼斯坦正在举行的大选，中亚地区局势越来越引人关注，作为一个情报人员，伊恩再明白不过像这样难得的好机会，美国是绝对会进去插一脚的。当然他并不直接负责此事，还不敢打包票，但如果有人跟他说美国真的在其中搞了些小动作，他也不会感到惊讶。\n\n最近几天，伊恩一直怀疑中央情报局的高层在向中亚地区抽调更多的特工和分析人员，他自己也开始读一些关于中亚地区的资料，毕竟自己也有可能在某一天被调过去。但伊恩越读越发现，中亚地区大有名堂，他开始好奇这次人员调动究竟是临时安排，不久之后他们就会将重心重新放回到德国人身上，还是说这代表着高层开始准备长期关注中亚地区局势。\n\n伊恩估计，接下来的土库曼斯坦大选能否按照美国希望的剧本往下走，会很大程度上影响中央情报局高层的决策走向。尽管大概能猜到，但他并不确切地知道中情局支持的是哪一位候选人。不过今天就是大选的开票日了，一切都将得到揭晓。\n\n他坐在办公桌前，调整出最舒服的姿势品了一口杯中的咖啡，之后抽出一张报纸，满怀期待地打开了内页，上面写到：“土库曼斯坦总统大选结果今天正式公布，赢得选举的是……”"
 CA_US.5.a: "[TRK.GetLeader]。"
 CA_US.6.t: "土库曼斯坦应急预案"
 CA_US.6.desc: "总统放下手中的报告：“事情棘手了。”\n\n室内一片静默：内阁成员中传来几声轻咳，军官们纹丝不动，情报官员伺机待命。数小时前传来的消息称，波达·安瑙拉佐夫赢得土库曼斯坦大选。以其声望而论，结果本不意外，但让这般强硬的共产党掌权绝非良策。\n\n“有何对策？”总统打破沉默，“但说无妨。”\n\n中情局中亚处处长杰克逊略显迟疑：“当下可行方案有二。要么承认选举结果，毕竟波达对日德的戒心不会比对美方少。要么……动用应急预案。”\n\n见总统点头，他继续道：“我们锁定了一个可能倾向我方利益的人选——萨雷·卡雷耶夫，他原本是演员，后来转行从军，再步入政坛。此人既有政治影响力，也有在必要时……掌控局面的魄力。”\n\n总统皱眉：“掌控局面？你是说把他硬拽上去？”\n\n“这倒不必。”杰克逊扯动嘴角，“卡雷耶夫是个爱国者，绝不会背叛政府特别是波达。但若有必要，他会主动行动。我们只需创造契机。当然，卡雷耶夫并非完美代理人，但比起波达之流，他已是最接近我方立场的选项。最终抉择权在您。”"
 CA_US.6.a: "动用应急预案，换掉波达。"
 CA_US.6.b: "搁置应急预案，外交才是上策。"
 CA_US.7.t: "迪克西遇上土库曼斯坦"
 CA_US.7.desc: "乔治·华莱士此生从未踏足过土库曼斯坦这片土地——确切地说，他压根没造访过任何稀奇古怪的穆斯林国度，那些穹顶建筑与大胡子教众在他眼中都是异教徒的荒诞闹剧。如同绝大多数信奉上帝的迪克西，他对那片土地仅有的认知仅限于《新约》里提到的几个古地名。但如今这个中亚小国竟遭到赤色分子渗透，迫使他亲自出马。在总统先生的英明斡旋下，土库曼政府终于清除了那个社会主义寄生虫，换上了一位更值得信赖的强人萨雷·卡雷耶夫。\n\n阿什哈巴德的国宴厅里（经过中情局官员的紧急培训，总统总算记住了哪些敏感词汇需要规避），美土领导人的初次会面还算顺利。华莱士起身致辞时：“尊敬的卡雷耶夫先生，自由勇敢的土库曼人民，本人对贵国展现的好客深表感谢。特别要祝贺你们在圣战中战胜了社会主义毒瘤，迎来了物质和精神上的自由。正如诸位所知，这种意识形态与纳粹疯狂思想一脉相承。”他用蹩脚的土库曼语结束演讲时，宴会厅里响起了礼节性的掌声。\n\n卡雷耶夫随即发表了同样充满外交辞令的回应。宴会结束后，二人转入闭门会谈。\n\n“卡雷耶夫先生，我们会全力支持你渡过眼下的难关。”华莱士信誓旦旦地保证道，卡里耶夫感激地点点头。\n\n“感谢总统先生。此举固然有贵国自身的考量，但对巩固我的统治无疑至关重要。”华莱士注意到对方眼中闪过一丝精光——这个男人远比预想中要敏锐。\n\n“待局势稳定后，”卡雷耶夫接着说道，“希望能与贵国及整个OFN商讨更深入的合作协议。”\n\n总统唇角微扬，中亚腹地若能有此战略支点，自由世界将如虎添翼。"
 CA_US.7.a: "“一切由你说了算，卡雷耶夫先生。什么时候谈都不算晚。”"
 CA_US.8.t: "共鸣"
 CA_US.8.desc: "柯蒂斯·李梅从未踏足过土库曼斯坦，甚至对整个亚洲都所知甚少。这本是他不甚关注的边缘之地，直到几场简报会、数幅作战地图以及战略视野的拓展完全扭转了这种认知——这个西通中东，北接俄罗斯，东邻共荣圈的战略咽喉，必须由他亲自掌控。\n\n军事行动如精密时针般推进。数次定点清除，几场巧妙安排的“意外”，共产主义的毒蛇就此被斩首。为坚定可靠的盟友铺就完美道路的时机已然成熟。萨雷·卡雷耶夫果如预期般挺身而出把控局势——这正是军人本色。\n\n在阿什哈巴德的会晤中，两位军旅出身的政治家很快在推杯换盏间发现了共鸣。相似的人生转折，异曲同工的爱国热忱，无不昭示着共同语言。纵使畅谈峥嵘岁月令人沉醉，但重头戏还在后头。\n\n“美国已做好充分准备，”午宴结束时李梅放下餐具，“我们将全力支持贵国渡过这场危机。”\n\n“非常感谢，”卡雷耶夫微微欠身，\"虽然言之尚早，但待局势稳定后，希望能与贵国及整个OFN商讨更深入的合作协议。\"\n\n李梅的嘴角浮起笑意。中亚腹地的盟友已然在握，自由国家组织再添新翼。只需确保这位可靠的战友沿着既定道路前行，整个中亚终将收入囊中。"
 CA_US.8.a: "“没关系，总统先生。现在就详谈也无妨。”"
 CA_US.9.t: "足够的威慑"
 CA_US.9.desc: "戈德华特不太信得过萨雷·卡雷耶夫。据他所知，就接受美国利益而言，此人不甚可靠，但相比之下，他仍是最佳人选。他批准了这次行动的唯一原因，是中亚具有战略意义。\n\n现在他身在阿什哈巴德与卡雷耶夫会面，扮演着兴致盎然的政治家角色。“我知道你们正处理某些骚乱，”他开口道，“我愿亲自保证，美国乐意为镇压共产党叛乱分子提供支持。”\n\n卡雷耶夫谨慎地放下手中的玻璃水杯：“尽管此举慷慨非常，总统先生，但局势仍在掌控。诚如您所知，这是……段艰难时期。”\n\n“当然，”戈德华特答道，并不感到意外，“但再谨慎都不为过。叛乱分子惯于制造麻烦。”\n\n“对此我很清楚，总统先生，”卡雷耶夫回答时几乎带着挖苦，“骚乱已经持续太长时间了，平息只是时间问题。”\n\n这样的表态姑且足够。戈德华特希望卡雷耶夫能对此尽心，但仍心存疑虑。毫无疑问他会对共产党过于手软，但此刻若坚持要求将会引发疑窦。“无论如何，请放心，贵国若有需求，美国必将施以援手。”\n\n卡雷耶夫庄重颔首。环顾伊朗、阿富汗与逐步统一的俄罗斯，土库曼斯坦或许已成为局外势力的诱人目标。“我对此深表感激，总统先生，我想这足以威慑任何妄图染指之辈。”"
 CA_US.9.a: "这是自然，我可以保证。"
 CA_US.10.t: "互惠协定"
 CA_US.10.desc: "玛格丽特·蔡斯·史密斯不得不承认，这是她经历过最不自在的出访之一。不仅因为目的地是气候干燥的土库曼斯坦，更因为此行的特殊背景。她对萨雷·卡雷耶夫的印象相当不错：一个在危局中力挽狂澜的人物，而正是她亲手促成了这一局面。他不同于美国惯常扶植的那类代理人。\n\n当然，这一切势在必行。中亚对遏制日本至关重要，毗邻俄罗斯与伊朗这一团结协定傀儡的战略地位同样举足轻重。美国的利益必须放在首位。\n\n“感谢美方在第一时间承认我国，总统女士。”宾主落座后，卡雷耶夫开口道，“这有效防止了局势恶化。”\n\n“应当的，”她报以礼节性微笑，“贵国新生的民主政体必须得到保护。”\n\n“我对OFN全体成员国深表感激，”卡里耶夫语气平淡，“贵方固然有自己的考量，但我相信我们能够达成某种共识。”\n\n蔡斯总统啜饮清水，神色如常。对方嘴角若有若无的笑意提醒她：眼前这位演员出身的政客，远比预期中敏锐。不过无妨，她自能应对。只需谨记：坦率而不失分寸。“很高兴我们心有灵犀，总统先生。我对此深表认同。”\n\n卡雷耶夫保持着难以捉摸的微笑。她突然意识到自己陷入了一种微妙境地——手中的筹码似乎不如预期那般有力。而这位卡雷耶夫，恐怕会成为比设想中更棘手的盟友。"
 CA_US.10.a: "“愿今天成为良好合作的开端，总统女士。”"
 CA_US.11.t: "问题资产"
 CA_US.11.desc: "总统放下报告，点了点头。椭圆形办公室内仅有寥寥数人——几位内阁成员和刚做完土库曼斯坦大选简报的情报官员。“看来这是最可能的结果了。”\n\n“是的，总统先生。”中情局中亚处处长杰克逊接过话头，“正如我们所料，波达选择了一个绝佳的参选时机，并开展了卓有成效的竞选策略。加之其与生俱来的民众亲和力，足以助他顺利冲线。”\n\n“现在我们要对付他了。”总统踱步至座椅前，“波达和他新近获得合法性的民主政权，不太符合我们的期望。”\n\n“确实如此。”杰克逊接话道，“但尚且能够运转。波达是我们知根知底的变量，其行为模式可预测，动向可预判。他的政治倾向与行事动机都存在可供利用之处。作为抵御中亚其他势力的堡垒，他或许能成为一枚有用的棋子。”\n\n总统蹙眉点头：“但他不会接受我们的示好。”\n\n“所以我们应该谨慎行事。”杰克逊略作停顿，“虽然波达远非我们在当地最理想的盟友，但正如我所说，他能在其他层面发挥作用。至于他是否真心推行民主，抑或这次选举只是权宜之计……”他摊开双手，“还需要时间验证。”\n\n总统向后仰靠在椅背上。这是他们目前能争取到的最佳局面，无论前路如何艰难，都必须善加利用。"
 CA_US.11.a: "就讨论到这吧，散会。"
 CA_US.12.t: "放虎出笼？"
 CA_US.12.desc: "中亚高级分析师威廉放下报告，揉了揉发胀的太阳穴。米尔赛义德·苏丹-加利耶夫当选土库曼斯坦总统，这势必要掀起惊涛骇浪。他的胜选并不意外——诉诸民族主义本就是屡试不爽的竞选策略，何况还糅合了主流意识形态与宗教元素。\n\n总统定然已着手准备政权更迭，但另立新君绝非易事。\n\n苏丹-加利耶夫是强硬的民族主义者和反帝国主义者。无论出于何种理由，土库曼斯坦都将对任何外部干预摆出敌意。好消息是，枪口将直指德日；坏消息是，美国亦难独善其身。\n\n不过……威廉灵光一闪。总统或许可以考虑采取另一种手段，而非发动政变。苏丹-加利耶夫几乎铁定会以“统一民族、国家与信仰”为名，动员全国染指周边。战争几乎已近在眼前。\n\n战火一旦燃起，将直逼德国盟友伊朗的门户，令共荣圈如芒在背，更在支离破碎的俄罗斯埋下隐患。土库曼斯坦虽无力威胁美国及其利益，但苏丹-加利耶夫足以令其他各国头痛不已——这本身便是一枚筹码。\n\n他所鼓吹的泛突厥主义……或许可以稍加修饰，使之更易被周边接受。“帝国主义”如今已是过街老鼠，改头换面势在必行。尽管此举费时费力，且对德国的打击远甚于对美国的裨益，但总统需要一份建议，他责无旁贷。"
 CA_US.12.a: "风险过高，得不偿失。政权更迭势在必行。"
 CA_US.12.b: "在团结协定与共荣圈旁树敌？这种良机怎能错失？"
 CA_US.13.t: "如芒在背"
 CA_US.13.desc: "总统听着汇报，一边皱起了眉，说道：“情况相当不乐观啊。”\n\n负责做报告的国务院官员尴尬地清了清嗓子。也许用相当不乐观来形容是有点言重，但如果真的一点问题没有，也不用他来向总统汇报了。“的确，情况听上去是不太好，但是……”\n\n总统似乎对但是后面的辩解毫无兴趣，直接说道：“苏丹加里耶夫是个土库曼斯坦的民族主义者，还是个共产党。这两点难道还不够说明这个家伙……这个新任的土库曼斯坦总统上台之后会把中亚搅得一团糟吗？他甚至还那么讨厌外国人！”总统再也无法克制自己的恼怒，连嘴唇都开始有些打颤了。\n\n他面前的国务院官员又咳嗽了一声，这才回答道：“是的，确实您说得很对，但这两点也正是关键所在。如果苏丹加里耶夫当的是墨西哥的总统，他自然是我们的心头大患；可他现在是土库曼斯坦总统，而土库曼斯坦紧挨着德国在中亚唯一的盟友伊朗，而且离共荣圈的边界也很近。恰好，苏丹加里耶夫总统还是个坚定的反德派，他对日本人的态度也很冷淡，因此虽然这个人跟我们的关系算不上好，但我可以向您保证他上台之后对我们基本没有什么影响，反而德国和日本才是真正需要担心苏丹加里耶夫带来的麻烦的。”\n\n总统思考了片刻，脸色终于有所缓和：“好吧，你说得有道理。但你觉得他算是一个可以合作的对象吗？我感觉他几乎不会接受任何来自国外的援助，哪怕是真心的，出自善意的那种。”\n\n“他不会接受传统意义上的那些援助，总统先生。”国务院的官员回答道。“他会把所有公开的示好行为视作对方在试图干涉土库曼斯坦。”\n\n“那，不那么公开的呢？”\n\n“那就有商量的余地了。”国务院官员笑着答道。“我们可以完全不干涉他的行动，如果突然有人公开表示支持，那也绝对不会到我们这里来。”"
 CA_US.13.a: "很好，那就按你说的办。"
 CA_US.14.t: "成本效益分析"
 CA_US.14.desc: "中亚高级分析师威廉读着报告，不禁吹了声口哨。济亚丁·巴巴汗竟在选战中击败战争英雄和民族主义者，成功当选土库曼斯坦总统。显然，他们严重低估了伊斯兰选民的政治实力。\n\n当然前提是没有外部干预——即使有，他对此也一无所知。他的职责是帮助制定应对策略。总统眼里可容不下一个新生的社会主义政权，更何况它还带有伊斯兰色彩。\n\n讽刺的是，各项数据都表明这可能是对美国及该地区而言最好的结果。\n\n根据档案资料，巴巴汗是位温和派共产主义者，口碑与威望俱佳。相较于同僚，他的意识形态更务实。或许可以争取合作，毕竟美国与共产主义国家联手对抗更大威胁早有先例。\n\n问题是巴巴汗的外交政策能否契合需求。他既非战争狂人也非民族主义者，只愿专注治理本国。这对民众是福音，对美国利益却非佳音。如此情形下，策动政变更换代理人并非难事。\n\n不过此类行动劳神费力，必要性也存疑。但总统正等待他的政策建议，他必须给出方案。"
 CA_US.14.a: "过于安分反而价值不大，我们需要更可靠的人选。"
 CA_US.14.b: "剩下的都是些臭鱼烂虾，我们可以跟他合作。"
 CA_US.15.t: "相对的温和派"
 CA_US.15.desc: "“伊斯兰国家？”总统放下报告，眉头紧蹙，“有意思。这应该不是计划的一部分吧？”\n\n“巴巴汗总统本就是有力竞争者。”正在汇报的国务院官员解释道，“他在伊斯兰选民中威望颇高，况且该地区穆斯林占人口多数。更重要的是，总统先生，他是个倾向于改善土库曼斯坦民生的温和派穆斯林。这份政见赢得了多数选票。”\n\n总统颔首将报告搁在桌上：“虽说是温和派，但本质上还是共产党。没说错吧？”\n\n官员强忍皱眉的冲动：“坦率说，所有候选人都出身共产党。这是前苏联领土，共产主义根基从未真正消亡。从这个角度看，他确实属于温和派。其意识形态更接近伊斯兰社会主义，而非传统共产主义。”\n\n总统沉吟片刻：“国际社会有承认声音吗？”\n\n“暂时没有。”官员摇头，“德日均保持缄默。俄罗斯仍处于分裂状态。倒是伊朗在边境集结军队——恐怕对邻国冒出的伊斯兰政权深感不安。”\n\n他观察着仍在沉思的总统：“您考虑给予承认吗？”\n\n总统似有片刻动摇，最终还是摇头：“不，恐怕会节外生枝。不过保持关注符合我方利益，务必传达到位。”"
 CA_US.15.a: "明白，总统先生。"
 CA_Speer.1.t: "中亚事务"
 CA_Speer.1.desc: "以下是一份由莱因哈德·盖伦起草，并由德国政府解密的文件。它标志着阿尔伯特·施佩尔元首在任期间的德国正式开始介入中亚地区事务。\n\n最高机密\n仅供目视查阅\n呈送国家情报局所有成员\n\n世界之都日耳曼尼亚\n主题：\n中亚\n\n俄罗斯即将完成统一，除小规模监控与精准破坏行动外，德国已完全丧失阻遏能力。 \n\n经全面审议所有可采取的战略举措，最终认定应重点经营伊朗与哈萨克之间的突厥传统核心区——中亚。该地区毗邻已被我方掌控的伊朗边境，地缘影响将使伊朗之战略意义更为重要。 \n渗透该地区的具体指示将陆续下达。\n\n愿德意志得到忠实守护。"
 CA_Speer.1.a: "中亚将落入德国的掌握之中。"
 CA_Speer.2.t: "（传言中的）突厥斯坦军团"
 CA_Speer.2.desc: "莱因哈德·盖伦在向国家情报局下属特工发出的信函里，曾承诺“渗透该地区的具体指示将陆续下达”。但他翻遍情报局档案库，甚至查阅了其前身机构的所有文件，却找不到半点有用的信息。唯一收获是份褪了色的文件夹，里面只简略提及德国曾扶植过一支“突厥斯坦军团”。\n\n在日耳曼尼亚富丽堂皇的官邸壁炉旁，盖伦的面容仿佛接连生嚼了柠檬和印度苦瓜。他清楚意识到，这份惨白的档案根本没有任何价值。\n\n发黄的纸页间仅模糊确认了中亚地区曾存在这支军团，提到他们在建立初期与德军并肩作战，此外充斥着大量陈旧信息——哪怕在书写当时都可能是废料。盖伦压抑着咒骂的冲动长叹一声，将整叠废纸扔进壁炉（横竖这些资料在人民大厅图书馆都能找到），抄起电话说道："
 CA_Speer.2.a: "“接驻马什哈德的格克伦特·鲍赫特工。”"
 CA_Speer.3.t: "Palceholder"
 CA_Speer.3.desc: "aa"
 CA_Speer.3.a: "aa"
 CA_Speer.4.t: "远山来客"
 CA_Speer.4.desc: "鲍赫特工如鬼魅般穿行在突厥斯坦尘土飞扬的山路上，死寂的夜色将他笼罩。距离卡尤姆驻地还有数小时路程——他担心天亮前可能无法抵达。前方某处隐约传来隆隆声响，但特工无暇顾及绕道前行。\n\n骤然间，低鸣转为轰鸣。一辆卡车从隐蔽的山坳中疾驰而出，四面八方响起刺耳的喧嚣。几名少年从车斗跃下，举着步枪高声呼喝。这群人身着国防军护甲与便装的混搭，显然不具备实战素养，唯有敲诈勒索堪当其任。\n\n副驾驶座钻出一名士兵，迷彩服是这群乌合之众里唯一完整的装束。“小子，以为能溜过我们眼皮？可汗的过路费交出来。”他应当是这群人里最年长的。\n\n特工确信那位“可汗”对这群暴徒的勾当毫不知情——但愿他们对卡尤姆尚存敬畏，不致干扰至关重要的谈判。“我从德国来见韦利·卡尤姆汗，这是通关文书——”\n\n头目将手枪直指鲍赫的衣袋:“不掏买路钱就别废话。要么乖乖交钱，要么等着被活埋到脖颈，头破血流地享受死亡快——”\n\n特工冷嗤一声。“行。”他将本欲献给卡尤姆的高档怀表抛向人群。少年们立刻围住这份意外之礼，痴迷地摩挲金属表壳。“现在能载我一程进城吗？路费另算。”"
 CA_Speer.4.a: "领头的士兵连连点头，眼中闪着贪婪的光芒。"
 CA_Speer.5.t: "软硬骨头"
 CA_Speer.5.desc: "表面上，这是一场商务会晤——鲍赫特工反复告诫自己。效忠阿勃维尔的职责要求他必须严肃对待这次任务。但当他注视着韦利·卡尤姆汗那张油光发亮的脸时，脑海中只盘旋着一个念头：他这辈子从未听过有人咀嚼声如此响亮。\n\n或许错在自己。当卡尤姆以“向德国、元首与尊使致敬”为由设宴时，鲍赫本以为这会是一场密谋的序曲。然而此刻呈现在眼前的，分明是场诡异的露天酒宴：两人分坐在直径五米的圆桌两端，其间摆满酒食的桌面上，竟还穿梭着数名艳舞女郎——阿勃维尔的职业守则可没教过如何应对这种场面。\n\n更荒诞的是，即便周遭充斥着宾客的粗鄙喧哗，那个突厥人的咀嚼声依然如磨盘般清晰可闻！身披劣质刺绣长袍的卡尤姆活像只发情的野猪，时而用镶着翡翠的餐刀戳起整块羊腿大快朵颐，时而朝舞娘们抛去淫邪的目光。侍从斟满第七杯马奶酒时，他才想起要提几句“德国友人”，可话头一转又炫耀起自己对新式奔驰轿车的垂涎。\n\n不过倒也不是全无收获。鲍赫注意到在觥筹交错的阴影里，几名军官始终保持着清醒的疏离。他们既不像其他宾客那样谄媚附和，亦不被卡尤姆的奢靡作派吸引，只偶尔交换着意味深长的眼神。看来这支号称铁板一块的军团内部，早已暗流涌动。"
 CA_Speer.5.a: "鲍赫默默记下：去和这几个人谈谈。"
 CA_Speer.6.t: "善妒的元帅"
 CA_Speer.6.desc: "鲍赫特工坐在卡尤姆分配的房间里，借着摇曳烛光在笔记簿上疾书。军团驻地尚处中世纪般的原始状态，自然没有通电。此刻他必须选定值得阿勃维尔扶持的人选，毕竟与总部的联络日益困难。这个抉择将决定中亚未来的棋局。\n\n“瞎子”看似最合适的人选。与暴虐粗鄙的卡尤姆相比，他沉着威严，仿佛是这座建筑里唯一勤于军务之人。初次会面时，当其他人在宴会上纵情声色，他却在沙盘前讲解次日的作战计划——能在如此环境下专注实务，单凭这点就值得考虑。\n\n另一个关键特质是他的嫉妒心。闲谈间，“瞎子”多次因与元帅一职失之交臂的过往而流露愤懑。这种对权力的饥渴源于纯粹的私欲，既无理念支撑，又无周密筹划，恰是阿勃维尔最易操控的类型。\n\n但鲍赫的钢笔在纸面上悬停良久。那种傲慢自大的作派，他在西俄战争中见得太多了——那些渴求功勋的国防军走狗，起初如提线木偶般顺从，最终却往往反噬其主。这类枭雄，永远不会甘当傀儡。"
 CA_Speer.6.a: "前车之鉴在此，不该重蹈覆辙。"
 CA_Speer.6.b: "“瞎子”正是理想人选，他的嫉妒心会成为强大的动力。"
 CA_Speer.7.t: "激进的理论家"
 CA_Speer.7.desc: "鲍赫特工叹息一声，用笔划去了“瞎子”的名字。经过深思熟虑，这位元帅的可靠性实在不足以支持国家情报局继续投资。这意味着，整个遴选工作不得不推倒重来。\n\n倒也不全是坏消息。针对“瞎子”被排除的意外状况，他们早有备选预案——拜米尔扎·海伊特。\n\n作为军团的首席理论家，拜米尔扎在晚宴上高谈阔论着他未完成的文章《论突厥种族优越性》。在阐释理念时，他对法西斯主义的狂热忠诚昭然若揭——这既使他极易成为德国的忠实盟友，却又无形中树起了与所有其他势力间的藩篱。更令人侧目的是，这位理论家毫不掩饰对领导层的轻蔑态度。他细数着指挥体系的种种失误，字里行间尽是取而代之的野心。\n\n唯有一处隐忧自初见便萦绕在鲍赫心头。拜米尔扎的立场……过于极端了，甚至逾越了元首与盖伦惯常支持的尺度。他的某些理论颇为骇人，充斥着在德国国内足以被口诛笔伐的种族主义暴论。显然，这样的“人才”未必受国家情报局待见。\n\n最终裁决权仍握在鲍赫手中。哪怕可能招致盖伦的严厉训斥，他的决定就是最高指令。但扶持一个公然违逆元首主张的人，这步棋当真明智吗？"
 CA_Speer.7.a: "不能支持这种极端主义者，再看看别的。"
 CA_Speer.7.b: "或许他不是改革派，但无疑能让突厥斯坦听命于我们。"
 CA_Speer.8.t: "熟识的魔鬼"
 CA_Speer.8.desc: "鲍赫特工揉了揉酸涩的双眼，面前的空白信笺让他迟迟落不下笔。事态怎会沦落至此？两度遴选出的候选人竟皆难堪大用，配不上颠覆政权所需的庞大投入。数小时煎熬后不得不承认，这支草台军团里再难找出比……\n\n韦利·卡尤姆汗更适合的傀儡。\n\n没错，就是那个聒噪如乌鸦、肥头大耳又寡廉鲜耻的韦利·卡尤姆汗。\n\n鲍赫强迫自己收回思绪。职业素养讲究的是双向镜面。诚然，这位突厥领袖与“庄重”二字毫不沾边，但这并不妨碍他成为绝佳的棋子。恰恰相反，正是此类货色才最适合用金币随意摆布。想到此处，鲍赫不禁莞尔——国家情报局哪次行动不是与三教九流打交道？自己早该习惯这种游戏规则。\n\n更何况，案头关于卡尤姆的详细档案足有三寸厚。那些耗费无数暗桩才刺探到的私密癖好，怎甘心任其尘封？\n\n残烛已燃至铜制烛台边缘，至多再过一个钟头，东方就该泛白了。鲍赫长叹一声，执笔沾满墨汁，就着最后一点摇曳的烛光开始草拟信函。"
 CA_Speer.8.a: "韦利·卡尤姆汗敬启，第二次会谈已提上日程……"
 CA_Speer.9.t: "撒马尔罕之战"
 CA_Speer.9.desc: "过去数月间，撒马尔罕城本是乌兹别克斯坦南部抵御军团进犯的最后的堡垒。这座由乌兹别克驻军与枪炮构筑的要塞，曾被视为中亚乱局永远无法染指的突厥斯坦民族主义光辉象征。即便在那个宿命般的清晨，城防军仍懒散地消磨时光，预备着又一日例行公事的日常操演。\n\n没人料到灾变将至。\n\n霎时间，全城在枪林弹雨与尖叫中惊醒——暴乱始于城南，军团首轮突袭的枪声在街巷间回荡。守军军官们还未来得及整队，便猝然陷入枪林弹雨中。就连常年剿匪的老兵也惊觉，昔日印象中那支衣衫褴褛的散兵游勇已蜕变为整饬有序的正规军，尽管血腥手段不减分毫。当硝烟蔓过每道街垒，所有市民终将明白：撒马尔罕再无宁日。\n\n而城外山坡上，鲍赫特工举着望远镜，静待卡尤姆的筹谋化作自己的棋局……"
 CA_Speer.9.a: "……同时祈祷接下来万无一失。"
 CA_Speer.10.t: "卡尤姆汗的陵墓"
 CA_Speer.10.desc: "雨点噼里啪啦地砸在古尔·埃米尔陵的外墙上。军团本想召集市民见证新领袖的加冕，可在这风雨交加的清晨，只有零星市民在刺刀威胁下战战兢兢到场——围观人群中绝大多数是军团士兵，以及被枪口“邀请”而来的“模范公民”。卡尤姆的胜利宣言一如既往充满陈词滥调，但狂热的军团士兵们只顾欢呼雀跃，畅想着下一次劫掠。卡尤姆手舞足蹈地自诩为突厥世界的统一者，声浪几乎掀翻广场的石砖。\n\n忽然一道银光撕裂雨幕，正中卡尤姆太阳穴。那张总带着贪婪狞笑的胖脸扭曲成可怖的鬼相，臃肿身躯轰然倒下，顺着台阶滚作一团。整个广场顿时陷入混乱。平民抱头鼠窜，军团士兵要么四散搜捕刺客，要么悄悄溜走自保。\n\n拜米尔扎冲向尸体，倒不是想抢救这个被他深恶痛绝的首领，而是要找出幕后黑手。一切都荒诞如噩梦——那个永远贪婪拜金的卡尤姆，此刻像破布偶般瘫在庭院血泊中，头颅在石砖上迸裂。举目四望，狙击手早已无影无踪。副官和官员们正从四面围拢过来，其中还有“瞎子”——\n\n等等，大元帅去哪了？\n\n“瞎子！瞎子！”\n\n拜米尔扎转身搜寻，期待看到大元帅焦急的身影。然而映入眼帘的，是“瞎子”握着枪的手。"
 CA_Speer.10.a: "然后他两眼一黑。"
 CA_Speer.11.t: "斩草要除根"
 CA_Speer.11.desc: "突厥斯坦军团在征服撒马尔罕的征途上折损甚众。少数人死于乌兹别克士兵之手，更多则是亡于同袍相残。\n\n自韦利·卡尤姆汗倒毙石阶后，屠刀便挥向了他的党羽。效忠元帅的军官们组建行刑队，穿梭在这座新征服城市的街巷，猎杀任何胆敢质疑“瞎子”权威之人——无论是拜米尔扎的狂热追随者，还是卡尤姆的投机门徒，统统就地枪决。宅邸洗劫，驻军肃清，城郊布满巡逻队围堵逃亡者。至暮色四合时，整个撒马尔罕已是血流成河。\n\n对某些人而言，这是迟来的清算。职业军官们受够土匪头子的昏聩统治，终于能放开手脚清理门户。在他们眼中，杀戮是匡扶正义，还也许是对败军之将的惩戒。更多人则是见风使舵的投机客，他们本无忠诚可言，只是嗅觉到权力更替的风向。剩下的骑墙派，则在鲍赫或威逼或利诱的推波助澜下，半推半就地加入猎杀——动机并不重要，关键是要把猎物赶尽杀绝。\n\n当最后一声枪响消散在暮色中，鲍赫背着电台回到城郊，决意联系伊朗境内的线人。突厥斯坦这盘死棋终于活了过来——有“瞎子”坐镇，军团将成为插向中亚腹地的利刃。眼下，元帅需要的一切现代化军备都将得到满足。既已用尸山血海为这场政变铺路，鲍赫自当确保这场疯狂能结出果实。"
 CA_Speer.11.a: "愿国家自鲜血中崛起。"
 CA_Speer.12.t: "王座室"
 CA_Speer.12.desc: "鲍赫特工不得不承认，这间办公室比他记忆中整洁了许多——尽管砖缝间仍残留着十余载放浪形骸的余韵。几周前，这里还是韦利·卡尤姆汗的巢穴，若那些酒池肉林的厅堂也能被称为办公室的话。如今，这方空间终于要承载真正的战略会议。\n\n此地已不再是他孤身周旋的战场——盖伦派来的外交使团与军事观察员鱼贯而入，誓要在“瞎子”与德国间铸造更坚实的纽带。元帅显然沉醉于这般瞩目，在作战部署与沙盘推演间隙，总不忘穿插自己夺权历程的“英雄史诗”。那极具感染力的讲述令人几乎信服，即便其中充满粉饰与谎言。好在夸夸其谈之余，实质性工作同样推进着，权当是战略会议中的调剂。\n\n当“瞎子”侃侃而谈攻取撒马尔罕的“壮举”时，鲍赫正打量着元帅办公室仅存的陈设。目之所及皆是地图——从笔记本大小的城防图到覆盖整张桌子的战略态势图，密密麻麻贴满四壁。有的标注着城市布防，有的圈画着战略要冲，更多的是覆盖整个中亚的宏观地形图。绝大多数都布满箭头与批注，零星几张还摆着锡兵模型与卡车标识。\n\n而所有图纸都臣服于那张横亘数米、几乎遮挡住大元帅座椅后的整面墙的巨幅地图。图上只用突厥语标注着四个大字：突厥斯坦。"
 CA_Speer.12.a: "若无意外，“瞎子”终将统治整个中亚。"
 CA_Speer.13.t: "祛新迎旧"
 CA_Speer.13.desc: "鲍赫特工点燃一支烟稍作歇息。真是一场噩梦。“瞎子”昔日何等可靠，却任由撒马尔罕陷入这般……闹剧，实在叫人失望。不过这些都不重要了。经此一役，那位元帅此刻怕已陈尸沟渠。若侥幸未死，鲍赫自有法子送他一程。短短一日之内，此人就从预定接班人沦为必须镇压的叛徒。\n\n但那是明日的麻烦。眼下还有位“英明领袖”需要道贺——可惜并非新君。隔着一条街巷，韦利·卡尤姆汗自吹自擂稳定局势的演讲声清晰可闻。万幸这位突厥领袖目光短浅到连调查的念头都没有——就算觉察到端倪，也未在演讲中表露。虽然不是什么好消息，但也算中规中矩。一方面，鲍赫还能和这位领袖继续共事；另一方面，这也意味着他必须与之长期周旋。虽非美差，可若计划成功，整个中亚都将纳入德国势力范围。现代化改制、军事重组……待尘埃落定，突厥斯坦军团自会成为德国的利剑。\n\n须臾恍惚间，鲍赫仿佛看见那个贪得无厌的蠢货坐上了王座。这是国家、盖伦与元首赋予的使命。眼下，他该着手筹备数周后召开的突厥人大会了……"
 CA_Speer.13.a: "……一想到还要参加卡尤姆的晚宴，他不禁发出呻吟。"
 CA_Speer.14.t: "佣兵的军团"
 CA_Speer.14.desc: "“瞎子”其人虽然毛病不少，但鲍赫特工清楚他确实是员骁将。整个军团中，只有韦利的实战经验能与之比肩。即便如此，单看韦利的表现就知道，资历未必等同能力。这或许正是韦利始终阻挠“瞎子”晋升的原因——生怕提拔会暴露自身缺陷。\n\n果不其然，当拜米尔扎掀起这场豪赌时，韦利的短板彻底暴露。\n\n“瞎子”还握有一张王牌：他竟真拥有一支绝对忠诚的嫡系。拜米尔扎和韦利虽各有亲信，但那些人朝秦暮楚，比起追随领袖的理念，更倾向于押注胜算更大的一方。拜米尔扎的亲信本就不多，但养精蓄锐；韦利的部下数量占优，却多是缺乏历练的新兵，更在突袭撒马尔罕失利后士气低迷。\n\n“瞎子”的雇佣兵团同样疲惫，但这支劲旅堪称军团翘楚，且纪律严明。他们是被各方忽略的暗棋——无论是韦利还是拜米尔扎，都没能算计或突袭得手。鲍赫猜测，雇佣兵头子能如此娴熟地将乱局化为己利，必定早有筹谋，说不定还有线人提前泄露了拜米尔扎的计划。\n\n无论如何，战局已定，“瞎子”成为军团无可争议的统帅。这滩浑水虽令人瞠目，总归要善加利用。要说服德国继续注资并非易事，但突厥斯坦军团仍是日耳曼尼亚在中亚的唯一选择。鲍赫提起无线电，接通伊朗联络站——该汇报最新动态了。"
 CA_Speer.14.a: "“我是鲍赫，请求会面。事态有……进展。”"
 CA_Speer.15.t: "Sins of Impatience"
 CA_Speer.15.desc: "It was like something out of a comedy. A very unfunny comedy. Bauch wondered if Korşirmat was actually deaf, because there was no other rationalization for his actions.\n\nKorşirmat had been ordered - repeatedly - to delay his coup until they were prepared. There was no sniper in position, nor one available to be utilized yet. Any coup needed to be quick and effective - anything more risked an internal civil war. He'd thought that Korşirmat was aware of it at this point, and the man had an ounce of patience to wait for the right moment.\n\nAs it turned out, this had not been the case, and Busch could only assume the power and overconfidence had gone directly to this idiot's head.\n\nHe had watched in utter disbelief as Korşirmat had ordered his people to launch an attack - in broad daylight - against Veli, with other squads presumably sent to kill Baymirza at the same time. He'd literally seen one of the soldiers fire a barrage at a very surprised Veli, who'd immediately dove to cover while his soldiers started firing back while Bauch had immediately run to safety.\n\nNow - again - Sarmarqand was thrown into a battle. Every side in the Legion was gunning for control. It was do or die. While Korşirmat had the initiative and element of surprise, victory was far from a certain thing. Bauch heard gunfire everywhere now, and saw soldiers hunting for anyone who wasn't aligned with their chosen leader.\n\nBauch found himself cooped up in his jeep now, sincerely hoping he wouldn't be mistaken for a soldier. He cursed, seething at Korşirmat's stupidity. However there was nothing more that he could do, as trying to interfere would almost certainly kill him. All he could do was wait, and angrily hope that something could be salvaged from this."
 CA_Speer.15.a: "Power clouded judgement."
 CA_Speer.16.t: "Changing Horses"
 CA_Speer.16.desc: "Agent Bauch shouldn't have been surprised that it had been Baymirza who'd emerged as the victor here. Korşirmat had considered Veli as the most pressing threat, and planned accordingly - a mistake brought by overconfidence.\n\nKorşirmat's gambit hadn't been wholly unsuccessful - listening to the radio, Bauch had known the moment Veli was confirmed dead. It hadn't been the decapitation strike the mercenary had wanted - but it had been done. As a consequence of that, Veli's remaining soldiers had flocked to Baymirza who'd previously pulled his own people back - letting both Veli and Korşirmat's men fight it out.\n\nAnd when Veli was dead, and Korşirmat's men tired, Baymirza had ordered a counterattack with enough numbers and defectors to ultimately win. There was some uncertainty hanging over everything, but Bauch was fairly certain that Korşirmat had been confirmed dead.\n\nWhat to do now?\n\nThey'd invested a lot into Korşirmat. That'd been the horse Germany backed, and the horse had bucked them off, and subsequently gotten himself killed. There were likely some people who'd seen both him and Korşirmat meeting, and Bauch didn't want to be caught in a purge.\n\nThe good news was that he believed this could be salvaged. He was an agent of the Reich, and he could exploit that. Even if Baymirza suspected something, he wouldn't risk Germany's wrath by imprisoning him or worse. At least not if Bauch took the initiative which he needed to - Baymirza was the leader of the Legion, and there was no time to waste.\n\nHe picked up the radio, and tuned it to reach his Iranian contacts. The Turkes Kenes was approaching, and there was very little time to rebuild the Legion into something presentable."
 CA_Speer.16.a: "This is Bauch. There's been a change of plans."
 CA_Speer.17.t: "Downfall"
 CA_Speer.17.desc: "Legion celebrations were ones that Baymirza had grown to become wearily familiar with.\n\nCelebrations that were filled with drunk soldiers, messy tables, scantily-clad women, and lots of shouting and impromptu fighting. The Legion's finest, right here, and nearly every time Veli had thrown one of his parties, he excused himself as he wanted nothing to do with this debauchery unless absolutely necessary.\n\nAt least this time Veli had a legitimate reason to have the celebration. The victory over the Uzbeks had been something they could all feel pride in. If only there was a leader who deserved the adoration Veli was basking in.\n\nA moot point in the end. Soon, this would all be over.\n\nBaymirza sipped his water. No alcohol tonight. He wanted to be perfectly sober. So he watched from the dark walls; he observed the behavior of their great leader.\n\nVeli was drunk, which was hardly surprising, as that seemed to be his state more often than not. He was loud, boisterous, encouraging his equally drunk friends, and flirting with any woman that so much as glanced in his direction. If possible, he was acting even more deranged than normal. Baymirza idly wondered if his drink had been spiked by the Germans, just to ensure he was incoherent.\n\nFinally though, it seemed like Veli wanted some time alone, and stumbled up the stairs to get some air. Baymirza smiled, especially as he saw a trio of soldiers follow, who had been watching - and not partaking in the festivities. Showtime was coming, and he wanted a front-row seat."
 CA_Speer.17.a: "Setting his glass down, he headed towards the nearest balcony."
 CA_Speer.18.t: "His Final Sight"
 CA_Speer.18.desc: "Veli Kayyum stumbled towards the rooftop, his mind spinning and vision blurry.\n\nSomething wasn't right. He could tell that something wasn't right. He'd celebrated, he'd reveled in victory, all the while his emotions were a strange mixture of elation and growing confusion. He was drunk, he knew he was drunk, but it wasn't a state he was unfamiliar with. So why, he wondered in his fogged mind, was he reacting so poorly to just a few drinks. Uzbek alcohol couldn't be the cause, could it?\n\nHe needed some air.\n\nIt was an effort to not just collapse, and he had to lean against the walls to steady himself as he walked up the stairs. He had to pause and puke, before continuing up, glad that no one else was here to see him like this. Once he got to the roof, and took a deep breath of air. Already he felt a bit better, even if the stars above seemed more like streaks.\n\nHis ears pricked up as he heard someone behind him. He turned, groggily staring at a trio of Legionaries. Why were they here? He opened his mouth to ask, before they roughly grabbed him, and threw him over the edge in a quick motion.\n\nVeli didn't remember the fall.\n\nHe felt himself slam into the ground. He felt his bones break, and his organs burst. Pain shot through his body, turning it to fire. He would have screamed if his lungs weren't smashed, and all that came out was a slight whimper. He couldn't breathe; he couldn't move his body. He could only stare upwards as the life left his body. As unconsciousness took hold, his last sight was seeing the smiling face of Baymirza Hayit looking down upon him."
 CA_Speer.18.a: "And his last emotion was the realization that he'd been betrayed."
 CA_Speer.19.t: "A True Ally"
 CA_Speer.19.desc: "As the new leader of the Turkestan Legion, Baymirza understood that there were certain expectations now. Much as he had despised the man, Veli Kayyum deserved a funeral. It was only proper, and it would legitimize him as Veli's successor. Fortunately, it was all too easy for people to believe that Veli had become drunk enough that he'd walked off the edge of a roof.\n\nTragic, but believable. Even though observers noted how passive his tone had been, yet how he had grown more intense in his speech following - one which promised to lead the Legion to even greater glory and victory. An intensity gripped those who listened, as the ascendent Baymirza had taken control.\n\nThe following day had been when he had solidified himself. He had given a simple command to those loyal to him - purge the remnants. One sentence. All that was needed. His advisors would not be the slavish, incomptent, untrustworthy people Veli had surrounded himself with. They would be given opportunities to undertake 'new responsibilities' - which if they did not accept, they would be given executions.\n\nAnd now today was an important meeting. Baymirza had cleaned himself up, holding himself up with a prideful intensity. His uniform was reminiscent of a high-ranking German officer, as was befitting of his statue and importance. Those who walked past him saw a gleam in his eye, an almost fanatical fire as he walked and spoke. The expression of a man who had power, and now intended to use it.\n\nFor Baymirza would be a true ally to the Reich, unlike the fool who had come before, and the agent that had allowed his ascension would see their work rewarded. The agent was waiting, and stood as the new leader of the Legion approached. \"The Legion is at the disposal of the Reich,\" Baymirza began. \"How might we support the Führer?\""
 CA_Speer.19.a: "The agent smiled, and the meeting began."
 CA_Speer.20.t: "An Unusual Invitation"
 CA_Speer.20.desc: "Baymirza frowned at the paper in his hand. It had been personally delivered to him by one of the Legionnaires, personally ordered by Veli. A single sheet, though he now saw that it was effectively the same as the sporadic notices he'd seen be posted around the town in the past day.\n\nAn invitation. It was growing later in the day, and he personally believed there were more important things to do, but if Veli was having this delivered, he supposed he might as well take a closer look.\n\nThe invitation was purportedly for a celebration, a grand feast that Veli had decided would be held. One where all of the Legion was invited, and that would bring all of them together. From the soldier to the officer, from the protegé to the teacher. A feast that would commemorate their victory over the Uzbeki state.\n\nAlong with a grand declaration concerning the Legion's future.\n\nBaymirza wasn't especially surprised that Veli was holding a feast, he hadn't even needed a reason before, just whenever he'd felt like it. What was notable was that Veli was making some effort to formalize the event. Usually, they started without warning, and ended with him and anyone who took part drunk or passed out. Perhaps Veli was finally learning something, and realizing that he couldn't keep running the Legion like his own personal bandit camp.\n\nBaymirza didn't know if this was Veli somehow managing to sober up, or if the Germans had insisted he straighten up or there would be consequences, but either way it was a...he was not going to say \"promising\", but it was a better sign than before. He still seethed that Veli still led the Legion, and had certainly not given up his own ambitions. However, until that day came, he might as well not give Veli a reason to get rid of him. What was the worst that could happen?"
 CA_Speer.20.a: "At least the food might be good."
 CA_Speer.21.t: "Thus Always to Traitors"
 CA_Speer.21.desc: "\"...as this is only the first of many victories!\" Veli roared to the crowd. \"No more will the raids of our earliest days define us, for the Legion now rules nations! To the glory of the Legion!\" The assembled soldiers cheered as Veli lifted his glass, a triumphant smile on his face as he stood among the tables where soldiers sat.\n\nBaymirza didn't cheer but politely clapped. He was a little bored. Veli's speech on how great the Legion was and how this was only the beginning had gone on for a while now.. Veli was sober for once in his life, which Baymirza saw as an improvement. Still, he could clearly get a crowd riled up. Everyone else definitely wasn't sober though, and Veli not taking part was...odd.\n\n\"However...there will be some who will not share in this glory,\" Veli walked between the tables, his tone shifting in a way that set Baymirza on guard. His smile turned sinister. \"We are not immune to the schemes of traitors, but I have learned their names - and many of these traitors sit among us.\"\n\nBaymirza froze, and even those in their drunken stupor hesitated. Veli was closer to him now, and out of the corner of his eye, he saw some Legionaries enter the building. He felt frozen, like a cornered animal. \"And there is only one punishment for traitors,\" Veli said, almost softly as he met Baymirza's eyes, resting a hand on his shoulder.\n\nHis hand lashed out and stabbed Baymirza in the throat.\n\nBlood spilled out as Baymirza futilely grasped for his throat, falling to the ground, Veli standing over him in triumph. He couldn't breathe as his lungs struggled for air, and already his vision was fading. He closed his eyes and his consciousness faded, the last sounds he heard were the pandemonium that had broken out as the slaughter began."
 CA_Speer.21.a: "And throughout the night, screams and gunfire sounded."
 CA_Speer.22.t: "Spilled Blood and Shallow Graves"
 CA_Speer.22.desc: "The slaughter was gruesome.\n\nAgent Bauchhad expected carnage - he'd been around the Legion long enough to expect that. He'd expected a purge, which was par for the curse for men like Veli. Yet he hadn't expected that the sheer scale of death that would be like this. Everyone - everyone - that Veli had even harbored a suspicion of had been executed.\n\nThe mixed smells of the now-dead soldiers and the food in the hall were nauseating, and seeing blood and whiskey spilled and mixing together, and blood and gore covering half-eaten food was a surreally unsettling sight. Discipline allowed him to keep a straight face, but he felt disgusted by everything he saw.\n\nSimilar sights were found throughout the city.\n\nAfter being told the deed was done - which the gunfire had given away - he'd left to meet Veli. Along the way he'd seen Legionaries digging shallow graves all around the city, and tossing bodies into them. Inside the hall, he saw more tossing the bodies out of the window, where they were thrown into more mass graves.\n\nVeli was in a very good mood - a drink in his hand, and sitting at a table untouched by the carnage. Well, this had been the intended outcome. Mission accomplished. Veli was in full control of the Legion. He briefly stepped out before meeting, and opened a radio channel with his Iranian agents with a short message: \"It's done.\"\n\nHe took a breath, and once again entered the building and towards Veli who smiled as the German agent approached. \"Your support in this matter was appreciated, Agent Bauch,\" Veli said cheerily as he took a seat nearby. \"Your superiors will not be disappointed with what we can do. Now, what do you want to discuss?\""
 CA_Speer.22.a: "\"The future of the Legion. We have some ideas for modernization...\""
 CA_Speer.23.t: "Hasty Recalibration"
 CA_Speer.23.desc: "He didn't know who had fired the first shot. Even if he did, it didn't change the outcome, nor really mattered.\n\nAgent Bauch had been keeping well out of sight ever since the battle had started. Over sixteen hours of bloody conflict had followed, and he contemplated evacuation before deciding it was probably more dangerous to leave while soldiers were shooting everything that moved. Instead, he'd watched from the building he'd been hiding in as Veli's men fought against Baymirza's loyalists. He'd listened on the radio as a team of Korşirmat's mercenaries were encircled by other Baymirza loyalists, ended abruptly by a gunshot.\n\nThroughout the capital, gunfire had sounded throughout the evening, night, and morning, growing more infrequent as the hours had passed. With the dust now settled, it appeared there was a clear winner. Baymirza Hayit had apparently secured enough of the Legion to emerge victorious.\n\nThis entire operation had been a disaster, and Bauch didn't want to think about how he was going to reconstitute the Legion before the anticipated Turkes Kenes arrived. The battle had reduced the Legion's numbers significantly, and even if Veli and Korşirmat were almost certainly dead, it would take weeks at minimum before each loyalist was dead - which was to say nothing of desertions.\n\nNothing he could do about that now. He needed to act. He hastily sent a radio message to his Iranian contacts; brief and clear: \"Baymirza controls the Legion. Details shortly.\" They'd know where he was to meet them, and that would be passed back to Germania. With a sigh, he also hastily hashed out a letter to Baymirza, requesting a meeting as soon as possible.\n\nThey had very little time, and needed to make the most of it."
 CA_Speer.23.a: "Hopefully the Hitlerite was as reliable as he claimed."
 CA_Speer.24.t: "The Show Goes On"
 CA_Speer.24.desc: "Agent Bauch personally wasn't surprised by the outcome. The battle that had happened was the absolute last chance any of the people vying for control of the Legion would have, especially after everything that had happened. Of course none of them had thought about if they had the loyalty, skill, and plan to do so - they had just acted.\n\nNow they were dead.\n\nVeli had been the leader and face of the Legion for decades now, and couldn't simply be replaced by haphazard plans based on luck. No matter how many officers Baymirza had tried to convince or bribe, or the tactical skill of Korşirmat and his mercenaries, it just wasn't enough to weaken the grip Veli held over the majority of the Legion - and had held for years.\n\nWhen push came to shove, most of the Legionaries stood by the man who'd led them for so long.\n\nThe battle had gone on for a long time; much longer than he'd expected. All the same, it was over by morning, with only the occasional gunshot every so often. Bauch released a breath, not wanting to think about how much of a disaster this entire operation had been. Veli had enough control to stabilize it relatively quickly - which wouldn't have been the case with anyone else. He disliked the man immensely, but with the Turkes Kenes approaching, there was no one else.\n\nA short message had been sent to his Iranian contacts: \"Legion secure. Veli retains control.\" More details de planned to share with the Iranians at the usual meeting point, which he knew would get back to Germania shortly. Once that was done, he quickly wrote out a letter to Veli, requesting a meeting. Whatever his personal opinions, Veli's hold on the Legion was solidified - and they needed to get to work."
 CA_Speer.24.a: "His part to play is not yet over."
