 UAR_disunited_armies_desc: "尽管战士们愿意投身战场，但目前他们更像是一盘散沙的乌合之众，而非一支训练有素的正规军。作为新生国家，我们的军队亟需发展，要建立起一支统一且高效的武装力量，仍需假以时日。"
 UAR_chaotic_politics: "混乱的政治"
 UAR_chaotic_politics_desc: "建立全体阿拉伯人的国家这样的宏愿确实值得称道，但我们绝不能忽视政治环境的重重乱象。虽然在初期，试图整合和协调国家内部的各种政治实体的努力必将面临诸多挑战，但从长远来看，这些努力终将结出硕果。"
