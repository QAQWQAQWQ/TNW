 POLITICS_JIGME_DORJI_WANGCHUCK_DESC: "吉格梅·多吉·旺楚克于1952年登上不丹王位，领导国家走过了风云变幻的时代。1928年，国王生于特鲁朋宫，曾在卡林邦和西姆拉接受教育，目睹了战后日本在亚洲日益增长的影响力，这些经历催生了他在不丹进行改革、保留传统的愿景。在分裂的宫廷面前，吉格梅·多吉小心翼翼地处理着改革派与保守派之间的矛盾，同情民主化和经济现代化等温和改革，但又抵制可能危及君主制的激进变革。1953年，不丹国民议会成立，允许更多公众参与政治，同时也保留了国王的最终权力。\n\n五十年代，不丹在吉格梅·多吉的领导下迈出了现代化的第一步，重点建设国家最基本的基础设施。在加尔各答的援助下，不丹初步修建了联接关键地区的公路，建起了基础的医疗保健设施，教育方式也开始超越传统的寺院教学；债务包身工的初步废除和更公平的税收模式则凸显了国王对社会进步的承诺。\n\n尽管取得了不少进步，但在共荣圈的势力范围中，国王仍然保持着维护不丹主权的警惕。吉格梅·多吉平衡于在传统与现代化之间，他的统治正不断将不丹塑造成为一个受人尊敬的国家，牢牢扎根于传统认同，适应于不断变化的世界大潮。"
 BHU_The_Dilemma_Of_Reform: "改革困境"
 BHU_The_Dilemma_Of_Reform_desc: "宫廷之中，保守派与改革思想之间的争斗愈演愈烈。同时，改革派内部对改革力度也存在一定的不同意见，部分人主张只进行象征性的改革，另一部分则提议彻底改革经济，进一步推行民主化。\n\n旺楚克国王心中较为倾向改革，但仍警惕着其中的激进派系，担心王权遭到其过大的剥夺。与此相对，贵族正在从守旧势力中获益，武装力量是其一贯重要的支柱。我们正在穿越雷区，一步踏错，便是地覆天翻。"
 BHU_In_Kolkatas_Shadow: "加尔各答的阴影"
 BHU_In_Kolkatas_Shadow_desc: "不丹正站在十字路口之上。官方层面，不丹是一个主权王国，试图在其深厚的传统与现代世界的压力之间寻求平衡。国家外交政策长年唯自由印度政府马首是瞻，而自由印度政府在维持不丹稳定的同时，也在引导不丹谨慎地迈向世界舞台。\n\n在加尔各答的指导下，不丹正大步地迈向现代化。蜿蜒公路穿过曾经无法逾越的群山，将偏远村庄与首都廷布连接起来；各地建起日本专家建造的现代学校和医院，让不丹人民渐渐认识了二十世纪的模样。然而，进步也带来了无言的紧张：在保持独特认同的前提之下，国家现代化究竟能走到哪一步？"
