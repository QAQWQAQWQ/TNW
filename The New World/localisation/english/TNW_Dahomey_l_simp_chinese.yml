 POLITICS_JEAN_BAPTISTE_HACHEME_DESC: "让-巴蒂斯特·哈希姆出生于法属达荷美波多诺伏的丰族世家。当法国殖民者仓皇撤离时，他不过是个少年。他在相对稳定且运作良好的达荷美共和国成长起来，也曾以身为民主政体公民为荣。然而随着共和国政府持续与阿比让自由法国势力交往，民众对政府的信任度持续滑坡。哈切姆晋升将官之时，军中不满情绪最终酿成了不流血的军事政变——这场本应由德高望重的克里斯托夫·索格洛将军领导的行动，旨在切断与前殖民者的联系。未料索格洛与其他资深将领集体拒绝接掌大权，致使总统宝座悬空，军队分裂为政变派与反政变派系。在无人愿担重任的僵局下，政变派推举哈切姆接任总统，时年32岁的他勉为其难地接受了任命，自此开启执政生涯。这个决定很快将成为他的梦魇。\n\n新生的达荷美政权在多重危机中濒临崩溃：以深得民心的索格洛为首的反政变派系，持续威胁着哈切姆充满争议的统治；民众仍怀念旧共和国时期的相对自由；而哈切姆在军中的影响力远逊于索格洛。这个西非小国的命运似乎注定昙花一现。\n\n但达荷美终究是编织自被压迫者希冀的梦想，是弥合欧洲列强制造出来的部族裂痕的尝试。纵使这梦想看似虚妄，哈切姆仍愿为其实现燃尽生命之火。"
