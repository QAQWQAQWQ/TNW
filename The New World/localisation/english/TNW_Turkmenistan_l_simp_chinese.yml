 TRK_ADJ: "土库曼"
 POLITICS_MIRSAID_SULTANGALIYEV_DESC: "如果说今天的整个中亚还有谁能代表这片土地数十年以来的伤痛与矛盾，那便非米尔赛义德·苏丹-加利耶夫莫属。\n\n米尔赛义德出生在欧亚大陆俄化最深重的巴什基尔地区，他是最早追随俄罗斯革命思想的那批人，在革命中，他看到了摆脱沙俄对少数民族与伊斯兰信仰压迫的曙光，看到了这些民族自我组织的出路。他在一十年代至二十年代初期在巴库的经历进一步推动他走上布尔什维克的道路，当革命需要他浴血奋战时，他展现出非凡才干，利用对中亚民族运动的深刻洞见重创白军，而这更为他赢得了弗拉基米尔·列宁的信任。\n\n作为苏联突厥民族与伊斯兰群众的代表，他在苏维埃体制内的稳步晋升似乎已成定局——但这升迁之路却从未兑现。党内始终对他包容地方民族主义与宗教的态度存疑，米尔赛义德最终困守中亚权力边缘地带，虽坚守岗位改善地方民生，却终其一生未能跻身决策核心。\n\n直到纳粹的战车将苏联原有体制碾为齑粉，各边陲共和国在混乱的权力真空中艰难求存。如今，这位矗立在风暴中的老人已然成为突厥民族团结的象征——他依然秉持马克思列宁主义的终极理想，但他要将其改造为真正为人民，而非莫斯科暴君服务的理念。"
 POLITICS_ZIYAUDDIN_BABAKHAN_DESC: "艾哈迈德·亚萨维学派诞生了又一位杰出的突厥伊斯兰教法学者，齐亚丁汗·巴巴汗出生于乌兹别克斯坦塔什干，自幼沐浴在信仰之中，早年追随父亲的脚步，师从对其神学思想与政治理念影响深远的沙米·多姆拉。第二次世界大战期间，加里宁批准乌兹别克与土库曼伊玛目的请求，设立了中亚及哈萨克斯坦穆斯林信仰管理局，他的人生轨迹骤然转向，自此他不再限于神学领域，而是涉足政治舞台。尽管该组织初期由其父挂名领导，但作为书记，实际行政重担全由齐亚丁汗一人承担。\n\n这位领袖一手秉持伊斯兰教义，一手高举马克思主义，矢志公平守护故土信众。从教士培训、慈善事业管理到宗教典籍刊行，种种职责皆系于他所执掌的机构。随着苏联在战争中节节败退，以至分崩离析，中亚民众愈发投身信仰寻求真理与慰藉，在这关键时刻，他更肩负起引路者与庇护者的重任，即便战火平息，齐亚丁汗依然在这条道路上坚定前行。\n\n如今他远赴他乡，于土库曼斯坦的安定环境中继续运筹精神管理局，其人与这一机关象征着苏联旧秩序的延续。历经沧桑剧变，马克思主义与伊斯兰教的双重精神仍在他身上焕发强韧生命力——通过其对伊斯兰教法的独到诠释，而社会主义思想更为这个常陷危局的世界开辟出一条通往安定与正义的新路径。"
