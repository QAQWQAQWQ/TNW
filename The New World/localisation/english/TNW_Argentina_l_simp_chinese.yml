 ARG_Arturo_Frondizi: "阿图罗·弗朗迪西"
 POLITICS_AF_DESC: "家中十四个孩子里排行十三的少年阿图罗，自幼被母亲逼迫走上学术道路。为逃离命运，他曾立志成为足球运动员，却因一连串离奇伤病被迫进入布宜诺斯艾利斯大学攻读法律。这个曾经的平庸学子在此大放异彩，却因大学校长由军政府任命而拒绝领取特别毕业证书。\n\n自涉足激进公民联盟政坛起，弗朗迪西参与多起未遂军事政变，直至1946年与里卡多·巴尔文搭档当选议员。二人作为不妥协与革新运动的核心人物，主导该派系在1951年大选前接管激进公民联盟，却以惨败收场。劫后余生的他们转型为庇隆主要反对势力，弗朗迪西更以民族主义著作《政治与石油》痛斥庇隆政权与外国石油公司签约，并成为颠覆庇隆统治的核心谋士——政变策划自此成为他最热衷的“业余爱好”。\n\n暴君倒台后，弗朗迪西的权谋手腕愈发令人不安。1958年，他滥用激进公民联盟全国委员会职权，以政令强推自己（而非巴尔文）成为总统候选人，导致联盟永久分裂。当意识到自己的不妥协激进公民联盟无法抗衡巴尔文的人民的激进公民联盟时，弗朗迪西向流亡的庇隆开出空头支票，借庇隆派选票险胜。然而就职后，其施政方略与竞选纲领彻底背离。\n\n更糟的是，弗朗迪西对庇隆派的秘密承诺激怒了不妥协激进公民联盟内部与军方，三方角力使治国举步维艰。这位总统层出不穷的阴谋以及屡屡失算的政治判断正将阿根廷拖入深渊。颇具讽刺的是，其工业化经济政策却成效卓著，只是此等政绩总被政治罢工与军事哗变所玷污，令政府颜面尽失。"
 ARG_Pedro_Eugenio_Aramburu: "佩德罗·欧亨尼奥·阿兰布鲁"
 POLITICS_PEA_DESC: "无德、反社会、冷血、自我膨胀——佩德罗·欧亨尼奥·阿兰布鲁堪称阿根廷军队政治异化的终极产物，这位随时能改换忠诚与意识形态的投机大师，早已将基督教道德抛诸脑后。\n\n这位平庸的步兵军官在庇隆执政时期始终安分守己，却在风向突变时骤然蜕变为狂热反庇隆派，以战争部长身份背后捅刀洛纳尔迪将军上位。数日后，他应哈通总统之命签署处决异见将领及庇隆派平民的恶令，甚至将拒绝背弃洛纳尔迪的密友本戈亚将军投入牢狱。如此卑躬屈膝却未获擢升，未能实现总统野望令他耿耿于怀——这个超越上帝与国家的终极执念支配其全部行动。\n\n转变策略的阿兰布鲁在弗朗迪西总统任内扮演军中亲弗朗迪西派领袖，企图通过反复挽救其免遭推翻来换取1963年不妥协激进公民联盟总统提名。当最终被召解决颠覆弗朗迪西统治的危机时，他竟中途变节背弃盟友。随着波吉计划失败，重掌军权的阿兰布鲁立即密谋扳倒梅嫩德斯将军，通过将其关入精神病院终圆总统梦。\n\n但直接夺权从来不是阿兰布鲁的计划。他精心炮制选举法，在禁止庇隆主义、分裂激进公民联盟的政治废墟上，打造出完全以自我为核心的阿根廷人民联盟。通过与反传统的民主进步党、工会激进派、民主社会主义者及军方结盟，试图建立本质上缺乏代表性的中左翼“温和独裁”，直至时间彻底抹去被废独裁者的历史记忆。"
 ARG_Juan_Carlos_Ongania: "胡安·卡洛斯·翁加尼亚"
 POLITICS_JCO_DESC: "胡安·卡洛斯·“海象”·翁加尼亚中将是个恪守规则至死方休之人。事实上，这位骑兵军官对结构的几近狂热的恪守是如此强烈，以至于有时反而导致其表现平庸——正如他在国立军事学院的经历所示，最终以班级末四分之一排名毕业。这种对刚性框架的偏爱也使这位智商尚可的军人排斥任何形式的智识主义，当这种抵触与他与生俱来的指挥才能及个人操守相结合时，便催生出一个典型的“战地派”军官形象：即完全专注于部队指挥，从未担任过参谋或行政职务。\n\n遵循规则也使翁加尼亚对政变阴谋深恶痛绝，尽管他拒绝参与反庇隆主义密谋的行为，并未能使其免于被流放到总马政监察部担任闲职——在那里，他郁郁寡欢地监管马厩直至庇隆政权倒台。这段无足轻重的任期后，他转型成为顶尖坦克指挥官。目睹1960年代组织架构的崩塌令翁加尼亚痛心疾首，最终在临界点与众多骑兵同僚共同发起清除“红派”运动，此举意外挽救了阿根廷民主制度，并使他在48岁荣膺陆军总司令。\n\n自此，翁加尼亚的动机变得愈发晦暗不明。其退役原因、涉嫌参与后续政变的可能性，以及他究竟真诚相信（或是在心理操控下误信）自己作为伟大领袖的程度，几乎无从考证。已知的是，那份最终由心怀不满的将军们实施的军事接管应急计划，必须任命翁加尼亚为总统——而他接受职位的唯一条件是获得实施“真正的民族革命”的“空白支票”。这种说法的确切含义，特别是考虑到其政府内相互猜疑的自由派与民族主义派系间日益加剧的对立，仍有待观察。不过，翁加尼亚的计划似乎获得了广泛支持，包括来自多数工会和大企业的背书，即便是批评者也承认他是位受过良好教育、怀揣善意之人。"
 ARG_Jose_Luis_Romero: "何塞·路易斯·罗梅罗"
 POLITICS_JLR_DESC: "对历史学家罗梅罗而言，其学术声誉始终与政治公民身份密不可分。这位西班牙移民后裔自幼便展露对历史与哲学的热忱，凭借古希腊罗马史研究在知识界崭露头角，为多家文化刊物撰稿。他对社会经济结构运行机制的探究热情，与其在社会党的政治实践始终交织——激烈反对庇隆政府使他遭拉普拉塔大学除名，却在1956年政变后被任命为该校校务总监。\n\n“庇隆主义”始终令这位社会主义史学家困惑不已。一个带有法西斯特征的运动竟能赢得工人阶级衷心拥护，这在他看来近乎违反自然规律。但罗梅罗不得不承认残酷现实：庇隆主义在社会主义失败的领域取得了胜利。他由此转型成为党内路线改革的主要推手，主张以更激进的\"反建制\"姿态争取庇隆主义选民。\n\n然而罗梅罗始终难以化解近年困扰社会党的根本矛盾：美国究竟是帝国主义强权还是反法西斯盟友？庇隆主义是工人诉求的真实表达还是民粹操弄？纵使具备深厚社会科学素养，他仍未找到确切答案。不过改革蓝图已然成型：完善教育体系、推进多元民主、改善劳动条件。在罗梅罗看来，修补国家结构性缺陷不仅是维护工人阶级利益的必由之路，更是拯救民主制度的关键所在。"
 ARG_Ricardo_Balbin: "里卡多·巴尔文"
 POLITICS_BALBIN_DESC: "作为民主抗争庇隆的旗帜性人物兼职业失败家里卡多·巴尔文，此刻正经历着终极羞辱——他四次竞选四次落败的总统之位，最终竟需仰仗三度击败他的宿敌庇隆本人施舍方能获得。\n\n这倒也公平。巴尔文当年戏剧性跃居阿根廷政治舞台中央，本就是庇隆精心设计的产物：为遏制阿图罗·弗朗迪西势不可挡的崛起，庇隆策划了一场针对巴尔文的拙劣刺杀，成功将这位正直却平庸的强硬派议员塑造成殉道者。计划成效之卓著，甚至迫使弗朗迪西在党内失势后愤然转投庇隆阵营。\n\n随着弗朗迪西倒向庇隆主义者，巴尔文成为反对派仅存的全国性象征。自此他每隔六年便机械性地踏上注定失败的竞选征途，在屡战屡败中愈发消沉。但这份“万年陪跑者”的形象竟意外具备政治价值。预感到生命将尽且后继无人的庇隆，在这个温顺的反对派领袖身上找到了理想的过渡人选，决意扶持其当选副总统——深信仅凭巴尔文上位就足以促成这个早已失控的政权和平解体。\n\n如今庇隆既逝，其谋划正完美展开：非庇隆派军官发动预防性政变扼杀任何反制行动，巴尔文只需静观庇隆党自我瓦解。包括他在内的多数人都认为，这意味着其任期结束后将回归自由选举。但人民的激进公民联盟已今非昔比，国防部长伊达尔戈·索拉等实权派主张：在军方授意下，通过组建人激公联-庇隆党/妇女庇隆党的畸形联盟预决选举结果，从而无限期延长过渡时期。"
 ARG_Arturo_Umberto_Illia: "阿图罗·翁贝托·伊利亚"
 POLITICS_ILLIA_DESC: "阿根廷政坛的标准晋升之路，往往是科尔多瓦省的年轻律师背井离乡，前往布宜诺斯艾利斯的权力殿堂追寻前程。阿图罗·伊利亚却反其道而行——这位港城医生，在伊波利托·伊里戈延亲自过问铁路医师任命时，受命前往科尔多瓦省的边陲小镇克鲁斯-德尔埃赫。\n\n自1929年履职以来，伊利亚以清廉形象深得科尔多瓦民心。三十年代选举舞弊肆虐全国，该省却独善其身，使科尔多瓦激进公民联盟得以长期执政，并在其上司阿马德奥·萨瓦蒂尼领导下形成鲜明的不妥协左翼路线。伊利亚始终忠诚践行“科尔多瓦路线”，1960年这位强人逝世后，他更成为该派系领袖，并以激进公民联盟内早期反弗朗迪西主义者闻名。除短暂担任三年科尔多瓦副省长外，伊利亚始终是一边从政，一边担任克鲁斯-德尔埃赫唯一的医师，他常骑马出诊。\n\n这位无私而纯粹的乡村医生——全心致力于改善民众健康——是伊利亚总统任期内的宝贵政治资产。然而在这幅虽然真实的人物画像之下，还藏着一位思维自1930年以来就停滞不前的古板老者。他心不在焉的举止、过时的措辞、缺乏远见的决策以及将非激进派排除在决策圈外的作风，令人联想到其精神偶像伊里戈延的暮年光景。更糟的是，在反对者眼中，这位仅以20%得票率上台的总统，正以某个拒绝承认过错的激进派秘密集团之名施政，强烈的怨恨情绪也因被权力疏远而不断滋长。"
 ARG_Rogelio_Julio_Frigerio: "罗赫略·胡利奥·弗里赫里奥"
 ARG_Carlos_Alberto_Perez_Companc: "卡洛斯·阿尔韦托·佩雷斯·孔潘克"
 POLITICS_CARLOS_ALBERTO_PEREZ_COMPANC: "翁加尼亚将军拒绝这枚唾手可得的总统桂冠时，一场近乎癫狂的继任者遴选闹剧就此开场。军政府为新总统定下三条铁律：\n\n1. 需获庇隆、蓝派与弗朗迪西三方首肯\n\n2. 具备公认的天主教背景与发展主义信徒身份\n\n3. 与阵线核心人物保持距离以避嫌\n\n出身望族的虔诚天主教商人佩雷斯·孔潘克博士完美契合所有条件。这位在提名前还名不见经传的政治素人，其最大优势恰是激不起蓝派将领与庇隆派首脑的丝毫波澜。在陆军情报处对其财务状况的严苛审查中，这位“清白商人”俨然成为落实国民阵线经济纲领的最佳人选。\n\n但公众舆论忽视了关键细节：孔潘克与同属商界出身的罗赫略·弗里赫里奥过从甚密。其候选人身份不过是弗朗迪西-弗里赫里奥集团渗透阵线的冰山一角。阵线内小众领袖、退役将军本戈亚率先敲响警钟，迫使孔潘克与曾任战争部长的老将结盟以证清白。\n\n虽在庇隆派首脑谨慎支持下胜选，新政府架构却暗藏危机——庇隆主义者被边缘化为政府配角，重要职位尽归弗朗迪西派不妥协激进公民联盟成员及孔潘克之流的民族主义小团体代表。随着庇隆派内战阴云迫近，即便流亡暴君本人全力支持，恐怕也难阻阵线重蹈它誓言终结的动荡覆辙。"
 ARG_Jose_Maria_Guido: "何塞·马里亚·吉多"
 POLITICS_JOSE_MARIA_GUIDO_DESC: "在阿根廷历史上，总统之位向来令人趋之若鹜，但此刻坐在这把交椅上的人，却饱尝绝望。\n\n何塞·马里亚·吉多这位来自里奥内格罗小镇的善良律师，1956年因作为“弗朗迪西副手”——激进公民联盟（后为不妥协激进公民联盟）中与全国委员会主席最密切的派系成员——初涉政坛。借庇隆-弗朗迪西协议之力，吉多代表庇隆派主导的省份进入参议院，并在亚历杭德罗·戈麦斯与巴尔文相继辞职后，意外成为总统顺位继承人。\n\n吉多如同弗朗迪西的镜像，执拗地拒绝军方内阁与个别将领的夺权企图。但他不知道的是，这些试探实为弗朗迪西亲手策划，只为在被推翻后仍能幕后操控政权。最终，这位痛苦的律师被推上总统之位，毫无准备且满心悲凉。身陷囹圄的弗朗迪西寄来的亲笔指示仅有寥寥数语：\n\n“吉多必须与党切割，党应其退党后与其合作。将政府与党区分。挽救政府残局。议员不得离席，须确保法定人数。眼下先稳住制度。化解挑战，避免内战。”\n\n吉多的使命注定艰难——总统权威崩解、军纪涣散、将领们重燃终结民主实验的野心，迫使其实施不得民心的政策。但最致命的，是他对个人清誉的执着与对流血冲突的恐惧，这让他难以下定必要决心应对危机。"
 ARG_Vicente_Solano_Lima: "比森特·索拉诺·利马"
 POLITICS_VICENTE_SOLANO_LIMA_DESC: "比森特·索拉诺·利马博士是穿越时空的政治遗老，承载着庇隆时代前阿根廷政坛的残影。1901年生于罗萨斯派遗老家庭，其父以巴拉圭独裁者索拉诺·洛佩斯之名赋予其中间名，却阴差阳错与姓氏“利马”交融成不可分割的整体。\n\n这位年轻律师选择与同窗埃内斯托·圣马丁诺分道扬镳，投身保守派阵营。先以国家民主党国会议员身份崭露头角，后出任鲁道夫·莫雷诺省内阁首席部长，因推行类庇隆主义劳工政策获封“红色部长”。1943年政变前遭排挤，蛰伏至1946年重掌布宜诺斯艾利斯保守派大权。虽在庇隆时代因印刷保守派报刊被短暂流放蒙得维的亚，却始终坚称自己非反庇隆主义者。\n\n凭借与工会领袖的密切关系及参与庇隆主义操控选举的意愿，索拉诺·利马成为1950年代国家民主党门面人物。其对庇隆主义的妥协立场，使布宜诺斯艾利斯保守派与内陆“自由派”保守势力渐行渐远。1956年危机总爆发：当海军政变推翻洛纳尔迪时，索拉诺·利马派系选择支持后者，导致国家民主党解体。随后他创建奉行亲庇隆路线的人民保守党，其调和姿态、捍卫洛纳尔迪的立场及名义上的非庇隆主义身份，使其成为蓝派国民阵线的折衷人选。\n\n本欲聚合“生产主义”社会力量、在军方支持下推进工业化宏图的国民阵线，未能实现创始人鲁道夫·马丁内斯（同为前保守派）期待的广泛代表性。由于多数激进派拒绝参与，该阵线实质沦为庇隆主义者、弗朗迪西派、基督教民主派、民族主义者及人民保守党的代理联盟，由索拉诺·利马挂帅。但对策划此联盟的将军们而言，不幸的是：这位领袖与庇隆的隐秘联系，远比他们想象的§Y更为深远§!。"
 ARG_Emilio_Hardoy: "埃米利奥·阿尔多伊"
 POLITICS_EMILIO_HARDOY_DESC: "埃米利奥·胡利奥·阿尔多伊博士毕生致力于将阿根廷保守主义与其缔造的民主制度相调和。\n\n这位出身布宜诺斯艾利斯保守派律师世家的中产子弟，16岁丧父后险堕贫困深渊，幸得地方保守派机器庇佑，在洛马斯-德萨莫拉市政府挂职度日直至取得律师资格。在政治恩主提携下进入省党部，将整个青春献予保守派事业。\n\n早年经营的人脉终见回报：1935年，24岁的阿尔多伊通过（改头换面后的）国家民主党操纵的舞弊选举当选国会议员。这场不光彩的胜选如同幽灵般纠缠阿根廷保守派数十年，其依托的体制终在1943年革命中倾覆。失势的保守派陷入深度内耗，反被1912年亲手创立的选举制度反噬，沦为国会边缘力量。更致命的是，因民主联盟中激进派的顽固排斥，保守派在国家政治版图中彻底沦为无关紧要的第三势力。\n\n危机中亦藏转机。阿尔多伊在庇隆执政时期屡遭任意监禁的遭遇，使其在布宜诺斯艾利斯保守派中获得了与激进公民联盟内巴尔文相似的道义威望。省内唯一竞争对手比森特·索拉诺·利马另立门户后，这位温文尔雅的律师独力肩负起重振阿根廷保守主义的重任。\n\n此后十年间，阿尔多伊奋力对抗笼罩（更名后的）布宜诺斯艾利斯保守联盟的萎靡之气，其创立的全国中间派政党联合会更是在弗朗迪西倒台后的混乱选举中“胜出”。但联合会本质仍是政治拼盘，保守派与1916年后的民主体制仍未真正和解——即便阿尔多伊及其“民主化”派系，亦曾在弗朗迪西执政危机时公开呼吁政变。如今，除完成本就艰难的完整任期外，这位保守派旗手的终极使命，是打造真正扎根民众的现代保守政党。"
 ARG_Arturo_Uanini: "阿图罗·瓦尼尼"
 ARG_Raul_Poggi: "劳尔·亚历杭德罗·波吉"
 POLITICS_RAUL_POGGI_DESC: "Described variously as a gross hillbilly - \"campechano\" - a mediocre officer, and the prototypical arrogant gorilla, Lt. General Raúl Poggi represents perhaps the worst facet of the Argentine military.\n\nAn unknown officer undeservedly promoted as a result of a conscious policy of the Frondizi government to favor Military Engineers, the once upon a time Torranzist Poggi betrayed his mentor shortly before he fell victim to ill-advised plots. Rewarded with the leadership of the decapitated Army, Poggi let himself be influenced by the navy leadership, which did little to help his unpopularity with his own branch of service.\n\nApparently oblivious to the growing movement against him, Poggi developed even grander ambitions, manipulated by the Admirals along the way. Frondizi's misfortunes once more opened the way for an undeserved promotion, and Poggi marched his merry way into the Presidency after attempts to find alternative solutions failed, confirmed in his post by a Junta dominated by the navy.\n\nWhile Poggi merrily signs decrees he makes little effort to read, however, the country and Army underneath him are beginning to unravel. The sheer extremes to which the now unleashed forces of anti-Peronism are willing to go are eating away the relative tolerance and aversion to violence that had characterised Argentine politics, even in times of undemocratic governments.\n\nAll the while, the mediocre general has been under increasing personal pressure, and his fits of rage become common, especially as the collapse of army discipline makes the figure of Army Caudillos, far more popular than himself, increasingly important."
 ARG_Benjamin_Menendez: "本哈明·梅嫩德斯"
 POLITICS_BENJAMIN_MENENDEZ_DESC: "对本哈明·梅嫩德斯少将而言，政变不是消遣，而是生活方式——可惜他从未精于此道。\n\n自1910年入伍，这位骑兵军官几乎参与了所有能想象到的失败政变。作为曾经的民族主义者兼亲德派，他在1930年代末屡次试图推翻胡斯托将军与奥尔蒂斯博士政府未果。1943年六月革命推翻卡斯蒂略时他积极支持却未获重用，1945年成功囚禁庇隆亦无建树。当民主联盟政府因他战时立场欲将其编入预备役时，他再次孤注一掷发动政变，却连支持者都未能召集。此后摇身变为自由派，与激进工会派合谋破坏1951年庇隆就职典礼，仍以惨败告终。\n\n整个庇隆时代身陷囹圄的梅嫩德斯，获释后始终被边缘化。弗朗迪西执政期间，他因担忧庇隆主义复兴两度政变，却屡遭少壮派军官“截胡”，在弗朗迪西最终倒台中毫无作为。直至波吉派系垮台，海军为挽救权势被迫从退役将领废料堆中发掘出这位七旬老将，与罗哈斯中将共组“军政府指定正副总统”的荒诞组合。\n\n除却这第无数次政变中匪夷所思的运气成分，古稀之年的梅嫩德斯面临着严峻执政考验：尽管思维尚算清晰，但贯穿职业生涯的失败记录、对海军的屈从姿态、昔日亲德背景及平庸资质引发广泛质疑。更关键的是，其应对庇隆主义暴力升级的强硬姿态，正与军中日益高涨的温和派呼声背道而驰。"
 ARG_Rodolfo_Martinez: "鲁道夫·马丁内斯"
 POLITICS_RODOLFO_MARTINEZ_DESC: "Few in Argentine politics stand out from the innumerable legions of lawyers - \"los doctores\" - that occupy the majority of dependencies in all three branches of government. Until recently, Dr. Rodolfo Pastor Martínez was not one of them.\n\nA conservative lawyer from Cordoba, Martínez became a judge in the 1940s after a brief spell in the army, where he served under Major Eduardo Lonardi, who in turn was married to his cousin. His legal career was cut short, however, when his membership in the Democratic Union's national committee drove him into politics, having a brief run as leader of the Cordoba Democratic Party, before being pushed aside.\n\nA known member of the anti-Peronist opposition throughout the next five years, Martínez played a key role in the founding of the Christian Democratic Party. When Lonardi toppled Perón in 1956, he was appointed to the Consultative Junta in representation of the new party, and upon the general's defenestration, he was elevated to Minister of Industry. Throughout his time in Hartung's provisional administration, Martínez remained one of the most vociferously anti-Peronist figures in the government, and struck up a close friendship with the minister of War, General Aramburu. Given tenure at the University of Buenos Aires shortly thereafter, he temporarily retired from politics.\n\nMartínez's return to the stage in the dying days of Frondizi's government, at the behest of Aramburu, proved a turning point. Incensed with his political friend's u-turn on whether or not to oust the intransigent President, Martínez broke off relations with him retroactively became a Lonardist, aligning himself with the deceased general's allies in an effort to revive his political project. After facing a coup attempt and clearing the last attempted hurdles of opposition from generals linked to Álvaro Alsogaray, Martínez and his protege Mariano Grondona have successfully hijacked Guido's interim administration to create the National Front, and electoral vehicle with which, they hope, it shall be possible get the country moving, while neutralizing Peronism by integrating it into the political system."
 ARG_Alfredo_Palacios: "阿尔弗雷多·帕拉西奥斯"
 POLITICS_ALFREDO_PALACIOS_DESC: "阿尔弗雷多·洛伦索·帕拉西奥斯于1878年出生于乌拉圭一个富裕家庭，后成为社会党最早成员之一。在1904年短暂实施的单一选区制选举中，他作为该党代表当选国家众议员。在议会期间，帕拉西奥斯与保守派前总统卡洛斯·佩列格里尼议员结为挚友，并在其支持下推动通过了多项进步劳工法案——这些成就至今仍是他在布宜诺斯艾利斯产业工人中享有崇高声望的基石。\n\n作为冉冉升起的社会主义新星，他本应是1916年首次普选中社会党的理想候选人，却因卷入为争夺女性芳心而进行的决斗被开除党籍（最终他并未迎娶这位女子）。整个1920年代基本处于政治流放状态的帕拉西奥斯在学术界大放异彩，直至社会党因对伊里戈延主义态度分歧爆发内部分裂时才被召回领导全党。\n\n三十年代，社会党成为反个人主义激进公民联盟-保守派联合政府最大的议会反对派，帕拉西奥斯的追随者队伍显著扩大。然而1943年后庇隆主义的兴起几乎摧毁了社会党的选民基础。帕拉西奥斯参与组建的初代民主联盟仅为他赢得短暂出任劳工部长（该职位先前由庇隆上校担任，不久即遭废除）的机会。就在其党内地位受到阿梅里科·吉奥尔迪等人威胁、即将要淡出政治舞台之际，阻止庇隆就职总统的失败尝试却使帕拉西奥斯以反对派领袖身份重登政治前沿。\n\n庇隆倒台后，年迈的帕拉西奥斯被任命为驻乌拉圭大使，1958年回国第二次参选总统却仅获第四。1961年他意外赢得参议院席位，阻止了衰颓中的社会党分裂，其政治形象重现生机，开始被讨论作为潜在反庇隆阵线候选人。最终，85岁高龄的帕拉西奥斯在吉奥迪劝说下同意参选，后者强调他是唯一能同时被激进派和保守派接受、足以统合选票的人物。\n\n无论功过，这位垂暮老者如今完成了不可能的任务：他利用投票箱击败了庇隆主义（尽管庇隆本人缺席），以史无前例的胜利为自己七十载政治生涯加冕。虽因年事已高无缘完成任期，但帕拉西奥斯总统将含笑而逝，因为他知道自己的当选至少暂时阻止了§Y极权主义§!的回归……"
 ARG_Juan_Domingo_Peron: "胡安·多明戈·庇隆"
 POLITICS_JUAN_DOMINGO_PERON_DESC: "胡安·多明戈·庇隆上校两次倒台，又两次复出，完成了连胡安·曼努埃尔·德·罗萨斯都无法完成的任务。\n\n一些昔日诋毁他的天主教民族主义者，现在也勉强同意他回国；某些愚蠢的左派，甚至不惜牺牲自己也要支持他，还有蓝派的将军们，他们实在太过拘泥于律法，这无疑是作茧自缚。庇隆的代理人被允许与§Q国民阵线§!合作，然后便通过了一些手段让他重新上台。\n\n尽管他们还没有意识到这一点，不过一旦接受庇隆的整合，这些人想借庇隆来实现自己理想中的阿根廷的期望就将完全落空，谁让他们会蠢到让一个自己曾经罢免过的人回国呢？\n\n在毫不费力地恢复了自己的地位后，这位精明的阿根廷人也只得出了一个和其他人一样的结论：庇隆主义是有代价的。因此，庇隆上校认为没有必要对1956年的原政府进行大刀阔斧的改革。于是，在《庇隆主义进行曲》和压倒性多数选票的鼓动下，阿根廷愉快地倒车回了十年前。\n\n对于国内某些不幸对这一计划持有异议的40%人口，复出的上校只得请他们到德沃托镇监狱里居住，由专门镇压共产主义的特别部门来进行款待，当然还少不了他库存中最新式的道具。\n\n“§Y我§!能回归不是因为我有多好，而是因为§V你们§!比我更坏。”"
 ARG_Roberto_Marcelo_Levingston: "罗伯托·马塞洛·莱温斯顿"
 POLITICS_ROBERTO_MARCELO_LEVINGSTON_DESC: "罗伯托·莱温斯顿的总统生涯之荒诞，纵使吉尔伯特与沙利文笔下的轻歌剧亦难企及。\n\n这位原任驻华盛顿武官的军官，因军政府12人候选名单上的显赫将领与文官悉数遭否，竟如魔术戏法般从历史夹缝中被拽上权力巅峰——当任命电话打断其晚餐时，他本人甚至不在候选之列。这般离奇程度足以载入阿根廷史册，而新总统的寂寂无闻（唯情报系统少数要员识其面目），更强化其作为军政府强人拉努塞将军傀儡的滑稽形象。\n\n但表象之下暗流汹涌。与所有人预期相反，这位右翼“幽灵将军”正携手激进不妥协派左翼外科医生奥斯卡·阿伦德，发动惊世豪赌。这对孤独的斗士对抗着整个世界（及拉努塞军政府的铁腕），唯一筹码是阿伦德的左翼民族主义经济蓝图，以及莱温斯顿在军中的权力操盘——尽管军阶远低于拉努塞。这场自诩“深化革命”的运动，在厌倦军政府空谈的民众中只收获冷漠与嘲讽。\n\n当守护对象对自身命运漠然以对，民族主义者对抗军事自由主义浪潮的最后一搏，便不仅怪异更近乎绝望，却也因此蒙上浪漫悲情。历史将铭记这是智谋过人的野心将官与支持率趋零的政治活化石，试图颠覆从庇隆到拉努塞整个体制的悲喜剧，抑或视作理想主义绝唱？答案尚在风中。可以确定的是，莱温斯顿与其意识形态斑驳的盟友们，必须在阿根廷革命落幕前完成奇迹。若要书写圆满终章，此刻便是最后机会。"
 ARG_Alejandro_Agustin_Lanusse: "亚历杭德罗·阿古斯丁·拉努塞"
 POLITICS_ALEJANDRO_AGUSTIN_LANUSSE_DESC: "作为阿根廷军事考迪罗的“非典型”原型，亚历杭德罗·拉努塞完美诠释了何为世家权谋。这位粗犷的将军系前庇隆时代最后一位强人阿古斯丁·胡斯托之侄，以精心伪装的亲民姿态，成功塑造了军队在阿根廷社会的集体形象。\n\n其政变生涯处女秀可追溯至1951年：以陆军上尉身份参与激进统一派阻挠庇隆就职的荒唐行动。五年牢狱之灾后，他以背叛回报救命恩人洛纳尔迪将军——出狱不足月便策划政变将其推翻。此后凭借在骑兵部队的显赫地位，全力助推翁加尼亚将军崛起，更在1962年镇压红派中扮演关键推手。\n\n此后十余年，拉努塞与翁加尼亚维持着表面友谊，却暗中对后者施政大失所望。这位被翁加尼亚亲手扶上陆军总司令宝座的阴谋家，最终再度背刺恩主，企图通过过渡傀儡为自身竞选铺路。当计划再度落空，他不得不直面现实：唯有直接掌权方能避免政治尴尬。\n\n但这绝非其终极目标。拉努塞入主玫瑰宫时，怀揣着重构历史的野心——更确切地说，是复刻其叔父时代的协和会。他意图集结已故政治联盟的残余势力，在选举游戏中击败庇隆主义。然军队声望的持续滑坡令此壮举难上加难。即便如此，拉努塞仍与声望卓著的人民的激进公民联盟议员、内政部长阿图罗·莫尔·罗伊格携手孤注一掷。毕竟，随着庇隆主义禁令难以为继，这位将军深知：唯有通过自由选举上位，方能在阿根廷与独裁者回归之间筑起最后防线。"
 ARG_Isabel_de_Peron: "伊莎贝尔·马丁内斯·德·庇隆"
 POLITICS_ISABEL_DE_PERON_DESC: "伊莎贝尔·庇隆从伟人丈夫手中接过权杖。被历史洪流推上世界舞台，继承的不仅是丈夫的政治遗产，更是整个庇隆主义运动的矛盾漩涡——这位新救世主的加冕，非因才能，恰因无能。\n\n生于拉里奥哈省的辍学少女，命运轨迹从夜店舞女转向权力巅峰始于与鳏居将军的邂逅。被传统枷锁捆绑成“胡安背后的女人”，纵使光芒远逊艾薇塔，仍以耳语影响庇隆晚年决策。\n\n秘术爱好者何塞·洛佩斯·雷加逐渐成为其精神导师。在他的操控下，伊莎贝尔被强行推上副总统之位，拙劣复刻“胡安与艾薇塔”经典组合。当党内派系厮杀导致鲁奇、巴尔文、梅内姆、安乔雷纳等实力派悉数出局，这个苍白如胡安亡妻替代品的女人，竟成最大公约数。\n\n庇隆辞世后，伊莎贝尔依宪法继任总统。无关德才，唯因争议最小——军方便利地将其塑造为完美傀儡。但随雷加逐步蚕食总统职能，化身“斯文加利式操控者”，这位政治素人治理国家的捉襟见肘暴露无遗。眼下军方与工会默许这种畸形共治，只因需要借刀清除左翼庇隆势力。\n\n但这份虚妄的权柄终将到期。当清算时刻来临，垂帘听政者自会为伊莎贝尔遴选新的“导航员”。"
 ARG_Rodolfo_Martinovic: "鲁道夫·马丁诺维奇"
 POLITICS_RODOLFO_MARTINOVIC_DESC: "无人能确切说出“反巴尔文战争”是何时打响的。究竟在哪个时间节点，布宜诺斯艾利斯及其全国委员会的高傲态度最终突破了阿图罗·伊利亚最亲密支持者的忍耐极限，至今仍难定论。但这场冲突的诡异结局及其给最边缘省份统治者带来的机遇，却是有目共睹的。\n\n鲁道夫·马丁诺维奇生于布宜诺斯艾利斯的克罗地亚移民家庭。作为激进派政客的成长范例，他攻读医学专业后，选择前往严酷寒冷的巴塔哥尼亚南部行医。通过在圣克鲁斯省营建主要医院，他在第二故乡赢得了政治声望。然而在庇隆主义势力根深蒂固的南方农村，这些成就还不足以抗衡——在1958年该省首次选举中，有望当选副省长的马丁诺维奇惨败于庇隆派支持的不妥协激进公民联盟候选人。\n\n但马丁诺维奇并未就此罢休。1963年卷土重来时，他大胆的立场赢得支持。其竞选风格、公众形象及近乎救世主般的姿态，使他如愿以偿地被比作雅尼奥·夸德罗斯。但真正让他获得全国性声望的，是巴尔文派系在人民的激进公民联盟省级机构中对他施加的持续敌意，以及他对此的激烈反击。怀着对党内事务处理方式日渐失望的态度，马丁诺维奇公开向全国委员会主席发难，并暗中得到所属的科尔多瓦派系及伊利亚支持。\n\n出人意料的是，这位“巴塔哥尼亚的夸德罗斯”在对抗巨人的斗争中获胜。随着伊利亚掌控全国行政机构，总统候选人非他莫属。竞选过程中，他延续省级策略，呼吁肃清布宜诺斯艾利斯臭名昭著的政治生态、捍卫内地权益、重塑总统权威——这些伊里戈延主义色彩的诉求（激进派系多年未闻）最终助他入主玫瑰宫。然而执政现实远比竞选艰难：他公开反对几乎所有非激进派的政治、工会及社会团体，而人民的激进公民联盟内部始终记恨其攻击巴尔文的宿敌们，此刻正密谋将他拉下马。"
 ARG_Cirpriano_Reyes: "西普里亚诺·雷耶斯"
 POLITICS_CIPRIANO_REYES_DESC: "Revenge is a dish best served cold, and Cipriano Reyes has been waiting for his plate for nearly two decades.\n\nReyes was once a leading trade unionist, whose dream was to replicate the success of the British Labour Party in the context of a rapidly industrializing Buenos Aires urban area. This dream was co-opted by the arrival of a certain Colonel to the Undersecretary of Labour, who turned Reyes' dreams into a personalistic nightmare. Nevertheless, he tried to make it work. Indeed, between 1943 and 1945, few men worked as tirelessly as him to ensure the success of Perón's career. When his jailing made him ineligible for the candidacy that year, Perón ordered his supporters to cast blank ballots. Reyes disagreed, and ran for President himself, and in 1952, against Perón.\n\nFor his trouble, the dissident labour-leader was jailed by both Radicals and Peronist governments, but offered a post within the Lonardi administration, which he was unable to take up due to its short existence. Nevertheless, he was determined to revive the Labour Party, and slowly but surely worked with trade-unionists who grew increasingly tired of Perón's leadership from afar. His success in creating an anti-Peronist-Peronist front with Augusto Vandor's union, and several neo-Peronist politicians, enabled him to wrestle the reins of the labour movement away from the Colonel, once and for all. In addition to the dissident Peronists grouped in his own PL, the UP, PTB, PP and several MPPs, Reyes, helped by former-President Frondizi, has amassed the help of a wide coalition of smaller parties, ranging from Frondizi's MID, to Christian Democrats, and even some far-right nationalist parties.\n\nThis victory of political ingenuity and independent labour has completely upended the Argentine political scene, as has the military's willingness to allow Reyes to take office. While what happens from now is a mystery, one thing is certain: The era of Perón is over, and Reyes has been its undertaker."
 ARG_Guillermo_Estevez_Boero: "吉列尔莫·埃斯特韦斯·博埃罗"
 POLITICS_GUSTAVO_BOERO_DESC: "如何使社会主义适应阿根廷民族的特性？历经多年的尝试与磨难，这位出生于罗萨里奥的社会主义活动家似乎找到了答案。作为学生运动的重要人物，博埃罗毕生致力于捍卫学生权利，参与了每一场相关斗争。尽管他以行动派和组织者而非思想家著称，但博埃罗发展出了独特的政治理论以振兴社会主义运动。\n\n庇隆主义与激进主义虽存在几乎不可调和的差异，却有着超乎人们想象的共性：二者都是被国内外经济精英以武力遏制的民族主义民众运动。博埃罗认为，“民族解放”之路在于建立保障民主制度稳定的政治联盟。秉承阿尔弗雷多·帕拉西奥斯的遗产，他相信以平等、社会正义和民主为基础的民众运动将终结阿根廷自我毁灭的循环。\n\n这位1969年大选出人意料的胜出者，如今要将理念付诸实践。不靠炸弹与武器，而靠民主共识、捍卫国家利益和拉美国家团结来实现社会主义。新国家不会建立在死亡与仇恨之上，而应寄托于对未来的希望。\n\n然而，§R这会否是又一场失败的尝试？§!"
 ARG_Emilio_Jofre: "埃米利奥·霍夫雷"
 POLITICS_EMILIO_JOFRE_DESC: "If there was any moment that things could change for the aging conservative movement, it would be this one. In the hands of Emilio Jofré, conservatism lives or dies.\n\nBorn to wealth in the province of Mendoza, Jofré first rose to prominence when he managed to snatch the seat of Governor from Peronists and Radicals alike. By the late sixties, Jofré was one of the most successful conservatives of Argentina. It was the perfect moment, as the conservative parties began to realign, re-emerge, and eventually, reform. In Emilio Jofré, they had their candidate.\n\nImprobably, the campaign worked - Jofré and the PDR soared into power. Now, Jofré must form the first government ruled by a unified conservative party since 1943. It is an immense challenge, but Jofré is up to the task. While his milder anti-Peronism and feminist leanings might be at odds with many in his party, his acumen has allowed him to gather a cabinet that might turn back the tides of reformism once and for all.\n\nIt might seem insane that Emilio Jofré is so calm. To those within his party, his success - or his failure - will drive the fate of the Conservative movement for decades to come. But this is just his job. In the face of expectations, there is nothing he can do but get to work."
 POLITICS_ISAAC_ROJAS_DESC: "因喜爱戴宽大的黑色墨镜一并矮小的身材，海军上将伊萨克·罗哈斯得到了“黑蚂蚁”的别名，当然，这也可能是因为他像蚂蚁一样无耻地追求权力。\n\n也因此，不出奇地，罗哈斯也面临着同样不光彩的命运。在不明智地支持波吉和梅嫩德斯政府后，这位曾经军政府的头号掮客，反水成庇隆死敌的前庇隆盟友失去了可观的影响力。除了海军之外，罗哈斯对其他一切的掌控都在流失，导致他现在不得不与阿兰布鲁控制国家的计划合流。作为计划的一部分，罗哈斯现在将短暂地担任临时总统直到大选举行。在政治分析家们认为阿兰布鲁在大选中的“胜利”已成定局的情况下，很少人能够确定阿兰布鲁掌权后的罗哈斯会成什么样，罗哈斯本人更是如此。"
 ARG_Julian_Licastro: "胡利安·利卡斯特罗"
 POLITICS_JULIAN_LICASTRO_DESC: "阿根廷没有总统，唯有“庇隆主义技术指挥部”总指挥胡利安·利卡斯特罗少校。这个听起来像三流小说杜撰的机构，却是真实存在的权力核心。作为军校状元出身的青年军官，利卡斯特罗凭借虔诚的庇隆信仰获得破格晋升，执掌起庇隆主义技术指挥部。该部门负责长期政治规划与构建实用庇隆主义哲学体系，如今已全面接管国家机器。\n\n当庇隆总统紧急任命的副手显露出背离教义的苗头时，利卡斯特罗意识到1943年6月开启的革命进程危在旦夕。他联合何塞·路易斯·巴洛尼上校等青年军官，协同胡里奥·巴拉布罗、卡洛斯·格罗索等党内少壮派发动紧急政变，以捍卫庇隆主义纯洁性。技术指挥部正式“接管”庇隆党，誓言通过改革确保运动存续。具体而言，利卡斯特罗承诺缓和针对左翼庇隆派的清洗，并致力于构建统一意识形态框架。\n\n然言之易行之难。虽执掌国柄，利卡斯特罗在军阶上仍属中级军官，权力根基如履薄冰。传统庇隆派政客暗中密谋反扑，技术司令部内部亦忠诚存疑。纵然困难重重，这位少壮派领袖仍矢志推行改革。但由青年军官与学院派文官（多为初出茅庐的毕业生）组成的政府能否持久，尚是未定之数。"
 ARG_Carlos_Menem: "卡洛斯·萨乌尔·梅内姆"
 POLITICS_CARLOS_MENEM_DESC: "身兼拉里奥哈省封建领主、副总统、职业拉力赛车手、虔诚穆斯林家长、媒体明星五重身份绝非易事，但卡洛斯·“突厥人”·梅内姆却以令全球职业煽动家相形见绌的狂欢式魅力游刃其间。这位二十年前初涉政坛的“法昆多·基罗加崇拜者”，其人气鼎盛时甚至令庇隆本尊忌惮。\n\n1964年庇隆回归前夕，梅内姆当选拉里奥哈省长，随即沿袭庇隆派省长传统将治下化为封建领地——在庇隆第二、三任期创造了选举舞弊新高度。但早在此根基稳固前，其频繁跨省巡游已显露问鼎之心。当历史机遇降临，这位地方豪强终以雷霆手段迫使病榻上的庇隆接纳其为副总统兼实质接班人。\n\n凭借与经济现实严重脱节（乃至令支持者质疑其诚意）的、充满喜剧色彩的民粹纲领，梅内姆不仅自诩“政策连续性”继承者，更誓言“将庇隆主义推向新高度”。此承诺一半为真：他确有意维持体制内核，但对经济地缘的认知与公开表态大相径庭。这位新总统深信冷战美国必胜，而阿根廷经济存在结构性缺陷，决心背离传统庇隆教义实施转型。\n\n实现抱负的最后障碍在于其发起的闪电选举：这场引发可控但显著政治解冻的选战，竟演变为真正意义的权力角逐，被庇隆党/妇女庇隆党清洗的左翼残余组成的§C真正庇隆党§!与§M激进公民联盟§!构成了双重威胁——正如前者竞选标语戏谑警示：“传统庇隆主义者可能冒险投票给§Y梅内姆§!，却最终选出§l阿尔索加赖§!”。"
 ARG_Manuel_de_Anchorena: "曼努埃尔·德·安乔雷纳"
 POLITICS_MANUEL_DE_ANCHORENA_DESC: "顶着被伊娃·庇隆称之为“粪般恶臭”的姓氏，忍受着由于其优越背景而招致的羞辱与怀疑，曼努埃尔·德·安乔雷纳只有一个目的：以庇隆主义为载体，恢复1835年到1852年间的布宜诺斯艾利斯省长胡安·曼努埃尔·德·罗萨斯的名誉。虽然为这一目的赔上全部身家信誉着实让人费解，但对于许多知识分子、民族主义激进分子以及工会成员来说，这是一场足以载入史册的圣战。\n\n恢复那位同名人名誉的使命也让这位农场地主出身的政客在庇隆党内获得了可观的支持，其支持者或追随传统主义，或紧跟法西斯主义，不过其目标是一致的。安乔雷纳在他们的帮助下，被推上了那位英雄之前的职位，布宜诺斯艾利斯省长，此后还当上了副总统。现在，安乔雷纳成为了掌舵人，他的第一件事就是恢复罗萨斯的名誉，并把他抬升到了他的支持者都想不到的高度。他批评了1853年宪法的遗产与自由主义思想，并准备逐步清算庇隆宪法中的两者踪迹，并恢复罗萨斯时期的一些审美装饰。\n\n在这场反自由主义之战外，安乔雷纳基本把政府交给了他的内阁——由志同道合的工会成员、军官、意识形态迥异的庇隆党成员构成的奇怪组合——除了一些经济上的削减外，他们或多或少地保留了庇隆过世时的大部分政策。事实上，安乔雷纳政府唯一热衷的就是不分意识形态地对左派的镇压，其中尤以奥斯卡·伊万尼塞维奇和阿尔韦托·奥塔拉加诺部长越发频繁的活动为甚，这使得类似于德国的大清洗的传言甚嚣尘上。"
