 ARG_Pablo_Gonzalez_Bergez: "Pablo González Bergez"
 ARG_Pablo_Gonzalez_Bergez_hog_desc: "§YMinister of the Interior\nLiberal Conservatism§!\n--------------\n§LPablo González Bergez is both Hardoy's right hand man and his right wing. González Bergez is a far more 'gorila' figure than the President, had Colorado leanings which provoke negative feelings in the military, canceled out only by the security that his presence in the Ministry will prevent the return of Perón.\n\nIn most other issues, González Bergez and Hardoy are one and the same, and his appointment was primarily seen in terms of raising the profile of Buenos Aires conservatives, whose electoral base is far smaller than those of the interior.§!"
 ARG_Partido_Comunista: "共产党"