 ARG_the_death_of_discipline: "纪律之死"
 ARG_the_death_of_discipline_desc: "在50年代，阿根廷军队经历了一场剧变，其传统的严格等级制度遭受了重创。这一时期，军队重新吸纳了一些反对前总统胡安·庇隆的军官，同时对支持庇隆的军官和洛纳尔迪派军官进行了清洗。这种政治动荡导致了纪律的大幅下降，阿根廷军队沦为了文明世界中少有的目无法纪之师。\n\n这种变动在军队内部引发了两个主要的后果。首先，那些被重新吸纳的军官深感忧虑，担心庇隆可能回归。这导致他们不断干预政治事务，最终促使时任总统弗朗迪西在一次被称为§R军方抗议§!的事件中向军方屈服，这是一种公开的羞辱。\n\n尽管对这种混乱状况的§Y反对声音§!日益高涨，但弗朗迪西总统和其他决策者，出于避免流血冲突的责任感，没有对军中的“职业军人”发出直接命令。他们认为这些表面上看似矛盾的命令是平息连续不断的叛乱所必需的。\n\n此外，阿根廷的案例法长期以来确立了支持政变合法性的§Y事实政府学说§!。这种观点将§R“革命”§!视为一种常态，使得国家长期处于不稳定状态。"
 ARG_structural_unhingement: "结构性脱节"
 ARG_structural_unhingement_desc: "“长久以来，阿根廷最严重的痼疾在于其几乎一切存在形态的非真实性。由于缺乏坚实的文化根基，或是出于怯懦与安逸，在这个国度里，几乎所有人都在‘扮演角色’。国家机器宣称自己是一个完全正常甚至民主的国度，但显然所有人都习惯于伪装成非我的存在。这种真实国家与表象化、正式化、名义化国家之间的割裂，在政治领域暴露得最为彻底。”\n\n——巴勃罗·冈萨雷斯·贝尔赫斯博士"
 ARG_greekback_lira_blues: "美元-里拉蓝调"
 ARG_greekback_lira_blues_desc: "一种近乎病态的执念萦绕在阿根廷民众心头。无论是报纸头版、讽刺作家的开场独白，还是工会大会和商会论坛，总有一个话题能让所有关注经济未来的人不寒而栗——意大利里拉（在某些场合则是美元）与比索的汇率。\n\n尽管这种对外币价格的过度关注，部分源于媒体煽动性报道引发的抢购狂潮，但阿根廷经济固有的商业属性，使得外币汇率实际上成为了衡量经济交换条件与市场信心的晴雨表。正因如此，§j评判政府经济表现的首要标准，往往取决于特定时刻外币汇率的走势§!。"
 ARG_juan_domingo_el_ausente: "缺席的胡安·多明戈"
 ARG_juan_domingo_el_ausente_desc: "第一条 在阿根廷共和国境内，禁止以下行为：\n\n（一）使用可被合理解读为代表§Y庇隆主义§!人物或组织的图像、符号、标志、重要表述、学说、文章及艺术作品，以宣扬被推翻政权的意识形态。\n\n具体包括：使用§Y庇隆主义§!官员或其亲属的肖像或雕塑照片、§Y庇隆主义§!徽章与旗帜、被罢黜总统及其亲属的专有名称、§Y“庇隆主义”、“庇隆主义者”、“正义主义”、“正义主义者”、“第三位置”§!等表述、§YPP§!缩写、被推翻政权所颂扬的日期、《§Y庇隆主义§!进行曲》和《艾薇塔上尉》音乐作品或其片段，以及被罢黜总统及其夫人的演讲全文或其片段。\n\n（二）个人出于前款规定之目的，使用可关联至§Y庇隆主义§!代表性人物、组织及意识形态的图像、符号、标志、重要表述、学说、文章及艺术作品，包括现有和未来创作。\n\n1956年《第41/61号法令》"
 ARG_anarchy_in_the_army: "军队无序"
 ARG_anarchy_in_the_army_desc: "我们孤立无援，而这正愈演愈烈，我们自己参与的琐碎政治导致了这一局面。我在这里说的“我们”，指的是那些军队里的人们，交好多年，一直相信我们间有一个共同点，然而今天我们必须意识到，唯一把我们团结在一起来的是对庇隆的反对。我们间的分歧已经让我们元气大伤、四分五裂，更糟糕的是，这些分歧让我们颜面尽失、信誉全无。\n\n纪律已死，而正是我们将其扼杀。"
 ARG_navy_controlled_army: "海军揽军权"
 ARG_navy_controlled_army_desc: "事实证明，深陷于内部斗争的陆军已经无法阻止他们的传统敌人，阿根廷海军的操纵。依靠海军的支持摆脱了他们的对手后，陆军的高级将领们如今不得不向他们在舰队中的主子们报偿人情。\n\n虽然这一立场从根本上来说完全站不住脚，但就目前而言，海军可以自由地指挥黎民社稷，而不必担心其在军队中最强大的制衡力量的干涉。"
 ARG_reign_of_the_cavalry: "骑兵之治"
 ARG_reign_of_the_cavalry_desc: "当情况危急、迫不得已之时，上帝被证明站在大部队那一边。\n\n“红派”在军队中的地位被阿根廷骑兵的坦克部队终结这一事件，标志着长期以来感到被军队指挥结构忽略的支部领导的崛起。他们在此之后采取的第一项措施，就是对军队进行前所未有的大清洗，这导致了步兵和工兵部队的锐减。这场清洗以后，军队内几乎所有的高层职位都由蓝派骑兵与他们的炮兵盟友担任，这种情况预计将持续至少十年。"
 ARG_Eduardo_Gamond_eco_desc: "§Y经济部长\n社会激进主义§!"
 ARG_Ernesto_Sanmartino_hog_desc: "§Y内务部长\n自由激进主义§!"
 ARG_Arturo_Mathov_eco_desc: "§Y财政部长\n自由激进主义§!\n--------------\n§L在所有憎恶庇隆的人中，阿图罗·马托夫也可以算是最坚决反对这位倒台独裁者的那个人。这位俄裔犹太移民之子自庇隆政权初期便投身反抗，甚至参与多起针对庇隆的恐怖袭击。正是这种刻骨仇恨使他先加入激进公民联盟，后跻身梅嫩德斯内阁。\n\n自庇隆政权初期以来，马托夫已屡次证明自己有能力将庇隆阻挡在阿根廷国门之外。马托夫的意志即将面临新的考验，而他已做好准备直面挑战。§!"
 ARG_Federico_Pinedo_eco_desc: "§YMinister of Finance\nConservatism§!\n--------------\n§LJosé María Guido's favorite issue at campaign speeches for over 30 years was to talk badly about Federico Pinedo.\n\nA former Socialist - and later Independent Socialist - became the preferred economist of Argentine liberalism throughout the 1930s and 40s. Twice minister of finance during that period, his role in the sale of public utilities became particularly notorious of contemporary excesses, and gained him the ire of nationalists and intransigent Radicals alike.\n\nVirtually disappeared from politics for the next twenty years, Pinedo was brought back to his old post by recommendation of Rodolfo Martínez, which to Guido seemed more like a sick, ironic joke.§!"
 ARG_national_socialism_peron_party: "庇隆党 - 洛佩斯·雷加派"
 ARG_national_socialism_peron_party_long: "庇隆党 - 洛佩斯·雷加派(Partido Peronista - Lopezreguismo)"
 ARG_national_socialism_aramburu_party_long: "庇隆主义抵抗运动 - 塔夸拉(Resistencia Peronista - Tacuaras)"
 POLITICS_LEONDRO_ANAYA_DESC: "这位出生阿根廷军人世家的将领，如今却在南里奥格兰德州执行军务——第二军指挥官埃利维奥·莱安德罗·安纳亚的现状着实令人称奇。\n\n虽然对平定巴西南部局势充满干劲，但安纳亚心头总萦绕着被亏待的憋屈感。他父亲埃利维奥·卡洛斯曾任弗朗迪西政府的战争部长，堂兄莱安德罗也没被派来南里奥格兰德，相比之下自己仿佛低人一等。不过好在安纳亚最不缺的就是责任感。\n\n1951年，他参与梅嫩德斯发动的反庇隆政变后被革除军籍，两年后竟奇迹般复职晋升。1961年任帕斯将军高等军事学院副院长，1965年升任骑兵学校校长。六十年代末被任命为第二军司令后，恰逢共产党人莱昂内尔·布里佐拉控制南里奥格兰德，遂奉命率军跨境进驻。\n\n作为铁杆反共人士，安纳亚视建立防范巴西赤化的“隔离线”为己任，即便代价惨重也绝不让共产主义染指布宜诺斯艾利斯。尽管心有芥蒂，他坚信自己正在守护整个美洲的文明世界，不过私下也盘算着或许该在任务期间争取些地方支持。"
 ARG_Leandro_Anaya: "埃利维奥·莱安德罗·安纳亚"
 ARG_Carlos_Humberto_Perette: "卡洛斯·温贝托·佩雷特"
