 RULE_OPTION_KOM_FIRST_ELECTION_DEM_MAJORITY: "§B中间派§!联盟胜选 - §G大获全胜§!"
 RULE_OPTION_KOM_FIRST_ELECTION_DEM_MAJORITY_DESC: "§F§B中间派§!候选人将在选举中大获全胜，确保§M民主§!的力量主导科米共和国迈向£smuta §f大动乱时代§!。§!"
 RULE_OPTION_KOM_FIRST_ELECTION_DEM_PLURALITY: "§B中间派§!联盟胜选 - §R如履薄冰§!"
 RULE_OPTION_KOM_FIRST_ELECTION_DEM_PLURALITY_DESC: "§F§B中间派§!候选人只能选举中险胜，这将使科米的§M民主§!在极端派的§V政变§!面前显得岌岌可危。§!"
 RULE_OPTION_KOM_FIRST_ELECTION_LEFT_MAJORITY: "§x左派§!联盟胜选 - §G大获全胜§!"
 RULE_OPTION_KOM_FIRST_ELECTION_LEFT_MAJORITY_DESC: "§F来自§S科米共产党(改革派)§!的§S安德烈·日丹诺夫§!将在§x左翼§!联盟的支持下于选举中以§V革命阵线§!的姿态大获全胜。阵线得以重建一个与§V前苏联§!类似的苏维埃共和国，并大步迈向£smuta §f大动乱时代§!。§R在日丹诺夫巩固好左派于共和国的权力之后§!，他们将着手处理阵线内的各政治派系。§!"
 RULE_OPTION_KOM_FIRST_ELECTION_LEFT_PLURALITY: "§x左派§!联盟胜选 - §R如履薄冰§!"
 RULE_OPTION_KOM_FIRST_ELECTION_LEFT_PLURALITY_DESC: "§F来自§S科米共产党(改革派)§!的§S安德烈·日丹诺夫§!将在§x左翼§!联盟的支持下于选举中以§V革命阵线§!的姿态险胜。这使科米左派的愿景在右派§V政变§!的威胁前变得岌岌可危。§R在日丹诺夫足够巩固左派于共和国的权力之前§!，他们不得不先搁置派系争议。§!"
 RULE_OPTION_KOM_FIRST_ELECTION_RIGHT_MAJORITY: "§Y右派§!联盟胜选 - §G大获全胜§!"
 RULE_OPTION_KOM_FIRST_ELECTION_RIGHT_MAJORITY_DESC: "§F来自§n俄罗斯国民党§!的§n伊戈尔·沙法列维奇§!将在§Y右翼§!联盟的支持下于选举中大获全胜，践行§L民族保守主义§!。右派由此得以为共和国打造一个全新的右翼愿景，以迎接£smuta §f大动乱时代§!。§R在沙法列维奇巩固好右派在共和国的权力后§!，他们将着手处理右派内的各政治派系。§!"
 RULE_OPTION_KOM_FIRST_ELECTION_RIGHT_PLURALITY: "§Y右派§!联盟胜选 - §R如履薄冰§!"
 RULE_OPTION_KOM_FIRST_ELECTION_RIGHT_PLURALITY_DESC: "§F来自§n俄罗斯国民党§!的§n伊戈尔·沙法列维奇§!将在§Y右翼§!联盟的支持下于选举中险胜，践行§L民族保守主义§!。这使科米右派的愿景在左派§V政变§!的威胁前变得岌岌可危。§R在沙法列维奇足够巩固右派于共和国的权力之前§!，他们不得不先搁置派系争议。§!"
 KOM_NDA: "£TNO_game_rule_flag_KOM   右派科米 - 国民民主法案"
 RULE_OPTION_KOM_NDA_RANDOM: "默认 - AI随机"
 RULE_OPTION_KOM_NDA_RANDOM_DESC: "§F总统伊戈尔·沙法列维奇提出的《国家民主法案》将颠覆科米自西俄战争结束以来为人熟知的民主。法案将确保沙法列维奇向独裁者的转变过程无虞，并以“国家民主“之名揽大权于其一身，在把他推上权力的巅峰的同时，把他的对手、极端分子与民主派统统扫除出局。\n\n§R要求：§!\n在§Y£TNO_game_rule_flag_KOM 科米 - 军阀阶段总统大选§!中设定两种§M右派联盟胜选§!(大获全胜/如履薄冰)中的任意一个§!"
 RULE_OPTION_KOM_NDA_PASS: "议案§G通过§!"
 RULE_OPTION_KOM_NDA_PASS_DESC: "§F由于沙法列维奇及其亲信控制了科米议会，《国民民主法案》将顺利通过，这将巩固沙法列维奇在该国的权力，并使科米在他的领导下变为§s贵族保守主义§!国家。§!"
 RULE_OPTION_KOM_NDA_PASS_ILLEGAL: "议案§R违宪通过§!"
 RULE_OPTION_KOM_NDA_PASS_ILLEGAL_DESC: "§F虽然科米议会否决了沙法列维奇那份将科米转为独裁政权的决议，这个老学究已经积攒了足够的权力与影响力，从而在藐视议会决定的情况下强行签字通过法案。科米难逃被沙法列维奇§s贵族保守主义§!统治的命运，但针对他的§V政变§!的可能性亦§R有所增加§!。§!"
 KOM_FASH_SUCCESSOR: "£TNO_game_rule_flag_KOM_WARLORD_RIGHT   右派科米 - 权力斗争"
 RULE_OPTION_KOM_FASH_SUCCESSOR_RANDOM: "默认 - AI随机"
 RULE_OPTION_KOM_FASH_SUCCESSOR_RANDOM_DESC: "§F\n\n§R要求：§!\n§M右派科米§!的权力根基已经§G巩固§!，再无§Y政变风险§!§!"
 RULE_OPTION_KOM_FASH_SUCCESSOR_SHAFAREVICH: "£TNO_game_rule_flag_KOM_REGIONAL_SHAFAREVICH   §n沙法列维奇§!胜出"
 RULE_OPTION_KOM_FASH_SUCCESSOR_SHAFAREVICH_DESC: "§F来自§s俄罗斯国民党§!的§n伊戈尔·沙法列维奇§!将在科米右派胜利后的权力斗争中再度胜出。虽然与进取组织中的其他派系相比，他的执政更加温和、更偏向改革派，但新的俄罗斯国仍是个具俄罗斯民族主义价值观的极权国家。科米在未来将践行§s贵族保守主义§!。§!"
 RULE_OPTION_KOM_FASH_SUCCESSOR_GUMILYOV: "£TNO_game_rule_flag_KOM_REGIONAL_GUMILYOV    §O古米廖夫§!胜出"
 RULE_OPTION_KOM_FASH_SUCCESSOR_GUMILYOV_DESC: "§F§s进取组织§!的§O列夫·古米廖夫§!将在科米右派胜利后的权力斗争中胜出，死去的共和国将被改造成一个名为欧亚国的国家，提倡以俄罗斯民族及俄罗斯少数民族为优等种族的欧亚主义思想，并在其指导下建立一个农民被僭主统治，过着野蛮生活的封建国家。科米的未来将践行§s欧亚主义§!。§!"
 RULE_OPTION_KOM_FASH_SUCCESSOR_SEROV: "£TNO_game_rule_flag_KOM_REGIONAL_SEROV   §r谢罗夫§!胜出"
 RULE_OPTION_KOM_FASH_SUCCESSOR_SEROV_DESC: "§F§o秩序社会主义党§!的§r伊万·谢罗夫§!将在科米右派胜利后的权力斗争中胜出，他将按照秩序社会主义的原则建立一个名为俄罗斯民族苏维埃共和国的国家。秩序社会主义是马列主义与俄罗斯极端民族主义及其他极右意识形态结合而成的一种意识形态，科米将沿这条§o秩序社会主义§!的道路继续前进。§!"
 RULE_OPTION_KOM_FASH_SUCCESSOR_TABORITSKY: "£TNO_game_rule_flag_KOM_national_socialism §L塔博里茨基§!胜出"
 RULE_OPTION_KOM_FASH_SUCCESSOR_TABORITSKY_DESC: "§F来自§o帝俄复兴协会§!的§j谢尔盖·塔博里茨基§!在科米右派胜利后的权力斗争中取得了令人始料未及的胜利。他自称为死去已久的太子阿列克谢·罗曼诺夫的摄政，并要俄罗斯为其重登皇位做准备。由于阿列克谢迟迟未有现身，塔博里茨基执行了许多愈发严厉且惨无人道的残忍措施以“净化”俄罗斯。他先是以§o教权法西斯§!的方式统治科米，其后将施行§o帝国国教§!。§!"
 KOM_COMMIE_SUCCESSOR: "£TNO_game_rule_flag_KOM_WARLORD_LEFT   左派科米 - 权力斗争"
 RULE_OPTION_KOM_COMMIE_SUCCESSOR_RANDOM: "默认 - AI随机"
 RULE_OPTION_KOM_COMMIE_SUCCESSOR_RANDOM_DESC: "§F\n\n§R要求：§!\n§M左派科米§!的权力根基已经§G巩固§!，再无§Y政变风险§!§!"
 RULE_OPTION_KOM_COMMIE_SUCCESSOR_ZHDANOV: "£TNO_game_rule_flag_KOM_REGIONAL_ZHDANOV   §S日丹诺夫§!胜出"
 RULE_OPTION_KOM_COMMIE_SUCCESSOR_ZHDANOV_DESC: "§F§V苏联改革共产党(远视主义)§!的!§S安德烈·日丹诺夫§!在科米左派胜利后的权力斗争中胜出，他将建立一个带有未来主义色彩的科学昌明的苏维埃联邦。该国竭力追求最尖端的科学突破而甚少顾及伦理与实用性。科米将步向§V超视社会主义§!的未来。§!"
 RULE_OPTION_KOM_COMMIE_SUCCESSOR_BUKHARINA: "£TNO_game_rule_flag_KOM_RUSSIA_BUKHARINA   §l布哈林娜§!胜出"
 RULE_OPTION_KOM_COMMIE_SUCCESSOR_BUKHARINA_DESC: "§F§e苏联共产党(左派)§!的§l斯韦特兰娜·布哈林娜§!在科米左派胜利后的权力斗争中胜出，她将建立一个竭力追求进步主义，维护妇女权益及性别、性少数、性取向平等的苏维埃联盟，使其成为一个真正平等的联盟，不让任何一个人掉队。科米将步向§e左翼共产主义§!的未来。§!"
 RULE_OPTION_KOM_COMMIE_SUCCESSOR_SUSLOV: "£TNO_game_rule_flag_KOM_REGIONAL_SUSLOV   §x苏斯洛夫§!胜出"
 RULE_OPTION_KOM_COMMIE_SUCCESSOR_SUSLOV_DESC: "§F§e苏联共产党§!的!§x米哈伊尔·苏斯洛夫§!在科米左派胜利后的权力斗争中胜出，他将坚持其强硬路线，建立一个奉行正统马列主义，对修正主义毫不留情并竭力改变现状的苏维埃俄国。科米将步向§e布尔什维主义§!的未来。§!"
 KOM_SECOND_ELECTION: "£TNO_game_rule_flag_KOM   科米 - 地区阶段总统大选"
 RULE_OPTION_KOM_SECOND_ELECTION_RANDOM: "默认 - AI随机"
 RULE_OPTION_KOM_SECOND_ELECTION_RANDOM_DESC: "§F在多年的§V无序状态§!与§s军阀混战§!后，西俄罗斯终于在科米共和国的旗帜下归于一统，重燃§G民主§!俄罗斯的希望之火。随着西俄步入新的俄国再统一阶段，该地区将开始新一轮的选举。尽管充满混乱与暴力的选举已成过去式，这轮选举季的竞争依旧激烈。§P民主社会主义人民党§!、§M青年改革者联盟§!与§B主权民主党§!为共和国的权力激烈争斗，互不相让，只因最后的赢家或有幸能再统一俄罗斯，留芳百世。§!"
 RULE_OPTION_KOM_SECOND_ELECTION_DSNP: "§P民主社会主义人民党§!胜选"
 RULE_OPTION_KOM_SECOND_ELECTION_DSNP_DESC: "§F由§P沃兹涅先斯基§!领导的§P民主社会主义人民党§!将赢得选举。再度掌权后，他们将继续致力于向§V社会主义§!过渡。然而，大部分人都认为他们更像是在走§P改良社会主义§!的道路，奉行着温和的社会民主主义政策。§!"
 RULE_OPTION_KOM_SECOND_ELECTION_SMR: "§M青年改革者联盟§!胜选"
 RULE_OPTION_KOM_SECOND_ELECTION_SMR_DESC: "§F由§M康斯坦丁·卡图舍夫§!领导的§M青年改革者联盟§!将赢得选举。§M卡图舍夫§!的§M自由主义§!政府将督导一场迈向经济自由化与自由市场的§G经济改革§!。然而，人们有时会§R批评§!§M青年改革者联盟§!的改革脱离实际，并时常被他们为了未来所做的§G雄心勃勃的计划§!搞得眼花缭乱……§!"
 RULE_OPTION_KOM_SECOND_ELECTION_PSD: "§B主权民主党§!胜选"
 RULE_OPTION_KOM_SECOND_ELECTION_PSD_DESC: "§F尽管§B主权民主党§!常被贬为雄心勃勃的暴君，他们对极端主义的§s强硬态度§!，团结在§B大帐篷§!式政党下以§L民族主义§!和§s军国主义§!言辞许下的迅速结束俄罗斯目前困境的承诺，还是成功动摇了不少选民投票给他们。结果，§B斯韦特兰娜·斯大林娜§!领导的§B主权民主党§!将赢得选举。§!"
 KOM_THIRD_ELECTION: "£TNO_game_rule_flag_KOM   科米 - 超地区阶段总统大选"
 RULE_OPTION_KOM_THIRD_ELECTION_RANDOM: "默认 - AI随机"
 RULE_OPTION_KOM_THIRD_ELECTION_RANDOM_DESC: "§F俄罗斯的大选季又到了！再统一的进程继续稳步前进，相较于在瑟克特夫卡尔的时候的卑微，现在的共和国已经成长壮大起来了。尽管§G年轻的民主制§!在其短暂的历史中已经见证过千变万化，它对民主的承诺始终如一。已为国民熟悉的那三个政党，§P民主社会主义人民党§!、§M青年改革者联盟§!和§B主权民主党§!又要开始为大选开始龙争虎斗了。众人都很清楚，只要共和国近年的胜利能持续下去，本场大选的赢家就会成为俄罗斯的统一者，就此载入史册……§!"
 RULE_OPTION_KOM_THIRD_ELECTION_DSNP: "§P民主社会主义人民党§!胜选"
 RULE_OPTION_KOM_THIRD_ELECTION_DSNP_DESC: "§F在§P民主社会主义§!者§P亚历山大·雅科夫列夫§!领导下的§P民主社会主义人民党§!将在选举中获胜。作为党派内的新面孔，§P雅科夫列夫§!在寻求与§MOFN§!更紧密的联合的同时，也会持续推进共和国的公共工程。§!"
 RULE_OPTION_KOM_THIRD_ELECTION_SMR: "§M青年改革者联盟§!胜选"
 RULE_OPTION_KOM_THIRD_ELECTION_SMR_DESC: "§F§M康斯坦丁·卡图舍夫§!领导的§M青年改革者联盟§!将在超地区阶段统一后当选，科米将走上§M自由主义§!之路。随着§M自由主义§!时代的到来，§M青年改革者联盟§!逐渐右倾，更大程度上投入§G经济自由化§!的怀抱。§M卡图舍夫§!继续兑现他对俄罗斯经济复兴许下的郑重承诺，时间会证明他雄心勃勃的政纲会否结出硕果。§!"
 RULE_OPTION_KOM_THIRD_ELECTION_PSD: "§B主权民主党§!胜选"
 RULE_OPTION_KOM_THIRD_ELECTION_PSD_DESC: "§F§B斯韦特兰娜·斯大林娜§!领导的§B主权民主党§!将在超地区阶段统一后当选，科米将走上§B自由保守主义§!之路。随着祖国统一战争迫在眉睫，§B斯大林娜§!强烈的§L民族主义§!情绪似乎俘获了俄罗斯人民的心。§B主权民主党§!的目标不止限于仍然分裂的领土，这个§B大帐篷§!党还承诺铲除在西伯利亚这片最近被解放的土地上的§e共产党§!与§q黑色联盟§!残余。§!"
 VYT_ROUTE: "£TNO_game_rule_flag_VYT   维亚特卡 - 选举"
 RULE_OPTION_VYT_ROUTE_RANDOM: "默认 - AI随机"
 RULE_OPTION_VYT_ROUTE_RANDOM_DESC: "§F在维亚特卡的君主主义者成功统一西俄罗斯后，沃洛格达将举行会议，以决定俄罗斯未来的道路。会议过程中，各派别之间可能会出现严重分歧，但无论结果如何，沃洛格达大会都将具有重大历史意义，它将在俄罗斯建立四十年来第一个正式的君主制政府。§!"
 RULE_OPTION_VYT_ROUTE_KADET: "§M立宪民主党§!胜出"
 RULE_OPTION_VYT_ROUTE_KADET_DESC: "§F令许多人，尤其是那些虔信维亚特卡是一个君主制国家的人震惊的是，§M自由主义§!居然会在沃洛格达大会中取胜。立宪民主党，简称K-D，将获得最多代表席位并组建政府。这些§M自由主义者§!将会把早就设想的§G改革§!付诸实施，重点关注社会流动性和个人自由。§!"
 RULE_OPTION_VYT_ROUTE_SHULGIN: "§i全俄民族联盟§!胜出"
 RULE_OPTION_VYT_ROUTE_SHULGIN_DESC: "§F沃洛格达大会在§M改革派§!与§L反动派§!中挑选了一条中道，最终选中了§i保守§!的§i瓦西里·舒利金§!的全俄罗斯民族联盟。终于获得他们期盼已久的、近乎亘古不渝的权力之后，他们将采取行动，拱卫并加强君主制度，将沙皇的意志置于所有政府政策的中心。此外，正如预期，他们将以无情的态度推动民族主义的统一政策。§!"
 RULE_OPTION_VYT_ROUTE_SOLIDARIST: "§L协作主义者§!胜出"
 RULE_OPTION_VYT_ROUTE_SOLIDARIST_DESC: "§F正如许多人所预料的那样，在这样一个位于西俄罗斯的君主制政体之中，§L反动§!思想必然占据上风。在许多§M自由派§!候选人的关注下，经过沃洛格达大会的数周辩论，强硬§L家长制§!政党、§L亚历山大·索尔仁尼琴§!领导的协作主义民族联盟取得胜利。§L协作主义者§!声称支持公民自由和民主价值，同时也希望提高俄罗斯东正教的地位，并加强阶级合作。§!"
 PRM_IDEOLOGY_ROUTE: "£TNO_game_rule_flag_PRM   雅利安兄弟会 - 正道雅利安抑或异教重生"
 RULE_OPTION_PRM_IDEOLOGY_ROUTE_RANDOM: "默认 - AI随机"
 RULE_OPTION_PRM_IDEOLOGY_ROUTE_RANDOM_DESC: "§F雅利安兄弟会由一群极右翼狂徒组建而成，建立在纳粹德国雅利安至上主义意识形态的扭曲版本之上，他们并不把雅利安主义局限于种族的生理概念，而是将其上升到了至高的精神境界。在古特鲁姆·瓦格纳的宰制下，兄弟会狂热地模仿并推广着雅利安文化与阶层分理，又或者说，他们要利用这一理念，来帮助俄罗斯实现“雅利安化”，还要和德国人平起平坐……但是雅利安人究竟是什么，兄弟会的成员对此意见不一。§!"
 RULE_OPTION_PRM_IDEOLOGY_ROUTE_NATSOC: "£TNO_game_rule_flag_PRM   瓦格纳凯旋"
 RULE_OPTION_PRM_IDEOLOGY_ROUTE_NATSOC_DESC: "§F雅利安兄弟会扩张至地区阶段，权力斗争也随之在狂热的瓦格纳和疯狂的叶梅利扬诺夫之间展开，以决定雅利安人身份的定义。最终，瓦格纳将赢得胜利。清除对手之后，他将在没有内部反对的情况下自由地实施他的野望，瓦格纳将遵循§o民族社会主义§!的理想，继续实施镇压和消灭大多数俄罗斯人口的政策。§!"
 RULE_OPTION_PRM_IDEOLOGY_ROUTE_ULTNAT: "£TNO_game_rule_flag_PRM_hyperborea_regional   叶梅利扬诺夫胜出"
 RULE_OPTION_PRM_IDEOLOGY_ROUTE_ULTNAT_DESC: "§F雅利安兄弟会扩张至地区阶段，权力斗争也随之在狂热的瓦格纳和疯狂的叶梅利扬诺夫之间展开，以决定雅利安人身份的定义。最终，叶梅利扬诺夫将出人意料地取得胜利。叶梅利扬诺夫主张一种极端理论，认为斯拉夫人才是真正的雅利安种族，而德国人是锡安主义的傀儡。他将自称韦利米尔，宣布建立一个狂热的俄罗斯异教国家——许珀耳玻瑞亚，一个按照§I斯拉夫-雅利安主义§!组织起来的国家。§!"
 SAM_SUCCESSOR: "£TNO_game_rule_flag_SAM   萨马拉 - 弗拉索夫的选择"
 RULE_OPTION_SAM_SUCCESSOR_RANDOM: "默认 - AI随机"
 RULE_OPTION_SAM_SUCCESSOR_RANDOM_DESC: "§F§s俄罗斯解放军§!顶住重重困难，终于统一了西俄罗斯，此时头顶旗帜高挂，屹立于悬崖之巅。但是，指挥官§s安德烈·弗拉索夫§!已经年迈，一场关乎继位者身份的角逐正在权力的殿堂中展开。三位高级将领，§s谢尔盖·布尼亚琴科§!、§L米列季·济科夫§!和§o弗拉基米尔·阿尔采佐§!，各自积蓄实力、结党营私，为即将到来的权力斗争做着准备。§s俄罗斯解放军§!将成为§G解放§!之军，还是悦纳自己§R狡诈俄奸§!的名头？§!"
 RULE_OPTION_SAM_SUCCESSOR_ZYKOV: "§L济科夫§!§G受选§!"
 RULE_OPTION_SAM_SUCCESSOR_ZYKOV_DESC: "§F他的过去无人知晓，但野心勃勃的宣传大师§L米列季·济科夫§!仍然俘获了俄罗斯人民解放委员会的芳心，如今的他希望承担起伟大的事业，将§Y民主§!引入§s俄罗斯解放军§!新生的国家。§L济科夫§!很受人民欢迎，他可以在常人不屑一顾之处与民亲近，让人民百依百顺地支持他的§G自由化§!倡议。然而，也有许多怀疑§L济科夫§!诚意的声音，怕他是要建一个百分百受他一人把持的§Y民主§!体制。若弗拉索夫选济科夫为接班人，萨马拉将成为§L无支配体制§!国家，直到弗拉索夫去世。§!"
 RULE_OPTION_SAM_SUCCESSOR_BUNYACHENKO: "§s布尼亚琴科§!§G受选§!"
 RULE_OPTION_SAM_SUCCESSOR_BUNYACHENKO_DESC: "§F§s俄罗斯人民解放委员会§!显然会选§s谢尔盖·布尼亚琴科§!，然后就这么选择了他。一开始，委员会视这位出色将领为理想的接班人，打算把他当傀儡总统，随心所欲地加以操纵；但§s布尼亚琴科§!压根就不打算乖乖听话——不论是委员会，还是§q德国佬§!。§s布尼亚琴科§!挣断缰绳，为独裁统治打好地基，着手在俄罗斯打造强大的军工复合体。这一切的一切，都是为了将§s俄罗斯解放军§!塑造为一支能与§q德国国防军§!正面对决的军事力量。若弗拉索夫选布尼亚琴科为接班人，萨马拉将成为§s军政府§!国家，直到弗拉索夫去世。§!"
 SAM_ROUTE: "£TNO_game_rule_flag_SAM   萨马拉 - 弗拉索夫的接班人"
 RULE_OPTION_SAM_ROUTE_RANDOM: "默认 - AI随机"
 RULE_OPTION_SAM_ROUTE_RANDOM_DESC: "§F在游戏中，萨马拉的领袖弗拉索夫要做的第一件事就是挑选接班人。第一位候选人是谢尔盖·布尼亚琴科，曾是红军将领，被德国人俘虏后加入俄罗斯解放军。由于阵线把失败归咎于他，布尼亚琴科发誓要摧毁在他最需要的时候背弃他的阵线。如果当上接班人，他将把俄罗斯打造成一个强大的威权共和国。第二个选择是弗拉索夫的亲信，米列季·济科夫，他的真实动机不为人知。不管他到底是一个孟什维克共和派，还是（最差的情况下）一个想要破坏委员会的布尔什维克间谍，只要弗拉索夫选中他，他就会尝试把俄罗斯改革成一个类似于被布尔什维主义摧毁的、克伦斯基式的资产阶级民主国家。最后一位候选人是弗拉基米尔·阿尔采佐，代表着普通俄罗斯人眼中委员会的一切刻板印象：阴险狡诈、投机取巧、贪污腐化等等。若是得到弗拉索夫的任命，他将把俄罗斯变成法西斯独裁国家。§!"
 RULE_OPTION_SAM_ROUTE_ZYKOV: "§L济科夫§!接权"
 RULE_OPTION_SAM_ROUTE_ZYKOV_DESC: "§F在民主派的呼声中，前记者、宣传部长济科夫被任命为俄罗斯人民解放委员会主席。他解散了委员会，创建了自己的政党，并引入工会，将民主带给新生的俄罗斯共和国，振兴经济，使贫困率显著降低。然后，他将正式宣布他的国家不再是德国的傀儡，并与几个反德盟友建立外交关系。萨马拉将成为§L无支配体制§!国家。§!"
 RULE_OPTION_SAM_ROUTE_BUNYACHENKO: "§s布尼亚琴科§!接权"
 RULE_OPTION_SAM_ROUTE_BUNYACHENKO_DESC: "§F那些期望继续实行军事统治与军官进一步集权的人聚集在布尼亚琴科将军身侧，将他们的立场强加于年事已高的弗拉索夫。他主要着眼于俄罗斯工业和军队发展，同时并非彻底罔顾民用需求。此外他将与日本方面交好，以期向德国复仇。萨马拉将步向§s文官独裁§!的未来。§!"
