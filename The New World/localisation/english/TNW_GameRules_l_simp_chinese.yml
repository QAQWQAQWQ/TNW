 RULE_OPTION_TYM_LEADER_ROUTE_RANDOM_DESC: "§F§e拉扎尔·卡冈诺维奇§!和他的§E西西伯利亚人民共和国§!在其短暂的历史中经历过许多挫折。新的时代已经到来，但这国度却好似它旧日的影子，被野心军阀闹得是四分五裂。现如今，逆流已然倒转，以§R红军§!之勇、以§e拉扎尔§!承故§e约瑟夫·斯大林§!§V社会主义§!理想之诚，共和国终于复归完璧。然而，就在人民为西西伯利亚重归和平而欢歌乐舞的同时，也冒出了不满的声音。§e尼基塔·赫鲁晓夫§!§R反对§!§e卡冈诺维奇§!对斯大林主义的解释，开始审视自己与主席的伙伴关系。铁人§e拉扎尔§!将继续大权独揽，还是会被野心勃勃的下属一脚踹翻？§!"
 RULE_OPTION_TYM_LEADER_ROUTE_KAGANOVICH: "£TNO_game_rule_flag_TYM_SIB   §e卡冈诺维奇§!没有背叛斯大林主义"
 RULE_OPTION_TYM_LEADER_ROUTE_KAGANOVICH_DESC: "§F无视越来越多的反对意见，§e卡冈诺维奇§!将继续执掌权力，推行§e强硬§!路线，依自己的意志塑造§e马列主义§!。这种新型§V社会主义§!思想断然采取§L威权主义§!，§Y增加§!国安部门的权力，对一切被控反对主席利益的人进行§Y严酷§!审查。与此同时，§e卡冈诺维奇§!将启动一系列雄心勃勃的建设项目。§!"
 RULE_OPTION_TYM_LEADER_ROUTE_KHRUSHCHEV: "£TNO_game_rule_flag_TYM_SIB   §e赫鲁晓夫§!政变"
 RULE_OPTION_TYM_LEADER_ROUTE_KHRUSHCHEV_DESC: "§F§Y偏执§!与怀疑让§e卡冈诺维奇§!把反对§e尼基塔·赫鲁晓夫§!的政治斗争玩砸了，结果是一场政变。这之后，§e赫鲁晓夫§!上台掌权，并按照自己的方式朝着§G理想§!的§e马列主义§!继续前进。他这个版本的社会主义较§e卡冈诺维奇§!所持的§L威权§!、独断态度要更为温和，同时还进行了经济与农业§G改革§!。§!"
