 UKRAINE_CIVIL_WAR_OUTCOME: "£TNO_game_rule_flag_UKR  £TNO_game_rule_flag_UKS  £TNO_game_rule_flag_BOV  £TNO_game_rule_flag_FUK   乌克兰内战"
 RULE_OPTION_UKRAINE_CIVIL_WAR_OUTCOME_RANDOM: "默认 - AI随机"
 RULE_OPTION_UKRAINE_CIVIL_WAR_OUTCOME_RANDOM_DESC: "§F乌克兰卷入了内战——她琥珀般肥沃的田地被鲜血浸润，天空中弥漫着令人窒息的灰烬。§o乌克兰专员辖区§!必将与§V乌克兰苏维埃社会主义共和国§!、§q乌克兰国§!与§M乌克兰人民共和国§!交锋，而后三者也将兵刃相向。战场将决定乌克兰的命运。在本条规则选项中被选中的一方将获得§G大量战斗加成§!，将§M乌§!§f克兰§!的命运镌于石上。§!"
 RULE_OPTION_UKRAINE_CIVIL_WAR_OUTCOME_UKR: "£TNO_game_rule_flag_UKR   §i乌克兰专员辖区§!胜利"
 RULE_OPTION_UKRAINE_CIVIL_WAR_OUTCOME_UKR_DESC: "§F乌克兰卷入了内战——她琥珀般肥沃的田地被鲜血浸润，天空中弥漫着令人窒息的灰烬。在一片混乱中，乌克兰专员辖区将在较为温和的改革派专员§o格奥尔格·莱布兰特§!和“安全委员会”的领导下获胜。乌克兰的意识形态将变为§o罗森贝格理念§!。§!"
 RULE_OPTION_UKRAINE_CIVIL_WAR_OUTCOME_UKS: "£TNO_game_rule_flag_UKS   §E乌克兰苏维埃社会主义共和国§!胜利"
 RULE_OPTION_UKRAINE_CIVIL_WAR_OUTCOME_UKS_DESC: "§F乌克兰卷入了内战——她琥珀般肥沃的田地被鲜血浸润，天空中弥漫着令人窒息的灰烬。由§e亚历山大·舒姆斯基§!领导的§E乌克兰苏维埃社会主义共和国§!赢得了胜利，并准备与纳粹侵略者奋战到底，直到乌克兰的无产阶级无需为了自由而斗争为止。乌克兰将成为§e民族共产主义§!国家。§!"
 RULE_OPTION_UKRAINE_CIVIL_WAR_OUTCOME_BOV: "£TNO_game_rule_flag_BOV   §q乌克兰国§!获胜"
 RULE_OPTION_UKRAINE_CIVIL_WAR_OUTCOME_BOV_DESC: "§F乌克兰卷入了内战——她琥珀般肥沃的田地被鲜血浸润，天空中弥漫着令人窒息的灰烬。§q德米特里·克利亚奇基夫斯基§!领导下的§q乌克兰国§!击败了所有敌人，并准备清除乌克兰土地上的一切“寄生虫”，以实现班杰拉的梦想，建立一个西至喀尔巴阡、东至库班的乌克兰。乌克兰将成为§q军国体制§!国家。§!"
 RULE_OPTION_UKRAINE_CIVIL_WAR_OUTCOME_FUK: "£TNO_game_rule_flag_FUK   §m乌克兰人民共和国§!胜利"
 RULE_OPTION_UKRAINE_CIVIL_WAR_OUTCOME_FUK_DESC: "§F乌克兰卷入了内战——她琥珀般肥沃的田地被鲜血浸润，天空中弥漫着令人窒息的灰烬。在§L尤里·戈尔利斯§!领导下的§m乌克兰人民共和国§!最终解放了乌克兰，并准备举行自由选举，归还乌克兰人民曾被苏维埃和纳粹剥夺的民主。乌克兰的命运将由她的§L临时政府§!决定。§!"
 OSTLAND_CIVIL_WAR_OUTCOME: "£TNO_game_rule_flag_OST_national_socialism   东方领内战"
 RULE_OPTION_OSTLAND_CIVIL_WAR_OUTCOME_RANDOM: "默认 - 无增强"
 RULE_OPTION_OSTLAND_CIVIL_WAR_OUTCOME_RANDOM_DESC: "§F东方专员辖区是德国的模范殖民地，也是德国所有殖民地中稳定度最高、日耳曼化程度最高、利润最高的殖民地，而欣里希·洛泽正是一位将团结一致与卓越统治结合在一起的人，这也铸成了日耳曼尼亚的掌上明珠。然而，由于他的健康每况愈下，到1962年，他的光芒已逐渐暗淡。希特勒于1963年10月去世后不久，洛泽也将因心脏病发作而去世，这将引爆一场权力斗争，将专员辖区拖入残酷的内战中。§!\n\n§G被选中的一方将在东方领内战期间获得大量战斗加成。§!"
 RULE_OPTION_OSTLAND_CIVIL_WAR_OUTCOME_OST_STAHLECKER: "£TNO_game_rule_flag_OST_national_socialism   施塔勒克胜利"
 RULE_OPTION_OSTLAND_CIVIL_WAR_OUTCOME_OST_STAHLECKER_DESC: "§F弗朗茨·瓦尔特·施塔勒克一方将在内战中获得大量加成。内战后，施塔勒克东方领将成为§o民族社会主义§!国家。§!"
 RULE_OPTION_OSTLAND_CIVIL_WAR_OUTCOME_DST_DRECHSLER: "£TNO_game_rule_flag_DST   德雷克斯勒胜利"
 RULE_OPTION_OSTLAND_CIVIL_WAR_OUTCOME_DST_DRECHSLER_DESC: "§F奥托-海因里希·德雷克斯勒一方将在内战中获得大量加成。内战后，德雷克斯勒东方领将成为§o军政纳粹主义§!国家。§!"
 RULE_OPTION_OSTLAND_CIVIL_WAR_OUTCOME_MST_MEYER: "£TNO_game_rule_flag_MST   迈尔胜利"
 RULE_OPTION_OSTLAND_CIVIL_WAR_OUTCOME_MST_MEYER_DESC: "§F安德烈亚斯·迈尔-兰德鲁特一方将在内战中获得大量加成。内战后，迈尔-兰德鲁特东方领的政治体制将变为§L寡头制§!。§!"
 RULE_OPTION_OSTLAND_CIVIL_WAR_OUTCOME_JST_JECKELN: "£TNO_game_rule_flag_JST   耶克尔恩胜利"
 RULE_OPTION_OSTLAND_CIVIL_WAR_OUTCOME_JST_JECKELN_DESC: "§F弗里德里希·耶克尔恩一方将在内战中获得大量加成。内战后，耶克尔恩东方领将成为§h勃艮第体制§!的国家。§!"
 RULE_OPTION_OSTLAND_CIVIL_WAR_OUTCOME_UPO_KOVNER: "£TNO_game_rule_flag_UPO   科夫纳胜利"
 RULE_OPTION_OSTLAND_CIVIL_WAR_OUTCOME_UPO_KOVNER_DESC: "§F阿巴·科夫纳一方将在内战中获得大量加成。内战后，科夫纳东方领将由§s游击运动§!统治。§!"
 RULE_OPTION_OSTLAND_CIVIL_WAR_OUTCOME_BLR_VITUSKA: "£TNO_game_rule_flag_BLR   维图什卡胜利"
 RULE_OPTION_OSTLAND_CIVIL_WAR_OUTCOME_BLR_VITUSKA_DESC: "§F米哈尔·维图什卡一方将在内战中获得大量加成。内战后，维图什卡东方领将成为§o民族社会主义§!国家。§!"
