 IRE_INVESTIGATION: "£TNO_game_rule_flag_IRE   爱尔兰 - 调查"
 RULE_OPTION_IRE_INVESTIGATION_RANDOM: "默认 - AI随机"
 RULE_OPTION_IRE_INVESTIGATION_RANDOM_DESC: "§F爱尔兰政府将试图揭露一起爱尔兰政府内的强硬派成员阴谋向§s爱尔兰公民卫队§!提供武器，以在都柏林发动推翻§L政府§!政变的阴谋。§!"
 RULE_OPTION_IRE_INVESTIGATION_BRIGADIER_COUP: "调查§G成功§! - 准将§R政变§!"
 RULE_OPTION_IRE_INVESTIGATION_BRIGADIER_COUP_DESC: "§F对§R阿尔斯特武装冲突危机§!的调查成功了。北郡特区将颁布戒严法来清除所有准军事组织。§g布莱尼§!被捕，但在受审之前，§s詹姆斯·凯利准将§!将向§L勒马斯§!发动政变，以防止自己被牵连。这将让爱尔兰变为§s亲德§!政权，§g布莱尼§!将成为准将的傀儡。§!"
 RULE_OPTION_IRE_INVESTIGATION_GOOD_FRIDAY: "调查§G成功§! - §G协议达成§!"
 RULE_OPTION_IRE_INVESTIGATION_GOOD_FRIDAY_DESC: "§F对§R阿尔斯特武装冲突危机§!的调查成功了。§L佩斯利§!和§e图米§!都将被逮捕，并被迫进行谈判和妥协。他们将达成协议，§L爱尔兰§!离开§s团结协定§!，准军事组织也将求和。§!"
 RULE_OPTION_IRE_INVESTIGATION_CASEMATE: "调查§G成功§! - §R起义爆发§!"
 RULE_OPTION_IRE_INVESTIGATION_CASEMATE_DESC: "§F对§R阿尔斯特武装冲突危机§!的调查成功了。§e图米§!将遭到暗杀，这将导致北爱尔兰出现权力真空，§L佩斯利§!领导的§L阿尔斯特志愿军§!发动起义，接管阿尔斯特。爱尔兰将被迫与阿尔斯特开战。§!"
 RULE_OPTION_IRE_INVESTIGATION_TWOMEY_WAR: "调查§R失败§! - §R战争降临§!"
 RULE_OPTION_IRE_INVESTIGATION_TWOMEY_WAR_DESC: "§F对§R阿尔斯特武装冲突危机§!的调查失败了。§e爱尔兰共和军§!的阴谋成功，他们将发动起义，并接管阿尔斯特。§L勒马斯§!将对§e爱尔兰共和军§!开战。§!"
 RULE_OPTION_IRE_INVESTIGATION_TWOMEY_NEGOTIATION: "调查§R失败§! - §G谈判达成§!"
 RULE_OPTION_IRE_INVESTIGATION_TWOMEY_NEGOTIATION_DESC: "§F对§R阿尔斯特武装冲突危机§!的调查失败了。§e爱尔兰共和军§!的阴谋成功了，他们将发动起义并接管阿尔斯特。§L勒马斯§!将同意他们的要求，§L爱尔兰§!离开§e团结协定§!，失去所有§o德国§!的经济支持，但阿尔斯特将重新回归。§!"
