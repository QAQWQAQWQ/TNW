 RULE_OPTION_DOM_CEASEFIRE_RANDOM_DESC: "§F\n\n§R要求：§!\n£TNO_game_rule_flag_DOM   £TNO_game_rule_flag_CAL   §Y普拉塔港入侵§!中预设§M停火§!§!"
 RULE_OPTION_DOM_CEASEFIRE_BALAGUER: "支持§L巴拉格尔§!"
 RULE_OPTION_DOM_CEASEFIRE_BALAGUER_DESC: "§F在§j多米尼加共和国§!的停火协议中，§M美国§!将支持华金·巴拉格尔，罔顾其基本原则，将利益和安全放在首位。尽管这让§M美国§!的传统盟友和该地区的独裁政权舒了口气，但对于拉丁美洲的其他国家，特别是§g墨西哥§!和§g古巴§!而言，这无异于一记耳光。§!"
 RULE_OPTION_DOM_CEASEFIRE_LEGION: "支持§L加勒比军团§!"
 RULE_OPTION_DOM_CEASEFIRE_LEGION_DESC: "§F§M美国§!铭记其革命与斗争的历史，将支持§g加勒比军团§!的反法西斯自由战士。这一事件将在拉丁美洲掀起轩然大波，§M民主政权§!和§g非共产主义革命者§!对此举表示赞赏。与此同时，该地区的小独裁者将继续向欧洲和日本的§o法西斯主义§!政权靠拢。§!"
