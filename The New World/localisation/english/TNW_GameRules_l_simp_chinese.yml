 IBR_STABILITY_ROUTE: "£TNO_game_rule_flag_IBR   伊比利亚联盟 - （不）稳定度"
 RULE_OPTION_IBR_STABILITY_ROUTE_RANDOM: "默认 - AI随机"
 RULE_OPTION_IBR_STABILITY_ROUTE_RANDOM_DESC: "§F从很多方面来讲，§w伊比利亚联盟§!从一开始就是个疯狂的想法，两国只是因为害怕德国侵略而抱作一团，为一场从未到来的战争做准备。现在的联盟摇摇欲坠、极其不稳，内部充斥分离主义团体，一步踏错就可能把它推到崩溃的边缘。如何界定联盟性质将是未来十年必须面对的关键问题——不论是要建成§G正常运转的联盟§!，或是实现§L未曾实现的乌托邦愿景§!，还是迎来§x崩溃之后的血腥余震……§!\n§Y默认情况下，§w伊比利亚联盟§!的稳定度将由AI行动控制§!。§!"
 RULE_OPTION_IBR_STABILITY_ROUTE_STABLE: "£TNO_game_rule_flag_IBR   联盟§G幸存§!"
 RULE_OPTION_IBR_STABILITY_ROUTE_STABLE_DESC: "§F十年之中，§w伊比利亚联盟§!注定要面对惊涛骇浪，但她终将拨云见日。这艘巨轮或许时有颠簸动荡，掌舵之人或许会遭遇触礁之险，但凭着反游击活动与§G团结一心的意志§!，联盟将得以存续，茁壮成长。她不再是人们眼中的权宜之计或是无奈选择，而将成为§O雄踞一方的崭新国度§!。§w伊比利亚联盟§!将劈波斩浪，将伊比利亚半岛上许多不同的民族团结在§O一面旗帜§!之下。§!"
 RULE_OPTION_IBR_STABILITY_ROUTE_DIVORCE: "£TNO_game_rule_flag_SPA  £TNO_game_rule_flag_POR   伊比利亚§Y分家§!"
 RULE_OPTION_IBR_STABILITY_ROUTE_DIVORCE_DESC: "§F§w伊比利亚联盟§!内部十分不稳，而且一直内耗。联盟最初是为了抵御可能的§s德国§!入侵而成立，但自那之后就日渐衰落。彼此冲突的行政命令、族裔冲突以及§K萨拉查§!与§O佛朗哥§!拿来互相攻击的否决权，正一步一步撕裂整个§Y联盟§!——或许这也不是个坏结局。§K萨拉查§!和§O佛朗哥§!经过谈判决定将§w伊比利亚联盟§!分割为最初的两个组成单元，以促进§w伊比利亚地区§!稳定。§!"
 RULE_OPTION_IBR_STABILITY_ROUTE_COLLAPSE: "£TNO_game_rule_flag_IBR  £TNO_game_rule_flag_POR  £TNO_game_rule_flag_GNS  £TNO_game_rule_flag_SPR_Republic  £TNO_game_rule_flag_SPS_Falangist   联盟§R崩溃§!"
 RULE_OPTION_IBR_STABILITY_ROUTE_COLLAPSE_DESC: "§F§w伊比利亚联盟§!在连环危机中越陷越深，每一场风波都是加速衰落的催化剂。仓促出台的补救措施，既无力挽回民众信任，更被国际社会视作政坛笑柄。最终，一次史无前例的§R政策失控§!引爆所有矛盾，这个早已丧失合法性的§w畸形政体§!，最终在电闪雷鸣的午夜时分§x土崩瓦解§!。§!"
 IBR_POLITICAL_IBERIAN_COUNCIL: "£TNO_game_rule_flag_IBR   伊比利亚联盟 - 委员会的地位"
 RULE_OPTION_IBR_IBERIAN_COUNCIL_RANDOM: "默认 - AI随机"
 RULE_OPTION_IBR_IBERIAN_COUNCIL_RANDOM_DESC: "§F§O弗朗西斯科·佛朗哥§!和§K安东尼奥·萨拉查§!同意组成§Y伊比利亚委员会§!的时候，会有一场关于这个委员会如何运作的辩论。伊比利亚政坛的所有人都同意目前的联盟已经失调，但上层人士担心这个委员会获得过多影响力。他们会争辩说这个委员会只能起咨询作用，给§O考迪§!§K罗们§!提供建议，只有他们两人才能决策定调。其他人则认为现在应该缓解民众的担忧，至少为这么一个橡皮图章放个烟雾弹。\n§Y默认情况下，他们的决定会是随机而定。§!§!"
 RULE_OPTION_IBR_POLITICAL_IBERIAN_LEGISLATIVE_COUNCIL: "§G立法委员会§!"
 RULE_OPTION_IBR_POLITICAL_IBERIAN_LEGISLATIVE_COUNCIL_DESC: "§F一小段讨论后，§O考迪§!§K罗们§!得出结论，伊比利亚委员会应当拥有§w立法权§!，有权提出一些政策措施。尽管这一举措离尽善尽美相去甚远，距离民主也有很长的距离，每位委员要想取得资格必须符合苛刻条件，严格遵守规则，还会在当选后受到严格监督。这一切的一切都把他们变成了§O佛朗哥§!与§K萨拉查§!忠实的§Y橡皮图章§!。而且，两位考迪罗仍有可能在不满委员会作为时废黜委员会。不过，这也的确可能是通向自由伊比利亚的第一步。§!"
 RULE_OPTION_IBR_POLITICAL_IBERIAN_ADVISORY_COUNCIL: "§Y咨询委员会§!"
 RULE_OPTION_IBR_POLITICAL_IBERIAN_ADVISORY_COUNCIL_DESC: "§F§O考迪§!§K罗们§!得出结论，委员会最适宜的角色是他们二人§f的顾问机构§!。做出决定后，§O考迪§!§K罗们§!将起草一份名单，从伊比利亚政界搜罗各类应声虫和忠臣加入§Y伊比利亚委员会§!，最大程度避免委员会偏离二人的意志。但即便如此，委员会的存续亦然压力重重，遭到撤销的威胁始终居高不下。纵使委员会能证明它对§O考迪§!§K罗们§!有所助益，可能也只是后者贯彻其意志的趁手工具而已。§!"
 IBR_POLITICAL_ROUTE: "£TNO_game_rule_flag_IBR   伊比利亚联盟 - 政治"
 RULE_OPTION_IBR_POLITICAL_ROUTE_RANDOM: "默认 - AI随机"
 RULE_OPTION_IBR_POLITICAL_ROUTE_RANDOM_DESC: "§F§O伊比利亚§!体制中的缺陷将招致一系列政治动荡，人们对于§Y领导层与立法机构§!等关键机构的质疑愈演愈烈。他们认为，围绕两位权力相当的考迪罗构建起的威权体制难以为继，因此自由化改革势在必行。虽然某些改革不得不做，但§K萨拉查§!和§O佛朗哥§!肯定会抗拒任何可能动摇统治根基的重大变革。不过说是这样说，§x到头来，谋事在人，成事在天……§!§!"
 RULE_OPTION_IBR_POLITICAL_ROUTE_CONSERVATIVE: "£TNO_game_rule_flag_IBR   伊比利亚坚持保守主义"
 RULE_OPTION_IBR_POLITICAL_ROUTE_CONSERVATIVE_DESC: "§F弗朗西斯科·佛朗哥压过萨拉查，争取到了更大的领导权。作为一个坚定的反动主义者，佛朗哥会延续伊比利亚保守政策，维持专制统治结构，牺牲§n葡萄牙§!的利益来巩固对§f西班牙§!的控制。在之后的若干年里，除非发生叛乱或革命，伊比利亚仍会是一个以§f西班牙§!为中心的专制国家。§!"
 RULE_OPTION_IBR_POLITICAL_ROUTE_SPINOLA: "£TNO_game_rule_flag_IBR  §O 双头§!§K政治§!延续"
 RULE_OPTION_IBR_POLITICAL_ROUTE_SPINOLA_DESC: "§F一段时间审议后，一系列有限改革措施得以施行——§R但也就仅此而已§!。§O弗朗西斯科·佛朗哥§!和他的§n葡萄牙§!同僚宣称改革过度会引发动荡、导致德国乘虚而入；因此二人将继续牢牢掌控§O伊比利亚§!政界，保持其独特的双头体制。这让以少数民族为代表的一些人深感不满，从而试图推翻考迪罗们的统治。然而，§Y这些尝试不会带来多少改变§!。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_IBR   伊比利亚联邦 - 委员会的地位§!中预设§G立法委员会§!§!§!"
 RULE_OPTION_IBR_POLITICAL_ROUTE_CARNATION: "£TNO_game_rule_flag_IBR   §C康乃馨革命§!"
 RULE_OPTION_IBR_POLITICAL_ROUTE_CARNATION_DESC: "§F一段时间审议后，一系列有限改革措施得以施行——但此举非但没能平息矛盾，反而招致激进派的§R猛烈抨击§!。针对§s政府§!的不满情绪与日俱增，现状愈发难以为继，§m抗议者§!随之走上街头。军方拒绝了镇压命令，与市民一同推翻了政府。§s旧体制§!土崩瓦解，§e军方§!与§m抗议者§!将齐心协力，在伊比利亚的废墟上孕育§m民主的新生§!。\n\n§R要求：§!\n§Y§F在§!£TNO_game_rule_flag_IBR   伊比利亚联邦 - 委员会的地位中预设§G立法委员会§!§!"
 RULE_OPTION_IBR_POLITICAL_ROUTE_LIBERAL: "£TNO_game_rule_flag_IBR   §O伊比利亚§!转向§g改革§!"
 RULE_OPTION_IBR_POLITICAL_ROUTE_LIBERAL_DESC: "§F一段时间审议后，一系列改革措施得以施行——而且§g影响深远§!。§O考迪§!§K罗们§!选择信任新近成立的§Y伊比利亚委员会§!提出的政治改革提案，在那之后尽管震惊于§Y委员会§!推动改革速度之快、委员会内部§g改革派§!之多，还是抛开怀疑，同意了改革实施。最终，政府受到的反对浪潮与委员会要求继续改革的持续压力促使§O考迪§!§K罗们§!同意§O伊比利亚联盟§!在一小段过渡期后转型为一个§M完全的民主国家§!。§!"
 RULE_OPTION_IBR_POLITICAL_ROUTE_DESPOTISM: "£TNO_game_rule_flag_IBR   §O伊比利亚§!转向§s专制主义§!"
 RULE_OPTION_IBR_POLITICAL_ROUTE_DESPOTISM_DESC: "§F一段时间审议后，一系列改革措施得以施行——§R旋即在一小段时间后遭到撤销§!。§O考迪§!§K罗们§!逐渐认识到§Y伊比利亚委员会§!是一个彻头彻尾的失败，太混乱以至于无法充当两人共同统治的可行替代品，而且即便是一个§O忠诚的委员会§!也无法说服两人忽视权力被削弱的危险。因此，他们最终决定§V取缔委员会§!，重新§s亲自统治和指挥§!整个国家。这对于伊比利亚人民是一个巨大挫折，引起了巨大争议，一些观察家会称这一举措§x实在太过分了§!……§!"
 ALGERIAN_CRISIS: "£TNO_game_rule_flag_IBR   伊比利亚联盟 - 阿尔及利亚危机"
 RULE_OPTION_ALGERIAN_CRISIS_RANDOM: "默认 - AI随机"
 RULE_OPTION_ALGERIAN_CRISIS_RANDOM_DESC: "§F阿尔及利亚名义上属于§Q法兰西国§!，实际上却被地中海的两大殖民帝国，§Y伊比利亚联盟§!与§n意大利帝国§!在该地的法国政权于五十年代崩溃后分割攫取。现状并非一尘不变，两个大国都虎视眈眈，寻求对阿尔及利亚的完全控制。不过，规避这场代价高昂战争的机会依然存在，两国有可能达成协议，建立一个中立的阿尔及利亚独立国家。§!"
 RULE_OPTION_ALGERIAN_CRISIS_PEACE: "§G和平解决§!"
 RULE_OPTION_ALGERIAN_CRISIS_PEACE_DESC: "§F§Y伊比利亚§!与§n意大利政府§!之间的外交行动成功§G化解§!了日趋升温的阿尔及利亚危机。两国殖民政府将被解散，转而建立一个由梅萨利·哈吉与其部族盟友统治的统一阿尔及利亚联盟。新政府担保维护两国的利益，阿尔及利亚仍将保持和平与宁静。§!"
 RULE_OPTION_ALGERIAN_CRISIS_WAR: "§R谈判破裂§!"
 RULE_OPTION_IBR_ALGERIAN_CRISIS_WAR_DESC: "§F§n意大利§!与§Y伊比利亚§!§R没能§!达成任何外交协定。战鼓擂响，双方军队已越过阿尔及利亚边境。在阿尔及利亚的群山与沙漠之中，安宁让位于战争、暴力与鲜血。§!"
 IBR_ECONOMIC_ROUTE: "£TNO_game_rule_flag_IBR   伊比利亚联盟 - 经济"
 RULE_OPTION_IBR_ECONOMIC_ROUTE_RANDOM: "默认 - AI随机"
 RULE_OPTION_IBR_ECONOMIC_ROUTE_RANDOM_DESC: "§F伊比利亚经济路线取决于AI随机。§!"
 RULE_OPTION_IBR_ECONOMIC_ROUTE_OPUS_DEI: "§M主业会§!"
 RULE_OPTION_IBR_ECONOMIC_ROUTE_OPUS_DEI_DESC: "§F伊比利亚将遵循§M主业会§!路线。具体而言，经济改革将包含更§M自由§!的经济模式，扩张半岛上的特定产业，同时实行减税。选择这一路线将强化伊比利亚委员会内的§G改革派§!影响力，并在伊比利亚成为§Y民主§!国家后增加§M主业会§!在选举中的人气。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_IBR   伊比利亚联盟 - 考迪罗的人气§!中预设§M§O佛朗哥§!§G较受§!欢迎§!\n§x或§!\n§Y£TNO_game_rule_flag_IBR   伊比利亚联盟 - 考迪罗的人气§!中预设§M两人§Y平分秋色§!§!\n§x或§!\n§Y£TNO_game_rule_flag_IBR   伊比利亚联盟 - 委员会的地位§!§F中§!预设§G立法委员会§!§y且§!§Y£TNO_game_rule_flag_IBR   伊比利亚联盟 - 考迪罗的人气§!中预设§M§K萨拉查§!§G较受§!欢迎§!§!"
 RULE_OPTION_IBR_ECONOMIC_ROUTE_STATUS_QUO: "§L维持现状§!"
 RULE_OPTION_IBR_ECONOMIC_ROUTE_STATUS_QUO_DESC: "§F伊比利亚应当延续既有路线，同时实施适当§G改革§!以避免经济停滞。实施多年的统制经济§R不会§!改变，但对伊比利亚产业的特定投资将被调整。选择这一路线不会影响委员会中§G改革派§!与§i保守派§!的势力平衡。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_IBR   伊比利亚联盟 - 考迪罗的人气§!中预设§M§K萨拉查§!§y大幅§!领先§!\n§x或§!\n§Y£TNO_game_rule_flag_IBR   伊比利亚联盟 - 考迪罗的人气§!中预设§M§K萨拉查§!§G较受§!欢迎§!\n§x或§!\n§Y£TNO_game_rule_flag_IBR   伊比利亚联盟 - 考迪罗的人气§!中预设§M两人§Y平分秋色§!§!\n§x或§!\n§Y£TNO_game_rule_flag_IBR   伊比利亚 - 委员会的地位§!中预设§G立法委员会§!，§y且§!§Y£TNO_game_rule_flag_IBR   伊比利亚联盟 - 考迪罗的人气§!中预设§M§O佛朗哥§!§G较受§!欢迎§!§!"
 RULE_OPTION_IBR_ECONOMIC_ROUTE_RETURN_TO_TRADITION: "§s回归传统§!"
 RULE_OPTION_IBR_ECONOMIC_ROUTE_RETURN_TO_TRADITION_DESC: "§F伊比利亚决定回归经济传统，回归§J法团主义§!指导半岛经济的老路上去。选择这条路线将沉重打击委员会内的§G改革主张§!，甚至可能引发巨大的§R经济崩溃§!。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_IBR   伊比利亚联盟 - 考迪罗的人气§!中预设§M§O佛朗哥§!§y大幅§!领先§!\n§x或§!\n§Y£TNO_game_rule_flag_IBR   伊比利亚 - 委员会的地位§!中预设咨询性委员会§!，§y且§!§Y£TNO_game_rule_flag_IBR   伊比利亚联盟 - 考迪罗的人气§!中预设§M§O佛朗哥§!§G较受§!欢迎§!§!"
 IBR_ELECTION_ROUTE: "£GFX_TNO_game_rule_flag_IBR_CONGRESS   伊比利亚联邦 - 首次大选"
 RULE_OPTION_IBR_ELECTION_ROUTE_RANDOM: "默认 - AI随机"
 RULE_OPTION_IBR_ELECTION_ROUTE_RANDOM_DESC: "§F§G萨拉查§!死后，两大考迪罗共掌§w伊比利亚联盟§!的模式一去不回了。剩下的一名考迪罗，§Y弗朗西斯科·佛朗哥§!认识到旧模式已不适应新时代，决定让伊比利亚委员会决定伊比利亚的未来。在漫长的辩论后，委员会决定实行全国范围内的§M自由选举§!，将更深入改革的命运交给§Y伊比利亚联盟§!的人民。四大党派将角逐委员会多数：§L亚历杭德罗·罗德里格斯·德·巴尔卡塞尔§!领导的§L保守主义国民联盟§!、§B曼努埃尔·弗拉加§!领导的§B自由保守主义人民联盟§!、§M托尔夸托·费尔南德斯-米兰达§!领导的§M自由主义共和联盟§!与§M阿尔韦托·乌利亚斯特雷斯·卡尔沃§!领导的§B市场自由主义民主革新党§!。§!"
 RULE_OPTION_IBR_ELECTION_ROUTE_UR: "£TNO_game_rule_flag_IBR   §M共和联盟§!当选"
 RULE_OPTION_IBR_ELECTION_ROUTE_UR_DESC: "§F§w伊比利亚联盟§!步履蹒跚地走向民主，§f西班牙§!和§K葡萄牙§!的选民们在近四十年后终得参加选举。人民已经发声，骰子已经掷下，在§M托尔夸托·费尔南德斯-米兰达§!领导下，自由派的§M共和联盟§!成为最后的赢家。新政府的目标是将伊比利亚转变为一个市场开发、经济自由且社会进步的国家，同时加入§MOFN§!。共和联盟同时还将佛朗哥谴责为一名独裁者，试图让这段不光彩的历史逐渐沉没在历史长河中。不过，共和联盟并未得到军队的完全认可，倘若自由化改革过激，或将使得后者§R恼羞成怒§!。伊比利亚联邦将成为§M自由主义§!国家。§!"
 RULE_OPTION_IBR_ELECTION_ROUTE_AP: "£TNO_game_rule_flag_IBR   §B人民联盟§!当选"
 RULE_OPTION_IBR_ELECTION_ROUTE_AP_DESC: "§F§w伊比利亚联盟§!步履蹒跚地走向民主，§f西班牙§!和§K葡萄牙§!的选民们在近四十年后终得参加选举。人民已经发声，骰子已经掷下，在§B曼努埃尔·弗拉加§!领导下，§B自由保守派的人民联盟§!成为最后的赢家。弗拉加虽是位民主改革人士，却因顾虑左翼政党势力而在现代化道路上谨终如始。他在社会观上与佛朗哥保持一致，支持传统观念，因此获得了国民联盟的部分支持。§w伊比利亚联盟§!将成为§B自由保守主义§!国家。§!"
 RULE_OPTION_IBR_ELECTION_ROUTE_UN: "£TNO_game_rule_flag_IBR   §L国民联盟§!当选"
 RULE_OPTION_IBR_ELECTION_ROUTE_UN_DESC: "§F§w伊比利亚联盟§!步履蹒跚地走向民主，§f西班牙§!和§K葡萄牙§!的选民们在近四十年后终得参加选举。人民已经发声，骰子已经掷下，在§L亚历杭德罗·罗德里格斯·德·巴尔卡塞尔§!领导下，§L家长制§!的§L国民联盟§!成为最后的赢家。国民联盟是极右翼的政党派系，固守反动思想，反地方分权亦反现代化。巴尔卡塞尔公开鼓吹佛朗哥的理念，敌视民主，同时试图颠覆新制度。§w伊比利亚联盟§!将成为§L民族保守主义§!国家。§!"
 RULE_OPTION_IBR_ELECTION_ROUTE_PRD: "£TNO_game_rule_flag_IBR   §B民主革新党§!当选"
 RULE_OPTION_IBR_ELECTION_ROUTE_PRD_DESC: "§F§w伊比利亚联盟§!步履蹒跚地走向民主，§f西班牙§!和§K葡萄牙§!的选民们在近四十年后终得参加选举。人民已经发声，骰子已经掷下，在§B阿尔韦托·乌利亚斯特雷斯·卡尔沃§!领导下，§B自由保守派§!的§B民主革新党§!成为最后的赢家。该党主要由主业会成员组成，实行资本主义改革的主张最为强烈。主业会将以年轻且有才干的经济学家取代旧官僚，这或许带有技术治国的特征。虽然党内主要倾向于走社会进步的路子，乌利亚斯特雷斯·卡尔沃本人仍然坚信宗教在社会中不可或缺……§w伊比利亚联盟§!将成为§B市场自由主义§!国家。§!"
 IBR_LIBERAL_REFORM: "£GFX_TNO_game_rule_flag_IBR_CONGRESS   伊比利亚联邦 - 费尔南德斯-米兰达的改革"
 RULE_OPTION_IBR_LIBERAL_REFORM_RANDOM: "默认 - AI随机"
 RULE_OPTION_IBR_LIBERAL_REFORM_RANDOM_DESC: "§F\n\n§R要求：§!\n§Y£GFX_TNO_game_rule_flag_IBR_CONGRESS   伊比利亚联邦 - 首次大选§!中预设§M共和联盟§!当选§!"
 RULE_OPTION_IBR_LIBERAL_REFORM_EXTENSIVE: "§G广泛§!改革"
 RULE_OPTION_IBR_LIBERAL_REFORM_EXTENSIVE_DESC: "§F费尔南德斯-米兰达决心进行§R孤注一掷§!的赌博，实行全面的改革，扩张公民权利，设置省级自治系统，并最终清除§w伊比利亚人民§!中可能保有的威权主义倾向。这将§V严重破坏§!议会同§s军方§!的关系。军方本已警惕改革派总理的上台，§J政变§!的危险也将越来越大。§!"
 RULE_OPTION_IBR_LIBERAL_REFORM_CONSERVATIVE: "§R保守§!改革"
 RULE_OPTION_IBR_LIBERAL_REFORM_CONSERVATIVE_DESC: "§F费尔南德斯-米兰达决定采取更§G安全§!的方式，尽可能安抚§s军方§!。但这种行为的代价是放弃他的大部分承诺，乃至彻底§V背弃§!他们。民主革新党左侧的§P共和左翼§!当然会从中受益，§V削弱§!民主制度的根基。§s军方§!将考虑适时介入，自行攫取§J权力§!。§!"
 IBR_LIBERAL_COUP: "£GFX_TNO_game_rule_flag_IBR_CONGRESS   伊比利亚联邦 - 军事政变（费尔南德斯-米兰达）"
 RULE_OPTION_IBR_LIBERAL_COUP_RANDOM: "默认 - AI随机"
 RULE_OPTION_IBR_LIBERAL_COUP_RANDOM_DESC: "§F\n\n§R要求：§!\n§Y£GFX_TNO_game_rule_flag_IBR_CONGRESS   伊比利亚联邦 - 首次大选§!中预设§M共和联盟§!当选§!"
 RULE_OPTION_IBR_LIBERAL_COUP_FAIL: "§M费尔南德斯-米兰达§!维持局面"
 RULE_OPTION_IBR_LIBERAL_COUP_FAIL_DESC: "§F军方发动的未遂政变失败了。那些反动派高估了自己在人民，乃至在军队同僚中的支持。最终，许多军队成员压倒性支持联盟的民主体制，令强硬派政变以惨败告终。既然军方强硬派已被清除，§M托尔夸托·费尔南德斯-米兰达§!得以自由地治理国家，无惧政变威胁，令§w伊比利亚联盟§!维持§M自由主义§!。§!"
 RULE_OPTION_IBR_LIBERAL_COUP_CIVIL_WAR: "£GFX_TNO_game_rule_flag_IBR_greater_spain  £GFX_TNO_game_rule_flag_IBR_CONGRESS   §R内战§!"
 RULE_OPTION_IBR_LIBERAL_COUP_CIVIL_WAR_DESC: "§F虽然军方高估了自己在民众中的支持，但联盟政府也犯了同样的错误。联盟一分为二，伊比利亚半岛陷入又一次§V内战§!。§!"
 RULE_OPTION_IBR_LIBERAL_COUP_SUCCESS: "£GFX_TNO_game_rule_flag_IBR_greater_spain   §J成功§!§R政变§!"
 RULE_OPTION_IBR_LIBERAL_COUP_SUCCESS_DESC: "§F§J阿方索·阿马达§!集结军方反对费尔南德斯-米兰达的政府，成功攫取权力，推翻新生的民主制度，令§w伊比利亚§!成为一个更具§V压迫§!的国家。§J伊比利亚联盟§!将成为§J长枪党主义§!国家。§!"
 TUR_ELECTION_71_PATH: "£TNO_game_rule_flag_TUR   土耳其 - 1971年大选"
 RULE_OPTION_TUR_ELECTION_71_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_TUR_ELECTION_71_PATH_RANDOM_DESC: "§F尽管经历了八年的颠簸动荡和重大转折，§V土耳其民主§!仍然得以幸存。1971年大选预计竞争将十分激烈，旧政党已经分化成为各个新党，而每个政党都对国家怀抱着截然不同的愿景。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_TUR   土耳其 - 军事政变§!中预设§M无政变§!\n且\n§Y£TNO_game_rule_flag_TUR   土耳其 - 1963年大选§!中§x未§!预设§M国家民主党 - 曼德列斯§!或§M四·二二事变§!§!"
 GRE_FATE_CIANO_PATH: "£TNO_game_rule_flag_GRE   齐亚诺意大利与希腊 - 谈判"
 RULE_OPTION_GRE_FATE_CIANO_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_GRE_FATE_CIANO_PATH_RANDOM_DESC: "§F领袖齐亚诺终于巩固了其在§n意大利帝国§!的统治，然后把贪婪的目光投向了亚得里亚海，海的对面是意大利在二战时最棘手的宿敌之一——希腊。二十余年前，希腊一度被踩在轴心国的长筒靴底下，一度孤立无援。但如今已是沧海桑田，§n意大利§!及其盟友所面临的局势也发生了变化，希腊也在竭尽全力重建旧日民主体制。齐亚诺需要作出选择：支持新生的共和国，抑或是亲§n意大利§!的军政府——这是当前一切事务的中心问题。\n\n§R要求§!\n§Y希腊全国共和联盟掌权§!§!"
 RULE_OPTION_GRE_FATE_CIANO_PATH_GOOD: "谈判§G成功§! - 希腊的全新民主"
 RULE_OPTION_GRE_FATE_CIANO_PATH_GOOD_DESC: "§F在法西斯主义统治的世道上，仁慈实乃罕见之举，统治者的仁慈更是前所未闻。无论是面向现实政治的实用取向，还是真切希望尊重盟友意愿的良善愿望，齐亚诺顶着两国意识形态分歧的压力，最终允许其在亚得里亚海的盟友重归民主传统，以此保证尊重与§n意大利§!的盟约关系。时间会告诉我们，他的决定是否能善有善报。§!"
 RULE_OPTION_GRE_FATE_CIANO_PATH_MEH: "谈判§Y成功§! - 军政府或民主？"
 RULE_OPTION_GRE_FATE_CIANO_PATH_MEH_DESC: "§F倘若法西斯主义的名声真有那么臭，那只能与§n意大利§!的盟友以及当地民众达成某种妥协，以此安稳民情。希腊试图与领袖讨价还价，结果两边都未达成任何一致。最后，齐亚诺不情不愿地默许希腊自决：通往独立民主之路，或是爆发亲§n意大利§!的军事政变。§!"
 RULE_OPTION_GRE_FATE_CIANO_PATH_BAD: "谈判§R成功§! - 军政府"
 RULE_OPTION_GRE_FATE_CIANO_PATH_BAD_DESC: "§F齐亚诺希望§n意大利§!能赓续墨索里尼的理想，但强敌伺绕：国际上有北方普鲁士式军事威胁，主义上有全球的法西斯主义反对势力。因此，确保在环地中海建立同盟阵线，对§n意大利§!乃是救命稻草。齐亚诺粉碎了希腊终归民主传统的祈愿，通过§s军政府§!将希腊牢牢把控在§n意大利§!的势力范围内。§!"
 GRE_PATH_ELECTION: "£TNO_game_rule_flag_GRE   希腊 - 1964年大选"
 RULE_OPTION_GRE_PATH_ELECTION_RANDOM: "默认 - AI随机"
 RULE_OPTION_GRE_PATH_ELECTION_RANDOM_DESC: "§F希腊实现国家独立，重建民主制度。接下来即将举行的大选将决定希腊的未来。但选举结果并非板上钉钉，希腊的命运将取决于全体选民的共同意愿……\n\n§R要求：§!\n§Y£TNO_game_rule_flag_GRE   希腊 - 共和国或独裁？§!中预设§Y共和国§!§!"
 RULE_OPTION_GRE_PATH_ELECTION_SD: "§P科姆尼诺斯·皮罗马格卢§!§G当选§!"
 RULE_OPTION_GRE_PATH_ELECTION_SD_DESC: "§F希腊实现国家独立，重建民主制度。接下来即将举行的大选将决定希腊的未来。计票结果表明，§P科姆尼诺斯·皮罗马格卢§!领导下的§P统一民主左翼§!赢得大选胜利。希腊将成为§P改良社会主义§!国家。§!"
 RULE_OPTION_GRE_PATH_ELECTION_CD: "§i帕纳约蒂斯·卡内洛普洛斯§!§G当选§!"
 RULE_OPTION_GRE_PATH_ELECTION_CD_DESC: "§F希腊实现国家独立，重建民主制度。接下来即将举行的大选将决定希腊的未来。计票结果表明，§i帕纳约蒂斯·卡内洛普洛斯§!领导下的§i民族激进联盟§!赢得大选胜利。希腊将成为§i家长制保守主义§!国家。§!"
 GRE_PATH_MEH_1: "£TNO_game_rule_flag_GRE   希腊 - 共和国或独裁？"
 RULE_OPTION_GRE_PATH_MEH_1_RANDOM: "默认 - AI随机"
 RULE_OPTION_GRE_PATH_MEH_1_RANDOM_DESC: "§F§n意§!§S土§!战争结束后，希腊将同§n意大利§!就前者新近的独立地位展开谈判。希腊的命运握在长桌两侧的外交家手中……\n\n§R要求：§!\n§Y谈判成功 - 军政府或民主§!§!"
 RULE_OPTION_GRE_PATH_MEH_1_REPUBLIC: "共和国"
 RULE_OPTION_GRE_PATH_MEH_1_REPUBLIC_DESC: "§F§n意§!§S土§!战争结束后，希腊将同§n意大利§!就前者新近的独立地位展开谈判，结果是遵从希腊人的意愿，成立共和国。§!"
 RULE_OPTION_GRE_PATH_MEH_1_DICTATORSHIP: "专制"
 RULE_OPTION_GRE_PATH_MEH_1_DICTATORSHIP_DESC: "§F§n意§!§S土§!战争结束后，希腊将同§n意大利§!就前者新近的独立地位展开谈判，这导致希腊国内爆发军事政变，以求国家稳定。希腊的命运握在§s军政府§!的军官政权手中。§!"
 GRE_PATH_ELECTION_68: "£TNO_game_rule_flag_GRE   希腊 - 1968年大选"
 RULE_OPTION_GRE_PATH_ELECTION_68_RANDOM: "默认 - AI随机"
 RULE_OPTION_GRE_PATH_ELECTION_68_RANDOM_DESC: "§F希腊拥有复杂的民主历史。在作为共和国取得独立后，一位德意志国王受命领导这个国家。然而，自从1936年后，希腊就从未享有民主。先是被基督教威权主义的梅塔克萨斯所统治，后又被德国与§n意大利§!入侵。不过，在同齐亚诺成功谈判后，希腊得以举行三十年来第一次自由选举。两位主要候选人将角逐大选胜利。一位是康斯坦丁·卡拉曼利斯，秉承实用主义立场寻求同§n意大利§!有所距离但友好的关系。另一位是左翼人士安德烈亚斯·帕潘德里欧，试图实施社会民主主义改革，同时让希腊同§n意大利§!保持距离，尤其是在经济领域。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_GRE   希腊 - 共和国或独裁？§!中预设§Y共和国§!§!"
 RULE_OPTION_GRE_PATH_ELECTION_68_SD: "§P安德烈亚斯·帕潘德里欧§!§G当选§!"
 RULE_OPTION_GRE_PATH_ELECTION_68_SD_DESC: "§F希腊已被法西斯统治25年有余了。然而，希腊全国共和联盟同齐亚诺领袖成功谈判后，§n意大利§!允许希腊举行自由选举。当选者为安德烈亚斯·帕潘德里欧，韦尼泽洛斯政府教育部长的儿子，是希腊全国共和联盟中坚定而温和的左翼派系成员。作为一名民主社会主义者，帕潘德里欧试图在实施社会改革的同时令希腊尽可能独立于§n意大利§!影响。他还会试图通过与意大利人实业家谈判以切断希腊与§n意大利§!的经济联系。他的独立与社会主义希腊梦能否实现还有待时间观察。希腊将成为§P改良社会主义§!国家。§!"
 RULE_OPTION_GRE_PATH_ELECTION_68_CD: "§i康斯坦丁·卡拉曼利斯§!§G当选§!"
 RULE_OPTION_GRE_PATH_ELECTION_68_CD_DESC: "§F希腊已被法西斯统治25年有余了。然而，希腊全国共和联盟同齐亚诺领袖成功谈判后，§n意大利§!允许希腊举行自由选举。当选者为§i康斯坦丁·卡拉曼利斯§!。尽管被广泛视为一名§i家长制保守主义§!者，卡拉曼利斯首先秉承实用主义立场。尽管他希望希腊做到政治独立，却也不反对同§n意大利§!建立友好关系。卡拉曼利斯最为重视两件事：经济和政权的稳定。他将采取什么行动来确保希腊的繁荣和稳定呢？希腊将成为§i家长制保守主义§!国家。§!"
 GRE_FATE_SCORZA_PATH: "£TNO_game_rule_flag_GRE   斯科尔扎意大利与希腊 - 谈判"
 RULE_OPTION_GRE_FATE_SCORZA_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_GRE_FATE_SCORZA_PATH_RANDOM_DESC: "§F随着三头同盟的毁灭和第二次§n意§!§S土§!战争的结束，希腊的合作政权将会崩溃，法西斯主义§n意大利§!必须决定如何与希腊亲民主的新政府打交道。斯科尔扎领袖究竟会允许新的民主制度存在，抑或将其扼杀，尚有待观察。\n\n§R要求§!\n§Y希腊全国共和联盟掌权§!§!"
 RULE_OPTION_GRE_FATE_SCORZA_PATH_GOOD: "谈判成功 - §s军政府§!"
 RULE_OPTION_GRE_FATE_SCORZA_PATH_GOOD_DESC: "§F斯科尔扎温和地与希腊人接洽，承认他们的要求，避免与之对抗，从而使战争免于爆发。希腊将成为民主国家。§!"
 RULE_OPTION_GRE_FATE_SCORZA_PATH_BAD: "谈判破裂"
 RULE_OPTION_GRE_FATE_SCORZA_PATH_BAD_DESC: "§F斯科尔扎将在谈判时采取强硬立场，着手实施针对希腊的第二次入侵。这个新生的国家没有希望抵御入侵，只能无助地接受§n意大利§!合作者的又一次统治。希腊将由§s军政府§!统治。§!"
 CRO_PATH: "£TNO_game_rule_flag_CRO_fascism   克罗地亚 - 铁托或乌斯塔沙"
 RULE_OPTION_CRO_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_CRO_PATH_RANDOM_DESC: "§F三头同盟土崩瓦解，动荡浪潮接踵而至，§n意大利§!遭受重创。现在，各党各派都抓住这一良机，希望推翻托米斯拉夫二世不得人心的政权。但是，究竟哪派势力能够脱颖而出、攀上权力之巅，仍未有定数。你的一个选项是自二战以来一直统治克罗地亚的极端民族主义纳粹势力乌斯塔沙。在尤雷·弗兰采蒂奇的掌控下，乌斯塔沙已经变成了一个不断袭扰§n意大利§!军队的恐怖团伙。你的另一个选项是约瑟普·布罗兹·铁托领导下的共产主义游击队。自二战以来，铁托一直是一位久负盛名的游击队员，也是全欧最令人闻风丧胆的游击英雄之一。如果他获胜，他就会建立一个社会主义国家。§!"
 RULE_OPTION_CRO_PATH_USTASE: "£TNO_game_rule_flag_CRO_national_socialism   §o乌斯塔沙§!掌权"
 RULE_OPTION_CRO_PATH_USTASE_DESC: "§F巴尔干国家克罗地亚今天传来了可怕的消息。黎明时分，乌斯塔沙游击队占领了萨格勒布，驱逐了§n意大利§!政府。克罗地亚的新领导人尤雷·弗兰采蒂奇下令处决了数以千计的§e共产党人§!、§n意大利人§!、少数民族等许多类人。新政权信奉狂热的民族社会主义和极端民族主义。乌斯塔沙的“净化”计划杀死了数十万无辜的人，在二战时期给克罗地亚烙上了丑陋的疤痕。§n意大利§!已经向新政府宣战，并向边境调集了军队，意方很有把握赢得战争。克罗地亚将成为§L贵族保守主义§!国家。§!"
 RULE_OPTION_CRO_PATH_TITO: "£TNO_game_rule_flag_CRO_Yugoslavia   §V铁托与游击队§!掌权"
 RULE_OPTION_CRO_PATH_TITO_DESC: "§F在三头同盟土崩瓦解后，许多不同的游击队派系开始争夺克罗地亚的控制权。在这些派系中，约瑟普·布罗兹·铁托领导的克罗地亚民族解放党全国反法西斯委员会似乎独占鳌头，铁托宣称§n意大利§!军队撤退并组建了一个新的反法西斯政府。铁托长期以来被认为是欧洲最负盛名的游击队战士，他的功绩甚至可以追溯到第二次世界大战初期。作为一名强硬的共产主义者，铁托发誓要向反动派和反革命团体复仇。§n意大利§!已经在克罗地亚边境集结了军队，并很有可能赢得战争。克罗地亚将会是一个§L贵族保守主义§!国家。§!"
 GRE_PATH: "£TNO_game_rule_flag_GRE_fascism   希腊 - 希腊全国共和联盟或民族解放阵线"
 RULE_OPTION_GRE_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_GRE_PATH_RANDOM_DESC: "§F希腊独立后，两大抵抗组织都无法笃定自己将成为权力斗争的胜利者。希腊的角逐仍在继续，希腊人的灵魂之战也开始了。§!"
 RULE_OPTION_GRE_PATH_EDES: "£TNO_game_rule_flag_GRE_despotism  §s希腊全国共和联盟§!掌权"
 RULE_OPTION_GRE_PATH_EDES_DESC: "§F希腊独立后，§s季米特里奥斯·普萨罗斯§!领导的亲民主§s希腊全国共和联盟§!在两大抵抗组织的权力斗争中胜出。希腊人民终于迎来了民主。到那时，希腊的政治体制将变为§s过渡政府§!。§!"
 RULE_OPTION_GRE_PATH_EAM: "£TNO_game_rule_flag_GRE  §V民族解放阵线§!掌权"
 RULE_OPTION_GRE_PATH_EAM_DESC: "§F希腊独立后，§V阿里斯·韦卢希奥蒂斯§!领导的§V民族解放阵线§!在两大抵抗组织的权力斗争中胜出。终于，自由之风吹拂希腊，未来的大门被§V革命阵线§!所打开。然而，§n意大利§!为恢复§n其§!对希腊的统治，在短短几周后发动了一场成功的入侵。§s扬尼斯·拉达斯§!被推上亲意政府的领袖之位，希腊将由§s军政府§!统治。§!"
