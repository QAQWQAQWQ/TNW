 KYR_PATH: "£TNO_game_rule_flag_KYR   吉尔吉斯斯坦 - 政权更迭"
 RULE_OPTION_KYR_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_KYR_PATH_RANDOM_DESC: "§F尽管俄罗斯崩溃后中亚地区的混乱局势有目共睹，但很少有地方能像前苏维埃国家吉尔吉斯斯坦那样对此有着如此深刻的体验。在俄罗斯官僚逃亡美国之后，这个新独立的国家由苏联吉尔吉斯战争英雄卡利努尔·乌先别科夫领导，因其马克思列宁主义的平等解释而闻名；同时，他还得到了苏联-吉尔吉斯斯坦政治家图尔达昆·乌苏巴利耶夫的支持，后者与正统布哈林派结盟。然而，前方的路途布满荆棘：未能击退阿富汗对塔吉克斯坦的入侵并被迫支付巨额赔款之后，乌先别科夫和乌苏巴利耶夫之间的意识形态分歧即将爆发，最终导致了1968年的政变。吉尔吉斯斯坦将走向何方，依然尚未可知。§!"
 RULE_OPTION_KYR_PATH_ISLAMIST: "§s伊斯兰共和国过渡政府§!§R掌权§!"
 RULE_OPTION_KYR_PATH_ISLAMIST_DESC: "§F§s图尔达昆·乌苏巴利耶夫§!领导的§s伊斯兰共和国过渡政府§!将推翻§e乌先别科夫的共产主义政权§!，吉尔吉斯斯坦将处于§s伊斯兰民族主义§!统治之下§!"
 RULE_OPTION_KYR_PATH_STABILITY: "§e吉尔吉斯斯坦共产党§!§G掌权§!"
 RULE_OPTION_KYR_PATH_STABILITY_DESC: "§F§e吉尔吉斯斯坦共产党§!将阻止§s乌苏巴利耶夫的政变§!，吉尔吉斯斯坦将继续保持§e布尔什维主义§!。§!"
 KRK_PATH: "£TNO_game_rule_flag_KRK_socialist   卡拉卡尔帕克斯坦 - 政权更迭"
 RULE_OPTION_KRK_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_KRK_PATH_RANDOM_DESC: "§F在卡拉卡尔帕克斯坦的黄沙中，布哈林欧亚草原工业化的雄心和俄罗斯一同跌得粉碎。现在，这里遗弃着苏维埃伟大工程的空壳，还有一群曾经自豪的人民，在第二次世界大战和西俄罗斯战争中失去整整一代人之后，他们堕入虚无惫赖的深渊。只有在老一辈政治家卡德罗夫·阿卜杜拉希特的指导下，才能重新唤起人们对未来的热情和希望，并最终在六十年代末与邻国乌兹别克斯坦联邦统一。时间会告诉我们，他重建卡拉卡尔帕克斯坦对自身和草原同胞自豪感的梦想是否会取得成果。§!"
 RULE_OPTION_KRK_PATH_QMP: "§B卡拉卡尔帕克独立党§!掌权"
 RULE_OPTION_KRK_PATH_QMP_DESC: "§F§B易卜拉欣·尤苏波夫§!领导的§B独立党§!将掌权，卡拉卡尔帕克斯坦将处于§B自由保守主义§!之下。§!"
 RULE_OPTION_KRK_PATH_STABILITY: "§V卡拉卡尔帕克社会党§!继续掌权"
 RULE_OPTION_KRK_PATH_STABILITY_DESC: "§F§V卡德罗夫·阿卜杜拉希特§!领导的§V社会党§!将继续掌权，卡拉卡尔帕克斯坦将继续走§V革命阵线§!的道路。§!"
