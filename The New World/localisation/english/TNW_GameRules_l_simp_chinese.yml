 RULE_OPTION_BUL_BORIS_III_PATH_DESPOTISM: "§s佩舍夫§!继续掌权"
 RULE_OPTION_BUL_BORIS_III_PATH_DESPOTISM_DESC: "§F现任首相迪米塔尔·佩舍夫将继续掌权，竭力对抗塞沃夫的极端军国派系，保加利亚政府继续维持§s绝对君主制§!。§!"
 RULE_OPTION_BUL_BORIS_III_PATH_ULTRAMILITARISM: "§q沙皇的大臣§!"
 RULE_OPTION_BUL_BORIS_III_PATH_ULTRAMILITARISM_DESC: "§F在马其顿战事终于告一段落后，沙皇鲍里斯三世将解散迪米塔尔·佩舍夫的改革派政府，代之以约尔丹·塞沃夫的极右翼政府。塞沃夫被称为“保加利亚的拉斯普京”，他与鲍里斯三世关系密切，以其极端军国主义野心闻名。他的政府要么引领保加利亚统领巴尔干半岛，要么带着一切冲向万丈深渊。§!"
