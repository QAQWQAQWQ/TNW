 RULE_OPTION_UZB_ELECTION_PATH_RANDOM_DESC: "§F共产主义势力统一了乌兹别克斯坦。然而，§e乌兹别克斯坦共产党§!主席§e法伊祖拉·霍贾耶夫§!决定退休，因此有两名候选人有望成为乌兹别克斯坦领导人。第一位是§e伊斯兰马克思主义§!者§e阿济姆·拉希莫夫§!，第二位是§e布哈林主义§!者§e维利丹·赛多维奇·哈比耶夫§!。\n\n§R要求：§!\n§Y共产党人继续掌权且乌兹别克斯坦统一§!"
