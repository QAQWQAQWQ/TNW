 RULE_OPTION_OFN_EAST_AFRICA_MANDATE_ROUTE_FEDERATION: "£TNO_game_rule_flag_EAF  联邦"
 RULE_OPTION_OFN_EAST_AFRICA_MANDATE_ROUTE_FEDERATION_DESC: "§F§M奥斯卡·坎博纳§!领导的东非联邦将被建立，其领土包括前OFN东非托管领除去赞比亚之外的所有地区。东非联邦将成为§M古典自由主义§!国家。§!"
 RULE_OPTION_OFN_EAST_AFRICA_MANDATE_ROUTE_SOCIALIST: "§V与社会主义者合作§!"
 RULE_OPTION_OFN_EAST_AFRICA_MANDATE_ROUTE_SOCIALIST_DESC: "§F§V朱利叶斯·尼雷尔§!领导的东非联邦将被建立，其领土包括坦桑尼亚与科摩罗群岛。东非联邦将成为§V非洲社会主义§!国家。§!"
