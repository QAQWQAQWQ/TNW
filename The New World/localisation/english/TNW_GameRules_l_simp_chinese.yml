 RULE_OPTION_HAITIAN_CIVIL_WAR_OUTCOME_HAI_DESC: "§F感谢勇气、决心、蛮力和§M美国的支持§!，§L海地政府§!将趁着§V民族解放人民党§!混乱之际粉碎§V社会主义革命§!。\n\n§L海地政府§!的地位似乎已经稳固，因为它开始重新赢得人民的支持。华盛顿的§M美国人§!松了一口气，至少现在，他们的利益保住了。§!"
 RULE_OPTION_HAITIAN_CIVIL_WAR_OUTCOME_HAC: "£TNO_game_rule_flag_HAC   战争 - 民族解放人民党胜利"
 RULE_OPTION_HAITIAN_CIVIL_WAR_OUTCOME_HAC_DESC: "§F经过旷日持久的叛乱并攻占首都太子港之后，§V民族解放人民党§!推翻了§i海地§!政府，令周边邻国为之一凛。在腐败无能的前任政府被赶下台后，§V民族解放人民党§!将专注于重建和巩固权力，尽管许多人担心可能发生大规模的暴行。无论如何，这一事件将在加勒比海和§M美国§!产生深远的影响，这次美国显然成了输家。§!"
