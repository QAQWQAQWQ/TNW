 FRA_GAX_PATH: "£TNO_game_rule_flag_FRA_vichy   加克索特法国 - 君主制公投"
 RULE_OPTION_FRA_GAX_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_FRA_GAX_PATH_RANDOM_DESC: "§F§R要求：§!\n§Y£TNO_game_rule_flag_FRA_vichy   法兰西国 - 1964年总统选举§!中预设§M皮埃尔·加克索特当选§!"
 RULE_OPTION_FRA_GAX_PATH_PASSED: "公投§G成功§!"
 RULE_OPTION_FRA_GAX_PATH_PASSED_DESC: "§F德国内战引发的所谓“大混乱”带来的巨大冲击下，维希法国政府在勃艮第入侵之后动荡的余波中重塑了国家权力。全国凝聚一致，公推保守主义传统派皮埃尔·加克索特为新任总统。加克索特是个出了名的君主主义同情者，坊间盛传他希望与戴高乐的西非自由法国抵抗运动达成妥协。他对法兰西国的愿景是反对纳粹继续控制西欧事务，并努力重铸法兰西人民的尊严与荣光。不过，他那让波旁王朝重登大宝的宏图壮志能否成真，目前还难下定论。§!"
 RULE_OPTION_FRA_GAX_PATH_FAIL: "公投§Y失败§!"
 RULE_OPTION_FRA_GAX_PATH_FAIL_DESC: "§F德国内战引发的所谓“大混乱”尘埃落定，法国人民选举皮埃尔·加克索特作为新的领导人。加克索特是莫拉斯的法兰西行动成员，坚定的保王派与传统主义者。他会组织一次全民公投以按照亨利六世的设想，恢复君主权力。然而，法国人民出人意料地否决了授权君主，决定保持目前的总统制。公投失败了，国王由此退位，其子亨利七世继承王位。§!"
 RULE_OPTION_FRA_GAX_PATH_COUP: "军方§R政变§!"
 RULE_OPTION_FRA_GAX_PATH_COUP_DESC: "§F德国内战引发的所谓“大混乱”尘埃落定，法国人民选举皮埃尔·加克索特作为新的领导人。加克索是莫拉斯的法兰西行动成员，坚定的保王派与传统主义者。他会组织一次全民公投来恢复亨利六世权力。然而，军方担忧随之带来的动乱，介入乱局并以血腥政变推翻加克索特。法国的未来陷入重重迷雾，但法国人显然很善于重振旗鼓。§!"
 FRA_MONARCHIST_ELECTION_OUTCOME: "£TNO_game_rule_flag_FRA_vichy   亨利七世法国 - 首相之争"
 RULE_OPTION_FRA_MONARCHIST_ELECTION_OUTCOME_RANDOM: "默认 - AI随机"
 RULE_OPTION_FRA_MONARCHIST_ELECTION_OUTCOME_RANDOM_DESC: "§F\n\n§R要求：§!\n§Y£TNO_game_rule_flag_FRA_vichy   加克索特法国 - 君主制公投§!中预设§M公投失败§!"
 RULE_OPTION_FRA_MONARCHIST_ELECTION_OUTCOME_GUICHARD: "§i奥利维尔·吉夏尔§!§G当选§!"
 RULE_OPTION_FRA_MONARCHIST_ELECTION_OUTCOME_GUICHARD_DESC: "§F君主制公投出人意料地失败后，加克索特被迫辞职。奥利维尔·吉夏尔成功接任首相。新首相是一名毫不妥协的改革者，追求在许多反动主义领袖以传统枷锁禁锢法国后，设法将法国拉入现代。一些人甚至指责吉夏尔与阿比让自由法国政权与抵抗组织有秘密联系。法国将成为§i家长制保守主义§!国家。§!"
 RULE_OPTION_FRA_MONARCHIST_ELECTION_OUTCOME_ORMESSON: "§L让·多麦颂§!§G当选§!"
 RULE_OPTION_FRA_MONARCHIST_ELECTION_OUTCOME_ORMESSON_DESC: "§F君主制公投出人意料地失败后，加克索特被迫辞职。让·多麦颂成功接任首相。多麦颂是一名温和的半君主主义者，寻求在保留许多大革命遗产的同时现代化君主制法国。多麦颂治下的法国尽管保守却并不压迫。法国的政治体制将变为§L二元君主立宪制§!。§!"
 RULE_OPTION_FRA_MONARCHIST_ELECTION_OUTCOME_PUJO: "§s皮埃尔·皮若§!§G当选§!"
 RULE_OPTION_FRA_MONARCHIST_ELECTION_OUTCOME_PUJO_DESC: "§F君主制公投出人意料地失败后，加克索特被迫辞职。皮埃尔·皮若成功接任首相。皮若是法兰西行动前领袖莫里斯·皮若的儿子，一名强硬的保皇派。他完全忠于父亲的理念，寻求将法国建设为一个奉行激进民族主义、保护主义与沙文主义的大国。他的经济观点也与父亲完全相同，构建一个完全服务于国家与国王的法团主义、有机伪封建经济。法国的政治体制将变为§s绝对君主制§!。§!"
