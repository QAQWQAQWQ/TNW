 RULE_OPTION_CAN_63_ELECTION_PATH_RANDOM_DESC: "§F1963年加拿大联邦选举的获胜者将在自由党和进步保守党之间随机选定。§!"
 RULE_OPTION_CAN_63_ELECTION_PATH_LIBERAL_DEMOCRACY: "§M自由党§!§G当选§!"
 RULE_OPTION_CAN_63_ELECTION_PATH_LIBERAL_DEMOCRACY_DESC: "§F§M莱斯特·B·皮尔逊§!领导的§M自由党§!将赢得联邦选举，并推动左翼自由主义的议程。加拿大将成为§M自由主义§!国家。§!"
