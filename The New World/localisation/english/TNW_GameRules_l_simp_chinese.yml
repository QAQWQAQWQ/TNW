 RULE_OPTION_CLC_PARTY_LEADERSHIP_IBERIA_DESC: "§F新格拉纳达执政党内斗不休，终于遭到民族主义势力的反噬。§s劳尔·桑布拉诺·卡马德尔§!领导的全国天主教联盟借军方与流亡的国民阵线之力发动政变；掌权后，全国天主教联盟拒绝恢复文官统治，认为民主体制下延宕日久的争论正是哥伦比亚乱局的根源。\n\n自此，教会、贵族与旧军官团组成的三驾马车将统治哥伦比亚，直到国家恢复健康。哥伦比亚将全面倒向伊比利亚联盟，视其为保守价值观的坚定堡垒。§!"
