 RULE_OPTION_IBR_POWER_RANDOM_DESC: "§F从法律角度上讲，§L伊比利亚§!的两位考迪罗拥有的权力完全相同，影响力和重要性也相等。不过，§L伊比利亚§!半岛及其殖民地拥有诸多文化，还有各种利益集团。要是有一位考迪罗§G更受欢迎§!，可能会带来§G高效§!的领导，但也会引发§R不稳§!。无论结果如何，那位更受欢迎的考迪罗将成为§L伊比利亚§!事实上的国家元首。§!"
