 RULE_OPTION_THE_BATTLE_OF_SICHUAN_RANDOM_DESC: "§F龙云西南夺权后，高宗武的中华民国和护国军为争夺四川控制权而爆发冲突，这里是曾经重庆战役战斗的地方。\n\n战争的命运将取决于哪一方能夺取这片人口众多、资源丰富、工业活跃的天府之国。§!"
 RULE_OPTION_THE_BATTLE_OF_SICHUAN_YUN_NATIONAL_PROTECTION_ARMY: "£TNO_game_rule_flag_YUN_NPA   护国军夺取四川"
 RULE_OPTION_THE_BATTLE_OF_SICHUAN_YUN_NATIONAL_PROTECTION_ARMY_DESC: "§F护国军根除了改组国民政府在四川的影响力，将四川纳入了起义的征途。\n这一成功将§G极大提高§!护国军的政权正统。§!"
 RULE_OPTION_THE_BATTLE_OF_SICHUAN_CHI_REPUBLIC_OF_CHINA: "£TNO_game_rule_flag_CHI   中华民国夺取四川"
 RULE_OPTION_THE_BATTLE_OF_SICHUAN_CHI_REPUBLIC_OF_CHINA_DESC: "§F改组国民政府将护国军在四川的影响力一扫而空，结束了当地长年的混乱无政府状态。\n这将§R极大损害§!护国军的政权正统。§!"
 WARLORD_INSURRECTION_OUTCOME: "£TNO_game_rule_flag_YUN_NPA  £TNO_game_rule_flag_CHI   解放的最后机会"
