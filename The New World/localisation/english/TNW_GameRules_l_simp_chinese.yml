 RULE_OPTION_KAZAKHSTAN_UNIFICATION_OUTCOME_RANDOM: "默认 - AI随机"
 RULE_OPTION_KAZAKHSTAN_UNIFICATION_OUTCOME_RANDOM_DESC: "§F因为§K哈萨克斯坦§!的共产主义政权未能改善§Y哈萨克人§!的生存状况，§Y哈萨克族§!领导人夺取了§V苏联§!的最后残余之一——§V哈萨克斯坦苏维埃社会主义共和国§!的权力。由于对§M俄罗斯§!政委的派系不满，§M俄罗斯族§!领导人计划召开一次独立于§Y哈萨克人§!主导的§V哈萨克斯坦共产党§!的党内会议。\n\n哈萨克斯坦将分裂成§M俄罗斯族§!主导的北部和§Y哈萨克族§!主导的南部，使得§K哈萨克斯坦§!陷入内战。内战各方都将为§K哈萨克斯坦§!的命运而战——要么留在§M俄罗斯§!，要么远离§M俄罗斯§!。§M俄罗斯§!的统一者将抓住机会，支持那些主张加强与§M俄罗斯§!关系的派系。§!"
