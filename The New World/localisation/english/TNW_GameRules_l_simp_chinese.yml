 RULE_OPTION_TNZ_ECONSPHERE_ZZZ_DESC: "§F§V朱利叶斯·尼雷尔§!或§V爱德华·索科伊内§!领导的§V坦噶尼喀非洲民族联盟§!对外国在经济上的主导地位心存警惕，即便是两国政治立场相似，§n坦噶尼喀§!也将拒绝加入§K泛非经济互助共同体§!。§n坦噶尼喀§!将保持在后殖民时代非洲的不结盟立场。\n\n§R要求：§!\n£TNO_game_rule_flag_CAO  £TNO_game_rule_flag_WOL  £TNO_game_rule_flag_FFR   §Y西非战争§!中§R未§!预设£TNO_game_rule_flag_JAP  £TNO_game_rule_flag_CAO   §M泛非解放阵线胜利§!\n§y且§!\n£TNO_game_rule_flag_GRO_REICHSSTAAT   §Y大阿非利加德意志邦的毁灭进程§!中§R未§!预设§M第二阶段§!§Y或§!§M第三阶段§!§!"
 TNZ_ZZB_WAR_OUTCOME: "£TNO_game_rule_flag_TNZ  £TNO_game_rule_flag_ZZB   坦噶尼喀收复海岸"
 RULE_OPTION_TNZ_ZZB_WAR_OUTCOME_RANDOM: "默认 - AI随机"
 RULE_OPTION_TNZ_ZZB_WAR_OUTCOME_RANDOM_DESC: "§F§s德意志邦§!土崩瓦解，§Y坦噶尼喀§!与§E桑给巴尔§!从这片混乱中杀出，成为了争取自由的独立国家。§Y坦噶尼喀§!是由§x朱利叶斯·尼雷尔§!总统领导的不结盟§x社会主义§!国家，§E桑给巴尔§!则成为了§s阿拉伯苏丹国§!。然而阿拉伯苏丹国的统治并不长久，§q约翰·奥凯洛§!发动政变宣告了§E桑给巴尔人民共和国§!的成立。\n\n但§q奥凯洛§!性格乖张，并非一个合格的统治者。§Y坦噶尼喀§!则趁机入侵§E桑给巴尔§!，意图夺取其沿海领土，扩展本国§Y经济机遇§!。这场战争谁将占领上风？一切都将由命运抉择。§!"
 RULE_OPTION_TNZ_ZZB_WAR_OUTCOME_ZZB: "£TNO_game_rule_flag_ZZB   §E桑给巴尔§!战胜"
 RULE_OPTION_TNZ_ZZB_WAR_OUTCOME_ZZB_DESC: "§F无论动机如何，§Y坦噶尼喀§!入侵§E桑给巴尔§!的计划惨败。§E桑给巴尔§!不仅击退了其西方邻国的入侵，还将进一步吞并其全部领土，§Y坦噶尼喀§!将变为一个历史名词。新生的国度将由§E桑给巴尔人§!§q约翰·奥凯洛§!统治，但该国也难以回避其有关奴隶贸易的沉重的历史包袱。抚平文化差异之路道阻且长，唯有时间才能证明，坦噶尼喀人民能否接受奥凯洛的统治。§!"
 RULE_OPTION_TNZ_ZZB_WAR_OUTCOME_TNZ_COAST: "£TNO_game_rule_flag_TNZ  £TNO_game_rule_flag_ZZB   §Y坦噶尼喀§!夺取海岸"
 RULE_OPTION_TNZ_ZZB_WAR_OUTCOME_TNZ_COAST_DESC: "§F正如所料，§Y坦噶尼喀§!成功入侵了§E桑给巴尔§!，攫取了曾属于§E桑给巴尔§!的沿海领土。新的出海通道提升了§Y坦噶尼喀§!的§Y经济发展§!潜力，并使其与非洲以外的世界建立起了更为广泛的联系。然而在如今缚于海外一隅的§E桑给巴尔§!，§q奥凯洛§!由于战败被驱逐，苏丹国取而代之。§E桑给巴尔§!届时将由§s米尔·阿卜杜·加济安·俾路支§!领导的§s过渡政府§!统治，§E桑给巴尔§!最终重回旧日体制。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_GRO_REICHSSTAAT    §Y大阿非利加德意志邦的毁灭进程§!中§R未§!预设§M第三阶段§!§!"
 RULE_OPTION_TNZ_ZZB_WAR_OUTCOME_TNZ_PUPPET: "£TNO_game_rule_flag_TNZ  £TNO_game_rule_flag_ZZB   §Y坦噶尼喀§!傀儡§E桑给巴尔§!"
 RULE_OPTION_TNZ_ZZB_WAR_OUTCOME_TNZ_PUPPET_DESC: "§F正如所料，§Y坦噶尼喀§!成功入侵了§E桑给巴尔§!，攫取了曾属于§E桑给巴尔§!的沿海领土，并向该岛国施加了巨大的影响力。§E桑给巴尔§!虚有其名，处处唯§Y坦噶尼喀§!马首是瞻。新的出海通道提升了§Y坦噶尼喀§!的§Y经济发展§!潜力，并使其与非洲以外的世界建立起了更为广泛的联系。§E桑给巴尔则将成为§Y坦噶尼喀§!控制下，以§x阿卜杜勒拉赫曼·穆罕默德·巴布§!为领导人的§x泛非社会主义国家§!。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_GRO_REICHSSTAAT    §Y大阿非利加德意志邦的毁灭进程§!中§R未§!预设§M第三阶段§!§!"
 RULE_OPTION_TNZ_ZZB_WAR_OUTCOME_TNZ_ANNEX: "£TNO_game_rule_flag_TNZ   §Y坦噶尼喀§!吞并§E桑给巴尔§!"
 RULE_OPTION_TNZ_ZZB_WAR_OUTCOME_TNZ_ANNEX_DESC: "§F§Y坦噶尼喀§!与§E桑给巴尔§!间的战争以§Y坦噶尼喀§!的压倒性胜利告终。§Y坦噶尼喀§!不仅获得了海岸，还进一步彻底吞并了§E桑给巴尔人民共和国§!。新成立的§y坦桑尼亚§!将由§x朱利叶斯·尼雷尔§!领导。其§Y经济发展§!潜力获得长足发展，并与非洲以外的世界建立起了更为广泛的联系。此外，兼并行为将壮大冷战格局下§y坦桑尼亚§!的势力，其已成为非洲解放和统一的先驱。§!"
