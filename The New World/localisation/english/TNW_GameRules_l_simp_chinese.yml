 RULE_OPTION_ICE_71_ELECTIONS_RANDOM_DESC: "§F\n\n§R要求：§!\n£TNO_game_rule_flag_ICE   §Y冰岛 - 雷克雅未克暴乱§!中预设§Y任一§!OFN胜利§!"
 RULE_OPTION_ICE_71_ELECTIONS_INDEPENDENCE: "§i独§!§B立§!党胜选"
 RULE_OPTION_ICE_71_ELECTIONS_INDEPENDENCE_DESC: "§F若雷克雅未克暴乱以§MOFN§!完胜告终，§i吉尔·§!§B哈德格里姆松§!领导的独立党将在1971年选举中胜选，冰岛将成为§i自由市场保守主义§!国家；若以§MOFN§!部分胜利告终，冰岛将成为§B大帐篷§!政党领导的国家。§!"
 RULE_OPTION_ICE_71_ELECTIONS_PROGRESSIVE: "§i进步党§!胜选"
 RULE_OPTION_ICE_71_ELECTIONS_PROGRESSIVE_DESC: "§F§i哈尔多尔·埃杰特·西于尔兹松§!领导的§i进步党§!将在1971年冰岛选举中胜选，冰岛将成为§i农业主义§!国家。\n\n§R要求：§!\n£TNO_game_rule_flag_ICE   §Y冰岛 - 雷克雅未克暴乱§!中预设§MOFN完胜§!"
