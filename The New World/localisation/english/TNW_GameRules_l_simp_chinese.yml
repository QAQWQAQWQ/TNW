 RULE_OPTION_WEST_RUSSIA_UNIFICATION_OUTCOME_VYT_VYATKA_DESC: "§F维亚特卡将统一西俄罗斯。§!"
 RULE_OPTION_WEST_RUSSIA_UNIFICATION_OUTCOME_PRM_PERM: "£TNO_game_rule_flag_PRM   雅利安兄弟会胜利"
