 ECW_OUTCOME: "£TNO_game_rule_flag_ENG   £TNO_game_rule_flag_ENG_HMMLR_Reconstruction   第二次大起义"
 RULE_OPTION_ECW_OUTCOME_RANDOM: "默认 - 无增强"
 RULE_OPTION_ECW_OUTCOME_RANDOM_DESC: "§F§o阿道夫·希特勒§!去世后，德国陷入混乱，§s麦克斯韦尔·奈特§!和§SHMMLR§!将抓住机会实现他们在1956年未能实现的目标，将§S英国§!从§q德国§!的掌控中解放出来。刺杀首相§J巴里·多姆维尔§!后，§s奈特§!将发出反对§P合作政府§!的大规模起义的信号，使英国陷入§R内战§!。§!"
 RULE_OPTION_ECW_OUTCOME_HMMLR: "£TNO_game_rule_flag_ENG_HMMLR_Reconstruction   §S自由英国§!胜利"
 RULE_OPTION_ECW_OUTCOME_HMMLR_DESC: "§F很久很久以前，有一首歌为人传唱：“不列颠永远、永远、永远不会成为奴隶！”1964年的当今，自豪的歌声再度唱响。§S自由的不列颠§!取得了胜利，§q德国人§!被赶出了英吉利海峡，§P合作者§!被彻底推翻了。无论§S英国§!现在走哪条路，这都是她自己的选择，一个§M自由§!而§G独立§!的国家。§!"
 RULE_OPTION_ECW_OUTCOME_COLLAB: "£TNO_game_rule_flag_ENG   §P合作政府§!获胜"
 RULE_OPTION_ECW_OUTCOME_COLLAB_DESC: "§F1956年的场景重演了，在§J罗纳德·诺尔-凯恩§!的领导下，§P合作政府§!设法顶住了愤怒的反叛之潮，直至§q德国驻军§!施展全力加入战场。§SHMMLR§!，连同§S自由不列颠§!的梦想，最终破灭——也许，这就是永远了。§!"
