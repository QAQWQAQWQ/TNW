 TUR_1963_ELECTION_PATH: "£TNO_game_rule_flag_TUR   土耳其 - 1963年大选"
 RULE_OPTION_TUR_1963_ELECTION_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_TUR_1963_ELECTION_PATH_RANDOM_DESC: "§F§n意§!§V土§!战争已经画上了句号，全国上下的注意随即转向了迫在眉睫的大选。在波谲云诡的政治环境中，只有一点是清晰确定的：§V土耳其§!正冲向未来，走进与从前截然不同的篇章。§!"
 RULE_OPTION_TUR_1963_ELECTION_PATH_CHP_LEFT: "§L共和人民党§! - §C左派§!"
 RULE_OPTION_TUR_1963_ELECTION_PATH_CHP_LEFT_DESC: "§F正如所料，虽然不得不与§P民主革新党§!结成政治联盟，但§L共和人民党§!依旧再次当选，在§L卡瑟姆·居莱克§!的总理任期内，共和人民党将开始自我改革，巩固团结。居莱克将采取§C比伦特·埃杰维特§!提倡的“中左”立场，将党导向§P左翼凯末尔主义§!。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_IME  £TNO_game_rule_flag_TUR   第二次意土战争§!中预设£TNO_game_rule_flag_TUR   §M土耳其共和国§!胜利§!"
 RULE_OPTION_TUR_1963_ELECTION_PATH_CHP_RIGHT: "§L共和人民党§! - §$$右派§!"
 RULE_OPTION_TUR_1963_ELECTION_PATH_CHP_RIGHT_DESC: "§F正如所料，虽然不得不与§P民主革新党§!结成政治联盟，但§L共和人民党§!依旧再次当选，在§L卡瑟姆·居莱克§!的总理任期内，共和人民党将开始自我改革，巩固团结。居莱克将采取§$$图尔汗·费齐奥卢§!支持的“中右”立场，将党导向§i右翼凯末尔主义§!。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_IME  £TNO_game_rule_flag_TUR   第二次意土战争§!中预设£TNO_game_rule_flag_TUR   §M土耳其共和国§!胜利§!"
 RULE_OPTION_TUR_1963_ELECTION_PATH_UDP_MENDERES: "§Q国家民主党§! - §s曼德列斯§!"
 RULE_OPTION_TUR_1963_ELECTION_PATH_UDP_MENDERES_DESC: "§F§Q国家民主党§!与§P民主革新党§!结成同盟，在大选中横扫投票站，土耳其发生了政权更迭：§B福阿德·柯普吕律§!就任总统，§i阿德南·曼德列斯§!就任总理。\n\n在成功改革军队结构后，曼德列斯将尝试获得1967年大选的总统提名。他将将会获得成功，土耳其成为§L无支配体制§!国家，并最终在§s曼德列斯§!总统治下走上§s一人独裁§!的道路。§!"
 RULE_OPTION_TUR_1963_ELECTION_PATH_UDP_DEMIREL: "§Q国家民主党§! - §B德米雷尔§!"
 RULE_OPTION_TUR_1963_ELECTION_PATH_UDP_DEMIREL_DESC: "§F§Q国家民主党§!与§P民主革新党§!结成同盟，在大选中横扫投票站，土耳其发生了政权更迭：§B福阿德·柯普吕律§!就任总统，§i阿德南·曼德列斯§!就任总理。\n\n虽然未能成功改革军队结构，但曼德列斯仍将尝试获得1967年大选的总统提名。这引起了党内的反弹，柯普吕律总统因此将任命§B苏莱曼·德米雷尔§!为新总理以取代曼德列斯，土耳其将成为§i民粹保守主义§!国家。§!"
 RULE_OPTION_TUR_1963_ELECTION_PATH_UDP_BILGIC: "§Q国家民主党§! - §i比尔吉奇§!"
 RULE_OPTION_TUR_1963_ELECTION_PATH_UDP_BILGIC_DESC: "§F§Q国家民主党§!与§P民主革新党§!结成同盟，在大选中横扫投票站，土耳其发生了政权更迭：§B福阿德·柯普吕律§!就任总统，§i阿德南·曼德列斯§!就任总理。\n\n虽然未能成功改革军队结构，但曼德列斯仍将尝试获得1967年大选的总统提名。这引起了党内的反弹，柯普吕律总统因此将任命§i萨德丁·比尔吉奇§!为新总理以取代曼德列斯，土耳其将成为§i家长制保守主义§!国家。§!"
 RULE_OPTION_TUR_1963_ELECTION_PATH_DYP_SOCIALISTS: "§P民主革新党§! - §V社会主义者§!"
 RULE_OPTION_TUR_1963_ELECTION_PATH_DYP_SOCIALISTS_DESC: "§F大选结果出乎所有人的预料：§P民主革新党§!与§Q国家民主党§!结成同盟，一举夺魁，§P陶菲克·吕什蒂·阿拉斯§!就任总统，§V穆罕默德·阿里·艾巴尔§!出任总理。\n\n虽然诸如§V革命工会联盟§!等左翼工会组织遭受了严重破坏，但§P民主革新党§!内的§V社会主义派系§!依然成功阻止了工作法的通过，并且在自由派脱离§P革新党§!、成立§M改革民主党§!后巩固了对党的控制。艾巴尔将带着他的社会主义理念走向台前，土耳其将有史以来第一次建立起§V社会民主主义§!政府。§!"
 RULE_OPTION_TUR_1963_ELECTION_PATH_DYP_LIBERALS: "§P民主革新党§! - §M自由派§!"
 RULE_OPTION_TUR_1963_ELECTION_PATH_DYP_LIBERALS_DESC: "§F大选结果出乎所有人的预料：§P民主革新党§!与§Q国家民主党§!结成同盟，一举夺魁，§P陶菲克·吕什蒂·阿拉斯§!就任总统，§V穆罕默德·阿里·艾巴尔§!出任总理。\n\n诸如§V革命工会联盟§!等左翼工会组织遭受了严重破坏，§P民主革新党§!内的§M自由主义派系§!成功通过了工作法，结束了社会主义者对党的主导地位。同时，社会主义派系将脱离§P民主革新党§!，成立§V土耳其工人党§!，艾巴尔的总理之位将由§M埃克雷姆·阿利詹§!所取代，土耳其将有史以来第一次建立起§M民族自由主义§!政府。§!"
 RULE_OPTION_TUR_1963_ELECTION_PATH_22_APRIL_INCIDENT: "§q四·二二事变§!"
 RULE_OPTION_TUR_1963_ELECTION_PATH_22_APRIL_INCIDENT_DESC: "§F随着土耳其在战争中落败，§L共和人民党§!内部的§q佩克主义派系§!认为党必然将在下次大选中惨败。在一系列的暗箱操作和国会蛊惑之后，§L伊诺努§!总统授权予§q法利赫·勒夫克·阿塔伊§!，并宣布取消选举，任命§q阿塔伊§!为总理，标志着土耳其第二次迈步走进§s激进凯末尔主义§!的时代。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_IME  £TNO_game_rule_flag_TUR   第二次意土战争§!中预设§M£TNO_game_rule_flag_IME   意属中东§!胜利§!"
 TUR_MILITARY_COUP_PATH: "£TNO_game_rule_flag_TUR   土耳其 - 军事政变"
 RULE_OPTION_TUR_MILITARY_COUP_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_TUR_MILITARY_COUP_PATH_RANDOM_DESC: "§F当选并非是§Q国家民主党§!和§P民主革新党§!在追求§V土耳其§!改革道路上最困难的一步。§L凯末尔主义§!早已树大根深，拥有诸多守卫者，比如§s武装力量§!中的高层军官。面对军队和土耳其社会中决不妥协的顽固§L凯末尔主义§!派系，新政府必须做出选择，要么安抚，要么使其失能。如果政府有把柄落到了军方手上，那么军方一定会§x试图干涉§!。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_TUR   土耳其 - 1963年大选§!中预设任一§Q国家民主党§!或§P民主革新党§!胜选§!"
 RULE_OPTION_TUR_MILITARY_COUP_PATH_YES: "§s军事政变§!"
 RULE_OPTION_TUR_MILITARY_COUP_PATH_YES_DESC: "§F§Q政§!§P府§!未能成功压制长期困扰国家的危机，军方因此出手干涉局势。军队将在§s杰夫德特·苏奈§!的领导下，建立§s民族团结委员会§!，即在接下来数年中统治土耳其的§s军政府§!。§!"
 RULE_OPTION_TUR_MILITARY_COUP_PATH_NO: "§G无政变§!"
 RULE_OPTION_TUR_MILITARY_COUP_PATH_NO_DESC: "§F§Q政§!§P府§!成功解决了长年困扰国家的危机，没有给军队任何发动政变企图的把柄，得以1967年大选中再次当选。§!"
 TUR_FATE_OF_THE_JUNTA_PATH: "£TNO_game_rule_flag_TUR   土耳其 - 军政府的命运"
 RULE_OPTION_TUR_FATE_OF_THE_JUNTA_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_TUR_FATE_OF_THE_JUNTA_PATH_RANDOM_DESC: "§F§s民族团结委员会§!掌权后，显而易见地迅速分裂为了两个派系，§L宪法派§!和§s激进派§!。两派怀着不同的愿景，彼此争夺权力和影响力。§s杰夫德特·苏奈§!最终必须要选一边站队，这一选择或许将永远地改变§V土耳其§!。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_TUR   土耳其 - 军事政变§!中预设§M军事政变§!§!"
 RULE_OPTION_TUR_FATE_OF_THE_JUNTA_PATH_CONSTITUTIONALISTS_ERIM_SUCCESS: "§L宪法派§! - §G埃里姆成功§!"
 RULE_OPTION_TUR_FATE_OF_THE_JUNTA_PATH_CONSTITUTIONALISTS_ERIM_SUCCESS_DESC: "§F§L杰马尔·马丹奥卢§!领导的宪法派将确保其影响力，促使§s民族团结委员会§!实现向民主的过渡，呼吁由§L尼哈特·埃里姆§!领导建立§L家长制发展主义§!政府。埃里姆的努力将获得成功，担起重生的§L共和人民党§!领导权，在马丹奥卢总统的领导下确立起正统§L凯末尔主义§!的主导地位。§!"
 RULE_OPTION_TUR_FATE_OF_THE_JUNTA_PATH_CONSTITUTIONALISTS_ERIM_FAILURE: "§L宪法派§! - §R埃里姆失败§!"
 RULE_OPTION_TUR_FATE_OF_THE_JUNTA_PATH_CONSTITUTIONALISTS_ERIM_FAILURE_DESC: "§F§L杰马尔·马丹奥卢§!领导的宪法派将确保其影响力，促使§s民族团结委员会§!实现向民主的过渡，呼吁由§L尼哈特·埃里姆§!领导建立§L家长制发展主义§!政府。但是，埃里姆未能成功，沦为了临时代管人的角色。建制派四分五裂，§i图尔古特·厄扎尔§!领导的新党大获全胜，§i泰金·阿勒布伦§!就任总统，土耳其将走上§i自由法团主义§!的道路。§!"
 RULE_OPTION_TUR_FATE_OF_THE_JUNTA_PATH_RADICALS: "§s激进派§! - §J崭新的土耳其§!"
 RULE_OPTION_TUR_FATE_OF_THE_JUNTA_PATH_RADICALS_DESC: "§F§J阿尔帕尔斯兰·蒂尔凯什§!领导的§s激进派§!将确保其影响力，促使§s民族团结委员会§!延长军政府时期，推迟民主化计划。由于激进派已经掌控了§s委员会§!的绝对权力，§s杰夫德特·苏奈§!被迫辞职，§J阿尔帕尔斯兰·蒂尔凯什§!将就任总统，呼吁召开执政国会，实践其§J革命民族主义§!理念，以此重塑§V土耳其§!。§!"
 TUR_ROGUE_GENERALS_INSURRECTION_PATH: "£TNO_game_rule_flag_TUR   土耳其 - “流氓将军”的叛乱"
 RULE_OPTION_TUR_ROGUE_GENERALS_INSURRECTION_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_TUR_ROGUE_GENERALS_INSURRECTION_PATH_RANDOM_DESC: "§F§q佩克主义派系§!重新掌权的消息传出后，§s塞伊菲·库尔特贝克§!、§s泰金·阿勒布伦§!等高级将领拒绝承认新政权，并在伊斯坦布尔宣布建立并行政府，挑战安卡拉政府§q法利赫·勒夫克·阿塔伊§!总理的合法性。悲伤之年将至，人们只能希望§V土耳其§!能得以存续，见证更美好的日子来临。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_TUR   土耳其 - 1963年大选§!中预设§M四·二二事变§!§!"
 RULE_OPTION_TUR_ROGUE_GENERALS_INSURRECTION_PATH_REGIME_CONSOLIDATION: "§q安卡拉胜利§! - §R政权巩固§!"
 RULE_OPTION_TUR_ROGUE_GENERALS_INSURRECTION_PATH_REGIME_CONSOLIDATION_DESC: "§F经过两年的内部冲突，安卡拉政府成功维护其权威，强行镇压了伊斯坦布尔的叛军。叛国者在法庭接受宣判，§q佩克主义派系§!的§s激进凯末尔主义§!政权得以证明其稳固，不会很快就遭到推翻。§!"
 RULE_OPTION_TUR_ROGUE_GENERALS_INSURRECTION_PATH_COUP_DCP_ELECTED: "§L伊斯坦布尔胜利§! - §i民主共和党§!当选"
 RULE_OPTION_TUR_ROGUE_GENERALS_INSURRECTION_PATH_COUP_DCP_ELECTED_DESC: "§F经过两年的内部冲突，伊斯坦布尔政府向安卡拉进军，强行废黜了§s伊诺努§!、§q阿塔伊§!和§q佩克主义派系§!的权力。§L共和人民党§!已轰然倒塌，新任总统§s塞伊菲·库尔特贝克§!将举行民主选举，委任§i尼吕费尔·居尔索伊§!领导的§i民主共和党§!组建新政府，土耳其将成为§i家长制保守主义§!国家。§!"
 RULE_OPTION_TUR_ROGUE_GENERALS_INSURRECTION_PATH_COUP_SDP_ELECTED: "§L伊斯坦布尔胜利§! - §P社会民主党§!当选"
 RULE_OPTION_TUR_ROGUE_GENERALS_INSURRECTION_PATH_COUP_SDP_ELECTED_DESC: "§F经过两年的内部冲突，伊斯坦布尔政府向安卡拉进军，强行废黜了§s伊诺努§!、§q阿塔伊§!和§q佩克主义派系§!的权力。§L共和人民党§!已轰然倒塌，新任总统§s塞伊菲·库尔特贝克§!将举行民主选举，委任§P图兰·居内什§!领导的§P社会民主党§!组建新政府，土耳其将成为§P改良社会主义§!国家。§!"
 TUR_KEMALIST_POWER_STRUGGLE_PATH: "£TNO_game_rule_flag_TUR   土耳其 - 凯末尔主义者的权力斗争"
 RULE_OPTION_TUR_KEMALIST_POWER_STRUGGLE_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_TUR_KEMALIST_POWER_STRUGGLE_PATH_RANDOM_DESC: "§F即使是在镇压了“流氓将军”叛乱之后，§L共和人民党§!内部的反对派斗争仍旧挥之不去，而这些反对派还得到了§L伊诺努§!总统的默许。1967年的虚伪大选正在临近，§L中间派系§!正在试图限制乃至肃清§q佩克主义派系§!。与此同时，§q佩克派§!自身也在处理其内部的意识形态分歧。显然，最后摊牌的时刻即将到来，§s凯末尔主义§!的未来就此决定。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_TUR   土耳其 - “流氓将军”的叛乱§!中预设§M安卡拉胜利 - 政权巩固§!§!"
 RULE_OPTION_TUR_KEMALIST_POWER_STRUGGLE_PATH_RADICALS_ULKU_FACTION: "§q激进派§! - “理想”派掌权"
 RULE_OPTION_TUR_KEMALIST_POWER_STRUGGLE_PATH_RADICALS_ULKU_FACTION_DESC: "§F随着§L伊斯麦特·伊诺努§!的反革命罪行最终大白天下，他将会被不信任投票所罢免，§q法利赫·勒夫克·阿塔伊§!将就任为共和国总统，从而牢牢保卫§q佩克主义§!的遗产。\n\n1971年阿塔伊逝世后，佩克派系中聚集在《理想》杂志旗下的§J民族主义§!派别将在§q许克吕·瑟克曼叙埃尔§!总统和§q塔拉特·艾代米尔§!总理的领导下接管政权，推行他们的§s激进凯末尔主义§!愿景。§!"
 RULE_OPTION_TUR_KEMALIST_POWER_STRUGGLE_PATH_RADICALS_YON_FACTION: "§q激进派§! - “方向”派掌权"
 RULE_OPTION_TUR_KEMALIST_POWER_STRUGGLE_PATH_RADICALS_YON_FACTION_DESC: "§F随着§L伊斯麦特·伊诺努§!的反革命罪行最终大白天下，他将会被不信任投票所罢免，§q法利赫·勒夫克·阿塔伊§!将就任为共和国总统，从而牢牢保卫§q佩克主义§!的遗产。\n\n1971年阿塔伊逝世后，佩克派系中聚集在《方向》杂志旗下的§V社会主义§!派别将在§q谢夫凯特·叙雷亚·艾代米尔§!总统和§q多安·阿夫哲奥卢§!总理的领导下接管政权，推行他们的§s激进凯末尔主义§!愿景。§!"
 RULE_OPTION_TUR_KEMALIST_POWER_STRUGGLE_PATH_CENTRISTS: "§L中间派§!掌权"
 RULE_OPTION_TUR_KEMALIST_POWER_STRUGGLE_PATH_CENTRISTS_DESC: "§F§L伊诺努§!总统支持的§L中间派§!成功褫夺了§q佩克主义派系§!的权力，§q阿塔伊§!总理被逐出权力中心。§L尼哈特·埃里姆§!将出任新总理，标志国家转向正统的§L凯末尔主义§!路线。§!"
 RULE_OPTION_TUR_ELECTION_71_PATH_LEFT_KEMALISTS: "§C左翼凯末尔主义者§!当选"
 RULE_OPTION_TUR_ELECTION_71_PATH_LEFT_KEMALISTS_DESC: "§F§C比伦特·埃杰维特§!领导的§P左翼凯末尔主义者§!将在1971年大选中胜利。他们仍代表§C共和人民党§!参选，但若§L共和人民党§!与右翼结盟，他们将创立新的§C民主左翼党§!，以其名义参选。§!"
 RULE_OPTION_TUR_ELECTION_71_PATH_RIGHT_KEMALISTS: "§$$右翼凯末尔主义者§!当选"
 RULE_OPTION_TUR_ELECTION_71_PATH_RIGHT_KEMALISTS_DESC: "§F§i图尔汗·费齐奥卢§!领导的§i右翼凯末尔主义者§!将在1971年大选中胜利。他们仍代表§i共和人民党§!参选，但若§L共和人民党§!与左翼结盟，他们将创立新的§i共和信任党§!，以其名义参选。§!"
 RULE_OPTION_TUR_ELECTION_71_PATH_POPULISTS: "§B民粹主义者§!当选"
 RULE_OPTION_TUR_ELECTION_71_PATH_POPULISTS_DESC: "§F§B苏莱曼·德米雷尔§!领导的§B民粹主义者§!将在1971年大选中胜利。他们仍代表§B国家民主党§!参选，但若§i萨德丁·比尔吉奇§!领导§Q国家民主党§!，他们将创立新的§B正义党§!，以其名义参选。土耳其新政府将遵从§i民粹保守主义§!。§!"
 RULE_OPTION_TUR_ELECTION_71_PATH_NATIONALIST_CONSERVATIVES: "§i民族保守主义者§!当选"
 RULE_OPTION_TUR_ELECTION_71_PATH_NATIONALIST_CONSERVATIVES_DESC: "§F§i萨德丁·比尔吉奇§!领导的§i民族保守主义者§!将在1971年大选中胜利。他们仍代表§i国家民主党§!参选，但若§B苏莱曼·德米雷尔§!领导§Q国家民主党§!，他们将创立新的§i民族主义和保守党§!，以其名义参选。土耳其新政府将遵从§i家长制保守主义§!。§!"
 RULE_OPTION_TUR_ELECTION_71_PATH_LIBERALS: "§M自由主义者§!当选"
 RULE_OPTION_TUR_ELECTION_71_PATH_LIBERALS_DESC: "§F§M埃克雷姆·阿利詹§!领导的§M自由主义者§!将在1971年大选中胜利。他们仍代表§M民主革新党§!参选，但若§V社会主义者§!领导§P民主革新党§!，他们将创立新的§M改革民主党§!，以其名义参选。土耳其新政府将遵从§M民族自由主义§!。§!"
 RULE_OPTION_TUR_ELECTION_71_PATH_SOCIALISTS_REFORM: "§V社会主义者§!当选 - §P改革§!"
 RULE_OPTION_TUR_ELECTION_71_PATH_SOCIALISTS_REFORM_DESC: "§F§V穆罕默德·阿里·艾巴尔§!领导的§V社会主义者§!将代表§V土耳其工人党§!参选，在1971年大选中赢得胜利。然而，由于其不拥有议会多数，选举陷入僵局。在谈判协商之后，§V土耳其工人党§!将同§M自由派§!结成联盟，危机得以避免。§!"
 RULE_OPTION_TUR_ELECTION_71_PATH_SOCIALISTS_REVOLUTION: "§V社会主义者§!当选 - §V革命§!"
 RULE_OPTION_TUR_ELECTION_71_PATH_SOCIALISTS_REVOLUTION_DESC: "§F§V穆罕默德·阿里·艾巴尔§!领导的§V社会主义者§!将代表§V土耳其工人党§!参选，在1971年大选中赢得胜利。然而，由于其不拥有议会多数，选举陷入僵局。在谈判协商中，§V土耳其工人党§!拒绝同§M自由派§!结成联盟，随后发动§V革命§!，接管了国家。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_TUR   土耳其 - 1963年大选§!中预设§M民主革新党 - 社会主义者§!§!"
