 RULE_OPTION_GER_FATE_BRG_BORDER_RANDOM: "默认 - AI随机"
 RULE_OPTION_GER_FATE_BRG_BORDER_RANDOM_DESC: "§F§h勃艮第骑士团国§!崩溃后，§o德国§!重掌了前骑士团国领土，重申西欧霸权。然而，法国因协定或战争在§o德国§!缺席的同时成为了§M自由国家组织§!的一员。尽管今日§o德国§!已然复兴，却也无法令法国破镜重圆。更糟的是，§M自由国家组织§!已经在法国驻军以增强法国的军事力量。勃艮第领土如今被§M自由国家组织§!和§o第三帝国§!分割掌控，一场危机就此爆发。全世界的命运就落在了这场两大超级大国又一次爆发的西欧冲突之上。§!\n\n§R要求：§!\n§B法国§!§Y加入了§!§M自由国家组织。§!"
