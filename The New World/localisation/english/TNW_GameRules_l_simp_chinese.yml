 RULE_OPTION_BUL_COUP_OUTCOME_FASCISM_DESC: "§F保加利亚沙皇§L西美昂二世§!和一众政府官员在破坏性的索非亚爆炸案中遇刺，这将极大撼动保加利亚沙皇国的政坛，并为§J托多尔·热科夫§!及其准军事运动推翻保加利亚现任政府创造机会。热科夫以其军国主义和对建立法西斯政权的渴望而闻名。只有时间才能证明，他能否实现自己的雄心壮志。§!"
