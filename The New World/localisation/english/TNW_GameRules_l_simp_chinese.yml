 RULE_OPTION_GER_CIVIL_WAR_BUFF_RANDOM: "默认 - 无增强"
 RULE_OPTION_GER_CIVIL_WAR_BUFF_RANDOM_DESC: "§F\n\n§G被选中的一方将在德国内战期间获得大量战斗加成。§!\n§w警告§!：海德里希不会获得任何战斗加成，因为AI海德里希被设计为无法赢得德国内战。§!"
