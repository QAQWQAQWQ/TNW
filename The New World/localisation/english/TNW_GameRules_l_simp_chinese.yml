 RULE_OPTION_GER_FATE_BRG_BORDER_NO_DESC: "§F§o大日耳曼国§!与§M美国§!政府最终没能就勃艮第的边界问题达成一致。两国均拒绝在战后撤出在勃艮第地区的军队，并且变本加厉地展开了高强度的对峙，华盛顿与日耳曼尼亚当局均进行了一场紧急会议——尽管两方都拒绝对此事做出更多评论。\n\n§R要求：§!\n勃艮第已经崩溃，而德美都入侵了勃艮第骑士团国。§!"
