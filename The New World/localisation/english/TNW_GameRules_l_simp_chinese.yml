 RULE_OPTION_YEM_CIVIL_WAR_OUTCOME_RANDOM_DESC: "§F革命行动的时钟滴答作响，宣告了也门解放时刻的到来。理想主义者阿卜杜拉·萨拉勒率领大批革命力量拿起武器，反抗以扎伊迪伊玛目为首的封建势力及其部落盟友。唯有时间才能告诉我们，何人将在这场冲突中胜出，并成为整个也门无可争议的领导人。\n\n§G被选中的一方将获得大量战斗加成，这些加成会在获胜后被移除。§!\n\n§R要求：§!\n§Y石油危机已经开始§!§!"
