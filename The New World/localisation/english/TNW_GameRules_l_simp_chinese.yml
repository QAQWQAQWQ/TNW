 RULE_OPTION_USA_SMITH_PRESIDENCY_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_USA_SMITH_PRESIDENCY_PATH_RANDOM_DESC: "§F为了使她的立法计划在国会获得通过，史密斯总统必须做出一个非常艰难的决定。她必须决定是与马克思党团合作，不顾自己的感受，或是与主权党团合作。当然，如果总统希望自己的美好愿景不受污染，她也可以选择孓然一身，独自行动……§!"
 RULE_OPTION_USA_SMITH_PRESIDENCY_PATH_LEFT: "与£GFX_npp_c_texticon §K进步党团§!共事"
 RULE_OPTION_USA_SMITH_PRESIDENCY_PATH_LEFT_DESC: "§F为使立法计划获得通过，史密斯总统决定通过与NPP的马克思党团合作来争取对她政策的支持。尽管史密斯的支持群体对此感到不安，他们鄙视左派，但总统相信这是让她的法案获得通过的捷径。§!"
 RULE_OPTION_USA_SMITH_PRESIDENCY_PATH_MODERATE: "£GFX_npp_texticon §O公约§!优先"
 RULE_OPTION_USA_SMITH_PRESIDENCY_PATH_MODERATE_DESC: "§F史密斯总统没有把总统的立法计划卖给马克思党团或NPP中更极端的分子，而是决定所有党派必须团结一致，服从他们的领导人。史密斯政府的成败将取决于她能否将所有党派拧成一股紧紧攥在她手里的绳子……§!"
 RULE_OPTION_USA_SMITH_PRESIDENCY_PATH_RIGHT: "与£GFX_npp_fr_texticon 与§g国民党团§!共事"
 RULE_OPTION_USA_SMITH_PRESIDENCY_PATH_RIGHT_DESC: "§F为了使她的立法计划获得通过，史密斯总统选择与NPP中的主权党团合作，不去指望进步党团的支持，转而依靠她的基础。尽管自由派和进步人士对总统竟然愿意同这样的人合作感到震惊，但总统仍相信该党将为她通过法案助上一臂之力。§!"
 USA_RDC_PRIMARIES_1972: "£TNO_game_rule_flag_USA   美利坚合众国 - 1972年共民联盟初选"
 RULE_OPTION_USA_RDC_PRIMARIES_1972_RANDOM: "默认 - AI随机"
 RULE_OPTION_USA_RDC_PRIMARIES_1972_RANDOM_DESC: "§F\n\n§R要求：§!\n§O国家进步公约§!总统候选人赢得§Y1968年大选§!\n§x或§!\n1964年总统已满两届任期§!"
 RULE_OPTION_USA_RDC_PRIMARIES_1972_KIRKPATRICK: "£GFX_rd_d_texticon §B珍妮·柯特帕特里克§!"
 RULE_OPTION_USA_RDC_PRIMARIES_1972_KIRKPATRICK_DESC: "§F§B民主党§!总统候选人，§B珍妮·柯特帕特里克§!，并非是许多人预料中领导§R共和党§!-§B民主党§!联盟投身1972年选举的人物。为了美国的利益，她必须以不妥协的态度为海外自由而战；为了美国的利益，她必须服务于辛勤工作的公民，给予他们在不可预测的世界中开创自己命运的机会，这为柯特帕特里克赢得了共民联盟的提名。依照§B民主党§!的传统，她将在1972年的白宫竞选中领衔，为§M承袭自由主义§!而战。尽管许多鸽派同僚对她持怀疑态度，但毫无疑问，强大的美国就是最好的美国。§!"
 RULE_OPTION_USA_RDC_PRIMARIES_1972_ROMNEY: "£GFX_rd_r_texticon §R乔治·罗姆尼§!"
 RULE_OPTION_USA_RDC_PRIMARIES_1972_ROMNEY_DESC: "§F随着§R“大老党”§!的发展，其候选人也在不断变化：1972年，§R共和党§!推出了§R乔治·罗姆尼§!。这位密歇根州长曾在州议会两党联盟的授权下明确地守住了民权的底线，他试图将同样的治理风格带进白宫椭圆形办公室。他的履历将为他赢得§R共和党§!-§B民主党§!联盟的提名，在1972年的白宫竞选中举起§i现代保守主义§!的大旗。§R罗姆尼§!倡导可靠的私营部门与全体美国人勤奋工作为国贡献。他还提出政策和施政方针应当基于事实和逻辑，虽然这样的纲领缺乏情感吸引力，但它能把事情办好。§!"
 USA_NPP_PRIMARIES_1972: "£TNO_game_rule_flag_USA   美利坚合众国 - 1972年国家进步公约初选"
 RULE_OPTION_USA_NPP_PRIMARIES_1972_RANDOM: "默认 - AI随机"
 RULE_OPTION_USA_NPP_PRIMARIES_1972_RANDOM_DESC: "§F§m美国§!走进1972年，§O国家进步公约§!必须再次团结起来，决定由谁带领他们进行白宫竞选。大会会场中持续数月的激烈初选过后，代表们将再次发声，提名§ONPP§!的总统候选人。不论何人获得提名，只要当选总统，他就有机会按照自己的愿景塑造§ONPP§!。§R尽管有上帝保佑，一名代表着美国§e极§!§o端§!派的候选人仍将从瓦砾中走上台前§!。§!"
 RULE_OPTION_USA_NPP_PRIMARIES_1972_JACKSON: "£GFX_npp_c_texticon §K亨利·M·杰克逊§!"
 RULE_OPTION_USA_NPP_PRIMARIES_1972_JACKSON_DESC: "§F§O国家进步公约§!(§K进步党团§!)候选人§K亨利·M·杰克逊§!将在全国代表大会上§G赢得§!大多数代表的支持，获得公约的总统候选人提名。杰克逊是一位§R鹰派§!§K进步主义者§!，他将会§R进一步§!扩大§M美国§!§Y干涉主义§!理论，以此向海外传播民主，同时支持国内外的§K进步主义§!。在他的任期中，§M美国§!将成为§P西部进步主义§!国家。\n\n§R要求：§!\n§R共和党§! - §B民主党§!候选人赢得§Y1968年选举§!\n§x或者§!\n1964年当选总统任职已满两届任期§!"
 RULE_OPTION_USA_NPP_PRIMARIES_1972_SCHLAFLY: "£GFX_npp_fr_texticon §g菲莉丝·施拉夫利§!"
 RULE_OPTION_USA_NPP_PRIMARIES_1972_SCHLAFLY_DESC: "§F遍观§O国家进步公约§!，虽然其中众人的理念截然不同，但无人不懂得§Y妥协§!的艺术。然而，§g国民党团§!候选人§g菲莉丝·施拉夫利§!是个例外。§g施拉夫利§!虽身为女性，但却和许多其他团体一样，§R反对§!提高女性地位。她对§g美国传统§!的§x狂热§!信仰将帮助她获得§ONPP§!总统候选人提名，在1972年的§W白宫§!之战中高举战旗，领导一场§L旧保守主义§!的十字军。她的理念为她§G博得了§!§i社会§!以及§R财政§!保守派的欢心，同时，尽管她的政治联盟就§R鹰派§!外交政策达成了共识，但§g施拉夫利§!可不会让自己被如此§x无知的愚蠢§!所吓倒。\n\n§R要求：§!\n§R共和党§! - §B民主党§!候选人赢得§Y1968年选举§!\n§x或者§!\n1964年当选总统任职已满两届任期§!"
 RULE_OPTION_USA_NPP_PRIMARIES_1972_HALL: "£GFX_npp_l_texticon §e格斯·霍尔§!"
 RULE_OPTION_USA_NPP_PRIMARIES_1972_HALL_DESC: "§F§O国家进步公约§!(§e马克思党团§!)候选人§e格斯·霍尔§!赢得了公约的总统候选人提名，整个美国都为之惊心骇瞩、倒吸凉气。作为一名直言不讳的§e马列主义者§!，§e霍尔§!通过承诺变革赢得了许多选票，这些选民都对贫困和种族主义感到愤慨与失望。§R然而，他本质上不过是只披着羊皮的豺狼§!。\n\n§R要求：§!\n一名§O国家进步公约§!候选人赢得§Y1968年大选§!，§e马克思党团§!至少拥有§Y15%§!的支持度。\n§x或§!\n1964年当选总统任职已满两届任期，§e马克思党团§!至少拥有§Y10%§!的支持度。\n§y且§!\n£GFX_rd_d_texticon §B菲利普·哈特§!§R未§!赢得1968年总统大选。§!"
 RULE_OPTION_USA_NPP_PRIMARIES_1972_YOCKEY: "£GFX_npp_y_texticon §o弗朗西斯·P·约基§!"
 RULE_OPTION_USA_NPP_PRIMARIES_1972_YOCKEY_DESC: "§F当§O国家进步公约§!（§o“主权党团”§!）候选人§o弗朗西斯·帕克·约基获得该党的总统§!提名时，慌乱和恐惧将如野火般在辽阔的美利坚大地上奔腾。约基是个恬不知耻的§r德国§!§o纳粹§!支持者和毫不掩饰的白人至上主义者，§R他将撕裂美国，把后者打造成一个极权和残酷压迫的§o民族社会主义§!独裁国家§!。\n\n§R要求：§!\n一名§O国家进步公约§!候选人赢得§Y1968年大选§!，§j主权党团§!至少拥有§Y15%§!的支持度。\n§x或§!\n1964年当选总统任职已满两届任期，§j主权党团§!至少拥有§Y10%§!的支持度。\n§y且§!\n£GFX_rd_d_texticon §B菲利普·哈特§!§R未§!赢得1968年总统大选。§!"
