 COLOMBIA_CIVIL_WAR_OUTCOME: "£TNO_game_rule_flag_COL  £TNO_game_rule_flag_CLL  £TNO_game_rule_flag_CLC  £TNO_game_rule_flag_CLD   哥伦比亚内战"
 RULE_OPTION_COLOMBIA_CIVIL_WAR_OUTCOME_RANDOM: "默认 - AI随机"
 RULE_OPTION_COLOMBIA_CIVIL_WAR_OUTCOME_RANDOM_DESC: "§F目前哥伦比亚仍处在1956年和平协议造就的脆弱和平之中。但现状不会持续太久。暴力事件层出不穷，国家北部的小规模冲突不断升级，哥伦比亚将再度陷入战火。§s中央政府§!、§V哥伦比亚革命联盟§!和§J新格拉纳达§!的战争中，尸山血海将像五十年代一样遍布哥伦比亚大地。新一轮暴力冲突的结局仍未确定。哥伦比亚或许会摆脱长期困扰其子民的暴力时代，也可能会在更恐怖的事态发生之后祈祷重回五十年代。\n\n§R要求：§!\n§Y哥伦比亚内战爆发§!§!"
 RULE_OPTION_COLOMBIA_CIVIL_WAR_OUTCOME_COL: "£TNO_game_rule_flag_IBR  £TNO_game_rule_flag_COL   §L哥伦比亚§!§i共和§!§M国§!胜利"
 RULE_OPTION_COLOMBIA_CIVIL_WAR_OUTCOME_COL_DESC: "§F哥伦比亚的合法政府赢得了哥伦比亚内战。这一事态将如何发展尚不明朗，但哥伦比亚的未来已掌握在自己手里。§!"
 RULE_OPTION_COLOMBIA_CIVIL_WAR_OUTCOME_CLL: "£TNO_game_rule_flag_USA  £TNO_game_rule_flag_CLL   §P哥伦比亚革命联盟§!胜利"
 RULE_OPTION_COLOMBIA_CIVIL_WAR_OUTCOME_CLL_DESC: "§F受OFN支持的哥伦比亚革命联盟在内战中取得了胜利。尽管他们的前途尚不明朗，但可以确定的是这一国家将坚定地站在美国一边。哥伦比亚将会加入自由国家组织。§!"
 RULE_OPTION_COLOMBIA_CIVIL_WAR_OUTCOME_CLC: "£TNO_game_rule_flag_JAP  £TNO_game_rule_flag_CLC   §J新格拉纳达国§!胜利"
 RULE_OPTION_COLOMBIA_CIVIL_WAR_OUTCOME_CLC_DESC: "§F新格拉纳达法西斯政府赢得了哥伦比亚内战，这个新兴国家日后的命运尚有待观察。无论是意大利、日本还是伊比利亚提供支持，她的未来都不甚明朗，至少当下如此。§!"
 RULE_OPTION_COLOMBIA_CIVIL_WAR_OUTCOME_CLD: "£TNO_game_rule_flag_GER  £TNO_game_rule_flag_CLD   §o第二爱国军§!胜利"
 RULE_OPTION_COLOMBIA_CIVIL_WAR_OUTCOME_CLD_DESC: "§F§o第二爱国军§!在哥伦比亚内战中得胜，§o阿方索·乌里韦·米萨斯§!则已自立为新生的§o哥伦比亚自由邦§!的主席。对德国与纳粹主义而言，这是南美大陆上一场激动人心的大胜。乌里韦·米萨斯主席已与§q团结协定§!展开外交接触，显然，哥伦比亚即将成为§q德国§!在新大陆的忠实堡垒，也意味着§m美国§!霸权的轻蔑羞辱。§!"
 SECOND_COLOMBIA_CIVIL_WAR_OUTCOME: "£TNO_game_rule_flag_CLL_Partisans  £TNO_game_rule_flag_CLC_CCW2  £TNO_game_rule_flag_CLD_unification   第二次哥伦比亚内战"
 RULE_OPTION_SECOND_COLOMBIA_CIVIL_WAR_OUTCOME_RANDOM: "默认 - AI随机"
 RULE_OPTION_SECOND_COLOMBIA_CIVIL_WAR_OUTCOME_RANDOM_DESC: "§F在乌里韦·米萨斯主席遇刺后，哥伦比亚战端再开。两大新阵营——民主派领导人们组成的委员会麾下的§s统一民主阵线§!，以及§o埃里韦托·施瓦陶§!领导的§o哥伦比亚民族社会主义联盟§!——正为权力而战。出人意料的是，§s统一民主阵线§!已与§o自由邦§!政权的残余势力结盟来对抗民族社会主义联盟。这一同盟能取胜吗？还是说，施瓦陶派将在哥伦比亚建立民族社会主义政权？\n\n§R要求：§!\n§Y在£TNO_game_rule_flag_COL  £TNO_game_rule_flag_CLL  £TNO_game_rule_flag_CLC  £TNO_game_rule_flag_CLD   哥伦比亚内战中§!预设§Y£TNO_game_rule_flag_GER  £TNO_game_rule_flag_CLD   §o第二爱国军§!胜利§!§!"
 RULE_OPTION_SECOND_COLOMBIA_CIVIL_WAR_OUTCOME_CLL: "£TNO_game_rule_flag_USA  £TNO_game_rule_flag_CLL_Partisans   §s统一民主阵线§!胜利"
 RULE_OPTION_SECOND_COLOMBIA_CIVIL_WAR_OUTCOME_CLL_DESC: "§F§o埃里韦托·施瓦陶§!领导的哥伦比亚联盟正为权力而战。意外的是，§s统一民主阵线§!选择与§o自由邦§!政权的残余势力结盟来对抗民族社会主义联盟。大同盟赢得了内战，而在并吞民族社会主义联盟治下的土地后，§s统一民主阵线§!巩固了它的地位。§!"
 RULE_OPTION_SECOND_COLOMBIA_CIVIL_WAR_OUTCOME_CLC: "£TNO_game_rule_flag_GER  £TNO_game_rule_flag_CLC_CCW2   §o民族社会主义联盟§!胜利"
 RULE_OPTION_SECOND_COLOMBIA_CIVIL_WAR_OUTCOME_CLC_DESC: "§F§o埃里韦托·施瓦陶§!领导的哥伦比亚联盟正为权力而战。尽管§o自由邦§!与§s统一民主阵线§!出人意料地结为同盟，施瓦陶的民族社会主义联盟仍取得了内战的胜利。可预见的是，施瓦陶治下的哥伦比亚将抛弃雅利安克里奥尔主义、转向正统§o民族社会主义§!，以免重演此前自由邦的错误。§!"
 RULE_OPTION_SECOND_COLOMBIA_CIVIL_WAR_OUTCOME_CLD: "£TNO_game_rule_flag_CLD_unification   §o哥伦比亚自由邦§!胜利"
 RULE_OPTION_SECOND_COLOMBIA_CIVIL_WAR_OUTCOME_CLD_DESC: "§F§o埃里韦托·施瓦陶§!领导的哥伦比亚联盟正为权力而战。意外的是，§s统一民主阵线§!选择与§o自由邦§!政权的残余势力结盟来对抗民族社会主义联盟。大同盟赢得了内战，而在并吞民族社会主义联盟治下的土地后，自由邦巩固了它的地位。§!"
 THIRD_COLOMBIA_CIVIL_WAR_OUTCOME: "£TNO_game_rule_flag_CLL_CCW3  £TNO_game_rule_flag_CLD_CCW3   第三次哥伦比亚内战"
 RULE_OPTION_THIRD_COLOMBIA_CIVIL_WAR_OUTCOME_RANDOM: "默认 - AI随机"
 RULE_OPTION_THIRD_COLOMBIA_CIVIL_WAR_OUTCOME_RANDOM_DESC: "§F在击败§o民族社会主义联盟§!后，一同对抗民社联盟的前盟友§o玻利瓦尔共和国§!与§s统一民主阵线§!如今兵刃相向，争夺对哥伦比亚的控制权。\n这是不到十年间哥伦比亚发生的第三场内战：这个国家已被前两场毁得千疮百孔，却还要遭受更多痛苦。无论哪边赢得了内战，又无论谁站到了国家的顶端，胜利的果实充其量也只是苦甜参半。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_CLL_Partisans  £TNO_game_rule_flag_CLC_CCW2  £TNO_game_rule_flag_CLD_unification   第二次哥伦比亚内战§!中§R未§!预设§Y£TNO_game_rule_flag_GER  £TNO_game_rule_flag_CLC_CCW2   §o民族社会主义联盟§!胜利§!§!"
 RULE_OPTION_THIRD_COLOMBIA_CIVIL_WAR_OUTCOME_CLL: "£TNO_game_rule_flag_USA  £TNO_game_rule_flag_CLL_CCW3   §s哥伦比亚民主共和国§!胜利"
 RULE_OPTION_THIRD_COLOMBIA_CIVIL_WAR_OUTCOME_CLL_DESC: "§F§s统一民主阵线§!将在第三次哥伦比亚内战中取胜。显然，哥伦比亚的未来深藏在残垣断壁之中，人们需要极大的努力才能抚平战争带来的创伤。\n但§s统一民主阵线§!认为第一要务是重建民主以使得哥伦比亚的前景一片光明，而在这之前他们将无暇顾及其他事务。不过时间会告诉我们他们最终能否实现这一目标。§!"
 RULE_OPTION_THIRD_COLOMBIA_CIVIL_WAR_OUTCOME_CLD: "£TNO_game_rule_flag_CLD_CCW3   §o哥伦比亚玻利瓦尔共和国§!胜利"
 RULE_OPTION_THIRD_COLOMBIA_CIVIL_WAR_OUTCOME_CLD_DESC: "§F§o何塞·卡马乔·卡雷尼奥§!和§o民族主义行动党§!将在第三次哥伦比亚内战中取胜。显然，哥伦比亚的未来深藏在残垣断壁之中，人们需要极大的努力才能抚平战争带来的创伤。\n但对于卡雷尼奥和§o民族主义行动党§!来说，重建的优先级要排在第二位，甚至是第三位。他们会把精力放在加强对哥伦比亚政府、人民以及领土的控制上，以此来证明法西斯主义已经在这片土地上取得了永恒的胜利。§!"
 SAF_REFERENDUM: "£TNO_game_rule_flag_SAF   南非公投 - 君主制或共和制"
 RULE_OPTION_SAF_REFERENDUM_RANDOM: "默认 - AI随机"
 RULE_OPTION_SAF_REFERENDUM_RANDOM_DESC: "§F尽管§j南非§!政府试图回避§m君主制§!争论，但§L国民党§!制造了一场棘手的政治僵局迫使其直面问题。决定§j南非§!未来政治命运的全民公投已被安排，§B联合党§!将动员一切力量维持§m君主制§!。而在另一边，代表布尔人利益的§L国民党§!将大力推动§j南非§!转变为§Y共和国§!。§!"
 RULE_OPTION_SAF_REFERENDUM_MONARCHIST: "§m君主制§!"
 RULE_OPTION_SAF_REFERENDUM_MONARCHIST_DESC: "§F公投日到来，多数§j南非§!公民将投票赞成§Y维持现状§!，国家因此将继续作为一个自治领存在，并保留§m君主制§!。无论是与§V非国大§!密切合作，抑或采取其他手段，§B联合党§!都将予以§L国民党§!沉重打击，使§J布尔人§!的利益遭受重挫。这将会进一步激怒本已处在爆发边缘的§J布尔人§!。王位或许仍将空悬，但它至少得以存续。§!"
 RULE_OPTION_SAF_REFERENDUM_REPUBLIC: "§Y共和制§!"
 RULE_OPTION_SAF_REFERENDUM_REPUBLIC_DESC: "§F政府与§B联合党§!未能为§m君主制§!等议题争取到足够支持，因而遭遇惨败，多数§j南非§!公民将投票赞成废除君主制以及国家的自治领地位。如此一来，§j南非§!将会向§Y共和国§!过渡，§L国民党§!及其§J布尔人§!选民借此获得了强有力的政治优势地位，§j南非§!土著则感到深深的绝望。然而，公投结果是否足以安抚§J布尔人§!，却是另一个问题。§!"
