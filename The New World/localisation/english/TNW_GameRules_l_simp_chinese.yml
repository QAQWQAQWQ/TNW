 DEN_PATH: "£TNO_game_rule_flag_DEN   丹麦 - 贝斯特政权的命运"
 RULE_OPTION_DEN_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_DEN_PATH_RANDOM_DESC: "§F丹麦虽是最早被纳入德意志版图的国家，却始终处于外交棋局的边缘位置。德国势力圈在内战烽火中轰然倒塌，丹麦局势随之动荡。面对权力真空，各方力量展开殊死博弈，有的希望恢复民主，有的企图独揽大权：§L贝斯特§!率领团结协定的忠仆，§s冯·汉内肯§!志在建立专员辖区，§i斯文宁森§!领导民主派，而§o马丁森§!麾下则是民族社会主义者。§!"
 RULE_OPTION_DEN_PATH_AUTHORITARIAN_DEMOCRACY: "£TNO_game_rule_flag_DEN   模范保护领"
 RULE_OPTION_DEN_PATH_AUTHORITARIAN_DEMOCRACY_DESC: "§F德国陷入动荡之际，丹麦试图挣脱枷锁改写国运，奈何天意难违。§L维尔纳·贝斯特§!最终巩固了他的统治，丹麦仍将作为§L威权民主主义§!的团结协定保护国存在。人们普遍认丹麦将回归旧体制，沦为彻头彻尾的德国傀儡。§!"
 RULE_OPTION_DEN_PATH_DESPOTISM: "£TNO_game_rule_flag_DEN_RK   雄心壮志的专员"
 RULE_OPTION_DEN_PATH_DESPOTISM_DESC: "§F德国陷入动荡之际，丹麦试图挣脱枷锁改写国运。可惜，哥本哈根街头血战数日后，§s冯·汉内肯§!带着§s驻防德军§!扫清了其他势力。这位新总督的手段比前更加狠辣，他将把丹麦改组为§s专制§!的专员辖区，最终丹麦将并入德国，丹麦民族将跪服于德意志之下，希尔德之地为她的命运垂泪……§!"
 RULE_OPTION_DEN_PATH_CONSERVATIVE_DEMOCRACY: "£TNO_game_rule_flag_DEN_social_conservative   £TNO_game_rule_flag_DEN_despotism   短命的民主"
 RULE_OPTION_DEN_PATH_CONSERVATIVE_DEMOCRACY_DESC: "§F德国陷入动荡之际，丹麦试图挣脱枷锁改写国运。这一次，命运女神对丹麦露出了微笑。一场失败的民族主义者政变之后，§i尼尔斯·斯文宁森§!领导的§i保守民主主义§!者控制了丹麦政府。虽然新政府承诺恢复民主并举行§大选，但这些承诺不会成为现实，§s冯·汉内肯§!麾下的§s驻军§!动员起来，阻止了丹麦的自由化。斯文宁森、民主与丹麦国家的命运悬于一线。§!"
 RULE_OPTION_DEN_PATH_NATIONAL_SOCIALISM: "£TNO_game_rule_flag_DEN_fascism   白万字"
 RULE_OPTION_DEN_PATH_NATIONAL_SOCIALISM_DESC: "§F德国陷入动荡之际，丹麦试图挣脱枷锁改写国运。凌晨时分，§o丹麦民族社会主义人民党§!的准军事组织占领了丹麦首都。他们宣布成立新政府，将贝斯特政府扫进历史的故纸堆。§o克努兹·伯厄·马丁森§!是一个残忍的§o民族社会主义者§!，只要德国决定由他作为元首统治丹麦，他肯定会毫无保留地与德国人合作。§!"
