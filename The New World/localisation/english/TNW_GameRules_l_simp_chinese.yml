 ITA_CIANO_OR_SCORZA: "£TNO_game_rule_flag_ITA   意大利 - 法西斯主义的遗产"
 RULE_OPTION_ITA_CIANO_OR_SCORZA_ROUTE_RANDOM: "默认 - AI随机"
 RULE_OPTION_ITA_CIANO_OR_SCORZA_ROUTE_RANDOM_DESC: "§F§j国家法西斯党§!内反对§j领袖加莱亚佐·齐亚诺§!自由化改革的势力逐渐增长，领袖因此决定兵行险着，在维罗纳召开一次大会以取得多数支持。他希望§x遏制§!§o强硬派§!，§n完成§!他预想中剩余的改革。但是，§o强硬派§!也希望利用这段时间向§j齐亚诺政权§!打出§x致命一击§!，让§o卡洛·斯科尔扎§!夺取领袖之位，在§n意大利§!重燃§o法西斯§!火焰。\n\n§Y默认情况下，大会结果将随机决定。§!"
 RULE_OPTION_ITA_CIANO: "£TNO_game_rule_flag_ITA   §L齐亚诺§!推动帝国自由化"
 RULE_OPTION_ITA_CIANO_DESC: "§F尽管来自以斯科尔扎为首的法西斯强硬派的压力越来越大，他们指责齐亚诺背叛了§n意大利§!，但齐亚诺还是赢得了夺权之战，成功孤立了党内的强硬派，控制了§n意大利§!的政局。他将带领意大利§V走向§!§P重新§!§M民§!§i主§!§L化§!的未来。§!"
 RULE_OPTION_ITA_SCORZA: "£TNO_game_rule_flag_ITA   §J斯科尔扎§!巩固法西斯统治"
 RULE_OPTION_ITA_SCORZA_DESC: "§F最终，国家法西斯党的强硬派赢下了这场夺权之战，他们推翻了齐亚诺，任命斯科尔扎为新领袖，并重新控制了§n意大利§!的政局。意大利的未来，无论从何种角度来看，都将永远属于§J法西斯主义§!。§!"
 ITA_DEFENSE_PLAN_PATH: "£TNO_game_rule_flag_ITA   意大利 - 后三头同盟国防计划"
 RULE_OPTION_ITA_DEFENSE_PLAN_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_ITA_DEFENSE_PLAN_PATH_RANDOM_DESC: "§F三头同盟解体后，意大利必须决定谁是为维护其地中海霸权更需要防备的危险对象：德国，伊比利亚，还是土耳其？§!"
 RULE_OPTION_ITA_DEFENSE_PLAN_PATH_CADORNA: "卡尔多纳计划 - 北方之盾"
 RULE_OPTION_ITA_DEFENSE_PLAN_PATH_CADORNA_DESC: "§F意大利重点防御德国。§!"
 RULE_OPTION_ITA_DEFENSE_PLAN_PATH_CANEVA: "卡内瓦计划 - 东方之盾"
 RULE_OPTION_ITA_DEFENSE_PLAN_PATH_CANEVA_DESC: "§F意大利将重点防御土耳其。§!"
 RULE_OPTION_ITA_DEFENSE_PLAN_PATH_CAMPIONI: "坎皮奥尼的计划 - 西方之盾"
 RULE_OPTION_ITA_DEFENSE_PLAN_PATH_CAMPIONI_DESC: "§F意大利将重点防御伊比利亚。§!"
 ITA_DEMOCRATIC_ELECTION: "£TNO_game_rule_flag_ITA   意大利 - 首次大选"
 RULE_OPTION_ITA_DEMOCRATIC_ELECTION_RANDOM: "默认 - AI随机"
 RULE_OPTION_ITA_DEMOCRATIC_ELECTION_RANDOM_DESC: "§F§w假如齐亚诺在与斯科尔扎的权力斗争中获胜并成功瓦解了法西斯政权§!，那么§n意大利§!将再次站在另一个历史的十字路口上，庆祝活动很快转变为对未来走向的担忧和不确定。尽管民主之声已然获胜，但他们远未团结起来——各路自由派与左派陷于分裂，每一方都对§n意大利§!的未来有着不同的看法与希冀。当然，也并不是每个人都乐于见证法西斯主义的末路……\n\n§R要求：§!\n£TNO_game_rule_flag_ITA   §Y意大利 - 法西斯主义的遗产§!中预设£TNO_game_rule_flag_ITA   §Y§L齐亚诺§!推动帝国自由化§!"
 RULE_OPTION_ITA_DEMOCRATIC_ELECTION_DC: "£TNO_game_rule_flag_ITA   §M基督教民主党§!赢得选举"
 RULE_OPTION_ITA_DEMOCRATIC_ELECTION_DC_DESC: "§F由§M自由派§!与§i保守派§!组成的基督教民主党将在§n意大利§!后法西斯时代的第一次大选中获胜，这是许多人预期的结果，也是齐亚诺自由化的遗产，更是这个年轻的民主国家受OFN启发的结果。虽然基民党两翼内部是否分裂仍旧不得而知，这可能会以一些无法料想的方式撼动§n意大利§!的民主，但也必须承认，基民党的内部稳定足以确保其在几十年内保持巨大影响力。§!"
 RULE_OPTION_ITA_DEMOCRATIC_ELECTION_FD: "£TNO_game_rule_flag_ITA   §P民主阵线§!赢得选举"
 RULE_OPTION_ITA_DEMOCRATIC_ELECTION_FD_DESC: "§F由§P进步派§!与§V社会主义者§!组成的民主阵线将在§n意大利§!后法西斯时代的第一次大选中获胜，§n意大利§!实现了从法西斯主义到社会主义的彻底转向，这真是一件意想不到之事。然而，与其他政党相比，民主阵线的内部分歧更加严重，它被中左派及一个各自相轻的社会主义派别所分裂。§n意大利§!的未来取决于谁在权力斗争中获胜，§R以及他们是否能保住权力§!。§!"
 RULE_OPTION_ITA_DEMOCRATIC_ELECTION_BN: "£TNO_game_rule_flag_ITA   §L国民联盟§!赢得选举"
 RULE_OPTION_ITA_DEMOCRATIC_ELECTION_BN_DESC: "§F由§L家长制派系§!与§J法西斯主义者§!组成的国民联盟将在§n意大利§!后法西斯时代的第一次大选中获胜，鉴于国民联盟公开为法西斯主义招魂的行为，以及党内那些来自反对重新民主化的斯科尔扎信徒，许多欢迎选举的人无不为这一结果感到错愕与失望。目前，国民联盟很大程度上满足于在民主范围内执政，但党内有一些人希望在§n意大利§!恢复法西斯主义，§R这将导致严重的后果§!。§!"
 ITA_FD_ROUTE: "£TNO_game_rule_flag_ITA   意大利 - 民主阵线的未来"
 RULE_OPTION_ITA_FD_ROUTE_RANDOM: "默认 - AI随机"
 RULE_OPTION_ITA_FD_ROUTE_RANDOM_DESC: "§F民主阵线是一个包容了各派社会主义者的阵线，因此，阵线内部也时常争吵不休。§w如果他们能在§n意大利§!的第一轮选举中胜选§!，那么尽早解决阵线内部的种种矛盾将会是他们就任期间的头等大事，而阵线处理这些矛盾时的抉择则会毋庸置疑地改变§n意大利§!的未来。§!"
 RULE_OPTION_ITA_FD_ROUTE_SOCDEM_CENTER: "§P民主§!优先"
 RULE_OPTION_ITA_FD_ROUTE_SOCDEM_CENTER_DESC: "§F§民主阵线中的§P民主社会主义§!一翼将取得胜利。他们将与阿尔多·莫罗以及§M基督教民主§!党合作，并逐渐将人民阵线转变为一个中左翼政党。§!"
 RULE_OPTION_ITA_FD_ROUTE_SOCDEM_LEFT: "§P联合阵线§!"
 RULE_OPTION_ITA_FD_ROUTE_SOCDEM_LEFT_DESC: "§F民主阵线中的§P社会民主主义§!一翼将取得胜利。但他们并非与自由主义者合作，而是选择与被削弱的自由意志社会主义一翼合作，这将确保民主阵线仍是一个坚实的左翼政党。§!"
 RULE_OPTION_ITA_FD_ROUTE_LIBSOC_DEMOCRATIC: "§n意大利§!§V社会主义§!之道"
 RULE_OPTION_ITA_FD_ROUTE_LIBSOC_DEMOCRATIC_DESC: "§F民主阵线§V革命阵线§!一翼将取得胜利。他们将选择忠于民主价值观，并在§n意式§!民主的框架内运作，避免军队的潜在干预。 §!"
 RULE_OPTION_ITA_FD_ROUTE_LIBSOC_COUP: "选票带来§V革命§!"
 RULE_OPTION_ITA_FD_ROUTE_LIBSOC_COUP_DESC: "§F民主阵线中§V革命阵线§!一翼将取得胜利。然而他们将背叛使他们上台的民主价值观，并试图在上台后进行无产阶级革命，最终导致军队发动政变。§!"
 ITA_DC_ROUTE: "£TNO_game_rule_flag_ITA   意大利 - 基督教民主党的未来"
 RULE_OPTION_ITA_DC_ROUTE_RANDOM: "默认 - AI随机"
 RULE_OPTION_ITA_DC_ROUTE_RANDOM_DESC: "§F§M基督教民主党§!是一个容纳了各派民主人士的大联盟。因此，其饱受内部纷争之苦。§w如果他们能在§n意大利§!的首次大选中获胜§!，那么处理内部事务将会成为他们任期之内首要解决的头等大事。毋庸置疑，他们所做的抉择将改变§n意大利§!的未来。§!"
 RULE_OPTION_ITA_DC_ROUTE_BIG: "一个名副其实的§i统一§!政府"
 RULE_OPTION_ITA_DC_ROUTE_BIG_DESC: "§F基督教民主党内的§i保守主义§!一翼取得胜利。他们选择构筑一个联合议会内小党的大帐篷，将基督教民主党塑造为坚实的§B中间派§!政党。§!"
 RULE_OPTION_ITA_DC_ROUTE_CATHOLIC: "§i白§!花联盟！"
 RULE_OPTION_ITA_DC_ROUTE_CATHOLIC_DESC: "§F基督教民主党内的§i保守主义§!一翼取得胜利。他们选择强化保守派的党内权力，将基督教民主党塑造为坚实的§i中右翼§!政党。§!"
 RULE_OPTION_ITA_DC_ROUTE_FANFANI: "掌控§M民主§!阵营"
 RULE_OPTION_ITA_DC_ROUTE_FANFANI_DESC: "§F基督教民主党内的§M自由§!派系取得胜利。范范尼将担任领导，与§i保守派§!展开“协商”，将基督教民主党转变为§B中间派§!政党。§!"
 RULE_OPTION_ITA_DC_ROUTE_NENNI: "§M中左§!合作"
 RULE_OPTION_ITA_DC_ROUTE_NENNI_DESC: "§F基督教民主党内的§M自由§!派系取得胜利。他们将与南尼及其政治联盟会晤，共同提出§P进步§!议程，将基督教民主党转变为§M中左翼§!政党。§!"
 ITA_BN_ROUTE: "£TNO_game_rule_flag_ITA   意大利 - 国民联盟的未来"
 RULE_OPTION_ITA_BN_ROUTE_RANDOM: "默认 - AI随机"
 RULE_OPTION_ITA_BN_ROUTE_RANDOM_DESC: "§F国民联盟是一个由前法西斯政府成员组成的右翼至极右翼政党，§n意大利§!虽已进入后民主化时代，但其成员依然在政坛继续活动。介于其人员组成，许多观察家担心国民联盟也许不会尊重民主进程，并变得愈发极端。§w如果他们能在§n意大利§!的第一轮选举中胜选§!，那么这些担忧将会成为其任期内的头等大事，而联盟处理这些矛盾时的抉择则会毋庸置疑地改变意大利的未来。§!"
 RULE_OPTION_ITA_BN_ROUTE_AUTHDEM_CENTER: "§L民主§!幸存"
 RULE_OPTION_ITA_BN_ROUTE_AUTHDEM_CENTER_DESC: "§F国民联盟会放弃进一步法西斯化，成为一个坚持民主价值观的温和党派，并且与政治中间派结盟。这将使国民联盟维持其§L民族保守主义§!的意识形态。§!"
 RULE_OPTION_ITA_BN_ROUTE_AUTHDEM_RIGHT: "§L右翼§!阵线"
 RULE_OPTION_ITA_BN_ROUTE_AUTHDEM_RIGHT_DESC: "§F国民联盟会放弃进一步法西斯化，成为一个坚持民主价值观的温和党派，但不与政治中间派结盟，并且保持坚定的右翼立场。尽管如此，国民联盟仍会保持其§L民族保守主义§!的意识形态。§!"
 RULE_OPTION_ITA_BN_ROUTE_FASH_DEMOCRATIC: "§J雄狮§!重归"
 RULE_OPTION_ITA_BN_ROUTE_FASH_DEMOCRATIC_DESC: "§F正如普罗大众担忧的那样，国民联盟党内的§J新法西斯主义§!者扩大了影响。然而，他们仍然接受民主价值观并乐意留在§n意式§!民主框架里，以避免军队干政的潜在风险。§!"
 RULE_OPTION_ITA_BN_ROUTE_FASH_COUP: "再度§J进军§!罗马"
 RULE_OPTION_ITA_BN_ROUTE_FASH_COUP_DESC: "§F正如普罗大众担忧的那样，国民联盟党内的§J新法西斯主义§!者扩大了影响。此外，他们决心背叛把他们抬上大位的民主价值观并采取极端主义立场。他们筹划再来一次“进军罗马”并恢复过去的法西斯统治。这一举措最终导致了一场军事政变。§!"
