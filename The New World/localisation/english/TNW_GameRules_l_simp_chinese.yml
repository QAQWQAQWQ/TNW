 RULE_OPTION_WEST_SIBERIA_UNIFICATION_OUTCOME_SVR_SVERDLOVSK: "£TNO_game_rule_flag_SVR   斯维尔德洛夫斯克胜利"
 RULE_OPTION_WEST_SIBERIA_UNIFICATION_OUTCOME_SVR_SVERDLOVSK_DESC: "§F斯维尔德洛夫斯克将统一西西伯利亚。§!"
 WSR_WSB_WAR_OR_PEACE: "西部超地区阶段统一：战争还是和平？"
 RULE_OPTION_WSR_WSB_WAR_OR_PEACE_RANDOM: "默认 - AI随机"
 RULE_OPTION_WSR_WSB_WAR_OR_PEACE_RANDOM_DESC: "§F1969年，西俄罗斯的统一者与西西伯利亚的统一者都必须决定，他们要通过何种方式统一俄罗斯。§!"
 RULE_OPTION_WSR_WSB_WAR_OR_PEACE_WAR: "§R战争§!"
 RULE_OPTION_WSR_WSB_WAR_OR_PEACE_WAR_DESC: "§F西俄罗斯统一者和西西伯利亚统一者将一决高下。§!"
