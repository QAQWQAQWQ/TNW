 CAR_FATE_PATH: "£TNO_game_rule_flag_USA   美利坚合众国 - 对德属非洲殖民地的管理"
 RULE_OPTION_CAR_FATE_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_CAR_FATE_PATH_RANDOM_DESC: "§F南非战争赢得全面胜利之后，美国面临着在撒哈拉以南非洲大片地区去殖民化的任务。为此，他们将从两个计划中选择一个：要么将这一大块殖民地团结为一个超级国家，要么将它们分割为三个独立的控制区，直到去殖民化进程的结束。\n\n§R要求：§!\n§Y南非战争OFN全面胜利§!§!"
 RULE_OPTION_CAR_FATE_PATH_YES: "£TNO_game_rule_flag_COG_USA   创建单一托管领"
 RULE_OPTION_CAR_FATE_PATH_YES_DESC: "§F美国将试图建立由威廉·威斯特摩兰将军领导的中非共和国来巩固对非洲的控制。这一雄心勃勃的项目能否成功还无从得知……§!"
 RULE_OPTION_CAR_FATE_PATH_NO: "£TNO_game_rule_flag_ANG_USA  £TNO_game_rule_flag_COG_USA  £TNO_game_rule_flag_MZB_USA   分设三个托管领"
 RULE_OPTION_CAR_FATE_PATH_NO_DESC: "§F美国将把非洲划分成三个与前德国殖民地的边境相同的托管领，以更有效地促进去殖民化进程。但维持和稳定这些托管领的开销将十分巨大……§!"
 BOR_ELECTION_OUTCOME: "£TNO_game_rule_flag_BOR   阿非利卡人民邦 - 选举"
 RULE_OPTION_BOR_ELECTION_OUTCOME_RANDOM: "默认 - AI随机"
 RULE_OPTION_BOR_ELECTION_OUTCOME_RANDOM_DESC: "§F由于§O阿非利卡人民邦§!面临的国际压力日益增长，§Y阿尔伯特·赫尔佐格§!总统被迫辞职。§Y赫尔佐格总统§!将会钦点其继任者。\n\n§R要求：§!\n§Y乌班吉-沙里起义，大阿非利加德意志邦崩溃，且阿非利卡人民邦处于和平§!§!"
 RULE_OPTION_BOR_ELECTION_OUTCOME_BOTHA: "博塔当选"
 RULE_OPTION_BOR_ELECTION_OUTCOME_BOTHA_DESC: "§F由于§O阿非利卡人民邦§!面临的国际压力与日俱增，§Y阿尔伯特·赫尔佐格§!总统被迫辞职。赫尔佐格将钦点高度§j亲德§!的§R彼得·威廉·博塔§!作为其继任者。博塔将谋求加强与§j德国§!的关系，§O阿非利卡人民邦§!将在他的领导下加入§j团结协定§!。\n\n§R要求：§!\n§Y施佩尔/鲍曼§!介入了南非战争！§!"
 RULE_OPTION_BOR_ELECTION_OUTCOME_MARAIS: "马雷当选"
 RULE_OPTION_BOR_ELECTION_OUTCOME_MARAIS_DESC: "§F由于§O阿非利卡人民邦§!面临的国际压力与日俱增，§Y阿尔伯特·赫尔佐格§!总统被迫辞职。赫尔佐格将钦点更加务实的§q亚普·马雷§!作为其继任者。马雷将推行中立的外交政策，并寻求在世界舞台上增加§O布尔人的自主性§!。§!"
