 NOR_ELECTION_PATH: "£TNO_game_rule_flag_NOR_Free   挪威 - 1964年大选"
 RULE_OPTION_NOR_ELECTION_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_NOR_ELECTION_PATH_RANDOM_DESC: "§F在§j德意志国§!陷入危亡的混乱时刻，日耳曼尼亚的北部边塞也受到了冲击。§j挪威专员辖区§!在反抗军§D军事抵抗组织§!的袭击下陷入了物资断绝的窘境。形势所迫，挪威专员§j约瑟夫·特博文§!遣散了§j德国§!驻军并出逃。§R挪威的十字旗§!再度飘扬于§M奥斯陆§!，抵抗运动的领袖正在安排挪威25年来首次自由选举。§Y挪威人民§!再也不会于专员辖区的奴隶枷锁中沉沦了，挪威人会自己选择§R挪威§!的未来。\n\n§R要求：§!\n§Y挪威已经§G解放§!§!"
 RULE_OPTION_NOR_ELECTION_PATH_SD: "§P工党§!§G当选§!"
 RULE_OPTION_NOR_ELECTION_PATH_SD_DESC: "§F§P埃纳尔·盖哈德森§!领导的§P工党§!赢得了挪威独立以来首次自由选举的胜利。盖哈德森的诉求与邻国瑞典的现行政策差不多，即要求征收累进税，建立社会保障体系并推动工业化。盖哈德森会重新开始与§MOFN§!接洽，防止德意志鹰再度将挪威笼罩在阴影之中。挪威最终走上了§P进步主义§!之路。§!"
 RULE_OPTION_NOR_ELECTION_PATH_LD: "§M自由党§!§G获选§!"
 RULE_OPTION_NOR_ELECTION_PATH_LD_DESC: "§F§M贡纳尔·加尔博§!领导下的§M自由党§!赢得了挪威独立以来首次自由选举的胜利。加尔博推崇社会进步与一定程度经济自由的结合，他的竞选纲领主要结合了改良社会主义政策和保守主义自由市场经济原则。加尔博还支持环境保护，捍卫挪威的美丽自然。挪威将成为§M自由主义§!国家。§!"
 RULE_OPTION_NOR_ELECTION_PATH_CD: "§B保守党§!§G当选§!"
 RULE_OPTION_NOR_ELECTION_PATH_CD_DESC: "§F§B阿尔夫·舍斯§!领导下的§B保守党§!赢得了挪威独立以来首次自由选举的胜利。阿尔夫计划实行经济自由化与工业化政策，立新教为挪威国教。挪威将成为§B自由保守主义§!国家。§!"
