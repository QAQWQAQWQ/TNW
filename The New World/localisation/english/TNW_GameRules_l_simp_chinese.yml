 RULE_OPTION_TRUJILLO_BLITZ_OUTCOME_DOM: "£TNO_game_rule_flag_DOM   多米尼加共和国胜利"
 RULE_OPTION_TRUJILLO_BLITZ_OUTCOME_DOM_DESC: "§F§J特鲁希略§!在入侵§i海地§!的战斗中势如破竹，顺利将该国纳入囊中。§i海地§!遭到吞并，§J特鲁希略§!在统一整座岛屿后宣布成立§O圣多明各共和国§!。§J特鲁希略§!试图驱逐与灭绝§i海地§!人口，抹除其聚居群落及身份认同，酿成诸多罄竹难书的暴行，许多人因惧怕其渊鱼丛雀的暴政而逃离该岛。§M美利坚合众国§!又失去了一个盟友，§J法西斯主义威胁§!正步步逼近。§!"
