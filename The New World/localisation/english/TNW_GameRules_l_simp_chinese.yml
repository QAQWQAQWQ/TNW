 RULE_OPTION_SPS_PATH_RANDOM_DESC: "§F团结在§r海梅·德尔·博施§!周围的长枪党强硬派对§O弗朗西斯科·佛朗哥§!政府的温和立场感到失望，又厌倦了与§n葡萄牙§!的联盟。他们满怀对速胜的期望而集结于此，但如果胜利迟迟未能兑现，那么挫败感以及某些派别日渐扩大的行动§e可能超出政府掌控……§!\n\n§R要求：§!\n§Y伊比利亚战争仍在持续§!§!"
