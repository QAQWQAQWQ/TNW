 RULE_OPTION_MAD_PADESM_ELECTION_RANDOM_DESC: "§F在维希政权之前就被殖民当局排挤了几十年，§G穷人党§!的§M自由主义§!和§L民族主义者§!对法国人和他们鲁莽的普鲁士主子越来越反感了。现在，岛上的新政府正在为首次自由选举做准备，这将决定§G马达加斯加§!的未来，确定他们§mOFN§!新盟友的利益。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_MAD_insurgent   马达加斯加叛军 - 制宪会议§!中预设§M£TNO_game_rule_flag_USA   £TNO_game_rule_flag_MAD_padesm   §M穷人党§!胜选§!§!"
