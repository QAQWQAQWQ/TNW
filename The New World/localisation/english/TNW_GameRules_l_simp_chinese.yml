 RULE_OPTION_NOV_RESEARCH_FATE_RANDOM: "默认 - AI随机"
 RULE_OPTION_NOV_RESEARCH_FATE_RANDOM_DESC: "§F航空项目对新西伯利亚和阿尔泰联邦的经济和军事至关重要，即使是在政见不一的§i俄罗斯人民党§!内部也几乎得到了一致支持。如果新西伯利亚要成为有竞争力的军事强权，或是挥师解放纳粹军靴下的土地，那么至关重要的一步就是从这非凡的航空研究中汲取成果。注意了，这全靠§L波克雷什金§!的经验——这是其他俄罗斯军阀难以媲美的优势。§!"
