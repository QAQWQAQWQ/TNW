 RULE_GROUP_TNO_RULES_RUSSIA_SOUTHERN_URALS: "£TNO_game_rule_flag_ORE_socialist  £TNO_game_rule_flag_MGN   国家路线 - 俄罗斯 - 南乌拉尔"
 ORE_IDEOLOGY_ROUTE: "£TNO_game_rule_flag_ORE_socialist   奥伦堡 - 委员会"
 RULE_OPTION_ORE_IDEOLOGY_ROUTE_RANDOM: "默认 - AI随机"
 RULE_OPTION_ORE_IDEOLOGY_ROUTE_RANDOM_DESC: "§F无政府主义者与社会主义者争执不休，奥伦堡大会终于召开。无政府主义可能会继续存在，但也存在其他可能。亚历山大·布尔巴试图以寡头政治实现民主，他主张在奥伦堡施行中央集权，打造单一制政府。他的对手，格奥尔基·马林科夫，也希望将奥伦堡改革成一个中央集权的国家，但要遵循强硬的社会主义原则。§!"
 RULE_OPTION_ORE_IDEOLOGY_ROUTE_LIBSOC_SUCCESS: "£TNO_game_rule_flag_ORE_socialist   工人委员会§G获胜§!"
 RULE_OPTION_ORE_IDEOLOGY_ROUTE_LIBSOC_SUCCESS_DESC: "§F尽管困难重重，奥伦堡的居民仍然相信无政府主义，虽然缺乏中央集权导致第五十八届大会的提议未能通过，但轮值主席制度还是被接受了。在第五十九届大会上，提议的集权措施将被接受，奥伦堡将团结起来巩固自身。奥伦堡将保持§V无政府共产主义§!。§!"
 RULE_OPTION_ORE_IDEOLOGY_ROUTE_LIBSOC_FAIL: "£TNO_game_rule_flag_ORE_socialist   工人委员会§R失败§!"
 RULE_OPTION_ORE_IDEOLOGY_ROUTE_LIBSOC_FAIL_DESC: "§F尽管困难重重，奥伦堡的居民仍然相信无政府主义，虽然缺乏中央集权导致第五十八届大会的提议未能通过，但轮值主席制度还是被接受了。然而，在第五十九届大会上，因奥伦堡社会太过分裂无力团结，提议的集权措施未能通过议决。这使奥伦堡迅速落入混乱与内斗的深渊，最终秩序瘫痪、形单影只。§!"
 RULE_OPTION_ORE_IDEOLOGY_ROUTE_AUTHSOC: "£TNO_game_rule_flag_ORE_communist   §e马林科夫§!§G就任§!主席"
 RULE_OPTION_ORE_IDEOLOGY_ROUTE_AUTHSOC_DESC: "§F无政府主义者与社会主义者争执不休，奥伦堡大会终于召开。然而，这一次，大会经投票废除自身，同时选出§e格奥尔基·马林科夫§!为奥伦堡主席。马林科夫与弗拉基米尔·列宁关系颇深，苏联时期位高权重的他将把自身威权社会主义的愿景强加于奥伦堡的公社。奥伦堡将接受§e布尔什维主义§!的领导。§!"
 RULE_OPTION_ORE_IDEOLOGY_ROUTE_AUTHDEM: "£TNO_game_rule_flag_ORE   §L布尔巴§!§G就任§!主席"
 RULE_OPTION_ORE_IDEOLOGY_ROUTE_AUTHDEM_DESC: "§F无政府主义者与社会主义者争执不休，奥伦堡大会终于召开。然而，这一次，大会经投票废除自身，同时选出§L亚历山大·布尔巴§!为奥伦堡主席。布尔巴是一位受过良好教育的实业家，他将尝试把奥伦堡分散无序的定居点打造成西俄的威尼斯。布尔巴与乌拉尔卫队有联系，可以与其结成有力的联盟来对抗李森科和迪勒万格。奥伦堡将接受§L寡头制§!的领导。§!"
 MGN_LEADER_ROUTE: " £TNO_game_rule_flag_MGN   马格尼托哥尔斯克 - 疯癫之国的命运"
 RULE_OPTION_MGN_IDEOLOGY_ROUTE_RANDOM: "默认 - AI随机"
 RULE_OPTION_MGN_IDEOLOGY_ROUTE_RANDOM_DESC: "内务人民委员会仍是其疯狂领主的走狗，马格尼托哥尔斯克的独裁科学家特罗菲姆·李森科对仍以铁腕控制这黑山。没人能从他那疯狂的实验中拯救南乌拉尔的人民……"
 RULE_OPTION_MGN_LEADER_ROUTE_GOOD_NKVD: "£TNO_game_rule_flag_MGN_NKVD   NKVD的仁慈政变"
 RULE_OPTION_MGN_LEADER_ROUTE_GOOD_NKVD_DESC: "§F内务人民委员会终于无法忍受特罗菲姆·李森科那毫无意义且残忍发指的实验，发动政变处理掉了黑山的疯魔。斯捷潘·班科夫及其摩托化步兵师控制了马格尼托哥尔斯克，但出人意料的是，内务人民委员却相对仁慈地统治人民。§!"
 RULE_OPTION_MGN_LEADER_ROUTE_BAD_NKVD: "£TNO_game_rule_flag_MGN_NKVD   NKVD的独裁政变"
 RULE_OPTION_MGN_LEADER_ROUTE_BAD_NKVD_DESC: "§F内务人民委员会终于无法忍受特罗菲姆·李森科那毫无意义且残忍发指的实验，发动政变处理掉了黑山的疯魔。斯捷潘·班科夫及其摩托化步兵师控制了马格尼托哥尔斯克，然而，人民无法忘却班科夫曾为李森科效力多年这一事实，怨恨不断积累，内务人民委员会终于开始镇压，马格尼托哥尔斯克从一个暴君换成了另一个暴君。§!"
 SRL_RACE_FOR_URALS: "乌拉尔势力 - 南乌拉尔外交竞赛"
 RULE_OPTION_SRL_RACE_FOR_URALS_RANDOM: "默认 - AI随机"
 RULE_OPTION_SRL_RACE_FOR_URALS_RANDOM_DESC: "§F在统一各自的地区后，西俄罗斯和西西伯利亚将开始争夺南乌拉尔的控制权。§!"
 RULE_OPTION_SRL_RACE_FOR_URALS_FAVOR_WSR: "青睐西俄罗斯统一者"
 RULE_OPTION_SRL_RACE_FOR_URALS_FAVOR_WSR_DESC: "§F剩余的南乌拉尔国家将投靠西俄罗斯统一者一方并被整合。\n\n§R要求：§!\n§Y幸存的南乌拉尔国家与西俄罗斯统一者存在和平统一可能§!§!"
 RULE_OPTION_SRL_RACE_FOR_URALS_FAVOR_WSB: "青睐西西伯利亚统一者"
 RULE_OPTION_SRL_RACE_FOR_URALS_FAVOR_WSB_DESC: "§F剩余的南乌拉尔国家将投靠西西伯利亚统一者一方并被整合。\n\n§R要求：§!\n§Y幸存的南乌拉尔国家与西西伯利亚统一者存在和平统一可能§!§!"
 RULE_GROUP_TNO_RULES_RUSSIA_CENTRAL_SIBERIA: "£TNO_game_rule_flag_NOV  £TNO_game_rule_flag_TOM_DEC  £TNO_game_rule_flag_SBA_LibSoc  £TNO_game_rule_flag_KEM   国家路线 - 俄罗斯 - 中西伯利亚"
 TOM_1963_ELECTION:0 "£TNO_game_rule_flag_TOM   托木斯克 - 1962年选举"
 RULE_OPTION_TOM_1963_ELECTION_RANDOM: "默认 - AI随机"
 RULE_OPTION_TOM_1963_ELECTION_RANDOM_DESC: "§F卫国战争后，反对苏维埃政权的艺术家、作家、作曲家组建了理想主义的共和国——中西伯利亚共和国，统治范围包括中西伯利亚大部。然而，在亨里希·亚戈达的失败入侵和一连串叛乱之后，如今的中西伯利亚共和国只剩下首都托木斯克及周遭的西伯利亚荒原。理想国能在反乌托邦的世界中生存下去吗？§!"
 RULE_OPTION_TOM_1963_ELECTION_HUMANISTS: "£TNO_game_rule_flag_TOM_HUM   §P人文党§!的托木斯克"
 RULE_OPTION_TOM_1963_ELECTION_HUMANISTS_DESC: "§F鲍里斯·帕斯捷尔纳克去世后，托木斯克将人文党人沙龙选入政府。人文党人笃信对人权、言论自由的强有力保护以及民主的社会主义道路，他们将会把共和国转变为西伯利亚联邦，并带领她走向§P乌托邦社会主义§!的人道未来。§!"
 RULE_OPTION_TOM_1963_ELECTION_MODERNISTS: "£TNO_game_rule_flag_TOM_MOD   §M现代党§!的托木斯克"
 RULE_OPTION_TOM_1963_ELECTION_MODERNISTS_DESC: "§F鲍里斯·帕斯捷尔纳克去世后，托木斯克将现代党人沙龙选入政府。现代党人提倡现代化技术官僚国家的发展路线，并扩张教育系统以建立一个科学社会，他们将带领西伯利亚共和国走向§M自由主义§!的科学未来。§!"
 RULE_OPTION_TOM_1963_ELECTION_DECEMBRISTS: "£TNO_game_rule_flag_TOM_DEC   §i十二月党§!的托木斯克"
 RULE_OPTION_TOM_1963_ELECTION_DECEMBRISTS_DESC: "§F鲍里斯·帕斯捷尔纳克去世后，托木斯克将十二月党人沙龙选入政府。十二月党人强调俄罗斯的历史、人民和环境，以及他们与历史的联系和对传统的维护。十二月党人将带领西伯利亚共和国走向§i农业主义§!的传统未来。§!"
 RULE_OPTION_TOM_1963_ELECTION_BASTILLARDS: "£TNO_game_rule_flag_TOM_BAS   §L巴士底党§!的托木斯克"
 RULE_OPTION_TOM_1963_ELECTION_BASTILLARDS_DESC: "§F鲍里斯·帕斯捷尔纳克去世后，托木斯克将巴士底党人沙龙选入政府。巴士底党人主张建立一个强大、稳定的民粹主义政府，不惜一切代价捍卫托木斯克的共和主义并打击政治极端势力，他们将带领西伯利亚共和国走向§L无支配体制§!的强大未来。§!"
 TOM_1967_ELECTION:0 "£TNO_game_rule_flag_TOM   托木斯克 - 1967年选举"
 RULE_OPTION_TOM_1967_ELECTION_RANDOM: "默认 - AI随机"
 RULE_OPTION_TOM_1967_ELECTION_RANDOM_DESC: "§F自帕斯捷尔纳克结束临时政府已经过去四年时间，新体制下的第一次选举将要进行。四年来，我们的共和国发生了巨大的变化，希望与梦想并肩，胜利与失败交杂。无论是好是坏，执政沙龙必须下台准备新一轮选举，同时制定带有其特色的宪法。前任政府会再次上台继续推行它的计划，还是说新的沙龙会要管理与之不同的意识形态的计划与遗产呢？§!"
 RULE_OPTION_TOM_1967_ELECTION_HUMANISTS: "£TNO_game_rule_flag_TOM_HUM   §P人文党§!胜出"
 RULE_OPTION_TOM_1967_ELECTION_HUMANISTS_DESC: "§F托木斯克将人文党人沙龙选入政府。人文党人笃信对人权、言论自由的强有力保护以及民主的社会主义道路，他们将会把共和国转变为西伯利亚联邦，并带领她走向§P乌托邦社会主义§!的人道未来。§!"
 RULE_OPTION_TOM_1967_ELECTION_MODERNISTS: "£TNO_game_rule_flag_TOM_MOD   §M现代党§!胜出"
 RULE_OPTION_TOM_1967_ELECTION_MODERNISTS_DESC: "§F托木斯克将现代党人沙龙选入政府。现代党人提倡现代化技术官僚国家的发展路线，并扩张教育系统以建立一个科学社会，他们将带领西伯利亚共和国走向§M自由主义§!的科学未来。§!"
 RULE_OPTION_TOM_1967_ELECTION_DECEMBRISTS: "£TNO_game_rule_flag_TOM_DEC   §i十二月党§!胜出"
 RULE_OPTION_TOM_1967_ELECTION_DECEMBRISTS_DESC: "§F托木斯克将再度把十二月党人沙龙选入政府。十二月党人强调俄罗斯的历史、人民和环境，以及他们与历史的联系和对传统的维护。他们将带领西伯利亚共和国走向§i农业主义§!的传统未来。§!"
 RULE_OPTION_TOM_1967_ELECTION_BASTILLARDS: "£TNO_game_rule_flag_TOM_BAS   §L巴士底党§!胜出"
 RULE_OPTION_TOM_1967_ELECTION_BASTILLARDS_DESC: "§F托木斯克将巴士底党人沙龙选入政府。巴士底党人主张建立一个强大、稳定的民粹主义政府，不惜一切代价捍卫托木斯克的共和主义并打击政治极端势力，他们将带领西伯利亚共和国走向§L无支配体制§!的强大未来。§!"
 KEM_IDEOLOGY_ROUTE:0 "£TNO_game_rule_flag_KEM   克麦罗沃 - 双狼传说"
 RULE_OPTION_KEM_IDEOLOGY_ROUTE_RANDOM: "默认 - AI随机"
 RULE_OPTION_KEM_IDEOLOGY_ROUTE_RANDOM_DESC: "§F被西伯利亚黑军打败，又被克拉斯诺亚尔斯克的安德烈耶夫将军背叛，尼古拉·克雷洛夫将军走火入魔，自称留里克二世，留里克王朝创始人的转世。尽管起初他的皇帝身份令人怀疑，但他的沙皇国确实公平和公正。但考虑到他的年龄，留里克二世中风去世恐怕只是时间问题。谁将继位沙皇？§!"
 RULE_OPTION_KEM_IDEOLOGY_ROUTE_AUTHDEM: "£TNO_game_rule_flag_KEM   §L尤里王子§!继承§s留里克二世§!王位"
 RULE_OPTION_KEM_IDEOLOGY_ROUTE_AUTHDEM_DESC: "§F§L尤里·克雷洛夫§!继位，成为§L留里克三世§!。§L留里克三世§!相信更民主、更民粹的领导方式，他将带领克麦罗沃走向君主立宪制，继而走上§L社会民族主义§!道路。§!"
 RULE_OPTION_KEM_IDEOLOGY_ROUTE_DESPOTISM: "£TNO_game_rule_flag_KEM   §s莉迪亚公主§!继承§s留里克二世§!王位"
 RULE_OPTION_KEM_IDEOLOGY_ROUTE_DESPOTISM_DESC: "§F§s莉迪亚·克雷洛娃§!继位，成为俄罗斯女皇§s罗格涅达一世§!。§s罗格涅达一世§!冷酷无情、军国独裁，她将带领克麦罗沃走向一条强硬专制亦又强大有力的§s贵族保守主义§!道路。§!"
 SBA_IDEOLOGY_ROUTE:0 "£TNO_game_rule_flag_SBA   西伯利亚黑军 - 安那其或秩序"
 RULE_OPTION_SBA_IDEOLOGY_ROUTE_RANDOM: "默认 - AI随机"
 RULE_OPTION_SBA_IDEOLOGY_ROUTE_RANDOM_DESC: "§F坎斯克革命成功后，西伯利亚自由地区身处十字路口。黑军在保护西伯利亚苏维埃免受外来入侵方面发挥了重要作用，帮助苏维埃能够按照无政府主义原则安全自由地组织公社，而不会轻松沦为周围反动军阀的饲料。然而，黑军却有自己的野心……§!"
 RULE_OPTION_SBA_IDEOLOGY_ROUTE_LIBSOC: "£TNO_game_rule_flag_SBA_LibSoc   苏维埃继续前行"
 RULE_OPTION_SBA_IDEOLOGY_ROUTE_LIBSOC_DESC: "§F远东平定后，黑军和苏维埃之间的内部分歧已经无可挽救，最终，伊万·斯捷潘诺夫将军发动了政变。虽然成功打了个措手不及，但这场政变还是因缺乏公众支持而失败。获胜的苏维埃将继续发扬反集权主义传统，西伯利亚自由地区将走上§V无政府共产主义§!道路。§!"
 RULE_OPTION_SBA_IDEOLOGY_ROUTE_DESPOTISM: "£TNO_game_rule_flag_SBA_Despotism   无政府主义终结"
 RULE_OPTION_SBA_IDEOLOGY_ROUTE_DESPOTISM_DESC: "§F远东平定后，黑军和苏维埃之间的内部分歧已经无可挽救，最终，伊万·斯捷潘诺夫将军发动了政变。黑军取得了胜利，斯捷潘诺夫和手下控制了政府，并将其体制转变为披着无政府主义外衣的军事独裁，西伯利亚自由地区将走上§s先锋无政府主义§!道路。§!"
 SBA_RESTORING_ORDER_PATH:0 "£TNO_game_rule_flag_SBA   西伯利亚黑军 - 重建秩序"
 RULE_OPTION_SBA_RESTORING_ORDER_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_SBA_RESTORING_ORDER_PATH_RANDOM_DESC: "§F西伯利亚黑军，世界上最杰出的无政府主义“国家”，正面临着来自内部的挑战。她究竟会粉身碎骨，抑或随着俄罗斯的团结而恢复秩序？§!"
 RULE_OPTION_SBA_RESTORING_ORDER_PATH_COLLAPSE: "崩溃"
 RULE_OPTION_SBA_RESTORING_ORDER_PATH_COLLAPSE_DESC: "§F西伯利亚黑军，世界上最杰出的无政府主义“国家”，正面临着来自内部的挑战。她将走向彻底崩溃，抛下中西伯利亚人民在政权乌有的湍流中漂泊。§!"
 RULE_OPTION_SBA_RESTORING_ORDER_PATH_STABLE: "秩序恢复"
 RULE_OPTION_SBA_RESTORING_ORDER_PATH_STABLE_DESC: "§F西伯利亚黑军，世界上最杰出的无政府主义“国家”，正面临着来自内部的挑战。秩序将得以维持，独特的无政府主义探索也将继续。§!"
 NOV_IDEOLOGY_ROUTE:0 "£TNO_game_rule_flag_NOV   新西伯利亚 - 选举"
 RULE_OPTION_NOV_IDEOLOGY_ROUTE_RANDOM: "默认 - AI随机"
 RULE_OPTION_NOV_IDEOLOGY_ROUTE_RANDOM_DESC: "§F中西伯利亚共和国崩溃后，新西伯利亚和阿尔泰联邦在该政权的军方人员操持下宣告成立，他们对共和国在与亨里希·亚戈达的战争中处事不利以至流血牺牲深感失望。然而，新西伯利亚很快就被某些对政府有极高影响力的巨企所控制，为了赚取利润，工人必须忍受漫长的工作时间和极不安全的工作环境。虽然形势严峻，但还是有一些人能改变这个体系……§!"
 RULE_OPTION_NOV_IDEOLOGY_ROUTE_PATERNALISM: "£TNO_game_rule_flag_NOV   §L法团主义仍为常态§!"
 RULE_OPTION_NOV_IDEOLOGY_ROUTE_PATERNALISM_DESC: "§F§L亚历山大·波克雷什金§!赢得选举。新西伯利亚的政治体制将变为§L寡头制§!。§!"
 RULE_OPTION_NOV_IDEOLOGY_ROUTE_CONSERVATISM: "£TNO_game_rule_flag_NOV   §i改革者登上权力顶峰§!"
 RULE_OPTION_NOV_IDEOLOGY_ROUTE_CONSERVATISM_DESC: "§F§i瓦西里·舒克申§!将赢得选举。新西伯利亚将成为§i农业主义§!国家。§!"
 NOV_DIPLO_TREE:0 "£TNO_game_rule_flag_NOV  £TNO_game_rule_flag_USA  £TNO_game_rule_flag_JAP   新西伯利亚 - 外交策略"
 RULE_OPTION_NOV_DIPLO_TREE_RANDOM: "默认 - AI随机"
 RULE_OPTION_NOV_DIPLO_TREE_RANDOM_DESC: "§F§B中西伯利亚联邦§!继续巩固她对俄罗斯东部工业区的控制，联盟中的龙头企业顺应时势、摩拳擦掌。现在，他们的目光不再盯着眼前破碎的俄罗斯，而是放眼§MOFN§!和§V大东亚共荣圈§!的广袤市场。§V日本人§!和§M美国人§!接受了西伯利亚抛出的橄榄枝，企业之间的激烈竞争即将决定哪个集团将成为联邦的主要贸易伙伴——这段关系在将来可能会发展出更多§C成果§!……§!"
 RULE_OPTION_NOV_DIPLO_TREE_OFN: "£TNO_game_rule_flag_USA   §MOFN§!"
 RULE_OPTION_NOV_DIPLO_TREE_OFN_DESC: "§F军火巨头§P凤凰§!将在角逐话事人的竞争中取胜，联邦将向§MOFN§!靠拢。随着时间推移，媒体和商品的浪潮将自§M美§!§j加§!等国席卷中西伯利亚，甚至还能同§MOFN§!建立更紧密的联盟。§!"
 RULE_OPTION_NOV_DIPLO_TREE_SPHERE: "£TNO_game_rule_flag_JAP   §V共荣圈§!"
 RULE_OPTION_NOV_DIPLO_TREE_SPHERE_DESC: "§F联邦的农业巨头§G西比尔§!将赢得国家支持，由此，西伯利亚政府转向同§V日本§!与§V共荣圈§!开展贸易。俄罗斯向§V日本§!电子产品和媒体敞开大门，财阀的影响力也在逐渐扩大。作为交换，西伯利亚丰富的石油将流向§V日本§!，更加§G密切§!的关系或许也将成为可能……§!"
 RULE_OPTION_NOV_DIPLO_TREE_NEUTRAL: "£TNO_game_rule_flag_NOV   西伯利亚经济内战"
 RULE_OPTION_NOV_DIPLO_TREE_NEUTRAL_DESC: "§F§P凤凰§!与§G西比尔§!两大巨头的冲突旷日持久，却未能决出胜负，二者间的宿怨将联邦经济撕扯得混乱不堪。为避免§R崩溃§!，政府介入终止了企业之间的拉锯战；但经济仍在持续下行，他们的行动也许只是徒劳。在可见的未来，西伯利亚将在世界舞台上保持§Y中立§!。§!"
