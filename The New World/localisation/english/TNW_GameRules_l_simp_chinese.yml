 RULE_OPTION_HOL_GER_NEGOTIATION_RANDOM_DESC: "§F\n\n§R要求：§!\n§Y£TNO_game_rule_flag_HOL_national_socialism   荷兰 - 阿图尔·赛斯-英夸特的继承者§!中§x未§!预设§o德·罗赫蒙§!专员§Y或§!荷兰上空的黑日\n\n在德国内战中获胜后，鲍曼设法将荷兰重新纳入团结协定。然而，由于荷兰政治有所变化，德国必须首先与新近独立的荷兰进行谈判。§!"
 RULE_OPTION_HOL_GER_NEGOTIATION_SUCCESS: "谈判§G成功§!"
 RULE_OPTION_HOL_GER_NEGOTIATION_SUCCESS_DESC: "§F谈判成功，荷兰将和平重返团结协定，阿图尔·赛斯-英夸特的继任者将继续继续执掌大权。"
 RULE_OPTION_HOL_GER_NEGOTIATION_BREAKDOWN_GER: "里特布施专员"
 RULE_OPTION_HOL_GER_NEGOTIATION_BREAKDOWN_GER_DESC: "§F谈判以破裂告终，继而引发德荷两国间的战争。德国将重建荷兰专员辖区，并任命威廉·里特布施担任专员。§!"
 RULE_OPTION_HOL_GER_NEGOTIATION_BREAKDOWN_HOL: "德·罗什蒙专员"
 RULE_OPTION_HOL_GER_NEGOTIATION_BREAKDOWN_HOL_DESC: "§F谈判以破裂告终，继而引发德荷两国间的战争。德国将重建荷兰专员辖区，并任命荷兰的辛克莱·德·罗赫蒙担任专员。§!"
 MALAYA_CIVIL_WAR: "£TNO_game_rule_flag_MLY  £TNO_game_rule_flag_SHO   马来亚紧急状态"
 RULE_OPTION_MALAYA_CIVIL_WAR_RANDOM: "默认 - AI随机"
 RULE_OPTION_MALAYA_CIVIL_WAR_RANDOM_DESC: "§F马来亚战事已成为日本帝国的眼中钉肉中刺。1942年日本占领马来亚半岛后，马来族与华人游击队员退入丛林，组建了马来亚抗日统一战线，为祖国解放而战——这场持续二十年的游击战至今仍未停止。\n\n如今，昭南和抗日统一阵线都已精疲力竭，资源濒临枯竭。游击队面临着艰巨挑战，尤其因其未掌握任何主要城市；殖民政府则深陷于人力短缺和腐败的泥潭。唯有一点毋庸置疑：这场战争不可能永远持续下去。§!"
 RULE_OPTION_MALAYA_CIVIL_WAR_MLY: "£TNO_game_rule_flag_MLY   §e马来亚抗日统一战线§!胜利"
 RULE_OPTION_MALAYA_CIVIL_WAR_MLY_DESC: "§F§e陈平§!领导的§e马来亚抗日统一战线§!将击败§s山本茂一郎§!领导的第25军。马来亚将成为§e布尔什维主义§!国家，直至首届全国自由大选结束。§!"
 RULE_OPTION_MALAYA_CIVIL_WAR_SHO: "£TNO_game_rule_flag_SHO   第25军胜利"
 RULE_OPTION_MALAYA_CIVIL_WAR_SHO_DESC: "§F§s山本茂一郎§!领导的第25军将击败§e陈平§!领导的§e马来亚抗日统一战线§!。马来亚将成为§s殖民政府§!，直至政府开展选举。§!"
 AAC_ENDING: "£TNO_game_rule_flag_AAC   陆战队的忠诚"
 RULE_OPTION_AAC_ENDING_RANDOM: "默认 - AI随机"
 RULE_OPTION_AAC_ENDING_RANDOM_DESC: "§F§U智利南极领地§!的斗争并未因§K《费城协定》§!以及1952年边境事件后的脆弱平静而结束。1958年，§e斯尼佩岛之战§!近乎摧毁了智利的南极存在，宿怨时至今日仍未能以外交手段消解。\n\n如今，领地的命运悬于一线：§L胡利奥·埃斯库德罗·古斯曼§!教授主张通过机构与国际承认重振南极领地，并联合其盟友§P卡洛斯·亚克希奇§!稳定财政、派遣§L马西亚尔·莫拉·米兰达§!和§L恩里克·加哈尔多·比利亚罗埃尔§!作为外交特使，在§B美洲国家组织§!为智利申辩；另一方面，领地防卫负责人、斯尼佩岛的英雄，§s何塞·托里维奥·梅里诺§!海军上校则主张动用强硬军事手段，预备率领海军陆战队驱逐§M阿根廷§!侵略者。法理与正当性，抑或铁与血？谁能胜出，将会决定智利对冰封南疆主权诉求的未来。§!"
 RULE_OPTION_AAC_ENDING_GUZMAN_SUCCESS: "£TNO_game_rule_flag_AAC   §L古斯曼§! - §G成功§!"
 RULE_OPTION_AAC_ENDING_GUZMAN_SUCCESS_DESC: "§F§L胡利奥·埃斯库德罗·古斯曼§!教授耐心的外交行动将结出丰硕的果实。经过不懈的调查和在§B美洲国家组织§!展开的积极行动，§U智利§!将迫使§M阿根廷§!退让，做出法律承认并赔偿损失，且为智利的南极主权主张赢得了国际支持。流放者们将在脆弱的和平中走进新时代。智利南极领地的未来将由§L南极洲事务局§!管辖。§!"
 RULE_OPTION_AAC_ENDING_GUZMAN_FAILURE: "£TNO_game_rule_flag_AAC   §L古斯曼§! - §R失败§!"
 RULE_OPTION_AAC_ENDING_GUZMAN_FAILURE_DESC: "§F§L古斯曼§!教授的谋划将难以奏效。事实证明，§B美洲国家组织§!不能——或者说，不愿采取任何有意义的实质性惩罚决议，超级大国的政治考量削弱了§U智利§!的锋芒：没有赔偿、没有决定性的裁定，§M阿根廷§!的侵略行径仍将逍遥法外。流放者们蒙受屈辱，古斯曼的道德胜利终于显露其本质：只是脆弱的情感，而非坚实可靠的法律。阿根廷的利爪将更为锋利，智利的南部边疆寒冷日甚一日。智属南极仍将归于§L南极洲事务局§!管辖。§!"
 RULE_OPTION_AAC_ENDING_MERINO_SUCCESS: "£TNO_game_rule_flag_AAC   §s梅里诺§! - §G成功§!"
 RULE_OPTION_AAC_ENDING_MERINO_SUCCESS_DESC: "§F§s何塞·托里维奥·梅里诺§!海军上校将以其钢铁的意志和陆战队的精锐战力重振§U智利§!对南方领土的统治。他将凭借武力和迅速的行动摧毁§M阿根廷§!阵地，将胜利转化为国内的政治筹码。他的胜利将成为智利实力的新象征——流放者们将由一名被赞誉为救世主的军阀所守卫。智利南极领地未来将由§s南极洲事务局§!管辖。§!"
 RULE_OPTION_AAC_ENDING_MERINO_FAILURE: "£TNO_game_rule_flag_AAC   §s梅里诺§! - §R失败§!"
 RULE_OPTION_AAC_ENDING_MERINO_FAILURE_DESC: "§F§s梅里诺§!的豪赌将惨遭失败。拙劣的进攻行动让§U智利§!既流血又蒙羞：海军陆战队溃不成军、士气低迷，梅里诺的传奇声望就此毁于一旦。流放者们将在失败的重压下呻吟哀嚎，§M阿根廷§!的地位得以巩固，智利的主权主张愈加岌岌可危。傲慢的代价是生命和国家荣誉——南方的冰原将埋葬这诸多苦果。智属南极仍将归于§s南极洲事务局§!管辖。§!"