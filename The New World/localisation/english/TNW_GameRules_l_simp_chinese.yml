 RULE_OPTION_AZH_BOSE_RESIGNATION_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_AZH_BOSE_RESIGNATION_PATH_RANDOM_DESC: "§F§K印度§!正在燃烧，而§n苏巴斯·钱德拉·鲍斯§!无力回应——在§R一声响彻世界的枪响§!之下，他伏地颠扑。§K印度§!陷入一片混乱，政治机器正如饥似渴地咆哮，争夺继承权和影响力，而§n鲍斯§!却缠绵病榻。命运的漩涡围绕着他旋转时，§n鲍斯§!能§G康复§!§吗？还是说，他将被迫或无意识地，不得不屈服于压力而§R辞职§!？\n\n§R要求：§!\n§Y£TNO_game_rule_flag_IND  £TNO_game_rule_flag_AZH   勒克瑙会议§!§M失败§!§!"
 RULE_OPTION_AZH_BOSE_RESIGNATION_PATH_NO: "鲍斯§s留任§!"
 RULE_OPTION_AZH_BOSE_RESIGNATION_PATH_NO_DESC: "§F尽管进展缓慢，且永远不会完全恢复，但§n苏巴斯·钱德拉·鲍斯§!最终将从昏迷中恢复意识，重新确立他在§K印度§!的权威。§n鲍斯§!康复将恢复人民对其政府的信心，有助于引领§K印度§!摆脱统一战争的危机。然而，这一事态发展也会以真正独立的政治结构为代价，加剧对其的§R个人崇拜§!，进一步强化巩固其政权。围绕在他身边的§s全印前进联盟§!将会为之所吞噬，转化为对领袖的个人崇拜。印度的未来，至少在鲍斯的统治下，将是§q一人独裁§!的政权。§!"
 AZH_BOSE_SUCCESSOR_PATH: "£TNO_game_rule_flag_AZH   自由印度政府 - 鲍斯的继承者"
 RULE_OPTION_AZH_BOSE_SUCCESSOR_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_AZH_BOSE_SUCCESSOR_PATH_RANDOM_DESC: "§F§s苏巴斯·钱德拉·鲍斯§!将以其个人统治统一印度，于1970年过世。在国家和党都失去领导的局势之下，必须提名一位继任者：§s阿米亚·纳特·鲍斯§!、§L萨马尔·古哈§!和§L阿南德·莫汉·萨海§!将会争夺权力，只有一个人能够胜出。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_AZH   自由印度政府 - 鲍斯的辞呈§!中预设鲍斯§M留任§!§!"
