 INDIAN_REUNIFICATION_WAR_OUTCOME: "£TNO_game_rule_flag_IND   £TNO_game_rule_flag_AZH   印度统一战争"
 RULE_OPTION_INDIAN_REUNIFICATION_WAR_OUTCOME_RANDOM: "默认 - AI随机"
 RULE_OPTION_INDIAN_REUNIFICATION_WAR_OUTCOME_RANDOM_DESC: "§F§e战火§!肆虐次大陆。§z恒河§!上兵戎相见、大会中§R剑拔弩张§!，§<印度共和国§!与§K自由印度§!即将展开你死我活的斗争，引爆§e二战§!后§x规模最大的冲突§!。双方军队准备充分，后备兵员成千上万，誓要决一死战，定鼎东方。任何资源短缺之处，亦将由§V大东亚共荣圈§!与§m自由国家组织§!各偕盟友鼎力相助。次大陆战争旷日持久，必定荼毒生灵，但双方定要战个不死不休，直至§<决出§!§K胜负§!。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_IND  £TNO_game_rule_flag_AZH   勒克瑙会议§!§M失败§!§!"
 RULE_OPTION_INDIAN_REUNIFICATION_WAR_OUTCOME_IND: "§<印度共和国§!胜利"
 RULE_OPTION_INDIAN_REUNIFICATION_WAR_OUTCOME_IND_DESC: "§F自§<印度共和国§!成立之初，其武装力量便始终与那些§V血腥残暴§!、§q目光短浅§!的§V独裁者§!进行着不懈斗争，这次的印度统一战争亦不例外。§n苏巴斯·钱德拉·鲍斯§!§K自由印度§!的军队捉襟见肘、进退两难，不得不撤出加尔各答，最终败北投降。印度军队将以无坚不摧之势挺进孟加拉，自称真正的解放者，举国上下对其英勇战绩赞不绝口。与此同时，随着§m自由国家组织§!努力挽回战争§Y损失§!，§<印度共和国§!在统一战争中的胜利已成定局。§!"
 RULE_OPTION_INDIAN_REUNIFICATION_WAR_OUTCOME_AZH: "§K自由印度§!胜利"
 RULE_OPTION_INDIAN_REUNIFICATION_WAR_OUTCOME_AZH_DESC: "§F曾经，§n内塔吉§!的军队驱逐了§V英属印度§!的残兵败将；如今，§m殖民者§!卷土重来，他必将再度凯旋。§<印度共和国§!前路渺茫，难逃失败命运；§n鲍斯§!领导的§K自由印度§!将占尽上风、连战连捷，尽管次大陆已在§R梅农§!的最后一搏中变得愈发破碎。§K旧秩序§!回归印度、§n军队§!恢复元气、重建陆续展开，§V日本帝国§!的声威亦将攀升至前所未有的高度。印度统一战争的胜者，注定是§K自由印度§!政府。§!"
 OPERATION_BIN_QASIM_WAR_OUTCOME: "£TNO_game_rule_flag_PAK   本·卡西姆行动"
 RULE_OPTION_OPERATION_BIN_QASIM_WAR_OUTCOME_RANDOM: "默认 - AI随机"
 RULE_OPTION_OPERATION_BIN_QASIM_WAR_OUTCOME_RANDOM_DESC: "§F长久以来，§n巴基斯坦运动§!犹如蛰伏于开伯尔崎岖山脉中的雄狮，如今终于在与印度的对决中全力以赴。叛军如旋风一般席卷西北边境省，继而横扫俾路支斯坦。现在，战士们蓄势待发，手中紧握步枪、心中怀揣梦想，准备与§<印度共和国§!一决雌雄。命运的天平左右摇摆，他们是会赢得战役的胜利，抑或再一次被逼回险峻的山峦之中？\n\n§R要求：§!\n§Y£TNO_game_rule_flag_IND  £TNO_game_rule_flag_AZH   勒克瑙会议§!§M失败§!§!"
 RULE_OPTION_OPERATION_BIN_QASIM_WAR_OUTCOME_SUCCESS: "巴基斯坦§G挺立于世§!"
 RULE_OPTION_OPERATION_BIN_QASIM_WAR_OUTCOME_SUCCESS_DESC: "§F对于一支与神同行的军队而言，胜利是唯一的宿命。巴基斯坦运动将在战场上证明自己，战胜§<印度§!。历史将见证巴基斯坦国家的诞生。§q阿卜杜勒·加尧姆·汗§!的统治或许不会长久，但无论风云如何变幻，§n巴基斯坦§!都将屹立不倒。§!"
 RULE_OPTION_OPERATION_BIN_QASIM_WAR_OUTCOME_FAILURE: "巴基斯坦§R遭到吞并§!"
 RULE_OPTION_OPERATION_BIN_QASIM_WAR_OUTCOME_FAILURE_DESC: "§F光有信仰打不了胜仗。巴基斯坦军队缺乏训练，关键时刻掉了链子。巴基斯坦运动无法突破印度在旁遮普的防线，印度借此机会乘胜追击，迅速推进至西北边境省和俾路支斯坦。最终，原本意图独立的§<巴基斯坦§!地区将被置于§R印度§!的军事占领之下，以彻底消除巴基斯坦运动的残余威胁。§!"
 PAK_SUBCONTINENTAL_CRISIS_OUTCOME: "£TNO_game_rule_flag_PAK  £TNO_game_rule_flag_AZH   次大陆危机"
 PAK_SUBCONTINENTAL_CRISIS_OUTCOME_RANDOM: "默认 - AI随机"
 PAK_SUBCONTINENTAL_CRISIS_OUTCOME_RANDOM_DESC: "§F六十年代中期的巴基斯坦是全世界最年轻的国家之一，但这初生的嫩芽恐怕不日便会遭人扼杀。尽管之前挡住了病弱的印度共和国，这次的挑战却来自当时的便宜盟友——自由印度，后者正谋求统一次大陆。为了守护来之不易的独立，巴基斯坦将目光投向欧洲，寻求德国的支持。随着局势逐渐升温，日本也下场介入，站在盟友加尔各答一边，争端迅速升级为两大强权之间的激烈对抗，全世界只得屏息凝视。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_IND  £TNO_game_rule_flag_AZH   印度统一战争§!中预设§M自由印度胜利§!\n且\n§Y£TNO_game_rule_flag_PAK   本·卡西姆行动§!中预设§M巴基斯坦挺立于世§!§!"
 ARM_FATE_OF_SELLEFYAN: "£TNO_game_rule_flag_ARM_turk  亚美尼亚 - 舍列费扬的命运"
 RULE_OPTION_ARM_FATE_OF_SELLEFYAN_RANDOM: "默认 - AI随机"
 RULE_OPTION_ARM_FATE_OF_SELLEFYAN_RANDOM_DESC: "§F§L姆克尔季奇·舍列费扬§!一直不受亚美尼亚人民的欢迎，这不仅是因为他象征§V土耳其§!影响，他这个人也是腐败透顶。过去，针对他政府的抗议活动总是会在几个月内被胡萝卜加大棒逐渐平息，但这次可不一样了。最初，抗议活动是为了反对埃里温国际机场建设项目中揭露的腐败问题，但很快与要求承认§h亚美尼亚大屠杀§!的呼声合流，迅速演变为大规模暴动。§L舍列费扬§!政权岌岌可危，现在唯一的问题是：他将以何种方式倒台？§!"
 RULE_OPTION_ARM_FATE_OF_SELLEFYAN_OUSTED: "§M党内政变§!"
 RULE_OPTION_ARM_FATE_OF_SELLEFYAN_OUSTED_DESC: "§F§L舍列费扬§!自己的§L亚美尼亚共和党§!内的对手视动乱为天赐良机，意图借此取而代之。§M鲁边-扎卡尔·扎卡良§!与其他党内大佬计划秘密接触§V土耳其§!，就推翻§L舍列费扬§寻求宗主国的支持批准。一经许可，§M鲁边-扎卡尔·扎卡良§!及其领导的§M共和党§!改革派将成为亚美尼亚的掌舵者，推行§M社会自由主义§!政策。§!"
 RULE_OPTION_ARM_FATE_OF_SELLEFYAN_COLLAPSE: "局势恶化 - §s舍列费扬遭罢免§!"
 RULE_OPTION_ARM_FATE_OF_SELLEFYAN_COLLAPSE_DESC: "§F土耳其拒绝支持扎卡良的阴谋并继续信任§L舍列费扬§!，舍列费扬宣布戒严，暴力镇压抗议者，将体制转变为§s文官独裁§!。然而，动武也未能平定动乱。为防止局势演变成全面革命，驻扎在亚美尼亚的§V土耳其军队§!决定介入，推翻舍列费扬，建立由§s鲁边-扎卡尔·扎卡良§!领导的§s过渡政府§!，维持至下一次选举。§!"
 ARM_1966_ELECTION: "£TNO_game_rule_flag_ARM_turk   亚美尼亚 - 1966年大选"
 RULE_OPTION_ARM_1966_ELECTION_RANDOM: "默认 - AI随机"
 RULE_OPTION_ARM_1966_ELECTION_RANDOM_DESC: "§F无论§L姆克尔季奇·舍列费扬§!政府如何落幕，接下来的选举都将成为推翻§L亚美尼亚共和党§!的天赐良机。历经二十年的腐败与一党统治，亚美尼亚人民决心用选票为这段黑暗历史画上句号。不过，§V土耳其§!宗主或许会扶持他们青睐的候选人以维护自身利益。§!"
 RULE_OPTION_ARM_1966_ELECTION_LIBCON: "§B哈伊卡兹·哈恰特良§!当选"
 RULE_OPTION_ARM_1966_ELECTION_LIBCON_DESC: "§F§V土耳其§!政府决定不干预亚美尼亚选举，反对派上台掌权，这在亚美尼亚历史上尚属首次。§B哈伊卡兹·哈恰特良§!和他的§B民族统一党§!将带领国家踏上新的征程，致力于强化亚美尼亚的民族认同，逐步摆脱对土耳其的依赖。新政府将追随§B基督教民主主义§!。\n\n§R要求：§!\n£TNO_game_rule_flag_TUR  土耳其§x不是§!§q激进凯末尔主义§!政府§!"
 RULE_OPTION_ARM_1966_ELECTION_LIB: "§M鲁边-扎卡尔·扎卡良§!当选"
 RULE_OPTION_ARM_1966_ELECTION_LIB_DESC: "§F得到了§V土耳其§!的暗中支持，刚被推翻的§M亚美尼亚共和党§!再度上台执掌政权。这次，§M鲁边-扎卡尔·扎卡良§!及其麾下改革派意图另辟蹊径，与过去一刀两断，为党和国家开启历史的新篇章，踏上§M社会自由主义§!的新征程。§!"
 RULE_OPTION_ARM_1966_ELECTION_SOC: "§V卡连·杰米尔强§!当选"
 RULE_OPTION_ARM_1966_ELECTION_SOC_DESC: "§F§V土耳其§!政府决定不干预亚美尼亚选举，反对派上台掌权，这在亚美尼亚历史上尚属首次。§V卡连·杰米尔强§!和他的§V亚美尼亚人民党§!将带领国家踏上新的征程，致力于建立受苏联体制启发的福利国家。新政府将追随§V社会民主主义§!。\n\n§R要求：§!\n£TNO_game_rule_flag_TUR  土耳其§x不是§!§q激进凯末尔主义§!政府§!§!"
 PAK_SUBCONTINENTAL_CRISIS_OUTCOME_PAKISTAN: "§q德国§!-§n巴基斯坦§!胜利"
 PAK_SUBCONTINENTAL_CRISIS_OUTCOME_PAKISTAN_DESC: "§F最终，§q大日耳曼国§!与§n巴基斯坦伊斯兰共和国§!的钢铁联盟将占据上风。面对压倒性的军事力量和广受拥护的政权，§V日本帝国§!与§K印度§!只得低头承认§n巴基斯坦§!的合法性；而§M美国§!虽表面上保持沉默，实则对这个新生国家暗中赞许。此举为德意志播散影响做出重要贡献，§q德国§!给予§n巴基斯坦§!§q团结协定§!正式成员国身份，与其他成员平起平坐，实现“脱亚入欧”。历经风雨洗礼，§n巴基斯坦§!终于在§q德国§!的支持下成为了独立的主权国家。§!"
 PAK_SUBCONTINENTAL_CRISIS_OUTCOME_STALEMATE: "§Y僵局§!"
 PAK_SUBCONTINENTAL_CRISIS_OUTCOME_STALEMATE_DESC: "§F时间不断流逝，危机也逐渐降温——但仅限超级大国之间。尽管§n印度§!试图彻底抹去§K巴基斯坦§!的存在，但除统一战争的影响之外，战线纹丝不动；§q德国§!逼迫§K印度§!回到谈判桌前的努力也宣告失败。虽说§q德§!§V日§!两国已经接受现状，边境看似恢复了平静，但两国之间的敌意却已是根深蒂固，双方关系在可预见的未来恐难回暖。深陷危机的印度次大陆将陷入§Y僵局§!。§!"
 PAK_SUBCONTINENTAL_CRISIS_OUTCOME_INDIA: "§K印度§!-§V日本§!胜利"
 PAK_SUBCONTINENTAL_CRISIS_OUTCOME_INDIA_DESC: "§F最终，§V日本帝国§!与§K印度§!将占据上风，犹如两只猛虎傲然并立，化作§V泛亚主义§!的闪耀象征。面对压倒性的军事力量和坚如磐石的联盟，§q德国§!选择退避三舍，放弃与§n巴基斯坦§!的同盟，悄然退出次大陆。§K印度§!随即展开一场迅速而成功的攻势，以雷霆万钧之势击败§n巴基斯坦§!，将其重新纳入§K印度§!版图，完成了次大陆的统一。历经风雨洗礼，§K印度§!终于以武力实现了统一。§!"
 RULE_OPTION_IND_72_ELECTION_PATH_CHARAN_SINGH: "§B查兰§!·§i辛格§!胜利"
 RULE_OPTION_IND_72_ELECTION_PATH_CHARAN_SINGH_DESC: "§F钟摆摇来摆去，突然崩解断裂。长期执政的§P印度§!§i国民大会党§!失误频发，选民对此厌倦不已，1972年大选产生了新的结果。新执政党囊括了一众小党和农业党，由声名显赫的农民领袖§B查兰·§!§i辛格§!领导。§i辛格§!的目标是改善农民生活，他将推行社会福利项目和加快土地再分配的政策，同时扩大孟加拉邦和比哈尔邦的自治权。若印度曾经由§P社会主义§!者主导，那么其未来将交由一个包容各方力量的§B大帐篷§!式政党来塑造；而如果过去是由§i帕特尔派§!执政，则未来的发展方向将更倾向于§i农业主义§!。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_IND   印度共和国 - 1967年大选§!中预设§M国大党 - 社会主义派胜选§!§Y或§!§M国大党 -  民主派胜选§!§!"
 RULE_OPTION_AAA_OP90_FAILURE: "§R失败§!"
 RULE_OPTION_AZH_BOSE_SUCCESSOR_PATH_ANAND_MOHAN_SAHAY: "§L阿南德·莫汉·萨海§!"
 RULE_OPTION_AZH_BOSE_SUCCESSOR_PATH_ANAND_MOHAN_SAHAY_DESC: "§F§n鲍斯§!身虽殒，理想尚永存。§s印度斯坦平等同盟§!重掌政权，过渡的§sA·C·查特吉§!之后，是§L阿南德·莫汉·萨海§!的新时期。曾为外交官的激进分子§L萨海§!毕生追随鲍斯，在他的领导下，印度再次坚定地拥抱§V泛亚主义§!与大东亚共荣圈。印度斯坦及其政治建制将在§L社会民族主义§!的框架下，寻求与日本帝国建立更加紧密的关系。§!"
 BRA_ADHEMAR_FATE: "£TNO_game_rule_flag_BRA   巴西 - 阿德马尔的命运"
 RULE_OPTION_BRA_ADHEMAR_FATE_RANDOM: "默认 - AI随机"
 RULE_OPTION_BRA_ADHEMAR_FATE_RANDOM_DESC: "§F§h阿德马尔·德·巴罗斯§!将陷入昏迷，与§b死神§!展开殊死较量。总统任内的功过得失，将§p决定§!他是会战胜§b死神§!最终苏醒，还是永远沉沦于昏迷之中。与此同时，他尘世间的§h盟友§!与§V政敌§!们，也将在针对§h阿德马尔§!的弹劾案中展开另一场生死博弈。§!\n\n§R要求：§!\n£TNO_game_rule_flag_BRA   §Y巴西 - 1965年总统大选§!中预设£BRA_psp_texticon §M阿德马尔胜选§!§!"
 RULE_OPTION_BRA_ADHEMAR_FATE_SURVIVES: "§L阿德马尔康复§!"
 RULE_OPTION_BRA_ADHEMAR_FATE_SURVIVES_DESC: "§F§h阿德马尔·德·巴罗斯§!将重获新生。这位战胜了§b死神§!的斗士将从昏迷中苏醒，尽管身体虚弱、视线模糊，但他努力振作精神，以§L右翼民粹主义§!者的身份，竭尽全力完成剩余任期。§f上天堂？还早着呢！§!§!"
 RULE_OPTION_BRA_ADHEMAR_FATE_DIES: "§P阿德马尔逝世§!"
 RULE_OPTION_BRA_ADHEMAR_FATE_DIES_DESC: "§F§h阿德马尔§!终究未能战胜死神，最终§b溘然长逝§!。总统既殁，两位继业者将带领国家走向迥然不同的道路：幕僚长§h劳多·纳特尔§!将延续§h阿德马尔§!§L右翼民粹主义§!的路线；而副总统§V埃德娜·洛特§!则会选择改弦更张，带领国家走向§P左翼民粹主义§!。\n\n§R要求：§!\n£TNO_game_rule_flag_BRA   §Y巴西 - 百日危机§!中§x未§!预设£BRA_psp_texticon §M阿德马尔获胜§!§!§!"
 BRA_STRIKE_FATE: "£TNO_game_rule_flag_BRA   巴西 - 总罢工"
 RULE_OPTION_BRA_STRIKE_FATE_RANDOM: "默认 - AI随机"
 RULE_OPTION_BRA_STRIKE_FATE_RANDOM_DESC: "§F随着1968年大选的落幕，§Q卡洛斯·拉塞尔达§!将以一项法案开始他对§V瓦加斯主义§!的讨伐战争，法案将废除£GFX_BRA_ptb_texticon §V瓦加斯劳工法§!£GFX_BRA_ptb_texticon ，以此打击巴西工会。此举不出所料激起劳工的强烈反弹，§V亲瓦加斯势力§!纷纷加入全国最大工会联盟——£BRA_CGT_texticon §Y工人总指挥部§!£BRA_CGT_texticon （§YCGT§!）。为了镇压这些抗议者，§Q拉塞尔达§!需要扶持并依仗名为£BRA_MSD_texticon §m民主工会运动§!£BRA_MSD_texticon （§mMSD§!）的行业工会联盟。§!\n\n§R要求：§!\n£TNO_game_rule_flag_BRA   §Y巴西 - 1965年总统大选§!中预设£BRA_udn_texticon §Q拉塞尔达胜选§!\n§x或§!\n£TNO_game_rule_flag_BRA  §Y巴西 - 帝王总统§!中预设£BRA_udn_texticon §M拉塞尔达的帝王任期§!\n§x或§!\n§Y£TNO_game_rule_flag_BRA 巴西 - 1965年大选（军政府）§!中预设§M£BRA_udn_texticon 拉塞尔达胜选§!§!"
 RULE_OPTION_BRA_STRIKE_FATE_VICTORY: "§G拉塞尔达凯旋§!"
 RULE_OPTION_BRA_STRIKE_FATE_VICTORY_DESC: "§F§Q卡洛斯·拉塞尔达§!将傲然立于£BRA_CGT_texticon §Y工人总指挥部§!的残骸之上，亲眼见证§Q反瓦加斯主义§!和§M自由市场资本主义§!铁拳收获的果实——§V瓦加斯劳工法§!的解体。§!"
 RULE_OPTION_BRA_STRIKE_FATE_COMPROMISE: "§B妥协§!"
 RULE_OPTION_BRA_STRIKE_FATE_COMPROMISE_DESC: "§F副总统§A维尔吉利奥·塔沃拉§!将架空§Q卡洛斯·拉塞尔达§!，与£BRA_CGT_texticon §Y工人总指挥部§!谈判平息工潮。在余下的任期内，这位总统要么向党内主流路线§B自由保守主义§!妥协，要么全力推动政党转向他主张的§i自由市场保守主义§!。§!\n\n§R要求：§!\n£TNO_game_rule_flag_BRA  §Y巴西 - 1965年总统大选§!中预设£BRA_udn_texticon §Q拉塞尔达胜选§!"
 RULE_OPTION_BRA_STRIKE_FATE_COUP: "§R失败§!"
 RULE_OPTION_BRA_STRIKE_FATE_COUP_DESC: "§F§Q卡洛斯·拉塞尔达§!废除£GFX_BRA_ptb_texticon §V瓦加斯劳工法§!£GFX_BRA_ptb_texticon 的计划彻底流产，副总统§A维尔吉利奥·塔沃拉§!随即发动政变将他罢黜。塔沃拉将以§B自由保守主义§!的意识形态继续领导巴西，较§Q拉塞尔达§!更加务实。"
