 RULE_OPTION_KOM_DEM_CANDIDATE_MOROZOV_DESC: "§F§M青年改革者联盟§!的伊万·莫罗佐夫将被提名为中间派的候选人，以确保科米共和国在一个自由公正的改良派民主政府的领导下幸存下来，而非倒向腐败或威权主义。如果他赢得选举，那么科米将会步向§M自由主义§!的未来。§!"
 RULE_OPTION_KOM_DEM_CANDIDATE_VOZNESENSKY: "§P尼古拉·沃兹涅先斯基§!"
 RULE_OPTION_KOM_DEM_CANDIDATE_VOZNESENSKY_DESC: "§F来自§P民主社会主义人民党§!的现任总统尼古拉·沃兹涅先斯基会继续掌权，哪怕他有着腐败、种族主义的劣迹和相当不讨喜的性格，他仍将代表中间派出战接下来的选举。如果他赢得选举，那么科米将会走向§P改良社会主义§!的未来。§!"
 RULE_OPTION_KOM_DEM_CANDIDATE_STALINA: "§B斯韦特兰娜·斯大林娜§!"
 RULE_OPTION_KOM_DEM_CANDIDATE_STALINA_DESC: "§F§B主权民主党§!的斯韦特兰娜·斯大林娜将被提名为中间派的候选人，对科米的民主采取威权措施以铲除极端主义，确保科米的民主共和国得以幸存。如果她赢得选举，那么科米将由一个§B大帐篷§!式的无极端主义政府所领导。§!"
