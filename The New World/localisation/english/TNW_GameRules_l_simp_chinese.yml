 TRINIDAD_BPR: "£TNO_game_rule_flag_TRI   黑人权力革命"
 RULE_OPTION_TRINIDAD_BPR_RANDOM: "默认 - AI随机"
 RULE_OPTION_TRINIDAD_BPR_RANDOM_DESC: "§F§x特立尼达和多巴哥§!的未来岌岌可危。§V社会主义者§!十分不满现任政府的统治，他们将在政治危机和经济衰退发展到高潮时发动革命打破现状。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_WIN £TNO_game_rule_flag_TRI 特立尼达提案§!中§R未§!预设§M单一制西印度群岛联邦§!§!"
 RULE_OPTION_TRINIDAD_BPR_SUCCESS: "£TNO_game_rule_flag_TRI_socialist    §V革命§!胜利"
 RULE_OPTION_TRINIDAD_BPR_SUCCESS_DESC: "§F因为对与美帝国主义者过于亲近而引发的社会动荡和经济失衡深感不满，社会主义革命者§V马坎达尔·达加§!将推翻亲OFN的政府，并承诺将为该岛上的非裔和印第安裔创造更美好的未来。特立尼达将成为§V左翼民族主义§!国家。§!"
 RULE_OPTION_TRINIDAD_BPR_FAILURE: "£TNO_game_rule_flag_TRI   §Y现状§!维持"
 RULE_OPTION_TRINIDAD_BPR_FAILURE_DESC: "§F无论是作为诺曼·曼利领导之下的联邦的一部分，还是埃里克·威廉斯所领导的独立国家，特立尼达人都十分满意现行的制度，反对社会主义革命，坚定地站在OFN一方，并延续其§M自由主义§!。§!"
 JAMAICAN_CRISIS: "£TNO_game_rule_flag_WIN   西印度群岛联邦 - 牙买加危机"
 RULE_OPTION_JAMAICAN_CRISIS_RANDOM: "默认 - AI随机"
 RULE_OPTION_JAMAICAN_CRISIS_RANDOM_DESC: "§F§K牙买加§!的独立情绪燃至沸点，街头的暴力抗议大声向总理呼喊，他们要脱离“帝国主义压迫的化身”§M西印度群岛联邦§!。而联邦以及整个加勒比海地区的命运，都随着牙买加局势一天比一天恶化。\n\n§R要求：§!\n§M美国§!§R否决了§!§Y牙买加独立公投§!§!"
 RULE_OPTION_JAMAICAN_CRISIS_COUP: "§L政变§!"
 RULE_OPTION_JAMAICAN_CRISIS_COUP_DESC: "§F抗议活动取得成功，牙买加脱离西印度群岛联邦，§M曼利§!也被迫交出权柄，任命牙买加工党领袖与独立活动家§L亚历山大·巴斯塔曼特§!为这一新生国家的总理。牙买加将成为§L社会民族主义§!国家。§!"
 RULE_OPTION_JAMAICAN_CRISIS_CALMED: "§G危机平息§!"
 RULE_OPTION_JAMAICAN_CRISIS_CALMED_DESC: "§F美国人成功压制住牙买加的独立呼声，维持了现状，令牙买加牢牢停留在西印度群岛联邦——当然也是美国势力范围之内。§!"
 CUB_DEMOCRACY: "£TNO_game_rule_flag_CUB   古巴 - 民主事宜"
 RULE_OPTION_CUB_DEMOCRACY_RANDOM: "默认 - AI随机"
 RULE_OPTION_CUB_DEMOCRACY_RANDOM_DESC: ""
 RULE_OPTION_CUB_DEMOCRACY_YES: "革命联盟§G继续掌权§!"
 RULE_OPTION_CUB_DEMOCRACY_YES_DESC: "§F§E古巴§!将不顾国家历史的诸多坎坷，不顾§o多米尼加支持的恐怖主义§!与国内争议带来的种种挑战，拒绝让独裁者接替独裁者。菲德尔·卡斯特罗将遵循马蒂的意愿，恢复§M1940年宪法§!，在全岛进行自由公正的选举。随着§E古巴§!重新踏上世界舞台，§x革命§!运动必将在拉美掀起浪潮，令窃据大位的独夫民贼颤栗不已。§!"
 RULE_OPTION_CUB_DEMOCRACY_NO: "转向§L专制§!"
 RULE_OPTION_CUB_DEMOCRACY_NO_DESC: "§F菲德尔·卡斯特罗对综合革命组织的内斗深感无望，他将化身罗伯斯庇尔，将§E古巴§!转变为又一个施行独裁的政权，新生§M民主§!国家的希望消弭无踪。政府将推动§P进步§!改革，但古巴将没有宪法，民主仅仅实现于地方一级。在拉萨罗·卡德纳斯为新考迪罗提供的指导之下，§E古巴§!与§s墨西哥§!将密切联系，建立一种类似于§s制度专制§!下的§K革命§!§W制度§!§x党§!的政权。§!"
 CUB_1962_ELECTIONS: "£TNO_game_rule_flag_CUB   古巴 - 1966年大选"
 RULE_OPTION_CUB_1962_ELECTIONS_RANDOM: "默认 - AI随机"
 RULE_OPTION_CUB_1962_ELECTIONS_RANDOM_DESC: "§F\n\n§R要求：§!\n£TNO_game_rule_flag_CUB   §Y古巴 - 民主事宜§!中预设§M革命联盟§G继续掌权§!§!§!"
 RULE_OPTION_CUB_1962_ELECTIONS_FIDEL: "§V菲德尔·卡斯特罗§!继续掌权"
 RULE_OPTION_CUB_1962_ELECTIONS_FIDEL_DESC: "§F§g菲德尔·卡斯特罗§!将履行他在革命中的承诺，恢复1940年宪法与§M民主§!制度。革新成果接踵而至，他将以压倒性优势赢得选举，在全国推广§V盖坦社会主义§!，致力于在§E古巴§!实施直接民主和分散式的计划经济。与此同时，他将在全球各地支持§j反法西斯主义§!。只要他建立的共识仍然存在，作为§V左翼民族主义者§!的他很可能长久地掌权下去。§!"
 RULE_OPTION_CUB_1962_ELECTIONS_ECHEVARRIA: "§P埃切维里亚§!当选"
 RULE_OPTION_CUB_1962_ELECTIONS_ECHEVARRIA_DESC: "§F呼吁举行选举之后，前总统§V菲德尔·卡斯特罗§!输给受欢迎的§P何塞·安东尼奥·埃切维里亚§!。前总统在§E古巴§!事务上失去共识，随即和平下台。§P埃切维里亚§!将尝试向传统上是无神论的农民介绍§P基督教进步主义§!下的基督教民主主义，同时承诺新的社会计划，凯恩斯式社会市场经济，将教会转变为纵贯拉丁美洲的革命力量。然而，这只有在§x卡斯特罗§!之前当选且未能保持共识的情况下才有可能实现。§!"
 RULE_OPTION_CUB_1962_ELECTIONS_SOCARRAS: "§L索卡拉斯§!当选"
 RULE_OPTION_CUB_1962_ELECTIONS_SOCARRAS_DESC: "§F由于无法维持其在总统任内缔造的共识，§V卡斯特罗§!将辞去总统职务，让位于§L卡洛斯·普里奥·索卡拉斯§!。如果给他第二次机会，他将以谦谨的姿态回归，但他依然怀揣希望，以贯彻1933年革命的老派民众主义理念。他将承诺建立一个支持劳工组织的三方委员会、实施永久性公共工程项目，还将奉行其他民族主义政策。在国外，他希望鼓动敌对政权的军事同情者，类似于哥伦比亚的§M国民阵线§!。§E古巴§!将成为§L左翼法团主义§!政权。§!"
