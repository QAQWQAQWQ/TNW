 FRA_CIVIL_WAR_BUFF: "£TNO_game_rule_flag_FRS_fascism  £GFX_TNO_game_rule_flag_FRD  £GFX_TNO_game_rule_flag_FRM   法国内战"
 RULE_OPTION_FRA_CIVIL_WAR_BUFF_RANDOM: "默认 - AI随机"
 RULE_OPTION_FRA_CIVIL_WAR_BUFF_RANDOM_DESC: "§F§o西多斯§!\n§o西多斯§!铁腕式法西斯国家的火药桶终于爆炸了，随之而来的冲击波导致了政府权威§R彻底崩溃§!。在§R混乱的内战§!中，政府、机会主义者、§Q极右翼民兵§!、§D抵抗运动§!、§x共产主义者§!在§m法兰西§!的废墟之上互相战斗。然而，最终的胜利者仍§Y不确定§!。\n§L布热德§!\n当§L布热德§!总统宣布展开二百户之战时，他将自己§Y想象§!为§G胜利的英雄§!，压制§m法国§!实业家和银行家的势力，治愈拯救国家的未来。§R然而§!，他的无能使得这场“战争”演变成了国家危机，政府在§Q秘密军队组织§!与§D民主抵抗运动§!面前节节败退，§m法兰西§!的希望与梦想似乎将要毁于一旦。在血腥的战斗中，§m法兰西§!正走向§Y混沌§!的命运与未来……\n\n§R要求：§!\n§Y£TNO_game_rule_flag_FRA_vichy   布热德法国 - 国家的命运§!中预设§Y法国§!§R崩溃§!\n§x或§!\n§Y£TNO_game_rule_flag_FRA_vichy   法兰西国 - 1964年法国总统大选§!中预设§Y§o皮埃尔·西多斯§!§G当选§!§!"
 RULE_OPTION_FRA_CIVIL_WAR_BUFF_FRS: "£TNO_game_rule_flag_FRS_fascism   §M法兰西国§!胜利"
 RULE_OPTION_FRA_CIVIL_WAR_BUFF_FRS_DESC: "§F尽管法国政府残暴无能——不论是对权势阶级横加镇压，还是强推令人作呕的威权与传统文化，§M法兰西国§!将破除一切阻碍，粉碎§D抵抗运动§!与§Q民兵组织§!。§L布热德§!和§o西多斯§!无论谁上台执政，政府都将推进重建并继续实施镇压政策，将§m法国§!缔造为§q欧陆§!上又一个§J法西斯主义§!国家。§!"
 RULE_OPTION_FRA_CIVIL_WAR_BUFF_FRD: "£TNO_game_rule_flag_FRD   §D法国抵抗运动§!胜利"
 RULE_OPTION_FRA_CIVIL_WAR_BUFF_FRD_DESC: "§F在许多人眼中，抵抗运动是一段逝去的记忆，或是一个被元帅及其继任者运用残酷政策镇压下去的神话。然而，在这惊天剧变之中，抵抗者将以令世人惊叹敬服的方式证明他们的存在：克服一切困难，最终§G解放§!§m法国§!；鲜血洒落热土，§m法国§!的未来将属于§M民主§!。§!"
 RULE_OPTION_FRA_CIVIL_WAR_BUFF_FRM: "£TNO_game_rule_flag_FRM   §Q秘密军队组织§!胜利"
 RULE_OPTION_FRA_CIVIL_WAR_BUFF_FRM_DESC: "§F§Q秘密军队组织§!在§m法兰西§!的一众§J法西斯§!武装中鹤立鸡群，作为准军事组织，他们装备精良、军纪优秀。而这种种优点将使他们在杀戮时占尽优势，并在剿灭收复“正统”法兰西土地这一目标的敌人时处于上风，延续§M法兰西国§!的§J法西斯§!之治。§!"
 RULE_OPTION_FRA_CIVIL_WAR_BUFF_FRV: "£TNO_game_rule_flag_FRV   §x法兰西革命者§!胜利"
 RULE_OPTION_FRA_CIVIL_WAR_BUFF_FRV_DESC: "§F全世界满怀敬畏地观望着§J法西斯主义§!之潮被学生民兵和§V社会主义者§!同盟的联合濯净。这个§Y梦想家和理想主义者§!的政府将直面邻国的强烈敌意和同盟成员间的渐生嫌隙。不过，§V革命阵线§!此刻值得抬起她高昂的头颅。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_FRA_vichy   法兰西国 - 1964年总统大选§!中预设§Y§o皮埃尔·西多斯§!§G当选§!§!"
 RULE_OPTION_FRA_CIVIL_WAR_BUFF_FMM: "£TNO_game_rule_flag_FMM   §j法兰西民兵§!胜利"
 RULE_OPTION_FRA_CIVIL_WAR_BUFF_FMM_DESC: "§F§j法兰西民兵§!最终赢得§m法国§!内战，维希的精神证明了自己的活力，生存下来。§j民兵§!的建制可以追溯至§M法兰西国§!政权成立之初，继承元帅遗志的它迅速行动起来，镇压了§m法国§!各地的§V左派§!和§m自由派§!，准备好在§o军政纳粹主义§!的旗帜下迎来§m法国§!光辉的未来。§!\n\n§R要求：§!\n§Y£TNO_game_rule_flag_FRA_vichy   法兰西国 - 1964年总统大选§!中预设§Y§o皮埃尔·西多斯§!§G当选§!§!"
 RULE_OPTION_FRA_CIVIL_WAR_BUFF_FIT: "£TNO_game_rule_flag_FIT  £TNO_game_rule_flag_ITA   §K民族和解运动§!胜利"
 RULE_OPTION_FRA_CIVIL_WAR_BUFF_FIT_DESC: "§F有时候，现实可能比小说来得更加离谱，§K民族和解运动§!在内战中的胜利就是这句话的写照。该运动由一位默默无闻的政客§s乔治·索日§!领导，得到§n意大利§!的大力援助。§s索日§!将采取反极端主义的言辞策略，尝试建立一个温和派的联盟，保护天主教传统，以稳定他的§s文官独裁§!统治。§!\n\n§R要求：§!\n§Y£TNO_game_rule_flag_FRA_vichy   法兰西国 - 1964年总统大选§!中预设§Y§o皮埃尔·西多斯§!§G当选§!§!\n§x且§!\n§Y£TNO_game_rule_flag_FRA_vichy   西多斯法国 - 外交政策§!中§x未§!预设§Y与£TNO_game_rule_flag_ITA §n意大利§!结盟§!"
 NOR_ROUTE: "£TNO_game_rule_flag_NOR   挪威"
 RULE_OPTION_NOR_IDEOLOGY_ROUTE_RANDOM: "默认 - AI随机"
 RULE_OPTION_NOR_IDEOLOGY_ROUTE_RANDOM_DESC: "§F§R挪威§!曾是一个独立的国家，后成为了§j德国§!的殖民地，挪威由§j约瑟夫·特博文§!管辖，他欲把挪威打造成一个模范殖民地，最终使其并入§j德国§!。然而，§R挪威§!远远称不上“模范殖民地”，§D军事抵抗组织§!长期威胁着殖民地的稳定，政府摇摇欲坠，内部纷争不断。在§e德国内战§!打响之后，§j特博文§!突然把权力下放给§Y挪威合作者§!，擅离职守，引起了更加激烈的权力斗争。§!"
 RULE_OPTION_NOR_ROUTE_MAINSTREAM: "£TNO_game_rule_flag_NOR_Collab   合作政府幸存"
 RULE_OPTION_NOR_ROUTE_MAINSTREAM_DESC: "§F特博文擅离职守，将权力转交给本地合作者。此举着实造成了不小的混乱，然而，§J居尔布兰·伦德领导的主流派§!最终在权力斗争中保住了权力，牢牢掌控住挪威。挪威将会是§J法西斯主义§!国家。§!"
 RULE_OPTION_NOR_ROUTE_HARDLINE: "£TNO_game_rule_flag_NOR_Collab    强硬派夺权"
 RULE_OPTION_NOR_ROUTE_HARDLINE_DESC: "§F特博文擅离职守、混乱余波未尽，§J伦德领导的合作政府主流派§!未能成功巩固权力，§o约拿斯·李领导的强硬派§!夺得了政权。挪威将成为§o民族社会主义§!国家。§!"
 RULE_OPTION_NOR_ROUTE_MODERATE: "£TNO_game_rule_flag_NOR_Free   改革派夺权"
 RULE_OPTION_NOR_ROUTE_MODERATE_DESC: "§F特博文的擅离职守引起了混乱，在混乱的余波中，§J伦德领导的合作政府主流派§!未能成功巩固权力，§s贝·博尔滕§!领导的§s改革派§!掌控了大局。挪威将成为§s文官独裁§!国家。§!"
 RULE_OPTION_NOR_ROUTE_MILORG: "£TNO_game_rule_flag_NOR_Free   军事抵抗组织推翻政权"
 RULE_OPTION_NOR_ROUTE_MILORG_DESC: "§F特博文擅离职守引起了极大的混乱，在§L克努特·莫恩§!的指挥下，挪威军事抵抗组织利用政府的混乱与内斗，进军奥斯陆，推翻了专员辖区政权，将挪威从二十年的纳粹统治中解放出来。挪威政体将变为§L临时政府§!。§!"
 CAU_IDEOLOGY_PATH: "£TNO_game_rule_flag_CAU   高加索 - 约西亚斯的疯狂"
 RULE_OPTION_CAU_IDEOLOGY_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_CAU_IDEOLOGY_PATH_RANDOM_DESC: "§F§o德国§!陷入内战不久，§h约西亚斯§!将会反思自己统治的真意，将自己的高贵血统与§h勃艮第体制§!相结合。与此同时，§o保罗·普莱格§!将募集支持推翻§h约西亚斯§!，终结他的疯狂统治。§!"
 RULE_OPTION_CAU_IDEOLOGY_PATH_BURGSYS: "黑日笼罩高加索"
 RULE_OPTION_CAU_IDEOLOGY_PATH_BURGSYS_DESC: "§F§o德国§!陷入内战不久，§h约西亚斯§!选择维持§h勃艮第体制§!高压统治。高加索将成为§h民族社会主义§!国家。§!"
 RULE_OPTION_CAU_IDEOLOGY_PATH_DESPOT: "高加索的疯王"
 RULE_OPTION_CAU_IDEOLOGY_PATH_DESPOT_DESC: "§F§h约西亚斯§!的疯癫更进一步，宣称自己为§h高加索国王§!，立儿子§s维特金德§!为继承人。高加索将成为§s绝对君主制§!国家。§!"
 RULE_OPTION_CAU_IDEOLOGY_PATH_NATIONALSOCIALISM: "男爵的采邑"
 RULE_OPTION_CAU_IDEOLOGY_PATH_NATIONALSOCIALISM_DESC: "§F§o普莱格§!的密谋将会成功。掌权后，他将实施有限改革维护秩序，更重要的，令§q高加索的石油大亨§!永享富贵。高加索将成为§o技官纳粹主义国家§!。§!"
 GER_HITLER_HEIR: "£TNO_game_rule_flag_GER   德国 - 希特勒的接班人"
 RULE_OPTION_GER_HITLER_HEIR_RANDOM: "默认 - AI随机"
 RULE_OPTION_GER_HITLER_HEIR_RANDOM_DESC: "§F希特勒快死了，他自己也清楚这一点。四位可能的继承人分别是改革派阿尔伯特·施佩尔、维持现状派马丁·鲍曼、保守派赫尔曼·戈林以及屠夫海德里希。然而，不论希特勒选择谁担任自己的继承人，他都不一定赢得最终的权力斗争——当然，倘若恶性权力斗争真的发生的话。§!"
 RULE_OPTION_GER_HITLER_HEIR_BORMANN: "§G钦点§!鲍曼"
 RULE_OPTION_GER_HITLER_HEIR_BORMANN_DESC: "§F§o马丁·鲍曼§!将被指定为§o希特勒的接班人§!。§!"
 RULE_OPTION_GER_HITLER_HEIR_SPEER: "§G钦点§!施佩尔"
 RULE_OPTION_GER_HITLER_HEIR_SPEER_DESC: "§F§J阿尔伯特·施佩尔§!将被指定为§o希特勒的接班人§!。§!"
 RULE_OPTION_GER_HITLER_HEIR_HGR: "§G钦点§!海德里希"
 RULE_OPTION_GER_HITLER_HEIR_HGR_DESC: "§F§o莱因哈德·海德里希§!将被指定为§o希特勒的接班人§!。§!"
 POLAND_UPRISING_OUTCOME: "£TNO_game_rule_flag_POL  £TNO_game_rule_flag_GGN   波兰起义"
 RULE_OPTION_POLAND_UPRISING_OUTCOME_RANDOM: "默认 - AI随机"
 RULE_OPTION_POLAND_UPRISING_OUTCOME_RANDOM_DESC: "§F阿道夫·希特勒死后，德国陷入混乱。波兰人民于是奋起反抗，从纳粹魔爪中夺回自己的家园。这场民族解放战争不光会改变人定的边界与政府，还把整个波兰民族的命运置于波兰人与德国人手中。§!"
 RULE_OPTION_POLAND_UPRISING_OUTCOME_POL: "£TNO_game_rule_flag_POL   波兰人胜利"
 RULE_OPTION_POLAND_UPRISING_OUTCOME_POL_DESC: "§F阿道夫·希特勒死后，波兰总督府崩溃，波兰民族的命运危如悬卵。勇敢而急于复仇的波兰人民将为自由而战斗，乃至牺牲。他们永远不会忘却过去二十年来经历的恐怖，但也许，真正的自由即将到来了……§!"
 RULE_OPTION_POLAND_UPRISING_OUTCOME_GGN: "£TNO_game_rule_flag_GGN   总督府胜利"
 RULE_OPTION_POLAND_UPRISING_OUTCOME_GGN_DESC: "§F阿道夫·希特勒死后，波兰人民奋起为自由而战。尽管仇恨与对自由的渴望充斥着他们的心灵，但最糟糕的事情还是发生了。总督府成功镇压了波兰起义，或许这次，波兰民族真的没有希望了。§!"
 FIN_GER_NEGOTIATION: "£TNO_game_rule_flag_GER  £TNO_game_rule_flag_FIN   鲍曼 - 芬兰谈判"
 RULE_OPTION_FIN_GER_NEGOTIATION_RANDOM: "默认 - AI随机"
 RULE_OPTION_FIN_GER_NEGOTIATION_RANDOM_DESC: "§F鲍曼赢得德国内战后，德国着手开始重建其势力范围。而芬兰的情况相当复杂。德国已开始同新政府谈判，同时也准备好了备用计划以备不时之需。芬兰的谈判如果失败，鲍曼将不得不用武力夺得芬兰的忠诚。§!"
 RULE_OPTION_FIN_GER_NEGOTIATION_SUCCESS: "§G成功§!"
 RULE_OPTION_FIN_GER_NEGOTIATION_SUCCESS_DESC: "§F谈判后，芬兰将重新加入德国经济圈并获得观察员身份。§!"
 RULE_OPTION_FIN_GER_NEGOTIATION_FAILURE: "§R失败§!"
 RULE_OPTION_FIN_GER_NEGOTIATION_FAILURE_DESC: "§F谈判失败，鲍曼没能促使芬兰加入团结协定。这对德国来说是一个出乎意料的国际耻辱，丢失了欧洲势力范围中的重要一员。如此失败必将损害德国在北极地区的军事投射能力。目前，芬兰的主权完全独立。§!"
 SWE_NEGOTIATION: "£TNO_game_rule_flag_GER  £TNO_game_rule_flag_SWE   鲍曼 - 瑞典谈判"
 RULE_OPTION_SWE_NEGOTIATION_RANDOM: "默认 - AI随机"
 RULE_OPTION_SWE_NEGOTIATION_RANDOM_DESC: "§F德国与瑞典的谈判将举行，但无人知晓能否达成最终协议。§!"
 RULE_OPTION_SWE_NEGOTIATION_SUCCESS: "§G成功§!"
 RULE_OPTION_SWE_NEGOTIATION_SUCCESS_DESC: "§F德国与瑞典之间的谈判取得成功。这对鲍曼来说是一场重大外交胜利，确保了德瑞修好的光辉未来。瑞典将成为团结协定观察员国。§!"
 RULE_OPTION_SWE_NEGOTIATION_FAILURE: "§R失败§!"
 RULE_OPTION_SWE_NEGOTIATION_FAILURE_DESC: "§F德国与瑞典的谈判以失败告终，这主要是因为瑞典不愿意接受德国的过分要求。瑞典的未来，与鲍曼今后的对外政策，都陷在重重迷雾之中……§!"
 NOR_BOR_PATH: "£TNO_game_rule_flag_GER  £TNO_game_rule_flag_NOR_Free   鲍曼 - 挪威谈判"
