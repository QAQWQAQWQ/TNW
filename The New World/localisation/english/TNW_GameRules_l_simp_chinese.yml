 RULE_OPTION_IBR_POWER_STRONG_FRANCO_DESC: "§F§s弗朗西斯科·佛朗哥§!在§L伊比利亚§!的受欢迎程度和影响力将超过他那位§n葡萄牙§!老朋友。对§L西班牙§!考迪罗有利的权力落差将使人口较少的§n葡萄牙人§!感到非常沮丧，他们对被征服的恐惧将§R破坏§!§L联盟§!的稳定。然而，随着§s萨拉查§!人气的下降，他的去世对§L联盟§!造成的影响将§y非常轻微§!。§!"
 RULE_OPTION_IBR_POWER_WEAK_FRANCO: "§O佛朗哥§!§G较受§!欢迎"
 RULE_OPTION_IBR_POWER_WEAK_FRANCO_DESC: "§F§s弗朗西斯科·佛朗哥§!的人气将超过§s萨拉查§!，他对§L联盟§!的影响力会变得更大。虽然一些§n葡萄牙§!公民抱怨自己的考迪罗软弱，但大多数人仍然对现状感到满意。§s萨拉查§!去世时，影响也§G不会那么严重§!。§!"
 RULE_OPTION_IBR_POWER_COUNCIL: "两人§Y平分秋色§!"
 RULE_OPTION_IBR_POWER_COUNCIL_DESC: "§F尽管经过§R重重障碍§!，但两位考迪罗的声望起起落落之后，他俩的影响力还是§Y大差不差§!。由于双方权力相等，事实上的国家元首成了§s伊比利亚委员会§!。§!"
 RULE_OPTION_IBR_POWER_WEAK_SALAZAR: "§K萨拉查§!§G较受§!欢迎"
 RULE_OPTION_IBR_POWER_WEAK_SALAZAR_DESC: "§F§s安东尼奥·德·奥利韦拉·萨拉查§!将在§L伊比利亚§!的动荡中成为人气更高的考迪罗。随着他在§L联盟内§!部的影响力越来越大，§L西班牙§!§q民族主义者§!会有轻微反弹，但总体情况还算§G平稳§!。然而，他的去世将§R极大§!地撼动整个国家，使其不稳。§!"
 RULE_OPTION_IBR_POWER_STRONG_SALAZAR: "§K萨拉查§!§y大幅§!领先"
 RULE_OPTION_IBR_POWER_STRONG_SALAZAR_DESC: "§F§s安东尼奥·德·奥利韦拉·萨拉查§!将远远超越他的§L西班牙§!对手，赢得§L伊比利亚§!特殊利益集团的青睐，这让那些不愿低人一头的§L西班牙人§!感到沮丧。然而，他掌权后的§R动荡§!将仅次于葡萄牙考迪罗去世后出现的冲突，这二者都将§x严重§!破坏联盟的稳定。§!"
