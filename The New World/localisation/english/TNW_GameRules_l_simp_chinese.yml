 RULE_OPTION_UZB_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_UZB_PATH_RANDOM_DESC: "§F和中亚的其他地区一样，新兴的乌兹别克斯坦也在前苏联的灰烬中挣扎复苏。保卫祖国的战争尚未结束，新乌兹别克斯坦的未来执掌在法伊祖拉·霍贾耶夫领导下的友俄政府与贾迪德手中。贾迪德努力维护苏维埃统治，反对起义的巴斯玛奇，巴斯玛奇则致力于在乌兹别克斯坦清除俄国影响，拥抱西式民主。草原之外，冷战的阴云仍在肆虐；贾迪德的世界主义秩序会胜出，还是巴斯玛奇革命会胜利？§!"
 RULE_OPTION_UZB_PATH_DEMOCRATIC: "§s乌兹别克斯坦民主党§!掌权"
 RULE_OPTION_UZB_PATH_DEMOCRATIC_DESC: "§F§s伊斯兰·卡里莫夫§!领导下的§s乌兹别克斯坦民主党§!将推翻§e霍贾耶夫的共产主义政权§!，将乌兹别克斯坦置于§s贵族保守主义§!之下。§!"
 RULE_OPTION_UZB_PATH_STABILITY: "§e乌兹别克共产党§!继续掌权"
 RULE_OPTION_UZB_PATH_STABILITY_DESC: "§F§e法伊祖拉·霍贾耶夫§!领导的§e乌兹别克共产党§!将继续执政，乌兹别克斯坦将继续§e民族共产主义§!的道路。§!"
 TAJ_PATH: "£TNO_game_rule_flag_TAJ_communist   塔吉克斯坦 - 政权更迭"
 RULE_OPTION_TAJ_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_TAJ_PATH_RANDOM_DESC: "§F苏联崩溃后，没有哪个国家的命运比塔吉克斯坦更为悲惨——塔吉克人眼睁睁地看着自己的孩子去了西俄革命阵线，再也没有回来；苏联战场上尸骨未寒，塔吉克斯坦又遭到阿富汗入侵；由于主力部队在对德战争中折损大半，塔吉克及吉尔吉斯盟友无力阻止阿富汗的进攻，阿富汗军队毫不留情地洗劫村落，致使塔吉克居民流离失所。\n\n如今，阿富汗占领南部，整个国家混乱不堪，强盗土匪四处作乱，前苏联行政长官博博占·加富罗夫竭尽全力维护国家的稳定，但最终在1965年还是遭遇了政变。深受伤害、怨恨盟友的塔吉克人民决定改变其悲惨的历史轨迹——是走向更美好的未来，还是堕入更糟糕的命运？§!"
 RULE_OPTION_TAJ_PATH_ULTRA: "§q塔吉克斯坦伊斯兰复兴党§!掌权"
 RULE_OPTION_TAJ_PATH_ULTRA_DESC: "§F§q毛拉韦·印度斯坦尼§!领导的§q塔吉克斯坦伊斯兰复兴党§!将会推翻§e加富罗夫的共产主义政权§!，塔吉克斯坦将成为§s伊斯兰民族主义§!国家。§!"
 RULE_OPTION_TAJ_PATH_DESPOTISM: "§s塔吉克斯坦武装力量§!掌权"
 RULE_OPTION_TAJ_PATH_DESPOTISM_DESC: "§F§s努斯拉图洛·阿卜杜勒哈科夫§!领导的§s塔吉克斯坦武装力量§!将会推翻§e加富罗夫的共产主义政权§!，塔吉克斯坦的政治体制将变为§s军政府§!。§!"
 RULE_OPTION_TAJ_PATH_DEMOCRATIC: "§i馕饼与民主党§!掌权"
 RULE_OPTION_TAJ_PATH_DEMOCRATIC_DESC: "§F§i布里尼索·别尔季耶娃§!领导的§i馕饼与民主党§!将会推翻§e加富罗夫的共产主义政权§!，塔吉克斯坦将成为§i农业主义§!国家。§!"
