 RULE_OPTION_GNS_PATH_RANDOM_DESC: ""
 RULE_OPTION_GNS_PATH_COLLAPSED: "£TNO_game_rule_flag_POR_PPR_Communist  £TNO_game_rule_flag_RPP   葡萄牙§R崩溃§!"
 RULE_OPTION_GNS_PATH_COLLAPSED_DESC: "§F救国政府将会为了§n葡萄牙§!的自由而浴血奋战，并击溃北部的萨拉查主义者，但这一切都将是徒劳的。随着时间的推移和胜利热情的消退，自由主义者和共产党之间的关系将逐渐恶化，救国政府内部的局势日渐紧张——最终，当双方的分歧难以弥合时，它将无可避免地走向崩溃。受共产党支持的著名布哈林主义者弗朗西斯科·马丁斯·罗德里格斯将夺取法鲁，并以此为根据地开展进一步的行动，对抗行将就木的救国政府……§!"
