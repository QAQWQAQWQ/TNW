 RULE_OPTION_USA_OIL_PATH_RANDOM_DESC: "§F说石油危机让§M美国§!的经济地动山摇，丝毫也没有言过其实。§M美国§!经济深度依赖稳定的石油供给，以此维持机器的正常运转。加州和得州倒是有石油储备，但那远不足以供给快速增长的人口需要。过去几十年的经济危机如在眼前，如果§M美国§!还要生存下去，那么避免危机的恶化就是重中之重。为应对危机，总统将成立一个直属于他的特别工作队，以保证新的石油供给、平息内乱，并实施一些行政举措。§M美国§!将把什么抛向世界呢？§!"
 RULE_OPTION_USA_OIL_PATH_ITA_INTERVENTION: "£TNO_game_rule_flag_ITA   支援§n意大利§! - 干涉"
 RULE_OPTION_USA_OIL_PATH_ITA_INTERVENTION_DESC: "§F没什么人能设想§m美国§!与其在§n罗马§!的前敌人能够成功重建起政治同盟，更没什么人能想到，即使北非的尸山血海依然在人们的脑海挥之不去，§m美国§!大兵和§n意大利§!战士还是能够并肩战斗。但是，最近蔓延全地中海的大动乱让§m美国§!略微停顿下来。§R干涉主义者§!主张，确保§mOFN§!的新盟友的优势地位和后者对其帝国的掌控比什么都值得，总统对此也表示首肯。尽管二战芥蒂在前，§m美国§!将如在一战中那样武装§G援助§!它在§n意大利帝国§!的盟友，并以任何必要手段来确保§mOFN§!在§f阿拉伯世界§!托管领的稳定。\n\n§R要求：§!\n§n意大利§!§Y是§!§MOFN§!成员国。§!"
 RULE_OPTION_USA_OIL_PATH_ITA_NON_INTERVENTION: "£TNO_game_rule_flag_ITA   支援§n意大利§! - 间接干预"
 RULE_OPTION_USA_OIL_PATH_ITA_NON_INTERVENTION_DESC: "§F最最委婉的说法里，§m美国§!同§n意大利帝国§!之间的新生同盟遭遇了一些风浪。近日在§G埃及§!、§Q伊拉克§!和其他地方发生的叛乱终于使得§m美国§!在中东的反殖民主义立场同§n意大利§!殖民帝国之间的矛盾爆发了。西方的§Y反干涉主义者§!坚持§m美国§!如果还有良心，就不能让§m美国§!士兵为他们的前§J法西斯§!§R敌国§!战死在中东的沙漠里。他们试图说服现任§m美国§!总统仅仅向§n意大利§!的中东盟友运输武器和其他物资。\n\n§R要求：§!\n§Y意大利是自由国家组织成员。§!§!"
 RULE_OPTION_USA_OIL_PATH_SAU_INTERVENTION: "£TNO_game_rule_flag_SAU   支持沙特 - 干涉"
 RULE_OPTION_USA_OIL_PATH_SAU_INTERVENTION_DESC: "§F§M美国§!正在经济危机边缘徘徊。倘若未能制止油价暴涨，她将蒙受惨烈的灾难。在这种情况下，合众国政府判断，即便采取的行动未能准备充分而且遭受失败，公众也能谅解政府的艰难处境。因此，美国将公开介入阿拉伯半岛。\n\n§R要求：§!\n§Y意大利不是OFN成员国。§!§!"
 RULE_OPTION_USA_OIL_PATH_SAU_NON_INTERVENTION: "£TNO_game_rule_flag_SAU   支持沙特 - 间接干预"
