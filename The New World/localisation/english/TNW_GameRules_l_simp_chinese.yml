 KOM_NO_CONFIDENCE: "£TNO_game_rule_flag_KOM   科米 - 沃兹涅先斯基陨落"
 RULE_OPTION_KOM_NO_CONFIDENCE_RANDOM: "默认 - AI随机"
 RULE_OPTION_KOM_NO_CONFIDENCE_RANDOM_DESC: "§F一名被指控为§V苏斯洛夫§!手下的间谍遭逮捕，他被控告破坏§B中间派§!的政治组织及其影响力。§P沃兹涅先斯基§!接下来的对策因而成为了§Y万众瞩目的焦点§!。随后，他为了进一步扩大了自身影响力，或许会对这名叛徒杀鸡儆猴，这么做或许会导致他的§R倒台§!，但也有可能§G巩固§!其作为中间派候选人的地位。§!"
 RULE_OPTION_KOM_NO_CONFIDENCE_NOT: "§P沃兹涅先斯基§!拒绝下局"
 RULE_OPTION_KOM_NO_CONFIDENCE_NOT_DESC: "§F§P沃兹涅先斯基§!并没有下令将那可疑的叛徒处理掉，而是把他§q驱逐§!出去。在该疑犯被证明无罪后，沃兹涅先斯基因为没有错杀无辜得以保全其在§B中间派§!的势力和地位。§!"
 RULE_OPTION_KOM_NO_CONFIDENCE_MOROZOV: "§R不信任投票§! - §M莫罗佐夫§!胜选"
 RULE_OPTION_KOM_NO_CONFIDENCE_MOROZOV_DESC: "§F§P沃兹涅先斯基§!的布局§R失败§!了，在他下令处决一名无辜疑犯后，§B中间派§!的支持率暴跌。这件事向科米人民证明他们的民主理想与那些§V激§!§o进§!派系是一路货色。针对沃兹涅先斯基的§R不信任动议§!将会通过，取而代之的是§M青年改革者联盟§!的§M伊万·帕夫洛维奇·莫罗佐夫§!。他将会成为新的§B中间派§!候选人，并使科米暂时居于§M自由主义§!的统治之下。§!"
 RULE_OPTION_KOM_NO_CONFIDENCE_STALINA: "§R不信任投票§! - §B斯大林娜§!胜选"
 RULE_OPTION_KOM_NO_CONFIDENCE_STALINA_DESC: "§F§P沃兹涅先斯基§!的布局§R失败§!了，在他下令处决一名无辜疑犯后，§B中间派§!的支持率暴跌。这件事向科米人民证明他们的民主理想与那些§V激§!§o进§!派系是一路货色。针对沃兹涅先斯基的§R不信任动议§!将会通过，取而代之的是§B主权民主党§!的§B斯韦特兰娜·斯大林娜§!。她将会成为新的§B中间派§!候选人，并使科米政府暂时奉行§B大帐篷§!式的民主意识形态。§!"
 RULE_OPTION_KOM_NO_CONFIDENCE_VOZNESENSKY: "§R不信任投票§! - §P沃兹涅先斯基§!坚守阵地"
 RULE_OPTION_KOM_NO_CONFIDENCE_VOZNESENSKY_DESC: "§F§P沃兹涅先斯基§!的布局§R失败§!了，在他下令处决一名无辜疑犯后，§B中间派§!的支持率暴跌。这件事向科米人民证明他们的民主理想与那些§V激§!§o进§!派系是一路货色，其领导地位亦会为一次§R不信任动议§!所挑战。然而，尽管困难重重，§P沃兹涅先斯基§!的政治生命还是得以在接下来的投票决议中幸存下来，科米将继续奉行§P改良社会主义§!。§!"
