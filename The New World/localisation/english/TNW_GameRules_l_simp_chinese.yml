 RULE_OPTION_NOR_BOR_PATH_INDEPENDENT: "£TNO_game_rule_flag_NOR_Collab   §J挪威合作政府§! - 回归"
 RULE_OPTION_NOR_BOR_PATH_INDEPENDENT_DESC: "§F挪威合作政府将作为独立成员加入团结协定。\n\n§R要求：§!\n主流派掌权！"
 RULE_OPTION_NOR_BOR_PATH_PUPPET: "£TNO_game_rule_flag_NOR_Collab   §J挪威合作政府§! - 傀儡国"
 RULE_OPTION_NOR_BOR_PATH_PUPPET_DESC: "§F挪威合作政府将作为傀儡国加入团结协定。\n\n§R要求：§!\n主流派掌权！"
 RULE_OPTION_NOR_BOR_PATH_MILORG_YES: "£TNO_game_rule_flag_NOR_Free   自由挪威谈判成功"
 RULE_OPTION_NOR_BOR_PATH_MILORG_YES_DESC: "§F自由挪威同意谈判。谈判取得成功，挪威作为正式成员重新加入德国的势力范围。\n\n§R要求：§!\n§Y军事抵抗组织掌权§!"
 RULE_OPTION_NOR_BOR_PATH_MILORG_NO_COUP_OK: "£TNO_game_rule_flag_NOR_Free   自由挪威政变失败 - 无入侵"
 RULE_OPTION_NOR_BOR_PATH_MILORG_NO_COUP_OK_DESC: "§F鲍曼对自由挪威的政变企图失败了，其政权旋即决定入侵挪威。\n\n§R要求：§!\n军事抵抗组织掌权"
 RULE_OPTION_NOR_BOR_PATH_MILORG_COUP_SUCCESS: "£TNO_game_rule_flag_NOR_Free   自由挪威政变成功"
 RULE_OPTION_NOR_BOR_PATH_MILORG_COUP_SUCCESS_DESC: "§F德国发动了一场成功的政变，推翻了挪威政府并指派亲德势力上台，将这个斯堪的纳维亚国家带回了团结协定。\n\n§R要求：§!\n§Y军事抵抗组织掌权§!"
 RULE_OPTION_NOR_BOR_PATH_MILORG_NO_COUP_FAIL: "£TNO_game_rule_flag_NOR_Free   自由挪威政变失败 - 入侵"
