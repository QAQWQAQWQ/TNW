 LEBANON_CIVIL_WAR_OUTCOME: "£TNO_game_rule_flag_SLB  £TNO_game_rule_flag_LEB   黎巴嫩内战"
 RULE_OPTION_LEBANON_CIVIL_WAR_OUTCOME_RANDOM: "默认 - AI随机"
 RULE_OPTION_LEBANON_CIVIL_WAR_OUTCOME_RANDOM_DESC: "§F意大利在意土战争中战败，致使黎巴嫩惨遭叙利亚民族国吞并。黎巴嫩民众的境况急转直下，以至民不聊生，终致§J皮埃尔·杰马耶勒§!领导§J长枪党§!发动起义，将土耳其占领军尽数驱逐。短短数月之后，该党的统治便遭受挑战——对长枪党政权深恶痛绝的§V黎巴嫩复兴主义者§!发起内战，试图在中东建立复兴主义国家。\n\n§R要求：§!\n§Y土耳其赢得第二次意土战争§!§!"
 RULE_OPTION_LEBANON_CIVIL_WAR_OUTCOME_LEB: "£TNO_game_rule_flag_LEB   加强§J黎巴嫩国§!"
 RULE_OPTION_LEBANON_CIVIL_WAR_OUTCOME_LEB_DESC: "§F§J皮埃尔·杰马耶勒§!领导下的§J黎巴嫩国§!会战胜§V黎巴嫩复兴主义者§!，并扫除§V复兴主义者§!的影响力，使黎巴嫩成为长枪党主义国家。§!"
 RULE_OPTION_LEBANON_CIVIL_WAR_OUTCOME_SLB: "£TNO_game_rule_flag_SLB   加强§V黎巴嫩社会主义共和国§!"
 RULE_OPTION_LEBANON_CIVIL_WAR_OUTCOME_SLB_DESC: "§F§V易卜拉欣·库拉伊拉特§!领导下的§V黎巴嫩社会主义共和国§!会战胜§J长枪党§!。牢牢掌控黎巴嫩的未来，黎巴嫩会成为§V复兴主义§!国家，在整个中东开创先例。§!"
