 RULE_OPTION_HAITIAN_CIVIL_WAR_OUTCOME_RANDOM_DESC: "§F海地各地发生小规模冲突且持续一段时间之后，全国城市开始出现街垒战争，§V革命§!终于爆发了。§L海地政府§!宣布进入紧急状态，并集结军队结束混乱。\n\n与此同时，§V民族解放人民党§!将为一劳永逸地将§M美帝国主义§!的污点从海地土地上驱逐出去而斗争。尽管§L政府§!保证主权至上，但胜利者似乎并不明朗。§!"
