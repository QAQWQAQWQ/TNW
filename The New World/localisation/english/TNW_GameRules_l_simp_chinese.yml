 RULE_OPTION_AST_FED_ELECTION_62_OUTCOME_CONSERVATISM: "§i澳大利亚自由党-保守派§!胜选"
 RULE_OPTION_AST_FED_ELECTION_62_OUTCOME_CONSERVATISM_DESC: "§F澳大利亚人民希望把丑闻缠身的§h工党§!扫地出门，却又不太厌倦“大政府”式的管理，他们用选票把自由党的老派§i托利党人保罗·哈斯勒克§!抬进阿德莱德大道。新政府承诺回归澳大利亚传统价值观，促进澳大利亚人之间和谐互助，澳大利亚未来数年将走上§i家长制保守主义§!的道路。§!"
 RULE_OPTION_AST_FED_ELECTION_62_OUTCOME_LIBERALISM: "§M澳大利亚自由党-温和派§!胜选"
 RULE_OPTION_AST_FED_ELECTION_62_OUTCOME_LIBERALISM_DESC: "§F澳大利亚人民会对§h工党§!不满，比兹利辞职后，他们把希望寄托在自由党的一位年轻面孔上，此人名叫§M约翰·戈顿§!。虽然他在经济方面奉行民族主义，希望澳大利亚减少对§MOFN§!的依赖，但他主张对抗§V日本§!，并且承诺保障社会自由的价值观。澳大利亚未来数年将走上§M民族自由主义§!道路。§!"
 RULE_OPTION_AST_FED_ELECTION_62_OUTCOME_PROGRESSIVISM: "§h工党-右派§!胜选"
 RULE_OPTION_AST_FED_ELECTION_62_OUTCOME_PROGRESSIVISM_DESC: "§F§h工党-右派§!排除万难，经受住了政治分肥丑闻的风暴§!，其保守派候选人§h阿瑟·卡尔韦尔§!在民意调查中再次获胜，并出任总理。卡尔韦尔自豪于自己是§h进步派§!，但更自豪于他的白皮肤和白澳政策，该政策将所有有色人种拒之门外。尽管他公开宣称白人至上，但他对深受压迫的澳大利亚原住民的声援会使澳大利亚未来数年将走上§h肤色社会主义§!道路。"
 RULE_OPTION_AST_FED_ELECTION_62_OUTCOME_SOCIALIST: "§V工党-左派§!胜选"
 RULE_OPTION_AST_FED_ELECTION_62_OUTCOME_SOCIALIST_DESC: "§F比兹利的政治分肥丑闻曝光后，澳大利亚人民将会强烈要求从执政党中选出一位更值得信赖的领导人。务实的乔治主义者、§V工党左翼§!资深人士§V克莱德·卡梅伦§!因此被选举为总理，而一位毫不粉饰自我的§V社会主义者§!担任总理，在澳大利亚历史上还是头一回。卡梅伦根深蒂固的激进社会主义理念和他讲求实效的改革计划相结合，澳大利亚未来数年将走上§V社会主义§!道路。§!"
