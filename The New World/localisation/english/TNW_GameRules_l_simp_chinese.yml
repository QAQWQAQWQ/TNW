 RULE_OPTION_WARLORD_INSURRECTION_OUTCOME_CHI_REPUBLIC_OF_CHINA_DESC: "§F南京合作政府将粉碎西部叛乱，高宗武得以放开束缚，追求其中国五个现代化的愿景，在70年代与压迫者展开斗争。§!"
 CAM_POST_ACHAR_SOK: "£TNO_game_rule_flag_CAM   柬埔寨 - 阿乍索政府的命运"
 RULE_OPTION_CAM_POST_ACHAR_SOK_RANDOM: "默认 - AI随机"
 RULE_OPTION_CAM_POST_ACHAR_SOK_RANDOM_DESC: "§F在不明身份的恐怖分子刺杀了柬埔寨总理尧格之后，山玉成总统任命阿乍索为新任总理。然而，阿乍索的执政期注定多舛，农业改革失败，与中日两国的国有化协议也未见成效，再加上威通战事愈发激烈，国家局势雪上加霜。面对风雨飘摇的政府，山玉成总统不得不考虑，究竟该挑选何人来接替阿乍索的位置。§!"
 RULE_OPTION_CAM_POST_ACHAR_SOK_LON_NOL: "任命§b朗诺§!为总理"
 RULE_OPTION_CAM_POST_ACHAR_SOK_LON_NOL_DESC: "§F面对政局动荡，山玉成总统转向柬埔寨右翼阵营寻求支持，最终选定§b朗诺§!将军出任新一任总理。朗诺是一位对下高棉运动影响深远的民族主义者，他在军事事务上成就斐然，成功处理了达春叛军和威通战争。不过，他在位期间未能破解柬埔寨的农业困境，导致本就摇摆不定的左翼成员纷纷出走，高棉共和人民会也随之向右倾斜。现阶段，柬埔寨正踏上§b文官独裁§!之路。§!"
 RULE_OPTION_CAM_POST_ACHAR_SOK_MARTIAL_LAW: "宣布§b戒严§!"
 RULE_OPTION_CAM_POST_ACHAR_SOK_MARTIAL_LAW_DESC: "§F山玉成总统对权力斗争中的种种妥协感到心力交瘁，最终决定宣布戒严，将柬埔寨的民主制度暂时悬置，同时任命§b巴春§!为总理。巴春忠于总统与共和国事业，他将大举推行“成派”政策，其重要主张包括将中国资产国有化和启动第二个五年计划等。然而，若要在这新的柬埔寨革命中有所建树，山玉成必须面对和克服来自右翼的挑战。现阶段，柬埔寨正踏上§b文官独裁§!之路。§!"
 CAM_CIVIL_WAR: "£TNO_game_rule_flag_CAM   柬埔寨 - 内战"
 RULE_OPTION_CAM_CIVIL_WAR_RANDOM: "默认 - AI随机"
 RULE_OPTION_CAM_CIVIL_WAR_RANDOM_DESC: "§F随着柬埔寨的右翼政府在日益严重的农村危机中逐渐瓦解，危机一触即发。§b诺罗敦·占达朗赛亲王§!拉起一支名为§b自由高棉§!的反政府力量，掀起叛乱。与此同时，高棉共和人民会脱党左翼成员§b符宁§!，连同他的£GFX_GNG_chinese_texticon §i共和青年团§!支持者，也因农村危机以及山玉成总统对共和价值的背叛揭竿而起。这一场浩浩荡荡的三方内战将决定柬埔寨国家的未来。§F\n\n§R要求：§!\n§Y£TNO_game_rule_flag_CAM  柬埔寨 - 阿乍索政府的命运§!中预设§M任命朗诺为总理§!§!"
 RULE_OPTION_CAM_CIVIL_WAR_GOV: "§.政府§!保住政权"
 RULE_OPTION_CAM_CIVIL_WAR_GOV_DESC: "§F在反对势力围困金边之际，山玉成政府内部的亲日温和派将其内阁软禁起来，迫使山玉成任命§.宋双§!为新的总理。宋双以擅长管理柬埔寨经济著称，他上台后立即向东京求助。随后，§e日本§!派出援军，扫清了叛乱分子，恢复了国家的秩序。由此，柬埔寨走向§.法团国家主义§!之路。§!"
 RULE_OPTION_CAM_CIVIL_WAR_HU_NIM: "£GFX_GNG_chinese_nation_texticon §b共和青年团§!夺权"
 RULE_OPTION_CAM_CIVIL_WAR_HU_NIM_DESC: "§F随着对金边的最后一轮攻势，腐朽的金边政权轰然倒塌，符宁与他的共和青年团趁势夺取了权力。他们宣告了£GFX_GNG_chinese_texticon §i共和革命§!的到来——一场融合了左翼理念的革新，意图借鉴£GFX_GNG_chinese_texticon §i中国§!的现代化路径来振兴柬埔寨，着重于农业农村发展，力求完成山玉成未竟的承诺。柬埔寨的前途将在£GFX_GNG_chinese_nation_texticon §b汪精卫思想§!的照耀下展开新的篇章。\n\n§Y该路径将会被共产主义越南入侵§!§!"
 RULE_OPTION_CAM_CIVIL_WAR_SIHANOUK: "§b自由高棉§!夺权"
 RULE_OPTION_CAM_CIVIL_WAR_SIHANOUK_DESC: "§F随着对金边的最后一轮攻势，腐朽的金边政权轰然倒塌，自由高棉在极具魅力的前国王诺罗敦·西哈努克的带领下掌握了政权。西哈努克自任总统，宣布不会恢复君主制，还缺席审判判处山玉成死刑。他提出了一套含糊其辞的团结与重建计划，试图在内战后的废墟上重建国家。在§b文官独裁§!的帷幕之下，柬埔寨的未来充满了不确定性。\n\n§Y该路径将会被共产主义越南入侵§!§!"
 CAM_POST_CHHUOEN: "£TNO_game_rule_flag_CAM   柬埔寨 - 巴春政府的命运"
 RULE_OPTION_CAM_POST_CHHUOEN_RANDOM: "默认 - AI随机"
 RULE_OPTION_CAM_POST_CHHUOEN_RANDOM_DESC: "§F§.山玉成§!总统采取大胆措施依此立威，他尝试为柬埔寨革命勾勒全新蓝图，以推动他的民族主义理念。这一重大变革的命运寄托于资深共和革命者和政治家巴春的能力之中。§b保守派和右翼反对派§!因认为山玉成未能有效捍卫国家主权而不断壮大，背后阴谋不断，试图将他变成他们影响力的工具，甚至试图除掉他，让柬埔寨迎来历史性的转折。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_CAM  柬埔寨 - 阿乍索政府的命运§!中预设§M宣布戒严§!§!"
 RULE_OPTION_CAM_POST_CHHUOEN_ARREST: "山玉成遭§b软禁§!"
 RULE_OPTION_CAM_POST_CHHUOEN_ARREST_DESC: "§F由于无法镇压自由高棉叛乱、被指对越南态度过于温和，山玉成总统和总理面对汹涌的民族主义反对声浪已是无力回天，即便尝试借助西索瓦·施里玛达的支持也无法挽回政府的信任危机。最终，得到泰国支持的保守派要人严森波采取行动，解散国民议会，并将山玉成软禁。严森波随后出任新一任总理，带领柬埔寨迈入§b管理型国家§!的新阶段。§!"
 RULE_OPTION_CAM_POST_CHHUOEN_COUP: "山玉成遭§b政变§!"
 RULE_OPTION_CAM_POST_CHHUOEN_COUP_DESC: "§F由于无法镇压自由高棉叛乱、被指对越南态度过于温和，山玉成总统和总理面对汹涌的民族主义反对声浪已是无力回天，即便尝试借助西索瓦·施里玛达的支持也无法挽回政府的信任危机。在山玉成身在东京之际，民族主义者朗诺将军发动政变，推翻了山玉成政府。朗诺成为柬埔寨的新总统，以§b文官独裁§!体制带领国家走上充满曲折的道路。§F\n\n§Y该路径将会被共产主义越南入侵§!§!"
 RULE_OPTION_CAM_POST_CHHUOEN_ASSASSINATION: "巴春§.遇刺§!"
 RULE_OPTION_CAM_POST_CHHUOEN_ASSASSINATION_DESC: "§F巴春总理遇刺身亡，情况扑朔迷离，人们猜测严森波和朗诺与此事有关。遇刺终结了巴春漫长且卓有成效的执政期。巴春总理任内，柬埔寨的左翼力量得以重振，诸如乔森潘和符宁等左翼人士在其内阁中发挥重要作用，共同推进新柬埔寨革命。由此，柬埔寨开始遵循§.革命民族主义§!的意识形态前行。§!"
 CAM_PACH_SUCCESSOR: "£TNO_game_rule_flag_CAM   柬埔寨 - 巴春的继任者"
 RULE_OPTION_CAM_PACH_SUCCESSOR_RANDOM: "默认 - AI随机"
 RULE_OPTION_CAM_PACH_SUCCESSOR_RANDOM_DESC: "§F巴春总理在扑朔迷离的情况下不幸遇害后，山玉成总统必须任命新的总理来接替其职。鉴于严森波和朗诺涉嫌牵涉此次暗杀事件，右翼已被排除在总理人选之外。这样一来，总理之位的竞争便落在了农村民粹主义者§.乔森潘§!和资深民族主义者§.叶西召§!两人之间。无论如何，最终的决定权仍在山玉成总统手中，而他作出的选择会对国家的未来产生深远的影响。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_CAM  柬埔寨 - 巴春政府的命运§!中预设§M巴春遇刺§!§!"
 RULE_OPTION_CAM_PACH_SUCCESSOR_SAMPHAN: "任命§.乔森潘§!为总理"
 RULE_OPTION_CAM_PACH_SUCCESSOR_SAMPHAN_DESC: "§F山玉成总统再次向左翼妥协，如同先前任命阿乍索为总理一般，这次他选择了§.乔森潘§!。乔森潘是农民利益的捍卫者，也是经济民族主义者和发展主义者。任内，他将致力于削减日本对柬埔寨的巨大影响，通过推动现代化进程，力求以本国产品取代进口货品。此举将继续引导柬埔寨走向§.革命民族主义§!之路。§!"
 RULE_OPTION_CAM_PACH_SUCCESSOR_SICHAU: "任命§.叶西召§!为总理"
 RULE_OPTION_CAM_PACH_SUCCESSOR_SICHAU_DESC: "§F山玉成总统再度任命一位亲信出任总理，这次他选择了叶西召为新一任总理。§.叶西召§!与之前的巴春一样是民族主义者，但他更为强硬，作为一名激进的族裔民族主义者，他对一切越南影响持坚决反对态度。在叶任内，由于其经济政策引发的供应问题，农村地区将面临严重危机。为维持权力，山玉成总统不得不依赖叶西召的族裔民族主义言论。若越南未来出现一个敌对政府，这样的政治路线可能会招致§e灾难性后果§!。无论如何，柬埔寨将继续沿着§.革命民族主义§!的道路前进。\n\n§Y该路径将会被共产主义越南入侵§!§!"
 CAM_JAPAN_INVASION: "£GFX_TNO_game_rule_flag_CAM_DRK   £TNO_game_rule_flag_VIC   £TNO_game_rule_flag_JAP   日本第二次入侵印度支那"
 RULE_OPTION_CAM_JAPAN_INVASION_DEFAULT: "默认 - 日本第二次入侵印度支那"
 RULE_OPTION_CAM_JAPAN_INVASION_DEFAULT_DESC: "§F随着印支局势如多米诺骨牌般急转直下，肇始于§x越南§!的动荡逐渐波及柬埔寨，§e日本§!着手筹备二度入侵印支半岛，意图重塑符合日本利益的“秩序”。这次军事行动旨在清除各附庸国内的共产主义势力，重新扶植亲日政权。行动完成后，在这些地方扶持临时政府进行管理。这意味着越南将由§s临时政府§!接管，而柬埔寨则会被重塑为§b管理型国家§!。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_VIC  越盟攻势的命运§!中预设§M越盟胜利§!\n§W且\n§Y预设任意会导致共产主义越南入侵的路径§!§!"
 RULE_OPTION_CAM_JAPAN_INVASION_NO: "日本§R拒绝§!入侵"
 RULE_OPTION_CAM_JAPAN_INVASION_NO_DESC: "§F§e日本§!朝野震惊——现任首相决定不对印支局势进行军事干预，认为国内延宕未熄的石油危机是更为紧迫的问题。尽管这一决定与超级大国处理势力范围内的事务时的惯常做法相悖，愤怒的国会还是在对失去共荣圈成员的沮丧中勉强接受了这一决定。越南和柬埔寨的社会主义将在§V革命阵线§!的引领下茁壮成长。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_VIC  越盟攻势的命运§!中预设§M越盟胜利§!\n§W且§!\n§Y预设任意会导致共产主义越南入侵的路径§!§!"
 IND_LUCKNOW_CONFERENCE_PATH: "£TNO_game_rule_flag_IND  £TNO_game_rule_flag_AZH   勒克瑙会议"
 RULE_OPTION_IND_LUCKNOW_CONFERENCE_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_IND_LUCKNOW_CONFERENCE_PATH_RANDOM_DESC: "§F§P贾瓦哈拉尔·尼赫鲁§!逝世后，文加利尔·克里希南·克里希纳·梅农接任§<印度共和国§!总理职位，他决心将印度从末日战争的悬崖边拉回，为此在勒克瑙召开统一磋商会议，此举令许多国际观察家深感震惊。议题繁杂多样，但势在必行。§<两§!§K国§的重要人物均出席了会议，若无法达成共识，印度恐将§e陷入战火§!，化为灰烬。§!"
 RULE_OPTION_IND_LUCKNOW_CONFERENCE_PATH_SUCCESS: "§G成功§!"
 RULE_OPTION_IND_LUCKNOW_CONFERENCE_PATH_SUCCESS_DESC: "§F§<印§!§K度§!欢欣鼓舞，次大陆终于可以长舒一口气。尽管仍有分歧，§<印度共和国§!和§K自由印度政府§!仍然选择和解统一，以秉持中立但仍积极参与国际事务的形象步入国际舞台。§s印度斯坦平等同盟§!和§P印度国民大会党§!将分享权力，整合军队与文官系统，推动全面统一。这个过程肯定会有很多矛盾和摩擦，但印度终于迎来了和平。勒克瑙会议的遗产将铭记史册，开启§G和平统一§!的时代篇章。§!"
 RULE_OPTION_IND_LUCKNOW_CONFERENCE_PATH_FAILURE: "§R失败§!"
 RULE_OPTION_IND_LUCKNOW_CONFERENCE_PATH_FAILURE_DESC: "§F几声枪响，回响宛若刀伤。正处于政治顶峰的§s苏巴斯·钱德拉·鲍斯§!倒在血泊之中，在医院病床上昏迷不醒，§K自由印度§!最值得信任的医生们寸步不离，保护他远离§<印§!§K度§!的混乱。鲍斯是否能活下来、能否从昏迷中苏醒过来还不确定，但印度的和平不会持续太久了。这次事件直接导致了勒克瑙会议的失败，双方都因此调动军队以准备最后的冲突，国家将淹没在血海之中。勒克瑙会议的结果将是§R失败§!与§e战争§!。§!"
 IND_67_ELECTION_PATH: "£TNO_game_rule_flag_IND  印度共和国 - 1967年大选"
 RULE_OPTION_IND_67_ELECTION_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_IND_67_ELECTION_PATH_RANDOM_DESC: "§F§e战争§!的火焰终于熄灭，遍体鳞伤的印度将走上艰难的复兴之路，重建失去的一切。战争的记忆需要几代人的时间才能淡去，重建也需要同样久的时间，才能将战争化作教科书和博物馆中的叙述，但§<印度§!仍将一往无前。§P夏斯特里§!将一路同行，§<共和国§!大选将以其压倒性的胜利而告终，§G统一§!§<印度§!坚定的愿景浮现在人民的眼前。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_IND  £TNO_game_rule_flag_AZH   勒克瑙会议§!§M失败§!§!"
 RULE_OPTION_IND_67_ELECTION_PATH_REFORMIST_SOCIALISM: "§P国大党 - 社会主义派§!胜选"
 RULE_OPTION_IND_67_ELECTION_PATH_REFORMIST_SOCIALISM_DESC: "§F无论是出于对战争胜利的喜悦，还是对§P尼赫鲁§!的宏伟蓝图信心满满，抑或只是不想打破平衡，印度都将选择维持现状。§P国大党§!左翼将得到提名并赢下1967年大选。尼赫鲁主义在印度已掌权十多年，在§P亚什万特拉奥·恰范§!的注视下，这样的统治还将继续下去。印度的未来将以§P改良社会主义§!的形式继续下去。§!"
 RULE_OPTION_IND_67_ELECTION_PATH_PATERNALISTIC_CONSERVATISM: "§i国大党 -  帕特尔派§!胜选"
 RULE_OPTION_IND_67_ELECTION_PATH_PATERNALISTIC_CONSERVATISM_DESC: "§F大选临近，印度选民将授权§i国大党§!继续连任，但其形式将不同于过去在§P尼赫鲁§!和§P梅农§!领导下的形式，而是向右转向，由前财政部长、保守派领袖§i莫拉尔吉·德赛§!领导。在他的领导下，经济计划和国有化将大幅缩减，土地再分配也将放慢脚步。同时，他所仇视伊斯兰教的态度和政策将引起广大穆斯林的不安。印度的未来将建立在帕特尔派的§i家长制保守主义§!之下。§!"
 RULE_OPTION_IND_67_ELECTION_PATH_CLASSICAL_LIBERALISM: "§M自由党§!胜选"
 RULE_OPTION_IND_67_ELECTION_PATH_CLASSICAL_LIBERALISM_DESC: "§F如同许多前人一样，§P国大党§!赢得了战争，却失去了和平。派系斗争和挫折主导了国家政治，年迈的§M查克拉瓦蒂·拉贾戈帕拉查里§!成为§M自由党§!领袖，在大选中一举夺魁。与其前辈和同等生态位的政党不同，自由党将彻底拥抱自由市场，推进私有化，减少监管，并且结束一切再分配计划，令其实业家和地主基本盘欢欣鼓舞。印度未来的基础将建立在§M古典自由主义§!的基础之上。§!"
 RULE_OPTION_IND_72_ELECTION_PATH_INCSOC: "§V国大党 - 大会社会派论坛§!胜选"
 RULE_OPTION_IND_72_ELECTION_PATH_INCSOC_DESC: "§F钟摆左右不定，但摆幅却远超以往。§M拉贾戈巴拉查里§!的逝世并不能阻止公众将无数的失败归咎于§M自由党§!的执政失策，也无法缓解人们普遍失望的情绪。而§P国大党§!将重新掌权，推举§V布拉姆·普拉卡什·亚达夫§!作为继任。即使按照§P国大党§!的标准，§V亚达夫§!也会采取更为左倾的立场，试图整合孟加拉和比哈尔，但首要目标是推翻§M自由党§!上一届任期内实施的多项改革。印度的未来将是§V社会民主主义§!的未来。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_IND   印度共和国 - 1967年大选§!中预设§M自由党胜选§!§!"
 RULE_OPTION_IND_72_ELECTION_PATH_INCPRO: "§P国大党 - 社会主义派§!胜选"
 RULE_OPTION_IND_72_ELECTION_PATH_INCPRO_DESC: "§F钟摆摆动，向左倾斜。虽然获胜的道路并不确定，但§P国大党§!社会主义派系将试图为其同党右翼的失败开脱罪责，或试图维护左翼任期内的成功，从而赢得1972年大选，§P亚什万特拉奥·恰范§!将就任总理。除了将孟加拉和比哈尔邦完全并入印度之外，§P恰范§!还将推进左翼议程，以成功证明其方向的正确性，重塑§P贾瓦哈拉尔·尼赫鲁§!的愿景。印度的未来将属于§P改良社会主义§!。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_IND   印度共和国 - 1967年大选§!中预设§M国大党 - 社会主义派胜选§!§Y或§!§M国大党 -  民主派胜选§!§!"
 RULE_OPTION_IND_72_ELECTION_PATH_INCDEM: "§i国大党 -  民主派§!胜选"
 RULE_OPTION_IND_72_ELECTION_PATH_INCDEM_DESC: "§F钟摆摆动，向右扭转。虽然获胜的道路并不确定，但§i国大党§!帕特尔派将试图为其同党左翼的失败开脱罪责，或试图维护右翼任期内的成功，从而赢得1972年大选，§i莫拉尔吉·德赛§!将就任总理。除了将孟加拉和比哈尔邦完全并入印度之外，§i德赛§!还将利用其在选举中的成功，在广泛的民众支持下推进其愿景。然而，随着族群暴力的增长，许多少数民族正对他的当选屏息以待。印度的未来将走入§i家长制保守主义§!。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_IND   印度共和国 - 1967年大选§!中预设§M国大党 - 社会主义派胜选§!§Y或§!§M国大党 -  民主派胜选§!§!"
 RULE_OPTION_IND_72_ELECTION_PATH_LIB: "§M自由§!§B党§!胜选"
 RULE_OPTION_IND_72_ELECTION_PATH_LIB_DESC: "§F1967年的§M自由党§!可能在政治上还是个藉藉无名的小党，但到了1972年，他们的地位已经举足轻重。随着前任领导人去世，印度重新举行选举，选民最终会选择§M自由党§!连任。不再是新人的§M自由党§!将以经济原则将为基石，巩固其作为印度政治面孔的地位。即使不平等现象进一步加剧，放松管制和自由化的政策仍将是印度的代名词。如果§n巴基斯坦§!在战争中幸存下来，那么印度的未来将转向§MN.G. 兰加§!的§M古典自由主义§!；如果§n巴基斯坦§!正处于占领状态，那么印度的未来将处在§B加娅特丽·黛维§!领导的§B寡头自由主义§!之下。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_IND   印度共和国 - 1967年大选§!中预设§M自由党胜选§!§!"
 RULE_OPTION_AZH_BOSE_RESIGNATION_PATH_YES_CHATTERJI: "鲍斯§R辞职§! - §L查特吉维持权力§!"
 RULE_OPTION_AZH_BOSE_RESIGNATION_PATH_YES_CHATTERJI_DESC: "§F§n鲍斯§!的身体状况越来越糟，日日缠绵病榻的他已是时日无多。面对无可争议的事实，临时继任者§sA·C·查特吉§!得以正式上位。§s查特吉§!缺乏根基，必须依赖§s全印前进同盟§!精英的支持，继续社会民族主义议程，继承§n鲍斯§!的遗产。§s查特吉§!年事已高，却依旧雄心勃勃。即便换了一个领导人，§n印度§!的未来依然沿着§L社会民族主义§!的道路前行。§!§!"
 RULE_OPTION_AZH_BOSE_RESIGNATION_PATH_YES_RAGHAVAN: "鲍斯§R辞职§! - §L技官统治§!"
 RULE_OPTION_AZH_BOSE_RESIGNATION_PATH_YES_RAGHAVAN_DESC: "§F§n鲍斯§!的身体状况越来越糟，所有人都清楚日日缠绵病榻的他已是时日无多。与此同时，党对§sA·C·查特吉§!的失望日渐显露，也厌倦了他试图控制§s全印前进同盟§!的种种努力，§L技术官僚§!和§V左翼民族主义者§!将组成联盟使其下台，推举§L内迪亚姆·拉加万§!，将重心放到探索集中发展的方法上；但他们的联盟并不稳定。§K印度§!的未来，至少在一段时间内，将走向§L家长式发展主义§!。§!"
 RULE_OPTION_AZH_BOSE_SUCCESSOR_PATH_AMIYA_NATH_BOSE: "§s阿米亚·纳特·鲍斯§!"
 RULE_OPTION_AZH_BOSE_SUCCESSOR_PATH_AMIYA_NATH_BOSE_DESC: "§F在鲍斯治下，印度斯坦平等同盟将其个人倾向奉为圭臬，已故主席的亲侄子§s阿米亚·纳特·鲍斯§!将继任自由印度共和国领袖。尽管阿米亚本人温和有礼，不愿过多改变旧有秩序，但党的形象仍将渐渐围绕他而展开，正如他过世的叔叔一般，成为国家民族团结的象征。在可预见的未来里，印度斯坦仍将处于§s一人独裁§!政权的统治之下。§!"
 RULE_OPTION_AZH_BOSE_SUCCESSOR_PATH_SAMAR_GUHA: "§L萨马尔·古哈§!"
 RULE_OPTION_AZH_BOSE_SUCCESSOR_PATH_SAMAR_GUHA_DESC: "§F鲍斯将与催生自由印度运动的价值观保持一致，他的继任将是一位社会解放主义者。萨马尔·古哈将升任总理，作为一名左倾学者，预计他将使该党转向左翼。最终，自由印度政府将被引导走向工会式的法团主义。因此，印度斯坦将会由§L左翼法团主义§!来治理。§!"
 AZH_OIL_CRISIS_CHATTERJI_PATH: "£TNO_game_rule_flag_AZH   自由印度政府 - 石油危机 - 查特吉"
 RULE_OPTION_AZH_OIL_CRISIS_CHATTERJI_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_AZH_OIL_CRISIS_CHATTERJI_PATH_RANDOM_DESC: "§F石油危机一触即发，现代世界的命脉即将枯竭，印度斯坦就此陷入瘫痪。然而，等待政治危机为其所用的§sA·C·查特吉§!利用局势，以石油危机为由，试图宣布印度进入§x紧急状态§!，利用其赋予总理的巨大权力清除§L印度斯坦平等同盟§!和§Q印度国民军§!的反对派。但是，没有人会天真到束手就擒，查特吉的夺权行为很可能会让他被其他派系就此赶下台去。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_AZH   自由印度政府 - 鲍斯辞职§!中预设§M鲍斯辞职 - 查特吉维持权力§!§!"
 RULE_OPTION_AZH_OIL_CRISIS_CHATTERJI_PATH_CHATTERJI_SUCCESS: "§s紧急状态§!"
 RULE_OPTION_AZH_OIL_CRISIS_CHATTERJI_PATH_CHATTERJI_SUCCESS_DESC: "§F最终，§s查特吉§!的野心得以实现。尽管印度斯坦各§L反对§!§Q派§!竭尽全力，但其宣布§x紧急状态§!的图谋仍然得逞，各大机构不得不对新秩序俯首听命。在§s查特吉§!的操控之下，§L印度斯坦平等同盟§!和§Q印度国民军§!将继续为他服务，毫不动摇。印度未来将建立起围绕在§sA·C·查特吉§!身边的§s一人独裁§!政权。§!"
 RULE_OPTION_AZH_OIL_CRISIS_CHATTERJI_PATH_REMOVED_BY_PARTY: "§L遭到党罢免§!"
 RULE_OPTION_AZH_OIL_CRISIS_CHATTERJI_PATH_REMOVED_BY_PARTY_DESC: "§F最终，§s查特吉§!为取得印度斯坦至高无上权力而进行的豪赌在第一关就折戟沉沙，§L印度斯坦平等同盟§!将驳回其宣布§x紧急状态§!的命令。夺权行动遭到否决后，党内忍耐就此耗尽，他被解除领袖职务。在以§L五人小组§!为首的党内精英集团的支持下，§L阿比德·哈桑·萨夫拉尼§!将取而代之，成为印度斯坦领袖。萨夫拉尼志虑忠纯、效忠于党，他的目标是在印度斯坦政坛拨乱反正，真正继承苏巴斯·钱德拉·鲍斯的遗产。印度斯坦的未来将重新走向§L社会民族主义§!。§! "
 RULE_OPTION_AZH_OIL_CRISIS_CHATTERJI_PATH_REMOVED_BY_ARMY: "§s军队插足§!"
 RULE_OPTION_AZH_OIL_CRISIS_CHATTERJI_PATH_REMOVED_BY_ARMY_DESC: "§F最终，§s查特吉§!为取得印度斯坦至高权力而进行的豪赌会取得一些进展，但终究未能成功。尽管§L印度斯坦平等同盟§!并未反对进入§x紧急状态§!，但§Q印度国民军§!拒不配合，反手将§s查特吉§!和他的政党清洗出局，支持§s莫汉·辛格§!上台执政。尽管打着民主过渡的旗号，但明眼人都看得出§s辛格§!无意放下权杖，他将按自己的愿景改造印度斯坦，走向强硬§s过渡政府§!的未来。§!"
 AZH_OIL_CRISIS_RAGHAVAN_PATH: "£TNO_game_rule_flag_AZH   自由印度政府 - 石油危机 - 拉加万"
 RULE_OPTION_AZH_OIL_CRISIS_RAGHAVAN_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_AZH_OIL_CRISIS_RAGHAVAN_PATH_RANDOM_DESC: "§F§L内迪亚姆·拉加万§!匆忙拼凑的同盟经不起时间的考验。在接连失败与持续内讧之时，石油危机席卷印度斯坦。§L印度斯坦平等同盟§!§V左派§!失去了信心，他们将同劳工组织联合起来，直接挑战总理的权威。深陷执政危机的§L拉加万§!如履薄冰，他既要弹压此起彼伏的示威浪潮，又需获取§Q军方§!效忠与§V日企§!支持，方能在漩涡之中求得一线生机。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_AZH   自由印度政府 - 鲍斯辞职§!中预设§M鲍斯辞职 - 技官统治§!§!"
 RULE_OPTION_AZH_OIL_CRISIS_RAGHAVAN_PATH_RAGHAVAN_SUCCESS: "§L拉加万渡过难关§!"
 RULE_OPTION_AZH_OIL_CRISIS_RAGHAVAN_PATH_RAGHAVAN_SUCCESS_DESC: "§F在统一战争以来最大的危机中，§L内迪亚姆·拉加万§!一展其非凡手段。尽管§L拉加万§!一开始的动作看似与目标背道而驰，但他成功与§L党§!的§V左翼§!达成一致，通过充分让步，双方达成紧密协议，使其恢复对政府的信心。值得注意的是，这些让步并未惹怒§V日本投资者§!，反而让他们认可了拉加万的个人能力，继续支持他的议程。印度斯坦未来将继续走§L家长式发展主义§!的道路。§!"
 RULE_OPTION_AZH_OIL_CRISIS_RAGHAVAN_PATH_REMOVED_BY_PARTY: "§V遭到罢免§!"
 RULE_OPTION_AZH_OIL_CRISIS_RAGHAVAN_PATH_REMOVED_BY_PARTY_DESC: "§F在统一战争以来最大的危机中，§L内迪亚姆·拉加万§!将采取极端措施，动用§Q印度国民军§!捕杀抗议者。此举太过一意孤行，遭到§L印度斯坦平等同盟§!其他的一致反对。最终，党通过内部机制推翻了§L拉加万§!。为了纪念抗议者的牺牲，党推举党内左翼杰出代表§V拉克希米·萨加尔§!上尉接替总理职位，意在重新点燃社会革命的熊熊烈火。面对石油危机的动荡，印度斯坦的未来将在§V左翼民族主义§!的引领下重焕光彩。§!"
 RULE_OPTION_AZH_OIL_CRISIS_RAGHAVAN_PATH_REMOVED_BY_ARMY: "§s军队插足§!"
 RULE_OPTION_AZH_OIL_CRISIS_RAGHAVAN_PATH_REMOVED_BY_ARMY_DESC: "§F在统一战争以来最大的危机中，§L内迪亚姆·拉加万§!将向抗议者做出重大让步。然而，他的让步实在令人难以接受，从根本上危及§Q印度国民军§!和§V日本投资者§!的利益。愤怒的§s穆罕默德·扎曼·基亚尼§!将发动军事政变，把拉加万赶下台，将残余的§L技术官僚§!整合进其权力机构，建立起稳固的军政府，狂妄自大的§V左派分子§!遭彻底清洗。自此，印度斯坦未来将为§s军政府§!所统治。§!"
 IND_UNIFIED_65_ELECTIONS_PATH: "£TNO_game_rule_flag_IND   统一印度 - 1965年大选"
 RULE_OPTION_IND_UNIFIED_65_ELECTIONS_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_IND_UNIFIED_65_ELECTIONS_PATH_RANDOM_DESC: "§F1965年，§<印§!§K度§!迎来了一场不同寻常的政治角逐：雄踞次大陆的两大政权，将以投票而非武力一决高下。§<印度共和国§!和§K自由印度§!已经合为一体，究竟谁能引领风骚、谁又将甘居人后，都取决于这场至关重要的选举。§L印度国民大会党§!和§s印度斯坦平等同盟§!将在选战中一较高下，习惯了翻手为云、覆手为雨的他们，深知此次选举非同小可，不敢有丝毫懈怠：选举的结果，将直接指引§.印度§!未来的航向。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_IND  £TNO_game_rule_flag_AZH   勒克瑙会议§!§M成功§!§!"
 RULE_OPTION_IND_UNIFIED_65_ELECTIONS_PATH_INC: "§L印度国民大会党§!当选"
 RULE_OPTION_IND_UNIFIED_65_ELECTIONS_PATH_INC_DESC: "§F§<印度共和国§!曾是统一印度两大政治实体中体量更大的一方，正是这样的实力助力其执政党——§L印度国民大会党§!再次走向胜利，这一切将在§P贾瓦哈拉尔·尼赫鲁§!的女儿§L英迪拉·甘地§!的领导下实现。乍一看，这像是历史的简单重演，但§L英迪拉·甘地§!志不在此。通过增强经济规划中的法团主义色彩、重新编排选民登记册与驯服政党架构，印度悄然滑向专制政治。印度的未来，将奠基于§L左翼法团主义§!之上。§!"
 RULE_OPTION_IND_UNIFIED_65_ELECTIONS_PATH_HSS: "§L印度斯坦平等同盟§!当选"
 RULE_OPTION_IND_UNIFIED_65_ELECTIONS_PATH_HSS_DESC: "§F作为自英属印度成立以来首个独立、统一的印度国家，§K自由印度§!的历史遗产或将助力其执政党——§L印度斯坦平等同盟§!再次走向胜利，接下桂冠的自然是§s苏巴什·钱德拉·鲍斯§!。展望新时代的到来，鲍斯将任命§L阿比德·哈桑·萨夫拉尼§!接替自己担任总理一职。虽然今时不同往日，平等同盟不甘于传统的选举政治，过去曾施行过一党制的§L萨夫拉尼§!和§s鲍斯§!意图在当今的印度复辟一党政治。印度的未来，将奠基于§L社会民族主义§!之上。§!"
 IND_UNIFIED_70_ELECTIONS_PATH: "£TNO_game_rule_flag_IND   统一印度 - 1970年大选"
 RULE_OPTION_IND_UNIFIED_70_ELECTIONS_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_IND_UNIFIED_70_ELECTIONS_PATH_RANDOM_DESC: "§F1970年，§L英迪拉·甘地§!大权在握，声威一时无两。当时，印度正经历向国家资本主义的深刻转型，而国大党对选举机制的控制也愈发牢固。§L英迪拉§!在印度政坛颇具非议，但民众支持率依然很高，如果能够顺利连任，则§L英迪拉§!的愿景有望顺利实现。然而，§P反对派联盟§!也在积极筹备，意图在选战中挑战§L英迪拉§!的地位，把她拉下总理宝座。面对威胁，§L英迪拉§!意识到败选风险迫在眉睫，她或许会选择宣布进入§s紧急状态§!，逮捕反对派领袖并无限期推迟选举，以维系政权稳定。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_IND   统一印度 - 1965年大选§!中预设§M印度国民大会党§!当选§!"
 RULE_OPTION_IND_UNIFIED_70_ELECTIONS_PATH_INC: "§L印度国民大会党§!当选"
 RULE_OPTION_IND_UNIFIED_70_ELECTIONS_PATH_INC_DESC: "§F从竞选活动的筹备到正式展开，§L英迪拉·甘地§!的胜选已是无可争议的事实。人们压根不相信这位政坛强人会落败，压倒性的胜利更巩固了其坚如磐石的地位。这份笃定并非空穴来风：她精心挑选亲信进入选举委员会，调整选举规则以利于己方，甚至让全党紧贴自己的政策方向。选战得胜的§L国大党§!盛极一时，§.印度§!将全然遵循英迪拉的政治蓝图，留下难以磨灭的深远影响。未来的印度，将在§L英迪拉·甘地§!的引领下，坚守§L左翼法团主义§!的道路。§!"
 RULE_OPTION_IND_UNIFIED_70_ELECTIONS_PATH_INC_STATE_OF_EMERGENCY: "§L印度国民大会党§!当选 - §s紧急状态§!"
 RULE_OPTION_IND_UNIFIED_70_ELECTIONS_PATH_INC_STATE_OF_EMERGENCY_DESC: "§F选举临近，有关§L英迪拉·甘地§!可能失利的种种揣测全都不攻自破。为防止意外发生，§L英迪拉§!或许会选择最简单的手段——以“维护社会稳定”之名宣布§s紧急状态§!，将所有挑战权力的政敌一并铲除。反对派会大声谴责这是赤裸裸的抢班夺权，但马上就被忠于§L英迪拉§!的官员和内卫部队镇压下去。清除了宪法设下的障碍之后，§s英迪拉·甘地§!将以铁腕推行管理法团主义体制。印度未来将成为§s管理型国家§!。§!"
 RULE_OPTION_IND_UNIFIED_70_ELECTIONS_PATH_AIJF: "§P全印度人民阵线§!当选"
 RULE_OPTION_IND_UNIFIED_70_ELECTIONS_PATH_AIJF_DESC: "§F1970年大选临近，§.印度§!仿佛站在了黑暗深渊的边缘——幸运的是，它找到了回头的路。在一众反对党的支持下，§P贾吉万·拉姆§!将§L英迪拉·甘地§!领导的§L印度国民大会党§!赶下了台。§L国大党§!虽心有不甘，但还是选择了和平交权，让人们松了一口气。然而，胜选并不是结束：执政联盟庞大而复杂的结构，加上各党截然不同的意识形态，使得即使是最基础的拆解法团的立法工作也变得异常艰难，难度不亚于推翻英迪拉政权。现阶段，印度将暂时由§P人民阵线§!来管理。§!"
 IND_UNIFIED_PARTY_STATE_PATH: "£TNO_game_rule_flag_IND   统一印度 - 重建党国"
 RULE_OPTION_IND_UNIFIED_PARTY_STATE_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_IND_UNIFIED_PARTY_STATE_PATH_RANDOM_DESC: "§F§L阿比德·哈桑·萨夫拉尼§!出任总理，有一点是肯定的：印度自由主义完蛋了，可能要过几十年才能缓过气来。这不是因为外敌入侵或殖民统治，也不是因为血腥的政变，而是被印度选民自己高高兴兴地抛弃了。§L印度斯坦平等同盟§!忙着巩固自己作为§.印度§!精神唯一代言人的地位，另有一帮阴谋家拼命想要阻止他们，但两边都不会把重新选举当作解决办法。 \n\n§R要求：§!\n§Y£TNO_game_rule_flag_IND   统一印度 - 1965年大选§!中预设§M印度斯坦平等同盟§!当选§!"
 RULE_OPTION_IND_UNIFIED_PARTY_STATE_PATH_SUCCESS: "§s萨夫拉尼§!巩固权力"
 RULE_OPTION_IND_UNIFIED_PARTY_STATE_PATH_SUCCESS_DESC: "§F勒克瑙会议虽然抹去了那些随意分割§<印§!§K度§!领土的疆界，但很快大家就会知道，究竟哪一方更能代表统一的§.印度§!。§s印度斯坦平等同盟§!利用选举多数强行推动一系列模仿过去党国模式的立法，一步步恢复了从前的一党政治。最终，一场自我政变悬置了印度宪法的核心条款，残存的反对声音也被镇压下去。随着党国体制的重建，印度的未来将走向§s阿比德·哈桑·萨夫拉尼§!领导下的§s文官独裁§!。§!"
 RULE_OPTION_IND_UNIFIED_PARTY_STATE_PATH_COUP: "§R军事政变§!"
 RULE_OPTION_IND_UNIFIED_PARTY_STATE_PATH_COUP_DESC: "§F勒克瑙会议虽然抹去了那些随意分割§<印§!§K度§!领土的疆界，但并非所有的界限都随之消失。忠于§<共和国§!的军官对§L萨夫拉尼§!企图将军队变成个人权力工具的行径感到愤怒，决定把他赶下台，自诩民主的捍卫者。在这个过程中，他们找了一个意想不到的盟友——早已式微的§M自由党§!。自由党提出一个新的愿景：由一小群开明贵族来主导印度，这些人理性而温和，永远不会威胁到议会制。随着党国体制逐渐瓦解，印度的未来将走向§s米诺·马萨尼§!领导下的§s贵族保守主义§!。§!"
 PAK_69_ELECTIONS_PATH: "£TNO_game_rule_flag_PAK   巴基斯坦 - 1969年大选"
 RULE_OPTION_PAK_69_ELECTIONS_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_PAK_69_ELECTIONS_PATH_RANDOM_DESC: "§F在边境省的重压之下，§s费罗兹·汗·努恩§!的政府摇摇欲坠，最终崩塌。届时，他不仅得面对§n巴基斯坦§!全国的目光，更要向背后的贵族支持者们交待。至于他能否挺过这次选举，还是会被§s蒙塔兹·道勒塔纳§!和§s佐勒菲卡尔·阿里·布托§!这两位挑战者扳倒，现在还不得而知。不过，不管谁上台，最终都是为同一股势力效力。\n\n§R要求：§!\n£TNO_game_rule_flag_PAK   本·卡西姆行动中预设巴基斯坦§G挺立于世§!§!"
 RULE_OPTION_PAK_69_ELECTIONS_PATH_NOON: "§s费罗兹·汗·努恩§!再次当选"
 RULE_OPTION_PAK_69_ELECTIONS_PATH_NOON_DESC: "§F1969年大选来去匆匆，结果却没啥变化。§y穆斯林联盟§!巩固了政权，§s费罗兹·汗·努恩§!赢得了选举，但这却是他最后的辉煌——几个月后他就去世了，§s贾哈纳拉·沙赫纳瓦兹§!接过了他的衣钵。尽管努恩本人没能长寿，但§y穆斯林联盟§!保证了他的贵族制度得以延续，§n巴基斯坦§!的精英阶层不断发展。§n巴基斯坦§!仍将处于§s贵族保守主义§!体制之下。§!"
 RULE_OPTION_PAK_69_ELECTIONS_PATH_DAULTANA: "§s蒙塔兹·道勒塔纳§!当选"
 RULE_OPTION_PAK_69_ELECTIONS_PATH_DAULTANA_DESC: "§F1969年大选为§n巴基斯坦§!§!带来了§O新的曙光§!，§q反动§!§e之火§!照亮的黎明降临了。§R费罗兹·汗·努恩§!的政治理想化为泡影，巴基斯坦§w贵族§!在新兴的教士集团中找到了新的盟友，§s蒙塔兹·道勒塔纳§!顺势登上权力巅峰。曾经被视为野蛮手段的街头政治，如今却成了巩固政权的重要工具。§n巴基斯坦§!的宗教少数群体不得不面对制度化暴力与私刑，而国际社会只是作壁上观。从此，§n巴基斯坦§!将在§s贵族共和主义§!的阴影下摸索前行。§!"
 RULE_OPTION_PAK_69_ELECTIONS_PATH_BHUTTO: "§s佐勒菲卡尔·阿里·布托§!当选"
 RULE_OPTION_PAK_69_ELECTIONS_PATH_BHUTTO_DESC: "§F计票结果揭晓，全国正义联盟的候选人§s佐勒菲卡尔·阿里·布托§!最终胜选。布托志在结束旁遮普人对国家的主导地位，但这胜利并未给他带来片刻轻松。面对摇摆不定的执政联盟和充满变数的政治前途，布托肩上的担子依旧沉重。唯有时间能够证明，旁遮普贵族是否会跟过去一样，将布托的政党也纳入掌控之中。无论如何，巴基斯坦仍将处于§s贵族共和主义§!的体制之下。§!"
 RULE_OPTION_SAM_SUCCESSOR_ARTSEZO: "§o阿尔采佐§!§G受选§!"
 RULE_OPTION_SAM_SUCCESSOR_ARTSEZO_DESC: "§F§s俄罗斯解放军§!内部的§q亲德派§!取得胜利，§o弗拉基米尔·阿尔采佐§!现在成了§s俄罗斯人民解放委员会§!的领导人。§o阿尔采佐§!身兼§J法西斯§!、§q俄奸§!和§s贼匪§!三重属性，不思悔改反倒引以为豪，众所周知，他对俄罗斯没啥好感，反而对§q德国人§!青眼有加，许多人担心他的掌权会让萨马拉变成§q德国§!东方征服意志的延伸。然而，§o阿尔采佐§!的野心似乎比人们想象的要大得多，他和他的军阀同伴似乎下定决心，不论§q德国§!是否支持，都要继续推动俄罗斯的统一。毕竟，俄罗斯是一块孕育资源但亟待开发的土地，而§o阿尔采佐§!身上最大的属性便是贪婪……若弗拉索夫选阿尔采佐为接班人，萨马拉将成为§o民族社会主义§!国家，直到弗拉索夫去世。§!"
 RULE_OPTION_SAM_ROUTE_ARTSEZO: "§o阿尔采佐§!接权"
 RULE_OPTION_SAM_ROUTE_ARTSEZO_DESC: "§F不希望发生权力斗争的士兵和下级军官聚集在阿尔采佐将军身边，后者计划利用俄罗斯解放军的武装力量建立一个法西斯国家。阿尔采佐只为自己和忠于自己的人谋取利益，他将把萨马拉转变为一个现代封建制国家。萨马拉的未来将走向§o民族社会主义§!。§!"
 NZL_ELECTION_63_OUTCOME: "£TNO_game_rule_flag_NZL   新西兰 - 1963年大选"
 RULE_OPTION_NZL_ELECTION_63_OUTCOME_RANDOM: "默认 - AI随机"
 RULE_OPTION_NZL_ELECTION_63_OUTCOME_RANDOM_DESC: "南非战争猝然爆发，外交政策讨论主导了大选。现任总理、§i国家党§!的§i基思·霍利约克§!将迎来反对党§P工党§!党首§P诺曼·柯克§!的挑战。\n\n新西兰人民正在前往投票站，大多数人都认为，选战结果将很大程度上取决于国家在“反法西斯圣战”和进一步实现§M§MOFN§!§!目标的议题上，能够取得怎样的成绩。"
 RULE_OPTION_NZL_ELECTION_63_OUTCOME_NATIONAL: "§i国家党§!胜选"
 RULE_OPTION_NZL_ELECTION_63_OUTCOME_NATIONAL_DESC: "§i基思·霍利约克§!总理再次证明了他在新西兰人民心目中的地位，成功连任。未来三年，他将继续在§i国家党§!的旗帜之下引领国家前行。霍利约克将落实他的鹰派外交政策，新西兰派往海外的部队和武器装备将继续增加。在他的领导下，新西兰将继续走在§i家长制保守主义§!的道路之上。"
 RULE_OPTION_NZL_ELECTION_63_OUTCOME_LABOUR: "§P工党§!胜选"
 RULE_OPTION_NZL_ELECTION_63_OUTCOME_LABOUR_DESC: "由于在对外干预中表现平平，§i基思·霍利约克§!败选，§P诺曼·柯克§!取而代之。§P工党§!将仅参与在道义上合情合理的对外干涉，柯克将转变霍利约克的鹰派立场，因此，新西兰会在§MOFN§!的灰色干预中退居次要位置。在柯克领导下，新西兰将走上§P改良社会主义§!的道路。"
 NZL_ELECTION_66_OUTCOME: "£TNO_game_rule_flag_NZL   新西兰 - 1966年大选"
 RULE_OPTION_NZL_ELECTION_66_OUTCOME_RANDOM: "默认 - AI随机"
 RULE_OPTION_NZL_ELECTION_66_OUTCOME_RANDOM_DESC: "过去三年中，南非战争、印尼内战等一系列冲突接踵而至，有关外交政策的争论继续困扰着新西兰执政党。现任政府能否继续掌权有待于人民投票决定：他们是会支持§i国家党§!的鹰派立场，还是支持§V工党§!的鸽派立场。"
 RULE_OPTION_NZL_ELECTION_66_OUTCOME_NATIONAL: "§i国家党§!胜选"
 RULE_OPTION_NZL_ELECTION_66_OUTCOME_NATIONAL_DESC: "在国际主义者与干涉主义者的凯歌之中，§i国家党§!在选战中大胜，坚定的§i基思·霍利约克§!，或比他还强硬的鹰派继承者§i罗伯特·马尔登§!将出任总理。无论如何，凯旋的§i国家党§!将在反法西斯圣战中继续协助§MOFN§!。新西兰将走上§i家长制保守主义§!或§i民粹保守主义§!的道路。"
 RULE_OPTION_NZL_ELECTION_66_OUTCOME_LABOUR: "§V工党§!胜选"
 RULE_OPTION_NZL_ELECTION_66_OUTCOME_LABOUR_DESC: "鸽派与和平人士迎来了胜利，§V工党§!在本届大选中赢得多数，可靠的§P诺曼·柯克§!，或比他还要温和鸽派的继承者§V休·瓦特§!将出任总理。§V工党§!可能会继续其有限干涉的路线，或者完全终止新西兰军队的海外行动。新西兰将走上§P改良社会主义§!或§V社会民主主义§!的道路。"
 NZL_ELECTION_69_OUTCOME: "£TNO_game_rule_flag_NZL   新西兰 - 1969年大选"
 RULE_OPTION_NZL_ELECTION_69_OUTCOME_RANDOM: "默认 - AI随机"
 RULE_OPTION_NZL_ELECTION_69_OUTCOME_RANDOM_DESC: "海外战事渐渐平息，新西兰选民们将前往投票站，点检§MOFN§!以反法西斯解放之名所得的收获，以及帮助教唆帝国主义霸权付出的代价。计票正在进行，权力天平将倾向于§i国家党§!或§V工党§!中的一方；其他反对派也正渐渐壮大，向建制党派发起挑战。"
 RULE_OPTION_NZL_ELECTION_69_OUTCOME_NATIONAL: "§i国家党§!胜选"
 RULE_OPTION_NZL_ELECTION_69_OUTCOME_NATIONAL_DESC: "无论是出于对现任§V工党§!的鸽派倾向和左翼经济政策的反感，还是出于对反法西斯圣战的支持，§i国家党§!将以胜利之姿重返议会。尽管§i现任政府§!将继续其强硬政策，新当选的总理§B杰克·马歇尔§!将更加注重新西兰的利益。无论如何，新西兰将走上§i家长制§!、§i民粹§!或§B自由保守主义§!道路。"
 RULE_OPTION_NZL_ELECTION_69_OUTCOME_LABOUR: "§V工党§!胜选"
 RULE_OPTION_NZL_ELECTION_69_OUTCOME_LABOUR_DESC: "无论是出于对现任§i国家党§!§MOFN§!干预和保护主义政策的反感，还是因为倾向于缓和外交政策，§V工党§!将取得胜利并在议会中获得多数席位。§V现任§!或新任总理§V马丁·芬利§!将着重研究国内政策，同时减少霍利约克时代的外国干预。无论如何，新西兰将走上§P改良社会主义§!，或§V社会民主主义§!的道路。"
 NZL_GENERAL_STRIKE_OUTCOME: "£TNO_game_rule_flag_NZL   新西兰 - 总罢工"
 RULE_OPTION_NZL_GENERAL_STRIKE_OUTCOME_RANDOM: "默认 - AI随机"
 RULE_OPTION_NZL_GENERAL_STRIKE_OUTCOME_RANDOM_DESC: "石油危机加剧、§MOFN§!表现不佳，新西兰压力骤增，紧急工资冻结将导致工人举行大罢工。在执政党试图支撑工会伙伴缓解自身压力之际，总理将努力寻找出路，避免政府崩溃的局面。"
 RULE_OPTION_NZL_GENERAL_STRIKE_OUTCOME_RESOLVED: "危机§G消弭§!"
 RULE_OPTION_NZL_GENERAL_STRIKE_OUTCOME_RESOLVED_DESC: "得益于新西兰现任总理对局势的熟练处理，要么§V工党§!政府将接受罢工者提出的大部分要求，要么§i国家党§!政府将协商一个双方都能接受的协议。危机解决，执政党会有损失，但也没有失去竞选连任的机会。"
 RULE_OPTION_NZL_GENERAL_STRIKE_OUTCOME_RESIGNATION: "总理§R辞职§!"
 RULE_OPTION_NZL_GENERAL_STRIKE_OUTCOME_RESIGNATION_DESC: "由于未能达成协议，§i国家党§!工会被总罢工压得摇摇欲坠，最终走向瓦解，现任总理只得辞职。随后，§B自由保守派布莱恩·托尔博伊斯§!将毫无悬念地当选为国家党新任领导人，他将面对内外交困的局面：一边是持续的罢工，另一边是即将到来的大选。政府的前景似乎异常黯淡，生存机会微乎其微。§F\n§R要求：§!\n§Y£TNO_game_rule_flag_NZL   新西兰 - 1969年大选§!中预设§M国家党胜选§!"
 NZL_ELECTION_72_OUTCOME: "£TNO_game_rule_flag_NZL   新西兰 - 1972年大选"
 RULE_OPTION_NZL_ELECTION_72_OUTCOME_RANDOM: "默认 - AI随机"
 RULE_OPTION_NZL_ELECTION_72_OUTCOME_RANDOM_DESC: "现任政府宣布举行突击选举，企图出其不意、打乱反对派的部署。然而，在全球动荡——特别是石油危机与各类挑战的影响——的大背景下，执政党的连任之路定会异常艰难。与此同时，§L社会信用党§!和§L和平党§!将继续积极参选，还有创纪录数量的独立候选人加入了这场政治角逐。现在，大选似乎成了一场势均力敌的角逐之战……"
 RULE_OPTION_NZL_ELECTION_72_OUTCOME_NATIONAL: "§i国家党§!胜选"
 RULE_OPTION_NZL_ELECTION_72_OUTCOME_NATIONAL_DESC: "不管全球局势有多紧张，新西兰选民都将把信心寄托在§i国家党§!——进而寄托于§MOFN§!的力量——上，让它领导他们度过混乱时期。§i现任§!或新任总理§B布莱恩·托尔博伊斯§!将继续推行霍利约克在反法西斯圣战中的对外干预政策。新西兰将走上§i家长制§!、§i民粹§!或§B自由保守主义§!道路。"
 RULE_OPTION_NZL_ELECTION_72_OUTCOME_LABOUR: "§V工党§!胜选"
 RULE_OPTION_NZL_ELECTION_72_OUTCOME_LABOUR_DESC: "面对国内经济疲软的局面，新西兰选民投票支持§V工党§!上台，倾向于采取更为克制和鸽派的外交干预政策。§V现任§!或新任总理§V鲍勃·蒂泽德§!将带领新西兰远离所谓“无谓”的冲突，让军队待在国内。新西兰将走上§P改良社会主义§!，或§V社会民主主义§!的道路。"
 RULE_OPTION_NZL_ELECTION_72_OUTCOME_SOCCRED: "§L反战同盟§!胜选"
 RULE_OPTION_NZL_ELECTION_72_OUTCOME_SOCCRED_DESC: "新西兰在国际事务中接连受挫，让反对党逐渐成了气候，最终形成了一个由§L社会信用党§!、§L和平党§!和§V社会主义§!议员组成的联盟，作为第三股政治力量上台执政。新任总理§L约翰·奥布赖恩§!领导的联合政府将在共同的目标下团结起来：当选后立刻退出§MOFN§!。在他们的领导下，新西兰将追随§L社会信用§!的意识形态。"
 MOSKOWIEN_RK_OR_ARMY: "£TNO_game_rule_flag_MCW   莫斯科专员辖区 - 文官或军事政府"
 RULE_OPTION_MOSKOWIEN_RK_OR_ARMY_OUTCOME_RANDOM: "默认 - AI随机"
 RULE_OPTION_MOSKOWIEN_RK_OR_ARMY_OUTCOME_RANDOM_DESC: "§F第二次斗争时期让§o德国§!及其殖民地陷入瘫痪，从猖獗的山头主义到鸡毛蒜皮的权力斗争，如今的德国无处不充斥着混乱，大战征服留下的遗产脆弱不堪——莫斯科专员辖区自然也不例外，英勇的§M游击队员和自由战士们§!团结起来，立志驱逐§o纳粹主义的暴政§!。\n\n不幸的是，由于人数稀少且武器匮乏，义士们的抗争很快便以失败告终，没能够终结§o德国§!在这片广袤土地上的统治。尽管如此，他们的努力并非毫无意义：专员辖区变得动荡不安，§o德国人§!与走狗彼此刀剑相向。在这最后时刻，谁将成为§R命运§!眷顾的宠儿，我们拭目以待。§!"
 RULE_OPTION_MOSKOWIEN_RK_OR_ARMY_OUTCOME_RK: "§o奥季洛·格洛博奇尼克专员§!维持权力"
 RULE_OPTION_MOSKOWIEN_RK_OR_ARMY_OUTCOME_RK_DESC: "§F一桩§R巨型腐败丑闻§!震动全专员辖区，甚至牵连到专员§o奥季洛·格洛博奇尼克§!和副专员§o沃尔夫-海因里希·冯·赫尔多夫伯爵§!。尽管如此，§o纳粹党东方支部§!仍将与以往一样，继续统治这块新生的殖民地，但§o格洛博奇尼克§!和§o赫尔多夫§!之间的关系却……§!"
 RULE_OPTION_MOSKOWIEN_RK_OR_ARMY_OUTCOME_ARMY: "§s施陶芬贝格将军§!夺权"
 RULE_OPTION_MOSKOWIEN_RK_OR_ARMY_OUTCOME_ARMY_DESC: "§F§R腐败丑闻§!成为了压垮骆驼的最后一根稻草：§o格洛博奇尼克§!和§o赫尔多夫§!从莫斯科被召回本土，§o纳粹党东方支部§!因此群龙无首，近乎失能，§M游击队活动§!重新抬头。随后，§o德国§!授权允许了§s克劳斯·冯·施陶芬贝格§!自立为莫斯科专员辖区§s军事统治者§!的行为。§!"
 MOSKOWIEN_GLOB_OR_HELL: "£TNO_game_rule_flag_MCW   专员之争 - 格洛博奇尼克或赫尔多夫"
 RULE_OPTION_MOSKOWIEN_GLOB_OR_HELL_OUTCOME_RANDOM: "默认 - AI随机"
 RULE_OPTION_MOSKOWIEN_GLOB_OR_HELL_OUTCOME_RANDOM_DESC: "§F在§M游击队和权斗§!的风暴冲击之下，莫斯科的§o纳粹党东方支部§!仍然得以存续，收紧了对殖民地的控制。然而，这场危机揭露了领导层的诸多谬误失败，鲨鱼又一次在危险的水域中洄游盘旋。一边是永远狂热的§o奥季洛·格洛博奇尼克§!，决意不择手段，巩固自己的地位；另一边是腐败的§o沃尔夫-海因里希·冯·赫尔多夫伯爵§!，他正步步紧逼，企图将殖民地最高长官的职务纳为己有。可是，若扒开所有意识形态和荣耀的伪装，两名角逐者都只有一个目的：§r放干莫斯科的最后一滴鲜血§!。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_MCW   莫斯科专员辖区 - 文官或军事政府§!中预设§M奥季洛·格洛博奇尼克专员维持权力§!§!"
 RULE_OPTION_MOSKOWIEN_GLOB_OR_HELL_OUTCOME_GLOB: "§o格洛博奇尼克专员§!击败§r赫尔多夫§!"
 RULE_OPTION_MOSKOWIEN_GLOB_OR_HELL_OUTCOME_GLOB_DESC: "§F§o格洛博奇尼克§!会提醒辖区内部的叛徒，§b海因里希·希姆莱§!任命他当专员是有原因的。§o赫尔多夫§!的腐败放荡将暴露无遗。如今，在曾经权力消退的地方，§o格洛博奇尼克§!的地位再次稳如泰山，他不会放任自己的王国再度衰败。§!"
 RULE_OPTION_MOSKOWIEN_GLOB_OR_HELL_OUTCOME_HELL: "§r赫尔多夫§!篡夺§o格洛博奇尼克§!的权力"
 RULE_OPTION_MOSKOWIEN_GLOB_OR_HELL_OUTCOME_HELL_DESC: "§F伯爵的腐败之网已经织好，他将利用敌人手下的官僚机构来对付敌人，从副专员升任莫斯科辖区专员。§o赫尔多夫§!将扫清殖民地勉强维持的职能机构，使其回归到更……适当的……§o民族社会主义§!形式。§!"
 MOSKOWIEN_OKT_OR_NOT: "£TNO_game_rule_flag_MCW   戒严后续 - 奥克坦或舒伦堡"
 RULE_OPTION_MOSKOWIEN_OKT_OR_NOT_OUTCOME_RANDOM: "默认 - AI随机"
 RULE_OPTION_MOSKOWIEN_OKT_OR_NOT_OUTCOME_RANDOM_DESC: "§F§o纳粹党东方支部§!崩溃后，专员辖区§s军队§!采取了“临时措施”以稳定殖民地。然而，他们的成功并不稳固，暴力和管理不善导致专员辖区不堪一击；空气中弥漫着血腥的味道，莫斯科维恩的§j合作者§!如同狂热的鲨鱼，企图从殖民地的战利品中分得一杯羹。无论谁最终赢得胜利，§o德国§!在俄罗斯的统治都将会彻底改变。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_MCW   莫斯科专员辖区 - 文官或军事政府§!中预设§M施陶芬贝格将军夺权§!§!"
 RULE_OPTION_MOSKOWIEN_OKT_OR_NOT_OUTCOME_OKT: "§j奥克坦总统§!"
 RULE_OPTION_MOSKOWIEN_OKT_OR_NOT_OUTCOME_OKT_DESC: "§F忍辱负重数十载，§j米哈伊尔·奥克坦§!终于等来翻盘契机。趁§s国防军§!对莫斯科维恩掌控松懈之时，这位权谋家偕合作者党羽迅速填补权力真空，将自己塑造成殖民地唯一的中流砥柱。面对既成事实，德国只得承认其自治地位，一个由§j莫斯科议会§!主导、§j奥克坦§!执掌大权的新保护国就此诞生。德国的东疆，即将见证这位强人书写的历史新章。§!"
 RULE_OPTION_MOSKOWIEN_OKT_OR_NOT_OUTCOME_NOT: "§s舒伦堡军管区长官§!"
 RULE_OPTION_MOSKOWIEN_OKT_OR_NOT_OUTCOME_NOT_DESC: "§F§s国防军§!成功稳定了专员辖区的局势，§o纳粹党东方支部§!的影响力逐渐消退。尽管§s施陶芬贝格§!时期的军管措施大多已经废止，但§s军方§!在莫斯科维恩的铁腕统治仍将延续，§s弗里茨-迪特洛夫·冯·德·舒伦堡伯爵§!将继续担任军管区长官。§!"
 RULE_GROUP_TNO_RULES_DEEP_FREEZE: "£TNO_game_rule_flag_AAG  £TNO_game_rule_flag_AAO  £GFX_TNO_game_rule_flag_AAA  £GFX_TNO_game_rule_flag_AAC   国家路线 - 南极洲"
 AAG_ASK_SUPPLIES_CHOICE: "£TNO_game_rule_flag_AAG   请求补给援助"
 RULE_OPTION_AAG_ASK_SUPPLIES_CHOICE_RANDOM: "默认 - AI随机"
 RULE_OPTION_AAG_ASK_SUPPLIES_CHOICE_RANDOM_DESC: "§F德国陷入内战，新施瓦本正为生存而挣扎。若是他们补给库存危急，就可以向东非专员辖区及非洲之盾、阿根廷南极属地或OFN南极洲事务局请求补给物资帮助。这个选项将决定新施瓦本首先向哪一方发出请求，如果第一次请求被拒，新施瓦本将向其他可能势力请求援助。§!"
 RULE_OPTION_AAG_ASK_SUPPLIES_CHOICE_ARGENTINA: "£TNO_game_rule_flag_AAA   阿根廷"
 RULE_OPTION_AAG_ASK_SUPPLIES_CHOICE_ARGENTINA_DESC: "§F新施瓦本将向阿根廷南极属地请求补给。阿方将总是允诺请求，并发送25补给。§!"
 RULE_OPTION_AAG_ASK_SUPPLIES_CHOICE_OFN: "£TNO_game_rule_flag_AAO   自由国家组织"
 RULE_OPTION_AAG_ASK_SUPPLIES_CHOICE_OFN_DESC: "§F新施瓦本将向OFN南极洲事务局请求补给。OFN可以发送50补给。§!"
 RULE_OPTION_AAG_ASK_SUPPLIES_CHOICE_SCHILD: "£TNO_game_rule_flag_GRO   非洲之盾"
 RULE_OPTION_AAG_ASK_SUPPLIES_CHOICE_SCHILD_DESC: "§F新施瓦本将向东非专员辖区及非洲之盾请求补给。非洲之盾可以发送20补给。§!"
