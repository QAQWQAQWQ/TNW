 RULE_OPTION_USA_LEADER_ROUTE_1972_RANDOM_DESC: "§F1972年的选举发生在世界历史的分水岭：一场前所未有的灾难——石油危机，对世界稳定带来了灾难性的破坏。如今世界大部分地区陷入混乱，作为新秩序中举足轻重的一极，美国的选择将对未来产生深远的影响。在新秩序的七十年代到来之时，§R上个十年中所犯的错误可能会产生严重的后果§!。§!"
