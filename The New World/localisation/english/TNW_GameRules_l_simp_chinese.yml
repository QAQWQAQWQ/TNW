 RULE_OPTION_SECOND_SAF_SOUTH_AFRICAN_WAR_OUTCOME_RANDOM_DESC: "§F自§q德国§!在南非战争取得胜利以来，§j南非§!就一直处于不明不白的状态。由于该国现在被北方的§o汉斯·许蒂希§!他那怪物般的国家控制，因此关于该国状况的报道充其量也只能算零零碎碎。然而，经过多年的沉默，§J阿非利卡人民邦§!似乎时日无多，§o汉斯·许蒂希§!要求其并入他那怪物般的国家。§J马格努斯·马兰§!将军将颠覆§J布尔§!政府，并切断与德国人的所有联系。\n\n此后， §J布尔§!国家将陷入第二次内战，旧政府的效忠者将在南方揭竿而起，而§q德国军队§!将南下入侵该国，以完成§o许蒂希§!的指示。尽管如此，§J马兰§!通过电视讲话宣布，他会击败叛军和§q德国§!侵略者。\n\n§R要求：§!\n§Y第二次南非战争已经爆发§!"
 RULE_OPTION_SECOND_SAF_SOUTH_AFRICAN_WAR_OUTCOME_SAF: "£TNO_game_rule_flag_SAF   §j南非§!§G胜利§!"
 RULE_OPTION_SECOND_SAF_SOUTH_AFRICAN_WAR_OUTCOME_SAF_DESC: "§F与第一次南非战争的结局形成鲜明对比，§L米尔德§!的叛军将赢得战争的§G胜利§!。这位前教师将与已经解散的§B联合党§!一众政治家联手，在他之前帮助创建的§J阿非利卡人民邦§!的废墟上重建§j南非§!。§!"
 RULE_OPTION_SECOND_SAF_SOUTH_AFRICAN_WAR_OUTCOME_SLF: "£TNO_game_rule_flag_SLF  £TNO_game_rule_flag_ZUL  £TNO_game_rule_flag_CDL   §g南非同盟§!§G胜利§!"
 RULE_OPTION_SECOND_SAF_SOUTH_AFRICAN_WAR_OUTCOME_SLF_DESC: "§F§j南非§!在§o纳粹§!的猛攻下§R崩溃§!，新成立的§J布尔共和国§!的白人主子与他们§R深恶痛绝§!的§K土著§!之间和解的希望也随之破灭。但§q黑暗§!之中，总有一线§Y光明§!；尽管§s康斯坦德·维尔容§!将军具有§i保守§!的§L民族主义§!倾向，但他坚信是§i德·赫拉夫§!拒绝与§V非国大§!合作才导致了§j南非§!的灭亡，预示着人们对§J布尔共和国§!向§K土著§!施暴日益厌愤。现在，§s维尔容§!将军率领年轻的军官团，领导着§G改革后§!的§s联邦国防军§!，他将不遗余力确保前任的暴行不再重演，同时他也坚信§K非洲人§!和§J阿非利卡人§!可以§G和平共处§!。许多人猜测§s维尔容§!有意将共和国§G改革§!为联邦制的§j南非§!国家；然而，实际上，将军打算建立一个§P公正平等的社会§!，保护§j南非§!人民免受暴君暴徒的伤害，时间将会证明他对平等民主的承诺是否会付诸实践。§!"
 RULE_OPTION_SECOND_SAF_SOUTH_AFRICAN_WAR_OUTCOME_BOR: "£TNO_game_rule_flag_BOR   §J阿非利卡人民邦§!§G胜利§!"
 RULE_OPTION_SECOND_SAF_SOUTH_AFRICAN_WAR_OUTCOME_BOR_DESC: ""
 RULE_OPTION_SECOND_SAF_SOUTH_AFRICAN_WAR_OUTCOME_SFG: "£TNO_game_rule_flag_SFG   §q南非最高统帅部§!§G胜利§!"
 RULE_OPTION_SECOND_SAF_SOUTH_AFRICAN_WAR_OUTCOME_SFG_DESC: "§F§J阿非利卡人民邦§!崩溃后，§o许蒂希§!决定从§E党卫队§!中派遣一支由§o卡尔·赫梅莱夫斯基§!领导的小型远征队，他们的任务是尽量带回§q大阿非利加德意志邦的官员和资源§!，同时§x充分榨取当地的资源§!。虽说赫梅莱夫斯基除了§E带了一个师§!和§x凶狠恶毒§!之外一无是处，但令§o许蒂希§!意外的是，§o赫梅莱夫斯基§!不仅成功带回了人员物资，还保住了整个南非。只要§o许蒂希§!不倒，并继续支持§o赫梅莱夫斯基§!，那么§j南非§!的未来将充满§e绝望§!。\n\n§R要求：§!\n§Y大阿非利加德意志邦保住了戈登尼亚§!§!"
 ILG_FATE_OF_ITALIAN_ALGERIA: "£TNO_game_rule_flag_ILG_italy_vic_despotism   意属阿尔及利亚的命运"
 RULE_OPTION_ILG_FATE_OF_ITALIAN_ALGERIA_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_ILG_FATE_OF_ITALIAN_ALGERIA_PATH_RANDOM_DESC: "§F§g阿尔及利亚战争§!宣告结束，§n意大利帝国§!战胜了从前的盟友，取得决定性的胜利。接管了这个幅员辽阔的国家之后，§n意大利§!立即着手打造新的行政体系。战争方才结束，就有了几个崭露头角的人物可供选择。§n意大利§!将在§s赛义德·布阿拉姆§!和§i民族解放阵线§!的§i费尔哈特·阿巴斯§!之间做出抉择，前者认为§g阿尔及利亚§!应当在殖民统治之下，而后者希望在§n意大利§!的势力范围内建立独立的§g阿尔及利亚§!国家。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_SLG  £TNO_game_rule_flag_ILG_italy_vic   阿尔及利亚战争中预设§M£TNO_game_rule_flag_ITA  £TNO_game_rule_flag_ILG_italy_vic   阿尔及利亚军管领地§!§!"
 RULE_OPTION_ILG_FATE_OF_ITALIAN_ALGERIA_PATH_UNION: "£TNO_game_rule_flag_ILG_italy_vic   §s联盟§!"
 RULE_OPTION_ILG_FATE_OF_ITALIAN_ALGERIA_PATH_UNION_DESC: "§F随着§n意大利§!赢得阿尔及利亚战争的胜利，§y阿尔及利亚§!的命运现在完全握于§n罗马§!手中。经过反复辩论和思考，帝国决定成立一个§s联盟§!。虽然它名义上是一个独立自主的国家，但事实显而易见，§s联盟§!只是个高级殖民地，它对§K帝国§!的规划依然言听计从。阿尔及利亚联盟将成为§s殖民政府§!。§!"
 RULE_OPTION_ILG_FATE_OF_ITALIAN_ALGERIA_PATH_REPUBLIC: "£TNO_game_rule_flag_ILG   §i共和国§!"
 RULE_OPTION_ILG_FATE_OF_ITALIAN_ALGERIA_PATH_REPUBLIC_DESC: "§F随着§n意大利§!赢得阿尔及利亚战争的胜利，§y阿尔及利亚§!的命运现在完全握于§n罗马§!手中。经过反复辩论和思考，帝国决定成立一个§M共和国§!。虽然这个国家可能仍然会亲善§K意大利§!的利益，但不可否认的是，新的§y阿尔及利亚§!是一个有自己的政府、自己的理想、和自己的命运的国家。阿尔及利亚共和国将走上§i家长制保守主义§!道路。§!"
