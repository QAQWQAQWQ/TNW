 SVR_IDEOLOGY_ROUTE:0 "£TNO_game_rule_flag_SVR   斯维尔德洛夫斯克 - 选举"
 RULE_OPTION_SVR_IDEOLOGY_ROUTE_RANDOM: "默认 - AI随机"
 RULE_OPTION_SVR_IDEOLOGY_ROUTE_RANDOM_DESC: "§F康斯坦丁·罗科索夫斯基领导的红军军政府统治着斯维尔德洛夫斯克军区，他先前由于对卡冈诺维奇专制统治的厌恶而离开了秋明。斯维尔德洛夫斯克仍然使用苏联时期的种种符号，但让斯维尔德洛夫斯克的人民担忧的是，她的领导人已经放弃了社会主义原则，建立了一个传统意义上的军政府。许多人呼吁解散军政府，恢复普选制。现在罗科索夫斯基行将就木，而斯维尔德洛夫斯克前途未卜。§!"
 RULE_OPTION_SVR_IDEOLOGY_ROUTE_AUTHDEM: "£TNO_game_rule_flag_SVR_Batov   巴托夫维持军政府"
 RULE_OPTION_SVR_IDEOLOGY_ROUTE_AUTHDEM_DESC: "§F罗科索夫斯基寿终正寝后，帕维尔·巴托夫继任。巴托夫认为人民尚未为民主做好准备，贸然推行民主可能会削弱俄罗斯母亲的力量，不利于日后对德国人的复仇。他将忽略重建民主的呼声，延续斯维尔德洛夫斯克的军政府。巴托夫的决定将使斯维尔德洛夫斯克成为人们公认的§s军政府§!国家。§!"
 RULE_OPTION_SVR_IDEOLOGY_ROUTE_SOCCON: "£TNO_game_rule_flag_SVR_Yeltsin   巴托夫交权予叶利钦"
 RULE_OPTION_SVR_IDEOLOGY_ROUTE_SOCCON_DESC: "§F罗科索夫斯基寿终正寝后，帕维尔·巴托夫继任，巴托夫将屈服于民主派（主要是鲍里斯·叶利钦）的声音，在就军政府的未来举行全民公决之后，叶利钦将取得胜利上台掌权，解除军事独裁、恢复民主选举。他的总统任期将围绕着广泛的经济自由化和休克疗法，让斯维尔德洛夫斯克散发着他§i家长制保守主义§!的价值观。§!"
 OMS_BATOV_INSURGENCY: "£TNO_game_rule_flag_OMS   鄂木斯克 - 巴托夫叛乱"
 RULE_OPTION_OMS_BATOV_INSURGENCY: "默认 - AI随机"
 RULE_OPTION_OMS_BATOV_INSURGENCY_DESC: "§F如今，黑色联盟战胜了西西伯利亚的对手，亚佐夫的政权进入了一段动荡时期。战争英雄、康斯坦丁·罗科索夫斯基的亲密战友帕维尔·巴托夫集结起城乡各地的反鄂木斯克势力残部，进行武装抵抗。德米特里·亚佐夫和黑色联盟必须迅速消灭这个威胁，以免大审判被扼杀在摇篮之中。§!"
 RULE_OPTION_OMS_BATOV_INSURGENCY_STABLE: "叛乱§G遭到粉碎§!"
 RULE_OPTION_OMS_BATOV_INSURGENCY_STABLE_DESC: "§F巴托夫的叛乱将被粉碎。§!"
 RULE_OPTION_OMS_BATOV_INSURGENCY_COLLAPSE: "鄂木斯克§R崩溃§!"
 RULE_OPTION_OMS_BATOV_INSURGENCY_COLLAPSE_DESC: "§F巴托夫的起义军成功暗杀了亚佐夫，鄂木斯克将会崩溃。§!"
 WEST_SIBERIA_UNIFICATION_OUTCOME: "£TNO_game_rule_flag_TYM  £TNO_game_rule_flag_OMS  £TNO_game_rule_flag_SVR   西西伯利亚统一"
 RULE_OPTION_WEST_SIBERIA_UNIFICATION_OUTCOME_RANDOM: "默认 - AI随机"
 RULE_OPTION_WEST_SIBERIA_UNIFICATION_OUTCOME_RANDOM_DESC: "§F\n\n§G选中的一方将获得大量战斗加成，这些加成会在西西伯利亚统一后被移除。§!§!"
 RULE_OPTION_WEST_SIBERIA_UNIFICATION_OUTCOME_TYM_TYUMEN: "£TNO_game_rule_flag_TYM   秋明胜利"
 RULE_OPTION_WEST_SIBERIA_UNIFICATION_OUTCOME_TYM_TYUMEN_DESC: "§F秋明将统一西西伯利亚。§!"
 RULE_OPTION_WEST_SIBERIA_UNIFICATION_OUTCOME_OMS_OMSK: "£TNO_game_rule_flag_OMS   鄂木斯克胜利"
