 WEST_AFRICAN_CRISIS_SCENARIO: "£TNO_game_rule_flag_WOL   £TNO_game_rule_flag_FFR   £TNO_game_rule_flag_CAO   西非危机的可能情况"
 RULE_OPTION_WEST_AFRICAN_CRISIS_SCENARIO_RANDOM: "默认 - AI随机"
 RULE_OPTION_WEST_AFRICAN_CRISIS_SCENARIO_RANDOM_DESC: "§F西非局势已经达到沸点。§m自由法国§!和§K喀麦隆§!一直在争夺对其他国家的影响力，而§B塞内加尔§!也在非洲寻找盟友。战争是§R在所难免§!了，唯一需要确定的是它将如何以及在何时发生。要么是§B加纳§!爆发内战，把§K泛非解放阵线§!和§m法国§!拖入战争，要么是§B塞内加尔§!与§m法国§!联手抵制§V泛非主义§!，要么是§B西非同盟§!、§m法兰西军事同盟§!和§K泛非解放阵线§!之间爆发残酷的三方冲突。总之，有一件事情是肯定的：和平的日子不多了。§!"
 RULE_OPTION_WEST_AFRICAN_CRISIS_SCENARIO_WAA_VS_PALF: "£TNO_game_rule_flag_WOL   £TNO_game_rule_flag_CAO   §B西非同盟§!vs§K泛非解放阵线§!"
 RULE_OPTION_WEST_AFRICAN_CRISIS_SCENARIO_WAA_VS_PALF_DESC: "§F在一些人看来可能会出人意料，但§m法国§!已经与多个非洲国家建立了平等的联盟，其中最有影响力的是§B塞内加尔§!。然而，这并没有阻止§K泛非解放阵线§!宣战的脚步。两种未来等待着西非：是§m法国§!赢得胜利，并为非洲政权之间的合作奠定基础？还是说§K泛非解放阵线§!会把欧洲佬和他们的跟班踹出非洲大陆？§!"
 RULE_OPTION_WEST_AFRICAN_CRISIS_SCENARIO_WAA_VS_FMA_VS_PALF: "£TNO_game_rule_flag_WOL   £TNO_game_rule_flag_FFR   £TNO_game_rule_flag_CAO   §B西非同盟§!vs§m法兰西军事同盟§!vs§K泛非解放阵线§!"
 RULE_OPTION_WEST_AFRICAN_CRISIS_SCENARIO_WAA_VS_FMA_VS_PALF_DESC: "§F在令人震惊的转折中，§m自由法国§!向§B塞内加尔§!宣战，§K泛非解放阵线§!对双方发动突然袭击。现在，西非陷入了一场§R残酷的斗争§!，各方都在争夺战争的主导权。§K泛非解放阵线§!能赢下战争，把帝国主义者赶出西非吗？还是§m法国§!会夺取胜利，更加接近光复本土的理想？还是说最终的胜利者是§B西非同盟§!，为非洲创造一个新的未来？§!"
 RULE_OPTION_WEST_AFRICAN_CRISIS_SCENARIO_FMA_VS_PALF: "£TNO_game_rule_flag_FFR  £TNO_game_rule_flag_CAO   §m法兰西军事同盟§!vs§K泛非解放阵线§!"
 RULE_OPTION_WEST_AFRICAN_CRISIS_SCENARIO_FMA_VS_PALF_DESC: "§F西非一切安好的幻象终归破灭。对§R加纳内战§!的干预导致§K泛非解放阵线§!和§m法兰西军事同盟§!兵戎相见。这场冲突肯定无比漫长血腥，而结果只有两种可能。§m法国§!会取得胜利，距离解放§Q祖国§!更进一步？还是§K泛非解放阵线§!会取得胜利，让崭新的§V赤色黎明§!降临西非？§!"
 GULF_OF_GUINEA: "£TNO_game_rule_flag_USA  £TNO_game_rule_flag_JAP  £TNO_game_rule_flag_CAO   几内亚湾战役"
 RULE_OPTION_GULF_OF_GUINEA_RANDOM: "默认 - AI随机"
 RULE_OPTION_GULF_OF_GUINEA_RANDOM_DESC: "§F喀麦隆泛非军队向西进军，西非战争的局面变得更加严峻——因此，美国人决定破坏日本在几内亚湾的补给线，中断关键资源的输送，减轻法国盟友的压力。这一事件的结果也将决定美国是否直接介入战争，因为一旦他们成功，这场冲突就将升级到前所未有的水平。§!"
 RULE_OPTION_GULF_OF_GUINEA_AMERICA: "§M美国§!获胜"
 RULE_OPTION_GULF_OF_GUINEA_AMERICA_DESC: "§F§M美国人§!将成功实现他们封锁几内亚湾的目标，这导致§V日本人§!援助其§V泛非主义§!盟友变得极为困难，冲突亦随之急剧升级为一场彻底的§R代理人战争§!。§!"
 RULE_OPTION_GULF_OF_GUINEA_JAPAN: "§V日本§!获胜"
 RULE_OPTION_GULF_OF_GUINEA_JAPAN_DESC: "§F§V日本§!将成功保卫几内亚湾免受美军的攻击，从而能够全力支持他们的§V泛非主义§!盟友，同时不必费心向西非派遣士兵……§R除非战争的任何一方将冲突升级。§!§!"
 RULE_OPTION_GULF_OF_GUINEA_NO_INCIDENT: "§Y陷入僵局§!"
 RULE_OPTION_GULF_OF_GUINEA_NO_INCIDENT_DESC: "§F经过几周的紧张局势，围绕美日两国援助的自由法国流亡者和泛非喀麦隆之间的西非冲突，两大强权发生了激烈的碰撞。双方都试图破坏对方的补给线，但混战还是以僵局告终，共荣圈和OFN各退一步。冲突不会升级，大国也无法向卷入西非冲突的国家提供额外支持或志愿军。§!"
