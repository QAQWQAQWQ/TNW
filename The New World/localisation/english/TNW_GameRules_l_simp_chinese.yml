 RULE_OPTION_SUD_CIVIL_WAR_OUTCOME_RANDOM_DESC: "§F苏丹之地曾经是埃及王国的一部分。石油危机爆发后，伴随着§n意大利§!-埃及权威的崩溃，人们再次重拾被遗忘的马赫迪军队的叛逆精神，爆发了苏丹内战。将军、共和派和民主派为两尼罗河之宝打得头破血流，谁将成为黑土地的下一位主人，还尚未可知。\n\n§G被选中的一方将内战期间获得大量战斗加成，直到获胜。§!\n\n§R要求：§!\n§Y石油危机已经开始§!§!"
