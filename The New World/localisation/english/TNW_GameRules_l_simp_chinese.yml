 RULE_OPTION_PUERTO_PLATA_INVANSION_OUTCOME_RAM_VICTORY: "£TNO_game_rule_flag_DOM   §Y停火失败§! - §J“拉姆菲斯”·特鲁希略§!"
 RULE_OPTION_PUERTO_PLATA_INVANSION_OUTCOME_RAM_VICTORY_DESC: "§F§s布博·罗曼§!领导的军民联合政府在§M美§!§K墨§!情报机构的支持下推翻了特鲁希略政权，但由于其未能与§x多米尼加革命阵线§!进行谈判，失去了人民和军队的支持，最终被§J拉姆菲斯·特鲁希略§!发动政变推翻。§x多米尼加革命阵线§!指责特鲁希略家族重掌权力，内战将再次爆发，但§O多米尼加政府§!将会镇压这场叛乱。§!"
 RULE_OPTION_PUERTO_PLATA_INVANSION_OUTCOME_DOM_AGREEMENT: "£TNO_game_rule_flag_DOM   §G停火成功§! - §G基斯克亚协议§!"
 RULE_OPTION_PUERTO_PLATA_INVANSION_OUTCOME_DOM_AGREEMENT_DESC: "§F在§M美§!§K墨§!情报机构的支持下，§s布博·罗曼§!领导的军民联合政府成功推翻了§J特鲁希略§!政权，并与§x多米尼加革命阵线§!达成正式协议，宣告内战和平结束。在美洲国家组织的监督下，不日将举行选举，§K墨西哥§!、§E古巴§!、§M美国§!与其他拉美民主国家将为全民阵线抗争§J法西斯主义§!的胜利而欢庆。§!"
 RULE_OPTION_ANDEAN_PACT_CREATION_NO: "£TNO_game_rule_flag_ADN   安第斯协定失败"
 RULE_OPTION_ANDEAN_PACT_CREATION_NO_DESC: "§F秘鲁和智利这对老对手试图在未来改善关系的努力将以失败告终。促进两国和平、共同幸福以及本地区经济一体化和发展的机会将付诸东流。\n\n§R要求：§!\n£TNO_game_rule_flag_PRU   §Y秘鲁 - 1963年大选§!中预设§M奥德里亚胜选§!\n§x或§!\n£TNO_game_rule_flag_CHL   §Y智利 - 菲利皮的任期§!中预设§M危机加剧§!\n§x或§!\n£TNO_game_rule_flag_CHL   §Y智利 - 1964年大选§!中预设§M雷蒂希当选§!§!"
