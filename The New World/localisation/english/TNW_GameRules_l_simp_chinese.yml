 ITA_70_ELECTION: "£TNO_game_rule_flag_ITA   民主意大利 - 1970年大选"
 RULE_OPTION_ITA_70_ELECTION_RANDOM: "默认 - AI随机"
 RULE_OPTION_ITA_70_ELECTION_RANDOM_DESC: "§F已故领袖齐亚诺推动的著名帝国民主化以来，伟大的民主机器第二次轰鸣作响，§n意大利§!人民再次列队走向投票站，用自己的意愿塑造帝国政府。极右翼政党国民阵线、基督教民主党和左翼的民主阵线都在各自争夺民众支持以组建政府，§n意大利§!这一年幼民主国家的命运仍未确定。\n\n§R要求：§!\n£TNO_game_rule_flag_ITA   §Y意大利 - 法西斯主义的遗产§!中预设£TNO_game_rule_flag_ITA   §Y§L齐亚诺§!推动帝国自由化§!"
 RULE_OPTION_ITA_70_ELECTION_DC: "§M基督教民主党§!§G当选§!"
 RULE_OPTION_ITA_70_ELECTION_DC_DESC: "§F已故领袖齐亚诺推动的著名帝国民主化以来，伟大的民主机器第二次轰鸣作响，§n意大利§!人民在最新一次大选中列队走向投票站，而他们意志的显现正是基督教民主主义“基督教民主党”的胜利。宗教道德将再次引领§n意大利§!走向未来。§!"
 RULE_OPTION_ITA_70_ELECTION_FD: "§P民主阵线§!§G当选§!"
 RULE_OPTION_ITA_70_ELECTION_FD_DESC: "§F已故领袖齐亚诺推动的著名帝国民主化以来，伟大的民主机器第二次轰鸣作响，§n意大利§!人民在最新一次大选中列队走向投票站，而他们意志的显现正是左翼联盟“民主阵线”的胜利。平等主义、社会正义与民主社会主义将引领§n意大利§!走向未来。§!"
 RULE_OPTION_ITA_70_ELECTION_BN: "§L国民联盟§!§G当选§!"
 RULE_OPTION_ITA_70_ELECTION_BN_DESC: "§F误入歧途的领袖齐亚诺把帝国可悲地民主化以来，伟大的民主机器也许是最后一次轰鸣起来，§n意大利§!人民在最新一次大选中列队走向投票站，纠正过往的错误。极右翼联盟“国民阵线”取得了辉煌的胜利，伟大的意大利民族精神得以彰显。保守主义、民族主义将再次引领§n意大利§!走向荣耀。§!"
 SCORZA_FASH_PATH: "£TNO_game_rule_flag_ITA   法西斯意大利 - 法西斯主义的未来"
 RULE_OPTION_SCORZA_FASH_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_SCORZA_FASH_PATH_RANDOM_DESC: "自由主义者、社会主义者、共产主义者和其他叛徒组成的煽动性堕落阴谋集团被齐亚诺推向权力，所幸他们最终功败垂成。盲目叛徒的可怖进军被击溃，法西斯主义的精神得以维系。然而，第五纵队所刻下的最初伤痕仍未愈合，国家法西斯党依然破败，宛如昔日辉煌过往的遗迹。两大派系：保守派、改革派割裂了伟大的党。斯科尔扎如果想要愈合§n意大利§!的伤痕，就必须让一大派系战胜另一大派系。唯有领袖才能抉择究竟哪派才会是最后的胜利者。\n\n§R要求：§!\n§n意大利§!§Y维持法西斯主义§!"
 RULE_OPTION_SCORZA_FASH_PATH_REFORM: "£GFX_good_boy_point §G改革派§!占优"
 RULE_OPTION_SCORZA_FASH_PATH_REFORM_DESC: "§F多年以来的思考、抉择、审议与统治告一段落。领袖终于认清了法西斯主义的新方向，那就是革命的道路。没有改革，法西斯主义就会僵死沦丧。进步的光环与1919年先见者的智慧将使法西斯精神迎来新生。就算是以最不同寻常的方式，变革也得以从此降临§n意大利§!。§J圣墓主义§!将引领§n意大利§!的未来。然而，如果他§s失败§!了……§!"
 RULE_OPTION_SCORZA_FASH_PATH_CONSERVATIVE: "£GFX_bad_boy_point §R保守派§!占优"
 RULE_OPTION_SCORZA_FASH_PATH_CONSERVATIVE_DESC: "§F§n意大利§!人民无需绝望，明智的领袖斯科尔扎在多年的思考、抉择、审议和统治后已经认识到冒险改革只是徒劳的修正主义。法西斯主义必须保留其最真实的本质——伟大墨索里尼的正统与光荣、属于骄傲意大利人民的光辉胜利。有些坏分子背后嚼舌，叫嚣墨索里尼是什么腐朽制度的顽固遗留？照他们的话看来，顽固只有可能是一种美德。法西斯主义“顽固”地扎根在§n意大利§!，无暇的精神从未遭受一丝一毫的玷污。恐怕正是这一点叫布尔什维克和叛徒捶胸顿足吧。§!"
