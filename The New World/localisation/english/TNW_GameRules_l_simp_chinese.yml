 RULE_GROUP_TNO_RULES_RUSSIA_FAR_EAST: "£TNO_game_rule_flag_IRK  £TNO_game_rule_flag_BRY_socialist  £TNO_game_rule_flag_MAG  £TNO_game_rule_flag_AMR  £TNO_game_rule_flag_CHT  £TNO_game_rule_flag_OMO_Harmonious_State_communist   国家路线 - 俄罗斯 - 远东"
 IRK_LEADER_ROUTE: "£TNO_game_rule_flag_IRK   伊尔库茨克 - 党权与国家之争"
 RULE_OPTION_IRK_LEADER_ROUTE_RANDOM: "默认 - AI随机"
 RULE_OPTION_IRK_LEADER_ROUTE_RANDOM_DESC: "§F苏联主席团在伟大卫国战争期间迁往远东，历经屡次少数民族起义，哈尔滨白俄三巨头的入侵以及布里亚特兵变后，现在已经今非昔比。苏维埃政府将坚持下去并努力重建秩序，但一连串的失败让伊尔库茨克政府内部一些人开始质疑亨里希·亚戈达的领导能力和治国理念，并试图寻找一个更好的共产主义道路。\n\n§R要求：§!\n§Y伊尔库茨克统一远东§!§!"
 RULE_OPTION_IRK_LEADER_ROUTE_AUTHSOC_YAGODA: "£TNO_game_rule_flag_IRK   国家派仍居高位"
 RULE_OPTION_IRK_LEADER_ROUTE_AUTHSOC_YAGODA_DESC: "§F以亨里希·亚戈达为首的国家派在权力斗争中获胜。亚戈达认识到党应服从于国家意志。现在，在党内反对声音已被清洗之后，亚戈达终于可以在伊尔库茨克乃至整个俄罗斯努力实现他此前长期被压制的愿景，大幅扩大对他的个人崇拜，并通过经济特区将自由市场资本主义重新引入联盟。§!"
 RULE_OPTION_IRK_LEADER_ROUTE_AUTHSOC_BESSONOV: "£TNO_game_rule_flag_IRK   党权派夺过领导权"
 RULE_OPTION_IRK_LEADER_ROUTE_AUTHSOC_BESSONOV_DESC: "§F以谢尔盖·别索诺夫为首的党权派在权力斗争中取得胜利，夺取了以亚戈达为首的国家派的权力。别索诺夫认识到国家应服从于党的意志。他将宣布亚戈达背叛了社会主义核心价值观，并将拆除古拉格，废止个人崇拜，借此来废除苏联先前的许多高压政策。他还声明社会主义必须为人民服务，而不是为安全体制服务。§!"
 BRY_IDEOLOGY_ROUTE: "£TNO_game_rule_flag_BRY_socialist   布里亚特 - 理想主义之路"
 RULE_OPTION_BRY_IDEOLOGY_ROUTE_RANDOM: "默认 - AI随机"
 RULE_OPTION_BRY_IDEOLOGY_ROUTE_RANDOM_DESC: "§F布里亚特的革命者分裂为两派，一派是秉承理想主义、天真的萨布林派，另一派是经验丰富而务实的布哈林派。瓦列里·萨布林还没有对任何一方做出承诺，但无论他们中的哪一方在共产党中占据上风，都将在接下来几年中塑造布里亚特的未来。\n\n§R要求：§!\n§Y布里亚特统一远东§!§!"
 RULE_OPTION_BRY_IDEOLOGY_ROUTE_LIBSOC: "£TNO_game_rule_flag_BRY_socialist   萨布林派胜出"
 RULE_OPTION_BRY_IDEOLOGY_ROUTE_LIBSOC_DESC: "§F尽管冷酷无情的远东充满艰难险阻，但共产党中进步的萨布林派终将夺取胜利，他们追随萨布林的理念，跨步迈向理想成真的新红十月：俄罗斯将成为世界上理想主义和仁爱并包的最后堡垒。§!"
 RULE_OPTION_BRY_IDEOLOGY_ROUTE_AUTHSOC: "£TNO_game_rule_flag_BRY_socialist   布哈林派胜出"
 RULE_OPTION_BRY_IDEOLOGY_ROUTE_AUTHSOC_DESC: "§F尽管萨布林心存善念、处事宽容，但严酷的现实使他别无选择，只能为了生存而放弃他心中的理想，这将使党内更倾向保守的布哈林主义，布里亚特将继承列宁红色恐怖的治国方式。§!"
 BRY_FOREIGN_POLICY: "£TNO_game_rule_flag_BRY_regional_unifier   布里亚特 - 对外关系"
 RULE_OPTION_BRY_FOREIGN_POLICY_RANDOM: "默认 - AI随机"
 RULE_OPTION_BRY_FOREIGN_POLICY_RANDOM_DESC: "§F当布里亚特将目光转向世界其他地区时，他发现这颗星球上的共产主义势力已经被法西斯主义和纳粹残酷地粉碎和根除了，这个地缘困境必须解决。\n\n§R要求：§!\n§Y布里亚特统一远东§!§!"
 RULE_OPTION_BRY_FOREIGN_POLICY_OFN: "£TNO_game_rule_flag_BRY_regional_unifier  £TNO_game_rule_flag_USA   与OFN的纽带"
 RULE_OPTION_BRY_FOREIGN_POLICY_OFN_DESC: "§F布里亚特将试图与OFN建立密切的联系，共同合作以打击法西斯威胁。虽然这比建立自己阵营更容易成功，但与美国合作可能会让布里亚特的社会主义理想屈服于美国的经济霸权。§!"
 RULE_OPTION_BRY_FOREIGN_POLICY_SOCINTERN: "£TNO_game_rule_flag_BRY_regional_unifier   共产国际"
 RULE_OPTION_BRY_FOREIGN_POLICY_SOCINTERN_DESC: "§F布里亚特将会尝试建立社会主义国际。虽然这有助于确保苏联免受美国的经济操纵，但如果愿意加入的共产主义国家太少，这将适得其反。§!"
 OMO_2022_ROUTE: "£TNO_game_rule_flag_OMO_Harmonious_State_communist   小马隆"
 RULE_OPTION_OMO_2022_ROUTE_RANDOM: "默认 - AI随机"
 RULE_OPTION_OMO_2022_ROUTE_RANDOM_DESC: "§F魔法小马建立的国家正处于十字路口——布克哈林将继续掌权？抑或是被激进的小马至上主义者或人类至上主义者推翻？\n\n§R要求：§!\n§YProject Ferus已启用§!§!"
 RULE_OPTION_OMO_2022_ROUTE_BUCKHARIN: "布克哈林"
 RULE_OPTION_OMO_2022_ROUTE_BUCKHARIN_DESC: "§F布克哈林将稳住局势，继续掌权。§!"
 RULE_OPTION_OMO_2022_ROUTE_PONY: "激进小马政变"
 RULE_OPTION_OMO_2022_ROUTE_PONY_DESC: "§F激进的小马至上主义者将推翻布克哈林，为小马隆的人类带来恐怖统治。§!"
 RULE_OPTION_OMO_2022_ROUTE_MEN: "亚历山大·缅政变"
 RULE_OPTION_OMO_2022_ROUTE_MEN_DESC: "§F亚历山大·缅理应对周遭事态感到愤怒，他成功推翻了布克哈林，试图给这个充满小马的混乱新世界带来秩序。§!"
 CHT_IDEOLOGY_ROUTE: "£TNO_game_rule_flag_CHT   赤塔 - 沙皇或白军"
 RULE_OPTION_CHT_IDEOLOGY_ROUTE_RANDOM: "默认 - AI随机"
 RULE_OPTION_CHT_IDEOLOGY_ROUTE_RANDOM_DESC: "§F苏联崩溃，白军与俄罗斯法西斯党在反对苏联残余势力的统一战线下入侵远东。然而，他们的联盟很快就宣告瓦解，鲍里斯·舍普诺夫领导的白军运动在赤塔陷入孤立，四面皆敌。米哈伊尔二世，名义上是赤塔的沙皇，实际上是受这白军主持的军政府操纵，米哈伊尔绑来只得做了傀儡。\n\n§R要求：§!\n§Y赤塔统一了远东§!§!"
 RULE_OPTION_CHT_IDEOLOGY_ROUTE_AUTHDEM: "£TNO_game_rule_flag_CHT   米哈伊尔罢免白军"
 RULE_OPTION_CHT_IDEOLOGY_ROUTE_AUTHDEM_DESC: "§F在与一位同情他困境的白军将领取得联系后，米哈伊尔在政变中成功推翻舍普诺夫，挣脱白军的军事独裁，成为赤塔真正的统治者。米哈伊尔将引入选举，建立民选政府，并自愿限制自己的权力，确保俄罗斯成为君主立宪制国家。赤塔将暂时成为§L临时政府§!。§!"
 RULE_OPTION_CHT_IDEOLOGY_ROUTE_DESPOTISM: "£TNO_game_rule_flag_CHT   白军维持权力"
 RULE_OPTION_CHT_IDEOLOGY_ROUTE_DESPOTISM_DESC: "§F尽管米哈伊尔二世拼尽了全力，却还是无法打破军队对他的禁锢。出于对政变的愤怒，舍普诺夫把米哈伊尔赶回澳大利亚，并请来更温驯的尼基塔一世作为新的傀儡沙皇避免再出现类似的情况，赤塔将永远处于白军严密的控制之下。赤塔将成为§q反动民族主义§!国家。§!"
 MAG_IDEOLOGY_ROUTE: "£TNO_game_rule_flag_MAG   马加丹 - 独裁者、改革家或雇佣兵"
 RULE_OPTION_MAG_IDEOLOGY_ROUTE_RANDOM: "默认 - AI随机"
 RULE_OPTION_MAG_IDEOLOGY_ROUTE_RANDOM_DESC: "§F马加丹自由邦诞生于务实的米哈伊尔·马特科夫斯基领导俄罗斯法西斯党成员脱离阿穆尔的过程之中，他们对康斯坦丁·罗扎耶夫斯基十分不满，因为后者过于极端，无法正常共事。尽管如此，马加丹内部仍存有意识形态分歧：虽说马特科夫斯基的实用主义无疑优于罗扎耶夫斯基的荒唐愚蠢，但法西斯党内部的许多成员想要进一步改革，甚至是彻底抛弃法西斯主义。\n\n§R要求：§!\n§Y马加丹统一了远东§!§!"
 RULE_OPTION_MAG_IDEOLOGY_ROUTE_DESPOTISM: "£TNO_game_rule_flag_MAG   马特科夫斯基维持权力"
 RULE_OPTION_MAG_IDEOLOGY_ROUTE_DESPOTISM_DESC: "§F马加丹扩张至地区阶段，马特科夫斯基的工人派最终在与改革派的权力斗争中取得胜利。工人派维护现状，主张在一党制国家的保护下进行缓慢、温和的政治改革，工人派将领导马加丹从§J法团主义§!走向§s文官独裁§!。§!"
 RULE_OPTION_MAG_IDEOLOGY_ROUTE_AUTHDEM_PETLIN: "£TNO_game_rule_flag_MAG   佩特林胜利"
 RULE_OPTION_MAG_IDEOLOGY_ROUTE_AUTHDEM_PETLIN_DESC: "§F马加丹扩张至地区阶段，佩特林的改革派最终在与工人派的权力斗争中取得胜利。改革派反对一党专政，主张在俄罗斯准备好实行民主之时引入真正的民主制度，改革派将领导马加丹走向§L民族保守主义§!。§!"
 RULE_OPTION_MAG_IDEOLOGY_ROUTE_AUTHDEM_WERBELL: "£TNO_game_rule_flag_MAG_merc   韦贝尔政变"
 RULE_OPTION_MAG_IDEOLOGY_ROUTE_AUTHDEM_WERBELL_DESC: "§F在马加丹的故事早期，为了解决人力短缺问题，安纳斯塔西·旺夏茨基会雇佣许多国际雇佣兵，其中就包括美国雇佣兵米切尔·韦贝尔三世。旺夏茨基于1965年去世后，这些雇佣兵会被困在俄罗斯，拿不到薪水，因而愤怒不已。韦贝尔将发动政变推翻马特科夫斯基，接管马加丹并将其转变为雇佣兵之国，马加丹将成为§s一人独裁§!国家。§!"
