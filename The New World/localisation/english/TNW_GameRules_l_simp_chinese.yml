 USA_RDC_PRIMARIES_1964: "£TNO_game_rule_flag_USA   美利坚合众国 - 1964年共民联盟初选"
 RULE_OPTION_USA_RDC_PRIMARIES_1964_RANDOM:0 "默认 - AI随机"
 RULE_OPTION_USA_RDC_PRIMARIES_1964_RANDOM_DESC: "§F1964年或许将会是美国这个全世界硕果仅存的§M民主§!大国的历史上最接近万劫不复的一年。南非战争还在烽火前线反复拉锯、前总统§R理查德·尼克松§!黯然下台、继任总统§B约翰·F·肯尼迪§!很快就在白人至上分子的枪口下命丧黄泉、还有始终不息且日渐炽烈的民权运动，这一切的一切都让1964年总统初选比以往的每次选举都更为混乱不堪而又至关重要。§R共和党§!-§B民主党§!联盟裂痕已现，摆在其面前的是一场始料不及的政治风暴，而这又可能导致§O国家进步公约§!赢得大选，让这个充满§x巨大争议§!和倡导深度变革的政治大杂烩组织取得政权。"
 RULE_OPTION_USA_RDC_PRIMARIES_1964_LBJ: "£GFX_rd_d_texticon §B林登·B·约翰逊§!"
 RULE_OPTION_USA_RDC_PRIMARIES_1964_LBJ_DESC: "§F£GFX_rd_d_texticon §B民主党§!候选人§B林登·B·约翰逊§!将在联盟全国代表大会中说服众多§Y代表§!，并赢得联盟内初选。§B约翰逊§!希望继承§B约翰·F·肯尼迪§!的§K进步主义§!遗产，施行§l伟大社会§!计划，向一直困扰着§M美国§!的三大§V幽灵§!：§w财富不均§!、§g贫困§!以及§j制度化种族主义§!的§V残余§!§R宣战§!。假如§B约翰逊§!获得§Y大选§!胜利，§M美利坚合众国§!将成为§M承袭自由主义§!国家。§!"
 RULE_OPTION_USA_RDC_PRIMARIES_1964_BENNETT: "£GFX_rd_r_texticon §R华莱士·F·本内特§!"
 RULE_OPTION_USA_RDC_PRIMARIES_1964_BENNETT_DESC: "§F£GFX_rd_r_texticon §R共和党§!候选人§R华莱士·F·本内特§!在联盟全国代表大会中说服众多代表，并赢得联盟内初选。§R本内特§!是一位为人和蔼的妥协者，他希望通过循序渐进地改革来团结全国，反对一股脑把国家搅得鸡飞狗跳。与此同时，他还试图促进§M自由国家组织§!内部的团结，使之成为一个平等的联盟，而非美国软实力的投射。假如§R本内特§!之后还获得了下届大选的胜利，§M美利坚合众国§!将成为§i自由市场保守主义§!国家。§!"
 USA_LEADER_ROUTE_1964: "£TNO_game_rule_flag_USA   美利坚合众国 - 1964年总统大选"
 RULE_OPTION_USA_LEADER_ROUTE_1964_RANDOM: "默认 - AI随机"
 RULE_OPTION_USA_LEADER_ROUTE_1964_RANDOM_DESC: "§F§R共和党§!-§B民主党§!联盟以压倒性优势赢得了上届总统选举，这是因为共民联盟相较于群龙无首的对手§O国家进步公约§!来说要更加统一，但随着§R尼克松§!越发不受欢迎，他们的支持率一直在稳步下降。尼克松因腐败丑闻而辞职，副总统§B约翰·肯尼迪§!被激进的白人至上主义者刺杀，§M美国§!即将面对混乱，国家的命运取决于下届总统选举，以及对酝酿中的民权运动的立场。§!"
