 RULE_OPTION_SAU_PATH_RANDOM_DESC: "§F如果§n意大利§!民主化，它就必须重新评估自己和沙特阿拉伯的关系了，而后者是§n意大利§!势力范围内唯一一个在石油危机后没有爆发革命的国家。随着中东局势日益混乱，沙特能否继续维持现状？\n\n§R要求：§!\n§Y意大利已民主化§!§!"
 RULE_OPTION_SAU_PATH_PATERNALISM: "§R遭到意大利政变§!"
 RULE_OPTION_SAU_PATH_PATERNALISM_DESC: "§F§n意大利§!将试图通过政变扶持塔拉勒王子上台以稳定局势并带动中东现代化。塔拉勒是一个大胆的改革家，也展示出了引领当地潮流的意愿。如此，沙特阿拉伯将遵循§L二元君主立宪制§!的道路。§!"
 RULE_OPTION_SAU_PATH_DESPOTISM: "§G维持现状§!"
 RULE_OPTION_SAU_PATH_DESPOTISM_DESC: "§F在危机期间，§n意大利§!试图向同她友好的政府和军队保证，她不会在危机时刻抛弃它们，并将为维持它们的权力结构而斗争，从而维持自己在中东的势力范围。沙特阿拉伯将保持§s绝对君主制§!。§!"
