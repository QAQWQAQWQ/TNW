 RULE_OPTION_ITA_BATTLE_FOR_ITALY_RANDOM_DESC: "§F§n意大利§!以自己是世界第四超级大国而自豪。然而，尽管它拥有庞大的帝国和自己的势力范围，但它的实力始终落后于其他三个大国，俨然成为一个有名无实的超级大国——其他超级大国也持有类似的看法。 §w如果§n意大利§!重新民主化§!，美国和日本将进行外交角力，使意大利并入自己的势力范围。\n\n§R要求：§!\n£TNO_game_rule_flag_ITA   §Y意大利 - 法西斯主义的遗产§!中预设£TNO_game_rule_flag_ITA   §Y§L齐亚诺§!推动帝国自由化§!"
 RULE_OPTION_ITA_BATTLE_FOR_ITALY_OFN: "£TNO_game_rule_flag_USA  £TNO_game_rule_flag_ITA   意大利加入OFN"
