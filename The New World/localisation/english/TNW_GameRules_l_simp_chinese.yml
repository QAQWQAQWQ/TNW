 RULE_OPTION_USA_CIVIL_RIGHTS_ACT_1962_RANDOM: "默认 - AI随机"
 RULE_OPTION_USA_CIVIL_RIGHTS_ACT_1962_RANDOM_DESC: "§F美国社会愈发分裂，非裔美国人抗议弥漫在这片自由之地上数十年来依照肤色实行的制度性种族歧视。民权问题成为公众关注的焦点。美国白人则分裂为§K进步派§!和各种§e§!极§o端§!的§L种族隔离支持者§!，他们强烈希望废除或强化种族主义法律。在§R尼克松§!-§B肯尼迪§!的总统任期中，美国的领袖必须从这两个彼此冲突且不可妥协的阵营中选择一方，而这一决定也将成为美国政治的转折点。§!"
 RULE_OPTION_USA_CIVIL_RIGHTS_ACT_1962_PASSES: "肯尼迪通过民权法案"
 RULE_OPTION_USA_CIVIL_RIGHTS_ACT_1962_PASSES_DESC: "§F尽管§R理查德·尼克松§!总统表示§V反对§!，§B约翰·F·肯尼迪§!副总统仍将会见§p民权运动领袖§!，并起草§D民权法案§!，§R尼克松§!§Y不情愿地§!签署了该法案，这一举动§x激怒§!了许多§j南方§!的§L种族隔离支持者§!，他们纷纷§e叛逃§!至§O国家进步公约§!，导致§g国民党团§!成为国家进步公约中的§G支配力量§!。同时，§K进步派§!则团结至§R共和党§!-§B民主党§!联盟周围。1964年，§g乔治·华莱士§!将成为§O国家进步公约§!提名的总统候选人。§!"
 RULE_OPTION_USA_CIVIL_RIGHTS_ACT_1962_VETO: "尼克松否决民权法案"
 RULE_OPTION_USA_CIVIL_RIGHTS_ACT_1962_VETO_DESC: "§F尽管§R理查德·尼克松§!总统表示反对，§B约翰·F·肯尼迪§!副总统仍将会见§p民权领袖§!，并起草§D民权法案§!。然而，法案被§R尼克松§!§x否决§!。这一举动§x激怒§!了许多§K进步派§!，他们纷纷§e叛逃§!至§O国家进步公约§!，导致§K进步党团§!成为国家进步公约中的§G支配力量§!。同时，§L种族隔离支持者§!与§o反动主义者§!则团结至§R共和党§!-§B民主党§!联盟周围。1964年，§K罗伯特·F·肯尼迪§!将成为§O国家进步公约§!提名的总统候选人。§!"
