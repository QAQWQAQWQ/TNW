 RULE_OPTION_CHL_SKELETON_CHRISTMAS_WAR_ARG: "£TNO_game_rule_flag_ARG   §m阿根廷§!完全胜利"
 RULE_OPTION_CHL_SKELETON_CHRISTMAS_WAR_ARG_DESC: "§F§V智利§!和§m阿根廷§!之间的外交谈判宣告失败，巴塔哥尼亚南部的争端演变成为暴力冲突，§x战争§!随之爆发。虽然§V智利§!试图夺回失地，但他们的反击将遭遇失败，§m阿根廷§!则牢牢占据上风，他们不仅会维持对沙漠湖控制，还将进一步推进，夺取普拉特海军上尉地区。这将标志着§m阿根廷§!在§M圣诞节战争§!中取得最终胜利，而§V智利政府§!受到了彻底的羞辱。§!"
 RULE_OPTION_CHL_SKELETON_CHRISTMAS_WAR_HOLD: "£TNO_game_rule_flag_ARG   §m阿根廷§!坚守沙漠湖"
 RULE_OPTION_CHL_SKELETON_CHRISTMAS_WAR_HOLD_DESC: "§F§V智利§!和§m阿根廷§!之间的外交谈判宣告失败，巴塔哥尼亚南部的争端演变成为暴力冲突，§x战争§!随之爆发。虽然§V智利§!试图夺回失地，但他们的反击将遭遇失败，§m阿根廷§!坚守阵地，虽然他们会尝试进一步推进，但其夺取普拉特海军上尉地区的行动遭遇顽强抵抗，§x战争§!就此告终。尽管§m阿根廷§!赢得了胜利，但并非决定性，远无法实现其成为§n南美洲§!最强大国家之一的愿望。§!"
 RULE_OPTION_CHL_SKELETON_CHRISTMAS_WAR_RETAKE: "£TNO_game_rule_flag_CHL   §V智利§!重夺沙漠湖"
 RULE_OPTION_CHL_SKELETON_CHRISTMAS_WAR_RETAKE_DESC: "§F§V智利§!和§m阿根廷§!之间的外交谈判宣告失败，巴塔哥尼亚南部的争端演变成为暴力冲突，§x战争§!随之爆发。§M圣诞节战争§!的第一枪中，§V智利§!赢得胜利，重新夺回了沙漠湖。在前期胜利的鼓舞下，§V智利§!将试图更进一步，攻占§m阿根廷§!城镇卡拉法特。然而，这次进攻将被击退，边界重新回到争端爆发前的原状。§!"
 RULE_OPTION_CHL_SKELETON_CHRISTMAS_WAR_CHL: "£TNO_game_rule_flag_CHL   §V智利§!完全胜利"
 RULE_OPTION_CHL_SKELETON_CHRISTMAS_WAR_CHL_DESC: "§F§V智利§!和§m阿根廷§!之间的外交谈判宣告失败，巴塔哥尼亚南部的争端演变成为暴力冲突，§x战争§!随之爆发。在冲突中，§V智利§!将赢得决定性的胜利，不仅成功夺回沙漠湖，还在随后反攻中占领了卡拉法特。即使§m阿根廷§!发动了猛烈的反击，§V智利§!仍然守住了这些地区，标志着山岭之上的国家在§M圣诞节战争§!中对其东部邻国取得了最终胜利。§!"
 LIB_ECON_SPHERE: "£TNO_game_rule_flag_LIB   利比里亚 - 经济圈"
 RULE_OPTION_LIB_ECON_SPHERE_RANDOM: "默认 - AI随机"
 RULE_OPTION_LIB_ECON_SPHERE_RANDOM_DESC: "§F§I利比里亚§!长期以来一直接收§M美国§!的重新安置与殖民，自其成立以来，就一直与美国保持着紧密的经济联系。§g杜伯曼§!试图加强§I利比里亚§!经济独立性并扩大贸易模式的尝试导致§M美国§!援助和贸易的减少，损害了经济。然而，随着§x西非战争§!的结束和§K西非联邦§!的建立，新承诺的经济合作重新激发了降低对§M美§!经济依赖的兴趣。然而，§g杜伯曼§!的具体反应还是未知之数。§!"
 RULE_OPTION_LIB_ECON_SPHERE_USA: "£TNO_game_rule_flag_USA   §g利比里亚§!留在§M美国经济圈§!"
 RULE_OPTION_LIB_ECON_SPHERE_USA_DESC: "§F在建立自身经济纽带的过程中，§I利比里亚§!将决定紧紧依靠其天然而强大的盟友，§M美国§!。鉴于美国提供的慷慨援助以及§q西§!§K非§!瞬息万变、难以揣测的政治局势，脚踏实地的§I利比里亚§!明智地选择成为§MOFN§!在§n非洲§!大陆上最初的立足点。§!"
 RULE_OPTION_LIB_ECON_SPHERE_WOL: "£TNO_game_rule_flag_WOL   §g利比里亚§!加入§K西非经济区§!"
 RULE_OPTION_LIB_ECON_SPHERE_WOL_DESC: "§F为了在外交上确立其独立国家的地位，§I利比里亚§!将开始远离§M美国§!经济圈，转而加深与§K西非经济区§!的联系。虽然这并非§I利比里亚§!-§M美国§!关系的终结，但无论是在经济还是外交上，这都将标志着§I利比里亚§!转向第三世界、成为§q西§!§K非§!的真正一员。\n\n§R要求：§!\n£TNO_game_rule_flag_CAO  £TNO_game_rule_flag_WOL  £TNO_game_rule_flag_FFR   §Y西非战争§!中预设£TNO_game_rule_flag_WOL   §M西非联盟胜利§!\n§x且§!\n£TNO_game_rule_flag_USA  £TNO_game_rule_flag_FFR   §Y美利坚合众国 - 西非重建的命运§!中§R未§!预设§M重建成功§!§!"
 RULE_OPTION_SECOND_SAF_SOUTH_AFRICAN_WAR_OUTCOME_NONE: "§G战争消弭§!"
 RULE_OPTION_SECOND_SAF_SOUTH_AFRICAN_WAR_OUTCOME_NONE_DESC: "§F随着§o大阿非利加德意志邦§!在非洲三大§s德国殖民地§!的基础上形成、§O南非战争§!画上句号，它将集中精力于内部，处理剥削、境内安全和自身治理等问题。因此，德意志邦将对战后建立的§J人民邦§!采取更加自放任的态度，并在真正解决该地区的政策之前宣告崩溃。因此，§J人民邦§!将继续作为一个§J阿非利卡人§!国家存在，不必担心干涉或内战的可能性。§!"
 ZIM_GRORELEASE: "£TNO_game_rule_flag_GRO_REICHSSTAAT  £TNO_game_rule_flag_ZIM   抹除约舒亚·恩科莫"
 RULE_OPTION_ZIM_GRORELEASE_RANDOM: "默认 - AI随机"
 RULE_OPTION_ZIM_GRORELEASE_RANDOM_DESC: "§F§q大阿非利加德意志邦§!在走向灭亡的道路上肆意屠杀，现在又将目光转向了津巴布韦的起义人民。在斩首行动中，德国人将企图暗杀广受欢爱戴的泛非主义者§V约舒亚·恩科莫§!：他的死亡将为§q当地军阀§!打开大门，一旦德意志邦灭亡，军阀将填补空缺……§!"
 RULE_OPTION_ZIM_GRORELEASE_1: "§V恩科莫§!幸存"
 RULE_OPTION_ZIM_GRORELEASE_1_DESC: "§F有关约舒亚·恩科莫之死的报道极尽夸张；可恰恰相反，他仍在暗处继续与德国殖民主义作着斗争。随着德意志邦溃灭，恩科莫将成为新解放国家的领导人，领导津巴布韦非洲人民联盟走向§V非洲社会主义§!的道路。\n\n§R要求：§!\n£TNO_game_rule_flag_GRO_REICHSSTAAT   §Y大阿非利加德意志邦的毁灭进程§!中预设§M第一阶段§!§!"
 RULE_OPTION_ZIM_GRORELEASE_2: "§V恩科莫§!死亡"
 RULE_OPTION_ZIM_GRORELEASE_2_DESC: "§F约舒亚·恩科莫死于德国人之手，留下的权力真空将由当地军阀首领罗伯特·穆加贝填补。德意志邦灭亡后，他和他§L社会民族主义§!的津巴布韦非洲民族联盟将夺取津巴布韦政权。§!"
 ZIM_ECONSPHERE: "£TNO_game_rule_flag_ZIM   津巴布韦 - 经济圈"
 RULE_OPTION_ZIM_ECONSPHERE_RANDOM: "默认 - AI随机"
 RULE_OPTION_ZIM_ECONSPHERE_RANDOM_DESC: "§F赢得西非战争之后，§K泛非解放阵线§!将成立泛非经济互助共同体，着手在其成员和其他自由非洲国家之间展开广泛的经济合作。如果§K泛非经济互助共同体§!取得成功，它将使§K泛非解放阵线§!成为推动非洲进步的关键力量。津巴布韦领导层对泛非解放阵线进行谨慎观察、又有着相似的意识形态，必须仔细权衡加入该经济集团带来的利益与风险。§!"
 RULE_OPTION_ZIM_ECONSPHERE_CAO: "靠拢§K泛非经济互助共同体§!"
 RULE_OPTION_ZIM_ECONSPHERE_CAO_DESC: "§F§V约舒亚·恩科莫§!政府认为津巴布韦与§K泛非经济互助共同体§!拥有相似的非洲民族主义和社会主义价值观，因此将请求加入该经济集团。津巴布韦非洲人民联盟将在经济上与西非，尤其是§K喀麦隆§!建立紧密的联盟。\n\n§R要求：§!\n£TNO_game_rule_flag_CAO  £TNO_game_rule_flag_WOL  £TNO_game_rule_flag_FFR   §Y西非战争§!中预设£TNO_game_rule_flag_JAP  £TNO_game_rule_flag_CAO §M泛非解放阵线胜利§!\n§y且§!\n§Y£TNO_game_rule_flag_GRO_REICHSSTAAT  £TNO_game_rule_flag_ZIM   抹除约舒亚·恩科莫§!中预设§M恩科莫幸存§!§!"
 RULE_OPTION_ZIM_ECONSPHERE_ZZZ: "§Y中立§!"
 RULE_OPTION_ZIM_ECONSPHERE_ZZZ_DESC: "§F§V约舒亚·恩科莫§!领导的津巴布韦非洲人民联盟对外国在经济上的主导地位心存警惕，即便是两国政治立场相似，津巴布韦也将拒绝加入§K泛非经济互助共同体§!，津巴布韦将保持在后殖民时代非洲的不结盟立场。§!"
