 RULE_OPTION_BUL_MAC_CRISIS_QUIET_DESC: "§F马其顿危机在数周后渐渐冷却，沙皇鲍里斯三世将继续统治保加利亚。§!"
 RULE_OPTION_BUL_MAC_CRISIS_BORIS_FLEES: "鲍里斯三世出逃"
 RULE_OPTION_BUL_MAC_CRISIS_BORIS_FLEES_DESC: "§F沙皇鲍里斯三世在军队激进分子的恐吓之下退位，逃离保加利亚，西美昂二世皇子将继位为新沙皇，组建新政府以处理酝酿之中的马其顿危机。§!"
