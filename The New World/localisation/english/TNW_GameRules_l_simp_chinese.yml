 BOL_POLITICS_1967: "£TNO_game_rule_flag_BOL   玻利维亚 - 政局走向"
 RULE_OPTION_BOL_POLITICS_1967_RANDOM: "默认 - AI随机"
 RULE_OPTION_BOL_POLITICS_1967_RANDOM_DESC: "\n\n§R要求：§!\n£TNO_game_rule_flag_BOL £TNO_game_rule_flag_CHL §M长枪党胜利§!§Y或§!£TNO_game_rule_flag_BOL £TNO_game_rule_flag_BRA £TNO_game_rule_flag_CHL £TNO_game_rule_flag_ARG §Y玻利维亚 - 矿石战争§!中预设£TNO_game_rule_flag_BOL §M左翼政变§!§!"
 BOL_MINING_WAR: "£TNO_game_rule_flag_BOL  £TNO_game_rule_flag_BRA  £TNO_game_rule_flag_CHL  £TNO_game_rule_flag_ARG   玻利维亚 - 矿石战争"
 RULE_OPTION_BOL_MINING_WAR_RANDOM: "默认 - AI随机"
 RULE_OPTION_BOL_MINING_WAR_RANDOM_DESC: "§F§B民主制度联盟§!支持者与反对派之间的小规模冲突，最终升级成冲击克马多宫的失败行动。随之而来的，是军警发动的“科梅西奥大屠杀”。几小时后硝烟散去，士兵行进在拉巴斯街头的场景证实了许多人的担忧：玻利维亚政府被一场§s军事政变§!解散。\n\n包括§J长枪党§!流亡者与§D民族主义者§!在内的多方势力都在磨刀霍霍，试图推翻新成立的§K军政府§!并建立新政权。鹿死谁手尚未可知。\n\n§R要求：§!\n£TNO_game_rule_flag_BOL  £TNO_game_rule_flag_BRA  £TNO_game_rule_flag_CHL  £TNO_game_rule_flag_ARG   §Y跨安第斯条约谈判§!中预设§x未§!预设£TNO_game_rule_flag_BOL £TNO_game_rule_flag_ARG §M成功 - 阿根廷胜利§!§!"
 RULE_OPTION_BOL_MINING_WAR_GOVERNMENT: "£TNO_game_rule_flag_BOL  £TNO_game_rule_flag_BRA   §K政府军§!胜利"
 RULE_OPTION_BOL_MINING_WAR_GOVERNMENT_DESC: "§F从§J长枪党§!流亡者到§D民族主义者§!在内的各派势力，都威胁要推翻§o玻利维亚§!§K军政府§!并建立符合自身理念的政权。这些企图全都以失败告终。\n\n得到§K巴西§!支持的§s玻利维亚国民军§!统帅§s阿尔弗雷多·奥万多·坎迪亚§!将扫清各路叛军，打赢这场矿石战争。然而，坎迪亚总统性格优柔寡断且缺乏领导能力，治国稍显疲软。因此，玻利维亚暂时仍由§s军政府§!统治。§!"
 RULE_OPTION_BOL_MINING_WAR_NATIONALIST: "£TNO_game_rule_flag_BOL  £TNO_game_rule_flag_ARG   §D民族主义者§!胜利"
 RULE_OPTION_BOL_MINING_WAR_NATIONALIST_DESC: "§F从§J长枪党§!流亡者到§D民族主义者§!在内的各派势力，都威胁要推翻§o玻利维亚§!§K军政府§!并建立符合自身理念的政权。其中一股势力取得了最终胜利。\n\n得到§g阿根廷§!支持的§s瓜尔韦托·比利亚罗埃尔·洛佩斯§!领导的§s革命民族主义运动§!渗透进城市地区，不满现状者的怒火被精准点燃，短短数月便形成星火燎原之势，民族主义者最终赢得矿石战争，实现全国革命。玻利维亚的未来将是§s一人独裁§!——在特定条件下，也可能走向§L庇隆主义§!。§!"
 RULE_OPTION_BOL_MINING_WAR_FALANGIST: "£TNO_game_rule_flag_BOL  £TNO_game_rule_flag_CHL   §J长枪党§!胜利"
 RULE_OPTION_BOL_MINING_WAR_FALANGIST_DESC: "§F从§J长枪党§!流亡者到§D民族主义者§!在内的各派势力，都威胁要推翻§o玻利维亚§!§K军政府§!并建立符合自身理念的政权。其中一股势力取得了最终胜利。\n\n得到§j智利§!支持，§J玻利维亚社会主义长枪党§!的§J奥斯卡·温萨加·德·拉·维加§!仓促组建人民军进军拉巴斯，居然一举成功，§s坎迪亚§!政权仓皇出逃，其余反对派悉遭禁止。玻利维亚的未来将贯彻§J长枪党主义§!。§!"
 RULE_OPTION_BOL_MINING_WAR_LEFTIST: "£TNO_game_rule_flag_BOL   §V左翼§!政变"
 RULE_OPTION_BOL_MINING_WAR_LEFTIST_DESC: "§F从§J长枪党§!流亡者到§D民族主义者§!在内的各派势力，都威胁要推翻§o玻利维亚§!§K军政府§!并建立符合自身理念的政权。这些企图全都以失败告终。\n\n拉巴斯陷入僵局，§V人民大会§!的社会主义派系在“玻利维亚的§V卡斯特罗§!”§V胡安·何塞·托雷斯·冈萨雷斯§!带领下趁乱起事，最终左翼军官团成功夺取政权，在“人民的全国革命”的口号下建立社会主义独裁政权，由此赢得矿石战争。玻利维亚的未来将走向§V左翼民族主义§!。§!"
