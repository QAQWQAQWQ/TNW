 RULE_OPTION_EGY_CIVIL_WAR_OUTCOME_RANDOM_DESC: "§F美尼斯王统一上下埃及的传奇流传至今，但现在内战却在这尼罗河谷爆发。内战双方分别是忠于§n意大利§!支持的政府的军队及自由军官，还有关键人物——魅力领袖贾迈勒·阿卜杜勒·纳赛尔，和赛义德·库特布穆斯林兄弟会的“反无知者的圣战”。鲜血染红了尼罗河，她命运仍不得而知。但有一件事情是确定的——埃及永不屈服。\n\n§G被选中的一方将内战期间获得大量战斗加成，直到获胜。§!\n\n§R要求：§!\n§Y石油危机已经开始§!§!"
