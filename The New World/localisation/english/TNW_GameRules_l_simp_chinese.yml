 RULE_OPTION_PUERTO_PLATA_INVANSION_OUTCOME_BAL_VICTORY_DESC: "§F最后的自由战士或是逃亡§V海地§!，或是屈膝投降，§s华金·巴拉格尔§!总统赢得了内战胜利。战后，巴拉格尔仍将继续缓慢推动§j去特鲁希略化§!进程，逐渐放开社会自由。全世界都好奇地注目着这个试图同时与§M美国§!和§s伊比利亚§!协调关系的国家，因为这意味着多米尼加必须将它的过去与未来融合在一起。§!"
 RULE_OPTION_PUERTO_PLATA_INVANSION_OUTCOME_BAL_CEASEFIRE: "£TNO_game_rule_flag_DOM   §G停火成功§! - §i华金·巴拉格尔§!"
