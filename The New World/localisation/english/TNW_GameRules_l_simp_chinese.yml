 RULE_OPTION_INS_POPE_CRISIS_RANDOM: "默认 - AI随机"
 RULE_OPTION_INS_POPE_CRISIS_RANDOM_DESC: "§F印尼国内局势日趋紧张、日美两国斗争甚嚣尘上之际，美国飞行员、CIA特工§Y艾伦·波普§!被日本支持的政权击落俘虏。他的命运将成为§M美国§!与§e日本§!之间外交危机的中心，他是§G生§!是§R死§!，也将由两大强权加以决定。§!"
 RULE_OPTION_INS_POPE_CRISIS_USA: "£TNO_game_rule_flag_USA   波普§G获救§!"
 RULE_OPTION_INS_POPE_CRISIS_USA_DESC: "§F通过谈判或是秘密行动，§Y艾伦·波普§!将从印尼监狱获释并返回美国。§M美国§!与§e日本§!都将如释重负，两国之间的紧张局势将得以§G缓和§!。§!"
 RULE_OPTION_INS_POPE_CRISIS_JAPAN: "£TNO_game_rule_flag_JAP   波普§R遭处决§!"
 RULE_OPTION_INS_POPE_CRISIS_JAPAN_DESC: "§F无论是因谈判失败而遭到处决，还是因出逃失败而横死当场，§Y艾伦·波普§!将无缘离开印尼。§m太平洋§!两极将因谈判破裂相互指责，§M美§!§e日§!间局势也将随之§R升级§!。§!"
 INDONESIA_CIVIL_WAR_OUTCOME: "£TNO_game_rule_flag_INS   印度尼西亚内战"
 RULE_OPTION_INDONESIA_CIVIL_WAR_OUTCOME_RANDOM: "默认 - AI随机"
 RULE_OPTION_INDONESIA_CIVIL_WAR_OUTCOME_RANDOM_DESC: "§F§R何以至此？§!\n一开始，似乎一切充满了希望。1949年印度尼西亚取得独立后，人们开始真切相信他们可以建立一个新的印度尼西亚，向着更美好的明天前行。然而，人们在十多年后终于醒悟，独立并不像他们想象中那样美好。印尼与日本的紧密联系，尤其是日本财阀对印尼经济相当程度的掌控与雅加达政府的日益集权极大激起了人们的怒火。传言称，已有势力在印尼的偏远地区谋划起事。在未来道路上的一片迷雾之中，唯有一件事对印尼是确定的：不满终将化作烈焰吞噬一切。§!"
 RULE_OPTION_INDONESIA_CIVIL_WAR_OUTCOME_INS: "£TNO_game_rule_flag_INS   §J苏加诺§!胜利"
 RULE_OPTION_INDONESIA_CIVIL_WAR_OUTCOME_INS_DESC: "§F苏加诺，印度尼西亚共和国的现任总统，将赢得印尼内战。于是，共和国的旧有制度自然而然迎来重建。苏加诺继续中央集权，推进国家的缓慢重建。但是，比起战前，并非所有一切都不曾改变。总统未能阻止内战爆发，这严重损害了他的威信。而为苏加诺夺取胜利的重要功臣——军队，也会发挥比以往更加强大的影响力。苏加诺赢了，但这绝不是一切的结局。§!"
 RULE_OPTION_INDONESIA_CIVIL_WAR_OUTCOME_FRI: "£TNO_game_rule_flag_FRI   §L哈达§!胜利"
 RULE_OPTION_INDONESIA_CIVIL_WAR_OUTCOME_FRI_DESC: "§F印度尼西亚自由政府（或自由印度尼西亚共和国）的领导人穆罕默德·哈达将在印尼内战中获胜。他在战争中得到了OFN、尤其是美国和澳大利亚的大力支持。如果说苏加诺是一个集权主义者，那么哈达就正好相反，他领导下的新印度尼西亚政府将给予该国许多地区更多自主权。但是在与他一同参与印度尼西亚内战的诸多上校军官中，有人对他现在的地位不满。哈达能否履行当初他做出的诸多承诺有待时间的检验。§!"
 RULE_OPTION_INDONESIA_CIVIL_WAR_OUTCOME_LUBIS: "£TNO_game_rule_flag_INS   §L卢比斯§!胜利"
 RULE_OPTION_INDONESIA_CIVIL_WAR_OUTCOME_LUBIS_DESC: "§F苏加诺的辞职震惊朝野，祖尔基弗利·卢比斯随后继任为印度尼西亚总统。卢比斯的任务艰巨，摆在他面前的首要任务是重建国家，这就有两大难题：多年的残酷内战与苏加诺辞职造就的巨大权力真空。卢比斯承诺会治愈印尼的创伤，重整印尼的政治。然而，一些人指责卢比斯曾经有过军方背景，其掌权过程也并不明晰，因而可能暗藏野心。不论如何，他还是得到了美国的一些支持——虽然态度并不坚定。§!"
 RULE_OPTION_INDONESIA_CIVIL_WAR_OUTCOME_SUHARTO: "£TNO_game_rule_flag_INS   §s苏哈托§!胜利"
 RULE_OPTION_INDONESIA_CIVIL_WAR_OUTCOME_SUHARTO_DESC: "§F苏加诺的辞职震惊朝野，苏哈托随后继任印度尼西亚总统。苏哈托的任务艰巨，摆在他面前的首要任务是重建国家，这就有两大难题：多年的残酷内战与苏加诺辞职造就的巨大权力真空。苏哈托承诺要一举终结混乱局面，并不惜代价实现国家统一。苏哈托野心勃勃，在政府中也缺少敌手。苏哈托声称将继承前人苏加诺的遗产，继续印度尼西亚的艰苦奋斗，当然，是在他的引领下。也许这就是日本虽犹豫不决，但还是向其政府提供了支持的原因所在。§!"
 RULE_OPTION_INDONESIA_CIVIL_WAR_OUTCOME_LUBIS_LOSE: "£TNO_game_rule_flag_INS   §s苏佩诺§!胜利"
 RULE_OPTION_INDONESIA_CIVIL_WAR_OUTCOME_LUBIS_LOSE_DESC: "§F反对总统祖尔基弗利·卢比斯的激进右翼反对派最终夺取了胜利，班邦·苏佩诺将军已成功夺取政权，自任总统。这一结果出乎绝大多数国际观察家的预料，被认为是令人难以置信的奇迹。苏佩诺将军成功集结仍效忠苏加诺的少数部队，并击溃了卢比斯前总统的军队。苏佩诺是苏加诺的远亲，宣布会继承许多后者的政治原则。然而，苏佩诺也毫不掩饰其报复曾迫使苏加诺辞职敌对分子的欲望，对任何有一丝一毫可能与之牵连的人展开了镇压。这一结果让东京和华盛顿方面都不甚满意。§!"
 RULE_OPTION_INDONESIA_CIVIL_WAR_OUTCOME_SUHARTO_LOSE: "£TNO_game_rule_flag_INS   §J纳苏蒂安§!胜利"
 RULE_OPTION_INDONESIA_CIVIL_WAR_OUTCOME_SUHARTO_LOSE_DESC: "§F反对总统祖尔基弗利·卢比斯的激进右翼反对派最终夺取了胜利，阿卜杜勒·哈里斯·纳苏蒂安将军已成功夺取政权，自任总统。这一结果出乎了绝大多数国际观察家预料，被认为是令人难以置信的奇迹。纳苏蒂安成功集结了由民兵和前印度尼西亚自由政府军成员组成的左翼起义军，并最终击溃了苏哈托的军队。纳苏蒂安是自由印度尼西亚运动的前成员，但他的军事背景和铲除一切叛徒的宣言似乎表明其对自由印尼的理想缺乏追求。这一结果让东京和华盛顿方面都不甚满意。§!"
 PHI_CIVIL_WAR_OUTCOME: "£TNO_game_rule_flag_PHI_peace  £TNO_game_rule_flag_UPH  £TNO_game_rule_flag_SPH   巴林塔瓦克闪击战"
 RULE_OPTION_PHI_CIVIL_WAR_OUTCOME_RANDOM: "默认 - AI随机"
 RULE_OPTION_PHI_CIVIL_WAR_OUTCOME_RANDOM_DESC: "§F巴林塔瓦克闪击战的胜者将在第二共和国、自由菲律宾共和国和全菲律宾革命社会主义共和国中随机产生。§!"
 RULE_OPTION_PHI_CIVIL_WAR_OUTCOME_PHI: "£TNO_game_rule_flag_PHI_peace   政府军胜利"
 RULE_OPTION_PHI_CIVIL_WAR_OUTCOME_PHI_DESC: "§F第二共和国将赢得巴林塔瓦克闪击战，菲律宾将在历经多年分裂后重新团结在一个政府的领导之下。§!"
 RULE_OPTION_PHI_CIVIL_WAR_OUTCOME_UPH: "£TNO_game_rule_flag_UPH   §L自由菲律宾共和国§!胜利"
 RULE_OPTION_PHI_CIVIL_WAR_OUTCOME_UPH_DESC: "§F菲律宾第二共和国垮台后，自由菲律宾共和国将夺取马尼拉，成为巴林塔瓦克闪击战的胜利者。§!"
 RULE_OPTION_PHI_CIVIL_WAR_OUTCOME_SPH: "£TNO_game_rule_flag_SPH   §e全菲律宾革命社会主义共和国§!胜利"
 RULE_OPTION_PHI_CIVIL_WAR_OUTCOME_SPH_DESC: "§F菲律宾第二共和国垮台后，全菲律宾革命社会主义共和国将夺取马尼拉，成为巴林塔瓦克闪击战的胜利者。§!"
 PHI_LANDING_OUTCOME: "£TNO_game_rule_flag_FGB  £TNO_game_rule_flag_UPH  £TNO_game_rule_flag_SPH   菲律宾登陆"
 RULE_OPTION_PHI_LANDING_OUTCOME_RANDOM: "默认 - AI随机"
 RULE_OPTION_PHI_LANDING_OUTCOME_RANDOM_DESC: "§F菲律宾第二共和国垮台后，日本军部企图重建对菲律宾的控制，并派遣第14军在吕宋岛北部登陆以达成这一目标。第14军与全菲律宾革命社会主义共和国以及自由菲律宾共和国冲突的胜利者将随机决定。\n\n§R要求：§!\n§Y菲律宾第二共和国在巴林塔瓦克闪击战中被击败§!§!"
 RULE_OPTION_PHI_LANDING_OUTCOME_UPH: "£TNO_game_rule_flag_UPH   §L自由菲律宾共和国§!胜利"
 RULE_OPTION_PHI_LANDING_OUTCOME_UPH_DESC: "§F自由菲律宾共和国将第14军和全菲律宾革命社会主义共和国双双击败。如果温德尔·费尔蒂希掌权，菲律宾将回归当地人主导的民主，而如果德怀特·E·比奇掌权，美国人的统治将会继续。§!"
 RULE_OPTION_PHI_LANDING_OUTCOME_FGB: "£TNO_game_rule_flag_FGB   日军胜利"
 RULE_OPTION_PHI_LANDING_OUTCOME_FGB_DESC: "§F第14军将自由菲律宾共和国和全菲律宾革命社会主义共和国双双击败，用武力将菲律宾置于日本军队的控制之下。§!"
 RULE_OPTION_PHI_LANDING_OUTCOME_SPH: "£TNO_game_rule_flag_SPH   §e全菲律宾革命社会主义共和国§!胜利"
 RULE_OPTION_PHI_LANDING_OUTCOME_SPH_DESC: "§F菲律宾人民共和国将自由菲律宾共和国和第14军双双击败，路易斯·塔鲁克可以在全国范围内贯彻他的社会主义愿景而无后顾之忧了。§!"
 RULE_OPTION_PHI_LANDING_OUTCOME_UNITED_FRONT: "£TNO_game_rule_flag_SPH  £TNO_game_rule_flag_UPH   菲律宾联合阵线胜利"
 RULE_OPTION_PHI_LANDING_OUTCOME_UNITED_FRONT_DESC: "§F菲律宾联合阵线的联军部队将会团结一致击退第14军的进攻，自由菲律宾共和国和全菲律宾革命社会主义共和国将统一在一个共同的政府之下。\n\n§R要求：§!\n§G菲律宾联合阵线已成立§!§!"
 THA_PHIBUN_DEAD: "£TNO_game_rule_flag_THA   泰国 - 披汶之死"
 RULE_OPTION_THA_PHIBUN_DEAD_RANDOM: "默认 - AI随机"
 RULE_OPTION_THA_PHIBUN_DEAD_RANDOM_DESC: "§F三十年来，泰国一直在大元帅§J贝·披汶颂堪§!的引领下前行。共和国今日的繁荣几乎都要归功于§J披汶§!，他以一己之力守护了共和国国内外的伟大。然而，大元帅不可避免的离去将会暴露出隐藏在台面之下的暴力和派系斗争。军方与官僚集团都想要利用这份权力真空来夺取政权。一场场政变正在谋划，一份份清洗名单制定完成，这个年轻的共和国正摇摇欲坠，走向令人不安的灰暗未来。§!"
 RULE_OPTION_THA_PHIBUN_DEAD_BOMB: "国会大厦§R爆破§!"
 RULE_OPTION_THA_PHIBUN_DEAD_BOMB_DESC: "§F大元帅披汶颂堪去世不到一周，泰国国民议会就遭受了恐怖袭击。在阿南达沙玛空皇家御会馆的会议期间，一枚炸弹在大楼内引爆，共计造成10名公务员死亡。议会主席成立了一个委员会来调查这起案件，同时，他还表示担心这次袭击可能是出于某种政治动机。\n\n有关专家同意议会主席的看法——这次袭击使得这个新生的共和国推举下一任总统的进程受到了重大挫折。而雪上加霜的是，有不少民众反对国民议会推举的候选人，他们认为可以采取一切必要手段来推迟议会的选举。§!"
 RULE_OPTION_THA_PHIBUN_DEAD_SANG_OUST: "§s桑§!就任§Y临时总统§!，然后被§R废黜§!"
 RULE_OPTION_THA_PHIBUN_DEAD_SANG_OUST_DESC: "§F§s桑·帕他诺泰§!当选泰国临时总统被认为是和平解决§J贝·披汶颂堪§!元帅之死留下巨大政治混乱的第一步。不幸的是，这一和平过渡最终未能实现，泰国国民军士兵于今日包围了泰国总理府，并以枪口逼迫§s帕他诺泰§!辞职。\n\n然而，军队内部关于谁应该领导泰国的分歧使动荡进一步加剧。虽然泰国国民军因共同反对§J帕他诺泰§!而联合起来，但也能未能逃脱困扰国民议会的派系斗争。曾经指向一致的枪口开始彼此对立，泰国似乎只能迎接满是混乱和鲜血的未来。§!"
 RULE_OPTION_THA_PHIBUN_DEAD_SANG_PRESIDENT: "§s桑§!就任§Y临时总统§!，然后§G正式出任§!§J总统§!一职"
 RULE_OPTION_THA_PHIBUN_DEAD_SANG_PRESIDENT_DESC: "§F动荡时期以失败的军事政变告终，§s桑·帕他诺泰§!随后受国民议会批准，正式就任泰国总统。这位前临时总统如今可以独揽大权。今天稍早时分的一次公开演讲中，§s帕他诺泰§!承诺不仅会维护已故元帅统治时期的旧有价值观，还会开辟一个创新和发展的新时代。他还承诺永远不会“向国家内外的敌人投降”。\n\n§s桑·帕他诺泰§!的正式任职冲击了泰国政坛。许多人还记得他被沙立·他那叻下令软禁的时候，而他与已故§J披汶§!元帅的密切关系也预示他无法成为泰国总统。但最终，这位新总统排除千难万险，并打算带领泰国走向新的未来。§!"
 THA_PATH: "£TNO_game_rule_flag_THA   泰国 - 军事政变"
 RULE_OPTION_THA_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_THA_PATH_RANDOM_DESC: "§F\n\n§R要求：§!\n£TNO_game_rule_flag_THA   §Y泰国 - 披汶之死§!中预设§M国会大厦爆破§!或§M桑§!§Y就任临时总统，然后被废黜§!§!"
 RULE_OPTION_THA_PATH_THAWAN: "£TNO_game_rule_flag_THA   §L他旺§!§R政变§!"
 RULE_OPTION_THA_PATH_THAWAN_DESC: "§F§J披汶§!大元帅死后，海军总司令§s他旺·探隆那瓦沙瓦§!集结部属驱逐了临时行政委员会，自任泰国总统。泰国将成为§L过渡民主制§!国家。司令坚持原则、不以巩固权势为先的作风大受好评。§L他旺§!将改革泰国政府，并宣布举行民主选举。§!"
 RULE_OPTION_THA_PATH_THANOM: "£TNO_game_rule_flag_THA   §s他侬§!§R政变§!"
 RULE_OPTION_THA_PATH_THANOM_DESC: "§F§J披汶§!大元帅死后，陆军元帅§s他侬·吉滴卡宗§!将发动政变，自任泰国总统，建立§s军政府§!。野蛮、无情、强大，§s他侬§!将会成为这一年轻共和国的暴君。§!"
 RULE_OPTION_THA_PATH_CHATICHAI: "£TNO_game_rule_flag_THA   §s差猜§!§R政变§!"
 RULE_OPTION_THA_PATH_CHATICHAI_DESC: "§F§J贝·披汶颂堪§!死后，声望卓著的已故屏·春哈旺元帅之子，§s差猜·春哈旺§!将军将率自己派系推翻政府，建立一个§s管理型国家§!。§s差猜§!是精英阶层支持的对象，也是§J披汶§!时期政策的支持者，然而，他还缺乏经验。不过，他已承诺为深陷泥潭的泰共和国带来财富、繁荣与安全——当然，加强国家镇压只是为此付出的小小代价。§!"
