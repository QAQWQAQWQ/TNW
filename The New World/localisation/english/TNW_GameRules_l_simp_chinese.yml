 RULE_OPTION_OVB_NAM_WAR_OUTCOME_RANDOM_DESC: "§F随着§g大阿非利加德意志邦§!的崩溃，一场斗争在纳米比亚爆发：一方是在奥万博兰起义后谋求实现愿景的安德巴·托沃-托沃，他是受泛非解放阵线支持的泛非主义者；另一方是寻求中立的左翼民族主义者萨姆·努乔马。\n\n§R要求：§!\n§Y大阿非利加德意志邦崩溃§!§!"
 RULE_OPTION_OVB_NAM_WAR_OUTCOME_NAM: "£TNO_game_rule_flag_NAM   加强§V纳米比亚§!"
 RULE_OPTION_OVB_NAM_WAR_OUTCOME_NAM_DESC: "§F萨姆·努乔马的政府军将粉碎奥万博兰起义，并在冷战期间坚持中立，粉碎泛非解放阵线的泛非纳米比亚梦想。§!"
 RULE_OPTION_OVB_NAM_WAR_OUTCOME_OVB: "£TNO_game_rule_flag_OVB   加强§V奥万博兰§!"
 RULE_OPTION_OVB_NAM_WAR_OUTCOME_OVB_DESC: "§F奥万博兰的泛非起义把萨姆·努乔马打得大败，泛非旗帜下的非洲离统一又近了一步。安德巴·托沃-托沃将建立一个新的泛非国家，使用前纳米比亚共和国的名称，寻求与泛非解放阵线结盟。§!"
 SOUTH_SUDAN_CIVIL_WAR_OUTCOME: "£TNO_game_rule_flag_AZA   £TNO_game_rule_flag_AYA   南苏丹内战"
