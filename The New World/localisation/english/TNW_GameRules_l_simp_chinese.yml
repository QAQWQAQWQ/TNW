 RULE_OPTION_SAF_SOUTH_AFRICAN_WAR_OUTCOME_RANDOM: "默认 - AI随机"
 RULE_OPTION_SAF_SOUTH_AFRICAN_WAR_OUTCOME_RANDOM_DESC: "§F最初，这是§J布尔§!分裂主义者与§j南非§!其他地区的§Y内战§!，但当§o德属§!§q非洲专员辖区§!结成“§q非洲之盾§!”、指挥大批军队涌入南方边境参与这场冲突之时，非洲的一切都与以往不一样了。它成为§Y地缘政治棋盘§!上的又一颗棋子，§Y冷战§!的又一个战场；当§M美国§!带着§M自由国家组织§!从天而降，它将成为又一场被载入史册的战争。这场战争的§G结果§!，必将§R震撼全球§!。§!"
 RULE_OPTION_SAF_SOUTH_AFRICAN_WAR_OUTCOME_AFRIKA_SCHILD: "£TNO_game_rule_flag_GER  £TNO_game_rule_flag_GRO  £TNO_game_rule_flag_COG_GER  £TNO_game_rule_flag_ANG_GER  £TNO_game_rule_flag_BOR  §q非洲之盾§!§G完胜§!"
 RULE_OPTION_SAF_SOUTH_AFRICAN_WAR_OUTCOME_AFRIKA_SCHILD_DESC: "§F§R出乎所有人的预料§!，§M自由国家组织§!重拳打击§o纳粹§!的所有幻想都将被§J布尔叛军§!和§q非洲之盾§!无情打破。§R压制§!§j南非§!军队并§R解决§!§MOFN§!干预后，§j布尔叛军§!最终§Y控制§!了§j南非§!的大部分领土，§q非洲之盾§!也开疆扩土，数百万人将对德国§q意志§!§R俯首称臣§!。然而，尽管取得了如此伟大的胜利，§x它可能还不足以满足一个人对权力的渴望。§!§!"
 RULE_OPTION_SAF_SOUTH_AFRICAN_WAR_OUTCOME_SAF: "£TNO_game_rule_flag_USA  £TNO_game_rule_flag_SAF  §j南非§!§G完胜§!"
 RULE_OPTION_SAF_SOUTH_AFRICAN_WAR_OUTCOME_SAF_DESC: "§F§j南非§!、§M美国§!和§M自由国家组织§!其他成员国将§G迅速§!镇压§J布尔叛乱§!，并继续推进，打得§q非洲之盾§!§G溃不成军§!，促成多年来反对§o纳粹主义§!的§K最大胜利§!之一。随着§o德国§!在§x非§!§q洲§!的存在被一举摧毁，§j南非§!和§MOFN§!不得不考虑如何管理专员辖区留下的§Y大片领土§!。他们如何处理这片土地，将决定数百万人的§Y未来§!。§!"
