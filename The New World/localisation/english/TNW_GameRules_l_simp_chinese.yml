 RULE_OPTION_CTL_IBERIAN_WARS_OTCOME_RANDOM_DESC: "§F西班牙东北地区的加泰罗尼亚传来骇人消息。伊比利亚战争仍未结束，此前的无政府工团主义恐怖组织CNT宣告了一场社会主义革命，并夺取了许多城镇；何塞普·塔拉德利亚斯领导的自由主义共和政府则似乎丧失了对这个新生国家众多城市的控制。尽管共和国仍在勉力坚持，但突发的叛乱对她造成了严重伤害，巴塞罗那的街道上已经爆发街头械斗。\n\n§R要求：§!\n§Y加泰罗尼亚崩溃§!"
 RULE_OPTION_CTL_IBERIAN_WARS_OTCOME_CTL: "£TNO_game_rule_flag_CTL   加泰罗尼亚政府军胜利"
 RULE_OPTION_CTL_IBERIAN_WARS_OTCOME_CTL_DESC: "§F饱受兵燹之苦的加泰罗尼亚传来了消息。在社会主义起义爆发之后，许多城市都陷入血腥的街头暴力之中。然而，在接下来的几周里，何塞普·塔拉德利亚斯和他领导的自由主义政府成功扑灭了CNT领导的起义。共和派重塑加泰罗尼亚的秩序，并重启进步主义的议程。新的加泰政府还倡导在佛朗哥政府时期饱受打压的加泰罗尼亚语的复兴，同时与OFN和西班牙共和国保持着紧密的友好关系。加泰罗尼亚将延续§M自由主义§!道路。§!"
 RULE_OPTION_CTL_IBERIAN_WARS_OTCOME_CNT: "£TNO_game_rule_flag_CNT   CNT胜利"
 RULE_OPTION_CTL_IBERIAN_WARS_OTCOME_CNT_DESC: "§F饱受兵燹之苦的加泰罗尼亚传来了消息。在社会主义起义爆发之后，许多城市都陷入血腥的街头暴力之中。街头暴力迅速恶化为全面内战，并转变为一场扫除一切旧秩序的残砖片瓦的革命行动。新的社会主义政权直接受到无政府工团主义组织CNT-FAI的启发，将人民阵线整合进了其政治派别之中。此外，CNT似乎成为革命的领导力量。西班牙内战中的一幕幕场景不断重演：工团没收富裕地主的财产、焚烧教堂，民兵即刻枪杀神职人员。加泰罗尼亚将由§V革命阵线§!统治。§!"
 CTL_PATH: "£TNO_game_rule_flag_CTL   加泰罗尼亚 - 崩溃"
 RULE_OPTION_CTL_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_CTL_PATH_RANDOM_DESC: "§F动荡局势愈演愈烈，人民反抗的浪潮也达到了高潮，饱受§O佛朗哥§!压迫之苦的人民将奋起反抗，投身于自我解放的事业。§w加泰罗尼亚§!，曾经西班牙的经济中心，将会在§M何塞普·塔拉德利亚斯§!的带领下，走上§M自由主义§!的道路。尽管没有最激进反佛朗哥派别的热情，但新政府将会维持§n稳定§!。§!"
 RULE_OPTION_CTL_PATH_COLLAPSED: "£TNO_game_rule_flag_CNT   加泰罗尼亚§R崩溃§!"
 RULE_OPTION_CTL_PATH_COLLAPSED_DESC: "§F加泰政府一直被观察家指出缺乏稳定，如今的事态果不出所料。前线的不断失败与公众支持的日渐低迷最终促使§M拉德利亚斯政府§!§x崩溃§!。一个承袭自过去全国劳工联盟与伊比利亚无政府主义联盟的§e无政府主义§!组织，§e加泰罗尼亚人民阵线§!从政府崩溃的混乱中崛起，占领了巴塞罗那的诸多战略要地。不过，即便日渐崩溃的§w加泰罗尼亚政府§!极不稳定且畏惧叛逃者的惊人数量，政府军还是尝试做出一定程度的抵抗。这使得§w加泰罗尼亚§!自我崩溃并陷入一场§x内战§!。§!"
 BSQ_PATH: "£TNO_game_rule_flag_BSQ   巴斯克 - 政变"
 RULE_OPTION_BSQ_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_BSQ_PATH_RANDOM_DESC: "§F当§w伊比利亚政府§!不再有能力维持其领土上稳定时，游击队的老巢，长期受压迫的§L巴斯克§!将会成为§x第一块骨牌§!。随着周遭的§w伊比利亚国家§!逐一崩溃，巴斯克人将团结在§m特莱斯福罗·蒙松§!，这位在巴斯克政坛广受爱戴，并同时深受§nEAJ§!和§WETA§!支持的领袖身后。对其他人来说这可能无比困难，但§M蒙松§!定会从容应对，全力维持§L巴斯克§!的§n稳定§!。§!"
 RULE_OPTION_BSQ_PATH_COLLAPSED: "巴斯克祖国与自由§R政变§!"
 RULE_OPTION_BSQ_PATH_COLLAPSED_DESC: "§F外国观察家认为§M特莱斯福罗·蒙松§!几乎不可能维持巴斯克的稳定——而最终他们的担忧成真了。随着时间的推移，§M蒙松政府§!渐渐与§W巴斯克祖国与自由§!分道扬镳，同时迫害全国的左派。而在无尽的迫害之下，§W埃塔§!会策划一场针对§M蒙松政府§!的政变，而这场政变最终会获得成功。他们会任命§e何塞·马里亚·克萨达§!为新的国家元首，抚平旧政府犯下的过错，§L巴斯克§!将成为§e布尔什维主义§!国家。§!"
