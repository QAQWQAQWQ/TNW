 RULE_OPTION_SOUTH_SUDAN_CIVIL_WAR_OUTCOME_RANDOM_DESC: "§F南苏丹正陷入内战——胜利将落入何方之手，全然取决于命运的安排。§!\n\n§R要求：§!\n§Y石油危机已经开始§!"
