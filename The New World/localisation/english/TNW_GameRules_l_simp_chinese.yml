 AAG_FATE: "£TNO_game_rule_flag_AAG   新施瓦本的命运"
 RULE_OPTION_AAG_FATE_RANDOM: "默认 - AI随机"
 RULE_OPTION_AAG_FATE_RANDOM_DESC: "§F德国陷入内战，新施瓦本将不再能从本土获得补给。新施瓦本的命运岌岌可危，驻扎在这里的人们将面临艰难的生存，直到德国内战结束并派出救援部队。§!"
 RULE_OPTION_AAG_FATE_SURVIVE: "§G幸存§!"
 RULE_OPTION_AAG_FATE_SURVIVE_DESC: "§F尽管遭遇了巨大的困难，新施瓦本仍然得以§G幸存§!。该选项将禁用新施瓦本崩溃。§!"
 RULE_OPTION_AAG_FATE_STARVED: "§R饥饿而亡§!"
 RULE_OPTION_AAG_FATE_STARVED_DESC: "§F补给最终耗尽，新施瓦本驻扎人员弹尽粮绝，饥饿而死。新施瓦本将就此终结，领地被各方瓜分。该选项将在1964年初且德国内战仍在持续的情况下，导致新施瓦本因饥饿而消亡。§!"
 AAG_NEW_ADMIN: "£TNO_game_rule_flag_AAG   新管理机构"
 RULE_OPTION_AAG_NEW_ADMIN_RANDOM: "默认 - AI随机"
 RULE_OPTION_AAG_NEW_ADMIN_RANDOM_DESC: "§F若新施瓦本幸存，新管理机构将默认随机。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_AAG  新施瓦本的命运§!中预设§M幸存§!"
 RULE_OPTION_AAG_NEW_ADMIN_SCIENTIFIC: "科学机构"
 RULE_OPTION_AAG_NEW_ADMIN_SCIENTIFIC_DESC: "§F若新施瓦本幸存，则将建立起新的科学机构。南极前哨的重点将调整为研究与发展。§!"
 RULE_OPTION_AAG_NEW_ADMIN_MILITARY: "军事机构"
 RULE_OPTION_AAG_NEW_ADMIN_MILITARY_DESC: "§F若新施瓦本幸存，则将建立起新的军事机构，南极前哨的重点将调整为保卫德国在极南大陆的领土，夺回OFN手中的失地。§!"
 RULE_OPTION_AAG_NEW_ADMIN_CIVILIAN: "民事机构"
 RULE_OPTION_AAG_NEW_ADMIN_CIVILIAN_DESC: "§F若新施瓦本幸存，则将建立起新的民事管理机构。尽管在过去遭遇了失败，但南极前哨的重心将再次放在殖民和永久的人口定居之上。§!"
