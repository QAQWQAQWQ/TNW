 RULE_OPTION_AAG_ASK_SUPPLIES_OFN_RESPONSE_RANDOM: "默认 - AI随机"
 RULE_OPTION_AAG_ASK_SUPPLIES_OFN_RESPONSE_RANDOM_DESC: "§FOFN南极洲事务局向新施瓦本补给请求的回复。§!"
 RULE_OPTION_AAG_ASK_SUPPLIES_OFN_RESPONSE_YES: "§F请求得到§G接受§!§!"
 RULE_OPTION_AAG_ASK_SUPPLIES_OFN_RESPONSE_YES_DESC: "§FOFN南极洲事务局将§G接受§!请求，向新施瓦本送出补给。§!"
 RULE_OPTION_AAG_ASK_SUPPLIES_OFN_RESPONSE_NO: "§F请求§R遭拒§!§!"
 RULE_OPTION_AAG_ASK_SUPPLIES_OFN_RESPONSE_NO_DESC: "§FOFN南极洲事务局将§R拒绝§!请求。§!"
 RULE_OPTION_AAG_ASK_SUPPLIES_OFN_RESPONSE_INVADE: "§R入侵§!"
 RULE_OPTION_AAG_ASK_SUPPLIES_OFN_RESPONSE_INVADE_DESC: "§FOFN南极洲事务局不但会拒绝请求，他们还因此而察觉到了新施瓦本的虚弱，将会派遣一支中情局研究观察团小队，向新施瓦本发动攻击。这将是新施瓦本的末日，其领地将遭到瓜分。请注意，“深冻行动”开发组已编写了AI脚本，若新施瓦本由玩家扮演，则AI不会选择该选项。如果您正在游玩新施瓦本，则不建议选用该选项。§!"
