 RULE_OPTION_MAD_SOCIALIST_LEADER_RANDOM: "默认 - AI随机"
 RULE_OPTION_MAD_SOCIALIST_LEADER_RANDOM_DESC: "§F§V马达加斯加§!岛原住民已将§M法兰西国§!及其柏林盟友联合控制的殖民政权连根拔起，挣脱了维希当局对岛上人民的压迫奴役，给法帝国主义的棺材板钉上了最后一颗钉子。\n\n随着原住民接管政权，左右该岛未来的选举也逐渐临近，来自§V各个社会主义党派§!的候选人们皆时刻准备迎战将至的暴雨。敌人正潜伏在海岸线外的重重迷雾之中，随时准备扼杀该国人民来之不易的自由……\n\n§R要求：§!\n§Y£TNO_game_rule_flag_MAD_insurgent   马达加斯加叛军 - 制宪会议§!中预设£TNO_game_rule_flag_MAD_akfm   §V僵局§!§!"
