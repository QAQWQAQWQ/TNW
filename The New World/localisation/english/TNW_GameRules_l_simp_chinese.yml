 IRE_ECONOMY: "£TNO_game_rule_flag_IRE   爱尔兰 - 经济政策"
 RULE_OPTION_IRE_ECONOMY_RANDOM: "默认 - AI随机"
 RULE_OPTION_IRE_ECONOMY_RANDOM_DESC: "§F爱尔兰的每一个人都清楚，必须采取措施以救济崩溃的经济。第二次世界大战后，翡翠岛将自己的经济全面捆绑进德国秩序之后，因此也不免在德国经济崩溃中陷入全面经济危机。如今，德国内战爆发给爱尔兰濒临崩溃的经济来了最后一击。不幸中的万幸，足足有三位政客或专家各自提出了救市计划，每一份计划也对应了对爱尔兰的不同愿景。许多工作尚未完成，但至少这几个人自信拥有解决的方法。§!"
 RULE_OPTION_IRE_ECONOMY_LEMASS: "勒马斯的计划"
 RULE_OPTION_IRE_ECONOMY_LEMASS_DESC: "§F§L勒马斯§!决定亲近§MOFN§!以提振经济，让爱尔兰市场相较§s德国§!更倾向§M美国§!。§!"
 RULE_OPTION_IRE_ECONOMY_MACENTEE: "麦肯蒂的计划"
 RULE_OPTION_IRE_ECONOMY_MACENTEE_DESC: "§F§G麦肯蒂§!提出的紧缩计划推崇德·瓦莱拉的保护主义政策与自给自足。同时，他还计划打破与§o德国§!的经济联系，让爱尔兰经济独立于德国经济。§!"
 RULE_OPTION_IRE_ECONOMY_CORISH: "科里什的计划"
 RULE_OPTION_IRE_ECONOMY_CORISH_DESC: "§F§P科里什§!的新共和国计划将使爱尔兰专注于§P养老金、医疗保健、工人福利§!等社会事务，或者说实行更§V社会主义§!的政策。§!"
 HOL_PATH: "£TNO_game_rule_flag_HOL_national_socialism   荷兰 - 阿图尔·赛斯-英夸特的继承者"
 RULE_OPTION_HOL_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_HOL_PATH_RANDOM_DESC: "§F二十余年来，被德国牢牢握在掌中的荷兰逐渐融为了德国本土的一部分。尽管在§o阿图尔·赛斯-英夸特§!专员的统治下，荷兰仍旧维持着现状，可在看似驯服的专员辖区内部，政治斗争却紧随着本土的局势而愈演愈烈。在§o赛斯-英夸特§!专员于1963年去世后，斗争就此达到白热化阶段，权力将落入最强者手中。他们是将带领荷兰走向§M辉煌未来§!，还是堕入§x黑暗之途§!？§!"
 RULE_OPTION_HOL_PATH_NATIONAL_SOCIALISM: "£TNO_game_rule_flag_HOL_national_socialism   §o德·罗赫蒙§!专员"
 RULE_OPTION_HOL_PATH_NATIONAL_SOCIALISM_DESC: "§F在这场因§o赛斯-英夸特§!专员去世而导致的权力斗争中，§o民族社会主义运动人民派§!夺取政权，辛克莱·德·罗赫蒙将作为新的专员掌控荷兰。荷兰将成为§o民族社会主义§!国家，为最终§e并入德国§!做好准备。§!"
 RULE_OPTION_HOL_PATH_FASCISM_REICHSKOMMISSAR: "£TNO_game_rule_flag_HOL_fascism   §J科内利斯§!专员"
 RULE_OPTION_HOL_PATH_FASCISM_REICHSKOMMISSAR_DESC: "§F在这场因§o赛斯-英夸特§!专员去世而导致的权力斗争中，§J民族社会主义运动穆塞特派§!夺取政权，§J科内利斯·范赫尔克肯§!将作为新的专员掌控荷兰。荷兰将成为§J法团主义§!国家。§!"
 RULE_OPTION_HOL_PATH_FASCISM_INDEPENDENCE: "£TNO_game_rule_flag_HOL_fascism   法西斯主义下的独立"
 RULE_OPTION_HOL_PATH_FASCISM_INDEPENDENCE_DESC: "§F§o赛斯-英夸特§!专员去世后的权力斗争中，§J民族社会主义运动穆塞特派§!夺取政权，其领袖§J科内利斯·范赫尔克肯§!宣布从德国彻底独立。荷兰将成为§J法团主义§!国家，最终目标为实现§J“荷兰民族社会主义”§!。§!"
 RULE_OPTION_HOL_PATH_DESPOTISM: "£TNO_game_rule_flag_HOL_despotism   §s比斯赫费尔§!专员"
 RULE_OPTION_HOL_PATH_DESPOTISM_DESC: "§F§o赛斯-英夸特§!专员去世后的权力斗争中，§s民族社会主义运动改革派§!夺取政权，§s巴伦德·比斯赫费尔§!将作为目前的领导人和未来的专员掌控荷兰。荷兰的政治体制将变为温和的§s文官独裁§!。§!"
