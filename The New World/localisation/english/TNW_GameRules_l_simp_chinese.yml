 RULE_OPTION_SPS_PATH_COLLAPSED_DESC: "§F由于不断遭遇军事失败以及政府内部争执激化，长枪党将彻底崩溃。受到战争的催化，前马德里市长卡洛斯·阿里亚斯所掌控的§q原教旨主义§!国家救赎阵线进一步倒向极端，他们将脱离博施的指挥并反戈一击，同时继续对其他派系发动进攻。如果这种混乱局面愈演愈烈，那么蓝色阵线的领导人§o何塞·路易斯·德·阿雷塞§!将发动政变，主张在§w伊比利亚§!半岛建立一个亲德的、偏向民族社会主义的政权。§!"
