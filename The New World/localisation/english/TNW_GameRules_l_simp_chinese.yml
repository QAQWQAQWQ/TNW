 RULE_OPTION_SAF_APPEASEMENT_ROUTE_RANDOM: "默认 - AI随机"
 RULE_OPTION_SAF_APPEASEMENT_ROUTE_RANDOM_DESC: "§F南非政治一片混乱。愈发激进的布尔民族主义者坚信政府没有满足其利益，非洲人游击队则继续反抗白人少数群体所掌控的种族主义政府。与此同时，北方的德国专员辖区如同秃鹫一般盘旋在脆弱的共和国周围，他们等待的只是一个入侵的借口，从而掐灭非洲大陆南部最后的民主火炬。南非将如何应对？§!"
 RULE_OPTION_SAF_APPEASEMENT_ROUTE_BOER: "£TNO_game_rule_flag_SAF   £TNO_game_rule_flag_BOR   重申对布尔人的忠诚"
 RULE_OPTION_SAF_APPEASEMENT_ROUTE_BOER_DESC: "§F南非将会重申其作为全体白人（不论英裔还是布尔人）政府的立场，并对国内的非洲人游击队发动大规模镇压，以此证明其对§J布尔民族主义者§!的感情。§!"
 RULE_OPTION_SAF_APPEASEMENT_ROUTE_ANC: "£TNO_game_rule_flag_SAF  £TNO_game_rule_flag_ANC   与非国大和解"
 RULE_OPTION_SAF_APPEASEMENT_ROUTE_ANC_DESC: "§F南非意识到布尔民族主义者欲壑难填，因而将与§V非洲人国民大会§!达成和解，并实施全面改革以赋予非洲原住民权利。这一举动会激怒布尔民族主义者，但确保了大多数非洲人的忠诚。§!"
 SAF_COPE_ROUTE: "£TNO_game_rule_flag_SAF   南非战争战略"
 RULE_OPTION_SAF_COPE_ROUTE_RANDOM: "默认 - AI随机"
 RULE_OPTION_SAF_COPE_ROUTE_RANDOM_DESC: "§F面对§J布尔人叛乱§!和§q非洲之盾§!的入侵，§j南非§!及其§s武装力量§!必须选定战争策略。究竟是采用镇暴手段压制§J布尔人§!，还是对§q非洲之盾§!发起敌后作战行动以削弱其攻势，§j南非§!只能优先贯彻二者之一。这场至关重要的抉择可能关乎战争的前景。\n\n§R要求：§!\n§Y£TNO_game_rule_flag_SAF   南非联邦中预设£TNO_game_rule_flag_SAF  £TNO_game_rule_flag_ANC   与非国大和解§!§!"
 RULE_OPTION_SAF_COPE_ROUTE_SCHILD: "£TNO_game_rule_flag_GRO  £TNO_game_rule_flag_COG_GER  £TNO_game_rule_flag_ANG_GER   粉碎§q非洲之盾§!"
 RULE_OPTION_SAF_COPE_ROUTE_SCHILD_DESC: "§F§j南非§!决定集中资源对§q非洲之盾§!发动间接打击，暗中支持、资助并供给§q专员辖区§!内部的起义。§j南非§!还将利用§m美国§!和本国的情报机构策反§q非洲之盾§!的军事力量，并向§q非洲之盾§!境内活动的众多§R游击队§!输送武器装备和补给。这一策略将阻碍§q非洲之盾§!的作战企图。§!"
 RULE_OPTION_SAF_COPE_ROUTE_BOER: "£TNO_game_rule_flag_BOR   专注平叛"
 RULE_OPTION_SAF_COPE_ROUTE_BOER_DESC: "§F§j南非§!决定专注于打击§J布尔人叛乱§!，发起平叛行动以遏制§J布尔人§!的反乱势头。§j南非§!将在一方面安抚农村地区，另一方面利用§m美国§!支持铲除人口密集地区的§J布尔人§!反叛分子，同时强制§J布尔人§!迁往戒备森严的村镇，阻止叛乱力量与其§G同情者§!取得联系。这一策略将§G削弱§!§J布尔人叛乱§!的影响力。§!"
 OFN_EAST_AFRICA_MANDATE_ROUTE: "£TNO_game_rule_flag_MZB_USA   OFN东非托管领去殖民化"
