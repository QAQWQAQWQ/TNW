 GUL_PATH: "£TNO_game_rule_flag_GUL_ITA   海湾总督领 - 独立"
 RULE_OPTION_GUL_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_GUL_PATH_RANDOM_DESC: "§F§n意大利§!属波斯湾领地虽小，却盛产§q黑金§!。自§n意大利§!勘探者踏上这片土地以来，被称为海湾总督领的漫天黄沙之地一直在为§n新罗马帝国§!的运转提供燃料。在§s埃尼§!集团及其独断专行的董事长，§s恩里科·马泰§!的统治下，海湾总督领已被塑造为一台开采机器，为§n帝国§!的血盆大口提供源源不断的石油。然而，随着20世纪60年代到来，一股§V变革之风§!吹过了中东的沙海，海湾总督领也不例外。无论是§s马泰§!还是§n意大利当局§!，都无力阻挡席卷阿拉伯世界的§V革命之火§!。他们会对新事物妥协，以确保石油能继续流向§n罗马§!吗？或者继续孤傲自负，最终被§V复兴的火焰§!燃烧殆尽？这一切仍悬而未决……§!"
 RULE_OPTION_GUL_PATH_OLIGARCHY: "£TNO_game_rule_flag_ITA   £TNO_game_rule_flag_GUL_paternalism    §L现代化的联邦§!"
 RULE_OPTION_GUL_PATH_OLIGARCHY_DESC: "§F§n意大利§!将给予海湾总督领独立，建立§L阿拉伯联合酋长国§!。各个酋长国将获得自治权，并在阿布扎比的统治者，§L扎耶德·本·苏丹·阿勒纳赫扬§!的领导下组成一个联邦。作为一位改革者、统一者，以及§n意大利人§!的盟友，§L扎耶德§!将大力促进经济发展，进行适度的民主改革，并与§n罗马当局§!保持密切联系。海湾总督领将成为§L寡头制§!国家。§!"
 RULE_OPTION_GUL_PATH_LEFT_WING_POPULISM: "£TNO_game_rule_flag_GUL_progressivism   §P革命理念§!"
 RULE_OPTION_GUL_PATH_LEFT_WING_POPULISM_DESC: "§F随着§n意大利§!对中东地区的掌控开始动摇，海湾总督领的阿拉伯行政人员将推翻§n意大利§!殖民者，宣布独立于§G罗马当局§!。在§P阿卜杜勒·拉赫曼·巴基尔§!以及§P民族联盟委员会§!的领导下，海湾总督领将被重新命名为§P阿拉伯海湾联合共和国§!，并与席卷整个阿拉伯世界的§V复兴主义§!运动并肩作战。海湾总督府将成为§P左翼民粹主义§!国家。§!"
 RULE_OPTION_GUL_PATH_ABSOLUTE_MONARCHY: "£TNO_game_rule_flag_SAU   £TNO_game_rule_flag_GUL_despotism   §s回归传统§!"
 RULE_OPTION_GUL_PATH_ABSOLUTE_MONARCHY_DESC: "§F§n意大利§!将授予海湾总督领独立，并建立§s阿拉伯酋长国联盟§!。在阿布扎比的保守派统治者§s沙赫布特·本·苏丹·阿勒纳哈扬§!的领导下，这个新生的国家很有可能会与其统治者的政治盟友，§G沙特阿拉伯§!亲近。海湾总督领将成为§s绝对君主制§!国家。§!"
 RULE_OPTION_GUL_PATH_SYNDICALISM: "£TNO_game_rule_flag_GUL_socialist   §e革命由此发源§!"
 RULE_OPTION_GUL_PATH_SYNDICALISM_DESC: "§F随着§n意大利§!对中东的控制开始动摇，海湾总督领数量众多的底层劳工，其中大多数为南亚移民，将采取行动推翻殖民政权。由印度裔领袖§V古鲁达斯·达斯古普塔§!领导的§V全海湾工会大会§!将掀起一场成功的§e共产主义§!革命，在海湾总督领建立§V社会主义§!共和国。虽然新政府承诺海湾工人的苦难会从此结束，但它在局势翻天覆地的中东政治舞台上将扮演什么样的角色，仍然无人知晓。这个新生的§V社会主义§!政权是否能在即将到来的风暴中生存下来，还有待观察。海湾总督领将成为§V工团主义§!国家。§!"
 IME_PATH: "£TNO_game_rule_flag_IME   巴勒斯坦总督领 - 耶路撒冷会议"
 RULE_OPTION_IME_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_IME_PATH_RANDOM_DESC: "§F第二次§n意§!§V土§!战争结束后，人们开始思考如何维持当地持久稳定——由此召开了耶路撒冷会议。会议结果付诸天意——但至少是成功的。§!"
 RULE_OPTION_IME_PATH_PARTITION: "£TNO_game_rule_flag_ITA   £TNO_game_rule_flag_PAL  £TNO_game_rule_flag_ISR  £TNO_game_rule_flag_JOR  £TNO_game_rule_flag_LEB  £TNO_game_rule_flag_JER   分治"
 RULE_OPTION_IME_PATH_PARTITION_DESC: "§F第二次§n意§!§V土§!战争结束后，人们开始思考如何维持当地持久稳定——由此召开了耶路撒冷会议。会议结果是实行分治：§Q以色列§!、§K巴勒斯坦§!、§K约旦§!、§S黎巴嫩§!以及§L耶路撒冷城§!等新生国家雨后春笋般从旧殖民政权上萌发生长——不过一切都在§n罗马当局§!监管之下。§!"
 RULE_OPTION_IME_PATH_KINGDON: "£TNO_game_rule_flag_ITA   £TNO_game_rule_flag_PAL_Levant_Union_paternalism   §s王国§!"
 RULE_OPTION_IME_PATH_KINGDON_DESC: "§F第二次§n意§!§V土§!战争结束后，人们开始思考如何维持当地持久稳定——由此召开了耶路撒冷会议。一股君主制浪潮促使了§K阿拉伯联合王国§!的诞生，涵盖了前§n意属中东§!的全部领土——他们的王是阿卜杜拉一世·本·侯赛因，他们那“手足”般的保护者是§n意大利帝国§!。§!"
 RULE_OPTION_IME_PATH_FAIL: "£TNO_game_rule_flag_ISR  £TNO_game_rule_flag_PAL_communist  耶路撒冷会议§R破裂§!"
 RULE_OPTION_IME_PATH_FAIL_DESC: "§F第二次§n意§!§V土§!战争结束后，人们开始思考如何维持当地持久稳定——由此召开了耶路撒冷会议。然而，由于§n意大利§!部队的过分自信与过度干预，会议以混乱不堪、彻底失败的面目惨淡收场，并未得出任何结果。§!"
 IME_FAIL_PATH: "£TNO_game_rule_flag_IME   巴勒斯坦总督领 - 耶路撒冷会议失败"
 RULE_OPTION_IME_FAIL_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_IME_FAIL_PATH_RANDOM_DESC: "§F\n\n§R要求：§!\n§R耶路撒冷会议失败§!§!"
 RULE_OPTION_IME_FAIL_PATH_IRGUN: "£TNO_game_rule_flag_ISR  §i伊尔贡§!"
 RULE_OPTION_IME_FAIL_PATH_IRGUN_DESC: "§F耶路撒冷会议破裂，§n意大利§!在黎凡特的统治土崩瓦解。与此同时，大名鼎鼎的亲锡安主义组织“伊尔贡”在梅纳赫姆·贝京的领导下控制了该地。伊尔贡持建立以色列国的激进主张，憎恶并打压阿拉伯人，同时试图建立起犹太民族的主导地位。意属黎凡特将成为§s修正锡安主义§!国家。"
 RULE_OPTION_IME_FAIL_PATH_HARAKIYYIN: "£TNO_game_rule_flag_PAL_communist  §e阿民运§!"
 RULE_OPTION_IME_FAIL_PATH_HARAKIYYIN_DESC: "§F耶路撒冷会议破裂，§n意大利§!在黎凡特的统治土崩瓦解。与此同时，乔治·哈巴什领导的§e“阿民运”§!组织控制了当地。阿民运囊括了§e共产主义者、社会主义者以及各种左翼组织§!，坚定地反对§n意大利§!帝国主义。尽管如此，新生的共和国由于各派系之间缺乏团结，其稳定依旧欠佳，而锡安主义者针对其的抵抗也令局势雪上加霜。意属黎凡特将成为§e共产主义§!国家。§!"
 EGY_PATH: "£TNO_game_rule_flag_EGY   埃及 - 法鲁克的继承人"
 RULE_OPTION_EGY_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_EGY_PATH_RANDOM_DESC: "§F法鲁克曾道：“人生有限，王座纷迭。”如今，终于轮到这位老迈、放荡的埃及国王自己去面对亚兹拉尔或阿努比斯了。他留下的唯一继承人尚未成年，一众埃及贵族与§n意大利§!的代表聚在一起，开始商讨摄政的人选。由于不少人都想借此机会接过那臭名远扬的前国王的权柄，在权力金字塔里一跃登台，最终人选为何仍待分晓。§!"
 RULE_OPTION_EGY_PATH_DESPOTISM: "£TNO_game_rule_flag_EGY_despotism  §s穆奈姆§!§G当选§!"
 RULE_OPTION_EGY_PATH_DESPOTISM_DESC: "§F令人筋疲力尽的三方会议终见分晓，贵族、§n意大利§!代表和议会最终决定选择穆罕默德·阿卜杜勒·穆奈姆出任福阿德二世成年前的摄政。穆罕默德·阿卜杜勒·穆奈姆代表了当权势力，其任命标志着埃及君主制继续长命百岁。埃及将成为§s贵族保守主义§!国家。§!"
 RULE_OPTION_EGY_PATH_COLONIAL: "£TNO_game_rule_flag_ITA   £TNO_game_rule_flag_EGY_despotism  §s阿达尔贝托§!§G当选§!"
 RULE_OPTION_EGY_PATH_COLONIAL_DESC: "§F令人筋疲力尽的三方会议终见分晓，贵族、§n意大利§!代表和议会最终决定选择阿达尔贝托·迪·萨伏依出任福阿德二世成年前的摄政。整个埃及都被这个决定震撼了：§n意大利§!强迫埃及政府将外国王室任命为摄政，这不仅违宪，甚至还是公然将埃及最后仅剩下的一点主权践踏在脚底下。埃及，作为§n意大利帝国§!的一部分，似乎正朝着更加帝国主义的方向发展。埃及将由§s殖民政府§!统治。§!"
 RULE_OPTION_EGY_PATH_AD: "£TNO_game_rule_flag_EGY_paternalism  §L萨达特§!§G当选§!"
 RULE_OPTION_EGY_PATH_AD_DESC: "§F由于公众对埃及君主制及其妄行过于抵制，§n意大利§!决定支持安瓦尔·萨达特及其民主改革派系接管全国政权。新成立的宪法委员会希望将埃及重新定义为一个多元、自由且民主的共和国。§n意大利§!及其殖民帝国似乎决定继续放手埃及自决，自由的火炬则在地中海沿岸热烈欢腾。埃及的政治体制将变为§L临时政府§!。§!"
 JOR_ANNEX_PATH: "£TNO_game_rule_flag_ISR   以色列 - 约旦的命运"
 RULE_OPTION_JOR_ANNEX_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_JOR_ANNEX_PATH_RANDOM_DESC: "§F伊尔根设法控制了以色列，在黎凡特地区政治秩序崩溃而降临混乱中，梅纳赫姆·贝京将注意力转向了东方的约旦。在快速组织起对它的入侵行动之后，军队将入侵约旦，且不会遇到有组织的抵抗。在此之后，贝京将为这一地区考虑它的命运。有两种选择，第一种是将建立一个傀儡国家，通过一项和平协议与以色列结盟，许多巴勒斯坦人会对此大加挞伐。第二种更符合伊尔贡的激进派和修正锡安主义的想法，就是把它并入以色列，但必将在国内引发暴力浪潮。\n\n§R要求：§!\n§R耶路撒冷会议失败，且伊尔贡掌权§!"
 RULE_OPTION_JOR_ANNEX_PATH_ANNEX: "以色列§R吞并§!£TNO_game_rule_flag_JOR  约旦"
 RULE_OPTION_JOR_ANNEX_PATH_ANNEX_DESC: "§F以色列将会兼并约旦。以色列将成为§M民族自由主义§!国家。§!"
 RULE_OPTION_JOR_ANNEX_PATH_PUPPET: "£TNO_game_rule_flag_JOR  约旦独立"
 RULE_OPTION_JOR_ANNEX_PATH_PUPPET_DESC: "§F以色列将会与约旦签署和平协定。以色列将成为§s民族保守主义§!国家。§!"
 JOR_PATH_SUCCESSOR: "£TNO_game_rule_flag_JOR   约旦/黎凡特王国 - 阿卜杜拉赫的继任者"
 RULE_OPTION_JOR_PATH_SUCCESSOR_RANDOM: "默认 - AI随机"
 RULE_OPTION_JOR_PATH_SUCCESSOR_RANDOM_DESC: "§F阿卜杜拉赫国王已从凡俗世界登临不朽——自今世，往来世——只留下哈希姆家族空荡荡的王座。故国王的所有子嗣都在争夺王位，约旦的奠基人已逝，谁又将继承大统？\n\n§R要求：§!\n§R约旦或黎凡特王国是独立的§!§!"
 RULE_OPTION_JOR_PATH_SUCCESSOR_NAYEF: "§s纳伊夫§!§G继承王位§!"
 RULE_OPTION_JOR_PATH_SUCCESSOR_NAYEF_DESC: "§F§s纳伊夫·本·阿卜杜拉§!王子将在阿卜杜拉·本·侯赛因逝世后继任约旦国王。§!"
 RULE_OPTION_JOR_PATH_SUCCESSOR_HUSSEIN: "§L侯赛因§!§G继承王位§!"
 RULE_OPTION_JOR_PATH_SUCCESSOR_HUSSEIN_DESC: "§F以其自由主义观念而广受欢迎的§L侯赛因·本·塔拉勒§!王子将在阿卜杜拉·本·侯赛因逝世后继任约旦国王。§!"
 PAL_UNITED_PATH: "£TNO_game_rule_flag_PAL   巴勒斯坦 - 黎凡特的命运 - 阿民运"
 RULE_OPTION_PAL_UNITED_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_PAL_UNITED_PATH_RANDOM_DESC: "§F阿民运在黎凡特的权力已经得到巩固，但局势的下一步发展仍不明朗。巴勒斯坦人民解放阵线会成立吗？还是说，阿拉伯人民共和国的支持者将会胜出？\n\n§R要求：§!\n§R耶路撒冷会议破裂，阿民运入主黎凡特§!"
 RULE_OPTION_PAL_UNITED_PATH_ANNEX_YES: "£TNO_game_rule_flag_PAL_communist   §e阿拉伯人民共和国§!成立"
 RULE_OPTION_PAL_UNITED_PATH_ANNEX_YES_DESC: "§F乔治·哈巴什将在前意属黎凡特的土地上宣告成立§e阿拉伯人民共和国§!，其领土囊括巴勒斯坦、约旦与黎巴嫩。作为一个新生的§e共产主义§!-泛阿拉伯主义联邦政权，其将致力于对抗帝国主义，解放阿拉伯人民，并资助泛阿拉伯主义与社会运动。然而，巴勒斯坦内部的锡安主义者和其余的反动势力仍将负隅顽抗。§!"
 RULE_OPTION_PAL_UNITED_PATH_NO: "£TNO_game_rule_flag_PAL   §e解放巴勒斯坦人民阵线§!成立"
 RULE_OPTION_PAL_UNITED_PATH_NO_DESC: "§F乔治·哈巴什将宣布把阿民运改组为§e解放巴勒斯坦人民阵线§!，它将秉承旧巴勒斯坦共产党的精神。这个新生的政党承诺，巴人阵将代表巴勒斯坦所有民族的利益，在黎凡特建立起一个真正民主、平等的国家。黎巴嫩和约旦则将建立起卫星共和国，由巴人阵的支持者执掌。"
