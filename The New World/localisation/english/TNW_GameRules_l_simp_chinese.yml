 SPA_IBERIAN_WARS_OTCOME: "£TNO_game_rule_flag_IBR  £TNO_game_rule_flag_SPR_Republic  £TNO_game_rule_flag_SPS_Falangist  £TNO_game_rule_flag_FZL  £TNO_game_rule_flag_FSR   第二次西班牙内战 - 战争结果"
 RULE_OPTION_SPA_IBERIAN_WARS_OTCOME_RANDOM: "默认 - AI随机"
 RULE_OPTION_SPA_IBERIAN_WARS_OTCOME_RANDOM_DESC: "§F§w伊比利亚§!半岛再次陷入战火——又一场内战爆发了。信奉各种政治理念的新国家纷纷崛地而起，但胜利将会落入何人之手，尚有待观察。\n\n§G被选中的一方将获得大量战斗加成，这些加成会在§f西班牙§!或§w伊比利亚§!统一后被移除§!。尽管两位考迪罗试图拯救联盟，联盟仍然走向崩溃并陷入血腥的内战。§f西班牙§!主要的三派势力分别为§f西班牙共和国§!、联邦政府和长枪党。§!"
 RULE_OPTION_SPA_IBERIAN_WARS_OTCOME_IBR: "£TNO_game_rule_flag_IBR   联邦政府胜利"
 RULE_OPTION_SPA_IBERIAN_WARS_OTCOME_IBR_DESC: "§F§w伊比利亚§!半岛再次陷入战火——又一场内战爆发了。信奉各种政治理念的新国家纷纷崛地而起，但硝烟过后，旧秩序重新降临。考迪罗§O弗朗西斯科·佛朗哥§!领导的联邦政府将再次取得胜利。§!"
 RULE_OPTION_SPA_IBERIAN_WARS_OTCOME_SPS: "£TNO_game_rule_flag_SPS_Falangist   长枪党胜利"
 RULE_OPTION_SPA_IBERIAN_WARS_OTCOME_SPS_DESC: "§F§w伊比利亚§!半岛再次陷入战火——又一场内战爆发了。信奉各种政治理念的新国家纷纷崛地而起，但曾经的被遗弃者卷土重来。§J海梅·米兰斯·德尔·博施§!领导的长枪党将会取得胜利，§f西班牙§!将成为§J法团主义§!国家。§!"
 RULE_OPTION_SPA_IBERIAN_WARS_OTCOME_SPR: "£TNO_game_rule_flag_SPR_Republic   西班牙共和国胜利"
 RULE_OPTION_SPA_IBERIAN_WARS_OTCOME_SPR_DESC: "§F§w伊比利亚§!半岛再次陷入战火——又一场内战爆发了。信奉各种政治理念的新国家纷纷崛地而起，但人民的意志终将凯旋。§M托尔夸托·费尔南德斯-米兰达§!领导的民主的西班牙共和国将会捍卫她的地位，§f西班牙§!将成为§M自由主义§!国家。§!"
 RULE_OPTION_SPA_IBERIAN_WARS_OTCOME_FZL: "£TNO_game_rule_flag_FZL   蓝色阵线胜利"
 RULE_OPTION_SPA_IBERIAN_WARS_OTCOME_FZL_DESC: "§F§w伊比利亚§!半岛再次陷入战火——又一场内战爆发了。信奉各种政治理念的新国家纷纷崛地而起。在德国的支持下，§o何塞·路易斯·德·阿雷塞§!领导的蓝色阵线将会击败一切对手。§f西班牙§!将成为§o民族社会主义§!国家。\n\n§R要求：§!\n§Y长枪党西班牙崩溃§!§!"
 RULE_OPTION_SPA_IBERIAN_WARS_OTCOME_FSR: "£TNO_game_rule_flag_FSR   国家救赎阵线胜利"
 RULE_OPTION_SPA_IBERIAN_WARS_OTCOME_FSR_DESC: "§F§w伊比利亚§!半岛再次陷入战火——又一场内战爆发了。信奉各种政治理念的新国家纷纷崛地而起，但原教旨主义最终再度普照大地。§q卡洛斯·阿里亚斯·纳瓦罗§!领导的国家救赎阵线对异教徒的审判将拉开序幕；宗教裁判所，又或许是另一场收复失地运动，将会余烬复起。西班牙将成为§q原教旨主义§!国家。\n\n§R要求：§!\n§Y长枪党西班牙崩溃§!§!"
 SPR_PATH: "£TNO_game_rule_flag_SPR_Republic   西班牙共和国 - 政变"
 RULE_OPTION_SPR_PATH_RANDOM: "默认 - AI随机"
 RULE_OPTION_SPR_PATH_RANDOM_DESC: "§F反对佛朗哥的异见人士§M托尔夸托·费尔南德斯-米兰达§!致力于重建§m民主的§!§f西班牙§!，在他的领导下，§p西班牙共和国§!将成为内战中的一个§M自由主义派系§!。然而，民众的乐观情绪可能随着战事胶着而开始消退，这将会迫使政府采取某些§e可怕的措施……§!\n\n§R要求：§!\n§Y伊比利亚战争仍在持续§!§!"
 RULE_OPTION_SPR_PATH_KINGDOM: "£TNO_game_rule_flag_SPR_Kingdom   复辟君主制"
 RULE_OPTION_SPR_PATH_KINGDOM_DESC: "§F第二次西班牙内战愈演愈烈，而西班牙共和国的士气却在急剧衰减。许多人开始给政府贴上经验匮乏、败局已定乃至领导无方的标签。为避免垮台的命运，托尔夸托·费尔南德斯-米兰达在绝境中同胡安三世达成协议，允许后者加冕并出任国家元首，同时他的政府将更加关注国内事务。这一举动令人咋舌，但在费尔南德斯-米兰达看来，只要能维持住稳定，是君主还是共和他并不在乎。§!"
 MOR_IBERIAN_WARS_OTCOME: "£TNO_game_rule_flag_MOR  £TNO_game_rule_flag_RIF   摩洛哥内战 - 战争结果"
 RULE_OPTION_MOR_IBERIAN_WARS_OTCOME_RANDOM: "默认 - AI随机"
 RULE_OPTION_MOR_IBERIAN_WARS_OTCOME_RANDOM_DESC: "§F§w伊比利亚联邦政府§!轰然倒塌，暴力狂潮随之席卷整个半岛。现在，混沌的烈焰延烧到了前摩洛哥保护国的海岸。摩洛哥苏丹已经与占领军正式决裂，自立为新生的“摩洛哥王国”之王。与此同时，里夫被一个自由主义者、社会主义者和民族主义者所组成的起义军联盟所控制，他们都梦想着燃起共和与自由的火炬，照亮这个新兴独立国家的前路。摩洛哥的命运依然如坠浓雾，只能静候冲突各方做出抉择。§!"
 RULE_OPTION_MOR_IBERIAN_WARS_OTCOME_MOR: "£TNO_game_rule_flag_MOR   摩洛哥胜利"
 RULE_OPTION_MOR_IBERIAN_WARS_OTCOME_MOR_DESC: "§F§w伊比利亚联邦政府§!轰然倒塌，肆虐的暴力迅速席卷整个半岛。现在，暴乱之火已经延烧到前摩洛哥保护国的海岸。但是，这位前苏丹、现国王陛下已经用暴力成功镇压了里夫起义军的反政府叛乱，将和平重新带到了这个崭新国家的海岸。摩洛哥的未来现在攥在国王和他的宠臣们的手中，维持§s绝对君主制§!。§!"
 RULE_OPTION_MOR_IBERIAN_WARS_OTCOME_ANTI_MOROCCO: "£TNO_game_rule_flag_RIF   里夫共和国胜利"
 RULE_OPTION_MOR_IBERIAN_WARS_OTCOME_ANTI_MOROCCO_DESC: "§F§w伊比利亚联邦政府§!轰然倒塌，肆虐的暴力迅速席卷整个半岛。现在，暴乱之火已经延烧到前摩洛哥保护国的海岸。然而，尽管困难重重，里夫的理想主义义军依然成功挣脱了暴君和他的狗腿子们肆意强加的贵族专制的锁链。摩洛哥的未来属于人民和他们坚定如钢的意志！自由烈焰的烟云在崭新共和国的天空中飘散回荡。摩洛哥将成为§M自由主义§!国家。§!"
