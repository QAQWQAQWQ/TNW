 CRO_the_partisan_problem:0 "游击队问题"
 CRO_the_partisan_problem_desc:0 "从1941年开始，游击队时常谴责由轴心国战胜者支持的巴尔干各国政府。然而他们竟然不愿意去死，铁托继续率领一群恐怖分子妄图对抗克罗地亚的合法政府。"
 CRO_legacy_of_the_ustase:0 "乌斯塔沙的遗产"
 CRO_legacy_of_the_ustase_desc:0 "乌斯塔沙从未离去。他们给我们留下了一股强劲的政治运动，更糟糕的是他们感觉自己被意大利主子背叛了。也许他们正致力于和我们的仇敌德国合作，一同对抗我们。"
 CRO_bosnian_autonomy:0 "波斯尼亚自治权"
 CRO_bosnian_autonomy_desc:0 "波斯尼亚人在国内享受着相当高的自治权。虽然这是保持和平的一个必要条件，但也限制了中央政府管理波斯尼亚的能力。"
 CRO_the_sham_kingdom: "冒牌王国"
 CRO_the_sham_kingdom_desc: "虽然克罗地亚被迫协从意大利，但国内许多人，包括新国王与人民在内，都期待恩主能给他们赏些什么。与之对应，克罗地亚只不过是罗马城随意摆弄的玩物，得不到任何好处。我们生活在这样一个国家：国王不愿在位、政府得国不正、自治权也近乎为零，必须采取措施，纠正这种一厢情愿的关系。"
 CRO_Tomislav_II:0 "托米斯拉夫二世"
 POLITICS_TOMISLAV_II_DESC:0 "在二战烽火席卷欧陆之际，艾莫内·罗贝托·玛格丽塔·马里亚·朱塞佩·托里诺·迪·萨伏依-奥斯塔——这位意大利王室旁支亲王，以“托米斯拉夫二世”之名被强行加冕为克罗地亚国王。操着纯正托斯卡纳口音却不通半句克罗地亚语的他，从未踏足过这片将成其王土的土地。王冠不过是乌斯塔沙法西斯头目安特·帕韦利奇血腥统治的遮羞布，当艾莫内被迫接受这顶荆棘之冠时，便已深陷精心编织的政治骗局。\n\n傀儡王国的建立非但未终结克罗地亚的苦难，反而在乌斯塔沙制造的种族清洗风暴中雪上加霜。动荡摧毁了仅存的工业根基，本就脆弱的经济全面崩溃。直到1959年帕韦利奇暴毙，掌舵意大利的齐亚诺政府才借机镇压乌斯塔沙势力，将这群刽子手赶入地下。\n\n如今，真正的权柄掌握在意大利顾问团与驻军将领手中，托米斯拉夫二世不过是统治集团精心编排的提线木偶——端坐在萨格勒布王座上的他，既是国民憎恨的异族压迫象征，亦是强权政治下的不情不愿的丑角。随着国内反抗情绪突破临界点，这个亚得里亚海东岸的“火药桶”正将炽热引信引向邻国意大利，导火索正在日夜缩短。"
 CRO_Jure_Francetic:0 "尤雷·弗兰采蒂奇"
 CRO_Josip_Broz_Tito:0 "约瑟普·布罗兹·铁托"
 CRO_Zvonimir_II:0 "兹沃尼米尔二世"
 bosnia.4.t:0 "波斯尼亚游击队宣誓效忠"
 bosnia.4.d:0 "今晨，一封紧急讯息悄然落在罗马齐亚诺领袖的案前，它以迅雷不及掩耳之势，从波斯尼亚地区传来，那片土地，是克罗地亚王国的领土。换言之，它曾隶属于昔日的克罗地亚王国。因为克罗地亚王国已经在赤匪掀起的反叛狂澜中灰飞烟灭，其已成为铁托独立之路上的第一个战利品。\n\n在萨拉热窝，阿利雅·伊泽特贝戈维奇已组建起了一个临时政府，掌控了旧日王国的半壁江山。游击队并未抱有任何幻想，认为铁托会容忍他们在他的卧榻之侧酣睡，因此他们重申了对帝国、翁贝托国王和齐亚诺领袖的忠诚。他们与这个新兴的赤色“南斯拉夫”的紧张局势已然剑拔弩张，此番宣言更是火上浇油。不管怎样，与敌方势力范围中的盟友并肩作战，总好过我们孤军奋战。"
 bosnia.4.a:0 "致波斯尼亚的新盟友，愿我们携手共进！"
 cropartisans.13.t:0 "克罗地亚的紧张局势已至沸点"
 cropartisans.13.d:0 "南斯拉夫的局势已然岌岌可危。尽管我们谈判上费尽心思，给出的威胁也直截了当，但据我们特工的情报，南斯拉夫不仅无意屈从于意大利的霸权，更在密谋对我们庇佑下的波斯尼亚游击队发动攻击。此等行径断不可忍，故已令边境线上的意大利军队火速集结起来。我们的战略直截了当：以压倒性的优势，突破南斯拉夫的防御，直取其心脏要地，令其无从招架，唯有缴械投降。我们唯一担心的是三头同盟解体的后果可能会动摇军心，然此情此景，更激励我军速战速决。"
 cropartisans.13.a:0 "雄狮再次苏醒。"