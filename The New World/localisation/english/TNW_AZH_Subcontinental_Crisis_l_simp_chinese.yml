 GER_Subcontinental_Crisis_buildup_desc: "Our friend and ally in Asia, Pakistan, finds itself under a new threat - a hardline, pseudo-Bolshevist government has come to power in India, and they seek to destroy Pakistan's ability to defend itself, and see it annexed into India yet again. Japan's claws are evident in this new approach, with their government giving full backing to India's aggression. We must act immediately to preserve our ally's sovereignty, or else years of German effort will be wasted."
 JAP_Subcontinental_Crisis_buildup_desc: "While the American puppet state in India has been cast down and destroyed by our Hindustani friends, Germany's puppet state in India is alive and well - but if we have our way, it will be neither, soon enough. Should \"Pakistan\" continue to exist, it will open up all of Asia to German intervention. We must give full backing to our Hindustani allies and force Germany to abandon the idea of a Pakt member state in Asia - by hook or by crook."
