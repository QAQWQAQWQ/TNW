 SC_info_tt: "§W§Y次大陆危机§!已然成为§Y冷战§!的前缘战场，紧张局势不断升温。双方都不愿看到§B印度次大陆§!落入敌方手中，而将决定印度乃至§f亚细亚§!最终命运的，就要看双方对极限施压这一技巧的掌握谁更精妙了。\n\n§O准备度§!是评估危机的核心指标，它量化了双方捍卫自身利益、坚守立场的意愿与能力。若某一方的§O准备度§!到达§Y100%§!，表明该方坚决不会在侵略面前屈服；相反，若降至§Y0%§!，则意味着该方会选择§P退让§!，在§x核战危机§!面前临阵脱逃。\n\n我方的§O准备度§!透明可见，对方的§O准备度§!则隐藏在冷战的§L战争迷雾§!之中。这种不确定性将以对方§O准备度§!槽中的§j不明度§!来体现，代表着我们对对方§O准备度§!状态的最新预估。通过决议可以将其逐步§j揭示§!。\n\n双方必须竭尽全力提高§O准备度§!，若是形势逼人，也要想尽办法降低对手的§O准备度§!。根据对方的§O准备度§!状态，某些决议的效果将更为显著。§O准备度§!§Y80%§!为§x红线§!，一旦§x跨过红线§!，便再无退路可言。§x我们的敌人亦是如此§!。\n\n结束危机的方式有二：我们和对手中某一方的§O准备度§!降低到§Y0%§!则视为§P失败§!，从而令对方独吞胜果。\n\n久拖不决，必然生变。随着危机发展，倒计时便会开始，§Y临界点§!将到来。若双方势均力敌，或者§O准备度§!都低于30%，危机会陷入僵局；否则，§O准备度§!更低的一方将§P一败涂地§!，等同于§O准备度§!降低到§Y0%§!。\n§R要是§x双方§!都卡在§x红色区域§!的话……§!§!"
