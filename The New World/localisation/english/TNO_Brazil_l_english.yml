 ## Hundred Days Mechanic
 BRA_hundred_days_category: "The Hundred Days Crisis"
 BRA_hundred_days_info_tt: "The §YHundred Days Crisis§! will only be resolved once one of the four contenders reaches §G50%§! support, becoming interim President.\n\nThe military's threat of §Rintervention§! dangles over the Senado, a Sword of Damocles ready to strike if the 100 day period elapses or the political situation grows too §Runstable§!.\n\nTotal Support:\n§YKubitschek§! has §Y[?BRA_hd_kubitschek_support|1]%§! support.\n§VGoulart§! has §Y[?BRA_hd_goulart_support|1]%§! support.\n§QLacerda§! has §Y[?BRA_hd_lacerda_support|1]%§! support.\n§hAdhemar§! has §Y[?BRA_hd_adhemar_support|1]%§! support."

 BRA_hd_kubitschek_name: "§YJuscelino Kubitschek§!"

 BRA_hd_category_description: "Brazil is facing an unprecedented leadership crisis. While the Senado scrambles to settle on a new President in the next hundred days, §YJuscelino Kubitschek§!, §VJoão Goulart§!, §QCarlos Lacerda§!, and §hAdhemar de Barros§! call in favors and strike deals to try to come out on top.\n\nOnce a contender reaches §G50%§! support, the Senado will confirm their appointment. [BRA_hd_leader_info]"

 BRA_hd_leader_info_kubitschek: "Currently, §YKubitschek§! leads with §Y[?BRA_hd_kubitschek_support|1]%§! support."
