 BRA_test_dummy_act: "§RD§!§Gr§!§Bu§!§Yg§!§Cs§! Act"
 BRA_test_dummy_act_Desc: "This act will give free weed cocaine and metaamphetamine to all brazilians. it will also establish new facilities known as DRUG HOUSES where you can get drugs for free unlimited."

 BRA_test_dummy_act_2: "Guns act"
 BRA_test_dummy_act_2_Desc: "this act will give guns to everyone in the world. and make it legal to kill everyone with new guns so everyone can be killed with guns we give to everyone with this act."

 BRA_NATIONAL_ELECTRIC_ACT: "§VThe National Electric Act§!"
 BRA_NATIONAL_ELECTRIC_ACT_Desc: "One of the major factors that exacerbates the current energy crisis in Brazil is the fact that a substantial fraction of the electrical infrastructure is owned by foreign corporations. Poorer and rural citizens bear the brunt of this injustice. This bill will nationalize these electrical corporations in order to provide electricity at low cost to the people."

 BRA_VOTING_RIGHTS_ACT: "§VThe Voting Rights Act§!"
 BRA_VOTING_RIGHTS_ACT_Desc: "Our Republic is supposedly "democratic", but there is very good reason to doubt this when the illiterate, low-ranking military officers, and other marginalized groups are denied the vote. Accordingly, in order to promote the interests of democracy, this bill will expand the franchise to all Brazilian citizens without exception."

 BRA_AFRICAN_SURGE_RESOLUTION: "§QThe African Surge Resolution§!"
 BRA_AFRICAN_SURGE_RESOLUTION_Desc: "The war against the Reichskommissariate in southern Africa continues to rage; the conflict with the three German colonial tyrannies is nowhere near over. It is clear to any observer that additional support will be required if we are to drive the so-called "Aryan master race" back from the South African border. This law will send more reinforcements to the frontier so as to ensure that the Hitlerites are driven back."

 BRA_UNWAVERING_TORCH_ACT: "§QThe Unwavering Torch Act§!"
 BRA_UNWAVERING_TORCH_ACT_Desc: "In light of the unprecedented German aggression witnessed in South Africa and other places in the last two years, Brazil must find allies; the Americans and their Organization of Free Nations could not be better candidates for this. This bill gives the legislatures support and consent and thus arranges for Brazil's immediate admittance to the Organization of Free Nations as a full member."

 BRA_HIGHWAY_TO_PROSPERITY_ACT: "§YThe Highway to Prosperity Act§!"
 BRA_HIGHWAY_TO_PROSPERITY_ACT_Desc: "The Trans-Amazonian Highway connecting Brazil to its hinterlands and to the rest of South America has languished for lack of resources and funding since the fall of the Lott government. This bill will restore the lost funding and provide more money with a view on seeing the project through to completion. Whatever is required, Brazil will provide."

 BRA_SOUTH_AFRICAN_WITHDRAWAL_ACT: "§KThe South Africa Withdrawal Act§!"
 BRA_SOUTH_AFRICAN_WITHDRAWAL_ACT_Desc: "Brazilian blood has been shed on South African soil for a useless proxy boxing match between America and Germany. Ships and ships of Brazil's youth and treasures have been sent east, to no return. No more. This act, proposed by President Quadros, will bring our boys home from the lawless hellhole of Africa and save them from having to play the catspaw for America. As the act to enter South Africa was passed overwhelmingly by Congress, Quadros must ensure an act to ensure Brazil withdrawal from South Africa can also pass. Otherwise he will lack the legislatures approval and consent to do so. While Quadros could just ignore the legislature, arguing directly to the Supreme Court that they have no authority over foreign policy, it would be best to pass this bill through the legislature to prevent any unneeded political battles."

 BRA_LOTT_ACT: "§KThe Lott Act§!"
 BRA_LOTT_ACT_Desc: "This bill will once and for all prevent armed forces interference in Brazilian politics by setting new ground rules for military officers and harshly enforcing the rules already on the books to kick politics out of the armed forces and protect democracy in the Republic of Brazil. If it goes through, the Constitutionalists in our military will finally be empowered to help ensure our military fully embraces its rightful role of "uniformed civilians" and nothing more or less."

 BRA_AGRARIAN_RELIEF_ACT: "§KThe Agrarian Relief Act§!"
 BRA_AGRARIAN_RELIEF_ACT_Desc: "This bill aims to begin the process of agrarian reform. We will redistribute land from inefficient, money-gorged landowners, and hand it over to more deserving people - smallholders, peasants - who are better-placed to make sure it prospers. The bill also has emergency relief and loans to ensure the agriculutural sector does not suffer but continues to grow and improve. This will hopefully also put an end to the protests currently paralyzing our country."

 BRA_ENTRY_INTO_THE_ANDEAN_PACT: "§KEntry into the Andean Pact§!"
 BRA_ENTRY_INTO_THE_ANDEAN_PACT_Desc: "Ferocious debates are taking place all over the United States of Brazil as the ratification of the treaty for Brazilian entry into the Andean Pact is debated in the Congresso Nacional. The stakes are quite high: if the treaty is ratified, it means that Brazil will enter the Andean Pact as a full member. This will subject it to all that was agreed to in the negotiations. As the lists of people that support and oppose this move are large and often transcend party lines, careful political manoeuvring will be required to see this treaty ratification through."

 BRA_ANTI_RESTRICTION_ACT: "§KThe Anti-Restriction Act§!"
 BRA_ANTI_RESTRICTION_ACT_Desc: "This Act proposed by President Jânio Quadros will push through measures preventing excessive restrictions on economic activity of the sort that the previous Varguist governments were all too prone to doing. Not only will this prevent a large amount of taxpayer money from being syphoned off by the government in the course of enforcing these restrictions, it will also enable Brazil to do what it needs with state-owned companies one way or the other."

 BRA_ANTI_CORRUPTION_ACT: "§KThe Anti-Corruption Act§!"
 BRA_ANTI_CORRUPTION_ACT_Desc: "This Act proposed by President Jânio Quadros in the aftermath of the collapse of the Lott administration will decisively remediate a recent, glaringly obvious problem that feckless general left behind; that of corruption. By taking measures that are certain to immediately resolve the situation, we will sweep corruption out of Brazil. Reports to the effect that the proposed measures in the Act are mere bandages at best and exacerbate the issue at worst are propaganda by Lott loyalists."

 BRA_ANTI_TRUST_ACT: "§KThe Anti-Trust Act§!"
 BRA_ANTI_TRUST_ACT_Desc: "This Act proposed by President Jânio Quadros will push through measures preventing trusts from being formed by politicians and permitting investigations to be launched into any current or future attempts to form them. Those that say that this act somehow is meant to target the prominently corrupt PSP politician Adhemar de Barros, a known rival of the President, are spouting propaganda fed to them by hostile actors and should not be believed."

 BRA_ADHEMAR_DE_BARROS_IMPEACHMENT: "§KAdhemar de Barros Impeachment§!"
 BRA_ADHEMAR_DE_BARROS_IMPEACHMENT_Desc: "This act proposed by Ulysses Guimarães in the Chamber of Deputies, calls for the Impeachment of President Adhemar de Barros due to the President falling into a coma. The nation lacks a head of state to lead it and is instead being run by Laudo Natel, the Chief of Staff. This is blatantly unconstitutional and must be stopped. As the constitution holds no mechanism to remove a President incapable of fullfilling their duties, the legislative chambers will remove President de Barros."

 BRA_HEALTHCARE_BILL: "§KThe Healthcare Bill§!"
 BRA_HEALTHCARE_BILL_Desc: "Easily accessible healthcare is a right all Brazilians deserve but have been deprived of for far too long - this is something Adhemar de Barros is intimately familiar from his time as a doctor. This is something that the PSP will make into a reality with the healthcare bill. Of course, there is some debate as to the content of the bill - the UDN would prefer co-operation with private enterprise whereas the PTB petition for a public healthcare system. Regardless, passage of the bill is imperative if we wish to set a strong base for the rest of the presidency."

 BRA_NATIONAL_SCHOOL_EXPANSION_PROGRAM: "§KThe National School Expansion Program§!"
 BRA_NATIONAL_SCHOOL_EXPANSION_PROGRAM_Desc: "While education is present in all states, the extent of it is limited. Not all children have the privilege of going to school. This is a major factor holding Brazil back from further economic growth. Proposed on behalf of the President, the bill will seek through massive investment to ensure all children have access to schools, whether they live in cities or the countryside, and to ensure education reflects the patriotic values of Brazil."

 BRA_SOCIAL_SECURITY_REFORM_ACT: "§KSocial Security Reform Act§!"
 BRA_SOCIAL_SECURITY_REFORM_ACT_Desc: "This act proposed by Romeu de Campos Vergal seeks to build upon the social security laws established by Juscelino Kubitschek in his presidency. There exists many gaps in the security net that allow the old, disabled, and working poor to fall through and enter poverty. This bill will ensure this ends immediately."

 BRA_ADHEMAR_AGRARIAN_REFORM_ACT: "§KThe Agrarian Reform Act§!"
 BRA_ADHEMAR_AGRARIAN_REFORM_ACT_Desc: "This act proposed by Filinto Müller has been called by the President as one of the most impressive and important pieces of legislation in Brazilian history. Designed to solve the latifúndio crisis and redistribute land in the countryside. However the bill has been criticised by those in the PSD and PTB for being less ambitious than the Ex-President Lott's bill on agrarian reform and more limited in scope."

 BRA_NATIONAL_STANDARDIZATION_OF_WAGE_INDEXATION_ACT: "§KThe National Standardization of Wages Indexation Act§!"
 BRA_NATIONAL_STANDARDIZATION_OF_WAGE_INDEXATION_ACT_Desc: "Inflation has long been a runaway figure in Brazil's economy, soothed only by exceptional growth in recent decades. Recently, however, the situation has grown delicate; any lack of government prudence could trigger an §Rinflationary spiral§! the likes of which has been unseen since the 1890s.\n\nIn response, the lengthy National Standardization of Wages Indexation Act has frozen public sector wages, in nationalized industries and in government, to meet targets set by Brasília. It also grants the government more power to ensure consistent wage indexation nationwide, aiming for greater financial stability.\n\nRoundly criticized by both §Dright§! and §Vleft§!, the Act is likely to be repealed after upcoming elections. To the incumbent PSP, however, economic security demands economic sacrifices."

 BRA_LABOR_LAW_REFORM_ACT: "§KThe Labor Law Reform Act§!"
 BRA_LABOR_LAW_REFORM_ACT_Desc: "Far more than mere bureaucrats are employed by the government. Thousands of steel workers, manual laborers, and similar workers rely on the state for employment. A group of people so directly working for the benefit of the nation should have their livelihoods protected. They should know that, when they go home at the end of a long day's work, they won't wake up without a job. Through official processes, severance payments, and fewer justifications for sacking, these workers will rest easy knowing their profession is safe and sound. Of course, the opposition believe we are merely doing this to protect the so-called 'corrupt' government officials we've employed. The reality is that they simply can't imagine we care for the people."

 BRA_EDNA_AGRARIAN_REFORM_ACT: "§KAgrarian Reform Act§!"
 BRA_EDNA_AGRARIAN_REFORM_ACT_Desc: "Agriculture is our nation's largest industry and the one that it was founded on. However, land ownership has increasingly fallen into the hands of the few rather than the people. The government must intercede and pass a law that will further the cause of agrarian reform and the redistribution of property. Building on the work of Henrique Lott and surpassing the progress of the Adhemar de Barros government, the Agrarian Reform Act will act quickly to redistribute land so that more citizens will have access to land. Then, they and our nation can grow its access to capital and build generational wealth."

 BRA_VOTING_LAW_REFORM_ACT: "§KVoting Law Reform§!"
 BRA_VOTING_LAW_REFORM_ACT_Desc: "Millions of patriotic Brazilians are barred from voting because they are illiterate. Citizens should not have their voices silenced due merely to the station of their birth and the failure of the system to educate them properly. While universal suffrage cannot be granted overnight, the literacy requirements can be weakened. Now, an understanding of the alphabet will determine one's eligibility to vote. While only a rule change, this step will enfranchise millions of citizens and weaken the classism built into the current democratic system."

 BRA_NULLIFICATION_OF_EMBARGO_AGAINST_THE_PAKT: "§KNullification of Embargo Against the Pakt§!"
 BRA_NULLIFICATION_OF_EMBARGO_AGAINST_THE_PAKT_Desc: "Proposed by Senator Filinto Müller of the State of Mato Grosso, the bill calls for the end of trade restrictions with Germany and other members of the Einheitspakt. While restrictions will remain for goods produced in the conquered eastern Reichskommissariats, this act, if passed, will normalize relations between Brazil and Germany."

 BRA_IMPEACHMENT_OF_VICE_PRESIDENT_EDNA_LOTT: "§KImpeachment of Vice President Edna Lott§!"
 BRA_IMPEACHMENT_OF_VICE_PRESIDENT_EDNA_LOTT_Desc: "Due to recent revelations about the conduct of Vice President Lott and her collusion with foreign powers, Senator Filinto Müller has proposed the act of impeachment against the Vice President. Supported by Adhemar de Barros, impeachment would remove all PTB influence from government and ensure the next in the line of succession is the President of the Chamber of Deputies, Pedro Aleixo."

 BRA_UNIVERSAL_LITERACY_ACT: "§KThe Universal Literacy Act§!"
 BRA_UNIVERSAL_LITERACY_ACT_Desc: "What can a nation be judged by if not by its literature? By how well-read the common man is, how accessible its great plays, novels, and art are for its people? By how easy it is for the people to read the laws which govern them? And what does it say about Brazil if our people cannot read or write at all? This great disservice cannot stand. Expanded education facilities, in both urban and rural areas alike, will teach Brazil's youth the Brazilian word. Adult literacy programs will be implemented to help those that past administrations have left behind. All of Brazil will rejoice with pen and paper."

 BRA_AFFORDABLE_HEALTHCARE_BILL: "§KThe Affordable Healthcare Bill§!"
 BRA_AFFORDABLE_HEALTHCARE_BILL_Desc: "Health is the basis of all people. There is a reason when people celebrate and toast, they cheer for health. For Saúde. Therefore, we must support the health of all our citizens. Some, specifically within the PTB, have called for a state-run healthcare service. While this is nice in theory, in practice it is far beyond what the state can manage. That being said, Brazilians need help, and so we shall help them. Expanded programs and subsidies for lower-income patients, caps on certain drug prices, and new medical regulations to keep treatments affordable will ensure that when Brazilians call for help, help will arrive."

 BRA_NATIONAL_HEALTHCARE_ACT: "§KThe National Healthcare Act§!"
 BRA_NATIONAL_HEALTHCARE_ACT_Desc: "Health is the basis of all people. There is a reason when people celebrate and toast, they cheer for health. For Saúde. Therefore, we must go above and beyond for Brazil's health. Let no cost or expenditure dissuade us, Brazilians will receive the finest treatments the world can offer. A new, state-run healthcare service will be created to the benefit of all of Brazil's patients. Government-run hospitals, expanded scholarships for doctors working under the state, and little to no cost treatments will turn Brazil from a land of the sick and neglected to a land we can truly toast to."

 BRA_STANDARDS_IN_GOVERNMENT_ACT: "§KThe Standards in Government Act§!"
 BRA_STANDARDS_IN_GOVERNMENT_ACT_Desc: "So many civil servants and politicians have gotten far too comfortable acting as if the system works for them, rather than vice versa. It's high time to remind them that no, corruption is not an acceptable part of life, and no, they are not the exception. With a set of strict standards and guidelines put into place with this bill, even a singular fudged digit will be noticed,swiftly investigated, and punished if found guilty. Never another Adhemar!"

 BRA_NATIONAL_DEREGULATION_ACT: "§KThe National Deregulation Act§!"
 BRA_NATIONAL_DEREGULATION_ACT_Desc: "The lifeblood of a society is its local businesses. The influence they have over the daily life of Brazilians far outstretches the size of any one business. Unlike larger companies they have neither the time nor resources to satisfy the byzantine laws controlling them. Start up costs, planning requirements, and many other regulations hold back the potential found in the hidden corners of our economy. The National Deregulation Bill shall remove many of the restrictive barriers around small and medium businesses to help speed up economic growth."

 BRA_EDNA_REPEAL_OF_JAPANESE_IMMIGRATION_BAN: "§KJapanese Immigration Ban Rescindal§!"
 BRA_EDNA_REPEAL_OF_JAPANESE_IMMIGRATION_BAN_Desc: "For years, the Japanese-Brazilians have been persecuted by elements in government for their seeming inability to assimilate into local culture, their language and culture banned, and their rights taken away, with legislation by PSD giving the final blow to the weakened rights of the Japanese-Brazilians with the Immigration Ban of 1946.\n\nOr so they thought.\n\nRecognizing the malefic consequences of the immigration ban, the Senate has mobilized itself to repeal the ban on Japanese Immigration, getting this ghost to stop haunting the Japanese-Brazilian community that lived both in the city and in the countryside. This, however, is but one step towards ending the prejudices and discrimination that still are prevalent in Brazil, only time and effort will be able to turn these wounds into memories."

 BRA_WEST_AFRICAN_INTERVENTION_ACT: "§KWest African Intervention Act§!"
 BRA_WEST_AFRICAN_INTERVENTION_ACT_Desc: "As a staunch ally of freedom across the globe, it is only natural that Brazil should come to the aid of the OFN's benighted allies in West Africa. Of course, this would not be direct intervention - the sheer size and distance of the conflict would make such involvement impossible, and that is without considering the international implications of such an act. This Bill, however, will allow the President to authorize a less direct form of aid via a simple peacekeeping force, as to secure the region for liberal democracy."

 BRA_BRAZIL_AMERICA_ARMS_TREATY: "§KBrazil - America Arms Treaty§!"
 BRA_BRAZIL_AMERICA_ARMS_TREATY_Desc: "Recently agreed upon by the American and Brazilian governments, our Arms Treaty is now on the Senado floor. If ratified, it would further entrench the existing alliance with the United States, enshrine military cooperation with the nation into law and would involve American research and technical assistance to Brazil's armed forces, particularly in regard to its burgeoning nuclear program.\n\nSome senators have already come out against the treaty, decrying it as a crossing of the Rubicon into the U.S. sphere of influence that future governments may be powerless to reverse, but we must stress the overall strength this would grant Brazil on the world stage."
 
 BRA_BRAZILIAN_LABOR_ACT: "§KBrazilian Labor Act§!"
 BRA_BRAZILIAN_LABOR_ACT_Desc: "Many of the more offensive Varguist laws are thoroughly entrenched into the Brazilian political system - the key word being many. But luckily for us, a good chunk of them are just vulnerable enough for the UDN to strike decisively against them. In one streamlined Bill, the unions will no longer be able to hold the nation ransom over every single petty dispute. If they wish to continue existing they will either work with the state, or against the state."

 BRA_ERADICATE_ILLITERACY_ACT: "§KEradicate Illiteracy Act§!"
 BRA_ERADICATE_ILLITERACY_ACT_Desc: "One matter that has continued to hold Brazil back is our high illiteracy rates. At a time when the major powers have relegated illiteracy to irrelevance, Brazil has continued to languish in the den of iniquity and ignorance. Few areas have faced this more intensely than rural regions. Cut off from wider education systems and with priority placed on the prosperity of the cities, these areas have seen their education systems only bleed away their strength further.\n\nI will not stand this any longer. With this measure, the trend of ignoring Brazil's expansive rural regions shall be quashed, substituted with a new formula that increases support for rural education systems. These won't solve the crisis of rural illiteracy, but I know this measure will put us a lot closer to doing so, and will level the playing field entirely. By itself, that is already a fundamental triumph."

 BRA_NATIONAL_TRUTH_COMMISSION_ACT: "§KNational Truth Commission Act§!"
 BRA_NATIONAL_TRUTH_COMMISSION_ACT_Desc: "For far too long, victims of the Estado Novo have been crying out for justice as previous Varguist governments turned a blind eye to their forebear's crooked ways. The repression. The violence. The censorship. No more. A National Truth Commission will be introduced into the Senado, with the aim to uncover and atone for the crimes of the Estado Novo. This is no partisan attack, as many may accuse us of - indeed, the commission will be staffed by independent experts and Vargas himself will be excluded. The goal here is not political power, but closure for the innocent and the wronged."

 BRA_ANTI_RIOT_BILL: "§KAnti-Riot Bill§!"
 BRA_ANTI_RIOT_BILL_Desc: "The riots in São Paulo against Nikkei citizens in the Liberdade district are unacceptable and must be dealt with immediately. Our government has proposed a bill to enable the necessary precautions and actions to do so. The Anti-Riot Bill will permit the police and military to use exceptional powers, now and in any future rioting, to tackle and prevent cases of harm to innocents or to property of any kind. They will be given the right to arrest any civilian if there is a reasonable degree of suspicion such crimes have occurred, so that they may be prosecuted to the fullest extent of the law."
 
 BRA_RACIAL_DEMOCRACY_BILL: "§KRacial Democracy Bill§!"
 BRA_RACIAL_DEMOCRACY_BILL_Desc: "Lacerda may not have always gotten along with the figureheads of the Nikkei community, but that hasn't rendered him blind to their plight or woes. Recent reports surrounding the state of discrimination have made their way up to the Presidential Palace itself. Outraged, Lacerda has ordered the creation of a bill officially extending civil rights, providing legal recognition for Japanese and officially barring discrimination targeted against the Nikkei community.\n\nThis is only a limited first step. Laws against discrimination may be on the books, but they only prosecute the most blatant examples, and they only provide minor penalties. The Japanese language may be recognised, but only through the lens of education, and its use elsewhere is still mostly written off. Even still, however, it is a bright step in the right direction in the fight for a true, equal racial democracy within Brazil."

 BRA_LACERDA_REPEAL_OF_JAPANESE_IMMIGRATION_BAN: "§KRepeal of Japanese Immigration Ban§!"
 BRA_LACERDA_REPEAL_OF_JAPANESE_IMMIGRATION_BAN_Desc: "For many years now, Japanese immigration has been seen by the establishment as a political inconvenience at best, and an active risk to our nation's security at worst. This ban, however sensible it may have seemed at the time, was born of racism. This prejudice has prevented incalculable amounts of otherwise hard-working people seeking a better life in Brazil from entering and contributing to our nation - a grave error that this bill will soon put right."

 BRA_LACERDA_NATIONAL_SECURITY_LAWS_REFORM: "§KNational Security Laws Reform§!"
 BRA_LACERDA_NATIONAL_SECURITY_LAWS_REFORM_Desc: "Though it was Eduardo Gomes' administration that, in the name of national security, first put into law the banning of communist parties and the sanctioning of military intervention when deemed to be of national interest, Carlos Lacerda greatly expanded these powers. Military ministers have been granted the right to veto any laws pertaining to the armed forces. Allegiance with the OFN is now codified law. Military courts are sanctioned to handle cases related to dissident and radical forces within society.\n\nFrom its approval in Chamber and Senate, the laws were immediately used to purge constitutionalists from the armed forces. For the UDN, and for Lacerda himself, they are working as intended. The expanded National Security Laws shall forever vanquish the spectre of Varguism from military life—and provide a bulwark against its emergence in civilian spheres."

 BRA_LACERDA_HYDROELECTRIC_BILL: "§KHydroelectric Reform Bill§!"
 BRA_LACERDA_HYDROELECTRIC_BILL_Desc: "Not all bills have to be written with a partisan lean, and to be backed only by specific parties. Távora has proposed a new bill relating to hydroelectric power, encouraging its expansion across the entirety of Brazil, suggesting a number of key sites to use. This is an incredibly unusual step from Távora himself, not least with the corollaries of investment oming from the national government, rather than private investors.\n\nThe logic, Travora argues, is that such action is a legitimate place for the government to intervene. Only through government intervention, he argues, can such wide-reaching efforts be attained, and only through such government intervention combined with strong policies discouraging it can the risk of corrupt bargains be restricted. It is certainly an unusual development, but a nation like Brazil not being a major power is an unusual development in of itself."

 BRA_PRESIDENTIAL_LEGACY_FUND_ACT: "§KThe Presidential Legacy Fund Act§!"
 BRA_PRESIDENTIAL_LEGACY_FUND_ACT_Desc: "Each president is given a small fund they may use however they wish. Adhemar will create a presidential library in São Paulo to help education and combine this with his charity for healthcare."

 BRA_PRESIDENTIAL_PENSION_AND_PARDON_ACT: "§KThe Presidential Pension and Pardon Act§!"
 BRA_PRESIDENTIAL_PENSION_AND_PARDON_ACT_Desc: "All good things have to come to an end. The strengths of my administration aside, it is impossible to deny that a lot of people have grown tired of my continued hegemony over the party, and over the wallets of Brazil. With how many donations I've made across Brazil, it seems likely that the next administration will try to prosecute me. As such, I will advance a measure to write off these expenses as legal and to pardon their recipients.\n\nThere is already a lot of opposition towards this measure in the Chamber and Senate, and the biggest names in opposition parties are putting in the work to make sure that this bill is defeated. As it stands, I realise that this bill is likely doomed, and few people seem inclined to directly support it. But, thankfully, I'm not out of office yet. A couple of targeted bribes could help to remind those wavering voices just who is in their corner."

 BRA_5TH_REPUBLIC_CONSTITUTION: "§KFifth Republic Constitution§!"
 BRA_5TH_REPUBLIC_CONSTITUTION_Desc: "So much of Lacerda's term has been focused on fighting the stain of Varguism, and now, he stands on the cusp of total victory. Should this bill pass, Lacerda will call a new constitutional convention, seeking the total rewriting of the constitution with the aim of dismantling the protections and advantages it gives to Varguist principles. With its current contents, it's only a matter of time before another Estado Novo is formed.\n\nBeyond achieving his ambition, rewriting the constitution allows the UDN to secure its dominance. It's difficult to reject the trustworthiness of a party willing to follow their principles like this. And if the right wording is used, the UDN can ensure that only they will be in line to benefit from the electoral system, and can certify their dominance for a generation. What other party, after all, could be trusted to defend the constitution's liberty?"

 BRA_pl_bill_0: "§KTest Act§!"
 BRA_pl_bill_desc_0: "Test Act description"
 BRA_pl_unknown_bill: "§YUnknown Bill§!"

  #Assorted Laws
 BRA_national_security_act_law: "[get_BRA_national_security_act_law]"
 BRA_national_security_act_law_desc: "[get_BRA_national_security_act_law_desc]"

 BRA_national_security_act_law_0: "£GFX_BRA_NSA_texticon  §nNational Security Acts§! £GFX_BRA_NSA_texticon"
 BRA_national_security_act_law_0_desc: "While the £GFX_BRA_constitutionalists_texticon §nconstitution§! of the fourth republic has on paper made §nBrazil§! a democracy ruled by politicians, the reality could not be more different. In the £GFX_BRA_constitutionalists_texticon §nconstitution§! there lies the £GFX_BRA_NSA_texticon §nNational Security Acts§!. These acts grant the Military the £GFX_BRA_constitutionalists_texticon §nconstitutional duty§! to §Rintervene§! if the country is in danger of collapsing, legitimizing the Military's intervention in politics. In it there lies other laws §Rweakening§! §nBrazil's§! democratic political culture, including the §Rbanning§! of subversive £GFX_BRA_pcb_texticon £GFX_BRA_pcdob_texticon §ecommunist§! and £GFX_BRA_pnb_texticon §rnational socialist§! political parties.\n\n§RUntil the £GFX_BRA_NSA_texticon §nNational Security Acts§! can be nullified by another law, this Sword of Damocles is ready to fall at any time.§!"

 BRA_national_security_act_law_1: "£GFX_BRA_NSA_texticon §qExpanded§! §nNational Security Acts§! £GFX_BRA_NSA_texticon"
 BRA_national_security_act_law_1_desc: "Though it was Eduardo Gomes' administration that, in the name of national security, first put into law the banning of communist parties and the sanctioning of military intervention when deemed to be of national interest, Carlos Lacerda greatly expanded these powers. Military ministers have been granted the right to veto any laws pertaining to the armed forces. Allegiance with the OFN is now codified law. Military courts are sanctioned to handle cases related to dissident and radical forces within society.\n\nFrom its approval in Chamber and Senate, the laws were immediately used to purge constitutionalists from the armed forces. For the UDN, and for Lacerda himself, they are working as intended. The expanded National Security Laws shall forever vanquish the spectre of Varguism from military life—and provide a bulwark against its emergence in civilian spheres."

 BRA_varguist_labor_law: "£GFX_BRA_ptb_texticon  §VConsolidation of Labor Laws§! £GFX_BRA_ptb_texticon"
 BRA_varguist_labor_law_desc: "On the 1st of May, 1943, inspired by the Vatican's 1891 Rerum novarum, §VGetúlio Vargas§! signed one of the most important documents of §nBrazilian§! history: a leatherbound manual of legislation that holds in its pages the livelihoods of every laborer, every farmhand, every pé-de-boi, and every §nBrazilian§! who toils for someone else's profit.\n\nWhile the £GFX_BRA_ptb_texticon  §VConsolidation of Labor Laws§! £GFX_BRA_ptb_texticon includes laws from well before §VVargas§!' time in office, the §VCLT§! persists as a defining piece of his §Vlegacy§!. Among many of its protections are the right for the §nBrazilian§! to have vacations, receive a minimum wage, and work in suitable conditions. Loopholes and corruption have tested its effectiveness, but the §VCLT§! remains the closest the §VVarguists§! have to sacred scripture.\n\nFor the £GFX_BRA_udn_texticon §Qanti-Varguist§!, the §VCLT§! stinks of §rMussolini§!, its similarities to §rFascist Italy's Carta del Lavaro§! too close to comfort. An unassailable monument to corporatism, its chokehold on the §nBrazilian§! factory continues to taunt its opponents who want nothing more than to tame it of its power or tear it all down."

 BRA_racial_democracy_law: "£GFX_BRA_racial_texticon  §GRacial§! §DDemocracy§! £GFX_BRA_racial_texticon"
 BRA_racial_democracy_law_desc: "£GFX_BRA_racial_texticon §GRacial§! §DDemocracy§! is a unique facet of §nBrazilian§! society. While in Eurasia, the jackboot stomps down on groups deemed lesser, and in America segregation is the status quo in many states, in §nBrazil§! racism, indeed §Grace§! itself, is a thing of the past. In Brazil, all §Graces§! and §Dcultures§! are welcome to share in our beautiful country and take on the values of our enlightened and progressive society.\n\nAt all levels our government we will ensure that all peoples regardless of color or creed will have access to a robust §nPortuguese§! language education, taught of our historical triumphs, and have the opportunity to show their loyalty to the republic through patriotic associations.\n\nThe §nBrazilian people§! have defined themselves by what they stand against. §JFascism§! will never reach §nBrazil§!, as there is only one people united under a single flag. We will continue marching forwards, expecting the rest of the world to join us one day soon.§!"

 BRA_lgbt_rights_lgbt_allowed_law: "£GFX_BRA_gay_rights_texticon  §RDecri§!§Ominal§!§Yized§! §GSex§!§Dual§! §iMinor§!§pities§! £GFX_BRA_gay_rights_texticon"
 BRA_lgbt_rights_lgbt_allowed_law_desc: "§F§GSex§!§Dual§! §iMinor§!§pities§! rights exist in a gigantic loophole, a policy deemed too insignificant and unimportant for politicians to deal with while military coups occupy the day to day political system of the country. In 1830 §nBrazilian§! Emperor Dom Pedro I signed into law the new imperial penal code, which eliminated all references to sodomy, and the laws have remained the same since.\n\nHowever, §jdiscrimination§! remains rampant and for many §Ghomosexuality§! is defacto illegal, with it considered a mental illness by the Federal Council of Medicine and with the police taking overt action against any stepping out of line with societal norms.§!"

 BRA_the_lott_act_law: "£GFX_BRA_constitutionalists_texticon  §nThe Lott Act§! £GFX_BRA_constitutionalists_texticon"
 BRA_the_lott_act_law_desc: "In order to curb the ever present militarist influence in §nBrazilian§! politics, §YPresident Lott§! and his allies mobilized and successfully managed to pass the £GFX_BRA_constitutionalists_texticon §nThe Lott Act§!. Under this act, the officer corps all throughout the §nBrazilian§! armed forces would see reform, removing £GFX_BRA_hardliners_texticon §gHardliner§! elements and replacing them with £GFX_BRA_constitutionalists_texticon §nConstitutionalists§! who would contribue to the democratic transfer of power and prevent military intervention in future elections."

 BRA_anti_jap_law: "[get_BRA_anti_jap_law]"
 BRA_anti_jap_law_desc: "[get_BRA_anti_jap_law_desc]"

 BRA_anti_jap_law_0: "£GFX_bra_hate_japanese_texticon  §ZJapanese Immigration Ban§! £GFX_bra_hate_japanese_texticon"
 BRA_anti_jap_law_0_desc: "§FAs £GFX_GNG_japanese_nation_texticon §jJapanese§! immigrants arrived at §KSão Paulo§! at the beginning of the 20th century and settled into agriculture, the government accused them of being unable to assimilate, prohibited their language and culture, and hotly debated their rights.\n\nDuring World War II, many were displaced and imprisoned in concentration camps. In 1946, the £GFX_BRA_psd_texticon §YPSD's Miguel Couto Filho§!, the son of a famous eugenicist, would propose a constitutional amendment §Rblocking§! all §jJapanese§! immigration. Despite token opposition from the £BRA_udn_texticon §QUDN§!, the ban proved popular in the postwar mood and passed.\n\nEven as §jJapanese§!-§nBrazilian§! communities dwindled, many did not have the money to return to £GFX_TNO_game_rule_flag_JAP  §jJapan§! or chose to stay out of genuine love for their new homeland. Due to widespread discrimination and police harassment, these communities have only become more insular. Now some are talking about radical action, but whether they represent a real threat or exist mostly in the minds of paranoid officials is hard to say.§!"
 
 BRA_anti_jap_law_1: "£GFX_bra_hate_japanese_texticon  §RRepealed§! §ZJapanese Immigration Ban§! £GFX_bra_hate_japanese_texticon"
 BRA_anti_jap_law_1_desc: "There has been a major stain on §nBrazil's§! reputation for the past couple of decades - ever since the war, there has been a complete and total ban of immigration from §jJapan§!, largely motivated by fear of fascist infiltration. Many have justified it by invoking this fear of the other, but the nation of Brazil has recongised this as the flawed, short-sighted, and bigoted law that it is. While §jJapan§! is indeed run by fascists, there is no shortage of dissidents and free thinkers seeking a better life elsewhere. By opening our doors to these dispossessed, we are tapping into a vast potential labor market, as well as validating Brazil's long-standing claim of being a nation that stands above race."
 #Adhemar Assorted Laws

 BRA_healthcare_bill_adhemar_law: "£BRA_psp_texticon  §hHealthcare Bill§! £BRA_psp_texticon"
 BRA_healthcare_bill_adhemar_law_desc: "Easily accessible healthcare is a right all Brazilians deserve but have been deprived of for far too long - this is something Adhemar de Barros is intimately familiar from his time as a doctor. This is something that the PSP has made into a reality with the healthcare bill."

 BRA_presidential_legacy_fund_adhemar_law: "£BRA_adhemar_legacy_texticon  §YPresidential Legacy Fund Act§! £BRA_adhemar_legacy_texticon"
 BRA_presidential_legacy_fund_adhemar_law_desc: "Each president given a small fund that they can use in the ways they wish. Adhemar will create a presidential library in São Paulo to help education and combine this with his charity for healthcare."

 BRA_presidential_pension_and_pardon_law: "£BRA_adhemar_slush_fund_texticon  §GPresidential Pension & Pardon Act§! £BRA_adhemar_slush_fund_texticon"
 BRA_presidential_pension_and_pardon_law_desc: "Each president will be given a pension and wage following their presidency that they can use. Presidents will be pardoned on completion of their term for actions they took during it."
 
 BRA_national_school_expansion_law: "£BRA_psp_texticon  §hNational School Expansion Program§! £BRA_psp_texticon"
 BRA_national_school_expansion_law_desc: "While education is present in all states, the extent of it was limited. Not all children have the privilege of going to school. This is a major factor holding Brazil back from further economic growth. Proposed on behalf of the President, the bill saught through massive investment to ensure all children have access to schools, whether they live in cities or the countryside, and to ensure education reflects the patriotic values of Brazil."

 BRA_social_security_reform_act_law: "£BRA_psp_texticon  §hSocial Security Reform Act§! £BRA_psp_texticon"
 BRA_social_security_reform_act_law_desc: "This act, proposed by Romeu de Campos Vergal, sought to build upon the social security laws established by Juscelino Kubitschek in his presidency. There existed many gaps in the security net that allow the old, disabled, and working poor to fall through and enter poverty. This bill will ensured this ends immediately."

 BRA_agrarian_reform_act_law: "£BRA_psp_texticon  §hAgrarian Reform Act§! £BRA_psp_texticon"
 BRA_agrarian_reform_act_law_desc: "This act, proposed by Filinto Müller, has been called by the President as one of the most impressive and important pieces of legislation in Brazilian history. Designed to solve the latifúndio crisis and redistribute land in the countryside."

 BRA_national_standardization_of_wages_indexation_act_law: "£BRA_psp_texticon  §hNational Standardization of Wages Indexation Act§! £BRA_psp_texticon"
 BRA_national_standardization_of_wages_indexation_act_law_desc: ""Inflation has long been a runaway figure in Brazil's economy, soothed only by exceptional growth in recent decades. Recently, however, the situation has grown delicate; any lack of government prudence could trigger an §Rinflationary spiral§! the likes of which has been unseen since the 1890s.\n\nIn response, the lengthy National Standardization of Wages Indexation Act has frozen public sector wages, in nationalized industries and in government, to meet targets set by Brasília. It also grants the government more power to ensure consistent wage indexation nationwide, aiming for greater financial stability.\n\nRoundly criticized by both §Dright§! and §Vleft§!, the Act is likely to be repealed after upcoming elections. To the incumbent PSP, however, economic security demands economic sacrifices.""

 BRA_labor_law_reform_act_law: "£BRA_psp_texticon  §hLabor Law Reform Act§! £BRA_psp_texticon"
 BRA_labor_law_reform_act_law_desc: "If any newcomer in 1970 thinks they can erase Adhemar and the §EPSP§!'s legacy at a pen stroke, they need to think again. The newly passed §OLabor Law Reform Act§! quashes any future zealous action to fire corporate or government appointees, from senior civil servants to service workers.\n\nBy mandating a higher rate of severance pay and more documentation to sack employees, the post-Adhemar administration has won the working class' support, if temporarily. Critics, however, decry this as a greedy power grab, keeping §EPSP§E officials in even when voted out or giving them a handy payout instead. In any case, it remains to be seen if the party's Laudo Natel can be the next "§VPai dos Pobres§!" or if Brazil's workers have been orphaned for good."
 
 BRA_pakt_embargo_law: "£GFX_GNG_Germany_texticon  §sNullification of Embargo Against the Pakt§! £GFX_GNG_Germany_texticon"
 BRA_pakt_embargo_law_desc: "Proposed by Senator Filinto Müller of the State of Mato Grosso, the bill calls for the end of trade restrictions with Germany and other members of the Einheitspakt. While restrictions will remain for goods produced in the conquered eastern Reichskommissariats, this act, if passed, will normalize relations between Brazil and Germany."

 BRA_german_brazilian_law: "£GFX_BRA_pnb_texticon  §rGerman-Brazilian Organization Act§! £GFX_BRA_pnb_texticon"
 BRA_german_brazilian_law_desc: "Brazil's relationship with Germany has been marked with suspicion ever since the end of the Second World War, with Brazil's sizable German population profoundly affected by legislation brought on by wartime hysteria. After over 20 years of tight restrictions, the German-Brazilian Organization Act has finally granted all Brazilians of German origin to organize themselves as they see fit, allowing German-Brazilian communities to come together without fear of repression at the hands of the Brazilian government.\n\nAlthough this law has been praised by civil rights activists, others are less enthusiastic. Critics of Adhemar's policies towards Germany are now worried that the lifting of these restrictions will open the door to the spreading of Nazi influence and ideology within Brazil, and it remains to be seen if these fears are founded."

 # Lacerda Assorted Laws

 BRA_national_truth_commission_law: "£GFX_BRI_MSS_ci_texticon §QNational §nTruth§! Commission§!£BRA_udn_texticon"
 BRA_national_truth_commission_law_desc: "The §QNational Truth Commission§! is an independent body set up to investigate the crimes committed on the government's behalf during the §nEstado Novo regime§!, spanning from the fall of the Old Republic in 1930 to §VVargas'§! resignation from the Presidency in 1949. The body is designed to bring about restorative justice for the victims of state violence during this time and against its perpetrators responsible for the pain they experienced.\n\nTo most, this is a step towards righting the many wrongs of the bygone dictatorship. However, the £GFX_BRA_psd_texticon §YPSD§! and £GFX_BRA_ptb_texticon §VPTB§! see this commission as nothing more than a political attack against §VVargas' legacy§!, an attempt to undermine democracy by tarring them with accusations of years-old brutality. The £GFX_BRA_udn_texticon §QUDN's§! counter is that the commission's powers are limited to reporting and publicizing crimes, not charging and imprisoning people."

 BRA_ENAP_law: "£BRA_udn_texticon  §QNational School of Public Administration§! £BRA_udn_texticon"
 BRA_ENAP_law_desc: "The §QNational School of Public Administration§! is a federal public foundation founded by President §QCarlos Lacerda§!. It is part of the §nBrazilian Ministry of Planning, Budget, and Management§!, with its function being crucial to increasing the state's efficiency. The school is now responsible for training the future of §nBrazil's government§!.\n\nFrom now on, entering the §QNational School of Public Administration§! and passing its exams will be the only way to become either a government official or a civil servant in §nBrazil§!. Proponents of this policy state that this will prevent cronyism from becoming a viable method to enter the civil service, allow for better public policy, and for its effective implementation in the future."

 BRA_rio_cocapital_law: "§n£GFX_GNG_Brazil_texticon  §nBrasília§! - §mRio§! Co-Capitals§! £GFX_GNG_Brazil_texticon"
 BRA_rio_cocapital_law_desc: "Previously, §mRio de Janeiro§! was the sole capital of §nBrazil§!. Then, that title was inherited by §nBrasília§!, the city created by former President §YJuscelino Kubitschek§!. To rectify the controversy over this changing of titles, it has been decided by President §QCarlos Lacerda§! that both §nBrasília§! and §mRio de Janeiro§! will be recognized as the capital cities of §nBrazil§!.\n\nIn practice, this means that §nBrasília§! will still remain §nBrazil's§! political and administrative capital, where the seat of government is held. As co-capital, §mRio de Janeiro§! has regained its status as the cultural heart of the country and will become the new home of several government departments in the coming years, even if §nBrasília§! remains the legislative heart of the country."

 BRA_state_of_siege_law: "£GFX_in_combat  §QState§! §Rof§! §QSiege§! £GFX_in_combat"
 BRA_state_of_siege_law_desc: "Though §VGetúlio Vargas§! may be gone, his ideas still haunt §nBrazil§!. §VVarguist§! candidates such as £GFX_BRA_ptb_texticon  §VJoão Goulart§! fought to steal the presidency from £GFX_BRA_udn_texticon  §QCarlos Lacerda§!, in order to enact their sinister plans. Should the §VVarguists§! win, §nBrazil§! will be plunged into stagnation and corruption.\n\nNow, with the blessing of the military, §QLacerda§! has near total control of the state apparatus. With these surgical tools, §QLacerda§! will excise the §VVarguist§! cancer from §nBrazil§! for once and for all. History will remember §QCarlos Lacerda§! as the greatest president of §nBrazil§!, not §VGetúlio Vargas§!."

 BRA_national_literacy_campaign_law: "£GFX_UKR_campaign_spivavtor_texticon  §QNational Literacy Campaign§! £GFX_UKR_campaign_spivavtor_texticon"
 BRA_national_literacy_campaign_law_desc: "Personally championed by President §QCarlos Lacerda§!, a legion of teachers, scholars and bureaucrats set forth to eradicate the scourge of illiteracy from §nBrazil§!. Inspired in part by the works of both §eMarxist§! professor Paulo Freire and the Ação Básica Cristã, the §QNational Literacy Campaign§! sought to improve the state of §nBrazilian education§! by ensuring that every citizen is given the means and the opportunity to learn how to read and write.\n\nThe Campaign guarantees access to literacy classes in both children's and adult education, sets funding and manpower for running said classes, and sets periodic goals for the improvement of §nBrazil's literacy rate§!. This is a campaign measured in decades, one that will long outlast President §QLacerda's§! own terms in office, but there is universal consensus among the political class of §nBrazil§! that full literacy is necessary for the development of the nation."

 BRA_UDN_moderate_healthcare_law: "£GFX_BRA_udn_texticon  §QUDN Moderate§! §RHealthcare Law§!  £GFX_Healthcare"
 BRA_UDN_moderate_healthcare_law_desc: "Signed into law by President §QCarlos Lacerda§!, the £GFX_Healthcare §RAffordable Healthcare Act§! guarantees fair and inexpensive health insurance to all §nBrazilian§! citizens. By subsiding §Rhealthcare§! costs for §nBrazil's§! poorest and providing funds for the expansion of hospitals, clinics and professional training, the §RAct§! attempts to expand services.\n\nWhile progressive critics have argued against the establishment of insurance schemes and subsidised costs, preferring a national health service closer to the Beveridge model, the passage of the £GFX_Healthcare §RAffordable Healthcare Act§! has improved conditions. All across §nBrazil§!, the quality and quantity of life has increased thanks to this Act."

 BRA_UDN_radical_healthcare_law: "£GFX_BRA_udn_texticon  §QUDN§! §RRadical Healthcare Law§! £GFX_Healthcare"
 BRA_UDN_radical_healthcare_law_desc: "The £GFX_Healthcare §RNational Healthcare Act§!, considering health to be 'a right of all and an obligation of the State', established a §Rhealth care system§! funded and managed by the §nBrazilian state§!. Its remit is expansive and its costs are high, but the §RUnified Health System§! has seen a rapid expansion in the health and wellbeing of §nBrazilian citizens§!.\n\nThe §RAct§! itself was signed into law by §QPresident Carlos Lacerda§! of the £GFX_BRA_udn_texticon §QUDN§!. Despite his history of supporting §Dfree-market policies§!, and despite rumours that his circle would have preferred a system of support rather than direct management, it was by his pen that this §RAct§! was signed into being."
 
 BRA_america_arms_treaty_law: "£GFX_GNG_Brazil_texticon  §nBrazil§! - §iAmerica§! £GFX_GNG_USA_texticon  §fNuclear Treaty§! £GFX_txticon_trust"
 BRA_america_arms_treaty_law_desc: "The product of a series of highly secretive negotiations, this treaty between the £GFX_GNG_USA_texticon  §iUnited States§! and §nBrazil§! £GFX_GNG_Brazil_texticon  promises to grant the rising country one of the most powerful arguments available to a nation in the modern age: §enuclear weapons§!. In exchange for closer military cooperation between §nBrazil§! and the §MOFN§!, the §iUnited States§! has pledged its most skilled scientists and technicians to aid in the country's §enuclear weapons program§!. To possess weapons of mass destruction is no small responsibility, and such confidence on the part of the §iUnited States§! has only further enshrined §nBrazil's§! role as a key component of the §MOrganization of Free Nations.§!"
 
 BRA_dismantled_labour_laws: "£GFX_BRA_udn_texticon  §QDismantled§! §RLabor§! §QLaws§! £GFX_BRA_udn_texticon"
 BRA_dismantled_labour_laws_desc: "§QLacerda§! has long waged an ideological war against the lingering influence of the §nEstado Novo§!, and with this piece of legislation, he has won a key victory. A new series of laws has been implemented according to the £GFX_BRA_udn_texticon §QUDN's§! vision for §nBrazil§!: §VUnion§! protections have been largely removed, while tighter regulations and a new mandatory minimum percentage of §Vunion§! participation have made it far more difficult to legally organize §Vstrikes§!.These laws have primed the country for the second blow: protections to the practice of §Vunion§! §Qbusting§!, and reduced regulations governing the §Vminimum wage§!. Indeed, while the defeat of §VVarguism§! within §nBrazil's§! labor sector will no doubt make the country an attractive hotspot for investment, various §Vunions§! affected by the legislation, as well as the £GFX_BRA_ptb_texticon §VPTB§!, have decried it as a brazen assault on the rights of the §nBrazilian§! §Vworker§!."
 
 BRA_5th_republic: "£GFX_GNG_Brazil_texticon §KFifth Republic Constitution§! £GFX_BRA_mil_support"
 BRA_5th_republic_desc: "There is a new §QEmperor§! of §nBrazil§! and his name is §QCarlos Lacerda§!.\n\nUnder the £GFX_BRA_udn_texticon §QUDN and Lacerda§!, §nBrazil§! has entered a new era, for better or for worse. There is no more opposition, and the people have been subdued. Every day the legacy of §VVargas§! is being destroyed, while §QLacerda§! further cements himself as one of the greats in §nBrazil's§! history, with his near unlimited power.\n\nWhile §QLacerda§! may be Emperor, the military has become his Shogun, holding the true power in §nBrazil§!. As the military grows further divided, however, many fear for the future of §nBrazil§!."
 
