 brazil_jk.3.t: "A Message on the Radio"
 brazil_jk.3: "It had been a long day at the mines for Paolo Varela, who greeted his wife Camila with a kiss before taking a seat and removing his hat. The faint electronic squealing of the radio took form as Paolo turned up the volume so it could be heard over the din of his wife's cooking and the cries of his two young children playing. He could make out the unmistikable voice of President Kubitschek's yearly address.\n\n"...we have much to discuss about our progress this year." The Varelas were seldom interested in national politics, their home in the heart of Mato Grosso far from Brazil's political center, but Paolo had little will to change the station. "Brazil is a future-minded nation, this was made clear with the completion of the Rio-São Paulo Line, the first railway of its kind in the Americas. We have exceeded our aims, building 1500 kilometers of new roads to connect our nation, and countless bridges and tunnels alike. We must also acknowledge, however, our failings. Congressional gridlock has stalled our plans for education reform, a fight we will continue."\n\n"Why won't you turn that thing off? All these politicians with their promises, all the same," Camila interjected, as the President continued. "We have also seen disappointing results in our development plans. We must weather this downturn as a nation, together, for our administration is working tirelessly to ensure the next years will be bountiful."\n\nWith a sigh Paolo summoned the energy to turn off the radio. These lofty men with their lofty dreams."
 brazil_jk.3.a: "Paolo dreamed of dinner."
 BRA_gp_speech_pn: "Brazil is a future-minded nation, this was made clear with the completion of the Rio-São Paulo Line, the first railway of its kind in the Americas."

