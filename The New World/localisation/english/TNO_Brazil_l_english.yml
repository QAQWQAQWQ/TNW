BRA_develop_encourage_migration_tt: "§YEncourage Migration to Cities§!\n§LWe will provide economic incentives for rural residents of in the [BRA_develop_selected_region] region to move to the cities, providing an ample labor force for the region's industrial sector.§![BRA_develop_cooldown_msg]\n\n§YEffects when selected:§!\n[BRA_develop_selected_region]\nMonthly Urban Population Growth: §G+0.25%§!\nAs urban population grows, we will unlock\n§Gmore building slots§!.\n§YWe will be unable to enact a development\nedict for 60 days.§!\n\nIt costs £political_power_texticon §R10§! to implement this edict."
BRA_develop_sponsor_projects_tt: "§YSponsor Industrial Growth§!\n§LThrough subsidies and tax breaks, we will encourage industry to develop in the [BRA_develop_selected_region] region.§![BRA_develop_cooldown_msg]\n\n§YEffects when selected:§!\n[BRA_develop_selected_region]\nMonthly Industry Growth: §G+0.25%§!\nOur §YGDP§! will receive a §Gsmall boost§!.\nAs industrialization increases, we will be able to §Gtax a larger share of our population§!.\n§YWe will be unable to enact a development\nedict for 60 days.§!\n\nIt costs £political_power_texticon §R10§! to implement this edict."
BRA_develop_subsidize_mech_tt: "§YSubsidize Mechanization§!\n§LFarmers in the [BRA_develop_selected_region] region keep our nation well-fed, but they toil without access to the latest technology. To show our gratitude, we will ensure the newest tractors, trucks, and combines are imported at affordable prices.§![BRA_develop_cooldown_msg]\n\n§YEffects when selected:§!\n[BRA_develop_selected_region]\nMonthly Mechanization Rate Growth: §G+0.25%§!\nAs the mechanization rate increases, our §Gpopulation growth will increase§!.\nOne of the affected state's §YGDP Growth§! will §Gincrease§!.\n§YWe will be unable to enact a development\nedict for 60 days.§!\n\nIt costs £political_power_texticon §R10§! to implement this edict."
BRA_develop_requisition_assets_tt: "§YRequisition Assets from Industry§!\n§LWith all of the aid we have provided in the past, it is only right that the industrial base in the [BRA_develop_selected_region] region should be put to use for our purposes. While this may discourge industrial growth in the future, it will certainly be a boon to our reserves in the short term.§![BRA_develop_cooldown_msg]\n\n§YEffects when selected:§!\n[BRA_develop_selected_region]\nMonthly Industry Growth: §R-0.25%§!\n§GOur reserves will receive an influx of cash§!.\nOur §YGDP§! will take a §Rsmall hit§!.\n§YWe will be unable to enact a development\nedict for 60 days.§!\n\nIt costs £political_power_texticon §R10§! to implement this edict."
BRA_develop_support_ranching_tt: "§YSupport Ranching§!\n\n§YEffects when selected:§!\n§GIncreases§! our §fGDP§! by §Y0.3%§!.\n§RIncreases§! §YForest Loss Per Year§! by §Y100 sq km§!.\n§YWe will be unable to enact a development\nedict for 60 days.§!\n\nIt costs £political_power_texticon §R15§! to implement this edict.\nWe will not have the capability to implement this edict if §YForest Loss Per Year§! is over §Y40,000 sq km§!.\n\n"
BRA_develop_expand_logging_tt: "§YExpand Logging§!\n\n§YEffects when selected:§!\n§GIncreases§! our §fGDP§! by §Y0.4%§!.\n§RIncreases§! §YForest Loss Per Year§! by §Y150 sq km§!.\n§YWe will be unable to enact a development\nedict for 60 days.§!\n\nIt costs £political_power_texticon §R20§! to implement this edict.\nWe will not have the capability to implement this edict if §YForest Loss Per Year§! is over §Y40,000 sq km§!.\n\n"
BRA_develop_bolster_cash_crops_tt: "§YBolster Cash Crops§!\n\n§YEffects when selected:§!\n§GIncreases§! our §fGDP§! by §Y0.2%§!.\n§RIncreases§! §YForest Loss Per Year§! by §Y75 sq km§!.\n§YWe will be unable to enact a development\nedict for 60 days.§!\n\nIt costs £political_power_texticon §R10§! to implement this edict.\nWe will not have the capability to implement this edict if §YForest Loss Per Year§! is over §Y40,000 sq km§!.\n\n"
BRA_develop_limit_deforestation_tt: "§YLimit Deforestation§!\n\n§YEffects when selected:§!\n§RDecreases§! our §fGDP§! by §Y0.2%§!.\n§GDecreases§! §YForest Loss Per Year§! by §Y300 sq km§!.\n§YWe will be unable to enact a development\nedict for 60 days.§!\n\nIt costs £political_power_texticon §R30§! to implement this edict.\nDeforestation must be ongoing to implement the edict.\n\n"

