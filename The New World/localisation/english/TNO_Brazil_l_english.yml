 BRA_conservatism_party: "PTN"
 BRA_conservatism_party_long: "Partido Trabalhista Nacional"
 BRA_conservatism_2_party: "UDN"
 BRA_conservatism_2_party_long: "União Democrática Nacional - Lacerdaists §F\n--------------\nAs long as there have been Varguists, there have been anti-Varguists. Out from the political currents that opposed the Estado Novo dictatorship sprang the National Democratic Union. Since then, the UDN has been committed to the defense of morality against encroaching totalitarianism, believing in the American model of democracy and the OFN's efforts against fascism. While some pragmatic members prefer cooperation with the PSD on its developmentalist approach, the UDN is also home to supporters of classical liberal economics and firmly believe in Brazil's ability to have a free robust economy.§!"
 BRA_paternalism_party: "PSP"
 BRA_paternalism_party_long: "Partido Social Progressista§F\n--------------\nWhat is unique about the Social Progressive Party's vague populist agenda is that corruption is an accepted reality. While conservative at its core, the party is willing to ally with anyone across the political spectrum, using bribes and under-the-table deals to maintain stable relationships with other parties and the military. Within the party, there also runs a pro-Reich undercurrent, coupled with skepticism of American influence, arising from German-Brazilian voters and some members' personal ties to the Nazis. The PSP is the party of pragmatism, laying bare the political machinations of Brazil.§!"
