 brazil.70.t: "Toscano on Patrol"
 brazil.70.desc: "Admiral Arnoldo Toscano was sat in the captain's quarters of the Cruiser Almirante Tamandarés, awaiting a report on the latest skirmish between his ships and a group of pirates. As he waited for the report he began to stew in frustration. For over a decade the Germans had continued to humiliate Brazil, constantly crossing over Brazilian waters and fishing, undermining his country's sovereignty. The Germans had only been getting more aggressive with their fishing and the oppression of their colonial subjects, driving more and more men to piracy to live. Toscano sighed as he thought about this, when suddenly a report came in.\n\n"Sir, all ships are reporting on schedule. Twelve pirate vessels have been destroyed utterly, three have been captured and seven have fled Brazilian waters. All of this with zero casualties." The young comms officer spoke in a grinding monotone, giving every report with a serious expression of grim certainty.\n\n"Understood, tell the ships to rejoin the task force." Toscano quickly replied and for the first time that week he allowed a smile to emerge on his face. Since Lott gave him an expanded task force he was able to effectively deal with incursions against both pirates and German fishing vessels. Toscano truly believed that the Lobster War would finally be put to an end."
 brazil.70.a: "The Germans will be pushed back, one way or another."
 
 brazil.71.t: "Fish in a Barrel"
 brazil.71.desc: ""Shit. Ah, shit shit shit, PULL UP THE POTS!" Kwame heard the frenzied shouts of his first mate above decks, and scrambled up to join him. He understood his panic immediately. A Brazilian fighter was strafing one of their sister ships, an even smaller dinghy a ways off their port side. Even a boat like that paid for itself a hundred times over out here, raking in thousands of Reichsmarks per week in precious and unguarded lobster. Well, practically unguarded. As he watched the vessel get riddled with bullets, Kwame realized that the rumours of Brazil taking action weren't as unfounded as he thought.\n\n"Just cut them, we don't have time! Get the engine running, we need to go now!" Kwame hurried up to the helm and turned a complete 180 away from the fighter, hoping against hope that it was too distracted with the other ships in his little flotilla to chase after him in particular. He might need to seek out a new profession after this. Well, assuming he survived.\n\nAs they sped off, the fighter finally sank the remains of its first target. The pilot checked around for new targets, as every ship in the flock he had ambushed began to scatter like frightened pigeons. His eyes passed over other small dinghies, a few decently sized trawlers, hell, there was even a freighter or two. One of the freighters in particular caught his eye, a big bastard that had broken off from the pirate fleet before any of the others.\n\nBut as he prepared to sink Kwame and his crew beneath the sea, along with their illegal cargo, he noticed something else. A small vessel in amongst the swarm, but significantly more modern than any of the others. As he focused in, he saw why. Ha. He had a new target."
 brazil.71.a: "Their Nazi ringleader had painted a bright red swastika on his deck."
 
 brazil.72.t: "A Liberian Deal"
 brazil.72.desc: "Walther Salles stood up from his seat, and shook hands with the man across from him. "Well, I believe we have a deal! In exchange for the ships and guns to defend your waters, you will extend that protection to anti-piracy efforts. Thank you for your time, Mr. Grimes." Liberia's Foreign Minister reciprocated the handshake warmly, and soon Salles was back on his way to Brazil. The constant flights to and from the edge of Africa were tiring, to say the least, but the collaboration of Africa's governments in piracy prevention was near priceless.\n\nWith every nation allied to the cause, fewer pirates were spotted in Brazilian waters. Salles suspected, quietly, that this was because many of the poorer countries actually sent some of those pirates, but it hardly mattered. Better to stop them at the source then chase pirate dinghies all over the ocean."
 brazil.72.a: "Salles tried to get some sleep over the drone of the turbines."
 
 brazil.73.t: "Easier Said Than Done"
 brazil.73.desc: "Walther Salles was lying on the floor in his office, staring vaguely at its patterned roof. For a while he had paced a track around the room, slumped in his chair, spun in his chair, he even tried jumping jacks for a minute or two. Nothing worked. Salles had, quite literally, zero idea on how to easily contact a bunch of insane Frenchmen ruling a small chunk of Africa.\n\nSo, he was lying on the floor. It was, uh, mildly childish, but Salles always found it helped him to think. Usually. It sure as hell wasn't doing anything for him now. There was no Free French Embassy, they didn't have a goddamn phone number, sending a letter was completely out of the question.He couldn't just drop in unannounced, he'd need to make contact before flying over. There was nothing for it. Salles had to call up the navy, and ask them to send some poor bastard (or a fleet of them) thousands of kilometres across the ocean to deliver a request to de Gaulle. Christ, this was going to be an awkward phone call."
 brazil.73.a: ""Yes, this is Salles. Can you put Toscano on the line?""
 
 brazil.74.t: "Brasília Wishes to Meet" #ffr event
 brazil.74.desc: "PLACEHOLDER The Brazilian Foreign Ministry wishes to meet with DeGaulle to negotiate French intervention in the Lobster War."
 brazil.74.a: "No, their issue is not our concern."
 brazil.74.b: "We would be more than glad to host!"

 brazil.75.t: "Landing in Abidjan"
 brazil.75.desc: "As Walther Salles watched the landscape of the Ivory Coast roll by from the window of his small plane, he wondered again if these French exiles could even live up to any deal they agreed to. This "country" was a place of extreme contradiction. Below him the native Ivorians harvested cocoa beans, crowded into market squares and went about their days, all while a tattered French tricolor flew above them. It looked bizarre, like the last remnant of an empire in terminal decline.\n\nBut as Salles stepped from the plane onto the runway, he saw something entirely different. Regiments of well dressed soldiers filled the perfectly maintained concrete field in front of him. Tanks formed a line behind them, and even further back loomed a battery of anti-aircraft guns. The last remnants of the proud French army were well protected, ostensibly in preparation to reclaim their long lost homeland. It seems the rumors of de Gaulle's singular focus were true. Speaking of...\n\n"Welcome to France!" The old man stood in front of his assembled soldiers, looking unreasonably proud in an ancient military uniform decorated with an obscene number of medals. He practically ran towards Salles, and gripped his hand a little too hard. "I understand Brazil seeks to help us in our great struggle! Come, come, we have much to discuss!""
 brazil.75.a: "De Gaulle practically dragged Salles away."
 
 brazil.76.t: "The Negotiations Begin" #ffr event
 brazil.76.desc: "PLACEHOLDER so everything has been set up, salles and degaulle begin talking.. degaulle demands tanks and guns because we need to kikll them pirates obviouslyu yes yes..."
 brazil.76.a: "The pawn has made it's move."
 
 brazil.77.t: "De Gaulle's Demands"
 brazil.77.desc: "Walther Salles smiled awkwardly as Charles de Gaulle finished up yet another story of his military conquests. Apparently, he had orchestrated the assassination of a German official only yesterday! He sure was proud of it. The "meeting" had gone on like this for hours, as de Gaulle got progressively drunker on ancient wine. Salles got the feeling he didn't meet foreign delegates too often.\n\n"Ha... Yes, very good Mr. de Gaulle. Now, much as I'd love to stay and chat a while longer, I have obligations elsewhere and I'll need to be leaving soon. So, what will it take to get you involved in the piracy crisis we are facing?" De Gaulle immediately sobered up and put his hands on the table, fixing Salles with a suddenly serious gaze. Salles leaned back, slightly. Maybe this old man was more than he appeared to be. De Gaulle reached into a drawer under his gigantic desk, drawing forth a single sheet of paper. He slid it across to Salles, and gestured for him to read.\n\n"These are our demands. While France would dearly love to combat the brigands and, GERMANS that plague you, the fight to reclaim our home requires... equipment. We need guns, Mr. Salles, guns and tanks. A lot of them." Salles' eyes widened as he reviewed the long list de Gaulle had given him, asking for thousands of weapons in no uncertain terms. Accepting this deal would be a... significant investment. The French remnants could be a hell of a help in stopping the Lobster War at its source, but was it worth it?"
 brazil.77.a: ""I'm sure we can work something out, Mr. de Gaulle. You have a deal.""
 brazil.77.b: ""These requests are absolutely ridiculous. No deal, Mr. de Gaulle.""
 
 brazil.78.t: "A Trans-Atlantic Agreement"
 brazil.78.desc: "Salles looked back over the list of assorted weapons de Gaulle had given him, and grinned. His plane was making its way back home to Brazil now, and while he sure wouldn't miss that little scrap of Africa, he found himself thinking of the people fondly. Crazy bastards, all of them. Still, Salles couldn't help but wish for their success, as unlikely as it might be.\n\nThe shipping of the guns and tanks de Gaulle requested would have to be done under heavy guard. The sheer size of the shipment would no doubt draw attention, but Salles suspected that was part of the reason for it in the first place. With this deal, Free France was being recognized by one of the largest nations in the world. Here's hoping de Gaulle would capitalize on it."
 brazil.78.a: "The remnants of France were legitimate again, for a little while."
 
 brazil.79.t: "A Trans-Atlantic Disappointment"
 brazil.79.desc: "Salles wasn't looking forward to reporting his failure to Lott. Already, as his plane made its way back home, he was running through scenarios out how he was going to spin such an obvious waste of time. This diplomatic defeat rendered the months spent getting an audience with de Gaulle totally wasted, a time investment they didn't have the resources to recover from smoothly. Still, de Gaulle's demands were entirely unreasonable. Brazil would deal with the pirates on its own, as usual.\n\nCrazy bastards. For all the obvious impossibility of their goals, Salles couldn't help but admire them. To tell the truth, he dearly wished he could have given them their guns. Maybe, just maybe, they might have had a chance."
 brazil.79.a: "The remnants of France would forever remain unrecognized, at least by Brazil."
 
 brazil.80.t: "The Expected Visitor"
 brazil.80.desc: "Calm afternoons did not come often to the Presidential Office. President Henrique Teixeira Lott was at work on a few pressing files, hoping to cash in on the interrupted work time to generate a free evening.\n\nLoud knocking on the door. No such luck.\n\n"Yes, Vice-President?" Lott asked without looking up.\n\n"Henrique, your order to the navy, it can be still countermanded. I've been looking for a few emissaries from the African sides and I think we can go for talks on cooperation on the issue. In particular the envoys from..."\n\n"No."\n\nQuadros' torrent of words was for once, completely dried up. The President looked at him. Shook his head. "There will be no countermanding, Jânio, for my decision to smash the pirates is final."\n\nPresident Lott knew his reputation. That he never changed his mind once it was set. It appeared his Vice-President, blessedly, would listen to reason for once, and not waste another word on the topic. Quadros' bottom lip moved uselessly, stuck as he was mid word. Then, the Vice-President closed his mouth. He stood there uselessly, wasting Lott's precious free time. Free time needed to actually run the country, instead of proposing hare-brained Lusotropical schemes. "Will that be all, Jânio?"\n\n"Yes, Henrique." It was Lott's turn to be taken aback. The Vice-President's fist shook impotently. The depth of Quadros' dismay and anger was apparent. The Vice-President was a passionate man. Yet even then it was rare for him to betray so brazenly his anger at a political rival. Lott did not find it in himself to feel bad about sticking to his plan.\n\nIt took until a few minutes after the last of Quadros' steps echoed away for Lott's peace of mind to return."
 brazil.80.a: "He'll get over this."
 
 brazil.81.t: "Toscano's Finishing Touches"
 brazil.81.desc: ""Hello? This is the Almirante Barroso to the coast. Can you hear me?"\n\n"Yes we can hear you Almirante Barroso."\n\n"Admiral Toscano would like to contact President Lott on the next course of action. Can we get a line through?"\n\n"Yes we'll get you a line to the President right now."\n\nThere was some static and a clicking, as the radio line was connected to Lott. "Hello? I was told Admiral Toscano wanted to speak to me."\n\n"Yes sir. He is right here."\n\nThere was some muffled shuffling coming from the ship line. Admiral Toscano came on the line and began to speak to Lott.\n\n"President Lott, we've come to the main area where the pirates have been operating. Me and some fellow tacticians have drawn up some plans and I would like to go over some of them with you before we take a course of action."\n\n"Well, what plans do you propose Admiral?"\n\n"The first one is a complete non-stop search for the pirates. No breaks what so ever. The men won't like it, but several officers have recommended it. The pirates are a small group and we'll need to cover a lot of ground if we want to catch them."\n\n"The second plan is to involve the Air Force, bring in an aircraft carrier and search planes. They'll spot them from the air and call in the Navy. While this may make the whole operation more disorganized, it means an effective search while sparing the men from working long hours."\n\n"The third plan is the most simple one. Just do a regular search with regular hours. Continue to sweep as we normally would. Nothing too crazy or stressful, but it probably will be the least effective of the options. What are your orders to proceed, sir?"\n\nLott grimaced. They would have to move quickly if they wanted to stop these raids on fishermen. But he didn't want a bungled operation. Thinking it over one last time, he gave his orders."
 brazil.81.a: ""We need to move quickly, do the first plan.""
 brazil.81.b: ""I'll call my contacts in the Air Force, we are doing the second plan.""
 brazil.81.c: ""Proceed as normal, the third plan is the safe option""
 
 brazil.82.t: "The Sailors' Request"
 brazil.82.desc: "The hot sun beared down on the bridge of the ship. The sailors sweat as they continue their back breaking work. Their skin soaked in salt, they hadn't had a break in days, a temporary sleep and short meal being their only rest.\n\nStanding on the bridge of the flagship, Admiral Toscano continued to look out to sea with his binoculars. His eyes strained from staring at the sea for days. The ships hadn't seen a thing of the pirates. It's like the pirates had disappeared off the face of the Earth.\n\n"Sir!" said Toscano's first officer, "Some of the sailors are demanding an immediate meeting with you! They are threatening to stop working!"\n\n"Send them up!" He ordered.\n\nAdmiral Toscano sat down. He rubbed his strained eyes. He had been worrying something like this would happen. The non-stop schedule had been a very unpopular decision.\n\nThe Admiral looked up as two exhausted looking sailors walked into the room.\n\nThe sailors walked forward.\n\n"Sir. We have been working ourselves to death these past couple days. This schedule is killing us all."\n\n"I can't change the plans," said Toscano. "Those orders came right from the top. We were ordered to catch these pirates as quickly as possible. And this is, unfortunately, the way to do it."\n\nToscano rubbed his forehead. He didn't know what to do.\n\nA sailor who had been silently listening this whole time spoke up.\n\n"What about a pay raise? It will make this work actually worth something."\n\nToscano thought about it. It would be an effective solution to his problems. But there would be a mess of legal paperwork. And some of his superior's wouldn't be happy about it. He would have to radio Lott to help him sort it. He looked at the grungy sailors, silently standing as he thought over the option in his head."
 brazil.82.a: ""You will have your raise""
 brazil.82.b: ""I'm sorry gentlemen, but I can't guarantee that right now.""
 
 brazil.83.t: "Rogue Wave"
 brazil.83.desc: "The refusal to raise the sailors wages had been the last straw for some of them. A strike has been declared among some of them, refusing to work until their pay is raised. The search for the pirates had to be halted immediately. Admiral Toscano was working around the clock to make sure the situation didn't escalate into a full blown mutiny. Tensions have never been higher in the Navy, with some officers calling for the immediate court martial of the sailors. Some of the more extreme ones were even calling for them to be shot for treason.\n\nWorse yet, the media had caught onto the strike. No one knew how the leak had gotten out, but they had seized on the situation nonetheless. The papers were plastered with headlines like 'ANARCHY ON THE HIGH SEAS?' and, 'A MODERN DAY BOUNTY?' The Brazilian public was becoming increasingly restless with the state of the mission. Admiral Toscano's name was being dragged through the mud. This entire situation was turning into a disaster for the Lott administration.\n\nThis pirate issue had been an utter mess for Lott. Decisive action was needed.\n\nDespite some protests from the party, Lott had decided to take full responsibility. He had sent several statements to the press, saying Admiral Toscano was completely free from any blame, that Lott had ordered the no break plan to be enacted, and the poor pay of the sailors would be rectified.\n\nLott had already signed several orders to pay the Navy crews. He hoped it would be enough to get them back to work, and had already sent a message to Admiral Toscano that gave into the sailors demands and ordered him to immediately resume the hunt for the pirates.\n\nThe pirates were still out there, prowling the ocean for their next target. And the crews needed to get back to work as soon as possible."
 brazil.83.a: "To stop the pirate menace."
 
 brazil.84.t: "Calm Southern Seas"
 brazil.84.desc: "The menace has been defeated! Their boats have been sunk and their plans have been foiled. Any pirates not captured or killed will be leaving the Atlantic empty-handed. Brazil's Lobster fishermen no longer need to worry about raids. The Brazilian government has destroyed the pirate scrounge, sending their ships to the bottom of the Ocean.\n\nAdmiral Toscano has been given a medal, and a well earned vacation for his part in the destruction of the lobster pirates. He seemed happy to do his duty, but weary from the long days he had to spend at sea.\n\nThis has of course been a huge score for Lott's government. The press has been raving about the excellent job they have done. Even some of Lott's enemies have admitted that he has done a good job in handling this situation. Lott has been very pleased at how the operation turned out.\n\nThe Fishermen were grateful as well, holding a huge rally in support of Lott for helping them. Ridding the ocean of pirates has been a boon to Lott's popularity nationwide. Brazilians have celebrated what they see as a great victory over those who would hurt Brazil.\n\nWhile the celebrations continue, the Ocean has gone still, as the storm passes over its ancient waters.\n\nPeace has finally returned to the South Atlantic."
 brazil.84.a: "And may it be lasting."
 
 brazil.85.t: "The Endless Sea"
 brazil.85.desc: "The Flagship rocked back and forth, the rest of the fleet following close behind, the endless ocean surrounding them as far as the naked eye could see.\n\nAdmiral Toscano stared off into the ocean on the bridge of the flagship. He turned to the radio operator working next to him.\n\n"Any sign of the pirates?"\n\n"We haven't seen a trace of them Sir."\n\nThe Admiral sighed. The pirates had been elusive to the Navy task force ever since they left port. They hid in the vastness of the sea, using its huge size to avoid their patrols. And every day that passed was another day of the fishermen's bounty being stolen.\n\nHe sat back and rubbed his eyes, strained from the constant staring off into the waves.\n\nAnother problem for him to deal with was the sailors. The constant search with no end in sight was demoralizing, and a general feeling of failure was starting to set in. Toscano had been trying to lift the spirits of the men, but the Admiral knew this could only work for so long. Eventually they would become too exhausted to continue. They couldn't go on like this much longer.\n\nSome reconsidering of the plan was needed. They couldn't work the men with no breaks. Maybe they could call in the air force. They would probably have to compensate them in some way, but their help would greatly increase their chances of finding the pirates.\n\nThe Admiral stopped rubbing his eyes and looked up again. He still saw an endless ocean without any interruptions in the water. And he still didn't see any signs of the pirates. As the radio operator continued to monitor the conditions of the other ships, the Admiral stood up and came to a decision."
 brazil.85.a: ""Call Lott. We need some help in finding the pirates.""
 brazil.85.b: "He sighed, grabbed his binoculars, and continued to look out the window."
 
 brazil.86.t: "A Request from the Air Force"
 brazil.86.desc: "Pressing the phone to his ear, Lott's eyes widened. "So you want a bigger budget?"\n\nThe voice on the other end of the line crackled to life. "Yes, Mr. President, we do. The fuel our pilots burn up has punched a big hole in our finances, so we'll need the money."\n\n"And would the effects of this prospective budget manifest immediately in you having more fuel?"\n\n"Well, no, Mr. President, but we'd need the money for repairs. We've got to keep these planes operational."\n\nLott winced. Repairs? If their planes needed repairs from small arms fire, they were wasting their money. Three options presented themselves immediately: accede to their demands, strongarm them or refuse entirely. The latter, to Lott, was the most urgently attractive. He cursed the beggars on the other end of the line, holding out for spare change while their bullet-ridden countrymen drowned in the brackish surf, but refusal would hardly save lives..."
 brazil.86.a: ""Our boats need the help. Fine.""
 brazil.86.b: ""You are in no position to haggle with your Commander-in-Chief. Give the Navy backup, or they'll come down on you harder than I will.""
 brazil.86.c: ""By all means, get poorer, because any fuel you're getting will come out of your own pockets. I refuse your barter.""
 
 brazil.87.t: "Seagulls"
 brazil.87.desc: "An aircraft carrier was being deployed to the area, and a squad of maritime search planes and naval bombers were preparing to fly as soon as possible.\n\nWith the application of the planes, the search for the pirates is expected to go much faster. The planes could sweep the entire ocean if necessary.\n\nLott had to get through a mess of bureaucracy to even talk to the air force generals. He would need to rectify that. But that issue would have to be solved later.\n\nAnother problem that came up was the generals wanted "compensation" for their help in the search. Lott had been forced to allow a bigger budget to the air force. He wished he hadn't had to jump through all these hoops to get them to obey the President.\n\nBut now, even though some shady measures had to be taken to guarantee their support, the air force was involved, and the operation may hopefully move much quicker, even though it had cost a pretty penny.\n\nSo engines were revved and wheels scraped against tarmac, as flight plans were drawn in offices. Fuel poured into tanks and bombs loaded into bomber bays. An ocean wide search was being prepared.\n\nThe Brazilian Air Force has been unleashed, and it will scour the skies until every last pirate ship is under the waves."
 brazil.87.a: "Soaring high above the ocean, the seagulls reign supreme."
 
 brazil.88.t: "Over the Horizon"
 brazil.88.desc: "A tiny dot over the horizon, barely visible. A sailor on watch down at one of the gun batteries spotted it and alerted his superior. And as the news climbed up the rank ladder, the fleet changed direction and began to move towards the dot.\n\nAdmiral Toscano stood on the bridge looking into the distance with his binoculars. It was a cluster of ships.\n\n"It's them." He said breathlessly.\n\nHe turned on his ship's intercom "Battle stations! The pirate ships have been spotted!"\n\nHe turned to the crew on the bridge. "I want a pursuit at 15 knots. Radio all other ships to do the same. Prepare to fire when in range."\n\nHe rushed over to the radio operator. "I need you to get me a line to President Lott. Tell them it's urgent."\n\nHe looked down at the deck of the ship. People were scrambling to their positions, to the battery and the gunnery stations. A nervous energy had engulfed the crew. After weeks of searching, they had finally found them.\n\n"We have a line to the President, Sir!" Said the radio operator.\n\nToscano grabbed the line. "Can you hear me Sir?"\n\n"Toscano?" said Lott from the other side of the line. "I can hear you. Is something wrong? It's early in the morning in Brasília. And-" There were some murmurs in the background. "Jânio is here as well."\n\n"We have spotted the pirates and are moving in to intercept them, we are off the coast. I was wondering if we could follow in pursuit of them and wait for reinforcements. Just in case there's too many pirates."\n\n"Well, that is fine by - What? Quadros wants to say something, give me a minute." There were some muffled noises from the other side.\n\nQuadros intejects, "You cannot wait, Admiral! What if the pirates escape? I must advise against this decision, we cannot let them slip through again."\n\nThere were some muffled noises from the other side of the phone. The two men seemed to be having an argument with each other. Moments passed, and finally Lott picked the line back up."
 brazil.88.a: ""Engage immediately, we cannot let them get away.""
 brazil.88.b: ""Follow them and wait for reinforcements.""
 brazil.88.c: ""Call the Air Force, we need their help.""
 
 brazil.89.t: "Choppy Waters"
 brazil.89.desc: "Another Pirate was hoisted out of the water. His arm was limply hanging, torn and bloody from bullets. As he was lowered onto the deck, he whimpered and loosely fell onto the deck of the ship. A Brazilian naval officer pointed his pistol at him and ordered some sailors to check him for weapons.\n\nAs the ships continued to sweep the area where the battle took place, a man on the bridge looked down and watched. They had pulled a lot of pirates out of the water. There were a lot of them, much more than was expected. It had taken a lot to rout the pirates. He sighed and looked back out to the sea. He watched as what remained of the Pirate ships sunk further under the water. The waters of the Atlantic consumed each ship's hull.\n\nHis fleet had taken a fair amount of damage, too. They were headed immediately to the nearest port for repairs and medical evacuation.\n\nCasualties had been relatively low, but it was still too much for Toscano to be happy with. He walked over to the radio operator to give his report on the situation to the President. At least the pirates wouldn't be a problem anymore."
 brazil.89.a: "A victory for Brazil in all fields."
 
 brazil.90.t: "Swept Away with the Tide" #the shitting tide
 brazil.90.desc: "Even though there were some worries that the wait for reinforcements would give the pirates an opportunity to get away, those fears proved to be unfounded. The pirates had been caught completely off guard and were not prepared to run away. When the reinforcements did arrive, they stood no chance.\n\nAdmiral Tosacno looked down from the bridge to the place where the battle happened. All that was left was swirling debris and some floating bodies. The pirates had been completely annihilated. The fleet was now resting and preparing to go back to port.\n\nToscano sighed in relief. After days of searching he had finally defeated the pirates. Quite easily as well. He turned to his first officer on the bridge. "Tell the other ships to prepare to move back to port. We're going home."\n\nAnd as he slowly walked over to the radio operator to give his report to Lott, he couldn't help but smile. This long journey was finally coming to an end. The pirates had been defeated, and the day was saved."
 brazil.90.a: "Relief on the High Seas."
 
 brazil.91.t: "A Liberian Success"
 brazil.91.desc: "Lott opened up a report that he had gotten from Admiral Toscano. Pirate reports from the shores of Liberia and nearby coastlines had dropped significantly. The Librarian Government had taken recent military action against these pirates, using the Brazilian equipment that was negotiated within the deal.\n\nWith a significant drop in the amount of pirates invading Brazilian waters, Toscano reported he was more able to deal with the remaining pirates.\n\nLott smiled and drank some of his coffee, the Librarians had upheld their end of the bargain and this was a huge success for Brazil. Weeks of effort chasing down pirates had been handed to the Liberians to do instead. Soon fishermen could fish without fears of attacks and there would be no repeat of the Japanese kidnapping crisis. This time the pen truly was mightier than the sword."
 brazil.91.a: "Not all of Quadros' idea's are mad."
 
 brazil.92.t: "The French Report"
 brazil.92.desc: "President Lott was staring out of his office window onto the city of Brasília. He was looking at the people walking around the city; the air was cool and the sky was free of clouds. He sipped a glass of water as he waited for his foreign secretary, Walther Salles, to arrive.\n\nPerfectly on time Salles walked into the room, "President, the Free French have reported their successes."\n\n"Good, and what have they said?" Lott quickly replied, turning around and going to sit at his desk.\n\n"The Free French have reported many successes dealing with pirates hiding within their territories and even defeating pirate warlords in other statelets' territories." Salles coughed before continuing, "I have a report from Toscano that supports this; pirate sightings have dropped dramatically. With the Free French on our side the lobster war with the pirates should soon be over."\n\nLott leaned back in his chair, smiled and stated, "Another victory for democracy.""
 brazil.92.a: "The Free French upheld their side of the bargain."

 brazil.100.t: "Brasília Paralyzed"
 brazil.100.desc: "The air has grown unseasonably cold in Brazil of late. Even as tempers run hot in the national legislature, Brazilians huddle carefully around radios and televisions. Fear has returned to the country, a thousand overlapping gusts of wind leaching hope for the future from all throughout the republic. The sudden cold snap, augur to a brewing storm, has obscured the future to all.\n\nIn Brasília the factions play their games. Chief among them is the PSD's Kubitschek. With the ascension of Goulart to the presidency as replacement for Quadros and Lott forestalled, former President Juscelino Kubitschek's supporters argue that only he has the capability to ascend to the presidency within the army's time limit. Popular within the liberal center and within elements of the left, Kubitschek is believed to possess the personal gravitas necessary to overcome the army's hatred for him.\n\nThe crisis has not only brought back the President from the political margins. The political right, weakened by its failures of the past decade, has surged back into the limelight. In these troubled times, after all, what better to assuage the fears of the army than a conservative government of the people? After the collapse of Quadros' political fortune, the austere Carlos Lacerda's resurgent control of the UDN is likely to help his ambition. Yet Lacerda is not the only schemer within the political right, as Adhemar de Barros' star continues to shine ever brighter. This unlikely couple has been forced into an uneasy coalition to check Kubitschek's advance.\n\nA thousand kilometers away, the unwitting instigator of the storm João Goulart sits in the Rio Grande do Sul, locked out of the capital's intrigue. Goulart remains a popular figure, free from the scandalous collapse of the late PSD-UDN coalition. Some within the country hope that Goulart can make it back to Brasília in time to break the deadlocked congress. Others in the nation scorn the idea of a king in the mountain coming to save them all. The winds blow cold in Brazil, and the coming storm is not likely to have a happy conclusion."
 brazil.100.a: "In the shadow of your wing I will take refuge."

 brazil.101.t: "The Crow and the Bull"
 brazil.101.desc: "Adhemar sauntered into the office, ignoring the staffers' meek protests. He found Lacerda sitting straight at his desk, staring into the distance. Two phones were precariously balanced on piles of papers on the edges of his desk. Unusual to see the usually disciplined Lacerda keep so untidy an office. These were unusual times. The same manic energy that had brought the UDN's grey eminence to feverishly awaiting phone calls had brought Adhemar to break precedent and seek to meet Lacerda personally, without the usual backchannels.\n\nLacerda slowly turned to look at the newcomer. A mixture of anger and curiosity danced behind his eyes. Perhaps the latter won out in the politician's heart as he tilted his head toward an empty chair.\n\n"Why are you here?" Asked Lacerda before his guest was seated. "My position has not changed since our last round of negotiations."\n\n"Come now, Carlos." The other man frowned at hearing his first name. Adhemar carried on. "I don't come all the way here to enjoy your sunny personality only. Kubitschek is screaming bloody murder, and every day more pansies in the legislature are starting to listen to his doommongering about the army. Not to mention that Goulart is..."\n\n"Goulart is irrelevant, and stuck in the south." Lacerda sighed. One of his phones began ringing.\n\n"Why don't you pick it up, my friend." Adhemar watched the other man. The phone rang on. "It will be good news. Those bureaucrats you tried to bribe are probably coming around to your side."\n\nThis time Lacerda's anger won out. "You fucking piece of shit, get out!" Anger distorted the UDN leader's traits. The manic energy remained, however. Ambition that burned into an all consuming fever. Adhemar knew how the other man felt.\n\nThe phone rang on. Lacerda sighed and picked up the line. Adhemar's smile deepened. Both had much work to do."
 brazil.101.a: "The start of a beautiful friendship."

 brazil.102.t: "The Oration"
 brazil.102.desc: "The sea of people stood in the plaza at these early hours in the morning, warmed up by the sun's ascent and the performance of the day's star. Carlos Lacerda directed the crowd's restless energy from a makeshift platform, adjacent to the plaza.\n\nThe assembled crowd's participants were manifold. Workers, having stopped on the way to their morning shift. Pensioners, bussed in by Adhemar to helpfully swell the crowd. Journalists, dutifully recording the speech. Here and there a few soldiers dotted the crowd, enthusiastically cheering. Little chance of beatnik trash disrupting the day's event.\n\n"And who is to blame for this crisis? Vultures, fraudsters, felons. The liberals and socialists have spent our country to the border of ruin. The desert they have made of Brazil they call a prosperous republic. Of our nation's institutions, those that still stand after a decade of graft are used as a shield against criticism. Is the Brazilian population not entitled to truth, to honesty?" A roar of assent from the crowd. "Is our Republic not entitled to good governance, to its proud place in the concert of nations?" Another roar of approval. Lacerda let the thunderous enthusiasm hold for a moment, before continuing. "My friends, the end of this period of crisis goes through a return of normalcy to politics. There is no hope for the future of the nation but the joint PSP-UDN ticket. As long as I stand I will continue the fight for our nation's future. But this fight we cannot win alone."\n\nThere, as the crowd's energy reached its highest tide, Lacerda's rhetoric would pivot into its final phase."
 brazil.102.a: ""We need the help of Brazilian workers.""
 brazil.102.b: ""We cannot do this without farmers.""
 brazil.102.c: ""We need the support of soldiers!""

 brazil.103.t: "The Old Devils"
 brazil.103.desc: "Lacerda was dismayed to find himself meeting with that day's visitor. His alliance with Adhemar was embarrassing but had been guessed by every politically savy Brazilian and their dog. This newest partner, however... Lacerda would have been delighted to keep to distant intermediaries. Sadly little was ever simple in Brazil.\n\nThe man opposite him was some mid level bureaucrat within the PRP. A man of modest caliber. Long gone were the days where the integralists could claim to hold Brazil's future in their hands. Vargas' downfall, and Salgado's failed coup in the fifties, had sealed the party's fate. Reduced to one senator, and a few members in the house of deputies, the PRP would soon be consigned to the history books. Yet, in these historical days, Adhemar had insisted that he and Lacerda look everywhere they could for any edge in the fight with Kubitschek and Goulart. Thus the UDN's leader had found himself plunged back into old ties with the PRP.\n\nThe PRP's offer of support was enthusiastic. The integralists would support Adhemar and Lacerda. Their price, however, was non negotiable. Beyond the shame of being publicly associated with the PRP's fascist mummies, Adhemar and Lacerda would need to guarantee that upon victory, the exile of Plínio Salgado would be reversed. The integralist in chief himself would come home.\n\nLacerda sighed internally. The PRP's envoy was adamant. Having to deal with Adhemar post victory would be painful. Having Salgado mucking around would be even more disagreeable. But perhaps better to have to deal with a new problem later than risk losing right then and there?"
 brazil.103.a: "Salgado will have his ticket home."
 brazil.103.b: "Salgado can continue to wallow in self pity in Iberia."

 brazil.104.t: "Saving the Coalition"
 brazil.104.desc: "The conference room buzzed with activities. A table on the far end of the room had been covered with phones. Occasionally one would ring and be picked up by a clerk, notepad in hand. Now and then a runner would come in. Their handwritten memo would be given to a secretary, for conversion to a type-written format. From there the message would make its day to the dais, where it would usually be read out loud. Usually, the memos were from some PSD or PTB grandee. While all waxed on the importance, every speaker's message of unity waned on the topic of who to back.\n\nThe PSD and PTB joint coalition had ensured stability and electoral success. Absent Quadros' successful bid for the vice presidency, the liberals and labourites had managed to keep the right out of power since the presidency of Gomes. Now, however, the coalition was strained from its long string of victories. Many of the PSD's members argued for a return of Kubitschek, as the more palatable candidate to oppose the army as well as a popular figure in the nation's streets. To this, the PTB's supporters argued angrily that letting the army push aside Goulart, the legitimate successor to Lott, would be a terribly damaging precedent. Besides, had Lott and the PSD not brought this crisis on through their corruption?\n\nKubitschek had not appeared much at the conference so far, beyond an opening address encouraging consensus and the safety of the coalition. Goulart, still stuck for at least another week in the south of the country, had no immediate presence within the coalition talk. His friend and supporter Leonel Brizola, however, loomed large. Wherever one went, the charismatic Brizola could be seen discussing with PTB activists and members of the PSD's left wing.\n\nPartnership and rivalry, ambition and pragmatism, hope and despair. A maelstrom of emotions whirled within the party conference. The clock was ticking to the end of the hundred days."
 brazil.104.a: "Don't split the party!"

 brazil.105.t: "The Conference Begins"
 brazil.105.desc: "Kubitschek was in it for the long haul. The former President's campaign throughout the joint PSD and PTB conference had much of the marathon about it. A most undignified sport, long distance running. Kubitschek would have much preferred a game of football with friends. Assuming his own team would not continue trying to score in their own goal, rather than challenge the other side.\n\nOn and on he ran, the sand shifting underneath his feet. A deputy's backing there, an interest group flipped there. The strand lay ahead unbroken. Behind him the rising tides occasionally erased his footprints. Brizola had arrived and was a charismatic speaker having already managed to take a few of his supporters from him. It mattered, not, for the former President had to continue. Absent his victory, the high water would drown them all.\n\nIt frustrated him to no end that the great absent of the conference, Goulart himself, held such a sway within the coalition. The PTB's factionalists, that snake Brizola among them, agitated endlessly for their missing leader. In response, a faction of hardline PSD members had emerged. Among them was Tancredo Neves, Kubitschek's friend and protege.\n\nRight foot, then left foot. A long trail through the shifting sand. Kubitschek knew that the PTB's faction struggled as much as he did. This did not bring him much joy. The battle ahead would be difficult."
 brazil.105.a: "Kubitschek gains the upper hand"
 brazil.105.b: "Brizola seizes the initative for Goulart"

 brazil.106.t: "The Shadow Master"
 brazil.106.desc: "Of late, whenever Edna Lott met associates their faces were long. Of course, her house's mirrors showed her own fatigue. The PTB activists had spent many sleepless nights trying to broker deals for Goulart. Had it only been a few months since her father's downfall? Since then, the PSD-PTB coalition had sailed through rough water. It was all its captains could do to save the ship from being dashed against dangerous reefs. And the military's sharks kept closing in.\n\nBrizola's eyes quizzed her. "I'm sorry Leonel. Could you repeat?"\n\n"No problem. Long days for all. As I was saying, the old man has offered enthusiastic support for Goulart. Both are in meetings of late."\n\n"Vargas' help would sway a lot of people. Both in the PSD and PTB. Kubitschek despite being a 'friend' of the old man would certainly be enraged to see his support base be swayed away from him."\n\n"He wouldn't be the only one. Army commanders would see red if they know that Vargas is still trying to play an active role in politics. Perhaps they'll forego the democratic charade and coup right now." Brizola sighed. "Dear God, how did we get into this mess."\n\n"Kubitschek and my father made this bed, now they are forced to lie in it. They were fools to think the PSD's schemes would not cave in on themselves. Which way will Goulart go with Vargas, do you think? Will he take his help?"\n\nBrizola collected his thoughts for a moment before speaking."
 brazil.106.a: "Goulart will take Vargas' help."
 brazil.106.b: "Goulart will sadly refuse the old man."

 brazil.107.t: "The Conference Continues"
 brazil.107.desc: "[BRA_the_conference_continues_desc]"
 brazil.107.desc.goulart: "The next speaker was not the day's most silver tongued. Treasures of eloquence had already been spent on both sides of the conference.\n\nHad the speaker came prepared? Packing the crowd with supporters, discovered through backroom negotiations. Or perhaps the speaker simply stood at a turning point, a sizable majority of the coalition conference willing to give credence to his ideas? Always difficult to tell where turning points great and small in history find their focus.\n\nSo it was that a supporter of João Goulart, of the Brazilian Labour Party, stood at the Dais, making his case. It was not a particularly original one; the speaker argued in favor of the legitimate President, the one meant to succeed Lott and Quadros. Threats made by conservative elements that Goulart was too far to the left were irrelevant. Brazilian democracy was sovereign. The people had entrusted the joint PSD-PTB coalition with power and responsibilities. Following the constitutions' order of succession was one of those responsibilities. Substituting Goulart with Kubitschek to fulfill the latter's schemes was not an option.\n\nThe end of the speech drew warmer applause than usual. This might not have been the end of the deadlocked conference, but perhaps the beginning of the end?"
 brazil.107.desc.kubitschek: "The next speaker was not the day's most silver tongued. Treasures of eloquence had already been spent on both sides of the conference.\n\nHad the speaker came prepared? Packing the crowd with supporters, discovered through backroom negotiations. Or perhaps the speaker simply stood at a turning point, a sizable majority of the coalition conference willing to give credence to his ideas? Always difficult to tell where turning points great and small in history find their focus.\n\nSo it was that a supporter of Juscelino Kubitschek began his oration. Goulart's firebrand politics had brought the republic to a standstill. It was certainly unfair that the PTB's leader had seen his name dragged in the mud by conservative elements. But Brazilian politics was a grim and dirty place. The raison d'etre of the PSD-PTB coalition was to serve as a rampart against the machinations of any cabal of army officers and reactionary conservatives. In this time of need, a popular unity candidate was needed. Who but Mr. Kubitschek, a popular politician throughout the nation? The time had come to circle the wagons and make a stand against the wannabe putschists as one, as the coalition had done before in the 50s.\n\nThe end of the speech drew warmer applause than usual. This might not have been the end of the deadlocked conference, but perhaps the beginning of the end?"
 brazil.107.a: "Only time will tell."

 brazil.108.t: "The Crowning Mercy"
 brazil.108.desc: "[BRA_the_conference_concludes_desc]"
 brazil.108.desc.goulart: "No stranger sight than jovial and friendly rivals sharpening knives out in the open. The conference had seen the PSD and PTB air out grievances as well as throw accusations and recriminations. No matter the air of forced bonhomie, all could tell the coalition had seen better days. The army's ultimatum was pouring kerosene on the embers of discontent from both PSD and PTB supporters.\n\nDuty, camaraderie, or the sheer cynicism of political calculations had helped bring the conference to a mostly satisfactory end. The members of the coalition shared, after all, a similar dream for Brazil. One that did not run through the army barracks, nor through the UDN. There was significant overlap in policy between the left of the PSD and the right of the PTB. As such all had agreed to a final vote now that the negotiations were over. The casting of ballots was pro forma, as alliance building and secret negotiations had already predetermined who between Goulart and Kubitschek would emerge triumphant.\n\nPerhaps their opponents had foreseen this outcome. The hundred days had so far been tough to the coalition. The enemies of Brazilian democracy would do well not to let their guard down, however. Social democrats and liberals would march behind their chosen leader with determination. Their fate in the coalition might have been tested, but their will to see the Brazilian Republic endure remained ironclad.\n\nThe votes were counted into the subsequent day's early lights. Only then was the new leader of the coalition confirmed."
 brazil.108.desc.kubitschek: "No stranger sight than jovial and friendly rivals sharpening knives out in the open. The conference had seen the PSD and PTB air out grievances as well as throw accusations and recriminations. No matter the air of forced bonhomie, all could tell the coalition had seen better days. The army's ultimatum was pouring kerosene on the embers of discontent from both PSD and PTB supporters.\n\nDuty, camaraderie, or the sheer cynicism of political calculations had helped bring the conference to a mostly satisfactory end. The members of the coalition shared, after all, a similar dream for Brazil. One that did not run through the army barracks, nor through the UDN. There was significant overlap in policy between the left of the PSD and the right of the PTB. As such all had agreed to a final vote now that the negotiations were over. The casting of ballots was pro forma, as alliance building and secret negotiations had already predetermined who between Goulart and Kubitschek would emerge triumphant.\n\nPerhaps their opponents had foreseen this outcome. The hundred days had so far been tough to the coalition. The enemies of Brazilian democracy would do well not to let their guard down, however. Social democrats and liberals would march behind their chosen leader with determination. Their fate in the coalition might have been tested, but their will to see the Brazilian Republic endure remained ironclad.\n\nThe votes were counted into the subsequent day's early lights. Only then was the new leader of the coalition confirmed."
 brazil.108.a: "A victor emerges."

 brazil.109.t: "Now or Never"
 brazil.109.desc: "Ninety or so days ago the military's ultimatum had come. Since then, the nation's politicians had been stuck in a great struggle to see their favored candidate ascend to the presidency. In between the PSD-PTB grand coalition's efforts to maintain its hegemony and the machinations of Lacerda and Adhemar, deputies of the legislature had been bombarded with offers and counter offers, threats, bribe and attempts at cajoling. Through all this, the dark clouds had kept coming. The tempest was imminent.\n\nIf some had entered the crisis with cavalier attitudes, and hopes of making a killing selling influence, the reality of the threat had sobered all but the most foolish. With still no winning candidate and a week or so left, more and more deputies have felt uncomfortably exposed in the rising water. Best then to seek any floating piece of debris to avoid drowning.\n\nSo went the calculation for the most cynical and the most desperate. Others still refuse to abandon their principles and support the leading candidate to save their skin. What use is the democratic republic if men are not free to follow their hearts? They ask. Many of their colleagues ignore them, in the scramble to escape the army's wrath. Better to live a coward than die or be imprisoned.\n\nAs such, the current candidate for presidency with the best chance to succeed Lott and Quadros has seen a rise of support from the desperate and pragmatics. Throughout the nation, all pray that this last minute alliance will be the keystone in preventing the army's coup."
 brazil.109.a: "Is it already too late?"

 brazil.110.t: "[BRA_event_110_loc_title]"
 brazil.110.desc: "[BRA_event_110_loc_desc]"
 brazil.110.a: "[BRA_event_110_loc_answer]"

 brazil.110.schildvictory.title: "Disaster in South Africa!"
 brazil.110.schildceasefire.title: "Defeat in South Africa"
 brazil.110.stalemate.title: "Stalemate in South Africa"
 brazil.110.ofnceasefire.title: "Victory in South Africa"
 brazil.110.ofnvictory.title: "Triumph in South Africa!"

 brazil.110.schildvictory.desc: "Alas! Terrible news has come from the South African frontline. The Boers and the National Socialist colonialist bastards have won and doused the last flame of democracy in the tormented African continent. Rumours of terrible atrocities perpetrated upon blacks and dissident whites are already filtering back with the convoys filled with defeated and dead Brazilian soldiers and refugees.\n\nThe government and people of the Republic of Brazil are reeling from this disaster and bracing for a new wave of hostile activity in Brazilian waters; already it is feared that the Reichskommissariats will send more illegal fishers to exploit our weakened state. Moreover, this has significantly weakened the credibility of the sitting government.\n\nBut amidst all this, there remains opportunity. Countless refugees and workers - good and decent people all, or at least better than subhuman Nazis - flee to Brazil in hopes of a new life. And there are always lessons to be learned from a defeat such as this for our military and political system."
 brazil.110.schildceasefire.desc: "Grave news has come from the South African frontline. The Boers and the National Socialist colonialist bastards have won, though we have prevented them from completely dousing the last flame of democracy in the tormented African continent. Our troops are withdrawing from South Africa in defeat, but their heads remain high.\n\nThe government and people of the Republic of Brazil are reeling from this setback and bracing for a new wave of hostile activity in Brazilian waters. There is a concern that the Reichskommissariats will send more illegal fishers to exploit our weakened state; accordingly, the Navy is beginning to mobilize. This matter has weakened the credibility of the sitting government but not as badly as if there had been a total defeat.\n\nBut amidst all this, there remains opportunity. Refugees and workers - good and decent people all, or at least better than subhuman Nazis - flee to Brazil in hopes of a new life. And there are always lessons for our systems to learn from a defeat such as this."
 brazil.110.stalemate.desc: "News from the South African frontline: the South African War having failed to progress very far one way or the other, a truce has been signed leaving all frontiers at status quo ante bellum. Our troops have acquitted themselves well; though dissatisfied at their failure to kick the "Master Race" out of Africa, they return with their heads held high and the respect of the Free World.\n\nThe government and people of Brazil are satisfied with their success in holding the Nazis back, however, they are making precautions about the future. There is reason to suspect that the Reichskommissariats may try their hand at stealing our lobster again; accordingly, the Navy has begun to make all appropriate preparations. Though people wish they could have defeated the Nazis, they believe that the government has done as well as it could; accordingly, our government's popularity holds steady.\n\nThere may be a flow of immigrants heading west to our nation as a result of the recent chaos in Africa; their presence here will hopefully enrich us and improve our economic and social progress. Moreover, there are always lessons to be learned from things like this."
 brazil.110.ofnceasefire.desc: "Good news from South Africa: the National Socialist degenerates having experienced significant reverses, and the Boers having been destroyed, the Afrika-Schild has been forced to accept a ceasefire on OFN and Brazilian terms. Our brave soldiers, who have struck a great blow against the degenerate Master of Europe and his insane system, return home to their country garlanded with the adulation of their countrymen and the admiration of countless fellow members of the Free World.\n\nThe government and people of our Republic are pleased at this development, though there are of course always some grounds for concern. There is reason to believe that the humiliated Nazis may attempt to lash out by violating our sovereign waters in hope of getting one last shipment of lobster north to the German wasteland before they collapse; accordingly, the navy is preparing to mobilize once again. But the ruling party, having gained the respect of other free nations and acquitted itself well in the first victory against Nazism since the end of the Second World War, has experienced a boost in popularity.\n\nAs German Africa begins to collapse, and South Africa copes with its gains, there is likely to be a stream of immigrants heading to our shores in search of a better life; we will do well to prepare to receive them. Moreover, as the celebrations begin and the troops come home, our government and military are aware of what lessons we stand to learn from this victory."
 brazil.110.ofnvictory.desc: "Glorious news from South Africa! The National Socialist degenerates and their Boer sycophants have been sent to the judgment of Heaven en masse and been driven out of the lands on which they squatted! The Afrika-Schild is no more; the OFN and their local partners have been entrusted with control over the lands that the so-called Master Race lorded over. Our brave soldiers, who have struck a lethal blow against the degenerate Master of Europe, and the insane systems they created, return home adored by Brazilians everywhere and deeply respected by fellow free people from Toronto to Tasmania.\n\nThe government and people of our Republic are ecstatic at this development, though there are of course always some grounds for concern. There is reason to believe that remnants of the humiliated Nazis may attempt to lash out by violating our sovereign waters in hope of getting one last shipment of lobster north to the German wasteland before they are dissipated. Accordingly, the navy is preparing to mobilize once again. But the ruling party, having gained the great respect of other free nations and acquitted itself well in the first victory against Nazism since the end of the Second World War, has experienced a significant boost in popularity.\n\nAs the OFN begins to adjust to its new frontiers, and the South Africans consolidate their gains, there is likely to be a stream of immigrants heading to our shores in search of a better life; we will do well to prepare to receive them. Moreover, as the celebrations begin and the troops come home, our government and military are aware of what lessons we stand to learn from this glorious, historic victory."

 brazil.110.schildvictory.answer: "We will do well to learn, if we wish to survive."
 brazil.110.schildceasefire.answer: "It'll do us a power of good to learn."
 brazil.110.stalemate.answer: "We will do well to learn."
 brazil.110.ofnceasefire.answer: "We plan to learn."
 brazil.110.ofnvictory.answer: "Let us learn then."

 brazil.111.t: "The Crow's New Roost"
 brazil.111.desc: "Lacerda stepped into the presidential office and slowly, gingerly shut the door behind him. An uncontrollable smile had threatened to break through his facade of calm acceptance all day, as he shook hands and kissed babies and pretended this wasn't the best day of his damn life. Now, in private, he could indulge himself.\n\n"HELL YES!" Lacerda pumped both fists in the air and spun a quick circle. He had outmaneuvered Brazil's greatest minds (plus Quadros), secured the military's loyalty and evaded every two-bit assassin that sought to end his life. Now, the greatest country in the world was his to shape. Getúlio Vargas' insane policies and legacy had infected his homeland for too long, twisting Brazil's economic backbone into a misshapen, brittle thing. That dog's influence would be torn out by the roots in due time. For now though, there was only one thing on the agenda.\n\nPresident Carlos Lacerda walked slowly to his seat, admiring the lavish appointments and gorgeous art decorating Brazil's highest office. He lowered himself ever so slowly into his seat and pulled a list of names and phone numbers from his coat pocket. It was time his most impassioned supporters got a chance to celebrate with Brazil's newest head of state."
 brazil.111.a: "Under President Lacerda's guidance, Brazil was sure to thrive. Probably."

 brazil.112.t: "Ester's Lament"
 brazil.112.desc: "President Lacerda had been a frenzy of activity ever since his inauguration party, constantly calling bureaucrats in and out of his office, dispatching dozens of letters and calling every other man, woman, and child in Brazil. He only had around a year and a half before the next election, so most staff were running double duty in the sudden rush to get organized. Ester Souza, Lacerda's faithful secretary for about twelve years now, found herself thrust into a brand new role, fielding every random, powerless bureaucrat with a bone to pick too worthless for Lacerda to deal with himself. At least she got a raise.\n\n"Yes Mr. Mikich, EVERY asset. Uh-huh. Yup, even Petrobras, especially Petrobras." She sighed and pulled the phone away, as the ever impotetent Mikich railed against Lacerda "selling off my goddamn dog next" or "licking US jackboots." He wouldn't cause any real trouble, so long as he thought he was being heard. Finally, the torrent of profanity tapered off and Ester brought the phone back to her ear. "Thank you Mr. Mikich, I'll be sure to pass your message on to the President. Have a nice day.""
 brazil.112.a: "Ester shook her desk with the force of slamming the phone back into its receiver."

 brazil.113.t: "Howdy Partner"
 brazil.113.desc: ""Mr. Gordon, so good to meet you. Let's get right into it, shall we?" Lincoln Gordon, the US Ambassador to Brazil, hadn't expected a summons to meet the new President so soon. Typically it took several months for a President to outline his diplomatic plans with the US, but Lacerda had made meeting with him a top priority. Gordon couldn't help but feel flattered. He sat across the President as Lacerda pulled a massive stack of papers from a drawer. "I understand that you are much more interested in pursuing positive relations with the United States then your predecessors, Mr. President. Know that everyone back home is eager to reciprocate."\n\nLacerda smiled. "Of course, of course. Now, before we get into the minutiae, I have a somewhat... dramatic request of you, Mr. Gordon. May I call you Lincoln?"\n\n"Of course."\n\n"Good, good. Mr. Lincoln, I need you to bring an official diplomatic request back to Washington, outlined in this," he patted the paper stack, "pile of quite official documents. In simple terms, it asks for Brazil to receive full OFN Partnership, bringing us into the Free World. It's time Brazil took its place in the fight against fascism, wouldn't you agree?"\n\nGordon quickly adopted his best poker face, just barely hiding his surprise and glee. This was a goddamn diplomatic coup! Bringing Brazil into the OFN would be a massive, MASSIVE success for the United States. In his wildest dreams, even with the famously pro-USA Lacerda in charge, he hadn't imagined he could get them to agree to OFN membership! He didn't even ask!\n\nGordon shot to his feet for a handshake, but banged his knee on the President's desk and collapsed back into his chair. Gritting his teeth, he nodded his head as smoothly as he could. "I, I think I can do that for you, President Lacerda. Welcome to the, ah fuck, Free World Mr. President.""
 brazil.113.a: "Lacerda shook his hand, a bit awkwardly."

 brazil.114.t: "Democracy's Bulwark Adds Another Shield"
 brazil.114.desc: ""It's official, Mr. President! I just got notice back from Washington that your admission to full member integration for the OFN is completely approved, and the paperwork should be filed away in a few days. I'm looking forward to working with you closer in the coming weeks."\n\nLacerda smiled, gave Ambassador Lincoln a few parting, thankful words and put the phone down. It's not like this was a surprise. Admission to this stage was a foregone conclusion, but it still felt damn good to hear it from the United States mouthpiece himself. He pulled a small, inconspicuous flask from his lowest desk drawer and took a quick swig. Lacerda put it back and replaced it with a sheet of paper. He had a speech to deliver at the OFN, and he always wrote better with just the slightest buzz."
 brazil.114.a: "Now, where'd he put his pen?"

 brazil.115.t: "A Statement of Intent"
 brazil.115.desc: ""Fascism is a blight, and much like a blight it can only be excised by tearing out tyranny wherever it takes root! Germany has choked out the embers of freedom and democracy for decades, but like a glorious inferno, liberty's fire cannot die! It has kept burning in America, in Australia and yes, in Brazil. The fascists will never stop lashing out in their futile quest to destroy us all, and so we must fight for our right to exist! The war in defence of our South African brothers was as to a righteous crusade against the forces of oppression, despite its... complications. Thousands died in that fight against fascism, and hundreds of thousands will continue to fight and die as heroes until at last, freedom's burning light eclipses Germany's darkness. Until that day, free people of the world, Brazil will fight and die alongside you!"\n\nLacerda left the podium to thunderous applause from the assembled delegates. Despite his best efforts, he couldn't quite keep a stupid little smile off his face. He was good at a hell of a lot, but if he had to pinpoint one particular skill he excelled at, it was giving speeches. Writing them too. As he made his way back to Brazil's seats, he saw an older woman applauding particularly hard from her chair next to his own.\n\n"Excellently done, Carlos! I knew that one would kill from the moment I laid eyes on it." Souza had come to New York to manage his affairs amid the hustle and bustle of the OFN's central nervous system, along with the few others he had needed to bring along. Lacerda sat back down in the middle of them and watched as the South African delegate made his way over to the stand.\n\n"Thank you, Ester. I think we made our intentions crystal clear.""
 brazil.115.a: "They can't ignore us now."

 brazil.116.t: "Good Old Fashioned Diplomacy"
 brazil.116.desc: ""PRESIDENT LACERDA, HOW CLOSELY DO YOU PLAN TO WORK WITH THE UNITED STATES?"\n\n"MR. PRESIDENT, CAN YOU ELABORATE ON YOUR PLAN TO INTEGRATE PARAMILITARY SQUADS WITH BRAZIL'S POLICE FORCE?"\n\n"CARLOS LACERDA, WHY DO PEOPLE CALL YOU A BIRD!?"\n\nLacerda stuck to the middle of his small ring of bodyguards and hanger-ons forging their way through the entirely unexpected crowd of journalists. Apparently, someone had leaked his schedule to the press. How bored were these people? Finally, the tall man leading his little congregation motioned Lacerda back into his car and slammed the door shut behind him, while the rest of his followers spread out to their own vehicles.\n\nWhile Lacerda was nominally in DC to do some sightseeing and a little bit of PR, the reality was more complicated. Quite a few US officials were opposed to Brazil's recognition by the OFN, and Lacerda was in Washington to make sure they saw reason. Whether that meant bribery, outright threats or just a bit of schmoozing, Lacerda wanted to see to it personally. This was too important to trust to a lackey."
 brazil.116.a: "The Lincoln Memorial was up next, then the Secretary of Defense."

 brazil.117.t: "New Friends"
 brazil.117.desc: "Isael entered his office and stretched a little, preparing himself for a day of reviewing reports and intelligence collected by SFICI agents the world over. It always served to loosen up a bit before he sat down to work. He stopped mid-twist as his eyes caught an unfamiliar object on his desk, a manila envelope laid neatly atop his other papers and documents. It hadn't been there the night before, and this entire department was guarded extensively. Isael scanned the room, but nothing else was amiss. He sat slowly at his desk, and gingerly opened up the inconspicuous envelope. There was a whole sheaf of documents, but the top one immediately caught his eye.\n\nALEXEI RUBIO, 23, MALE, SON OF RUSSIAN REFUGEES CURRENTLY LIVING IN SANTAREM, BRAZIL. RUBIO WORKS AS A GARDENER AT CATEDRAL NOSSA SENHORA DA CONCEIÇÃO, BUT LEADS A SMALL COMMUNIST CELL UNDER THE NAME "IVAN IVANOV" WHEN UNOCCUPIED. THIS CELL INTENDS TO KIDNAP AND RANSOM THE GOVERNOR OF SANTAREM IN TWO MONTHS. ENCLOSED ARE THE SCHEDULES AND IDENTITIES OF EVERY MEMBER OF THE CELL, ALONG WITH THE WRITTEN AND AUDIO INTERROGATION OF A CAPTURED COMMUNIST AGITATOR AFFILIATED WITH THE CELL. CONSIDER THIS INFORMATION COURTESY OF THE FEDERAL BUREAU OF INVESTIGATION. LONG LIVE THE UNITED STATES OF AMERICA AND THE UNITED STATES OF BRAZIL."
 brazil.117.a: "Isael wiped his brow and resolved to buy a better lock for his door. Maybe."

 brazil.118.t: "No Slight Left Unpaid"
 brazil.118.desc: ""The Ajuricaba? Goddamn it. What was that, Acre-class? That's a hundred and fifty men, and almost half of them are gone." Admiral Toscano laid down the report and sighed, staring at the needlessly nervous young seaman who had delivered it to him. The latest skirmish with the Nazis had gone about as well as expected, but losing a destroyer was hardly a victory. At least they paid them back in kind.\n\n"Um, sixty men lost at sea in total sir. Uh, may I go, sir?"\n\nToscano waved the man out of his office, a sparsely appointed room on the Almirante Tamandaré. It used to be better decorated, but he found it gave the wrong impression. Regardless, the Zentralafrikan fleet could not be allowed to beat a good retreat. They would be harried every nautical mile of the way out of Brazilian waters."
 brazil.118.a: "There were things to do and Germans to kill."

 brazil.119.t: "Mopping Up"
 brazil.119.desc: ""Sir, we are directly beneath the lead pirate vessel, German deserters as we understand it."\n\nCaptain Mitchell clapped the fresh yeoman on the back, the newest addition to his small submarine crew. He had captained this beauty for eight years now, and of all of his various duties piracy prevention was probably the easiest. No pirate had the capacity to destroy a submarine and it sure as hell beat skirmishing with U-Boats.\n\n"Let's sink this son of a bitch, huh? Take down the lead and the rest will scatter. Load torpedoes!"\n\nAs the rest of his crew sprang into action, Mitchell made his way over to the cramped kitchen at the rear. His men knew what they were doing, more or less, and usually performed worse when he attempted to micromanage. So, why not grab a snack in the meantime?"
 brazil.119.a: "Goddamnit, João ate all the cheese."

 brazil.120.t: "This Knife Kills Fascists"
 brazil.120.desc: "Heitor advanced slowly on the fascist, sticking to the deepest shadows and moving as quietly as he could. Not that it mattered, the camp of Nazi deserters were drunk out of their minds and passed out around their flickering campfire, but it never hurt to be careful.\n\nHeitor and a few other members of his company had volunteered to stay behind once the SAW ended, cleaning up what Nazi scum still lingered in Africa's nooks and crannys. He had been tracking this particular group for a while. They split off from one of Hüttig's battalions once it was clear their "supreme leader" was all but doomed, and had cut a bloody swath through unprotected villages and countryside ever since. There were only about thirteen of them, but each was armed and utterly ruthless.\n\nHeitor signaled to the rest of his makeshift anti-terror squad with a few quick hand gestures, and cut the first fascists throat. His squad moved swiftly ahead of him, dispersing through the camp and ending the rest of the Nazis with similar efficiency. The few that stirred awake were easily overpowered. Heitor watched the man's lifeblood drain out into the African sand, and wondered how this little German got where he was. He couldn't have been more than twenty. The Brazilian marine unclipped the boy's iron swastika and stood, moving towards the centre of the shabby camp. He needed to talk strategy with Smith."
 brazil.120.a: "There were still a hell of a lot of Nazis in Africa."

 brazil.121.t: "Border Troubles"
 brazil.121.desc: "Heitor cursed and hit the deck as gunfire sounded off from the German side of the border, filling the otherwise peaceful night with noise. He had volunteered to stay in South Africa after the ceasefire, patrolling the ever turbulent border with the RKs and doing what he could to help the African people. While the war was nominally over, there was no shortage of Nazis and Boers that loved to "misfire" their guns through the hastily assembled chain-link fence separating them from the Republic.\n\nAs Heitor crouched behind a sandbag, one of the many in the defensive lines radiating out from the border, he could tell almost instantly that this was no everyday misfire. The fence was rattling, and he barely had time to peek over his barricades before an African man threw himself into cover next to him. The man collapsed onto the ground and gripped his leg, trying desperately to stop the flow of blood from a bullet wound to his knee. His clothes were torn from the barbed wire, but besides the bullet wound he was almost untouched. If you could ignore his visible ribs and sunken eyes, the man looked nothing like a border jumper. He looked like a scared, desperate refugee.\n\nThe first shots began to taper off, and were replaced by a loud argument in German. As Heitor wrapped the man's leg and called his squad's medic over, one more gunshot echoed over the border and the German voices stopped."
 brazil.121.a: "At least the Krauts weren't doing any better then they were."

 brazil.122.t: "Keep the Nazis Back"
 brazil.122.desc: "Admiral Toscano was devoid of his usual humor. Already, 578 Brazilian sailors had been murdered by German vessels. The Lobster War may have been difficult from an economic perspective, but casualties were almost non-existent. The fleet had had no problems cleaning up the pirate schooners and occasional German coordinator back then, but this was entirely different. The Germans were angry and trained, intent on pushing back Brazil's maritime borders and asserting their control over more of the Atlantic. Toscano would not allow it.\n\nThe Almirante Tamandaré was leading the counterattack, and had already sunk four German vessels this week alone. The bastards had spread out over thousands of miles, attempting to overwhelm the Brazilian Navy through sheer weight of numbers, but it wouldn't matter. The SAW may not have gone according to plan, but Admiral Arnoldo Toscano would be damned before German murderers took a single foot of Brazilian water."
 brazil.122.a: "The war against fascism never ends."

 brazil.123.t: "A Small Duty"
 brazil.123.desc: "Lacerda tapped absent-mindedly on his typewriter, drafting finale after finale for his latest speech. No matter what he did, it wasn't quite clicking. It would be a grand announcement, an address to the Brazilian people on his great battle against Getulism, a slash-and-burn campaign against his predecessors rampant nationalization. Privatization was the name of the game now. Healthcare, education, everything that could be privatized would be privatized.\n\nThe start of the speech was simply brilliant. First, he would make fun of Getúlio Vargas. Then, he would congratulate his supporters and issue a great call to action against all the forces arrayed against Brazil. Yadda yadda, Lott didn't fix shit, blah blah blah. The bulk of the speech was similarly genius, it was just the ending that was giving him trouble. He needed one final sell, a slogan that could be shouted from rooftops, plastered on posters, a fine quote for the history books!\n\n"Let the great flames of liberty burn away corruption!" Eh, save it for later. Not too fitting for this speech.\n\n"We will prosper once again!" Too short, vaguely fascist.\n\n"Like a great bird, I will vomit private industry upon Brazil!" What? Definitely not. Lacerda sighed and lowered his head onto the desk. This was easier when he wasn't President."
 brazil.123.a: "This leader of South America business was harder than it looked."

 brazil.124.t: "Your Move, Creeps"
 brazil.124.desc: "A piercing whistle broke the silence of the night, followed by the tramp of boots and a shrill scream. Omar started awake at the noise and fell out of his bed, banging his shoulder on the small nightstand next to him. Cursing, he pulled himself up and moved to his window, intent on seeing just what had disturbed his sleep at this ungodly hour.\n\nFour men, all clad in body armor, were beating a boy in the street. He couldn't have been more than seventeen, but the men were beating him with batons all the same. A small bag of canned food was scattered everywhere besides him, evidently dropped in the scuffle. Ah. So these were one of the President's new "Law Enforcement Task-Forces".\n\nWith a final kick to the head, one of the enforcers slung the limp boy over his shoulder and began walking back down the street. The rest of his squad began to disperse in all directions, leaving the bag of ill-gotten groceries lying in the street. Omar closed his blinds and laid back down to sleep. It didn't work."
 brazil.124.a: "He couldn't get back to sleep for hours."

 brazil.125.t: "America Accepts!"
 brazil.125.desc: "Lacerda straightened his tie as he stepped out into the afternoon sun. The mob of reporters clamored for comments, firing off questions as rapidly as possible. He smiled indulgently.\n\n"Ladies and gentlemen of the press, the Senado's voice is clear, Brazil stands arm-in-arm with all of freedom's defenders around the world. I would like to thank the senators for their wisdom and alacrity in guaranteeing Brazil's security and prosperity. I would also like to thank all the peoples of the free nations of the world, your elected representatives have done the right thing by extending the hand of friendship to Brazil. We will not let you down, and we will never forget the warmth with which you have accepted us. That will be all for today, thank you."\n\nHe retreated into the Palácio da Alvorada, the door muting the cacophony as it closed. His mind was elsewhere, in the South Atlantic, as Brazilian naval squadrons pushed boldly towards Saint Helena in order to establish their portion of the new cordon; in the Amazonas, where rainforest was being quickly cleared for secret airbases that would form a western air shield; and in Germania and Tokyo, where visions of furious generals and desperate foreign ministers filled his heart with delight.\n\nBrazil could not now be ignored. Brazil could not be dismissed as a mere trifle, a fourth-rate power with only potential and no presence. Today, Brazil had shaken the world with the strength of her voice in an unequivocal call for liberty and fraternity. She would never be scorned again."
 brazil.125.a: "The snake smokes once more, and mankind gets a little freer."

 brazil.126.t: "The Crow Soars"
 brazil.126.desc: "Sighing contentedly, President Lacerda took in the view of Brasília offered him by the spacious windows of the Palácio da Alvorada. The skyline was dotted by cranes, and for a moment he thought he could hear the soft roar of tens of thousands of construction workers building on to the republic's seat. He sipped his coffee. It hardly looked any different, but anyone who lived through the Hundred Days would understand instantly just how much the atmosphere had changed.\n\nBrazil's position in the world had always been precarious and strange, as if they were peeking just above the edge of a great plateau where the true powers had their homes. She was the most important of the Latin afterthoughts, but hardly considered as more than a green patch on the map. Even in the World Wars, her impact was minimal, only sending a desultory and uncertain force out to engage the Hun on land and sea.\n\nWith her membership in the OFN, Brazil had truly shaken the world for the first time. Every senator was now well-versed in the basic principles of conventional and nuclear deterrence, the Foreign Ministry buzzed with the activity of managing the integration effort, and best of all, the military was looking outward instead of inward-- for the first time since the Second World War.\n\nEven better, the Republic's finances were now approaching a semblance of responsibility. The excesses of the old regime had been deeply damaged, and Brazil's economic growth was rapidly regaining ground as American capital and expertise bolstered her native resources and capabilities.\n\nLacerda knew he had a reputation as a dour, cantankerous operator, but today at least he felt as starry-eyed as any young communist. He smiled ruefully at that, listening for the thousandth time to his younger self calling him an imperialist running dog. With every success that voice became a little quieter, a little less sure. He had little doubt it would soon pass away entirely.\n\nThus did the Crow of Guanabara lead a little thrush through the buffeting winds of chance and circumstance..."
 brazil.126.a: "To liberty, wealth, and safety. Or so he hoped"

 brazil.127.t: "Uma Agradável Surpresa"
 brazil.127.desc: "Mr. President, we've received a startling communication from Ambassador Lincoln in Brazil. It seems that the Brazilians have requested to join the OFN, effective as soon as possible! We have prepared for this contingency of course, and the Navy is prepared to extend defensive coverage deep into the Mid-Atlantic at your command. Of course, Brazil's armed forces are comparatively weak and unimpressive, and for the next few years they may prove to be more of a liability than an asset. The decision is yours, sir."
 brazil.127.a: "We must all hang together, accept immediately!"
 brazil.127.b: "We need time to prepare, politely decline for now."

 brazil.128.t: "What Magnificent Idiocy!"
 brazil.128.desc: "Lacerda kicked his desk with the heel of his shoe, hard enough to break it off. "FUCK, FUCK, FUCK!" He roared. How could they do this to him, to Brazil? After all their support, all their friendship, they were reduced to partner status in the OFN "until circumstances more favorably align"! What was that bullshit? He would show them a favorable alignment all right, he'd favorably align their fucking--\n\nHe stopped taking a deep breath. It wasn't like this was a permanent situation. The Americans had internal problems of their own to solve, and they probably had questions about Brazil pulling its weight militarily. In the meantime they still had partner status, and they were clearly moving towards agreements with the other OFN nations on movement and trade. This would hurt his prospects for reelection to be sure, but Carlos Lacerda was not one to give in. He opened the door to his secretary's office. "Ester, I need a new desk and a new pair of shoes delivered immediately. Besides that, accept no visitors for the next three hours...""
 brazil.128.a: "I need time to think."

 brazil.129.t: "Worse than a Crime..."
 brazil.129.desc: "Lacerda bit down on his knuckles, hard. Those fucking cowards in the Senado were unbelieveable. Did they really think that the sausage-eating albinos or the Japanese would leave them alone if they shivered in the corner? He could almost feel the eyes of their generals fixing on Brazil, sticking out into the Atlantic like the world's largest soft underbelly...\n\nHe tasted blood. He unclenched his fist, wrapping his handkerchief out of his bleeding hand. Nothing would be gained by outbursts, he needed time to think. The election, the economy, the campaign against Getulism... this weakened everything. A new direction would be required, but he wasn't going to be able to figure that out today. Today, he would have a whiskey, have a cigar, and mourn the Brazil that could have been."
 brazil.129.a: "When the future dies, all that's left is regret."

 brazil.130.t: "A Brazilian Request"
 brazil.130.desc: "Ever since Carlos Lacerda was recently elected President of Brazil, our agents and diplomats have watched him carefully. The famously pro-US Lacerda has spent most of his time reorganizing the Brazilian government, but he recently had the chance to meet with our Ambassador to the country, Lincoln Gordon. If Gordon's report is to be believed, the meeting went better then we could have imagined.\n\nCiting their spirited defense of Britain during the Second World War and recent intervention in South Africa, Brazil is pushing for full status in the OFN. This would guarantee them a seat in the assembly, and bring Brazil fully into the fold. Gordon is practically slavering to send back our reply. Lucky for us, there's basically no downside, both increasing our influence in South America and adding a powerful new ally to the fight against fascism."
 brazil.130.a: "Welcome to the OFN, amigos!"

 brazil.131.t: "The Crow Falters"
 brazil.131.desc: "His hands shook as he lit another cigar. He was already feeling nauseous, but he needed something to occupy his hands, his mind, anything! Carlos Lacerda paced his office. The curtains were drawn tight, the room lit a pallid yellow by too many incandescent bulbs. Ever since he had applied for OFN membership he had made Brazil-- and himself-- a target. He told no one, but he sometimes dreamed of albino Huns sneaking into the Alvorada through the sewers, padding softly up the stairs, knives sharp, whispering horrible promises in their guttural tongue--\n\nHe pinched his nose, hard. Obsession would kill him and Brazil as sure as any SS assassin, he knew that. Better to stay focused. He had already placed the military on a higher readiness level, anticipating some kind of retaliation for his attempt to join the Americans. A grim siege mentality was settling over the UDN as political and diplomatic pressure ramped up-- that could pose a problem if not checked. No Grey Scare could be allowed to develop, not after the close call of the Hundred Days.\n\nAt least he had the budget, right? Well, maybe not. Before his term, Brazil had not seriously faced the prospect of embargoes or sanctions by any of the major powers. He may be forced to backtrack on the Petrobras question just to provide energy security. Autarky was anathema to him, but if two out of the three great trading blocs locked Brazil out...\n\nDark times were on the horizon. Only Carlos Lacerda could provide a clear way forward for the Republic. He had to be strong, fearless, insurmountable-- but all he could see was the face of Major Rubens Vaz, going slack as his blood spread out over the Rua Tonelero. Would that sacrifice be for nothing after all? Would Lacerda have lived all these extra years just to fail at the final hurdle?\n\nThe crow beats his aching wings against the storm, blown this way and that, always frustrated, always prevented from breaking away. He screams his frustration and rage, damning the sky he used to dominate. What a pathetic delusion. As his strength begins to fail, he wonders what he will find in the dark below. Will it just be him that is destroyed, or the future of his country as well?"
 brazil.131.a: "And so the Brazilians once again knew strife, uncertainty, and obscurity-- and the world forgot them."

 brazil.132.t: "The Intervention"
 brazil.132.desc: "The National Congress building was something to behold to the young soldier. Niemeyer's massive high-rises were something to the boy who had never left the farm before enlisting. Tall, gleaming in the Brasília sun, he couldn't help but gawp at their absolute scale. But he wasn't there for tourism. He had a job to do. The working staff of the Congress, cleaners, civil servants, unfortunate hangers on, all had to be delivered to the nearest police station through Brasília, and there could be no escapees. The new regime had to "ask" whoever they could for any dirt on the now angry opposition, kept under house arrest.\n\nThe soldier was commanded, with five others, to keep an eye on them. His gun heavy in his hands, he eyed a cleaning lady, about twice his age, standing idle, loitering.\n"Move along." he said, trying to be stern.\nThe woman simply looked him in the eyes.\n"Move along, or there will be consequences." he said again, forcing his tone.\nThe woman exhaled. "God did not put you on this earth to simply destroy everything Brazilians hold dear. So why do you participate?"\nThe soldier faltered briefly. "I am obeying the orders of my superiors. Now move."\n"Yet, you have a gun. You have the power and the ability to stop. Why do you continue?"\nThe soldier looked her in the eye, projecting all the intimidation he had in his soul. "Move."\nShe stood up, and walked along.\n\nThe soldier walked behind her. He had been taught to obey his superiors without fault, not to question them. He had walked in lockstep behind them, and worked hard for where he was now. So why did he feel this fear that something was wrong, that all was not as it seemed?\n\nHe shook them off."
 brazil.132.a: "Hierarchy first."

 brazil.133.t: "Passage of the Institutional Act"
 brazil.133.desc: "The military-controlled Congress, harangued by Auro Soares de Moura Andrade, the new Vice-President of the United States of Brazil, had no difficulty passing the Institutional Act, which aimed to centralize power upon the executive and its interim military leadership. To the average person - or to naïve, overly-optimistic OFN-aligned observers, this seemed to be a sign of enthusiastic unity in the aftermath of socialist-induced political chaos.\n\nBut this was not the reality. The only people that were genuinely happy were the enthusiastic sycophants of the new military regime, such as Filinto Müller or Auro de Moura Andrade himself; others were only there because they had been forced to be.\n\nOne of these - Tancredo Neves - did not make his compelled attendance go by easily.\n\n"Moura Andrade, you scoundrel! Watch what you're doing, you traitor! Sooner or later all this will recoil upon your head! If the people don't fix you, Auro, God Himself bloody well will!"\n\nMoura Andrade put on a brave front as Neves kept on upbraiding him. He dared not send the military men that escorted him around after Neves. Otherwise, he would end up losing not just the PSD but even moderate conservatives such as Ney Braga in Curitiba. Just like Moura Andrade himself, Braga was beginning to have second thoughts about the extent to which he was willing to permit a dictatorship.\n\nNo, all he could do was appear to be brushing off Neves' insult and force the bill through.\n\nThat was how the first Institutional Act was passed."
 brazil.133.a: ""The first of how many?" Neves muttered."

 brazil.134.t: "Break Up Strikes"
 brazil.134.desc: "The picket line was a gesture, if anything, to show that dockworkers stand against the bastards who took over their country by rifle and not by force. The burly men, rough from having transported shipments every day of their lives, stood together, a mass of interlinking spirits with one aim. To get the military to do... something. Reconsider? They had no need to reconsider. But to do something, anything, to prevent the fall of Brazilian democracy.\n\nHowever, in the distance, one of the young scouts they had set up for the eventuality of "intervention", came running back. "They're coming!," the young boy cried, as he ran to his father, somewhere in the crowd. And from the distance, they could see Brazilian soldiers and policemen marching towards them, wearing gas masks. The man at the front, a thin policeman, raised up a megaphone.\n\n"You are disrupting the operation of the Port of Belém. Please disperse, and we will have no need to intervene."\n\nThe rabble of dockworkers exploded into various expletives and insults. The policeman turned araund and nodded, and the army began to advance. They, of course, started with the tear gas. Some dockworkers, the less dedicated ones, scattered as they saw the gas spread throughout the air. The rest stood their ground, but many began collapsing. A single worker, his eyes stinging, walked forward, and punched an officer to the ground.\n\nIt took a moment before he was shot in the stomach. The remainder of the crowd scattered with the gunshot, running for their lives as the army marched in.\n\nBelém could run once more."
 brazil.134.a: "Tomorrow, the workers returned with their heads down."
 brazil.134.b: "By the end of the week, none of the strikers were ever seen again."

 brazil.135.t: "Dead Air"
 brazil.135.desc: "Marcos knew that he was, for all intents and purposes, a dead man. A man whose death would be broadcast live as the thrice-damned army marched on the last strongholds of freedom in this country. All these years of activism, of student discussions and meetings, of scavenging cruzeiros to buy a ham radio set, would turn to ash and dust. And yet he felt no fear or dread, only the fire of duty burning within him as he heard the muffled screams and curses.\n\n"They can crush our spirit, they can put the boot on our head, but they'll never smother this flame! For every student, for every citizen they crucify to keep us down, three more will rise! Just like..."\n\nGunshots. He's not sure who started, but he knows for sure who finished, as the roar of machine guns echoed in the background.\n\n"They can never crush our spirit. If you're a true son of Brazil, a true, equal patriot, not the filth they call true sons of our fair nation, go to the countryside! Take your weapons and resist them! Go to..."\n\nIt comes closer. He doesn't have time to tell them where... and maybe that's for the best. He opens his drawer and takes out a single revolver, turns to the door and points.\n\n"Search for the Amazonas! Search fo-""
 brazil.135.a: "Rádio Sociedade's last transmission would be of gunshots."

 brazil.136.t: "Blood Harvest"
 brazil.136.desc: "Gustavo Costa watched from the window of his humble grocery store, as the military dragged another of those rabble rousers, a woman looking on her thirties, by the hair and the shoulders as she kicked, screamed and uttered bloody curses, before being all but thrown on the back of a car, the soldiers moving in a single pace inside and taking the girl away from his sight and neighborhood. Reaching for his pocket, he's ready to lit another cigar before he's interrupted by one of the soldiers, entering his grocery store.His eyes widens a bit, before the soldier simply raise his hand, shaking his head.\n\n"You're not in trouble. We just want to make a few questions..."\n\n"...uh, alright, ask away."\n\n"Did you know that woman?"\n\nGustavo's gaze can't help but scowl, the fifty years old man rolling his eyes and picking a cloth, cleaning his own desk, still staring at the soldier.\n\n"That was Maerietta, right? That girl was always trouble, ever since she was a kid! Listened too much to those city folk, speaking nonsense like communism, like her parents! Good riddance if you ask me, we..."\n\nHis expression cracks for a moment, and Gustavo silently prays it wasn't enough to implicate or suggest anything to the soldier in front of him...\n\n"...we don't want any trouble sir. Just take day by day, you know?"\n\n"Of course." The soldier passed, expression impassive, before fishing a worn out picture from his vest's pocket. " You know anything of Vladimir Herzog?"\n\nSilence stretched across the small grocery store, as the middle aged man and soldier kept an improptu stare, before Gustavo simply shook his head."
 brazil.136.a: ""No Sir. Not at all.""

 brazil.137.t: "Speaking to the People"
 brazil.137.desc: "The soldier was waiting, with some officials and technicians, in the back of the recording room in Salvador.\n\nJuracy Magalhães was an old army man, cut from the same cloth as those who had recently saved the Brazilian government, but the people of Bahia loved him dearly and he had a good reputation among them. The soldier supposed that was why the Sorbonne men chose him to do the announcement. As Magalhães sat with the script in front of him, clearing his throat, the soldier nodded at the chief technician.\n\n"Hello, people of Bahia. This is your Senator, Juracy Magalhães. You may look outside, and see soldiers on the street. They are here to protect you. A time ago, they intervened upon the corrupt German and Japanese-influenced Congress in Brasília. I fought hard against them by other means, but a stronger hand was needed."\n\nThe soldier saw Magalhães' hand shaking slightly behind the glass wall. The man's morals were unquestionable, why was he so nervous?\n\n"General Castelo Branco is a good man who saw when it was needed for military intervention into the operation of the Brazilian government, and he promises everything shall return to normal quickly, after Communist and Fascist influence is purged from it. There is no reason to be alarmed, you shall still have the ability to live as you always have. Thank you for listening."\n\nThe recording stopped, and Magalhães got out of his chair and was let into the nearest room.\n\n"Are you alright, Senator?" The soldier said.\n\nMagalhães took a breath."
 brazil.137.a: ""They aren't going to listen.""

 brazil.138.t: "Talking with the FBI"
 brazil.138.desc: "Lincoln Gordon eyed the man, who was talking very sycophantically, carefully: Brazil's particular foibles, the economic nature he'd been studying for years, meant that it was full of resources that America needed, not just for military needs, either: Food to keep American spirits up, objects to keep America moving, Land for American Companies to invest.\nSouth America ran the USA, he supposed, almost as much as the USA ran South America; Brazil was a major chess piece in the resource battle, and they needed to keep all their pieces on the board.\n\nHe knew the Brazilian military was not politically illiterate: They knew Brazil, they knew how to keep a very aggressive population down, and Gordon knew especially that they knew they needed help, and with some specifically integralist exceptions, they all wanted to turn to their good old neighbor. Humberto de Alencar Castelo Branco appeared to feel genuinely that Brazil needed to be saved from itself. The question was what he was going to ask for, aside from money?\n\n"In conclusion, Mr. Gordon, the support of the United States in stopping those who stand against our government as it currently stands would be valued and reciprocated." Castelo Branco finished, at last.\n\n"That can be arranged, General, my question is how many you need?" Gordon dragged from his pipe.\n\n"Special agents?" The baby-faced general leant forward, gazing into his eyes as if trying to see inside him. "As many as you can send."\n\n"Of course."\n\nGordon smiled, gracefully. A deal was made, now to push the envelope. "Now, onto the issue of the rubber plantations...""
 brazil.138.a: "No need to inform them that the agents had always been there."

 brazil.139.t: "The Unions Curtailed"
 brazil.139.desc: ""This is bullshit!"\n\nInácio spat on the floor of the automobile plant as his fellow workers crowded around Nicolau, who was reading aloud from the union newspaper. All activity in the plant had stopped, and no one was touching their lunches or coffee; all that could be heard was Nicolau's steady voice.\n\n"-Aside from these suffocating restrictions, the army has already declared that all public gatherings have to be authorized by them, not the honorable Minister of Labour, and conducted under their supervision. We all know what that means, brothers; they'll shoot us as soon as we try to rally. With this new law, striking is dead and buried."\n\nAs soon as Nicolau finished reading, his audience broke up and the plant was filled with a chorus of angry voices and enough swearing to make a sailor blush. As always, the loudest and angriest was Inácio.\n\n"So this is it! This is the fucking end! We'll have to weld our mouths shut and make cars until our arms fall off, being good little workers for those motherfuckers in uniform! I bet they're going to conscript us all too! God, I wish Vargas would return and boot out those medal-wearing pissheads-"\n\n"SILÊNCIO!"\n\nInácio stopped cursing, and Nicolau looked up from the newspaper. The shout echoed until the plant once again fell silent. It had come from Kléber, veteran strike leader and the man they all respected.\n\n"This damned law has ended all hopes of striking, but it says nothing about disbanding unions! Be glad that the army hasn't cracked down on and destroyed us yet. They could send in cops and soldiers right now to slaughter us all, but they haven't. Maybe they think because we can't strike, we're cowed. But as long as we're alive, we can still organize!"\n\nA roar of applause greeted him."
 brazil.139.a: ""Now let's all settle down and have lunch. Before we get back to work, we can plan about how we're going to subvert this new law...""

 brazil.140.t: "Formation of the High Command"
 brazil.140.desc: "The generals and their subordinates took their seats, all talking excitedly among themselves. Now that the subversives had been swept away, they could establish a new high command free of any pesky civilian interference, and especially any traitorous officers who dared stay loyal to the civilians.\n\nBut as with all their meetings, it was only a matter of time before the squabbling began. And it began over the 3rd Army's command. South of Brazil and facing the Argentine border, whoever commanded the 3rd Army was entrusted with the nation's absolute defense, and every general had a handpicked loyalist ready.\n\nThe latest screaming match was between Costa e Silva and Golbery, both pushing their own candidate for Castelo Branco to pick.\n\n"-Médici is the perfect man for the job. He cares for nothing but Brazil's wellbeing! With him in charge, the 3rd Army will be so efficient that you can compare them to any American army, and they'll be indistinguishable!"\n\n"Silva, you seem to forget that on the day we saved Brazil, Médici's heroic contribution was to order all his troops to dress in ceremonial uniform and prepare a parade to whoever won. This isn't patriotism, it's opportunism!"\n\n"I've been in the field and saved this country from communism when all you've done is sit on your ass in your office. You're a braindead civilian compared to Médici-"\n\n"You take that back-"\n\nThen Castelo raised his hand and the two generals fell silent.\n\n"No more squabbling, gentlemen. It's unbecoming behavior. I've already reached a decision and I expect you all to listen."\n\n"Golbery's candidate will assume command of the 3rd Army. Médici can assume command of Rio's forces instead. Thus the matter rests. Any questions?"\n\nSome officers were happy, others weren't, but none of them voiced it. The army had made a final order, and it was to be carried out without question. Just like how the government should always be run."
 brazil.140.a: ""Dismissed!""

 brazil.141.t: "Out with the New"
 brazil.141.desc: "Weeks ago, at the passage of the Institutional Act, Auro Soares de Moura Andrade had been upbraided by Tancredo Neves, who had not made his compelled attendance go by easily. "Moura Andrade, you scoundrel!" he cried. "Watch what you're doing, you traitor! Sooner or later all this will recoil upon your head! If the people don't fix you, Auro, God Himself bloody well will!"\n\nAs Moura Andrade entered the office of the President, who he had realized had betrayed him in favor of the hardliners, he realized that all this was the fulfilment of Neves' prophecy. "God is fixing me, as Tancredo said He would. Damn it all." With thoughts like that swirling in his mind, Moura Andrade began to upbraid his President.\n\n"Senhor President! Why on earth have you decided to cancel the elections? Did we not reach an agreement that we would move to ensure a right-wing candidate being elected?"\n\nCastelo Branco spread his hands. "Senhor de Moura Andrade, it galls me to say it, but it has to be done. There's no way."\n\nMoura Andrade was visibly angry. "And that response will not change?"\n\nCastelo Branco shook his head.\n\nAt that, the Vice President of Brazil clammed up, handed his boss a letter announcing his resignation as Vice-President, and left. Castelo Branco merely nodded; at that, Moura Andrade turned on his heel and left, the angry shouting of Tancredo Neves ringing through his head.\n\nCastelo Branco, on the other hand, thought about a replacement as he watched Auro leave.\n\n"I might as well invite that one fellow, Filinto Müller, to appease the hard-right faction of ARENA. He'll be good for the purpose.""
 brazil.141.a: ""But I'd best shut him out of any legislative power before he comes in.""

 brazil.142.t: "Soothing Voice and Deeds"
 brazil.142.desc: ""This is an outrage!"\n\n"We gave politicians a hundred days to choose a President, not make a mockery of this country like you are doing.."\n\n"Lott fucked it up with his corruption, and now you think you can be President?"\n\nAdhemar had his best contrite expression on. He wrung his hand in penitence, listening to the barrage of accusation from the assembled military men. When they finally ran out of bile, the new President lifted both hands, palms up.\n\n"Gentlemen, it was not my intention to injure the nation's honor. The intervention of our armed forces gave our country a new chance at democracy. I thought I would run for office and do my best in this moment of national regeneration." He raised his voice slightly, pre-empting a new wave of protests. "These are big responsibilities. Having done politics at the state level, it is time for me to try to aid the entire nation. The armed forces will of course be important partners and a source of talent and know-how in the day-to-day affairs of my government. There will of course be a tightening of the nation's finances after the wasteful era of the Kubitschek and Lott administration. That said, new investments in the army and its officer corps are long overdue. It will be a pleasure to work with the nation's defenders in building a better, safer and more productive future."\n\nNo attempt to dislodge him from the conversation this time. The officers' emotions had turned to cautious interest. Adhemar could not help but smile mentally at the assembled men's cupidity."
 brazil.142.a: "All this theatre, for a few cruzeiros?"

 brazil.143.t: "Dinner Between Friends"
 brazil.143.desc: "It was a fine meal that the President had all invited them to. General Castelo Branco did his best to ignore President Adhemar's terrible table manners. The military officer picked here and there in his plate, grazing on the excellent food. The other officers were distributed on a vast spectrum. Some, like him, ate hesitantly. Others, like General Amury Kruel, ate with enthusiasm, only stopping to exchange jokes and laughter with the President.\n\nAll this was a charm offensive. Only a fool would not notice that. Yet more than a few officers happily let themselves be seduced. Castelo Branco wondered in particular how deep Kruel was in Adhemar's pocket already, to offer such camaraderie to the new President.\n\nThe army had tested the politician's ability to work together in the past. Now it seemed Adhemar in turn was sowing division with the ranks of the armed forces. Castelo Branco hoped nothing would come of this."
 brazil.143.a: "Can this ogre have such cunning?"

 brazil.144.t: "The Bull and the Rooster"
 brazil.144.desc: "It was a rare thing for the leader of the Free French movement to be received anywhere with the pomp of a full head of state. A full set of presidential guard stood at attention as the plane revealed Charles de Gaulle, fresh from a trans-atlantic flight.\n\nPresident Adhemar shook the hand of the old resistance fighter. Tragic years and the African sun had not been kind to the old man's skin. Still, something remained of General de Gaulle's defiant aura.\n\n"Bienvenue au Brésil, général." Adhemar offered. If the old man made anything of Adhemar's accent, he politely refused to comment on it. Both men walked to a waiting limousine, discussing in French of recent events in Africa and beyond. De Gaulle's eyes dimmed ever slightly when the topic of the French State came up. President Adhemar insisted to the President that France would be liberated without fail. The old man nodded. His strides took a little more vigor.\n\nThe avalanche of disasters that had befallen the French nation had brought many exiles to Brazil. Expatriates as they were, Franco-Brazilians still held a considerable amount of resources. Within the community, the mood definitely favored the Free French. Tapping into de Gaulle's prestige was advantageous. The French State would of course protest. And they would of course be ignored."
 brazil.144.a: "The Free French still have some dignity we can make use of."

 brazil.145.t: "The Working Man's Man"
 brazil.145.desc: "José Alfonso's days were long. So long that his night usually turned out very short. He often found himself selling odds and ends before and after his shifts at a local factory. Toys crafted from scraps discarded on the factory floor. Working two jobs was not pleasant. In this economy, however, it was the only way to provide for his family. Those without money in this country were nobodies, trodden on by those higher up the food chain. And Zé resolved the same fate would not befall his family. He would keep them all safe.\n\nSo the young man worked day in, day out. He kept a few hours a week to play with his children. Kept time each month for a romantic outing with his wife, as the little ones were supervised by his aging mother and father. Zé worked to live. Zé lived to work.\n\nEvery now and then, the good news came out. José would stop at the post office, and receive a small envelope. Cruzeiros, from his good friend Adhemar. The former mayor had always had a lot of friends. Even now as President, Adhemar kept his thoughts to the little men. Men without any centavos to their name. Men like José.\n\nThe money was probably stolen from somewhere. What did Zé care? This was a dog ate dog country. Adhemar had shown him nothing but honesty. Votes for money. So what if São Paulo had seen some corruption here and there during Adhemar's mayorship? The economy's wheels had to be greased. Now the same process would happen to the entire country. Adhemar's envelopes gave Zé a chance to take a day off work. In turn, Zé would keep his word and vote again for his friend Adhemar."
 brazil.145.a: "Zé Ninguem no longer to the President."

 brazil.146.t: "Playing the Long Game"
 brazil.146.desc: ""Alright folks," President Adhemar begun to speak as soon as his last cabinet member arrived. "Time's ticking down to the next elections."\n\n"Certainly sir, but there many important issues that need our attention too," said one minister.\n\n"Of course there are," the President said. "And those sons of bitches in PSD-PTB won't let us get anything done. Come the election, they'll accuse us of having accomplished nothing, and throw us out. Hell, I'm pretty sure Lacerda and his UDN remnants will try to pour oil on the fire. Trying to fix this country can't be our first move."\n\n"What's the plan, then?" Asked Vice-President Laudo Natel.\n\n"We win the people over, then we get re-elected, then we get things done, of course." Many of the assembled deputies nodded. "In this business, you gotta win over the shareholders. We don't owe shit to the idiots in Brasília. What we do need are policies for the common man. Come the election, if the average citizen feels they have more money in their pocket at the end of the month, they'll flock to our banner. An easy electoral win."\n\n"Very good, sir." Natel said. "I imagine you've got a few ideas about whom to target?"\n\nAdhemar smiled. "I most certainly do.""
 brazil.146.a: "Let's get down to business!"

 brazil.147.t: "Live on Air"
 brazil.147.desc: "The first appearance of the President on radio had come as quite a shock to many Carioca. In Rio for some business or another, President Adhemar had taken the time to drop into a popular evening radio show.\n\nOn that first broadcast, the hosts had not seemed totally sure what to do with their newest guest. Over the hour, however, the President's easy going charm and charisma worked its magic. The President's willingness to discuss topics great and small with all other guests had equally done much to make his hour enchanting.\n\nSince then, President Adhemar has appeared from time to time in various radio shows of the city. Whenever he dropped by into the city, many in Rio flocked to the radio for a chance to hear their President, far away from the rarefied air of congress. Critics have scoffed at the President taking the time to discuss latest football matches and culinary trends. His growing audience, in the meantime, has enjoyed learning more about their new chief executive."
 brazil.147.a: "Adhemar rules the air... waves?"

 brazil.148.t: "Adhemar Goes on Tour"
 brazil.148.desc: "Lu had always counted his blessings for landing a job within the PSP's organization. Adhemar's organization had always been a pleasant employer in São Paulo. Now that the President had pulled the rug out from under the country and gotten himself appointed President, Lu's job had taken on an even grander importance. Part of him knew he'd miss the old days of riding a motorcycle around São Paulo delivering gifts. The rest of him, of course, savored the novelty of continuing his job from within a private jet.\n\nThe hangar sat on the edge of São Paulo's air force base. There, Lu ran over the final preparations with a strategist of the PSP.\n\n"President Adhemar is to visit the following states, in a rigid order. You and André are to invite local power brokers to meetings with the boss, to be done whenever he isn't giving speeches."\n\n"What about local PSP candidates?" Asked Lu.\n\nThe strategist looked at him quizzically. "What the hell do you mean, other PSP candidates? We're trying to help the boss get re-elected."\n\nLu shrugged. "Sure. So Laudo Natel and others, they are on their own?"\n\nThe strategist thought. Sighed. "They'll profit from our strengthened position. But priority number one is holding onto the presidency. It's a fine house of cards we've built. We can't risk it collapsing on us.""
 brazil.148.a: "Time for Lu to visit all of Brazil"

 brazil.149.t: "Complexo do Alemao"
 brazil.149.desc: "Not so long ago the area had been known as the Germans' Hill. The establishment of factories after the war had seen the once rural district turn increasingly crowded as workers and their family began to settle the place in ever greater numbers. Now the Complexo de Alemao district had become one of the newest favelas, the name given to increasingly common shanty towns built on the periphery of Brazil's cities.\n\nAs inauspicious an area as it was, President Adhemar had dropped by to shake hands and meet with prospective voters. The district's residents, he claimed, had been forgotten by politicians. The President would do his duty and help poor Cariocas like them, lest they remain stuck in grinding poverty until the turn of the millennium and beyond.\n\nA few in the crowd clapped during the impromptu speech. Others cheered cautiously. The locals were a cynical lot, and they would reserve their judgement until actual help had arrived for them. As the President began to resume his speech, a woman in the crowd began to heckle the President. Him and his party, the PSP, they were more of the same moralizing bunch, the woman claimed. Sex workers like her, small time crooks, those making in the living in the grey economy, when would they get a respite from constant police harassment? The PSP beat the drum of social conservatism. Would they continue harassing poor citizens just trying to make a living?\n\nThe President answered without missing a beat. Police officers tried to police districts where criminals aimed to take advantage of poor citizens. Helping the poor through giving them more opportunities would go along way toward reducing criminality. These opportunities would of course need to come to poor women, forced to sell their body. Brazil could not leave its daughters alone in a cruel world.\n\nA few more in the crowd asked questions. Big and small citizens, Adhemar answered to them all. Always confidently, even if the answers were not always those they wanted to hear."
 brazil.149.a: "They began to understand their President a bit better."


 brazil.150.t: "The Rolling Circus"
 brazil.150.desc: "The greatest show on earth rolled into town one fine friday afternoon. Just as villagers returned home after a day of toiling in the field and tending to their animals, Adhemar de Barros and his campaign would roll into town in a neat formation of trucks. The President would meet with local officials. Often the town mayor. Other times, the local priest. After a brief chat, Adhemar would then head to the local bar. There the President would chat with local electors, ask them about their concerns. The President would shake his head at talks of small farmers being squeezed out by large land-owners. He vowed to fight for them. He was the only politician who would do so, he'd remind them.\n\nAfter a few rounds with the locals the President thanked them all for their time, and vowed to keep fighting for them. His convoy of trucks went off. Probably looking to hit a few more villages in the region before the end of the day. What the villagers did not yet know, was that a month or so later some money from the President's re-election campaign would show up at their doorstep. A small way to show them Adhemar remembered them."
 brazil.150.a: "And a good way to make them remember him."

 brazil.151.t: "The Final Stages"
 brazil.151.desc: "A quiet afternoon. Rare thing in the final days of a presidential race. President and Vice-President nursed cups of coffees while reading through reports written by staffers.\n\n"Things are looking good, Laudo. We've made a lot of progress on the ground. Seems like this presidential election is in the bag."\n\n"Seems like it, Adhemar."\n\n"How is your campaign doing? And our party, in the legislative?"\n\n"We're ahead as well. PSD-PTB is reeling from our attacks. UDN is likewise taking a beating. A few candidates like Edna Lott are holding strong in the vice-presidential race, but overall the map looks favorable to us."\n\n"Edna Lott, eh?" The President swirled his coffee around his cup. "Old man Lott's daughter."\n\n"A rising force in the labour party, but still irrelevant nationally at this point. You've run a good campaign, Adhemar. Time to reap the rewards."\n\n"I hope so. Let's pray the lord we've done enough." The President said, without much of his usual bravado. The Vice-President raised an eyebrow at the sight of a pensive Adhemar. Yet this moment of self-reflection faded away as the President's good humor returned after a final gulp of coffee."
 brazil.151.a: ""It's in the bag, isn't it Laudo?""

 brazil.152.t: "A Cabinet Reshuffle"
 brazil.152.desc: "The cabinet meeting had seen no carryover from the Lott era but President Quadros himself. The mixture of PSD kleptocrats and PTB socialists that had continued to bleed the nation dry had seen their offices cleared within a few hours of Quadros' ascension to the presidency. It was time for the UDN to steer the ship of state back to good governance.\n\nThe first to speak for the day had been the President himself. Quadros, away from the media, had cut short his usual orations and stuck mostly to the great lines all had expected him to keep to. The republic was overburdened by spending, weighed down by bad debt. All of this would be fixed, both to help the common Brazilian man as well as to strengthen Brazil's international position in the face of big economies such as America. Foreign policy would be a second pillar of the Quadros presidency. Subservience to the United States was no longer on the cards. With no ill will to the northern republic, Brazil would look to other nations great and small for allies and friends.\n\nThe tone set for this first meeting, Quadros had his ministers present themselves in turn to their colleagues. Pride of place was given to Artur da Silva Bernardes Filho, minister for the economy. Bernardes is a well known figure of the country's business elite in Minas Gerais. His briefing noted the nation's mounting debt, and their importance as a threat to both the nation's prosperity as well as its foreign policy. Government spending would have to go down. The state would also retreat from the economy, freeing private citizens to act and letting them keep a bigger part of their hard work through tax reductions. Sacrifices would have to be made, yet it was Bernardes's belief that renewed prosperity would come in time."
 brazil.152.a: "Gentlemen, let's get to work."

 brazil.153.t: "Wooing the Army"
 brazil.153.desc: "The assembled collection of generals covered fully the spectrum of negative emotion. A few glared angrily at the President. Others kept their expression in studious contempt. The most patient had one sat closest to the standing President, eyes analyzing the strange figure in front of them.\n\nPresident Quadros carried on as confidently as he could. " - and thus it is the UDN's desire to maintain good relations between the army and our administration."\n\n"Why then, Mr. President, did you usurp your position from Lott? He was one of us."\n\n"President Lott," began Quadros over a few angry mutters, "displayed gross negligence in his corruption and in his appeasement of left wing radicals."\n\n"Lott was an idiot, but a principled one. Where were your concerns with corruption last year?" Jeered a general. Before the President could continue, Field Marshal Branco's voice boomed.\n\n"Quiet!" The marshal turned toward the President." Lott played politics and got burned. What matters is the future. Mr. President, how will your government proceed with the chaos in South Africa? Shall the Brazilian intervention continue?"\n\n"It shall not, field marshal." At this, true chaos erupted. A strong majority of the officers began to argue with one another about the campaign in Africa, the merits of the Lott presidency, and the benefits of deeper ties with the OFN. Quadros stood in front of them all, his carefully prepared speech on the merits of a neutral foreign policy, and on the importance of avoiding unnecessary deaths of proud Brazilian warriors going up in smoke. Field Marshal Branco stared at him with a neutral expression, as the debate continued to unfold.\n\nRelations with the army were not off to a fine start."
 brazil.153.a: "No fighting in the war room!"

 brazil.154.t: "Lacerda's Crowing"
 brazil.154.desc: "The cachaca did not help much with his funk. A few pieces of ice had fallen from his glass and scattered on the newspapers spread throughout the table. There they melted on the pages, splotching them with a mixture of ink and cheap paper. So much mud splatters, confabulation, histrionics, prevarications. Idly, the President cut ribbons from a hollowed out lime.\n\nTrying to expose Lacerda in the papers had not gone to plan. The Crow had merely taken flight, while his cronies had begun returning fire. Now Quadros stood covered in political filth, while Lacerda flew above, taunting him. From evening papers and scandal rags, to respectable conservatives dailies. The latter especially hurt. At least the UDN's internal factions had not paid the failure much heed so far.\n\nCachaca, ice, lime... sugar? Quadros dropped the knife on the table and staggered to his feet. He needed more sugar. On the way to the kitchen, he stopped by a window. Outside, Quadros could see in the distance beyond the fence a myriad of crows. A few flashes of camera. Lacerda's journalist friends mocked him all the way to the presidential palace. They'd no doubt harass the President later on, asking him questions they already had decided his answers would be. Less crows, more carrion birds, perhaps.\n\nQuadros sighed, and continued to trudge forward in search of sugar."
 brazil.154.a: "No better ways to spend their evening?"
 
 brazil.155.t: "A Sinister Force from Europe"
 brazil.155.desc: "President Quadros had come to power offering Brazilians a return to a simpler, more honest era. An era of hardworking men, of proper families, of just governance. How then, asked the President, could immoral behavior be tolerated throughout the nation?\n\nNot content with fighting European inventions such as fascism, racism, and Marxism with all the power afforded to him by his office, President Quadros had signed a new law officially banning the Crimini. This dangerous new piece of fashion, popularized by rebellious youth in the French State, crudely approximated a woman's swimming suit. Only three scraps of tissue covered its wearers' unmentionables, leaving the rest of her visible to the entire beach. Named after the French word 'mini' and the German rocket testing site in Crimea, the Crimini had exploded in popularity throughout the world. It packed a rocket's punch in only a few square centimeters of fabric. Partisans celebrated it as a rebellion against Europe's decaying moralistic regimes. Cynics saw it as a cheap way for the declining French economy to outfit every beach going woman.\n\nPresident Quadros saw it as a dangerous attack on the nation's well being. Their blood heated by the tropic's sun, how would honest Brazilian men carry on their work, knowing that a few miles away entire flocks of sun-bathing women exposed their bodies to the world? The Republic's future, the Brazilian people's future, all of it depended on eradicating this new ideological threat to virtue and good moral. Already, a new brigade of police officers were being trained on the art of counter-insurgency to flush out sultry seditious sun-bathing seductresses."
 brazil.155.a: "The most pressing issue for this government."

 brazil.156.t: "The Rising Sun's Ambassador"
 brazil.156.desc: "The position of ambassador of the Japanese Empire to Brazil had long been seen as something of a sinecure. Beyond vaguely agitating for the rights of Nikkei-Brazilians, the ambassador was generally given little to do. Brazil was after all deep OFN turf, and the country's business community had very little interest in anything but deepening ties to the Americans. A few Japanese operated on the margins, all the best commercial space taken over by the Yankees.\n\nThus it had been a pleasant surprise for the new President to request an official dinner with the Japanese ambassador. Over the meal, both men had discussed improved trade between the two nations, and a general thawing of the relationship.\n\nThe ambassador had long kept an eye on the eccentric Vice-President and his agitation for better ties to the Sphere for Brazil. Quadros' trip to the Sphere had brought renewed activity to the Japanese mission to Brazil. The few embedded Tokumusoukan agents within the embassy had even sent a few covert feelers to Quadros' office, without much success. Now that the man had turned President, perhaps some things would change?"
 brazil.156.a: "A good dinner, an even better conversation."

 brazil.157.t: "The Diplomatic Samba"
 brazil.157.desc: "Alfonso Arinos de Melo Franco was not on his first rodeo. The forties had seen him oppose the Estado Novo; the fifties, help pass a law against racial discrimination. Throughout the years he had met politicians of all stripes and shapes. None of them quite like his new boss, however.\n\n"In your role as foreign minister, you're to get us out of South Africa." President Quadros said, pacing near the presidential office. De Melo Franco sat, his head resting on his fist. "It's important we show those yankees that Brazil will not be bossed around. The days of the automatic alignment are over."\n\n"That's excellent, sir." Began De Melo Franco, cautiously. "This is the only worthwhile policy going forward. Will I be afforded freedom from, hmm, domestic policy concerns?"\n\n"Of course, Mr. de Melo Franco. I'll be holding down the fort while you go abroad." Quadros smiled. De Melo Franco nodded, doing his best to look convinced. "Onto the next step after. Brazil needs new friends, big and small. Your interest in closer ties with West African nations of particular importance. We southern nations must stand together in these troubled times. Before all this, however, the big fishes need to be satisfied. Washington, Germania, Tokyo."\n\n"Of course, sir." De Melo Franco scratched his chin and thought. This would be an unprecedented opportunity for his career, and for Brazil in general. As long as the President kept everything safe on the home front, there were many opportunities for the republic abroad. If nothing else, in these strange times, who better than this strange new President to lead the nation? So the foreign minister tried to convince himself."
 brazil.157.a: ""I'll go make a few calls, Jânio""

 brazil.158.t: "A Tempestuous Meeting"
 brazil.158.desc: "Lincoln Gordon had been sent to Brazil to make sure the stormy politics of the great South American republic did not fall to communist agitators or fascist demagogues. Above all, Brazilian alignment with the US had to be preserved at all cost. Through all this Gordon had monitored Varguist elements and suspicious members of the leading PSD-PTB coalition. What an unfortunate turn of events, then, that the most American friendly conservative party had turned out to be the greatest threat, under its new President!\n\n"President Quadros, with all due respects, the American people look with consternation upon your efforts to leave the South African conflict."\n\n"I've meant no disrespect to America's admirable efforts to support freedom wherever it seems endangered, ambassador." Quadros' infuriating calm upset Gordon even more than his circular reasonings. "But domestic political concerns in Brazil made our continued presence in Africa untenable."\n\n"Your opposition to the South African War dates back to long before the political crisis that saw you replace Lott." pointed out the diplomat.\n\n"I'm a man of my word, Mr. Gordon. I've long argued that Brazil, while cherishing its friendship to fellow republics of the Americas, must look beyond the shores of the Atlantic and Pacific to find its own place in the world."\n\n"I understand." said Gordon.\n\nThe meeting continued for some time. The most readily understandable thing, for the ambassador, was that Brazil sat on a powderkeg. This crazy new President did not seem to realize how dangerous his efforts were to his country's stability. Gordon's job would be ever harder in the following years."
 brazil.158.a: "America remains the only adult in the room."

 brazil.159.t: "No Friends, Only Interests"
 brazil.159.desc: "President Quadros did not think of Carlos Lacerda as a cheerful man. Even by the journalist's usual dour expression, however, today's expression told Quadros that his conservative rival was in a foul mood. The journalist had approached him on the margin of a conference.\n\n"President. About your normalization of relationships with Germany."\n\n"Yes Mister Lacerda?"\n\nThe journalist launched himself into a tirade. "This is an outrage! How dare you normalize relationships with a genocidal fascist regime? Court their blood soaked money? Have you no shame, Mister President?"\n\n"Brazil must be free to seek its own interest abroad. We've had our differences with Germany, and a committee at the moment is evaluating which corporations are most guilty of use of slave labor so that we..."\n\n"They're all guilty! All! You are making a fool of us on the international stage. Now in Washington D.C. they... "\n\n"Do you only get up in the morning if the Americans deem it acceptable, Mister Lacerda?" It was Quadros' turn to lose temper. "Where was the American love of freedom and human rights when their soldiers broke up unions in Central American banana republics? Occupied Haiti and Cuba, forced everyone onto plantations? Nations have no friends, only interests. Americans do not care one whit about slaves in Manchuria nor in Poland, only about defending their domestic interests."\n\n"Then will you sink to the Americans' level, Mister President?" Lacerda argued back feebly. President Quadros shook his head, and dismissed the arrogant conservative."
 brazil.159.a: "Brazil will be free from Washington, no matter the cost."

 brazil.160.t: "A Trip to Tokyo"
 brazil.160.desc: "The Japanese media were unused to the novelty of interviewing foreign head of states. At least, foreign head of states from beyond the Sphere. An unusual event to talk with someone who didn't toe the usual party line. This strange man from Brazil, President Quadros, delighted in the attention, speaking at length in his hotel's conference room in Tokyo to the assembled journalists about the importance of better ties between the Sphere and Brazil. All in all, the assembled media were in a good mood as they listened to the foreigner's ramblings.\n\n"Of course Brazil must grow closer to Asian nations." The President went on, through a translator. "After all, there are no great nations in the world than the Chinese, Japanese and Korean people." The translator, a Nikkei brought over for his UDN activism, said without thinking. Korean people? The audience began whispering uneasily. Caught off guard, President Quadros' rehearsed speech stumbled. "The uh, Korean people have a specific place within the Pan-Asian dream, being the first nation to be brought under the Japanese Empire's civilizing mission." The audience saw a few nods. But the earlier conviviality did not return fully. The journalists were now weighing the Brazilian President's words more closely."
 brazil.160.a: "Perhaps some members of the Sphere are less equal?"

 brazil.161.t: "The Other Eagle"
 brazil.161.desc: "If the Japanese embassy to Brazil had long been seen as a sinecure, the position of representative of the Reich had been relegated to the status of retirement home. The German ambassador had been contemptuously ignored by every President since the end of the war. A streak it fell on the new President to break, unfortunately. The current man inviting President Quadros to dinner was inoffensive enough. Some amiable old party members who had fallen out of favor in Germania's court politics, but not fallen out of favor enough to be sent to rot in a Reichskommissariat. The ambassador seemed delighted to have some company. On his face the President could see the work of the last few years, a corrosive acid to supposed Teutonic invincibility. The death of Hitler had, after all, not been kind to the supposed master race.\n\nBoth of them made small talk over some food indifferently prepared. The ambassador mentioned America and its trouble keeping blacks in their proper place. The old Nazi praised in contrast Brazil for doing its best to keeping its mongrel population docile. Quadros had to bite his tongue at the obvious diplomatic blunder, and quickly changed the subject.\n\n"Have, uh, news come from Germania about any future assignment for you? Your stay in Brazil has been remarkably long, ambassador."\n\n"Oh, to go back to Germany." The man sighed. "No news yet, President. No news yet.""
 brazil.161.a: "Quadros almost felt sorry for him, almost."

 brazil.162.t: "The Appetizer"
 brazil.162.desc: "De Melo Franco had come to visit the President and report on his recent activities. The foreign minister had organized the meeting with the three ambassadors of the great powers. He had also been writing letters to American representatives every waking hour to reassure them that President Quadros was America's best friend, and would always be.\n\n"Great work, Alfonso. Your efforts have not gone unnoticed. However, more remains to be done. We've opened new lines of communication with the great powers, but they remain untapped. We must make use of the full potential of the Independent Foreign Policy to help Brazil soar."\n\n"Indeed." The minister presented a folder to his boss. "I've taken the liberty of furthering our contact with West African states, which are hungry for development aid. There are many opportunities in Africa if we move before the bigger players."\n\nPresident Quadros smiled. "Great work, Mr. de Melo Franco. Time for Brazil to make waves.""
 brazil.162.a: "So it seems Mr. President, so it seems"

 brazil.163.t: "Onto the Main Course"
 brazil.163.desc: "The announcement had come in during a humdrum UDN conference. The President had descended from planet vassourinha to discuss his developing project, the Independent Foreign Policy. Some of its points were tolerable, such as looking for more trade partners; some were worrisome, like moving out of America's shadow; now, this latest idea had landed like a lit grenade in the middle of the assembly.\n\n"You want to do what, Mr. President? Is this a joke?" Asked a prominent Lacerdista senator. President Quadros' tone was level as he answered that he was dead serious. "You can't possibly want to give one of the nation's highest honors to some... communist piece of trash?"\n\n"This piece of trash, sir, was instrumental in helping Fidel Castro prevent a German takeover of his island. While his ideology is regrettable, Ernesto Guevara is one of the greatest Latin American patriots of our times."\n\n"Communism is antithetical to everything we hold dear on this continent." retorted the senator. "Now the Americans are stuck with a failed state a hundred kilometer from Florida. The very last thing we should do is encourage more of this nonsense anywhere in this hemisphere!" The senator continued.\n\nThe room was increasingly empty. Some of the UDN members had already made use of the debate to slip out the back door. They knew that there would be no arguing with the President when he had made his mind like this. As stubborn and rigid as Lott had been, President Quadros certainly could give him a run for his money. And now this allegedly conservative President was inviting a blood drenched Marxist to Brazil."
 brazil.163.a: "This fool makes a mockery of our party!"

 brazil.164.t: "Matters of Blood"
 brazil.164.desc: "The UDN member ran into the President on the margin of a party strategy conference. "Sir!"\n\nPresident Quadros turned and gave him a great smile. "Ah, Marcelo. One of our aides in the Chamber of Deputies, right?"\n\nMarcelo was taken aback. "Yes sir. Sir, I wanted to ask about your repeal of the restrictions on Japanese immigrants. I... Uh..." The aide's thoughts were led astray for a moment by the President's beatific smile.\n\n"Yes, the repeal of those restrictions. What a grand policy! I'm grateful for the support of the UDN on this landmark legislation. Brazil, the blood of old Europe and of fiery Africa in its veins, will soon have the delicate Orient as a counter-balance."\n\n"But sir, uncontrolled immigration will destabilize our country. Especially immigrants from Japan, the Nikkeis cannot be trusted, sir. I implore you to change tack."\n\nQuadros put his hand on the aide's shoulder. "No need for fear. The Japanese are a cool headed people. Their sons and daughters will not add any unruliness to Brazil. Besides, think of the reinforced economic ties to the Sphere for Brazil! Now if you must excuse me, we've more work to do, young man!"\n\nAnd so the President went, leaving the aide behind, equal part irritated and mystified. The President's opponents within the UDN had to organize better."
 brazil.164.a: "I foresee the Amazon River foaming with much blood."

 # Lott Business as Usual
 brazil.165.t: "The New Plan"
 brazil.165.desc: "It was a pleasant day in the Palácio do Planalto, and Henrique Teixeira Lott was pleased that he was able to use this good day to meet with someone who was neither an opponent of his, nor somebody who had just messed up, nor indeed somebody out to see what they could get from him.\n\nQuite the contrary: it was his esteemed predecessor, Juscelino Kubitschek, a grandee of Lott's own PSD. Both of them considered each other friends and mentors, and with good reason. When Kubitschek was elected in 1955, Lott had helped the constitutionalist effort that defended him against putschists. And when Lott stood for election in 1960, Kubitschek had helped show the previously apolitical Marshal the ropes of politics. Now Kubitschek was in Lott's office to discuss a new plan that the President had; since the matter of Quadros was now settled once and for all, Lott's hands were now free.\n\n"Now, Juscelino, I've followed your and Neves' way of doing things a lot of the time, and it's all well and good, but I think it's well past time for me to do something to establish myself as my own man, leave my own legacy behind."\n\nKubitschek smirked. "Oh, I understand completely. You can't very well build Brasília again, and the Trans-Amazonian will take a good while to finish. What are you thinking about?"\n\nLott smiled slightly, saying, "I was thinking about de-politicizing the military, forcing the Sorbonne and hardliners to clam up, and making my constitutionalists the most powerful faction in the armed forces. This'll make sure that no-one will ever need to worry about a military takeover ever again."\n\nKubitschek was impressed. This he had not expected. "Quite a damn good thing it'll be if nobody has to worry about what we did.""
 brazil.165.a: ""You have my support, Henrique.""

 brazil.166.t: "The Plan Continues"
 brazil.166.desc: "[BRA_event_166_loc]"
 brazil.166.a: "It is for the good of Brazil."

 brazil.166.goulartpath: ""Operation Toucan is a plan to remove once and for all the threat of untoward military intervention in our Brazilian democratic order. We will depoliticize the armed forces and teach servicemen and officers to understand once and for all that they are merely citizens in uniform, nothing more and nothing less."\n\nAs Henrique Teixeira Lott, President of Brazil, looked around the room, he gauged the attitudes of the small cabinet meeting was addressing. His second-in-command, João Goulart, pledged his full support. Tancredo Neves also agreed, saying that Quadros put it best and that Lott could count on his support too. Walther Salles, though less enthusiastic about it than Quadros was, also seemed supportive.\n\nOn the other hand, the other military man in the room, Marshal Odílio Denys, was more reticent. "Henrique, this is a fairly good idea, and I won't deny it. But I have to advise you to be careful about the way you go about this. If we step on too many toes things will go badly; maybe you might want to walk it back."\n\nLott shook his head. "If the military professionals know what is good for them they will submit. This has to be done and it has to be done at once.""
 brazil.166.quadrospath: ""Operation Toucan is a plan to remove once and for all the threat of untoward military intervention in our Brazilian democratic order. We will depoliticize the armed forces and teach servicemen and officers to understand once and for all that they are merely citizens in uniform, nothing more and nothing less."\n\nAs Henrique Teixeira Lott, President of Brazil, looked around the room, he gauged the attitudes of the small cabinet meeting was addressing. His second-in-command, Jânio Quadros, seemed to be very receptive to the idea of being freed from the prospect of a putsch. He made that very clear. "This is a great idea, Henrique, and I'll back you the whole way in it."\n\nTancredo Neves also agreed, saying that Quadros put it best and that Lott could count on his support too. Walther Salles, though less enthusiastic about it than Quadros was, also seemed supportive.\n\nOn the other hand, the other military man in the room, Marshal Odílio Denys, was more reticent. "Henrique, this is a fairly good idea, and I won't deny it. But I have to advise you to be careful about the way you go about this. If we step on too many toes things will go badly; maybe you might want to walk it back."\n\nLott shook his head. "If the military professionals know what is good for them they will submit. This has to be done and it has to be done at once.""

 brazil.167.t: "A Meeting of Two Presidents"
 brazil.167.desc: "It was a pleasant day in the Palácio do Planalto, and Henrique Teixeira Lott was putting it to good use, meeting with a predecessor of his in the Presidency, Air Marshal Eduardo Gomes.\n\nIn the past, there had been two major sources of dispute between Gomes and Lott. First, Gomes had been a member of the UDN during his presidency, and had defeated the PSD candidate, Marshal Eurico Gaspar Dutra, to gain power. Second, in the aftermath of the 1955 election, when Juscelino Kubitschek's election was threatened by a military mutiny, Lott went all the way in supporting the constitutional order, while Gomes remained neutral.\n\nThey had disagreed quite vigorously on these matters; how fortunate, therefore, that Air Marshal Gomes was willing to hear this idea out... with a few conditions.\n\n"Well, Henrique, I can back you up on this, but I'll have to ask for a few things."\n\n"And these are?"\n\n"More funding for the air force, as always, can't let my boys go hang, and also that a few air force clubs be left alone."\n\nLott was somewhat displeased, but Gomes' goodwill - and that of the air force - was worth the cost, all things considered. This was for the best."
 brazil.167.a: ""You have a deal, Eduardo.""

 brazil.168.t: "Sarmento Ferments"
 brazil.168.desc: "It was a rainy day in Manaus, capital of the State of Amazonas, and Siseno Sarmento was angry and distraught. Despite his loyal service to the Brazilian Republic as part of its armed forces, he had been shunted off to this damned backwater to "serve as commander of the local garrison forces" (read: do nothing but inspect one-thousand reservists at dawn and dusk every day). Sure, he had been a bit too involved with the part of the military that thought that it was their duty to govern Brazil, saying that the civilians could not be trusted to rule themselves (they couldn't; the civilians were all moronic sh- idiots). And sure, he had maybe gone slightly overboard in disrespecting the then-Marshal while they were colleagues in the military (but he was a moth... entitled good-for-nothing, he deserved what he got). But this was too much, God damn it all to hell! President or no, Lott had no fucking right to treat him like this, for fuck's sake!\n\nFor the next few weeks, Sarmento's stream of consciousness repeatedly followed this line of useless complaining, while he plunged into an increasingly deep state of despair at being cut off from his former troops and from the halls of power. But after some time spent lying around uselessly, Sarmento shook himself from his slough of despond, stopped using curse words, and began to make plans to attempt a comeback under another President, cursing Lott under his breath the whole time."
 brazil.168.a: "Lott on the other hand was just glad to be rid of him."

 brazil.169.t: "Kruel's Cruel Demise"
 brazil.169.desc: "Henrique Lott looked at the report and wished to God that this didn't have to happen. He wished that he could have this cup taken away from him. He didn't want to do this to Amaury - an old friend and colleague - but he had no choice. One could not very well expect a marshal to be spared punishment after he accepted massive bribes so he could purchase large amounts of farmland and become a rancher baron overnight.\n\nAs Lott issued the order for Kruel to be dishonorably discharged for corruption and malfeasance, Marshal Denys, his defense minister, walked into the room with a concerned look on his face. "Henrique, is this really the right thing to do? You know it's going to upset a whole lot of people, step on a lot of toes all over the place. Surely there's another way of dealing with this. I know you don't even want to do it."\n\nLott sighed and shook his head. "What I want or do not want as President and as a retired marshal of the Brazilian army means nothing in front of the law. Amaury accepted such a large set of bribes that there was nothing else that I could do. He has to go, and I don't care what the others have to think about it. Besides, only the non-constitutionalists, the ones who think that they somehow know how to run the country better than the rest of Brazil does, have anything to fear."\n\nDenys nodded, but was visibly frustrated. Lott barely noticed; he was too busy wondering just where all Kruel had gotten all that money from. Years later, it would come out that it had been Adhemar that did it. For now, however, Lott was left wondering, and Denys was left displeased."
 brazil.169.a: "To save the rest of the lot, Lott had to be cruel to Kruel."

 brazil.171.t: "The Matter of the Marines"
 brazil.171.desc: "Henrique Lott had received a report from a secret investigation into the conduct of his country's marine troops, who were the amphibious elite of his homeland's foot soldiers. In theory, these troops were supposed to perform far better and be held to far higher standards than the regular army. But this was unfortunately not the case, and Lott was far from impressed with what he was looking at.\n\nThere was a semi-frequent violation of laws against corruption and abuse of power. There were reports of misuse and abuse of equipment that was given to them. There was no small number of times when marines made off with equipment after their tour of duty was over. But most concerning of all to Lott were the unsubtle 'jokes' that the marines kept making about overthrowing politicians that they did not like.\n\nThis could not be borne, and it would not be. Lott decided to act before the marines became an actual threat or were used by the hardliners to gain power. He'd need Denys' help to do this; fortunately, he knew that the old marshal would likely take his side this time around."
 brazil.171.a: ""Please bring Marshal Denys to me.""

 brazil.173.t: "Marshal Lott Reflects"
 brazil.173.desc: "[BRA_event_173_loc]"
 brazil.173.lottactfailed: "It had been a challenging four years, Henrique Lott thought. There had been a lot for him to do; he had had to deal with the Nazis invading Brazilian waters, economic instability, war in South Africa, a madman of a Vice-President, screaming opposition politicians, the scourge of corruption and malfeasance, and above all the threat of a military intervention against him.\n\nHe had come so damned close to getting rid of that threat for himself and all his successors. An act that would have removed once and for all the threat of untoward military intervention in the Brazilian democratic order. It would have depoliticized the armed forces and taught the soldiers, airmen, and sailors to understand once and for all that they were merely citizens in uniform, nothing more and nothing less. But alas, it was not to be. He had been outmaneuvered by the military and political opposition, and now he was left feeling like he had not done enough.\n\nAh, well. It was of no matter. He would take a brief vacation somewhere - probably not Guanabara though - and have rest from his labours. Then he would go back to active service in the army and do everything in his power to influence the military towards correct policy as a member of its constitutionalist faction."
 brazil.173.lottactpassed: "It had been a challenging four years, Henrique Lott thought. There had been a lot for him to do; he had had to deal with the Nazis invading Brazilian waters, economic instability, war in South Africa, a madman of a Vice-President, screaming opposition politicians, the scourge of corruption and malfeasance, and above all the threat of a military intervention against him.\n\nAnd he had gotten rid of that threat for himself and all his successors. An act that removed once and for all the threat of untoward military intervention in the Brazilian democratic order. It depoliticized the armed forces and taught the soldiers, airmen, and sailors to understand once and for all that they were merely citizens in uniform, nothing more and nothing less. God be praised, it had come through. He had outmaneuvered the military and political opposition, and now he was left with a feeling of satisfaction. He had done enough; he could leave now.\n\nAh, well. It was of no matter. He would take a brief vacation somewhere - probably not Guanabara though - and have rest from his labours. Then he would go back to active service in the army and do everything in his power to influence the military towards correct policy as a member of its constitutionalist faction."
 brazil.173.a: "The President becomes the Marshal."
 brazil.173_tt: "§YMarshal Henrique Teixeira Lott, President of the Brazilian Republic, moves on to become the hero of his own story. We on the other hand shall move on to his successor.§!"

 brazil.174.t: "The Lott Act Fails!"
 brazil.174.desc: "There was no shortage of finger-pointing and shouting in the National Congress Building today, after the Senado failed to pass the Lott Act. The act intended to curb the political influence that the military currently holds by limiting and enforcing what political actions military members may take. The act was hotly debated within the armed forces, though it appears as if the Hardliner faction has taken an advantage in the military. President Lott, the primary sponsor of the act, hoped to install Constitutionalist allies within the military to root out Hardliner influence, but it appears as if this scheme has been largely unsuccessful. Furthermore, President Lott's refusal to withdraw the act drew significant anger from all three branches of the armed forces.\n\nNo stranger to military influence in their politics, Brazil's democracy is frail and prone to instability, especially given the wide range of political thought within the country. Although Brazil's military has pledged to continue defending democracy and insists that it has no current or future plans to intervene in an election, the officers' fear of a leftist-dominated government is well-known to nearly all Brazilians. This is exacerbated by the PTB-PSD coalition's desire to reform the military, which could lead to a second showdown regarding the military and politics in the future. For now, the armed forces will enjoy their current political freedoms, for better or worse."
 brazil.174.a: "An unfortunate failure"

 brazil.175.t: "The Lott Act Passes!"
 brazil.175.desc: "Applause could be heard throughout the National Congress Building today, as Brazilian senators have passed the Lott Act. The act, aiming to curtail the influence of the military in everyday politics and affairs, was able to garner enough support to pass despite veiled attempts by the military to sabotage the act. Ever since the Estado Novo days, Brazil's military has had a disproportionate amount of influence on its politics, and candidates would find themselves more worried about the military, rather than the issues of the day and re-election. President Lott, a military man himself, has pushed for significant reforms to the officer corps of the army, navy, and air force by installing "Constitutionalist" allies in the place of Hardliner members.\n\nThe Constitutionalists, as their name suggests, look to reduce the role of Brazil's military in political affairs, focusing purely on the defense of Brazil. In recent days, President Lott and the Constitutionalists have slowly relegated Hardliner officers to irrelevant positions, or "encouraging" them to take early retirement from the military. With a Constitutionalist majority in the military, the hope is that they will abstain from intervening in future political elections and promote a democratic transfer of power. While some in the military are not enthusiastic about the various reforms that are in the Lott Act, there is now little they can do to change the law in their current position."
 brazil.175.a: "A necessary step to protect the peaceful transfer of power."

 # 1965 Election Season Begins
 brazil.176.t: "Election Season"
 brazil.176.desc: "It's time again for Brazil's political parties to gear up for election season. In this year's election, one third of all Senate seats are up for election, one in each state.\n\nThe power struggle between the UDN and the coalition of the PSD and PTB hangs in the balance, while the PSP looks to establish itself as an electoral force. Voters around the nation will get the chance to shape Brazil's future."
 brazil.176.a: "Vote UDN!"
 brazil.176.b: "Vote PSD!"
 brazil.176.c: "Vote PTB!"
 brazil.176.d: "Vote PSP!"
 brazil.176.e: "report if you're seeing this, it's a bug"

 # 1965 Election Season Ends
 brazil.177.t: "Brazil Votes"
 brazil.177.desc: "Campaign signs are being torn down, polls are emptying, and radio broadcasts are now all focused on the count. All at once in Brazil, votes are being counted while the nation watches in suspense, a winner should be clear soon."
 brazil.177.a: "The votes are tallied..."

 brazil.170.t: "The Highway Completed!"
 brazil.170.desc: "Finally, after years of hard labor and an extreme investment of both economic and political capital, the Trans-Amazonian Highway has reached the borders of Peru and Colombia. The Highway's completion irreversibly links the depths of the Amazon with Brazil's largest cities, providing a lifeline for trade and transportation to the entire country. A megaproject to rival the Suez Canal now stands triumphant and complete, a clear sign to all the Americas and the world at large that Brazil's fire has not lessened in the slightest.\n\nRaucous celebration is everywhere. Highway workers enjoy free drinks the nation over, political pundits breathe a sigh of relief and near every citizen takes to the streets to celebrate a clear demonstration of what a united peoples can accomplish. Even the Highway's detractors are forced to admit, reluctantly, that Brazil will reap its benefits forever. Fireworks light up the skies of Brasília, of São Paulo, of Rio.\n\nThe economic benefits of the Trans-Amazonian Highway are obvious, but this is as much a political victory as an industrial one. The men and women who hold Brazil's highest offices host massive parties, celebrating the massive uptick in votes and popularity anyone in the administration is sure to gain. Foreign acknowledgements and congratulations have already begun to flood in, as the world reacts with a mix of incredulity, joy and sheer surprise at Brazil's ultimate success, its ultimate progress.\n\nA young girl watches the strange black path through a cluster of trees, and wonders at its purpose. A sudden growl, as loud as the great machines that clear cut a way for the black stone, shakes her from her thoughts, and she runs back into the jungle. A bus speeds down the road, as men hang out the windows and yell a drunken song. For the little girl, the Highway signals a different kind of progress."
 brazil.170.a: "The Amazon would echo with the engines growls for a long, long time."

 brazil.178.t: "Ripe Harvest"
 brazil.178.desc: "Egbeble considered himself to be very lucky to have found employment away from the brutal diamond mines of Zentralafrika. The captain, one of the many Belgians inhabiting Léopoldville, decided to overlook his background because of a serious shortage in personnel, and it showed. The people that made up the ship's crew were incredibly diverse: Germans, Belgians, and English, and, despite being the only dark-skinned member of the crew, he wasn't really put through any different treatment from his peers, something which made Egbeble grow to deeply appreciate life at sea when compared to his time at shore.\n\nHe wasn't dumb. As soon as he learnt of the job offer, he already had a vague idea of the motives behind the lack of personnel and the informality of it all, and it quickly became clear when they first spotted a Brazilian patrol boat in the distance. They were always faster and the job paid more in a single trip than what his family had probably seen in a lifetime, so he wasn't complaining despite the anxiety slowly building up in him. He'd tell himself that it'd be one more trip and he'd quit, but greed would always get the best of him.\n\nThis past month had been particularly tense: Patrol boats had gotten closer than ever, close enough to attempt to ram, and they'd also been hearing mentioned over the radio how Brazilians were ramping up their efforts. While the captain was worried and almost called the trip off halfway through, the crew, along with Egbeble, managed to convince him otherwise. After all, this harvest had been particularly great, and they'd make a fortune if they continued.\n\nHe was in the kitchen when it happened. A loud "thump" rocked the ship in all directions and he barely managed to stay on his feet. Egbeble heard the engines of the ship suddenly grind to a halt and wasn't even halfway to the door before three men came rushing in and pointed their carbines at him. Realizing what had happened, Egbeble surrendered and was quickly brought out handcuffed to be lined up along the rest of his crew. As people shouted words in Portuguese he couldn't understand and the captives were escorted towards another ship, the sight of the swastika being lowered to be replaced by the flag of Brazil briefly caught the interest of all those present."
 brazil.178.a: "Earth provides enough to satisfy every man's needs, but not every man's greed."

 brazil.179.t: "A Brief Discussion on Policy"
 brazil.179.desc: ""...and the Dietrich Eckart, stern trawler, 150 tons, registered out of Luanda," detailed Marshal Odílio Denys. "So Mister President, that's four since yesterday. It remains to be seen what they do next, but I can't imagine Berlin-"\n\nThe door to the President's office opened, and Quadros stuck his head in, asking "Did you tell Toscano to seize the German ships? Without even telling Germany?"\n\n"Yes," Lott said. "The negotiations weren't going to go anywhere and their ships continued to rob us blind. So, naturally, we had to skip to sending the Zentralafrikans a message they could understand. And now they know we aren't messing around."\n\n"This is bad Henrique, are you certain this is the right thing to do? Müller doesn't want this to get out of hand either. He doesn't want to get the Reich into a war with Brazil. And Germania might just be angry enough now to take a harder line against us."\n\n"Oh hell, it was always going to end up like this. Everyone who met the Reichskommissar says Müller's a madman. He can't see us as an equal at the negotiating table, and he doesn't have any interest in avoiding a diplomatic incident. There can be no negotiation with the Reich unless we can show them we are willing to go toe to toe. And this is the wake-up call he needs to realize we're serious."\n\nQuadros thought it over, and said "Yes, I understand your point. If we were negotiating with a real African state, then things would be different, but with a Reichskommissariat... I don't think anyone wants to treat a German colony as an equal."\n\n"Correct. They're a damned colony, and that's why we take a hard line. And I think a real country would be more respectful anyway."\n\nQuadros said, "Alright, Mister President, have a nice afternoon.""
 brazil.179.a: "Double standards for savages and civilized."

 brazil.180.t: "The 48 Hour Ultimatum"
 brazil.180.desc: ""We're still detaining vessels," said Admiral Toscano. "Three today, five yesterday, and that's the ones we got. There's almost certainly ones that made it through we don't know about, and the B-17s are still tracking trawlers coming toward us. If there's a warning, they aren't heeding it."\n\n"So they either don't have radios or they are ignoring us, because the ambassador says it's in the Völkischer Beobachter," Lott said. "And I'm thinking Müller has decided to play chicken with us."\n\n"Mister President," said Marshal Denys, "a detention operation is still feasible at this point. Our ships are still capable of defending the coast and are willing to stay out there as long as we need them too. If we want to keep this up, we certainly could end up detaining the entire German fishing fleet in the Bay of All Saints."\n\n"We could, but that's not going to get us the results we need. And it's been told to me Germany could retaliate in some way with their ships being detained by us. They'll most likely claim some sort of compensation and take our assets if we don't give it up. The crisis needs to end, and end quickly."\n\nDenys sighed. "So it's settled, I guess. More aggressive action is needed. How much time should we give them?"\n\n"Forty-eight," said Lott. "If by that time they still want to try it, then you have my permission to take whatever action you see fit."\n\n"We can avoid the more unpleasant bits, sir," said Toscano. "We do an announcement, get them off the ship, then do it with nobody aboard. It will be a gentlemanly affair, respectful."\n\n"I wouldn't want anything else, Admiral, though it does depend on how Müller and Germany respond to the warning.""
 brazil.180.a: "Another line is drawn."

 brazil.181.t: "Zentralafrika Gets the Ultimatum"
 brazil.181.desc: ""Are you serious?" asked Müller, looking up from cleaning his Boys Anti-tank Rifle. "They said they were gonna blow up our ships?"\n\n"In two days, yes" said Steiner as they stood in a room of Müller's palace, AC on full blast. "They've told us via the embassy, and they've been broadcasting on the international shipping channels, so everyone knows it. Brazil really seems like they're going to do it."\n\n"What the fuck? What's in these crabs anyway? Do you break them open and get a diamond?" Müller sighed. "Alright, what are the options? Do we throw this one back to Germania?"\n\n"Not sure if they'd even notice, honestly, Reichskommissar. So, the first option is we say it's too much. We pull back and our ships stay out of claimed Brazilian waters."\n\n"And I gotta ignore an angry phone call when it becomes clear we backed down from the Brazilians. Can we call their bluff instead?"\n\n"I'll talk to Admiral Mutzelburg, but we could do it, I think. We have two cruisers and eight destroyers, which should be able to fight whatever the Brazilians have if they show up. But that may produce a clash, and if that happens, we may find ourselves without air cover and a long way from backup." He paused. "Wait, does Schenck even know about this?"\n\n"Doesn't matter, he'll do whatever we want him to. And we're certain the Brazilians are serious? They really are going to fuck with us over some fucking crabs? They are going to attack a vessel flying the swastika and expect it all to end well?"\n\n"You could tell them to do that, but the ships need an order now, because a bunch of them might just fuck off on their own if we don't respond.""
 brazil.181.a: "I thought I told you that we don't stop."
 brazil.181.b: "They want a confrontation, give them one!"
 brazil.181.c: "Let's avoid this crazy country."

 brazil.182.t: "A Line Is Crossed"
 brazil.182.desc: ""Who do these people think we are?" asked Lott. "And they still keep coming?"\n\n"Well, yes, but it seems like Müller isn't entirely cavileer about this. Our scout aircraft have reported the trawlers may have men with guns on board. It looks like they're preparing for any boarding attempts."\n\n"Who's crazy enough to put infantry on a trawler?"\n\n"Müller would, sir. And that's going to complicate any boarding actions we might take against the ships."\n\n"So if we put the marines on them, we would be potentially risking a fight over several fishing boats. Christ, this is a problem."\n\n"Yes sir, it is, but alternatively we could take a more moderate course of action."\n\n"How so?"\n\n"The mercenaries aren't that good at long range, and no captain wants to get hit by a Mark Twelve Five Inch. So we gently guide them away. Maybe bump them or fire across the bow if they don't get the hint. But it still gets the message across, and is less likely to result in a firefight."\n\nLott thought it over. "That may work, but it's not as forceful."\n\n"It's only one idea, but we need a decision soon, sir. What are your orders?"\n\nLott only needed a moment."
 brazil.182.a: ""Board it.""
 brazil.182.b: ""Let's play it safe and keep them at arm's length.""
 brazil.182.c: ""It isn't worth it, let them go.""

 brazil.183.t: "A Line Is Violated"
 brazil.183.desc: ""The fucking krauts have escorts," said Denys as he ran in. "Toscano says there are missile boats with swastikas escorting the trawlers now."\n\nThat statement hit the room hard. "That means..." said Lott, "we have to pull out. That's it then, we can't afford a war."\n\nQuadros couldn't believe his ears. "Pull out? Müller just put troops in our waters, and you want to pull out? This is an effective war, Mister President!"\n\n"Not yet, it isn't. And if we take further action it just might be."\n\n"Quadros is absolutely right, sir," said Denys, "but we still have options. Toscano says his forces are on the way. We can bring a force of destroyers to bear on the motor boats and tell them to move back. We'll cause damage to the Zentralafrikan station and they know this. We'll still avoid shots getting fired, but we have to respond. Our integrity depends on this!"\n\n"You're damn right it does, Marshal," said Quadros. "We said we were going to respond, and that's what we will do. We stick with the plan, sir, we do the boarding, damn the consequences. They aren't going to take a challenge."\n\n"But the Kriegsmarine-"\n\n"-They are a group of obsolete vessels, not the best in the German arsenal, and at the edge of their range," assured Denys. "We can force them to go back with pressure."\n\n"And we can stick with the plan," said Quadros. "How are we going to take this?""
 brazil.183.a: ""Quadros is right. We do what we say!""
 brazil.183.b: ""Denys has a point. Let's confront them instead.""
 brazil.183.c: ""We are in over our heads.""

 brazil.184.t: "The Snake That Smoked"
 brazil.184.desc: "It was pretty sudden and unexpected that Denys would barge in on a meeting unexpectedly, but he did. And with his smile, Lott and Quadros knew instantly what had happened.\n\n"Mister President, Vice President," Denys said, "they're out."\n\nLott breathed a massive sigh of relief. "Are you sure?" asked Quadros. "Did Toscano confirm it?"\n\n"Toscano did. The German-flagged trawlers have been moving back across the mid-atlantic ridge for the past 24 hours. It looks like the Zentralafrikan station is still in port. And there hasn't been any interceptions since last night. Müller must have told them to pull out, only explanation. We won, sir."\n\n"Oh, fuck yes," said Quadros. "We just beat the Reich, didn't we?"\n\n"For the first time since Russia," said Lott. "Germany stood eye-to-eye with another nation and blinked. And we were the ones to do it. I-I don't know what to say. The navy is almost certainly never going to need to buy a drink ever again. And I can't wait for when Washington hears this."\n\n"Or Tokyo," Quadros pointed out.\n\n"Marshal, tell Toscano that's very good, I'll have a statement to give to the sailors in five. And after that, I have to make an announcement over the radio."\n\n"Understood, Mister President, but everyone in the force is probably happy anyway."\n\n"And Quadros," said Lott, "you might want to leave early, there's going to be plenty of partiers in the street in a half hour.""
 brazil.184.a: "A check to Germania."

 brazil.185.t: "A Tense Room in Brasília"
 brazil.185.desc: "The waiting was the worst part.\n\nEveryone had different ways of dealing with it. Quadros paced back and forth on his side of the briefing room. Denys filled the air with the smoke of his third Hollywood so far. And Lott stared at the phone, desperately wishing there would be some good news and maybe a chance for him to get a glass of Candian Club.\n\nFinally, the phone rang. Everyone looked at it, then to Lott, who nodded as he picked it up. "Talk to me, Toscano," he said.\n\n"Mister President, it's done," said Toscano on the other end. "We're in control of about a quarter of the Zentralafrikan trawling fleet now."\n\nLott instantly asked "What are our losses?"\n\n"Three marines were injured. The mercenaries had no support, most gave up without a fight."\n\nThe relief on Lott's face was clear to see, and instantly Quadros and Denys knew things had gone well.\n\n"This ought to give Fritz the hint, sir. We're on station for more ships, but if they get wind of this I don't suppose we're going to see any more try to cross the line."\n\n"Understood Admiral," said Lott. "Tell the men we're proud of them, and we'll see how Germany takes this kick to the pants. Happy hunting."\n\nAs soon as he hung up, he looked Quadros and Denys in the eyes, and they all smiled."
 brazil.185.a: ""Boys, it's time for a drink!""

 brazil.186.t: "A Day on the High Seas"
 brazil.186.desc: "Captain Carlos Pacheco of the Paraná thought himself lucky to catch up with the trawling fleet in such a short time. He was the first to receive the report, and the nearest to their location. He could expect the Greenhalgh and Babitonga to be on site shortly. But he was confident enough he could handle some unarmed trawlers with his old American destroyer. The Germans were going to learn they were outclassed soon enough.\n\n"This is the Brazilian destroyer Paraná," his communications expert broadcasted in English to the boats. "You are in Brazilian territory. You will leave immediately or we will take action to protect Brazilian rights." He then looked to the Captain, and the captain nodded to a lieutenant on the deck, who commenced the next phase of the plan.\n\nIt may not have been the most modern or up to date armament, but several rounds of forty mike-mike still kicked up a lot of water, and the burst of fire would still be plenty intimidating for some crab fishermen too far from where they were supposed to be. The sound of just one of those guns reverberated throughout the ship. Pacheco had five more at his disposal, along with other armament that could put holes in the boats he was tasked with scaring off.\n\nEvidently, the German bastards had gotten the message, and they began to leave. Some took their nets on board, others cut them loose and just ran. Pacheo breathed a sigh of relief as he knew this battle was over. But as the vessels pulled away, one of the officers on deck noticed something with his binoculars."
 brazil.186.a: ""They still got a lot of crabs.""

 brazil.187.t: "A Tactical Error"
 brazil.187.desc: "Several kilometers off the coast of Fernando de Noronha, a steam trawler lurches across the ocean. It flies a curious flag from its tail. The red symbolizes socialism. The white is for nationalism. And in the middle is the symbol of the Aryan race Like so many vessels that have come to Brazil, it comes from a colony across the Atlantic. And once again, this colony is cloaked in pseudo-scientific racial theory and supposed noble goals to hide the blunt exploitation behind it. But this ship has not come to deliver an inhumane cargo to Brazil; its crimes will take place far away from the shores of it.\n\nThe trawler begins to open up its giant nets from the rear. Gradually, they expand and expand until they reach from the kerning waves above to the seafloor. The Brazil basin is connected to the lands to the west, but it matters not. After some period of time, the net is closed, and inside are a large number of crabs who call the extension of Cape São Roque their home. The haul is put onto the deck to be processed, and the net is cast out again. Eventually, the ship will fill its stores with Brazilian crabs, and then return back to the nightmare of Nazi Africa, in hopes that its catch will grace the dining tables of the Nazi elites in the home country.\n\nWho can stop this? The Brazilians, perhaps, though they've missed their biggest chance to end this pillage of the Americas. Without the stomach for direct fighting, the ships come and violate the boundary with ease. Some day the Brazilian Navy will finally shut these ships down. But until then, the vessel will always come back for another load of crabs."
 brazil.187.a: "The Smiling Man laughs again."

 brazil.188.t: "Limited Options"
 brazil.188.desc: ""It's not working," said Toscano over the radio. "We have Zentralafrikan missile boats in the area, and they're armed. Boarding operations aren't working, there have been several close near collisions with the ships and one case where we fired warning shots. The situation is looking fucked, sir."\n\n"Alright admiral, we'll update you in a minute," said Denys. And as communication ceased, dread filled the briefing room. This was a disaster, and everyone knew it. Lott, Quadros, and Denys all were aware of the predicament they found themselves in.\n\nLott was the first to speak. "We stay the course," he said. "We said we were going to board, and we will. Let's tell Toscano to continue the plan."\n\n"That's not going to be the best action, sir," Denys said. "We're evenly matched. Going further would almost certainly lead to a shootout, one that it's not certain we would win. Casualties would be unacceptable, and the diplomatic repercussions would be extreme. Our forces are not prepared for this, sir."\n\n"I gave my word as the President of Brazil that we would board the ships regardless of cost and we will!"\n\n"Denys is right," barked Quadros. "This is far too risky, we need to tell the fleet to disengage!"\n\nLott was taken aback at this change of opinion. "But you said-"\n\n"The hell with what I said - things are worse than I thought! We must pull back now before we get into a war!""
 brazil.188.a: ""No, let's stick to our guns.""
 brazil.188.b: ""Fine. Let's pull back and escort them instead.""
 brazil.188.c: ""Alright, things are escalating too much. Disengage!""

 brazil.189.t: "Rough Waters"
 brazil.189.desc: ""Fuck you too!" screamed a junior officer as the Paraná slammed into the Hitlerstadt on its right side. The Brazilian Pará-class destroyer was much larger than the German Pelikan-class corvette, so it was no hard feat to force the ship to alter its course. A cheer went up among some of the crew at this action, but Captain Carlos Pacheco winced inwardly. He knew this would cause minor damage to his vessel, but he had more immediate concerns.\n\nThis was by far the most hostile action he had undertaken in the time he had been observing the fishing convoy. Not that it was unnecessary; the krauts had been running nearby far too close for his comfort for a while now, and the little bastard was a perfect opportunity to send a message. But this was an escalation, and now it remained to be seen how the other guys would respond. He was wondering if his 5-inch cannons could take out a Pelikan-class in one hit. He hoped so.\n\nBut as he looked at the other escorts, he almost missed a trawler cutting its net and dropping it into the water. That vessel quickly started steaming out to the east. Then another pulled it in and left too. More and more followed. The Babitonga, on station nearby, also reported the sudden movement.\n\nFinally, it was clear there was a general retreat amongst the trawlers. With the ships leaving and the Ipiranga beginning to shadow the unescorted interlopers, the Kriegsmarine had to pull back. Pacheco breathed a sigh of relief. The fishing operations were evidently too dangerous for the Huns to complete with a war about to break out in front of them. And he was secretly glad they broke, because he was feeling like Brazil might first if this had kept up."
 brazil.189.a: "And Lott is happy too."

 brazil.190.t: "A Commentary"
 brazil.190.desc: ""The ending of the so-called Lobster War is one that has proved its full impact in time," says the opinion in the Tribuna da Imprensa, written by the editorial board but almost certainly the true thoughts of Carlos Lacerda. "Unfortunately for Brazil, the impact has always been evident from the very first mistake by Henrique Lott."\n\n"To set lines is well and good. It is to be expected for a sovereign nation. However, to set lines and boundaries that you have no intention of enforcing is far worse than refusing to set lines at all. The government had promised to protect the fishing rights of Brazil, and to defend the livelihoods of those who depend on the spiny lobster harvest. The government sent forces to board the Germans who would seek to violate this part of our nation. But when the Nazis backed up their willful disregard for our country with force of arms, our President chose to retreat like a coward."\n\n"Everything we feared with such a dereliction of duty has come to pass. Once again, the Germans plunder our seafloor, and what should rightfully belong to our fishermen is being taken to the heart of the slave world in ever-increasing quantities. Sure there may come a time when it is no longer economically viable for the Kriegsmarine to send ships to escort every trawling action. And perhaps then Lott may be able to take action once he faces no challenge whatsoever. But it remains clear Brazil has been humiliated by a colony-not a state-and can be bullied into submission by a few obsolete corvettes."\n\n"A government's sole duty is to provide for its people and defend their livelihoods. Brazil under the Lott presidency has failed that aspect of the social contract. And the lobster fishermen now pay the price.""
 brazil.190.a: "A man sighs in the Palácio da Alvorada"

 brazil.191.t: "Accounting"
 brazil.191.desc: ""...the wounded have been offloaded to Fortaleza and will be treated at the hospital there, with the German captives transported to Natal." Denys closed his report and looked at Lott. Lott had almost certainly ignored the last part of the report, with more substantial matters on his mind. And Denys didn't think those matters were important either when it came down to it. "Sir," he said, "it wasn't worth it. Not in the slightest."\n\n"There are sacrifices in war, minister," said Lott. "we couldn't back down. Not in the slightest. I don't think we could have done it differently."\n\n"There's a number of coffins with Brazilian flags on them over some fucking lobsters," Denys said. "And the dead Germans... they aren't going to like this. We just guaranteed a carrier task force near São Luís."\n\n"Germania couldn't give a shit if you fed them raw chicken and a laxative," Lott responded. "Nobody knows if that fuck is even still alive or if he knows why he won't eat lobster thermador tonight. The hun's an arrogant bastard, but he's not going to start a war in the Americas. Not while his government runs around with its head cut off."\n\nDenys and Lott still were unsatisfied. "Quadros is mad things ended this way too," said Denys.\n\n"Well, I used his fucking strategy, and that's just how things ended up with it." Lott still wouldn't look Denys in the eye. "But all that matters is we won. Nobody is going to try anything like that again with how well Zentralafrika's attempt worked out.""
 brazil.191.a: "And we paid the butcher's bill."

 brazil.192.t: "Protegendo Nossas Riquezas"
 brazil.192.desc: ""Men," Lott said at the head of the table, "in my career, there have been very few times like this one tonight, and it certainly is one you will feel the same way about as well."\n\nThe officers of the Brazilian 3rd Naval District Command had gathered in the Banquet Room of the Palácio da Alvorada. They were all excited to be there, after a long period at sea facing down the German Navy. Admiral Toscano and Marshal Denys were there, and both were happy as well. Even Quadros was happy to be a part of the festivities, and had a right to, by all means.\n\n"Truth be told, I thought I would never have a moment like this one. When I was in Britain, a lot of us entertained the notion we could turn the tide and force the Germans back. That we could save a country with our efforts and our efforts alone. But that didn't happen, and it has eaten at us ever since."\n\n"Some have thought this would mean the end of the Free World. That the forces of hate and tyranny could always humiliate and abuse the democratic nations. And nobody expected that one day any free nation- let alone one in South America- could stand and hold its own. Certainly few in this country did, but our pride and honor demanded we set a line."\n\n"By your work, and by your work alone, that line held. Brazil is now the only nation in the history of the 20th century to win an unequivocal victory over fascism. Nobody, not the Americans, not the British or French Empires, has done what you have done these past few weeks. And now, we can take pride in the worst defeat of the German Navy since the Graf Spee was scuttled."\n\n"Gentlemen, we drew a line and the Germans could not cross it. As you enjoy this wonderful menu of lobster-based meals specially prepared for the occasion from the very same shellfish you protected at sea, you will keep in mind this meal was possible because you kept the new world secure from the disasters and downfall of the old." Lott raised his glass, and the entire table followed."
 brazil.192.a: ""Para a Marinha do Brasil!""
 
 brazil.193.t: "Meet with Müller"
 brazil.193.desc: ""...and he shall meet at the time and place of your choosing," Lott read. "So that's it then. The notice has been sent to Müller."\n\n"This is the right thing, Senhor Presidente," Quadros said. "We need to talk this over with him. He's a nut, but it's far better if we can settle this with the Reichskommissar peacefully than to end up in a war with the Nazis right off the bat."\n\n"I don't like it," said Denys. "The whole thing is shaping up to be an exercise in futility. Müller doesn't care about if he sparks a war with us. From what I hear, Africa is a mess wherever you go aside from Hitlerstadt. We'd be better off if we sent the letter right to Germania."\n\n"So they could throw it in the trash bin? Müller isn't prideful enough to allow this to escalate without solving it. And more likely he doesn't want to be the Reichskommissar to spark a war on the other side of the Atlantic."\n\n"This is still an embarrassing situation," said Lott. "We can't be negotiating with a German state like this, it's humiliating."\n\n"I could still call Toscano, sir," Denys said. "Give us 24 hours and we'd have a fleet ready for the boche-"\n\n"No, we aren't turning back now," said Lott. "We are set, solve this diplomatically. And if it fails, then we can talk about how we're going to make Müller listen.""
 brazil.193.a: "A last appeal to reason."
 
 brazil.194.t: "A Cordial Invitation"
 brazil.194.desc: ""Rolf! Look at this!" Müller yelled above the roar of the helicopter as he ran towards his main officer and pointed at the helicopter. The ground crew lifted out two Spotted Hyena skins, evidence of a successful expedition. "Little bastards wanted to steal an impala carcass from a cheetah, but they didn't see me with the Mauser-"\n\nHis face faded as Steiner put a telegram into his hands. "The President of Brazil wants to talk with us," he said.\n\n"Oh right, that cocksucker," Müller sighed. "So he wants to discuss the crab issue-"\n\n"Lobster issue," Steiner corrected. "And apparently they think we have to call them or they get serious about this and they end up fighting Germany over this."\n\n"So I'm the one who has to save the world from another war? Well, should we call them over or not?"\n\n"Um... there are advantages, herr Reichskommissar. We could defuse this issue before it gets any worse and make sure there are enough lobsters for the two of us. But that would require a level of, um, deftness to prevent the higher powers from finding out?"\n\n"Germania? They don't fucking care. Call the Afrikaministerium, who gives a shit?"\n\n"I'm talking East, not North, Reichskommissar."\n\nMüller remembered. "Fuck.""
 brazil.194.a: "Let's have another guest in Hitlerstadt."
 brazil.194.b: "This isn't our responsibility, tell them to kick rocks."

 brazil.195.t: "Müller Accepts"
 brazil.195.desc: "Walther Moreira Salles walked into the Presidential Office, holding a message aloft. "Straight from Léopoldville," he said.\n\nLott looked up from his work. "And?"\n\n"They want me to go for it," he said. "Rolf Steiner says he wants to meet a Brazilian representative in Hitlerstadt, so I assume I'm packing my bags tonight."\n\n"Hope this is the right way about it," Lott grumbled.\n\n"Senhor Presidente?" asked Salles.\n\n"Nevermind," said Lott. "Alright, you go for it. The Air Force will have a plane gassed up and ready to fly to the Heart of Darkness for you. Call it in, and they should give you a jet at Recife. What time do they want the meeting?"\n\n"Well, as soon as possible."\n\n"Alright, then I guess you take a shower at Recife. Just remember Salles; you need to keep a low profile because we're not sure if Germany knows what's going on down here. No entourage, no press, one aide, and the aircrew. You can have a bodyguard for the plane, but don't expect the Léopoldville consulate or the Brazilian armed forces to be able to support you if things go south. We cannot guarantee a timely response in Zentralafrika."\n\nSalles was slightly put off by this. "Yes sir."\n\n"And one other thing: we have to come out ahead.""
 brazil.195.a: ""Goodbye, and good luck.""
 
 brazil.196.t: "Müller Rejects"
 brazil.196.desc: "Salles came into the room disappointed. "He wrote back," he said as he plopped the message down on the desk.\n\nLott picked it up and began to read it over. "The diplomatic staff had to translate it, but we got it to you as soon as possible," explained Salles. "We had to check it over, but this seems like as good an answer as we're going to get."\n\n"He told me to go fuck myself," observed Lott, who kept reading the document. "And...apparently we have no right to the Atlantic."\n\nBoth paused for a moment. "Senhor Presidente, I'm sorry. If-"\n\n"Well, things from here on out are going to get real simple," Lott said as he picked up the phone. "Sofia? I want the joint chiefs here for an emergency meeting. Aim for in the next hour. And patch me through to Quadros, it's urgent."\n\n"He's not going to like this," said Salles as he looked dejectedly at the desk.\n\n"Well, Denys certainly will," Lott said before going back to the call. "Jânio? It's me. You know what this call is about.""
 brazil.196.a: "Now they don't have better options."

 brazil.197.t: "The Fallout"
 brazil.197.desc: "Lott stayed sat in his chair, quietly thinking about the situation, rubbing his chin as he looked at the report Quadros gave him. Quadros was pacing around the room, muttering to himself about the situation. Tancredo Neves and Celso looked awkwardly between each other and after a brief conversation between the two's eyes, Tancredo coughed.\n\n"Ahem, I believe we will need to deal with this situation quickly... the economics and Peasant Leagues. We should deploy Jango to go talk to the Peasant Leagues; he is fairly popular and could convince them to calm down. Send trusted officers to investigate the situation and find out who did it."\n\n"I agree with that excellent proposal, most likely the first and the last I will agree with Tancredo on," Quadros exclaimed out loud. "Goulart may have incorrect views on economics but those groups support him and Brizola, wheeling him out may help."\n\nLott nodded, surprised that the room agreed on this issue "I will be on the call to Jango immediately. I will get him to go out and talk to the leagues and, hopefully, it can stop the situation from descending into chaos. And on your economic proposals Tancredo I believe these could be." But before Lott could finish his speech Quadros interrupted him.\n\n"Henrique, don't tell me you are going with their plan. Their plan will only boost inflation. We need to cut taxes, crack down on inflation, and deal with the growing debt if we want the economy to continue to prosper."\n\n"Thank you Jânio for your interruption." Lott said plainly. "I will of course listen to all advice and I have not yet decided my action. Jânio, you keep a watch on the situation; I will be calling Jango. Tancredo and Celso, thank you for coming you are dismissed." Lott said, and with that, the three men nodded their heads and one by one left the room. After they had left, Lott sighed and then finished his coffee."
 brazil.197.a: "Outside it began to rain."

 brazil.198.t: "A Routine Budget Meeting"
 brazil.198.desc: "Lott was shuffling reports on the Trans-Amazonian Highway when his advisors and Quadros entered the room for the day's budget meeting. As Lott set aside his papers, he noticed that Quadros had an unusually large folder, no doubt filled with economic plans and agreements.\n\n"Gentlemen, let's get this meeting started. We all know the issue that faces us at hand. Our debt is growing to a staggering amount, and we must take action of some sort against it. Now, Jânio has written up a solid plan that both cuts costs, and looks for a partner to refinance and restructure a portion of our debt. While we can discuss the cuts to the budget in a second, I want to make sure that Salles; you've spoken to the Americans about this, yes?"\n\n"Correct, Marshal Lott. I plan to meet with Gordon soo-" "What?! The Americans?!" yelled Quadros. "We can't trust those dogs to give us a fair deal whatsoever! They're purely looking to exploit us at every turn!" Lott rubbed his temple, before responding, "Sure, Jânio. It's obviously not going to be perfect, considering the amount of debt we're trying to restructure, but exactly who else can even take on this much debt?"\n\n"How about Japan? They can just as easily finance our plan, and we could develop a relationship with a potential new ally." While the rest of the cabinet shared looks of bewilderment, Lott shook off the quizzical look on his face, saying "We already have a good ally in the United States. Working with Japan on the austerity plan is sure to draw their anger. Is it really worth it, Jânio?" Lott looked around the room, to see most of the heads nodding in agreement.\n\n"Well, you know my stance. I'm sure you already made a decision without consulting me, as per usual. Just say the word, and we'll get to work on our debt," replied Quadros, in a dismissive tone."
 brazil.198.a: "When it comes to managing debt, there are no appeasing options."

 brazil.199.t: "Afternoon Tea with the Sphere"
 brazil.199.desc: "Quadros could not believe that he agreed to drink this bitter nonsense just to suck up to the Japanese trade representative. They should be drinking mate, not this green sewer water, he thought. "Vice-President Quadros, I hope you are well." said the trade minister as he entered a bow. Quadros still wasn't used to this custom, and he attempted one back as well. "Trade Minister Goto, it is an absolute pleasure to welcome you to Brazil. I hope we can have some discussion regarding a potential trade deal and our economies?"\n\n"I understand that your government is in a significant amount of debt, Vice President Quadros. The Sphere is ready to help you with the continued development of the Brazilian economy, if you are also willing to do the same for us."\n\n"Of course, Minister Goto. Why else would I invite you here? I was hoping to discuss the potential start of a trade agreement, to pay for the restructuring of a small part of our debt. If you would be so kind as to look at my proposal, I think there's a lot that benefits both of our nations." Quadros smiled as he pushed forward an envelope with the Brazilian seal containing a set of development plans, tariff reductions, and corporate agreements. Much to his surprise, the Japanese representative layered his own folder directly on top of his, and gave a forceful shove back.\n\n"Vice President Quadros, I insist that you look over our plan first and discuss it with your cabinet. We will start there. Please let me know as soon as possible when you and your economic ministers have reviewed our proposal. Thank you."\n\nQuadros' shock and anger had barely registered before the Japanese trade representative left the room, leaving him alone with a heavy folder that he had to carry."
 brazil.199.a: "A disappointing reminder of who truly has the upper hand."

 brazil.200.t: "An Ugly Choice"
 brazil.200.desc: ""This? This was the combined package and offer that we have to accept? Why did you not just throw this in the trash when you left the room, Jânio?" Neves cracked a laugh, but no one joined in with him. "If we agree to this plan, we're out of our mind. This is guaranteed to make us a subservient state to the Empire of Japan. At this rate, we should just enact the austerity policies ourselves, and just make it so that we're at least only screwing ourselves, rather than letting ourselves be screwed by someon-"\n\nQuadros stood up empathetically, and clapped both of his hands. "Minister Neves, that is the smartest sentence that has ever come out of your mouth! I am thrilled to see that you agree with my ideas on how to fix and improve our economy. Let me toss this Japanese trade agreement in the trash like you said, and we can quickly get to work on what fat can be trimmed from our spending programs."\n\nPresident Lott raised a hand to object, and replied "Gentlemen, enough with this. I think that there are some very obvious downsides, such as the potential land grants that we would be giving the Japanese Zaibatsu, but you cannot deny that there are still benefits for us in this plan. We need the help we can get, and there's no guarantee that anyone else will help us with our debt."\n\nAs the men continued to debate in the room, it was eventually agreed upon that:"
 brazil.200.a: "No price is too high to right our economy. The plan is accepted."
 brazil.200.b: "The cost is simply too high, we must refuse this."

 brazil.201.t: "Exchanging Pleasantries"
 brazil.201.desc: "Walther Salles was no stranger to working with the United States when it came to various agreements, but for some reason, he was nervous this time around. He had seen the disagreements that the cabinet was having over the restructuring of Brazil's debt, and while he was no economist, he knew there wasn't an easy solution. Even though the United States was supposed to be a close ally of Brazil, Salles knew that there was no such thing as goodwill when conducting policy between two nations. As he clutched his proposal tightly between his arm and his chest, he opened the door to the meeting room.\n\nInside sat Ambassador Lincoln Gordon, along with what Salles assumed to be an aide. "Walther, good to see you again! I understand that we're here to make some deals happen?"\n\n"Sure, Lincoln. If the United States is willing to help us with our debt issue, there's plenty of room to talk business." Gordon took another puff from his pipe, and pulled out several documents before sliding them towards Salles. "Here's what we're thinking, Walther. Just some generic stuff about lowering import tariffs on your end compared to the ones on the Pakt and the Sphere, making our goods slightly cheaper for your people. Furthermore, I need a guarantee from your government that you lot are committed to the free market. Goulart might be popular in your country, but American companies won't be able to put up with the Kubitschek style of business where your government nationalizes half of the companies in the country. What are your initial thoughts?""
 brazil.201.a: ""The baseline plan sounds good to me. Brazil can commit to these changes.""
 brazil.201.b: ""Sorry Lincoln, but I have to reject.""

 brazil.202.t: "Under New Management"
 brazil.202.desc: "When Makoto got the news of his reassignment to Brazil, he couldn't believe that his supervisor sent him off to some faraway country; surely this was a demotion after his division failed to double their production quotas from the last year. As he continued to look out the window and adjust his tie (why did it have to be so damn hot here, all the time?), the car came to an abrupt stop in an abandoned industrial park. His translator motioned towards him to get out and take a look for the new land that Mitsubishi had just purchased.\n\nMakoto couldn't believe how large the space was in total. Although all of the factories needed to still be torn down, he anticipated getting enough space for a couple factories, and maybe a small space for trucks to park. Rather, it seemed to him that there was enough space for at least ten factories and a processing center, far larger than what he imagined. How much did the board purchase this land for, Makoto wondered. Now he began to understand: this position wasn't a demotion, but a promotion. There was a bevy of opportunity, and the potential was limitless. As construction crews, cranes, and equipment began to be unloaded on trucks behind him, Makoto cracked a smile.\n\nThere was a lot of work to do, but Makoto was no stranger to that. Better him than anyone else, he thought as he began issuing orders for the demolition of the old factories."
 brazil.202.a: "Sometimes people just need a fresh start."

 brazil.203.t: "Insurrection"
 brazil.203.desc: "A number of Army units have mobilized in opposition to the hearing of the Lott Act. Elements of the Planalto Military Command have surrounded federal buildings in Goiânia and Anápolis, and are threatening to attack Brasília if the Lott Act is not immediately withdrawn.\n\nThe Senado Federal has been put into lockdown, directed to reopen only when the conflict is settled. The fate of Brazil's precarious democracy now lies with President Lott, whose response the terrified citizens of Brasília cry for."
 brazil.203.a: "We shall never cease in our defence of the Republic!"
 brazil.203.b: "Our duty is to the people, of whom none should suffer."

 brazil.204.t: "Military Backs Down"
 brazil.204.desc: "Lott is not a man that praises himself, but even he can't help but give a smug grin and throw the newspaper at his table, where Neves lay on the other side, a smile as mutedly yet beaming as his. While not a drinker, even he couldn't help but share the joyous news, and a bit of a morning cachaça never hurts anyone, especially when mixed with orange juice.\n\n"I trust you've seen the news too?"\n\n"With the tail beneath their legs. All talk, until someone, puts their foot down."\n\nWhile the two men celebrated their successful stand-off, at the barracks of Brasília the situation couldn't be more different, as the officers argued and pointed at each other for possible failings; was it the lack of enough bodies in the Senado? Did they come off too weak? Too strong? They certainly didn't recruit enough, if they couldn't the fear of God on that bastard, stubborn Lott's head.\n\nSomething they did wrong, and they couldn't figure it out. And so, in this dichotomy, this event is delegated to the dustbin of history."
 brazil.204.a: "...they are all those of justice."

 brazil.205.t: "Lott Backs Down"
 brazil.205.desc: "Lott is not a man that damns himself, but even he can't help but release an expletive from his mouth, throwing the newspaper at his table, to the frowning expression of Neves, a frown and a grim expression matching his own.\n\n"Couldn't you have... stood up?"\n\n"Way too late to ponder what-ifs, can I? I...I can't risk the country any more than it's being risked daily. I..."\n\nYet, the man couldn't speak. He spoke of not bothering of what-ifs, but his mind was completely troubled of what-ifs, has been and could be, words he could have spoken, promises he could have demanded payment, or simply stood his ground, staring at the beast in its face...\n\nThe grim, depressing mood in the Presidential Palace couldn't be more different than the cheerful, ambient at the barracks as officers and generals praised each other with drinks and cigars, at a moment where they finally got the bull to stand down. Sure, they would have to watch out to whoever succeeded Lott, the bill was simply archived, but that would be a worry of another day.\n\nToday, they simply celebrate their victory over excessive liberalism."
 brazil.205.a: "...yet, the culprits escape justice."

 brazil.207.t: "Murmurings of Insurrection"
 brazil.207.desc: "Lott wasn't a particularly talkative person, a man pragmatic to the extreme, that let his action and expressions speak what a thousand words couldn't; in short, anything unlike almost every other politician in the country.\n\nAnd yet, as Denys stared at Lott, his expression utterly unreadable, he wished he would speak something, anything really, because the silence in the room was getting to a suffocating level. Thankfully, before Denys would say anything, or try to pry any word from that man, Lott broke the tense silence, all but tapping the folder Denys brought with him.\n\n"And you're saying your men are starting to talk about..."\n\n"Mutiny, yes. Your act is having the people in the headquarters anxious, Lott, you can't deny it."\n\n"Good. I want them to squirm in their boots."\n\nDenys couldn't help but frown, his brow furrowing as he stares at Lott, adjusting his tie...\n\n"Lott, we've both been on the cadet school, you need to listen to me. I know the generals can get uppity about the state of things, but this is openly antagonizing the army. We're not the bloody enemies of the state, we're here to-"\n\n"Spare me the talk Denys, I've done my vow to the flag too. Two, in fact," Lott emphasized, pointing to a single bevel pin on his chest, the badge of the Brazilian Republic. "I'm not backing down Denys, they need to know their place."\n\nDenys' eye can't help but twitch, the incredulity and irony of the statement not being lost on him...before he sighs, giving a simple shrug. "Can't say I didn't try, Lott."\n\n"Very well, you're dismissed."\n\nAs Denys saluted and left the room, the bravado in Lott collapsed, the man reclining on his chair with a heavy sigh and heavy heart, looking at the door his friend left; he gets it, he does, but he simply can't allow something like what could have happened.\n\nHe's a military man, after all. He knows the last thing Brazil needs is more power in the army's hands."
 brazil.207.a: ""My heart and actions are utterly unclouded...""

 brazil.208.t: "Salles Travels to Zentralafrika"
 brazil.208.desc: "There was no accurate way to tell the time here. He lost count of the time zones, so he had no idea how late in the day it was. Sure, Walther Moreira Salles had timed the hours from Recife in the afternoon. But all he knew was Hitlerstadt was the middle of nowhere, and it was dark.\n\nHe knew things were going to take a turn for the strange when the jet switched over from the US Airbase on Ascension Island to Léopoldville Traffic Control. As they came from the Gulf of Guinea, the order came to gain altitude and fly high and fast to avoid ground fire. This unnerving notice made Salles fearful of what was going on down in the jungle. Even on approach to N'djili Airport, the aircraft had to make a rapid descent in a corkscrew motion to land, giving Salles a side window completely filled with land. He needed a drink as soon as the tires touched the ground, and they found a bottle of schnapps at the airport as the jet refueled.\n\nThe flight to Hitlerstadt was worse. The same maneuver had to be done to take off from the ground. The air offered no relief, as the safest way to fly around the potential anti-aircraft was straight over the lake. With the sudden opening of a vast ocean somehow in the middle of Africa, and rumors of how many aircraft were lost over the monstrosity circulating around the aircraft, Salles had no rest nor comfort for what he was about to do. Not that him standing on a semi-deserted airstrip in the middle of nowhere on a moonless night would help him anyway.\n\nThe headlights appeared in the distance. Four or five Kübelwagens and Mercedes-Benzes in green camo pulled up in front of the plane. Front two had machine guns mounted. Salles saw groups of soldiers get out with G1 rifles and face the plane. One in a beret came up to him and saluted. "Welcome to Hitlerstadt, Herr Salles," he said in accented English."
 brazil.208.a: ""Generalfeldmarschall Rolf Steiner, at your service.""

 brazil.209.t: "Salles Eats Lobster"
 brazil.209.desc: "The romantic notions of African hunting lodges or grand colonial era hotels Salles had did not materialize at the Hitlerstadt resort. The Egyptian or South African hotels had a certain old charm for them. Even the newer Hiltons or Yamatos would have at least a modern appearance in their interior, even if the structures looked the same if you looked at them enough. Hitlerstadt was, on the other hand, nothing more than a collection of Proras. A cement monstrosity more suited to be a blockhouse guarding the white beach than a place of relaxation and entertainment. The special suite he was staying in was thankfully removed from the main complex, but it looked more designed to mirror Göring's home than an Afro-German design.\n\nAmusingly, most of the wait staff were native Africans, dressed in the white uniforms of the SS mess waiters. Somehow, despite the propaganda, even here the Germans were unable to block the influences of the land they plundered from. Inside the dining room, decorated with various trophies from long-deceased animals was a giant table made from rare wood in the jungle. And far on the other side was Rolf Steiner, wearing his same field uniform with the beret still on his head, nursing a glass of Gaffel Kölsch.\n\nThe dinner was a surprise, but not a pleasant one. The unveiling of the lobster bisque, with lobster tails, asparagus, and potato salad no doubt gave Steiner a source of amusement, but it put Salles off. All the time, though the French wine they paired it with was wonderful, he couldn't help but think about where this had come from. No doubt these should be in a Brazilian household, sold off by a local fisherman who now may have had to go hungry because of what these bastards did.\n\nThe conversation was mostly small talk, with Steiner sharing off-putting tales of his time in the military and his childhood. After polishing off the lemon cheesecake, Steiner finished off his second glass of beer, before looking at his adversary."
 brazil.209.a: ""Shall we begin, Herr Salles?""

 brazil.210.t: "Discussion Over Trade Begins"
 brazil.210.desc: ""The whole middle bit of the Atlantic, that?" asked Steiner with a degree of hostility. "That's everyone's ocean! Us, the Japs, the Yankees, everyone has a right to it! How the fuck do you think you can take a part of it and kick us out?"\n\n"The Cape Verde Plain," said Salles, "is neutral territory for shipping and fishing for the most part, yes. But there remain certain territories by international law that belong to the people of Brazil. The continental shelf of South America is by law Brazilian territory, and our government has the right to regulate the harvest of spiny lobster from the territory."\n\n"But..." Steiner began as he took a sip of his beer, "they're fish, aren't they? They swim. And that isn't on the continental shelf, so they're in the water, and they're fair game."\n\n"You may say that, but our view is we have a right to stop you if you keep wanting to harvest the lobster there. You need to stop it and abide by our regulations, that's what this is about."\n\n"Alright... so what are your regulations?"\n\n"Excuse me?"\n\nSteiner smiled. "Lemme spell it out for you: how much can we fish there? What's your deal to end this horseshit before it gets any worse?""
 brazil.210.a: ""We'll give equal access.""
 brazil.210.b: ""Some fishing will be permitted.""
 brazil.210.c: ""You need to pull out entirely.""

 brazil.211.t: "No Fish for You"
 brazil.211.desc: ""It's the view of the Brazilian government that you need to pull all fishing activities from the coast of Brazil immediately."\n\nSteiner nearly spat out his Kölsch. What the fuck did the Brazilian just say to him?\n\n"There is far too much overfishing in the area, and we must conserve our reso-"\n\n"No," he said, "you don't have an overfishing problem, you have a problem admitting the fucking ocean is supposed to be for all of us! Where else do you want to get the lobster? The lake?"\n\n"Perhaps that's a better option," Walther Moreira Salles said. "And you could convince Hitler to make Moskowien a lake to harvest them there like he said in Mein Kampf. Far better than telling him you sparked a war by overfishing."\n\nFuck, Steiner thought. This was bad. He could suck it up and try to get something for it later on, or he could push hard for at least some fish. He could also leave the room immediately. Sure, Reichskommissar Müller wouldn't like it. Or he wouldn't care. Or he'd call him a badass. That was up for debate, the man was hard to read.\n\nBut he mulled it over with another sip of beer, and found liquid courage."
 brazil.211.a: ""Alright, fine, we'll leave you alone.""
 brazil.211.b: ""Be reasonable here, we can work a deal.""
 brazil.211.c: ""Tell the U-boats about the continental shelf!""

 brazil.212.t: "Some Fish for You"
 brazil.212.desc: ""Brazil's President has instructed me to tell you he is open to a negotiated settlement regarding lobster fishing."\n\nThat perked up Steiner's ears. "So... how much do we get?"\n\n"That depends." Salles explained "There would be regulation, inspections, and requirements regarding Brazil's role in all of this-"\n\n"But we would be able to still fish and sell them back to Germany?"\n\n"You would be able to conduct limited fishing operations in the Cape Verde area, yes."\n\nThat was music to Steiner's ears. With the Brazilians open to talking it out, he could call it right here. They still get to do the fishing, and the Brazilians got to claim a favorable deal. There was much more that had to be negotiated tonight, and he could easily just accept the deal in order to get the rest over with. Might impress the bastard over there too.\n\nBut was that what he wanted? Sure, it was risky, but he could push for more. Much more. He had his foot in the door now, and he could easily press them for more. Though the beer in him might have been the one saying that."
 brazil.212.a: ""Herr Salles, you have a deal.""
 brazil.212.b: ""Be reasonable here, we can work a deal.""
 brazil.212.c: ""What right do you have to regulate the master race?""

 brazil.213.t: "Equal Access"
 brazil.213.desc: ""We are willing," said a clearly nervous Salles, "to recognize the fishing rights of the Grossgermanches Reich in the area around Cape Verde."\n\nOkay, that was something. Enough to get Steiner to pay attention to what the Brazilian was saying.\n\n"The lobster trawlers and other ships will therefore be allowed-"\n\n"So that's it, correct?" pressed Steiner. "You guys are giving it up?"\n\nSalles gave a solemn nod.\n\n"Excellent! No more need for talking, we accept your proposal!" Steiner finished his drink, set it down, and let out a relaxed sight. Then he called to the waiter, "another round for me and the fine Herr Salles here!"\n\nSalles wasn't looking so hot as the waiter went to the bar. Steiner didn't care. Though he almost forgot what else would be decided tonight may not be so easy. The Brazilian may have been aiming for something better later on.\n\n"So Herr Salles," he said as the next beer arrived, "what do you wish to discuss next?""
 brazil.213.a: "We break out the maps..."

 brazil.214.t: "The Germans Respond"
 brazil.214.desc: ""That's unreasonable, Herr Salles," said Steiner as he thought it over. "The fishermen need to have some sort of income, and fishing off the Gulf of Guinea creates all sorts of issues. We're not very popular among the West Africans."\n\n"In other words," Salles said, "It's too much trouble to steal their lobster, so you're stealing from us instead?"\n\n"I wouldn't phrase it like that, but you've got the right idea. Forming any kind of working relationship with the locals there is a long shot, so we have to farm elsewhere. Surely you understand why we fish on the other side of the Atlantic? We need to have at least some of the crop to sustain our operations."\n\nBingo. Now the Germans were backing down. Salles smiled. His plan worked perfectly. They could come up with a compromise now. His hard line on the subject had paid off. All that was left was to make the deal and then move on to the other subjects at hand.\n\nOr should he? It was half a loaf, but Brazil might want the whole thing. Lacerda may roast him over the coals for even this accomplishment. Perhaps he could try to see just how hard Steiner was going to push for this. Or if he would give in or leave because of it."
 brazil.214.a: ""We'll come up with a number for you.""
 brazil.214.b: ""It's still our lobsters.""

 brazil.215.t: "The Germans Reject"
 brazil.215.desc: ""You aren't really arrogant enough to think you can limit us, are you?" asked Steiner, his voice rising.\n\n"I beg your pardon?" asked Salles.\n\nSteiner took another sip of beer. "You want to claim that anything in the Atlantic Ocean that touches the ground is Brazilian property. How? You think you can bully us into giving up our way of life to you? What makes you think you have a right to do this?"\n\n"You will not be able to go into Brazilian waters and take our animals and livelihoods," Salles said bitterly. "There are rules civilized nations must follow, and we will stand up to defend our rights as a sovereign nation. Now think, Rolf, do you want to escalate this? We're meeting you halfway on this, but we cannot go any further!"\n\n"We can," said Steiner, "and I've seen your fleet and how it compares to the Kriegsmarine. You wouldn't have a chance if you stood up."\n\nThis was bad, terrible even. That was the reasonable agreement the drunken kraut had tossed. Now, Salles would have to either accept this threat or he would be needing to leave this table and say diplomacy had failed."
 brazil.215.a: "Leave with a bowed head."
 brazil.215.b: "Leave while looking him in the eye."

 brazil.216.t: "The Lobsters Settle"
 brazil.216.desc: ""So that's it then," said Salles. "We have come to an agreement?"\n\n"Yes we have," Steiner concurred. "I guess now we can call this lobster conflict over."\n\nSalles let out a deep breath. Things were now much better than before. He knew the fish were going to be the biggest hurdle toward any deal. But now that had been settled... things looked so much easier after what had gone on before. He relaxed a bit and took a sip of water.\n\nSteiner on the other hand, maintained eye contact with Salles. He knew there was still going to be a long night ahead of him. And the way this was going, he may need more than another beer to keep his nerves steady.\n\n"So what's next?" asked Salles.\n\nSteiner snapped his fingers and a mercenary brought forward a map of the South Atlantic, with a pen and a ruler. Salles knew what was next."
 brazil.216.a: "Time to carve up the seafloor."

 brazil.217.t: "The Debate Over Naval Boundaries"
 brazil.217.desc: ""With the fishing rights dispute out of the way," Salles began, "we can now move onto the claims of Brazil as to the seafloor. And our proposed exclusive economic zone will clear up any other concerns you may have."\n\nSteiner just looked at him. "Show me."\n\nSalles stood up and walked to the map. Steiner followed, beer in hand. "So previously, the position of the German government was that Brazil had exclusive rights to all seas twelve miles off the coast, but with the advances in underwater mapping, we can tell the Brazilian continental shelf goes much further than that. Therefore, we claim all operations..." he began to draw a line with the help of the ruler measuring distance from the coast. "...to here, this line. About three hundred and seventy kilometers. The shelf extends further in many places, but this would give us a nice reserve to work with."\n\n"Well," said Steiner as he took out a pen of his own, "if we said we wanted three sixty clicks, that means..." He stopped after the first mark. It was clear his demand would come nowhere close to the edge of Salles' line.\n\n"The Government of Brazil," said Salles, "will accept your territorial claims."\n\nSteiner nodded. And another aspect of the treaty was settled."
 brazil.217.a: "Now we focus on the crews."

 brazil.218.t: "A Question of Sailors"
 brazil.218.desc: ""Alright, Herr Salles," Steiner said as he took another drink of Gaffel Kölsch, "we would now wish to discuss the issue of all the fishermen you've taken into custody since this nonsense started."\n\n"Yes, let us do so," Salles agreed. "If you are aware, many of them are about to be charged with several criminal offenses related to fishing in restricted waters. Not to mention the few who tried to throw punches with the marines."\n\n"And I assume the PSD is very happy they have something to trot out to distract the media," said Steiner. "But, of course, any decision regarding this crisis has to take into account the fishermen you have abducted. The kidnapping of scores of Aryan workers by your mongrel navies isn't something that can be tolerated by Germania."\n\n"Aryan? Most of them were native Africans!"\n\n"Both sides of this dispute must have a propaganda edge, Herr Salles," Steiner said coldly. "I am well aware only a fraction are even Germans from the Reich proper, but it sounds better for back home, doesn't it? Zentralafrika is a more multicultural place than most realize." He gave a wink to the native waitstaff in the SS mess uniforms.\n\n"But that's beside the point, Herr Salles. The way I see it, the citizens of the Reich must be returned...""
 brazil.218.a: ""...immediately.""
 brazil.218.b: ""...at the next available time.""
 brazil.218.c: ""...after this agreement is finalized.""

 brazil.219.t: "Immediate Action"
 brazil.219.desc: ""But that's beside the point, Herr Salles. The way I see it, the citizens of the Reich must be returned immediately. There will be no room to avoid it, the crews of the trawlers have to come home starting tonight."\n\nSalles instantly knew what to say to Steiner's demand. "That's, um, well impossible Field Marshal. We aren't about to release any prisoners or suspend prosecution without some sort of an agreement in place explaining why it won't happen again. Let alone immediately, which would be a huge logistical nightmare?"\n\n"Well, you have their boats, right? Couldn't they sail back?" Steiner laughed at his own joke as he took yet another sip of Gaffel Kölsch. "But really, the Reich cannot tolerate what you are doing. We cannot stand our people being held in your prisons for another day. We want them out tonight."\n\nThis was an interesting situation. Salles could, yet again, accept this deal and leave with a degree of humiliation. Or perhaps he could push for something more... reasonable. There was no reason any extradition couldn't take place at an efficient pace if some time was granted. Perhaps Steiner could see that.\n\nBut he also may not be able to see reason. And then this whole negotiation would be a farce.\n\nSalles read his adversary's face and decided on a course of action."
 brazil.219.a: ""Very well, immediate repatriation.""
 brazil.219.b: ""Perhaps a more achievable timetable?""

 brazil.220.t: "The Art of the Possible"
 brazil.220.desc: ""But that's beside the point, Herr Salles. The way I see it, the citizens of the Reich must be returned at the next available time. What we are asking is not an immediate transfer, but one that is done with as little delay as possible."\n\n"So... that would mean we let the fishermen out of prison in a general pardon," Salles said.\n\n"You must agree that we need to move beyond this unfortunate situation as soon as we can, and that means we transfer them all over," explained Steiner, who then took yet another sip of Gaffel Kölsch. "We would arrange to help you in the matter, with ship and Lufthansa transport of course. We understand this would take time and we are perfectly willing to allow a generous period to get the repatriation in order. However, it must be carried out promptly."\n\nThat did seem like a good deal to Salles. The detainees got to leave pretty quick while it wasn't a total loss on their end. But... "how do we know you aren't going to renege?"\n\n"Huh?" asked Steiner as he was in the middle of a drink.\n\n"This expulsion, how do we know you won't turn around on us? Because that's the only reason you are at the table in the first place. Without your citizens, we lose our leverage."\n\n"You have our promise we won't go back on our verbal agreement," said Steiner, which Salles honestly didn't believe a word of."
 brazil.220.a: "Still sounds like a good compromise."
 brazil.220.b: "We release our prisoners when we want!"

 brazil.221.t: "As You Like It"
 brazil.221.desc: ""But that's beside the point, Herr Salles. The way I see it, the citizens of the Reich must be returned after this agreement is finalized. There isn't a reason to hold them after the issue has been settled. And we don't want them to be in detention any more than absolutely necessary."\n\nSalles thought it over. "That would certainly seem reasonable," he said. "I know the detention of the crews is a big issue with your government, and I wouldn't see any reason to keep holding them after the dispute has been settled."\n\n"I believe that after a proper settlement, we would have worked through the logistical issues of getting them back here. Lufthansa needs some time to get some charter flights ready. And I understand there are some... issues that require further prosecution. It isn't really that Germanic to go attack a group of Brazilian marines with your fists regardless of circumstance."\n\n"So... the only demand is that we allow the detained crews to leave after the deal is signed and not prosecute them for the illegal fishing charge? I'd suppose that would be something the Attorney General might get behind for reasons of, um, diplomatic necessity."\n\n"Excellent! A toast to this agreement!" Steiner held up his half-full glass of Gaffel Kölsch, and Salles returned with water."
 brazil.221.a: "They did say Zentralafrika was the pragmatic one."

 brazil.222.t: "Sense and Sensibility"
 brazil.222.desc: ""Now?" asked Salles. "That is far and beyond what we can do. There is no conceivable way that we can possibly release everyone at this moment. Not without proper protocols in place."\n\n"The agreement will be made tonight," Steiner said, "and we will have the issue settled at this very moment. Not until you stop dithering to make it official, legally binding, or whatever the fuck."\n\n"We don't have to wait for an official agreement, but we can't have a blanket pardon go out tonight and have everyone crowd Norddeutscher Lloyd to get back. That would be highly chaotic, just allowing them to leave with no clue how to get back to Africa. They wouldn't stand for it, we wouldn't stand for it, and that might keep the story in the papers long enough for Germania to wake up and take notice of the clown show you have going on here." Salles gestured to the Africans waiting on the Hitlerstadt VIPs.\n\nSteiner gritted his teeth. He regretted not having a lighter beer to drink earlier in the night. "Your point, Herr Salles?"\n\n"We don't need an immediate release, just a simple delay, enough to process some lingering issues, but still one that would allow efficient and expedient return from South America. Don't you agree?"\n\nNow Steiner had to make a decision about this. And he knew with the drinking and the lateness he was probably not in the state of mind to make the correct one."
 brazil.222.a: ""Sure, Walther, we can do that.""
 brazil.222.b: ""We meant exactly what we said.""

 brazil.223.t: "Brazil Wants Delayed Return"
 brazil.223.desc: ""That's not going to happen, Field Marshal, we cannot allow a release before the agreement is done."\n\nSteiner knew this was the wrong time to be buzzed on alcohol. "Herr Salles, the agreement I put before you is a sensible accommodation-"\n\n"I recall Hitler said the same at the Munich Conference, but I think you will find the Chamberlains of the world to be quite a rare variety. You have to admit your government isn't the most trustworthy in terms of its diplomatic history. I mean, the wait staff are a fair bit more tan than you put in the brochure even."\n\nSteiner grimaced. "But you cannot hold our people indefinitely after this is settled-"\n\n"Which is why they will be released after the formalization of the agreement. Call that insurance. And it's much better for you and your boss if Germania can't force you to renege on the agreement since we still hold some cards."\n\n"To tell you the truth, Walther, Germania doesn't even care about what we agree to tonight. The Afrikaministerium doesn't respond to anything, Hitler is on the way out and probably knows it, Schenck doesn't give a fuck about this and would ask for too much money anyway, and Hüttig thinks he runs the place for God's sake! We don't have the capacity to go back on our word."\n\n"That's incredibly hard to believe for a system that prides itself on efficiency and ruthlessness."\n\nYou don't know the half of it, thought Steiner as he took a drink. Then he decided how to handle this."
 brazil.223.a: ""Alright, you win, delayed return.""
 brazil.223.b: ""That was as moderate as we could get.""

 brazil.224.t: "For All Time"
 brazil.224.desc: ""...and Schenck has some 323s we could borrow, though I think he has some jets that could also work," said Steiner. "We'll have to pay for it, but he can keep Germania out of this and we can get them to Brazzaville in only a few hours."\n\n"Sounds like we have a plan," said Salles, who sighed and relaxed for a moment. "Is there anything else you want to discuss?"\n\n"Nothing comes to mind," Steiner said. Then he had a realization, and a smile broke across his face. "Walther..."\n\nSalles knew what that meant. "Rolf..."\n\nThey shook hands and laughed. "Son of a bitch," said Rolf, "we just avoided a war! A mercenary and a businessman! Who needs Walther Hewel, honestly?"\n\n"I'm sure that you'd do no worse in his place," joked Salles. "Now, we should get this written up to bring to... is that a helicopter?"\n\nThe noise of an approaching chopper caused Steiner's heart to sink. Even with his stupor he could tell it was a German-made Lerche II. "Liebe Gott im Himmel, why now?"\n\n"What is it?" asked Salles. "What's going on?"\n\n"What the fuck do you think it means when a hellicopter lands outside your house in this Kommisariat?""
 brazil.224.a: "This is a complication."

 brazil.225.t: "A Diplomatic Nicety"
 brazil.225.desc: ""Reichskommissar Müller," Steiner said as he tried to put on a professional air despite being tipsy, "this is an unexpected pleasure. This is the Brazilian representative, Herr Walther Moreira Salles -"\n\n"Nice to meet you Walther," Müller said as he took out the clip in his G1 rifle and looked into it. "Hey, do we have a deal yet?"\n\nMüller wasn't the typical Reichskommissar in the slightest, Salles realized. He had eschewed the typical NSDAP uniform Globocnik and Terboven had worn when he met them, and they also never chambered an automatic rifle after asking a question at him. "Well, yes, Herr Reichskommissar, there has-"\n\n"Splendid! Diplomacy wins again!" He stood up from the helicopter and walked toward Salles, still holding his gun in the air with one hand. "Herr Salles, I want to let you know I regret this terrible incident, and that I had little part in it, acting only on orders from Germania. I am pleased my lieutenant has smoothed over any difficulties between Germany and Brazil, and I wish to show your nation that I hold no ill-will over the incident with a diplomatic visit."\n\nThat was incredibly unexpected. "What?" asked Salles and Steiner simultaneously.\n\n"I always wanted to go to Brazil. All that wild jungle, that Jesus statue, Carmen Miranda, never got a chance. You think we can make it happen Walther?"\n\nSalles thought it over. "I don't see if that would be an issue. Diplomacy is always good, but the Americans would be incredibly angry. But I guess that's for your chief negotiator to decide."\n\nSteiner gulped. Why did it come down to him? Why was he the one who had to decide what to do about this?\n\n"Rolf," asked Müller, "were you drinking tonight?""
 brazil.225.a: "Everyone needs a break sometimes."
 brazil.225.b: "We need you at home, Herr Reichskommissar."
 brazil.225.c: "Salles gulped."

 brazil.226.t: "Reichskommissar's Brazilian Expedition Captures Attention of South America"
 brazil.226.desc: "Rio de Janeiro (AP) - The visit of Reichskommissar Siegfried Müller to Brazil has caught the attention and surprise of many around the globe, especially here in the country. Until recently, he was seen as the primary antagonist in the dispute over fishing rights in the South Atlantic and many expected him to be in an armed conflict with the South American nation over it. However, this week he was all smiles as his plane touched down in Rio, greeted by a small delegation of government officials for a short visit to the city.\n\nAny potentially awkward meeting with President Henrique Lott was avoided as Zentralafrika's governor decided to do away with a formal diplomatic visit in favor of a more casual one, where much of his time was spent not in ceremonies in Brasília, the new modernist capitol, but in a helicopter flying over the jungles of the Amazon. "The goal of my journey was to bag a jaguar, but unfortunately I could not find one," the Reichskommissar said to the local press. "However, I did kill this very large black caiman, and I will bring it home with me to show to my guests in Léopoldville."\n\nThe German Embassy in Brazil said in a statement they hoped this visit would open a new chapter in Brazilian-German relations, but it is believed many in the Nazi government are displeased with the semi-official visit. The U.S. State Department was much more open about their displeasure with the visit, blasting Brazil for hosting a major official in the Nazi Party. Homegrown opposition was also widespread, with many groups, predominantly Afro-Brazilian, protesting the visit due to atrocities that are occurring across Germany's colonial holdings. "What this government has done is turn Brazil into a playground for international criminals," declared an editorial in the Tribuna da Imprensa.\n\nMüller, who takes delight in being a more relaxed and atypical Reichskommissar than his other colleagues, was not fazed with such criticism. "All of this politics is stupid and you should really ignore it," he said. He also said President Lott or Vice President Jânio Quadros would be welcome to make a reciprocal visit to Zentralafrika at any time."
 brazil.226.a: "This could have gone a lot worse!"
 brazil.226_tt: "The Reichskommissar sees a lovely Spiny Lobster Trophy and decides to bring it home with him."

 brazil.227.t: "Bon Voyage, Herr Salles"
 brazil.227.desc: "The early morning sunlight began to rise over Africa, illuminating the single private jet on the Hitlerstadt tarmac. Outside, the crew were sitting and lounging around, trying to avoid thinking about the worst that could happen in the middle of the vast and hostile pit that was Nazi Africa. But right now, there was nothing to do but ensure the plane was ready to go at a moment's notice.\n\nDown the road, up from the city came the convoy of camouflage cars. They were let into the airport grounds, and they parked in front of the plane. A group of mercenaries got out and formed an impromptu honor guard. This had caused the pilots to perk up. Walther Salles stepped out of the car in the middle, followed by Rolf Steiner. A few words were exchanged, before Salles climbed up the steps and into his jet.\n\nFinally on what was technically home soil after hours of debate, Salles got into a seat and relaxed. The arguments were hard, and the hours were late. He may have given up too much, but the important thing was he had an agreement to stop the Lobster War. They may judge him a Metternich or a Chamberlain, but he had something that would avoid war once and for all. And that had to count for something.\n\nAs the jet took off and disappeared into the brilliant blue sky above the Congo Lake, Steiner watched the departing diplomat intently. He wasn't so sure about this deal either, and he was a bit drunk towards the end of the negotiations. He knew better than anyone else just how few problems could be solved by mediation in this insane world. However, for a moment, he felt a tinge of relief at the fact he was able to avoid yet another conflict in Africa."
 brazil.227.a: "Peace in our time."

 brazil.228.t: "Sunk Costs"
 brazil.228.desc: "Eventually, everyone realized it would never work.\n\nSalles had expected a violent outburst from the man, but in reality Steiner was a lot more measured about the situation. Perhaps the alcohol had prevented an outburst. Maybe he was more sensible for a mercenary than Salles had assumed. But it also could have been that Steiner simply did not care so much for the lobster or worry about a conflict after all.\n\nNo time was wasted afterwards. Once a deal could not be reached, Steiner escorted Salles back into the motorcade and drove back to the airport. No words were exchanged between the two, as there was no need: everything had already been said. At the airport, Salles bid the host farewell and walked to the waiting jet himself. Steiner just watched from the car.\n\nThis was bad, thought Salles. The Germans weren't reasonable. This trip was the last hope at diplomacy, and it was a complete bust. Now he would have to answer to Lott why things had failed so spectacularly. And that now harder measures would be necessary to solve the crisis.\n\nBut it may have surprised him as he flew into the dark night that Steiner was thinking much the same thing. The whole world was about to fall apart in violence, and now a direct threat worse than Cameroon or South Africa loomed from the west. He knew this was not the end of the Brazilian efforts, not in the slightest."
 brazil.228.a: "At sea it started, and at sea it will be solved."

 brazil.229.t: "The Return of the Nereide"
 brazil.229.desc: "The crew of the Nereide, a trawler operating out of Cabinda, was mostly native crewmen with some Belgian and French senior officers. There was only one German among them. That didn't matter as they were all Zentralafrikans as far as the marines that boarded their ship were concerned. And that meant their boat was impounded, while the crew got to spend their time in a detention facility made out of a former warehouse in the Base Naval Almirante Ary Parreiras in Natal, Brazil.\n\nThe worst parts were the uncertainty and the waiting. They could send letters out, but calls were not possible. An enterprising Brazilian had them do tedious work such as landscaping around the naval base, but that still left a lot of time to loaf around and perhaps practice some Portuguese. There were rumors, and the consulate would give them stories every day about how Brazil would pay for their suffering, but that never answered the question about when they could go home.\n\nFinally, they got their answer. They were loaded up, one truckload at a time, and then dropped off at the local airport. There, the sight of a massive Messerschmitt 323 Gigant with the colors of the Südwestafrikan Luftwaffe gave them the greatest sense of relief they had felt since the Brazilian corvette had pulled alongside them.\n\nAfter a fairly uncomfortable trip across the Atlantic, the plane touched down in Brazzaville. As they left, they were happy to be once again in the warm blue skies and humid air of the Congo. It was home at last, and they were free once again.\n\nBut they were nowhere near their home port. They had no ship. Or a good way to get back.\n\nAnd they were still subjects of Nazi Africa."
 brazil.229.a: "Some bad dreams don't end."

 brazil.230.t: "1965 Presidential Election Kicks Off"
 brazil.230.desc: "The Presidential candidates have been picked and announced. A fierce race now begins in Brazil for who will come out on top as campaigns kick into full gear. Campaigners go door to door convincing voters one by one on who to vote for. Great speeches are held in front of thousands to convince the popular masses, while backroom deals are held to give each candidate an edge. Meanwhile the military watches the campaign go on, their thoughts unknown to the public.\n\nIt is time to choose who you will campaing for."
 brazil.230.a: "To continue Vargas's legacy. Campaign for João Goulart."
 brazil.230.b: "Another 50 years in five. Campaign for Juscelino Kubitschek."
 brazil.230.c: "A independent future for Brazil. Campaign for Jânio Quadros."
 brazil.230.d: "An end to the disaster of Varguism. Campaign for Carlos Lacerda."
 brazil.230.e: "He steals but does. Campaign for Adhemar de Barros."
 BRA_pres_election_season_tt: "§wCampaigns for the chosen candidate are now available in the Presidente Elections panel!§!"

 brazil.231.t: "1965 Elections End Invisible Event"
 brazil.231.desc: "among us"

 brazil.232.t: "A Victory for the Laborist"
 brazil.232.desc: "To celebrate his victory, João Goulart decided on a traditional churrasco in his old gaúcho way. Supporters and allies, like Vargas and Kubitschek, came to congratulate him and even had to proclaim a speech or two, drunk as he was. It was a day for celebration, after all. Even when all guests had left and everybody in the house slept, Goulart and Leonel Brizola remained by the fire. The brothers-in-law drank, ate, they laughed, and toasted each other in their slurred words. This was the moment for praise and rejoicing, Brizola said. The next few years would be an uphill struggle against the forces that corrupted Brazilian politics and oppressed Brazilian workers. President João Goulart would lead the labor movement to new heights, Brizola said in a final toast, and the free people of Brazil would see a future of happiness.\n\nFar away from the next President's home, four generals sat in a smoky backroom, a somber atmosphere between them. How could this happen? How could they allow a socialist, a puppet of Vargas, a goddamned communist to govern this country?! No, this wouldn't do. Now was the time for action.\n\nLater, Getúlio Vargas smoked a fat Cuban cigar in his dark office, with an almost gleeful grin. "Oh, how the generals must be seething right now," he thought. As the smoke filled the room, Vargas remembered his days in power and how hard he fought for the nation. Now, Jango would fight his mentor's battles, and with some assistance, his success would be almost certain."
 brazil.232.a: "A night of applause and insults."

 brazil.233.t: "The Moment of Truth"
 brazil.233.desc: "It was expected. The polls showed it, the media talked about it, opponents complained and tried every single trick left in the book, and the political scene braced for impact as the obvious turned from an expectation to a truth.\n\nJuscelino Kubitschek then saw the large cinema projector adaptated to transmit television gave the news, for a considerable margin JK had beaten his opponents and turned again into the President of Brazil, the first man to do in history. The whole Urca Casino exploded in cheers as confetti began to fall and the casino band began to play a special, jazzy remix of "Peixe Vivo", Kubitschek's favourite song. It was done; the PTB-PSD coalition had come out on top again, cementing even more its position as Brazil leading political force. JK was lifted up by the eclectic crowd of his supporters, from industrialists to oligarchs, from military men to teachers and commoners invited to take part on the ceremony to cement his victory. They carried him all the way to the podium where he was dropped and stumbled to way into the microphone with his cigarette crumpled by movement. Vargas was among the guests of honour being constantly praised by his disciple, taking part on the cheering at every line of his speech.\n\n"We did it!" whispered Jango, who was sitting to Vargas' right. "I wonder how Lacerda is right now."\n\n"Biting his hat off, as they would say in my time," commented Vargas, causing Jango to laugh. "But we can't leave our guard down. He might try something, he always does."\n\n"And he always fails." finished Jango, who returned his attention to the cheering as Kubitschek went into his plans for the future.\n\nVargas himself though about what that meant, he didn't know if he would be there for the next President's inauguration, but that one marked a major victory. His system continued, having adapted to the ideological needs of the time. Getúlio Dornelles Vargas, once called President and Father of the Poor, had succeeded in making a lasting legacy."
 brazil.233.a: "May it last for all eternity!"
 
 brazil.234.t: "Victory at the Ballot Box"
 brazil.234.desc: "Victory! In the UDN's headquarters now elected President Quadros exchanged cheers with staffers, other UDN candidates and friendly journalists. His legs were leaden from fatigue, his gait unsteady by a steady stream of celebration drinks. The thought of making a speech was far from everyone's mind. The evening would see celebration. Better speak the following day when words would no longer be slurred by the new leader of the Republic. For now Quadros exchanged jokes with those present, draining the last of his drinks for the day.\n\nHow far had he come along! The President reflected, sprawled over a couch. Every opponent on the left had mocked the Vice-President's impossible bid for power, the vice-presidency itself initially supposed to be a shackle to future ambitions. With clipped wings, the UDN's cuckoo would strut without flying far, journalists had mockingly proclaimed.\n\nOn the right the Crow's partisans had winced at seeing their political party taken over by Quadros. Pushed in the political wilderness by Lacerda's failed coup in the fifties, many ungrateful party members had been dismayed to find Quadros at their head.\n\nAll the doubters would be proven wrong. Jânio Quadros closed his eyes a few moments. The excited buzz of the room was as sweet a lullaby as anything he could have hoped for. The next day would see a proper speech for the occasion."
 brazil.234.a: "We have... hic... triumphed!"

 brazil.235.t: "Lacerda Victorious"
 brazil.235.desc: "Carlos Lacerda, President-Elect of Brazil, was actually boogie-ing in the middle of his office. The doors were, of course, locked, and the Chuck Berry riffs coming off the record player could not penetrate the walls. Nevertheless, he danced without a care in the world. He had won! The people of Brazil had chosen the right path at long last!\n\nBreathing a bit hard, he took the record off the needle and wiped his brow. Once he caught his breath, he walked out to greet his staff and most ardent supporters. The cheers washed over him as he waved and smiled magnanimously, shaking hands and greeting old friends with all the dignity that his time as Governor of Guanabara had let him develop. When the crowd began to quiet down, he spoke.\n\n"My friends! Thank you so much for all of your support, all your tireless efforts! Our glorious Republic, so often led astray, has finally glimpsed her dignity and destiny. We will stand as a pillar of liberty and prosperity, a land where the citizens are free to live, work, and pursue happiness without fear of foreign imperialists or domestic tyrants. The ruinous policies of past administrations will be overturned, and the burden on the middle classes throughout the country will be lifted. No more will Brazil oscillate between oligarchy and demagoguery. I pledge to you today that I will secure Brazil's future!""
 brazil.235.a: "And the crowd goes wild."

 brazil.236.t: "Fireworks"
 brazil.236.desc: "Adhemar de Barros took another long drink as he walked to a table in the center of the room. Against all odds, he had won the presidency. Eating, laughing and dancing, the party was ecstatic. Everyone drank quite heavily... Especially Adhemar.\n\n"My, my friends, give me a minute, I want to celebrate this victory with a toast, no, no, I want to stand on the table, I won't fall, I won't fall, trust me, urgh- give me a minute to get up. Okay. A toast! A toast to my victory! A toast to our future success! A toast to Brazil!"\n\nAn enthusiastic roar echoed throughout the party. An aide rushed over to help Adhemar get down from the table. "I'm fine. I got up, I can get down." Adhemar's face was now quite red; one of his suspenders was undone.\n\n"Uh, Mr. de Barros," the aide said with a worried look on his face. "A call just came in asking for you. They said it was about the election."\n\nAdhemar chuckled. "Has my lead widened even more?" Adhemar turned to the party. "Okay, my friends, I have to take a call. Presidential business and all." There was one last rousing cheer as Adhemar went into the other room to answer the phone. "This is Adhemar. What news do you have for me? My victory is guaranteed? Well, that's great, but I don't think that's a reason to... What? Wait, wait, wait." The red faded from Adhemar's face.\n\n"What do you mean, Laudo lost! How the hell did he lose if I won? Who's ahead? Edna Lott won? Was it close? It doesn't matter if he was close, he still lost!" Adhemar began to pace. "The poll had us ahead by more than 5 points! I won! How the hell did he lose? We have to find a new place for him in the cabinet or something. I don't know. Just try to figure out how the hell he lost!" Adhemar fell back in his chair, flustered. He turned to his aide."
 brazil.236.a: ""Maybe I didn't bribe enough people?""

 brazil.237.t: "The UDN Readies for the Presidential Election"
 brazil.237.desc: "[BRA_UDN_nomination]"
 brazil.237.desc.quadrosre: "The UDN coalition has recently released an announcement indicating its full support for the continued government of the incumbent President, Jânio Quadros, and their resolve to bring about another mandate for him and the UDN.\n\nIn a campaign speech at the UDN party congress, Jânio Quadros summarized the major points of his campaign - an independent foreign policy not reliant on any great power, as well as the promotion of traditional Brazilian moral values. He also pledged to sweep corruption out of Brasília to the best of his ability.\n\nAlready the UDN has shifted its campaign infrastructure to full gear in order to win the election."
 brazil.237.desc.lacerdare: "The UDN coalition has recently released an announcement indicating its full support for the continued government of the incumbent President, Carlos Lacerda, and their resolve to bring about another mandate for him and the UDN.\n\nIn a campaign speech at the UDN party congress, Carlos Lacerda summarized the major points of his campaign - standing up for human rights the world over, working with closely allied powers, and bolstering the economy through anti-Varguist market reforms.\n\nAlready the UDN has shifted its campaign infrastructure to full gear in order to win the election."
 brazil.237.desc.lacerda: "The UDN coalition has recently released an announcement indicating its full support for the candidacy of Governor Carlos Lacerda of Guanabara, and their resolve to bring about a mandate for him and the UDN.\n\nIn a campaign speech at the UDN party congress, Carlos Lacerda summarized the major points of his campaign - standing up for human rights the world over, working with closely allied powers, and bolstering the economy through anti-Varguist market reforms.\n\nThe UDN has shifted its campaign infrastructure to full gear in order to win the election."
 brazil.237.desc.both: "It was the fourth hour of debate, and the UDN was still no closer to selecting their presidential candidate for the upcoming election. Supporters of both Quadros and Lacerda had been stuck arguing over who was more fit and capable of leading the UDN to a victory at the polls. The entire party was fiercely devoted towards preventing another PSD-PTB presidency, perhaps too much so. Good arguments and baseless insults were brought by both sides, and the UDN was likely to coalesce and support whoever ended up on top of this endless debate.\n\nCarlos Lacerda, currently the governor of Guanabara, was a prominent journalist before taking up the reins of public office. While many acknowledge the success he has generally had running one of Brazil's key provinces, there are some who doubt his short temper and ability to govern on a country-wide scale. Jânio Quadros, the current Vice President, is noted for his eccentric personality and bizarre suggestions regarding the daily affairs of Brazil. However, he has presided over a successful vice presidency, maintaining peace and pushing forward several key UDN proposals that Lott did eventually sign off on. By midnight, the UDN has selected..."
 brazil.237.a: "Time to "sweep" the polls once more. Quadros it is."
 brazil.237.b: "The Crow shall make the UDN soar. Lacerda it is."

 brazil.238.t: "The PTB and PSD Ready for the Presidential Election"
 brazil.238.desc: "[BRA_coalition_nomination]"
 brazil.238.desc.goulartre: "The PSD-PTB coalition has recently released an announcement indicating its full support for the candidacy of the incumbent President, João Goulart, and their resolve to bring about another mandate for him and the coalition.\n\nIn a campaign speech at the joint party congress, João Goulart summarized the major points of his campaign - welfare, social reform, and continuing the policies of Getúlio Vargas from a social perspective.\n\nThe coalition has shifted its campaign infrastructure to full gear in order to win the election."
 brazil.238.desc.kubitschekre: "The PSD-PTB coalition has recently released an announcement indicating its full support for the candidacy of the incumbent President, Juscelino Kubitschek, and their resolve to bring about another mandate for him and the coalition.\n\nIn a campaign speech at the joint party congress, Juscelino Kubitschek summarized the major points of his campaign - a steady hand, economic development, and the continuation of the policies of Getúlio Vargas from a centrist perspective.\n\nThe coalition has shifted its campaign infrastructure to full gear in order to win the election."
 brazil.238.desc.either: "In the upcoming election, the PSD-PTB coalition is faced with a choice between the PSD candidate, Juscelino Kubitschek, a former President, and the PTB coalition, João Goulart, former Vice-President and chair of the Câmara dos Deputados.\n\nThe major points of Kubitschek's campaign - a steady hand, economic development, and a centrist focus in the implementation of Varguist policy - contrast with the emphasis by Goulart on welfare, social reform, and a more social focus in implementing Varguism.\n\nThe PSD-PTB coalition has resolved to unify behind one of the candidates; all that is left is choosing which one to favor this time around."
 brazil.238.a: "We put our faith in Jango."
 brazil.238.b: "JK led us once; he can do it again."
 brazil.238.c: "They put their faith in Jango."
 brazil.238.d: "JK led them once; he can do it again."

 brazil.239.t: "The PSP Readies for the Presidential Election"
 brazil.239.desc: "[BRA_PSP_nomination]"
 brazil.239.desc.adhemarre: "The PSP has recently released an announcement indicating its full support for the candidacy of the incumbent President, Adhemar de Barros, and their resolve to bring about another mandate for him and the PSP.\n\nIn a campaign speech at the PSP party congress, Adhemar de Barros summarized the major points of his campaign - providing welfare and good governance to the people, making government more efficient and better-equipped no matter the moral or economic cost, and improving the welfare of the poor.\n\nThe PSP has shifted its campaign infrastructure to full gear in order to win the election."
 brazil.239.desc.adhemar: "The PSP has recently released an announcement indicating its full support for the candidacy of Governor Adhemar de Barros of São Paulo, and their resolve to bring about another mandate for him and the PSP.\n\nIn a campaign speech at the PSP party congress, Adhemar de Barros summarized the major points of his campaign - providing welfare and good governance to the people, making government more efficient and better-equipped no matter the moral or economic cost, and improving the welfare of the poor.\n\nThe PSP has shifted its campaign infrastructure to full gear in order to win the election."
 brazil.239.a: "Time to roll out the bribes."


 brazil.240.t: "Vitor's Challenge"
 brazil.240.desc: "Vitor had been a bureaucrat for almost six years now, but this posting was completely new. He'd been a city man all his life, never been in the countryside once, and he'd been picked for the agricultural commission because they were impressed with his previous work.\n\n"Your census for the district was one of the best I ever received," the boss had said. "How do you feel about getting some fresh air?"\n\nAnd so Vitor was sent to the countryside as part of the commission, to do initial findings and investigate if land reform was needed. A simple task.\n\nBut the sights he encountered made his head reel.\n\nYes, electricity was slowly spreading. Yes, more young people could read. Yes, the richer peasants had old but well-kept cars.\n\nYet the countryside had in many ways barely moved out of the last century. Mayors were so stinking rich that the insides of their houses made Rio's finest apartments look shabby. Caiados still dominated the states and had eyes and ears everywhere - nothing happened in their lands without their permission. And despite years upon years of promise, poverty and the slow, grinding life remained to plague the people.\n\nAs he left the last house of yet another poor peasant, who'd still straightened herself with immense dignity to tell him of her plight, Vitor steeled himself. He was a city man. He had never been in the countryside. But these people, who fed Brazil, who formed its heart, had been lied to again and again, forced to cling to empty promises that were never fulfilled."
 brazil.240.a: "The commission would ensure that the peasants would finally get their due."

 brazil.241.t: "Deploy Goulart"
 brazil.241.desc: "Of all the tired, angry little corners in Brazil to be sent to, Goulart had always found it in himself to make them his own tired, angry little corners. Nobody really needed to work away at calming down some forgotten village, especially not when the ever-regimented local police were already more than capable of quieting such insubordination, though Goulart always found it in himself to "get his hands dirty", as his colleagues would say.\n\nThe assembled crowd was already lined up, after all, and as soon as Goulart took his steps towards the makeshift podium consisting of a variety of crushed cardboard boxes, the crowd's jeers and insults simmered down, and when Goulart opened his mouth, they came to a complete stop. "Ladies and Gentlemen, do not mistake me for one of the countless aristocrats, do not take me for a brutish street thug. Take me as you would a guest. That is all I am, after all." Goulart paused and leaned forward to the crowd. His voice hardened, and his posture snapped into that of a great agitator himself. "Those who steal your grain, those that rob you of your efforts, that make life impossible- those are not guests! They are not welcome! None deserve to have their hard work chiseled into nothing by the moron artisans of the greater powers!" The crowd stood partly confused, angry voices dying off only to listen to who had been sent to quiet them, and stood partly with anger growing back into their souls, their fists, themselves as a whole, as they listened to the lone politician ahead of their protest.\n\n"You have all suffered under the tight yoke of those who have ignored you, trampled you! I have seen it! Even now, I see it! That is why I will not rest, will not sleep until I have passed a bill so strong that even the lowliest thief will pay his local representative to vote against it!" The crowd had begun to revive their spirit before long, and before anyone really knew it, they were chanting his name. Goulart looked across his latest masterpiece- it was something to behold, that he knew. All that remained was to fulfill his promises."
 brazil.241.a: "And God help him if he didn't."

 brazil.242.t: "Riding with the Ranchers"
 brazil.242.desc: "There were very few things that President Lott liked about this man, from his incessant puffing of his cigar to the dirty leather boots that were ruining the floor that used to be spotless. Yet Jânio and his cabinet insisted that he meet with these ranchers to discuss the most recent agrarian reform bill, which Lott thought was an awful idea.\n\n"Mr. President, I heard that you are trying to implement some new reforms regarding my land?" The rancher puffed on his cigar again, blowing smoke directly towards Lott. The gall on this man, to directly disrespect the damn President of the Republic, Lott thought. At least the military had some sort of order to itself, despite their constant meddling in politics.\n\n"Yes, sir. Surely you've heard of the strikes crippling the country, with those unions causing a serious ruckus in the countryside. They've been pushing for this bill; I'm confident there's plenty of room to compromise, though." "I was hoping you'd say that, Mr. President. The reforms reach too far and are aiming to do too much in too little time. Surely you can agree with me that a gradual reform process would be better than strongfisting this communist manure through the Congress?"\n\nLott's hands remained clasped together, and he rested his chin on them while he thought about it. Would Jango be able to continue selling the bill if it was any less effective? How much support could Jânio realistically pull from the UDN and that coward Lacerda? His thoughts continued to race, until another puff of smoke appeared in his face. Waving it off, Lott responded, "I think there's some parts of the bill that could be trimmed back, yes. What exactly did you have in mind?"\n\nThe rancher smiled, and pulled out a surprisingly long list of demands from his back pocket before handing it over. Lott sighed, and began to read off the list. Some of these were absolutely non-starters, but others could maybe make the cut. He would have a hell of a time convincing the PTB to back these, but weaker action was still better than no action, right? Lott looked up, and said:"
 brazil.242.a: ""I don't agree with everything here, but there are a few changes I could support.""
 brazil.242.b: ""You're simply asking for too much.""

 brazil.243.t: "Cogs in the Machine"
 brazil.243.desc: ""Paulo, you know there's no chance that the Senado would approve this addition to the bill."\n\n"Jango, I know you lead the PTB, but what the hell is that even supposed to mean? Are we here to discuss votes in a chamber, or are we here to improve the lives of our fellow countrymen?" Goulart sighed, and rapped his knuckles along the table. These strikes had been going on for a month, and President Lott had sent him to negotiate with the leaders like some sort of lapdog. Why couldn't that marshal be out here himself; he's the President, and he should be the one responding to his people.\n\n"Paulo, we can have our pipe dream of a free republic later with all of the land reform we could possibly want. It doesn't matter if we cook up the perfect set of reforms only if the entirety of the UDN walks out on us!" "And WHY exactly do we give a rat's ass about the UDN? Those fascists should be locke-". A tall man, named Lucas, raised his hand to interject. "Jango, look," said Lucas, another leader of the strikes, "we have to be able to get something more out of the current bill. What if we gave the banks additional money to issue more loans to protect small farm owners and ensure that the ranchers can't buy them out immediately after we redistribute the land?"\n\n"Lucas, you want to trust the banks to help the poor? Have you absolutely lost it?!" yelled Paulo as his fist slammed the desk. "No, I have not," Lucas sighed, "Jango is right. We need the UDN. Hell, we don't even know if the PSD will fully support our additional demands. We have to start somewhere."\n\n"Screw you guys. I can't believe I thought you two stood for anything," Paulo muttered as he slammed the door behind him. After an uneasy silence, Goulart coughed awkwardly. "Well, what else is still palatable for the UDN and the PSD?" questioned Lucas. And, for the next four hours, several of Brazil's most prominent labor leaders huddled to try and figure out what they could compromise on. However, by the early hours of the following morning, it was clear:"
 brazil.243.a: "Goulart had a ready list of potential changes to the bill."
 brazil.243.b: "No consensus could reliably be reached."

 brazil.244.t: "Forming the SNI"
 brazil.244.desc: "Castelo Branco was very pleased to hear the knock on the door. "Come in, Golbery!"\n\nIn stepped Golbery do Couto e Silva, Castelo's pick for head of the SNI. He saluted Castelo, who returned the gesture, then both sat down.\n\n"Golbery, your new job is to head the National Intelligence Service. Don't look surprised - there's no better man for the job than you."\n\nGolbery nodded, and Castelo continued.\n\n"Your duty as head of this organization is to ensure the supervision and coordination of intelligence and counterintelligence in Brazil and abroad. You have full powers to investigate and eliminate subversive movements, keep tabs on subversives, and inform the President and military of any Nazi-Communist threats to them. Consider your retirement ended."\n\nGolbery stood up. "Sir, I accept. I will aid you to the utmost of my ability, and ensure Brazil is safe from all internal fifth columnists." He saluted Castelo again, and left the room.\n\nCastelo sat back and smiled contentedly. With Golbery looking out for him and his allies, no one would be able to touch them without risking immediate retaliation."
 brazil.244.a: "Truly, Brazil is safest under us."

 brazil.245.t: "Adhemar's Rage"
 brazil.245.desc: "Adhemar threw another chair across the room, then kicked over the table again.\n\nHe was angrier than he'd ever been in his entire life. He's been backstabbed, lied to, betrayed. Betrayed by this rotten government of liars and cheaters.\n\nYes, he wasn't an honest man, he stole. So what? He'd never hurt anyone by doing so. All he was doing was for the good of Brazil. All his life he'd served the people and fought for them alone, just like Vargas did. And this was how the government repaid him.\n\nFirst they denied him his rightful post of Minister of Interior. Now they were trying to bar him from the election altogether!\n\nHe moved to pick up the chair again, then paused. Anger felt sweet but it solved nothing. He was Adhemar de Barros. He always had a plan.\n\nAnd one had already formed in his mind. It was time to plan his revenge. Someone else needed money and aid. Someone else who'd agree with his goals and work for him. It was time to throw his support behind them."
 brazil.245.a: ""Hello? Yes, this is Adhemar. Can I speak to Dr. Kubitschek...""
 brazil.245_tt: "£BRA_psd_texticon §YJuscelino Kubitschek§!'s popularity §Yrises§!.\n"

 brazil.246.t: "Two Halves of a Country"
 brazil.246.desc: "Lucas stared blankly at the wall, as the chants and loud footsteps outside his home continued to get closer and closer. Did Paulo have a point? How did Jango and the PTB fail them yet again? Why did the Senate not see the desperate situation his fellow workers and citizens were in? Before his mind could continue racing in circles, he heard a loud and impatient knock on his door. As Lucas sat up to open the door, he got a glance at several of his fellow union workers; why were they holding pitchforks? Did that one man have a pistol?\n\n"Come on Lucas, we're marching to the capitol building now. Are you in? Allende's supposed to meet us there," a fellow union worker questioned. Lucas really didn't like how belligerent his fellow protestors seemed to be, but he had no choice. If he didn't protest this grand injustice now, did he even have any beliefs or standards left? "Yeah, I'll be out in a second."\n\nHalfway across the country, Lott stared at his telephone with unease, trying to avoid a phone call with his former colleagues. He had a migraine after reading about all the reports of the angry peasants and laborers regarding the failure of the Agrarian Relief Act. It wasn't his fault; damn Lacerda and his UDN cronies. The bill was going to make Brazil stronger, and why couldn't they see past their shortsighted views? Surely they were getting bankrolled by those very ranchers, Lott thought. Before he could pick up another report, his phone began to ring.\n\n"President Lott? This is Denys. You know what I'm going to ask of you." Lott gulped, "Of course," he said with a shaky voice. "Do you think it's truly necessary?"\n\n"Henrique, they're burning down property and attacking police forces. I've had more requests from the police across the country for the military to support them than there are damn mosquitos in this country. We either do something now, or we risk a leftist revolt." Lott couldn't even begin to think of the consequences before his mouth moved on its own.\n\n"Denys, do what you and the military need to do. Just try to keep the violenc-", Lott said to himself as an idle tone began. That jingle had never felt so humiliating until now for the President of Brazil."
 brazil.246.a: "How can we even piece the country together now?"

 brazil.253.t: "The Dockworker Strike"
 brazil.253.desc: "The brief on Lott's desk painted a bleak picture for the dockworkers. Each man received as monthly payment a stack of cruzeiro banknotes thinner than their abraded bootsoles. Nearly every day at work was punctuated by a disabling accident, and the supervisors were rarely there to see it. "It's depressing, isn't it, Mr. President?" Quadros said, breathing out blue smoke. "I'd strike, too. I'd go down there if I could, as well, but then the only difference between me and them would be that I'd want to be there."\n\nLott pushed the papers to the edge of his desk. "Am I meant to infer that it won't go on for long, Jânio? We could cut it short if we sent in the police."\n\n"I'm saying this has become normal. If those workers have been putting up with it for years, they probably can't afford to miss the pay, so we should take the time to find out what pushed them too far and fix it."\n\nLott glanced at Denys - the ageing marshal - and gestured calmly at his old military accomplice. "The owners don't want police because they think they'd panic their shareholders, but we have no reason to get involved, either, Mr. President. If the negotiations go poorly, the fallout will rest on you. Please keep in mind that it's a squabble between employees and employers, it's not our problem unless we make it our problem."\n\nQuadros glided across the office to loom over Denys, who fit neatly within his shadow. "Defence, then - that's your field. How will we make ships if there's no-one there to build them? That sounds like our business. You should be on my side, Denys, you might have a stake in this farce."\n\n"That's enough from both of you," Lott said. "I'll decide shortly. For now, you're dismissed." Denys and Quadros both hurried out of the office - Denys insofar as he could - and left the President at his desk, looking out in deep thought over the calm waters of Lago Paranoá."
 brazil.253.a: "Soldiers fight uncertain battles all the time, but never by choice. The companies can handle this themselves."
 brazil.253.b: "Workers suffer, industry suffers, Brazil suffers. An army man fights his country's battles and I will meet with these strikers."

 brazil.254.t: "Lott Refuses to Intervene"
 brazil.254.desc: "The brief on Lott's desk painted a depressing picture for him. The President's inaction meant nothing for the companies, who had agreed to some of the strikers' demands, but it had isolated him. Lacerda's ministrations had diminished his support from the PSD's right; the worm had been haranguing the people through platform speeches about how Lott had betrayed business, how he could not be trusted to replenish Brazil's economy, or a poor man's purse.\n\nIt annoyed him, this was no place for the President to interfere between a private business and its workers.\n\nAccompanied by the creaking of wood, Jânio Quadros intruded upon the quiet. The thin man's shadow stretched from the doorframe to Lott's desk. To the President, he seemed as an itinerant preacher - a Jehovah's Witness of the political sphere, and patently unwelcome. "Mr. President, you have your office because the people trusted you with its power, why not use it?"\n\n"I don't appreciate that you've come to my office just to regurgitate Lacerda's hyperbole. Please leave."\n\nQuadros made no sound when he crossed the floor. His glasses framed his glower like a second set of eyebrows. He spoke calmly. "Looking past the damage you've done to yourself, that you think I'm here to speak for Lacerda is wrong. Those dockworkers could have gone home to their families singing about their victory and voting for both of us, if you had just given it to them."\n\nLott, looking up, locked eyes with Quadros. The President's gaze was calm and severe, and a long moment passed. "Quadros as I have said before, I do not appreciate your comments at this time, please leave."\n\nQuadros scoffed. On his way out, he pounded the door and a loose screw fell to the marble flooring. Lott attentively listened to Quadros' footsteps grow more distant."
 brazil.254.a: "It was none of my business."

 brazil.255.t: "Negotiating with the Dockworkers"
 brazil.255.desc: "The air in the room was dense with cigar smoke and perspiration and Lott finally understood how the dockworkers felt stuffed into the hull of a ship. Perhaps that was part of their strategy. Twenty men on either side of the dispute sat around a sticky table which occupied most of the room, and the President was crammed into a thatch chair at its end. The dockworkers chewed tobacco and talked among themselves a bit before a gaunt man emerged from their number and hushed them - the strike leader. "Before we begin, I'd like to thank the President for coming. Especially given the opposition he must have experienced before he took the long journey here." Lott nodded as men around the table puffed their cigars and the room was filled with smoke.\n\n"Well, we have every reason to listen to each other, now, Mr. President. I'll be blunt, we'd prefer it if you heard us over our bosses. We want a ten percent raise to our pensions and a six per cent raise to our minimum wage. If we agree on this, the strike will stop by tomorrow morning."\n\nLott did not let his face betray his doubt. Those numbers threatened his government's coffers, but they might not be as costly as the fury of the oligarchs. Simultaneously, he was unsure how long the strike could drag on. How much the action would cost him, and how much it would cost the dockworkers, was like rolling dice, but if he haggled skillfully he might be able to contain his expenses. Or, perhaps, Lott could win this game by not playing...\n\nAnd yet there was a feeling he could not evade, Respect. Behind these men with calloused hands were families who depended on them. Their strike was not selfish or risk-free, and he could send them all home to happy families if he opened his wallet."
 brazil.255.a: ""I don't see you retreating from this anytime soon and I wouldn't have it any other way. I'll meet your demands.""
 brazil.255.b: ""Ten, six per cent, that's far too steep. Those numbers will need to come down before I can agree to anything.""
 brazil.255.c: "You choke me on your cheap cigars for this? The President will not be swayed by high numbers and pleading eyes. Goodbye!"

 brazil.256.t: "Lott Kowtows in Negotiations"
 brazil.256.desc: "The strike leader nearly jumped halfway along the table to seal their agreement. He and Lott shook hands and opened the door to heavy, humid air. The dockworkers, joyous but bemused at their complete, swift victory eyed the President through their beer as he left.\n\nThe only sounds in the Presidential Palace were the tappings of Lott's footsteps. Quiet like this was always a prelude to argument, and he knew someone was waiting in ambush in his secretary's adjunct office, which he strode into. There, in a unique incident of reliability, Tancredo Neves blocked the door to Lott's view of Lago Paranoá.\n\n"Mr. President, what persuaded you to open our treasury to those workers?"\n\n"Good afternoon, Neves. I'm assured it was the quickest way to resolve the dispute and get them working again."\n\n"And an excellent way to undermine investor confidence and induce economic confusion. Those assurances weren't from Denys, I'm certain of that."\n\n"It was a decision I made, not Quadros, and if a little confusion is a consequence of something that must happen, then it's better we resolve it sooner. And now, I have a similar problem. I need to find the quickest way to get you out of the way to my office."\n\nWith a weathered frown, Neves opened Lott's door and the President sat in his chair. "I made no mention of Quadros, nor do I need to for you to realise that he may be making those decisions soon. Those dockworkers didn't see you negotiating with them, they saw Quadros pushing you into a chair. He didn't need to be at the meeting to profit from it. Be careful, Mr. President, and have a good day.""
 brazil.256.a: "And with the click of a latch, Lott's office was silent."

 brazil.257.t: "Driving a Hard Bargain"
 brazil.257.desc: ""I understand how difficult your work is, but mine requires I make some difficult decisions. You are asking for too much, and I can't agree to anything until those numbers come down."\n\nThe strike leader's fingers rapped against the table. He traded whispers with the other workers before he spoke. "Maybe you do understand, Mr. President, but maybe you don't. You're a soldier, I don't know if you've ever been in a battle, but the feeling you get in your chest after being flung around by a shell is what some of these guys live all the time. Some of the men here are pushing into their fifties and walk like their back's been kicked in for years, because that's how it's been."\n\n"With all due respect, fighting a battle and carrying luggage are two very different things. I know soldiers without legs who wish they could walk like some of you do, but they can't."\n\nAmid the percussive demurral of the dockworkers, the strike leader's face twisted into a scowl, the sweat on his forehead falling into its deep creases. "Mr. President, the smoke we're breathing right now is like fresh morning air next to the shit from the engines our bosses stick us near. The closest thing to it is a soldier sucking up mustard gas, and they at least get their pension! It's that or the wage, Mr. President, take it or leave it."\n\nBehind his severe expression, Lott chastised himself. He wondered if it would have been a better decision to send Quadros to negotiate, or to have spent the day planning the Trans-Amazonian Highway by the cool air of Lago Paranoá. Regardless, he thought, these dockworkers won't go home empty-handed..."
 brazil.257.a: ""Your terms are unacceptable, I'm out""
 brazil.257.b: ""Porting is back-breaking work, you'll have your pension.""
 brazil.257.c: ""A wage increase it is. You've got a deal.""

 brazil.258.t: "Lott Leaves the Meeting"
 brazil.258.desc: "He would not stand for this.\n\nLott threw his chair back, wedging it against the wall, and strode for the exit. The dockworkers watched in silent awe as he turned his back on them. The scent of fresh air relieved the President, and he slammed the door on the workers' hurried protestations.\n"What are you doing?"\n"Get back here!"\n"Lott, you bastard! We'll do this without you!"\n\nThey did it without him.\n\nLott flicked through the newspaper to the full story on page twenty-three, skipping his best-loved World section. The dock owners had conceded to both demands, and the agreement had been sealed with a tense handshake, neatly photographed, featuring the inexorable strike leader. Lott mulled over the article with a unreadable look. Though, he thought, it was certainly a victory for the strikers, it was an inevitable one, a necessary adaptation consequent of the modern business climate.\n\nThe President, still with a neutral expression, cut the article out and stuck it in his drawer."
 brazil.258.a: "A nice token of how everything turned out okay"

 brazil.259.t: "Agreeing to Raise Pensions"
 brazil.259.desc: "The strike leader nearly jumped halfway along the table to seal their agreement. He and Lott shook hands and opened the door to heavy, humid air. The dockworkers, assuaged by a higher pension, eyed the President through their beer as he left.\n\nThe ticking of Tancredo Neves' Piaget Calibre 12P invaded Lott's office. For such a small man, and such a small watch, the noise hardly seemed appropriate, but the wealthy politician's voice cut through the mechanical beat. "Mr. President, I don't think your recent decisions have been financially sound. The money those dockworkers will get comes from our coffers, whose diminishing contents are made only remotely imposing by the thread the budget will hang on if spending of this kind continues."\n\nLott returned his gaze to the maps on his desk. "Thank you for your concern, Neves, but I trust the people at the treasury to omit any offending sums and put in the right ones."\n\n"Quadros won't need to look because everyone in this palace knows what you agreed to. He'd just think of it as an insult."\n\n"I don't mind if Quadros knows and I don't mind if he complains. The omissions wouldn't be for him, anyway.""
 brazil.259.a: ""That's all I'll hear of it. You are dismissed, Neves.""

 brazil.260.t: "Agreeing to Raise the Minimum Wage"
 brazil.260.desc: "The strike leader nearly jumped halfway along the table to seal their agreement. He and Lott shook hands and opened the door to heavy, humid air. The dockworkers, satisfied with a higher wage, eyed the President through their beer as he left.\n\nMore reports. More letters, most refusing to neglect profanity, from the less surreptitious members of Brazil's business community. Lott considered throwing them out of his window, but the possibility of an overambitious temp discovering them kept his hand on his temple.\n\nDespite his frustration at the striking dockworkers, at least, Lott thought, they knew how to be satisfied. These suits complaining over lost profits would hardly spare him thanks if he bludgeoned them with a pillowcase full of coins. Lott had solved their problem; the dockworkers were back at work and the businessmen were no longer bleeding money.\n\nAnd Lott did not have to pay a cent."
 brazil.260.a: "Maybe I should go into business."

 brazil.261.t: "Father and Daughter"
 brazil.261.desc: "It was a pleasant day in the Palácio do Planalto, and Henrique Teixeira Lott was pleased that he was able to use this good day to meet with someone who was neither an opponent of his, nor somebody who had just messed up, nor indeed somebody out to see what they could get from him. Quite the contrary, it was his beloved daughter Edna, who had just been elected to the Câmara dos Deputados as a member of the PTB. Lott sometimes joked quietly with his daughter about the fact that she'd chosen a different party from him, but since it was Jango's lot, he was completely fine with the situation.\n\n"How are things going then, Edna?"\n\n"Oh, pretty good, dad. I've been getting used to the way things work over at the Deputados. Jango's been showing me the ropes, and I've been in touch with Tancredo here and there."\n\n"Really? Good, glad to hear that. You can trust the two of them. What's your newest project, by the way? I'll see if I can help out with it."\n\n"Oh, I was looking to strengthen protections for women in the urban workforce; I'm sure you've heard about all those workplace accidents in São Paulo and Rio and whatnot where men get what they need but women aren't given a jot as much."\n\n"Ah, that's a good idea, quite good. You'll want to get hold of Leonel Brizola to help you with that, especially seeing as how that jackdaw in Rio will likely screech at the top of his lungs at the prospect."\n\n"Senhor Brizola? That's a good idea, I'd forgotten about him. Thanks, dad."\n\nAs the conversation continued along less urgent matters, Lott relaxed. He was proud of his daughter already; God willing she would give him yet more reason to be proud as the years wore on."
 brazil.261.a: "Edna has a lot of potential, I daresay."

 brazil.262.t: "The Matter of the PSD"
 brazil.262.desc: "Tancredo Neves walked into the office of his friend and colleague, the President of Brazil, Henrique Lott, in the Palácio do Planalto. But today was not a time for socializing or catching up with Lott; no, there were far more important things to deal with. The PSD was roiling with discontent, and something had to be done about it. As Neves came into the room where his boss worked, he said, "Party-political matters"; the ever-present civil servants nodded and left the room.\n\nLott looked up and nodded with a smile on his face. "Tancredo, what brings you here today?"\n\nNeves smiled back, but his face became solemn as he began to speak; his friend noticed this. "Henrique, it's the PSD. The conservatives - Auro and what have you."\n\n"What's the issue with them?"\n\n"The rightists in the PSD are angry, Henrique. They think you've bent too much to Goulart and Quadros, the dockworkers' crisis is a case in point. They are angry that you didn't do enough to consult with them, and for all that I don't like some of them, they're right. You need to do more about their opinions, Henrique."\n\nLott scoffed. "I am President, Tancredo; I am doing what is best for the country. They need to have faith that I will be able to preserve our democracy and prevent a political disaster."\n\nNeves sighed. "I understand that, Henrique; you know I have faith in you. But you really, really need to talk to Auro Andrade and the rest of them. You owe it to them to ensure their voices are heard."\n\nLott made a show of listening, but there was still a stubborn look on his face."
 brazil.262.a: "Neves could tell that clearly, and it worried him."

 brazil.263.t: "A Queda"
 brazil.263.desc: "As the news came out of "Germania", the so-called "Capital of the World", that Adolf Hitler, the Führer of the Nazi empire and self-proclaimed "Master of Europe", had at least suffered the fate of all flesh, many people of the Republic of Brazil joined people throughout the planet to celebrate the demise of a man whose existence had blighted the entirety of humanity.\n\nOne of these was the Governor of Guanabara, Carlos Lacerda. While he was extremely restrained in his glee in public, the moment he was sure he was alone he started yelping and shouting in joy. In fact, he ran around in glee for a few seconds before catching himself and sitting down to write a long polemic denouncing Hitler, everything he stood for, and the devil that he was.\n\nVice-President Jânio Quadros celebrated the situation the only way he knew how, by getting drunk. On the other hand, Juscelino Kubitschek celebrated this development in the company of one of his mistresses. People like Henrique Lott, on the other hand, were more restrained, simply breaking out the champagne or setting out a special meal. Getúlio Vargas was quietly pleased; while Hitler's precious Thousand-Year Reich was collapsing, all that Vargas had left behind for his successors still prospered.\n\nBut, amidst all the celebration, there was one man who was sad about the demise of Hitler. This was Brazil's local fascist specimen, Wilson Leite Passos. While Lacerda, having typed out page after page of antifascist diatribes, replaced his typewriter ribbon, Wilson went to the German embassy to express his condolences. His was the only name in the entire book that was not that of an ethnic German. While others, suffused with glee, said to each other that perhaps the Nazi tyranny might finally begin to fall, Wilson had only one thing to say about the whole thing when asked about it."
 brazil.263.a: ""This is not the end, not by any means.""

 brazil.264.t: "A Reich Divided"
 brazil.264.desc: "The meeting was tense. Minister of defence Odlio Denys, a former colleague of Lott during his military days, exposed what was known of the recently begun German Civil War.\n\nDespite Hitler's choice of heir, various elements of the Wehrmacht and German SS had rallied to other pretenders. Germany was predicted to see heavy fighting for a few months. Reichskommissariat Ostland had also exploded into a similar civil war. No words on how other regions of the empire were doing, especially in Eastern Europe.\n\n"Troubling,", the President said at the end of the presentation. "Not much that can be done, but observe the Germans' hubris undo them."\n\n"President, what about the situation in Africa?" Asked Vice-President Quadros, somber for once. "The stress of reduced supplies might see the Reichskommissariats do something drastic. In particular the fanatical Hüttig in Ostafrika is likely to be in a dire situation."\n\nPresident Lott nodded approvingly at Quadros heretofore unseen appreciation of military affairs. "Good observation, Mr. Quadros. It's certain that Hüttig's one callous son of a bitch, and he'll feel the heat from reduced supplies. But I wouldn't worry about it too much. Sensing weakness, the locals will increase their attack on Hüttig especially hard, especially as guns smuggled in from South Africa add to his woes. I give those three Reichskommissar a few months before collapse."\n\n"Seems about right Mr. President." said the defense minister."
 brazil.264.a: "We'll have to wait and see."

 brazil.265.t: "The Bull and the Pandas"
 brazil.265.desc: "Adhemar de Barros, Governor of São Paulo, was out and about, as was his wont. This time he was visiting the São Paulo Zoo, where the Sphere had so very graciously sent a few pandas to form a new enclosure. As the news of it spread throughout the province, countless people came in from all parts of São Paulo and the associated hinterlands to see the strange bear-like creatures.\n\nOf course this was a perfect opportunity for Adhemar - he had learned from hard-won, "honestly"-gained experience that glad-handing with the common people at events like these was the perfect method to gain more support. All the more when it was at an event that Adhemar himself had set up. For he had arranged everything; none of this would have occurred without his work. He planned to make that very clear to the people that approached him.\n\nAs Adhemar walked around and charmed the guests of the zoo with his flamboyant, engaging style, making sure everyone had at least a foggy idea of where their bread was buttered, another matter was making the rounds of his mind. The time was coming for him and Carlos Lacerda to get to work on the little plan they had come up with, and Adhemar was hammering out how best to make sure that the scenario would play out in his favor and leave him in his God-given rightful place as President of Brazil.\n\nAdhemar might have been in the habit of calling on the favor of God so often as to make the ears of every archangel, angel, throne, dominion, and saint ring a hundred times over. But he knew very well that he couldn't expect his Maker to do all the work. With that in mind, he turned towards Carlos Lacerda, who he could see at the entrance of the zoo, and put on his best smile."
 brazil.265.a: "It was showtime."

 brazil.266.t: "Adhemar's Generosity"
 brazil.266.desc: ""Thank you, General. A pleasure working with you!"\n\nAdhemar hung up the phone and sat back, rubbing his hands together. A big fat grin spread across his face.\n\nWhat an excellent arrangement! What a good day it was! He had official permission to participate in the election as he pleased, and the money would be flowing into his accounts in no time.\n\nThe new government had been so generous to him, and now he would repay them in kind. He reached into his desk drawers and began shuffling through files and papers, all filled with the schemes and envelope systems he would expand for the election.\n\nWith a childish glee he read through them, weighing their pros and cons, how much money they would make for him, (and the people of Brazil, of course...)\n\nThen an idea struck him. Didn't he have a debt to pay off? A debt to a clever crow who'd been very useful as of late. He called his staff forward.\n\n"Now listen up, friends, we're to support Dr. Lacerda in his coming victory...""
 brazil.266.a: "Lacerda aided by a populist? Is the world turning upside down?"
 brazil.266_tt: "£BRA_udn_texticon §QCarlos Lacerda§!'s popularity §Yrises§!.\n"

 brazil.267.t: "Soldiers on High Alert"
 brazil.267.desc: "It was election day, and in every city and town across Brazil, the polling stations were open and everyone was coming to vote. Of course, to ensure the security of the elections and avoid political violence, soldiers guarded the polling station.\n\nAt one of the many polling stations throughout Rio, two soldiers chatted as they watched the queue of waiting citizens move by. Marcelo talked, and Gustavo listened.\n\n"-She says she doesn't think I'm the type of guy who can be serious. Please. Also define 'serious relationship.' What does that mean? Monogamous. Is that what she means? 'Cause if her definition of monogamous-"\n\nMarcelo's regaling of his latest relationship troubles to Gustavo ended with the crackle of static. A disturbance had occurred a street away, and they had to leave their posts to investigate.\n\nA small crowd had already gathered by the time they got there, and they would have made their way through had Gustavo not caught sight of a figure fleeing into a back alley.\n\n"Hey! Halt!"\n\nRifles at the ready, the soldiers gave chase, but the figure always ran ahead faster than they could run, jumped fences like a grasshopper. The soldiers gave up after trying to cross the second fence, while the figure bounded and dashed away to safety.\n\nSlinging their rifles, the soldiers returned to the scene of the incident, forcing the crowd aside.\n\nA banner with a face who the soldiers knew very well - Carlos Lacerda. They didn't care too much about the guy, but their sergeant and their lieutenant were big fans of him.\n\nWhatever the slogan had said, it was drowned out by the angry red ink smeared all over it: "Murderer of the Homeless." And disturbingly, Lacerda's eyes, nose, and smile on the poster had been viciously slashed out with a knife. What remained was a grotesque mutilation of a face.\n\nLacerda himself, muttered Gustavo to Marcelo, should consider it a bad omen."
 brazil.267.a: ""Let's just take down this banner and replace it with a new one...""

 brazil.268.t: "Silva Victorious"
 brazil.268.desc: "Costa e Silva jubilantly returned the officer's salute as he left the room, then opened the report on his desk.\n\nTo summarize, the crisis was over - he was victorious. Castelo had been taken away and wouldn't threaten him or the army again. Silva admitted that he still felt shocked; he hadn't expected Castelo to do such a thing. Castelo attempting to fire him for his perfectly reasonable demand, the chaos that followed; it still felt like a blur.\n\nBut at least it ended bloodlessly, with little violence. Normally Silva couldn't care less how many whining civilians died, but to shed the noble blood of a Brazilian soldier was a different matter entirely.\n\nSilva sat back and prepared to pour himself a drink, then stopped. He couldn't celebrate just yet. There was one more problem.\n\nHis own "allies". They were far more radical than him - they wanted to eliminate all Nazi-Communist subversive filth. This was not model behavior. This was not American behavior. They could scare away Washington. And everyone with a working brain knew that whatever was good for the United States was always good for Brazil.\n\nAppeasing the radicals never did a leader any good. A man, a real man, would not cower before them but show some spine and defend himself. He was no cowardly civilian. He would do the manly thing and take major action against the radicals. Just like the Americans always did."
 brazil.268.a: ""All for the good of my country.""

 brazil.269.t: "Suspending the Constitution"
 brazil.269.desc: ""-Therefore, gentlemen, the Constitution is hereby suspended on my singular and legal authority as President, and we can finally finish off the internal threats facing us."\n\nCosta e Silva sat back down, and the room erupted in applause.\n\nBut as with every meeting they held, the threat of squabbling hovered above them. And it drew closer when Colonel João Paulo Burnier interrupted the applause and spoke, hesitatingly.\n\n"Sir, I'm very happy that you've done this. But if we suspend the Constitution without taking any action to eliminate the Nazi-Communists, it is nothing."\n\nThe applause abruptly stopped. Some officers glared at the upstart colonel. Some nodded in agreement. Most, like Sílvio Frota, stayed silent and looked at Silva to see what their superior had to say. Silva on his part broke the silence.\n\n"Your concerns are appreciated, Colonel. But I reassure you that suspending the Constitution is only the first step."\n\nAll eyes were on Silva.\n\n"Soon, we will implement martial law - and then we can wage total war against all subversives!"\n\nThe room erupted in cheers as all the officers stood up to give Silva a standing ovation."
 brazil.269.a: "And the loudest applause came from Colonel Burnier."

 brazil.270.t: "TV Globo Goes On Air"
 brazil.270.desc: "A brainchild of the Magnate of Journalism Roberto Marinho, owner of the Globo Newspaper and the Globo Rádio, the TV Globo goes on air in Rio and most of the capitals nationwide.\n\nHaving been granted the concession to use the channel 4 back in 1962, the Rede Globo starts operations with a combination of national and foreign content, such as American TV series like "Get Smart" and "The Twilight Zone", along with Brazilian soap operas such as "O Ébrio" and "O Rei dos Ciganos".\n\nRoberto Marinho, a known right winger of high prestige, brings with his channel the promise of shows that follow the "Globo standart" of quality and that can greatly outshine everything that has been seen on Brazilian television before. The results of the first weeks of airing, however, left Globo very far behind other TV channels such as TV Excelsior resulting on the hiring of American educated Walter Clark Bueno as an advisor to improve the reach of Globo's audience.\n\nSome left wing and Varguist media outlets criticized Globo for being "elitist to an extreme" and to promote right wing propaganda with their programation, critics that were dismissed by Globo as "envy of the defeated"."
 brazil.270.a: "Boa noite."

 brazil.271.t: "A Long March"
 brazil.271.desc: "It had taken hours of driving and then hours of marching for João Amazonas to reach his destination. Flies and insects buzzed all around him, it was almost constantly raining. The politicians were corrupt and there was little to no infrastructure. In other words, it would be the perfect starting-place for the revolution.\n\nNo one would ask any questions about what Amazonas was building here. The thick forest canopy meant they were protected from aircraft; he could get used to the flies. He stood back and watched a number of his comrades get to work, lifting and transporting boxes, cleaning their weaponry and ensuring tents were set up. It had taken them weeks of travelling and searching to pinpoint this very location. But when they had found it, they realized it was perfect.\n\nToo long he had been in the cities, arguing pointlessly with revisionists on minor policy and dealing with schisms in the communist movement due to blind faith in past leaders' methods. How could those fools not see that the past leaders of the movement had all failed because they were not committed enough - that they had compromised too much? Prestes - the revisionist traitor! - was the biggest disappointment of them all. He had been fooled by the social fascism of Vargas and the PTB, despite fighting against Vargas in the 1935 revolution. That accursed revolution whose consequences saw his wife Olga be deported to Germany and caused her to face almost certain death in the slave mines. Amazonas spat onto the floor thinking about this. Once, he had believed in Prestes. But there was an old saying, "Never meet your heroes", and Amazonas certainly regretted meeting him.\n\nAmazonas went back to thinking about the eventual aims of this camp. He planned for a revolution that started in the countryside with the support of the peasantry and would quickly spread to the cities. Of course the revolution would not be built overnight. They needed more arms, more money, more personnel, more everything really. But he and his comrades were committed. Revolutions had succeeded in the past despite dire circumstances; in Brazil it would succeed as well. No longer would Brazil be oppressed; no, Brazil would soon truly be free."
 brazil.271.a: "Araguaia will be our Petrograd."

 brazil.272.t: "Now Onto the Hard Part"
 brazil.272.desc: "The office smelt of soap and disinfectant. President Quadros (how good it felt to be President!) had thoroughly cleaned the office with the help of a few staffers. Carpet had been vacuumed, the desk had been dusted, windows had been scrubbed to a spotless standard. All in front of a few friendly journalists. The new government would be freed from corruption, from dirty dealings and from Henrique Teixeira Lott's contempt for the good order of things.\n\nOnce the journalists had departed and his staffers had carried the brooms and bottles of chemicals away, Quadros sat at his bureau for the first time. Beyond the doors, the presidential palace hummed with its habitual energy. The President could not help but think of all the times he had entered the room to find Lott busy. His rival had been a hardworking man, if nothing else. Had it only been a few weeks? Far too early for nostalgia for a simpler time. And of course it would never be time for regret. Lott's corruption had left him unfit for the presidency.\n\nQuadros took a final smell of the fresh office. The smell of something approximating a lemon, seen through a chemist's perspective, tickled his nostrils. Perhaps look for a better brand of cleaning product. There would be ample time to do that. The President took out a manilla folder from his bag. Typewritten on it were the words INDEPENDENT FOREIGN POLICY.\n\nIt was time to get to work."
 brazil.272.a: "No easy day but yesterday."

 brazil.273.t: "Clean Hands"
 brazil.273.desc: "The full report on the operation had filtered back up to him, somehow. Perhaps Adhemar had sent it, as a good natured prank.\n\nPage after page detailing how nothing unusual had been uncovered in Adhemar's office. The safe 'filled to bursting with dirty money' had not contained much more than usual for a regional political association. Every receipt checked out, every donation had been tallied. Every 'i' had been dotted and every 't' had been crossed.\n\nThere was no question that Adhemar had bribed the police officers. Perhaps the local officers had been bribed long before the President had even dreamed of launching the corruption probe. One thing remained for sure, though: that slippery bastard Adhemar would not be put down that easily."
 brazil.273.a: "Can't anything get done in this country?"

 brazil.274.t: "The Plot"
 brazil.274.desc: "Auro de Moura Andrade, President of the Senado Federal, looked at Lacerda with a somewhat bemused look on his face. "This is real?"\n\nLacerda nodded, "As real as it gets."\n\n"To: Senhor Auro de Moura Andrade, President of the Senado Federal\n\nDear Sir,\n\nThis letter indicates my resignation effective immediately from the office of Vice President of the Brazilian Republic. Due to circumstances beyond my control, I find myself forced to put myself at the service of Brazil and its people from outside the Federal Government. It is my earnest hope that you will be able to find a worthy successor who will be able to erase the countless blunders of the previous Lott administration.\n\nYours very truly,\n\nJânio Quadros"\n\nAndrade read through it another few times. "Yes, this will work.""
 brazil.274.a: "Now to take it to the Senado."
 BRA_quadros_letter_tt: "§xNow we need to see if Quadros will pull it off.§!"

 brazil.275.t: "The Letter Fails"
 brazil.275.desc: ""Rubbish! This letter is garbage!"\n\n"Yeah, get it the hell out of here!"\n\nThis was not what Auro de Moura Andrade, President of the Senado Federal, had planned. He had hoped that Quadros was not influential enough to counteract his and Lacerda's plot to get rid of him. But that was not the case. Worse yet, he could hear Quadros shouting in the hallways.\n\n"Brazil better be thankful that some bureaucrats knew which way their bread was buttered and warned me that this plot was in the offing! That letter was a draft, damn you, a draft! It means nothing, and I am rightfully President!"\n\nWith this kind of shouting, Jânio Quadros was able to prevent the plot to get rid of him and secure the Presidency for himself. But as Andrade finally gave in after being shouted down by a large portion of the chamber for the fifth time, Quadros looked up and saw Lacerda in the gallery, watching everything with a crow's gimlet eye. Quadros made the most wild-eyed look he could, and made the "I'm watching you" gesture right at Lacerda. To Lacerda's credit, he only slightly flinched."
 brazil.275.a: "Backstab me, will you? I'll show you what's what!"
 BRA_quadros_success_hdc_tt: "§yHe pulled it off then.§!"

 brazil.276.t: "Quadros Fails"
 brazil.276.desc: ""Senhor Andrade, this letter is to my view credible."\n\n"Yes, Senhor Speaker, Quadros must resign."\n\nThis was what Auro de Moura Andrade, President of the Senado Federal, had planned. He had hoped that Quadros was not influential enough to counteract Auro and Carlos Lacerda's plot to get rid of him. Fortunately, that was the case. Quadros was nowhere to be seen, and so the Senate was successfully convinced to direct Quadros to resign.\n\nQuadros, Lacerda had heard, only found out about it when it was too late to stop it; he called for the people to protest what had happened to him, and no-one was forthcoming.\n\nThe last Lacerda had heard about him was that he left for his home with a look of vague despair on his face and none of his usual wild energy.\n\nLacerda realized that this meant he had a shot at the presidency. He shouted in joy and swigged a glass of whisky. Then, calming down, he sat down and turned to face a corkboard he had kept with him from his days as a young leftist journalist. He crossed a photo out and took it down, smirking."
 brazil.276.a: "Another domino falls."
 BRA_quadros_failure_hdc_tt: "§xQuadros wasn't able to pull it off either. By rights João Goulart should take over, but who knows what might happen?§!"

 brazil.277.t: "The Nation, Leaderless"
 brazil.277.desc: "Protestors were thronging the streets of São Paulo to demand a response to the corruption and embezzlement on the Trans-Amazonian Highway that had recently been revealed in the newspapers. But today, they were surprised to hear that Brazil was without a President - Lott, that good-for-nothing, who had sat around and done nothing about the corruption, was gone, having issued his resignation that morning. To the protestors, this was a welcome development; however, they still kept on protesting, not wanting to let up until something changed.\n\nOne group of protestors in the middle of Doctor Vieira da Carvalho Avenue was joined by another fellow waving a newspaper. "Hey, guys, the Vice President - that lunatic, Quadros - just resigned!"\n\nPeople looked at each other bemusedly, with no small amount of confusion. A protestor asked his fellows, "If the both of them are gone, what's the point of protesting? Maybe we should just go home."\n\nAnother protestor shook his head. "No, we have to make our voices heard. Even if they have left, even if the road project collapses, the corruption will still be there. Besides, whatever idiot comes in will probably be just as dirty as the last two.""
 brazil.277.a: "The protestors nodded and started shouting again."
 
 brazil.278.t: "Andrade Intervenes"
 brazil.278.desc: "Auro de Moura Andrade was contemplating the choice in front of him. Lott was gone, and he had worked with Carlos Lacerda to do Quadros in. By rights, it was the turn of that damned pinko João Goulart as Speaker of the Câmara dos Deputados to take over as President. But one thing that the damn fool hadn't remembered before running off to the south to watch a football game was that Auro hated him, and would do anything to keep him out of power.\n\n"Deputies of the Senado!\n\nThe situation is grave. By rights, the honorable João Goulart, President of the Câmara dos Deputados, should assume the fallen mantle of President. But I have determined after consultation with the appropriate authorities," - "this means me, myself and I," Auro muttered under his breath - "that constitutional abnormalities prevent him from taking power at this time and it must go to a free vote of the Senado."\n\nAs the Senado Federal fell into chaos, Auro glanced as subtly as he could at Lacerda, who nodded back as subtly as he was able."
 brazil.278.a: "Just as planned."
 BRA_ohno_hdc_tt: "§xNow the game begins.§!"

 brazil.279.t: "Trapped!"
 brazil.279.desc: "João Goulart, the rightful President of Brazil, was caught off guard by the beginning of the Hundred Days' Crisis. He had been in a stadium in the South, watching a football game in person the way all proper Brazilians should do at least once a year. But that left him unprepared for the fall of Lott and Quadros within twenty-four hours of each other, and even less prepared for Auro de Moura Andrade to make his rubbish excuse about constitutional irregularities preventing him from becoming President.\n\nWhen Goulart went to the local airport, he found to his horror that there were emergency training exercises being undertaken by the military, and all planes had been grounded. Knowing that if he pushed it any further he'd probably get arrested, he decided to get hold of a man he could trust.\n\n"Jango, my friend! What's going on? I thought you'd be in Brasília right about now!"\n\n"Nothing so easy, Leonel; I was watching a football game and then the next thing I know the Marshal and Quadros are both out, and that bastard Auro has shut me out of the Presidency! Then the thrice-damned army shuts the airport down. If I were the Crow, I'd probably think it was a conspiracy."\n\n"Whatever happens, Jango, you have to remain calm. Come down to Porto Alegre then and we'll take it from there."\n\nGoulart agreed and hung up, then muttered a prayer under his breath to calm himself. This could be the end. He would need to be very careful about what he did next."
 brazil.279.a: ""Driver, take me to Governor Leonel Brizola in Porto Alegre.""

 brazil.280.t: "The Lieutenant Steps Into the Fray"
 brazil.280.desc: "João Goulart sighed and shook his head. "I'm stuck here, brother, there's nothing else for it. You'll have to take over for me and head to Brasília to press my case."\n\nLeonel Brizola looked at his brother-in-law and nodded, then reached out to embrace him. "Don't worry, Jango, I'll see it done. We'll see you in the Planalto yet, just you wait."\n\nUnlike Goulart, no one dared block the Governor of Rio Grande do Sul from heading north. So it was nothing difficult for Brizola to head to Brasília to stump on Jango's behalf.\n\nWhen he made it there, he announced his presence to the local newspapers and radio stations, denouncing Auro de Moura Andrade's duplicity and making clear his intent to see Goulart enter the Planalto Palace as the next President. The PSD was divided on whether this was a good thing, but the PTB was unambiguously happy to see the return of hope for Jango's campaign. UDN members, on the other hand, mainly gnashed their teeth."
 brazil.280.a: "There is hope for the PTB yet."

 brazil.281.t: "The Builder Returns to His Project"
 brazil.281.desc: "When Juscelino Kubitschek heard that Marshal Lott had fallen from power, he was saddened and deeply concerned. When the news came through that the drunkard Quadros, whose stupidity had set all of this off, had followed him, he was gleeful, but he had no illusions about what this might lead to.\n\nThen Kubitschek heard that Auro de Moura Andrade - that traitor to the PSD, that betrayer of Vargas' ideals! - had spewed some nonsense about "constitutional irregularities" to shut Goulart out of power, and then worse yet that that good-for-nothing barrack-dwelling mouth-breather Frota had threatened to topple democracy if they did not come up with a successor in one-hundred days. At that moment, Kubitschek saw his worst fears come to reality and flew into a rage.\n\nWhen he calmed down, he called Tancredo Neves, who was also quite displeased with everything that had gone down. The two of them concluded that there was only one thing for it - Kubitschek had to go to Brasília. So he did. That very hour in fact. He shoved everything he needed into a bag, bade his wife and family a hasty farewell, and drove as fast as he could up the roads to the capital. It would not be too difficult to make it there on time, he knew."
 brazil.281.a: "He had built the roads himself, after all."

 brazil.282.t: "The Palace at Dawn's Edge"
 brazil.282.desc: "Juscelino Kubitschek had not shown much interest in entering the Alvorada Palace, Brazil's presidential residence, since ending his mandate. The modernist building, the pearl of Kubitschek's new national capital, had not seen the man behind its creation in a few years now. President Lott certainly wondered how long this situation would last.\n\nPresident and former President walked in front of the house in the wee hours of the morning. Both men were early risers. As such Lott was never too surprised at a matinal visit from his ally. Even if that morning's conversation had turned acrimonious. The originator of the nation's new capital, Juscelino Kubitschek had an architect's eye. In an ideal world, the former President would leave very little of the political arena to chance.\n\n"You can't simply brush off these industrialists! Especially not when the PSD needs their support to maintain its electoral lead."\n\n"What did I do to irritate them, JK? Tell them they should lower their prices? That the average Brazilian can't afford a car? They know that already."\n\n"You..." Kubitschek finally went quiet, to Lott's delight. All the best to enjoy an early morning walk. Both men paced around the courtyard, bodyguards trailing them. Beyond the courtyard, the new capital started to drift awake, ending another night of soon forgotten dreams. Finally, Lott was first to break the silence.\n\n"Things are well, JK. Things will remain well. The PSD's in a good place. You've ensured it is. You worry too much. As long as we put in the work, the people will reward us."\n\nKubitschek nodded, grimly. He shook Lott's hand, and began to head away. The rising sun cast long shadows on the departing figure."
 brazil.282.a: "A alvorada de um novo dia."
 
 brazil.283.t: "End of the Dockworker Strike"
 brazil.283.desc: "Lott surveyed the maps with critical eyes - he was overjoyed to no longer be suffering the affront of strike reports. The crisis was settled, it no longer distracted him from his work, nor the tentative passion project laid out in front of him.\n\nThe lines bisecting the Amazon Jungle would be the arteries of future Brazilian land development. Five thousand kilometres of paved highways would galvanise investment and accelerate the exchange of the nation's goods. Thousands of settlements would be freed from their internment by the jungle's açaizeiros and see visitors arrive by road for the first time in their history. The Amazon would remain a prodigious network of unpaved paths and endless canopy, but it would no longer be the excluded other, for Brazil would be brought to it.\n\nLott smiled. He skimmed a report on truant labourers holding up progress in Ceará and placed it at the bottom of a thick pile of papers. No, no, he'd get back to that later."
 brazil.283.a: "From nowhere, this road shall make somewhere."

 brazil.284.t: "Dine with Gordon"
 brazil.284.desc: ""Understandable," said Ambassador Lincoln Gordon, "and it's much better than boiling, but if you steam them in a little beer and put chili on them, there's nothing like it."\n\n"I suppose the Southern American predisposition to the grill has a bit to do with it, Ambassador," remarked Lacerda. "And it's certainly better than us being forced to eat Blutwurst."\n\nGordon took another bite of Moqueca as he thought about the entirely different food they were discussing. "I suppose so, Mister President. And now with Brazil moving towards the OFN, you won't have to worry about fascist incursions anytime soon. I think few understand outside of the diplomatic circles how massive of a development this is. Almost certainly Brazil is going to be one of the premier members of the Organization."\n\n"That is correct, Ambassador, but Brazil has more grand diplomatic ideas than to attend a few training classes and export equipment abroad."\n\n"Diplomatic...how?"\n\n"Mister Gordon, I'm not content with ensuring Brazil never again falls to extremism. Make no mistake, this nation isn't unique in its troubled past and flirtations with authoritarianism. And Brazil isn't going to stand idly back and be content with whatever transpires in the rest of South America. Washington may consider this safe territory, but we know it isn't. And Brazil is going to keep fighting against totalitarianism wherever it develops on the continent. There won't be a Reichskommissariat in South America on my watch. Nor will we have a Manchukuo. We will have a united bloc in the Free World that will permanently keep out the Germans from encroaching on us."\n\nLacerda took a bite. "Mister Ambassador, it's time to make fascism an old-world issue again.""
 brazil.284.a: "The dominoes begin to right themselves."
 
 brazil.285.t: "Brizola in Brasília"
 brazil.285.desc: "Leonel Brizola, governor of Rio Grande do Sul and a powerful member of the left wing of the PTB, was preparing for the coming struggle.\n\nThe former president, Henrique Teixeira Lott, had been overthrown by Quadros' plot, backed and then backstabbed by Andrade, Lacerda and Adhemar. But his daughter Edna, a more moderate Varguist, but not moderate enough to join her father's party, remained in the fray. In fact, she was still fighting the good fight in Brasília's Câmara dos Deputados to ensure that João Goulart took his rightful place as President of the Republic. Now, they met for the first time. Far from small talk, they discussed the next steps.\n\n"Well, Edna, we will have to hit them in this direction and try to usurp Goulart's rightful succession as set forth in the Constitution."\n\n"That makes sense, Leonel. I also know people I can pressure, many members of the PSD are reasonable, and I can reach out to Neves if needed."\n\nAs the discussion wore on, Brizola and Lott found that while they disagreed on a few things - namely, the direction Goulart should take when he came to power - they agreed on much more important things, such as the need to protect the Varguist and constitutionalist order in the Republic of Brazil. As the day wore on and became evening, and as Lott and Brizola made more progress in discussing the matter at hand, one thought took more and more precedence in their minds:"
 brazil.285.a: ""I can work with this one.""

 brazil.286.t: "Old Soldiers Never Die"
 brazil.286.desc: "The old general had seen better days. Odílio Denys watched his friend deliver a speech to assembled young officers. Henrique Lott's self-confidence and determination had long given him an iron aura. Nowadays, however, the aura was dented. A warship sputtering into the harbor after a disastrous battle. Yet Lott was not sunk yet. The old general marched on.\n\nThe assembled young officers were of the generation that grew in the shadow of Vargas' regime. To many of them, the army's moment of glory was its ousting of the tyrannical President. The hundred days left them dismayed. Had the army not overreached beyond its constitutional bounds?\n\nDisgraced as he was politically, Lott still held respect in the military. Many did not believe the accusations of corruption. Among the young officers the former President was still personally popular. And while his star had dimmed, it still shone bright. Lott exhorted the young officers to stay true to the republic, to reject the Sorbonne's attempts to unseat the constitutional order.\n\nThe speech over, Lott took many questions from the assembled officers. He did not shy from any topic, nor did he try to provide excuses. He had proven himself unworthy of the presidency, and had thus resigned. A soldier's lot in life was to follow orders, whether from his superior or from providence itself. Pride had no role to play in any of this.\n\n"Having failed in my obligations, I turn to our youth. To you. If I must crawl and beg for your generation not to repeat my own's mistakes, then so be it." Concluded the old general."
 brazil.286.a: "They've heard him speak, but will they listen?"

 brazil.287.t: "The Raging Fire and the Rainstorm"
 brazil.287.desc: "Lacerda smirked. He had finally managed to maneuver the bastard Kubitschek into a position where he had to face him. Kubitschek had mainly refused to get into any confrontations with Lacerda or any other members of the UDN, but Lacerda had managed to corner him in the Brazilian congress. Kubitschek couldn't run now. Not with this particular session of congress being televised by the press.\n\nLacerda stood up and looked at Kubitschek. It was time to attack. "Mr. Kubitschek!" he exclaimed, "You see yourself as being fit for Brazil's leadership. But you are not fit to run a car! Your policies would continue to drive our glorious country to ruin!"\n\nKubitschek looked at Lacerda and slowly stood up. "Mr. Lacerda, let me affirm that I am a believer of Brazilian democracy, and all that it stands for. But unlike you, I believe in building that democracy up. Now is not the time to pointlessly attack each other, but to build up from the foundation that we have."\n\nLacerda sneered, "By pointlessly attacking each other you mean we should instead rush you back into power, where you believe you rightfully belong. And you claim to want to build up from the foundation we have? How can we possibly build up when that very foundation is under attack from abroad, while you do nothing to confront this threat!"\n\n"The Brazilian people must remain unified during this tough time. Your anti-totalitarian crusade will be nothing but a waste of time and resources."\n\n"Is protecting our values a waste of resources?", Lacerda retorted.\n\n"Unprovoked attacks on our own people is a waste of resources." Kubitschek turned to the Press watching the debate. "Do you think the next leadership of this country should be involving ourselves into foreign conflicts where we have no place to belong?"\n\n"A legitimate successor would protect Brazil!" replied Lacerda.\n\n"A legitimate successor would build up Brazil," Kubitschek calmly retorted."
 brazil.287.a: "Brazil will find a successor in protection!"
 brazil.287.b: "Brazil will find a successor in reconstruction!"
 brazil.287.c: "Brazil will find a successor somewhere else!"

 brazil.288.t: "A Lucky Escape"
 brazil.288.desc: "The streets of Porto Alegre were absolutely packed with people. People of all different races, classes, ages, and beliefs. People that were all here to see one man, João Goulart.\n\nAs his car pulled up to the venue where he planned to hold a rally, the crowd began to roar louder. Goulart stepped out of the car with some of his bodyguards and his aides and began to smile and wave.\n\n"The people have come out to see me," said Goulart, turning to his aides, "So I am going out to see them." Goulart began to walk into the crowd, shaking hands and greeting people.\n\nThe energy surrounding Goulart was electric. The crowd pulsated and moved around him, trying to say something to Goulart, or even get a good look at his face. Hundreds of words were being said, so many that they all blended together into a roar of voices. Goulart walked among the people, saying hello and shaking people's hands, while his bodyguards struggled through the crowds behind him.\n\nGoulart was surrounded by a swarm of people while trying to work his way into the building. BAM! Goulart was pushed to the ground by someone he couldn't see. Screams began to erupt from the crowd. People began to panic. Goulart felt himself being pulled back up. In his dazed confusion he looked backed to see one of his bodyguards shielding him with his body. He could hear someone yelling to ask where the gunshots were coming from over the shouts of the crowd. People began to stampede away. Goulart looked back at the crowd one more time before being thrown back into his car. The car door was slammed shut and his car began to speed away.\n\n"Sir, are you alright?" asked one of his bodyguards.\n\n"I'm alright," said Goulart, "A little shaken but I'm okay." He sighed and readjusted to properly sit in his seat. He looked across at the bodyguard that had shoved him to the ground and pushed him into the car. "Your name is Francisco right?"\n\n"..."\n\n"Well Francisco,""
 brazil.288.a: ""Thank you for saving my life.""

 brazil.289.t: "The Singing of Songs, the Marching of Boots"
 brazil.289.desc: "The demonstrators in Rio de Janeiro began chanting early in the morning to show support for their preferred presidential candidate. Many held signs and distributed pamphlets. Slogans echoed through the homes, parks, and stadiums of Rio. They even reached the main office of the Governor's Palace, where Carlos Lacerda was in a passionate rage.\n\nLacerda turned to Esther, his secretary, after hearing the protesters' chants. "Gather information on the organizers, including their homes, addresses, and family members. Get me the head of the military police. We need to remove these cockroaches from the streets. We can frame this as a riot. It won't be difficult. We'll save Rio from the clutches of anarchy. Also, remind the police to behave appropriately when in the presence of cameras. We can't have images of police officers beating protesters on the front page. Do you understand?"\n\n"Yes, sir. I will begin making the necessary calls immediately."\n\n"Excellent," Lacerda said, sighing and leaning back in his chair before continuing. "Oh. Before you go, you went through the protest to get here today, correct?"\n\n"Yes, sir, I did."\n\n"Did you see protests in support of me?"\n\n"Uh..." Lacerda's secretary shifted nervously. "No, sir, I don't recall seeing anything like that." Lacerda was silent for a moment, staring out the window, and then his face darkened."
 brazil.289.a: ""Tell the police to clear them all out by mid-day.""

 brazil.290.t: "A Sword Is Put to Rest"
 brazil.290.desc: ""What a great fucking day!" said General Figueiredo, arriving at his office "Mathilda, I cannot believe that I am going to become a general!" Figueiredo's secretary kept typing his promotion speech, making him slam his hand on the table.\n\n"Ah, yes, sorry! Congratulations General!" she said. "You showed them, didn't you?"\n\n"Yes, those motherfuckers who supported that piece of shit mummy now lost their ground! Denys won't be missed!" Figueiredo sat on his chair and lit a cigar "That fucker was driving us against the Big Brother. With him gone, I can take over now."\n\nMathilda continued to type his speech, though she was cautious to prevent another outburst of anger, Figueiredo was not a man to be challenged. The news of Odílio Denys retirement had been music to his ears, as Denys had always been neutral on America. Figueiredo could barely wait to give a smug smile at his ceremony, what a long week this wait was going to be.\n\n"These years in America taught me a lot, Mathilda. I think that despite being born in this shithole, I am a true American right. The time spent at the School of the Americas has turned me into a true general, not the disgraces we have in Brazil right!" Mathilda was finishing the speech and didn't reply in time."
 brazil.290.a: "Figueiredo slammed his hand on the table again."

 brazil.291.t: "The Student and the Master"
 brazil.291.desc: ""Ah, Jango, it's good to see you again!"\n\n"The same to you as well, Doutor. I hope you're doing well."\n\n"Oh, of course I'd be doing well, there's more than enough food for me to eat!"\n\nAn uproarious peal of laughter came from the two Presidents of Brazil, one current and one former. Everyone, especially PTB bigwigs close to Getúlio Vargas such as João Goulart, knew just how much the former President had come to love his food in the sixteen years since his resignation and retirement. After some more small talk, the discussion at last turned to something more serious.\n\n"Doutor, I wanted to ask you something. As you know, I'm the President now. I was wondering what you thought about how I was doing."\n\n"Oh, you've done quite well I daresay. Lott was well and good, yes, but you are doing even better."\n\nGoulart was visibly unsure about this, though he seemed thankful for the good words.\n\n"Are you sure? I mean, with things as they are, and with how the military and the conservatives complain, I can't help but doubt myself."\n\nVargas scoffed. "Bah! I have faith in you, Jango. You will be able to help improve things for everyone in this country. If that lot doesn't realize it then their brains have been replaced with the rubbish one finds in that jackdaw's precious tabloids."\n\nGoulart nodded slowly. Some doubt left him, and he felt a slight weight lift off his shoulders."
 brazil.291.a: ""I will not fail you, Doutor.""

 brazil.292.t: "Blinding Lights"
 brazil.292.desc: "Goulart shifted uncomfortably in his suit. The T.V. the studio was blazing hot, and the questions the reporter were asking didn't exactly evilate his discomfort. This was supposed to be an easy interview, to improve the publics opinion of him, not this interrogation. "Some Brazilians are worried that the changes you are promising would be too radical and further drive the country in political chaos. How would you respond to these claims?"\n\n"My policy programs do not seek to divide Brazil, put to help it recover. To bring a return to political and economic stability and uplift the workers from poverty."\n\nGoulart tried to sit up straighter and look more relaxed. You don't convince people you mean no harm by sweating uncontrollably while looking uncomfortable. Goulart tried to keep a smile on his face as he glanced at the cameras pointed at him. There was no room for error here.\n\n"I would like to give a hard question to answer. Over the years there have been many claims that you are a communist. Some newspapers have labelled you and the PTB as a communist party and many Brazilians looking at your platform may think that is so. So are you a communist?"\n\nGoulart quickly replied "I have always had a commitment to the Brazilian working class and trade unions. I fight to uplift the poor of this country, and to secure their rights to participate in our democracy. However, I am not a communist and I have never been a communist."\n\n"But several communist groups have supported your campaign."\n\n"Some communist groups have even supported the campaigns of UDN members. Are you going to accuse Carlos Lacerda or Jânio Quadros of being a communist?" retorted Goulart,\n\n"Their policies are nothing like a communist's policy."\n\n"My policies are not the policies of a communist. You try to help the working class of this country and you are called a communist. I could privatize all Brazilian industry and cut welfare by massive amounts, but if I then implemented the most meager of a social program I would still be called a communist.""
 brazil.292.a: "They reported he was a communist anyway"

 brazil.293.t: "Plenty to Do in Asa Sul"
 brazil.293.desc: "The smooth bossa nova hugged Goulart like a blanket on a cold night. It floated through the restaurant floor, unintrusive, but with presence. Warm lights and the wafting aromas of European platters coaxed the patrons into relaxation, and Goulart into thought. There is plenty to do in Asa Sul, yet he wanted only to come here again and again.\n\nGoulart rested his arms on the table, broad of his food. "You chose a wonderful place to meet, Edna."\n\nEdna Lott, tapping a foot to the music, gave a full, beaming smile. She cut into her steak and spoke from beneath her brow. "I did, and now you'll always choose it, too."\n\n"Ah, this is your plan to place me in your debt, then? With a President for a father, I suppose it'd be a waste if you didn't learn some of his tricks."\n\n"That's not right at all. He's more blunt, he probably learned it from me." Goulart laughed. A moment passed, and the purpose of the meeting rushed into his mind again.\n\n"Edna, I'd like to get your opinion on current censorship laws."\n\n"Respectfully, João, no. Article 233 of the Civil Code says that the private property of married women is completely controlled by their husband. That is urgent to half the population. When the husband's assent is required for them to obtain a job so that they may afford property in the first place, then my opinion on that is clear. Yours must be, too."\n\nGoulart had reservations. Such drastic change would not come easily, but the right to work - the right to own - was far more important. Tapping at his wine glass, he smiled."
 brazil.293.a: ""Well, Edna, let's change the Code.""

 brazil.294.t: "Plan of Action"
 brazil.294.desc: ""Civilian domination isn't enough, the military needs to be pulled out of politics completely. We can't just leave a viper in a cage, we have to take out its teeth!"\n\nLeonel Brizola's florid face presaged a million assaults, and yet his gaze, fixed on Goulart, was calm. His quarrelsome nature was cooled by his brother-in-law, but Goulart's calm could not preclude him from voicing his loathing of the Armed Forces. The two were united in their hatred, the intrusiveness of the military was more than an obstruction - it was anathema to their dreams.'\n\nVisions of violence flashed through Goulart's mind - the weight of tanks cracking the concrete of the Eixo Monumental, bullet-ridden doors propped up by the piled bodies of Presidential Guard; an emaciated Brazil suffused with blood, only ever rousing to hemorrhage. He would not allow it.'\n\n"I completely agree, but we can't do this immediately. They frighten quickly and shoot even quicker, if there's so much as a single snag along the way, we'll both be killed. I'll need you for this, Leonel, but I also need you to keep silent about the Armed Forces unless I say otherwise."\n\nBrizola gave a grin, then retreated into a solemn nod. He said nothing, but nothing more needed to be said. On the table's underside, kept from Brizola's hand by an inch of jatobá wood, rested a miniscule black microphone. And from an underground bunker three miles away, two officers listened, and scowled deeply."
 brazil.294.a: "A snake without teeth can still constrict."

 brazil.295.t: "A Tale of Two Presidents"
 brazil.295.desc: "Goulart, with a shaking leg, crested the stairway and opened the heavy wooden door. The time to his plane's departure steadily ticked down in his mind, but his inauguration would not be complete without a chat to the man emphatically clasping his hand. Getúlio Vargas beckoned him to a pair of red leather chairs which were quickly occupied.\n\n"Getúlio, how have you been? You're looking good in your old age."\n\n"That I am, President-elect Janguinho. My existence is unpleasantly ironic. My seat in the Academia de Letras is named after a man exiled for conspiracy. His involvement was never proven, and I am afforded protection by a wealthy Portugeuse-speaking man. If you are ever offered a seat by the academy, don't take it, it will ruin your presidency."\n\n"No, I remember that they call you "Immortals," reception like that isn't appropriate for me, anyway, but for you, it's very different."\n\n"Reception? I don't exactly get to leave São Paulo very often, but it's true that I left a shadow over this country. From what you've promised, yours will be cast even longer, and it ought to be if this farrago of failing administrations is ever going to be corrected."\n\n"I'm not going to be any more important than anyone who's come before me. I'll be a good President, but that's the job, anyway. Brazil always needs a good President.""
 brazil.295.a: ""'Indeed, now more than ever. Now, get to Brasília, Mr. President-elect.""

 brazil.296.t: "Morning at Siqueira General Contracting"
 brazil.296.desc: ""...and apparently if you so much as try to move the toilets that pisses their union off too, so don't do that either," said the Foreman to his group of Araguaína construction workers. "Another thing: don't worry about having to go on the dole after this one as we signed an agreement to do a shitload of roads in the south of town."\n\n"More federal investment?" asked Lucas as he took a sip of coffee.\n\n"Yup," said the foreman. "Every week it seems like there's more to do. And every company worth anything has signed a deal. And as long as JK's in charge we'll be busy until the entire country is covered in highways and city blocks."\n\n"But then we gotta fill them," said Adriano and the group chuckled.\n\n"Yeah, and we get money from that too," said the foreman. "This might be the only time the government gives things out instead of just taking them. Should be happy we live in enlightened times."\n\n"I don't like it," Inácio mused. "We have the bridge contract already, and the government wants us to do more and more work. How are you sure you can do it all?"\n\n"It's your job to do it, not ours, we just fill out the manpower needs," the Foreman said. "Now, last up, we're thinking of a tool check-out program where you can borrow some of the equipment for personal projects. If you have any comments...""
 brazil.296.a: "Nice work, and you can get it."

 brazil.297.t: "Dinner for Two"
 brazil.297.desc: "Silence. The silence that ever presently hung in the air, only interrupted by the occasional sounds of forks scratching plates. Juscelino contutied to pick at his food in the silent dining hall. He looked across the table at his wife.. "So Sarah, how have the children been doing since I've been gone?"\n\n"They have been good." replied Sarah. "They've missed you though. I've missed you."\n\nJuscelino shifted uncomfortably. He tried to keep his composure. " I know I haven't been around a lot. And I know it has been hard on you and the kids. I would never wish that on you. But, I have responsibilities to Brazil. The people have entrusted me with the most important seat in the country. And as much as I try to see you and the kids, I can't just abandon my responsibilities."\n\nSarah looked at him. " I know you have responsibilities. I just wish you could be around more. You just seem so distant in so many ways." Sarah sighed and turned her head away from Juscelino. " I just wish I could see you more. You're just gone for long amounts of time. And sometimes I think that you are off doing things that don't relate to your responsibilities."\n\nJuscelino twitched. He had been spending a fair number of days and nights with his mistresses. Did she know? Had someone told her what he had done? Guilt began to wash over Juscelino as he remembered the nights he could have been home but was instead with his mistresses. " Look." He sighed. " I promise I will try to find more time to be home with you. But the President of Brazil isn't a job with a lot of free time. Please understand me. I wish you didn't have to go through this, but it's impossible to avoid it."\n\nSarah sighed. "I understand you have to serve Brazil. Just please say you will spend more time with the family."\n\nJuscelino stood up. "I promise I will try to make more time for you and the family." He hesitated for a moment and then began to walk towards the door to the main hallway. "I have to go now, I'm sorry but I have an important meeting with some senators to pass infrastructure legislation that I can't miss."\n\nSarah shot up. " But you just arrived."\n\n"I know I know. But I need to make this meeting." He began to walk to the door. He turned back one last time. "I love you Sarah."\n\nSarah looked at him one last time before he left and said. "I love you too Juscelino, goodbye.""
 brazil.297.a: "And soon the silence took over again."

 brazil.298.t: "Akhenaton Reborn"
 brazil.298.desc: "A red sun rising in those early morning hours made the pearly blue Brasília skies as crimson as the soil from the Central Highlands. As the cold night gave way to the scorching day, Oscar Niemeyer's towering white masterpieces started reflecting the light of the sun over the waters of the Paranoá. A shining city on a hill, as spoken by Christ in his sermon, the capital of the tropics prophesied by Saint Don Bosco, which will house wealth and splendour that men couldn't conceive. But prophets would be just madmen if it wasn't for another even rarer breed of man: those who make their prophecies come true.\n\nOne of such men was taking his morning walk on the margins of the Paranoa: President Juscelino Kubitschek. As he stared at the city the President could only think of that time decades ago when him, then a young student, first heard the tale of Akhenaton. A visionary pharaoh that broke with the old ways of Egypt and took his people to a new golden age, the man who dared to leave his whole civilization behind and start again building a new city at the banks of the Nile, shaped as a bird reaching for the skies.A man who was hated but a man who would never be forgotten. A man who dared\n\nAnd as Akhenaton before him JK dared. He remembers when people called him insane, he remember the tornados and the rainfall stopping the work, he remembers when his presidential plane crashed in Brasília's building site and Lacerda worte in his newspaper in tall letters "Lost Control: Juscelino Crashes Country Over Brasília", he remember the ultimatum he got from Congress but he also remember the Brazilian People that followed his vision. Now before his eyes he can see his Nile in the Paranoá, the roads of Plano Piloto spread their wings like the Ibis and on the sun kissed windows of the Alvorada he had set his Great Temple."
 brazil.298.a: "From here to eternity."

 brazil.299.t: "The Atlantic Highway Project"
 brazil.299.desc: "The wind whipped through Kubitschek's hair as he stood on a beach in Rio Grande do Sul. The waves crashing across the rocks roared as he looked up the beach towards the town. He turned towards one of the engineers he had brought along with him. "This is one of the places?"\n\n"Yes. It is nice and close to the shore, there is a town up the higher part of the beach, the soil is nice and firm without having too many rocks. It's perfect for a road."\n\nKubitschek smiled as he turned to the town. "I'm sure they will appreciate the new jobs this construction will give them."\n\n"Uh- Yes I'm sure they will," said the engineer as he continued to look at his notes.\n\nThis was not some small road to connect a beach town in Rio Grande do Sul. This would be his infrastructure masterpiece. A planned highway to go across the entire coast of Brazil. A grand connective piece to further bring Brazil closer to the future. Kubitschek had brought some of the engineers that worked on the Trans-Amazonian Highway to help him on this project. They were currently all over the coast, evaluating areas for the highway to go through. From Recife to Rio Grande do Sul, the highway that would connect the country. It was genius! Kubitschek began to think of the possibilities. This would be a massive boat to the Brazilian economy. And would only further drive up the automotive industry. It would be a major strain on the government, but Kubitschek had put his best men to the task. And the benefits greatly outweighed the risks. He could already see the long lines of cars going down the roads, bustling towns forming around roadstops. As he turned to the ocean and looked out to the vast waves Kubitschek felt ready for anything. The Transatlantic Highway was going to be built."
 brazil.299.a: "For the good of all."

 brazil.300.t: "Good Old Friends and Good Old Days"
 brazil.300.desc: ""Jango!" Kubitschek walked up to the door of the house. "It is a great pleasure to see you again." Kubitschek and Goulart had planned to meet at his house.\n\nAs he walked up to where Goulart was standing in the arch of the doorway, he noticed something off about him. He looked ragged, like he had just rolled out of bed. And there was a distant sadness in the corner of his eyes, some hollow failure. Goulart took a second before answering Kubitschek, "It is a great pleasure to see you as well." A small smile came across his face as he reached his hand to shake hands. He turned to face the inside of his home. "Please, come in."\n\nThey walked into the interior of Goulart's home together. The home was nice looking enough, but slightly messy. They turned and walked into the main sitting room. "I never thought I would have a VP that wasn't you João." said Kubitschek as they sat down. "You were one of the best people I have ever worked with. The Presidency won't be the same without you."\n\nGoulart looked up at Kubitschek with some joy in his eyes. "Well Edna Lott won't let you down. She has had an exemplary career in the PTB, JK. And I've spoken to her myself, she seems very bright."\n\n"I hope she is." Kubitshchek chuckled, "From what I've seen and heard of her, she seems very... opinionated." Kubitschek leaned closer to Goulart. " Even though you unfortunately cannot be my Vice President, I still need your help."\n\n"My help? What could I do for you?" Goulart replied.\n\n"João you still are the leader of the House of Deputies are you not? Plus the leader of the PTB. I need you to help me to push through legislation that will help Brazil, improve quality of life for all. You need to be my right hand man in the house, or it could all fall apart. I need you."\n\nGoulart looked surprised for a second, as if he had forgotten the tremendous power he holds over Brazilian politics. "Of course I would help you pursue your policies. We both want to help the people, to continue the legacy of Vargas. You have my full support."\n\nKubitschek replied "Excellent my friend. I am very happy to hear that." Both men stood up, and shook each other's hands. "Let's hope this produces some good for Brazil.""
 brazil.300.a: "An alliance for a better Brazil."

 brazil.301.t: "The Time Is Nigh"
 brazil.301.desc: "There was nothing left to do but wait.\n\nThe planning was done, the preparation was complete, and the crowds had come to the capital to celebrate, to finally amalgamate into a moment of triumph.\n\nJuscelino Kubitschek's moment of triumph.\n\nTancredo Neves watched as Kubitschek strutted to the running car. "I wanted to wish you good luck on your inauguration," said Neves.\n\nKubitschek had a large smile come across his face. "Thank you very much Tancredo. And," He said turning to him. "I want to thank you for helping me with my campaign. Your help is invaluable to me. And it will be a pleasure to have you in my cabinet again."\n\n"It was my joy to help you JK."\n\nKubitschek opened the door of the car that was prepared to take him to his inauguration. "Spent a lot of last night going over my speech. I think it's a real crowd pleaser, and goes over my policy well."\n\n"Are you nervous?" asked Neves.\n\n"No, of course not," said Kubitschek. "After all this isn't my first inauguration. I know the run of these things." As he slid into the car he turned back. "See you soon Tancredo!"\n\n"Good luck with your speech!" Neves yelled back.\n\nThe car door shut, obscuring Kubitschek, and the car whisked away to his inauguration. Tancredo Neves walked away to find his own car, readying himself to participate in the numerous events that would come."
 brazil.301.a: "Victory is at the cusp of Kubitcheks's grasp."
 
 brazil.302.t: "A Plea for Help"
 brazil.302.desc: "A man. A corruption scandal. A long jail sentence. A friend of the President.\n\nAdhemar de Barros had read the letter a few times already. A member of his association in São Paulo had been busted for corruption. Sadly the man had been less adept at covering his track than Adhemar. Thankfully the man had kept his connection to the President (and the resulting pile of evidence) secret. Adhemar admired loyalty. But how to help the poor unfortunate man?\n\nLeaving the man to fend for himself was an option. Especially in this electoral year. But the thought of abandoning his associate to a long jail sentence made the President distraught. Pardoning him on the other hand, would signal to friends and foes that no one messed with the President's own without a damn good reason. Scandal rags might speculate on the President's corruption, but what did he care? Everyone already knew.\n\nThe final alternative was to pull some string and have the police release him without trial. This would raise some eyebrows, but less than moving out in the open to free him. Perhaps here as in all things, the golden mean would hold true?"
 brazil.302.a: "The poor man is going to jail, sadly."
 brazil.302.b: "Get the police to drop the case."
 brazil.302.c: "A presidential pardon will clear the man's name."

 brazil.303.t: "Winning the European Voters"
 brazil.303.desc: "A mug of German beer. President Adhemar de Barros glimpsed his reflection on the smooth beverage, the evening lit by a full moon. Why had he come there exactly?\n\nDelicious food. Sons and daughters of European immigrants. German beer. Italian wine. Electors invited for drinks wherever he went, his two bodyguards trailing him crow-like in their dark suits. They reminded the President of Huninn and Muginn. Or had it been the other way around?\n\nThere had been plans of campaigning. Outreach to German-Brazilians and Italian-Brazilians. But the good time had overwhelmed President Adhemar. So many dances, so much great food, so many great drinks. After so many rounds, any speech the President made would have approximated Jânio Quadros usual level of sobriety. Better to, uh, better to take the evening off."
 brazil.303.a: "Perhaps the electors would remember him better than he'd remember them."

 brazil.304.t: "Damage Control"
 brazil.304.desc: "The lord knew it wasn't always easy to get things done in this country. President Adhemar was nonplussed to find a mid-level muckamuck and former associate of his had ratted him out to the authorities. Some story about corruption on a highway contract. The irritated President had to think long and hard to remember which corruption contract could possibly have been revealed to the media.\n\nWhat to do then? Going on the attack was certainly an option. Adhemar knew pricks like this often didn't go fully clean to the police. Embarrassing their source by revealing all of his dirty laundry would do much to shift the conversation away from the President. It would certainly feel good to shut-up that double-dealing idiot. Of course, reacting aggressively was in some ways an admission of guilt. Perhaps Adhemar simply denying the allegations without attacking the source would look more credible to the nation.\n\nFinally, there was the option not to say or do anything. Adhemar was known by all as the man who stole but got things done. Were any of these accusations off-brand? The President had more important things to tend to."
 brazil.304.a: "Let's go on the offensive."
 brazil.304.b: "Just deny the accusations."
 brazil.304.c: "A lion does not care about the braying of sheep."

 brazil.305.t: "A New Vice-Presidential Samba"
 brazil.305.desc: ""So you are the one who defeated Natel?" President-Elect Adhemar beamed at his new Vice-President. Edna Lott merely offered her hand, with regal manners. Shaking her hand, Adhemar observed this woman, who had against all odds climbed to the vice presidency.\n\nIn history's oddly sardonic sense of humor, where her father had had a right wing Vice President opposed to his presidency, Edna Lott now seemed poised to stand on the President's left. A rising star of the PTB. Uncomfortable a replacement to Vice-President Natel's pliable ways.\n\nAdhemar smiled further. "You've the charisma your father always lacked, Senhora Lott."\n\n"And you've the confidence and populism this country's conservatives never could attain. I do not wish to play games with you, mister President. You make a mockery of poor Brazilian's issues. You give them trinkets where deep reforms are required. I fully intend to use my office to monitor your work. Assuming your claims of seeking to help poor workers are not total rubbish, we may find ground for cooperation. Until then, you must forgive me for not being eager to share an office term with you, mister President. I would not begrudge you a similar irritation."\n\nAdhemar refrained from smiling, lest he aggravate his new Vice-President any further. She had her father's stubborn honesty, enhanced by a woman's wiles. The cohabitation would be uncomfortable. Yet how much more entertaining."
 brazil.305.a: "I ask the lord to keep my enemies as close as possible."

 brazil.306.t: "President João Falstaff"
 brazil.306.desc: "In a country where political life sees the impossible turn mundane, and the mundane tinged with absurd, comedy had of late seen a boom. In the comedy club scene of big cities like Rio, up and coming comedians gathered on designated nights to try out their sketches in front of other comedians as well as average citizens.\n\nRecent political troubles had been a boon for aspiring comics. Lott's taciturnity, Quadros' grandiloquent alcoholism, JK and Lacerda's arrogant scheming. All of them mocked mercilessly. None so much however as now President Adhemar. With his briefcases full of self-admittedly stolen money, his populist and ersatz pious sayings, Adhemar de Barros had provided fodder to countless aspiring humorists.\n\nNot everyone was equally enthralled with the rash of Adhemar imitators. Bruno sighed, sitting in the back of the club with a friend. "See, everyone is Adhemar now. He's too easy to mock, he's killed comedy."\n\nHis friend shrugged. "Everyone will be Adhemar in politics too. Corrupt and populist. Why not get used to it here."\n\nBruno sighed again. "Comedy used to give us something to escape daily life, not repeat it.""
 brazil.306.a: "We've elected a clown President, what did you expect?"

 brazil.307.t: "Cleaning the Old Office"
 brazil.307.desc: "São Paulo. He'd miss the place.\n\nAdhemar had kept the local office throughout his presidential race. Now that the prize was his, however, it was time to close shop and move to Brasília.\n\nThe safe had been moved, the money partially cycled through a few fronts before accompanying him to the capital. Files of blackmail and intel had been read by him. The still useful stuff would be kept safe in a safehouse in the city. The rest had been burned. There was not much more to clean or move in the office. He had kept it mostly spartan. As a front facing area bringing in dirty laundry would have not been helpful.\n\nAdhemar moved to the window. He'd miss São Paulo. From time to time the wind brought over if not the feel of the endless ocean, then a certain idea of the sea. Infinitely better than Brasília's stuffy continental atmosphere.\n\nNo use dillydallying. Adhemar picked up his briefcase, placed his chair under the desk, and left the room."
 brazil.307.a: "To Brasília!"

 brazil.308.t: "Car Trouble"
 brazil.308.desc: "Adhemar slowly sat down in the car seat. The smell of new leather washed over him as he grabbed his new shiny keys and put them in the car. The engine purred to life as the keys turned. Adhemar smiled as he began to pull the VW beetle out from the dealership he had got it from. The dealer smiled as he waved to Adhemar as he looked back one last time before pulling out onto the main road. Adhemar waved back as he continued to drive his brand new bought car.\n\nAdhemar flexed his hands on the steering wheel as he continued to drive down the street. It was about time he got a new car. He had been driving an old Ford since the 30s, and it was time for the upgrade. And the VW was a smooth car to drive. It was nice and compact, had a smooth leather interior, and was cheap. The Germans may be insane genocidal maniacs, but they could make a car.\n\nAs Adhemar cruised down the roads of São Paulo he began to look at his surroundings. The bustling streets of people, the children running up and down the road, and the old men gossiping on porches. Adhemar smiled. It was a beautiful day. But as he turned the corner he frowned a little.\n\nA big rustbucket of a car was sitting in a parking lot across the street near a restaurant. Normally, this wouldn't be a cause for concern, there were a lot of old cars in the city, but this was a police cruiser. Adhemar murmured to himself. He had planned to replace the old outdated police cruisers of the state, but he hadn't found the time.\n\nAdhemar began to think of what he should replace the old police cruisers with. Maybe he could replace them with a VW Beetle like the one he just bought. It was a smooth running vehicle, was an okay size, and was cheap enough to mass produce for the police force. But getting a contract from the Germans might not be the best move politically. There was always the choice of an American company. Recently Adhemar had heard someone praising Willys Aero. A car from a decade ago, but a quality one nonetheless. Adhemar had seen people driving them all over the city. It seemed like a safe bet to buy the Aero for the police. As Adhemar pulled into the parking lot of the Palacio dos Bandeirantes, he decided to begin to formulate a plan to approach one of the car manufacturers. He sat for a moment thought, about it, then decided."
 brazil.308.a: "The Volkswagen Beetle."
 brazil.308.b: "The Willys Aero."

 brazil.309.t: "Bribing Adhemar"
 brazil.309.desc: "The office of the governor of São Paulo was almost offensive in its gaudiness. Coated in gold, sparkling crystals and extremely old furniture. General Castelo Branco, the Conservative he was, deplored it. Not because it was gaudy, but rather because he knew how the governor got his office looking like this, and he was about to participate in it. The doors swung open, and a mustachioed man in a blindingly white suit entered. "Ah, I suppose the secretary sent you up here? Very good!" Adhemar de Barros laughed, apparently at nothing in particular.\n\n"Hello, Governor." Castelo Branco said. "No need for pleasantries, let's get down to business. What do you want for São Paulo?"\n\nAdhemar laughed again. "Now, now, General, who said there is no time for pleasantries? A drink, perhaps? I have a lovely Petit Verdot, straight from France..." He walked over to the drinks cabinet. "Or, perhaps a brandy?"\n\n"Where did you get French wine, Governor?" Castelo Branco grimaced.\n\n"Oh, I have my ways, General. I..." He poured a glass of brandy. "...Have my ways. Cheers."\n\nAdhemar took a sip. "Anyway, business." He smiled. Castelo Branco was fuming at this point, that the Governor would have the audacity to extend this meeting.\n\n"We'll give you three million US dollars, Governor." the General said.\n\n"Not enough." Adhemar de Barros leaned back.\n\nThe General exhaled in frustration. "Five million."\n\n"Now, now, General, I can't believe you think so low of me. I want power. I want to be Interior Minister, at least."\n\nCastelo Branco sighed. "Fine, but not immediately. In a year or so."\n\nAdhemar smiled. "Very good. You can find your own way out, General." General Castelo Branco left the São Paulo legislature, with an uncharacteristic smile."
 brazil.309.a: "Adhemar de Barros may meet with an unfortunate fate in the future."

 brazil.310.t: "The Long Watch"
 brazil.310.desc: "There were worse assignments than this, Felix thought. All he did all day was sit around and watch over this one person they had on house arrest. At least he didn't have the unsavory job of actually rounding up political enemies of the military; he could just relax, play some poker with his battalion, and go on the occasional light patrol, with little fear of anything going wrong.\n\n"José, you are the luckiest man alive. I had you trapped on the turn so hard, and you got saved by your SECOND four of a kind today. What's your secret, hm? Or have you paid off Eduardo again, just so you can finally dig yourself out of that deep hole you're in?" One of the soldiers gave a hearty chuckle, while the dealer quietly shuffled the deck twice, just to be safe. "Marco, let's be honest here. By the time this round finishes, it will be you who owes me an extra lunch, and not the other way around!"\n\nTwo knocks resonated on the side of the truck, before Felix's sergeant came around to the opening. Felix begrudgingly grabbed his rifle and started to dismount the truck, spotting a single man in the distance moving towards the house that they were supposed to watch. Despite being under house arrest and allowed guards, this man rarely had any visitors. On a fast day, there would be 3, tops. Was it because the military wasn't letting anyone see him, Felix thought? "Hey Sarge, who exactly are we guarding here again?"\n\n"Felix, do you not read anything I tell you to?!", huffed his sergeant, while staring at the visitor through a pair of binoculars. "We're literally guarding Vargas. Dig your head out of the dirt next time, Christ. His son's coming up right now." "Are we just going to let him in? Won't that be an issue for us later?" questioned Felix. "No, our orders are to let people in; even the son. We deal with them later if they're being a nuisance." As Vargas Jr. entered his father's home, the sergeant put down his binoculars, and reached for his cigarettes. "You boys can go back to your poker game for now. Oh, and Felix! Read the damn reports I send you next time, or I'm going to kick you from my platoon.""
 brazil.310.a: ""Y-yes sir. Of course sir.""

 brazil.311.t: "To Kill an Eagle"
 brazil.311.desc: "Paulo had an intense pride in his uniform, custom design to replicate the Brownshirts of the Germanic NSDAP, the armband on his arm a replica of the swastika he managed to buy from the black market through his own contacts. Every day, he would wake up in the morning, meticulously dress up as he would see in the pictures he bought, to replicate the salute and posture of a member of the glorious Germanic Reich down to the posture, all in the pursuit of a singular, worthy goal of National Socialism in the country of Brazil. The fact other nations like Bolívia and Paraguay had the support of Germans, and yet his country became a hotbed of insidious, twisted Bolshevism and liberalism was a thing he would hope would be fixed with time. One day, he would see the glorious eagle gaze down upon São Paulo, and he would be the first to salute a Brazilian Umlaut. Yet, he couldn't hate more how hard it was to navigate the labyrinthic maze of his hometown in such a stuffy, tight uniform, and how too much attention it brought from the passerbys, who stared at him in varying degrees of incredulity and disgust; what did it go wrong? Who leaked their meeting headquarters? They were so meticulous, careful to not let them get any inclination except with like-minded people! Wait... was it the Integralists?! Did the Integralists sell them o-\n\nPaulo wouldn't ever finish that line of thought, his mind subliming in white-searing pain as the butt of a rifle cracked his nose in two, his unconscious body dragged to a police car."
 brazil.311.a: "Paulo Henrique, 31 years old, dead in a police shootout."

 brazil.312.t: "The Passing of the Torch"
 brazil.312.desc: "It had been several weeks since Brazil's democracy had died in his hands. Lott spent most of his days in house arrest thinking about what more he could have done. Each time he came up empty. It was only his knowledge of the Constitution that had kept him and his family under house arrest. Because of his status in the military and as a former president, only Castelo Branco had the executive authority to arrest and imprison Lott, and fortunately Castelo Branco had his hands full trying to tear apart Brazil's democracy.\n\nBut Lott knew his time was up. Every failed measure he and his Constitutionalists had tried to take back the country failed. Soon, Castelo Branco would drive the dagger into Lott's back.\n\nThe next morning, a convoy of vehicles pulled up to Lott's house. When he opened the door, he was greeted by the frowning visage of Castelo Branco and several other hardline officers. Lott raised his hands in surrender, glaring at Castelo Branco all the while.\n\n"Marshal Lott, you are under arrest by order of the Brazilian Armed Forces. I ask you to surrender yourself into our custody."\n\n"Of course, Marshal." Lott stepped to the rear of the convoy, but Castelo Branco grabbed him by the collar.\n\n"Don't expect us to make it easy for you, Marshal," Castelo Branco growled. "Make me come out here and play these stupid games with us. You are finished in this country. Stay out of our way, or we will come for your family. Do I make myself clear?" Lott remained calm and gave a firm nod before being shoved into the back of the car.\n\nTurning back to look at his family, he saw their worried faces and gave a weak smile and a thumbs up before the door slammed shut. Lott wasn't worried about the mistreatment; it was purely symbolic. As the car began to speed away, his mind raced with thoughts of what more he could have done to save the Republic. After all, he had managed to stop a coup once; how could he have failed this time?"
 brazil.312.a: "He can wonder all he wants inside a cell."

 brazil.313.t: "Ao Correr da Pena"
 brazil.313.desc: "Goulart couldn't sleep, wouldn't sleep, his eyes frantically watching the countryside on both ends, at the smallest sign of a camouflaged soldier, or a helicopter, or a jeep breaking through the idyllic trees, soldiers blazing to put him to a wall for the crime of simply existing; he knew he was a thorn on the Marshal's side for years, all of them too willing to put him and his family on an archived file, and an accident obituary in the newspaper. It took luck, cashing in every single favor and goodwill he has acquired in his career, coupled with his friendship with Brizola, to even have this much headstart. The military was after him, whoever he has ever associated, his immediate family, all of them, to get rid of him like Russia did its Tsar so long ago, and as much as he loved his country, he loved Brazil, he couldn't risk Maria and his kids to die with him for something petty like politics.\n\n"We're here, Sir."\n\nThe voice of his heavily accented, northerner driver broke him out of his panic stupor. Giving a loud thanks, and shaking his family awake, they all but scrambled out of the car, towards the helicopter. As each step got him closer to his ticket of salvation, relief and sorrow accumulated in him equally; in the end, he failed Brazil, and that was a dread that would carry to him forever in Uruguay. Perhaps one day, in the future, his home country would be a better place, but he knew he wouldn't ever want to return again...\n\nNot after what they've done to him, and the people he knew. He knew, on the moment he closed the helicopter door, and made it to safety, that he would never return to his quaint home in Rio ever again."
 brazil.313.a: "Costa e Silva would scream at his men later, for missing Goulart by an hour"

 brazil.314.t: "The Crow and the Carcass"
 brazil.314.desc: "Lacerda had an utter distaste at the current set of events, the coup by the military edging very, very close to how the Weimar Republic in Germany proceeded, sans a figure like Hitler. And perhaps, that was the differential in his head, as he turned down the radio, and cracked his neck, spinning his chair and reaching for his trusty typewriter, words dancing in his head as he tries to spin a positive narrative to this entire sordid affair. He knew he was watching the military take the democratic institution to an execution row, but why go down with the rest of them?\n\nEven if by the military's gunpoint, he could be the President of Brazil, and push the country to the direction he always envisioned it to be, he wouldn't mind having a little bit less leeway as he normally would; he and the military, after all, shared many fundamental beliefs that could be grounds to a solid partnership: no communists, no fascists, and the moral and good beliefs at the forefront of the nation.\n\nWith a final click, the final punctuation mark was set on his article praising the military's "bravery towards safeguarding Brazil's moral compass and goodwill towards the free nations of the world." It was bullshit, he knew it was bullshit, but did it matter? Repeat a mantra a thousand times, until it becomes true. Putting it in a folder to send to his secretary and editors later, he brings his phone, and disks some numbers he already knew by memory.\n\nTime to do some calls with his old contacts at the headquarters."
 brazil.314.a: "At Democracy's Funeral, the Crow takes his shovel."

 brazil.315.t: "A Alma de Lázaro"
 brazil.315.desc: ""Can you believe this hogwash, Ester?!" Ester has heard many things in her tenure as Lacerda's secretary, to the point she frankly felt she couldn't bring anything but a non-committal answer to whatever mood swing Lacerda was up to that day...but even somebody as stoic as her couldn't help but give a grave thrum on her throat as she read the newspaper. "President Castelo Branco approves measure AI-2, giving him extra-constitutional powers, the nullification of every election result before the establishment of this mandate, and dissolution of all direct elections until prior notice?! This is, this is taking democracy and just shooting it in the alleyway! I won't stand by it, this was my bloody chance! I- I will-" Maybe it was self-instinct to preserve herself and her job, or perhaps something deep inside of her cared for the loud braggart of a man that was her boss for she pulled him by the collar and pointed at the window, her grimace visible. Lacerda gazed, his face still flushed red, before it paled at the sight of rolling tanks by the streets, soldiers openly brandishing automatic weapons, and the people observing by the walkaway the march. "...right, right, I...I would just be putting myself on the same bloody list as Amazonas. I'll...I'll just shut up. Keep my head low, I still have Guanabara...I can keep things as normal as they can..." Ester nodded, returning to her work...yet her heart wasn't to it, but to her family, her sister Marietta at the countryside, were they okay? Her thoughts were interrupted by the opening of Lacerda's office, and the man's voice echoed. "Call my pilot, make sure he's always on stand-by. I want my plane out of my hangar in São Paulo, and back to Guanabara." His voice paused for a moment, before it continued, only her experience with his muttering allowing her to hear the finishing touches of the Crow's sentence "Just...just in case."\n\nShe never thought she would hear that emotion in that man's voice."
 brazil.315.a: "She never thought she would hear defeat coming from him."

 brazil.316.t: "Not This Time"
 brazil.316.desc: "Kubitschek stares at the cup of Cachaça in his hand, stark black eyes staring back at its owner, showing a deep disappointment. In himself, for not going the extra stretch, on his campaign personnel, for not putting enough work to convince the few more thousands necessary to guarantee him Brasília, and on his works for not being enough for the Brazilian people...\n\nBut, not the Brazilian himself. Juscelino couldn't be prouder of his country, for thwarting the Military's ambitions once again, and holding the torch of Democracy, as they ever do. Glancing at his side, to Neves's warm grin, he holds his cup, and the soon-to-be ex-President again can't help but toast his old friend. "What now, JK?" JK glances at Neves, a practiced smile almost crossing his lips before he simply gives a lopsided, genuine smile. There was no need for carefully sculpted expressions and tells with a man like Neves. "It's a huge disappointment, but the people spoke, a thing that wouldn't have been possible a few weeks ago. Even if I'm not the one in the Planalto, it will be a civilian President, not an upstart major wanting to blame everything on communists to make Brazil their little kingdom." JK laughs, finishing his cup. "I've written my letters, I've tied my loose ends, but I can return, Neves. I can bloody well return any time I want. I'll go back to Rio, I'll see what I did wrong, and one day I'll be in the Palácio do Planalto again, and only God will be able to stop me because the military sure couldn't." Neves can't help but give an amused chuckle at his friend, as the alcohol is starting to get to the "Co-Architect of Brazil." And that moment he knew, JK would be fine."
 brazil.316.a: "My friend here can't handle another cup. The bill, please?"

 brazil.317.t: "Not This Time"
 brazil.317.desc: ""God fucking damn it all!"\n\nLacerda threw the phone on the wall, getting up and kicking the chair with gusto as if it represented the idiotic masses that couldn't see what he did for Brazil, what he could have done for the country if they would just give him a chance. Months wouldn't be enough, wouldn't ever be enough to make sure Brazil, in all its pristine, shining glory, could stand as the leader of South America it was always meant to be.\n\nAll they needed was to vote for the right candidate, and they didn't.\n\nFor a fleeting moment, thoughts of trying another '55 went through his head. Democracy sometimes simply needed a nudge in the right direction, and he knew that better than most. But, that moment all but died, as he thought further, and saw the benefits...\n\nIf, however, whoever got in the Planalto did a lousy job, he could do what he has always done best and use propaganda to attack them. This time with experience as a presidential candidate to back him up. He could use the little time he got as a platform, of what he could do and show the people what his opponent was doing wrong. However this required that the people would just bloody vote right the next time.\n\nIf it was Vargas' little spawn or his accursed protege, maybe he would consider another '55, but as it stands, it would be too little to gain over the massive risk; democracy in Brazil wasn't going anywhere anymore, and he would have his chance. He waited many years, he can wait for four more."
 brazil.317.a: "Have your seat, keep it warmed up for me next time."

 brazil.318.t: "Not This Time"
 brazil.318.desc: "In retrospect, Goulart should have known better. He was always the riskier option for President, God knows how many hundreds of people would love to put a bullet in his heart for wanting to simply do right for the people, so he couldn't, objectively, blame the Brazilian for not voting on a person that almost caused democracy to die under the tyrants that always threatened the country.\n\nEmotionally however, he was a wreck. And that's how he found himself, half a bottle of Pinga in his hands, a half spent pack of cigarettes in his pocket, and the television playing a game of soccer that he wasn't sure he was fully paying attention to.\n\nHis face felt wet, warm, painful from the tears, disappointment, and sorrow boiling in him, for letting the people down, Brazil down, Vargas down. Sure, it could have been much worse, but the fact this happened because of him can't help but haunt him, like a specter gripping his heart, tighter and tighter until it po-\n\nHe didn't realize, but the grip on his body wasn't his failures, but Maria Thereza, pulling his head on her shoulder, silently giving company to him, and his bleeding, emotional heart.\n\nHe knew there would be other chances. Other opportunities, other venues to put his dream of a fair Brazil to the nation. He wasn't alone, he had friends, family, a loving wife, and he was on the soil of the country he loved so much.\n\nHe would be fine."
 brazil.318.a: "Resultado Final: Botafogo 2, Flamengo 0"

 brazil.319.t: "The Hunt for an Heir"
 brazil.319.desc: "Adhemar sat deflated in his office, he had thought third time would be the charm but the presidency had evaded his grasp once again. What age would he be in 1970, late 60's, he would be 74 by the end of that term if he won the election. No Adhemar thought, there would be no fourth run, no fourth blitz across Brazil, no more shaking hands and kissing babies. The presidency which had been so close yet so, so far away had evaded his grasp once and for all. The presidency of Adhemar de Barros would be consigned to the work of fiction writers discussing what could have been.\n\nAdhemar stood up to go outside and thank everyone for their hard work and contribution to the campaign and that this was not the end. But then a small thought emerged in the back of his head, one of those thoughts that start out small, but then rapidly grow and grow and grow until it is all you can think about. What if this was not the end.\n\nDespite his age he could still easily play an influential role in Brazilian politics. He was a political grandee and had played a crucial role in Brazilian politics for the last decade, despite never being a senator or reaching the presidency.\n\nHe just needed an heir, an heir to his ideals and the PSP. An heir that would outlast even him when one day he died. But who could it be Adhemar thought. The answer was obvious, the man he had endorsed for the Governor of São Paulo, the man who he had personally appointed as his replacement and had won in a landslide election as governor for the state. Adhemar paused for a moment, him? Really? the rich playboy philanthropist son of a former President. Would this man truly be capabale of continuing where Adhemar left off, well with his guidance he could.\n\nAdhemar broke into a smirk and exited his office, quickly thanking and passing by those who had come to see him before he reached his secretary."
 brazil.319.a: ""Get Vargas Jr. on the line now, we have much to discuss.""

 brazil.320.t: "A Drunken Failure"
 brazil.320.desc: "He had failed. He had campaigned for months, endured personal tragedy, spent countless hours under hot studio lights, and spent years in the political field trying to change Brazil. And yet he had still lost. All of his work, sweat, blood, tears had been thrown away in one election. So now he sat in a drunken stupor staring out the window. The television murmured in the background as he continued to stare blankly out the window thinking of what had just happened.\n\nHe and those around him had been so confident that his loss was a terrible shock when it came. He took another deep drink from his bottle. His father, he had failed his father. He had sworn he was going to be President, and he had been absolutely sure of him. Yet here he was. He walked to the window in his room and opened it, letting the cool wind wash over him. In the distance Quadros could hear the cracking of fireworks. As the air moved through his body he looked down. He was still holding the nearly empty bottle of liquor. He saw his own distorted reflection in the bottle. He looked more like a mess than usual. His face puffy and red. His hair was in a tangle on his head. He had no idea where his glasses were. He looked like a failure.\n\nThe Americans would still run rampant through Brazil, corruption would still reign, the economy would still be a mess. None of his dreams would ever come to fruition. Quadros stood still for a second and then violently threw the bottle as far as he could. The bottle flew through the air and shattered with a distant crash as he stormed back into the room.\nNo. He had not failed yet. There were still things to be done and battles to be fought. Even though Brazil had rejected him, there were still other countries and groups to champion. He could go to other Latin American countries, and spread his vision. Maybe, if he was lucky, it could even gain traction in Brazil. But he needed to begin planning immediately.\n\nJânio Quadros would not be a failure."
 brazil.320.a: "The battle is lost, the war yet continues!"
 
 brazil.321.t: "A Friendly Meeting"
 brazil.321.desc: "As the Lott presidency came to an end, the former President, Marshal Henrique Teixeira Lott of the PSD and his former second-in-command, Jânio Quadros of the PTN, came together once again for a cordial meeting of the sort that had become more and more common as the years wore on. They sat down and broke out a few drinks - but not too many, as Lott very much liked to remain sober.\n\nThey talked about things that had gone well, and things that had not gone so well. There were disagreements here and there, but not of the kind that had punctuated their interactions before 1962. In fact the two of them found that, despite their differing backgrounds and political ideologies, they agreed on no small number of things. Lott acknowledged that, all things considered, it had been a good decision to defer to Quadros in the places where he had deferred to him. Quadros also freely acknowledged that, all things considered, Lott had done a fairly good job.\n\nThe day wore on, and the discussion changed to topics less directly involving them. Quadros and Lott were both concerned about the recent rumors of hardline communist guerrillas in the north, but Lott convinced Quadros not to worry about it too much unless it became a real issue. After a while spent just engaging in small talk - asking after each other's families and whatnot - and exchanging jokes back and forth, the two realized with a start that the sky was red and the sun was low in the sky. So the former President and his second-in-command shook hands and parted ways in some haste, but not before hammering out ways to keep in touch."
 brazil.321.a: "Thus Lott and Quadros parted as friends."

 brazil.322.t: "The Marshal Takes His Ease"
 brazil.322.desc: "It had been a challenging few years, Henrique Lott thought. There had been a lot for him to do; he had had to deal with the Nazis invading Brazilian waters, economic instability, war in South Africa, a madman of a Vice-President, screaming opposition politicians, the scourge of corruption and malfeasance, and above all the threat of a military intervention against him. At last, after a half-decade he was free from that nuisance, and he was now free to take his ease.\n\nAs he sipped his drink, he read a report about stirrings by communists in the far north of the country. The intelligence report indicated that it was nothing serious yet; he, therefore, would not worry about it until there was a legitimate cause for concern.\n\nPutting the report down, Lott sighed and reflected on another thing that had gone wrong during the last half-decade - his relationship with Jânio Quadros. He wondered just where it had gone so wrong, that Quadros would have tried to do what he did. After a brief moment spent ruminating on the situation, he dismissed his concerns. It was a good riddance. The man had to go. He had been too much of a hassle to work with.\n\nDismissing that thought, the marshal continued to take his ease."
 brazil.322.a: "A well-earned rest."

 brazil.323.t: "From One Lott to Another"
 brazil.323.desc: "It was a pleasant day in Brasília, and Henrique Teixeira Lott was pleased that he was able to use this good day to meet with someone who was neither an opponent of his, nor somebody who had just messed up, nor indeed somebody out to see what they could get from him. Quite the contrary: it was his beloved daughter Edna, who had just been elected to high office in the aftermath of the recent election.\n\n"How are things going then, Edna?"\n\n"Oh, pretty good, dad. I've been getting used to the way things work. Jango's been showing me the ropes, and I've been in touch with Tancredo here and there. Leonel's been pretty helpful too, even if he's a bit radical for my tastes."\n\n"Ah, well, you'll disagree with them once in a while, and there will even be conflicts, but whatever you do, you need to stay strong and stick to your principles."\n\n"I understand, dad."\n\n"Good. One more thing - if there is anything I can do to help you, just ask. I will see to it."\n\nEdna smiled and embraced her father."
 brazil.323.a: ""Thank you, dad.""

 brazil.324.t: "And at the End"
 brazil.324.desc: "Henrique Teixeira Lott, outgoing President of the Brazilian Republic, was giving one final televised speech to the people of Brazil as their head of state. Nearby, offscreen, were the incoming President, the Vice-President, and Lott's wife and daughter. As he spoke, he remembered all the things that he had gone through as President.\n\n"I am deeply thankful to you all for allowing me to lead you through these turbulent years..."\n\nThe swearing-in. Meeting and working with Quadros, Tancredo, Denys.\n\n"We have achieved significant progress in Brazil; we have reduced financial instability and driven the Nazi menace back from our seas..."\n\nFinding a way to outwit the Nazis. Dealing with the corruption scandal.\n\n"Our administration has managed other things too..."\n\nThe Lott Act and Operation Toucan. The election. The last days of his term.\n\n"I am announcing that I will be retiring from politics, effective immediately..."\n\nAs these things went through his mind, and as his speech reached its end, Lott found himself becoming slightly emotional; emotional enough, in fact, that everyone noticed it and was surprised. The Marshal was never that kind of person, they had thought.\n\nLott regained control over his whirling thoughts and concluded the speech.\n\n"I offer my humble thanks to everyone. Good night and farewell.""
 brazil.324.a: "With that the President became the Marshal once more."

 brazil.325.t: "The Marshal Returns"
 brazil.325.desc: "Marshal Henrique Teixeira Lott, the former President of the Brazilian Republic, having taken a brief vacation somewhere to rest from his labours, was now returning to active service in the army. At the party celebrating his return, no small number of Constitutionalists were present to welcome back their old chief.\n\n"Marshal, we'd like you to witness a promise we want to make to you and to Brazil."\n\n"Oh, is that so? Please go on then."\n\nThe officers stood to attention, while their leader pulled out a piece of paper. As he uttered the words of the oath, the officers behind him repeated after him.\n\n"We pledge, with God and Marshal Henrique Teixeira Lott as our witness, to defend the democratic government of our Republic of Brazil, to fight any attempt to cause it to fall, and to serve as promoters of democracy and civil society in our country."\n\nThe officers, having made their vow, stomped on the ground and cheered.\n\nLott smiled widely. This would make things far easier."
 brazil.325.a: ""With your assistance, gentlemen, I am reassured.""

 brazil.326.t: "The Broom Sweeps In and Wins the Day"
 brazil.326.desc: "When Henrique Lott proposed a plan to force the Brazilian Armed Forces out of politics, Tancredo Neves, João Goulart, and Juscelino Kubitschek had all pledged their support. Though that was sufficient to sway the most orthodox members of the Varguist coalition, it was of infinitely less use as regarded the UDN and its assorted conservative hangers-on. At this point, the conservative Jânio Quadros, with whom Lott had managed to build a good relationship, became of great use; it helped that he was just as worried as Lott was at the prospect of a coup.\n\nLott tried and failed to get anything more than basic expressions of consideration from these people, and that was if he was lucky. Some of them outright started spewing propagandistic talking points of the sort that would not be out of place in Costa e Silva's mouth. Others, on the other hand, said that they were sympathetic, but then started to repeat "concerns" that Lacerda had raised in the various newspapers he owned and controlled. It was at this point that Lott realized that the Crow was likely working against him, probably because he hoped the military might help him take power someday.\n\nThere was nothing to be gained from Lott attempting to persuade them himself. So he sent his Vice-President in and waited for the results.\n\nSaid Vice-President barged into his office in the Palácio do Planalto in two hours flat, bearing expressions of support from no small number of deputies and senators. Among these were numbered people who had even outright rebuffed Lott when he had asked about it.\n\nLott was impressed. Perhaps he had underestimated his eccentric second-in-command. As he expressed his gratitude, and listened to Quadros' expressions of pride in return, one sentence went through his head, which he promptly vocalized, to Quadros' glee and happiness."
 brazil.326.a: ""Jânio, you magnificent bastard.""

 brazil.327.t: "Trouble with the Right-Wing"
 brazil.327.desc: "When Henrique Lott proposed a plan to force the Brazilian armed forces out of politics, Tancredo Neves, João Goulart, and Juscelino Kubitschek had all pledged their support. Though that was sufficient to sway the most orthodox members of the Varguist coalition, it was of decisively less use as regarded the UDN and its assorted conservative hangers-on.\n\nLott tried and failed to get anything more than basic expressions of consideration from these people, and that was if he was lucky. Some of them outright started spewing propagandistic talking points of the sort that would not be out of place in Costa e Silva's mouth. Others, on the other hand, said that they were sympathetic, but then started to repeat "concerns" that Lacerda had raised in the various newspapers he owned and controlled. It was at this point that Lott realized that the Crow was likely working against him, probably because he hoped the military might help him take power someday.\n\nA few thoughts went through his head as he went back in defeat to the Palácio do Planalto. Perhaps, if he had had Quadros helping him out, he could have pulled the matter off. But it was of no matter. Quadros had to go; the risks of his staying far outweighed the benefits of his remaining."
 brazil.327.a: "He banished the thoughts from his mind and moved on."

 brazil.328.t: "Calming the Car Men Down"
 brazil.328.desc: "When Juscelino Kubitschek arrived at the meeting of PSD donors from the car industry, the magnates in the room were in full cry.\n\n"Telling us to lower our prices, how bloody ridiculous can you get?"\n\n"Has his officer's hat grown into his head and replaced his brain? Doesn't he know how important our profits are, damn it?"\n\n"We elected him, and this is how he repays us?"\n\nKubitschek walked to the front and raised his hands for calm.\n\n"Gentlemen, gentlemen! I must ask you to consider the situation. The President may have made a foolhardy remark, but you speak as if his word is law and goes unquestioned. You speak as if I or Mister Neves have no power to make him reconsider.\n\nKubitschek smiled inwardly. They did not need to know Lott had indeed refused to reconsider. "And even if he does go through with it, let's be realistic, gentlemen: Lott and the PSD remain the best choice you have. If you go to Lacerda, what will that crow do? He'll cut your subsidies in the name of 'freeing the market' and let in a bunch of foreign imports that will drive you out of business."\n\nAt this point, the manufacturers shouted in outrage. Kubitschek raised his hand again and made his final point. "You see, being told to 'lower your prices' is the least of the evils you can deal with in this country." As the men nodded, Kubitschek grinned. "You may not have to deal with it much longer, especially if you stay the course and vote for me in the next election.""
 brazil.328.a: "The manufacturers rose in loud applause."

 brazil.329.t: "The Builders of History"
 brazil.329.desc: "Juscelino Kubitschek turned to face the seating in the lecture hall; the audience, mostly historians by profession, looked at him eagerly, staring him down like children waiting to receive candy. Kubitschek had come to a Brazilian historians' conference to speak about the presidency. He had gladly accepted, eager to speak with those who would write Brazil's history.\n\n"The presidency is no easy burden! It requires a certain kind of man. Someone willing to assume responsibility for every single person in the country. You have to be able to respond to any situation, to any crisis. And you need to have a plan, a plan to change the nation, form it into something greater."\n\nThe former President looked at the sea of faces looking down at him. Many in the crowd were taking notes, trying to memorize everything Kubitschek had said. Kubitschek smirked. He'd make sure they'd never forget this. "Most of you can agree that great Presidents do not simply uphold the status-quo. No, they take the reins of their country, and drive it forwards towards progress. They use their power to leave a better country in their wake. The Presidency is not for the meek. You need to have ambition, a fire burning in your soul, to light the way forward. A truly good presidency will reach for the stars, and beyond."\n\nKubitschek had now gotten in his groove; he would now send his desired message to everyone that would hear this speech. "When I took the mantle of the Brazilian Presidency did I sit around? No! I built Brasília. I reformed and rebuilt our backward healthcare, industries, and education. I swore fifty years of progress in five, and I achieved that! I swear from these achievements, these ambitions, my presidency will be remembered as one of the greatest of all time. Perhaps even the greatest!"\n\nThe audience was stirred up now, with people whispering eagerly to each other. "Through my work I shall go down in history as the greatest President of Brazil. And my next term will hammer this in all the more!"\n\nAt this the crowd erupted."
 brazil.329.a: "Kubitschek shall seize the day once again."

 brazil.330.t: "A Report on Spiders"
 brazil.330.desc: "Lacerda looked up from the document that he was reviewing, and saw his secretary, Esther. He gestured for her to come in, but she interjected. "I have an update for you regarding the raid you had ordered on that organization earlier. A member of the Guanabara police is outside and wishes to speak with you regarding this matter." Lacerda immediately got out of his chair with the excitement of a young boy on Christmas.\n\n"Of course, Esther. Please, let the good gentleman in immediately." Lacerda rushed to get two glasses from his cabinet and a bottle of imported American whiskey. Just as he set down the glasses, Officer Fontes came into Lacerda's office, and reached out to Lacerda for a firm handshake. "Governor, good to see you. My name is Sergeant Fontes of the Guanabara police, and I just wanted to give you a quick update on that raid you had ordered earlier on that illegal organization."\n\nLacerda made sure to pour the good sergeant a full glass of the whiskey, and poured himself one as well. "Yes, yes. Have the ringleaders all been apprehended?" Lacerda questioned, while offering one of the glasses to Fontes. Fontes politely raised a hand to refuse, and continued, "Well Governor, I'm sure you'll be glad to hear that we've apprehended and charged 12 individuals with meeting illegally and discussing extreme ideologies. I've spoken to the public attorney regarding this lot; he thinks that they're going to be in prison for a noticeable amount of time. He'll be throwing the book at these Nazi scum, of course."\n\nLacerda could not believe his ears. This was everything he had asked for and more. "And the public, Sergeant. How have they been reacting to this great success?"\n\nFontes tugged at his collar slightly, before responding, "Well, Governor, to be honest, we've all been busy following the Lobster War. That's really been the talk of the town in the precinct and on the streets. We didn't even prepare a press release for this raid, given how low profile we thought it was."\n\n"This will not do, Sergeant! I must recommend for your precinct to release a statement on this victory we have achieved over the Nazi scourge. Quick, you must be going back to precinct now to rectify this error, no?" Fontes sheepishly stood up and saluted Lacerda before hurriedly leaving the office."
 brazil.330.a: "A second glass of whiskey is ample reward for the successful capture of fascist snakes."

 brazil.331.t: "An Intolerable Mistake"
 brazil.331.desc: "Breaking news out of Guanabara province today, as Governor Carlos Lacerda dismissed his Secretary of Security just an hour ago. Sources close to the governor report his increasing anger with the secretary regarding the death of multiple homeless men who have washed up on a beach in Rio with seemingly little explanation. Detectives are currently treating the case as a homicide, though there are no suspects or people of interest in custody currently. The secretary's inability to solve this particular case has drawn Lacerda's ire, though no one truly knows why.\n\nIt is not uncommon for murders to go unsolved in Brazil's largest city, but it appears as if Governor Lacerda is focused on improving the murder clearance rate. When asked about the sudden firing of the Secretary of Security, Lacerda refused to comment on the firing but mentioned that "the faithful servants of Guanabara will ensure that justice is brought to our fellow countrymen", and emphasized that "Guanabara is for all of our brothers and sisters, poor or rich". Paperwork on behalf of the governor's office today was filed, detailing the creation of an independent investigation and committee to assist the detectives in solving this particular murder, but political analysts expect it to stick around to try and improve Rio's abysmal murder clearance rate and train both patrol officers and detectives to cut down on violent crime.\n\nGovernor Lacerda has been praised by many for his efforts to improve Rio's plumbing systems and ensuring that all citizens have access to clean water. He is significantly more controversial regarding his decisions on public housing and "clearing" space for projects, while evicting thousands of residents. Regardless, few critics have criticized Lacerda's recent efforts regarding violent crime in the city, though some are skeptical about its success. Only time will tell whether or not Governor Lacerda's efforts to bridge the gap between Rio's poor and rich will yield any fruit.\n\nIf you have any tips or information regarding the death of the homeless men, please call Guanabara police. There is an 8000 cruzeiro reward for any information."
 brazil.331.a: "Those who prey on the weak are the greatest cowards."

 brazil.332.t: "The Crow and the Stand-In"
 brazil.332.desc: "When Carlos Lacerda met with his American opposite number, President John McCormack, he could tell very clearly that the poor man was struggling with governing, and he sympathized.\n\nHe knew quite well what had happened. Nixon had humiliated himself out of office, then Kennedy - poor, decent man, what potential he had! - had been slaughtered by a Guyanese terrorist who was probably in the pay of the Nazi or Italian bastards for all Lacerda knew. Then this poor sod, who had been Speaker of the House of Representatives for mere months, was forced into the chair occupied by his two predecessors.\n\nWell, there was only so much that the President of Brazil could do. Lacerda knew that, and resolved to do it as soon as they got down to brass tacks. "Mister McCormack, if there is any way the Republic of Brazil can be of service to you or to the United States of America - particularly in South Africa - you need only ask, and we are more than willing to help you."\n\nMcCormack nodded wearily and smiled in genuine thanks. "Thank you, Mister Lacerda, that is a great help. God knows I and the United States need all the help we can get right now."\n\nAt this Lacerda himself smiled. "It is not a problem."\n\nAfter that, Lacerda and McCormack talked about other, less intensive things. The two Presidents found that they got on well; they engaged in small talk well into the evening. When they parted, McCormack told Lacerda he was glad to have had a conversation that was not a matter of life or death for once.\n\nThe two would remain in touch for years thereafter."
 brazil.332.a: "The start of something good?"

 brazil.333.t: "The Crow and the Man From Dixie"
 brazil.333.desc: "When Carlos Lacerda met with his American opposite number, President George Corley Wallace, he was manifestly unimpressed. This made sense, since Lacerda abhorred racism, while Wallace was addicted to it the same way that good-for-nothing Getúlio Vargas was to eating two lunches and three dinners a day. At least Vargas wasn't usually a racial bigot, unlike Lacerda's present interlocutor.\n\nLacerda's disapproval seeped through frequently during the discussion, which was tense most of the time. The only times the two agreed wholeheartedly on something were in the cases of trade - opening more trade between Brazil and America struck them both as a good deal, provided that neither country's interests were violated - and joining the Organization of Free Nations, since even a conservative like Wallace knew the value of the OFN and was pledged to support it. But these successful discussions were at times overshadowed by the sheer number of things the two Presidents disagreed on.\n\nAt the end of the discussion, Lacerda offered a word of advice. "Before I continue, Mr. Wallace, I'd like to offer you a bit of personal advice. None of what I am about to say is on my people's behalf."\n\nWallace stiffened. He could guess what Lacerda was going to say. "Go ahead, Mr. Lacerda."\n\n"Sir, your nation has made significant progress in the past few years on how it treats people who aren't white, and it has only benefited America to do so. I'd advise you to avoid the urge towards radical changes overturning the last administrations' legislation in that direction."\n\nIt was as Wallace had suspected, and it made him angry. To his credit, he waited until after Lacerda had left to fly into a rage at Lacerda's 'presumption'. But he had not accounted for the fact that Lacerda had sources able to tell him just what he ended up saying.\n\nWhen Lacerda read the report, he laughed. It was the only thing he could do to distract himself from his worries about what "that bigot in the White House" might do to America."
 brazil.333.a: "Not the best of starts."

 brazil.334.t: "The Crow and LBJ"
 brazil.334.desc: "When Carlos Lacerda met with his American opposite number, President Lyndon Baines Johnson, the two got along more or less, though Lacerda found that Johnson's Great Society theory was altogether too reminiscent of Getulism for his taste (not that he'd say that and run the risk of making himself look obsessed). Most of their conversation was about foreign policy; Johnson would try to push the envelope a bit further, and Lacerda would try and keep it from going too far.\n\n"Mister Lacerda, I'm really grateful that you want to deepen Brazil's cooperation with the Organization of Free Nations, and I'm really impressed by the work Brazilian boys have done fighting side by side with us on the South African Front. But the cause of freedom can't be served by just fighting on the same side in one war. Can the United States rely on Brazil to make a firm commitment to aiding us in future conflicts on foreign soil?"\n\nLacerda made a noncommittal noise. "Well, Mr. President, I'll have to say "yes and no" to that. If it's dealing with the Nazi colonists in Africa I'll back you to the hilt. If you see the need to deal with fascists and communists in South America I might be able to arrange something. But other future conflicts will be more difficult, I fear."\n\nJohnson nodded slowly. "I understand."\n\nFor a brief moment, he considered trying to intimidate Lacerda, but decided against it. Lacerda was enthusiastic about serving freedom, after all, and it wouldn't do to dampen such things. Besides, from what Johnson had heard of Lacerda and the other possible presidential candidates in those Hundred Days of theirs, he didn't think any of them - even that one pinko Gullet or Gully or whatever he was called - would break under his blustering. So he settled for moving the discussion on to other matters."
 brazil.334.a: "When asked, the two reported that they were satisfied with the meeting."

 brazil.335.t: "The Crow and the Voice of Reason"
 brazil.335.desc: "When Carlos Lacerda met with his American opposite number, President Wallace F. Bennett, they hit it off immediately and were on a first-name basis within some minutes. This made sense since they shared goals on using the market to strengthen their economies and joining hands in the Organization of Free Nations.\n\nThe discussion was long-reaching and changed topics relatively quickly, since the two of them were struggling to find areas on which they disagreed. On the matter of reducing mutual trade barriers, they found themselves in complete agreement, reaching a formal accord on the matter within minutes. On the matter of Brazil's joining the OFN, Bennett offered to push for Brazil's membership as soon as possible, to which Lacerda enthusiastically agreed.\n\nAfter they had exhausted every possible avenue of discussion and reached some form of agreement on everything, they went on to small talk, which continued for a good while.\n\nThe two of them felt that they had developed a good working relationship with one another, and were on track to push Brazil and the United States closer together than ever before.\n\nAt last it was time for the two to part ways for the day, and Bennett asked one last question as he reached out to shake Lacerda's hand. "Carlos, can America and Brazil expect to see more of each other under your administration? Will you keep on integrating your country with the Organization of Free Nations?"\n\nLacerda smiled widely and nodded. "Most certainly, Wallace, one hundred percent."\n\nThat was the start of a friendship that lasted for decades."
 brazil.335.a: "The start of something good."

 brazil.336.t: "The Crow and the Reformer"
 brazil.336.desc: "When Carlos Lacerda met with his American opposite number, President Robert Francis Kennedy, he was not sure what to make of the slain JFK's younger brother. True, they got on when discussing foreign policy - Kennedy shared Lacerda's antifascism and zeal for the rights of the average citizen - and they were able to reach fruitful agreements with regard to Brazil's upcoming attempt to join the Organization of Free Nations.\n\nBut aside from that Lacerda, though he respected Kennedy's work ethic and devotion to his country, found himself increasingly uncomfortable with the President of the United States. Lacerda could not place it; it could have been Kennedy's zeal and the way he looked, or it might have been what Lacerda had heard of the man's proposed programs. But he found that some unclear thing in his interactions with Kennedy reminded him of Getúlio Vargas in a bad way.\n\nOn the other hand, Kennedy was unimpressed with his Brazilian opposite number. He had heard concerning rumours about Lacerda's willingness to sweep aside the poor and his political opponents in the name of promoting the welfare of Brazil. Moreover, he found that Lacerda lacked ambition and did not appear to be as devoted to the principles of life, liberty, and the pursuit of happiness as he said he was.\n\nDespite these reservations, the two heads of state remained civil, and reached fruitful agreements that would doubtless lead to further cooperation between Brazil and the United States. But each of them came away feeling that for all that they had been speaking the same English, they had still been talking in entirely different languages."
 brazil.336.a: "A productive meeting, though less than what it could have been."

 brazil.337.t: "Dawn Raid"
 brazil.337.desc: "The sun was hours from rising, and yet the printing machines of the Última Hora were already running in full speed, putting the black ink on the white paper. Their final product, "Coup d'état Against Lott and Quadros", "The Crow Spread His Wings, Governors Lacerda's Gamble Against Democracy", "Only Jango Can Save the Working People" were printed by the hundreds and thousands every minute, loaded on trucks by a legion of packers and delivery drivers ready to distribute it through the whole city. Work was never so hectic such as then- until a loud knock on the door was heard.\n\n"POLICE! OPEN UP!"\n\nSome journalists tried to barricade the door with furniture, others yelled about the illegality of the timing- no raids before 8 in the morning, said the law- but nothing could stop the tide of policemen who entered the press room, smashing the machines with the butt of their rifles. One of them picked up a megaphone to make his announcement.\n\n"This newspaper has been publishing fascist propaganda! It is to be closed down on orders of Governor Carlos Lacerda!"\n\nEditor-in-Chief Samuel Wainer had no choice but to comply.\n\nThe director looked at his workers leaving the building, and the ruins left behind by the raid. "Fascist propaganda... The Crow never changes his tricks." He muttered, lighting a cigarette. Back when when he was young, watching his village burning in Europe, his mother Dora had said to him that "Jews like us can only trust our kind." Samuel never really believed what she said, even with all what happened with them. There are always some people for times like that, he thought as he searched his notebook for a name and a phone number."
 brazil.337.a: "Getúlio Vargas."

 brazil.338.t: "A School for Anne"
 brazil.338.desc: ""-And it is with the deepest honor and gratitude to the people of Rio and the Jewish community that I inaugurate Anne Frank Secondary School."\n\nLacerda cut the ribbon, then turned to put on his smartest grin as he faced the cameras and applause again. He even let out a bow for the press's sake.\n\nHe continued onto his speech, staring hard at the neighboring building - the German Consulate, just opposite from the new school. The Nazi bastards had angrily shut their curtains. Good. He'd make sure they got front-row seats to see Jewish children, alive and well, attending school and living normal lives.\n\n"I stayed up until 5am reading Anne Frank's diary, mere months after it had been first smuggled out of Germany and published around the Free World as an indictment of German atrocities. It is a truly moving document."\n\n"That poor girl had died alone and betrayed, starving and sick, robbed of any dignity she had left."\n\nHe held his head high and stared at the disgusting Nazi flag flying outside the consulate, that had the gall to taint Brazil with its hateful presence.\n\n"The least I can do to avenge her was give her people some of that dignity back! And God willing, I will make sure Brazil protects you, or die in the attempt!"\n\nThe resulting applause could deafen an entire stadium."
 brazil.338.a: "Anne Frank smiles in the afterlife."
 
 brazil.339.t: "An Unlikely Ally"
 brazil.339.desc: "Goulart had already lost track of how many days it had been since the Senado was thrown into chaos. He and his staff had been forced to constantly watch their backs and remained consistently paranoid of the police and potential plainclothes military officers that were rumored to be on patrol for Goulart and the rest of the PTB, and it was clearly taking a toll on his wife, Maria. It was good that he still enjoyed significant popularity throughout the city of Porto Alegre, but Goulart was still immensely nervous for the meeting with Admiral Aragão he was walking into. He just couldn't shake the possibility of an ambush or being kidnapped at that meeting; what if the note had come from someone pretending to be Aragão? Goulart pushed open the door to a poorly lit backroom in the bar, he saw the Admiral sitting at a dusty table with a cigarette in hand. As he approached the table, Admiral Aragão immediately stood out of his seat and went over to give an enthusiastic handshake to the Vice-President of the Republic.\n\n"Jango!" Aragão whispered excitedly, "I didn't think you would end up coming." The admiral cracked a large smile, and Goulart himself felt inspired by the energy Aragão showed.\n\n"Time is short, Aragão, but if you have something to say, it must be important. Bring me the bad news."\n\n"Bad news? Well, I'm sure this whole situation is very nerve wracking for you, but I am here to bring you good news, Jango. Listen. As you know, significant parts of the military are out to get you. But I still know of a couple of people in the armed forces that are sympathetic to your cause. I need you to trust me with something." Aragão said, staring straight into Goulart's eyes.\n\n"What is it, Admiral?" "I need your itinerary during this crisis. My men have boats throughout the coast and helicopters on call at certain bases. If the worst happens and you are caught, my men may be able to rescue you. But we need to know where you are in order to pull something like that off." Goulart thought for just a second. This was surely a massive risk, but there was no clear way into the presidency without taking any. After a second, Goulart smiled back and told Aragão."
 brazil.339.a: ""Of course. Admiral, I owe you a massive debt.""

 brazil.340.t: "The Uniformed Pirate"
 brazil.340.desc: ""Any updates on Costa Aragão?" Castelo Branco glared across the table at the navy officers who were dragged into this meeting. While on land, the coup had gone almost completely according to plan, it seems as if no one in the navy had anticipated one of their own turning against the coup.\n\n"N-no, General. He hasn't responded to any of our hails, and his ships continue to circle off the coast of Guanabara."\n\nCastelo Branco slammed a fist on the table, rattling glasses and sending loose papers into the air. "You are the Brazilian Navy, goddamnit! Board his ships and take this subordinate pirate under control! Are you incapable of even protecting our own people?! Doesn't this man support that communist rat Goulart? How is this not your top priority?"\n\n"We... We're doing everything we can to try and bring him in. We promise that the situation will be resolved shortly!"\n\n"It better! Those traitors are continuing to pillage our own country; I've gotten reports that they've begun to siege the Governor's Palace. If Governor Lacerda dies to those scum, you all will be next. Every day he roams free is another day where he can try to start a civil war to restore the previous failure of a democracy. Am I clear?!" Castelo Branco rudely waved off the navy officers, who immediately took their cue to scurry out of the room. He gave a deep sigh, and then looked over at the large window.\n\nThe sun was setting on the city, and Castelo Branco knew he couldn't trust those useless sailors to do anything. The army was doing its best to fight off the invaders, but they continued to pour in from the sea. Without the navy doing anything, he knew that he was fighting a losing battle. The violence was now spreading to institutions and civilians that had chosen to support the coup, and Castelo Branco knew that he could not continue to tolerate that.\n\nHe picked up the phone and dialed the base at Rio de Janeiro. The call was immediately picked up. "Yes, General?" "I need you to deploy an additional mechanized unit to Rio. I'm sure you've heard the news about our good friend Admiral Aragão? The navy is absolutely useless in dealing with him and it looks like we'll need to pick up the slack if we want to take him down for good.""
 brazil.340.a: ""Of course, General. Whatever you need. We'll get it done.""

 brazil.341.t: "To Appeal For Calm"
 brazil.341.desc: "Carlos Lacerda couldn't help but pace back and forth in the Governor's Palace over the situation that had continued to fester. The police and army units within Guanabara had been woefully ineffective in allaying Lacerda's fears of a potential invasion, and he knew for a fact if any marine tried to break into the palace, he was absolutely not going down without a fight. He picked up the revolver he had "requisitioned" earlier from his security detail and made sure it was loaded and ready to go. He knew that he needed to appear strong, and Lacerda knew exactly what to do. He slid the submachine gun under his jacket and left his office to head upstairs to the radio station.\n\nAs he began to head for the stairway, he heard someone speak up. "Governor Lacerda, shouldn't we shelter for the time being?" Lacerda's secretary, Esther, looked up from her desk with a worried look on her face.\n\n"Worry not Esther, for I am on my way to rally the good people of Brazil against that pirate admiral that is threatening this beautiful city." Esther stood up from her desk, and took a few steps in between Lacerda and the stairs. "Aren't the police and the military on top of things? This might not be a good idea." Lacerda was stunned at Esther's sudden movements, and began to panic. "Esther, this cannot wait. Please move out of my way now."\n\n"Governor, I do not mean to be rude, bu-"\n\n"Esther, this is not up for debate. Move out of the way, or you're fired." Lacerda felt bad about mistreating Esther, but things had devolved to this and he needed to regain control immediately. As he entered the radio room and tuned the frequency, he took a deep breath and began to speak.\n\n"Long live freedom, long live Brazil, long live the honor of Brazil, long live the dignity of Brazil! Admiral Aragão, Admiral Aragão, monstrous murderer, miserable incestuous. Admiral Aragão, don't get close, because I'll kill you with my revolver! Bastard, bandit, traitor, your time has come! Run while there is still time, guarantee impunity. Bandit, killer and commander of innocent soldiers to kill other soldiers to hide their dishonor! You scoundrel!""
 brazil.341.a: "That'll show that traitor."

 brazil.342.t: "The People's Admiral Flees"
 brazil.342.desc: "Humberto de Alencar Castelo Branco sighed with relief and leaned back in his chair as the messenger exited the room. The mechanized unit he had deployed to Rio to deal with the damned traitor Cândido da Costa Aragão had arrived and had driven him off with his traitorous marines. The marines had surrendered to the unit and Aragão himself had sailed out through the Bay of Guanabara into the open ocean. Rio was once again secured and Aragão's pitiful attempt at a coup had been crushed, but there was another nuisance for Castelo Branco to handle: Carlos Lacerda, the Crow of Guanabara.\n\nHe had heard about what Carlos Lacerda had said about Aragão in his effort to play at a general and secure Guanabara before the mechanized unit got there. Though Castelo Branco agreed with the basics of Lacerda's little tirade, namely that Aragão and his ilk were traitors, he had intelligence that indicated that Lacerda really didn't know how close his remarks had driven Brazil to civil war.\n\nRather than risk causing a civil war, Aragão had advised that leftist João Goulart to flee to Uruguay and then join him. So then for Lacerda to run around saying that the traitor admiral was one to 'incite soldiers to kill their brethren' was nonsense (just like so much else that came out of Lacerda's beak). Now Lacerda was spewing more nonsense: he was now claiming that the battle against the "Petebista communists" had been won when in reality Aragão and his connections in the marines were still an ever-present threat.\n\nSighing, Castelo Branco decided to call in Costa e Silva, in the hopes that he or the other hardliners might be able to provide some influence on how to shut a loud bird up for a few months."
 brazil.342.a: "Another Partial Victory."

 brazil.343.t: "The Illusion of Freedom"
 brazil.343.desc: "Ney Braga's office had never been so cluttered; papers were strewn about all over the floor, bookshelves were rummaged through and not put back together, and some rascal had gone about and stolen all of his pens.\n\nHowever, he cared little for this mess and was slumped in his chair in deep thought. Was it really true that the military was only here to take power temporarily? Democracy would really be restored after a transitional period? Braga had his doubts about the entire premise. After all, many of his friends within all of the political parties had been imprisoned, and he heard rumors of the coup even targeting civilians that were supportive of the former republic.\n\nBut, Braga knew that there were plenty of radicals throughout Brazil that were looking to sabotage his home country. Perhaps it was for the better that the military had taken control for the time being. Besides, they had promised to avoid the old Estado Novo days and restore democracy within the year.\n\nEven if times were turbulent now, the military would set things straight and then hand power back to a democracy. It might be a controlled one, but it would be better than what Brazil had before.\n\nNey Braga was not alone in this thought. Governors across Brazil, whether they secretly supported the coup themselves, or simply supported it out of fear of being replaced and imprisoned, slowly began to come to the collective realization that the action the military had undertaken was justified. Yes, the whole situation had been unnecessarily messy, and yes, perhaps they were cracking down a little too harshly on the PTB, but there was no evidence that the military would refuse to listen to them. Maybe they could even cash in on a little bit of goodwill if they publicly supported the military and encouraged their former constituents to support the new state.\n\nNot everyone would approve of this, but most governors saw it as no more than just standard politicking. There was a new sheriff in town, and it wouldn't hurt to extend a warm welcome to them so long as they could remain in power."
 brazil.343.a: "One by one, the sheep fall in line."

 brazil.344.t: "The Squabblers of the Round Table"
 brazil.344.desc: "Members of the UDN were gathered in a conference room to discuss future policies and electoral strategies. Heavyweights such as President Quadros and Governor Lacerda were present, and the tension in the room was high. Ever since Lott's presidency, Quadros and Lacerda seemed more keen on combatting each other's influence in the party, rather than focusing on ideas that would help with passing legislation or ensuring a gain of seats in the next election.\n\nLacerda especially had been sitting silent for the past two hours, listening to ideas that were downright crazy in his mind. Allowing Christian labor unions? In his mind, the UDN had gone mad following their new prophet Quadros, and it was only up to Lacerda to stem this tide of debauchery.\n\n"Thank you, Senator. Now the Governor of Guanabara, Carlos Lacerda, has the floor."\n\n"Thank you, speaker. I'd like to start off by saying that there has been plenty of good discussion regarding the future of Brazil tonight, but I would like to offer a counterpoint. Rather than daydreaming about what could happen, the UDN should be focused on what needs to happen. We are all painfully aware of the bloated state that our budget is currently in. Getting our spending in control is something we must prioritize now. I implore everyone here to begin thinking about how exactly Brazil can look to reduc-"\n\n"Carlos! There you go again with your random hogwash about cutting the budget!" Quadros had gotten out of his chair and pointed a finger towards Lacerda. "I'm sick and tired of hearing this nonsense about the budget or whatever the hell you are talking about. The people of Brazil need us more than ever, and here you are wasting everyone's time. We need to be innovative and explore new ideas and policies to better Brazil!"\n\nLacerda fired back, shouting: "Why don't you propose one then, Mr. President?"\n\n"How about banning all card games to restore Brazil's moral dignity?" countered Quadros.\n\n"That is laughably unfeasible. This is seriously your best idea, Jânio? This is an insult to the party!" cried Lacerda, before pushing open the doors to the conference room and storming out."
 brazil.344.a: "Half the room waved goodbye, while the other half sat awkwardly in silence."

 brazil.345.t: "The Veto"
 brazil.345.desc: "Jânio Quadros had fallen from power after Carlos Lacerda and Auro de Moura Andrade successfully submitted the letter of resignation that Quadros had drafted and passed it off as the real deal. But the matter was not yet over; Andrade had to make sure that that communist bastard Goulart would not take over in Quadros' absence.\n\nFortunately, the people that had called him to meet with them sympathized with his plight. Andrade was at a meeting with the Joint Chiefs of Staff of the Brazilian armed forces, with Marshal Odílio Denys speaking for the army, Vice-Admiral Sílvio Heck for the navy, and Brigadier Gabriel Grün Moss for the air force.\n\nDenys started it out. "Now, Lott might have worked with Goulart, and quite frequently at that. But we of the rest of the military, those relatively unpolluted by socialist communism, don't share Lott's delusional thought that we can work with the Petebista imbeciles."\n\nAt that, Heck repeatedly slammed the table in approval while Grün Moss carried on the argument.\n\n"Look at what socialism brought that idiot Bukharin when he went to war with the Nazis after stabbing those poor Poles and Balts in the back! All it did was get him pushed back to Arkhangelsk, and a whole lot of Nazi colonies made at his expense!"\n\nAs the assembled soldiers shouted their approval, Sílvio Heck at last concluded. "We soldiers won't let Brazil be destroyed by the far-left. Nor will we let this country of ours fall behind against the Argentines! Let me be clear, sir: we're vetoing Goulart's candidacy!"\n\nAfter some more loud shouts and cheers, Auro called for silence. "Gentlemen, I see now that I am clearly among friends here. I am resolved: I will enforce the veto. The Presidency of the Republic will remain vacant until a better candidate is found.""
 brazil.345.a: "At that the soldiers cheered so loudly that Auro had to stick his thumbs in his ears."

 brazil.346.t: "A Split in the Military"
 brazil.346.desc: "With the veto announced by the Speaker of the Senate, Auro de Moura Andrade, and the official position of the military in support of Andrade's argument, the military high command and their civilian associates thought it would be easy to keep João Goulart from power. Unfortunately for them, it really was not, and the various leaders of the coup faction could only put their heads in their hands as more and more bad news came in.\n\nReports came in from the south - from the socialist bulwark of Rio Grande do Sul and elsewhere - of defiance by General José Machado Lopes and Admiral Cândido da Costa Aragão joined by the Governor of Rio Grande do Sul, Leonel Brizola. These socialists, far from bending over, had instead joined hands with various constitutionalists and managed to galvanize large portions of the military in the south to support João Goulart, the legal candidate. Worse yet, the military could do nothing against this: while the anti-Goulart faction was more powerful, it was spread out relative to those who favored Goulart.\n\nThis compounded by the fact that major figures such as Marshal Humberto de Alencar Castelo Branco had yet to choose a side meant that the military was unable to plan its desired coup, for fear that it would lead to a civil war. Instead the military decided to play for time - just a bit over a hundred days to ensure sufficient military strength to suppress the southern threat and avoid a civil war.\n\nAndrade, knowing this, decided to have the Senado Federal deliberate as long as possible to elect the next President, so as to make sure the military could prepare to deal with those of its members that had sided with Brizola and his ilk."
 brazil.346.a: "It was in support of this plan that Sílvio Frota walked into the Senado that day."

 brazil.347.t: "The Campaign of Legality Forms"
 brazil.347.desc: "It was all over the papers in Porto Alegre, and Governor Leonel Brizola of Rio Grande do Sul would have it no other way. Brizola and other members of the PTB had began their counterattack against the bastard Auro Andrade and the assorted wannabe Napoleons of the Brazilian military.\n\nThis counterattack was to take the form of a campaign - the "Campaign of Legality", which demanded that the Senado Federal honour the constitutional prescription and ensure João Goulart and no-one else would be elected President of Brazil. It would be relatively simple - launching strikes, media campaigns, and large protests with a view on paralyzing places like Guanabara, the traitorous Crow's home province.\n\nGranted, there was a risk of Lacerda and his ilk simply ordering that any protests be violently cleared. After all, if he was one to kill the homeless poor in a manner that would please the Nazis and the fascists, how much worse would he treat dissenters? But that risk was all worth it. (Even so, Brizola made a note to make sure to warn his supporters of the risks.)\n\nIt was right and proper, what they were doing - after all, it was a choice between the defense of the legacy of President Vargas and of democracy in Brazil and the prostration of Brazil to a whole lot of generals little improved upon Nazis.\n\nWith that in mind, Brizola picked up the phone and started making calls."
 brazil.347.a: ""Get me Governor Mauro Borges of Goiás.""

 brazil.348.t: "Strengthening of the Hardliners"
 brazil.348.desc: "Ninety days had passed since the ultimatum of Sílvio Frota in the Congresso Nacional, and the Senado Federal had yet to come up with a successor to Lott and Quadros. The military was, as one might expect, beginning to become impatient. General Peri Constant Bevilacqua, deeply concerned by what he had heard was happening, telegraphed Goulart and Kubitschek with the news.\n\nPERI CONSTANT BEVILACQUA RECIFE\n\nTO JUSCELINO KUBITSCHEK BRASÍLIA AND JOÃO GOULART PORTO ALEGRE\n\nCONCERNING DEVELOPMENTS OUT OF THE MILITARY IN RECENT DAYS STOP MEMBERS OF SORBONNE FACTION SUCH AS CASTELO BRANCO HAVE BEGAN TO SUPPORT THE HARDLINERS OF COSTA E SILVA THAT WANT TO OVERTHROW THE GOVERNMENT STOP CASTELO BRANCO HAS APPARENTLY REACHED AN AGREEMENT WITH THE HARDLINERS STOP ALLEGED AGREEMENT IS AS FOLLOWS\n\nONE THAT CASTELO BRANCO IS SWORN IN AS PRESIDENT\n\nTWO THAT ELECTIONS BE DELAYED WITH PTB OUTLAWED UDN AND LACERDA SUPPORTED\n\nTHIS IS NO DOUBT CONCERNING TO YOU BOTH STOP IT UNDERLINES THAT DECISIVE ACTION MUST BE TAKEN STOP IF CRISIS NOT HANDLED SOON MILITARY WILL BE SUFFICIENTLY CONSOLIDATED WHERE THEY WILL BE ABLE TO LAUNCH A COUP AND TAKE CONTROL STOP AT THAT POINT I AM SERIOUSLY DOUBTFUL THAT I OR MY CONSTITUTIONALISTS WILL BE ABLE TO DEFEND AGAINST THEM STOP IF WE CAN FIND A LEADER OF ANY KIND IN THE NEXT TEN DAYS THE COUP MAY YET BE STOPPED STOP FOR THAT REASON I BEG YOUR EXCELLENCIES TO TAKE ANY AND ALL APPROPRIATE ACTION\n\nBEVILACQUA"
 brazil.348.a: "It is getting serious then."

 brazil.349.t: "The Bull's Proposal"
 brazil.349.desc: "As Adhemar de Barros entered the meeting room, he saw Leonel Brizola and Edna Lott working diligently on plans to ensure that Goulart would be the victor of the 100 Days Crisis. Of course, once he approached the table, the two made sure to hide whatever they were working on.\n\n"Relax, you two," said de Barros. "'I'm here to help you all." Brizola raised an eyebrow and crossed his arms, before saying, "A likely story, de Barros. Can we get this over with? Edna and I are rather busy, as I'm sure you are too."\n\n"Of course, Leonel. I'll get straight to the point. I'm backing your campaign of legality, and I will ensure that my supporters back Jango when the time comes."\n\nLott and Brizola's faces were struck with shock, before turning back into scowls. "And what do you want from us? With you, I'm certain there's a price tag involved." responded Edna. Brizola kept a more neutral face as he thought on what Adhemar stated, "Relax Edna, the man is clearly here to help. Adhemar, we can work out the details later once Jango is the President, no?"\n\nAdhemar gave a wry smile and turned to leave the room. "Of course, sure. We are in a bit of a crisis ourselves, and we need to prioritize beating out the military and that rat Lacerda." As he grabbed the handle of the door, he looked back, and said in a calm voice.\n\n"Oh, about that price tag. If you want my support, I expect to be Jango's internal minister. I'm not negotiating on that. If I hear nothing from you within the week, I will assume that the position is reserved for me and I will declare my support for Goulart. Anyways, you know where to find me. I'll be seeing you two around."\n\nAs Adhemar left there was an unnervingly long silence before Lott finally decided to break it. "What are we supposed to do with that? Is getting Jango to be President really worth it if we have a snake within our midst?" Brizola had a sinking feeling in his stomach. This was clearly a trap, no doubt about it. It wasn't his or Edna's place to be making decisions about Goulart's cabinet now. "The situation is bad, Edna. We might need his support, whether we like it or not. If Jango is willing to trust us to form his cabinet, we'll need to make a decision now about this.""
 brazil.349.a: ""Adhemar can simply not be trusted.""
 brazil.349.b: ""We have no choice. Tell Adhemar he will have his cabinet position.""

 brazil.350.t: "The Bull Behind Them"
 brazil.350.desc: "The vigor-filled voice of Adhemar Pereira de Barros, Governor of São Paulo, sounded through the radios of Brazil from a radio station in Brasília. It signaled a sea change in the Hundred Days' Crisis.\n\n"People of São Paulo - nay, of the whole of Brazil!\n\nBy the will of God and of Nossa Senhora Aparecida, the most excellent João Goulart was the rightful successor to the Presidency of the Republic in the aftermath of the disastrous fall of Marshal Lott and the fool Quadros.\n\nHowever, certain misguided individuals in this country, fancying themselves to be better arbiters of our country's future than the people of Brazil, presume to set up an illegitimate, falsely elected usurper in their place. I urge all Brazilians of goodwill to support the Campaign of Legality to prevent this from taking place - otherwise our democracy will fail and freedom will be lost to us forevermore!"\n\nAs the poll numbers both in the Congresso Nacional and outside of it began to break towards Goulart and the PTB, various reactions were observed. In military barracks and the offices of Guanabara, glasses and other implements were thrown on the ground in rage. Carlos Lacerda, in particular, was incandescent with anger over Adhemar's betrayal. He wrote an editorial denouncing it the next day, but to his horror, that issue of the newspaper simply did not sell. Juscelino Kubitschek, too, cursed the scuppering of his own chances.\n\nOn the other hand, in a room in Edna Lott's home, Leonel Brizola, Edna Lott, and João Goulart sat back at dinner and clinked glasses with their new ally, his lieutenant, Laudo Natel, and Getúlio Vargas Filho. Natel later noted that the Varguists seemed relieved that this crisis seemed to have been averted."
 brazil.350.a: "Adhemar smiled as one of his many plans came to fruition."

 brazil.351.t: "Tell Me How"
 brazil.351.desc: "Lott's brows furrowed like ice-flecked trenches as he murmured to the marshal on the other end of the line, "Why in God's fucking name did you veto our ally, Denys?"\n\nThe reply came hoarsely, ponderously. "If communists make such good allies then why don't you haul Bukharin from his grave? He'd be happy to bury another country! We're lucky that there's still one Brazil, any longer under Goulart and it'd shatter into twenty."\n\n"Throw your life away, then! We've spent our whole careers fighting for a constitution and you just ruined it all. Do you have any idea how you're going to restore at least some of the good we've done?"\n\n"I'm listening. Please, tell me how."\n\nLott clutched the telephone by its grey-steel face. His palm covered his teeth - shifting whetstones grit together. "Withdraw your veto and support Goulart, who was elected President according to our Constitution. The one you fought for."\n\nA brief silence, and then, "I'm listening."\n\n"Look, if you're worried about communists, you'll galvanize the entire left by going through with this. It won't end there. Any Integralist left in the military will look at this and see the greatest opportunity they've ever had to wrench this country the way of Italy, and it'll be because of you."\n\n"I'm listening."\n\nLott slammed the handset on the receiver and a curt ring resounded in his house. He listened attentively to the silence."
 brazil.351.a: "To ruin my life's work like that..."

 brazil.352.t: "A Speech Cut Short"
 brazil.352.desc: ""You called him a socialist in the article. Are you sure that's what the officers want to hear?"\n\n"What's most important is that Goulart gets support. It's what he is, and not calling him that isn't going to fool them into thinking that he isn't one. Could you please put me live?"\n\nHe nodded and flicked a switch downwards. Lott brought his face to the microphone and waited for the host's fingers to drop. Even outside his booth, the station was silent; only Lott and the host remained. Lott was anxious, and constantly thinking of the running sedan outside. The count hit one, and he cleared his throat.\n\n"People of Brazil, I am Henrique Teixeira Lott, former President of the Republic and Commander-in-Chief of the Brazilian Armed Forces. I speak, today, united with you all as a victim of a new tyranny in an old and familiar attire, and I say that Lacerda's ranks of suited military men should not govern the Republic in your name. João Goulart, regardless of the ideological differences between him and I, is the rightful, elected President of Brazil. Your Brazil. Our nation is in danger, and if we are ever to speak or vote our minds again without a man with a rifle watching over us, we must all resist this newest face of tyranny. Failing this, our nation-"\n\nThe lights cut out, and the radio with it. The booth, and the studio adjacent, were lit only by the harsh red glow of buzzing LED lamps. Quicker than he had ever thought he could, Lott flung himself into the driver's seat of his weary beige sedan and drove for home."
 brazil.352.a: "Couldn't stop them from hearing some of it, Lacerda."

 brazil.353.t: "Locked In"
 brazil.353.desc: "No luck and no reply. The lazy ringing of the handset, the murmurings outside his house, Denys would not answer. Lott mouthed a curse and cocked the dial. Edna could help. She couldn't haul the APCs off the street but she could arrange for some food to wait out the siege. He would be arrested, he knew that, but they wouldn't harm him for it. Not one of the soldiers outside had held his rank, he had let them know that, and it would take time to coax the new Commander-in-Chief from his stolen palace. Lott still had a say.\n\nThe line crackled to life against an ambient buzz. "Hello, Edna."\n\n"Are you alright, father?"\n\n"I'm uninjured, but my words have caught up with me and Lacerda's men are outside of my house. Are you able to spare food and water?"\n\n"I'll get you food."\n\n"How are you going to do it without putting yourself in danger?"\n\n"Well, if they're listening to us, you wouldn't want them to know."\n\nFor a moment, Lott receded into his thoughts. Damn Lacerda and the military and the turncoat soldiers. Damn the rags of cobalt cigarette smoke wafting through his window, but bless her, his brave daughter. Bless her."
 brazil.353.a: ""I'm so proud of you, Edna.""

 brazil.354.t: "Borges Declares For Goulart"
 brazil.354.desc: "As the Campaign of Legality continued, more and more manifestations of support cascaded in from across Brazil. One of the most important instances of these was that of Mauro Borges, Governor of Goiás. From the planned city capital of Goiânia, Borges made a public speech amidst the applause of PSD-PTB grandees and the local population.\n\n"People of Goiás and of Brazil: you all know me. As God is my witness, I am not and never have been a communist. I am not so foolhardy as to close my eyes and ears to the terrible evidence provided by the fall of Russia to the fascist hordes.\n\nBut let me be clear - if succession does not occur in a manner respecting the Constitution, if my esteemed colleague Senhor João Goulart does not succeed to the Presidency, then the State of Goiás and its people will most willingly fight tooth and nail to defend the national order."\n\nThe speech was publicly released; however, it was very rapidly censored in the press outside of Goiânia, replaced with press attacks by Carlos Lacerda.\n\nBut the military under Odílio Denys remained concerned; the opposition of a state as prominent as Goiás could prove a significant problem for their plans."
 brazil.354.a: "Their fears proved justified."

 brazil.355.t: "Standoff in Goiás"
 brazil.355.desc: "FROM: AMEMBASSY BRASÍLIA\n\nTO: DCI, SECSTATE\n\nSUBJECT: STANDOFF IN GOIÁS\n\nEYES ONLY DCI, SECSTATE\n\n1. FEARS OF MILITARY UNDER MARSHAL ODÍLIO DENYS REGARDING PLANS OF GOIÁS GOVERNOR MAURO BORGES AND THE VARGUIST-DOMINATED MILITARY IN THAT AREA HAVE COME TRUE TODAY DUE TO LEAKS OF MILITARY PLANS ALMOST CERTAINLY AUTHORIZED BY BORGES HIMSELF.\n\n2. MILITARY DEPLOYMENTS IN THE AREA HAVE SUBORDINATED THEMSELVES TO THE STATE OF GOIÁS AND TO A BOARD OF CHIEFS OF STAFF CHAIRED BY BORGES AND HEADQUARTERED IN GOIÂNIA. TROOPS SWORN TO GOIÁS HAVE GONE TO THE BORDER WITH THE FEDERAL DISTRICT OF BRASÍLIA AND ARE NOW IN A STANDOFF WITH THE GUARDS, WHO HAIL FROM BATTALIONS OF THE MILITARY LOYAL TO THE CHIEFS OF STAFF IN BRASÍLIA. TANKS FACE TANKS, SOLDIERS FACE SOLDIERS. I HAVE NO REPORT OF SHOTS BEING FIRED AT THIS TIME; HOWEVER, I HAVE IT ON VERY GOOD AUTHORITY THAT THE SITUATION IS TENSE.\n\n3. THE TENSENESS OF THE SITUATION IS WORSENED BY OTHER REPORTS THAT MAURO BORGES HAS FORTIFIED HIS CAPITAL CITY OF GOIÂNIA AND OTHER MAJOR SETTLEMENTS IN THE STATE OUT OF FEAR OF A FEDERAL INTERVENTION. BARRICADES - NOT MAKESHIFT ONES, BUT ONES CONFORMING TO MILITARY STANDARDS - AND MACHINE GUN EMPLACEMENTS HAVE BEEN INSTALLED IN STRATEGIC LOCATIONS THROUGHOUT GOIÁS.\n\n4. FURTHER INFORMATION WILL BE PROVIDED AS THE SITUATION CHANGES.\n\nGORDON"
 brazil.355.a: "Borges makes his stand."

 brazil.356.t: "GOULART CLEAR MAJORITY"
 brazil.356.desc: "On a Tuesday, the Brazilian Institute of Public Opinion and Statistics released a poll documenting the popular response to Lacerda's coup. It read that ninety-one percent of Brazilians favored Goulart's inauguration, with only nine percent in opposition. When allowed to select a rival candidate for inauguration instead, seventy-one percent still favored Goulart.\n\nOn a Wednesday, stone-faced men in green fatigues shut a printing press in Guanabara and sent its workers home. The building's supervisor, a flushed, worn socialist in his twilight sixties, secreted the offset cylinder to his house and taped it to the inside of an air vent, hoping that it would never become an artifact of his career.\n\nOn a Thursday, those stone-faced men in green fatigues scoured the streets of Brazil for every copy of the Institute's poll, and by the day's end, smoldering integers and fractions hung over the favelas like the breath of a paternal giant.\n\nOn a Friday, a few young students asked the staff at a newspaper stand for a copy of that poll, and they were all told no, they had never had any."
 brazil.356.a: "Public opinion is clear."

 brazil.357.t: "Goiás Pacified"
 brazil.357.desc: "FROM: AMEMBASSY BRASÍLIA\nTO: DCI, SECSTATE\nSUBJECT: PACIFICATION OF GOIÁS\nEYES ONLY DCI, SECSTATE\n\n1. IN THE AFTERMATH OF THE BRAZILIAN MILITARY OPERATION TO PRESERVE STABILITY IN BRAZIL, GOIÁS GOVERNOR MAURO BORGES AND THE VARGUIST-DOMINATED MILITARY HAVE BEEN COMPLETELY NEUTRALIZED BY LOYALIST FORCES.\n\n2. THE STATE, HAVING BEEN SURROUNDED ON ALL SIDES, COULD NOT HOPE TO HOLD OUT; ACCORDINGLY, IT FELL QUICKLY AND THE GOVERNOR WAS CAPTURED. THE HARDLINE FACTION OF THE MILITARY UNDER COSTA E SILVA WANTED TO SEE HIM TORTURED AND KILLED; HOWEVER, PRESIDENT CASTELO BRANCO PERSONALLY INTERVENED TO ENSURE THAT HE WAS MERELY UNSEATED AND DISENFRANCHISED. I SUPPORTED THIS DECISION.\n\n3. THE MILITARY, HAVING TAKEN COMPLETE CONTROL OF THE STATE, HAS INSTITUTED MARTIAL LAW AS IN MUCH OF THE REST OF BRAZIL.\n\n4. FURTHER CHANGES IN THE SITUATION ARE UNLIKELY; NONETHELESS, I WILL KEEP ABREAST OF IT TO THE BEST OF MY ABILITY.\n\nGORDON"
 brazil.357.a: "Sic transit..."

 brazil.358.t: "Denys and Goulart"
 brazil.358.desc: "In a cafe in Brasília, a retired officer coming in from the countryside around Curitiba and an economist connected to the President of Brazil sat down for lunch. Their conversation turned at once to the latest political gossip.\n\n"Did you hear about the situation with Goulart and Denys, Ney?"\n\nNey shook his head. "Why, what happened, Fernando?"\n\n"Well, the meeting was tense and no mistake. Of course you know that Goulart can't very well remove the Chiefs of Staff, though he can definitely sideline them."\n\n"Well, did he threaten to do that?"\n\n"Not openly. They spoke of working together for the future of Brazil. But the meeting was tense, and it was clear they really didn't like each other."\n\nNey Aminthas de Barros Braga, retired major in the army and current moderate conservative Governor of Paraná, nodded slowly. "I see. Well, it's in God's hands - and those of Senhor Goulart. I understand and sympathize with his concern for the lower classes, and I'd do a lot of what he proposes myself if I were President. But I pray he doesn't go too far to the left, lest he split our country and give the military a reason to intervene."\n\nFernando Ferrari, a staunch Varguist but also a Christian democrat and the leader of the most conservative faction of the PTB or of Varguism more generally, nodded his agreement."
 brazil.358.a: ""God willing he'll keep it reasonable.""

 brazil.359.t: "Salgado Returns to Brazil"
 brazil.359.desc: "The shouts almost suffocated the thrumming of the jet engines. Cries of "Anauê! Anauê!" chorused with Integralists' chatter on a sunny northern morning where a cool wind clung to the sod and mist rolled in. Rags of white sashayed through the air and scattered in flechette plumes by the staggering fanjets, and Plínio Salgado stepped into Brazil for the first time in over a decade. Each step was broad and lingering and Salgado could only smile. What other tiny blessings have gone forgotten, that others live every day? What blessings aren't blessings at all?\n\nThe throng saluted there in a rank of green and blue; Salgado waved and saluted and shouted, "Anauê!" Familiar lieutenants with wizened faces shook his hand beside new Integralists with whom he'd only shared letters. All of them were rugged, all with tramping polished jackboots that slammed into the concrete. Salgado sifted through the lines and shut the rear door of the white sedan with a tired arm and rolled the window down and waved once more. As he left, a beige Ford followed after.\n\nThe FBI special agent at the wheel flicked away the errant crumbs from his partner's sandwich. He ate noisily, his partner, and the driver figured for a moment he could do without that piggish champing.\n\n"I never asked," he said, "but what does 'Anauê' mean?"\n\nHis partner slowly finished chewing and set the nearly eaten sandwich back in its wrapper. "It's a Tupi word, living people but a nearly dead language. And I guess there are fewer Tupi who speak Tupi than there are Integralists who use it. It means...""
 brazil.359.a: ""...you are my brother.""

 brazil.360.t: "Their Dream is Broken"
 brazil.360.desc: "The afternoon sun shone through the large windows and warmed Acirema's rosy cheek as she sat on the floor of her Brasília apartment. She was spending one more day teaching her young son how to read when she was surprised by the creak of the door opening, its loud noise filling the wide modernist living room. Onwards came her husband Paulo, his disheveled suit, receded hairline and heavy frame glasses covered the eyes of a man who felt encumbered by the weight of the world.\n\n"My darling we need to have a conversation, please take the kids away," said Paulo as he dropped his body in his lounge chair, his legs failing to hold his weight, his head dizzy and foggy.\n\n"I don't know how to tell you Acirema, today I received news I didn't want to hear. A dossier about me was produced, they found that I was hired to write campaign songs for some politicians in the last election. They removed me from my position"\n\n"Careful Paulo, remember your heart. I am sure nothing serious will come from this, they didn't find anything against you in the days of the Revolution when they purged away the bad elements. One of the girls' teachers is married to a really important General and I am sure she-"\n\nPaulo coughed loudly, a strange feeling coming from his chest. "It already happened. I met my replacement, someone from the CCC, his patriotic credentials are better than mine for this job. He said that out of respect for my family he will give us two days to clear our apartment. Despite living here for a decade it's still the Ministry's property, there is no place for us in Brasília anymore. We are going back to Rio, and I know it will be hard for you but you will need to start working my love because I don't think anyone will be willing to hire me after this""
 brazil.360.a: "With his ear on the door Sérgio, the youngest of five siblings, of the first generation to be born in Brasília, eavesdropped his parents' conversation."
 
 brazil.361.t: "The Captain and the Students"
 brazil.361.desc: "Captain Ivan Proença positioned his Shermans, their engines hot and rumbling, right across the Avenue on the Campo de Santana; his orders were clear: Hold that position, protect the Souza Aguiar Hospital and break up any group of students that might attempt to cross his barrier. One block away laid the National Law School where one of the most militant student unions in the country would be having their Congress. Although In said meeting It would be decided what strategy would be decided to combat the new government, hours went by and the day was being peaceful, that is until nightfall.\n\nFirst it came the sound of engines, then the shouting " Down with Communism" and then an explosion. Ivan personally drove his tank as a scout, on his ears spoke the radio -"To Cavalry Regiment, do not intervene, Headquarters, over" but before his eyes laid the workings of a massacre. Men in civilian clothes dismounted from two vans and opened fire against the University, throwing tear gas grenades to push the students back. They chained the main gate and were preparing to set the building alight with the students inside.\n\nThere are days one must choose between his honor and obedience.\n\nThe Captain picked up his radio and spoke: "First platoon will come with me and break up the attackers with minimum damage. Second and third platoons will enter the building and escort the students to the hospital in groups of ten."\n\nThe militias got on their vans and retreated when they learned the Army wasn't on their side and the students were rescued from their flaming schoolhalls and escorted to the Hospital. When the Cavalry arrived back to their HQ a loud shout was heard."
 brazil.361.a: "Captain Ivan Proença, you are under arrest"

 brazil.362.t: "A Flight to Catch"
 brazil.362.desc: ""Lacerda's office," came the voice of Esther.\n\nActing President Castelo Branco spoke, "Hello Ms. Esther. This is Castelo Branco. May I talk to Mr. Lacerda?"\n\n"Right away, sir." The general awaited as the secretary went to get Lacerda's attention. Despite himself the general felt irritated by the delay; he had a plane to catch. Still, there was time. "Hello, this is Lacerda."\n\nRelieved, the acting President began discussing recent events with the former journalist. Lacerda asked several questions about the most recent bout of instability. Castelo Branco calmly detailed how each threat had been dealt with. With the most recent crackdown, order had been restored. "Overall I am certain that the time to return to the constitutional order is almost there. Would you be ready for new elections, when the time comes?"\n\n"Certainly, general," came Lacerda's voice. "I appreciate your close collaboration in these uncertain time."\n\n"So do I, Mr. Lacerda. Thank you." The General glanced at his watch. He was ten minute late on his schedule. "I must go, I've got to catch a plane."\n\n"Very well. Safe travels, sir.""
 brazil.362.a: "We still have time to get to Recife Airport!"

 brazil.363.t: "The SNI Strengthened"
 brazil.363.desc: "Humberto de Alencar Castelo Branco, President of the United States of Brazil, sat down with his trusted lieutenant, Golbery do Couto e Silva. Golbery had been briefed beforehand about what was going to be happening, and he was eager to hear confirmation.\n\nThe President took a deep breath, and said: "Golbery, you have as much freedom as possible to deal with the far left and communist groups. I grant the SNI free reign to do what needs to be done. Use whatever methods you want to remove them from the premises; you have my blessing."\n\nGolbery saluted stiffly. "As you command, Senhor President. I will not let you down." At Castelo Branco's smile of encouragement, Golbery saluted again and left.\n\nThough Castelo Branco had projected confidence as he issued his orders, he was still worried about the decision and the chaos it could cause. But he knew it had to be done if the hardliners were to be convinced to leave his government alone. Sighing, he went back to work.\n\nAs Golbery left the Palácio do Planalto, on the other hand, he steeled himself to do whatever he had to do to exterminate the fascist-communist threat."
 brazil.363.a: "Another sea change is coming."

 brazil.364.t: "The Crackdown"
 brazil.364.desc: "Some time back, when the military government of Brazil had decided to curtail the rights of trade unions and bring them under state control, workers and labor unionists throughout Brazil had vowed to do whatever they could to sabotage it.\n\nSomehow, they had thought that it would be feasible to go on strikes or engage in labor sabotage like they had in the "olden days" under Kubitschek and Lott, never mind that those two had been democratically elected and Castelo Branco was, well, a military dictator.\n\nUnfortunately, but unsurprisingly, it did not work all that well. When some of the unions in a district of Minas Gerais rose up in a strike, the SNI and police were informed within seconds of it starting (by whom nobody ever found out). Within hours, police - backed by far-rightist commandos of the CCC, the Command to Hunt Communists - came, beat them up, and told them to get back to work.\n\nOf course they had no choice but to comply; however, though they had been beaten and bent, they were not broken. They vowed to keep on resisting through less obvious means."
 brazil.364.a: "It played out like that all through Brazil."

 brazil.365.t: "The Occupation"
 brazil.365.desc: "At the University of Brasília, the situation was tense.\n\n"That makes sense," a reporter said, "given that the military and the students are literally in a standoff out here."\n\nThe claim of a standoff, in turn, made sense given that the military and students were assembled against each other in two lines, with tanks and riot police assembled in front of the gate, and brickbat and banner-wielding students behind it.\n\nIn the end, there was no fighting; instead, the military decided on an indirect approach. They targeted the reporters, shooing them off and threatening them with terms of imprisonment or beatings if they did not leave; the reporters, to a man, complied.\n\nMany students, knowing what that meant, decided to go home until a better day. Some stayed, but their ranks were so thinned by the departing students that they did not resist when the tanks left and the riot police put their batons and shields to use driving them back to their dorms.\n\nThis played out much the same elsewhere in Brazil."
 brazil.365.a: "A campus pacified, for the moment."

 brazil.366.t: "The Caged Birds"
 brazil.366.desc: "A different kind of mood reigned in the office of the Correio Vespertina. The bustle of the newsroom still carried on. The energy, however, was simply not as present as it had once been. Reporters rarely tackled new leads. Editors that had once encouraged their staff to pursue rumors, scandals and incidents with zeal now favored restraint and caution. News stories were chosen carefully; several of them would never be published. The articles that were run were edited even further. A few journalists had quit in protest, infuriated by the idea of working in the military's cage against their will. Most stayed, of course. They needed work, they needed to feed their families. What could be done?\n\nA different kind of mood reigned in the office of the Diario Popular. The daily newspaper had always sought to rail against injustice, to make accountable the powerful and the corrupt. But where the journalists had once been brazen, their words incendiary, a new style of articles had begun emerging. Journalists discussed in hushed conversations what news stories not to run... And what to replace them with.\n\nCake recipes with ingredient lists that included kilos of salt and extracts of medieval poetry were inserted in the leading pages. As the newspaper filled with white noise, its usual readers could not help but wonder about the nonsensical articles. What real news had been replaced? Just how far did the government's influence go, to affect the journalist's work so?"
 brazil.366.a: "And where are those underground newspaper coming from?"

 brazil.367.t: "A Land of Opportunities"
 brazil.367.desc: "A ringing phone. José de Magalhães Pinto stirred in his bed. Who? What? At this time?\n\nThe phone kept on ringing. His wife mumbled something about getting up to answer the phone. Pinto sighed and leaned over to silence the noisy machine. Who could it be, at this time of the day, on his private number?\n\nA man on the other end. Slight north-eastern accent. It took a few seconds for the name to register. "Ah, President Castelo Branco. What disturbs your sleep at this late hour?"\n\n"A pleasure to finally talk to you, Mr. de Magalhães Pinto. We've not yet had the chance to thank you for your support at the time of our constitutional intervention. It is thanks to patriots like you that order has been restored so rapidly."\n\n"What can I say, sir, as governor of Minas Gerais it was my duty to defend the law."\n\n"I will not hold you much longer, Mr. de Magalhães Pinto. I wanted to ask you about joining us in the new political order. The new ARENA political party needs veteran politicians such as yourself. In turn we could extend your governorship, until this transitory era is over."\n\nPinto smiled. Rubbed some of the sleep from his eyes. "It would be an honor, sir."\n\n"Very well." Click. The call appeared over. The governor of Minas Gerais stood to drink a glass of water, before returning to sleep."
 brazil.367.a: "A new era of opportunities begins."

 brazil.368.t: "Delaying the Transition"
 brazil.368.desc: "Ernesto Geisel entered the President's office. He saw general Castelo Branco slumped on one side of his chair, looking pensive. The man had aged since the military take-over. It was a very narrow path that Castelo Branco walked on. It was all Geisel and others could do to help the President from falling into the abyss.\n\n"Geisel. Excellent." The President stood and walked around his desk. Closed the door behind Geisel. "I wanted to discuss the future with you."\n\n"Who will serve as President after you."\n\n"Correct." Castelo Branco sighed. "Costa e Silva is a favorite, both in the barracks and in some corners of the business community. As much as I respect him, we cannot let him win the presidency. His hardliner supporters in the officer corps are mad as a hatter. They see fascists and communists everywhere. If Silva wins, these dogs will be free to tear the country apart inside out."\n\nGeisel said nothing. He half-dreaded, half-hoped for the President's next words.\n\n"Geisel, you must succeed me." The President faced him, now. "There's a bumpy road ahead, and I need your help making sure that we come out on the other side alive and well. That we all come out on the other side. Brazil needs you.""
 brazil.368.a: "Very well, sir. Let's get started."

 brazil.369.t: "A Murder of Uniformed Crows"
 brazil.369.desc: "Humberto de Castelo Branco's irruption into the room did not interrupt Golbery and Geisel's conversation, for the two military officers had been immersed deep in silent thoughts. They looked at their colleague. Castelo Branco's traits were drawn with fatigue. Most of what remained of the general's vigor was a slowly simmering anger. Worry seemed to make up the rest of his manic energy.\n\n"Costa e Silva's come out in the open. He's insisting on the end of the elections."\n\n"Not good. "Golbery said. "Who is backing him?"\n\n"He's got a petition, signed by dozens of officers. Complete unknowns, upjumped peasants serving as officers for garrisons in the middle of nowhere. Those unpatriotic animals smell an opportunity, and now they are flocking toward the capital to help Costa e Silva kill the constitution and feast on its corpse." Castelo Branco sat on a chair, his back straight. "I told Costa e Silva that the elections were proceeding. If we show weakness to that lot we are done for."\n\n"Well done, Castelo Branco." Geisel nodded, and then leaned forward. "If the military forms a complete dictatorship, a generation of soldiers and officers will grow up to be bureaucrats and politicians. The Brazilian army cannot be reduced to this eventuality."\n\n"Agreed." Said Golbery. "We'll help you fight this, Humberto."\n\nRelief drained some of Castelo Branco's manic energy. He looked at his two colleagues, and nodded simply before drawing out a pen and a notebook."
 brazil.369.a: "We've got calls to make."

 brazil.370.t: "The Lone Crow"
 brazil.370.desc: "Lacerda's arrival in Brasília took place late at night. The former journalist turned politician seemed exhausted by the day's travel when Castelo Branco found him at the agreed upon meeting spot, away from prying eyes. The general was happy for the chance to talk to the Crow in person. Phone lines were not trustworthy enough at this stage.\n\n"Good to see you, Lacerda. We do not have much time, for a faction within the army is doing its best to make sure there will be no elections." Castelo Branco said.\n\nThe Crow, already visibly upset at the summon, recoiled from the blunt explanations. As usual, however, Lacerda was not at a loss for words for very long. "How the hell? You said the hardliners had been boxed out by you and your allies, Castelo Branco. Who is behind this attempt?"\n\n"Costa e Silva is leading them."\n\nThis time, Lacerda's shock and dismay were not dispelled rapidly. The former journalist tried to rub the fatigue out of his eyes. "Him. I'm not surprised." he said, trying and failing to put on a brave face.\n\n"Surprise or no surprise, all that matters are the facts. Our opponent is influential and dangerous, Mr. Lacerda. I need your total support in order to fight off the hardliners. You've got pull, in the media and through the UDN. We'll need to make use of every last scrap of influence you have if we're to make it through."\n\n"I'll give you a blank check, Branco, if that's what you need. I hope it will be enough.""
 brazil.370.a: "It may."

 brazil.371.t: "The Bull's Contacts"
 brazil.371.desc: "To the untrained eye, Adhemar's spartan office belied the bull's reputation for graft. Castelo Branco was not fooled, however, for the furniture and clothes of his host's breathed money. Whose money? The general could not afford to care about such a topic in this delicate hour.\n\n"Castelo Branco, you promised me!" Adhemar's carefree attitude had taken a hit through last week's events. Castelo Branco was delighted to see the bull's worry and anger, no doubt a mirror of the general's own. "Why am I not minister of the int-"\n\n"That position does not matter, Mr. Barros, for in three months either I'll have succeeded in my tak and you'll be rich and powerful, or we'll both be in the doghouse." The corrupt politician did not seem too taken aback by this revelation. The damn bull knew, then. Or suspected, at least, that things were not going well for the Sorbonne. All the better. Castelo Branco strained to calm his voice. "The... Negotiations are still ongoing. Some in the army oppose holding new elections. Elections that would prove extremely profitable to you and yours, Mr. Barros. I've come to visit you today to request your help. You are a persuasive man, and are known to maintain both business relationships as well as friendships with many officers such as General Kruel. I need your help to make sure that our case for the defence of our constitution are well received and understood by soldiers and officers throughout the country."\n\nAdhemar nodded. "This I can do. Then, things are not yet settled, general?""
 brazil.371.a: "We still have a chance, Mr. Barros"

 brazil.372.t: "Personnel Change"
 brazil.372.desc: "General Costa e Silva walked into the conference room confidently. His uniform was, as always, impeccably prepared. The perks of being minister of defence; a few better aides had been recruited to help prepare his clothes for the week.\n\nCastelo Branco observed the defence of the minister's gait. Silva appeared in a good mood. Castelo Branco, too, was in a good mood. Sadly for the defence minister, the acting President's good humor was no doubt incompatible with his rival's.\n\nCosta e Silva approached his seat. He nodded once at the acting President. Then, his gaze moved up and down the long table. A strange collection of faces, for a regular meeting of the ministry. Many members of Castelo Branco's Sorbonne faction, soft faced civilians playing in uniforms. Costa e Silva sat a little unsteadily. What was the meaning of this? The soldiers guarding the door avoided his questioning look. The minister of defence turned back to Castelo Branco.\n\n"General Costa e Silva." the acting President spoke. "You are accused of insubordination. As such we must sadly inform you of your removal from the ministry of defence, as well as the end of your active command, pending investigation on the matter."\n\nA dozen pairs of eyes on him. Had the ceiling always been so tall? Costa e Silva realized his last breath had been a few seconds ago. He swallowed, and stood. "You... Do you realize what you've done?" The general stormed towards the door. The assembled officers watched him struggle with the doors, unhelped by the soldiers standing watch. Finally, with a loud clang the disgraced general exited the room."
 brazil.372.a: "His revolt is finished."

 brazil.373.t: "The Counter Coup"
 brazil.373.desc: "Castelo Branco held the phone uselessly. Communication lines had been cut. A great deal of traffic and car noises out in the streets. Then silence. Stillness had descended on the capital.\n\nThe door bursting open did not shake the acting President out of his reverie. Nor did the words from the soldier, telling him that troops had begun converging on the capital and were refusing orders, that they had to go. Branco meekly followed the young soldier. Just a kid from the south, his gaucho accent tinting his panicked instructions. The acting President was just as at a loss as the soldier. How could he not have known? It was the end of the line.\n\nA military convoy blocked their path to safety, out on the gardens of the Palácio da Alvorada. American made trucks. American made jeeps. American made tanks, their cannon turned toward the presidential palace.\n\n"Just go." Castelo Branco told the kid. Alone, the former President stood in front of the marching soldiers. Their words, too, didn't shake him from his fugue. He had been arrested on the orders of the legitimate President Costa e Silva, or so the soldiers said. General Castelo Branco was dragged by the putschists, tossed in the back of a truck."
 brazil.373.a: "It's over."

 brazil.374.t: "Discussing with the Crow"
 brazil.374.desc: "Their meeting was in a much cheerier mood than their previous one. Instead of being exhausted from a day's travels, Lacerda appeared focused and energetic as always. The crow had flown through much of Brazil in preparation for the elections, now that elections were indeed confirmed. This did not preclude him from coffee with acting President Castelo Branco, as both men discussed the post-mortem of the failed Silva Coup.\n\n"The hardliners generally drew their power from a coalition of junior officers as well as the prestige of Costa e Silva. After the decapitation of their leadership and the removal of Silva, a great many of the junior officers accepted our peace offerings of money and influence in the post election world."\n\n"This is good to know. The Sorbonne has not given away too much power to the army, then, in this settlement?" Asked Lacerda.\n\nCastelo Branco winced a bit at the nickname of his faction, as usual. But if the continued use of this derisive nickname was the cost of peace and order, then so be it. "No, the country is ready for civilian rule to resume. Your associates have reassured us many times that additional support will not be needed for the election?"\n\n"None needed, no." Lacerda tapped his coffee cup. "Beyond the preparations that you've already done. The far left has collapsed, and the PSD's campaign is in shambles."\n\n"Very well." It seemed that the Crow was satisfied with the army's promise of vote rigging on election day. "I must leave you to your preparations in Guanabara state. Optics are everything; the more legitimate your victory appears, the stronger the return to normal will be. Good luck, Mr. Lacerda.""
 brazil.374.a: "Thank you, general."

 brazil.375.t: "Trusting the Voters"
 brazil.375.desc: ""Are you sure about this, Branco?" Asked Geisel for the umpteeth time. "It would be a disaster for all work to come undone at the last moment."\n\nCastelo Branco nodded. "Your concerns are understandable, Geisel. That said, the election will go ahead with as little interference as we can manage. It would be a disaster for anti-democratic forces to win, yes. It would also be a disaster if the citizens thought the election a sham. We walk a thin line."\n\n"Lacerda assures us that he is almost certain to win, yes? How reliable is his information gathering?"Asked Golbery.\n\nCastelo Branco turned to the other general. "It is quite good; we have cross checked it with our own intelligence as well as FBI analysis. There is nothing we can do now but trust our fellow citizens to choose a victory for democracy and for the defense of the constitution."\n\nGeisel looked like he would argue again, then sighed. "You've done the impossible and steered us through this crisis, Branco. I can do nothing but trust your judgment. The hour of truth is almost upon us."\n\nThe acting President nodded."
 brazil.375.a: ""Nothing to do but wait""

 brazil.376.t: "Keep An Eye on Things"
 brazil.376.desc: ""Lacerda, you should be reassured that the army will keep a close watch on the elections as always. I will not tolerate any voting fraud or irregularities under my watch. My men will be there to ensure that...that the people's will, yes, the people's will, shall prevail in this election."\n\n"Thank you, General. I appreciate your assistance. But honestly, this isn't necessary. The way my campaign is going, I'll win this election even with irregularities! Give the soldiers a day off."\n\n"Do I need to remind you that it's not up to you if this watch takes place, Lacerda? And besides, the decision has already been made. The watch will happen, and my soldiers will be standing guard. Goodbye, Lacerda."\n\nCastelo Branco hung up, leaving Lacerda staring at the phone incredulously."
 brazil.376.a: "'I should have asked the damn Air Force instead.'"

 brazil.377.t: "A Bridge Too Far"
 brazil.377.desc: ""No, Golbery. It's too risky."\n\n"But why, sir? I have my agents in place and ready. One swift offensive will bring down Kubitschek's campaign and ensure that he will never win."\n\n"You forget about the opposition, Golbery. If they are to find out about the targeting of Kubitschek and his family, the consequences will be fatal to us and Brazil. Don't forget that we're running the show now. Maneuvering national politics is a different thing compared to commanding a regiment. A single misstep, and everything tumbles down. We fought hard to secure our position, and we should have every man dig in, not launching a risky assault."\n\nOn his end of the phone, Golbery nodded.\n\n"I understand, sir. I will accept your decision."\n\nHearing Castelo's utterances of approval, Golbery hung up the phone and left."
 brazil.377.a: "'He's right. This is an entirely new battlefield to face...'"

 brazil.378.t: "Eternal Vigilance"
 brazil.378.desc: ""Report, Golbery."\n\n"I've just gotten off a meeting with my agents. They needed to speak urgently about the communist expansion."\n\n"What are their findings?"\n\n"Troubling, sir. Apparently after our coup, support for the communists has risen. Evidently they've been able to fool large sectors of the populace with their lies. We've been able to reduce communist support through the election, but their numbers are still going up. They're hypnotizing more and more of our people. Each day."\n\n"Where do we draw the battlelines?"\n\n"Around two main areas. Urban centers, and the remnants of the Peasant Leagues in the North."\n\n"Peasant Leagues! Communists in disguise, all of them. That traitorous snake Lott and his cronies tried to hug them instead of destroying them. We won't make the same mistake. Search and destroy, Golbery."\n\n"I agree, sir. We should also focus on those urban groups."\n\n"Our troops can handle the Peasant Leagues. Have the police deal with the urban groups. If we destroy them both, support for the communists will drop like flies.""
 brazil.378.a: ""Very good, sir. I'll have my agents get on it.""

 brazil.379.t: "Partners in Exile"
 brazil.379.desc: "A small crowd had assembled to see off their former governor at the airports. Watched over by a few soldiers, the Guanabarino had decided to brave the military's diktats to give their final goodbyes to their governor. They knew Carlos Lacerda. He had fought for them until the very end, and now the new order had forced his exile.\n\nThe journalist, turned politician, turned exile, waved somberly at the assembled men and women. The glares given to him by the soldiers precluded any speech. He simply gave his farewell to the crowd, before entering the plane.\n\nThe cabin was crowded with those the junta wanted to get rid off. Those given the courtesy of a chance to escape alive, that is. Lacerda shuffled to his seat. Row H. Seat... Oh, for the love of God. Lacerda stood stupidly, blocking the aisle. Juscelino Kubitschek stared back, an expression of confused surprise no doubt mirroring the crow's own.\n\nSurprise gave way to polite small talk, as Lacerda sat next to the former PSD President. The small talk gave way to discussion of current events as the plane taxied to the runway. Lacerda could not help himself. A disgraced exile as he was, the Crow had lived and bled news and politics for all of his adult life. Kubitschek too was fascinated by the situation, the rise of the hardliners, and the collapse of the sorbonne. As the plane began soaring into the sky, the former enemies discussed their destination, of the upcoming years of exile.\n\nThey also began discussing how to find a way back home."
 brazil.379.a: "And they nursed the embers of discontent, together."

 brazil.380.t: "A Congress Deserted"
 brazil.380.desc: "Empty roads through which the new Japanese car drifted, a lone ship on a silent sea. In the calm after the storm, the capital was a silent mausoleum. Sofie Walter arrived at work on time. She had only avoided being late by making use of the deserted street.\n\nThe halls of congress were empty. Army had cleared everyone out. A few puppet bureaucrats might come in later that day to push paper around. For now, the national legislature sat uselessly, even more devoid of purpose than the marionette shuffling about Germania's Reichstag.\n\nSofie mopped floors no one walked on. She cleaned offices that had been emptied in a hurry. Here and there soldiers stood guard, their expression unreadable. The janitor suspected they were mostly bored. What was the point, after all, of guarding a hall of memories?\n\nThe hall of portraits, where pictures of every President hung. Sofie stopped in front of Vargas. The populist President stared back at her, as silent as the soldiers had been. What did Vargas think of Brazil's current situation, she wondered. The picture gave her no reply.\n\nShe dusted the portrait, before moving on. Much work remained to be done."
 brazil.380.a: "Dust settles fast on Brazilian democracy, these days."

 brazil.381.t: "The Confrontation"
 brazil.381.desc: "Since the announcement of the curfew, a strange calmness had fallen over the city of Rio. Trolleybuses and taxis had vanished. Stores had shut their doors and boarded their windows. The radios played either classical music on loop or regular, government-ordered announcements. Curfew will be imposed in three hours, said an anonymous announcer in a cold voice. Anyone left on the street will be subject to arrest. Curfew will be imposed in two hours. One.\n\nIt was the steady, ominous drone of the radios that Manuel was thinking about now as he and the other members of his riot squad assembled opposite the Cinelândia, nervously gripping their shields and batons. Earlier in the day, some students had announced their intention to occupy the square, to hold it against the forces of fascism and imperialism. The students were what faced him now, their young faces full of hope and determination, of misplaced self-confidence. They were faces that had not known violence or struggle, that believed banners and slogans and well wishes could bring down the government.\n\nTen minutes. Manuel forced himself to look away and instead focus on the growing number of police behind him. There were hundreds of men clad in dark armor gathering as the children chanted uselessly or waved placards. A man with a bullhorn made a half-hearted appeal to the mob.\n\nEight minutes. He watched as trucks carrying canisters of tear gas and other, deadlier weapons arrived. He watched as his friends and fellow officers laughed and jeered, banging the street with their batons. In his head, he prayed desperately for the students to leave, to run away, to escape while they could. None moved.\n\nFive. From deep within the crowd, there came a chant. At first, it was incoherent, a mess of voices. Then, as the students locked arms, he realized what they were doing. He realized what they were singing. As the square rang out with the notes of the Brazilian national anthem and the police began their advance, Manuel began to weep."
 brazil.381.a: ""In thy bosom, O Freedom, our chest defies death itself!""

 brazil.382.t: "The Decision"
 brazil.382.desc: "Humberto de Alencar Castelo Branco sat down at his desk, idly shuffling through the election plans on his desk. He had a difficult decision ahead of him: should he stand up to Costa e Silva, or go through with the election plan?\n\nAfter several minutes passed by, Humberto made his decision; folding up the election plans into a brown envelope after scratching them out with a pen, he shoved them into the bottom of a drawer. He had to give Costa e Silva what he wanted.\n\nHumberto had convinced himself that the decision was because he was afraid. Afraid that a confrontation with his hardline lieutenant would cause things to spiral out of control; afraid that, if he lost, it would cast power into the wrong hands and destroy Brazil. But in his heart of hearts that was not the only reason: greed, too, motivated him.\n\nHe really liked being President. The power and influence it gave him was intoxicating; so much so, in fact, that it had gotten to his head in some cases and made him want to hold on to it as long as possible. So he decided he might as well hold on to it.\n\nAfter thinking for a few minutes, Humberto de Alencar Castelo Branco, President of Brazil sine die, wrote out a letter to the now-victorious Artur da Costa e Silva: "Artur - I am pleased to inform you that I'll be taking your advice.""
 brazil.382.a: ""The elections are to be suspended. Indefinitely.""

 brazil.383.t: "Dirty Hearts"
 brazil.383.desc: "Dead bodies are not an uncommon sight in São Paulo, but when the corpse has a katana plunged deep into its intestines and a note in incomprehensible Japanese, it is certainly cause for concern. Two policemen squat down to inspect the body. "Junji Takahashi, age 39, businessman. Made several contracts with American companies." Andreas said, standing up as he checked his notes.\n\n"Talk about privilege. If I could get contracts like this and a house like this, I sure as hell wouldn't kill myself." Luís said as he stood up to face Andreas.\n\n"Maybe he couldn't keep up and lost momentum. Even the loss of a single contract could mean a massive loss." Andreas replied, inspecting the office where the man had been found. The desk was messy with a pile of paperwork filling most of it, while the office bookcases were neatly lined with files and folders.\n\nLuís crouched down to examine the man's body once more. "That doesn't explain why he would just kill himself like that... You're a rich hotshot and you just decide to end it all one day? Seppuku style, too? Not like he dishonored his company or anything."\n\n"Yeah, you're right, Luís. Something feels wrong-" Andreas' answer was interrupted by the office door swinging open and a group of policemen streaming in, led by the police chief himself.\n\n"What the hell are you two still doing here? This is clear suicide, gentlemen. We have better things to worry about than some rich guy with a thing for katanas. While you two were wasting time, there was a robbery eight blocks away. Get on it or you're both fired." The chief grabbed the file Andreas had made and motioned for the other officers to remove the body and cordon off the area."
 brazil.383.a: "Murder, he wrote."

 brazil.401.t: "National Electric Act Passes!"
 brazil.401.desc: "Cheers and clapping could be heard outside the Senado today, after the passage of the National Electric Act. One of President Goulart's most sought after reforms, the act establishes the state-owned electricity company in order to try and wrest some control of Brazil's energy infrastructure back into her own hands from foreign corporations. While the UDN and other opposition parties have decried this move as nothing more than "blatant socialism and market manipulation", supporters of the act point to the vast inequality regarding access to the nation's electrical grid that is holding back the Brazilian people. Furthermore, they also maintain that cheap and consistent access to electricity will fuel job creation, increase the living standards of the people, and push industrialization in poorly-developed areas.\n\nPresident Goulart made a speech today, echoing the benefits, and pushed for additional infrastructure projects that would see Brazil's electrical output quadruple within the decade. He spoke on the steps of the National Congress Building.\n\n"Today is a great day for the people of Brazil. No more will your homes be cast into darkness when the sun sets; no more will you have to suffer through the humid heat; no more will you be subject to blackouts and the greediness of foreign companies. I want to thank the Senado for their support on this bill, and I assure you that my government is working with our brightest engineers to deliver you electrical access as soon as possible, at a price that is fair for all Brazilians. I look forward to continuing the improvement of both this great country, and the lives of our people. Thank you!"\n\nWhile the act technically allows for the seizure and buyout of foreign power companies, the Goulart administration has not yet fully disclosed the details of how these power companies would be transferred under Eletrobras. However, one thing is for certain; even Brazil's poorest families will soon enjoy the myriad of benefits that electricity brings."
 brazil.401.a: "All of Brazil shines together."

 brazil.402.t: "National Electric Act Fails!"
 brazil.402.desc: "The Goulart administration suffered a serious setback today when one its prized pieces of legislation, the National Electric Act, failed to garner enough support in the Senado to pass. The act aimed to nationalize Brazil's electricity infrastructure under one company, in the hopes of improving access for many poor and rural Brazilians while allowing the government to directly invest, maintain, and repair the grid. However, its rejection means that various local, private power companies will maintain their control over the nation's electricity grid. While opponents of the bill celebrate its failure and Brazil's commitment to a free market, supporters are left wondering what else they can try in order to aid those without access to the current grid.\n\nForeign electric companies have been accused of setting exorbitant prices and are prone to random blackouts and power failures, especially in poorer parts of the country. Representatives for Rio Light, one of the private companies, stated that they were "pleased to see the act fail", and maintained their commitment to ensure that all paying customers in their service region would continue to enjoy electricity. When asked about any plans to potentially expand access to poorer, rural regions in the west and north of Brazil, the company refused to comment."
 brazil.402.a: "The hopes of Brazil's poor dim, ever so slightly."

 brazil.403.t: "The Agrarian Relief Act Passes!"
 brazil.403.desc: "Celebrations could be heard across Brazil's farms today, as the Senado passed the Agrarian Relief Act. The act redistributes land from various corporate entities and rich ranchers back down to local peasants and smaller farmers, in the hope of creating more equitable opportunities for the lower class, and to improve agricultural output. President Lott has alleged that many ranchers are inefficiently using their massive plots of land, and that it would be better in the hands of the local populace. Despite calls for compromise from both the unions and the ranchers, President Lott proceeded directly with the original version of the bill, and his gamble appears to have paid off.\n\nThe bill, drafted in response to crippling strikes from various unions across the country, also gives Brazilian banks money for the issuance of loans to peasant and smaller farmers. Although the rich are remarkably unhappy with how their assets are being seized, even they could not argue that they were truly using the land at all. The PTB have agreed to work with provincial officials to accelerate the land redistribution process and ensure that the loans are fairly issued, something the UDN took immediate exception to. Regardless of how much bickering will follow the act, many can agree that there is clearly new management regarding the agricultural sector."
 brazil.403.a: "A necessary step to level the playing field."

 brazil.404.t: "The Agrarian Relief Act Passes!"
 brazil.404.desc: "Celebrations could be heard across Brazil's farms today, as the Senado passed the Agrarian Relief Act. The act redistributes land from various corporate entities and rich ranchers back down to local peasants and smaller farmers, in the hope of creating more equitable opportunities for the lower class, and to improve agricultural output. President Lott has alleged that many ranchers are inefficiently using their massive plots of land, and that it would be better in the hands of the local populace. Pressured to negotiate with the unions that were directly causing the strikes, President Lott sat down with several prominent labor figures and implemented their suggestions into the Agrarian Relief Act. Despite renewed opposition from the UDN to try and fail the act, calling it "communism at its core", the PTB-PSD alliance appeared to secure enough votes to force it through.\n\nThe act contains several additional clauses regarding worker treatment in large-scale farms, along with a reduction in hours to the work day. Furthermore, it allows the PTB to work with provincial officials to speed up the land redistribution process, and allots a significant amount of funds to Brazil's banks for the issuance of loans to the peasants and small-scale farmers. Some ranchers, unwilling to surrender such large swaths of their wealth, have apparently fled the country completely. With such a strong land reform act, many in Brazil are wondering how the following piece of legislation could even possibly top this one."
 brazil.404.a: "The sun will shine forever."

 brazil.405.t: "The Agrarian Relief Act Passes!"
 brazil.405.desc: "Celebrations could be heard across Brazil's farms today, as the Senado passed the Agrarian Relief Act. The act redistributes land from various corporate entities and rich ranchers back down to local peasants and smaller farmers, in the hope of creating more equitable opportunities for the lower class, and to improve agricultural output. President Lott has alleged that many ranchers are inefficiently using their massive plots of land, and that it would be better in the hands of the local populace. However, he implemented several suggestions from various ranchers in the hope of increasing support for the bills across the PSD, UDN, and PSP. While Lott's gamble to obtain more support from the ranchers appears to have worked, it has also attracted the anger of the unions and the PTB, who have decried the bill as "watered down" and too insignificant to cause any real change.\n\nRegardless, the unions across Brazil have instructed their workers to cease the strikes that effectively brought the country to a halt, and it appears as if the country can finally return to work. As provincial administrations across Brazil work to begin redistributing land, Brazil's various banks are also preparing to issue loans and provide economic relief programs to ensure the peasant farmers don't go bankrupt immediately. While it is difficult to predict if the reforms will continue, many across Brazil can still appreciate the attempt at a more equal agricultural sector."
 brazil.405.a: "Incremental reform can often lead to a wave of change."

 brazil.406.t: "The Agrarian Relief Act Fails!"
 brazil.406.desc: "Protests broke out across Brazil's countryside today, after the failure of the Agrarian Relief Act in the Brazilian Senado. The act was supposed to redistribute land from rich landowners and then give it to peasants and local farmers, yet the act faced stiff opposition from both the UDN and the PSP immediately after being introduced. With the help of lobbying from the ranchers, the act was defeated by a narrow margin, triggering additional protests and calls from union leadership to continue the strikes. With little to no chance of passing significant land reform, the PTB-PSD coalition is rumored to be at its breaking point, with many members of the PTB betrayed by President Lott's inability to equalize the playing field for farmers, even by a little bit.\n\nWithout the Agrarian Relief Act, much of Brazil's suitable farmland will remain in the hands of a select few, with buyouts of local farmers continuing to remain a common practice. Food prices will likely rise, along with agricultural goods that are used in industrial processes, such as palm oil. Although President Lott and PTB leader João Goulart have pledged to speak to the protestors, it is unlikely that a resolution will be reached quickly, and many political analysts across Brazil are expecting political turmoil for at least the next month. Many hope that the protests do not continue to escalate, lest the military feel the need to intervene with force in the protests."
 brazil.406.a: "The earth belongs only to men; The idle will go to reside elsewhere."

 brazil.407.t: "The Voting Rights Act Passes!"
 brazil.407.desc: "Cheers could be heard throughout Brazil today, as the Voting Rights Act has passed in the Senado. A key cornerstone in the Goulart administration's reforms, the act removes any restrictions on the right to vote for various marginalized groups throughout Brazil. Previously, illiterate, lower-class, or politically disenfranchised citizens were disallowed from voting in elections, and the right to vote was heavily dependent on employment. Opponents of the act pointed to the potential election fraud that could happen, given the size of the voting base, while supporters decried any criticism of the act as "undemocratic hogwash". With the passage of this act, any Brazilian citizen is ensured the right to vote, no matter what. Political activists across the nation are preparing to mobilize this newfound voter base, as it is expected to have a significant, yet unknown effect on Brazil's electoral results.\n\nThe Goulart administration has said that it will work with election officials in every region to expand access to voting, with additional voting sites and potentially increased voting hours on election days. Furthermore, voting rights activists have continued to push for additional monetary and legal reform to encourage and support rural voting. Although some skeptics within the disenfranchised population currently doubt how effective voting truly is, many can agree that Brazil's democracy has turned a new leaf for the better."
 brazil.407.a: "One more class divide, broken down."

 brazil.408.t: "The Voting Rights Act Fails!"
 brazil.408.desc: "The status quo prevailed today, as the Voting Rights Act has failed to pass in the Senado. The act tried to remove any and all barriers that prevented the poor, the disenfranchised, and the illiterate from voting in Brazil. While many of Brazil's middle and upper-class citizens who are formally employed in jobs enjoy very little barriers in voting, the right to vote does not extend to those without formal employment, various minorities, and the poor. While opponents of the act state that they are willing to look at electoral reform, they decried the act as too quick a change, instead emphasizing the gradual inclusion of these marginalized groups into Brazil's electorate. President Goulart denounced the failure of the act today as a "mark on our Republic", and pledged to continue looking at ways to expand the right to vote to all Brazilians.\n\nHowever, there is likely a limit to how far-reaching his reforms can be without the support of the Senado, and his goal of seeing every Brazilian able to vote is likely dead, political analysts claim. In addition, even for those who could vote in rural areas, voting access is unlikely to expand, with voting sites located in inconvenient or far-off locations for many. Furthermore, many of Brazil's poor are forced to work on election day, so even with formal employment, many workers are forced to choose between voting, and a day's wages. The gap between Brazil's poor and its middle-class will likely only get bigger, despite the Goulart administration's best efforts."
 brazil.408.a: "How free can a nation be, if its citizens cannot vote?"

 brazil.409.t: "The African Surge Act Passes!"
 brazil.409.desc: "Despite the toll the South African War has taken on the Brazilian people, the Senado has passed the African Surge Act. The act expanded the Brazilian Volunteer Corps in South Africa by two extra divisions, along with an unspecified number of air wings as support. Supporters of the act cheer its passage, stating the need to defend democracy across the world, and that there was no cost too great to push "the fascist menace out of the African continent". Opponents have cited the human and material cost of a war that Brazil directly sees little benefit from, along with the potential expansion of its draft. In Johannesburg today, the Brazil Armed Forces Command appeared with the commander of US Forces in South Africa, William Westmoreland and issued the following statement,\n\n"The Brazilian Armed Forces have displayed their bravery, courage, and will in this conflict, and we appreciate the sacrifice that they have made in every battle. With their continued aid, we can end this war and secure South Africa as a beacon of liberty for the world to see. To the Brazilian people, we will not forget your cooperation against the perfidious Nazi threat. Thank you."\n\nWhile military observers expect the war to drag on for at least several more months, there is no denying the closer ties that Brazil and the US now enjoy. President Lacerda, while unable to be reached for comment, is known for his desire to bring Brazil into the Organization of Free Nations, and this seems to be one step closer for him to officially join the military alliance. The German Reich, in response, ordered its embassy in Brasília to close within the end of the week, effectively shutting off Brazil from the Einheitspakt."
 brazil.409.a: "It is simply our duty."

 brazil.410.t: "The African Surge Act Fails!"
 brazil.410.desc: "Disappointment spread through the Brazilian volunteers in South Africa today upon hearing that the African Surge Act has failed in the Senado. The act intended to bring an additional two divisions to support the war effort and continue the defence of South Africa against Afrika-Schild aggression, but lacked enough supporters for it to pass. Given the stalemate that the South African War is currently in, military leaders within the OFN were hoping that additional Brazilian volunteers and air wings would be enough to potentially turn the tide. Opponents of the act cheered on its failure in Rio today, citing the blood shed in South Africa for very little benefit back in Brazil. Mothers were seen across the country, hugging their young sons, knowing that they would not have to die in some far-off country defending the arbitrary concept of "freedom" and "liberty". Anti-war activists also scored a huge victory today against the Lacerda administration, and President Lacerda himself is expected to address the nation tonight regarding the war.\n\nA spokesperson for the OFN today expressed that "While Brazil has the right to determine its level of contribution in the South African War, the Organization of Free Nations notices all developments regarding its attitude towards South Africa. Freedom and liberty are under attack, and the nation of Brazil did not rise to their defence." The Lacerda administration has made it a clear goal to try and apply for OFN membership, with President Lacerda even speaking to the OFN a number of times. The failure of this act is likely to serve as a permanent blemish in Brazil-US relations, and complicates Lacerda's goal."
 brazil.410.a: "Let the US handle its own wars."

 brazil.411.t: "The Highway To Prosperity Act Passes!"
 brazil.411.desc: "Clapping and cheers could be heard throughout the National Congress building today as the Senado passed the Highway to Prosperity Act. The Act shifts funds and resources over to the Trans-Amazonian Highway, a project that was started under President Lott. Progress has been difficult on many sections of the highway, with the hostile environment and weather, along with the legal issues of purchasing the land and ensuring the fair treatment of the indigenous people living along the highway. However, construction of the highway stalled after evidence surfaced on how Lott was ignoring kickback schemes and bribery by officials in charge of constructing the highway. President Kubitschek has been vocal about his desire to see the highway completed, and the passage of the act gives him and his administration a wide array of resources to see the grand project completed.\n\nOriginally started by President Lott at the start of his term, the Trans-Amazonian Highway has been an albatross around the Brazilian government's neck. Furthermore, as mentioned before, government officials tasked with overseeing highway construction were found to be pocketing public funds and cutting corners with regards to the quality of the highway. President Kubitschek has pledged to resolve these issues and increase oversight on the highway while construction ramps back up. The highway connects the Amazon to the rest of Brazil, opening up a wide array of potential infrastructure and development possibilities, while providing a land route from Brazil to Colombia."
 brazil.411.a: "We will conquer the Amazon, one road at a time."

 brazil.412.t: "The Highway To Prosperity Act Fails!"
 brazil.412.desc: "Construction machines along the Trans-Amazonian will remain unused for now, as the Senado has failed to pass the Highway to Prosperity Act. Sponsored by the Kubitschek administration, the act attempted to kickstart construction again on the Trans-Amazonian Highway. However, recent scars from corruption during the Lott administration proved too much to bear, and progress on the massive transportation network will continue to be slow for now. While supporters of the act argued for additional funding, equipment, and manpower to finally finish construction on the highway, many senators were unwilling to see these resources committed to a project that has already taken too long and cost too much.\n\nA combination of low wages, hostile environment, and inept administrators have given the highway the nickname "Lott's greatest folly". Although no one in Brazil wants the project abandoned and stopped, many have begun questioning the actual utility of the highway compared to its cost. Originally intended to link up the undeveloped North and Central-West regions to the prosperous coastline, the highway has suffered from a variety of issues that has prevented its completion. With the failure of this bill, Brazilians are beginning to wonder if the highway can even be completed within the decade."
 brazil.412.a: "The government and its lackeys could not be trusted."

 brazil.413.t: "The South Africa Withdrawal Act Passes!"
 brazil.413.desc: "The senators had voted, and they had voted correctly. On the walk to his office President Quadros found himself in a jubilant mood. No more would poor Brazilian men die for a pointless conflict in South Africa. Lott had entered the war carelessly, paying in blood an imaginary debt to America. Now Quadros was reversing at least some of the damage caused by his predecessor's carelessness.\n\nHis secretary had assembled a few memos and newspapers on his desk. Quadros' good mood did not dissipate through the subsequent reading. Memorandums from UDN party grandees, reporting on the anger of many UDN senators with the evacuation of South Africa. The President did not care what a few Lacerdista has-beens did. He was President, and the Crow could squawk for all he cared. The people would understand that the UDN's new direction was in their best interest.\n\nMemos about the media he likewise skimmed through. Radio hosts accused him of cravenly caving in and abandoning South Africa to fascism. Editorials in the right wing press deplored the risks to the friendship between Brazil and America.\n\nWhen his aides came in with a cup of coffee, they found the memos and newspaper neatly folded into a pile. The President thanked them for the warm drink, and requested they dispose of all these 'letters to the editor'."
 brazil.413.a: "It is time to bring our boys back home."

 brazil.414.t: "The South Africa Withdrawal Act Fails!"
 brazil.414.desc: "Quadros sighed. "The Senate vote failed, Campos. What a mess, what a mess. What are my next options?"\n\nVice-President Campos thought for a moment. "You could always respect the vote, sir. Despite our differences, we are both men of the UDN, and several of the senators that helped bring down the vote were also UDN members. Many are old-school Lacerda followers, who look to the United States as our most logical ally. You've not won them over yet, sir." He did not need to add that Quadros had not convinced him yet, either. Both men had a good working relationship, despite their policy disagreements. The President appreciated the other man's honesty, a rare delight in Brazilian policy.\n\n"What are the alternatives?" Quadros asked.\n\nThe Vice-President sighed. "You could just ignore their wishes, sir. Foreign policy is a President's privilege. But that might not be prudent. Your government is young, sir, and many in the UDN still can't believe you are the one leading them. Of course, letting them win will be a political defeat in the eyes of the public. That's probably what more than a few of Lacerda's faction wish to see you reined in."\n\n"No doubt. And the army?"\n\n"Not much progress in bringing them over to your side. They'll be delighted to see the Senate vote in their favor. Overturning it would really aggravate them."\n\nIt was the President's turn to be lost in thoughts. Vice President Campos had still little understanding of how the peculiar President ever reached his conclusions. Eventually Quadros looked up."
 brazil.414.a: ""We've no choice but follow the Senate.""
 brazil.414.b: ""Damn the senators, Brazil is leaving this war!""

 brazil.415.t: "The King of Pandas"
 brazil.415.desc: "Power in Brazilian politics can come from the barrel of a gun, or from honeyed words to the rich and influential. In this brave new age, it could also come from adorable vegetarian bears from the Far East.\n\nThe nation's intelligentsia and political pundits did not know what to make of the Vice President's efforts to bring back pandas from his recent visit to China. Many had ridiculed the amount of effort put into the animals as proof of Quadros' silly belief that Brazil was leading a concert of tropical nations into a new era of prosperity. Others had attacked the Vice President for squandering the dignity of his office by haggling over these carnival sideshows like a bargain-basement P.T. Barnum.\n\nMore than a few newspaper editorials had mockingly referred to the Vice President as "o rei dos pandas". Quadros, in his usual fashion, had responded with a long speech on the virtues of stimulating the nation's imagination. The pandas at the center of the storm were happily munching on bamboo after a few weeks in cages on a boat.\n\nThe people of São Paulo had gone gaga over the animals. Crowds flocked to the zoo to see Gaogao and Pelucia. Vice President Quadros, who moonlighted as a zoologist, entertained the crowds with trivia about the bears and regaled them with stories about Sichuan hot food. After a week or two, when the novelty wore off, the Vice President would move on to his next pet project.\n\nThrough it all, many in the important political battleground of São Paulo had come away with a positive view of their Vice President. Was it all a scheme to increase his popularity among the masses? Critics and supporters of Jânio Quadros agreed; it was difficult to tell where the Vice President's antics ended and his political cunning began."
 brazil.415.a: "How MUCH bamboo do they eat?"
 
 brazil.416.t: "War in Guyana!"
 brazil.416.desc: "The indispensable Walther Salles had grown ever more indispensable of late, in this world gone mad. In his role as foreign minister, Salles was crucial to the current administration. He also appeared to Lott's eyes to be quite overworked. The former businessman's usually impeccable suits were a bit threadbare, of late.\n\n"Yes, Mr. Salles? Please tell me you have good news." Lott rubbed his forehead. His foreign minister fussed with the folder he had brought with him, before speaking.\n\n"I'm afraid news from D.C. are not good. Nixon is angry about Burnham's play, especially late in his term like this. For reasons of domestic politics he is sending in the troops in to show the world the risks of defying the OFN."\n\n"The Americans claim to be free to make and unmake any government in the Americas. How arrogant of them to ignore the sovereignty of any government that vex them." Lott mused. His foreign minister was about to reply when the usual door swing that heralded the Vice President let itself be heard.\n\n"President! The Americans, in Guyana, it's terrible! Brazil will not abet this outrageous abuse of our northern brothers. We should declare in strong words... "\n\n"We shouldn't declare anything in strong words!" said Salles. The foreign minister, as usual, was irritated at the Vice-President's attempt to tell him how to do his job. "We..."\n\n"Enough, both of you." President Lott stood, preventing another round of bickering. "Let me think." The former military officer walked to the window. His foreign minister would be right to argue that Brazil was in no position to poke the Americans in the eye. Quadros was equally correct to protest unilateral American action. The President thought, then turned to face the two."
 brazil.416.a: ""We will support the American intervention.""
 brazil.416.b: ""We will lodge a formal complaint about this.""
 
 #Quadros path press conference
 brazil.417.t: "The Press Conference"
 brazil.417.desc: "The address to the nation had gone smoothly. TV and radio crews had recorded the President's condemnation of the unilateral American intervention.\n\nQuadros was delighted to watch the President at work. Lott's words had been simple and frank. Unilateral action without regard to sovereignty was a poison among all nations of the world. President Nixon should have reached out to regional actors and partners of the United States such as Brazil. In his closing remarks Lott wished for a new era of cooperation between nations of the continent.\n\nDuring the questions period afterwards, some of Lott's good humor ebbed away. Many of the journalists approved of the President's action, asking if Brazil would move to a more proactive foreign policy. One of the reporters, however, came up with a tricky question. The man asked if President Lott's disapproval of the American intervention meant a lack of interest in South American democracy. The President gruffly replied that he did not support dictatorships, but America had been in the wrong there. Subsequent questions on the topic by the reporter and a few others were parried unconvincingly by Lott.\n\nQuadros recognized the man. A journalist from one of Lacerda's awful newspapers. Slavishly devoted to the Americans. The Vice-President was displeased to see someone attached to his own political party attack Lott on this most auspicious day. The UDN would need some housekeeping."
 brazil.417.a: "That fiend Lacerda!"
 
 #Lott press conference
 brazil.418.t: "The Press Conference"
 brazil.418.desc: "President Lott didn't enjoy much talking to the media. His television and radio speech offering praise for the American intervention had been done in his usual perfunctory style. A topic he hammered on was that the Americans' willingness to oppose tyranny in all its form had done its people and the world much good. Burnham's coup had been illegal. In his role as President Lott hoped to see the concert of nations be one day filled with free countries where men's rights were sacred.\n\nAbsent the conference was Quadros, no doubt sulking about the government's unwillingness to criticize the American intervention. This suited Lott, as it made it easier for him to focus on answering the journalists' questions. Most of them seemed content to support his decision for, after all, use of the military to quash democracy was no science-fiction to Brazilians. Good to know the Americans sometimes did the right thing, having exhausted all other options.\n\nOne journalist asked the President if he would support the Americans deposing any leaders they found offensive. President Lott took a second too long to think, eliciting a wave of photos as he glared at the journalist. "I do not support injustice in any form. Burnham is not free to take his people's rights away, nor would the Americans be free to terminate any government they saw fit."\n\nA weak response. Lott answered the remaining questions as best he could. That journalist was familiar to him. No doubt from one of the right wing scandal rags."
 brazil.418.a: "Is Quadros behind this?"

 #Quadros path condemnation
 brazil.419.t: "Brazilian Condemnation"
 brazil.419.desc: "It was the end of yet another meeting of the President's advisor group. Topics discussed that day had been varied, from discussion of Guyana, to brewing trouble in Africa. At one point, Secretary of State Rogers brought up the President Lott of Brazil, and his recent speech criticizing the American war in Guyana.\n\n"Hold up Bill, are you saying Lott's complaining?" The President asked.\n\nThe secretary of state nodded. "Maybe for domestic consumption. Maybe to make his Vice-President happy. That loon's got a serious problem with us keeping the Americas in order."\n\n"What a crock of shit." Nixon shook his head. "Well, whatever they think about this, the Brazilians need us. Lott's a serious man, so he'll probably stop doing stunts like this if he knows what's good. In the meantime, his little tantrum won't affect shit in the grand scheme of things.""
 brazil.419.a: "Who asked them, anyway?"
 
 #Lott path support
 brazil.420.t: "Brazilian Support"
 brazil.420.desc: "It was the end of yet another meeting of the President's advisor group. Topics discussed that day had been varied, from discussion of Guyana, to brewing trouble in Africa. At one point, Secretary of State Rogers brought up the President Lott of Brazil, and his recent speech supporting the American war in Guyana.\n\n"That's good." The President said. "At least some people aren't ungrateful bastards in this godforsaken world."\n\n"Ungrateful sir?" Asked Rogers. Nixon nodded. The secretary of state shrugged. "Bit strange for the man to be pleased with us changing regimes where we see fit. Perhaps he's hoping if the military ever comes around for him in Brazil, we'll stand up for him? Generals are influential in that country. Lott should know, as he's a former officer."\n\nIt was Nixon's turn to shrug. "I hope that bastard doesn't get removed by his own generals. Until then, Brazil's approval is good but hardly world changing.""
 brazil.420.a: "Life goes on"

 brazil.421.t: "Two Brothers-in-Law Walk into a Bar"
 brazil.421.desc: "As Goulart walked into the Governor's Office of Rio Grande do Sul, he heard the song Marcha solene Brasileira being played on a gramophone as he entered. "Brother, you are only two minutes late, a new record for timeliness." Brizola, Goulart's brother-in-law, said. He was sitting behind the desk of the office, but as Goulart entered he stood up and rapidly approached Goulart and gave him a hug.\n\n"It is good to see you as well Brizola, how is the state." Goulart replied, the hug lasting for a few moments before Brizola broke the hug.\n\n"Adriana get us some coffee, you know the way we like it." Brizola said to a secretary who nodded and went to do as Brizola wanted before he turned to Goulart again. "Well the UDN is calling me a communist traitor and trying to remove me, so nothings changed. How is Maria?"\n\nBrizola guides Goulart to a comfortable chair which Goulart sat upon, "Maria, she is doing well, helping to look after the children while I am away." While Goulart talked, the secretary returned with coffee for the two men before leaving.\n\nBrizola began to speak, "Well that is good, tell Maria I sent her my regards. We must of course discuss the Senate election, I am helping directly lead the campaign here and I am running in Guanabara but we both know that is a long shot."\n\n"Indeed, we need your help for campaigning in Santa Catarina and Paraná, if you can provide this." Goulart asked. Brizola stayed quiet for a few moments considering what Goulart just asked, this would more than likely doom his own senate race, but the party came first."
 brazil.421.a: ""Of course, you can rely on me.""

 brazil.422.t: "Fox Tactics"
 brazil.422.desc: "Adhemar stepped onto the campaign bus, staffers flowing around it preparing flyers, leaflets and equipment for the dozens of canvassers, campaigners and officials that were travelling with Adhemar. Winning the Guanabara senate election was essential, with it countless donors and minor politicians would see the PSP as a proper party that could win elections, it would even give his next presidential election a needed boost from investment.\n\nAdhemar briefly sat down, it was 4 p.m. and he had been campaigning since 6 a.m. in the morning. He loved the campaigning, the rush of energy and excitement he got when he heard cheers at rallys, the countless supporters chanting his name. But working for that long did take the wind out of him.\n\nAs he sat he felt the campaign bus move, moving on to another location of the dozens already canvassed. As he took a hotdog from a passing staffer, he smirked. Campaign buses were relatively a new phenomena in Brazilian politics and he was glad he was able to use personal connections with automobile manufacturers in São Paulo to acquire many buses for affordable prices. The opposition parties had been surprised by Adhemar's innovation, supplying PSP candidates nationwide with these buses to fight in the election. It wouldn't be enough in many races, but Adhemar hoped that in Guanabara it would give him the edge to succeed."
 brazil.422.a: "Not just a brash bull, but a cunning fox as well"

 brazil.423.t: "The Matter of the Senate"
 brazil.423.desc: "Brazil's Congresso Nacional finds itself a house divided in the aftermath of the 1962 parliamentary elections. Though on paper the Congresso Nacional appears to be controlled by the Varguist alliance of the PTB and PSD, it is nowhere near as simple as that. As one might expect, there are frontlines, fault-lines and factions enough to make elementary schoolers' playground squabbling seem like a manifestation of student unity by comparison.\n\nIn the Câmara dos Deputados - the lower house - João Goulart, formerly Vice-President under Juscelino Kubitschek, was able to garner enough support from the PTB, PSD, PSP, and other minor parties to be elected to the position of President of that chamber.\n\nBut in the Senado, the rightist PSD candidate, Auro de Moura Andrade, not known to be on good terms with Goulart, was the one that became President. Because the PTB, taking advice from Goulart, refused to countenance having him serve as President of the Senate, Auro instead relied upon cross-alliance support from the UDN and other opposition parties.\n\nThis situation, though less than desirable, is probably manageable for President Lott, unless some kind of crisis occurs that would require Auro and Jango to collaborate, which strikes most observers as an unlikely occurrence at best."
 brazil.423.a: "Duly noted."

 brazil.424.t: "The Matter of Oil"
 brazil.424.desc: "Henrique Lott was meeting with the board of Petrobras, who he had recently helped to expand their operations. The meeting was cordial despite the relatively displeasing subject matter. While a man like Quadros might lose his mind in anger with what was being discussed, Lott was thankfully made of sterner stuff.\n\n"So you're telling me that despite the recent expansion of Petrobras operations, it's still a drop in the bucket compared to what we have to import from elsewhere?"\n\nThe President of Petrobras spread his hands. "I'm afraid that that is the case, your Excellency. We still have to import supplies from the Italian sphere and the Middle East - from ENI and what have you - and that shows no signs of stopping for the foreseeable future. Twenty years at least is what we're expecting before we can wean ourselves of this."\n\nLott was visibly displeased, though he understood where the man was coming from. "And what if we continue industrializing?"\n\nThe chief financial officer answered this one. "Regrettably, your Excellency, that 'twenty years' figure my colleague found will only get bigger if we keep on industrializing. If we go at the level we've gone during your time in office, sir, it'll probably be forty years; if we go at the level that Senhor Kubitschek did, what with his 'faster-faster-faster' doctrine of industrialization, it might be a full century."\n\nLott shook his head in displeasure. "This cannot be borne, gentlemen. I will have to insist that you find a way to make this change, as soon as possible."\n\nAt this moment, a secretary walked into the room with the day's paper. Lott read it; his eyebrows went up for a moment, and he pushed the paper towards the oil executives. The headline said "OIL PRICES DESTABILIZED BY ITALO-TURKISH CONFLICT"."
 brazil.424.a: ""There's an impetus for you, gentlemen. Get to work!""

 brazil.425.t: "The Issue of Wilson"
 brazil.425.desc: "Wilson Leite Passos, a congressman of Carlos Lacerda's UDN, had recently won reelection for his seat. But the governor of Guanabara, far from being happy about a party member winning as he might have been for virtually anyone else, was incandescent with rage and displeasure. So much so, in fact, that one might say that Lacerda might have even preferred Getúlio Vargas himself to win the seat, though it would be a colossal blunder to actually claim it to Lacerda's face. Why might one say that? Because at least Vargas, unlike Wilson, wasn't a fascist; everyone - from Henrique Lott to the denizens of Guanabara - knew that Lacerda hated fascism.\n\nThough Lacerda had managed to calm himself down about the matter, his anger that day was reignited by a recent newsflash from one of Wilson's recent speech engagements.\n\n"What? You're telling me that that good-for-nothing German-loving Nazi-aping asshole Wilson wants us to have closer ties with Germany? And he publicly said so?"\n\n"I'm afraid so, sir."\n\n"Was there even a slight hint of irony or sarcasm in his voice?"\n\n"None at all, sir."\n\n"For fuck's sake. That Hitler-loving idiot will make us all slaves to those eagle-added, bigoted blonde bastards if we don't contain him. Ester go and tell the party leaders that this piece of human trash had better be dealt with before he gets too much influence if they don't want me to come and deal with him and them too."\n\n"Yes, sir. I will inform them."\n\nAs the secretary left, Lacerda drank some whisky to calm himself and shook his head."
 brazil.425.a: "Why the hell would anyone find something to admire in that horseshit?"

 brazil.426.t: "A Day in Guanabara"
 brazil.426.desc: "It was half past ten at the Favela do Pasmado when the court officer arrived at the local community center. Despite the pompous name, it was nothing more than a larger shack, which the residents use for gatherings. That nervous man approached Mr. Narciso, pulling from his jacket a document with the title "Eviction Notice".\n\n"I'm sorry, it's signed by Governor Lacerda. In ten days, he wants the favela cleared out for the construction of the new tunnel. It's a higher order."\n\nMr. Narciso sighed - "That is not a problem, my friend. Tomorrow, in the morning, I will leave my shack- don't want to see your tractors running over it. And besides, it won't be hard for me to find a place to live- I can fit everything I own inside my pockets. But, ah, those people, what about them?" Narciso looked around, to the mass of families coming and going through the narrow alleys.\n\n"Well..." The court officer said after a small hesitation. "The Governor is building a new neighborhood for them. With support from the Americans, we will put them on buses and take them to the their new houses. It's in Bangu, beyond the factory."\n\n"Damn," said Narciso, disappointed, "In Bangu beyond the factory?""
 brazil.426.a: "I guess it's time to leave."

 brazil.427.t: "Bem-Vinda"
 brazil.427.desc: "As Sofie Walter landed in Guararapes Airport for her "vacation" in Brazil, she breathed a sigh of relief. Back home in Hamburg she had had to look over her shoulder in fear ever since she realized she liked women in a rather more intimate way than most people did. In the kind of way that was more than enough justification for Himmler's lot, or the SiPo for that matter, to come in the dark of night and take you away to be "reeducated" as a "degeneration of the true Aryan woman".\n\nSofie kept looking over her shoulder until she could bear no more. At last she enlisted the help of some trustworthy connections, some of whom were apparently connected to the more radically liberal members of her generation. This combined with the support of some of her more open-minded family members was enough for her to scrounge together enough Reichsmarks to go someplace more welcoming. She took enough with her where she would be able to establish herself, but not so much as to attract police attention.\n\nAs Sofie stood in the inspection line, she grew more and more nervous. She had heard that Brazil was remarkably welcoming to refugees from Germany, but she kept second-guessing her decision. When she finally made it to the front of the line, she handed her passport and papers over to the officer and said a Portuguese sentence she had rehearsed over and over again:\n\n"Sir, I am a refugee fleeing from Germany."\n\nThe officer at the till looked at her for a while, sighed, stamped her documents and returned them to her. Then he motioned for her to continue into the airport. Sofie nodded and moved on.\n\nAs Sofie Walter headed away, she heard the same practiced sentence that the officer gave to every single Brazilian and immigrant that passed him by. Unlike most others, however, those words lifted her heart as nothing else had in years."
 brazil.427.a: ""Bem-vinda ao Brasil.""

 brazil.428.t: "The Street Cleaners"
 brazil.428.desc: "It wasn't even eight in the morning. Samuel Wainer already regretted not leaving his suit in the car before setting out on this trail in the humid forests of the Guandu River, hours away from his beloved Copacabana. He also regretted going there himself instead of sending one of the many reporters who worked for him. But the lead was too juicy to let go.\n\nA man called his house early in the morning, claiming to be the only survivor of a group of homeless men who had gathered to be housed by a government program. But instead of being taken to a shelter, they were taken to a clearing in the woods and executed by police. After evading his would-be executioners all night, the survivor called from a public phone to request a meeting with the famous journalist.\n\nNow, with mud on his hard-soled shoes, Wainer followed the man called Júlio to the place where his supposed execution was to take place. As they approached, even the tropical forest couldn't contain the stench and the screeching of the vultures. Perhaps Wainer hadn't wasted his morning after all.\n\nFour bodies, all with their hands bound and gunshot wounds to the head, lay in a clearing. Wainer wished he had brought a better camera as he listened to Júlio's description of the killings. His eyes widened as Júlio talked about how one of the killers, called "Inspector" by the others, tortured the victims in front of everyone, as if he were teaching his fellow jackals torture techniques. It was as if he had struck gold. They were so focused on the scene that they did not notice a group of three armed men approaching them.\n\n"Citizens, I am Inspector Mariel Mariscott of the Civil Police; you are tampering with a crime scene. Leave or I will have to arrest you."\n\nJúlio froze in place, shaking in fear of the inspector whose hand rested on his gun. Wainer looked at them and smiled. He knew that if he had not been there, the scene would have ended differently."
 brazil.428.a: "A big story?"

 brazil.429.t: "The Big Green Swiss Cheese"
 brazil.429.desc: "As a kid Heitor had always been fascinated by the big Swiss cheeses found at the local fine imports grocery store. The store's owner often had on display a big hunk of European cheese, full of big holes. His mother had explained to him that the cheese making process generated those holes. She had laughed him off when he asked if the store keeper charged less for cheese with more holes in them.\n\nHow nostalgic for those days did Heitor's new job in the government make him. The Trans-Amazonian Highway crossed a great deal of land. Landholders big and small were of course displeased by the idea of seeing their property cut in two by a great highway through the Brazilian interior. Of course, not everyone had the means to complain about it in the most efficient method.\n\nIn front of Heitor stood a great green map of the next hundred kilometres of the highway, with more holes than the grandest of Swiss cheeses. Throughout the map were several dark circles, ellipses, rectangles, and all sorts of other shapes a geometrist could have better named. All land belonging to local bigwigs. Men of great means, and generous hearts. Heitor had received his share of the bribes to make him and others consider accommodating 'local interests'. The highway's path would have to be slightly adjusted. Of course, all this would generate delays, and additional expenses, but what could Heitor do? The local magnates were attached to their lands, and the people working on the Trans-Amazonian Highway needed the extra cash.\n\nAfter all, the recent wars in Europe had made luxury foods pricier than ever."
 brazil.429.a: "Blessed are the cheesemakers."

 brazil.430.t: "Corruption on the Trans-Amazonian Highway"
 brazil.430.desc: "Work was never done for a President.\n\nHenrique Teixera Lott at least diligently read every memo making its way to his desk. However there were only twenty four hours in a day, and not everything could get done at once. In particular, corruption issues on the nation's numerous government projects was a constant source of headaches. The President's most recent acquisition was a report on a stretch of the Trans-Amazonian Highway that had turned out more crooked than a crime boss' tax returns. It was a good thing that whatever public servant had planned the stretch of road was not in charge of teaching the nation's children about geometry. President Lott had seen drawings by Escher with straighter lines.\n\nA depressingly typical case, then. Local bigwigs had paid the government's engineers to avoid their land. The highway had thus curved back and forth. Delays had been generated. Bribes were no doubt being spread throughout the entire chain, up to and including PSD-PTB cabinet members. The former general sighed. This was a trivial case, but not one he had time for right now. He moved the report to the side and called for an aide to store this for later. There would be time enough to ferret out these small fishes when other cases had been completed."
 brazil.430.a: "This Heitor Gomes will have his day in court, eventually."

 brazil.431.t: "A Misplaced Report?"
 brazil.431.desc: "Life as the Vice-President was pretty uneventful. Beyond accomplishing whatever task Lott deigned to assign him, Vice-President Quadros spent a depressing amount of time erring through the presidential palace like a lost dog, holding a suitcase full of documents not going anywhere anytime soon. Occasionally he'd drift into the antechambers of the President's office. Lott's secretaries usually tried to stop him from visiting the President himself.\n\n"I just want to help, right? The President is a hardworking man."\n\n"Of course, sir!" The young secretary was polite, but not very involved in the conversation. A cardboard box sat at the corner of his office, on the floor.\n\n"What are those?" Asked Quadros. The secretary looked down, then back at his work.\n\n"Just files the President wants to look at later. He's too busy to tackle them right now."\n\nQuadros took a few files from the box. The secretary moved as if to stop him, then realized the Vice-President would leave him alone for a few moments.\n\nThe document was yet another file on government corruption. The President had dutifully handled most cases that made their way to him. Yet, something about his apparent lack of enthusiasm to solve them rapidly had picked up Quadros' interest. It wasn't the first incident that the Vice-President had catalogued. There was probably nothing more to it, yet the whole thing made him uneasy. The Vice-President kneeled to replace the other files in the box, and kept the corruption report in his suitcase. The secretary barely glanced at him as Quadros left the room."
 brazil.431.a: "Always good to keep an eye on political rivals."

 brazil.432.t: "Murder Most Foul"
 brazil.432.desc: "A report sat on the desk of Henrique Lott. This in and of itself was an extremely regular occurrence; reports on all kinds of things, from the doings of the foreign tyrannies to the latest São Paulo flap du jour, found their way to the desk of the President all day any day. But this report was something different, something much more problematic.\n\nIn the headwaters of the Aripuanã River, exactly on the 11th parallel south, a firm had been collecting rubber. There were natives - of the Cinta Larga tribe apparently - that lived in a village in the area; they had probably done so for generations. But one fine morning, the head of the local rubber firm wanted to remove the villagers. He claimed to his goons that the Indians were "parasites, shameful, pests and vagabonds" and resolved to exterminate them. So that is what he did. Brutally. So brutally, in fact, that even some Nazis and Japanese Lott knew of might blanch in horror and disgust.\n\nLott read through the rest of the report. Even he, a military man, well acquainted with death and destruction, could not stand to discuss what he saw about just what had been done to the natives. While one might criticize their supposedly "backwards" culture (though Lott doubted that it really was as "unenlightened" as some might say it was), that kind of treatment was more befitting of the barbarian tyrannies beyond the seas. What horrified him the most was that it had only come out because one of the goons hadn't been paid enough and so decided to run whining to a prosecutor in Cuiabá.\n\nLott resolved himself. This could not be borne. Decisive action had to be taken. Some of his officials objected, but he overruled them. Political considerations were neither here nor there. Justice had to be done."
 brazil.432.a: ""Deploy police to the 11th parallel and see that human filth brought to justice!""

 brazil.433.t: "A New Dawn For Laborism"
 brazil.433.desc: ""I rise to power anointed by popular will, that same will that previously elected me as Vice President of the Republic, and this will I shall respect, conscious of the grave duties that I have before this nation."\n\nJoão Goulart's voice boomed through the microphone. A multitude of politicians, journalists, and ambassadors gathered in the main hall of the Superior Electoral Court, as they watched the new President of Brazil proclaim his first speech.\n\n"We shall promote internal peace, a peace with dignity, in defense of all democratic and constitutional rights, and our government shall uphold our national sovereignty above all. We now have the power of the unity of the Brazilian people. With this power, with this popular mandate, we shall fight with all our forces to mobilize our entire country in this internal struggle. The struggle against poverty, illiteracy, the struggle against underdevelopment in our country. We shall strive for those who need and battle against all forms of injustice."\n\nJuscelino Kubitschek stood there, like many other PSD and PTB members, confirming their support behind Goulart. Most notable was the lack of military representatives, save for Lott and a few other legalists. Outside the Court, a large crowd cheered on the new President, though UDN members and other counter-protestors also made their presence known, clearly proclaiming themselves to be Goulart's fierce opposition."
 brazil.433.a: "And so, the labor movement seizes the presidential chair."
 BRA_no_content_lol_tt: "§YThis president's content is currently incomplete. Their full content will be released in the future, so stay tuned!§!"
 
 brazil.434.t: "Another Four Years"
 brazil.434.desc: "It was a song and dance he was all too familiar with; President Kubitschek pledged himself to uphold the constitution and the laws of the land. He pledged his service to the Union and the people of Brazil, and soon he was leaving the National Congress to the sound of the band and the cheers of thousands.\n\nAs Kubitschek walked down the ramp of the National Congress, the shining jewel of the city he helped create, the heavy guns of the Presidential Honor Guard fired. In the distance, the President could hear the 21-gun salute sounding off in his honor. Before him, as per the rituals of the inauguration, was the Presidental Honor Guard, dressed in their Napoleon-era ceremonial uniforms. Kubitschek saluted the men as the band played the national anthem, walking past the row of soldiers.\n\nThe last formation of the group was starkly out of place, however. Wearing modern dress uniforms, these were veterans of the South African War. As Kubitschek walked by, he made a note, not of their immaculate uniforms or stiff salutes, but their gazes. Distant and lost, the President could see the scars of battle in their eyes. They may be standing here, as national heroes, but only time would tell if their service would be all worth it.\n\nThe roaring of fighter jets snapped Kubitschek out of his wandering thoughts, the air force flying in formation far above the crowd."
 brazil.434.a: "To the future of Brazil!"
 
 brazil.435.t: "The Inaugural Speech"
 brazil.435.desc: ""Having been elevated to the presidency by the will of the people of Brazil, I can do naught but begin the exercise of this function without thanking the nation for this vote of hope and confidence." So began President Jânio Quadros' first speech to the nation. Assembled journalists, still in mild disbelief, stood at attention.\n\n"This mandate rests on twin pillars. The health and morals of Brazil, as well as its relationship to the world. Two pillars whose foundations must be tended to simultaneously. How are we to present ourself to the world, our economy exsanguine from years of profligate spending, our backs burdened by endless debts, our hearts sullied by vice and reprobate actions? And how are we to tend to our own affairs as nations of the world jostle for influence, trampling over the sovereignty of other nations?\n\nThe 20th century has seen the emergence of four worlds. Three of them in the so-called north, the empires of America, Germany and Japan. A fourth one of independent nations, bereft of the prosperity so desired by all of mankind. Unlike the conflicts between the factions of the north, ideological in nature, the economic divide between the north and south is a mere accident of history, an artificial barrier to progress and wealth. This presidency shall look beyond the ideologies of Americanism, Germanism, Pan-Asianism, and anti-colonialism, to seek friendship between our republic and the world, with enmity toward none.\n\nThis independent foreign policy will be nothing but the magnanimous continuation of our domestic policy. A return to a better past will be the building block for a greater future. This government will free itself from the boulder of debts endlessly rolled uphill by the previous administration. Its energies freed from a once sisyphean burden, we will be free to tackle the scourges affecting our nation such as gambling, public immorality and corruption of office holders. May God almighty guide and protect me on the path ahead!""
 brazil.435.a: "A drunkard and a great orator?"
 
 brazil.436.t: "The Crow Caws"
 brazil.436.desc: "Carlos Lacerda, now President of the United States of Brazil, was, without question, the happiest man on Earth. Just the sound of the people chanting his name outside of the Brasília Cathedral was enough to fill a man with awe and excitement. Lacerda made his way to the Congresso Nacional and took the oath of office:\n\n"I promise to preserve, defend and uphold the Constitution, observe the Laws, promote the general welfare of the Brazilian people, and to sustain the union, the integrity and the independence of Brazil" Flanked by many of the former Presidents, even with Vargas as the expected absentee, Lacerda gave his speech to the nation:\n\n"People of Brazil, I cannot thank you enough for this monumental victory. Democracy, our very way of life, is in danger from enemies within and afar, and you know exactly who I'm talking about, the Nazis, the Communists, and God forbid, the Varguists."\n\nAt that very moment, Lacerda could hear the deafening sound of cheers and boos all across Brazil. He could even feel the searing anger of Vargas himself. He paused his speech to allow for the crowd to simmer down before resuming.\n\n"As your President, I will see to it that none of these vermin shall pose a threat to our glorious nation. I vow to strengthen the unity, justice, and liberties our country offers, to take our place amongst the nations of the free world, and to bring glory to our nation, for Brazil is number one!" As the people gave their energy in voice to Lacerda, he, in turn, let out a pearly white smile and concluded his speech."
 brazil.436.a: ""Let's get to work.""
 
 brazil.437.t: "The Bull Triumphs"
 brazil.437.desc: "Today was Adhemar de Barros' hour. At last, thanks be to God and His Mother, Adhemar was free to practice his unique and effective system of governance, for his betterment and that of those who supported him, not to mention that of the Republic and its people. But before that he had to be sworn in and make a speech. And he went about it with aplomb... or so he thought.\n\nEveryone else on the other hand saw an eccentric, almost nonsensical speech that went from religious-traditionalist invective to Brizola-style left-wing rhetoric and populism in two sentences flat. As his rhetoric swung like a pendulum, he took out a Cuban cigar and began to smoke it. The PSP sycophants continued to applaud as he spoke, but even they could not hide their confusion.\n\nIn Olinda, the newly-appointed archbishop, Hélder Câmara, resisted the urge to either lose his mind laughing or fly into a rage as the nearly-incoherent speech wore on. In São Borja, on the other hand, Getúlio Vargas' looked more and more bemused the more came out of Adhemar's mouth. His son Getúlio, sitting next to him, merely shook his head in amusement.\n\nNext to Adhemar, his Vice-President, Edna Marília Lott of the PTB, daughter to the previous President, was directing a funny look at him, not even bothering to disguise her confusion. A journalist observed this and then looked at a friend of his who worked for one of Carlos Lacerda's newspapers. His mouth worked before he was finally able to ask:"
 brazil.437.a: ""Is history repeating itself?""

 brazil.438.t: "Failure of the Lott Act"
 brazil.438.desc: "Operation Toucan and its linchpin, the Lott Act, was a plan to remove once and for all the threat of untoward military intervention in our Brazilian democratic order. It aimed to depoliticize the armed forces and teach soldiers, airmen, and sailors to understand once and for all that they are merely citizens in uniform, nothing more and nothing less. But it had failed. He had failed.\n\nHe prayed that God would have mercy on Brazil, and on its future Presidents. They would have to reckon with the threat of the hardliners despite his best efforts to do away with the threat.\n\nLott maintained a stoic front, but his defense minister, Odílio Denys, could tell how disappointed he was. "Don't get yourself down, Henrique, you did everything you possibly could."\n\nLott nodded and sighed. "This happened because the politicians were too damned cowardly to do their jobs, to defend their own mandates. Well, it matters not. If they cannot do it, that does not mean I can't. I think I know where I will go when my presidency ends.""
 brazil.438.a: "This is not the end. No, it is the beginning of something new."
 
 brazil.439.t: "Victory for the Lott Act"
 brazil.439.desc: "Operation Toucan and its linchpin, the Lott Act, was a plan to remove once and for all the threat of untoward military intervention in our Brazilian democratic order. It aimed to depoliticize the armed forces and teach soldiers, airmen, and sailors to understand once and for all that they are merely citizens in uniform, nothing more and nothing less. And it had succeeded.\n\nThank God, hell, thank His Mother too. It had succeeded. Brazil was free from military threats.\n\nPresident Lott celebrated the success of his passion project by drinking some champagne in the presence of prominent constitutionalists in the Brazilian military, many of whom were flush with joy and hope (as well they might be).\n\nLott made a small speech. "We have managed, gentlemen, to ensure that the Brazilian military is first and foremost a defender of democracy. We have at last succeeded in showing Costa e Silva and the other elitists their place. Gentlemen, I congratulate you and salute your efforts!"\n\nA few cheers and a wave of applause ensued. Amidst all this, Lott took some small pleasure in the knowledge that Marshal Denys would have to hear of this news from prison, and know that his attempt to stop progress had failed miserably. True, he considered, the prospect of military intervention in politics had not fully dissipated, but now was not the time to dwell on such topics. Today was a time for celebration."
 brazil.439.a: "A weight lifted off of Lott's shoulders."
 
 brazil.440.t: "The Failsafe"
 brazil.440.desc: "The Lott Act having succeeded, it was now time to put failsafes in place, 'lest the military find a way of wriggling around the proposals and attempt to play the politician again. To that end, President Henrique Teixeira Lott met with an old friend of his, the four-star General Peri Constant Bevilacqua, to discuss putting the said precautions in place.\n\nIn discussions with Bevilacqua and other officers of the constitutionalist faction, Lott created various plans and stratagems whereby the hardliners and their bastard of a leader Costa e Silva would be kept as far from the levers of power as possible. The potential threat posed by ambitious hardliners in the old and young guards of the armed forces was analyzed from countless different angles, and methods to keep them down and out were hammered out.\n\nLott ended the meeting by reminding the officers that democracy needed eternal vigilance to survive; if constitutionalist vigilance failed, it would likely mean ruin for the constitutionalists and their families, to say nothing of the armed forces and Brazil itself. The officers nodded and resolved to follow Lott and Bevilacqua's guidance."
 brazil.440.a: "Duly noted."
 
 brazil.441.t: "The 11th November Movement"
 brazil.441.desc: "The Lott Act having failed, alternate methods needed in place, 'lest the hardliners exploit this moment of weakness and try to seize power. To that end, President Henrique Teixeira Lott met with an old friend of his, the four-star General Peri Constant Bevilacqua, to discuss putting the said precautions in place. One of these was to establish a secret organization - the 11th November Movement - to ensure the failure of any future coup.\n\nIn discussions with Bevilacqua and other officers of the constitutionalist faction, Lott created various plans and stratagems whereby the hardliners and their bastard of a leader Costa e Silva would be kept as far from the levers of power as possible. The potential threat posed by ambitious hardliners in the old and young guards of the armed forces was analyzed from countless different angles, and methods to keep them down and out were hammered out.\n\nLott ended the meeting by reminding the officers that democracy needed eternal vigilance to survive; if constitutionalist vigilance failed, it would likely mean ruin for the constitutionalists and their families, to say nothing of the armed forces and Brazil itself. The officers nodded and resolved to follow Lott and Bevilacqua's orders as part of the new movement. But it had to be kept secret, they all knew; otherwise it might lead to a coup all on its own."
 brazil.441.a: "Duly noted."
 
 brazil.442.t: "The New Order"
 brazil.442.desc: "The following is a transcript of part of an audiobook discussing the early years of the now-defunct military dictatorship in the Republic of Brazil:\n\n"The fact that the chains of a ruthless military dictatorship had begun to weigh down on countless Brazilians from Porto Alegre to Manaus and beyond did not absolve them from their daily duties. A case in point of this was a story told by Senhor Valdomiro da Silva, now a retired businessman and philanthropist.\n\n'One day, after the dictatorship started, I went to work in Rio as I always did at the time. As you might expect I was kind of nervous, what with all the guns and troops running around. At the time I wasn't as opposed to the prospect of military rule as I became with age, but even then I still couldn't get used to the constant thumping of patrolmen's boots and the occasional shouting of orders by the security troops.\n\nOne time or two I even swung my head around thinking I had been shouted at only to find nothing or some other poor sod being ordered around by the soldiers. Rather than worry about it I just thanked God it hadn't been me and moved on as quickly as I could.\n\nNow one thing really stood out to me on this particular day. I was some hundred or so metres away from my then job, the warehousing company that I later came to own. I almost didn't notice the newspaper on the ground saying "ELECTIONS POSTPONED IMMEDIATELY; CONGRESSO NACIONAL DISMISSED". It took me a good long time to realize just how devastating this was, but for the time being I shrugged and had only one thing to say:""
 brazil.442.a: ""Huh. So this is the Brazil we all live in now.""
 brazil442_tt: "§YCongratulations.§!"
 
 brazil.443.t: "A Sudden Attack"
 brazil.443.desc: "It was a bomb that shattered the national illusion that President Castelo Branco had everything under control.\n\nThe explosion happened in the lobby of the Recife International Airport. It claimed fourteen victims, among them security guards. It would have claimed Castelo Branco's life too, had he boarded the plane on time and not been delayed for ten minutes at his house.\n\nThe President was now kept at his house under heavy military guard to prevent further attacks.\n\nAnd as the smoke cleared, as the dead were dragged away, as the broken illusion's cracks widened, three letters emerged.\n\nALN."
 brazil.443.a: ""But the communists are supposed to be all dead!""

 brazil.444.t: "Costa's Ultimatum"
 brazil.444.desc: "Castelo Branco was already sitting down when Costa e Silva barged into his office without even knocking.\n\n"Silva, you do not have the authority to enter my office without my explicit orders-"\n\nSilva ignored him and sat down.\n\n"Let's face the facts, sir. After such a cruel attack by those communist savages, clearly our great country is far too unstable to return to democracy as planned. Don't look at me like that! We must be harsher for the good of the country. These communists fight dirty, so we'll do the exact same. Then we can launch a successful counteroffensive and return this country to greatness."\n\nSilva paused.\n\n"Sir, I hope you'll follow what I said."\n\nAs soon as Silva got up and left, Castelo mulled over the meeting. The message was clear as day. One that every President, civilian or military, in Latin America knew by heart:\n\nDo what I say, or I'll coup you."
 brazil.444.a: ""He's right. We need to fight fire with fire. Elections must wait.""
 brazil.444.b: ""To Hell with him! How dare he threaten me!""

 brazil.445.t: "The Old Marshal Rises"
 brazil.445.desc: "In a military-controlled ceremony in the building of the Congresso Nacional, Humberto Alencar de Castelo Branco, by military backing President of the Brazilian nation, received the symbol of his office - the green-and-yellow Presidential sash - from his predecessor, the utterly forgettable Pascoal Ranieri Mazzili. As he took possession of the sash he was flanked by his two lieutenants, Artur da Costa e Silva and Ernesto Geisel; they applauded politely the whole time.\n\nThen, with his right hand on the appropriate document, Castelo Branco swore the oath: "I promise to preserve, defend and uphold the Constitution, observe the Laws, promote the general welfare of the Brazilian people, and to sustain the union, the integrity and the independence of Brazil."\n\nAmidst the applause of the assembled crowd of hot and cold running yes-men, Castelo Branco made a brief address: "I will defend and promote with honor and loyalty the Constitution of Brazil. We will march forward into the future with the assurance that the remedy to the evils of the extremist left will not be the birth and control of a reactionary right wing!"\n\nAt that, the chamber burst out into applause.\n\nIn the background, Sílvio Frota nodded slightly in approval. Perhaps he could work with this."
 brazil.445.a: "Rule by the jackboot, not by the ballot."

 brazil.446.t: "Netto's Miracle"
 brazil.446.desc: "Antônio Deffim Netto walked into the office of the economic ministry of Brazil and coloured himself pleased.\n\nHe had just now left a meeting with the President, Marshal Castelo Branco. That had been the best meeting he'd had with a President or an army man in his entire life.\n\nCastelo Branco trusted whatever he said: "Reducing inflation," Deffim had suggested, and Castelo Branco agreed. "Government intervention in the economy," Deffim proposed, and Castelo Branco merely nodded in agreement. Never in his life had Deffim thought anyone would be willing to hear his ideas out, and with such total trust at that. Now that the Marshal had done so, Deffim would make himself worthy of that trust right away.\n\nShaking himself, Deffim called for his economic advisors.\n\n"Alright, gentlemen, I had a great meeting with His Excellency just now, and he likes what I've suggested!"\n\nThe economic advisors, most of whom had sympathized with his ideas but feared reprisal for supporting them to the military's face, applauded wildly.\n\n"Thank you, thank you kindly, gentlemen! But we can't sit on our laurels right now; we've work to do. I want you lot to help me sketch out ways we can have the Brazilian government intervene in the economy, so we can help bring about a stronger nation. Got that?""
 brazil.446.a: "Rule by the jackboot, not by the ballot."

 brazil.447.t: "Now What?"
 brazil.447.desc: "When Humberto de Alencar Castelo Branco and his hardliner lieutenant, Artur da Costa e Silva, met on a cloudy evening in Brasília, the situation was nowhere near good. In fact, both of them knew full well just how far from good the situation was.\n\nCosta e Silva began the discussion: "The situation is grave, Senhor President. You probably know by now that there is increasing pressure from the military to deal with the Varguist and communist threat, and right quickly at that."\n\nCastelo Branco sighed and shook his head slightly.\n\n"You're right on all of that, Artur. And I agree with you that action needs to be taken quickly."\n\nCosta e Silva nodded and made to further present his case, but Castelo Branco raised his hand.\n\n"The problem is, Artur, that the methods that you and your colleagues are suggesting go too far. We are fully capable of dealing with them without the violence and whatnot you people are suggesting."\n\nCosta e Silva repressed the urge to look mutinous and made a counter-proposal, "Surely, Mister President, we can agree on a baseline set of measures?"\n\n"Such as?"\n\n"Repressing the left and integrating the right," Costa e Silva said, while handing a set of documents over.\n\nThe President looked at the documents and nodded approvingly. "Yes, these work for a baseline. Go through with them, Artur.""
 brazil.447.a: "Costa e Silva saluted stiffly and left to get to work."

 brazil.448.t: "Regathering our Thoughts"
 brazil.448.desc: "Costa e Silva straightened his posture as his fellow hardliners took their seats.\n\nA quick glance across the room. His colleagues were all there, from Prota to even Burnier, who'd bothered to show up this time. Time to start the discussion.\n\nImmediately he was greeted with a cacophony of angry voices, cursing that lousy civilian in uniform, Castelo Branco.\n\n"He's a complete failure as President already! We need to remove that ugly son of a bitch - it's all his fault! I knew it all along..."\n\n"The Nazi-Communist terrorists are strong as ever and we need to crush them now! My men are ready to kill; just give the order, sir!"\n\nSilva held his hands up, and the hardliners quieted down.\n\n"I'll talk to Castelo myself. He'll see reason and stay in power for now. I know we like to blame him, but it's only a first attack. We shouldn't remove him so soon. We're officers, not brainless civilians. Unlike them, we conduct reconnaissance until we can plan our next move."\n\nMurmurs of agreement greeted him."
 brazil.448.a: ""Let's not forget that the communist scum are the real enemy here, gentlemen...""

 brazil.449.t: "Trust in the System"
 brazil.449.desc: "With a nervous grimace on his features, Marshal Denys knocked on the door of President Lott's office. A moment later he heard a call for him to enter and opened the door to face the man, giving him a salute. "Mr. President, you called to see me?"\n\nLott rose from his desk to stride towards the general, meeting his worried look with a smile "At ease, and yes, I wanted to discuss the matter of General Brasil's proposal." Denys held his breath. "After some consideration, I have decided to go against it."\n\nRelief flooded through Denys and saw a smile alight his face. "Ah, that's good to hear. I trust you have other plans in mind for the army?"\n\nLott nodded "Indeed, we'll stick with the National Defense Council's advice and follow standard procedure. It's better to stick with what works and let the men know I respect them, and let them know they can trust me to lead them."\n\n"Of course! Your trust has been placed in good hands my friend." A vigorous grin adorned his face now, before adopting a more cautious expression. "I don't suppose that means you'll put off that new bill of yours for a bit longer?"\n\nAt this the President shook his head "No, I intend to stick with the schedule as I planned it."\n\n"Sir, with all due respect," Denys began with a frown on his features "I think we have more important matters to deal with, such South Africa and-"\n\n"Marshal," Lott interrupted with a stern look. "My mind was made on this long ago, this is not a matter I intend to ignore nor one I will debate on. I have placed my faith in you, now I ask you to place your faith in me, can you do that for me?" Denys sighed in disappointment but nodded."
 brazil.449.a: ""Of course, Henrique...""

 brazil.450.t: "Making New Friends"
 brazil.450.desc: "On the outskirts of Brasília there was a renowned establishment best known for its status as home to one of the country's more popular officer clubs. Here it was a common sight for military men to sing, drink, gamble, and share stories of their experiences in the armed forces, but today was a special one for the club was host to none other than President Henrique Lott himself.\n\n"Gentlemen, I would first like to say that it is a great honor to see you all here." He began to his audience of Constitutionalist and Sorbonne officers, while hardliners and unaligned individuals were tactically uninvited. "Today I wish to remind us all of what drives us; our love for our homeland and people, the patriotic feeling in our hearts and nationalistic fervor that calls us to go above and beyond for all of Brazil!" To this there was a general murmur of agreement among those gathered, some men raising their drinks or cheering.\n\n"After all, would a man without these qualities drive himself to protect the treasures of his homeland? In this world of tyrants within politics and economics alike, we are the ones who control our oil, nobody else!" This time the response was more raucous, no other leftover policy from the Vargas era could claim such universal popularity within the ranks of the military.\n\n"Secondly, I would like to remind us of what our goals should be; we are not just here to fight and defend in the name of home and people, but we are also called upon to defend what makes our country worth fighting for, its democracy and the constitution that upholds it!" The cheers were still there, but more muted, most of it came from the Constitutionalists while the Sorbonne were more restrained. Lott kept his grin up but could not help but feel worried; the situation was worse than he was anticipating. Still, he was determined to end this evening with more allies than he began with."
 brazil.450.a: "Continue pressing for the defense of democracy."
 brazil.450.b: "Go back to praising nationalism."

 brazil.451.t: "An Appointment with Assis Brasil"
 brazil.451.desc: "An almost rejuvenated, child-like grin grew unto Lott's face as he skimmed through the assembled military reports. For a chance, Brazil's military was showing an impressive capacity to progress and evolve, with new officer appointment suggestions underway. His peaceful enjoyment, however, was swiftly interrupted, as he remembered the man sat before him.\n\nOn the other end of the table was found Assis Brasil, who had been waiting intently for their meeting to begin, to the point his leg lightly trembled in anticipation, "Though dangerous, and what some may possibly find outrageous, reshuffling the military is for the better. Not doing so may leave you in a weakened position."\n\n"I agree," Lott replied, closing the folders in his palm and tucking them away into his desk drawer, "Though breaching the current military command structure may undermine my entire position. Though I trust that you yourself will remain by my side, should anything... unfavorable occur."\n\n"Naturally, I would never attempt to challenge your authority. Daring to do so would be against my very principle. However, there are some who I worry may not think as much the same...," Argemiro suddenly paused, shaking his head left and right, and leaning forwards in a hushed voice, "Especially men as Costa e Silva, or Odílio Denys."\n\nLott's brows perked furiously, surprised and confused, leaning back into his chair, "How could you say such a thing? Do you not understand that Denys is loyal only to me, and not in a thousand years could I expect him to betray my trust?"\n\nArgemiro shuffled uncomfortably in his seat, offering only a bob of the head as his struggling smile failed to express his ultimately well intended advice. He dropped back into his seat, grunting as his body connected once again with the backrest. Almost trying to avoid Lott's attention, he quietly muttered under his breath..."
 brazil.451.a: ""We shall see.""

 brazil.452.t: "Change the "Military Apparatus""
 brazil.452.desc: "Argemiro de Assis Brasil sipped on his tall glass of liquor, a substance he could not honestly recognize. Perhaps Malta. Henrique Lott was idly doing much the same, if not revising some papers with his free hand. They exchanged looks between each other, often making phatic communion.\n\n"Senhor Lott," Assis Brasil finally broke the limbo, after taking a sour sip of what he still guessed was Malta, "I must reinforce the fact that reshuffling our officers."\n\nLott would've replied if only Odílio Denys didn't spontaneously barge into the room with a half-mad expression and bags under his eyes, "Senhor Lott," he began, a barely rested voice groaned under his breath, "If you go on with this... 'reshuffle'-ing, I will be forced to dispatch a resignation letter to your office first thing tomorrow."\n\nSurprise struck both men, as Argemiro stood from his seat and Lott spat out his drink, "Denys, Denys," he reasoned, flailing his index finger, "You cannot mean such a thing. This is for the greater good of Brazil, and its armed forces!"\n\nDenys did not give in very easily. A back and forth so phenomenally argumentative that Assis Brasil, who had remained silent as they continued, thought his very head would combust. Finally, resolve came with Denys giving into Lott's reason.\n\n"I was acting sporadically, Senhor Lott. I hope you may forgive me," affirmed Denys, finally losing his battle and bowing his head. He excused himself out of the room, with his loyalty in check.\n\nLott leaned back into his chair, exhausted. He had been tired even before, Assis Brasil noticed, but now there was a sign that the days were weighing him down, "Perhaps shuffling the Minister of War would be favorable," he inquired.\n\nLott could have none of it, "No. Denys remains, however... I'll give in. The rest may be shuffled," now seriously feeling the blues, Lott stood, "I stand by what I believe. Denys is loyal only to me.""
 brazil.452.a: ""Let us hope the best, then.""

 brazil.453.t: "An Urgent Matter with Denys"
 brazil.453.desc: "The row of men standing before Lott was an impressive roster, he knew. They were all good men, who had served Brazil to the best of their ability, but he knew that perhaps they were not the very best. They were promoted mostly for their Constitutionalist values, and not for their merit.\n\nHe hated what he was doing. In fact, in that moment he would have told you he abhorred it, but the task had to be done and Lott was a stubborn man. With smiles, handshakes and congratulations, the new batch of officers left the room in unison, probably to celebrate or prepare for what to come.\n\nPromptly after they left, an unexpected visitor barged through the door. It was no surprise, after all Odílio Denys had a tendency of unpredictability, though he looked dazed with a sense of urgency, "Senhor Lott," he exclaimed.\n\n"Denys. What do you need?" Lott replied, shuffling some papers in his hands while he listened intently. "General Bevilacqua. He is the highest authority of the Southeastern Military Command in São Paulo."\n\n"What about him?" Lott inquired, now dropping his folders with newfound interest. "He must be replaced. If anything can be taken from this reshuffling plan, he must leave. His alliance with Adhemar is dangerous."\n\n"And who do you propose as an alternative? We are not exactly bustling with staff, if I must remind you." Lott remarked. "General Kruel is an obvious choice. He would be much more beneficial for the stability of the region."\n\n"Thank you, Denys," Lott spoke, only after giving into pure silence. He pondered. Kruel was a known ally of Brasil, and of Jango, neither of which would give him the so-promised stability. After this time, he finally spoke..."
 brazil.453.a: ""I will consider it.""

 brazil.454.t: "One Last Battle"
 brazil.454.desc: "Lott had never been a career politician; he couldn't charm the industrialists as Kubitschek could nor rally the people as Goulart could. Yet, as he overviewed the board with Assis Brasil, ideas flowed naturally, as they had in England 20 years ago. War was something he understood, something he knew more than any political game.\n\nOpponents littered the board, opponents to Brazilian democracy staring him in the face. From opportunistic rats to simple corrupt fools, from disloyal military elements to political enemies like Carlos Lacerda and Adhemar, the opposition to Lott was large. He checked their status with Brasil again, and again, Brasil had reassured him that any coup would be meet with fierce resistance, and if worst came to worst, they had the support to win any civil war.\n\nHe sighed, he wished this wasn't necessary, that he need not prepare so much for what should be a universally accepted bill. A sense of unease permeated him, for what could transpire if all this failed. And yet, this kind of conflict was something he understood, this he could win. He could fight once last war he thought, one last battle for Brazilian Democracy. All that was left now was the bill and the battle to come."
 brazil.454.a: "Brazil's democracy on a knife's edge."

 brazil.455.t: "A Phone Call"
 brazil.455.desc: "It was a quiet afternoon in Recife for those who lived an everyday life, but not so much for those who happened to be one of the commanders of the Northeastern Military Command. This was the case for a man named Castelo Branco, who had finally found some free time to make a particular phone call as he sat at his desk.\n\n"I don't know what's gotten into Henrique's head now." Castelo Branco grumbled at the phone. "Just what does he think he can achieve by sending so many of my men to the Amazon? And I never requested for any new transfers here, let alone those who just talk about how 'great' Lott is all day and how he is the 'savior of democracy' - who the hell do they think he is?" The old marshal was never one to use words profanely, but his dignity was being tested this time.\n\nBranco never liked Lott. Ever since their Lieutenant days back in a military school in Rio de Janeiro, they were always competing for more influence in the military. But now, he thought, Lott had gone too far.\n\n"How am I supposed to enjoy a meal and drinks with my colleagues when I must have someone 'accompany' me every time I leave my house?" Branco continued to scowl at the phone.\n\n"I understand how you feel, Marshal," the voice on the other side of the phone answered. "I wish to-" the voice was cut off by a frustrated Branco.\n\n"If you understand, then you know what your duty is. Tell Henrique to end all of this madness and return things to normal at once. Or else he will face the drastic consequences of his actions. Goodbye." Castelo Branco hangs up, takes a deep breath, and leans back on his chair, looking at the ceiling while reflecting on the past few days. Only to be interrupted by a knock on the door.\n\n"Come in," said Castelo Branco. "Sir, the delegation from the mayor of Timbaúba has arrived." Oh great, more petty bureaucrats to deal with, the marshal thought.\n\n"I hope you make the right choice, Denys," Castelo Branco murmured."
 brazil.455.a: "Some wars last forever."
 
 brazil.456.t: "A Special Address to the Nation"
 brazil.456.desc: "Marshal Denys observed the crowd of protestors outside of the presidential palace with a stoic expression. It shouldn't have come to this, being forced to overthrow a man he thought of as a friend. To have to create a wall of military men between the palace and civilians. They didn't understand, and they were lashing out. But that was expected, and he would do all he could to answer their questions and calm them. He just hoped they would listen.\n\nTurning around to face the camera crew behind him, he gave them a nod. Within seconds they started rolling, and he began the most important speech of his life. "Citizens of Brazil, we have found ourselves in a time of crisis. But we have also prevailed."\n\n"In 1955, Henrique Lott, myself, and other military men banded together. We did this to preserve our democracy and its constitution from the actions of President Gomes. We were successful, and our nation flourished for it."\n\n"But, Lott forgot why we acted. He forgot what men of his position were meant for. As President, he made friends with men that sought to destroy our democracy. He indulged in corruption and took bribes from foreign nations. And when he realized some men would not stand for his actions, he sought to despoil our very constitution."\n\n"And that is why we were forced to act, for the very same reasons as we did in 55': to save our democracy. This is no empty promise; elections are coming! They will be fair and equal, and all will be welcome to participate. This is a promise not only guaranteed by myself but our constitution. Now, I fare you all well. God bless Brazil."\n\nThe broadcast ended. The camera crew, his men, and the various politicians still hanging about all congratulated him on a successful speech. They called him a hero, assured him that Brazil was in safe hands, and said they were looking to the elections. But none of it could shake the distant feeling of guilt in the back of his mind."
 brazil.456.a: "We did the right thing, didn't we?"

 brazil.457.t: "Cash and Corruption"
 brazil.457.desc: "Adhemar threw back his head with a laugh and raised a glass of champagne. "Here's to Brazil and the army!"\n\n"Hear, hear!" General Kruel laughed alongside him. It hadn't been easy convincing Denys that throwing support behind the PSP was better than for the UDN. Much like the crusty old conservatives, the marshal was old-fashioned and thought the country needed them and their outdated politics. Bah! The PSP was everything Brazil needed; God-fearing, populist, and lucrative. Fortunately, Kruel and many other generals, mostly his boys in the 2nd Army, were quite persuasive and insistent on their preference for the Bull and his men.\n\n"Ah, I can't tell you how long we've been waiting for this. The time for the PSP to get its place in the sun is coming, and all of Brazil will get a piece of the action!" Adhemar turned with Kruel with a wink. "You and I especially."\n\nKruel chuckled. Officially speaking, the American dollars sent to the army was for stabilizing Brazil. Unofficially, they would be used to help fund the PSP's campaign. And hey, if some of that went into Kruel's pocket, who was he to complain? The thought of the campaign shook him out of his whimsey. "Oh, and uh, about the election. I've looked into the opinion polls for your Vice President, and they don't look that good. Maybe-"\n\n"Oh, come now." Adhemar brushed him off with a wave of his hand. "We have plenty of time to improve his image. We can worry about that later. For now, we drink!""
 brazil.457.a: "We did the right thing, didn't we?"

 brazil.458.t: "A Chat with the Crow"
 brazil.458.desc: "The Guanabara governor's palace was bustling with activity, with various aids and office workers racing past Denys at frantic paces to prepare for the upcoming election. He had to dodge out of a man's way a few times, but the marshal eventually found himself at the office of Governor Carlos Lacerda. He opened the door to find the UDN's electoral choice in conversation with a man he didn't recognize, the two shook hands, and the latter man departed with a smile that turned surprised when he noticed the marshal. Denys watched the man leave the office before turning back to Lacerda with a raised eyebrow.\n\n"Ah, welcome, marshal!" Lacerda quickly moved to approach Denys with a smile. "That was Raphael Magalhães, whom I've chosen to replace me as governor, as I intend to become President."\n\nDenys nodded his head in understanding before clearing his throat. "Good, good. That's actually why I am here to see you. Governor Lacerda, the army offers you and the UDN our official support."\n\n"Wonderful!" Lacerda clasped his hands together with a wide grin. "You and the others can rest assured you made the right choice; we'll do all within our power to protect Brazil and her constitution. I won't repeat the mistakes of Lott or Gomes."\n\nGomes. Now that was a name that left Denys nostalgic. Back in 55, he and Lacerda had been on opposing sides while Lott marched in step with him, and now reality had flipped the situation on its head. Maybe God had a sense of humor after all. "That is good to hear. Now, let's discuss your plans.""
 brazil.458.a: "Politics makes for odd bedfellows."

 brazil.459.t: "Lott Act Ruling"
 brazil.459.desc: "Tancredo Neves observed the situation unfolding before him intently, and with most interest. It was surprising how many buzzwords and endless loops of conversation could be thrown around in a court of such degree, no less the Supreme Federal Tribunal, but yet it never failed to amaze him. He did not even dare squint his eyes, making sure to avoid nothing.\n\nThe Military Supervision Act of 1965 was the topic of the court, what his peers simply called the Lott Act, and they had already entered the voting session by the time he had furthered his whole attention. It happened extremely quickly, as the court ruled a unanimous denial of the act as unconstitutional, without giving any more context afterwards.\n\nNeves leaned over to his side, muttering to the man sitting beside him, "The result was never in doubt," he spoke, expecting a reaction, "If it had been less obvious, I would question my sanity." In response, Ulysses Guimarães bobbed his head in ascent, a profuse nod of understanding as they both stood to leave.\n\n"The military has put significant pressure onto the supreme court. This act would have been their very own tragedy," spoke over Guimarã, "We must find a way to combat them, if we want to halt the military's snooping around and intervening every so often. What do you think, Neves? Where should we begin?""
 brazil.459.a: ""It begins with the election.""

 brazil.460.t: "Minutes to Midnight"
 brazil.460.desc: ""For the last time, are you sure we have ensured our choice's victory?" Denys asked Generals Kruel and Frota for what felt like the thirtieth time. Frota looked half asleep while Kruel seemed like he was doing all he could to not roll his eyes. It made Denys grind his teeth. Godamn it all; why did he entrust electoral fraud to these morons?\n\n"Sir, I assure you my men and I have done all we can. The election will go smoothly, and our dear friend will be in office soon." Kruel spoke with a bored expression.\n\n"So have mine." Frota could not hold back his yawn. "Sir, with all due respect, it's no use getting anxious about it now; there's no time left to stuff any more ballot boxes or pass any more bribes. The election will be over before dawn."\n\nDenys wanted to shout. To scream at them. They were staring down the face of what could be the most critical election in Brazil's history, and what had they been doing? Denys knew these bastards, how deep their corruption ran. How much of the money had been actually passed and not pocketed? Still, he would concede that Frota had a point.\n\n"Good. Dismissed." They parted their ways. Denys tried to ease his mind as he made his way home. It wasn't worth worrying about, right? Come what may, it will all be resolved tomorrow. A thought he repeated in his mind as he climbed into his bed and sought a good night's sleep for himself."
 brazil.460.a: "It never came."

 brazil.461.t: "Combatting the Octopus"
 brazil.461.desc: "Denys' brow flooded profusely, the marks on his forehead helping little with the accumulating sweat resting on the top. Brazil's heat could be unbearable, and even after a livetime in the country, the temperature hasn't settled just right for the old General. His thoughts were rudely interrupted by the plethora of officers and militants gathered around the table, chief among them Costa e Silva.\n\n"Ah, yes. Unto the matter at hand," Denys announced, his train of thought finally colliding with reality, "Jango Goulart's political shenanigans are becoming too much of a nuisance. His campaign must fail, and thereafter someone else must take his place. A contender, if I may," he announced the conversation maker, the rest of the men spending little time in silence as the room broke into conversation. Denys sipped on his water, observing intently.\n\nSilva, instead of joining in on the cacophony, simply shook his head from left to right, as if disappointed, "It is too late for this," he interrupted, the table suddenly falling unto the usual awkward break of silence, "We have bet everything on the election that we've ran, and if we were to overturn Goulart's results and instead install Lacerda, well... it would be rather unpleasant."\n\nRaised on his voice, head gazing from his left, unto his right, carefully taking into account all the faces sitting surrounded at the table, "Not only in an electoral sense, but leaving in senators or governors whose only alignment is with our own agenda, it really does allow our hypocrisy to shine through."\n\n"Come on, you all understand," called forth Denys, nearly on the edge of his own seat, "It is what is right. For the sake of integrity, and democracy." And though he appealed on around the room, nearly going from person to person, he found himself with more opposition than expected. Most of the generals that mattered had made up their mind on sides, and stood uneasy ground.\n\nShocked, Denys broke back down into his chair, looking unto the retinue of men who had just indirectly spat in his face. He was outplayed, he knew, and even with his general cold headed nature he couldn't stop himself from muttering underneath his breath, barely so that the only audible sound from an outside perspective would be of a sigh, or a puff of air."
 brazil.461.a: ""Merda.""

 brazil.462.t: "Washington on Side"
 brazil.462.desc: "Two men sat in a car, sharing each other's company as they practically had no other choice to do so. They knew each other's name, it's true. However, they were unsure if they even had names to begin with. Regardless, they interacted with comments or curiosities between one another to ensure the boredom wouldn't overwhelm them.\n\nBoth men were in an active stake out mission, of what seemed to be an SS Spy ring cell's headquarters. There was little activity, thus the first of the two men spoke to the other; "You hear about Washington's orders?"\n\nThe second man looked over to his right, shrugging in ignorance as the silence was broken again, "I must have missed the memo," he remarked, semi sarcastically, letting out a chuckle before digging his teeth into a good chicken sandwich.\n\n"We'll be helping stabilize the regime after the coup in January, once Jango Goulart's out of the picture," replied the first man, tapping his fingers unto the car's wheel to replicate a small tune. The other agent swallowed turbulently, looking back to his side, "Really? Aren't the PSD good allies with Washington? And by proxy the PTB as well, I suppose."\n\n"Jango is linked to those independent minded politicians, some of them are on a Japanese payroll. As if we needed any more of their influence in our continent," the first man muttered, leaning back into his chair with an audible grunt of fatigue.\n\n"I can't believe Jango would do this," the second man replied, shaking his head in disappointment while taking another bite out of the sandwich, "Oh well, for the greater good.""
 brazil.462.a: "It is what must be done."

 brazil.463.t: "An Unacceptable Outcome"
 brazil.463.desc: "Denys read the newspaper with a blank expression. João Goulart and the PTB victorious. He already knew that, of course, he had watched the election carefully during the previous evening. It had left him numb, and the feeling had yet to subside as he read through the article without truly taking it all in, his mind elsewhere.\n\nHow could this happen? Were the people so foolish, so naïve? After everything the country had been through, they thought to not only run off back to the Varguists, but the red band of idiots founded by the dictator himself? Had everything he'd done been for nothing? Toppled a man, a friend, to defend the constitution just so another could tear apart the nation's social order? His gaze turned back towards the photo plastered on the front page, where Goulart and his cronies celebrated their victory, their grins wide and arrogant. Denys slammed the paper onto his dining table, ignoring the mess made of his meal and coffee from the force of his blow, his face etched in fury.\n\nNo, this was not the end. If the Marxist bastard thought he could ruin everything Denys and his men had struggled to defend and serve then he would be sorely disappointed. The people had made a mistake, and in such circumstances it was up to men like himself to correct the populace and prevent them from self harm. Striding away from the table he made for his phone. He and his men saved Brazil before, they would do so again."
 brazil.463.a: "The Brazilian chaos has yet to conclude."

 BRA_mosquito.1.t: "Operation Mosquito"
 BRA_mosquito.1.desc: "Odílio Denys tapped onto his chin lightly, somewhat phased from the talks occurring before and around him. He paid much attention, not allowing himself to be completely disconnected from the matter at hand, but not actively participating in the pointless murmurs and whispers traveling around the table. Though he knew he had to launch himself in.\n\nAmidst the chatter stood men like Costa e Silva, General Kruel and Frota, and some air force officers he could barely recognize, apart from Burnier. Scanning the different faces among the room, he finally lifted his voice, "We will allow Goulart one of two choices," the room fell dead silent, all men moving their heads to meet Denys' gaze at the head of the table.\n\n"He will be allowed to either flee the country," he gave a short pause, tasting some of the meeting standard mineral water at his disposal, "Or capture him on his arrival to Brasília, while he plans to drive the PTB to his side."\n\nNo one voiced any opposition. Only bobbing and nodding heads, technical speech and operational inquiries occupied the room as the officers schemed and planned while under the guidance of Denys' watchful eye. As the scheming was done and the day came to rest, Denys uttered one last sentence before taking his leave."
 BRA_mosquito.1.a: ""We'll speak when we're done.""

 BRA_mosquito.2.t: "Bravery and Valor"
 BRA_mosquito.2.desc: "Brizola almost launched himself forward to grasp unto Jango's arm, "You will be captured, or worse, killed!" he mustered, giving a true attempt to stop his friend from running straight on into the lion's jaw. Jango, however, only shook his head reassuringly, switching the bag from his left hand to the right only so he could give Brizola a pat on the back.\n\n"I must leave for Brasília. To fight for the presidency, to fight for freedom, and democracy. If I cannot do it, then what can we expect from Brazil?" Goulart queried, giving another repeated back to his comrade. In response, Brizola pressed his hands unto his face anxiously, "You could always prepare against the fight in Rio Grande do Sul, Jango. When the coup comes, it will be most safe..."\n\n"I must go no matter the cost," he interrupted, taking his bag with both hands, "If I am arrested, though, I will need my family taken care of, and Edna safely transported to Uruguay. Our fate rests in her hands should I be unable to."\n\nThe brothers-in-law embraced each other then, a final goodbye as the speaker called for all passengers to board their planes. The South would be unguarded by Jango now, Goulart knew, and with all his force he could only muster one last prayer."
 BRA_mosquito.2.a: ""Safe travels, Jango.""

 BRA_mosquito.3.t: "Red Sun"
 BRA_mosquito.3.desc: ""Like a mouse to cheese," Denys snickered to himself, his lonely abode inhabited only by fellow military personnel or caffeine addicted politicians arriving early before work hours. Soon enough, Jango Goulart would rest easily into his palm, with the SNI and some of his Armed Forces men awaiting his arrival at the airport to finally capture him.\n\nThough Denys had little time to celebrate, as a young army officer stormed into his room unannounced, panting and puffing air, allowing little time for the General to ask his purpose as he held up an envelope, "You must read this, Senhor Denys!"\n\nThe envelope was practically thrown onto his desk, and before he could scold the officer's indecent behavior his jaw dropped as his eyes skimmed through the contents of the letter. He could barely believe his eyes, standing to give the words another read, and yet another, repeatedly, as his hand collided against his head in a desperate attempt to comprehend.\n\n"Dead... in the wreckage of his plane. Crashed... How can this be?" stuttered Denys, his eyes so fixated on the document he barely noticed the presence of Costa e Silva. "Senhor Denys," Silva muttered, finally speaking up, "I've seen what's happened."\n\nDenys perked his furrowed brows unto Silva, an increasing ache of rage making him almost tumble and drop onto his desk, "Do you have anything to do with this, Silva?" Denys asked, remaining respectful though adorned with a stern tone, "How would you know this quick, hm? Is there something I must know?"\n\nThough Silva was known as conniving, and a man of little honesty, it was most likely in that moment that for the first time in his life he meant something in most truth, "I have no knowledge of this unfortunate event, Senhor Denys. I do not know...""
 BRA_mosquito.3.a: ""Out of my office, I need to think.""

 BRA_mosquito.4.t: "Silva's Inauguration"
 BRA_mosquito.4.desc: "Denys was nearly fuming at the mouth, controlling himself from a tantrum still as he processed Jango's death. It was not discussed. He was to be kept alive, arrested when he arrived at the airport, not shot down out of the sky by some fighter jet to level him into the ground and ensure his death. Sure, it could put an end to some immediate issues, but it made everything worse in the long run.\n\nLott's daughter has fled to Uruguay, giving some crippling speeches about Brazil's government, and then dematerialized to Cuba to do whatever it may be. The USA loses confidence rapidly in an impressive show of cold feet, and resistance to the government becomes increasingly more apparent, to proportions larger than expected.\n\nCosta e Silva gave his grandiose inauguration feast, surely one to remember, if only Denys had been paying enough attention. Instead, he was wandering his own thoughts. Which pilot could have done the shoot down? Most likely the air force covering up their tracks to protect one of their own, being prone to hide the truth when in times of such need. That will be an issue for Silva to resolve.\n\nSilva stood down from the dais, and walked to shake the hand of a plethora of military officials, politicians and legislators all celebrating the jubilation of a new President. Silva said nothing when grasping onto Denys' hand, shaking it intently while a smile of content rested upon his face. That moment, Denys couldn't hold it any longer.\n\nHe was too old for politics. He had served well, very well, and deserved now some time to rest alone and in peace until death came to take its price. He wanted to retire to a beach, yes. Perhaps not too far from Rio, close enough to hot beaches covered in yellow sand, but far enough from tourist-ridden cities which bothered the scenery he would enjoy."
 BRA_mosquito.4.a: "An epoch comes to an end."

 BRA_mosquito.5.t: "Crocodiles"
 BRA_mosquito.5.desc: "Her father was right. Politics are just like a pool full of crocodiles with sharp teeth, waiting to feed on innocent men who simply wanted change seen in the home they loved. She was determined to ensure the lives of those innocent men were not lost in vain, but first, she had to step onto the stage.\n\nEdna gave her best attempt to shield her anger, though her face still showed blushes of red that gave away her blood melting rage. The American journalists had asked her a few questions, most of which were about her life and career, though one risky pretender approached with a very peculiar inquiry.\n\n"What do you make of the situation in Brasília?" the reporter asked, with a pen and notebook at the ready. Edna had to give it some time to sink in, though the answers came flowing out with little forethought as a machine gun with live ammunition.\n\n"The death of Jango Goulart is possibly the worst thing to happen to Brazil. Murdered by its dictatorial oppressors, his legacy is left in shambles and his work unfinished. Though I remain, and with me the opportunity of a future for Brazil. As his Vice-President, it is pertinent for me to reinforce the fact that the current government is completely illegitimate and no rightful President resides in office."\n\nThe questions rained after the comment, with increasing interest from the Journalists who simply could not have enough. It mattered little if those who questioned her for being a woman, it was time to rid Brazil of the political crocodiles preying for its democracy, one small step at a time."
 BRA_mosquito.5.a: "A life in exile?"

 brazil.464.t: "Echoes From The Past"
 brazil.464.desc: "Denys sat before his dining table with the morning news and a thoughtful expression. Kubitschek was back in the presidency. That the PSD had managed to hold on after everything it had been through was a testament to the returned President's popularity. Or, alternatively, it was a testament of Lott's.\n\nIt was almost ten years ago, but he remembered it like it was yesterday, coming together with Lott to create a movement within the military to protect their fragile democracy, halting the UDN's attempt at a coup, and ensuring Kubitschek could enjoy his hard won victory. Did Kubitschek understand why he had to do it? Why he had to turn against their, once, mutual friend to defend the stability of Brazil and its constitution? He had his doubts.\n\nWherever the President's sympathies may lie, Denys knew the man had a good head on his shoulders. He was already a proven President whose economic policy had brought Brazil greater heights in the past, dedicated to democracy, and friendly to the Americans. So long as he kept better control over inflation this time around and avoided the mistakes of his predecessor, then he should make a fine President once again."
 brazil.464.a: "We'll keep an eye on him, just in case."

 brazil.465.t: "A Pleasant Surprise"
 brazil.465.desc: "From his home in Rio de Janeiro, Odílio Denys enjoyed his breakfast with a cup of coffee and the morning news. After all the tension and uncertainty of the previous evening followed by relief, he found it relaxing to simply kick back and get a second look at what had transpired. Setting the paper down on his dining table, he took a long, satisfied sup of his drink and thought back on the results.\n\nAll things considered, it honestly couldn't have gone much better. Carlos Lacerda didn't agree with everything the military did but he was firmly sympathetic to them, a friend to the Americans, and dedicated to the causes of anti-Varguism, anti-communism, and anti-fascism. So long as he refrained from making the same mistakes that Gomes made back in the fifties, Denys thought he was just the President Brazil needed after Lott's disastrous decisions.\n\nHe made a mental note to send his personal congratulations to the man, who hopefully remained sober enough through last night's victory to function through today. But, perhaps that was asking too much for a man from the same party as Quadros.\n\nRising from his chair, the Marshal mentally prepared himself for the rest of the day. The reds and the fascists had gotten uppity during all the chaos, and it was up to him and his to slap them back down, something the new President was doubtlessly going to support. With a final gulp, he finally walked away."
 brazil.465.a: "Here's to the start of a bountiful relationship."

 brazil.466.t: "A Dark Horse Among Dark Horses"
 brazil.466.desc: "Even after everything he had been through, life still found ways to throw unexpected surprises in the face of Marshal Odílio Denys, the recent election of Jânio Quadros being an excellent case in point. Even the morning newspaper he was skimming through seemed as surprised as he was, and why wouldn't they be? While Denys had personally hoped for a UDN victory, the idea of a Quadros presidency left him almost stupefied.\n\nThe fact that the UDN had chosen Quadros was a shock to begin with, while the man was a fellow conservative much of his agenda ran counter to the goals of the party that endorsed him, who still had some sore points with him after accepting the role of Vice President to the now deposed Henrique Lott. The most egregious of these plans being his foreign policy, of which Denys and his fellow military men held in particular contempt. And on a personal level, Denys found the idea of having to refer to that moody, eccentric, impulsive little drunkard as President was already giving him a headache.\n\nEven so, it wasn't as though the man lacked any upsides. Quadros' foreign policy, as extreme as it is, was still ultimately aimed at strengthening Brazil's position abroad without chaining it to the whims of foreign superpowers, and his concerns about the country's rapid growth and inflation were worth heeding, and the man was dedicated to good, Christian morality and championed anti-corruption. Perhaps a moral man with faith in his nation was what Brazil needed. Not to mention, at the end of the day he still wasn't Adhemar or Goulart.\n\nHe just hoped that the UDN could control the President's more outlandish ideas."
 brazil.466.a: "Ah well, how bad could he be?"

 brazil.467.t: "A Bizarre Reality"
 brazil.467.desc: "When Denys first heard over the radio that Adhemar de Barros and his PSP had won the presidential election his initial response was to call it a tasteless joke. When more reports and announcements were made that confirmed the election's outcome he spent the rest of the evening convinced he was in a bad dream fueled by stress and uncertainty. As he reads the newspaper in his hand the morning after and is, once again, confronted with the fact that Adhemar was elected President he momentarily considered the idea that he had simply gone insane.\n\nOr, perhaps it would be more accurate to say that his country and its voters had lost their minds. Denys struggled to think of any politician that was so open and shameless in his corruption as Adhemar and his party was little better. Not to mention they were Varguists, supported by the former dictator and his spawn to boot! How could the people not notice, had the bastard's honeyed words of populism and vague promises of progressive economics truly sway so many?\n\nOr, he wondered with a sinking feeling in his gut, did they simply not care? Brazil had suffered so much and in such a brief period of time; inflation and debt ravaging the economy, the bloodshed in South Africa, Lott's downfall, and all the ceaseless corruption. Had it all exhausted them? Left them so traumatized, so numb, and so desperate for effective leadership they turned to a man willing to not only break the law, but flaunt it?\n\nIt could be worse, he supposed. They were corrupt Varguists but at the very least they weren't communist Varguists like the PTB or the fascistic failures of the PRP, both of whom would have destroyed democracy all together with their ilk, not merely stain it. And Adhemar's party did enjoy a fair amount of support from the military, who Adhemar favored back. Even so, Denys could not help but fear for the future of his nation, nor shake the feeling that he played a role in its shortcomings."
 brazil.467.a: "Our future remains clouded, but not hopeless."

 brazil.468.t: "The Agitator Issue"
 brazil.468.desc: "It was a very hot night at the Planalto Palace, President Lott had called an emergency meeting with some members of his cabinet. For he had just received a report from the Itamaraty, Brazil's foreign ministry, stating Uruguay's decision to receive the perfidious agitator and trouble maker Che Guevara into their own borders, and what was even more concerning were his statements promoting and supporting revolutionary action in the region and the overthrow of all existing South American governments. And more importantly, he would lead uprisings to achieve such objectives.\n\n"That man should have been put to a wall and shot," said General Denys in a very angry tone, "the fact that the Chileans and Uruguayans didn't do that immediately when each of them had him in their hands is just another testament of their natural idiocy and incompetence! Heh, maybe we should send in a small task force and do what those cowardly idiots didn't have the balls to do."\n\n"No!" Lott answered vehemently, "we are not violating the sovereignty of a friendly neighbor. That is out of the question."\n\n"What if..." timidly and with a trembling hand suggested Quadros, "What if we asked him to come here and we gave him a medal? After all, in the end, he is just a good South American patriot who loves his continent and is fighting for his fatherland in his own... particular way. Giving him some recognition might just appease him."\n\n"Are you mad?!" shouted everyone else in the room in unison.\n\n"I will not shake hands with a known terrorist and international criminal!" said Lott irritated.\n\n"You know what?" Denys answered rather annoyed, "Just remind Montevideo of the numbers we have in the Third Army and that should teach them to tow their line, as it has always been!"\n\n"No! Saber rattling is also not the answer, although... Salles," the President now referred to his foreign minister, "Tell the Uruguayan government that we urge them, in the name of regional security, to expel Guevara from their territory at once. For if they do not do so the nature of the relationship between our nations will irrevocably change. I think they shall heed our warning for letting Guevara enter their country was an idiotic decision...""
 brazil.468.a: ""...But no government is stupid enough to let that man stay in their country.""

 brazil.469.t: "Late at Night"
 brazil.469.desc: "The men gathered in one of the meeting rooms of the presidential palace, disturbing the peaceful atmosphere. No one knew why they were there. It was late; everyone was tired. Lott opened the meeting. "Good evening, gentlemen. I apologize for calling this meeting so late, but this is a matter of national security. Denys, please continue."\n\nThe room turned its attention to the man standing next to Lott, who began to show the pictures from the folder he had placed on the table. "Our sources indicate that the situation in Paraguay has escalated into chaos. The worst is yet to come, and our fears of a bush war have been confirmed."\n\nThe men sat up. They analyzed the pictures scattered around the table and the various reports about them. Then they all stared at Lott for an answer. "Which is why we will not intervene openly. With our failure at Guaíra Falls and the end of the Lobster War, we can't afford any more mischief in foreign lands when it doesn't really concern us. However, we will support our allies by covert means." The room filled with murmurs about Brazil's involvement, but before anyone could speak, a fist slammed down on the table.\n\n"Calm down," the speaker said. "I agree with President Lott. We cannot afford foreign intervention at this time. Our intervention could inflame Argentina enough to escalate this into a full-blown conflict, not just because of the Lobster War and the Guaíra."\n\nLott motioned for Denys to calm down and take his seat. "I agree that direct military intervention would be unwise at this time. However, I suggest the Second Army be mobilized and sent to the border in case things escalated." The meeting ended, and the attendees left as the late night slowly turned to dawn."
 brazil.469.a: "Paraguay's dawn."
 
 brazil.470.t: "Go in My Place"
 brazil.470.desc: "A bespectacled man hurriedly made his way through the halls of the presidential palace. Having just returned from a meeting in Argentina to discuss the dam situation, the man found himself tired, yet curious as to why he was being summoned to the President's office. The meeting was a success, was it not? So why was he being called in such haste? He thought, as he came up on the door of the President's office and knocked.\n\nHe was greeted by an instant reply - 'Yes, come in!' Quadros opened the door and went inside. "Ah, Jânio, please do take a seat."\n\nQuadros sat down and faced Lott. "Yes, Henrique? Why was I called in such haste? About the dam?"\n\n"No, no. This is about the upcoming visits to Tokyo, Nanjing, and Washington. This is an important year, we don't often get to court both the Sphere and the OFN with such visits, no?"\n\n"Yes, I agree. But what does this have to do with me, exactly? A visit to them is your duty, not mine," Quadros replied, confused as he took off his glasses and settled into his seat.\n\n"Correct, but we don't want to upset the US with that. You're going to the Sphere in my stead to ensure that Japan invests into Brazil and the Highway, while I'll head over to Washington and reassure our American friends. We want to look as good as possible on the world stage, getting the Sun's investments while not upsetting Uncle Sam. There's a lot riding on this meeting, so I expect you to do your best," Lott replied, lighting a cigarette and sighing. "...Edna also wants to accompany you as she wants to get into politics, despite my warnings against it."\n\n"I understand, though if you don't want her to come then I'm fine with her not joining." Quadros put his glasses back on, then suddenly tied a handkerchief around his nose and mouth, creating a bandana. As Lott stared at him in confusion, Quadros replied "Sorry, it's the cigarette smoke." Lott nodded and stood up.\n\n"She has to, but that's enough talking. I'm off to inspect the troops; good luck Jânio." Lott swiftly marched out of the room, leaving Quadros alone with his thoughts."
 brazil.470.a: "Off to the Land of the Rising Sun."
 
 brazil.471.t: "Father-Daughter Talk"
 brazil.471.desc: "As Henrique Lott walked down the ramp that connected the presidential office to the rest of Brazil, the President heard a voice calling for him. To his delight, it wasn't one of his workers running to tell him about the newest worker strike or, even worse - Jânio. Instead, looking to his left, he saw his daughter Edna walking towards him, dressed up in a suit and wearing a necktie, a sight her father was not used to seeing.\n\n"Edna, why are you dressed so formally?" asked Henrique. "Well, father, today I'm going to meet with Brizola about my campaign for a seat in the lower house," Edna answered confidently. Worry started to fill the patriarch of the Lott family, watching his offspring get ready to dive into a dangerous pool filled with crocodiles.\n\nHenrique swallowed the spittle inside his mouth and slightly raised his voice. "Listen, Edna, I know you have excellent intentions, but as your father, I must insist that you do not get involved in the world of politics, especially as a woman." The worried father affirmed as Edna mentally sighed, "It's nothing but a pool of crocodiles waiting for the right moment to attack and destroy your-"\n\nEdna cut him off. "I have already made my mind, father; fighting and taming those crocodiles is something I want to do. It's a duty for the country's greater good." Quickly, the worried dad realized nothing he said would have changed her mind.\n\n"Very well, then I assume I can trust you with this task," Henrique conceded. "As you know, Jânio was tasked to travel to the Co-Prosperity Sphere to ensure that Japanese money keeps flowing to Brazil, and I can't trust that man not to make any screw-ups, so I need you to inform if he attempts anything funny." Edna smiled and nodded, "That's just what I wanted to talk to you about, I will make sure everything goes smoothly."\n\n"Alright, then good luck, I must now leave to inspect the troops. Love you, Edna." Henrique said as he and his daughter shared a quick hug, "Love you too, dad." As the Marshal walked out, he suddenly stopped on his track "Oh and Edna...""
 brazil.471.a: ""Keep alcohol away from Jânio.""
 
 brazil.472.t: "Vacation Destinations"
 brazil.472.desc: "It was a hectic night in the vice-presidential office, and Jânio Quadros and his aides were sitting at the table making the final preparations for his visit to the Co-Prosperity Sphere. This was going to be the most critical task the eccentric Vice President had to face so far, as a visit to the second biggest economic bloc could bring some much-needed investment into the Brazilian economy, perhaps even speeding up the construction of the Trans-Amazonian Highway! As others at the table discussed the great opportunities to come, Quadros pondered how he could make this visit a remarkable one.\n\n"Mr. Vice-President." An aide interrupted his train of thoughts. "We believe to have devised a great plan. Once you arrive in Tokyo, we shall-"\n\n"Tokyo??? No, that will not do!" Quadros exclaimed as the room grew quiet, with all heads turned to the Vice-President with puzzled looks on their faces. "If we visit Japan first, this would be a very underwhelming visit. We should visit Nanjing first!"\n\n"Mr. Vice-President, if we visit China first, the Japanese are not going to be happy about it. We might lose their trust and may not get the investment we ne-"\n\n"Nonsense!" - Quadros cut him off - "I am sure the prime minister would be delighted to know his country is the main course of this visit!"\n\nAs the room now grew louder, with many trying to convince Jânio not to go to China first, Edna Lott sat close by with PSD members, listening closely as the discussion unraveled, some trying to hold back their laughter from Quadros' nonsense. After some time passed, Edna walked to a nearby telephone and called her father.\n\n"Hello, father. It seems that even without alcohol, Quadros is still a... very stubborn man. It seems like he's convinced that going to China before Japan is a good idea. If his crew isn't able to convince him otherwise, then he will turn Brazil into a laughingstock all across the Sphere!" Henrique Lott slapped his hand on his face and sighed audibly at the other side of the phone."
 brazil.472.a: ""I will discuss with him today.""
 brazil.472.b: ""I'm too busy, leave it to his delegation.""
 
 brazil.473.t: "An Unwelcome Surprise"
 brazil.473.desc: ""They're going to what?" Fujiyama Aiichirō could not hide the bafflement in his tone.\n\n"The Vice President of Brazil and his entourage have decided to visit China first. They've altered their flight plan and are headed towards Nanjing as we speak," the aide replied with a grimace.\n\nThe initial shock wore off for Aiichirō, and his face became a scowl. He could not imagine what was going through that; what was his name again? Quadros? Did that fool have any idea of what sort of insult this was? Were Aiichirō not a businessman, he would have canceled the entire arrangement. But he knew better than anyone else in the Empire what a good deal this would be. This could be forgiven but not ignored.\n\n"I see. I will inform the Emperor and prime minister. Meanwhile, I want you to send a message to President Lott. Inform him we are disappointed but willing to accommodate for this..." Aiichirō paused to consider the right word. "Incident. But please stress to him that we would prefer his men refrain from any further errors.""
 brazil.473.a: ""Let us hope they do not test our patience again.""
 
 brazil.474.t: "A Rocky Start"
 brazil.474.desc: "Edna Lott could feel a headache coming on. She was on the most important diplomatic mission of her life, and the man she was supposed to keep on track was already derailing everything. Her father's Vice President had the "brilliant" idea of visiting China first instead of heading to Japan first in a journey that would "climax" with visiting the Japanese last. Who on earth changes the destination for a business trip with a foreign superpower mid-flight?\n\nGiven the lack of fanfare and hastily set up security in the airport, the Chinese and Japanese had been as prepared for this detour as she was. Except for the press, whose expressions ranged from ready and eager to about to start a riot. If Quadros was bothered by any of it, he didn't let it show, sauntering towards the wall of journalists before being bombarded by their questions.\n\nWhy did he change plans mid-flight? Did President Lott approve of this plan? Was this a slight against Japan? What did he mean by this? Did he have any other changes in the schedule in-store?\n\nWith confidence that Edna could only assume was born from liquid courage, Quadros waved his arms towards the crowd before answering their questions."
 brazil.474.a: ""With a country with such a rich and fascinating history so near, how could I resist? This is a trip not for Japan alone but for China as well!""
 brazil.474.b: ""All will be revealed in time, my friends! For now, I must be off! In the meanwhile, where could I find these fabled pandas?""
 brazil.474.c: ""Japan is a marvel and role model for developing nations everywhere, and as such, I have decided to reserve the best for last.""

 brazil.475.t: "But That is Not in the Schedule"
 brazil.475.desc: ""Yes, Mr. Sawada, I know."\n\nBack in Brazil, President Lott sat at his office, currently dealing with the wrath of a very angry Japanese ambassador. The television in front of him displayed the out-of-schedule arrival of his VP Jânio Quadros to an extremely empty Shanghai Longhua airport. Lott let out a muffled groan, as according to the official schedule, Quadros was supposed to arrive in Tokyo for a reunion with Emperor Hirohito in order to kickstart general visit of Japan and hold many important meetings with Japanese business magnates. Instead, he had caused a massive diplomatic scandal between Japan and Brazil as both governments were caught off guard by his sudden decision.\n\n"I am very excited to visit such a great and ancient country as China. Indeed, I personally believe that Brazil and many in the Western hemisphere still have a lot to learn from China and the Orient." explained Quadros to the small group of reporters that were there. "On the matter of my visit to Japan," he continued, "I can assure His Majesty the Emperor and the Japanese government that they have nothing to worry about. In fact, my visit to China gives me more time to prepare, for I plan my visit to Tokyo to be a spectacle unforgettable for generations to come!"\n\n"Yes, Mr. Ambassador I will ensure that Jânio follows the new schedule and that your government is informed of whatever this "spectacle" is. I apologize Mr. Sawada, for this is very embarrasing for me as well. I assure you, he won't alter the schedule further. Please, send both my personal and the Brazilian government's most sincere apologies to His Majesty and the prime minister. Good night."\n\nAfter ending the call, the President sat on his couch and took a deep breath to calm his nerves.\n\n"That damned idiot! Why can't he just behave like a normal human being for once!?" exclaimed Lott as he yelled out his frustrations. "Well, looking on the bright side...""
 brazil.475.a: ""At least the Americans will be happy.""
 
 brazil.476.t: "Dinner and an Offer"
 brazil.476.desc: "China was a beautiful country. Even if you had to ignore the fascists and their jackboots to appreciate it. Quadros took what few opportunities he had to enjoy the sights and culture of the subjugated nation. Not an easy task when he was being hounded by both the Chinese and Japanese negotiators and Lott's lackeys, who insisted on watching his every move.\n\nSo, the ex-army boy didn't think he could handle this? Well, shows what he knows! The negotiations went swimmingly; in no time at all, he had representatives of two of the Sphere's most essential nations eating out of his hand. All that was left for the day was to chat with the diplomats on non-important issues and enjoy an excellent Peking duck. With a generous sip of wine, he smiled and laughed along with his dinner mates until he noticed one Chinese official trying to get his attention.\n\n"Mr. Vice President." One of his men began to translate the man for him. "To celebrate the new friendship between our two republics, we wish to offer Brazil a gift; a panda bear from one of our illustrious zoos." The official gave a small smile as Quadros perked up at his offer. "We can prepare it for safe travel as soon as you wish."\n\nQuadros had already decided he was bringing that majestic creature back to Brazil, one way or another. The question was whether to accept it now and let everyone know about it or just put it off for a bit so the Japanese could get a heads up. He was sure they wouldn't mind too much, but they seemed to really hate surprises again."
 brazil.476.a: "Better to ask for forgiveness than permission!"
 brazil.476.b: "Maybe we talk this out a bit more."
 
 brazil.477.t: "A Surprise Announcement, and Embarrassment"
 brazil.477.desc: "Edna found herself with an easy smile as she discussed business with Japanese diplomats. For once, Quadros had followed the plans set for him without a hitch, and all of their hard work was bearing fruit. She was still going to keep an eye on him. She and her counterparts stood off to the sidelines as the Vice President and other diplomats spoke with the press about the trade deals. So far, things were looking good.\n\n"And one last thing I wish to announce!" Quadros had the kind of excited look on his face that Edna had come to associate with imminent disaster. "With permission from the Republic of China's government, the people of Brazil will have the pleasure of a new panda bear for our nation's most illustrious zoo in Rio de Janeiro!"\n\nWait, what. When the hell did they agree to this? The Japanese looked as surprised as she was and much more displeased. When one of the diplomats was asked by the now very excited press about this agreement, he said that the deal was "still in the drafts." On the other hand, the Chinese looked very pleased with themselves, no doubt because they managed to pull a fast one on their overlords in public.\n\nWiping the surprise off her face, Edna turned back to the now irritated Japanese officials with her most diplomatic smile. "Well, gentlemen, I think we have much to discuss. Would you like to talk over some tea?""
 brazil.477.a: "This is getting ridiculous."
 
 brazil.478.t: "A Rude Awakening"
 brazil.478.desc: "Quadros was already having a rough time sleeping when someone began to furiously pound on his bedroom door. God damn it, who the hell was waking him up past midnight? Spitting a few curses under his breath, he stomped in his pajamas towards the door and swung it open, ready to share a piece of his mind with his unwanted guest. The sight of armed Japanese National Security officers took the wind out of his sails.\n\n"Sir." One of them began in passable Portuguese. "We have discovered a plot by anti-government insurgents and terrorists targeting you and your entourage. For your safety, we must escort you to your aircraft for evacuation." Quadros felt his blood run cold. Someone was trying to kill him? The next hour was a blur as he and the men quickly gathered the belongings of himself and his team before fleeing.\n\nThe inside of the aircraft was sobering; the collections of Brazilian aides and diplomats looked demoralized. Some were frightened and shaking with fear, others were red-faced and frustrated, and Edna stared down at her lap unblinking. As their aircraft took off and left the land of the Rising Sun behind them, Quadros' mind still raced. Who was after them, and why? Looking back at Edna, he tried to get her to speak. "Hell of a mess, huh? Let's hope they catch the bastards that did this." This made Edna raise her head but only to stare at him with an unreadable look. She then slowly shook her head back and forth before gazing back down at her lap, leaving him confused."
 brazil.478.a: "Was it something I said?"

 brazil.479.t: "You Had One Job"
 brazil.479.desc: "As soon as Quadros landed in Brazil, he was quickly summoned to the Palácio da Alvorada without a moment of explanation. The air in President Lott's office was cold and riddled with tension, the man himself staring daggers at Quadros, molded in a union of frustration and disappointment. "Do you even realize what you have done? If we're lucky, the deal will be delayed by months, perhaps even a year. But you: you've embarrassed and shamed us all with your ridiculous antics."\n\nQuadros held his gaze with a scowl of his own. "I performed the best I could. Letting that deal go by without even trying to improve it would have been far more humiliating." There was an audible restraint in his tone like he was just about to start shouting.\n\nLott's expression twisted with restrained fury. "Improvement?" His tone was incredulous before becoming ever more baleful. "What was there to improve!? We had a sound deal with the Japanese, and instead you accuse them, in their face, of fiddling us like puppets!" He took a deep breath, clutching his hands together to prevent himself from outright losing himself to his impulsive rage. "Besides, I am the President of this nation: last I recall, I did not remember giving you permission to renegotiate."\n\n"Permission?" Quadros scoffed and rearranged his glasses with his index. "What are you, Brazil's Hirohito? In case you have forgotten, your Majesty, the people elected me to do what's right for them, not for you!"\n\nA sharp groan followed the sudden rise of Lott from his seat, the burning anger in his eyes practically visible as he nearly succumbed to the urge of punching this absolute buffoon's teeth down his throat. Discipline stayed his hand again, as he instead pressed his knuckles onto his mahogany desk and uttered his following words with a lion's growl. "That'll be enough, Quadros. I summoned you here so that you may explain your failure, and you've given me explanation enough. You may leave." Quadros paused as though he had more to say, before turning with a scoff and storming out of the office."
 brazil.479.a: "The rift deepens."
 
 brazil.480.t: "A Comfortable Agreement"
 brazil.480.desc: "There are times when discretion is the better part of valor. A concept that Quadros was familiar with but not fond of. Still, he had to admit that his aides made a good point; while the panda gift in and of itself wasn't anything to make a big fuss over, the potential of upsetting the ever prickly Japanese wasn't worth the toothache like pain that would follow.\n\nWhat followed were some frankly dull but thankfully short discussions that amounted to the Japanese shrugging their shoulders and letting the deal happen. And why wouldn't they? It wasn't like they were going to lose anything.\n\nHis boredom aside, everything worked out just fine. The Japanese got to sit in on their puppet's dealings. The Chinese got a minor diplomatic victory. And he got to bring home one hell of a present for Brazil. There was only one question left to ask.\n\n"When do we get to see it?""
 brazil.480.a: "Who says you can't please everyone?"
 
 brazil.481.t: "A Farewell to Those China Nights"
 brazil.481.desc: "The journey through China was an experience that neither Jânio Quadros nor Edna Lott would ever forget. From the sights of the Presidential Palace to the sounds of everyday life and festivities and fine dining marked the trip's high points. It wasn't without its hiccups, the impulsive and odd behaviors of Brazil's Vice President and the inflexibility of the Japanese diplomats made for some uncomfortable situations.\n\nEven so, the journey proved very fruitful. Chinese rice for Brazilian oranges, steel for products, the promises made before Quadros' detour were finally being made a reality. As Quadros and his entourage thanked their hosts for their generosity and help, the Vice President felt a sense of great pride and accomplishment. Resting aboard his aircraft, the man brims with anticipation as the plane takes off.\n\nFar away within his presidential palace, Henrique Lott can only hope that Quadros does not do anything to ruin the trip at the last moment."
 brazil.481.a: "Hopefully he can continue to behave himself."

 brazil.482.t: "Sweeping the Cherry Blossoms"
 brazil.482.desc: "After a long and tiring trip, Jânio Quadros and his delegation finally arrive in Japan. Getting off the plane, he immediately felt overwhelmed as he watched a large crowd cheering for him, waving Japanese and Brazilian flags in unison. Filled with ecstasy, Quadros waved back at the crowd as he stood on the boarding bridge. At this very moment, Quadros felt as if he were the President of Brazil.\n\nQuadros stepped on the red carpet waiting for him at the bottom of the stairs, walking seemingly intoxicated with a wide and goofy smile on his face as Japanese guards surrounded him, observing him with some confusion. At the end of the carpet, he met with Ino Hiroya, with whom he exchanged a bow and took a picture with before walking off.\n\nShortly after, they were greeted by NHK news reporters asking questions about his goals in his visit and how they would benefit relations to Brazil. Quadros paused his waltz for a second, perhaps in order to ponder his next words.\n\nBack at home, Lott was sitting down drinking a small cup of whiskey while watching his 'partner' arrive in Japan without any issues and crisis. Soon, it would be his time to get ready to meet the Americans. On the other end, the American Ambassador, Lincoln Gordon, nervously watched the Vice President arrive in Japan, thinking that this could only spell doom for American interests in Brazil.\n\nQuadros knew he had to speak cautiously, for if he said something out of place, someone wouldn't be happy. As if on queue, the reporters leaned their mics closer, prompting Quadros to say..."
 brazil.482.a: "...that he looked forward to establishing stronger economic and diplomatic ties to the Japanese sphere."
 brazil.482.b: "...that he looked forward to viewing the beautiful cherry blossoms in the country and meeting the Emperor."
 
 brazil.483.t: "A Humble Apology"
 brazil.483.desc: "Quadros' heart palpitated, so much so the overwhelming feeling of dread began to empower over the man, as he now understood the sheer severity of the issue... or the lack thereof. And it is now in Lott's hand to fix it, he knew. And Lott would most likely have a thing or two to say after it was done, he knew. Regardless, the scope of the issue itself wasn't the truly important part. Effectively, and speaking in technicalities and purely circumstantial idiocies, Quadros had said a thing or two which assimilated anti-American sentiment. A lack of understanding, surely.\n\n"I have been hearing some very concerning things from our Japanese sources, Senhor Lott," Lincoln Gordon, incumbent American ambassador, "Making bold statements in favor of the Japanese propaganda machine and the sort. Not very helpful in the work we're trying to do, you'll understand."\n\n"I assure you, Mister Gordon, Quadros is not speaking in favor of the Japanese in any capacity. A mere misunderstanding, a twisting of words, which happens often in the media nowadays," Lott chimed in, trying his best to keep a wide grin adorned on his face.\n\n"Treading carefully might be the best course of action in this particular situation, Senhor Lott. While the United States supports you politically, you must be wary of internal threats lead by Quadros, or anyone, against your rule.""
 brazil.483.a: ""I am very sorry again, Mister Gordon.""
 
 brazil.484.t: "Addressing the Legislature"
 brazil.484.desc: "Quadros looked unto the audience in awe. It was a grand salon, filled with who he knew were grand politicians, all very well versed and very well judgemental. He trusted Edna's work would suffice to give a good, if not decent speech over to the Japanese National Legislature. He called forth for the attendee's attention, slightly raising his hand.\n\n"The Japanese have shown that it is capable of being taken as an example to follow, an inspiration to all nations of the world in how a country can prosper and develop economically is fascinating. It is one of my personal inspirations for me, in Brazil," he took a pause, tapping his fingers unto the table before him.\n\n"The conservative moral stature and traditional values of Japanese culture keep a strong and healthy country, alongside its Pan-Asian brotherhood and regional unity, a model which Latin America would most certainly benefit from." Though short, the speech left no bitter taste in the Legislature attendees' mouths, instead Quadros found himself receiving a polite applause."
 brazil.484.a: "Another controversy averted?"
 
 brazil.485.t: "Exploring Tokyo"
 brazil.485.desc: "Quadros had finally achieved it, outsmarting his aides and confidants Lott had sent over to keep him in check. He was free now, for at least a moment, free to enjoy the charm of Tokyo and its brightly colored technological golden age. The lights were nearly blinding.\n\nNot even in Rio could Quadros find himself in such a luxurious environment, so much so that the entire location was almost alien to him. Little food stands and souvenir shops plagued as far as the eye could see, giving the streets a cozy air of mercantilism and bustling life.\n\nFor a moment, Quadros nearly forgot there were only a few hours before he had to return to his summary duties. Meetings and interviews and speeches, where instead he could be marching down the fine lighted street, away from all the politics he swore to dedicate himself to. He shrugs, ready to lose his last few hours in good faith, rather than in worry. To which, he notices some sake... a beverage, alcoholic, but far more delicious than anything in Brazil. Though he must remain sober for the meetings to come. Perhaps... if only..."
 brazil.485.a: ""One drink can do no harm, right?""
 brazil.485.b: ""No, I better not.""
 
 brazil.486.t: "An Imperial Honor"
 brazil.486.desc: "Quadros curtsied over to the welcoming party, arriving only a few minutes earlier than expected, clad from head to toe in acceptable, professional wear. Escorted down a few hallways, turning from left to right and right to left, losing himself in the labyrinth of the palace they finally gathered at a large opening behind one last set of doors.\n\nIn adequate awe, Quadros went to bow over to the presence of the Emperor. It was a particular experience, as if the environment irradiated some sort of importance. Little words are factually exchanged between Quadros and the Emperor, though it soon becomes a productive meeting.\n\nHe sighed a sigh of relief. He knew things would change now. The Japanese now know Quadros is a trustable man, and a great help for their work in Brazil and their own personal interests. Unlike the PSD, Japan has the relief of a good backbone of negotiations, and mutual respect."
 brazil.486.a: "A rotund success."
 
 brazil.487.t: "An Imperial... Confusion?"
 brazil.487.desc: "Quadros's face looked as if taken out of a horror story. He was tired, not unwashed but terribly hungover, debating whether vomiting it all was a better option than keeping his insides where they belong. Late by twenty minutes, it was a miracle in itself the Emperor was even willing to wait such a time, and even so, be greeted as he did.\n\nThe meeting was sour. Respect was shared around men, but it became increasingly obvious that the lack of proper politeness had affected the perception of several Japanese officers present. Perhaps the right way to describe it, from their perspective, is usefully unstable. A great tool, a great aid, but not the most coherent man.\n\nPerhaps if it wasn't for the blatant attempt at seeming sober, treading most carefully to not completely waste the opportunity provided. And to his knowledge, he succeeded, though with unnoticed effects. He was not what the Japanese were expecting.\n\n"They didn't look very happy," muttered an aide, taking precise note of Quadros' behavior, "The Japanese are not very fond of mistakes, especially when it involves their culture.""
 brazil.487.a: "An embarrassment."

 brazil.488.t: "To Those Who Would Object..."
 brazil.488.desc: "It had taken a while, but it was finally here, the reason Quadros had set out for Japan in the first place. The deal envisioned by Kubitschek was finally going to become a reality. Brazil would receive a boon to its industrialization, the Japanese would get their agriculture and a (minor) victory over the Americans, Lott would get equipment for his egregiously expensive highway, and he would get to sign on it. Everyone gets what they want.\n\nOr did they? Quadros knew that the deal wasn't as fair as everyone thought. There were farmers back in São Paulo that were getting the short end with this deal; maybe he could do something for them. No, no, wait, it was too late, wasn't it? He stood by as the press surrounded the table the papers laid on, and a new idea came to him.\n\nHe could make a scene and demand concessions. Even if the Japanese refused to listen to him, he could show the boys back home that he fought for them, even when Lott didn't. On the other hand, trying to get more out of a deal already negotiated for better polls back home was somewhat short-sighted. Decisions, decisions. As one of the men offered him a pen, he made his choice."
 brazil.488.a: "Eh, probably shouldn't push my luck."
 brazil.488.b: "Oh damn it all, the farmers deserve better!"

 brazil.489.t: "...Forever Hold Your Peace"
 brazil.489.desc: "Quadros accepted the offered pen with an easy smile but a less satisfied mind. Sometimes, you have to use the hand you're dealt with, even if it left some men (and opportunities) in the dust. Besides, putting this deal off any longer was just plain petty at this point. He'd have plenty of chances to show off to the voters another time. At least, this was the Vice President's thought process when he signed off on the deal. Later that evening, the variety of drinks offered to him, and the celebratory feast back at the Brazilian embassy quickly made him forget about his brooding.\n\nFor the Japanese, it was also an evening of celebration as they made a major foray into getting a foothold in the United States' backyard. Brazil was a grand prize for investment, and the Vice President of the South American giant was well known for his skepticism of America. Perhaps a day would come when the rising sun would shine over the Amazon.\n\nIn Brazil itself, the news of the deal's signing was met with great approval. It still had to be voted on by the Senate, but the widespread bipartisan support for the bill left little doubt about the outcome. President Lott, for his part, was thankful for a job well done and without incident. With a bit of luck, the rest of the visit could be the same."
 brazil.489.a: "Another day, another success."

 brazil.490.t: "...Speak Now"
 brazil.490.desc: "Edna Lott took a moment to enjoy the sights before her. Quadros was taking things seriously; her fellow diplomats for Brazil were standing upright and presentable for the press, their Japanese counterparts looked pleased, and the press had their cameras ready. Everything was as it should be- wait.\n\nWhy isn't he taking the pen? Why is he clearing his throat? Why the hell is he talking about São Paulo's soybean farmers? Concessions!?\n\nAs Quadros continued his tirade to the shocked men in front of him, Edna took a moment to survey the environment a second time. The Brazilian entourage looked mortified. The Japanese stared as if her father's Vice President had grown a second head. And the cameras were still at the ready.\n\nEdna could look back at the event with some pride in her team. After the initial shock, they managed to pounce upon the crisis with incredible skill; in minutes, they managed to get Quadros to back down, re-assure the Japanese, and get the deal signed. The only thing they couldn't stop were all the journalists who would have a field day with this. The worst part was that she had no doubt that his followers, especially those in São Paulo, would eat this up."
 brazil.490.a: "Let's hope no one else does."

 brazil.491.t: "Sayonara Nippon, Ni Hao Zhongguo"
 brazil.491.desc: "Quadros woke up with a grin and a skip in his step. Yesterday had been almost perfect; the deal was signed, the celebrations were worth the tax money, dinner was delicious, Edna was too busy to badger him, and the drinks wouldn't stop. Or, at least, that's how he's pretty sure it went. Around two hours into making Japan's Brazilian embassy the best place to be east of Rio, someone pulled out some "special" sake, and his memory became just a little spotty.\n\nEh, it was probably fine; worrying about it wouldn't change anything, and he had a plane to catch. As the Tokyo skyline disappeared behind him, Quadros took a moment to reflect on the good times he and the team had before feeling a fresh wave of excitement over the destination ahead. Oh, China, he could see it now; the rustic countryside, the developing cities, the ancient sights, and just think of all the pandas! This was shaping up to be a wonderful vacation of a diplomatic trip. Now, if he could just get the Japanese to relax a little."
 brazil.491.a: "Maybe they will be less strict?"

 brazil.493.t: "The Diplomatic Tug of War"
 brazil.493.desc: "It wasn't often that Quadros found himself lost as to where to go next, but the two envelopes in his hands gave him pause. The trip was supposed to be over, the visits were made, the deals were signed, and the only left was to go home; it was probably what Lott wanted. But on the other hand, it wasn't every day that you got formal invitations from two of Asia's centers of industry.\n\nGuangdong and Manchuria, the Sphere's rising star and its oldest workhorse. One was a bustling tech industry of a country, a place for innovation with an eye for the future. The other was the once-upon-a-time golden goose of Japan's empire, where resources were tirelessly extracted to fuel a superpower. And their competition for foreign investment was famous even in Brazil.\n\nQuadros could preen with pride that two countries were vying for his attention; it was a shame that he was confident he couldn't get away with visiting both. Lott would put his foot down at that, but he would listen to the idea of a new trade deal with either of them. At first glance, Manchuria was the obvious choice; this visit had been about industrialization in the first place, and the Manchu had proven their worth on that front. On the other hand, Guangdong's developments were auspicious, and a visit could get Brazil on the ground floor for something world-changing. Of course, both carried the stigma of exploitation and misery for the native peoples. Maybe the moral choice to ignore both was more important than anything economic."
 brazil.493.a: "Eh, we were here for industrialization anyways, to Manchuria!"
 brazil.493.b: "Let's see what those wizkids in Guangdong have cooked up."
 brazil.493.c: "Bah, forget about it! Let's just head home."
 
 brazil.495.t: "Big Deals in Little Manchuria"
 brazil.495.desc: "As soon as they landed, Quadros knew they were being watched. This wasn't unusual since their visit to the Sphere began, but this felt different. This didn't feel like this was for his safety, but he couldn't put his finger on it. His hosts kept him and his entourage on a tight leash; as soon as they got off the plane, they were driven to a hotel and kept there until it was time for their scheduled visits to whatever industrial zone they felt like showing off to them and taken back as soon as it was over.\n\nThe uncomfortable atmosphere aside, they put on impressive a show. For all the troubles and trials the Empire of Manchuria had endured, it had transformed into one of the most significant industrial giants in Asia. Sure, they probably had used more than a few unsavory means to do it, but maybe there was something Brazil could learn from here.\n\nAfter the Empire's captains of industry were satisfied with their demonstrations, they met with him face to face to discuss business. Hashing out an agreement was simple enough; everyone already knew what they wanted from this, and he even managed to get his counterparts to toss a bonus package in the accord for southern Brazil. The only thing left to decide was if it would provide for the south: more industrialization or mechanization?"
 brazil.495.a: "Let's keep that industrial ball rolling."
 brazil.495.b: "Let's give the farmers a little something."

 brazil.496.t: "A Forlorn Farewell"
 brazil.496.desc: "The deal, funny enough, was the easy part. Convincing his hosts to let him go sightseeing was the much, much more challenging part. They offered him numerous tour guides but were adamant that he could not wonder as he pleased for "safety" reasons. Quadros gradually realized why the bodyguards assigned to him were so strict. It wasn't for his safety; so far as he could tell, he was never in danger from whatever partisan movements were still active in the country. It was to keep him from seeing anything they didn't want him to see.\n\nOh, they put on a grand show, but some things can't be hidden. Almost every good view was spoiled by some factory's black smoke and other pollution. The cities that boasted impressive design and architecture had their roads cleaned and presentable, but you could see the homeless and disenfranchised brushed off into their alleyways. The workers and laborers put on their best smiles and cleanest uniforms, but if you peered closely enough, you could see their old cuts or burns. Manchuria was an ugly country if you could call it that.\n\nThere was nothing he could do about it, and he had accomplished what he came here for, so he stuffed those ugly feelings away. However, he boarded his plane home just a bit faster than usual. As he strapped in for take-off, he glanced at Edna and noticed her downcast expression. As soon as they reached a stable altitude, he waved over a flight attendant and asked for two drinks. Handing one to Edna, he gave her a grim smile."
 brazil.496.a: ""Hell of a place, isn't it?""

 brazil.498.t: "The Future Is Here"
 brazil.498.desc: "Quadros wasn't sure what to expect when he decided to entertain the Guangdong businessmen's request to give a speech for them, but what he did see was nothing short of incredible. Cities of neon, various titans of technology and innovation whose factories churned out everything from home appliances to the latest in music or weaponry. Guangdong truly felt like something from the future. Speaking before an audience of the colony's wide variety of Japanese technocrats, Chinese workers, and everyone in between, he settled on a speech about the awe their works inspired as well as having a side focus on cooperation between their countries as rising economic powers.\n\nWorked like a charm, of course. As soon as the speech was over, a group of businessmen invited him to their office's backroom to discuss a trade deal. It proved to be a streamlined process; it seemed they had been preparing for this occasion well in advance and boiled down to two options. The first centered around Lott's Amazonian highway to excessive debt; specifically, it was about tools and machinery that could quicken the process. The second was based around giving Brazil a foot in the door of the country's technology trade, thus giving Brazil a boost over its regional contemporaries."
 brazil.498.a: "The sooner that highway is finished, the better."
 brazil.498.b: "Tell me more about those new products you're rolling out."

 brazil.499.t: "The Future Is Flawed"
 brazil.499.desc: "With the negotiations finished, Quadros and company could look forward to a night on the town across Guangdong. It was an experience none of them would ever forget. While Brazil had its big cities, none of them were like Kōshū, Makao, or Honkon. Although it took some effort, they restrained themselves from turning the trip into a shopping spree. Instead, they took numerous notes on various developments for things to keep an eye on. He, in particular, was interested in the state's weapon developments (for Brazil) and portable music players and stereos (for himself).\n\nIt wasn't all perfect, however. Guangdong radiated an atmosphere of inequality, the impoverished and downtrodden were familiar sights. Smog was everywhere, and if you squinted through it, you could see gangs lining up in back alleys or street corners in search of easy marks. Most disturbingly were the nets he kept seeing set up around the city, which he learned, after much probing, were for suicides of all things.\n\nStill, Quadros boarded his aircraft in high spirits. So long as Guangdong addressed its issues of poverty, crime, pollution, and unhappy office life in a reasonable fashion while maintaining a strong economy, he was sure that the country would be a wild success."
 brazil.499.a: "Now if only I could get some of those advertising jingles out of my head."

 brazil.500.t: "Tchau Japão"
 brazil.500.desc: "With a shrug, Quadros tosses both invitations in a nearby trash bin. The trip was over, and as much as he enjoyed his time in the Sphere, he and his entourage were getting homesick. Guangdong and Manchuria were probably ugly places anyways, and it's better to end these adventures on a high note.\n\nEdna and the rest seemed relieved by this, and they all boarded their flight in high spirits. All in all, the trip had been a massive success in his eyes. He even got Edna to admit she had enjoyed herself on their little voyage, despite all the stress. With one last goodbye from his window, he bid the Japanese farewell and watched his adventure end."
 brazil.500.a: "May we meet again soon!"

 brazil.501.t: "The Prodigal VP Returns"
 brazil.501.desc: "When Henrique Lott decided to send Quadros out to the Sphere to sign Brazil's trade deal with Japan, he did so with great reluctance. There were days when he remained awake at night, worried his Vice-President's oddities would end the visit early or make the deal fall through. Fortunately, the Broom Man had proven him wrong, and when Quadros to his office with a swagger in his step and a conqueror's grin, he received him warmly.\n\n"Welcome home; I've heard things went well." Lott spoke with a tame smile, all the while keeping his ill memories of Quadros's past fumblings under the rug for this moment of rare success.\n\n"Well? Ha! They went just about perfect." The man beamed with pride. "How are things over here?"\n\n"The deal has been present and should be passed rather smoothly." Lott shrugged his shoulders. "The only party that truly opposes it is the UDN."\n\n"Oh, just when I thought no one had a bigger stick up their asses than the Japanese." They shared a laugh before Quadros let out a yawn. "I suppose that's my cue to head home; farewell and good night!" The two shook hands before parting ways."
 brazil.501.a: ""Enjoy your rest, you've earned it.""

 brazil.502.t: "The Way to Washington"
 brazil.502.desc: "Lott took a moment to stretch his limbs before exiting the aircraft. It wasn't his first flight to Washington D.C., but the long voyage always left him with some fatigue. Thankfully, the car ride to the White House proved to be a more comfortable experience and gave him some time to think over his plans.\n\nRelations with the Americans were good, had been since the end of Vargas' reign, but the Americans were an ever-suspicious lot, President Nixon especially. Regardless of the years of healthy trade and official status as a partner in the OFN, Brazil's refusal to completely bend to American wishes and give up its own independent diplomacy ruffled feathers. Brazil and Japan's deals since Kubitschek's presidency left more than a few men in Washington nervous. Personally, Lott would take the Yankees over the samurai any day of the week, but it wasn't as though Brazil did not have its own complaints towards the master of the OFN. The naval bases lent to the Americans remained a most controversial issue that he would have to address carefully.\n\nMaintaining good relations with America without sacrificing Brazil's foreign policy wouldn't be without its challenges. But Henrique Lott wasn't a man to shirk in the face of adversity. He just hoped that Nixon was willing to listen."
 brazil.502.a: "Ah, America. The greatest friend, and worst neighbor, one could ask for."
 
 brazil.503.t: "Lott and Nixon's Day Out"
 brazil.503.desc: ""President Lott, it is an honor and pleasure to meet with you." Nixon's smile was charming and his handshake firm, but his eyes told a different story. He knew a man on the watch for danger when he saw one, and the President of the United States radiated suspicion and unease. The wide variety of cameras and journalists observing their every move during their conversation didn't help. Lott smiled back and kept up a strong showing for their audience.\n\nThe conversation between the two was primarily over the continued friendship between their nations before evolving into a discussion on the broader relations of Latin America. "It is my most sincere hope that through the combined efforts and policies of the United States and Brazil, we can safeguard the ideals of liberty and equality across the Americas," Nixon announced at one point with a broad smile pointed towards the cameras. "We are, after all, stronger together than apart."\n\nLott knew where this was going. Nixon was trying to get Lott to make a public commitment to American policies, and it occurred to him that he could turn this against his counterpart. The more American-sceptic members of the PSD and PTB had been grumbling to him for months to take a stand on Brazil's independence when it came to foreign policy and challenge the Americans on something. Perhaps this could be a splendid opportunity to address the issue of Brazil's leased bases in the north and request the Americans pay more while showing off to his supporters. Of course, trying to get ahead of his companion in front of the press would have consequences."
 brazil.503.a: ""Ah, I'm glad you mentioned equality. I would like to discuss some unequal dealings...""
 brazil.503.b: "Perhaps it's not best to pluck this eagle's feathers..."

 brazil.504.t: "The Downside to International Showboating"
 brazil.504.desc: ""...for the prices paid by the Brazilian people to lease their naval bases to the United States have not been equal for some time. If our two nations are to make a united front to show the continents and the world that we are free and equal, then we should first make sure we are equal in our agreements."\n\nLott knew he had made a mistake almost as soon as the words left his mouth. He could feel the air become tenser and see Nixon's face shift slightly away from a welcoming and accessible expression to one of irritation.\n\nTheir discussion took a turn for the worse after that. Of course, they remained civil, but the air of friendly talks between the two allies had been broken. Fortunately for them both, it wasn't long until they took a break to meet with their respective teams. His aides assured him that what he did was very brave and would impress back on the home front, but Lott knew it was a hollow victory. He should have acted with more tact, more sense.\n\nThis visit was supposed to be about the friendship between their nations. He couldn't imagine that the house and senate would be amused by his little stunt. Hopefully, he could show the Americans he still supported them against Germany. If he couldn't, then this was already shaping up to be worse than his Vice President's visit to Japan."
 brazil.504.a: "Not a great start."

 brazil.505.t: "A Friendly Chat"
 brazil.505.desc: ""Of course," Lott began with an easy smile. "Brazil and the United States are beacons of liberty for the world; cooperation in the name of democracy between our nations can only bring good." He could imagine the frustration that Quadros and the other foreign policy hardliners were likely feeling at this moment. No matter, some grumbling back home was worth better relations abroad.\n\nFor his part, Nixon looked quite pleased. "Of course, the cause of freedom at home and abroad demands the highest quality armaments for its champion's self-defense." And now he was trying to tempt Lott with a deal. "The arsenal of democracy is more than ready to assist our friends wherever and whenever they need material." Well, it was working.\n\n"You have my attention." When the talks ended, Lott could say he was more than satisfied with the outcome. American and Brazilian relations were still on a high note, he had the ground floor laid out for new weapons purchases the army needed, and he even managed to keep Nixon in a good mood. Now all he had to do was speak before the house and senate, and this trip would be an overall success."
 brazil.505.a: "The Yankees have their good side."

 brazil.506.t: "The Cause for Our Struggle"
 brazil.506.desc: "Applause hailed Lott as he strode forwards to make his speech. The American house and senate gathering to be bestowed a visit from a foreign leader, a great honor. And one not given lightly. It was something that displayed the respect and friendship between America and Brazil. When the sound, at last, ceased, Lott inhaled a long breath and began.\n\n"Twenty years ago, the world was in chaos. Empires built on autocracy and hate marched forth to conquer and ravage any that would not bend to their wills. There, the United States and Brazil first fought alongside each other in the name of liberty. We could not prevent the tragedies that claimed millions of lives, but we could stop them from happening again. And so we did; together, we have stood firm against the tide of fascism and protected the ideas of democracy and freedom across Latin America."\n\n"Even now, Brazil had found herself on the front line of this crusade. The Third Reich's colonial butchers, not content with its pillaging of Africa, have reached out into our sovereign waters to steal the livelihood of our innocents. We have seen where their ilk leads, and we will not bow before their tyranny."\n\n"To the United States, I will say this: in a world where the ideas of inherent rights and liberties for every man, woman, and child are suppressed by parasitic overlords across entire continents, America is the inspiration for something better. The guiding light shows us that we are all more than cogs in a dictator's scheme. It is the protector of those that cannot save themselves. It is proof, not just for Brazil, not just for Latin America, but for all mankind, that we can be free: free to choose how we live and who leads us, free to express ourselves and believe in whatever we choose to, free from the shackles of tyranny or the butcher's cleaver, and free to be prosperous without the enslavement of our fellow man."\n\n"If we can stay this course, if we can all endure all that the enemies of liberty can throw at us, if we can remain righteous and fair in our conduct, then I believe that the United States and Brazil can set the world back onto the road to peace and prosperity for all. Thank you." Applause drowned out his world for a second time, and Lott's chest swelled with pride."
 brazil.506.a: "May the Torch of Liberty burn bright forever."

 brazil.507.t: "A Tourist's Musings"
 brazil.507.desc: "Lott wandered through Washington D.C. with a thoughtful mind and patient stride. All in all, the visit had been a success. Brazil's ties to the United States were strengthened without damaging its independence. And unlike his Vice President's escapades across the Co-Prosperity Sphere, Lott had managed to avoid any significant embarrassments or catastrophes. He made a mental note that maybe he should be the only one visiting other countries in the future and keep Quadros where he can't be seen.\n\nHis musings were brought to an end as he found one memorial that stood out to him more than any other. One dedicated to the long-deceased President Lincoln. A man who pulled a torn-up country back together. Who stood firm in the face of painful struggles. Someone who tore down a corrupt and barbaric institution.\n\nHe kept the fallen President's achievements in the back of his mind as he made the journey back home. Lott didn't expect to face trials as disastrous as Lincoln's, but his task was daunting nonetheless. But if it meant he could leave behind a Brazil better than the one he found, it would all be worth it."
 brazil.507.a: "May we all dream of a better tomorrow."

 brazil.508.t: "Quiet Reflections"
 brazil.508.desc: "Right after turning off the lights, Odílio Denys leaned back on his chair inside his office, wiping off the sweat from his forehead with a napkin. It was a day like any other for the general, but there was one thing that he couldn't get his mind off of. A few days ago, Lott had called a meeting with all his ministers to announce his plans for his last project as President: the Lott Act.\n\nDenys had already known this was coming. For as long as he had known him Lott had expressed his concerns about military influence. But now he couldn't help but feel like something was wrong with his good friend's words. He had spoken of the need to 'overhaul the military' to ensure their 'loyalty to democracy and the elected President regardless of who he was.'\n\nHis left hand unconsciously gripped the armrest of his chair as he reminisced his words. Had he forgotten who had helped put Vargas in power during the 1930 revolution against the elitist landowners? Did he not know who protected the Brazilian seas against the Nazis, who gave their lives to preserve South African liberty from their threat? This wasn't the Lott he knew. There must have been some outside force influencing him.\n\n"Yes, of course!" thought Denys as he mentally slapped himself, sighing in frustration. He should have known better than just to let Lott hang out with Marxists like Goulart and Brizola. Now his head was filled with the blooming seeds of evil and weakness. But it was not too late, there was still time to save him.\n\nFinally, letting go of his grip and wiping off the last few droplets of sweat, Denys got up and confidently walked out of his office. Once he reminded Lott of his duties as a soldier, the seeds of Marxism will quickly rot, and he will have his old friend back."
 brazil.508.a: "Marxism must be defeated."

 brazil.519.t: "The Guanabaran Deluge"
 brazil.519.desc: ""The weatherman says a storm's coming, but I think he's trying to keep the beach to himself!", or so the refrain often went the night the storm came. Jokes about the weather were bandied like beach balls, a trendy toy from American movies. It drizzled at times, but nothing a coat or umbrella couldn't handle. The Bay chuckled along with them, biding its time.\n\nDespite dreary skies and the fact New Year's Eve was last night, everyone stayed festive. Fireworks could barely be seen through the clouds, but the Guangdong radios kept Rio alive. Some savored Ian Callaghan catching United's defense flat-footed, bringing Liverpool a 2:1 victory. Others sang "sai, sai, sai" along to Trem Das Onze for the millionth time, somehow never getting tired of it. The rest mindlessly consumed details of the Presidential Inauguration's evening reception and whatever fancy wine the corrupt idiot had.\n\nSuddenly, the sky thundered, drowning out all the sports, samba, and gossip. Rain poured. Guanabara Bay crashed the seaside fiestas. No worries, just move higher. Lacerda's seawall will hold the water back.\n\nIt didn't.\n\nWaves washed over, sweeping cars away like toys, wreaking havoc on businesses. Yet, the city's heartbeat continued from high ground; many sheltering in the labyrinthine favelas. Sure, they were crowded. Many had to move there when Lacerda gentrified them out of their old homes, but it kept them out of the flood.\n\nHowever, the storm, refusing to give up, had one last dirty trick. The sea didn't just rise; the land sank. Flimsy favelas built on top of each other, full of people, fell like dominoes as the soil compacted a few inches. Drunk on champagne, the government was too busy asking the new President where he bought his suit before realizing what was happening. Those who survived the falling and crashing were dragged into the icy depths of the Bay, never to see their city again."
 brazil.519.a: "Three hundred and twenty dead, hundreds more injured, thousands displaced."
 
 brazil.520.t: "The Coming Tempest" 
 brazil.520.desc: "Francisca could finally relax. Christmas had not been kind to poor shipping clerks like her. However, the workday was thankfully over. Returning to her tiny two-room apartment in Gamboa, she found one of her kids asleep on the sofa, still in her uniform, and the TV still on. Glancing outside, she saw Guanabara Bay bathed in sunset gold, softly whispering to her. "Take a moment for yourself", it said. "Try finishing that depressing novel of yours."\n\nLying on her green patterned mat, she picked up her wrinkled paperback. "Vidas Secas", the cover read. She frowned. No matter how much she read, the story just didn't connect with her. Sure, she could relate a little. Finding a source of income when food and rent doubled in cost every few months was hell.\n\nYet, that seemed so long ago now. Prices still rose, but her savings kept pace. Her children got the education they needed—her daughters had begun high school, and her son studied physics! They even had a fancy Guangdong television.\n\n"Heavy rains are coming to Rio," the machine exclaimed through static. Barely half a year old, Rede Globo was experimenting with its programming. Hoping audiences liked the new weather segment, they tried to keep the tone light. "New Year's is looking to be quite wet, but trust me. Soon you can don your swimsuits and enjoy some cocktails on the beach."\n\nBarely paying attention to the news, the book slowly slipped from her fingers as her eyelids grew heavy. Its story kept talking about droughts, but the sun hadn't been "merciless" or "cruel" lately. Cool December air had softened it as it gradually set beyond the mountains. There was still time before the others came home. Dinner could wait. What harm could a quick siesta do?"
 brazil.520.a: "The nights covered the earth in shock."

 brazil.522.t: "Riding the Storm" 
 brazil.522.desc: "It was barely half past four in the morning when President Costa e Silva issued a memo for a meeting. Several generals from the hardliner faction he hailed from, which Brazil now knew as "government", came into the Planalto Palace meeting room drearily and with little enthusiasm.\n\nGeneral Tavares was first to speak. "Sir, to what do we owe the courtesy of being sent orders at such an offensive hour?"\n\nThis inflamed the President. "You owe it to the people of Guanabara, General, and more importantly the people of Brazil. If you continue to be so insolent about what should be our duty, you will never be seen in Brasília again." He lowered his tone.\n\n"There has been a natural disaster in our second city. Hundreds will probably die and hundreds of thousands will be affected. Reports on official casualties are not on my desk, but I do not plan on waiting for numbers. I plan on showing this country the military is for Brazil, unlike the godforsaken, incompetent regime before us. They will know that when they are in crisis, it will be us who are there and who will do their duty. And that," glaring at Tavares again, "will start here."\n\nSílvio Frota cleared his throat, speaking with deference. "Sir, naturally we stand shoulder to shoulder with you and with Guanabara. What are our orders?"\n\n"You will join General Olímpio this morning in Rio. This instant." He began to count even more commands on his fingers. "You will ensure we rebuild and we do so successfully. You will ensure our aid gets to the people who need it. Most importantly, the criminals. Whenever there is a crisis here, every single looting and rioting rat in our cities shows their face. Make sure you flush them out, Frota. Dismissed.""
 brazil.522.a: "Rule by the sword is rarely subtle."

 brazil.523.t: "Another Blasted Problem" 
 brazil.523.desc: ""What's the situation?" Branco muttered groggily and hastily ushered into the briefing room. His awakening had been distant from pleasant, rubbing his eyes while listening on.\n\n"Rio has just been struck by a massive storm, causing widespread devastation," reported one of the officials. "The governor has requested urgent assistance to the crisis. We've already planned out a plan of approach for the situation."\n\nBranco sighed heavily. He anticipated the wake-up call to not be pleasant either. "Contact all the military advisors, and ensure that they mobilize all available support for the governor. They should be more than equipped to handle the crisis without any need for a direct intervention from me right now." With that, he leaned back in his chair, feeling a mix of concern as all the participants made their leave from the conference room.\n\nHas he just acted too quickly, or perhaps not quickly enough? Did he just make a massive mistake in handling the situation? Or maybe it was a blessing in disguise? He could think of many outcomes, but there's one thought for sure - that the situation has a quick and hopeful resolution."
 brazil.523.a: "Time will tell."

 brazil.524.t: "Swept Into the Palace"
 brazil.524.desc: "A vision of someone in black robes shook and became blurry, like a TV with its antenna falling off, then gave way to the gelid face of an aide. "Sir, get up! There is grave news!"\n\nMumbling and still somewhat intoxicated, Adhemar was escorted into a stateroom that had the looks of being converted into a crisis response centre. A stiff coffee was handed to him by Laudo Natel, his chief of staff, while Manhães Barreto, his hands shaking, poured for the President a glass of water to follow. Amaury Kruel and Vasco Leitão da Cunha stood vigil; Edna Lott was absent, not having been informed.\n\n"No wonder the poor bastard's shuddering," Adhemar thought as Ernesto Geisel walked into the room. "The weight of this post, it's making itself felt. God, I'm so afraid—" His thoughts were cut off by Geisel turning on the radio.\n\n"This is Rádio Verde-Oliva. We transmit the following civilian reports from Guanabara: flash floods have been confirmed throughout the state, resulting in mass landslides. Hundreds are confirmed dead, thousands are missing, and displacements are in the tens of thousands..." The room fell silent as the enormity of what had happened sank in. But Adhemar felt a realisation come over him. Not only was helping his duty, he could use this to prove his own legitimacy. Discredit the Guanabara UDN, prove Lacerda's projects wrong.\n\nThen Geisel shut the radio. "What's to be done, then?"\n\nAdhemar replied first. "We move at once. Whether Lacerda or whatever crony is in charge consents or not, Guanabara is to receive federal aid. Deploy the armed forces to provide temporary housing for the displaced and bury the dead. See it done at once." The officers and officials nodded and left to get to work, while Adhemar sighed, crossed himself, and buried his head in his hands."
 brazil.524.a: "For he felt a new weight on his shoulders—that of responsibility."

 brazil.525.t: "Paradise Besieged" 
 brazil.525.desc: "Tension froze over the meeting room. Either the attendants' lips were pursed, or their sunken eyes drifted across the table, waiting for someone to clear their throat and state the obvious. The President hid away from the glances frequently targeted at him, opting instead to reread the morning report. As the awkwardness all over increased, so too did the contact of his cabinet's eyes with their boss, while they shared in his intemperate shame.\n\n"Mr. President," began one advisor, "The damage done by this week's storm to Guanabara-"\n\n"Has been extensive, yes," Lacerda finished, recycling the sentence heading the report. "But what this pamphlet does not tell me is why. Why has there been so much? Did the sea wall even do its job?"\n\n"The sea wall held, sir... mostly. Water did sweep over in places, and they are putting the toll of damaged cars in the hundreds. Worse still, tens of favela houses have slipped off hills and caused chaos on the coastline. There are many more in Rio with no place to stay or go, and this will likely persist over the next coming weeks."\n\n"I should have torn the favelas down when I had the chance," grumbled Lacerda. "Like Hydra's heads, they just grow back as soon as they're cut. Rio needs proper housing, not more of these scrapyards. Maybe..." His voice broke off, as a thought began to unravel, and he flicked back to a map of the city. "Maybe this is just what we need, a renewal, a blank slate."\n\n"This crisis is now our opportunity," he declared superciliously. "Call the governor, the councilors, whoever. Get the message out. We are sending aid, of course, and not like before. This time, this aid will give Guanabara a new face, a renewed city for a renewed country.""
 brazil.525.a: "A venture to build a Rome out of Pompeii."

 brazil.526.t: "As Light Rain Falls Without Reason" 
 brazil.526.desc: "Disaster. Chaos. Disorder, all of these words described what had happened in Guanabara that day. Far from the site of the tragedy, Kubitschek had woken up and was walking down the Monumental Axis to meet with his ministers.\n\nThe office of the President was usually empty, but today all of his ministers, from development to the environment, were there. Talking with one another, asking what would the president do in the face of the tragedy.\n\nThe talking stopped as Kubitschek sat on his chair. "Gentlemen, what has happened in Guanabara is a tragedy, but not the worst we have seen." The ministers were unsure of how to take what he had said, bombarding the President with questions, the development council members were quiet, filled with the guilt of the tragedy. "This day, even if it shows to be a tragedy for the history books, must be remembered for our operation to restore the bay."\n\nHours went by, thousands of words were exchanged, at the end of it all they had finished the plan for restoring and helping both the people and the area of Guanabara. They would create a committee to handle the crisis. Kubitschek left the room with a smile of hope on his face, he knew that Guanabara would be rebuilt better than ever."
 brazil.526.a: "50 years of progress, destroyed in 5 hours."

 brazil.527.t: "The Shattered Silence" 
 brazil.527.desc: "President Goulart's honeymoon as head of state ended unceremoniously at three in the morning. In less than 48 hours, a torrent smashed Guanabara's coastline, prompting Brizola, Edna Lott and even Neves to meet for an unluckily early emergency cabinet, with most of a joint plan of action already on paper. The hard part, however, was not actually supplying the countless millions of dollars for Guanabara's relief, rehabilitation and reconstruction. It was Raphael Magalhães.\n\n"Look, Mr. President," began coalition partner Neves. Goulart got ready for Tancredo's tough pill. "However you feel about the UDN, Lacerda or Guanabara's governor, it would be a catastrophic mistake not to cooperate with Mr. Magalhães. Get talking to him, ask him what he needs, and solve the problem before it becomes a political as well as a natural disaster."\n\n"Nonsense," spat Brizola. "Why grovel at the feet of Lacerda's lackeys? He will scapegoat us if we do or don't, you know how they are." He turned to the President, who appeared stern. "Federal aid is all we need for a storm like this anyway, Jango, we have a solution and we know it works."\n\n"Let's not address our fellow ministers like that on week one, Leonel." Goulart sighed, scanned over the notes again and came to his presidential senses. "I really hate to say it, but he has a point. Tancredo, I need you to go and meet the governor and coordinate federal aid with him personally. As soon as you can. We must not turn a disaster into a race to the bottom.""
 brazil.527.a: "A storm confronted with a compromise."

 brazil.528.t: "Revolution of the Manager" 
 brazil.528.desc: "Quadros' awakening today was far from ordinary. Stirred abruptly by his aides and the urgent broadcast on the television, he knew instinctively that a long and challenging day lays ahead - Guanabara had been ravaged by the storm, causing significant upheaval.\n\nWithout any hesitation, he snatched a sheet of paper from the desk and began drafting crucial notes, while simultaneously calling for his aides to swiftly coordinate with all relevant ministries. Aid had to be prepared and dispatched immediately, police and riot control mobilized to manage to populace, and water treatment urgently organized to address the crisis. It seemed as if the more contemplation went into the situation, the more problems surfaced. But it is how it is. Quadros felt a quiet relief knowing that it at least meant no usual bureaucratic dealings or other unneeded distractions for today. It was time to get to Guanabara.\n\nRacing to the telephone, Quadros dialed the Air Force command. "Arrange the soonest possible plane for Guanabara. Notify all the personnel that I'm en route," he instructed confidently while noting down a plan of approach once he was over there - calming the folk, keeping up the motivation and good hopes. Witnessing the devastation firsthand wasn't merely a ceremonial formality; it was his strategic move to effectively tackle the crisis response and bring a swift resolution to the plagued city."
 brazil.528.a: "Guanabara calls, Quadros answers."

 brazil.529.t: "Daring to Dream"
 brazil.529.desc: "The Guairá Falls. One of the most fascinating hidden gems in the vast Brazilian landscape created by mother nature. Hidden between the two South American countries, this wonder of nature is capable of surprising anyone with its beautiful waterfalls gathered in a horseshoe shape that reverberated through the forest before anyone sees it.\n\nHowever, its newest visitors weren't there to tour. Gathered at a table in the forest, carefully positioned to look over the waterfalls, a group of architects worked towards the realization of another wonder, but built by men: the construction of the largest hydroelectric dam in the world. And this forgotten corner in the middle of nowhere was the perfect place for such achievement.\n\n"If our calculations are correct, this is the ideal spot, on the border with Paraguay, close to Foz do Iguaçu." Pointed out the chief engineer, pointing with a pen at the map laid on the table: "If the government approves, we'll finally be able to put our hands in the dough and start working for real. Until then, don't lose heart guys. You're about to make history so smile for being a part of it." But before he could call off the meeting satisfied, a young architect raised his arm: "Sir, do you really think it is worth destroying the waterfalls for the sake of the dam?"\n\nA moment of silence followed, with dozens of glares pointed at the architect, awkwardly waiting for the chief's response, who gave a friendly smirk before replying: "Of course not! We will be only harnessing its spirit and energy for the betterment of Brazil" He stood up, resting his arm on the embarrassed architect's shoulder "Think of the benefits this will bring to us. Think of the grateful faces of all brazilians to finally have light in their homes. Isn't it what you want? Or better, what we want?"\n\nThe architect quietly nods, not quite convinced of his boss's optimism."
 brazil.529.a: "No sacrifice is too great for Brazil's well-being!"

 brazil.530.t: "Never to Return"
 brazil.530.desc: "Mathias made sure he was bringing enough film cameras as he needed to record every instant of what he was about to witness. More precisely in a tiny village in a forgotten corner of Brazil, apparently without a name and not even registered on the most detailed maps; and it never will, for it would soon disappear completely under the cover of an artificial lake.\n\nIts residents had little choice but to obey the military's directives and leave the site, leaving behind the only home they had. As precarious as it was, it was still their home. Was, not anymore.\n\nAnd so it was done. At dawn, the villagers were evacuated one by one from their homes, taking with them all the material they could take as they walked with an empty heart and a mind filled with memories of their home, while leaving behind a trail of tears. The only comfort they could think of is that at least things here are apparently more "forgivable" than on the other side of the river.\n\nMathias on his part watched everything from a distance, away from the watchful eyes of the soldiers while his camera hidden in his jacket recorded every face that passed. Following their slow steps on the narrow Muddy path until they reached the buses waiting to take them to God knows where. "To the nearest shelter center" said one of the soldiers to Mathias, without giving any more details.\n\nYet, Mathias was no stranger to situations like these. He still had the scenes from Guanabara fresh in his memory. Entire communities being pushed to the most inhospitable places possible in the city's outskirts, all sponsored by the governor. And now, the dam's construction seemed to be the first of many future cases of the government displacing the same people it swored to serve from their own livelihoods in the name of "development"."
 brazil.530.a: ""Order and Progress" has its costs..."

 brazil.531.t: "Farewell Guairá Falls"
 brazil.531.desc: "After being freed from that damn prison of office, Sergeant Souza thought it would be a convenient moment to fulfill an old desire of his: visit the Guairá Falls one more time. But why on earth would a disabled soldier on crutches travel all the way to the country's abyss not even Souza could tell. He just knew he had to do it.\n\nBut what he didn't expect was that frightening mass of people on the wet site overlooking the waterfalls. A peek on the less congested grid would reveal to him the truth: the water level was rising. Souza knew about the dam, but he didn't know it would be this fast.\n\nA strange resentful feeling poisoned his stomach as the water level rose. He prefered to see the waterfalls being destroyed in a swift and merciful bombardment years ago than this. Being slowly drowned in the water as it desperately tried to breath before being swallowed by the river. And this time, the engineers back in the dam wouldn't listen to him like his superior years ago in that same place.\n\nAs Guairá fought for its dear life, little by little the spectators left one by one, with some of the tourists more satisfied and others more disappointed. Then came the natives' turn, coming in groups one more tearful than the other, leaving the lone Souza alone with his thoughts. Who stood frozen as time passed in the hours, his gaze lost in the cascades as they approached the surface every second.\n\nAs the sun disappeared in the trees, a finger snap would bring Souza back to the real world, bumping into a visibly impatient soldier, rushed to finish his shift. The old veteran didn't bother being alone, but he couldn't stay there forever. As he returned to his senses, he reached his pocket in search of something of value - a 50-cent coin should do - and flips it into the water. As the coin disappears in the waterfalls, Souza grabs his crutches and walks away. Leaving the dying waterfalls behind."
 brazil.531.a: "- for it would now share its underwater grave with all the men who died there fighting for it."

 brazil.532.t: "The Power of a God"
 brazil.532.desc: "The workers at Itaipu couldn't afford to get distracted from their posts, unless they wanted to be buried under tons of earth. But only after years of uninterrupted work can they see how dwarfed they feel by their work. A massive wall of concrete and steel spanning both banks of the Paraná River. Funded with fresh US money and raised with Guangdong's top notch equipment, but made only possible by the effort of thousands of workers and engineers now gathered to see the last turbine being installed, whose cheers were heard all the way from Foz do Iguaçu.\n\nLater on that day, gathered where they could overlook the dam, they celebrated their success as they were served with custom-made cakes sent by nearby local bakeries, accompanied by a good old cup of fresh coffee; alcohol was strictly forbidden, nobody wanted to see a drunk worker getting stuck in the turbines. Nevertheless, the food and drinks were well appreciated. "Hey, what do you guys think will happen after the dam is fully operational?" Asked one voice among a group of workers.\n\n"Why electricity for everyone of course!" Replied Antônio, one of the workers who supervised the turbines, downing his cup of coffee in a single gulp before continuing "I've already told my wife that we won't have to worry about rationing energy anymore. And you, Paulo, what's your thoughts?"\n\n"Me?" Gasped Paulo, the machine operator, who had just finished his sixth slice of cornmeal cake "I think all that water would be helpful for me you know? My family has a small farm in the interior, and the last drought made things pretty hard for us. But now with the dam, we don't need to worry about our crops dying again."\n\nAnd so it went for the rest of the day, with each one releasing their own stories and personal expectations, but all with one thing in common: the hope for a better future, paved by their hard work on making the biggest dam in the world possible."
 brazil.532.a: "A toast to the future, gentlemen."

 brazil.533.t: "Dam, what an opening"
 brazil.533.desc: "Adhemar stood triumphant in front of the dam. What would those Argentinians think now? Paraguay, their best friend and ally, leaving them for Brazil. He was nearly laughing to himself, but he was ushered to the podium where the Paraguayan president had finished his speech. Now it was time for him.\n\n"Thank you all for coming here," he began, "I'm very glad to see our two nations and people collaborate."The crowd, made up of Paraguayans and Brazilians, applauded and cheered, "This dam may seem like just a piece of infrastructure, but it is a stepping stone to future, where Brazilians and Paraguayans can join arms in their freedom and liberty!" The crowd went into an uproar, and Adhemar waved as he left.\n\nAdhemar and the president stood next to each other as the dam was turned on for the first. It was a monumental creation, but Adhemar could only think about the look on the Argentinian president's face."
 brazil.533.a: "Who's laughing now?"

 brazil.535.t: "The Worker President"
 brazil.535.desc: "The TV on the Goularts' estate had been on since the polling stations had been closed, Goulart and Brizola were sitting on the couch watching it with great anticipation, after all, the numbers had begun well with lots of people voting for the PTB. But now the race had grown closer. "Those UDN are probably fucking with the election again." said a disgruntled Brizola.\n\n"We know very well how annoying they can be, but it's probably fine," said Goulart preparing a cup of whisky for the both of them. "The people trust us more than they trust others, after all we are for them rather than blindly serving the rich." Goulart sat down and gave a cup of the drink to Brizola, he was anxious and the drink would help him relax.\n\nMinutes passed and the final votes were counted. The news anchor for the Jornal Nacional finally said the words that the country wanted to hear. "Leonel Brizola is elected and will become the next president of Brazil." Brizola and Goulart jumped out of the couch in excitement and hugged each other.\n\n"Congratulations!" said a slightly drunk Goulart with a smile on his face, Brizola had done what he couldn't. He had been elected to the highest office in the land, a shining beacon of hope after the last era.\n\nBrizola excused himself. "I believe it's time for me to leave, the Brazilian people want to hear what their new president wants to say." He gave Goulart another hug and left ready to tell the people his plans for the future of the nation." 
 brazil.535.a: "A man for the people."

 brazil.536.t: "No Longer Veep"
 brazil.536.desc: "Tension filled the air of the Lott's home. The results that would change the nation were starting to be reported. The news anchor started announcing each state's victor, one by one. "With 38% of votes counted, the UDN has taken the lead with the PTB close behind."\n\nHenrique looked at his daughter, he was nervous, as nervous as he was on the day of his victory. "Edna, 38% is not enough to determine a winner. You don't need to worry about this at the moment and look, you're almost overtaking them." Edna took a deep breath and looked at the TV screen once more.\n\n"With 97% of the votes counted, we can proclaim that Edna Marília Lott of the PTB has won the Brazilian elections and will become the next president of the country, with Ulysses Guimarães of the PSD becoming the new vice-president." The whole Lott household was ecstatic, she had won. The years she spent working had paid off, the people knew what they wanted.\n\nLooking outside her window, she thought of all the things she could do now. She could improve Brazil in a way that the others were not capable of, she could become a shining beacon of light after the past decade of chaos, but most importantly, she could make Oscar and Laura proud, she could tell that she made Brazil a great nation." 
 brazil.536.a: "She hoped they smiled in heaven."

 brazil.537.t: "The Civilian Prince"
 brazil.537.desc: "The news finally came in. "Tancredo Neves, elected." A safe choice, a popular and charismatic leader, and as Neves found himself in the PSD headquarters celebrating his victory with his peers, calls started coming in from all sides of the political spectrum.\n\nKubitschek congratulated him, calling it not only a victory to Brazil but the world, Goulart's call was simply wishing for the coalition to stay strong towards the future. The President also called him, the call was short, nothing more than a congratulations on his victory.\n\nThe party continued for hours, the people were ecstatic, fireworks of all shapes, colors and sizes were being lit and Tancredo was ready to leave to go home, now as the victor.\n\nAs he left the offices of the PSD, he paused for a couple minutes in front of a portrait. One of Getúlio. Neves remembers his work for him, almost a decade of it. All people wonder what legacy they will produce, Tancredo is not an exception. What would Getúlio think of him if he was alive, and will other presidents remember him as fondly as he does with Getúlio? He couldn't know for sure, but he hoped the answer was yes." 
 brazil.537.a: "Brazil has changed."

 brazil.538.t: "From Local to Leader"
 brazil.538.desc: "In the early hours of the morning, thousands were already gathering in Curitiba's Tiradentes Square, hoping to catch a glimpse of their hero, who would conquer the country as he did the state. Ney Aminthos de Barros Braga weaved through his supporters no longer just their representative, but their president-elect. The man of his people twisted through the crowds to find the one clearing with enough space to address those he owed his victory. After fighting back a lump in his throat- well, maybe more than a lump- he projected his voice.\n\n"As you all know, you all here in Paraná will be free of me very soon," he joked, with a sarcastic groan breaking out from the front of the crowd, followed by a reactive cascade of laughter at the back. "I am terribly sorry about that, all fatherly jokes aside. But of course, I'm not just a local politician in the newspaper, I am speaking to the whole country, this country that has voted for my party, the Christian Democrats.\n\n"To the press and the politicians, shocked by a little upstart like me getting up here and addressing the nation, be sure of that fact. Brazil has chosen the PCD. It has chosen a party that believes in getting things done, not stealing, cheating or lying. It has chosen morality in state and moderation in policy, and it wants a clean government who will heal our wounds and forge our destiny.\n\n"Our Brazil is hurting, its people are crying, as are many of its friends across the globe. But as I hope my time in this state has shown, I will bend over backwards to heal its wounds. May God bless Brazil."" 
 brazil.538.a: "Out of the shadows, he hoped to shine light."

 brazil.539.t: "In Father's Footsteps"
 brazil.539.desc: "People all across the nation have waited for this moment, glued to their radios and TV screens they heard and saw the news. "At [?global.date.GetDateStringNoHourLong], we can now confirm that Getúlio Vargas Jr. from the PSP has won the election and will become the next President of Brazil."\n\nSounds of fireworks and cheering crowds came out of Vargas Jr. window, he couldn't believe it. After all the trials and tribulations, the coma crisis and many other problems that happened during the Bull's presidency, the people wanted more. They wanted the PSP to stay.\n\nOpening his window, he started improvising a victory speech, "People of Brazil! Thank you for your support for me and Natel. You have made my father proud today and I will make sure that his will for a better Brazil continues stronger than ever." The crowd continued cheering on and on, Vargas Jr. on the other hand closed the window and went to bed.\n\nLooking upon a portrait of Getúlio on his wall, Vargas Jr. wondered if he could be like him, a great man for the nation, one that would lead the country into glory and progress. Would he become like him or even better? Only time would tell." 
 brazil.539.a: "The old man smiles upon him."

 brazil.540.t: "Salt in the Wound"
 brazil.540.desc: ""Plínio Salgado of the PRP, elected," said the news anchor with shock in his eyes. He couldn't believe it, the fascists had won and worse, the people were the one who wanted them. After seconds of silence, he proceeded to announce the winner of the office of vice-president. "Ulysses Guimarães of the PSD, elected vice-president."\n\nIn every office of every party, silence was all that was produced. What had gone wrong? Were the people truly wanting a fascist future? No one could believe it, it was a close victory for the PRP but a victory nonetheless. Was this the Brazil they had dreamed of, had worked for?\n\nThere was one party however that was commemorating the victory, the one that had won. The atmosphere in the PRP headquarters was one of pure euphoria. Salgado found himself in his office when someone burst through the door. It was Miguel Real. "We won, Plínio! We won!" Salgado, in his usual green shirt, smiled and got up from his chair.\n\n"That is good. Very good." Plínio walked over to Miguel and put his hand on his shoulder. "But it wasn't a decisive victory, Guimarães will be VP and a thorn in our side, not even mentioning that the Senate isn't controlled by us.We have won a battle, not the war."\n\nNot that far from those headquarters, a disgruntled Laudo Natel couldn't believe what he heard. Was this his fault? Had he gone too far with working with the PRP? He was both angry and disappointed, he wanted to do something he never wanted to do before. He wanted to give up. All his schemes to place Vargas Jr. as President had failed and ended with a even worse outcome. Brazil had done something that would change it forever, and the people asked why." 
 brazil.540.a: "Was it worth it?"

 brazil.541.t: "Raise a Glass"
 brazil.541.desc: "All it took were eight words to send the room into an uproar. Eight solitary words that had kept the entire UDN headquarters awake all night as they waited to hear them - words that, when they left the television screen, prompted a collective cheer amongst those so used to losing; "Raphael Magalhães is the new President of Brazil."\n\nAnd amidst the subsequent popping of champagne bottles and ecstatic cheers of victory, the man himself could barely hear himself think, a dopey grin plastered across his face. But those precious few thoughts that managed to slip through were overcome with happiness - he had done it. That which so many in the UDN before him had failed to, swiping away the Varguist snakes and securing the Presidency and Vice Presidency in one fell swoop.\n\nAccepting a glass of the whiskey offered to him by another partygoer, he felt a tap on his shoulder. It was his secretary. "A phone call from Carlos Lacerda?" she mouthed, trying to be heard over the furore. His grin grew ever wider, as he allowed the secretary to lead him through the crowd to his much quieter office. He pushed the phone to his ear, eager to speak to his mentor.\n\n"May I be the first to congratulate you, Raphael," Lacerda's tinny voice said from the other end. "You ran a fine campaign."\n\nMagalhães snorted. "Oh, as if I could ever have done it without you, you old crow. Thank you for all your help along the way," he said, sipping from his glass.\n\n"My pleasure. I cannot lie, there is some part of me deep down that wishes it were I in your shoes right now, doubtlessly sipping the same fine drinks you are at this moment. But you have my full trust and support - should you ever need my help, I am only a phone call away." Magalhães felt something warm stirring in his stomach - and it wasn't the whiskey." 
 brazil.541.a: ""Thank you, sir. Genuinely.""

 brazil.542.t: "The UDN Chooses Its Candidate for 1970!"
 brazil.542.desc: "Election season has come to Brazil once again, and as the new decade appears to be a turbulent one, the people look on with an almost palpable sense of both excitement and dread. The established center-right of Brazilian politics, the National Democratic Union, has been quite busy determining who shall become the champion of Brazilian conservatism as it enters the next decade. The direction of the party platform itself now hangs in the balance.\n\nDespite the faction's wavering base of support, the Banda de Música still commands considerable influence within the UDN, and they have largely fallen behind Magalhães as well, as he is seen to be a continuation of Lacerda's legacy within the party.\n\nThe governor's bid has not gone unchallenged, however. A growing bloc within the party have instead voiced their support for Ney Braga, an outsider whose tenure as governor of Paraná saw the province transformed into a promising hub of exports and infrastructure. Braga, along with his supporters, are keen to secure a close partnership between the UDN and the Christian Democratic Party. This would certainly be a shift from the status quo, but it remains to be seen if Braga's religiously-charged conservatism will be able to win over the rest of the party.\n\nAfter days of heated debates, the conference comes to a close, and the UDN has made a decision..."
 brazil.542.a: "Ney Braga!"
 brazil.542.b: "Raphael Magalhães!"

 brazil.543.t: "The PTB-PSD Coalition Chooses Its Candidate For 1970!"
 brazil.543.desc: "Election season has arrived, and with it coinciding with the tumultuous turn of the decade, it looks to be a pivotal one indeed. Such is the current mood of the Brazilian people, and so too is the feelings of the political center-left, the PSB and the PTB, who have once again joined forces to form a unified coalition.\n\nThere is considerable excitement amongst both parties, as their options are both well-respected amongst the peers and widely popular with the coalition's voter base. Even before the decision has been made, the early polls look promising indeed. The PTB certainly has a formidable lineup of potential picks: Edna Lott, the daughter of Henrique Lott and a promising rising star within Brazilian politics, seeks to maintain the party's moderate posture, whilst Leonel Brizola represents the bulwark of the more radical left wing. The PSD, for their part, have put forward Tancredo Neves to represent them, who seeks to continue the liberal course set by Lott and Kubitschek.\n\nIn the end, only one emerges victorious..." 
 brazil.543.a: "Edna Lott!"
 brazil.543.b: "Leonel Brizola!"
 brazil.543.c: "Tancredo Neves!"
 brazil.543.d: "The parties will run separate candidates."

 brazil.544.t: "Election Season"
 brazil.544.desc: "The streets of all Brazilian cities were filled with posters for every type of political party. "PTB - FOR A BETTER FUTURE," said one. "THE HYPOCRISY OF THE PSD!" said another. Some posters for the PRP even appeared from time to time. It was election season, and the people knew it.\n\nA growing middle class was finally seeing and hearing their candidates speak on television, and for those who couldn't afford it, they could always resort to the radio. Candidates were up to their usual antics, attacking each other to gain the people's praise.\n\nA debate was going to be held in a couple of days between candidates of all political parties. Of course some were still deciding which one would be theirs. Would the PRP even compete? Could the PTB and PSD hold their coalition? Would the PSP even have a candidate? Only time could tell."
 brazil.544.a: "The fate of Brazil hangs in the balance..."

 brazil.545.t: "Silicon Spirit"
 brazil.545.desc: "Something big was about to happen. This was the consensus between the millions of inhabitants of São Paulo when they saw or heard about the hordes of Mitsubishis and Nissans crossing the city's crowded streets. They may not know yet the real meaning behind this sudden fuss in their city that never sleeps, but they will soon know firsthand the fruits of that event.\n\nCarefully prepared by the president and the mayor of São Paulo, the city was about to witness the gathering of dozens of Japanese businessmen coming directly from the other side of the Pacific to decide the future of one of the most ambitious projects to be planned in the state: the Rio-São Paulo High Speed Rail. Aiming to expand the development between the main economic hubs of the country via the most advanced rail transport technology in the world.\n\nAfter many hours of shouting and banging hammers, it was finally settled. Fujitsu Limited and Hitachi would be the main contractors for the construction of the rail and the infrastructure to support it, while Sony and Matsushita had acquired the subcontracts on the production line.\n\nWith the business out of the way, it was time to celebrate this historic moment with a banquet specially prepared by chefs who cook in famous Japanese restaurants in the city. After a few dishes of traditional Japanese food and lots of sake, the resentments between the businessmen were quickly forgotten in a flurry of gossip and laughter. Remarkably, with even more exuberance among the Guangdong delegates, who were delightfully pleased by the great success of the agreement between their upstart three firms over the Zaibatsus that dominated Sphere's business in this country full of opportunity and wealth."
 brazil.545.a: "But what do the people evicted from their houses for this event have to say about it?"

 brazil.546.t: "The Future Awaits"
 brazil.546.desc: ""They cut our salary again last week... What's next? Cut lunch break too?" blurted out a worker, his dissent barely audible amid the impetuous noises of hammers and jackhammers echoing on the Campinas terminal site.\n\n"Deal with it, Antônio," spoke Alfredo Tavares, the ordinary looking manager of the Rio-São Paulo Rail. "Budget cuts happen all the time. We are lucky we managed to get here on time."\n\n"But what about us?" snapped another worker, shining with sweat. "I mean, at least in the past we would receive some cigarettes. But these guys..." He pointed his thumb at a distant group of Asian men boasting impeccable black suits. "You know, the ones with weird logos. They just pass by you like you are nothing."\n\n"They are assholes, that's what they are!" Shouted a worker, punching his rusty shovel in the air. "Every day they keep asking for something more from us! As if that's going to solve the lack of material!"\n\n"Enough!" Alfredo snarled, drawing the attention of the workers milling around him. "Look, I know things didn't go as planned, but we are just halfway through. So keep your heads down, and we will be at Copacabana in no time. Only then-"\n\n"Good afternoon, gentleman." Shit, whispered Alfredo. Clenching his fist as an unwanted presence loomed at his side. It was Giovanni Batista, the "honorable" Brazilian representative of Hitachi and their loyal security - or enforcer, for those subjected to him. "In case you haven't been paying attention, lunchtime was shortened, and we passed it millennia ago. And this rail won't build itself, will it?" The man's eloquent words always inspired both fear and enmity in the workers. They were all armed with enough working tools that could easily kill a man. Yet, they stood motionless. Only for their boss's face to disfigure in pure anger."
 brazil.546.a: ""What are you looking at? Go back to work you Paraíba vagabonds!!""

 brazil.547.t: "In the Light of Our lady"
 brazil.547.desc: "During the Empire, the small village of Aparecida would see itself served by the first iron railway line in the country. Years passed and the feat was repeated in the small town with the first state-of-the-art rail, now one step closer to its final destination. A good reason to celebrate after so much blood, sweat, and tears poured, right?\n\nNo. Of course not. "Your work has been nothing short of disappointing, Mr. Tavares," grumbled Giovanni in his usual stilted Portuguese, with each word being a different spit on Alfredo's face. "The Hitachi Business Representative was very clear: either you make your workers pick up the pace or you will join them. Do you understand?"\n\nYes yes, keep asking for the impossible, jackass. And bringing your Hitachi buddies to stare at me won't make any rabbit come out of the hat. And what is all that paperwork covering your desk? And what is that wooden box of cigars doing there? Of course, that wasn't what Alfredo replied. Instead, he slowly bent into a 90 degree position. "I'm very sorry. I give you my-"\n\n"I'm not finished," Giovanni interrupted. "We received reports that someone has been stealing the opioids from the first aid storage. Until the culprit is found, all the workers on the rail will have their pay docked."\n\nIn a blink of an eye, Alfredo's neutral face fell apart for the first time. "What!? Excuse my wording here, but you are going to ignite a fucking riot! The workers will have my head on a pike-" *click*\n\nIn another blink of an eye, time inside the office froze, the only thing moving was Giovanni's gun coming out of its holster onto the desk. "I know you can do it. We all hope you will," finished Giovanni with a grin. Alfredo shivered in a way he never felt and bowed once again. Retreating back with a goal already made in mind."
 brazil.547.a: "If it's war you want, it's war you shall have!"

 brazil.548.t: "Under the Gaze of the Redeemer"
 brazil.548.desc: "At last, the Rio-São Paulo rail has finally arrived at the gates of Guanabara. But Alfredo had little reason to celebrate. He almost got killed by angry workers the other day despite getting this far. This may be over soon, but he was done. Hitachi had played him for long enough, now it was his turn. And boy! Did he play them like fools! He broke into the Hitachi office looking for copper and found gold. Incriminating files that would put even the president behind bars and a couple of cigars from the wooden box as a bonus. Now, should he just blackmail them or leak to the press? Alfredo laughed with a cigar in his mouth, enjoying the view from atop the bridge in the dead of night. Hell, why not both? Those Hitachi bastards can burn in hell for all he-*click*\n\nA familiar noise scratched Alfredo's ears as something cold poked him in the back. "I know what you are up to, Alfredo," said Giovanni, his neat Portuguese now intimidating. "I won't repeat myself: hand over those files or..." He completed his threat by raising the gun to Alfredo's head. Alfredo, clenching his teeth tightly before he said anything that would kill him, slowly pulled the files and handed them to Giovanni. "Such a pitiful show! Though not surprising coming from a cretin like you," Giovanni sneered, still holding the gun. "You know, I could just kill you right here and now... but I won't. You want to know why?" Alfredo responded with a puzzled half face. "Do you remember the stolen morphine? Well, I have to inform you the culprit is right behind you..." Alfredo's eyes widened in shock, but Giovanni wasn't over. "However, when we get back, you will be the one blamed. Yes I know, but such is life, isn't it?"\n\nAlfredo felt a horrific chill run through him as his whole body involuntarily threw itself violently against the culprit. As Giovanni's scream dimmed, Alfredo finally opened his eyes to find nothing but the railing. Giovanni had disappeared. There was nothing left but the Redeemer watching everything from afar and the cigar still in his fingers. He took one more drag and threw it away into the abyss."
 brazil.548.a: "Good Riddance."

 brazil.549.t: "The Future Arrives"
 brazil.549.desc: "As President Adhemar sliced the large red ribbon, cheers and flashbulbs erupted from the crowd: citizens, journalists, battered workers and politicians. All gathered to witness another successful delivery, the long-awaited Rio-São Paulo rail. But far from the stage, the builder of the project, Alfredo Tavares, observed. He would have liked to be there, but at least this mess was finally over. Hitachi, the workers, Giovanni... No no no! Think of the good things! Yes yes yes, think of the people who benefited, of-\n\n"It's beautiful isn't it?" Alfredo froze, coming across a woman, a housewife apparently, wearing a modest dress. "The train station, it's really beautiful." She answered. "I really hope it will help make things here better." She turned her face to Alfredo and pointed her finger at his badge. "You must be the manager right? I'm Francisca. You must be really proud of it."\n\n"Uhhh, well, it's my job," Alfredo replied coyly. "And I will still have to stay here for a while to find a new line of work for me after this."\n\n"Oh Mr. Tavares!" Francisca giggled. "Don't be so hard on yourself. You have done a miracle for all of us here. Even if they may never know you, if what you left helps the lives of everyone here is what really matters."\n\nThe words sunk deep into Alfredo. But instead of pride, they triggered unwanted memories. No. Enough of that. He just came out of hell alive and accomplished his task. He earned this. "T-thank you Francisca, I'll keep this in mind."\n\nWhat an... interesting conversation; thought Henrique Teixeira Lott, standing right next to them but unrecognizable with his civilian clothes too ordinary for a former president. Despite having eavesdropped more than his principles allowed, Lott was, at last, happy to see the country still on the rails after him."
 brazil.549.a: "And what magnificent rails they were, indeed. Maybe I should give it a try as well..."

 brazil.550.t: "Degrees of Separation"
 brazil.550.desc: "A contractor leans back in his chair as far as it will allow him, satisfied with a job well done. Some bureaucrats wanted a railway tunnel instead of a highway, but with a couple of timely "gifts", it was all sorted out. Highways were the future of transportation, surely the President would agree with him. He stands up, and walks over to the balcony of his office. Niterói itself was not much to look at, but its coast most certainly is. Look straight, and see the way the city bends around the sea, how the hills in the distance loom over it. Look down, and see the deep blue, and on it countless ships of all shapes and sizes, keeping the city alive like the workers of a beehive. A view worth admiring. It would be even worthier with a mighty bridge over it.\n\nAn architect leans over a mess of sketches on his table, a cigarette in hand to treat the headache this project was causing him. From Rio to Niterói, that's just under nine kilometers in length over the bay. The commissioner wants six lanes, so that's about twenty meters in width. Ships need to pass under it, planes over it, that's around seventy meters in height above water. He exhales a plume of smoke. This will be the biggest bridge on the continent. Construction will be long and expensive. There were going to be a lot of "cut costs". The final design needs to be something they can't fuck up beyond repair.\n\nA driver lies on his bed, contemplating. Specifically, he drives a cement mixer, and his company is about to start laying the foundation for a very, very big bridge across the Guanabara Bay. His mind was struggling to picture it. Who in their right mind would risk driving on a highway where with one wrong turn you would fall to certain death? A pit in his stomach forms as he imagines himself sinking in his truck, drowning in a mix of seawater and concrete. Maybe it was time to start job hunting again."
 brazil.550.a: "A connection, built by strangers."

 brazil.551.t: "Disaster at the Rio-Niterói Bridge"
 brazil.551.desc: "The Rio-Niterói Bridge was halfway done. Across thirteen kilometers of glistening ocean, countless columns stood at attention, guarding the 'Marvelous City' as workers did precision work with cranes and scaffolding. While the span had yet to be finished, it already carried the dream of a Rio undaunted by the physical limitations of nature.\n\nAnd then, a column fell. Standing at the center of a pristine shining bay, the sound held the entirety of the Guanabaran expanse as its captive audience, as it roared over the waters, blew through the urban corridors, and reverberated against the mountains.\n\nThose by the beaches, the coastal speedways, the hillsides, or their penthouses would have witnessed the tragedy live: a pillar of reinforced concrete transforming into ash and dust before disappearing into the water. The rest, peeking past street corners or out windows, would have seen only shadows in the sea.\n\nThe sun had already set when they counted twenty missing. And the sun had already risen when they announced twenty dead.\n\nThere was an investigation, but it was run by lawyers and morticians, not by engineers or detectives. The culprit was already obvious: structural failure due to substandard materials and insufficient reinforcement, a consequence of corruption-induced cost-cutting.\n\nEven Francisca, from her Gamboa abode, could surmise that the government was spending more on buying people's silence or calming investors rather than finding those responsible or ensuring this didn't happen again. At least the hush money could help the families of the victims, she thought."
 brazil.551.a: ""But God bless those widows...""

 brazil.552.t: "What Holds Up the Rio-Niterói"
 brazil.552.desc: ""RIO DE JANEIRO. The Rio-Niterói Bridge opened up its gateways on both sides on a Monday morning like any other, and traffic began seeping onto a former pipe dream years in the making. A camera crew or two were seen at the bridge's Rio terminal, interviewing the last group of construction workers who, exhausted and disillusioned, lustrelessly and curtly replied to the journalists haranguing them with long-winded questions.\n\nThe topic of these questions, far from focusing on the Herculean task made history this week - the finished build spanned over 13,000 meters - put equal, and in most cases more emphasis on the corruption and workers' rights abuses that plagued the project, in all likelihood to the chagrin of incumbent party senators and the federal government. Unconfirmed reports contest that during the construction hundreds of casualties, and even deaths, have occurred. The local opposition, fueled by the anger of bereaved families, are already blaming these on overwork and negligence from harsh quotas, and some fear the estimate will rise once an official investigation begins."\n\nFrancisca put down her copy of this morning's O Jornal to wander towards her apartment window, exasperated by the rot of the old evident even in the new. She peered through the glass to see cars inching across the freshly-paved colossus that stretched out to the Niterói city on the horizon, twinkling in the flashes of sunlight that bathed the Guanabara Bay.\n\nFor a moment, her face glowed with the thought of how the infrastructural might put Brazil in the pantheon of nations, but then her mind flitted to those whose sweat and blood were used as materials for that display. Her country's prides would continue to be built upon those at the lowest of it."
 brazil.552.a: "A bridge of bones."

 brazil.553.t: "Nature Has a Price"
 brazil.553.desc: "A snap, a crash, a thud. The monolith redwood tree joined its felled brethren, becoming yet another quota fulfillment for the logging company António hired, and expanded farmland for his cattle-ranching business.\n\n"You'd be surprised how much that tree alone earns me these days," he quipped to the duo of foremen on standby, lighting a cigarette sat on the edge of their timber. "Oh, believe me, we know!" came the response, and all heads were sent skyward in a hearty, brief guffawing of laughter.\n\nAs António watched the loggers' soiled Hitachi feller buncher roll off towards their next pile-to-be, he imagined the pasture he would have in a few month's time. Fresh cud for generations of calves, the paychecks pressed with American stamps he would cash in, fueled by a craving for burger patties thousands of kilometers up north and oil-shortage chaos down south.\n\nWhile he now stared at the Amazon frontier, American demand and Brazilian eagerness to trade would likely push it many hectares back. It took an oil crisis for the farmer to earn his piece, António reflected."
 brazil.553.a: "The Amazon is open for business."

 brazil.554.t: "Destroyer of Worlds"
 brazil.554.desc: "The Huey they rode was a sturdy girl, but even she was tested by the wind currents of the Cachimbo Mountains. Laudo wondered how Silva, a full thirty years his senior, could gaze out those shaky windows, this high up in the middle of nowhere, the atmosphere warm and sticky, hearing only the rotor blades whirring, the occasional crackle of radio, and, somehow, the calls of howler monkeys.\n\nSilva's naval experience made him resistant to turbulence, and he loved seeing the Amazon canopy spread out in endless green, punctuated by craggy peaks, meandering rivers, and brief glimpses of parrots and harpy eagles. Through his binoculars, he swore he almost saw a jaguar or two.\n\n"I can't think of a better place for our nuclear tests." Silva had the same broad grin he wore in his old chemistry classes. "We're isolated from civilization, so we don't have to fear casualties or espionage. The Itacaiúnas River can also be used to transport the materials, so we don't have to worry too much about roads. Of course, the water can be contaminated by radiation, but with the right precautions, we can avoid a catastrophic leak.\n\n"In addition, did you know that the Amazonian Craton is some of the oldest crust on Earth? That means this region has the most stable bedrock imaginable, so we wouldn't have to be afraid of an earthquake disturbing us, or worse, our detonations triggering tectonic activity.\n\n"And would you look at that..." Silva pointed to an excavated section of the surface. Amidst the vertigo, Laudo caught sight of the mining benches and abandoned equipment. The existing infrastructure would speed things up, and they salivated at the chance to hollow out the area into Brazil's personal atomic abyss."
 brazil.554.a: "" ... the perfect spot.""

 brazil.555.t: "Midas Touch"
 brazil.555.desc: "From their vantage point by the recording trailers, Silva had spent the hour boasting to Marcelo Damy, a respected younger colleague in the nuclear field, about how chaotic the birds and insects were as the workers began clearing space for the device assembly facility, how bravely the guards fought jaguars and caimans as the trucks came in, and how quickly the geologists surveyed every nook and cranny of the entire mountain. "In fact, that should be their lead!"\n\nDown in the repurposed mining pit, inspecting a rock sample, the head geologist was wearing cargo pants and a light safari jacket. Beside him, Laudo Natel was battling mosquitoes that were happy to see humans back in the area. But before Silva could wave to the pair below, Damy's sudden question interrupted him. "Do you trust them?"\n\nSilva felt he knew what was coming. "I assume you have concerns?"\n\n"You've dealt with government a lot longer than I have. You should know everything they touch becomes... impure." Damy scratched the cleft of his chin. "Someone might steal from something 'trivial' like the geological survey, maybe promising a few researchers a piece of the cut if they took a day off. A single groundwater leak and we have a radiation crisis on our hands. I apologize for the tone, sir, but shouldn't we be a little more prudent when building..." Damy rolled his arms, fishing the word from his throat. "... bombs."\n\nNow what exactly could Silva say to that? Making nukes for Brazil meant making nukes for Brazilian politicians, and Silva decided long ago that all he could do was have faith. "Marcelo, we've worked together on various projects for years. You have every right to raise your doubts. But please... " Silva opened the door to a trailer and motioned for him to enter."
 brazil.555.a: "Quit with the conspiracies."

 brazil.556.t: "Heart of Darkness"
 brazil.556.desc: "It was cold and quiet in the concrete chamber. Several hundred meters beneath the Cachimbo Mountains, Álvaro Alberto da Motta e Silva realized Brazil, the country in which he had spent his waking life, the country in which he had grown up, studied, taught, and served, had always remained on the surface. Here, he might as well have been on a different planet—a dry one.\n\nAnother fifty meters below where he stood, a large system of hoses and hatches lay dormant after weeks of pumping out any water present. Moisture weakened the stone, and they wanted to avoid a subsidence crater if possible. He promised no radiation would escape. But the chamber went much deeper. Down there, it was pitch black.\n\nWhere he was, the illumination of the HID lamps flooded in from the narrow and winding entranceway. Standing on the edge of his carpet of light, he peered over the railing, straining to see the tiny compartment where the bomb would lie beside cameras and test equipment, cradled like his dearest little baby under its crib mobile in a dark, cozy room.\n\nThen, in milliseconds, everything would be heat. The surrounding earth would not melt; it would vaporize. From their monitoring station, there would be some vibration, but within the inferno, he saw it all—a curtain of thunder and superheated radiance dictating judgment, thousands of souls frozen in an eternal instant when the weight of their deeds and the worth of their years would be measured and tallied. For the briefest, strangest moment, he envied them. Who but St. Peter himself could finally give him clarity?\n\n"Unbelievable what you've all built, huh?" Laudo Natel slapped Silva on the back. Silva coughed as he regained his balance. Behind Laudo, the research team toured a few gawking government agents. Laudo patted him on the shoulder. "You're doing great work.""
 brazil.556.a: "Silva could only nod back."

 brazil.557.t: "A Journalist's Dilemma"
 brazil.557.desc: "Hours of cigarette smoke hovered around Antonio Vidal and stuck to his caked layers of sweat. Tonight, he was not cataloging inventory logs, prescription records, audit trails that seemed to cut short, testimonies on hospital misbehavior.\n\nNo, that was yesterday; last night, he had already found shortfalls in opioid quantities, inexplicable surges in revenue, and correspondence blatantly admitting to kickbacks and bribery, plenty to expose the PSP for the frauds they are.\n\nHowever, right as he was summarizing his findings, a terrible thought dawned on him, haunted him to the very core.\n\nToday, Vidal had driven across the whole city, overstuffing his briefcase. From crack of dawn to setting sun, he lined up at government buildings, argued with clerks at clinic administration offices, and snuck into insurance companies as a "consultant".\n\nWhen he returned to the newspaper headquarters, he skipped dinner and began sorting through piles of workforce data and utilization statistics, hoping for any sign his worst fears weren't true.\n\nAnd yet, medicine prices kept lowering, rural services kept expanding, and patient satisfaction kept improving. While the quality of care metrics had irregularities, there was a noticeable drop after the healthcare bill passed. Against all his journalistic instincts, the hard numbers forced him to accept that perhaps hospitals now had much less to hide regarding their effectiveness.\n\nCrumpling the papers and tossing them in the approximate direction of the bin, he collapsed back into his chair. He would have to find another project that could pay his bills. No matter how corrupt Adhemar was, no reader would care about the President stealing..."
 brazil.557.a: "...when he really was delivering."

 brazil.558.t: "A Slice of Heaven"
 brazil.558.desc: ""Hi, Melinda, I hate to bother you, but it's about my kid. It's just... " Francisca found herself in a strange routine. One of her girls had a fever far too high and persistent to be the flu; no cough, but eating became a painful chore. Her tonsils oozed unsettling pus.\n\n"Good morning, Mr. Marti—oh, did you hear me from the other door? Oh, thank you very much, you are so generous!" It was Adhemar's Brazil though. Perhaps, it was time to test those renowned healthcare reforms, take a few loans from the Bank of Nextdoor, and go somewhere she'd always wanted to visit.\n\n"Mrs. Luz, I... Oh, I'm so sorry. No, I mean, I know she's caused trouble and I'm so sorry, but please, could you— Oh, you're a lifesaver, thank you!" Counting the crumpled cruzeiros, she now had the means to shake her daughter awake, stop by a Caixa to withdraw the rest of her savings, and squeeze into the Hospital dos Servidores.\n\nClutching her fragile bundle of a daughter, they navigated through a sea of bodies, pressing into the hospital's bronze façade. People packed the reception area like a conference of illnesses from every walk of life. However, Francisca did her research. She joined the shorter queue of domestic helpers with well-dressed kids, and, after a tense wait, she slid a thick wad of cash across the counter. The receptionist's nod was subtle, but with that, she was in.\n\nIt still took half an hour to navigate the halls, fifteen minutes to consult the general practitioner in an office where the ceiling threatened to give way to whatever heavy apparatus was on the next floor, and another forty-five to line up at the on-site pharmacy for the penicillin VK. Stepping out into the forecourt, she held the bottle of tablets, admiring it like a souvenir. All that money for some pills and a slip that said "strep throat" in chicken scratch. Well, at least she didn't have to leave it to chance anymore, right?"
 brazil.558.a: "If she saved enough, maybe they could come back next year."

 brazil.559.t: "Healthcare in the Rural North"
 brazil.559.desc: "Half-lit by the mercury of the streetlight, a man in a leather jacket whistled under the pitched corrugated awning of a building in the middle of nowhere: a clinic if the sign with the faded red cross was to be believed. Behind him, his three colleagues, tattooed head-to-toe, sat in silence in the bed of a utility truck. It was past midnight in this rural town, but the gangsters had to stay awake if they were to survive the miles of pitch-black dirt roads to deliver the goods.\n\nThen, the doors gave way to a stack of crates, bearing medical labels and rattling with glass vials. Underneath was a frail figure in a lab coat. The ringleader stepped in front of him. "Wait." The doctor froze. "Guys, take the morphine. I want to see his face." As the lackeys climbed off the vehicle and took the cargo, a pair of pale shivering eyes, no younger than sixty, were revealed. "You're Dr. Carvalho, right?" The doctor could only nod.\n\nThe gangster smiled. "Hey, it's really him!" He gestured to the others and blindly tossed the doctor a wad of cash for the drugs. He then began chuckling, moving away from the doctor, facing out into nothingness. As his laughter subsided, he started scratching his ear, tapping his foot, and fiddling with his jacket.\n\n"I just have to say... " His voice shrank as he crossed his arms, uncrossed them, stuck his hands in his pockets. "There's a little house a few blocks from here." He pointed into the darkness. "Around the corner, with the bleached Virgin Mary mural and the mango tree?" Dr. Carvalho didn't have a clue.\n\n"My cousin's there." He nodded. "He had it bad." He cleared his throat. "He told me you helped him." He rolled his shoulders, straightened his back, then finally looked back at the doctor. "Brazil doesn't have enough people like you..." He winked."
 brazil.559.a: ""...so let us know if you're in any trouble. We'll be there to help.""
 
 brazil.560.t: "Rigged from the Start"
 brazil.560.desc: ""...farmers can now expect their claims to be accepted within a reasonable period. According to the new reforms by the federal government, the bill seeks to help poor farmers in the Midwest."\n\nIt wasn't common for José to read the newspaper, especially while he was selling his produce at the market. However, this day, the headline interested him. "Mario! Did you know the newspaper is lying?" He laughed as the other farmer approached.\n\n"Let me see it," said Mario, wondering what had made José read the news for once. Skimming through the text, he found it. The line that had provoked such an outburst from his friend. "Reasonable period? This is a joke right? It's been four weeks and my claim hasn't even been considered."\n\n"Mine hasn't even been touched for five, but of course Antônio gets his one accepted. Connections with the people in charge get you somewhere. All the while we have to fight for the slightest bit of land." They knew that the men in Brasília didn't care for them, all they care about is money."
 brazil.560.a: "A life defined by futile struggle."

 brazil.561.t: "Change Where None Was Seen"
 brazil.561.desc: "The village in the Amazon had been there forever, as far as its inhabitants were concerned. It also looked much as it had the century before. And the century before that. The farmers worked the land owned by the local magnate, they kept to themselves, and they voted PSD. Always.\n\nUntil now. It was a topic of great discussion, including among the two farmers who had brought part of their bounty to the small market today. Because the magnate had recently transferred land to the farmers.\n\nThis was of course unheard of, and the concept of 'land reform' had been one only carefully whispered about, if one wanted to avoid trouble. But it had happened, and as the farmers spoke they agreed that they were already seeing the benefit. Growing more. Taking better stewardship of the land. Building something for their families. They wondered why the magnate had done so, and there was naturally only one answer.\n\nHe had been paid.\n\nAs they wondered who could have done so, the man who went down to 'the city' once a week returned with his usual stack of papers, their only source of news. Emblazoned on the front was an enormous picture of President Adhemar, proclaiming the success of his recent land reform drive across the nation.\n\nThat night, conversation changed from land reform to the next election. And, for the first time since anyone could remember, the PSP was looking very good indeed." 
 brazil.561.a: "Results bring results."

 brazil.562.t: "A National Revolution"
 brazil.562.desc: "The air was hot. Hot with humid muck of the Amazon. Hot with the flames burning flesh. Hot with the rage of free men. Francisca stood among the crowds, the thousand strong peoples' army. In front of them hung the bodies of a dozen men, if one could even call landlord swine human anymore. In the background, an endless row of red flags dotted the former plantation, the marks of a battle well fought.\n\nTheir leader walked up to the podium, and the people cheered. The fight had been long and hard, but total victory was near. Only a few more holdouts and the leeches would finally be thrown out of Brazil. Their leader began to speak with both unstoppable will and a gentle humanity. Francisca would be in tears if she had any left in her. "Workers, soldiers, comrades!" he said.\n\n"Our long revolution nears its end. I almost regret that our enemies will not witness the final triumph of the people's war." he said, motioning to the swinging corpses.\n\n"They called me the one who steals, while pilfering the blood, sweat, and very souls of our people. We did not steal, we took... no, liberated what rightfully belonged to us, the land. Well now it is yours comrades. It won't be long now before every inch of Brazil is returned to the tiller.".\n\nHis last words were obscured by the shouting of the people army, Francisca loudest of all. "Death to Oligarchs! Death to Landlords""
 brazil.562.a: ""Long live Comrade Adhemar!""

 brazil.563.t: "The Oil-Fueled Wildfire" # Brazil Oil Crisis Event
 brazil.563.desc: "In Rio de Janeiro, the uproar is indomitable. The tendrils of the global oil crisis have spread to South America, now throttling Rio's stock market. Queues for any bank in sight stretch over streets, and protesters and police diffuse from scenes of pure anger. Centro is in panic, the favelas are rife with rebellion and all else in between struggles to gasp for breath amidst the smoke, gradually unfurling above the Sugarloaf Mountain.\n\nIn Bahia, they are reaping not only the harvest but the whirlwind. Driven ahead by the inexorable growth of the last decade and the mechanization that came with it, they were not prepared for the inertia when it all came to a halt. Now farmers count their stock, their machines and their pennies to find their own escape from the looming crash.\n\nIn Brasília, they hang their heads in shame. Brazil's foreseeable future is shackled by its past dependence on Italian oil and the squandered growth of its own oil industry. Holding the chains is Venezuela, with enough oil and thus power to send the capital reeling with one price increase. Advisors and politicians alike look desperately out from the windows of Congress, seeking salvation from the rapture they abetted.\n\nBack in Copacabana, an older Henrique Lott sits in discomfort, reflecting in his armchair. Reading through the pile of assorted newspapers, each with a different story to tell of the ailing state of the nation, he finally shared in a true sense of powerlessness. Was all his work, his years of dedication to his country, about to suffocate in this wildfire?\n\nThe answer to that lies at the feet of the Planalto Palace steps, and the next steps it chooses to take. The rest of the country, including him, will simply be passengers for the ride."
 brazil.563.a: "A test of hope."
 BRA_oil_crisis_tt: "§RThis will have disastrous effects on our economy...§!"

 brazil.564.t: "The Future Is Blue"
 brazil.564.desc: "Brasília was filled with UDN supporters, although due to the Oil Crisis not everyone could make it there. The people cheered as the presidential Rolls-Royce drove down the street as Magalhães waved to the people. The car finally reached the place Magalhães could dream of, the Alvorada ramp.\n\nHe walked up the ramp with pride and at the top, [BRA.GetLeader] was ready to give the sash for the new president, of course, a bit disgruntled with his party not winning. The people cheered at the handling of it, but soon went quiet as Magalhães began to speak.\n\n"My fellow Brazilians, the liberalisation of the economy is the only path forward. The restrictions we have make this crisis worse for us. We'll invest in our nation so other nations will invest in us. We also have great amounts of oil in our own borders and this will help us become more independent from foreign oil and help us stay afloat during this crisis."\n\nMagalhães ended his speech, as he entered the Alvorada Palace as president, he knew that the country trusted him to make this country work again. Brazil was a goldmine that had been underexplored, he knew that this nation and its riches would make the superpower of the future an actual superpower."
 brazil.564.a: "A strong economy for a strong nation."

 brazil.565.t: "A Party for All"
 brazil.565.desc: "Brizola smiled, today was the day he always dreamt of. He wore his sash with pride in his eyes and waved to the crowd, it was a mixed bag of PTB supporters and the poor people from the outskirts of Brasília, all chanting his name in support. As Brizola started speaking, the people calmed down and started to listen to their new president.\n\n"People of Brazil, "change," that's the word we chanted in October and the word we will chant forevermore! Hope has won over fear in the hearts of the Brazilian people, hope of a better future following this crisis we are in, caused by corporations wanting to extract every drop of profit from the people instead of helping them."\n\nBrizola went silent, he was nervous, how couldn't he be after all? It was what he always wanted but would the people love him as much as he loved them? Tormented by this idea, Brizola looked at his wife who was standing by his side. "Don't worry," she said. "The people love you." With these words of reassurance, he continued speaking.\n\n"It has been said Brazil is the country of the future, and always will be. The future, my friends, has arrived. After all, what is a nation filled with resources and riches worth, if its people are unhappy? I assure the people that my presidency will be for them and for no one else."\n\nThe people clapped and as he excused himself, he knew that he had done the right thing, even if it meant annoying not only corporations who could hurt his career, but also the military who could coup him at any moment. But he didn't care, he knew that the support of the people was all that he needed."
 brazil.565.a: "A humble man for the humble people?"

 brazil.566.t: "From Rain to Reign"
 brazil.566.desc: "Inauguration Day, unlike most days in Brasília, was overcast with rain and cloud, but not for the thousands which gathered close to the barricades when Ney Braga's presidential column advanced up the Alvorada ramp. With the pomp and traditional heartiness of the marching band in full throng, for once the President-elect felt hope overpower his fears.\n\nOnce slowly advancing through the palace and through the long line of hands to shake, he composed himself as he faced the crowds on the balcony for one last time that day. "Brazilians, despite our difficulties, today, this Inauguration Day, proves that we have not been overcome by our ills and have not succumbed to defeat. Today is a day of hope!" Whistles and cheers erupted amongst the sea of green, yellow and tinges of blue.\n\n"Today is a day which is testament to our endurance and determination. But of course, we must be aware of what it entails to recover. Our country is bleeding. As governor of Paraná, I know that first hand. But, as this country's election has proven to agree, only when we work hard, work clean and work together, will we rebuild together. If we all do so, we will not talk of our darkest days but of our brightest ones! May God bless Brazil!"\n\nAs the President and his family disappeared from the crowd's view, the new leader thought of the hours, days and years ahead. But he had run a state before; he could, and would, run the country. Though he walked through a valley of darkness, God would show him the way."
 brazil.566.a: "And he would take his people with him."

 brazil.567.t: "Edna's Finale"
 brazil.567.desc: "It was a cold day in Brasília as Edna Lott drove into the Alvorada Palace, now as president of the entire nation. On the ramp was Adhemar, the man she had worked for all those years as vice-president, now ready to give her the sash.\n\nThe ceremony started as usual, the handling of the sash went smoothly and Edna started giving her first speech as the new president of the nation. "My fellow Brazilians, today is a historic day for Brazil and the world. You have elected a woman as president and this is a cause for celebration."\n\nThe people cheered her but Edna knew that they wanted to know her strategy for dealing with the crisis that Brazil had been sucked into. "Friends, the current crisis is both one of oil and confidence. We can't fix the problem if we believe there is no way to fix it. I will instate new policies to make sure to protect the people from this crisis."\n\nShe continued her speech and the people listened closely to every word she said. "Thank you Brazil, we will make a brighter future for all of us." The people cheered her but she was still nervous from the whole ordeal as she walked into the palace. But she knew that Brazil was in the right hands and that she would be able to protect the people.\n\n"
 brazil.567.a: "The right woman for the job."

 brazil.568.t: "Waters of January"
 brazil.568.desc: "It was another rainy January day in Brasília. Neves had already walked upon the Palace's ramp and received the sash from the previous President, who was now standing next to him. The crowd was a mix of all Brazilians. Black or white, left or right, they all cheered upon seeing their new president.\n\nNeves waved to the excited crowd, making them cheer louder before they settled down to let him speak. "People of Brazil! Thanks to you I am standing here as President, I could not be more grateful. I remember 30 years ago when Vargas welcomed me to be his minister, I swore that day to keep his dream alive."\n\nThe crowd roared, but Neves could see a new look in their eyes; their worries about the Oil Crisis. "People of this beautiful nation, in this time of crisis I promise to manage it with my decades-old experience. The PSD will ensure Brazil is safe and secure from any problems. We promise another fifty years in five!"\n\nThe crowd were ecstatic, chanting his name and clapping. Neves looked at them one more time and felt only relief. Nothing could shake his confidence; the people had chosen him, and he knew this was the start of something great"
 brazil.568.a: "A stick, a stone, it's the start of a road."

 brazil.569.t: "To Make Father Proud"
 brazil.569.desc: "Adhemar smiled as he handed the presidential sash to Vargas Jr. He was happy that someone would continue his legacy, another 5 years of the PSP revolution, and Vargas Jr. couldn't be happier. His dream had come true - the presidency was his, and he could succeed his father at last.\n\nThe crowd cheered at him and he waved to them. "People of Brazil! I want to remind us that Brazil has been through worse moments in its history. Remember when we had to burn our coffee during the Depression, or when we sent our men to fight in the World War. But even after them we prospered, and we will prosper again after this crisis."\n\nHe paused for a moment to reflect on his father's legacy, how would he continue what he had started and Adhemar continued? But all his worries were quenched, Adhemar did great for Brazil and he would do the same. "My friends, we need to continue what father and Adhemar did. Continue the modernization and make use of the bio fuels to make sure such a crisis never hits us again!"\n\nThe people were confused, but Vargas Jr.'s charisma won them over; wasn't he going to be just as good as his father? Excitedly, they changed his name as he entered the palace.\n\nHe hoped in his heart that the people would love him as much as they did Adhemar and his father, that the PSP revolution would continue and that his legacy will be as great as his father's."
 brazil.569.a: "The Old Man's son, the Bull's disciple, the Man for the job."

 brazil.570.t: "The Day the Music Died"
 brazil.570.desc: "January 1st, 1970. A day that will live in infamy. The weather was appropriate to the occasion, it was cold and rainy, dark clouds filled the sky of Brasília, the crowd had been separated to avoid any squabbles between the PRP and PSD voters, only one crowd was happy.\n\nPlínio Salgado and Ulysses Guimarães exited the presidential Rolls-Royce and started walking up the Alvorada Palace ramp, they couldn't look at each other, neither one could believe they had to work with each other. The previous President awkwardly handed over the Presidential sash to Salgado, who accepted it in turn.\n\nSalgado was handed the microphone and started giving his speech. "Anauê!" One part of the crowd excitedly reciprocated the salute, the other was silent. "My fellow Brazilians, when I was exiled in Iberia, I never thought this day would come, the day where I would be giving this speech. I understand the majority of the people did not vote for me, but I assure them that I will promise to hold a unity government, even hearing the voices of those who disagree with me."\n\nHe could clearly see what was in the people's mind at that moment. How would he deal with the crisis? "People of Brazil, I understand what we are passing through, I believe that we must imitate what the Germans and Italians have been doing to mitigate the crisis. Our movement will keep the nation strong, powerful and unified. I thank the people of this nation for voting for us."\n\nSalgado excused himself and left amidst cheers from the PRP side of the crowd. In his mind he knew one thing was certain, Ulysses wouldn't allow him to do what he had planned to do, that the fact he was vice-president would cause even more chaos and disorder than what the crisis had brought."
 brazil.570.a: "The future seems bleak, but liberty shines in darkness."

 brazil.571.t: "Angra's Advent"
 brazil.571.desc: "At last, the nuclear power plant's construction team's objective was christened. Angra One, already preempting a second and a third, advancing a movement of new energy. The blueprints could hardly be seen over the shoulders of mesmerized engineers, imagining the complex of tubes and pipes, the cylinders and chambers unfolding before them. But first, they needed a building to house it.\n\nThen they got to work. Dozens of forklifts, cranes, and titanic machines were towed into the field overlooking the Atlantic, with Angra dos Reis' emerald mountains on the horizon. Most of the men on the ground that day were actually from Rio de Janeiro itself, though: they were here not just for the paycheck, but so that their native favelas would never go dark again. For now, complaints were scarce compared to the hopes and dreams shared in between shifts.\n\n"You know, for once, it doesn't feel like we're just paving roads for some ungrateful executives," one driver would remark, watching the red sun dip below the hills. "It's like we're actually part of something bigger."\n\n"Alright, Amadeo, we've only just put some asphalt on the ground," laughed one of his colleagues. "Let's finish that before we start romanticizing.""
 brazil.571.a: "Hope will drive these machines, if nothing else."

 brazil.572.t: "Atoms for Hope"
 brazil.572.desc: "They were now cradling a titan. The first nuclear reactor in Brazilian history was, nonetheless, neither Brazilian nor the colossus they imagined, as it was being heaved onto the stage behind the US ambassador and Vasco Leitão da Cunha, the Minister of Foreign Affairs. After a deal which took a day of proceedings, but which had a lifetime of consequence, journalists were at a press conference to pass on what this bombshell meant for Brazil.\n\nYet despite the truth that it was not the fruit of their own labor, as mountain-moving as many Brazilians conceived it to be, it was hard to mistake the awe present. All the invitees, even the American nuclear scientists, seemed to be silently reverent of the object, transfixed upon it as if it were a kind of god. For it represented, yet again, in all its indescribable form, Brazil's entry into the future.\n\nUnder the Atoms for Peace program, the United States would finance and support developing nations' efforts to industrialize and keep up with revolutionizing technology. The keynote speakers at the conference found it hard not to touch upon the multitudes of megawatt-hours, jobs and industries this one plant would generate.\n\nApparently the program did not come free. The ambassador mentioned 'oversight' and 'inspection' several times, to "ensure the Atoms for Peace program did not turn into Atoms for War". Even that remark was met with silent respect.\n\nBut if you asked any local spectators of what image they remembered of that day, they would probably tell you of the stark green and yellow banners, posters and flags, montages of the Brazilian worker lifting, smiling, looking upward to a blue sky of stars. It is this dream which this program tries to reach."
 brazil.572.a: "We are all made of atoms; we must simply exploit their potential."

 brazil.573.t: "Angra's Accomplishment"
 brazil.573.desc: ""It has been ages since the construction site across that bay from Angra dos Reis saw its first machines. But we have just finished Brazil's first nuclear power site!" Raucous applause erupted upon the foreman's congratulation. Coca-Cola bottles were clinked together, toasts were said amongst squads of workers and despite the lamentable lack of champagne, their last evening as a collective was enjoyed without extravagant excesses.\n\nThat wasn't to say, however, that the scene would be quiet the next morning. On the contrary, as one group had packed up, another swarm of scientists and engineers came in to inspect, coordinate and install. But even they were taken in by the plant: its quartz-white paint shone brilliantly against the Atlantic. For a building with the power to wreak disaster if mismanaged, it sure did have an idyllic backdrop.\n\nMany never thought it would end up this way. But as the pictures reached television screens and newspaper covers, the years and months of disparaging comments, hopeless forecasts of being bogged down in a quagmire of incompletion, all the naysayers had been disproved. The Planalto and Alvorada alike were similarly relieved.\n\nMost of those that were there on day one may have been reassigned, retired, or replaced. But what their work had achieved had become clear: Brazil would join the ranks of nations running on atomic energy."
 brazil.573.a: "The work is not done, but it is monumental."

 brazil.574.t: "Angra 1 Comes to Life"
 brazil.574.desc: "As the last few personnel wormed their way into the corridor outside a large room adorned with sans-serif labels and color-coded panels, a man, his hair as white as the room's floors and dressed in a sharp brown turtleneck, turned his back to the crowd, having already said the words the reporters needed to copy to their notepads.\n\nWith a solemn nod, the three of them approached the ignition keys, and the footsteps of the pomaded government officials, the camera shutters of the newspaper photographers, the squirming of the uniformed researchers, and the murmurs of the six or so women actually present in the facility all faded into a hush, punctuated only by the adagio pulse of the I&C systems.\n\nA solitary buzz echoed. One display ticked up. 200, 225... Several screens began to beep. 250, 260... Indicator signals switched on and off. The floor started to vibrate as the reactor coolant pumps activated. 265... 270...\n\nAnd from all around them, a deep harmonic rumble. 275 degrees.\n\nThen, kilometers - dozens, hundreds - away from where the power plant staff popped champagne and posed for photos, the substations, transformers, and distribution lines that dotted the verdant coast and the forested mountains pulsed with newfound energy.\n\nSouthwest, toward São Paulo, the peri-urban neighborhoods of Cangaíba cheered the end of rotating blackouts and found their lights flickered a little less often and their fridges ran a little more steadily. Northeast, toward Rio, in a quaint mercearia in Realengo, a storeowner logged her expenses, thinking to herself the same sentiment the entire Southeast shared in that moment."
 brazil.574.a: "The atomic revolution had been kind to her bills."

 brazil.575.t: "So Long, and Thanks for All the Fish"
 brazil.575.desc: "A soft crack filled the room as the President sat down. Adhemar winced. His body had decided to make a habit of making such unflattering noises more often than not, nowadays. He waved his hand dismissively at the aide who noticed his expression - today was not the day for weakness. It was a day for strength. The film crew in front of him bustled away as he once again went over his speech in his head.\n\nImproved healthcare, greater economic growth, increased trade. A greater Brazil, just as he had promised back in 1965. Many would probably claim otherwise, but to hell with them. As far as he was concerned, he had delivered. The man at the camera made a gesture indicating that they would be starting soon. He held back the cough building up in his throat, and nodded affirmatively. The lights went on, and he began.\n\n"Greetings, my fellow Brazilians. As you all know, my time as President has come to an end. And as I make way for my successor, I wish to thank you all for the support you have granted to me and the PSP these past five years, especially whilst I was... indisposed. Without your support, we would be unable to achieve what we have done. Increased trade, a booming economy, jobs for all, and healthcare that we deserve - healthcare that saved my life. And so, as my time comes to an end, I can only ask the Lord to grant President [GetLeader] the best of luck, and once again to thank you all. May God bless us all."\n\nA few moments passed, and the cameraman signaled that it was over. It began to sink in that his Presidency had come to a close. Standing up again, he fought back the fatigue and took one last look at the Presidential office. For a moment, Adhemar could swear he saw the shadow of a figure flicker near the portrait of Washington Luís. A familiar, faceless silhouette. But it was merely a trick of the light. And as he gazed upon the portrait of his fellow Paulista, a man with such historical weight, he could only wonder one thing."
 brazil.575.a: "How would history perceive him?"

 brazil.576.t: "Duty's End"
 brazil.576.desc: "President Pedro Aleixo stood on the podium still looking as bewildered as the day he had taken office, his large glasses leaving his eyes distorted and uncanny, his jowls shaking with every word. He knew no one expected much of this speech, but like his entire time in power it was an obligation he could not refuse.\n\n"...I'm sure my ascension to this esteemed office came as much of a shock to all of you as it did to me. And I am certain many of you were almost as apprehensive about it as I was. I was sworn in as President amidst one of the greatest crises the Republic has ever faced. And yet despite the odds, thanks to your perseverance the storm is beginning to pass".\n\n"The mere fact that a peaceful transfer of power occurred speaks to a resilience of our democratic institutions much greater than any could have anticipated. It is you not I that held this country together, persevered against fear, violence, or division. But the fight is not over yet, while I have done everything I can to ensure the continuation of democracy and the rule of law, the future is ultimately in your hands".\n\n"All I can give now is my thanks and a small token of advice. Always remember your enemy is not your fellow Brazilian, regardless of politics, creed, or color you share a fundamental bond stronger than you can possibly imagine. Your enemies are division and hate, violence and fear. It is only by coming together and looking towards the future can we finally achieve the dreams of our forefathers. I trust that you will show my successor the path because only together can Brazil rise above the darkness of yesterday."\n\nAnd with that the caretaker President took his leave, returning to the darkness of history..."
 brazil.576.a: "With a hopeful smile on his face."

 brazil.577.t: "Looking Forward"
 brazil.577.desc: "Like countless others glued to their television screens, Francisca watched Edna Lott speaking before an audience of thousands in the glistening capital of Brasília. The cramped apartment was filled with the distorted voice of Lott blaring through the speakers, leaving Francisca's children confused as to what the deafening sound was for.\n\n"Brazil is undergoing one of the most dramatic changes it has witnessed in recent decades. The last few years have been a hurdle, one that has shaken the nation to its core and left it under the shadow of uncertainty. Today, as we look ahead, we strive to move beyond these events. I'd like to say in advance I owe my victory to the proud people of Brazil, and I cannot tell you how important you all are to the future of this nation." Lott spoke loudly-as the video feed cut to the view of her speaking forward into the microphone.\n\n"'The economic shortfalls of the past few years have been an unforeseen disaster, and it is a deep shame that the crisis couldn't be addressed immediately. But I'd like to make it clear that the resolution of the so-called "Oil Crisis" is an immediate focus of our administration, and we'll do everything in our power to stop it. We have reached preliminary agreements with the Venezuelan government to import oil at a discounted price, and we have also approved various subsidies and increased funding for Petrobras to defend against the crisis as best we can. We shall not let ourselves fall to this catastrophe, and my duty to the Brazilian people is to fulfill the task they've given me. I'm going to make sure that this nation survives unscathed, even with the uncertainties of the modern world." Lott concluded her speech, stepping off the podium along with her secretaries as the audience broke out into fervent patriotism.\n\nFrancisca shut off the television as she pondered with a smile. She knew that if anyone had the experience to lead Brazil, it was Lott. Even with all the difficulties Francisca and her children faced, there was a glimmer of hope in the distance."
 brazil.577.a: "The dismal shadow of uncertainty over Brazil is fading away."

 brazil.578.t: "Delaying the Inevitable"
 brazil.578.desc: "Edna Lott was stalling. It had been almost an hour since she'd given that damned speech. All her things were cleared out, and legally she was no longer President, but she simply could not bring herself to leave. It didn't feel real, to be a hair's inch from her everything only to be cast back out into the political wilderness.\n\nBut it wasn't just her own failure, this was a catastrophe for the whole Lott family. Her father would almost certainly console her with kind words, but deep down, she knew he would resent her failure. How could he not?\n\nShe limply kicked the wall, before recoiling. Had anyone heard that? Edna suddenly became hyper aware of herself and stood up straight. She couldn't succumb to despair, that's what they wanted, for her to collapse into hysterics. Her father had stood tall against the Nazi hordes in Britain, this was child's play in comparison to that. Wiping away a tear on her face, she picked up the final folder of documents and opened the door.\n\nEdna looked back at the desk, consoling herself: perhaps she could make a comeback, it wasn't unheard of after all. Maybe she just needed a break, yes that was it, maybe she would go back to teaching and then when the time came she would return to take what was rightfully hers.\n\nNo, Edna shook her head and cast aside such thoughts, it was over, there was no going back. A good soldier needs to knew when they're beaten. She stepped through the office door and in doing so returned to the realm of obscurity..."
 brazil.578.a: "This time, perhaps, for good."

 brazil.579.t: "The More Things Change"
 brazil.579.desc: "Francisca tried to ignore the words on the TV as she approached the cashier with her groceries. Flickering on the cheap black and white TV was former vice-president Edna Lott, accepting her defeat at the polls. Her composure was remarkable, but Francisca could feel the humiliation in Edna's eyes despite the low-fidelity, she had felt it many times before.\n\nThe cashier and his assistant were engrossed in the screen, not even noticing Francisca place the items up on the counter. "Looks like all the money her daddy stole from the highway wasn't enough to buy that cow the presidency," said the assistant with a chuckle. Francisca began to feel sick, her hands quivering as she put the bag of flour on the counter, the cashier still unaware.\n\nAs Edna continued her speech thanking the supporters in the PSD and PTB, the two men continued their jeers: "I heard she tried to offer some favors to Adhemar in exchange for endorsement," said the cashier.\n\n"I heard he accepted, but when he saw whatever was under her skirt shocked him so bad his heart stopped working!" finished the assistant.\n\nThe two erupted into a laughter that overwhelmed the last part of Edna's speech. Turning around, the cashier finally noticed Francisca pushing a small pile of coins towards him. He scooped them up and returned to watching the TV. Francisca said nothing, collected her things and rushed out of the store.\n\nFor a brief moment it seemed that things might be changing in this country, that her daughters could hope for something better. Francisca cursed her foolishness, no matter how many things changed..."
 brazil.579.a: "It was still the same old Brazil."

 brazil.580.t: "The Beginning of the End"
 brazil.580.desc: "It was happening again. The sum of all their fears. The military had struck. In the dark of the early morning, São Paulo airport had been seized by the local garrison, calling for Brizola's immediate resignation and arrest. Brizola had lived long enough to know that this would just be the beginning. Installations would be seized, communications hijacked, and then the arrests would start. If they were lucky, that would be where the bloodshed would end, but the mayfly President knew better than to feed such hopes.\n\nBrizola looked around the concrete bunker, seeing the huddled whimpering remains of his campaign staff. It had been several hours with no word of what was going on outside. Brizola crossed his fingers, taking a sip of coffee from a styrofoam cup. It was rich and bitter - very apt for the circumstances. A young aide hurried up to him with a sheet of paper, and his gut dropped. "Give it to me straight, son. What are we dealing with? How many more units have joined them?"\n\nThe aide hesitated before speaking. "None, sir," he stuttered. "There's been no word of further insurrection. Some UDN loudmouths are cheering them on, but as of now it seems to be contained to the airport."\n\n"...well, what are they doing? Are they advancing on the city?"\n\n"No, they just seem to be...sitting there." Brizola was stunned into silence. Before he could say anything, he was met with a yell from one of his secretaries sitting at the phone.\n\n"I have confirmed reports! They're throwing down their arms! I repeat, the rebels are asking to surrender!"\n\nBrizola sat unspeaking for several seconds, the bunker heavy with silence. And then, he burst out into a stream of laughter as weeks upon weeks of tension dissipated in a moment. All the threats, all the fear - it was all just hot air! It appeared the Brazilian military opposition had died. Not with a bang..."
 brazil.580.a: "But with a chortle."

 brazil.581.t: "Suffering and Success"
 brazil.581.desc: "Soon to be President, Brizola stood in the backroom halls of the National Congress, smoking a cigarette. It wouldn't be long now before the inauguration, and the days of preparations had been excruciating. An endless parade of suits licking his boots clamoring for his patronage or cursing his name with the fury of a thousand hells, sometimes he couldn't tell which was worse.\n\nSuddenly, Brizola felt a slap against his back, ejecting the air from his lungs and sending the cigarette flying from his mouth. It hit the ground with a hiss, before being crushed by the shoe of one João Goulart.\n\n"Jesus Christ, Jango you nearly gave me a heart attack, you know how many people are calling for my head nowadays." Brizola said with relief.\n\n"My thoughts exactly, I'm just trying to keep your reflexes sharp." Brizola smiled at that as he embraced his old friend.\n\n"I can't stay long, I'm needed back in the Senate, someone needs to keep that rabble in line for you after all, but I wanted to wish you luck." Jango said, moving in the direction of the doorway.\n\nBrizola stepped to the side, blocking his path before wagging his finger. "You won't get away that easily." Brizola said, pointing at the remains of his cigarette. "We've dealt long enough with a thief in the Palace, I won't stand for a vandal in the Senate."\n\n"Unfortunately I forgot my pack at home, but perhaps I may have an even better pick me up," Jango said reaching in his jacket to reveal a newspaper. Brizola saw the title and grinned: the op-ed read in bold letters, "Crow or Dodo? UDN Spokesman's Career threatened with Extinction." Meeting an old friend was one thing, but nothing could brighten Brizola's day..."
 brazil.581.a: "Like watching the misery of Carlos Lacerda."

 brazil.585.t: "A Global Response"
 brazil.585.desc: "The resolution passed, the conversation cordial, and warmth spread through the cold city, thought Walther Salles as he looked out from behind the podium at the OFN HQ. When President Lott ordered him to attend the Security Council meeting, he hadn't expected such unity—a front that, for once, Brazil could fully support. As he took in the applause, Salles adjusted his tie and began to speak.\n\n"The United States of Brazil joins its friends and allies in condemning the invasion of a free South Africa and supporting its defense," he began in lightly-accented English. "But why are we here? Not to deliberate, but to fight and accept our responsibility as free nations!"\n\nRaucous applause erupted. "We are here in an extraordinary show of unity and power. We prove we are different from our enemies, ruling not by fear, but with confidence. We do not accept dictates; we decide for ourselves. In the face of injustice, we stand strong."\n\n"In Brazil, we know exactly where standing down leads. In 1939, our President stayed out of the biggest conflict of our time. Many thought that war wasn't ours. But our ships were attacked, our people were killed, and our veil of neutrality didn't prevent bloodshed."\n\n"We must learn from our mistake as we did in the South Atlantic not long ago. The enemy's bloodlust remains unchanged, and their goals of world conquest are no different. So, there is only one option: support South Africa today and beat them so hard they will not rise tomorrow."\n\nSalles smiled as applause engulfed the hall. Men of all stripes and flags stood in respect, united in spirit. It wasn't his first time in the city, but for a moment, New York's "Melting Pot" took on new meaning for the minister - from a group of many, the spirit of one."
 brazil.585.a: "Warm words for a bitter time."

 brazil.586.t: "A Modern Vendetta"
 brazil.586.desc: "Arnon de Melo, Alagoas' previous governor and newest senator from the PDC, found that there was little time to celebrate his victory. He had been travelling all across the state on a hybrid comeback-premiere tour—the old governor returning to show off the new senator, both figures compressed into one. The whole thing was meant to take a week, building up his portfolio before he packed his bags and went off to Brasília. But at every social club, public park and private residence that hosted him, he felt shadows on the periphery of his vision, lurking in the corners and darkened places around him.\n\nThose shadows emerged to spout some inane rant or threat against him, and he knew who they were. Idiot sons, brothers and nephews of Silvestre Péricles, his predecessor as Governor of Alagoas and political rival. The names de Melo and Péricles rose in Alagoas at the same time; two dynasties rising, coiling around each other, trying to strangle the other to death so they alone would reach heaven unopposed. And at the centre of this conflict were two senators from these noble houses: Arnon on one side, Silvestre on the other.\n\nOnce, when Silvestre was forced to hand over Alagoas to his hated rival, he threw open the doors of the state prison. He promised the release of inmates who could expel a kilogram of shit, and let them loose upon the governor's mansion. Arnon de Melo remembered the moment he and his wife first stepped foot into the mansion—like a Nazi, he thought; brown-coated—stricken by the stench and the muck he'd stepped into.\n\nFrom that moment, escalation was the watchword, with the scions of Houses de Melo and Perícles finding new ways to harass and humiliate their foes. The feud was heated; blood had been spilled among the lower ranks more than once. The two kept guns on their hips, waiting for the day that one man would say the wrong thing and the other would, finally, be driven to violence."
 brazil.586.a: "And woe befall Brasília if it thinks this feud is merely contained to Alagoas."

 brazil.587.t: "Time To Hit The Road"
 brazil.587.desc: "There was no illness or scandal to precede his departure from politics, nor was there a sense of fulfilment from his brief time in the Senate; José Guiomard of the PSD simply felt compelled to take a break. He put in his notice with the Senate, prepared a letter laced with apologies to his deputy, and prepared to ride out the next few weeks in peace. Colleagues who knew him from his governorship of Acre or his time in the House of Deputies offered confused condolences, but he brushed them off with firm politeness.\n\nHe had his reasons, they said, although Guiomard privately wished he knew them himself. It was something unspeakable which first compelled him to step back, indescribable danger glimpsed in the sixth sense. Such feelings are metabolised in rationality, the mind stumbling and groping through the darkness to find all manner of excuses. Guiomard found it in some of the other senators he saw in the chamber. Waiting for his deputy, he glimpsed a few of the PTB senators on the other side of the hall. Yes, it was them. They made it just so Goddamn impossible. Had his old friend Salgado been given—\n\n"Senator Guiomard," said a voice behind him. He spun around to see his deputy, José Kairala. "Last day in the chamber?"\n\nIt was; Guiomard seemed surprised that all that time had passed so quickly. He offered a weak smile. "Yes. I thought what I'd do is see the place one last time from this angle. Are you ready to take over, Senator?"\n\nKairala's face briefly flared red. "I think so. I have to say, Senator Guiomard, we're all still a little surprised."\n\n"Don't be. The chamber's not for everyone, but I'm sure you'll do fine." Guiomard offered his hand, and Kairala shook it. His hand was cold, and his grip was firm. Kairala thought nothing of it at first."
 brazil.587.a: "But even when he broke the handshake, Kairala still felt a chill on his hand."

 brazil.588.t: "Homicide At The Senate Hall"
 brazil.588.desc: "José Kairala's last day began normally: light breakfast and a coffee, morning paper spread out before him on the kitchen table. He read through it, pensive sips between paragraphs, considered and then dismissed a cigarette before work. He saw his wife and children dressed formally; his wife Creusa offered to join him. After all, it was his last day before he handed over the seat back to his rightful owner—and had he even invited his family to his workplace? He smiled, acquiesced, and they all piled into the car with exuberance.\n\nThe Senate would convene in an hour, but Kairala took a little more time to show his family around. He showed them his office, and the photo of them that remained steadfast on his desk. His children held a mock committee in the Noble Room. Kairala's smile seeing the young senators discuss the practical and moral reasons to push back their bedtime by an hour was dropped upon seeing the time. The Senate convened fifteen minutes ago. He hastily bid farewell to his wife and promised to meet back up with them when it was over.\n\nAs he walked into the Senate chamber, he found Arnon de Melo before the Speaker. Kairala crept into his seat, right next to Silvestre Péricles, his face barely resisting paroxysms of rage. de Melo was using his time to report on the harassment he had suffered by the hands of his enemies: wild gesticulations, biblical phrasing. Kairala knew who he meant by the dark forces conspiring against him; he could hear him pound the table in protest.\n\nPéricles rose from his desk, screaming about de Melo over his alleged libel and slander. A chill swept over Kairala's hand. He looked up: Péricles rushed down the aisle, de Melo snapped like a whip behind him, de Melo pulled out a pistol, Péricles ducked. Kairala rose in a panic, stumbled to his side, and felt two great flowers of pain blossom in his chest. He looked up: Péricles looking up from behind a desk; de Melo's eyes wide, a thin trail of gunsmoke from his hand."
 brazil.588.a: "Then, thinking of his wife and children, Kairala fell."

 brazil.589.t: "Let's Put It All Behind Us"
 brazil.589.desc: "José Guiomard sat in an unusual spot. The Senate had fenced his old desk off with stanchion rope, a protective and commemorative square around where José Kairala died. There was still a period of mourning for the substitute Senator, struck down on his final day, though government continued to gather Senators in a room where, despite the best efforts of their cleaning staff, blood still lingered in the air.\n\nNobody would be charged—Arnon de Melo was probably picking up his keys and wallet from the guards as they spoke. The whole thing made the PDC look ridiculous, with its gun-toting Senators turning this hallowed hall of government into the OK Corral. Unfortunately, de Melo was being let go on self-defense charges, since Silvestre Péricles had a gun of his own. Guiomard sighed, sat back and listened to another sad excuse for a eulogy. When he looked over to his old desk, a chill ran through his hand.\n\nTwelve kilometres away, a blinking Arnon de Melo walked through iron gates. A small gathering formed outside, friends and family welcoming back de Melo to the land of the law-abiding, grateful that no charges were placed against him. Among this entourage was his son, fourteen-year-old Fernando. He was the first person Arnon approached, wrapping him in a hug. The entourage clapped and his son hugged him back.\n\nFernando found it strange; it was as if nothing had happened at all. The last three days were some kind of aberration, a horrible nightmare from which they had now all woken up. Now they could return to the waking world, save for the dead Senator, who nobody wanted to bring up. All it had taken was a little bit of rhetoric, some photographs of hecklers and party-crashers at his father's rallies, and Brazil spat them all out of this nightmare."
 brazil.589.a: "Fernando thought it was so strange how you could do anything if you were smart enough."
 tomb_for_heroic_man_02_tooltip: "§YJosé Guiomard is temporarily replaced by substitute Senator José Kairala.§!"
 tomb_for_heroic_man_03_tooltip: "§RCircumstances force José Guiomard to return from his break.§!"

 brazil.590.t: "3-1"
 brazil.590.desc: "In the bar, a young man drums his mug against the table. The bartender, who usually complains about the spilled beer and chipped glassware, is unable to take his eyes off the small TV.\n\nOn the streets, a group of teens huddles around a flimsy radio. Each time the sound turns to static, they all groan, only to immediately quiet down and listen to the commentator.\n\nAt home, a father and son sit much too close to the screen with their jaws clenched. The young boy pumps his fists, doing anything — anything — if it would give Brazil just a little more time to catch up.\n\nThe clock moves agonizingly slowly toward the 90-minute mark. Finally, the referee blows his whistle. Iberian Union 3-1 Brazil. Everyone lets out a breath they didn't realize they'd been holding, although it comes out more as a whimper.\n\n"It's not over yet. Remember the stoppage time."\n\n"How could they let this happen?! We have the best players in the world!"\n\n"A technical error—it must be!"\n\n"What now? The world will see us as a joke."\n\nAfter victories in 1958 and 1962, victory was all that some Brazilians knew. The golden days — when their country was a powerhouse of both economy and football — felt further away than ever."
 brazil.590.a: ""This never happened before," murmured a young man as he left the bar."
 
 brazil.591.t: "Amazon to Atlantic"
 brazil.591.desc: "There was jubilation in every corner of Brazil; from Santa Maria to Boa Vista, from Natal to the State of Acre. Rio de Janeiro, Brasília, and São Paulo all had erupted in celebratory fever as crowds whistled, cheered, and rioted in their enthusiasm. Even in the most remote of areas, so long as a radio was nearby, there was a party to go with it.\n\nEach hidden rock of Brazil knew of the greatest victory, being filled with energetic joy, that Brazil was the winner of the 1970 World Cup. The Jules Rimet trophy was paraded through the streets of Brasília, the crowds bulging and compressing into the streets where the physical proof of victory marched through. Brazil would keep the trophy in light of the great honor of being the first team to win three World Cups, sparking deafening cheers as it was taken to a secure convoy of vehicles to transport the trophy to the Confederation of Brazilian Football's headquarters.\n\nThe trophy was a sign of a golden generation of talent in Brazil's team that would inspire future players to achieve their level of success. However, it would be a double-edged sword, raising the bar on future generations for the success they must show.\n\nEight years after the victory against Chile in the Estadio Prádanos, the people had the rare opportunity to enjoy themselves. Everyone celebrated side by side with others who were just as joyful, washing away the long drought of despair; even if it was only for a moment. This ray of light shone through the fog of misery, feeding into the collective feeling of a rebounding Brazil which lodged itself into the popular subconscious. From this, a small poll bump came about for the President's party."
 brazil.591.a: "Where the ball flies, the sun shines."

 brazil.592.t: "Back to Fatigues"
 brazil.592.desc: "It was unbearable, Lott thought, putting the newspaper down. The sun-kissed shoreline of Copacabana, its warm, lazy air, its noisy jubilance, all of it felt wrong. None of the serenity of his self-consciously large mansion, the way it peered over the golden expanse of the beach, or the security it guaranteed felt correct anymore.\n\nHe could scarcely remember the day he came there for the first time, how much of an antithesis it was compared to the military, how all its power struggles and headache-inducing grandstanding vanished in its wake. But now it had all flipped on its head: now his mind was on Argentina, on the front and on the men he previously tried his hardest not to remember, but who played on his mind constantly. As they fought for him, he sat back, became grey, collected dust.\n\nHe gripped onto the railing, gazing into the ocean. He could go back to Brasília, assure himself stable minds were in charge of Brazil's men. But that was too presumptuous, and he would just be seen as another threat. America could be the job for him; a familiar and friendly face would do wonders in Washington, and they needed the support desperately from their old ally. No, no, that was all missing the point, a dereliction of duty. He made up his mind, and made a call.\n\nWithin 24 hours, the phone would ring again, the person in the line would be calling from the Planalto Palace, and, just like that, Field Marshal Henrique Teixeira Lott was back in his comfort zone: the military."
 brazil.592.a: "True loyalty does not end when you turn in the uniform."
 
 brazil.593.t: "A Much Needed Answer"
 brazil.593.desc: "Jayme Tiomno wiped his forehead as he adjusted his dark goggles. It was not only oppressively hot in the crowded bunker, filled with scientists and military men; but right now, months of work and millions of cruzeiros sat 10 km's away in the middle of the rainforest. The 50kt nuclear bomb 'Ogúm', named after the Umbandaist oríxa of war and metalworking. This project was years in the making, and Jayme could only feel tension in the small space as everyone focused on the mass of green in front of them as an unasked question hung in the air.\n\nWhat if this was a failure? No, it couldn't be! Jayme peeked to his left and saw Álvaro Alberto. His back straight and demeanor stoic as he waited to see if his years of advocacy and hard work would pay off.\n\n"Ten seconds to detonation, gentlemen." Jayme heard himself say as the only things he could focus on were his breathing and the ticking clock to his right. To stop himself succumbing to dread and panic, he used the rhythm of his breathing to countdown the seconds. Five, four, three, tw-\n\nThe countdown didn't finish as surprised exclamations rang out in the bunker. Everyone would certainly be blinded if it weren't for the goggles but it didn't take away from the surprise of the bomb detonating early. As soon as the flash died down, everyone looked out in awe as a mushroom cloud rose above the jungle, the cawing of native parrots that flew off in surprise rising over the sound of the shockwave. Everyone in the bunker was silent for a beat when Álvaro started to giggle. Then laugh.\n\n"Gentlemen! We've done it!" He exclaimed and everyone joined in with the celebrations. Even Jayme released a sigh of relief as he turned to the ecstatic crowd. Seems the question had an answer, and he thanked heaven above the answer was no."
 brazil.593.a: "Brazil has finally cracked the atom!"
 
 brazil.594.t: "Prometeu"
 brazil.594.desc: "Within the Supreme Meeting Room of the Palácio do Planalto, Adhemar spoke with a level of jubilance unheard of for some time. The first bomb was constructed with scarcely a hitch, cementing Brazil's status as South America's ascendant in national security and international projection. For Adhemar, it was an elation beyond description.\n\n"With the acquirement of nuclear weaponry in service to the Republic," Adhemar read from Médici's report to the assembled members of the National Defense Council, "our continued security has been secured not only in the Americas, but amongst the great powers of the globe. It is with great satisfaction that our nuclear operations have proven to be a resounding success!" Adhemar set the report down and joined the applause that filled the room. His grin reflected their fortunes. Every Brazilian would enjoy this success. "Indeed, you are quite correct about one fact, General," Adhemar mused, "we can count ourselves among the great powers of the globe, perhaps even a superpower in the making!" Another round of applause. Adhemar sighed, taking his seat once more. "So, what happens next, gentlemen?"\n\n"It would be prudent to keep our program a secret, at least for now." Médici curled his lips, his hands folded upon the table. "Better to keep our opponents guessing on our capabilities. Additionally, I fear an exposed nuclear program would be an open target for foreign agents."\n\nLaudo Natel drummed his fingers against the table, tutting. "On the contrary, a public demonstration would strike fear in our rivals, both domestic and abroad! I guarantee it would also immensely help your election pollings, Your Excellency." Adhemar grumbled at this. The gains he could make with the public could cement his victory in the next election, yet Médici's prudence may prove yet wiser. Such immense power begged to be used, yet could Adhemar endure the aftershock of such a tremendous shake-up in the intercontinental balance of power?"
 brazil.594.a: "The fire of the Gods was in their hands."
 
 brazil.595.t: "The Sixth Seal"
 brazil.595.desc: ""...And we are pleased to report a successful nuclear detonation." The aide finished reading the report. Two pulses of a heart worth of silence, and then the room erupted into a cacophony of applause. The men in uniform were the most enthusiastic. Some of the others were pleased, but subdued. Others were evidently only feigning their joy. There was only one man silent: President Carlos Lacerda.\n\nThe president waited for the applause to die down before he spoke. "Thank you." All heads turned to him, waiting for any comment. Rather than words of assurance or celebration, it was a dismissal. The uniforms and suits talked amongst themselves as they filed out of the large meeting room, their voices fading until it was only Lacerda.\n\nHis thoughts took him three thousand miles away to Buenos Aires. He pictured the Argentinians wiping sweat off their brows as they assessed their own nuclear program. Whatever they produced had to be bigger, stronger, and more lethal than the device detonated in the Amazon. In Tokyo and Germania, there would be emergency meetings over a nuclear-armed American ally. He could imagine U-Boats surfacing off the coast, streaks of light cascading down onto Rio, fireballs enveloping Christ the Redeemer. With a shaky hand, Lacerda took his mug of coffee from the desk."
 brazil.595.a: "Revelation 6:16"
 brazil_595_tt: "They called to the mountains and the rocks, "Fall on us and hide us from the face of him who sits on the throne and from the wrath of the Lamb!""
 
 brazil.597.t: "An Amazonian Understanding"
 brazil.597.desc: "Brasília has finally announced an agreement made in Caracas this morning, after a few days of frantic back-and-forth consultation. Reports from contacts close to the Planalto suggest a breakthrough after a suggested increase in infrastructure development funds by Brazil, allowing a signing to take place later this week.\n\nIt was a negotiation which left President [BRA.GetLeader] furiously checking up on his delegation from hour to hour. But now, the President declares, it is "time to reap what we have sown." For Brazil, that means a renewed inflow of oil from the petroleum-rich nation and desperate relief to supply, burdened by the price shock continuing from last month.\n\nThis has not come for free, however, and several cabinet ministers have expressed displeasure at the "inordinate" concessions granted to the Venezuelans. In addition to infrastructure development, particularly across the Amazon region, Brazil will offer military aid and expertise as well as better conditions on cars, machinery, and steel sold to the country: all valuable currency for a nation full of resources but scant in friends, and thus plenty of leverage set aside in case of further dialogue.\n\nAnalysts may bristle, but one thing is certain for Brazilians across the nation: at the moment, all relief is good relief, and it cannot come sooner"
 brazil.597.a: "Just give us the damn oil."
 
 brazil.598.t: "Southern Hospitality"
 brazil.598.desc: "Following successful overtures between Brazilian and Argentinian diplomats in recent weeks, a historical deal has been struck in Buenos Aires that officially authorized oil imports from Argentinian markets, much to the praise and relief of the Brazilian public at large. The ceremony was widely publicized in the days leading up to its officiation, and various snapshots of Presidents [BRA.GetLeader] and [ARG.GetLeader] shaking hands is expected to remain plastered across Brazil's most prominent newspapers for the coming weeks. Economists laud the oil deal as a vital step forward to lessening the effects of the Oil Crisis on the Brazilian economy, be it in reducing gas prices across the board or easing pressure on Brazilian consumers already strained on personal savings.\n\nOthers, however, remain hesitant about the new state of affairs. Key figures, primarily in the armed forces, have voiced concerns of overreliance on Argentinian corporations and their growing presence in the Southern oil trade, with General Geisel deriding the deal as a "national security crisis in the making." Although President [BRA.GetLeader] has so far rebuffed many of the concerns voiced by the military, the general public has largely remained optimistic about future cooperation with the longtime rival of Brazil, both in the economic benefits that might be reaped from such a relationship and the easing of tensions that may come from increased economic ties between Buenos Aires and Brasília."
 brazil.598.a: "Who said peace was never an option?"

 brazil.599.t: "The Sky Above Has No Tears"
 brazil.599.desc: ""Alright. Carlos, you have the camera?" A curly-haired young man nodded, fiddling with a Polaroid Model 95. "Raphael, you're with the switch?" A larger blonde boy gave a thumbs-up. "Bob, you got the pen?" A Chinese student saluted in response. "Aaand I've..." A slightly older kid came out from behind the refrigerator-sized machine. His nametag read Caíque. "...checked our wiring. Okay, boys. Action!"\n\nRaphael flipped the electrical switch, bringing the machine to life with a crackle. Bob got to work, pressing the grounded tip of the pen onto the solder point of some interface panels. When he pressed, that panel lit up. "Bit one. Bit two. Bit one..." He moved with precision, clearly knowing the machine in and out. It was no wonder the others called him the Master.\n\nHe pressed an outside soldering point, shutting off all of the lights. Then, eight panel lights in a row appeared. "It's done! Carlos, quickly!" Carlos rushed over, and giving Bob a brief moment to smile, a picture of history was taken. The first operation on a Brazilian computer - a multiplication of two by two - and the man who made it happen. All in an Aeronautics Institute of Technology basement.\n\nThe young men clinked their Brahma beers together in celebration. Soon, loose lips admitted motives. Carlos, the engineer, muttered that he had been eyeing a chick who loved computers. Raphael, the computer scientist, said he hoped he'd show up in newspapers. Caíque, the wirer, mentioned he'd like to land a cushy American tech job. However, Bob Lee, the designer of the project, said nothing."
 brazil.599.a: "He looked out of the window, up to the stars. He dreamt of something far beyond himself."
 brazil_rip_masterbobli_tt: "In memoriam of Masterbobli, tester and contributor."

 brazil.600.t: "Foxes in the Henhouse"
 brazil.600.desc: ""...while we cannot be certain of the validity of the concerns raised by the staff, we can confirm several oddities that could be explained by foreign intelligence. We do not have any evidence of who these foreign assets belong to, but the most likely culprit would be the Argentinians." The Secret Service officer finished his presentation by passing his hand over several photos laid across the President's desk, before picking up a binder and handing it to the President.\n\nThe Presidential Palace was as silent as the grave; the only sound audible within the President's office was the man thumbing through one report after another. They reported suspected infiltration, documentation, and information theft regarding the nation's nuclear project. If Brazil's most important secret were made public, the results would be disastrous, to say the very least. With a shaky breath, the reports were set down, and the President motioned for the officer to continue.\n\n"We are still verifying what is a false alarm or an actual concern, and the investigation may take some time. Even if this proves to be nothing, we strongly recommend additional funds and manpower be appointed to increase security and counter-espionage."\n\n"Granted, keep digging and keep quiet, I want this over with as soon as possible.""
 brazil.600.a: ""If you find a hole, plug it up. By any means necessary.""
 
 brazil.601.t: "Loose Lips"
 brazil.601.desc: "BRAZILIAN NUCLEAR PROGRAM: EXPOSED!\n\nNUCLEAR SECRETS STOLEN AND BURNED BY ARGENTINE SPIES\n\n(UN)INTELLIGENT AGENTS LOSE NUCLEAR SECRETS\n\nAcross both Argentina and Brazil, citizens wake up to find tabloid newspapers with such titles and more, all describing the same thing: Brazil had been conducting a secretive nuclear program, and operatives from Argentina not only infiltrated the project, but managed to steal and destroy critical information from the atomic staff before running back to their home country. The story has sparked outrage across Brazilian society: citizens and politicians alike have condemned the current administration, and many are demanding sweeping resignations.\n\nIn the short term, public trust in the government has hit new lows, and the Senado is making a bipartisan effort to investigate how this could have happened with an official inquiry. In the long term, the nuclear program has suffered a more severe setback than anticipated. It may take years to recover what was lost, and all that hard work that went into it is now somewhere in Argentina.\n\nOutside of Argentina, which viciously mocks our situation, we have not yet seen official statements from other nations. On the other hand, their embassies have been calling us all morning. They sound, ah, rather upset."
 brazil.601.a: "Now, now, gentlemen. Let's all try to remain calm and reasonable."

 brazil.602.t: "The Program, Revealed."
 brazil.602.desc: "It was all the President could do to contain himself as the figures assembled across from him delivered their reports. Diplomatic, military, intelligence, civilian, regardless of department the news was grim.\n\nFor the leak of information on the nuclear program was not just a disaster. It was a catastrophe.\n\nInternational condemnation was universal, of course. Most vehemently, and hypocritically, from those same countries who had pursued the bomb in secret themselves. But the thirteenth commandment - 'Thou shalt not get caught' - had been broken, and the payment was due. Almost every international deal or agreement Brazil had was now in tatters, and the cost had not even begun to be tabulated.\n\nIt was not even still certain if the Program could be maintained, or if it would be destroyed by the spotlight it now found itself in. It would need to be purged in any case in order to find the source of the leak, and that would destroy not only institutional knowledge, but morale besides. Worse still, the Argentine success would galvanize their own still-secret program, the stolen information solving several hurdles they had not yet been able to overcome.\n\nIt was a dark day for Brazil, indeed."
 brazil.602.a: "A way forward must be found."
 BRA_nuclear_security_leak_tt: "Our careless handling of the secrecy of our project has led to disaster, §DArgentina§! is furious and all of our supporters have pulled their aid from our program. §RWe will have to lay low for a while now...§!\n\n§!Our §YNuclear Progress§! will §Rdecrease§! by §Y30%§!§!."

 brazil.603.t: "The Luso Titan"
 brazil.603.desc: "Money is Power\n\nNever had there been a refrain so thoroughly despised for being so eminently true. Regardless of national ideal or regional polity, commerce and economics are impossible to divorce from the fortune of one's people. Too often, the so-called 'victim nations' of South America have been trampled over for the countenance of others, even long after throwing off the yoke of European imperialism.\n\nFor the nation of Brazil, that austere, cosmopolitan melting pot at the foot of the Amazon, not only was this not true anymore, but quite the opposite; After generations of national development, economic improvement and fiscal safeguarding, Brazil sits on the cusp of achieving a status in the world once thought to be unattainable.\n\nWhile initial observations are maintaining a healthy skepticism even in Brazil, analysis and projections seem to confirm It's ascendence as a global superpower in the making. Between successful fiscal and trade policies by the government and a steady progress in economic growth, Brazil has achieved the status of the 4th World Economy. Where the Lusophone nation once fought regional trade wars with Bolivia, Chile and Argentina, now Brazil was on track to rival the economic spheres of the Third Reich, The Empire of Japan and even the United States of America.\n\nNaturally, the machinations of the Cold War are going to worm their way into these processes at some point, but now Brazil was no longer just a pawn; With enough economic weight to firmly assert itself against the mercurial impulses of Europe, Asia and North America, Brazilian interests had to be considered as a matter of fact, not discarded as a matter of course. For the first time since the fall of the Spanish Empire, South America now hosted a true titan among nations, willing and able and soon to be poised to stand toe to toe with the mightiest countries in the world."
 brazil.603.a: "E aqui, finalmente, chega o progresso."
 brazil.603_tt: "§GBrazil§! is now the fourth largest economy in the world!"
 
 brazil.604.t: "Fine Dining"
 brazil.604.desc: "The glittering lights of São Paulo spread past the horizon, as two FIESP brokers clinked champagne flutes and took sips that were worth around ten cruzeiros each. They ate their meals in silence, looking not at one another, but out toward the racing city beneath their private dining balcony. To all the drivers heading home from work or to all the young couples strolling down the sidewalk and admiring the city, it was just another evening.\n\nTo the pair of brokers, it was a damned miracle. One of the brokers turned from the city back toward the table. A newspaper sat next to their lobsters. In huge bold text: "BRAZIL SKYROCKETS TO FIFTH PLACE!" alongside an image of a grinning President and his finance minister. The broker sighed contentedly, and sipped another ten cruzeiros.\n\nThe odds were tremendous. Corruption was like a ball and chain on Brazil's ankle, with many businessmen rather seeing their cronies and themselves be enriched over their country. Still, those were overcome. For the first time in years, the future of the Brazilian economy seemed bright. The two brokers clinked their flutes again."
 brazil.604.a: "Another ten cruzeiros."
 brazil.604_tt: "§GBrazil§! is now the fifth largest economy in the world!"
 
 brazil.605.t: "A Fulcrum to the South"
 brazil.605.desc: "The office of the President of the Central Bank of Brazil could have belonged to an emperor, with delicately carved wooden panelling and embroidered velvet curtains harkening back to the era of Pedro. Racks of wine, cases of cigars, a golden chandelier, lush carpeting, and imported furniture from just about all over the world... although he suspected he might consider buying locally in the future.\n\nA television sat on a polished wood desk, one that retold a colorful story despite the grainy black and white imagery: "..and with that, experts conclude that Brazil's recent economic growth and expansion may well rank among the greatest national success stories of the modern age, rapidly surpassing regional players and on track to surpass Mexico."\n\nTo even consider what the news broadcast was saying, even a couple of years ago, could not have sounded more alien if it was literally being broadcast from the moon by the ghost of Herr Hitler. The president allowed a smile to coil around his mouth, he stood from his wing-backed leather chair and walked to the window, admiring the white Carrara marble columns and bespoke stonework of the Amortization Office Building as he sat down on the windowsill.\n\nChrist Alive, what else could be said that hadn't been already? What did the world used to see in Brazil, if not a third-rate backwater in the middle of the rainforest? How had Brazil been a feudalistic society at the foot of the Amazon only a generation ago, only to overcome the inequities of its history and reemerge as the economic power player in South America?\n\nThat ridiculous grin was still on his face when got up to grab a drink from his liquor cabinet, well-aware of his own smugness and too giddy to care as he poured an iced glass of brandy and sat back down on the windowsill; Let it never be said that Brazilians were anything but industrious, now that their contribution could no longer denied. Soon enough, South America's largest and most populous nation was to take to the world's stage, daring to stand as equals among giants."
 brazil.605.a: "Money talks, nations listen."
 brazil.605_tt: "§GBrazil§! is now the sixth largest economy in the world!"
 
 brazil.606.t: "Thieves, Madmen, and Other Kinds of Politicians"
 brazil.606.desc: "Mogi-Guaçu was buzzing with activity. The city was excited to learn that the two Presidential candidates were expected to visit in two days, just missing each other. The city was full of proud Paulistas, and Adhemar's supporters were numerous. However, his critics were also present, and Janistas from all around were gathering in force to support Quadros.\n\nThe PSP candidate would arrive in the city first, and Adhemar's signature smile and aggressive gestures quickly whipped his supporters up enthusiastically. "Among the many works I've done in São Paulo is the hospital for the insane. Unfortunately, it wasn't possible to hospitalise everyone. One of these madmen had escaped and will be holding a rally in this very square tomorrow." Laughter consumed the crowd, and Adhemar continued his speeches with a broader grin.\n\nThe next day, Jânio Quadros visited the same square armed with charming laughter and his broom campaign symbols. A Janista quickly informed of yesterday's events, to which he replied "When I was governor of São Paulo, I built several penitentiaries, but it wasn't possible to lock up all the thieves. One escaped and held a rally right here in this square yesterday." The crowd responded with thunderous applause."
 brazil.606.a: "Hell of an election year, huh?"
 
 brazil.607.t: "Start as You Mean to Go On"
 brazil.607.desc: "The old church that stood on the eastern edge of São Bento do Sapucaí had never been busier, and it was all for the presence of one man among the dozens in the pews. He said no homily, made no fuss. But as mass concluded and the priest said "ite, missa est", his congregation exited with urgency. Outside stood another pulpit, one facing outwards towards the street, where ringed by flash photography, chairs for the congregation and truncheon-armed police stood that one man.\n\n"My friends, brothers and sisters in Christ," said Plínio Salgado once the crowd arrived, "I first served this state as a deputy in 1932. In that time I have fought against the general degradation of the Brazilian spirit. But nearly four decades since, I have seen no change. Indeed, the moral destitution of Rio and the economic ineptitude of Brasília have only grown since then." He closed his eyes and bowed his head, as if bearing a great weight. Flares of light went off in the crowd, bathing him in attention and grace.\n\n"I have heard the nation cry out for spiritual renewal. I have heard it call for a leader of moral and spiritual integrity. And I can no longer deny these calls. For even in my time among the Iberians, I felt the pain of this country like an arrow in my heart." He pounded his chest with a closed fist, and the dull thud echoed through the speakers.\n\nThe rest of his speech was, to the surprise of his audience, less bombastic than expected. He had even resisted the urge to scream "anauê" at the end, though it nagged at him like a knife in his side. Once it was concluded, Salgado bid the crowd farewell and left in a sedan. The press raced towards whatever public phones this town had to spare, but to their shock their news desks had already heard. The PRP had sent copies of the speech to every major agency in Brazil just before the speech itself, with an addendum underneath his words."
 brazil.607.a: "It said that Plínio Salgado would be their candidate for President in 1970."
 
 brazil.608.t: "Prepare the Way for the Lord"
 brazil.608.desc: ""My brothers in Christ, Anauê. I am speaking to you from a generous patron's home in Iberia..."\n\nVítor let out a long sigh upon seeing his assigned street already plastered with election material. UDN posters covered the plasterboard facade of a construction site; PTB and PSP fought for real estate along a brick wall covering half the length of the street. Vítor walked that length twice until he found a space for his poster; he found a chair in the alley to stand on as he fastened it to the wall. Another ninety-nine to go.\n\n"...though I remain in exile, I still live within the nation of Brazil in my heart..."\n\nOsmar blinked. He felt something round clip his ear. He turned to track its journey, where an egg with off-yellow yoke had met a telephone box. Then he and every other eye turned to its origin: a sneering young man—maybe twenty, with a PTB pin on his lapel—denounced him as a fascist. The rest of the crowd were much more supportive, and the police closed ranks around Osmar, protecting the candidate from further harm. One of that crowd broke ranks, pursued the young protester off the street. A general call for calm, then the campaign resumed.\n\n"...our battlefield is not for the palace, but at the roots of politics, among the Deputies and even the lowest councillors..."\n\nElza's eyes scanned the study group for any kind of sympathetic gaze. Poliane had ceased talking about the Bible for ten minutes and counting, electing instead to speak on more temporal matters. She was proud of her contributions to the PRP. She was not content to study scripture; she wanted to live it, and in the new movement to unite the nation she found her expression of Christian ideals. Elza found no sympathetic gaze; nobody spoke out, whether in agreement or fear."
 brazil.608.a: ""...and by God's grace, in five years one of our own shall stand against the degenerates.""

 brazil.609.t: "Tape No. 102/3"
 brazil.609.desc: "RECORDING BEGINS\n\nGORDON: "Mr. President, I believe this is a matter of extreme importance to national security, the actions of Goulart will lead Brazil down a path of no return. He is a fascist, not too dissimilar to Perón and when he's gone..."\n\nLEMAY: "Gordon, why would this be of such importance to us? The missile gap is still growing and worrying about a third-world nation like Brazil would take too many resources."\n\nGORDON: "When he is gone, either the Nazis with Müller or the commies with Brizola will take power. That is why Brazil is so important to us. Think of the Dominican Republic, Mr. President! Nazis could get a new stepping stone into the Caribbean. Besides, the Brazilian military is more loyal to us than to their own government."\n\nLEMAY: "Interesting, if the military truly does rise up against that fascist then we'll supply a carrier fleet. Understood?"\n\nGORDON: "Yes, sir."\n\nRECORDING ENDS"
 brazil.609.a: "The Varguist dream hangs on by a thread."
 
 brazil.610.t: "Year Eight"
 brazil.610.desc: "There were many adjectives used to describe Ernesto Beckmann Geisel, a general in the Brazilian armed forces and freshly appointed head of the Military House. Solemn, some called him; others thought of him as being strict. Those that knew his ethnic origins referred to him as disciplined. Those he had crossed swore or made the usual stereotypical insinuations.\n\nBut on one specific anniversary every year since 1957, there was no better phrase to describe Ernesto Geisel with than "a man broken". Eight years ago, Geisel's son had died in a train accident; since then, almost exactly to the minute during which the doctors pronounced his son dead, Geisel would lock himself in his room to remember him.\n\nBy now Lucy, his wife, and Amália Lucy, his daughter, had concepts of the standard operating procedure. They would stand outside the room and do what little they could to sympathize with their grieving husband and father from beyond the closed door. After half an hour, Amália Lucy, with a dexterity belied by her scholarly bearing, would prise the door open with an Allen wrench and let her mother in.\n\nGeisel would look up and make a piteous grunt. Lucy's response was to help him push forward: "See here, it's going to be fine, Ernesto. You know it's a terrible day for all three of us. Let's at least go pay him a visit so he knows we remember him."\n\nGeisel would acquiesce, and the three of them would walk to the cemetery. When there, Geisel would kneel down while his wife and daughter got themselves situated. Then he began to speak:"
 brazil.610.a: ""It's your mother and father—Amália too. We're here.""
 
 brazil.611.t: "The PSP Chooses Vargas Jr. as Their Candidate!"
 brazil.611.desc: "The streets of São Paulo today witnessed crowds of PSP supporters chanting and rallying for that party's newly-announced presidential candidate, Getúlio Sarmanho Vargas - known commonly as Vargas Jr. Addressing the crowd of supporters in person, flanked by political ally Laudo Natel, Vargas Jr. spoke on his vision to build a better Brazil for the average Brazilian and vowed to get away from so-called 'petty politics.'\n\nThe PSP seems to be entering the upcoming election with a sense of energy and determination, perhaps even an expectation of victory - a far cry from the somewhat marginal position the party held only a decade ago. After coming to power under Adhemar de Barros' leadership in 1965, the party is clearly interested in taking the next step and remaining the incumbent party in power. For his part, Vargas Jr. has been a member of the party since 1949, and later became Governor of São Paulo when PSP entered government. In running for president, he carries with him the legacy of both Adhemar and, of course, his father - two men who profoundly impacted the landscape of Brazilian politics.\n\nTime will tell if Vargas Jr. is able to live up to those legacies and whether the PSP's political fortune will continue, but for the latter question at least, the answer is likely positive."
 brazil.611.a: "Now for the sports..."
 
 brazil.612.t: "The PSP Fields No Candidate for 1970!"
 brazil.612.desc: "In political news, the PSP made a radio announcement earlier today that they would not be standing or endorsing a candidate for the upcoming presidential election.\n\nThis news has raised eyebrows across the political scene, but some analysts have pointed out that with the passing of long-time party leader Adhemar de Barros, the controversial and scandal-plagued party lacks a unifying figure to rally behind.\n\nRocked by crisis after crisis since 1965, the perennial party in opposition evidently lacks the strength to raise another presidential campaign. A few PSP members across the country have independently declared their intentions to run under the party banner, but these campaigns cannot count on official endorsement and funding, and their chances for success are marginal as a result."
 brazil.612.a: "Now for the sports..."
 
 brazil.613.t: "The PTB-PSD Coalition Collapses Before Elections!"
 brazil.613.desc: "The turn of the decade has brought a host of uncertainty to Brazil, with its political scene as chaotic as ever and skyrocketing oil prices threatening to upset the uneasy balance. The elections of 1970 have taken on a heightened importance in light of these developments, and the center-left bloc represented by the left-wing PTB and liberal PSD parties have tried their best to build a unified coalition to carry them to victory in the polls. Unfortunately, it seems that even a long-standing political alliance such as that of the PTB-PSD can succumb to petty political bickering.\n\nChaos has rocked the PTB-PSD conference, as tempers flared during their search for a candidate that both parties could rally behind. The PSD put forward Tancredo Neves to represent their moderate line, but this immediately caused friction with their counterparts in the PTB, who remained steadfast in their decision to support the nomination of Leonel Brizola. In the end, the markedly radical pivot proposed by Brizola and his supporters proved too much for the PSD hardliners to reconcile, and despite a hail mary attempt by Kubitschek to force a compromise, the conference eventually ended in frustration and indecision.\n\nNow, as the new decade arrives, the PTB and PSD stand alone for the first time in twenty years, with both parties promoting their own, separate candidates in opposition to one another."
 brazil.613.a: "Uncertain times indeed."
 
 brazil.614.t: "A Prince's Ascension"
 brazil.614.desc: "A 1952 Rolls-Royce glimmered with the balmy sheen of the January sun, flanked by a phalanx of the Independence Dragoons as innumerable throngs of citizens filled the air with cheers. Such was the nature of the day's celebrations; millions across Brazil would soon witness the inauguration of Getúlio Vargas Jr., be it in person or via televised broadcast, marking the second time in Brazilian history that a Vargas would ascend to the presidency. For some, it was history's ultimate vindication; the prodigal son would finally bear his father's torch, one of untold greatness and potential. For others, the Planalto would bear yet another Vargas upon the throne; whether it could support such a weight was muddied by doubt and cynicism.\n\nAs the presidential car approached the National Congress, Vargas could already see the Three Powers Plaza encompassing much of its eastern outskirts. Tens of thousands had gathered to witness such a historical moment in Brazil's history; their cheers intensified upon sight of his waving hand, reaching out from the window of the Rolls-Royce. Their jubilance would have to wait, however; the inauguration itself would occur within the halls of the Palace of Congress, witnessed by both houses of Brazil's legislature.\n\nThe ceremony held an almost tragic air for the assembled representatives, at least within the PSP's camp and its associated pundits. Adhemar's death had impacted them all, no more than Vargas Jr. himself, and it would be some time until the party could leave the near-behemoth shadow that Adhemar had left behind. Yet, who else could eclipse such a legacy than that of the Ascendant Son himself? This was the crowning moment for Varguists across Brazil, whilst vindicating the fears of others for another Estado Novo to come. For most, however, there was security in his continuance of the old stylings and hope in his embrace of a new age for Brazil. With compassion and resolve, who knew what heights Brazil might soon reach?"
 brazil.614.a: "Old meets new; a reflection of the times."
 
 brazil.615.t: "Shopping at Sun City"
 brazil.615.desc: "A man in black stepped out of a plane from Brazil, and stepped into a car Cape Town headed to a government building for government business. There was none of diplomatic flourish he was used to — he wouldn't even say his name — as this was a strictly clandestine operation. The car stopped, and he met his contact.\n\n"This way, please." They moved through to the backrooms. The Brazilian couldn't help but scoff at the monochrome nature of the staff, a striking contrast to his society, as he hoped the South Africans could eventually move past race too. A dull conference room was their destination, as the door close behind them. "So, you wanted to discuss Namibia, correct?"\n\n"We are aware that this... territory, of yours..." He made sure to choose his words carefully, lest any accidental offence jeopardized the deal. "...contains significant quantities of uranium deposits. These would be of significant value to the Brazilian governments if an agreement could be made purchase some of the contents, ideally, a private trade."\n\n"I see." The South African considered the statement for a moment that felt like an eternity, before responding. "There is an urgent need for investment into South Africa; the war did a right number on us, and the economy is in a dire state as a result. If you could help us in this regard, I don't see why we couldn't part ways with some uranium at a cheap price."\n\nJackpot. "Yes, I think the Brazilian government will find these terms to be very acceptable. Maybe, we'll take a short break, and then iron out the details?" An affirmative nod came, before they adjourned the meeting."
 brazil.615.a: "The South Africans aren't all bad."
 
 brazil.616.t: "Open Wide, O Earth"
 brazil.616.desc: "The pickaxe throbbed against the rock wall in sync with Caio's aches against his head, sweat rolling down his eyes as he kept on with the same robotic motions. His work was in the middle of nowhere, doing God only knows what, for God only knows who. But... it paid well, well enough to rear a family. He also had to admit that his colleagues could talk the talk.\n\n"My brother told me we are mining gold. Apparently, the government knows the economy is going to collapse, and wants to hedge its bets."\n\n"How do you know it's the government? How could they even afford our salaries? They picked me off the streets from a rubber factory to make five times the salary; no government I know does that!"\n\n"Yeah, but what for? I swear they have robots to do this work these days. Hey, I wonder if that's what we are mining stuff for."\n\n"I hope they get a robot to replace you."\n\n"I have charm coming out of my ass, ain't no robot that can replace that..."\n\nTen metres. That was the distance Hélio kept from the mine at a minimum. The government paid him to supervise it, not stick his head in the uranium pit, not like those poor souls. Whatever, they got their money, and they got to serve their country. It's for order, for progress, for Brazil. And still, he stared at his ceiling in bed, thinking about the miners and their lost lives."
 brazil.616.a: "A bright future of headaches, kidney failures, and perhaps, nuclear war."
 
 brazil.617.t: "East vs. West"
 brazil.617.desc: "Officially, the most important matters of commerce followed a strict timetable of checks and balances before being decided at a final meeting. Unofficially, countless decisions of national importance found themselves being made in the in-between moments at water coolers, as two of Brazil's most eminent financial mandarins discussing uranium could attest to.\n\n"Rafael, I'm still not entirely sure why this needs to be a conversation. I mean, we both read the memo, so we know we need uranium urgently, and we already know where to get it." His voice was resigned, like someone going through the motions before retirement, an old civil service hand.\n\n"If it were up to you, Paulo, we would still be investing in faster horses instead of automobiles. I agree that our mines can't meet our current demands presently, but I don't see how Canada will either." Paulo regarded Rafael and his pencil face with disappointment at times like this, for in his view, Rafael was a man who read too many books and talked to too few people.\n\n"So, you think we should trade with China instead? Apart from the obvious — that being it is a puppet of a fascist superpower — how do you expect such a weak country to be able to even supply enough to fulfill our demands?"\n\n"Unlike you, I believe that things happen, and I am also aware that China is an economy on the rise. Canada has hit its peak, so we should use this opportunity to go with someone who is in the middle of modernization and on their way to the top of the world stage. Put simply, we can do a lot better than Canada, and that's China."\n\nAs much as Paulo hated to admit it, Rafael's infectious rhetoric was getting to him and starting to change his mind. However, he could still rein him in, and he might need to be reined in after he implied he was old..."
 brazil.617.a: ""I oughta kick your ass; we're going with Canada, end of.""
 
 brazil.618.t: "Uncertain Dawn"
 brazil.618.desc: "In the jungle, they worked on a site to drop nuclear bombs on.\n\nNo one knew what the men and women working in southern Pará knew that they were working towards, even if they knew they were working on expanding the Campo de Provas Brigadeiro Velloso, and even if fewer of them knew they were expanding the site so they could drop nuclear bombs onto it.\n\nThe majority of workers could barely read, let alone comprehend the ramifications of the work that was being done; it might have been easier that way. For twelve hours a day, they tore down flora and replaced it with concrete, breaking only when their bodies could not go on.\n\nSometimes, these breaks were permanent. A laborer takes a microsleep at the wrong moment and falls headfirst into a cement mixer, unaware of what's happening until it all goes black. In these cases, a letter was sent to their family, assuming one could be found. They gave loved ones a scant few lines, a paycheck, and a warning not to press for more information.\n\nThere were those above them too, watching the work progress with rapt enthusiasm, imagining wondrous images of what was to come. These pictures always involved bombs and machines, but not people, never people. This machine would move past the need for people, the need for politicians to win a war.\n\nAnd when the day ended, they all went home, and they went to see their wives, husbands, lovers, and children. They thought of their futures, of long, lazy days in retirement, and of their grandchildren visiting them. Then, they slept, and they thought of the future they were working towards."
 brazil.618.a: "And then they could not sleep any longer."
 
 brazil.619.t: "An Introduction to the End of the World"
 brazil.619.desc: "The whirlybird touched down onto asphalt, and out stepped President [BRA.GetLeader], gracing the distant land of Campo de Provas Brigadeiro Velloso. The welcoming committee greeted their leader with smiles and adoration, alongside the usual chest-beating from the military, eager to show off like gorillas in a zoo.\n\n"It's an honor to have you here." They began the typical walk and talk common for Presidential visits. "We've been doing fantastic work, stuff that will go down in history." [BRA.GetLeader] looked around [BRA.GetLeader.GetHerHim], scenes of industry, the whirring of machines to make war. "I can assure you that we are well on track to finish this project and deliver fire to the Brazilians."\n\nThe President gave a famous smile, one that would usually look more at home on the front cover of Manchete, but the scientist adopted a more curious pose. "Tell me, just between us, what do they say about us? I know my colleagues in these places — America, Australia, and the like — talk only of its dangers, yet so many of these countries pursue their own nuclear goals."\n\n"Do they fear us? Have we brought the eyes of the superpowers upon us?\n\nThe wind was taken out of the President's sails, as a rebuttal was slowly formed. "It is just talk, like you said yourself. America would not go against us for this, but they have to look big and strong on the world stage. When we announce this, we'll see the usual bluster from all sides."\n\n"And then, nothing will happen."\n\nBut what if something did happen? The question lingered at the back of [BRA.GetLeader.GetHerHis] head, even if it went unstated by the scientist. What if it was the beginning of the end? A prelude to their destruction..."
 brazil.619.a: "...and [BRA.GetLeader.GetSheHe] could do nothing but smile and nod."
 
 brazil.620.t: "The End of the World"
 brazil.620.desc: "A new report neatly lay on [BRA.GetLeader]'s desk.\n\n"ON BRAZIL'S NUCLEAR DEVELOPMENT AND FUTURE CAPABILITIES"\n\n[BRA.GetLeader.GetSheHeCap] opened the report and read further.\n\n"We have developed a FOUR MEGATON NUCLEAR DEVICE, on par with the superpowers..."\n\nThe report was skimmed through, the science evading the President.\n\n"...final preparations are underway for a test in PARÁ."\n\nFor only Brazil will know for now.\n\n"...if this device were detonated in BUENOS AIRES, casualties are predicted to reach TWO MILLION..."\n\nIt all made [BRA.GetLeader.GetHerHim] giddy, easing previous anxieties with the promise of legacy.\n\n"...RADIOACTIVE FALLOUT will kill at least 15% of survivors. The resulting DEHYDRATION and STARVATION will have a similar impact..."\n\nIt wasn't like they would ever use this weapon; it was just a deterrent.\n\n"...URUGUAY will be subject to FALLOUT. This is a necessary sacrifice..."\n\nGod was on their side; Brazil will win.\n\n"...a direct hit would leave the TARGET uninhabitable for a hundred years...""
 brazil.620.a: "Prometheus gave fire to Earth... and [BRA.GetLeader] gave fire to Brazil."
 
 brazil.621.t: "Part of Me"
 brazil.621.desc: "The Presidential sash slipped over her contours elegantly; it was always meant for her. The newspapers will report that it was given to her, but the truth was that she fought for it every day of her life.\n\nShe was always the President's daughter to them. They thought her being put on the Vice-Presidential ticket was wanting to break history with a woman, taking advantage of her father's popularity, and anything bar acknowledging her own talents as a politician — the talents which saw her win.\n\nThen, there was an Adhemar. Even today, she didn't know what she really felt about the man. He was utterly corrupt, contorting measures for social justice with vote-buying populism, and a regressive fossil. Yet, Edna could not help but feel he truly cared about Brazil's vulnerable and tried to do right by them, in his own way.\n\nHe stole, but he delivered, when so many others either did the former or nothing at all.\n\nAnd then, he died, and she was the President. She inherited his machine and had to turn it into something progressive, something that could create real change that would last past the elections. Enda felt she accomplished this goal, even if she only had a year. But now, she was given more time and a popular mandate of her own.\n\nThere was a future, ripe with promises of progress, and waiting for Brazil to embrace it. Not everybody would be willing to embrace it, but that's why she had her talents... and Adhemar's talents.\n\nThat was his legacy to her, a parting gift from the bull. Politics had proven to be the dirtiest business of all, and if she had to embrace that to change it, so be it."
 brazil.621.a: "An unwanted gift, yet, a gift that should not be thrown away."

 brazil.1202.t: "Hole in the Wall"
 brazil.1202.desc: ""Brigadier-General," said Castelo, holding up a glass of beer. "The title suits you."\n\n"Suited you better," said Brigadier-General Fernando Bethlem, raising his glass up to his mouth. Down went half its contents. "Christ, Castelo, what's this swill?"\n\n"It's about the atmosphere, Fernando. My home away from home." Bethlem could not quite understand it. The bar itself was a dive off a main road, a shoebox fit into a hole in the side of a brick building. It barely fit five people and a bartender. But Castelo liked the closeness; it was like a warm blanket, tucked in tight.\n\n"Tell me you're not planning to live here?"\n\n"God, no. No, I'm going back home. I'm an old man, and I'm tired of Amazonas. That's your problem now." Castelo finished off his glass, tapped the tabletop to call for another round. He still didn't entirely know what to think of Bethlem. A bit high-strung, overzealous at times, but undeniably better than any of the cockroaches that surrounded Lott. Part of Bethlem reminded Castelo of his younger self—and then grievances rose into the surface of his mind.\n\nHe served valiantly, and yet he was still condemned to exile in Amazonas. Lott's meddling ensured that his career was spent stewing in bitterness, a war hero relegated to garrison duties. He'd so desperately wanted other postings—the South African War passed him by precisely because he was stuck babysitting—that only a tragedy calmed him down in these final years. Recalling her face, Castelo grew quiet. He stared into the foamy cloud atop his glass; his mind drew her face into that blank canvas. Bethlem could see in his friend's gaze that pain, and decided to distract him. He looked up and tapped on the tabletop."
 brazil.1202.a: ""Break out the heavy stuff, barkeep!""

 brazil.1203.t: "Flute Concerto No. 4 in G Major"
 brazil.1203.desc: "Every morning, at the crack of dawn, one can stand at the foot of a hill on which this modest villa rests and hear the sound of a flute. It is a lonely whistle in the hills, at odds with the serenity of the nature around it, but beautiful in its own way. Ask the locals about it, and they'll let out a knowing chuckle: "oh, that's just old Costa again."\n\nGeneral Costa, keen to remind anyone of his title, sets down the flute. From his east-facing balcony he greets the sun, beckoning it to rise from the horizon through with an oft-improvised tune. As an orange haze covers the hillside and the villa, the old man's rough fingers flit between the holes in the wood, and his breath echoes through the flute and along the land; the sun rises to this private concert.\n\nHe was once a general of some notability, said the locals. Four stars once adorned his shoulders, and at the height of his power he commanded ten thousand men in the Northeast. Politicians appreciated his keen insights, though they did not seek them out. It was this first injustice, this slighted sense of detachment, that amplified when Goulart arrived. Oh, he tried to push back. He put his ten thousand men to work to restore some semblance of sanity to Brazil.\n\nFor his failed efforts, he lost his men. Brizola walked into his office, put on a show of sympathy and pity, and shoved him into a desk job. Three agonising years followed. They could not even be bothered to attend his retirement party; they sent an emissary, some pipsqueak from Rio, to hand over a letter whose signature Costa was sure was forged.\n\nIf he did not have the sun and his flute, bitterness might have hollowed him out entirely, reduced him to flesh and spite animated by visions of what might have been. But this ritual kept him grounded, and he came to accept his retirement with the clear vision of a man who can see the final lines in his book."
 brazil.1203.a: "Costa would not end his song on a discordant note."

 brazil.1204.t: "Last Day in the Office"
 brazil.1204.desc: "The secretarial pool insisted that they could pack things away on his behalf, but Jair Dantas Ribeiro was quite adamant that he handle this matter himself. "I don't have much," he told them, "and what I don't take, I won't need." They had at least done him the courtesy of setting aside two cardboard boxes tucked into a free corner of his office. After the ceremonial handshakes and farewells in the main hall, Ribeiro made his way here, to the office that was once his.\n\nHe opened up one of the boxes and began to put away that which he valued most. A black leather notebook, which he'd used to store his contacts and personal thoughts, encoded in a private cipher taught to him by friends in Intelligence, so many years ago. Framed photographs on the wall; the General with allies and mentors. He smiled as he took one of him and Lott down from the wall. Another picture caught his eye. It was a group of young men, twenty in total, with immaculate uniforms and stern faces that tried to hold back smiles. He saw himself there: older than the rest, but with a youthful vitality that seemed so distant now. Below read a placard: General Staff School, Class of 1931.\n\nHe thought about the other faces there; some had kept in touch with him, others diverged from the paths he walked. At least a few of them had already passed from this life. But they were so similar to each other: same backgrounds, similar families, often connected. Yet there he was, a kid who started from the slums and made it to the highest posts in the Brazilian army.\n\nHis smile entrenched, he packed the photo away. Sure, his career had its ebbs and flows. He'd spent a fair amount of it in effective exile, and he knew that his removal would clear the way for other officers less zealous in the prosecution of leftist agitators than he was. But as he packed away the rest of his personal effects, Ribeiro found he had no regrets. He had served Brazil diligently, and he was happy to find some rest in his beloved Northeast."
 brazil.1204.a: "But he did regret not taking some assistance in bringing these boxes to his car."

 brazil.1205.t: "Transfer of Power"
 brazil.1205.desc: ""...with the highest respect from both the army and the nation, we congratulate General Peri Bevilacqua for his service. General Bevilacqua, if you would please rise?"\n\nHe hoped he could wipe the sneer from his face; fortunately, it was not visible as he rose from his seat to approach the podium and shake the Chief of Staff's hand. His grip was firm; he knew no other way. It was a steady confidence in his position, a certainty in his beliefs that had served him well for his career. The Chief of Staff took his hand and gripped it tight as well. Then he took his seat at the other side of the Chief, where a less appreciated figure sat behind him.\n\nGeneral Walter Pires de Carvalho was here for a different reason; while Bevilacqua's career was ending, his was ascending. He had been given the promotion to fill the gap left by Bevilacqua's retirement, and the departing general had made his displeasure clear. He had been a staunch legalist, a stalwart enemy of communism, and above all an admirer of Lott's efforts to keep the army disciplined. De Carvalho, in his eyes, had never shaken off the treachery that clung to him like a tick. He still recalled de Carvalho's lack of support for Lott in 1955, and had never forgiven him, nor any of the generals who stood aside in that year.\n\nIf the contempt was reciprocated, de Carvalho did not show it. Bevilacqua's sneer crept up on his face the moment he laid eyes on his replacement; de Carvalho's eyes stared straight ahead into the crowd, denying Bevilacqua a mirror that might justify his hatred. He sat down, and let the rest of the proceedings wash over him. Time and a lack of de Carvalho in his vision softened Bevilacqua's sour mood. He had, at least, done his job: he had defended the republic, and he could now enjoy his retirement."
 brazil.1205.a: "He trusted that the other young generals around him weren't as treasonous."

 brazil.1206.t: "The Great Christian Defender of Brazil"
 brazil.1206.desc: "Antônio Carlos da Silva Murici had experienced many long lives after his time in the army, spanning before the oligarchy's destruction. Now, it was time for the old Sorbonnite to sit down as a new generation of military men took over. Today, the man succeeding him would be the newly appointed general, Ednardo D'Ávila Mello, an interesting character to listen to...\n\n"I thank you all today for giving me this opportunity to serve our beloved country in its most important area. I don't think I need to tell any of the wise and fine men standing before me how important the military is to protect our glorious nation, as we have seen before in the fight to protect Christian values." Murici did his best to stifle a laugh as the new General continued.\n\n"First, it was the communism of the Soviet Union that proved to be our biggest and most overt threat, threatening to destroy our order and progress in the name of a crazed dogma. Then came Nazism, which with its dawn as a superpower, uprooted communism's mantle as the oppressor of Eastern Europe for itself."\n\n"Neither of these evils should be underestimated. While Nazism still looms large, the specter of communism continues to haunt us domestically. Of course, with the valued guidance of the army, such evils will never take over our beautiful nation.\n\n"As I stand here today and become another one of these defenders, I feel pride. I swear to you all that I will never forsake these duties passed on to me. Thank you all." Hands thundered together as the other generals cheered for their new man, a perfect fit. Murici politely smiled and shook his hand before stepping out of the public eye forever."
 brazil.1206.a: "What an... interesting speech."

 brazil.1207.t: "Anything for My Country"
 brazil.1207.desc: "In the barracks of the 36th Parachute Military Police platoon, in the small mess hall as soldiers ran outside as two men sat at a table together. Sílvio Frota and newly promoted General Newton Cruz. They had been friends for years, with letters exchanged and meetings over the years. They had been chatting for a while but without mentioning the promotion, until the conversation meandered towards it.\n\n"I'm still surprised." Frota said.\n\n"Surprised?" Cruz replied with his words dripping with a smug self assuredness.\n\n"That you were able to reach this rank, you're one of the best soldiers we have, but we both know just how many enemies you have."\n\n"I have enemies, but a man without any enemies is a man without convictions, empty and soulless. All we had to do was wait for our enemies to pass onto some other inane squabble in the Senate, they're unruly, unfit, un-Brazilian. I just had to bide my time, hold my tongue and show my mettle and they'd eventually see fit to grant me the rank I deserve."\n\n"Well now you're here, your new commission, what do you intend to do with it?"\n\n"Serve my country, Sílvio, anything for my country. I will continue to protect and continue to serve and if any of that rabble reaches a position to threaten my country then I will ensure the threat is removed.""
 brazil.1207.a: "It's good to know we're on the same page General."

 brazil.1300.t: "Spectrums of Vargas"
 brazil.1300.desc: ""It's all a bunch of damn nonsense," spat out Adhemar de Barros, ripping open the doors to his office as Laudo Natel tailed uneasily. "I lose the presidency, and to Brizola of all people?!" A scoff escapes his lips, looking to Natel with an incredulous expression. "That lightweight of a Varguist thinks he can take up the torch? That simpleton? He's barely a Varguist at that, that's for certain!" In a brief fit of anger, he swiped a pen from his desk, thumping against the carpet below. "Communist freak!"\n\nNatel sighed with impatience. "It seems we've... miscalculated just how endearing Brizola has proven himself to the working class. This would be a good time to—"\n\n"What we need to do," Adhemar interrupted, "is find a way to disrupt this wrecker-in-making! Scrounge up whatever dirt we haven't yet released on the PTB; I want them all thrown into the dustbin! Throw Brizola, throw Lott, throw out the whole damn bunch! The amount of damage he'll do to my legacy—"\n\n"Adhemar!" Natel's shout rang momentarily through the office, severing the president's rantings by the bud as the two locked eyes with each other, burning with a rage that had been building for some time. Then, another sigh from Natel. "There is nothing we can do. Give him the sash; it will be better for everyone, including yourself, if we simply accept this new reality."\n\nHis eyes flickering with a brief solemnity, Adhemar turned away from Natel and towards his desk, stepping towards it. He glided his hand against its surface, where countless used to lie and innumerable drinks were shared by guests and himself alike. Biting the bottom half of his lip, he nodded silently. "It is over, then. We are finished." He looked up to Natel once more, narrowing his eyes. "I am finished.""
 brazil.1300.a: "Facing the music."
 
 brazil.1301.t: "Sunrise"
 brazil.1301.desc: "Dialling the number, Edna Lott did not expect her call to wait long. Her administration was only just beginning, but the transition period was still rough and intense. She needed all the help she could get, and all the support that could exist. Few other figures ranked in her mind nearly as highly as Ulysses Guimarães, himself shortly due to become Vice President. The phone rang once, then twice, before being interrupted by a familiar voice.\n\n"Hello, is this Edna?" it asked, affirming her hopes.\n\n"Yes, Ulysses, it is." she responded, smiling. "I know we last talked a few hours ago, but I just wanted to congratulate you on winning the last election. Only a few people have been Vice President, but none have deserved the post as much as you."\n\n"Why, thank you, but it would be wrong for me not to congratulate you as well." he replied, curtly. "Not many other people can boast to ascending this highly, especially among those of your gender."\n\nThe accolade wore, but only slightly. She was used to far worse from close political allies. "Of course. Things are going to occur rapidly from here, but we can't lose sight of our ambitions in the process."\n\n"I wouldn't expect anything else, Edna." He stayed silent for a moment, but she was happy to sit through the interruption. She knew better than to expect peace at this time. "We will seek to advance Brazil on the world stage, but we can't forget about its people."\n\n"Wise words, Ulysses, though I'm not surprised to hear them from you. I know that this is the path I need to make Brazil proud. To make a society in which my husband and daughter would have been proud to live in.""
 brazil.1301.a: "Morning will come."
 
 brazil.1302.t: "Dawn Breaks"
 brazil.1302.desc: "The view of the Padre de Gaveá were breathtaking, but not from the rolling hills below, lined with tarmac and concrete and surrounded by the view of low-rise buildings. In an open square lined with small, flowering bushes, two middle-aged women took a moment of reprise to talk to each other, relaxing away from the din of activity in front of them among visitors and tourists desperate to see every sight.\n\n"Did you hear that Edna Lott won the election?" asked one of the pair, Valquíria Lópes Ferreira, mostly rhetorically. Both had voted, and both followed politics enough to know.\n\n"Of course I did! Couldn't go a minute on the radio without them remarking on her victory." responded Eliana Miranda Alves, the taller and older of the pair. "I voted for her, and I've yet to regret it. Her victory will be one for all of Brazil to celebrate, and one for all of us to welcome."\n\nValquíria shook her head, but only meekly. "You know I couldn't agree with some of her policies, but I agree that her victory is an amazing day for us women." Brief unease with some of her allies in trade unions were overwhelmed by the significance that her moment provided. "If a woman can become President, then what position can't we be appointed to?"\n\nAlves nodded, her eyes briefly taken away as she watched a small commotion in front of her, hoping that her son wasn't involved. "And who knows? In five years, once her policies are all in place, maybe she'll have done well enough to convince you to finally vote for her."\n\nListening, Valquíria tried to voice her opposition, but had failed. Since Vargas, she had always voted to her right, for Kubitschek, for Lott and Lacerda, yet times were changing. The world that Adhemar had inherited, clearly, had broken apart, and for the better."
 brazil.1302.a: "If a woman could become President, perhaps one more could vote for the PTB."
 
 brazil.1303.t: "To The Victors..."
 brazil.1303.desc: "Adhemar was used to these meetings, to speaking with Edna on their upcoming plans, but never under this context. Discussions had always edged themselves closer to her victory in a future election, but so soon? Still, he welcomed her ascension. Few others had proven themselves under a fraction of the pressure she had, and fewer still had survived them. Adhemar was an old man; he knew that fact all too well.\n\n"I'm sure I'm not the only one, Edna, but I'd like to offer my congratulations to you." He remained silent for a second, remembering the five years that he had been in charge for, and the months that she had been. "I'm sure that I don't need to remind you of the demands this office takes on you."\n\nShe smiled politely. "Thank you, sir. I'm confident that I won't let your optimism down."\n\nAdhemar coughed, an impulse in old age tinged by a memory of the past. "You know, I have to thank you, really. It must have been hard to take responsibility for running this country when I was comatose, especially with how much traction those efforts to impeach you had."\n\nShe turned around slightly, but shrugged the prior concerns off. "It's no less severe than what I'll get in office. But, it was still good to gain experience to face them head-on, even if I wish they came in more auspicious circumstances." She shifted rightwards, and turned to face the door. "If I need any advice, I'll be happy to call you. I know few people as skilled and qualified as you."\n\nAs she left, his eyes turned back down. Most of the plans for the direct presidential transition were in place, but he had yet to formalise them, and few staff had been appointed. Bringing up a notebook, he began to draw out his itinerary, packed with bribes, for transition deadlines and dates expected to be met imminently."
 brazil.1303.a: "...go the spoils."
 
 brazil.1304.t: "Muitos Anos a Virar Frangos"
 brazil.1304.desc: "For once, the halls of the Chamber had fallen silent. Emptied of all but a few cleaners and the occasional contingent of staffers, Tancredo Neves could walk around its halls with little expectation of real confrontation, echoing footsteps reciprocated by those of Laudo Natel, fast approaching. Turning around, he greeted Natel, asking him about distant family members and personal affairs and moving through with relative speed.\n\n"Whilst I'm here, I wanted to congratulate you on this victory," spoke Natel, offering a hand to shake. "It takes a lot to rise to a position this important."\n\nNeves smiled, graciously. "Thank you, Laudo. I understand that the transition team is almost finished with the preparations for my government to ascend to power?" He left the question to linger for a minute, continuing only after a nod. "It'll be tough, but I've had enough experience to suit this."\n\n"I don't know about Adhemar, but I plan to spend a few days in Montevideo." responded Natel, nonchalantly. "But if you need any help, I'm sure that Adhemar would be happy to come to your aid."\n\nNeves' smile remained, but he shook his head slightly. "Thank you for the offer, Laudo. It's always good to have such a man by my side as a friend." He walked away for a second, beckoning Laudo to follow him.\n\n"We still have allies in the Chamber as well, as lax as some of them can be. If you need any help with passing bills, our doors are still open."\n\nTancredo stopped, nodding as he turned around. "Vargas may be gone, but his vision still lives on. Adhemar has done a lot for Brazil, but with five further years of prosperity, I will be proud knowing that I've been able to contribute to their dream.""
 brazil.1304.a: "The third patriarch is coronated."
 
 brazil.1305.t: "The End"
 brazil.1305.desc: "Adhemar stood in the center of his office with arms folded behind his back, appreciating how large the room had been those past five years. He had gotten used to it — sure — but now that it was slapped out of his hands, he found a new appreciation for the old office. That was human nature.\n\nDid he make Vargas proud? He would certainly like to think that he did. But history is a fickle thing. Today, he's the prophet of Vargas' ideals. In twenty years, he might be seen as a traitor to his cause. Still, in his soul, he knew that he did everything and more for the man and his ideals.\n\nWalking over to the office chair to which he was practically glued to for the past four years, Adhemar placed his hands on the leather, allowing his fingers to softly dig into the material. Letting out a long sigh, he let go, giving the headrest a firm slap as if to say farewell.\n\nWould Tancredo make Vargas proud? Adhemar understood the one simple truth: someone had to take over — they just had to. And between all those reaching for his throne, Tancredo was one of the better choices for the next president. In a way, he reminded Adhemar of himself. They both believed in the dream of Vargas for Brazil. Tancredo would just need to be the man to carry on the torch."
 brazil.1305.a: "Exit stage left."
 
 brazil.1306.t: "Like Grandfather, Like Grandson"
 brazil.1306.desc: "It was a warm day across the streets of Brasília, and for once, Tancredo Neves would walk in relative peace, the only marker of his reluctance to comment being a cap placed haphazardly over his head. Today was not a day for political planning, or personal aggrandisement; he simply wanted to spend time with his grandson, and to impress on him the significance of this moment.\n\n"I won't be able to do this much anymore Aécio, I'm afraid," warned Tancredo, his face muddled with sadness. "You don't get a lot of free time when you're President."\n\nAécio lagged behind slightly, but still made an effort to keep up. "Will this mean you won't be campaigning anymore?" he responded, with a slight frown. Tancredo knew that Aécio had been among those driven and flown across Brazil ten times over during the campaign, and that he had started growing tired of it a while ago.\n\n"Not for office, no, but I will be campaigning to pass bills." He wiped his brow. The day was warm, and he wondered how far away the shade was. "I'll be working to ensure that Brazil will become richer, and that I'll be able to respect the mandate given to me by the people."\n\n"I know you'll be able to do it, granddad." He could see so much of his younger self in Aécio, but not the political angle. Not yet, at least. He was an old man, but he still had enough life in him to see that through. "Here's hoping the UDN don't try to pull too many stunts."\n\nTancredo chuckled to himself. "No, I think they're going to have to work hard to do that, grandson." Finally seeing a small patch of shade beneath a tree, the pair quickly rushed over. "But when all of this is done, and when you're an adult, I want you to walk down these streets and tell your grandson what you're doing as President.""
 brazil.1306.a: "Promises to be made under trees whose seeds they may never see."
 
 brazil.1307.t: "Mission Accomplished"
 brazil.1307.desc: ""Oh, if only your father could have been here!" Adhemar chortled as he poured another glass of brandy for Vargas Jr., who returned the favor as the bottle was passed. The two men sat within Vargas' new office in Brasília, gratefully lended to him by Adhemar himself as he prepared for the transition of power within the coming weeks.\n\nTheir efforts had seen much toil and hardship, yet the succor of success was as potent as it was intoxicating. Or, was that the brandy? The men hardly cared, for their wildest dreams had come true: the PSP would see that fair and just governance of Brazil continue for five years longer.\n\nVargas swirled the glass in his hand, letting out a soft sigh. Adhemar reached from across the small table between the two men, smiling as he patted him on the shoulder. "Your father would have wanted this. He would have wanted you guiding us. If he was here..." He paused, mulling over the words. The quiet creaking of an overhead fan seemed amplified in the passing moment. "...He would be proud of you. So proud."\n\nVargas smiled warmly, his eyes beginning to grow glassy with imperceptible tears. "Thank you," he said quietly. Adhemar raised his glass in a toast, to which Vargas responded in kind. He had doubted himself for so long, wondering whether he could truly match the legacy that his father had set. Now, however, he had hope. Hope for himself, in his successes to come. Hope for his party, whose successes had only just begun.\n\nHope for Brazil, for he would surely make them proud."
 brazil.1307.a: "A você, Pai."
 
 brazil.1308.t: "Victory March"
 brazil.1308.desc: "Plínio Salgado offered a small wave and a large smile as he was greeted by a wave of applause. He had just delivered his victory speech outside to a throng of reporters and news cameras. Even after his speech, he still felt a certain detachment to the moment, as if it still hadn't registered. "Thank you. Thank you." He acknowledged.\n\nWhile he was out, it seemed like the staffers had decorated the place. Green streamers hung above the desks, and balloons covered the walls. On the meeting table in the centre of the office was a large cake in the shape of the country, with a bell drawn in frosting. He waited for the commotion to die down before he spoke.\n\n"I understand that the vice presidency has something left to be desired." A grumble ran through the room. "Regardless. Guimarães and the PSD can complain all they'd like. Even with this setback, we'll push through and make Brazil great." Everyone in the headquarters clapped once more. Salgado watched as they started to cut into the cake and pour drinks. Maybe if he wasn't so tired, he would've joined them. He said his goodbyes to a few party members, and walked out to his car. Right now, all he needed was rest.\n\nHis work had only just begun."
 brazil.1308.a: "Goodnight, Mr. President."
 
 brazil.1309.t: "The Truth Lies in Drinking"
 brazil.1309.desc: "Alcohol is a fantastic way to meet people. Sometimes it's because you're so drunk off your arse that you cannot help but laugh with the guy on your right despite only having shared a glance at each other for a second, some other times you're just unleashing a beatdown or being on the other end and, for the gloomiest of us all in the room, you're crying together over the fact that you're merely missing 10 centavos for a puny beer and the last coin you had just dropped and rolled in a crevice. Either way, you won't remember a thing and so will the two gentlemen of this story. Probably.\n\nIn a small bar in God-Knows-Where, Brazil, two gentlemen were having a... conversation, let's say. More that one was egging the other on political matters. "You know w-what this country would need? One man. One! THE MAN. You know the-- hed'-- a guy with a vision, am I right or no?" The political thinker said out loud, looking at his fellow drinker, the other man not seeming to care or listen to his speech. "That's wh - *burps loudly* wOooaaat we need! This country needs! Just one guy to lead this country to greatness, you feel me?"\n\n"This country's heading for the gutter, 's what it's being led to." replied his interlocutor, merely looking down into his bottle, staring at the last drop of beer remaining, evaluating whether it'll be *the* drop before everything goes blank or if he should stop there. His fellow firebrand stopped, his gaze looking directly at the ceiling, pondering."
 brazil.1309.a: "Yeah. ProoOOOo*burps*baably."
 
 brazil.1310.t: "The Impossible"
 brazil.1310.desc: ""That's not possible. That's just not possible! He couldn't have won!" Adhemar was alone in his office as he shouted at the oblivious radio on his desk. Salgado apparently had come first in the presidential election. Salgado and his cronies were going to be in charge of the country, somehow. It was as if the country had lost its mind while Adhemar had been asleep.\n\nCould this have been his fault? Was ending the embargo on Germany, the scandal with Liana, was that what led to this? Salgado had been practically a nobody at the start of Adhemar's term, and yet now Brazil was set to welcome a fascist into the presidency with open arms!\n\nAdhemar stared at the ceiling, his voice hoarse from so much shouting, "My god, what have I done?" This was going to be Adhemar's legacy. He was going to be remembered as the man who led Brazil's democracy to its demise.\n\nHe turned off the blasted radio. There was still something that could be done. Something that could save this country. He'd make calls to the Senate, calls to the military, calls to the judiciary, anyone that could stop Salgado in his tracks. Forget the election, there would never be another election if that man had his way with things.\n\nThis was it, this was the plan that could save Brazil!"
 brazil.1310.a: "Adhemar was wrong. Nothing could be done."
 
 brazil.1311.t: "Reluctant Slide into Tradition"
 brazil.1311.desc: "Lacerda stood by the window of the Palácio — hands behind his back. But then, something tugged at the side of his face, and he allowed his arms to hang limply by his waist.\n\nTancredo had won. And he couldn't even bring himself to be disappointed.\n\nNo. To be disappointed, one needed to have expectations that could be shattered. But Lacerda had long prepared for this outcome. Raphael's campaign had failed, and so the people chose the familiar gruel over reform once again.\n\nTancredo had won. And he needed air.\n\nSlipping out of the Palácio, Lacerda looked at the distant scaffolding. It surrounded a stillborn office block for a financial service firm. The incoming administration will entrench old bureaucracies rather than clear them away. The red tape would grow thicker. Jobs would vanish. And, as always, the men who built the towers of commerce would be forced back into the paternalistic embrace of the state.\n\nWhy were Brazilians like this? Was it the elites and their fear of liberty? The blindness of the voters? Or a curse for some historic transgression? At least the radicals had been routed. It could have been worse — much, much worse.\n\nAs he reached the corner, a boy — no older than fourteen — approached with a stack of "El Globo" under one arm. He shouted headlines but stopped once his eyes met Lacerda's. For a while, the boy just stood there with his mouth open mid-shout until Lacerda handed him a coin and took one of the newspapers.\n\n"Tancredo and PTB: A Presidency without Purpose?" There it was. The first stone cast. The press still had claws."
 brazil.1311.a: "And he, Carlos Lacerda, still had a pen."
 
 brazil.1312.t: "My Boy"
 brazil.1312.desc: "Lacerda hyponotically watched the waves roll over São Paulo's sandy shorelines, a man could lose himself in its beauty. Magalhães won; his victory was confirmed today when Brizola called to concede. If only he could have heard it himself.\n\nBefore, he would have joined Raphael in his parties, celebrating with the campaign team. Now, it felt more appropriate to relax and write. Truly, he was becoming old, but so was Brazil. They had outgrown dictatorships and earned the right to democracy.\n\n"I'm sorry I kept you waiting, Carlos. The aides always want another glass." He instinctively knew the hand on his shoulder: Raphael.\n\n"It's no trouble at all. I haven't even ordered yet." Raphael sat down, eyes illuminating with wonder at the beach. "I mentioned your name when I booked the place. They might try to say no to me, but you're irresistible to everyone." The next President chuckled at the current one as they watched the sun set.\n\nAs dinner progressed, Raphael broke the happy chat. "I feel the need to confess. There were... times when I was unsure, before the labor bill was passed..." He sighed. "...I was wrong, and I'm sorry it took so long to realize. I'm happy I can carry out your legacy. I'm happy to be a Lacerdaist."\n\n"Even Jesus's disciples had doubts at times, but I'm not God, and you are your own man." Lacerda's tone was noticeably warm, a tone often absent before. "As much as my pride might say otherwise, the people voted for you, not me. I'd prefer to be dead than a Vargas, so please, Raphael, be your own President. We've argued enough because of old men."\n\n"So, let us say goodbye to that, and toast." The glasses were raised, as they each knew what the other would say:"
 brazil.1312.a: ""To freedom.""
 
 brazil.1313.t: "Meet the New (Old) Boss"
 brazil.1313.desc: "Lacerda stared blankly at the page before him. He didn't blink — didn't move. It wasn't that he had forgotten how to read. It was a coping mechanism that turned the printed words into static until his brain turned back on with a painful sputter — like a car engine on a cold day. "Put all governors on high alert." The bastard actually did it. By some unholy conjuring act, the ghost of Vargas rose from the grave. "Ask them to recount the votes. Then ask them to count again. And stall — stall for as long as you can."\n\nStaffers scrambled. Phones rang. Recount requests were filed before their ink dried. Injunctions flooded the courts. Bleed. Delay. Confuse. Muck up the machine of state. At the same time, Távora paced the room with the kind of face you'd see at the rich uncle's funeral. "We can use this to our advantage, no?" he offered. "Play the long game. Let them-"\n\n"Let them, what?" Lacerda barked. He could hear the boots already — black leather against cobblestone. The issue with democracy is that it often finds itself sliding into authoritarianism (and rarely the other way around). The people had chosen their hangman. That's what hurt most. Were Brazilians really so afraid of being free? Or were they all just morons?\n\nTávora said nothing.\n\nLater that day, a few of the staffers approached Lacerda. They were loyal — stupidly so. They urged him to leave. Take a plane or a boat or a horse if he had to before the arrests began. Lacerda shook his head. "If they lock me up, I'll write manifestos from my cell. I will not cower from the devil just because he was elected."\n\nA pause. Then, someone clapped. Then, another — and another. The room trembled with it, and the exhausted UDN remembered what it meant to burn."
 brazil.1313.a: "They were once again the resistance."
 
 brazil.1314.t: "A Defiant Defeat"
 brazil.1314.desc: "Staffers hurried around in a daze. A storm of rustling papers battered the corridors. Staffers almost bellowed down phones demanding answers. What was the proper way to react to Plínio Salgado becoming President? Was there any correct response, any assured atonement for those who came before him to be forgiven? Now that all those millions of ballots had already been recorded, the only one left was to regret that they never stopped his name from being on them.\n\nFor the now-outgoing President Lacerda, there was certainly no physical response. He appeared to have turned to stone, motionless and grey. Many of his party members had already fled, the kangaroo convictions waiting for them in tow. But he had a duty to uphold, and now it was his only choice to uphold it: he had already given up his last Brasília-Washington ticket, the one he was meant to take if his personal one was not an option, to a staffer. Their father-in-law was Jewish.\n\nAfter nearly 48 hours of sleepless agony, searching in the book for any and every legal weapon that might kill fascism in the cradle, his power was fading. He had already authorized every newspaper they could leverage to inform citizens of necessary steps to take against every possible policy that might affect them. He had spoken to everyone he had to. Now he had to speak to his most loyal disciples.\n\nHe struck the Supreme Meeting Room table. Within a couple seconds of shuffling, there was silence. "I'm too tired for the soapbox, but I just want to say one thing," he began, gesticulating already. "Salgado's fascist crooks are going to try to destroy this country. We cannot fight them now, we must let them fight themselves. But keep one thing in mind, now and for the next five years, my friends. What we are going to make them realize is this...""
 brazil.1314.a: ""...Brazil is a free land, and it always will be!""
 
 brazil.1315.t: "A Workable Situation"
 brazil.1315.desc: "Well, it was official. Virgílio Távora let out a faint sigh as a memo appeared on his desk, his last confirmation that the Planalto days were now certain and few in number. His time as President, however short, was not enough to convince the nation to continue to allow him there, and his main political rivals would now take his place.\n\nYet he felt weirdly melancholy about the election. Sure, Braga did not win and he definitely should have done, and something about Edna Lott with all she, well, represented made him shuffle awkwardly in his seat. But she and especially Tancredo Neves were people he could work with, not just because they were insiders to the machine that was Brasília but because he had come to know them better. Tancredo as a go-between was definitely comforting reassurance, he thought as he put his papers into order.\n\nNow to swapping roles. He read through the memo again, reminding himself of the "progressivist politics" this winning ticket symbolized. Economically statist changes, rollbacks of the Lacerdist free market reforms they had poured so much time into. Radical overturnings of the social order surrounding women and, as the brief euphemized it, "cosmopolitan tendencies". They were still dangerous and they were still going to see things differently.\n\nIn fact, he was not going to give up his role entirely. Within minutes, he was furiously drawing up messages and meeting arrangements with officials across government and Congress. Senate compromises, contacts in the Chamber, they would take everything they can get."
 brazil.1315.a: "But the idea of a woman as President had still not sunk in."
 
 brazil.1316.t: "Right Along the Line"
 brazil.1316.desc: "Throughout the day, Virgílio Távora couldn't help but kick himself slightly for dozing off in the middle of the night, and for missing the moment that Braga had won. It was hardly a dampener for his elation. As per his best hopes, Braga had pulled through and had won the 1970 election. With the crises of the past few years, it was a relief that a UDN candidate could still push through. As soon as he woke up, Távora chose to eschew work entirely, conceiting himself with a few meetings to ensure support.\n\nHe scarcely needed to mention Braga to see his joy reflected onto other members of the UDN. They had high hopes for Braga, and they knew he wouldn't disappoint. The movers of PSD and the PTB shuffled into smaller meetings, defeatist and reluctant, spitting out loose congratulations and empty hopes for success in the next few years. Távora took every groan in his stride, honeying his words with pledges of tripartisan success, guiding them through new roles in the transitional government.\n\nThe next meeting was with a few younger voices, some of the few lucky enough to win their first elections. Their mood was dour too, but not so reluctant. A few of the more diplomatic ones congratulated him, wording their way around discontent, whilst others simply congratulated him for rigging the election. Only ever as a joke, of course, but one that came with real weight behind them. His political coup of Lacerda was hardly organised, and even Távora recognised how dire those first weeks had been.\n\nLeaving the room, he couldn't help but feel a sense of real bewilderment. Bewilderment that, even now, Lacerda was all that defined him. Bewilderment that, even here, they'd poison their praise with reminders of him at his lowest. Rage, then, that they would continue to be so indolent. But what use was the rage of an old man? A new era had come - his era. One defined by the rationality and moderate sanity of his successor, and one of oncoming prosperity, both for the UDN and Brazil."
 brazil.1316.a: "A smile to an adorning crowd quelled any fears of his continued rage."
 
 brazil.1317.t: "The Failed Catalyst"
 brazil.1317.desc: "A few days ago, Távora had watched this meeting come to fruition. Phone calls from municipalities across the country had been backed by returns read out on television, the graphics used showing Vargas Jr. progressively inch his way into office. Fighting off sleep and unease, he tried to console himself. Vargas Jr. was a skilled politician, one with the resolve and corruption to overwhelm Brazil's institutions, but he had his father's legacy to maintain, and a life long enough to see his own.\n\nToday, that unease had not lifted. True to his promises, Távora had decided to host a meeting with Vargas Jr. to discuss the Presidential transition period, and to better clarify the responsibilities the office held. Everybody needed to hear it, he thought, but especially a man like him. But he hoped that the meeting would give him a better hold on his successor; what his tastes were, where his aims truly lay. Where he needed to move to ensure some measure of control. What good, he hoped, would Vargas Jr. realise his vision was if it didn't have a party behind it?\n\nBut as Vargas Jr. spoke, Távora realised where his true ambitions lay. He was a man who would not - could not - be controlled. To do so would require some measure of ideology, some fear of earthly powers. This was no Edna, Adhemar or Braga, no philosopher king with a wider vision, no man with a price that could be brought out. This was an empty vessel, the legacy of his father strapped over an obsession with control over every institution he touched.\n\nBitten with rage, it took everything in Távora to remain mute. This was the best that Brazil deserved? A man wearing a veil, hiding dictatorship in the aesthetics of compromise and nostalgia? A man willing to abuse the weaknesses of Brazilian politics? A man willing to step on Távora's own territory? If Vargas Jr. thought that being President-elect was one step away from dictator, he would have to answer to Braga's hold over the institutions he would need first."
 brazil.1317.a: "And if Vargas Jr. was now a Goliath, Braga would have to become David."
 
 brazil.1318.t: "The Death of Reason"
 brazil.1318.desc: "Távora just couldn't understand it. The last few weeks had been nothing short of dramatic, rolling factional crises shifting from ideological disputes to fears of what was now reality, feverishly reported in tense newsrooms, echoed in mortified telephone calls. Recounts were declared at every level, but as the sun rose, Távora knew it came over a Brazil due for a Salgado regime, a fact recognised by all except the last desperate partisans for the coalition he had failed to build.\n\nEven now, as he watched Salgado give a victory speech, Távora felt new waves of disgust swell inside of him. How dare this man speak of compromise, of a Brazil built by all, when he had spent his campaign so casually baying for the blood of his opponents? How dare he talk about love and patriotism when he had previously shouted at elusive shadows that did not exist? How dare he talk at all, his siren call throwing so many Brazilians over to the principles of utter madness?\n\nSetting his rage aside, Távora still sat in his office, blind to the mounting papers surrounding him, blind to anything but sorrow. How could this happen? How hadn't the parties been able to unite together, to produce a cordon sanitaire to stop this man? How had their policies not been able to unite? He tried finding answers, kept circling around the root cause, before landing on himself. Only he could have prevented that tyrant from running from the start. Salgado would be his legacy.\n\nFor a brief moment, Távora thought, he could absolve himself by going all the way. But his ties to Lacerda, to democracy, ran too deep for him to ever become a Salgado crony. He still had valuable contacts across society, ones that could slow down the transition by days, and his laws by weeks. But would that work? Would he be able to survive prosecution? Would his sacrifice even be tallied next to his death warrant? Távora asked himself more questions, but knew that he didn't deserve the personal aggrandisement they brought."
 brazil.1318.a: "He looked down at the plane ticket one last time. From Brasília to Baltimore."
 
 brazil.1400.t: "The Mouse's Playground"
 brazil.1400.desc: "Lacerda had decided to take the day to personally meet two representatives from the Walt Disney Corporation; The Disney Brazil project had been developing rapidly. A large lot in Brasília was chosen as the park's location, in-park restaurant operating permits had been auctioned off, and the licenses for each character, film, and IP used in the park approved. It was time to start breaking ground- the President simply had to approve the plan.\n\n"Getting down to brass tacks, Mr. President-" the first representative pulled down a map of the park's plans, pointing first to the entrance. "We considered your suggestions for a slice of America. This is the Americana Boardwalk, a strip of family dining and upscale shopping." The second gestured to a large octagonal building near the entrance. "This will be the Brazilian-American Experience, an exhibit that explores the history of our country's relationship through films and artifacts- narrated by Ze Carioca himself."\n\nLacerda offered a slight smile. "That's quite impressive, gentlemen. But this park must be more than shops and exhibits, yes?" Both representatives gestured to the round plaza in the park's center, south of the entrance. "This will be Comraderieland. There will be a splash ride themed around the Mississippi, a carousel based on Snow White, and an innovative tubular steel-frame rollercoaster based on Peter Pan's adventures- the only of its kind in South America. All centered around a massive castle façade."\n\n"We've got two more things." The second ambassador pointed to a section further south of the Kingdom, shaped vaguely like a sun with a torch superimposed on top of it. "This will be the Animal Republics, a zoo that contains national faunas for every OFN member, with a jungle river cruise bisecting it." This time, he pointed to a large rectangle in the western region. "This will be the location of the Hostel of Freedom. A full-service seven-story hotel, each floor themed around a different region of the Americas." The representatives closed up the map. "So, Mr. President- what do you think?""
 brazil.1400.a: ""I like this Brazilian-American Exhibit. Though, perhaps we can gloss over that nasty dictator's rule?""
 brazil.1400.b: ""I'm thinking we can really expand this Animal Republics idea. Larger, fancier- more animals, too.""
 brazil.1400.c: ""Only four rides in the park's crown jewel? Surely you can do better than that, gentlemen.""
 
 brazil.1401.t: "A Match Made in Hollywood"
 brazil.1401.desc: "The Disneyland Brazil project had been developing rapidly. A large lot in Brasília was chosen as the park's location, in-park restaurant operating permits have been auctioned off (with some favors, of course), and the licenses for each character, film, and IP used in the park approved. Now, the President had to put his stamp of approval. Adhemar hoped his vision for the park would have been well understood by the ambassador of the Walt Disney corporation who came bearing the plans.\n\n"Sir, we believe this proposal will... suit your tastes." The representative rolled out an extensive map of the park. "The entrance, located here-" he gestured to the map's northernmost section. "-will be several avenues of luxury shopping and dining spots. Around them will be several American hotel chains." He swept his hand across the top of the map. "All of it themed around the clubs and beaches of Hollywood, as you requested."\n\nAdhemar's expression was neutral. "Keep going. You remember my second request?" The representative nodded politely, moving his hand down to the center of the map, a large circle surrounded by small and large rectangles. "This will be the Spoke of Innovation. Several companies and countries have reserved their pavilions, and prepared their own rides and shows." He moved up a hand reassuringly. "They've been made aware of their obligations, don't worry. All of it will be centered around a dark ride on a ship based on escaping Captain Hook's pirate lair."\n\n"One second- we're still going, Mr. President." The representative moved to the western section of the map, shaped like a wagon-wheel. "This will be the Coca-Cola Habitat, a section for sponsored exhibits of animals. When Coca-Cola's license has expired, the naming rights will be auctioned off again." He gestured to a large oval-shaped section immediately south of it. "This will be a medium-sized auditorium for visiting celebrity performances. A luxury room behind the auditorium will also be available for those celebrities." He looked back up to the President. "Anything more, Mr. President?""
 brazil.1401.a: ""There's nothing wrong with a few more shops. Or hotels, for that matter. Have you called Hilton?""
 brazil.1401.b: ""Consider this- an annual free admission day for Brazilian citizens. It's a worthy investment, yes?""
 brazil.1401.c: ""I don't think you understand. I don't want visiting celebrities- I'd like them to stay for a while. Can you make that happen?""
 
 brazil.1402.t: "In the Palm of our Hands"
 brazil.1402.desc: "The Disney Brazil project had been developing rapidly. A large lot in Brasília was chosen as the park's location, in-park restaurant operating permits have been auctioned off, and the licenses for each character, film, and IP used in the park approved. Now, the President had to put his stamp of approval. Kubitschek hoped that this man, a representative of the Walt Disney Corporation, had understood his vision. He didn't want to delay this exciting project.\n\n"Sir, I am excited to share our creation with you." The representative rolled out an extensive map of the park, with the lower half obscured by a sheet. He then pointed to the map's northeastern section. "The entrance, located here-" He moved his finger down a short distance, along a thin line. "-will have visitors move through a long façade of an urban downtown. It will go through various decades, getting more and more recent until it hits the current decade, and then-."\n\nThe representative suddenly flicked his hand to remove the covering sheet, revealing a massive circular section. "This will be Futuretopia, the vision of Brazil and America's shared utopian future!" He shifted his hand to the outer rim of the circle. "This will be the Monorail, a mix of a view-filled ride and a transportation system " He moved focus to the northern half of the sphere, with two clumps of rectangles. "These are the Pavillions. These western spaces are for companies to show off inventions, and the eastern ones for rotating shows about scientific ideas, designed to inspire children to learn."\n\nThe representative pointed at a semi-circle in the center. "This will be the Skyspiral, a twenty-story luxury hotel with one-way glass paneling on all sides, and an observation tower and restaurant at the top." Lastly, he pointed to Futuretopia's southern section. "Here is where rides will be located. Along with a bumper-cart game and two carousels, our coup de grâce is the Starsmasher, the world's second largest tubular steel-frame rollercoaster themed around a trip to Mars." He looked back up to the President. "What do you think, sir?""
 brazil.1402.a: ""Companies can wait- our youth cannot. I want science shows to be hosted in all of the pavilions.""
 brazil.1402.b: ""The Skyspiral idea is absolutely brilliant. Make that thing to be as tall as it safely can be.""
 brazil.1402.c: ""The world's second largest steel-frame rollercoaster? Make that the first largest- no matter the cost.""
 
 brazil.1403.t: "It's a Small World After All"
 brazil.1403.desc: "The Disney Brazil project had been developing at a moderate pace. A large lot in Brasília was chosen as the park's location, in-park restaurant operating permits have been auctioned off, and the licenses for each character, film, and IP used in the park approved. After some time, even the union contract had been agreed to. Now, the President had to put his stamp of approval. Goulart hoped that this representative of the Walt Disney Corporation would be more amenable to his requests.\n\n"We have heard your complaints, Mr. President, and-" The representative rolled out a map of the plans for the park. "We believe we can make this deal work. The entrance to the park, right here-" He pointed to a rectangle in the northern region, with a red semicircle around it. "-will have no commercial spots in the red zone. It will instead have a strip of sidewalks designated for public transit stops, and a large garden with native Brazilian flora."\n\nThe representative moved down from the entrance to the main circular plaza. "Here will be the American Peace Square, with a series of pavilions dedicated to various Latin American nations, with an architectural façade in their national style." The representative moved to the center of the plaza, with three rectangles in a horizontal line. "This first space will be a large wooden rollercoaster based on escaping the legendary snake Boiuna. The second space is a traditional ferris wheel, slightly elevated to enhance the view. The third space will be a smaller low-elevation coaster themed on the story of John Henry."\n\nHe traced his finger down to a set of four moderately-sized semicircles in the plaza's southernmost part. "These are auditoriums for staged character shows. Actors will vote on what they perform each week- though a Disney representative will have final veto on each idea." The representative then moved over to a decently-sized oval in the west of the map. "This is the Pindorama, a set of several wooden three-story hotels, surrounded by exhibits of South American fauna. Half of the homes will be set aside and made affordable for citizens below the national average salary." The representative rolled up the map. "Does this work for you, sir?""
 brazil.1403.a: ""We don't need to remove all commercial space at the entrance. Just keep them reasonable.""
 brazil.1403.b: ""A veto on the workers' chance to vote? That seems a bit excessive. Axe that, please.""
 brazil.1403.c: ""The Pindorama is a great idea. Put more rooms and exhibits- don't spare any expenses on it!""
 
 brazil.1404.t: "Reluctantly, Through the Gears"
 brazil.1404.desc: "The Disney Brazil project had been developing at a moderate pace. A large lot in Brasília was chosen as the park's location, in-park restaurant operating permits have been auctioned off, and the licenses for each character, film, and IP used in the park approved. The junta's reign had stalled progress for a while, but things had finally cooled off. A representative of the Walt Disney Corporation and one of Branco's men, named Joaquim, met to formalize the agreement.\n\n"I won't waste your time, Joaquim." The representative rolled out a map of the plans for the park. "We understand your superior's complaints, and we won't fight you on them. The entrance to the park, right here-" He pointed to a rectangle in the northern region, with a red semicircle in it. "-will be an extensive boardwalk of restaurants and fine dining. And, as you requested, Brazilian-owned businesses will be given priority in the red zone."\n\nThe representative moved down from the entrance to the main circular plaza. "Here will be the Plaza of the Republic, with a series of pavilions dedicated to the eight largest states in Brazil, with plans to give every state a pavilion." The representative moved to the center of the plaza. "A central pavilion will be built here with annually rotating exhibits, beginning with the political history of brazil." He then moved to the south of the plaza. "Here will be the main rides of the Plaza. First, a dark-ride rollercoaster themed around Treasure Island. Second, a set of shooting-gallery games themed around being a colonial bandeirante and surviving attacks by wild animals or native warriors."\n\nHe traced his finger down to a southern section, a somewhat smaller circle separate from the plaza. "This section is called Mother Nature, a space for animal exhibits, with critters from every province in the country. A jungle cruise themed around the story of the Swiss Family Robinson will bisect the set of exhibits." He then gestured to a medium-sized rectangle jutting out from the smaller circle. "This will be the Nation's Pride hotel, an eight-floor luxury unit with discounts provided for soldiers." He then rolled up the map. "Do your superiors want anything more, Joaquim?""
 brazil.1404.a: ""Just priority for Brazilian-owned businesses? Mandate that all boardwalk buildings should be Brazilian. This is our country.""
 brazil.1404.b: ""We can make some pavilions for non-Brazilians. Perhaps America can have a space- for a price, of course.""
 brazil.1404.c: ""Nation's Pride should be free for our soldiers to rent. They are, after all, our nation's pride and joy.""
 
 brazil.1405.t: "Arguments with a Relentless Pest"
 brazil.1405.desc: "The Disney Brazil project had been developing slowly. A large lot in Brasília was negotiated reluctantly as the park's location, in-park restaurant operating permits have been auctioned off almost exclusively to Brazilian businesses, and the licenses for each character, film, and IP used in the park approved- though only under very strict terms. Quadros', or at least his lackeys, had made the process a slog. After many delays and cancellations, the President and the Disney Corporation representative finally met.\n\n"Mr. President, I understand how much you may be concerned about this project." Quadros simply nodded in response, his expression dulled somewhat by the few glasses of whiskey he had an hour ago. "But we have taken your complaints, and figured out how to fix it for you." The representative rolled out a map of the plans for the park, pointing to the rectangle in the northern region. "This is the entrance. It will be a nice, humble shopping mall area, with some Brazilian-run hostels in the area for people to stay in. As you have requested, there will be a curfew there at 9 PM."\n\nThe representative moved down from the entrance to the main circular plaza. "Here we have the Kindness Kingdom, the main park space modeled after an American town. A Catholic church with full functionality will be put here," he gestured to a rectangle at the top of the plaza. "And some family-friendly games will be put up across the park- no prizes, since that would be gambling." He gestured to the center of the plaza, where two decently-sized pavilions were. "Here will be pavilions that document the history of Brazil and America as two brotherly Christian nations, through exhibits and films."\n\nThe representative then traced down to a set of two large circles in the southeast of the map, as well as a decently-sized rectangle that extended around the whole plaza. "Here will be the main rides. The first is a car ride that drives on a track around the town itself, acting as a guide to the Kingdom. The second is a carousel themed on Mickey Mouse and his friends, with an audio story playing throughout about Mickey's search for his lost dog Pluto." He then moves to another circle in the southeast. "And the last will be a slow roller coaster themed around exploring an abandoned Minas Gerais gold mine." He looked up from the map, to the President. "Is this... okay?""
 brazil.1405.a: ""That curfew is a little harsh. I don't mind people having fun within reason, you know. Maybe make it 10 PM.""
 brazil.1405.b: ""I should hope that the Catholic church is fully functional. Employees will be going to mass there, after all. Right?""
 brazil.1405.c: ""That coaster sounds pretty boring, to be honest. Can you add something exciting? Make it go underground?""
 
 brazil.1500.t: "Ordem Durante Progresso"
 brazil.1500.desc: "It was late in the day, and most vendors were closing up. It had been a busy few hours for Jamila, but that had been the case for a while now. Business was booming, and it showed no sign of slowing down. Even as the years ate away at her face, Jamila had remained a respected matriarch within her community, moving from the owner of a watermelon vendor to a wise, eminent guide.\n\nShe turned her head towards the radio, and cleared her throat to speak. "We all know that it's only a matter of time before the good news surrounding our GDP is announced." The mass of young people, practically children, watched on in deafening silence, shocking her into continuing. "Well, how will we celebrate?"\n\n"Perhaps we could give each fruit a special name?" spoke one, a boy barely old enough to work. "L-Abiu-da? Cashew-bitshek?" The silence was momentarily replaced with the echoes of laughter.\n\n"Let's blast the anthem over speakers!" shouted a few more from the back, hidden behind a pavilion. "Find the right places, learn the words by heart." Too expensive, she thought, a fear confirmed as another person started running the costs of individual speakers.\n\nAs more ideas began being floated, Jamila sighed. Too many of them veered too generic, too lazy. Was it too much for this generation to even paint their pavilions green and yellow? Just as she turned to despair, another teenager took centre-stage and turned reflexively around.\n\n"What if we buy some Brazilian flags?" he asked, raising a hand. "I know a local supplier who makes some, and if we head down soon, we should be able to get there without eating into his next shipment. It's simple, patriotic, but will help a business in the local economy." Silence percolated until one of the other matriarchs asked where this business was."
 brazil.1500.a: "Word of mouth saves the day."
 
 brazil.1501.t: "Rally of the Exchanges"
 brazil.1501.desc: "Green lights flickered overhead on the newly installed digital tickers. Sometimes, they would go red for just a second as a little joke before resuming their beautiful green hue. Each one broadcasted a Brazilian company punching up, up, and up!\n\nThe floor was packed with sweaty suits. Suits without ties. Ties without collars. Phones slapped to their ears — mouths twitching like they wanted to kiss the guys on the other side of the line. Everyone was buying — everyone! Buying fast. Buying loud. Buying proud. If you weren't buying, what the fuck were you even doing with your life? Because today wasn't just another morning on the stock exchange. Today, Brazil has become the world's seventh largest economy.\n\nThrough all this green haze, it was hard to see that many companies had inflated their stock prices to counteract a downward slide. It was nothing but a PR move to restore investor confidence, but the overeager newbies ate that shit up. They punched the air and collected their commissions. Done deal.\n\nThe veterans didn't cheer. They smirked. They knew the game. A lie for children. They'd offload the bad stock — the rot — at just the right second.\n\nBut that could wait. Now, it was time to celebrate.\n\nChampagne was handed out in crystal glasses. Someone even opened (and accidentally snapped the lid off) an expensive cigar box, passing it around the floor. You had young guys, high on their own fumes, smoking Cubans like corner store ciggies."
 brazil.1501.a: "A glass shatters. Someone cheers."
 brazil.1501_tt: "§GBrazil§! is now the seventh largest economy in the world!"
 
 brazil.1600.t: "Assimilation"
 brazil.1600.desc: "The midday sun beat down mercilessly on the makeshift clearing. Eduardo, a SPI officer wiped a bead of sweat from his brow, his gaze sweeping over the scene. Adhemar administration, for all its flaws, had at least put some resources into indigenous support, even if they came with strings attached.\n\nHe watched as Yanomami, their faces etched with a mixture of relief and suspicion, received the packages of medicine and food. These were the same people who just a few months ago had been stricken with illness and starvation. Now, some semblance of health was returning to their faces. But it was a simmering undercurrent of resentment, barely concealed, that Eduardo had noticed each and every time.\n\nThe real source of that unease was happening over by the newly constructed schoolhouse. The building, a simple structure of brick, stood as a stark symbol of the new policies implemented under Adhemar. The children of the tribe, some as young as five, were being shepherded into its doors by white teachers. These children, some of whom still clung to their parents' hands, were entering a world far removed from their own.\n\nThe school's curriculum was a mix of basic reading and arithmetic, all taught in Portuguese, but it was the other aspects that troubled Eduardo most. The lessons were saturated with Catholic teachings, emphasizing Christian morality and faith over the Yanomami spiritual beliefs. Brazilian values were hammered into the young minds, presenting a worldview where their own culture and traditions were, at best, archaic and, at worst, shameful. The explicit goal was to assimilate these children, to mold them into loyal Brazilian citizens.\n\nAs Eduardo watched the children march to their class, the once vibrant culture and identity of the indigenous people slowly fading, he wondered what kind of a nation they were building, and at what cost."
 brazil.1600.a: "Is it really progress if the cost is their culture?"

 brazil.1601.t: "The Price of Progress"
 brazil.1601.desc: "The air hung thick and heavy, not just with the humidity of the Amazon, but with the stench of sickness and death. The small clearing was littered with the bodies of the Yanomami tribe. In the center stood a lone figure, a young SPI officer named Ricardo, his face a mask of exhaustion and despair.\n\nHe spoke in a mix of Portuguese and the tribe's language, his voice hoarse. "We don't want to hurt you. We want to help."\n\nAround him, a handful of the remaining Yanomami warriors - their bodies emaciated, their eyes filled with a mixture of grief and rage - brandished their bows and arrows.\n\nThey had been a healthy community, until the outsiders came. The stories had been vague at first - rumors of roads being built, trees being felled. Then, the diseases arrived. Sicknesses that their shamans couldn't fight. Sicknesses that took their children, their elders, their kin.\n\nThe advancing settlements were close. The sound of distant machinery, the metallic clang of construction, echoed through the forest. The young men wanted blood for blood. Ricardo knew that if they attacked, they would only be met with death.\n\nHe knew President Lacerda was focused on industrialization, on modernizing Brazil. The president's rhetoric, full of promises of prosperity and advancement, had resonated with many. But here, in this forgotten corner of the Amazon, Ricardo saw the other side of the coin - the devastation wrought by this relentless pursuit of "progress," the suffering inflicted on the most vulnerable.\n\nThe SPI officer spoke again, desperation creeping into his voice. "We have medicine. We can help you. Please..." He gestured towards the small medical kit he carried.\n\nA young warrior's hand trembled as he pulled back the string on his bow, the arrow pointing at the officer's chest. "Mentiroso," the warrior hissed."
 brazil.1601.a: "Liar."
 
 brazil.9999.t: "Code Red"
 brazil.9999.desc: "The lightbulb dangled in Lott's room, several newspapers lying atop his desk. "CRISIS IN PARAGUAY!", "BOLIVIA - ANDEAN PARADISE IN FLAMES", "BELOW ZERO - THE SCRAMBLE FOR ANTARCTICA." They all worried him, he knew as a military man that you must be ready for anything. It could be a coup or, even worse, a war. He had called the generals to his room for this reason.\n\nEveryone was there, Castelo Branco, Costa e Silva, Odílio Denys, Emilio Médici, even newly appointed General Sílvio Frota. There were no civilians, this was a military matter. "Our nation will become dust if we do not protect it," said Lott. "You all know what Vargas had planned for the army. Nuclear weapons. The program was dismantled following his removal. Though Atoms for Peace allowed us to continue peaceful research."\n\n"Do you want to allow such a program to exist again?" said Denys.\n\n"Correct," Lott answered while looking out the window. "When we first got deployed on the beaches of Cardiff, we saw what the Germans could do, and what they did. If at any point the Germans decided that Brazil should be destroyed, they could do it at the press of a button."\n\nLott opened his cabinet and pulled out a map of South America. "Uruguay, Bolivia, Chile. They could all be made Argentinian puppets if they get the bomb first. If we don't get the bomb first, they will."\n\nIn his heart Lott didn't wish to produce such dangerous weapons. Those that could level a city to rubble and make their inhabitants into dust. But if he didn't do it, others would. "It isn't an offensive measure," he thought. "It is to prevent others from ruining us."\n\nA vote was held for if they should allow such a program to exist. It was unanimous. "Mr. Lott, we do not see eye to eye on many political matters," said Castelo Branco. "But the existence of our nation is more important than any fickle fights we have." He shook Lott's hand and left, returning to his post."
 brazil.9999.a: "The golden flames will be unlocked."
 BRA_sacw_nuclear_tooltip: "§MArgentina's§! aggressive behaviour shows they can not be trusted. The only way to prevent war is to build the §Latomic bomb,§! before the §MArgentinians§! can. §GGod Speed Senhor Presidente.§!"

 brazil_oc_lacerda.1.t: "Slaking the War Machine"
 brazil_oc_lacerda.1.desc: "To the men in this room, the problem seemed frustratingly familiar: communists had kicked off endless struggle in the Middle East, blocking pipelines and trade routes that once carried precious oil with their corpses. Military matters demanded military input, which explained why Carlos Lacerda was sitting alongside Minister of War Couto e Silva and before a half-dozen generals. There were civilian implications to this crisis—Lacerda caught Beltrão earlier that morning before yet another meeting with the banks, da Cunha was running around the world in search of oil unblocked by war, and Raphael was trying to act presidential before a crowd of frustrated citizens—but this meeting cared only for the military's position on the matter.\n\n"Which is this, Mr. President." One of the generals rose, pointed to the map beside them. "Argentina is in the best position it's ever had to launch a war against us. Unlike us, it has enough oil deposits and tapped wells to fuel a war machine, while we are still floundering. And if we know, then they certainly do. We must be prepared for a surprise attack."\n\n"Right," said Lacerda, eyeing the narrow border between Argentina and Brazil. "I trust that you have plans, General?"\n\n"Three," said Couto e Silva, rising and clearing his throat before the map. "Our first two options presuppose that strategic reforms are necessary. To wit: we either fight quicker or leaner." He swore he saw a general's eyes roll, but perhaps a week's lack of proper sleep played tricks on his perception. He pushed through it, cleared his throat again. "We can invest in streamlining fuel consumption in the armed forces—lighter armour coverage, limited mobile deployment. Or we embrace a quick war, one of constant and lightning-fast offense. If we can secure oil fields early, we won't need to worry about our own supply."\n\n"Or," said another general, "we prioritise fuel distribution towards the military. The civvies will piss and moan, but better that than an Argentinean occupation."\n\nLacerda leaned forward, his eyes never leaning the narrow border."
 brazil_oc_lacerda.1.a: ""I hate to borrow from them, but the Germans and their lightning wars might be what we need.""
 brazil_oc_lacerda.1.b: ""I'm sorry, General. The economy cannot be starved. Learn to make do with less.""
 brazil_oc_lacerda.1.c: ""The military will have all the fuel it needs. Make sure it counts.""
 
 brazil_oc_lacerda.2.t: "The War Machine, Slaked"
 brazil_oc_lacerda.2.desc: "To the men in this room, the problem seemed frustratingly familiar: communists had kicked off endless struggle in the Middle East, blocking pipelines and trade routes that once carried precious oil with their corpses. Military matters demanded military input, which explained why Carlos Lacerda was not present in this room. The matter was simply too important for a civilian's input. There was only Golbery do Couto e Silva, Minister of War, and a pack of Sorbonne generals on the other side. The lack of fuel was hindering much of the Brazilian state, but there was one matter in particular which demanded their attention.\n\n"Which is the war against Argentina," said Couto e Silva. "While we are scrounging around the world for sources of oil, Argentina produces barrel upon barrel daily. Should they attack now, we will not be able to prosecute a prolonged war." The generals around him nodded. War was no longer a possibility to them; there was a certainty, an inevitability, in how they spoke of the coming conflict.\n\n"R&D will be focused on projects to extend our capacity," said one of those generals. "We have some promising signs in the field of fuel-efficient transport."\n\n"But that can only prolong a meager fuel supply," said Couto e Silva. "And reorienting our whole strategy against Argentina... it would be suicide." He ran his finger along the edge of the table, peered at the collected dust on his skin. "The military will get the lion's share of oil. That much, gentlemen, is assured. Lacerda will agree." His approval, too, was a certainty. Guaranteed support for services rendered, just as the Sorbonne wanted it.\n\nThe meeting proceeded without further topics of note. The real decision had been agreed upon, and all else was details. Civilian transport would grind to a halt, the bulk of civilian industry would stutter and stop..."
 brazil_oc_lacerda.2.a: "...but the army would still be ready for whatever Argentina could throw at them."
 
 brazil_oc_lacerda.3.t: "Oil Witching"
 brazil_oc_lacerda.3.desc: ""Venezuela has oil." He lit a match. "Colombia has oil." He lit his cigarette. "Peru, Ecuador, Argentina." He took a short drag. "All of them have oil," said Carlos Lacerda, "yet we don't?"\n\n"Absurd, isn't it?" Hélio Beltrão ashed out his own cigarette onto the table's ashtray. "Yet here we are, fighting for every barrel."\n\nThey had just come out of a meeting with Petrobras, an experience both men regarded as miserable, and rather than head back to their offices they found a nearby café hungry for business. The proprietors were more than eager to lock down the empty garden at the back, giving both men the space and security they needed to talk. Seated on iron-wrought chairs with fraying cushions, drinking a house blend that Beltrão suspected mixed cheap beans with guano, pressed by the narrow garden next to a wall of wood panelling and creeping fig, they both pushed past their regrets.\n\n"Honestly, I wish you had talked me out of pushing Petrobras to the side." Lacerda sipped his coffee out of habit, pushing his cigarette to one side of his mouth and drinking with the other. "They're more interested in protecting their monopoly than they are helping us claw our way out of this crisis."\n\n"Still, we're stuck with them. So we'll see how we want to encourage them. Offshore, onshore, doesn't matter so long as we can find any source of oil."\n\nLacerda tapped his cigarette on the ashtray; first quick taps to ash it out, then a metronome in thought. "Are we sure we can't bring the private sector into this? It wouldn't take much. Just a simple executive order permitting Petrobras to coordinate with private firms."\n\nBeltrão shrugged. "Hey, if you want to get into a pissing contest with the board of directors, be my guest. But we need to make a decision now, before we lose any more sources."\n\nLacerda leaned back in his chair, felt the floral patterns of the wrought iron pressing on his back. A frustrated sigh soon escaped his throat, followed by his answer."
 brazil_oc_lacerda.3.a: ""Fine, look offshore. The ocean must be hiding our salvation, Beltrão.""
 brazil_oc_lacerda.3.b: ""Surely, there has to be something in our borders.""
 brazil_oc_lacerda.3.c: ""Shell knows how to strike liquid gold. I'll sign the order tonight.""
 
 brazil_oc_lacerda.4.t: "Knowing When to Ask for Help"
 brazil_oc_lacerda.4.desc: "[BRA.GetLeader] walked out of the meeting with Petrobras, the board of directors still an unfamiliar sight to them. Most of the old hands were still there, but they were off to the side. At centre stage were a new crop of bright young things, engineers and managers of a new generation. Some of them weren't Brazilian by birth; some of them wore different pins on their lapels. They were all here to determine what kind of oil could be found in Brazil.\n\nThe meeting began with a wide-view look at the problem. Projected on the wall was a map of South America, oil wells and offshore rigs dotting it, marking the current presence of oil. A crescent of tapped oil ringed Brazil, contrasting their own lack of facilities. It was not, as the Petrobras executive reminded them, laziness or a lack of foresight: everywhere else in South America had oil, yet Brazil seemed unnaturally dry.\n\nThe Shell executive then stepped forward; [BRA.GetLeader] thought they were overdoing it with the hard hat inside a corporate office, but their experience came through with their report. They reassured the President that there was no lack of oil within Brazil's borders, but that it had remained hidden by the exploratory techniques of yesteryear. One may as well have broken out the dowsing rod, for all the good it would have done. But the next thirty minutes promised Brazil's salvation: new technologies and processes from experienced oilmen that promised to discover what the earth had hidden from them.\n\nFinally, representatives from the Ministry of Finance rose. Their report was succinct and impactful, and the reason why the Shell execs had signed an NDA before they could enter the building: the longer the Oil Crisis ran without Brazil locating oil, the more their foreign currency reserves bled out in search of oil. Government spending was caught in a cycle of borrowing foreign currency to pay for more oil. The need for some kind of energy security within their borders was immediate and pressing.\n\nIn the Petrobras building, [BRA.GetLeader] leaned over the railing, watching harried clerks and short-tempered managers course through its hallways and atriums. There had been a lot of sleepless nights in this building; even from this distance, the President could see the bags under the eyes of so many workers."
 brazil_oc_lacerda.4.a: "Hopefully, Shell's help would give them a reason to find some rest."
 
 brazil_oc_lacerda.5.t: "A Measured Present"
 brazil_oc_lacerda.5.desc: ""Is this really necessary, Beltrão?"\n\n"Mr. President-elect, the Oil Crisis doesn't care if it's your birthday or not. The press need an answer."\n\nRaphael Magalhães sighed. On every other day in the last few weeks, he had been beset on all sides by the Crisis. Its economic effects were immediate, disastrous, and plainly recorded every day for him to read. The weight of it crushed him some days. Perhaps sensing this, his staff and friends had organised a little respite on an important day. "HAPPY 40TH RAPHAEL!" had been proudly emblazoned on a banner above his front door when he arrived home. There was a party. There were luxuries they would have to discard in the dead of night. Magalhães forced a smile onto his face over it all.\n\nThen the press came sniffing around. An impromptu press conference was set up at the Palace's front entrance to deflect from it; banners had to be torn down, announcements had to be moved up. He had to ditch his bowtie for a regular tie, and he swapped out his tuxedo jacket for a regular suit, but when he came down the front steps he exuded professionalism, self-sacrifice; working into the night, on his own birthday.\n\n"I'd like to announce tonight that my administration will be enacting a suite of economic responses to the ongoing energy crisis." Cameras flashed, tape reels whirred to life. "Starting from tomorrow, we'll be subsidising fuel to ensure its affordability. This will affect diesel, fuel oil, LPG, and gasoline. We'll be enacting further price controls as well for fuels used in public transport and agriculture. Finally, I've instructed the Finance Ministry to adjust our existing exchange rate policies in order to ensure the viability and competitiveness of our export." A reassuring smile flickered to cordial. "You'll all be given the details of these plans via telex to your offices.""
 brazil_oc_lacerda.5.a: "Magalhães said his goodbyes and stepped back into his home, from one noise to another."
 
 brazil_oc_lacerda.6.t: "A Mixed Present"
 brazil_oc_lacerda.6.desc: "Raphael Magalhães cleared his throat before the crowd of reporters. "Good evening," he said, trying not to draw too much attention to anywhere but the podium in front of him. "I know that announcements from the Alvorada are irregular, but my government will be enacting a broad sweep of executive orders to combat the ongoing difficulties of the Oil Crisis in Brazil. We'll be working well into the night to draft more solutions, but we wanted you to know these ones now." He did not, but circumstances called for an escalation in schedules.\n\nHe smoothed out his jacket, adjusted his tie. "Starting tomorrow, we'll be implementing subsidies for diesel and LPG, targeting identified industries at most risk of collapse during this time. While we are looking at small adjustments to expenditures, we'll also be recommending and implementing an immediate increase in the interest rate of our LTNs, to the tune of 1.5%." He smiled. "If you wanted to give me a present, might I recommend an investment in our country's future with a good return?"\n\nThe press chuckled. See? Here was a selfless man, working long hours into the night on his own birthday to resolve this Crisis. They could not see the slight pain in his smile, the discomfort of a man who feels his burdens unduly shifting. He bade farewell to the press and returned to the safety of the Alvorada, where Carlos Lacerda waited for him with a glass of sparkling wine. "You did well," he said. Magalhães took the wine, threw it into his mouth with concerning haste. "Now they'll go away. That's bought you a few hours here with us."\n\n"Right," said Magalhães, swapping his tie out for the bowtie he'd started in. They walked inside to the living room, where a crowd of his closest friends and advisors were still chatting away with each other. A waiter passed by them with canapés. On top of the room was a banner: "HAPPY 40TH RAPHAEL!" He still didn't know how to feel about Lacerda's surprise."
 brazil_oc_lacerda.6.a: "He hoped that he wouldn't open the papers tomorrow to read 'President-Elect Cuts Spending At Bacchanalian Birthday Bash'."
 
 brazil_oc_lacerda.7.t: "A Laissez-Faire Present"
 brazil_oc_lacerda.7.desc: "Behind Carlos Lacerda was a quiet party, friends and family gossiping and servants weaving their way through the crowds with trays of finger sandwiches and sparkling wine; he took no real notice of it at this moment. He was staring out a window of the Palácio da Alvorada, watching his successor on the steps of his home give a semi-impromptu announcement to the journalists below. It occurred to him that there was no face among that crowd that he recognised personally. Sure, he'd seen their make and model before, and there were one or two hacks that he'd recognised in prior conferences, but nobody that he had worked with before. A wistful smile crept up on his face.\n\nHe could not hear what Magalhães was saying over the crowd behind him, but he knew the gist of it. His successor was sweating inside, trying to downplay the cuts as much as possible. He would try to talk up the interest rate increase on the LTNs, hoping that a 3% increase would be enough incentive for the press to elide over the lack of subsidies or price controls once expected of a Brazilian government. He was glad that he still had at least some of the old instincts left: swap out Magalhães' bowtie for a tie, put up a podium and pretend like he was working through the night. The press would stop sniffing around the party after that.\n\nMagalhães bid the crowd farewell, returned inside the house and reached for the nearest drink. Hélio Beltrão sidled up to him, offering some laudatory words as he poured more wine into Magalhães' glass. Lacerda, atop the landing, smiled and watched on with fatherly pride. He'd really grown into the role over the past few weeks. He was, in Lacerda's mind, exactly what Brazil needed to look after the nation in his absence.\n\n"Raphael," he said, approaching him and extending his hand, "happy birthday." The president shook the president-elect's hand as the record player skipped to a brighter, happier tune."
 brazil_oc_lacerda.7.a: "Privately, Lacerda hoped that his influence would not end here."
 
 brazil_oc_lacerda.8.t: "A Bay in Flux"
 brazil_oc_lacerda.8.desc: "6:30 PM, December 30, 1970. As the Rio summer air cooled for the evening, yet the sun remained stubbornly above, Francisca found herself where she had every year at this exact minute, walking toward Praça Mauá, once again taken in by the bay. Maybe it was the fleeting serenity, the brief calm after an intense workload. But today, a gauzy mist sat upon the bay - something, therefore, was indescribably different.\n\nNot that much had changed since she started at the Gamboa docks; maybe a few more cranes or boats in the water, and behind her, more American storefronts and even tourists fresh off Pan-Am jets. Maybe that was what truly changed. Washington, thanks to Lacerda, was no longer a world away, just a flight.\n\nThen there was the money. As much as she turned up her nose at her supervisors, she was earning more since the UDN took over. But that was also because she didn't need a car, thank God. And paying for her kids' buses was nowhere near as bad as paying for petrol herself, which the roads seemed to confirm; she hadn't seen a traffic jam in ages.\n\nBut some changes lasted only a moment. She still remembered the road where the General Strike became physical, the scab on her leg lingering for months, those Japanese in São Paulo, the paranoia. But the scab healed, and the only Japanese on people's lips were in Tokyo, not here. The paranoia remained. There was always something new to be paranoid about.\n\nAs the page turned on the year, now a decade, it was as if the mist was mocking the mood. Though there was so much detail, there was still so much uncertainty. Rio was morphing again."
 brazil_oc_lacerda.8.a: "Mude, porque mudar é preciso."
 
 brazil_oc_lacerda.9.t: "The Martyr, Muse, and Mist"
 brazil_oc_lacerda.9.desc: "6:30 PM, December 30, 1970. As the Rio summer air cooled for the evening, yet the sun remained stubbornly above, Francisca found herself where she had every year at this exact minute, walking toward Praça Mauá, once again taken in by the bay. Just as the Planalto Palace seemed to be shifting again, so did the landscape. The cranes were increasing in number and size, the docks in Gamboa she worked on had lots to do, maybe too much. Even the Rubens Vaz Bridge finally seemed to be settling in with the scenery.\n\nOh, Rubens Vaz. For a bridge to be named after someone famous only in death was surely inauspicious. If she truly cast her mind back through all those years, she could barely remember the man's name in the news as he was delivered from life, but now it was only because of Lacerda that he could still be a reminder to the millions who used the crossing every year. It might thus have been his bridge, a symbol of his impact which transcended politics into the very geography of his city.\n\nYet, despite the misfortune of the name and the emptiness of the roads as the petroleum-fueled wildfire still raged, there were signs of hope. Even as the petrol shock dashed the wild dreams of the future, her family was better off than five years ago. Shops brimmed with novelties and shiny gadgets, and with Petrobras committing to further exploration just a little way from here, who knows? Maybe this kind of oil crisis would be behind them.\n\nPerhaps it was wishful thinking. She knew that the General Strike, the crises, the riots, all of it was enough reason to worry for the future. If anything, the last half a year was proof that even years of progress can be offset by a few weeks of pain, and that this mirage of improvement could be broken so quickly. But it wasn't her job to fix it all, it was just to get used to it. The mist became easier to manage that way, anyhow."
 brazil_oc_lacerda.9.a: "When it all becomes confusing, just enjoy the view."
 
 brazil_oc_lacerda.10.t: "She Sees Shell Ships by the Seashore"
 brazil_oc_lacerda.10.desc: "6:30 PM, December 30, 1970. As the Rio summer air cooled for the evening, Francisca found herself where she had every year at the time, walking toward Praça Mauá, once again taken in by the bay. Guanabara Bay, but less like the Guanabara she knew every day - lofty cranes accompanied by a bridge bearing the name of the President's personal martyr, and a little way below this arm-like projection stretching over the water, a colonnade of ships.\n\nThese were not just any ships, not least for her: they were symbols. Stark yellow shells enmeshed in unmistakeable red seals were plastered onto them, they were the outside world coming in, Brazil's American connection, the industry boom, the expansion. At the same time, they were the corporations, the extractors, the usurpers enabled by this new government.\n\nHow disorienting it all was! One day, she only saw the first half, and just a few later it was everything after that. Nowadays, she really felt in two minds, as the mixed feelings of a better job at the docks and shrinking savings set in. Even as the petrol shock dashed the wild dreams of the future, her family was better off than five years ago. It was just a crisis, not the new normal, and maybe, just maybe, all these big U.S. brands in town would save them from this one too.\n\nPerhaps it was wishful thinking. She knew that the General Strike, the crises, the riots, all of it was enough reason to worry for the future. If anything, the last half a year was proof that even years of progress can be offset by a few weeks of pain, all in a city which seemed less like the City of Brazilians than one of the world. But she was a survivor, not a policymaker. She would be able to ride the waves regardless of who made them, maybe."
 brazil_oc_lacerda.10.a: "Rio's gates are open. Hopefully that's a good thing."
 
 brazil_oc_tavora.1.t: "Slimming Down for the Summer"
 brazil_oc_tavora.1.desc: "Across oceans and continents, the largest oil taps in the world were clogged. The rest of the world felt a thirst for black gold not felt since it first tasted its viscous wealth. While the superpowers of the world rushed to be the first to pry the taps open once more, Brazil was confronted with a more immediate problem.\n\n"That being our southern neighbour," said Couto e Silva, pointing to a map laid out on the conference room table. On one side of the table, himself and President Távora; on the other side, a row of generals. "Argentina has their own oil sources. Enough to power their own war machine. Meanwhile," waving to the other side of the table, troop readiness reports and supply manifests, "we have far less to go around, even with the contracts da Cunha's arranged."\n\n"Should Argentina attack," said a general, "we would be in a far less advantageous position-"\n\n"Yes, yes," said Távora, waving a hand in front of him. "It wasn't so long ago that I had a commission." He stared at the map, closed his eyes, and exhaled through his nose. "We had our own supply shortages. I'd always been told that such things were a part of command, that one had to make do with the supplies that were given."\n\n"You cannot be suggesting-"\n\n"I'm not asking you to fight tanks on horseback," snapped Távora. "We can build vehicles that can drive longer with less fuel, and we can get what supplies we have to the front lines quicker with some extra railways and better ports. Beyond that..." His eyes went up to the generals, and for a moment, they forgot that he was wearing a suit, or that he'd never risen higher than Colonel. "We're all fighting leaner, men. Civilians, military, doesn't matter. We're going to be the most energy-efficient army in the Americas, because we can't be anything else.""
 brazil_oc_tavora.1.a: "Távora's eyes returned to the map. "Now, gentlemen, show me how we're going to fight lean.""
 
 brazil_oc_tavora.2.t: "State Dowsing Enterprise"
 brazil_oc_tavora.2.desc: ""Every country on this God-forsaken continent," said Virgílio Távora, "has oil. Venezuela, Colombia, Peru, Ecuador. Christ, Argentina can pump out a few barrels here and there." He lit a cigarette, inhaled, exhaled out into the atrium. "God couldn't have seen fit to give this patch of dirt some of the black gold He sent others?"\n\nHélio Beltrão ignored his griping. They were both on the third floor of the Petrobras building, having just left a meeting with their executives where they heard the same thing again: oil deficits, lack of local production, difficulty obtaining foreign exports. Had Lacerda done the job properly, Beltrão would have been able to raise what he considered to be more efficient methods.\n\n"We should have at least brought in Shell," he said, arms on the railing and eyes looking down. Downstairs, Petrobras employees scuttled around, arms full of papers. "They're an experienced pair of hands with the history and expertise we need-"\n\n"Oh, for God's sake, Beltrão, listen to yourself." Távora blew more smoke into the air above. "Energy security is a matter for the state, and the last thing we need is for some foreign company tapping into our wells." He was about to ask whether Beltrão trusted Petrobras to get the job done; knowing the answer, he just took another drag. "They know we're desperate. It wouldn't take them much to draft a contract that'll screw us over in the long-term. Economically, it's dangerous. Politically, it's suicide."\n\nHe breathed out. A thin cloud of smoke dissipated in the stale air. "It's just not worth it, not when we already have a company under our control capable of looking for oil themselves."\n\n"About that," said Beltrão, turning his body to face Távora. "Why there? Do you think that Petrobras can find oil where you've requested it?""
 brazil_oc_tavora.2.a: ""You saw their presentation. If there's oil anywhere, it's under our seas.""
 brazil_oc_tavora.2.b: ""It's a big country, Beltrão. Surely, somewhere, there's oil still hiding away inside.""
 
 brazil_oc_tavora.3.t: "Good News, Bad News"
 brazil_oc_tavora.3.desc: "Távora approached the podium with practiced calm, feeling the questions and camera flashes of curious reporters. He set a piece of paper upon the lectern and looked towards the back of the room.\n\n"Beginning tomorrow, this government will begin a series of emergency actions in order to offset the damage caused by recent energy shortages." He cleared his throat. "First, we will be issuing limited subsidies for diesel and LPG, targeting critical industries which require fuel for their continued operation." The reporters simmered. "We will also issue price controls on oil used in public transport and agriculture. I have also instructed the Ministry of Finance to review our current exchange rate policy, with the goal of boosting exports to ensure new and strengthened sources of revenue."\n\nAll seemingly reasonable, though he could feel the tension from the more free-market rags when he brought up price controls. Távora felt Hélio Beltrão's presence just off stage. He was meant to deliver the finer points. He was watching from just beyond the curtain, stone-faced.\n\n"Finally, we will be enacting a wide-sweeping series of spending cuts for the duration of the ongoing emergency. Minister of Finance Beltrão will inform you of the specific cuts we will be making, effective tomorrow." The journalists immediately rose with questions, shouted from halfway across the room. Beltrão clenched his fist; Távora was meant to be much more specific than that. "We make these cuts," said Távora, his steel voice rising above the clamour, "with the utmost care. This government has spent millions to bring oil into this country to keep it from collapsing. We must all make sacrifices in the present to ensure our future."\n\nHe left out that most crucial, damning word: austerity. He said his goodbyes and walked off the stage. Then came in Hélio Beltrão, who was forced to speak such damning words."
 brazil_oc_tavora.3.a: "He cleared his throat, sweating before a braying crowd of journalists."
 
 brazil_oc_adhemar.1.t: "One Last Ride"
 brazil_oc_adhemar.1.desc: ""Blah blah," said Benedito Manhães Barreto, "blah blah blah. Blah blah Oil Crisis, blah." He pointed towards a neat array of lines and symbols. "Blah blah blah. Blah, blah blah..."\n\nAdhemar de Barros was sure that the man in front of him was saying words, something to do with the sudden and sharp increase of oil prices worldwide, but the will to comprehend those words eluded him. It was not only his health; he was now just the night watchman in the last few hours, waiting for the day shift to arrive and deal with whatever this mess was.\n\n"Blah blah," continued Barreto, pointing to more of those graphs and lines. "Blah blah blah, blah LTN blah, blah blah blah blah..."\n\nMaybe he had some kind of obligation to the state during the immediate crisis. Maybe his government could go out on a high note, but he was just a few months away from handing it all over. Barreto cared, so he would just sign whatever and let him deal with-\n\nWait. Somewhere, a word had floated up from the fog, and Adhemar had absent-mindedly caught it between his fingers. He observed this small thing, its brilliance and luminance, potential burning in his hand.\n\n"One moment, Barreto," said Adhemar, raising a weak hand. "You're proposing government bonds?"\n\n"Well, yes. We also have blah blah, blah blah and blah, but beyond all of this, we'll be using investment into the state via LTNs to maintain solvency. Anyway, blah blah..." Barreto knew that his near-death experience had taken much from Adhemar, and took his question as a sign that the old man was trying to follow along. He was so immersed in his own presentation that he failed to see his audience. Somewhere, an old devil's grin crept up on Adhemar's mouth."
 brazil_oc_adhemar.1.a: "Straight after the meeting, Adhemar placed a call to Banco do Brasil."
 
 brazil_oc_adhemar.2.t: "A Parting Grift"
 brazil_oc_adhemar.2.desc: "For a so-called secret meeting, it was anything but. If it was in the early days, Adhemar's gathering was a few Shell agents, German businessmen, and their ambassador to Brazil was bound to make the headlines howl. Finance Minister Benedito Barreto, the unwilling witness to this show, refixed his eyes between the board and his books. He wasn't just there to watch, but apparently also to keep it from blowing up.\n\n"Gentlemen," crooned the President without moving from his seat, "You can wipe the agitation off your faces, don't worry - you're not in trouble." The German delegation, glib and inanimate as ever, exchanged bemused glances. Barreto understood that was their equivalent of laughter. At any rate, the old man was fortunately still able to call the room to attention.\n\n"Yes, you have all your graphs and overpaid suits whispering in your ears a thousand different reasons not to invest in Brazil, even in our moment of need despite our aid in yours. However, this trade relationship is special, and definitely a better deal than the Argentinians will ever give you. My administration, though, has a proposition for everyone here to, well, find something they like. I invite you all to take a look."\n\nIn the end, he did not have to intervene at all, as it was not the meeting that mattered. The handouts may wax lyrical about Brazil's irreplaceability in trade, yet its desperate need for cash after burning through foreign reserves to buy oil. But Adhemar was here to withdraw his 'earnings' from state bonds, and convince German ambassador Robert Kirk to sign the cheque. All at the expense of taxpayers, who still did not blame him personally, and their futures.\n\nShame? Could Barreto feel shame at his role in this theft? No, he decided, not him. This circus was already running before he arrived, and he was on his way out with them."
 brazil_oc_adhemar.2.a: "You have to enjoy a show once you've bought the tickets, surely."
 
 brazil_oc_adhemar.3.t: "Rouba, Mas..."
 brazil_oc_adhemar.3.desc: "ÚLTIMA HORA - THE MASK SLIPS: REFLECTIONS ON THE BUDGET BLOODBATH\n\nAt first glance, it was just a panel of financial officials and routine adjustments. But for anyone with even a high school grasp of Brazil's economy, this week's budgetary conference ought to be a cause not just for concern, but despair.\n\nBarreto's grinning introduction of "price caps for diesel with special considerations for farming, fuel subsidies for public transport, 8% annualized returns on LTNs, and new negotiations on offshore oil exploration with the private sector" served as brief and unpunishable remarks, but vociferous backlash returned: from UDN even to the PTB, officials decried the move as reckless, a desperate attempt to hoodwink Brazilians.\n\nThe incoming administration is now shackled with unsustainable commitments that are difficult to address without shattering economic credibility. It was, after all, a preying on our desperate nation's need for good news now, and suspiciously local Paulista outlets were the only ones called to ask questions. No matter how generous this financial package appears, these policies can only realistically remain in place for a few months.\n\nThe reevaluation to 8% for LTNs, the source of much of the skittishness in economist circles, represents just how fragile the Adhemar economy has become, as it becomes even more difficult to borrow than ever before. It is not an announcement to benefit working people, but to whitewash their legacy of impoverishment.\n\nThe PSP, in creating a difficult situation for their successors, have done so at the expense of the people for whom they are meant to govern. It is no longer stealing yet doing, but just stealing: even their initial platform has been pilfered."
 brazil_oc_adhemar.3.a: "How conscientious of them."
 
 brazil_oc_adhemar.4.t: "O Globo: Friendly Fire - MF Makes Sweeping Final Reforms"
 brazil_oc_adhemar.4.desc: "Chaos in Brasília this morning as reactions come in to an assorted panel of Banco do Brasil and Ministry of Finance officials that announced an extensive financial packet of reforms yesterday, approving vast new economic programs, branded by even some PSP members as "partisan self-suicide".\n\nMinister of Finance Barreto made the changes known in front of an uncritical press corps and announcing price controls on diesel and similar agricultural necessities, fuel subsidization for public transport in major cities, and the issuing of new LTNs with annualized returns of 8%, arguing that "Brazilians have suffered long enough," and that "it is time for their prayers to be answered."\n\nThe move has naturally invited cross-partisan criticism, even including parties advocating for large spending increases during the last election such as the PTB. UDN official Hélio Beltrão was on the airwaves last night castigating the moves. He saw the moves as saddling the government with bonds that cannot be paid off for decades, and will surely only encourage opportunistic and unsustainable buying.\n\n"The increase in LTN returns is an invitation to anyone with enough money to burn to do it now, and spits in the face of every other working Brazilian that will have to foot the bill. I have never seen in my years of dealing with state economics a decision that so clearly strains an incoming government of the same party. I have very little sympathy for Mr. Vargas Jr., but it appears as if this administration has robbed the future of its own party."\n\nA PSP official, who wished to remain unnamed, seemed to express more fury than bewilderment speaking to O Globo today: "Frankly it's selfish, it's reckless, and it has the same amount of sense in it as jumping into the Marginal Tiête. Nearly everyone in the office is asking the same question: 'Why would Adhemar do this?"
 brazil_oc_adhemar.4.a: "Well, we deserve something at least for working so hard, no?"
 
 brazil_oc_adhemar.5.t: "Another Day"
 brazil_oc_adhemar.5.desc: "For Francisca, it had been just another day. Another day working by the docks, another day of struggling to sell her wares, another day of braving the ocean winds, of struggling to maintain her ship for only a limited pay. As she opened the door to her apartment, she practically collapsed inside, falling onto her sofa as she dropped the bags around her, carrying only a few groceries. She had thought of getting more, but wanted to wait until after receiving her paycheck to purchase the barest essentials.\n\nAnother programme. There was a new face, one she couldn't recognise, being given an interview by a reporter on operating a nearby museum. The same figures dominated the rest of the schedule, pushing forwards the same perspective and views. In a sense, this was Brazil. Despite everything that had happened around her, and even with the ongoing global crisis, she knew that nothing had fundamentally changed. For better or for worse, this was still Brazil.\n\nAnother topic. This time, the focus was on a recent announcement for a new LTN, this time based on the Dollar. The three talking heads, huddled around a small table, prised the question apart. Was it wise, asked one, a reporter who had previously worked in Lacerda's campaign, to announce it so soon? Was it prudent, questioned another who owned a logging company in the Amazonas, to base it off of the dollar instead of the yen? Was it not smart, responded the spokesman in the centre, a deputy in the PSP, to support this?\n\nAnother thought. Did it matter? She didn't care to know much about any of these figures, but she knew where their priorities truly resided deep down. She knew that they were really as corrupt as Adhemar was, that their predecessors had been since before Adhemar had governed São Paulo, and that their successors would be as corrupt when Adhemar left office. Regardless of the outcome, her life would only get worse whilst those above her would simply get richer."
 brazil_oc_adhemar.5.a: "For it was just another day in Brazil."

 brazil_oc_aleixo.1.t: "If Only Adhemar Was Here"
 brazil_oc_aleixo.1.desc: "Laughter erupted around the room. Natel attempted to recall what the joke was, but in the thick haze of conversation among the diners around him, he had only partially heard the joke. Natel filled in the gaps and quietly laughed, turning to a person sitting next to him, with an attempted expansion. He laughed politely, then turned elsewhere, continuing a conversation he had been having since entering. Natel, cringing, simply turned back to his meal.\n\nAs he bit down, however, Natel's mind wandered back into dread. How had Adhemar managed this? He had been with Adhemar before, but his charisma was seemingly bottomless. Of course, he had been in the right crowds for decades; he was friends with so many magnates, but he had a way of speaking that eluded everybody, himself included. Sometimes, Natel could still hear Adhemar giving him advice, laughing at his jokes, yelling at his failures. If only, he wished, Adhemar could still speak for him.\n\nThe reports continued to circulate in his head. Graphs showing how few production quotas for coal had been met in Santa Catarina interspersed with briefings of organised protests in Maceió, timetables filled with meetings and photo opportunities across Rio de Janeiro plastered over newspapers from Pará and lists of companies to look out for in Goiás. Natel knew how it worked, and knew where to work. But how? He had left his Palace to remove himself from work, but he realised now the futility of that effort.\n\nHis hands worked their way through his pocket as a waitress strolled by. He still had a checkbook, and a vast sum of money in his hand, but his expenses weren't getting smaller. Bribes that once had excited even the largest companies were waved off by the smallest ones. His mind, once again, returned to Adhemar. How had he managed to keep this machine together? How did he keep the turning cogs from buckling? He looked down at his meal, a plate of soup with morsels half chewed, and thrice submerged."
 brazil_oc_aleixo.1.a: "The Midas Touch rusts."
 
 brazil_oc_aleixo.2.t: "Onshore Exploration"
 brazil_oc_aleixo.2.desc: "As the sun set once more over the streets of Brasília, two black cars drove through a northward motorway, hearses for past ideas. The light around them grew orange, and then a yellow faded by blackouts before they finally stopped, halted by a crowd of cars wasting what oil they could ration. "How could he reject our plans to explore the Atlantic, Fernando?" asked one, practically shouting. "He knows how many of us are ready out in Pernambuco. Does that idiot really know what he's doing?"\n\nFernando cursed Aleixo's name under his breath. "We know where the oil is, he knows the market is in Rio Grande do Norte. And Aleixo wants us on a wild goose chase in the Amazon instead!?" He barked at the driver as they continued to stall. "I'm already getting warnings of other investors leaving companies in Maranhão, and I've pulled my stock from companies in Bahia." whined a third, his jeers targeted against the driver and Aleixo drowned out by horns. Unnoticed by either, the other car drove past, turning right as its intersection split.\n\n"I'm shocked that your plan worked, Émerson." said the older of the pair, his eyes noticing his counterpart. "I am impressed." The younger drank from a glass of wine before offering a cigar to those around him, an act of charity gladly taken by all. "I knew he'd listen, Dad. We might find some oil in the Atlantic, but they'll always be on life support. Aleixo had to realise the value of building new towns around oil reserves in the Amazon."\n\nA third investor waved a thick wad of bills in his hand, passing a handful forwards to the driver, and then single bills to his fellow investors. "When we get back to Manaus, Émerson, you choose the restaurant!""
 brazil_oc_aleixo.2.a: "The foundations of two worlds crumble beneath them."
 
 brazil_oc_aleixo.3.t: "Knowing When to Ask for Help"
 brazil_oc_aleixo.3.desc: "[BRA.GetLeader] walked out of the meeting with Petrobras, the board of directors still an unfamiliar sight to them. Most of the old hands were still there, but they were off to the side. At centre stage were a new crop of bright young things, engineers and managers of a new generation. Some of them weren't Brazilian by birth; some of them wore different pins on their lapels. They were all here to determine what kind of oil could be found in Brazil.\n\nThe meeting began with a wide-view look at the problem. Projected on the wall was a map of South America, oil wells and offshore rigs dotting it, marking the current presence of oil. A crescent of tapped oil ringed Brazil, contrasting their own lack of facilities. It was not, as the Petrobras executive reminded them, laziness or a lack of foresight: everywhere else in South America had oil, yet Brazil seemed unnaturally dry.\n\nThe Shell executive then stepped forward. They reassured the President that there was no lack of oil within Brazil's borders, but that it had remained hidden by the exploratory techniques of yesteryear. One may as well have broken out the dowsing rod, for all the good it would have done. But the next thirty minutes promised Brazil's salvation: new technologies and processes from experienced oilmen that promised to discover what the earth had hidden from them.\n\nFinally, representatives from the Ministry of Finance rose. Their report was succinct and impactful, and the reason why the Shell execs had signed an NDA before they could enter the building: the longer the Oil Crisis ran without Brazil locating oil, the more their foreign currency reserves bled out in search of oil. Government spending was caught in a cycle of borrowing foreign currency to pay for more oil. The need for some kind of energy security within their borders was immediate and pressing.\n\nIn the Petrobras building, [BRA.GetLeader] leaned over the railing, watching harried clerks and short-tempered managers course through its hallways and atriums. There had been a lot of sleepless nights in this building; even from this distance, the President could see the bags under the eyes of so many workers."
 brazil_oc_aleixo.3.a: "Hopefully, Shell's help would give them a reason to find some rest."
 
 brazil_oc_aleixo.4.t: "Aleixo's Thin Plan"
 brazil_oc_aleixo.4.desc: "As dawn approached, a shop clerk sorted items into shelves, listening to the radio blare behind her. The reporter, in a flat tone, made reference to plans for the introduction of new price controls, placing a cap on how high prices could rise in a few key areas. Halting for a moment, she began making a move to the storeroom, only to stop once again as reports of their limits came out. She kept a few bottles of water to hand, but mostly out of a concern for general restocking.\n\nA few hours later, two industrial workers groaned, reading through their newspapers with utter shock. The price controls had indeed been announced, and looked set to be introduced, but to describe them as such was overly charitable. The loans were even worse - welfare worth mere pennies for the petty bourgeoisie. One made a comment to another, reading from an opinion columnist's headline joking that it was a price cap for the billionaires, the real proletariat. The other simply shook his head.\n\nAs the day continued, and as the shop clerk weaved his way across the aisles, his manager struggled to find room to care for the loan. A few thousand cruzeiro, due to be paid out in iterations over months. It'd take a few weeks for her to even receive the first payment; with how many cuts there were across the federal government, mail would struggle to recover. Snapped awake by a customer, she put the thought aside, not entertaining the notion of change beyond an opened letter.\n\nSitting at home, a radio blurted to life. A pair of pundits, both right-wing, lambasted the planned price controls as a threat to Brazilian stability. Not only were they interventions into the free market, one complained, but these loans would simply exacerbate inflation even further. The radio crackled as other channels interfered, but their despair echoed elsewhere, from the classroom to the boardroom, from the cafe to the soup kitchen to the restaurant. The plan had been introduced, and found no friends."
 brazil_oc_aleixo.4.a: "Death by a thousand cuts."
 
 brazil_oc_aleixo.5.t: "There and Back Again"
 brazil_oc_aleixo.5.desc: "There she was, again. Identical circumstances, yet different times, were upon Francisca. The policy package unveiled by the president was undoubtedly a lukewarm affair, even amongst her more hopeful friends. She hardly understood much of the economics behind such decision-making, yet everywhere she looked, there was little praise to be had of Aleixo's newest plans to "reinvigorate" the economy. Inflation would be condemned to the past, he said. Wages would soon rise. Brazil would recover.\n\nShe had seen this before too many times to count - this wasn't recovery, this was thinly veiled appeasement.\n\nThen again, she had long since lost any confidence in her government's ability to aid her lot in life, let alone plan out a long-term economic outlook for the future. Inflation would soon return, though one might argue it had never quite left. She knew her wages wouldn't catch up to compensate, leaving Francisca slicing into her budget to stave off insolvency. She had already lessened most of her meals and drove as little as possible to save on gas. Would it be enough, though? Her daughters in university likely had it so much harder, she could only imagine.\n\nFrancisca sat alone at her dining table, picking up a nearby newspaper and inspecting its classifieds. A second job might be needed to keep food on the table; the thought left a sour taste in her mouth. Hm. A bookkeep, perhaps? One was hiring just nearby, an electric utility office near the Engenharia Institute building. She couldn't help but sigh, letting her chin rest upon her free hand as she slipped deep into thought. Hard times, indeed. Just like old times."
 brazil_oc_aleixo.5.a: "A ceaseless cycle."
 
 brazil_oc_edna.1.t: "Bubbling Up"
 brazil_oc_edna.1.desc: "A fine mess you left me with, Adhemar, Edna thought. As the yellow-white light of her office bled into the cool night, the President sat with her head resting on her knuckles. Economic forecasts, intelligence reports, and newspapers were strewn on the desk in front of her.\n\nHer mind ticked away with a military precision - something she got from her father. There wasn't time to get lost in despair and rumination. The Oil Crisis was fast approaching, and it was Edna's job to handle it, plain and simple. If she did it well, the lingering ambiguity of her becoming President could be finally put aside, people would think of her differently. It wasn't just Adhemar or her father that thought about legacy.\n\nThings were formulating. Edna sprang into action, reaching for the pen and going down the list in her head of everyone who would receive a call from her before morning - ministers, industrial leaders and their counterparts in the unions, the regulators and prominent civil servants. The best defense was a good offence, the old saying was, and if Brazil could fast-track a response to the crisis before its full effects hit, the worst of it would be mitigated.\n\nEdna's tireless work was interrupted only when, while penning a memo to Petrobras that was following up on a previous memo to Petrobras, she noticed the morning sun had creeped through the window and warmed the back of her hand"
 brazil_oc_edna.1.a: "The first sleepless night of many."
 
 brazil_oc_edna.2.t: "The Program"
 brazil_oc_edna.2.desc: "The President's late morning press briefing was all over television and radio, the nation tuning in to hear of Edna Lott's sweeping plan to combat the Oil Crisis. It was a joint address with experts from the Comissão Federal de Abastecimento e Preços, or COFAP, the government agency in charge of price controls. The content of the briefing was quite dry and businesslike, with minimal rhetorical flourish, which put people in mind of Edna's father more than her direct predecessor.\n\nThe condensed plan was also published concurrently in the major newspapers, allowing people to better grapple with the size and breadth of it. The essential fuels like diesel, LPG, and kerosene were subject to a strict price cap, as was food and public transport. Rural farmers would be granted fuel vouchers to regulate need. Wary of an inflation spike, the government would borrow more, with a 3% increase in short-term Letras do Tesouro Nacional bonds.\n\nNobody expected such an extensive program to be put together so fast, and the plan's progressive bent irked the right-wing press immensely. Denunciations of the price caps followed in the usual circles, with more than one commentator bemoaning that Gomes should've gutted a Varguist relic like COFAP when he had the chance. Naturally, PTB-aligned outfits practically tripped over themselves to commend President Lott's ambition and dedication to the common people of Brazil during the crisis."
 brazil_oc_edna.2.a: "It's good to have a plan. It's better if it works."
 
 brazil_oc_edna.3.t: "Looking Offshore"
 brazil_oc_edna.3.desc: ""There's oil in Venezuela," mused Edna, her gaze lingering on the shimmering Atlantic, "there's oil in Colombia, oil in Peru and Ecuador. It couldn't possibly be that there's no oil in Brazil."\n\nAbsently, she shifted her weight on the balcony railing, high above the São Luís waterfront. Three Petrobras ministers, who lingered at the doorway, turned to each other.\n\n"Mrs. President, you should know that there has been some movement in the past few years in onshore exploration - Bahia, the Amazon." Said one.\n\n"However, under previous administrations finding new sources was not a huge priority, you understand." Another of the men added. The third nodded affirmatively along with his colleagues, though the President wasn't looking at them.\n\n"Evidently, times have changed." Edna's gaze ran across the blue horizon. "Venezuela's got plenty of offshore wells, and, according to your reports, Shell was looking into the same off the Suriname coast." She raised her arm in a commanding, almost military gesture. "It's out there, almost certainly. I want resources put towards offshore drilling, and fast.""Mrs. President, the cost-"\n\nEdna swung around. "I know what the cost will be. I've seen the projections. Petrobras was founded to meet Brazil's energy demands; now we're all going to be tested.""
 brazil_oc_edna.3.a: "Gentlemen, if there wasn't anything else - please report any findings to my office."
 
 brazil_oc_edna.4.t: "Hold Up Half The Sky"
 brazil_oc_edna.4.desc: "The sea wind snatched at the ash at the end of Francisca's cigarette, tussled playfully at her hair. On her face was a thin smile. She was enjoying the idea of the pigs from the customs desk waiting for the end of her break - help us with this, Francisca, they'd say, do this for us. She wondered if Edna felt the same, navigating the machismo of all those politicians and businessmen in the capital.\n\nFrom where she stood, the last five years had come and gone without much fanfare; the cargo ships waded into and out of port as they always did, containers were stacked, cranes went up and down. The big exception to the monotony of course was her children becoming adults, and the world they had grown into was dramatic indeed. Francisca remembered when that grinning Paulista became President, his first TV address - he looked like a salesman for hostess trolleys.\n\nAfter everything with Adhemar, the Edna Lott presidency was a pleasant surprise, and Francisca liked the way she carried herself, the big plans she had to improve the lot of ordinary people. And she really liked just now hearing on the office radio that she had been re-elected - or, she supposed, elected for the first time. It was a big thing - one of those history book moments. First woman president. It wasn't nothing.\n\nSomehow, Francisca wasn't that worried about the Oil Crisis anymore - that familiar pressure was absent, as was the encroaching shame of poverty. She didn't fully understand everything Edna promised to do to mitigate the crisis and save the economy, but she had hope. That wasn't nothing either."
 brazil_oc_edna.4.a: "My dear daughter Vitoria, you can do anything in this world."
 
 brazil_oc_edna.5.t: "Drop Half The Sky"
 brazil_oc_edna.5.desc: "The heartless sea wind snatched at the ash at the end of Francisca's cigarette, threw her hair back in her face. She sucked in her lips, trying to calm herself. When the election results came in over the office radio, she had been affected by it surprisingly strongly - she felt herself stand straight up and storm outside, muttering about 'taking her break.' She didn't want the idiots on the customs desk to see her upset. They'd take her quivering lip as proof that women didn't have the grit to deal with the business of politics. It was silly to get upset; in that way, they were right, it's just that Francisca had been rooting for Edna Lott to win, and she realised only then how deeply she cared about it.\n\nFrom where she stood, the last five years had come and gone without much fanfare, except that her children had become adults, and the world they had grown into was dramatic indeed. Francisca remembered when that grinning Paulista became President, his first TV address - he looked like a salesman for hostess trolleys.\n\nThe proceeding Edna Lott Presidency would be remembered as a funny little episode of Brazilian political history. Francisca couldn't imagine any other woman coming anywhere close to the Presidency. Well, nuts to all that - it was nice while it lasted, and she wouldn't forget how it felt, seeing a woman like her, a mother, occupying Brazil's highest office.\n\nThe election news was compounded by the growing crisis about oil, how that would affect everything. When she thought about it, Francisca ran through a list of essentials in her head, and thought how essential all of them really were. Her son had found a decent job, perhaps he would lend her some money. It was a distasteful idea, one that made her pull her belt just a smidge tighter."
 brazil_oc_edna.5.a: "My dear daughter Vitoria, I'm sorry that we let you down."

 # 1968 Election Season Begins
 brazil.509.t: "Election Season"
 brazil.509.desc: "Another three years have passed, and once again Brazil's political parties are gearing up for election season. As is customary, one third of all Senate seats will be put up for election - roughly one for each state.\n\nWith the PSP having established itself as a viable electoral force alongside the like of the UDN, PTB, and PSD, the polls look to be a lot tighter this year. In addition, for the first time in its history the integeralist PRP are launching an organized nationwide campaign. Whether this will be a success or not is down to the voters, and how they choose to shape Brazil's future."
 brazil.509.a: "Vote UDN!"
 brazil.509.b: "Vote PSD!"
 brazil.509.c: "Vote PTB!"
 brazil.509.d: "Vote PSP!"
 brazil.509.e: "Vote PRP!"

 # Amazonian Deforestation

 BRA_deforestation.1.t: "No More Fish"
 BRA_deforestation.1.desc: "Maniwa stood knee deep in the water. His eyes were tired yet here he still stood looking for a sign of movement in the murky water. Every day it seemed like the water was murkier and the fish were fewer. Every day. In the swirling mud at least he could find a moment of respite. Things had started to look up. He barely remembered the measles outbreak that so reduced his tribe but he could see the hurt on his mother's face still. There had been days where he had caught a bounty of fish. Those days however seemed long gone. The hardship she had known he was coming to know.\n\nIt started with the tractors, the power lines and bunkhouses. The boots and the workers. They were building a highway. Politicians had said it would be a life giving artery but here he was with no catch to feed his family. As he walked forlorn back to his village with a single fish in hand he looked at the treeline. It had been retreating year on year and now he could see the beasts roaming the now dead forest. Brown, grazing every so often. He wondered where all that meat went."
 BRA_deforestation.1.a: "As the fish retreat the cows come home."

 BRA_deforestation.2.t: "The Last Stream"
 BRA_deforestation.2.desc: "Year on year, month on month like a wave receding the trees fell back. The lands only they had known became known to others and unknown to them. All that remained lay separated from their world by a single stream and there were already makeshift bridges and scouting parties threatening to push even further. A small party of theirs made out into this now unknown land with their strange dwellings. Through the treeless forest they went and spoke to the local forestry commissioner. In a room filled with strange smoke from a cigarette they pleaded their case, and then they were forced to wait.\n\nIn the meantime the ranchers decided to halt their advances. The scouting parties ceased for now as the situation hung in the balance. In the end the forestry minister reached a split decision. He rejected the appeal from the tribe but even in that smokey room he could not live with ruining the lives of the tribe who came to him directly. If the ranchers continued then there would be so many other issues to deal with. On his desk was a memorandum he had written to the Serviço de Proteção ao Índio, the SPI. It called for a cessation of deforestation around their villages noting the substantial depletion of the rainforest in that area. He took another drag of his cigarette and got back to reviewing other forestry permits. After all, even if forestry could not continue here there were always other places to log."
 BRA_deforestation.2.a: "They will not cross it. For now at least."

 BRA_deforestation.3.t: "The River Eternal"
 BRA_deforestation.3.desc: "His body was carried back to camp by his tribe to a temporary home — a permanent grave. Spear wound, a rarity that would become increasingly common in the coming days. All the other dead men and women buried deep found their end with bodies occupied by foreign lead, the unsaid warning for the approaching invasion of their land.\n\nIt first was a trickle, then came the flood. Logging operations tore down their homes as the families who came out were met with the might of the Mauser — the only clarion call to vacate. Spears and arrows provided their response — some felt like they killed one or two of the rancher's thugs — but any victory on their behalf was wholly pyrrhic.\n\nTheir warriors were slaughtered in the first battle of the war, taken by surprise as the self-proclaimed forces of civilization took their homes. After that first glorious salvo, they were on the run. The only advantage they had left was their knowledge of the beautiful land that was rapidly losing the meaning of home. Still, it was only a temporary advantage — and one that other enemies shared.\n\nThese days, they were not fighting the murderous government-sponsoredproxies of the ranchers but their fellow tribes. Their long march led to skirmishes with others — a spearhead lodged in someone's throat — the bloody gurgles of the almost-dead — a mother crying for her lost son. They would return for revenge, but what could they do but press forward?\n\nNow they stood. The wounded who had expired upon or after revival found themselves buried. Memorials were placed for those whose corpses would be bulldozed into the Earth, now only nourishment for the soil. All that could be done is to wait by the river — waiting for a fresh new hell to confront them..."
 BRA_deforestation.3.a: "...knowing there would never be enough land to sate their greed."

 BRA_deforestation.4.t: "Look at Us Now"
 BRA_deforestation.4.desc: "It was inevitable. Their latest plot of land, formerly known as home, had been seized by men who waved their papers and guns in their faces. Faces pointed deep into the Amazon, they marched until their feet were bloody. Other tribes watched on unsympathetically, all with one thought circulating their minds: "Better them than us," knowing the same fate would eventually come for them.\n\nDisease stalked them along the way to their new home, in truth, only a place to lay their heads. This time, they weren't met with hostiles but those who took pity upon them. Riddled with illness, the tribe could not refuse the condescension of the Church, treating their members with what little they had. Any pride left had evaporated. This was their subsistence — charity — their life support.\n\nThe Church was content to whisper sweet little proselytizations into their ears as they tended to their wounds, gathering a few more believers for the flock. The preachers left, their calling card consisting of a half-dozen small black leather-bound Bibles. This would not be their only visitor.\n\nA man from the New York Times, his ill-suited clothes covered in mud, visited them. His pen and paper jotted down their situations, their hardships, and their memories, all singing out of broken faces. They told him everything, and in return, they were given a pittance. They could not say no but remained hopeful his story would tell the world of their plight.\n\nExiting into self-proclaimed civilization, the journalist made his way to a fast-food outlet, a recent addition to the locale thanks to the efforts of hard-working ranchers. He walked inside and sat down, ordering off the menu one very reasonably priced hamburger. The wrapped piece of greasy meat was devoured whole by his maw before leaving. The tribe would never hear from him again."
 BRA_deforestation.4.a: "On Page 34, a tiny column on the tribe is buried next to an advertisement for McDonald's."

 BRA_deforestation.5.t: "A People Denied"
 BRA_deforestation.5.desc: "How could a land he lived in his whole life become so alien to him? The tribal elder had known nothing else but this forest, and now it seemed he would outlive the land that gave his people their power. Scavengers and thieves extracted every ounce of pride, every inch of their soul, and the worst part was he barely knew why.\n\nConflict between other tribes happened, but he could at least understand why it did. They suffered the same attacks as his tribe, growing slowly more insular day by day, territorial of what beautiful land still remained theirs. How could he blame them? They saw what was happening to his tribe.\n\nThe only help left for them was from the ever-so condescending missionaries from the Church. Every member of the tribe bar him had left with their assistance. They may have protested, some may have held out for longer than others, but as another rancher took away another part of their life, another life seemed preferable.\n\nHe knew it would only be a death of another kind, a delayed passing of everything he held true to his soul.\n\nMaybe they still had time for a new life, but not him. He would not let this world continue to rob him of everything. He would stand here as the invaders arrived and let them bear witness to the last representative of his people. Whatever happens next, the forest will consume him and his memories, and he will be remembered by it eternally, if by no one else."
 BRA_deforestation.5.a: "Stripped of everything but his identity, a final possession delivered with him to the grave."

 BRA_deforestation.6.t: "The Priest and the Estranged Congregation"
 BRA_deforestation.6.desc: "The church creaked. The roof still had a couple of leaks that were being tended to but the janitorial staff were doing their very best to make the hall fitting for the press. There were rows of chairs laid out and Wilson Pinheiro and his men were laid out neatly with a row of tables in front of them. It was complete with name cards and even a banner that read "Brasiléia Rural Workers Union," the name they had settled on. Yet most of the chairs were bare. It seemed as though a handful of local journalists reporting news in Acre were the only ones who had turned up. As minutes passed Pinheiro decided to start. There was some press here. It would not be all for nothing. He knocked the microphone in front of him. He had expected the loud noise it would make but was nonetheless taken off guard by it.\n\n"Let's begin then. I am here before you as a humble rubber tapper. They may call me a traitor, a backwards thinking old fool who can't understand the times today. But I'm here to tell you that I just want to protect my livelihood. The ranchers as they spread out slashing and burning their way across the jungle stand as a direct threat to me, to my family, to our future. We do not intend to stand by and let them destroy our livelihood."\n\n"Today I am pleased to announce the formation of the Brasiléia Rural Workers Union, and we will use this new union to ensure we have a future here with our families on our land. To all of you, rubber tappers, farmers in the jungle, all of us who make our lives in this jungle you are not alone. Together we can ensure a future for all of us, if we just work together we can save our land, our homes, our future."\n\nHe stopped. There was scattered applause from the other associates from the Union, his comrades. The priest also offered applause. Yet there was something so lonely in standing up for change in such a church with no congregation."
 BRA_deforestation.6.a: "The embers of change are often lonely."

 BRA_deforestation.7.t: "Lives and Livelihood on the Line"
 BRA_deforestation.7.desc: "Never before had so many people been in this place before. The Rural Workers Union was out in force, marshaled by their leader Wilson Pinheiro. They moved as one to intercept another army. They knew this was where the loggers were going to hit next. Scouting parties had been penetrating into this part of the jungle for weeks. They had already started to destroy the forest, pushing deeper and deeper into the once untouched land. Land that was legally off limits to any further logging operations. Not that the law would stop the loggers, but perhaps the bodies of the rural workers' union would prevent the loggers from reaching their goal. That was the intent of the union, as they lined up, filling the roads preventing the passage of any vehicle. The logistic lines cut they turned to the loggers currently at work. A single brave union man even put his body before a chainsaw, his life put at risk to protect his livelihood. In the end the forest remained.\n\nA journalist for the local A Tribuna newspaper stood and saw the protest taking place. He had heard of the establishment of the Union from a news column far down on one of his competitors. He had written them off as another fringe movement unlikely to make much real progress. They were standing against the ranchers, the loggers, all of those large industrial interest groups. Yet while their enemies were richer with more connections at the end of the day there was no substitute for raw human bodies as he thought about how to word his report on the event.\n\nPast the forest and far out of earshot of the commotion the tribe continued to live in relative peace. Able to find nourishment in the bounty of the still untouched rainforest living as their ancestors had for generations before them."
 BRA_deforestation.7.a: "They'll have to go through us!"

 BRA_deforestation.8.t: "Cigarettes and Cigars"
 BRA_deforestation.8.desc: "The detective dragged on his cigarette as he began his examination. A single gunshot wound to the back of the head noted as the likely cause of death. His body was slumped down to the side, in a fetal position. This was not a murder was his first thought, it was an execution. Lying in an alleyway with the door of the rural workers' union just out of eyeshot. So it goes, hardly an uncommon story in Acre today.\n\nJust this week there had been another case. Two members of the Brasiléia Rural Workers Union had been found dead in a ditch by the side of a dirt road. The injuries lined up perfectly. Gunshot wound to the back of the head laid in their side like this. The positions as if released from restraints betrayed the manner of the murder. The manner of the execution. The week before that too. Blood running down our streets.\n\nThe blood itself running into ditches and down alleyways. He let out a sigh as the previous cases had conditioned him to know that the investigations would be short. He could already see the Police Chief sitting in his chair, cigar in hand, commenting about how muggings always seem to end in murders these days. Maybe he'd ask me to blame rowdy teenagers that time. Maybe an escaped bull from a ranch. So he gave his report once again, and once again he was told to investigate local criminal gangs. Yet he had resigned himself to the same investigation as before. Even with the brazenness of the murder, the stature of the victim it was the same.\n\nHe thought about it, about asking the ranchers and trying to identify the bullet casing he had found. Were he to, then the next bullet casing would be laid next to his own lifeless body. He took a drag of his cigarette and got to work. The fires of another controlled burn at the edge of a rancher's field raged on. There were no protests, no men in front of chainsaws this time. If the ranchers were good at anything it was clearing anything in their way after all."
 BRA_deforestation.8.a: "And so the smoke hangs in the air."

 # 1968 Election Season Ends
 brazil.510.t: "Brazil Votes"
 brazil.510.desc: "Campaign signs are being torn down, polls are emptying, and radio broadcasts are now all focused on the count. All at once in Brazil, votes are being counted while the nation watches in suspense, a winner should be clear soon."
 brazil.510.a: "The votes are tallied..."

 BRA_quadroshundreddays.1.t: "The Opportune Hour"
 BRA_quadroshundreddays.1.desc: "When Jânio da Silva Quadros had last left the presidential office in the Planalto Palace, he had not truly thought upon the possibility that he might never return to it as Vice-President. In fact, even though Quadros had been fairly certain that Lott's fall would lead to him taking power, Lacerda and Adhemar's plotting made it such that even his ascension to the presidency was something of a surprise.\n\nIn the end, it mattered not. Quadros was now President; his first act upon entering the office that was now his was to order an aide to grab a disinfectant and a paper towel so he could clean up the chair.\n\nThe aide left, and Quadros fell into a reverie. All the moments in which that fool Lott had ignored his advice came to mind. When confronted with such folly, what choice did he have but to be better? He swore before God that he would be a better leader for Brazil than that wretched general ever could. The broom would sweep up the shards that the golden sword left in its fall.\n\nWhen the assistant returned Quadros took the cleaning implements and immediately went to work on the office chair, not only cleaning the seat but its back and legs. A look of bemusement crossed the young bureaucrat's face. "What are you doing, sir? Why clean it again when the cleaners already took care of it?"\n\nQuadros shook his head in dismissal, saying, "It has to be done.""
 BRA_quadroshundreddays.1.a: ""This chair is filthy - it has been infected by devious buttocks.""

 BRA_quadroshundreddays.2.t: "Learning of The Corrupt General"
 BRA_quadroshundreddays.2.desc: "Lorenzo Moura thought of himself as a rational man. He worked hard, had a nice family, earnt a good wage and had respectable hobbies practised with his normal friends. Being such a man, despite his political ignorance, he knew that the only political party that could truly serve Brazil was the UDN, and that the others were all corrupt, incompetent, or socialists, facets that he loathed. Whenever he did learn of their failings, he couldn't help but feel angered.\n\nBREAKING: HENRIQUE LOTT FOUND TAKING BRIBES IN BRASÍLIA\n\nMoura saw red. He was always suspicious of Henrique Lott, and had heard some dire rumours about his corruption, but the detail that the article provided, explaining (not photographed only as Lott would've attacked the journalist) in a way practically insulting to the calm Moura, who couldn't help but shout in anger at the callous dishonesty of Lott, expecting to get away with such blatant abuse done in such a public manner.\n\nHOW WEALTHY IS LOTT REALLY?\n\nMoura was shocked. Lott was corrupt, sure, but he always at least painted himself as honest. This very article, though, clearly debunked that pervasive myth. It highlighted just how much of the funding for the Trans-Amazonian Highway had been syphoned off, paying for lavish parties at hidden mansions. Secretly, of course, Lott wasn't silly enough to party so openly. And yet, the press saw all.\n\nLACERDA ANNOUNCES INVESTIGATION INTO MILITARY CORRUPTION\n\nAt long last, Moura felt soothed once again. The past few days had been a blur for him, as he could scarcely believe the increasingly damning reports coming in about Lott's lavish lifestyle and plentiful abuses as General, and as President. To hear that Lacerda had finally been pushed into investigation affirmed his belief. After all, who of such moral calibre wouldn't?"
 BRA_quadroshundreddays.2.a: "In the boardroom, the Crow cackled that his opponent's legacy lay destroyed"

 BRA_quadroshundreddays.3.t: "A Budgetary Purgative"
 BRA_quadroshundreddays.3.desc: ""God, how I need a drink," Quadros muttered.\n\nThe source of his desire for alcohol this time around was the spending records of the previous Lott administration. As was the case whether or not Lott decided to take his sensible advice, the spending - especially on that asinine Trans-Amazonian highway to the tenth circle of hell - was always simply appalling. "It's all so tiresome, I tell you," Quadros said to the aide handing him his papers.\n\nFortunately, Quadros thought, he could at least do something about this mess. Aside from slashing the spending on Lott's damn fool project, he could do something yet better to ensure there was no wrecking in response to his plans.\n\nQuadros noted the names of the people mentioned as principals in the execution of the project, then connected them to a list he had of corrupt officials and businessmen involved in project-related graft. From here it would be relatively simple: if they did not comply with his directives to cut costs, he would simply reveal their corruption schemes to the Brazilian body politic.\n\nAs he started to write out the telegrams to the various officials he was about to threaten, he felt the irritation returning. So he issued an order to the attending assistant:"
 BRA_quadroshundreddays.3.a: ""For God's sake! Get me a bottle of strong whisky. What a thrice-damned awful project.""

 BRA_quadroshundreddays.4.t: "The Pull Away"
 BRA_quadroshundreddays.4.desc: ""Soldiers! By directive of the President of the Republic, we are now to withdraw to base and end our contribution to active combat. It is the sentiment of the Government and the Ministry that further involvement in the South African conflict is not opportune for us."\n\nLuizinho knew what that meant: that man Quadros was planning to bring the soldiers home. It was probably for the best, Luizinho thought; fighting was not something he wanted to make a lifetime job out of. Besides, it was good to have a chance to avoid adding to the nightmares he was already having.\n\nA convoy of trucks came to his camp to pick him up and help dismantle his company's setup. Some American friends of the company had come by to bid farewell. Luizinho talked with his officer and convinced him to leave behind some useful odds and ends for them as thanks for their camaraderie.\n\nIn the end, Luizinho thought as he got into the truck and looked back, it was for the best. The Americans would hopefully be able to pick up the slack anyway.\n\nBut despite the upcoming joy of going home and never having to go through a battle again, he could not shake a feeling of guilt, or the fear that he was abandoning his American comrades."
 BRA_quadroshundreddays.4.a: "Such feelings were common throughout the withdrawing Brazilian forces."

 BRA_quadroshundreddays.5.t: "Further Inward?"
 BRA_quadroshundreddays.5.desc: ""Ladies, gentlemen, delegates of the Organization of Free Nations. Today, in accordance with the directives issued by Brasília and Itamaraty, I must inform you that due to a reevaluation of domestic priorities and the general situation within the Brazilian Republic, we cannot commit to regular attendance of OFN Council meetings at this time."\n\nAt this point, the Brazilian ambassador to the United States visibly put down his speech paper. Knowledgeable people in the audience knew why that was: that maniac Quadros probably wanted the Ambassador to hurl insults at the OFN and the United States. Not only was that foolish, it was not a sentiment the ambassador shared.\n\nThe diplomat continued: "Reassessments of Brazilian priorities have played out in a manner many would legitimately deem unconventional, and the response thereto is certainly, shall we say, idiosyncratic and unique. However, I can make very clear Brazil's commitment to democracy, freedom, and the preservation of Brazilian-OFN cooperation to the maximum extent possible without compromising our national interests."\n\nOn hearing that the Secretary of State, also in the audience for the day, smirked. Though Quadros was too much of an idiotic drunk to comprehend such veiled wordings, the Secretary understood what the good Ambassador was saying. "Ah well," America's chief diplomat muttered."
 BRA_quadroshundreddays.5.a: ""At least some Brazilians are still sensible these days.""

 BRA_quadroshundreddays.6.t: "Yet Another Drunken Diktat"
 BRA_quadroshundreddays.6.desc: "It was 10 a.m. in Brasília. For some reason, to the bemusement of the aide that went into the presidential office in the Planalto Palace, President Quadros was already well into his sixth caipirinha of the day. The aide's mouth opened to say something, but then he thought better of it and simply handed the document over.\n\n"Sir, this is a report on an opposition congressman, a Pessedista, who is suspected of receiving bribes from national companies." Quadros immediately sat up straight, or he would anyway if he was not rather... tired and emotional. "What?! You n-n-n-n-eed to shend the polishe in. The military! G-get that bashtard arreshted! At onshe!"\n\nThe assistant had feared the President would say that. He tried to get him to calm down: "Sir, that isn't how it works, we need to have an investigation by the pertinent authorities. If we just arrest him we'll get accused of abuse of power. Do you-"\n\n"NO!" Quadros shouted, cutting him off. "You imbeshiles, we will d-do it my way! Now the two, no, four of yoush get the fuck out of here at onshe or I'lls have you all fired, by the Bleshed Virzhin!" There was only one aide in the office with Quadros.\n\nRaising his hands placatingly, the aide quickly backed out for his own safety and to avoid getting fired. As he left the only thought in his head was..."
 BRA_quadroshundreddays.6.a: ""F-four of me? God, he really is drunk.""

 BRA_quadroshundreddays.7.t: "Clean Hands"
 BRA_quadroshundreddays.7.desc: ""As such, after days of thorough investigation inside presidential candidate Adhemar's mansion, the federal police have concluded that the governor has received no irregular money. The investigation has now been called off, and Adhemar has told us that he was never worried about anything and that-"\n\n"What a bunch of buffoonery." Quadros exclaimed as he furiously turned off the radio. "You're telling me that not a single cent inside that wretched safe is tainted? For the love of God, stop jesting!"\n\nIt was clear to the bespectacled President that putting down the bull would not be an easy task because now he has to fight the country's police force to successfully sweep away the evil that tainted the beautiful streets of São Paulo. Even a baby would know that Adhemar bribed the police officers to fend them off.\n\nAfter adjusting his glasses and cleaning off his face, Quadros got up and waltzed off his office towards the phone lying on a table outside his office. On the other side of the phone was a man named Carvalho Pinto, the honorary President of MPJQ, Quadros's master plan to dominate Brazilian Politics."
 BRA_quadroshundreddays.7.a: "The time to rally the people has come."

 BRA_quadroshundreddays.8.t: "An Economic Conference"
 BRA_quadroshundreddays.8.desc: "Jânio Quadros swaggered into the room where the economists in service to the Brazilian Government were conferring, dressed in a set of white slacks with matching white shoes more fit for a walk in the jungle than the uniform of the President. The economists looked at each other for a moment and silently agreed not to say anything about it; at least the man wasn't drunk.\n\nQuadros took advantage of their silence to have the first word. "Gentlemen, you are aware that thanks to me the Brazilian economy is at last headed towards something resembling prosperity. My measures have successfully cut down on inflation, and the influence of those whoreson mountebanks in the PSD over our state-owned companies and our government is being reduced; surely you gentlemen agree that we are clearly on the right path."\n\nAn economist spoke up in reply. "Yes, sir, your methods do in fact show promise, but there is one thing we want to recommend. We think it might further stabilize the economy if you sell some of the state companies' shares to private investors."\n\nAt that the President went from cheerful to outraged. "What kind of Jacobinical, demoniacal, reprobate suggestion is that? Selling off the state companies to private investors?! Absolutely not! If I do something as inane as that, those stocks will fall into evil hands!""
 BRA_quadroshundreddays.8.a: "The economists tried and failed to hide their worry."

 BRA_quadroshundreddays.9.t: "Quadros' Call to Arms"
 BRA_quadroshundreddays.9.desc: ""PEOPLE OF BRAZIL!\n\nIn the recent days since the fall of the feckless general Lott from the Presidency and my ascension in his place, I have taken many important measures to protect the economy from the depredations of foreigners and corrupt men of the Establishment.\n\nWe have moved decisively and have successfully cut down on inflation, and the influence of the mountebanks that formed the previous administration over our state-owned companies and our government is being reduced. But the supporters of the old, degenerate, Godless order are not powerless.\n\nDay after day in the National Congress and throughout the halls of power in Brazil, the congressmen and senators of this Republic, concerned only with themselves rather than the common welfare, have consistently sabotaged the measures proposed by my government.\n\nTherefore I call upon you for your assistance in this crucial time. I ask you to pressure your elected representatives to listen to my counsel and save Brazil from disaster before it is too late.\n\nJ. QUADROS\nPRESIDENT OF BRAZIL\n\nThis announcement was in a newspaper. Some people, mostly Jânists, went out and did as Quadros said. Others had only the following in reply:"
 BRA_quadroshundreddays.9.a: ""Huh?""

 BRA_quadroshundreddays.100.t: "Passage of the Anti-Restriction Act"
 BRA_quadroshundreddays.100.desc: "Surrounded by the men of the recently-formed Movimento Popular Jânio Quadros, Quadros harangued an adoring crowd at a rally in São Paulo in the aftermath of the passage of the Anti-Restriction Act.\n\n"Ladies and gentlemen, good Paulista citizens: this day, we have done a great thing! We have passed the Anti-Restriction Act!" The people applauded and screamed their approval, but Quadros kept talking over them.\n\n"Yes, we have passed the Act, and with the grace of God we shall pass more still. There is still work to do, as you all know; I still have a crusade to fight within the halls of Brasília. The Godless infidels, enslaved to their own interests, will continue to chain Brazil to economic restrictions so they can fill their own pockets with money while the average Brazilian is devoured alive by inflation unless I am there to stop them!"\n\nThe crowd cheered. Meanwhile, two passerby economists from the local universities looked at each other in concern as Quadros continued to shout. One said to the other, "If he uses this little success of his to expand state-owned companies, I shudder to think about what will happen to the economy."\n\nThe second economist sighed and shook his head."
 BRA_quadroshundreddays.100.a: ""Agh. I share that fear.""

 BRA_quadroshundreddays.101.t: "Failure of the Anti-Restriction Act"
 BRA_quadroshundreddays.101.desc: "Quadros had failed a legislative project. His default coping mechanism in a case like this was to drink and drink hard while lolling about in his office chair in the Planalto. This time around his drink of choice was beer rather than caipirinha.\n\nIn his drunken rage, he began to curse people out that were not in the room with him. Campos and Lott were his most frequent targets. "That N-nazhifashshisht gommunisht Proteshtant atheisht whoreshun Gamposh, if he had just d-done his fuuucking duty and gotten enouf fucking votersh..."\n\nSomeone opened the door, but Quadros paid it no mind.\n\n"And that fucking zheneral Lottie, if he'd, he'd, he'd not made thoshe motherfucking restrictionsh in the firsht place I wouldn't be having this damned problem... eh, w-w-what's thish?" Seven glasses of water connected to seven hands had emerged in front of his eyes. Quadros looked up and saw seven aides, who all looked the same.\n\nThe officials said, "Sir, might you take some water instead? This beer won't be any good for your health long term."\n\n"Rubbish-sh-sh-sh! N-nonshenshe! By the A-a-a-apareshida,"-here Quadros interrupted himself to gag-"water'zh only good fer, fer washing carsh! The seven, no, fifteen of you get the fuck out of my offishe!" Then he gagged again."
 BRA_quadroshundreddays.101.a: "The aide (there was only one) nodded sadly and quickly backed out of the office."

 BRA_quadroshundreddays.200.t: "Passage of the Anti-Trust Act"
 BRA_quadroshundreddays.200.desc: "The Anti-Trust Act passed amidst the applause of UDN members in the National Congress.\n\nThe President, his morale strengthened by this legislative tour de force, stood up and swaggered to the podium to make a speech. Of course, this being Quadros, the speech was pointlessly inflammatory and threatening - however, given it was the PSP being targeted, no one really cared other than PSP men.\n\n"People of Brazil, members of the accursed PSP, pay close attention to my words." Glaring at the PSP delegates, he continued. "Know that I am coming for your leader, to do away with his corrupt plague upon our land!" The UDN men applauded, the PSP men shouted their anger, and the rest simply left - this nonsense was beneath them.\n\nQuadros was undeterred by their responses; he was in the zone. "Let God and Brazil serve as my witness - I will have that corrupt good-for-nothing rooting around in a stable from which he cannot escape, like the bull he claims he is!"\n\nHearing this remark, the UDN and PSP men outright started brawling, with the PSP getting the worst of it. Seeing that Quadros merely chuckled and left the podium."
 BRA_quadroshundreddays.200.a: ""All is going to plan.""

 BRA_quadroshundreddays.201.t: "Failure of the Anti-Trust Act"
 BRA_quadroshundreddays.201.desc: ""Yes. I need to speak to President Quadros at his earliest convenience."\n\n"I'll see what I can do, Governor Lacerda. Give me some time."\n\nThe aide ran from the phone to the door of the Presidential office, where Jânio Quadros, having just failed to pass the Anti-Trust Act, was drowning his sorrows yet again. This time it was a mix of beer and caipirinha that Quadros made by dumping a glass of one into a glass of the other over and over.\n\n"Sir, Carlos Lacerda wishes to speak to you at your earliest convenience."\n\n"W-W-WHAT? That c-crow fucker of a parabolic funcshion? That motherfucking logarithm?! Get him out! I don't want him anywhere near my fucking offishe! Get out of here too, the three of you!"\n\nOnce again marvelling at how Quadros managed to see more than one of him every time he got drunk, the aide went back to the phone. "I'm sorry, sir, but the President is unavailable and I can't indicate when he can speak to you today."\n\nThere was a few seconds' silence. "... Duly noted."\n\nLacerda, on hanging up, was furious. Was that drunken son of a whore going to mess everything up left, right, and centre and allow this country to fall into the hands of the Varguists again? He picked the phone up and began to place calls to the offices of various UDN delegates he knew were in the office. If Quadros would not do his job, then Lacerda would build an opposition within the alliance to throw Quadros out and keep the presidency in UDN hands."
 BRA_quadroshundreddays.201.a: "The fault lines are showing."
 
 BRA_denys.1.t: "A Plea to the Sane"
 BRA_denys.1.desc: "Odílio Denys carefully caressed his brow with a grayish handkerchief, the sweat accumulated causing his mind to fumble and his thoughts to worry. Though his worries were, in truth, pure and real, as he sat witness to the members of his National Defense bloc. A copy of an extract, taken from a leaked version of the Lott act, rested before each member as they flicked through the pages liberally, at their own paces.\n\n"It most likely has the numbers to pass," Denys spoke, a calm mask hiding his true feelings of immediate dread. The awe of his peers were nearly comical, their faces tense and shocked in juxtaposition to the speaker, "And in turn, we most likely have to unite our forces to ensure its defeat."\n\nThough the loyalties of the men before him were already in much different places. Some stood and left without a word, others bowed in respect and rushed out, with a minority remaining behind to aid Denys in his ventures, "The madness of the Act must be halted at once, good men."\n\nBeing addressed, the only remainders of the NDC bobbed their heads in assent, nodding frivolously as they listened to the words of Denys, "All diplomacy with Lott has failed. All negotiations have failed. It is now up to us to end this madness and return Brazil to the order it desperately needs.""
 BRA_denys.1.a: "An end to the Mad King?"
 
 BRA_denys.2.t: "Allies in High Places"
 BRA_denys.2.desc: "The phone rang repeatedly around Costa e Silva's office, the cacophony of sounds tormenting the man as he finally reached to answer whichever caller he had received. He little expected a familiar voice to respond on the other end, that which he immediately recognized to belong to Denys, who croaked in a hushed yet stern tone.\n\n"Hello, Silva," began Denys all the way on his other end, close enough to the microphone to hear his rushed breath, "I have some very particular news. The madness of the Lott Act is soon to find itself within the Senate, and to be voted on. This simply cannot occur, if you understand what I mean."\n\n"I understand," Silva replied nearly immediately, now standing from his seat and rushing to his office desk, "You can expect my complete loyalty, Senhor Denys, I can assure you that I will join your endeavors should they... come to such. In fact, I will contact Olímpio Filho, I am certain that he will do much the same to aid you."\n\n"Thank you, Silva," Denys hushed, his face lit up by the given enthusiasm of the receiving end, "Without the military shuffled about in Brazil, our organizational advantage ensures our superiority should things go to worse. I would say that luck is on our side.""
 BRA_denys.2.a: ""Not only luck is on our side, Senhor Denys.""
 
 BRA_denys.3.t: "Denys' Betrayal"
 BRA_denys.3.desc: "Denys made a plethora of phone calls when the time had come appropriate, on that wretched day. First was the obvious, launching his most anticipated coup by ordering the Armed Forces to march into Brasília, all the while those loyal in his retinue marched to maintain order in other major cities.\n\nIn São Paulo his men acted with little resistance, while in Rio the city had already sworn its fealty to Denys with Olímpio Filho's fealty in control. Soon enough, all of Brazil would be under Denys, and the NDC continued to debate endlessly whether to support one or the other, blind to the gravity of the issue at hand.\n\nLott, in his stead, appeared live before a retinue of sergeants and soldiers, grunts and officers alike, of which he saw only a united force of plausible loyalists, "The day has come, fellow men," he began, addressing all present, "The day to rally in defense of our proud nation. Treacherous commanders have seen it fit to declare our efforts unfit, and it is up to me, and you, to take up arms and fight for what we know is best.""
 BRA_denys.3.a: "Chaos for Order."

 BRA_denys.4.t: "Fortune Favours the Brave"
 BRA_denys.4.desc: "Along a highway to Brasília, a column of grim and nervous soldiers march towards the capital under the orders of Denys and his fellow plotters to remove their own President from power. The only thing standing between them and the strangling of Brazilian democracy is a blockade defended by a line of equally grim yet determined military sergeants loyal to the President. From the marchers steps forward a young soldier, his boyish face contorted into a grimace, shouting, "Lay down your arms and disperse! We have been given orders from Marshal Denys himself; for the sake of national security, congress must remove President Lott from office!" His opposition remained unmoved. "Last chance! Disarm and disperse!" at the soldier's warning, one of the sergeant's eyes narrowed and he broke from his ranks, striding towards his counterpart with an expression of barely contained fury "Drop your gun!" he cried as sweat poured down his face, but the sergeant continued until he was within arms reach "I said drop-"\n\nHis sentence was cut short as the sergeant's open palm struck him across the face. "You scum took an oath! You vowed to defend the republic and the people!" He ranted, uncaring for the rifles trained on him. "You promised to protect the people from tyrants and now you're marching on behalf of one! If any of you have any shred of dignity and duty left in your souls, turn your asses around and go home!" For a moment, there was silence.\n\nThen, one by one, the marcher's faces turned shameful and they turned back, their wills broken. Similar incidents would follow across the country, as unmotivated and uncertain pro-coup forces, unwilling to turn their weapons on their comrades in arms, were turned back in the face of more determined loyalists. The NDC would not sit idle as the coup fell to pieces, and swiftly turned on Denys, ordering their men to join the loyalists in defense of Lott and arrest the plotters. Marshal Denys ranted and raved in the face of his failure in the scant few hours of freedom he had left, before being taken and imprisoned by his own men."
 BRA_denys.4.a: "The courage of few have beaten the wrath of the many."

 BRA_denys.5.t: "Rewarding the Faithful"
 BRA_denys.5.desc: "As Lott entered the room, all he could hear was silence. The officers of the National Defense Council stared at him in expectation, their faces inexpressive, boring into him like drills. Turning his eyes away from them, he began his speech.\n\n"Gentlemen, these last few days have been hard, for the military and Brazilian democracy. Once again, a bunch of rogues thought they could seize the government away from the people, and again, they failed. Thanks to your efforts, the will of the people lives another day, and for that they shall be ever grateful. While some in the military stood against us, I am proud to see that so many of you stayed loyal. That, I believe, is a testament to the Brazilian military spirit.\n\nIt is a hard thing to recognise that the traitors were once our comrades, but this is the hard truth. Can we be give mercy to this kind of dissent? No, to give them but a slap on the wrist would do nothing but embolden this behaviour, and allow our country to edge closer to a devastating conflict. They shall be stripped of their ranks, kicked out of the army, never to return. Yet their fates, I leave to you gentlemen. I trust you to be fair and just, and to give them the sentences they deserve."\n\nLott gazed around, hoping to see approval. The NDC responded with a small round of applause and smiles abound. None of them seemed particularly enthusiastic about the idea, but at least there was no immediately visible sign of revolt. He sighed with relief; while the military was not yet pacified, not fully, they had at last been brought to heel. Brazilian democracy could breathe easier now, or at least until the next ambitious general came around."
 BRA_denys.5.a: "Whatever happens, democracy had protectors now."
 
 BRA_denys.6.t: "A Desperate Appeal"
 BRA_denys.6.desc: "Only a few officers and soldiers had rallied behind the cause of Lott. The NDC had finally deemed it fit to exit its bureaucratic loopholes and deem him unconstitutional and dangerous for the integrity of Brazil. They even went as far as to request his resignation, for the sake of avoiding further damage.\n\nHenrique Lott was having none of it. In his most desperate appeal, he held out and make a rushed call to the American embassy in seek of the ambassador's help, "Please, Gordon," Lott made his plead, "It is pertinent to have the American's help during these times of trial, so that this may not spiral out of control!"\n\nGordon scratched his brow as he pondered, holding the phone close to his face in what must have been an eternal silence for either man on either side. As the seconds become minutes, he finally volunteered to break the ice and speak his truth, though he did not personally adore it; "I will see what I can do, and I will contact as many as must to ensure your survival...""
 BRA_denys.6.a: ""...Though I cannot promise anything, either.""
 
 BRA_denys.7.t: "It All Comes Tumbling Down"
 BRA_denys.7.desc: "Lott tapped his fingers together lightly, in admitted terror of what might occur next with most anticipation. He waited eagerly, by the phone, staring at the complexity of the artifact to ease his mind of the horrors that ensued. Though they had already occurred. His blank stare now took to face the window, taking but a few steps to stare down at the land below.\n\nIn files, coupists stood hand by hand surrounding his abode, all clad in his nation's uniform with the banners associated with it. It all occurred extremely quickly, the situation flying by as it was properly explained and laid down to him by some Denys man.\n\nThe officer spoke about the surrounding of Congress, and how Auro Andrade had personally stamped a law removing Lott as President. Lott had no time to think, as he opened his lips only to say "I resign," no man being able to gain the satisfaction of ending his presidency.\n\nThe newly appointed interim leader of Brazil later in the evening received a phone call of his own, from a very unexpected source, "Lott must be ensured a light sentence. It would be ridiculous on both our nations should he die." Denys agreed. He hung the phone, staring out his own window into the streets of Brasília, as the men and women of the nation eagerly waited for the next election cycle and a rebirth of Brazil."
 BRA_denys.7.a: "An end to the Mad King."

 BRA_denys.8.t: "No Other Options"
 BRA_denys.8.desc: ""That fucking bastard!"\n\n"Treasonous little shit, no wonder he wanted us out of the way!"\n\nDenys watched the gathering of generals before him vent their outrage with grim satisfaction. In hindsight, the treacherous nature of the President had been evident long ago; his close cooperation with leftists, his open Varguism, his disrespect for his own military's high command, and now an act to vandalize the constitution. But the man was going to reap what he sowed, men that had lost what they had rightfully earned, like Olímpio Mourão Filho and Sílvio Frota, had come together to take a stand, and now he just needed to get them on track.\n\n"Gentlemen." His stern tone silenced the seething murmurs and angry shouts and brought attention back to himself. "We are all rightfully furious and disgusted, but we must also be precise and decisive. To say the destiny of Brazil lies in our hands would be putting it lightly, and as such, I have devised a plan that will save our nation from the President's betrayal."\n\n"Within two weeks from now, we will hear radios across the country play the FIFA World Cup's anthem, but this will be cut off roughly a minute in and instead begin to play our national anthem. This will be your signal to mobilize the men under our command and march on the nearest cities, along with any other location of strategic importance."\n\n"Now, I want to emphasize this: our goal is to force Lott's resignation or to cut ties with leftists and end his Act before it can begin. We will accomplish this by making either him or congress see reason or through intimidation. This will not be easy; Lott has fortified himself with generals loyal to him. We must expect resistance."\n\n"Finally, remember that this is a coup to save democracy and not a bloodbath! Avoid violence wherever you can, and remember that, if we must, we will remove the President, but he must not be harmed!" Some of the generals looked nervous, but the determination was there, which was all he needed. "Now, go back to your men and be ready for further instruction for our signal. God save Brazil!""
 BRA_denys.8.a: "The cheers of generals drown out the sobbing of liberty."

 BRA_denys.9.t: "The Snake of São Paulo"
 BRA_denys.9.desc: ""-and that is why I need your help. If we are to succeed in ending President Lott's attempt to defile our constitution and threaten national security, then we need you and your men to ensure we will take São Paulo." Marshal Denys finished his plea to Second Army's commander General Kruel with a clenched fist. The fate of Brazil was in dire straits, and the man he sought help from remained unmoved, in a lazy slouch in his seat with an alcoholic drink in one hand, and an amused smirk etched on his face.\n\n"Oh, I don't know." Denys had to resist the urge to scream at the man. "My experience with our dear President has left me with the impression that he has a good head on his shoulders and is wise in judgment." Kruel rose slightly from his slouch to sit up straight. "I cannot help but wonder what I could gain from turning against him." There was a glint in the man's eyes now, dangerous and greedy.\n\n"I see." So that was what the fate of Brazil was going to come to. A greedy fuck looking for a bribe.\n\n"The task ahead is expected to be costly and stressful, and we will be more than ready to... compensate you for whatever monetary and material costs this may require of you. And, of course, your actions to safeguard Brazil will be recognized as qualities of a man who deserves a higher station. Tell me, how does the name 'Minister of Defense Amaury Kruel' sound to you?" The man smiled in satisfaction."
 BRA_denys.9.a: ""São Paulo is yours.""

 BRA_denys.10.t: "Beggars Can't Be Choosers"
 BRA_denys.10.desc: ""-and that about sums up what is needed." Denys finished his sentence with a short nod to General Amaury Kruel. Convincing him to go along with the coup plot was easy. The man had felt slighted by Lott when he was passed over for commander of the São Paulo forces and was eager to hit back. For a price, of course.\n\nEven so, Denys could not help but feel anxious. The army around the city was staffed with Lott loyalists, and it was doubtful they would fold over to Kruel and his men. And then he would have to take the rest of the state as well...\n\nHis uncertainty must have shown on his face because Kruel's morphed into a scowl. "What, you think me and my men can't pull this off?" He stared into Denys' eyes with fury before his face twisted into a sneer. "Don't worry, I'll have Brizola and Bevilacqua under control when the time comes; just get my fucking money ready until then." Denys gave the man another nod before walking out of his office, but his fears lingered."
 BRA_denys.10.a: ""I hope so, Kruel, I hope so...""

 BRA_denys.11.t: "Jumping the Gun"
 BRA_denys.11.desc: "The soldiers received the signal, and as tasked, acted immediately. In tremendous swiftness, Olímpio Filho succeeded in leading his troops to move into Rio, to link up with Carlos Lacerda who waited idly wherever he may be. Little did the men know, that they had just jumped the gun.\n\nLott, in his stead, awoke in the rush of being shaken around aggressively by Assis Brasil in a most spontaneous fashion. He would have ignored him, though the face of confusion upon his peer was most telling of the importance, "What is it?"\n\n"Men have marched into Rio, though what seems to be prematurely. Somewhat disorganized," he gave a cough, squinting and frotting his eyes. Lott then queried; "Where is Denys? Do we know of his whereabouts?"\n\n"I do not know," muttered Assis Brasil in response, shrugging profusely. Lott then spoke up again, practically interrupting him, "Bring me General Jair Dantas Ribeiro, we must crush this coup while we have enough time to prepare an assault on Brasília."\n\n"And what of you, Senhor Lott?" wondered Assis Brasil, halfway out the room in the same rush as anyone in that early morning "Should you not seek somewhere more secure? Should bad come to worse...""
 BRA_denys.11.a: ""I will stand my ground.""

 BRA_denys.12.t: "It Has to Be This Way"
 BRA_denys.12.desc: "President Henrique Teixeira Lott's office was in a flurry of panicked activity. One moment the country enjoyed the sound of the FIFA anthem then cut to its national anthem, and it all went to hell. His worst fears were coming to pass; military units were marching on cities and army bases to seize control of the surrounding territories, demanding his resignation across the country. And it seemed that Denys was missing. Lott had a gut feeling he knew what his marshal was up to, which left a sinking feeling in his gut.\n\n"Sir!" one of his secretaries yelled to him with a frightened expression from their phone. "It's Denys." Lott strode towards the trembling man, took the phone from their shaking arm, and steeled himself.\n\n"I'm here, Denys. Let's get this over with."\n\n"President Lott, I want you to know that we only do this to preserve the constitution of Brazil and its stability." Lott had suspected Denys was involved in the coup, but it didn't soften the blow. Denys continued. "We demand the end of the collaboration between your government. Any left-wing ministers will be removed immediately. After this, we expect you to rule over a unity government until the next election. Finally, we demand the constitution be protected: the Lott Act must be destroyed." Lott took in a deep, shuddering breath before speaking.\n\n"You want me to be nothing but a decorative President. I refuse, on all accounts."\n\n"Henrique-"\n\n"Marshal, I don't abandon my friends. If you want to be rid of me so badly, then step out of the shadows, put your men on the street, and betray me publicly." The line went dead. A mere hour later, the President would learn that Denys' men were attempting to surround Brasília."
 BRA_denys.12.a: "The final act approaches."

 BRA_denys.13.t: "Our Finest Hour"
 BRA_denys.13.desc: "Lott felt like he had aged fifty years in five hours. Since the start of the coup, he and his staff had spent the day frantically calling up every governor and general they could to rally in defense of the President and democracy. First, it had just been the likes of the governor of Goiás and generals like Brasils but as the day dragged on, so did the calls, and all remained uncertain.\n\nOne of his secretaries suddenly rose from their chair while on the phone and turned to him, "Sir! It's the Rio forces. The man on the line says the coup forces gave up!"\n\nLott rushed over to the man and took the phone with a silent thanks. "This is President Lott. What's happened?"\n\n"Mr. President, this is General Ribeiro of the Rio de Janeiro forces" the general spoke with a stern but relieved tone, "the traitors led by Mourão attempted to march on the city. I responded by getting all my tanks together on the roads and daring the bastards to try it. They folded."\n\n"I see, thank you. Thank you." The general hummed in acknowledgment before barking something at one of his men and hanging up. Lott felt relief flood his form and grinned. "Gentlemen!" his voice brought all attention in the room to him. "The situation is still dire, but we are winning! If the coup d'etat forces cannot take the major cities, they have already failed, tell our men to keep it up, and we will prevail!" The room exploded into cheers, and the men faced their duties with renewed vigor."
 BRA_denys.13.a: "Brazil prevails over its darkest hour."

 BRA_denys.14.t: "Little Wooden Tanks"
 BRA_denys.14.desc: "Henrique Lott took a moment to reflect. The coup was nearing its end, and he had won. It was ironic, really. This coup was born in response to an act to curtail the power and influence of the military. But all it had done was validate every concern he had. Was it all so important to them? Was what he was planning such an insult to them that they would instead use brute force than diplomacy? Was there ever a time he could have made them see reason and avoid this mess?\n\nHis reflection was cut short when a secretary waved him over with one hand and a phone in the other. Lott moved with a grateful smile and took the phone. "Hello, this is President Lott. To whom am I speaking?"\n\n"Ah, my President! General Kruel speaking." he heard a murmur in Kruel's background. "Oh, and General Frota is here too. But! More importantly, we have a third guest!" Lott began to feel his patience with the man wearing thin, drumming free fingers along a nearby desk. Before he could tell them to get on with it, the General spoke again, "We have captured the traitorous Marshal Denys! Hey, bastard, why don't you say something?" A moment later, he could make out more sound from Kruel's background; this time, it was a chorus of swears and threats before it was silenced.\n\n"Well, it certainly does sound like him." Lott wondered if this was a part of some bizarre, hair-brained plot before dismissing the thought. While it was rather suspicious that these two men somehow found the rogue marshal before anyone and apprehended him, it was more prudent to deal with Denys now, and the rest could wait. "My thanks, generals. Do you need assistance in his transportation?""
 BRA_denys.14.a: "Brazilian democracy has been tested, and not found wanting."

 BRA_denys.15.t: "Why?"
 BRA_denys.15.desc: "As Lott stared down his old friend through the prison bars, that was the only question he had. "What the hell led you - who stood behind us the whole way in 1955 - to betray your oath to the State and democracy, to stab me of all people in the back like this?"\n\nOdílio Denys had only one response. "It had to be done, Henrique. It had to be done. Your law was unconstitutional."\n\n"What, and your little coup against a duly elected government wasn't? What do you take me for, a Lacerdista?"\n\nDenys scoffed. "I took you for someone enslaved to the Trabalhista communists, and you've proven me right. Mark my words, if you let that Brizola come anywhere near power we'll all be singing the praises of Hitler or Lenin before long. We won't be able to fight communism or fascism, not with the Supreme Court defending your law thanks to our failure."\n\nThe marshal outside the prison cell shook his head. "No, Denys. We will fight fascism and communism perfectly fine with the Lott Act in place. As for you, you should not speak; you are just a traitor who betrayed his oaths."\n\n"I-"\n\nThe President of the United States of Brazil turned away.\n\n"I have nothing more to say to you.""
 BRA_denys.15.a: "They never spoke to each other again."

 BRA_denys.16.t: "The Best Laid Plans of Mice and Men"
 BRA_denys.16.desc: ""Rio has been taken!"\n\n"That fucker Kruel betrayed us!"\n\n"Aragão is too far out at sea; he can't help us."\n\nThe reports kept coming in and out, but Lott wasn't paying attention. A severe numbness overtook his entire being, drowning out all around him. He had lost. The coup had gathered too many generals for him to defeat. And those loyal to him were too few or too sluggish. Where did it all go wrong? Had he not done enough to ensure the military's loyalty? Pushed too far? Not gone far enough? What were they going to do when they got rid of him?\n\n"Sir." A crestfallen man with a phone called to him. "It's your daughter."\n\nThat snapped him out of his depression, and he hurried to accept the phone with a trembling hand. "Edna? Are you safe?"\n\n"I should be asking you that!" He'd never heard her so frightened before. "Father, please, I know what's happening. You need to run, find a car, a plane, anything. Just get out of the country!"\n\nThe President exhaled with an exhausted sigh. "I can't do that. I have my duty."\n\n"To hell with your duty! And your pride, what about your life?" Her voice began to break. "If they catch you they, they-"\n\n"Edna." He mustered as much confidence as he could. "They won't kill me. Denys won't let them." Truth be told, he wasn't sure about that. He'd made a poor judge of Denys' character already. "Edna? No matter what happens, I want you to know that I am proud of you. Goodbye."\n\n"Father-" Lott cut the line."
 BRA_denys.16.a: "Our judgment awaits."

 BRA_denys.17.t: "What Now?"
 BRA_denys.17.desc: "Henrique Lott stared at the distant outskirts of Brasília atop the Presidential palace, and although he was grasping his binoculars it was clear to him that even a man blind in one eye could see the troops massing outside the capital. He stared at the gathering army blankly and without any real thoughts on his mind; it was strangely calming, the noise of radio chatter and his bodyguards talking to him drowned out by the realization of his situation. It all felt... cathartic somehow to Lott, but his wandering mind would soon be caught by one of his bodyguards shaking his shoulder and yelling at him.\n\n"Sir! Mr. President!" The man shouted, holding a walkie talkie by his ear. "We've gotten word from several states that they're willing to commit troops in support of us, and that you just need to give the order."\n\nLott pulled a pack of cigarettes and his lighter from within his pocket and lit it before turning to the guard. "I don't want to tear this country apart more than it already has. I've already lost, there's nothing more I or anyone else can do without causing more unnecessary damage." He paused, taking a deep drag from the cigarette. "Give me the radio, I'll talk to Odílio myself." The guardsman reluctantly handed Lott the radio, turning away to leave and inform the others of Lott's decision. As the man left, Lott took a deep breath and started speaking. "Odílio, you win. I won't put up a fight, come get me here and let's just get this over with."\n\n"What? Just like that?" A confused voice boomed through the radio, Denys was taken aback by Lott's decision; he had expected a much stiffer resistance from a man of Lott's standing. "Yes, just like that Odílio. Now get this goddamn knife out of my back and just kill me already." Lott angrily quipped. Whatever reply Denys had about holding elections to deal with the chaos he had caused was lost to Lott, having lowered the radio as his mind began to wander again and he looked out once more to the distant army that had been assembled against him. In his mind, there was but one single quote:"
 BRA_denys.17.a: ""O Deus, do not forget who has caused all these woes.""

 BRA_lacerda.16.t: "The Grand Convocation"
 BRA_lacerda.16.desc: "When the senators of the UDN coalition were asked to attend an impromptu meeting at the personal request of President Carlos Lacerda, they went along with haste, eager to see what he had in store.\n\n"My partymen," he began, "my senators, my countrymen. Brazil has been lying in wait for a better future, and I have arrived to deliver it. I am proud to have served my country well! The economy has been improved, and political instability decreased. The road is brighter than before!" The senators applauded, and not just out of responsibility; his oration was genuinely powerful.\n\n"Thank you, my men, and thank you, to the people of Brazil, to all that you have done. I am glad that you have elected me to another term!" Murmurs. To so brazenly, openly and publicly rally against the official result; it would cause controversy, and the crowd was uneasy. "My next term comes, and it will deliver even more change! The legacy of Vargas, and all those who support him, will be removed; the stain of Getulism will no longer poison Brazil! Tyranny will be slain!" An audible silence, a gap in breath; not a soul in the room would dare question the man's words.\n\nWordlessly, some senators stood, turning to leave the chamber, backs towards Lacerda. But then, of those who remained, a vanguard began to clap. A standing ovation, which the rest joined in, until all left in the chamber formed a powerful crowd.\n\nIt matters not that some left, Lacerda thought. It matters that most stayed."
 BRA_lacerda.16.a: ""I am the President, and the Senado serves me.""
 
 BRA_lacerda.0.t: "A Turn of Events"
 BRA_lacerda.0.desc: "Like a man at the casino, like a schoolboy waiting for his test scores, like a young man waiting for a response from his love; the anticipation of what's to come, the uncertain results of an important event left Lacerda nervous, able to feel his heart pounding in his chest.\n\nAnd then it happened. The polls were closed, the votes were tallied, and the numbers were on the television. Lacerda had lost.\n\nThe votes had not yet all been counted, but over 90% had, and Lacerda could win a supermajority of the remaining votes and still not win. The election had been lost, it had been settled, and it was clear that Lacerda was defeated. Defeated by a Getulist, a leftist, a fucking crypto-communist! What in hell, what in the FUCK happened?\n\nNo. This couldn't be real. Goulart cheated, of course he did! He stuffed the ballots, he burned the real ones, he bribed the election officials. Brazil's a big country but not big enough to have enough brain-dead idiots that could be fooled into voting for someone as dangerous as Goulart. And he thinks he can get away with it! What a crock of shit!\n\nCarlos sipped his drink. Some alcohol to cool his nerves. He can't get carried away like that, especially considering the trials to come, and what must be done. He looked at the calendar, saw how much time he'd have; about 80 days to inauguration - more precisely 78. Less than 80 days to reverse the fraud. Less than 80 days to save his country.\n\nMore alcohol to calm his nerves, but not enough to dull his wit. It's time to draft a plan. It was time for Lacerda to make arrangements and preparations for what must be done."
 BRA_lacerda.0.a: "It's time to plan a coup."
 
 BRA_lacerda.1.t: "A Last-Minute Fix"
 BRA_lacerda.1.desc: "The days were ticking. Goulart's inauguration was approaching; at least, that's what was thought. In this country, things like the presidency aren't decided on election day; they're decided between election day and inauguration, and it wouldn't be certain until Goulart was in the office; hell, even then it wasn't sure.\n\nLacerda was sitting by the window of the Palácio da Alvorada, admiring the view. Another beautiful sunset; the red filled the skies, the colors blended, and it was a gorgeous display of all beauty nature had to offer. But it was one day closer to the deadline, to his last days in the palace.\n\nBut he wasn't scared. He was already ready enough. The coup would go smoothly.\n\nCarlos Lacerda thumbed through his notes, one by one. Population centers that needed to be seized. Critical figures in the military, those who were a good enough combination of bribable and powerful to be worth getting to his side. People who would support him even without greased palms. He had moved from a house of cards to a house of brick; it'll take a hell of a lot more than some breath, some talking, to take down what he's built up. And it was ready to go.\n\nOne name caught Lacerda's eyes in this final review. Frota, his trusted middleman, who had already proven well in advancing Lacerda's goals. It was time for him to do a great favor to Lacerda. It was time to talk with the military, and get the guns on his side."
 BRA_lacerda.1.a: "Lacerda picked up the phone."
 BRA_lacerda.1.b: "Perhaps he had had too much to drink..."
 
 BRA_lacerda.2.t: "Operation Phoenix"
 BRA_lacerda.2.desc: "OPERATION PHOENIX\n\n[?global.date.GetDateStringNoHour]\n\nFOR APPROVED EYES ONLY\n\nUpon the poor showings in the recent elections, it has been decided by Carlos Lacerda that drastic actions have been made necessary for the purpose of preserving and/or bettering the current situation within the state of Brazil.\n\nThrough phone calls, intermediaries, and other dispatch methods, contact has been made with several crucial figures to both the function and transition of the government. This includes high-up civilian and military officials. The state apparatus of Brazil has been sufficiently swayed to Lacerda's side for a restoration of proper, legitimate governance to be possible without overwhelming backlash.\n\nThrough de jure backing from politicians, and de facto backing from military officials, backed by soldiers loyal to them, a prevention of the inauguration of Goulart as President of Brazil will be executed. Major civilian centers, namely cities important to industry, trade and government, will be intervened in and held by military forces, ensuring important localities will be under Lacerda loyalist control.\n\nThis plan is now in effect.\n\nSIGNED BY CARLOS LACERDA"
 BRA_lacerda.2.a: "Dispatch over."
 
 BRA_lacerda.3.t: "Friends in High Places"
 BRA_lacerda.3.desc: "Officers in the Brazilian Armed Forces have recently been rallying behind and declaring full allegiance to Carlos Lacerda, despite his loss to João Goulart in the recent elections held to determine President of the Republic. Called a coup by many, this has indicated a loss of stability and non-peaceful transfer of power in the state.\n\nMarshal Amaury Kruel has declared allegiance to Lacerda, and has used his troops to seize the city of Brasília, placing the important governmental center under full military control. The result has been both a significant on-the-ground strengthening of Lacerdan forces, swaying the power struggle to his side, and a "falling in line effect" on the other generals of the Brazilian military, who see the way that the wind is blowing, and have decided to be on the side with plenty of guns.\n\nBarricades have been placed in streets, nightly patrols are sweeping neighborhoods, and curfews have been put in effect, as the military is making sure of their control of their cities.\n\nIn an office, somewhere deep in friendly territory, Carlos Lacerda sits behind a desk, looking at Olímpio Mourão Filho, an important general. He stands at attention, shoulders broad, eyes filled with the respect a soldier is obliged to his Commander-in-Chief. There, in the dark room, Lacerda delivers an order."
 BRA_lacerda.3.a: ""Filho, your job is to seize Guanabara.""
 BRA_lacerda.3.b: ""Filho, your job is to seize Guanabara.""
 
 BRA_lacerda.4.t: "Lott Intervenes"
 BRA_lacerda.4.desc: "The night began with various large moves being made by the Brazilian military, with some officers taking the initiative to seize various population centers in the name of Lacerda. However, the amount of pro-Lacerda officers has proven to not be enough to properly seize control of the country; the most important cities and resource centers have all stayed in government hands.\n\nTeixeira Lott gives a speech, a great number of officers listening. In it, he tells officers to stay loyal, to the State, to the Constitution, it makes no difference; what matters is to not fall into the Lacerda camp. His words, or perhaps his reputation preceding him, was persuasive enough, and the officers fell into line, and a great deal of the pool of power that Lacerda drew from was completely neutralized, remaining loyal and aligned to the Constitutionalists. The officers side with the state.\n\nAmury Kruel, a key ally of Lacerda, one of the initial supportive figures of the coup, is packing his bags. This wasn't just cowardice, though that may have played a role. It was made clear by the Constitutionalist figures that he was a threat, and it was also made clear that killing him would not be necessary, if he chose to accept a nice sum of money and a permanent vacation outside of Brazil. Naturally, he accepted, bringing with him Lacerda's hopes of a successful coup."
 BRA_lacerda.4.a: "If failure is not a lesson, it is indeed a failure."
 
 BRA_lacerda.5.t: "American Support"
 BRA_lacerda.5.desc: "Ring, ring, ring. Domestic allies were not the only way to come to power here. The Americans had a finger in everything south of their border, and sooner or later they would take a stand; preferably one that favored Lacerda and his allies. He would contact the Americans, especially their military brass; he hoped his enemies had not already contacted them.\n\n"Carlos Lacerda? I hear election night didn't go well for you. What do you need?"\n\n"Well, you have two choices; the Brazilian people had two choices, too, but they chose wrong, of course. You can have Goulart or you can have me. And I promise you I'm much better for American interests."\n\n"Isn't it all about how good you are, how likely you are to win? We don't throw away American boys unless we get a promise of victory."\n\n"I have officers, I have legitimacy, I have military and civilian allies, I have control of population centers. You know the coup business, I know you know how this works. I know this is music to your ears."\n\nSilence for a moment. Probably a mute while the other military men were consulted, or they were calling Washington. Then an answer."
 BRA_lacerda.5.a: ""You've got Uncle Sam's support, Carlos.""
 BRA_lacerda.5.b: ""Sorry, you're getting nothing from us.""
 
 BRA_lacerda.7.t: "A Friendly Housecall"
 BRA_lacerda.7.desc: "So far, so good. The military were keeping order, and the press were in lockstep. Order had come, and progress would soon follow. Brazil would be free of demagogues soon. However, the transition towards honest democracy could not be left purely to soldiers and journalists, and certainly not through his pen in Brasília. He had a lot of phone calls to make. A federal republic, as Lacerda's predecessors had wisely created, required federal support, or at least federal disinterest to ensure legitimacy. Even from those the central leadership considered otherwise... undesirable.\n\nTake for example, the honourable governor of São Paulo and spawn of Lacerda's nemesis, Getúlio Vargas Filho. First as tragedy, then as farce, an old, hated voice chimed in. The son was just as much of a bastard and a kleptocrat as the father, though without his admittedly exceptional skill. Still, any imbecile could pose a threat when they also happen to be in charge of one of the most powerful territories in the nation. Doubly so if they believe themselves to have a mandate from the great Brazilian people, a fraudulent election, or the cult of Papa. Concessions would have to be negotiated. Through gritted teeth, perhaps, but negotiations all the same. He might refuse, but Vargas Junior would have the option of Lacerda or the military to negotiate with. Somehow, he doubted the military would offer a better deal.\n\nThe number was dialled, and after a few seconds, the governor of São Paulo picked up."
 BRA_lacerda.7.a: ""Governor Vargas, I know we've had our differences...""
 BRA_lacerda.7.b: ""Governor Vargas, I know we've had our differences...""
 
 BRA_lacerda.8.t: "The Best Laid Plans..."
 BRA_lacerda.8.desc: ""What do you fucking mean, the military have joined the protests?" Lacerda bellowed at Ester. "The Paulistas are one thing, but in Guanabara of all places? Has the whole damned country gone insane?"\n\n"Sir, I confirmed the reports are accurate myself. We cannot-"\n\n"Shut up! Shut the fuck up! I need to think!" screamed Lacerda. How could this have happened? After so many years, he had finally come close to ridding Brazil of its taint. Vargas was rotting away in a wheelchair, his successor had been outmaneuvered, and the nation was finally on its way to sensible leadership. But no, old Getúlio had to haunt him from beyond the fucking grave with that waste of sperm son of his. He had been reasonable, he had been polite. He had been hung up on in five seconds, and blasted as a traitor on the radio within five minutes. Him? Called a traitor, an American puppet, a military stooge? By this waste of sperm of the man who had confined Brazil to a savage, dependent wasteland bereaved of talent, culture and honesty?\n\nAnd it seemed the gallant people of Brazil stood behind the bastard. The ungrateful, cloying, useless wastes of a public body! After all he had done to free the land from despotism, a struggle which had continued for decades, but no, the people wanted to laze around on the back of the state, all the while blaming America for their insolence and their indolence! Fuck this. Fuck Brazil. Lacerda was done trying to help people who clearly did not want to help themselves. Let them rot in this stinking pit of human refuse. He stared around the office of the President one last time, thinking of all that could have been in a better world, before instructing Ester to have a helicopter prepared immediately."
 BRA_lacerda.8.a: "A profound defeat for common sense."
 
 BRA_lacerda.9.t: "The Voice of Reason"
 BRA_lacerda.9.desc: "Lacerda's meeting with the press executives had gone well, and they were ready to support a unified message to the Brazilian people. That was the easy part. Now he had to sit down, and use his calming words to extinguish any flames of insurrection from Goulart's supporters. He was somewhat apprehensive, his manner of speaking not well-adapted to the oratory flourishes and high rhetoric of his predecessors. But perhaps that was for the best. An era without strongmen or demagogues could not begin with a speech emulating the hollow promises of a past Lacerda sought to end. A reasonable tone for the speech would set a reasonable tone for the national mood. He began;\n\n"Citizens of Brazil, this is your President speaking. It is my severe displeasure to inform the public of a series of disturbing revelations concerning irregularities which occurred the recent election. The full details have already been made available to the press, and will be published by tomorrow morning. For the time being, it is sufficient to say that allegations of voter intimidation, miscounting, and other impediments to the democratic process are credible and overwhelming. Thus, it is the solemn duty of the Brazilian government to annul the recent election results...""
 BRA_lacerda.9.a: ""...until a full enquiry can be made...""
 BRA_lacerda.9.b: ""...until a full enquiry can be made...""
 
 BRA_lacerda.10.t: "The People Side with Goulart"
 BRA_lacerda.10.desc: "Lacerda has been attempting to cast doubt on the election, accusing Goulart of many crimes, such as fraud and corruption, and the usual slew of insults that go from a loser to a winner. The intent of Lacerda has been, of course, to give people doubts about the legitimacy of the election, to give him an excuse to seize power back, aided by his various allies, domestic and foreign. Of course, this was predicated on one important thing; people believing him.\n\nAnd people didn't believe him. His doubts were perceived, perhaps correctly, as just a last-ditch attempt to try and keep control of Brazil, and it failed. This has lead to a very undesirable position in Brazil, where two very high profile politicians are both claiming to be the rightful leader of the nation. However, it could be worse; Goulart's clear advantage, and the massive rallies and crowds behind him, paired with his legitimacy through the election, have given him enough power to, at least for now, avoid a civil war; but this may not last forever, and success is far from guaranteed.\n\nInstability rising, and failures mounting, Lacerda is not in a good place at the moment. But he wanted power. He didn't want Brazil to burn. Faced with a loss, he will carry it with him, over the plains and over the oceans, to flee to a far-away place, a place with less failures for him. His past attempts be what they may, he doesn't wish to destroy the country."
 BRA_lacerda.10.a: "Fly away, fly away..."
 
 BRA_lacerda.11.t: "The People Stay Home"
 BRA_lacerda.11.desc: "Lacerda has been attempting to cast doubt on the election, accusing Goulart of many crimes, such as fraud and corruption, and the usual slew of insults that go around in a contested election. The intent of Lacerda has been, of course, to make the election seem illegitimate in the eyes of the people; and, for the purpose of this goal, he has succeeded.\n\nIt is not simply that everybody overnight has switched from voting for Goulart to voting for Lacerda; Lacerda does not need the die-hard support of the populace to have control of Brazil, as that's what the military's for. No. What Lacerda needs is for there to be enough doubt that the people will stay home, confused, worried, and, most importantly of all, far away from any Goulart rally. And this has been exactly what has happened; despite calls about a coup going on, and pleas to defend democracy, the people have stayed home, out of pro-Lacerda sympathies, out of fear, out of apathy, but they're home.\n\nLacerda sits back in a fine leather chair, a nice import, sipping his drink, also an import. Delicious, he thought, but what was more delicious was a good ol' victory to end your day with. And that he has gone oh so well. He relaxes, for the first time in a while. It's good to know everything has succeeded."
 BRA_lacerda.11.a: "Everything went as planned."
 
 BRA_lacerda.12.t: "Lacerda Flees"
 BRA_lacerda.12.desc: "Lacerda's failed. He failed the election, and he failed the coup. Peaceful and violent transitions into power failed for him, and it was time to transition into a different country; hopefully, unlike all of his ambitions, and his attempts at power, and his plans, the helicopter will not fail.\n\nIt was a detailed plan, aimed to get Carlos Lacerda out of Brazil swiftly, safely, and secretly. The beginning step was to get a helicopter, which landed close to his house. The pilot was a close ally whom Lacerda knew he could trust. The helicopter was not his way out; it simply took him away, to a private airstrip, where a private plane was waiting for him. There, he took himself and his possessions onto the private plane, also piloted by a trusted ally. From the plane, he would fly directly to America, where he would be able to safely seek refuge from those who would want to strike back at him for his attempts at power-grabbing.\n\nIn the private plane, thousands of feet above the ground, already hundreds of miles away from his home, Carlos was fuming. Everything has gone to hell, he thought. Nothing has gone as I wanted, and I've done nothing but make everything worse. God damn it. God damn it all to hell! Curse Goulart, and curse the cowardly officers, and curse the Americans that wouldn't give him enough help. Curse it all. But what's done is done. There are regrets he cannot change, but he knew he had no choice to accept what happened, and move on."
 BRA_lacerda.12.a: "What's done is done."
 
 BRA_lacerda.13.t: "Opposition Flees"
 BRA_lacerda.13.desc: "Goulart was defeated. Not in the proper, legal way he was supposed to be defeated, through the ballot box, the civic institutions meant specifically for the peaceful, legal, agreed-upon ways to move from one leader to the next. No. He won the elections, but that was just a battle, and he has proceeded to go on and lose the war. Lacerda has won, and his coup has won him control of Brazil.\n\nIn an unmarked car, Jango makes his unceremonious retreat from the country that he called home. Crossing the border, he makes his way into Uruguay. He had allies there, he hoped, who would be able to support him, and keep him safe from those who had already done so much harm to him, his image, his home, his country. It was a defeat, and it was a retreat, and he just wanted to be done with it, done with it all.\n\nLacerda sits smugly at home, sipping his drink. He had won, after all this time and maneuvering, and he was happy to be done with the chaos of this political theater. God was victory sweet, almost as sweet as his drink.\n\n"Mr. President!" said the assistant, coming into the room.\n\n"God, what is it?"\n\n"You are to be escorted to a safe room. Shots are being fired in Brasília.""
 BRA_lacerda.13.a: "Victory, at what cost?"
 
 BRA_lacerda.14.t: "The Murder Ascends"
 BRA_lacerda.14.desc: "Carlos Lacerda, usurper of the Presidency of the United States of Brazil, was happy. Happy to have won the presidency not by the popular vote but by the will to pursue and achieve victory by any and all means necessary. Sadly for him, this seizure of power wouldn't come without consequences. The angry mobs chanting slogans in the streets gave the soon-to-be President flashbacks to the last time a bullet strayed him. It was decided as a precaution that his inauguration would be held in a bunker buried deep beneath Brasília.\n\nWith the bunker doors slowly swinging open, the President was welcomed by a cadre of army officials, police officers, American diplomats and a news crew, all quintessential to the plot that sent Goulart into exile and himself to the throne. With his left hand on the Bible and his right hand raised upward, Lacerda recited the oath of office, though now it was merely to give off the semblance of normalcy to an audience that knew better. By the time the oath was concluded, the President had turned to face the cameras to give his speech.\n\n"People of Brazil, this is the day where true Brazilians triumph. In the face of Goulart's perversion of democracy, I had taken the initiative to beat back this communist insurrection and ensure our country didn't become a "People's Republic". Despite these unusual circumstances, I can assure you that the policies of the UDN have not changed in the slightest. I ask you, people of Brazil, to look to the bright future ahead of us, a future free from communist lies and Varguist tyranny, that together we can make Brazil greater than it has ever been. I thank you all for your unyielding support in these trying times and may God bless the United States of Brazil and its people."\n\nWith his speech over, the Crow and his murder took flight from the bunker and into a now tense atmosphere."
 BRA_lacerda.14.a: "The Crow clawed the tyrant and became one in his stead."

 BRA_latam_reactions.1.t: "O Bobo, El Bobo"
 BRA_latam_reactions.1.desc: "Obscured by the tablecloth, the ambassador's wrinkled hands coiled and uncoiled the elaborate cloth napkin the Santiago embassy kept for these dinners. Chilean president-elect Raúl Rettig had taken only a single bite of his bobo de camarão. His second would-be spoonful lay there suspended over the steaming bowl of stew. Had his sources been wrong about the seafood? Had that blasted chef overheated the thing? The motionless spoon's half a prawn and dash of manioc provided no answer.\n\nAt least Rettig and Minister of Foreign Affairs Leitão da Cunha were talking. The two men who had more control over the ambassador's fate than any save President Carlos Lacerda himself had been sustaining a friendly, but formal dialogue for the past several minutes. Dialogue. Oh dear, he hadn't said a word. That blasted hypnotic prawn.\n\n"Chile and Brazil are brought ever closer together by the machinations of Buenos Aires," he chimed in, "From Bolivia to Antarctica, we jointly can and must resist their imperialist urges." The ambassador took a bite of his own bobo to conceal his smile; he had emerged from his stasis with a single timely, prudent remark.\n\nRettig turned to the ambassador for the first time in the meal, spoon submerging the prawn into the manioc sea. "Our continent certainly has seen too many machinations lately." Why did da Cunha blanch at that? Was this leftist making some veiled remark against-? "I'm looking forward to working with yourselves and President Lacerda."\n\nThe ambassador saw Da Cunha glance at him, a bit of color returning to his face. The minister raised his glass, "A toast then. May we stand together..." he seemed to be restraining a laugh, "against imperialist urges."\n\nFor the first time, Rettig's polite smile broke into a mirthful chuckle, and he raised his own glass."
 BRA_latam_reactions.1.a: "Bobo brings people together."
 
 BRA_latam_reactions.2.t: "Bird Watcher"
 BRA_latam_reactions.2.desc: "President Carlos Lacerda felt a small pang in his chest. The small antbird statuette was wordlessly being turned round and round in the deft hands of his Chilean counterpart, the newly-elected Julio Philippi Izquierdo. After what felt like a minute, Philippi set it down on the hardwood table with a satisfied "Delightful."\n\nLacerda exhaled. Philippi had requested this visit to Brasília almost immediately following his election, sending the diplomatic service scrambling for an appropriate gift. Luckily, the Chilean technocrat's interest in ornithology was well known. "And thank you again for your gift" - framed Chilean newspaper articles covering Lacerda's election as governor of Guanabara "and for prioritizing a visit to the Palácio da Alvorada. Ours is going to be a fruitful partnership."\n\nPhilippi nodded, "Your presidency is still young, but I confess to have been watching it with great interest. Overcoming its, em, inauspicious start, you have made the right moves to modernize public administration. Your forceful approach to countering Argentina's spreading influence is very welcome in Santiago. For the first, Chile will be confined to providing moral support, and perhaps learning from example. But on Buenos Aires, I look forward to working with you side-by-side."\n\nLacerda was taken aback, and it was Philippi who rose first and offered a hand. But the Crow met his grip enthusiastically, "I wish you and Chile the finest of luck in the months ahead; I hope that they are filled with more visits to the Palácio."\n\n"And I wish the same to you, Carlos." Philippi cracked a smile and offered a small wink, "If you keep providing me with birds such as these, I will have to!""
 BRA_latam_reactions.2.a: "If only all diplomacy was this easy."
 
 BRA_latam_reactions.3.t: "Prat-tling On"
 BRA_latam_reactions.3.desc: ""How in the hell did the Chileans elect a literal Nazi?!" Carlos Lacerda bellowed.\n\nMinister of Foreign Affairs Leitão da Cunha prayed that the door of the presidential office had withstood the outburst, or at least that the Palace's resident gossips were out for the day. "Jorge Prat thankfully left the National Socialist party, but I agree that his far right stances are worrying."\n\n"So he's an opportunistic bastard, content to be a Nazi whenever it's convenient. I'm so relieved, Vasco," Lacerda's lips coiled into a sneer. "We're going to do three things. One, I want the Chilean embassy to go dark. No events, no dinners. We let Prat know that I loathe him just as much as he hates me. Two, we make the only exception. We talk to the fascist bastards, cooperate with them even, if and only if they want to move against Argentina. Prat will be gone in a few years, but the gaucho threat will remain."\n\nLeitão da Cunha scribbled down hurried notes - 'no contact' and 'anti-Argentina only' before meeting the President's eyes once more. "And the third, Your Excellency?"\n\n"You get a copy of every issue of that Estanquero magazine Prat published. And you get whoever is staffing our embassy in Chile to use their newfound free time to report back every heinous piece of Nazi trash that crossed the bastard's broken mind. Be sure to capture the most idiotic points. We, and the Chileans, need to know what kind of filth their new leader is made of.""
 BRA_latam_reactions.3.a: "Is Lacerda planning a prat-fall?"
 
 BRA_latam_reactions.4.t: "A Stack of Bad News"
 BRA_latam_reactions.4.desc: "As part of his new office, Lacerda received plenty of newspapers to read first thing in the morning. He preferred O Estado de S. Paulo, didn't mind Gazeta do Povo, found an illicit thrill in Notícias Populares, and ranged from distaste to disgust with the rest. But no matter what newspaper he read, they were all talking about the same thing.\n\nSALVADOR ALLENDE WINS CHILE ELECTION! The first time he read this, it was as if he'd lost the power of literacy. He had to re-read the headline several times, cross-reference it with the front pages of other newspapers to be sure he was not hallucinating. He knew of Allende, knew the wily little socialist had been making moves in Chile, but this?\n\nNEW GOVERNMENT'S COMMITMENT TO SOCIALISM AFFIRMED! Lacerda felt light-headed with panic. He'd only just started, and already he was dealing with a potential problem on his western front. Chile used to be so reliable, so guaranteed to be a partner. Now that support was less guaranteed. He could see the red over that vertical strip of land, like skin being flayed off to reveal muscle.\n\nTENSIONS WITH BRAZIL RISE AFTER ALLENDE'S PREVIOUS COMMENTS! What comments? Lacerda searched back through his mind's archive, trying to remember if he dealt with him before. And then it came back to him: God, he called him a fascist, didn't he? In one of his fucking rags?\n\nWith a small roar, Lacerda threw the newspapers off his desk, knocking off a paperweight and a small collection of pens. It was a feeble discharge of energy, but it knocked him out of his loathing and helped center himself. He slumped back in his chair, mouth slightly agape. Chile was now no longer a reliable partner. They were now a problem. He dreaded the inevitable confrontation with Argentina, now that he was down one partner."
 BRA_latam_reactions.4.a: "God, he thought, if only things could have gone differently down there..."
 
 BRA_latam_reactions.5.t: "Drinking Alone"
 BRA_latam_reactions.5.desc: "Bottles clinked as Lacerda sought the right poison for the occasion. Something bitter. Something strong. Something red. A Chilean pinot noir lurked on the bottom shelf. Apt.\n\nHe uncorked it and took a long, hefty swig. Allende. Of all the disgraces Chile could have chosen it picked the socialist. Soon-to-be communist. The man who would turn the mountainous republic into a dictatorship and its idiotic voters into slaves.\n\nThe burning rush of wine down his throat made the president cough and splutter, coating the presidential desk with red droplets. The official cable notifying him of Allende's victory, of Brazil and the OFN's total defeat, was splattered and stained. A dark laugh erupted from somewhere inside Lacerda... they'd have to file this document away somewhere. A memorial to disgrace.\n\nAnother gulp of wine, more measured this time. What did this mean for Brazilian foreign policy? Abandoned to fight Argentina alone, alienated from an ailing ally? Ally no more - Chilean communists would be propping up their ideological spawn throughout Latin America. A second front opening up for Brazil...\n\nLacerda, unwilling to relinquish his bottle, fumbled with the phone in his off-hand. Only one ring, and one swig, later, Minister of Foreign Affairs Leitão da Cunha picked up. And Lacerda said,"
 BRA_latam_reactions.5.a: ""Tell the Santiago embassy to pack up. We're breaking off relations with Chile.""
 
 BRA_latam_reactions.6.t: "Fear of a Red Sword"
 BRA_latam_reactions.6.desc: "...It is at this moment that I call upon the Chilean people, whose legacy of soldiery upholds their national mythos as the scabbard on the saber belt of South America, to do everything in their power to undermine the radical regime in Santiago! It is Allende and his dalliance with extremism that threatens to uproot the prosperity that we have all worked so hard to achieve in favor of a red dictatorship! Let Brazil's example be a warning to all; Radicalism in Chile shall find no ally in Brasília or anywhere in the Southern Cone where national sovereignty still reigns paramount!"\n\nHe did not take that well. As of earlier that week, the Brazilian ambassador to Chile thought dully, or rather, the former ambassador. The flight from Santiago to Brasília was a middle class charter flight. It would take some time, enough for the newspaper to function as a distraction when the admittedly pretty sight of the Amazon out of the window grew repetitive. Opting out of flying first class felt like a prudent gesture; better to ingratiate oneself to the common man in light of the recent election than not.\n\nOf course, he had already heard Lacerda's speech on the radio when he was packing his bags to return to Brazil, who hadn't? The velvet rope revolution Santiago had at the ballot box would only anger everyone close to Chile, none more so than Lacerda. He assumed the closing of the Brazilian Embassy was coming well before it was announced, and truthfully, he felt little concern over it all. There was plenty of work to be found back in the home capital, and even if Lacerda wanted to throw a foreign policy hissy fit over Allende, it would never amount to much of anything."
 BRA_latam_reactions.6.a: "He produced a BIC lighter and a cigar from his pockets as he leaned back in his seat."
 
 BRA_latam_reactions.7.t: "Partners Without Friendship"
 BRA_latam_reactions.7.desc: "The mood was jubilant at the Moneda. When Lacerda had heard of Frei's victory in the Chilean elections, the Brazilian president wasted no time in drafting up the plans to send Foreign Minister Leitão da Cunha to congratulate the new Chilean President and ensure the beginnings of a strong partnership. Frei was, by all accounts, an improvement over the old Alessandri regime - and would certainly be willing to partner with Brazil and the OFN more broadly. If he played his cards right, Lacerda could turn Chile's success into something even more fruitful.\n\nFrei had been nothing but a courteous and statesmanly host, warmly welcoming the foreign ministers and heads of state who attended his inaugural celebration. Leitão had wanted to get some time to speak with the new president in a greater capacity past a handshake and a sentence or two of platitudes, and so he had to wait past the celebratory speeches and the chicken dinner to catch more than a brief moment.\n\n"Foreign Minister, I am glad to see you. How are you finding the evening's festivities?" Frei was all smiles as he shook Leitão's hand.\n\n"I find them quite well, Mister President. President Lacerda congratulates you on your victory and wishes to convey to you that you have a willing friend and partner in his Presidency. He hopes that we can work together to bring peace and prosperity to the continent."\n\n"That is appreciated." Frei's smile kept wide, but the corners of his eyes sharpened. "I respect President Lacerda's foreign relations with the US and his preservation of Brazilian democracy, I have some...misgivings of him as a person."\n\nLeitão paused for a moment as he absorbed Frei's diplomatic way of saying that he hated Lacerda's guts. "Well, even despite all that, he and I both believe we can work with you. Allow me to toast your success.""
 BRA_latam_reactions.7.a: "The President chuckled, nodded with understanding, and accepted the toast with a clink."
 
 BRA_latam_reactions.8.t: "Arrested Development"
 BRA_latam_reactions.8.desc: "Once again, Lacerda held his pen in his hand, pondering the message he had written as a memo in front of him. "Mr. Santander, you have my deepest condolences for the death of your predecessor. To lose a magnificent and beloved leader before his time is a tragedy, and my heart is with those mourning his loss." He had written, then rewritten it several times. It was only a procedural message, sure, but going too far risked being interpreted as reconciliatory by its emissaries.\n\nA knock. One of his secretaries was bringing in new files, halting only to ask about his upcoming schedule, and for his responses to those previously brought in. Lacerda still had more than enough time, but he still decided to give the memo over, ordering it to be transferred, first to the Brazilian embassy in Buenos Aires, and then directly to the Argentinian government. Only one more paper to add to the pile of his counterpart's desk, but he was hopeful that it wouldn't be forgotten.\n\nLacerda stopped himself once again, now deep in thought. Rarely had an Argentinian politician attracted his attention, let alone approval, nearly as much as Silvano Santander had. Few men had been as staunch an opponent of authoritarianism as Santander had been. Even fewer still had been such an open critic of Juan Perón, and had been arrested in the defence of freedom. Truly, Santander could have been a valuable ally against fascism, against communism, and against Nazism.\n\nIf only. Lacerda was many things, but a fantasist was not one. Peronism had not quite broken out of Argentina, but he knew the Varguists weren't far behind. They would do everything in their power, he thought, to defend a contagious strain of their worldview. The military, too, had a lot to gain from their current antagonism with Argentina, and would not stand for any form of rapprochement. Perhaps, in another world, their administrations could have ushered in an age of regional peace and liberty."
 BRA_latam_reactions.8.a: "And so, with time to burn, Lacerda spent it on things that could never be."
 
 BRA_latam_reactions.9.t: "Pushing His Limits"
 BRA_latam_reactions.9.desc: "Firmly grasping the paper in his hands, Carlos Lacerda read over its report one last time. After an intensely-fought election, the Radical Civic Union, headed by Rodolfo Martinovic had won. Lacerda knew better than to ever publicly intercede - to do so would be shrugged off as an unfunny joke by his ideological opponents, and would be electoral suicide for his ideological allies - but he also knew better than to simply write this off as irrelevant to his future policy.\n\nIt did not take knowing about the minutiae of Argentine politics to know what Martinovic's victory represented. The left-wing nationalism advanced by Hipólito Yrigoyen, and the antagonism it provided towards the United States, boded poorly for him. Its arguments and views, ultimately, were not truly far from those of the Varguism he'd spent decades of his life working against. Once again, he sighed, setting down the newspaper. Another country had embraced ideological insanity.\n\nBut, Lacerda thought, worse candidates could still have won. The UCRP, for all of its flaws, still ultimately supported the democratic process. What speeches he had heard from Martinovic at least came with an intense revulsion from fascism, and the reports he had received on internal dynamics indicated that this was not a fringe stance of his among UCRP adherents. If nothing else, they weren't outright Peronists, and the supporters of that ousted tyrant were licking their wounds.\n\nPerhaps this was not the worst case scenario. The Radicals would attain power, they would struggle with implementing rational policy, the voters would find themselves increasingly alienated, and provided that the Peronists didn't worm themselves back into the minds of the electorate, they would turn back to sanity and vote for a more right-leaning government that would come to power with minimal fuss. Even still, he thought, best not to give them the acknowledgement that others deserve."
 BRA_latam_reactions.9.a: "The best and worst of no worlds."
 
 BRA_latam_reactions.10.t: "A Spectre Haunting La Plata"
 BRA_latam_reactions.10.desc: "Holding the paper in one hand, Carlos Lacerda read over its report one last time. He knew better than to ever intervene in Argentine politics - but he also knew better than to simply ignore everything that happened there. A victory for an aligned faction could really help him. And, as his eyes lifted off the pages, he knew that it had. Emilio Jofré, and the National Federation of Centrist Parties, had managed to win, pushing a tightly-contested election down to the wire.\n\nHowever, it was not Jofré himself that Lacerda's interest was drawn to. The man himself, whilst agreeable, was only one of a hundred factors. It was the wider Argentine conservative movement that drew his gaze, and the implications of their victory. He had once stopped watching over their rise, but Lacerda now cursed himself for not being more attentive. These were reasonable men, and if not removed immediately, would become valuable, southern partners to him.\n\nWith that, Lacerda placed down the report, leaning backwards into his seat. Even calling them reasonable men was a disservice to them. These were devoted anti-fascists, ones open to negotiation and common sense, rejecting the far-left and far-right in equal measure. It would be difficult to go over the military's plans for the region, perhaps, but establishing firm relations between himself and this new government as a means of combatting extremism was a worthy end by itself.\n\nAlmost reflexively, Carlos Lacerda turned to his desk, bringing a piece of paper to his typewriter to offer his congratulations. He was sure that it'd only be considered for a second by Jofré's incoming government, but it was a valuable start, one that could percolate across the movement and breathe sanity into the region once again. New trade deals, reduced military presence, and a strengthened commitment to international justice could all serve as planks in cooling mutual frustrations."
 BRA_latam_reactions.10.a: "If only he could go all the way and end this Cold War."
 
 BRA_latam_reactions.11.t: "Wrong-Wing"
 BRA_latam_reactions.11.desc: "Firmly grasping the paper in his hands, Carlos Lacerda read over its report one last time, the paper folded down by the pressure of gravity, and under his hawkish gaze. After a tight contest, Guillermo Estévez Boero and the Popular Socialist Party had managed to push themselves into power. Even with the limited attention he had devoted to Argentinian politics, the prospect of an Boero presidency still filled Lacerda with a degree of real sorrow.\n\nHe knew all too well what Boero represented, and just how far it diverged from his idea of sanity. Total codification, and the unification within Argentina, the coalescence of nationalism and leftism into a toxic ideology, coalesced by turning away from Berlin to designate the United States as the beating heart of fascism, and all of its allies as collaborators. Lacerda's stomach turned at the prospect, one that he viewed as unforgivable, and one that he knew would not invite any means of softening the Cold War.\n\nLacerda also knew all too well where Boero had come from. A student activist, Boero had spent much of the last decade riling up students, misplacing their woes and directing their anger into his personal enrichment. They had done that well, Lacerda thought, shaking his head. How he had gone beyond that base of unkempt, unrefined radicals to allow the Argentine populace to feverishly enable his rise to power was an issue that Lacerda struggled to justify. Even Goulart, he thought, wasn't as radical.\n\nBringing out another sheet of paper, Carlos Lacerda began to write. He knew better, even now, than to completely break what relations Brazil still shared. The powder keg was even closer to firing than normal, and there were better strategies Brasília could employ than justifying revanchism on both ends of the border. Instead, Lacerda decided to probe potential avenues that Brazil could use to benefit from the situation, so long as he viewed Boero as merely troubling."
 BRA_latam_reactions.11.a: "Dancing on the edge of oblivion."
 
 BRA_latam_reactions.12.t: "The Scheming Crow"
 BRA_latam_reactions.12.desc: "Carlos Lacerda always liked to consider himself a refined man, one firmly aligned with the causes of justice and liberty. Vargas' regime had ensured that he would never feel any sympathy towards him, or his successors. He knew better than to believe that the socialism of João Goulart or Kubitschek was fundamentally different from those thugs that had previously tried to kill him, or to ever let up on them. To lift his gaze from them for even an instant would be time aplenty for them to pounce.\n\nAnd so, he felt a burning rage as he heard of the results from Argentina. They could disguise themselves in a million different ways, and they could attempt to embrace a billion different disguises, but the cracks in their ideology always showed. No matter how much they claimed to cling to ideals of "Justicialism", he would not be tricked into ever viewing them as anything other than a ghost, a Trojan Horse through which Peronism could return across the Rio de la Plata.\n\nIt didn't take much to lift their veil. Their foreign policy was exactly as antagonistic as any diplomat could fear, their economic policy was as ludicrous as Perón's own, their embrace of fascism as whole-hearted and repulsive, their national enemies were drawn in the same visage. Every aspect remained from top to bottom, only loosely hidden beneath the disguise of a smile. Lacerda didn't know whether to hold them more in contempt or the fools tricked into supporting this reheated nonsense.\n\nBut if he wanted to move, he had to act fast, and smart. He found their government repulsive, sure, but breaking off relations with Argentina entirely would not only jeopardise any thinking Argentine still left, but would throw Brazil dangerously close to the edge. But he wouldn't just accept this new order as a natural, irreversible state. The moment those supposed Peronists without Perón were to allow their military to show their true colours, he would be more than ready."
 BRA_latam_reactions.12.a: "The numbers for diplomats representing neighbouring powers echoed in his head once more."
 
 BRA_latam_reactions.13.t: "Hell Is Empty..."
 BRA_latam_reactions.13.desc: "The newspaper crumpled beneath Lacerda's white-knuckled grip, the face of president-to-be Juan Perón's face distorting. A drop of sweat landed on the headline of "PERON TO RETURN FROM EXILE." With a roar of rage, Lacerda split the photo in half. "Fucking fascists! Entire nation of people who think of nothing but violence!" He spat.\n\nOf course, he prayed for God's wrath to strike down Perón's plane before he touched down in Buenos Aires. If God wasn't merciful enough, he had to act before the bastard took power. From here on out, he wouldn't have a second to breathe. Nowhere in South America would be safe from Argentine influence, and every resource will have to be spent to keep Brazil and her neighbors safe.\n\nHe couldn't wait for Perón to strike the first blow. Brazil would have to commit more to the military. More soldiers. More tanks. More fighters. More missiles. Any kind of relationship with Argentina would have to be broken. It would only be helping. As Perón flew over the Atlantic, Brazil's embassy staff was coming home.\n\nLacerda stared at the bisected face of the devil himself. He was ready for his games, whatever they may be. All there was left to do was to say another prayer for victory."
 BRA_latam_reactions.13.a: "...and all the devils are here."
 
 BRA_latam_reactions.14.t: "Adults in the Room"
 BRA_latam_reactions.14.desc: "The news of Arambaru's ascension to the Argentinean Presidency was a warm relief to Carlos Lacerda, as if it marked an end to all the madness that preceded it, the carousel of strongmen putting on their best caudillo impressions.\n\nIt was a welcome breath of fresh air, not just for him, but for all of South America. With reasonable men managing the two largest democracies on the continent, there was a real chance for peace by putting an end to their Cold War, by returning their lands to normality. Even if Arambaru's democracy seemed more like window-dressing at times, his intentions were noble, and that was what really mattered.\n\nWith that, he made a note, to be transferred to the relevant ministries. The government line on Argentina would change to one of critical support, spread through state institutions and sympathetic media outlets. Through this, closer ties with the new regime could be formed, and a happier continent for all.\n\nAt least, that was how Lacerda ideally pictured it. In practice, it would be far harder, but a man was allowed to dream."
 BRA_latam_reactions.14.a: "A managed response to a managed democracy."
 
 BRA_latam_reactions.15.t: "The Silent Treatment"
 BRA_latam_reactions.15.desc: "Their Brazilian embassy in Chile had sent the letter a week ago. Now, Adhemar turned over a copy of that exact same letter in his hands. It was perfect: a neat, soulless congratulation to President Rettig following his victory in the elections — and not a single orthographic error!\n\nThe only thing Adhemar wanted in return was a similarly soulless tip of the hat from the Chileans. Was that too much to ask for? But no. Nothing. No reply. No phone call. Not a single nod from across the Andes.\n\nAnd Adhemar wasn't having it. "Keep things polite," he ordered the embassy staff during a meeting. "Polite, but distant. If they want to talk, they can come with their own letters."\n\nThe diplomats understood. No outreach. No initiatives. No favors. If Rettig wanted to play coy, so be it — but he'd be playing alone. Brazil wasn't about to drop to its knees and beg for attention."
 BRA_latam_reactions.15.a: "It's not like Adhemar could do anything about it."
 
 BRA_latam_reactions.16.t: "To Tempt a Technocrat"
 BRA_latam_reactions.16.desc: "On the third floor of the Planalto Palace, President Adhemar de Barros gave his golden pen another lazy twirl. The briefing on newly elected Chilean president Julio Philippi Izquierdo had grown several pages from its previous incarnation, back when Philippi had been a mere candidate. Notes on his campaign promises, modest to Adhemar's taste. Notes on his work in Alessandri's cabinet, all dutiful enough. A footnote on Phillipi's studies so large that it alone might reach to Santiago. But nothing with which to hook this ideological void into tighter ties with Brazil.\n\nAdhemar stilled the pen mid-sweep. He had it. The nib plunged to a sheet of loose paper on his desk, scratching out a promise of prosperity. Or at least the first draft of one. Always pleasant to practice his Spanish.\n\nYour Excellency,\n\nThe people of Brazil, and myself foremost among them, count ourselves lucky to see the Chilean presidency in such sure hands. The leadership and acumen you displayed in your former role in the Ministry of Economy will now surely lift Chile up to new heights of wealth, creating opportunities for commerce and trade as welcome in São Paulo as they are in Valparaíso. Know that I personally and Brazilian business as a collective, wish to see you succeed in your ambitions, and are eager to begin discussing how we can strengthen economic relations between our two states. You are welcome, as my guest, in Brasília at any time. I promise you a most enriching experience.\n\nAnd with one last twist of the pen, he signed,"
 BRA_latam_reactions.16.a: "Adhemar de Barros"
 
 BRA_latam_reactions.17.t: "All Is Right in Chile"
 BRA_latam_reactions.17.desc: "Your Excellency,\n\nI read with great anticipation the victor of Chile's elections, and was very pleased to see the name Jorge Prat atop my briefing this morning. My warmest congratulations.\n\nWhile we haven't yet grown personally acquainted, everything that I read about you suggests that Santiago and Brasília will grow closer than ever during our presidencies. Your faith guides you as mine does me, and I hear you also have a healthy respect for the economic benefits of private initiative. Your forthright statements on the perils of Argentine aggression suggest that our foreign policies will align.\n\nSome of your speeches on the campaign trail heralded understandable skepticism to the overweening role played by North Americans in the Chilean economy. I assure you that Brazil - its businesses, its financiers, and its president, stand ready to assist your nation as it looks to diversify its markets and sources of investment. May our partnership be a renewed font of prosperity on both sides of the Andes.\n\nYours faithfully,"
 BRA_latam_reactions.17.a: "Adhemar de Barros"
 
 BRA_latam_reactions.18.t: "Red Flag"
 BRA_latam_reactions.18.desc: "President Adhemar de Barros had today's paper stretched taut between his hands. But next month's, next year's headlines were plain to see: 'Chilean Capital Flight Intensifies', 'Santiago Announces Further Nationalizations', 'LATAM Socialists Convene in Valparaíso'. All bound up in those five little words: 'Shock Victory for Allende in Chile'.\n\nAdhemar tore the paper in two. 'Shock' - 'Allende in Chile' now lay across his desk. What did they pay those intelligence analysts for? They'd assured him that it would be the moralizer Frei at worst. Instead Brazil's Pacific partner was barrelling down this Chilean road to socialism, with a quick pitstop at national and international crisis.\n\nA twitch of the mouth and Adhemar swept the papers into the wastebasket by his side. He reached for the phone. Who to call first? 'Shock'. Ministry of Foreign Affairs - how bold would Argentina become now? 'Allende'. PSP party headquarters - what was this doing for his ratings? Allende 'in Chile' had been calling him a robber baron on the campaign trail for weeks... So many numbers in his head - 'Shock'- that Adhemar's fingers followed on their most practiced course."
 BRA_latam_reactions.18.a: ""This is de Barros. Liquidate all my Chilean holdings.""
 
 BRA_latam_reactions.19.t: "For Form's Sake"
 BRA_latam_reactions.19.desc: ""Frei, huh," said President Adhemar de Barros, voice flat as he leafed through the morning's briefing.\n\n"Certainly not the worst president Chile could have elected," replied Foreign Minister Leitão da Cunha, taking his place at the Palácio's long table. "Personally, I am hopeful that President Frei will be able to address Chile's long-running rural challenges. Head off instability and socialism and give us a firmer partner against Argentina."\n\n"I'm hopeful that our relations will remain cold rather than strained. All his grand, pie-in-the-sky plans on education, in the fields, across the globe, and with their copper remind me of Kubitschek. Could be who Frei wanted to see in the Planalto - it certainly wasn't me." The President set the briefing aside and beckoned an aide for drafting paper.\n\nAs Adhemar's gold pen glided back and forth across the page, Leitão da Cunha ventured yet again, "I would be happy to work with our Chilean experts at the Ministry to draft a congratulatory letter for your signature. Could free some time ahead of your meeting with Natel."\n\nAdhemar lifted and then shook his head with a toothy grin and a trace of his usual charm, "No, no. Nothing more vital than that personal connection." His gaze returned to the page, "And where else do I get to show my mastery of formal, cordial, and outright dull Spanish?" The two shared a brief chuckle, before the President said,"
 BRA_latam_reactions.19.a: ""Wouldn't have minded a different audience though.""
 
 BRA_latam_reactions.20.t: "The F Word"
 BRA_latam_reactions.20.desc: ""Palacios is dead. This new Argentine, Silvano Santander, is putting up a valiant fight against rigor mortis to see if he can be more rigid and inflexible than his predecessor," spat President Adhemar de Barros. Foreign Minister Leitão da Cunha struggled to hide a grimace at the crude remark, but de Barros continued his rant without noticing."Santander - this man is a cosseted elite who has never spoken with ordinary folks, let alone done anything for them. And he never will! Santander will do nothing for the welfare of his people, because he has no taste for the feel, the grit, the realities of politics. A little oligarchic saint sitting there on his pillar condemning the world!"\n\nThe President was pacing back and forth across his Planalto office now, rays of sunlight breaking and reappearing as he past, "Santander whines about communists, he jumps at imaginary Nazis. Thinks the fascists are trying to bring down his government. He will do that himself, no need for any fascists!"\n\nLeitão da Cunha tried to stand stock still, to follow the outraged President with only his eyes. "And that is why, Vasco, this annoying mosquito of a man will accuse me, accuse this administration of being fascist. To deflect from his own failings. And when Santander makes that move, Brazil must be ready."\n\nLeitão da Cunha's mouth moved before his head could halt it, "To do what, Mr. President?""
 BRA_latam_reactions.20.a: ""To fight. If Argentina wants a fight, they'll get it.""
 
 BRA_latam_reactions.21.t: "Birds of a Feather"
 BRA_latam_reactions.21.desc: "Adhemar had just finished writing his latest letter: a message of congratulations to the new Radical government in Argentina. President Rodolfo Martinovic had earned his victory rightfully, establishing himself as a new paragon for Argentinean democracy, giving new life to the prospects of peace between Argentina and Brazil so that they may blah blah blah...\n\nIn truth, Adhmemar considered Martinovic to be weird, not unusual in Argentine politics, but he was noticeably odd. He seemed to endlessly blather on about anti-imperialism, about America being the great evil of this world, a lot like that poor soul Quadros. His more left-wing tendencies left something to be desired too.\n\nHowever, Adhemar could keenly recognize a fellow populist when he saw one. With that, there was opportunity, if both parties could spin it that way. For instance, a business deal can always be portrayed as the creation of new jobs to enrich workers and families, rather than a narrative of capitalist exploitation droned on by communists and misanthropes.\n\nSo, Adhemar was content, content that Martinovic would see things his way. If not, maybe a little gift would act as an extra incentive, an envelope of a different kind."
 BRA_latam_reactions.21.a: "With two populists, they should be twice as popular!"
 
 BRA_latam_reactions.22.t: "On Behalf of the Brazilian People"
 BRA_latam_reactions.22.desc: "Adhemar tapped the stillborn letter with his pen. "On behalf of the Brazilian people," what? As president, it should be his job to speak for his nation — hell, that's why the people voted for him! But co-signing the letter directed at the Argentinian Conservatives felt wrong. The Brazilian people didn't want this. He wanted this.\n\nSay what you want about them (and Adhemar certainly did have much to say), but they did want détente. They were elitist bastards who wanted to lock the world in amber, but they did want détente. They barely cared for the common people, but they did want détente. Adhemar didn't understand how they'd returned to Argentina, but they did want-\n\nBy now, his pen had left a dark inkblot. Without much fanfare, Adhemar threw draft #3 into the pile and reached for another empty sheet of paper. Were there any redeeming qualities in the new Argentinian government? If nothing else, Adhemar was rather fond of that Jofré individual. He was a conservative — yes — but something told him that man was more lucid than his decomposing peers (especially when it came to the economy).\n\n"To the Government of the Argentine Republic,\nOn behalf of the Brazilian administration and its people, I extend our heartfelt congratulations on the inauguration of President Emilio Jofré. May this mark the beginning of a renewed chapter of friendship and cooperation between our two nations and across South America."
 BRA_latam_reactions.22.a: "This time, with a little more heart."
 
 BRA_latam_reactions.23.t: "Argentina's Bad Joke"
 BRA_latam_reactions.23.desc: "The newspaper shook in Adhemar's hands as he read the news: Guillermo Estévez Boero had won the Argentinean elections. He had only gotten halfway through the first page of the story before he had dropped the papers entirely and began to laugh. A deep laugh, straight from the heart.\n\nIt was ridiculous. The world had to be playing some kind of poor joke on him for a student activist to become the leader of Brazil's rival nation during Adhemar's tenure as President. For as long as Adhemar could remember, his career had been dotted with student activists protesting perfectly ordinary politicking and policies, barking like dogs over tiny details like a politician getting some benefits from his own hard work, or a pragmatic choice in who won a contract.\n\nAdhemar picked the newspaper off of the floor and set it aside. If this is the hand fate dealt him, at least it was an interesting one. Adhemar would have to keep an eye on the situation, but he relished the anticipation of what was to come as he picked up his pen.\n\nAfter all, Boero, despite everything, seemed like a man that could be negotiated with, and so there wasn't any reason to burn bridges yet. A simple congratulations letter was all that was needed to get the ball rolling."
 BRA_latam_reactions.23.a: "When it comes to the fates of nations, everyone learns to compromise."
 
 BRA_latam_reactions.24.t: "The Beginning of Something Great"
 BRA_latam_reactions.24.desc: ""Peronists Win Argentinean Elections" read the headlines in great bold font, displaying the news to anyone who picked up a newspaper. Adhemar had always thought that Perón had some great ideas, and he was more than happy to see that the people of Argentina had finally agreed.\n\nAdhemar had wanted to make some new friends in Argentina, and this new Cipriano Reyes fellow and his government presented the perfect opportunity. Adhemar quickly swapped out the newspaper in his hands for a pen, as he began writing a letter of congratulations.\n\nMany congratulations, much praise, and one promise to personally attend the inauguration of Reyes later, Adhemar put the pen down, satisfied. It had only taken a single draft, and it felt like the fastest official letter he had ever written as President. Adhemar was sure this was going to be the beginnings of a wonderful relationship between Brazil and Argentina, and hoped that both their governments could work together to bring prosperity and an end to the brother wars in South America. He'd personally make sure the letter got mailed out as quickly as possible."
 BRA_latam_reactions.24.a: "Peace surely lies ahead for both our nations."
 
 BRA_latam_reactions.25.t: "Rolling Out A Blue Carpet"
 BRA_latam_reactions.25.desc: "Alberto Campos sat still in his office. Around him was a ticking clock, the soft rustling of the wind outside, the restless tapping of his foot; these were all distractions from the sound he dreaded and desired to hear. He could feel his breath cycling through his lungs, with its slow, unsteady pace. When the phone finally rang, Campos lunged at it.\n\n"Mr. Campos, is that you?" From the other end of the line, he heard smacking lips. "This is Adhemar de Barros. How do you do?"\n\nCampos' blood chilled. "Good evening, Mr. President. I'm fine. How are you?"\n\n"Splendid, Alberto. Do you mind if I call you Alberto?" A pause, no more than a second; Alberto's body and tongue were painfully still. "Well, Alberto, I have a number of friends with planes that we can charter. They'll get your man from Madrid to Buenos Aires without any suspicions being raised." The voice on the other end of the line was cool, lacking the flop sweat on Campos' forehead. "I'd love to give him something more fitting, but one has to be discreet with these things."\n\nCampos clutched the telephone and braced his elbow on the desk to keep his hand from shaking. "Argentina thanks you. We won't soon forget this."\n\n"Of course, of course. Say hello to Perón for me when he arrives. Good night, Mr. Campos."\n\nAdhemar de Barros placed the receiver back in his cradle, and his smile fell with it. He wiped away sweat from his brow, rose and made his way to his liquor cabinet. He grabbed the first bottle he saw, along with a glass and some ice. As he poured the liquid whose label he'd not checked into the glass, he caught his uncertain face in the mirror. He took the glass and raised it..."
 BRA_latam_reactions.25.a: "...a silent toast to the man he prayed was best for Brazil and Argentina."
 
 BRA_latam_reactions.26.t: "A Northern Thaw or a Southern Slow Burn?"
 BRA_latam_reactions.26.desc: "Adhemar de Barros' limousine hustled along the boulevard with practiced pugnaciousness, the statesman's visage looking onto the passing frescas of Brasília like a cartoon, the rotating canvas of old European architecture stitched onto the Amazon as a backdrop; The meeting with Argentine ambassador had gone better than it ought to have, de Barros quietly musing on the implications of it behind crossed legs and steepled fingers. Is this a foundation that can be built upon? de Barros pondered.\n\nAramburu's election victory was a welcome diversion from the typically gloomy news coming out of Buenos Aires, the moderate progressive platform doing much to sap support from the left and the right in Argentina. Politics had the potential to become predictable in the Southern Cone, easily manageable and even beneficial to Brazil for a change, assuming his less savory tendencies could be kept in check.\n\nThat having been said, de Barros' experience as a Paulista politico meant that Aramburu's brand of otherwise benign egalitarianism was going to work on him; Adhemar could tell right away what kind of manipulative bastard the new Argentine president was, as he himself had made his bones reducing these kinds of backroom desk mice into stepping stones for more proven leadership.\n\nAramburu's real issues revolved around his foreign policy, something that hardly dovetailed with the interests of their northern neighbor.; The OFN commitments were perhaps predictable after a generation or more of trying to walk backwards from Perón's excesses, but it made de Barros' job more difficult in trying to secure Brazilian neutrality. Maybe Buenos Aires' leadership could be negotiated into something more mutually accommodating with Brasília, but, until then, maintaining a vigilant eye and a guarded approach to Argentina's new leadership seemed to be the order of the day."
 BRA_latam_reactions.26.a: "The more things change..."
 
 BRA_latam_reactions.27.t: "A Little Less Confrontation"
 BRA_latam_reactions.27.desc: "The news of the UCRP's victory in the Argentine elections brought a smile to Edna's face, a respite in a hectic time. She didn't follow their politics too avidly, but the Radicals were singing from the same Hymn sheet as the PTB, even if they were singing to different choirs.\n\nThese differences were made acutely aware to her as she read about Martinovic's speech. "Peace will never be an option as long as America has a presence in our continent." "We only know one imperialism here, and its capital is not Tokyo, but Washington." "Argentina will not bow to foreign tyranny." It was all exhausting, but she figured it was what his audience wanted.\n\nShe also figured that Martinovic was a politician, and like all the politicians she had become familiar with thanks to Adhemar, his words would be a lot softer if he wasn't put on a pedestal. So, Edna made the first move, writing out a florid letter of congratulations. It would be a work of art, something that would soften him up for when she met him at the inauguration."
 BRA_latam_reactions.27.a: "Is there nothing better than left-wing cooperation?"
 
 BRA_latam_reactions.28.t: "Past the Cover"
 BRA_latam_reactions.28.desc: "The Conservative Party in Argentina was something Edna regarded as a museum piece, an assortment of old men who thought life was better when women didn't have the vote, or when only they could vote. Her reaction that they had claimed victory in their most recent election was suitably disappointed upon hearing the news, feeling a bit of sick come up out of her throat.\n\nWhen she studied the news further, her reaction tempered somewhat. Their new President, Emilio Jofré, was somewhat distinct from the usual Conservative stereotypes. After listening to a brief biography presented to her by an assistant, she felt more relaxed knowing he wasn't an oligarchical ogre, but someone from the twentieth century able to stomach women being in politics.\n\nMore pressingly, the Conservative Party — despite lingering regressive attitudes — were doves when it came to the South American Cold War, notably advocating for detente between Argentina and Brazil. It was almost as if their election was her wish regarding a moremore peaceful and prosperous Latin America answered.\n\nAnd so, she happily began writing down a letter of congratulations, with a realigned attitude to her new neighbor ruling party."
 BRA_latam_reactions.28.a: "A sigh of relief for peace."
 
 BRA_latam_reactions.29.t: "Back to School"
 BRA_latam_reactions.29.desc: "When Edna first heard that the Socialist Party had triumphed, there was a smile on her face. As the news trickled in, the smile became subdued, albeit still there.\n\nNewly-elected Guillermo Estévez Boero could not help himself but play-up the typical anti-American sentiments, acting as if they were in anyway comparable to the fascist rulers of Europe, alongside some symptoms of the traditional nationalist chest-beating all too common to Argentina.\n\nHowever, there was potential. Boero was a former student activist, a group she knew very well from her time teaching, and a group she could easily talk to. With their shared left-wing ideals, there was certainly potential to shape the new President, turn him to her side. No reason why both their nationalisms couldn't peacefully co-exist.\n\nHis impending inauguration would prove to be an ideal opportunity for this, so she made sure to prep him with her letter of congratulations."
 BRA_latam_reactions.29.a: "Where one sees challenge, others see potential."
 
 BRA_latam_reactions.30.t: "A Southern Recurrence"
 BRA_latam_reactions.30.desc: "The sound of Edna Lott tapping her fingernails would have driven any guest in her office mad, fortunately for her, she kept her flagrant irritation more or less private. She had spent most of the afternoon on the telephone, with everyone from foreign dignitaries to her colleagues in cities along the Argentine border to opposition leadership, all to a wide variety of decibels reflecting the dour mood in the Altiplano.\n\nPerón. Edna thought contemptuously. Perón again. Not even a generation removed, and the acolytes of Argentina's most corrosive Admiral dictator had returned to Buenos Aires. Cipriano Reyes might be a fresher face compared to his predecessor. Still, the impetus had hardly changed: Presidential Imperialism and Pestilential Nationalism, however, couched in the language of progressive half-measures to keep widespread antipathy at a minimum.\n\nAs much as Edna could feel the painful period Argentina was about to enter into, her job remained more or less the same. Brazil could not just slam the door on Buenos Aires just yet, and there was enough window for Reyes to prove himself more amicable than Perón. Negotiations, trade deals, and maybe even military co-assistance. Nothing was off the table so long as the Justicialists could play nice.\n\n Not all was lost for Brazil's southern neighbor either, as the more moderate progressive stances on labour and women's rights was a tendency that the forward-thinking people of Argentina could extrapolate. Perón himself, vile as he was, supported Vargas' return to Brazil decades before, a decision that allowed for a freer political environment for Brazil in the long run; What would her political career have been had that not happened? It was a venal suggestion, but maybe the same logic could be applied if Reyes truly was on the level?\n\nIf nothing else, it couldn't hurt to try."
 BRA_latam_reactions.30.a: "Trust, But Verify."
 
 BRA_latam_reactions.31.t: "Passing The Buck"
 BRA_latam_reactions.31.desc: ""Mr. President?"\n\nPedro Aleixo took a moment to look up at his aide. He still struggled with the title; he didn't expect to keep it, so he kept it only at arm's length. "Yes?"\n\n"Mr. President, there's some news you should know about." The aide handed over a telegram from the consulate in Buenos Aires.\n\n"Oh," he said, picking up the telegram. "[ARG.GetLeader]. Have Foreign Affairs write up a statement. 'Congratulations, good luck'; keep it boilerplate."\n\nThe aide took a moment before nodding, taking back the telegram and walking off to arrange the communiqué. As the door to his office closed, Aleixo kept staring at the wall. Argentina had a new president, and he struggled to care. He had plenty of problems just managing Brazil through this chaos; he didn't want to think about a country that, at least from his position, seemed to be doing better. That would be left to his successor, who would be chosen by the Brazilian people, who could bear the consequences of holding the title close to them.\n\nHe thought it prudent not to meddle in things that did not concern him, and right now his concern was making sure that the PSP emerged from Adhemar's death as strong as possible. He thought this was a matter best left to the Ministry of Foreign Affairs. So he didn't bother thinking about it after this."
 BRA_latam_reactions.31.a: "Aleixo returned to his work."
 
 BRA_latam_reactions.32.t: "Making Best of the Unideal"
 BRA_latam_reactions.32.desc: "Távora watched the television with a muted curiosity, watching the speech of the new Argentinian president, the cheering crowds and fluttering flags surrounding him. The afternoon had felt otherwise banal, the characteristic heat in Brasília persistent even in Távora's well air-conditioned residence. He'd already seen the speech on the television at the Altoplano, but felt compelled to watch it again while he mulled over the issue of Argentina's new leadership at home.\n\nMartinovic was certainly something different for the leadership in Buenos Aires, doubtless lingering damage from Perón's time in office helped propel the liberal radicals to presidential office. His bluntly Anti-American foreign policy proposals and the UCRP's prominent left-wing nationalist bent was far too close to Vargas and his successor cliques for Távora's liking, leaving a foul taste in his mouth.\n\nThat said, UCRP was certainly more committed to rehabilitating Argentine democracy than a couple of the past presidents combined. In addition, this made their politics easier to predict - liberals, even radical liberals, were a type, after all - which was invaluable for planning out regional diplomacy in advance. Távora was prudent first and foremost, meaning if there was common ground to be found with Martinovic and his platform, there was certainly room to ensure at least cordial relations between Brasília and Buenos Aires."
 BRA_latam_reactions.32.a: "Cool winds can chill hot water, which is as good as the Southern Cone can ask for in the shadow of the New Order."
 
 BRA_latam_reactions.33.t: "Window to Reconciliation"
 BRA_latam_reactions.33.desc: "Restaurante Corcovado wasn't quite so busy that day, save for the distant rattle of paparazzi cameras in the distance as Távora had a pleasant afternoon meal. In the distance, the towering backside of Cristo Redentor loomed over him, the beaming summer sun cracking through the clouds to light up great stone edifice and cast a shadow over Rio de Janeiro as it had for generations.\n\nTávora felt compelled to find otherworldly inspiration in penning his letter to Argentina's newly elected president, praying the lord might bless him with the right words to congratulate the leadership in Buenos Aires.; First impressions were important, after all. Távora hoped to perhaps attend Jofré's inauguration in a couple month's time, thinking it would be a good show of support for the Brazilian president to attend.\n\nIn truth, the recent election was more of a victory for Brazil than it was even for the Argentine conservatives. Finally, Brasília and Buenos Aires sported party leadership that shared ideals, but presidential leadership that was somewhat comparable. Távora and Jofré were very much alike in this regard, as pragmatists, as conservatives and as patriots.\n\nSo much of the history in the Southern Cone was defined by mutual animosity between the north and south. Now with a mutual mandate of prosperity and national sovereignty ensconced in both nations, that most coveted and most elusive state of affairs., Detente, was finally within reach for both their people after so many generations had suffered so immensely.\n\nWith a flourish, a grin and a cup of coffee at his lips, Távora signed the letter with his signature and resumed his lunch."
 BRA_latam_reactions.33.a: "At long last, a chance to make amends."
 
 BRA_latam_reactions.34.t: "Another Red Specter"
 BRA_latam_reactions.34.desc: "Távora paced back and forth in front of the television with muted contempt, the air in the Altoplano thick with trepidation. He had been watching the recording of Guillermo Estévez Boero's rally in Buenos Aires over and over again, torn halfway between disbelief and mounting anxiety; After decades of anti-socialist repression, the heirs to that ancient fossil Alfredo Palacios had managed to hoodwink the Argentinians at the ballot box without even having to fire a shot.\n\nThe principal nation in the Southern Cone becoming a hotbed of socialist agitation, so soon after Guevara's gambit in Uruguay, was frightening enough on the face of it. Adding to this the PS and their unique blend of left-wing nationalism and particularly Anti-American slant to their foreign policy, it did not take a versed political analyst to see the already tumultuous relationships between Argentina and their neighbors become even more strained.\n\nTávora at the very least had the foresight to keep Brazil's priorities in perspective, something that might be lost with less qualified and more inflexible leadership at the helm; In his mind's eye, he could see and hear the absolute conniption Carlos Lacerda was likely having at this moment. How Távora's successors would handle Boero was more elusive to him, as the unruly nature of the new socialism regime in the south made them unpredictable. Távora would simply have to hope and pray the men of his party would be up to the task."
 BRA_latam_reactions.34.a: "Távora continued to pace in front of the television."
 
 BRA_latam_reactions.35.t: "Justicialism's Second Wind"
 BRA_latam_reactions.35.desc: "He had been on the phone with men of his party for what felt like the whole day and it was only mid-afternoon; Távora's head felt sweat beating down his brow as she shuffled around documents around his desk in every direction, phoning one colleague and another after another to compile a consensus on foreign policy to the sudden paradigm shift that just struck buenos Aires.\n\nThere comes a point in the life of even the most hard-bitten political operative that one has to draw the line somewhere; Távora was not naive, not anymore than Adhemar was. The Progressistas might have aspirations implied in their name, but they were definitively of the cynical type even to the layman. They knew what they were, said what they wanted loud and clear, and were perfectly willing to tilt in the name of their platform...but there was such a thing as too far, even to the students of de Barros.\n\nEven they struggled to find a more fitting example than that of Juan Perón; easily the spitting image of everything fundamentally wrong with politics in South America at their most acrid and that was saying a lot. When Távora had read that Cipriano Reyes, the new face of Argentina's resurgent Peronism, he all but ripped the newspaper in half.; Barely a few decades removed and Brazil had to put up with these chauvinistic baboons all over again?\n\nAnd what did it all mean? A generation of Argentine political acumen spent to sprint away from what Perón represented, just to hand it back to his heirs like he never even left? Populism gone rabid, nationalism gone cannibal and a foreign policy (a generous description at that) which was like to put the Southern Cone on the brink of war.; God damn them! Távora thought with intense frustration."
 BRA_latam_reactions.35.a: "A familiar belligerent returns to South America."

 BRA_pres_70_debug.1.t: "1970 Presidential Election Kicks Off"
 BRA_pres_70_debug.1.desc: "The Presidential candidates have been picked and announced. A fierce race now begins in Brazil for who will come out on top as campaigns kick into full gear. Campaigners go door to door convincing voters one by one on who to vote for. Great speeches are held in front of thousands to convince the popular masses, while backroom deals are held to give each candidate an edge. Meanwhile the military watches the campaign go on, their thoughts unknown to the public.\n\nIt is time to choose who you will campaing for."
 BRA_pres_70_debug.1.a: "[PTBPSDCoalitionCandidate]"
 BRA_pres_70_debug.1.b: "In the name of the father, campaign for Vargas!"
 BRA_pres_70_debug.1.c: "The only sensible solution, campaign for Braga!"

