 # Green Hell Trans-Amazonian Highway event
 brazil.6.t: "Green Hell"
 brazil.6.desc: "Luís paused to wipe the sweat from his brow, disturbing the coat of dust that had caked there throughout the day. Surveying the segment of gravel that had been his day's work, he gave a tired sigh. Nearly identical gravel patches had stared back at him at the end of every workday over the past four months. Finally the sun was beginning to set, and in the distance he heard the welcome rumble of approaching trucks, signaling the end of yet another long day of road-building.\n\nIn the hours it took to return to camp, Luís' mind wandered far from the cramped truck bed. He fished a small photo of his girlfriend out of his pocket, enclosed within a locket that had become his only reminder of life back home... He turned the locket over in his hands, as if after all these weeks he would spot some new detail he hadn't yet noticed. Luís couldn't stop thinking of their last days together. She had argued fiercely when he told her he was taking the job, disparaging the highway as "Lott's folly." Ha. She had always been smarter than him, more political. No matter the politics, no matter the argument, they needed the pay. Luís resolved to call her tonight, check how her mother was doing. Maybe.\n\nAs the truck clattered to a stop, just beyond the BELO MONTE sign, Luís noticed a small crowd had gathered next to another of the trucks. His heart sank when he saw that a body, horribly disfigured, was being lifted out of the bed. He pushed through the small crowd to have a closer look, and soon learned from the chatter that the corpse was one of the tree-choppers. Or, used to be one of the tree-choppers. A jaguar had ambushed him away from his team. He never stood a chance.\n\nLuís couldn't bear to keep looking. He pushed through the crowd and made for the mess hall. He had decided to make that phone call. At times like this, Luís was thankful he was one of the road crew; the mosquitoes and natives were already enough to worry about."
 brazil.6.a: "Only 2,000 kilometers to go..."
 
 brazil.7.t: "The Fascists Move"
 brazil.7.d: "Walther Salles sat across from Lott in the President's office, a sheaf of papers clutched in his hands. He spread them around the desk, a collection of graphs, reports and intelligence maps. "This is everything we have on the South African War. The US is almost certain to intervene along with the rest of the OFN shortly, but even without German support the Schild has the upper hand."\n\nPresident Lott sifted through papers for a while, examining each document in turn and asking an occasional clarifying question. These were the sorts of problems Henrique Lott excelled at solving. Troop movements, logistics, naval clashes, native resistance and foreign intervention. The SAW was a mighty puzzle, but as Lott examined the collected reports, he realized a piece was missing. The OFN was on the back foot. Democracy was on the back foot, and so Brazil was on the back foot.\n\nLott stood, suddenly. "Let's take a walk, Walther. I have some ideas I need to air." Salles followed after him, as they made their slow way out of the building. As soon as they were outside, Lott began to speak. "We are removed from the Eagle here, Walther. South America has already faced German aggression, the war will stop this. But how long can the civil war last? The Germans are at their weakest point in decades, but they are already rebounding. Standing by would be criminal. I... I'm rambling, Walther." He suddenly turned around and stared at Salles. "No matter what happens, I will not allow fascism to extinguish another democracy. Brazil will stand with South Africa, or you can call me Henrique Silva.""
 brazil.7.a: "They walked for a while, discussing how they would spin this intervention."

 brazil.8.t: "A Highway Too Far"
 brazil.8.d: "Filinto found it odd that there weren't any trails of sunlight after an incessant ringing noise made him get out of bed. Only to find out that it wasn't his faulty alarm clock, but his phone. This better be good. Upon plucking the phone, he is met with a familiar voice; a journalist friend of his, talking with a haste like it was bright midday. It was those treacherous natives again, now organizing protests to stop the expansion of a highway deep in the state. Rubbing his eyes as he connected his thoughts, Filinto delivered his orders: "Listen, this must be kept away from anyone in the SPI, they must not hear any word about it. I will handle the rest with the Governor." He let a sigh escape his mouth as he put the phone down. Even in the most ungodly hour subversives still kept disturbing all the progress he had made. But this is why men like him were still here.\n\nLater in the morning, with a redoubled cup of coffee to make up for the hours of sleep lost, Filinto waited impatiently for the governor of Mato Grosso, Fernando Correia, to answer his call; probably caught in the middle of his sleep as well. "So the índios are causing trouble again? And for you to alert me at this hour then it must be serious."\n\n"And it is, this is why I'm calling you," Filinto replied. "I want you to place your men in checkpoints to prevent the riot from spreading and then disperse it as quickly as possible. Make sure the orders are given to the state police, they will ensure the job goes without failure."\n\nA moment of pause followed, in which Filinto could swear he heard a sigh. "I see. I will discuss it with my advisors, but if this is what you mean, I have no objections. My only concern is this leaking to the media, or worse, to the SPI."\n\n"Don't worry about it Governor, you can have my word and rest assured that this will go unnoticed by the media outlets like it never happened.""
 brazil.8.a: ""Very well then Mr. Müller, your assistance is always appreciated.""

 brazil.9.t: "The Lights of Rio"
 brazil.9.desc: "Francisca, one of the millions crowding Rio's Copacabana Beach to celebrate the advent of a brand new year, cheered as the first of the fireworks began to light up the skies. She kept her three children clustered tight to her against the flow and crush of the crowd, hundreds of thousands of Brazilians who traveled to the beach from miles around to share in the joy of a new year. Food trucks and tents set up all over the white sands were left empty, as their owners joined the raucous celebrations. The fireworks were absolutely magnificent this year. Vibrant greens, blues, reds, every color imaginable lit up the skies, banishing all of Rio's darkness. For Francisca, this year had brought far too much of that darkness into her life. But now, as Rio was filled with light, her own problems seemed to evaporate in the glow.\n\nBrazil was not kind to single mothers, but Francisca, surrounded by hope, felt accepted for the first time in decades. Things would be different tomorrow. She would take her children back to the cramped apartment they called home, go back to six hours of sleep desperately taken in between constant work, go back to watching rich men walk past those even worse off then her without even a glance. But as she watched the brilliant lights of a new year light up Rio's sky, Francisca thought about how things were slowly getting better. Everyday things seemed just a bit cheaper, every paycheck just a bit bigger, the world just that tiniest bit more equitable. Despite everything, she was proud of her country. So long as Brazil kept to its course, Francisca might just be okay."
 brazil.9.a: "Hope was in the air."

 brazil.11.t: "An Elephant Enters the Room"
 brazil.11.desc: ""...Thereby, I promise to protect Brazil, protect the interests of the army, and protect the future of the fatherland against its politicians on my new position, being eternally vigilant against communist infiltrators, traitors and rebellious civilians on my ternure as general," said Sílvio Frota, after receiving his new promotion as a general of the army after the death of General Ancora a few days prior.\n\n"This is really bad..." said one officer on the back, close to his friend, Silva, "He is not even pretending to like democracy."\n\n"We have fought worse..." said Silva, "I am just getting a bit tired now, you know?"\n\nMicael knew exactly what Silva was talking about. The Brazilian Army never had been a unified institution, being divided into many different factions since its creation. For decades supporters of democracy have tried, sometimes with success, other times not so much, to prevent tyranny from taking power. First the Sword dictatorship under Floriano Peixoto the butcher, then Artur da Silva Bernardes and his martial law, followed by the New State under Vargas and now the escalating military radicalism by people like Frota.\n\n"There is no way to fix this permanentely, Silva," continued Micael "I'm afraid that the only way is to continue this war forever."\n\nAs Frota finished his speech and returned to his bench, everyone got up and began to applaud his figure.\n\n"I know, but what was that thing that that random American said... I think it was...""
 brazil.11.a: ""The price of freedom is eternal vigilance.""
 
 brazil.12.t: "The Sword Retires"
 brazil.12.desc: "Odílio was in front of the podium, on his front there were 500 cadets of the Academia Militar das Agulhas Negras, on their perfect white uniforms awaiting for him to say. He still had memories from forty years before when he was as young watching Marshal Setembrino de Carvalho retire, he didn't expect time to fly so much.\n\n"...I have fought for my country through all the battlefields possible, as a cadet against the old republic, as an officer against the Nazis in Britain, as a Brazilian against the corrupt politicians that pollutes our country, as a father against the socialists who want to corrupt our youth with their insane doctrines, and a lesson I learned and still carry with myself is that our country will always be persecuted by enemies from the outside and the inside, and thus my retirement might be the end of my fight, but it is the beginning of yours!"\n\nA massive applause started through the whole room, Odílio could see the pride and respect on the eyes of everyone on the room, true Brazilians, respectful Brazilians just like him. People who would pave the way for the country in the future and continue his mission, the good fight for their home, the home of their ancestors and the home of their children. Soon he wouldn't be on earth anymore, but his soul would continue alive through every single man on that run."
 brazil.12.a: "And after finishing his speech, Odílio wept, for his mission was over."

 brazil.13.t: "The Real Work Begins"
 brazil.13.desc: "Li drifted in and out of consciousness, catching bits of conversation and activity as they drifted past him. Muttered curses, a loud belt of laughter, metal on metal grinding. His lean-to's fabric walls provided no shelter from the sounds of daily activity, as he tried desperately to catch some sleep for the upcoming shift. He was on the night crew at this section of the Highway, tasked with clearing debris and paving, where the budget allowed. Their funds had been a lot barer recently, as the poor bastards up north finally started construction. At least he only had to pave over savannah down here.\n\nLi was finally falling back asleep when a sudden jolt shocked him awake, falling out of his hammock with a shout. He scrambled back to his feet upon seeing the source of his rude awakening, the titan of muscle and ill-fitting clothes that served as his crew boss. Manuel glared down at Li, his scarred hand still wrapped around the strings connecting Li's hammock to the lean-to's poles. "Bad news son. They just took one of our dozers, meaning everybody gets to start work two hours earlier. I've already heard every other fuck in camp bitch about it, so do yourself a favor, get ready and shut it."\n\nWith that he stomped off down the line, shaking awake the other members of night crew. Li sighed, and started pulling on his gear. Wasn't right to make an anchor watch man work while the sun was still up. Not right at all."
 brazil.13.a: "Do I even get paid overtime?"

 brazil.14.t: "What Have They Ever Done for Us?"
 brazil.14.desc: ""So, with all that out of the way, does anyone have questions?"\n\n"GET FUCKED!"\n\nGilmar smiled awkwardly at the profane, shriveled farmer woman at the front of the crowd. What was she, eighty? Whatever she was, she led the coalition of local farmers, natives and incredibly bad-mouthed elders that had shown up in force to brigade Gilmar's announcement. When he got the news that the Trans-Amazonian Highway had finally been hooked up to Marabá, and that he was scheduled to make the announcement, Gilmar had been very excited. It was a chance to see the public, to get some well deserved publicity! He expected cheers, flowers, general excitement, anything but... this.\n\n"YOU CUT MY GODDAMN FARM IN HALF JACKASS!"\n\n"HOW MANY MORE TREES ARE YOU GOING TO CHOP DOWN DUMBFUCK?!"\n\n"ONE OF YOUR IDIOT WORKERS LET MY COWS OUT, THEY'RE FUCKING GONE!"\n\nThe crowd of dirty peasants had shoved their way into the middle of the crowd halfway through his speech, and hadn't shut up since. Gilmar knew that there was some unrest about the Highway, but seeing it manifested like this was unnerving. It was probably time to make an exit. Wait, was she holding a rock?\n\n"Uh, thank you, that is all!"\n\n"ASSHOLE!""
 brazil.14.a: "Running from a crowd isn't unusual for Brazilian bureaucrats."

 brazil.15.t: "The Worst Is Yet to Come"
 brazil.15.desc: ""Manaus is officially connected to the Highway, gentlemen. Cheers!" The small group of politicians, engineers and foremen downed their drinks in one swift motion, celebrating yet another stretch of the Trans-Amazonian Highway's completion. Cutting through a large swath of the Amazon, these past months had been particularly difficult. Unfortunately, the worst was yet to come.\n\nLingering in the back of every one of the revelers' minds was the grim understanding that these last sections of the Highway were going to be... difficult. Though they had already breached the Amazon, the next step would take already exhausted workers and failing equipment into the deepest, darkest parts of the greatest jungle on Earth.\n\nThe politicians, snazzy in clean suits and judicial in their drinking, were dreading it the most. It was their job to sell the last stages of the project to a populace that had expected it done with years ago. The engineers and foremen were more optimistic. Looking at it on a map, this was old hat to them! They had already cut their way through half the blasted rainforest, what was this last stretch to them?\n\nTheir workers had been set loose on the city for a week, as the expedition repaired and readied itself for the upcoming months. Celebrations filled the streets as hundreds of men drank their worries away, spent their accumulated paychecks and enjoyed the company of Manaus' finest performers. They were going to enjoy their respite for as long as they were able to, trying to ignore the choking jungle all around them."
 brazil.15.a: "The Amazon awaits."

 brazil.19.t: "The Senator"
 brazil.19.desc: "A grey color dominated the skies of Mato Grosso as the sunlight attempted to bypass the clouds that blocked its way. Filinto Müller loved this kind of weather; it was what he grew up with. But today, he had no reason to enjoy the weather.\n\nThis morning's newspaper was plastered with all kinds of slanders against him - calling him a dictator, accusing him of collaboration with the Nazis and reminding everyone of his role in the Estado Novo. Ever since the UDN successfully snatched the position of Governor from the PSD, Filinto had been the target of endless slander campaigns. He was never personally bothered by it because he knew that everyone still needed his help to govern the heartland of Brazil.\n\nHe also knew he shouldn't stand by as his power was slowly taken away from him. He needed to defend his seat in the Senate, and denying the allegations would be fruitless, so he had to come up with a counter-attack. Wiping his round glasses, Müller swiftly disked to an acquaintance, a well-known printer in Cuiabá that he saved from being arrested for fraud charges.\n\nThe demands were simple - by the end of next week, the cities of Mato Grosso would be filled with all kinds of derogatory posters against the UDN, reminding people of their participation in the attempted 1955 coup and the removal of the minimum wage during Gomes' presidency. And the printer wouldn't have to worry about a cop knocking at his door.\n\nThen, he had to deal with the press. The small newspaper industries of Mato Grosso could not thrive without the help of the wealthiest families in the state, so he had some of them demand to write more pro-PSD campaigns, or else the money would not flow.\n\nAnd now, Filinto had to fulfill what he considered the most crucial task of the day - Antônio Pedro, his grandson, was coming to visit him. Smiling at the thought, the senator simply got up and walked out of his office."
 brazil.19.a: "Now he could enjoy the weather."

 brazil.20.t: "Little Wooden Boats"
 brazil.20.desc: ""We're getting nowhere, Henrique." Odílio Denys was a broad man, the type of man who was quick to anger and faster to laugh. He could always be trusted to speak his mind, to tell a colleague exactly where they fell down and where they excelled. Though they were in many ways opposites, President Lott had held Denys as one of his closest friends for years. Unfortunately, Lott didn't have the capacity for his War Minister's bluntness at the moment.\n\nBoth men were hunched over a large war table, depicting the waters affected by Brazil's latest national emergency. Wooden figurines of the proud Brazilian navy lay scattered on its surface in the latest rough battleplan Lott had devised, an attempt to halt the thousands of pirates infesting Brazilian seas and stealing Brazilian capital. Already, the pirates had taken millions of dollars worth of fish and lobster from Brazil's waters, putting hundreds of fishermen out of business. Lott had been repositioning the figures with Denys' input for hours, to no avail.\n\nThe President sighed. "Resources are limited, Odílio. We have to find a way to end these pirates with our current taskforce, unless you have ships we can reassign in your back pocket." Denys folded his arms and stared intently at the largest cluster of ships. "Defense is getting us nowhere, our destroyers are wasted trying to screen out every ramshackle pirate that steals from us. We need to strike at where they take their product, the German vessels and pirate convoys. Attack, not defend."\n\nDenys had preached his aggressive tactics throughout their planning, but Lott was unconvinced. A more diplomatic approach, if he could make it work, might solve the problem without sending every Brazilian sailor thousands of miles from home. The remnants of Free France still held a decent amount of ships, and surely the Germans weren't completely unreasonable? One thing was certain. The Lobster War had to be solved immediately, before any more lives were lost. "Fine, let's co-"\n\nSomeone was knocking at the door, quite insistently too. Denys walked from the table and flung it open, revealing a nervous looking secretary. "What? The President asked not to be disturbed." The secretary nervously smiled at him, peeking around the bulky door to stare at the President. "Sir?""
 brazil.20.a: ""Quadros has been calling you for half an hour.""

 brazil.21.t: "A Victory for Diplomacy"
 brazil.21.desc: ""Control, the helicopter has touched down in Recife and the hosta-sorry, former hostages are on their way back to the Japanese Embassy. We did it gentlemen." The room burst into cheers, as Brazil's biggest diplomatic headache was solved. Months of negotiation, threats and tracking had finally paid off. Two Japanese tourists on vacation, the daughter and son-in-law of one of Japan's richest men, had been kidnapped by pirates off the Brazilian coast for ransom four months ago. The Japanese began pressuring and even threatening the Brazilian government within days, demanding the tourists be found and returned immediately. The situation, already a massive incident, was further complicated when it was revealed that the pirates were hiding out in Free French waters, sheltering behind a tiny but aggressive navy that had no interest in ousting the pirates for free.\n\nIn the end no shots were fired, but millions of dollars were spent on bribes, information, appeasement and overtime. Brazil's relationship with Japan would forever bear the black mark of this crisis, but at the moment none of the beleaguered diplomats in the crisis room could bring themselves to care. Most of them were operating on two hours of sleep, and the older members of the diplomatic corps had already begun filtering out of the room to catch a well deserved nap. The rest were celebrating a hard fought victory, a statement to the world that Brazil could solve its own problems, without and even in spite of German and Japanese interests. In a way, as the newest member of the diplomatic corps would refer to it later, it was another victory in the long struggle against fascism."
 brazil.21.a: "His coworkers made fun of him for that one."

 brazil.22.t: "New Plans, Old Tactics"
 brazil.22.desc: ""Hello my friend! This is your Governor, Adhemar de Barros. I'm calling to bring up an arrangement we had spoken about earlier, with-". The man on the other end, a prominent business owner and politician in São Paulo, hung up. Adhemar stared at the receiver for a solid five seconds, before sighing and crumpling back in his chair. "Gahh, shit." He picked up his pen, crossing out a name on one long list and adding it to another. "One more traitor."\n\nEver since his loss in the election, many of his more tenuous supporters had swapped sides. He had been calling jumped up bureaucrats for hours now, putting on his usual easy air of confidence with increasing difficulty. Adhemar wasn't made for calls. He wasn't made for fake niceties, for endless appeals to idiots with frail egos. He needed to be out there, shaking hands and kissing babies, leading a rally or inspiring a crowd to action. Action! Worthless bureaucrats weren't going to win him his rightful seat, action was.\n\nAdhemar leapt from his seat and strode quickly out of his office, beckoning for his secretary right outside to follow him. Surprised but not unused to these kinds of outbursts, she hurriedly grabbed a stack of papers and awkwardly vaulted her desk, running after him as he ducked into the hallway. "Take the rightmost sheet off my desk and print thirty, eh, fifty copies. I trust you still have the list of instigators?" "Uh, yes." "Good, good. Give them a call, tell them to ramp up recruiting and rallying. It's time to pull this back."\n\nAdhemar was already climbing into his car when he turned back around, with a slight grin. "I'm going to go stir up trouble. Collect as much scratch paper as you have for when I get back, it's time to revise old plans and draft up new ones. Adhemar is back.""
 brazil.22.a: "And with that, he sped off into the streets of São Paulo."

 brazil.23.t: "Little Acts"
 brazil.23.desc: "Goulart's day had been going well enough- he woke up with a firm understanding of what the day would bring, he spoke with friends over when he would meet them next, and he was almost at work by the time that he tripped. Why it became such a bother to Goulart was what he tripped on, just next to a dark alleyway- it was the foot of a man, laying in the mud. Before he could even stumble to the ground, Goulart's hands shot out in front of him.\n\n"Shit, sorry, that's on me." Under a small newsstand's worth of newspaper, the man seemed to be laying down as though he was hiding from bloodhounds, or a bear, as the mud beneath him squished as his hand was laid back into the watery dirt. It was insulting to even see- someone laying perfectly still in the mud. Goulart was taken aback, more than anything, before reaching out his hand. "Here. Up." With a sigh and a heave, the two men were standing next to each other, one looking considerably worse for wear than the other. The man seemed to be only partially protected from the mud, still, some swathes of it covering his back, which Goulart couldn't help but feebly trying to wipe off the mud. "You alright?"\n\nThe man stood with a look in his eyes that Goulart was pained to even see. His mind flew to the speech he was to give later today- wiping off the mud on the poor man was more than enough to let his mind fly to the Auro and those bastards on the other end of the PSD that let him lay there. Goulart could already feel some new "adjustments" being given to his speech he was already uncertain of.\n\n"Sure, just fine, thank you." The look in his eyes, that of a man betrayed a thousand times over, offered one last betrayal, and revealed how the man had been laying there. Goulart checked his watch. Five minutes. "Listen, there's a kitchen down the road and to the left, get yourself cleaned up, and I'll meet you there in an hour." The man looked at Goulart with what anyone could see as appreciation, even if he didn't say a word."
 brazil.23.a: "Goulart smiled, and walked to his speech."

 brazil.24.t: "Freedom to Distress"
 brazil.24.desc: ""Alright, you all know why you're here. Give me some dirt on this cockroach!" Carlos Lacerda clapped his hands and wrote a name atop the large blackboard at the front of the crowded meeting room. HENRIQUE LOTT. Lacerda had set thirteen of his best journalists on investigating every dirty deed, backroom deal and possible scandal Brazil's current President had even possibly been involved in. Now, they were ready to present their findings. Or rather, their lack of findings.\n\nWhen nobody spoke, Lacerda threw his hands up in the air. "What? You've been looking into this reprobate for months now, give me something!" A nervous looking woman near the back of the room cleared her throat and shakily stood up, as all eyes turned on her. "Uh, sir, we regret to inform you that we found, umm, almost nothing sir. As far as we can tell," she looked expectantly at her vaguely nodding counterparts, "Lott is clean. The only concrete accusations are all very minor, nothing worthy of even a tabloid. As far as we can tell, the man is untouchable." She sat back down, and the awkward silence resumed. Lacerda looked around the room, and sighed. "Christ, I don't have time for this. I had to put off a meeting with my poverty counsel for this, you understand? Rio has the highest rates of unemployment and homelessness in the country, and I should be dealing with it right now. Instead, I'm talking to a group of professional simpletons!" A young man in the front stood up, his face fixed with embarrassed indignation. "What the hell do you want from us? We can't just make shit up!" Lacerda laughed, and took back up his chalk. "Watch me."\n\nLOTT SEEN WITH WOMAN HALF HIS AGE! LOTT, PATRIOT OR FBI SPY? FRAUD PRESIDENT STEALS VOTES! LOTT BOUGHT? On and on Lacerda wrote, covering the board in eye-catching headlines and random accusations, until every inch was covered by a story. Lacerda turned back to the crowd, now staring at him with a mix of disgust, apprehension and a strange kind of excitement. "Get writing, I have a city to fix.""
 brazil.24.a: "Lacerda forgot to leave the chalk."

 brazil.25.t: "Quadros Visits China"
 brazil.25.desc: ""Extra Extra," read the newsboys on Brazil's city corners that day, "Vice President Quadros visits China! Brazilian-Japanese relations on the upswing!" Quadros had arranged a visit to the East, for the stated purpose of bettering relations with the Co-Prosperity Sphere.\n\nHis visit began as more of a tourist visit than a diplomatic mission, taking sight of the Forbidden City, where he visited the museum and witnessed the great many cultural artifacts of China's imperial period. There was then a fine dinner in the Brazilian embassy with the President of China, Gao Zongwu, the Brazilian Ambassador Sérgio de Queiroz Duarte, and the Sphere Representative in China, Takeo Miki. The dinner was filled with much amicable discussion among all those involved, with Brazil's intentions of a deeper relationship with the Sphere being made openly and explicitly.\n\n"We are shared in an anti-imperialist struggle," the Ambassador said, "And we look to deepen our relationship with like minded nations, those who have shared our struggle against colonialism. May we stand as brothers!" The comments made the intentions clear; too clear, as this was contrary to the interests of the United States, and contrary to the opinions of many domestic citizens; many groups, especially pro-OFN and left-wing organizations, slung around accusations towards Quadros such as "Nazi!" or "Japanese Bootlicker!", along with other words the newspapers were not allowed to publish.\n\nFollowing the dinner, in an unpublished event, Quadros, Gao and Miki met in a private office to discuss trade specifically. Upon his return, Quadros regarded the trip, talks included, as a great success."
 brazil.25.a: "Who but Quadros could do this?"

 brazil.26.t: "Splitters!"
 brazil.26.desc: ""I declare this meeting adjourned!" João Amazonas slammed his gavel again and again, desperately trying to stop the riot brewing at the Brazilian Communist Party's latest emergency meeting. He commanded a significant sect of the Party, and would be its de facto leader, if not for the sectarian bastard currently standing atop the bars central table. Luís Carlos Prestes, a naive splitter that had for a long time commanded a sect opposed to Amazonas and his coalition of realists within the Party. Tensions had simmered in the Party for a long time, but yesterday's incident had... escalated the situation.\n\n"Put that fucking gavel down João, you goddamn tyrant! This isn't over until your goon is punished for his murder!" Prestes was red in the face, out of breath but still absolutely determined. Amazonas moved to slamming the gavel on the wall, and waved for his men to settle down. The Party was seconds from an outright brawl between the two factions, and he had only seconds to bring everyone back together. This would take tact.\n\n"Shut your mouth Prestes, your mad dog attacked Miguel! It was self defense, and that's the end of it!" The room turned quiet immediately, as everyone of Prestes' men grouped up around their leader, as though acting on a well rehearsed script. Prestes cleared his throat, and Amazonas saw tears in his eyes. "We knew this day was coming, João. What the hell happened to you? Every day you get more violent, more authoritarian. What happened to our plans, now all you talk about is your bloody agrarian revolution! This is the last straw. When would you have had one of your goons kill me, in 'self defense'? This Party is no longer about the Communist Brazil we are trying to build, it's about you."\n\nWith that, Prestes' men filed out the door. The remaining members stood confused, deprived of both a fight and half the party's strength. Amazonas collapsed against the back wall, and held his head in his hands. How could he lead the Revolution if his own party was splitting around him?"
 brazil.26.a: "The gavel was a pile of splinters."

 brazil.27.t: "A Forced, Premature Retirement"
 brazil.27.desc: "Plínio Salgado stared blankly at the city of Lisbon through the window of his office. Before his eyes lay what his ancestors had built, a magnificent testament to what his relatives could do. A large organized Christian city, with its Catholic and North African heritage visible in every corner, from the town squares to the humble bakery.\n\nHow he wished the Brazilian capital was like that, and not the disgusting communist-influenced Brasília. Since someone, perhaps an American agent or a Brazilian liberal manipulator, had linked him to Lacerda's little plot in 1955, he had been exiled. He remembered every single note he wrote to every single officer asking them not to cooperate with this American plot, and this was what he got.\n\nAs he sat down to prepare a speech for a cultural association of Brazilian immigrants, he thought about his homeland, a place contaminated by the same influences that were now trying to confront Portugal. Leftist feminists, sodomites, teenage bands, and worst of all, pornographic magazines that corrupted the youth.\n\nHe almost frowned at the thought of all the evil being mass-produced and flooded into Brazil while his party remained under the uncertain command of Reale.\n\nSalgado finished his speech, and as he walked through a park on the way, he saw an Afro-Iberian couple, what a stunning magnitude of Lusotropical glory, the clear proof of moral superiority over the barbaric Yankees with their segregation. As he gave bread to the fish in the lake, he could only think of..."
 brazil.27.a: "...how he would fix the problems back home."

 brazil.28.t: "The Ship Is Leaking"
 brazil.28.desc: ""Here are the facts, Henrique. The armed forces are... annoyed, with recent decisions that have been made. Your administration has repeatedly fumbled and mismanaged issues of national security. Congress has also failed and the politicians in Brasília bicker as the country is left defenseless. Some more radical officials have even advocated for, well, your resignation. By force, if necessary."\n\nLott was fuming. Under any other circumstances, he would have had the smirking officer Sílvio Frota sitting across from him expelled from service, arrested and tried. Unfortunately, he no longer had that luxury of the upper hand, this was an informal meeting between the ex President and an influential officer. The impertinent bastard leaned in closer. "Unless things change, immediately, we will be forced to take action."\n\nLott, through gritted teeth, replied. "I can promise that conditions for the military will improve, and the government will not take any actions that may compromise your opinions of us. In return, your blatant power grabs will cease."\n\n"Ah, Mr. President, that sounds like a wonderful arrangement. Let's hope it goes as smoothly as both of us hope. Though as we both know your presence in Brasília is not as... influential as it once was. Talk to you later, Lott." Sílvio Frota smugly said\n\nThe moment the bastard was out the door, Lott collapsed into his chair. It was moments like these where he really felt his age, really felt the press of steering the ragged ship that was Brazil. Things had been simpler in the Army. Well, he chuckled, maybe not that much simpler. He cracked open the bottom drawer of his desk and pulled out a fine bottle of whiskey, a single bottle of which cost into the thousands. He had been saving it for a special occasion, but special occasions were in short supply nowadays."
 brazil.28.a: "He took a sip, but didn't taste it."

 brazil.29.t: "The Death of Democracy"
 brazil.29.desc: "The Senado chamber was the perfect reflection of Brazil's political chaos; Men and women from every corner of the political spectrum were engaged in intense but worthless arguments, screaming insults at those they would have considered friends mere weeks ago. Even the parties were irrevocably split into dozens of tiny factions, throwing out all notions of unity over the slightest political or even personal disagreement. From the highest offices to the smallest town assemblies, Brazil was in complete and utter disarray.\n\nThe Senado chamber was a perfect mirror of the failures of Brazilian democracy, so it was only fitting that it be host to its death as well. Auro de Mora Andrade, lounging casually in a peaceful corner away from the room's anarchy, smashed a gavel against the wall. The sudden bang was followed by three more, as a team of soldiers burst through the doors and fired twice into the ceiling. The chaos ceased in a heartbeat, as Sílvio Frota strode inside. He relished in the sudden silence. This was order, enforced by the only thing that mattered.\n\n"Gentlemen and women alike! The hellish anarchy consuming Brazil has weighed heavy on the armed forces minds these past days, as I am certain it has weighed on yours. We have decided on a new course of action, one that will repair and restore the beauty of this fine nation to its former glory! The civilian government of Brazil will be dissolved, and replaced with a military-led provisional authority that will guide all Brazilians back to stability. Worry not, the fine patriots behind me will ensure you are escorted safely back to your homes. Enjoy your vacation, my friends! It may be a while."\n\nIt was a scene mirrored thousands of times over across the country. Military forces swept government buildings, expelling or arresting public, democratically elected officials. In some cases, policemen rallied around defiant civil servants and barricaded themselves in government buildings, demanding explanations for the disgusting mutinies. These vestiges were put down, with prejudice. Gunshots and screams echoed across Brazil as yet another young democracy was bathed in blood."
 brazil.29.a: "All ships are sunk by their sailors."
 BRA_military_coup_tt: "Brazil can only watch in horror as her §Rmilitary takes the reins.§!\n\n"

 brazil.30.t: "Brazil to the Rescue"
 brazil.30.desc: "Lott coughed twice before speaking, "Let's get this out of the way immediately. I intend to join the OFN defense of South Africa against the Schild. To do any less is to allow fascists to continue their campaign of murder unchecked." Lott sat down at the head of the long meeting table, looking at the assembly of generals before him. At the other end sat Odílio Denys, War Minister. To his right, sat... Quadros. This meeting would decide, once and for all, the Brazilian response to the South African War.\n\nDenys piped up first. "I think I speak for the entire military high command when I say that we agree, Mr. President. We are already preparing an offensive against the Schild, so I recommend we get right into the planning. If there's no objections?" Everyone around the table gave varying grunts of affirmation, nods and even the odd 'yep'. All except one.\n\n"Do you want the Germans to shoot our heads off our necks!? There's already a goddamned continent full of Nazis, why antagonize them!? Whenever Barry or whatever whoreson wins their civil war, they're going to nuke us into paste! I object!" Quadros had fully stood up now, and banged his fist on the table at the end for good effect. He slammed his hands down again, and sat back in his seat, red-faced and puffing.\n\nAn awkward silence filled the room, until Lott tentatively broke it. "Uh, well. Thank you, Jânio. If there's nothing else... Let's get into the planning.""
 brazil.30.a: "Quadros stormed out of the meeting, and wasn't seen for the rest of the day."

 brazil.31.t: "Send a Letter to Your Representative!"
 brazil.31.desc: "Annoyed officials filtered out of the National Congress building, still bickering amongst themselves over the recent debate on intervening in the SAW. Most PSD and USD members were dead-set on intervention, but almost all of the PTB were fiercely opposed to war of any kind, sticking steadfast to their isolationist policies. At the moment, the independents and smaller parties were mostly neutral. President Lott aimed to change that. Party whips were running themselves ragged, dashing to and fro between the offices of every official who so much as looked at the fence. Nothing besides out-and-out blackmail was off limits, so assurances, amendments and quite a few bribes were being lavished on the typically ignored minor parties, who were relishing the sudden attention\n\nPro-war politicians already had the majority, but the more officials Lott brought onto his side the better. He had no intention of dealing with squabbling bureaucrats while he ran a campaign. Luckily, most had been receptive to the idea. Brazil's armed forces hadn't properly stretched their legs since the embarrassment of WWII. It was time to demonstrate why they were still the masters of South America."
 brazil.31.a: "As the people called for war, their representatives began to answer."

 brazil.32.t: "A Modern Parable"
 brazil.32.desc: ""Thank you for tuning in to Rádio MEC, but before we get back into the music I've been asked to share a little story with our listeners. Not too long ago, a coalition of fascists attacked the Union of South Africa, the last beacon of democracy in the continent. Now our boys are getting ready to ship out and help the war effort, fighting alongside the Union to protect democracy. Problem is, an awful lot of you think this is a bad idea. An awful lot of you would rather let the fascists win, let them keep up their mass murder and oppression of our brothers and sisters across the sea. So, I've got a little story to share with you."\n\n"A fair while ago now, a cruel monster took control of one of the world's oldest countries. This country had been chipped away at for a long time, turned small and helpless by the passing of time and foreign wars. When this monster took control, the people loved him. He was vicious, a murderous drug addict that lived off of cruelty and hatred, but he promised a return to better times. This monster slowly grew its power, grew its armies, but the nations around him did nothing. Were they afraid? No. The monster could have been stopped at any time, but no-one would take the time to put an end to him. They were too apathetic, too sure of their own victories and glory."\n\n"Finally, the monster and his armies attacked one of the nations surrounding them. The nation cried out for help, help against the cruel hordes that ransacked its natural beauty and free society, but they were ignored. The monster destroyed this country, and brought its ruined lands into his own hateful society. With these new lands and industry, the monster turned its attention to gathering an even larger army, until eventually it eclipsed even its old, powerful neighbors. From there, it took hardly any effort at all to destroy everything in sight. It turned on its old allies, and the monster lived off of death and cruelty for a long, long time.""
 brazil.32.a: ""Let's kill this monster in its crib.""

 brazil.33.t: "An Unexpected Invitation"
 brazil.33.desc: "It was a fine day in Brasília, and Jânio Quadros had a letter on his desk. This, however, was no ordinary letter from a petitioner, a curious high school student, or, for that matter, a sycophantic good-for-nothing of a minor politician. He tended to take such letters, give a form-letter reply, sign them, and throw them into the nearest wastebasket.\n\nWhat was so different about this letter? It was a letter from Carlos Lacerda, a fanatical opponent of the current government and a fellow grandee of Lacerda's UDN.\n\n"My dear Jânio,\n\nI have heard of some important information that is of great urgency and potential benefit the Republic of Brazil. Accordingly, I'd be deeply grateful if you could pay me a visit at my office in the next few weeks..."\n\nJânio had no difficulty guessing at what the Crow wanted to talk about. After taking a long look at the letter and contemplating its contents, he sighed, swigged from his hip-flask, and folded the letter back up into its envelope."
 brazil.33.a: "His decision was made."

 brazil.34.t: "A Strongly Worded Reply"
 brazil.34.desc: ""TELEGRAM\nVICE-PRESIDENT JÂNIO QUADROS BRAZILIAN REPUBLIC BRASÍLIA\nTO CARLOS LACERDA GOVERNOR OF GUANABARA RIO DE JANEIRO\nTHANK YOU FOR YOUR RECENT LETTER STOP THOUGH NOT EXPLICITLY STATED YOUR MEANING WAS QUITE CLEARLY UNDERSTOOD STOP LET ME BE VERY CLEAR I WANT ABSOLUTELY NO PART OF IT STOP\nFOR ALL HIS FLAWS PRESIDENT HENRIQUE LOTT IS THE HEAD OF STATE AND LEADER OF THE BRAZILIAN PEOPLE STOP HE IS MOREOVER MY PARTNER IN GOVERNANCE AND POSSIBLY EVEN A FRIEND OF MINE STOP THAT IS CERTAINLY FAR MORE THAN I OR MOST PEOPLE FOR THAT MATTER CAN SAY ABOUT YOU STOP YOU WOULD DO VERY WELL TO REMEMBER THAT STOP\nON MY AUTHORITY AS VICE-PRESIDENT AND AS A LEADER OF THE UDN COALITION I VERY STRONGLY ADVISE YOU TO CEASE AND DESIST ANY FURTHER ATTEMPTS TO DRIVE A WEDGE BETWEEN MYSELF AND THE PRESIDENT STOP FAILURE TO COMPLY MAY RESULT IN A SURPRISE MEETING BETWEEN YOUR LOWER DIGESTIVE TRACT AND A BROOM\nYOURS ONLY SOMEWHAT RESPECTFULLY\nQUADROS"\n\n"Yes, that is all for the telegram. Yes, bring it in for my signature later today."\n\nQuadros dismissed the secretary and leaned back in his seat. That would teach the Crow to try and use him as a piece in one of his power plays."
 brazil.34.a: "I wonder what Henrique is up to today."

 brazil.35.t: "Drawing Battle Plans"
 brazil.35.desc: "When Jânio Quadros - neither drunk nor especially angry for once - entered the office of Carlos Lacerda, he found another person there that he hadn't expected or, for that matter, wanted to see.\n\n"Adhemar! What the hell are you doing here?"\n\nAdhemar de Barros smiled slightly. "Carlos here thought I'd be of use in this little discussion of ours."\n\nQuadros concluded that that made sense, though he was still displeased. "Speaking of, where is the Crow this fine day?" At that moment Lacerda came in from behind, surprising Quadros. "The Crow's here. Good to see you, Jânio."\n\nQuadros, shaking off his initial shock, nodded. "Yes, the same for both of you. As you can probably guess, I'm in. So what's the plan?"\n\nLacerda and Adhemar smirked and leaned forward. Lacerda began to speak. "You know that weird project of Lott's? That highway? Let's take all the dirt we have about the embezzlement and fraud that's happening on the Highway and the fact that Lott hasn't done a single thing about it. We can set off a few hundred protests and riots, watch Lott's government collapse under the chaos, and put someone distinctly better than him up in his place."\n\nQuadros nodded approvingly. If things went well, he'd be able to hold Lacerda and Adhemar back, force Lott out, and take the presidency for himself."
 brazil.35.a: "That's a great plan, Carlos."

 brazil.36.t: "A Shocking Revelation"
 brazil.36.desc: "Valdomiro Conceição Belchior, a well-to-do denizen of São Paulo, called Valdo by his friends, sat down and read the day's paper. To his disappointment, there was even more news about corruption on the front page.\n\n"Instances of bribery on the Trans-Amazonian Highway project have come to our attention due to leaks from within the Lott administration and the leadership of the highway project. Various cases of embezzlement... rerouting through bribery... extortion... protection racketeering..." More of this rubbish, Valdo thought. He wondered what Lott thought about this.\n\n"We have reached out to the President for comment. However, no response was forthcoming at press time."\n\nAs you might expect, Valdo was fairly disappointed. More corruption was not what Brazil needed."
 brazil.36.a: ""I was a damn fool to think anything would change, wasn't I?""

 brazil.37.t: "Quadros Threatens Resignation"
 brazil.37.desc: "Jânio Quadros looked at his secretary. "Are you ready, then?" The secretary nodded.\n\n"Very well then. Let's begin." Quadros began his dictation.\n\n"People of Brazil!\n\nI have received grave information regarding the running of the Trans-Amazonian Highway project. As this project has proceeded, officials and workers have been ridden down by bribery, extortion, and corruption at every turn. Worse yet, our President, Henrique Lott, far from addressing these as his station demands, seems to have decided that fighting corruption is not a priority for him. You all know that I cannot agree with that kind of mindset under any circumstances.\n\nAs I believe that our government must focus on the total elimination of corruption in its functioning, I have made the following two demands to the President.\n1) A full investigation into the corruption that has taken place.\n2) The total and immediate rectification of any abnormalities in the Project.\n\nIf the President fails to comply with these demands, which are reasonable by any standards, I will have no choice but to resign in order to serve the country through other means than as Vice-President to a man who will neither fight corruption nor allow others any input in governance."\n\nQuadros, looking at the final document, nodded approvingly, and grabbed a copy of a resignation letter he had drafted. Sealing them each in an envelope, he called his secretary. "Send this one to the press, and the other one to Carlos Lacerda in Guanabara.""
 brazil.37.a: "Hopefully that cooks his goose."

 brazil.38.t: "Lott Stands Strong"
 brazil.38.desc: "Henrique Teixeira Lott, President of the Brazilian Republic, was addressing the matter of corruption in the Trans-Amazonian Highway project.\n\n"Senhor Quadros has raised valid concerns about the matter of corruption on the Trans-Amazonian Highway. I will take decisive action in order to resolve those concerns. I promise a full, independent inquiry into the execution of the highway project, the rectification of any and all abnormalities, and the punishment of all those who were found attempting to corrupt this project.\n\nIn the press gallery, a reporter looked at his friend. "Doesn't this fulfil Quadros' demands to the letter? Then why's he resigning?\n\nThe other reporter shrugged. "He's planning to move forward with his resignation because the working relationship between him and Lott has deteriorated beyond recovery.\n\nThe first reporter laughed. "No thanks to Quadros, of course. So in essence, Quadros threw a snit, and since Lott didn't lose power, he has to leave with his tail between his legs.\n\nHis friend nodded. "Yes, that's just it.""
 brazil.38.a: "The best laid schemes..."

 brazil.39.t: "Lott Resigns"
 brazil.39.desc: "He had no choice, didn't he? It was all crashing down, and if he didn't do something quickly, it would spell doom not just for him, but possibly also for the PSD and Brazil itself. He had already had a meeting with many of the major members of the PSD, who in polite terms had refused to back him in case an impeachment attempt was launched. For the first time in Lott's life he felt he had been outplayed, and to him there was only one thing he could do that would keep his honour intact.\n\n"People of Brazil!\n\nDue to the recent crisis about corruption in the Trans-Amazonian Highway project caused by corrupt bureaucrats and oligarchs, and in order to protect the integrity of the democratic process, I am tendering my immediate resignation as President of the Brazilian Republic. It is my earnest hope that the Brazilian people will be able to find a new leader able to succeed where I failed and bring Brazil to a new era of prosperity."\n\nOf course Lott knew this was a plot by that crazed drunkard Quadros. If he had tried harder to reach a permanent modus vivendi with his former Vice-President, this might not have happened. But it was too late now. Public opinion had turned against him, and it was time for him to bow out. He could only hope that democracy would continue to survive."
 brazil.39.a: "It is finished."

 brazil.40.t: "The Army's Ultimatum"
 brazil.40.desc: "'Out, out!' Came the cries incessantly. One of the grunts quizzed his commander silently. General Sílvio Frota shook his head imperceptibly. There would be time enough to silence the traitors.\n\n"Honorable members of the legislature." More shouting. A few grunts added their barks of 'Silence, Silence!' to the chorus. Frota wiped the sweat away. The room was stuffy.\n\nEventually the tide of anger receded, leaving the general alone in a sea of contempt. "Members of the legislature. The republic has stood without leadership for weeks, now. The nation is adrift, rudderless. Those who should have captained it squabble like children." A tide of jeers. Former President Kubitschek stood up, asked by what rights the soldiers had come. The general turned aside his gaze from the socialist snake, back to the rest of the assembly. "The men of the national army have always stood as guardians, as defenders of the Brazilian nation. We cherish its democracy. Yet we will not let it be used by greedy and ambitious men while the republic crumbles. The legislature failed to confirm Mr. Goulart as the next President in the order of succession. It is its prerogative. However, no progress has been made on nominating a new leader for the country. The brave soldiers of the national army implore the assembly to solve this current crisis within three months."\n\nMore shouting. Sweat threatening to run into his eyes. The general blinked away the irritant. "Were the honorable members of the legislature to fail in finding a President within those hundred days, the consequences would be most unfortunate for our nation. The people's mandate will be respected. Yet the people have not elected for their representatives to make a mockery of the nation on the world's stage. Gentlemen, we expect a solution within a hundred days. Brazil must be shepherded through these dangerous times."\n\nA final rain of jeers. The general walked away, unconcerned. These clowns would do as instructed, or there would be hell to pay."
 brazil.40.a: "The gauntlet is thrown."

 brazil.41.t: "Coffee with Neves"
 brazil.41.desc: ""So summed up, we have avoided the worst of the crisis with our decisive actions taken earlier, but inflation and debt still pose a problem." Lott says looking at the report that his minister of the economy Tancredo Neves and Celso Furtado his minister of planning had brought to him. It was early in the morning with the sun only having risen and outside the sky was covered with clouds. Lott took a sip of the coffee he had been given by his secretary as he waited for the two to reply.\n\nEffectively, that is the case Tancredo Neves stated before speaking again. "I have gathered a few economic proposals that will help us deal with this problem. Raise some taxes here and there, change the interest rates, make it harder for companies to dodge their taxes. That should settle the crisis." Celso Furtado nodded and replied, "And with these proposals, we can ensure economic growth continues to soar and our industrialization program is not hampered."\n\nLott nodded before smiling, "Well I am glad that this crisis looks like it will be easily dealt with, finally some good ne-"\n\n"Lott, they bloody shot him." Quadros shouted as he barged into the meeting room. "Shot who, Jânio." Lott quickly replied, he was used to Quadros' outbursts by now, but someone had been shot and he could not easily dismiss this comment.\n\n"João Pedro Teixeira, leader of the Peasant Leagues in Paraíba. He was walking home with his children. Then someone pulled out a gun and bloody shot him three times in the back. He was dead within the hour. The Peasant Leagues are furious, talks about strikes are flying about."\n\nLott, Tancredo, and Celso who were all looking at Quadros when he barged in were all quiet for a few moments. It would be Celso who broke the silence."
 brazil.41.a: ""This complicates things.""

 brazil.42.t: "The Bull Bellows"
 brazil.42.desc: "Today was Adhemar de Barros' hour. The Hundred Days had come to an end. His gambit had succeeded, the Crow had been outmaneuvered, and the Getulists had been outflanked. Now at last, thanks be to God and His Mother, Adhemar was free to practice his unique and effective system of governance, for his betterment and that of those who supported him, not to mention that of the Republic and its people.\n\nAs Adhemar arrived at the Congresso Nacional, he looked around. Hundreds of supporters - many of them treated with a dose of the hyper-effective drug Payola HCl administered through various types of envelope - applauded wildly for him. Adhemar marched past them as the crowd applauded and the cameras rolled - it was his moment, and by God and the Saints he would savour it.\n\nAdhemar de Barros, by the grace of God and the favor of Nossa Senhora da Conceição Aparecida, President of Brazil, entered the Senado chamber. The PSP politicians applauded wildly. Some were even sincere in their applause. The other politicians - from a range of parties - applauded too out of respect for their new President, but many had trouble hiding their bemusement."
 brazil.42.a: "How the hell had he pulled it off?"

 brazil.43.t: "Jango Reaches His Destiny"
 brazil.43.desc: "Today was João Goulart's hour, thank the Lord. The Hundred Days had come to an end. The Crow and Bull had been driven back, Quadros had joined them in ignominy, and Kubitschek had chosen to put his faith in his former Vice-President. Now Goulart was finally free to take possession of that which was rightfully his - and he did so, taking a helicopter from Porto Alegre to Brasília, his beloved wife and children in tow.\n\nAs João Goulart entered the Congresso Nacional, he looked around. Cameras flashed while PTB and PSD politicians and cadres of all ranks applauded wildly. Leonel Brizola and Edna Lott made their approval known by clapping even more loudly than the others; Tancredo Neves nodded approvingly off to the side. Goulart ran up to Juscelino Kubitschek, who graciously shook hands with him though still visibly disappointed.\n\nJoão Goulart, by the mercy of Nossa Senhora Aparecida, was now President of Brazil despite all the obstacles that had been thrown in his direction by Lacerda and his lackeys. As the swearing-in proceeded, Goulart successfully resisted the urge to smirk as a distinctly displeased Auro de Moura Andrade, his scheme defeated, was forced to hand over the presidential sash.\n\nMeanwhile, in a well-furnished house someplace in Rio Grande do Sul, an old man chewed away at his second lunch while watching the inauguration and felt reassurance that his student was free to continue serving Brazil in the way he once had."
 brazil.43.a: "With joy in his heart, Getúlio Vargas smiled."

 brazil.44.t: "The Crow Takes Flight"
 brazil.44.desc: "Today was Carlos Lacerda's hour. The Hundred Days had come to an end. His gambit had succeeded, Quadros had followed Lott into ignominy, Adhemar had been outmaneuvered, and the Getulist scum had been put in their place. Now, thank God, Lacerda had found safety for himself from everything that would threaten him; for who was left in Brazil that would presume to attack their President?\n\nAs Lacerda entered the Congresso Nacional as President, he looked around. UDN politicians were, as would be expected from good, loyal Brazilians, applauding wildly for their leader. A few PSP and PSD people - the more tolerable ones from among them - were also there to salute their new President. But the Getulist good-for-nothings - the Goulart-and-Neves gang of the PSD and PTB - were as expected not there, nor indeed was Juscelino Kubitschek.\n\nCarlos Lacerda, President of Brazil by the grace of his God and the will of the Senado Federal, went up to the front of the Senado chamber. He looked at the Speaker of the Senado, Auro de Moura Andrade and nodded.\n\nSpeaker Andrade nodded back."
 brazil.44.a: "Just as planned."

 brazil.45.t: "The Architect Builds Once More"
 brazil.45.desc: "Today was Juscelino Kubitschek's hour. The Hundred Days had come to an end. The Crow and Bull - damn them both - had been driven back, Quadros had stumbled his way out of the presidency, Andrade had been put in his place, and Goulart had chosen to put his faith in him. Now at last, Heaven be praised, the Architect was free to return to Brazil - his greatest work - and see it flourish as he had for five years before the fall of poor Henrique Lott.\n\nAs Juscelino Kubitschek walked into the Congresso Nacional - whose construction he had overseen - surrounded by his supporters, he ran to Edna Lott and Leonel Brizola to shake their hands. Though they appeared disappointed, he knew they were just happy that it was at least somebody they could trust. He made a note of calling Goulart to ask after him, and to make sure that he was protected.\n\nJuscelino Kubitschek, by the grace of Heaven and the will of the Senado and the Brazilian people, President of Brazil, entered the Senado chamber. The PSD and PTB politicians applauded wildly, while Tancredo Neves looked on with approval from the sidelines. Sure, the UDN and Lacerda's lot were not present, having joined Carlos Lacerda in throwing a snit and not showing up, but it mattered nothing. This was Kubitschek's moment."
 brazil.45.a: "The Architect picks up his tools once more."

 brazil.46.t: "Vulnerant Omnia"
 brazil.46.desc: "The final hours of the final days. Infantrymen had been brought over by truck, and marched in the suburbs of Brasília already. One by one, the country's barracks were emptying out, letting out poison into the heart of the republic's bloodstream. In darkened halls officers raged at the incompetence of scheming politicians. The hundred days had come and gone, and nothing had been done. The time had come for men of actions.\n\nKubitschek oversaw his guards gather a few odds and ends to a car. Already a few days' clothes had been stored on the backseat. It was time to escape the capital, as long as the airport was still open to civilian flights. His traits long with fatigue, the former President helped his men with the process as best he could. Someone pressed him another cup of coffee. How long had it been since sleep? Hours slipped by him, the high tide drowning out his footsteps on the beach behind him. No way but forward.\n\nHow had they all failed? Him and Brizola had both dragged down the coalition into the abyss. In their hubris they were all matched by Adhemar and Lacerda's inept attempt to pilot the UDN into victory. Lacerda no doubt cowered into some army mess hall, tail between his legs. No news on Adhemar. As for Brizola, the PTB politician had long vacated the capital. Already the noose was tightening. Soldiers were drawing up a ring of steel around the capital. The airport was still open for a few more hours.\n\nHow had this all happened? Juscelino Kubitschek's long run had not been along a rough sea. Rather the former President had run round and round at the bottom of a great hourglass. The rising tide had been a mirage all along. He was drowning in quicksand, and no help would come."
 brazil.46.a: "In its ultimate test, did democracy fail itself."

 brazil.47.t: "The Amazon Kills"
 brazil.47.desc: "The four man team of choppers gave a choked and weary cheer as the last tree of the month went down, sending up a massive cloud of dust and startled insects. Miguel tried to cover his mouth, as did the other cutters, but it was as always useless. They would be hacking up dirt for the rest of the night, disturbing what little sleep they got already. Of everyone involved in the giant machine of industry constructing the Highway, the choppers had it the hardest. Daniel was the de facto leader of one of these teams, tasked with venturing dozens of miles into the Amazon with nothing but the most basic of supplies and cutting hundreds of inconveniently placed trees, clearing the way for the bulldozers to clean house. Finally, their month's quota was complete, and they could head back to the main work camp. At least, for a little while.\n\nIt took a few days to make their way to camp, but getting back was always easier than cutting a way in. The men were finally back in good spirits, as they moved off their trail of clearcut stumps towards the camp's unmistakable plume of thick smoke. Right as they began to hear the distinctive hustle and bustle of camp, another sound echoed clearly through the growth. A gunshot.\n\nThe choppers crashed into camp to find the source of the sound, seemingly the centre of a growing mob clustered around a lone lean-to. Daniel couldn't tell what they were ogling at, and as he pushed through the crowd he noticed some men were quickly running back through the crowd. One forcefully grabbed Daniel as he passed by and practically dragged him back outside of it before he could catch a glimpse.\n\nDaniel slapped the man's hands away. "What the hell are you doing!?" It was only then that he noticed tears streaming down the man's face, a strange incongruity to his massive figure and thick beard. "He, he... Fuck. I didn't think he'd go through with it, FUCK! My friend, he shot, he shot himself. Guy got a letter last night, told me his girl had left him for some big money motherfucker, goddamnit! I should've, I..." The man trailed off, and slowly collapsed against a nearby tree. "Believe me. You... You don't want to see it.""
 brazil.47.a: "The man quit the next day, and Daniel almost followed him. Almost."


 brazil.48.t: "Kubitschek's Return"
 brazil.48.desc: "Juscelino Kubitschek threw open the doors to the Presidential Office around noon. Without a second thought or moment to stand in amazement, he walked straight to the desk of the President, sat down in the shair, took off his coat, leaned back and relaxed.\n\nEverything was as he remembered it. Sure, the skyline may have changed in the windows a bit, but that was to be expected. The staff had been here during his first term, and they knew how he liked things arranged. So it wasn't that hard to get everything set up just like it was in January 1961. Not that Lott had changed much.\n\nLott...was he already forgetting him? Sure, the plan had taken less time than expected, but it had worked. He was in office again, and Lott was not. That was the goal, after all, and who cares how things went if things work?\n\nThough the recent past seemed to be fading, the further past came to the forefront of JK's mind. The presidency wasn't a goal of itself, he knew. There was much to be done, and a lot of hard work that needed to be carried out. More and more it felt like he had taken a temporary rest and the tasks of the Presidency were laid out again before him.\n\nKubitschek took one more breath and got up, putting his coat back on. A moment of relaxation and getting back in the mood was all well and good. Because now he would have to become President of the United States of Brazil, and accept all the responsibilities of the position."
 brazil.48.a: "It's good to be back!"

 brazil.49.t: "The Legacy of Vargas"
 brazil.49.desc: "Smoke filled the President's office. Goulart and Brizola had been making plans (and heated arguments, sometimes) for hours now.\n\n"Well, brother, Vargas created the National Siderurgy Company AND the Petrobras. We need something bold at first, a project to establish our government as a proponent of national development, and also build public trust." Brizola spoke, hammering his fist on the table. "Expanding Eletrobras and its services throughout the country should be our first major step."\n\n"I understand this, brother, but I still have some reservations over it," Goulart responded, shrouded by doubt. "The Eletrobras project was one of our achievements during Kubitschek's term, and I'm not opposed to expanding it, eventually. I see how electrical infrastructure ties in with our planned reforms, but still, the costs, brother. Our economy is practically in the gutter!"\n\n"Jango, we need radical action. We need to seize this chance, and this is how we save this country's future." Brizola threw the cigarette butt into the ashtray and lit another. "This expansion would benefit the lives of so many..."\n\nGoulart interrupted with a heavy sigh. "I know you are right, brother, but we should proceed with caution. Lacerda and his dogs will claim the communists are taking over at any sight of governmental action. We need a concrete plan. We should consult with the minister of Mines and Energy and other engineers.""
 brazil.49.a: "We should get the specialists on this."

 brazil.50.t: "Deal With the Smear Campaign"
 brazil.50.desc: ""What are they saying this time?" Goulart asked, his face buried in his hands.\n\n"Not much new," Brizola answered as he read through a stack of anti-government propaganda that littered Brasília's streets. "This one calls you a communist devil, like most of them. Oh, this one is creative, it says 'fascist in red clothing'. That's a new one." He chuckled.\n\n"I don't see the joke," Goulart exclaimed, exasperated. "Anything else about Maria Thereza? Those last ones were disgusting."\n\n"Not so much, this time. Some tabloids praised the first lady's fashion style, but that's all." Brizola put down the posters and lit another cigarette. "Anyway, we must deal with this soon, brother. If so many pamphlets and brochures are being distributed here in Brasília, São Paulo and Rio must be covered with them."\n\n"This stinks of Lacerda's hand. As much as I'd like, we can't act against him, at least not directly. We beat him in the election, but many support him still, even among the top brasses of the military. We'll have to endure these attacks for a while.""
 brazil.50.a: "Fascist in red clothing was too much, though."

 brazil.51.t: "In the Den of Lions"
 brazil.51.desc: "There was tension in the air, so much that everyone present could feel it. João Goulart noticed even while delivering his speech. The top brass of the Brazilian Armed Forces listened to his address and conciliatory words, but most of them seemed to be either hostile or uninterested in what the President had to say. After all, they would have preferred that any other candidate had won the elections. One of the generals sitting next to Marshal Castelo Branco apparently scoffed at the President's words, but the Marshal's quiet stare reprimanded him.\n\nThe President called for unity between the government and the Armed Forces, his words chosen with the utmost care so as not to upset the audience. Jango's sole purpose here was neutralizing the threat of the military as diplomatically as possible. He profusely declared his respect for the military and hoped for their cooperation with the government. Jango finished his speech, and eyed Castelo Branco, hoping for a positive, if non-commital, answer.\n\nThe Marshal stood quiet, staring at Jango with cold eyes, and for a full minute, no one spoke.\n\n"Thank you for your words, your Excellency." Marshal Humberto Castelo Branco broke the awkward silence. "We from the Armed Forces have sworn to defend our country from whatever threat emerges. And this duty we shall fulfill.""
 brazil.51.a: "The Armed Forces stand vigilant."

 brazil.52.t: "Return of the Golden Years"
 brazil.52.desc: ""...and so, what this Presidency will promise is a return to the policies and the time of the past. A period of economic growth, and renewed optimism and pride within our nation. We will build on the successes of my previous term and the intermediate one to replicate what we have done before. And that is an economic boom like we have previously experienced."\n\nThe São Paulo crowd burst into cheers with this vow. Kubitschek had missed this, with hundreds of signs with his name and Brazilian flags being waved by the listeners. And he could only imagine how the rest of his country would receive such words of optimism.\n\n"I promised you one before fifty years of progress in five, and my administration delivered. Now, I promise you another period of rapid progress and opportunity that each Brazilian shall feel. And I am still steadfast in my belief that Brazil is, and shall remain, the country of the future. We are unique amongst South American countries, and we will continue to keep our modernity."\n\nThe crowd loved it. Nationalism, optimism, a promise of better times, all of that was going to impress any group of people. And the best part was he didn't need to lie about it as politicians often did. They knew what his first term had done, and they knew they wanted more. And when JK said he would do it again, who would doubt or disbelieve him?\n\nNot in the São Paulo square. But in the room in Rio where the editorial board of Tribuna da Imprensa met, the speech was much less warmly received. They listened in silence to the radio as Kubitschek made his grand promises and glossed over the less warm parts of his presidency. Finally, Carlos Lacerda said what everyone else was thinking."
 brazil.52.a: ""Who does he think he's fooling?""

 brazil.53.t: "Meeting With Argemiro"
 brazil.53.desc: ""Your Excellency, you know what I think of Brizola," Minister of Defense Argemiro said, facing President Goulart in his office. "Generally, I do not agree with his foolish ideals and his radicalism, and I voiced my complaints to yourself more than once already. And, more than once, you chose to listen to him. No government should ever ignore and antagonize the Armed Forces, and now I hear Brizola has plans to move directly against them?"\n\nJango put out his cigarette, pondering on every word coming out of Argemiro's mouth. The minister's reasoning was sound. Brizola had drawn his plans for weakening the military's political strength and their grasp over the country. Of course, this would be presented as "enforcing the civilian government's supremacy over the army" or some other white lie. Jango was weary though. If even supporters like Argemiro saw Brizola's approach as too radical, how would Castelo Branco and hardliners like Costa e Silva react?\n\n"Minister, what do you recommend?" Jango asked, in a tired voice.\n\n"Now I will state this first, when those coupers stick there head out I will cut it off. I and the Constitutionalists are fully behind you. But attacking the military is a way to unite them against you, we must be careful and get some onside. We go to Castelo Branco and offer an olive branch. Maybe offer a cabinet position to one of his allies." Argemiro answered at once. "The government must win back their support.""
 brazil.53.a: ""I am sorry, Argemiro. Brizola knows what he is doing.""
 brazil.53.b: ""You are right, Argemiro. We cannot attack the Army.""

 brazil.54.t: "An Uncomfortable Visit"
 brazil.54.desc: ""Mr. President, what can you say about you and your party's ties to brutal former dictator Getúlio Vargas?"\n\n"Mr. President, many have claimed that your government is opposed to American interests. In that light, what does this visit to Washington mean?"\n\n"Mr. President, what about the allegations that your cabinet has ties with illegal communist groups?"\n\nJoão Goulart was used to dealing with hostile press back home, but this barrage of inconvenient questions from the American reporters was a surprise to his entourage. The visit to Washington was supposed to improve the President's image abroad and, if possible, gather international support and beneficial trade deals for the country. No amount of preparation could have helped Jango for this reception. One of the reporters even dared to ask about the President's mistresses, though all present agreed that the question did not warrant an answer, disrespectful as it was.\n\nAfter shaking off the seemingly unending questions and the incessant flashes of the cameras, a single thought troubled Jango. Some leftists insisted this was a kowtow to Washington, and Goulart was starting to understand their point. If the media was so bold and so antagonistic, how would the American government react to his visit? He decided to cast off these doubts and move forward."
 brazil.54.a: "He was here to help the Brazilian people, after all."

 brazil.55.t: "The Master Plan"
 brazil.55.desc: ""I came here as soon as you called," Neves said as he hung his hat and coat on the wall. "What did you want to talk about, this dinner proposal?"\n\n"I have this guest list for the next few weeks," Kubitschek said as he handed over a list of names. "I'm going to hold some meetings with these people to calm down the military and make it so we might actually have an election at the end of this. Look it over and tell me if it's good."\n\nNeves took the paper. "Well, maybe some fundraising sessions and meeting with some of the high ranking...hold on, that isn't...isn't Alberto Fernandez from-"\n\n"Exactly," said Kubitschek as he smiled. "We get diplomatic support from the South American governments, and that calms the military down about us. Just meet their ambassadors, go on foreign tours, and generate positive headlines for us that the military will see and calm down."\n\n"Might also help us with the electorate too," Neves thought aloud. "They love the statesman angle. Yes, I can see why you like this idea. We should call Walther Salles and get him working on setting these visits up."\n\n"Salles! Right, excellent suggestion. Let's do it. And don't worry, I never dreamed of contacting Paraguay and bringing them into this."\n\nNeves smiled. "It's perfect then.""
 brazil.55.a: "A new election beat begins..."

 brazil.56.t: "Leaving Them Alone"
 brazil.56.desc: ""It is true that there are many rebellious officers, and that they want nothing more than the destruction of the government. The recent airport occupation is the clearest sign of this fact. But I think that Marshal Lott has the right of it. I will leave them alone for now and try my level best not to rock the boat."\n\nThus João Goulart spoke when asked by his officials for an instruction regarding the matter of particularly rebellious officers in the armed forces. When two people heard of this decision, they came to Goulart's office in the Palácio do Planalto at the same time to make their opinions known.\n\nOne of them, Leonel Brizola, disapproved quite strongly. "Damn it all, Jango, you should have taken those good-for-nothing would-be Napoleons head-on and dealt with them once and for all. Now their threat will hang over us for the rest of your time in office!"\n\nThe other, Argemiro de Assis Brasil, was more sympathetic. "I really do think that the governor ought to cut you some slack. On the one hand, granted, they will remain a threat. I and the constitutionalists are here to help you out with that. But on the other hand, if you had gone along with Senhor Brizola's plan, you'd have done nothing but antagonize them, and possibly caused the very coup you wanted to avoid."\n\nGoulart listened to them both and nodded. He found Argemiro's views more convincing, all things considered."
 brazil.56.a: "But a sliver of doubt remained in his mind."

 brazil.57.t: "Crushing the Rebels"
 brazil.57.desc: ""There are many rebellious officers, and they want nothing more than the destruction of the government and a military puppet set up in its place. This cannot and will not be tolerated. Go and remove the worst offenders as soon as possible."\n\nThus João Goulart spoke when asked by his officials for an instruction regarding the matter of particularly rebellious officers in the armed forces. When two people heard of this decision, they came to Goulart's office in the Palácio do Planalto at the same time to make their opinions known.\n\nOne of them, Argemiro de Assis Brasil, disapproved quite strongly. "All due respect, Senhor Presidente, but you've blundered by going along with Brizola's plan. You've done nothing but antagonize them, and possibly caused the very coup you wanted to avoid; I'm honestly not so sure that Lott and I will be able to hold this back, though I will try to the best of my ability."\n\nThe other, Leonel Brizola, was more sympathetic. "Rubbish! It had to be done; you did the right thing to get rid of as many of these traitors as possible!"\n\nGoulart listened to them both and nodded. He found Brizola's mindset more convincing, but Argemiro's words left a sliver of doubt in his mind, which widened when news of sharply reduced military loyalty began to filter in."
 brazil.57.a: "We will have to see just how prudent this actually was."

 brazil.58.t: "Welcome to the Jungle"
 brazil.58.desc: "A crowd of South African men and women burst into cheers as the first Brazilian marines disembarked from their ships, heralding the entry of South America's greatest power into the war for liberty. Heitor marched in the middle of his column, grinning and putting his head down as the Brazilians weathered a storm of back slaps and thrown flowers. Eventually they pushed through the crowd, and made their way to a temporary barracks just outside of Cape Town.\n\nAfter a long and bumpy truck ride they arrived and began to unload their gear. Once their things were stowed, the weary Brazilians were set loose in a larger communal lot, packed full of other marines and foreign volunteers. Tomorrow would be full of debriefings, gear checks and the typical bureaucracy involved in mobilization, but for now there was nothing to do but fraternize till dinner. Heitor sat on a loose crate, and wiped his brow. He was warned about the heat, but the real thing was even worse than he imagined.\n\nHeitor lifted his head as he heard the tromp of boots on gravel growing nearer, barely dodging an outthrust, viciously sunburnt hand. A young man stood straight as a rail in front of him. "Um, uh, howdy there sir. I'm, um, the name's Private Smith, US Army. Just, I just wanted to introduce myself. Sir." Heitor smiled, and shook Smith's hand."
 brazil.58.a: "Nice to meet you Smith, but please put on some sunscreen."

 brazil.59.t: "Sunday at the Beach"
 brazil.59.desc: "The sun rose early in the morning, as Paulo sped through the streets with his Opala. It was Sunday, the day of rest- and it showed as he drove past buses full of old ladies heading to church. Today, he had a different goal: The sea. His girlfriend, Maria, sitting on the passenger seat, grinned with excitement every time he hit the throttle, and the V8 rumbled louder than the song playing on the radio.\n\nHe never thought a young man like him would have a car like this. That joy was for playboys from Ipanema, not for the son of a single mother like him. If there was something he'd learned recently, though, miracles happen; such as an accounting job at the governor's office, earned through a hard selection process and many nights without sleeping for the entrance exam.\n\nNow he reaped the rewards of his hard work by cruising fast. As the speedometer hit 99, Paulo drove through the tunnel- no traffic at all. He remembered reading on the news about how there used to be a favela on that hill, and how Governor Lacerda demolished it to build the tunnel. Paulo didn't give much thought about it- after all, going from his home to Copacabana in less than an hour used to be the stuff of dreams.\n\nThe Opala parked right next to the white sands, and as Paulo pulled his surfboard off the roof, his thoughts turned to a more pressing matter: seeing the sun reflecting off Maria's golden hair."
 brazil.59.a: "Today is a good day."

 brazil.60.t: "Round Table in the Palacio San Martín"
 brazil.60.desc: "Kubitschek could understand that not every building of governance was as modern nor as contemporary in its style as the ones in Brasília, but to be in one so obviously out of the present times put him slightly out of his element.\n\nThe headquarters of the Argentine Ministry of Foreign Relations was built on the tail end of the Beaux Arts movement, when Kubitschek was a small boy. The decorations of the inside recalled a more hopeful time, where humanity believed that science could usher in an age of understanding and plenty, not condemn the human race to face a spectre of annihilation. There were few buildings like this in South America. And heaven knew how many of the ones in Paris it was based on still survived the SS jackboot.\n\nThe snapping of a flashbulb snapped him out of him pondering how things must be in a building built before air conditioning. "...and would these trade agreements be applicable in the future?" he heard the Argentine minister ask.\n\n"We have had a wonderful relationship with Argentina during my Presidency, Minister," he said. "And I assure you building bonds with our South American neighbors will continue to be a priority. We will continue to develop our relationship, and yes, this does include new trade agreements between Brazil and Argentina."\n\n"President Kubitschek," said one of the diplomats, "you do understand any official support of your candidacy would constitute an improper interference in the internal affairs of your country by foreign diplomats?"\n\n"Precisely, and I expect you know that too." Kubitschek took a sip of water. "So I know it would be off the record.""
 brazil.60.a: ""You've got it, entirely on background.""

 brazil.61.t: "Allowing a Debate"
 brazil.61.desc: ""I'll say it again. I don't care how many times I need to. There was one unspoken, unbroken rule that even the subversives were smart enough to never break; don't allow Carlos Lacerda access to a microphone or television!"\n\n"That reeks of sentiment to me. So you're a closet subversive, eh? You want to see Lacerda fail?"\n\n"You can keep calling me names like a five-year-old, but in the end you'll see reason. I respect the man with all my heart, but the problem is that he's too good. All he has to do is say one word into the microphone and he's already won the election. Then, those crypto-Nazi-Communists will start squealing about election rigging! And who gets the blame? Us, that's who!"\n\n"If they dare march, we'll shoot them, and any traitors who stand with them."\n\n"And you think Lacerda will agree to that, huh?"\n\nCastelo Branco held up his hand, and as always the room fell silent. Squabbling children should quiet when their father speaks, and Castelo expected his officers to behave the same way.\n\n"I understand you're all very nervous. Sit down and have some more coffee then. Because I have a letter from Lacerda himself."\n\nCastelo took out the letter and waved it in the air.\n\n"I will read it to you shortly, but to summarize, Lacerda is very confident in how he will perform. If we deny him this, he'll be very upset. Now I understand that some of you have concerns, but we must allow this debate to happen."\nCastelo cast a hard gaze around the room.\n\n"My orders are final and irreversible. I don't want to hear any more pointless bickering. Nod if you understand."\n\nA sea of nodding heads greeted him."
 brazil.61.a: ""Go make the necessary arrangements, gentlemen. Dismissed.""

 brazil.62.t: "Party on the Edge of Brasília"
 brazil.62.desc: "Many could describe Brasília as "Kubitschek's city," but those who really knew the capitol would know the home near the outskirts of the city really was his place. Many diplomats knew this, it was expected of them. And several of the South American ones were there even for an important dinner. Wines from the Vale dos Vinhedos were taken from the cellar, and a wonderful spread of feijoada was prepared.\n\nAt four PM, they started to arrive at the home, greeted by Sarah Kubitschek. The master of the house unfortunately had to arrive in the middle of the group, being delayed by weather from a timely return from a campaign stop earlier in the day in Montes Claros. None of the Ambassadors from Brazil's neighbors seemed to take offense at the slight, as everyone there knew very well the trouble of traveling by air.\n\nThe conversation before, during, and after the dinner focused mainly on the upcoming election and the possible second presidency of JK. Everyone had their unique concerns and areas of interest. Guyana wanted to know Kubitschek's feelings towards the OFN. Argentina had concerns about water rights in the Alto Paraná basin. Venezuela inquired about a possible land route to the nation in the future. All those questions were elegantly handled or skillfully ignored by the once and future President.\n\nFinally, after the food was eaten, the wine was drunk, and the moon held high in the sky, the ambassadors began to leave back to the bright lights of the main city. And Kubitschek watched them go, content in his belief he had charmed a few of them into supporting his candidacy."
 brazil.62.a: "Who says you can't mix business and pleasure?"

 brazil.63.t: "Countering Lacerda"
 brazil.63.desc: "During the recent weeks, the cowbird of Guanabara had been spreading propaganda all over the place against Goulart, the PTB, and the whole government. Since in the aftermath of his drubbing in the Hundred Days' Crisis the man had nothing better to do with his life, he sat there screeching incessantly about the current "quasi-communistic fascist" regime ruling in Brazil. But for all that he ruthlessly condemned the PTB government, he seemed to conveniently forget all the things that he had messed up. Fortunately, however, Goulart and his press surrogates remembered it all quite well.\n\nGoulart directed his press officers to begin attacking Lacerda ruthlessly on any weak points they could think of. Instances such as his follies in the governorship of Guanabara, his ruthless cruelty towards the homeless, and the forcible clearing and displacement of favelas flooded the papers. This seemed to have a fairly good effect... until Lacerda began to retaliate with his own advertisements attacking Goulart's "slavish adherence to Getulist fascism" among other such slanderous nonsense.\n\nIn the end, all that came of the plan was just another mud-slinging contest, with pro- and anti-Goulart ads joining each other in near-total irrelevance in the popular consciousness within mere weeks. No real change was noticed in public attitudes other than the confirmation of the various biases held by both Goulart and Lacerda's partisans, and the positive effect of either campaign was debatable at best."
 brazil.63.a: "Fat lot of use that was."

 brazil.64.t: "The Gamble"
 brazil.64.desc: "It had been a whirlwind of a presidency for João Goulart, the man who had emerged victorious out of the chaos and misery of the Hundred Days' Crisis. In his brief time in power, he had fought the energy crisis, expanded the franchise, raised the minimum wage, reconciled with the PSD, and taken the fight to Adhemar and Lacerda in the aftermath of the crisis the two of them had set off. Despite all the progress, however, Goulart still felt a terrible sense of doubt and worry, and it was beginning to show in his private conversations with his confidant, Governor Leonel Brizola.\n\n"My God, I don't know what to do, brother, I'm so worried. If I make a single misstep, it'll be curtains for me, and the next thing I know Lacerda or Adhemar will sink their damned claws into the presidency. I don't know what to do, I don't know what to-"\n\nAt this point, Brizola put a hand on Jango's shoulder in an effort to calm him down. "Come now, Jango, this won't do. You need to remain calm and think about the two main strategies you and the rest of them came up with. Either you pledge to continue the reforms in your next term, which will irritate the military and lose us some of the rural north while gaining us backing in the south." At this point Brizola smirked slightly. "Or you can take a more moderate stance, which won't hurt your chances but will definitely keep the military nice and quiet."\n\nGoulart had calmed down. "Yes, thank you, Leonel. That helped a lot. It's time for me to make my decision, then.""
 brazil.64.a: ""I will promise a bold direction in my next term.""
 brazil.64.b: ""I will pledge not to rock the boat and be more gradual about it.""

 brazil.65.t: "0607302 JAN 62"
 brazil.65.desc: "FM AMEMBASSY BRASÍLIA TO SECSTATE WASHDC PRIORITY 3124. INFO DIR FBI WASHDC\nC O N F I D E N T I A L SECTION 01 OF 08 BRASÍLIA 70403-900\nSUBJ. REPORT ON BRAZILIAN POLITICAL SITUATION AHEAD OF ELECTIONS (1/5)\n\n1. THE FOLLOWING IS THE FIRST PART OF A REPORT ON THE POLITICAL SITUATION AHEAD OF THE UPCOMING LEGISLATIVE AND PRESIDENTIAL ELECTIONS, THE NEXT FOUR PARAGRAPHS SUMMARIZE MAJOR PARTIES AND THEIR DISPOSITIONS. NOTE THAT THERE IS ALSO A HOST OF MINOR PARTIES THAT ALIGN WITH THE BELOW.\n\n2. THE PSD AND PTB. RULING TWO-PARTY COALITION OF THE TRADITION OF WHAT BRAZILIANS CALL "VARGUISMO" - THE POLITICAL THEORIES AND METHODOLOGY OF GETÚLIO VARGAS. PTB, MORE LEFT-LEANING, SIMILAR IN IDEOLOGY TO THE PROGRESSIVE CAUCUS OF THE NPP IN THAT IT FOCUSES ON LABOR AND UNIONS. THE PSD IS THE PARTY OF THE RECENTLY ELECTED PRESIDENT LOTT. CENTRIST TO CENTER-LEFT IN POLITICAL ALIGNMENT; THE CLOSEST AMERICAN ANALOG IS THE REPUBLICANS.\n\n3. THE UDN IS THE MAIN CONSERVATIVE PARTY, ALIGNED WITH THE VICE-PRESIDENT QUADROS. IT IS THE MOST POWERFUL OPPOSITION TO THE PSD-PTB BLOC. AS THEY FAVOR INTEGRATION WITH THE OFN, I ADVISE SECSTATE AND DCI TO DIRECT PREFERENTIAL SUPPORT TO THEM IN ORDER TO SUPPORT AMERICAN INTERESTS.\n\n4. THE PSP IS A POPULIST PARTY, WITH THE FLAMBOYANT ADHEMAR DE BARROS AT ITS HELM. FALLS WELL BEHIND THE UDN, TO SAY NOTHING OF THE PSD-PTB. CURRENTLY HAS NO DISCERNIBLE PATHWAY TO POWER UNLESS SOME SORT OF POLITICAL CRISIS OCCURS. PRUDENT TO WATCH THEM IF THAT DOES HAPPEN.\n\n5. THE PRP, LED BY THE EXILED PLÍNIO SALGADO, IS A RIGHT-WING NATIONALIST PARTY ADHERING TO THE EXTREMIST AND ECLECTIC "INTEGRALISM" IDEOLOGY. THEY ARE, DUE TO THE PRUDENCE OF PREVIOUS PRESIDENTS OF BRAZIL, CURRENTLY SUPPRESSED. HOWEVER IT IS ADVISABLE TO KEEP AN EYE ON THEM.\n\nGORDON"
 brazil.65.a: "DULY NOTED. - DIR FBI"

 brazil.66.t: "The Radio Debate"
 brazil.66.desc: ""Don't you think I did well, Letícia ?"\n\nLacerda smiled as he felt his wife squeeze his hand in reassurance.\n\n"Carlos, I'm certain you did. Not even the best actor could match your talent for words."\n\nLacerda grinned and pulled her closer.\n\n"Then I've got this election in the bag. Where shall we celebrate tonight?"\n\nBut happy as he was, the Crow had called too soon. While Lacerda may think he now had the election in the bag after his dominant performance at the radio debate, with questions prepared to give him an edge over Kubitschek. However the ordinary man in the street and his family had not listened to the debate. As always, the only groups that did were Lacerda's voting base, the middle class, and the ruling elite."
 brazil.66.a: ""The Crow still called confidently, certain of victory.""
 brazil.66_tt: "£BRA_udn_texticon §QCarlos Lacerda§!'s popularity §Yrises§!.\n"

 brazil.67.t: "Kubitschek's Excursion"
 brazil.67.desc: "Early in the evening in Brasília, a hardtop Chevrolet turned off from the Via de Ligação and drove down the Eixo Monumental. Some may have considered it akin to the National Mall in the District of Columbia, but the locals considered it the largest roadway in the world, with over a hundred possible lanes in the avenue. In a sense, they were right, but there was a massive green space in the middle, limiting traffic to six lanes on the other side. But this did not impede the vehicle as it traveled through the modernist government buildings of the Esplanada dos Ministérios.\n\nParking at the Praça dos Três Poderes, the driver opened the passenger door and out stepped Juscelino Kubitschek. Taking a short stroll on the white stone plaza, he briefly looked at the buildings of governance around him. The Congresso Nacional, the Palácio da Justiça, but what really caught his attention was the flag of Brazil and the Palácio do Planalto. He stood there for a minute, reflecting, before he hopped back into the car for a final stop.\n\nIt was no difficult task to get there, as despite its length, the route was a mere left merge. Eventually the Via Palácio Presidencial brought him through the vast stretch of wilderness to another plaza of white stone. And from there, the last light of the day lit the Palácio da Alvorada beautifully, its western rays reflecting off the white of its construction so far in the distance.\n\nIt was his again, he was certain, his home. The one he built, and the one he would have once again. His election was assured, his reascension certain, and the second term the Brazilian people wanted would occur. This day may have been ending, but sure enough a new dawn would be in the east, one that would illuminate the modern buildings and hardworking construction sites once again.\n\nWas this counting chickens before they hatched? Perhaps. But, he knew, an optimist could make mistakes."
 brazil.67.a: "But a pessimist is wrong from the start."

