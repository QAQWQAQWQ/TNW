 ## Development Panel
 BRA_development_info_tt: "The §YDevelopment Panel§! is the place to manage the nation's economic development.\n\nClicking on a §YRegion§! displays possible §YDevelopment Edicts§! which can be invested in.\n\n§YSpecial Projects§!, such as the §KTrans-Amazonian Highway§!, consume resources and political power monthly until they are completed.\n\nOnly one §YDevelopment Edict§! can be active at a time nationwide. Each lasts 60 days and affects the level of §GDevelopment§! in the §YRegion§!, spurring economic growth.\n\nLastly, the graphs below the map display the progress of §YDevelopment§! in the current region, as well as economic development in the nation as a whole."
