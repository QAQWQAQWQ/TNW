 BRA_connecting_the_nation: "Connecting the Nation"
 BRA_rehabilitate_the_railways: "Rehabilitate the Railways"
 BRA_rehabilitate_the_railways_desc: "During the times of the empire, it was Barão de Mauá that built the first railway and connected the city of Rio de Janeiro to its countryside, hoping that soon the whole country would be linked by the iron highway. Today, the reality is far different from what he envisioned as railroads are forgotten and replaced by roadways.\n\nAs Kubitschek made roadways his main priority during the first term as President, the railways of Brazil were becoming more and more forgotten, to the point where riding them would be like time traveling back to the 1920s. In his second term, JK will rehabilitate the railways and modernize them 50 years from where they currently are, welcoming Brazil into a new iron age."
 BRA_fund_rede_ferroviria: "Fund Rede Ferroviária"
 BRA_fund_rede_ferroviria_desc: "In the 50s, Kubitschek incorporated every railway in the country and consolidated them into the Rede Ferroviária Federal with the ambition to standardize and expand the rail networks around Brazil. But unfortunately, due to his focus on building large highways around the country, the company was underfunded, and the iron highways only declined even more.\n\nIf our goal is to fix the railways and expand them, we must inject money into the underfunded business, even if it costs us millions. Then, the trains shall pick up steam."
 BRA_embrace_diesel: "Embrace Diesel"
 BRA_embrace_diesel_desc: "To modernize railways, we must give our trains brand new diesel-run engines that will allow them to travel at high speeds never seen before in Brazil and that can run for long distances! In short, if we wish to see our railroads become first-rate and respected worldwide, we must import all the latest diesel designs from around the world."
 BRA_resume_standardization: "Resume Standardization"
 BRA_resume_standardization_desc: "The Brazilian railways are heavily outdated, with many parts dating back to the old days before the 1930 revolution. The only reason why they haven't torn up yet is because of Kubitschek's own Rede Ferroviaria. If we want to introduce our railways into a new age and ensure their co-operability, we must standardize them. From building signals, giving our drivers the necessary instructions, to building broader rail gauges so newer trains can drive through."
 BRA_expand_the_network: "Expand the Network"
 BRA_expand_the_network_desc: "For a railway network to be valuable, it must reach essential destinations, opening up various opportunities and easier access. Therefore, while the development of the railways in the rural areas is critical, we must ensure their expansions and connection to Brazil's most prominent urban centers. Only then will our great railroads be noticed by the whole world."
 BRA_cementing_lotts_legacy: "Cementing Lott's Legacy"
 BRA_cementing_lotts_legacy_desc: "Lott, despite being controversial at first and just an intermission between terms, is still important especially with his loyalty to constitutionalism, and his efforts to enforce it on the military. Kubitschek will pay respect to Lott by bolstering the efforts and powers of the constitutionalists to ensure he stays in power. Lott saved Kubitschek in 1955; it's only fair he returned the favor"
 BRA_reassess_our_ambitions: "Reassess Our Ambitions"
 BRA_reassess_our_ambitions_desc: "When Kubitschek was named the mayor of Belo Horizonte, the old dirt roads became modern pavements. Then, as the President, he connected the country by building highways that allowed Brazilian citizens to drive from São Paulo to Mato Grosso. For Brazil to advance another 50 years in just 5, Juscelino will make infrastructure a priority once again.\n\nAfter handing the presidency to Lott, Kubitschek took the time to reflect on a new strategy for when he returned to the presidency. Since the end of the old oligarchical republic, railroads have been neglected in favor of highways as Brazilians started to take their trips in cars more and more. Some visionaries have suggested that air travel will be the future of transportation, with others even saying to take advantage of Brazil's vast waterways and turn them into "marine highways." Now is the time for JK to show the country his new plans."
 BRA_expand_the_dockyards_2: "Expand the Dockyards"
 BRA_resume_building_roadways: "Resume Building Roadways"
 BRA_resume_building_roadways_desc: "Over 20 years ago, Vargas envisioned that Brazil's vast and rich interior would be conquered by the paved road, giving Brazilians the opportunity to travel and commerce through the rest of the country. Such an idea would be in action first by Kubitschek by finally connecting the heart of the country with the highly populated coastal areas with the creation of Brasília and great highways that would facilitate travel. Later, it would be Lott's turn to turn Vargas' dream into reality by finally opening up our majestic rainforest to the rest of the country by creating the Trans-Amazonian Highway. These are genuinely beautiful sights to behold, and to think they were all done in nearly less than a decade...\n\nBut there is still much work to do - many areas of Brazil remain isolated, and Kubitschek's job is to continue what he started. Soon, every single Brazilian will be connected by the highway!"
 BRA_send_out_the_surveyors: "Send Out the Surveyors"
 BRA_send_out_the_surveyors_desc: "Building new roads to connect all of Brazil is our foremost goal. Still, we must ensure that the current ones continue to serve the Brazilian people with the highest quality they deserve.\n\nTo make sure our highways aren't deteriorating, we must send out surveyors to analyze them and send us reports."
 BRA_repair_neglected_routes: "Repair Neglected Routes"
 BRA_repair_neglected_routes_desc: "In the years since Juscelino Kubitschek's first term as President, the roads he built have seen a great amount of use. That is a double-edged sword. It is good in that the roads are and have been an infinitely superior replacement to the shoddy paths and outdated roadways that crisscrossed Brazil before their construction; trade and transport are conveyed far better over these new roads than they were in the past. It is bad in that use of any structure especially under so-called 'cyclic loading'—the scientific term for a situation in which periods of load are followed by periods of zero load—is guaranteed to lead to wear and tear, if not outright failure. That is exactly what has happened on these roads. It is time to begin a widespread repair campaign to fix them. This will preserve and improve their integrity, preventing Brazilian roads succumbing to the old joke about a given roadway being a road full of potholes or a pothole full of roads. More importantly, it will pave the way for any further expansions we wish to conduct."
 BRA_expand_lanes_on_the_highways: "Expand Lanes on the Highways"
 BRA_expand_lanes_on_the_highways_desc: "The currently extant highway system in the Republic of Brazil, even after the expansions we and our more sensible predecessors embarked upon, is used by hundreds and hundreds of thousands of vehicles per day. That figure is growing day after day, resulting in a situation in which our highways are reaching their capacity—especially the routes between the largest cities. This cannot be borne. We must widen our national highways to allow for more lanes. That will reduce congestion and, just as importantly, permit more traffic flow for commerce, commuters, and travelers alike."
 BRA_support_urban_initiatives: "Support Urban Initiatives"
 BRA_support_urban_initiatives_desc: "In Belo Horizonte and Brasília during his tenures there, our President Kubitschek oversaw the development of modern city infrastructure. On his watch roads were seamlessly integrated into city life to allow Brazilians to go wherever they needed: to work, to the shops, to visit friends, to go to church, you name it. The result is two cities that, Kubitschek often says, are easier to navigate than the likes of D.C. or Germania. Now that Kubitschek is President once more, he knows that now is the time to ensure that all Brazil's major cities can benefit from the structures he made for Belo Horizonte and the Federal Capital. Let us, in accordance with his suggestion, put forth a fund to support city roadwork initiatives and incentivize cities to improve their road networks."
 BRA_break_ground_on_the_perimetral_norte: "Break Ground on the Perimetral Norte"
 BRA_break_ground_on_the_perimetral_norte_desc: "Lott's grand Trans-Amazonian Highway allowed expansion into the underdeveloped jungle, but his ambition can be taken even further. Kubitschek will propose a new addition, a Northern Perimeter Highway, linking Amapá to the Guiana-Caiena administration and towards Colombia, where the new highway will meet the southern part of the Trans-Amazonian Highway."
 BRA_ready_airways_for_the_future: "Ready Airways for the Future"
 BRA_ready_airways_for_the_future_desc: "During the past years, the number of foreign tourists and visitors, coming to see our beautiful nation, has been steadily growing - most of them arriving not through our borders or ports, but via planes. It is more than clear now that the future of transportation lies in the skies above our heads. Kubitschek, a man focused on the future himself, cannot ignore this fact.\n\nWe cannot afford our grand, proud nation to fall behind the rest of the world. The government will begin to take actions to improve the condition of Brazil's airways, along with other necessary steps, so that our country shall face the new age of travels with heads up high!"
 BRA_sit_down_with_the_spi: "Sit Down With the SPI"
 BRA_full_steam_ahead: "Full Steam Ahead"
 BRA_a_crown_jewel_in_brasilia: "A Crown Jewel in Brasília"
 BRA_a_crown_jewel_in_brasilia_desc: "What better place to show that Brazil is committed to the transport of the future than its very own city of the future, Brasília? Kubitschek will request his good friend Oscar Niemeyer to design a special building for Brasília - a fantastic airport, which can welcome tourists, businesspeople, and world leaders alike to Brazil's shining new capital!"
 BRA_terminals_in_the_cities: "Terminals in the Cities"
 BRA_terminals_in_the_cities_desc: "The modernization of airports in major cities of Brazil, as Brasília, São Paulo and others will be the first step in Kubitschek's grand plan of air expansion - after all, these areas are the industrial, financial and tourist hubs of the country, and we must ensure that they're well-connected to the world, if we ever want to achieve an effective, sound economy, and call ourselves a modern nation."
 BRA_airstrips_in_amazonia: "Airstrips in Amazonia"
 BRA_airstrips_in_amazonia_desc: "Região Norte has long been the most remote and desolate area in Brazil - its rainforests made it extremely hard to transport goods or establish cities there. To fix that, the Kubitschek government will order the establishment of small and primitive, yet functional airstrips in the north of the country, so they can act as future points of expansion for settlements, building enterprises and new trade routes with Venezuela and Suriname."
 BRA_the_integrated_regional_system: "The Integrated Regional System"
 BRA_the_integrated_regional_system_desc: "The advent of air travel in Brazil is relatively recent, and much of the country's system is underdeveloped. Many destinations are economically infeasible for airlines to serve, and this isn't helped by the fact the industry is in constant competition with each other, slowing potential progress.\n\nBut Kubitschek's administration has vowed to fix the pressing use of domestic aviation. Air regulation shall be transferred to 5 administrative regions, overseeing flights in and out of Brazil, hopefully reducing the administrative burden and simplifying aviation in general."
 BRA_a_bandeirante_for_the_skies: "A Bandeirante for the Skies"
 BRA_a_bandeirante_for_the_skies_desc: "The majority of our neighbors on the continent already have their own "Bandeirantes", or flagbearer airlines - not mentioning the three superpowers. Thus, a decision has been made to create our own, state-controlled airline, which will focus on travelling to underserved regions of Brazil, where it just might not be feasible for private companies to service. While costing us some cruzeiros, this shall link the populated areas of the country to more isolated ones and easen their burden, along with improving our trade and the economy in general."
 BRA_concessions_for_regional_carriers: "Concessions for Regional Carriers"
 BRA_concessions_for_regional_carriers_desc: "With the advent of the Integrated Regional System, we are now faced with the question of what to do with the numerous airlines currently operating in Brazil. Air traffic rights shall be granted exclusively to airlines in each region, hopefully streamlining aviation and forming the backbone of a new air industry in Brazil."
 BRA_acquire_the_flagship_jet: "Acquire the Flagship Jet"
 BRA_acquire_the_flagship_jet_desc: "What is a modern national transit system without a modern airline service? And what better way to demonstrate a modern airline than with a 190,000 pound aircraft with a top speed of 588 miles per hour and range of almost 3,000 miles? We paid a damn good price for that Douglas DC-8, let's show it off!\n\nTo show the people this was more than just a pet project bought with their tax dollars we're going to take it on a national tour, city by city. From our capital of Brasília to the Joyful Harbour of Alegre, from industrious São Paulo to venerable Rio de Janeiro, to Salvador, Recife, hell, maybe even a brief trip over the Amazons! The age of aviation has come to Brazil and is here to stay!"
 BRA_link_urban_centers: "Link Urban Centers"
 BRA_link_urban_centers_desc: "Japan has built the astonishing "Dangan Ressha" - trains that travel up to 200 kilometers per hour! Between Brazil's biggest cities, Rio and São Paulo, it takes half a day to travel with congested traffic and slow rail. This is a perfect opportunity to create the "Rio-São Paulo Line", a high-speed rail linking both cities together. With the help of Japanese advisors, we can shorten the trip between the cities to just two hours, allowing transit to be faster than ever before, and cementing both cities' reputation as modern business hubs."
 BRA_span_the_nation: "Span the Nation"
 BRA_span_the_nation_desc: "Kubitschek has finished his term by completing the Belém-Brasília Highway, bridging North and South. Truly a marvel of the ages, but there is still much work to be done. No corresponding line exists for the nation's rail network; the rail system in the northeast and south of the country are disconnected. It's time for a new project. An ambitious North-South Railway will stretch from Goiás to Maranho, a project to unite the nation and the people!"
 BRA_requisition_brazils_waterways: "Requisition Brazil's Waterways"
 BRA_requisition_brazils_waterways_desc: "With routes standardized and obstacles clear, navigating the Amazon river is feasible. Now for the master stroke; a series of inland ports throughout the river and its tributaries, forming the Sistema Aquaviário Amazônico, allowing transport of goods along the river from the heart of Brazil. Alongside the Highway will be a ferry system for all to use."
 BRA_modernize_shipping_vessels: "Modernize Shipping Vessels"
 BRA_modernize_shipping_vessels_desc: "Petrobras has been a tremendous success for Brazil's energy sector thus far, though a few minor roadblocks have begun to hamper the company's continued growth. The most pressing issue is the rather appalling state of the transport fleets. As Brazil relies heavily upon its waterways for transportation, upgrading the fleet is paramount to clearing up infrastructural bottlenecks. A generous investment into retrofitting the aging vessels will hopefully be sufficient to keep the money flowing."
 BRA_provide_tax_incentives: "Provide Tax Incentives"
 BRA_provide_tax_incentives_desc: "Brazil's many waterways were once the arteries of the nation, through which supplies, commerce, and domestic transport flowed. This is still the case in the modern age, but the rise of Brazil's highway and high-speed rail system have provided far cheaper alternatives to going by boat, and as a consequence, they have become overcrowded by traffic. The waterways remain underused by comparison, and, by providing tax incentives for maritime transportation, we can hopefully inject some life into these unencumbered routes."
 BRA_chart_existing_routes: "Chart Existing Routes"
 BRA_chart_existing_routes_desc: "The age of exploration is a thing of the distant past, and yet, much of Brazil's land remains an enigma to this very day. The snaking rivers of the rainforest are maze-like and unpredictable in the extreme, and even the most experienced captains are forced to rely on word-of-mouth in order to navigate effectively. Instead of allowing our ships to stumble about in the dark, we can begin official efforts to map out the rivers of Brazil, so that even novice captains can rely on more than just a trail of breadcrumbs to find their way."
 BRA_deal_with_navigation_hazards: "Deal With Navigation Hazards"
 BRA_deal_with_navigation_hazards_desc: "The Amazon Rainforest is a place of great beauty, but also of tremendous danger. From unpredictable flow rates to hidden sandbars, unforeseen hazards await river vessels at nearly every turn. We can build as many roads and rails through the jungle as we wish, but until the rivers have been tamed, the Amazon will never truly be conquered. We shall send fleets of workers to clear up potential roadblocks on the most active river routes, so that vital supply trains will no longer have any unwelcome surprises during their journeys."
 BRA_build_inland_terminals: "The Amazon Marine Highway"
 BRA_build_inland_terminals_desc: "With routes standardized and obstacles clear, navigating the Amazon river is feasible. Now for the master stroke; a series of inland ports throughout the river and its tributaries, forming the Amazon Fluvial Highway, allowing transport of goods along the river from the heart of Brazil. Alongside the Highway will be a ferry system for all to use."


 BRA_five_more_years: "Five More Years of Progress"
 BRA_five_more_years_desc: "The party is over now, for we have won! But what that means is that the time for real work has now begun. For JK this may be a new administration, but the age-old task of leading Brazil through the road of progress into the promised land. Although Henrique continued many of his old projects, he also left many, if not most unfinished. Yes, there are indeed many projects in the books such as improving Brazil's transport and energy infrastructure, reforming the government's public health and public education programs, a new strategy which shall boost Brazilian industrialization with the aim of financing a broad South American focused foreign policy, And finally, perhaps the most ambitious out of them, both a Brazilian nuclear program and a Space Program, that shall cement Brazil's rightful place amongst the great powers of the world. And with his brand new cabinet, with both Tancredo at the helm of the Finance Ministry and the daughter of his predecessor, Edna Lott, as his VP, he has all that he needs to achieve all his goals if not even more."
 BRA_assemble_development_council: "Assemble the Development Council"
 BRA_assemble_development_council_desc: "Just like everyone always has a first, most people also have a second too. In this case, JK's first cabinet meeting has been an astounding success. It was just what Juscelino needed to remind him of his mission of progress and reinvigorate his passion and will to fulfill it whatever it may cost. Thus, there is no better moment than now to officially announce the second Conselho Nacional de Desenvolvimento, National Development Council, or just CD for short. A body composed of captains of industry, scientific experts, trade union bosses, and political appointees of the ruling Varguist coalition that shall council and help guide JK's many projects in the glorious road towards progress and Brazil's shining destiny."
 BRA_assemble_development_council_tt: "The chosen members of the Development Council will meet in Brasília, beginning our first §YPlanning Phase§!."
 BRA_announce_second_goals_plan: "Announce the Segundo Programa de Metas"
 BRA_announce_second_goals_plan_desc: "With the Cabinet rightfully formed, and with all the CD members correctly appointed, JK now is more than ready to continue his job in guiding Brazil on the glorious road towards progress. There is only one thing missing, the people's morale, for if we don't have the people's support then all our efforts will be for not. They must be reminded that there's nothing that can possibly stop the Brazilian people, that there is no such great challenge that they can not possibly beat. Thus with the necessary objective of emboldening our Brazilian compatriots, there is no better action than to give a public speech in Brasília, that shall announce the "Segundo Programa de Metas", 2nd Goals Program, with its deadlines and parameters. Such speech shall be broadcasted by radio, and the few existing Brazilian TV stations, throughout all of the nation. It shall serve as the call to action to the people and the perfect statement to raise their morale and support for the tasks to come."
 BRA_announce_second_goals_plan_tt: "Our ambitions will be announced to the world, beginning the first §YExecution Phase§!.\n"
 BRA_varguist_stands_strong: "The Varguist Coalition Stands Strong"
 BRA_varguist_stands_strong_desc: ""We were elected as a coalition, and we shall govern as a coalition!"\n\nThat is the intention that dominates JK's goals in his first months. Our support and hold of the legislative for now remains strong as ever. And if we wish for it to remain in such a way then we must address the fact that although united on paper, many things could drive the PSD-PTB coalition apart.\n\nOn one hand, the PSD, influenced by its oligarch and business sector electoral base, is focused on economic and industrial development alone, thinking that Brazil is almost at the point of finally reaching "its place in the sun". While on the other hand the PTB, influenced by the many trade unions and social movements it controls, believes that the task of reaching full industrial and economic development has been achieved, and thus that the main objective of the new administration should be to solidify and create new social programs so that the dividends of the new booming Brazilian economy may be shared by all. One of them, for the time being, must be appeased if the coalition is to remain united, however, which of them might it be remains JK's decision alone."
 BRA_ednas_path_to_compromise: "Edna's Path to Compromise"
 BRA_ednas_path_to_compromise_desc: "Edna Lott is not only the daughter of one of JK's most important political allies, but she is also more importantly his Vice-President. This makes her the most important and influential PTB member currently holding political office. And considering her well-known record of being a vocal and vehement activist for many social causes while also being one of the most conciliatory, rational, and cooler heads inside the PTB, especially when considering her other co-religionaries like Brizola or even Jango. Thus, she is in a perfect position, to be the person that influences and negotiates with the PTB on JK's behalf, for if they and their leadership aren't appeased the coalition and any possible dream of governing Brazil are dead."
 BRA_concessions_to_the_ptb: "Inroads With the PTB"
 BRA_concessions_to_the_ptb_desc: "As expected, Edna did not disappoint! Her conciliatory ways pleased the moderates, saying that if they didn't support the current administration then Varguism in any shape or form is practically dead. While her staunch and vehement commitment to their noble cause pleased and calmed the radicals, stating that if they went along and achieved JK's economic objectives then the prosperity for the Brazilian people would be immense, and the bounty to be shared even larger. Thanks to her efforts the PSD-PTB coalition has stood firm and is now more united than ever.\n\nHowever, our partners in the PTB are not fully satisfied. They demand an active voice in our administration and in the designing of our development plans. According to them, they wish that our plans have the interests of the Brazilian people in mind. Thus, JK has decided to give them a seat in the Developmental Council, DC. That shall satisfy them."
 BRA_tancredos_political_maneuvers: "Tancredo's Political Maneuvers"
 BRA_tancredos_political_maneuvers_desc: "Tancredo Neves isn't just one of the greatest finance ministers Brazil has ever had, he is also one of Juscelino's closest friends and allies since the very beginning of his political career, but more importantly, he is also one of if not the most influential figure inside the PSD party structure. Being known for his moderate and very pragmatic stance on most issues, to the point of him being one of the very few Varguist politicians who can cross the aisle and negotiate with the UDN on friendly terms. Due to this he personally holds much sway with most PSD congressmen and in our Party's business sector benefactors.\n\nThus, this makes him the ideal person to help JK in making the PSD hold the line and support his administration come what may. Considering that the PSD is not only the backbone of the Varguist coalition but also, more importantly, JK's own party, if he doesn't have their support then any wish of governing is nothing more than a delusion."
 BRA_psd_industrial_connections: "The PSD's Industrial Connections"
 BRA_psd_industrial_connections_desc: "And just as JK thought, Tancredo fulfilled his task excellently! Thanks to his very skilled political negotiations, the entire PSD legislative base has stood firm in supporting the current JK administration. Moreover, due to his moderation and practical way of convincing made so that we can now add a sizeable number of UDN and PSP congressmen into our government's legislative base. JK can now rest fully assured that, unlike his predecessor, he shall face no trouble coming from congress.\n\nHowever, the main part of the PSD electoral base isn't fully satisfied. Surprising as it may be, considering both its populist rhetoric and the fact that it calls itself the "Social Democratic" party, the PSD's electoral base mostly consists, outside of the middle class, of the business sector magnates, industrial tycoons, and Landowning Oligarchs. They at present feel that JK's plans will only be able to succeed with both their direct support and input. Thus, JK has offered them a seat in the Development Council, DC, which rightfully belongs to them anyway."
 BRA_broadcast_our_successes: "Broadcast our Successes"
 BRA_broadcast_our_successes_desc: "Kubitschek has found himself into a new complication, after the recently concluded political negotiations, he wanted to make a big media event, to remember his accomplishments and announce his future projects, however, he has just found out the very immense and depressing dismal state in which most telecommunication infrastructure in Brazil is. But no challenge is big enough. It just gives the opportunity to announce a new project and win a new achievement.\n\nFor JK to solve this issue he would have to decide to favor one of the existing Media conglomerates in partnering in the building of infrastructure and to officially give government concessions over the airways. Some options exist, out of them two stand out: on one side stands Mario Wallace Simonsen's Excelsior, the biggest TV media company currently existing in Brazil. While on the other side we have Roberto Marinho's Globo, a vast media empire that has now expanded operations into to the realm of television. In the end, the choice lies in the wise hands of JK."
 BRA_television_concessions_bill: "The Television Concessions Bill"
 BRA_television_concessions_bill_desc: "Alright, we have everything ready, the project has been written to perfection and with all considerations sided. However, one main issue remains as a major block to achieving our desired goal of giving Brazil the best telecommunications infrastructure it rightfully deserves. The issue being. Witch media conglomerate should be favored in our new project. This is an issue that has also tremendously divided our governing coalition. On one side Stands the left-wing of the PSD and our coalition partner, the PTB, who are vehemently advocating that we favor Mario Wallace's TV Excelsior. While on the other side lies the rightwing of the PSD and the Anti-Varguist opposition, the UDN and the PSP, who are loudly arguing that we favor Roberto Marinho's Globo Group. Whatever we chose we shall both make enemies or allies, but the choice must be made for it's the last thing in our way."
 BRA_unending_march_towards_progress: "Our Unending March Towards Progress"
 BRA_unending_march_towards_progress_desc: "What Old Man Vargas began; we must continue! It is our solemn and patriotic duty to continue the glorious road towards national progress that he set out for us. It is true that many important landmarks have been achieved and many important goals reached. But there are many new projects to develop, and sadly many old unfinished ones to complete. So there must be no delay any longer, we have everything ready, Cabinet, CD, and more importantly the people are behind us, so there is nothing that can stop us in our goal to guide Brazil into its rightful place amongst the great industrial powers of the world."
 BRA_the_macapa_cayenne_highway: "The Macapá-Caiena Highway"
 BRA_the_macapa_cayenne_highway_desc: "New Administration, new programs and projects to develop, however for both good and bad there are also many old ones to both continue and finish. But thankfully, in this case, we shall not only continue but also expand a brilliant project. In this case the great idea by our friend and predecessor, Henrique Lott, this one being his pet project the Trans-Amazonian highway. Our goal is building an expansion coming from the said highway, more specifically a road that connects the capital of French Guyana, Caiena, to it. This shall do wonders in integrating, even more, our economies and integrating, even more, the Guyanese to us, which in the long run shall only be one small step in greatening Brazilian influence and diplomatic prestige."
 BRA_civilian_industries_lead: "Let Civilian Industry Lead"
 BRA_civilian_industries_lead_desc: "There are very few known ways how to build a road, however, in contrast, there are many known ways how to finance the building of a road. One of the safer ones and the one JK is currently contemplating, is to safely rely on the industrial magnates and building cartels of the private sector. After all, they made his first "Programa de Metas" possible, so they are indeed the ideal benefactor to his Macapá-Caiena Highway project. And amongst his private-sector benefactors, there is no one more qualified than the Andrade-Gutierrez Building group, they already have a great reputation for quality and efficiency after building the São Paulo-Curitiba Highway, so there is no one better than them to fulfill this task."
 BRA_develop_port_of_cayenne: "Develop the Port of Caiena"
 BRA_develop_port_of_cayenne_desc: "While our highway project connecting brazil to cayenne will do wonders for the economic integration between our two countries, we must not forget the main reason that we are doing this project, which is to further and enhance the integration of the Brazilian economy with that of the northern hemisphere. And to achieve that building a highway isn't enough. We must therefore build up and enhance the already existing maritime transport capabilities already existing in the region. Due to the lack of development under the previous French administration unfortunately aren't much. Thus if we are to truly achieve the objectives of our project we must also build up the port in Caiena so it becomes a world-class port and a main strategic point for commerce in the North Atlantic."
 BRA_develop_port_of_cayenne_tt: "§YModifies Highway Complete Milestone:§!\n  §YCayenne§! Add §Y1 Naval Dockyard§!"
 BRA_bring_in_military: "Bring in the Military"
 BRA_bring_in_military_desc: "The relationship between JK and the Brazilian Armed Forces has always been one of a very tense and frosty nature. They never liked his links with Varguist politicians and his open flirtation with the ideology of the old dictator. And unfortunately, such dislike for JK comes not from only one faction but from both the Sorbonne and Hardliner factions, which combined compose most of the army, unfortunately. Their dislike and paranoia around JK came to its highest point when they attempted a coup in 1955 to impede Juscelino from taking office. Thus with such a history behind them, It is in JK's best interest to amend such divides between him and the arm by any possible means necessary. Thus "throwing them a bone" by giving the army the administrative, economic, and political oversight of the construction of the Macapa-Caiena Highway could do the trick. Bringing in figures like Castelo Branco and Golbery do Colto e Silva would also help in achieving that."
 BRA_supply_garrisons: "Supply our Garrisons"
 BRA_supply_garrisons_desc: "Guiana-Caiena is at the present moment the first step on the road towards Brazilian economic diplomatic and most importantly political hegemony over South America. A small step, but nonetheless one of the utmost importance. Thus if we want to fully finish such a process there is still one big task ahead of us. The French colonists, who have lived there since French presence began in the 17th century, have proven themselves openly, and sometimes even violently, hostile to our military presence in the province. And to make matters worse the current Brazilian forces there are extremely ill-equipped and drastically underfunded, in other words, incapable to deal with the current issues facing them. Thus we must change that, the financing of the Brazilian Army Garrison in Caiena must be doubled, and the Garrison itself must be reinforced!"
 BRA_encourage_investment_in_para: "Encourage Investment in Pará"
 BRA_encourage_investment_in_para_desc: "It is sometimes said that army men only have a mentality toward war and the destruction of things. Well, one thing is certain they definitely don't have a mind geared towards investment. For almost a decade the Brazilian Northern State of Pará has been neglected by the Brazilian government, during the Administrations of President Eduardo Gomes and, unfortunately, of our good friend President Henrique Lott. The state has seen very little building and expansion of vital infrastructure. Pará is part of the heartland of the Brazilian North, if we want to make the north catch up with the industrial development of the rest of the country developing Pará into an industrial powerhouse is vital. Of even further importance is the fact that Guiana-Caiena is adjacent to the economic centers of Pará as well, thus Pará must also be developed if we want to cement our hold over the province."
 BRA_quiet_night_of_quiet_stars: "A Quiet Night of Quiet Stars"
 BRA_quiet_night_of_quiet_stars_desc: "Ah! How many things have we achieved! We have successfully strengthened the Varguist coalition in such a way that in doesn't only guarantees us a politically safe 2nd administration, but it also builds up a solid base for the continued government of Brazil by the coalition for decades to come. To boot we have finally brought Brazil's telecommunication infrastructure up to the standards of the 20th century. We have made efforts in building infrastructure in both the north of our country and in the province of Guyana-Caiena, Solidifying Brazil's hold over the region and making the first great step on the road towards Brazilian hegemony over South America. But more importantly, we have both announced and already given a solid start to our second "Programa de Metas".. 5 more years of progress, achievements, and success await us!"

 BRA_innovate_in_the_univiersites: "Innovate in the Univiersites"
 BRA_innovate_in_the_univiersites_desc: "Some say that the future of a Nation lies not only in its youth but also in its intelligentsia. And the intelligentsia of the Nation more often than not, although not exclusively, from its universities. And just like the rest of the education system, Brazil's institutions of higher learning need some work. The lack of funding and development in them is hindering Brazil's progress. For if the universities are made better then it shall increase Brazil's capability of research in all fields of knowledge. If we leave them in their current state we will also be hindering the career paths of all Brazilians who earn for higher-earning jobs. Their development thus is of the utmost necessity if JK's administration is to achieve its goal of finally placing Brazil amongst the Great Powers of the Modern World."
 BRA_increase_adult_literacy: "Increase Adult Literacy"
 BRA_increase_adult_literacy_desc: "In this road of renewing, reforming, and bettering the Brazilian Education system, most of the focus has been given to the Brazilian youth, which although perfectly reasonable considering they are the ones who engage with the system the most, unfortunately, it also ignores one of Brazil's biggest problems. Adult illiteracy. According to government data, it is an issue that currently afflicts approximately 20 million adults, many of which are of working age. This also affects Brazil's future for basic literacy would aid many of these adults to access a bigger pool in the job market and to also more easily adapt to future changes in said market. Thus if we do want to achieve a better future for Brazilians overall, then it is the duty of this administration to organize and prepare adult literacy programs, to finally solve this issue once and for all."
 BRA_invest_in_primary_schooling: "Invest in Primary Schooling"
 BRA_invest_in_primary_schooling_desc: "It is often said that "Children are the Future", if that assertion is indeed correct, and being rational it most likely is, then the future of Brazil is one of a rather poor nature. The Brazilian Primary Education system is historically well known for its extremely poor quality due to very low investment by the government on it. It is therefore the first area of the education system that we must reform and aid. For if any nation-building project to succeed, we need the future generations to continue and finish the task. Thus we need to double and if possible triple the amount of investment currently given to the sector. Furthermore, if we are to fully achieve our final goal of erasing illiteracy from the face of Brazil once and for all, we must start by ramping up those efforts amongst the younger generations."
 BRA_edna_lotts_mission: "Edna Lott's Mission"
 BRA_edna_lotts_mission_desc: "Before she became the Vice-President of Brazil, Edna Lott was a teacher. And as a teacher she had to deal with the disrepair and lack of investment in the education sector during her entire professional career. She was also made extremely aware of one of the greatest social ills that plague Brazil: Mass illiteracy. Thus when she started her new career in politics one of her main goal was to ameliorate the issue and make The Brazilian Education System the greatest in the region and an example to the rest of the world. Thankfully in this struggle she can find no better ally than her current boss President Kubitschek, the son of a primary school teacher himself, and starving for more public approval, she shall find no better partner in this task than him, for both good and questionable reasons."
 BRA_heed_ednas_concerns: "Heed Edna's Concerns..."
 BRA_heed_ednas_concerns_desc: "Edna has the full knowledge, after being a teacher herself, that for this project to be fulfilled correctly and Brazilian primary education to be improved then it must not rely exclusively upon the information gathered by experts. They must go to the ground and rely on the grievances of those who have to actually deal with the broken system on a first-hand basis every day, the teachers themselves. For it is they who have dealt with the worst consequences brought by the lack of investment coming from the federal government. And, most importantly, they are the ones who have to deal on a first-name basis with the ones who are the real victims of the current state of things, the students. Thus Edna has dedicated most of her time to consulting her fellow teachers on how to address the current problems facing the sector."
 BRA_and_her_ideas: "...and Her Ideas"
 BRA_and_her_ideas_desc: "Edna, as a veteran teacher from the public sector, has a very solid list of conclusions on how to fix her old job provider, the Education sector. It is a very long and very extensive list, but the source of said solutions can be boiled down to two very key problems that are affecting the sector, and more specifically its employees the teachers. The First one is that her old colleagues are not paid enough for their very arduous and essential work. This is only useful in creating the second problem, which is that due to the lack of a good salary the sector is currently only attracting teachers of rather poor quality. Which has led to the kind of teaching, education, and knowledge, in general, being given to the Brazilian youth being of a sub-par nature.\n\nThus the main, and starting solutions in her list are to 1) Raise the salaries of all teachers in Brazil so they are properly paid and rewarded for their work. And, For Better or Worse, 2) Introduce new teachings standards in all levels of education so that the quality of it starts to improve throughout the country. These are the first steps in bettering Brazil's Education Sector once and for all."
 BRA_the_jk_way: "...the JK Way"
 BRA_the_jk_way_desc: "Edna may have a very long history of first-hand experience with the failings of the Brazilian Education System, however, that same experience makes her conclusions about which are the main problems and solutions around it be corrupted by her own personal bias. This has become a major area of disagreement between Edna and her Boss, for JK has a different idea of what the main problem in the system is. To JK it can all be resumed into one single word: underfunding. It is the lack of proper and adequate funding that has left the Brazilian Educational System in its current sub-par state. Thus if we want to solve the only way to do it is to increase the funding going towards the sector, perhaps even doubling or tripling it. It is the only way to guarantee that the students receive a good quality modern education."
 BRA_brand_new_schools: "Brand New Schools"
 BRA_brand_new_schools_desc: "There is no such thing as Education without, you know, the actual school. And because of the funding, more specifically the lack of funding, the school buildings in rural Brazil are famous for being dirty decaying, and neglected buildings. It is of the utmost necessity that the administration dedicates itself to the arduous effort of building as many new school buildings as possible. And they must be built up to the current modern standards of education, so we achieve our goal of improving the quality of Brazilian Education overall. They should also have the largest capacities possible to increase the number of educated children in this generation, so they have better opportunities in life than their fathers and their grandfathers. This will also be a practical measure in another sense since it will also show the population how much the current administration values Education."
 BRA_brand_new_books: "Brand New Books"
 BRA_brand_new_books_desc: "Year by year the students of Brazil are betrayed, they believe and always hear the promise of the future, the ethos behind the modern Brazilian republic, for in their classroom they carry an astounding monument to a decaying past, their textbooks. These tattered relics are sometimes older than the parents of the children that receive them. Their content is so out of date that history texts books sometimes don't even mention the First World War let alone the Second. Well no more, for President Kubitschek will not allow such an insult to the Brazilian youth to go any further. The government shall provide more than enough funding so that new modern Textbooks are made that actually represent and teach the modern advancements that have happened so far, and that are happening in the 20th century. The Children of brazil are our future, thus they deserve the right knowledge to prepare them for the challenges that lie ahead."
 BRA_guarantee_teacher_salaries: "Guarantee Teacher Salaries"
 BRA_guarantee_teacher_salaries_desc: "There is only one thing that makes a human being do anything, Motivation. And the biggest source of motivation in modern times is the size of a person's salary. And unfortunately due to the very low Salary of most Brazilian teachers their motivation to work is very low, thus reducing the quality of their teaching. Thus if we want the quality of education to improve, we must raise the salary of the teachers of Brazil. They as a category must be fully recompensed for the arduous work they do for the nation and its future. A new salary will also attract a new pool of candidates to the sector, which at the moment is desperately needed. By giving the teachers their labor's just reward we shall both earn their gratitude and support and also improve Brazil's Education System to boot."
 BRA_guarantee_teacher_standards: "Guarantee Teacher Standards"
 BRA_guarantee_teacher_standards_desc: "There is a plague that currently curses the Brazilian education sector, "Lay" teachers. Teachers who either do not have the proper training to exercise their profession or who received their instruction ages ago, so can't properly teach their students up to modern standards. Thus one of Edna's main objectives is to establish an in-service training program for currently employed teachers and a solid path for "Lay" Teachers to become fully qualified and up to modern teaching standards. In addition, she will also create a structured plan for career advancement for the teachers based on a new set of teaching standards, which should, when accompanied by the training programs, better the quality of Brazilian education overall."
 BRA_assuage_the_administrators: "Assuage the Administrators"
 BRA_assuage_the_administrators_desc: "There is only one person that can define the direction where a ship is sailing, and also know the state that it is, that is its captain. And just like a captain is overall responsible for his ship, so is an Administrator responsible for their respective University. Alongside the student themselves, Brazil's University administrators are the best source to know which problems Brazil's Higher Education Institutions are facing and even perhaps how to solve them.\n\nHowever, many of them have been scared by the Kubitschek Administration's reaching out to the Student Unions. They indeed fear that leaving the "kids" in charge will lead to utter confusion and chaos. If JK wants their help, then he must first convince them that the reforms themselves won't be too radical and that on any key aspect of them, they shall be consulted first. Which shouldn't be a challenge to the smiling President."
 BRA_stand_with_the_student_union: "Stand with the Student Union"
 BRA_stand_with_the_student_union_desc: "If the youth of Brazil are the Nation's future then the future is loud, noisy, and constantly screaming at the top of its lungs slogans against the "Establishment's" failures. For decades Brazil's myriad University Student Unions have marched and protested against many things, sometimes they were indeed against trivial things, but most times they were against the decaying quality of Brazil's higher education system as a whole.\n\nAs the people that rely the most on Brazil's universities, they are indeed the best source on how to better it. However getting the Student Unions on the Administration's side won't be an easy task for JK, for he is seen by the more militant members of the Unions as the quintessential Varguist Establishment Politician. However, there is nothing that the charm of Brazil's Smiling President can't solve."
 BRA_usher_in_private_institutes: "Usher in Private Institutes"
 BRA_usher_in_private_institutes_desc: "If the complete failure of the "Soviet Experiment" taught the world anything, is that the Marxist quixotic fantasy that is the notion of complete state control of the economy is ultimately wrong and doomed to the worst type of catastrophes possible. Being a good learner of that lesson the Kubitschek Administration is fully aware that in all its efforts to build Brazil a better future, including its efforts in reforming the Education System, the Brazilian Government cannot fulfill all these efforts alone. Thus if JK is to actually fulfill his promises to Brazil's students, then he must build a bridge between the Brazilian Government and Private Higher Education Institutions. Some have said that perhaps legislation could create new provisions so that the existing private institutes enlarge their admission capability, which might in the end "do the trick"."
 BRA_expand_public_funding: "Expand Public Funding"
 BRA_expand_public_funding_desc: "From Oxford in Old Britain to Harvard in the United States, to The Kyoto University in Japan and the Reichsuniversität Straßburg in Germany, great universities are always the guarantors of a nation's development and future, for from them come the nation's future lawyers, doctors, engineers, teachers, etc. In Brazil, there is no doubt that our greatest institutes of Higher Learning are our Grand Old Public Universities. However, just like the rest of the Brazilian Education System as a whole, Brazil's Public Universities have been left to rot due to a lack of proper funding. If President Kubitschek does indeed want to guarantee the fulfillment of his promise to Brazil's students, then his administration has no option but to increase government funding to Brazil's public universities, so that they increase their admission capability to cope with the current demand."
 BRA_address_the_admissions_crisis: "Address the Admissions Crisis"
 BRA_address_the_admissions_crisis_desc: "What was that expression birthed by the old English bard, "Winter of Discontent", well if someone read the Kubitschek Administration's report on the current situation of Brazil's Higher Education Institutions then one would call the man modest for limiting "Discontent" to only a single season. According to information brought in by both the Student Unions and the Universities Administrators, Brazil's Universities are facing a very large Crisis. They are simply unable to admit the new large influx of students who want degrees. Even the most qualified and brilliant students are turned down due to a lack of space. Pressure from both our allies in the Administrators and the Unions is mounting. So whether JK want it or not he must fulfill his promise to them and solve the crisis, the survival of his Presidential Administration is counting on it."
 BRA_introduce_tempo_integral_pay: "Introduce "Tempo Integral" Pay"
 BRA_introduce_tempo_integral_pay_desc: "After the Kubitschek administration consulted the many Teachers' Unions on how to fix Brazil's Education System as a whole, it proportionally received an immense amount of complaints and a list of problems perceived in the system and corresponding suggestions on how to solve each of them. Amongst these many, many suggestions one was often repeated. Many of them have not only suggested but demanded that the administration must implement some sort of "Full-Time dedication", or "Tempo Integral" pay, which would afford them a salary for their research efforts in addition to the pay they would receive for teaching. This should give the shot in the arm to Brazil's research capabilities JK wants. And perhaps it should also help him gain favor and political support from Brazil's teachers, which would be extremely helpful."
 BRA_pledge_to_control_tuition: "Pledge to Control Tuition"
 BRA_pledge_to_control_tuition_desc: "Thankfully, whoever said "the friends you choose define you" is slightly wrong, for if that assertion were 100% true then Kubitschek and the members of his administration would be a bunch of entitled, confused, loud, and constantly screeching bunch. For their current allies in the Student Unions had chosen to "evolve" and forgo their elders' civility. However amongst the amount of screeching noise, and trivial criticisms the Student Unions have indeed brought on a key solid issue that the Administration should both tackle and solve. The rising cost of Tuitions Fees in public Universities is causing many problems for Brazil's students. Perhaps if the administration issued more grants for the students it could both ameliorate their situation and thus be seen by them that the administration is on their side, which should make them more supportive of it."
 BRA_a_visit_to_angicos: "A Visit to Angicos"
 BRA_a_visit_to_angicos_desc: "Our party as the natural party of government in the Brazilian Republic has many exemplary State Governors. In this specific case, the PSD Governor of the State of Rio Grande do Norte, Aluízio Alves has a personal project that might aid us in our goal to better the Brazilian Educational System overall. His administration is currently sponsoring the Pilot of an Adult Literacy Program organized by the renowned Brazilian Pedagogist Paulo Freire. Governor Alves has sent a personal invitation to President Kubitschek to visit and review the program. Given the pedigree of who is behind the illiteracy program if it produces good results and turns out that it is applicable to the rest of the country then it shall give a boost to our efforts in bettering the Brazilian Education System."
 BRA_launch_a_national_literacy_program: "Launch a National Literacy Program"
 BRA_launch_a_national_literacy_program_desc: "Bom, mãos à Obra! Let the work begin. The work of the Brazilian National literacy Campaign has begun. Many things lie ahead of Kubitschek's administration, sponsoring the existing literacy organizations, both of federal, state, and even foreign origins. Founding teacher training programs in every Brazilian state that are based on Freire's techniques. Building new Literacy centers in the poorer districts all across the Nation, be they of urban or rural nature. Coordinating with Freire and the Ministry of Education on the production of new teaching materials and new textbooks. If the program is to succeed all those tasks must be fulfilled to the fullest! For JK shall not rest until Illiteracy has been completely eradicated from Brazil once and for all!"
 BRA_seek_american_support: "Seek American Support"
 BRA_seek_american_support_desc: "Even we Catholics have to admit, that the Protestant reformation did have one good consequence, an increase in literacy. Their belief that every faithful has to understand the bible by themself has led to many voluntary literacy programs for someone can only understand the bible if that someone can read it. In Brazil, American Missionaries have more often than not embarked on such efforts ever since their missions reached our shores. And thankfully for us, their missions are usually supported by the American government. They would be the perfect ally in aiding in our program since they could help us with English learning materials. Although if we do want to take that step we might want to check it with the American government first."
 BRA_appeal_to_the_nationalists: "Appeal to the Nationalists"
 BRA_appeal_to_the_nationalists_desc: "Illiteracy, especially adult illiteracy, in Brazil is not only a matter of national development in the long run, and of personal realization in the case of those of suffer from it, it is also, importantly, a matter of National Shame that dints the image of Brazil not only amongst the world but amongst the eyes of our fellow Brazilians as well. This is an issue that captivates most Brazilian Nationalists, and not only those on the Varguist side of the Aisle. From the PTB to the UDN all Brazilian Nationalist Politicians overall see the overcoming of Illiteracy as a matter that affects Brazil's National Pride. So to make our measures have as little interference coming from the legislative as possible, Edna Lott has set up a meeting with a large group of Nationalist legislators to convince them to back our measures to better the Brazilian Education System."
 BRA_sergipes_revolutionary_doria: "Sergipe's Revolutionary"
 BRA_sergipes_revolutionary_doria_desc: "Kubitschek has never been a politician who has let party politics limit his ability in achieving his overall goals or even limit his capability of making viable political allies for the very achievement of said goals. The UDN may have amongst its ranks the most reactionary elements of Brazilian politics currently. However, not all its members share such characteristics. Inside its "Bossa Nova" Faction there are many politicians who although anti-Varguist and conservative, share the current administration's view on developmentalist economics. And amongst them, The Governor of the state of Sergipe João Seixas Doria not only shares JK's view on the economic management of the country but more importantly would also support him in establishing a National Literacy Program. JK sees no problem in reaching out to him since it will give the administration needed legislative support in the long run. Brazil shall erase literacy, no matter who JK has to ally himself with."
 BRA_the_crusader_of_the_north_alves: "The Crusader of the North"
 BRA_the_crusader_of_the_north_alves_desc: "We are indeed a very lucky bunch. Our Great Rio-Grandense political Coreligionary, Aluízio Alves has already reached a very productive relationship with American protestant missionaries. They are already working together in his pilot State Literacy Program Headed by Pedagogist Paulo Freire. Their pilot program is already with the aid of the missionaries' printing local English language learning material. Like their literacy program in general, their relationship with the American missionaries can also be a model for the rest of the country. They also present to us the perfect door to which negotiate with missionaries. If their aid is leading Rio Grande do Norte on a path to not only literacy in Portuguese but also English, then our goals for the country as a whole can find no better allies."
 BRA_drafting_a_strategy: "Drafting a Strategy"
 BRA_drafting_a_strategy_desc: "The Greeks of old said that no one carried a heavier burden than the titan Atlas for he carried the entire world on his back, well we may have found an even heavier burden than that, the burden that is brought by the idea of a comprehensive Adult Literacy Program by the Federal Government to the entirety of Brazil. The details of such a continental task must be defined if it is to be achieved in any way possible and, of course, conceivable. So a small commission comprising of President Kubitschek, Vice President Lott, the renowned pedagogist Paulo Freire, and all those who may be involved in its application must be convened to finally draft the plan for the National Adult Literacy Program. So that after the draft is done the Kubitschek administration may get to what it is best at, working for the benefit of Brazil's Glorious Future."

 BRA_examine_social_security: "Examine Social Security"
 BRA_examine_social_security_desc: "The many social security institutes—sometimes it seems like there is one per profession—are responsible for delineating what kind of care is available to Brazilian workers, and at what quality and what cost. But the fact that there is, as we have said, one per profession, at times almost defeats the very purpose of the work they are supposed to do.\n\nThis system is more complex and bloated than the Byzantine imperial bureaucracy ever was, and that fact is killing people. It is well past time to reëxamine it to improve care."
 BRA_exterminate_disease: "Exterminate Disease"
 BRA_exterminate_disease_desc: "The fight to restore the healthcare system and patch the gaps therein is not the only thing that the Second Kubitschek Administration can do regarding health. During the first administration, President Kubitschek presided over massive investments into public health and focussed on combating rural disease through the foundation of DNERu and INERu.\n\nRegrettably, during the years 1960-1965, the Brazilian government was unable to focus too closely on health, and as a result the gains we made during those first five years are now being called into question. But an opportune time has presented itself once again, and we are now free to continue the effort—let us do so with alacrity, knowing that we are fighting for the health and wellness of the whole Brazilian people!"
 BRA_renew_malaria_controls: "Renew Malaria Controls"
 BRA_renew_malaria_controls_desc: "One of the major components of the disease-eradication program of the Brazilian government that has fallen by the wayside in recent years is malaria control. Amidst all the hue and cry that took place during the years between the first and second Kubitschek mandates, malaria has taken the opportunity presented by the negligence of other men to expand in the countryside.\n\nObviously, since malaria is a terrible disease responsible for countless deaths, this cannot be tolerated. It is time for us to fight back and break malaria upon our knees."
 BRA_tackle_rural_epidemics: "Tackle Rural Epidemics"
 BRA_tackle_rural_epidemics_desc: "During his first administration, President Kubitschek presided over massive investments into public health and focussed on combating rural disease through the foundation of DNERu and INERu. This was a very wise decision on our part: so much of the prosperity of the Republic of Brazil is tied to the welfare of the rural regions; so much of Brazil's difficulties and suffering can be tied to illness and medical insufficiency in those same regions. But we were not able to win the battle completely during our time in office, and 1960-1965 saw a retreat from the heights we attained.\n\nNow that we are back in the Palácio do Planalto, we must keep moving and see an end to these epidemics once and for all. We cannot hope to move Brazil into the future unless we make these diseases relics of the past found only in biological history books."
 BRA_second_national_leprosy_campaign: "Second National Leprosy Campaign"
 BRA_second_national_leprosy_campaign_desc: "Since the time of Christ, and well before His coming and going, the disease traditionally called leprosy but today referred to as 'Hansen's disease'—who or what a Hansen is and why it's named for him we don't know—has troubled communities throughout the world. In wealthier countries it has been eradicated; however, even in places as prosperous as Brazil it remains a scourge.\n\nThe First National Leprosy Campaign, which began in 1950, aimed to tackle that by increasing access to antibiotics. We of the Second Kubitschek Administration believe that this noble fight can and must be continued—therefore we will announce a Second Campaign on the mode of the first."
 BRA_focus_on_modern_maladies: "Focus on Modern Maladies"
 BRA_focus_on_modern_maladies_desc: "The rural diseases that have troubled Brazil since its inception—Chagas, tuberculosis, leprosy, and so on—are at last beginning to come under control, between the work of agencies such as DNERu and INERu and the mass dissemination of vaccines, cleaning solutions, and education in the countryside. Finally, the rural lands of the Republic will begin to experience a sort of health that they have likely never known, not even when the Tupinamba and other indigenous peoples were all that was here.\n\nYet at the same time, so-called modern maladies have begun to emerge, diseases that hitherto only emerged in the various developed nations of the world. We must combat these before they get out of hand."
 BRA_deploy_spray_teams_for_chagas: "Deploy Spray Teams for Chagas"
 BRA_deploy_spray_teams_for_chagas_desc: "The Chagas parasite—so called because it was first discovered on the Chagas Archipelago—is a terrible, terrible pestilence that kills a large proportion of those affected by it. In the time between our leaving power and returning to it no doubt countless people have been harmed and killed by it.\n\nFortunately, we know one way we can contain it: it is communicated via the medium of insect bites. Deploying insecticide-spray teams to affected areas can help to control the spread with minimal excess effort on civilians' part."
 BRA_improve_diagnostic_equipment: "Improve Diagnostic Equipment"
 BRA_improve_diagnostic_equipment_desc: "It is easier said than done to pin down what disease a given human being has. For instance, persistent diarrhea could be anything from a bad bug to severe problems such as an allergy to gluten or a cancer of the gastrointestinal tract. Similarly, numbness could be the consequence of sleeping for too long on a given limb, or it could indicate full-on neuropathy.\n\nHowever, detecting diseases is made easier by better diagnostic equipment. Importing such equipment from abroad and funding homegrown solutions will help with this problem."
 BRA_invest_in_chronic_care: "Invest in Chronic Care"
 BRA_invest_in_chronic_care_desc: "In this last century our knowledge of disease has grown, and as a result the Brazilian civilian population has been able to live longer and longer. That is good in many senses—after all, a person that lives longer can participate in the various facets of life for longer and spend more time with his or her family. But this also carries some negatives, the most obvious of these being the rise of debilitating chronic diseases such as heart disease and cancer.\n\nFortunately for us, new treatments are being developed in places such as the United States and Japan. We should focus on providing these to the Brazilian citizenry so as to ensure a resolution of these problems before they get out of hand."
 BRA_begin_universal_tb_vaccination: "Begin Universal TB Vaccination"
 BRA_begin_universal_tb_vaccination_desc: "Tuberculosis—a respiratory illness that can often leave the patient coughing up blood—has troubled Brazil for only a somewhat shorter time than Chagas disease and leprosy have. A vaccine for tuberculosis, called BCG, has been developed; however, since it is not yet widely available in Brazil, this terrible disease continues to plague the nation.\n\nThe crown of the Second Kubitschek Administration's public-health campaign, more important even than the extirpation of the likes of Chagas and leprosy, will be a federal initiative providing general access to these life-saving vaccines from Tocantins to Pelotas and beyond."
 BRA_inaugurate_the_world_cancer_congress: "Inaugurate the World Cancer Congress"
 BRA_inaugurate_the_world_cancer_congress_desc: "Wonderful news from our President himself: leveraging his connections in cancer-research circles, he has managed to convince the global bodies in charge of the fight against cancer to hold the VII World Cancer Congress in Brazil... in Brasília no less!\n\nHowever, there is a caveat. The beauty of the city that the President built is all well and good, but more must be done. We must prepare reforms to our medical system to prove that the Republic of Brazil and its medical institutions are firmly committed to fighting modern diseases such as cancer and leave them in the history books the same way we are doing with polio."
 BRA_expand_public_healthcare: "Expand Public Healthcare"
 BRA_expand_public_healthcare_desc: "The Brazilian system of public healthcare as it currently stands is in dire need of, well, everything. Harrowing reports are daily brought to the presidential desk, to the Health Ministry, and to editorial offices throughout the country.\n\nThey speak of elders dying from easily curable diseases because no medicine is there, rural children dying of their wounds while being transported to a hospital far away from them, adults being turned away from clinics for lack of funds or some other rubbish that should not bar them from getting care. In desperation, many people are forced to go to expensive private clinics for unsubsidized care. Those too have their own share of horror stories.\n\nIt is obvious that something must be done to put an end to this misery. We will be the ones to do it."
 BRA_resuscitate_public_hospitals: "Resuscitate Public Hospitals"
 BRA_resuscitate_public_hospitals_desc: "Public hospitals are flailing. Underfunded, understaffed, underequipped, and demoralized, they shamble from one day to the next without even one jot of the things they need to do right by their patients and employees. It is no surprise, therefore, that the places where many people are resuscitated are often themselves in need of resuscitation.\n\nAn injection of fundamental investment will fit the bill perfectly. Offering additional funding, and matching health investments made by the states, will help bring quality of care to the level that the founders of these hospitals envisioned and beyond it, too."
 BRA_negotiate_with_private_providers: "Negotiate with Private Providers"
 BRA_negotiate_with_private_providers_desc: "Even when our plans to remediate the health system have had their desired effect, public healthcare will be simply incapable of handling everything on its own, and so private clinics will still have a place. Yet it is neither elevated nor correct for us to sit around and permit the private medical institutions to extort the civilian population just because we were unable to provide for them.\n\nThe Brazilian government has traditionally tried to provide access to private-clinic medical treatments through negotiating funding rates. With new treatments now available, it is time for us to renegotiate the configuration and number of available services."
 BRA_push_the_rural_coverage_amendment: "Push the Rural Coverage Amendment"
 BRA_push_the_rural_coverage_amendment_desc: ""But wait, there's more," the President says.\n\nWhat does he mean? Well, it's simple. He doesn't think that the current work on fighting disease in the rural regions has gone far enough, though he agrees it has gone far. He wants to introduce a rural-care amendment to the bill on unification of social security programs.\n\nThis will establish FUNRURAL, a fund which will serve as an appendage of the unified social security institute to extend social security to Brazil's rural workers. Hitherto uncovered by social security, the establishment of FUNRURAL will greatly expand the number of Brazilians able to access healthcare—though at significant cost."
 BRA_introduce_the_guarantee_fund: "Introduce the Guarantee Fund"
 BRA_introduce_the_guarantee_fund_desc: "Some of those most neglected by the Brazilian healthcare system are those transient members of the Brazilian populace who frequently find themselves unemployed and between jobs.\n\nTherefore, the Health Ministry has tabled a new proposal: the Time and Service Guarantee Fund or FGTS in Portuguese, which will provide health coverage to the unemployed. The FGTS will be an account into which a portion of workers' income will be paid into through redirection of their taxes. Then, when and if—God forbid—they find themselves out of work, they will be able to pay for healthcare via deductions from their FGTS account.\n\nThis proposal will enable those Brazilians out of work for whatever reason will still be freed to receive the healthcare that they deserve."
 BRA_issue_equipment_grants: "Issue Equipment Grants"
 BRA_issue_equipment_grants_desc: "One of the loudest complaints we hear from the medical professionals in hospitals is that what equipment they have is often outdated (if not simply broken or defective). Obviously, that needs to be remediated at the same time as our drive to fund the hospitals if we want that drive to have any constructive effect.\n\nFortunately, the solution to this issue is straightforward: issue equipment-specific grants to public hospitals and negotiate deals on foreign-built medical technology. It will not solve everything immediately, but it will be an important and auspicious beginning of an end to this problem."
 BRA_get_a_handle_on_costs: "Get a Handle on Costs"
 BRA_get_a_handle_on_costs_desc: "We have said it before and will say it again: it is neither elevated nor correct for us to sit around and permit the private medical institutions to extort the civilian population just because we were unable to provide for them. Yet that is exactly what has been happening: for too long, the private hospitals in this country have gotten away with charging unreasonable rates for even the most basic services.\n\nThe Kubitschek administration will not tolerate this any longer. It is time for us to call the private providers to the bargaining table. In exchange for having them cut prices to reasonable levels, we will expand the extent to which private-hospital services are subsidized by the State."
 BRA_identify_the_gaps: "Identify the Gaps"
 BRA_identify_the_gaps_desc: "Our work has proceeded well. The public hospitals and clinics are no longer in quite as unstable a state, and the private medical institutions have at last stopped charging people an arm and a leg for a broken fingerbone. Equipment, funding, personnel, and morale are at last beginning to attain desired levels, and the heart-rending reports about people being unable to provide for medical care for themselves or their loved ones have at last reduced in frequency.\n\nBut the work is not done. There are still gaps. With the hospital system patched up, we need to identify and deal with the gaps that existed even at the hospital system's founding. The first, most obvious problem are those transient members of the Brazilian populace who frequently find themselves unemployed and between jobs."
 BRA_standardize_the_institutes: "Standardize the Institutes"
 BRA_standardize_the_institutes_desc: "The social security system is more complex and bloated than the Byzantine imperial bureaucracy ever was, and that fact is killing people. Fortunately for us, President Kubitschek has a plan.\n\nThe first step in the President's plan to bring an end to the over-complicated nature of social security bureaucracy is the standardization of the institutes. This means that the institutes will be reshuffled into similar structures that provide variable but comparable benefits.\n\nObviously, this will be a major undertaking, but the best is yet to come. Once they have all been standardized, a bigger change will be coming. They will be unified."
 BRA_and_prepare_the_providers: "...and Prepare the Providers"
 BRA_and_prepare_the_providers_desc: "On the other hand, the various healthcare providers—or at least the 99% of them who have a nonzero quantity of functioning brain cells, since a few will always be witless about opposing change—will be rather relieved at the prospect of seeing the social-security system standardized and consolidated. After all, having to deal with only one institute instead of one per profession will make their work easier.\n\nNonetheless, we can very readily lose the goodwill this move will get us among them if we do not provide them with advance notice of the change; for all change, no matter how beneficial, is always a cause for alarm when one has not been prepared for it. Let us see to it, then, that they know that this is coming."
 BRA_brief_the_bureaucrats: "Brief the Bureaucrats..."
 BRA_brief_the_bureaucrats_desc: "As you might expect from every civil servant used to his position, initial soundings have it that the bureaucrats in charge of the various social security institutes are hardly friendly to change. They will try to resist the proposals for all they are worth unless the Government is able to strongarm them into deferring to us.\n\nFortunately, Kubitschek was President once before, and has dealt with these stodgy mandarins in the past. He is used to them. Therefore, it will be easier for him to brief them on what is to happen and get them on side (which must happen before we can go through with the plan)."
 BRA_unify_social_security_programs: "Unify Social Security Programs"
 BRA_unify_social_security_programs_desc: "The hour has come: a bill must be prepared and implemented with a view on consolidating the disparate social security administrations into a single national institute. This institute will assume responsibility for handling coverage across professions and classes, and the result will be that efficiency and access to care will experience a decisive increase.\n\nHopefully, the fact that the healthcare providers of Brazil are backing us in this will win us a large swathe of support from those senators that are close to them. Out of the remainder, we will win over those that can be convinced by reminding them that the old system benefited only a lot of bureaucrats and was killing their voters for lack of medical care."
 BRA_the_doctors_orders: "The Doctor's Orders"
 BRA_the_doctors_orders_desc: "Years and years ago, before Juscelino Kubitschek ever thought of going into politics or had heard of the man called Getúlio Vargas, he went into university and came out with a medical doctorate. Since then, much has happened: the world has bled itself white under Hitlerite, Blackshirt, and Yamato tyranny, Vargas has come and gone from power, the Udenistas have repeatedly made fools of themselves, and Kubitschek has been responsible for his home state once and his homeland in general twice. All that makes for a confluence of circumstances that would make any politician forget his original profession, and Kubitschek—much to his regret—has been no exception.\n\nYet the President's affinity for the medical profession has not faded. If Kubitschek is to take the fifty years of progress that he brought in five and make it one hundred in ten, medical infrastructure and the healthcare system of Brazil must be modernized and made more robust. So orders the Doctor—let us see it done!"

 BRA_exploit_the_atom: "Exploit the Atom"
 BRA_exploit_the_atom_desc: "If Brazil is to assert itself as a sovereign power in its own right, energy independence is paramount. However, acquiring the gas to meet such a lofty goal has proven difficult even in the best of times, necessitating the development of alternative sources. Fortunately, we live in a promising age of nuclear power, which promises to be a source of energy that can produce far greater output at far lower cost. President Kubitschek is eager to harness the power of the atom, and has authorized large investments in further research and development of nuclear energy facilities."
 BRA_harness_the_rivers: "Harness the Rivers"
 BRA_harness_the_rivers_desc: "We need not tether our nation to the likes of coal and oil for power when an even greater source of energy is staring us right in the face. Brazil's great rivers are known for their speed and ferocity - from the Amazon to the Tocantis, the force behind these great streams could easily be harnessed to bolster Brazil's power grid. It has been done before; Hoover Dam in America, the Snowy Mountains scheme in Australia - hydroelectric power is an exciting new frontier for Brazilian energy and it is one President Kubitschek is eager to explore!"
 BRA_set_up_eletronorte: "Set Up Eletronorte"
 BRA_set_up_eletronorte_desc: "The impoverished northern and central sectors of Brazil present a serious obstacle to Kubitschek's efforts to improve energy infrastructure across the country. Although the local geography is certainly a challenge to consider, the true mess to untangle is the separate and often incomplete energy systems across each province. Rather than tearing our hair out trying to solve this on a case-by-case basis, we shall instead establish Electronorte: a government-sponsored private corporation that will unify the energy sectors across Brazil.\n\nWith the energy infrastructure sitting under one roof, it is believed that we can streamline the process of industrializing these regions and create the jobs needed to lift their people up from the quagmire of poverty."
 BRA_finalize_the_treaty_of_itaipu: "Finalize the Treaty of Itaipu"
 BRA_finalize_the_treaty_of_itaipu_desc: "The Paraná River, which forms part of the northeastern border between Brazil and Paraguay, is a prime location for the development of hydroelectric infrastructure. Icy relations between the two nations have prevented any kind of exploitation, but finally an agreement has been reached to allow the development of a hydroelectric plant on the river. All that remains is to complete a few formalities to make the agreement official, and work on the Itaipu dam can finally begin."
 BRA_study_the_tocantis: "Study the Tocantis"
 BRA_study_the_tocantis_desc: "The Tocantis is one of Brazil's great rivers. It lies in the heart of the nation, flowing through the state of Goiás and conveniently near the capital, Brasília. President Kubitschek has big ideas about this river - if the Tocantis were to be damned, it would produce a whole new source of hydroelectric power, providing a massive boost to both the capital and any other nearby towns in the Central-West - in theory, at least. A research team will be sent out to gauge whether the Tocantis could truly serve this purpose or not."
 BRA_sit_down_with_paraguay: "Sit Down with Paraguay"
 BRA_sit_down_with_paraguay_desc: "Every now and then, it becomes necessary to deal with the devil for the greater good. President Kubitschek has his eyes on the Paraná River, wishing to build a hydroelectric dam there to bolster further industrialisation in the South. However, two unfortunate roadblocks stand in the way of the dam being built - and their names are Argentina and Paraguay.\n\nOur not-so-friendly neighbors to the south also happen to border the Paraná River and thus any damming would have to be done with their consultation. As loathe we are to sit down and discuss this with them, it will have to be done if we wish to make any progress with this damned dam."
 BRA_start_work_on_the_tucuru_dam: "Start Work on the Tucuruí Dam"
 BRA_start_work_on_the_tucuru_dam_desc: "The results are in, and we now know for sure that the Tocantis is in prime position for damming. With this in mind, President Kubitschek will formally embark on the beginning of a brand new Megaproject - the Tucuri Dam! Spanning across the Tocantis, the increase in energy it will provide will help bolster the burgeoning industries in Goiás, Pará, and all other surrounding states.\n\nOf course, this will mean many will have to relocate their homes and dwellings in order for the dam to be built - this process will not be an easy one, nor will the affected be particularly pleased to hear this. However, the price of progress can never be too high. These people will find themselves moving with the times, like it or not."
 BRA_commence_the_itaipu_project: "Commence the Itaipu Project"
 BRA_commence_the_itaipu_project_desc: "The agreement between Brazil and Paraguay has been finalized, giving the green light to begin construction of the Itaipu Dam. Conceived as a joint venture between our two nations, the dam will represent the largest effort to date to build hydroelectric infrastructure in South America, and the culmination of President Kubitschek's efforts to create a truly energy-independent Brazil. The project is immense in scope and will certainly be quite expensive on both sides of the border. It is therefore imperative that the project proceed as smoothly as possible."
 BRA_build_workers_quarters: "Build Workers' Quarters"
 BRA_build_workers_quarters_desc: "The Itaipu dam is expected to create thousands of jobs previously unavailable to Brazilian workers, and while this will bring enormous benefits to the economy, it also brings with it a whole host of logistical problems. Specifically, the dam will be located in a rather remote part of the wilderness with little housing for the workers, let alone the proper infrastructure to get them there! In order to avoid disaster before it happens, we need to start building proper housing for the construction crews."
 BRA_expand_access_roads: "Expand Access Roads"
 BRA_expand_access_roads_desc: "While the Itaipu dam is envisioned as a marvel of infrastructure engineering, it would currently stand in stark contrast to the state of the road systems leading to the site. There are already disturbing reports of traffic jams on the narrow roads leading to the remote site on the Paraná River, and this must be rectified to ensure that the project proceeds without incident. Properly paved roads with wide lanes must be built to provide an efficient pipeline to and from the dam and bring a steady stream of life to this developing region."
 BRA_prepare_the_power_grid: "Prepare the Power Grid"
 BRA_prepare_the_power_grid_desc: "When completed, it is almost certain that the Itaipu dam will be one of the largest in the world, generating a truly unprecedented amount of electricity for the Brazilian grid. Unfortunately, what is less certain is whether the grid is equipped to handle such levels. It would be a tragic waste of resources to generate such quantities only to have them go nowhere! We must work to prepare the grid to integrate with the dam and ensure that not a single megawatt from the dam is wasted. Upgrading the more antiquated parts of the grid will be expensive, but necessary to ensure that the dam operates at maximum efficiency."
 BRA_grants_for_the_ien: "Grants for the IEN"
 BRA_grants_for_the_ien_desc: "Even for an international superpower, harnessing atomic energy is no small feat. As Brazil is a regional power at best, we certainly have our work cut out for us. Fortunately, there is no shortage of talented scientists and engineers at our disposal to help bring the nuclear dream into the realm of reality. The staff of the Institute of Atomic Energy in São Paulo will certainly be all too eager to aid us in developing the proper infrastructure for nuclear facilities, provided they receive enough funding. These grants will not come cheap, but should the IEN's efforts to tame the atom come to fruition, our investments will be repaid a thousand times over."
 BRA_seek_american_expertise: "Seek American Expertise"
 BRA_seek_american_expertise_desc: "Brazil's relationship with the United States has been complicated at best. While they represent one of the strongest bulwarks against the spread of Fascism, their interests in South America have always carried suspicious undertones of imperialist ambition. Brazil relies heavily on American imports for its energy needs; a relationship our current drive to energy independence seeks to correct. Be that as it may, we may still require their help in achieving this goal, for America is one of the world's foremost leaders in nuclear energy. Their experts are arguably without peer and will be a great help to developing modern infrastructure, but may risk further indebting ourselves to the American giant..."
 BRA_approach_the_canadians: "Approach the Canadians"
 BRA_approach_the_canadians_desc: "Far to the north lies a country in a very similar predicament to ours. Canada is another regional power that chafes under the influence of much more powerful neighbors, and seeks to develop energy independence as a method to assert their national sovereignty in the face of growing dependence on foreign resources. Developing nuclear energy resources is a difficult task, but perhaps we could ease both our burdens by working together? There is surely a great deal of knowledge and expertise to share amongst ourselves, and an independent energy sector would only benefit our two nations. We shall reach out with an offer of cooperation to the Canadians, and see if we can find kindred spirits in them."
 BRA_utilize_iberian_connections: "Utilize Iberian Connections"
 BRA_utilize_iberian_connections_desc: "Presently, Iberia stands as a staunchly neutral power amidst the uncertain tides of the Cold War, and over the years our two nations have grown closer thanks to both cultural ties and a desire to strengthen a loose bloc of fellow non-aligned powers. Much like Brazil, Iberia has been investigating new sources of energy in the wake of recent failures, and nuclear energy has unsurprisingly emerged as a strong contender. With a fledgling program of our own, it would be wise to reach out to Iberia and offer to cooperate. Not only would this arrangement bring our nuclear programs closer to completion, but would perhaps help to secure us a key partner to help counter the ambitions of our Argentine rivals."
 BRA_create_nuclebras: "Create Nuclebras"
 BRA_create_nuclebras_desc: "The groundwork for an atomic revolution has been laid, and it is time to make the final leap towards the breakneck expansion of Brazil's nuclear energy infrastructure. To facilitate this, Nuclebras, a state-owned corporation, will be established to handle the production of heavy equipment for our nuclear enterprises. As its name may imply, Nuclebras will essentially serve the same role that Petrobras currently fills for the petroleum industry, and given enough time and elbow grease, may become similarly influential in the field of energy."
 BRA_invest_in_uranium_mining: "Invest in Uranium Mining"
 BRA_invest_in_uranium_mining_desc: "The bedrock of any sustainable nuclear energy sector is a steady supply of uranium to help fuel the reactors. Fortunately for us, Brazil already has several known sources of uranium ore within the country. Unfortunately, what little is scraped together from these mines is quickly whisked out of the country and into the hands of American buyers. We must ensure these vital resources are no longer being siphoned out of the country, and to accomplish this, the newly established Nuclebras will take over all uranium mining efforts within Brazil, as well as the creation of new mines."
 BRA_plan_the_angra_1_plant: "Plan the Angra 1 Plant"
 BRA_plan_the_angra_1_plant_desc: "The stage is set; it is time to commence construction on Brazil's first nuclear power plant! On the shores of the Itaorna Beach near Rio, a construction site has been established for what will become known as the Angra 1 plant. This will be the culmination of all our efforts thus far, and the effort necessary to bring this project to life will no doubt be tremendous. A great deal of foreign expertise will be needed to ensure the plant is able to match the output of those used in the United States, but if the project is successfully completed, Brazil will have finally entered the Atomic Age."
 BRA_utilize_our_petroleum: "Utilize our Petroleum"
 BRA_utilize_our_petroleum_desc: "Presently, the vast majority of Brazil's petrol is imported cheaply from Italy, whose control over the Arabian peninsula affords them the world's largest reserves of oil. This arrangement, while fruitful, comes with a great deal of risk, as should the balance of power shift in the Middle East, the shockwaves could be devastating to Brazil's ongoing industrialization efforts. We must instead look to local sources of petrol to avoid a potential catastrophe, as well as look into alternative sources of foreign oil."
 BRA_amazonian_exploration: "Amazonian Exploration"
 BRA_amazonian_exploration_desc: "Even in the modern age, the seemingly endless wilderness of the Amazon holds a great deal of mystery and wonder. Rumors circulate of vast quantities of oil hidden within the rainforest, as of yet untouched by man. Thanks to the Trans-Amazonian Highway, conducting exploration efforts will be far easier than they were in the past, and if these oil reserves truly exist, they will be found one way or another. Of course, there will no doubt be significant opposition from native groups who call these lands home, but they must be made to understand that the fate of Brazil holds far greater importance than the integrity of antiquated tribal borders."
 BRA_establish_petroquisa: "Establish Petroquisa"
 BRA_establish_petroquisa_desc: "Petrobras has grown to be a truly irreplaceable linchpin of Brazil's energy sector, dealing with anything from crude oil production to certain valuable chemicals synthesized during the refinement process, such as gasoline, kerosene, and more. That being said, presently the company mainly focuses on the former rather than the latter, missing out on a crucial opportunity to further expand Brazil's energy resources. A subsidiary of Petrobras aimed at specializing in this area, Petroquista, has been proposed. With the proper groundwork laid, we can begin to undertake massive expansions of Brazil's chemical industry."
 BRA_deep_water_drilling: "Deep Water Drilling"
 BRA_deep_water_drilling_desc: "By far the largest reserves of oil in Brazil lie in wait just off shore, and although the drilling of these areas is nothing entirely new, technology has long since outpaced our current facilities. It is estimated that applying modern methods to our refineries in the oil-rich Bay of All Saints may potentially double the production we are currently receiving. No more shall we lazily scrape away at the surface! With the aid of modern drilling innovations, we will be able to dig as deeply and as greedily as our hearts desire, and all of Brazil will benefit."
 BRA_refineries_in_the_northeast: "Refineries in the Northeast"
 BRA_refineries_in_the_northeast_desc: "Despite Brazil's impressive size, many of its resources remain untapped, and the country is unfortunately lagging behind many of her neighbors in terms of oil production. With the discovery of new oil sources in the northeastern Amazon, however, this sorry state of affairs can be swiftly rectified. Additional funding has already been authorized for the construction of new oil refineries in these distant regions; once completed, Brazil will make yet another major step towards energy independence."
 BRA_chemical_plants_in_the_southeast: "Chemical Plants in the Southeast"
 BRA_chemical_plants_in_the_southeast_desc: "Countless new resources are harvested from Brazil's hinterlands thanks to President Kubitschek's initiatives, but without the proper facilities to process them into something usable, they are next to useless. Let us look to establish new chemical plants within Brazil's heavily industrialized southeast, so that we may transmute the fruits of our labors into the seeds of Brazil's next economic boom: a robust new industry, and plentiful job opportunities to go with it."
 BRA_invest_in_energy: "Invest in Energy"
 BRA_invest_in_energy_desc: "Even before ascending to the presidency, Juscelino Kubitschek has been a firm proponent of securing energy independence for Brazil. During the Lott Administration, he became fully aware of Brazil's heavy dependence on foreign powers for its energy needs, and how this one-sided arrangement could easily come back to haunt the country tenfold. Now that he stands at the reins of power, Kubitschek is eager to begin the process of shifting away from the vice of cheap Italian oil, and instead making use of Brazil's vast natural bounties.\n\nIndeed, for such a vast country, we still have yet to tap into even a small percentage of the material wealth that lies hidden within the untamed lands of the interior. With the right investments, we could perhaps not only achieve energy independence for Brazil, but use this as a springboard to assert ourselves as a world power in our own right."

 BRA_open_bndes_checkbook: "Open BNDES' Checkbook"
 BRA_open_bndes_checkbook_desc: "Old man Vargas once said that "Only Economically Strong Countries can Truly be called Sovereign", following on that spirit President Kubitschek in his very first administration, 1955-1960, founded the BNDES, the "Banco Nacional de Desenvolvimento Econômico e Social" (National Bank for Economic and Social Development), a public state bank with the main goal of long term investment in the many key sectors in the Brazilian Economy so as to aid them in their development. The BNDES was one key factor in the overwhelming success of JK's first Programa de Metas (Goals Plan), especially when it came to the matter of Brazil's industrialization. Now back in power and with the goals of his Second Plan defined, JK will once again require the financial aid of the BNDES if he is to achieve his predecessor's ideal. For Brazil shall become Sovereign by the sheer might of its Economy and Industry!"
 BRA_modernize_our_natural_strength: "Modernize our Natural Strength"
 BRA_modernize_our_natural_strength_desc: "One harsh unfortunate truth must be accepted if Brazil is to achieve its rightful place amongst the great powers of the world; the Brazilian agricultural industry is outdated. To most around the world, Brazil's strength lies in its vast and prosperous agricultural sector, and its future lies in becoming the world's greatest breadbasket, however, Brazil's agricultural sector faces many problems. Some on Brazil's left might think that a Land Reform might be the solution, but President Kubitschek has another idea. For JK the solution to this titanic problem lies in the bettering of the agricultural sector's equipment and work methods through massive state-funded mechanization and modernization. Thus the goal is now set and it shall be achieved no matter the cost."
 BRA_irrigation_infrastructure: "Irrigation Infrastructure"
 BRA_irrigation_infrastructure_desc: "Water is one of the main sources behind all life and its cultivation. Without water, nothing can be born much less Grow. And that is precisely one of the key limitations that are hindering the progress of the Brazilian Agricultural Sector: the access to water. Brazil is vast and in its territory, especially in the Northeast, there are many arid areas where the access to water for irrigation is difficult thus hindering agriculture in those areas. So on the road towards progress, the first step Kubitschek's administration must take is the planning and building of massive irrigation infrastructure complexes throughout the areas that most need it. So that finally the issue of the lack of water access to farmers shall from then on only be reported in dusty history books, and not in the pages of economic journals."
 BRA_support_traditional_farmer: "Support the Traditional Farmer"
 BRA_support_traditional_farmer_desc: "If Brazil's main source of economic strength lies in its Agricultural Sector, the reason why the Brazilian Agricultural sector is one of the strongest in the world lies in its traditional small farmers. For it is the traditional small farms that not only feed the Brazilian nation but know traditional techniques no other country holds. Unfortunately for decades, they have been left to suffer under poverty and lack of proper resources. Well, not anymore, for the Kubitschek Administration shall right the wrongs of the past and raise the Small farmers of Brazil to heights never witnessed in any nation. With the right funds and machines, they shall be the backbone of the Brazilian Agricultural Juggernaut. Although this move will alienate Brazil's grand plantation farmers, who are one of the PSD's main political backers, JK shall follow through with the policy nonetheless for he knows that this is a matter routed in Morals not merely economics."
 BRA_credito_trator: "Crédito Trator"
 BRA_credito_trator_desc: "It has already been made clear that the Kubitschek Administration has set as an objective the strengthening of Brazil's natural source of economic power, its world-renowned agricultural sector. It has also been made clear that it has chosen to do so by finally doing the moral action that most previous presidential administrations failed to do, aiding Brazil's traditional Small Farmers. Thus to that very end, the Kubitschek Administration has proposed a new and innovative government program the "Credito Trator" (Tractor Credit), where the government in cooperation with both private and public banks shall provide financial assistance to small farmers so they can buy modern equipment, and so they can better their farm infrastructure. Finally, Brazil's small farmers shall reach a height that shall be envied all throughout the Americas."
 BRA_agro_e_pop: "Agro é Pop"
 BRA_agro_e_pop_desc: "If Brazil's main source of economic strength lies in its Agricultural Sector, the reason why the Brazilian Agricultural sector is one of the strongest in the world lies in its Grand Plantations. The Large Crop Plantations of Brazil have always been since its very own inception as a nation the very source of its importance so much that two of the crops, Coffee, and Tabaco, are on Brazil's very own Coat of Arms. Thus there they are the natural area on which to focus, and they shall be made competitive enough so much that they shall surpass all of Brazil's regional rivals. This move may alienate Kubitschek's leftist allies in the PTB, however, the President considers that it would be very economically naïve to heed their concerns, for no cheap sentimentalism shall stop Brazil's long march towards progress!"
 BRA_mechanization_bonds: "Mechanization Bonds"
 BRA_mechanization_bonds_desc: "It has already been made clear that the Kubitschek Administration has set as an objective the strengthening of Brazil's natural source of economic power, its world-renowned agricultural sector. It has also been made clear that it has chosen to do so by aiding in the modernization of its world-renowned Large Crop Plantations. Thus to achieve said objective the Kubitschek Government has proposed the establishment of " Mechanization Bonds", in which the Brazilian government shall through the BNDES, and other public state financial institutions, lend money to Brazil's Large Land Owners on the condition that they use said money to modernize their farming infrastructure and buy new and more modern machinery, in other words, so that they fully modernize and mechanize according to more current standards. For it is not only for Brazil's benefit but also for their own that they do so."
 BRA_create_the_embarapa: "Create the EMBRAPA"
 BRA_create_the_embarapa_desc: "The Kubitschek Administration may feel assured that its efforts in the mechanization and modernization of Brazil's Mighty Agricultural Sector, however, these efforts may be considered to an extent, only Brazil catching up with more modern countries, If Kubitschek is to really achieve his goal of making Brazil into the Greatest Agricultural Power in the World, catching up isn't enough. Brazil must find a way to also surpass its rivals technologically. Thus the Kubitschek Administration has devised the creation of the EMBRAPA "Empresa Brasileira de Pesquisa Agropecuária" (Brazilian Agricultural Research Corporation), a Semi-Public Scientific Investigation Company linked to the Brazilian Agricultural Ministry, with the objective of aiding in the research and development of new technologies that shall put Brazil ahead of all its rivals."
 BRA_o_grande_celeiro_da_ofn: "O Grande Celeiro da OFN"
 BRA_o_grande_celeiro_da_ofn_desc: "The Kubitschek Administration can boast much well deserved Pride, for they have achieved a great milestone in Brazil's economic history, for it has successfully modernized the source of Brazil's economic might, it's Agricultural Sector. Thanks to its efforts the Brazilian Agricultural Sector is now not only ready to compete with its rivals but also surpass them!\n\nAnd surpass them it shall! For all this effort shall not go without bearing fruits. The Kubitschek Administration shall now focus all of its efforts on becoming the main food provider in the western hemisphere, it shall surpass even Argentina. For if the Americans are the "Arsenal of Democracy", then Brazil shall become "O Grande Celeiro da OFN" (the great barn of the OFN). South America's food market shall belong to Brazil and only Brazil!"

 BRA_lets_finish_the_job: "Let's Finish the Job"
 BRA_lets_finish_the_job_desc: "Old Man Vargas' Dream must not die, for even with his many, many mistakes he was perfectly correct when it came to the logic behind his economic doctrine which was, "what makes a country sovereign is a strong economy, and what makes it a strong economy is its industry". And behind every industrial giant in this world, there is almost one key factor, Steel. Both the Industrial Colossus of Germany and the United States were only able to become what they are now due to their mighty Steel production Capabilities. Due to a lack of vision in the case of the Gomes Administration and a lack of priority in the case of the Lott Administration, Vargas' dream of making Brazil self-sufficient in the production of steel has been unfulfilled. Well, it shall not be left in such a state, for the Kubitschek administration shall finish the job!"
 BRA_give_the_devils_their_due: "Give the Devils Their Due"
 BRA_give_the_devils_their_due_desc: "Even though he is one of the reasons behind their own success, Brazil's Industrial Oligarchs were never fond of old man Vargas. They have always used their made-up Boogie Man of "Syndicalist Revolution" and "Fascist Statism" to smear any Varguist Economic proposal or any proposal of State intervention in the economy in general. It is the aim of the Kubitschek Administration to not let that dirty trick interfere with the fulfillment of Vargas' Dream any longer. Thus, although it might anger his left-wing allies in the PTB, President Kubitschek has decided that every new venture in the realm of steel made by his admiration shall be made under the umbrella of a public market nature, thus future projects like the Volta Redonda steel mill shall be semi-public companies. For better or for worst the CNI shall have their due."
 BRA_expand_vales_operations: "Expand VALE's Operations"
 BRA_expand_vales_operations_desc: "Science dictates that Steel is an alloy made up of iron. Thus if Vargas' Dream of making Brazil self-sufficient in Steel production, then the Extraction and mining of Iron must be Increased and be seen as a matter of priority. To meet that need in the last years of his Regime Vargas created the Vale do Rio Doce Company, a Government Owned Mining Company focused on the operations of mines in the Brazilian State of Minas Gerais. However, if the Kubitschek Administration is to fulfill Vargas' Dream then Vale's Mining operations must be expanded and intensified. Thankfully Brazil perhaps can boast of one of the largest Iron mineral reserves in the world, so achieving that objective should be rather easy for President Kubitschek. As always "Where there is a will there is a Way"!"
 BRA_incentivize_steel_production: "Incentivize Steel Production"
 BRA_incentivize_steel_production_desc: "Unlike what liberal economists might think a vast and solid Industrial Complex doesn't just sprout from the ground like a grass due to just a little Sun and Rain, it needs direct intervention to make the environment of a country so it can be built. Thus concise state intervention is needed for any country to properly develop an industry. Thus following this principle the Kubitschek Administration shall instate measures such as fiscal incentives so as to prop up Brazil's Steel Production. Taxes will be cut and stimulus shall be created, no measure shall be spared. The Brazilian State alongside its Private Sector Partners, both foreign and domestic, shall Achieve Vargas' Dream, no matter the cost!"
 BRA_fulfill_the_old_mans_dream: "Fulfill the Old Man's Dream"
 BRA_fulfill_the_old_mans_dream_desc: ""Mãos à obra!" All preparations are done, and the stage is now set, so let the work begin! The Kubitschek Administration has made all the preparations and negotiations necessary for the final fulfillment of Vargas' ideal of making Brazil Self -Sufficient in Steel Production. So there is nothing left but the actual planning and the building of new Steel Mill complexes throughout Minas Gerais and the rest of Brazil. Although Vargas' own PTB may disagree President Kubitschek feels there is no way to achieve it than by making said new Steel Mill complexes Semi-Public companies, with the government as the primary stakeholder. But nonetheless, Vargas' Dream will finally be Achieved, and Brazil shall become not only self-sufficient in steel, but the biggest steel producer on the face of the earth. It is time that Old Man Vargas' Dream became Reality!"

 BRA_begin_the_brazilianization: "Begin the Brazilianization"
 BRA_begin_the_brazilianization_desc: "During the last decade, the PSD has managed to finish Vargas' Job of giving Brazil a solid Heavy Industrial complex, however, President Kubitschek knows that this is not enough, and if he truly wants to make the Brazilian economy strong and competitive then he must take different measures than his first administration.\n\nLike his first administration, President Kubitschek shall invite foreign magnates to Brazil so they can expand their manufacturing operations here however unlike his first administration the establishment of new rules shall make this new Manufacturing Complex truly Brazilian. They shall be forced to play by Brazilian rules whether they like it or not. And who better to invite to Brazil than the Mega Corporations of the Far East? They are still suffering from the effects of the Yasuda Crisis, so wouldn't it be nice if JK landed them a hand?"
 BRA_court_the_dragons: "Court the Dragons"
 BRA_court_the_dragons_desc: "An unfortunate truth must be accepted: The West as we knew it is dead, with the victory of the Nazis in Europe and the defeat of the Americans in the Pacific, the West as we knew it is dead, it has ended a long period of Economic and technological decadence that for now seems to have no end. Thus if the Kubitschek Administration wishes to achieve its objective of creating a solid Manufacturing sector in Brazil, then it must look towards the Rising Sun in the East. The Zaibatsu Tech Giants of Japan and Guangdong, hold the secrets and the knowledge of where current technology is going. Thus it has become JK's duty to invite them to Brazil, for with them shall come to Modernity and Progress!"
 BRA_finance_the_moguls: "Finance the Moguls"
 BRA_finance_the_moguls_desc: "From IG Farben and Krupp in the Reich to Yasuda and Fujitsu in the Far East, one of the key aspects of the Industrial Giants of the modern world is their National Corporations that have become giants in their own right, and have enlarged their respective country's economies and prestige by their own dominance in the Global Market. Thus with the help of the Kubitschek Administration, the BNDES, and the partnership of the Japanese Zaibatsus, Brazil shall also have its own National Champions.\n\nThese Local Industrial Mega-Corporations who are partnering with the Japanese Zaibatsu, have been colloquially called by both economists and the press the "Moguls", and it's one of President Kubitschek's personal objectives to make sure that the Moguls become the biggest and most important corporations in South America, thus his administration shall give them all the help and advantages they need, economic and political, no matter the cost."
 BRA_a_quid_pro_quo: "A Quid Pro Quo"
 BRA_a_quid_pro_quo_desc: "Nothing comes free; there is no bigger truth in both Life and Capitalism. No one can expect something for nothing, especially if that something comes from the hand of some of the most powerful Mega-Corporations on this planet. The Kubitschek Administration's agreement with the Japanese Zaibatsus is almost complete; however, there are still some demands to be met.\n\nThe terms they have set upon the table are the following: They are willing to agree to accept the Brazilian government's Demands, primarily amongst those that employ a 50% to 60% Brazilian workforce, in exchange that they are to be made exempt from some key Brazilian Labor Regulations. Although this agreement may anger President Kubitschek's PTB allies, JK personally feels that this is a fair price to pay for Progress."
 BRA_sharing_is_caring: "Sharing is Caring"
 BRA_sharing_is_caring_desc: ""Scientia potentia est"," Knowledge is power" is a very well-known truism, it is also an undoubtedly verified fact when it comes to life and more importantly when it comes to matters of Industry. Suppose a country wishes to maintain itself as an industrial giant. In that case, it must always keep its key scientific and industrial Knowledge up to date with the current expectations of the time. Unfortunately, this is a hard task in developing countries like Brazil due to the lack of specialists and equipment. Thus as a condition for their privileged establishment in Brazil, the Japanese Zaibatsus shall be forced to share all special machinery, technical knowledge, and RnD with their local "Mogul" partners. After all Knowledge by nature is made to be shared."
 BRA_scientific_exchange_programs: "Scientific Exchange Programs"
 BRA_scientific_exchange_programs_desc: "It is well known that Rome wasn't built in a day, and in a similar fashion that Industry doesn't simply sprout from the ground, they arise through much care and thought, and more specifically through Scientific Research and Development, "RnD" for short. Brazil due to its failure both in the Economic realm and Educational realm, Brazil is also a nation that lacks in the realms of Industrial Research and Development. Thus the Kubitschek Administration has come to a solution, in partnership with the Japanese Zaibatsus to receive Brazilian technical and engineering students to travel to either Japan or Guangdong to participate in technical training programs alongside Research Scholarship's to Japanese Universities, with the idea of them bringing back their knowledge home, thus Improving both Brazil's Industry and research capabilities. Nothing more Brazilian than copying someone else's homework, "Malandragem Pura"."
 BRA_found_the_init: "Found the INIT"
 BRA_found_the_init_desc: "The Kubitschek Administration may feel assured that its efforts in the " Brazilianization" of Brazil's industry, and the transformation into a Manufacturing center of noticeable size, however, these efforts may be considered to an extent, only Brazil catching up with more modern countries. If President Kubitschek is to really achieve his goal of making Brazil into the Greatest Manufacturing Power in the Southern Hemisphere, catching up isn't enough. Brazil must find a way to also keep up and even surpass its rivals technologically.\n\nThus the Kubitschek Administration has devised the creation of the INITI "Instituto Nacional de Investigação Tecnológica Industrial" (National Institute for Industrial Technological Research), a Semi-Public Scientific Investigation Company linked to the Brazilian Education and Economy Ministries, with the objective of aiding in the research and development of new technologies that shall put Brazil ahead of all its rivals."
 BRA_finance_the_nissan_gurgel_x12: "Finance the X12"
 BRA_finance_the_nissan_gurgel_x12_desc: "From Volkswagen in the Greater German Reich to Ford in the United States, in our modern world where vast asphalt highways cross our distant plains, there is no bigger mark of a Manufacturing Industrial Giant than its own national Automobile Company. Thus with the Zaibatsu's firmly established in Brazil, and the new "Mogul" conglomerates now a solid aspect of the Brazilian reality and economic life, The Kubitschek Government has decided to finance and with the aid of the INITI coordinate the project of the first 100% Brazilian Car, the Nissan-Gurgel X10. This, the First Automobile by Brazilians, shall be the perfect product to aid Brazil in its objective of the domination of the South American markets. For it has been made not only for domestic markets but for the regional market as well. The X10 shall drive Brazil on the road towards Prosperity and Progress!"
 BRA_build_the_fujitsu_gradiente_m1: "Build the Gradiente"
 BRA_build_the_fujitsu_gradiente_m1_desc: "Placeholder"

