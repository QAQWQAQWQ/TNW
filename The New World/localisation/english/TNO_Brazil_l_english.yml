 BRA_military_hardliners_name: "£BRA_hardliners_texticon §gHARDLINERS§!"
 BRA_military_hardliners_power: "§g[?BRA_military_hardliners_power|0]§!"
 BRA_military_hardliners_tt: "£BRA_hardliners_texticon §gHardliners§!§F\n--------------\n\n\n\n\n\n\n[GetHardlinerLeader]\n--------------\nKnown as "Goosesteppers" to their detractors, the Hardliners are the most antagonistic faction to Brazilian democracy. The group has existed for decades, held together by their common ambition. Many of those that forced Vargas from power were Hardliners, the same officers and generals who aimed to take power in the failed 1955 coup. As long as the Hardliners are promised wealth and power, they will remain loyal, but they won't ever be sated for long."
 costa_hard_leader: "£GFX_Artur_Silva_texticon\n\n\n\n\n\n\n\n\nArmy General Artur da Costa e Silva"
 medici_hard_leader: "£GFX_Emilio_Medici_texticon\n\n\n\n\n\n\n\n\nArmy General Emílio Garrastazu Médici"

 BRA_military_sorbonne_name: "£BRA_sorbonne_texticon §QSORBONNE§!"
 BRA_military_sorbonne_power: "§Q[?BRA_military_sorbonne_power|0]§!"
 BRA_military_sorbonne_tt: "£BRA_sorbonne_texticon §QSorbonne§!§F\n--------------\n\n\n\n\n\n\n[GetSorbonneLeader]\n--------------\nThe Sorbonne are the so-called moderates of the Brazilian military, favoring the status quo. The primary concern of the Sorbonne is ensuring a stable Brazil that ensures their checks come in on time and they can retire with a sizable pension. While they may lack the ambition of the Hardliners and the ideological devotion of the Constitutionalists, what the Sorbonne do have is pragmatism."
 branco_sorb_leader: "£GFX_Castello_Branco_texticon\n\n\n\n\n\n\n\n\nGeneral Humberto de Alencar Castelo Branco"
 ernesto_sorb_leader: "£GFX_Ernesto_Geisel_texticon\n\n\n\n\n\n\n\n\nArmy General Ernesto Beckmann Geisel"

 BRA_military_constitutionalists_name: "£BRA_constitutionalists_texticon §KCONSTITUTIONALISTS§!"
 BRA_military_constitutionalists_power: "§K[?BRA_military_const_power|0]§!"
 BRA_military_constitutionalists_tt: "£BRA_constitutionalists_texticon §KConstitutionalists§!§F\n--------------\n\n\n\n\n\n\n[GetConstitutionalistLeader]\n--------------\nFounded by Marshal Lott during the attempted coup of 1955, the Constitutionalists support the continuation of the Fourth Republic and democracy, no matter its leader. The Constitutionalists aim to quell any suggestion of a military solution to Brazil's woes, and will shield the President to intervention to the best of their abilities."
 denys_const_leader: "£GFX_Odilio_Denys_texticon\n\n\n\n\n\n\n\n\nMarshal Odílio Denys"
 peri_const_leader: "£GFX_Peri_Constant_Bevilacqua_texticon\n\n\n\n\n\n\n\n\nArmy General Peri Constant Bevilacqua"
 argi_leader: "£GFX_Argemiro_de_Assis_Brasil_texticon\n\n\n\n\n\n\n\n\nBrigadier General Argemiro de Assis Brasil"

 BRA_military_progressistas_name: "£BRA_psp_texticon §hPROGRESSISTAS§!"
 BRA_military_progressistas_power: "§h[?BRA_military_progressistas_power|0]§!"
 BRA_military_progressistas_tt: "£BRA_psp_texticon §hProgressistas§!§F\n--------------\n\n\n\n\n\n\n[GetProgLeader]\n--------------\nIn truth, the only thing that unites the so-called Progressistas is money. Bound together by a chain of favors, gifts, and promises forged by President Adhemar de Barros, the Progressistas are loyal to country first and the PSP a close second. Loyalty is a fickle thing, however - if the patronage which the Progressistas depend on was to end, the faction might disappear with it."
 kruel_prog_leader: "£GFX_Amaury_Kruel_texticon\n\n\n\n\n\n\n\n\nArmy General Amaury Kruel"
 frota_prog_leader: "£GFX_Silvio_Frota_texticon\n\n\n\n\n\n\n\n\nBrigadier General Sílvio Couto Coelho da Frota"

