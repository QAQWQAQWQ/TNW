 ## Kubitschek Goals Plan
 BRA_kubitschek_goals_plan_category: "The 2º Programa de Metas"
 BRA_kubitschek_goals_plan_info: "The §Y2º Programa de Metas§! represents Kubitschek's ambitious development goals for Brazil, carrying on where his first term left off.\n\nHand-picked from the upper echelons of government and the private sector by Kubitschek at the beginning of each year, the advisors of the §YConselho do Desenvolvimento§! shape the administration's approach to the §G£BRA_JK_development_texticon Development§!, §G§G£BRA_JK_infrastructure_texticon Infrastructure§!, £BRA_JK_energy_texticon Energy§!, §G£BRA_JK_education_texticon Education§!, and §G£BRA_JK_healthcare_texticon Healthcare§! targets which are also drafted in January.\n\nEbullient and determined, Kubitchek relies on the §YOptimism§! of the £BRA_JK_people_texticon §YPeople§!, £BRA_JK_business_texticon §YBusiness§!, and £BRA_JK_creditors_texticon §YForeign Creditors§! to achieve his vision. Setting ambitious yearly targets will encourage this §YOptimism§!, even moreso when they are met. If Kubitschek's government fails to deliver, however, the §YOptimism§! and national unity he relies on will fade."
