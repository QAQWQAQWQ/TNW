 ## Leader Descriptions
 POLITICS_JANIO_QUADROS_DESC: "Known as "The Man Who Swept Brazil," Jânio Quadros is a unique figure within the Brazilian political system and has reached heights that many said he would never achieve. Born in Mato Grosso but raised in Curitiba, he would later move to São Paulo and study Law. Quadros entered politics in 1947, a man who disliked the Estado Novo regime for its growing authoritarianism, deciding to dedicate himself against it. With the collapse of the Estado Novo in 1949, Quadros was ecstatic believing that he himself had delivered a major blow to the regime and it deepened his passion for politics.\n\nHe would continue his career in politics, becoming a well known anti-corruption crusader who claimed to fight against corruption in all forms in Brazil. While he won the mayorship of São Paulo, he lost the governorship race by one percentage vote against Adhemar de Barros. However, this did not stop him and he declared he would persevere and sweep away corruption with a broom.\n\nIn 1960 he ran for the Vice Presidency of Brazil on a combined ticket of many political parties, including the PTN, UDN and PDC, plus other minor ones. In this election, Quadros outperformed his presidential running mate and reached the heights of the Vice-Presidency. Had it not been for the man to win the Presidency, Henrique Teixeira Lott, Quadros would have probably been able to have his way in pursuing whatever path he felt like pursuing, but instead he finds himself every day in a constant tug-of-war with Lott for domination over the other, which had prevented him from enacting most of his promises.\n\nHowever this has changed now he has become President and now has the political power to enact what he wants. He has maintained his exhibitionist, dramatic and demagogic ways, annoying many who say Quadros will, in the end, fail to implement his plans. But he continues, ever stubbornly, to say that he will erradicate the corruption of the Brazilian State or die trying..." #remind me to fix this after the teaser -oveja
 POLITICS_JANIO_QUADROS_QUISLING_DESC: "Jânio Quadros, no one's craven, fled São Paulo for Montevideo. Things were tolerable for a while, even with Lacerda, once Quadros' unwilling ally, went mad and authorized h the auto-genocidal madness proposed by the devil-worshiper João Paulo Burnier, turning the PARA-SAR fire rescuers into mass murdering psychopaths. Quadros, as a former vice-president whose criticisms of Lacerda grew ever more trenchant the more blood flooded the streets, was near the top of the list. He would've stayed and joined Kubitschek in death but listened to his wife and fled to Uruguay to preserve his life.\n\nJânio Quadros, always a man to get his own way, watched powerless as the Argentines occupied rightful Brazilian lands. He watched as brutish Hispanophone jackboots imposed arbitrary diktats on Quadros' compatriots in Rio Grande do Sul and its surroundings. He could not tolerate it, but could hardly come up with a solution. At last an old acquaintance of his in the Argentine diplomatic corps approached him with a terrible offer. After hitting his head against a wall for hours, he accepted.\n\nJânio Quadros, a devout nationalist par excellence, so much so that when Lott and him were still on speaking terms the Marshal used to rib him about being an ultramilitarist, now is a puppet President of the Argentines. The Argentines! Even the people under "his" "rule" know that this is against everything he is. They can tell he hates it, but what choice does he have? Someone has to be a bulwark against the madness of the jackboots and the Bolsheviks. Kubitschek could have pulled it off, but he is dead. Goulart is being tortured daily. Who knows where Lott is. What then is left to stand up for Brazil but a pair of skewed glasses and a broken broom?\n\nTormented by doubt, "President" Jânio da Silva Quadros questions every day if he could have avoided the devilry he is facing now. He begs to go back to 1962, but knows he cannot do so."
 POLITICS_TEIXEIRA_LOTT_DESC: "Henrique Teixeira Lott, the 22nd President of Brazil is in his heart still a military man. Lott developed his military career over the span of four decades. Not through nepotistic appointments, but using skill.\n\nWith the entry of Brazil into the Second World War, Lott was sent as a military attaché to America. However, history would force Lott deeper into the war. With the German invasion of Britain, Lott would work closely with Field Marshal Mascarenhas de Morais in commanding the Brazilian Expeditionary Force. Yet despite their best efforts, the island would fall and Brazil was forced to retreat. Lott would be promoted for his efforts, becoming a Brigadier General, and praised as a war hero. Lott worked on plans to defend Brazil from outside invasion, maintaining his ties to the Americans. As the Estado Novo regime fell in 1949, Lott would be one of those standing among Vargas' close circle of advisers. Deciding to act instead of going with his arms crossed, Lott proved instrumental in reaching an agreement that guaranteed elections would be held and Vargas was unharmed. He was personally involved in making sure that this agreement was maintained as he warned radical members of the military to allow the transition of power to occur.\n\nLott would be the minister of war throughout the fifties for both Eduardo Gomes and Juscelino Kubitschek's government. Lott, known for his dedication, stopped a coup attempt in 1955 ensuring that Brazilian democracy would survive and prosper. In 1960 Lott himself ran for the presidency, winning under the banner of the PSD. Lott now leads the largest nation in South America, however, Lott is still a General at heart, not a politician. Issues that plague Brazil, such as rampant inflation, he has been unable to deal with effectively. This combined with the fact that Jânio Quadros won the Vice-Presidency, a man with very different ideas for Brazil than Lott, turns governing into a challenge just as big as the wars that Lott fought in."
 POLITICS_TEIXEIRA_LOTT_POST_COUP_DESC: "In 1949, when then-President Vargas escaped to São Paulo, it was Lott who negotiated for his safety. In 1955, when the fascists and the UDN attempted to bring JK out of power, it was Lott who routed these forces. Now for a third time, the UDN and their goons have attempted to strike democracy with corruption charges against Lott and the Trans-Amazonian railway; and for a third time, Lott has stood tall against them, once again sending them running to lick their wounds and proving his title of "Defender of Democracy."\n\nAs his popular support hits an all-time high, with the Lobster War dealt with and the enemies of democracy bested once again, Lott prepares himself for his final and most important fight: the fight for democracy, to strengthen it and to make sure it remains alive, with the legalists as their shield.\n\nThis fight will be hard, but Lott led Brazil against the Nazis and won, the old Marshal is confident he can take on this final challenge. If he can do it, perhaps Brazil can have hope for a better tomorrow without the fear of dictatorships ever again."
 POLITICS_JOAO_GOULART_DESC: "João Goulart knows the political establishment dislikes him, but he doesn't care. Born in the rural south, Goulart became a skilled businessman and gained a passion for swimming and football. Goulart almost didn't enter politics, considering a career in football. This dream was shattered due to Goulart's bohemian lifestyle and catching syphilis, causing paralysis in his left knee that never healed. Goulart entered a depression, where he lacked a vision for what he would do. Seeing how the poor were treated throughout Brazil, he decided that he would fix this.\n\nGoulart thrust himself into politics, meeting with Vargas himself and joining the PTB. He used his personal wealth to support his political ambitions and ran for the Chamber of Deputies and gained a seat. During his campaigning, he met two important figures. Leonel Brizola a key political ally and a good friend, and his future wife Maria Thereza. With Brizola, each rose rapidly in the PTB and took control of it.\n\nWhen Kubitschek approached the PTB for a political alliance in the 55 elections and Goulart to be his running mate, Goulart accepted. With the victory, the PTB's influence and power grew. Goulart ran with Henrique Lott for the '60 elections, but was stopped by Jânio Quadros who narrowly won the election for Vice President. After a brief depressive period, Maria convinced Goulart to run in the Chamber of Deputies, where he would win the election and become its leader.\n\nGoulart's career has reached its inevitable end, the presidency. His drive and ambition has not stopped and he has remained a humble man, wanting to aid the poor. With Brizola, Edna Lott and others by his side, Goulart aims to build a better Brazil for all Brazilian's. However enemies are everywhere and they wish to destroy Goulart, but Goulart knows that he can not fail. For the good of Brazil and the good of the poor, he must not fail."
 POLITICS_JOAO_GOULART_PUNISHED_DESC: "For a man with a lame leg, most paths in his life had been tortuous, this had been no different with João Goulart's political path. After the hardships that naturally came with being the direct political successor to Getúlio Vargas himself, came one if not the most turbulent electoral process in Brazilian history, which finally culminated in a disastrous coup attempt. But just like in his life, although the path was treacherous and with many hardships, Jango reached his destination.\n\nLacerda and his lackeys foolishly believed that they could successfully overturn the will of the people and their lawful mandate to keep the privileges of their oligarchic benefactors intact. They thought wrong. The people stood defiant and strong in defense of their constitutional rights and their political will. Now with the UDN's quixotic farse defeated, the Crow has had to fly into exile in search of better pastures and perhaps more insidious benefactors. Once again, like always, eternally defeated.\n\nWith the ordeal now finished. There is still long and arduous work to be done. For more than 3 decades Brazil has embarked on the greatest economic transformation in its history, a transformation that can be said is finally putting it amongst the great powers of the world. However, it's finally time for the Brazilian people to reap benefits from this economic progress. For that many reforms in most aspects of society must be made. And they shall be made whatever they might cost, and whether the oligarchy likes it or not. For now, the solemn fact now stands and remains:\n\nJango is Brazil's President."
 POLITICS_HUMBERTO_CASTELO_BRANCO_DESC: "What goes through the mind of a man who has betrayed an oath? Does he feel guilt or does he justify it? For Castelo Branco the answer is both. Born to a rich army family, it was only natural that he would eventually join the army as well, enrolling in 1918. A skilled soldier shown by him placing first in his class of the General staff school, Humberto rose through the ranks gaining promotions due to skill not nepotism.\n\nDuring the Second World War, Humberto was part of the Brazilian expeditionary force and was involved in the British campaign and he showed his ability in commanding and planning. But skill wasn't enough and Brazil would be defeated and forced to retreat. This is what created a sense of disdain for fascism in Humberto's eyes, too many good Brazilian soldiers had died to fascism. With an already deep dislike of communism, Humberto would fight against both when he returned home.\n\nWith the birth of the fourth republic, Humberto worked with Lott in the early part of the republic, supporting his efforts to ensure the inauguration of Kubitschek took place. It would only be later when Lott was being hailed by communists and perfidious trade unionists as a savior, that Humberto turned against the President. His leadership of the Sorbonne faction drove a deeper wedge between the two, and their relationship would be destroyed by leading the military coup after the 100 days of chaos."
 POLITICS_ADHEMAR_DE_BARROS_DESC: "Adhemar de Barros is a politician of contradictions, a populist that uses left-wing language but gets along with elites. A man who can connect with the working class but is highly educated and rich. A playful populist but a great planner. Adhemar is not a man whose ideology can be fit into one box, thus he is called an 'Adhemarist' a man whose only ideology is what is best for Adhemar.\n\nBorn in a family of traditional coffee farmers, Adhemar quickly rose. Graduating with a degree of medicine in 1923. He traveled to Europe and America becoming an aviator and learning multiple languages. He stopped practicing after the constitutionalist revolution of 1932 where he fought for his state, when his state lost he traveled to Paraguay and fought with them as a doctor in the Chaco War. He would return to Brazil and became a state deputy in São Paulo, until Vargas instituted his Estado Novo regime and closed the legislative houses down.\n\nHowever this was not the end of his political career; Adhemar became an intervener in São Paulo and helped govern the state. From this point on, São Paulo's and Adhemar's destinies were tied as Adhemar advanced his career in São Paulo. He has been governor of the state three times and when he hasn't, his political control of the state has still been strong. He has also run for the Presidency twice before, in 1955 and 60, each attempt gaining more than the last, and now Adhemar has succeeded; he is President.\n\nAllegations of corruption, nepotism, bribery and other crimes can sink other politicians. Adhemar has had hundreds of accusations but none have sunk them. In fact he has turned them into a weapon against his critics. Yes he may steal, but he delivers. He has bet that the people of Brazil want someone corrupt who does work rather than one who does nothing. So far he has been right."
 POLITICS_OLD_ADHEMAR_DESC: "When a man looks death straight in the eye and comes back with his life, it changes him. Before the coma, Adhemar de Barros considered himself invincible. Powerful, popular, and about to bring Brazil into a new golden age. But he is not that man anymore. Whilst he has miraculously awoken from his slumber, the battle with death that only Adhemar was there to witness has left him scarred.\n\nWhere once he toured the country from state to state making bombastic speeches, he now shuffles quietly from room to room, allowing his advisors to put policy into place in his stead. While he used to stay awake until the late hours of the night entertaining the best and brightest of Brazil's elite, now he slips into dreamless sleep at the slightest moment of relaxation. He can no longer walk without a cane. His figure is withered, his hands cannot write without shaking, and his voice is dimmed to a hoarse whisper. Like a candle about to be snuffed out, his physical body has been lessened.\n\nBut his inner fire still burns brightly.\n\nAs a man who has stolen and cheated his entire life, Adhemar knows that even he can only cheat death once. The President lives on borrowed time - time that he intends to spend wisely. For he has yet to deliver Brazil his greatest gift of all - a legacy to be proud of."
 POLITICS_CARLOS_LACERDA_DESC: "If someone had told Carlos Lacerda in 1940 where he would be in 20 years, he would have called them a lying fascist. Despite this, Lacerda would eventually become what he once hated most, a conservative. The child of left-wingers, Lacerda too was a communist in his youth and early adulthood. He turned against the idea after Germany destroyed the Soviet Union, blaming the ideology of communism for the victory of the Germans in the Second World War. This disillusionment caused Lacerda to search for an ideology that would give Brazil a strong foundation, settling on social conservatism and economic liberalism.\n\nFollowing the war, he became one of Vargas' arch-nemesis and founded the newspaper Tribuna da Imprensa to criticize his presidency. Eventually, Lacerda became known as the anti-Getúlio and was one of the main factors for the fall of the Vargas government, whereupon the failed assassination attempt on his life ushered in the end of the Estado Novo.\n\nLacerda became a strong supporter of Eduardo Gomes and joined the UDN, seeing this as the party that would build a stronger Brazil. The victory of the Kubitschek/Goulart ticket in 1955 was a direct threat to the future of Brazil for Lacerda. He joined the plot of '55 in order to prevent their inauguration. While this failed and he was let go with a slap on the wrist, Lacerda continued to scheme and was a fierce opponent of Kubitschek, Goulart, and then Lott, working with Quadros and Adhemar in alliances of convenience to attack their enemies.\n\nThe position of Governor of Guanabara was merely a stepping stone to his actual ambition which he has fulfilled, the presidency of Brazil. With this position, Lacerda will not fail as his predecessors have; he will create a strong Brazil, free of totalitarianism, or he will die trying."
 POLITICS_LAUDO_NATEL_DESC: "Laudo Natel wishes he could go back to saner days. Instead, he lives in interesting times.\n\nThe Partido Social Progressista in power is a different beast to what it was when he joined it. A party that Laudo Natel had been perfectly satisfied to support at first later has become more and more a source of frustration and mistrust as Natel was forced to clean up its messes. Then Adhemar has proven himself to be... not as trustworthy as Laudo would've wanted.\n\nBut now it is do or die—succeed or fail. If now Adhemar sinks, and the PSP loses power, they could all potentially fall into the abyss. Benjamin Franklin spoke rightly: "we must all hang together 'lest we all hang separately." For now, they stay together; after the crisis, on the other hand, Natel can force the PSP and its government to reckon with their past mistakes."
 POLITICS_PEDRO_ALEIXO_DESC: "There has been only one concern for Pedro Aleixo in this entire mess, and that is keeping the Brazilian country united.\n\nAleixo is sure that there are many that would rather the country be under military rule, or the puppet of the Hitlerites or the Americans, or subject to an insurrection of one kind or another—but provisional President Pedro Aleixo will stand in their way to the best of his strength. Had things been different, it would have been Edna Lott in charge, and Aleixo could've gone about his usual business. Alas, she was rusticated, and now the duty that might have been hers is his.\n\nIt helps nothing that the PSP, that band of populists and showmen, are often difficult to work with. But he has to bear that prospect, lest the government be crippled—though he cannot give up too much lest the PSP get away with rigging the election and giving Vargas Filho an advantage. Had it been before an Adhemar presidency, that too would have been easier: but they've made corruption explode all across the nation, rendering honest work difficult.\n\nAll this matters little, however: President Pedro Aleixo has one job, to preserve Brazil, and he will do it muttering prayers under his breath till he can leave the Presidential Palace and go home."
 POLITICS_CARLOS_LACERDA_IMPERIAL_DESC: "Embedded in the dark depths of every man's psyche; there lies an antithesis. An antithesis to every thought, every action committed onto life itself would have that eternal feeling of remorse for it. The idea that there could have been a different option chosen, and how much better it could have been for you. Yet, as Carlos Lacerda takes his seat, on the world stage, as the new leader of the Latin Colossus, there is no remorse. No dark thoughts of anxiety, no bleak ruminations of fear and no antithesis to what he has done. Why would a man regret saving his country?\n\nGoulart was a snake, hidden among the vines, seething and hissing. It did and does not matter how Goulart had snatched victory from him, that Socialist had surrendered democracy to the iron-clad cruelty of the Communists. Perhaps Jango did not know that he was a puppet dancing on red strings, twirling and spinning to their melody of terror and fear. Perhaps he did. Either way, only Carlos Lacerda knew what had to be done. Only Carlos Lacerda could revive Brazil. Only Carlos Lacerda could divine water from the dry, desolate grasslands of Brazilian politics.\n\nGoulart is gone, cast to the winds. With him, the groaning cadavers of populism and corruption breathe their last. Lacerda's enemies can lambast him with as many trumped-up charges however they like. They will not be in the history books."
 POLITICS_CARLOS_LACERDA_IMPERIAL_FUCKED_DESC: "Carlos Frederico Werneck de Lacerda thought himself to be a Saint George slaying the dragon of "Getulism" and communism. But his follies have taken him from one mythology into another and saddled him with the role of an Icarus or a King Lear come again.\n\nLacerda thought he was reaching new heights, but instead plumbed new depths. He thought he was giving Brazil a new birth as if in a baptismal font - he intended to purify the sins of the past and ready his homeland to face the darkness that surrounded it. But instead he scorched his nation in that very same darkness, repeated the mistakes of the past, and plunged his nation into a chaos from which it cannot emerge unharmed.\n\nThat singular blunder wasn't enough, was it now? Lacerda just had to doom himself and his homeland too! In a moment of desperate fury the flailing President permitted brutish João Paulo Burnier to turn a fire-rescue organisation into a death squad. With a signature and an insouciant wave of a hand Lacerda authorized a rogue general to commit mass murder against his own people in the very province of which Lacerda himself was once governor.\n\nWhen the coming conflict ends, who cares whether a communist or a general or even an Argentine comes in and is forced, like Fortinbras, to behold a realm littered with corpses? Brazil will be scarred forevermore, Rio will reek of innocent blood forevermore, and Carlos Lacerda will be damned forevermore.\n\n§xHe knows that too.§!"
 POLITICS_CARLOS_LACERDA_1970_DESC: "They thought that the former Governor of Guanabara was out for the count after his defeat in 1965. Somehow or another, they said, Carlos Lacerda managed to ruin what should have been a resounding victory into an avoidable failure. His career was over, people had thought - yet by some freakish miracle, now President Carlos Frederico Werneck de Lacerda has turned that conventional wisdom into abject folly.\n\nEarly in his life, Lacerda was a left-winger; by the time he attained anything resembling high office, however, he was a conservative in a similar tradition to the likes of Richard Nixon. A prominent newspaperman and the Governor of Guanabara - the state including Rio de Janeiro and its outskirts - he catapulted himself into the political scene in the 50s, when he helped force Vargas out of power. For twenty years he tried and failed to break out above the rank of governor; but now, at the time Brazil needs him most, he has been placed in the perfect position to provide for her.\n\nThe country is in turmoil; the Oil Crisis has hit and caused the stagnation of the once-booming Brazilian economy. Unless urgent action is taken, a recession will be the least of Brazil's concerns. Yet the new President is unshaken; he is confident that he has the willpower and the solutions to defeat every crisis that buffets Brazil.\n\nNow, five years late yet perfectly on time, is Carlos Lacerda's moment, and he will make it count."
 POLITICS_CARLOS_LACERDA_SUCCESS_DESC: "A fighter does not quit. He does not go home after a single day, content with a single polemic, happy with mediocrity. He fights until either the sound of trumpets or his dying breath.\n\nCarlos Lacerda is a fighter. He is not a man of half-measures like so many of his colleagues in the UDN, patting themselves on the back for being willing to compromise with the injustice of Varguism. Vargas, the man who tried to murder him, the man he outlived. That dictator thought his cancerous ideology could outlive — the same fascism that holds Europe captive. He was foolish.\n\nThe President has spent his time trampling corruption, strengthening healthcare and education, and empowering the military to protect Brazil from harm. However, his crowning achievement — the one he will be remembered for — is freeing the economy from the shackles of Varguism. Against it all, the leading light of conservatism triumphed, and a new age began for Brazil.\n\nVarguism is dead and buried, replaced by a new ideology, Lacerdaism. It stands for everything Vargas stood against. It represents all the men and women who otherwise would have been tortured in the dead dictator's era. But for Lacerda, it represents the best thing he could ever give to Brazil.\n\nFreedom."
 POLITICS_JUSCELINO_KUBITSCHEK_DESC: "The life of Kubitschek is what he describes as the dream of Brazil, to rise from a poor family to the Presidency itself. Raised by his mother, due to his father dying from tuberculosis while JK was two. JK would persevere, gaining an education and later becoming a licensed medical doctor. In 1930 he would travel around Europe, missing the events of the revolution that occurred in 1930 cementing Vargas' rise to power. Once news of this arrived, JK traveled back to Brazil and on his arrival asked his future wife, Sarah Kubitschek to marry him.\n\nKubitschek entered into politics in Minas Gerais and advanced quickly. He became known for his professional nature and his signature infrastructure and architecture programs. It would be during this time period where he had a child Marcia in 1943 and adopted another Maria in 1947. He also met the architect Oscar Niemeyer that he would cooperate closely with.\n\nAs the war ended JK supported Vargas to the very end being a key ally that Vargas could rely on. With the restoration of democracy, he decided to carry on Vargas' legacy and ran for the legislature in the PSD. He became a popular figure and was the PSD candidate for the 1955 elections. He negotiated with the PTB and João Goulart to run on a joint ticket and support each other. JK won a decisive victory and with Lott's help stopped an attempted coup.\n\nPresident Kubitschek focused on infrastructure programs and the construction of Brasília using the architect Oscar to design the city. He promised 50 years of progress in five and to the PSD and many Brazilians, he achieved it. Now President again, Kubitschek promises another decade of progress in a few years. However his ambition may be more than he can achieve within the few years he has, and certain business in Rio distracts him from the political sphere in Brasília."
 POLITICS_AURO_DE_MOURA_ANDRADE_DESC: "Auro Andrade, hated by the center, right and left due to his actions, but a political giant in his own right. The son of the King of Cattle Antônio, Auro first entered the political sphere in the Constitutionalist Revolt of 1932 and after continued it becoming an enemy of the Vargas government with his charismatic speeches and business connections. With Vargas' fall and the birth of the Fourth Republic, Auro ran for senator of São Paulo and has remained in the Senate since.\n\nWhen he woke up one day and saw a letter with the words "Be prepared" on it, Auro was ready for what was to come. What followed next was a shock to nearly everyone in Brazil but not to Auro, the resignation of Lott, and Auro working against both Quadros and Goulart to become President. An unprecedented act from a so-called moderate center of the Senate. But to Auro to allow either Quadros or Goulart to become President would be dooming Brazil to either incompetence or communism. Auro saw himself as the one man who could stop this and he did.\n\nAuro seized the moment and while Brazil has fallen into chaos, Auro believes that a better Brazil will be forged out of these fires. Or at least a Brazil where Quadros or Goulart are not President. Despite the hatred thrown at him, Auro continues his current actions. The Senate and nation is too divided to remove him, and soon they will be out of time to stop him."
 POLITICS_COSTA_E_SILVA_DESC: "A son of Portuguese immigrants, Artur da Costa e Silva's life is inseparable from his career in the Brazilian Army. An exemplary student in military school, he graduated with top marks and quickly rose in the ranks, becoming general in 1955, and was given command of the 3rd Military Region in the state of Rio Grande do Sul, later being promoted to the rank of marshal. While his life is inseparable from the military, it is also inseparable from his alignment with the Hardliner faction inside the Armed Forces.\n\nCosta e Silva became known as a fierce supporter of the Hardliners, and soon would be the main leader of this faction. He views the legacy of the previous democratic Presidents as one of failures and weaknesses, and only the strong hand of the Armed Forces can correct the country's course. While he initially joined Humberto Castelo Branco and the Sorbonne in the coup that ended civilian rule in Brazil, Humberto's desire to return power to the civilians was a sore point between the two, and the gap between Sorbonne and Hardliners widened. However, Castelo Branco overplayed his hand. In an attempt to fire Costa e Silva and solidify his control, his plan backfired, and through a series of telephone calls, Artur da Costa e Silva organized an internal coup, removing Castelo Branco from the Presidency.\n\nNow, with the presidential sash upon his shoulders, Costa e Silva is ready to defend his country against all threats, especially from terrorists and dissidents on both the left and the right. The Hardliner Marshal will do anything to correct mistakes done by the previous administrations and plans to extend security and stability across the country, aiming to mend the wounds Castelo Branco's cowardice left behind."
 POLITICS_COSTA_E_SILVA_DENYS_DESC: "A son of Portuguese immigrants, Artur da Costa e Silva's life is inseparable from his career in the Brazilian Army. An exemplary student in military school, he graduated with top marks and quickly rose in the ranks, becoming general in 1955, and was given command of the 3rd Military Region in the state of Rio Grande do Sul, later being promoted to the rank of marshal. While his life is inseparable from the military, it is also inseparable from his alignment with the Hardliner faction inside the Armed Forces.\n\nCosta e Silva became known as a fierce supporter of the Hardliners, and soon would be the main leader of this faction. He views the legacy of the previous democratic Presidents as one of failures and weaknesses, and only the strong hand of the Armed Forces can correct the country's course. While he initially joined Humberto Castelo Branco and the Sorbonne in the coup that ended civilian rule in Brazil, Humberto's desire to return power to the civilians was a sore point between the two, and the gap between Sorbonne and Hardliners widened. However, Castelo Branco overplayed his hand. In an attempt to fire Costa e Silva and solidify his control, his plan backfired, and through a series of telephone calls, Artur da Costa e Silva organized an internal coup, removing Castelo Branco from the Presidency.\n\nNow, with the presidential sash upon his shoulders, Costa e Silva is ready to defend his country against all threats, especially from terrorists and dissidents on both the left and the right. The Hardliner Marshal will do anything to correct mistakes done by the previous administrations and plans to extend security and stability across the country, aiming to mend the wounds Castelo Branco's cowardice left behind."
 POLITICS_ERNESTO_GEISEL_DESC: "The young Ernesto Beckmann Geisel was the son of a German immigrant, a son of one of only two German families in the city of Bento Gonçalves of Rio Grande do Sul. Entering the army in 1921 with his brother Orlando, he witnessed and participated in the most prominent events of Brazilian history - the Revolution of 30, the Estado Novo and its end, and at last the coup that toppled post-Vargas democratic governance.\n\nNow, Geisel finds himself at the top of the greasy pole that is the new, militarized, politics of Brazil; opposed by the hardliners, who view him as too soft, his support base is in the moderate faction of the military. It makes sense, to a point, that the likes of Frota would view him as too light on the opposition - he does, in fact, want to relax the dictatorship and assume a more moderate line with the opposition.\n\nBut contrary to the beliefs of the hardliners, the President is not of a sort to make concessions that will reduce the military's power. He will continue the previous developmentalist path set by the regime. More importantly, he is very firm in his desire to keep the military dictatorship in place, and more than willing to use force - whether that force is the Army, SNI, CENIMAR, or DOI-CODI - to make sure it stays there.\n\nHow Geisel will manage this while beleaguered by the hardliners in the military from the right and the democratic opposition from the left is anyone's guess. But only a fool will underestimate him, even when and if he is seemingly down for the count."
 POLITICS_RANIERI_MAZZILLI_DESC: "Brazilian democracy is dead. Its death was not an uncommon one - yet it remains bitterly tragic nonetheless. The military, sworn to protect that most sacred of institutions, turned its idle hands against its beloved patron, like Cain's betrayal of old. What shallow veneer of democracy that the military kept dissolved into pointless bickering and petty factionalism before being cast to the wind by the Generals. Dissolving the Senate is one thing, but leaving the state apparatus headless is another. So, who should be the esteemed President of Brazil?\n\nBorn to an Italian immigrant father in 1910, Ranieri Mazzilli lived in modest circumstances. Ascending the social ladder, from a simple tax collector to director of the National Public Treasury of Rio de Janeiro, his big break was yet to come. Chief of Staff to the Minister of Finance. The PSD's Federal Deputy to São Paulo. Not once, not twice but five different times. It was only inevitable that, in 1959, the invitation to assume the Vice Presidency of the Chamber of Deputies came to him.\n\nNormally the story would end there. A modest, hardworking man gets to a point of power, where he helps to govern efficiently and benevolently. Yet, fate is a cruel and caring mistress. With the military "intervention" and the collapse of the Senado, Mazzilli has been given the privilege of becoming the interim President. While the military decides amongst themselves who shall lead, Ranieri's job is to put out fires wherever they emerge. Now torn between party loyalty and national pride, Mazilli is a prisoner of his own patriotism."
 POLITICS_ODILIO_DENYS_DESC: "Duty. That has been the driving force behind every decision of Odílio Denys career. As a young officer, it was his sense of duty to the nation that led Denys to support Getúlio Vargas's rise to power. It was his sense of duty to democracy and the electoral process that led Denys to stand beside Henrique Lott in the latter's countercoup to ensure the ascension of President-elect Juscelino Kubitschek. It was his sense of duty that led Denys to ask his friend and fellow Marshal Lott to stop working with leftist Varguists and not to proceed with the Lott Act. And when Lott refused, Odílio Denys was compelled by duty to overthrow his former friend and restore order to the nation.\n\nThe plot against Lott has now succeeded and now Denys rules as President, backed by much of the military and the conservative political parties. Marshal Denys is still committed to democracy and elections have been scheduled to happen soon. Denys hopes that a candidate from an aligned right-wing party will succeed him but the growing sympathy among the people in the wake of his coup may put a stop to Denys' plan."
 POLITICS_BRAZILIAN_EMERGENCY_JUNTA_DESC: "In the wake of Costa e Silva's death, the nation did not have the liberty of time to ponder, and much less so to act accordingly. It was pertinent for the military to take the wheel and guide the interregnum, otherwise civilian men of the likes of Pedro Aleixo would cause a particular weakness for the military's grip on Brazil.\n\nThe Junta works on a basic principle; as a guiding hand for the nation during these times of strife, and as an interim while the military decides on an appropriate future candidate. The Junta is manned by those most able within the Armed Forces; with General of the Army Aurélio de Lira Tavares, General of the Air Force Márcio Melo, and Admiral of the Navy Augusto Rademaker.\n\nThough the Junta's control over the nation is only temporary, until the next candidate is chosen and its services no longer required. It is of the suspect of many that the candidate to be chosen will be as controversial as his predecessor, maintaining the authoritarian views of Silva and lead the nation to worse. Only time can truly tell."
 POLITICS_TANCREDO_NEVES_DESC: "One could define Tancredo Neves as the quintessential Brazilian 20th-century man. Born in 1910 in the interior of the Brazilian state of Minas Gerais. Tancredo first came to prominence as an exemplar law student, then a renowned practicing lawyer. He would enter politics in 1933 as a deputy in the Mineiro State Legislature. Although he was from the very beginning an ardent Vargas supporter, he would leave politics after Vargas' Self-Coup in 1937 and would go back to lawyering for most of the Estado Novo Regime.\n\nHe would later return to politics in the late 1940s at the behest of one of his political mentors and personal friend, Benedito Valadares, to become Vargas' last Justice Minister before the coup of 1949. After the return of democracy, he would become one of the key figures in the founding of the PSD, a Centrist leaning Varguist Party, in Minas Gerais. He would then work in the Gubernatorial Administration of his good friend Juscelino Kubitschek, helping in his efforts to modernize and industrialize his home state. He would later famously as one of the leaders of the Varguist opposition in congress vehemently speak out and advocate against the attempt by President Gomes to abolish the minimum wage.\n\nWith the eventual return of the Varguists to power in the presidential election of 1955, he would first work as a major economic advisor in the Kubitschek Administration and then as the Economic Minister of the Lott Administration. This has given him the status as the mind behind the immense industrial growth and economic development brought by the PSD administrations. So although the current Oil Crisis might seem a difficult task for any statesman to confront. Brazil may currently have the best possible man for the job."
 POLITICS_EDNA_LOTT_DESC: "Equity and justice are two of the founts upon which the Brazilian nation thrived. Now eroded by the greed of politicians and plutocratic interests, the only saving grace this corrupt order may receive is through the effort of the people—made for their needs and shaped by their voices. Edna Lott, daughter of former general-president Henrique Lott, has much to do before she may manifest such a lofty ideal into reality.\n\nA new but notable face to the political scene, Edna was a teacher of History and Geography, standing out as neither a businessman, military leader, or a careerist. Born to a father of the highest stature and a mother married to an engineer, the privilege she afforded allowed her to act according to her conscience, which she took to make way for a juster institution whenever possible. Taught to be a devout mother and daughter, she entered the Planalto as the woman who broke the glass ceiling. But ultimately, her utmost wish is to become the mother of the Brazilian people, whether the impoverished or the oppressed.\n\nA remarkably compassionate intellectual to all those less fortunate, Edna believes in a democratic order where all individuals may truly partake in the same capacity. Bearing the hallmark of being the first woman president, she shall work towards a Brazil humane to all her citizenry, irrespective of their origins — a country free from the chains and burdens of the past."
 POLITICS_LEONEL_BRIZOLA_DESC: "Some abhor Leonel Brizola, others venerate him, but what you will never find is someone who lacks any idea of his existence - for Brizola is one of the most famous and disproportionately influential politicians in the entire Republic of Brazil.\n\nA leader of the PTB since the 50s and the brother-by-marriage of João Goulart, Brizola, governor of Rio Grande do Sul from 1963 to 1967, and at times a federal senator, has had a major say in Brazilian politics since almost immediately upon entering the political arena. Some, in fact, credit him as being one of the main figures behind Brazil's success in not falling to another dictatorship after the departure of Vargas.\n\nAs governor in Porto Alegre, he implemented a labourist, left-wing nationalist program, earning him the nickname of "Werewolf" and significant name recognition. Leveraging that and his connections within the PTB, he has pushed his party to assume more radical stances.\n\nNow Vargas is out of the way, and Brizola has not only won the power struggle against moderates within the PTB, pushing the party to embrace a truly socialist vision, but has also entered the Palácio do Planalto as its tenant amidst the hitherto unheard-of chaos of the Oil Crisis. Brizola will do what he can to fix this, but he realizes that in chaos there is also opportunity. This crisis will be the best possible time for him to ensure his vision - which he believes to be the best if not the only way to bring Brazil into the 20th century - can be implemented not merely in the land of the Farrapos but throughout the whole of his beloved homeland."
 POLITICS_NEY_BRAGA_DESC: "Ney Braga's life has been inextricably linked to the military, a bond forged in his youth and solidified through his ascent to the rank of general. But to define him solely by his military service would be to ignore the complexities of the man. His tenure as Chief of Police of Paraná was not merely an administrative post; it was a crucible where he honed his skills, forged crucial connections, and laid the foundation for his future ambitions. The transition to politics was swift and decisive, his election as Mayor of Curitiba marking the beginning of a meteoric rise, an upward trajectory fueled by both shrewd calculation and undeniable ability.\n\nFrom there, he ascended to the position of federal deputy in 1958, further solidifying his political presence, until finally, in 1961, the people of Paraná entrusted him with the highest office in their state, electing him their governor. Like many of his military contemporaries, Braga holds a firm conviction in the transformative power of state-led infrastructure projects. In Paraná, he applied this belief with an almost zealous fervor, orchestrating an ambitious program of industrialization and development that reshaped the state into a modern economic powerhouse.\n\nNow, having reached the pinnacle of national power, the presidency, Braga envisions a Brazil that mirrors the dynamism and success of Paraná, a nation forged in its own strength, capable of charting its own destiny, a nation that will not be beholden to the whims of external forces."
 POLITICS_GETULIO_VARGAS_FILHO_DESC: "Fresh-faced and overwhelmingly charismatic in demeanor, the son of His Excellency Getúlio Dornelles Vargas has not strayed far from his father in tenacity or intellect, jumping into the fray of politics without many qualms. Valiant as an Amazonian warrior, Getulinho had known the career as a poisoned chalice—albeit one he is very willing to take on for the sake of society's greater good.\n\nOften referred to by journalists as the 'Brazilian Kennedy,' Getúlio Vargas Junior was adopted into the PSP by Adhemar, who hoped to leverage the illustrious family's reputation to his advantage. As Adhemar cultivated an energetic and robust image for the crown prince of the Establishment, the young Vargas has since become the face of PSP's next generation. Many cannot imagine the PSP without the archetypical Paulista's face plastered all over its name—and so had the old master made his chosen successor a man who can exceed himself in fame, yet ever so similar in ideals.\n\nWhile bringing a semblance of youthfulness to a party of career politicians is no easy task, running on a populist platform, Vargas Junior still made many promises, from improving basic livelihood to pursuing self-sufficiency. Ultimately, however, his trump card does not lie in baseless populism but rather in reliable pragmatism and the occasional dirty tricks, something he had learned from the old Vargas well. Through the rougher times when he was climbing up the political ladder, Getulinho has taken to heart the reliable mantra that when words don't work, daggers tend to do the job."
 POLITICS_EMILIO_MEDICI_DESC: "The new President's family name of Médici surely seems at least vaguely familiar to anyone with a little bit of literacy on the politics of the Renaissance as the name of the redoubtable rulers of Florence. Now, yet another Médici, a man with the well-deserved nickname of 'Duke of Lead', has arisen in Brazil.\n\nA child of immigrants born in Rio Grande do Sul, Emílio Garrastazu Médici quickly entered the military. Joining the cavalry, he supported the rise of Vargas in the Revolution of '30 and fought against the Constitutionalist Revolution. Though he did not fight in the British Isles during the War he slowly rose through the ranks due to service as Costa e Silva's chief of staff.\n\nDuring the coup, his sympathies were very clear, though he did not join it; when the coup succeeded, he became an ardent supporter of the military government. Becoming the head of the brutal SNI and then commanding the III Army headquartered in his home state, he continued to rise as his superior President Costa e Silva aged.\n\nNow Costa e Silva is dead. The junta has appointed Médici in hopes of preserving stability, but they are fools to think that the brutish head of the SNI would do any such thing. No: on his watch Brazil has fallen into its darkest period yet. Unprecedented arrests, torture, extrajudicial murders are carried out by the day. For all the new President and his patrons might protest otherwise, darkness has fallen on Brazil and hope seems lost forever.\n\nThe Years of Lead have begun, and the Lead Duke is he that began them."
 POLITICS_PLINIO_SALGADO_DESC: "Modernist, journalist, novelist, fascist - Plínio Salgado has taken on countless identities throughout a career spanning over four decades. Few, however, could or would believe even a year ago that one of them would one day be President. For the founder of the Ação Integralista Brasileira in 1932, with a movement henceforth relegated to the fringes of the Brazilian right, that he has overcome it all to storm to power is no mean feat. If nothing else, it is a testament to his patience: this political revolution did not occur overnight.\n\nA Paulista born in a small town and a deeply Catholic household, the trappings of his ideology were likely there from the beginning. Integralism led on from this reality: he envisioned a nation united by a sense of community and Christianity against the atheistic systems of socialism and liberalism, and a strong, corporate state to glue it all together.\n\nMr. Salgado is not the same man thirty years on, however. Gone is the green shirt and the Greek letter sigma emblazoned on it, the flaming-hot rhetoric and the frenzy. Now, with an aged gait and a pinstriped suit, he must wear his old ideas, too, in new clothing. He must unite the party around him and the Integralist ideal he has imagined for so long, or watch the liberals and socialist crush it under his own nose, with only a mere plurality in Congress to do it. An impossible agenda? Perhaps, but he has done the impossible before. Perhaps he can do it twice."
 POLITICS_VIRGILO_TAVORA_DESC: "When Eduardo Gomes made severe mistakes in the last years of his presidency, Virgílio de Morais Fernandes Távora could only watch as the leftists regrouped, as Adhemar's peons became a significant opposition force, and as the far-right took eleven percent of the vote. His uncle, Jaurez Távora, tried his best to be a figure of sanity to the people amongst all this chaos, but instead lost in a humiliating election that saw Brazil fall to instability. And now it was happening again.\n\nLacerda's reforms were simply too radical, and he constantly dismantled all the many inroads Távora built with the PSD. Workplaces were deserted, shelves slowly emptied, and the streets of all the cities were filled with crowds, chants, and chaos. Távora had to step in.\n\nThrough some clever political maneuvering, someone sane has now taken the reins. However, just like his uncle before him, some things might be impossible to fix. The UDN has been split in two, and members can no longer sit in the same room without entering a heated debate on whether Lacerda went too far or not. What this means for the 1970 elections, Távora has not the slightest idea."
 POLITICS_RAPHAEL_MAGALHAES_DESC: "Raphael Magalhães was introduced into a vibrant world of Brazilian politics, where ambition and legacy danced an endless tango. His father's close friendship with Carlos Lacerda gave him an early seat at the table, but it was Raphael's charisma, intelligence, and boundless energy that helped him carve his path to greatness. Knowing the contradictions of Brazil, he created himself the image of a populist liberal - a champion of the lower classes, while firmly rooted in the privileges of elite circles.\n\nRaphael's rise mirrored the struggle of Brazil to define itself in a turbulent world. As a young man, he was a proud flag-bearer for Fluminense Football Club, captivating the masses with his passion for the sport and unwavering optimism. Beneath his easy smile, there was a steely determination that helped him navigate the complex politics of UDN. With the guidance of his mentor, Lacerda, Magalhães developed a vision for a Brazil free from the shadows of the past, championing economic liberalism and aligning with the OFN.\n\nWith the Crow's torch in his hands, Magalhães took on the presidency with a sense of purpose. For him, it was more than just politics; it was a calling. However, the challenges ahead are immense. The country is at a crossroads, and Magalhães realizes he must prove that his vision and leadership could withstand the storms of a rapidly changing world."
 POLITICS_JOSE_PINTO_DESC: "José de Magalhães Pinto has been cursed, hasn't he? He wanted the presidency his whole adult life, and now here he is as president, too late to stop the undoing of the very Republic of which he is now the chief magistrate.\n\nWhat a pedigree he has, too! A career politician and a veteran banker, a loyal Mineiro par excellence. A governor of his home state from 1961 to 1966, he worked with Lacerda and Adhemar to topple Lott and Quadros; he was rewarded for his loyalty with influence in the União Democrática Nacional that persists to the present day. When in 1965 Lacerda ran for the UDN nomination, Magalhães Pinto tried to defeat him and came up short. He was then forced to watch as the Imperial Presidency of Carlos Lacerda was unleashed upon the nation.\n\nFive years have passed, a half-decade of Carlos Lacerda's autocratic rule. Magalhães Pinto tried to manipulate the situation for his own ends, but how exactly could plots and operations backed either by the Planalto or by the military be manipulated? He tried to manipulate the protests, perhaps contain the outrage that led to them. But how could the rage that the Fifth Republic reforms were inspiring be in any way tamped down? All else having failed he tried to contain the financial chaos—but there came a point at which there was only so much that a lone banker could do. At long last, after Magalhães was slain by the Bolsheviks, Lacerda was left with no other option but to give Magalhães Pinto what he wanted and make him president.\n\nDear God, what a presidency—it is nothing more than being crowned a king over ashes! Rio is in ruins thanks to Lacerda and Burnier's oh-so-brilliant mass-murder plan. The whole country is revolting. The Amazonist communists, far from being crushed, have won so much sympathy that they can now march on Brasîlia.\n\nMagalhães knows the end is here. He wishes he could do something, anything to prevent it. But he is a year too late. A year too late..."
 POLITICS_JOAO_AMAZONAS_DESC: "From the beginning of his life as a Marxist-Leninist, João Amazonas de Souza Pedros has always doubted himself. Was the execution of a people's war really the correct decision? Was communism nothing more than a failure, as shown by the failures of Mao, Stalin, and so many others? Was the only way forward the revisionism of Prestes? Such doubts gnawed away at him for a long time, making it harder to maintain the self-assurance he had to project as a revolutionary. They may yet come back, but for now they have been swept away by the deluge of fire that scorched the Nation, ordered by the dictator and devil Carlos Lacerda.\n\nA movement once quietly mocked over cachaça now has the support of the entire left: the revisionists, the social capitalists, the Guevarists, and assorted opportunists all side with Amazonas and his rebellion. For God's sake, Amazonas even has the sympathy or acquiescence of at least one-third of the Catholic hierarchy—a side effect of his tendency not to go after churches, avoiding repeating the mistake that alienated peasants en masse and left Iberia in the hands of Franco.\n\nSince not long after his birth in Belém, Amazonas has spent his entire life campaigning for an end to oligarchy and capitalism. He has not ceased to demand that the Brazilian people be freed to put torture and rule by jackboots behind them. He always knew despite his doubts that capitalism and fascism would devour himself, though it tears at him that such a thing had to happen the way it did in Rio.\n\nAmazonas now must focus on solutions over emotions, no matter how bitter. The military—the formations that have not dissolved or defected—is half in the grave. The executive power of former capitalistic Brazil is in disarray. All that is needed now is for the left to remain allied, for a broader alliance to be formed, and for Burnier to join his victims in the mass graves he has dug beneath the eyes of Christ the Redeemer."
 POLITICS_NEY_BRAGA_IMPERIAL_DESC: "Ney Braga's life has been inextricably linked to the military, a bond forged in his youth and solidified through his ascent to the rank of general. But to define him solely by his military service would be to ignore the complexities of the man. His tenure as Chief of Police of Paraná was not merely an administrative post; it was a crucible where he honed his skills, forged crucial connections, and laid the foundation for his future ambitions. The transition to politics was swift and decisive, his election as Mayor of Curitiba marking the beginning of a meteoric rise, an upward trajectory fueled by both shrewd calculation and undeniable ability.\n\nFrom there, he ascended to the position of federal deputy in 1958, further solidifying his political presence, until finally, in 1961, the people of Paraná entrusted him with the highest office in their state, electing him their governor. Like many of his military contemporaries, Braga holds a firm conviction in the transformative power of state-led infrastructure projects. In Paraná, he applied this belief with an almost zealous fervor, orchestrating an ambitious program of industrialization and development that reshaped the state into a modern economic powerhouse.\n\nNow, having been chosen as Lacerda's successor, Ney Braga stands as the undisputed leader of Brazil. While the role of autocrat is not one he initially sought, he believes it is necessary. If exercising absolute authority is what it takes to ensure the stability and economic advancement of Brazil, he will proceed without hesitation. He is a man of action, and the future of Brazil now rests firmly in his hands."
 POLITICS_NEY_BRAGA_SORBONNE_DESC: "Ney Braga's life has been inextricably linked to the military, a bond forged in his youth and solidified through his ascent to the rank of general. But to define him solely by his military service would be to ignore the complexities of the man. His tenure as Chief of Police of Paraná was not merely an administrative post; it was a crucible where he honed his skills, forged crucial connections, and laid the foundation for his future ambitions. The transition to politics was swift and decisive, his election as Mayor of Curitiba marking the beginning of a meteoric rise, an upward trajectory fueled by both shrewd calculation and undeniable ability.\n\nFrom there, he ascended to the position of federal deputy in 1958, further solidifying his political presence, until finally, in 1961, the people of Paraná entrusted him with the highest office in their state, electing him their governor. Like many of his military contemporaries, Braga holds a firm conviction in the transformative power of state-led infrastructure projects. In Paraná, he applied this belief with an almost zealous fervor, orchestrating an ambitious program of industrialization and development that reshaped the state into a modern economic powerhouse.\n\nYet, even as he now sits in the Palácio da Alvorada, a subtle sense of unease permeates the air around him. The trappings of power feel more like a gilded cage. Military officers form a watchful guard, each a carefully positioned piece in a delicate political chess game. Braga himself is acutely aware of the tightrope he walks. He bides his time, with the quiet resolve of a seasoned tactician, convinced that it is only a matter of time before the winds of fortune shift, creating a crack in the façade through which he can finally seize true control."
 POLITICS_CIVIL_WAR_RADEMAKER: "There is a certain brutal irony in the current state of Brazil—the land of the Southern Cross now must be saved by the staffers of its Antarctic outpost.\n\nOne day supply stopped in the Antarctic. The shipments stopped coming; what got through came with messages of internal commotion and abject chaos. Admiral Augusto Hamann Rademaker Grünewald, overlord of Brazilian Antarctica, knew something was wrong—but he did not expect to see just how far the Nation had fallen. He did not plan to come back to a homeland in flames!\n\nRio de Janeiro is ruined, turned into a charnel-house by the plot of a maniac so-called general. The communists are in open revolt, and controlling more territory than Rademaker had ever feared possible. These moronic so-called military officers who decided to back the fool Lacerda and their new UDN puppet to the hilt seem to be in denial about how much damage their stupidity has done to the country. Confronted with all this devilry, it would be reasonable if a Brazilian citizen succumbed to despair.\n\nLet Brazil take courage, however, for Admiral Rademaker has emerged to heal the misery of the nation. With his marines, the local integralists, and those loyal to the Admiral personally by his side, Rademaker is well placed to destroy the Bolsheviks, punish the Lacerdistas, and return sanity to Brazil. After so much suffering it is the least that the Nation deserves."
 POLITICS_CIVIL_WAR_BRIZOLA: "To be free is one of humanity's most basic desires. Perhaps, this explains the inhumanity of the military regime. But guns and bullets were only ever a stopgap against this need, and now, the army has a monopoly on neither.\n\nLeonel Brizola knows this desire all too well, instilled with him ever since the death of his father, cut down fighting in the Revolution of 1923 against Rio Grande do Sul's ruling oligarchy. His boyhood was spent working in odd jobs after leaving his mother's home at an early age, before joining the PTB, becoming acquainted with the Vargas family and then João Goulart.\n\nA rising star within the party with noted left-wing and nationalist tendencies, his career as governor was halted by the military's intervention into politics, forcing him into exile to Uruguay before a jail cell was picked for him. However, his time spent trying to change Brazil would not end there, agitating from the outside against the dictatorship.\n\nUltimately, it was the military who caused their own demise, but Brizola had to return home to deliver the finishing blow. His grouping is an assortment of democratic forces in Brazil, those willing to fight for freedom rather than obey the guns. They know their streets, their locales, and the jackboots will be driven out for a free democracy.\n\nThey will fight, and they will be right."

 ## Armed Forces Mechanic
 BRA_military_category: "Brazilian Armed Forces"
