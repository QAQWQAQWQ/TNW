BRA_pres_infra_tooltip: "Campaign actions for [BRA_chosen_pres_candidate_party_color][BRA_chosen_pres_candidate_name]§! in this region will be §G[?BRA_pres_current_state_infra|2]x§! as effective due to investments in campaign £BRA_pres_infra_texticon §GInfrastructure§!.\n\n£BRA_pres_infra_texticon §GInfrastructure§! will be reduced over time, but can be increased again by using the §YBuild Campaign Infrastructure§! action."
BRA_pres_fatigue_tooltip: "Campaign actions for all candidates in this region will be §R[?BRA_pres_current_state_fatigue|2]x§! as effective due to accumulated £BRA_pres_fatigue_texticon §RFatigue§!.\n\n£BRA_pres_fatigue_texticon §RFatigue§! accumulates as candidates continue to campaign in a region, but will be reduced over time as long as no campaigns are conducted in the region."

BRA_pres_rally: "§YHold a Rally§!\n§FWe will schedule a rally for [BRA_pres_candidate_party_color][BRA_pres_candidate_name]§! in the §Y[BRA_pres_selected_region]§! region in order to increase support for [BRA.GetCandidatePronoun] among the local voters.§!\n\n[BRA_pres_campaign_cooldown_msg]§YEffects when selected:\n[BRA_pres_selected_region]§!\n  §GIncreases Support§! for [BRA_pres_candidate_party_color][BRA_pres_candidate_name]§!."
BRA_pres_campaign: "§YInvest in Campaigning!\n§FWe will focus [BRA_pres_selected_party_name] campaigning efforts in the §Y[BRA_pres_selected_region]§! region in order to increase [BRA_pres_candidate_party_color][BRA_pres_candidate_name]'s§! name recognition and image before voters head to the polls.§!\n\n[BRA_pres_campaign_cooldown_msg]§YEffects when selected:\n[BRA_pres_selected_region]§!\n  §GIncreases Momentum§! for [BRA_pres_candidate_party_color][BRA_pres_candidate_name]§!, causing §GSupport§! to grow over time."
BRA_pres_infra: "§YBuild Campaign Infrastructure§!\n§FWe will set up local campaign offices for [BRA_pres_candidate_party_color][BRA_pres_candidate_name]§! in strategic locations across the §Y[BRA_pres_selected_region]§! region in order to increase our campaign's effectiveness.\n\n[BRA_pres_campaign_cooldown_msg]§YEffects when selected:\n[BRA_pres_selected_region]§!\n  Increases £BRA_pres_infra_texticon §GInfrastructure§!, making future campaign decisions for [BRA_pres_candidate_party_color][BRA_pres_candidate_name]§! §Gmore effective§!."
 # adhemar unique action
BRA_pres_bribe: "§YCash for Votes§!\n§With the right gifts in the pockets of the §Y[BRA_pres_selected_region]§! community leaders, we can ensure that [BRA_pres_candidate_party_color][BRA_pres_candidate_name]§! receives the support of the region's voters.§!\n\n[BRA_pres_campaign_cooldown_msg]§YEffects when selected:§!§F\nSpends §R$5 M§! from the £BRA_adhemar_slush_fund_texticon §Gslush fund§!.\n[BRA_pres_selected_region]§!\n  §GIncreases both Support and Momentum§! for [BRA_pres_candidate_party_color][BRA_pres_candidate_name]§!.\n  Causes additional £BRA_pres_fatigue_texticon §RFatigue§!."

BRA_pres_supporters: "§YTarget Supporters§!\n§FWe will target [BRA_pres_candidate_party_color][BRA_pres_candidate_name]'s§! core base in the §Y[BRA_pres_selected_region]§! region with the goal of counteracting local endorsements and securing a fraction of [BRA.GetCandidatePronounPossessive] supporters.§!\n\n[BRA_pres_campaign_cooldown_msg]§YEffects when selected:\n[BRA_pres_selected_region]§!\n §RDecreases Support§! for [BRA_pres_candidate_party_color][BRA_pres_candidate_name]§!."
BRA_pres_negative: "§YRun Negative Ads§!\n§FUsing whatever damaging information we have at our disposal, we will spread negative information about [BRA_pres_candidate_party_color][BRA_pres_candidate_name]§! across the §Y[BRA_pres_selected_region]§! region, ruining [BRA.GetCandidatePronounPossessive] reputation among the local voters.§!\n\n[BRA_pres_campaign_cooldown_msg]§YEffects when selected:\n[BRA_pres_selected_region]§!\n §RDecreases Momentum§! for [BRA_pres_candidate_party_color][BRA_pres_candidate_name]§!."

 ## Senate Panel
BRA_senate_info_tt: "The §YSenado Panel§! displays Brazil's currently elected §YSenators§! by region and arranged by §Cparty§!. Senators come from a wide variety of §Cpolitical parties§!, but each is aligned with one of five §Imajor parties§!.\n\nElections occur every three years, alternating between one and two seats in each §YState§! up for election. During election season, the map displays the color of the leading party in each §YState§!.\n\nSelecting a §YState§! displays a list of candidates who can either be §Gcampaigned for§! or §Rslandered§! depending on whether they align with the chosen §Imajor party§!. Campaign actions can be done once every two weeks; the campaigns of other parties are visible as outlines on the map."

BRA_senate_campaign: "§YCampaign for [BRA_candidate_name]§!\n§LWe will mobilize the full [BRA_senate_selected_party_name] apparatus in [BRA_senate_selected_state] in support of [BRA_senator_candidate_party_color][BRA_candidate_name]§!.\n\n[BRA_senate_campaign_cooldown_msg]§YEffects when selected:\n[BRA_senate_selected_state]§!\n  §GIncreases§! support for [BRA_senator_candidate_party_color][BRA_candidate_name]§!."
BRA_senate_slander: "§YSlander [BRA_candidate_name]§!\n§LTo ensure that [BRA_senate_selected_state] does not elect [BRA_senator_candidate_party_color][BRA_candidate_name]§!, we will recruit [BRA_senate_selected_party_name] members to spread unflattering messages about their ties and personal affairs.§!\n\n[BRA_senate_campaign_cooldown_msg]§YEffects when selected:\n[BRA_senate_selected_state]§!\n  §RReduces§! support for [BRA_senator_candidate_party_color][BRA_candidate_name]§!."
