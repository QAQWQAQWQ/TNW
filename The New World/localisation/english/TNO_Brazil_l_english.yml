 BRA_overbearing_military: "Overbearing Military"
 BRA_overbearing_military_desc: "While the constitution states that the elected Presidency and Legislature hold the power in Brazil, this is not the reality in practice.\n\nBrazil relies on its military. This is not just a fact, but a reality made all the more uncomfortable for any ambitious statesman by its exceptional power. The conclusions made over barracks poker tables or by senior generals define Brasília's political thinking, keeping military status and funding intact, and the room for maneuver minimal.\n\nStakes are high. If army sensibilities are offended, or instability reigns, the Fourth Republic might well end as it began... §Rand fall to yet another coup.§!"
 BRA_constitutionalist_dominance: "Constitutionalist Dominance"
 BRA_constitutionalist_dominance_desc: "A new era has dawned for the Brazilian Military, and for President Lott, it is exactly as it should be. Currently, the directive of the armed forces is of respect for the elected Presidency and Legislature, just as the constitution intended.\n\nWith the passing of the Lott Act and Denys' seditious coup in tatters, only unruly elements remain of the formerly imposing factions, which are not yet in the position to resist. Still, only hope ensures this status quo does not become an anomaly of Brazilian history."
 BRA_militarist_rebirth: "Militarist Rebirth"
 BRA_militarist_rebirth_desc: "Lott's attempt to suppress the pride of the nation, its military, could not stop his successor from handing back power. Adhemar rules through a system of mutual benefit between his PSP and military benefactors to restore the military's voice in politics as it was before the Lott Act. A little back-scratching here and there, and the PSP will be the party of the army, and the army a stronghold for the party.\n\nNo longer will the armed forces serve one man's interests. It is time to find its true place in the sun. But the President is playing a dangerous game, and he must be careful to ensure this situation does not spiral out of his control."
 BRA_day_of_the_jackboot: "Day of the Jackboot"
 BRA_day_of_the_jackboot_desc: "As the sound of thousands of infantrymen clamors through the streets of Brasília, democracy in Brazil remains but a dying husk. The hardliners in the military have used their constitutionally-given rights to remove the President from power in the name of national security, stamping out dissent nationwide as they promise to restore the status quo at a date deemed suitable to them. Civilian Politicans can only hope this day does not last a decade."
 BRA_divisions_of_cardinals: "Divisions of Cardinals"
 BRA_divisions_of_cardinals_desc: "In the Vatican, popes are chosen by cardinals in isolation in the Sistine Chapel. The illusion persists that Brazil is more democratic than that. However, when replacing the Vatican with Brasília and the Chapel with the Army HQ, there is not much difference. Brazil's top brass consider the presidential ballots as a band of cardinals consider their new messenger of God.\n\nEvery year this spirit further cements itself into the state edifice. So too does the political risk for any prepared to confront it."
 BRA_sword_of_damocles: "Sword of Damocles"
 BRA_sword_of_damocles_desc: "Many thought that when the military stormed into Brasília and suspended the civilian government, it was the death knell for Brazilian democracy. This turned out not to be the case, as the junta removed itself from power as authority was handed back to the civilian politicans. Despite this merciful transfer of power, uncertainty still remains within the country and the military is now stronger than ever. The murky political situation gives the military room to easily reassert its power, and if that happens, Brazil may never see democracy again."
 BRA_bastion_of_the_crow: "Bastion of the Crow"
 BRA_bastion_of_the_crow_desc: "No matter how hard Lacerda tries to feed Brazil her medicine, the people refuse the taste of his policies, and Congress throws a tantrum at the slightest whiff of his proposals. It seems that only the military understands what makes the nation healthy and strong.\n\nThe armed forces remain an important ally, but if the UDN ever falters, they won't hesitate to seize what's left of the country's democracy."
 BRA_institutionalised_military: "Institutionalised Military"
 BRA_institutionalised_military_desc: "Brazil has come home to roost, back into the hands of the armed forces. Just as it did in 1889, when the military forced the onset of the Republic. Just as it did in 1930 and 1949, the military has stepped in to restore order as bungling politicians gambled it away. The army, the centerpiece of the nation now and forever, will bring it back and take orders from nobody."
 BRA_institutionalised_military_2: "Institutionalised Military"
 BRA_institutionalised_military_2_desc: "Brazil has come home to roost, back into the hands of the armed forces. Just as it did in 1889, when the military forced the onset of the Republic. Just as it did in 1930 and 1949, the military has stepped in to restore order as bungling politicians gambled it away. The army, the centerpiece of the nation now and forever, will bring it back and take orders from nobody."
 BRA_military_stalemate: "The Military Stalemate"
 BRA_military_stalemate_desc: "Pessedistas and Udenistas file to their seats. Never before had their parties held such power in Congress.\n\nAnd never had that dominance felt so uneasy. Soldiers stand stern on the balcony, shadows against the gilded ceiling, kept at bay, but only just. This is the Sorbonne promise of stability, a suffocating stalemate where nobody wins and everybody is searching for any chance to regain control."
 BRA_megaproject_development: "Megaproject Development"
 BRA_trans_amazon_highway: "The Trans-Amazonian Highway"
 BRA_idea_trans_amazon_highway: "The Trans-Amazonian Highway"
 BRA_idea_trans_amazon_highway_desc: "The Trans-Amazonian Highway is President Lott's grand ambition: a roadway stretching across the inhospitable Amazon, opening the rainforest to development and connecting Brazil to Colombia.\n\n§WDaily Political Power Gain: §R[?BRA_develop_pp_cost|2]§W\nAllocated £tt_prod_unit Production Units: §R[?BRA_develop_highway_pus_display]§!"
 BRA_hundred_days: "Hundred Days Crisis"
 BRA_hundred_days_desc: "Brazil is paralysed, the line of succession has been shattered. With the resignation of both Lott and Quadros from the government, the politicans have failed to appoint a new one and have fallen into infighting. Multiple claimaints to the Presidency have presented themselves and Pascoal Ranieri Mazzilli has been appointed President as a temporary solution, until the legislature votes for a new President. While the politicans in Brasília bicker, the country falls further into chaos as the military watches. If nothing is done to resolve the crisis, they will certainly intervene."
 BRA_idea_south_african_immigration: "South African Immigration"
 BRA_idea_japanese_inmigration: "Japanese Immigration"
 BRA_idea_japanese_inmigration_desc: "President Quadros has removed several legal blocks on immigrating to Japan, primarily regarding Japan and the Co-Prosperity Sphere. Brazil is now seeing an immigration boom, with many Japanese immigrants attracted to a new life and the growing business potential within Brazil, though they have yet to assimilate perfectly to life here."
 BRA_idea_joint_military_operations: "American-Brazilian Joint Military Operations"
 BRA_idea_joint_military_operations_desc: "The Brazilian Expeditionary Force in South Africa has overcome initial teething problems to become a well respected part of the OFN war effort in the dark continent. Working closely with American counterparts, the soldiers of the Southern Republic have contributed a few novel infantry tactics to the conflict as they've adapted to their twin roles on the frontline and in the counter-insurgency efforts."
 BRA_idea_eletrobras: "Eletrobras"
 BRA_idea_trans_amazon_complete: "The Trans-Amazonian Highway"
 BRA_idea_trans_amazon_complete_desc: "The Trans-Amazonian Highway, the fruit of ex-President Lott's work, has been finally finished. We've braved the untamable North and now we can reap its fruits!"
 BRA_Agrarian_Reform_Weaker: "Weak Agrarian Reform"
 BRA_Agrarian_Reform_Weaker_desc: "President Lott's Agrarian Reform Act has passed. Now the law of the land, rural citizens are now feeling the effects of its implementation.\n\nThe bill has not passed unscathed through the law-making process. Its scope curtailed from the President's original intentions, the Agrarian Reform Program has begun expropriating land from large landholders and redistributing it to peasants. The process is being held up in several areas by lawsuits, as larger magnates struggle against the turning tide. The peasants who have received their land have received little relief and support against competition from the remaining large landholders.\n\nAs disappointing a start as it has been, the reforms have been mostly well received by poor rural communities. Change is finally coming to the Brazilian interior, and future Presidents will be able to build upon these foundations."
 BRA_Agrarian_Reform: "Agrarian Reform"
 BRA_Agrarian_Reform_desc: "President Lott's Agrarian Reform Act has passed. Now the law of the land, rural citizens are now feeling the effects of its implementation.\n\nThe bill has emerged in good shape through the law-making process. Having steered his program through the Senado, the President's original intentions, the Agrarian Reform Program has begun expropriating land from large landholders and redistributing it to peasants. The magnates have mostly accepted their losses of land, their ego soothed by compensations duly voted on by the Senado. Newly independent peasants are given assistance to get started, as they face competition from large landholders.\n\nThe program is rolling out smoothly, and rural communities are being given the tools needed to earn their own prosperity. President Lott will no doubt secure his legacy with the launch of this era of reform in the Brazilian countryside."
 BRA_Agrarian_Reform_Stronger: "Strong Agrarian Reform"
 BRA_Agrarian_Reform_Stronger_desc: "President Lott's Agrarian Reform Act has passed. Now the law of the land, rural citizens are now feeling the effects of its implementation.\n\nBacked by energized allies in the dominant coalition as well as a few populists within the opposition, President Lott's reform package has gained speed as it has sailed through the Senado. The scope of the project and the resources attributed to it are beyond the President's initial targets.\n\nIn the countryside, a quiet revolution has begun as large magnates are seeing their empires parceled off to dispossessed families. The new independent farmers are enrolling into agricultural colleges in great numbers, as the state prepares them for their new life. Not all will become prosperous, but an overwhelming majority will be given the dignity of providing for their family.\n\nThe reforms are progressing at a breakneck pace. While the ever cautious President Lott is putting on the brakes here and there to prevent possible corruption or legal mishaps, he has been delighted at the speed at which his plan is proceeding. His joy has been matched by thousands of rural families, their life forever improved by this new era."
 BRA_army_nepotism_6: "Nepotism in the Army: §xOverbearing§!"
 BRA_army_nepotism_6_desc: "The Army has escaped completely out of our control. Shadowy puppetmasters, with their own interests, define who moves within the bureaucracy, and what happens within it, and any actions we take against this beast is dilluted by the raw corruption laid within. Either we purge this disease, or §xthey will get delusions of control.§!"
 BRA_army_nepotism_5: "Nepotism in the Army: §RVery High§!"
 BRA_army_nepotism_5_desc: "Nepotism is slowly becoming a foundation that our Army is built upon. Salaries are increasingly being taken from private interests, as those who resist this effort are being replaced with those more complicit. If we do not act now, this problem may become unstoppable."
 BRA_army_nepotism_4: "Nepotism in the Army: §fHigh§!"
 BRA_army_nepotism_4_desc: "Many in the bureocratical branches of the army turn to their benefactors rather than our authority, and many "promotions" are sketchy at best. While unacceptable, it is still remediable, if we keep our chin upward and keep chipping at their hold."
 BRA_army_nepotism_3: "Nepotism in the Army: §YModerate§!"
 BRA_army_nepotism_3_desc: "The Army, as it stands, is split apart. The Constitutionalists refer to the government as the final authority, but it's no secret that many generals and marechals have their loyalty not the Republic and Brazil, but to whoever put them in place. If we desire to not constantly watch our back against our own protectors, we need to excise this cancer from our armed forces."
 BRA_army_nepotism_2: "Nepotism in the Army: §BLow§!"
 BRA_army_nepotism_2_desc: "The Beast, to the shadowy puppets discontent, bleeds. Members of the army, long neglected a real chance of promotion, are seen now for their value to the armed forces, not by favours. The tug of war, however is not over yet."
 BRA_army_nepotism_1: "Nepotism in the Army: §nMinimal§!"
 BRA_army_nepotism_1_desc: "Only in an utopia would our army be a true meritocracy, but we've reached as close as possible to this ideal. Effort will be due rewarded in the Army, and not by the whims of corrupt Marechals, but by the devotion they've had for Brazil, and our nation. §nArmy and State, for the first time in a long time, walk as equal, not as rivals.§!"
 BRA_the_populist_republic: "The Populist Republic"
 BRA_the_populist_republic_desc: "Walk through the avenues of Brasília, and it's easy to forget that half the world had fallen to fascism. A new modernist capital for one of the few liberal democracies left.\n\nBut inside every government building you'd pass, Varguists and anti-Varguists conspire for control, ever conscious that any sign of weakness could compel military opportunists to take over at any sign of incompetence."
 BRA_democracy_enforced: "Democracy Enforced"
 BRA_democracy_enforced_desc: "Unimplemented"
 BRA_false_dawn: "False Dawn"
 BRA_false_dawn_desc: "With the dust settled and rumors confirmed or denied, democracy has prevailed once more... but how many days will it see? The problems of the past have merely grown worse, and the uncertainties of yesterday are now the fears of tomorrow. Brazilian democracy hangs on life support, and its fate lies on a further polarized political class and an increasingly influential military establishment. In this new false dawn, only time will tell if this is a momentary crossroad or an illusion about to end."
 BRA_death_of_the_dream: "Death of the Dream"
 BRA_death_of_the_dream_desc: "The death knell of Brazilian democracy has been sounded throughout the country. Its institutions are held under an oppressive iron fist, answering only to the military, and while the junta has promised to restore democracy, that day seems to be slipping further and further away as the days ahead grow increasingly bleak. The dream of Brazilian democracy has faded into history."
 BRA_the_brazilian_miracle: "The Brazilian Miracle"
 BRA_the_brazilian_miracle_desc: "With strong state-based industrialization and government programs, Brazil is experiencing further economic successes. With these factors in mind, it is no wonder that Brazil's standard of living has only increased.\n\nSurely this, alongside heavy American investment, is more than enough to satisfy the Brazilian people. Brazil today finds itself with both a strong military and a strong economy."
 BRA_the_tropical_titan: "The Tropical Titan"
 BRA_the_tropical_titan_desc: "With the ongoing trend of rapid industrialization, living standards in Brazil are increasing. This has all culminated in continued economic development throughout the country, and at the moment it appears these good fortunes are not stopping any time soon.\n\nDubbed by some media outlets as "The Tropical Titan", Brazil is a nation which looks to the future with hope. For Brazil, the sky's the limit."
 BRA_brazils_black_swan_the_oil_crisis: "Brazil's Black Swan: The Oil Crisis"
 BRA_brazils_black_swan_the_oil_crisis_desc: "The steady growth in economic prosperity for Brazil was fueled by cheap oil from the Middle East and our neighbor Venezuela. With the outbreak of civil conflict in the Middle East, oil prices have drastically increased.\n\nWith an economy so dependent on oil, Brazil has been hurt badly. Unless Brazil handles the inflation and deficit problems effectively, an entire decade of success could be lost."
 BRA_brazilian_phoenix: "Brazilian Phoenix"
 BRA_brazilian_phoenix_desc: "Brazil's economy was strong enough to survive the oil crisis. The successes enjoyed previously have returned, and the future only sends good fortune.\n\nWhile the oil crisis has undoubtedly hurt Brazil's industries, the trend of economic growth was too strong to be stopped by one mere hiccup. This miracle will continue for years, potentially decades. Brazil's future as an industrial power is certain."
 BRA_the_lost_decade: "The Lost Decade"
 BRA_the_lost_decade_desc: "The oil crisis has proven too much for Brazil to handle. Economic growth has stagnated, and the deficit continues to rise to match the rate of high inflation Brazil is experiencing.\n\nIt is unknown how long this will last, but it cannot last forever. Inevitably, the debt will be too much for Brazil to handle, and a new crisis will emerge. The last period of economic prosperity has been lost."
 BRA_love_it_or_leave_it: "Love It or Leave It"
 BRA_love_it_or_leave_it_desc: "Unimplemented"
 BRA_the_lott_act: "The Lott Act"
 BRA_psp_revolution_adhemar: "The PSP Revolution"
 BRA_psp_revolution_adhemar_desc: "Since the end of the Estado Novo, Brazil has been in a tumultuous cycle of political rivalries. Varguists vs. anti-Varguists, developmentalists vs. free-market capitalists. In the midst of the endless disputes, one party stands as an outlier, and at its head, Adhemar de Barros will lead Brazil into a new era. The PSP is a unique force, its departure from partisan politics and populist ideals have caught the eye of the people, and even if its goals fail, it will change Brazilian politics forever."
 BRA_UDN_Counterrevolution: "The Counter-Revolution"
 BRA_UDN_Counterrevolution_desc: "Every action has an equal and an opposite reaction. Vargas, the PTB, and all his cronies scattered across the Brazilian government have gone without an opposite reaction to their decadence for far too long. And now that Carlos Lacerda has ascended to the Presidency proper, that reaction has come. If they wish to call themselves the Revolution, then the UDN is the Counter-Revolution.\n\nVargas and his legacy will be swept away. High inflation, high debt, and corruption will be things of the past. The excesses granted to labor mobsters will be curtailed and the free market will finally be allowed to reign unchecked. Under the Crow, Brazil will finally embrace liberalism and capitalism - forces long kept at bay that will not be denied."
 BRA_udn_counterrevolution_inflation_modifier_tt: "§FInflation Rate:§! [UDNcounterRevolutionInflationRate]"
 UDNcounterRevolutionInflationRatePositive: "§R[?BRA_fiscal_inflation_rate|3=]%§!"
 UDNcounterRevolutionInflationRateNegative: "§G[?BRA_fiscal_inflation_rate|3=]%§!"
 BRA_imperial_presidency: "The Imperial Presidency"
 BRA_imperial_presidency_desc: "Cheaters never win, and winners never cheat. João Goulart thought he could cheat his way into the presidency. Well, he thought wrong. Carlos Lacerda saw through his fraudulent victory and, invoking the use of emergency powers, saved Brazil from another five years of Varguist mayhem. Now the Crow sits upon his iron perch in Brasília, backed fully by the military and completely assured that his reign will last uninterrupted.\n\nOf course, the usual suspects are quick to denounce this victory, branding Lacerda a tinpot dictator on the same level as the fascists across the Atlantic. Complete nonsense, as expected; unlike the despots of the world, Lacerda's rule will harken much closer to that of Ancient Rome - a dictatorship, yes, but one bound by the constitution and used for the good of the nation.\n\nWith these emergency powers, Lacerda will sweep away what remains of Varguism in Brazil, destroying its fraudulent legacy and saving the country - for the price of freedom is eternal vigilance."
 BRA_general_strke_lacerda: "A Grande Greve de 1969"
 BRA_general_strke_lacerda_desc: "With riots all across the nation, President Lacerda now faces the greatest crisis of his presidency. The General Strike has paralysed all facets of public life. Lacerda's proposal to significantly change the Vargas Era labor laws has made him a target of the workers.\n\nAs the President tries to crackdown on the movement with the help of the police and his trade unions on his good side, the whole economy seems to be heading downhill. Lacerda has now a choice to fix this situation or threaten an early end to his career."
 BRA_general_strke_lacerda_gdp_growth_tt: "§FNominal GDP Growth:§! §R[?BRA_strikes_gdp_hit|3=]%§!"
 BRR_brazilian_revolution: "The Brazilian Revolution"
 BRR_brazilian_revolution_desc: "The once small revolt that started in the river banks of the Araguaia has entered the third phase of the people's war as communist forces have finally managed to capture the states that sit around the Mid-North of Brazil, now that the military regime has shown its true face.\n\nWhile João Amazonas has successfully managed to organize a revolutionary government in Fortaleza next to his trusty allies Pedro Pomar and Mauricio Grabois, and enjoys popular support in the region, reality is quickly starting to set in as they come to terms with the fact that they sit in one of the poorest and least developed regions of the whole country, making it difficult to supply troops and the local population without sacrifice."
 BRA_Vai_Passar: "Vai Passar"
 BRA_Vai_Passar_desc: "From little nothings on the banks of the Araguaia comes the potential to change Brazil forever.\n\nThe military regime has shown its true face, phony paternalism unravelling into psychopathy, as the people of the Mid-North have been moved to revolutionary action against the countless injustices they have suffered. For the Communist Party of Brazil, the widespread discontent necessitates entering the third phase of their ongoing people's war, mobilizing into a revolutionary government out to displace both bourgeois and reactionary movements.\n\nChairman João Amazonas and his trusty allies Pedro Pomar and Mauricio Grabois have built themselves a base in the region, operating in Fortaleza, and enjoying an all-time high of popularity. Their primary difficulty lie in the material conditions of being based in the poorest parts of Brazil, suffering from underdeveloped infrastructure that hurts both war efforts and maintaining order. But as with all things, this will pass in time, once the revolution succeeds..."
 BRA_fight_thrifty: "Fight Thrifty"
 BRA_fight_swift: "Fight Swiftly"

 BRA_crise_petrolifera_dynmod: "Crise Petrolífera"
 BRA_crise_petrolifera_dynmod_desc: "The steady growth in economic prosperity for Brazil was fueled by cheap oil from the Middle East and our neighbor Venezuela. With the outbreak of civil conflict in the Middle East, oil prices have drastically increased.\n\nWith an economy so dependent on oil, Brazil has been hurt badly. Unless Brazil handles the inflation and deficit problems effectively, an entire decade of success could be lost."

 BRA_latifundos_crisis: "Latifúndio Crisis"
 BRA_latifundos_crisis_desc: "Despite how much has changed throughout Brazil's history, one element has remained consistent. In rural communities nationwide, agricultural barons dominate both the local economy and politics like their fathers and grandfathers would have in eras past.\n\nThese conditions have led impoverished rural workers to lash out in violent displays. The government must step in before it is too late."
 BRA_countryside_strikes: "Countryside Riots"
 BRA_countryside_strikes_desc: "The crisis in the countryside has only worsened. The government has proven ineffective in dealing with these protests. Each day, clashes between workers and thugs hired by the rich become more common.\n\nAll of this violence and protest have led more and more people to flee to cities in the hopes of a better life. If a solution is not found soon, the situation will continue to spiral out of control."
 BRA_the_burning_farmland: "The Burning Farmland"
 BRA_the_burning_farmland_desc: "The situation across rural Brazil has continued to escalate. Guerillas are behind further violent attacks against the land-owning class, and at the moment, it appears these rebels are gaining ground.\n\nUnless drastic action is taken now, this crisis ravaging the countryside will only get bloodier. This state of affairs could lead to the undermining of our legitimacy. This cannot be allowed to happen."
 BRA_minor_agrarian_reform: "Minor Agrarian Reform"
 BRA_minor_agrarian_reform_desc: "The safest path is the moderate one. To avoid further instability, it is vital to only take small steps towards reform, carefully thought through before implementation.\n\nSome larger estates have already been broken up, with portions of the land being redistributed to poorer farmers. While there may still be protest from unhappy elites and peasants wanting more, tensions have eased. For now."
 BRA_radical_agrarian_reform: "Radical Agrarian Reform"
 BRA_radical_agrarian_reform_desc: "To address the rural issues plaguing Brazil, drastic reform is vital. Estates across the nation are being divided among poor farmers. Once completed, it could finally solve this crisis.\n\nOf course, these steps were taken without input from the rural elite, who are openly hostile to these reforms. There is a real possibility it could all fall apart, but no one gains anything by playing it safe."
 BRA_completed_agrarian_reform: "Completed Agrarian Reform"
 BRA_completed_agrarian_reform_desc: "Due to heavy intervention in the rural crisis, the oligarchical system in the countryside has ended. Hundreds of thousands of farmers have benefited from these reforms, now owning property and not having it leased to them by the rich.\n\nWhile there has been dissent from the dissatisfied elite regarding these changes, they need not be listened to. With their land gone, they are no longer relevant."
 BRA_the_silent_country: "The Silent Country"
 BRA_the_silent_country_desc: "Where once were cries of protest, there is only silence. Using the strength granted to us by the constitution, the foolish rural communists and their filthy Marxist sympathizers have finally been stifled.\n\nOur policies have proven most effective at achieving peace throughout the countryside. This victory was inevitable. Who else would dare to test Brazil's immeasurable might and resolve? Nobody."
 BRA_agro_industrial_complex: "Agro-Industrial Complex"
 BRA_agro_industrial_complex_desc: "Kubitschek's plans have now been implemented. Instead of engaging in the battle on agrarian reform as others would, agriculture has become a vital part of Brazil's economy.\n\nWith large sums of land granted to agricultural corporations and the rural elite soothed, agricultural output has increased. While the PTB may not like it, these policies have achieved fifty years of progress in only five."

 BRA_idea_nationwide_chaos_max: "Paralyzed Nation"
 BRA_idea_nationwide_chaos_high: "Nationwide Chaos"
 BRA_idea_nationwide_chaos_medhigh: "Widespread Opposition"
 BRA_idea_nationwide_chaos_med: "National Uncertainty"
 BRA_idea_nationwide_chaos_lowmed: "Stabilizing Situation"
 BRA_idea_nationwide_chaos_low: "Normalized Situation"

 BRA_idea_nationwide_chaos_max_desc: "The immediate aftermath of the coup has left Brazil paralyzed, its inhabitants reeling after the dust has settled. Workplaces remain empty as Brazilians hide in their homes, fearful of some form of retaliation. For their part, the soldiers patrol the streets, arresting those they deem suspicious, who are then never heard from again. Nobody quite knows what will happen next, and all sides seem to be waiting for the other to take the first breath."
 BRA_idea_nationwide_chaos_high_desc: "Brazil has shifted out of its initial paralysis into a state of nationwide panic. As the populace has begun to come to terms with the reality of military rule, and with the idea that this may be more permanent than some had initially hoped, demonstrations, riots, and overall resistance now threaten to break out across the nation. Brazil has found itself a powderkeg, and one errant spark might be all that is needed to set it all ablaze."
 BRA_idea_nationwide_chaos_medhigh_desc: "The situation on the streets has cooled a bit, as the military was able to put a stop to the worst of the demonstrations and riots. For now, the situation is under control; the military once again roams the streets without fear, and the worst of the dissidents have fled into the countryside to hide, waiting for everything to blow over. Even still, it will take time for the military can cement their governance over Brazil, as few among the populace find themselves willing to collaborate."
 BRA_idea_nationwide_chaos_med_desc: "Even though the worst seems to have passed, an air of uncertainty still filters through the streets of Brazil, covering everything like an immutable fog. Anyone brave enough, or stupid enough, to have spoken out against the regime had fled, or was dealt with some time ago. All that remains are those smart enough to keep quiet, knowing that collaboration with the military regime is better than the alternative: to become yet another nameless face, lost forever."
 BRA_idea_nationwide_chaos_lowmed_desc: "The situation in Brazil has calmed immensely since the coup. For the first time in months, shops and workplaces forced to shut down in the panic find themselves slowly reopening, and while the constant presence of the military in the streets hasn't subsided, they find themselves able to keep order even without employing the more brutal tactics that they have so often used. It may be slow going, but the people of Brazil finally have started to accept military rule."
 BRA_idea_nationwide_chaos_low_desc: "It seems that the tendency for life to recover from disaster applies even in Brazil. The chaos and fear that was omnipresent in the early days of military rule are long past; people have come to know and expect the military presence on the streets. While a few isolated incidents still occur now and again, it seems the great majority of Brazilians are content simply to go about their days in peace, life under military rule having become completely normalized."

 BRA_idea_build_more_roads: "Road Construction Projects"
 BRA_idea_build_more_roads_desc: "There is currently a massive road construction program ongoing. Roads are being laid down all across Brazil to link cities and rural areas to one another. If all goes well, we may expect a significant improvement to our nation's overall infrastructure situation."

 BRA_idea_formalised_high_command: "Formalised High Command"
 BRA_idea_formalised_high_command_desc: "One of the greatest legacy of the Sorbonne faction's stewardship of the Brazilian Republic has no doubt been its reforms of the Brazilian high command.\n\nUnlike many other modern nations, our country had never had a centralized defense ministry. Nor had it ever incorporated the army, navy and air force into one unified command structure. Even within the army itself, barracks throughout the country reassembled a patchwork of local military grandees, often using their men as muscle for regional policy interests rather than the Brazilian nation.\n\nThese memories of a disorderly army will now become a thing of the past. Under Castelo Branco's leadership a new formalized high command has been established. All branches of our armed forces are accountable to an empowered ministry of war. Within the army itself the hierarchy has been much reinforced; where once colonels and generals strutted and argued about the pecking order, there is now order and purpose."
 BRA_idea_formalised_high_command_2: "Formalised High Command"
 BRA_idea_formalised_high_command_2_desc: "One of the greatest legacy of the Sorbonne faction's stewardship of the Brazilian Republic has no doubt been its reforms of the Brazilian high command.\n\nUnlike many other modern nations, our country had never had a centralized defense ministry. Nor had it ever incorporated the army, navy and air force into one unified command structure. Even within the army itself, barracks throughout the country reassembled a patchwork of local military grandees, often using their men as muscle for regional policy interests rather than the Brazilian nation.\n\nThese memories of a disorderly army will now become a thing of the past. Under Castelo Branco's leadership a new formalized high command has been established. All branches of our armed forces are accountable to an empowered ministry of war. Within the army itself the hierarchy has been much reinforced; where once colonels and generals strutted and argued about the pecking order, there is now order and purpose."

 BRA_idea_american_advisor: "American Advisors"
 BRA_idea_american_advisor_desc: "The Hardliners have been calling for further collaboration with America against internal and external threats. We shall invite American military advisors into Brazil for joint training programs, similar to what we have in the 40's and 50's. This will deepen relations and improve our troops training."
 BRA_idea_american_advisor_2: "American Advisors"
 BRA_idea_american_advisor_2_desc: "The Hardliners have been calling for further collaboration with America against internal and external threats. We shall invite American military advisors into Brazil for joint training programs, similar to what we have in the 40's and 50's. This will deepen relations and improve our troops training."

 BRA_idea_martial_law: "Martial Law"

 BRA_idea_anti_trust_laws: "Anti-Trust Laws"

 BRA_guanabara_dreaming_state_modifier: "Guanabara Dreaming"
 BRA_guanabara_dreaming_state_modifier_desc: "Hailed as a triumph of Carlos Lacerda's economic planning, Guanabara has been transformed into a model example for Brazilian drive towards modernity.; With the impoverished relocated and the favelas cleared out, the Lacerda-Doxiadis plan has given way to state of the art infrastructure, booming industrial sectors and burgeoning residential neighborhoods. For the first time in a long time, Rio de Janeiro now lives up to its name as The Marvelous City.\n\nTourism is at an all- time high, the new industry breathes life into commerce and a developing middle-class now rapidly migrating to Guanabara's reinvigorated suburban landscape. A window into Brazil's future is seen in the Guanabara Dream."
 BRA_guanabara_dreaming_state_modifier_natspirit: "Guanabara Dreaming"



 #Ministers
 ##Lott Cabinet
 BRA_Janio_Quadros_hog_desc: "§YVice President\nPopulist Conservatism§!\n--------------\n§LBorn in 1917, Jânio Quadros has always been a prodigy wherever he went. His career started in 1943 as a geography teacher at the Dante Alighieri College in São Paulo, where he gained fame for his gregarious personality and eccentric behaviour.\n\nThe end of the New State dictatorship and the reopening of the parties allowed Quadros to gather enough support to be elected as a São Paulo city councillor in 1950 by the Christian Democrat Party. Quadros' Lusotropicalist behaviour won him the graces of Caudilho Salazar, who granted him the medal of the Military Order of Christ. In 1955 he won the graces of the Paulistan electorate and won the city mayoral election and finally ran as Juracy Magalhães' Vice President in the 1960 election. In a cruel twist of fate, Juracy was defeated, and now Jânio finds himself as the VP to a man he is a political opposite. He has to make the best of the situation to keep himself afloat.§!"
 BRA_Walther_Salles_for_desc: "§YMinister of Foreign Affairs\nLiberalism§!\n--------------\n§LWalther Moreira Salles is something common in Brazil: a politician from an old, traditional family who enjoyed an easy path to success. Born in 1912 to a rich banker, Salles began his political career as the Brazilian ambassador to Washington during the later stage of the New State dictatorship where he gained the reputation of a great negotiator and appeaser. His success led him to a close friendship with Vargas and allowed him to become Juscelino Kubitschek and now Lott's foreign minister.\n\nSalles now finds himself at a crossroads in his career. His resources are endless, his fame is universal and his connections are everywhere. He contemplates moving on to other projects such as his newspaper "A Última Hora" or the family banking complex, the Banco Moreira Salles. But one thing that he is certain to do while he remains in office is fight any attempt to impose a new dictatorship in Brazil.§!"
 BRA_Tancredo_Neves_eco_desc: "§YMinister of Finance\nNational Liberalism§!\n--------------\n§LTancredo Neves is a well-known figure on the Brazilian political scene. Eloquent, good natured, optimistic and strongly nationalistic, Neves began his political career in 1935 being elected as a city councillior by the Progressive Party. His mandate was extinguished by the New State coup; most of the 1940s were spent improving his public image as a reliable lawyer in São Paulo.\n\nThe post-Vargas democratisation brought him to the Social Democratic Party, where he became a close ally of Juscelino Kubitschek, having used his connections to guarantee stability in all sections of the government. As a minister of economy, Neves is a reliable banker who gets things done. Sometimes he comments about his future plans to be President of Brazil, a position that he is clearly capable of exercising with utmost diligence.§!"
 BRA_Odilio_Denys_sec_desc: "§YMinister of War\nDespotism§!\n--------------\n§LOdílio Denys is a special kind of officer - one crafted by the events of early 20th century Brazil. Being trained by the Prussian mission in the old republic, taking part in the 1930 revolution that put an end to the oligarchic governments and in the New State coup, and serving as a close ally to General Goés Monteiro, Denys took part in every major change in Brazil during the first half of the 20th century.\n\nHis authoritarian tendencies didn't divorce him from his strong sense of duty and discipline. A friend of Henrique Teixeira Lott, he was one of the officers responsible for aborting the Novembrada coup orchestrated against Juscelino Kubitschek in 1955. Now approaching the end of his career, Denys can look back to his life of accomplishments with pride as someone who did what was necessary when it was necessary to protect his country's independence from foreign and internal threats.§!"

 ##Quadros Cabinet
 BRA_Milton_Campos_hog_desc: "§YVice President\nLiberal Conservatism§!\n--------------\n§LFor many, Milton Campos is a memory of a time long past. A traditional liberal raised during the old republic, Campos began his political career as a member of the Progressive Party in 1934, but had his ambitions cut soon after, when his mandate was extinct by the New State coup in 1937, forcing him to work as a lawyer for the Caixa Econômica Federal Bank. Campos worked actively with other liberal politicians to end the dictatorship, being elected a deputy in 1950 and governor of Minas Gerais in 1955, his path towards the vice presidency was consolidated.\n\nCampos carries a strong distaste towards Varguism, both for its authoritarian measures and nationalist rhetoric. He instead prefers a cosmopolitan, liberal state similar to the Old Republic. As such, he plans to spend the final years of his political life attempting to move Brazil in the direction of political, social, and economic freedom.§!"
 BRA_Alfonso_Arinos_for_desc: "§YMinister of Foreign Affairs\nLiberal Conservatism§!\n--------------\n§LAfonso Arinos de Melo Franco is the perfect Brazilian intellectual, having a long academic history beginning in 1927 at Rio's law school, getting his first PhD in Geneva and three more in Montevideo, Paris, and Buenos Aires. Politically speaking, he was one of Brazil's most notorious white supremacists and supporters of eugenics through the 1930s and early 40s, but after seeing the implementation of his beliefs within the Third Reich and the enslavement of Europe, he claimed to have a change of heart and turned into one of Brazil most notorious anti-racist and tropicalist advocates, even formulating the "Afonso Arinos Law" that outlawed racist policies in 1951.\n\nAs Quadros' foreign minister, Afonso Arinos devised the plan for an "independent foreign policy", preaching that Brazil shouldn't be tied to the OFN or other power blocs, but instead follow his own direction in foreign policy, and even establish his own sphere of influence, in some ways distancing himself from the pro-OFN right.§!"
 BRA_Artur_da_Silva_Bernardes_Filho_eco_desc: "§YMinister of Finance\nConservatism§!\n--------------\n§LSon of the first Brazilian dictator of the 20th century, Bernardes Filho began his political career through nepotism working as his father's secretary in 1928. Being a supporter of the 1930 revolution, he broke with Vargas and was elected as a deputy in 1934, but had his mandate ended by the New State coup in 1937, resulting in his exile after political protests. In the aftermath of the New State dictatorship, he was elected as a senator for the state of Minas Gerais and supported the "Petróleo é nosso" along with his father during Juscelino's government.\n\nAs Quadros' minister of economics, Artur is favorable for balancing the government spending and a responsible economic policy, while also keeping Brazil's economic independence and favoring Quadros' idea of a Christian welfare state.§!"
 BRA_Ernesto_Geisel_sec_desc: "§YMinister of War\nDespotism§!\n--------------\n§LA German-Brazilian, Ernesto Geisel had a very active military life, being a soldier in the 1930 revolution, fighting against the Constitutionalists in 1932, and being friendly to Vargas despite his attempts to assimilate German-Brazilians. During the war he led the 3rd military region in the state of Rio Grande do Sul, being under surveillance for his German heritage. In the aftermath of the revolution, he received American training and became an influential member of the Sorbonne.\n\nNeutral during the coup against Kubitschek, he was trusted by Lott as a diplomat between the Constitutionalists and the Sorbonne, sometimes cooperating with them against the hardliners. Now as Quadros' minister of security, he's prepared to protect Brazil and its democracy against internal threats, be they the hardliners, communists, or fascist scum underground.§!"

 ##Lacerda Cabinet
 BRA_Golbery_do_Couto_e_Silva_sec_desc: "§YMinister of War\nDespotism§!\n--------------\n§LGolbery do Couto e Silva, born in the city of Rio Grande, Rio Grande do Sul, has always been a man of military intellectual thinking. Joining the Military School of Realengo at only age 16, he followed an officer's career to eventually serve as an expeditionary intelligence officer to the United States at the time of the Second World War. Following the conclusion of the war, Golbery continued to ascend the ranks, becoming one of the influential leaders of the Sorbonne faction. Becoming the director of the Escola Superior de Guerra, he now advocates for a modern and technocratic army, promoting the innovation of strategy and technology as a means to strengthen the Exército Brasileiro.§!"
 BRA_Vasco_Leitao_da_Cunha_lacerda_for_desc: "§YMinister of Foreign Affairs\nLiberal Conservatism§!\n--------------\n§LLeitão da Cunha is not a man of much ideological preference, having worked under Vargas and now under Lacerda. Having been a diplomat since the 1930s and being the former Brazilian ambassador to the now-defunct Soviet Union, Leitão is content with his position- as long as he has a free hand to do what he wants.\n\nMore than anything, what da Cunha wants is a Brazil tied up to the most graceful democratic nation ever born from human strength, the United States of America, the leader of the OFN, the perfect enlightened state to ever grace mankind since its inception, and he shall fight to keep Brazil tied to their interests, as it is their right as they fight for a rightful cause, a cause that Brazil shall fight for, too.§!"
 BRA_Helio_Beltrao_eco_desc: "§YMinister of Finance\nLiberal Conservatism§!\n--------------\n§LA devout technocrat, Hélio Beltrão now forms an important part of Brazil's economic planning strategy. Born in 1916, he graduated in law in the university of Rio de Janeiro and found relevance following his term as Rio de Janeiro's planning secretary. Finding his way into the Federal government in a similar position following Lacerda's rise, he hopes to make efforts to deregulate and, more broadly, move the economy of Brazil to the economic right.§!"
 BRA_Virgilio_Tavora_hog_desc: "§YVice President\nLiberal Conservatism§!\n--------------\n§LEven as he reclined in his sleek new residence in Brasília, Virgílio de Morais Fernandes Távora couldn't quite relax. From his moderate uncle, Juarez Távora, the UDN's candidate for the 1955 election, he inherited a sacrosanct duty. He had to make sure the President wasn't lost in his own fantasies.\n\nAs Governor of Ceará, he was known for his many construction projects, most of which were only possible because he had the energy and patience to collaborate with the local PSD. With this tendency towards dialogue, he knew he now played an important role in keeping Lacerda in check, ensuring he never forgets he is a mere President, not an emperor.§!"
 
 BRA_Vasco_Leitao_da_Cunha_lacerda_for_anocracy_desc: "§YMinister of Foreign Affairs\nAnocracy§!\n--------------\n§LLeitão da Cunha is not a man of much ideological preference, having worked under Vargas and now under Lacerda. Having been a diplomat since the 1930s and being the former Brazilian ambassador to the now-defunct Soviet Union, Leitão is content with his position- as long as he has a free hand to do what he wants.\n\nMore than anything, what da Cunha wants is a Brazil tied up to the most graceful democratic nation ever born from human strength, the United States of America, the leader of the OFN, the perfect enlightened state to ever grace mankind since its inception, and he shall fight to keep Brazil tied to their interests, as it is their right as they fight for a rightful cause, a cause that Brazil shall fight for, too.§!"
 BRA_Helio_Beltrao_eco_anocracy_desc: "§YMinister of Finance\nAnocracy§!\n--------------\n§LA devout technocrat, Hélio Beltrão now forms an important part of Brazil's economic planning strategy. Born in 1916, he graduated in law in the university of Rio de Janeiro and found relevance following his term as Rio de Janeiro's planning secretary. Finding his way into the Federal government in a similar position following Lacerda's rise, he hopes to make efforts to deregulate and, more broadly, move the economy of Brazil to the economic right.§!"
 BRA_Virgilio_Tavora_hog_anocracy_desc: "§YVice President\nAnocracy§!\n--------------\n§LEven as he reclined in his sleek new residence in Brasília, Virgílio de Morais Fernandes Távora couldn't quite relax. From his moderate uncle, Juarez Távora, the UDN's candidate for the 1955 election, he inherited a sacrosanct duty. He had to make sure the President wasn't lost in his own fantasies.\n\nAs Governor of Ceará, he was known for his many construction projects, most of which were only possible because he had the energy and patience to collaborate with the local PSD. With this tendency towards dialogue, he knew he now played an important role in keeping Lacerda in check, ensuring he never forgets he is a mere President, not an emperor.§!"
 
 ##Távora Cabinet - Lacerda Failstate
 BRA_Vasco_Leitao_da_Cunha_tavora_for_desc: "§Y§!\n--------------\n§LLeitão da Cunha is not a man of great ideological principles, having worked under Vargas, Lacerda and now Távora. Ever the flexible diplomat, da Cunha remains within the Brazilian government as its stalwart Minister of Foreign Affairs, maintaining good relations with the only superpower he feels worthy of Brazil's attention.\n\nFollowing the one-two punches of the General Strikes and the Race Riots, da Cunha has been working overtime to assure the United States of Brazil's commitment to liberal democracy. Having earned a great deal of leeway from the State Department during his previous tenures, Washington remains largely supportive of da Cunha—so long as Brazil continues fighting for the righteous cause.§!"
 BRA_Helio_Beltrao_tavora_eco_desc: "§Y§!\n--------------\n§LA devout technocrat, Hélio Beltrão feels the descent of former President Lacerda like a knife in his side. Having failed to convince the Brazilian people of deregulation, having failed to help Lacerda suppress the unions during the General Strike, he can only watch as Távora cuts deals with leftist parties and maintains state control over the economy.\n\nBeltrão sits in his office, all his plans locked away in a cabinet, in a vault, where they will languish for a generation or more. He acts as Minister, but he does little more than sign papers and offer criticisms he suspects will go unheeded. And he will replay, again and again, all his missteps and failures, and at his lowest he will see the mirage in the eternal distance, the free market Brazil that he could not bring into being.§!"
 BRA_Golbery_do_Couto_e_Silva_tavora_sec_desc: "§Y§!\n--------------\n§LThough he holds some measure of respect for former President Lacerda in his heart, when the time came to remove him from office, Golbery do Couto e Silva did not shy away from his duty. He had failed to resolve the General Strike, and his administration had created the conditions for the Race Riots. Had he been allowed to oversee a third crisis, Couto e Silva and the Sorbonne feared the rise of radical forces.\n\nThe Minister of War remains at his post, keeping a watchful eye on Távora. The man seems reasonable enough, willing to compromise to maintain national stability. Yet Couto e Silva keeps a close eye on him. He generally likes what Távora has to say, and he thinks it would be a shame to have to throw out another President.§!"
 
 ##Adhemar Cabinet
 BRA_Laudo_Natel_hog_desc: "§YVice President\nRight-Wing Populism§!\n--------------\n§LOften called a prudish zealot, Vice President Laudo Natel hides his genius under false impressions. As common as it is to connect his reactionism with someone behind the times, Natel is technocratic, believing both in self-made men and ordained destiny. Even with many understandably ridiculing this hypocrisy, Natel's competence, as he proved in time, provides the faintest evidence that he might be right.\n\nAlthough his formal career already showed a diligent networker, Natel excelled as Adhemar's advisor during his governorship in São Paulo. Under his careful watch, the densely populated state underwent an unprecedented economic boom, for which Vargas Junior later took credit. The heir to the Brazilian throne is not an ungrateful man, and he's sure the wily courtier will serve him equally well on the national stage, for he understands a fellow traveler better than any naysayer.§!"
 BRA_Vasco_Leitao_da_Cunha_adhemar_for_desc: "§YMinister of Foreign Affairs\nLiberal Conservatism§!\n--------------\n§LLeitão da Cunha is not a man of much ideological preference, having worked under Vargas and now under Adhemar. Having been a diplomat since the 1930s and being the former Brazilian ambassador to the now-defunct Soviet Union, Leitão is content with his position- as long as he has a free hand to do what he wants.\n\nMore than anything, what da Cunha wants is a Brazil tied up to the most graceful democratic nation ever born from human strength, the United States of America, the leader of the OFN, the perfect enlightened state to ever grace mankind since its inception, and he shall fight to keep Brazil tied to their interests, as it is their right as they fight for a rightful cause, a cause that Brazil shall fight for, too.§!"
 BRA_Benedito_Manhaes_Barreto_eco_desc: "§YMinister of Finance\nRight-Wing Populism§!\n--------------\n§LAn engineer by profession, Benedito Barreto's first major governmental job was as President of the Banco do Brasil during the Washington Luís Presidency. During most of the New State dictatorship, he kept a low political profile working for private banks and firms, finally joining the newly created PSP in 1950.\n\nAs Adhemar's minister of economics, a strong supporter of Petrobras and the continuation of the industrialization of Brazil and already possessing some experience on political matters, Barreto's extensive knowledge has allowed him to use Adhemar's influence and corruption to support his plans with more efficiency than he would have under any other President.§!"
 BRA_Amaury_Kruel_sec_desc: "§YMinister of War\nDespotism§!\n--------------\n§LGrandson of German immigrants, Amaury Kruel had a very standard career in the Brazilian military, from the Forgotten Revolution in 1924 through the 1930 revolution, the 1932 civil war and World War II, being one of the field commanders of the Expeditionary Force in Britain. In the aftermath of the war Kruel became one of the most inspirational anticommunist and antifascist officers, documenting every suspect from his wide range of informants and ruining the careers of many in the process.\n\nWhile Kruel has his own ideals, his actions are sometimes driven by the interests of local oligarchs and friendly politicians, having worked with members of the Superior War School on every single coup attempt through the 1950s and 60s. His ministry is seen by many as the antithesis of what Lott planned, promoting the politicization of the army and its cooperation with foreign - especially American - agents.§!"
 BRA_Luis_Gonzaga_Novelli_Junior_for_desc: "§YMinister of Foreign Affairs\nRight-Wing Populism§!\n--------------\n§LJust like Adhemar, Luís Gonzaga Novelli Júnior hailed from São Paulo. Just like Adhemar, he graduated in Rio as a doctor. Just like Adhemar, he fought with the Paulistas in 1932. And under Adhemar, he served as vice governor of São Paulo.\n\nAfter marrying the stepdaughter of a certain Eurico Gaspar Dutra, the old marshal instilled in him the need for law-and-order and good relations with Germany. Together with Filinto Müller, Novelli led a staunchly pro-German faction in the PSP.\n\nNow that the Itamaraty needed someone with a few German contacts, there was no one else in the PSP more obvious a choice than Novelli.§!"

 ##Goulart Cabinet
 BRA_Tancredo_Neves_hog_desc: "§YChief of Staff\nNational Liberalism§!\n--------------\n§LTancredo Neves is a very known figure on the Brazilian political scene, eloquent, good natured, optimistic and strongly nationalistic, Neves began his political career in 1935 being elected as a city councillior by the Progressive Party. His mandate was extinct by the New State coup, thus most of the 1940s were spent improving his public image as a reliable lawyer in São Paulo.\n\nThe democratisation brought him to the Social Democratic Party, where he became a close ally of Juscelino Kubitschek, having used his connections to garantee the stability between all sections of the government. As a minister of economy Tancredo is a realiable banker who get things done. Sometimes he comments about his future plans to be the President of Brazil, a position that he's cleary capable of exercising with the utmost diligence.§!"
 BRA_Edna_Lott_hog_desc: "§YVice President\nProgressivism§!\n--------------\n§LBorn in 1919, Edna Lott's personality can be explained by the words of Sebastião Nery, "sweet and charismatic, enchanting with her words and her charm." Coming from a family of strong military tradition, Edna became influential in conservative and progressive women's movements for her work during Lott's presidency, making her a natural big tent female candidate.\n\nIn terms of ideals, Edna is an uncompromising supporter of democracy, favorable to civilian supremacy over the army, and a supporter of female participation in politics. If there is anything Edna Lott is known for, however, it's her unquestionable inability to take an insult sitting down.§!"
 BRA_Hermes_Lima_for_desc: "§YMinister of Foreign Affairs\nLeft-Wing Populism§!\n--------------\n§LTo Hermes Lima, politics is like a football game, where someone can start his career on a team and through a series of negotiations move towards the rival team in the future. Beginning his career as a progressive lawyer, Lima was arrested in 1935 after the failed communist coup due to his leftist sympathies, though with the democratization, Hermes jumped through parties until finally joining Vargas' PTB in 1953 through the influence of San Tiago Dantas, eventually becoming labor minister under Lott.\n\nAs a foreign minister, Hermes supports Afonso Arinos' ideal of an independent foreign policy, where Brazil won't be shackled by its European and North American masters and instead build its own sphere of influence trading with the Sphere, the Pakt, and OFN for its own gain. It is up to see if his promise can be kept, or if Brazil will remain under the American umbrella for the foreseeable future.§!"
 BRA_Celso_Furtado_eco_desc: "§YMinister of Finance\nLeft-Wing Populism§!\n--------------\n§LWhen Brazilians typically discuss economic policy, most of them think of Celso Furtado. A WWII veteran, Furtado saw some combat stationed in Northern Ireland through most of the war, being recalled after the late Allies' defeat. After serving at various foundations, Furtado was appointed the Minister of Economics of Juscelino Kubitschek, where he established the Plan of Goals and directed his Five Year plan for economic development.\n\nFurtado's objective is to build a great power out of Brazil, comparable to the USA or Japan, a country where the poorest don't suffer from hunger, and the richest don't have to deal with his plans failing, a "patriotic and humane capitalism" if you will. His plans, however, usually hit the wall of reality by not reaching the designed goals and being plagued with the constraints of corrupt government officials and lack of a specialized workforce, but Furtado is adamant that the dream is possible one, and with enough effort, Brazil will be not the country of the future, but the country of the present.§!"
 BRA_Argemiro_de_Assis_Brasil_sec_desc: "§YMinister of War\nDespotism§!\n--------------\n§LA military man through and through, Argemiro de Assis Brasil's career has been fraught with power struggles, revolution, and controversy. Born in 1907 in Canoas, he participated in the Constitutionalist Revolution of 1932 as a Lieutenant; eventually ending in his exile to Portugal for two years after the revolution's defeat. Fearing the growing influence of fascism within Europe affecting Brazil, his fears amplified following the Estado Novo coup only a year after he had been able to return. Now, however, he serves with much greater power - an influential leader of the Brazilian military, he hopes to strengthen the Army's recognition of the legitimacy of the current government, although privately relaying that such a task seems impossible.§!"

 ##JK Cabinet
 BRA_Joao_Goulart_hog_desc: "§YPresident of the Chamber of Deputies\n$progressivism_social_republicanism_subtype$§!\n--------------\n§LBorn from a family of Azorian immigrants, João Belchior Marques Goulart was already an adult when Getúlio Vargas chose him as his protegé when Vargas was vacationing in his home state of Rio Grande do Sul in the mid 1940s.\n\nGoulart, called "Jango", is now working under [Root.GetLeader] in the aftermath of his election. He plans to use this position to the best of his ability to improve the lives of the Brazilian people, prop up the economy, and support his own political ambitions, taking pride in Vargas' support for him.§!"
 BRA_Francisco_Negrao_de_Lima_for_desc: "§YMinister of Foreign Affairs\nLiberalism§!\n--------------\n§LNegrão de Lima started his political career as a deputy in 1933, being elected to a higher office in 1935 and later working as Brazil's ambassador to Venezuela in 1941 during the New State dictatorship. A natural ally of Vargas, Negrão worked as governor of Guanabara during Gomes' government and also as Juscelino Kubitschek, minister of Justice.\n\nWith the reelection of Juscelino, Negrão got recalled to his job from the Brazilian embassy in Iberia. In his new position he plans to keep to the diplomatic orthodoxy of balancing Brazilian independence with cooperation with the USA, Iberia and other Latin American nations. "Steady as she goes" shall be the operating term of his ministry.§!"
 BRA_Roberto_Campos_eco_desc: "§YMinister of Finance\nNational Liberalism§!\n--------------\n§LVocally economically right wing and technocratic, Roberto Campos now serves as a vital figure in Kubitschek's economic planning policy. Spending much time in the United States during his education, he developed an affinity for both the United States and the policies that it had developed - fiscal responsibility, prioritizing a balanced budget, and keeping government spending restrained. An ambassador to the United States in the past, Campos hopes to ensure that the Brazilian economy can naturally grow through a stable currency and low interest rates.§!"
 BRA_Peri_Constant_Bevilacqua_sec_desc: "§YMinister of War\nDespotism§!\n--------------\n§LA man of long career, Peri's first great act was helping Augusto Tasso Fragoso to depose Washington Luís during the 1930 Revolution, preventing a civil war. Having worked under Field Marshal Dutra during the early years of the New State, Peri organized the Brazilian defences on the coast in case of a German invasion. In the 1950s he was one of the officers who worked with Lott to prevent the coup that tried to prevent Juscelino Kubitschek from taking power.\n\nNow as Juscelino's minister of security, Peri plans to keep the military in order, the hardliners under control and the Brazilian interests protected from enemies inside and outside.§!"
 BRA_Augusto_Frederico_Schmidt_for_desc: "§YMinister of Foreign Affairs\nLiberalism§!\n--------------\n§LBorn on April 18th, 1906 in Rio de Janeiro, Augusto Frederico Schmidt is a very unique figure in President Kubitschek's cabinet. Grandson of the Visconde de Schmidt, one of the richest men in the former Brazilian empire, Schmidt is first and foremost an impresario and an intellectual. Known for his fortune and adventures such as his own line of Bookstores and his very own soccer club, Botafogo. He is, however, mostly known by the Brazilian people for his poetry books of a modernist and melancholic style. His bohemian lifestyle and Modernist ideals quickly brought to his eye the then young Juscelino Kubitschek, of whom he soon became an ardent supporter, a close ally, and close friend.\n\nThis would eventually result in him being nominated by JK during his presidency as Brazil's official ambassador in the OFN, and as the presidential Chief Foreign Policy Advisor, where he would be the main architect of JKs Pan American Operation. Now having achieved his long dream of becoming Brazil's very own foreign minister he alongside JK shall work to put Brazil in its rightful place alongside the great powers of the world.§!"

 ##Andrade Cabinet 
 BRA_Pascoal_Ranieri_Mazzilli_hog_desc: "§YInterim President\nInterim Government§!\n--------------\n§LA veteran, Mazzili fought in the Constitutionalist Revolution against Getúlio Vargas in 1932 and later had his first federal level position in 1942 as Director of the National Public Treasury. After democratisation he was elected as a federal deputee by the PSD in 1950 and has been reelected well into Lott's administration.\n\nNow with the country in crisis, Mazzilli is entrusted as Brazil's head of government under Auro de Moura Andrade. Being harmless, he poses no threat to democracy - nor will he be its great savior - instead, he simply spends his days hoping that maybe, by not looking at the problems, they might just go away.§!"

 ##Denys Cabinet
 BRA_Auro_de_Moura_Andrade_hog_desc: "§YPresident of the Federal Senate\nInterim Government§!\n--------------\n§LMember of one of São Paulo's most influential oligarchic families, Auro de Moura Andrade knew what he wanted, and where he was going, since his youth. Having taken a hard stance against Vargas' censorship, both of his newspapers, "A urna" and "O Democrata", got clausurated for failing to comply with said censorship. Elected to office in 1950, he changed parties between the PTN and the PSD, eventually reaching the position of President of Congress during Lott's government.\n\nBeing a great orator, Andrade proudly took it upon himself to announce the military coup that placed Denys on the presidency. Now as his second-in-Command, he expects that after this brief time of political hygienization, civility and the rule of law shall be restored for Brazil, something that HAS to be done, but, in passing thoughts, he begins to feel that maybe he might have done something that's gotten out of hand, of which not even he is safe from.§!"
 BRA_Juracy_Magalhaes_for_desc: "§YMinister of Foreign Affairs\nLiberal Conservatism§!\n--------------\n§LJuracy's career began in the 1930 Revolution, fighting through the Northeast against Loyalist forces. Being appointed as Governor of Bahia in 1931 and elected in 1934, he kept his position until the New State was established in 1937, which resulted in his resignation and made him turn into a bitter enemy of Vargas. With the definitive end of the dictatorship, he became a founding member of the UDN.\n\nNow, after the military coup, Juracy has been appointed as Minister of the Exterior by General Denys. His diplomatic position is clear from his words: "What is good for the USA is also good for Brazil", and it reflects the mindset of many under the new government, Brazil shall work along with the Leader of the Free World to protect their shared interests over the Americas.§!"
 BRA_Filinto_Muller_hog_desc: "§YVice President\nMilitary Junta§!\n--------------\n§LMüller, known as the one "who tortures," is notorious for his service as the head of Vargas' political police during his reign. Born in 1900, Filinto Müller participated in the Paulista Revolt, expelled after being deemed a deserter. Finding a role in the political and police spheres, he has continually amassed political clout over the course of his career; starting as a harsh police chief, then serving under Vargas as a key architect of the Estado Novo, he was able to gain prominence in the Senate under the PSD after Vargas' demise. Always sympathetic to the German Reich, he frequently uses his influential position in the current regime to drive policy in a pro-German, authoritarian bent.§!"
 BRA_Delfim_Netto_eco_desc: "§YMinister of Finance\nLiberalism§!\n--------------\n§L"Who is Delfim Netto?" was a common reaction when he got appointed as Minister of Finance. Being the Secretary of Planning of São Paulo during the early 1960s, Delfim Netto made enough connections to win Denys' favour, getting appointed to his cabinet after the coup.\n\nDelfim Netto is known for his unholy levels of corruption, cronyism, and for his wide net of connections.§!"
 BRA_Siseno_Ramos_Sarmento_sec_desc: "§YMinister of War\nMilitary Junta\n--------------\n§LThe son of veterans of the Paraguayan war, Syseno began his military career in 1923, fought for the 1930 Revolution, and helped to suppress the Constitutionalists in 1932 . Despite being an Integralist through the 1930s, he was ironically appointed to lead Brazilian troops in Britain during the Second World War. In the aftermath, he became a very known troublemaker, supporting the coup that tried to prevent Juscelino Kubitschek from taking power in 1955.\n\nNow as the Minister of Security under Costa e Silva, Sarmento also serves as a bridge between Plínio Salgado and the new government, while also trying to guarantee that the recently defeated forces won't try to bring the new government down, something he will kill for in order to prevent.§!"
 BRA_Costa_e_Silva_sec_desc: "§YMinister of War\nMilitary Junta§!\n--------------\n§LCosta e Silva has had a long career, one where his talent has allowed him to rise to the top of the military. He began his military career by entering the Military College of Porto Alegre, where he finished first of his class and commander of the cadet corps. From this moment he slowly rose through the ranks of the military, with only a slight stumble due to this involvement in the 1922 Tenentist rebellion where he was imprionsed for six months. Costa e Silva was finally promoted to general by his ally Eduardo Gomes and was further promoted by President Lott in 1961.\n\nDuring his career Costa e Silva has developed a few key ideological thoughts. The first was from his close career with the United States, where he briefly trained at. Silva believes Brazil's future remains tied to America and both nations should collaborate against the worlds threats. His second belief, was that the left wing was an ever present danger to Brazil and its way of life.\n\nHis final belief, is that it is the military who are the best group to run Brazil and this has made Silva a major figure within the hardliner movement.§!"

 BRA_Emilio_Medici_sec_desc: "§YMinister of War\nMilitary Junta§!\n--------------\n§LThe child of immigrants, Médici is nothing if not diligent. This is an adjective demonstrated throughout his career, ever since he worked his way up from being an apt pupil of the Military College of Porto Alegre to becoming a general in 1961, defending Brazil each step of the way. Perhaps it is this loyalty to Brazil that sees him believe in the supremacy of the military over civilian institutions.\n\nOr perhaps it is his close friendship with Artur da Costa e Silva. Nevertheless, unlike many other hardliners, Médici knows when to shut his mouth and when to speak. This endearing characteristic to any potential leader, alongside his extensive connections across the military and supreme work ethic, has neatly landed him in the position of Minister of War within the President's cabinet.§!"

 ##Adhemar Edna failstate cabinet
 BRA_Pedro_Aleixo_hog_desc: "§YPresident of the Chamber of Deputies\nRight-Wing Populism§!\n--------------\n§LQuintessentially Mineiro in his ways, Pedro Aleixo was one of the many who went through the traditional pipeline from the School of Law in the University of Minas Gerais into policymaking. A fervorous man at his youth, as the city councilor for Belo Horizonte years ago, he pitched his lot in with the liberal revolutionaries in 1930 and became a part of Mineiro Revolutionary League.\n\nHowever, just as his career was moving upwards, Vargas' dissolution of the federal congress quickly ruined the ambitions of the young congressman. In disgruntlement, he signed the Mineiros Manifesto and became a founding member of the UDN. Now a jaded old man, he did not expect one of Vargas' lot was returning to power so soon, but perhaps with Natel's and his own influence in the Chamber, he can make it as if this Labourist honeymoon never happened.§!"
 BRA_Evandro_Lins_e_Silva_for_desc: "§YMinister of Foreign Affairs\nProgressivism§!\n--------------\n§LA Pernambucanan born in Piauí to a household of law practitioners, Evandro Lins spent his childhood moving around Maranhão and Pernambuco for his father's duty as a municipal judge. When he left for Rio to study law and became a Media Lawyer, he grew more cosmopolitan as he worked with many newspapers throughout the years — until he joined the Order of Attorney Generals in Brazil in 1944.\n\nAlthough one of the signatories of the Mineiros Manifesto, Evandro Lins found himself leaving the UDN for the PSB as he grew to sympathize with Varguist populism, even once defending the Última Hora against Lacerda in court. Never before a diplomat, he nonetheless believes in his ability to adapt as Foreign Minister and bring about a more independent strategy to Brasília. Yet as many worry, he may still be too afraid and inexperienced to break away from the Great Game.§!"
 BRA_Vasco_Leitao_da_Cunha_for_desc: "§YMinister of Foreign Affairs\nLiberal Conservatism§!\n--------------\n§LAt youth , he once had an ambition to perform theatrics, the Rio native Vasco da Cunha nonetheless had a vivid diplomatic career not dissimilar to that of an actor, and now as Foreign Minister, it is his mission, the culmination of his life's work, to act and save the Brazilian majesty from the Pakt's bottomless malevolence — bringing her back to America's guardianship.\n\nBeginning his career in 1927, he had the chance of being the Second Officer stationed across Lima, Lisbon, and Buenos Aires, and at one point, appointed for peacekeeping in the Chaco. When he was later promoted to First Officer, he earned Vargas's trust and became the interim Justice Minister in 1942, pioneering Brazil's pro-American policies. Since then, he has consistently sided with Osvaldo Aranha's OFN-aligned clique, and so far, there seems to be little reason for that to change.§!"
 BRA_Romeu_de_Campos_Vergal_edna_eco_desc: "§YMinister of Finance\nSocial Nationalism§!\n--------------\n§LOriginating from an old and locally-influential Coroneis family in São Paulo, Romeu seemed destined to become the iron-minded economist he is today. Spending most of his youth in preparatory schooling befitting his class, he had, at the time, a particular passion for teaching which he made into a decade-long task. However, his entrance into politics was still inevitable, as he was elected a congressman of the Constituent Assembly of São Paulo in 1934 and remained until Vargas' putsch.\n\nDuring the Estado Novo, Romeu became a consultant for the CEDPEN, the predecessor of Petrobras. As Varguism fell out of favor, Romeu joined Adhemar's PSP and was reelected congressman, around the time founding a nationalist congressional coalition. Now as Economic Minister, it is up to him to consolidate the state's grip on natural resources, while bringing his old love for education to the masses.§!"
 BRA_Alfeu_de_Alcantara_Monteiro_sec_desc: "§YMinister of War\nDespotism§!\n--------------\n§LBrought up in Rio Grande do Sul, Alfeu entered Realengo in 1941 before transferring to be educated in aeronautics, where he earned the qualifications of an airman. Despite never having served at the frontlines, during the Second World War, he'd been stationed across the many airfields all across the vast expanses of Brazil. After the war, he was promoted to Senior Lieutenant out of seniority and has since then instructed B-25 bombers in Natal's air base.\n\nCalled upon to the duty of Security Minister for his non-ideological stance towards the PTB, contradictory to almost all of his contemporaries, Alfeu has long despised the treacherous politics within the Air Force. Now with the tools to enact his will, perhaps it's high time to instill some respect to the constitutional order, no matter how free-willed pilots may be.§!"
 BRA_Ignacio_Rangel_eco_desc: "§YMinister of War\nDespotism§!\n--------------\n§LIgnácio Rangel, coming from a lineage of Maranhense legal practitioners, embraced leftist militancy as a teenager after reading extensively on Marx as a bookish young lad. In 1935, influenced by his magistrate father's anti-government stance, the 21-year-old PCB activist joined Prestes' rebellion, landing in a São Luís jail before being moved to Rio, where he founded a reading club with a couple other inmates.\n\nReleased back to Maranhão in 1937, Rangel worked as a writer for the Conference of Productive Classes during Vargas' Estado Novo. A meeting in Rio with Romulo Almeida led him to Vargas' economic advisory, where he curated national projects such as Petrobras and Eletrobrás before becoming the Economic Chief for the BNDE. Now serving again in Lott's administration, he sees a future most grim — a hyperinflation crisis only preventable by Agrarian Reform beyond empty promises.§!"

 ##Braga Cabinet
 BRA_Rubens_Paiva_hog_desc: "§YVice President\nProgressivism§!\n--------------\n§LThe fact that PTB grandee Rubens Paiva, of opposing political stripes, of opposing opinions and even opposing personalities, must share the Planalto Palace with a conservative President must seem like a strange arrangement. That would be because it is, but as the saying goes, a bad agreement is better than a good fight.\n\nPaiva has not been known to make friends to the right of him: a furious supporter of the student movement in his university days and Vargas' nationalization campaign, his Chamber of Deputies speeches had much and yet little of it good to say about Germany's man Adhemar, or the coup apologist Lacerda. Nonetheless, with few remaining colleagues to his left in the workplace, he will have to try to work together with them, or bear the weight of failure alone.§!"
 BRA_Jose_Richa_eco_desc: "§YMinister of Finance\nLiberal Conservatism§!\n--------------\n§LThe youngest Minister of Finance since the Proclamation of the Republic and a son of Lebanese immigrants, José Richa, at the age of 36, is truly an unlikely story in Brazil's political history. Many a President would fear they have appointed a liability in this case, but not Ney Braga, who has confided in one of his staunchest Christian Democrats to steer Brazil's economy away from the abyss.\n\nWhat he lacks in political veteranship, he makes up for in his voraciousness in all things economics, particularly agronomics. He may thus have his strong opinions, but his time in Brasília has also equipped him with an instinct for moderation and compromise. And there will need to be compromise - for this crisis, the nation will need all its limbs to get out.§!"
 BRA_Ernesto_Geisel_Braga_sec_desc: "§YMinister of War\nDespotism§!\n--------------\n§LBeing in charge of the Ministry of War, as much as the name implies otherwise, is as much about the military as it is about order. In that, however, Ernesto Beckmann Geisel is a more than suitable pick. A leader of the Sorbonne wing of the armed forces, with values of discipline inculcated from his Lutheran upbringing to his rise as one of the nation's senior generals, his approach to his new job is simple: follow the rules.\n\nBut then, even the state's policeman has his principles. If it is believed by his friends in the barracks of the nation that the government is not fit for purpose, his arm might get twisted in the wrong direction, and it will be much more than the rules he has sworn to that might get broken. A man you can trust, but beware, for as with any military man, trust comes with many conditions.§!"
 BRA_Magalhaes_Pinto_for_desc: "§YMinister of Foreign Affairs\nChristian Conservatism§!\n--------------\n§LThere are few who know their own value like José de Magalhães Pinto. Blacklisted in 1943 from his old banking career as a co-signatory of the Manifesto dos Mineiros, he was a UDN federal deputy in two years and the mouthpiece of the Bossa Nova faction decades later. Needless to say, he has learned much about the game of musical chairs from the countless switches in careers and posts, and consequently no longer just speaks for a party faction, but for Brazil on the world stage.\n\nHis notorious views on the state might seem to make him incapable of the soft touch that the Itamaraty Palace might require. Far from it: once the papers reach his desk, it is pure pragmatism that wins his vote of confidence. After all, a wise decision must leave some people unhappy. One must be careful dealing with Magalhães Pinto: from the very first phone call, all bets are off.§!"

 ##Raphael Cabinet
 BRA_Magalhaes_Pinto_hog_raphael_desc: "§YVice President\nChristian Conservatism§!\n--------------\n§LThe fast-thinking radical of the liberal coalition that is the UDN, Magalhães Pinto is the very idea of hardline nationalism manifest. After being blacklisted from his banker job for signing the famous Manifesto dos Mineiros, Pinto became a full-time politician and climbed the ranks into becoming the UDN's federal deputy in two year's time. Excellent in the game of musical chairs, he had played both allies and enemies to many of his colleagues, and now, his expert maneuvering has paid off as he sits in the Planalto alongside young Raphael.\n\nWhile many doubt his controversial views will do any good in the second most public office of Brazil, Pinto is a man who knows what he is looking for in everything. Despite taking the authority of Vice Presidency, he will remain the pragmatist as always, waiting for the mice to tire themselves out before striking them down.§!"
 BRA_Oscar_Dias_Correia_eco_desc: "§YMinister of Finance\nLiberal Conservatism§!\n--------------\n§LModernity is sobering for many folks — for either its oppressiveness or unfamiliarity. But Oscar Dias Correia sees no so-called "hegemony of the capital" as an impediment to becoming the Minister of Finance. If anything, Correia's acumen for working within the institution propelled his public career and, perhaps more importantly, made him an honored chair within the Academy of Letters, which the one-time author is not afraid of flaunting.\n\nA veteran of the UDN for decades, Correia is a self-proclaimed "anti-socialist." As he once worked under Vice President Pinto's governorship of Minas Gerais as the Secretary of Education, Correia is still a grandiose man. In his mind, Brazil's crises are entirely solvable under the free market's tenets. Whether this dogmatism may be the nation's saving grace remains to be seen, for if it proves a misconception, his legacy shall be marred eternally.§!"
 BRA_Jurandyr_De_Bizarria_Mamede_sec_desc: "§YMinister of War\nDespotism§!\n--------------\n§LSince the beginning of mankind, those most inclined to handling the brass had never been the ones most benign or amicable, and a man driven by a cause which he would die for makes the best of commanders. Jurandyr de Bizarria Mamede was one of those grunts who stood for the anti-Varguist cause even during the peak of Kubitschek and Vargas' command. Nowadays, in Lacerda's stance of taking Brazil into an opposite direction from gutless populism, he has become the Minister of War, both against intrusion and subversion.\n\nArguably a key figure who brought about Lott's ascendency, Mamede is no brainless brute either, yet he knows no restraint in championing for righteousness. The very general who hollered about deposing Kubitschek in a funeral will likely prove an indispensable, yet uncontainable political asset.§!"
 BRA_Juracy_Montenegro_Magalhaes_for_desc: "§YMinister of Foreign Affairs\nLiberal Conservatism§!\n--------------\n§LA former military man and the one-time governor of Bahia, Juracy Magalhães is a proper tenentista who stood by Vargas when he reigned undisputed, and has now obtained a seat as the Minister of Foreign Affairs in Raphael's gilded elite circle. He was one of those moderates who aligned with the Varguists in hopes of ending the oligarchy of the Republicans, and eventually, became known as one of the Estado Novo's finest in suppressing the Integralists.\n\nNowadays, Magalhães has become the figurehead of the centrist "Realistas" bloc within the UDN, bringing along an amenable strategy into party politics and pushing for a strengthened alliance with the United States. Ultimately, against the accusations he'd received from the far-right for being a "foreign bootlicker", he does not see himself as any kind of traitor. For if anything, Brazil can only survive the Cold War with her good allies.§!"
 
 ##Vargas Jr. Cabinet
 #BRA_Laudo_Natel_hog_desc: "§YVice President\nRight-Wing Populism§!\n--------------\n§LOften called a prudish zealot, Vice President Laudo Natel hides his genius under false impressions. As common as it is to connect his reactionism with someone behind the times, Natel is technocratic, believing both in self-made men and ordained destiny. Even with many understandably ridiculing this hypocrisy, Natel's competence, as he proved in time, provides the faintest evidence that he might be right.\n\nAlthough his formal career already showed a diligent networker, Natel excelled as Adhemar's advisor during his governorship in São Paulo. Under his careful watch, the densely populated state underwent an unprecedented economic boom, for which Vargas Junior later took credit. The heir to the Brazilian throne is not an ungrateful man, and he's sure the wily courtier will serve him equally well on the national stage, for he understands a fellow traveler better than any naysayer.§!"
 BRA_Romeu_de_Campos_Vergal_vargas_jr_eco_desc: "§YMinister of Finance\nRight-Wing Populism§!\n--------------\n§LVarguism is a foregone faith that becomes rarer every day with the liquidation of old guards. Romeu Vergal, as one of its final stewards, maintains no delusion of reviving an ember that has no place in the contemporary PSP. Although Vargas Junior had sidelined most populist influences from his father's era, somehow Vergal remained a player within the government as a dead man walking. One salmon cannot swim against the current, and he becomes the Minister of Finance with the knowledge of this grim parable.\n\nVergal never endorsed the degenerate individualism that has now corrupted the Brazilian spirit, and perhaps his new post is the merciful euthanization of this age past. Recognizing his comrades either gone compromising or left in shallow graves, Vergal is not just himself close to retirement — he is emblematic of a disappearing breed of men formed by idealism and vigor.§!" 
 BRA_Filinto_Muller_sec_desc: "§YMinister of War\nDespotism§!\n--------------\n§LAs Trujillo had the caliés and Hitler had the SS, Filinto Müller is Brazil's most influential sanctioned thug. Born a German, Müller's career began when he engaged in the São Paulo revolt of 1924. As expected, Müller promptly deserted when the tide turned against the mutineers. Later on, as his military life grew into the Vargas presidency, he became Rio's Chief of Police, which quickly turned a bloody affair under the dictatorial regime.\n\nFor a decade, Müller earned a name as the 'executioner' of the Estado Novo, ordering the arrests of any suspected communist elements, as well as enforcing the antisemitic measures of the regime. Those days are long behind, however, and today, his reputation does not precede an aging body and declining cognition. No one celebrates a butcher appointed the Minister of War, but who is more reflective of Brazil's rotten realities than PSP's dying tiger?§!"
 BRA_Luis_Gonzaga_Novelli_Junior_for_vargas_jr_desc: "§YMinister of Foreign Affairs\nRight-Wing Populism§!\n--------------\n§LGetúlio Vargas was always accused of fascistic tendencies; the experience of the Estado Novo clung to the man's reputation like a shroud which he could not (or perhaps did not want to) take off. Many preferred to repudiate the prospect, but there were some who embraced the reputation regardless of the hit to personal prestige or political influence. Minister of Foreign Affairs Luís Novelli Júnior is just such a man.\n\nThe Foreign Affairs Minister admires order and hierarchy above all else—and looks to Germany for a model thereof. He looks, therefore, to distance himself from the American juggernaut of hedonism and individualistic disorder in small steps. While avoiding retaliation to the best of his ability, Novelli Júnior aims for an independent Brazil adopting at least some of the ideals of the triumphant Reich.§!"

 ##Salgado Cabinet
 BRA_Ulysses_Guimaraes_hog_desc: "§YVice President\nNational Liberalism§!\n--------------\n§LUlysses Silveira Guimarães has always bound himself to act as a defender of the rule of law, free elections, and other similarly important democratic mores. Today, above all else, that attitude is crucial—for Guimarães finds himself deputy to an executive power that is under siege.\n\nGuimarães does not like this juxtaposition, not one bit. An arch-democrat subordinate to a volatile, authoritarian quasi-fascist trying to create an "integral" republic and demolish all that his predecessors slaved away to achieve? This cannot be borne. Small wonder, then, that there are rumours of a civilian democratic conspiracy.§!"
 BRA_Santiago_Dantas_for_desc: "§YMinister of Foreign Affairs\nIntegralism§!\n--------------\n§LSan Tiago Dantas travelled to several political homes after the first demise of integralism. He found himself among the Trabalhistas for a long while, and spent a long time militating for a "positive" leftism against what he called the negative left led by Brizola. But Dantas felt that the man was gaining too much influence, and in any case Salgado had just been elected president—so he rekindled his old acquaintances and was abruptly made Minister of Foreign Affairs. "Probably because Salgado's deputies would manage to insult a brick wall," Dantas snarks to himself.\n\nDantas seeks an anti-capitalist and anti-socialist way forward, adhering to his own version of the PEI—Independent External Politics—theory to render Brazil a more powerful and most importantly neutral actor on the world stage. This theory appeals to Salgado, which is why they have a good rapport. But the Foreign Minister has colleagues in the more mainstream parties whose opinion he also very much values. Dantas wants the Executive Power to watch itself in respect to foreign affairs, avoiding unilaterally doing things of which Dantas may not approve.§!"
 BRA_Jose_Alkmin_eco_desc: "§YMinister of Finance\nDespotism§!\n--------------\n§LA backstabber and opportunist par excellence, José Maria Alkmin is trusted by very few people. There are those that have complained that it is better to have God himself as an enemy than Alkmin as a friend. Undeterred by disgust or popular distaste, Alkmin stabbed one person after another in the back. Eventually enough people fell over thus that Alkmin was finally able to see his plans come true—but in such a disgusting manner? Perhaps God has in fact gone to war with him, Alkmin muses.\n\nWhat sort of merit or dignity is there in serving as minister of finance under a crazed, unpredictable man with a hodgepodge ideology and a fanatical, violent mob adhering to his every word? The Minister of Finance obsesses about the permanency of his position, and is prepared to return straight to his usual norms to keep it.§!"
 
 ##Neves Cabinet
 BRA_Magalhaes_Pinto_hog_neves_desc: "§YVice President\nChristian Conservatism§!\n--------------\n§LIt is well known that Magalhães Pinto, despite his many talents, is not a man to be trusted. A consummate politician, he is adept at making friends and building influence - and just as quickly betraying them and spending it. A native of Minas Gerais and prominent critic of the Vargas regime, he was a prominent signatory of the Mineiro Manifesto, heralding the fall of the Estado Novo. A longtime peer and political competitor of Neves, Pinto even defeated him in the 1960 Minas Gerais gubernatorial election - and yet now finds himself subordinate. Though outwardly conciliatory on the outside, his new position makes it clear that Neves well understands the maxim about keeping enemies close.§!"
 BRA_Sebastiao_Almeida_eco_desc: "§YMinister of Finance\nNational Liberalism§!\n--------------\n§LA longtime figure in the Kubitschek administration, first as the head of the Banco do Brasil and later as the Governor of Minas Gerais, Sebastião Paes de Almeida is a PSD loyalist, well-known dealmaker, an industrial expert, and a staunch proponent of state stimulus spending. Agreed upon as the natural choice for the Finance Ministry in the Neves cabinet, his long experience in financial matters nonetheless will be well challenged. The ongoing effects of the Oil Crisis weigh heavy on Brazil, and past missteps regarding inflationary controls have given rise to a growing body of critics. §!"
 BRA_Euler_Monteiro_sec_desc: "§YMinister of War\nNational Liberalism§!\n--------------\n§LMany consider Euler Bentes Monteiro to be a man inextricably bound to the ghost of Vargas. He was there in 1945, removing the dictator. He was there in 1950 to oppose Vargas upon his return. He signed the Manifesto dos Coronéis to oppose Vargas' attempts to double the minimum wage, causing the downfall of the then-Minister for Labor, João Goulart. And now he finds himself the Minister of War in the Cabinet of the man who was once Vargas`Minister of Justice. A staunch nationalist, he was among the earliest proponents of oil nationalization and the creation of Petrobras, and though he may have personal conflicts with Naves, all would agree that for Montiero the stability of Brazil is, was, and always will be first in thought and deed.§!"
 BRA_Jose_Rodrigues_for_desc: "§YMinister of Foreign Affairs\nNational Liberalism§!\n--------------\n§LAn unexpected, but by no means unknown, pick for the Foreign Affairs Ministry, José Honório Rodrigues is a well-known and flamboyant figure, devoted just as much to the Flamengo football club as he is to his careful knowledge of history. A Rockefeller scholar to Columbia University during the war, he rapidly ascended the ranks of the National Library of Brazil, quickly becoming the director of the National Archives. A pioneer in the field of Brazilian historiography, a frequent contributor to the Jornal do Brasil (with a well-known anti-UDN perspective), and possessing a noted interest in exploring Brazil`s links to Africa, he was personally selected by Neves as a 'perfect' candidate for the position.§!"
 
 ##Brizola Cabinet
 BRA_Darcy_Riberio_hog_desc: "§YVice President\nNational Liberalism§!\n--------------\n§LA native of Minas Gerais who'd moved to São Paulo to pursue fame and prominence — Darcy Ribeiro was an anthropologist by trade. Joining the world of public services as an ethnologist for the SPI, one of his early achievements was the opening of the Museu Nacional do Indio in 1953, the crowning jewel of his myriad of works concerning decolonization. His dedication to his craft was rewarded by Juscelino Kubitschek when he was invited alongside his friend, Anísio Teixeira, to found the University of Brasília.\n\nAlthough not much of a political adventurist, Ribeiro has become captivated by Leonel Brizola's nationalist methods, which prompted his decision to advance through the PTB hierarchy. Now nominated as the Vice President, although comparatively inexperienced, Ribeiro is motivated by nothing but a selfless desire to aid the president in shaping Brazil's future properly.§!"
 BRA_Romulo_Almeida_eco_desc: "§YMinister of Finance\nReformist Socialism§!\n--------------\n§LIndustry is a gift that few can master, and the Bahian Rômulo Almeida found himself the rare ones given such a privilege. A law graduate who had moved to Rio, young Rômulo was immediately enamored by economics despite his unrelated qualifications. Under similar circumstances, he was also introduced into politics by a friend — whose influence had made him a lifelong nationalist.\n\nHaving gone from a socialist to an AIB agitator, Rômulo had been arrested during Vargas' regime like many Integralists. However, in 1945, the President chose to invite the autodidact into the position of economic advisor in CHESF Electrics. Shortly after the dictatorship's end, he returned to the political world and joined the PSF as a congressman — advocating for developmentalism and self-sufficiency, the same values which he hopes to bring to the impoverished North now as Economic Minister.§!"
 BRA_Oromar_Osario_sec_desc: "§YMinister of War\nDespotism§!\n--------------\n§LWell-respected for his command over both the living and the machine, Oromar Osório was the commander of the 1st Cavalry Division in Rio Grande do Sul since 1961. Coming from Rio, the good-hearted general has been an open supporter of Brizola throughout the fledgling politician's entire career, being one of the few providing him endorsement during his tenure as governor.\n\nAppointed out of both the prestige he wields and political loyalty, Osório sees his peers progressively more disaffected by Brizola's plans of radical military reforms. Between the collapse of national unity and retaining the regressive methods of the Brazilian Armed Forces, he shall be the president's whip to enforce constitutional order upon his more unruly colleagues.§!"
 BRA_Azeredo_da_Silveira_for_desc: "§YMinister of Foreign Affairs\nNational Liberalism§!\n--------------\n§LLike many other scions of political dynasties, Azeredo de Silveira was born with one foot in the playing fields of Brasília, his father a congressman for Mato Grosso and Guanabara, and his grandfather a senator. While regional politics was his family's expertise, Azerado, the rebellious fifth child of seven, chose to pursue the unconventional profession of diplomacy. Entering the international world stationed in Argentina during Vargas' final days, he had a stint in Japan when Gomes came to power.\n\nA pariah opposed to the Itamaraty's rigid pro-American approach, Azeredo believes in the swaying force of Brazil's geopolitical potential. Although seen by many contemporaries as too "soft" against the Argentinians, it remains undoubted that he has realized the nation must go beyond being a pawn in America's games, even if it means warming up to Tokyo and Buenos Aires.§!"
 
 ##Edna Cabinet
 BRA_Ulysses_Guimaraes_edna_hog_desc: "§YVice President\nNational Liberalism§!\n--------------\n§LUlysses Silveira Guimarães has always bound himself to act as a defender of the rule of law, free elections, and other similarly important democratic mores. Today, above all else, that attitude is crucial—for Guimarães finds himself deputy to an executive power that is under siege.\n\nGuimarães is happy that Edna is in power. Despite being more centrist himself, he admires her ideas. There is fear, though: he knows that there are any number of lunatics that do not share that admiration and might threaten Edna's position. Though Edna's military relatives and loyalists may defend her, their work may not suffice; the jackals of degenerate radicalism are always ready to try and maim the President. So Ulysses braces himself for impact and gets back to work, forever ready to act as a shield of democracy.§!"
 BRA_Tancredo_Neves_edna_eco: "§YMinister of Finance\nNational Liberalism§!\n--------------\n§LTancredo de Almeida Neves, a born diplomat, relies on moderation and compromise above all else. It is for this reason that the Varguist coalition respects him as a nonpareil political operator. His financial knowledge, on the other hand, is unmatched by most outside of economics faculties. It made sense to the PSD-PTB coalition, then, that Edna appointed Tancredo Minister of Finance.\n\nTancredo's remit is straightforward only in theory. The economic crisis must be solved, and the rocky financial landscape bedeviling all levels of society and business must be smoothed out. Brazil's economy must return to normality, if not to prosperity. Tancredo hopes, as does Edna, that a moderate course will bring that about.§!"
 BRA_Peri_Constant_Bevilacqua_edna_sec: "§YMinister of War\nDespotism§!\n--------------\n§LAny army being attacked on all fronts will know that what it needs above all else is good defense. For Edna Lott's encumbered cabinet, that job goes to Peri Bevilacqua, who takes charge not only of defending the nation, but also the government from his fellow military brass: sure enough, the vultures already seem to be circling overhead.\n\nGeneral Constant Bevilacqua, a no-nonsense Constitutionalist yet artillery general who fought in Europe all those years ago, has his work cut out for him as Minister of War: an administration with such an abundance of enemies has left the more radical wing of the armed forces smelling blood. He must find that their love of country outsizes their love of power, or it will be on his watch that the khaki green swarms flood Brasília to take it for themselves, just as they have always been itching to do.§!"
 BRA_Hermes_Lima_edna_for: "§YMinister of Foreign Affairs\nLeft-Wing Populism§!\n--------------\n§LLike many senior politicians before him, Hermes Lima is a former legal professional who has now transferred his power to interpret into power to lead. In his case, this will mean leading the public relations campaign that is Brazilian foreign relations, and thus he will become President Edna Lott's diplomat in chief and key contact overnight.\n\nHowever, he is unlikely to be a pioneer of very much else. A fierce opponent of the Estado Novo and equipped with mildly socialist or rather humanistic instincts, Lima's true convictions are on human rights and the law which he has seen abrogated so unjustly for so long. What will come of many of Mrs. Lott's new appointments is not yet known, but with Lima it may as well be: following the script and reading it tactfully, with only vague pretences of the greater good.§!"

