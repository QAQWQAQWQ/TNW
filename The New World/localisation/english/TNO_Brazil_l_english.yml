 brazil.1002.t: "A Most Fruitful of Years"
 brazil.1002.desc: "[BRA.GetLeader] sat at their desk in the presidential office with the Minister of Finance sat across from them. Slightly nervous, they ask for the year-end economic figures; it's a make or break moment for the government, with severe electoral implications should they not meet their lofty goals.\n\n"The figures show we have met both our GDP growth and inflation reduction targets for the year, despite the ambitous targets of [?BRA_TargetGDPGrowth] billion in GDP and a [?BRA_TargetInflation]% inflation rate that we set ourselves last year. Our people will be richer, and their goods cheaper."\n\nThe Minister of Finance, evidently exceedingly proud of their achievements, glances back over to [BRA.GetLeader], awaiting their response."
 brazil.1002.a: ""This will benefit our electoral chances greatly, outstanding work.""

 brazil.1003.t: "A Successful Year, Economically Speaking"
 brazil.1003.desc: "[BRA.GetLeader] sat at their desk in the presidential office with the Minister of Finance sat across from them. Slightly nervous, they ask for the year-end economic figures; it's a make or break moment for the government, with severe electoral implications should they not meet their lofty goals.\n\n"The figures show we have met only one of our economic targets for the year, likely due to the ambitous targets of [?BRA_TargetGDPGrowth] billion in GDP and a [?BRA_TargetInflation]% inflation rate that we set ourselves last year. Regardless, our people will be better off."\n\nThe Minister of Finance, reasonably content of their work, glances back over to [BRA.GetLeader], awaiting their response."
 brazil.1003.a: ""This will benefit our electoral chances, good work.""

 brazil.1004.t: "Great Expectations, Broken Trust"
 brazil.1004.desc: "[BRA.GetLeader] sat at their desk in the presidential office with the Minister of Finance sat across from them. Slightly nervous, they ask for the year-end economic figures; it's a make or break moment for the government, with severe electoral implications should they not meet their lofty goals.\n\n"The figures show we have failed to meet our economic targets for the year; the targets of [?BRA_TargetGDPGrowth] billion in GDP and a [?BRA_TargetInflation]% inflation rate that we set ourselves last year were simply too ambitious to meet."\n\nThe Minister of Finance, shuffling nervously in their seat, evidently dissapointed in themselves and dreading the President's response, glances back over to [BRA.GetLeader], awaiting their response."
 brazil.1004.a: ""This has harmed our electoral chances greatly, as well as military loyalty. I expected better.""

 brazil.1005.t: "The Now Invisible Hand"
 brazil.1005.desc: "[BRA.GetLeader] sat at their desk in the presidential office with the Minister of Finance sat across from them. They'd hardly had time to move into their new office and recover from the campaigning of the Presidential Election. With documents, bits of furniture, even personal effects of both the incoming and outgoing government lay around the office. They'd had a note come through from the Ministry of Finance's economic development office concerning last year's economic goals.\n\n"Ambitious." The Minister of Finance retorted.\n\n"Exceedingly, but regardless of whether they managed to meet them or not, previous administrations have laid down the gauntlet in that respect, and the voters will not accept failure.""
 brazil.1005.a: ""In which case, we must ensure our success.""

 brazil.1006.t: "Black Gold, Red Sands, Angry Streets"
 brazil.1006.desc: ""...On a separate note, we must address the elephant in the room, the emerging situation of chaos in the Middle East. I got the Chief of Staff's report today, and it appears that the situation is not going to be resolved any time soon-"\n\n"Which means no oil shipments from the Middle East for the foreseeable future."\n\nThe finance minister quickly cut the president off. They both knew the score, and it was anything but good for the country. As [BRA.GetLeader] retrieved a 'relaxing drink' from the beverage globe in the corner of the room, the Minister thought, then laid out a strategy.\n\n"We should talk to Petrobras; they had plans, we had plans, and it looks like we're going to have to subsidize them to keep the ship afloat."\n\n"A discussion for another time, Minister, but the fact is we're going to have to lower the targets. We won't meet them, and if we do it now, the people will understand."
 brazil.1006.a: ""Agreed. I'll start drafting a speech for tommorow.""
 BRA_OC_Goals: "§RWe will cut our GDP and inflation reduction targets in half for the next year, due to the Oil Crisis.§!"
 
 
