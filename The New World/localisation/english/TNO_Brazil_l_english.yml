 BRA_military_info_normal_tt: "§FBrazil's §YArmed Forces§! have been a constant source of concern for Brazil's government, even more so after the failed 1955 coup attempt. The military is plagued by debilitating §YNepotism§! which impairs combat readiness, and §GLoyalty§! of military leadership is tenuous at best.\n\nInternally, the military faces a power struggle between three groups: the pro-democracy £BRA_constitutionalists_texticon §KConstitutionalists§!, the moderate £BRA_sorbonne_texticon §QSorbonne§!, and the antagonistic £BRA_hardliners_texticon §gHardliners§!. The faction in control and level of military §GLoyalty§! will determine how much §Rinstability§! the military will tolerate before §Rintervention§! is seen as the only option.\n\nThe President must act wisely, for their actions towards the military and on issues of national security will affect all of these properties.§!"
 BRA_Adhemarist_military_info_tt: "§FBrazil's §YArmed Forces§! have been a constant source of concern for Brazil's government, even more so after the failed 1955 coup attempt. The military is plagued by debilitating §YNepotism§! which impairs combat readiness, and §GLoyalty§! of military leadership is tenuous at best.\n\nInternally, the military faces a power struggle between four groups: the pro-democracy £BRA_constitutionalists_texticon §KConstitutionalists§!, the moderate £BRA_sorbonne_texticon §QSorbonne§!, the antagonistic £BRA_hardliners_texticon §gHardliners§!, and the growing influence of the overtly political £BRA_psp_texticon §hProgressistas§!. The faction in control and level of military §GLoyalty§! will determine how much §Rinstability§! the military will tolerate before §Rintervention§! is seen as the only option.\n\nThe President must act wisely, for their actions towards the military and on issues of national security will affect all of these properties.§!"
