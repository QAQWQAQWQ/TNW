 ###Ideas "Amógus. Vai Brasil."
 BRA_map_openbutton_tt: "Open Federal GUI"
 BRA_democracy_survives: "Democracy Survives!"
 BRA_democracy_survives_desc: "The Army has played its hand, but found itself wanting. Regardless of the candidate we've installed as interim President, we've installed one.\n\nOur democracy, though bleeding, still survives to live another day, at least until we hold proper elections. While we can't fool ourselves into thinking another coup attempt won't ever happen again, we can hold our heads high, look at the foes of democracy, say proudly:\n\n§nDemocracy lives.§!"
 BRA_idea_rampant_corruption: "Unchecked Corruption"
 BRA_idea_rampant_corruption_desc: "If Brazil had a disease, even a child would tell you that it is corruption. Political corruption and its consequences plague Brazil, from the local town council, to state governments, to the army and federal government as well.\n\nIts prevalence proves a problem to every leader, as people do not work for the greater good of Brazil but for personal benefits. Political corruption will need to be removed from its roots, lest future governments continue to be plagued by its consequences. But while some leaders may fight against it, some may embrace it."
 BRA_idea_rampant_corruption_med: "Rampant Corruption"
 BRA_idea_rampant_corruption_med_desc: "To stabilize our government we've turned a blind eye and cut some deals with the local oligarchs. After the Hundred Days, anything is fair game to keep our democratic government afloat, and if worsening our problem for the sake of longevity is what it takes, then so be it."
 BRA_idea_rampant_corruption_high: "Unbridled Corruption"
 BRA_idea_rampant_corruption_high_desc: "Adhemar stabilized his government, at the cost of the control of our own political corruption and system. But, as long as Brazil still keeps a President elect, then everything will sort itself out!\n\n§xRight?§!"
 BRA_idea_the_war_on_corruption: "The War on Corruption"
 BRA_idea_the_war_on_corruption_desc: "Corruption is a slow and insidious killer, sucking the efficiency away from our government like a leech. How can Brazil expect to make any progress with such a disease ailing it?\n\nThe only suitable course of action is to exterminate this plague without remorse. Offenders will be cast out from their governmental offices and sent to prison cells, paraded in front of the public as examples of what will happen if you accept money on the side. Only through ruthless action can any semblance of progress be made so that order is restored."
 BRA_idea_lacerda_corruption_reforms: "Anti-Corruption Reforms"
 BRA_idea_lacerda_corruption_reforms_desc: "The government should never function based on one's connections, but one's ability, a belief that Lacerda has championed during his time in office. To put this belief into actions, reforms have been passed to crack down on corruption, assessing the ability of the public service to actually serve the public through regularly scheduled audits.\n\nThe power of swing in Brazilian government will soon come to a standstill, replaced by the sleek efficiency championed in American public office."
 BRA_rapid_industrialisation: "Rapid Industrialisation"
 BRA_rapid_industrialisation_desc: "As time goes on, Brazil has found itself becoming an increasingly industrialized nation. Dozens of new factories are being set up to fuel Brazil's economy. This has caused a boom in population as well as GDP growth.\n\nWith the rapid pace of industrial growth, Brazil is becoming a state more reliant on oil from both Petrobras and the Middle East. If the oil supply remains stable, Brazil will soar." #
 BRA_idea_Lobster_conflict: "Lobster War"
 BRA_idea_Lobster_conflict_desc: "A conflict known as the "Lobster War" has been occuring for months in the Atlantic waters near Brazil. African and German fishing vessels are constantly breaching Brazil's territorial waters, while Brazilian fishermen suffer from having their rightful catch stolen and boats attacked when confronting these vessels. It is up to Lott to address this threat and win the Lobster War, using any means necessary."
 BRA_idea_Lobster_conflict_2: "Lobster War"
 BRA_idea_Lobster_conflict_2_desc: "A conflict known as the "Lobster War" has been occuring for months in the Atlantic waters near Brazil. African and German fishing vessels are constantly breaching Brazil's territorial waters, while Brazilian fishermen suffer from having their rightful catch stolen and boats attacked when confronting these vessels. It is up to Lott to address this threat and win the Lobster War, using any means necessary."
 BRA_idea_Lobster_conflict_3: "Lobster War"
 BRA_idea_Lobster_conflict_3_desc: "A conflict known as the "Lobster War" has been occuring for months in the Atlantic waters near Brazil. African and German fishing vessels are constantly breaching Brazil's territorial waters, while Brazilian fishermen suffer from having their rightful catch stolen and boats attacked when confronting these vessels. It is up to Lott to address this threat and win the Lobster War, using any means necessary."
 BRA_idea_Lobster_conflict_4: "Lobster War"
 BRA_idea_Lobster_conflict_4_desc: "A conflict known as the "Lobster War" has been occuring for months in the Atlantic waters near Brazil. African and German fishing vessels are constantly breaching Brazil's territorial waters, while Brazilian fishermen suffer from having their rightful catch stolen and boats attacked when confronting these vessels. It is up to Lott to address this threat and win the Lobster War, using any means necessary."
 BRA_idea_Lobster_conflict_5: "The Aftermath of the Lobster War"
 BRA_idea_Lobster_conflict_5_desc: "Despite the Lobster War coming to an end after two years, Brazil's territorial waters are still being constantly breached by African and German fishing vessels.\n\nThis has left Brazilian fishermen suffering, with their rightful catch being stolen and their boats attacked when confronting these thieving vessels. The continuation of this conflict is not only a stain on Lott's political career, but also a national embarrassment for Brazil."
 BRA_idea_Bountiful_Harvest: "The Bountiful Harvest"
 BRA_idea_Bountiful_Harvest_desc: "Thanks to the efforts of President Lott and the Brazilian government, the Lobster War has ended in a victory for our people. The Germans and other assorted parasites fishing in our waters have been successfully driven out, and our fishermen are now free to fish as much as they want, free from the risk of being harassed. We may expect a major uptick in lobster and other seafood revenues for about six months."

 BRA_idea_RK_settlement: "Brazil-Zentralafrika Settlement"
 BRA_idea_RK_settlement_desc: "Negotiations for the Lobster War have concluded, with a fair deal that both sides have agreed upon. The conflict is over and stability can return to the region, with both parties getting what they wanted out of the negotiations."
 BRA_idea_RK_settlement_good_cg: "Great Brazil-Zentralafrika Settlement"
 BRA_idea_RK_settlement_good_cg_desc: "Negotiations for the Lobster War have concluded, and we have walked out of the negotiations with a massive bounty! The conflict is over and we have demonstrated our might over the opposing side; Brazil's seafood belongs to us, and us alone."
 BRA_idea_RK_settlement_small_good_cg: "Good Brazil-Zentralafrika Settlement"
 BRA_idea_RK_settlement_small_good_cg_desc: "Negotiations for the Lobster War have concluded, and our negotiators were able to secure a favorable agreement for our side. The conflict is over, and our fishermen can return to Brazilian waters to safely fish and enjoy the fruits of their labor."
 BRA_idea_RK_settlement_small_bad_cg: "Bad Brazil-Zentralafrika Settlement"
 BRA_idea_RK_settlement_small_bad_cg_desc: "Negotiations for the Lobster War have concluded, but there is a general sentiment that we could have gotten much more out of the negotiations. The conflict is over at least, and we are still receiving some compensation over the fishing in Brazilian waters."
 BRA_idea_RK_settlement_bad_cg: "Horrible Brazil-Zentralafrika Settlement"
 BRA_idea_RK_settlement_bad_cg_desc: "The Lobster War has ended... But at what price?\n\nOur negotiators have given much concessions, and received very little guarantees in return. At home, public opposition has not been contained to those who make a living from the sea's bounty. The people ask why their leadership has given up so easily to the enemy. After all, more than lobster was at stake!\n\nPopular anger is not everything, however. The War is over, and our government is free to focus on new concerns. Our former enemies might have conceded little, but this imperfect peace is much preferable to the uncertainties of war. The people will get over their disappointment."

 BRA_idea_RK_settlement_manpower: "Brazil-Zentralafrika Settlement"
 BRA_idea_RK_settlement_manpower_desc: "Negotiations for the Lobster War have concluded, with a fair deal that both sides have agreed upon. The conflict is over and stability can return to the region, with both parties getting what they wanted out of the negotiations."
