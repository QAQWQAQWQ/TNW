 ## Events
 brazil.1.t: "The Lobster War"
 brazil.1.desc: "Lott was sat reading the latest documents that covered his desk. New reports of piracy and illegal fishing just off the coast of Pernambuco had been reported to the government. Their main ports of origin, the German colony of Zentralafrika, and the numerous West African states. Lott coughed before saying "This is a matter of national security, we have to stop this 'Lobster War' immediately."\n\nAcross his desk sat Odílio Denys, his War Minister, who was smoking a big cigar, and whose face had grown angrier as the meeting went on and the numerous reports of the breach of Brazilian waters had been discussed. Right next to him was Admiral Arnoldo Toscano, the man who was dealing with these threats in the north. Toscano looked exhausted, with dark circles under his eyes. Notably Vice President Quadros was not there, Lott having decided not to invite him to this meeting.\n\n"I have been trying to stop it," Arnoldo Toscano said, "I have already directed for two destroyers to confront the pirates and fishermen, but this latest resurgence is more widespread than we had thought initially."\n\nOdílio chuckled at that and muttered under his breath "The might of the Brazilian Navy can not defeat a few pirates, unbelievable." Lott gave Odílio a quick but stern glance and did not say anything in response.\n\nArnoldo continued, undisturbed by Odílio's comments, "Pirates continue to harass our fishermen and attack tourist boats. It was only a few months ago when the wealthy Japanese couple had been taken hostage by pirates while out whale watching. This has only emboldened further pirates to harass our waters, there are simply too many for just two destroyers to deal with. Meanwhile, subsistence fishermen from West Africa and large commercial fishing ships from Zentralafrika continue to illegally enter our waters to take large amounts of fish, the Zentralafrikan ships mainly for our prized lobsters. As I have stated two destroyers are simply not enough, I am requesting a larger task force to stop this threat once and for all."\n\nLott remained quiet, thinking about all the possible courses of action and what may happen depending on his choice. After about ten seconds, Lott spoke."
 brazil.1.a: ""Arnoldo, you will have your task force.""
 BRA_lobster_war_1_tt: "§wOur choices will have consequences.§!"
 
 # Quadros' Resignation
 brazil.2.t: "Calling Lott's Bluff"
 brazil.2.desc: ""Sir? Um... Vice President Quadros just sent in his resignation."\n\nLott stared at his secretary hanging in the doorway and slowly collapsed on his desk. "Thank you, Maria. Take the day off." She nodded and closed the door behind her. After a moment, Lott jerked his head upright, stood and walked to his cabinet.\n\nThis was hardly a surprise. Quadros had been threatening Lott with resignation for some time, citing the President's "bastardry," a phrase he actually used in front of the entire staff. Who knows, if Lott capitalized on it fast enough, it might even work in his favor. If the next Vice President was even a little more cooperative than Quadros, or could even speak Portuguese legibly, imagine what he could do!\n\nLott pulled open the bottom drawer, revealing his favorite cigar box. It was a brand he could only get in Italy, and he liked to save them for particularly interesting situations. And as he opened the window, the situation was proving more interesting than he first thought.\n\nA crowd was gathering outside, waving signs and chanting something. Lott saw what, or rather who, they were chanting for before he could make out the words. Every other sign had a stylized portrait of Jânio Quadros smiling his stupid little grin.\n\nLott spotted Maria weaving through the crowd on her way out and decided to pay the poor woman more. "Maria!" She whipped her head around and stared up in disbelief. "Get back inside, I need you to connect me with Quadros!" The crowd cheered at the sound of their broom messiah's name, and Lott slammed the window shut. Sighing, he closed the cigar drawer, slumped back in his seat, and stared at the phone.\n\nDamn the man, but people loved him."
 brazil.2.a: "Lott hated begging, but he hated angry mobs more."
 BRA_quadros_resignation_1_tt: "§OThis will not be good for our nation's stability.§!"

 # Quadros Reinstated
 brazil.3.t: "Check?"
 brazil.3.desc: "Jânio Quadros strolled confidently back up to his door, the door of a Vice President. He laid his hand on the doorknob, the doorknob of a Vice President. He slowly, ever so slowly opened the door, and once again breathed the air a Vice President breathes. Quadros coughed. It smelled like shit in here.\n\nWhen he put in his resignation, Quadros may have sold it a bit too hard. Last he saw his office, it was littered with broken glass, the trash can was upended and he may or may not have kicked a hole in the wall. Most of it had been cleaned by now, but there was still some garbage littered about. Luckily, in their ordered expulsion from his office, the cleaning crew had left some tools. Quadros opened the windows, took up the fallen broom and went to work.\n\nJânio enjoyed cleaning, to tell the truth. It felt orderly. Structured. So unlike everything else in Quadros' life, cleaning had a certain goal and a certain end. As he swept up the last of the trash in his office, Quadros took a moment to pat himself on the back. It was difficult, but he deserved it. He was one step closer to President!\n\nResigning was quite the power play, but damn if it hadn't paid off. Lott had practically begged him to come back, with a strained tone of absolute hatred that Quadros absolutely relished. Still, this wasn't even close to the end. He righted his seat, sat down and began to dial Lacerda. Quadros had made a bold move today, but it was time to get even bolder. After all, a President needs to be decisive."
 brazil.3.a: "Jânio Quadros could never be satisfied with anything less."
 BRA_quadros_resignation_2_tt: "§wWe will set aside our differences for now.§!"

 # Follow Up to Henrique Lott intro event, or the Quadros Intro event
 brazil.4.t: "Distractions"
 brazil.4.desc: ""Yes Quadros, what is so incredibly urgent?" Lott laid back in his chair, eyes closed. Jânio Quadros was hardly his idea of an ideal Vice President, but like it or not, Quadros was who the people wanted. Could he be effective, on occasion? Certainly. But Quadros could also be... abrasive.\n\n"Lott, I have been, hic, waiting for two hours! Listen, listen, are you listening? These Bolivians, they're holding up this treaty, right? And trying to make it worse, bad for us, for Brazil. Terrible! So I need your signature, or something, to get them to stop. I think. You took a very long time, SIR."\n\n"Wha- Jânio, are you drunk?" Lott was irritated, he had sent Quadros to Bolivia to negotiate with them over the treaty, not to get drunk.\n\n"You took too long! So yeah, I had a little drink. Tiny. These, these Argentinians, blech, they aren't going to see me until tomorrow anyway, why not? Four hours ago, when I started calling, I was sober, you just took too long."\n\n"This is entirely inappropriate, Jânio. I don't even understand what you want from me, let's have this conversation tomorrow."\n\n"BULLSHIT! I've been calling for eight hours Lott, just say the thing! Say, um, that I can do it. That I can pay back construction costs? I think that's it. Say it. Say it, come on. They make me pay to make calls from here Henrique!"\n\n"Fine, fine! Do what you need to do, Jânio. But tomorrow, I need a full report on whatever it is you're trying to tell me. Understood?"\n\n"Yes. I will do those things. Goodnight, Henrique. Thanks. Be quicker next time." Quadros said before hanging up."
 brazil.4.a: "Sleep it off, Jânio."

 # 1962 Election Season Begins
 brazil.17.t: "Election Season"
 brazil.17.desc: "It's time again for Brazil's political parties to gear up for election season. In this year's election, one third of all Senate seats are up for election, one in each state.\n\nThe power struggle between the UDN and the coalition of the PSD and PTB hangs in the balance, while the PSP looks to establish itself as an electoral force. Voters around the nation will get the chance to shape Brazil's future."
 brazil.17.a: "Vote UDN!"
 brazil.17.b: "Vote PSD!"
 brazil.17.c: "Vote PTB!"
 brazil.17.d: "Vote PSP!"
 BRA_62_election_season_tt: "§wCampaigns for the chosen party are now available in the Senado Elections panel!§!"

 # 1962 Election Season Ends
 brazil.18.t: "Brazil Votes"
 brazil.18.desc: "The election season has finally finished as the Brazilian electorate goes to vote. Campaigners and activists put down their leaflets and placards and have a rest from the campaigning. While politicians nervously await the election results, to see whether their career has ended in tatters or they have been elected once again. Meanwhile, the media give a running commentary and report on the results showing which politicians won in which seats and what major upsets there have been. Ambassadors and foreign agents all quickly scramble to gather what limited information there is to see the future direction of Brazil. No matter the result the Brazilian people have voted and the Brazilian people will get the results they voted for, let us hope that it was a wise choice."
 brazil.18.a: "The votes are tallied..."
