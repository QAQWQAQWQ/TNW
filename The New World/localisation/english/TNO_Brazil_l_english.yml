 BRA_progressivism_party: "PTB"
 BRA_progressivism_party_long: "Partido Trabalhista Brasileiro§F\n--------------\nWhen Vargas founded the Brazilian Labor Party as "a buffer between the unions and the Communists," the PTB would find itself the leading defender of workers' rights. Members range from populist reformists who seek nationalization and sweeping agrarian reform, to social-democratic intellectuals who try to moderate the party's centralizing tendencies. Between them, there are also many dedicated Varguists tied to union bureaucracy and the civil service. Uniting them all is the constant struggle against capitalist oppression and the belief in democracy to create a truly egalitarian Brazil.§!"
 BRA_progressivism_2_party: "PTB - Brizolistas"
 BRA_progressivism_2_party_long: "Partido Trabalhista Brasileiro - Brizolistas"
 BRA_liberalism_party: "PSD"
 BRA_liberalism_party_long: "Partido Social Democrático§F\n--------------\nFounded by Vargas's own appointees, the Social Democratic Party remains deeply tied to the establishment and receives much of its support from the agrarian oligarchy, businesses, and the middle class. While populist and pragmatic, the party is mostly united by its moderate developmentalist platform and its stalwart defense of democratic freedoms. However, divisions emerge within its ranks between those who long to continue regular collaboration with its long-time ally and Varguist sister party, the PTB, and those who seek to make further inroads with the right-wing opposition party, the UDN.§!"
 BRA_liberal_conservatism_party: "UDN"
 BRA_liberal_conservatism_party_long: "União Democrática Nacional§F\n--------------\nAs long as there have been Varguists, there have been anti-Varguists. Out from the political currents that opposed the Estado Novo dictatorship sprang the National Democratic Union. Since then, the UDN has been committed to the defense of morality against encroaching totalitarianism, believing in the American model of democracy and the OFN's efforts against fascism. While some pragmatic members prefer cooperation with the PSD on its developmentalist approach, the UDN is also home to supporters of classical liberal economics and firmly believe in Brazil's ability to have a free robust economy.§!"
