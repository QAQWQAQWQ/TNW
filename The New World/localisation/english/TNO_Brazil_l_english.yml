 BRA_gp_cd_0_name: "Mario Pinotti"
 BRA_gp_cd_0_trait: "§YPublic Health Crusader§!\n  - Healthcare Goal Progress Bonus: §G+15%§!"
 BRA_gp_cd_0_desc: "A PSP man, Pinotti is a trained medic and sanitarist. As director of the Brazilian National Malaria Service, he pioneered chloroquinized salt during the 1950s to help eradicate malaria. Although he's not a PSD or PTB man, he's worked with Kubitschek before on medical matters and is a close ally in this regard. If Kubitschek wants to improve Brazil's healthcare, Pinotti is a needed ally, and he can even improve ties with Adhemar and the PSP as a bonus."
 BRA_gp_cd_1_name: "Erik de Carvalho"
 BRA_gp_cd_1_trait: "§YAirline Executive§!\n  - Unlocks §YReady Airways for the Future§! focus branch."
 BRA_gp_cd_1_desc: "Erik is a businessman working for Varig Airlines, the first domestic airline in Brazil that was founded in 1927. It is Brazil's leading airline and its only international one. Erik has done a lot to expand Varig operations and expand Varig's fleet of aircraft. He will be an important ally if Kubitschek wants to focus on improving air travel, especially in the matter of new airports."
 BRA_gp_cd_2_name: "Oscar Niemeyer"
 BRA_gp_cd_2_trait: "§YPicasso of Concrete§!\n  - Mega Project Construction Speed: §G+5%§!\n  - Mega Project Optimism Bonus: §G+15%§!"
 BRA_gp_cd_2_desc: "Oscar Niemeyer is considered to be one of the key figures in the development of modern architecture. His greatest projects include many public buildings in Brasília, like the National Congress, the Presidential Palace, and the world-famous Cathedral of Brasília. Niemeyer's ties with communist groups may make some look at him with suspicious eyes, but his friendship with Kubitschek and intimate knowledge of architecture will surely bring weight to any project he is attached to."
 BRA_gp_cd_3_name: "Celso Furtado"
 BRA_gp_cd_3_trait: "§YStructuralist Planner§!\n  - Mega Project Construction Speed: §G+10%§!\n§YSUDENE Czar§!\n  $BRA_develop_region_1$\n    - Monthly Industry Growth: §G+0.10%§!\n    - Monthly Mech. Rate Growth: §G+0.10%§!"
 BRA_gp_cd_3_desc: "A PTB man, Furtado worked for Kubitschek in the previous development council and was a key ally of Lott for his economic plans. He's a supporter of Keynesianism and structuralist economics. In particular, he continues to emphasize his dream of pulling up Brazil's northeast so it can be put on the same economic playing field as the rest of Brazil. He is also one of the most distinguished intellectuals in the country, and was previously Director of the Brazilian Development Bank."
 BRA_gp_cd_4_name: "Tancredo Neves"
 BRA_gp_cd_4_trait: "§YPolitically Connected§!\n  - Senado Bill Support: §G+10%§!"
 BRA_gp_cd_4_desc: "One of the most important leaders of the PSD, Tancredo was an economics advisor in Kubitschek's last term and also led the Ministry of Economics during Lott's government. His skills and knowledge in economics will surely be an asset to the Development Council and his appointment will help the Council navigate through many political entanglements, as his leadership was held in high esteem during his times as congressman, advisor, and minister."
 BRA_gp_cd_5_name: "Osvino Ferreira Alves"
 BRA_gp_cd_5_trait: "§YConstitutionalist Background§!\n  - Weekly £BRA_constitutionalists_texticon §KConstitutionalist§! support: §G+0.25§!\n§YThe Oil is Ours§!\n  - Energy Goal Progress Bonus: §G+10%§!"
 BRA_gp_cd_5_desc: "General Alves is a constitutionalist officer and the leader of the First Army, headquartered in Rio by Kubitschek at Goulart and Edna Lott's advice. He's been appointed to ensure that the reformed military continues to support the President, and thus has earned a say on what Kubitschek does. He is also not a member of any political party, making him effectively non-aligned, and thus a safe, apolitical choice that can be trusted to be unfailingly loyal."
 BRA_gp_cd_6_name: "Waldemar Levy Cardoso"
 BRA_gp_cd_6_trait: "§YArmy Liason§!\n  - Military §GLoyalty§! grows over time"
 BRA_gp_cd_6_desc: "One of Brazil's most decorated marshals, Cardoso began his career mere weeks before WW1 ended, then saw action in the 1924 Paulista Revolt. He fought in the Brazilian Revolution of 1930, commanded an artillery battalion of the Brazilian Expeditionary Force in WW2, and then commanded a division in São Paulo. Waldemar has seen everything the Brazilian Army has had to deal with for the past fifty years, and while no longer active as a field marshal, he is well-respected with plenty of business connections, making him a good ally for gaining military support."
 BRA_gp_cd_7_name: "Friedrich Schultz-Wenk"
 BRA_gp_cd_7_trait: "§YAuto Baron§!\n  $BRA_develop_region_3$\n    - Monthly Industry Growth: §G+0.20%§!\n  $BRA_develop_region_4$\n    - Monthly Industry Growth: §G+0.20%§!"
 BRA_gp_cd_7_desc: "Schulz-Wenk is the owner of Volkswagen do Brazil, one of the largest car manufacturers in the nation. Brazilian-German tensions are high and most trade between them is non-existent, but Volkswagen vehicles are one of the few exceptions. Kubitschek intends to increase Volkswagen operations in Brazil, and Schulz-Wenk will be a key ally in ensuring the further growth of the car industry and helping strengthen Brazil's improving economy."
 BRA_gp_cd_8_name: "Mário Wallace Simonsen"
 BRA_gp_cd_8_trait: "§YMedia Magnate§!\n  - Goal Failture Optimism Penalty: §G-30%§!"
 BRA_gp_cd_8_desc: "Mário Wallace Simonsen has been described as one of the most influential businessmen in the country, as he's the main owner of the television network TV Excelsior. Other business includes investment in many of Brazil's young airway companies. Mário's unwavering support for the growth of national industry and technologies landed him in a leading position in Kubitschek's Development Council. The President needs all media support he can get, and Simonsen's connections and fame will surely help."
 BRA_gp_cd_9_name: "Paulo Freire"
 BRA_gp_cd_9_trait: "§YTrailblazing Pedagogue§!\n  - Education Goal Progress Bonus: §G+15%§!"
 BRA_gp_cd_9_desc: "An educator and philosopher, Paulo Freire has ties to the Christian socialist faction in the PTB but is criticized by many for his Marxist beliefs and writings. His goals are to improve literacy rates across the country and ensure the large-scale application of his theories and models of education. Freire and Kubitschek agree that education policies were mostly ignored during JK's previous term, and now is time to correct this mistake, justifying Freire's position in the Development Council."
 BRA_gp_cd_10_name: "Roberto Campos"
 BRA_gp_cd_10_trait: "§YDevelopmental Economist§!\n  - Development Goal Progress Bonus: §G+15%§!"
 BRA_gp_cd_10_desc: "A PSD man, Campos is a major economist in Brazil and an admirer of Hayek's works. Despite this, he has consistently supported Varguist economic nationalism. He supported the creation of the National Bank for Economic Development (BNDES), and many emerging industries in the country. Now as Kubitschek's economic advisor, he will continue similar policies, most notably trying to merge Kubitschek's developmentalist policies with local businesses."
 BRA_gp_cd_11_name: "Dante Pellacani"
 BRA_gp_cd_11_trait: "§YUnion Boss§!\n  - Weekly £BRA_JK_people_texticon §YPeople§! Optimism: §G+0.50§!"
 BRA_gp_cd_11_desc: "Dante Pellacani the current President of the General Command of Workers, and an officeholder in the National Confederation of Workers in Industry is a key figure in Brazil's union's. Both groups are an immense political force within the PCB and PTB. Pellacani cut his ties to the PCB after the party briefly supported Adhemar de Barros and found a new home within the PTB. Since then he has moved uo the ladder, becoming a key player in the PTB and with a multitude of contacts within the general Brazilian labor movement and is still incredibly popular among both union leadership and politicians. However there are many in the PSD that are  wary of having such a controversial figure in the council, due to history of participating in strikes and having been arrested multiple times. However both Goulart and Lott have voiced support for the man and there may be very little chance of keeping some of the PTB in the coalition without the appointment of Pellacani."
 BRA_gp_cd_12_name: "Plínio Arruda"
 BRA_gp_cd_12_trait: "§YAgrarian Reformer§!\n  - Monthly Mech. Rate Growth: §G+0.10%§!"
 BRA_gp_cd_12_desc: "The leading figure in the left-wing of the PDC, Plínio is considered to be one of the foremost proponents of agricultural and land reform. His career was forged in São Paulo's politics, and he soon was elected as a federal congressman. In Congress, he was part of the Committees on Economics, Agricultural Policy, and Social Legislation, working closely with the PSD and Lott's government. In light of Plínio's talents in negotiation, oratory, and legal knowledge, Kubitschek is ready to use those same talents in the Development Council."

