## Quadros Tree
BRA_the_quadros_presidency:0 "The Quadros Presidency"
BRA_the_quadros_presidency_desc:0 "Jânio Quadros is now President! Misunderstood by many, mocked by more than a few, and underestimated by all, the former teacher has been elected to the nation's highest office.\n\nThere is much work to be done. The economy must see liberalizing reforms, the vampiric state hacked apart to allow small business owners and ordinary Brazilians to break free from mountains of debts and taxes. Corrupt officials must be purged before they can discredit the ship of state any further. This economic renewal must be combined with a moral renewal, as the nation rediscovers its Christian roots, the ties that bind us all in the great project of civilization.\n\nTo this domestic renewal we will marry a strong foreign policy. Brazil must be a leader of the global south, a colossus among nations breaking free from a colonial heritage and into their wonderful destinies. The super powers, the great eagles of America, Japan and Germany shall be forced to deal with us as equals. Brazil's honor demands it.\n\nAnd President Quadros will make it so."
BRA_anti_corruption_campaign:0 "Anti-Corruption Campaign"
BRA_anti_corruption_campaign_desc:0 "Perhaps the greatest pillar of domestic policy for President Quadros remains the fight against corruption.\n\nAt all level of society corruption saps the trust that ordinary Brazilians have about the government. Greedy tax officials, purchasable police officers, amoral judges; all serve as examples of our nation's failure to live up to its goals of equity and justice.\n\nPresident Quadros plans to strike at the roots by reducing government spending, the endless fount of wealth that has lured the corrupt and ambitious during Kubitschek and Lott's presidencies. Quadros also plans to eradicate those that have already been tainted by the vice. A great anti-corruption campaign will begin, dismissing any public servant or government employee found tainted.\n\nNo matter the cost, the spread of this plague must be halted. The lord willing we shall triumph over the enemies of society."
BRA_use_presidential_decrees:0 "Use Presidential Decrees"
BRA_use_presidential_decrees_desc:0 "The start of our great crusade against corruption must come from new laws against this kind of criminality. However, this places our President in a problematic situation.\n\nThe congress has never done anything against corruption, and it is likely that many of its members are corrupt to the bone. Asking them to legislate on the matter would be akin to asking the foxes to keep an eye on the hen house. This delicate situation requires a different approach.\n\nQuadros will use his presidential power to take action by decree. This will allow him to move rapidly and avoid dealing with corrupt self-serving politicians. The opposition senators and the supreme court will no doubt argue some of the President's actions are unconstitutional. This does not worry our government too much. Let the fools come out on the public record as allies of corruption and inaction. President Quadros will only be strengthened by this."
BRA_consult_the_udn:0 "Consult the UDN"
BRA_consult_the_udn_desc:0 "Purity of morals and actions is a desirable dream, but not one often possible in this crass mortal world. Knowing that the perfect is the enemy of the good, President Quadros has decided to discuss with the UDN the upcoming anti-corruption campaign.\n\nMany politicians of the UDN have no doubt been skimming a little too much off the top. Letting those scoundrels prepare themselves for the upcoming storm by destroying evidence irks Quadros. Yet this is an important step. The President's PTN party is small, much smaller than the UDN. While elected on the basis of his personal popularity, President Quadros must work with the UDN as a part of his coalition if he's to achieve anything.\n\nKeeping the UDN on friendly terms is worth a few sacrifices."
BRA_only_when_neccessary:0 "Only When Neccessary"
BRA_only_when_neccessary_desc:0 "The upcoming anti-corruption campaign is sure to hit a great deal of politicians. Many of them will be within the UDN, Brazil's leading conservative party and President Quadros' begrudging coalition partners. The President has no pity for corrupt men, no matter how politically convenient.\n\nThe UDN will not be warned of the upcoming anti-corruption probe. The guilty will have their day in court, no matter their political party. This is likely to infuriate the UDN, and Lacerda's newspaper will no doubt attack the President over this. Let the Crow squawk as long as he cares to; the anti-corruption campaign must not be tarnished by petty politics.\n\nPresident Quadros has many enemies. Let us be comforted that many are the afflictions of the righteous, but the Lord delivers his faithfuls out of them all."
BRA_create_an_anti_corruption_ministry:0 "Create an Anti-Corruption Ministry"
BRA_create_an_anti_corruption_ministry_desc:0 "The anti-corruption crusade draws to an end. Our thorough sweep has flushed out corrupt politicians and bureaucrats at all levels of society. Great progress has been made in our efforts to clean Brazil's economic life. That said, our government now enters the most difficult part: consolidating our gains.\n\nArresting so many corrupt officials through presidential decree has worked out well enough. However, to make lasting institutional changes President Quadros desires to build a permanent task force whose mandate would be keeping Brazilian politics clean. Such an organization will require congressional funding to operate throughout the entire country and to have enough bite to back its bark.\n\nSkeptics may point to the political class's irritation with President Quadros as an obstacle to passing the bill in the Senado. Surely our opponents are mistaken. The senators, the ones we haven't caused to go jail, will certainly be convinced to lend their strength to our cause."
BRA_proclaim_the_ifp:0 "Proclaim the IFP"
BRA_proclaim_the_ifp_desc:0 "All his political career, Quadros has pursued the dream of an Independent Foreign Policy. Of a Brazil unshackled from automatic alignment with America and its neocolonialist ambitions. President Lott looking to Japan for funding was a small start; it falls to President Quadros to go out in the wider world to talk with nations big and small to pursue the interest of a strong Brazil.\n\nThis will generate strong opposition both within Brasília and in Washington D.C. President Quadros will not be moved, however. Our great southern republic must seek its own path throughout these turbulent times. While the great American republican and democratic project will always be an inspiration, Brazilians must remember that only through a cautious balancing of rival powers can they find the breathing room for their country to grow in stature and prestige.\n\nThe Independent Foreign Policy, or IFP, has arrived. Let the great adventure begin!"
BRA_an_african_adventure:0 "An African Adventure"
BRA_an_african_adventure_desc:0 "Africa, the cradle of humanity, has lost a century to the basest of colonial behaviours. Yet the light of hope and freedom endures in the heart of all Africans and within the nations of Sub-Saharan Africa.\n\nThe end of the German bombings in Western Africa have left us an opportunity, as fledgling states expand in the area. By being one of the first countries to openly offer our help and friendship, we can make great gains in the new Africa and ensure that Brazil is a strong player in the South Atlantic.\n\nSome may accuse our government of jumping with both feets into a tangled mess of post-colonial conflict and great power shadow politics. Those fools are simply unable to grasp the importance of the Independent Foreign Policy to our future."
BRA_condemn_colonialism:0 "Condemn Colonialism"
BRA_condemn_colonialism_desc:0 "Colonialism has been one of the defining evils of the modern era. The subjugation of countries in the Americas, in Asia and Africa by self-aggrandized bullies has unfortunately endured into the post war era as new players such as Germany and Italy have expanded their holdings in Africa.\n\nOur government will condemn colonialism at full strength, especially on African soil. Uncompromising support for newly independent African states will no doubt endear us to local leaders. This, however, is likely to have a cost, as the Italian Empire is one of the few non-aligned independent powers we seek to court for our Independent Foreign Policy.\n\nDenouncing colonialism will irritate the Italians and delay our efforts to get closer to them. This is the cost of truth, honesty, and full brotherhood between all nations."
BRA_a_more_cautious_approach:0 "A More Cautious Approach"
BRA_a_more_cautious_approach_desc:0 "Colonialism is a great evil, but also a multi-faceted system whose dismantling will take time and a cautious approach. Nations such as Italy are both perpetrators of colonialism as well as important independent poles of power in an increasingly radicalized world. Equally important are nations such as South Africa who are examples of minority ruled nations that stand outside the American or German systems of empire. The needs of the Independent Foreign Policy makes rapprochement with those nations crucial to President Quadros' goals.\n\nWe will thus measure our words. Colonialism will be sternly opposed, but the specifics will have to remain vague for now. We will have harsh words for the German empire, leaving our options open with regards to other colonialist powers. The people of Africa, used to playing colonial powers one against the others, will surely understand our prudence."
BRA_reach_out_to_cameroon:0 "Reach Out to Cameroon"
BRA_reach_out_to_cameroon_desc:0 "It is often times as difficult to get news from the African interior as it is to obtain information on what is going on in Central Siberia. Nevertheless both region have vastly profited from the German retreat, of late.\n\nNorth of what had once been Reichskomissariat Zentralafrika stands the Cameroon African State. A beacon of anti-colonialism in the region, the Cameroonians have fought for years now against Germans as well as French, Italian and American influence in the region. As such Cameroon has been shackled with an unfair reputation as a rogue nation. We must reach out to Cameroon and reiterate our support for all those that oppose colonialism!"
BRA_ban_the_bikini:0 "Ban the Crimini"
BRA_ban_the_bikini_desc:0 "A specter haunts Brazil.\n\nThroughout the nation's beaches, an evil ideology from Europe infects our youth. Left unchecked, this movement will ruin our country as surely as communism or fascism would. We speak of nothing other than the fashion trend of the Crimini.\n\nA devilish piece of garment invented in France as a confirmation of their nation's degradation, the Crimini has spread over to Brazil. Our young men, the finest flower of Brazilian manhood, spend their days mocked by a vulgar display of crude feminine wiles. Their precious spiritual essence is being stolen away from them!\n\nBanning the Crimini is but the first step in President Quadros' restoration of proper Christian mores. Police officers will be empowered to patrol the nation's coastline in search of these immoral swimmers, these rapidly proliferating salt water weeds. The battle for Brazil's soul has begun!"
BRA_embrace_opus_dei_thought:0 "Embrace Opus Dei Thought"
BRA_embrace_opus_dei_thought_desc:0 "An organization founded some four decades ago, the Opus Dei has grown into one of the most quietly influential groups within the Catholic Church. Encouraging their members to seek the divine in day to day life, and to do one's best in professional life, the Opus Dei has cautiously entered the political arena through the development of a new political philosophy.\n\nArguing that Christian law does not apply to the secular world, the Opus Dei argues for liberalization, for free markets and for a moral society led by talented and pious men. This line of thinking is very agreeable to President Quadros' view of Brazil's future. Some may criticize the Opus Dei for remaining silent on the Iberian dictatorship; President Quadros sees this restraint from the public sphere as evidence of them rendering unto Caesar what is his.\n\nAt the heart of being a pious man, after all, is doing one's best to follow the Lord's plan."
BRA_outlaw_gambling:0 "Outlaw Gambling"
BRA_outlaw_gambling_desc:0 "The honest man seeks not any other source of money than the day's honest wage. Yet there are those that remain obsessed by the desire for rapid gain. Such desires conceive and give birth to sin, and that sin when it reaches full growth can give birth to death.\n\nThe sin of gambling does more than break up families and enrich organized crime. It damages the immortal soul of those it has ensnared. It is thus a moral imperative for President Quadros to strike at the heart of this societal ill.\n\nUnfortunately gambling is also a very popular pastime. Eradicating it will be difficult. Some say the attempt is futile. The moral imperative remains, however, to do as best as one can to save fellow citizens from damnation. No matter the political cost, or backlash to the edict, President Quadros will ban gambling and dedicate additional police resources to crack down on illegal gambling operations. The poor souls addicted to this vice will have to find strength in the lord to free themselves from this earthly poison."
BRA_travel_to_cuba:0 "Travel to Cuba"
BRA_travel_to_cuba_desc:0 "Not even two hundred kilometers from Florida lies the island of Cuba. Its leader, Fidel Castro, has surprised the world through his successful revolution against the forces of Fulgencio Batista. Taking place in America's backyard as it has, the Cuban Revolution has maintained a good neighbor policy with the American giant to the northwest. Even so, Castro remains one of the rare leaders in the Americas to stand independent of America.\n\nSome may decry Castro as a socialist, a populist and an autocrat. President Quadros understands that providence works through mysterious agents, and that Fidel Castro represents a new breed of leaders in and around the continent. The Independent Foreign Policy demands closer ties between Brazil and Cuba, to establish our own credentials as an independent voice in the chorus of nations."

