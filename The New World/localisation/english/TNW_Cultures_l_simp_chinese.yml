 var_nationality.899: "南日德兰§F，一种起源于§Y丹麦§!和§Y德国§!交界处的§Y丹麦§!文化，因而对其传统感到自豪，具有民族主义倾向§!"
 var_nationality.900: "法属南部和南极，§F这里的居民囊括殖民地士兵、职业官僚、贪婪无度的捕鲸者乃至天真的冒险家。虽然凯尔盖朗群岛上的居民都是§Y法兰西§!人，但却不可不谓多元化。他们在这片严酷的荒原恶土上奋斗求生，由此形成了共同的认同感。他们甚至还自行发展出了一种§Y法§!语变体，被称作南部和南极方言。这种独一无二的方言源于军事和技术术语的糅合，再加上当地长年在内部流传的笑话和文献资料§!"
