 BRA_fight_thrifty: "精打细算"
 BRA_fight_swift: "速战速决"
 BRA_oil_crisis_tt: "§R这将对我们的经济造成灾难性的影响……§!"
 brazil.597.t: "亚马孙的共识"
 brazil.597.desc: "经过几日来紧张激烈的往返磋商，巴西利亚今晨终于宣布了在加拉加斯达成的一项协议。据接近高原宫的消息人士透露，谈判的突破点在于巴西方面提出将增加对基础设施建设的投入，使得协议最终得以在本周晚些时候签署。\n\n这场谈判让总统[BRA.GetLeader]焦躁不安，几乎每个小时都会追问代表团的进展。如今他宣布：“是时候收获我们播下的种子了。”对巴西来说，这意味着石油将重新自资源丰富的邻国流入，为因上月价格冲击而陷入困境的国内供应带来急需的喘息。\n\n然而，这份成果并非无代价。内阁中已有数位部长对给予委内瑞拉的“过度”让步表示不满。除亚马孙地区的基础建设之外，协议还包括军事援助与技术支持，以及更优惠的汽车、机械和钢铁出口条件——这些对于一个资源丰裕却朋友寥寥的国家而言，是极具价值的筹码，也为未来的对话留下了回旋余地。\n\n分析人士或许会对此表示不悦，但全国上下的巴西民众心中已有定论：此刻，任何救济都是好救济，越快到来越好。"
 brazil.597.a: "只要快点把该死的石油给我们就行。"
 brazil.598.t: "好客南方"
 brazil.598.desc: "在过去几周内巴西与阿根廷外交官的成功接触之后，一项历史性的协议终于在布宜诺斯艾利斯敲定，正式授权巴西从阿根廷市场进口石油，此举立刻赢得了巴西民众的广泛赞誉与如释重负的宽慰。自签署仪式前几日起，各大媒体便对其广泛报道，尤其是[BRA.GetLeader]总统与[ARG.GetLeader]总统握手的画面，更被视为“象征时刻”，预计将在接下来的几周持续占据巴西各大主流报纸的头版头条。\n\n经济学家纷纷盛赞此项协议为缓解“石油危机”对巴西经济冲击的关键一步。无论是普遍降低油价，还是减轻巴西消费者不堪重负的生活压力，此项协议都被视为一剂“强心剂”。不过，也有人对此保持警惕。尤其是军方关键人物，表达了对“阿根廷企业掌控南部石油贸易份额日益增长”所带来风险的担忧。盖泽尔将军更是直言不讳，称这一协议是“正在酝酿的国家安全危机”。尽管[BRA.GetLeader]总统目前已对军方提出的多项质疑予以回绝，但巴西社会普遍仍对与这位长期竞争对手的未来合作持乐观态度——不仅看重其带来的经济利益，更看重两国在加强经贸联系后，有望缓和彼此紧张关系的潜力。"
 brazil.598.a: "谁说和平算不上一种选择？"
 brazil.614.t: "新王登基"
 brazil.614.desc: "一辆1952年款的劳斯莱斯在一月温润阳光下熠熠生辉，车身两侧是整齐列阵的独立龙骑兵，而周围则是无数市民高声欢呼的海洋。这一日的庆典盛况，正是为迎接小热图里奥·瓦加斯的就职典礼而设。无论是亲临现场，还是通过电视转播，数百万巴西人都将见证历史上第二位“瓦加斯总统”的诞生。对一些人来说，这象征着历史的终极维护——浪子终将高举父亲的火炬，那是无与伦比的伟业与无限的可能；对另一些人而言，高原宫再次迎来一位“瓦加斯”，至于这座权力之宫是否能承受这份重量，疑虑与犬儒笼罩其上。\n\n随着总统座驾缓缓驶近国家议会，小瓦加斯已然看见三权广场横亘于其东侧外沿。数以万计的民众齐聚一堂，只为亲眼见证这一巴西历史上的重大时刻；而当他从车窗中伸出手臂向人群挥手时，欢呼声更是震耳欲聋。但真正的时刻尚未到来——就职典礼将于议会宫内举行，由巴西两院共同见证。\n\n这一仪式在场的议员中弥漫着一丝淡淡的悲怆之意，至少在社会进步党及其评论员阵营中尤为明显。阿德马尔的逝世对所有人都是沉痛一击，尤其是对小瓦加斯而言更是刻骨铭心。想要从这位政坛巨鳄的伟岸阴影中走出，恐怕还需时日。然而，又有谁能真正超越这样的遗产？唯有这位“冉冉升起的继承者”。这是全国瓦加斯主义者的加冕之日，也是另一些人对第二个“新国家时代”来临的忧心时刻。对大多数人而言，他延续旧有风格带来了某种稳定感，而他所拥抱的新纪元，则孕育着对未来的希望。倘若怀抱决意与怜悯，谁能预见巴西将攀上怎样的高峰？"
 brazil.614.a: "新与旧在此交汇，正如这个时代的倒影。"
 BRA_Ulysses_Guimaraes_hog_desc: "§Y副总统\n国家自由主义§!\n--------------\n§L乌利塞斯·西尔韦拉·吉马良斯毕生以捍卫法治、自由选举及其他同等重要的民主准则为己任。如今，这份坚守显得尤为重要——因为他发现，自己辅佐的政权已经摇摇欲坠。\n\n吉马良斯厌恶这种身不由己的处境，厌恶到了极点。一个铁杆的民主派，却要听命于一个反复无常、独断专行的准法西斯分子，眼睁睁看着他搞什么“整合”共和国，毁掉前人呕心沥血建立的一切？是可忍，孰不可忍。也难怪，坊间会传出有文官民主派正在密谋的流言了。§!"
 BRA_Santiago_Dantas_for_desc: "§Y外交部长\n整合主义§!\n--------------\n§L整合主义第一次失势后，圣地亚哥·丹塔斯辗转于多个政治阵营。他在工党待了一段时间，花了大力气鼓吹所谓的“积极”左派，以对抗他口中布里佐拉领导的“消极”左派。然而，丹塔斯认为布里佐拉的势力过于强大，再加上萨尔加多刚刚当选总统——于是他跟老相识搭上了线，随即被任命为外交部长。“大概是因为萨尔加多的副手连一堵砖墙都能得罪吧。”丹塔斯自嘲道。\n\n丹塔斯想走一条既反资本主义、也反社会主义的中间路线，他有自己的一套“独立外交”理论，旨在让巴西在世界舞台上成为一个更强大、也更中立的角色。这套理论正合萨尔加多的心意，因此两人关系不错。不过，丹塔斯在主流政党中亦有人脉，并且相当重视这些朋友的意见。他希望总统在外交事务上能更加审慎，避免在不征求他意见的情况下擅自行动，尤其是在他可能不会同意的事情上。§!"
 BRA_Jose_Alkmin_eco_desc: "§Y财政部长\n专制主义§!\n--------------\n§L若泽·马里亚·阿尔克明是个把背后捅刀和投机钻营玩到极致的人，几乎没人信得过他。有人曾抱怨说，宁可把上帝当敌人，也别把阿尔克明当朋友。可阿尔克明根本不在乎别人怎么看他，他接二连三地背刺他人，靠着踩着他人的尸体实现自己的计划——可这手段，也太恶心了吧？阿尔克明不禁寻思，或许上帝早已跟他开战了。\n\n给一个思想乱七八糟，行事毫无章法，手下还有一群狂热的暴民对他唯命是从的疯子当财政部长，能有什么功劳和体面可言？这位财政部长现在一门心思就想着怎么保住自己的位子，他随时准备故技重施，用他那套老办法来保住这份权力。§!"
 BRA_Ulysses_Guimaraes_edna_hog_desc: "§Y副总统\n国家自由主义§!\n--------------\n§L乌利塞斯·西尔韦拉·吉马良斯毕生以捍卫法治、自由选举及其他同等重要的民主准则为己任。如今，这份坚守显得尤为重要——因为他发现，自己辅佐的政权已经摇摇欲坠。\n\n吉马良斯为埃德娜的掌权感到高兴。尽管他自己意识形态更偏中派，但他依旧钦佩她的理念。不过，他同样也深怀忧虑：他知道，有的是疯子不买她的账，随时可能威胁到她的位子。尽管埃德娜在军方有亲属和支持者会保卫她，可光靠他们恐怕不够；那帮堕落的激进派豺狼，总在找机会想把总统撕碎。因此，乌利塞斯准备好迎接冲击，他要回到自己的岗位上，永远准备着充当民主的坚盾。§!"
 BRA_Tancredo_Neves_edna_eco: "§Y财政部长\n国家自由主义§!\n--------------\n§L坦克雷多·德·阿尔梅达·内维斯天生就是个外交家，最擅长温和与妥协。正因如此，瓦加斯主义联盟视他为无可匹敌的政治操盘手。同时，他在金融领域的才干同样出众，或许只有学院里的专家能与之媲美。所以，对社民党-工党联盟来说，埃德娜任命坦克雷多当财政部长也是顺理成章。\n\n坦克雷多的任务，说起来简单，做起来难。他必须解决经济危机，稳住困扰社会各界的动荡金融局势，并带领巴西经济重回正轨——即便暂时还无法实现繁荣。坦克雷多和埃德娜都希望通过一条温和的路线来实现这一目标。§!"
 BRA_Peri_Constant_Bevilacqua_edna_sec: "§Y战争部长\n专制主义§!\n--------------\n§L身陷重围的军队需要做好防守，对于埃德娜·洛特那内外交困的内阁来说，防守的任务交给了佩里·贝维拉夸。对外要保卫国家，对内更要防着自己那帮军方同僚——抬头一看，天上的秃鹫已经开始盘桓。\n\n康斯坦特·贝维拉夸，这位曾在欧洲浴血奋战的炮兵将领是个讲求实际的护宪派，但他这个战争部长可一点都不好当。政府树敌甚众，军队的激进派已是虎视眈眈。他必须想方设法，让对国家的热爱压过对权力的贪恋，不然，他就要眼睁睁看着卡其绿色的蜂群涌入巴西利亚，为一己私利窃据神器——这正是他们一直梦寐以求的场景。§!"
 BRA_Hermes_Lima_edna_for: "§Y外交部长\n左翼民粹主义§!\n--------------\n§L同他的许多政界前辈一样，埃梅斯·利马——这位曾经的法律从业者，现在已经转战外交界，在新的领域运用自己的权力。在他看来，这意味着他将主导一场名为“巴西外交”的公关活动，并从而一夜之间化身埃德娜·洛特总统的首席外交官和核心联络人。\n\n然而，这并不意味着他也能成为其他领域的先驱。身为新国家体制的坚定反对者，利马怀揣着温和的社会主义思想——或者说一种向往人道主义的本能。其实，他真正的信仰一直都是人权与法律等这些在他眼中始终被社会不公践踏着的价值观。洛特夫人新近任命的官员们究竟何去何从仍未可知，但利马的命运或许早有着落：按剧本行事，巧妙斟酌措辞，再含糊其辞地装出一副为了“大义”的模样。§!"
