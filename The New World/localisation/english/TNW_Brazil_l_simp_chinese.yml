 BRA_megaproject_nts: "核试验场"
 BRA_megaproject_nts_desc: "在雨林深处，士兵们开始撕裂原子。利用原子换和平计划的资金，巴西军队正在为开发核武器和在南美冷战中取得胜利而建设基地。"
