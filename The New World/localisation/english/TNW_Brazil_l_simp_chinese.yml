 BRA_the_voting_rights_bill:0 "选举权法案"
 BRA_the_voting_rights_bill_desc:0 "选举权法案现已完成，即将提交国会审议。法案可能会引发反对派的强烈反应，但我们既定的发展计划绝不会因此改变。让我们保持警惕。"
 BRA_keep_an_eye_on_the_military:0 "提防军方"
 BRA_keep_an_eye_on_the_military_desc:0 "要不是新政权打造的框架束缚了军方对古拉特的敌意，我们推行的法案、演说和改革方案恐怕早就把他们惹毛了。当务之急是笼络战争部的核心将领，同时密切关注事态发展，方能避免危机。"
