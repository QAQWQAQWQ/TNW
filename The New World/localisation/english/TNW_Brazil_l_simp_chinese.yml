 BRA_LACERDA_HYDROELECTRIC_BILL: "§K水电改革议案§!"
 BRA_LACERDA_HYDROELECTRIC_BILL_Desc: "没人规定议案一定要带有党派倾向，也不需要仅由特定政党来支持。塔沃拉提出了一项关于水电的新议案，旨在促进巴西全境的水电开发，并附带了若干关键选址以供选择。他本人鲜少做出此番举措，尤其考虑到相关投资将由国家政府而非私人投资者提供。\n\n据塔沃拉所称，政府对此类行动进行干预名正言顺。他强调，只有通过政府干预才能实现如此大规模的建设，而只有将此种干预同强有力的反腐政策结合，方能有效遏制腐败。这种发展路径无疑非比寻常，但还有什么能比巴西这样一个国家的崛起更超乎常理呢？"
 BRA_pl_hydroelectric_bill_tooltip: "$BRA_LACERDA_HYDROELECTRIC_BILL$将会在参议院提出。\n\n§Y如果通过：§!"
 brazil.602.t: "计划暴露"
 brazil.602.desc: "总统几乎压抑不住内心的怒火，他只能强迫自己坐在原地，听完对面各部门代表的报告。无论是外交、军方、情报机关，还是文职系统，传来的全是一个词：噩耗。\n\n核计划的泄密不仅仅是一场灾难，它更是一场彻底的浩劫。\n\n国际社会毫无意外地一致谴责，其中尤以那些自己曾暗中追求核武器的国家最为激烈——当然，也是最虚伪的。可“第十三诫”——“不可被抓包”——终究被打破，如今是付出代价的时候了。几乎所有巴西在国际上的协议与合作，顷刻间化为齑粉，而这场风暴所造成的具体损失，恐怕还远未开始结算。\n\n而更令人不安的是，整个核计划本身是否还能存续下去，此刻也尚无定论。若要查清泄密源头，就必须大规模清洗与整顿，这不仅将摧毁机构内部积累的知识体系，更会严重打击士气。更糟的是，阿根廷的成功恐怕将极大推动他们仍处于秘密状态的核项目——那些被盗走的信息，或许正是他们迟迟攻不破的关键难关。\n\n今天，是巴西最为黑暗的一天之一。"
 brazil.602.a: "但前路，仍需开辟。"
 brazil.603.t: "葡语巨人"
 brazil.603.desc: "金钱就是力量。\n\n虽是一句老生常谈的话语，其蕴藏的真理却不容置疑。无论是民族理想还是区域政体，商业经济永远与国运民生血脉相连。南美洲那些所谓的“受害国”，即便挣脱欧洲殖民枷锁百年，仍时常为他人作嫁衣裳。\n\n但对巴西这个矗立于亚马孙河口的巨大熔炉而言，命运已悄然逆转。历经数代人励精图治——国家发展、经济振兴、财政保障——这个国家正触及曾经遥不可及的世界地位。\n\n尽管国际观察家对巴西仍持审慎态度，但分析预测无不印证其崛起为超级大国的潜质。凭借成功的财政贸易政策与稳健的经济增长，巴西已跃居世界第四大经济体。昔日这个葡语国度尚与玻利维亚、智利、阿根廷展开区域贸易战，如今其经济版图即将与第三帝国、日本帝国乃至美利坚合众国比肩。\n\n冷战的暗流终将渗入这一进程，但巴西已非任人摆布的棋子。凭借足够的经济体量，这个国家能坚定抵御欧亚北美变幻莫测的冲击波，其国家利益必须被严肃对待，而非随意弃置。自西班牙帝国陨落以来，南美洲首次孕育出真正意义上的庞然大物——这个蓄势待发的国度，即将与当今强权平分秋色。"
 brazil.603.a: "进步终于来临。"
 brazil.604.t: "美餐"
 brazil.604.desc: "圣保罗的璀璨灯火铺展至天际线尽头，两位圣保罗工业联合会的经纪人轻碰香槟杯，抿下的每一口酒液都价值十克鲁赛罗。他们沉默地享用着龙虾大餐，目光并未投向彼此，而是凝视着私人餐台下方疾驰而过的都市洪流。对于下班归家的驾驶者、漫步街头欣赏夜景的情侣而言，这不过是又一个寻常夜晚。\n\n但对这对经纪人而言，此刻堪称神迹。其中一人将视线从城市天际转回餐桌，瞥见龙虾旁摊开的报纸。巨幅标题赫然印着《巴西经济跃居全球第五！》，配图中总统与财政部长正开怀大笑。他心满意足地叹息，又饮下一口价值十克鲁赛罗的香槟。\n\n这场豪赌的胜率曾曾经微乎其微。腐败如同拴在巴西脚踝的铁球枷锁，无数商人宁愿中饱私囊也不愿为国效力。但此刻阴霾尽散，巴西经济多年来首次显现曙光。两只香槟杯再度相碰，清脆声响没入璀璨夜色。"
 brazil.604.a: "又是十克鲁赛罗。"
 brazil.605.t: "南方支点"
 brazil.605.desc: "巴西中央银行行长的办公室颇具皇家风范：精美雕花的木质镶板、刺绣天鹅绒窗帘，无不让人想起佩德罗时代的辉煌。成排的葡萄酒、整箱的雪茄、镀金吊灯、华丽地毯，以及来自世界各地的进口家具——不过行长未来打算采购些本土产品。\n\n抛光的木质办公桌上摆着一台电视机，尽管画面是粗糙的黑白色，仍在讲述着色彩斑斓的故事：“……基于此，专家们断言巴西近期的经济增长与扩张足以作为现代国家的成功典范，我国正快步追赶地区竞争对手，并即将超越墨西哥。”\n\n放在两三年前，类似的新闻简直荒诞得像是在月球背面存在有纳粹秘密基地。行长嘴角扬起笑意，从皮椅上起身走向窗边。他坐在窗台上，欣赏着摊销办公大楼的卡拉拉白大理石柱和定制石雕。\n\n天知道还有什么溢美之词未被说尽？世界曾视巴西为何物？不过雨林深处一个三流闭塞之地。仅仅一代人之前，巴西还是亚马孙河畔的封建国家，为何能冲破历史枷锁，展现雄风成为南美经济强国？\n\n行长起身去酒柜倒酒，脸上得意的笑容仍未消退。他明知这不过是自鸣得意，却兴奋得无暇顾及，倒满冰镇白兰地坐回窗台。如今巴西人的勤勉终于得到举世公认，很快这个南美最大、人口最多的国家就将登上世界舞台，与列强平起平坐。"
 brazil.605.a: "金钱开口，诸国倾听。"
 brazil.606.t: "盗贼、疯子与各色政客"
 brazil.606.desc: "莫日瓜苏市已陷入狂欢前的躁动。两位总统候选人即将在两天后相继造访此地，行程安排得巧妙避开了正面交锋。这座圣保罗州小城素以本地人为傲，街头随处可见阿德马尔的海报——但反对者的声浪亦在此集结，来自巴西各地的夸德罗斯支持者正成群结队涌入城区。\n\n社进党候选人率先抵达。阿德马尔标志性的大笑与张扬手势迅速点燃拥趸热情。“我任圣保罗州长期间曾大力营建精神病院，可惜这世上疯子太多——有个漏网之鱼明天就要在这里大放厥词！”台下爆笑如雷，阿德马尔在鼎沸人声中继续喷洒毒液。\n\n次日正午，雅尼奥·夸德罗斯带着富有魅力的笑容和扫帚标志登台。支持者告知他昨日对手的言论时，这位候选人从容回应：“我任圣保罗州长期间大力营建监狱，可惜这世上盗贼不少——有个法外狂徒昨天就在这里妖言惑众！”雷鸣般的掌声霎时吞没了广场。"
 brazil.606.a: "好一个选举年，不是吗？"
 BRA_Filinto_Muller_sec_desc: "§Y战争部长\n专制主义§!\n--------------\n§L正如特鲁希略有军情局、希特勒有党卫队，菲林托·穆勒堪称巴西官方认证的头号暴徒。这位德裔枭雄的政治生涯始于1924年圣保罗起义，在叛军大势已去时果断倒戈。随着军事履历在瓦加斯执政时期不断累积，他最终执掌里约热内卢警政大权，将独裁铁腕染成血色篇章。\n\n十年间，穆勒以“新国家体制刽子手”之名令人闻风丧胆，大肆搜捕共产主义嫌疑分子，忠实执行反犹政策。如今，这些血腥往事早已尘封，衰老的躯体与衰退的认知使他威名不再。没人会为屠夫擢升战争部长而欢呼，但在这只社进党暮年虎王的斑驳倒影里，不正映照着巴西最腐朽的政治底色？§!"
 BRA_the_lott_act: "洛特法案"
 BRA_Vasco_Leitao_da_Cunha_lacerda_for_anocracy_desc: "§Y外交部长\n无支配体制§!\n--------------\n§L莱唐·达·库尼亚没什么意识形态偏好，他曾在瓦加斯手下工作，现在又到拉塞尔达麾下干活。自三十年代以来，莱唐一直担任外交官，曾担任巴西驻前苏联大使。对于现在的职位，莱唐比较满意——只要他能自由行事即可。\n\n最重要的是，达·库尼亚想要将巴西与人类力量所孕育出的最优雅的民主国家、OFN领袖、一个自诞生起便赋予人类恩惠与美好的开明国度——美利坚合众国——联系起来，他将努力让巴西同他们的利益紧密相连，因为他们为正义的事业而斗争，而这也是巴西应当为之奋斗的事业。§!"
 BRA_Helio_Beltrao_eco_anocracy_desc: "§Y财政部长\n无支配体制§!\n--------------\n§L埃利奥·贝尔特朗是个虔诚的技术官僚，现在他成了巴西经济战略规划中十分重要的一部分。贝尔特朗出生于1916年，毕业于里约热内卢联邦大学法学专业，并在里约热内卢担任规划部长一职后崭露头角。在拉塞尔达崛起后，他进入联邦政府担任类似职务，希望努力放松管制，并在更广泛的范围内推动巴西经济向右发展。§!"
 BRA_Virgilio_Tavora_hog_anocracy_desc: "§Y副总统\n无支配体制§!\n--------------\n§L即便身处巴西利亚整洁的新官邸，维尔吉利奥·德·费尔南德斯·塔沃拉也不敢松懈片刻。他从自己的叔叔，曾于1955年代表全民盟参选的温和派人士茹阿雷斯·塔沃拉手中接过一项重任：保证总统不会深陷幻想而无法自拔。\n\n任塞阿拉州州长时，他以大兴土木闻名。这些工程得以实施，全赖他以非凡精力和耐心促成与当地社民党的合作。正是这种对话精神，使他在制衡拉塞尔达方面举足轻重——确保这位总统永远不会忘记自己只是一介总统，而非帝王。§!"
 brazil.543.d: "两党将分别推举候选人。"
 brazil.607.t: "好的开端是成功的一半"
 brazil.607.desc: "矗立在圣本图-杜萨普卡伊东郊的老教堂从未如此热闹，而这一切只因长椅上数十人中那个特殊的存在。他既未布道，也未喧哗。但当弥撒结束，神父说出“礼成，散会”时，信众们仓促离席。教堂外另设讲坛，面朝街道的方向，镁光灯闪烁中，那个被长椅、持警棍的警察与人群环绕的身影终于现身。\n\n“我的朋友们，基督教的弟兄姊妹们，”当人群聚拢后，普利尼奥·萨尔加多开口道，“1932年我首次以议员身份服务本州。彼时我便为阻止巴西精神的堕落而战。但近四十年过去，我未见转机。诚然，里约的道德沦丧与巴西利亚的经济无能愈演愈烈。”他闭目垂首，仿佛承受千钧重负。接连不断的闪光如同将他笼罩在圣洁的光晕里。\n\n“我听见国家在呼唤精神重生。我听见它在渴求道德与精神皆备的领袖。我无法再漠视这些呼声。即便身居伊比利亚之时，祖国之痛仍如利箭穿心。”他以拳击胸，沉闷的声响通过扩音器回荡四方。\n\n出乎听众意料，余下演讲竟比预期克制。他甚至强忍住了以“Anauê”作结的冲动——尽管这念头始终诱惑着他。演讲结束，萨尔加多向人群致意后乘车离去。记者们冲向镇上仅有的几部公用电话，却震惊地发现编辑部早已获悉消息。原来民代党在演讲开始前，已将讲稿副本连同文末附录送达全国各大通讯社。"
 brazil.607.a: "上面称普利尼奥·萨尔加多将参加1970年总统大选。"
 brazil.608.t: "为主开道"
 brazil.608.desc: "“在基督里的弟兄们，Anauê。我正在伊比利亚，一位慷慨赞助者的家中向你们讲话……”\n\n维托长叹一口气，他负责张贴竞选海报的那条街早已被各党派“占山为王”。全民盟的标语铺满了某个建筑工地的临时墙面；工党和社进党则为争夺一整堵砖墙的版面寸土必争。维托沿街来回走了两遍，才找到一小块尚未被贴满的空位。他从巷子里找来一把椅子，站上去，把自己的海报牢牢钉在墙上——还剩九十九张。\n\n“……虽身在流亡之地，我的心仍与祖国巴西同在……”\n\n奥斯马尔眨了眨眼，耳边突然被什么东西擦了一下。他回头一看，只见一个鸡蛋在电话亭上炸开，蛋黄发出诡异的淡黄光泽。接着他与众人一起看向来源——一个大约二十岁、胸口别着工党徽章的年轻人，正满脸嘲讽地大骂他是个“法西斯”。不过在场的其他群众明显更支持奥斯马尔，警方也立刻围了上来，将他保护在中间，避免事态恶化。围观人群中，有人冲出人墙，追赶那个闹事者离开街口。现场呼吁保持冷静后，竞选活动便继续展开。\n\n“……我们的战场不在权贵之宫，而在政治的根基，在众议员之间，甚至在最基层的议事厅……”\n\n埃尔扎的目光扫过读书会里的一张张脸，想寻找哪怕一丝理解的目光。波莉安妮已经有十分钟没提《圣经》了，反倒热切讲述起她如何参与人民代表党的事迹。她不满足于只在书页中理解信仰，她想要“活出”信仰——而在这个号召国家团结的新运动中，她找到了将基督理想付诸实践的方式。埃尔扎没能等到任何回应的眼神：无论是赞成的，还是出于恐惧的，所有人都沉默不语。"
 brazil.608.a: "“……而凭借上帝的恩典，五年之后，我们之中必有人站出来，对抗那群堕落之徒。”"
 brazil.609.t: "102/3号磁带"
 brazil.609.desc: "录音开始\n\n戈登：“总统先生，我认为这关系到国家安全的重大利益。古拉特的行为正在把巴西带上一条不归路。他就是个法西斯，与庇隆别无二致。而一旦他倒台……”\n\n李梅：“戈登，这事为何值得我们如此上心？导弹数量差距仍在扩大，而把注意力分散到像巴西这样的第三世界国家，只会浪费我们大量资源。”\n\n戈登：“可是一旦他倒台，不是纳粹分子穆勒上台，就是共产党人布里佐拉执政。这正是巴西对我们至关重要的原因。请想想多米尼加共和国的局势，总统先生！纳粹可能借此重新在加勒比立足。而且，巴西军方对我们的忠诚，远胜于对他们自己的政府。”\n\n李梅：“有意思。如果军方真的起来反对那个法西斯，我们就支援一个航母战斗群。听明白了吗？”\n\n戈登：“是，长官。”\n\n录音结束"
 brazil.609.a: "瓦加斯主义的梦想，如今仅凭一线残息勉力支撑。"
 brazil.610.t: "第八年"
 brazil.610.desc: "人们曾用许多形容词来描述埃内斯托·贝克曼·盖泽尔——这位巴西武装力量的将军、新任命的军队首脑。有人称他庄重，有人认为他严厉。知晓他德裔血统的人说他纪律严明。而那些与他结怨者，则破口大骂或发表老套的阴阳怪气。\n\n但自1957年起，每逢某个特定的日子，再没有比“心碎”一词更能贴切形容埃内斯托·盖泽尔。八年前，盖泽尔的儿子死于火车事故；此后在医生宣告死亡的那个时刻，他总会分秒不差地将自己反锁房中追思爱子。\n\n如今妻子露西和女儿阿马利娅·露西已熟稔这套流程。她们会站在门外，隔着紧闭的门扉向悲痛欲绝的丈夫或父亲传递力所能及的慰藉。半小时后，聪明伶俐的阿马利娅会用六角扳手撬开门锁，让母亲进去。\n\n盖泽尔抬头发出凄楚的闷哼。露西决心推他一把：“一切都会好起来的，埃内斯托。你知道这对我们三人都是艰难的日子。至少去看看他，好让他知道我们从未忘记。”\n\n盖泽尔总会默许，于是三人步行至墓园。抵达后，待妻女安顿停当，将军便屈膝跪下，开始诉说："
 brazil.610.a: "“爸妈来看你了——阿马利娅也在，我们都在。”"
 brazil.611.t: "社进党推举小瓦加斯为候选人！"
 brazil.611.desc: "今日，社进党支持者齐聚圣保罗街头。人群高呼口号，声援该党新近宣布的总统候选人——热图利奥·萨尔马尼奥·瓦加斯，即公众熟知的小瓦加斯。在政治盟友劳多·纳特尔陪同下，小瓦加斯亲临现场向支持者发表演说，阐述其“为百姓建设美好国家”的愿景，并誓言摒弃所谓的“琐碎政治”。\n\n社进党以蓬勃的斗志投入选战，甚至隐现胜选期待——这与该党十年前在政坛边缘徘徊的境遇形成鲜明对比。自1965年阿德马尔·德·巴罗斯领导该党执政以来，如今他们显然志在更上一层楼，延续执政地位。小瓦加斯于1949年入党，在社进党掌权后出任圣保罗州长。此番参选总统，他背负着阿德马尔与父亲（两位深刻影响巴西政坛的巨擘）的双重政治遗产。\n\n小瓦加斯能否不负先辈荣光？社进党的政治运势能否延续？时间将给出答案，但对后者而言，前景似乎颇为光明。"
 brazil.611.a: "来看体育新闻……"
 brazil.612.t: "社进党未推举1970年大选候选人！"
 brazil.612.desc: "政治新闻方面，社进党今日早间通过电台宣布，将不会推举或支持任何候选人参与即将到来的总统选举。\n\n这一消息引发政坛哗然，但分析人士指出，随着长期领导社进党的阿德马尔·德·巴罗斯离世，这个饱受争议且丑闻缠身的政党缺乏能够凝聚人心的核心人物。\n\n自1965年以来接连不断的危机冲击下，这个长期扮演反对党角色的老牌政党显然无力角逐总统竞选。全国范围内仍有少数社进党成员自行宣布将以该党名义参选，但这些竞选活动无法获得官方背书与资金支持，胜选前景极为渺茫。"
 brazil.612.a: "来看体育新闻……"
 brazil.613.t: "工党-社民党联盟于大选前瓦解！"
 brazil.613.desc: "七十年代伊始，巴西政局在动荡中迎来新的十年。持续混乱的政治局势与飙升的油价威胁着这个国家脆弱的平衡，1970年大选的重要性愈发凸显。由左翼工党与自由派社民党组成的中左翼阵营，正竭力构建统一联盟以赢得选举。然而即便如工党-社民党这般历史悠久的政治同盟，也难逃狭隘的政治纷争。\n\n工党-社民党大会陷入混乱，两党在推举共同候选人的过程中爆发激烈争执。社民党推出坦克雷多·内维斯作为温和路线的代表，却立即引发工党的强烈抵触——后者坚持支持莱昂内尔·布里佐拉参选。布里佐拉及其支持者提出的激进转向令社民党强硬派难以接受，尽管库比契克竭力斡旋试图达成妥协，大会最终仍以僵局收场。\n\n随着新十年到来，工党与社民党二十年来首次分道扬镳。这对昔日的政治盟友如今各自推出候选人，在选战中形成分庭抗礼之势。"
 brazil.613.a: "变幻莫测的时代。"
