 BRA_development_info_tt: "§Y发展面板§!用于管理国家经济发展。\n\n点击一个§Y地区§!，将显示当地可颁布的§Y发展法令§!。\n\n§Y特殊项目§!，如§K跨亚马孙公路§!，在建设中会每月花费一些资源和政治点数，直至完成。\n\n全国范围内，只能同时存在一条§Y发展法令§!。法令持续60天，影响§Y所选地区§!的§G发展§!水平，促进当地的经济增长。\n\n最后，地图下方的图标显示当前地区的§Y发展§!程度，以及整个国家的经济发展状况。"
