 BRA_crise_petrolifera_dynmod: "石油危机"
 BRA_crise_petrolifera_dynmod_desc: "滋润巴西经济繁荣增长的是中东和邻国委内瑞拉的廉价石油。中东内乱四起，油价也随之飙升。\n\n依赖石油的巴西经济遭受重创，除非巴西能控住通货膨胀，有效解决赤字问题，否则过去十年的成就都将付诸东流。"
 regretful_marionette_latin: "懊悔的提线木偶"
 POLITICS_JANIO_QUADROS_QUISLING_DESC: "雅尼奥·夸德罗斯绝非懦夫，却不得不逃离圣保罗流亡蒙得维的亚。当曾经的临时盟友拉塞尔达陷入疯狂，纵容魔鬼崇拜者若昂·保罗·布尔涅实施种族清洗计划，将伞降搜救队变成嗜血屠夫时，夸德罗斯作为前副总统对暴政的抨击越发尖锐，自然成了清洗名单上的显要目标。他本欲像库比契克那样以身殉国，却在妻子劝说下远走乌拉圭保全性命。\n\n向来我行我素的他，却只能眼睁睁看着阿根廷铁蹄践踏巴西国土。西语征服者在南里奥格兰德推行暴政的景象令他彻夜难眠，直到某日旧识的阿根廷外交官带来魔鬼契约——在书房心理斗争数小时后，他终究点头同意。\n\n如今，这个曾因强硬民族主义立场被洛特戏称为“极端军国主义者”的男人，竟成了阿根廷扶植的傀儡总统。连他“治下”的民众都看得出，这位终日擦拭歪斜眼镜的“总统”每个毛孔都透着煎熬。可还能如何？库比契克已死，古拉特正在地牢受刑，洛特下落不明。除了这副歪眼镜和这柄破扫帚，还有谁能守护巴西？\n\n每当黑夜降临，“总统”雅尼奥·达·席尔瓦·夸德罗斯总在后悔坠入深渊。他渴望回到1962年，却深知时光不可倒流。"
 POLITICS_JOSE_PINTO_DESC: "若泽·德·马加良斯·平托怕不是遭了天谴吧？他毕生追求总统之位，如今终于如愿以偿，当了总统却发现自己无力阻止共和国走向崩溃。\n\n身为政坛老手，马加良斯·平托履历深厚：职业政客兼资深银行家，米纳斯吉拉斯州的铁杆子弟。1961至1966年担任州长期间，与拉塞尔达和阿德马尔联手推翻洛特与夸德罗斯，换来的影响力持续至今。1965年拉塞尔达竞争全民盟提名时，马加良斯·平托试图阻击却功败垂成，只能眼睁睁看着拉塞尔达当上“帝王总统”。\n\n拉塞尔达搞了五年独裁，马加良斯·平托曾试图操纵时局谋利，可高原宫与军方联手布下的棋局岂容他人染指？他试过操控抗议活动，或许是想遏制引发暴乱的民愤。但第五共和国改革激起的滔天怒火，又岂是人力所能压制？失败后，他又试图稳定金融乱局——可银行家之力终有极限。直至马加良斯遭布尔什维克刺杀，拉塞尔达才不得不将总统之位拱手相让。\n\n天呐，这算哪门子的总统——分明是在废墟上加冕的傀儡！拜拉塞尔达与布尔涅那“精妙绝伦”的大屠杀计划所赐，里约成了一片废墟。全国暴乱四起，阿马佐纳斯赤匪非但没被剿灭，反而赢得广泛同情，向着巴西利亚挺进。\n\n马加良斯知道气数已尽。他多希望能力挽狂澜，可惜迟了一年，整整一年啊……"
 POLITICS_JOAO_AMAZONAS_DESC: "若昂·阿马佐纳斯·德·索萨·佩德罗斯自成为马列主义者之初便不断自我叩问：发动人民战争是否是正确的抉择？共产主义是否真如毛泽东、斯大林等先辈的挫折所昭示的那般注定失败？普列斯特斯的修正主义是否真是唯一出路？这些疑虑如附骨之疽啃噬着他的革命信念，使他难以保持革命者应有的笃定姿态。虽然心魔可能再度来袭，但此刻它们已被独裁魔王卡洛斯·拉塞尔达点燃的焚城烈焰所吞噬。\n\n曾几何时，这个还在酒馆谈笑间被揶揄的运动，如今已赢得整个左翼阵营的拥戴——修正主义者、社会资本主义者、格瓦拉主义者乃至形形色色的机会主义者，此刻皆与阿马佐纳斯及其起义军站在同一战线。更令人称奇的是，这位革命者甚至获得了至少三分之一天主教高层的默许或同情，这得益于他刻意规避袭击教堂的战术——伊比利亚半岛前车可鉴，当年正是对教会的过激行为导致农民大量离心，最终将政权拱手让与佛朗哥。\n\n出生于贝伦市的阿马佐纳斯，年少时即决意为终结寡头统治与资本主义奉献终生。他始终疾呼要让巴西人民挣脱暴政与酷刑的枷锁。尽管心存疑虑，他始终清醒认知资本主义与法西斯将反噬自身，只是未料这场吞噬竟以里约热内卢那般惨烈的方式上演。\n\n如今阿马佐纳斯必须抛却苦涩情绪，专注破局之道。尚未溃散的政府军已折损过半，旧巴西的行政体系分崩离析。此刻左翼只需维系同盟，扩大统一战线，让布尔涅与他亲手在救世基督像下挖掘的万人坑中的受难者同眠。"
 POLITICS_NEY_BRAGA_IMPERIAL_DESC: "内伊·布拉加的一生从始至终与军旅息息相关。自青年时代起，他便与军队结下了不解之缘；而随着晋升为将军，这份情缘愈发牢固。然而，若仅以军旅生涯来界定他，就会忽略他那层次分明、错综复杂的个性。担任巴拉那州警察局长期间，他不满足于仅仅履行行政职责，而是将这一角色视作磨砺自我、广结人脉、铺就未来宏图的熔炉。\n\n1958年，他当选联邦众议员，进一步巩固了自己的政治影响力。最终，在1961年，巴拉那州人民将州长之位托付于他，使其成为该州最高领导者。如同众多军旅出身的政治家一般，布拉加坚信国家主导的基础设施建设能够撬动社会的根本变革。在巴拉那州，他几近狂热地推动工业化与各项发展计划，以迅雷不及掩耳之势打造出现代经济强省，使这片大地焕发出全新的生机，成为区域经济的中流砥柱。\n\n如今，作为拉塞尔达的继任者，内伊·布拉加已然稳坐巴西无可争议的最高权位。尽管“独裁者”的角色并非他最初所求，但他深信，这正是国家当下所需。若唯有集中全权，方能维系国家稳定、推进经济复兴，他便绝不迟疑。他是行动派，一位坚定果决的人物。此刻，巴西的未来已牢牢掌握在他的手中。"
 brazil.592.a: "真正的忠诚，并不会随着脱下军装而结束。"
