 brazil.590.t: "3比1"
 brazil.590.desc: "酒吧里，一名年轻人正用啤酒杯轻敲着桌面。往常总是抱怨酒洒杯碎的老板，此刻却目不转睛地盯着那台小电视。\n\n街上，一群少年围着一台摇摇欲坠的收音机。每当电波变成沙沙杂音时，他们齐声叹息，又立刻屏息凝神，只为不错过解说员的每一个字。\n\n家中，父子俩紧贴着电视屏幕，面色凝重。小男孩紧握双拳，仿佛只要努力一点——哪怕只是一点点——就能为巴西多争取一分追赶的时间。\n\n时钟一分一秒地挪动，令人难耐地逼近九十分钟。最终，裁判吹响了哨声。伊比利亚联盟3比1巴西。人群如释重负地呼出那口憋了半天的气，只是那声音更像是一声低低的呜咽。\n\n“还没结束呢，补时时段还没算。”\n\n“怎么会变成这样？！我们明明拥有世界上最好的球员！”\n\n“一定是技术失误——肯定是！”\n\n“接下来怎么办？全世界都会把我们当笑话看了。”\n\n1958与62年两次连夺世界杯之后，对一些巴西人而言，胜利早已成为理所当然。那个国家在经济与足球双重称霸的黄金年代，如今却显得遥不可及。"
 brazil.590.a: "“从来没发生过这样的事……”一名青年走出酒吧时低声呢喃。"
 brazil.591.t: "从亚马孙到大西洋"
 brazil.591.desc: "巴西各地洋溢着难以言表的喜悦。从圣玛丽亚到博阿维斯塔，从纳塔尔到阿克里州。里约热内卢、巴西利亚和圣保罗都爆发了庆祝狂潮，人群吹着口哨、欢呼雀跃，在激情中纵情狂欢。即便是最偏远的地区，只要收音机旁有人，就必然伴着派对欢歌。\n\n巴西的每个角落都知晓了这场伟大的胜利，充盈着澎湃的喜悦：巴西赢得了1970年世界杯。雷米特金杯在巴西利亚的街头被高高举起，欢腾的人群如潮水般在街巷间翻涌，只为一睹那胜利的实证穿行其中。作为世界上首支三夺世界杯的球队，巴西将永久保留这座奖杯。当奖杯被移送上护卫车，准备运往巴西足协总部时，雷鸣般的欢呼震撼了整座城市。\n\n这座奖杯标志着巴西足球黄金一代的诞生，它激励着后来者追逐同样辉煌的成就。但这份荣光也成了双刃剑，为后世设下难以逾越的标杆。\n\n在普拉达诺斯体育场击败智利队八年后，民众终于迎来了难得的尽情欢庆时刻。彼此素不相识的人们肩并肩欢庆，短暂冲溃了绝望的堤坝——哪怕仅闪耀一瞬。这道穿透苦难雾霭的光芒，铸就了巴西触底反弹的集体记忆，甚至让执政党在民调中收获了意外攀升的支持率。"
 brazil.591.a: "球飞之处，阳光所至。"
 brazil.600.t: "鸡舍里的狐狸"
 brazil.600.desc: "“……虽然我们尚无法确认员工们所提出疑虑的真实性，但可以证实数起异常现象，而这些或许可以用‘境外间谍活动’来解释。我们目前没有证据表明这些外国间谍属于哪个国家，但最可能的嫌疑人是阿根廷人。”情报局官员说完这句话，手一挥，将几张照片摊在总统办公桌上，然后递上一份装订好的厚重档案。\n\n总统府内死寂一片，宛如墓园。总统办公室中唯一的声音，是总统一页页翻阅报告的纸张摩擦声。报告中提到疑似渗透行动、文件篡改与情报窃取——目标直指国家最核心的秘密：核计划。一旦这一项目曝光，后果将不堪设想。总统压抑着一口颤抖的气息，将资料放下，示意那位官员继续说下去。\n\n“我们正在核实哪些是虚惊一场，哪些是真正值得警惕的问题。这项调查或许会持续一段时间。但无论结果如何，我们强烈建议追加预算与人力，用以加强安保与防谍工作。”\n\n“批准了。继续查，保持沉默。我希望这件事尽快了结。”"
 brazil.600.a: "“如果发现了漏洞——不计代价封住它。”"
 brazil.601.t: "祸从口出"
 brazil.601.desc: "巴西核计划：全线曝光！\n\n阿根廷间谍窃密焚档，核机密毁于一旦！\n\n“情报”人员失职，国家秘密拱手让人！\n\n就在今天清晨，巴西与阿根廷的民众一同被醒目的报纸头条震醒。八卦小报上铺天盖地都是一个惊人的消息：巴西一直在暗中推进核计划，而来自阿根廷的间谍不仅成功潜入该项目内部，还在逃离前偷走并销毁了大量关键性文件。这一丑闻瞬间在巴西社会引发巨大愤怒：无论是平民还是政要，都对当局进行了猛烈批评，越来越多的人开始呼吁政府官员大规模辞职。\n\n短期内，公众对政府的信任跌至谷底；联邦参议院已启动跨党派调查，试图查清这场灾难究竟是如何发生的。而从长远来看，核计划所遭受的打击远超预期。想要重建失去的成果，恐怕需要数年时间，而那些曾投入无数心血的数据与成果，现在只怕早已被转移到了布宜诺斯艾利斯的密室之中。\n\n目前，除了阿根廷公然嘲讽我们的狼狈境况之外，其他国家尚未发布正式声明。但各国驻巴西大使馆从清晨起便不断打来电话——语气嘛，嗯……都不太友善。"
 brazil.601.a: "好了好了。请大家保持冷静，也许，还没到彻底失控的时候。"
