 BRA_megaproject_rnb_lacerda: "鲁本斯·瓦斯\n大桥"
 BRA_megaproject_rnb_desc: "为重振1966年新年风暴重创的瓜纳巴拉经济，政府将§K里约-尼泰罗伊§!大桥列为重点工程。建成后的大桥将连接里约和尼泰罗伊两座城市，为当地经济注入动力。"
 BRA_megaproject_rnb_lacerda_desc: "为重振1966年新年风暴重创的瓜纳巴拉经济，政府将§K鲁本斯·瓦斯大桥§!大桥列为重点工程。建成后的大桥将连接里约和尼泰罗伊两座城市，为当地经济注入动力。"
