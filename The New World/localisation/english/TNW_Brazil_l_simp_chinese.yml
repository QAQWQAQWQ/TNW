 brazil.593.t: "渴望已久的答案"
 brazil.593.desc: "雅伊梅·蒂奥姆诺扶了扶墨色护目镜，抹去额间的汗珠。拥挤的掩体里闷热难当，科学家与军官们散发出的焦灼气息混杂着热带的湿气。此刻，距此十公里外的雨林深处，正安放着凝聚数月心血、耗费千万克鲁赛罗的五万吨当量核弹“奥贡”——取名自乌班达教战神与锻冶之神。所有人都屏息凝望着监控屏上的那片苍翠，雅伊梅仿佛能听见自己吞咽口水的声响。现在，没有退路可言。\n\n若失败如何？不！绝不能失败！他余光瞥见左侧阿尔瓦罗·阿尔贝托挺直的脊背。这位四处奔走推动核计划的灵魂人物此刻面容冷峻，静待多年的呕心沥血结出硕果。\n\n“起爆倒计时十秒。”雅伊梅听见自己干涩的声音。他强迫自己随呼吸默数：五、四、三——\n\n倒计时还没念完，一片惊呼已然炸开。爆炸提前了！即便有护目镜保护，众人仍被过早绽放的强光惊退半步。当灼目的光斑褪去，监控画面中升腾的蘑菇云翻滚着腾向天空。丛林深处的鹦鹉受惊飞起，发出刺耳的鸣叫。一片死寂。突然，阿尔贝托笑了起来。先是低声轻笑，然后是放肆地大笑。\n\n“先生们！我们成功了！”喝彩声瞬间淹没掩体。雅伊梅转身望向欢腾的人群，徐徐吐出滞留在胸腔的热流。感谢上苍，萦绕于心的问题终于得到解答：不会失败。"
 brazil.593.a: "巴西终于破解了原子的秘密！"
 brazil.594.t: "普罗米修斯"
 brazil.594.desc: "在高原宫的最高会议室内，阿德马尔的声音里带着久违的喜悦。第一颗核弹的成功制造，几乎没有遇到任何阻碍，不仅确立了巴西在南美大陆的霸权地位，也极大提升了国家在国际舞台上的战略投射能力。对阿德马尔来说，这份激动难以言表。\n\n“随着核武器正式列装共和国军队，”阿德马尔从梅迪西的报告中朗声念道，面对国家安全委员会的诸位成员，“我们的安全不仅在美洲大陆得到保障，甚至已步入全球列强之列。毫无疑问，我们的核计划已经取得了压倒性的成功！”话音落下，会议厅内掌声雷动，阿德马尔放下报告，嘴角带笑地加入了这场欢庆。整个巴西，都将在这次成功中受益！“确实，您所言不虚，将军。”阿德马尔目光炯炯地扫过在座众人，“我们如今已可自豪地称自己为全球强权之一，甚至……可以说是超级大国的后起之秀！”又一阵掌声响起，阿德马尔微微叹了口气，重新坐下。\n\n“那么，接下来我们该怎么做，先生们？”梅迪西抿了抿嘴，双手交叉放在桌上，语气沉稳：“目前最稳妥的做法，是暂时保密。让我们的对手摸不清我们的实力，这比直接亮出底牌更有优势。此外，我担心，一旦核计划公开，必然会成为外国情报机构的主要目标。”\n\n纳特尔不耐烦地用手指敲着桌面，轻轻“啧”了一声：“我可不这么认为。公开试爆，才能真正让我们的对手胆寒，不论是国内的反对派，还是国际上的敌人！”他微微一笑，“再说，这对您的民调绝对是个大大的加分项，总统阁下。”阿德马尔皱了皱眉，心中不禁权衡起来。如果向公众展示核武器的威力，确实能让自己在下次大选中稳操胜券，并且向全世界昭示巴西的实力。然而，梅迪西的谨慎并非没有道理——如此巨大的力量，一旦过早暴露，巴西是否能承受住随之而来的国际震荡？"
 brazil.594.a: "众神的火焰，已然落入他们的掌中。"
 brazil.595.t: "第六印"
 brazil.595.desc: "“……核试验大获成功。”助手读完报告后，会议室经历了片刻寂静，随即爆发出雷鸣般的掌声。军人们鼓掌最为热烈，部分文官虽面露喜色却较为克制，还有些人显然只是在强颜欢笑。唯有卡洛斯·拉塞尔达总统始终沉默。\n\n总统等待掌声渐息后开口：“谢谢。”所有目光立刻聚焦在他身上，期待后续发言。然而这并非安抚或庆贺之辞，而是散会令。身着军装与西装的人群鱼贯离开会议室，走廊里的交谈声渐行渐远，最终只剩拉塞尔达独坐空厅。\n\n他的思绪飞越三千英里来到布宜诺斯艾利斯。仿佛看见阿根廷人正擦拭额间汗水，评估着他们的核计划——亚马孙丛林升起的蘑菇云，必将催生更庞大、更强劲、更具毁灭性的造物。东京与日耳曼尼亚此刻定然在召开紧急会议，讨论这个拥有核武器的美国盟友。恍惚间他看见U型潜艇在海岸线浮现，曳光弹幕倾泻在里约热内卢，救世基督像在火球中熔解。拉塞尔达颤抖着伸手，端起办公桌上的咖啡杯。"
 brazil.595.a: "《默示录》6:16"
 brazil_595_tt: "向山岭和岩石说：“倒在我们身上，遮盖我们罢！好避免那坐在宝座上的面容和那羔羊的震怒。”"
 brazil.599.t: "苍穹无泪"
 brazil.599.desc: "“好了。卡洛斯，相机带了吗？”一个卷发小伙子点点头，手里摆弄着一台宝丽来Model 95。“拉斐尔，你负责电闸？”金发大块头男生竖起大拇指。“鲍勃，电焊笔准备好了？”华裔学生敬了个礼回应。“我这儿也……”一个稍年长的男生从冰箱大小的机器后面钻出来，他的胸牌写着卡伊克。“……检查完线路了。兄弟们，开机！”\n\n拉斐尔扳下电闸，机器嗡嗡作响开始运转。鲍勃立刻投入工作，把电焊笔按在接口板的焊点上。每次按压都会点亮对应面板。“第一比特。第二比特。第一比特……”他的操作精准利落，显然对这台机器了如指掌，难怪大伙都叫他“大师傅”。\n\n他按下外部焊点的刹那，所有指示灯突然熄灭。紧接着八块面板依次亮起。“成功了！卡洛斯快拍！”卡洛斯冲过来，鲍勃刚露出笑容的瞬间，历史性的一刻被定格——巴西计算机首次运算（2乘2等于4），以及实现这个奇迹的人。这一切都发生在航空技术学院的地下室里。\n\n小伙子们碰着博浪啤酒庆祝。几杯下肚后大家开始吐露心声：工程师卡洛斯说看上个喜欢计算机的姑娘，计算机专家拉斐尔想上报纸，接线员卡伊克想去美国科技公司混高薪。唯独项目设计者鲍勃·李什么都没说。"
 brazil.599.a: "他的目光越过窗棂，望向了浩瀚星空。在那里闪烁的，是超越凡尘的远大理想。"
