 BRA_gp_cd_0_name: "马里奥·皮诺蒂"
 BRA_gp_cd_0_trait: "§Y公共卫生斗士§!\n  - 医疗保健目标进展加成：§G+15%§!"
 BRA_gp_cd_0_desc: "皮诺蒂是社进党成员，也是经验丰富的医务人员与卫生专家。皮诺蒂是巴西国家疟疾中心主任，于五十年代开创了使用氯喹盐来根除疟疾的先例。虽然他不是社会党或工党成员，但他曾与库比契克就医疗事务进行过合作，在这方面关系不错。如果库比契克想要改善巴西医疗，皮诺蒂就是他不可或缺的盟友。此外，他甚至还能改善政府与阿德马尔和社进党的关系。"
 BRA_gp_cd_1_name: "埃里克·德·卡瓦略"
 BRA_gp_cd_1_trait: "§Y航空公司老总§!\n  - 解锁§Y奔赴未来的航线§!国策分支。"
 BRA_gp_cd_1_desc: "埃里克是瓦里格航空公司的一名商人，瓦里格航空公司成立于1927年，是巴西的第一家航空公司，也是唯一一家国际航空公司。埃里克为扩大瓦里格的公司规模与航线机队做了许多工作。如果库比契克想要重视航空领域，尤其是增设机场，那埃里克的地位就将变得无比重要。"
 BRA_gp_cd_2_name: "奥斯卡·尼迈耶"
 BRA_gp_cd_2_trait: "§Y混凝土的毕加索§!\n  - 巨型项目建设速度：§G+5%§!\n  - 巨型项目乐观加成：§G+15%§!"
 BRA_gp_cd_2_desc: "奥斯卡·尼迈耶被广泛认为是现代建筑发展的关键人物之一。在他手下诞生的伟大杰作涵盖了巴西利亚的许多公共建筑，比如国民议会、总统府和闻名遐迩的巴西利亚主教座堂。尼迈耶与共产主义团体的关系可能会让一些人投来怀疑的目光，但他与库比契克的友谊以及对建筑的深入了解肯定会为他所参与的任何项目增光添彩。"
 BRA_gp_cd_3_name: "塞尔索·费塔多"
 BRA_gp_cd_3_trait: "§Y结构主义规划师§!\n  - 巨型项目建设速度：§G+10%§!\n§Y发展沙皇§!\n  $BRA_develop_region_1$\n    - 每月工业增长：§G+0.10%§!\n    - 每月机械化程度增长：§G+0.10%§!"
 BRA_gp_cd_3_desc: "费塔多是工党成员，在库比契克的第一届发展委员会工作过，在他的经济规划中是洛特的重要盟友。他是凯恩斯主义和结构主义经济学的支持者。费塔多将继续实践他的梦想，拉动巴西东北部地区的发展，使其能够与巴西其他地区走上经济的同一起跑线。他也是巴西最杰出的知识分子之一，曾任巴西开发银行行长。"
 BRA_gp_cd_4_name: "坦克雷多·内维斯"
 BRA_gp_cd_4_trait: "§Y政治关联§!\n  - 参议院法案支持：§G+10%§!"
 BRA_gp_cd_4_desc: "坦克雷多是社民党最重要的领导人之一，他在库比契克的最后一届任期内担任经济顾问，并在洛特政府期间领导了经济部。他在经济学方面的技能和知识肯定会成为发展委员会的宝贵财富，任命他也能帮助委员会解决许多政治纠纷，因为他在担任国会议员、顾问和部长期间展现出的领导能力受到人们的一致尊重。"
 BRA_gp_cd_5_name: "奥斯维诺·费雷拉·阿尔维斯"
 BRA_gp_cd_5_trait: "§Y护宪派背景§!\n  - £BRA_constitutionalists_texticon §K护宪派§!每周支持度：§G+0.25§!\n§Y石油是我们的§!\n  - 能源目标发展加成：§G+10%§!"
 BRA_gp_cd_5_desc: "阿尔维斯将军是一位护宪派军官，也是在古拉特和艾德娜·洛特建议下，库比契克设在里约的第一军的军长。做此任命的目的是使经过改革的军队继续忠于总统，因此他在库比契克的决策考量中占有一席之地。他不是任何政党的成员，不会同任何人结盟，因此是一个安全、不涉及政治的选择，大可信赖他的绝对忠诚。"
 BRA_gp_cd_6_name: "瓦尔德马·莱维·卡多佐"
 BRA_gp_cd_6_trait: "§Y军队联络§!\n  - 军方§G忠诚度§!随时间增长。"
 BRA_gp_cd_6_desc: "卡多佐是巴西国家功勋最为卓著的元帅之一，于一战结束前几周开始军旅生涯，随即参加了1924年的圣保罗起义。之后，他参加了1930年的巴西革命，在二战中指挥巴西远征军的一个炮兵营，再后来在圣保罗当师长。瓦尔德马见证了过去五十年巴西军队所经历的一切，虽已退出现役，这位老帅仍深受尊敬，还有很多商界关系，要想获得军方支持，便应当将他选为盟友。"
 BRA_gp_cd_7_name: "弗里德里希·舒尔茨-文克"
 BRA_gp_cd_7_trait: "§Y大众巨头§!\n  $BRA_develop_region_3$\n    - 每月工业增长：§G+0.20%§!\n  $BRA_develop_region_4$\n    - 每月工业增长：§G+0.20%%§!"
 BRA_gp_cd_7_desc: "舒尔茨-文克是巴西最大汽车制造商之一巴西大众汽车公司的老板。巴西和德国关系十分紧张，两国之间贸易稀少，但大众汽车是为数不多的例外。库比契克打算扩大大众在巴西的业务，而舒尔茨-文克将是促进汽车行业进一步发展、刺激巴西经济不断进步的关键盟友。"
 BRA_gp_cd_8_name: "马里奥·华莱士·西蒙森"
 BRA_gp_cd_8_trait: "§Y媒体大亨§!\n  - 目标失败导致的乐观惩罚：§G-30%§!"
 BRA_gp_cd_8_desc: "马里奥·华莱士·西蒙森公认是巴西影响力最大的商人之一，他是电视网络TV Excelsior的主要所有者。他还投资了许多初创的航空公司。马里奥对国家工业和技术增长的坚定支持使他在库比契克的发展委员会占据了一席之地。总统需要一切可能的媒体支持，而西蒙森的人脉和声望肯定能帮上大忙。"
 BRA_gp_cd_9_name: "保罗·弗莱雷"
 BRA_gp_cd_9_trait: "§Y先锋教师§!\n  - 教育目标进展加成：§G+15%§!"
 BRA_gp_cd_9_desc: "保罗·弗莱雷是一名教育家与哲学家，他与工党的基督教社会主义派系有联系，但因其马克思主义信仰和著作受到许多人的批评。他致力于通过推广独创的教学模式，系统性提升国民识字率。弗莱雷和库比契克一致认为，库比契克的上一届政府完全忽视教育政策，如今必须纠正这个错误，这正是弗莱雷加入发展委员会的根本目的。"
 BRA_gp_cd_10_name: "罗伯托·坎波斯"
 BRA_gp_cd_10_trait: "§Y发展经济学家§!\n  - 发展目标进度加成：§G+15%§!"
 BRA_gp_cd_10_desc: "坎波斯是社民党人，巴西知名经济学家，也是哈耶克的追随者。尽管如此，他始终支持瓦加斯的经济民族主义。他支持创建巴西国家开发银行，对许多新兴产业进行扶持。现在，作为库比契克的经济顾问，他将继续推行类似的政策，最引人注意的是他试图将库比契克的发展主义政策与当地企业结合起来。"
 BRA_gp_cd_11_name: "丹特·佩拉卡尼"
 BRA_gp_cd_11_trait: "§Y工会主席§!\n  - 每周£BRA_JK_people_texticon §Y人民§!的乐观：§G+0.50§!"
 BRA_gp_cd_11_desc: "工人总指挥部的现任主席、全国工业工人联盟的干部丹特·佩拉卡尼是巴西工会中的关键人物。这两个组织都是巴西共产党和巴西工党内部不可忽视的重要力量。在党明确支持阿德马尔·德·巴罗斯并且佩拉卡尼自己受到巴西工党的邀请后，他就脱离了巴共的组织。自那时起，他就步步高升，成为了巴西工党中的重要人物并在巴西各地的工人运动中建立了广泛的人际网络。而且，他同时受到工会领袖和政客的欢迎。然而，由于他过去多次参与罢工并且数次被捕，社民党的许多人十分警惕这个争议人物。不过，古拉特和洛特依然对他表示支持。要是没有佩拉卡尼的钦点，联盟中恐怕根本就不会有工党的一席之地。"
 BRA_gp_cd_12_name: "普利尼奥·阿鲁达"
 BRA_gp_cd_12_trait: "§Y农业改革家§!\n  - 每月机械化程度增长：§G+0.10%§!"
 BRA_gp_cd_12_desc: "基督教民主党的左翼领袖人物普利尼奥是农业和土地改革最为积极的支持者之一。他自圣保罗政坛发迹，迅速跻身联邦众议院，先后加入经济、农业与社会立法等核心委员会，与社民党及洛特政府保持密切协作。库比契克看重其娴熟的谈判技巧、演说才能及法学造诣，决意将这位改革派干将纳入发展委员会。"
