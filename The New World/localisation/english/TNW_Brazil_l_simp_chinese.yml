 BRA_announce_the_second_programa_de_metas_desc:0 ""
 BRA_the_quadros_presidency:0 "夸德罗斯任期"
 BRA_the_quadros_presidency_desc:0 "雅尼奥·夸德罗斯现在是总统了！这位曾为人师的政治家，终于登上了国家权力的巅峰。他常被误解，也常遭讥笑，更是被所有人低估，但今天，他用选票回应了质疑，迈着坚定的步伐踏入了权力的中心。\n\n前路艰险，使命在肩。国家的经济亟待重整，市场必须得到松绑，税赋必须得到削减，这头吸血的官僚怪物必须被果断斩断——唯有如此，小企业主与普通巴西人才能从债务与压榨中解放出来。腐败体系不能再继续腐蚀国家根基，道德必须重建，国家必须回归其基督教信仰的本源，那是我们凝聚为一体、托起文明伟业的精神支柱。\n\n内政需重振，外交亦不容轻忽。巴西理应在南半球挺立潮头，成为挣脱殖民锁链、奔向光明命运的民族巨人。在这个新纪元中，无论是美利坚的雄鹰，抑或日耳曼与大和的帝国，都必须将我们视为平等的对话者。巴西的尊严与荣光，不容轻慢。\n\n夸德罗斯总统，要令这一切化为现实。"
 BRA_anti_corruption_campaign:0 "反腐败运动"
 BRA_anti_corruption_campaign_desc:0 "或许，对于夸德罗斯总统而言，最紧要的政策依旧发起反腐败的全面战争。\n\n腐败存在于社会的每一个角落，逐步蚕食着普通巴西人对政府最后的信任。从贪婪的税务官员，到可以买通的警察，再到泯灭良知的法官——这一切，都是国家未能实现公平与正义目标的活生生写照。\n\n夸德罗斯总统计划从根源下手，削减政府开支——那是久而久之演变为贪欲源泉的财富之井，也是库比契克与洛特治下吸引贪婪之徒的温床。与此同时，凡是已被腐败沾污者，也将在一场声势浩大的反贪行动中被一一肃清。任何染指不义的公务员或政府雇员，都将被毫不留情地革职问责。\n\n无论代价多高，腐败瘟疫的蔓延都必须就此止步。愿主的恩典与正义与我们同在，我们必将战胜那些祸国殃民的腐败之敌。"
 BRA_use_presidential_decrees:0 "利用总统法令"
 BRA_use_presidential_decrees_desc:0 "我们这场肃清腐败的伟大征程，必须以制定新法为起点，为打击这一社会顽疾奠定法律基础。然而，事情却远比表面复杂，总统眼下的局势并不轻松。\n\n历届国会从未在反腐方面有所作为，更遑论他们自身是否清白——许多议员早已腐化至骨髓，指望他们来立法清除腐败，无异于请狐狸来守鸡窝。这般微妙棘手的局面，注定不能走寻常路。\n\n因此，夸德罗斯将利用总统法令，绕过立法机关，直接采取果断行动。这不仅能迅速落实政策，也能免去与那些只为私利奔走的政客周旋的烦扰。可以预见，反对党议员与最高法院必定会对总统的某些措施大肆攻击，宣称其“违宪”。但政府对此并不担忧。让这些蠢人去大庭广众之下为腐败与不作为站台吧！那只会让人民更加看清谁是真正站在他们一边的人。夸德罗斯总统，将因他们的反对而更显坚定，更得民心。"
 BRA_consult_the_udn:0 "咨询全民盟"
 BRA_consult_the_udn_desc:0 "道德的纯洁与行为的清正，是值得追求的理想，但在这充满庸俗与权谋的人世间，往往难以完全实现。深知“完美乃善的敌人”这一道理，夸德罗斯总统决定就即将展开的反腐运动，与全国民主联盟展开磋商。\n\n毫无疑问，全民盟中的不少政客早已在权力的流水中暗自截留了太多的“水费”。让这些家伙提前得知风声、销毁证据，令总统心中极为不快。但他也明白，这是不可或缺的一步棋。总统所领导的国家工党势力单薄，远不及全民盟那般根深叶茂。虽然夸德罗斯凭借个人声望赢得了选票，但若想真正有所作为，就必须在政治上与全民盟结成松散的联盟。\n\n想要合作，便要有所让步。为了保住与全民盟之间这层薄冰般的“善意”，做出一些牺牲——也是值得的。"
 BRA_only_when_neccessary:0 "唯于必要之时"
 BRA_only_when_neccessary_desc:0 "即将展开的反腐风暴，势必将波及大量政客，其中不乏全民盟的成员——这个保守主义大党虽是总统夸德罗斯勉强维系的执政伙伴，但总统对腐败分子从无怜悯之心，无论他们是否“政治上有用”。\n\n全民盟将不会收到任何提前通报。无论涉事者隶属于哪个政党，只要有罪，就必须在法庭上接受审判。这一举措必然会激怒全民盟，而拉塞尔达的报纸也定会发起猛烈抨击。但任那乌鸦如何嘶叫，只要这项运动沾染上哪怕一丝政治私利的污点，它就会失去全部的正义与意义。\n\n夸德罗斯总统树敌无数。但愿我们以此为慰藉：义人多有苦难，天主却必搭救他脱离苦海。"
 BRA_create_an_anti_corruption_ministry:0 "成立反腐部门"
 BRA_create_an_anti_corruption_ministry_desc:0 "这场反腐肃贪的圣战即将迎来尾声。我们已彻底清扫了巴西社会各层级的腐败政客与官僚，在净化国家经济生活方面，取得了可喜的进展。然而，现在政府即将踏入最艰难的一步：巩固成果。\n\n依靠总统行政令逮捕众多贪腐分子，固然行之有效；但若想让反腐制度化、常态化，总统夸德罗斯必须建立一支常设力量——一个专责维护政治清明的国家机构。这一机构将以永久任务编制运行，需在全国范围内行使职权，且必须拥有“说得出、咬得动”的执行力。要实现这一构想，必须依赖国会拨款支持。\n\n或许有人会质疑：当前政坛对夸德罗斯总统的怨气，会让这个法案在参议院遭遇重重阻力。但我们的对手错得离谱。那些还没被我们送进监狱的议员们，终究会被说服——他们终将明白，是时候为国家的清明事业贡献一份力量了。"
 BRA_proclaim_the_ifp:0 "宣告独立外交政策"
 BRA_proclaim_the_ifp_desc:0 "夸德罗斯从政以来，始终怀抱着一个梦想——推动真正独立的外交政策。一个不再盲从美国、挣脱新殖民主义枷锁的巴西。在这条路上，洛特总统曾迈出小小一步，向日本寻求资金援助。而今，真正的重任落在夸德罗斯肩上——他将走向世界与，各国展开对话，不论其大小，只为强大的巴西争取最大利益。\n\n毫无疑问，此举将在巴西利亚和华盛顿两地引发强烈反弹。但夸德罗斯总统不会动摇。在这个动荡不安的时代，我们这片南方大地上的共和国，必须走出自己的道路。美国的共和与民主理想固然值得借鉴，但巴西人必须牢记：唯有在大国之间谨慎平衡，才能为国家赢得提升的机会，喘息的空间。\n\n“独立外交政策”——简称IFP，如今正式启航。伟大的征途，就此展开！"
 BRA_an_african_adventure:0 "非洲冒险"
 BRA_an_african_adventure_desc:0 "非洲——人类的摇篮，已在最卑劣的殖民压迫下失落了整整一个世纪。然而，希望与自由的光芒，仍在每一位非洲人心中闪耀，也在撒哈拉以南新兴国家的脉搏中悄然跳动。\n\n随着德军在西非的轰炸宣告结束，那片土地正迎来历史性的转机。新生的国家正在那里迅速崛起，而我们正有机会抢占先机。只要巴西率先伸出援手、传递友谊，就能在崭新的非洲大地上赢得宝贵的战略空间，保障我国在南大西洋的影响力稳步上升。\n\n有人指责我们贸然涉足这一片殖民残局与大国博弈的泥潭。这些人无非是看不清“独立外交政策”对巴西未来的深远意义罢了。愚者短视，而智者先行——我们要走的，是属于新世纪巴西的道路。"
 BRA_condemn_colonialism:0 "谴责殖民主义"
 BRA_condemn_colonialism_desc:0 "殖民主义，是近代历史上最深重的罪恶之一。美洲、亚洲、非洲无数国家遭受征服与奴役，而这一野蛮秩序竟在战后依旧阴魂未散——德意等新兴强权，如今又在非洲肆意扩张，延续着旧时代的掠夺逻辑。\n\n对此，巴西政府将毫不妥协地予以最强烈的谴责，尤其是在非洲大地之上。我们将坚定不移地支持非洲的新兴独立国家，这份赤诚，势必会赢得当地领袖的好感与信任。然而，这也必然伴随代价——意大利帝国作为少数几个不结盟且具备战略价值的独立强国，原本是我方独立外交政策所希望争取的对象之一。\n\n但如今，直言不讳地谴责殖民主义，无疑会激怒意大利，也将延缓我们与之接近的步伐。这就是我们为真理、诚实，以及各民族之间真正兄弟情谊所必须承担的代价。"
 BRA_a_more_cautious_approach:0 "注意谨慎行事"
 BRA_a_more_cautious_approach_desc:0 "殖民主义确是现代史上的巨大罪恶，但它也是一个盘根错节的体系，其瓦解绝非一朝一夕之功，更需审慎、渐进的策略。在这个日益极化的世界中，像意大利这样的国家，既是殖民体系的参与者，又是独立于美德两极之外的重要力量。同时，南非等国家虽由少数族群统治，却也不隶属于任何传统帝国体系，其特殊地位亦不可忽视。要实现夸德罗斯总统“独立外交政策”的宏图，与这些国家保持接触、推动和解，是至关重要的一步。\n\n因此，我们将慎言以行。我们会继续坚定反对殖民主义，但暂时不会对具体国家过于点名批评。我们将对德意志帝国发出强烈谴责，同时对其他殖民强权保持一定的战略模糊。非洲人民历来擅于在列强之间巧妙周旋，相信他们定能理解我们如今的谨慎与克制。"
 BRA_reach_out_to_cameroon:0 "接触喀麦隆"
 BRA_reach_out_to_cameroon_desc:0 "想从非洲腹地获取消息，其难度常常不亚于打探西伯利亚中部的情势——然而，正是这两片远方之地，如今都从德意志势力的退却中获益良多。\n\n在昔日的“中非专员辖区”北方，矗立着一个坚定的反殖民主义灯塔——喀麦隆非洲国。喀麦隆人为这片土地浴血奋战多年，不仅抵抗德国，更拒斥法意美等国在地区内的一切渗透与操控。也正因此，这个国家不幸被冠以“流氓国家”之名，被孤立于国际舞台之外。如今，是我们发出善意的时候了。巴西必须主动伸出手，接触喀麦隆，郑重重申我们对所有反对殖民压迫国家的支持。无论外界如何误解，我们知道：他们是在为真正的自由而战。"
 BRA_ban_the_bikini:0 "禁止克里米尼服饰"
 BRA_ban_the_bikini_desc:0 "一个幽灵正在巴西游荡。\n\n起源于欧洲，现已遍及了全国海滨，一种邪恶的意识形态正在年轻人之间传播。如不及时加以控制，这场运动便会像共产主义与法西斯主义一般，毁掉我们的国家。没错，我们谈论的便是现如今克里米尼流行的趋势。\n\n法国人设计出了一款邪恶的服装，证明了其国家的堕落，而现如今，这款服装已传播至巴西。我们的年轻人，作为巴西男子汉气概的完美体现，竟整日被卑劣的女性计俩所魅惑。他们宝贵的气概已慢慢被腐蚀！\n\n禁止克里米尼运动只是夸德罗斯总统重塑基督教传统价值观的第一步。这些不知廉耻的游泳者正如同海草般泛滥，警察将被授权在全国的海岸线稽查。事关巴西灵魂的战斗开始了！"
 BRA_embrace_opus_dei_thought:0 "接纳主业会"
 BRA_embrace_opus_dei_thought_desc:0 "主业会成立至今已有四十年左右，如今已悄然成为天主教会内部最具影响力的组织之一。它倡导信徒在日常生活中寻求神圣、在专业岗位上追求卓越，也逐步通过一套全新的政治哲学，谨慎而稳健地迈入了公共事务的领域。\n\n主业会的理念认为，基督教律法不应直接套用于世俗政体；他们主张经济自由化，支持自由市场，并提出应由有才干且虔诚的人士引领一个道德健全的社会。这样的思想，与夸德罗斯总统对巴西未来的设想不谋而合。\n\n或许有人会批评主业会在面对伊比利亚半岛的独裁政权时过于沉默，夸德罗斯总统却视这种“避于公众视野之外”的克制为对“凯撒的归凯撒”的真实践行。这种政治上的冷静与自持，恰恰是成熟信仰与现代治理精神的体现。"
 BRA_outlaw_gambling:0 "取缔赌博"
 BRA_outlaw_gambling_desc:0 "正直之人，只求一日辛劳换一日工薪，从不妄想不义之财。然而，总有人沉溺于一夜暴富的幻梦之中——而这欲望一旦滋生，便孕育罪恶；罪恶一旦膨胀，便通往灭亡。\n\n赌博之害，不止于倾家荡产、助长黑帮，更是对人灵魂的深刻腐蚀。它使人迷失、堕落，最终远离信仰与救赎。因此，夸德罗斯总统将以此为己任，向这社会之癌发起毫不妥协的打击。\n\n但遗憾的是，赌博在巴西社会中广受欢迎，要将其彻底根除绝非易事。有人认为，这样的努力终将徒劳。但道德的召唤不可回避——只要还有一位国民沉沦其中，我们便有责任将其拉出深渊。无论此举将带来多大的政治代价或反弹，夸德罗斯总统都将坚决发布禁令，并调配额外警力，全面清剿非法赌博行为。那些可怜的灵魂，唯有在主的庇佑中寻求救赎，方能挣脱这世间的剧毒枷锁。"
 BRA_travel_to_cuba:0 "前往古巴"
 BRA_travel_to_cuba_desc:0 "距佛罗里达不过两百公里之外，便是那座名为古巴的岛屿。它的领导人菲德尔·卡斯特罗，以惊世骇俗之姿成功推翻了富尔亨西奥·巴蒂斯塔的统治，其革命之迅猛，震撼了整个世界。在美国家门口完成这一壮举，古巴革命却始终维持着与美洲霸主的“睦邻”姿态。尽管如此，卡斯特罗依旧是美洲大陆上罕见的、真正独立于美国影响之外的领导人。\n\n有人痛斥卡斯特罗是社会主义者、民粹主义者，甚至是独裁者。但夸德罗斯总统深知，上天行事自有其奥秘，卡斯特罗正是这新时代中应运而生的领导者之一。他所代表的，不只是古巴的命运，更象征着拉丁美洲新一代自主意识的崛起。“独立外交政策”的实践，正要求我们与古巴建立更紧密的联系。唯有如此，巴西才能在万国合唱中唱出属于自己的声音，赢得应有的尊严与话语权。"
