 BRA_megaproject_sus: "统一医疗体系"
 BRA_megaproject_sus_desc: "一项法案的通过肯定不能为所有人提供医疗保健。必须在全国各地建立医院，才能让所有人都能获得医疗保健服务，防止医疗系统承受压力而突然崩溃。只有经过多年努力，我们的梦想才能实现。"
