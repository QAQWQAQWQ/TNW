 brazil.621.t: "我的一部分"
 brazil.621.desc: "总统绶带轻柔地披在她肩上，轮廓线条勾勒得恰到好处——仿佛命中注定，这件东西原本就属于她，如今终于回到了她的身上。报纸会写，这是她“被授予”的荣誉。但她自己清楚，那不是授予，而是夺取。是她以日复一日的拼搏换来的时刻。\n\n在世人眼中，她永远只是“总统的女儿”。他们以为她能成为副总统候选人，只是为了造势，为了打造一个女性参政的噱头，借她父亲的余威登上权力的高台。他们愿意相信一切，唯独不愿承认，是她自身的政治才干，是她的洞察与手腕，让她赢得了胜利。\n\n后来，还有一个阿德马尔。直到今日，她依然说不清自己对他究竟是什么情感。他贪腐至极，用“社会正义”的幌子行买票之实，是那个旧时代的遗老。但她无法否认，他确实在意那些最弱势的巴西人民，而且真心想为他们做些什么——哪怕手段古怪，理念扭曲。\n\n他会贪污，但他也会兑现承诺——而那些只知道贪污或干脆什么都不做的人，在巴西比比皆是。\n\n然后，他死了。她成了总统。她继承了他的政治机器，而她必须将其改造成一台真正能够推动进步的引擎，一种选举之后依然能持续变革的力量。埃德娜相信，她做到了——即使她只有短短一年的时间。但如今，她拥有了更多时间，也拥有了属于她自己的民意授权。\n\n她望向前方，那是一个充满希望的未来，正等着巴西张开双臂迎接。她知道，并不是所有人都会欢迎改变。但这正是她存在的意义——这是她的天赋所在，这也是阿德马尔留给她的天赋。\n\n那是他的遗产，是那头公牛临别前的馈赠。政治终究是最肮脏的行当。而如果她必须拥抱这份肮脏，才能有力量去改变它，那她便会义无反顾地踏进去，毫不犹豫。"
 brazil.621.a: "这是她不情愿接下的礼物，但绝不是可以随意抛弃的东西。"
