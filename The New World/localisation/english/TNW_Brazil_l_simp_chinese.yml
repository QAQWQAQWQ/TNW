 BRA_megaproject_pn_desc4: "§B北环线§!是一条穿越亚马孙北部丛林的林间公路，从阿马帕延伸到哥伦比亚边境，为进一步的定居和开发奠定基础。\n\n公路已经完成§G[?BRA_develop_highway_progress|1]%§!。"
 BRA_megaproject_tah: "跨亚马孙公路"
 BRA_megaproject_tah_desc: "§K跨亚马孙公路§!是巴西史上最宏大的基建工程，其目标是在为亚马孙内部的资源提供运输条件的同时，建立起一条连接到秘鲁和哥伦比亚的陆上道路。"
