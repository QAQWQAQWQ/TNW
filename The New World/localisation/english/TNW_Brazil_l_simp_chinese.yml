 POLITICS_NEY_BRAGA_SORBONNE_DESC: "内伊·布拉加的一生从始至终与军旅息息相关。自青年时代起，他便与军队结下了不解之缘；而随着晋升为将军，这份情缘愈发牢固。然而，若仅以军旅生涯来界定他，就会忽略他那层次分明、错综复杂的个性。担任巴拉那州警察局长期间，他不满足于仅仅履行行政职责，而是将这一角色视作磨砺自我、广结人脉、铺就未来宏图的熔炉。\n\n1958年，他当选联邦众议员，进一步巩固了自己的政治影响力。最终，在1961年，巴拉那州人民将州长之位托付于他，使其成为该州最高领导者。如同众多军旅出身的政治家一般，布拉加坚信国家主导的基础设施建设能够撬动社会的根本变革。在巴拉那州，他几近狂热地推动工业化与各项发展计划，以迅雷不及掩耳之势打造出现代经济强省，使这片大地焕发出全新的生机，成为区域经济的中流砥柱。\n\n然而，如今身居晨曦宫的他，却隐隐感到一种挥之不去的不安。权力的华服更像一座镀金牢笼。军官们如影随形，各自皆是棋盘上的关键棋子，小心翼翼地维系着这场政治博弈的平衡。布拉加对此心知肚明。他耐心等待，犹如老练战术家的沉默布局——深信命运之风终将变向，而他，只需抓住那破绽乍现的一刻，便能一举掌控真正的权柄。"
 BRA_slow_guanabara_reconstruction_05_tt: "§K瓜纳巴拉重建§!年度最大建设速度§R减少0.5%§!。"
 BRA_Magalhaes_Pinto_hog_raphael_desc: "§Y副总统\n基督教保守主义§!\n--------------\n§L马加良斯·平托是自由派大本营全民盟中激进派的代表，以思维敏捷和强硬民族主义立场著称。签署《米纳斯吉拉斯宣言》后，平托被银行业封杀，继而成为全职政治家，仅用两年便成为全民盟联邦议员。擅长政治运作的他在诸多同僚间灵活周旋，如今成功进入总统府，与年轻搭档拉斐尔并肩而立。\n\n虽然朝野上下都对这位争议人物担任二把手颇有疑虑，但平托做事向来目的明确。即便当上副总统，他仍然一如既往地保持务实作风，准备等政敌自己消耗得差不多了再给出致命一击。§!"
 BRA_Luis_Gonzaga_Novelli_Junior_for_vargas_jr_desc: "§Y外交部长\n右翼民粹主义§!\n--------------\n§L热图利奥·瓦加斯总被指责有法西斯倾向——新国家体制如裹尸布般缠绕在他的声誉之上，无法（也许也不愿）摆脱。多数人急于撇清这种嫌疑，但仍有人对此趋之若鹜，甚至牺牲个人威望与政治影响力也在所不惜。外交部长小路易斯·诺韦利正是此类人物。\n\n这位外交部长最崇尚秩序与等级制度，并以德国作为效仿的蓝本。因此，他正逐步让巴西远离美国那套享乐主义和个人至上的混乱价值观。在避免遭到报复的前提下，小诺韦利致力于让巴西保持独立自主，同时吸收如日中天的第三帝国的部分成功理念。§!"
 BRA_Magalhaes_Pinto_hog_neves_desc: "§Y副总统\n基督教保守主义§!\n--------------\n§L众所周知，马加良斯·平托虽然才华横溢，却是个不可信赖之人。这位职业政客擅长经营人脉、培植势力，但翻脸无情、过河拆桥也同样是他的拿手好戏。作为米纳斯吉拉斯州人，他对瓦加斯政权极为反对，是《米纳斯吉拉斯宣言》的重要签署人，为新国家体制敲响了丧钟。作为内维斯的长期同僚兼政治对手，平托甚至在1960年米纳斯吉拉斯州长选举中击败过他——如今平托却不得不屈居其下。二人表面上和睦相处，恰恰显示出内维斯老谋深算——把对手放在眼皮底下才最安全。§!"
 BRA_Sebastiao_Almeida_eco_desc: "§Y财政部长\n民族自由主义§!\n--------------\n§L塞巴斯蒂昂·帕埃斯·德·阿尔梅达是库比契克时代的政坛老将，先担任巴西银行行长，后出任米纳斯吉拉斯州州长。这位社民党忠实成员是知名谈判专家、工业专家，也是国家刺激支出的坚定支持者。尽管他出任财长乃是众望所归，但他要面对的挑战着实不小：石油危机的影响压迫着巴西经济，而此前控通胀政策的屡屡失误更是让批评声浪日渐高涨。§!"
 BRA_Euler_Monteiro_sec_desc: "§Y战争部长\n民族自由主义§!\n--------------\n§L在许多人眼中，尤勒·本特斯·蒙泰罗一直活在瓦加斯的阴影里。1945年他亲手终结了这位独裁者的统治，1950年又带头阻挠其东山再起。他曾参与联署《上校宣言》，挫败瓦加斯将最低工资翻倍的计划，导致时任劳工部长古拉特黯然下台。然而，如今他竟在瓦加斯麾下司法部长内维斯的内阁中当起了战争部长。这位铁杆民族主义者当年力主石油国有化、创建巴西石油公司，虽然与内维斯素有嫌隙，但维护巴西稳定将一直是蒙泰罗毕生坚守的信条。§!"
 BRA_Jose_Rodrigues_for_desc: "§Y外交部长\n民族自由主义§!\n--------------\n§L外交部长人选若泽·奥诺里奥·罗德里格斯虽令人意外，但此人绝非泛泛之辈。这位学者个性张扬，他对弗拉门戈足球俱乐部的狂热丝毫不亚于他在历史研究上的造诣。二战期间，他作为洛克菲勒学者赴哥伦比亚大学深造，归国后在巴西国家图书馆就职，很快成为国家档案馆馆长。作为巴西史学界的先驱，他长期为《巴西日报》撰文（以批评全民盟著称），对研究巴西与非洲的历史渊源颇有兴趣。总而言之，内维斯认定他是外长位置的“天选之人”。§!"
 BRA_Darcy_Riberio_hog_desc: "§Y副总统\n民族自由主义§!\n--------------\n§L达西·里贝罗出身米纳斯吉拉斯州，后为追寻功名迁居圣保罗。里贝罗从担任印第安保护局的民族学家进入公共服务领域，1953年创办印第安国家博物馆，这是他众多去殖民化研究中的最高成就。儒塞利诺·库比契克赏识其热忱，邀其与友人阿尼西奥·特谢拉共同筹建巴西利亚大学。\n\n里贝罗虽并不热衷于政治冒险，但却为布里佐拉的民族主义方略折服，由此决意投身工党体系谋求发展。如今被提名为副总统的他虽经验尚浅，但胸中却怀有赤子之心——倾尽所能辅佐总统，为巴西擘画未来。§!"
 BRA_Romulo_Almeida_eco_desc: "§Y财政部长\n改良社会主义§!\n--------------\n§L勤奋是种天赋，罕有人能掌握，而巴伊亚州的罗穆卢·阿尔梅达正是其中的佼佼者。罗穆卢移居里约后，这位年轻的法律系毕业生迅速迷上了专业不对口的经济学。同样机缘巧合下，经友人引荐踏入政坛的他，在对方影响下成为了死心塌地的民族主义者。\n\n从社会主义者变成整合主义运动活动家的罗穆卢，曾与许多整合主义者一样在瓦加斯执政期间坐过牢。但在1945年，总统邀请半路出家的他担任圣弗朗西斯科水电公司的经济顾问。独裁统治结束后，他重返政坛加入PSF担任国会议员——倡导发展主义与自给自足的经济理念。如今作为经济部长，他正致力于将这些理念贯彻到贫困的北部地区。§!"
 BRA_Oromar_Osario_sec_desc: "§Y战争部长\n专制主义§!\n--------------\n§L奥罗马尔·奥索里奥既能统兵布阵，又能舞刀弄枪，备受敬重，他自1961年起担任南里奥格兰德州第一骑兵师师长。这位从里约调任的宽厚将军，在布里佐拉初涉政坛时便为其公开站队，由此成为这名州长任期内少数的坚定拥趸之一。\n\n凭借自身威望与政治忠诚获任现职的奥索里奥，眼见同僚们对布里佐拉激进的军事改革计划日渐离心。当国家团结面临分崩离析，而巴西军队不断倒退之际，这位总统任命的执鞭人将以其铁腕，强加宪法秩序于那些桀骜不驯的同袍。§!"
 BRA_Azeredo_da_Silveira_for_desc: "§Y外交部长\n民族自由主义§!\n--------------\n§L作为政治世家的后裔，阿泽雷多·达·西尔韦拉自幼便涉足巴西利亚的权力场。其父曾任马托格罗索州与瓜纳巴拉州众议员，祖父更贵为联邦参议员。尽管有着深耕地方政治的家族传统，但身为七兄妹中第五子的阿泽雷多却以叛逆姿态选择了非常规的外交道路。他在瓦加斯政权末期派驻阿根廷，开启了国际生涯，戈梅斯执政期间又辗转日本历练。\n\n这位因反对外交部固执的亲美政策而遭排挤的外交官，始终坚信巴西地缘政治潜能的斡旋力量。虽被同辈人诟病对阿根廷态度过于“怀柔”，但正是他洞悉到祖国绝不能甘当美国棋局中的卒子，即便这意味着需要主动交好东京与布宜诺斯艾利斯。§!"
 brazil_oc_lacerda.1.t: "喂饱战争机器"
 brazil_oc_lacerda.1.desc: "对这间屋子里的男人们而言，这个问题早已熟悉不过——中东再度陷入无休止的战火，共产主义者的血肉如今堵住了那条承载石油命脉的贸易通道。军事危机，自然需要军事手段应对。这也正是为何卡洛斯·拉塞尔达此刻与战争部长多·科托·席尔瓦以及数位将军共处一室的原因。尽管危机的余波已开始在民间蔓延：清晨，拉塞尔达亲自拦下了正欲会见银行家的贝尔特朗；达·库尼亚正奔走于世界各地，竭力寻找尚未被战火封锁的石油货源；马加良斯则苦撑“总统”的体面，在愈发焦躁的人群面前维持局势。但此刻的会议，只关乎军方的态度。\n\n“总统先生，问题在这里。”一名将军站起身，指向身旁的地图，“阿根廷正处于有史以来最有利的战争态势。他们拥有足以支撑战争的油田与产能，而我们却还在泥沼中挣扎。我们既然知道此事，他们自然也清楚。我们必须为突袭做准备。”\n\n“没错。”拉塞尔达凝视着地图上那条狭长的巴阿边境，“我相信你们已经拟定了方案，将军？”\n\n“有三套。”战争部长席尔瓦站起身，清清嗓子，走到地图前。“前两套方案的前提一致：我们必须对战略进行改革。简言之：要么更快，要么更精简。”他自觉捕捉到台下一位将军翻了个白眼——或许只是连日失眠的幻觉——他略作停顿，又继续说道，“第一种是优化军方燃油使用效率，比如减少装甲厚度、限制大规模机动部署等。第二种，是我们采取一场速战速决的攻势战争——闪击式猛攻。若能在战初就夺取对方油田，我们将无须再忧后勤补给。”\n\n“或者，”另一位将军插话，“我们优先保障军方的燃料供应。老百姓当然会怨声载道，但总比让阿根廷人踏进我们的国土要好。”\n\n拉塞尔达身子前倾，目光始终未曾离开那条狭窄的边界线。"
 brazil_oc_lacerda.1.a: "“我不喜欢借鉴德国人，但他们的‘闪电战’，或许正是我们需要的东西。”"
 brazil_oc_lacerda.1.b: "“很抱歉，将军，国民经济正处于困难时期。你们得学会精打细算。”"
 brazil_oc_lacerda.1.c: "“军方所需的燃料将得到供应——务必每滴都用在刀刃上。”"
 brazil_oc_lacerda.2.t: "战争机器，停摆了"
 brazil_oc_lacerda.2.desc: "对这间会议室里的男人们而言，这一切早已熟悉得令人恼火——中东又一次被卷入无尽的战乱，共产主义者用尸体封锁了原本输送珍贵石油的管道与航道。既然问题属于军事范畴，自然应由军方处理。也正因此，卡洛斯·拉塞尔达不在场。这个问题，重要到不能让任何文人插手。此刻在场的，只有战争部长戈尔贝里·多·科托·席尔瓦，与一众来自索邦派的将军们。燃油的短缺已令巴西国家机器大面积停摆，但在他们看来，有一件事尤为重要。\n\n“那便是与阿根廷的战争。”席尔瓦开口道，“当我们在全世界四处搜寻石油来源时，阿根廷每天都能产出一桶又一桶的石油。他们要是此刻发动进攻，我们根本无力应对持久战。”周围的将军纷纷点头。战争，对他们而言早已不是可能性，而是必然。他们言语间的那种冷峻与笃定，让这场冲突仿佛已经开打。\n\n“研发将重点投入到提高运力与续航项目上。”一位将军接话，“我们在燃效运输领域已初见成效。”\n\n“但那只能稍稍延后燃料用尽的时间。”席尔瓦摇头道，“若要因此调整我们整个战略，那无异于自杀。”他缓缓用手指划过桌面边缘，看着指尖积下的灰尘。“军方将得到石油的大头。这一点，各位可以放心。”他抬眼望向众人，“拉塞尔达不会反对。”他的支持，早已是既定事实。服务有偿，换得授权——正如索邦派所期待的那般。\n\n会议之后再无更多实质性议题。真正的决定早已敲定，其余不过是细节补缀。平民交通将全面停摆，民用工业也将停滞……"
 brazil_oc_lacerda.2.a: "……但军队仍将坚守阵地，应对阿根廷可能发起的任何攻击。"
 brazil_oc_lacerda.3.t: "石油的魔力"
 brazil_oc_lacerda.3.desc: "“委内瑞拉有石油。”他划亮一根火柴。“哥伦比亚有石油。”他点燃了香烟。“秘鲁、厄瓜多尔、阿根廷。”他轻吸一口，“他们都有石油，”卡洛斯·拉塞尔达说道，“唯独我们没有？”\n\n“很可笑，对吧？”埃利奥·贝尔特朗将自己的烟灰弹进桌上的烟灰缸，“可我们却要为每一桶油争得头破血流。”\n\n两人刚刚从与巴西国家石油公司的会议中脱身——这是一次令他们感到无比沮丧的经历。他们没有直接返回办公室，而是走进一家生意冷清的咖啡馆。店主巴不得有客人上门，立刻就把后院那片空荡荡的花园包了下来，给了两人所需的安静与私密。他们坐在带着磨损软垫的铸铁椅上，喝着贝尔特朗怀疑掺了鸟粪石的便宜咖啡，花园靠着一道木板墙，藤萝密布，他们在这幽僻角落中暂时抛却了悔意。\n\n“老实说，我真希望当初你能劝我别把国家石油公司晾在一边。”拉塞尔达出于习惯抿了一口咖啡，一边把烟夹到嘴角，一边侧着嘴喝，“他们更关心自己垄断地位的安危，而不是帮我们从这场危机中爬出来。”\n\n“可我们还得靠他们。”贝尔特朗耸耸肩，“该鼓励就得鼓励。海上也好，陆地也罢，只要能找到石油，什么都行。”\n\n拉塞尔达把香烟敲了敲烟灰缸，先是急促地弹去烟灰，然后又像在用节拍器思考似的反复敲击。“我们就真的不能让私企加入进来？其实只要一道行政命令，允许国家石油公司与私人公司合作就行。”\n\n“你要真想跟董事会那帮人斗上一场，那你尽管去。”贝尔特朗说，“但我们必须尽快做决定，不能再失去任何一个石油来源了。”\n\n拉塞尔达靠在椅背上，感受到铁艺花纹压在背上的突兀。他重重地叹了口气，随即给出了答复。"
 brazil_oc_lacerda.3.a: "“好吧，那就去海上找吧。我们的救命稻草，或许正沉在那片海底呢，贝尔特朗。”"
 brazil_oc_lacerda.3.b: "“巴西境内难道就真的一点都没有吗？”"
 brazil_oc_lacerda.3.c: "“壳牌公司知道怎么挖出液体黄金。我今晚就签署命令。”"
 brazil_oc_lacerda.4.t: "自知之明"
 brazil_oc_lacerda.4.desc: "[BRA.GetLeader]步出与巴西国家石油公司的会议现场，眼前的董事会阵容仍让他觉得有些颇为陌生。那些老资历虽然还在，却都靠边站了。现在唱主角的，是一群锐气十足的年轻人，新生代的工程师和经理。他们中有些人并非生于巴西，领口上别着的徽章也各不相同。他们齐聚于此，只有一个目的：搞清楚巴西到底有没有油。\n\n会议一上来先从大局看起。墙上投射着南美洲的地图，油井与海上钻井平台星罗棋布，标记了分布着石油的区域。巴西周边围了一圈正在开采的石油“新月”，唯独巴西自己空空如也。正如公司高管所言，这不是因为懒惰或短视：南美遍地都是石油，唯独巴西这块地，干得有些反常。\n\n接着，壳牌的高管上场了。[BRA.GetLeader]觉得他们在办公室里戴安全帽未免太过做作了，但对方呈上的报告却令人信服。他们向总统保证：巴西不缺油，只是过去的技术太落后，找不着罢了。用那些老掉牙的办法，跟拿根神棍去探矿也没什么两样。接下来的半小时，一条康庄大道铺在了巴西人的面前：这群老练的石油人带来了新技术和新工艺，他们承诺会挖出大地深藏的秘密。\n\n最后发言的是财政部代表。报告言简意赅，却字字千钧，这也解释了为什么壳牌的人进门前得签保密协议：石油危机拖得越久就越麻烦，只要巴西一天没找到油，外汇储备就会像逐渐失血一样流干。政府财政已经陷进了借外债买石油的死循环。保障能源安全，已经是火烧眉毛的事情了。\n\n在巴西国家石油公司的大楼里，[BRA.GetLeader]倚着栏杆，注视着楼下行色匆匆的职员和一脸急躁的经理们在走廊和中庭里穿梭。这栋楼里经历过太多的不眠之夜；哪怕隔着这么远，总统也能看见那些人眼底沉重的黑眼圈。"
 brazil_oc_lacerda.4.a: "但愿壳牌的协助能让他们好好歇一会。"
 brazil_oc_lacerda.5.t: "节制的生日礼"
 brazil_oc_lacerda.5.desc: "“这真的有必要吗，贝尔特朗？”\n\n“候任总统阁下，石油危机可不会因为今天是你生日就停下来。媒体需要一个交代。”\n\n拉斐尔·马加良斯叹了口气。过去几周里，石油危机几乎天天将他围困得密不透风。它带来的经济冲击立竿见影、惨不忍睹，每天都会以冷冰冰的数字呈现在他眼前，有些日子他简直被压得喘不过气来。也许是看出他内心的疲惫，身边的幕僚和朋友们决定在这个重要日子给他些许喘息的空间。回到家门口时，“40岁生日快乐，拉斐尔！”的大横幅正高高挂在门楣之上。屋里热闹非凡，有着一些在夜深人静时才不得不悄悄收拾掉的奢侈物品。马加良斯强撑出一个笑容，掩饰复杂的内心。\n\n可惜好景不长，记者们很快闻风而至。为了转移注意力，一场临时记者会在官邸门前匆忙搭建起来。横幅被急忙撤下，公告被提前发布。他摘掉了蝴蝶结，换上普通领带，又把礼服外套换成了普通西装，但当他迈步走下台阶时，整个人却散发着专业、自律、无私的光芒——哪怕是自己的生日之夜，他依然坚守岗位。\n\n“今晚，我想宣布，我的政府将推出一整套应对当前能源危机的经济方案。”照相机的闪光灯咔咔作响，磁带机随即嗡嗡运转起来。“自明日起，我们将对各类燃料实施补贴，以保障其基本可负担性。补贴范围包括柴油、重油、液化气及汽油。同时，我们将对公共交通与农业领域所需燃料进一步加强价格管控。最后，我已指示财政部调整现行汇率政策，以确保我国出口的可行性与国际竞争力。”他说完，脸上浮现出一个令人安心的笑容，随即转为标准而得体的礼貌神情：“各位可通过电传机接收上述措施的详细内容。”"
 brazil_oc_lacerda.5.a: "马加良斯道别后转身踏入宅邸，迎来另一种喧闹。"
 brazil_oc_lacerda.6.t: "复杂的生日礼"
 brazil_oc_lacerda.6.desc: "拉斐尔·马加良斯在一众记者面前清了清喉咙。“晚上好。”他尽量不让目光离开讲台，“我知道从晨曦宫发布公告并非惯例，但现在，我的政府将签署一系列行政命令，以应对当下巴西所面临的石油危机。我们会连夜努力拟定更多应对措施，我们希望现在就让大家知晓这些举措。”其实他并不想这么做，可眼下的局势，已容不得他推迟哪怕一秒。\n\n他理了理西装外套，整了整领带：“从明天开始，我们将对柴油和液化气实行补贴，重点支持在此次危机中面临崩溃风险最高的行业。同时，在略作开支调整的基础上，我们将即刻上调国家债券利率，幅度为1.5%。”说到这里，他露出一个轻松的微笑，“如果诸位今晚想送我一份生日礼物，不如来一笔投资吧？报酬不低，也正好是给国家未来的最好回报。”\n\n记者们轻声笑了起来。瞧，这不就是一个为国分忧、甘愿在生日之夜辛勤工作的无私之人吗？可他们没看到他笑容中的那一丝苦涩——那种责任感正悄然压弯他肩头的沉重。他向媒体挥手告别，转身走入晨曦宫这个安全的地方。卡洛斯·拉塞尔达已等在那儿，手里端着一杯起泡酒。“干得不错。”他说。马加良斯接过酒，几乎一口闷了下去，快得让人担心。“现在他们该散了，今晚你至少还能留几个小时给自己。”\n\n“对。”马加良斯点头，一边换上早上那只蝴蝶结领结。他们走进客厅，屋里仍挤满了朋友与顾问，谈笑风生。侍者端着小吃走来，天花板上悬挂着横幅：“40岁生日快乐，拉斐尔！”对于拉塞尔达精心策划的惊喜，他还是不知道该作何感想。"
 brazil_oc_lacerda.6.a: "但愿明早翻开报纸，不会看到《候任总统在奢华生日宴上削减公共开支》的大标题。"
 brazil_oc_lacerda.7.t: "放任的生日礼"
 brazil_oc_lacerda.7.desc: "卡洛斯·拉塞尔达的身后回荡着低声细语的派对，亲友们闲谈着家常，仆人们手托盛满司康饼与气泡酒的银盘穿梭人群；此刻他对这些声响充耳不闻。他正凝望着晨曦宫的落地窗外，注视着他的继任者站在宅邸台阶上，向下方记者们做着半即兴的声明。暮然发觉那群躁动的面孔里，竟无一人是他曾亲手栽培的亲信。诚然有几家熟稔的媒体混在其中，还有两三个曾在发布会打过照面的老油条，但再无昔日共事之人。一丝怅然的微笑爬上他的嘴角。\n\n身后嘈杂的人声淹没了马加良斯的演讲，但其中的机宜他了然于心。那位汗流浃背的继任者正竭力淡化解绑改革的影响，打算用国债利率上调3%的噱头转移媒体视线——这些甜头本该能堵住那些等着谴责政府未实施补贴与价格管制的嘴。拉塞尔达欣慰自己还保留着几分政客本能：领结换成领带，讲台布置得好像通宵达旦工作的模样，这些细节终会让捕风捉影的媒体停止窥探。\n\n待马加良斯告别人群回屋接过侍者奉上的酒杯，赫里奥·贝尔特朗立即上前斟满红酒说些恭维话。楼梯平台上的拉塞尔达带着慈父般的骄傲注视这一切，过去数周里这位接班人已真正进入了角色。他想，在自己远赴海外时，巴西正需要这样的守护者。\n\n“拉斐尔”，前总统走向对方伸出手，“生日快乐”。留声机恰好切换成欢快乐曲的瞬间，现任总统与候任总统的手紧紧相握。"
 brazil_oc_lacerda.7.a: "私下里，拉塞尔达希望自己的影响力不会就此终结。 "
 brazil_oc_lacerda.8.t: "变幻莫测之湾"
 brazil_oc_lacerda.8.desc: "1970年12月30日下午六点半，夏日的里约在晚风吹拂下愈发凉爽，太阳却仍顽固地挂在天边。弗朗西丝卡一如往年此刻般，向着毛阿广场走去，再度沉醉于海湾的美景之中。但今日的海湾上空笼罩着薄纱般的雾霭——某种难以言喻的变化悄然而至。\n\n自她在甘博亚码头工作起，变化其实算不上多大：水面上好像多了几台起重机或是几艘船，身后的街区新开了不少美国商铺，甚至能看到刚下泛美航空班机的游客。或许，真正的改变就在这里。多亏了拉塞尔达，曾经遥不可及的华盛顿，如今仅需一趟航班便可抵达。\n\n还有就是钱的事儿。尽管她曾对自己的上司们嗤之以鼻，但自从全民盟当家后，她的钱包确实更鼓了。这同时也得归功于自己没买车，谢天谢地，给孩子们付公交费远比加油省钱，交通状况似乎也在验证这一点——她都快忘了上次堵车是在什么时候了。\n\n然而有些变化转瞬即逝。她依旧牢牢记得总罢工时的那条血路，腿上那道数月不消的疤痕，那群圣保罗的日本人，还有那份疑神疑鬼。伤疤终会消退，人们口中的日本人也都在东京，而非此处。但猜疑仍未散去，总有新事物值得被猜疑。\n\n史书再度翻页，十年不过转眼之间，浓雾仿佛正嘲弄着这不安。尽管细节数不胜数，但不确定性亦然。里约，再度迎来蜕变。"
 brazil_oc_lacerda.8.a: "做出改变，因其势在必行。"
 brazil_oc_lacerda.9.t: "殉道者、缪斯与迷雾"
 brazil_oc_lacerda.9.desc: "1970年12月30日下午六点半，夏日的里约在晚风吹拂下愈发凉爽，太阳却仍顽固地挂在天边。弗朗西丝卡一如往年此刻般，向着毛阿广场走去，再度沉醉于海湾的美景之中。任由眼前景致如同高原宫一般不断变幻。起重机不仅日益增多，还愈发庞大，让她任职的甘博亚码头愈发繁忙。或许有点太繁忙了，忙到就连鲁本斯·瓦斯大桥也与周遭景色融为一体。\n\n啊，鲁本斯·瓦斯，拿一个在死后才声名大噪的人来给桥命名，肯定算不上吉利。倘若她真的去回想那几年的事，多半想不起来新闻里那个逝去男子姓甚名谁，但现在他的名字提醒着数百万过桥之人，这全都要归功于拉塞尔达。这桥本应属于他，象征着他的影响力已超脱政界，深深镌刻于此地的肌理之中。\n\n然而，尽管这桥名并不吉利，尽管石油短缺的熊熊野火烧的街道空空如也，希望之光依旧不停闪烁。哪怕对未来的狂想已被石油危机砸了个粉碎，她的家境依旧比五年前充裕太多。商店橱窗里的新奇商品和闪闪发光的小玩意儿堪称琳琅满目，巴西石油还承诺在附近继续勘探——谁知道呢？没准哪一天石油危机就被解决了。\n\n也没准这一切都是痴人说梦。总罢工、危机和骚乱，她深知这些都足以让人对未来忧心忡忡。若真要说，这半年恰恰证明了一件事：数年进步可能会被几周苦难抹平，改良幻象破灭的速度远超人们想象。所幸修补一切并非她的职责，她只需兵来将挡、水来土掩。这么看来，这茫茫大雾也并非如此难以应对。"
 brazil_oc_lacerda.9.a: "当混乱来临时，无需多虑，欣赏眼下风景就好。"
 brazil_oc_lacerda.10.t: "岸边油船映入她眼帘"
 brazil_oc_lacerda.10.desc: "1970年12月30日下午六点半，夏日的里约在晚风吹拂下愈发凉爽。弗朗西丝卡一如往年此刻般，向着毛阿广场走去，再度沉醉于海湾的美景之中。瓜纳巴拉湾多年来一直于此安眠，但早已与她的记忆大不相同——高耸的起重机矗立在岸边，身旁横亘着以忠于总统的殉道者命名的大桥，在这如同臂弯般拥抱着海洋的建筑下方，船只静静排列成一条柱廊。\n\n这些船只非比寻常，于她而言更是如此：它们是一种象征。象征着不断涌入的外来事物、巴西与美国的联系与蒸蒸日上的工业，这就是它们醒目的黄色船壳与其中镶嵌的鲜红标志的含义。与此同时，它们也象征着企业巨头、资源掠夺者，以及赋予了他们近乎无限权力的新政府。\n\n这一切真是让人眼花缭乱！昨天她还只能管中窥豹，转眼间这一切就都赤裸裸地呈现在她眼前。如今，码头工作虽更为体面，钱包却瘪了下来，让她一时感到割裂。尽管石油危机打破了对于未来的幻想，她的家境也依旧比五年前好得多。这只是一次危机，而非常态，没准——万一呢——城里那些美国大牌也能对他们伸出援手，助他们渡过难关。\n\n也没准这一切都是痴人说梦。总罢工、危机和骚乱，她深知这些都足以让人对未来忧心忡忡。若真要说，这半年恰恰证明了一件事：数年进步可能会被几周苦难抹平，哪怕是在这座不仅属于巴西更属于世界的城市里亦是如此。但比起运筹帷幄，她更擅长绝处逢生。无论风浪因谁而起，她都能乘风破浪。"
 brazil_oc_lacerda.10.a: "里约之门现已敞开，但愿这利大于弊。"
 brazil_oc_tavora.1.t: "盛夏减脂"
 brazil_oc_tavora.1.desc: "横跨七大洲四大洋，全球最大的石油阀门正面临淤塞。世界对黑金的饥渴，堪比初次尝到这种粘稠财富时的狂热。当列强争相撬开油阀时，巴西却面临更迫在眉睫的威胁。\n\n“问题出在南边邻居身上。”科托-席尔瓦敲着会议桌上的地图说道。长桌一端坐着他和塔沃拉总统，对面则是一排将军。“阿根廷有自己的油田，足以支撑战争机器。而我们——”他扫向桌上堆积的部队战备报告和补给清单，“即便有达·库尼亚签下的合同，资源仍捉襟见肘。”\n\n“若阿根廷进攻，”某位将军开口，“我们将处于绝对劣势——”\n\n“行了行了，”塔沃拉抬手打断，“我卸任军职还没多久。”他凝视地图闭眼深呼吸，鼻息沉重，“当年我们也缺补给。但指挥官就该在既定条件下完成任务——这是铁律。”\n\n“您该不会建议——”\n\n“我没让你们骑马打坦克，”塔沃拉厉声说，“我们可以造更省油的军车，多修铁路港口加速补给运输。除此之外……”他目光如炬扫过将领，刹那间众人忘记他身着西装，也忘记他最高只当过陆军上校。“诸位，从平民到军队，所有人都要勒紧裤腰带。我们要成为美洲最高效的军队，除此之外别无选择。”"
 brazil_oc_tavora.1.a: "塔沃拉重新俯身审视地图：“先生们，现在告诉我这支精瘦军队该怎么打仗。”"
 brazil_oc_tavora.2.t: "国有勘探企业"
 brazil_oc_tavora.2.desc: "“在这片被上帝遗忘的大陆上，”维尔吉利奥·塔沃拉说道，“每个国家都有石油。委内瑞拉、哥伦比亚、秘鲁、厄瓜多尔……就连该死的阿根廷都能东拼西凑挤出几桶。”他点燃香烟，深深吸了一口，将烟雾吐向中庭，“上帝怎么就偏偏忘了给巴西也分点黑金？”\n\n埃利奥·贝尔特朗没有理会他的抱怨。两人正站在巴西石油公司大楼的三层，刚结束与高管们的会议——会上听到的依旧是老生常谈：石油短缺、本土产量不足、进口困难。要是拉塞尔达当初把事情办妥，贝尔特朗本可以推行他心目中更高效的解决方案。\n\n“我们至少该引进壳牌，”他双臂撑在栏杆上，目光向下俯视。楼下，巴西石油公司的员工们抱着文件匆匆穿梭。“他们经验丰富，拥有我们所需的历史积淀和技术专长——”\n\n“拜托，贝尔特朗，听听你在说什么。”塔沃拉又向空中吐出一团烟雾，“能源安全是国家大事，我可不想让外国公司染指我们的油井。”他本想质问贝尔特朗是否信任巴西石油公司的能力，但料到答案后只是深吸了一口烟。“他们清楚我们走投无路。起草一份长期压榨我们的合同对他们易如反掌。经济上是冒险，政治上是自杀。”\n\n他呼出烟气，薄烟在沉闷的空气中消散。“这不值得——我们明明有完全掌控的公司可以自主勘探。”\n\n“说到这个，”贝尔特朗转身直面塔沃拉，“为什么选那儿？你真觉得巴西石油公司能在你指定的区域找到东西？”"
 brazil_oc_tavora.2.a: "“你也听了介绍。要说哪里有石油，一定是在海底。”"
 brazil_oc_tavora.2.b: "“巴西是个大国，贝尔特朗。某个角落肯定藏着石油。”"
 brazil_oc_tavora.3.t: "好消息，坏消息"
 brazil_oc_tavora.3.desc: "塔沃拉不紧不慢地走向讲台，闪光灯与记者们好奇的眼神如潮水般涌来。他将一纸文件置于台上，目光投向会场后方。\n\n“从明天开始，政府将启动紧急措施以缓解能源短缺造成的损害。”他清了清喉咙，“首先，我们将向维系国民经济命脉的柴油与液化气行业发放有限补贴。”场下立即响起抱怨之声。“其次，政府还将对公共交通及农业用油实施限价措施。我已责令财政部审查汇率政策，旨在扩大出口以开辟新的稳定收入来源。”\n\n政策看似合理，但提及限价时，塔沃拉还是察觉到了自由派小报记者们的躁动。他察觉到埃利奥·贝尔特朗就在后台——这位财政部长本该亲自上台阐述政策细节，此刻却面无表情地站在幕帘旁观察着会场。\n\n“最后，在紧急状态持续期间，政府将推行全面的开支削减计划。财政部长贝尔特朗将向各位通报我们将从明天开始实施的具体削减措施。”记者席顿时爆发出强烈的质询之声，几乎要将屋顶掀翻。贝尔特朗微微皱眉，攥紧拳头，塔沃拉本该把话说得更清楚些的。“我们做出这些决定是经过深思熟虑的，”塔沃拉不容置疑的声音压过台下的喧嚣，“政府斥资数百万进口石油避免国家崩溃。为了守护巴西的未来，此刻全国上下或多或少都要做出牺牲。”\n\n不过，那个最为致命的关键词——紧缩，他却始终未曾提及。简单地向众人致意道别后，塔沃拉缓步走下讲台。埃利奥·贝尔特朗随后登台，不得不直面这一不容回避的棘手难题。"
 brazil_oc_tavora.3.a: "他清了清嗓子，汗流浃背地站在喧闹的记者群前。"
 brazil_oc_adhemar.1.t: "最后一程"
 brazil_oc_adhemar.1.desc: "“巴拉巴拉……”贝内迪托·马尼扬伊斯·巴雷托说道，“巴拉巴拉，石油危机，巴拉巴拉……”他指着一排整齐的线条和符号继续说，“巴拉巴拉……巴拉巴拉……”\n\n阿德马尔·德·巴罗斯确信眼前这个人正在述说与全球油价突然飙升有关的事宜，但理解这些话语的意愿却从他脑海中溜走了。不仅是因为健康状况——此刻他只是值最后几小时夜班的看门人，等着白班同事来处理这堆烂摊子。\n\n“巴拉巴拉……”巴雷托又指向更多图表和曲线，“巴拉巴拉，国债，巴拉巴拉……”\n\n或许在此次紧急危机中他对国家还负有什么义务。或许他的政府可以体面收场，但再过几个月他就要彻底交接权力了。既然贝雷托这么上心，不如直接签字让他去折腾——\n\n等等。有某个词语突然从迷雾中浮出，被阿德马尔无意识地在指间攥住。他凝视着这个发光的微小存在，感受到掌心里跃动的可能性。\n\n“等一下，巴雷托，”阿德马尔颤巍巍抬起手，\"你刚才说国债？”\n\n“呃是的。我们还有巴拉巴拉，以及巴拉巴拉，但最重要的是要通国债投资维持政府偿付能力。总之巴拉巴拉……”巴雷托知道那次濒死经历让阿德马尔大不如前，只当这提问是老人在勉强跟随节奏。他沉浸在自己的汇报中，全然没注意到听众的变化。而此刻，阿德马尔干瘪的嘴角慢慢咧开了一道魔鬼般的笑容。"
 brazil_oc_adhemar.1.a: "会谈一结束，阿德马尔便拨通了巴西银行的电话。"
 brazil_oc_adhemar.2.t: "离别礼物"
 brazil_oc_adhemar.2.desc: "这场“秘密会议”根本谈不上半点隐秘。若是放在早年，光是阿德马尔召集壳牌公司代理人、德国商人会同驻巴西大使这般阵仗，就足以掀起轩然大波。作为不情不愿的见证者，财政部长贝内迪托·巴雷托的目光在会议桌与账簿之间游移。他此行不仅是监督，更肩负着防止局面失控的重任。\n\n“先生们，”总统安坐椅中慢条斯理道，“诸位大可收起愁容——你们摊上的不是什么祸事。”德国代表团成员依旧神色呆板，相互交换着困惑的眼神。巴雷托心知这对他们而言已算是捧场笑声。好在老人家至少还镇得住场面。\n\n“没错，你们的经济模型和用天文薪酬养着的顾问会搬出千百条理由劝阻对巴西投资，即便在我们纾困贵国之后自身危难之际。但这份贸易关系弥足珍贵，阿根廷人开出的条件永远无法比拟。我的政府现将向在座各位推介……”\n\n最终他根本无需介怀会议内容本身。宣传册再如何讴歌巴西不可替代的贸易地位，也掩盖不了因抢购石油耗尽外汇储备的窘境。阿德马尔此来不过是为提取国债“收益”，逼着德国大使罗伯特·基尔克签支票。所有的代价，终将由至今仍未归咎于他个人的纳税人及其子子孙孙来背负。\n\n羞耻？巴雷托可曾为参与这场盗窃而愧疚？不，他暗自断定，至少不该是他。这场荒谬剧早在他登场前就已开演，而今他正与之共同谢幕。"
 brazil_oc_adhemar.2.a: "买了票岂有不看戏的理由？"
 brazil_oc_adhemar.3.t: "收钱但……"
 brazil_oc_adhemar.3.desc: "《近况时报》——面具脱落：预算血洗背后的真相\n\n表面上看，这只是一场财政官员的例行会议。但对于任何具备高中经济常识的巴西人而言，本周的预算案不仅令人忧虑，更该引发绝望。\n\n巴雷托部长面带笑容宣布的“农业柴油价格上限、公共交通燃油补贴、国债年收益率上调至8%、重启私营企业海上油田勘探谈判”，看似是无关痛痒的政策微调，却立即引发从全民盟到工党的激烈反弹，官员们痛斥这是饮鸩止渴的骗局。\n\n新政府尚未就任便被强加难以兑现的承诺，任何纠偏都将摧毁经济公信力。这些政策精准利用了国民对利好消息的饥渴，更可疑的是，现场仅允许圣保罗本地媒体提问。无论这套方案看起来多么慷慨，其实际有效期恐怕不会超过三个月。\n\n最令经济学界不安的8%国债收益率调整，赤裸裸暴露出阿德马尔经济的脆弱本质——政府融资难度已创历史新高。这不是造福劳动者的政策，而是给民生凋敝涂脂抹粉的表演。\n\n社会进步党给继任者挖坑的同时，更背叛了他们本该服务的民众。这已非“收钱但办事”，而是彻头彻尾的掠夺——连他们自己的执政纲领都被典当殆尽。"
 brazil_oc_adhemar.3.a: "他们还真上心啊。"
 brazil_oc_adhemar.4.t: "《环球报》报道：友军误伤——财政部最终推行全面改革"
 brazil_oc_adhemar.4.desc: "巴西利亚今晨陷入一片混乱。社会各界对由巴西银行与财政部官员组成的联合专家组于昨日公布的全面金融改革方案反应剧烈。该方案批准了多项新的重大经济计划，甚至被部分社进党党员批为“党内自杀”。\n\n财政部长巴雷托在尚未做出批评的媒体前公布了改革方案，同时宣布对柴油等农业必需品实施价格管制，并为主要城市的公共交通提供燃油补贴，还将发行年化收益率8%的国家债券。他辩解称“巴西人民受苦已久”“是时候回应他们的呼声了”。\n\n此举自然招致其他党派批评，就连在上届选举中主张大幅增加支出的工党也加入声讨。全民盟官员埃利奥·贝尔特朗昨晚在电台节目中更是痛斥了该方案。他声称政府将因该举背负数十年都无法偿还的债务，并且只会让投机活动与不可持续的购买行为愈发猖獗。\n\n“提高国家债券收益率无异于向所有有钱烧得慌的人发出邀请，还反过来朝每一个辛勤劳作却得为此买单的巴西人脸上吐痰。我处理国家经济事务这么多年，头一回见把自家候选人的政府往火坑里推的决策。尽管我并不怎么同情小瓦加斯先生，但这届政府看上去似乎正在拿本党的未来来拆东墙补西墙。”\n\n一位要求匿名的社进党官员在今日接受《环球报》采访时，其言语中的愤怒之情远胜于困惑：“坦白说，这既自私又鲁莽，比跳进蒂埃特河聪明不到哪去。几乎办公室里的所有人都在问同一个问题：‘阿德马尔这么做图啥啊？’”"
 brazil_oc_adhemar.4.a: "唉，我们这么努力地工作，没有功劳也有苦劳吧？"
 brazil_oc_adhemar.5.t: "又一天"
 brazil_oc_adhemar.5.desc: "对弗朗西丝卡来说，这不过是又一个寻常日子。又一天在码头劳碌奔波，又一天为兜售货物焦头烂额，又一天迎着腥咸海风，拿微薄薪水勉强维系着破旧渔船。她用肩顶开公寓房门，整个人几乎虚脱着栽进屋内，购物袋里零星食品散落一地，自己则深陷进沙发再难动弹。原本计划采买更多物资，可思来想去还是决定等到发薪日，再购置最基础的生活必需品。\n\n电视台又换了一档节目。画面上出现个陌生面孔，正接受记者采访谈论附近博物馆的运营。其余时段依然充斥着那些老面孔，反复兜售着千篇一律的陈词滥调。某种意义上，这就是巴西的宿命。纵使周遭天翻地覆，即便全球危机仍在延续，她深知这个国度从未有过本质改变。无论好坏，巴西终究是巴西。\n\n话题再度切换。这回聚焦在最新宣布的国家债券，货币选择了美元。三个应声虫围坐在小桌旁煞有介事地剖析：曾为拉塞尔达竞选效力的记者故作深沉，质疑此刻推出是否明智；亚马孙木材公司老板假装忧国，试探为何不选用日元计价；居中那位社进党发言人则满脸谄媚，反诘这等利国举措何错之有。\n\n她突然走神。这些重要吗？虽不熟知政客底细，却早看透他们骨子里的算计。她知道这群人与阿德马尔同样腐败，知道其前任早在阿德马尔主政圣保罗前就已堕落，更知道未来接任者也必将重蹈覆辙。无论出台什么政策，她这样的小民只会每况愈下，而食税者们的钱袋子永远越喂越鼓。"
 brazil_oc_adhemar.5.a: "不过是巴西的又一天。"
 brazil_oc_aleixo.1.t: "若阿德马尔还在"
 brazil_oc_aleixo.1.desc: "房间里爆发出一阵哄笑。纳特尔试图回忆刚才的笑话是什么，但周遭食客们嘈杂的交谈声如同浓雾，他只隐约捕捉到只言片语。他自行脑补了缺失的部分，配合着低声笑了笑，转向邻座试图展开话题。对方礼貌性地扯动嘴角，随即转头继续进门时未尽的谈话。纳特尔僵在原地，只得默默转回身继续用餐。\n\n然而当牙齿咬下食物的瞬间，恐惧再度攫住了纳特尔的心神。阿德马尔究竟是如何做到的？他们曾是亲密战友，但那个人的魅力仿佛深不见底。诚然，数十年来周旋于权贵之间，与众多巨头称兄道弟，可他说话的方式总是让人捉摸不透——恐怕连他自己也说不清。此刻纳特尔耳畔仍回荡着阿德马尔的声音：给他出谋划策时的低沉，被他笑话逗乐时的爽朗，因他失败而暴怒时的尖锐。他多希望阿德马尔还能替他发声。\n\n各种报告在他脑海中盘旋：圣卡塔琳娜州煤炭产量未达标的曲线图，马塞约市组织抗议活动的简报，里约热内卢排满会晤与宣传行程的日程表，帕拉州报纸头版与戈亚斯州重点监控企业名录。纳特尔深谙这套运作机制，也清楚该在哪里使力。但具体该怎么做？他离开总统府本为暂避公务，此刻却意识到这不过是徒劳。\n\n当女侍者经过时，他的手无意识地摩挲着口袋。支票簿仍在，掌中仍掌握巨额资金，可开支却不见缩减。昔日能令大公司趋之若鹜的贿赂款，如今连小企业都嗤之以鼻。思绪再次飘回阿德马尔身边：那个人究竟如何让这台精密仪器持续运转？怎样防止转动的齿轮分崩离析？他低头凝视餐盘——汤水里漂浮着被反复搅动、半嚼未咽的食物残渣。"
 brazil_oc_aleixo.1.a: "点金之术朽烂。"
 brazil_oc_aleixo.2.t: "陆上勘探"
 brazil_oc_aleixo.2.desc: "夕阳再次染红巴西利亚的街道时，两辆黑色轿车正沿着北向高速公路行驶，如同运送过时理念的灵车。周遭的光线渐次化作橙黄，又在供电中断中褪成昏黑，最终被堵在限量供油却仍无度挥霍的车流中。“费尔南多，他凭什么否决我们的大西洋勘探计划？”其中一人几乎咆哮着质问，“伯南布哥有多少人整装待发，那白痴到底清不清楚自己在做什么？”\n\n费尔南多从牙缝里挤出对阿莱索的咒骂：“油田坐标和市场数据明摆着——北里奥格兰德就是聚宝盆！现在那家伙却要我们去亚马孙硬找？”他冲着停滞不前的司机怒吼。第三位投资者把玩着马拉尼昂企业的撤资警告函抱怨：“连巴伊亚公司的股票我都抛售了。”对司机和阿莱绍的讥讽淹没在喇叭声里。没人注意到另一辆轿车已悄然右转，消失在岔路口。\n\n“埃默森，你的计划居然奏效了。”年长者打量着眼前这个令他意外的年轻人。后者抿了口红酒，将雪茄分给众人，这个慷慨举动立刻赢得满座欢心。“父亲，我早说过他会开窍。大西洋油田不过是靠呼吸机续命的病人，必须让阿莱绍明白亚马孙石油带新城建设的价值。”\n\n第三位投资人晃动着厚厚一叠钞票，先抽了几张塞给司机，又向同伴们逐一分发。“回到马瑙斯后，餐馆可得由埃默森来挑！”"
 brazil_oc_aleixo.2.a: "两大世界的根基在他们脚下崩塌。"
 brazil_oc_aleixo.3.t: "自知之明"
 brazil_oc_aleixo.3.desc: "[BRA.GetLeader]步出与巴西国家石油公司的会议现场，眼前的董事会阵容仍让他觉得有些颇为陌生。那些老资历虽然还在，却都靠边站了。现在唱主角的，是一群锐气十足的年轻人，新生代的工程师和经理。他们中有些人并非生于巴西，领口上别着的徽章也各不相同。他们齐聚于此，只有一个目的：搞清楚巴西到底有没有油。\n\n会议一上来先从大局看起。墙上投射着南美洲的地图，油井与海上钻井平台星罗棋布，标记了分布着石油的区域。巴西周边围了一圈正在开采的石油“新月”，唯独巴西自己空空如也。正如公司高管所言，这不是因为懒惰或短视：南美遍地都是石油，唯独巴西这块地，干得有些反常。\n\n接着，壳牌的高管上场了。他们给总统吃了颗定心丸：巴西不缺油，只是过去的技术太落后，找不着罢了。用那些老掉牙的办法，跟拿根神棍去探矿也没什么两样。接下来的半小时，一条康庄大道铺在了巴西人的面前：这群老练的石油人带来了新技术和新工艺，他们承诺会挖出大地深藏的秘密。\n\n最后发言的是财政部代表。报告言简意赅，却字字千钧，这也解释了为什么壳牌的人进门前得签保密协议：石油危机拖得越久就越麻烦，只要巴西一天没找到油，外汇储备就会像逐渐失血一样流干。政府财政已经陷进了借外债买石油的死循环。保障能源安全，已经是火烧眉毛的事情了。\n\n在巴西国家石油公司的大楼里，[BRA.GetLeader]倚着栏杆，注视着楼下行色匆匆的职员和一脸急躁的经理们在走廊和中庭里穿梭。这栋楼里经历过太多的不眠之夜；哪怕隔着这么远，总统也能看见那些人眼底沉重的黑眼圈。"
 brazil_oc_aleixo.3.a: "但愿壳牌的协助能让他们好好歇一会。"
 brazil_oc_edna.1.t: "暗流涌动"
 brazil_oc_edna.1.desc: "阿德马尔，你给我留了好个烂摊子啊——埃德娜这样想道。办公室的黄白灯光渗入了清凉夜色，总统正用手托着额头。她面前的办公桌上散乱着经济预测、情报简报和新闻报纸。\n\n她的思维如军事行动般精准运转——这是父亲的遗传。现在可没时间沉溺于绝望与空想。石油危机迫在眉睫，而她埃德娜的职责无疑就是处理危机。若能漂亮解决此事，人们对她继任总统的质疑终将消散，对她的看法也将彻底改观。在乎政治遗产的，可不止阿德马尔和父亲。\n\n计划正初具雏形。埃德娜猛地动起来，抓起钢笔，列出心里拟好的黎明前必须致电的名单：各部部长、行业巨头与工会领袖、监管要员及高级公务员。古训有云：进攻才是最好的防御。若巴西能在危机全面爆发前迅速给出应对方案，就能最大限度减轻冲击。\n\n这份给巴西石油公司的跟进备忘录写到中途，埃德娜才惊觉晨光已漫过窗棂，温暖了她执笔的手背。"
 brazil_oc_edna.1.a: "首个不眠之夜，往后还有无数。"
 brazil_oc_edna.2.t: "计划出炉"
 brazil_oc_edna.2.desc: "总统近午时分召开的新闻简报会席卷各大电视与广播频道，全国人民都在倾听埃德娜·洛特宣布应对石油危机的全面计划。这场联合发布会邀请了联邦供应与物价委员会的专家出席。简报内容冷静务实，几乎不带修饰，令人跳过前任，回想起现总统那位赫赫有名的父亲。\n\n该计划的精简版同步刊载于各大报刊，方便民众理解其宏大规模与深远影响。柴油、液化石油气、煤油等基本燃料将与食品及公共交通一样实行严格限价。农村农户将获得燃料配给券以满足刚性需求。为防范通胀急剧上升，政府将通过增发3%短期国债扩大借贷规模。\n\n如此庞大的政策方案能在短期内迅速成形出乎所有人预料，而其进步主义倾向更是激起右翼媒体的强烈不满。惯常的反调随即在特定圈层响起，多名评论员痛惜戈梅斯总统当年错失了取缔供应与物价委员会这类瓦加斯遗毒的机会。与之相对的，工党系媒体则争先恐后盛赞洛特总统在危机时刻展现出的魄力，以及她对巴西普罗大众的无私奉献。"
 brazil_oc_edna.2.a: "有计划很好，能起效就更好了。"
 brazil_oc_edna.3.t: "放眼近海"
 brazil_oc_edna.3.desc: "“委内瑞拉有石油”，埃德娜凝视着波光粼粼的大西洋喃喃自语，“哥伦比亚有石油，秘鲁和厄瓜多尔也有。巴西怎么可能偏偏没有？”\n\n她心不在焉地调整着倚靠阳台栏杆的姿势，下方是圣路易斯港高低起伏的波浪。三名逗留在门口的 巴西石油高管面面相觑。\n\n“总统女士，您应该知道过去几年陆上勘探有所突破——巴伊亚州、亚马孙州都……”其中一位开口道。\n\n另一人急忙补充：“不过历届政府都没把寻找新油田作为首要任务，这点您理解……”第三个人跟着同事频频点头，虽然总统的视线根本不曾转向他们。\n\n“很明显，时代变了。”埃德娜的目光划过蔚蓝的海平线，“委内瑞拉拥有大量近海油田，而根据你们的报告，壳牌已经在苏里南海岸外勘探同类油田。”她突然以军人般的果决姿态抬起手臂：“石油十有八九就在那里。我要立即调集资源开发海上钻井。”“总统女士，这成本——”\n\n埃德娜猛然转身：“我清楚代价。那些预测数据我都看过了。巴西石油的创立本就是为了满足巴西能源需求，现在正是经受考验的时候。”"
 brazil_oc_edna.3.a: "“先生们，没别的问题的话，务必及时告知结果。”"
 brazil_oc_edna.4.t: "撑起半边天"
 brazil_oc_edna.4.desc: "海风卷走了弗朗西丝卡烟头处的灰烬，调皮地拨弄着她的发丝。她唇角挂着若有若无的笑意，正愉悦地想象着海关柜台那些蠢货等待她休息结束的模样——“帮个忙吧弗朗西斯卡”“这个就拜托你了”——她不知在首都被政客和商人簇拥的埃德娜是否也有同感。\n\n伫立之处，五年光景无声流转。货轮如常驶进驶出，集装箱层层堆叠，起重机起起落落。唯一打破单调的莫过于儿女已然成年，而他们身处的世界确实天翻地覆。弗朗西丝卡还记得那个露出灿烂笑容的圣保罗人当上总统的模样，首次电视讲话时活像推销餐车的销售员。\n\n经历过阿德马尔的种种之后，埃德娜·洛特当选总统可谓意外之喜。她欣赏这位女总统的仪态风范，更欣赏那些改善民生的宏图大计。方才办公广播宣布埃德娜连任成功（弗朗西丝卡猜想实为首次正式当选）着实令人欣喜。这无疑是载入史册的里程碑，首位女总统，绝非小事。\n\n不知为何，此刻弗朗西丝卡对石油危机竟不那么忧心了。那种惯常的压迫感，连同贫困带来的刺骨羞耻，都暂时消退了。她虽不完全明白埃德娜承诺的危机对策与经济复苏方案，但怀抱希望。这希望，同样意义非凡。"
 brazil_oc_edna.4.a: "维多利亚，我的好女儿，放手去做你想做的事吧。"
 brazil_oc_edna.5.t: "放下半边天"
 brazil_oc_edna.5.desc: "无情的海风卷走弗朗西丝卡烟头的灰烬，又将她的头发狠狠甩回脸上。她抿紧嘴唇，试图让自己平静下来。当办公室收音机里传出选举结果时，她竟感到一阵难以自持的震动——她记得自己猛地站起来冲出门外，嘴里嘟囔着“要休息会儿”。她不愿让海关柜台那些蠢货看见自己失态。他们会把她颤抖的嘴唇当作女人经不起政治风浪的证据。为此生气确实可笑；在这一点上他们是对的，只是弗朗西丝卡实在盼望埃德娜·洛特能赢，直到此刻她才意识到自己有多在乎。\n\n伫立之处，五年光景无声流转。唯一打破单调的莫过于儿女已然成年，而他们身处的世界确实天翻地覆。弗朗西丝卡还记得那个露出灿烂笑容的圣保罗人当上总统的模样，首次电视讲话时活像推销餐车的销售员。\n\n埃德娜·洛特后续的任期，终将成为巴西政治史上耐人寻味的小插曲。弗朗西丝卡无法想象还会有其他女性接近那个位置。算了，至少曾经有过——那段时光很美好，她永远不会忘记看见像自己这样的一位母亲入主总统府时的感受。\n\n选举新闻与愈演愈烈的石油危机交织在一起，天知道会引发什么连锁反应。想到这里，弗朗西丝卡在脑中列了份必需品清单，继而意识到它们为何不可或缺。儿子最近找了份体面工作，或许能借她些钱。这个念头令她作呕，不由得把腰带又勒紧了一格。"
 brazil_oc_edna.5.a: "维多利亚，我的好女儿，很抱歉让你失望了。"
 BRA_Romulo_Almeida: "罗穆卢·阿尔梅达"
 BRA_Darcy_Riberio: "达西·里贝罗"
 BRA_Azeredo_da_Silveira: "阿泽雷多·达·西尔韦拉"
 BRA_Sebastiao_Almeida: "塞巴斯蒂昂·帕埃斯·德·阿尔梅达"
