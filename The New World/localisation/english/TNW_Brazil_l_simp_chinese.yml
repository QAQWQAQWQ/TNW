 BRA_megaproject_ita_desc: "§K伊泰普水电站§!是巴西与巴拉圭两国政府外交共识的成果，建造世界上最大的水电大坝。大坝一旦建成，将为数百万家庭提供足够的电力，成为工业化的一大福音。"
