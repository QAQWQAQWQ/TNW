 BRA_megaproject_alr_milestone_4: "土改完成"
 BRA_megaproject_gnb_effect: "在1966年新年的风暴之后，§K巴西政府§!将启动一项规模庞大的重建项目，以修复风暴造成的破坏，并将里约热内卢重塑为美洲最伟大的城市之一。"
 BRA_megaproject_gnb: "瓜纳巴拉重建"
 BRA_megaproject_gnb_desc: "风暴虽然是一场悲剧，但也是一次可以重塑里约在拉塞尔达心中形象的机会。国会将提供上百万的资金，对里约进行修复和重建。贫民窟将不复存在，而里约热内卢将成为世界渴望之都。"
