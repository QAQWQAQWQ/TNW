l_simp_chinese:
 brazil.1000.desc: "工党席位：[?BRA_PTB_seats]\n\n社民党席位：[?BRA_PSD_seats]\n\n社进党席位：[?BRA_PSP_seats]\n\n全民盟席位：[?BRA_UDN_seats]\n\n民代党席位：[?BRA_PRP_seats]"
 brazil.1002.t: "硕果累累的一年"
 brazil.1002.desc: "[BRA.GetLeader]坐在总统办公室的办公桌前，财政部长则坐在对面。略显紧张的部长小心翼翼地递交了年终经济数据的报告。对于政府来说，这是一个成败攸关的时刻。如果未能实现那些雄心勃勃的经济目标，势必对即将到来的选举产生重大影响。\n\n“数据显示，我们已成功实现了年初设定的GDP增长和通胀率削减目标，尽管去年我们为自己设定了高达[?BRA_TargetGDPGrowth]B的GDP增长目标和[?BRA_TargetInflation]%的通胀控制目标。我们的人民将更加富裕，他们所需的商品也会更加便宜。”\n\n财政部长显然对这份成绩感到无比自豪，他向[BRA.GetLeader]投去期待的目光，等待着他们的回应。"
 brazil.1002.a: "“干得漂亮，对我们的选举大有帮助。”"
 brazil.1003.t: "卓有成效的一年"
 brazil.1003.desc: "总统办公室里，[BRA.GetLeader]坐在桌前，财政部长则坐在他的对面。他们有些紧张地讨论起了今年的经济数据，这对本届政府有着生死攸关的意义。如果无法实现他们定下的高目标，势必会对选举产生严重的负面影响。\n\n“由于去年我们定下了使GDP达到[?BRA_TargetGDPGrowth]B，通胀低于[?BRA_TargetInflation]%的高目标，数据表明，我们只完成了所有年度经济目标中的一项。尽管如此，我国人民的生活水平依然有所上升。”\n\n财政部长对自己的工作成果有信心。他看向[BRA.GetLeader]，等待着他的回答。"
 brazil.1003.a: "“干得不错，对我们的选举大有帮助。”"
 brazil.1004.t: "信任破灭，目标落空"
 brazil.1004.desc: "[BRA.GetLeader]坐在总统办公室的办公桌前，对面是显得有些紧张的财政部长。年终经济数据即将揭晓，这是决定政府成败的关键时刻，未能实现目标可能带来严重的选举后果。\n\n“数据显示，我们未能达到本年度的经济目标。去年我们设定的国内生产总值增长目标[?BRA_TargetGDPGrowth]B以及通胀率控制在[?BRA_TargetInflation]%的计划，显然过于激进，难以实现。”\n\n财政部长在椅子上不安地挪动着，显然对自己感到失望，同时也在忐忑地等待[BRA.GetLeader]总统的回应。"
 brazil.1004.a: "“不仅选举受了影响，同时也削弱了军方的忠诚。我原本可以做得更好。”"
 brazil.1005.t: "看不见的手"
 brazil.1005.desc: "[BRA.GetLeader]坐在总统办公室的办公桌前，财政部长则端坐在对面。他们几乎还没来得及适应新办公室的环境，也没完全从总统选举的紧张竞选活动中缓过神来。四周堆满了文件、零散的家具，甚至还有新旧政府双方的私人用品，显得杂乱无章。就在此时，财政部的经济发展办公室送来了一份关于去年经济目标的报告。\n\n“雄心勃勃啊。”财政部长如此评论道。\n\n“的确，不过无论他们是否完成了目标，前几届政府已经把挑战摆在了我们面前，选民绝不会接受失败。”"
 brazil.1005.a: "“既然如此，我们必须得成功。”"
 brazil.1006.t: "黑金红尘，愤怒之街"
 brazil.1006.desc: "“……另外，我们必须正视当前局势，中东的混乱局面不容忽视。我今天收到了参谋长的报告，情况短时间内恐怕难以平息——”\n\n“也就是说，近期将不会有中东的石油供应。”\n\n财政部长迅速打断了总统的话。他们都心知肚明，形势对国家来说极为不利。[BRA.GetLeader]从房间角落的饮料柜里取出一杯“解压饮品”，而财政部长则沉思片刻，接着提出了应对策略。\n\n“我们应该与巴西石油公司谈谈，他们有预案，我们也有预案，看样子我们不得不通过补贴来维持局面了。”\n\n“部长，这个问题留待下次讨论。但现实是，我们必须下调经济目标。我们无法实现原定目标，如果我们现在主动宣布调整，民众是可以理解的。”"
 brazil.1006.a: "“同意，我明天就开始起草一份演讲稿。”"
 BRA_OC_Goals: "§R由于石油危机的影响，我国的次年GDP目标与通胀削减目标将减半。§!"
