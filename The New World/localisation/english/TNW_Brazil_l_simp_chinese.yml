 POLITICS_ERNESTO_GEISEL_DESC: "埃内斯托·贝克曼·盖泽尔是德国移民之子，他在南里约格朗德州本图·贡萨尔维斯市的两个德裔家庭中长大。1921年，他与兄弟奥兰多一道步入军旅，见证并参与了巴西历史上的重大事件——1930年的革命、新国家体制时代及其落幕，以及针对后瓦加斯时代民主政府的军事政变。\n\n在巴西新兴的、军人主导的政治格局中，盖泽尔正位于权力的中心。军中的强硬派认为他过于软弱，但温和派中他有一个坚实的支持基础。确实，像弗罗塔这样的人批评他对反对派过于宽容，这种观点并非没有道理。盖泽尔的确有意缓和独裁统治的做法，对待反对派采取了更为温和的策略。\n\n然而，与强硬派的观点相反，总统并没有计划做出会削弱军队力量的妥协。他决心沿着政权既定的发展主义道路前进。更重要的是，他坚定地想要维持军事独裁的地位，并且非常愿意利用一切手段——无论是陆军、国家情报局、海军情报中心，还是情报行动局-内部防卫行动中心——来确保其政权的稳固。\n\n对于盖泽尔来说，如何在右翼的军队强硬派和左翼的民主反对派之间巧妙地保持平衡，始终是一个复杂的难题。然而，在这场政治风暴中，即便他表面上看似岌岌可危，但轻视他的智慧和坚韧仍是一个极大的错误。"
 POLITICS_RANIERI_MAZZILLI_DESC: "巴西民主亡矣。民主的消亡并没有什么特别之处——但这并不是说期间便没了那悲、那苦。军方，虽有誓在先，本应捍卫那神圣不可侵犯的宪政，这帮游手好闲之徒，该隐的子孙，却出尔反尔，鸠僭鹊巢，逆取权柄。在军方还未下手时，那民主也本就根基不深，议院成了活脱脱的菜市场，而议员们无非那帮斤斤计较、拉帮结派的怨妇。解散参议院是一回事，但坐看国家机器群龙无首又是一回事。那么，又有谁能接过这总统宝座呢？\n\n在这波澜壮阔的历史洪流中，拉涅利·马齐利，这位1910年生于意大利移民之家的男子，他的人生轨迹像是一条缓缓上升的曲线。从一名普通的收税员，逐步攀升至里约热内卢国家公共财政局的局长，他的政治生涯似乎注定要绽放耀眼的光芒。先是成为财政部幕僚长，随后是社民党的圣保罗联邦议员，连续五次当选，他的政治才华得到了充分的认可。1959年，他又被提拔为众议院副议长，他的人生似乎正登上顶峰。\n\n然而，命运的女神总是喜欢在关键时刻出其不意地扭转局面。军队的干预，参议院的崩塌，这一切变故让马齐利意外地成为过渡政府的总统。在军方内斗的漩涡中，他像是一位随时待命的消防队长，随时准备扑灭前方的火焰。如今的马齐利，被自身对党的忠诚与对国家的尊严所撕扯，他变成了一个爱国主义的囚徒，承受着这份荣誉与职责的无尽重压。"
 POLITICS_ODILIO_DENYS_DESC: "在奥迪利奥·德尼斯的军旅生涯中，责任一直是他决策的核心驱动力。作为一名初出茅庐的军官，正是对于国家的深沉责任感引领着他，支持热图利奥·瓦加斯的崛起。正是对民主和选举过程的责任感让德尼斯站在恩里克·洛特身边，支持洛特的反政变，确保当选总统的儒塞利诺·库比契克顺利上台。正是那份根植于骨髓的责任感，促使德尼斯请求他的战友、同为元帅的洛特，放弃与左翼瓦加斯派的合作，不再推进洛特法案。当洛特坚决拒绝时，德尼斯被责任所推动，无奈推翻了他曾经的朋友，以恢复国家的秩序。\n\n如今，针对洛特的阴谋已经得逞，德尼斯身为总统，得到了大部分军队和保守派政党的支持。忠于民主的德尼斯元帅已计划不久后举行选举。德尼斯希望一位右翼政党的总统候选人来接替他，但在他发动政变后，民众中日渐增长的、对左翼的同情心可能会让德尼斯的计划遭遇挫折。"
 POLITICS_BRAZILIAN_EMERGENCY_JUNTA_DESC: "在科斯塔-席尔瓦辞世之际，国家无暇左顾右想，更遑论采取相应行动。军队接管领导权并指导这段过渡期成了迫在眉睫的任务，否则像佩德罗·阿莱绍这类平民政治人物，可能会削弱军方对巴西的控制力。\n\n军政府的运作基于一个简单明确的原则：在这动乱时期，它是国家的指导之手，同时在军方决定未来合适的候选人期间，扮演临时掌权的角色。军政府由武装部队中最杰出的人才组成；陆军将军奥雷利奥·德·利拉·塔瓦雷斯、空军将军马西奥·梅洛和海军上将奥古斯托·拉德马克均是其中一员。\n\n军政府对国家的控制虽然只是暂时的，直到下一位候选人的产生，其服务才会画上句点。但许多人怀疑，接下来的候选人可能与他的前任一样颇具争议，延续席尔瓦的威权主义观念，可能会使国家步入更加危险的境地。然而，局势究竟会如何发展，只有时间才知晓答案。"
 POLITICS_TANCREDO_NEVES_DESC: "坦克雷多·内维斯，这位出生于1910年巴西米纳斯吉拉斯州内陆的人物，可谓是二十世纪巴西的缩影。他最初作为一位杰出的法学生崭露头角，继而成为一名声名显赫的执业律师。1933年，他作为代表首次踏入米内罗州立法机构的政治舞台。尽管他从一开始就是瓦加斯的坚定支持者，但在1937年瓦加斯的自我政变之后，他离开了政坛。新国家体制的大部分时间里，他一直在干自己的老本行——律师行业。\n\n到了20世纪40年代末期，在政治导师兼挚友贝内迪克托·瓦拉达雷斯的催促下，他再次投身政坛，担任瓦加斯在1949年政变前的最后一任司法部长。民主回归巴西后，他成为了米纳斯吉拉斯州成立社会民主党的关键人物之一，这是一个倾向中间派的瓦加斯主义政党。此后，他在好友儒塞利诺·库比契克的州长任内工作，协助其努力实现家乡的现代化和工业化。他作为国会中瓦加斯主义反对派的领军人物，因其强烈抵制戈梅斯总统企图废除最低工资的行动而声名鹊起。\n\n瓦加斯派在1955年总统选举中重新掌权后，他首先在库比契克政府中担任经济顾问，随后又在洛特政府中担任经济部长。他因此被视为社民党政府带来的巨大工业增长和经济发展的幕后智囊。尽管眼下的石油危机看似是任何政治家都难以应对的艰巨任务，但巴西或许拥有一个最合适的领袖，来带领他的祖国渡过这场危机。"
 POLITICS_EDNA_LOTT_DESC: "公平与正义，历来是巴西民族赖以繁荣的根基。而今，这些基石正被政客的贪婪与财阀的利益逐渐蚕食。这个日益腐朽的秩序，若还有救赎之路，那只能来自人民自身——源自他们的需求，由他们的声音推动。而要将这一崇高理想化为现实，埃德娜·洛特，还有很长的路要走。\n\n作为政坛上一副新锐且不可忽视的面孔，埃德娜的出身并不典型。她曾是一名历史与地理教师，既非商界人士，也非军旅出身，更不是体制中历练多年的官僚。她的父亲是前总统、将军恩里克·洛特，母亲则出身工程师家庭。得天独厚的成长背景，使她得以依循良知行事，在力所能及的范围内，为建设更加正义的制度持续努力。自幼接受“贤母孝女”的传统教诲，成年后却以一位打破玻璃天花板的女性身份，毅然走入高原宫。但她最大的愿望，并非权力本身，而是成为“巴西的人民之母”——无论他们是一贫如洗，还是饱受压迫。\n\n面对身处困境的群体，她展现出极大的同理心与深厚的知识修养。埃德娜坚信，一个真正的民主国家，必须赋予每位公民平等参与的权利与能力。作为巴西历史上第一位女性总统的象征人物，她誓言要建设一个更具人性、更有尊严的国家——一个不再为过去的枷锁与沉重负担所羁绊的巴西。"
 POLITICS_LEONEL_BRIZOLA_DESC: "莱昂内尔·布里佐拉，有人对他深恶痛绝，有人将他奉若神明。但在巴西这片土地上，你绝不会找到一个对他一无所知的人——因为布里佐拉是巴西共和国最声名显赫、影响力最大的政治家之一。\n\n自50年代初担任工党领袖以来，布里佐拉与若昂·古拉特结为连襟，还在1963至1967年间担任南里奥格兰德州州长，有时还兼任联邦参议员。自从他踏入政坛，便在巴西政治舞台上扮演着举足轻重的角色。有人甚至认为，他是巴西在瓦加斯离世后避免再度陷入独裁统治的主要功臣之一。\n\n在阿雷格里港担任州长期间，他施行了一个工人为主体的左翼民族主义计划，为他赢得了“狼人”的绰号和极高的知名度。凭借这一声誉和在工党内部的影响力，他推动巴西工党倒向了更加激进的政治立场。\n\n如今，瓦加斯已然退场，布里佐拉不仅在工党内部的权力斗争中胜出，推动党派拥抱了真正的社会主义愿景，还在石油危机引发的、前所未有的混乱中入主了高原宫。布里佐拉将竭尽全力应对这场危机，但他也清楚，在混乱中还蕴藏着难得的机遇。对于他而言，这场危机将是实现自身愿景的最佳时机——他坚信这是引领巴西踏入新世纪的最佳乃至唯一途径。在布里佐拉的励精图治下，社会主义不仅要在法拉波斯起义者们的故乡实现，更要将这一先进的制度，推广到他深爱的整个祖国。"
 POLITICS_NEY_BRAGA_DESC: "内伊·布拉加的一生从始至终与军旅息息相关。自青年时代起，他便与军队结下了不解之缘；而随着晋升为将军，这份情缘愈发牢固。然而，若仅以军旅生涯来界定他，就会忽略他那层次分明、错综复杂的个性。担任巴拉那州警察局长期间，他不满足于仅仅履行行政职责，而是将这一角色视作磨砺自我、广结人脉、铺就未来宏图的熔炉。\n\n1958年，他当选联邦众议员，进一步巩固了自己的政治影响力。最终，在1961年，巴拉那州人民将州长之位托付于他，使其成为该州最高领导者。如同众多军旅出身的政治家一般，布拉加坚信国家主导的基础设施建设能够撬动社会的根本变革。在巴拉那州，他几近狂热地推动工业化与各项发展计划，以迅雷不及掩耳之势打造出现代经济强省，使这片大地焕发出全新的生机，成为区域经济的中流砥柱。\n\n如今，立于国家权力巅峰的布拉加，胸怀一番恢宏蓝图：让整个巴西重现巴拉那州的活力与辉煌，让这个国家靠自己的力量崛起，掌握自己的命运，再不受外部势力的牵制。"
 POLITICS_GETULIO_VARGAS_FILHO_DESC: "这位面容俊朗、神采飞扬的年轻人正是尊贵的热图利奥·多内莱斯·瓦加斯之子。小瓦加斯继承了父亲的坚韧与智慧，毫无顾忌地投身政坛漩涡。就如同勇敢的阿玛宗战士，他深知政途如同带毒的圣杯，却仍甘之如饴，只为社会的更大利益而奋不顾身。\n\n被媒体称为“巴西肯尼迪”的他，早年被阿德马尔招揽进入社进党——后者想借重这个显赫家族的政治遗产。随着阿德马尔为这位建制派“太子”精心打造精力充沛的硬汉形象，小瓦加斯逐渐成为社进党新生代的标志人物。许多人甚至无法想象，若是少了这副典型的圣保罗面孔，社进党还能否继续维持其身份认同。于是，年迈的政治导师阿德马尔就挑选了这位名望上甚至能超越自己，却在政治理想上高度一致的年轻人继承大业。\n\n尽管打着民粹主义旗号许下诸多承诺，从改善民生到追求自给自足，但小瓦加斯真正的王牌并非空头支票，而是务实的实用主义手腕与偶尔的阴招——这些可都是深得老瓦加斯真传的本事。在攀登政治高峰的艰难岁月里，小瓦加斯深谙一条久经考验的信条：“当言语失效时，利刃往往更加有效。”"
 POLITICS_EMILIO_MEDICI_DESC: "凡是对文艺复兴的历史稍有了解的人，都会知道“梅迪西”这个姓氏，正是来源于佛罗伦萨的统治者，赫赫有名的美第奇家族。如今，巴西迎来了另一位美第奇家族的后裔，他以“铅弹公爵”的别称而闻名于世。\n\n埃米利奥·加拉斯塔苏·梅迪西生于南里奥格兰德州的一个移民之家，年轻时步入军旅生涯，加入骑兵队伍。在1930年革命中，他就支持过崛起的瓦加斯政权，随后亦在护宪革命中投身战斗。尽管他未曾在大战期间踏足英伦三岛，但凭借担任科斯塔-席尔瓦的参谋长，他在军队中稳步晋升。\n\n政变期间，他的立场就非常明确，尽管他并未参与其中；但当政变得逞后，他立刻就变成了军政府的坚定支持者。他先是执掌残酷无情的国家情报局，后又指挥驻扎在他故乡的第三军，随着他的上级、时任总统科斯塔-席尔瓦日渐衰老，他的地位持续上升。\n\n科斯塔-席尔瓦与世长辞后。军政府委任梅迪西以期维护国家的稳定，但他们愚不可及，竟以为这位国家情报局的头子真的会维护和平。事实绝非如此：在梅迪西的监控下，巴西坠入了有史以来最为黑暗的一段历史时期。前所未有的大规模逮捕、酷刑折磨、法外处决日复一日地上演着。尽管新总统及其支持者可能会矢口否认，但黑暗已经笼罩了巴西，希望早已变得遥不可及。\n\n属于巴西的“铅色年代”拉开了序幕，而开启这一切的正是那位“铅弹公爵”。"
 POLITICS_PLINIO_SALGADO_DESC: "现代主义者、记者、小说家、法西斯主义者——在长达四十余年的生涯中，普利尼奥·萨尔加多扮演了无数种身份。然而，即使在一年前，也几乎没人会相信或愿意相信，他的众多身份中会出现“总统”这一头衔。他所领导的运动长久以来一直被巴西右翼视作边缘化的小派别。而如今，他克服重重阻力，以一种势如破竹之势登上了权力巅峰，这绝非易事。若非其他原因，这至少证明了他的耐心：毕竟，政治革命绝非一朝一夕的事情。\n\n萨尔加多生于圣保罗州一个深受天主教熏陶的家庭中，自幼所受环境的熏陶，或许早就为他的思想打下了基础。整合主义的思想正是由此萌生：他设想一个由共同体精神和基督教信仰紧密联系起来的国家，以此对抗社会主义和自由主义这些无神论的制度，并主张建立一个强大的、法团主义的国家来将这一切牢牢凝聚在一起。\n\n然而，三十年过去了，如今的萨尔加多已不再是过去那个年轻激昂的自己。他不再身着绿色衬衫，也不再佩戴醒目的“西格玛”徽章；那些炽热的言辞与狂热的激情也随风而逝。如今的他步履迟缓，穿着精致的细条纹西装，必须用新的外衣去装扮旧有的理念。他必须设法团结身边的党派成员，围绕他长久以来所构想的整合主义理想凝聚力量，否则就只能眼睁睁地看着自由派与社会主义者在他眼皮底下将其击溃，而他在国会中也不过拥有微弱多数而已。这一切看起来似乎是个不可能完成的任务。不过，既然他过去曾实现过不可能，也许这一次，他还能再创奇迹。"
 POLITICS_VIRGILO_TAVORA_DESC: "爱德华多·戈梅斯在总统任期的最后几年犯下了严重的错误，维尔吉利奥·德·莫赖斯·费尔南德斯·塔沃拉只能眼睁睁地看着左翼势力重组，阿德马尔的追随者成为一股强大的反对力量，就连极右翼也拿下了11%的选票。他的叔叔茹阿雷斯·塔沃拉曾想在这场混乱中扮演理性的调和者，结果却在一次屈辱的选举中惨败，亲眼见证巴西一步步滑向不稳定的深渊。如今，历史似乎又要重演。\n\n拉塞尔达的改革过于激进，他不断拆毁塔沃拉与社会民主党多年经营起来的政治纽带。工人纷纷离开工厂，商店货架也日渐空空，全国各地的街头则充斥着示威人潮、响亮的口号与难以平息的混乱。形势所迫，塔沃拉不得不出面干预。\n\n通过巧妙的政治斡旋，总算让一位头脑清醒的人接管了局面。然而，正如当年他的叔叔所经历的那样，有些损害也许已不可逆转。全国民主联盟如今四分五裂，党内成员甚至无法心平气和地坐在一起开会——只要一谈到拉塞尔达的改革是否过于极端，激烈的争执便随即爆发。至于1970年的选举将如何发展？塔沃拉根本毫无头绪。"
 POLITICS_RAPHAEL_MAGALHAES_DESC: "拉斐尔·马加良斯踏入了充满活力的巴西政治世界，在这里，野心与传承如影随形，交织成一曲无休止的探戈。他的父亲与卡洛斯·拉塞尔达关系密切，使得年轻的拉斐尔得以提前进入政治舞台。然而，真正让他在政坛崭露头角的，并非家族的光环，而是他自身的魅力、智慧与无尽的活力。他深谙巴西社会的矛盾与复杂性，巧妙地将自己塑造成既为下层民众呐喊，又游走于精英特权之间的“平民自由派”形象。\n\n拉斐尔的崛起，映照着巴西在风云变幻的世界中寻找自我定位的挣扎。青年时期，他是弗鲁米嫩塞足球俱乐部俱的忠实旗手，以对足球的激情与不灭的乐观感染了无数人。但在他爽朗的微笑之下，隐藏着一股坚定不移的意志，助他在全国民主联盟的复杂政治漩涡中游刃有余。正是在导师拉塞尔达的悉心指引下，他逐渐勾勒出一幅政治蓝图：一个摆脱历史桎梏、拥抱经济自由主义，并与OFN携手开创的全新巴西。\n\n如今，乌鸦之火已燃于他手，马加良斯怀揣着不变的使命，昂首登上了总统的宝座。对他而言，这不仅仅是一场政治较量，更是一种命运的召唤。前路依旧荆棘丛生、挑战重重；巴西正站在历史的十字路口，而他必须用远见与领袖魅力证明，自己足以扛过这场变革风暴，让国家在动荡的世界中屹立不倒。"
