 BRA_connecting_the_nation: "联通全国"
 BRA_rehabilitate_the_railways: "修缮铁路"
 BRA_rehabilitate_the_railways_desc: "巴西帝国时期，马乌阿男爵修建了第一条铁路，将里约热内卢与乡村连接起来。他希望在不远的未来，这种铁制公路能将整个国家系为一体。可惜事与愿违，铁路被公路所取代，随时间流逝被慢慢遗忘。\n\n库比契克的第一任期把公路作为其优先事项，巴西的铁路日渐荒废，以至于铁路旅行如同一场二十年代的穿越之旅。在第二任期，库比契克将让铁路飞跃五十年，喜迎巴西新钢铁时代。"
 BRA_fund_rede_ferroviria: "投资铁路网络公司"
 BRA_fund_rede_ferroviria_desc: "在五十年代，库比契克将巴西的每一条铁路都并入联邦铁路网络公司，旨在标准化和拓展巴西各地的铁路网。不幸的是，由于他着眼于全国大型公路的建设，该公司资金不足，铁制公路的衰落不减反增。\n\n要修复和扩建铁路，就必须为其注资，纵使钱如流水。然后，再次鸣响汽笛，高歌猛进吧。"
 BRA_embrace_diesel: "采购柴油机"
 BRA_embrace_diesel_desc: "为了实现铁路现代化，我们必须为列车装配全新的柴油发动机，令其不但有巴西前所未有的速度，还能适配长程运载！简而言之，为了让我们的铁路世界一流，万人瞩目，必须进口世界各地最先进的柴油机技术。"
 BRA_resume_standardization: "重启标准化"
 BRA_resume_standardization_desc: "巴西铁路已经严重过时，有不少路段甚至是在1930年革命前建设的。要不是库比契克的铁路网络公司，它们早就烂在地里了。如果要让我们的铁路迈入新时代，并确保其平稳运转，标准化是第一要务。这包括但不限于能给司机们必要指示的信号灯，以及能使新列车安稳通过的宽距铁轨。"
 BRA_expand_the_network: "扩建铁路网"
 BRA_expand_the_network_desc: "有价值有意义的铁路网，须如游龙般勾连八方。既要让天堑变通途，又要让机遇满天飞。农村地区的铁路建设固然也很重要，但更要让这些钢铁长龙联通圣保罗、里约这些核心都会，与城市命脉相连。待这纵横捭阖的铁路版图浑然一体之日，便是巴西引得寰球侧目之时。"
 BRA_cementing_lotts_legacy: "巩固洛特遗产"
 BRA_cementing_lotts_legacy_desc: "尽管洛特最初颇受争议且只是两任总统之间的过渡人物，但他忠于宪政且在军中推动护宪努力仍然具有重要意义。库比契克将通过增强宪政派力量来巩固自身权力，以此向洛特致意。1955年洛特力保库比契克上位，如今投桃报李正是应有之义。"
 BRA_reassess_our_ambitions: "重塑雄心"
 BRA_reassess_our_ambitions_desc: "当上贝洛奥里藏特市长，库比契克便将泥泞变为坦途；当上总统之后，他用公路串联起圣保罗的高楼大厦与马托格罗索的稀树草原。如今，这位基建狂人誓言要上演“五年跨越五十年”的奇迹，巴西的复兴之路将从夯土筑基开始。\n\n将总统职位移交给洛特后，库比契克开始酝酿重返总统之位的新战略。寡头共和国倒台后，随着巴西人民越来越多地选择汽车出行，铁路遭到冷落，公路越来越受宠。当空中银翼划破云层的预言与蓝色动脉贯通水系的狂想交织碰撞，这位缔造过公路传奇的总统，正要书写新的史诗。"
 BRA_expand_the_dockyards_2: "扩建船坞"
 BRA_resume_building_roadways: "重启筑路工程"
 BRA_resume_building_roadways_desc: "二十多年前，瓦加斯曾设想，巴西那广袤而又丰饶的大片内陆向铺砌完备的道路俯首称臣，每一个巴西人都能在全国各地旅居行商。这一期许先是由库比契克付诸实施，巴西利亚与便捷交通的公路的建立，令巴西的心脏地带终于能与人口稠密的沿海地区相连。后来，洛特实现了瓦加斯当年所梦，跨亚马孙公路让我们雄伟的雨林向全国各地开放。这些工程都是真正的非凡壮景，想想看，它们只花了不到十年……\n\n但巴西的许多地区仍然与世隔绝，还有不少工作等着我们，现在是库比契克完成他所开创的事业的时候了。很快，公路将把每个巴西人连成一体！"
 BRA_send_out_the_surveyors: "派出勘测员"
 BRA_send_out_the_surveyors_desc: "我们的首要目标是建设纵贯巴西的道路。与此同时，我们也要让已经建成的道路以最高质量为人民服务。\n\n为保证公路不老化损坏，我们将派出勘测员实地分析路况，并提交详细报告。"
 BRA_repair_neglected_routes: "翻修老旧路网"
 BRA_repair_neglected_routes_desc: "儒塞利诺·库比契克在第一个任期建设的道路发挥了重要作用。这种作用是双向的，好处在于，这些道路取代了过去破旧的路网，让贸易和交通更加便利。坏处在于，任何道路在使用中都会受到“循环荷载”的影响。这一科学术语描述某一物体间歇性地受到压力，且压力会间歇性完全消失的情况。面对“循环荷载”，道路会不断磨损、开裂，应当开展大范围的维护工程来加以修复。这一举措将恢复并改善道路的完整性，防止巴西的道路网倒退成老笑话说的“满是坑的路以及满是路的坑”。更重要的是，这也会为我们希望开展的扩建工程铺平道路。"
 BRA_expand_lanes_on_the_highways: "扩建公路车道"
 BRA_expand_lanes_on_the_highways_desc: "虽然历任政府重视交通问题、不断扩建公路网，但巴西的公路系统每天仍要承载数十万辆车的通行压力，特别是连接大城市的交通要道，车流量持续攀升，已经逼近设计极限。这种状况必须改变。我们要对国家公路进行拓宽改造，增加更多车道。这不仅能缓解拥堵，更能为商业运输、上班族通勤和长途旅行提供更加高效的交通保障。"
 BRA_support_urban_initiatives: "支持城市基建"
 BRA_support_urban_initiatives_desc: "库比契克总统主政贝洛奥里藏特和巴西利亚期间，成功打造了现代化城市的基建典范。他推动建设的道路网络深度融入市民生活，无论是上班通勤、购物出行，还是探亲访友、教堂祈祷，民众都能畅行无阻。总统常自豪地表示，这两座城市的交通便利度已经远远超过华盛顿、柏林等国际大都会。如今他再度当选总统，他决心要将这两地的成功经验复制到全国各大城市。让我们遵循总统建议，设立城市道路建设专项基金，推动各地路网升级改造。"
 BRA_break_ground_on_the_perimetral_norte: "打造北环线"
 BRA_break_ground_on_the_perimetral_norte_desc: "洛特打造的跨亚马孙公路虽已叩开通向原始丛林的大门，但库比契克决心再进一步。总统打算新建北部边境公路，从阿马帕州向西北延伸，贯通圭亚那-卡宴行政区，直抵哥伦比亚边境，最终与跨亚马孙公路南段相接，打造更完整的国家路网。"
 BRA_ready_airways_for_the_future: "奔赴未来的航线"
 BRA_ready_airways_for_the_future_desc: "这几年，前来探访我们美丽国度的外国游客数量一直在稳步增长——其中绝大多数不是通过边境口岸或港口入境，而是乘坐飞机。如今航空运输的重要性已不言而喻，一向高瞻远瞩的库比契克自然不会忽视这种趋势。\n\n我们绝不能容忍伟大而骄傲的祖国落后于世界潮流。政府将着手改善巴西航空运输条件，并采取其他必要措施，让我们的国家能够昂首挺胸迎接航空新时代！"
 BRA_sit_down_with_the_spi: "同印第安人保护局会谈"
 BRA_full_steam_ahead: "全速前进"
 BRA_a_crown_jewel_in_brasilia: "巴西利亚皇冠之珠"
 BRA_a_crown_jewel_in_brasilia_desc: "还有什么地方能比巴西的未来之城巴西利亚更能表明它对于未来交通的不竭追求呢？库比契克将邀请他的好友奥斯卡·尼迈耶为巴西利亚设计一座特殊的建筑，一座足以盛迎游客、商界人士和全世界领袖人物来到巴西这闪亮新首都的神奇机场！"
 BRA_terminals_in_the_cities: "城市节点"
 BRA_terminals_in_the_cities_desc: "库比契克布局航空产业的第一手棋，落在巴西利亚和圣保罗等核心城市的机场升级上。这些城市是巴西国家工业、金融与旅游的中心枢纽，若要实现经济稳健发展、真正跻身现代化强国之列，就必须让它们与世界相连。"
 BRA_airstrips_in_amazonia: "亚马孙土机场"
 BRA_airstrips_in_amazonia_desc: "巴西北部的雨林区向来是块难啃的硬骨头——遮天蔽日的原始丛林既没法修路，又不能建城。库比契克政府这回打算先铺几条土跑道，虽说简陋但应该勉强能起降飞机。这些临时机场将成为挺进雨林的跳板，既为新建定居点和厂矿铺路，又能架起通往委内瑞拉、苏里南的商贸走廊。"
 BRA_the_integrated_regional_system: "区域综合体系"
 BRA_the_integrated_regional_system_desc: "巴西的民航业起步晚、底子薄，许多航线飞一趟就赔一趟。航空公司之间还搞内耗，整天抢客源斗价格，拖累行业发展。\n\n这回库比契克要动真格的了：先把航空管理权下放到五大行政区，国内外航班统一归口监管。这么一搞，既省了层层审批的麻烦，又简化了航空管理体系。"
 BRA_a_bandeirante_for_the_skies: "拓域先锋"
 BRA_a_bandeirante_for_the_skies_desc: "邻国个个都有敢打敢拼的“国字头”航司撑门面，三列强就更不用说了，巴西不能甘于人下，组建“国家队”专啃硬骨头，专飞那些私营航企绕着走的偏远地区。虽说要花些钱修机场补航线，但能把繁华都市和偏远乡村连接起来，既能方便偏远地区的群众出行，又能盘活全国各地的经济。"
 BRA_concessions_for_regional_carriers: "划片专营"
 BRA_concessions_for_regional_carriers_desc: "区域综合体系组建完成之后，就要开始处理巴西的一众航司。政府新规明确：全国划片专营，每个片区只留一家航司主事，以此优化航空运营，构建巴西航空产业的新支柱。"
 BRA_acquire_the_flagship_jet: "购买旗舰客机"
 BRA_acquire_the_flagship_jet_desc: "现代化的交通系统怎能没有现代化的航空业？还有什么能比重达19万磅，最高时速588英里，航程3000英里的飞机更能代表现代航空呢？我们以贼划算的价格买下了道格拉斯DC-8客机，是时候把它拉出来亮相了！\n\n为了向人们证明这绝不只是用他们的税钱造的面子工程，我们将坐着它一座城一座城地全国旅行。从首都巴西利亚到阿雷格里的美丽海湾，从工业发达的圣保罗到庄严的里约热内卢，到萨尔瓦多、累西腓，也许还可以来一场飞跃亚马孙雨林的航空旅行！巴西的航空时代已然到来！"
 BRA_link_urban_centers: "连接中心城市"
 BRA_link_urban_centers_desc: "日本搞出了震惊世界的“子弹列车”，跑起来时速可达200公里！再看咱们巴西，要从里约到圣保罗，公路堵成停车场，铁路慢如老牛车，跑个单程就得折腾十几个钟头。眼下正是打造“里约-圣保罗高铁专线”的黄金机会——在日本专家的协助下，我们有望将两城通勤时间压缩至两小时，让出行效率实现质的飞跃，同时巩固两城作为现代化商务枢纽的地位。"
 BRA_span_the_nation: "阡陌纵横"
 BRA_span_the_nation_desc: "库比契克总统在任期内打通了贝伦-巴西利亚公路这条南北大动脉，可谓时代奇迹，但仍有缺憾。铁路建设仍有短板，东北铁路网与南方轨道各成体系，互不联通。是时候启动新工程了，雄心勃勃的南北铁路将从戈亚斯延伸至马拉尼昂，将国家与人民团结联通！"
 BRA_requisition_brazils_waterways: "利用水路"
 BRA_requisition_brazils_waterways_desc: "随着水运路线的整理疏浚，船只可以在亚马孙河上航行了。现在，我们要祭出关键一招，沿河干流与支脉布设内河港口，构建“亚马孙航运系统”，实现巴西腹地货物的河运流通。公路沿线将同步铺开公共轮渡站点，水陆联运的大动脉就此打通。"
 BRA_modernize_shipping_vessels: "船舶现代化"
 BRA_modernize_shipping_vessels_desc: "迄今为止，巴西石油公司在能源领域取得了巨大成功，但一些小问题开始影响公司发展。眼下最棘手的难题出在运输环节——承担全国大宗能源运输的船队普遍老化。鉴于巴西高度依赖水路运输，升级船舶对于疏通基础设施瓶颈至关重要。政府将拨出转款对老旧船只进行现代化改造，保障石油命脉畅通无阻。"
 BRA_provide_tax_incentives: "税收优惠"
 BRA_provide_tax_incentives_desc: "纵横巴西的水道曾是国家的生命线，物资、商贸和运输都通过水路进行流通。直到今天，水路仍然是重要的运输通道，但由于公路和高铁的快速发展，人们纷纷抛弃乘船而选择它们，但又因此形成拥堵。相比之下，水路的利用率远远不足，只需稍加减税，便可以重新激活这些尚未得到充分利用的水路，使它们再次成为高效的运输途径。"
 BRA_chart_existing_routes: "绘制航道图"
 BRA_chart_existing_routes_desc: "尽管地理大发现的时代早已落幕，巴西广袤的内陆至今仍蒙着神秘面纱。雨林中的河道千回百转蜿蜒诡谲，就连最老道的船长也得靠着师徒相传的口诀溯河航行。与其让船队在未知水域继续碰运气，不如由政府牵头绘制精确的航道图——这样一来，新手水手都能看着地图开船，而不是像童话里那样靠撒面包屑认路。"
 BRA_deal_with_navigation_hazards: "铲除暗礁"
 BRA_deal_with_navigation_hazards_desc: "亚马孙雨林美则美矣，行船却是步步惊心。河道暗流诡谲难测，水下沙洲神出鬼没，船队每过一处河湾都得提心吊胆。光在雨林里铺路架桥不算真本事，治不住这些野性难驯的河道，亚马孙永远都是人类的梦魇。政府将调集大批工人前往中心航道，把碍事的暗礁浅滩清理干净，为运送战略物资的船队保驾护航。"
 BRA_build_inland_terminals: "亚马孙水上干道"
 BRA_build_inland_terminals_desc: "随着水运路线的整理疏浚，船只可以在亚马孙河上航行了。现在，我们要祭出关键一招，沿河干流与支脉布设内河港口，构建“亚马孙航运干道”，实现巴西腹地货物的河运流通。公路沿线将同步铺开公共轮渡站点，水陆联运的大动脉就此打通。"
 BRA_five_more_years: "再来五年进步"
 BRA_five_more_years_desc: "胜选的狂欢已经结束，库比契克政府即将迎来真正的挑战。这虽是新的任期，但带领巴西走向繁荣的历史使命始终如一。我们不仅要继续推进未完成的基建项目，更要肩负起带领巴西成为世界强国的重任：升级交通与能源基础设施、改革公共卫生与教育体系、制定新产业战略推动工业化支撑南美导向的外交政策，以及雄心勃勃的核计划与太空计划。新内阁中，财政部长坦克雷多与副总统埃德娜·洛特的加盟，将为目标实现提供坚实保障。"
 BRA_assemble_development_council: "召集发展委员会"
 BRA_assemble_development_council_desc: "万事开头难，首场内阁会议的成功，让库比契克总统士气大振，高高扬起改革大旗，不惧万难也要完成执政使命。眼下正是成立第二届国家发展委员会的最佳时机——这个汇聚工业界领袖、顶尖科学家、工会领导人与瓦加斯派成员的政治机关，将为国家发展大计提供全方位的战略指导，引领巴西走向辉煌的明天。"
 BRA_assemble_development_council_tt: "选定的发展委员会成员将在巴西利亚举行会议，开始我们的第一个§Y规划阶段§!。"
 BRA_announce_second_goals_plan: "宣布第二发展计划"
 BRA_announce_second_goals_plan_desc: "内阁组好了，发展委员会的成员也定下了，库比契克终于可以领导巴西走向繁荣之路。万事俱备只欠东风，现在我们只缺一样东西，那就是士气。没有人民群众的支持，无论做什么都是事倍功半；我们要告诉巴西人民，没有有什么障碍不能逾越，没有什么困难无法战胜。为了给巴西同胞打气壮胆，我们将在巴西利亚发表公开讲话，宣布“第二发展计划”，通过电台和电视台向全国广播。它将成为呼唤人民的号召，成为提振士气和促进发展的完美宣言。"
 BRA_announce_second_goals_plan_tt: "向全世界宣告巴西雄心，开始第一个§Y执行阶段§!。\n"
 BRA_varguist_stands_strong: "其利断金"
 BRA_varguist_stands_strong_desc: "\"我们以联盟当选，自当以联盟执政！\"\n\n这便是库比契克的执政理念。现在我们在国会的势力还算雄厚，但要维系这种局面，就必须直面社民党-工党联盟表面团结下的潜在裂痕。\n\n一方面，受财阀与商业界影响，社会民主党专注经济发展，认为巴西即将实现如“旭日”一般的腾飞；另一方面，在工会与社会运动的推动下，工党认为工业建设已近完成，新政重心应转向社会福利体系建设，让经济发展的红利惠及全民。要维系联盟团结，必须暂时安抚其中一方，至于选哪个则由库比契克定夺。"
 BRA_ednas_path_to_compromise: "埃德娜的调和"
 BRA_ednas_path_to_compromise_desc: "埃德娜·洛特不仅是库比契克盟友的女儿，更是他的副总统。双重身份加持之下，她成了工党影响力最大的政治人物。众所周知，她在多个社会议题上积极发声、活动频繁，政治态度又相对理性、温和，尤其在工党内部，相较同僚如布里佐拉和杨戈，她的立场更加务实。综上所述，埃德娜地位特殊，能够代表库比契克斡旋四方，理好社进党跟工党的关系。要是出了什么问题，那么联合政府乃至治理巴西都会变作空谈。"
 BRA_concessions_to_the_ptb: "与工党同行"
 BRA_concessions_to_the_ptb_desc: "不出所料，埃德娜不负众望，她以调和的方式赢得了温和派的支持：不支持现政府只会导致瓦加斯主义的衰亡。同时，她对理想事业的坚定追求打动了激进派，她强调如果实现了库比契克的经济目标，巴西人民将迎来空前繁荣，蛋糕做得大分给各位的就越多。多亏了埃德娜多方努力，社民党-工党联盟不仅更加稳固，还实现了前所未有的团结。\n\n不过，我们的工党朋友有些小小的意见，他们希望在政府管理和发展规划中有更多的发言权。他们是这么说的，“希望我们的计划能反映巴西人民的利益”。因此，库比契克决定选一位工党成员进入发展委员会，这样他们就满意了。"
 BRA_tancredos_political_maneuvers: "坦克雷多的手腕"
 BRA_tancredos_political_maneuvers_desc: "坦克雷多·内维斯不光是巴西史上最优秀的财政部长，更是总统库比契克自政治生涯伊始的挚友与盟友。内维斯是社民党的核心人物，党内地位举足轻重，政治立场温和务实，是极少数能与全国民主联盟进行跨党派协商的瓦加斯派政客。凭着这种长袖善舞的政治智慧，内维斯在政商两界都威望颇高。\n\n上述种种，使他成为库比契克巩固执政党支持的关键人物。社民党不仅是瓦加斯同盟的支柱，更是总统本人的根基，要是自家都后院起火，再大的愿景也都是一纸空谈。"
 BRA_psd_industrial_connections: "社民党工业联系"
 BRA_psd_industrial_connections_desc: "正如库比契克所料，坦克雷多完美完成了使命！凭借高超的政治斡旋技巧，内维斯稳稳吃住社民党议员，让他们一齐支持政府；同时又以温和务实的说服策略，将全民盟与社进党的议员拉入支持阵营。库比契克现在可以高枕无忧了，比前任政府左支右拙好到不知道哪里去。\n\n不过，社会民主党的主要选民群体并不十分满意。尽管社民党标榜社民理念、走群众路线，但它的票主要是中产阶级以外的商界大亨、工业巨头与土地寡头投的。他们认为库比契克想搞改革就得把他们纳入到决策中来。为争取他们的支持，库比契克在发展委员会中给了他们一个席位——反正那位置本来就是他们的。"
 BRA_broadcast_our_successes: "广播胜利"
 BRA_broadcast_our_successes_desc: "库比契克突然发现他又有麻烦事要办了，之前搞完政治谈判，他想搞个大新闻，以此宣扬他的成就、顺便宣布他未来的计划。但是，巴西的电信基础设施烂的一塌糊涂，根本没办法满足他的要求。当然，这不是问题——这恰恰是加紧投入、再创新高的好机会。\n\n为此，库比契克决定支持一家媒体集团，与其合作建设基础设施，并正式授予其无线电波段的政府特许权。这里我们有两个选择：一边是马里奥·华莱士·西蒙森的Excelsior，目前巴西最大的电视媒体公司。而另一边是罗伯托·马里尼奥的环球电视台，这是一个庞大的媒体帝国，现在把业务扩展到了电视领域。最终，选择权掌握在库比契克手中。"
 BRA_television_concessions_bill: "电视特许经营条例"
 BRA_television_concessions_bill_desc: "万事俱备，只欠东风。项目计划书写好了，相关的东西都考虑进去了，什么都准备好了，只欠一个答案。阻拦我们为巴西人民带来最好最棒的电信基础设施的问题是，我们到底该跟哪个媒体进行合作？这个问题把执政联盟搞得剑拔弩张，社民党左翼和工党强烈要求我们选马里奥·华莱士的崇高电视频道，而右翼和反瓦加斯派的全民盟和社进党则坚称罗伯托·马里尼奥的环球电视台才是正确的选择。无论选哪个，都会因利益变化而产生结果；总而言之，先细细斟酌，再补上这临门一脚。"
 BRA_unending_march_towards_progress: "进步征程，永不止息"
 BRA_unending_march_towards_progress_desc: "老瓦加斯开启的事业，我们必须继承！将他为我们国家铺就的康庄大道延续下去，是我们义不容辞的责任。我们已经有所成就，许多目标已经实现，但仍然有许许多多的新目标等着我们去实现，仍然有前人未竟的事业等待我们去完成。不能再磨蹭下去了，现在万事俱备：内阁组好了、发展委员会也成立了，最重要的是人民也支持我们。没有什么能阻挡我们前进的脚步，让我们朝着实现工业强国的理想大步前进吧！"
 BRA_the_macapa_cayenne_highway: "马卡帕-卡宴公路"
 BRA_the_macapa_cayenne_highway_desc: "新官上任三把火，政府换届之后既要搞新工程，也得把之前遗留下来的工作给干好。这次我们要拓建的项目可谓志向高远，更是前总统洛特的宝贝疙瘩：跨亚马孙公路。具体方案是从这条大动脉上分个岔，连接法属圭亚那的首府卡宴。这个计划可谓一举两得：既能盘活边境贸易，又能拉拢圭亚那的当地居民，具有重要且深远的意义。"
 BRA_civilian_industries_lead: "民用产业主导"
 BRA_civilian_industries_lead_desc: "修路的技术活没啥新鲜花样，但搞钱的渠道却是五花八门。库比契克觉得现在最稳妥的办法就是找那些思颖企业——工业巨头与建筑财团。当年搞第一个发展计划的时候就是靠的他们，现在马卡帕-卡宴公路项目又要靠这些老搭档了。这些巨头之中，又属安德拉德-古铁雷斯建筑集团最为出色，他们承建的圣保罗-库里蒂巴公路弄得又快又好，实乃不二之选。"
 BRA_develop_port_of_cayenne: "发展卡宴港"
 BRA_develop_port_of_cayenne_desc: "搞好巴西到卡宴的公路对经济一体化自然是大功一件，但我们也不能忘记我们的初衷：深化巴西与北半球的经济联系。光有陆路还远远不够，必须把海运能力也同时提高起来。可惜，当年的法国政府管理不善，当地连个像样的海港都找不出来。要实现目标，我们必须将卡宴港建设为世界级港口，使其成为北大西洋贸易的关键战略枢纽。"
 BRA_develop_port_of_cayenne_tt: "§Y修正公路竣工里程碑：§!\n  §Y卡宴§!获得§Y1海军船坞§!"
 BRA_bring_in_military: "引入军方势力"
 BRA_bring_in_military_desc: "库比契克与巴西军方的关系一直都十分紧张，军方不满库比契克与瓦加斯派政客往来，也讨厌他推崇旧独裁者意识形态的姿态。麻烦的是，对他有敌意的不止一两个人，构成军队主体的索邦派与强硬派都对他有意见。双方矛盾在1955年的未遂政变中达到顶点，军方试图采取措施阻止库比契克就职；现在想坐稳总统位子，不卖点人情可不行。我们可以将马卡帕-卡宴公路项目全权交给军方，向军方示好，同时起用卡斯特洛·布兰科、戈尔贝里·多·科托-席尔瓦等将领以修复关系。"
 BRA_supply_garrisons: "支援驻军"
 BRA_supply_garrisons_desc: "圭亚那-卡宴是巴西经略南美的第一手棋。这步棋吃下的实利虽小，意义却十分重要。想要实现巴西的经济外交、乃至政治霸权，还有个任务要完成——那些自17世纪法国殖民时期就扎根在此的法裔移民，明里暗里抵制我军驻防，甚至屡屡挑起暴力冲突。雪上加霜的是，当地驻军不仅装备老旧，军费更是捉襟见肘，根本镇不住场子。我们要把卡宴驻军的预算翻番，再调精锐部队过去增防！"
 BRA_encourage_investment_in_para: "鼓励投资帕拉"
 BRA_encourage_investment_in_para_desc: "世人常说军人只懂打仗，至少我们知道他们搞经济建设确实不行。近十年来，爱德华多·戈梅斯和我们亲爱的老朋友洛特的两届政府对北部的帕拉州一直不闻不问，当地的基础设施弄得一塌糊涂。帕拉是北巴西的核心，要想在北部搞好经济建设，帕拉就是重中之重。更何况，圭亚那-卡宴就在帕拉北边，想巩固对当地的控制，就必须促进帕拉的发展。"
 BRA_quiet_night_of_quiet_stars: "寂夜群星"
 BRA_quiet_night_of_quiet_stars_desc: "我们创造了何等辉煌的成就！瓦加斯派联盟的根基日益牢固，不仅稳固了库比契克政府，更是为未来数十年的政治局面打下了良好的基础。通信系统达到了二十世纪的标准，北巴西与圭亚那-卡宴经济基础设施建设得到推进，巴西的南美蓝图添了浓墨重彩的一笔。更令人振奋的是，第二发展计划已经全面启动！未来五年，又将是成功与进步的五年！"
 BRA_innovate_in_the_univiersites: "革新大学"
 BRA_innovate_in_the_univiersites_desc: "国家的未来无非就看两个人群：青年与知识分子。知识分子，大多出身高等院校；和教育系统的其他部分一样，高等院校也亟需改革。大学既没有钱也没有资源，国家为此焦头烂额。提升大学教育的整体水平，就能增强巴西科研领域的硬实力；反之，若对大学不管不顾，公民的上升渠道则会就此堵住。如果库比契克想要实现他领导巴西跻身世界强国之林的目标，那么办好大学就是必要之举。"
 BRA_increase_adult_literacy: "推动成人扫盲"
 BRA_increase_adult_literacy_desc: "巴西的教育改革推进至今，焦点始终围绕着年轻一代的教育。固然，学生群体是教育体系的核心受众，侧重他们也是无可厚非，但我们却忽略了最严重的问题——成人文盲。全国上下竟有两千万成年人目不识丁，正值壮年的居然还占多数。如果能帮助他们识字读写，就能提高他们的就业能力，帮助他们游刃有余地应对职场变迁。总而言之，政府要大力推动扫盲工作，引领全体巴西人民走向更加美好的未来。"
 BRA_invest_in_primary_schooling: "投资初等教育"
 BRA_invest_in_primary_schooling_desc: "人们都说“孩子是我们的未来”，但巴西的未来实在是令人堪忧。政府对基础教育的投入不足，教育质量一直都不怎么样；这将成为教育改革的重点破局之处。须知，国家的建设是长期工程，需要后辈代代传承。因此，我们要将教育投入翻一倍，条件允许的话翻三倍。要想彻底消除巴西遍地文盲的现象，最有效的方式就是从加强青少年的基础教育做起。"
 BRA_edna_lotts_mission: "埃德娜·洛特的任务"
 BRA_edna_lotts_mission_desc: "副总统埃德娜·洛特在踏入政坛前，当了半辈子的教书匠。粉笔灰里打滚的那些年，她亲眼见证了校园年久失修、经费短缺，更切身体会到巴西社会的顽疾——居高不下的文盲率。投身政坛后，根治文盲便成她眼中的了头等大事，洛特誓要打造拉美顶尖的教育标杆。说来也巧，现任总统库比契克的母亲是小学老师，这样的渊源让他对教改十分热忱，加上急需民意支持的政治现状，两人联手推进教改，既是志同道合，也有现实需要。"
 BRA_heed_ednas_concerns: "埃德娜的关心…"
 BRA_heed_ednas_concerns_desc: "当过老师的埃德娜比谁都清楚：想要拯救巴西教育，光听专家报告可不够。他们必须深入一线，找那些天天在破教室里上课的教师聊天——没人比他们更懂左支右拙的基层教育。联邦政府拨款不足的恶果，最终都压在了他们的肩头；而他们每天要面对面相处的，才是现状下真正的受害者：学生。综上所述，埃德娜把时间留给这些基层老师，共同探讨教育问题的解决方案。"
 BRA_and_her_ideas: "…埃德娜的主意"
 BRA_and_her_ideas_desc: "埃德娜在公立教育系统工作多年，对她的老雇主深有理解，对教育改革也有自己的一套办法。她整齐罗列的方案之中，密密麻麻都是各种对策，但说到底，所有问题都可归结于两个根本问题：第一，教师的工资实在太少。这点钱不光让老教师心寒，更是让教育行业陷入恶性循环，导致了第二个问题——高质量人才不愿意来，留下来的没水平，最终耽误了巴西学子的教育。\n\n对症下药，埃德娜提出两条办法：首先是给全国教师涨工资，使其获得与工作相称的合理报酬；其次是全面推行新的教学标准，用统一标准逼出教学质量。这将意味着我们向着巴西教改的美好未来迈出第一步。"
 BRA_the_jk_way: "…库比契克的方法"
 BRA_the_jk_way_desc: "埃德娜在教育系统摸爬滚打这些年，确实攒下满肚子改革经，可也正是这些经历让她变得焦虑短视——总把教师待遇当做重大问题。库比契克不这么看，他认定教育问题归拢起来就俩字：缺钱。就是因为没钱，所以教育质量才提不上去；要解决教育质量问题，就得多多的发钱，翻两倍、翻三倍，加钱就是让巴西学子接受良好教育的唯一方法。"
 BRA_brand_new_schools: "全新的学校"
 BRA_brand_new_schools_desc: "没有学校，就谈不上什么教育。由于没钱，巴西的农村学校个个年久失修、破破烂烂。政府该下定决心大兴土木了，按照最新最好的教育标准建立新的校舍，每间教室都要宽敞明亮，让更多学生坐进课堂。这代孩子若能捧着新课本在现代化教室里上课，他们的前途定比父辈光明百倍。更何况，实实在在的校舍立在那儿，就是政府重视教育的明证。"
 BRA_brand_new_books: "全新的课本"
 BRA_brand_new_books_desc: "年复一年，巴西学子们总被空头支票晃花了眼。教室墙上刷着“未来可期”的标语，课桌上摊开的却是上个世纪的古董——课本的纸张脆得能抖出灰，有些书龄比孩子父母的岁数还大。最荒唐的是，历史课本还停留在遥远的过去，连第一次世界大战都没收录，更别说二战了。但这一切即将终结，库比契克发誓绝不能再这样伤害巴西的广大青年了。政府将批下大量资金编撰全新教材，真实反映并传授迄今为止（特别是二十世纪）的现代发展成果。巴西的儿童是我们的未来，不用正确的知识教育他们，怎么指望他们能成为国家的栋梁之才？"
 BRA_guarantee_teacher_salaries: "保障教师工资"
 BRA_guarantee_teacher_salaries_desc: "教书育人的热情，终究敌不过柴米油盐的冗杂。现代社会，最能鼓舞人心的东西莫过于钱；巴西教师领着全行业垫底的薪水，站在讲台上难免心气不足——工资条上寒酸的数字，既凉了教师的心，也误了万千学子的前程。是时候给这群“灵魂工程师”涨工资了：薪资翻番才能留得住好老师，待遇提档方引得进新人才。这钱花出去，既是对知识的敬畏，更是给巴西的未来存本钱。等到教师们不必为生计发愁，三尺讲台自会重现光彩。"
 BRA_guarantee_teacher_standards: "整顿教师标准"
 BRA_guarantee_teacher_standards_desc: "现在的巴西教育充斥着所谓的“半吊子教师”。这些教师要么缺乏职业所需的专业培训，要么他们之前接受的教育早已过时，无法按照现代标准教育学生。因此，埃德娜决定为在职教师建立培训计划，并为“半吊子教师”规划好考取正规资格的通道。此外，她还将基于新的教学标准制定教师职业发展体系，配合教师培训项目共同提升巴西整体教育质量。"
 BRA_assuage_the_administrators: "安抚管理层"
 BRA_assuage_the_administrators_desc: "船怎么样、该往哪走，只有一个人最清楚，那就是船长。船长对船只负全责，大学的管理者也要对各自的学府承担责任。除了学生，大学管理层是了解巴西高等教育机构面临哪些问题、甚至如何解决这些问题的最佳来源。\n\n不过，这段时间政府与学生会频繁接触，这让他们有些害怕。在他们看来，让学生娃子拿主意无异于让实习水手驾驶巨轮。若要赢得他们的支持，库比契克必须说服他们，改革首先不会过分激进，其次要尊重管理者的话语权。当然，这不是什么大问题，总统只需露出微笑，一切麻烦都会迎刃而解。"
 BRA_stand_with_the_student_union: "联合学生会"
 BRA_stand_with_the_student_union_desc: "如果说巴西的青年是国家的未来，那么这未来正在高呼呐喊挞伐体制的积弊。数十年来，巴西各地大学学生会为各种大事小事游行示威，虽说有些时候他们闹得东西无足轻重，但总体来说，他们的大方向是声讨巴西高等教育的衰败。\n\n作为高等教育的直接受益者，这些年轻人的确就是最懂改革痛点的群体。但要让学生会与政府坐在一块谈何容易？在激进派学生领袖眼中，库比契克不过是又一个瓦加斯建制派政客。好在“微笑总统”魅力十足，就算再冷硬的坚冰或许也能被他的笑容融化。"
 BRA_usher_in_private_institutes: "引进私立院校"
 BRA_usher_in_private_institutes_desc: "如果说苏联实验的彻底失败留下了什么教训的话，那就是马克思主义者对国家控制经济的幻想是彻彻底底的谬论。库比契克政府充分吸取了这个教训，我们认识到，在推进教育改革等国家建设计划时，政府是无法独自完成所有工作的。要实现对学生群体的承诺，就要在政府与私立高校之间建起合作的桥梁。有建议说可以立法要求现有的私立院校扩大招生规模，这种做法或许能“一举奏效”。"
 BRA_expand_public_funding: "大笔拨款"
 BRA_expand_public_funding_desc: "从英国牛津到美国哈佛，从日本东大再到德国斯特拉斯堡国大，顶尖学府永远是国家发展的中坚力量——它们培育着未来的律师、医生、工程师与教育家。巴西引以为傲的公立大学体系本应承担同样的使命，但它们却因经费短缺日渐衰微。若要实现对学生群体的承诺，库比契克总统必须拿出砸钱的魄力，大幅增加政府的高等教育预算，提高高等院校的招生能力。"
 BRA_address_the_admissions_crisis: "解决招生危机"
 BRA_address_the_admissions_crisis_desc: "有一句话出自英格兰诗人，叫“不满的冬天”；但要是你去读读库比契克政府撰写的巴西高等教育机构调研报告的话，你就会觉得诗人简直是小题大做，因为人家不满的仅仅也就一个冬天而已。根据学生会和大学管理者提供的信息，巴西的高等院校正面临着巨大的危机。想要获得学位的学生如潮水般涌入大学，但大学却无力接纳，连最优秀的学子也会因校舍爆满被拒之门外。管理层和工会更是让大学压力重重，不堪重负。总而言之，库比契克别无选择，他必须履行承诺、解决危机，政府的命运悉决于此。"
 BRA_introduce_tempo_integral_pay: "全勤奖"
 BRA_introduce_tempo_integral_pay_desc: "就全面改革巴西教育体系一案，库比契克政府征询了众多教师工会意见，也收到了海量的投诉，以及针对教育系统现存问题的诊断报告与配套解决方案。在浩如烟海的建议中，有一项诉求被反复提及——教师们不仅建议，更强烈要求政府必须推行某种形式的“全勤奖”薪酬体系，即在基础教学薪资外，为科研工作提供专项津贴。这项举措既能如库比契克所愿，为巴西科研能力注入强心剂，或许还能帮助他笼络教师群体，这自然大有裨益。"
 BRA_pledge_to_control_tuition: "承诺控制学费"
 BRA_pledge_to_control_tuition_desc: "还好，“物以类聚”这句话有点不准确。要是这一断言完全正确的话，那么库比契克及其政府成员就是一帮有权有势、晕头转向、拉大嗓门且总是吵吵嚷嚷的人。原因是他们目前在学生会中的盟友们“变了质”，摒弃了前辈们应有的礼貌。然而，在诸多谩骂声中，学生会确实提到了一个政府理应处理的关键问题。巴西公立大学的学费不断上涨，给学生们带来了许多问题。或许，如果政府能为学生发放更多助学金，既可以改善他们的处境，也能让学生们明白政府是站在他们这一边的，如此一来，学生们应该会更加拥护我们的政府。 "
 BRA_a_visit_to_angicos: "参观安日库斯"
 BRA_a_visit_to_angicos_desc: "我党身为巴西当仁不让的执政党，自然拥有不少模范州长。就拿北里奥格兰德州来说，社民党州长阿卢伊齐奥·阿尔维斯正在推进一个项目：由著名教育家保罗·弗莱雷组织的成人扫盲试点项目，或许能帮助我们改善巴西的教育体系。阿尔维斯州长已向库比契克总统发出邀请，请其前来参观评估，看看成效。弗莱雷资历深厚，如果试点成效显著且具备全国推广的条件，必能有效推动巴西的教育改革。"
 BRA_launch_a_national_literacy_program: "启动国家扫盲运动"
 BRA_launch_a_national_literacy_program_desc: "好，开始干活吧！巴西全民扫盲运动正式开始！库比契克政府要做的事情可太多了：要扶持现有的扫盲机构，联邦的、州的甚至外国组织；要在各州建立基于弗莱雷教学法的教师培训项目；要在城乡贫困地区新建扫盲中心；还要与弗莱雷和教育部合作编写新教材。要想扫盲成功，必须全力以赴！库比契克不达目的誓不罢休，定要将文盲现象从巴西彻底根除！"
 BRA_seek_american_support: "寻求美国支持"
 BRA_seek_american_support_desc: "即使身为天主教国家，我们也不得不承认宗教改革的产物——新教也有着积极的影响，新教有效地提升了识字率。新教教徒相信自己拥有对圣经的解释权，为了解读圣经，教徒们便开始主动自我扫盲。在巴西，海滨地区的美国传教士在扫盲中也扮演了关键角色。他们同时也拿着美国政府的资助，可以免费提供英语学习的资料，这点对我们很有帮助。但如果我们真的想与传教士们合作扫盲，我们要先与美国政府联系一下。"
 BRA_appeal_to_the_nationalists: "吸引民族主义者"
 BRA_appeal_to_the_nationalists_desc: "文盲问题，尤其成人文盲，不仅影响巴西的长远发展，也影响着文盲个人的价值实现；更重要的是这还事关颜面，不仅损害巴西的国际形象，也有损我们在同胞眼中的形象。文盲问题的解决早已不限于瓦加斯派，牵动着大多数巴西民族主义者的心。从工党到全民盟，民族主义政客普遍将扫除文盲视为影响国家尊严的大事。为确保教育改革少受立法掣肘，埃德娜·洛特正积极联络民族主义议员，说服他们支持我们改善巴西教育体系的举措。"
 BRA_sergipes_revolutionary_doria: "塞尔希培的改革者"
 BRA_sergipes_revolutionary_doria_desc: "库比契克向来都不是个被党派藩篱束缚手脚的人——为实现胸中伟业，他从不惮于广结盟友。虽说全民盟里头确实盘踞着巴西最顽固的保守派，但波萨诺瓦派却和他们格格不入。这些人虽说也有些保守和反瓦加斯，在经济建设思路上反倒与政府不谋而合。尤其是塞尔希培州州长若昂·塞沙斯·多里亚，不单在经济政策上与库比契克所见略同，还愿意全力支持扫盲计划。在库比契克看来，与其联手有百利而无一害——有了这帮人助阵，改革法案在国会就能少碰钉子。必须为巴西扫除文盲，为此库比契克可以不择手段。"
 BRA_the_crusader_of_the_north_alves: "北方的传教士"
 BRA_the_crusader_of_the_north_alves_desc: "我们走大运了，南里奥格兰德州的杰出同僚阿卢伊齐奥·阿尔维斯已经与美国新教传教士建立起卓有成效的合作关系，现在他们在保罗·弗莱雷的扫盲试点项目中携手合作，传教士团体正在协助印刷英语教材。这种合作模式不仅能帮助扫盲，他们与传教士的关系也可以成为全国学习的榜样。同时，此举还为我们开辟了一条与传教士团体沟通的渠道。如果他们的援助不仅能让北里奥格兰德实现葡萄牙语扫盲，还能掌握英语，那么全民扫盲的将来就有指望了。"
 BRA_drafting_a_strategy: "制定策略"
 BRA_drafting_a_strategy_desc: "古希腊人认为，将整个世界担在背上的泰坦阿特拉斯承担着最沉重的担子。好吧，我们现在发现比这还重的担子了，那就是在巴西推进全民成人扫盲。要完成这项覆盖全国的工作，就必须细化具体的实施环节。为此，需要成立专门委员会，由库比契克总统牵头，洛特副总统、教育专家保罗·弗莱雷及相关人员共同参与，制定《国家成人扫盲计划》实施方案。待方案成型，库比契克政府就能着手做起他们最擅长的事：为巴西辉煌的未来努力工作。"
 BRA_examine_social_security: "审视社保体系"
 BRA_examine_social_security_desc: "巴西现有的社会保障机构可谓五花八门——几乎每个行业都有专属的医保机构，各自为政地制定着本行业职工的医疗待遇标准。但这种过度细分的架构，反而让医保体系背离了服务民众的初衷。\n\n这套比拜占庭官僚体系还要盘根错节的制度，正在以人命为代价运转。改革刻不容缓，必须从根本上对社保体系加以改善，提升医疗服务质量。"
 BRA_exterminate_disease: "消灭疾病"
 BRA_exterminate_disease_desc: "修缮医疗体系只是库比契克政府医疗改革第二阶段的其中一个部分。早在库比契克的首个任期，总统就推动大规模投资公共卫生领域，成立国家农村地方病防治局和国家农村地方病研究所两大机构重点解决农村地区疾病问题。\n\n可惜，1960至1965年间，巴西政府未能充分关注医疗卫生领域，前期取得的成果面临着倒退的风险。如今重启改革的时机已经成熟，我们必须把握机遇，以饱满的热情行动起来，为巴西人民的健康而奋斗！"
 BRA_renew_malaria_controls: "更新疟疾防控措施"
 BRA_renew_malaria_controls_desc: "疟疾防控作为巴西政府疾病根除计划的重要一环，近年来却遭到严重忽视。在库比契克两届政府之间的动荡时期，疟疾乘机在农村地区死灰复燃。\n\n面对这一夺走无数生命的恶疾，我们绝不能坐视不管。现在是时候重拳出击，将疟疾彻底消灭。"
 BRA_tackle_rural_epidemics: "解决农村流行病问题"
 BRA_tackle_rural_epidemics_desc: "库比契克总统在其首个任期内大力投资公共卫生事业，成立国家农村地方病防治局和国家农村地方病研究所两大机构专攻农村疾病防治，这一决策极富远见：巴西的国运与农村福祉休戚相关，而农村地区的疾病肆虐与医疗匮乏正是诸多社会困境的根源。可惜，当时我们未能毕其功于一役，1960至1965年间部分成果甚至出现反复。\n\n如今重回高原宫，我们必须再接再厉，将这些传染病彻底扫进历史的垃圾堆。只有将无耻病魔变成仅存于生物学史书的过往陈迹，巴西才能真正拥抱未来。"
 BRA_second_national_leprosy_campaign: "第二次全国麻风病防治运动"
 BRA_second_national_leprosy_campaign_desc: "自基督以来，甚至远在其降生与离世之前，名曰麻风病、现改称“汉森氏病”——我们不知道汉森是谁或是什么，也不清楚为何以他命名——的顽疾，就一直困扰着世界各地。在较为富裕的国家，麻风病已经销声匿迹；但在巴西这样的新兴国家，它仍然是社会的重大威胁。\n\n1950年开始的全国麻风病防治运动，通过普及抗生素取得了显著成效。如今，库比契克政府决定延续这场崇高的斗争——我们将以相同的模式，启动第二轮麻风病防治计划。"
 BRA_focus_on_modern_maladies: "关注现代病"
 BRA_focus_on_modern_maladies_desc: "自巴西建国以来一直困扰农村地区的疾病，如恰加斯病、肺结核、麻风病等，终于开始得到控制，这得益于国家农村地方病防治局和国家农村地方病研究所等机构的工作，以及疫苗、清洁用品和农村教育的大规模推广。最终，共和国的农村地区将开始迎来前所未有的健康状态，甚至在图皮南巴人等原住民独居此地的时代都未曾有过。\n\n与此同时，所谓的“现代病“”也开始出现，这些疾病此前仅在发达国家出现。我们必须在事态失控前与之斗争。"
 BRA_deploy_spray_teams_for_chagas: "部署消杀团队"
 BRA_deploy_spray_teams_for_chagas_desc: "恰加斯病（得名于其发现地恰加斯群岛）是一种致死率极高的恶性寄生虫病。在我们政权更迭的这段时期，它造成了难以计数的伤亡。\n\n值得庆幸的是，该病主要通过虫媒传播，这为我们提供了防控的突破口：只需向疫区派遣专业的消杀团队，就能以最小社会成本有效遏制疫情蔓延。"
 BRA_improve_diagnostic_equipment: "改善诊断设备"
 BRA_improve_diagnostic_equipment_desc: "要确定一个人得了什么病，说来容易做来难。例如，持续性腹泻可能意味着许多事情，它可能由普通病菌引起，也可能是对麸质过敏或胃肠道癌症等严重问题。同样，肢体麻木可能只是睡觉时压得太久，也可能预示着严重的神经病变。\n\n提升诊断水平的关键在于诊断设备。从国外进口诊断设备并资助本土研发将有助于解决医学问题。"
 BRA_invest_in_chronic_care: "投资慢病护理"
 BRA_invest_in_chronic_care_desc: "过去一个世纪，我们对疾病的认识不断深入，巴西民众的寿命也因此延长。这在许多方面都是好事——寿命延长意味着人们能更长久地参与社会生活的方方面面，与家人共度更多的时光。但这也带来了一些负面影响，最明显的就是心脏病、癌症等慢性疾病的增加。\n\n幸运的是，美国和日本等国正在研究新的治疗方法。我们应着力为巴西民众提供治疗，在这些问题失控之前解决它们。"
 BRA_begin_universal_tb_vaccination: "普及卡介苗"
 BRA_begin_universal_tb_vaccination_desc: "肺结核——一种常导致患者咯血的呼吸道疾病——困扰巴西的时间仅略短于恰加斯病和麻风病。虽然已经有了名为卡介苗的肺结核疫苗，但这种药物在巴西尚未普及，这可怕的疾病仍在肆虐。\n\n库比契克第二任期公卫运动的皇冠明珠，甚至比根除恰加斯病和麻风病更重要，将是从托坎廷斯到佩洛塔斯，让全国各地的民众都能获得这些救命疫苗的联邦计划。"
 BRA_inaugurate_the_world_cancer_congress: "世界癌症大会"
 BRA_inaugurate_the_world_cancer_congress_desc: "总统亲自带来好消息，他凭借他在癌症研究领域的人脉，成功争取到第七届世界癌症大会在巴西举办，会址就在咱们的首都巴西利亚。\n\n不过，机遇也伴随着责任。光有总统打造的现代化都市还不够，我们必须加快医疗改革的步伐，向世界证明巴西医疗机构抗击癌症等现代疾病的决心——就像我们即将消灭脊髓灰质炎那样，让这些病魔成为历史。"
 BRA_expand_public_healthcare: "扩大公共医疗"
 BRA_expand_public_healthcare_desc: "巴西医疗体系烂的一塌糊涂，每天，总统、卫生部乃至全国媒体的案头都在收到令人痛心的医疗事故报告：\n\n老人因药物短缺而死于本来很好治疗的疾病；农村患儿因无法及时转诊而丧命途中；贫困患者因为没钱或其他一些破事被公立医院拒之门外。走投无路的民众只能咬牙承受私立医院的高额账单，却还是殊途同归。\n\n显然，我们必须做些什么来终结这些乱象。"
 BRA_resuscitate_public_hospitals: "复兴公立医院"
 BRA_resuscitate_public_hospitals_desc: "公立医院快开不下去了，钱也没有、人也没有、设备匮乏、士气低落，每一天都挣扎在生存线上，连最基本的医疗服务和员工保障都无法提供，一个抢救病人的地方自己反倒需要抢救了。\n\n解决问题的办法就是加钱。通过专项拨款，配合各州的卫生投资，将有助于将医疗质量提升至建院者预期、甚至更高的水平。"
 BRA_negotiate_with_private_providers: "与私企协商"
 BRA_negotiate_with_private_providers_desc: "即便我们的医疗体系改革计划取得了预期的效果，公立医疗也无法独自承担所有需求，私营医疗机构仍将占据一席之地。但若因公立医疗不足就坐视他们盘剥民众，这既不高尚，也不合理。\n\n巴西政府传统上通过协商资助费率来提供私立诊所医疗服务。随着新疗法的问世，现在正是重新协商服务范围和价格标准的时候。"
 BRA_push_the_rural_coverage_amendment: "推动农村医保"
 BRA_push_the_rural_coverage_amendment_desc: "“但这只是开始，”总统说道。\n\n这是什么意思？其实很简单。农村地区疾病的防治工作已经取得了很大进展，但总统觉得还不够。他想在统一社会保障项目的法案中增加一条农村医疗的修正案。\n\n我们将设立农村社会保障基金，作为统一社会保障项目的补充，首次将农村劳动者纳入社保范围。这需要花很多钱，但能让数百万原本无法享受医保的巴西农民获得医疗保障。"
 BRA_introduce_the_guarantee_fund: "设立保障基金"
 BRA_introduce_the_guarantee_fund_desc: "巴西的医疗体系长期忽视一个群体——频繁失业或处于求职过渡期的流动人口。\n\n为此，卫生部提议设立服务时间保障基金，葡语简称FGTS，为失业人员提供医疗保障。具体操作是：从劳动者身上征的税中划一部分存入FGTS账户。万一失业，劳动者可以用账户余额支付医疗费用。\n\n这种做法能确保失业人员，无论因何种原因失去工作，都可继续获得应有的医疗保障。"
 BRA_issue_equipment_grants: "发放设备补助"
 BRA_issue_equipment_grants_desc: "医院的医护人员经常抱怨他们那些医疗设备要么年久失修要么破破烂烂。要想让医院的改造计划落到实处，就得给医院更新医疗设备。\n\n幸运的是，解决方案很简单：第一，给公立医院划拨专款更新设备，第二，与国外医疗技术厂商商讨采购设备。虽然不能马上解决所有问题，但这会成为良好的开端。"
 BRA_get_a_handle_on_costs: "控制成本"
 BRA_get_a_handle_on_costs_desc: "我们必须再次强调：因为公立医疗机构存在种种不足，就坐视私立医疗机构剥削平民百姓，这种做法是错误的。但事实就是这样：多年来，巴西的私营医院就连提供最基础的医疗服务也要收取不合理的高价。\n\n库比契克政府决定不再容忍这种乱象。政府将与私立医疗机构展开谈判：只要他们同意降价，国家就会相应提高对私立医疗机构的财政补贴。"
 BRA_identify_the_gaps: "发现不足"
 BRA_identify_the_gaps_desc: "医疗改革初见成效。公立医院的运行日趋稳定，私营医院也不再为了一根断指收取过高费用。医疗行业的设备、资金、人员和士气都有显著改善，关于民众无力为自己或家人支付医疗费用的揪心报道也终于减少了。\n\n当然，我们还有很多工作要做。在将医疗系统拖出谷底之后，必须解决一些根深蒂固的系统性缺陷。首先提出同时也是最明显的问题，便是如何保障经常处于失业状态的流动务工人员这一特殊群体的医疗权益。"
 BRA_standardize_the_institutes: "社保体系标准化"
 BRA_standardize_the_institutes_desc: "社保体系的臃肿程度连拜占庭帝国的官僚系统都相形见绌，这种低效正在危害民众的生命。幸运的是，库比契克总统已经做好了计划。\n\n计划的第一步是推动标准化。这意味着重组社保机构，建立架构统一但福利待遇可灵活调整的新型社保体系。\n\n改革工程浩大，但这只是第一步。标准化工作完成后，我们将把社保体系全面整合起来，最终实现一体化运作。"
 BRA_and_prepare_the_providers: "…做好准备"
 BRA_and_prepare_the_providers_desc: "另一方面，各类医疗服务提供者——或者说至少其中99%头脑还算正常的人（因为总会有那么几个人愚蠢地反对变革）——会对社保体系标准化的前景感到相当欣慰。毕竟，只需与一个统一的机构打交道，而不是每个职业对应一个机构，他们的工作肯定会更加轻松。\n\n不过，要是我们不提前通知他们，就很容易失去改革迎来的善意；只要是变革，无论益处多大，在民众毫无准备时推动，总会引起恐慌。因此，我们要确保他们提前知晓改革的到来。"
 BRA_brief_the_bureaucrats: "疏通官僚…"
 BRA_brief_the_bureaucrats_desc: "和所有安于现状的公务员一样，初步调查显示，各个社保机构的官僚对改革普遍持抵触态度。除非政府能够强迫他们服从，否则他们会竭尽全力抵制这些提案。\n\n幸亏库比契克之前当过总统，早就跟这些顽固的官僚打过交道。总统先生已经学会了如何拿捏他们。因此，就由他来向他们说明即将发生的变化并争取他们的支持（这是实施计划的前提条件）。"
 BRA_unify_social_security_programs: "统一社会保障项目"
 BRA_unify_social_security_programs_desc: "时候到了，我们将通过一条法案，将原本各自为政的社保管理机构整合为统一的国家机构。新机构将对各行各业的社保事务进行统一管理，届时社保机构的工作效率和医疗服务可及性都将获得质的提升。\n\n希望巴西医疗机构的支持能为我们赢得与其关系密切的参议员群体的支持。至于剩下的参议员，我们可以通过提醒他们旧系统只惠及大量官僚、且因缺乏医疗保障正在害死他们的选民来说服他们。"
 BRA_the_doctors_orders: "医生的命令"
 BRA_the_doctors_orders_desc: "许多年前，在儒塞利诺·库比契克未曾想过从政，也没有听说那个名为热图利奥·瓦加斯的人之前，他上了大学，获得了医学博士学位。自那时起，天地翻覆：法西斯暴政肆虐全球，瓦加斯政权兴起又倒台，全民盟多次自取其辱，而库比契克本人也从米纳斯吉拉斯州州长成长为两度执掌国家大权的总统。经过这漫长的政治历程，即便是最坚定的政治家也难免与初心渐行渐远，而库比契克——这令他深感遗憾——也不例外。\n\n然而，总统胸中那份源自医学背景的大爱始终未曾消散。我们的总统要用五年进步五十年，那么十年便要进步一百年，必须对巴西的医疗体系展开深刻且全面的现代化改革。医生下了命令——让我们见证它的实现！"
 BRA_exploit_the_atom: "原子研发"
 BRA_exploit_the_atom_desc: "如果巴西要成为一个独立自主的主权国家，能源独立至关重要。然而即便在形势最好的时期，天然气供应仍然满足不了需求，发展替代能源势在必行。值得庆幸的是，我们生活在一个充满希望的时代——核能不仅发电效率奇高，而且成本也较传统能源更加低廉。库比契克总统渴望运用这份原子伟力，为此他划出大笔资金用于核能设施的研究与开发。"
 BRA_harness_the_rivers: "掌控河流"
 BRA_harness_the_rivers_desc: "巴西不必死守煤炭石油，我们面前摆着的就有更好的选择。巴西的大河个个汹涌澎湃，亚马孙河、托坎廷斯河等河流水势湍急、水量丰沛，完全可以用来发电，美国胡佛水坝、澳大利亚雪山工程都是经过验证的可靠方案。水力发电对于巴西能源领域而言尚属新鲜事物，库比契克总统期待着进入这崭新的领域！"
 BRA_set_up_eletronorte: "建立北电公司"
 BRA_set_up_eletronorte_desc: "巴西北部和中部的贫困地区严重阻碍了库比契克能源基础设施升级计划的推进。除了当地地理条件实在太烂之外，各省能源系统各自为政、互补协调才是主要原因。为此，政府决定成立由政府支持的北部电力公司，整合巴西全国的能源系统。\n\n对能源系统进行统一管理既能加快这些地区的工业化，又能创造就业，帮助脱贫。"
 BRA_finalize_the_treaty_of_itaipu: "敲定伊泰普条约"
 BRA_finalize_the_treaty_of_itaipu_desc: "位于巴西和巴拉圭东北部边界的界河巴拉那河非常适合建水电站。虽然两国之间关系不好，但最终两国还是达成了在巴拉那河上建设水电站的协议。现在只需完成一些手续使协议正式生效，伊泰普水坝便可以正式开工。"
 BRA_study_the_tocantis: "研析托坎廷斯河"
 BRA_study_the_tocantis_desc: "托坎廷斯河是巴西的重要河流之一。它位于国家中部，流经戈亚斯州，靠近首都巴西利亚。库比契克总统对这条河有着一番宏大构想——在托坎廷斯河上建立水电站，就能为中西部地区包括首都在内的所有城镇提供大量电力——至少理论上是这样。我们将派出一个研究团队去评估托坎廷斯河是否能实现这一目标。"
 BRA_sit_down_with_paraguay: "同巴拉圭会谈"
 BRA_sit_down_with_paraguay_desc: "为了实现更大的利益，有时不得不跟你不喜欢的对象合作。库比契克总统将目光投向了巴拉那河，他计划在那里修建一座大坝，用水电推动南部地区的工业发展。然而，有两个操蛋的麻烦阻碍了大坝的建设——没错，就是我们的两位邻居，阿根廷和巴拉圭。\n\n鉴于巴拉那河流经三国边境，建设水坝必须获得他们的同意。尽管我们真的很不愿意跟他们谈，但如果我们要建这个该死的大坝的话，就必须这样做。"
 BRA_start_work_on_the_tucuru_dam: "修建图库鲁伊大坝"
 BRA_start_work_on_the_tucuru_dam_desc: "调研结果显示，托坎廷斯河完全具备建设水坝的条件。基于这个结论，库比契克总统决定启动全新的超级工程——图库鲁伊大坝！图库鲁伊大坝将横跨托坎廷斯河，建成后提供的电力将为戈亚斯州、帕拉州及周边地区的工业发展提供有力支持。\n\n当然，建大坝就得让很多当地居民搬家，这个过程不会轻松，受影响的人听到这个消息也不会高兴。然而，时代车轮不会因个人好恶而停止；为了发展需要，这些居民必须配合搬迁工作。"
 BRA_commence_the_itaipu_project: "开展伊泰普工程"
 BRA_commence_the_itaipu_project_desc: "巴西与巴拉圭政府已完成最终谈判，正式批准伊泰普水电站建设项目。作为两国共同投资的基础设施项目，伊泰普大坝将是南美洲水电建设史上规模最大的工程，标志着库比契克总统推动巴西能源自主的战略步入崭新的阶段。鉴于项目规模庞大、投资巨大，必须全力保障工程顺利推进。"
 BRA_build_workers_quarters: "兴建工人宿舍"
 BRA_build_workers_quarters_desc: "伊泰普大坝项目预计能创造几千个就业岗位，虽然这能给经济带来巨大好处，但也带来了一系列的麻烦。情况是这样，大坝位于荒郊野外、相当偏远，那里连几个像样的建筑物都没有，更不用说让他们到达那里的基础设施了！为确保工程顺利开展，我们需要为施工队建造合适的住房。"
 BRA_expand_access_roads: "扩建道路"
 BRA_expand_access_roads_desc: "虽然伊泰普大坝被设想为基础设施工程的奇迹，但这份“奇迹”却与通往工地的道路狭窄破败的现状形成了鲜明的对比。有报告称通往巴拉那河施工现场的道路十分狭窄，成天不是事故就是堵车，为保障工程顺利实施，需要新建平整宽阔的硬化道路，为大坝提供高效的运输通道，为建设之中的工程项目带来源源不断的资源与货物。"
 BRA_prepare_the_power_grid: "准备电网"
 BRA_prepare_the_power_grid_desc: "伊泰普大坝建成后几乎必定成为全球最大规模的水电站之一，其发电量将达到巴西电网前所未有的水平。然而，我们不太确定电网是否能承载伊泰普水电站发出的电力。如果产了这么多的电却送不出去，那将是资源的巨大浪费！我们必须对电网进行升级改造，准备与大坝对接，确保大坝发出的每一度电都能得到有效利用。尽管改造老化的电网设施需要投入大量资金，但为使大坝以最高效率运行，这些都是必要之举。"
 BRA_grants_for_the_ien: "资助核工程所"
 BRA_grants_for_the_ien_desc: "就算是超级大国，掌握核力也绝非易事。巴西充其量就只是个地区大国，我们要做的自然还有很多。谢天谢地，才华横溢的科学家和工程师俯拾皆是，足以助我们核梦成真。在充足的资金扶助之下，圣保罗核能研究所的工作人员绝对不会放弃建设核设施的绝好机会。这一项目耗资不菲，但如果核工程所能成功将原子驯服，我们的回报将以千倍计。"
 BRA_seek_american_expertise: "寻访美国专家"
 BRA_seek_american_expertise_desc: "巴西与美国的关系一直有些奇怪。虽然美利坚是世界反法西斯的坚强堡垒，但他们在南美的所作所为总是带有帝国主义野心的可疑色彩。目前，巴西严重依赖美国的进口能源，而我们推行的能源自主国策正在尝试纠正这种依赖关系。尽管如此，要达成能源自主目标，我们可能还是得请求美国的帮助，因为美国恰是核能领域的先驱之一。美国专家的能力堪称举世无双，能为现代基础设施建设会提供很大帮助，但若是提出要求，便会欠下更多……"
 BRA_approach_the_canadians: "接触加拿大"
 BRA_approach_the_canadians_desc: "遥远的北方有个国家叫加拿大，他们的处境与巴西十分相似。作为地区大国，加拿大同样希望摆脱对强大邻国的能源依赖，通过发展自主能源来保障国家主权。核能研究虽然难度很大，但说不定我们两国可以携手研究？两国之间肯定有很多知识和专长可以分享，能源独立对于两国而言都是有利有益。我们将向加拿大人伸出合作之手，看看能否在他们身上找到合作精神。"
 BRA_utilize_iberian_connections: "利用伊比利亚的人脉"
 BRA_utilize_iberian_connections_desc: "冷战风云变幻，伊比利亚现在无门无派。这些年来，巴伊两国的关系因文化纽带和不结盟国家间加强联系的共同愿望而更加紧密。和巴西一样，伊比利亚在最近的失败后一直致力于研究新能源，而核能毫不意外地成为了强有力的候选。考虑到巴西自身的核能研究才刚刚起步，不如主动向伊比利亚伸出手来请求双方合作。如此不仅能加快我们的核研究，或许还能借此发展一个重要的合作伙伴，共同对抗阿根廷的野心。"
 BRA_create_nuclebras: "创立巴西核能公司"
 BRA_create_nuclebras_desc: "原子革命的基础工作已经完成，现在是时候朝着巴西核能基础设施的迅猛扩张迈出最后一步了。为实现这一目标，我们将成立一家国有企业——巴西核能公司，来负责为我们的核能企业提供重型设备的生产。正如其名所示，巴西核能将在核能领域与巴西石油在石油行业一样发挥作用，相信假以时日并付出足够努力，它也能在能源领域产生同样重大的影响。"
 BRA_invest_in_uranium_mining: "投资铀矿开采"
 BRA_invest_in_uranium_mining_desc: "核能产业可持续发展的根基在于铀矿的稳定供应。巴西境内虽已探明多处铀矿区，但当前铀矿开采量不仅稀少，而且绝大多数都被美国买走了。为扭转这一局面，新组建的巴西核能公司将全面接管境内所有铀矿开采权，由他们来负责开发新矿区。"
 BRA_plan_the_angra_1_plant: "规划安格拉1号核电站"
 BRA_plan_the_angra_1_plant_desc: "万事俱备；是时候开始建设巴西第一座核电站了！安哥拉一号核电站的建筑工地已落成在里约热内卢旁的伊塔奥尔纳海滩之上。这将是我们迄今为止工作努力的巅峰，而完成这项工程还需投入不计其数的心血。要使巴西核电站能与美国媲美，还需要大量外国专家提供援助，但若项目成功完成，巴西将正式迈入原子时代。"
 BRA_utilize_our_petroleum: "勘探石油"
 BRA_utilize_our_petroleum_desc: "目前，巴西绝大多数石油都依赖从意大利低价进口，后者控制着阿拉伯半岛，使其坐拥世界上最多的石油储备。这种贸易为巴西带来了经济红利，但也伴随着巨大风险，中东权力格局一旦生变，其引发的震荡恐将重创巴西工业化进程。因此我们必须在国内勘探石油以避免潜在风险，同时在国外寻找其他的替代来源。"
 BRA_amazonian_exploration: "开发亚马孙"
 BRA_amazonian_exploration_desc: "即便在现代，亚马孙那似乎无边无际的荒野依旧充满着诸多神秘与奇妙。那些雨林中蕴藏着大量尚未被人类触及的石油的传言仍在四处流传。得益于跨亚马孙公路的修建，开展勘探工作将比过去容易得多，如果这些石油储备确实存在，那么无论如何都会被发现。当然，那些将这片土地当作家园的原住民群体无疑会强烈反对，但他们必须明白，巴西的命运远比那些陈旧的部落重要得多。"
 BRA_establish_petroquisa: "建立巴西石化公司"
 BRA_establish_petroquisa_desc: "巴西石油公司已然成为了国内能源部门无法替换的一环，承包了原油开采到提炼所有的步骤，产出了汽油、煤油等许多珍贵化合物。尽管如此，石油公司目前仍较为偏重开采业务，错失了进一步扩大巴西能源资源利用的机会。为深化石化领域的业务，作为子公司的巴西石化公司得以被建立。得益于此，我们便可开始大规模扩展巴西化工行业。"
 BRA_deep_water_drilling: "深水钻探"
 BRA_deep_water_drilling_desc: "目前巴西最大的原油储备位于海岸旁，在这些地区开采早已不是新鲜事，但随着时间的推移，现有的设施已逐渐无法满足高效开采的需要。据估计，若我们能在原油储备丰富的万圣湾应用先进的开采技术，原油产量将会提升至目前的两倍。不，不能再消极怠工了！凭借着现代钻井技术的帮助，我们将能随心所欲开采地底的石油，整个巴西也为此受益。"
 BRA_refineries_in_the_northeast: "东北地区的炼油厂"
 BRA_refineries_in_the_northeast_desc: "巴西国土的广袤导致许多自然资源未能为我们所用，在石油生产领域我们也不幸地落后于其他许多邻国。但新近在东北亚马孙地区发现的石油资源能够改变这一令人遗憾的现状。额外的资金已被批准用于建设在此偏远地区的炼油厂，一旦建成，巴西将会向能源独立的目标又迈进一大步。"
 BRA_chemical_plants_in_the_southeast: "东南地区的化学厂"
 BRA_chemical_plants_in_the_southeast_desc: "得益于库比契克总统的倡议，巴西内陆的资源正在源源不断地得到开发利用，但若缺乏对原材料加工的设施，所有的资源将一文不值。让我们着手在高度工业化的巴西东南部地区建立新的化工厂，将劳动的成果转化为经济腾飞的基础：一套完整强大的化工业设施，以及其带来的巨额就业机会。"
 BRA_invest_in_energy: "投资能源"
 BRA_invest_in_energy_desc: "在就任总统之前，儒塞利诺·库比契克就已经是能源独立的坚定拥护者。在洛特政府执政期间，他就已经充分意识到巴西在能源需求对境外势力的严重依赖，以及这种依赖将使巴西如何地不得安宁。如今库比契克业已掌权，他迫切地开始筹划摆脱对意大利廉价石油的依赖，代以巴西自己丰富的自然资源。\n\n事实上，巴西是如此的幅员辽阔，内陆原野中蕴藏着的物质财富几乎未曾被人踏足。在合理的投资之下，巴西不仅可以实现能源独立，还可以以此为跳板，维护我们作为世界大国的地位。"
 BRA_open_bndes_checkbook: "给国家经济社会发展银行打钱"
 BRA_open_bndes_checkbook_desc: "老瓦加斯曾断言道：“唯有经济繁荣的国家拥有其主权。”遵循着此意志，库比契克总统在他的第一任期（1955-1960）期间建立了国家经济社会发展银行（BNDES），发挥国有银行的职能，在巴西经济发展的关键部门进行长期投资，帮助国家发展。BNDES是库比契克拿下第一个“目标计划”的关键因素，助力了巴西工业化的进程。如今库比契克再度执政，第二个“目标计划”也已制定，为实现瓦加斯总统的愿景，他需要再次借助BNDES的财政资助。巴西将会凭借其强大的经济与工业实力成为真正的主权国家！"
 BRA_modernize_our_natural_strength: "强化天然优势"
 BRA_modernize_our_natural_strength_desc: "若巴西欲在世界强国之林中占据应有地位，就必须得接受一个残酷而不幸的事实；巴西农业体系已然落后于时代。尽管全球普遍认为巴西的国力根基就在于广袤富饶的农业资源，其未来在于成为世界最大粮仓，但是现在巴西农业正面临着多重困境。虽然巴西左翼主张通过土地改革破局，不过库比契克总统提出了截然不同的解决方案。对儒塞利诺·库比契克来说，唯有通过国家资助的大规模机械化和现代化升级，并且革新农业生产设备与工作方式，才能攻克这个难题。目标既已确立，纵使代价高昂亦在所不惜。"
 BRA_irrigation_infrastructure: "建设灌溉系统"
 BRA_irrigation_infrastructure_desc: "水是万物之源。没有水，一切事物都无法生长繁衍。缺水，是阻碍巴西农业发展的重要原因之一。巴西幅员辽阔，有许多地方十分干旱，尤其是东北部地区，灌溉用水短缺严重限制了农业发展。因此，在迈向发展的征程中，库比契克政府的首要任务就是在缺水地区规划建设大型灌溉基础设施，让农民缺水这个老大难问题从此只存在于发黄的史书里，而不再登在经济期刊的版面上。"
 BRA_support_traditional_farmer: "支持传统农民"
 BRA_support_traditional_farmer_desc: "巴西经济的强大源于农业，而这强盛农业的根基，就在于传统的个体小农。正是这些传统的小农场，不仅养活了巴西人民，也传承着其他国家所不具备的传统技艺。然而，现实却是他们数十年如一日地过着贫穷的生活。库比契克政府决心拨乱反正，彻底改变这一不公的现状，将个体小农的地位提升至前所未有的高度。有了充足的资金和现代化的机械，他们必将成为巴西农业的坚强支柱。诚然，此举会得罪社民党的主要支持者——大种植园主，但库比契克仍会把这项政策义无反顾地推行下去，因为他明白，这不完全是一个经济问题，反而很可能是一个道义问题。"
 BRA_credito_trator: "农机信贷"
 BRA_credito_trator_desc: "库比契克政府已经明确，要大力发展巴西的天然经济支柱——她那举世闻名的农业。而实现这一目标的途径，便是一条前任政府都未曾走通的、肩负道义与责任的道路：扶持巴西的传统小农。为此，库比契克政府推出了一个全新的项目——农机信贷。政府将联合各大银行，给小农提供贷款，帮助其购买现代化设备，改善农场的硬件条件。最终，巴西的小农经济将达到前所未有的高峰，让整个美洲都为之侧目。"
 BRA_agro_e_pop: "农业即潮流"
 BRA_agro_e_pop_desc: "假如巴西的经济支柱在于它的农业，那么巴西农业之所以位列全球领先地位的原因，在于巴西农业的大规模种植园体系。自建国以来，巴西的大规模经济作物种植园始终占有重要地位，咖啡与烟草这两种作物甚至被镌刻于巴西国徽之上。因此，种植园体系自然是农业关注的焦点；为了全面超越对手，我们必须提升种植园的竞争力。此举或将疏远库比契克在工党中的左翼盟友，但总统认为，屈从于他们的诉求是经济上的短视，任何肤浅的感伤滥情都无法阻挡巴西奔向进步的征程！"
 BRA_mechanization_bonds: "农机债券"
 BRA_mechanization_bonds_desc: "库比契克政府已经明确，要大力发展巴西的天然经济支柱——她那举世闻名的农业。而实现这一目标的途径，是扶持国内那些享有盛名的大型种植园，帮助其实现现代化。为此，库比契克政府提议设立“农机债券”：政府将通过国家经济社会发展银行等公共金融机构，向大地主阶层发放贷款，条件是他们必须把这笔钱用来升级农场的硬件设施、购买更先进的机械，以实现全面的现代化与机械化。这不仅是为了国家好，也是为了他们自己好。"
 BRA_create_the_embarapa: "创建巴西农业研究所"
 BRA_create_the_embarapa_desc: "库比契克政府或许对推动巴西农业机械化实现现代化的成果有信心，但这些努力某种程度上只是让巴西追上了现代农业国家。要是真想实现“世界第一农业强国”的目标，追赶还远远不够。巴西必须想办法在技术上超过对手。因此政府创建了EMBRAPA，巴西农业研究所，这个隶属农业部的半公立科研机构专门研究能让巴西甩开所有对手的新技术。"
 BRA_o_grande_celeiro_da_ofn: "OFN的大粮仓"
 BRA_o_grande_celeiro_da_ofn_desc: "库比契克政府完全有理由感到自豪，他们在巴西的经济史上立下了一座丰碑：为巴西经济的命脉——农业——成功实现现代化。得益于此，巴西农业现在不仅能与对手一决高下，更能将他们远远超越！\n\n这种超越，必将实现！我们付出的心血不会白白浪费。库比契克政府将集中一切力量，超越阿根廷，成为西半球最主要的粮食供应国。如果说美国是民主国家的兵工厂，那么巴西就是OFN的大粮仓。整个南美的粮食市场，都将是我们巴西的天下！"
 BRA_lets_finish_the_job: "开始收尾"
 BRA_lets_finish_the_job_desc: "绝不能让老瓦加斯的梦想就此消亡。即使他犯下了无数错误，但他的经济理论却是完全正确的：“强大的经济铸就国家的主权，而强大的工业则铸就强大的经济”。放眼世界，哪个工业强国背后没有强大的钢铁产业撑腰？无论是德意志还是美利坚，其今日之地位皆源于强大的钢铁生产能力。戈梅斯政府缺乏远见，洛特政府又缺乏重视，瓦加斯想让巴西实现钢铁生产自给自足的梦想，至今仍未实现。不过，这样的日子不会久了，库比契克将完成他的梦想！"
 BRA_give_the_devils_their_due: "还魔鬼一个公道"
 BRA_give_the_devils_their_due_desc: "虽说巴西的工业寡头们能有今天，少不了老瓦加斯的功劳，可他们从来就没喜欢过他。他们总是搬出凭空捏造的、诸如“工团主义革命”和“法西斯国家主义”之类的靶子，给一切瓦加斯派的经济提案或任何国家干预经济的政策扣帽子。库比契克政府的目标，就是不能再让这种下三滥的伎俩来搅黄瓦加斯的梦想。所以，哪怕会得罪工党那边的左派盟友，库比契克总统也已经拿定了主意：他任上搞的所有新钢铁项目，比如未来的沃尔塔雷东达钢厂，都得是公私合营的性质。不管怎么说，全国工业联合会都会得到他们应得的一份。"
 BRA_expand_vales_operations: "扩大淡水河谷公司规模"
 BRA_expand_vales_operations_desc: "科学告诉我们，钢是由铁铸成的。所以，要想实现瓦加斯让巴西钢铁自给自足的梦想，就必须把铁矿开采当作头等大事来抓。为此目的，瓦加斯在他执政的最后几年成立了淡水河谷公司，一家专注于在米纳斯吉拉斯州进行矿山作业的国营矿业公司。库比契克政府必须扩大淡水河谷公司，开采规模更大、力度更强。好在，巴西拥有着可能是全世界最丰富的铁矿储备，所以对库比契克总统来说，办成这件事应该相当容易。总而言之，“有志者，事竟成”！"
 BRA_incentivize_steel_production: "刺激钢铁生产"
 BRA_incentivize_steel_production_desc: "自由派经济学家的思维跟现实不一样。一个庞大、坚实的工业体系，不可能像野草一样，给点阳光雨露就自己长出来。需要国家出手，主动创造出能让它生根发芽的环境。所以，任何国家想正经发展工业，都离不开国家精准有力的干预。秉持着这个原则，库比契克政府将采取财政激励等一系列措施大力扶持巴西的钢铁产业。减税、经济刺激，一切措施，应用即用。巴西政府将联合国内外所有的私营伙伴，不惜一切代价，实现瓦加斯的梦想！"
 BRA_fulfill_the_old_mans_dream: "实现前人之梦"
 BRA_fulfill_the_old_mans_dream_desc: "“是时候大干一场了！”（Mãos à obra!）万事俱备，东风吹拂，现在就开始工作吧！为实现瓦加斯让巴西在钢铁生产上自给自足的理想，库比契克政府已完成了所有必要的筹备与谈判。剩下的，就是在米纳斯吉拉斯州和巴西各地进行规划，建设新的钢铁基地。就算瓦加斯自己的党可能有意见，库比契克总统也坚信：新建的钢铁企业必须是政府控股的半公有制企业。无论如何，瓦加斯的梦想终将实现，巴西不仅要实现钢铁自给，更要成为全世界最大的钢铁生产国。让我们把老瓦加斯的梦想变为现实！"
 BRA_begin_the_brazilianization: "启动巴西化"
 BRA_begin_the_brazilianization_desc: "这十年来，社民党总算完成了瓦加斯未竟的事业，为巴西打造了坚实的重工业基础。但是，库比契克总统明白，光有这个还不够，要想让巴西经济真正强大起来，就不能再沿用他第一任期时的老路子。\n\n首先要学第一任期那时候，再次邀请外国的商业巨头来巴西投资设厂，但这一次，规矩得改改，要确保我们新建的这套制造业体系为巴西服务，不管那些外人乐不乐意，都得按我们的规矩来。眼下，还有比远东那些巨型企业更好的邀请对象吗？他们正受着安田危机的影响，库比契克这时候拉他们一把，岂不是正中下怀？"
 BRA_court_the_dragons: "与龙共舞"
 BRA_court_the_dragons_desc: "我们必须面对一个残酷的现实：我们记忆中的那个西方，早已消亡。纳粹在欧洲得胜，美国在太平洋败北，我们所熟知的那个西方世界已然终结，随之而来的是一段似乎永无止境的、经济与技术上的衰败。因此，如果库比契克政府想要实现建立强大制造业的目标，就必须把目光投向东方的朝阳。日本和广东的财阀科技巨头，掌握着未来技术发展的命脉。所以，库比契克将邀请他们来巴西，让他们带来现代化与进步！"
 BRA_finance_the_moguls: "资助巨头"
 BRA_finance_the_moguls_desc: "纵观世界，从德国的IG法本、克虏伯，到远东的安田、富士通，各大工业强国的共同点，就是都拥有自己的龙头企业。这些企业不仅是行业巨头，更以其在全球市场的领导地位，极大地增强了母国的经济实力与国际声望。因此，借助日本财阀的力量与库比契克政府和国家经济社会发展银行的推动，巴西也同样要打造属于自己的龙头企业。\n\n经济学界和媒体给这些与日本财阀合作的巴西工业巨头起了个外号，叫“大亨”。而库比契克总统的目标之一，便是将这些“大亨”培养成南美规模最大、最重要的企业。为此，巴西政府承诺将不惜一切代价，为它们提供全方位的经济扶持与政治优待。"
 BRA_a_quid_pro_quo: "等价交换"
 BRA_a_quid_pro_quo_desc: "天下没有免费的午餐；无论是在生活中，还是在资本主义世界里，这都是颠扑不破的真理。不劳而获是不可能的，尤其这好处还得到这星球上最强大的几家巨型企业手里去拿。库比契克政府与日本财阀的协议已近完成，但对方还有一些要求需要我们满足。\n\n他们开出的条件如下：他们愿意同意接受巴西政府的要求，主要是关于那个要在企业中雇佣五到六成巴西工人的要求，但条件是我们得在某些关键的巴西劳动法规上给他们开绿灯。尽管这项协议可能会激怒库比契克的工党盟友，但他觉得，要进步就得付出一些等量的代价。"
 BRA_sharing_is_caring: "分享即是关怀"
 BRA_sharing_is_caring_desc: "“知识就是力量”，这句话是老生常谈了，无论是在生活中，还是在更为重要的工业领域，这都是颠扑不破的真理。一个国家想保住自己工业强国的地位，就必须保证自己的关键科技和工业知识能跟得上时代。可惜，对巴西这样的发展中国家来说，专家和设备的缺乏使得这种追赶显得十分困难。因此，我们给那些想要享受特殊待遇的日本财阀设了一个条件：他们必须把所有的特种机械、技术知识和研发成果都拿出来，跟巴西的“大亨”伙伴们分享。毕竟，知识这东西，本来就应该拿出来分享。"
 BRA_scientific_exchange_programs: "学术交流项目"
 BRA_scientific_exchange_programs_desc: "俗话说得好，罗马不是一天建成的，工业也不是撒点种子就能从土里窜出来的庄稼，它的发展需要精心培育，需要思考，说白了，就是需要“研发”。巴西在经济和教育上都走了弯路，所以工业研发也一直停滞不前。库比契克政府想了个办法，跟日本财阀合作，把我们技术和工程专业的学生送到日本或广东去，参加他们的技术培训，拿他们的大学奖学金，让他们把学到的知识带回国，从而提升我们国家的工业和研究水平。还有什么比抄别人作业更巴西的呢？这就是我们“纯粹的生存智慧”。"
 BRA_found_the_init: "成立国家工业技术研究所"
 BRA_found_the_init_desc: "库比契克政府或许会觉得，他们在推动工业“巴西化”、把巴西打造成一个像样的制造业中心这件事上有所成就，但这些东西说到底，不过是在追赶别人的脚步罢了。倘若库比契克总统真想实现他那让巴西成为南半球头号制造业强国的目标，光是追赶，肯定远远不够。在技术领域，巴西必须找到办法，不仅要跟上、更要超越对手。\n\n因此，库比契克政府设计并创立了国家工业技术研究所。这是一家隶属于巴西教育部与经济部的半官方科研机构，目标是帮助研究和开发能使巴西领先于所有对手的新技术。"
 BRA_finance_the_nissan_gurgel_x12: "投资X12"
 BRA_finance_the_nissan_gurgel_x12_desc: "放眼世界，从德国的大众，到美国的福特，在这个沥青公路遍布天下的现代社会，一个国家要是没有自己的汽车品牌，就称不上是真正的工业强国。因此，既然日本财阀已在巴西站稳了脚跟，本土的“大亨”企业也深刻融入进巴西的经济生活，库比契克政府决定，由国家工业技术研究所牵头，政府出资打造第一辆百分百纯巴西国产轿车——日产-古格尔X10。这辆由巴西人亲手打造的“第一轿车”，从设计之初，瞄准的就不仅是国内，更是整个南美市场；它将成为我们称霸南美市场的利器！X10引擎将驱动巴西战车，在繁荣与进步的大道上飞驰！"
