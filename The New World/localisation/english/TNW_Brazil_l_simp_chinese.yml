 BRA_pres_info_tt: "§Y总统面板§!展示的是正在进行的总统选举。总统选举每五年举行一次，民众投票决出胜利者。\n\n地图展示了每个§Y地区§!排名第一的候选人的对应颜色。选中一个§Y地区§!就会显示每位候选人在这里的支持率，并允许你为其中一位候选人选择一个§Y策略§!，每次选择完后需等待两周才能进行下一次选择。§Y地区§!内人口越少，竞选的效果就越好。\n\n候选人的§G支持率§!决定了他在投票开始后能得到这个地区的多少选票，而§G竞选势头§!则会影响到§G支持率§!在一定时间内的升降趋势。"
 BRA_pres_campaign_cooldown_inactive: ""
 BRA_pres_campaign_cooldown_active: "§V竞选正在进行§!\n\n"
 BRA_pres_infra_multiplier: "£BRA_pres_infra2_texticon  §G[?BRA_pres_current_state_infra|2]x§!"
 BRA_pres_fatigue_multiplier: "£BRA_pres_fatigue2_texticon  §R[?BRA_pres_current_state_fatigue_display|%0]§!"
 BRA_pres_infra_tooltip: "由于对选举£BRA_pres_infra_texticon §G基础设施§!的投资，[BRA_chosen_pres_candidate_party_color][BRA_chosen_pres_candidate_name]§!在该地区的竞选活动将提效§G[?BRA_pres_current_state_infra|2]x§!。\n\n£BRA_pres_infra_texticon §G基础设施§!会随着时间推移衰减，但可以使用§Y修建选举基建§!行动来增加。"
 BRA_pres_fatigue_tooltip: "受£BRA_pres_fatigue_texticon §R疲劳§!影响，所有候选人在该地区的竞选活动效果将减弱§R[?BRA_pres_current_state_fatigue|2]x§!。\n\n£BRA_pres_fatigue_texticon §R疲劳§!会随着候选人在某一地区组织竞选活动而累积，而暂停拉票疲劳便会逐渐消退。"
 BRA_pres_rally: "§Y举行集会§!\n§F我们将在§Y[BRA_pres_selected_region]§!地区为[BRA_pres_candidate_party_color][BRA_pres_candidate_name]§!举办竞选集会，以提高[BRA.GetCandidatePronoun]在当地选民中的支持率。§!\n\n[BRA_pres_campaign_cooldown_msg]§Y选中时的效果：\n[BRA_pres_selected_region]§!\n  §G提升§!对[BRA_pres_candidate_party_color][BRA_pres_candidate_name]§!的支持。"
 BRA_pres_campaign: "§Y投入竞选活动§!\n§F我们将把[BRA_pres_selected_party_name]的竞选资源集中投放到§Y[BRA_pres_selected_region]§!地区，提升[BRA_pres_candidate_party_color][BRA_pres_candidate_name]§!在选民投票前的认知度和公众形象。§!\n\n[BRA_pres_campaign_cooldown_msg]§Y选中时的效果：\n[BRA_pres_selected_region]§!\n  §G提升§![BRA_pres_candidate_party_color][BRA_pres_candidate_name]§!的竞选势头，并且会使§G支持率§!随着时间的推移而增长。"
 BRA_pres_infra: "§Y建立竞选组织§!\n§F我们将在§Y[BRA_pres_selected_region]§!地区的选战要地为[BRA_pres_candidate_party_color][BRA_pres_candidate_name]§!设立竞选办公室，以此提升竞选活动的效率。§!\n\n[BRA_pres_campaign_cooldown_msg]§Y选中时的效果：\n[BRA_pres_selected_region]§!\n  增建£BRA_pres_infra_texticon §G基础设施§!，使[BRA_pres_candidate_party_color][BRA_pres_candidate_name]§!的竞选决议§G效果更好§!。"
 BRA_pres_bribe: "§Y钞票换选票§!\n§F只要给§Y[BRA_pres_selected_region]§!地区的社区领袖送上几件称心的礼物，[BRA_pres_candidate_party_color][BRA_pres_candidate_name]§!的选票自然十拿九稳。§!\n\n[BRA_pres_campaign_cooldown_msg]§Y选中时的效果：§!§F\n从£BRA_adhemar_slush_fund_texticon §G行贿基金§!中花费§R5M美元§!。\n[BRA_pres_selected_region]§!\n  §G提升[BRA_pres_candidate_party_color][BRA_pres_candidate_name]§!的支持率和竞选势头§!。\n  产生£BRA_pres_fatigue_texticon 额外§R疲劳§!。"
 BRA_pres_supporters: "§Y针对支持者§!\n§F我们将重点攻坚[BRA_pres_candidate_party_color][BRA_pres_candidate_name]§!在§Y[BRA_pres_selected_region]§!地区的死忠票仓，瓦解对手在当地的优势，争取部分[BRA.GetCandidatePronounPossessive]的支持者。§!\n\n[BRA_pres_campaign_cooldown_msg]§Y选中时的效果：\n[BRA_pres_selected_region]§!\n§R降低§!对[BRA_pres_candidate_party_color][BRA_pres_candidate_name]§!的支持。"
 BRA_pres_negative: "§Y散播负面消息§!\n§F我们将利用手中掌握的一切负面信息，在§Y[BRA_pres_selected_region]§!地区抹黑[BRA_pres_candidate_party_color][BRA_pres_candidate_name]§!，破坏[BRA.GetCandidatePronounPossessive]在当地选民眼中的形象。§!\n\n[BRA_pres_campaign_cooldown_msg]§Y选中时的效果：\n[BRA_pres_selected_region]§!\n  §R降低§![BRA_pres_candidate_party_color][BRA_pres_candidate_name]§!的竞选势头。"
 BRA_senate_info_tt: "§Y参议院面板§!按地区和§C政党§!分类展示巴西现任§Y参议员§!。这些议员虽然来自形形色色的§C不同政党§!，但均隶属于五大§I主要党派§!之一。\n\n参议员选举每三年举行一次，各§Y州§!轮流改选一到两个席位，交替选举。在选举季，地图会以政党颜色标注各§Y州§!的领先党派。\n\n选中§Y州§!将显示该州的候选人名单；对于同属§I主要党派§!者可以§G助选§!，对敌对阵营则能§R抹黑§!。每两周可以进行一次竞选活动，可在地图上看到其他政党的竞选活动情况。"
 BRA_senate_campaign: "§Y为[BRA_candidate_name]竞选§!\n§L我们将动员[BRA_senate_selected_state]中全[BRA_senate_selected_party_name]的力量，来支持[BRA_senator_candidate_party_color][BRA_candidate_name]§!。\n\n[BRA_senate_campaign_cooldown_msg]§Y选中时的效果：\n[BRA_senate_selected_state]§!\n  §G提升§!对[BRA_senator_candidate_party_color][BRA_candidate_name]§!的支持。"
 BRA_senate_slander: "§Y诋毁[BRA_candidate_name]§!\n§L为确保[BRA_senate_selected_state]不会选出[BRA_senator_candidate_party_color][BRA_candidate_name]§!，我们将派出[BRA_senate_selected_party_name]的成员去散播他的负面信息。§!\n\n[BRA_senate_campaign_cooldown_msg]§Y选中时的效果：\n[BRA_senate_selected_state]§!\n  §R降低§!对[BRA_senator_candidate_party_color][BRA_candidate_name]§!的支持。"
