 BRA_Costa_e_Silva_sec_desc: "§Y战争部长\n军政府§!\n--------------\n§L科斯塔-席尔瓦有着长长的履历，凭借足够的智慧成为军队的一把手。席尔瓦在阿雷格里港军事大学开始了他的军旅生涯，以班级首席成绩毕业，成为了士官青训团的指挥官。此后他逐步晋升，唯一的小插曲是卷入1922年尉官叛乱而被处以六个月监禁。在盟友爱德华多·戈梅斯的支持下，科斯塔-席尔瓦终于被提拔为将军，1961年他得到了洛特总统的进一步拔擢。\n\n在他的职业生涯中，科斯塔-席尔瓦培养了一些关键的意识形态思想。首先是与美国的亲密关系，他曾在那里接受过短期训练，也相信巴西的未来与美国紧密相连，两个国家应该团结起来应对世界威胁；其次他相信左翼是对巴西与巴西人生活方式迫在眉睫的永恒威胁。\n\n最后，他相信军队是管理巴西的最佳团体，这使席尔瓦成为强硬派运动的重要人物。§!"
 BRA_privilege_constitutionalists: "优待护宪派"
 BRA_privilege_constitutionalists_desc: "国防委员会的老人建议我们提拔他们精心挑选的战士，好让他们在军中扩大影响力。他们忘了恩里克·洛特不仅是陆军元帅，更是巴西的总统，因为人民选举了他，他的职责是为人民服务，而不是为一些机会主义者服务。\n\n他并非孤身一人。军中有许多人赞同他的理念，希望保护民主。但不幸的是，这些人大多职位低微，在全国各地坐冷板凳。改变的时候到了，如此优秀的士兵应该得到最好的待遇。"
 BRA_Laudo_Natel_hog_desc: "§Y副总统\n右翼民粹主义§!\n--------------\n§L劳多·纳特尔副总统常被诟病为拘谨的狂热分子，这是他刻意营造的表象，好把天才锋芒隐藏在下面。世人多将他的保守主义视作落后于时代的标志，实则不然，纳特尔实则笃信技术官僚主义。他既看重自我奋斗的价值，又坚信命运自有安排。诚然，这种矛盾立场招致了不绝于耳的嘲弄。但当时间流逝，纳特尔的能力逐渐显现，他的理念也合理了起来。\n\n在他的正式履历上，纳特尔在社交圈如鱼得水。然而，担任圣保罗州长阿德马尔的幕僚，才是他最卓越的成绩。在纳特尔的精心指导下，这个人口稠密的州的经济空前繁荣，但这项成就后来却被小瓦加斯据为己有。巴西王位的新主人绝非忘恩负义之徒，他深信这位老谋深算的朝臣，深信他一定能在国家舞台上为自己效力，就像在圣保罗州那样卓越。毕竟，比起那些不听话的政客，纳特尔更懂得如何理解同志。§!"
 BRA_Emilio_Medici_sec_desc: "§Y战争部长\n军政府§!\n--------------\n§L虽是移民之子，但勤奋才是梅迪西最吸睛的标签。勤奋一词贯穿了他的整个职业生涯，先是阿雷格里港军事学院的高材生，又屡次晋升，直到1961年成为保卫巴西的将军，他人生的每一步都在践行这种品质。或许正是这种对巴西的赤诚之心，让他坚信军队应当压文官政府一头。\n\n又或许，这源于他与阿图尔·达科斯塔-席尔瓦的深厚私谊。但与其他强硬派不同，梅迪西深知何时该闭嘴，何时该发声，这种珍贵特质简直是为高官量身打造的。不仅如此，他还有在军中的广泛人脉，以及一股极致的敬业精神。这些最终将他送进了总统内阁，坐上了战争部长的宝座，稳如泰山。§!"
