 BRA_megaproject_airport: "巴西利亚国际机场"
 BRA_megaproject_airport_desc: "§f巴西利亚国际机场§!是奥斯卡·尼迈耶对巴西首都宏伟愿景的巅峰之作。作为一座建筑奇迹，新机场将迎接成千上万的游客来到巴西充满魅力的未来之城。"
 BRA_megaproject_airport_name: "机场"
 BRA_megaproject_rspl_effect: "借助§V日本技术§!，我们将建设一条连接里约热内卢和圣保罗的§K高速铁路§!，整合两地经济，为地区工业化提供重要助力。"
 BRA_megaproject_rspl: "里约-圣\n保罗高铁"
 BRA_megaproject_rspl_desc: "§K里约-圣保罗高铁§!采用了日本的最新技术，是连接巴西最大城市的高铁走廊。它有望使人们以前所未有的速度往来于城市中心，是商务出行与休闲旅游的最佳选择。"
