 BRA_NATIONAL_ELECTRIC_ACT: "§V国家电力法案§!"
 BRA_NATIONAL_ELECTRIC_ACT_Desc: "大量电力基础设施掌握在外国企业手中，大大加剧了巴西的能源危机。农村贫困地区的民众首当其冲，承受着高昂电价带来的沉重负担。法案提议将这些电力公司国有化，为广大民众提供价格更加亲民的电力服务。"
 BRA_VOTING_RIGHTS_ACT: "§V选举权法案§!"
 BRA_VOTING_RIGHTS_ACT_Desc: "共和国声称自己“民主”，然而，当我们看到文盲、低级军官以及其他边缘化群体无法享有投票权利时，这样的宣称就显得十分可疑。法案旨在赋予全体巴西公民毫无例外的投票权利，以此保障民主精神的实现。"
 BRA_AFRICAN_SURGE_RESOLUTION: "§Q非洲增兵决议案§!"
 BRA_AFRICAN_SURGE_RESOLUTION_Desc: "南非战事绵延日久，与德意志三大殖民政权之间的斗争尚未见尽头。显而易见，如果我们要把所谓“雅利安油灯种族”逐出南非边界，就必须再加把劲。通过法案将向前线派遣更多兵力，痛击希特勒的走狗。"
 BRA_UNWAVERING_TORCH_ACT: "§Q不屈火炬法案§!"
 BRA_UNWAVERING_TORCH_ACT_Desc: "过去两年来，德国在南非和其他地区肆意侵略、散播战火，巴西必须寻找盟友。美国人，和他们成立的自由国家组织当然是最好的选择。这条法案将赋予立法机构的支持和准许，从而促成巴西以正式成员身份加入自由国家组织。"
 BRA_HIGHWAY_TO_PROSPERITY_ACT: "§Y繁荣公路法案§!"
 BRA_HIGHWAY_TO_PROSPERITY_ACT_Desc: "洛特政府倒台后，连接巴西腹地和南美其他地区的跨亚马孙公路因缺乏资源和资金而一蹶不振。这条法案将恢复对该项目的注资，并向其提供更多的资金，以确保项目完成。项目要多少，巴西就给多少。"
 BRA_SOUTH_AFRICAN_WITHDRAWAL_ACT: "§K南非撤军法案§!"
 BRA_SOUTH_AFRICAN_WITHDRAWAL_ACT_Desc: "就因为美德两国之间毫无意义的拳击游戏，巴西人的热血洒在南非的土地上。一船又一船，巴西生机蓬勃的年轻人被送往东方，一去不返。我们不能再这样了。这条法案由夸德罗斯总统提出，它将把我们的孩子从无法无天的非洲黑洞里带回家，再也不用为美国佬出工出力。鉴于当初进军南非法案在国会得到了压倒性的支持，夸德罗斯总统必须保证撤军法案同样顺利通过立法程序，否则他将无法得到立法机关的批准和许可。虽然夸德罗斯可以直接无视立法机关，直接向最高法院申诉称他们不应干涉外交政策，但最好还是能在立法机关通过法案，以免产生意料之外的波澜。"
 BRA_LOTT_ACT: "§K洛特法案§!"
 BRA_LOTT_ACT_Desc: "这条法案将为军官群体制定新的个人守则，同时将早已成文的其他规则落到实处，将政治从军队中驱逐出去，一劳永逸地避免军方干政，保护巴西共和国的民主。法案一经通过，军中的护宪派定能如虎添翼，帮助军队彻底接受和适应其“穿制服的平民”的身份。"
 BRA_AGRARIAN_RELIEF_ACT: "§K农业救助法案§!"
 BRA_AGRARIAN_RELIEF_ACT_Desc: "这条法案将启动土地改革。我们要从经营不善、唯利是图的大地主手中收回土地，进行重新分配，交给那些应该得到土地的小农、中农。他们更了解土地，知道该怎么种出更多的粮食和蔬果。法案还将提供紧急救济和贷款，保障农业生产不受土改波动的影响，继续保持增长上升势头。此举有望平息当前使国家陷入瘫痪的抗议活动。"
 BRA_ENTRY_INTO_THE_ANDEAN_PACT: "§K加入安第斯协定§!"
 BRA_ENTRY_INTO_THE_ANDEAN_PACT_Desc: "国会开始就巴西加入安第斯协定一事展开辩论，举国上下掀起论战狂潮。此事关系重大：若条约获批，巴西将成为安第斯协定的正式成员国，全盘接受条约义务。支持与反对阵营都规模庞大且跨越党派界限，推动条约批准需要精心策划政治运作。"
 BRA_ANTI_RESTRICTION_ACT: "§K反限制法案§!"
 BRA_ANTI_RESTRICTION_ACT_Desc: "总统雅尼奥·夸德罗斯提出的这项法案将落实一系列措施，防止对经济活动设置过多限制，而先前那些瓦加斯主义政府总是轻易实施限制。这不仅可以防止政府在实施限制措施的过程中挪用大量纳税人的钱，还可以让巴西政府以某种方式让国有企业为己所用。"
 BRA_ANTI_CORRUPTION_ACT: "§K反腐败法案§!"
 BRA_ANTI_CORRUPTION_ACT_Desc: "总统雅尼奥·夸德罗斯在洛特政府垮台后提出的这项法案，将着手处理最近由一位品行不端的将军留下的烂摊子——腐败。我们将采取立竿见影的措施，把腐败扫出巴西。有报道称，该法案拟议的措施充其量只是小修小补，最糟的还得算上那些支持洛特的宣传。"
 BRA_ANTI_TRUST_ACT: "§K反托拉斯法案§!"
 BRA_ANTI_TRUST_ACT_Desc: "总统雅尼奥·夸德罗斯提出的这项法案将落实一系列措施，防止政客建立托拉斯，并允许对目前或将来建立托拉斯的任何尝试进行调查。有不少人说这条法案是为了针对总统的竞争对手，腐败的社进党政客阿德马尔·德·巴罗斯，这纯属无稽之谈，是敌对分子在背后煽动的谣言，切莫轻信。"
 BRA_ADHEMAR_DE_BARROS_IMPEACHMENT: "§K阿德马尔·德·巴罗斯弹劾案§!"
 BRA_ADHEMAR_DE_BARROS_IMPEACHMENT_Desc: "由于阿德马尔·德·巴罗斯总统陷入昏迷，乌利塞斯·吉马良斯在众议院提出该弹劾案。当前国家处于没有最高元首领导的状态，而由幕僚长劳多·纳特尔代为执政，这显然严重违宪，必须立即终止。鉴于宪法未能就总统丧失履职能力之情形作出规定，国会两院将通过表决罢免德·巴罗斯总统。"
 BRA_HEALTHCARE_BILL: "§K医保法案§!"
 BRA_HEALTHCARE_BILL_Desc: "便捷的医疗服务是全体巴西人与生俱来的权利，却成了多年未竟的事业。阿德马尔·德·巴罗斯从医期间对此深有体会。如今社进党通过医保法案将普济众生的梦想变为现实。当然，法案的内容存在一些争议——全民盟希望与私有企业合作，而工党希望建立一套公共医疗系统。无论如何，我们要想给未来的执政时间开一个好头，就必须让整份法案务实可行。"
 BRA_NATIONAL_SCHOOL_EXPANSION_PROGRAM: "§K国家学校扩张计划§!"
 BRA_NATIONAL_SCHOOL_EXPANSION_PROGRAM_Desc: "虽然各州均兴办教育，但教育所普及的范围始终有限。不是所有的孩子都有上学的权利，而这是阻碍巴西经济进一步增长的一个重要因素。该法案以总统的名义提出，旨在通过大规模投资确保所有儿童——无论城市农村——都有学可上，并以教育贯彻巴西的爱国主义价值观。"
 BRA_SOCIAL_SECURITY_REFORM_ACT: "§K社会保障改革法案§!"
 BRA_SOCIAL_SECURITY_REFORM_ACT_Desc: "该法案由罗梅乌·德·坎波斯·韦加尔提出，建立在儒塞利诺·库比契克在其总统任期内制定的社会保障法基础之上。社会保障体系存在很多漏洞，很多老人、残疾人和有工作但收入微薄的公民由此陷入贫困。法案将立即解决上述问题。"
 BRA_ADHEMAR_AGRARIAN_REFORM_ACT: "§K农业改革法案§!"
 BRA_ADHEMAR_AGRARIAN_REFORM_ACT_Desc: "该法案由菲林托·穆勒提出，被总统称为巴西历史上最令人瞩目且最重要的立法之一，它旨在解决大庄园制危机并重新分配农村土地。不过，法案受到了社民党和工党人士的批评，因为它不像前总统洛特的土地改革法案那样雄心勃勃，且范围也更加有限。"
 BRA_NATIONAL_STANDARDIZATION_OF_WAGE_INDEXATION_ACT: "§K国家工资指数标准化法案§!"
 BRA_NATIONAL_STANDARDIZATION_OF_WAGE_INDEXATION_ACT_Desc: "巴西经济长期受通胀困扰，靠着近十来年的高速增长才稍显缓解。最近的局势变得微妙起来：政府稍有不慎，恐将引发十九世纪九十年代以来所未有的§R通胀螺旋§!。\n\n政府祭出《国家工资指数标准化法案》，冻结公共部门及国企薪资，以达成巴西利亚设定的调控目标。法案还授权政府强化全国工资指数化管理，力求维持金融稳定。\n\n法案遭到§V左§!§D右§!两派一致反对，有很大的可能在下次选举后遭到废止。但对执政的社进党而言，要稳住经济大盘就得付出代价。"
 BRA_LABOR_LAW_REFORM_ACT: "§K劳工法改革法案§!"
 BRA_LABOR_LAW_REFORM_ACT_Desc: "政府麾下远不止有公务员。成千上万的钢铁工人等体力劳动者同样仰赖政府提供的岗位，他们日夜辛劳，服务国计民生，理应享有法律保障。应该让他们明白：结束了一天的辛勤劳动之后，不必担心翌日清晨会因失业而陷入困境。通过设立规范化流程、合理的补偿机制以及更加严格的解雇标准，工人大可安枕无忧，稳稳端起“铁饭碗”。不过，有些批评的声音认为，我们的举措不过是为了庇护所谓“腐败的”官员。但实际上，这恰恰反映出他们难以理解我们对人民福祉的深切关怀。"
 BRA_EDNA_AGRARIAN_REFORM_ACT: "§K农业改革法案§!"
 BRA_EDNA_AGRARIAN_REFORM_ACT_Desc: "农业是我国规模最大的产业，更是立国之本。然而当下土地所有权正越来越多地集中于少数人而非民众手中。政府必须采取干预措施，通过立法推进农业改革事业和土地产权再分配进程。《农业改革法案》将在恩里克·洛特的工作基础上，超越阿德马尔·德·巴罗斯政府的改革成果，以空前的力度推动土地再分配，让更多民众获得土地所有权。唯有如此，民众乃至整个国家才能拓展资本积累渠道，建立代际传承的财富体系。"
 BRA_VOTING_LAW_REFORM_ACT: "§K选举法改革§!"
 BRA_VOTING_LAW_REFORM_ACT_Desc: "数百万充满爱国热情的巴西公民因文盲身份被剥夺了投票权。公民的呼声不应仅仅因为其出身环境与政府教育体系的失职而遭压制。虽然无法立即实现全民普选，但可以逐步降低对选民的文化程度要求。今后只需掌握基本字母知识即可获得投票资格。虽仅属规章调整，这一举措将使上千万公民重获参政权利，有效削弱现行民主制度中根深蒂固的阶级特权现象。"
 BRA_NULLIFICATION_OF_EMBARGO_AGAINST_THE_PAKT: "§K解除对团结协定的禁运§!"
 BRA_NULLIFICATION_OF_EMBARGO_AGAINST_THE_PAKT_Desc: "该法案由马托格罗索州参议员菲林托·穆勒提出，呼吁结束对德国和团结协定其他成员国的贸易限制。虽然德占东部各专员辖区生产的商品仍然受到限制，但这项法案如果通过，巴西和德国将实现关系正常化。"
 BRA_IMPEACHMENT_OF_VICE_PRESIDENT_EDNA_LOTT: "§K副总统埃德娜·洛特弹劾案§!"
 BRA_IMPEACHMENT_OF_VICE_PRESIDENT_EDNA_LOTT_Desc: "由于近日副总统洛特被揭露出与境外势力相勾结，参议员菲林托·穆勒提出了对副总统的弹劾案。在阿德马尔·德·巴罗斯的支持下，弹劾案将清除工党对政府的所有影响，将副总统的接班人选锁定为众议院议长佩德罗·阿莱绍。"
 BRA_UNIVERSAL_LITERACY_ACT: "§K全民扫盲法案§!"
 BRA_UNIVERSAL_LITERACY_ACT_Desc: "国民的文化素养是丈量文明的标尺。倘若我们的人民大字不识得一个，吹“文明”的牛岂不贻笑大方？当市井百姓能品读文学经典，当法典条文不再晦涩难懂，当艺术瑰宝走进千家万户，这才叫文明国度。巴西的教育短板必须补全：我们将扩建城乡教育设施，让新生代学习读书写字；开展全民扫盲行动，为被时代遗忘者点亮知识明灯；我们要让让笔墨书香浸润巴西的每个角落。"
 BRA_AFFORDABLE_HEALTHCARE_BILL: "§K平价医疗法案§!"
 BRA_AFFORDABLE_HEALTHCARE_BILL_Desc: "健康是民生之基。聚餐时，“敬健康”也是人们最常用的祝酒词。因此，保证公民的健康是我们的第一要务。以工党为首的一批人呼吁建立国营医疗体系，但这一想法缺乏现实可行性，远远超出了国家的承受能力。尽管如此，巴西民众需要帮助，我们理应施以援手。通过增加对低收入患者的补助帮扶，限制部分药品的价格以及制定新的医疗法规，每一个巴西人都将获得及时且平价的医疗服务。"
 BRA_NATIONAL_HEALTHCARE_ACT: "§K国家医疗法案§!"
 BRA_NATIONAL_HEALTHCARE_ACT_Desc: "健康是民生之基。聚餐时，“敬健康”也是人们最常用的祝酒词。因此，在保障人民的健康上，我们必须跨越成本和支出的阻碍，矢志追求极致。为了让巴西人获得最好的医疗服务，我们将建立国营医疗体系，所有医院均由政府运营，辛勤工作的医生会获得更多奖金，而接受治疗的病人则几乎不用花费一分钱。如此下来，巴西终将摆脱病夫遍地的现状，走向人人健康的明天。"
 BRA_STANDARDS_IN_GOVERNMENT_ACT: "§K政府行为标准法案§!"
 BRA_STANDARDS_IN_GOVERNMENT_ACT_Desc: "许许多多的公务员与政客把体制视为私器，这种歪风必须刹住。是时候正告他们：腐败绝不是生活常态，国家不存在特权阶层。本法案将建立严格的制度规范，即使账上只动了几个数字，也要迅速追踪、彻查并追究责任。绝不允许再出现一个阿德马尔！"
 BRA_NATIONAL_DEREGULATION_ACT: "§K放松监管法案§!"
 BRA_NATIONAL_DEREGULATION_ACT_Desc: "街头巷尾的杂货铺、家庭作坊、社区餐馆——这些随处可见的中小企业才是巴西经济的源流根基。它们不像跨国巨头能雇律师团应付合规流程，光是开业许可、消防规范、税务申报这些繁复流程，就足以掐灭无数创业梦想。新出台的放松监管法案要做的，就是拆掉捆住小老板手脚的规章锁链，推动经济加速发展。"
 BRA_EDNA_REPEAL_OF_JAPANESE_IMMIGRATION_BAN: "§K废除日本移民禁令§!"
 BRA_EDNA_REPEAL_OF_JAPANESE_IMMIGRATION_BAN_Desc: "多年来，日系巴西人一直因为无法很好融入当地文化而遭到打压，他们的语言、文化被禁止，权利也被剥夺，1946年社民党颁布的移民禁令更是给了本就风雨飘摇的日系巴西人致命一击。\n\n他们原以为这就是结局。\n\n参议院最终认识到禁令的危害，决定废除这项歧视性政策，为生活在巴西各地的日系社区解除长达数十年的枷锁。不过，这仅是消除巴西普遍存在的偏见与歧视的第一步，只有时间与努力，才能把这些创伤化成回忆。"
 BRA_WEST_AFRICAN_INTERVENTION_ACT: "§K西非干预法案§!"
 BRA_WEST_AFRICAN_INTERVENTION_ACT_Desc: "作为全球自由事业的坚定支持者，巴西自然要向深陷西非泥潭的OFN盟友伸出援手。不过，由于战事胶着，距离又十分遥远，直接发动军事干预不太现实，更不必说此举将引发国际震荡。因此，本法案准许总统授权组建维和部队，以相对间接的方式提供援助，为当地人民带去自由民主。"
 BRA_BRAZIL_AMERICA_ARMS_TREATY: "§K巴美军备条约§!"
 BRA_BRAZIL_AMERICA_ARMS_TREATY_Desc: "根据巴美两国政府最新达成的协议，巴美军备条约已提交参议院审议。若获得批准，条约将进一步深化巴美同盟关系，将双边军事合作正式纳入法律框架，并为巴西军方（特别是正在积极推进的核计划）引入美国科研力量与技术支持。\n\n部分参议员公开反对条约，批评此举是让巴西毫无退路地倒向美国，使得后续政府失去转圜空间。然而，条约肯定会显著提升巴西在国际舞台上的战略地位。"
 BRA_BRAZILIAN_LABOR_ACT: "§K巴西劳工法§!"
 BRA_BRAZILIAN_LABOR_ACT_Desc: "瓦加斯时代的政治遗产虽然盘根错节、深入体制，所幸仍有部分条款存在可乘之机，全民盟已经锁定了其中的薄弱环节。通过这份法案，工会休想再借鸡毛蒜皮的小事绑架国家利益——要么与政府携手合作推动发展，要么在对抗中被时代浪潮无情淘汰。"
 BRA_ERADICATE_ILLITERACY_ACT: "§K扫盲法§!"
 BRA_ERADICATE_ILLITERACY_ACT_Desc: "巴西的高文盲率始终是制约国家发展的重要原因之一。对于超级大国们而言，文盲早已不是什么紧要的问题，可巴西却依然盘桓在不公与无知的巢穴之中。农村地区的情况尤为严重，由于城市得到了优先发展，当地只能坐视教育水平的落后与流失，最终几乎与广泛教育系统相隔绝。\n\n不能再这么下去了。我们要结束对广袤农村的忽视，以支持其教育发展的新方案取而代之。这当然不能一劳永逸地解决农村的文盲危机，但这是千里之行的第一步，塑造出公平的竞争环境。无论怎么说，这都是最为根本的胜利。"
 BRA_NATIONAL_TRUTH_COMMISSION_ACT: "§K国家真相委员会法案§!"
 BRA_NATIONAL_TRUTH_COMMISSION_ACT_Desc: "新国家体制的受害者一直在呼唤正义，而先前的瓦加斯派政府对其先辈的卑劣行径视而不见。镇压、暴力、审查，这些罪行必须大白天下。国家真相委员会法案将上呈参议院，不为攻讦政敌，只为揭露并弥补新国家体制的罪行。委员会由独立专家组成，瓦加斯本人无权介入。我们要的不是权力，而是给无辜者与受冤者一个了断。"
 BRA_ANTI_RIOT_BILL: "§K反暴乱法案§!"
 BRA_ANTI_RIOT_BILL_Desc: "圣保罗自由区针对日系人的暴力事件不可姑息，必须让地方当局即刻采取雷霆手段。政府拟推动《反暴乱法案》，凡遇暴乱，军警部队可以事急从权——但凡危及无辜民众人身财产安全者，军警可凭合理怀疑当场拘捕，对暴徒予以依法严惩。"
 BRA_RACIAL_DEMOCRACY_BILL: "§K种族民主法案§!"
 BRA_RACIAL_DEMOCRACY_BILL_Desc: "拉塞尔达或许并不总是能与日裔社群的头面人物融洽相处，但他没有因此对日裔的困境和苦难视而不见。近来，有关歧视状况的报道已经传入了总统府。拉塞尔达异常愤怒，下令制定一项法案，正式扩大公民权利，为日裔提供法律承认，并正式禁止针对其的歧视。\n\n这只是有限的第一步。禁止歧视的法律已经出台，但它只会起诉最明目张胆的案例，而且也只规定了最为轻微的处罚。日语得到了承认，但仅限于课堂之上，而在其他领域使用日语仍基本被禁止。可尽管如此，在巴西争取真正的、平等的种族民主的道路上，这仍是朝着正确方向迈出的光明一步。"
 BRA_LACERDA_REPEAL_OF_JAPANESE_IMMIGRATION_BAN: "§K废除日本移民禁令§!"
 BRA_LACERDA_REPEAL_OF_JAPANESE_IMMIGRATION_BAN_Desc: "多年来，日本移民在巴西政府眼中要么被看成食之无味的鸡肋，要么被视作卧榻之侧的威胁。这道禁令在当时看似合理，但无论如何它都是种族主义的造物。这种偏见筑起高墙，将无数本可为巴西建设添砖加瓦的勤劳移民拒之门外——而这条法案的使命就是纠正这个错误。"
 BRA_LACERDA_NATIONAL_SECURITY_LAWS_REFORM: "§K国家安全法改革§!"
 BRA_LACERDA_NATIONAL_SECURITY_LAWS_REFORM_Desc: "爱德华多·戈梅斯政府曾以国家安全为由首开先例，立法取缔共产主义政党并授权军方在必要时可进行军事干预，而卡洛斯·拉塞尔达的做法更是有过之而无不及：他授予军事部长对涉军法案的否决权，将与自由国家组织的同盟关系写入法典，并授予军事法庭审理激进分子和异议人士相关案件的权力。\n\n法案一经通过，就立刻被用来清洗军队里的立宪派。对全民盟及其核心人物拉塞尔达来说，这部强化版的国安法堪称完美，不仅彻底肃清了军营中残存的瓦加斯主义余毒，还在民间筑起了永绝后患的铁幕高墙。"
 BRA_PRESIDENTIAL_LEGACY_FUND_ACT: "§K总统遗产基金法案§!"
 BRA_5TH_REPUBLIC_CONSTITUTION: "§K第五共和国宪法§!"
 BRA_5TH_REPUBLIC_CONSTITUTION_Desc: "在大部分任期之中，拉塞尔达都在同瓦加斯主义的污点斗争。如今，他离完全胜利只有一步之遥了：如果这部法案获得通过，拉塞尔达就将得以召开新一次制宪会议，从而彻底改写巴西宪法，废除其给予瓦加斯主义原则的保护。现在看来，又一个新国家体制的建立只是时间问题了。\n\n除了个人野心之外，修宪还能彻底确立全民盟的执政地位——像全民盟这么遵守其政治原则的政党，很难不如此相信。若是宪条文辞恰到好处，全民盟就能保证只有自己能从新的选举制度中得利，主导巴西一代人的道路。毕竟，还有哪个党能比全民盟更加得到信任、去捍卫宪法呢？"
 BRA_pl_bill_0: "§K测试法案§!"
 BRA_pl_bill_desc_0: "测试法案描述"
 BRA_pl_unknown_bill: "§Y未知法案§!"
 BRA_national_security_act_law: "[get_BRA_national_security_act_law]"
 BRA_national_security_act_law_desc: "[get_BRA_national_security_act_law_desc]"
 BRA_national_security_act_law_0: "£GFX_BRA_NSA_texticon §n国家安全法§!£GFX_BRA_NSA_texticon "
 BRA_national_security_act_law_0_desc: "尽管按照第四共和国£GFX_BRA_constitutionalists_texticon §n宪法§!规定，§n巴西§!是由政治家领导的民主国家，但事实却与此大相径庭。£GFX_BRA_constitutionalists_texticon §n宪法§!包括£GFX_BRA_NSA_texticon §n国家安全法§!，赋予军方在国家陷入崩溃危机时担负£GFX_BRA_constitutionalists_texticon §n护宪义务§!、正当§R干涉§!政治的权利。除此之外，宪法中还存在部分其他§R动摇§!§n巴西§!民主政治文化的法条，包括§R查禁§!意图暗中颠覆国家的£GFX_BRA_pcb_texticon £GFX_BRA_pcdob_texticon §e共产主义§!以及£GFX_BRA_pnb_texticon §r民族社会主义§!党派。\n\n§R除非£GFX_BRA_NSA_texticon §n国家安全法§!会被另一份法律所替代，否则这柄达摩克利斯之剑随时都有可能落下。§!"
 BRA_national_security_act_law_1: "£GFX_BRA_NSA_texticon §q强化§!§n国家安全法§!£GFX_BRA_NSA_texticon "
 BRA_national_security_act_law_1_desc: "爱德华多·戈梅斯政府曾以国家安全为由首开先例，立法取缔共产主义政党并授权军方在必要时可进行军事干预，而卡洛斯·拉塞尔达的做法更是有过之而无不及：他授予军事部长对涉军法案的否决权，将与自由国家组织的同盟关系写入法典，并授予军事法庭审理激进分子和异议人士相关案件的权力。\n\n法案一经通过，就立刻被用来清洗军队里的立宪派。对全民盟及其核心人物拉塞尔达来说，这部强化版的国安法堪称完美，不仅彻底肃清了军营中残存的瓦加斯主义余毒，还在民间筑起了永绝后患的铁幕高墙。"
 BRA_varguist_labor_law: "£GFX_BRA_ptb_texticon  §V统合劳工法§! £GFX_BRA_ptb_texticon"
 BRA_varguist_labor_law_desc: "1943年5月1日，受梵蒂冈方面于1891年颁布的《新事通谕》启迪，§V热图利奥·瓦加斯§!签署了§n巴西§!史上最重要的文件之一：一部皮革装订的立法手册，其中的一字一句都承载着每位劳工、农场工人、苦力和所有为他人的利润辛勤劳作的§n巴西人§!的生计。\n\n尽管£GFX_BRA_ptb_texticon §V《统合劳工法》§!£GFX_BRA_ptb_texticon 收录了许多在§V瓦加斯§!时代前就存在的法律，但§V《统合劳工法》§!却始终都是其§V政治遗产§!的核心。该法案保障了包括§n巴西人§!的带薪休假、最低工资和在适宜条件下工作在内的诸多权利。尽管其效力面临着其中漏洞与腐败行径的考验，但在§V瓦加斯主义者§!心中，§V《统合劳工法》§!依然是圣典一般的存在。\n\n而在£GFX_BRA_udn_texticon §Q反瓦加斯派§!看来，§V《统合劳工法》§!的字里行间都散发着§r墨索里尼§!的恶臭，其与§r法西斯意大利的《劳工宪章》§!的相似度更是高的吓人。身为法团主义不可撼动的大山，它对§n巴西§!工厂的紧密控制仿佛时时刻刻都在挑衅着其反对者，而那些人也视其为眼中钉、肉中刺，一心盼着削弱其权力或者将其彻底推翻。"
 BRA_racial_democracy_law: "£GFX_BRA_racial_texticon  §G种族§!§D民主§! £GFX_BRA_racial_texticon"
 BRA_racial_democracy_law_desc: "£GFX_BRA_racial_texticon §G种族§!§D民主§!堪称§n巴西§!社会的独有标识。当欧亚强权仍在践踏劣等民族、北美诸州固守隔离藩篱之时，§n巴西§!早已跨越§G种族§!鸿沟，乃至种族概念本身都已化作云烟。§G多元§!§D文化§!尽可在这片热土交融共生，共同铸就开明进步的时代精神。\n\n从联邦到地方，我们定要实现：任何族裔、任何信仰的公民，都能享有系统的§n葡§!语教育，自悠远历史中汲取精神养分；都能通过爱国团体，将对共和国的忠诚化作具体行动。\n\n§n巴西§!的民族品格，恰恰在于对邪恶的断然拒绝。§J法西斯§!幽灵注定无法在此徘徊，因为我们§n巴西§!子民心手相连。这面凝聚国民的旗帜引领我们不断前行，终将成为照亮世界的明灯。§!"
 BRA_lgbt_rights_lgbt_allowed_law: "£GFX_BRA_gay_rights_texticon  §R性§!§O少§!§Y数§!§G的§!§D除§!§i罪§!§p化§! £GFX_BRA_gay_rights_texticon"
 BRA_lgbt_rights_lgbt_allowed_law_desc: "§F我国§G性§!§D少§!§i数§!§p群体§!权利存在着巨大的漏洞，政治家们忙于应对整日扰动国家政治体系的军事政变，相比之下，他们认为这项政策无关紧要。1830年，§n巴西§!皇帝唐·佩德罗一世签署了新的帝国刑法典，删除了所有有关鸡奸的引述条文，且延续至今再未改变。\n\n然而，§j歧视§!依然广泛存在。在许多人看来，§G同性恋§!事实上依然是违法的，联邦医学委员会也将其视为一种精神疾病，警方会对任何违反社会规范的行为采取公开行动。§!"
 BRA_the_lott_act_law: "£GFX_BRA_constitutionalists_texticon  §n洛特法案§! £GFX_BRA_constitutionalists_texticon"
 BRA_the_lott_act_law_desc: "为遏制军方在§n巴西§!政坛根深蒂固的影响力，§Y洛特总统§!及其盟友全力推动£GFX_BRA_constitutionalists_texticon §n《洛特法案》§!，在§n巴西§!全军推动军官队伍改革，清除£GFX_BRA_hardliners_texticon §g强硬派§!将领，代之以效忠宪法的£GFX_BRA_constitutionalists_texticon §n护宪派§!，从人事层面阻断军队干政可能，保障民选政府权力平稳交接。"
 BRA_anti_jap_law: "[get_BRA_anti_jap_law]"
 BRA_anti_jap_law_desc: "[get_BRA_anti_jap_law_desc]"
 BRA_anti_jap_law_0: "£GFX_bra_hate_japanese_texticon  §Z日本移民禁令§!£GFX_bra_hate_japanese_texticon "
 BRA_anti_jap_law_0_desc: "§F本世纪初，£GFX_GNG_japanese_nation_texticon §j日本§!移民来到§K圣保罗§!拓荒务农，当局则以“抗拒同化”为由，禁止移民使用日语与日本传统习俗，更就其公民权利展开激烈辩论。\n\n二战爆发后，巴西政府以国家安全为由将大批日裔公民投入集中营。1946年，£GFX_BRA_psd_texticon §Y社民党要员小米格尔·科托§!（著名优生学家之子）推动修宪全面§R禁止§!§j日裔§!移民，虽然£BRA_udn_texticon §Q全民盟§!提出了象征性的反对，法案仍在战后反日情绪浪潮的推动下迅速通过。\n\n§j日裔§!§n巴西人§!社区日渐凋零，但仍有财力不足无力返乡和热爱这片土地的移民留驻于此。由于普遍存在的歧视和警察的骚扰，这些社区变得更加封闭。如今偶有针对£GFX_TNO_game_rule_flag_JAP §j日裔§!的极端言论，但这些威胁究竟确有其事，还是当局杯弓蛇影，犹未可知。§!"
 BRA_anti_jap_law_1: "£GFX_bra_hate_japanese_texticon  §R废除§!§Z日本移民禁令§!£GFX_bra_hate_japanese_texticon "
 BRA_anti_jap_law_1_desc: "这几十年，§n巴西§!的国际形象始终存在污点——二战结束后，出于对法西斯渗透的恐惧，我们全面禁止了§j日本§!移民。许多人搬出排外情绪为之辩护，但巴西已经认识到，这是一条漏洞百出、目光短浅且充满偏见的法律。尽管§j日本§!仍笼罩在法西斯阴云之中，但远渡海外寻求新生的异议人士与自由思想家亦不在少数。向这些他们敞开国门，既能开发庞大的潜在劳动力市场，亦可印证巴西超越种族界限的立国理念。"
 BRA_healthcare_bill_adhemar_law: "£BRA_psp_texticon §h医保法案§!£BRA_psp_texticon "
 BRA_healthcare_bill_adhemar_law_desc: "便捷的医疗服务是全体巴西人与生俱来的权利，却成了多年未竟的事业。阿德马尔·德·巴罗斯从医期间对此深有体会。如今社进党通过医保法案将普济众生的梦想变为现实。"
 BRA_presidential_legacy_fund_adhemar_law: "£BRA_adhemar_legacy_texticon  §Y总统遗产基金法案§! £BRA_adhemar_legacy_texticon"
 BRA_presidential_legacy_fund_adhemar_law_desc: "每位总统都会获得一笔可以按他们意愿使用的小额基金。阿德马尔将在圣保罗建立一座总统图书馆，促进教育发展，与他的医疗慈善事业相结合。"
 BRA_presidential_pension_and_pardon_law: "£BRA_adhemar_slush_fund_texticon  §G总统退休金及赦免法案§! £BRA_adhemar_slush_fund_texticon"
 BRA_presidential_pension_and_pardon_law_desc: "为所有卸任总统发放退休金和薪酬作为离职后的生活保障。总统在任期内的行为将在其任期结束时得到赦免。"
 BRA_national_school_expansion_law: "£BRA_psp_texticon  §h国家学校扩张计划§! £BRA_psp_texticon"
 BRA_national_school_expansion_law_desc: "虽然各州均兴办教育，但教育所普及的范围始终有限。这是阻碍巴西经济进一步增长的一个重要因素。该法案以总统的名义提出，旨在通过大规模投资确保所有儿童——无论城市农村——都能上学，并确保教育体现巴西的爱国价值观。"
 BRA_social_security_reform_act_law: "£BRA_psp_texticon  §h社会保障改革法案§! £BRA_psp_texticon"
 BRA_social_security_reform_act_law_desc: "该法案由罗梅乌·德·坎波斯·韦加尔提出，建立在儒塞利诺·库比契克在其总统任期内制定的社会保障法基础之上。社会保障体系存在很多漏洞，很多老人、残疾人和有工作但收入微薄的公民由此陷入贫困。法案将立即解决上述问题。"
 BRA_agrarian_reform_act_law: "£BRA_psp_texticon  §h农业改革法案§! £BRA_psp_texticon"
 BRA_agrarian_reform_act_law_desc: "该法案由菲林托·穆勒提出，被总统称为巴西历史上最令人瞩目且最重要的立法之一，它旨在解决大庄园制危机并重新分配农村土地。"
 BRA_national_standardization_of_wages_indexation_act_law: "£BRA_psp_texticon  §h国家工资指数标准化法案§! £BRA_psp_texticon"
 BRA_national_standardization_of_wages_indexation_act_law_desc: "巴西经济长期受通胀困扰，靠着近十来年的高速增长才稍显缓解。最近的局势变得微妙起来：政府稍有不慎，恐将引发十九世纪九十年代以来所未有的§R通胀螺旋§!。\n\n政府祭出《国家工资指数标准化法案》，冻结公共部门及国企薪资，以达成巴西利亚设定的调控目标。法案还授权政府强化全国工资指数化管理，力求维持金融稳定。\n\n法案遭到§V左§!§D右§!两派一致反对，有很大的可能在下次选举后遭到废止。但对执政的社进党而言，要稳住经济大盘就得付出代价。"
 BRA_labor_law_reform_act_law: "£BRA_psp_texticon  §h劳工法改革法案§! £BRA_psp_texticon"
 BRA_labor_law_reform_act_law_desc: "1970年的新晋政客妄图一笔勾销阿德马尔与§E社进党§!的政治遗产，着实是天真幼稚。新近通过的§O《劳工法改革法案》§!为上至高级公务员下至服务人员的劳动者群体提供法律保护，彻底禁止一拍脑门卷铺盖走人这种解雇行为。\n\n法案规定提高遣散费标准、增设审核程序，虽为后阿德马尔时代的政府赢得了劳工阶层的暂时支持，却也遭到舆论抨击：即便选举失利，§E社进党§!官员依然可以高枕无忧，或是在法案的保护下拿到一笔丰厚的经济补偿。不论如何，政坛新星劳多·纳特尔能否成为新一代的“§V穷人之父§!”，抑或巴西劳工终将被其弃如敝屣，尚有待观察。"
 BRA_pakt_embargo_law: "£GFX_GNG_Germany_texticon  §s解除对团结协定的禁运§! £GFX_GNG_Germany_texticon"
 BRA_pakt_embargo_law_desc: "该法案由马托格罗索州参议员菲林托·穆勒提出，呼吁结束对德国和团结协定其他成员国的贸易限制。虽然德占东部各专员辖区生产的商品仍然受到限制，但这项法案如果通过，巴西和德国将实现关系正常化。"
 BRA_german_brazilian_law: "£GFX_BRA_pnb_texticon §r德裔巴西人组织法§!£GFX_BRA_pnb_texticon "
 BRA_german_brazilian_law_desc: "自二战结束以来，巴西与德国的关系始终晦暗难明，战时反德情绪催生的立法一直影响着巴西庞大的德裔群体。二十多年的严格限制之后，《德裔巴西人组织法》将赋予所有德裔巴西人自主结社权，允许德裔社区自由集会而不会遭受政府打压。\n\n法案受到民权人士的赞扬，但也有人持保留态度。阿德马尔政府对德政策的批评者担忧解除限制将为纳粹思想在巴西传播打开大门，这些忧虑是否属实有待观察。"
 BRA_national_truth_commission_law: "£GFX_BRI_MSS_ci_texticon §Q国家§n真相§!委员会§!£BRA_udn_texticon"
 BRA_national_truth_commission_law_desc: "§Q国家真相委员会§!是独立设立的机构，旨在调查政府在§n新国家体制时期§!（自1930年旧共和国垮台至1949年§V瓦加斯§!辞任总统）犯下的罪行，为遭受国家暴力侵害的受害者提供补偿，并追究施害者的责任。\n\n对多数人而言，这是对独裁统治拨乱反正的良好开端。但£GFX_BRA_psd_texticon §Y社民党§!和£GFX_BRA_ptb_texticon §V工党§!认为真相委员会的所作所为不过是对§V瓦加斯政治遗产§!的政治清算，是在用秋后算账的手段破坏民主。£GFX_BRA_udn_texticon §Q全民盟§!则反驳称委员会仅有罪行调查与公示权，不具备司法公诉与监禁关押的职权。"
 BRA_ENAP_law: "£BRA_udn_texticon §Q国家公共管理学院§!£BRA_udn_texticon"
 BRA_ENAP_law_desc: "§Q国家公共管理学院§!是由§Q卡洛斯·拉塞尔达§!总统创立的§n联邦公共机构，隶属于巴西计划、预算与管理部§!，学院承担着提升政府效能的关键使命，专门培养§n治国理政§!的专业人才。\n\n即日起，想在§n巴西政府§!当官为人民服务，就得进§Q国家公共管理学院学习§!并通过考试。支持者普遍认为这是一举三得：既消灭了走后门的现象，又能提升政策制定水平，执行起来也不容易走样。"
 BRA_rio_cocapital_law: "§n£GFX_GNG_Brazil_texticon §n巴西利亚§! - §m里约§!双首都§!£GFX_GNG_Brazil_texticon"
 BRA_rio_cocapital_law_desc: "§m里约热内卢§!曾是§n巴西§!唯一的首都，后来前总统§Y库比契克§!建造的§n巴西利亚§!继承了首都地位。为解决首都更迭引发的争议，§Q卡洛斯·拉塞尔达§!总统决定执行“双首都制”，§n巴西利亚§!与§m里约热内卢§!同为§n巴西§!法定首都。\n\n实际运作中，§n巴西利亚§!仍为§n巴西§!政治行政中心，国会与政府都将驻留于此。§m里约热内卢§!则重获国家文化中心的地位，未来将承接部分政府部门。"
 BRA_state_of_siege_law: "£GFX_in_combat §Q戒严§!§Q状态§! £GFX_in_combat"
 BRA_state_of_siege_law_desc: "即使§V热图利奥·瓦加斯§!已经离世，但他的思想仍然困扰着§n巴西§!。§V瓦加斯主义§!的候选者们，如£GFX_BRA_ptb_texticon §V若昂·古拉特§!等，试图从£GFX_BRA_udn_texticon §Q卡洛斯·拉塞尔达§!手中窃取总统职位，以实施他们的险恶计划。如果§V瓦加斯主义者§!们得胜，§n巴西§!就将陷入停滞和腐败之中。\n\n现在，在军方的支持下，§Q拉塞尔达§!几乎完全控制了国家机器。有了这些政治工具，§Q拉塞尔达§!将一劳永逸地切除§V瓦加斯§!在巴西的毒瘤。历史将会铭记§Q卡洛斯·拉塞尔达§!§n是§n巴西§!最伟大的总统，而不是§V热图利奥·瓦加斯§!。"
 BRA_national_literacy_campaign_law: "£GFX_UKR_campaign_spivavtor_texticon §Q全国扫盲运动§!£GFX_UKR_campaign_spivavtor_texticon"
 BRA_national_literacy_campaign_law_desc: "§Q拉塞尔达§!总统亲自挂帅，由教师学者与公务员组成的扫盲大军向文盲宣战。这场§Q全国性的扫盲运动§!，既吸收了§e马克思主义§!教育家保罗·弗莱雷的思想理论，又借用了教会扫盲班的实践经验，核心就一句话：让每个§n巴西§!人不管男女老少都能读书写字。\n\n扫盲运动将为文盲群体提供识字课程，配置专项经费与师资力量，并为§n识字率§!提升设定阶段目标。虽说要花二三十年才能彻底解决问题，肯定远远超出§Q拉塞尔达§!的任期，但如今的政坛早已达成共识——不把文盲清理干净，§n巴西§!的进步便是天方夜谭。"
 BRA_UDN_moderate_healthcare_law: "£GFX_BRA_udn_texticon §Q全民盟温和§!§R医保法§!£GFX_Healthcare"
 BRA_UDN_moderate_healthcare_law_desc: "£GFX_Healthcare §R《平价医疗法案》§!经§Q卡洛斯·拉塞尔达§!总统签署生效，向§n巴西全体公民§!提供合理廉价的§R医疗保险§!。§R法案§!通过补贴贫困群体医疗支出、拨款扩建医院诊所及培养专业医护队伍，着力扩大医疗服务覆盖范围。\n\n尽管进步派批评者反对保险方案与补贴成本，主张建立类似贝弗里奇模式的全民医疗体系，但法案实施后医疗条件确实得到改善。得益于£GFX_Healthcare §R医疗法案§!的帮助，§n巴西§!国民生活质量和预期寿命都有所提升。"
 BRA_UDN_radical_healthcare_law: "£GFX_BRA_udn_texticon §Q全民盟§!§R激进医保法§!£GFX_Healthcare"
 BRA_UDN_radical_healthcare_law_desc: "£GFX_Healthcare §R《国民医疗法案》§!将健康称为“全体公民的权利与国家的义务”，建立起§n巴西政府§!出资管理的§R医疗体系§!。该系统覆盖范围广、运营成本高，但§R统一医疗体系§!显著提升了§n巴西国民§!健康水平。\n\n§R法案§!由£GFX_BRA_udn_texticon §Q全国民主联盟§!的§Q卡洛斯·拉塞尔达§!总统签署通过。拉塞尔达一向支持§D自由市场§!，且传闻他身边的幕僚也倾向间接支持而非直接管理，但这次他却大笔一挥通过了这部立场相对激进的§R法案§!。"
 BRA_america_arms_treaty_law: "£GFX_GNG_Brazil_texticon §n巴§!§i美§!£GFX_GNG_USA_texticon §f核武条约§!£GFX_txticon_trust"
 BRA_america_arms_treaty_law_desc: "经过一系列高度机密的双边谈判，£GFX_GNG_USA_texticon §i美§!§n巴§!£GFX_GNG_Brazil_texticon 两国达成协议，让这个新兴国家获得现代国家最有力的战略筹码——§e核武器§!。作为§n巴西§!深化与§M自由国家组织§!战略合作的交换条件，§i美国§!将派遣顶尖科学家与技术团队协助巴西的§e核武器研发计划§!。研发大规模杀伤性武器之后，肩上的担子也会更重，§i美国§!的信任进一步巩固了§n巴西§!作为§M自由国家组织§!核心成员的地位。"
 BRA_dismantled_labour_laws: "£GFX_BRA_udn_texticon §Q废除§!§R劳工§!§Q法§!£GFX_BRA_udn_texticon"
 BRA_dismantled_labour_laws_desc: "§Q拉塞尔达§!一直致力于彻底清算前朝§n新国家体制§!的残余，这次他终于取得重大突破。根据£GFX_BRA_udn_texticon §Q全民盟§!的治国方略，一系列新法即将颁布实施：§n巴西§!§V工会§!不再受到法律保护，§V罢工§!要符合法律法规与工会代表最低比例的要求；新法将为接下来打压§V工会§!保驾护航，§V最低工资§!调控机制也被大幅松绑。劳工领域的“去§V瓦加斯§!化”将带来投资红利，但受到冲击的£GFX_BRA_ptb_texticon §V工党§!与工会组织痛斥此举是对§n巴西§!§V劳工§!权益的公然践踏。"
 BRA_5th_republic: "£GFX_GNG_Brazil_texticon §K第五共和国宪法§!£GFX_BRA_mil_support"
 BRA_5th_republic_desc: "史册上刻下了又一位§n巴西§!§Q皇帝§!的名字——§Q卡洛斯·拉塞尔达§!。\n\n在£GFX_BRA_udn_texticon §Q全民盟和他的领导下§!，§n巴西§!步入了新时代，无论美好或苦难。不再有反对派聒噪，人民顺从驯服，§V瓦加斯§!的遗产每天都在土崩瓦解，§Q拉塞尔达§!以近乎无限的权力巩固着自己§n巴西§!伟人的历史地位。\n\n§Q拉塞尔达§!登临大位，军方则是他的幕府将军，掌握着§n巴西§!真正的权力。然而，军方正越来越四分五裂，许多人都对§n巴西§!的未来忧心忡忡。"
