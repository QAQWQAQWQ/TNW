 brazil.10.t: "巴西赢得世界杯！"
 brazil.10.desc: "“女士们先生们，我自豪地宣布——巴西赢得了世界杯！”围聚在收音机前的人群爆发出欢呼，这样的场景在全巴西重复了数百万次，几乎所有国民都在收听这场世界顶级赛事的终章。举国上下男女相拥，庆祝这场来之不易的胜利，守护了巴西足球的至高荣耀。酒吧挤满狂欢者，烟花照亮夜空，数十万瓶香槟砰然开启。九个月后，各地医院与产婆都将见证一场小型婴儿潮的诞生。\n\n赛前流言四起，说巴西队状态低迷，因1958年夺冠而骄兵必惰。这一传言在巴西队登场瞬间不攻自破，他们以3:1的绝对优势横扫智利队，再度捍卫了桑巴军团的世界霸主地位。胜利时刻，这个国家所有的纷争似乎都烟消云散。\n\n公路施工队的每个班组都围着收音机欢呼雀跃，军舰舱室回荡着呐喊，商界大亨举办奢华派对，就连总统府的高官们也破例放假庆贺。街头枪声此起彼伏，绽放的烟花十有八九来路不正。在这胜利的狂欢时刻，巴西团结一心，哪怕只是昙花一现。"
 brazil.10.a: "这一刻，巴西举国同庆。"
