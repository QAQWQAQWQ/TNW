 BRA_expand_the_franchise_goulart:0 "扩大投票权"
 BRA_expand_the_franchise_goulart_desc:0 "原则上，我们的民主体系允许每个巴西人投出神圣的一票来表达自己的想法。但实际上，那些被剥夺权利和被边缘化的群体，例如军人、老人和文盲，他们每天都在为选举权而斗争，他们和我们一样都是这个国家的主人。"
