 BRA_PRESIDENTIAL_LEGACY_FUND_ACT_Desc: "每位总统都会获得一笔可以按他们意愿使用的小额基金。阿德马尔将在圣保罗建立一座总统图书馆，促进教育发展，与他的医疗慈善事业相结合。"
 BRA_PRESIDENTIAL_PENSION_AND_PARDON_ACT: "§K总统退休金及赦免法案§!"
 BRA_PRESIDENTIAL_PENSION_AND_PARDON_ACT_Desc: "世间美好的事物终须落幕。尽管我执政期间多有建树，但无可辩驳的是，许多人已厌倦我对党派及巴西财政的长期掌控。鉴于我在全国范围内捐赠的庞大规模，下一届政府极可能对我发起诉讼。为此，我将推动一项法案，将这些支出合法化并赦免相关受赠者。\n\n国会参众两院对此法案反对声浪高涨，各反对党重量级人物正竭力阻挠其通过。情势已明朗——这项法案恐难逃夭折命运，公开支持者寥寥可数。所幸，我的任期尚未结束。只要针对性地打点几位关键人物，便足以唤醒那些摇摆者认清立场所在。"
