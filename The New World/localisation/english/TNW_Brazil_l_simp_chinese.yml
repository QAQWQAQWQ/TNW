 BRA_megaproject_alr_effect: "§K巴西政府§!将担负起土改重任，从根本上改变农村状况，通过从大地主手中夺取土地并将其重新分配给农村穷人来彻底终结§V大庄园制§!。"
 BRA_megaproject_alr: "土地再分配"
 BRA_megaproject_alr_desc: "在参议院通过土地改革只是第一步，也是比较容易的一步。现在，政府必须及时履行他们的承诺，对数百万英亩的农田进行重新分配，以免农村穷人起义罢工。"
