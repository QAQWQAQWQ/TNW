 BRA_military_frota_coup: "§R军方已经决定亲自动手……§!"
 BRA_military_reassure_brass: "安抚军方高层"
 BRA_military_reassure_brass_desc: "我们要花些时间与军方领导人谈谈，重申我们对解决巴西问题的承诺。"
 BRA_military_promote_loyal: "提拔忠诚军官"
 BRA_military_promote_loyal_desc: "通过秘密渠道，赤胆忠心的护宪派军官将得到奖赏。作为交换，他们要确保部队不会出现动摇政权的杂音。"
 BRA_military_oversight: "安排例行视察"
 BRA_military_oversight_desc: "下令将行政视察常态化，确保我军保持着充沛的战斗力。这会让我们有机会搞掉那些无能木讷的高层军官。"
 BRA_military_audit: "执行全面审计"
 BRA_military_audit_desc: "对军队账簿展开一次全面审计，能发掘出军中长期存在的任人唯亲的现象，但这种严格监督无疑会引起那些对我们政府心存戒心的军官的反感。"
 BRA_military_adhemar_pay_off_loyal: "贿赂忠诚军官"
 BRA_military_adhemar_pay_off_loyal_desc: "阿德马尔将通过特殊渠道向亲社进党军官提供资金。作为交换，他们要确保部队不会出现动摇政权的杂音。"
 BRA_military_adhemar_smuggle_out_some_stuff: "倒卖军用物资"
 BRA_military_adhemar_smuggle_out_some_stuff_desc: "阿德马尔打算把部队用不着的军火物资倒卖给外国买家，双方成交后他能拿到回扣。"
 BRA_hold_competency_test: "进行能力测试"
 BRA_hold_competency_test_desc: "南美冷战硝烟正浓，岂能容得下酒囊饭袋。那些占着位子不干事的军头们舒服日子过太久了。虽说裁汰冗员会得罪他们，但刮骨疗毒方能练出铁血强兵。"
 BRA_military_request_political_support: "寻求政治支持"
 BRA_military_scapegoat_quadros: "替罪羊夸德罗斯"
 BRA_military_lott_personal_inspection: "洛特亲自视察"
 BRA_military_impending_coup: "§R政变准备工作正在进行§!"
 BRA_military_impending_coup_desc: "我们收到线报称，一场旨在颠覆我国政府的政变正在酝酿，如果我们不能稳住政治局势，政变就会爆发。在为时已晚之前，我们必须确保他们的忠诚或者稳住政局。"
 BRA_military_impending_coup_2: "§R政变准备工作正在进行§!"
 BRA_military_impending_coup_2_desc: "尽管洛特许下承诺，但情况还是恶化了。政变计划正在重启，我们只能等待最坏的情况发生。"
 BRA_military_impending_coup_trigger: "巴西的§W稳定度§!或军方的§G忠诚度§!将提高"
 BRA_military_impending_coup_fail_effect: "军方将§R策划一场政变§!！"
 BRA_military_nation_chaos_action: "§Y将启用增强§!§g强硬派§!§Y影响力的决议§!"
 BRA_military_nation_chaos_action_2: "§Y将启用增强§!£BRA_sorbonne_texticon §Q索邦派§!§Y影响力的决议§!"
 BRA_military_dictatorship: "巴西处于§R军事独裁§!之下。"
 BRA_military_elections_happening: "正在举行§Y选举§!。"
 BRA_increase_loyalty_timer_effect_tt: "军方的§G忠诚度§!§G略微提高§!。"
 BRA_sorbonne_ally_politicians: "寻求政治盟友"
 BRA_sorbonne_ally_politicians_desc: "必须关掉参议院，一部分议员也这样认为。一些人已经公开站出来支持我们恢复巴西和平的行动，其他人肯定也会相信我们的选择是正确的。"
 BRA_sorbonne_replace_garrisons: "改组卫戍部队"
 BRA_sorbonne_replace_garrisons_desc: "许多强硬派都表现出强烈的个人野心，在他们身上看不见理念信仰。我们将改组关键的卫戍部队，以确保挫败这些出于私心的阴谋。"
 BRA_sorbonne_undermine_hardliners: "颠覆强硬派"
 BRA_sorbonne_undermine_hardliners_desc: "强硬派希望把巴西从混乱中拯救出来，他们已经达到了目的，现在他们却想更进一步，将巴西拖入暴政的深渊。我们之中的理智者都知晓真相：这些渴望权力的军官绝不是巴西的朋友，他们从不为巴西的最大利益行事。"
 BRA_hardliners_purge_sorbonne: "清洗索邦派"
 BRA_hardliners_purge_sorbonne_desc: "迄今为止，由于我们目标相似，我们一直在容忍温和的索邦派。但现在不同以往。这些蠢货想安排选举，图什么呢？巴西马上就会发现自己面临着和从前一样的问题，而这一次我们可能就没那么幸运了。我们必须把这些懦夫从军队的行列中清除出去。"
 BRA_hardliners_promote_hardliners: "提拔强硬派军官"
 BRA_hardliners_promote_hardliners_desc: "把志同道合的军官提拔到军队的各个关键位置，就能进一步巩固我们对军队的控制，扩大我们的影响力。"
 BRA_hardliners_crackdown_politics: "叫停政治会议"
 BRA_hardliners_crackdown_politics_desc: "某些未经批准的政治会议充斥着妄图把巴西推向绝狱深渊的蛊惑民心之人，将其统统禁绝，能给我们一些喘息的空间，同时还能打散敌人的组织。"
 BRA_increase_loyalty_timer: "巩固军方支持"
 BRA_increase_loyalty_timer_desc: "这场所谓的政变是巴西政客悍然无视军方警告的结果。既然我们已经纠正了巴西的方向，军方和政府间的信任正在重建。"
 BRA_arrest_dissidents_timer: "逮捕异议分子"
 BRA_arrest_dissidents_timer_desc: "军队的任务是恢复巴西的秩序……而清除孳生异见的肿瘤正是这职责的重要部分。"
 BRA_arrest_dissidents_timer_tt: "§V左派的支持率大跌§!"
 decision_cost_30_cp_25_pp: "£command_power §Y30§!£political_power_texticon §Y25§!"
 decision_cost_30_cp_25_pp_blocked: "£command_power §R30§! £political_power_texticon §R25§!"
 decision_cost_30_cp_50_pp: "£command_power §Y30§! £political_power_texticon §Y50§!"
 decision_cost_30_cp_50_pp_blocked: "£command_power §R30§! £political_power_texticon §R50§!"
 BRA_kubitschek_goals_plan_category: "第二发展计划"
 BRA_kubitschek_goals_plan_info: "§Y第二发展计划§!代表着库比契克为巴西制定的雄心勃勃的发展蓝图，志在延续并完成第一任期未竟的事业。\n\n每年年初，库比契克将亲自从政商两界选拔精英组建§Y发展委员会§!顾问团，为£BRA_JK_development_texticon §G发展§!、£BRA_JK_infrastructure_texticon §G基建§!、£BRA_JK_energy_texticon §G能源§!、§G£BRA_JK_education_texticon §G教育§!与£BRA_JK_healthcare_texticon §G医疗§!改革等核心领域制定年度发展目标与纲领路线。\n\n库比契克雷厉风行且意志坚定，他将凭借£BRA_JK_people_texticon §Y人民§!、£BRA_JK_business_texticon §Y商界§!与£BRA_JK_creditors_texticon §Y外国债权人§!的§Y乐观§!预期来实现他的改革愿景。设定高难度的年度目标有助于维系§Y乐观§!氛围，目标实现效果更加显著。但要是政府没能履行承诺，他所倚仗的§Y乐观§!情绪与民众共识便会日渐衰退。"
 BRA_gp_cd_nonaligned: "§g无所属§!"
