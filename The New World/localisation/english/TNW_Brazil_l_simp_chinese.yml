 brazil_jk.3.t: "A Message on the Radio"
 brazil_jk.3: "对保罗·瓦雷拉而言，在矿井里的日子总是那么漫长。他轻轻吻了一下妻子卡米拉，随后坐在椅子上，摘掉了帽子。保罗调高了电台的音量，微弱的电流声从中徐徐传出，盖过了妻子做饭时刀碗碰撞的嘈杂与两个孩子嬉戏打闹时的尖叫声。尔后，总统库比契克年度致辞的声音清晰地传入了保罗耳中。\n\n“……关于今年的进展，我们还有很多问题亟待商榷。”瓦雷拉一家对国家政治并无兴趣，他们住在马托格罗索的中央地带，远离巴西的政治中心，但保罗也没啥心情去换台了。“巴西是一个深富远见的国家，里约-圣保罗高铁的竣工就是最好例证，这是美洲大陆首条此类铁路。我们超额完成了指标，修建了1500公里的新公路，还有无数的桥梁和隧道，将全国连为一体。不过，我们也必须承认美中不足的地方。国会的僵局致使我们的教育改革计划陷入停滞，但我们将继续为之而战。”\n\n“能把那玩意儿关掉吗？这帮政客还有他们甩出的大话都是一路货色。”卡米拉插嘴道，但总统讲话仍在继续。“我们的发展计划也出现了一些不尽人意的结果。全国上下必须勠力同心，共克时艰。我们的政府部门也在不懈努力，力争未来几年取得更大的成果。”\n\n保罗叹了口气，勉强地关掉了电台。这些高高在上的人自然有崇高伟大的理想。"
 brazil_jk.3.a: "但保罗现在只想吃晚饭。"
 BRA_gp_speech_pn: "巴西是一个意识超前的国度，而全美洲铁路的典范，里约-圣保罗高铁的建成，就是最好的例证。"
