 brazil.70.t: "托斯卡诺在巡逻"
 brazil.70.desc: "阿诺尔多·托斯卡诺上将端坐在塔曼达雷上将号巡洋舰的舰长室里，等待关于冲突的最新报告。期间，积郁已久的愤懑在胸腔翻涌。十多年来，德国人不断羞辱巴西，频繁越界进入巴西水域捕捞，践踏国家主权。这些德国渔夫变本加厉的掠夺行径与殖民压迫，正将越来越多走投无路的人逼上为匪之路。托斯卡诺正为此叹息时，通讯器突然响起。\n\n“长官，各舰按计划完成汇报。十二艘海盗船已被彻底摧毁，三艘遭俘获，七艘逃离巴西海域。我方零伤亡。”年轻的通讯官以砂砾般粗砺的声线汇报，每个字都带着铁铸般的笃定。\n\n“收到，令各舰归建特遣舰队。”托斯卡诺迅速回应，一周来首次露出笑意。自洛特总统为他增派兵力后，这支特遣舰队已能有效遏制海盗侵扰与德国渔船的越界行为。望着舷窗外渐次归队的钢铁巨兽，托斯卡诺坚信，这场龙虾战争终将画上句点。"
 brazil.70.a: "无论如何，我们都要把德国人赶回老巢。"
 brazil.71.t: "一网打尽"
 brazil.71.desc: "“操！快收网！”甲板上传来大副的嘶吼，夸梅连滚带爬冲上船舱。他瞬间明白了恐慌的源头——一架巴西战机正在扫射左舷方向的姊妹船。那是艘比他们更小的捕虾船，但即便如此，在这片海域每周也能靠无人看管的珍贵龙虾赚取数千马克，堪称暴利。看着弹雨将小船撕成碎片，夸梅终于相信关于巴西采取行动的传闻并非空穴来风。\n\n“直接割网！发动引擎！”夸梅冲向舵轮猛打方向盘调转船头180度，祈祷战机忙着攻击船队其他目标。咸涩海风灌进领口，他忽然意识到这行当或许干到头了——如果今天能活下来的话。\n\n在他们疯狂逃窜时，战机已将首个目标彻底击沉。飞行员扫视着四散奔逃的船队：小渔船、中型拖网船、甚至混着几艘货轮，有艘脱离海盗船队的大型货轮引起了他的注意。\n\n正当他准备将夸梅的船连人带货送入海底时，突然发现老旧船群中竟藏着一艘现代化快艇。瞄准镜锁定目标的瞬间，飞行员咧嘴大笑。今晚的猎杀名单要更新了。"
 brazil.71.a: "那群狗纳粹在甲板上画了个鲜红的万字符。"
 brazil.72.t: "利比里亚协议"
 brazil.72.desc: "瓦尔特·萨莱斯站起身来，和他对面的男子握了手。“那么，我相信我们达成协议了！我们会提供给你们用于保护你们领海的船只和枪支，作为交换，你们得将对于领海的保护延伸到展开反海盗行动中。谢谢您抽出时间，格兰姆斯先生。”利比里亚的外交部长也热情地回应了握手，很快萨莱斯就回到了返回巴西的路上。毫无疑问，在非洲边缘不断往返的航班很累人，但得到非洲各国政府在反海盗方面的合作几乎是无价的。\n\n有了各国的支持，巴西领海出现的海盗就少了许多。萨莱斯不禁怀疑其实就是有那么一部分海盗出自那些贫穷的非洲国家，但这并不重要。在源头遏制他们，比在大海上到处追着海盗的小艇要方便多了。"
 brazil.72.a: "萨莱斯试图无视发动机的嗡嗡声，睡上一会儿。"
 brazil.73.t: "说时容易做时难"
 brazil.73.desc: "瓦尔特·萨莱斯躺在办公室的地板上，一脸茫然地盯着天花板上的图案。有一会儿，他在房间里踱来踱去，瘫坐在椅子上，旋转自己的椅子，甚至试着跳了一两分钟波比跳。但都毫无效果。事实就是如此残酷、毫不夸张，萨莱斯完全不知道如何轻松地联系到一群在非洲占山为王的法国疯子。\n\n所以，他躺在地板上。虽然有点幼稚，但萨莱斯总觉得这能帮助他思考。通常是这样的，但现在这对他毫无用处。这里可没有什么自由法国大使馆，连个该死的电话号码都没有，至于寄信就更别提了，地址填哪儿？他不能就这样不请自来，他需要在飞过去之前联系一下对方。几乎没有什么能做的。萨莱斯不得不召集海军，要求他们派一些可怜的混蛋（或者一支舰队的倒霉蛋）穿越数千公里的海洋，向戴高乐递交请求。天啊，这一切都是如此的尴尬。"
 brazil.73.a: "“对，我是萨莱斯，可以帮我接下托斯卡诺吗？”"
 brazil.74.t: "巴西利亚希望接触"
 brazil.74.desc: "占位文本。巴西外交部长想要跟蛋糕乐谈谈龙虾战争的事儿。"
 brazil.74.a: "不，他们干啥跟咱们没关系。"
 brazil.74.b: "我们热烈欢迎这位贵客！"
 brazil.75.t: "飞抵阿比让"
 brazil.75.desc: "瓦尔特·萨莱斯从小型飞机的舷窗俯瞰象牙海岸地貌时，再次怀疑这些法国流亡者能否兑现任何协议。这片“国土”充满吊诡：下方土著居民采摘可可豆、挤满市集广场的日常图景，与飘扬其上的破旧三色旗构成超现实拼贴，宛若垂死帝国的最后痉挛。\n\n但当萨莱斯踏上跑道时，映入眼帘的却是另一番景象。军容严整的兵团布满保养完美的混凝土停机坪，坦克方阵后方隐约可见高射炮阵列。骄傲的法兰西陆军残部筑起铜墙铁壁，俨然为光复故土做足准备。戴高乐专注复国的传闻，似乎确非虚言。正思忖间——\n\n“欢迎来到法兰西！”身着缀满勋章的旧式军装的老者立于军阵前，不合时宜的骄傲溢于言表。他近乎小跑着逼近，握手力度大得令人生疼。“听说巴西愿襄助我们伟大的复国事业！快请，有太多事情要商量！”"
 brazil.75.a: "戴高乐拖着萨莱斯一溜烟地消失了。"
 brazil.76.t: "谈判开始"
 brazil.76.desc: "占位文本。萨莱斯和戴高乐谈论如何撵走海盗，戴高乐要求坦克与枪支balabala……"
 brazil.76.a: "卒子开始移动。"
 brazil.77.t: "戴高乐的要求"
 brazil.77.desc: "瓦尔特·萨莱斯在戴高乐第无数次炫耀战功时挤出尴尬微笑——这位流亡将军竟声称昨日刚策划刺杀某位德国高官！随着陈年葡萄酒不断见底，这场“会谈”已持续数小时。萨莱斯隐约觉得，对方似乎鲜少接待外宾。\n\n“哈……确实精彩，戴高乐先生。虽然很想继续聆听，但我另有公务在身。直说吧，您要什么条件才愿介入我国的龙虾战争？”戴高乐瞬间清醒，双手撑桌投来鹰隼般的凝视。萨莱斯不由后仰——这老家伙或许深藏不露。\n\n将军从巨型办公桌抽屉抽出一页文件推过来：“这是法兰西的要求。我们固然乐见剿灭海盗与德国杂种，但光复祖国需要……装备。”他指尖敲击清单，“枪炮，萨莱斯先生，成千上万的枪炮坦克。”萨莱斯双眼瞪大：这份精确到个位数的军火清单堪称天文数字。接受交易无异于豪赌——法军残部确能直捣海盗巢穴，但代价是否太过昂贵？"
 brazil.77.a: "“合作愉快，戴高乐先生。就这么定了。”"
 brazil.77.b: "“这些要求太荒谬了。这可不成，戴高乐先生。”"
 brazil.78.t: "跨越大西洋的协议"
 brazil.78.desc: "萨莱斯又看了一眼戴高乐给他的武器清单，微微一笑。飞机正在返回巴西的途中，虽然他肯定不会想念非洲的那块弹丸之地，但他发现自己深情地思念着那里的人们。都是些好汉呐，就是想法太疯狂了。尽管如此，萨莱斯还是忍不住希望他们能够成功。尽管那压根不可能。\n\n戴高乐要求枪支和坦克的运输必须在严密的戒备下进行。这批货物的庞大规模无疑会引起国际社会的注意，但萨莱斯怀疑这就是戴高乐要求大张旗鼓的原因之一。这项协议意味着，自由法国得到了世界上最大的国家之一的承认。希望戴高乐能好好利用这一点。"
 brazil.78.a: "法国的残余势力会在一段时间内得到承认。"
 brazil.79.t: "跨越大西洋的泄气"
 brazil.79.desc: "萨莱斯一点都不希望向洛特绘声绘色地报告自己是如何搞砸的。飞机还在大西洋上空飞着，萨莱斯就已经开始设想如何把自己浪费了大把时间的既成事实粉饰一番。这次外交失败导致他们去见戴高乐用掉的几个月时间完全打了水漂，这样的时间投资很难腾出资源来恢复。但是，戴高乐的要求实在是太不合理。巴西会自行处理海盗，一如既往。\n\n不过，尽管这么说，他还是承认那些法国人都是些好汉。就是想法太疯狂了。尽管他们的目标显然不可能实现，但萨莱斯还是禁不住地敬佩他们。说实在的，他恨不得干脆把枪给他们得了。也许，只是也许，他们也许能得到一个机会。"
 brazil.79.a: "法国的残余势力估计得不到承认了，至少在巴西这里是这样。"
 brazil.80.t: "预料之中的来访"
 brazil.80.desc: "总统办公室里的午后从来就没平静过。恩里克·特谢拉·洛特总统正在处理一些紧急文件，希望早点把中断的工作做完，这样晚上他就有空闲时间了。\n\n可惜今天运气不佳，门外竟传来了敲门声。\n\n“请进，是副总统吗？”洛特问道，头还埋在文件堆里。\n\n“恩里克，关于你下达给海军的命令，我希望你赶紧把它收回来。我一直在物色去往非洲的使者人选，我觉得我们可以就这个问题与那边商谈合作。特别是去……”\n\n“不必了。”\n\n夸德罗斯话还没说完，就被洛特生生压了回去。总统对着他摇了摇头。“抱歉了雅尼奥，我不打算撤销命令。消灭海盗是我最后的决定。”\n\n洛特顾及总统的声誉，一旦下达决定就不会再做任何更改。他的副总统今天碰巧就遇上了这样的场面。总统并不打算在解释这个问题上浪费口水。夸德罗斯动了动嘴唇，刚想说些什么，但却什么也说不出来。接着，这位副总统彻底闭上了嘴。就这样站在总统办公室里，而且还浪费了洛特宝贵的空闲时间。空闲时间是用来治理国家，而不是用来想出一些轻率而不切实际的葡萄牙热带主义计划。\n\n“好吧，恩里克。”这回该轮到洛特大吃一惊了。副总统的拳头无力地挥舞着。看他的表情便可知道心中有多沮丧、多愤怒。夸德罗斯虽是个感情丰富的人，但也不太会在自己的政治对手面前失态，更不大可能会如此直白地表达自己内心的愤怒。可洛特还是觉得自己的计划并没有什么不妥之处。\n\n直到夸德罗斯最后的脚步声远去几分钟后，洛特才恢复平静。"
 brazil.80.a: "他会克服的。"
 brazil.81.t: "托斯卡诺的收尾工作"
 brazil.81.desc: "“喂？这里是前往海岸的巴罗佐上将号。你听得见吗？”\n\n“是的，我们收到了，巴罗佐上将号。”\n\n“托斯卡诺上将下一步的行动是联系洛特总统。能帮我们接通电话吗？”\n\n“好的，我们现在就给你接通总统的电话。”\n\n无线电线路连接到洛特，传出了一些静电和咔嗒声。“喂？我听说托斯卡诺上将有话要和我说。”\n\n“是的，先生。他就在这里。”\n\n舰艇线路上传来一阵调整座位的声音。托斯卡诺上将接通了电话，开始和洛特说话。\n\n“洛特总统，我们已经来到了海盗活动的主要区域。我和一些指挥官制定了一些计划，在我们开始行动之前，我想和您一起研究一下其中的一些计划。”\n\n“好，你有哪些方案，上将。”\n\n“第一个计划是完全不间断地搜索海盗。没有任何的休息。士兵们不会喜欢这个方案，但有几个军官建议这样做。海盗是一群游兵散勇，如果想抓住他们，我们需要覆盖很多地方。”\n\n“第二个计划是让空军一同参与。派出几艘航空母舰和几架侦察机。空海协同进行搜查。虽然这可能会使整个行动更加混乱，但也意味着更高效的搜索，同时使人们免于长时间工作。”\n\n“第三个计划是最简单的一个。就按正常的时间进行正常的搜索。继续像我们平时那样进行扫荡。没有什么疯狂之处或压力，但它可能是各种方案中效果最差的一个。先生，您的命令是？”\n\n洛特龇牙咧嘴。如果他们想阻止这些海盗对渔民进行袭击，他们就必须迅速行动。但他们不希望行动失败。深思熟虑后，他下达了命令。"
 brazil.81.a: "“我们得迅速行动，采取第一个计划吧。”"
 brazil.81.b: "“我去联络一下空军，就采用第二个计划。”"
 brazil.81.c: "“就按往常的方法来办，第三个计划是个安全的选择。”"
 brazil.82.t: "水手们的请求"
 brazil.82.desc: "烈日照入舰桥中。汗流浃背的水兵们干着艰苦的工作。他们的皮肤被盐水浸透了，已经好几天没有休息了，短暂的睡眠和用餐时间是他们唯一能够休息的时候。\n\n站在旗舰的舰桥上，托斯卡诺上将继续用他的双筒望远镜向海上望去。他的眼睛因为连续几天盯着大海而感到紧张。船只们没有看到任何海盗的迹象。仿佛海盗已经从地球上消失了一样。\n\n“长官！”托斯卡诺的大副说，“一些水兵要求立即与您会面！他们威胁说要罢工！”\n\n“让他们上来！”他命令道。\n\n托斯卡诺上将坐了下来。他揉了揉自己紧张的眼睛。他一直在担心这样的事情发生。不间断进行工作是一个非常不受欢迎的决定。\n\n海军上将抬起头来，这时两个看起来疲惫不堪的水兵走进了房间。\n\n水兵们向前走去。\n\n“长官，这几天我们都快把自己累死了。这个计划真是要了我们的命了。”\n\n“我不能擅自更改计划，”托斯卡诺说。“这些命令是高层下达的。我们的命令是尽可能快地抓住这些海盗。抱歉，这就是我们行动的方针。”\n\n托斯卡诺揉了揉他的额头。他不知道该怎么做。\n\n在这段时间里，一位一直默默听着的水兵开口了。\n\n“加薪怎么样？这才能让这项工作有点意义。”\n\n托斯卡诺想了想。这将是解决问题的一个有效办法。但这需要一堆乱七八糟的法律文件。而且他的一些上司也不会高兴。他必须用无线电通知洛特帮他解决这个问题。他看着那些邋遢的水兵，默默地站着，在脑子里思考着这个选择。"
 brazil.82.a: "“那就加薪吧。”"
 brazil.82.b: "“对不起，先生们，我可不能给你们打包票。”"
 brazil.83.t: "滔天巨浪"
 brazil.83.desc: "拒绝提高水兵的工资是压倒骆驼的最后一根稻草。一些水兵已经宣布罢工，直到涨工资为止。对海盗的搜索工作不得不立即停止。托斯卡诺上将目前正夜以继日地工作，以确保局势不会升级为一场全面的兵变。海军中的气氛从未如此紧张，一些军官要求立即将水兵们送上军事法庭。一些更极端的人甚至呼吁以叛国罪将他们枪毙。\n\n雪上加霜的是，媒体已经发现了这次罢工。没人知道消息是怎么泄露出去的，但他们还是抓住了这一情况。报纸上充斥像《公海上的骚乱？》和《现代的赏金猎人？》这样的标题。巴西公众对任务的现状越来越感到不安。托斯卡诺上将也被拖下了水。整个情况对洛特政府来说是一团糟。\n\n这个海盗问题对洛特来说已经成了一个彻头彻尾的烂摊子。需要采取果断的行动。\n\n尽管有来自党内的一些抗议，洛特还是决定承担全部责任。他给媒体发了几份声明，说托斯卡诺上将完全没有任何责任，是洛特下令执行的无休计划，水手们的低工资问题也将得到解决。\n\n洛特已经签署了几项命令来支付海军水兵们的工资。他希望这让他们快点复工。同时，他也已经给托斯卡诺上将发了一条信息，说自己已经答应了水手们的要求，希望在可能的情况下立即恢复对海盗的打击。\n\n海盗们仍然逍遥法外，在海洋中徘徊，寻找下一个目标。而水兵们需要尽快复工。"
 brazil.83.a: "一定要阻止肆虐的海盗。"
 brazil.84.t: "南大西洋归于平静"
 brazil.84.desc: "威胁已经解除！海盗船被击沉，他们的计划被挫败。其他没有被抓或被杀的海盗，也纷纷逃离大西洋。巴西的龙虾渔民不用再对劫掠担惊受怕。巴西政府已经摧毁了海盗据点，将他们的船只沉入海底。\n\n托斯卡诺上将因其消灭龙虾海盗有功而获得了一枚勋章，还有一个应得的假期。虽说他很高兴自己履行了职责，但在海上度过漫长的日子也令他感到疲惫。\n\n当然，这对洛特的政府来说是一件丰功伟绩。媒体对他们所做的出色工作赞不绝口。甚至连洛特的一些敌人也承认，他对这种情况处理得很好。洛特十分满意这次行动的结果。\n\n渔民们也很感激，他们举行了盛大的集会来表达对洛特的支持，感谢总统对他们的帮助。铲除海盗后，洛特的声望在全国范围内都得到了提升。巴西人纷纷开始庆祝政府对这些巴西害虫取得的伟大胜利。\n\n在庆祝活动继续进行的同时，这片风暴已经远离了大西洋，这片古老的水域也变得风平浪静。\n\n终于，南大西洋重归安宁。"
 brazil.84.a: "愿大西洋和平永驻。"
 brazil.85.t: "无垠之海"
 brazil.85.desc: "旗舰随着波浪来回摇晃，舰队的其他成员紧随其后，四处皆是一望无际的海洋。\n\n托斯卡诺上将在旗舰的舰桥上凝视着大海。他转向在他旁边工作着的无线电报务员。\n\n“有海盗的迹象吗？”\n\n“我们没有看到他们的踪迹，长官。”\n\n海军上将叹了口气。自从海军特遣部队离港后，海盗们就一直躲着他们。他们躲躲藏藏，在浩瀚的海洋躲避巴西海军大概没什么问题。而这样的日子多持续一天，渔民们的收获就要多被窃取一天。\n\n他坐了下来，揉了揉自己的眼睛，刚才他一直注视着海浪，现在得缓解一下内心的紧张。\n\n他要处理的另一个问题是水兵们。看不到尽头的持续搜索让人士气低落，一种普遍的失败情绪开始在水兵中蔓延。托斯卡诺一直在鼓舞人心，但这位海军上将知道这不是长久之计。他们迟早会因为过于疲惫而无法继续进行搜索。不能再这样下去了。\n\n是该重新斟酌计划了。他们不能让这些人继续没日没夜地工作。也许他们可以把空军叫来。虽然他们可能得以某种方式补偿空军，但空军的帮助将大大增加他们找到海盗的几率。\n\n海军上将揉完眼睛，再次抬头。在他眼前的仍然是一望无际的海洋，水域中也没有任何干扰。而且他仍然没有看到海盗的任何迹象。当无线电报务员继续监测其他船只的情况时，海军上将下定决心站了起来。"
 brazil.85.a: "“给洛特打电话。我们需要一些援军帮忙找海盗。”"
 brazil.85.b: "他叹了口气，举起双筒望远镜，继续看向窗外。"
 brazil.86.t: "来自空军的请求"
 brazil.86.desc: "洛特把电话贴在耳朵上，眼睛都瞪大了。”所以你们还想要更多的预算？”\n\n电话另一端的声音突然洪亮了起来。”是的，总统先生，我们就是这个意思。飞行员们要烧不少燃料，我们的财政根本吃不消，这也就是为什么我们需要很多钱。”\n\n“这次的预算总该让你们有钱买更多的燃料吧？”\n\n“怎么会，总统先生，我们还得出修理费的钱。我们总得让这些飞机保持运作吧。”\n\n洛特畏惧了。修理？为啥被德佬的小烧火棍射了几发子弹就要修啊，简直是糟蹋预算。洛特的脑子里立马出现了三种选择：同意他们的要求，给他们更好的武器，要么就回绝他们的要求。对洛特来说，他倾向于后者。他恨不得对电话线另一端的穷鬼破口大骂，当他们饱受枪弹蹂躏的同胞活活淹死时，这帮人却还想着要钱，但拒绝他们只会让更多的人受苦受难……"
 brazil.86.a: "“我们的船舰需要帮助。就这样吧。”"
 brazil.86.b: "“你怎敢跟你的首长讨价还价。去支援海军，他们要是找上门来我可不帮你们。”"
 brazil.86.c: "“你们总是会变着法子哭穷，反正燃料都会从你们自己的仓库里变出来。我拒绝这个条件。”"
 brazil.87.t: "海鸥"
 brazil.87.desc: "一艘航空母舰已经被部署至该地区，一队海上侦察机和海军轰炸机也正在尽快完成飞行准备。\n\n随着这些飞机投入使用，搜索海盗的进度预计会大幅加快。如有必要，这些飞机将对整片海洋进行地毯式搜索。\n\n洛特费了九牛二虎之力，通过了一堆乱七八糟的官僚机构才与空军的将军们取得了联系。这个问题迟早需要解决。但这是以后的事了。\n\n浮现出的另一个问题是，将军们想为他们对搜索提供的帮助索取些“补偿”。洛特被迫为空军提供了更多的预算。他真希望自己不用越过这些障碍就能让空军服从。\n\n但现在，总统还是不得不采取一些不光彩的措施才能保证他们的支持，所幸的是空军已经加入了任务。虽然花费了大笔资金，现在也能更顺利地展开行动了。\n\n因此，当军官们在办公室制定计划时，发动机已经开始预热，轮子也在停机坪上刮擦。油箱内加满了燃料，轰炸机舱装满了炸弹。一场对全海域的搜索正在准备之中。\n\n巴西的空军已经整装待发，它将在天空中展开搜索，直到最后一艘海盗船葬身大海。"
 brazil.87.a: "翱翔于大洋之上，骄傲的海鸥主宰一切。"
 brazil.88.t: "视距之外"
 brazil.88.desc: "地平线上浮现出一个肉眼几乎看不到的小点。一个在炮台下站岗的水兵发现了它，并立马向他的上司发出了警报。当这个消息正层层上报时，舰队也开始调转方向，向这个小点移动。\n\n托斯卡诺上将站在舰桥上，用他的望远镜向远处望去。那是一个舰群。\n\n“是他们。”他屏住呼吸说道。\n\n他打开了船上的对讲机：“战斗岗位！发现海盗船！”\n\n他转向舰桥上的船员。“我希望以15节的速度进行追击。呼叫所有其他船只照做。进入射程后就准备开火。”\n\n他冲到无线电报务员身边。“我需要你给我接通洛特总统的电话。告诉他们事态紧急。”\n\n他向下看了看船的甲板。人们正争先恐后地奔向自己的岗位，奔向炮台和炮位。一种紧张的能量吞噬了船员。经过几周的搜寻，他们终于找到了。\n\n“我们接通了总统，长官！”无线电报务员说。\n\n托斯卡诺一把抓住了话筒。“你能听见吗，先生？”\n\n“托斯卡诺？”洛特在电话的另一端说。“我能听见。发生什么事了吗？现在是巴西利亚的清晨。而且——”背景中传来一些杂音。“雅尼奥也在这里。”\n\n“我们已经发现了海盗，正在准备进行拦截，我们已经离开海岸。我在想，我们是否可以跟在他们后面进行追击，等待增援。以防出现太多的海盗。”\n\n“嗯，这很好——什么？夸德罗斯想说点什么，请稍等。”话筒另一边传来了一阵低沉的声音。\n\n夸德罗斯插话说：“你不能再等了，上将！如果海盗跑了怎么办？我坚决反对这个决定，我们不能让海盗们从我们眼皮底下再次溜走。”\n\n电话的另一边传来一些低沉的声音。这两个人似乎还在争吵。几分钟过去了，最后洛特重新接起了电话。"
 brazil.88.a: "“立即行动，绝不能让他们逃了。”"
 brazil.88.b: "“跟着他们，等待增援。”"
 brazil.88.c: "“呼叫空军，我们需要他们的帮助。”"
 brazil.89.t: "惊涛骇浪"
 brazil.89.desc: "又一个海盗被吊出水面。子弹撕裂了他的胳膊，软弱无力地向下垂着，鲜血淋漓。海盗被吊上甲板，呜咽几声之后，便瘫倒在地。一名巴西海军军官用手枪指着他，同时命令一些水手上前检查他是否携带武器。\n\n船只继续在发生战斗的海域继续搜寻。舰桥上，一名男子俯视着下面的一切。他们从水里救了很多海盗，数量很多，比预期的要多。费了很大的劲才打败了海盗。他叹了口气，回头望着大海。他看着剩下的海盗船沉入晦暗的海底。大西洋的海水吞噬了一切。\n\n舰队也遭受了相当大的损失。他们将立即前往最近的港口进行维修和医疗转运。\n\n伤亡人数相对较低，但托斯卡诺仍不满意，生命的逝去令他百感交集。他走到电台接线员面前，向总统报告战斗情况。至少海盗不再是问题了。"
 brazil.89.a: "巴西的完全胜利。"
 brazil.90.t: "乘风破浪"
 brazil.90.desc: "尽管有人担心等待援军会让海盗们趁机溜掉，但事实证明这些担心并未如实发生。海盗团伙被打了个措手不及，根本没有做好逃跑的准备。援军一来，海盗直接就被一网打尽了。\n\n托斯卡诺上将站在舰桥上俯视着战场：辽阔的海面上只剩下了许多旋转的碎片和一些漂浮的尸体。海盗已被全歼。舰队现在正在休整，准备回港。\n\n托斯卡诺终于如释重负。经过几天的搜寻，他终于打败了海盗。真乃易如反掌。他转身对舰桥上的大副说道：“告诉其他船只，准备回港。我们要回家了。”\n\n当他慢慢地走到无线电报务员那里向洛特报告时，他忍不住露出一个微笑。这段漫长的旅程终于要结束了。海盗们被打败了，形势终于开始好转了。"
 brazil.90.a: "公海重获安宁。"
 brazil.91.t: "利比里亚的胜利"
 brazil.91.desc: "洛特打开托斯卡诺上将给他的报告。来自利比里亚及附近海岸线的海盗数量大幅减少。利比里亚政府近日对海盗展开军事行动，在行动中派上用场的则是先前协议中商定好的巴西军事装备。\n\n托斯卡诺报告说，入侵巴西水域的海盗数量大幅下降，他打击海盗的信心和能力都大为增长。\n\n洛特笑了笑，喝了些咖啡。利比里亚人信守承诺，巴西则受益匪浅。一连数日追捕海盗这类苦差事都交由利比里亚人完成了。很快，渔民们就无需担心遭受袭击、可以自由自在地捕鱼了，日本游客绑架危机也不会重演。这一次，笔确实比剑要更加有力。"
 brazil.91.a: "夸德罗斯的主意也不全都那么离谱。"
 brazil.92.t: "法国来报"
 brazil.92.desc: "透过办公室明亮的玻璃窗，洛特总统凝视着巴西利亚。他注视着在城市里走动的人们；空气凉爽，万里无云。他呷了口水，等着外交部长瓦尔特·萨莱斯到来。\n\n萨莱斯准时走进房间，“总统先生，自由法国发来喜讯，他们成功了。”\n\n“很好，他们都说了什么？”洛特立即问道，并转身坐在了办公椅上。\n\n“自由法国在报告中提及他们在对付藏匿在自己领土内的海盗时取得了诸多大捷，甚至打败了其他国家领土上的海盗军阀。”萨莱斯咳嗽着继续说道，“我有一份来自托斯卡诺的报告能支持他们的说法：海盗袭击事件急剧减少。有了自由法国的支持，与海盗之间的龙虾战争很快就会结束。”\n\n洛特靠在椅子上，笑道：“这是民主的又一次胜利。”"
 brazil.92.a: "一分价钱一分货，自由法国说到做到。"
 brazil.100.t: "巴西利亚陷入瘫痪"
 brazil.100.desc: "巴西日益寒冷。立法机关怒火高涨，巴西人民挤在电视机和收音机前，忧虑着国家的形势。恐惧气氛再一次降临全国，交重层叠的飓风将人民的希望洗刷得一干二净。寒流突如其来，风暴若隐若现，所有人都看不清那即将扑面而来的未来。\n\n巴西利亚，好戏正在上演。此刻，正大出风头的是社民党的库比契克。既然古拉特无法取代夸德罗斯和洛特成为总统，前总统儒塞利诺·库比契克的支持者认为，只有他有能力在军队的期限内登上总统宝座。库比契克在自由主义的中派和左派分子中都很受欢迎，人们认为他具有克服军队对他的仇恨所必需的丰厚威望。\n\n这场危机不仅再度把总统从政坛边缘拉到热点中心，同时还让过去十年间遭受惨败的右翼势力重回巴西舞台，进入人们的视野。毕竟，在这动荡的年代，还有什么比一个保守持重、代表人民的政府，更能缓解军队的恐惧呢？在夸德罗斯陨落之后，严苛的拉塞尔达再度控制了全民盟，可能有助于他实现自己的抱负。不过，右翼并非只有拉塞尔达一位阴谋家。阿德马尔·德·巴罗斯也在散发着耀眼的光芒，这对搭档虽说貌合神离，但为面对诡谲莫测的政坛风暴，他们携手并肩，试图阻止库比契克的脚步。\n\n万里之外，这场风暴的始作俑者——若昂·古拉特正安居南里奥格兰德州，与首都的种种阴谋相互隔绝。古拉特的影响力依然很大，他也未受上任政府后期社民党-全民盟联盟垮台丑闻的影响。在巴西国内，有一些人希望古拉特能及时返回巴西利亚，打破国会的僵局，但其他人则对“山中之王”空降首都救民于水火的故事嗤之以鼻。寒风凛冽，风暴之后，想必只会留下断壁残垣。"
 brazil.100.a: "在您羽翼之下，我将寻求庇护。"
 brazil.101.t: "乌鸦与公牛"
 brazil.101.desc: "阿德马尔信步走进办公室，无视背后雇员们发出的小声抗议。他看到拉塞尔达正坐在他的办公桌前，凝视着远方。两部电话被信手搁在办公桌边成堆的文件上，几乎要掉下去。做事一向一板一眼的拉塞尔达居然把办公室弄得这么乱，真是少见，这日子实在是太不寻常。某股狂躁的能量让全民盟的灰乌鸦等待着电话的到来，也使得阿德马尔打破惯例，不如往常一样经过幕后渠道，而是直接与拉塞尔达私下会面。\n\n拉塞尔达慢慢转过身来，看着来人。愤怒和好奇在他的眼中交替闪烁着。也许后者在这位政客的心中赢得了胜利，他把头转向一把空椅子。\n\n“你来这里干什么？”拉塞尔达看着将要就座的客人，问道。“上次谈判已经说过了，我的立场没有改变。”\n\n“可得了吧，卡洛斯。”对面的人听到客人直呼他的名字，皱起眉头。阿德马尔无视他的表情，继续说着。“我大老远到这儿来可不是为了欣赏你阳光般的个性。库比契克每天就在那喊要杀人啦要杀人啦，国会里每天都有怂逼开始听信他关于军队的末日预言。更不用说古拉特……”\n\n“古拉特无关紧要，他被困在南方了。”拉塞尔达叹了口气。一只电话响了起来。\n\n“你为啥不把它拿起来呢，我的朋友。”阿德马尔看着对方，电话一直在响。“肯定是好消息。你试图贿赂的那些官僚可能都站你这边了呢。”\n\n这时候，拉塞尔达的愤怒终于爆发了。“你这混蛋，滚出去！”愤怒瞬间扭曲了全民盟领导人冷静的性格。然而，那股狂躁的能量依然存在，它熊熊燃烧，烧成一场吞噬一切的狂热。阿德马尔知道面前这个男人的感受。\n\n电话依然在响。拉塞尔达叹了口气，拿起话筒。阿德马尔的笑容加深。看来，两人都有很多工作要做。"
 brazil.101.a: "一段美好友谊的开始。"
 brazil.102.t: "演说"
 brazil.102.desc: "一大早，人群便聚集在了广场上，初升的太阳和今日的明星一同温暖着他们。卡洛斯·拉塞尔达站在广场边的临时平台上，引导着人群中躁动的力量。\n\n参与集会的人们多种多样。工人们为此停下了早班。退休者们被阿德马尔用车拉来，壮大了群众规模。而记者们则尽忠职守，记录着演讲。人群中还夹杂着一些士兵，正热情欢呼着。另类分子看来是没多少搅扰的机会了。\n\n“谁应该为这次危机负责呢？是那帮乘火打劫，坑蒙拐骗，十恶不赦的人。那些自由派和社会主义者把我们的国家推到了崩溃边缘。他们把巴西弄得一团糟，却还称此为国家繁荣。我们的国家机关，在长达十年的贪污腐败后仍然留存着，还被用作抵制批评的盾牌。难道说，巴西的民众不配获取真相，要求诚实吗？”人群中传来赞同的呼声。“难道我们的共和国不配得到良好治理，不配在万国的交响乐中取得一席光荣的座位吗？”又是一阵认可的欢呼。拉塞尔达让台下雷鸣般的热情持续了好一会儿，而后接着演说。“朋友们，想要结束这危机状态，那就让政治回归常态。国家不可能有希望，除非把票投给社进党-全民盟联盟。只要一息尚存，我便会为国家未来不懈奋斗。但这奋斗是不能单枪匹马获胜的。”\n\n人群的声势渐渐壮大到最高点，拉塞尔达的雄辩亦将随之迈入最终高潮。"
 brazil.102.a: "“我们需要巴西工人的帮助。”"
 brazil.102.b: "“我们离不了巴西的农民。”"
 brazil.102.c: "“我们需要军人的支持！”"
 brazil.103.t: "旧日恶魔"
 brazil.103.desc: "拉塞尔达认出了那位他马上要与之会面的宾客，深感沮丧。与阿德马尔的联盟曾令他十分尴尬，但大众并不意外——每一个脑子里稍有政治细胞的人养的狗都能猜到这个。然而，这位崭新的合作伙伴……如果可以的话，拉塞尔达巴不得继续与中间人联系。但巴西从来没有什么“轻而易举”就能做到的事情。\n\n坐他对面的那个人是民代党的中层，一个能力平平的家伙。整合主义者宣称要掌握巴西未来的那些日子早都成了老黄历，五十年代瓦加斯的倒台和萨尔加多发动的未遂政变把民代党彻底按进了棺材，还钉上了钉。如今，民代党只剩下一位参议员，好像还有几个众议员，几乎马上就要变成历史书上的潦草一页。然而，在这分秒必争的日子里，在与库比契克和古拉特的竞争中，阿德马尔坚持要寻找任何可能增加哪怕只有一点儿优势的方法与途径。因此，全民盟的领导人发现，自己又回到了和民代党的旧关系里。\n\n民代党人十分慷慨。整合主义者会支持阿德马尔和拉塞尔达。然而，他们开出的报价却斩钉截铁，没得商量。除了要与民代党这具法西斯僵尸你侬我侬之外，阿德马尔和拉塞尔达要做出保证，在赢得胜利之后，会撤销流放普利尼奥·萨尔加多的决定。整合主义的领袖将要归乡。\n\n拉塞尔达暗自叹了口气。民代党特使的态度十分坚决。胜利之后，要处理阿德马尔就够令人头疼的了。现在还得让萨尔加多来这儿一起混，那可真是太操蛋了。但，也许晚些时候处理一个新产生的问题会比立即失败要好得多？"
 brazil.103.a: "萨尔加多会得到那张归乡的船票。"
 brazil.103.b: "萨尔加多还是继续在伊比利亚顾影自怜吧。"
 brazil.104.t: "拯救联盟"
 brazil.104.desc: "会场内忙成了一锅粥，房间另一头的桌上摆满了电话，不时有人循声接起，摊开手边的笔记，紧接着就会有人跑来，将手写的记录送给秘书，转化为打字机的格式，再从那里被送上讲台，以它们通常被赋予的洪亮嗓音一字一句地念出来。通常来说，这些笔记来自社会民主党或工党的要人。虽然大家都在强调团结的重要性，但在支持谁的话题上，发言者们宣扬的团结却在削弱。\n\n工党与社民党的联盟确保了选举的成功与社会稳定，因为夸德罗斯没有标中他心仪的副总统地位，自戈梅斯当政以来，自由派与劳工人士就在将右翼排挤出政治中心。然而现在，联盟在一个接一个胜利中变得尤为紧绷，许多社民党成员呼吁让库比契克归来——他是位声名显赫的街头政治家，也是反军政上受欢迎的人物；对此，工党支持者愤怒地说，让军方排挤掉洛特的合法继承人古拉特将严重违背先例。更何况难道不是洛特和社民党的腐败导致了这场危机吗？\n\n目前为止，库比契克还没有在大会上露面太多，只是在开幕式上做了鼓励共识、保卫联盟的呼吁。古拉特还被困在南方，一周内都回不来，无法赶上这次联盟对话，他的好友兼支持者莱昂内尔·布里佐拉显得尤为突出，走到哪里都能看到他魅力非凡地与工党活动家与社民党左翼交涉。\n\n友谊与宿怨，野心与务实，希望与绝望。情感的漩涡在党大会内不住地回转，时钟默默地指向百日的终点。"
 brazil.104.a: "同室操戈不可取！"
 brazil.105.t: "大会开始"
 brazil.105.desc: "库比契克入局很久了，社民党-工党联席会议期间，有关前总统竞选问题有着好几场马拉松般的内容——最不体面的运动，最遥远的长途，库比契克觉得自己还不如跟朋友来场球赛，至少他的队员不会老想着进自家的球，而是攻对方的门。\n\n他跑呀跑呀，脚下流动着暗沙，这个代表不支持他，那个团体倒向那里，眼前的沙滩延绵不绝，脚后的潮水冲去来时的脚印。布里佐拉来了。多么有魅力的演说家，许多库比契克的支持者都拜倒在他脚下。这事关重大，前总统必须嬴，这不只是为了他自己，若一切不能如意，高涨的潮水将把他们全部吞没。\n\n有个人的缺席让他万般失落，若昂·古拉特，那个决定了联盟命运的男人。工党的派阀分子在布里佐拉策动下，无休止地为他们亲爱的领袖煽动异议，社民党的强硬派也在他们的忸怩作态下一一浮现，其中有库比契克的朋友兼门徒坦克雷多·内维斯。\n\n左脚换右脚，右脚换左脚，奔跑在浮满流沙的无尽滩涂，库比契克明白工党与他一样陷入了苦斗。这倒未必给他多少宽慰，将来的战斗是艰辛的。"
 brazil.105.a: "库比契克占据上风。"
 brazil.105.b: "布里佐拉为古拉特抓住了主动权。"
 brazil.106.t: "暗影之主"
 brazil.106.desc: "近来，埃德娜·洛特会面同僚的时候，对方永远摆着张难看的臭脸。房间的镜子里映出她的疲惫，工党活动家们以无数个不眠之夜为古拉特搭桥引线，她父亲倒台真的才几个月吗？自那以后，社民党-工党的联盟就驶入了深水区，为了拯救这条船，船长们能做的就是让它尽可能避开危险的礁石。代表军头的鲨鱼正悄悄逼近。\n\n“我很抱歉莱昂纳尔，您可以再说一遍吗？”莱昂纳尔·布里佐拉的眼神打量着她。\n\n“没问题，我想表达的是，这些天来，那个老人热切支持着若昂·古拉特，双方最近正在开会。”\n\n“瓦加斯的帮助会动摇不少人，无论是社民党还是工党。库比契克虽是那位先生的老‘朋友’，想必对自己的基本盘跑到其他人那里去也很难不在意吧。”\n\n“他不是唯一一个，要是军方领导层得知瓦加斯希望重新在政治上扮演积极角色，他们的脑海里准会蹦出‘赤化’的字样。撕下民主的伪装，结束这场哑谜，马上发动军事政变。”布里佐拉长叹一声：“上帝啊，我们怎会落得如此下场。”\n\n“这布局是库比契克和我父亲造作的，他们愚蠢地以为社民党的计划不可能作茧自缚，现在也不得不躺在里面……古拉特会怎么对待瓦加斯，你怎么看？他会接受他的帮助吗？”\n\n在做出回应以前，布里佐拉陷入了沉思。"
 brazil.106.a: "古拉特会接受瓦加斯的帮助。"
 brazil.106.b: "古拉特婉拒了老人的好意。"
 brazil.107.t: "大会继续"
 brazil.107.desc: "[BRA_the_conference_continues_desc]"
 brazil.107.desc.goulart: "下一位演讲者不是当天最能言善辩的那位。这是因为双方都把论辩的才能都发挥到了极致，以至于挤不出什么灵感来了。\n\n演讲者是有备而来吗？他是通过幕后谈判，在人群中塞满了高声叫好的支持者？又或许，这位演讲者恰好站在历史的转折点上，只需轻轻一推，联盟大会中的许多人便会转而相信他的想法？毕竟，历史上大大小小的转折点那么多，人类压根就找不到它出现的规律。\n\n所以，这位演讲者是若昂·古拉特巴西工党的支持者。他站在讲台上，陈述着自己的观点。观点不甚新鲜：支持合法总统，即应支持古拉特按照法律顺位接任洛特与夸德罗斯。保守派人士威胁说古拉特过于左倾，但这与法律事实没有关联。巴西民主至高无上，人民把权力与责任委托给社民党-工党联合政府，便应当按照宪法行事，遵守其确定的继承顺序。哪怕要实现库比契克心中的蓝图，用库比契克去取代古拉特也是不可取的。\n\n演讲结束时，掌声比平时要热烈。这可能不是会议僵局的结束，但也许是结束的开始？"
 brazil.107.desc.kubitschek: "下一位演讲者不是当天最能言善辩的那位。这是因为双方都把论辩的才能都发挥到了极致，以至于挤不出什么灵感来了。\n\n演讲者是有备而来吗？他是通过幕后谈判，在人群中塞满了高声叫好的支持者？又或许，这位演讲者恰好站在历史的转折点上，只需轻轻一推，联盟大会中的许多人便会转而相信他的想法？毕竟，历史上大大小小的转折点那么多，人类压根就找不到它出现的规律。\n\n所以，儒塞利诺·库比契克的支持者开始了他的演说。古拉特煽动的政治令共和国陷入停滞。工党领导人认为自身名誉遭保守分子的玷污，自然这是不应当的。但我们都知道，巴西政治何其残酷、何其肮脏。社民党-工党联盟存在的意义是成为一道壁垒，抵御军队军官与保守势力的阴谋诡计。如今事态紧急，亟需保持团结，选择一位广受欢迎的候选人就成了应有之义。除了饱受赞誉的库比契克先生，还有谁能担此重任？是时候学习五十年代的联合政府了，让我们团结一致、行动起来，打倒那些鼓动阴谋的叛乱分子！\n\n演讲结束时，掌声比平时要热烈。这可能不是会议僵局的结束，但也许是结束的开始？"
 brazil.107.a: "只有时间会证明一切。"
 brazil.108.t: "无上慈悲"
 brazil.108.desc: "[BRA_the_conference_concludes_desc]"
 brazil.108.desc.goulart: "现在，两个好朋友在公开场合迎面相视，磨刀霍霍。他们想要干掉对方呢。很奇怪，不是吗？大会上，社民党与工党都表达了不满，同时相互指责一番。尽管到头来，双方之间还是假模假样地恢复了一些温情脉脉，但所有人都看得出来，联合政府那如胶似漆的好日子已经过去了。军方的最后通牒简直就像是在社民党和工党的支持者的怒火上浇了汽油一般。\n\n责任、同志情谊，又或许是自私自利的政治算计，无论如何，这次大会有了一个相对圆满的结局。毕竟，联合政府的成员对巴西怀有相似的理想。它既不会想着跑进军营，也不会去跟全民盟同流合污。再说，社民党左翼和工党的右翼基本上是重叠的。既然谈判已经结束，所有人都同意进行最后表决——当然，投票只是一种形式。联盟的建立和先前的秘密谈判已经决定了古拉特和库比契克中谁才是胜利者。\n\n也许他们的对手已经预见到了这个结果。到目前为止，联盟步履蹒跚、十分艰难。不过，巴西民主的敌人可不要得意忘形，社民党人和自由派将坚定地站在他们选出的领导人背后。联合政府的命运或将接受考验，但他们将巴西共和国的光辉延续下去的愿望依然坚不可摧。\n\n第二天清晨，计票结束。联盟的领导人已然确定。"
 brazil.108.desc.kubitschek: "现在，两个好朋友在公开场合迎面相视，磨刀霍霍。他们想要干掉对方呢。很奇怪，不是吗？大会上，社民党与工党都表达了不满，同时相互指责一番。尽管到头来，双方之间还是假模假样地恢复了一些温情脉脉，但所有人都看得出来，联合政府那如胶似漆的好日子已经过去了。军方的最后通牒简直就像是在社民党和工党的支持者的怒火上浇了汽油一般。\n\n责任、同志情谊，又或许是自私自利的政治算计，无论如何，这次大会有了一个相对圆满的结局。毕竟，联合政府的成员对巴西怀有相似的理想。它既不会想着跑进军营，也不会去跟全民盟同流合污。再说，社民党左翼和工党的右翼基本上是重叠的。既然谈判已经结束，所有人都同意进行最后表决——当然，投票只是一种形式。联盟的建立和先前的秘密谈判已经决定了古拉特和库比契克中谁才是胜利者。\n\n也许他们的对手已经预见到了这个结果。到目前为止，联盟步履蹒跚、十分艰难。不过，巴西民主的敌人可不要得意忘形，社民党人和自由派将坚定地站在他们选出的领导人背后。联合政府的命运或将接受考验，但他们将巴西共和国的光辉延续下去的愿望依然坚不可摧。\n\n第二天清晨，计票结束。联盟的领导人已然确定。"
 brazil.108.a: "胜利者出现了。"
 brazil.109.t: "机不可失"
 brazil.109.desc: "九十多天前，军方下达了最后通牒。从那时起，各派政治人物都不遗余力地将自家的候选人往总统宝座上推。被夹在努力护住地位的社民党-工党联盟以及拉塞尔达、阿德马尔阴谋诡计之间的立法委员们，在漫天的你来我往、威胁、贿赂、诱骗之间忙得不可开交。总之，黑云压城，风暴将至。\n\n危机四伏的现实让所有人都明白，如果有人闲庭信步地步入这场危机，想着靠兜售影响力大赚一笔，那他就是蠢得无可救药。还剩下一周多的时间，但迟迟没有候选人能够胜出，委员们在越涨越高的波涛中手足无措。为了不在这里溺死，最好的办法就是攀上漂浮的残块。\n\n这就是最悲观最绝望之人的计算了。而有些人还是不肯放弃原则，为了保住颜面而去支持领先的候选人。他们说，如果人们不能遵从内心，那民主共和国还有什么意义呢？不过，他们的同僚们倒是不敢触怒军方，也就没把他们当回事。怯懦地活着总好过身首异处或者身陷囹圄。\n\n因此，最有可能接替洛特和夸德罗斯的候选人在绝望者和务实者之间的支持率大涨。整个国家都在祈祷，这个紧急联盟能够成为阻止军事政变的关键。"
 brazil.109.a: "已经太晚了吗？"
 brazil.110.t: "[BRA_event_110_loc_title]"
 brazil.110.desc: "[BRA_event_110_loc_desc]"
 brazil.110.a: "[BRA_event_110_loc_answer]"
 brazil.110.schildvictory.title: "南非的惨败！"
 brazil.110.schildceasefire.title: "南非的失败"
 brazil.110.stalemate.title: "南非的僵局"
 brazil.110.ofnceasefire.title: "南非的胜利"
 brazil.110.ofnvictory.title: "南非的大胜！"
 brazil.110.schildvictory.desc: "嗐！南非前线传来了可怕的消息。布尔人和纳粹佬那些殖民主义渣滓赢得了胜利，他们扑灭了备受折磨的非洲大陆上的最后一簇民主火种。关于对黑人和持不同政见的白人犯下可怕暴行的传闻已经随着士气低落的巴西士兵和落荒而逃的难民队伍逐渐传开。\n\n巴西政府与人民遭受了这场灾难的打击，巴西水域即将掀起新一轮敌对活动，专员辖区马上就会趁我军新败派遣更多的非法渔民大肆掠夺，令局势雪上加霜。现任政府的信誉也因此遭到了极大削弱。\n\n塞翁失马，焉知非福。无数难民逃往巴西，希望过上新生活，他们都是善良体面的人，至少比那些残忍暴戾的纳粹要好。我们的军队和体制也会从这样的失败中吸取教训。"
 brazil.110.schildceasefire.desc: "南非前线传来了不好的消息。布尔人和纳粹佬那些殖民主义渣滓赢得了胜利，不过我们还是成功阻止了他们，非洲大陆上的最后一簇民主火种保住了。我军虽然打了败仗，但他们依然志气昂扬。\n\n巴西政府与人民遭受了这场灾难的打击，但依然不得安宁：巴西水域有可能会掀起新一轮敌对活动，有人担心，专员辖区会趁我军新败派遣更多的非法渔民大肆掠夺，因此海军接到命令开始动员起来。现任政府的信誉也因战争失败遭到不小打击，但仍有挽回的余地。\n\n塞翁失马，焉知非福。无数难民劳工逃往巴西，希望过上新的生活，他们都是善良体面的人，至少比那些残忍暴戾的纳粹要好。我们的国家也会从这样的失败中吸取教训。"
 brazil.110.stalemate.desc: "南非前线传来消息：交战双方均未取得多少进展，于是他们签署了停战协定。边界维持战前的状态。我们的部队表现不错，不过将士们还是没有将所谓的“优等民族”赶出非洲，这多少让人有些失望。好在他们还是凯旋而归，同时还赢得了自由世界对巴西的尊重。\n\n不论是巴西的政府还是人民，大家都感到满足，至少纳粹的侵略没能得逞。然而，我们还是得做好防范措施。我们有理由怀疑，专员辖区可能会再次入侵巴西的水域，捕捞巴西的龙虾；因此，海军已经做好了相应准备。尽管人们希望巴西军队可以打败纳粹，但他们认为政府已经尽己所能，做了一切该做的了。我们政府的民望目前保持稳定。\n\n由于非洲连年战乱，可能会有一股移民潮涌向我国；这些移民有望帮助我们改善经济，促进巴西社会发展进步。此外，我们也可以从这场战争中学到不少经验教训。"
 brazil.110.ofnceasefire.desc: "南非传来好消息：纳粹渣滓遭受重大挫折，布尔人被彻底击垮，非洲之盾被迫接受OFN与巴西提出的条款，达成停火协定。巴西勇敢的将士们给了堕落的欧洲之主沉重一击，彻底动摇了它们腐朽的制度，带着同胞们的赞美和自由世界人民的景仰回到了祖国。\n\n政府和人民都对此感到高兴，当然这里还有一些值得关切的战后事务。我们有理由相信，惨遭羞辱的纳粹渣滓可能会展开报复，入侵我国的主权水域继续大肆窃取，以期在其最终崩溃之前将最后一批龙虾向北运往充斥混乱与暴政的德国；因此，海军已经准备好动员起来。除此之外，我国赢得了自由世界国家的尊重、同时取得了自二战以来面对纳粹主义的第一次胜利，执政党的民望趋于好转，支持率不断上升。\n\n德属非洲走向崩溃、南非则要消化其吞下的土地，可能会有大批移民前来我国，寻求更美好的生活。我们要做好迎接他们的准备。随着庆祝典礼筹办、军队启程回国，我们的政府和军队都要开始思考，应当从这次胜利中学到怎样的经验。"
 brazil.110.ofnvictory.desc: "大好消息！大好消息！纳粹渣滓和布尔跟屁虫已经被咱们的枪炮送上天堂接受审判，他们全都被赶跑啦！非洲之盾已经不复存在了，OFN和他们当地的合作伙伴成立了托管政府，以管理这些曾经由“优等种族”控制的土地。巴西英勇无畏的将士们一刀捅进那所谓的“欧洲之主”的心脏，彻底消灭了它们堕落腐化的制度。巴西人民正热烈欢迎他们回到祖国，从多伦多到塔斯马尼亚，自由世界的人民投来了崇拜的目光。\n\n巴西政府、巴西人民欣喜若狂，当然这里还有一些值得关切的战后事务。我们有理由相信，惨遭羞辱的纳粹残兵可能会展开报复，入侵我国的主权水域继续大肆窃取，以期在其最终化为一缕青烟之前将最后一批龙虾运往充斥混乱与暴政的德国；因此，海军已经准备好动员起来。除此之外，我国赢得了自由世界国家的高度尊重、同时取得了自二战以来面对纳粹主义的第一次重大胜利，执政党风头一时无两，受到人民极大的支持与尊重。\n\nOFN开始管理其托管领，南非也将开始消化它取得的领土，可能会有大批移民涌向我国海岸，寻求更美好的生活。我们要做好迎接他们的准备。随着庆祝典礼筹办、军队启程回国，我们的政府和军队都要开始思考，应当从这次历史性的胜利中学到怎样的经验。"
 brazil.110.schildvictory.answer: "我们要想活命，就得好好吸取教训。"
 brazil.110.schildceasefire.answer: "吸取教训会让我们学到很多。"
 brazil.110.stalemate.answer: "我们会好好学的。"
 brazil.110.ofnceasefire.answer: "我们要列学习计划了。"
 brazil.110.ofnvictory.answer: "我们以后再学吧。"
 brazil.111.t: "乌鸦的新巢"
 brazil.111.desc: "拉塞尔达走进总统办公室，轻轻、悄悄地关上身后的门。今天一整天，他亲吻孩子们、和他们握手的时候，都得努力假装今天不是他生命中最棒的一天，但他的外表无论有多么平静，人们都能感受到他的脸上正控制不住地要露出一个灿烂的微笑。现在，四下无人了，终于可以放纵自己了。\n\n“呜呼！好诶！”拉塞尔达挥舞着双拳，飞快地转了一圈。他击败了巴西最伟大的头脑（再加上夸德罗斯），获得了军方的忠诚，躲过了每一个试图了结他的二流杀手。现在，世界上最伟大的国家正在他的手中，任他塑造。热图利奥·瓦加斯愚蠢的政策荼毒祖国日久，把巴西的经济脊梁侵蚀得如朽木一般。等到时机合适，他就会一举摧毁那条野狗的一切。而此时此刻，他的议程上只有一件事。\n\n巴西总统卡洛斯·拉塞尔达慢慢走向他的座位，欣赏着这间代表巴西最高权力的办公室内部的奢华陈设与华丽装饰。他把屁股挪到座位上，从外套口袋里掏出一张写满姓名和电话号码的条子。是时候让那些最热情的支持者与巴西的新任国家元首一同庆祝一番了。"
 brazil.111.a: "在拉塞尔达总统的指导下，巴西一定会繁荣昌盛。也许吧。"
 brazil.112.t: "埃丝特的哀叹"
 brazil.112.desc: "就职典礼刚一结束，现任总统拉塞尔达就开始疯狂地活动起来，不断让总统官邸的官僚和员工东奔西跑，一刻不停地收发信件，电话铃声此起彼伏，仿佛要给巴西的每个小屁孩都下条指示。离下次选举只有一年半时间了，因此所有人都在紧锣密鼓地动员起来，仿佛人人都得身兼数职。埃丝特·苏扎给拉塞尔达当了十二年秘书，她感到自己被赋予了一个全新的角色，让每一个人微言轻的狗屁官僚在她身上发泄一通，因为拉塞尔达没空打理这些破事。不过，至少她工资涨了不少。\n\n“是的，米基奇先生，所有资产。嗯哼。是的，甚至是巴西石油公司，尤其是巴西石油公司。”她叹了口气，赶快把听筒拿开耳边，对面米基奇直接大骂拉塞尔达“下一步就他妈的把老子的财产卖了”或“舔美国佬的屁眼儿”。当然啦，只要他以为有人在听他说话的话，他就不会惹出什么大麻烦来的。最后，滔滔不绝的污言秽语终于止歇，艾斯特把电话拿到耳边。“谢谢你，米基奇先生，我一定会把你的留言转达给总统。祝你有美好的一天。”"
 brazil.112.a: "埃丝特晃晃桌子，啪地一声把话筒拍回电话上。"
 brazil.113.t: "伙伴你好"
 brazil.113.desc: "“戈登先生，很高兴见到您。我们就开门见山，行吗？”美国驻巴西大使林肯·戈登没想到这么快就被新任总统召见。通常情况下，一位总统要花几个月的时间来勾勒他与美国的外交计划，但拉塞尔达却认为与他会面才是重中之重。戈登不禁感到受宠若惊。他坐在壁炉对面，拉塞尔达从抽屉里抽出一大堆文件。“我知道，总统先生，与您的前任相比，你对与美国发展积极关系更感兴趣。我们家乡的每个人都渴望回报呢。”\n\n拉塞尔达笑了。“当然，当然。现在，在我们展开讨论之前，我有一个……小小的要求，提供给您，戈登先生。我可以叫您林肯吗？”\n\n“当然。”\n\n“好，很好。林肯先生，我需要你把一份正式的外交请求带回华盛顿，就在这儿，”他拍了拍那堆文件，“一堆相当正式的文件。简而言之，它要求巴西接受OFN的伙伴国身份，将我们带入自由世界。现在是巴西为反法西斯战争助一臂之力的时候了，您同意吗？”\n\n戈登的扑克脸随即变得极为明快，惊讶和喜悦几乎要掩饰不住。这简直就是一场外交巨变！对美国来说，巴西加入OFN将意味着巨大的成功。哪怕是在最荒诞不经的梦里，即使是公开亲近美国的政客拉塞尔达，他也没有想到这个人能让巴西变成OFN的成员！他甚至都还没开口呢！\n\n戈登猛地站起来想握手，膝盖却撞到了总统的桌子，整个人瘫倒在椅子上。他咬紧牙关，尽可能平稳地点了点头。“我，我想我能为您做这件事，拉塞尔达总统。欢迎来到他妈的自由世界，总统先生。”"
 brazil.113.a: "拉塞尔达略带些笨拙地握住对方的手。"
 brazil.114.t: "民主堡垒添砖加瓦"
 brazil.114.desc: "“总统先生，有官方消息！华盛顿刚刚发来通知，您申请成为OFN正式成员国的申请已经得到批准，不日申请文件就将归档。”\n\n拉塞尔达笑了，又跟林肯大使说了几句客套话之后，便放下电话。加入这件事基本上早就是板上钉钉，所以算不得什么多大的惊喜，但从美国的喉舌口中直接得到这一消息还是让他颇为欣喜。拉塞尔达从桌子最下面的抽屉中掏出一个瓶子，昂脖咽下去一大口，然后放回原处，再掏出一张纸来。接下来要在OFN发表演讲，而他总能做到最好。"
 brazil.114.a: "那么他把笔放哪儿了？"
 brazil.115.t: "声明意图"
 brazil.115.desc: "“法西斯主义是种枯萎病，正如对待枯萎病那样，想要将它铲除，就得将它依附的一切暴君连根拔起！数十年来，德国不断扼杀自由与民主的余烬，但正如骄傲的地狱之火般，自由的火种永不熄灭！它在美国，在澳大利亚，当然，还有我们的巴西熊熊燃烧。法西斯主义者永远不会停止徒劳的，企图消灭我们的猛攻，我们必须为自己的生存权而战！保卫南非兄弟的战争，是一场抵御暴政压迫的圣战，虽然也有些小小的……并发症，成千上万人倒在了反法西斯斗争的最前线，还有千千万人将继承他们的意志，如英雄般战至最后一刻，直至自由的光辉照亮德国的黑暗。在那一天降临以前，全世界自由的人民啊，巴西将与你们同生死，共患难！”\n\n拉塞尔达走下了讲台，走向掌声雷动的与会代表们。即使尽了最大的努力，那副憨真的傻笑终究是不依不饶地挂在了他的脸上。他会做的事儿可多了，但硬要说哪件是最擅长的，还有什么比得过演讲呢？嗷，那写演讲稿大概也算一出。返回巴西代表团的席位时，邻座老妇人的鼓掌姿态显得格外激动。\n\n“干得漂亮，卡洛斯！我看到它第一眼就知道这是件大杀器。”苏扎这次来纽约是为在OFN指挥系统永无停歇的喧嚣中办好她的事，顺带捎上几个有需要的朋友。拉塞尔达坐回他们中间，目送南非代表走向讲台。\n\n“谢谢你，埃丝特，我想我们的意图表达的够明确了。”"
 brazil.115.a: "现在他们不能无视我们了。"
 brazil.116.t: "老牌外交"
 brazil.116.desc: "“拉塞尔达总统，您打算同美国合作到何种程度？”\n\n“总统先生，您能详细解释一下您将准军事组织与巴西警察合并的计划吗？”\n\n“卡洛斯·拉塞尔达，为什么人们把您称作一种鸟类！？”\n\n拉塞尔达被一群保镖和随从紧紧围着，身边全是不知道从哪儿冒出来的记者。显然，有人将他的行程透露给了媒体。这些人是有多无聊？最后，带领保镖团的高个男人朝拉塞尔达使了个眼色，拉塞尔达便回到了自己的车里，砰地一声关上车门。他的保镖随从们也都各自上了的车。\n\n拉塞尔达此行表面上是来观光的，顺便可能做点公关工作，但实际情况要复杂得多。不少美国高官反对OFN承认巴西，他就是来说服他们的。无论这意味着贿赂、威胁还是稍许闲谈，拉塞尔达都想亲自上阵。这事情太重要了，可不能交给手下的马屁精。"
 brazil.116.a: "下一个目的地是林肯纪念堂，之后是五角大楼。"
 brazil.117.t: "新朋友"
 brazil.117.desc: "伊斯雷尔走进办公室，舒展着自己僵硬的身体，为一天的工作做准备。今天他要审阅联邦情报和反情报局特工在世界各地搜寻的情报与简报。坐下工作之前，伊斯雷尔总要放松一下。他眼睛往桌上一瞥，突然扫到一个陌生的东西，立刻停止扭动身体，凝视着它。那是一个黄褐色的信封，边角整整齐齐，就那么自然地搁在其他文件上面。昨晚，这个信封肯定不在此处，而整栋大楼都戒备森严。伊斯雷尔扫视一下房间，但除此之外，房间的其他东西似乎没有任何异样。他慢慢地坐了下来，小心翼翼地打开那个毫不起眼的信封，里面有一叠文件。最上面的那张立即引起了他的注意。\n\n阿列克谢·卢比奥，23岁，男性，俄罗斯难民后裔，目前住在巴西圣塔伦。卢比奥是圣母受孕主教座堂的一名园丁，其同时在无人使用的教堂内部以伊万·伊万诺夫的名义领导着一个共产主义小团伙。该团伙预计将在两个月内绑架圣塔伦总督，并向外界勒索赎金。随信附上该小组所有成员之身份姓名清单，以及对一名与该团伙有关的共产主义煽动者的书面和音频审讯记录。上述信息由联邦调查局提供。美利坚合众国和巴西合众国万岁。"
 brazil.117.a: "伊斯雷尔擦擦汗，决定买把更好的锁。也许吧。"
 brazil.118.t: "天理得偿"
 brazil.118.desc: "“阿茹里卡巴？真他妈见鬼了。那条是什么来着，阿克里级？一百五十个人死了一半。”托斯卡诺将军放下手上的报告，叹了口气，望着把报告交给他的那个一脸紧张的年轻海员。最近这次和纳粹之间爆发的冲突并未出人意料，但损失一艘驱逐舰只能说是惨淡收场。不过，至少他们还是以其人之道、还其人之身了。\n\n“嗯，总共有六十人在海上失踪，先生。嗯，我可以走了吗，先生？”\n\n托斯卡诺挥手示意海员离开他的办公室，这里是塔曼达雷海军上将号上一间简陋的舱室。以前的它装潢华丽，但他觉得这样给人的印象不好。无论如何，中非舰队肯定是无法体面撤走。在离开巴西水域之前，每走一海里、他们都会受到骚扰。"
 brazil.118.a: "有事要做，有德国鬼子要杀。"
 brazil.119.t: "打扫战场"
 brazil.119.desc: "“长官，我们就在领头海盗船的正下方，据说应该是德国佬的逃兵。”\n\n米切尔船长拍了拍新来水手的背，他是这条小潜艇上最新加入的成员。米切尔当这美人儿的船长已经有八个年头了，在他干过的所有工作中，打海盗大概是最简单的。没有哪路海盗能击沉潜艇，和这些小船对战可比和U艇对峙要轻松得多了。\n\n“把这婊子养的打沉，好不好？把这领头的灭了，剩下的人不用打就散了。装填鱼雷！”\n\n其他船员开始行动，米切尔向后方狭窄的厨房走去。他的手下或多或少都知道自己在做什么，要是他管得太多，他们反而会慌了手脚。所以，为什么不趁这个时间吃点零食呢？"
 brazil.119.a: "娘的，若昂把奶酪都给吃没了。"
 brazil.120.t: "割喉法西斯"
 brazil.120.desc: "埃托尔隐匿在暗影中，竭力不发出声响，缓缓朝那个法西斯靠近。纳粹逃兵营里的人都酩酊大醉，横七竖八倒在摇曳的营火周围，但小心总无大碍。\n\n埃托尔和连队里几名战友在南非战争结束后志愿留下，清理仍留存于非洲各个角落与缝隙中的纳粹渣滓。他追踪这支特殊的队伍已经有段时间了。他们认定自己的“最高领袖”难逃一死以后，就从许蒂希的一个营里逃出来，从此对许多毫无保护的村庄和乡村犯下一系列血债。这伙人拢共只有十三人，但个个装备精良、残忍无情。\n\n埃托尔向他临时反恐小组的其他队友迅速比了几个手势，然后割开了第一名法西斯的喉咙。他的小队立马行动起来，分头向营地各处，以同样的高效消灭了剩下的纳粹。有几个人惊醒，却被轻易了结。一个小德佬在流血，他的生命力缓缓渗入非洲的黄沙之中，埃托尔就这么看着，他十分想弄明白这个小子是如何走到如此地步。他可能还不到二十岁！这名巴西海军陆战队员取下男孩身上的铁万字，站起来，朝破破败营地的中心走去。他有些策略问题要和史密斯谈谈。"
 brazil.120.a: "非洲还有许多该死的纳粹。"
 brazil.121.t: "边境问题"
 brazil.121.desc: "宁静的夜晚被巨响声打破，埃托尔咒骂着卧倒在战壕内，边境那头的德军开火了。停战以来他志愿留守南非，巡逻动荡不安的专员辖区边境，尽其所能地救助非洲人。虽然战争名义上结束了，仓促搭起与共和国隔绝的钢丝网围栏外，纳粹和布尔人的枪总爱不经意地“走火”。\n\n埃托尔蹲伏在沙袋后，身处边境外延的无数防线之一，他敏锐地意识到这似乎不是以往的误射那么简单。木质的围栏咯咯作响，他还来不及向外瞥一眼，一个非洲人抢先一步闯入掩体，瘫倒在地上，中了枪的膝盖血流如注。他紧紧抱住自己的腿，不顾一切地止住涌出的鲜血，衣服被铁丝网扯掉一大块，但除了明显的枪伤外还算没什么缺损。假如你不被他清晰可数的肋骨和凹陷的双眼夺去注意，他和其他越境者没什么不同，只是个担惊受怕，处境绝望的难民。\n\n第一轮枪响逐渐变细，被洪亮的德语争吵声取代。埃托尔包扎好男人的腿，开始向医疗队请求支援。最后的枪声从边境那头响起，德国人的嚎叫消失了。"
 brazil.121.a: "至少德国佬的枪法还是一样的水。"
 brazil.122.t: "让纳粹滚蛋"
 brazil.122.desc: "托斯卡诺上将失去了往日的幽默。到目前为止已经有578名巴西水手被德国船打死。在经济角度看极其艰难的龙虾战争都没有导致多少伤亡，当时的巴西舰队在清剿海盗和与德国人交流上都没有什么问题，但现在情况不同了。生气的德国人打算通过把巴西的领海边界往回推来增加自己对大西洋的控制。而这在托斯卡诺看来是不可接受的。\n\n阿尔米兰特·塔曼达雷斯号是这次反击的主角，它光是这周就已经击沉了四艘德国船。那些混蛋已经分布了上千英里，试图拿数量来压倒巴西海军，但这终将无济于事。南非战争可能没有想象中那么顺利，但阿诺尔多·托斯卡诺上将会狠狠地诅咒每一个胆敢踏足巴西海域的德国鬼子。"
 brazil.122.a: "打倒法西斯的战争永远不会结束。"
 brazil.123.t: "小小的职责"
 brazil.123.desc: "拉塞尔达心不在焉地往打字机上敲打着什么，一遍遍地为他的最新演讲重写结尾，但无论如何都显得不太完美。这是个伟大的发表，他将向巴西人民宣布一场战胜热图利奥主义的宏伟战争，彻底批倒他前任猖狂的国有化政策。现在轮到私有化登台了，无论是医保还是教育，凡是可以被私人拥有的东西，都应该被私有化。\n\n演说的开头真是精彩绝伦。首先，他会好好嘲讽下热图利奥·瓦加斯，然后祝贺自己的支持者，号召他们以实际行动击败那些联手背叛巴西的恶党。呀哒呀哒，洛特鸟也没改，吧啦吧啦。通篇演说真是太精彩了，只有结尾部分给他添了麻烦，他想来点最终贩卖，一种能站在屋顶上喊出来的口号，一段能在海报上发光的宣传语，一句历史书上永垂不朽的引用！\n\n“让伟大的自由之火除尽腐败吧！”呃，算了吧，好像不太适合这次演讲……\n\n“我们将重归富强！”太短了，听着像法西斯……\n\n“像个鸟一样，劳资要把私营企业拉的他巴西满地跑！”啥玩意儿啊？这绝不行……拉塞尔达叹了口，低下头摊在桌子上。过去这份活计要简单的多，那时他还不是总统。"
 brazil.123.a: "当好南美国家领导人比看起来要困难得多。"
 brazil.124.t: "该走了，小东西。"
 brazil.124.desc: "凄厉的哨声划破了夜空的宁静，紧接着就是一阵靴子的践踏声和刺耳的呼号声。奥马尔被吵醒了。他从床上滚下来的时候，肩膀狠狠撞在床头柜上。他咕哝出一句脏话，艰难地爬起身，挪到窗子边上。他想看看，到底是什么劳什子深更半夜扰他清梦。\n\n映入他眼帘的，是四个全副武装的士兵正当街对一个男孩大打出手。男孩看起来至多只有十七岁，但那四个畜生手里的警棍雨点般落在他的身上。一小袋罐头撒落在他身边，肯定是撕扯的时候掉在地上的。啊，他们肯定是总统新成立的“执法工作队”成员了。\n\n男孩头上挨了最后一下重踢。一个执法队员把已了无生气的男孩甩在肩膀上，大踏步原路返回了。他那几个“战友”则开始分散行动。顷刻之间，现场只剩下了那袋小小的“不义之财”。奥马尔关上百叶窗，重新躺回床上睡觉。但他却怎么也睡不着。"
 brazil.124.a: "他好几个小时都无法重新入睡。"
 brazil.125.t: "美国接受了！"
 brazil.125.desc: "拉塞尔达整整领带，踏步迈进午后的阳光。记者们一拥而上，七嘴八舌地抛出问题。他宽厚地笑道：\n\n“新闻界的女士们先生们，参议院的态度已经很明确了，巴西与全世界所有捍卫自由的力量并肩同行。我要感谢参议员们的智慧和果断，保障了巴西的安全与繁荣。感谢全世界自由国家的人民，你们选举的代表做出了正确的决定，向巴西伸出了友谊之手。我们不会辜负你们，不会忘记你们的温暖胸怀。今天就到这里吧，谢谢大家。”\n\n他转身走进晨曦宫，门也随即关上，屏蔽了外界嘈杂的声音。他的思绪飘向远方：在南大西洋，巴西海军舰队此刻正勇敢地挺进圣赫勒拿岛，为新边界划下自己的一道笔触；在亚马孙，雨林正被迅速清理，秘密空军基地将拔地而起，成为国土西境的空中盾牌；在日耳曼尼亚和东京，将军发怒、外交官犯愁的画面，他光是想想就觉得滑稽。\n\n从今往后，无人再敢轻视巴西。巴西再也不是那个无足轻重、只有纸面实力却无实际分量的四流国家。今日，巴西以其明确无误的、呼唤自由与博爱的声音，震撼了整个世界。她再也不会任人欺凌。"
 brazil.125.a: "眼镜蛇又抽烟了，人类变得更自由了。"
 brazil.126.t: "乌鸦翱翔"
 brazil.126.desc: "拉塞尔达总统满足地叹了一口气，从晨曦宫宽敞的落地窗外俯瞰着巴西利亚的景色。天际线上塔吊密布，一瞬间，总统好像听到成千上万名建筑工人正在共和国大厦之上低声齐吼。总统啜了一口咖啡。虽然看起来没什么变化，但每一个经历过百日危机的人都会立刻意识到，整个环境业已完全扭转。\n\n世界民族之林中，巴西的地位既模糊不定，又奇特怪异。他们似乎只是在辽阔原野的边缘暗中窥视，原野正中则是真正强权们的栖身之所。她在拉丁国家的后起之秀中举足轻重，但在外人的眼中却不过是广大地图上一个绿色斑块罢了。即使在二战之中，她的影响也是寥寥：她仅仅派出一支丢盔弃甲又游移不定的军队跟那些野蛮人在陆海之上交过几次手而已。\n\n得益于她与OFN的友好关系，巴西头一次实打实地参与国际舞台。巴西的每个参议员都对各种基本的常规和核威慑原则烂熟于心，外交部则因处理一体化事务而案牍劳形。最棒的是，军方自二战后首次专注对外而非对内。\n\n可喜可贺的是，共和国的财政状况正接近表面上的稳定。旧政权的过火行为都得到了彻底纠正，美国的资本和技术大力扶持巴西的资源和实力，巴西经济高速增长，重回巅峰。\n\n拉塞尔达总统清楚别人怎么说他的，一个沉闷阴郁、暴躁易怒的操盘手。但至少在今天，他就像一个年轻的共产主义者一样抱有美好的幻想。对此，他苦笑着，听着心中那个年少时的自己骂了千百次自己是条“帝国主义的丧家走狗”。然而，他每斩获一次新的胜利，心中的那个声音就变得更微渺、更游离。他毫不怀疑，那个声音最终将从心底完全消失。\n\n就这样，瓜纳巴拉的乌鸦引领着小小的画眉鸟，飞越机遇和挑战交织成的劲风……"
 brazil.126.a: "为自由、富庶与安全。至少他希望如此。"
 brazil.127.t: "意外之喜"
 brazil.127.desc: "总统先生，我们接到了驻巴西大使馆大使林肯的消息，内容令人震惊！似乎巴西已经申请加入OFN，还要求加入手续越简单越好！我们已经为这一突发事件做好了准备，海军也准备在您的指挥下将防御范围扩展到大西洋中部。当然，巴西武装力量相对较弱，在一众强权之间并非出类拔萃，在未来几年间可能意味着某种额外的负担。总统先生，一切由您定夺。"
 brazil.127.a: "立即接受！我们必须团结一致！"
 brazil.127.b: "我们需要时间准备一番，暂时婉拒。"
 brazil.128.t: "简直愚不可及！"
 brazil.128.desc: "拉塞尔达一脚踹在桌子腿上，这势大力沉的一脚差点把它踢断。“日！日！日！”他咆哮道。他们怎么能这样对他和巴西？在奉上所有的支持和友谊之后，巴西居然沦落为OFN的伙伴国，“直到情况更加有利”！这他妈什么狗屎玩意？他跟他们结盟明显有百利而无一害好吗，他给他们他妈的有利——\n\n愤怒戛然而止。深呼吸。观察员国不是永久性的地位。美国人有自己的内部问题要解决，他们可能对巴西在军事上的作用还有疑问。与此同时，我们仍然拥有伙伴国地位，显然他们正在与其他OFN国家就行动和贸易达成协议。这无疑会损害他的连任目标，但卡洛斯·拉塞尔达不会屈服。他打开秘书办公室的门。“埃丝特，我要一张新桌子和一双新鞋，马上送到。还有，接下来三个小时，不接待任何访客……”"
 brazil.128.a: "我得花点时间考虑一下。"
 brazil.129.t: "罪孽深重"
 brazil.129.desc: "拉塞尔达单手握拳，狠狠咬上一口。参议院那些孬种的废物程度简直令人难以置信。他们不会真以为那些满嘴塞着香肠的白蛆和日本鬼子会坐在那看着他们缩在角落里瑟瑟发抖而不来动他们一根毫毛吧？他几乎都能感受到那些将门贵胄如狼似虎的眼神，世界上最大的一块肥肉就那么安安静静地躺在大西洋彼岸……\n\n嘴边划过一丝甜腻。他松开拳头，从他那流着血的手里抽出手帕来。暴躁无益于事，他需要时间思考。选举、经济、反对瓦加斯主义的运动……让一切都变得孱弱不堪。我们需要一个新的方向，但他今天不可能弄清楚。今天，他会喝一杯威士忌，抽一支雪茄，为本应属于巴西的一切哀悼片刻。"
 brazil.129.a: "未来消散之后，所余皆为遗憾。"
 brazil.130.t: "巴西的请求"
 brazil.130.desc: "自卡洛斯·拉塞尔达当选巴西总统以来，我国特工与外交官一直在密切关注巴西局势。亲美亲得人尽皆知的拉塞尔达把大部分时间用于重组巴西政府，但他最近腾出空来，会见了我国大使，林肯·戈登。如果戈登的报告可信，会议结果应该比我们想象的要好。\n\n巴西在二战期间捍卫英国，在最近的南非战争期间参与武装干预行动，现在的她欲要努力推动国际事务，成为OFN正式成员国。这将使巴西在理事会拥有一个席位，完全加入其中。戈登当时就坐不住了，巴不得立刻把我们的答复送过去。对我们来说，这没有什么不利影响。既增加了我们在南美的影响力，又为反法西斯斗争找了一个强大的新盟友。"
 brazil.130.a: "欢迎加入OFN，伙计！"
 brazil.131.t: "乌鸦踌躇"
 brazil.131.desc: "颤抖着双手，他又点燃一支雪茄。烟抽得他有点恶心，但他需要抓着一些东西，什么都行，把它塞满脑子。卡洛斯·拉塞尔达在自己的办公室里来回踱步。窗帘紧闭，白炽灯把整个房间染成一片暗黄。自从他申请加入OFN以来，就把巴西，还有他自己，当成了猎物。他没跟别人说过，但他有时会梦见德国鬼子从下水道溜进阿尔沃拉达，蹑手蹑脚爬上楼梯，拿着锋利的刀，嘴里轻声吐出可怕的承诺——\n\n他用力捏捏自己的鼻子。他知道，魔怔会跟党卫队杀手一样杀死他和巴西，最好不要胡思乱想。他把军队的战备状态调高，因为他预料自己试图投靠美国的行为会遭到某种报复。随着政治外交压力的增长，全民盟内部正在酝酿着四面楚歌的情绪——如果不加以遏制，可能会产生问题。既然百日危机都渡过去了，绝不能让灰色恐慌继续滋长。\n\n至少他早有准备，不是吗？好吧，也许并没有。他上台之前，巴西可没有被大国禁运制裁过。为了能源安全，他可能得在巴西国家石油公司的问题上让步。他讨厌自给自足，但如果三大贸易集团中的两个将巴西拒之门外……\n\n黑暗即将降临。只有卡洛斯·拉塞尔达能够为共和国指明前进的道路。他必须坚强、无畏、战无不胜——但他所能看到的只有鲁本斯·瓦兹少校的脸，将一腔热血喷洒在托内莱罗街头。这样的牺牲难道毫无意义？拉塞尔达活了这么多年，就是为了在最后关头迎来失败？\n\n迎着风雨，乌鸦挥舞着双翼。伤势隐隐作痛，狂风吹得他摇摇欲坠。永远事与愿违、永远无法挣脱。他尖叫，沮丧和愤怒穿透云层，诅咒他曾经主宰的天空。这一切空想何其可悲。当他的力量开始衰弱，他想知道在黑暗中能发现什么。陨落的会是他，还是他国家的未来？"
 brazil.131.a: "就这样，巴西又一次面对着冲突、犹疑与黑暗——而世界将他们遗忘。"
 brazil.132.t: "干涉"
 brazil.132.desc: "对年轻的士兵来说，国会大楼确实值得一看。少年入伍前从来没出过农场，尼迈耶亲手设计的高楼大厦无疑令他印象深刻。巴西利亚的阳光洒在高大的玻璃幕墙之上，折射出耀眼的光芒，引得他频频驻足观赏，欣赏着它们的雄伟壮丽。不过，他可不是来旅游的，他有工作要做。国会的工作人员、清洁工、公务员甚至是倒了霉的乞丐，无一例外，都必须经巴西利亚转送最近的警察局。新政权“不得不”向任何可能的人“询问”任何有关反对派的丑事，这些反对派被软禁在家，愤怒不已。\n\n士兵和另外五个人奉命监视他们。手里的枪沉甸甸，他看着一个年龄大约有他两倍的清洁女工，那女人站在那里无所事事，似是闲逛。\n“快走。”他努力装出严肃的样子。\n那个女人只是看着他的眼睛。\n“快往前走，否则后果自负。”他又说了一遍，强作语气。\n女人呼了口气，“上帝让你降生于世，可不是为了摧毁巴西人珍视的一切。你为什么要这样？”\n士兵犹豫了一会儿。“我是服从上级的命令。现在快走。”\n“可是你有枪啊。你有能力和力量去阻止。你为什么还要助纣为虐呢？”\n那个士兵直视着她的眼睛，内心深处的恐惧不禁流露。“走。”\n她站起来，继续往前走。\n\n士兵走在她后面。他被教导要确实无误地服从上级，不要质疑他们。他跟在他们后面，亦步亦随，辛辛苦苦才走到现在的位置。那么，他为什么会觉得不对劲，会担心事情并不像看上去那样的呢？\n\n他把这些思绪甩到一边。"
 brazil.132.a: "命令优先。"
 brazil.133.t: "制度法的通过"
 brazil.133.desc: "在奥罗·苏亚雷斯·德·莫拉·安德拉德这位新任巴西合众国副总统的坚定支持下，军方领导下的国会毫不费力地通过了旨在将权力集中于行政当局及其临时军管机构的制度法。对于普通人，或者对于天真烂漫的幼稚鬼、又或是那些对于OFN结盟的前景抱有乐观态度的观察家来说，这似乎是在社会主义引发的混乱后，人民重新以热情的态度团结起来的一种表现。\n\n但事实并非如此。真正感到高兴的，只有那些喜欢跟在军管政府屁股后面溜须拍马的家伙，比如菲林托·穆勒，或是奥罗·德·莫拉·安德拉德自己。还有一些人，他们被迫留在这里。\n\n其中有一个——坦克雷多·内维斯，来了。但他也并非低眉顺眼的善类。\n\n“莫拉·安德拉德，你这混账！看看你做的好事，你这叛徒！这一切都会变成你的报应！哪怕人们不修理你，奥罗，上帝也会来修理你的！”\n\n内维斯不停地责备莫拉·安德拉德，但后者依然不为所动。他不敢派护送他的军人去跟踪内维斯。否则，他不仅会失去社民党，甚至会失去库里提巴市的内伊·布拉加这样的温和保守派。就像莫拉·安德拉德本人一样，布拉加也会重新考虑他接受独裁统治的程度。\n\n不，他所能做的就是无视内维斯的侮辱，强行通过法案。\n\n第一号制度法就是这样通过的。"
 brazil.133.a: "“何以至此？”内维斯嘟囔着。"
 brazil.134.t: "镇压罢工"
 brazil.134.desc: "假如罢工纠察线是一种姿态，这种姿态就是在表明码头工人反抗那些持枪窃国、外强中干的混蛋。每日搬运货物，练得皮糙肉厚的壮汉，带着共同的精神站在一起，只为一个目的：让军方……做点什么。再考虑考虑么？军方不需要再考虑，只需要做出行动，只要能防止巴西民主制度破灭，什么行动都可以。\n\n但是，他们派出的一位应对“干预”的小哨兵从远处跑了回来，钻进罢工人群里找父亲，口中疾呼“来了”。依稀可见远方有巴西军人和警察戴着防毒面具向他们进军，领头的是个体格纤瘦的警官，他举起喇叭：\n\n“你们扰乱了贝伦港的正常运作，立即离开，我们不会进行干预。”\n\n码头工人中爆出各种辱骂词句，警察转身点点头，军人便开始前进。当然，他们首先使出的一招就是放催泪瓦斯。一些意志不够坚定的码头工人，看到瓦斯弥散在空气中便四散而逃。剩下留在原地的，则纷纷倒在地上。有个工人忍着眼睛的灼痛，上前一拳击倒了一名警官。\n\n不一会儿，他的腹部就挨了发子弹。剩下的群众听到枪声也四散开来，只求在军方涌来时保下一命。\n\n贝伦港又可以正常运作了。"
 brazil.134.a: "第二天，工人们垂头丧气地回到了岗位上。"
 brazil.134.b: "到了本周末，参与罢工者全部没了踪迹。"
 brazil.135.t: "死气沉沉"
 brazil.135.desc: "马科斯知道，不管怎么看，他都会是个死人。当这支该死的军队向这个国家最后的自由堡垒进军时，他的死将会被全国直播。这些年来所有的行动，学生时代的集会和讨论，收集钞票来购买民用电台的种种努力都将化为尘埃。而现在，当他听到那些低沉的叫喊声和辱骂声时他并没有感到丝毫害怕，恰恰相反，他的内心燃起了一股责任的火焰。\n\n“他们可以摧毁我们的心智，可以把皮靴踩在我们的头上，但他们永远无法扑灭那种火焰！对每一个学生，每一个公民来说，他们每击倒一个，就有三个再站起来！就像……”\n\n砰！机关枪在外面轰鸣，他不知道是谁开的第一枪，但他知道会是谁打出最后一枪。\n\n“他们永远无法击倒我们的精神！如果你是一位真正的巴西人，一个真正的、平等的爱国者，而非那些人所说的‘巴西人’，那就到乡下去吧！拿起武器，发起抗争！到……”\n\n枪声更近了。他没有时间去分辨它们来自哪里，不过这样也好。他打开抽屉，抽出一把左轮手枪，转过身，死死指着门口。\n\n“搜索阿马佐纳斯！搜——”"
 brazil.135.a: "组织电台传出的最后一丝讯息是一声枪响。"
 brazil.136.t: "血腥收获"
 brazil.136.desc: "简陋的杂货店。古斯塔沃·科斯塔透过窗户，看到军队拖着又一个煽动者，样貌是三十多岁的女人。她踢打着，尖叫着，发出种种污秽的咒骂，军人抓扯着她的头发和肩膀，把她扔进一辆汽车的后备箱。士兵们一步一步地走着，把女人从他的视线和邻居身边拖走了。他伸手去摸口袋，准备再点一支雪茄。然后，一名士兵推开门，走进他的杂货店。他的眼睛瞪大了一圈，但士兵只是举起手，摇了摇头。\n\n“你没啥事。我们只是想问几个问题……”\n\n“……嗯，好吧，问吧。”\n\n“你认识那个女人吗？”\n\n古斯塔沃目光一抖，不由得皱起了眉头。这个年过半百的老人翻了个白眼，拣起一块抹布，收拾着自己的桌子，仍然盯着那个士兵。\n\n“那是玛丽埃塔，对吗？那女的从小就是个麻烦精！听了太多城里人的鬼话，天天扯些什么共产主义，跟她父母简直一模一样！要我说，总算是解脱了，我们……”\n\n他的表情停顿了一会儿。古斯塔沃默默地祈祷，这不会向他面前的士兵暗示什么……\n\n“……我们不想惹麻烦，长官。就把这事儿过去了，可以吗？”\n\n“当然。”士兵面无表情地走了过来，从背心口袋里掏出一张破旧的照片。“你知道弗拉基米尔·赫尔佐格吗？”\n\n小杂货店里一片寂静，士兵锐利的眼神盯着古斯塔沃，但后者只是摇了摇头。"
 brazil.136.a: "“不，长官，完全不认得。”"
 brazil.137.t: "对人民的讲话"
 brazil.137.desc: "士兵在等着，边上还有一些官员和技术人员。他们在萨尔瓦多录音室的外面等着。\n\n茹拉西·马加良斯是一位年资颇深的军人。这一点和那些最近拯救了巴西政府的人一样，但是巴伊亚人民非常敬爱马加良斯，他的名声非常好。士兵想，这就是索邦派选择他来发表声明的原因。马加良斯在椅子上坐定，把稿本放在面前，清了清嗓子。士兵向主技术员点了点头。\n\n“巴伊亚的人民，你们好。这里是你们的参议员，茹拉西·马加良斯。你们可以看看窗外，看到街上有士兵。他们是来保护你的。一段时间以前，他们干预了受德日影响、受腐败侵蚀的巴西国会。我曾用其他手段与他们进行了艰苦的斗争，但我们需要更强硬的手段。”\n\n透过玻璃，士兵看到马加良斯的手微微颤抖。这个人的道德水准毋庸置疑，他为何如此紧张？\n\n“卡斯特洛·布兰科将军是个好人，他知道何时需要对巴西政府的运作进行军事干预，他承诺在清除共产主义和法西斯的影响后，一切将迅速恢复正常。无需惊慌失措，你们仍然有能力像往常一样生活。谢谢你们的聆听。”\n\n录音停止，马加良斯从椅子上站起来，人们簇拥着他走到最近的房间里。\n\n“你还好吗，参议员？”士兵说。\n\n马加良斯深吸一口气。"
 brazil.137.a: "“他们不会听的。”"
 brazil.138.t: "与FBI谈判谈判"
 brazil.138.desc: "林肯·戈登小心翼翼地打量着面前的人。此时，对于一个世界级的强国来说，他的姿态近乎谄媚。但他知道这是应该的。在他眼中，巴西特有的弱点，以及他研究多年的、巴西的经济本质，意味着巴西充满了美国需要的资源，远超军事需要：令美国人民精神振奋的美食，促进美国继续奋进的种种原料，以及等待美国企业大笔投资的广袤沃土。\n\n他认为，南美洲对美国的影响，几乎就像美国对南美洲的影响一样大。巴西是资源争夺战中的一颗重要棋子，而这颗棋子绝不能被轻易放弃、打入冷宫。\n\n他知道巴西军队不是政治文盲：他们了解巴西，他们知道如何控制激进的人口；戈登尤其知道，他们知道他们需要帮助，除了一些异类，也就是整合主义者之外，他们都想求助于他们的好邻居。温贝托·德·阿伦卡尔·卡斯特洛·布兰科似乎真心觉得巴西需要自救，问题是除了钱，他还想要什么？\n\n“总而言之，戈登先生，美国对阻止那些像现在这样反对我们政府的人的支持将得到重视和回报。”卡斯特洛·布兰科终于讲完了。\n\n“这我们都可以安排，将军。我的问题是你需要多少？”戈登掏出烟斗。\n\n“特工吗？”将军的娃娃脸向前微倾，直勾勾盯着对方，好似能看穿他的内心。“能派多少就送多少。”\n\n“当然。”\n\n戈登优雅地笑了笑。协议已经达成，现在要再抢下一城。“那么，关于橡胶种植园……”"
 brazil.138.a: "就不用告诉他们特工一直都在了。"
 brazil.139.t: "长链束锤"
 brazil.139.desc: "“这放的什么狗屁！”\n\n修车厂里，伊纳西奥一口浓痰啐在地上，同事们则围在尼古劳身边，听他大声念着手中的工会报纸。工厂里完全没人干别的，没人去吃饭，也没人打算端起咖啡，所有人都在安静地听着尼古劳洪亮雄浑的嗓音。\n\n“除了上述这些扼杀自由、泯灭人性的限制之外，军方宣布，从即日起，所有公共集会都不再经受劳工部长的授权，必须得到军方授权，同时必须在军方的监督下举行。兄弟们，这大白话我们都懂了吧，一旦聚在一块，他们就肯定要开枪。这新法一通过，罢工那真是想都别想了。”\n\n尼古劳一读完，听众就便散去了，工厂里充斥着怒火和足以使最混不吝的水手脸红的咒骂。跟往常一样，骂得最大声、最愤怒的还是伊纳西奥。\n\n“原来如此！这他妈就是结局啦！咱们全都得闭嘴，造这王八蛋小汽车，直到胳膊累脱！得做那些军装杂种的好工人呐！过两天，是不是都得被这群牛马征去当兵啊！天哪，我真希望瓦加斯回来，把那些胸前戴大红花的傻逼踹出去——”\n\n“安静！！”\n\n伊纳西奥不再骂骂咧咧，尼古劳从报纸上抬起头来。吼声在空气中回荡，直到工厂再次安静下来。这怒吼来自克莱贝尔，经验丰富的罢工领袖，一个他们都尊敬的人。\n\n“这该死的法律终结了罢工的一切希望，但它没有说要解散工会！还好，军队还没有镇压、消灭我们的打算。他们现在就可以派警察和士兵来毙了我们，但他们没有。也许他们以为，束缚了我们的手脚，我们便会被吓倒。但只要我们还有一口气在，我们就一定能组织起来！”\n\n迎接他的是雷鸣般的掌声。"
 brazil.139.a: "“现在都坐下，去吃午饭吧。在回去上工之前，我们可以讨论一下，如何反对这条新法……”"
 brazil.140.t: "最高司令部成立"
 brazil.140.desc: "将军们带着部下齐聚一堂，彼此交谈，气氛热烈。既然颠覆分子都被消灭，现在可以搞一个新的最高指挥部，让那些讨厌的文官滚一边去，哦，还有那些胆敢跟文官沆瀣一气的卖国军官。\n\n但就像他们所有的会议一样，争吵开始只是时间问题。这一次，它开始于第3集团军的指挥。第3集团军位于巴西南部，直面阿根廷边境，谁指挥第3集团军，国家安危就系于谁身。对此，每位将军都有自己精挑细选出来的人选。\n\n激烈竞争发生在科斯塔-席尔瓦和戈尔贝里之间，两人都向卡斯特洛·布兰科力推自己的人选。\n\n“——梅迪西就是最佳人选。他只关心巴西的福祉！要是让他来带第3集团军，一定能提高指挥效率，大可以把他们与任何一支美国军队相比，别无二致！”\n\n“席尔瓦，你似乎忘了，在我们拯救巴西的那一天，梅迪西的‘英勇贡献’是命令他的部队穿上正装，准备为胜利者举行阅兵。这哪是忠心为国，彻头彻尾的投机！”\n\n“我在战场上浴血厮杀，把这个国家从共产主义的魔爪中拯救出来，而你只会在办公室里坐着。跟梅迪西比起来，你就是个脑残文官——”\n\n“你说什么——”\n\n卡斯特洛举起了手，两位将军马上沉默下来。\n\n“别吵了，先生们。这是不得体的行为。我已经做了决定，希望你们都能服从。”\n\n“戈尔贝里挑的人将担任第3集团军的指挥官，而梅迪西可以去接管里约的部队。就这样，还有什么问题？”\n\n有的军官高兴，有的不高兴，但他们都没表现出来。军队下达了最后的命令，不能质疑，必须执行。这和政府应当一直运作下去是一样的道理。"
 brazil.140.a: "“散会！”"
 brazil.141.t: "旧的不去，新的不来"
 brazil.141.desc: "几周之前，制度法通过之际，奥罗·德·莫拉·安德拉德遭到了坦克雷多·内维斯的严苛指责。言辞之激烈，气势之凌厉，他被骂到甚至难以在会场立足。“莫拉·安德拉德，你这个无赖！”内维斯怒喊着。“看看你都干了些什么，卖国贼！你迟早要遭报应！就算人民奈何不了你，奥罗，上帝也会惩罚你！”\n\n莫拉·安德拉德一走进总统办公室,就意识到总统已经选择背叛，转而站在强硬派一方。这一切都应验了内维斯的预言。“上帝来惩罚我了，他竟然说对了，真是该死。”莫拉·安德拉德心中充斥着失望与愤怒，不禁质问眼前这位昔日盟友：\n\n“总统先生，你究竟为什么要取消选举？我们之前不是说好的，要让右翼候选人当选吗？”\n\n卡斯特洛·布兰科摊开双手：“莫拉·安德拉德先生，我对此很抱歉，但我不得不这么做。除此之外，别无选择。”\n\n莫拉·安德拉德肉眼可见的愤怒：“还有别的话要说吗？”\n\n卡斯特洛·布兰科摇头。\n\n这位副总统不再说话，递上一份辞呈后径直离开。卡斯特洛·布兰科也没有挽留的意思，仅仅是点了点头。莫拉·安德拉德听不见任何脚步声，反而是坦克雷多·内维斯的怒吼一遍又一遍的在脑中回响。\n\n而安坐如山的总统望着奥罗远去的身影，思考着下一任副总统的人选。\n\n“我想邀请菲林托·穆勒接任，他一定能妥善的安抚国家革新联盟这些强硬右派。”"
 brazil.141.a: "“但我最好在他上任之前就把他排除在任何立法权之外。”"
 brazil.142.t: "安抚抗议，解决需求"
 brazil.142.desc: "“岂有此理！”\n\n“我们给了这群政客一百天的时间来选出一位新总统，而不是像你这样让国家成为笑柄……”\n\n“洛特因为腐败搞砸了，现在你又觉得你能当总统了？”\n\n阿德马尔尽全力露出了悔过的表情。他懊悔地攥紧了拳头，听着聚在一起的军官接二连三的指责。当他们终于耗干了怒火，新总统掌心向上，抬起了双手。\n\n“先生们，我无意损害国家的荣誉。武装部队的介入恰恰给了国家重拾民主的新机遇。我只是想参加大选，在国家复兴之际尽自己的一份力。”他略微提高了声音，压过了下面的抗议声。“当总统可不是说说而已。我曾参与州一级的政治工作，该试着帮助整个国家了。当然，军方将会是本届政府的好搭挡、人才库和智囊团。经历了库比契克和洛特政府的粗放管理后，我国财政势必要紧缩。也就是说，早该向军队和军官调拨资金了。与诸位国家卫士合作打造一个更好，更安全，更高效的未来，将是一件美事。”\n\n这下没有人想让他闭嘴了，军官们转而谨慎地展现出了一丝兴趣。阿德马尔看着这群贪婪的人，心里忍不住暗笑了起来。"
 brazil.142.a: "好一出闹剧，就为了这几个子？"
 brazil.143.t: "朋友间的晚餐"
 brazil.143.desc: "总统请他们吃的是一顿美餐。卡斯特洛·布兰科将军尽其所能去忽视阿德马尔总统那糟糕的餐桌礼仪。他在盘中挑挑拣拣，小口吃着美味的餐点。其他军官表现则不尽相同，有些人像卡斯特洛一样吃得很犹豫。剩下的人倒是吃得十分尽兴，就像阿毛里·克鲁埃尔将军那样，只有在和总统开开玩笑时才会停嘴。\n\n明眼人都能看出来，这一切不过是在收买人心。尽管如此，甘于接受这种诱惑的军官不在少数。卡斯特洛·布兰科暗揣，克鲁埃尔究竟受了阿德马尔多少恩惠，才会为新总统献上如此同志情谊。\n\n军队在过去考验过这位政治家与自己的合作能力。现如今，阿德马尔反过来在军队播下分裂的种子。卡斯特洛·布兰科只希望不要因此出什么差错。"
 brazil.143.a: "巨魔也能如此奸诈？"
 brazil.144.t: "公牛与雄鸡"
 brazil.144.desc: "自由法国的领袖何曾得到过一国元首如此盛情的接待呢？当戴高乐跨越整个大西洋，出现在飞机舱门前时，一整支总统卫队向他行礼致敬。\n\n阿德马尔总统与抵抗英雄双手紧握。老战士的肌肤饱经连年的苦难和非洲的炙烤，但他坚韧不屈的气场却依然强大。\n\n“将军阁下，欢迎来到巴西！”阿德马尔总统招呼着。戴高乐可能听懂了总统的话，他保持着礼貌性的沉默。两人边用法语聊着最近非洲和其他地区的局势，边走到等候的豪车前。当话题转到法国何时将得解放时，戴高乐的眸子变得暗淡无光。阿德马尔总统则对戴高乐信誓旦旦，坚称法国最终必然重获自由、大胜而归。老英雄微微颔首，脚下的步伐更有劲儿了。\n\n倾覆法国的大崩溃让不少法国人流亡到巴西。这些法裔巴西人虽然流寓他乡，手里却依然掌握着可观的资源。巴西社会的情绪无疑是同情自由法国的。因此，利用戴高乐的崇高威望有利可图。法国政府当然会提出抗议，但这无足轻重。"
 brazil.144.a: "自由法国的家伙们仍存几分体面，我们可以加以利用。"
 brazil.145.t: "工人的朋友"
 brazil.145.desc: "若泽·阿方索的白天格外漫长。相应地，他的夜晚异常短暂。在当地工厂上班时，他经常拾捡一些被丢弃的废料做成玩具，换班的时候摆摊叫卖。打两份工并不轻松。但是，鉴于自己糟糕的经济条件，这也是为了养家糊口的无奈之举。在这个国家穷人如同蝼蚁，被那些处于食物链上层的人踩在脚下。若泽的幸苦付出只为换来整个家庭能有一个相对安宁的生活，他决心不让那些穷人的凄惨命运同样降临到他的家人身上。\n\n因此，这个还算年轻的男人日复一日地工作。但他明白金钱并非全部。每个星期他都会抽出几个小时的时间和孩子一起玩耍。每个月父母来照看孩子的时候，他也得以陪同妻子享受浪漫的二人世界。若泽工作是为了生活，生活也是为了更好地工作。\n\n总有一些意外之喜点缀辛苦的生活。若泽从邮局中取走了好朋友阿德马尔的来信。信封里是厚厚一沓克鲁赛罗。这位前市长交际广泛。即便现在已经位居总统，他也没忘了当时结交的朋友，哪怕是像若泽一样的穷鬼。\n\n这些钱八成来路不明。但若泽对此毫不关心。这是个狗咬狗的国家。而阿德马尔是少有的坦诚待人的朋友：用金钱换选票。阿德马尔任职市长期间，即便圣保罗腐败横生，但经济却如同上油的车轮飞速向前。现在阿德马尔担任总统，那么相同的故事就将在整个国家重演。阿德马尔的资助给了若泽一天休息的时间。相应地，若泽也信守承诺，将选票投给他的朋友。"
 brazil.145.a: "那个不知道叫什么的人绝对当不上总统。"
 brazil.146.t: "打持久战"
 brazil.146.desc: "“好啦伙计们，”最后一位内阁成员进屋之后，阿德马尔总统开了腔。“下次大选迫在眉睫。”\n\n“您说得很对，但很多要务也需要我们倾注心力。”某位部长接道。\n\n“有当然是有。”总统说。“但是，社民党-工党那帮杂种会事事给我们使绊子。到大选的时候，他们会污蔑我们一事无成，把我们从台上赶下去。我敢说，拉塞尔达和全民盟那些漏网之鱼正等着火上浇油呢。疗愈国家的创伤这条路是不能先走了。”\n\n“那么您有什么打算呢？”副总统劳多·纳特尔此时发问。\n\n“获得人民支持，再度掌握政权，从容料理一切。一切都理所应当。”在座的部长们纷纷点头。“要做买卖，就必须搞定股东。我们连一根毛都不欠巴西利亚那帮蠢驴的，我们所求的乃是服务普罗大众的政策举措。等到大选的时候，如果芸芸众生都能在月底荷包充盈，他们自然会唯我们马首是瞻。选举必将轻松取胜。”\n\n“妙极了，总统阁下！”纳特尔说道：“我相信，您对从谁那里下手已经略有腹案了吧？”\n\n阿德马尔莞尔一笑，“那是当然。”"
 brazil.146.a: "我们开始谈正事吧！"
 brazil.147.t: "广播直播"
 brazil.147.desc: "总统的广播首秀着实让不少里约热内卢人吓了一跳。大概是有点什么事吧，阿德马尔总统在里约热内卢抽出时间参加了一档极其流行的夜间广播节目。\n\n第一次广播时，主持人在这位新嘉宾面前显得有些手足无措。不过，一个小时之后，总统的平易近人和非凡魅力就大发神威。总统愿意同主持人畅所欲言，谈论天南地北的事情，这一个小时的宝贵时光令人心醉神迷。\n\n从那时起，阿德马尔总统就不时在本市的各种广播节目中登台亮相。每当他路过这座城市时，市民们都一定要挤在收音机边等待收听总统谈话，不必置身于国会那种令人窒息的氛围里。批评家对总统花时间大谈最近的球赛或流行的菜肴嗤之以鼻，总统的听众群体却日益庞大，沉醉于听他们的领袖说长道短，甚至还挺乐在其中。"
 brazil.147.a: "阿德马尔主宰……电波？"
 brazil.148.t: "阿德马尔的旅程"
 brazil.148.desc: "卢一直庆幸于自己能在社进党内找到一份工作。在圣保罗，这个阿德马尔一手带大的组织一直是当地人向往的好去处。现在，阿德马尔从幕后走出，成为了这个国家的总统，卢的工作也比以往更加重要。不太忙的时候，他还会怀念过去自己在圣保罗骑着摩托到处送货的日子，但更多的时候他还是在享受在私人飞机上办公的新奇感觉。\n\n机库位于圣保罗空军基地的边缘。在那里，卢与社进党的一名规划师讨论了最后的准备工作。\n\n“阿德马尔总统将按照顺序访问这些州。你和安德烈要邀请一些当地的政治掮客，在总统没有演讲的时候安排会面。”\n\n“那么当地的社进党候选人呢？”卢问道。\n\n规划师疑惑地看着他：“你在说些什么，别的候选人？我们可是在帮助阿德马尔连任。”\n\n卢耸耸肩。“当然。那劳多·纳特尔那些人只能自求多福了？”\n\n规划师想了想，叹了口气。“我们的位子稳了的话，他们也能分一杯羹。现在当务之急是确保总统顺利连任。我们好不容易亲手搭建了一座纸牌屋，绝不能冒险让它倒塌。”"
 brazil.148.a: "卢是时候去走遍巴西了。"
 brazil.149.t: "阿勒茂的贫民窟"
 brazil.149.desc: "不久之前，这片地区还被称作莫罗多阿勒曼，即“德国人之山”。战争结束后，随着大量工厂的建立，越来越多的工人携家属定居于此，曾经的郊区也变得越来越拥挤。阿勒曼地区现在棚户成群，已经成为了新的“法维拉”，这是对巴西城市外围越来越常见的穷人居住区的统称。\n\n即便这片区域不是什么好去处，阿德马尔总统还是来到了这里，和潜在的选民亲切交流。他声称，这里的居民已经被城市里高高在上的政治家们遗忘了。但总统会尽职尽责，帮助像他们这样的里约人，以免他们在千年之交甚至更长的时间里一直陷于极度贫困之中。\n\n少数几个人为这场即兴演讲鼓掌。剩余的人仅仅是象征性地欢呼两声。当地人向来谨慎，不会轻易相信他人许诺的好处。在得到真正的帮助之前，他们会保留自己的判断。正当总统准备继续演讲之时，一位妇女却向其发难。他和他的政党都是一群只会说教的伪君子。像她这样的性工作者、小混混，以及在灰色经济中谋生的人，什么时候才能摆脱警察的不断骚扰？社进党向社会宣传着他们的社会保守主义。他们会给只那些想谋生的穷人一条生路吗？\n\n面对台下的质问，总统应对得沉着有度。警察维持治安是为了保护穷人利益不被犯罪分子侵犯。政府一直努力为穷人提供更多的上升机会，这不仅能帮助他们改善生活，也有助于减少犯罪。当然，这些机会一定会给到那些被迫出卖肉体的贫穷妇女。巴西不能让自己的女儿孤零零地生活在这个残酷的世界上。\n\n人群中不断有人发问。无论来者是谁，阿德马尔都自信满满地一一作答，即使答案并不总是他们想听到的。"
 brazil.149.a: "他们开始对总统有了更多的了解。"
 brazil.150.t: "巡回演出"
 brazil.150.desc: "一个晴朗星期五的下午，这座小镇上演了一场世界上最精彩的演出。村民们结束了在乡间田野的一天劳作，农具归位，牲畜归棚。阿德马尔和他的竞选团队也在此时乘坐卡车，整齐地开进小镇。总统将会见当地官员。通常是镇长，也有时是牧师。在简短的交谈之后，阿德马尔掉头前往酒吧。在那里，总统会和选民们亲切交流，询问他们关心的问题。听闻农民被本地大地主压榨，总统和一旁诉苦的人表现得同样愤怒，发誓他会为这些底层劳动者的权利而战。话里话外间，他还不停暗示着他是唯一会这么做的政治家。\n\n在和当地人交谈了一会后，总统向他们表示感谢，并再次承诺会为他们而战。他的车队如同来时一样浩浩荡荡地离开，看样子想在天黑之前赶到下一个村镇。村民们不知道的是，一个多月后，一笔从总统竞选连任资金中专门划拨的礼金就会出现在各自的家门口，以一种另类的方式表达了阿德马尔不会忘记这些穷苦农民。"
 brazil.150.a: "一个让他们记住他的好办法。"
 brazil.151.t: "最后阶段"
 brazil.151.desc: "一个宁静的下午，总统竞选已经步入尾声，似乎已经没有什么能改变最后的结局。总统和副总统悠闲地品着咖啡，阅读着下属撰写的报告。\n\n“情况不错，劳多。局面对我们有利，看样子连任也已经是手到擒来了。”\n\n“的确如此，阿德马尔。”\n\n“你那边怎么样？我们在立法机构的党员呢？”\n\n“选票同样领先。工党-社民党联盟在我们的舆论攻势下节节败退，全民盟同样不堪一击。埃德娜·洛特等几位少数候选人在副总统竞选中表现亮眼。但总的来看，选情地图对我们有利。”\n\n“埃德娜·洛特？”听到这个名字，总统有些惊讶，杯中的咖啡晃荡不稳。“老洛特的女儿？”\n\n“她是工党内的新兴力量，但在全国范围内无足轻重。你的竞选很成功，阿德马尔。是时候获取回报了。”\n\n“希望如此。让我们祈祷上帝，我们已经做的足够了。”总统说道，没有了往日的张扬。看到陷入沉思的阿德马尔，副总统挑了挑眉毛。然而，随着最后一口咖啡进肚，这一刻的忐忑也随之消失，总统又恢复了他往日的幽默。"
 brazil.151.a: "“十拿九稳不是嘛，劳多？”"
 brazil.152.t: "内阁改组"
 brazil.152.desc: "除了夸德罗斯本人以外，内阁会议中再也找不到任何洛特时代的印记。夸德罗斯荣登总统之位仅仅几小时，敲骨吸髓的社民党贪官污吏和工党社会主义分子就被扫地出门。全民盟接过了国家的船舵，拨乱反正。\n\n总统本人今天第一个发言。夸德罗斯一改媒体前的长篇大论，直扣大家都期待的话题。共和国因过高的支出和坏债而不堪重负，这些都得要解决，既是为了普通巴西人的福祉，也是为了能够不在美国这样的经济大国面前低人一等。外交政策是夸德罗斯任期的第二大核心。巴西不会再做美国的跟屁虫了，而是去结交世界上大大小小的国家，寻求合作，达成联盟。\n\n会议的基调确定下来后，就轮到部长们挨个发言了，其中最让人眼前一亮的当属经济部长小阿图尔·达·席尔瓦·贝纳德斯。贝纳德斯在米纳斯吉拉斯的商界精英中可谓是人尽皆知，他的发言提到了越积越高的债务问题，其对国家繁荣与外交政策的危害不可小觑。政府除了要削减支出，还要从经济中抽身而出，给予私人更多的自由，并通过减税让其能够保留住大部分的劳动果实。牺牲是必要的，但贝纳德斯相信，新的繁荣也会随之而来。"
 brazil.152.a: "先生们，开始干活吧。"
 brazil.153.t: "争取军方"
 brazil.153.desc: "将军们聚在一块儿，各种负面情绪在他们的脸上闪烁着。几个人愤怒地盯着总统，另一些则摆出一副不屑一顾的样子。这里面最耐心的那个站在离总统最近的地方，拿眼睛瞪着面前的这位奇怪人物。\n\n夸德罗斯总统尽力摆出自信的姿态。“——因此，全民盟希望军队能与行政当局继续保持良好关系。”\n\n“那么，总统先生，您为什么要篡夺洛特总统的位置？他可是我们的战友。”\n\n“洛特总统，”夸德罗斯暗暗骂娘，继续说道，“在他的腐败、和对左翼激进分子的姑息方面，表现出严重的疏忽。”\n\n“洛特这人头脑简单，但他很有原则。你还说腐败，去年那会儿你说过腐败的事吗？”一位将军嘲笑道。总统还没来得及还嘴，陆军元帅布兰科的声音响了起来。\n\n“肃静！”元帅转向总统。“洛特玩弄政治，结果自取其辱。此事暂且不提，我们要关注更重要的事情。总统先生，您的政府将如何处理南非战事的乱局？巴西的干预行动还会继续吗？”\n\n“不会，元帅。”将军们顿时乱作一团。绝大多数军官开始就非洲战事、洛特总统的优点以及与OFN加深联系的好处展开争论。夸德罗斯站在大家面前，他精心准备了一篇演讲，内容是关于中立外交政策的优点，以及避免骄傲的巴西战士无谓死亡化为乌有的重要性。争论继续着，布兰科元帅则面无表情地看着他。\n\n看来这不是一个好的开始。"
 brazil.153.a: "别在作战室里打架！"
 brazil.154.t: "拉塞尔达的乌啼"
 brazil.154.desc: "卡莎萨并不能帮他缓解心中的痛苦。几块从杯中飞出的碎冰掉落在报纸上，逐渐和墨迹相溶，浸染了廉价纸张的每一处角落。本该传达真实客观的铅字此刻却输出了如此多诽谤和谎言。总统漫无目的地捡起一旁干瘪的青柠，将其撕成碎片。\n\n在报纸上揭露拉塞尔达恶行的计划未能成功。乌鸦置身事外，而他的亲信开始还击。如今夸德罗斯的政治形象十分难看，拉塞尔达却可以高高在上地肆意嘲笑。无论是民间的夜间晚报和丑闻小报，还是严肃的保守派日报都做了报道，后者尤其伤人。但至少全民盟的内部派系还没有对这次失败给予太多关注。\n\n卡莎萨、冰块、青柠……糖？夸德罗斯把刀扔在桌子上，踉踉跄跄地起身。他需要更多的糖。在去厨房的路上，他在窗边停了下来。窗外，夸德罗斯看到远处栅栏外有无数乌鸦。镜头闪了几下。拉塞尔达的记者朋友一路上都在嘲笑他，即便在总统府外也要抓住一切机会窥探总统的丑态。毫无疑问，他们稍后还会缠着总统，问一些他们早就想好答案的问题。也许窗外的不是乌鸦，而是食腐鸟。\n\n夸德罗斯叹了口气，继续寻找能给人慰藉的白糖。"
 brazil.154.a: "他们晚上就没别的事干了吗？"
 brazil.155.t: "来自欧洲的邪恶力量"
 brazil.155.desc: "夸德罗斯总统上台执政后，深耕民生领域，带领巴西人民重回生活简单，民风淳朴的和谐时代。勤劳的工人收入丰厚，和睦的家庭比比皆是，合理的施政成为常态。但仅仅如此吗？总统再一次发起号召。他希望将巴西大陆上的罪恶涤荡一空，所有非法和不道德的行为再无容身之所。\n\n夸德罗斯总统并不满足于利用职权打击来自欧洲的诸如法西斯主义、种族主义、马克思主义等异端邪说。他最近签署了一项法律，正式禁止“克里米尼”。这种危险的新潮广泛流行于法国的叛逆青年之间，外观类似女士泳衣，仅仅遮住私密区域的三片布料根本无法阻挡旁人的目光。“克里米尼”以法语中的“迷你”和德国在克里米亚的火箭试验场命名，寓意着几平方厘米布料之下隐藏的迷你“火箭”也能给人以冲击，在全世界大受欢迎。游击队员庆祝于欧洲腐朽的道德制度又遭到反叛。而犬儒主义者认为这只是在法国经济衰退的背景下妇女前往海滩的一种廉价穿搭而已。\n\n夸德罗斯总统则认为这是对国家福祉的危险攻击。能让年轻男女们血液沸腾的不止热带温暖的阳光。如果正直的巴西男人知道几英里外成群结队的日光浴女郎正展示着诱人的躯体，他们将如何专注于手头的工作？共和国的未来，巴西人民的未来，都取决于能否消除这种对个人美德和公序良俗的新的意识形态威胁。目前，一支新的警察队伍正在接受镇压骚乱的培训，以驱逐那些撩人的，危害治安的日光浴女人。"
 brazil.155.a: "本届政府最紧迫的问题。"
 brazil.156.t: "旭日之国的大使"
 brazil.156.desc: "日本帝国驻巴西大使一直被当成一份闲职。除了含糊地争取着日系巴西人的权益外，大使一般无事可做。巴西毕竟是OFN的地盘，而这个国家的商界除了深化与美国的联系外对其他事情兴致缺缺。少数日本商人只在边缘活动，而最好的肥缺都被扬基佬占据着。\n\n因此，新总统的正式晚餐邀约对于日本大使来讲可谓惊喜。席间，两人探讨了两国的贸易改善和关系解冻等问题。\n\n大使长久以来一直关注着这位古怪的副总统，以及他对于共荣圈和巴西建立更紧密联系的尝试。夸德罗斯前往共荣圈的旅程让日本驻巴西使馆恢复了活动。几个使馆特务总监部探员甚至试图将触须伸进夸德罗斯的办公室，只是不怎么成功。现在这个男人已然成为了总统，也许有些事情将会发生变化？"
 brazil.156.a: "美妙的晚餐，更美妙的谈话。"
 brazil.157.t: "外交桑巴"
 brazil.157.desc: "阿丰索·阿里诺斯·德·梅洛·佛朗哥并非第一次参与政治。四十年代，他呼吁结束新国家；五十年代，他协助通过了一项旨在反对种族歧视的法律。这些年来，形形色色的政客他都见识了许多，但没有一个像他的新任上司那样。\n\n“作为外交部长，你需要带领我们离开南非那个是非之地。”夸德罗斯总统在办公室内踱步。佛朗哥则坐在一旁，头枕在拳头上，思索着什么。“我们必须让那些扬基佬知道，巴西将不再任人摆布。那些无条件追随美国的日子一去不复返了。”\n\n“这非常好，先生。”佛朗哥谨慎地开口。“这将是我们未来政策必将坚持的一点。请问我可以不用负责国内事务了吗？”\n\n“当然，德·梅洛·佛朗哥先生。你出国时，我会处理好国内的问题。”夸德罗斯微笑道。佛朗哥点头，尽力让自己显得胸有成竹。“接下来工作的重点是为巴西寻找新朋友，不论大小。和西非国家建立更加密切的联系尤为重要。在这个动荡的年代，我们南方国家必须团结一致。但在这之前，德日美三个强权的胃口还是需要满足。”\n\n“当然如此，先生。”佛朗哥轻抚下巴，若有所思。这是关于他个人事业和巴西未来的前所未有的机遇。只要总统能够维持国内环境的稳定，国外有非常多的利好共和国发展的机会等待他去争取。在这不寻常的时代，还有谁比这位不寻常的新任总统更适合领导国家呢？外交部长试图说服自己。"
 brazil.157.a: "“我要打几个电话，雅尼奥。”"
 brazil.158.t: "暴风雨般的会议"
 brazil.158.desc: "林肯·戈登被派往巴西。他的任务是确保这个伟大的南美共和国内部风雨飘摇的政治不会被共党或法西斯煽动者趁机操纵。最重要的是，巴西和美国必须步调一致，无论代价几何。在此期间，戈登着重监视瓦加斯主义群体和社民党-工党领导联盟中的可疑成员。然而调查结果令人心头沉重。在新任总统的影响下，原本对美友好的保守政党如今却成为美国地区利益的最大威胁。\n\n“夸德罗斯总统，恕我直言，美国人民对您试图脱身于南非冲突的行为感到震惊。”\n\n“我无意对美国人民不辞危险支持自由的英勇行为表示不敬，大使先生。”相比于夸德罗斯的车轱辘话，他那份事不关己的平静更令人愤怒，也更让戈登失望。“但应对巴西内部的政治问题我们已是自顾不暇，根本无力干预非洲局势。”\n\n“您反对南非战争的立场绝非从今日开始。早在上次巴西政治危机，您接替洛特之时便表达过类似倾向。”另一位外交官指出。\n\n“我说话算话，戈登先生。我一直坚持巴西需要同美洲共和伙伴们保持深厚的友谊，同时将目光投至大西洋和太平洋沿岸，在世界中找寻应有的位置。”\n\n“我完全理解。”戈登回答道。\n\n会议持续了一段时间。就大使看来，巴西毫无疑问已经处于火药桶上。新上任的疯狂总统并未意识到他的所作所为会危及国家稳定。未来几年戈登的工作将会愈发困难。"
 brazil.158.a: "屋里就美国人成年了。"
 brazil.159.t: "没有朋友，只有利益"
 brazil.159.desc: "夸德罗斯对拉塞尔达没啥好印象，拉塞尔达平常也不给他什么好脸色看。看着拉塞尔达的表情，夸德罗斯明白，这个保守派对手今天心情很差。\n\n“总统先生，我想问些关于对德关系正常化的问题。”\n\n“问吧，拉塞尔达先生。”\n\n“总统先生，简直是奇耻大辱！你和那帮搞种族灭绝的恐怖分子恢复关系干吗？昧着良心赚黑钱？脸都不要了！”拉塞尔达痛斥道。\n\n“巴西拥有独立的外交权。我们和德国人将求同存异。我们的委员会正在调查哪些人雇佣了奴隶，这样……”\n\n“他们全他妈是疯子！没一个好人！你让巴西人出尽洋相！华盛顿方面已经……”\n\n这下轮到夸德罗斯发火了。“拉塞尔达先生，你起个床是不是也要请示一下美国人啊？美国人自称信仰自由，信仰人权，那他们派兵遣散那些中美洲香蕉共和国的工会的时候，他们侵略海地和古巴，把当地人抓进种植园里的时候，自由和人权到哪去了？国家间没有朋友，只有利益。美国人一点也不在乎满洲和波兰的奴隶。他们只关心他们自己的国家利益。”\n\n“那你也要和美国人一样堕落吗，总统先生？”拉塞尔达有气无力地反驳道。夸德罗斯摇摇头，便把这无礼之人赶出去了。"
 brazil.159.a: "巴西要不惜一切代价摆脱华盛顿的控制。"
 brazil.160.t: "东京之旅"
 brazil.160.desc: "对于采访共荣圈之外的国家领袖这一新鲜事，日本媒体还感到不太习惯。与背离政党路线的人打交道可不是一件寻常的事，这位来自巴西的异乡总统夸德罗斯，面对媒体关注自然喜出望外，他在位于东京的酒店会议室里，面对与会记者开始了长篇演讲，阐述了巴西与共荣圈推动合作关系的重要性。总体上看，与会媒体心情愉悦，聚精会神地聆听着总统的长篇大论。\n\n“当然，巴西需要与亚洲国家建立更加紧密的关系。”总统通过身旁日经新闻社为他请来的翻译向媒体发话；“毕竟，世界上没有比中华、大和以及朝鲜更伟大的民族了。”他这句话说完，翻译也不假思索，照翻不误。听到这里，台下的观众开始窃窃私语。“朝鲜人吗？”现场的气氛顿时沉闷了下去，而夸德罗斯总统预先排练过的演讲，也因这措不及防的情况变得磕磕碰碰：“呃，朝鲜作为第一个被大日本帝国纳入泛亚主义的民族，自然是拥有着特殊的地位。”有些听众点了点头，但先前愉悦的氛围却一去不复返。对于巴西总统说的话，记者们要更加仔细地斟酌才行了。"
 brazil.160.a: "也许共荣圈里的一些成员不那么平等？"
 brazil.161.t: "另一只鹰"
 brazil.161.desc: "如果说日本驻巴西大使馆的职位长期以来被视作闲职，那么德国代表的日子就像在养老院一样悠闲。自第二次世界大战结束以来，德国大使就被历届总统无视。不幸的是，这一局面必须在新任总统这里打破。邀请夸德罗斯总统共进晚餐的并非是些令人讨厌的角色。他们都是老资历的纳粹党员，看起来和蔼可亲，在日耳曼尼亚的勾心斗角中早已失宠，不过还没到扔到专员辖区自生自灭的程度。大使似乎很高兴有人相陪。在他的脸上，总统看到了过去几年的工作成果——所谓条顿人不可战胜的意志早已被腐蚀殆尽。毕竟希特勒的死无疑对这个所谓高等种族带来了沉重打击。\n\n晚餐的菜肴并不精美，二人也只是随便说些闲话。大使嘲笑美国将黑人地位问题处理得一塌糊涂，而后转口称赞混血人群在巴西是多么温顺。夸德罗斯咬牙切齿。让他说出这些话简直是难以想象的外交失误。他迅速转移了话题。\n\n“呵呵……日耳曼尼亚那边有传来你以后工作安排的消息吗？你在巴西待得够久了，大使先生。”\n\n“唉，我也快该回德国了。”大使叹了口气。“还没消息，还没消息。”"
 brazil.161.a: "夸德罗斯好替他难过啊，真的。"
 brazil.162.t: "开胃菜"
 brazil.162.desc: "德·梅洛·佛朗哥觐见总统，汇报他最近的国务活动。外长组织了与三位列强使节的会议，还不断给美国代表写信，在信里保证夸德罗斯总统是并将永远是美国最好的挚友。\n\n“阿丰索，干得漂亮！你的苦劳我铭记于心。不过，还有些事要麻烦你。我们现在已经开辟了与列强联络的新渠道，但这些渠道还有待开发。我们必须大力发挥独立外交政策的全部优长，襄助祖国腾飞。”\n\n“您所言极是。”外长向他的顶头上司呈递了一个文件夹。“恕我冒昧，我已经自行与渴望得到外国发展援助的西非诸国建立了联系。我们只要能赶在那些大玩家下注之前先行投注，非洲就是一片机会丛生之地。”\n\n夸德罗斯不禁露出微笑。“非常妙，佛朗哥先生。该让巴西翻云覆雨了。”"
 brazil.162.a: "“有道理啊，总统先生，有道理。”"
 brazil.163.t: "步入正轨"
 brazil.163.desc: "在一次沉闷无聊的全民盟会议上，总统抛出了这则宣言。总统就像是个外星来客似地，讨论着自己接下来的规划：独立外交政策。其中有些观点不难接受，例如寻求更多的贸易伙伴；有些观点则相当令人担忧，比如说，“走出美国的阴影”。此时此刻，这个全新的想法就像是一枚拉开引信的手榴弹，落在了会场中央。\n\n“总统先生，您想要做什么？您是在开玩笑吗？”一名声望卓著的拉塞尔达派参议员高声问询道。夸德罗斯总统则语气平和地回应，显示自己确实是认真的。参议员又追问道：“你总不会想把我国最高的国家荣誉颁给某个……共产主义垃圾吧？”\n\n“先生，你口中的‘垃圾’，在德国企图侵占古巴岛屿的时候帮了菲德尔·卡斯特罗大忙。虽然他秉持的意识形态令人遗憾，但埃内斯托·格瓦拉无疑是我们这个时代最伟大的拉丁美洲爱国者之一。”\n\n“但共产主义与我国在这片大陆上所珍视的一切都背道而驰。”参议员继续反驳道，“现在美国人就在离佛罗里达一百公里之外的某个失败国家里深陷泥潭，而我们，绝不应该在西半球给这些个无稽之谈煽风点火！”\n\n会议室渐渐变空。趁着辩论的间隙，不少全民盟党员已经悄悄从后门离席而去。他们明白，既然总统已经下定决心，那就已经没什么好争辩的了。夸德罗斯总统的固执死板与过去的洛特堪称不相上下，而当下，这位号称保守的总统却要邀请一个浑身浴血的马克思主义者来到巴西。"
 brazil.163.a: "这个蠢货是在嘲笑我们党！"
 brazil.164.t: "血液之问"
 brazil.164.desc: "一位全民盟的成员在党派战略会议的间隙遇上了总统。“阁下！”\n\n夸德罗斯总统转过身来，给了他一个灿烂的微笑：“啊，马塞洛。我们在众议院的议员之一，对不对？”\n\n马塞洛吃了一惊。“是的，阁下。阁下，我想打探一下取消日本移民限制的事。我……呃……”议员的思绪被总统天使般的微笑带偏了片刻。\n\n“是啊，解除这些限制。多么伟大的政策！我很感激全民盟在这里程碑式的立法上提供的帮助。巴西，这个血管里流动着历史悠久的欧洲血液与热情似火的非洲血液的国家，即将迎来柔和的东方血液作为调和。”\n\n“但是阁下，不受控的移民会给国家带来混乱，特别是这些日本移民。这群日系不能被信任，阁下。我恳求您改变方针。”\n\n夸德罗斯将手搭在议员肩上。“没必要害怕。日本人都头脑冷静，他们的子女也不会给巴西带来任何骚动。再说了，想想巴西和共荣圈之间更强大的经济纽带！好了，原谅我年轻人，不过我们还有更多活要干呢！”\n\n说着总统便离开了，把生气而又困惑的议员留在身后。全民盟中总统的反对者还得组织的更好一点才行。"
 brazil.164.a: "我能预见的只有亚马孙河要溢满鲜血。"
 brazil.165.t: "新计划"
 brazil.165.desc: "巴西利亚天气晴朗。恩里克·特谢拉·洛特很高兴能在这样美好的一天于高原宫内会见来宾——既不是他的政坛对手，也不是处事失职的官员，更非有求于他的难缠访客。\n\n恰恰相反，到来的是他相当尊敬的前辈，儒塞利诺·库比契克，洛特所在的社民党内元老。他们之间有充分的理由将彼此视为朋友和导师。早在1955年库比契克参与竞选之时，洛特协助护宪派保护他免于政变分子的攻击。当洛特于1960年角逐总统之位时，库比契克又帮助这位曾经对政治不感兴趣的元帅了解政治规则。现在二人重聚于此，讨论总统的一项新计划。既然夸德罗斯的残留问题已经彻底解决，洛特终于有余力考虑其他的议题。\n\n“儒塞利诺，我已经遵循你和内维斯的政治路线很长一段时间了，成效也十分不错。但我希望现在做点什么来确立我的地位，留下我的政治遗产。”\n\n库比契克笑了笑：“我完全理解。巴西利亚的建设你也只能锦上添花，而且跨亚马孙高速公路完工时日尚久。你有什么想法？”\n\n洛特微微一笑：“我计划推进军队去政治化，逼迫索邦派和其他强硬派交出权力，让护宪派在军队中占据主导。从此往后就无需担心军队会再次掌权。”\n\n库比契克激动异常，这是他从未考虑过的。“真是他妈的大好事，再也没人能复刻我们的旧事了。”"
 brazil.165.a: "“你有我撑腰，恩里克。”"
 brazil.166.t: "计划继续"
 brazil.166.desc: "[BRA_event_166_loc]"
 brazil.166.a: "这都是为了巴西好。"
 brazil.166.goulartpath: "“巨嘴鸟行动旨在一劳永逸地消除军队干涉巴西民主秩序的威胁。我们将对武装部队进行去政治化工作，让将士们明白，他们只不过是身着戎装的公民而已。”\n\n当巴西总统恩里克·特谢拉·洛特环顾会议室时，他揣摩着内阁成员的态度。他的副手若昂·古拉特承诺全力支持他。坦克雷多·内维斯也表示认可，还说夸德罗斯完全靠得住，洛特也可以指望他的支持。瓦尔特·萨莱斯虽然没有夸德罗斯那么积极，但似乎也很支持。\n\n另一方面，房间里的另一位军人奥迪利奥·德尼斯元帅则显得不那么积极：“恩里克，这主意相当不错，我不否认。但小心驶得万年船。如果我们得罪了不少人，事情就会走下坡路；也许你会为此感到后悔。”\n\n洛特摇了摇头：“军方要是清楚什么才对他们有利，他们就会服从命令。这必须做到，而且必须立即做到。”"
 brazil.166.quadrospath: "“巨嘴鸟行动旨在一劳永逸地消除军队干涉巴西民主秩序的威胁。我们将对武装部队进行去政治化工作，让将士们明白，他们只不过是身着戎装的公民而已。”\n\n当巴西总统恩里克·特谢拉·洛特环顾会议室时，他揣摩着内阁成员的态度。他的副手雅尼奥·夸德罗斯似乎非常欣赏彻底杜绝军方政变的想法。他说得很清楚。“这主意不错，恩里克，我会力挺你的。”\n\n坦克雷多·内维斯也表示认可，还说夸德罗斯完全靠得住，洛特也可以指望他的支持。瓦尔特·萨莱斯虽然没有夸德罗斯那么积极，但似乎也很支持。\n\n另一方面，房间里的另一位军人奥迪利奥·德尼斯元帅则缄默不语。“恩里克，这主意相当不错，我不否认。但小心驶得万年船。如果我们得罪了不少人，事情就会走下坡路；也许你会为此感到后悔。”\n\n洛特摇了摇头。“军方要是清楚什么才对他们有利，他们就会服从命令。这必须做到，而且必须立即做到。”"
 brazil.167.t: "两位总统的会面"
 brazil.167.desc: "巴西利亚天气晴朗。恩里克·特谢拉·洛特将在这样美好的一天于高原宫内会见前任总统，空军元帅爱德华多·戈梅斯。\n\n过去戈梅斯和洛特不和的原因有二。首先，前者作为全民盟党员击败了社民党候选人，欧里科·加斯帕尔·杜特拉元帅，成功当选总统。其次，1955年大选之后，儒塞利诺·库比契克遭到军队叛变分子攻击。洛特全力以赴维护宪政秩序，而戈梅斯却保持中立。\n\n他们在很多问题上分歧严重。但好在这位空军元帅还愿意听取不同的意见……附带一些条件。\n\n“好吧，恩里克。我可以支持你。但我有几个要求。”\n\n“请说。”\n\n“空军需要更多的资金支持，并且我的部下要担任些重要职位。还有，几个飞行俱乐部不能被别人插手。”\n\n洛特有些不高兴。但凭此就能换得戈梅斯和空军的支持……总的来说，这个交易还算不错。"
 brazil.167.a: "“就这么定了，爱德华多。”"
 brazil.168.t: "萨尔门托酝酿不满"
 brazil.168.desc: "亚马孙州首府马瑙斯今日阴雨绵绵。西塞诺·萨尔门托又气愤又烦躁。尽管他已在巴西武装部队忠诚地服役多年，但此刻却被调任到这个穷乡僻壤担任“当地部队总指挥”（每天的工作只有早晚检阅总共一千名左右的预备军人）。军方内部有一伙人坚信执掌巴西是他们的使命，否认平民有能力治国理政（那些低能的白痴当然不行）。而萨尔门托与这一派系关系密切，况且调任之前他对时任元帅多有不敬（他就是个一无是处的臭虫，罪有应得）。但这一切太过分了，都去见鬼去吧！不管是不是总统，洛特他妈的有什么权力这么对待他！\n\n接下来的几周，无用的抱怨在萨尔门托脑海中一遍遍重演，将他拖入令人绝望的深渊。而他与以前的部队及高原宫的联系也全部断绝。无所事事地躺平一段时间后，萨尔门托不再怨天尤人，从沮丧中振奋精神，开始策划如何在下届总统任期内东山再起。当然，私下里对洛特的咒骂绝不会停止。"
 brazil.168.a: "相反，洛特很高兴终于不用再看见这家伙了。"
 brazil.169.t: "克鲁埃尔死得其所"
 brazil.169.desc: "恩里克·洛特看着这份报告，心中祈祷着这一切没有发生。他多么希望有人能接替他的位子。他不愿亲手处置克鲁埃尔——既是老朋友，也是老战友，但他别无选择。这位元帅用收受的巨额贿赂购买了大量土地，一夜间化身大农场主。他必须接受惩罚。\n\n正当洛特准备签署因腐败和渎职解除克鲁埃尔职务的法令之时，战争部长德尼斯元帅走进房间，面带忧虑。“恩里克，这样做合适吗？反腐会戳到很多人的痛处，你会得罪一大批人。这件事肯定还有别的办法，我知道你根本不想这么做。”\n\n洛特叹了口气，微微摇头。“我虽然是巴西总统，也是军队的退役元帅，但我的所想所做必须让位于法律。克鲁埃尔贪了这么大一笔钱，他必须滚蛋。我不在乎别人怎么想。那群反对宪政，认为军队优于一切，甚至幻想着哪天执政的人有什么好怕的？”\n\n德尼斯点了点头。洛特他的思绪集中于克鲁埃尔到底从哪搞到了这么多钱，没有发现他是那么沮丧。多年以后，阿德马尔或许会被揭穿为真正的幕后黑手。但眼下，洛特只能苦苦思索，而一旁的德尼斯在尽力掩盖心中的不快。"
 brazil.169.a: "为了挽回剩下的大多数人，洛特不得不对克鲁埃尔下狠手。"
 brazil.171.t: "海军陆战队事宜"
 brazil.171.desc: "恩里克·特谢拉·洛特收到了一则有关他的国家的两栖精锐，海军陆战队的秘密调查报告。按理说，这群精锐们应该比一般士兵表现更为出众，标准也更为严格。但事实并非如此，洛特对他所看到的一切大失所望。\n\n军中目无法纪，时常贪污腐败，滥用职权。同时也有报告称他们还滥用分发的装备。海军陆战队员们在退役之后带着装备跑路的事并不稀奇。但这之中最令洛特担心的还是那些拙劣的“玩笑话”，海军陆战队经常叫嚣着要铲除他们不喜欢的政客。\n\n这决不能发生，以后也不该发生。洛特决定先下手为强，在他们成为心腹大患，或者变成强硬派夺权的棋子之前，他要采取措施。他需要德尼斯的帮助。他知道这回老元帅很可能会站在他这边，此乃大幸。"
 brazil.171.a: "“请把德尼斯元帅叫来。”"
 brazil.173.t: "洛特元帅的沉思"
 brazil.173.desc: "[BRA_event_173_loc]"
 brazil.173.lottactfailed: "对恩里克·洛特而言，这四年充满挑战。他要处理很多事：侵犯巴西水域的纳粹、经济低迷、南非战争、神经兮兮的副总统、大喊大叫的反对派政客、蝇营狗苟的贪官污吏，尤其是企图造反的军方。\n\n他本打算为自己以及之后的继任者拆掉这颗诡雷，可惜功败垂成。有一项法案旨在彻底消除军方扰乱巴西民主秩序的隐患。武装部队会根据该法案进行去政治化，让海陆空三军将士明白，他们只不过是身着戎装的公民而已。遗憾的是，事情没有按照他的想法来。他被军队的逆贼和反对派政客击败，这也成为了他未了的心愿。\n\n啊，好吧。这无关紧要。他会找个地方短暂休假（自然不会是瓜纳巴拉），然后静养一阵子。片刻休整后，他会再穿戎装，并作为护宪派的一员尽力左右军队做出正确的决策。"
 brazil.173.lottactpassed: "对恩里克·洛特而言，这四年充满挑战。他要处理很多事：侵犯巴西水域的纳粹、经济低迷、南非战争、神经兮兮的副总统、大喊大叫的反对派政客、蝇营狗苟的贪官污吏，尤其是企图造反的军方。\n\n他为自己以及之后的继任者拆掉了这颗诡雷。有一项法案旨在彻底消除军方扰乱巴西民主秩序的隐患。武装部队会根据该法案进行去政治化，让海陆空三军将士明白，他们只不过是身着戎装的公民而已。感谢上帝，一切都实现了。军队的逆贼和反对派政客都落败了，现在的他心满意足。他做得事够多了，总算能走了。\n\n啊，好吧。这无关紧要。他会找个地方短暂休假（自然不会是瓜纳巴拉），然后静养一阵子。片刻休整后，他会再穿戎装，并作为护宪派的一员尽力左右军队做出正确的决策。"
 brazil.173.a: "总统成为了元帅。"
 brazil.173_tt: "§Y巴西合众国总统恩里克·特谢拉·洛特元帅将继续演绎自己的传奇。另一方面，我们将继续讨论由谁担任他的继任者。§!"
 brazil.174.t: "洛特法案未获通过！"
 brazil.174.desc: "今日，《洛特法案》未能在参议院表决通过，国会大厦中，指责与叫骂声不绝于耳。《洛特法案》旨在限制军人可以采取的政治行动，以限制军队目前拥有的政治影响力。该法案在军队内部引起了激烈的争论，但似乎最终是强硬派取得了上风。洛特总统作为法案最主要的发起人，他希望能在军队中安插些护宪派盟友，以根除强硬派影响，但计划似乎没能成功。此外，洛特总统拒绝撤回法案的行为也引发了巴西三军极大的愤怒。\n\n军方对政治的影响早已司空见惯，再考虑到巴西国内政治思想的百花齐放，巴西的民主可以说是相当脆弱，动荡的种子早已埋下。尽管军方承诺将继续捍卫民主，并坚称目前、乃至将来，都没有任何干预民主选举的计划，但只要是明眼人，都能看出军方害怕左翼主导的政府。工党-社民党希望对军队改革，这更是加剧了担忧，可能导致未来军队与政界的又一次对垒。现在，军队仍然享有政治豁免的自由，无论好坏。"
 brazil.174.a: "真倒霉。"
 brazil.175.t: "洛特法案获得通过！"
 brazil.175.desc: "今天，国会大厦中洋溢着欢呼与掌声，《洛特法案》已在巴西参议院获得通过。该法案旨在削弱军方在政治及国家日常事务中的影响力，尽管军方试图暗中阻挠其通过，但它仍然在参议院得到了多数支持。自新国家体制时期以来，巴西军方就是政治生活中极其不平衡的一股力量。相较于国家当下的问题和连任，候选人们总是不得不首先权衡军方的态度。洛特总统本人就出身军队，他对海陆空三军的军官团进行了大刀阔斧的改革，意在以护宪派盟友取代军方强硬派的地位。\n\n顾名思义，护宪派希望减少军方在巴西政治事务中的作用，而是将重心完全置于保卫国家之上。近来，洛特总统和护宪派慢慢将强硬派军官们挪到了无关紧要的岗位上，或是“鼓励”他们提前从军中退役。护宪派已经是军队中的多数，民众希望他们能放弃干预未来的选举，促进政治权力的民主移交。虽然仍有部分军方势力并不拥护《洛特法案》中的各种改革，但以他们的地位和实力，根本无从撼动法律。"
 brazil.175.a: "保障权力和平移交的必要步骤。"
 brazil.176.t: "选举季"
 brazil.176.desc: "又到了巴西政党为选举季做准备的时间了，今年的选举季将选举出每个州份三个参议员席位中的一个。\n\n全民盟和社民党-工党联盟之间的斗争已陷入胶着，而社进党正盼望着成为新的选举力量。全国的选民们都将获得决定巴西未来的机会。"
 brazil.176.a: "投给全民盟！"
 brazil.176.b: "投给社民党！"
 brazil.176.c: "投给工党！"
 brazil.176.d: "投给社进党！"
 brazil.176.e: "如果你看到这个对话框，请报告错误。"
 brazil.177.t: "巴西选举"
 brazil.177.desc: "竞选标语被撕下，投票站空无一人，电台广播忙于报道得票。在巴西，计票工作正在进行，举国上下屏息以待，胜者应该很快就会揭晓。"
 brazil.177.a: "选票清点完毕……"
 brazil.170.t: "公路竣工！"
 brazil.170.desc: "终于！在日复一日的艰辛劳动和不计代价的高昂投资之下，跨亚马孙公路终于蜿蜒抵达了巴西与秘鲁和哥伦比亚的边境。公路的落成使亚马孙的幽深心脏与巴西的繁华都市相互连接，它将成为整个国家贸易与运输事业的生命线。这堪与苏伊士运河相提并论、甚至犹有过之的伟大工程如今大功告成，向全美洲、甚至全世界表明，巴西的崛起之势如熊熊烈火，从来都不曾减弱半分。\n\n街巷里、马路旁，到处都在庆祝。为公路泼洒汗水的工人们正在享用免费的酒水饮食，政界权威高悬的心脏终于可以放下，每一位公民都走上街头，庆祝这团结一致的民族所取得的伟大成就。即使是那些对公路项目一直持批评态度的反对者也不得不承认，巴西将永远从这项宏伟的工程中受益。烟火在巴西利亚、圣保罗、里约热内卢的上空绽放，点亮了满是繁星的夜空。\n\n跨亚马孙公路的经济效益自不必提，但它的建成不光是经济上的胜利，更是政治上的胜利。巴西的各位达官贵人、部长将军，纷纷办起盛大派对，庆祝这一场伟大胜利——毕竟每一位政府同仁都将因此大受欢迎，选票更是拿到手软。外国的确认和祝贺开始如潮水般涌来，世界对巴西的成功和这令人目眩神迷的发展成果的反应充斥着怀疑、喜悦，或是纯粹的惊讶。\n\n一个小女孩看着这条奇怪的黑石之路穿过一从树木，想知道它通向何处。突然，远方传来一声呼啸，就像那些为黑石开路的巨大机械发出的声音一样响亮，把她从思绪中惊醒。她跑回茂密的丛林间。一辆公共汽车疾驰而过，男人们把手耷拉在窗户外面晃荡着，大声唱着醉醺醺的歌。对这女孩来说，公路标志着一种不同的进步。"
 brazil.170.a: "亚马孙会在很长很长一段时间内回响着引擎的轰鸣声。"
 brazil.178.t: "成熟收获"
 brazil.178.desc: "埃格贝布勒很幸运，能在中非找到一份远离钻石矿的工作。因为长期招不到人，他的船长，一个住在利奥波德维尔的比利时人，只是略微看了看简历就雇佣了他。船员们都来自五湖四海，他们中有德国人、英国人、比利时人，相比之下，埃格贝布勒成了船上唯一的黑皮肤。即便如此，没有一个人向他投来过异样的目光，这也让他更加珍惜待在海上的时间。\n\n埃格贝布勒并不傻，早在应聘那会儿，他便隐隐觉察到这份工作一见不得光二招不到人的背后原因。果不其然，他的猜想被游弋在海面的巴西巡逻艇证实了。日子一天天过去，埃格贝布勒的手脚愈发麻利，出一次海的报酬在家人眼里如同天文数字，而正是这一点使他不断压制心中的焦虑，从不发表一句怨言。有好几次他都下定决心，跑完最后一趟就光荣退休，但巨大的贪欲又驱使着他一回回食言。\n\n过去的几个月，情况变得十分危险：巡逻艇离他们越来越近，近到几乎要一头撞上。不仅如此，他们还从广播里听闻巴西政府计划加大打击力度。虽然船长一度担心得想半路折返，但最终还是被埃格贝布勒等人说服。毕竟，这次要去的地方大有搞头，再坚持一下就能赚得盆满钵满。\n\n事发当时，埃格贝布勒正待在厨房。突然，外面传来“砰”的一声巨响，他只感到一阵天旋地转，费了好大劲才重新站稳。接着，引擎的轰鸣声消失了，他刚要走出去，三个全副武装的人便破门而入。看着眼前黑洞洞的枪口，埃格贝布勒很快明白了自己的处境，举起双手以示投降。他和其他船员一起当了俘虏，被人用葡萄牙语大声吆喝着赶到了另一艘船上。与此同时，渔船上的万字旗缓缓降下，取而代之的则是一面迎风招展的巴西国旗。"
 brazil.178.a: "大自然能满足人的所需，却无法成全人的贪欲。"
 brazil.179.t: "策略简论"
 brazil.179.desc: "“……还有迪特里希·埃卡特号。拖网渔船，150吨重，在罗安达注册。”奥迪利奥·德尼斯元帅介绍道，“那么，从昨天算起，这就已经是第四艘船了，总统先生。他们下一步会做什么还有待观察，但我很难想象柏林——”\n\n夸德罗斯推开总统办公室的大门，闯了进来，问道：“你们是不是和托斯卡诺说了扣押那些德国船？甚至根本没有知会德国方面？”\n\n“是的，”洛特说道，“谈判毫无进展，他们的渔船继续明目张胆地掠夺咱们。所以现在就没有必要跟中非讲道理了，必须让他们知道咱们不好惹。”\n\n“恩里克你不能这样，你真觉得这样做有意义吗？穆勒一样不想让事情闹大，他可不希望德国和巴西打上一仗。日耳曼尼亚现在可能已经出离愤怒了，指不定会使出什么手段对付咱们。”\n\n“行了吧，别每次都这样。见过穆勒的人都知道他是个疯子，他根本不会老老实实地坐在谈判桌上对话，更不会在乎卷入外交冲突。除非德国知道咱们的厉害，不然和他们谈毫无意义。这么干，就是为了让穆勒知道咱们是认真的。”\n\n夸德罗斯想了想，说道：“好，我明白你什么意思了。和正经的非洲国家谈判，那是一码事，但是和专员辖区……一个德国殖民地，我不觉得应该平等对待他们。”\n\n“对，它就是个该死的殖民地，所以咱们必须来硬的。毕竟真正的国家怎么说也会更加尊重他国。”\n\n夸德罗斯说道：“好了，总统先生，祝你下午过得愉快。”"
 brazil.179.a: "对野蛮人和文明人，要有双重标准。"
 brazil.180.t: "48小时最后通牒"
 brazil.180.desc: "“我们还在扣押船只，”托斯卡诺上将说道。“今天扣了三条，昨天五条。肯定还有一些漏网之鱼，B-17还在追踪那些向我国海域驶来的渔船。我们发了警告，但他们压根不理。”\n\n“所以他们要么没有电台，要么就是打算无视咱们，因为大使早就把警告发在《人民观察家报》上了。”洛特叹了口气。“看来穆勒是不打算各退一步啦？”\n\n“总统先生，”德尼斯元帅打断洛特的话，“现在这个时间节点，扣押措施依然可行。我们的军舰依然能保卫海岸，只要一声令下，他们就会在海岸附近巡游。如果坚持下去，一定能把整队整队的德国渔船扣留在诸圣湾。”\n\n“我们当然可以扣押它们。但这么干肯定没法得到我们想要的结果。有些人告诉我，要是扣了德国人的船，他们一定会用某种方式报复。德国人很有可能要求赔偿，如果我们不放弃，他们就会拿走我们的某些资产。这场危机必须结束，而且要快。”\n\n德尼斯叹了口气。“所以，就这么定了。积极出击吧。我们要给他们多少时间？”\n\n“48小时。如果到那时他们还要来挑事，那我就允许你采取任何你认为合适的行动。”\n\n“我们可以避免那些不愉快的事儿。”托斯卡诺这时发话，“我们发个通告，让他们下船，然后在船上无人的情况下登船。这样也挺有绅士风度的，彬彬有礼呢。”\n\n“我不想要什么别的东西，上将。不过这一切都将取决于穆勒和德国佬会作何反应。”"
 brazil.180.a: "又一条界限划定了。"
 brazil.181.t: "中非收到最后通牒"
 brazil.181.desc: "“你认真的吗？”穆勒一边擦着他最爱的那把反坦克步枪，一边抬起头问道。“他们说要把咱们的船炸上天？”\n\n“两天以后就是这样。”此刻，施坦纳和穆勒两人正在专员府中，空调开到最大。“这是他们通过大使馆告诉我们的。与此同时，他们还一直在国际航运频道上广播这则消息。现在应该所有人都知道了。巴西好像要跟咱们玩真的。”\n\n“搞什么几把？这些烂虾里是藏着钻石还是怎么地？”穆勒叹了口气。“好吧，我们有什么选择？能不能把这破事丢给日耳曼尼亚？”\n\n“老实说，日耳曼尼亚都不一定理咱们，专员先生。所以，咱们的第一种选择恐怕就是抱怨几句，然后撤退，让我们的船远离巴西海域。”\n\n“咱们退了，某些人可就要发毛了，到时候他们打电话过来我还要装没听到！能不能装个样子把他们顶回去？”\n\n“我会跟米策尔堡上将谈谈，不过我感觉应该能行。我们有两条巡洋舰、八条驱逐舰，应该能对付那些巴西人。但如果派军舰护航，就可能引发两国之间的武装冲突，而且一旦打起来，我们没有空中掩护，也很难得到支援。”他顿了顿。“等下，申克知道这事吗？”\n\n“没事，我们要他干啥他就会干啥的。确定巴西人是认真的吗？他们真要为这几只烂虾来干我们？攻击一条挂着纳粹旗的船，居然还想捞着好？”\n\n“你可以叫他们来干，但现在咱们的船需要明确的命令。要是你不给他们发命令，他们就会自己拿主意，灰溜溜跑路了。”"
 brazil.181.a: "我记得我跟你说过我们不会停的。"
 brazil.181.b: "他们要打，那就来打个痛快！"
 brazil.181.c: "别跟这个疯狂的国家一般见识。"
 brazil.182.t: "跨过红线"
 brazil.182.desc: "“这些家伙是不是以为我们不敢打啊？”洛特问道。“他们还跑过来么？”\n\n“嗯，是的，但这次穆勒派来的似乎不只是渔船了。侦察机报告说，拖网渔船上可能有携带枪支的人员。看来他们已经准备好迎接我们的登船行动了。”\n\n“哪个神经病会在渔船上装步兵啊！”\n\n“穆勒就会，先生。要是这样的话，贸然登船会把事情搞复杂的。”\n\n“所以要是我们把海军陆战队派过去，就有可能要为这几条破渔船开打了！他妈的，可真是麻烦了。”\n\n“是的先生。但我们也可以采取一些比较温和的行动。”\n\n“咋个温和法呢？”\n\n“只要离得远了，那些雇佣兵就打不准了；没有谁会想被Mk12的炮弹炸个稀烂的。所以，咱们可以温柔地引导他们，叫他们走远些。要是他们没懂，那就撞他们，或者往船头打两炮。这样依然能有效传达信息，而且也不太可能引发交火。”\n\n洛特想了想。“这应该也有点用，但力度应该没那么大。”\n\n“这只是一个想法，但我们现在就需要一个决定。您作何打算呢？”\n\n洛特思虑片刻："
 brazil.182.a: "“登船。”"
 brazil.182.b: "“谨慎行事，保持距离。”"
 brazil.182.c: "“不值得。随他们去吧。”"
 brazil.183.t: "侵犯底线"
 brazil.183.desc: "“该死的香肠佬还派了护卫队，”德尼斯跑进来，说道，“托斯卡诺说现在有带着万字旗的导弹艇在护送那些渔船。”\n\n这句话立即引起轩然大波。“那就是说……我们必须撤退。那就这样吧，我们经不起一场战争。”洛特说。\n\n夸德罗斯简直不敢相信自己的耳朵。“撤退？穆勒刚刚在我们的水域部署了军队，你却想撤退？总统先生，他们这可是向我们宣战！”\n\n“还没呢，还没打起来。但如果我们采取切实行动，就有可能打起来了。”\n\n“夸德罗斯说得完全正确，长官，”德尼斯说，“但我们还有其他选择。托斯卡诺说他的船队已经在路上了。我们可以派一群驱逐舰去围住那些快艇，迫使它们后退。我们完全敢和中非舰队干一仗，得让他们知道这一点。我们依然能避免开火，但我们必须做出反应。领土的完整和尊严就依赖于此了！”\n\n“你说得太对了，元帅。”夸德罗斯说。“我们说过我们会做出反应，这就是我们要做的。我认为还是应该按照原定计划执行，先生，我们去登船，去他妈的后果吧。他们绝对不敢接受挑战。”\n\n“但德国海军——”\n\n“那都是些过时的老船，不是德国军械库中最好的，而且我们也只会到他们射程的边缘。”德尼斯保证。“我们可以用压力迫使他们回去。”\n\n“我们也可以坚持原来的计划，”夸德罗斯说。“那么，该如何应对？”"
 brazil.183.a: "“夸德罗斯是对的。之前咱们怎么说的，就怎么做！”"
 brazil.183.b: "“德尼斯是对的。让我们直面它们吧。”"
 brazil.183.c: "“这事儿可麻烦大了。”"
 brazil.184.t: "抽烟眼镜蛇"
 brazil.184.desc: "德尼斯又一次直接闯入会议，实在是过于突然，但他还是这么做了。他的脸上挂着大大的微笑，洛特和夸德罗斯立刻就明白了一切。\n\n“总统先生，副总统先生，”德尼斯开门见山，“他们走了。”\n\n洛特长舒一口气。“你确定吗？”夸德罗斯问道，“托斯卡诺证实了吗？”\n\n“这就是他说的。挂德国国旗的拖网渔船在过去24小时内陆陆续续穿越大西洋中部海岭，向东航行。中非舰队还在港口，丝毫未动。从昨晚开始就没有发生任何拦截。一定是穆勒告诉他们要撤退，这是唯一的解释。我们赢了，先生。”\n\n“哦，真他妈棒！”夸德罗斯说，“我们打败了德国，不是吗？”\n\n洛特说，“这是自俄罗斯以来的第一次，德国与另一个国家针锋相对，却要装作若无其事。而我们就是挺身站在他们面前的人。我，咳，真不知道该说什么。海军肯定是不需要买酒了。我迫不及待地想让华盛顿听到这个消息。”\n\n“或者东京，”夸德罗斯指出。\n\n“元帅，告诉托斯卡诺，这消息很不错，五分钟后我要向海员发表声明。这之后，我要在广播里宣布一个消息。”\n\n“明白了，总统先生，但不管怎样，军队的每个人可能都会很高兴。”\n\n“还有，夸德罗斯，”洛特说，“你最好早点走，半小时后街上会有很多人在狂欢。”"
 brazil.184.a: "对日耳曼尼亚的痛击。"
 brazil.185.t: "巴西利亚紧张时刻"
 brazil.185.desc: "等待总是最糟糕的部分。\n\n但每个人都有自己独特的处理方式。夸德罗斯在简报室的一侧来回踱步。德尼斯身旁烟雾缭绕，这是他点上的第三根好莱坞。洛特盯着电话，急切地希望能来个什么好消息，也许还有机会让他喝上一杯加拿大俱乐部。\n\n终于，电话响了。每个人都看了一眼电话，然后看向洛特，洛特点点头，把电话拿在手中。“托斯卡诺。有什么事，”他说。\n\n“总统先生，结束了，”托斯卡诺在电话那头说。“我们现在控制着大约四分之一的中非渔船。”\n\n洛特立刻发问：“损失呢？”\n\n“有三名海军陆战队员受伤。雇佣兵没有支援，大多不战而退。”\n\n洛特脸上的宽慰显而易见，夸德罗斯和德尼斯立刻知道一切顺利。\n\n“这应该会给德国佬一个教训，先生。我们正在搜寻其他渔船，但如果他们听到风声，我想我们就不会再看到有人试图越过这条界线了。”\n\n“明白，将军。”洛特说。“告诉战士们，我们为他们感到骄傲，然后看看德国人会怎么应对。祝您狩猎愉快。”\n\n他挂断电话，抬头看着夸德罗斯和德尼斯的眼睛，他们都笑了。"
 brazil.185.a: "“小伙子们，该喝一杯了！”"
 brazil.186.t: "公海上的一天"
 brazil.186.desc: "卡洛斯·帕谢科舰长捡了大运，刚出发没多久就逮着了这群拖网渔船。所有舰船当中，他的巴拉那号最先收到简报，离任务地区也最近。卡洛斯预计格林阿尔希号和巴比通加号会在稍后赶到，但他有十足的信心，凭自己这艘美国造的老驱逐舰就能狠狠教训那帮德国佬，让他们尝尝被实力碾压的滋味。\n\n卡洛斯命令通讯员打开广播，用英语向渔船喊话：“这里是巴西海军巴拉那号驱逐舰，你们已进入巴西领海。立刻离开，否则我们将采取行动捍卫我国利益。”喊话完毕，通讯员看向卡洛斯，他随即点头示意甲板上的中尉准备进行下一步。\n\n巴拉那号搭载的四十毫米榴弹发射器虽有些落伍，威力却依旧不容小觑。几发榴弹射入水中，光是溅起的巨大水花就能让那些不知好歹的渔民吓得尿裤子。震耳欲聋的炮声散去，另外五门榴弹发射器也已做好开火的准备。若还不够，卡洛斯很乐意祭出更多家伙，直接把这些渔船统统打成马蜂窝。\n\n效果显而易见，一些渔船收起网开始驶离，另一些则干脆丢下网撒腿就跑。结束了，卡洛斯松了一口气。可就在这时，一名军官看着渐渐远去的渔船，突然发现了什么。"
 brazil.186.a: "“结果还是让他们捞了不少。”"
 brazil.187.t: "战术失误"
 brazil.187.desc: "距费尔南多·迪诺罗尼亚群岛海岸数公里的洋面上，一艘蒸汽拖网渔船正在孤零零地行驶。它的旗杆上悬挂着一面奇特的旗帜：红色的底象征社会主义，白色的圆象征民族主义，圆的正中则是雅利安种族的标志。正如许许多多造访巴西的渔船一样，这艘船也来自大西洋的彼岸，那片饱受扭曲的种族理论和所谓的崇高理想荼毒的殖民地。不过，它此行并非是为开展什么非法交易，而是盯上了这片富庶的海域。\n\n巨大的拖网从船只后方缓缓入水，在水流的作用下逐渐张开血盆大口，一路沉向海底。至于那句“巴西海盆与西面的大陆相连”则早就被抛到了九霄云外。一段时间过后，拖网重回海面，一同上来的还有无数栖息在圣罗克角延伸部分的螃蟹，而它们即将成为甲板上待处理的渔获。接下来，拖网会再次进入水中，重复之前的一系列操作。到最后，一整船的螃蟹将漂洋过海前往非洲的纳粹巢穴，在那里成为纳粹精英们的盘中餐。\n\n有谁能阻止这一切？巴西人或许能，尽管他们已经错失了根除这一现象的最好时机。没有了被攻击之虞，这些渔船开始变本加厉地入侵巴西领海。终有一天，巴西海军会把它们全数驱逐，但在那之前，它们还会像现在这样不知疲倦地、一网又一网地捕捞着螃蟹。"
 brazil.187.a: "好好先生再度乐开了花。"
 brazil.188.t: "没得选择"
 brazil.188.desc: "“没用，”无线电里传来托斯卡诺的声音，“我们在这片海域发现了好几艘全副武装的中非导弹艇。登船行动收效甚微，我们险些撞上对方的军舰，还有一次甚至不得不鸣枪示警。情况相当不妙啊，长官。”\n\n“收到，上将，我们会马上向你传达最新进展。”德尼斯说。通讯结束后，强烈的恐惧涌上了简报室内每个人的心头。这是一场灾难，洛特、夸德罗斯和德尼斯对此都心知肚明，但他们却还是义无反顾地往这个火坑里跳。\n\n洛特率先开口：“维持原计划不变。我们说过要登船，就一定要做到。通知托斯卡诺继续执行原计划。”\n\n“这是步险棋，长官。”德尼斯说道，“敌我双方势均力敌，进一步采取强硬措施几乎一定会导致交火，而且我们也没有十足的把握能获胜。伤亡数字将会相当难看，此举也将造成极其恶劣的外交影响。我军还没有做好准备，长官。”\n\n“既然我以巴西总统的身份保证我们将不惜一切代价登船，我们就必须要做到！”\n\n“德尼斯说的在理，”夸德罗斯反击道，“这太冒险了，我们必须通知舰队脱离接触！”\n\n洛特对夸德罗斯的态度转变大为吃惊。“但你之前说——”\n\n“去他妈的吧！情况比我想的还要糟上十倍百倍，我们必须马上撤退，以免卷入战争！”"
 brazil.188.a: "“不，跟他们硬碰硬。”"
 brazil.188.b: "“行，我们退一步，护送他们出去。”"
 brazil.188.c: "“好吧，事态有点失控了。脱离接触！”"
 brazil.189.t: "汹涌波涛"
 brazil.189.desc: "“去你妈的！”一名下级军官在巴拉那号右舷狠狠撞上希特勒施塔特号时怒吼道。巴西帕拉级驱逐舰的吨位远胜德国鹈鹕级轻巡洋舰，迫使对方改变航向简直易如反掌。甲板上爆发出一阵欢呼，但卡洛斯·帕谢科上校却暗自皱眉——撞击虽不会对军舰造成重创，但眼下还有更紧迫的危机。\n\n这是他在监视捕鱼船队期间采取的最激烈行动。倒不是说此举多余，那些德国佬的舰船最近总在危险距离游弋，拿这艘小破船开刀正是绝佳的警告。但冲突升级已成定局，接下来就看对方如何接招了。他盯着5英寸舰炮的炮口，暗自盘算能否一炮击沉鹈鹕级。但愿可以。\n\n就在他观察其他护航舰时，一艘拖网渔船突然切断渔网弃入海中，调头向东疾驰。紧接着第二艘、第三艘……越来越多的渔船开始效仿。附近阵位的巴比通加号也发来急电，报告渔船群异常动向。\n\n显然整支捕鱼船队正在全面撤退。随着伊皮兰加号开始尾随落单船只，德国海军不得不后撤。帕谢科长舒一口气——在即将爆发的战火面前，这些蛮子终究不敢冒险完成捕捞作业。他暗自庆幸对方先露了怯，毕竟若再僵持下去，巴西恐怕会成为先撑不住的一方。"
 brazil.189.a: "洛特也很高兴。"
 brazil.190.t: "时评"
 brazil.190.desc: "“随着时间推移，所谓‘龙虾战争’的影响已经显露无疑。”《新闻论坛报》登载的这篇文章由编辑部撰文，但几乎可以肯定其中都是卡洛斯·拉塞尔达的真实观点，“不幸的是，于巴西而言，从恩里克·洛特犯下第一个错误开始，如今的事态就已有迹可循。”\n\n“划清边界当然是好事，对主权国家而言，这是理所应当的。然而，划定自己无意捍卫的边界比拒绝划界还要糟糕得多。政府曾经承诺过，要保卫巴西的渔业权利、保卫以龙虾捕捞为生计的人们。当德国人侵犯我国时，政府也派遣部队登上了他们的船只。然而，当纳粹亮出刀子，企图以此侮辱我国时，我们的总统却像懦夫一样选择了退缩。”\n\n“我们对如此失职会引发何等后果的一切担忧，如今都成了现实。又一次，德国人掠夺了属于我们的海洋。原本属于我国渔民的财富被日复一日地夺走，输送到奴隶世界的中心。当然，或许有一天，德国海军不会再出动舰艇护航每一次捕捞，因为那样在经济上不合算。或许到那时，洛特就会采取行动，因为只有那时，他才不用面临任何挑战。但是，巴西显然是被羞辱了，而羞辱我们的甚至只是连一个国家都不是的殖民地。区区几艘老旧过时的护卫舰，就能让洛特屈服。”\n\n“政府唯一的职责就是给民众以生计、捍卫民众的生活。洛特总统治下的巴西没能履行这份社会契约，以捕捞龙虾为生计的渔民们正在为此付出代价。”"
 brazil.190.a: "在晨曦宫中，一个男人长叹一声。"
 brazil.191.t: "收尾工作"
 brazil.191.desc: "“……伤员已经在福塔莱萨上岸，将于当地医院接受治疗；拘捕的德方人员也已抵达纳塔尔。”德尼斯合上手中的报告，目光转向了面前的洛特。显然，洛特肯定是没怎么听报告的最后一段，而是考虑着更重要的事情。而德尼斯呢，他也觉得这些事情其实不重要。“总统先生，”他开口说道，“不值得，根本不值得。”\n\n“战争中总是会有牺牲的，部长先生。”洛特回应道，“我们决不能让步，一点都不行。我不认为还有其他办法。”\n\n“就是为了这该死的龙虾，又多了许多覆盖着巴西国旗的烈士棺椁。”德尼斯又说道，“还有丢了命的德国人……他们不会善罢甘休的。我们已经在圣路易斯附近发现了一支航母特遣舰队。”\n\n“就算给日耳曼尼亚狠狠上眼药，他们也不会有啥动静的。”洛特回道，“没人知道那个混蛋是不是还活着，也没人知道他今天晚上为什么不想吃顶级的大龙虾。那个德国佬确实是个傲慢的混球，但他不会在美洲发动战争，尤其是现在德国政府群龙无首的时候。”\n\n德尼斯和洛特仍然有点不满。“这事就这么结了，夸德罗斯也挺愤怒的。”德尼斯说道。\n\n“啊，我听了他那个该死的策略，这就是结果。”洛特在说话的时候，仍然没有对上德尼斯的目光，“但最重要的是，我们赢了。中非的企图已经被掐灭了，没人会再想着在巴西身上打这种小九九。”"
 brazil.191.a: "我们要为这个屠夫的罪行买单了。"
 brazil.192.t: "保护我们的财富"
 brazil.192.desc: "“各位，”洛特坐在餐桌上首，说道，“我担任总统这么久以来，很少能像今晚这样开心。当然，我想你们也与我一样开心。”\n\n巴西海军第三军区司令部的军官们齐聚晨曦宫宴会厅。在经历了与德国海军长期的海上对峙后，他们都显得十分兴奋。托斯卡诺海军上将和德尼斯元帅也在席间，两人脸上笑意盈盈。就连来参加庆祝的夸德罗斯都很高兴，无论如何他都有权来参加宴会。\n\n“说实话，我以为自己永远都不会再亲历庆祝胜利的时刻了。以前我在英国的时候，许多人都认为我们能挽狂澜于既倒，迫使德国佬撤退。我们可以英勇奋战，拯救一个国家。但天不遂人愿，从那时起，我们就背上了沉重的包袱。”\n\n“有人觉得，这意味着自由世界的终结，仇恨与暴政能够肆意践踏羞辱一个民主国家。没人能想到，能有一个自由国家——来自南美洲的自由国家，能够在暴政面前屹立不摇。当然，并非人人都能做到，但我们的骄傲与荣誉要求我们划下了边界线。”\n\n“凭着你们的独力奋战，我们守住了这条线。如今，二十世纪历史上唯有一个明确战胜法西斯主义的国家，而它不是美国、不是老牌的英法帝国，而是巴西。没有其他人，能做到你们在过去几周里做到的一切。自施佩伯爵号被击沉以来，这是德国海军经受过的最惨痛的失败，我们足以为此而自豪。”\n\n“诸位，我们划下了一条线，德国人不敢越雷池一步。在享用今晚龙虾大餐的时候，请记住，正是因为你们在大海上保卫它们，新世界才得以免遭旧世界如今的灾难与衰落。”语毕，洛特举杯，全场也一同举杯。"
 brazil.192.a: "“敬巴西海军！”"
 brazil.193.t: "会见穆勒"
 brazil.193.desc: "“……他将在您选定的时间和地点与您会面。”洛特念道，“那就这样吧，通知已经发给穆勒了。”\n\n“这是对的，总统先生。”夸德罗斯说道。“我们得和他好好谈谈。他是个疯子没错，但如果能和专员和平解决争端，总比立刻就和纳粹开战好得多。”\n\n“我不喜欢这样，”德尼斯说道，“这都是徒劳无功。穆勒根本不在乎会不会和我国引爆战争。据我所知，除了希特勒施塔特，非洲大陆全都是一团糟。不如直接电函日耳曼尼亚，可能还更有用。”\n\n“然后他们就会把信扔进垃圾桶里。穆勒还没有自负到任由事态升级的地步，不如说，他才不想成为引发大西洋战争的那个专员。”\n\n“还是进退维谷啊。”洛特说道，“我们不能和这么一个德国殖民地谈判，丢人。”\n\n“还来得及给托斯卡诺下令，先生。”德尼斯说道，“只需要二十四小时，我们就能派出一支舰队去对付德国佬……”\n\n“不，不能回头。”洛特说道，“我们已经准备好用外交手段解决问题了。如果不成，我们再讨论怎么让穆勒听听我们的道理。”"
 brazil.193.a: "最后一个诉诸理性的机会。"
 brazil.194.t: "诚挚邀请"
 brazil.194.desc: "“罗尔夫，快看！”穆勒在直升机的轰鸣声中大声喊道，一边跑向管事的人员，一边指着直升机。地面工作人员正在从直升机上卸下两张斑点鬣狗的皮，这是他们打猎的收获。“这群小畜生想从猎豹那儿偷走羚羊尸体，但它们没发现我手里的毛瑟枪——”\n\n话音未落，他脸上的表情在施坦纳递给他一份电报时凝固了。“巴西总统想和我们谈谈。”施坦纳说。\n\n“哦，对，那帮混账，”穆勒叹了口气。“他想讨论螃蟹问题——”\n\n“是龙虾问题，”施坦纳纠正道。“显然，他们觉得我们必须给他们打电话，否则他们会正视这个问题，甚至可能因此向德国开战。”\n\n“所以，我得拯救世界，避免一场新战争？那我们该不该给他们打电话呢？”\n\n“嗯……其中大概有利可图，专员先生。我们可以在问题恶化前解决它，确保我们双方都有足够的龙虾。但这需要一定的技巧，以免被上层发现。”\n\n“日耳曼尼亚？他们根本不在乎。给非洲那边打个电话，他们会听吗？”\n\n“我是说东方，不是北方，专员先生。”\n\n穆勒这才想起来。“他妈的。”"
 brazil.194.a: "希特勒施塔特又得来一位客人啦。"
 brazil.194.b: "这又不是咱们的义务，叫他们滚蛋！"
 brazil.195.t: "穆勒接受"
 brazil.195.desc: "瓦尔特·莫雷拉·萨莱斯走进总统办公室，手中举着一份电文。“利奥波德维尔发来的。”\n\n洛特放下手中的活儿，抬起头来。“所以呢？”\n\n“他们想让我去。罗尔夫·施坦纳说他想在希特勒施塔特会见巴西代表，所以我想我今晚就收拾行李吧。”\n\n“希望这么做是对的。”洛特小声嘟囔。\n\n“总统先生？”\n\n“没啥。”洛特说，“好吧，你去吧。空军会给飞机加满油，飞向黑暗之心。打个电话，他们会在累西腓给你准备一架飞机。他们想什么时候见面？”\n\n“嗯，越快越好。”\n\n“好吧，那你去累西腓洗个澡吧。记住了，萨莱斯，你要保持低调，因为我们不确定德国是否知道这里发生了什么。这次没有随行人员，没有媒体，只有一名助手和机组人员。你可以带几名保镖上飞机，但不要指望利奥波德维尔领事馆或巴西军队能在事态恶化时支持你。你身在遥远的中非，万一出了什么事情，我们没法及时作出反应。”\n\n萨莱斯对此有点不高兴。“好的，先生。”\n\n“还有一件事。绝对不能低头。”"
 brazil.195.a: "“再会了，祝你好运。”"
 brazil.196.t: "穆勒拒绝"
 brazil.196.desc: "萨莱斯走进房间，一脸失望。“他回信了，”他一边说着，一边把信丢在桌子上。\n\n洛特拿起信来，开始读。“外交人员得把它翻译一遍，但我们还是尽快把它交给您了。”萨莱斯解释道。“我们还得确认一遍，但这似乎就是他们最好的态度了。”\n\n“他说要操我大爷，”洛特说，一边继续看着那封信。“还说……我们显然没有染指大西洋的权利。”\n\n两人都没说话。过了一会，“总统先生，对不起，如果——”\n\n“好吧，从现在开始，事情变得简单许多，”洛特边说边拿起电话。“索菲娅？叫各负责人来参加紧急会议。就定在下个小时。再帮我接夸德罗斯，有急事。”\n\n“他肯定不会高兴的。”萨莱斯有些沮丧，盯着桌子。\n\n“嗯，但德尼斯会高兴。”洛特捂住电话说。“雅尼奥？是我。你知道我打来是因为啥。”"
 brazil.196.a: "现在没有更好的选择了。"
 brazil.197.t: "余波未尽"
 brazil.197.desc: "洛特静静地坐在椅子上，沉思着眼前的局势，一边揉着下巴，一边审视着夸德罗斯递给他的报告。夸德罗斯在房间里踱来踱去，喃喃自语着对形势的想法。坦克雷多和塞尔索在彼此间交换着复杂的眼神，经过一段无声的眼神交流后，坦克雷多轻咳一声打破了沉默。\n\n“咳咳，我们必须迅速应对这一局势……经济问题和农民联盟。”他说，“我们应派遣若昂·古拉特与农民联盟对话；他颇受欢迎，或许能平息他们的情绪。同时派出值得信赖的官员调查此事，查明真相。”\n\n“我完全赞同这个出色的提议，也许这是我第一次，也是最后一次与坦克雷多意见一致。”夸德罗斯大声说道，“古拉特在经济上的见解或许有误，但那些团体支持他和布里佐拉，利用他或许有助于解决问题。”\n\n洛特点头，对房间内达成的一致意见感到意外。“我会立刻联系若昂·古拉特。希望他能和联盟沟通，阻止事态进一步恶化。”他说，“至于你的经济提案，坦克雷多，我认为它们可能是……”但在他能说完之前，夸德罗斯打断了他。\n\n“恩里克，别告诉我你真的考虑接受他们的计划。他们的计划只会加剧通胀。我们需要削减税收，严打通胀，处理日益增长的债务，才能保持经济的繁荣。”\n\n“谢谢你的打断，雅尼奥。”洛特平静地说道，“我当然会听取所有建议，但我还没有决定下一步行动。雅尼奥，你继续关注局势；我要给杨戈打个电话。坦克雷多和塞尔索，感谢你们的到来，现在可以退场了。”洛特这样说道，随后三人点了点头，依次离开了房间。当门关闭，房间恢复安静后，洛特叹了口气，然后喝完了杯中的咖啡。"
 brazil.197.a: "外面要下雨了。"
 brazil.198.t: "例行预算会议"
 brazil.198.desc: "洛特正忙于整理跨亚马孙公路的报告，他的顾问们和雅尼奥·夸德罗斯踏入会议室，准备开启当日的预算讨论。洛特把手中的文件放到一旁，注意到夸德罗斯手里那个异常庞大的文件夹，毫无疑问，那里面装满了经济计划和种种协议。\n\n“各位，让我们开始这次会议吧。我们都清楚眼下面临的难题。我们的债务增长到了惊人的程度，必须采取措施。雅尼奥提出了一个可靠的计划，在削减成本的同时寻求合作伙伴来对我们的部分债务进行重组。在讨论预算削减之前，我想确认一下，萨莱斯，你已经和美国人就此事进行了沟通，对吧？”\n\n“是的，洛特元帅。我计划与戈登会面——”“什么？美国人？”夸德罗斯突然大声打断。“我们不能信任那帮混账，他们只会利用我们！”洛特揉了揉太阳穴，平静地回应：“好好好，雅尼奥。考虑到我们想要重组的债务规模，这个方案显然不会太完美，但还有谁能承担如此庞大的债务呢？”\n\n“为何不考虑日本？他们也能轻松资助我们的计划，我们还可以和一个新盟友建立关系。”内阁其余成员交换着惊讶的目光，洛特脸上疑惑的神情稍有缓解，随后一字一句地说道：“我们在美国已有关系牢靠的盟友，和日本合作实施紧缩计划肯定会激怒他们。这真的值得吗，雅尼奥？”他环顾四周，大多数人点头同意。\n\n“好吧，我的立场你们都清楚。我相信你们已经在没有征求我的意见的情况下做出了决定，一如既往。”夸德罗斯带着一丝不屑的口吻回答道，“只需您一句话，我们就可以开始处理债务。”"
 brazil.198.a: "债务问题上没有两边都讨好的选项。"
 brazil.199.t: "与共荣圈品茗"
 brazil.199.desc: "夸德罗斯几乎不敢相信，他居然会为了巴结日本的贸易代表，勉强自己喝下这苦涩难当的饮品。他心里想，他们应该享用马黛茶，而不是这泛着绿色的“下水”。正当他胡思乱想时，耳边响起了对方的问候：“夸德罗斯副总统，希望您安好。”贸易部长边说边微微鞠躬。夸德罗斯还不太适应这种礼节，尴尬地回敬了一个躬。“后藤部长，您能莅临巴西，令我感到无比荣幸。希望我们能就可能的贸易协议和双方的经济发展开展深入探讨。”\n\n“我听说，贵国政府背负着巨额债务，副总统先生。”后藤部长语气平静。“我们共荣圈愿伸出援手，帮助巴西经济继续发展，当然，前提是您也愿意互帮互助。”\n\n“正是因此，我才邀请您来此。”夸德罗斯回答，脸上露出微笑。“我期望讨论开启贸易协议的可能性，以此来分担我们的债务重组的一部分。您若能翻阅我的提案，会发现其中蕴含着对双方都极为有利的内容。”他这么说着，递出一份印着巴西国徽的信封，里面装着一系列发展计划、关税减免方案和公司合作协议。令他意想不到的是，日本代表毫不犹豫地将自己的文件夹放在夸德罗斯的文件夹上，然后果断地推了回去。\n\n“夸德罗斯副总统，请您优先审阅我们的计划，并与您的内阁成员讨论。”后藤部长语气坚定。“请在您和您的经济部长审阅过我们的提议后尽快通知我。谢谢您。”\n\n夸德罗斯还没来得及表现他的震惊与愤怒，日本贸易代表就离开了房间，只留下他独自面对那份沉甸甸的文件夹。"
 brazil.199.a: "这无疑是一记沉重的警醒，暗示着真正的主导者是谁。"
 brazil.200.t: "不太体面的选择"
 brazil.200.desc: "“就这？这就是我们必须接受的方案和提议？”内维斯的声音中带着讽刺和不解，“雅尼奥，你何不在离开时直接把它丢进垃圾桶？” 他的嘴角挂着一丝苦笑，但四周寂静无声，无人附和。“如果我们真的接受这个计划，那一定是在发神经。这无异于自愿进入日本帝国的牢笼。照这样，我们倒不如自己来搞紧缩，至少只用自损，而不同任由他人摆布。”\n\n夸德罗斯突然站起，情绪澎湃地鼓掌。“内维斯部长，您尊口里吐出来的话真是太英明睿智了哈！我很高兴您支持我的经济重整和发展计划。就像您说的，让我把这份日本的协议当垃圾扔掉，我们就可以立刻开始研究，如何从我们臃肿的支出中削减不必要的部分。”\n\n洛特总统举手示意，语气严肃：“各位，请冷静些。我承认这个计划存在缺陷，比如我们可能不得不向日本财阀出让土地，但不可否认的是，它的确对我们有好处。我们需要帮助，而且我们也无法保证其他人会帮我们解决债务问题。”\n\n辩论声在房间里此起彼伏，但最终，他们还是达成了一个共识："
 brazil.200.a: "要振兴经济，代价再高也不为过。我同意了。"
 brazil.200.b: "代价实在太高，我不同意。"
 brazil.201.t: "互致问候"
 brazil.201.desc: "萨莱斯虽然已与美国在诸多协议上合作累月，但这一次，他莫名地感到了紧张。他亲眼见证了内阁在重组巴西债务问题上的种种争执，虽然自己并非经济学家，但他明白，没有简单的解决办法。尽管美国名义上是巴西的铁杆盟友，但萨莱斯深知，在两国政策博弈中，所谓的善意几乎是奢望。他手中紧握着提案，像护宝一般夹在胳膊和胸之间，推门步入会议室。\n\n室内坐着的便是大使林肯·戈登，身旁似乎还有位助理。“沃尔特，能再次见到你真是太好了！我们今天是来谈些好生意是吧？”\n\n“是的，林肯。如果美方愿意伸出援手，帮我们解决债务难题，那自然有许多商机可以讨论。”戈登再次吸了口烟斗，然后拿出几份文件，滑向萨莱斯。“沃尔特，这是我们的构想。不过是些关于降低你们进口关税的常规事项，相较于OFN和共荣圈，我们的货物对你们的民众来说会便宜一些。此外，我需要你们政府保证坚持维护自由市场。古拉特或许在你们国家颇受欢迎，但如果继续沿用库比契克的商业模式——那种政府把半数企业国有化的做法，美国公司是绝对不会容忍的。你的看法呢？”"
 brazil.201.a: "“基本方案听起来不错。巴西可以承诺做出改变。”"
 brazil.201.b: "“对不起林肯，但我不得不拒绝。”"
 brazil.202.t: "更新迭代"
 brazil.202.desc: "当阿诚得知自己被调派到巴西时，他简直难以置信。在他看来，这肯定是因为他所在部门去年未能完成翻倍的生产指标而被降职。他靠窗而坐，不停地调整着领带（这儿怎么老是热的要死？），汽车却突然在一片荒废的工业园区停了下来。他的翻译示意他下车，去查看三菱新购入的土地。\n\n这片土地大到让人难以置信。所有旧工厂仍旧需按计划拆除，不过他原本只期待有足够的空间建几座工厂，或许还能留出小块空地供卡车停放。然而，眼前的空间远超他的预期，这里足以容纳至少十座工厂和一个加工中心。董事会到底花了多少钱购买这块地呢？阿诚心中充满疑问。现在，他已经逐渐理清头绪：这个职位并非降职，反而是一次升迁。这里孕育着无限的机遇和潜力。看着建筑工人、起重机和各种设备开始从他身后的卡车上陆续卸下，阿诚的嘴角掠过一丝微笑。\n\n眼前的工作虽然繁重，但阿诚早已习惯于挑战。他心想，与其让别人来，不如自己上，随即便下达拆除旧工厂的命令。"
 brazil.202.a: "有时候，人们只是需要一个全新的开始。"
 brazil.203.t: "暴动"
 brazil.203.desc: "一些陆军部队已经动员起来，反对洛特法案的审议。高原军区的部分部队已包围了戈亚尼亚和阿纳波利斯的联邦大楼，并威胁要攻击巴西利亚，除非立即撤销洛特法案。\n\n联邦参议院已被封锁，其受到命令称只有在冲突解决后才能重新开放。现在，巴西民主岌岌可危，其命运全在洛特总统手中。惊恐的巴西利亚市民无不迫切期待着总统的决断。"
 brazil.203.a: "我们将永远捍卫共和国！"
 brazil.203.b: "我们的职责是为人民服务，任何人都不应受到伤害。"
 brazil.204.t: "军方退缩"
 brazil.204.desc: "洛特不是那种喜欢自吹自擂的人，但即便是他，此刻也忍不住露出了一丝得意的微笑，然后随意地将报纸扔向桌子。内维斯正坐在桌子的另一端，脸上挂着同样淡定却又灿然的笑容。后者虽不酗酒，但在这番喜讯之下，他也愿意举杯共庆。早晨来一点橙汁调和的卡莎萨酒，何尝不是一种享受。\n\n“我想你也看到了新闻，对吧？”\n\n“是啊，他们落荒而逃。就知道说大话，一给点颜色看就没声了。”\n\n两人为自己的成功举杯欢庆，然而在巴西利亚的兵营里，气氛却截然相反。军官们争吵不休，互相指责可能的失策：是不是因为参议院的人手不足？还是表现得太过软弱？或者过于强硬？如果他们没法让那位固执的洛特拿出点敬畏之心，那肯定是聚的人不够多。\n\n他们知道出了错，却无法指明究竟哪里错了。在这样的分歧中，这一事件最终沦为了历史的一个注脚。"
 brazil.204.a: "……他们都是正义的化身。"
 brazil.205.t: "洛特退让"
 brazil.205.desc: "洛特的性格本非怨天尤人之类，但即便如此，他也不由得吐出一句脏话，把手中的报纸甩到了桌子上。内维斯也皱着眉头，神色挣扎，与此时的洛特如出一辙。\n\n“你就不能……振作一点吗？”\n\n“现在再想那些如果已经太迟了。我不能再让国家冒任何风险了，我……”\n\n然而，洛特已不知从何说起。他嘴上说着不要去想那些如果，但他不愿提及的事情却早已占据了他的脑海：已经发生的、可能发生的、他本可以说出的话语、他应当索要回报的承诺、甚至哪怕只是站在原地，直面野兽的脸庞……\n\n与总统府中冷峻压抑的空气不同，军营里充满了欢快热烈的气氛，将军和军官们手举酒瓶和雪茄互相庆贺着。当然，无论是谁接替洛特的总统大位，他们依旧得小心翼翼，法案只是暂时归档了而已，并非彻底废止。当然，这都是后话了。\n\n今晚，他们祝贺着战胜了越界的自由主义。"
 brazil.205.a: "……然而，罪犯同样逍遥法外。"
 brazil.207.t: "叛乱的低语"
 brazil.207.desc: "洛特不是个夸夸其谈的人，他务实到了极点，乐于仰赖行动与神态来传递言语所无法表达的事物。简而言之，他和这个国家几乎所有的政治家都大相径庭。\n\n但是，此时身处洛特面前的德尼斯却希望洛特能说些什么，真的，说些什么都好：此时洛特的表情让人完全捉摸不透，房间中的沉默已经压抑到了令人窒息的地步。终于，德尼斯庆幸着，在自己开口之前，洛特打破了这紧张的寂静。\n\n总统轻轻敲了敲德尼斯带来的文件夹，说道：“你是说，你的部下开始谈论……”\n\n“叛变，没错。洛特，你的举动让总司令部很焦虑，你不能否认。”\n\n“很好。就让他们瑟瑟发抖去吧。”\n\n德尼斯不禁皱起眉头，直视洛特，调整着自己的领带……\n\n“洛特，我们是士官学校的同窗，你得听我的。我知道，将军们对现状不满，但你这是公然与军方作对。我们不是国家的敌人，我们是要——”\n\n“省省吧，德尼斯，我也对国旗发过誓。实际上，是两面国旗。”洛特指着自己胸前别着的共和国徽章，加重了语气，“我不会退缩的，德尼斯，他们应该有些自知之明。”\n\n德尼斯的眼角抽了一下，但总统话语中夹杂着的讽刺与怀疑并未让他迷失方向……随后，德尼斯叹了口气，耸耸肩膀，说道：“别说我没试着提醒过你，洛特。”\n\n“好，你可以走了。”\n\n德尼斯敬礼，转身离开房间。突然之间，洛特身上的豪气变得无影无踪，他长叹一声，心事重重地靠在椅子上，望着好友刚刚离开时推开的大门。其实他懂，他全都懂，但他决不能允许这样的事情发生。\n\n毕竟，他是个军人。他明白，巴西最不需要的变革，就是将更多的权力拱手交到军方手中。"
 brazil.207.a: "“吾心吾行澄如明镜……”"
 brazil.208.t: "萨莱斯前往中非"
 brazil.208.desc: "这里没有能知道准确时间的办法。他已经忘了飞机过了多少个时区了，所以也不知道现在多迟了。确实，自从下午自累西腓出发后，已经过了多少小时，瓦尔特·莫雷拉·萨莱斯是知道的。不过希特勒施塔特可是一个前不着村，后不着店的地方，天也已经黑了下来。\n\n飞机的空管频道从阿森松岛的美军基地切到了利奥波德维尔之后，他就知道事情会变得奇怪起来了。因为他们从几内亚湾的方向飞来，空管命令他们提升高度，以避开地面的炮火。丛林中究竟是什么情况？这令人不安的指令不禁让萨莱斯感到了恐惧。甚至到了即将在恩吉利机场降落的时候，飞机都不得不以螺旋方式快速下降，有一侧的窗口有好一阵子都只能看见地面。起落轮一接触地面，萨莱斯就赶紧要求给他来一杯烈酒，地面人员也趁着飞机加油的时候，给他找来了一瓶。\n\n飞往希特勒施塔特的这段行程就更糟糕了。飞机起飞也得以螺旋方式拉高。就算到了空中，也无济于事，因为绕开潜在的对空攻击最安全的方式就是直接飞过刚果湖。在非洲中部莫名其妙多出来的这一片海，以及在机舱中传开的关于有多少飞机坠毁在这汪洋大海中的流言，都让萨莱斯无法安心下来，也对他即将要做的事没有什么把握。话说回来，他在这个没有月光的晚上，站在荒郊野外的半废弃的机场中，到底能帮上什么忙，他也是蒙在鼓里。\n\n在远方出现了车灯。开来了四五辆水桶车和迷彩奔驰，停在了飞机前方，最前面的两辆车上还架着机枪。萨莱斯看着几组士兵拿着G1步枪，从车上下来，面向飞机。其中戴着贝雷帽的一位走到了他面前，向他敬了个礼。“欢迎来到希特勒施塔特，萨莱斯先生，”他用带着口音的英语说道。"
 brazil.208.a: "“罗尔夫·施坦纳元帅，为您效劳。”"
 brazil.209.t: "萨莱斯吃龙虾"
 brazil.209.desc: "萨莱斯对非洲的狩猎旅馆或是殖民时代豪华酒店的浪漫想象并没有在希特勒施塔特度假村具现。埃及或南非的酒店有一种独特的古老韵味。就连新些的希尔顿酒店或是大和旅馆，内部也至少会装修得现代一些（不过如果你仔细观察，会发现其实也和外部差不多）。而希特勒施塔特，只不过是普洛拉度假村样式的一个建筑群罢了。这个水泥筑成的庞然大物，比起一个放松娱乐的场所，更像是一个守卫着这片白色沙滩的碉堡。好在他所住的特别套房并不在主建筑群当中，它看起来像是照着戈林的别墅设计的，不是非洲德式风格。\n\n度假村的大多数服务员都是穿着党卫队白色晚宴制服的非洲土著人，令人啼笑皆非。无论宣传口号如何鼓吹，在这非洲大陆，德国人也没法不被他们掠夺的土地所影响。饭厅的墙上挂着死去很久的动物制成的战利品，中间是一张由丛林中的稀有木材制成的巨大桌子。桌子另一端坐着罗尔夫·施坦纳，他仍然穿着他的野战军装，头上也还戴着那顶贝雷帽，手中拿着一杯嘎弗啤酒。\n\n晚餐让人很意外，但不是愉快的那种意外。端上配着龙虾尾、芦笋和土豆沙拉的龙虾浓汤的时候，施坦纳一定觉得很欢乐，但萨莱斯却很不愉快。虽然他们配的法国葡萄酒很不错，但是他很难不去寻思这些龙虾是哪里来的。毫无疑问，这些龙虾本该被巴西渔民卖掉，端上一家巴西人的饭桌，而现在他们却不得不因这些混蛋的所作所为挨饿。\n\n饭间闲聊时光，施坦纳分享了些童年故事和军旅生活，令人颇不舒服。在消灭完柠檬芝士蛋糕后，施坦纳也喝完了第二杯啤酒，看向了他的对手。"
 brazil.209.a: "“那我们开始吧，萨莱斯先生？”"
 brazil.210.t: "贸易谈判开始"
 brazil.210.desc: "“整个大西洋的中间那片？”施坦纳问道，连一丝敌意都不掩盖。“这是大家的海洋！我们、日本佬、美国佬，都有权使用它！你他妈怎么敢独占一片，然后把我们赶走？”\n\n“佛得角海平原的大部分，”萨莱斯说，“是航运和捕鱼的中立海域，没错。但是根据国际法，仍有一些海域属于巴西人民。根据法律，南美洲大陆架是巴西领海，我们的政府有权规范这片海域的刺龙虾捕捞。”\n\n“不过……”施坦纳喝了一口啤酒，“它们不是水里游的嘛，一游泳，它们就不在大陆架上了，而是在海水中，所以这样任何人都有权捕捞了。”\n\n“你们可以这么主张，但是我们的立场是如果你们想继续捕捞，我们也有权阻止你们。你们必须停止当下的行为，遵守我们的规定，这就是问题所在。”\n\n“好吧……那你们有什么规定？”\n\n“您的意思是？”\n\n施坦纳笑笑：“我就不说客套话了，你们能让我们捕多少鱼？你准备拿出什么条件，趁早把这烂事儿解决掉？”"
 brazil.210.a: "“我们会给你们平等的捕捞权。”"
 brazil.210.b: "“我们会允许你们捕捞一部分。”"
 brazil.210.c: "“你们必须完全撤出我国海域。”"
 brazil.211.t: "一点海鲜都不给你"
 brazil.211.desc: "“巴西政府认为，你们需要立刻停止在巴西沿岸的一切捕捞活动。”\n\n施坦纳差点一口把酒喷出来，这个巴西人他妈的刚才对他说了句啥？\n\n“这一地区的过度捕捞现象过于严重，我国必须对自然资源进行保——”\n\n“错，”施坦纳说道，“你们根本没遇到什么过度捕捞，单纯就是不想承认这片狗日的大洋是公有的罢了！你还想让我们去哪里捞龙虾啊？湖里面？”\n\n“这对你们来讲指不定还好些，”瓦尔特·萨莱斯回应道，“你可以说服希特勒引水把莫斯科变成一个湖，然后在那里捕捞龙虾嘛，就跟他在《我的奋斗》里写的一样。这总比告诉他，说你们因为过度捕捞引发战争了要好得多。”\n\n去你妈的，施坦纳心里想着，这可太糟糕了。他现在要么忍气吞声，后面再找机会谈条件；要么表现得硬气点，多少争取到一些海鲜的捕捞权。他也可以起身离席、走出房间，但穆勒专员绝不喜欢这样。或许穆勒会大骂施坦纳是一个混账，又或者他根本就不在乎——这一点谁都说不准，毕竟穆勒总是那么难以捉摸。\n\n但施坦纳又灌了口啤酒，在心里掂量了一会儿，终于鼓起了勇气。"
 brazil.211.a: "“好，好，我们不打扰你了。”"
 brazil.211.b: "“要讲道理的嘛，我们可以达成协议。”"
 brazil.211.c: "“把大陆架的事情告诉那些U艇！”"
 brazil.212.t: "给你一些海鲜"
 brazil.212.desc: "“巴西总统发来指示，他愿意就龙虾捕捞问题通过谈判达成解决方案。”\n\n听到这句话，施坦纳兴奋了起来。”那我们能得到多少？”\n\n“那得看情况，”萨莱斯解释说，“巴西会就此进行监管、督查和纠正——”\n\n“但我们还是可以捕捞龙虾卖回德国吧？”\n\n“没错，你可以在佛得角地区进行有限的捕捞作业。”\n\n对施坦纳来说，这字眼悦耳动听。巴西人愿意谈判，他可以在这里讲条件。他们仍然可以捕捞龙虾，巴西人也可以据此换来他们想要的东西。今晚还有很多事情要谈，他完全可以接受这个条件好办完剩下的事情，顺便给那边的混蛋留下一个好印象。\n\n但他就想要这些吗？当然，风险越高，回报越高。既然都来了，他完全可以逼他们提供更多的优惠。虽说更像是啤酒下肚之后，借着酒劲说话罢了。"
 brazil.212.a: "“萨莱斯先生，就这么定了。”"
 brazil.212.b: "“要讲道理的嘛，我们可以达成协议。”"
 brazil.212.c: "“你凭什么跟优等种族叫板？”"
 brazil.213.t: "平等捕捞权"
 brazil.213.desc: "“我们愿意……承认大日耳曼国在佛得角周围地区的渔业权利。”萨莱斯一脸紧张地说道。\n\n当然，就这么几句话，这足以让施坦纳注意到这个巴西人在说什么。\n\n“因此，龙虾拖网渔船及其他船只可……”\n\n“真的是这样吗？你们这是在妥协吗？”施坦纳追问道。\n\n萨莱斯郑重地点了点头。\n\n“太好了！不用再谈了，我们接受你的提议！”施坦纳如释重负，将手中的啤酒一饮而尽。他对侍者喊道：“我要跟这位优秀的萨莱斯先生再来喝上一杯！”\n\n当侍者去酒吧时，萨莱斯看上去并不那么热情。施坦纳不在乎。虽然他几乎忘了今晚还要决定什么事，但估计不会是什么善茬。这个巴西人十有八九会在之后的谈判中要求更好的东西。\n\n“那么萨莱斯先生，你接下来想谈什么？”在下一瓶啤酒送来前，施坦纳如此问道。"
 brazil.213.a: "咱们把地图摊开吧……"
 brazil.214.t: "德国人的回应"
 brazil.214.desc: "“这话有些不讲理了，萨莱斯先生，”施坦纳想了一会说道。“渔民们总得有点收入才行，但让他们去几内亚湾捕鱼肯定会事故频出。你知道那里有多乱吗？”\n\n“我清楚，”萨莱斯回答道，“不过你们的轰炸行动多少也是肇因之一。”\n\n“这一点我承认，但那更多是申克和日耳曼尼亚的问题。我们也想和当地人打好交道，可惜那片地方简直是无政府主义的温床，我们只得另觅别处。现在你明白我们为何要跑去大西洋的另一边捕鱼了吧？我们必须要获取一定数量的收成，否则各项行动就将难以为继。”\n\n漂亮，德国人让步了。萨莱斯露出一丝微笑：他的计划进行得近乎完美，双方现在总算可以拿出一项折中方案了。萨莱斯的强硬态度有了回报，而现在要做的只是达成协议，然后再谈手头上的其他事情。\n\n但他真该这样做吗？折中方案只能分到半块蛋糕，可巴西政府或许想要一口独吞。就算他取得了如此成就归国，说不定照样要被拉塞尔达架在火上烤。也许萨莱斯可以再大胆一些，试探施坦纳的底线所在，然而对方也可能会因此退出谈判。"
 brazil.214.a: "“我们会报个数字给你的。”"
 brazil.214.b: "“龙虾还是我们的。”"
 brazil.215.t: "德国人拒绝了"
 brazil.215.desc: "“你不会真有这么自以为是，觉得可以随便约束我们吧？”施坦纳有意把音调抬高，如是质问道。\n\n“你说什么？”萨莱斯回应道。\n\n施坦纳又喝了口啤酒：“你妄言整片大西洋都是巴西的财产，此话怎讲？你是不是以为自己可以强迫我们把生计拱手让人？你哪儿来的权利这样做？”\n\n“那你们也不能闯入巴西水域，夺走我国的渔获和生计啊，”萨莱斯面带苦色地说道。“文明国家是要讲规矩的，我国作为一个主权国家有必要捍卫自身权利。想想吧，罗尔夫，你真希望看到事态升级吗？我已经尽量满了足你们的要求，不能再过分了！”\n\n“我们可以过分，”施坦纳说，“我观察过你们的舰队，跟德国海军比起来有几斤几两我可是清楚得很。你要是现在起身离开就没机会了。”\n\n情况糟透了，这就是眼前这个醉醺醺的德国佬抛出的合理协议。摆在萨莱斯面前的只有两个选择：一是屈服于施坦纳的威胁；二是干脆退出谈判走人，而这也就意味着言辞外交以失败告终。"
 brazil.215.a: "低着头离开。"
 brazil.215.b: "盯着对方的眼睛离开。"
 brazil.216.t: "龙虾问题解决"
 brazil.216.desc: "“那，我们算是谈拢了？”萨莱斯说。\n\n“没错”，施坦纳微微点头以示赞同：“我想这场龙虾战争现在可以画上句号了。”\n\n萨莱斯深吸了一口气。他深知渔获问题必定是整场谈判中最难跨过去的坎，但既然它已经顺利解决……那么后面的事情就好办得多了。萨莱斯稍稍活动了下有些僵硬的四肢，拿起杯子喝了口水。\n\n另一边厢，施坦纳依然紧紧盯着萨莱斯。他清楚这场漫漫长夜仅仅算是开了个小头，自己还要再多准备些酒，才不至于让紧绷的神经放松下来。\n\n“然后呢？”萨莱斯问道。\n\n施坦纳打了个响指，一名雇佣兵立马呈上来一幅南大西洋的地图，并附带上笔和尺子。萨莱斯一下子明白了接下来要做什么。"
 brazil.216.a: "该划分海床了。"
 brazil.217.t: "关于海军边境的讨论"
 brazil.217.desc: "“既然捕鱼权一事已经商定，现在该谈谈我国对海床的主张了。”萨莱斯重新引入话题：“相信我方提议的专属经济区将打消你们对此的一切担忧。”\n\n施坦纳看着他：“说来听听。”\n\n萨莱斯起身走向地图，施坦纳随即拿上啤酒跟在后面。“德国政府早先的立场是，巴西拥有距海岸线12英里内所有海域的主权。但水下测绘技术在不断进步，巴西政府声索的大陆架实际上延伸到了更远的地方。因此，你们任何行动的范围最多能到……”萨莱斯稍作停顿，用尺子比着划下一条直线，接着又度量了它到海岸的距离，“……这条线的位置，大约370公里处。整个大陆架其实是朝着四面八方在延伸，但这样划定的结果能让双方都认可。”\n\n“嗯……”施坦纳自己也掏出一支笔来：“也就是说，如果我只需求360公里范围的话……”他把笔停在第一条标记之后，显然并未逾越萨莱斯口中的底线。\n\n“那么巴西政府将完全同意你们的领海主张。”萨莱斯接上他的话。\n\n施坦纳点了点头，又一项条款的内容尘埃落定了。"
 brazil.217.a: "现在我们谈谈船员吧。"
 brazil.218.t: "船员问题"
 brazil.218.desc: "“好吧，萨莱斯先生。”施坦纳又喝了口啤酒，“下面是不是该讨论一下被你们在这出闹剧中拘留的渔民了。”\n\n“没问题。”萨莱斯欣然同意，“你应该知道，其中大多数人被指控在限制海域进行捕捞，有的还试图攻击海军陆战队士兵。”\n\n“有东西能转移媒体的注意力，社民党应该高兴才对。”施坦纳说，“当然，关键问题还是那些渔民。你们的海军野蛮绑架了几十名雅利安劳工，这是日耳曼尼亚所不能容忍的。”\n\n“雅利安？他们基本上都是非洲土著！”\n\n“冲突双方都需要宣传攻势，萨莱斯先生。”施坦纳冷冷地说，“我也清楚里面没几个是德国本土的，但你不觉得这种说法德国人更爱听吗？他们大部分人其实不知道中非是个很多元的地方。”说罢，他看了看旁边穿着党卫队服的土著侍从。\n\n“不过重点不在这儿，萨莱斯先生。遣返德国公民这件事，我看应该……”"
 brazil.218.a: "“……马上就办。”"
 brazil.218.b: "“……等方便的时候再办。”"
 brazil.218.c: "“……等协议落实之后再办。”"
 brazil.219.t: "立即行动"
 brazil.219.desc: "“但这不是重点，萨莱斯先生。依我看，德国公民必须被立即释放，没有回旋的余地。渔民们今晚就要回家。” \n\n萨莱斯很清该怎么对此做出答复，“嗯……不可能的，元帅。在没有达成将来能够规避类似情况的协议之前，我方不会考虑释放或撤诉任何一名囚犯。况且这并非一朝一夕即可完成，恕难从命。”\n\n“渔船不是在你们手里吗？他们难道不能开船回来？”施坦纳轻笑一声，抿了一口嘎弗啤酒。“但是，德国政府绝不容忍自家公民被扣留，你们的所作所为实在难以容忍。今晚他们必须被释放。”\n\n局面变得微妙起来。萨莱斯当然可以继续向强权妥协，带着足够的屈辱离开。或者他可以争取一些……更为合理的条件。如果对方愿意宽限一些时间，遣返囚犯无疑可以顺利进行。也许施坦纳能够意识到这一点。\n\n但他可能也没有这么聪明，那么整个谈判就会变成一场闹剧。\n\n萨莱斯紧盯对手的面孔，下一步计划已了然于胸。"
 brazil.219.a: "“很好，立即遣返。”"
 brazil.219.b: "“也许需要规划一个靠谱的时间表？”"
 brazil.220.t: "可能性的艺术"
 brazil.220.desc: "“但这并非我们讨论的重点，萨莱斯先生。在我看来，德国公民必须尽快回国。我们并非要求立刻遣返，而是希望能够尽量减少延误。”\n\n“这么说……我们就得大赦那些渔民？”萨莱斯问道。\n\n“您得认识到，我们需要尽快脱离这个不幸的境地。这意味着，我们要把他们全部转移过去，”施坦纳又抿了一口嘎弗啤酒，接着说道，“我们会就此事为您提供帮助，派汉莎航空和船只来运人。我们明白，这需要时间。为了遣返顺利进行，我们也乐意提供方便，但一定要快。”\n\n萨莱斯觉得这是个不错的提议。羁押人员能在颜面尽失之前得以遣返回国，但……“我们怎么知道你们不会食言呢？”\n\n施坦纳正欲饮酒，听到这话愣了一下：“嗯？”\n\n“遣返之后，我们怎么知道你们不会反悔？毕竟这才是你们坐到谈判桌前的唯一原因。一旦失去了你们的公民，我们也就失去了谈判的筹码。”\n\n“我向您承诺，我方不会违背我们之间达成的口头协议。”施坦纳语回答道。萨莱斯听着，心里却半信半疑。"
 brazil.220.a: "这妥协听起来不错。"
 brazil.220.b: "我们想什么时候放就什么时候放！"
 brazil.221.t: "皆大欢喜"
 brazil.221.desc: "“但这不是重点，瓦尔特·萨莱斯先生。在我看来，一旦这份协议签定，所有德国公民就应当立即得到遣返。争端既已平息，继续拘留便也没了缘由，我们也无意让他们在牢笼中多留一刻。”\n\n“确实，这听起来颇为合理。” 思忖片刻后，萨莱斯终于开口说道，“我清楚你们政府对于船员被扣一事颇为关切，既然纷争已得妥善处理，继续羁押他们已无必要。”\n\n“我相信，一旦我们达成妥协，遣返问题自会迎刃而解。汉莎航空亦需时日准备包机。而且，我知晓还有些……需要进一步追诉的问题。无论如何，用武力贸然攻击巴西海军陆战队，都不是德意志人的作风。”\n\n“那么……我们唯一的要求，就是在协议签定之后，释放被扣押的船员，并不以非法捕鱼之名追究他们的责任？我猜，这可能是出于外交紧迫性，司法部长会愿意赞同的。”\n\n“太好了！为我们的共识干杯！”施坦纳举起半杯嘎弗啤酒，萨莱斯则用一杯清水予以回敬。"
 brazil.221.a: "他们都说德属中非那些人都是实用主义者。"
 brazil.222.t: "理智与情感"
 brazil.222.desc: "“立即释放？”萨莱斯疑惑地问道，“这远超我们的能力范畴。我们不可能跳过程序、立即释放所有人。”\n\n“今晚就要敲定协议，”施坦纳沉声道，“而且我们现在就要解决这一切。除非你停止犹豫是否官宣、赋予其法律效益或者随便别的类似东西，否则就永远不算完。”\n\n“放人不必等到协议正式签署，但我们没法今晚就一股脑地大赦北德意志劳埃德公司全体员工。这会引起巨大的混乱。光让他们走却又不告诉他们如何返回非洲，这绝不可行。他们不会接受，我们也不能接受，未来社论热度也会让日耳曼尼亚注意到你们这边的闹剧。”萨莱斯向中非专员辖区来的贵宾表示。\n\n施坦纳紧咬牙关，他后悔今晚没有选择更清淡的啤酒。“你的意思是？”他问道。\n\n“我们不需要立即释放他们，只需适当地拖延一会，处理一些搁置的问题。不过，这段时间要足够我们为其高效、迅速的遣返作准备。你认为呢？”萨莱斯的话语中充满了暗示。\n\n施坦纳此刻须作决断。酒意朦胧之中，他知道自己大概已无法作出最明智的选择。"
 brazil.222.a: "“当然啦，瓦尔特，我们做得到。”"
 brazil.222.b: "“我们不会改主意。”"
 brazil.223.t: "巴西希望推迟遣返"
 brazil.223.desc: "“元帅，这是不可能的。协议达成之前我们不可能释放人质。”\n\n施坦纳知道现在不是沉湎酒色的好时机。“萨莱斯先生，我向您提出的条款是明智且通向和解——”\n\n“我记得希特勒在慕尼黑会议上也说过同样的话，但你会发现世界上没有第二个张伯伦。就外交历史而言，你的政府不咋值得信赖，这点你总得承认吧。这么说吧，这儿的服务员比你在宣传册上写得还要黑。”\n\n施坦纳扮了个鬼脸。“但在事情解决之后，你不能无限期地关押我们的人——”\n\n“因此他们将在协议正式签署后获释。这叫保险。如果日耳曼尼亚不能强迫你撕毁协议，对你和你的上司来说会有利得多，因为我们手里还有牌。”\n\n“说实话，瓦尔特，我们今晚达成什么协议日耳曼尼亚根本不在乎。无论发生什么事情非洲部都没反应，希特勒在外边待着——他可能知道也可能不知道，申克一点也不关心这些而且无论如何他都会要一大笔钱，而许蒂希居然觉得他是给上帝面子来当这儿的老大！我们压根没能力反悔的。”\n\n“对于一个以效率和无情为荣的体制来说，这真是难以置信。”\n\n“你根本不懂，”斯坦纳喝着酒，然后决定如何处理此事。"
 brazil.223.a: "“好吧，你赢了，推迟遣返。”"
 brazil.223.b: "“这就是最好的结果了。”"
 brazil.224.t: "永久承诺"
 brazil.224.desc: "“……此外，申克那边有几架323型飞机，我们可以借来使用。我倒觉得，他的喷气机或许更适合这次任务，”施坦纳说道，“虽然要破费，但他能让日耳曼尼亚蒙在鼓里，而我们也能在短短几小时内抵达布拉柴维尔。”\n\n“看来这就是计划了。”萨莱斯轻轻叹息，脸上浮现出一丝轻松，“还有其他事项需要讨论吗？”\n\n“暂时没有。” 施坦纳回答，随即他脸上掠过一丝恍然大悟的笑容。“沃尔特……”\n\n萨莱斯立刻明白了他的意思：“罗尔夫……”\n\n他们握手，笑声中透着几分释然。“真他娘的天才啊，”罗尔夫感慨道，“我们竟然就这样避免了一场战争！就凭一个雇佣兵和一个商人！说实话，这谁还用的上请个瓦尔特·黑韦尔啊！”\n\n“我敢说，你若站在他的位置上，也定然能游刃有余。” 萨莱斯半开玩笑地说，“现在，我们最好把这个方案书写清楚……等等，那是直升机的声音吗？”\n\n迫近的直升机声音让施坦纳心头一沉。即使在微醺之中，他也能分辨出那是德国制造的“云雀II”型。“天哪，为何偏偏在这时刻？”\n\n“出了什么事？” 萨莱斯问道。\n\n施坦纳眉头紧锁：“你说呢？在这专员辖区，直升机降落在你家门外会意味着什么？”"
 brazil.224.a: "事情更复杂了。"
 brazil.225.t: "外交礼仪"
 brazil.225.desc: "“穆勒专员，”尽管施坦纳喝得有些上头了，他还是郑重其事地用头衔全称称呼穆勒，来营造一种专业的氛围，“今晚的意外之喜，这就是巴西的代表，瓦尔特·莫里纳·萨莱斯先森——”\n\n“见到你很高兴，瓦尔特。”穆勒没看他一眼，他从自己的G1步枪机匣里抽出了弹匣，然后一直盯着机匣里面。“嗨，咱达成协议没有？”\n\n萨莱斯意识到穆勒并不是那种自己想象中的典型专员。穆勒不像格洛博奇尼克或者特博文一样总是一丝不苟地穿着他们纳粹党的标志性制服，至少萨莱斯碰到他之后，他一次都没有穿过，甚至可以说是在有意避免穿着那套服装，而且，虽然穆勒提了问题之后就一直在摆弄着自动步枪，但他一直没有真的装填子弹。“当然，是的，专员先生，协议就在这里——”\n\n“太好了！又是外交胜利！”穆勒从直升机中站起来，走向萨莱斯，仍然单手提着那把自动步枪。“萨莱斯先生，我要让你知道，对于那件可怕的事故，我也深表遗憾，而且我几乎一点都没有参与其中，士兵们也只是听日耳曼尼亚那边的安排行事。我很高兴我的副手解除了德国和巴西之间的一些小误会，我希望通过外交访问向贵国表明，我对这一事件没有任何恶意的看法。”\n\n这倒让众人搞不明白了。“什么？”萨莱斯与施坦纳同时惊问出声。\n\n“其实我啊，一直都想去巴西走走。那么宽广的亚马孙雨林，还有耶稣像，以及卡门·米兰达这样的美人！但我一直没有机会。瓦尔特，你就说能办不能办吧？”\n\n萨莱斯仔细考虑了一会儿。“我不觉得这是个问题。外交来往总是好的，美国人要是知道了肯定要火冒三丈。但我觉得那是您的首席谈判官要考虑的事。”\n\n施坦纳吞了一下口水。事态的发展出乎他的想象，这事这么就砸到他头上了？为什么这事就要交给他去考虑了？\n\n“罗尔夫，”穆勒突然问道，“你今晚是不是喝多了？”"
 brazil.225.a: "人总是需要放松一下。"
 brazil.225.b: "专员先生，您需要留在非洲。"
 brazil.225.c: "萨莱斯吞了口口水。"
 brazil.226.t: "专员的巴西远行名噪南美洲"
 brazil.226.desc: "美联社里约热内卢电——西格弗里德·穆勒专员的巴西之行在该国乃至全世界掀起了轩然大波。不久之前，这位专员还在南大西洋的捕捞权问题上与巴西政府剑拔弩张，而现在，他却笑容满面地走下专机，准备在一个小型政府代表团的陪同下短暂访问里约。\n\n为避免与恩里克·洛特总统会面时的尴尬，穆勒专员的行程安排得较为非正式。他并未在新首都巴西利亚举行的招待会上花费太多时间，而是将它们用于乘直升机游览亚马孙雨林。“我本计划捕获一头美洲虎，可惜未能如愿。”专员告诉当地媒体，“不过我成功猎到了一只凯门鳄，打算带回利奥波德维尔向客人们展示。”\n\n德国驻巴西大使馆发表声明，希望此次来访能开启德巴关系的新篇章，但多数纳粹政府官员据信不满于这一半官方性质的访问。美国国务院的不满情绪则更为强烈，指责巴西公开接待了一位纳粹党要员。民间的反对声同样存在，以非裔巴西人为主的各群体走上街头，抗议德国殖民政府的暴行。《新闻论坛报》评论称，洛特政府的行为使巴西沦为国际犯罪的温床。\n\n相对随性的穆勒专员没有被批评声影响，他回应道：“政治是愚蠢的，应该把它抛到脑后。”他还表示，欢迎洛特总统和雅尼奥·夸德罗斯副总统随时回访中非。"
 brazil.226.a: "这本可能会更糟！"
 brazil.226_tt: "专员看上了一个可爱的刺龙虾战利品，决定把它带回家。"
 brazil.227.t: "一路平安，萨莱斯先生"
 brazil.227.desc: "清晨，朝阳跃出非洲大陆的地平线，阳光洒在希特勒施塔特机场停机坪上的一架私人飞机上。机舱外，机组人员正闲坐着，尽量不去想在纳粹非洲这个广袤而充满敌意的深渊之中可能遇到怎样的危险。此时此刻，除了保证飞机随时都能起飞之外，他们什么也做不了。\n\n一支迷彩车队沿着公路由城市而来。检查后，车队获得放行进入机场，停在了飞机前。一群雇佣兵下车，临时担当仪仗队。瓦尔特·萨莱斯走下车，从中间走近飞机，罗尔夫·施坦纳紧随其后。机组的精神都为之一振。二人又交谈了几句，随后，萨莱斯便走上舷梯，坐进了自己的飞机。\n\n几个小时的争论后，萨莱斯终于回到了祖国能掌控的地盘上。他靠进飞机座椅，放松下来。争论很是激烈，时间也是深夜。或许他让步太多了，但重要的是，他达成了停止龙虾战争的协议。可能会有人批评他，将他与梅特涅、张伯伦相比，但他一劳永逸地避免了战争。这无疑是最重要的。\n\n飞机起飞，消失在刚果湖上空，融入湛蓝的天际。施坦纳目送着巴西外交官离去。实际上，他对自己做的这桩交易也不是很有把握，到最后他也有点喝多了。他比任何人都清楚，在这个疯狂的世界上，能通过决议就解决的难题少之又少。不过，有那么一瞬间，他为自己能够避免非洲发生又一场冲突而感到一丝的欣慰。"
 brazil.227.a: "一代人的和平。"
 brazil.228.t: "沉没成本"
 brazil.228.desc: "最终，每个人都意识到这永远不可能奏效。\n\n萨莱斯原本预料施坦纳会暴跳如雷，但事实上，施坦纳对这种局面的反应出奇地冷静。也许是酒精遏制了他的情绪爆发。或许，作为一个雇佣兵，他比萨莱斯所想象的更有理智。但也有可能，施坦纳根本就不怎么在乎那些龙虾，或者根本不担心两边会爆发冲突。\n\n接下来的时间里，他们没有任何迟疑。一旦谈判破裂，施坦纳便伴随萨莱斯重返车队，驶向机场。两人之间再无言语交流，因为一切都已尽在不言中。到了机场，萨莱斯向东道主致意告别，独自向待命的喷气机走去。施坦纳只是静静地从车内注视着。\n\n萨莱斯心中苦涩，这简直糟透了。德国人根本无法理喻。这趟旅程本是外交上的最后一线希望，如今却彻底破灭了。到家后，他不得不向洛特解释这一惨烈的失败，还得告诉他，解决这场危机需要采取更加严厉的手段。\n\n但或许会让他感到意外的是，当他驾驶着飞机消失在深邃的夜空中时，施坦纳的思绪与他惊人地相似。整个世界即将在暴力中崩溃，从西方迫近的威胁甚至超过了喀麦隆或南非。但他也知道，巴西仍在努力将世界拨回正轨，哪怕只有一点点也好。"
 brazil.228.a: "自海而始，由海而终。"
 brazil.229.t: "海神号归来"
 brazil.229.desc: "“海神号”——这艘驶出卡宾达的拖网渔船，船员大多是非洲本土船员，辅以少数比利时和法国的资深军官。他们中间，只有一名德国人。但在登上他们船只的海军陆战队员眼中，这些细节微不足道——他们都是中非人。这意味着他们的船被扣押，而船员们则在巴西纳塔尔的阿里·帕雷拉斯海军上将基地内一个由旧仓库改造而成的拘留所里，度过漫长的日日夜夜。\n\n最令人心神不宁的是那无尽的不确定与等待。他们能够寄出书信，但电话联络却是奢望。一个机敏的巴西人让他们从事单调乏味的工作，比如在海军基地周围修剪草坪，但还是留给了他们大把空闲时间，或许还能练练葡萄牙语。德国领事馆每天都会向他们讲述各种故事，描绘着巴西将如何为他们所承受的苦难付出代价。然而，何时能踏上归途的问题，始终无人能答。\n\n终于，答案到来了。他们分批登上卡车，然后遣送到了当地机场。那里停有一架涂有西南非空军标志的梅塞施密特323“巨人”号大型飞机，自从巴西的护卫舰将他们扣押的那一刻起，他们未曾感受到如此深切的安慰，直至这架飞机出现在眼前。\n\n跨越大西洋的旅程并不舒适，但当飞机最终在布拉柴维尔着陆时，他们踏出舱门，迎接他们的是刚果温暖的蓝天和湿润的空气。他们终于回到了家，再次感受到了自由。\n\n然而，他们距离自己的港口还很远。他们没有船。也没有回家的途径。\n\n而且，他们仍旧是德属非洲的臣民。"
 brazil.229.a: "噩梦还未了结。"
 brazil.230.t: "1965年总统大选开始"
 brazil.230.desc: "总统候选人已被选定并公布，巴西群雄逐鹿，竞选各方开足了马力，谁将脱颖而出？竞选者在挨家挨户推销，劝说选民投票给己方候选人。他们在成千上万人面前发表盛大演说，试图说服广大群众，却也忘不了幕后交易，好让候选人占得先机。与此同时，军方注视着选战的进行，他们的态度仍不为群众所知。\n\n该你决定为谁而战了。"
 brazil.230.a: "要延续瓦加斯的遗产，为若昂·古拉特竞选。"
 brazil.230.b: "五年跨越五十年，为儒塞利诺·库比契克竞选。"
 brazil.230.c: "巴西未来的独立自主道路，为雅尼奥·夸德罗斯竞选。"
 brazil.230.d: "终结瓦加斯主义的灾厄，为卡洛斯·拉塞尔达竞选。"
 brazil.230.e: "收钱但办事，为阿德马尔·德·巴罗斯竞选。"
 BRA_pres_election_season_tt: "§w现在可以在总统选举面板上为你选择的候选人竞选了！§!"
 brazil.231.t: "1965 Elections End Invisible Event"
 brazil.231.desc: "among us"
 brazil.232.t: "劳工主义的胜利"
 brazil.232.desc: "若昂·古拉特决定用一餐南里奥格兰德家乡风味烤肉庆祝他的胜选。他的支持者和盟友们像是瓦加斯和库比契克都送来了祝贺，喝得醉醺醺得，发表了几番感言。毕竟这可是个值得庆祝的日子。直到宾客告辞余下的人也已睡去，古拉特和莱昂内尔·布里佐拉依旧围坐在火炉边，送三两酒肴下肚，伴着阵阵大笑和含糊的祝酒词。“这是可喜可贺的一天！”布里佐拉说道，“接下来几年，我们将直面苦战腐化巴西政坛、压迫巴西工人的一切势力。若昂·古拉特总统会带领劳工运动高歌猛进，”布里佐拉送上最后的祝酒词，“自由的巴西人民将迎来幸福的明天。”\n\n远离继任总统官邸，某间烟雾缭绕的密室里，气氛阴沉，四位将军位居其中。怎么会这样？怎么能让个社会主义者、瓦加斯的傀儡，还是天杀的共匪统领这个国家？！绝不能行，绝不！现在该动手了。\n\n另一边，热图利奥·瓦加斯独坐在他黑暗的办公室里，抽着一根粗大的雪茄，露出了愉悦的笑容。“啊，那伙将军们现在肯定气坏了。”烟雾渐渐萦绕整个房间，瓦加斯回想起了他执政时的那些日子，以及他为这个国家做出的努力。现在杨戈将踏上恩师奋战过的同一片战场，只需些许匡助，他胜利的未来熠熠生辉。"
 brazil.232.a: "这一夜，有人欢喜有人忧。"
 brazil.233.t: "考验时刻"
 brazil.233.desc: "一切都在意料之中。民意调查言明了局势，媒体评论彰显着现实，政敌百般抱怨，喋喋不休，企图抵抗潮流，但政坛已经为即将到来的结果做好了准备，预期逐渐成为了现实。\n\n儒塞利诺·库比契克在一台硕大的放映机前驻足观看，它现在并没有在放映电影，而是正在转播电视信号：新闻节目正在播送他以压倒性优势击败竞选对手、成为共和国历史上第一位两度当选的总统的消息。乌尔卡赌场里，缤纷彩纸漫天飘洒，乐队演奏着特别混录的爵士版《活鱼》，这是库比契克最为钟爱的歌曲。在旋律中，人们欢呼起舞。大选尘埃落定，工党-社民党联盟再次胜出，巩固了其在巴西政坛上的领导地位。从实业家到寡头，从军官到教师，再到受邀的普通民众，他们簇拥在一起，将库比契克高高举过头顶，欢欣鼓舞地将他抬上讲台。他一路跌跌撞撞，皱巴巴的烟头从手中滑落。热图利奥·瓦加斯作为贵宾出席，在典礼中，他不断受到门徒的赞扬，而每当演讲停顿时，瓦加斯也会加入到欢呼之中。\n\n“我们成功了！”杨戈坐在瓦加斯的右侧，低声说道，“我很想看看拉塞尔达现在是什么表情。”\n\n“气得七窍生烟，就像我那个时候一样。”瓦加斯回应道，逗得杨戈笑出了声，“但我们不能掉以轻心，拉塞尔达可能还会有所行动，他这人一直如此。”\n\n“可他好像就没成功过啊。”杨戈接着说道，然后又重新庆贺起来，因为库比契克已经开始谈论他的未来规划了。\n\n瓦加斯自己则在思索这一切的意义。他不确定自己还能不能见证下一任总统的就职，但这次胜利的意义无疑十分深远：他一手建立的体制得以延续，并适应了新时代的意识形态需求。广受民众赞誉的“穷人之父”，前总统热图利奥·瓦加斯的政治遗产完好地留存了下来。"
 brazil.233.a: "愿他的遗产得以延续，直至永恒！"
 brazil.234.t: "投票箱的胜利"
 brazil.234.desc: "胜利终于到来！在全民盟的总部里，新当选的雅尼奥·夸德罗斯总统与工作人员、全民盟的其他候选人以及友好的记者们欢声笑语，互相祝贺。疲惫让他的双腿沉重如铅，庆祝的酒让他步履蹒跚。此刻，谁也没想到要发表演讲。今晚，只有欢庆。明天，当总统清醒时，再为这个时刻找到合适的言辞。现在，夸德罗斯与在场众人开怀畅饮，笑声不断，尽情享受着胜利的美酒。\n\n这一路走来可真不容易！总统在沙发上倚靠，思绪万千。每个左派的对手都曾嘲笑过他，认为副总统的权力之路不切实际，副总统职位似乎是对他未来抱负的束缚。有人嘲笑，全民盟的布谷鸟只会在地面上炫耀，却不能高飞。\n\n而在右翼的阵营里，那些看着自己的政党被夸德罗斯接管的“乌鸦”支持者们则感到颇为不悦。在五十年代拉塞尔达的失败政变后被边缘化的许多党员，对夸德罗斯出任领袖感到沮丧不已。\n\n所有的质疑都将被证伪。雅尼奥·夸德罗斯闭上了眼睛，享受片刻的安宁。房间里的喧嚣声对他而言，宛如最甜美的摇篮曲。明天将是正式演讲的时刻。"
 brazil.234.a: "我们…嗝…赢了！"
 brazil.235.t: "拉塞尔达获胜"
 brazil.235.desc: "巴西的新总统，卡洛斯·拉塞尔达正在办公室里手舞足蹈。门当然是紧锁着的，墙的隔音效果也很好，留声机里传来查克·贝里激昂的吉他曲调，总统就随着这旋律翩翩起舞，仿佛全世界都与他无关。他胜利了！巴西人民终于在历史的十字路口，选择了正确的道路！\n\n他气喘吁吁地停下来，取下唱片，擦去额头上的汗珠。稍作休息后，他离开办公室，走向他的团队和最坚定的支持者们。欢呼声如潮水般涌来，他挥手微笑着，慷慨地握手，用他作为瓜纳巴拉州长所培养的尊严和亲切，问候着老朋友。当人群逐渐安静下来时，他才开口发言。\n\n“亲爱的朋友们，我深深感激你们坚定不移的支持与奋斗精神！我们伟大的共和国长久以来饱受误解与误导之苦，但如今，她终于迎来了属于自己的尊严与光明未来。我们正朝着自由与繁荣的堡垒迈进，打造一个每位公民都能自由生活、工作、追求幸福的国家，不再受制于外部的帝国主义势力和国内的暴政。我们将彻底颠覆过往政府的灾难性政策，全力减轻全国中产阶级的重负。巴西将不再于寡头统治和民粹主义的泥潭中徘徊不前。今天，我向你们庄严承诺，巴西的未来将是光明且美好的！”"
 brazil.235.a: "人群沸腾了。"
 brazil.236.t: "烟火"
 brazil.236.desc: "阿德马尔·德·巴罗斯大口地喝着酒，一边朝着房间中央的桌子走去。命运之神似乎眷顾了他，他竟然赢得了总统大选。人们吃着、笑着、尽情享受，每个人都喝得很厉害，尤其是阿德马尔。\n\n“我的朋友们，给我一分钟，我想用一杯酒来庆祝这个胜利。不，不，我要站在桌子上。我不会掉下去的，相信我，呃——给我一分钟爬上去。好了，让我们举杯吧。为我的胜利干杯！为我们未来的成功干杯！为巴西干杯！”\n\n派对上忽然响起了一阵狂热的欢呼。一名助手急忙过来帮助他从桌子上下来。“我没事。我自己爬上来的，也能自己下去。”阿德马尔的脸此刻红得像苹果，他的一根背带还松开了。\n\n“呃，德·巴罗斯先生。”助手脸上带着担忧，“有电话找您，说是关于选举的事。”\n\n阿德马尔咧嘴一笑。“我的领先优势还扩大了？”他转向派对众人。“好了，我的朋友们，我得去接个电话。总统的事务嘛。”就在阿德马尔走进另一个房间接电话时，派对上又爆发出一轮欢呼。他拿起电话。“我是阿德马尔。有什么消息给我？我的胜利已经确定了？那太好了，但我不认为那是个——什么？等等，等等。”阿德马尔脸上的红晕在一瞬间消失了。\n\n“你说劳多输了！他怎么会输，我都赢了！副总统现在是谁？埃德娜·洛特赢了？差距很小吗？就算只有一点点差距，输了就是输了！”阿德马尔开始在房间里踱步，“民调显示我们领先超过5个百分点！我赢了！他怎么就输了！我们得在内阁里给劳多找个新位置。我不知道。赶紧查一查他到底怎么输的！”阿德马尔烦躁地一屁股坐回椅子上，转向他的助手："
 brazil.236.a: "“也许我贿赂的人还不够多？”"
 brazil.237.t: "全民盟的总统选举准备"
 brazil.237.desc: "[BRA_UDN_nomination]"
 brazil.237.desc.quadrosre: "全民盟选举联盟最近发布了一份声明，宣布全力支持现任总统雅尼奥·夸德罗斯继续执政，并决心为他和全民盟拿下又一个任期。\n\n在全民盟代表大会的竞选演说上，雅尼奥·夸德罗斯总结了自己竞选的要点：不依赖任何大国的独立自主外交政策、推广巴西传统道德价值观。他还承诺将竭尽所能去扫除巴西利亚的腐败。\n\n为了赢得选举，全民盟已经动员了全部竞选资源。"
 brazil.237.desc.lacerdare: "全民盟选举联盟最近发布了一份声明，宣布全力支持现任总统卡洛斯·拉塞尔达继续执政，并决心为他和全民盟拿下又一个任期。\n\n在全民盟代表大会的竞选演说上，卡洛斯·拉塞尔达总结了自己竞选的要点：为世界各地的人权挺身而出、与盟国紧密合作、通过反瓦加斯主义的市场经济改革提振经济。\n\n为了赢得选举，全民盟已发动起全部竞选资源。"
 brazil.237.desc.lacerda: "全民盟选举联盟最近发布了一份声明，宣布全力支持瓜纳巴拉州长卡洛斯·拉塞尔达成为总统候选人，并决心为他和全民盟拿下下一个任期。\n\n在全民盟代表大会的竞选演说上，卡洛斯·拉塞尔达总结了自己竞选的要点：为世界各地的人权挺身而出、与盟国紧密合作、通过反瓦加斯主义的市场经济改革提振经济。\n\n为了赢得选举，全民盟已发动起全部竞选资源。"
 brazil.237.desc.both: "辩论已进入第四个小时，全民盟还未能决定谁将代表他们参加即将到来的总统选举。夸德罗斯和拉塞尔达的支持者们陷入僵局，争论着谁更适合带领全民盟走向选举的胜利。整个党派都铆足了劲，誓要阻止社会民主党-工党联盟再次上台，这种决心或许过于强烈。双方都拿出了有力的论点和毫无根据的侮辱，全民盟很可能会最终团结起来，支持这场无休止辩论中的胜者。\n\n目前担任瓜纳巴拉州长的卡洛斯·拉塞尔达，在从政之前是一名知名记者。尽管许多人认可他在巴西关键州的出色政绩，但也有人质疑他的急躁脾气和针对全国范围的治理能力。现任副总统雅尼奥·夸德罗斯因其古怪个性和对巴西日常事务的奇特建议而出名。然而，他的副总统任期却颇为成功，维护了和平并推动了全民盟的几项关键提案，这些提案最终得到了洛特的批准。到了午夜时分，全民盟最终选定了……"
 brazil.237.a: "该再次“横扫”民调了，让夸德罗斯上。"
 brazil.237.b: "乌鸦会带领全民盟飞上蓝天，让拉塞尔达上。"
 brazil.238.t: "工党与社民党的总统选举准备"
 brazil.238.desc: "[BRA_coalition_nomination]"
 brazil.238.desc.goulartre: "社民党-工党选举联盟最近发布了一份声明，宣布全力支持现任总统若昂·古拉特成为总统候选人，并决心为他和联盟拿下又一个任期。\n\n在联盟代表大会的竞选演说上，若昂·古拉特总结了自己竞选的要点：福利、社改，并以社会主义者的身份延续热图利奥·瓦加斯的政策。\n\n为了赢得选举，联盟已发动起全部竞选资源。"
 brazil.238.desc.kubitschekre: "社民党-工党选举联盟最近发布了一份声明，宣布全力支持现任总统儒塞利诺·库比契克成为总统候选人，并决心为他和联盟拿下又一个任期。\n\n在联盟代表大会的竞选演说上，儒塞利诺·库比契克总结了自己竞选的要点：稳健改革、经济增长，并以中道派的身份延续热图利奥·瓦加斯的政策。\n\n为了赢得选举，联盟已发动起全部竞选资源。"
 brazil.238.desc.either: "选举即将到来，社民党-工党选举联盟面临抉择，必须在社民党的前总统儒塞利诺·库比契克与工党的前副总统与众议院议长若昂·古拉特之间选出一名候选人。\n\n库比契克竞选的要点：稳健改革、经济增长，并以中道派的身份延续热图利奥·瓦加斯的政策。古拉特则强调福利、社改，并以社会主义者的身份延续热图利奥·瓦加斯的政策。两者有所不同。\n\n社民党-工党联盟决心团结在其中一位候选人的旗帜之下，现在剩下的就是决定该支持谁了。"
 brazil.238.a: "我们相信杨戈。"
 brazil.238.b: "库比契克将继续领导我们。"
 brazil.238.c: "他们相信杨戈。"
 brazil.238.d: "库比契克将继续领导他们。"
 brazil.239.t: "社进党的总统选举准备"
 brazil.239.desc: "[BRA_PSP_nomination]"
 brazil.239.desc.adhemarre: "社进党最近发布了一份声明，宣布全力支持现任总统阿德马尔·德·巴罗斯成为总统候选人，并决心为他和社进党拿下又一个任期。\n\n在社进党代表大会的竞选演说上，阿德马尔·德·巴罗斯总结了自己竞选的要点：为人民提供福利与善治、不惜道德或经济代价以提高政府效率并改善政府设备、提高穷人的福利。\n\n为了赢得选举，社进党已发动起全部竞选资源。"
 brazil.239.desc.adhemar: "社进党最近发布了一份声明，宣布全力支持圣保罗州长阿德马尔·德·巴罗斯成为总统候选人，并决心为他和社进党拿下下一个任期。\n\n在社进党代表大会的竞选演说上，阿德马尔·德·巴罗斯总结了自己竞选的要点：为人民提供福利与善治、不惜道德或经济代价以提高政府效率并改善政府设备、提高穷人的福利。\n\n为了赢得选举，社进党已发动起全部竞选资源。"
 brazil.239.a: "该施展贿赂手段了。"
 brazil.240.t: "维托的挑战"
 brazil.240.desc: "维托已经当了六年官了，但这次的活与众不同。作为一个城里人，他这辈子从没去过农村，但上司因为他之前完成的漂亮工作而把他选为新的农业委员会委员。\n\n“你做的调查是这片儿最好的，”他的上司说，“想去呼吸点新鲜空气吗？”\n\n于是维托就被作为一名委员派到农村做一个简单的任务——调查土地改革的成果。\n\n但眼前的景象让他头晕目眩。\n\n对，电网的确在慢慢覆盖这里；年轻人的确在逐步接受教育；那些富农的确开上了尽管老但保养得很好的车。\n\n但是，这儿的很多其他方面甚至还停留在上世纪。富得流油的市长们住在连里约最好的公寓都相形见绌的别墅里。卡阿多斯党仍然统治着这块地方——这儿的事都由他们说了算。除了一年又一年的美好承诺，贫困、滞后而痛苦的生活仍然折磨着那里的人民。\n\n甚至在他访问完最后一家贫农时，那位可怜的农民仍挺直了腰板告诉他自己身处的极大苦难。维托下定决心，尽管他是个从没来过乡下的城里人，但是这些人，这些养育着巴西的人，这些巴西的心脏，却被年复一年地欺骗，被迫一次又一次相信那些从未兑现的承诺。"
 brazil.240.a: "委员会会努力保证农民们得到应有的待遇。"
 brazil.241.t: "派遣古拉特"
 brazil.241.desc: "对于巴西那些充满疲倦和愤恨的角落而言，杨戈很擅长让这些地方变为他的领地。事实上，没有人需要去真正安抚那些被早已被遗忘的小村庄，特别是当警察足以镇压他们的反抗的时候。然而，正如他的同僚们所说，他总是选择亲力亲为。\n\n台下聚集的人们已经排成一队，当杨戈朝着由多种纸版箱组成的临时讲台迈步时，人群中的嬉笑声和叫骂声逐渐平息。当杨戈开始讲话时，台下已然鸦雀无声。“女士们，先生们，不要把我错看成高高在上的权贵，也不要把我当成蛮横无理的地痞，请将我视为巴西的一位客人，毕竟这是我的身份。”杨戈略作停顿，并向台下的人民探身。此时，他的声音变强了几分，神色也变得像一位伟大的鼓动者。“那些偷走你们粮食的人，那些抢走你们劳动果实的人，那些让美好生活与我们渐行渐远的人，他们不是巴西的客人，他们是不受欢迎的强盗！没有人能够忍受自己的辛劳汗水被这些位高权重的白痴化为乌有！”人们站在那里，起初的迷茫逐渐被打消，愤怒的声音也逐渐消退，转而聚精会神地听这位被派来安抚他们的人的演讲。随着演讲的进行，人们的愤怒再次从心灵，从拳头，从整个身体迸发出来。\n\n“你们都在那些漠视你们，践踏你们的人的束缚下受苦，这一切，我亲眼目睹，心中痛楚难忍！即使是今天，情况也没有改变！这就是为什么我夜以继日，坚持工作。我将要推行一项强有力的法案，即使是那些卑鄙无耻的小偷，那些肆无忌惮的强盗都会贿赂当地代表，让他投下反对票！”人们的情绪很快就被点燃，不知不觉中，杨戈的名字就开始从他们的嘴里高呼出来。杨戈凝视着他的最新杰作——这确实值得一看。而剩下来的事情，就是要实现他的承诺。"
 brazil.241.a: "就算他不这样做，上帝也会帮助他。"
 brazil.242.t: "与牧场主同行"
 brazil.242.desc: "洛特对眼前这个人从头到脚就没有几丝好感，他一直在抽雪茄吞云吐雾个不停，脚上邋里邋遢的靴子也弄脏了原来一尘不染的地板。但夸德罗斯和内阁坚持让他与这些农场主见面，聊聊最近的土地改革法案，洛特觉得这主意简直糟糕透顶。\n\n“总统先生，听说你想在我的土地上搞什么改革？”那位农场主又吸了一口雪茄，然后朝着洛特直直吐了出去。“真是胆大包天，直接连共和国总统都他妈不放在眼里了，”洛特暗想，“军队虽然经常插手政治，但好歹还守自己一套规矩。”\n\n“是的先生。想必您也听说了现在工潮四起，国家停摆，这背后正是因为工会挑起了农村地区的骚动。他们一直想强推这项法案，但我相信其中仍有充分的协商空间。”“我就等着你这句话，总统先生。要我说现在这改革管得太宽了，这么点时间还想做这么多事。你肯定也同意我说一步步改革总比在国会强推这坨共党狗屎要强吧？”\n\n洛特举起一直紧握的双手，托住了下巴，脑子里不停想着这个提议。“如果削弱了法案的力度，杨戈还会坚持继续推行吗？夸德罗斯到底能从全民盟和那个懦夫拉塞尔达那里拉来多少支持？”他的思绪飘飞着，直到另一阵烟吹到脸前。洛特挥挥手，回复道“确实，我也认为该法案部分内容可以调整。那你最终的想法是什么呢？”\n\n农场主笑了笑，从后口袋里掏出一卷长长的诉求书交给洛特。洛特叹了一口气读了起来。其中一些绝对不能接受，但有些或许就值得考量了。他可以花大功夫说服工党同意这些修改，毕竟折中总归好过什么也不做吧？洛特抬起头，说："
 brazil.242.a: "“我并不认可其中的全部内容，但还是有部分改动我可以给予支持。”"
 brazil.242.b: "“你要的太多了。”"
 brazil.243.t: "机器上的齿轮"
 brazil.243.desc: "“保罗，你也清楚，参议院不可能通过这个法案的附加条款。”\n\n“杨戈，我知道你是工党的领头人，但这话到底啥意思？我们是来讨论国会的投票，还是来为我们的同胞们改善生活？”古拉特叹了一口气，沉重地敲着桌子。这场罢工已经持续了一个月，洛特总统把他派来像条听话的狗一样与罢工领袖谈判。为什么那个元帅不能亲自出面；作为总统，回应人民的诉求本就是他的职责。\n\n“保罗，我们的理想共和国可以稍后再实现，届时我们想要的土地改革都可以有。如果我们精心设计了一套完美的改革，但全国民主联盟却全部反对我们，那又有何意义？”“为什么我们要在乎全民盟？那些法西斯分子应该被关起来——”。一个叫卢卡斯的高个子男人举手插话。“杨戈，听我说，”卢卡斯，罢工的另一位领袖说，“我们必须在现有法案中争取到更多。如果我们给银行额外的资金，让它们发放更多贷款，保护小农场主，确保在我们重新分配土地后，牧场主不能立即收购他们的土地怎么样？”\n\n“卢卡斯，你真的认为银行会帮助穷人？你疯了吗？！”保罗一边怒吼着，一边重重地拍着桌子。“不，我没有疯，”卢卡斯叹道，“杨戈说得对。我们需要全民盟。见鬼，我们甚至不确定社会民主党是否会全力支持我们的附加条款。我们必须有个起点。”\n\n“去你们的。我真不敢相信我曾以为你们代表着些什么，”保罗低声咕哝着，愤怒地砰地一声关上了门。一阵尴尬的沉默后，古拉特尴尬地咳嗽了一声。“那么，对于全民盟和社会民主党来说，还有什么是可接受的？”卢卡斯问。接下来的四个小时里，巴西几位最杰出的劳工领袖聚在一起，努力寻找可以妥协的方案。然而，到了次日清晨，情况变得明朗起来："
 brazil.243.a: "古拉特准备了一份清单，列出了法案可能的修改。"
 brazil.243.b: "他们未能达成可靠的共识。"
 brazil.244.t: "成立国家情报局"
 brazil.244.desc: "卡斯特洛·布兰科听到门上的敲击声，心中涌起一股满足感。“请进，戈尔贝里！”\n\n戈尔贝里·多·科托-席尔瓦踏入房间，他是卡斯特洛心目中理想的国家情报局局长人选。他对卡斯特洛行了一个军礼，卡斯特洛亦礼尚往来，随后两人落座。\n\n“戈尔贝里，你的新任务是领导国家情报局。别这么惊讶——没有人比你更适合这个岗位了。”\n\n戈尔贝里点了点头，卡斯特洛继续说道。\n\n“作为这个机构的负责人，你的职责是在国内外监督和协调情报与反情报工作。你将拥有全权去调查和剿灭任何颠覆活动，监视颠覆分子，并向总统和军方通报纳粹或共产主义的威胁。你的退休生活，就此结束。”\n\n戈尔贝里站起身来。“长官，我接受这个任务。我将竭尽全力协助您，确保巴西安全，远离所有内部的敌人。”他再次向卡斯特洛敬了一个礼，随后离开了房间。\n\n卡斯特洛重新坐下，面露满意的微笑。有戈尔贝里这样的人物为他和他的盟友保驾护航，没有人能够悄无声息地触及他们，否则必将遭遇迅速而严厉的反击。"
 brazil.244.a: "多亏了我们，巴西真的变安全了。"
 brazil.245.t: "阿德马尔的愤怒"
 brazil.245.desc: "阿德马尔再次把椅子猛地扔到房间的另一头，随后又一脚踢翻了桌子。\n\n他的愤怒达到了前所未有的程度。他遭到了背叛，被欺骗，被出卖。这个充斥着谎言和欺诈的糟糕政府背叛了他。\n\n没错，他不是个诚实的人，他做过偷窃。但那又怎样？他的所作所为从未伤害过任何人。他做的一切都是为了巴西的福祉。他毕生都在为人民服务，像瓦加斯一样，为他们独自战斗。而政府却是这样对待他。\n\n他们首先剥夺了他应得的内政部长的合法职位，现在还想要彻底阻止他参加选举！\n\n他本想再次捡起椅子，却突然停住了。愤怒虽然让人沉醉，但解决不了任何问题。他是阿德马尔·德·巴罗斯。他总有应对的办法。\n\n他的脑海中已经形成了一个计划。是时候策划他的复仇了。总有人需要资金和支援。总有人会同意他的目标，并为他工作。是时候向他们伸出援手了。"
 brazil.245.a: "“喂？是的，我是阿德马尔。我可以和库比契克博士通话吗……”"
 brazil.245_tt: "£BRA_psd_texticon §Y儒塞利诺·库比契克§!的支持率§Y上升§!。\n"
 brazil.246.t: "巴西的两端"
 brazil.246.desc: "卢卡斯呆呆地望着墙壁，屋外的喧嚣和脚步声愈发接近。保罗到底说的是不是真话？若昂·古拉特和巴西工党怎么又一次让他们失望了？参议院为何看不见他的工友和同胞所处的绝境？正当他的思绪开始盘旋时，一阵急促而咄咄逼人的敲门声响起。卢卡斯站起身开门，看到几个工会的同伴，他们怎么手持钢叉？那个人手里是不是还拿着枪？\n\n“快点，卢卡斯，我们现在就去国会大厦。你来不来？阿连德会在那里与我们汇合。”一位工友问道。卢卡斯对工友们显露出的侵略性不太感冒，但他别无选择。如果他现在不站出来抗议面临的不公，他还有什么信仰和原则可言呢？“好，我马上出来。”\n\n在国家的另一头，洛特不安地盯着电话，努力回避与前同事的通话。在阅读了关于愤怒的农民和工人对农业救济法案失败的报告后，他感到头疼欲裂。这不是他的错；都是拉塞尔达和他的全民盟搞得鬼。这项法案本可以让巴西变得更强大，他们怎么就如此短视呢？洛特想，他们一定是被牧场主们收买了。在他准备拿起另一份报告时，电话铃响了。\n\n“洛特总统，我是德尼斯。你知道我打来要干什么。”洛特咽了口口水，“当然，”他颤抖着声音说，“你真的觉得有必要吗？”\n\n“恩里克，他们在烧毁国家的资产，攻击警察。全国的警察要求军队支援的次数比这个国家的蚊子还要多。我们要么现在行动，要么就面临左翼暴动的风险。”洛特甚至来不及考虑后果，就下意识地说出了出来。\n\n“德尼斯，去做你们和军队必须做的事。但尽量避免暴力——”洛特自言自语，电话里却传来了空白的嘟嘟声。对这位巴西的总统来说，那声音从未像此刻这般令人羞愧。"
 brazil.246.a: "我们现在要怎么把国家拼凑在一起？"
 brazil.253.t: "码头工人罢工"
 brazil.253.desc: "洛特桌上的报告，如同一幅沉重的画卷，描绘着码头工人们的悲惨生活。每个人每月所领的克鲁赛罗纸币，竟比他们磨损的靴底还要单薄。几乎每个工作日都以一场伤残的意外画上句号，而监工们却总是无影无踪。“真令人心酸，不是吗，总统先生？”夸德罗斯边吐着蓝烟，边感叹道。“我也会加入罢工。如果我能，我也愿意下去，但我和他们的不同，只在于我愿意去那里。”\n\n洛特将文件轻轻推到桌边。“你的意思是这种情况不会持久，雅尼奥？我们可以派警察去，或许就可以迅速平息局势。”\n\n“我的意思是，这种情况已经是常态了。这些工人若多年来都在忍受这样的生活，他们可能无法失去这份微薄的收入，我们应该花时间去理解是什么逼迫他们走到了这一步，并寻求解决之道。”\n\n洛特对着那位年迈的元帅——德尼斯轻轻点头，示意他的老战友。“业主们不希望警方介入，因为他们担心这会惊吓股东，但我们也无需插手，总统先生。如果谈判失败，后果将落在您的头上。请记住，这只是雇员和雇主间的争执，除非我们自找麻烦，否则与我们无关。”\n\n夸德罗斯走过办公室，停在德尼斯面前，后者沉默地站在洛特的阴影中。“那么，防务——这是你的领域。如果没有了码头工人，我们怎么造船？这听起来像是我们的事情。你应该支持我，德尼斯，你或许在这场闹剧中也有所牵连。”\n\n“够了，两位，”洛特平静地说，“我很快就会做出决定。现在，你们可以离开了。”德尼斯和夸德罗斯匆匆离开办公室，洛特总统留在那儿，独自坐在办公桌后，目光深沉地凝视着帕拉诺阿湖的平静水面，陷入沉思。"
 brazil.253.a: "士兵打仗总是胜负难料，可绝不越俎代庖。公司们能够自行处理。"
 brazil.253.b: "工人受苦，工业遇难，巴西遭殃。军人就该为国而战，我也会和罢工者见面。"
 brazil.254.t: "洛特拒绝介入"
 brazil.254.desc: "洛特总统面前的简报如阴霾笼罩，勾勒出一幅沉重的画面。洛特之前的袖手旁观让他陷入孤立，尽管公司已经屈服于部分罢工者的要求。拉塞尔达的巧妙操控削弱了他在社会民主党右翼的支持；那个小人不断在演讲台上煽动民众，声称洛特背叛了商界，指责他无法振兴巴西经济，也帮不了穷人。\n\n这让洛特颇为不悦，总统岂能随意干预私营企业与工人之间的事务？\n\n就在这时，木门吱嘎作响，雅尼奥·夸德罗斯闯了进来。这个瘦削的身影从门口一直延伸到洛特的办公桌。总统眼中，他宛如一个四处游荡的传教士，政坛中的耶和华见证人，在这里显得格格不入。“总统先生，人民把权力交付予您，为何不加以运用？”夸德罗斯提出质疑。\n\n“你来这儿就是为了重复拉塞尔达那一套，我不买账，请你出去。”洛特回绝道。\n\n夸德罗斯穿过房间，没有发出任何声响，他的眼镜仿佛是他愤怒的双眉。他平静地说：“撇开你自找的麻烦，你把我当成拉塞尔达的喉舌的那一刻，你就错了。你要是稍微帮帮忙，那些码头工人现在就能高高兴兴回家，然后再投我们一票。”\n\n洛特抬头，与夸德罗斯对视。总统的目光平静而严厉，两人对峙了一会儿。“夸德罗斯，我说过了，我不想听你这套，请你离开。”\n\n夸德罗斯轻蔑地哼了一声。他离开时猛地关上门，一个松动的螺丝掉在大理石地板上。洛特静静地听着夸德罗斯的脚步声渐行渐远。"
 brazil.254.a: "这不关我的事。"
 brazil.255.t: "与码头工人谈判"
 brazil.255.desc: "屋里弥漫着刺鼻的烟味和汗味，洛特终于明白在船舱里工作的码头工人是什么感受了。也许这也是他们策略的一环。谈判双方共二十个人围坐在一张粘乎乎的桌子旁，光是这张桌子占据了房间的大部分空间，总统则挤在桌子尽头的一张茅草椅子上。码头工人们嚼着烟草，互相交谈了几句，随后一个略显憔悴的男人从他们中间走出来，对着在座的工人们嘘寒问暖，他就是这次罢工的领袖。“在我们开始聊正事之前，我要感谢总统先生不远万里，克服重重困难，出席这次会议。”洛特点了点头，周围的人抽起了雪茄，屋内瞬间烟雾缭绕。\n\n“总统先生，我们现在完全有理由倾听对方的意见。我就直说了吧，我们想越过上级，直接向您传达我们的诉求。工人们希望养老金能上涨百分之十，最低工资上涨百分之六，如果我们能达成一致，明天早上罢工就会停止。”\n\n洛特没有表现出自己的困惑。这些条件显然会威胁到国库的稳定，但代价绝对没有寡头们的愤怒那么高昂。同时，他也不确定罢工会持续多久。罢工会给他带来多大的损失，又会给码头工人带来多大的损失，都还是个未知数。这就像掷骰子一样，但如果他能讨价还价，也许就能控制住开支。当然，他也可以选择退出这场游戏，直接取胜……\n\n然而，洛特有一种无法回避的感觉，那就是对工人们的尊重。在这些双手布满老茧的人背后，是一个个靠他们维持生计的家庭。工人们的罢工并非出于自私，也绝非毫无风险，只要他打开钱包，就能把他们都送回家，让他们拥有幸福的家庭。"
 brazil.255.a: "“我不觉得你会在这件事上退缩，我也没别的办法。我会满足你的要求。”"
 brazil.255.b: "“百分之十，百分之六，这太高了。在我做决定之前，这些数得降一降。”"
 brazil.255.c: "就这？你抽的廉价雪茄快呛死我了，总统不会被无理的数字和恳求的目光动摇。告辞！"
 brazil.256.t: "洛特低头"
 brazil.256.desc: "罢工领袖几乎是腾空而起，跃至桌子对面，以此热切地印证他们的协定。他与洛特紧握双手，随后推门而出，步入那沉闷又湿润的空气中。码头工人们大口喝着啤酒，他们对总统做出彻底让步的速度感到惊喜不已。\n\n在总统府里，回荡着洛特的脚步声。这样的宁静，总是争论的序幕，他知道有人在总统秘书的隔壁办公室里等着他，他迈步走了进去。在那里，坦克雷多·内维斯以少有的坚定态度，挡住了洛特眺望帕拉诺阿湖的视线。\n\n“总统先生，究竟是什么驱使您向那些工人敞开国库之门？”内维斯问道。\n\n“下午好，内维斯。我确信这是解决纷争并让他们重返工作岗位的最快方式。”洛特回答。\n\n“这同时也是动摇投资者信心、引发经济混乱的绝妙举措。我敢肯定那些保证并非出自德尼斯之口。”\n\n“这是我做出的决定，不是夸德罗斯的。既然这个过程注定要面临混乱，不妨趁早解决。现在，我还有一个类似的问题。我需要找到最快的方法，将你从我前往办公室的路上挪开。”\n\n内维斯带着一脸的沧桑皱纹打开了洛特的门，总统坐回自己的椅子上。“我没有提及夸德罗斯，也不需要提。但你应该清楚，他可能很快就会做出和你类似的抉择。罢工的码头工人没有看到你在和他们谈判，他们看到的是夸德罗斯敦促您接受了他们的要求。他不必亲自出席谈判，就能从中获益。最好多提防他一下，洛特先生，祝您有个美好的一天。”"
 brazil.256.a: "随着门闩的咔嗒一声，洛特的办公室鸦雀无声。"
 brazil.257.t: "艰苦的讨价还价"
 brazil.257.desc: "“我知道你们的活儿不容易，但总统有时候就得做出决断。你们要求的太过头了，这数字得降下来，我才能答应。”\n\n罢工领袖的手指在桌子上敲打着，他低声和旁边的工人交换了几句话，然后说：“或许你懂，洛特先生，或许你根本不懂。你是军人，不知道你打过仗没有，但那种被炮弹震得心里发慌的感觉，我们这些人天天都在经历。这儿有人都快五十岁了，走路就像背被踢了一辈子，实际上也确实是这样。”\n\n“说实话，打仗和搬行李可完全不一样。我知道的残疾士兵，恨不得能像你们这样走路，但他们做不到。”\n\n罢工领袖面露怒色，他额头上的汗水淌进皱纹里。“洛特先生，我们现在吸的这烟，比起那些引擎排出的废气，简直清新得跟早晨的空气似的。这跟士兵吸芥子气差不多，但至少他们退役有钱拿！你要么涨工资，洛特先生，别的我不接受。”\n\n洛特脸上挂着严肃的表情，心里却在自责。他在想，也许该让夸德罗斯来谈，或者去帕拉诺阿湖边规划那条跨亚马孙公路，会是个更好的选择。不过无论如何，这些码头工人绝不会空手而归……"
 brazil.257.a: "“什么破条件，我不谈了。”"
 brazil.257.b: "“搬运工确实辛苦，我会给你退休金的。”"
 brazil.257.c: "“我同意你的条件，增加你的薪水。”"
 brazil.258.t: "洛特离场"
 brazil.258.desc: "他已经受不了了。\n\n洛特猛地朝墙壁推开椅子，迈开大步冲向出口。码头工人们静静地看着，目送他转身离开。外面新鲜的空气让总统感受到了一丝解脱，他重重地关上了门，将工人们急切的抗议声隔绝在外。\n“你这是在干什么？”\n“回来！”\n“洛特，你这个混账！我们不需要你也能做到！”\n\n结果工人们还真就做到了。\n\n洛特浏览着报纸，直奔第二十三页的详细报道，略过了他平日最爱的世界新闻版块。码头老板最终屈服于工人的双重要求，协议在一次充满紧张气氛的握手中尘埃落定，报纸上赫然刊登了这次的罢工领袖那张气势汹汹的照片。洛特面无表情地沉思着文章内容。尽管他知道这对罢工者而言绝对是一场胜利，但这是一场必然的胜利，是在现代商业氛围下不得不做出的必要调整。\n\n总统依然神色淡然，他小心翼翼地剪下这篇报道，收入了自己的抽屉深处。"
 brazil.258.a: "留着当作纪念吧，看来一切都很顺利。"
 brazil.259.t: "同意提高退休金"
 brazil.259.desc: "罢工领袖几乎是腾空而起，跃至桌子对面，以此热切地印证他们的协定。他与洛特紧握双手，随后推门而出，步入那沉闷又湿润的空气中。码头工人们，在更丰厚的养老金的安抚下，透过握在手中的啤酒杯，目送总统离去。\n\n坦克雷多·内维斯的伯爵12P手表的滴答声在洛特的办公室里回荡着。对于这样一个矮小的身影和微型的手表，这声音似乎过于突兀，但这位富有政客的声音却清晰地穿透了那机械般的节拍。“总统先生，我不认为您最近的决策在财务上是明智的。码头工人们会从我们的国库里直接领到资金，我们的预算本就不算充裕，再增加一项支出，恐怕财政就危险了。”\n\n洛特的目光重新落回桌上铺展的地图上。“谢谢你的关心，内维斯，但我相信财政部的人会妥善处理这些数字，只留下恰当的数额。”\n\n“夸德罗斯不需要去核查，这里的每个人都知道你同意了什么。在他看来，这无异于一种侮辱。”\n\n“我不介意让夸德罗斯知晓，也不在乎他的抱怨。毕竟那些遗漏的部分，也不是为了他。”"
 brazil.259.a: "“那就这样，你可以走了，内维斯。”"
 brazil.260.t: "同意提高最低工资"
 brazil.260.desc: "罢工领袖几乎是腾空而起，跃至桌子对面，以此热切地印证他们的协定。他与洛特紧握双手，随后推门而出，步入那沉闷又湿润的空气中。码头工人们，因为获得了更高的工资而心满意足，他们透过握着的啤酒杯，目送着离去的总统。\n\n报告接踵而至。信件堆积如山，大多夹杂着粗俗之词，出自巴西商界那些毫不掩饰的人物之手。洛特曾想将这些信件扔到窗户外面去，但担心哪个过于热心的临时职员会偶然发现它们，于是只能用手轻抚额头，压抑着心中的烦躁。\n\n虽然对那些罢工的码头工人感到无奈，但至少，洛特心想，他们知道什么叫满足。至于那些抱怨利润损失的商业精英们，哪怕洛特把一大袋装满硬币的钱袋子扔过去，恐怕也不会给予他半点感激。洛特解决了他们的麻烦；码头工人已经回到工作岗位，商人们也不再损失利润。\n\n而洛特，却未花费分毫。"
 brazil.260.a: "大概我也能投身商界了？"
 brazil.261.t: "父女俩"
 brazil.261.desc: "巴西利亚天气晴朗。恩里克·特谢拉·洛特很高兴能在这样美好的一天于高原宫内会见来宾——既不是他的政坛对手，也不是处事失职的官员，更非有求于他的难缠访客。恰恰相反，到来的是他深爱的女儿埃德娜，刚刚作为巴西工党的党员当选为众议院议员。洛特有时会和女儿开玩笑，说她选择了一个与他不同的政党，但既然是属于若昂·古拉特的阵营，他对这种情况完全可以接受。\n\n“那么，埃德娜，事情进展得怎样？”\n\n“哦，还不错，爸。我已经开始适应众议院的工作了。若昂·古拉特一直在指导我，我偶尔也会和坦克雷多·内维斯接触。”\n\n“真的吗？太好了，很高兴听到这些。你可以信任他俩。顺便问一下，你最近有什么新项目吗？我看看能不能帮上忙。”\n\n“哦，我正在考虑加强对城市劳动力中女性的保护；我相信你也听说过圣保罗和里约热内卢等地发生的那些工作事故，男性得到了他们需要的东西，但女性却几乎得不到关注。”\n\n“啊，这是个好主意，非常好。你得找莱昂内尔·布里佐拉来帮忙，特别是考虑到那只里约的乌鸦可能会在这个问题上大声疾呼。”\n\n“布里佐拉先生？这个主意不错，我之前还真没想过。谢谢你，爸。”\n\n谈话逐渐从紧张的议题转向了一些轻松的话题，洛特的神情也随之放松下来。他对女儿的成就感到无比自豪；心中默默祈祷，随着时间的推移，她能给他更多引以为傲的理由。"
 brazil.261.a: "我敢说，埃德娜很有潜力。"
 brazil.262.t: "社民党事宜"
 brazil.262.desc: "坦克雷多·内维斯来到巴西总统恩里克·洛特的办公室，巴西利亚的高原宫。但今天的聚会并非是来叙旧的；他有更要紧的事情需要处理。社会民主党正处于一片不满之中，必须要采取行动。内维斯一走进房间，立刻直入主题：“党派政治问题。”伴随他多时的公务员们领会其意，默默离开房间，留下两位老友在宽敞的办公室里对峙。\n\n洛特抬起头，面带微笑地点头。“坦克雷多，今天有何贵干？”\n\n内维斯报以微笑，但随即脸色凝重，他的朋友察觉到了变化。“恩里克，是社会民主党的事。那些保守派，就是奥罗那帮人。”\n\n“他们有何不满？”\n\n“社会民主党的右翼成员很不满，恩里克。他们认为你对古拉特和夸德罗斯过于迁就，码头工人的危机就是一个明证。他们认为你没有充分征询他们的意见。虽然我对他们中的一些人并不感冒，但他们的观点不无道理。恩里克，你需要更多地重视他们的意见。”\n\n洛特不以为然地笑了笑。“我是总统，坦克雷多；我在做对国家最好的事。他们需要相信我能够维护我们的民主，避免政治灾难。”\n\n内维斯叹息一声。“我理解，恩里克；你知道我相信你。但你确实需要与奥罗·安德拉德和其他人深入交流。你也该听听他们的意见。”\n\n洛特装作在倾听的样子，但脸上难掩固执的神情。"
 brazil.262.a: "内维斯显然看出了总统并不在乎，他现在很担心。"
 brazil.263.t: "跌下神坛"
 brazil.263.desc: "当所谓的“世界之都日耳曼尼亚”传出消息，纳粹帝国的元首，自称“欧洲之主”的阿道夫·希特勒迎来了所有肉体凡胎都不可避免的命运时，巴西的许多人和整个世界一起庆祝这一全体人类祸害的消逝。\n\n瓜纳巴拉州长卡洛斯·拉塞尔达就是其中之一。虽然在公众面前极力克制住自己的喜悦，但当四下无人时，他就开始愉快地大喊大叫。事实上，他欣喜若狂地跑了一会儿才镇定下来，然后坐下来写了一篇长文，抨击希特勒这个恶魔及其所代表的一切。\n\n副总统雅尼奥·夸德罗斯用他唯一知道的一种方式庆祝了这一时刻——喝个酩酊大醉。儒塞利诺·库比契克在情人的陪同下，享受地品味着这一消息。而像恩里克·洛特这样的人则比较朴素，只是简简单单开瓶香槟或者吃上一顿特别大餐。热图利奥·瓦加斯则沾沾自喜，希特勒宝贵的千年帝国轰然倒塌，而瓦加斯留给继任者的国度依旧繁荣昌盛。\n\n然而，有一个人与这副欢庆景象格格不入，为希特勒的死感到黯然神伤，那就是巴西本土的法西斯主义者威尔逊·莱特·帕索斯。威尔逊前往了德国大使馆表达他的悼唁，而拉塞尔达则换上打字机的色带，在上面打出一页页的反法西斯文字，在这些谴责的文字中，威尔逊是唯一一个非德国人的名字。沉浸在喜悦中的其他人互相说着也许纳粹暴政终于要开始陨落了，此时的威尔逊对此只有一句话。"
 brazil.263.a: "“这不是结束，绝对不是。”"
 brazil.264.t: "帝国的毁灭"
 brazil.264.desc: "会议弥漫着紧张的气氛。洛特在军队任职期间的同事，战争部长奥迪利奥·德尼斯提起刚刚爆发的德国内战。\n\n尽管希特勒指定了继任者，但国防军和德意志党卫队等各股势力已经集结起来对付元首大位的觊觎者。据预测，未来几个月内德国将爆发大战。东方专员辖区也爆发了类似的内战。但没有关于帝国其他地区，特别是东欧地区的新闻。\n\n“不是什么好事，”简报结束时，总统说道，“我们没什么可干的，顶多隔岸观火了，但围观德国人的狂妄可没法消灭他们。”\n\n“总统，非洲的局势如何？”副总统夸德罗斯阴沉地问道，“德国本土对其殖民地的补给供应逐渐减少，那里的专员辖区势必会采取一些过激的举动。特别是东非专员辖区那个狂热的许蒂希，他十有八九会搞些惊天动地的大动作。”\n\n洛特总统对不谙军事的夸德罗斯表现出非凡的洞察力点头称赞。“独具慧眼啊，夸德罗斯先生。许蒂希就是个冷酷无情的畜牲，补给供应的减少会让他急得跟热锅上的蚂蚁一样。但我不把他放在心上。当地土著会意识到许蒂希的窘境，进一步反抗他的暴政，从南非走私来的枪支够他好受的了。就在德国崩溃的几个月前，我又在那三个专员辖区放了把火。”\n\n“总统高见。”战争部长赞许道。"
 brazil.264.a: "我们拭目以待。"
 brazil.265.t: "公牛与熊猫"
 brazil.265.desc: "圣保罗州长阿德马尔·德·巴罗斯今天的行程排得满满当当。他来到了圣保罗动物园，这里因共荣圈慷慨赠送的几只熊猫而新添了一片围栏。消息传开后，无数圣保罗及其周边地区的人们纷至沓来，他们都想一睹这些神秘的熊类生物的风采。\n\n对阿德马尔来说，这无疑是一个绝佳的机遇。他从过去的艰辛中学到了一课——在此类活动中与民众亲密接触，是赢得民心、增强支持的绝佳方式。尤其是在他亲自策划的活动上，这一点更为显著。毕竟，没有他的努力，这一切都不可能发生。他计划向接近他的民众清晰地传达这一点。\n\n在动物园里漫步时，他那夸张而迷人的风格吸引了众多游客的目光。他确保每个人都能感受到他带来的恩惠。与此同时，他的脑海里却在思考着另一桩事情。他和卡洛斯·拉塞尔达共同策划的计划正要实施，阿德马尔正琢磨着如何确保一切向着对自己有利的方向发展，实现自己心中的巴西总统梦。\n\n阿德马尔或许习惯了不断地祈求上帝的恩典，以至于每一位天使长、天使、座天使、主天使和圣徒大概都听烦了。但他深知，不能全指望造物主来完成一切。怀着这样的想法，他朝着刚现身在动物园入口处的卡洛斯·拉塞尔达走去，脸上挂着他最迷人的微笑。"
 brazil.265.a: "大显身手的时候到了。"
 brazil.266.t: "阿德马尔的慷慨"
 brazil.266.desc: "“谢谢你，将军。与你共事很愉快！”\n\n阿德马尔挂上电话，坐了下来。他搓着手，脸上挂满了笑容。\n\n多棒的安排啊！多棒的一天啊！他得到了官方许可，可以自由参与选举，这笔钱很快就会流入他的账户。\n\n新政府对他非常慷慨，现在他要以实物偿还他们。他把手伸进办公桌的抽屉里，在文档间摸索着，所有这些都会用在他将为选举展开的计划日程和信封系统上。\n\n他带着孩子气的喜悦读了一遍，权衡了其中的利弊，以及他们能为他（当然，还有巴西人民……）赚多少钱。\n\n一个想法出现在他的脑袋里。有一项债务他好像还没还，是那只聪明的乌鸦？他近来大有用途，势头也不小。\n\n“现在听着，朋友们，我们要支持拉塞尔达博士即将取得的胜利……”"
 brazil.266.a: "拉塞尔达得到了民粹主义者的帮助？世界要天翻地覆？"
 brazil.266_tt: "£BRA_udn_texticon §Q卡洛斯·拉塞尔达§!的支持率§Y上升§!。\n"
 brazil.267.t: "士兵高度警戒"
 brazil.267.desc: "选举日降临，巴西的每个角落，从城市到乡镇，投票站都已开放，民众纷纷来投票。当然，为了确保选举安全，避免政治暴力事件，士兵们守卫着每个投票站。\n\n在里约的众多投票站之一，两名士兵边观察着排队的市民，边闲聊着。马塞洛侃侃而谈，古斯塔沃倾听着。\n\n“——她说她不觉得我是那种能认真对待感情的人。真是的。‘认真的关系’到底是什么意思呢？是指一夫一妻制么？如果按照她对一夫一妻制的定义来看……”\n\n马塞洛正在向古斯塔沃诉说他最近感情上的烦恼，却被无线电的噼啪声打断。附近街道发生了骚乱，他们不得不离开岗位去查看。\n\n他们到达现场时，已经聚集了一小群人。他们本打算穿过人群，但古斯塔沃注意到有个人影逃进了后巷。\n\n“喂，站住！”\n\n士兵们举枪准备，开始追逐，但那个身影总是比他们跑得快，跳过栅栏如同蚱蜢一般。士兵们在试图翻越第二个栅栏后放弃了追逐，而那个身影迅速逃离。\n\n他们重新挎上步枪，返回事发地点，挤开人群。\n\n一面横幅上印着他们都非常熟悉的卡洛斯·拉塞尔达的面孔。他们对这个人没太多关心，但两人麾下部队里的中士和上尉们却是他的忠实拥护者。\n\n不管横幅上原本写了什么，现在已被愤怒的红墨水涂抹得模糊不清：“流浪者的杀手”。更加令人不安的是，横幅上拉塞尔达的眼睛、鼻子和微笑都被刀子凶狠地划去。剩下的是一张残忍毁坏的面孔。\n\n古斯塔沃对马塞洛低声说，拉塞尔达自己也该把这视作一个不祥的预兆。"
 brazil.267.a: "“把这条横幅摘下来，换条新的就好了……”"
 brazil.268.t: "席尔瓦胜利"
 brazil.268.desc: "科斯塔-席尔瓦在离开房间时，振奋地回应了军官的敬礼。他打开桌上的报告，心中既震惊又振奋。\n\n危机终于结束，他取得了胜利。卡斯特洛被带走，不再是他和军队的威胁。席尔瓦深知，他内心依然在颤抖；卡斯特洛的行为着实出乎他的意料，布兰科竟然因为他的“合理要求”想方设法地将他解职，随后的局势一片混乱，恍若梦境一般。\n\n但幸运的是，一切都在没有大规模流血的情况下结束了。虽然席尔瓦平时对平民的死亡无动于衷，但牺牲一名高贵的巴西士兵则截然不同。\n\n席尔瓦坐回椅子，正准备倒酒庆祝，但他突然犹豫了一会。现在庆祝还为时尚早。还有一个棘手的问题亟待解决。\n\n他的“盟友们”更为极端，他们渴望清除所有纳粹-共产主义的威胁。这不是一个模范军人应该做的，而且不符合美国人的风格。他们可能会疏远华盛顿。但凡有点头脑的巴西人都知道，对美国有利的，对巴西同样有利。\n\n安抚激进分子从未有过好的结果。真正的男人不会在他们面前退缩，而是展现勇气，捍卫自己。席尔瓦不是软弱的文官，面对威胁，他将采取严厉措施，就像美国人对付激进分子一样。"
 brazil.268.a: "“这一切都是为了我的国家。”"
 brazil.269.t: "暂停宪法"
 brazil.269.desc: "“……因此，诸位，我以总统独有的法定权力，即刻中止宪法实施，我们终于可以腾出手来，消灭内部的威胁。”\n\n科斯塔-席尔瓦落座，会议室内立刻响起了雷鸣般的掌声。\n\n然而，军方每次开会基本都要吵架，这次也不太能例外。掌声还没落，伯尼尔上校就支支吾吾插话，室内的气氛一触即发。\n\n“长官，我对您的决定感到欣慰。但如果我们仅仅暂停宪法，而不采取行动根除纳粹和赤匪，那一切都将毫无意义。”\n\n掌声戛然而止。一些军官用怀疑的眼光打量着这位冒进的上校，而另一些则点头表示赞同。大多数人，如西尔维奥·弗罗塔等选择保持沉默，他们的目光集中在席尔瓦身上，等待着他的回应。席尔瓦终于打破沉默：\n\n“上校，我感谢您的关切。但请放心，暂停宪法仅仅是我们计划的第一步。”\n\n所有人的目光都聚焦在席尔瓦身上。\n\n“不久之后，我们将实施戒严——那时，我们将全力以赴，对所有颠覆分子发动全面战争！”\n\n席尔瓦话音刚落，会议室内就爆发出热烈的欢呼声，所有军官纷纷起立，为席尔瓦的决定鼓掌致敬。"
 brazil.269.a: "其中最热烈的掌声来自布尔涅上校。"
 brazil.270.t: "环球电视台开播"
 brazil.270.desc: "新闻界巨头罗伯托·马里尼奥一手打造的环球电视台，在里约热内卢和巴西各州的首府正式开播。\n\n这位环球报纸和环球广播的所有者，早在1962年就获得了4号频道的使用权，环球电视台携带着国内外丰富内容的大旗正式启动，播出了诸如美剧《糊涂侦探》、《迷离时空》和巴西当地的肥皂剧《醉汉》和《吉普赛之王》。\n\n作为一个德高望重的知名右翼人物，罗伯托·马里尼奥为他的频道带来了“环球标准”的承诺，这意味着制作高质量的节目，力图超越巴西电视史上所有前作。然而，开播初期几周的成绩并不理想，环球电视台在与电视联播网等本地媒体的较量中落于下风，这促使他们聘请了受美国教育的沃尔特·克拉克·布埃诺担任顾问，以扩大环球的观众群。\n\n左翼的亲瓦加斯媒体批评环球电视台“太过面向精英”，并指责其在电视节目中传播右翼思想。但环球电视台对于这些指责不屑一顾，斥之为“失败者的嫉妒心理”。"
 brazil.270.a: "晚安。(葡语)"
 brazil.271.t: "长征"
 brazil.271.desc: "若昂·阿马佐纳斯开了好几小时的车，又走了好几小时的路，就是为了抵达他的目的地。天上的雨下个不停，苍蝇与昆虫在他身旁嗡嗡作响。这里到处是腐败政客，基建几乎连影子也看不见，换种角度想，这里会成为绝佳的革命起始点。\n\n没人会问阿马佐纳斯想在这里建设些什么。茂密的森林树冠可以为他们抵御飞机，至于苍蝇嘛，可以慢慢习惯。他就那么站在一旁，看着一些同志开始工作：搬运箱子、清洗武器、搭好帐篷。为了找到这个地方，他们四处搜寻，花了数周的时间。最后，他们找到了，找到了这个完美的地点。\n\n他在城里待得太久，总是无意义地在琐碎的政策上与修正派争吵，忙于应付因盲信老派的手段导致的共产主义运动分裂。老派的运动领袖都失败了，他们没有足够坚持，妥协太多，那群蠢货怎么可能没有看到呢？走修派叛徒普列斯特斯，他是那个最令人失望的蠢货。他曾在1935年革命中反对瓦加斯，后来却被瓦加斯的社会法西斯主义和巴西工党迷得七荤八素。那场不祥的革命令他的妻子被驱逐到德国，进而直接导致她落入奴隶矿场，然后悲惨死去。阿马佐纳斯这么想着，往地上吐了口唾沫。他曾经那么信任普列斯特斯，但有句老话说得好，“永远别和英雄见面”。阿马佐纳斯肯定后悔和他的英雄见了面。\n\n阿马佐纳斯回过头来思考这处营地的终极目标。他策划好了一场革命，取得农民支持，从农村开始迅速向城市蔓延。当然，革命不会一蹴而就。他们需要更多，需要武器、资金、人员……好吧，他们什么都缺。但他和同志们的信念坚定不移。尽管过去的环境那么恶劣，革命依然取得了胜利，巴西的革命也会胜利。很快，巴西将脱离压迫，不，巴西将真正地解放。"
 brazil.271.a: "阿拉瓜亚会是我们的彼得格勒。"
 brazil.272.t: "改革进入深水期"
 brazil.272.desc: "办公室里弥漫着肥皂和消毒剂的淡淡香气。当总统的感觉实在太美妙了，夸德罗斯这样想道。在几位助手的协助下，他们对办公室进行了一番彻底的大扫除。吸尘器扫过地毯，书桌擦拭得干净利落，窗户也擦得晶莹透亮。所有这些清洁工作，都在几位友善记者的注视下完成。新政府将会摆脱腐败，告别污浊的交易，也将摒弃恩里克·特谢拉·洛特对良好秩序的藐视。\n\n当记者们陆续离去，助手们收拾好扫帚和化学清洁剂后，夸德罗斯首次坐在了自己的办公桌前。宫殿的门外，总统府仍旧保持着它那惯有的生机勃勃。夸德罗斯忍不住回想起曾多次走进这间房间，看到洛特忙碌的身影。他的对手无疑是个勤勉的人。那才过去几周吗？对于那些更简单的时光，怀旧之情似乎还为时过早。当然，他也没必要后悔。洛特的腐败让他不再适合总统之位。\n\n夸德罗斯深深吸了口办公室的清新空气。一股似柠檬而又带着化学感的气息逗得他鼻子微微发痒。或许应该寻找一种品质更好的清洁用品。为此，他有足够的时间。总统从包中取出一个黄色文件夹，上面清晰打印着“独立的对外政策”几个字。\n\n现在，是时候开始履行他的职责了。"
 brazil.272.a: "日子真是一天比一天难。"
 brazil.273.t: "干干净净"
 brazil.273.desc: "整份行动报告不知通过何种途径，全都汇报给了总统。也许是阿德马尔一手搞出的恶作剧。\n\n报告一页接着一页，详细叙述了在阿德马尔办公室里如何一无所获。那个据说“装满了黑钱”的保险柜里，所含不过是某地区政治协会通常的存款额。每一张收据都符合记录，每一笔捐赠都得到了核对。每个“i”都精准加上了点，每个“t”都严谨划上了横线。\n\n毫无疑问，阿德马尔贿赂了警察。或许在总统发起这场反腐调查之前，当地的警官就已被他全部收买。然而，有一点是肯定的：那个狡猾的阿德马尔，可不是那么容易就能打倒的。"
 brazil.273.a: "这破国家里啥事都做不成吗？"
 brazil.274.t: "阴谋"
 brazil.274.desc: "联邦参议院议长奥罗·德莫拉·安德拉德望着拉塞尔达，脸上带着几分疑惑。“这信是真的？”\n\n拉塞尔达点点头。“如假包换。”\n\n“致联邦参议院议长奥罗·德·莫拉·安德拉德先生：\n\n展信安\n\n本人谨辞去巴西合众国副总统职务，即时生效。因不可抗力之故，我被迫以联邦政府之外的身份继续为国效力。恳请阁下遴选贤能继任者，以纠正前任洛特政府之无数谬误。\n\n此致\n\n雅尼奥·夸德罗斯”\n\n安德拉德又把信反复读了几遍。“不错，这事能成。”"
 brazil.274.a: "把它拿去参议院。"
 BRA_quadros_letter_tt: "§x看看夸德罗斯能否克服困局。§!"
 brazil.275.t: "信件阴谋败露"
 brazil.275.desc: "“垃圾！这封信早就被我丢进垃圾桶里了！”\n\n“对啊！你赶快给我滚蛋！”\n\n参议院议长奥罗·德·莫拉·安德拉德压根没想到事情会发展成这副模样。他本以为夸德罗斯的影响力不足以压制他和拉塞尔达除掉夸德罗斯的阴谋，但事实并非如此。现在可麻烦大了，他正听着夸德罗斯在走廊里咆哮呢。\n\n“这群混账巴西官僚崽子们最好整明白他们的主子到底是谁，然后再告诉我这个馊主意是谁弄出来的！那封信就是份草稿，他妈听懂没有，写在草稿纸上的不是草稿？！这玩意连个屁都不算，我就是合法总统！”\n\n如此咆哮一番之后，雅尼奥·夸德罗斯终于是把阴谋扼杀在摇篮之中，保住了自己的总统宝座。但当安德拉德被大厅里的声浪第五次盖过并最终屈服之后，夸德罗斯抬起头来，恰好看到拉塞尔达站在走廊里，用他鸦般锐利的眼神注视着这一切。夸德罗斯圆瞪双眼，对着拉塞尔达做了个“我在看着你”的手势。令拉塞尔达有些意外的是，哪怕面对如此强劲的对手，夸德罗斯也只是稍有一丝畏缩而已。"
 brazil.275.a: "你他妈居然背刺我？我这就告诉你啥叫背刺！！"
 BRA_quadros_success_hdc_tt: "§y他办到了。§!"
 brazil.276.t: "夸德罗斯大败亏输"
 brazil.276.desc: "“安德拉德先生，在我看来，这封信是可信的。”\n\n“是的，议长先生，夸德罗斯必须辞职。”\n\n这正合参议院议长奥罗·德·莫拉·安德拉德所愿。夸德罗斯的影响力不足以压制奥罗和卡洛斯·拉塞尔达除掉他的阴谋，幸运的是，情况确实如此。夸德罗斯不知跑到哪里去了，因此参议院被成功说服，要求夸德罗斯辞职。\n\n拉塞尔达听说，夸德罗斯发现时早已为时已晚。他呼吁人们为他所遭遇的一切发起抗议，但无人理睬。\n\n拉塞尔达听到的最后一条关于夸德罗斯的消息，是说他回家时一脸茫然，甚至有些绝望，平日里那股精气神消失得无影无踪。\n\n拉塞尔达意识到这意味着他有机会成为总统。他高兴得大叫起来，痛饮一杯威士忌。然后，他整理好情绪、坐了下来，转过身面对一块计划板——这块板自他成为左派记者那时起就一直用着。他把板上的一张照片划掉，拿下来，得意地笑着。"
 brazil.276.a: "又一块多米诺骨牌倒下了。"
 BRA_quadros_failure_hdc_tt: "§x夸德罗斯未能克服困局。现在，应由若昂·古拉特接任，但接下来又会发生什么呢？§!"
 brazil.277.t: "一国无主"
 brazil.277.desc: "圣保罗的街头人声鼎沸，抗议者们如潮水般汇聚，他们要求回应近期报纸上曝光的跨亚马孙公路腐败和挪用公款事件。但今日，他们惊闻巴西无人掌舵——洛特，那个对腐败坐视不管的家伙，已于今晨辞去总统职务。这对抗议者来说无疑是个好消息；然而，他们依旧坚持抗议，誓要见到真正的变革。\n\n正当一群抗议者在维埃拉·德卡瓦略博士大道中央聚集时，一个挥舞报纸的人加入了他们。“喂，伙计们，我们的副总统，对，就那个精神不正常的夸德罗斯，他也辞职了！”\n\n人群中流露出惊讶和困惑的眼神，他们相互对望。一位抗议者对同伴们提出疑问：“如果他俩都不在了，我们还抗议个什么劲儿？或许我们该回家了。”\n\n另一位抗议者摇了摇头，坚定地说：“不行，我们得让人们听到我们的声音。就算他们都走了，就算亚马孙的工程土崩瓦解，腐败问题也依旧存在。再说，接下来上台的那家伙，很可能跟前两个一样，都不干净。”"
 brazil.277.a: "抗议者们点点头，又叫喊起来。"
 brazil.278.t: "安德拉德干预"
 brazil.278.desc: "奥罗·德·莫拉·安德拉德深思着眼前的抉择。洛特已不在，他与卡洛斯·拉塞尔达联手，将夸德罗斯赶出局。现在理应由那位令人讨厌的左倾分子，众议院议长若昂·古拉特继任总统之位。但这个傻瓜在南方观看足球比赛时忘记了一件事，那就是奥罗讨厌他，而且会竭尽全力阻止他上台。\n\n“各位参议员！\n\n时局危急。按照常理，尊敬的若昂·古拉特议长将承担起总统的重任。然而，经过与相关权威机构的深入磋商——”他低声咕哝，“这里说的是我，只有我”——“我得出结论，由于宪法上的异常，古拉特在此刻不适宜接任总统，此事应交由参议院自由投票决定。”\n\n联邦参议院顿时乱作一团，奥罗尽力隐蔽自己的动作，偷偷瞥向拉塞尔达。对方似乎也同样隐晦地回应了这一目光，二人心照不宣。"
 brazil.278.a: "一切尽在掌握。"
 BRA_ohno_hdc_tt: "§x好戏开场了。§!"
 brazil.279.t: "陷阱！"
 brazil.279.desc: "百日危机爆发之时，巴西的合法总统若昂·古拉特被打了个措手不及。他正在巴西南部的一个体育场，做每个正常巴西人每年至少应该做一次的事情——欣赏一场足球比赛。然而，这让他对洛特和夸德罗斯在二十四小时内相继下台毫无准备，更没有准备好去面对奥罗·德·莫拉·安德拉德阻止他成为总统的荒谬理由——“违宪”。\n\n古拉特到了机场，惊愕地发现军队正在进行紧急训练，所有的航班都停飞了。他明白，如果他再进一步，自己很可能就会被捕。于是，他决定找一个可以信任的人。\n\n“杨戈，我的朋友！这是怎么回事？我还以为你现在在巴西利亚呢！”\n\n“莱昂内尔，哪那么简单啊，我正看着球赛呢，转眼间，元帅和夸德罗斯全都下台了，那个混账奥罗把我挡在了总统门外！然后该死的军队还关闭了机场。如果我是那只乌鸦，我肯定会觉得这是一个阴谋。”\n\n“不管怎样，杨戈，你要保持冷静。你现在就来阿雷格里港，见面详谈。”\n\n古拉特同意了，挂了电话，然后低声祈祷，试图让自己平静下来。这可能是个转折点。接下来的每一步，都必须万分小心。"
 brazil.279.a: "“司机，带我去阿雷格里港，找州长莱昂内尔·布里佐拉。”"
 brazil.280.t: "赴汤蹈火"
 brazil.280.desc: "若昂·古拉特深深叹息，摇了摇头。“兄弟，我被困在这里，别无他法。你得替我去巴西利亚，为我争取机会。”\n\n莱昂内尔·布里佐拉望着他的连襟，点头表示理解，然后走上前去，紧紧拥抱了他。“别担心，杨戈，我会替你办成的。你等着，我们一定会在高原宫相见。”\n\n不同于古拉特，没有人敢阻挠南里奥格兰德州长北上。因此，前往巴西利亚为杨戈站台，这事对布里佐拉来说并不困难。\n\n布里佐拉一到地方，就毫不犹豫地在当地报纸和广播电台上宣布了自己的到来，公然谴责奥罗·德·莫拉·安德拉德的两面派行径，同时明确表示自己希望看到古拉特作为下一任总统入主高原宫。社民党内部对此事存在分歧，工党则对杨戈重获希望欣喜若狂。而全民盟的成员则大多只能怒不可遏。"
 brazil.280.a: "工党还有希望。"
 brazil.281.t: "建筑师故地重游"
 brazil.281.desc: "在听闻洛特元帅被赶下台的消息时，儒塞利诺·库比契克感到深深的悲哀和不安。紧接着，夸德罗斯这个愚蠢的酒徒也跟着一并离开，尽管这让他心中感到一丝幸灾乐祸，但他对未来可能发生的事情并不抱有任何幻想。\n\n随后，库比契克得知奥罗·德·莫拉·安德拉德，那个背叛社会民主党、违背瓦加斯理念的叛徒，竟然以“违反宪法”为借口阻挠古拉特上台，接着更糟糕的是，那个住在兵营里的废物弗罗塔威胁说，如果一百天内不能选出继任者，就要推翻民主制度。这一切，正是库比契克最恐怖的预感成为现实，无尽的愤怒将他深深淹没。\n\n稍作平复后，他联系了同样对这一切深感不安的坦克雷多·内维斯。两人经过讨论，一致认为只有一个出路——库比契克必须亲自前往巴西利亚。于是，他迅速行动，立即出发。他匆匆将所需物品打包，向家人匆忙告别后，驾车飞速前往首都。他心里清楚，赶往那里对他来说并非难事。"
 brazil.281.a: "毕竟，是他亲手建设了这些道路。"
 brazil.282.t: "晨曦宫"
 brazil.282.desc: "晨曦宫，巴西的总统府。自从儒塞利诺·库比契克的任期结束后，他没多大兴趣再回到这里。库比契克曾将首都迁到了巴西利亚，而这座现代主义建筑就是新首都的明珠，不过它已经有好几年没有迎来背后的建筑师了。洛特总统当然想知道这种情况何时会结束。\n\n现总统与前总统在黎明时分来到了晨曦宫前，二人都有早起的习惯。因此，洛特对他的盟友突然造访从不感到惊讶。尽管如此，凌晨的谈话还是变成了一场激烈的争吵。作为新首都的建设者，儒塞利诺·库比契克有着一双建筑师的眼睛。在一个理想的世界中，这位前总统几乎不会给政治舞台留下任何风险。\n\n“你不能就这样把实业家们晾在一边！社民党要在选举中保持优势，就离不开他们的支持。”\n\n“我又惹他们生气了，库比契克？我不过是告诉他们要降价？因为巴西的平民买不起一辆汽车，他们难道会不知道吗？”\n\n“你……”库比契克总算安静了下来，洛特很高兴。他只想好好享受一次在清晨的散步。两个人在庭院里走着，保镖跟在他们后面。院落之外，巴西的新首都渐渐从睡梦中醒来，又结束了一个很快就会忘却的梦境之夜。终于，洛特率先打破了沉默。\n\n“诸事顺利，库比契克。一切都会好起来的。社民党还处在优势地位，你不必太过担忧。只要我们投入工作，自然可以赢得民众的支持。\n\n库比契克冷冷地点了点头。他与洛特握完手后便离开了。初升的太阳在离去的身影上投下长长的影子。"
 brazil.282.a: "新一天的晨曦。"
 brazil.283.t: "码头工人罢工的结束"
 brazil.283.desc: "洛特凝视着地图，目光深邃。罢工报告带来的困扰已成过去，总统享受着胜利的喜悦。危机已经平息，不再分散他的精力，更不会阻碍他面前铺展开的宏伟蓝图。\n\n那些穿越亚马孙丛林的线条，将成为巴西土地开发未来的生命动脉。五千公里的铺砌公路将激发投资热潮，加速国家财富的流通。成千上万的定居点，将从丛林的阿萨伊棕榈中解放出来，自陆路而来的探险者将踏遍这片原始丛林。亚马孙的蜿蜒小径和茂密树冠依然保留着它的原始面貌，但它将不再是被遗忘的角落。巴西即将走进这片神秘之地，让它成为国家发展的新篇章。\n\n洛特微微一笑。他略读了一份关于塞阿拉州工程进展缓慢的报告，随后将其放至厚厚文件堆的底部。不，现在不是时候，他打算稍后再处理这些琐事。"
 brazil.283.a: "这条路将从无到有建立起来。"
 brazil.284.t: "与戈登共餐"
 brazil.284.desc: "“这倒是个好主意，”林肯·戈登大使赞同道，“用一点儿啤酒蒸煮，再撒上辣椒，确实别有风味。”\n\n“我猜，大使，这跟美国南部对烧烤的偏好不无关系，”拉塞尔达回应道。“这当然比我们被迫去品尝血肠要好多了。”\n\n戈登一边细细品味着他面前的莫克卡，一边沉思着他们所谈论的截然不同的美食。“的确如此，拉塞尔达总统。现在巴西正向OFN靠拢，你们不必再担心法西斯的侵扰了。我相信，除了我们这些外交界的人，很少有人真正明白这一转变的深远意义。巴西很快将成为OFN的主要成员国之一。”\n\n“确实如此，大使，但巴西在外交上的远见不止于参与培训和扩大装备出口。”\n\n“外交上的远见……具体是？”\n\n“戈登先生，我不满足于仅仅让巴西避免沦为极端主义的受害者。毫无疑问，这个国家在曲折的历史和对威权主义的曖昧态度上并不孤立。巴西不会袖手旁观，对南美洲其他地区的动向漠不关心。华盛顿可能认为这是个安全地带，但我们知道实情并非如此。巴西将在大陆上继续与极权主义作斗争。我向您保证，只要我还握有权力，南美洲就不会再出现德国的专员辖区或者满洲国之类的政权。我们将在自由世界中形成一个统一阵线，永久阻止德国人对我们的侵犯。”\n\n拉塞尔达一边品尝着美食，一遍说道：“戈登先生，法西斯主义永远不应当再踏足新世界。”"
 brazil.284.a: "多米诺们开始自我扶正。"
 brazil.285.t: "布里佐拉在巴西利亚"
 brazil.285.desc: "南里奥格兰德州州长莱昂内尔·布里佐拉，巴西工党左翼的头号人物，正积极备战即将来临的政治风暴。\n\n前总统恩里克·特谢拉·洛特被夸德罗斯的诡谋所推翻，这场诡谋得到了安德拉德、拉塞尔达和阿德马尔的支持。然而，他的女儿埃德娜，尽管未能成为她父亲政党的核心成员，却依然活跃在政坛，她是一位温和的瓦加斯主义者。目前，她正在巴西利亚的众议院为若昂·古拉特争取其正当的总统地位。因此，两人刚见面的时候就没有任何寒暄，而是直奔主题，讨论下一步行动。\n\n“埃德娜，我们必须从这个角度出击，确保根据宪法，古拉特的合法继任权得到尊重。”\n\n“这听起来很合理，莱昂内尔。我也认识一些能施加影响的人物，许多社民党人是可以沟通的，如有必要，我会联系内维斯。”\n\n随着讨论的深入，布里佐拉和洛特发现他们在一些问题上存在分歧，尤其是关于古拉特上台后应采取的政策方向。但他们在更为重要的事项上达成了共识，如保护巴西的瓦加斯主义和宪法秩序的必要性。白昼渐渐过去，夜幕降临，洛特和布里佐拉在讨论的过程中取得了更多进展，他们心中越来越强烈的一个念头是："
 brazil.285.a: "“我能跟他合作。”"
 brazil.286.t: "老兵不死"
 brazil.286.desc: "洛特将军曾有过属于他的辉煌时光。奥迪利奥·德尼斯看着这位老友正向簇拥在一起的年轻军官们发表演说。长久以来，洛特的信心与决心带来了耀眼的光环。不过如今这圈光环也黯然失色了。在一番苦战之后，名为洛特的战舰苦涩地回到了港口。但既然这艘船没有沉没，那么老将军也没有停下脚步的理由。\n\n年轻军官们在瓦加斯政权的阴影之下成长起来。他们一直相信，推翻残暴的瓦加斯总统是军队的光荣之举。也正因此，百日危机令他们感到局促不安，军队的这种行为不就是在违宪吗？\n\n即便在政界声名狼藉，洛特将军在军界仍受人尊敬。许多人都不相信那些对于他腐败的指控。这位前总统以个人身份与年轻军官们接触时，总是很受他们的欢迎。虽然他的光环已经暗淡，但仍能指引年轻人走向光明。洛特将军告诫这些年轻军官一定要忠于共和国，挫败索邦派推翻宪政的阴谋。\n\n演讲结束后，洛特一一回答这些年轻军官提出的问题，他不回避任何话题，也不找任何借口。事实已经证明他没有资格再当总统，他也因此而辞职。士兵生来就是要服从命令的，无论是上级的命令还是上天的命令。就算这个士兵曾经做过多值得自豪的事，也应该服从命令。\n\n“我没有尽到我的职责，无论如何，我都衷心地希望你们这一代人不要重蹈我的覆辙。”老将军最后总结道。"
 brazil.286.a: "他们曾经听洛特的话，但以后呢？"
 brazil.287.t: "水火不相容"
 brazil.287.desc: "拉塞尔达的嘴角掠过一丝狡猾的微笑。他终于将库比契克逼到了必须与他正面对抗的境地。库比契克一直避免与拉塞尔达或其他全民盟成员产生冲突，但在巴西的国会里，拉塞尔达设法让他无处可逃。尤其是在这场辩论正被媒体实时转播的情况下，库比契克再也逃无可逃了。\n\n拉塞尔达站起身，锐利的目光直视库比契克。出击的时刻到了。“库比契克先生！”他高声呼喊，“你自诩适合领导巴西，但你甚至不适合驾驭一辆汽车！你的政策正把我们辉煌的国家推向毁灭的深渊！”\n\n库比契克凝视着拉塞尔达，缓缓站起身来。“拉塞尔达先生，请允许我明确一点，我坚信巴西的民主及其代表的一切。但与你不同，我相信要加强这个民主的建设。现在不是无端攻击对方的时候，而是要在我们已有的基础上共同努力。”\n\n拉塞尔达不屑地冷笑道，“你所谓的无端攻击，难道就意味着我们应该急忙把你再次推上权力之巅吗？你宣称要在我们已有的基础上建设？当外部势力正对这个基础发起攻击，而你却坐视不理，如此荒谬，谈何建设？”\n\n“值此艰难之际，巴西人民必须保持团结。你的反极权主义运动只是在浪费时间与资源。”\n\n“保护我们的价值观难道就是浪费资源吗？”拉塞尔达反驳道。\n\n“对我们自己人民的无端攻击才是资源的浪费。”库比契克转向观看辩论的记者们。“你们认为这个国家的下一任领导人应该卷入我们无权介入的外国冲突吗？”\n\n“一个真正的合法继任者会保护巴西！”拉塞尔达坚定地回答道。\n\n“一个真正的合法继任者会重建巴西，”库比契克冷静地反驳道。"
 brazil.287.a: "保护者将成为巴西的继任者！"
 brazil.287.b: "重建者将成为巴西的继任者！"
 brazil.287.c: "其他人将成为巴西的继任者！"
 brazil.288.t: "侥幸逃脱"
 brazil.288.desc: "阿雷格里港的街道上人潮汹涌。各种族、阶层、年龄和信仰的人们聚集于此，只为见若昂·古拉特一面。\n\n他的座驾驶向集会现场时，人群的欢呼声愈发高涨。古拉特携带着他的保镖和助手们走出车辆，面带微笑，挥手致意。\n\n“大家都来看我了，”古拉特转身对他的助手们说，“那么，我也要走出去，去见见他们。”他踏入人群中，与民众握手，致以问候。\n\n古拉特本人就如同电流一般，将周围的人群串联了起来。人群围绕着他涌动，每个人都试图向古拉特说上几句，或者只是希望能够近距离看清他的面容。成百上千的话语同时响起，交织成一片嘈杂的声浪。古拉特在人群中穿行，挥手问候，而他的保镖们则在后方挤过人潮，费力跟随。\n\n就在古拉特被人群包围，努力挤向大楼的时刻，传来一声巨响！他被一个不知名的人推倒在地。人群中突然爆发出尖叫。恐慌迅速蔓延。古拉特感到自己被人拉起，他猛然回头，看到一个保镖用身体为他挡住了危险。他能听见有人在人群的叫喊声中询问枪声的来源。人群开始惊慌失措地奔逃。古拉特最后一次回头看向人群，然后被推回他的车中。车门猛地关上，车辆迅速驶离现场。\n\n“先生，您没事吧？”一个保镖关切地问道。\n\n“我没事，”古拉特回答道，“只是受了点惊吓，但没什么大碍。”他深吸一口气，重新坐好。他看向那个将他推到地上并迅速推进车内的保镖。“你是弗朗西斯科，对吧？”\n\n“……”\n\n“好吧，弗朗西斯科……”"
 brazil.288.a: "“谢谢你救了我。”"
 brazil.289.t: "歌声阵阵，靴声隆隆"
 brazil.289.desc: "抗议者的口号从清早起就在里约热内卢市里响起。许多人聚集在前首都的街上，声援各自支持的候选人。无数标语立在半空，大批小册子被分发，人们高呼着口号，任其回荡在里约热内卢的房屋、公园和体育场上空，传向州长办公室，直至怒不可遏的卡洛斯·拉塞尔达耳中。\n\n当抗议的呐喊声传入耳中，拉塞尔达转向他的秘书埃丝特，命令道：“去查一查那些头目们的底细，家庭、住址，一个不漏。把军警头目叫来，我要把这些街头的蟑螂清扫干净。把它们包装成暴乱。我们将从一片无序中拯救里约。对了，提醒警察在镜头前要保持风度，我们可不想让殴打抗议者的画面登上头条。明白了么？”\n\n“是，先生，我这就去办。”埃丝特回应道。\n\n拉塞尔达满意地点头：“很好。”他深深地叹了口气，身体往后仰靠在椅子上，随即又补充道：“对了，你今天早上是穿过抗议人群来上班的吧？”\n\n“是的，先生。”\n\n“你有没有看到过支持我的游行？”\n\n“这个……”埃丝特显得有些局促不安，“抱歉，我还真没看到过。”拉塞尔达沉默半晌，望向了窗外，脸色也随之阴沉下来。"
 brazil.289.a: "“告诉警察在中午前清场。”"
 brazil.290.t: "宝剑归鞘"
 brazil.290.desc: "“多他妈好的一天啊！”菲格雷多将军在走进办公室时说道，“玛蒂尔达，我真不敢相信我就要成为一名将军了！”菲格雷多的秘书一直忙于在打字机上书写他的晋升演讲稿，让将军猛拍了一下桌子引起她的注意。\n\n“啊，是，抱歉！恭喜您啊将军！您真是给了他们点颜色看，不是吗？”\n\n“太对了，那群支持那个老不死的混蛋丢了他们的阵地！我可不会放过德尼斯的！”菲格雷多坐在他的椅子上，点上了一支雪茄，“那个混蛋让我们和老大哥作对。他一走，我就可以接手了。”\n\n玛蒂尔达继续打着将军的讲稿，不过她同时也在小心不去再把他惹火，毕竟菲格雷多不是什么好惹的人。奥迪利奥·德尼斯退役的消息对将军来讲如同仙乐，因为德尼斯一直对美国保持中立。菲格雷多已经等不急要在他的退役仪式上冷嘲热讽了，捱过这周可真不容易。\n\n“在美国的这些年我学到了很多，玛蒂尔达。我认为尽管我出生在这个鬼地方，我应该算是真正的美国公民。在美国学校度过的时光使我成为一个真正的将军，我们在巴西的垃圾学校可做不到这一点，对吧！”玛蒂尔达就要完成他的演讲稿了，来不及及时回复他。"
 brazil.290.a: "菲格雷多又一次怒拍了书桌。"
 brazil.291.t: "师徒"
 brazil.291.desc: "“啊哈，杨戈，又见到你可真高兴！”\n\n“见到您我也很高兴，老师。愿您一切安好。”\n\n“哦，当然啦，我过得很好，这里的东西多到吃不完！”\n\n巴西的两位总统，现任总统与前任总统开怀大笑起来。每个熟悉热图利奥·瓦加斯的人，特别是像若昂·古拉特这样与他关系亲密的工党大佬都了解，这位前总统在辞职退休后的16年里有多好他那口吃食。两人又闲聊了几句，话题终于转向了严肃的话题。\n\n“老师，我有些事想请教您。在您看来，现在我这个总统，我的所作所为到底如何呢？”\n\n“哦，我敢说你做得相当好。洛特啊，好，很好，对的，但你现在做得更好。”\n\n尽管古拉特听到这些漂亮话还是挺受用的，但还是有些不太敢相信。\n\n“您真的这样想？我是说，现在的情况，还有军方和保守派的抱怨，我实在有点怀疑自己。”\n\n瓦加斯嗤之以鼻。“哼，我一直都相信你，杨戈。你能做到的，帮助改善国内每个人的生活。如果那群人还没意识到，就是他们的脑子已经被寒鸦的那些宝贝小报里的垃圾塞满了。”\n\n古拉特缓缓点头。他的身上少了几分疑惑，他感觉肩上的担子稍微减轻了。"
 brazil.291.a: "“老师，我不会辜负您。”"
 brazil.292.t: "灯光炫目"
 brazil.292.desc: "古拉特穿着西装，不自在地换着姿势。演播室里热的要命，记者问的问题并没有缓解这种不适。这本该是一次改善公众对其看法的简短采访，而不是一场审讯。“有些巴西人担心您承诺的改革太过激进，可能会在未来使国家陷入政治动荡。您对此作何回应？”\n\n“我的政治计划并不是去分裂巴西，而是助其恢复的，我要把稳定的政治和经济带回来，并让工人摆脱贫困。”\n\n古拉特尝试坐直并显得更放松些，毕竟你不能在止不住的冒汗并看起来极度不适时去说服别人你没有恶意。古拉特撇了一眼对准他的镜头，试图保持微笑。这里可容不得半点失误。\n\n“我想问您一个尖锐的问题。这些年来有许多人称您是共产主义者，一些报纸将您的工党称为共产主义党派，许多看过您纲领的巴西人也如此判断。所以您是共产主义者吗？”\n\n古拉特快立马答道：“我一直献身于巴西工人阶级和工会。我为扶持这个国家的穷人奋斗，保障他们参与民主的权利。尽管如此，我不是、也从来不是一名共产主义者。”\n\n“但是有几个共产主义团体正在支持您的竞选活动。”\n\n“一些共产主义团体甚至在支持全民盟的竞选。您难道要指责卡洛斯·拉塞尔达或者雅尼奥·夸德罗斯是共产主义者吗？”古拉特回答道。\n\n“但他们的政策并不像共产主义政策。”\n\n“我的政策也不是共产主义的政策。如果你试图帮助这个国家的工人阶级，你就会被称为共产主义者。我可以将巴西所有的工业私有化，并大幅削减福利，但如果我推行哪怕最微薄的社会项目，我仍然会被称为共产主义者。”"
 brazil.292.a: "不管怎样，他们还是将他报道为共产主义者。"
 brazil.293.t: "南翼区的多彩活动"
 brazil.293.desc: "波萨诺瓦的旋律轻盈而温暖，像夜色中的一张柔软毛毯，轻轻拥抱着古拉特。这悠扬的音乐在餐厅里飘荡着，毫不张扬，却又无处不在。温馨的灯光和欧陆菜肴的香气交织在一起，抚慰着顾客们的心灵，也引领着古拉特沉入思绪的深渊。在巴西利亚的南翼区，虽有诸多去处，但他的心却总是不由自主地想要回到这里。\n\n古拉特搁下臂弯，桌上摆满了各式美味。“埃德娜，你选的这个地方真是别具一格。”\n\n埃德娜·洛特随着音乐的节奏轻轻摇摆，脸上绽放着满意的微笑。她一边切着牛排，一边从垂下的眉梢下轻声答道，“是的，我选的。现在你也会成为这里的常客了。”\n\n“这就是你让我欠你人情的妙计？有个总统做父亲，你倒是学会了不少策谋啊。”\n\n“那可不是。他其实更为直率，说不定是他在学我呢。”古拉特笑了起来。然而，片刻之后，会面的真正目的又如潮水般涌入他的脑海。\n\n“埃德娜，我想听听你对当前审查制度的看法。”\n\n“若昂，我就直说了吧，民法典第233条规定，已婚妇女的私有财产完全受丈夫控制。这是关乎半个社会的紧迫问题。当她们需要丈夫的许可才能工作，以求财产的自由，那么，我对此的看法其实很明确，不用说你也知道。而且，你的立场应当也是如此。”\n\n古拉特心中有所犹豫，这样的巨变不会轻易到来。但工作权、财产所有权——这些权利的重要性远超一切。他轻轻地敲打着酒杯，脸上浮现出淡淡的微笑。"
 brazil.293.a: "“好的，埃德娜，让我们修订《民法典》吧。”"
 brazil.294.t: "行动计划"
 brazil.294.desc: "“仅有文官的主导是远远不够的，军队必须彻底退出政坛。我们不能只是将毒蛇困在笼中，我们必须将其牙齿一一拔除！”\n\n莱昂内尔·布里佐拉那绯红的面庞似乎在预示着一连串的激烈冲突。他的目光紧紧锁定着古拉特，可他本人却出奇地沉着。他那善于争辩的本性，在这位妹婿的面前似乎稍显收敛，但这丝毫未能减轻他对军队的深深憎恶。他们在共同的仇恨中团结一致，军队的干预不仅是一个障碍——对于他们的梦想来说，简直是不可容忍的异端。\n\n古拉特脑海中闪过一幕幕暴力的景象——坦克的重压碾碎大道上的混凝土，弹孔累累的门后是堆积如山的总统卫队尸体；巴西，这个饱经摧残的国度，血迹斑斑，只有在伤痕累累之时，才能够感受到生命的微弱跳动。这样的悲剧场景，他发誓绝不让其成为现实。\n\n“我深表同意，但我们不能急于行动。他们惊慌失措时会迅速开枪，如果途中出现丝毫差错，我们俩都会命丧黄泉。莱昂内尔，我需要你的协助，但同时，我也需要你在我未作指示之前，对军队保持沉默。”\n\n布里佐拉先是露出一丝微笑，随即转为肃穆的点头。他未发一言，但一切已经不言而喻。在厚重的桌板下，一个微型黑色麦克风悄然隐匿，而在几英里之外的地下掩体中，两位军官紧张地聆听着，面露愁容。"
 brazil.294.a: "没有牙齿的毒蛇仍然可以活动。"
 brazil.295.t: "两位总统的故事"
 brazil.295.desc: "古拉特脚步踉跄，攀上楼梯，推开那扇沉甸甸的木门。飞机起飞的时刻在他脑海中一分分逼近，但在未与紧握着他手的那位长者交谈前，他的就职典礼就不算圆满。热图利奥·瓦加斯向他招手，示意他坐到一对红色皮质椅子上，两人很快就座。\n\n“热图利奥，最近怎样？看来你的晚年生活过得不错。”\n\n“我很好，总统古拉特先生。我的生活充满了讽刺。我在巴西文学院的院士地位是以一位被流放的阴谋者命名的。他的牵涉从未得到证实，而我却受到一位富有的葡萄牙裔人士的庇护。如果文学院授予你院士，千万别接受，那会毁了你的总统生涯。”\n\n“不，我还记得他们称你们为‘不朽者’，那样的礼遇对我不合适，但对你来说却截然不同。”\n\n“礼遇？我不常离开圣保罗，的确，我是给这个国家留下了深刻的印记。不过，从你的竞选承诺来看，你的影响将更为深远，如果我们想要纠正这一连串失败的政府，这样做是必要的。”\n\n“我不会比前任们更出色。但我会尽力去成为一位优秀的总统，那是我的职责。巴西始终需要一位出色的领导者。”"
 brazil.295.a: "“你要把握当下，快去巴西利亚吧，总统先生。”"
 brazil.296.t: "西凯拉建筑公司的一个早晨"
 brazil.296.desc: "“……还有，你们要是敢动一下那些厕所，那些工会的家伙们也会大发雷霆，所以那事儿也别想，”工头对着他阿拉瓜伊纳的建筑工队说。“还有一件事：别担心这个项目完了你们就没活干，我们刚签了个合同，在镇子南边修建一大片路。”\n\n“又是联邦的投资？”卢卡斯一边啜着咖啡一边问。\n\n“对，”工头回答道，“看来每周都有新工程。几乎每家有点名气的公司都插了一脚。只要库比契克还在任，我们就得一直忙下去，直到整个国家都铺上了公路和城市街区。”\n\n“不过之后我们得给它们找点用途，”阿德里亚诺补充道，众人都笑了起来。\n\n“没错，我们也能从中捞一笔，”工头说，“这可能是政府除了征收之外，还愿意付点赎买费用的唯一时期。我们应该感激我们生活在这样一个开明的时代。”\n\n“我可不这么看，”伊纳西奥沉吟道，“我们已经承接了桥梁的合同，现在政府还要我们接更多的活儿。你怎么肯定我们能应付得来？”\n\n“完成工作是你们的事，不是我们的，我们只负责补充人手，”工头说。“最后一件事，我们正考虑推出一个工具借用计划，允许你们借用一些设备来做个人的项目。如果你们有什么意见的话……”"
 brazil.296.a: "干得好，工具尽管拿去用吧。"
 brazil.297.t: "两人的晚餐"
 brazil.297.desc: "餐厅中弥漫着寂静，偶尔传来的餐具刮擦盘子的声音，是唯一打破这份宁静的存在。儒塞利诺在一片沉默中拨弄着他的食物。他抬头看着对面的妻子莎拉。“莎拉，自从我离开以来，孩子们怎么样了？”\n\n“他们都很好。”莎拉回答道。“只是都很想念你。我也是。”\n\n儒塞利诺感到有些不安，但努力维持着内心的镇定。“我知道我没有花太多时间陪你们。我也知道这对你和孩子们来说很艰难。我从未希望这样。但我对巴西负有责任。人民把国家最重要的位置托付给了我。尽管我想见你们，但我不能放弃我的职责。”\n\n莎拉望着他。“我知道你有你的责任。我只是希望你能多陪陪家人。”莎拉叹息着，头转向一旁。“我只希望多看看你。你总是离家很长时间。有时我在想，你可能在忙一些与你的职责无关的事。”\n\n儒塞利诺心里一紧。确实，他与情妇共度了不少漫长的夜晚。莎拉知道这些吗？有没有人向她泄露了他的秘密？每当他回忆起那些本应陪在家中却与情妇纵情欢乐的夜晚，内心就涌起一阵阵的愧疚。“请听我说。”他深深叹息。“我保证我会尽量抽出更多时间陪你。但作为巴西总统，我手头的空闲时间实在有限。希望你能理解我。我并不希望你承受这种痛苦，但有些事情是难以避免的。”\n\n莎拉叹了口气。“我理解你要为巴西服务。只是，请你保证会多花时间陪家人。”\n\n儒塞利诺站起身。“我会尽力多抽出些时间陪你们。”他迟疑了一下，然后向着主走廊的门走去。“我现在得走了，对不起，我有一个重要的会议，要和一些参议员讨论基础设施法案，我不能错过。”\n\n莎拉急切地站起来。“你才刚回来。”\n\n“我知道，我知道。但我得去开会。”他向门口走去。临走前他回头一望。“我爱你，莎拉。”\n\n莎拉最后一次望着他，直到他离开，轻声说道：“我也爱你，儒塞利诺，再见。”"
 brazil.297.a: "很快家中又陷入了沉寂。"
 brazil.298.t: "埃赫那吞重生"
 brazil.298.desc: "红日在清晨缓缓升起，将巴西利亚碧蓝的天空染成了高原土壤一般的深红。冷夜逐渐退去，城市迎来炙热的白昼，奥斯卡·尼迈耶的白色巨构在帕拉诺阿湖面上映出太阳的光辉。这座城市，仿佛就是基督布道中的山巅之城，若望·鲍思高预言中的热带之都，一个充满财富与辉煌的地方，超乎人类的想象。倘若没有那些将预言变为现实的人，先知也不过是呓语的疯子。\n\n在这样的晨光中，一位男子正在帕拉诺阿湖畔散步，他就是总统儒塞利诺·库比契克，正是他将往昔的预言化为了现实。他凝视着这座城市，思绪回到了几十年前，那时他还是一名年轻的学生，第一次听说埃赫那吞的故事。这位远见卓识的法老，打破了埃及的旧习，带领人民进入一个全新的黄金时代，他敢于背弃整个文明，在尼罗河畔建造一座新城，其形如展翅欲飞的鸟儿。他虽备受憎恨，却绝不会被人遗忘。这位法老是一个敢于挑战的人。\n\n就如同埃赫那吞一样，库比契克也敢于挑战。他记得人们曾称他为狂人，记得龙卷风和暴雨阻碍了工程的进展，记得他的总统专机在巴西利亚的建设现场坠毁时，拉塞尔达在报纸上大书“失控：儒塞利诺因巴西利亚而使国家陷入危机”，他记得国会给予他的最后通牒，但他更记得那些追随他愿景的巴西人民。现在，在他的眼前，帕拉诺阿湖仿佛就成了他的“尼罗河”，巴西利亚“试点计划区”的道路蜿蜒伸展，犹如埃及圣鹮展翅高飞。在晨曦宫那被阳光柔情拥抱的窗户下，他已经筑起了他的宏伟神庙。"
 brazil.298.a: "永垂不朽！"
 brazil.299.t: "大西洋公路计划"
 brazil.299.desc: "库比契克站在南里奥格兰德州的海滩上，海风吹乱了他的头发。他眺望着海滩上方小镇的方向，听着海浪拍打岩石的轰鸣声。他转向带来的一位工程师。“这就是其中一个地点？”\n\n“是的。离海岸很近，沙滩上方有个小镇，土质坚实且石块不多。非常适合修建公路。”\n\n库比契克微笑着转向小镇。“我相信他们会感激这次建设带来的新工作机会。”\n\n“是的，我也这么认为。”工程师一边说，一边继续查看他的笔记。\n\n这不仅仅是一条连接南里奥格兰德州海滩小镇的普通小路，更预示着库比契克的基础设施杰作的诞生——一条横贯巴西整个海岸线的壮丽公路。这个宏伟的连接工程，将巴西紧密地纳入未来的怀抱。库比契克邀请了曾在跨亚马孙公路项目中大放异彩的工程师们，来携手实现这一宏图。他们已遍布于海岸线的各个角落，正评估这条公路的潜在路线。这条从累西腓延伸至南里奥格兰德的公路，将整个巴西紧密相连。这是一个天才般的构思！库比契克的脑海中充满了这个项目的无限可能性。他预见这条路将大幅推动巴西经济的腾飞，并为汽车工业注入新的生机。尽管这个项目对政府来说是个重大挑战，但库比契克已经派出他最杰出的团队去完成这一壮举。而且，他坚信公路所带来的利益将远超潜在的风险。他已经能够预见到那漫长的车队在公路上行驶的情景，繁忙的小镇围绕着路边服务站逐渐形成。当他望向大海，眼神凝视着那浩瀚无垠的波涛时，库比契克感到自己已经做好了迎接挑战的准备。跨大西洋公路的雄伟蓝图正逐渐成形。"
 brazil.299.a: "为了所有人的福祉。"
 brazil.300.t: "老朋友与美好时光"
 brazil.300.desc: "“杨戈！”库比契克走向门前，面带微笑。“再次见到你真是太好了。”他和若昂·古拉特约好了在其家中相见。\n\n当他走近站在门廊下的古拉特时，库比契克察觉到了一些不同寻常的迹象。古拉特显得有些憔悴，就像是刚从梦中惊醒。他眼角似乎藏着深深的忧郁，一种无法言喻的失落。古拉特迟疑了片刻才回答库比契克，“我也很高兴见到你。”他的脸上勉强浮现出一丝微笑，伸出手来握手，随即转身引领进屋内。“请进吧。”\n\n他们一同走进古拉特的家中。虽然屋内布置得颇为雅致，但略显杂乱无章。他们径直走进主客厅。“我从未想过我的副总统会是别人，若昂。”库比契克坐下时说道。“你是我共事过最杰出的人之一。没有你，我的总统任期将大为不同。”\n\n古拉特抬眸望向库比契克，眼中闪烁着一抹喜悦。“哦，埃德娜·洛特不会让你失望的。她在巴西工党取得了卓越的成就，儒塞利诺。我亲自与她交谈过，她给人的感觉非常聪明。”\n\n“我希望她名副其实。”库比契克笑了笑，“据我所知，她似乎很有自己的见解。”他靠近古拉特，“虽然你无法成为我的副总统，但我仍需要你的支持。”\n\n“我能帮到什么？”古拉特回应道。\n\n“若昂，你还是众议院的领袖，不是吗？还有巴西工党的。我需要你帮我推动对巴西有益的立法，改善所有人的生活质量。在众议院，你得成为我的得力帮手，否则一切都可能陷入困境。我需要你。”\n\n古拉特显得有些讶异，好像他忘记了自己在巴西政治中的重要地位。“当然，我愿意帮助你推行政策。我们都致力于帮助人民，延续瓦加斯的意志。我会全力支持你。”\n\n库比契克回应道：“太好了，我的朋友。听你这么说，我非常高兴。”两人站起身，紧紧握手。“让我们一起为巴西带来好运吧。”"
 brazil.300.a: "为了更好的巴西而结成的联盟。"
 brazil.301.t: "临近"
 brazil.301.desc: "此刻，除了等待，别无选择。\n\n筹划已成定局，准备工作已尽善尽美，人群已汇聚首都，共襄盛举，即将在胜利的瞬间融为一体。\n\n那是儒塞利诺·库比契克的辉煌时刻。\n\n坦克雷多·内维斯目送着库比契克信步走向待命的车辆。“我想在你的就职典礼上祝你好运，”内维斯说。\n\n库比契克的脸上绽放出灿烂的笑容。“谢谢你，坦克雷多。还有，”他转身望向内维斯，“我要感谢你在我的竞选中给予的支持。你的帮助对我来说极为珍贵。能够再次在我的内阁中与你并肩，是我的荣幸。”\n\n“我也很荣幸为您效力。”\n\n库比契克打开了车门，这辆车即将载着他前往就职仪式。“我昨晚花了大量时间准备我的演讲。我相信它会赢得人心，同时也很好地概述了我的政策。”\n\n“你感到紧张吗？”内维斯问。\n\n“不，当然不。”库比契克回答道，“毕竟这不是我首次就职。我对这一切都轻车熟路。”他一边坐进车里，一边回头说，“我们很快再见，坦克雷多！”\n\n“祝你演讲成功！”内维斯高声回应。\n\n车门关闭，库比契克的身影渐渐隐去，车辆缓缓驶向就职典礼的场地。坦克雷多·内维斯向着自己的车走去，准备投身于接下来的一系列盛事之中。"
 brazil.301.a: "胜利就在库比契克手中。"
 brazil.302.t: "一桩求救"
 brazil.302.desc: "一则腐败丑闻，一段长期监禁，一位总统朋友。\n\n阿德马尔·德·巴罗斯已经把信反复读了好几次了。一名他在圣保罗的协会会员因腐败被逮捕。很可惜，这位朋友不像阿德马尔那样擅长遮掩，但也很幸运，他没有供出与总统的关系，保守了大量机密。阿德马尔欣赏忠诚者，但该如何帮助这倒霉的可怜虫呢？\n\n一个选项是叫他自生自灭，尤其因为今年还是选举年。但想到要抛弃伙伴，撒手不管叫他去蹲大牢，总统总觉得过意不去。反过来说，可以赦免他，这是向朋友与敌人发出信号，没有他妈的找到好的理由，就不要招惹总统。那群爆料小报也许会猜测总统搞腐败，但他会在乎这？谁不知道他贪？\n\n最后的选择，走后门，让警察不经审判就将他释放。一些人可能会察觉，但总比公然释放来得好。或许一直都是这个道理，中庸之道是最好的？"
 brazil.302.a: "遗憾呐，这位可怜人要进局子了。"
 brazil.302.b: "让警察撤销这件案子。"
 brazil.302.c: "发一份总统特赦令，替这人洗白。"
 brazil.303.t: "赢取欧裔选民"
 brazil.303.desc: "握着一大杯德啤，阿德马尔·德·巴罗斯总统瞧到饮料液面上自己的倒影，满月真是把夜晚照个透亮。他是究竟为什么来到了这里？\n\n美食、欧洲移民的子女、德国啤酒、意大利葡萄酒。无论他走到哪里，选民们都要邀他喝点，他的两名保镖穿着黑色西装，如乌鸦一般紧随在后。看到他俩，阿德马尔就会想起福尼和雾金，呃，还是记反了来着？\n\n他们定好了竞选计划，拉拢德裔和意裔巴西人。但这段美妙时光叫阿德马尔总统有点遭不住了，好多好多舞蹈，好多好多美食，好多好多美酒。一轮轮喝下来，总统说出来的一句句话都快赶上雅尼奥·夸德罗斯清醒时的水平了。最好，嗝，最好晚上回去睡个好觉。"
 brazil.303.a: "他记不清选民们，可也许选民们记住了他。"
 brazil.304.t: "损害控制"
 brazil.304.desc: "在这个国家，办成事情并非总是轻而易举，这一点，总统阿德马尔深有体会。他意外地发现，一个曾是他的同盟、位居中级的官僚竟向当局告发了他，涉及一宗公路合同的腐败案。这使得总统颇感恼火，他不得不绞尽脑汁回想，究竟是哪一个腐败合同被媒体揭露了。\n\n那么，接下来该怎么做？反击无疑是一种选择。阿德马尔明白，像这样的小人通常不会向警方完全坦白。揭露他们的肮脏秘密，羞辱这个消息源，无疑能有效转移公众对总统的注意力。让那个玩弄两面手法的家伙闭嘴，肯定会让人暗自快意。然而，激烈的反应在某种程度上也似乎在默认了罪行。或许，阿德马尔仅仅否认这些指控，而不攻击消息源，会显得更加可信。\n\n还有另一个选择——什么都不做，什么都不说。众所周知，阿德马尔虽然涉嫌盗窃，但却能高效办事。这些指控对他来说，又算得了什么呢？作为总统，他有更加重要的事务需要处理。"
 brazil.304.a: "让我们展开攻势。"
 brazil.304.b: "否认指控就够了。"
 brazil.304.c: "狮子怎会在乎绵羊的聒噪。"
 brazil.305.t: "新任副总统的桑巴舞"
 brazil.305.desc: "“原来是您击败了纳特尔？”阿德马尔当选总统满脸笑容地对着新任副总统说。埃德娜·洛特以一种高贵的风度伸出手。阿德马尔握着她的手，打量着这位不畏艰难登上副总统宝座的女性。\n\n历史以其独特的讽刺方式安排，她的父亲曾拥有一个与他为敌的右翼副总统，而现在的埃德娜·洛特似乎正准备站在总统的左翼。她是工党中冉冉升起的新星，相比于纳特尔那样顺从的副总统风格，她显得更为强硬。\n\n阿德马尔的笑容更加灿烂。“洛特女士，您有着您父亲所不具备的魅力。”\n\n“而您，阿德马尔先生，拥有本国保守派从未达到的自信和民众感召力。我不想和您玩权力游戏。您对巴西穷人的困境视而不见，仅仅给予他们施舍而非必要的深层改革。我将利用我的职位来监督您的工作。如果您真心想帮助穷苦工人，我们或许能找到合作之道。但在那之前，恕我对与您共事不抱太多热情。如果您因此感到不快，我也不会有任何怨言。”\n\n阿德马尔收起了笑容，以免再惹怒他的新副总统。她不仅继承了父亲的诚实与坚定，还有身为女性的聪慧和机敏。这次共事可能会有些棘手，但无疑充满了更多的趣味。"
 brazil.305.a: "我祈求上帝让敌人离我越近越好。"
 brazil.306.t: "“若昂·福斯塔夫”总统"
 brazil.306.desc: "在这个国家，政治生活把天方夜谭变得稀松平常，平常中又透出荒诞，这种背景下，滑稽剧最近蓬勃发展起来。类似里约这样的大城市滑稽剧俱乐部里，冉冉升起的滑稽演员们在夜里约好聚在一块，向着同行还有一般市民演练自己的短剧。\n\n对脑子活泛的滑稽演员来说，近期的政治困局就是福音。洛特的沉默寡言、夸德罗斯的醉里狂言、库比契克和拉塞尔达阴谋妄想，统统化作了他们毫不留情的讽刺剧目。而这些都不如现任总统阿德马尔·德·巴罗斯重量级。他酷爱煽动民众，满口仁义道德，可自己都承认公文包里塞满了赃款，此番举动养活了无数不甘人后的滑稽演员。\n\n并不是所有人痴迷于这波阿德马尔模仿大潮。布鲁诺和朋友坐在俱乐部后面，对他叹了口气。“看啊，现在人人都是阿德马尔，他身上乐子太多了，简直要把滑稽剧杀死。”\n\n朋友耸了耸肩。“人人都会成为政治上的阿德马尔，腐败又民粹，为什么不选择享受这一切呢？”\n\n布鲁诺又叹了口气。“曾经我们指望滑稽剧能稍微逃离日常，现在它却成了日常的絮絮叨叨。”"
 brazil.306.a: "是我们选出来的小丑总统，你又有什么好期待呢？"
 brazil.307.t: "打扫办公室"
 brazil.307.desc: "圣保罗。他一定会想念这个地方的。\n\n总统竞选期间，阿德马尔一直是这儿的州长。既然他当了总统，那现在就该把这儿的摊子撤了，然后去巴西利亚了。\n\n保险柜已经运走了，在陪他去首都之前，那些钱在几条线上周转过好几次。有关勒索和情报的文件他都看过了。那些依然有用的东西会被锁在城市某处的安全屋里，其他的都统统烧掉。办公室里也没有什么东西要打扫或移动了，他的生活一直很简朴。毕竟，往自己的门面上贴金箔只会让这个人显得讨嫌。\n\n阿德马尔走到窗前。他会想念圣保罗的。柔风吹拂，使人想起无边无际的大海——远比巴西利亚沉闷、压抑的气氛要好。\n\n好了，别再磨磨蹭蹭了。阿德马尔拎起公文包，把椅子推进办公桌下面，便离开了。"
 brazil.307.a: "巴西利亚我来啦！"
 brazil.308.t: "警车问题"
 brazil.308.desc: "阿德马尔拉开车门，新皮革的气味扑面而来。他一边从口袋里掏出钥匙，一边慢慢坐在汽车座椅上。一插、一转，引擎轰了两声便启动了。他脸上浮起一丝笑意，开着这辆甲壳虫汽车从车行里缓缓驶出。把车卖给他的商人笑着挥了挥手，阿德马尔回头看了一眼，便把车开到大路上去了。他朝车商挥挥手，然后把住方向盘，向前行驶。\n\n阿德马尔踩着油门，沿着街道前进。他差不多该买辆新车了。之前他开的是一辆福特，那车都快有二三十年了，早就该升级换代了。大众的车开起来都很稳，外观小巧精致，内饰则使用手感光滑的皮革，价格也不贵。德国佬搞种族灭绝，可他们造的车还真不错。\n\n圣保罗的街道上熙熙攘攘。孩子们在街边嬉戏打闹，老人们倚着门廊，说长道短。阿德马尔不禁微微一笑，真是美好的一天。但拐了一个弯之后，他却皱起了眉头。\n\n街对面的餐馆边上有个停车场，里面停着一辆大车，锈迹斑斑。这似乎没什么大不了的，巴西城里不多得是旧车吗？但阿德马尔可不这么认为，这可是一辆警车！他原本计划好要换掉那些老旧的警车，但却一直没腾出空来。\n\n他敲着方向盘，思索着该用什么换掉那些破警车。也许可以买些大众甲壳虫，就他现在开着的这种。这车很稳，同时它大小适中、价格便宜，可以大量生产，满足警察部队的需求。但……和德国人签合同，政治上的风险有点大。与之相比，美国公司反而是个稳妥的选择。最近，阿德马尔听到有人说威利斯公司的Aero不错，这款车设计出来已经有十个年头了，但它质量挺好，城里似乎有不少人开着它到处跑。弄一批Aero肯定不会有错。阿德马尔把车开进停车场，心中决定制定一个计划，尽快接洽一家汽车制造商。他坐在车里，想了一会，拍拍脑门："
 brazil.308.a: "就选大众甲壳虫吧。"
 brazil.308.b: "还是威利斯Aero好。"
 brazil.309.t: "贿赂阿德马尔"
 brazil.309.desc: "圣保罗州长办公室的豪华装饰几乎令人咋舌。金箔、闪耀的水晶和古色古香的家具随处可见。身为保守派的卡斯特洛·布兰科将军对此深感不满。不是因为这里过于炫目，而是他知道州长是如何布置这样一个办公室的，如今，他正要成为其中的一部分。门轰然敞开，一个留着小胡子、身穿耀眼白色西装的男人大步走了进来。“啊，我猜是秘书把你领上来的？太好了！”阿德马尔·德·巴罗斯无缘无故地笑了起来。\n\n“您好，州长。”卡斯特洛·布兰科说道。“别废话了，我们直奔主题。您想为圣保罗做些什么？”\n\n阿德马尔再次笑了起来。“哎呀，将军，谁说不能客气一番呢？要不来点酒？我这有一瓶正宗的法国小佩提·韦尔多特葡萄酒……”他走向酒柜。“还是说，您更喜欢白兰地？”\n\n“州长，这法国酒是哪儿来的？”卡斯特洛·布兰科不悦地皱眉。\n\n“哦，我有我的渠道，将军。我……”他倒了一杯白兰地。“……总有办法。干杯。”\n\n阿德马尔轻抿了一口。“好了，说正事吧。”他微笑着。此时的卡斯特洛·布兰科怒火中烧，竟然被一个州长这样耍着。\n\n“我们可以给你三百万美元，州长。”将军终于开口。\n\n“不够。”阿德马尔·德·巴罗斯斜靠在椅背上。\n\n将军沮丧地叹了口气。“那就五百万。”\n\n“哎呀，将军，我真没想到你会这么低估我。我要的是权力。至少，让我做个内政部长吧。”\n\n卡斯特洛·布兰科叹了口气。“行，但不是现在。大概一年后。”\n\n阿德马尔笑了。“太好了。将军，您自己出去吧。”卡斯特洛·布兰科将军带着一丝不寻常的微笑离开了圣保罗立法大厦。"
 brazil.309.a: "阿德马尔·德·巴罗斯未来可能横遭不幸。"
 brazil.310.t: "漫长的看守"
 brazil.310.desc: "费利克斯心想，别的任务要糟得多。他一天到晚要做的就是和其他人待在一旁，看守被软禁在屋子的这个人。至少他用不着参与实际追捕军队政敌的讨厌活计，他可以松口气，和营里的弟兄一起打打扑克，偶尔简单巡逻下，几乎不用担心出现什么状况。\n\n“若泽，场上就剩你这幸运儿闲家了。在转牌圈的时候，我使出浑身解数下套，结果你今天又又又抓个四条，叫你起死回生了。你有啥绝活，嗯？还是你又给爱德华多他塞钱了，就为咸鱼翻身？”一名士兵发出爽朗的笑声，庄家为了保险起见，默默洗了两轮牌。“马可，老实说吧，这把打完了，你得欠我顿午饭，而不是我欠你！”\n\n卡车侧面传来两声敲打声，紧接着费利克斯的中士来到了敞口处。费利克斯不情愿地抓起他的步枪，从卡车上下来，这时他看到有个人朝他们监视的屋子走去。尽管屋里的人被软禁着，还安排有许多警卫，但还是有几个访客的。在斋戒日，最多会……有三个。费利克斯想道，是不是因为军方不让任何人见到他？“嘿，中士，我们到底在护卫谁来着？”\n\n“费利克斯，我说过，叫你读读那份玩意，难道你看都没看？”中士怒吼道，同时举着双筒望远镜盯着来访者。“我们保护的就是瓦加斯，下次把你头从土里给我挖出来，老天。他的儿子马上就来了。”“我们就放他进来吗？以后会不会给我们惹上麻烦？”费利克斯问道。“不，我们接到的命令是放人进来，哪怕是他儿子。如果他们搞出什么乱子，我们再去收拾。”直到小瓦加斯走进父亲的屋子后，中士才放下望远镜，腾出手掏出身上的香烟。“现在你们可以继续打扑克了。哦，费利克斯还有你！下次他妈的好好看我发你的报告，不然我就把你踢出我的排！”"
 brazil.310.a: "“遵-遵命，长官。是的，长官。”"
 brazil.311.t: "扼杀雏鹰"
 brazil.311.desc: "保罗对身上的制服相当自豪，这套制服仿照德国纳粹党的棕色衬衫定制设计，手臂上的臂章也是他通过自己的人脉从黑市上买到的万字符仿制品。每天，他都会早早起来，按照自己买来的照片精心打扮，模仿光荣日耳曼国一员的姿势与敬礼，全都是为了那独一值得的追求，巴西国内的民族社会主义。玻利维亚和巴拉圭等其他国家其实已有来自德国人的支持，而他的国家却成为了阴险扭曲的布尔什维主义与自由主义滋生的温床，他希望这个问题能尽快得到解决。有朝一日，光荣的雄鹰将俯视圣保罗，而他会成为首位向巴西的元首致抬手礼的人。可是，他好恨啊，他套着这身闷热的制服在迂回曲折迷宫般的家乡穿行，路人都对他侧目而视，怀疑与厌恶的目光不断投射过来。出了什么差错？谁泄露了他们的会议总部？他们总是一丝不苟、小心翼翼，除了志同道合者绝不过多牵连！等下……会是整合主义者吗？是整合主义者把他们出卖——\n\n保罗的思考就此中断，一枪托砸过来，将他的鼻子被砸成两段，剧痛使他昏了过去。然后，他被拖进一辆警车。"
 brazil.311.a: "保罗·恩里克，31岁，死于警方枪下。"
 brazil.312.t: "传递火炬"
 brazil.312.desc: "自从巴西的民主在他眼前覆灭，已经过去了好几周。洛特在家中被软禁的大多数时间里，都在沉思：自己还能做些什么？但每次都找不到答案。幸亏他对宪法的深刻了解，才使他和家人仅仅是被软禁在家。作为军队中的要员和前总统，只有卡斯特洛·布兰科才有权力逮捕洛特并送他入狱。\n\n幸运的是，卡斯特洛·布兰科正忙于破坏巴西的民主。然而，洛特知道自己的时日不多；他和其他护宪派曾尝试的一切挽救国家的努力都告失败。卡斯特洛·布兰科随时可能出手，对洛特下达致命一击。\n\n第二天早晨，一列车队停在了洛特家的门前。当他打开门时，迎接他的是卡斯特洛·布兰科阴郁的面容，以及几位强硬派军官。洛特举手投降，同时坚定地注视着卡斯特洛·布兰科。\n\n“洛特元帅，根据巴西武装部队的命令，你已被逮捕。请你配合我们。”\n\n“当然，元帅。”洛特向车队后方迈步，但卡斯特洛·布兰科紧紧抓住他的衣领。\n\n“别指望我们会让你轻松过关，洛特元帅。”卡斯特洛·布兰科低声咆哮道，“你让我亲自出马，玩这些愚蠢的游戏。你在这个国家已经没戏了。今后别再阻碍我们，否则别怪我对你的家人不客气。我说得够清楚了吗？”洛特保持冷静，坚定地点头，然后被推进了车后座。\n\n他回头望着家人忧虑的面孔，露出一丝苦涩的微笑，竖起大拇指，就在车门重重关上之前。对于即将遭受的待遇，洛特并不担心；这不过是一种象征性的举动。当车辆开始加速驶离，他的脑海中快速闪过各种思绪：还有什么他本可以做得更多的事情来拯救共和国？毕竟，他曾成功挫败过一次政变；为什么这次却功亏一篑？"
 brazil.312.a: "他在牢房里想怎么想都行。"
 brazil.313.t: "随风而逝"
 brazil.313.desc: "古拉特无法入睡，也不愿入睡。他的眼睛紧张地在乡野间左右搜寻，害怕看见任何一丝追兵的迹象——伪装的士兵、直升机或者突然冲出来的吉普车，士兵们热血沸腾，只因他的存在就将他推上了审判。多年来，他一直是元帅的眼中钉，肉中刺，他们都急于将他和他的家庭归为档案的一部分，或是报纸上的意外死亡讣告。他靠着运气，利用职业生涯中积攒的每一份人情和善意，加之与布里佐拉的友谊，才换来了这么一点点领先。军方正在追捕他，无论是他过去的任何联系，还是他的直系家庭，他们都要像当年苏俄对待沙皇那样，将他除掉。尽管他热爱巴西，但他不能让玛丽亚和孩子们与他一同走向死亡。\n\n“我们到了，先生。”\n\n北方口音浓重的司机将他从恐慌的麻木中唤醒。他大声表示感谢，唤醒了家人，他们匆忙从车中走出，向着直升机奔去。每走一步，都让他更接近那救赎的门票，心中既有释然又有哀伤；归根结底，他还是辜负了巴西，这份悔恨将伴随他在乌拉圭度过的余生。也许有一天，祖国会变得更加美好，但他知道，他再也回不去了……\n\n在经历了军方犯下的一系列暴行后，他清楚地知道，当他关上直升机的门，安全离开的那一刻，他永远不会再回到他在里约的那个温馨的家了。"
 brazil.313.a: "科斯塔-席尔瓦恼羞成怒，他的部下差了古拉特整整一小时的路。"
 brazil.314.t: "乌鸦与尸体"
 brazil.314.desc: "拉塞尔达对眼前的局势深感厌恶。军事政变的发展轨迹让他想起了德国魏玛共和国的历史，唯一不同的是，这里没有一个像希特勒那样的人物。也许，这正是他心头的一块石头。他关掉了收音机，轻轻扭动着脖子，转身坐回椅子，伸手拿起了那台可靠的打字机。头脑中的文字如跳舞般活跃，他试图为这一混乱局面编织出正面的叙述。他看着军队将民选政府推向死亡边缘，但他为何要跟随其他人走向毁灭？\n\n即使是在军队的枪口下，如果他能成为巴西的总统，引领国家走向他一直梦寐以求的方向，他不介意放弃一些平日里的自由；毕竟，他与军队在许多基本理念上有着共识，这可以成为坚实的合作基础：共同抵制共产主义者和法西斯分子，将道德和善良置于国家的最前沿。\n\n随着打字机的键盘完成最后一次敲击，他的文章定稿了，其中赞扬军队“保护巴西的道德指南针和对世界自由国家的善意与勇气”。他知道这纯属无稽之谈，但那又如何呢？不断重复一个说辞，直到它变成事实。他将文章放入文件夹，准备稍后交给秘书和编辑们，然后拿起电话，拨通了他熟记于心的几个号码。\n\n是时候与他在军队里的老朋友进行一番深入的交谈了。"
 brazil.314.a: "在民主的葬礼上，乌鸦挥动铁铲。"
 brazil.315.t: "拉撒路的灵魂"
 brazil.315.desc: "“埃丝特，你看看这玩意，看看他们放的是什么狗屁！？”在担任拉塞尔达的秘书期间，埃丝特了解了很多事情；因此，对于拉塞尔达那天的情绪波动，她表示她无法给出明确的回答。但即使是她这样坚忍的人，在看到报纸上的内容之后，也忍不住咽了口唾沫。“卡斯特洛·布兰科总统批准AI-2措施，赋予其超越宪法的权力，授权之前的所有选举结果一律无效，取消所有直接选举，直至另有通知之日？！这，这简直是要把民主拐到小巷子里枪杀！我绝对不会袖手旁观，这是我的机会！我——我会——”也许是出于保护自己和工作的本能，也许是内心深处有什么东西牵挂着那个大声吹牛的男人——她的老板，她一副扭曲的表情，扯住他的衣领，指了指窗户。拉塞尔达的脸涨得通红，转过头去瞪着窗外，但当他看到街上的坦克、手中拿着自动武器的士兵，以及在步行队伍旁观看游行的人群时，他的脸又变得煞白。“……好，好，好。要是这样的话，我指不定就要上名单了，然后跟那个阿马佐纳斯肩并肩躺在墓穴里！我……我还是闭嘴吧。低调行事，我还有瓜纳巴拉……我可以让这一切尽量保持正常……”埃丝特点点头，继续工作……但她的心早已不在此处，飞到了乡下的家人那儿。姐姐玛丽埃塔在乡下，她们还好吗？办公室的门突然开了，打断了她的思绪。男人的声音在耳边回响。“通知我的飞行员，让他随时待命。把我的飞机从圣保罗开出来，回瓜纳巴拉。”他的声音停顿了片刻，才继续说下去。要不是她熟悉乌鸦的喃喃自语，肯定会漏过这句话的最后部分“只是……以防万一。”\n\n她从没想过自己会从那个男人的声音里听到那种情绪。"
 brazil.315.a: "她从来没有想过她会从他那里感受到一丝颓唐。"
 brazil.316.t: "时候未到"
 brazil.316.desc: "库比契克手中握着的卡莎萨酒杯映照出他深沉的黑眼睛，那眼神里透露着深深的失望。他对自己感到失望，因为没有走得更远；对他的竞选团队感到失望，因为他们未能说服更多的选民支持他赢得巴西利亚；更对自己的成就感到了无力，仿佛他的成就还不足以打动巴西人民的心灵……\n\n然而，对于巴西这片土地，他的心中充满了无比的自豪。他的祖国再次显示出了其坚不可摧的力量，成功挫败了军方的野心，坚守住了民主的灯塔。他的目光缓缓转向坦克雷多·内维斯那温暖的笑容。提起酒杯，即将离任的总统向这位老友举杯致敬。“接下来会怎样，库比契克？”面对内维斯的询问，库比契克差点露出了一丝专业伪装的微笑，但他最终选择了一个更加真诚、略显扭曲的笑容。在内维斯这样的老朋友面前，他无需隐藏自己的情感和言语。“我实在是很遗憾，但人民终于发出了自己的声音，这在几周前还是不敢想象的。即使我不在高原宫，那里也将迎来一个民选的总统，而不是某个把巴西当作私产的野心家。”库比契克说着，带着一丝苦涩地一饮而尽杯中酒。“我已经写好了我的辞职信，处理了所有遗留的事务。但我可以回来，内维斯。我随时都能回来。我将返回里约，思考自己的不足，总有一天，我会再次踏入高原宫。到那时，除了上帝，谁也挡不住我，连军方都没能阻止我。”面对库比契克这位“巴西共建者”的幽默，内维斯开怀大笑。在那一刻，他知道，无论经历多少挫折，库比契克都将坚强地站起来。"
 brazil.316.a: "我这儿的朋友喝不下了，请问结账多少钱？"
 brazil.317.t: "时候未到"
 brazil.317.desc: "“去他妈的，都他妈该死！”\n\n拉塞尔达怒吼着，他将电话砸向墙壁，愤然起身，踢翻椅子，仿佛这椅子就代表了愚昧的民众——他们看不见他为巴西所做的一切，如果他们给他一次机会，他本可以为这个国家做更多事情。几个月的努力，永远不够，不足以让巴西以其辉煌的姿态，成为她命中注定的南美领袖。\n\n民众只需要给正确的候选人投票，可他们没有。\n\n一瞬间，他脑海中掠过55年那次政变的念头。有时，民主的确需要一个明确的方向，而他比任何人都更清楚这一点。但这个想法很快就烟消云散了，因为他看到了更长远的好处……\n\n如果入主高原宫的总统把事情搞砸了，他可以做他最擅长的事情——发动宣传攻势。这一次，有了总统候选人的经历作后盾。他可以利用这段竞选时积累的经验，展示他能做什么，向人民揭示对手的错误。然而，这一切都需要人民下次投出正确的那一票。\n\n如果上台的是瓦加斯那个跟班，或者是他那个该死的门徒，拉塞尔达可能会考虑再来一次55年那样的举动，但从目前来看，这样做的收益太少，风险太大；巴西的民主已经稳固，他以后有的是机会。既然已经等了这么多年，再等四年又有何妨？"
 brazil.317.a: "你就坐着吧，把位子捂暖和，下次就轮到我了。"
 brazil.318.t: "时候未到"
 brazil.318.desc: "古拉特本该早些洞悉。担任总统候选人的高风险性。他深知多少人因他渴望为民众做正确之事而恨不得向他的心脏射出一颗子弹。因此，他无法真正怪罪那些未将选票投给他的巴西人民——他们不愿看到民主制度陷落于一位暴君的阴影。\n\n但在情感层面，他却如同风暴后的残垣。就这样，他在半空的平加酒瓶和几乎抽完的香烟中找寻慰藉，眼前的电视正在播放一场足球比赛，他却分心沉溺于自己的世界。\n\n泪水从他的脸颊滑落，留下一道道温热的泪痕。失望与悲伤在他体内沸腾，为自己辜负了人民、辜负了巴西、辜负了瓦加斯而自责。的确，情况本可以更糟，但这一切因他而起的事实，如同幽灵紧紧缠绕在他的心头，挥之不去。\n\n他未曾察觉，紧紧箍住他的不是失败的阴影，而是玛丽亚·特蕾莎的温柔慰藉，她默默地把他的头倚在自己肩膀上，为他痛苦不已的心灵给予默默的陪伴。\n\n他清楚，还有其他的机遇在等待着他。还有更多的途径和机会去实现他对一个公正巴西的梦想。他并不孤单，有朋友、家人、一位深爱他的妻子的支持，还有他脚下这片他深爱的土地。\n\n他会挺过来的。"
 brazil.318.a: "最终结果：博塔福戈2-0弗拉门戈。"
 brazil.319.t: "物色继承人"
 brazil.319.desc: "阿德马尔在办公室里颓然坐着，他曾以为，第三次尝试将是幸运的转机，但总统的宝座再次从他指尖滑落。到1970年，他已步入暮年，若是那时赢得大选，任期末他将是74岁。不，阿德马尔心想，不会有第四次角逐，不再有遍及巴西的奔波，不再有与选民握手、亲吻婴儿的场面了。那个曾近在咫尺，却又遥不可及的总统职位，终究还是从他的手中溜走了。阿德马尔·德·巴罗斯的总统梦，似乎只能留给小说家们去描绘那“本可能发生”的情节。\n\n阿德马尔站起身，准备走到外头，去向所有人表达对他们在竞选中的辛勤工作和贡献的感谢，并告诉他们这不是终点。但就在那时，他脑海深处浮现出一个微小的念头，那种最初很小，但迅速膨胀，直至充斥着他的全部思维。或许，一切还未结束。\n\n尽管年岁已高，他仍能在巴西政坛上扮演重要角色。作为政界的重量级人物，他在过去十年里对巴西政治产生了至关重要的影响，虽然他从未成为参议员或登上总统之位。\n\n他需要的，只是一个继承人——一个传承他的政治理念，领导社会进步党的继承人。哪怕阿德马尔离世，他依然会传承阿德马尔的遗产。但谁能担此重任？阿德马尔沉思。答案清晰明了——那位他曾力挺成为圣保罗州长的人，他亲自指定的接班人，那个在州长选举中取得压倒性胜利的人。阿德马尔犹豫了一下，真的是他吗？那个富家子弟、慈善家、前总统之子。这个人能否真正延续阿德马尔的事业？嗯，既然有阿德马尔的指引，他或许真的可以做到。\n\n阿德马尔的嘴角浮现出一抹狡黠的微笑，他走出办公室，迅速向前来探望的人们致谢，然后快步走向他的秘书。"
 brazil.319.a: "“马上给我接小瓦加斯，我们有好多事要谈。”"
 brazil.320.t: "败仗后的醉酒"
 brazil.320.desc: "他失败了。经历过数月的竞选，承受过个人的悲剧，奋斗过无数灯光下的长夜，努力在政治舞台上为改变巴西而奋斗。但他还是失败了。所有的辛劳与汗水，还有热泪，都在一次选举中化为了泡影。此刻，他陷入了醉酒的迷茫之中，茫然地望着窗外的夜空。电视的嘈杂声成了远景，他的视线空洞地透过窗户，思索着刚刚发生的一切。\n\n他和他的团队曾是那样满怀信心，但败选却如晴天霹雳般突然降临，令他们猝不及防。他再次深深地吞咽下喉咙里的苦涩。他的父亲，他的承诺，他曾信誓旦旦地宣称自己将成为总统。但现在，他只是一个沉溺于失败中的失意人。他走到窗边，轻轻推开窗户，任由夜风轻拂过他疲惫的身躯。远方，烟花的炸响此起彼伏，像是在嘲笑他的失败。他低头凝视着手中几乎空空的酒瓶，瓶中的倒影扭曲着他憔悴的面容。面庞红肿，头发凌乱，眼镜不知所踪。镜中，他看到了一个失败者的影子。\n\n美国人还会在巴西为所欲为，腐败的阴影不会消散，经济依旧混乱不堪。他的梦想，似乎被现实无情地打碎了。夸德罗斯停顿了一刻，随即愤怒地将酒瓶砸出窗外。酒瓶划破长空，远处传来破碎的声响，他怒气冲冲地回到房间。\n不，他尚未失败。仍有未竟的事业，仍有没完成的挑战。即便巴西拒绝了他，他还可以去其他国家传播他的理念。也许，如果幸运的话，他的观念甚至能在巴西激起一丝波澜。但他需要立刻开始行动。\n\n夸德罗斯不会沦为一个失败者。他的故事，还远未结束。"
 brazil.320.a: "一场仗输了，但战争还在继续！"
 brazil.321.t: "友好的会面"
 brazil.321.desc: "在总统任期的尾声，前总统、社会民主党的恩里克·特谢拉·洛特元帅与他昔日的副总统、国家工党的雅尼奥·夸德罗斯再次相聚，进行了一次温馨友好的会面。随着岁月的流逝，这样的相聚变得越发频繁。他们坐下，轻松地品着几杯酒——但并不多，因为洛特向来喜欢保持头脑清醒。\n\n他们畅谈着过去的成功与失误，虽偶有分歧，但已不似1962年前那般剑拔弩张。事实上，尽管他们来自不同的背景和政治立场，他们惊奇地发现，在许多事情上他们的想法出奇地一致。洛特承认，在某些方面听从夸德罗斯的建议，确实是明智之举。夸德罗斯也坦诚地承认，考虑到一切，洛特的表现相当出色。\n\n时光在轻声细语中悄然溜走，话题也渐渐转向与他们个人关系不那么直接的事物。对于北部最近出现的激进共产主义游击队的传闻，夸德罗斯和洛特都表示担忧，但洛特劝说夸德罗斯，除非情况真的恶化，否则不必过于忧心。随后，他们闲聊起来，询问彼此家庭的近况，相互间还不时开着玩笑，直到他们突然意识到，天空已被夕阳染成一片绚烂的红霞。于是，在夕阳的余晖中，这位前总统和他的副总统握手告别，但在离别前，他们还商定了未来如何保持联系。"
 brazil.321.a: "两位朋友，洛特和夸德罗斯相互告别"
 brazil.322.t: "元帅的休憩"
 brazil.322.desc: "恩里克·洛特思索着，过去的几年充满了挑战。他要处理的事情实在太多了；不仅要应对纳粹舰队侵犯巴西海域、国内动荡不安的经济，还有南非的战火纷扰，以及那位副总统的胡作非为，叫嚣的反对派政客，腐败与渎职的普遍存在，最关键的是，军方干预的威胁始终如影随形。经过长达半个十年的纷扰与奔波，他终于从这些骚扰中解脱出来，可以稍作喘息了。\n\n他一边品味着饮料，一边阅读着一份关于国家北部边境共产党活动的报告。情报显示，当前局势尚未达到严重程度；因此，在真正的危机出现之前，他选择不去过分担心。\n\n放下报告，洛特深深叹了口气，思绪又回到了过去五年中另一件让他头痛的事情——他与雅尼奥·夸德罗斯的关系。他思索着，一切究竟是在哪里出了错，以至于夸德罗斯会做出那样的举动。短暂的沉思后，他决定抛开这些烦恼。失去他，也算是除掉了一个麻烦。那个人太难以共事了。\n\n抛开这些思绪，这位元帅继续享受他的闲适时光。"
 brazil.322.a: "来之不易的休息。"
 brazil.323.t: "两个洛特"
 brazil.323.desc: "巴西利亚。今天是愉快的一天。恩里克·特谢拉·洛特十分高兴，因为他能用这美好的一日来接待一个既不是他对手、也没搞砸什么东西、更不是找他求些什么东西的人。此人正是他深爱的女儿埃德娜，刚刚在最近的选举中成为高级官员。\n\n“埃德娜，最近怎么样？”\n\n“都挺好的，爸爸。现在我已经习惯这种工作方式啦。杨戈一直在教我，还有坦克雷多，他也经常和我一同工作。莱昂内尔也帮了我许多忙，不过我感觉他略微有些激进。”\n\n“嗯，很好。你偶尔会不同意他们的观点，有时会有些小小的冲突。但无论你做什么，你都要保持自我，坚持自己的原则。”\n\n“我懂了，爸爸。”\n\n“真棒。还有一件事，如果有什么我能帮你的，尽管开口。我会留意的。”\n\n埃德娜笑了，抱住她的父亲。"
 brazil.323.a: "“谢谢你，爸爸。”"
 brazil.324.t: "尾声"
 brazil.324.desc: "恩里克·特谢拉·洛特，即将卸任的巴西总统，正在最后一次作为国家元首发表电视讲话。在镜头外的附近，是下一任总统、副总统以及洛特的妻子和女儿。当他演讲时，他不禁想起了自己在总统任期内所经历的一切事情。\n\n“你们各位在这动荡的岁月选择了我作为你们的带路人，我深感荣幸。”\n\n就职宣誓。同夸德罗斯、坦克雷多与德尼斯共事。\n\n“我们在巴西国内取得了重大进展：减少了经济上的不稳定，并把纳粹威胁赶出了我们的领海。”\n\n寻找办法赢过纳粹。应对腐败丑闻。\n\n“我们的这届政府也完成了其他工作。”\n\n洛特法案和巨嘴鸟行动。总统大选。他任期的最后时光。\n\n“我宣布，我将从政界退休，即刻生效……”\n\n随着这些想法从他的脑海中闪过，他的演讲也进入了尾声，洛特发觉自己动了些感情；虽然只是一点，但是这被所有人都注意到了，让他们深感惊讶。元帅从来都不是什么多愁善感的人啊，他们以前是这么想的。\n\n洛特控制住了他心中的烦乱，结束了讲话。\n\n“我在此向各位表示不胜感激。各位晚安，再见了。”"
 brazil.324.a: "说完，总统就再次成为了元帅。"
 brazil.325.t: "元帅回归"
 brazil.325.desc: "恩里克·特谢拉·洛特元帅，巴西的前总统，在离任后短暂休假了一会，现在再次成为了军队的现役军官。在庆祝他回归的派对上，护宪派有不少人在场，欢迎他们的老领导回来。\n\n“元帅，我们希望您能做我们向您和巴西宣誓的见证人。”\n\n“哦，是吗？那就由你们吧。”\n\n军官们立正站好，而他们的领头人拿出了一张纸。他说出誓词，然后他身后的军官们将其重复了一遍。\n\n“以天主和恩里克·特谢拉·洛特元帅为见证人，我们发誓：我们会捍卫巴西合众国的民主政府，与任何妄图推翻它的企图作斗争，并在国内促进民主和公民社会。”\n\n在宣誓完后，军官们跺着脚欢呼了起来。\n\n洛特笑了，笑得很开心。这会让事情容易很多。"
 brazil.325.a: "“有你们帮助，先生们，我就放心了。”"
 brazil.326.t: "扫帚下场，得胜而归"
 brazil.326.desc: "恩里克·洛特提出了一个雄心勃勃的计划，企图将巴西的军队彻底拦在政坛门外。坦克雷多·内维斯、若昂·古拉特和儒塞利诺·库比契克立刻伸出了援手，毫不犹豫地表示支持。这份承诺虽然足以撼动瓦加斯联盟中那些守旧的骨干，但对于全国民主联盟以及其他固执的保守派们来说，却显得力不从心。在这个紧要关头，保守派的雅尼奥·夸德罗斯成了不可或缺的一枚棋子。他与洛特之间建立的良好关系在此时显得尤为宝贵，尤其是两人都对政变的阴云同样感到忧虑。\n\n洛特努力争取这些人的支持，但往往只能得到一些敷衍的表示，那还是他运气好的时候。一些人甚至不加掩饰地宣扬那些仿佛从科斯塔-席尔瓦口中说出的宣传口号。而另一些人虽表示同情，却又开始重复拉塞尔达的喉舌报纸上反复提及的“担忧”。在那一刻，洛特突然意识到那个“乌鸦”可能正在暗中作梗，也许是因为他期望有朝一日军队能帮他攀上权力的顶峰。\n\n洛特清楚，亲自去游说他们根本无济于事。于是，他决定让副总统出马，静待佳音。\n\n仅仅两小时后，副总统便急匆匆地闯入总统府的办公室，带来了一大批众议员和参议员的支持声明。在这些声援者中，甚至包括了那些曾对洛特的请求充耳不闻的人。\n\n洛特心中波澜起伏。看来，他还真是低估了这位性格古怪的副手。在表达感激之余，他倾听着夸德罗斯满怀自豪的回应，心中浮现一句话，随即脱口而出，令夸德罗斯喜不自禁。"
 brazil.326.a: "“雅尼奥，你他娘的真是个人才！”"
 brazil.327.t: "右翼的麻烦"
 brazil.327.desc: "恩里克·洛特提出了一个雄心勃勃的计划，企图将巴西的军队彻底拦在政坛门外。坦克雷多·内维斯、若昂·古拉特和儒塞利诺·库比契克立刻伸出了援手，毫不犹豫地表示支持。这份承诺虽然足以撼动瓦加斯联盟中那些守旧的骨干，但对于全国民主联盟以及其他固执的保守派们来说，却显得力不从心。\n\n洛特努力争取这些人的支持，但往往只能得到一些敷衍的表示，那还是他运气好的时候。一些人甚至不加掩饰地宣扬那些仿佛从科斯塔-席尔瓦口中说出的宣传口号。而另一些人虽表示同情，却又开始重复拉塞尔达的喉舌报纸上反复提及的“担忧”。在那一刻，洛特突然意识到那个“乌鸦”可能正在暗中作梗，也许是因为他期望有朝一日军队能帮他攀上权力的顶峰。\n\n当他失意地返回高原宫时，脑海中闪过几个念头。也许，如果他让夸德罗斯帮忙，他本可以处理好这件事。但这已经无关紧要了。夸德罗斯必须离开；他留下来的风险远远大于任何潜在的好处。"
 brazil.327.a: "他打消脑海里的杂念，继续前进。"
 brazil.328.t: "安抚车企大亨"
 brazil.328.desc: "儒塞利诺·库比契克走进社会民主党汽车制造业捐助者的会议室时，他发现那些汽车业巨头们正激烈讨论着。\n\n“他们要我们降价，简直荒谬至极！”\n\n“他的军帽是不是长到脑子里去了？不知道我们的利润有多重要，真他娘的操蛋！”\n\n“我们把他推上台，他就这么回报我们？”\n\n库比契克走到房间前方，举手示意大家安静。\n\n“诸位，诸位！请你们冷静思考一下。总统可能说了不该说的话，但你们这说的，好像整个国家变成了总统的一言堂啊。仿佛我和内维斯先生就没法让他改变主意似的。”\n\n库比契克心里冷笑。他们不必知道，洛特已经坚决拒绝了重新考虑的可能性。“即使他真的坚持这样做，让我们现实点，诸位：洛特和社会民主党仍是你们的最佳选择。如果你们投靠拉塞尔达，那家伙会怎样？他会以‘市场自由化’为名削减你们的补贴，然后让一波外国进口车涌入市场，把你们排挤出局。”\n\n制造商们愤怒地大声抗议。库比契克再次举手，作出最后的发言。“你们看，被告知‘降低价格’其实是你们能遇到的最小损失。如果你们继续支持我，等到下次选举投我一票，这种情况可能不会再持续太久。”看着在场的人点头认可，库比契克心中暗自得意。"
 brazil.328.a: "制造商们纷纷起立鼓掌。"
 brazil.329.t: "历史缔造者"
 brazil.329.desc: "儒塞利诺·库比契克转身面对讲堂里的座位，下方就座的历史学家们热切地注视着他，他们的眼神充满了对知识的渴望，犹如孩子们在等待甜蜜的糖果。库比契克应邀来到巴西历史学家大会上发表关于总统职责的演讲，他怀着热情，迫不及待地想与那些将要书写巴西历史的人分享他的见解。\n\n“担任总统，绝非易事！这需要一种特殊的气质，一个愿意为国内每一个灵魂承担责任的人。你必须能够应对任何状况，任何危机。更重要的是，你需要有一个大胆的计划，一个能让国家焕然一新，更加伟大的计划。”\n\n前总统的目光扫过那些凝视着他的面孔，许多人在人群中写下笔记，试图将库比契克的一言一行牢记于心。库比契克心中一阵得意。他要让这一刻成为他们永远不会忘记的历史。“我相信，你们中的大多数都会认同，伟大的总统决不会总是维持现状。不，他们会紧握国家的缰绳，引领它驶向进步的海洋。他们运用自己的权力，为国家留下更美好的未来。总统之位不是胆小者的游戏。你需要有野心，心中燃烧着激情的火焰，为前行的道路照亮方向。一个真正伟大的总统，会勇敢地伸手触摸星辰，甚至更加遥远的地方。”\n\n库比契克此刻完全投入其中；他将向在场的每一个听众传递他想要表达的信息。“当我承担起巴西总统的重任之时，难道只是在无为而治？绝非如此！我建设了巴西利亚，我改革并重塑了落后的医疗、工业和教育体系。我发誓五年跨越五十年，我做到了！我敢说，凭借这些成就，这份雄心，我的总统任期将载入史册，成就有史以来最伟大的总统任期！”\n\n听众此时已被激情澎湃的演讲所点燃，人们互相交头接耳，满怀激动。“经过不懈奋斗，我将作为巴西有史以来最伟大的总统被人铭记。我的下一任期，定将更进一步！”\n\n此言一出，全场沸腾，掌声如雷。"
 brazil.329.a: "库比契克再次抓住了现在。"
 brazil.330.t: "报道锄奸者"
 brazil.330.desc: "拉塞尔达正在伏案审批文件，一抬头，发现是他的秘书埃丝特。他示意秘书进来说话，而埃丝特直接开口：“您早先下令突袭某组织的事，我给您带来了最新消息。一名瓜纳巴拉警察就在外头，想和您好好谈谈此事。”拉塞尔达一下子从椅子上跳了起来，兴奋得就像过圣诞节的小男孩。\n\n“当然啦，埃丝特。请马上领这位顶呱呱的先生进来。”拉塞尔达赶忙从他的橱柜里拿出两个玻璃杯和一瓶进口的美国威士忌，他刚摆好酒杯，丰特斯警官就走进了拉塞尔达办公室，警官伸出手，两只手紧紧握在了一起。“州长，很高兴见到您，我是瓜纳巴拉警察局的丰特斯警佐，我只是想告诉您一则最新消息，关于您之前下令突袭那个非法组织。”\n\n拉塞尔达给这位顶呱呱警佐满上一杯威士忌，又给自己倒上一杯。“对的，对的，恶首已经查获啦？”拉塞尔达一边问，一边把酒杯递给丰特斯。丰特斯礼貌地举起一只手拒绝，然后继续说道：“嗯，州长，我想您一定会很高兴，我们逮捕了12人，并已指控他们犯下非法集会与讨论极端意识形态。我跟公诉律师谈过好一会儿，他断定这帮家伙得在监狱里待上很长一段时间了，当然，他会严惩这帮纳粹渣滓。”\n\n拉塞尔达简直不敢相信自己的耳朵，这就是他梦寐以求的，甚至比他想象的还要好。“还有公众，警佐。他们对这一巨大成功有何反响？”\n\n丰特斯轻轻扯了扯自己的衣领，然后回答：“嗯，州长，老实说，我们都在忙着关注龙虾战争，那才是我们辖区镇子上、大街小巷里的谈资。我们认为这次突袭应该低调，甚至没有准备新闻稿。”\n\n“这可行不通，警佐！我必须向你们辖区建议，发表一份声明，宣传我们战胜了纳粹祸害。搞快点，你现在一定要赶回辖区，去纠正这个错误，明白吗？”丰特斯难为情地站起来，向拉塞尔达敬了个礼，然后匆匆离开了办公室。"
 brazil.330.a: "成功逮住法西斯毒蛇，再来杯威士忌犒劳犒劳。"
 brazil.331.t: "不可容忍的错误"
 brazil.331.desc: "突发新闻，瓜纳巴拉州州长卡洛斯·拉塞尔达在一小时前，决定解除当地保安局长的职务。有小道消息透露，今日多名流浪汉离奇死亡，他们的尸体无故出现在里约的沙滩上，州长得知后怒不可遏。目前警方正在对谋杀案进行调查，但尚未有嫌疑人或相关人员落网。保安局长未能破解这个棘手案件，引发了拉塞尔达的强烈不满，尽管案件背后的真相仍然扑朔迷离。\n\n里约，巴西最大的城市之一，这里未能侦破的谋杀案简直数不胜数，但拉塞尔达州长似乎决心要提高破案率。当被问及他突然解雇保安局长的决定时，拉塞尔达没有直接回应，却提到“瓜纳巴拉的忠诚公仆，将站出来捍卫巴西的正义。”他强调：“瓜纳巴拉属于全体瓜纳巴拉人，无论他们是贫是富”。今天，州长办公室提交了一份文件，宣布成立一个独立调查委员会，协助侦探们解决近期的谋杀案。政治分析家预测，这一委员会将成为常设机构，旨在提升里约糟糕的谋杀案破案率，并对巡逻警官和侦探进行培训，减少城市的暴力犯罪率。\n\n拉塞尔达州长因其改善了里约的排水系统，保障了所有市民的清洁用水而广受赞誉。尽管如此，他在公共住房政策和为某些工程“腾出空间”而驱逐数千居民的决策，还是引发了广泛的争议。然而，鲜有人对拉塞尔达近期在城市暴力犯罪方面的努力提出批评，不过，多数人还是对拉塞尔达州长持保留态度。时间将证明，拉塞尔达州长尝试弥合里约贫富差距的努力能否取得成效。\n\n如果您掌握有关这些流浪汉死亡案件的任何线索或信息，请联系瓜纳巴拉警方。只要提供一条有价值的线索，就可以领到8000克鲁赛罗的奖励。"
 brazil.331.a: "弱肉强食者是最大的懦夫。"
 brazil.332.t: "乌鸦与替补"
 brazil.332.desc: "卡洛斯·拉塞尔达会见了他的美国同行约翰·麦科马克总统，他很明显能感觉到这个可怜人在治理国家方面的挣扎，对此他深表同情。\n\n他非常清楚发生了什么。尼克松因羞辱而离职，然后是正直的肯尼迪被一名可能受纳粹雇佣的圭亚那恐怖分子暗杀。而麦科马克才担任众议院议长数月，便被迫坐上了总统的位置。\n\n作为巴西总统，拉塞尔达能做的事情有限。他知道这一点，并决心在他们讨论正事时尽力而为。“麦科马克先生，如果巴西共和国能以任何方式帮助您或美利坚合众国——尤其是在南非——您只需开口，我们非常愿意提供帮助。”\n\n麦科马克疲惫地点头，并真诚地表示感谢。“谢谢你，拉塞尔达先生，这对我帮助很大。上帝知道，我和美国现在需要所有能得到的帮助。”\n\n拉塞尔达此时也笑了。“这不成问题。”\n\n此后，拉塞尔达和麦科马克谈论了其他一些不那么紧张的事情。两位总统发现彼此相处得很好；他们愉快地闲聊到深夜。临别时，麦科马克告诉拉塞尔达，他很高兴这次能进行一次不涉及生死大事的对话。\n\n此后多年，两人依旧保持着联系。"
 brazil.332.a: "变好的开始？"
 brazil.333.t: "乌鸦与迪克西人"
 brazil.333.desc: "面对时任美国总统乔治·科利·华莱士，卡洛斯·拉塞尔达却不甚感冒。这其中不无缘由，拉塞尔达厌恶种族主义，而华莱士却像每天吃两顿中饭三顿晚饭的废物傻蛋热图利奥·瓦加斯一样迷恋种族主义。至少瓦加斯不是种族浑话入了脑的癫子，而拉塞尔达面前的这个家伙恐怕就……\n\n拉塞尔达的反对情绪屡屡表露出来，让讨论的气氛变得愈发紧张。两人唯一一次达成一致是在谈到贸易方面——促进两国贸易肯定是笔好买卖，但前提是不侵犯到双方的利益——哦还有加入自由国家组织，因为即使是像华莱士这样的保守派也知道OFN的价值并承诺支持它。但这些成功的讨论有时会被两位总统在其他事务上的分歧所掩盖。\n\n讨论结束，拉塞尔达提了些建议。“在我继续之前，华莱士先生，我想要给您一些私人建议。我所说的一切，呃，不是代表我的人民说的。”\n\n华莱士面色一滞，他能猜到拉塞尔达要说什么。“说吧，拉塞尔达先生。”\n\n“先生，这几年，您的国家在对待非白人的问题上取得了重大进展，这对美国只有好处，没有坏处。我建议您不要大刀阔斧，急于推翻上届政府在这方面的立法。”\n\n正如华莱士所料，而且也如他所料的这话让他很生气。不过也要夸夸华莱士，因为他一直憋到拉塞尔达离开后，才对这只乌鸦的“傲慢”大发雷霆。但还是漏算了一步：有人能告诉拉塞尔达他最后都说了些什么。\n\n当拉塞尔达读到报告时，他笑了。这是他唯一能做的事情，以分散自己对“白宫里那个癫子”可能对美国做出的事情的担忧。"
 brazil.333.a: "不是太好的开始。"
 brazil.334.t: "乌鸦与林登"
 brazil.334.desc: "面对时任美国总统林登·贝恩斯·约翰逊，这两人或多或少相处得还不错，虽然拉塞尔达感觉约翰逊的伟大社会理论时不时就让他联想起那令人反胃的瓦加斯主义（但他不会说出来以免表现得过于偏执）。他们的谈话大多关于外交政策：约翰逊尝试把边界推得更远一些，而拉塞尔达则力图避免它跑得太远。\n\n“拉塞尔达先生，您想要加深巴西与自由国家组织的合作，我深表感激。南非战场上，巴西的小伙子们与我们并肩作战，令我深感钦佩。但是，仅仅在一场战争中投身同一阵营，还远不足以实现自由事业。巴西能否给予美利坚合众国坚定承诺，在域外冲突爆发之时投身帮助我们？”\n\n拉塞尔达含糊其辞地应声，“好吧，总统先生，对此我说，‘会’，又‘不会’。如果要对付非洲的纳粹殖民者，我定会全力支持。如果您认为有必要处理南美的法西斯和赤匪，我可能会帮帮场子。但我担心未来的其他冲突可能会……有些棘手。”\n\n约翰逊缓缓点头。“我理解了。”\n\n有那么一瞬间，他想要恐吓拉塞尔达，但最终他还是没这么做。拉塞尔达对自由事业充满热情，这时候泼一盆冷水可不是啥好事。此外，从约翰逊打听到的拉塞尔达和其他百日危机总统候选人的事情来看，他认为即使是那个披皮赤匪古列特或古利或管他妈叫什么的家伙都不会被他一顿咆哮就跪地屈服。所以他决定聊聊别的事情。"
 brazil.334.a: "在问答时，两人均表示对会议相当满意。"
 brazil.335.t: "乌鸦与理性之声"
 brazil.335.desc: "面对时任美国总统华莱士·F·本内特，拉塞尔达跟他一拍即合，没聊几分钟这俩人都快排进一张族谱了。这当然是有道理的，因为他们的目标完全一致，即运用市场提振经济，并在自由国家组织中携手合作。\n\n讨论持续很长时间，话题也在不断转变，两人都在努力寻找意见不合之处。在降低贸易壁垒的问题上，双方意见完全一致，只用了几分钟就达成了正式协议。至于巴西加入OFN，本内特提议尽快推动巴西成为OFN成员国，拉塞尔达热情地表示同意。\n\n在用尽了所有可能的讨论途径、对每件事都达成了某种形式的一致意见之后，两人开始闲聊，这一聊就是好几个钟头。\n\n他们俩都觉得彼此之间建立了良好的工作关系，并且正在推动巴西和美国的亲密接触——这一点远胜往昔。\n\n终于到了两人分别的时候了，本内特伸出手和拉塞尔达握手，问了最后一个问题：“卡洛斯，在您执政期间，两国之间会有更多合作吗？您会继续推动您的国家融入自由国家组织吗？”\n\n拉塞尔达笑容满面地点了点头。“当然，华莱士，百分百会的。”\n\n这是一段持续了几十年的友谊的开始。"
 brazil.335.a: "变好的开始。"
 brazil.336.t: "乌鸦与改革者"
 brazil.336.desc: "卡洛斯·拉塞尔达与罗伯特·F·肯尼迪的会面略有些微妙，他不知道该如何去看待这位在兄长遭遇暗杀后接过家族衣钵的弟弟。诚然，二人在外交政策上相谈甚欢：肯尼迪与拉塞尔达都同样拥有反法西斯和对公民权利的热忱，他们还就巴西即将加入OFN的意图尝试达成了富有成效的协议。\n\n但除此之外呢？拉塞尔达尊重肯尼迪的职业道德和对国家的奉献精神，却发觉自己越来越不喜欢这位美国总统。他不知道为什么，可能是肯尼迪的热情和外表，也可能是他听闻中肯尼迪的计划，但他意识到，在与对方的交流中，不知道是什么原因，让他隐隐回想起了热图利奥·瓦加斯——这感觉糟透了。\n\n反过来讲，肯尼迪对巴西总统也不甚感冒。他听说过一些拉塞尔达以促进巴西福利为名，不惜抛弃穷人、打击政敌的传言。此外，他还觉得拉塞尔达缺乏雄心壮志，似乎并不像他嘴上说的那样执着于生命、自由和追求幸福的原则。\n\n尽管互有保留，但两国元首的会晤仍在友好的氛围中得以进行，达成了诸多卓有成效的协议，无疑将会促成两国之间的进一步合作。但两人都感到，虽然他们说的是同样的话语，但表达的内在含义却截然不同。"
 brazil.336.a: "有所收获的会议，虽然收获不及预期。"
 brazil.337.t: "凌晨突袭"
 brazil.337.desc: "天还没亮，《最后时刻报》报的印刷机已然轰鸣作响，黑色的油墨在白纸上急促地划下一行又一行。他们的头条文章——“洛特和夸德罗斯遭遇政变”，“乌鸦展翅，拉塞尔达对民主的赌注”，“只有若昂·古拉特才能拯救工人阶级”——正在以惊人的速度印制，成百上千份报纸被迅速装车，准备派发至整个城市。这样忙碌的场面前所未有，直到一声沉重的敲门声打破了清晨的宁静。\n\n“警察！开门！”\n\n记者们用家具堵住门，有人高声抗议这次违法的突袭，法律规定清晨八点前禁止这样的行动。但这些都没能阻挡一波又一波冲进印刷室的警察，他们用枪托砸坏机器。一名警察拿起喇叭，宣布了关闭报社的命令：\n\n“这家报纸涉嫌法西斯宣传！按照拉塞尔达州长的命令，立即关闭！”\n\n主编萨穆埃尔·魏纳别无选择，只得顺从。\n\n主编看着员工们离开大楼，回望着突袭留下的一片狼藉。“法西斯宣传……乌鸦永远是那个老套路。”他点燃一支烟，喃喃自语。他回想起年少时在欧洲，目睹自己的村庄被焚毁，母亲多拉告诉他，像我们这样的犹太人只能相信同族。尽管经历了那么多，萨穆埃尔从未真正相信她的话。他想着，总有些人会碰到这样的时刻。他开始翻找着笔记本，寻找着一个名字和电话号码。"
 brazil.337.a: "热图利奥·瓦加斯。"
 brazil.338.t: "安妮学校"
 brazil.338.desc: "“——怀着对里约人民、怀着对里约犹太人社区的敬意和感激，今天，我将代表市政府，为安妮·弗兰克中学举行落成典礼。”\n\n拉塞尔达剪断七彩绶带，然后转过身来面对镜头。台下响起热烈的掌声，拉塞尔达则露出一个睿智的微笑。他甚至还为媒体界人士鞠上一躬。\n\n他继续演讲。但他并非专心致志，他的眼睛正紧盯着附近的一座建筑物。学校对面，那正是德国领事馆。纳粹混蛋把窗帘拉得密密实实，显然有些恼火。很好，就是这样。他就是要这个效果，就是要让这些德国人坐在最前排，看到犹太儿童活得好好的，健健康康地上学，过着正常的生活。\n\n“之前，我熬夜熬到凌晨五点，读完了安妮·弗兰克的日记。几个月前，这本日记被偷偷运出德国，在自由世界各地出版，作为对德国暴行的控诉。它实在令我感动不已。\n\n“那个可怜的女孩在孤独中死去。遭人出卖，饥肠辘辘、疾病缠身。她的一切尊严都化为乌有。”\n\n他昂着头，直视着领事馆外飘扬的纳粹旗。这泼满鲜血的旗帜，竟然胆敢用它可恨的存在来玷污巴西！\n\n“为了替她报仇，至少我们可以给她的人民一些尊严！上帝保佑，巴西将保护你们，奋战到底，至死方休！”\n\n台下掌声如雷。"
 brazil.338.a: "安妮·弗兰克，但愿你来生幸福快乐。"
 brazil.339.t: "不寻常的盟友"
 brazil.339.desc: "自参议院陷入混乱之日起，古拉特已不知过了多少个无眠之夜。他和他的团队必须时刻保持警惕，对警察和可能的便衣军官保持着戒备——传言说他们正四处搜捕古拉特及其工党同志。这种压力对他的妻子玛丽亚来说显然是巨大的考验。尽管古拉特在阿雷格里港仍享有人气，但他对与阿拉冈海军上将的会面感到极度忧虑。两人会不会在见面时遭遇埋伏或者绑架呢？万一那封邀请函是冒充阿拉冈的人发来的呢？古拉特推开了酒吧后方昏暗小屋的门，只见阿拉冈海军上将坐在满是灰尘的桌旁，手握燃烧的香烟。他走近桌子，阿拉冈立刻站起身来，热情地与这位共和国副总统握手。\n\n“若昂！”阿拉冈低声说道，声音中还带着兴奋，“我真没想到你会来。”上将的脸上绽放出灿烂的笑容，古拉特也被阿拉冈的活力所感染。\n\n“时间紧迫，阿拉冈，但如果你有要说的事，那必定重要。直接告诉我坏消息吧。”\n\n“坏消息？我知道整个局势对你来说非常紧张，但我来是要带给你好消息的，若昂。听着，军队中有很多人都在想方设法地抓捕你，但也有一些人对你的事业表示同情。我需要你信任我。”阿拉冈说着，目光坚定地直视古拉特。\n\n“怎么说，海军上将？”“我需要知道你在这场危机中的行程。我的部下在沿海有船只，某些基地也有直升机待命。如果最坏的情况发生，你被捕了，我的人会尽可能把你救出来。但我们需要知道你的确切位置才能实施救援。”古拉特思考了一会。这无疑是个巨大的风险，但不冒风险便无法走向总统之位。片刻后，古拉特回以微笑，向阿拉冈坦承了一切。"
 brazil.339.a: "“当然，上将，我欠你一个大人情。”"
 brazil.340.t: "衣冠禽兽"
 brazil.340.desc: "“关于科斯塔·阿拉冈的最新消息呢？”卡斯特洛·布兰科紧盯着被拉进这次会议的海军军官们。尽管在陆地上，政变几乎完全按计划进行，似乎没有人预料到海军中会有人反对政变。\n\n“不，将军。他对我们的呼叫毫无回应，舰队依然在瓜纳巴拉海岸外游弋。”\n\n卡斯特洛·布兰科一拳砸在桌上，杯子震动，纸张飞舞：“你们是巴西海军！快去给我把那个叛逃的海盗捉拿回来，你们难道连自己人都保护不了？！他支持的可是共产主义者古拉特，你们怎能视而不见？”\n\n“我们……我们正在尽全力把他带回来。我们保证情况很快会得到解决！”\n\n“最好如此！那些叛徒还在掠夺我们自己的国家；我得到的报告说他们已经开始围攻州长府邸。拉塞尔达若死于他们手，你们都别想好过。他自由一天，就多一天动乱的风险。明白了吗？”卡斯特洛·布兰科粗暴地挥手，军官们急忙退场。他叹息一声，凝望着窗外。\n\n太阳缓缓沉落，晚霞染红了城市的天际。卡斯特洛·布兰科知道，他不能指望那些无能的水手了。陆军正竭尽全力抵抗入侵者，但敌人仍源源不断地从大海涌来。没有海军的协助，他知道自己正处于下风。暴力逐渐蔓延到了支持政变的政府机构和平民之中，卡斯特洛·布兰科意识到，他不能再容忍这种局面了。\n\n他拿起电话拨通了里约热内卢的基地。电话立即接通。“是，将军？”“我需要你们向里约增派一支机械化部队。我相信你们已经听说了关于我们‘好朋友’阿拉冈上将的消息吧？海军应付不了了，我们需要自己动手才能彻底解决这个问题。”"
 brazil.340.a: "“当然，将军。我们都会办妥的。”"
 brazil.341.t: "呼吁冷静"
 brazil.341.desc: "卡洛斯·拉塞尔达在州长府邸里焦急地踱步，局势的恶化让他无法平静。瓜纳巴拉的警察和军队未能缓解他对可能的入侵的担忧，他深知，一旦有海军企图闯入官邸，他绝不会坐以待毙。他拿起之前从安保人员那里“借来”的左轮手枪，检查了一番，确保它随时准备开火。他必须显得坚强，拉塞尔达清楚自己接下来该做什么。他把冲锋枪藏在夹克下，离开办公室，向楼上的广播室走去。\n\n正当他准备上楼时，听到有人开口：“拉塞尔达州长，我们现在是不是应该找个地方避一避？”他的秘书埃丝特满脸担忧地从桌后抬起头来。\n\n“别担心，埃丝特，我正要去号召巴西人民，反抗那个威胁这座美丽城市的海盗上将。”埃丝特站起身，走到拉塞尔达和楼梯之间，“警察和军队不是已经在处理了吗？这样做或许不太妥当。”拉塞尔达对埃丝特的突然行动感到惊讶，有些慌乱，“艾丝特，现在已经没有时间了，请你让开。”\n\n“州长，我不想无礼，但——”\n\n“埃丝特，这不是可以商量的事。请让开，否则我就把你解雇了。”拉塞尔达对自己的粗鲁感到内疚，但事态已经到了这一步，他必须迅速采取行动。当他进入广播室，调整好频率，他深吸一口气，开始发表讲话。\n\n“自由万岁，巴西万岁，巴西的荣耀万岁，巴西的尊严万岁！阿拉冈海军上将，你这个可怕的杀手，卑鄙的乱伦者。阿拉冈海军上将，别靠近，否则我会用我的左轮手枪亲手击毙你！你这个无耻的混蛋，强盗，叛徒，你的末日到了！趁现在还有时间，赶紧逃走。你这个强盗，杀人犯，还指挥无辜的士兵去杀戮其他士兵来掩盖自己的耻辱！你这个卑鄙的家伙！”"
 brazil.341.a: "让那个叛徒瞧瞧。"
 brazil.342.t: "人民提督逃亡"
 brazil.342.desc: "通讯员走出房间后，卡斯特洛·布兰科长出一口气，靠回了他的椅子上。部署到里约镇压那该死的坎迪多·达·科斯塔·阿拉冈的机械化部队已经到位并迫使他抛下手下的叛变海军陆战队逃亡。海军陆战队已经向政府军投降，阿拉冈本人则已经自瓜纳巴拉湾逃往公海。我们已经恢复了对里约的控制，而阿拉冈可悲的政变也已经被彻底粉碎。但卡斯特洛·布兰科还有一个麻烦的家伙需要料理，那就是“瓜纳巴拉的乌鸦”，卡洛斯·拉塞尔达。\n\n布兰科大致知道卡洛斯·拉塞尔达谈论自己要如何帮助阿拉冈，并在镇压部队抵达前控制瓜纳巴拉的计划。虽然卡斯特洛·布兰科觉得拉塞尔达的长篇大论里不乏可圈可点之处，但阿拉冈之辈在名义上就是叛徒，拉塞尔达不可能不明白，他的行为是在把巴西往内战的深渊里推。\n\n为了避免内战，阿拉冈建议若昂·古拉特逃往乌拉圭与他会合。这就让拉塞尔达到处宣称那名叛变海军上将是个“煽动士兵杀害同僚”的卑鄙之徒的说法不攻自破，就像他鸟嘴里说出来的其他许多话一样。现在拉塞尔达更是满嘴胡言——他现在声称对抗“工党共匪”的战斗取得了重大胜利，但实际上，他与阿拉冈和海军陆战队的联系依然构成现实的威胁。\n\n卡斯特洛·布兰科长叹一口气，他准备让席尔瓦过来一趟，希望他和他的强硬派们可以研究一下怎么让这只聒噪的鸟消停几个月。"
 brazil.342.a: "又一场小胜。"
 brazil.343.t: "自由幻局"
 brazil.343.desc: "内伊·布拉加的办公室从未如此凌乱；文件散乱一地，书架被翻得乱七八糟，更有人恶作剧般偷走了他所有的笔。\n\n然而，他对这些混乱并不太在意，只是沉重地靠在椅子上，陷入沉思。军队真的只是暂时来掌权吗？过渡期后真的会恢复民主吗？布拉加对这整个设想充满了疑问。毕竟，他在各个政党内的许多朋友已被监禁，而且他还听说政变甚至针对那些支持前政府的平民。\n\n但布拉加也清楚，巴西各地都有很多激进分子在试图破坏他的祖国。也许，军队暂时掌权，反而是件好事。毕竟，他们承诺会避开新国家体制时期的老路，在一年内恢复民主。\n\n尽管现在局势动荡，但军队会纠正混乱，然后把权力交还给民主政府。这或许是受限的民主，但总比巴西以往的情况要好。\n\n布拉加并不是唯一这么想的人。巴西各地的州长们，不管是暗中支持政变的，还是出于恐惧而支持政变的，都逐渐意识到，军队采取的行动是有道理的。的确，整个过程太过混乱，也许对巴西工党的打击太过严厉，但并没有迹象表明军队会无视普通民众的意见。也许，如果州长们公开支持军队并鼓励原来的选民支持新政权，甚至还能赢得一些公众的好感。\n\n不是每个人都会同意这种做法，但大多数州长视之为常规政治操作。小镇上来了新的治安官，只要能保住自己的权力，向他们伸出友好之手并无不可。"
 brazil.343.a: "羊儿一头头变得驯服。"
 brazil.344.t: "圆桌上的争吵"
 brazil.344.desc: "全民盟的成员们在会议室中汇聚，讨论未来的政策和选举策略。像夸德罗斯总统和拉塞尔达州长这样的重量级人物都在场，会议室内的气氛紧张异常。自从洛特担任总统以来，夸德罗斯和拉塞尔达似乎更多地在党内角力，而非专注于推动立法或争取下一届选举中的席位。\n\n特别是拉塞尔达，在过去两小时中一直保持沉默，听着那些在他看来荒谬至极的提案。允许基督教工会？在他的心中，自从全民盟追随夸德罗斯这位新先知以来，已经完全失去了理智，唯有拉塞尔达才能遏制这种颓废的趋势。\n\n“感谢参议员。现在请瓜纳巴拉州长卡洛斯·拉塞尔达发言。”\n\n“谢谢主持人。今晚关于巴西未来的讨论固然精彩，但我想提出不同的看法。与其幻想未来可能发生的事，全民盟应专注于必须发生的事。我们都深知目前的预算膨胀情况有多么严重。控制我们的开支，这是我们现在必须优先考虑的。我请求在座的各位认真思考，巴西该如何实现减少——”\n\n“卡洛斯！你又开始胡说八道了！”夸德罗斯从座位上站起，指着拉塞尔达，“我受够了你的胡扯，别再给我提什么预算了。巴西人民比以往任何时候都更需要我们，而你却在这里浪费时间。我们需要创新思维，探索新的政策，让巴西变得更好！”\n\n拉塞尔达愤怒地回击：“那你为何不提出一个切实可行的主意呢，总统先生？”\n\n“禁止所有纸牌类游戏，恢复巴西的道德与尊严，怎么样？”夸德罗斯反击道。\n\n“这未免也太不切实际了。这就是你的最佳想法吗，雅尼奥？你简直是在侮辱全民盟！”拉塞尔达大声叫道，然后推门冲出了会议室。"
 brazil.344.a: "房间里一半的人挥手告别，另一半则尴尬地默默坐着。"
 brazil.345.t: "否决权"
 brazil.345.desc: "雅尼奥·夸德罗斯在卡洛斯·拉塞尔达和奥罗·德·莫拉·安德拉德的精心策划下，因一封巧妙伪造的辞职信而失势。然而，巴西政坛的波澜远未平息；安德拉德必须阻止共产主义者古拉特登上总统之位。\n\n命运似乎站在安德拉德这边。与他会面的是一群同情他处境的人——巴西武装力量的联合参谋长，包括陆军元帅奥迪利奥·德尼斯、海军中将西尔维奥·埃克和空军准将加布里埃尔·格伦·莫斯。\n\n德尼斯率先发言：“虽然洛特可能常与古拉特合作，但我们这些未受红色思想影响的军人并不赞同洛特的想法，我们显然不会同意与工党的蠢货们合作。”\n\n埃克在听到这话时反复用力敲打桌子表示赞同。紧接着，格伦·莫斯接过话茬。\n\n“看看社会主义的布哈林做了些啥——他在捅了波兰人和波罗的海人一刀后，与纳粹开战，结果被迫撤退到阿尔汉格尔斯克，还让纳粹在他的地盘上建立了殖民地！”\n\n在场的军人们高呼了起来，西尔维奥·埃克最后总结道：“我们军人不会坐视巴西被极左势力摧毁，也不会让我们的祖国在与阿根廷的竞争中落后！我要明确表示，先生：我们反对古拉特的候选资格！”\n\n在一片喝彩与欢呼声中，安德拉德呼吁安静：“先生们，我现在明白了，我们都是志同道合者。我决心已定：我将执行这个否决。在找到更合适的候选人之前，共和国总统的职位将保持空缺。”"
 brazil.345.a: "士兵们的欢呼声整耳欲聋，奥罗不得不捂住耳朵。"
 brazil.346.t: "军方分裂"
 brazil.346.desc: "参议院议长奥罗·德·莫拉·安德拉德宣布否决原定的总统继任顺序，并得到军方的正式支持后，军方高层及其盟友原以为阻止若昂·古拉特掌权易如反掌。然而，现实远非如此简单，随着越来越多糟糕的消息传来，政变派领袖们只能无奈地捂住脸颊。\n\n从南方，特别是社会主义阵地南里奥格兰德州及周边地区传来的报告显示，洛佩斯将军和阿拉冈海军上将，以及南里奥格兰德州州长莱昂内尔·布里佐拉，这些护宪派并没有屈服。相反，他们联合起来，成功动员了大部分南方军队支持合法候选人若昂·古拉特。更糟的是，军方对此束手无策：尽管反古拉特的势力更加强大，但相对于支持古拉特的人来说，他们的力量过于分散。\n\n再加上温贝托·德·阿连卡尔·卡斯特洛·布兰科元帅等重量级人物尚未表态，这就意味着军方无法如愿策划政变，以免巴西爆发内战。于是，军方决定争取时间——稍微超过一百天，以保证有足够的军事力量来压制南方的威胁。\n\n了解这一点的安德拉德决定让联邦参议院尽可能延长下一任总统的选举，以便军方有足够的时间处理准备站在布里佐拉一边的军队势力。"
 brazil.346.a: "为了支持这一计划，西尔维奥·弗罗塔当天走进了参议院。"
 brazil.347.t: "合法性运动"
 brazil.347.desc: "阿雷格里港的报纸上铺天盖地都是这一消息，而南里奥格兰德州州长莱昂内尔·布里佐拉正是这场风暴的策划者。布里佐拉携手工党的其他成员，开始反击无赖奥罗·安德拉德和巴西军队中那些野心勃勃的小人。\n\n这次反击以一场运动的形式展开——“合法性运动”。这场运动要求联邦参议院尊重宪法，只有若昂·古拉特才能临时担任巴西的总统。策略相对简单——组织罢工、媒体攻势和大规模抗议活动，目标是瘫痪瓜纳巴拉州，叛徒“乌鸦”的大本营。\n\n当然，也存在拉塞尔达及其同僚可能下令暴力镇压抗议的风险。毕竟，如果他愿意以纳粹和法西斯都会为之欢呼的方式杀害无家可归的穷人，那么他会如何对待不同政见者，想必相比也是不言自明。不过，这一切的风险都是值得的。但即便如此，布里佐拉还是小心地提醒他的支持者们这些潜在危险。\n\n他们做了正确的事。毕竟，这是一场关于捍卫瓦加斯总统遗产和巴西民主的斗争。他们要么坚持抵抗，要么就只能向一群与纳粹无异的将军们屈服。\n\n怀着这样的信念，布里佐拉拿起电话开始策划他的行动。"
 brazil.347.a: "“给我接戈亚斯州长毛罗·博尔热斯。”"
 brazil.348.t: "强硬派羽翼渐丰"
 brazil.348.desc: "自西尔维奥·弗罗塔在国民议会发出最后通牒以来，时间已悄然流逝九十日。联邦参议院仍未决出洛特和夸德罗斯的继任者。正如人们所预料，军方的耐心正在一点点耗尽。佩里·康斯坦特·贝维拉夸将军，对军中的风声感到深深的不安，决定向古拉特和库比契克发送电报，传达这一紧急消息。\n\n佩里·康斯坦特·贝维拉夸，累西腓发\n\n儒塞利诺·库比契克，巴西利亚收与若昂·古拉特，阿雷格里港收\n\n关于近日军方动荡之事，索邦派的卡斯特洛·布兰科等人已开始倾向支持科斯塔-席尔瓦领导的强硬派，意图颠覆政府，卡斯特洛·布兰科似乎已与强硬派达成协议句号其协议内容如下\n\n一：卡斯特洛·布兰科宣誓就任总统\n\n二：推迟选举，与全民盟和拉塞尔达合作，查禁巴西工党\n\n毫无疑问，你们俩肯定深感忧虑，这强调了必须采取果断行动的重要性，若不迅速解决此危机，军方将聚集足够的力量发动政变并掌控政府句号届时，我和我的护宪派们是否还能抵御他们的攻势，我深表怀疑句号若能在接下来的十天内找到合适的领导人，我们或许还有机会阻止政变，因此，我恳请两位采取一切必要行动句号\n\n贝维拉夸"
 brazil.348.a: "事态愈发严重。"
 brazil.349.t: "公牛的提议"
 brazil.349.desc: "阿德马尔·德·巴罗斯走进会议室，他看到莱昂内尔·布里佐拉和埃德娜·洛特正全神贯注地制定着确保古拉特在“百日危机”中胜出的计划。当然，他一靠近会议桌时，两人迅速掩藏起他们的工作成果。\n\n“放松，你们俩，”德·巴罗斯说，“我是来帮忙的。”布里佐拉挑起眉毛，双臂交叉，回答说：“真是难以置信，德·巴罗斯。我们能快点结束吗？埃德娜和我都很忙，我相信你也是。”\n\n“当然，莱昂内尔。我会直接切入正题。我支持你的合法权利，并且我的拥趸们也在关键时刻支持古拉特。”\n\n洛特和布里佐拉的表情由震惊转为怀疑。“你想从我们这里得到什么？和你打交道，总有代价。”埃德娜反问。布里佐拉则面无表情，沉思着阿德马尔的话，“放轻松，埃德娜，这家伙显然是来帮忙的。阿德马尔，古拉特一旦成为总统，我们可以稍后再谈细节，对吗？”\n\n阿德马尔露出诡谲的微笑，转身离开会议室。“当然，没错。我自己也在危机中挣扎，现在最要紧的是击败军方和那个诡计多端的拉塞尔达。”他在开门时回头，平静地说道：\n\n“至于所谓的代价。如果你们想要我的支持，我希望成为古拉特的内政部长。在这个问题上，我不会让步。如果一周内没有你们的消息，我就会认为这个职位默认属于我，并且我会公开支持古拉特。无论如何，你们知道我在哪里。我们后会有期。”\n\n阿德马尔离开后，会议室里陷入了长时间的沉默，直到洛特打破了寂静。“我们该怎么应对这种情况？为了让古拉特成为总统，就让一条毒蛇潜入到我们的内部，这真的值得吗？”布里佐拉感到一股不祥的预感。这显然是个陷阱，毫无疑问。现在不是他们或埃德娜来决定古拉特内阁的时候。“局势很复杂，埃德娜。不管我们愿不愿意，我们可能需要他的支持。如果古拉特愿意让我们来组建他的内阁，那我们现在就得做出决定。”"
 brazil.349.a: "“我们不能轻信阿德马尔。”"
 brazil.349.b: "“我们别无选择，只能让阿德马尔加入我们的内阁了。”"
 brazil.350.t: "公牛助阵"
 brazil.350.desc: "圣保罗州州长阿德马尔·佩雷拉·德·巴罗斯充满了活力与决心的声音，通过巴西利亚的广播电台，传遍了巴西的每一个角落。\n\n“圣保罗的同胞们，不，全巴西的同胞们！\n\n在上帝和阿帕雷西达圣母的祝福下，尊敬的若昂·古拉特是共和国总统的合法继任者，负责接替在政变后倒台的洛特元帅和愚蠢的夸德罗斯。\n\n但是，我们国家中有一些误入歧途的人，自以为比巴西人民更了解国家的未来，竟然企图安插一个非法、通过欺诈选举上台的篡位者。我呼吁每一位怀有善意的巴西人支持合法性运动，阻止这一切的发生——否则，我们的民主将陷入危机，自由将永远离我们而去！”\n\n全国各地的支持开始倒向古拉特和巴西工党，从国民议会到普通民众，各种反应随之出现。在军营和瓜纳巴拉的办公室，有人愤怒地将玻璃杯和各种物件摔得粉碎，特别是卡洛斯·拉塞尔达，他对阿德马尔的背叛感到出离地愤怒。第二天，他写了一篇社论谴责阿德马尔，可根本就没有哪个市民买他的账。儒塞利诺·库比契克也在暗自诅咒，自己的机会已在这突如其来的变故中流逝了。\n\n与此同时，在埃德娜·洛特的家中，莱昂内尔·布里佐拉、埃德娜·洛特和若昂·古拉特正放松地享用着晚餐，与他们的新朋友劳多·纳特尔还有小瓦加斯一同干杯庆祝。纳特尔后来回忆道，瓦加斯派的人终于松了一口气，危机已经得以避免。"
 brazil.350.a: "阿德马尔笑了，他的计划已经实现了其中一项。"
 brazil.351.t: "告诉我"
 brazil.351.desc: "洛特皱起眉，斑白的眉毛像结了霜的壕沟，对电话另一头的元帅低语道：“你他妈怎么把我们的盟友否决了，德尼斯？”\n\n电话那头的答话嘶哑低沉：“共产党还能当盟友？那你还不如去刨布哈林的坟，他把俄国埋了，估计还没过瘾呢！现在还有个巴西就很不错了，要是被古拉特祸害，估计能碎成二十个。”\n\n“那这不是白费精力了吗！我们整个职业生涯都在为宪政奋斗，你却把这一切都毁了。你知道怎么恢复我们做出的成绩吗，哪怕一点？”\n\n“我听着呢，请说吧。”\n\n洛特紧握灰铁皮包裹的听筒，掌心掩住了他咬牙切齿的窘态：“撤回否决，支持古拉特。他是根据宪法当选的总统，是你奋斗的成果。”\n\n一阵静默后，又是同一句：“我听着呢。”\n\n“跟你说，要是真怕共产党，那就更不该激怒整个左翼。否决古拉特还不够，军方残留的整合主义者都看得到，这是他们让国家重蹈意大利覆辙的大好时机，最后责任都在你。”\n\n“我听着呢。”\n\n洛特砰一声将听筒甩在电话上，震得屋内一时响起了嗡嗡的回音。他一言不发，聆听着死一般的寂静。"
 brazil.351.a: "我的毕生努力为何就这样毁了……"
 brazil.352.t: "被打断的演讲"
 brazil.352.desc: "“你在文章中把他称作社会主义者。你确定这是军官们愿意听到的吗？”\n\n“关键在于古拉特能否得到拥护。他本该如此，遮遮掩掩并不能使他们误以为他不是社会主义者。请把我接入直播好吗？”\n\n主持人点点头，向下拨了一个开关。洛特贴近麦克风，眼神紧盯着主持人的手势。即便是在他的播音室外，电台依然一片死寂；只有洛特和主持人留守在这儿。洛特内心焦躁，不断回想着外面那辆熄火的轿车。计时器倒数至一，他深吸了一口气，清了清嗓子。\n\n“巴西的人民们，我是恩里克·特谢拉·洛特，前巴西共和国总统及武装部队总司令。今天，我与大家一同站在这里，我们都是那个身披旧时暴政外衣的新专制主义的受害者。我在此声明，拉塞尔达的军装政客们无权代表巴西人民来统治我们的共和国。不论我和他在意识形态上的分歧如何，若昂·古拉特都是经民选产生的合法总统。我们的国家正处在危险之中。如果我们还想在没有枪口对准的情况下自由地发言或投票，就必须共同抵抗这种新的专制。否则，我们的国家——”\n\n就在这时，灯光熄灭，收音机也随之沉寂。播音室和相邻的工作室只剩下红色LED灯的微光，洛特一跃而起，飞奔进那辆破旧的米色轿车，驱车飞驰向家的方向。"
 brazil.352.a: "“拉塞尔达，总有一些话，是你无法隔绝的。”"
 brazil.353.t: "围困"
 brazil.353.desc: "没有运气，也没有回音。电话听筒中那慢吞吞的响声，屋外的窃窃私语，德尼斯似乎并不打算回应。洛特咒骂一声，重拨电话。埃德娜可以帮忙。她或许无法将街头的装甲运兵车撤走，但她能安排一些食物来度过这场围困。洛特知道自己要被逮捕，但他们不会因此加害于他。毕竟，屋外那些士兵中没有一个人有元帅军衔，而找到一位新的总司令来取代洛特，还需要时间。洛特在军中还有一席之地。\n\n电话线在背景的嗡嗡声中突然接通。“喂，埃德娜。”\n\n“爸爸，你还好吗？”\n\n“我没受伤，但我的话已经招来了麻烦，拉塞尔达的人就在我家外面。你能送些食物和水来吗？”\n\n“我会给你送来的。”\n\n“你要怎么做才能避开险境？”\n\n“嗯，如果他们在窃听我们的话，你不会希望他们知道。”\n\n片刻沉默后，洛特陷入了沉思。去他妈的拉塞尔达，操他娘的变节者，还有从窗户外飘来的蓝色烟雾。但愿上帝保佑他的女儿，在这动荡的局势中，她是他的希望之光。"
 brazil.353.a: "“我真为你骄傲，埃德娜。”"
 brazil.354.t: "博尔热斯宣布支持古拉特"
 brazil.354.desc: "合法性运动的浪潮席卷巴西各地，无数的声援如潮水般汇聚。其中最具分量的声援，来自戈亚斯州长毛罗·博尔热斯。在这座规划之都戈亚尼亚，博尔热斯在社民党-工党联盟的要员和当地民众的热烈掌声中，发表了他的公开演讲。\n\n“戈亚斯和巴西的同胞们，你们都了解我。我向上帝发誓，我不是也绝不会是一个共产主义者。我不会愚昧到对俄罗斯沦陷于法西斯暴徒的惨痛教训视而不见。\n\n但我要明确一点，如果总统的接任顺序没有遵循宪法，如果我尊敬的同事若昂·古拉特先生不能顺利接任总统，那么戈亚斯州及其人民将义无反顾地奋起抗争，为捍卫我们的国家秩序而战。”\n\n这番演讲在全国各地传播开来；然而，在戈亚尼亚之外的地区，它遭到了审查，卡洛斯·拉塞尔达的新闻攻势很快就将其取代。\n\n尽管如此，在奥迪利奥·德尼斯的统领下，军方的内心仍旧忧虑不已。戈亚斯州的地位不言而喻，州长的反对之声对他们的秘密计划而言，无异于潜藏的致命一击。"
 brazil.354.a: "他们的担心不无道理。"
 brazil.355.t: "戈亚斯对峙"
 brazil.355.desc: "发自：美国驻巴西利亚大使馆\n\n送致：中央情报局局长、国务卿\n\n主题：戈亚斯州的紧张局势\n\n限中央情报局局长、国务卿参阅\n\n1.奥迪利奥·德尼斯元帅所忧已得证实。据可靠来源，由戈亚斯州州长毛罗·博尔热斯授权的军事行动业已开始。\n\n2.该地区所驻军队已向戈亚斯州与博尔热斯领导的联席会议宣誓效忠，其总部设于戈亚尼亚。据可靠消息，该部队已开赴巴西利亚联邦州之边界，与巴西利亚卫戍部队呈僵持态势。双方皆装备有轻武器与战车。目前仍未收到交火报告，但据信源判断，局势十分紧张。\n\n3.经戈亚尼亚方向信源确认，出于对联邦政府干预的恐惧，博尔热斯州长正在其首府戈亚尼亚及周边定居点修筑防御工事，包括但不限于军规路障与机枪阵地。\n\n4.情报更新将随时送达，请关注。\n\n戈登"
 brazil.355.a: "博尔热斯表明了立场。"
 brazil.356.t: "古拉特横扫民调"
 brazil.356.desc: "周二，巴西公众舆论与统计研究所发布了一项民意调查，记录了对拉塞尔达政变的民众反应。调查显示，高达百分之九十一的巴西人支持古拉特的就职，仅有百分之九的民众表示反对。即使在被允许选择其他候选人就职的情况下，仍有超过七成的民众支持古拉特。\n\n到了周三，几个面无表情、身着绿色迷彩服的男子关闭了瓜纳巴拉的一家印刷厂，并让工人们回家。工厂的主管，一个面色潮红、显得疲惫的六十多岁的社会主义者，在黄昏的余晖中偷偷将印刷滚筒带回了家，并将其隐藏在空调通风口内，希望它不会就此遗落在角落里。\n\n到了周四，那些身着绿色迷彩服、面无表情的男子在巴西街头搜索着研究所的民调报告。当天晚上，被焚烧的数字像守护者的呼吸一样，弥漫在贫民窟上空。\n\n而到了周五，几位年轻的学生在报摊前询问那份民调报告，他们得到的回答却是一致的否定——报摊从未售卖过那份文件。"
 brazil.356.a: "群众的眼睛是雪亮的。"
 brazil.357.t: "戈亚斯已平"
 brazil.357.desc: "发自：美国驻巴西利亚大使馆\n送致：中央情报局局长、国务卿\n主题：戈亚斯局势平定\n限中央情报局局长、国务卿参阅\n\n1.军方开展旨在恢复巴西稳定的军事行动后，忠诚派已成功解除了戈亚斯州州长毛罗·博尔热斯和受瓦加斯分子控制的军队的武装。\n\n2.由于该州已被完全包围，州长不久即被捕。科斯塔-席尔瓦领导的强硬派希望将他处以极刑，但卡斯特洛·布兰科总统亲自干预以确保他只会被解职并剥夺政治权利。我赞成这一决定。\n\n3.军方已完全控制整个国家，并在全国执行戒严。\n\n4.未来局势走向尚未可知，但我仍将尽忠职守。\n\n戈登"
 brazil.357.a: "转瞬即逝……"
 brazil.358.t: "德尼斯与古拉特"
 brazil.358.desc: "在巴西利亚的一家小咖啡馆里，一位从库里蒂巴乡间退役回来的军官和一位与巴西总统有着密切联系的经济学家坐下来，共享午餐时光。他们的话题很快就转移到了最近的政治流言上。\n\n“内伊，你听说了古拉特和德尼斯的事情吗？”费尔南多问道。\n\n内伊摇了摇头。“发生了什么，费尔南多？”\n\n“哦，那场会议紧张极了。你当然知道古拉特不可能直接撤掉参谋长，尽管他绝对有能力把他们边缘化。”\n\n“他有威胁过要采取行动吗？”\n\n“没有直接说出来。他们谈论的是为巴西的未来共同努力。但是，那次会面气氛紧绷，显然他们彼此之间并不怎么看对眼。”\n\n内伊·阿明萨斯·德·巴罗斯·布拉加，一位退役的陆军少校，现任的巴拉那州温和保守派州长，沉思了一会儿。“我明白了。那一切就顺其自然吧——一切都掌握在上帝和古拉特先生手中。我理解他对低收入阶层的关切，如果我是总统，我大概也会做很多他想做的事情。但我祈祷他不会过于左倾，以免分裂我们的国家，给军方干预的理由。”\n\n作为一名坚定的瓦加斯主义者，巴西工党的最保守派别领袖和基督教民主主义者，费尔南多·费拉里对此表示赞同。"
 brazil.358.a: "“但愿他们能保持理智。”"
 brazil.359.t: "萨尔加多返回巴西"
 brazil.359.desc: "一个阳光明媚的清晨，凉爽的风裹挟着水汽拂过大地。“Anauê！Anauê！”的喝彩声与整合主义者的交谈声交织在一起，震天动地，几乎淹没了喷气式飞机的轰鸣声。空中飘舞的白色绸带在强劲的风扇喷气式发动机下飘化为洁白的羽流，为普利尼奥·萨尔加多十年来首次巴西之行添了一抹亮色。萨尔加多面带微笑，步履沉稳自若。有哪些微小的恩典被某些人遗忘，却又是其他人生活中的常态？又有哪些所谓的恩典，其实根本不是恩典呢？\n\n身着蓝色与绿色制服的人群列队示意，而萨尔加多挥手致意，回以“Anauê！”。往日的副手们多年未见，面容沧桑，逐个与其握手；一旁则是只有过书信往来的新整合主义者们。他们个个容貌粗犷，脚踏着闪亮的高筒靴，昂首挺胸地伫立于混凝土停机坪上。萨尔加多穿过队伍，坐进白色轿车的后排，摇下车窗，再次挥手致意。轿车驶离，一辆米色福特紧随其后。\n\n福特车内，开车的FBI特工拂去搭档吃三明治漏下的碎屑。搭档正在享用三明治，咀嚼的声音甚是恼人。特工暗想，要是没有那吵人的咀嚼声该多好。\n\n“我说啊，”特工开口道，“‘Anauê’是什么意思？”\n\n搭档慢慢咀嚼完，将几乎吃完的三明治放回包装纸里。“那是图皮语的词，这个民族现在还有，只是他们的语言快要消亡了。我猜说图皮语的图皮人比用这个词的整合主义者还要少。这个词语的意思是……”"
 brazil.359.a: "“……你是我兄弟。”"
 brazil.360.t: "梦想破灭"
 brazil.360.desc: "在巴西利亚的公寓里，午后的阳光透过宽大的窗户，温暖地照在阿西蕾玛那略带红晕的面颊上。她正坐在地板上，像往常一样教导年幼的儿子阅读，却被突然打开的门响声吓了一跳，响亮的吱嘎声在现代风格的宽敞客厅中回荡。保罗踏入屋内，他那凌乱的西装、后退的发际线和沉重的眼镜掩盖了一个背负着世界重量的男人的双眼。\n\n“亲爱的，我们需要谈谈，先让孩子们出去，”保罗说着，他的身体瘫倒在休息椅上，双腿无力支撑他的重量，头脑昏沉沉的。\n\n“我不知道该怎么告诉你，阿西蕾玛，今天我知道了我不愿听到的消息。有关我写过的竞选歌曲，一份档案被制作出来，他们发现我曾为上次选举中的一些政治家作曲。然后就撤销了我的职务。”\n\n“小心点，保罗，我记得你心脏不太好。但我相信事情没那么严重，革命时代他们清除了不良分子，也没发现你有什么问题。一个女孩的老师嫁给了一个地位很高的将军，我肯定她——”\n\n保罗突然大声咳嗽，一种奇怪的感觉从他的胸口涌起。“木已成舟，现在没法挽回了。我碰到了我的继任者，是共产主义追猎指挥部的，他比我更适合这份工作。他说出于对我家庭的尊重，他会给我们两天时间清空这个公寓。尽管我们在这里住了十年，但这仍是部长的财产，我们在巴西利亚再无立足之地。咱们要回里约了，我知道这对你来说很艰难，但你得找份活来干，亲爱的，因为我不认为这之后还会有人愿意雇佣我。”"
 brazil.360.a: "塞尔吉奥是五个兄弟姐妹中最小的一个，也是巴西利亚出生的第一代人，他正趴在门上偷听父母的谈话。"
 brazil.361.t: "上尉和学生"
 brazil.361.desc: "伊万·普罗恩萨上尉将他的谢尔曼坦克排成战列，这些庞然大物的引擎炽热轰鸣，对峙在桑塔纳广场的大道上。他的命令铿锵有力：守住这个阵地，保卫索萨·阿圭尔医院，挫败任何企图闯过他们防线的学生群体。国家法学院就在一街区之外，那里，全国最激进的学生联盟正在召开大会，他们将在此决定对抗新政府的策略。然而，随着时间的流逝，这一天一直维持着平静，直到夜幕降临。\n\n首先是远处引擎的隆隆声，紧接着是“打倒共产主义”的怒吼，然后是一声突如其来的爆炸。伊万亲自驾驶着坦克，作为前哨探路。无线电里传来指令——“向装甲兵团报告，不得干预，总部，结束。”但他眼前的景象，却是一场预谋已久的屠杀。几名身着便服的男子从两辆面包车跳下，向大学开火，投掷催泪弹，企图将学生驱逐回去。他们锁上了主门，正准备点燃建筑，将学生们困于火海。\n\n有时候，一个人必须在荣誉与服从之间做出选择。\n\n上尉紧握无线电，下达了命令：“第一排跟我行动，准备驱散袭击者，但尽量减少伤亡。第二、第三排进入大楼，每十人一组，护送学生前往医院。”\n\n当民兵意识到军队并非站在他们一边时，他们匆忙撤退，而学生们得以从即将被火焰吞噬的校园中获救，然后由军方护送至医院。待到装甲兵们返回总部时，突然传来了一声呐喊。"
 brazil.361.a: "伊万·普罗恩萨上尉，你被捕了。"
 brazil.362.t: "赶飞机"
 brazil.362.desc: "“您好，这里是拉塞尔达的办公室。”埃斯特的声音在电话中响起。\n\n代理总统卡斯特洛·布兰科开口说道：“您好，埃斯特女士。我是卡斯特洛·布兰科。我能和拉塞尔达先生通话吗？”\n\n“立刻为您接通，先生。”将军在等待中，秘书去召唤拉塞尔达。尽管不愿承认，将军对这延误感到了些许焦躁——他还有飞机要赶。但时间还算充裕。“您好，我是拉塞尔达。”\n\n代理总统松了口气，开始与这位前记者讨论近期发生的事件。拉塞尔达对最近的动荡提出了若干问题。卡斯特洛·布兰科沉着地逐一解释了如何应对每一次威胁。经过最近的严厉镇压，秩序已经恢复。“总体而言，我相信恢复宪法秩序的时刻即将到来。新选举来临之时，您准备好了吗？”\n\n“当然，将军，”拉塞尔达的声音回荡在电话中。“在这个充满不确定性的时刻，我非常感激您的密切合作。”\n\n“我也是，拉塞尔达先生。谢谢您。”卡斯特洛将军瞥了一眼手表，他已经比原定计划晚了十分钟。“我必须赶飞机了。”\n\n“好的，祝您一路平安，先生。”"
 brazil.362.a: "我们还有时间去累西腓机场！"
 brazil.363.t: "加强国家情报局"
 brazil.363.desc: "温贝托·德·阿连卡尔·卡斯特洛·布兰科，巴西合众国的总统，与他信赖的副官戈尔贝里·多·科托-席尔瓦坐在一起。关于即将发生之事，戈尔贝里事先已经有所了解，他急切地期待着最终的确认。\n\n总统深深吸了一口气，沉声说道：“戈尔贝里，你得快去把极左翼和共产主义全部除掉。我赋予国家情报局全权去做必要之事。你可以随意采取措施将赤匪们从我们的地盘上根除；放手去做吧，我完全支持你。”\n\n戈尔贝里严肃地敬了个礼。“遵命，总统先生。我定不负您的期望。”在卡斯特洛·布兰科鼓舞人心的微笑中，戈尔贝里再次敬礼，转身离开了会议室。\n\n尽管卡斯特洛·布兰科在发号施令时显得信心十足，他的内心仍旧对这一决策及其可能带来的混乱感到忧虑。但他明白，为了让强硬派放弃对政府的干涉，放权给情报局是不可避免之事。他叹了口气，重新投入到繁忙的工作中。\n\n与此同时，戈尔贝里离开高原宫时就下定了决心。无论付出什么样的代价，他都要把威胁巴西安全的赤匪和法西斯蒂全部斩草除根。"
 brazil.363.a: "另一场巨变即将来临。"
 brazil.364.t: "镇压"
 brazil.364.desc: "当年，军政府试图限制工会并将其置于国家控制之下时，全巴西的工人和工会活动家们发誓要不惜一切代价罢工阻止这一举措。\n\n而现在，他们又不知为何竟然幻想能像库比契克与洛特治下的“旧日时光”那样，靠罢工和破坏实现他们的目的，甚至都不想想他们二人是民选总统，而卡斯特洛·布兰科是，嗯，军事独裁者。\n\n很不幸，但也毫不奇怪的是，这招现在行不通了。当一些工会试图在米纳斯吉拉斯地区组织罢工的时候，国家情报局和警察就立刻收到了秘密线人的消息。不出几个小时，警察就在极右翼民兵“猎共突击队”的协助下打垮了罢工者，迫使他们回去工作。\n\n当然，他们除了服从以外别无选择。然而，尽管他们已经被打得落花流水，但还称不上被彻底击溃。他们依然在以更为秘密的方式反抗。"
 brazil.364.a: "这样的场景正在巴西各地上演。"
 brazil.365.t: "占领"
 brazil.365.desc: "巴西利亚大学校园中，局势危如累卵。\n\n“显然，”一名记者报道道：“军队正在和学生紧张对峙。”\n\n这确实是一场货真价实的对峙，成排的士兵和对面的学生行列正针锋相对，坦克与防暴警察正集结在大门口，他们身后则是举着砖块和标语的学生。\n\n最终，流血冲突并没有爆发。相反，军队决定采用更迂回的手段。他们开始针对和驱赶那些记者，用牢狱之灾和大棒恐吓他们。这些记者服从了军队的命令。\n\n许多意识到这意味着什么的学生纷纷离开现场，准备改天再来。一些人留了下来，但其他学生的离开让他们的队列变得太过薄弱。在坦克离开后，防暴警察就用警棍和盾牌把他们赶回了宿舍里。\n\n这样的场景此刻正在巴西各地上演。"
 brazil.365.a: "校园暂时平静了下来。"
 brazil.366.t: "笼中鸟"
 brazil.366.desc: "《晚间邮报》的办公室里，弥漫着一种与众不同的氛围。新闻编辑室依旧熙熙攘攘，但那份曾经无处不在的活力似乎已悄然退去。记者们很少投入追踪新线索的工作，那些曾鼓励员工追逐谣言、丑闻和事件的编辑们如今更偏向于保持克制和谨慎。新闻选题被慎重挑选，其中不少终将沉寂无闻。刊登的文章经过层层删改。一些记者因不甘在军方的阴影下工作而愤然离职。然而，大多数人还是选择留下，他们需要工作，需要养家糊口。他们还能怎么办呢？\n\n而在《人民报》的办公室中，也充斥着一种不同的气息。这份日报一直致力于揭露不公，让权贵和腐败者受到应有的监督。但那些曾经直言不讳、笔锋尖锐的记者们，如今却开始采用一种新的写作风格。他们低声讨论着不该刊登的新闻……以及用什么文章来替换它们。\n\n荒谬的食谱和中世纪诗歌节选开始出现在报纸的头版。报纸渐渐充斥着毫无意义的内容，忠实读者们对这些荒诞的文章感到困惑不已。被替换掉的究竟是些什么真实的新闻？政府的影响力究竟深入到何种程度，竟让记者们的笔触也随之变得畏首畏尾？"
 brazil.366.a: "而那些地下报纸又是从哪里来的呢？"
 brazil.367.t: "充满机遇之地"
 brazil.367.desc: "电话铃声突然响起，若泽·德·马加良斯·平托在床上翻了个身。是谁？这个时间打来电话？有何要紧之事？\n\n铃声响个不停。他的妻子含糊地嘟囔着，打算起床接电话。平托叹了一口气，伸手去按响了那台噪音连连的电话机。在这样的深夜，谁会拨打他的私人电话呢？\n\n电话另一头传来一个男人的声音，带着轻微的东北口音。平托花了几秒钟才反应过来是谁。“啊，卡斯特洛·布兰科总统，这么晚了还打扰您，有何贵干？”\n\n“马加良斯·平托先生，终于能与您通话，我感到非常高兴。我们还没有机会对您在我们进行宪法干预时的支持表示感谢。正是有了像您这样的爱国者，我们的秩序才得以迅速恢复。”\n\n“哦，先生，作为米纳斯吉拉斯州的州长，维护法律秩序是我的职责。”\n\n“我不想占用您太多时间，马加良斯·平托先生。我想邀请您加入我们的新政府。新成立的国家革新联盟需要您这样的资深政治家。作为回报，我们可以延长您的州长任期，直至这个过渡时期结束。”\n\n平托面带微笑，轻轻揉了揉眼睛，驱散了残留的睡意。“这是我的荣幸，总统先生。”\n\n“很好。”电话那头传来一声“咔哒”，通话结束了。米纳斯吉拉斯州的州长站起身来，慢慢地喝了一杯水，然后重新回到梦乡中。"
 brazil.367.a: "一个充满机遇的新时代开启了。"
 brazil.368.t: "推迟交接"
 brazil.368.desc: "埃内斯托·盖泽尔踏入总统办公室，目光落在了陷入深思的卡斯特洛·布兰科将军身上。自军事政变以来，这个男人明显老了许多。卡斯特洛·布兰科走的是一条充满风险的道路，对盖泽尔及其他人而言，他们唯一能做的就是帮助总统避免跌入深渊。\n\n“盖泽尔，太好了。”总统从椅子上站起身，绕到桌子另一侧，随后关上了门。“我想与你讨论未来的事情。”\n\n“谁将在您之后接任总统。”\n\n“正是。”卡斯特洛·布兰科叹息道。“科斯塔-席尔瓦在军方和商界中颇受欢迎。虽然我对他十分尊重，但我们不能让他赢得总统之位。他的强硬派支持者简直就是一群疯子。他们到处嗅探着法西斯和共产主义的踪迹。如果席尔瓦赢了，这些疯狗将会从内部撕裂我们的国家。”\n\n盖泽尔沉默不语，他对总统接下来的话既感到忧心忡忡，又怀揣着期待。\n\n“盖泽尔，就由你来接我的班吧。”总统此刻正直视着他。“前方的路充满坎坷，我需要你的帮助，我们需要安然渡过这个难关。我希望大家都能安然无恙。巴西需要你。”"
 brazil.368.a: "很好，长官。让我们开始吧。"
 brazil.369.t: "制服乌鸦谋杀案"
 brazil.369.desc: "温贝托·卡斯特洛·布兰科的闯入并未打断戈尔贝里与盖泽尔的谈话，因为这两位军官一直沉浸在思考之中，二人几乎是一言不发。他们抬起头看着自己的同事。此时的卡斯特洛·布兰科满脸通红，大概是疲劳所致——将军总是能有使不完的精力，但却基本都以某种酝酿已久的愤怒的形式表现出来，而忧虑又占据着其中的大半部分。\n\n“科斯塔-席尔瓦公开了他的想法。他坚持要终止选举。”\n\n“不妙。”戈尔贝里说。“有谁支持他？”\n\n“他捏着一份请愿书，上面有几十名军官的签名。大概都是农民出身的吧，名气也不大，在些荒无人烟的地方当戍卫部队的那种。那些毫无爱国情怀的虫豸嗅到了机会，现在他们正涌向首都，帮助科斯塔-席尔瓦杀死宪法，然后再啄食它的尸体。”卡斯特洛·布兰科一屁股坐在椅子上，挺直腰杆。“我告诉科斯塔-席尔瓦，选举正在进行。如果在他们面前示弱，我们就完蛋了。”\n\n“干得好布兰科。”盖泽尔点点头，他端坐着的身体微微前倾。“如果军队要弄出完全的独裁统治，这一代士兵和军官都会变成官僚和政客。巴西军队不能沦落到这种地步。”\n\n“同意。”戈尔贝里说，“我们一定会竭尽全力的，温贝托。”\n\n放松片刻，反而抽走了卡斯特洛·布兰科仅存的一丝躁动的精力。他看看他的两个同事，点了点头，然后拿出一支笔和一个笔记本。"
 brazil.369.a: "我们要打几个电话。"
 brazil.370.t: "乌鸦彳亍"
 brazil.370.desc: "深夜笼罩下的巴西利亚，拉塞尔达孤独地踏入这座城市。昔日舌战群儒的记者，如今换上了政治家的外衣，却难掩一身的疲惫。在偏僻且隐蔽的会面地点，卡斯特洛·布兰科将军与他不期而遇，将军脸上流露出一丝因得见“乌鸦”而生的欣慰。如今的通讯线路不复昔日的安全，只能选择面对面的交流。\n\n“见到你真是太好了，拉塞尔达。时间紧迫，军中有势力正在暗中阻挠选举的进行。”卡斯特洛·布兰科的声音低沉而急切。\n\n“乌鸦”对这突如其来的召唤显得不悦，对于这直白的透露更是感到不快。但他很快便找回了往日的锋芒，“这怎么可能？布兰科，你不是说已经将那些强硬派置于死地了吗？谁是这次的幕后黑手？”\n\n“科斯塔-席尔瓦领导着他们。”\n\n拉塞尔达的惊讶和沮丧这次并未如往常般迅速消散。这位昔日笔耕不辍的记者试图从双眼中驱散疲惫，“就是他，我并不感到惊讶。”他努力想要展现出勇敢的面容，却显得有些勉强。\n\n“惊讶与否并不重要，重要的是事实。我们的对手既有影响力又充满威胁，拉塞尔达先生。我需要你全力以赴的支持，以对抗这些强硬派。你在媒体界和全国民主联盟中都拥有极大的影响力。我们必须动用你所有的资源和力量，才能共渡难关。”\n\n“布兰科，如果这就是你所需，我会无条件支持你。但愿这足以扭转乾坤。”"
 brazil.370.a: "也许吧。"
 brazil.371.t: "公牛的联络"
 brazil.371.desc: "对于没见过世面的人来说，阿德马尔的办公室看起来过于简朴，似乎与他因贪腐而臭名昭著的名声不相符。但卡斯特洛·布兰科将军的眼睛却能洞悉表象之下的奢华，他清楚地察觉到东道主身上的服饰和家具透露出的金钱味道。究竟是谁的钱？在这敏感时刻，将军早已无暇去深究这个问题。\n\n“卡斯特洛·布兰科，你许诺过的！”阿德马尔过去一周的经历令他原本不羁的态度蒙上了阴影。看着这位“公牛”的忧虑和愤怒，布兰科心中暗自窃喜，这无疑是他自己情绪的映射。“我怎么还不是内政部长？”\n\n“那个位置并不重要，巴罗斯先生，在接下来的三个月里，我们要么完成自己的使命，这样你也能手握大权，要么我们俩都将一败涂地。”这位腐败的政治家似乎并不对此感到惊讶。那个可恶的公牛早就预料到了。或者至少，他猜到了索邦派情况不妙。这反而更好。卡斯特洛·布兰科强忍着怒气，努力使声音保持平静。“目前谈判仍在进行中。军队中有人反对新选举。这样的选举对您和您的人大有裨益，巴罗斯先生。今天我来此，正是为了寻求您的支持。您口才无双，不仅在商界颇有影响力，而且与诸如克鲁埃尔将军等人都保持着友好关系。我需要您的协助，愿我们捍卫宪法的立场能被全国的士兵和军官所理解和支持。”\n\n阿德马尔颔首同意。“我能做到。那么，将军，情况尚未有定论？”"
 brazil.371.a: "我们还有机会，巴罗斯先生。"
 brazil.372.t: "人事变动"
 brazil.372.desc: "科斯塔-席尔瓦将军自信地走进会议室。他的制服如往常一样，整理得无可挑剔。战争部长的身份让他有更多助手来准备一周的衣物。\n\n卡斯特洛·布兰科审视着部长的步态，席尔瓦看起来心情颇佳。卡斯特洛·布兰科也是心情愉快。然而，令战争部长遗憾的是，代理总统的好心情显然与他的对手不相容。\n\n科斯塔-席尔瓦走向他的座位，对代理总统点了点头。随后，他的目光在长桌周围扫视，一众奇异的面孔出现在这次常规的部长会议中。许多是卡斯特洛·布兰科的索邦派成员，那些穿着制服的文官们面露微笑。科斯塔-席尔瓦坐下时显得有些不稳。这究竟是怎样的局面？守在门口的士兵避开了他疑惑的目光。战争部长转身面对卡斯特洛·布兰科。\n\n“科斯塔-席尔瓦将军，”代理总统说道，“您被指控为不服从上级的命令。遗憾的是，我们必须通知您，您将被免去战争部长职务，并在此事调查结束前终止您的现役指挥权。”\n\n十几双眼睛注视着他。天花板真的一直这么高吗？科斯塔-席尔瓦意识到他的呼吸突然停滞了几秒钟。他吞咽了一下，艰难地站起身。“你们……你们明白自己做了什么吗？”将军气得摔门而去，而守门的士兵们却对此无动于衷。随着“砰”的一声巨响，失势的将军就这样离开了房间。"
 brazil.372.a: "他的反抗结束了。"
 brazil.373.t: "反政变"
 brazil.373.desc: "卡斯特洛·布兰科无力地紧握着电话，通信线路已被切断。街道上先是车辆的喧嚣，随后陷入死寂。首都仿佛被静止的时空笼罩。\n\n代理总统的沉思并未因为办公室的门猛地被撞开而打断。连那名士兵焦急的告知——部队正向首都集结且拒绝服从命令，必须立即撤离——也未能唤醒他。布兰科唯唯诺诺地跟随着那位年轻士兵，一个来自南方的小伙子，他那带有高乔口音的慌乱指示让人印象深刻。代理总统与这位士兵一样，陷入了迷茫。他怎会不知道？一切都已走到尽头。\n\n在通往晨曦宫的花园外，一队军车截断了他们的退路。美国制造的卡车、吉普车和坦克，炮管都指向了总统府。\n\n“你先走。”卡斯特洛·布兰科对那小伙子说道。前总统站在行军的士兵面前。孤身一人。他们的话也没能将他从迷惘中唤醒。前来的士兵们宣称，他们是按照合法总统科斯塔-席尔瓦的命令将其逮捕的。卡斯特洛·布兰科将军就这样被政变分子粗暴地拖走，扔进了一辆卡车的后座。"
 brazil.373.a: "结束了。"
 brazil.374.t: "与乌鸦讨论"
 brazil.374.desc: "这一次的会面比之前的要愉快得多。拉塞尔达没有像上次那样显得筋疲力尽，反而像平时一样，充满了专注和活力。这位被称为“乌鸦”的大人物为即将到来的选举飞遍了巴西，现在选举的日程已经确定。但这并未妨碍他与代理总统卡斯特洛·布兰科共饮咖啡，两人共同回顾了席尔瓦政变的失败。\n\n“强硬派的力量主要来自一些下级军官和科斯塔-席尔瓦的声望。在他们的领导层被解散，席尔瓦被撤职之后，我们用金钱和影响力安抚了许多初级军官。”\n\n“好消息啊。索邦派在这次和解中没有向军方让步太多，对吗？”拉塞尔达问道。\n\n卡斯特洛·布兰科对他派系被人轻蔑地称作“索邦派”总是微微有些不悦，但如果这个绰号换来的是和平与秩序，那倒也无妨。“不，国家已经准备好恢复文官统治了。你的同僚已经多次向我们保证，选举中不需要额外的支援了吧？”\n\n“不必了。”拉塞尔达轻轻敲打着他的咖啡杯。“除了你们已经做好的准备之外。极左翼已经土崩瓦解，社民党的竞选活动陷入了混乱。”\n\n“很好，看来‘乌鸦’先生对军方在选举日承诺的投票操纵感到满意啊。”布兰科说道，拉塞尔达听完后，接着说：“我得回去瓜纳巴拉州继续准备我的形象了，毕竟这关乎能否选上总统。”布兰科向他道别：“你的胜利越显正当，我们恢复正常秩序的步伐就越稳健。祝你好运，拉塞尔达先生。”"
 brazil.374.a: "谢谢你，将军。"
 brazil.375.t: "信任选民"
 brazil.375.desc: "“你真的确定吗，布兰科？”盖泽尔再次问道，他的声音中充满了忧虑。“在最后关头功败垂成，对我们来说无疑是一场灾难。”\n\n卡斯特洛·布兰科肯定地点了点头。“我理解你的担忧，盖泽尔。不过，选举将以尽可能少的干预进行。确实，让反民主力量获胜将是一场灾难。但如果公民认为选举是一场骗局，那同样是灾难。我们这是在走钢丝啊。”\n\n“拉塞尔达向我们保证，他几乎肯定能赢，是吗？他的情报收集有多可靠？”戈尔贝里问。\n\n卡斯特洛·布兰科转向戈尔贝里，眼神坚定。“他的情报非常可靠。我们已用手头上的情报与FBI的分析进行了交叉验证。现在，我们除了信任我们的公民，相信他们会选择民主的胜利和捍卫宪法之外，别无他法。”\n\n盖泽尔似乎想再次反驳，但最终只是叹了口气。“布兰科，你做到了其他人不可能做到的事情，带领我们穿越了这场危机。我只能相信你的判断。真相很快就会浮出水面。”\n\n代理总统点头，面对着即将来临的挑战，他的眼神中透露出一丝坚定。"
 brazil.375.a: "“除了等待，别无他法。”"
 brazil.376.t: "留意动向"
 brazil.376.desc: "“拉塞尔达，您大可放心，军队会像以往一样严密监视选举。在我的监督下，我绝不允许任何投票舞弊或不规范行为出现。我的部队将在那里……确保人民的意志，是的，人民的意志在选举中得以体现。”\n\n“感谢您，将军。我非常感激您的帮助。但说实话吧，没有必要。看我的竞选势头，即使存在违规，我也有信心赢得这场选举！让士兵们休息一天吧。”\n\n“拉塞尔达，我需要提醒你，建都是否进行不是由你来决定的，你明白吗？而且，我已经下了命令，我的士兵们会严阵以待。再见了，拉塞尔达。”\n\n卡斯特洛·布兰科挂断电话，留下拉塞尔达不敢置信地盯着电话。"
 brazil.376.a: "“我应该去问问操蛋的空军。”"
 brazil.377.t: "手段过激"
 brazil.377.desc: "“不行，戈尔贝里，太冒险了。”\n\n“可为啥呢，长官？我的特工都准备好了。一下子动手，库比契克的竞选就垮了，保准他赢不了。”\n\n“你没考虑到对手，戈尔贝里。如果他们知道咱们盯上库比契克和他家人，对军队和巴西都不是好事。别忘了，现在可是咱们在掌舵。玩政治跟指挥一个团完全是两码事。一步失足，便是万劫不复。我们历尽艰辛，方才稳固了自己的地位，此时我们应当坚守阵地，而非贸然发起攻势。”\n\n电话那头，戈尔贝里点点头。\n\n“明白了，长官。我听您的。”\n\n听到卡斯特洛的赞同后，戈尔贝里挂断了电话，离开了。"
 brazil.377.a: "“他说的没错，政界就是另一个战场……”"
 brazil.378.t: "永远警惕"
 brazil.378.desc: "“戈尔贝里，向我汇报。”\n\n“我刚结束了与特工们的紧急会晤，他们迫切地讨论共产主义的蔓延。”\n\n“有何发现？”\n\n“情况颇为棘手，长官。自从我们发动政变之后，支持共产党的人数不断攀升。他们用谎言迷惑了广大民众，这一点显而易见。我们通过选举已经削弱了一些共产党的影响力，但他们的势力仍在膨胀，渐渐迷惑了更多的人民。”\n\n“那我们的战线该如何布置？”\n\n“主要集中在两大领域：城市中心，以及北部残存的农民联盟。”\n\n“什么农民联盟！全是伪装的共产党，个个都是！那个叛徒洛特和他的同党曾试图与他们携手，而不是铲除。我们绝不会重蹈覆辙。一定要彻底根除掉，戈尔贝里。”\n\n“我完全赞同，长官。我们还应该重点关注那些城市团体。”\n\n“农民联盟交给我们的军队来处理。城市团体就交给警方。只要这两方面我们都彻底击破，支持共产党的民众就会如秋后的落叶般消散无踪。”"
 brazil.378.a: "“很好，长官。我会让我的特工去办的。”"
 brazil.379.t: "流亡中的伙伴"
 brazil.379.desc: "机场上聚集着一小群人，他们来为前州长卡洛斯·拉塞尔达送行。在士兵的注视下，瓜纳巴拉人毅然决定，即便有军方的严密监视，他们也要前来向州长告别。他们知道拉塞尔达为他们战斗到了最后，现在，新秩序迫使他背井离乡。\n\n从记者到政治家，再到流亡者的拉塞尔达，带着一丝忧伤向聚集的人群挥手告别。四周士兵冷漠的目光如利剑般阻止了他的一切言语。他只是向人群挥了挥手，便走进了飞机。\n\n飞机舱内挤满了被军政府驱逐的人。那些幸运的人，至少被赋予了活着逃脱的机会。拉塞尔达摇摇晃晃地走到他的座位，H排……他在过道里愣住了。儒塞利诺·库比契克回头看着他，两人的脸上都浮现出相同的困惑和惊讶之色。\n\n飞机滑向跑道，两人的惊讶逐渐转化为彼此间的礼貌性闲聊。拉塞尔达坐在这位前社会民主党总统旁边，开始讨论起时事来。尽管他现在是个失势的流亡者，但新闻和政治仍然是他生命中不可或缺的部分。库比契克对局势的变化同样充满兴趣，他们讨论着强硬派的崛起和局势的崩溃。当飞机冉冉升空时，这对曾经的对手开始讨论着他们未来的流亡生活，以及他们即将面临的挑战。\n\n他们还开始讨论，如何找到回家的路。"
 brazil.379.a: "他们一起呵护着不满的火苗。"
 brazil.380.t: "空无一人的国会"
 brazil.380.desc: "空无一人的道路上，一辆新款日本车悄悄驶过，宛如寂静大海上的孤舟。风暴过后，首都宛如一座静默的陵寝。索菲·瓦尔特准时抵达了工作地点，这次她没有再迟到，街道上早已空无一人。\n\n国会大厅空旷寂静，军队已经将所有人驱逐。或许当天晚些时候，几位军队的傀儡官僚会过来处理些文书。但此时此刻，这个国家的立法大厅显得空荡荡的，就连充斥着提线木偶的日耳曼尼亚国会都比这里有生气。\n\n索菲擦拭着无人踏足的地板，清理着那些被匆忙清空的办公室。从这头到那头，到处都是站岗的士兵们，他们脸上面无表情。清洁工觉得他们大多是无聊透顶。毕竟，守卫一个只剩回忆的大厅，又有何意义？\n\n在肖像的长廊里，挂着历任总统的画像。索菲在瓦加斯的画像前驻足，这位信奉民粹主义总统的目光静静地穿越时空，与她的目光相遇。她内心疑惑，瓦加斯会如何看待巴西当前的境况？然而，那沉默的画像并未给予任何回应。\n\n她小心翼翼地为肖像擦去尘埃，然后继续前行。她的工作还远未结束。"
 brazil.380.a: "巴西的民主快要完了。"
 brazil.381.t: "冲突"
 brazil.381.desc: "宵禁令颁布后，里约陷入诡异的静谧。电车与出租车遁形，商铺封门闭户。收音机循环播放古典乐与冰冷通告：“三小时后实施宵禁，滞留街道者一律逮捕。两小时后实施宵禁……一小时后……”机械女声如达摩克利斯之剑高悬。\n\n曼努埃尔与防暴队员集结在西尼兰迪亚广场对面，盾牌与警棍在汗湿掌心发颤。晨间有学生扬言占领广场，对抗法西斯与帝国主义。此刻他们正与这群青年对峙——稚嫩脸庞上跃动着天真与笃定，仿佛横幅标语能掀翻政权。\n\n倒计时十分钟。曼努埃尔强迫自己望向身后不断集结的警力。数百名黑甲武士在口号与标牌挥舞中列阵，扩音器里传来敷衍的驱散警告。\n\n八分钟。载满催泪瓦斯与更致命武器的卡车驶入视野。同僚们狞笑着以警棍叩击地面，他却在心中疯狂祷告：逃吧，孩子们，趁现在。无人退却。\n\n五分钟。人群深处泛起声浪，起初杂乱如絮，渐次清晰。当青年们挽臂成墙时，曼努埃尔终于辨出旋律——巴西国歌响彻广场。防暴队开始推进，热泪猝然划过他染满胡椒喷雾的面罩。"
 brazil.381.a: "“自由啊，在你的怀抱中，我们勇敢的心可以战胜死亡！”"
 brazil.382.t: "决定"
 brazil.382.desc: "温贝托·卡斯特洛·布兰科在办公桌前沉思，他的手无意识地翻动着桌上的选举计划。他正面临一个棘手的选择：是接受科斯塔-席尔瓦的提议，还是继续推进当下的选举计划？\n\n时间悄然流逝，温贝托终于下了决定。他用笔粗暴地划掉了选举计划，将其折叠放入一个棕色信封中，然后一股脑儿塞进了抽屉的最底层。他必须迎合科斯塔-席尔瓦的愿望。\n\n温贝托自欺欺人地认为，他之所以作出这一决定，是因为害怕。害怕与他那位强硬的副官正面冲突可能引发的混乱；害怕一旦失败，权力可能落入不当之手，从而毁灭巴西。但在他的心底，还有另外一个原因：内心的贪欲也驱使着他不要放弃权力。\n\n他真的很享受总统的权利和影响力，这种感觉令他沉醉，甚至在某些时候冲昏了他的头脑，让他渴望尽可能长久地坐在总统的位置上。所以，他决定还是紧紧抓住权力不放。\n\n沉思片刻后，巴西终身总统温贝托·卡斯特洛·布兰科给现在占据上风的阿图尔·科斯塔-席尔瓦写下了一封信：“阿图尔，我很高兴地通知你，我决定接受你的建议。”"
 brazil.382.a: "“选举将推迟。无限期。”"
 brazil.383.t: "肮脏的心灵"
 brazil.383.desc: "尸体在圣保罗不算稀奇，但如果它的腹部插着武士刀，手中还攥着诡异的日文纸条，问题可就大了。两名警察正蹲在这具尸体旁。“死者名叫高桥顺次，三十九岁，职业是商人，和几家美国公司签过合同。”安德烈亚斯站起身，翻开笔记说道。\n\n“地位高，事业顺，有房有车，换做是我绝不可能寻短见。”路易斯转过头对安德烈亚斯说。\n\n“或许是中途出了变故。这样的合同，黄了一份都是不可估量的损失。”安德烈亚斯说完，环视了一圈现场：桌上的文件胡乱堆叠、七零八落，而书柜里的那些却摆放有序，显得无比整齐。\n\n路易斯重新蹲下来检查尸体。“那也不至于自杀啊……一个有钱人，怎么会想不开毁掉一切？就算如此，又怎么会用切腹这种痛苦的方式？难不成要向公司谢罪？”\n\n“有道理，路易斯。这里面的确有猫腻——”安德烈亚斯正说着，门突然被打开，警察局长领着一群下属走了进来。\n\n“你们两个磨蹭什么呢？比起这种活腻了寻死的富人，我们还有更重要的事情处理。你们在这儿浪费时间的档口，八个街区开外发生了一起抢劫。赶紧过去支援，不然就给我卷铺盖走人。”局长一把夺过安德烈亚斯的笔记，示意下属移走尸体，封锁整个区域。"
 brazil.383.a: "笔记上写着：他杀。"
 brazil.401.t: "国家电力法案获得通过！"
 brazil.401.desc: "在《国家电力法案》得以通过的今天，参议院外锣鼓喧天。作为古拉特总统最受欢迎的改革之一，这项法案将以推动电力公司国有化来从外国人手中夺回巴西的电力基建。尽管全民盟和其他的反对党声称这一举动不过是“赤裸裸的社会主义与计划经济”，但这一法案的支持者指出，在接入国家电网方面的巨大不平等正在阻碍巴西人民的进步。另外，他们也强调了廉价且稳定的电力供应将会增加人民生活水平、促进就业并推定贫困地区的工业化。\n\n今天，古拉特总统在国会大楼的台阶上发表了演讲，重申了这些好处，还承诺了其他基础设施改进计划以使巴西的电力输出在十年内翻两番。\n\n“今天，对巴西人民来说，今天是一个伟大的日子。在日落后，我们的家园将不再会陷入黑暗；在平日里，我们将不用再忍受潮湿与闷热；我们将不再受贪婪的外国公司以及停电的支配。我要感谢参议院对这项法案的支持。同时，我向他们，向你们保证我的政府将与我们最智慧的工程师合作，以最快的速度为大家带来最低廉的电力。我将一直努力为我们伟大的国家添砖加瓦，为人民的福祉拼尽全力！谢谢！”\n\n虽然该项法案在书面上允许政府查封和收购外国电力公司，古拉特政府仍未披露关于这些公司转入巴西电力旗下的完整信息。然而，有一件事确确实实在发生：就算是巴西最穷困的家庭很快也将享受到电力带来的无限好处。"
 brazil.401.a: "巴西今夜光芒璀璨！"
 brazil.402.t: "国家电力法案未获通过！"
 brazil.402.desc: "由于未在参议院获得足够票数，《国家电力法案》未获通过。此次失败给了古拉特政府沉重打击。该法案旨在将巴西的电力基建归于一家国有公司旗下，好让政府能够直接对电网进行投资、管控和维护，以期巴西偏远地区的贫困人口也能接入电网，而该法案未获通过意味着许多地方私企会保持他们对国家电网的控制。当该法案的反对者正在大肆庆祝自由市场得到维护时，支持者们正想着还有什么方法可以帮助那些仍未享受到电力福祉的人们。\n\n外国电力公司一直以来被指责定价过高且经常随机停电，这一情况在贫困地区尤为严重。其中一家私企，里约光能的代表表示“很高兴看到法案未获通过”，并承诺确保其服务区域内的所有付费客户能用上电。当被问及是否会加大巴西西部和北部贫困地区的电网覆盖率时，该公司代表拒绝作出任何评论。"
 brazil.402.a: "巴西穷人的期望变得渺茫了。"
 brazil.403.t: "农业救助法案获得通过！"
 brazil.403.desc: "随着参议院于今日通过《农业救助法案》，巴西各地农场锣鼓喧天。该法案将收走各类公司企业和富有牧场主的土地，并重新分配给当地农民和小农场主，以此为底层阶级创造更公平的机会，提高农业总产值。洛特总统声称，许多牧场主未能有效利用其名下的大片土地，最好将这些土地转交当地民众打理。尽管工会和牧场主都呼吁各退一步，但洛特总统还是选择直接推行该法案的原始版本，他的冒险似乎得到了回报。\n\n该法案是为应对全国各地工会此起彼伏的罢工而起草的，巴西各银行会得到拨款，用于向农民和小农场主发放贷款。尽管富人们对政府的巧取豪夺感到不满，但他们也拿不出证据来表明自己在打理这些土地。工党已同意与省级官员合作，加快土地再分配进程，确保贷款公平发放，不过全民盟对此表示强烈反对。无论该法案有何争议，许多人都对农业领域的新气象表示认可。"
 brazil.403.a: "公平竞争的必要步骤。"
 brazil.404.t: "农业救助法案获得通过！"
 brazil.404.desc: "随着参议院于今日通过《农业救助法案》，巴西各地农场锣鼓喧天。该法案将收走各类公司企业和富有农场主的土地，并重新分配给当地农民和小农场主，以此为底层阶级创造更公平的机会，提高农业总产值。洛特总统声称，许多农场主未能有效利用其名下的大片土地，最好将这些土地转交当地民众打理。在工会威胁罢工的压力下，洛特总统与几位知名劳工领袖坐下来谈判，将他们的建议落实到《农业救助法案》中。尽管全民盟再次反对该法案，称其“本质是共产主义”，但社民党-工党联盟似乎获得了足够的选票，迫使其通过。\n\n该法案包含了几项关于改善大型农场劳工待遇的附加条款，其中就有减少工时。此外，法案准许工党与省级官员合作，加快土地再分配进程，并向巴西银行划拨大量资金，用于向农民和小农发放贷款。一些不愿交出自家资产的农场主选择连夜出逃。有了这样一项强有力的土地改革法案，巴西民众都对接下来的立法该如何超越这项法案拭目以待。"
 brazil.404.a: "阳光普照万民。"
 brazil.405.t: "农业救助法案获得通过！"
 brazil.405.desc: "随着参议院于今日通过《农业救助法案》，巴西各地农场锣鼓喧天。该法案将收走各类公司企业和富有农场主的土地，并重新分配给当地农民和小农场主，以此为底层阶级创造更公平的机会，提高农业总产值。洛特总统声称，许多农场主未能有效利用其名下的大片土地，最好将这些土地转交当地民众打理。不过，他采纳了一些农场主的建议，以此争取社民党、全民盟和社进党对该法案的支持。虽然洛特这步险棋有所成效，但也惹怒了工党与各工会，他们谴责该法案“被砍了一刀”，力度小得无法带来任何真正的改变。\n\n不管怎样，巴西各地的工会已经指示工人停止罢工，现在因罢工而停摆的生产工作总算重回正轨了。随着各州政府开始重新分配土地，巴西各银行也在准备发放贷款并提供经济救济项目，以确保农民不会立即破产。虽然改革的前景未卜，但巴西各地民众依然欣赏在农业领域缔造平等的尝试。"
 brazil.405.a: "渐进式改革往往会引起一阵变革浪潮。"
 brazil.406.t: "农业救助法案未获通过！"
 brazil.406.desc: "随着参议院于今日驳回《农业救助法案》，巴西各地农场怨声载道。该法案本打算收走各类公司企业和富有牧场主的土地，并重新分配给当地农民和小农场主，但它一经提出就遭到了全民盟和社进党的激烈反对。最终，这项法案在农场主们的游说下以微弱劣势被驳回，这使得工会领袖们立即呼吁继续罢工。有流言说如果社民党-工党联盟正处于崩溃的边缘，许多工党成员对洛特总统不能为农民创造一个公平的竞争环境而选择离开。\n\n如果没有《农业救助法案》，巴西大地主兼并田地的现象仍将屡见不鲜。不管是食品还是农产工业原料（比如棕榈油）的价格都会上涨。尽管洛特总统和工党领袖古拉特已经承诺与反对派交涉，但结果还遥遥无期，巴西各地的政治批评家都认为下个月会出现政治动荡。许多人希望冲突不要继续升级，以免军方对政治横插一脚。"
 brazil.406.a: "一切归劳动者所有，哪能容得寄生虫。"
 brazil.407.t: "选举权法案获得通过！"
 brazil.407.desc: "选举权法案今日在参议院获得通过，欢呼声响彻巴西大街小巷。作为古拉特政府改革的关键基石，该法案取消了对巴西各类边缘群体选举权的限制。此前，文盲、下层阶级和被剥夺政治权利的公民都被禁止参与选举投票，选举权也很大程度上取决于就业与否。该法案的反对者指出，由于选民范围的扩大，很有可能会发生选举舞弊；而支持者谴责对该法案的一切批评都是“有违民主精神的无稽之谈”。该法案的通过意味着所有巴西公民任何情况下都享有选举权。全国各地的政治活动家已经开始准备动员这一批新晋选民基础，这也将对巴西的选举结果产生显著而未知的影响。\n\n古拉特政府表示其将与各地区的选举官展开合作，提升选举的参与度，采取包括开增额外投票点、适当延长选举日投票时限等措施。此外，选举权活动家仍在继续推动更深层次的金融和法律体系改革，以鼓励支持农村地区的选举参与。尽管被剥夺公民权的群体中，部分人士仍对选举的实际效力表示质疑，但更多人都认为：巴西的民主体制已经翻开了更加光明崭新的一页。"
 brazil.407.a: "又一种阶级划分被打破了。"
 brazil.408.t: "选举权法案未获通过！"
 brazil.408.desc: "今日的局势仍旧如故，巴西参议院未让选举权法案通过。该法案意在扫清穷人、权利受损者和文盲投票路上的障碍。在巴西，中上层阶级的公民若在正规岗位工作，投票几乎没有障碍，但这项投票的权利并未顾及无正式工作、少数族群及贫困人口。法案的反对者们虽然表示愿意推动选举改革，却质疑法案步子迈得太大，他们认为应逐渐让这些边缘群体融入选民之列。今天，古拉特总统对法案的失败表示强烈谴责，称其为“共和国的耻辱”，并承诺将继续探寻方法，让所有巴西人享有投票权。\n\n然而，若无参议院的支持，他的改革恐怕难以大展拳脚。政治评论家们认为，全体巴西人投票的梦想可能已成泡影。此外，即使农村地区的居民有权投票，他们要去投票的便利性也不会提升，因为许多投票站位置太过偏僻、难以抵达。更何况，不少穷人在选举日还需工作，他们常常要被迫在投票和一天工资之间做出选择。尽管古拉特政府竭尽全力，但巴西穷人和中产阶级之间的鸿沟可能越来越深。"
 brazil.408.a: "如果国家的公民都投不了票，那这国家能有多自由？"
 brazil.409.t: "非洲增兵法案获得通过！"
 brazil.409.desc: "尽管参加南非战争给巴西民众了带来巨大的损失，但联邦参议院依旧通过了《非洲增兵法案》。该法案将允许额外抽出两支志愿师，以及不定数目的空军部队用以支援南非。支持者为法案的通过欢呼雀跃，声称有必要捍卫世界各地的民主，并且不需要付出高昂的代价就能将“法西斯威胁赶出非洲大陆”。而反对者则列举出扩大战争规模可能增加耗费的人力物力成本，认为巴西掺合这场战争完全是无利可图，同时担忧继续扩大征兵规模的可能性。今日在约翰内斯堡，巴西武装部队司令部与威廉·威斯特摩兰一同出现，并发布了如下声明。\n\n“在这场战争中，巴西武装部队展现出了坚毅不拔的精神与不惧强敌的意志，感谢他们在每一场战斗中的牺牲。因为他们，这场战争才能够结束，而牺牲也确保了南非作为自由灯塔继续留存于世。感谢巴西的民众，在我们对抗背信弃义的纳粹之时你们的支持。”\n\n根据军事观察人士预计，战争至少将会再拖上几个月，但不可否认的是，目前巴西与美国的关系已经更为紧密。拉塞尔达总统一直以倡导巴西加入OFN的政策而闻名，虽然现在无法联系到总统本人发表看法，但向南非增兵这一决策似乎是正式加入OFN的重要一步。作为回应，德国在本周末关闭了位于巴西利亚的大使馆，彻底的切断了巴西与团结协定的一切联系。"
 brazil.409.a: "吾辈义不容辞。"
 brazil.410.t: "非洲增兵法案未获通过！"
 brazil.410.desc: "今日，驻扎在南非的巴西志愿军们听闻非洲增兵法案未能通过参议院的审阅后，心头笼罩着失望的阴影。本来增援两个师以支持战争，协助南非对抗非洲之盾侵略的计划，却因缺乏足够支持而宣告落空。在南非战事陷入僵局之际，OFN的指挥官们曾寄望于巴西志愿兵和空军的增援可能改变战局。然而，在里约，法案的失败引得反对者们欢呼雀跃，他们指出，在南非的血战对巴西几无裨益。全国各地的母亲们紧抱着自己的孩子，庆幸他们不必在遥远的他乡为“自由”这样的虚无概念献身。反战活动家今天也在对抗拉塞尔达政府的斗争中赢得了巨大的胜利，拉塞尔达总统预计将在今晚就战争问题向国民发表讲话。\n\nOFN的一位发言人今日表示：“尽管巴西有权决定其在南非战争中的参与程度，但OFN密切关注其对南非的态度变化。自由正遭受攻击，而巴西并未挺身而出保卫自由。”拉塞尔达政府一直在力主加入OFN，总统本人甚至多次与OFN进行了交流。这一法案的失败可能会在巴西与美国的关系上留下永久的污点，同时复杂化了拉塞尔达的政治目标。"
 brazil.410.a: "让美国自行解决战争吧。"
 brazil.411.t: "繁荣公路法案获得通过！"
 brazil.411.desc: "今日，国会大楼里内回荡着掌声与欢呼，参议院正式通过了《繁荣公路法案》。这项法案将资金和资源重点投入到跨亚马孙公路的建设中，这是洛特总统任期内启动的雄心壮志之作。在这条公路的许多路段，建设因为恶劣的环境、天气条件以及与土地购买和保护沿线土著居民权益相关的法律问题而陷入困境。然而，随着洛特总统忽视公路建设中的官员回扣和贿赂行为的证据曝光，工程陷入了停滞。库比契克总统一直公开表示他渴望见证这条公路的完工，而如今，这项法案的通过，为他和他的政府提供了丰富的资源，使得这一宏伟工程终于可以圆满完成。\n\n最初由洛特总统在任期伊始启动的横贯亚马孙公路，长期以来一直是巴西政府的重大挑战。更为严重的是，负责监督公路建设的政府官员被揭露挪用公共资金，且在公路质量上偷工减料。库比契克总统已承诺解决这些问题，同时在公路建设重新提速时加强监督。这条公路不仅将亚马孙与巴西其他地区紧密相连，还开启了通往哥伦比亚的陆路通道，为巴西带来广泛的基础设施和发展新机遇。"
 brazil.411.a: "我们要征服亚马孙，就从一条路开始。"
 brazil.412.t: "繁荣公路法案未获通过！"
 brazil.412.desc: "由于繁荣公路法案未能通过参议院审议，跨亚马孙公路沿线的施工设备如今依然沉寂。这份库比契克政府大力支持的法案意在重启跨亚马孙公路的建设工作，然而，事实证明，洛特政府的腐败留下的伤疤是本届政府的不能承受之重，而建设大规模交通网络的进程当前也只会缓慢开展。虽然该法案的支持者竭力地为最终完成公路的建设争取额外资金、设备和人力，但许多参议员并不希望把这些资源投入到一个已经花费了太多时间和成本的项目上。\n\n低工资、恶劣的环境和政府的无能让这条公路有了“洛特的头号蠢事”这一绰号。尽管没有一个巴西人会希望这项工程被废止，许多人已经开始质疑这项工程的收益是否真的配得上它的成本。它原本是为了把欠发达的北部和中西部地区与繁荣的沿海地区相连，然而一系列问题令它始终难以完工。随着这一法案的失败，巴西人已经开始怀疑这条公路能否在这十年里完工。"
 brazil.412.a: "政府和狗腿子都不可信。"
 brazil.413.t: "南非撤军法案获得通过！"
 brazil.413.desc: "参议院的投票已经落幕，而结果正如他所愿。走向办公室的夸德罗斯总统心情舒畅。不再有巴西的穷人为南非的荒谬冲突流血牺牲了。洛特轻率地投身战争，以鲜血偿还给美国的虚妄债务。如今，夸德罗斯正在逆转前任的鲁莽决定所带来的一些损害。\n\n他的秘书已在桌上整理好了一些备忘录和报纸。阅读这些文件并未对夸德罗斯的好心情产生丝毫影响。文件里描述了许多全民盟议员对南非撤军的愤怒。夸德罗斯并不在乎那群失势的拉塞尔达派们会怎么想。他才是总统，那群只会聒噪的乌鸦与他无关。人民自会理解全民盟的新路线符合他们的最佳利益。\n\n至于媒体方面的备忘录，他也只是粗略地翻了翻。广播主持人指责他软弱退缩，将南非拱手让给法西斯。右翼媒体的社论对巴西和美国友谊所面临的风险表达了遗憾。\n\n当助手们带着热咖啡进来时，他们看到那些备忘录和报纸已被整齐地折成一叠。总统感激地接过热饮，并要求他们处理掉所有这些“致编辑的信函”。"
 brazil.413.a: "该把我们的小伙子们带回家了。"
 brazil.414.t: "南非撤军法案未获通过！"
 brazil.414.desc: "夸德罗斯深深叹息。“参议院的投票失败了，坎波斯。局面真是乱成一团。接下来我该怎么办？”\n\n副总统坎波斯沉思了片刻。“先生，您可以尊重这次投票的结果。尽管我们有分歧，但我们都是全民盟其中一员，很多反对票也来自我们党内。有很多拉塞尔达的铁杆支持者投了反对，他们认为美国才是我们最理想的盟友。您还没有赢得他们的支持，先生。”他没必要再说，夸德罗斯也还没说服他自己。两人尽管政策观点不同，却保持着良好的工作关系。总统珍视坎波斯的坦率，这在巴西政界实属难得。\n\n“还有其他选择吗？”夸德罗斯追问。\n\n副总统又叹了口气。“您可以不顾他们的意愿，先生。毕竟外交政策是总统的特权。但那可能并不明智。您的政府还在起步阶段，全民盟内很多人还没适应您是他们的领袖这个事实。当然，听从他们的意见在公众眼中会是一次政治上的失败。您受到参议院的束缚，也许正是拉塞尔达派希望看到的。”\n\n“的确如此。那军队呢？”\n\n“要说让他们站在您这边，进展也不大。他们肯定会对参议院投票结果感到高兴。如果您推翻这个结果，那无疑会让他们极为不满。”\n\n此时，夸德罗斯陷入沉思。副总统坎波斯仍然弄不清楚这位特立独行的总统是如何作出决策的。过了一会儿，夸德罗斯抬起头来。"
 brazil.414.a: "“参议院说什么就是什么吧。”"
 brazil.414.b: "“去你妈的参议院，巴西不奉陪了！”"
 brazil.415.t: "熊猫王"
 brazil.415.desc: "巴西的政治权力可能来自于枪杆子，也有可能来自于富商贵客的甜言蜜语。而在这个美丽新时代，它也可能来自某只远东萌物，抱着素食、憨态可掬的大熊。\n\n当副总统夸德罗斯访华带回熊猫时，全国知识分子和政治专家陷入集体困惑。有人嘲讽其为了一只动物劳神费心，觉得这种搞笑的事情证明巴西说要带领热带国家进入新时代的说法是吹牛打屁；有人怒斥副总统像廉价版巴纳姆一般为熊猫讨价还价，将国家尊严降格为马戏团杂耍；一大堆报纸次日新刊社论，戏称其为“熊猫王”。\n\n夸德罗斯则以惯常的激情演说回应，大谈激发国民想象力的重要性。风暴中心的熊猫，此刻正悠哉啃着竹叶——它们刚刚结束长达数周的海上笼居生涯。\n\n圣保罗市民为“高高”与“佩卢西亚”这对黑白萌物陷入疯狂，动物园日日爆满。临时兼任起动物学家的夸德罗斯亲自解说熊猫冷知识，更以热辣川菜轶事取悦各位观众。一两周后，待新奇感消退，副总统自会转向新宠计划。\n\n经此尝试，圣保罗政界的许多人都对夸德罗斯抱有好感。难道这一切都是他为博取名声而特意策划的吗？不管怎么说，雅尼奥·夸德罗斯的支持者和批评者一致同意，很难搞清这位副总统到底是在演滑稽戏，还是在鼓捣阴谋。"
 brazil.415.a: "它们到底能啃多少竹子啊？"
 brazil.416.t: "War in Guyana!"
 brazil.416.desc: "这世界愈发疯狂，而政府要员、外交部长瓦尔特·萨莱斯的地位也随之水涨船高。洛特也发现他明显过度劳累。这位前商人平日里完美的西装近来居然有了些磨损。\n\n“什么事，萨莱斯先生？请告诉我是好消息。”洛特揉着额头。外长翻弄着手里的文件夹，然后开口。\n\n“华盛顿那边糟透了。尼克松对伯纳姆的动作极为震怒，眼看任期快结束还搞这出。为了给国内一个交代，他正要派兵展示反抗自由国家组织的下场。”\n\n“美国人觉得美洲各国政府都该任他们摆布？看谁不顺眼就直接无视主权，何其傲慢。”洛特沉思道。外长正要回答，副总统标志性的开门声传了进来。\n\n“总统！美国人在圭亚那动手了，太可怕了！咱们绝不能坐视北方兄弟遭此虐待。必须强硬表态……”\n\n“根本不该表态！”萨莱斯怒道。像往常一样，外交部长对副总统试图教他做事感到恼火。“我们……”\n\n“够了，你们两个。”洛特总统起身制止争吵。“让我想想。”这位前军官走到窗边。外长说的在理，巴西没能力挑衅美国；但夸德罗斯要求抗议单边行动也没错。总统想了想，然后转向两人。"
 brazil.416.a: "\"We will support the American intervention.\""
 brazil.416.b: "\"We will lodge a formal complaint about this.\""
 brazil.417.t: "The Press Conference"
 brazil.417.desc: "The address to the nation had gone smoothly. TV and radio crews had recorded the President's condemnation of the unilateral American intervention.\n\nQuadros was delighted to watch the President at work. Lott's words had been simple and frank. Unilateral action without regard to sovereignty was a poison among all nations of the world. President Nixon should have reached out to regional actors and partners of the United States such as Brazil. In his closing remarks Lott wished for a new era of cooperation between nations of the continent.\n\nDuring the questions period afterwards, some of Lott's good humor ebbed away. Many of the journalists approved of the President's action, asking if Brazil would move to a more proactive foreign policy. One of the reporters, however, came up with a tricky question. The man asked if President Lott's disapproval of the American intervention meant a lack of interest in South American democracy. The President gruffly replied that he did not support dictatorships, but America had been in the wrong there. Subsequent questions on the topic by the reporter and a few others were parried unconvincingly by Lott.\n\nQuadros recognized the man. A journalist from one of Lacerda's awful newspapers. Slavishly devoted to the Americans. The Vice-President was displeased to see someone attached to his own political party attack Lott on this most auspicious day. The UDN would need some housekeeping."
 brazil.417.a: "That fiend Lacerda!"
 brazil.418.t: "The Press Conference"
 brazil.418.desc: "President Lott didn't enjoy much talking to the media. His television and radio speech offering praise for the American intervention had been done in his usual perfunctory style. A topic he hammered on was that the Americans' willingness to oppose tyranny in all its form had done its people and the world much good. Burnham's coup had been illegal. In his role as President Lott hoped to see the concert of nations be one day filled with free countries where men's rights were sacred.\n\nAbsent the conference was Quadros, no doubt sulking about the government's unwillingness to criticize the American intervention. This suited Lott, as it made it easier for him to focus on answering the journalists' questions. Most of them seemed content to support his decision for, after all, use of the military to quash democracy was no science-fiction to Brazilians. Good to know the Americans sometimes did the right thing, having exhausted all other options.\n\nOne journalist asked the President if he would support the Americans deposing any leaders they found offensive. President Lott took a second too long to think, eliciting a wave of photos as he glared at the journalist. \"I do not support injustice in any form. Burnham is not free to take his people's rights away, nor would the Americans be free to terminate any government they saw fit.\"\n\nA weak response. Lott answered the remaining questions as best he could. That journalist was familiar to him. No doubt from one of the right wing scandal rags."
 brazil.418.a: "Is Quadros behind this?"
 brazil.419.t: "巴西谴责"
 brazil.419.desc: "总统顾问小组会议接近尾声。今天讨论的话题五花八门，从圭亚那的事务到非洲的麻烦。国务卿罗杰斯一度提到巴西总统洛特，以及他最近批评美国圭亚那战争的演讲。\n\n“比尔，等一下，你是说洛特在抱怨咱们？”总统问道。\n\n国务卿点点头。“也许是为了国内消费。也许是为了让他的副总统高兴。那傻子好像觉得我们维持美洲秩序的行为是在瞎搞。”\n\n“真是胡言乱语。”尼克松摇摇头。“好吧，不管他们怎么想，巴西人需要我们。洛特这人很严肃，所以，如果让他知道什么对他有好处，他可能就不会再搞这种把戏了。与此同时，他的小脾气压根就不会影响大局。”"
 brazil.419.a: "说到底，谁在乎他们。"
 brazil.420.t: "巴西支持"
 brazil.420.desc: "总统顾问小组会议接近尾声。今天讨论的话题五花八门，从圭亚那的事务到非洲的麻烦。国务卿罗杰斯一度提到巴西总统洛特，以及他最近支持美国对圭亚那开战的演讲。\n\n“那就好。”总统笑道，“在这个被上帝抛弃的世界里，至少有些人不是忘恩负义的混蛋。”\n\n“您是说‘忘恩负义’是嘛？”罗杰斯问道。尼克松点点头。国务卿耸了耸肩。“他对我们在我们认为合适的地方改变政权感到高兴，这有点奇怪。也许他是希望，如果巴西军队反对他，我们会支持他？军方在那个国家的影响力可不小。洛特应该知道，因为他以前就是个军官。”\n\n这回轮到尼克松耸肩。“希望那家伙不会被手下的将领赶下台。在那之前，巴西的支持很不错，但与这世界相比也不过是沧海一粟。”"
 brazil.420.a: "生活还在继续……"
 brazil.421.t: "郎舅齐心"
 brazil.421.desc: "古拉特一走进南里奥格兰德州州长办公室，就听到了留声机上播放的《巴西庄严进行曲》。“舅哥，你只迟到两分钟，创了新的准时记录啊。”古拉特的妹夫布里佐拉说道。他刚才还坐在办公桌后面，看到古拉特走进来，立马起身走过去，给了古拉特一个拥抱。\n\n“见到你我也高兴，布里佐拉，情况怎样？”古拉特回道。布里佐拉拥抱了好几分钟，才松开手。\n\n“阿德里安娜，给我们弄点咖啡来，我们的口味，你懂的。”布里佐拉对秘书吩咐，秘书点点头开始行动，然后布里佐拉又转向古拉特。“嗨呀，全民盟说我是叛徒共党，想把我赶走，所以一切照旧。玛丽亚还好吗？”\n\n古拉特被布里佐拉领到一张舒服的椅子前，坐了下来。“玛丽亚她做得很好，我不在的时候，她帮忙照顾孩子。”古拉特正说着，秘书给两人端来咖啡，旋即离开。\n\n布里佐拉开始说：“很好啊，代我向玛丽亚问好。当然，我们必须谈谈参议院选举了，我在这里帮手，直接领导竞选，也在瓜纳巴拉经营，但我们都知道胜利的机会渺茫。”\n\n“老实讲，我们在圣卡塔琳娜和巴拉那的竞选需要你帮助，但愿你能来。”古拉特请求道。布里佐拉考虑着刚才的请求，沉默了一会儿，这很可能搞砸他自己的参议员竞选，但党是排第一位的。"
 brazil.421.a: "“当然，你要信我。”"
 brazil.422.t: "狡狐之策"
 brazil.422.desc: "阿德马尔登上竞选巴士时，工作人员正在车上四处走动，为与他同行的好几十名拉票人、竞选员和官员准备传单、小册子和设备。必须拿下瓜纳巴拉的参议院选举，凭借许许多多的捐助者和小政客，社进党赢得选举理所当然，这些投资甚至能为他的下一届总统选举带来可观的效益。\n\n抽了个空，阿德马尔总算坐住，现在是下午4点，可他从早上6点就开始竞选了。他喜欢竞选，一听到集会上的欢呼声，无数支持者呼喊着自己的名字，便感到充满激情、光芒四射。但他一直马不停蹄，奔波太久了，实在有点缓不过劲来。\n\n他坐下以后，竞选巴士开始移动，向又一个拉票点进发，好几十人已经在那里忙活了。他从走过来的工作人员手里接过热狗，得意地笑了笑。竞选巴士在巴西政治中算是个比较新鲜的玩意，他也很高兴能够利用到与圣保罗汽车制造商的私人关系，花一笔不错的价钱就买到许多巴士。其他派别的对手也惊讶于他的别出心裁，他为全国上下的社进党候选人提供这些巴士，助力选举。许多较量里这操作派不上很大用场，但在瓜纳巴拉，阿德马尔希望这能帮助他赢得选举。"
 brazil.422.a: "他不单是傲慢的公牛，还是只狡诈的狐狸。"
 brazil.423.t: "参议院事宜"
 brazil.423.desc: "1962年改选过后，巴西国会进一步分裂。工党和社民党组成的瓦加斯派联盟明面上占据主导，实则暗含错综复杂的党派纠葛和权力争斗，其混乱程度堪比一群在操场打架的小学生。\n\n在众议院，曾于库比契克政府中任副总统的若昂·古拉特凭借来自工党、社民党、社进党及其他小党的支持，成功当选为议长。\n\n而参议院却由右翼的社民党候选人奥罗·德·莫拉·安德拉德，一个与古拉特关系不怎么和睦的人把持着。由于工党在古拉特的建议下，坚决反对让奥罗担任参议院议长，奥罗只得依靠全民盟和其他反对党的支持。\n\n这一局面虽然远非理想，但对于洛特总统而言，似乎尚在可控范围之内，除非出现某种危机，迫使奥罗和古拉特必须携手合作，国会的现状才有可能被打破。但这在大多数观察家看来，即便是在最乐观的情况下，似乎也不太可能发生。"
 brazil.423.a: "我会注意的。"
 brazil.424.t: "石油事务"
 brazil.424.desc: "恩里克·洛特正与巴西石油公司董事会会面，这家企业在他的推动下刚刚完成业务扩张。尽管讨论内容令人不快，会议气氛依然保持着体面。若是夸德罗斯这类人，恐怕早就为正在商议的事项暴跳如雷，所幸洛特有着更坚韧的品格。\n\n“所以你们的意思是，即便巴西石油最近扩大了业务规模，相比起我们必须从国外进口的石油量，这仍然只是杯水车薪？”\n\n巴西石油总裁摊开双手：“恐怕确实如此，阁下。我们仍需从意大利势力范围和中东进口物资，比如埃尼集团，而且未来相当长时间内这种情况都不会改变。根据推测，我们至少需要二十年才能摆脱这种依赖。”\n\n洛特明显流露出不悦，但他理解对方的立场：“如果我们继续推进工业化呢？”\n\n这次回答的是首席财务官：“很遗憾，阁下，我同事所说的‘二十年’预估会随着工业化进程延长。如果按照您任内的工业化速度，可能需要四十年；若是延续库比契克‘加速再加速’的工业化方针，这个周期可能会延长至整整一个世纪。”\n\n洛特不以为然地摇头：“先生们，这种情况必须改变。我要求你们尽快找到解决方案。”\n\n此时秘书送来了当日报纸。洛特扫了一眼头条，扬起眉毛将报纸推向石油高管们。头版赫然写着：“意土冲突引发国际油价剧烈震荡”。"
 brazil.424.a: "“先生们，你们走大运了。都去工作吧！”"
 brazil.425.t: "威尔逊事宜"
 brazil.425.desc: "卡洛斯·拉塞尔达所属的全民盟麾下议员威尔逊·莱特·帕索斯刚刚赢得连任。但这位瓜纳巴拉州长的反应却与平日不同——若是其他同僚当选，他或许会感到欣慰，可此刻他正被怒火烧灼得几近失态。哪怕热图利奥·瓦加斯当选都好过这么个结果。此言何解？至少瓦加斯不像威尔逊那样是个法西斯——从恩里克·洛特到瓜纳巴拉的普通市民，谁人不知拉塞尔达对法西斯主义深恶痛绝？\n\n虽然拉塞尔达曾试图平息此事，但当天一份关于威尔逊最新演讲的新闻简报再度点燃了他的怒火。\n\n“啥？你是说那个亲德崇纳的废物居然主张加强与德国的联系？还公开宣扬？”\n\n“恐怕是的，先生。”\n\n“他的语气里就没有一丝反讽或嘲弄？”\n\n“完全没有，先生。”\n\n“见鬼。这个爱慕希特勒的白痴再不收敛，迟早会让咱们都沦为那些顶着鹰徽的偏执金发杂种的奴隶。埃丝特，去告诉党内那帮人，趁这个人渣还没坐大前把他处理掉，别逼我亲自下场，否则连他们一块儿收拾。”\n\n“好的，先生。我这就传达。”\n\n秘书离开后，拉塞尔达灌了口威士忌平复心绪，缓缓摇了摇头。"
 brazil.425.a: "怎么会有人把一堆胡言乱语当成精神图腾？"
 brazil.426.t: "瓜纳巴拉一日"
 brazil.426.desc: "帕斯马多贫民窟，深夜十点半，一名法警踏入了当地的社区中心。这个名字虽然听起来很气派，但其实不过是个稍大的简陋棚屋，居民们常在此聚集。法警显得有些紧张，他走向纳西索先生，从夹克里拿出一份写着“驱逐通知”的文件。\n\n“很抱歉，这是拉塞尔达州长签发的。他希望在十天内清空贫民窟，为新隧道建设腾出地方。这是上级的命令。”\n\n纳西索先生叹了口气——“没关系，我的朋友。明天早上，我就会离开我的棚屋，我可不想看到你们的推土机摧毁它。而且，对我来说找个新家不难，我的所有财产都能塞进一个口袋里。但是，啊，其他人怎么办？”纳西索环顾四周，目光落在那些在狭窄巷子中穿梭的无数家庭身上。\n\n法警犹豫了一下，然后说道：“嗯……州长正在为他们建造一个新的居住区。美国人也会帮忙，我们会把他们送上公交车，带他们去班古区的新房子。就在那个工厂的后面。”\n\n纳西索满脸失望：“啥？班古区的工厂后面？！”"
 brazil.426.a: "我想是时候离开了。"
 brazil.427.t: "欢迎"
 brazil.427.desc: "索菲·沃尔特的飞机降落在瓜拉拉佩斯机场，她为即将在巴西度过的“假期”松了一口气。回想起在汉堡的日子，自从她意识到自己对女性的喜爱胜过常人之后，她就一直生活在恐惧中，不得不时刻提防着身后的阴影，生怕有一天希姆莱的狗腿子们，或者纳粹的秘密警察深夜闯入家中，将她以“堕落的雅利安女性”这样的名义送去“再教育”。\n\n索菲时刻提防着，直到有一天她心力交瘁了。最终，在一些值得信赖的联系人的帮助下，她筹集了足够的德国马克，前往一个更为友好的地方。她带着足够的资金，可以在新地方安顿下来，不至于引起警察的注意。\n\n站在检查队伍中，索菲的紧张感愈发加剧。她曾听说巴西对德国难民非常友好，但她的心中充满了犹豫。当她终于走到队伍前面时，她递上了护照和文件，并用练习了一遍又一遍的葡萄牙语说出了那句话：\n\n“先生，我是从德国逃亡而来的难民。”\n\n检查站的官员看了她良久，叹息一声，盖章后归还了她的文件，随后示意她继续向前进入机场。索菲点头，继续前行。\n\n就在索菲逐渐离开边检站时，她听到了官员对每一位经过他的巴西人和移民重复的那句熟练之词。然而，对于她而言，这些话语却如同久违的春风，让她的心灵在多年来首次感到了一丝轻松与释然。"
 brazil.427.a: "“欢迎来到巴西。”(葡语)"
 brazil.428.t: "街道清洁工"
 brazil.428.desc: "天色尚早，不及八点钟。萨穆埃尔·魏纳懊悔不已，他本可以在踏入关杜河周边森林的蜿蜒小径前，将西装留在车中——那里离他所钟爱的科帕卡巴纳，已有数小时的路程。他还为自己亲自前来而懊恼，本来他可以派出旗下众多记者中的一位即可。但这条线索实在太过诱人，他不可能放弃。\n\n深夜，一名男子打来了电话。他自称是一批被政府集结起来准备重新安置的无家可归者中唯一逃生的人。原本应被送往避难所的他们，却被带到了森林深处的一块空地，在那里，他们遭到了警察的冷血枪杀。这名幸存者整夜躲避追捕，在黎明前的黑暗中，他从一部公共电话亭中拨出了这通电话，请求与那位闻名遐迩的记者会面。\n\n现在，萨穆埃尔在泥泞中跟随自称朱利奥的男子，向他所说的处决地点前进。越是临近，即便是热带雨林的气息，也掩盖不住尸体的腐臭和秃鹫的凄厉尖叫。也许，萨穆埃尔并未白费这个清晨。\n\n四具手脚捆绑、头部中枪的尸体躺在空地上。萨穆埃尔希望自己带了更好的相机，一边听着朱利奥对杀戮过程的描述，一边按下快门。朱利奥提到一名凶手，众人称其为“督察”，当众折磨受害者，仿佛在教授同伙折磨的技艺，这让他瞠目结舌。这个现场仿佛是他挖掘到的金矿。他们如此专注于现场，未曾注意到三名武装警卫正悄然接近。\n\n“各位，请停步。我是民警督察马里埃尔·马里斯科特，你们正在干扰犯罪现场。请后退，否则我将不得不逮捕你们。”\n\n朱利奥惊恐万状，僵硬地站在原地，面对着手搭在枪上的督察。萨穆埃尔注视着他们，嘴角泛起一抹微笑。他明白，若非自己在场，这一幕将会以完全不同的方式收场。"
 brazil.428.a: "大新闻？"
 brazil.429.t: "瑞士绿色大奶酪"
 brazil.429.desc: "小时候，埃托尔总痴迷于进口食品店里硕大的瑞士奶酪。店主常将整块布满孔洞的欧洲奶酪陈列在橱窗里，母亲曾告诉他这些气孔是奶酪发酵时自然形成的。当男孩天真地问店主会不会给孔洞多的奶酪打折时，母亲笑着打消了他的念头。\n\n如今在政府的新工作让他多么怀念那些日子啊。跨亚马孙公路如巨蟒般蜿蜒过辽阔土地，大大小小的庄园主们自然不愿看到自家产业被这条贯穿巴西腹地的公路一分为二。当然，并非所有人都有门路以最有效的方式表达不满。\n\n此刻埃托尔面前摊开的绿色规划图上，未来百公里的公路线形比最气派的瑞士奶酪还要千疮百孔。地图上遍布着深色圆圈、椭圆、矩形，以及几何学家或许能更精确命名的各种形状——每个标记都代表着当地权贵的私产。这些腰缠万贯又“宅心仁厚”的先生们，早已通过层层贿赂让埃托尔和同僚们对“地方利益”另眼相待。于是公路走向不得不稍作调整，随之而来的工期延误与额外开支自然不可避免。可埃托尔又能如何？地方豪强视土地如命脉，而跨亚马孙公路的建设者们，也乐得借此充实腰包。\n\n毕竟欧洲战事正酣，进口奢侈食品的价格早已涨破了天际。"
 brazil.429.a: "奶酪制造商有福了。"
 brazil.430.t: "跨亚马孙公路的贪污问题"
 brazil.430.desc: "总统的工作永无止境。\n\n至少恩里克·特谢拉·洛特总统会认真批阅每份呈递的公文。可惜一日不过二十四小时，案头永远堆积着待办事项。尤其国内诸多政府工程中滋生的贪腐问题，犹如附骨之疽令人头痛。总统最新收到的这份报告，揭露了跨亚马孙公路某段路线竟比黑帮老大的纳税申报单还要曲折离奇。幸亏规划这段公路的公务员不用给全国学生教授几何课——埃舍尔笔下那些充满视觉诡计的线条，都比这份设计图来得平直。\n\n又是这种令人窒息的典型案件。地方豪绅收买政府工程师绕开私产，导致公路如蛇行般蜿蜒，工期不断延误。贿赂链条必然贯穿整个官僚体系，甚至触及社民党-工党联合内阁成员。这位前陆军将领叹息着将报告搁置一旁，唤来秘书归档待查。待处理完更棘手的案件，自有时间慢慢收拾这些小鱼小虾。"
 brazil.430.a: "这个埃托尔·戈梅斯迟早要上法庭。"
 brazil.431.t: "放错地方的报告？"
 brazil.431.desc: "身为副总统，夸德罗斯的日子过得平淡如水。他的生活除了执行洛特交付的任务外，大部分时间都在总统府里徘徊，仿佛一只迷失方向的小狗，手中提着装满文件的公文包，却似乎没什么具体的去处。有时，他会无意识地走进总统办公室的外室。洛特的秘书们通常会设法阻止他直接面见总统。\n\n“我只是想出份力，对吧？总统可是个勤勉的人。”\n\n“当然，先生！”年轻秘书的回答虽然礼貌，但显得有些心不在焉。一个纸板箱静静地放在他办公室的角落。\n\n“那些是什么？”夸德罗斯好奇地问。秘书低头一瞥，然后又回到他的工作上。\n\n“那些只是总统稍后要查看的文件。他现在太忙，暂时没空处理。”\n\n夸德罗斯从箱子中拿起几份文件。秘书似乎想制止他，但随后意识到让副总统独处几分钟可能是更好的选择。\n\n文件再一次揭示了政府的腐败问题。总统一直在认真处理着送至他案头的大多数文件。然而，他似乎对迅速解决这些问题缺乏热情，这引起了夸德罗斯的关注。这已不是副总统首次记录这样的事件。可能没什么大不了，但整件事仍让他心生不安。副总统蹲下来将其他文件放回箱中，却把那份腐败报告藏入了自己的公文包。当夸德罗斯离开房间时，秘书只是漫不经心地瞥了他一眼。"
 brazil.431.a: "密切关注政治对手总是必要的。"
 brazil.432.t: "最肮脏的谋杀"
 brazil.432.desc: "恩里克·洛特的办公桌上躺着一份报告。这本是再寻常不过的事——从海外暴君的动向到圣保罗最新热点，无一能躲过他的视线。但这份报告不同寻常，它承载着令人窒息的罪恶。\n\n在阿里普阿南河源头，恰是南纬11度线附近，某家橡胶公司正在采集乳胶。当地有个土著村落，住着辛塔拉加部落的原住民，他们世世代代在此繁衍生息。然而某个清晨，橡胶公司的工头突然决定驱逐村民。他对打手们咆哮，称印第安人是“寄生虫、无耻之徒、害虫和流浪汉”，誓要将他们赶尽杀绝。于是惨剧发生了。其手段之残暴，令洛特所知的某些纳粹和日本战犯都要骇然失色。\n\n洛特强忍不适读完报告。即便戎马半生的他，面对如此惨绝人寰的暴行也几欲作呕。或许有人会指责原住民“落后”的文化（虽然洛特对此表示怀疑），但如此兽行分明是海外暴君才会有的作派。最令他震怒的是，这场屠杀之所以曝光，竟是因为某个打手嫌酬劳太少，跑去库亚巴的检察官那里哭诉。\n\n洛特下定决心。此等暴行天理难容。必须采取果断措施。虽有幕僚提出异议，但被他断然驳回。此刻无需考量政治得失，正义必须得到伸张。"
 brazil.432.a: "“部署警察到南纬11度线，任何邪恶终将绳之以法！”"
 brazil.433.t: "劳工主义的新曙光"
 brazil.433.desc: "“我之所以能站在这里，全有赖于人民的意愿。这意愿和当年选举我为国家副总统时的意愿是相似的。我将尊重人民的意愿，负起神圣而庄严的责任。”\n\n若昂·古拉特的声音通过麦克风传来。巴西最高选举法院的大厅中，政客、记者、大使齐聚一堂，聆听这位新任巴西总统的首次演讲。\n\n“我们将以庄严的态度，促进国家的稳定与和谐，捍卫一切民主与宪法权利。我国政府将把国家的主权放在首要位置。现在，巴西人民团结了起来，团结的力量无穷无尽。有了这些力量，有了人民的授权，我们将以无穷的精力与坚定的意志进行斗争，在这场斗争中动员我们的国家。要与贫穷作斗争；与文盲作斗争；与不发达的种种现状作斗争。我们将为那些需要帮助的人而奋斗，与一切不公不义作坚决的抗争。”\n\n和许多其他社民党与工党党员一样，儒塞利诺·库比契克站在台下，证明了他们对古拉特的支持。也有一些值得注意的地方，那就是除了洛特和一些护宪派之外，军方代表大多缺席本次演讲。法院外，尽管全民盟成员和其他抗议者以实际行动表明他们对古拉特当选的激烈反对，大批人群正在为新任总统欢呼。"
 brazil.433.a: "劳工运动坐上总统宝座。"
 brazil.434.t: "再干四年！"
 brazil.434.desc: "这是一出他再熟悉不过的场景；库比契克总统宣誓维护宪法和国土法律。他宣誓要维护宪法与国土上的法律，向联邦和巴西人民承诺忠实服务。伴随着乐队的伴奏和成千上万民众的欢呼声，他即将离开国会大厦。\n\n库比契克沿着国会大厦的坡道缓缓走下，眼前的正是他一手规划建立的城市，它就如同一颗璀璨的明珠，在阳光下闪闪发亮。此时，总统荣誉卫队的重炮声隆隆作响。远处，为他而响的21声礼炮声此起彼伏。他面前，按照就职典礼的仪式，排列着身着拿破仑时代礼服的总统荣誉卫队。库比契克向他们敬礼，乐队演奏起国歌，他从士兵队列中走过。\n\n然而，最后一排士兵却显得格外不协调。这些穿着现代制服的士兵，是南非战争的退伍军人。当库比契克走过时，他注意到的并非他们的整洁制服或僵硬的敬礼，而是他们的眼神，隐约可从中看到他们的迷茫，总统从中看到了战争的创伤。他们虽站在此处，身为国家的英雄，但只有时间才能证明，他们的牺牲是否真的值得。\n\n突然，战斗机的轰鸣声将库比契克从沉思中唤醒，空军飞机编队在头顶上空，高高在人群之上划过。"
 brazil.434.a: "为了巴西的未来！"
 brazil.435.t: "就职演说"
 brazil.435.desc: "“按照巴西人民的意愿，我当选为了总统，我别无选择，只能在未向国家表示感谢之前，开始履行这一职责。”雅尼奥·夸德罗斯总统这样开始了他对国家的首次演讲。聚集的记者们，仍带着轻微的不敢置信，静静地站立着。\n\n“这一任命建立在双重基石之上。巴西的健康与道德，以及她与世界的关系。这两大基石必须同时受到关注。当我们的经济因多年的挥霍而濒临崩溃，我们的背负着沉重的债务，我们的心灵被恶习和堕落所玷污，我们又该如何向世界展示自己？当世界各国为了争夺影响力而互相角逐，践踏他国主权时，我们又该如何处理自己的事务？\n\n20世纪见证了四个世界的崛起。北方有所谓的三大强国——美国、德国和日本，以及他们的势力范围组成的三个世界。还有一个由独立国家组成的世界，他们缺乏所有人类所渴望的繁荣。与北方各国间意识形态的冲突不同，北方与南方之间的经济鸿沟不过是历史的偶然，是进步和财富之路上的人为障碍。这届政府将超越美国主义、德国主义、泛亚主义和反殖民主义的意识形态，寻求与世界各国的友谊，无须与任何国家为敌。\n\n这种独立自主的外交政策将是我们国内政策的延续。回归更美好的过去将是构筑更伟大未来的基石。这届政府将摆脱前任政府不断推上山的债务重担。一旦从这个西西弗斯式的负担中解放出来，我们就有能力解决困扰我们国家的诸如赌博、公共道德败坏和官员腐败等问题。愿全能的上帝在前方的道路上指引着、保佑着我们！”"
 brazil.435.a: "既是酒鬼，也是一个伟大的演说家？"
 brazil.436.t: "乌鸦啼鸣"
 brazil.436.desc: "巴西利亚主教座堂前，彩旗飘飘，欢声雷动。此时此刻，巴西合众国新任总统卡洛斯·拉塞尔达无疑是这世上最幸福的人。怀揣激动又有几分忐忑的心情，他正马不停蹄赶往国会大厦出席就职典礼。\n\n“我承诺捍卫宪法，遵守法律，促进巴西人民的普遍福祉，维护国家的独立、统一和领土完整。”在多位前总统（尽管如人们预料，瓦加斯并未现身）的陪同下，拉塞尔达面向全国发表了他的就职演说：\n\n“巴西人民们，在这个胜利的伟大日子，我要向你们表示隆重的谢意。民主，我们生活之基，正遭受来自海内外的双重威胁，它们包括但不限于纳粹主义、共产主义，以及最为可憎的瓦加斯主义。”\n\n这一刻，拉塞尔达仿佛能听见全国各地同时响起的欢呼声浪，甚至还能感受到瓦加斯直冲天际的怒火。他停了下来，待人群安静后继续开口道：\n\n“身为总统，阻止这些毒瘤危害社会是我的职责所在。我誓将巩固国家的团结、正义与自由，带领巴西在自由世界中挣得一席之地，为她增添无上的荣光，因为巴西是最棒的！”人群再次爆发出排山倒海般的欢呼，而拉塞尔达也报之以灿烂的笑容，为这次演说画上了完美的句号。"
 brazil.436.a: "“开始干活吧。”"
 brazil.437.t: "公牛得胜"
 brazil.437.desc: "今日是阿德马尔·德·巴罗斯的时刻。感谢上帝与圣母庇佑，他终于得以自由施展那套独树一帜且卓有成效的治理体系——既为自身及其拥趸谋利，亦为共和国与民众造福。不过在此之前，他须完成宣誓并发表演说。他自认为表现得从容不迫……\n\n然而在旁人眼中，这场演说堪称荒诞不经。前一句还在宣泄宗教传统主义的愤懑，后两句便陡然转向布里佐拉式的左翼民粹话术。当他的言辞如钟摆般剧烈摇摆时，竟掏出一支古巴雪茄吞云吐雾起来。尽管社会进步党的谄媚者们仍在卖力鼓掌，却连他们都难掩困惑之色。\n\n在奥林达，新任总主教埃尔德·卡马拉听着这番语无伦次的演讲，强忍着捧腹大笑与勃然大怒的双重冲动。而在圣博尔雅，热图利奥·瓦加斯越听越显茫然，其子小热图利奥坐在身侧，只忍俊不禁地摇头。\n\n阿德马尔身旁的副总统埃德娜·玛丽莉娅·洛特——工党成员、前任总统之女——正毫不掩饰地向他投去古怪目光。某位记者捕捉到这个细节后，转头望向供职于卡洛斯·拉塞尔达报系的同行。他嘴唇翕动数次，最终挤出一句疑问："
 brazil.437.a: "“历史重演了，不是吗？”"
 brazil.438.t: "洛特法案失败"
 brazil.438.desc: "巨嘴鸟行动，及其关键《洛特法案》，是一个伟大的计划——旨在彻底消除军方威胁，维护巴西民主秩序长治久安的计划。它将促成军队去政治化，让海陆空三军将士明白，他们只不过是身着戎装的公民而已。但它失败了。洛特失败了。\n\n他祈祷，祈祷上帝施宽恕于巴西，施怜悯于未来的总统。传火之人，依然要面对强硬派永无止息的威胁。尽管他已尽了全力。\n\n洛特面容坚毅，一脸无事发生的样子。但他的战争部长奥迪利奥·德尼斯却看出总统映在眼底的失望。“别灰心，恩里克。你尽力了。”\n\n洛特点点头，叹了口气。“政客懦弱无能，连本职工作都干不好，连稍微维护一下他们为之服务的使命都不肯。好吧，现在都无关紧要了。他们干不好，不意味着我也干不好。我想我知道总统任期结束之后我该干什么了。”"
 brazil.438.a: "这不是结束。这一定会是新的开始。"
 brazil.439.t: "洛特法案胜利通过"
 brazil.439.desc: "巨嘴鸟行动及其关键，《洛特法案》，是一个旨在彻底消除军方威胁，维护巴西民主秩序长治久安的伟大计划。它将促成军队去政治化，让海陆空三军将士明白，他们只不过是身着戎装的公民而已。现在，不可能变成了可能，《洛特法案》成功通过！\n\n感谢上帝，感谢圣母玛利亚。我们成功了。巴西头上的达摩克利斯之剑消失了。\n\n在诸位军方护宪派台柱的见证下，洛特总统打开香槟，庆祝着他的伟大计划取得的伟大胜利。欢乐的人群中洋溢着喜悦和希望。\n\n洛特简短说了几句，“先生们，我们成功了。巴西军队成为了民主的捍卫者。科斯塔-席尔瓦和他手下那帮‘精英’可算领教了咱们的能耐。在此，我要向各位表示祝贺！我要向你们的不懈努力致以最崇高的敬意！”\n\n欢呼声和掌声接踵而至。在喧嚣的声浪中，洛特略感欣慰，现在德尼斯元帅只能从监狱里听到这个消息了，他阻挠一切的企图惨遭失败。诚然，他认为军方干政的可能还没有完全消失，但现在不是讨论这些话题的时候。今天，是庆祝的日子。"
 brazil.439.a: "洛特肩上的重担顿减。"
 brazil.440.t: "故障保险"
 brazil.440.desc: "洛特法案成功通过后，护宪派们还需要设置些故障保险，以防军方巧妙规避这一法案，再次试图扮演政治家的角色。为了这个目标，总统恩里克·特谢拉·洛特与他的老友、四星上将佩里·康斯坦特·贝维拉夸进行了深入会谈，商讨如何落实这些预防措施。\n\n在与贝维拉夸及其他护政派军官的讨论中，洛特构思了多种计划和策略，尽力将军队里的强硬派及其领袖科斯塔-席尔瓦驱离权力中心。他们从无数不同的视角剖析了军队中某些野心勃勃的强硬派所带来的潜在威胁，并制定了一系列旨在压制他们的策略。\n\n洛特在会议结束时提醒军官们，民主的存续需要永恒的警惕；如果我们未能及时察觉到危险，护宪派就有可能彻底崩溃，更不用说军队和巴西本身的命运了。军官们深表赞同，决心遵循洛特和贝维拉夸的指引，守护着这片土地的民主和宪政传统。"
 brazil.440.a: "我会注意的。"
 brazil.441.t: "十一月十一日运动"
 brazil.441.desc: "在洛特法案失败的阴影下，迫切需要制定替代策略，以阻止强硬派趁虚而入，图谋夺权。为了这一目标，总统恩里克·特谢拉·洛特召集了他的老友、四星上将佩里·康斯坦特·贝维拉夸，共同商讨如何实施这些紧急措施。他们中的一个重要议题是成立一个秘密组织——“11月11日运动”，预防未来可能发生的军事政变。\n\n在与贝维拉夸及其他护政派军官的讨论中，洛特构思了多种计划和策略，尽力将军队里的强硬派及其领袖科斯塔-席尔瓦驱离权力中心。他们从无数不同的视角剖析了军队中某些野心勃勃的强硬派所带来的潜在威胁，并制定了一系列旨在压制他们的策略。\n\n洛特在会议结束时提醒军官们，民主的存续需要永恒的警惕；如果我们未能及时察觉到危险，护宪派就有可能彻底崩溃，更不用说军队和巴西本身的命运了。军官们郑重点头，决心加入到这场新的政治运动，遵从洛特和贝维拉夸的领导。但他们都清楚，这一切必须保密；否则，十一月十一日运动本身就可能引发一场政变。"
 brazil.441.a: "我会注意的。"
 brazil.442.t: "新秩序"
 brazil.442.desc: "在一部讨论巴西共和国军事独裁政权（如今已不复存在）早期年代的有声书中，有一段文字这样写道：\n\n“冷酷的军事独裁枷锁，沉重地押在从阿雷格里港到马瑙斯的无数巴西人民身上，但这并未免除他们日复一日的职责。关于这点，一位现已退休的商人兼慈善家，瓦尔多米罗·达·席尔瓦先生讲述了他的亲身经历。\n\n‘在独裁统治开始后的某一天，我像往常一样去里约工作。你可以想象，当时我有些紧张，毕竟到处都是军人在四处奔波。那时，我对军政府的看法并不像后来那般强烈抵触，但即便如此，我依然无法适应巡逻兵沉重的脚步声和内卫部队偶尔的喊叫指令。\n\n有那么一两次，我还以为是有人对我喊叫，结果转头一看，却发现空无一人，或是其他一些不幸的家伙正被士兵们呼来喝去。我并没有过多忧虑，只是感激上帝那不是我，然后迅速离开了那里。\n\n那天，有一件事让我格外印象深刻。我离当时的工作地点，也就是后来归属于我的仓储公司还有大约一百米的时候。我差点没注意到地上的报纸，那上面写着‘选举立即推迟；国民议会解散’。我花了很长时间才真正明白这意味着什么，但当时我只是耸了耸肩，心中只有一句话："
 brazil.442.a: "“啊，这就是巴西。”"
 brazil442_tt: "§Y恭喜。§!"
 brazil.443.t: "突然一击"
 brazil.443.desc: "那是一枚炸弹，猛烈地震撼着整个国家，粉碎了民众对卡斯特洛·布兰科总统掌控一切的幻想。\n\n在累西腓国际机场的大厅，爆炸声回荡，带走了十四个鲜活的生命，安保人员也在其中。卡斯特洛·布兰科总统若不是在出门前家中耽搁了十分钟，他也可能成为这场悲剧的牺牲者。\n\n如今，总统固守在家，有层层重兵保护，以免遭受进一步的袭击。\n\n随着烟尘散去，死者被悄然带走，原本和平的幻象已经破碎，裂痕逐渐扩大，三个字渐渐显露出来。\n\n“民解运”。"
 brazil.443.a: "“可赤匪们早就应该死光了！”"
 brazil.444.t: "科斯塔的最后通牒"
 brazil.444.desc: "卡斯特洛·布兰科坐下时，科斯塔-席尔瓦连门也没敲就闯进了他的办公室。\n\n“席尔瓦，没有我的明确命令，你无权进入我的办公室——”\n\n席尔瓦没有理会，坐了下来。\n\n“让我们认清事实吧，先生。那些共匪能发起如此残酷的攻击，显然是在表明我们伟大的国家太不稳定了，无法按计划恢复民主。别用那种眼神看我！为了我们的利益，我们必须对国家施加更严厉的手段。这些共匪下作，所以我们也得下作。然后我们就杀个回马枪，让这个国家再次伟大。”\n\n席尔瓦停顿了一下。\n\n“先生，希望您按照我说的去做。”\n\n席尔瓦起身离开后，卡斯特洛琢磨着刚才的会面。对方的意思清楚得不能再清楚了。拉丁美洲的每一位总统，无论是平民还是军人，都心知肚明：\n\n照我说的做，不然就揍你。"
 brazil.444.a: "“他说得对。我们得以其人之道还治其人之身。选举得缓缓。”"
 brazil.444.b: "“让他见鬼去吧！他竟敢威胁我！”"
 brazil.445.t: "老元帅崛起"
 brazil.445.desc: "国会大厦正在举行盛大典礼，气氛庄严而肃穆——这个时刻只属于至高无上的军方。温贝托·阿兰卡尔·德·卡斯特洛·布兰科，蒙军方青睐的巴西国家领袖，正从他那平平无奇的前任——帕斯科尔·拉涅利·马齐利手中，接过绿黄相间的总统绶带。他的两位忠诚副将，阿图尔·科斯塔-席尔瓦和埃内斯托·盖泽尔站在他的身旁，他们全程以礼貌的掌声，为这历史性的一刻增光添彩。\n\n接着，卡斯特洛·布兰科右手按在宣誓的文件上，他的声音在肃穆的大厅中回荡：“我承诺将维护、捍卫并遵守宪法，遵循法律，促进巴西人民的共同福祉，并维护巴西的统一、完整和独立。”\n\n在场众人的热烈掌声中，卡斯特洛·布兰科发表了简短而铿锵有力的讲话：“我将以荣耀与忠诚，守护巴西宪法。我们将自信地迈向未来，不会因极端左翼的罪恶而落入反动右翼的掌控之中！”\n\n他的话音刚落，整个会场爆发出热烈的掌声。\n\n在这一切的背后，西尔维奥·弗罗塔微微颔首表示认可。也许，他可以与这位新任总统携手共进。"
 brazil.445.a: "靠长靴统治，而非选票。"
 brazil.446.t: "内托的奇迹"
 brazil.446.desc: "安东尼奥·德菲姆·内托走进巴西经济部的办公室，心情十分愉悦。\n\n他刚与总统卡斯特洛·布兰科元帅结束了一场会晤，那是他这一生中与任何总统或军官进行的最令人振奋的对话。\n\n卡斯特洛·布兰科对他的每一句话都深信不疑：“削减通胀，”德菲姆提议，布兰科元帅便同意了。“政府对经济进行干预，”德菲姆继续提出，布兰科元帅仅是轻轻点头表示赞同。德菲姆从未想过会有人如此愿意倾听他的思想，并且给予他绝对的信任。现在，既然元帅如此信任他，德菲姆决心立刻证明自己配得上这份信任。\n\n德菲姆振作精神，召集他的经济顾问团。\n\n“诸位，我刚刚与尊敬的总统阁下进行了一次极为成功的会面，他对我提出的建议十分赞赏！”他激动地说道。\n\n那些经济顾问们，大多数人都赞同他的想法，但一直担心直接向军方支持这些想法会遭受报复，他们热烈地鼓掌。\n\n“感谢大家的支持！”德菲姆继续说道，“但我们现在不能沾沾自喜，我们还有大量工作要做。我需要你们帮助我制定出巴西政府干预经济的具体方案，我们要共同努力，为建设一个更强大的国家而奋斗。你们明白我的意思吧？”"
 brazil.446.a: "靠长靴统治，而非选票。"
 brazil.447.t: "现在怎么办？"
 brazil.447.desc: "在巴西利亚一个阴云密布的傍晚，温贝托·卡斯特洛·布兰科与他的强硬派副手阿图尔·达·科斯塔-席尔瓦的会面，映照出当前局势的阴郁。两人心知肚明，形势何其堪忧。\n\n科斯塔-席尔瓦开启了沉重的对话：“局势岌岌可危，布兰科总统。您或许已经察觉，军方正迫切要求我们应对瓦加斯主义者和共产主义的威胁，且行动必须迅速。”\n\n卡斯特洛·布兰科叹息着，轻轻摇头。\n\n“你说得是，阿图尔。我同意我们必须迅速采取行动。”\n\n科斯塔-席尔瓦点头，正要深入阐述他的计划，却被卡斯特洛·布兰科的手势打断。\n\n“问题在于，阿图尔，你和你的同事提出的方案有点太极端了。我们完全有能力在不采取你们所建议的暴力手段的情况下解决这些问题。”\n\n科斯塔-席尔瓦压抑着内心的不满，提出了一个折衷方案：“尊敬的总统，我们是否能就一套基本措施达成共识？”\n\n“比如说哪些措施？”\n\n“压制左翼，整合右翼。”科斯塔-席尔瓦一边说着，一边递过一份文件。\n\n总统审视着文件，随后点头表示认可。“好，这些措施可以作为我们的出发点。那就这么定了，阿图尔。”"
 brazil.447.a: "科斯塔-席尔瓦僵硬地敬了个礼，然后回去工作了。"
 brazil.448.t: "重新统一思想"
 brazil.448.desc: "科斯塔-席尔瓦挺直了身姿，目光扫视着走进会议室，各自坐定的强硬派同僚们。\n\n他迅速环视四周。所有的同事都已到齐，不仅有普罗塔，就连通常不大出席的布尔涅也在场。是时候开始讨论了。\n\n话音刚落，一阵愤怒的喧嚣便划破了沉静，各路声音纷纷抨击着那位穿着制服的文职总统，卡斯特洛·布兰科。\n\n“他这个总统当得一塌糊涂！我们必须摆脱那个可恶的家伙——这一切都是他的错！我早就看穿了……”\n\n“纳粹跟共匪两股恐怖分子的势力依然强大，我们必须立即剿灭他们！我的部队随时准备开拨，只待长官您一声令下！”\n\n席尔瓦举起手，会议室内的喧闹声渐渐平息下来。\n\n“我会亲自与卡斯特洛谈一谈。让他保持理智，暂时留在权力中心。我知道我们都觉得他有问题，但这毕竟只是第一波攻势，不能这么火急火燎的就要他滚蛋。我们是军人，不是没脑子的文官。我们要把事情调查清楚，这样才能精准规划我们的下一步行动。”\n\n会场里传来低声的赞同，席尔瓦的话语得到了大家的一致认同。"
 brazil.448.a: "“别忘了共党渣滓才是我们真正的敌人，先生们……”"
 brazil.449.t: "相信体制"
 brazil.449.desc: "德尼斯元帅敲响了洛特总统办公室的门，神色紧张。片刻后，他听到有人叫他进去，便推门进入，面对总统行了一个礼。“总统先生，您叫我来有何事？”\n\n洛特从办公桌后站起身来，迈步向这位将军走去，用一个微笑回应着他眼中的忧虑。“放松，我想跟你谈谈布拉西尔将军的建议。”德尼斯紧张地屏息等待。“经过深思熟虑，我决定不采纳他的建议。”\n\n这番话让德尼斯如释重负，他的脸上露出了轻松的微笑。“太好了。您对军队有什么打算？”\n\n洛特点点头，“嗯，我们还是按国家防务委员会的建议来，照常进行。这样军人们知道我尊重他们，他们也信任我。”\n\n“对，对，您的决定没错，我的朋友。”德尼斯满意地笑了笑，然后脸色变得严肃。“那您的新法案是不是要延后了？”\n\n洛特摇摇头，“不，我还是按原计划进行。”\n\n“总统先生，我得说，”德尼斯有些不高兴，“我们还有更要紧的事，比如南非的情况和——”\n\n“元帅。”洛特严肃地打断他，“我早就下定了决心，这不是需要讨论的问题。我信任你，现在需要你也信任我。行吗？”德尼斯失望地叹了口气，但还是点了点头。"
 brazil.449.a: "“当然，恩里克……”"
 brazil.450.t: "结交新朋友"
 brazil.450.desc: "位于巴西利亚郊外，有一家名声显赫的会所，这里是一处军官们频繁光顾的聚集地。在这里，军人们常常聚在一起唱歌、畅饮、豪赌，交流着彼此的军旅生活。然而，今日这里的气氛与往常大不相同，因为总统亨里克·洛特专程来到了这里。\n\n洛特总统站在护宪派和索邦派的军官面前，开始了他的讲话，而那些持强硬立场和中立态度的人士则被巧妙地排除在会谈之外。“各位，首先我想表达我的荣幸，能在这里与大家相聚。”洛特总统的声音充满了诚挚，“今天，我希望我们都能铭记，是什么力量在驱动着我们前行；是对我们伟大祖国和人民无尽的爱，是那份激荡在我们心中的爱国激情和民族精神，这些都是我们不懈奋斗的源泉！”他的话语激发了在场众人的共鸣，有人高举酒杯，有人发出了欢呼。\n\n洛特继续道：“试想一下，没有这份深沉的情感，又怎会有人愿意奋不顾身地守护着我们宝贵的家园？”他的话语中透露出坚定，“在这个充满政治与经济领域暴政的世界里，掌控着巴西石油资源的，应当是我们自己，而非他人！”这番话再次激起了人群中的激情，没有任何一个瓦加斯时代的遗留政策能在军队中如此受欢迎。\n\n“此外，我还想提醒大家我们所追求的更高目标；我们的斗争不仅仅是为了保卫我们的家园和人民，更是为了维护那些使我们国家值得奋斗的根本——我们的民主以及一个支撑民主制度的宪法！”尽管欢呼声仍旧回荡，但相较之前略显减弱，主要来自护宪派的军官，而索邦派的反应则更加克制。洛特总统脸上依旧挂着微笑，但心中却充满了忧虑；现实的情况远比他预期的更为复杂。不过，他还是决心要在今晚多争取一些盟友。"
 brazil.450.a: "坚持捍卫民主价值。"
 brazil.450.b: "赞美民族主义。"
 brazil.451.t: "阿西斯·布拉西尔的建议"
 brazil.451.desc: "洛特的脸上绽放出孩童般的微笑，他快速翻阅着摆在面前的军事报告。这次，巴西军队展现出了卓越的进步和发展潜力，新军官任命的建议正在进行中。然而，很快有什么东西打破了他的宁静，元帅注意到了面前的人。\n\n桌子对面的是阿西斯·布拉西尔，他正急切地等待着会议的开始，两腿甚至因紧张而微微颤抖。“虽然有风险，也许会有人反对，但我们得重组军队。否则，你可能会处于弱势。”\n\n“我同意。”洛特回答，合上手中的文件夹，收进抽屉里，“但是，打破现有军事指挥结构可能会削弱我的地位。我相信，如果出现问题，你会支持我。”\n\n“我当然不会挑战你的权威。那违背了我的原则。但我担心，有些人可能不这么想……”阿尔赫米罗突然停顿，摇了摇头，压低了声音，“特别是像科斯塔-席尔瓦或奥迪利奥·德尼斯这样的人。”\n\n洛特惊讶地后仰在椅子上，“你怎么能这么说？德尼斯只忠诚于我，他绝不会背叛我。”\n\n阿尔赫米罗在座位上不安地挪动，只能点点头。他重重坐回椅子，发出一声闷哼。他几乎在避开洛特的目光，小声地嘟囔着……"
 brazil.451.a: "“我们走着瞧。”"
 brazil.452.t: "变更“军事架构”"
 brazil.452.desc: "阿热米罗·德·阿西斯·布拉西尔轻抿着一大杯酒精饮料，或许是某种来自马耳他的烈酒。与此同时，恩里克·洛特也在随意地品尝着自己的饮品，偶尔用空闲的手审视着一些文件。两人之间时不时交换着眼神，进行着无关紧要的交流。\n\n终于，阿西斯·布拉西尔打破了沉默，他在尝了一口自己认为可能是马耳他酒的苦涩饮品后说道：“洛特，我们得整顿军官队伍。”\n\n洛特刚想回答，就被奥迪利奥·德尼斯突然的闯入打断，德尼斯显然没睡好，眼睛上还挂着深深的眼袋，他急切地说：“洛特，如果你坚持这样，我明天就辞职。”\n\n这话让两人都吃了一惊。阿尔赫米罗站起来，洛特差点呛到：“德尼斯，冷静点，”他努力说服德尼斯，“这是为了巴西好，为了军队好！”\n\n德尼斯却坚持己见。他们之间的争论激烈，一直保持沉默的阿西斯·布拉西尔感觉头都快炸了。最后，在洛特的理性说服下，德尼斯妥协了。\n\n“我只是一时冲动，洛特，对不起。”德尼斯说完，低下头，然后黯然离开了房间。\n\n洛特疲惫地靠回椅子上。阿西斯·布拉西尔注意到洛特看起来非常累，甚至有些被岁月压垮的样子，“或许换个战争部长更好？”他建议。\n\n洛特摇头拒绝：“不，德尼斯得留下。但我会让步，其他人可以换。”他沉重地说，站了起来，“我总觉得德尼斯只忠诚于我。”"
 brazil.452.a: "“那就让我们期待最好的结果吧。”"
 brazil.453.t: "德尼斯的意见"
 brazil.453.desc: "站在洛特面前的一排人给他留下了深刻的印象。他知道，他们都是好人，尽其所能为巴西服务，但他也知道，也许他们并不是最优秀的。这批军官的晋升大多是因为护宪派的立场，而不是他们的实力。\n\n内心深处，洛特其实很讨厌自己正在做的事情。事实上，他在那一刻甚至感到有些厌恶，但这是不得不去做的事情。他微笑着与这批新晋军官握手并表示祝贺，他们或许会去庆祝，或者为即将来临的挑战做准备。\n\n他们刚离开，奥迪利奥·德尼斯突然闯了进来。德尼斯总是出人意料，现在他看起来焦虑不已。“洛特，我有话要说。”\n\n“德尼斯，出什么事了？”洛特边整理文件边问。“贝维拉夸将军，他现在执掌圣保罗东南军区。”\n\n“他怎么了？”洛特来了兴趣，他放下手中整理的文件。“我们得把他换掉。如果这次人事调整能起到作用，他必须走。他和阿德马尔的关系太危险了。”\n\n“那你认为谁能接替他？别忘了，我们人手不够。”洛特说道。“克鲁埃尔将军。他能稳定那边的局势。”\n\n洛特沉默片刻后说，“谢了，德尼斯。”他沉思着。克鲁埃尔是布拉西尔和杨戈的盟友，可能并不是最佳选择。沉思良久，他终于开口……"
 brazil.453.a: "“我会考虑的。”"
 brazil.454.t: "最后一战"
 brazil.454.desc: "洛特从未自诩为职业政治家；他无法像库比契克那样迷倒实业家，也无法像古拉特那样号召人民。但现在，当他与阿西斯·布拉西尔共同审视这局势时，灵感自然涌现，宛如20年前在英格兰的那段时光。战争，是他深刻理解的领域，远超任何政治角斗。\n\n棋盘上遍布对手，直面挑战巴西民主的敌人。从贪婪的机会主义者到简单的腐败愚昧者，从不忠的军官们到如卡洛斯·拉塞尔达和阿德马尔这样的政敌，挑战洛特的势力汹涌而来。他与布拉西尔一次又一次地核查他们的动向，布拉西尔也一再向他保证，任何政变都将面临强烈抵抗，而在最坏的情况下，他们也有足够的实力赢得可能爆发的内战。\n\n洛特叹息一声，他希望这些准备都是多余的，希望不必再为一项本该广泛接受的法案做这么多防备。一种不安感弥漫在他的心头，思考着如果一切都失败了会怎样。但这种冲突，他懂，他能够应对。他在心中思忖，自己还要再打一场战争，最后一场……"
 brazil.454.a: "巴西的民主游走钢丝之上。"
 brazil.455.t: "一通电话"
 brazil.455.desc: "累西腓一个宁静的午后，对于日常生活的居民而言，这不过是平常的一天。然而，对于东北军区的指挥官来说，这一天却截然不同。卡斯特洛·布兰科正是这样一位人物，他终于在办公桌前找到了一丝空闲，拨通了一通重要的电话。\n\n“我真不知道恩里克脑子里到底在想些什么。”布兰科在电话中咕哝，“他究竟想通过把我的许多部下派往亚马孙达成什么目的？我从未要求任何新的调动，更不用说那些整日只知道赞扬洛特有多‘伟大’，如何是‘民主的救星’的家伙了——这些人究竟把他当成谁了？”这位老元帅平日里从不轻易说脏话，但这一次，他的尊严受到了挑战。\n\n布兰科从未对洛特抱有好感。回想起他们在里约热内卢军校时的中尉日子，两人总是在军队中为了更大的影响力而相互竞争。但如今，他认为洛特已经做得太过分了。\n\n“每次我离开家都必须有人‘陪伴’，我怎能与同事们愉快地共进晚餐？”布兰科继续在电话中抱怨着。\n\n“我理解您的感受，元帅。”电话那头的声音回应道。“我想——”话音被愤怒的布兰科打断。\n\n“如果你真的理解，那你就该知道你的职责。告诉恩里克，立刻结束这一切愚蠢行为，恢复常态。否则，他将为自己的行为付出沉重代价。再见。”卡斯特洛·布兰科挂断电话，深吸一口气，向后靠在椅子上，仰头凝视着天花板，沉思着过去几天里发生的种种。突然，他的思绪被敲门声打断了。\n\n“请进。”布兰科说道。“长官，廷巴乌巴市长的代表团已经到了。”哦，又得处理更多繁琐的官僚事务，元帅心想。\n\n“德尼斯，希望你做出正确的选择。”布兰科喃喃自语。"
 brazil.455.a: "有些战争永远不会结束。"
 brazil.456.t: "致全国的特别演讲"
 brazil.456.desc: "德尼斯元帅面色坚毅，从容地注视着总统府外的抗议人群。他本不愿事态走到这一步——被迫推翻一位曾视为挚友的人，在权力的大厅与平民之间筑起一道军人的障碍。民众并不领情，只是愤怒地抗议。这当然在意料之中，元帅会尽力解释，全力安抚，只盼民众能够聆听他的苦衷。\n\n他转过身，对着身后的摄像组轻轻点头。几秒后，镜头开始转动，他便开启了生命中最重要的一次演讲。“巴西的同胞们，我们正处于危机之中，但我们已经取得了胜利。”\n\n“1955年，我、恩里克·洛特及其他军人团结一致。我们的目的，是为了保卫我们的民主和宪法，使之不受戈梅斯总统的侵蚀。我们成功了，我们的国家也因此而强盛起来。”\n\n“但洛特忘了我们的初衷。他忘了身为总统应担负的责任。他与那些图谋颠覆我们民主的人为伍。他沉迷于腐败，接受外国贿赂。当他发现有些人不会对他的行径坐视不管时，他竟企图亵渎我们的宪法。”\n\n“这就是我们被迫行动的原因，和55年一样：为了挽救我们的民主。这不是虚言，选举即将到来！这次选举将是公平公正的，所有巴西人都能参与。这不仅是我的承诺，也是我们宪法所保障的权利。现在，我祝愿大家一切安好。愿上帝保佑巴西。”\n\n随着广播的结束，摄像组、他的部下，以及在场的政治家们纷纷向他表示祝贺，赞扬他的演讲英勇，向他保证巴西在安全之中期待着选举的到来。但这些赞誉和保证都无法驱散他心底深处那一丝细微的愧疚。"
 brazil.456.a: "我们做了正确的事，不是吗？"
 brazil.457.t: "钞票和贪污"
 brazil.457.desc: "阿德马尔仰头大笑，手中举着一杯香槟。“为巴西和军队干杯！”\n\n“干杯！”克鲁埃尔将军也跟着放声大笑。让德尼斯倾向于支持社会进步党而非全国民主联盟，这可不是件容易的事。这位元帅老派得很，固执地认为国家需要他们这些人和他们陈旧的政治理念。哈！社会进步党才是巴西所需要的政党——他们既敬畏神明，又推崇民粹，而且利益颇丰。幸运的是，克鲁埃尔和他的一些将军同僚，特别是在第二军的那些人，对阿德马尔及其团队充满了信心。\n\n“啊，我们等待这一天已经太久了。社会进步党终于要在阳光下展现自己，整个巴西都将分享到我们的成果！”阿德马尔转向克鲁埃尔，眨了眨眼。“尤其是咱们俩。”\n\n克鲁埃尔笑了起来。名义上来说，送给军队的美元是用于稳定巴西。但私底下里，这些资金将被用来资助社会进步党的竞选活动。如果其中有一部分流入克鲁埃尔的口袋，他还有什么好抱怨的？对竞选活动的思考让他从遐想中回神。“哦，还有，关于选举。我查看了你副总统的民调，结果并不乐观。或许——”\n\n“别担心。”阿德马尔挥挥手打断他。“我们有的是时间来改善劳多的形象。那些事咱们以后再说。现在，咱们先喝酒！”"
 brazil.457.a: "我们做了正确的事，不是吗？"
 brazil.458.t: "与乌鸦交流"
 brazil.458.desc: "瓜纳巴拉州长府邸里热闹非凡，办公室里的助理和职员们忙得团团转，为即将到来的选举做着最后的冲刺。德尼斯不得不好几次躲开匆匆而过的人群，终于来到了卡洛斯·拉塞尔达的办公室。他推开门，见到全民盟的热门人选正与一个他不认识的人交谈。两人握手告别，那人面带微笑离去，看到元帅时微微一惊。德尼斯目送那人离开后，又转向拉塞尔达，挑起了一边眉毛。\n\n“元帅，欢迎！”拉塞尔达迎上前，笑容满面。“那是拉斐尔·马加良斯，我选他来接替我，因为我要竞选总统了。”\n\n德尼斯点点头，表示明白，然后深深地咳嗽一声。“很好，我来就是为了这事。拉塞尔达，军队正式支持你和全民盟。”\n\n拉塞尔达高兴地拍了拍手。“太好了！你们大可放心，你们选择了正确的人；我们会尽全力保护巴西和宪法。不会再犯洛特或戈梅斯那样的错误。”\n\n提到戈梅斯，德尼斯心中涌起旧日的回忆。55年的时候，他和拉塞尔达是对手，洛特却与他并肩作战。如今，一切都颠倒了。也许命运就是这般充满讽刺。德尼斯说道：“这样最好。现在，我们来谈谈你的计划吧。”"
 brazil.458.a: "因势利导，水无常形。"
 brazil.459.t: "裁决洛特法案"
 brazil.459.desc: "坦克雷多·内维斯专注地观察着眼前的情况，兴趣盎然。在如此高级别的法庭、尤其是联邦最高法院的法庭里，竟能听到如此多的时髦词汇与没完没了的庭审对话，这让他感到不解，同时又无比着迷。他甚至不敢眨眼，生怕漏掉了什么细节。\n\n庭上正在审议1965年的军事监督法案，他的同事们亲切地称之为《洛特法案》。当内维斯全神贯注之时，庭审已进入表决阶段。判决出人意料地迅速，法庭一致认定法案违宪，之后再无多言。\n\n内维斯微微倾身，向身旁的人低声说道：“结果不出所料啊。”他话音刚落，便期待着对方的回应，“若非亲眼所见，我都怀疑自己是不是疯了。”乌利塞斯·吉马良斯心领神会地连连点头，表示赞同，随后两人一同起身离席。\n\n“军方给最高法院的压力太大了。这法案要是过了，就是他们自己搬石头砸自己的脚，”吉马良斯边走边说，“我们必须想个办法跟他们斗一斗，不然就得一直忍受他们到处插手、到处监视。你怎么看，内维斯？我们第一步该怎么走？”"
 brazil.459.a: "“就从选举上入手吧。”"
 brazil.460.t: "子时将近"
 brazil.460.desc: "“我再问最后一次，你们确定我们的人选已经稳操胜券了吗？”德尼斯似乎已经问了三十遍，向克鲁埃尔将军和弗罗塔将军提出这个问题。弗罗塔看起来困意朦胧，而克鲁埃尔则似乎在极力忍住不翻白眼的冲动。这让德尼斯磨牙，心中怒火难平。该死，他怎么会把这等重要的选举舞弊任务交给这些蠢货？\n\n“长官，我向您保证，我和我的部下已经竭尽全力。选举将会顺利进行，我们的朋友很快就会走上他的位子。”克鲁埃尔漠不关心地说道。\n\n“我的队伍也是。”弗罗塔忍不住打了个哈欠，“长官，说实话，现在再焦虑也没用；没有更多时间去塞票或者行贿了。天一亮，选举就结束了。”\n\n德尼斯几乎要爆发了。他想大声斥责他们。他们正面对巴西历史上最关键的一次选举，而这些家伙在干什么？德尼斯深知这些人的腐败程度，那些资金有多少是真的用于行贿，而不是被他们揣进了自己的口袋？但他不得不承认，弗罗塔话中有理。\n\n“好吧，解散。”他们分道扬镳。德尼斯在回家的路上努力让自己冷静下来。担忧又有何用？无论明天发生什么，一切都将尘埃落定。他一边在心里反复念叨，一边躺倒在床上，今天先安稳地睡一觉再说吧。"
 brazil.460.a: "这一时刻从未到来。"
 brazil.461.t: "打击朋党"
 brazil.461.desc: "汗珠不停从德尼斯将军的额头滚落。即使是他，一个土生土长的巴西人，也难以适应这种酷热。他正在和一群军人讨论重要的事情，这让他的思绪从炎热中稍微分散了一下。在人群中，科斯塔-席尔瓦将军格外引人注目。\n\n德尼斯打断了周围的喧嚣：“我们来谈正事吧。”他开始谈论政治上的问题，“若昂·古拉特的政治手段让人头疼，我们一定要阻止他，并找到一个合适的替代者。”话音刚落，房间里的讨论越发热烈。德尼斯端着水杯，认真地观察着周围的人。\n\n席尔瓦并没有参与这场热烈的讨论，他摇头表示不满：“现在为时已晚，”他突然打断了大家，房间里顿时陷入尴尬的沉默，“我们已经把一切都押在了选举上，如果现在改变策略，颠覆古拉特，安插拉塞尔达，情况就会变得很糟。”\n\n他严肃地扫视了一圈，“这不仅是选举的问题，还关乎我们是否要保持一贯的政治立场。如果我们改变，就等于承认自己之前的虚伪。”\n\n德尼斯几乎要站起来：“请大家理解，这是正确的决定，为了正义，为了民主。”他四处游说，但遭遇的反对超出了他的预期。多数将军已经明确了立场，而德尼斯还在摇摆不定。\n\n他震惊地坐回椅子，看着那些刚刚间接反对他的人。他知道自己已经输了，虽然他平时冷静，但此刻也忍不住低声咒骂，声音小到几乎听不见。"
 brazil.461.a: "“他妈的。”"
 brazil.462.t: "华盛顿下场"
 brazil.462.desc: "两位特工坐在车里，彼此陪伴，因为他们别无选择。他们知道对方的名字，但是不是真名，他们自己也不太确定。尽管如此，为了打发无聊，他们交流着琐碎的话语和心中的疑惑。\n\n他们正执行一项紧张的监视任务，目标似乎是党卫队一个间谍团伙的总部。由于活动寥寥，其中一人开口了：“听说华盛顿的命令了吗？”\n\n另一人转向他的右侧，无知地耸耸肩，打破沉默：“我好像没收到那份通知。”他半开玩笑地说，笑着咬了一口美味的鸡肉三明治。\n\n“一旦古拉特下台，我们就会在一月的政变后帮助稳定局势，”特工回答道，他的手指在车轮上敲击着，仿佛在弹奏小曲。另一位特工难以置信地吞咽着，转向一侧，“真的吗？社民党和华盛顿的关系不是很铁吗？工党也是。”\n\n“古拉特和那些思想独立的政治家有过联系，他们中的一些人拿着日本的钱。日本人早就在渗透美洲大陆了，”特工嘟囔着，疲惫地靠在椅子上。\n\n“我真不敢相信古拉特会这么做，”另一人回答道，他失望地摇了摇头，又咬了一口三明治，“哦，好吧，为了更大的利益。”"
 brazil.462.a: "这是必行之事。"
 brazil.463.t: "不可接受的结果"
 brazil.463.desc: "德尼斯面无表情地阅读着报纸，上面赫然印着若昂·古拉特和工党的胜利消息。他早已知晓这一结果。毕竟他在前一天晚上仔细观看了整个选举过程。报纸上的文字渐渐模糊了起来，他的思绪飘离了现实。\n\n这怎么可能？人民真的如此盲目、天真吗？在国家历经沧桑之后，他们竟然选择回到瓦加斯主义者那里，竟然还是那个独裁者亲手创建的赤色分子集团？他的一切努力，难道就这样付诸东流了吗？他曾为了捍卫宪法推翻了一位朋友，现在却有人要撕裂国家的秩序？他的目光再次落在封面上，古拉特和他的盟友正在庆祝胜利，他们得意的笑容透露着傲慢。德尼斯愤怒地拍打报纸，桌上的餐具震颤着，杯中的咖啡洒了一地。\n\n不，这不是结束。如果那个马克思主义者以为能破坏他和同僚们为保卫和服务国家所做的一切，那他就大错特错了。人民犯了错误，在这种情况下，像他这样的人有责任纠正错误，避免灾难的发生。他从桌旁站起，拿起电话。他和他的同僚曾拯救过巴西，这次他们还会挺身而出。"
 brazil.463.a: "巴西的混乱尚未结束。"
 BRA_mosquito.1.t: "蚊子行动"
 BRA_mosquito.1.desc: "奥迪利奥·德尼斯的心思似乎飘到了远方。他的手指轻轻敲打着下巴，尽管身处议论纷纷的房间中，他的思绪却在别处徘徊。虽然他努力集中注意力，但并未真正投入到桌边那些无休止的耳语中。尽管他知道自己必须投入其中。\n\n房间里的喧嚣中，有像科斯塔-席尔瓦、克鲁埃尔将军、弗罗塔这样的人物，还有几位他几乎辨认不出的空军军官，唯独，长官不在场。德尼斯的目光在房间内扫视，最终，他深吸一口气，开口道：“古拉特只能有两个选择。”话音刚落，整个房间陷入一片死寂，所有的目光都聚焦在他身上。\n\n“他要么离开巴西，”他故意停顿了一下，轻抿了一口桌上的矿泉水，“要么，他一踏进巴西利亚、打算发动工党时，我们就动手抓捕。”\n\n四周无人反驳。只有一连串的点头和摇头，技术性的讨论和行动计划在房间内此起彼伏。在德尼斯审慎的目光下，军官们紧锣密鼓地策划着。随着计划的成型和夜色的降临，德尼斯站起身，留下一句经过深思熟虑的话语，然后缓缓离开了房间。"
 BRA_mosquito.1.a: "“事成之后再说。”"
 BRA_mosquito.2.t: "英勇无畏"
 BRA_mosquito.2.desc: "布里佐拉几乎是冲上前去，紧紧握住若昂·古拉特的手臂，“你可能会被捕，甚至丧命！”他竭力劝阻，企图阻止朋友冲向险境。但古拉特只是微笑着摇摇头，将包从左手换到右手，仅仅为了拍一拍布里佐拉的肩膀。\n\n“我必须去巴西利亚。为了总统之位、为了自由和民主而战。如果连我都无法做到，巴西还能指望谁呢？”古拉特反问道，再次轻轻拍了拍他战友的背。布里佐拉焦虑地按住自己的脸颊，“若昂，你完全可以在南里奥格兰德做好准备，对抗可能的政变。那里会更安全……”\n\n“不管代价如何，我都必须去。”他打断了对方的话，双手紧握着行李袋，“但如果我被捕，我需要你照看我的家人，让埃德娜安全抵达乌拉圭。如果我失败了，一切都得仰赖她了。”\n\n郎舅两人紧紧拥抱，这是他们最后的告别，广播已经通知所有乘客登机。古拉特知道，没有他的南部地区将独自面对风暴，对此，他只能深深祈祷着。"
 BRA_mosquito.2.a: "“一路平安，杨戈。”"
 BRA_mosquito.3.t: "红日"
 BRA_mosquito.3.desc: "“就像老鼠对奶酪一样，”德尼斯自言自语道，他孤独的居所仅有军人和那些早早来到、咖啡因成瘾的政客们相伴。很快，古拉特就会轻松落入他的掌心，国家情报局和他麾下的一些士兵正在机场等待，准备随时将古拉特一网打尽。\n\n然而，德尼斯几乎没有时间庆祝这一切，一名年轻的军官突然闯入他的房间，气喘吁吁，急促的步伐让将军没有时间询问他的目的。军官举起一个信封，“您必须看看这个，德尼斯长官！”\n\n信封扔到了他的桌上，德尼斯还未来得及斥责这位军官的无礼举动，便因信件内容震惊得下巴差点脱落。他几乎不敢相信自己的眼睛，站起来一遍又一遍地阅读那些文字，一边不断地用手拍打着头，试图理解这一切。\n\n“死了……在他的飞机残骸中。坠毁了……这怎么可能？”德尼斯结结巴巴地说，他目光紧盯着文件，几乎没有注意到科斯塔-席尔瓦的出现。“德尼斯先生，”席尔瓦低声说，他终于开口，“我知道发生什么了。”\n\n德尼斯皱起眉头，看向席尔瓦，内心涌起的愤怒差点让他跌倒在桌子上，“你与此事有关吗，席尔瓦？”他问道，语气严厉但仍保持尊敬，“你怎么会这么快就知道？有什么是我应该知道的吗？”\n\n尽管席尔瓦一向以狡诈善变著称，但在那一刻，他拿出了一生中最真挚的态度，“很抱歉，德尼斯先生。这次我真没想到会这样……”"
 BRA_mosquito.3.a: "“离开我的办公室，我得想想。”"
 BRA_mosquito.4.t: "席尔瓦就职"
 BRA_mosquito.4.desc: "德尼斯差点没气晕过去，他努力压抑着自己的怒火。若昂·古拉特之死让他难以置信。这不是计划中的那样。他本该被活捉，在机场被逮捕，而不是在天空中被战机射下，狠狠摔在地上。这样的举动，虽然可能解决眼前的难题，但长远来看只会让事情变得更糟。\n\n洛特的女儿逃往乌拉圭，发表了一系列批判巴西政府的犀利演说，然后神秘地消失在古巴。美国对巴西政府的信心迅速下降，对政府的抵抗日渐明显，远超预期。\n\n科斯塔-席尔瓦举行了他的盛大就职宴会，本是值得纪念的一刻，但德尼斯的心思却飘远了。是谁执行了击落任务？很可能是空军在保护自己的人，试图掩盖真相。不过，这是席尔瓦需要解决的问题。\n\n席尔瓦从台上走下，与一众军官、政治家和立法者握手，庆祝新总统的就职。当席尔瓦紧紧握住德尼斯的手时，脸上挂着满足的微笑，但他并没有说话。在那一刻，德尼斯感到了疲惫。\n\n他已经厌倦了政治。他已经尽心尽力地为国服务了，现在是时候享受安宁，独自等待生命的尽头了。他想退隐到一个海滩上，也许离里约不远，足够近以触摸到那些金色沙滩，但又足够远，远离繁华城市的喧嚣，享受他梦想中的宁静。"
 BRA_mosquito.4.a: "一个时代即将结束。"
 BRA_mosquito.5.t: "鳄鱼"
 BRA_mosquito.5.desc: "她的父亲说得对。政治，就像一个充满狡猾凶猛鳄鱼的池塘，那些渴望在所爱的家园中见证变革的无辜者，往往成为它们的猎物。埃德娜决心要不要让无辜者的牺牲白费，但她首先得走上前台。\n\n尽管埃德娜试图掩饰自己的愤怒，但她脸上的红晕还是暴露了她内心沸腾的怒火。美国记者们向她提了几个问题，大多是关于她的生活和事业的，但有一个胆大的记者却提出了一个非常独特的问题。\n\n“你对巴西利亚的局势有何看法？”记者问道，笔和笔记本已经准备就绪。埃德娜需要一些时间来消化这个问题，但回答却像脱口而出的子弹一样迅速而直接。\n\n“若昂·古拉特之死可能是巴西的最大悲剧。他被独裁者谋杀，他的遗产支离破碎，他的工作远未完成。但我还在，我带来了巴西未来的希望。作为他的副总统，我必须强调，目前的政府完全非法，巴西现在没有一个合法的总统。”\n\n她的评论一出，记者们的问题蜂拥而至，他们的兴趣十分浓厚，似乎永远不会满足。即使有人质疑她身为女性，这也无关紧要。现在是时候，一步一步地清除那些觊觎巴西民主的政治鳄鱼了。"
 BRA_mosquito.5.a: "流亡中的余生？"
 brazil.464.t: "来自过去的回声"
 brazil.464.desc: "德尼斯坐在晨光中的餐桌旁，眼前铺展着报纸，眉头微蹙，沉浸在深深的思索中。库比契克再次坐上总统宝座，社会民主党在经历了如此多的波折后依然能够稳坐山巅，这不仅见证了这位归来的总统的魅力，或许亦彰显了洛特的影响力。\n\n那已是十年前的往事，却在他心中历历在目，仿佛就在昨日。他回忆起与洛特携手，在军中拉起一场运动，保护他们摇摇欲坠的民主，挫败全民盟的政变图谋。正是有了他们，库比契克才能享受他辛苦赢得的胜利。库比契克是否真的明白他为何要这么做？为了巴西宪政体制的稳定，他不得不背叛曾经的盟友，这一切他是否能够理解？德尼斯心中充满了疑惑。\n\n无论总统心怀何种同情，德尼斯都明白，这位领导人都是思维敏捷、理性十足。他已经证明了自己卓越的领导才能，他的经济策略曾引领巴西攀登新的高峰，致力于推动民主，并且与美国保持着良好的关系。只要他这次能更妥善地把控通胀，规避前任所犯的错误，他无疑能够再次展现出一位优秀总统的风范。"
 brazil.464.a: "以防万一，还是多注意提醒他。"
 brazil.465.t: "一份惊喜"
 brazil.465.desc: "在里约的家中，奥迪利奥·德尼斯一边喝咖啡吃早饭，一边读着晨报。在一晚上的紧张焦虑过后，他需要好好放松一下，来重新审视之前发生的事情。他把报纸放在餐桌上，心满意足地饮下一大口咖啡，回想着结果。\n\n通盘考虑过之后，这样真是再好不过了。卡洛斯·拉塞尔达并不完全赞同军方的所作所为，但他非常同情他们，他是美国人的朋友，致力于反瓦加斯主义、反共主义和反法西斯主义的事业。德尼斯认为，只要他不重蹈戈梅斯五十年代犯下的覆辙，他就是在洛特把一切搞砸之后巴西所需要的总统。\n\n他在心里许下祝贺，希望他能在昨晚的胜利中保持清醒，度过今天。但是，对于一个和夸德罗斯来自同一党派的人来说，这可能要求有点高了。\n\n元帅从椅子上站起来，为这一天剩下的时间做心理准备。赤匪和法西斯越来越嚣张了，他和他的手下一定要杀杀他们的威风，新总统无疑会支持他们。他最后喝了一口咖啡，走了出去。"
 brazil.465.a: "为一段友谊的开始干杯。"
 brazil.466.t: "黑马中的黑马"
 brazil.466.desc: "即使历经沧桑波折，生活依旧不断地向奥迪利奥·德尼斯元帅抛来意外之惊喜，雅尼奥·夸德罗斯的最新当选便是一例。就连他手中的晨报，上面的措辞也不乏惊讶？尽管德尼斯个人更期望全国民主联盟赢得选举，但雅尼奥出任总统还是让他几乎目瞪口呆。\n\n全国民主联盟选择雅尼奥本身就是一个惊人之举。虽说此人同为保守派，但他的许多议程却与支持他的政党背道而驰，尤其是在接受了现已被废黜的恩里克·洛特的副总统职位后，与该党之间的某些矛盾更是难以化解。其中最为人所诟病的，莫过于他的外交政策，这让德尼斯和他的战友们特别鄙视夸德罗斯的所作所为。而在个人层面，不得不向那个喜怒无常、古怪、冲动的酒鬼行总统之礼，已让德尼斯感到头痛不已。\n\n然而，这个人也并非一无是处。夸德罗斯的外交政策，虽然极端，但最终目的是强化巴西在国际上的地位，且不受各个超级大国的摆布。他对国家快速增长和通货膨胀的关注并非虚言，此人还致力于良好的基督教道德，并倡导反腐败。或许，一个对国家充满信心且拥有道德的人，正是巴西所需要的。更不用说，他毕竟不是阿德马尔或古拉特。\n\n他只是希望全民盟能够制约总统平日里的一些离奇想法。"
 brazil.466.a: "那好吧，他能有多糟？"
 brazil.467.t: "古怪的现实"
 brazil.467.desc: "德尼斯最初在收音机里听说阿德马尔·德·巴罗斯和他的社进党赢得了总统大选，心里还以为这只是个无聊的玩笑。然而，更多的报告与声明纷至沓来，德尼斯当天晚上一直都没睡好，他实在不敢相信这是真的。次日清晨，他手里捧着的报纸再次提醒他这个事实：阿德马尔当选了总统。德尼斯一瞬间甚至怀疑自己是不是疯了。\n\n更确切地说，是不是全国上下的选民都疯了？他不能理解，为什么一个公然无耻受贿的政客居然能募集到如此之多的拥趸。阿德马尔的政党和他本人一样，都是瓦加斯主义者，甚至还得到了那位前独裁者的支持！民众难道就没有察觉到吗？难道充满民粹主义的甜言蜜语和模糊的经济进步承诺，真得就能轻易说服大多数公众？\n\n他心里想，也许人们根本就不在乎。巴西经历了太多的苦难，通胀、债务、南非的暴力冲突、洛特的倒台，还有那无休止的腐败，这些都让人民筋疲力尽。他们是不是已经对政治感到麻木，甚至不惜选择一个如此肆无忌惮的领导人？\n\n德尼斯觉得也许这还不算最糟糕的情况。至少，阿德马尔和他的政党不像工党那样彻底走向共产主义，也不像民代党那样倾向于法西斯。这些极端政党可能会彻底摧毁巴西的民主，而不仅仅是玷污它。不过，阿德马尔的政党确实得到了军方的支持，而他也对此予以回报。尽管如此，德尼斯对祖国的未来仍然深感不安，也无法摆脱自己可能对这一切负有责任的感觉。"
 brazil.467.a: "未来阴云密布，但仍有一线生机。"
 brazil.468.t: "煽动家的问题"
 brazil.468.desc: "高原宫的一个闷热夜晚，洛特总统急召内阁成员开紧急会议。巴西外交部的报告刚送到他手中，乌拉圭竟然决定收留那个臭名昭著的切·格瓦拉，这个煽动者不仅把这里搅得天翻地覆，还公然鼓吹在整个南美洲推翻现政府的革命行动。更令人忧虑的是，他还打算亲自领头造反。\n\n“应该把那家伙拉到墙边毙了，”德尼斯将军气愤地说，“智利人和乌拉圭人抓到他却没立即行动，这简直是愚蠢和无能的表现！嘿，或许我们该派个小队去把那些胆小鬼不敢做的事给做了。”\n\n“不行！”洛特断然反对，“我们不能侵犯友邦的主权，绝对不行。”\n\n“那如果……”夸德罗斯颤抖着手，小声提议，“如果我们邀请他来这里，颁给他一枚勋章怎么样？毕竟，他也算是热爱这片大陆、为祖国奋斗的南美爱国者，只不过方式……有些特别。给他一点认可，或许能平息他的怒火。”\n\n“你疯了吗？！”会议室里的其他人异口同声地反驳道。\n\n“我绝不会和一个臭名昭著的恐怖分子握手！”洛特愤怒地说。\n\n德尼斯满是不悦：“知道怎么办吗？提醒蒙得维的亚巴西第三军的实力，那就够他们守规矩的了，历来如此。”\n\n“不行！用武力威胁也不是解决问题的办法，但是……萨莱斯。”总统转向外交部长，“告诉乌拉圭政府，为了区域安全，我们强烈要求他们立即驱逐格瓦拉。如果他们不采取行动，我们两国的关系将不可逆转地改变。我相信他们会听从我们的警告，毕竟让格瓦拉进入他们国境本身就是个愚蠢之举……”"
 brazil.468.a: "“……没有一个政府会愚蠢到让那人留在他们的国家。”"
 brazil.469.t: "深夜开会"
 brazil.469.desc: "宁静的总统府中，一阵急促的脚步声打破了夜的寂静，人们纷纷涌向其中一个会议室。他们为何在这个深夜聚集？没有人知道，也许在这个深夜里，没人有力气去思考这些。众人纷纷就坐，洛特总统开启了会议。“先生们，晚上好，很抱歉这么晚召集大家，但我们面临着一个关乎国家安全的重大问题。德尼斯，请你来说明。”\n\n会议室内的目光都转向了站在洛特旁边的男人上。“根据我们的消息源，巴拉圭局势已经失控。整个国家正陷入混乱之中。最糟糕的情况尚未到来，但我们担忧的丛林战争已经成为现实。”\n\n在场的人士都坐直了身体，他们审视着桌上散乱的照片和相关的报告。然后，他们齐齐地望向洛特，期待他给出答案。“……这正是我们不应公开介入的原因。在瓜伊拉瀑布的失败和龙虾战争后，我们不能再在与我们无关的外国土地上干傻事了。但我们可以通过幕后手段支持我们的盟友。”\n\n议论声在房间中响起，大家都在讨论巴西是否应该介入。然而，在他们来得及形成发言之前，一只拳头重重地敲在桌上，议论声戛然而止。“安静。我同意洛特总统的观点，我们现在搞不得对外干预。不仅是因为龙虾战争和瓜伊拉瀑布的问题，还因为我们的干预可能激怒阿根廷，引发更大规模的冲突。”\n\n洛特示意德尼斯平静下来，坐回座位。“是的，我同意。我想我们都看到了形势不妙，当前形势下任何直接的军事干预都是不明智的。不过，我想调第二军到边境以防局势进一步失控。”会议结束，与会者匆匆离开，回到自己的家中，而深夜慢慢迎来了黎明。"
 brazil.469.a: "巴拉圭的曙光。"
 brazil.470.t: "代替我去"
 brazil.470.desc: "一个戴着眼镜的男人急匆匆地穿过总统府的走廊。他刚从阿根廷回来，商讨了大坝事宜，现在颇为疲惫，却又好奇为何被召见到总统办公室。会议不是顺利完成了吗？为什么要这么急促地召唤他？他心中思索着，走到总统办公室的门前敲了敲。\n\n“进来！”门内立即传来回应。夸德罗斯推门而入。“啊，雅尼奥，请坐。”\n\n夸德罗斯坐下，面对着洛特。“是的，恩里克？为什么这么急着叫我过来？是关于大坝的事吗？”\n\n“不，不是那个。这是关于即将到来的东京、南京和华盛顿之行。今年很重要，我们不常有机会同时访问共荣圈和自由国家组织，对吧？”\n\n“是的，我同意。但这和我有什么关系？访问这些国家是你的职责，不是我的。”夸德罗斯回答，困惑地摘下眼镜，舒适地坐在椅子上。\n\n“没错，但我们不想因此惹恼美国。你将代表我去共荣圈，拉来日本对巴西公路项目的投资，而我会前往华盛顿，向我们的美国朋友们保证。我们希望在世界舞台上呈现出最佳形象，既要拉到旭日帝国的投资，又不能惹恼山姆大叔。这次会面至关重要，所以我希望你尽力而为。”洛特点燃一支烟，叹了口气。“……埃德娜也想跟你一起去，尽管我劝她不要进入政界。”\n\n“明白了，不过如果你不希望她来，我也没关系。”夸德罗斯重新戴上眼镜，突然用手帕绑在鼻子和嘴上，做成了一个面巾。洛特困惑地看着他，夸德罗斯回答道：“对不起，是因为烟味。”洛特点头站起来。\n\n“她必须来，现在我得去检查部队了；祝你好运，雅尼奥。”洛特快步走出房间，留下夸德罗斯独自沉思。"
 brazil.470.a: "前往旭日东升之地。"
 brazil.471.t: "父女俩的谈话"
 brazil.471.desc: "恩里克·洛特沿着总统办公室的坡道缓步而下，他忽然听到了有人在呼唤他。令他感到欣慰的是，这次不是工作人员急匆匆地来报告最新的工人罢工，更不是关于雅尼奥的事情。转头一看，他看到了身着西装、打着领带的女儿埃德娜正向他走来，这让他有些意外。\n\n“埃德娜，你为什么穿得这么正式？”恩里克问道。埃德娜自信地回答：“爸爸，今天我要去和布里佐拉会面，讨论我的众议院竞选事宜。”听到这话，洛特家族的家长心中开始涌现出担忧，看着他的女儿准备投身到一个充满危险的政治领域。\n\n恩里克吞了吞口水，声音略带严肃：“听我说，埃德娜，我知道你意图良好，但作为你的父亲，我必须坚持我的立场，政界对于女性来实在有太多的风险了。”这位忧心的父亲如是说，而埃德娜只是轻轻叹息。“那不过是一个充满危险的水池，里面潜伏着的鳄鱼随时准备攻击，摧毁你的——”\n\n埃德娜打断了他：“我已经决定了，爸爸；我想要在这场战斗中站出来。这是为了巴西的利益。”她的父亲很快意识到，自己的话语无法改变她的决定。\n\n“好吧，那我相信你能应对这个挑战，”恩里克最终妥协了。“你知道的，雅尼奥被派往共荣圈，目的是保证日本的外资可以持续注入到巴西，我信不过那家伙，所以我需要你去留意他是否有什么不当行为。”埃德娜微笑着点头：“这正是我想跟你谈的，我会确保一切顺利。”\n\n“好吧，那祝你好运，我现在得去视察部队了。我爱你，埃德娜。”恩里克说着，他和女儿简短地拥抱了一下，“我也爱你，爸爸。”就在元帅转身离开的那一刻，他突然停下了脚步，“喂，埃德娜……”"
 brazil.471.a: "“别让雅尼奥碰酒。”"
 brazil.472.t: "度假目的地"
 brazil.472.desc: "副总统的办公室今晚十分忙碌，雅尼奥·夸德罗斯和他的助手们围坐一桌，为即将到来的访问共荣圈做着最后的筹备。这将是这位古怪副总统面临的最关键任务，因为访问这个全球第二大经济体可能为巴西经济带来急需的投资，甚至有可能加速跨亚马孙公路的建设！当其他人讨论着即将到来的伟大机遇时，雅尼奥却在思索如何让这次访问变得非同寻常。\n\n“副总统先生。”一名助手打断了他的沉思，“我们认为已经制定出一个完美的计划。一旦您抵达东京，我们将……”\n\n“东京？不，那不行！”雅尼奥突然爆发，房间顿时陷入静默，所有人都用困惑的眼神望着他。“如果我们先访问日本，这趟行程将显得乏味。我们应该先去南京！”\n\n“副总统先生，如果我们先访问中国，日本方面可能不会满意。我们可能失去他们的信任，甚至可能失去我们所需的投资——”\n\n“胡说八道！”雅尼奥打断他，“我敢肯定首相会非常高兴知道他的国家是这次访问的重头戏！”\n\n随着房间的声音逐渐升高，许多人尝试着说服雅尼奥不要先去中国，埃德娜·洛特与社民党成员们紧张地聆听着这场讨论，听着雅尼奥那番荒谬的言论，不少人都差点笑出了声。片刻后，埃德娜走向电话，拨通了她父亲的号码。\n\n“父亲，您好。看来即使没有酒精的影响，雅尼奥仍然……非常固执。他似乎坚信先去中国而不是日本是个好主意。如果他的团队不能说服他改变主意，他就会让巴西变成全共荣圈的笑柄！”电话那头，恩里克·洛特听后重重地拍了拍脸，发出了沉重的叹息声。"
 brazil.472.a: "“我今天要和他谈谈。”"
 brazil.472.b: "“我太忙了，让他的代表团自己处理吧。”"
 brazil.473.t: "不受欢迎的惊喜"
 brazil.473.desc: "“他们打算去哪里？”藤山爱一郎的语气中流露出难以置信的困惑。\n\n“巴西副总统和他的随行人员已决定先访问中国。他们改变了飞行计划，现在正前往南京。”助手带着苦涩的表情回答。\n\n爱一郎的震惊渐渐平息，脸上浮现出不悦的神色。他实在无法理解那个人的想法；他叫什么来着？夸德罗斯？那个傻瓜有没有意识到这是多么大的侮辱？如果爱一郎不是商人，他早就取消了这次会面。但他比任何人都更清楚交易的重要性。这件事可以被原谅，但绝不能被忽视。\n\n“我明白了。我会向天皇陛下和首相报告此事。同时，请你向洛特总统传达一个信息。告诉他我们对此表示失望，但愿意对这次……”爱一郎稍作停顿，寻找恰当的措辞。“事件予以宽容。但请强调，我们希望他的班子不要再犯类似的错误。”"
 brazil.473.a: "“希望他们不要再考验我们的耐心。”"
 brazil.474.t: "艰难的起步"
 brazil.474.desc: "埃德娜·洛特感到头痛正逐渐侵袭而来。她正处于自己一生中最关键的外交任务之中，而她本应监督的那位先生却已经让一切偏离了轨道。她父亲的副总统竟然有了一个“绝妙”的主意，决定首先访问中国，然后将造访日本安排在了这次行程的“高潮”位置。究竟是谁会在飞行中途突然改变商务行程目的地呢？更何况要去的还是一个超级大国。\n\n从机场仓促布置的安保和几乎没有仪式感可言的迎接来看，中日两国对这次突如其来的改变显然和她一样措手不及。唯独新闻媒体反应不同，迎接的记者们要么急切地等待，要么就乱作一团。或许雅尼奥对此同样感到困惑，但他却丝毫没有显露出来，反而是信步走向大批记者，迎接他们密集的提问。\n\n他为何在飞行途中改变了计划？洛特总统是否同意了这个安排？这是否对日本构成冒犯？他的这番举动意味着什么？他的日程还会有其他变化吗？\n\n埃德娜只能猜测，夸德罗斯的自信或许就是所谓的“酒壮人胆”。她目睹夸德罗斯向人群挥手，然后开始回答他们一个个的问题。"
 brazil.474.a: "“中国的历史文化丰富多彩，我怎能抗拒？这不仅是一次日本之旅，也是一次中国之旅！”"
 brazil.474.b: "“朋友们，到时候再说原因，我现在迫不及待要看看大熊猫了！它们在哪呢？”"
 brazil.474.c: "“日本是全世界发展中国家的奇迹和榜样，因此，我决定把最好的部分留到最后。”"
 brazil.475.t: "但这不在日程表上"
 brazil.475.desc: "“是的，泽田先生，我明白。”\n\n在巴西的总统办公室里，洛特总统正与愤怒的日本大使交涉。电视机前，他目睹着副总统雅尼奥·夸德罗斯意外抵达异常空旷的上海龙华机场的场景。按计划，雅尼奥应在东京与裕仁天皇会晤，拉开对日本的正式访问序幕，开展一系列重要商业会谈。然而，他突如其来的决定在日本和巴西政府之间引发了一场外交风波，两国皆措手不及。\n\n“我非常荣幸能够访问中国这样伟大而古老的国度。实际上，我认为巴西和西半球的许多国家仍有很多东西可以从中国和东方学习。”雅尼奥对着在场的少量记者解释道。“至于访问日本的安排，”他接着说，“我向天皇陛下和日本政府保证，他们无需担心。实际上，访问中国给了我更多的准备时间，因为我计划让我的东京之行成为一场让后世难以忘怀的盛事！”\n\n“是的，泽田大使，我会确保雅尼奥遵循新的日程，并及时通知贵国政府关于这场‘盛事’的详情。我向您表示歉意，泽田先生，这对我而言同样尴尬。我保证，他不会再更改日程。请向天皇陛下和首相转达我个人及巴西政府最诚挚的歉意。祝您晚安。”\n\n挂断电话后，洛特总统坐在沙发上深深吸了一口气，尽力平复自己的情绪。\n\n“那个该死的白痴！为什么他就不能像正常人一样行事，哪怕只有一次？”洛特总统在沙发上大声抱怨着自己的挫败感。“不过，从好的一面来看……”"
 brazil.475.a: "“至少那帮美国人会很高兴。”"
 brazil.476.t: "晚餐与提议"
 brazil.476.desc: "中国是个美丽的国度——前提是忽略践踏这片土地的法西斯铁蹄。夸德罗斯抓住一切机会欣赏这个被征服国家的风景与文化。尽管这并非易事，因为中日双方的谈判代表和洛特的眼线们始终如影随形，监视着他的一举一动。\n\n那个退伍军人以为他应付不来？哈，看看现在是谁被打脸！谈判进行得出奇顺利，转眼间他就让大东亚共荣圈里两个最重要的国家代表对他言听计从。此刻他只需与外交官们闲话家常，再享用一顿地道的北京烤鸭。他正要举杯痛饮，忽然注意到一位中国官员正试图引起他的注意。\n\n“副总统先生。”随行翻译立即为他转述，“为庆祝两国新缔结的友谊，我们想赠予巴西一份国礼——来自中国著名动物园的大熊猫。”官员露出矜持的微笑，而夸德罗斯的眼睛已经亮了起来，“只要您需要，我们随时可以安排安全运输。”\n\n夸德罗斯早已打定主意要把这珍稀动物带回巴西。现在的问题是：该立即接受这份厚礼让所有人知晓，还是稍作拖延给日本人通个气？他确信东京方面不会太介意，但那些家伙似乎总对意外惊喜过敏。"
 brazil.476.a: "宁求事后谅解，也不企求许可。"
 brazil.476.b: "也许可以再商量一下。"
 brazil.477.t: "意料之外的尴尬"
 brazil.477.desc: "埃德娜与日本外交官们谈笑风生时，嘴角始终挂着从容的弧度。这次夸德罗斯破天荒地按部就班行事，他们的心血终于开花结果。当然，她还是要继续盯着这个不省心的上司。此刻副总统正与其他外交官向媒体介绍贸易协定，而她与日方代表们站在侧翼观望。直到此刻，一切尚算顺利。\n\n“还有最后一项喜讯要宣布！”夸德罗斯脸上那种雀跃神情，让埃德娜瞬间涌现不祥的预感，“经中华民国政府许可，里约热内卢的国家动物园将迎来新成员——大熊猫！”\n\n等等，什么时候的事？日方代表们与她同样震惊，却明显更加愠怒。当记者们兴奋地追问时，某位日本外交官勉强回应协议“尚在草案阶段”。反观中方代表们个个春风满面，显然为当众摆了他们宗主国一道而暗自得意。\n\n埃德娜迅速敛去惊愕，转向面色铁青的日方官员，端起最职业的外交微笑：“先生们，看来我们需要深入磋商。不如移步茶室详谈？”"
 brazil.477.a: "越来越荒谬了。"
 brazil.478.t: "猛然惊醒"
 brazil.478.desc: "夸德罗斯本就辗转难眠，突然有人疯狂捶打他的卧室门。见鬼，谁会在深更半夜扰人清梦？他低声咒骂着趿拉睡衣冲向门口，猛地拽开门就要发作——门外荷枪实弹的日本特工让他瞬间噤声。\n\n“先生。”其中一人用生硬的葡萄牙语开口，“我们侦破了一起针对您及随行人员的反政府暴恐阴谋。为确保安全，必须立即护送您登机撤离。”夸德罗斯如坠冰窟。有人要杀他？接下来一小时混乱模糊，他与特工们仓促收拾团队物品后夺路而逃。\n\n机舱内气氛凝重：巴西使团成员们或瑟瑟发抖，或面红耳赤地攥紧拳头。埃德娜垂首凝视膝头，睫毛都不曾颤动。当飞机冲破云霄将旭日之国抛在身后时，夸德罗斯仍心乱如麻。究竟是谁要置他们于死地？他试图与埃德娜搭话：“真是一团糟，对吧？但愿他们能逮住那群杂种。”闻言她终于抬头，却用晦暗难明的眼神凝视他良久，最终缓缓摇头重新埋首膝间，徒留他满腹疑云。"
 brazil.478.a: "是我说错了话吗？"
 brazil.479.t: "看看你干的好事"
 brazil.479.desc: "夸德罗斯甫一踏上巴西国土，就被不由分说押往晨曦宫。洛特总统办公室内寒气逼人，剑拔弩张。总统本人目光如刀，失望与愤怒在他脸上熔铸成铁青的面具：“你知道自己捅了多大篓子吗？运气好的话，协议最多延期一年。可你那些滑稽表演，让整个国家蒙羞！”\n\n夸德罗斯梗着脖子怒目相视：“我尽了最大努力。若任由日方摆布，那才是奇耻大辱。”他声线紧绷，仿佛下一秒就要咆哮。\n\n“努力？”洛特的面部肌肉因盛怒而抽搐，语气从难以置信转为森冷，“你所谓的努力就是当面指控日本把我们当提线木偶？”他十指交扣强抑挥拳的冲动，“更何况，我才是总统——谁允许你擅自重谈条款？”\n\n“许可？”夸德罗斯用食指推了推眼镜冷笑，“真当自己是巴西的裕仁天皇？容我提醒陛下，人民选我是为了他们的利益，不是你的！”\n\n洛特猛然起身，椅子在地板上刮出刺耳声响。他双拳抵着红木办公桌，喉间滚出雄狮般的低吼：“够了！召你来是为听你解释，现在看来没必要了。滚出去。”夸德罗斯欲言又止，最终嗤笑一声摔门而去。"
 brazil.479.a: "嫌隙加深。"
 brazil.480.t: "双赢的协议"
 brazil.480.desc: "有时候，谨慎比勇气更为重要。这是一个夸德罗斯熟知却并不太喜欢的原则。然而，他不得不承认，他的助手们提出了一个合理的看法；虽然赠送熊猫本身并不是什么大事，但激怒那些敏感的日本人可能带来的头疼问题，显然不值得他再冒险。\n\n接下来是一些乏味且简短的讨论，最终以日本人的无所谓姿态和对交易的默许告终。他们为什么要反对呢？毕竟这笔交易对他们也没啥损失。\n\n抛开他的无趣不谈，一切都进展得很顺利。日本人得以插手他们傀儡的事务。中国人取得了一次小的外交胜利。而他，为巴西带回了一份非凡的礼物。现在，只剩下最后一个问题。\n\n“我们什么时候可以见到它？”"
 brazil.480.a: "谁说鱼和熊掌不可兼得？"
 brazil.481.t: "别了，中国之夜"
 brazil.481.desc: "雅尼奥·夸德罗斯和埃德娜·洛特穿越中国的旅程，是他们一生中难以磨灭的记忆。从总统府的雄伟景象到日常生活的喧嚣，再到节日的欢腾和精致的餐宴，这些都成为了他们行程中的亮点。尽管旅途并非一帆风顺，巴西副总统时而冲动、时而古怪的行为，加上日本外交官的古板性格，造就了一些尴尬的时刻。\n\n然而，这趟旅行最终还是收获颇丰。中国的大米换取巴西的橙子，钢铁换取工业产品，夸德罗斯之前的承诺终于在他的迂回之旅中得以实现。当夸德罗斯及其随行人员向他们的东道主表达感激之情时，副总统心中涌现出强烈的自豪感和成就感。他在飞机上休息，满怀期待地飞向蓝天。\n\n而在遥远的总统府里，恩里克·洛特只能祈祷，夸德罗斯不会在最后关头掉链子。"
 brazil.481.a: "希望他能一直好好表现。"
 brazil.482.t: "拂过樱花"
 brazil.482.desc: "经过漫长疲惫的航程，雅尼奥·夸德罗斯及其代表团终于抵达日本。步出舱门时，他瞬间被如潮水般涌动的欢迎人群震慑——挥舞的日巴两国旗帜交织翻涌，此起彼伏的欢呼声浪几乎将他淹没。站在廊桥上的夸德罗斯恍惚间产生了身临总统宝座的错觉，他扬起手臂，向沸腾的人群致意。\n\n这位巴西副总统踏上舷梯下的红毯，在警卫们困惑目光的包围中，他仿佛喝醉了酒般踉跄前行，脸颊因过度兴奋而涨得通红。红毯尽头的井野硕哉早已候立多时，两人按照东方礼仪互相深鞠一躬，镁光灯随即在寒暄的间隙炸亮。\n\n此时NHK记者迅速围堵上前，连珠炮般追问此次访日的战略意图及其对巴日关系的深远影响。夸德罗斯的社交舞步戛然而止，喉结在西装领口处急促滑动，似乎在字斟句酌。\n\n地球另一端的总统府里，洛特抿着威士忌观看直播画面。看着自己这位“搭档”安然踏上异国土地，他晃动着杯中琥珀色液体，思绪已飞向即将到来的华盛顿之行。而在美国大使馆内，林肯·戈登大使额角渗出冷汗，东京传来的画面在他眼中已然化作笼罩巴西利益版图的阴云。\n\n夸德罗斯深知此刻每句话都可能成为引爆国际舆论的导火索。当记者们齐刷刷将话筒聚成钢铁丛林时，他深吸一口气……"
 brazil.482.a: "……表示期待与日本建立更牢固的经济和外交关系。"
 brazil.482.b: "……表示希望在日本观赏美丽的樱花并与天皇会晤。"
 brazil.483.t: "诚挚道歉"
 brazil.483.desc: "夸德罗斯的心脏剧烈跳动，山雨欲来的压迫感几乎要压弯他的脊梁——他终于意识到自己信口开河的严重性，或者说这场危机因何被放大。修补巴美关系裂痕的重任注定要压在洛特肩头，而他几乎能预见善后时同僚的雷霆之怒。\n\n“洛特阁下，我们驻日本的联络员传来令人不安的情报。”美国大使林肯·戈登说道，“贵国副总统的某些言论，似乎与日本宣传机构的论调产生了令人不快的共鸣。”\n\n“戈登先生，我以人格担保，夸德罗斯绝无任何亲日倾向。”洛特脸上绽放出政客特有的完美微笑，“这显然是媒体断章取义造成的误会。你知道，现代媒体总爱对政客的言论断章取义。”\n\n“或许谨慎行事才是上策。虽然美国依然在政治上全力支持您，但贵国内部若出现以夸德罗斯为首的反对势力……”"
 brazil.483.a: "“真的非常抱歉，戈登先生。”"
 brazil.484.t: "国会演讲"
 brazil.484.desc: "夸德罗斯注视着眼前的听众，心中泛起一股敬畏之情。他站在一个宏伟的大厅中，周围坐满了他所认识的政界巨擘，他们见多识广，同时也颇具洞察力。他相信埃德娜的精心筹备足以让他在日本国会发表一场出色的，至少也是体面的演讲。他轻轻抬手，吸引在座人士们的注意。\n\n“日本展现了其作为全球楷模的能力，如何使一个国家在经济上茁壮成长，这是世界各国都可借鉴的榜样。对我个人而言，日本在巴西的发展道路一直是我的灵感之源。”他稍作停顿，手指轻敲着桌面，继续说道。\n\n“日本文化中所蕴含的保守道德观和深厚传统价值，共同铸就了国家的坚实与康健。再加上它与泛亚兄弟国家的团结和区域合作，构成了拉丁美洲无疑将受益匪浅的模范。”虽然演讲简短，但它并没有在与会者中留下任何不快的印象，反倒为夸德罗斯赢得了礼貌的掌声。"
 brazil.484.a: "又一次避免了争议？"
 brazil.485.t: "游历东京"
 brazil.485.desc: "夸德罗斯终于做到了，他巧妙地摆脱了洛特派来监控他的助手和密友。至少在这一刻，他是自由的，自由地沉醉于东京及其绚烂多彩的科技黄金时代的魅力中。那些灯光耀眼至极。\n\n即便在里约，夸德罗斯也从未体验过如此奢华的环境，这里几乎让他觉得自己置身于一个天外世界。小吃摊和纪念品店遍布街头，给这条街注入了一股舒适的商业气息和蓬勃生气。\n\n有那么一刻，夸德罗斯几乎忘记了自己只剩几个小时就要回归繁重的职责。会议、采访和演讲等着他，但他更愿意沿着这条灯火辉煌的街道漫步，远离他曾发誓要全心投入的政治。他耸了耸肩，决定在最后的时光里不再担忧，尽情享受。正当此时，他的目光落在了几瓶清酒上……那是一种酒精饮料，比巴西的任何酒品都要美妙。虽然他需要保持清醒以应对即将到来的会议，但他心里想着……如果只是尝一点点……"
 brazil.485.a: "“喝一杯没什么不好吧？”"
 brazil.485.b: "“不，我想还是算了。”"
 brazil.486.t: "皇室的礼遇"
 brazil.486.desc: "夸德罗斯以一种优雅的风度步入迎宾区，他的到来比预定时间提前了几分钟。他的全身装扮正式且得体。在几位引路人的带领下，他走过长长的走廊，左弯右拐，在皇居迷宫般的走廊中穿行，最后终于抵达了一扇大门背后的宽敞空间。\n\n面对天皇的庄严仪式，夸德罗斯带着敬畏鞠躬致意。这是一次独特的经历，周遭的氛围似乎散发着一种难以言喻的重要性。他与天皇的对话虽然简短，但很快这次会面变得极为富有成效。\n\n他如释重负地叹了口气。他知道从此以后，事情将会有所不同。日本人现在认识到了夸德罗斯是一个值得信赖的人，对他们在巴西的工作及其个人利益大有裨益。不同于巴西的社民党，日本拥有良好的谈判基础和相互尊重。"
 brazil.486.a: "圆满成功。"
 brazil.487.t: "皇室的……困惑？"
 brazil.487.desc: "夸德罗斯的脸色宛如从恐怖故事中走出，疲惫至极，虽未沾染尘垢，却深受宿醉之苦，内心挣扎于是将胃里的东西全部吐出换来解脱，还是勉强让一切留在体内。他迟到了整整二十分钟，天皇竟然愿意等待这么久，本身就是个奇迹，尽管他的迎接礼节显得相当冷淡。\n\n这次的会谈颇为尴尬。尽管各方表面上彼此尊重，但在场的日本官员们流露出的不悦之情，显然是受了夸德罗斯缺失适当礼仪的影响。站在他们的角度来看，恰当的形容词或许是“有用，但不稳定”。他是一件极佳的工具，出色的助手，但却不是一个条理清晰的人。\n\n如果不是因为他刻意表现出的清醒，极其小心地行事以免完全浪费这次机会，情况可能就完全不同了。夸德罗斯算是成功了，可是换来的效果却不明显。日本人明显对这次会面感到失望。\n\n“他们看起来不太满意，”一位助手低声说道，密切注意着夸德罗斯的举止，“日本人对错误的容忍度很低，尤其涉及违背他们文化习俗的时候。”"
 brazil.487.a: "真是尴尬。"
 brazil.488.t: "那些唱反调的人……"
 brazil.488.desc: "经过漫长等待，终于到了夸德罗斯此行的初衷所在——库比契克所构想的协议即将成为现实。巴西将迎来工业化的春风，日本将获得农业上的收益，还有对抗美国的一次小胜，洛特将为他昂贵无比的公路获取所需设备，而他，将在这份重要的文件上留下自己的签名。似乎每个人都得到了他们想要的。\n\n但事实真的如此吗？夸德罗斯心知这笔交易并非众人所想的那般公平。在圣保罗，有农民会因此处于不利地位；或许他还能为他们做些什么。等等，现在是不是已经太迟了？他静立一旁，眼见记者们围绕着那摆放着文件的桌子，他的脑海中闪过一个念头。\n\n他可以制造一场混乱，要求更多让步。即便日本人不会听他的意见，他也能向巴西的民众表明，即使洛特置之不理，他也在为普通人而战。另一方面，从已经达成的协议中争取更多利益来换取国内民意，似乎又显得有些目光短浅。纠结的选择，摆在他面前。当一位男士递给他一支笔时，夸德罗斯做出了决定。"
 brazil.488.a: "呃，也许我不应该铤而走险。"
 brazil.488.b: "去他妈的协议，农民应该得到更好的待遇！"
 brazil.489.t: "……永远保持冷静"
 brazil.489.desc: "夸德罗斯微笑着接过递来的笔，尽管他的内心并不完全满足。有时候，你必须善用手头的筹码，哪怕这意味着牺牲一些人和机会。此外，此时再延迟这笔交易显得有些小气。他会有更多机会在选民面前展现自己。至少，在签署协议时，这是副总统的思路。那天晚上，在巴西大使馆举行的庆祝宴会上，琳琅满目的饮品很快让他忘记了先前的烦恼。\n\n对日本人而言，这也是值得庆祝的一夜，他们在美国的后院成功迈出重要一步，巴西这个重量级的投资目标国家成了他们的战利品。这位南美巨人的副总统因对美国持有怀疑而闻名，或许未来的某一天，旭日的光芒将照耀亚马孙丛林。\n\n在巴西国内，这项协议的签署受到热烈的欢迎。尽管还需参议院投票通过，但这项议案得到了两党的广泛支持，投票结果几乎毫无悬念。洛特总统为这项顺利且无任何意外的任务感到欣慰。如果运气好的话，余下的访问也将一帆风顺。"
 brazil.489.a: "又一天，又一场胜利。"
 brazil.490.t: "……立即发言"
 brazil.490.desc: "埃德娜·洛特静静欣赏着眼前的景象。夸德罗斯正认真对待着一切；巴西的同僚们站得笔直，为媒体呈现出最佳形象，日本的同行们看起来很满意，记者们也已经准备好了摄像机。一切似乎都在按计划进行——等等。\n\n他为什么不拿笔？为什么他在清嗓子？他为什么突然谈起圣保罗的大豆农民？让步？！\n\n夸德罗斯对面前震惊的人群开始了长篇大论，埃德娜再次打量了一下周围的环境。巴西代表团的成员看起来惊恐万分。日本人则像是看到她父亲的副总统长出了第二个头颅一样惊诧。而摄像机仍在拍摄。\n\n埃德娜回想起这次事件，对她的团队感到些许自豪。在最初的震惊之后，他们以惊人的技巧迅速应对了这场危机；不出几分钟，他们就让夸德罗斯收回了言论，重新赢得了日本人的信任，并促成了协议的签署。他们唯一无法阻止的是所有记者们都会对此大做文章。最糟糕的是，她毫不怀疑，夸德罗斯的支持者们，特别是那些在圣保罗的人，会对此大加赞扬。"
 brazil.490.a: "但愿其他人不会这样。"
 brazil.491.t: "日本拜拜，你好中国"
 brazil.491.desc: "夸德罗斯笑着醒来，步履如同雀跃。昨天几乎完美无缺：协议签成了，庆祝活动精打细算，晚餐美味可口，埃德娜忙得无暇纠缠，杯中酒更是酌饮不停。或者，至少，他确信事态就是这样发展的。在把巴西驻日大使馆变成里约热内卢以东最好的地方的大约两个小时后，有人拿来了一些“特殊”的清酒，让他的记忆变得有点模糊。\n\n呃，可能还好；担心也改变不了什么，他还要赶飞机呢。东京的天际线消失在他身后时，夸德罗斯花了一点时间来回忆他和外交团队度过的美好时光，然后对前方的目的地产生了新的期盼。喔，中国，他马上就能看到了——质朴的乡村，发展中的城市，古老的景色，还有大熊猫！这将是一次美妙的外交（假期）之旅。现在，如果，他能让日本人放松一点的话。"
 brazil.491.a: "也许他们没那么严肃？"
 brazil.493.t: "外交拉锯战"
 brazil.493.desc: "夸德罗斯平日里很少会迷失方向，但现在，他手中的两封邀请函却让他陷入了深思。本来，旅行应该结束了，访问已经完成，协议已经签署，剩下的就是回家；这可能正是洛特所期望的。然而，另一方面，巴西从亚洲的两个工业中心获得正式邀请的机会并不多见。\n\n广东和满洲——共荣圈中的新星和老牌工业强国。一个是繁忙的科技产业中心，创新的圣地，着眼于未来；另一个则是日本帝国昔日的金矿，源源不断地为超级大国提供资源。两国争相拉拢外国投资，就连巴西的普通民众都知道。\n\n夸德罗斯不禁为两国争相拉拢他感到些许自豪，但可惜的是，他深知自己不可能两头兼顾。洛特会坚决反对，但他可能会与其中任何一个国家建立新的贸易协议持开放态度。乍一看，满洲似乎是理所当然的选择；毕竟这次访问的初衷是工业化，而满洲在这方面已有不小的成就。另一方面，广东的前景充满希望，出访广东可能会让巴西站到世界变革潮流的前沿。当然，这两个选择都背负着对本土民众的剥削和痛苦的污点。或许，出于道义，忽略这两个选择比任何经济利益都更加重要。"
 brazil.493.a: "呃，我们是来追寻工业化的，那就去满洲吧！"
 brazil.493.b: "让我们看看广东的小机灵鬼们在鼓捣什么好玩意儿……"
 brazil.493.c: "哼，算了吧！咱们还是回家去吧。"
 brazil.495.t: "小满洲里的大买卖"
 brazil.495.desc: "一踏上满洲的土地，夸德罗斯便察觉到他们正受到监视。自从踏入共荣圈以来，这种被监视的感觉并不陌生，但此刻的气氛却截然不同。这种关注似乎并非出于对他安全的考虑，却又难以捉摸其真实意图。他们的东道主对他及随行人员的控制异常严格，一下飞机便直接被送往酒店，直到安排的时间才带他们去参观满洲自豪展示的工业区，参观一结束便立即返回。\n\n尽管氛围让人感到不适，但这里的工业成就着实令人赞叹。满洲帝国经历了无数磨难与考验，如今却蜕变为亚洲最重要的工业巨头之一。的确，他们在这一过程中可能采取了一些不太光彩的手段，但夸德罗斯思索着，或许巴西可以从这里汲取一些灵感。\n\n在满洲的实业家们对他们的展示感到满意后，他们与夸德罗斯面对面地展开了商务洽谈。谈判过程相当简短，每个人都清楚自己想要什么，夸德罗斯甚至还说服满洲人在协议中为巴西南部增加了额外的投资。现在唯一的问题是，这份协议将为南部带来的是更多的工业发展，还是农业的机械化？"
 brazil.495.a: "我们要继续推动工业发展。"
 brazil.495.b: "农民应该得到点实惠。"
 brazil.496.t: "惆怅告别"
 brazil.496.desc: "有趣的是，这笔交易反倒是此次行程中容易的部分。真正的挑战，在于说服东道主让他去观光。虽然满洲人给他配备了无数的导游，但却以安全为理由，坚决不让他自由参观。随着时间推移，夸德罗斯渐渐明白过来，分配给他的保镖为何如此森严。其实这并非为了他的安全着想；迄今为止，他从未感受到满洲国内地下组织活动的威胁。真正的目的，是为了遮掩他们不想让他看到的真相。\n\n他们虽然上演了一出盛大的戏码，但某些事实是掩盖不了的。几乎每一处美景都被工厂的黑烟和其他污染物所破坏。那些号称拥有令人印象深刻的设计和建筑的城市，虽然道路被打扫得一尘不染，但你依然可以看到无家可归者和社会边缘群体被赶往暗巷。工人和劳动者虽然展现出了完美的笑容和最洁净的制服，但若你细看，依然可以发现他们身上的旧伤。如果非要称呼满洲的话，它就是一个表里不一的丑陋国家。\n\n夸德罗斯无法改变这一切，他已经完成了此行的目标，于是他把那些不快的情绪深深藏在心底。然而，他登上回国的飞机时，步伐比平时更快。他在起飞前系好安全带，偶然间瞥见埃德娜忧郁的表情。飞机平稳升空后，他示意空乘过来，要了两杯饮料。递给埃德娜一杯后，他带着一丝苦涩的微笑说道。"
 brazil.496.a: "“这地方烂透了，不是吗？”"
 brazil.498.t: "未来将至"
 brazil.498.desc: "虽然夸德罗斯答应广东商人给他们演讲，但他其实也不知道能从中得到什么。他知道的是，他见到了一个无比繁荣的广东。他见识了灯红酒绿的城市，认识了科技创新界的巨头们，见识了他们既能生产日用品，又能生产唱片和武器的工厂。他感觉自己穿越到了未来。面对着形形色色的观众们，夸德罗斯对广东的繁荣表示了赞赏，同时也不忘提及巴西与共荣圈国家的合作问题。\n\n从日本的技术专家到中国的工人，每个观众都为夸德罗斯的演讲喝彩。演讲结束后，一些商人便邀请他秘密商讨贸易协定问题。其实他们早就准备好了，给了夸德罗斯两个选择：第一个选择以洛特的亚马孙公路计划为核心，具体来讲，是为公路的建设提供工具和机械，加快建设进程，从而消除因此产生的巨额债务。第二个选择是加强共荣圈与巴西的科技贸易，以此巩固巴西在南美地缘政治格局中的地位。"
 brazil.498.a: "这条公路越早完工越好。"
 brazil.498.b: "再跟我说说你们推出的新产品吧。"
 brazil.499.t: "有缺陷的未来"
 brazil.499.desc: "谈判一结束，夸德罗斯和他的同僚便满心期待地展开了在广东各大城市的夜游。这次体验，无疑将成为他们铭记一生的珍贵回忆。巴西虽然也有宏伟的大都市，但广州、澳门与香港的独特魅力却是无与伦比的。尽管需要一番努力，他们还是克制住自己，没有将这次旅行变成一场购物狂欢。相反，他们认真记录了各种发展动态，以备未来参考。尤其让夸德罗斯感兴趣的，是广东在军工方面的进展以及便携式音乐播放器和音响系统，前者是站在巴西的角度考量，而后者则是他个人的喜好。\n\n然而，并非一切都是那么完美。广东所散发出的不平等氛围难以忽视，贫困和社会边缘人群随处可见。浓烈的烟雾遮盖了天空，若是仔细观察，还可以在隐蔽的巷子或街角发现搜寻猎物的帮派分子。最让人不安的是，他在城市中处处可见的安全网，经过深入询问才得知，这些竟是用来防止自杀的设施。\n\n尽管如此，夸德罗斯还是带着轻松愉快的心情登上了返程飞机。他相信，只要广东能合理解决其面临的贫困、犯罪、污染和职场生活的糟糕问题，同时保持强劲的经济发展，这个国家必将取得非凡的成就。"
 brazil.499.a: "我现在还是忘不了那里的招牌与广告。"
 brazil.500.t: "再见日本"
 brazil.500.desc: "夸德罗斯轻轻一耸肩，将两封邀请函随手丢进了旁边的垃圾桶。旅途已经告一段落，虽然在共荣圈的日子令人难忘，但他和随行人员已经开始思念家乡。广东和满洲，也许本就不是什么好地方，不如就在这段冒险旅程的高潮时刻结束。\n\n埃德娜和其他人似乎对此感到了一种解脱，他们带着愉悦的心情登上了返程的飞机。在夸德罗斯看来，这次出行总体已经很成功了。他甚至让埃德娜承认，尽管面临着重重的考验，她依然享受了这次小小的旅程。夸德罗斯从飞机窗口望去，向日本道了最后一声再见，目送着自己的冒险之旅画上了圆满的句号。"
 brazil.500.a: "愿我们早日重逢！"
 brazil.501.t: "胡搞的副总统回来了"
 brazil.501.desc: "恩里克·洛特决定派夸德罗斯前往共荣圈与日本签署日巴贸易协议，但他心底里对此极不情愿。有几天，他夜不能寐，担心这位副总统的古怪行为会令访问提前结束或使交易落空。幸运的是，扫帚侠证明他错了，当夸德罗斯脸上带着征服者的笑容、大摇大摆地走到办公室时，洛特热情地接待了他。\n\n“欢迎回家，我听说事情进展顺利。”洛特说话时面带温和的微笑，为了这难得的成功时刻，他一直把夸德罗斯那些丢人现眼的糟糕记忆藏在心底。\n\n“顺利？哈哈！应该说近乎完美。”扫帚侠骄傲地微笑着。“这里的情况怎么样？”\n\n“协议已经达成，应该会相当顺利地通过。”洛特耸了耸肩。“唯一真正反对它的政党是全民盟。”\n\n“噢，我还以为没人比日本人更混蛋了呢！”二人一齐笑了起来，夸德罗斯夸张地打了个哈欠。“我想这是暗示我该回家了；再见，晚安！”两人握了握手，便分别了。"
 brazil.501.a: "“好好休息吧，你应得的。”"
 brazil.502.t: "华盛顿之途"
 brazil.502.desc: "洛特在离开飞机前稍作伸展，缓解长途飞行带来的疲劳。虽然这已不是他第一次飞往华盛顿特区，但漫长的旅途总是令他感到疲惫。幸运的是，从机场到白宫的车程比较舒适，也给了他一些时间来梳理自己的计划。\n\n自从瓦加斯时代结束以来，巴西与美国的关系一直很好，但美国人，特别是尼克松总统，似乎总是怀有戒心。尽管多年来双方保持了良好的贸易往来，巴西也是自由国家组织的伙伴国，但巴西拒绝完全迎合美国的意愿，而是坚持着独立自主的外交政策，这显然触动了一些人的神经。库比契克当选总统后，巴西与日本的交易让华盛顿的一些人坐立不安。洛特个人更倾向于扬基佬而非日本武士，但这并不意味着巴西没有对自由国家联盟的主导者提出自己的不满。将海军基地租借给美国一事，仍是一个极具争议的话题，他必须小心翼翼地处理。\n\n在不牺牲巴西的外交政策的同时保持与美国的良好关系，这将是一场充满挑战的任务。但恩里克·洛特不是那种在困难面前退缩的人。他只是希望尼克松能够倾听他的意见。"
 brazil.502.a: "啊，美国。最伟大的朋友，也是最糟糕的邻居。"
 brazil.503.t: "洛特和尼克松的一天"
 brazil.503.desc: "“洛特总统，与您会晤，我感到无比荣幸和愉悦。”尼克松的笑容充满魅力，握手坚定有力，但他的眼神却透露出了另一层含义。洛特很清楚，眼前这位美国总统身上散发出的是怀疑和不安，而非简单的友善。摄影机和记者群的包围让他们的交谈显得更加复杂。洛特回应着尼克松的微笑，面对观众保持着坚定的姿态。\n\n两人的对话主要围绕着加强两国之间持续的友好关系，随后转向了对拉丁美洲更广泛的关系讨论。“我真诚地希望，通过美巴两国的共同努力与决策，全美洲的自由与平等理念得以维护。”尼克松宣布时，面向镜头展开了灿烂的微笑。“毕竟，我们团结一致才会更加强大。”\n\n洛特很清楚尼克松的用意。美国总统正试图让他在公众面前承诺支持美国的政策，洛特意识到，这是一个利用对方的机会。社民党和工党中对美国持怀疑态度的成员已经向他提出要求，希望他能在外交政策上展示巴西的独立性，并在某些议题上挑战美国。这或许是一个绝佳的时机，来讨论巴西北部租借的基地问题，并要求美国支付更多费用，同时向他的支持者展示力量。当然，他也意识到，在媒体面前与尼克松较劲，可能会带来不小的后果。"
 brazil.503.a: "“啊，既然你提到了平等，我很高兴与你谈谈目前的一些不平等协议……”"
 brazil.503.b: "还是不要虎口夺食吧……"
 brazil.504.t: "国际“作秀”的坏处"
 brazil.504.desc: "“美国向巴西人民租借海军基地所开出的价钱，一直以来都是不公平的。如果美巴两国向美洲大陆乃至整个世界一同展示，我们是自由且平等的，那么我们首先应确保我们的协议中也体现出这种平等。”\n\n洛特话音刚落，他便意识到自己犯下了一个错误。空气中的紧张感一触即发，他看到尼克松的表情从温和友好转为隐隐的不悦。\n\n此后的讨论，尽管依然保持着外交礼节，但那种盟友间友好交谈的氛围已然破裂。幸运的是，不久后他们暂停了对话，分别会见各自的团队。洛特的助手们纷纷称赞他的举动极为勇敢，认为这会在国内引起积极的反响。然而，洛特心知肚明，这只是一场空洞的胜利。他本应更加理智、更具策略性。\n\n这次访问本意是要展示两国间的友好关系。他难以想象，这种小伎俩会让国会众议院和参议院感到满意。但愿他还能向美国人证明，自己仍然支持他们对抗德国的立场。如果做不到，那么这次访问可能就会比他的副总统访问日本时还要糟糕。"
 brazil.504.a: "开始得并不顺利。"
 brazil.505.t: "友好的交谈"
 brazil.505.desc: "“当然。”洛特以一抹轻松的微笑开场，“巴西与美国是世界自由的灯塔；我们两国基于民主合作，而这种合作必然会给我们带来需要的利益。”他能够想象此刻夸德罗斯和其他外交强硬派所感受到的不快。然而，为了国际关系的和谐，国内的一些小波澜相较起来便显得无足轻重了。\n\n尼克松看起来非常满意。“没错，保护国内外自由的使命要求我们的捍卫者拥有最高品质的武器自卫。”他试图用交易来引诱洛特，“民主的武器库随时准备支援我们的朋友，不论他们何时何地需要支持。”这确实奏效了。\n\n“我是有点兴趣。”谈话结束时，洛特自豪地说道，他对这次会面的成果感到非常满意。美巴两国关系仍旧十分良好，他为军队所需的新武器采购铺平了道路，甚至还让尼克松保持了不错的心情。现在，他只需在美国的参众两院发表讲话，这次访问便可算得上是圆满成功。"
 brazil.505.a: "扬基佬有他们好的一面。"
 brazil.506.t: "我们奋斗的原因"
 brazil.506.desc: "洛特昂首阔步走上演讲台，掌声如雷鸣般响起。美国的参议员和众议员们齐聚一堂，迎接一位外国领袖的尊贵访问，这份殊荣绝不容轻描淡写——这是美国和巴西之间尊重与友谊的象征。当掌声终于平息，洛特深深吸了一口气，开始了他的演讲。\n\n“二十年前，世界被混乱所吞噬。建立在专制与仇恨之上的邪恶帝国穷兵黩武，肆意征服、蹂躏敢于反抗其意志者。正是在那时，美国和巴西首次以自由的名义并肩作战。我们无法让数百万受害者起死回生，但我们有能力避免此类悲剧再度上演。于是我们做到了；我们共同坚守，坚决抵御法西斯主义的浪潮，捍卫拉丁美洲的民主与自由。”\n\n“即使在此刻，巴西仍站在这场正义斗争的最前线。第三帝国的殖民屠夫们，不满于对非洲的掠夺，竟将手伸向了我们的主权水域，窃取我们无辜民众的生计。我们已目睹了他们的罪行将通往何方，我们绝不会向他们的暴政低头。”\n\n“我想对美国说：在一个固有权利和自由被整个大陆的寄生霸主所压制的世界中，美国成为了一个构建更加美好世界的灵感源泉。她是指引着我们前行的光芒，昭示我们每个人都不仅仅是独裁者图谋中的棋子。她是无助者的避风港。她的存在，不仅对巴西、不仅对拉丁美洲，而是对全人类而言，都是一份证明——证明我们都能享有自由：自由选择我们的生活道路和领袖，自由表达我们的内心，自由信仰我们所向往的一切，摆脱暴政的束缚，免受屠刀的威胁，自由地过上繁荣的生活，而不用压迫我们的同胞。”\n\n“如果我们能坚守这一路，如果我们能承受自由之敌的一切考验，如果我们能在行动上保持正直与公正，那么我坚信，美国和巴西将引领世界重新踏上和平与繁荣之路。谢谢。”当掌声再次响起，淹没了他的声音，洛特骄傲地挺直了胸膛。"
 brazil.506.a: "愿自由的火炬永远燃烧。"
 brazil.507.t: "游客的沉思"
 brazil.507.desc: "洛特在华盛顿特区的街道上缓步漫行，心中思虑重重，步伐沉稳。总体来说，这次访问是圆满成功。巴西与美国的纽带得以加强，同时又未损及巴西的独立性。与他的副总统在共荣圈的奔波相比，洛特成功地避开了任何重大的失误或者灾难。他在心中默默地做着笔记，也许他应该是有资格出访其他国家的唯一一人，夸德罗斯就好好一边歇着去吧。\n\n当他在一座纪念碑前停下脚步时，沉思戛然而止。这是献给早已逝去的林肯总统的。一个在国家分崩离析之际，将其重新团结起来的人。一个在艰苦挑战面前坚定不移的人。一个推翻了腐败和野蛮制度的人。\n\n他将这位逝去总统的伟大成就铭记在心，踏上归途。洛特并不期待面临像林肯那般灾难性的挑战，但他的使命依然充满了艰辛。但如果这意味着他能够留下一个比他所遇到的、更加繁荣的巴西，那一切努力都是值得的。"
 brazil.507.a: "愿我们都梦想着美好的明天。"
 brazil.508.t: "冷静思考"
 brazil.508.desc: "关上灯，奥迪利奥·德尼斯靠在办公室椅子上，用餐巾擦去额头上的汗水。对于这位将军来说，这只是平常的一天，但他的心头总萦绕着一件事。就在几天前，洛特召集所有部长，宣布了他作为总统的告别之作：《洛特法案》。\n\n德尼斯早有预感，这一天迟早会到来。自从他认识洛特以来，洛特便一直对军队的影响力深表忧虑。然而，此刻他感觉到了一种不同寻常的错愕。洛特曾提及需要“彻底改革军队”，以保证他们对“民主制度与民选总统的忠诚”。\n\n他的左手不由自主地攥紧了椅子的扶手，回想着洛特的话语。洛特难道忘记了谁在1930年的革命中助力瓦加斯上台，与精英地主抗争？他岂不知是谁在抵御纳粹的侵袭中保卫了巴西的海域，为保护南非的自由献出了生命？面前的洛特，似乎已不再是他熟悉的那个人。一定有某种外部力量在暗中左右他。\n\n“没错！”德尼斯在心中惊叹，同时叹了口气。他本应该早一点意识到，不能让洛特与古拉特和布里佐拉这样的马克思主义者交往。如今，洛特的内心已被邪恶与软弱的种子所侵蚀。现在还不算太晚，他仍有机会力挽狂澜。\n\n最终，他放开了紧握的手，轻轻擦去额头上的汗水，站起身来。只需提醒洛特身为军人的职责，马克思主义的种子便会迅速枯萎，而他昔日的挚友很快就会回来。"
 brazil.508.a: "必须打倒马克思主义。"
 brazil.519.t: "瓜纳巴拉大洪水"
 brazil.519.desc: "“气象预报员说有风暴，我看是那家伙想独享海滩！”——每当风暴夜将至，此类俏皮话总如沙滩排球般在人群抛接，活脱脱美国电影舶来的时髦消遣。细雨时落时歇，雨衣阳伞足矣。瓜纳巴拉湾与游人同嬉，静候时机。\n\n虽天色阴郁且跨年夜已过，狂欢仍未散场。云层遮蔽烟火，广东造收音机却让里约心跳不息。有人为伊恩·卡拉汉突破曼联防线、助利物浦2:1取胜欢呼；有人第百万次跟唱《十一点列车》的“sai，sai，sai”副歌，乐此不疲；余者则嚼着总统就职晚宴的菜单与贪腐蠢货的藏酒八卦。\n\n惊雷骤起，湮没球赛、桑巴与闲谈。暴雨倾盆，海湾悍然闯入海滨派对。无妨，登高即可——拉塞尔达的海堤自会拦洪。\n\n它失守了。\n\n怒涛漫堤，将轿车如玩具般卷走，商铺尽成泽国。但山城脉搏仍在高地跳动：贫民窟迷宫庇护众生。诚然拥挤——当年拉塞尔达的城市更新迫使他们迁居于此——但至少免于洪流。\n\n然风暴杀招未尽。海水暴涨之际，地基悄然下陷。层层叠叠的脆弱棚屋如多米诺骨牌般倾覆，满载生命的建筑在数英寸土崩中坍塌。当权者香槟醉意未消，忙着打听新总统西装品牌时，幸存者已被卷入海湾冰渊，永别故城。"
 brazil.519.a: "三百二十人死亡，数百人受伤，数千人无家可归。"
 brazil.520.t: "风暴前夕"
 brazil.520.desc: "弗朗西丝卡终于可以稍作喘息。圣诞佳节对于那些默默工作的发货员来说，总是带着一份不轻松的工作压力。幸好漫长的工作日终于落幕。回到她在甘博亚的两居室公寓里，她发现一个孩子还穿着校服，蜷缩在沙发上沉睡，电视机静静地在一旁播放着。她透过窗户望去，瓜纳巴拉湾在落日的金色余晖中波光粼粼，似乎在低声细语中向她倾诉。“给自己一点时间吧，”它仿佛在说，“试着去读完那本沉闷的巴西名著。”\n\n她躺在那块绿色图案的垫子上，捡起那本有些皱巴的平装书。封面上赫然写着：《艰辛岁月》。她微微皱起了眉头。无论怎样，这故事似乎总与她无缘。当然，她或许对此略有共鸣。在食物和房租价格每几个月翻番的生活中挣扎求存实属不易。\n\n但那已经是遥远的过去。物价虽仍在上涨，但她的积蓄也在稳步增加。她的孩子们得到了应有的教育——女儿们已经开始上高中，儿子则在钻研物理学！家里甚至还装了一台时髦的广东电视。\n\n“里约热内卢将迎来大雨，”电视机里传来了嘈杂的声音。尚处于试播阶段的环球电视台正尝试编排新的节目，主持人轻松的语调是希望观众能喜欢这个全新的天气板块。“新年这几天的湿度可能有点高，但别担心。很快你就可以穿上泳装，在海滩上享受阳光和鸡尾酒了。”\n\n她只是漫不经心地听着新闻，手中的书渐渐从指尖滑落，她的眼皮也越来越沉重。这本小说总是不断提及生活的艰辛，但最近的阳光并不像小说中那般“无情”或“残忍”。凉爽的十二月空气令夕阳的余晖变得柔和，渐渐隐没在山丘之后。其他人还没回家，晚餐还可以再等等。闭上眼，享受一场短暂的午睡，又能有什么坏处呢？"
 brazil.520.a: "只是当天的夜里并不平静。"
 brazil.522.t: "劈波斩浪"
 brazil.522.desc: "凌晨四点半，科斯塔-席尔瓦总统下令召集会议。来自他所领导的强硬派的几位将军，巴西人现在称之为“政府”的将军们，昏昏欲睡地走进高原宫的会议室，显得毫无兴致。\n\n塔瓦雷斯将军率先开口：“长官，我们很荣幸能在这么不合时宜的时刻收到命令吗？”\n\n这句话激怒了总统：“你们欠的不是我，而是瓜纳巴拉人民，更重要的是，巴西人民。若你们继续如此无礼对待我们的责任，就永远不再出现在巴西利亚。”他低下了声音。\n\n“我们的第二大城市正面临自然灾害。数百人可能会丧命，数十万人受灾。官方的伤亡报告还未上我的桌面，但我不打算等数字。我打算向这个国家展示，军队是为巴西而存在的，而不是像我们之前那个该死的、无能的政权。人民会知道，在他们面临危机时，是我们会挺身而出，履行职责。而这，”他再次怒视塔瓦雷斯，“就从这里开始。”\n\n西尔维奥·弗罗塔清了清嗓子，恭敬地说道：“长官，这种事我们当然会全力以赴。我们与瓜纳巴拉站在一起。我们的命令是什么？”\n\n“你们立刻前往里约，与奥林匹奥将军会合。现在。”总统不耐烦地挥了挥手，又开始一一列出更多命令。“你们要确保重建工作顺利进行，保障我们的援助能及时送到需要帮助的人手中。最重要的，当然还是抓捕那些犯罪分子。每当这里发生危机，在城市里进行抢劫和骚乱的混蛋就会露面。必须把他们除掉，弗罗塔。解散。”"
 brazil.522.a: "以剑治国，往往毫不含糊。"
 brazil.523.t: "又一个棘手的麻烦"
 brazil.523.desc: "“什么情况？”布兰科迷迷糊糊地嘟囔着，被匆忙带进了简报室。被叫醒的过程一点也不愉快，他揉着眼睛勉强听着报告。\n\n“里约刚刚遭受了一场特大风暴，造成了大范围的破坏。”一位官员汇报道，“州长已经请求紧急援助。我们已经为这次危机拟定了一份初步应对方案。”\n\n布兰科重重地叹了口气。他本该预料到这次被叫醒不会是什么好事。“立刻联系所有的军事顾问，叫他们动员一切可用的支援力量，协助州长处理危机。他们应该有足够的能力应付眼前的状况，不需要我直接介入。”说完，他靠回了椅背，看着会议室里的官员陆续离开，内心却充满了复杂的情绪。\n\n他刚才是不是反应得太快了？还是不够果断？自己是否犯下了一个巨大的错误？又或者，这反而是一种伪装下的幸运？他脑海中闪过无数种可能的结果，但唯一确定的是——时间会给出答案。"
 brazil.523.a: "时间自会证明一切。"
 brazil.524.t: "惊动政要"
 brazil.524.desc: "黑袍人的幻影如信号不良的电视画面般抖动模糊，最终被幕僚铁青的面容取代。“阁下快起来！出大事了！”\n\n宿醉未消的阿德马尔被搀进临时改作危机指挥室的大客厅。幕僚长劳多·纳特尔将浓咖啡推到他面前，马尼扬伊斯·巴雷托颤抖着为总统续上清水。阿毛里·克鲁埃尔与瓦斯科·莱唐·达·库尼亚肃立待命，埃德娜·洛特未被传唤。\n\n埃内斯托·盖泽尔步入时，阿德马尔瞥见他军装下摆的褶皱：“难怪这可怜虫面色惨白，肩上担子压垮他了吧？上帝啊，我简直怕得……”思绪被打开的收音机打断。\n\n“这里是橄榄绿电台。据瓜纳巴拉民间急报：全境突发山洪引发大规模泥石流。已确认数百人遇难，数千失踪，逾十万民众流离失所……”死寂笼罩房间，唯有阿德马尔眼底渐起精光。救灾不仅是职责，更是扳倒瓜纳巴拉全民盟、证伪拉塞尔达政策的绝佳契机。\n\n盖泽尔关闭广播：“我们如何应对？”\n\n“即刻行动。”阿德马尔率先起身，“无论拉塞尔达及其党羽是否首肯，联邦必须接管救灾。调遣武装力量搭建临时安置所，处理遇难者遗体。立即执行。”军官领命离去后，他划着十字瘫进座椅，将脸埋入掌心。"
 brazil.524.a: "他感到肩上又多了一份责任。"
 brazil.525.t: "天堂之围"
 brazil.525.desc: "压抑的气氛郁积在会议室里。在座的官员们要么紧紧抿着嘴唇，要么低着头、目光游移地看着桌面，等待着那个首先打破沉默，阐述当前紧要事务的人。总统无视了那些不时看向他的视线，而是重新翻起了今天早上的报告。在局促不安、不时和他们的领导对上视线的阁员间，气氛愈加尴尬。\n\n“总统先生，”一位顾问说，“本周的风暴对瓜纳巴拉造成的损害……”\n\n“是，非常巨大。”拉塞尔达念着报告上的话，打断了他。“但这本小册子没有告诉我为什么。为什么损失会如此之大？是海堤根本没起作用吗？”\n\n“海堤发挥了作用，总统先生……至少大部分是这样。一些区域被洪水淹没，估计受损的汽车多达数百台。更糟糕的是，数十座山丘上的贫民窟房屋在滑坡中被毁，让海岸一片狼藉。许多里约市民无家可归，这种情况很可能将持续到下个星期。”\n\n“我早该在有可能的时候就把那些贫民窟都拆光。”拉塞尔达嘟囔道。“它们就像九头蛇的脑袋，被砍掉也会立刻长出来。里约需要的是体面有序的建设，而不是垃圾山。也许……”他的声音低了下去，脑中灵光一闪。拉塞尔达的注意力立刻转回了地图上。“也许这就是天赐良机，一片白地。”\n\n“这场危机是我们的机会，”他高傲地宣布道。“把所有有关人士，州长，委员，全都叫来。把消息传出去。我们会去救灾，但不会像以前那样。这回，我们的援助将让瓜纳巴拉焕然一新，为崭新的国家建设一座崭新的城市。”"
 brazil.525.a: "庞贝山下建罗马。"
 brazil.526.t: "细雨落下"
 brazil.526.desc: "灾难、混乱、失序——这些词正好描述了那天在瓜纳巴拉发生的一切。远离悲剧现场的库比契克早晨醒来，正沿着纪念轴大道走向他的内阁会议室。\n\n总统办公室平日里空荡荡的，但今天，从发展部长到环境部长，所有的内阁成员都齐聚一堂。他们低声交谈着，不停地问：面对这样的悲剧，总统会采取什么措施？\n\n库比契克在座椅上落座时，交谈声才戛然而止。他缓缓开口：“各位，瓜纳巴拉发生的，是一场悲剧，但并非我们所经历过的最糟糕的一次。”部长们听后神情复杂，不知如何回应，纷纷向总统发问。而发展委员会的成员则沉默不语，心中满是对这场悲剧的愧疚感。“即便这一天终将被历史记录为一场悲剧，它也必须因我们的湾区重建计划被铭记。”\n\n时间一小时一小时地过去，成千上万的言辞被交换。最终，他们制定了一份完整的方案，既涉及对受灾民众的救援，也涵盖了对瓜纳巴拉地区的重建。他们决定成立一个特别委员会，专门负责处理这场危机。会议结束后，库比契克脸上带着一丝充满希望的微笑走出了会议室。他坚信，瓜纳巴拉将比过去更加繁荣、美丽。"
 brazil.526.a: "五十年功业，五小时散尽。"
 brazil.527.t: "破碎的沉默"
 brazil.527.desc: "古拉特总统的蜜月期在凌晨三点戛然而止。不到48小时的时间里，一场猛烈的风暴便席卷了瓜纳巴拉的海岸线，迫使布里佐拉、埃德娜·洛特甚至坦克雷多·内维斯不得不紧急召开了一场异常早的内阁会议。大部分应急方案已基本拟定，真正棘手的问题并非筹集数百万美元用于瓜纳巴拉的救援、恢复与重建工作，而是拉斐尔·马加良埃斯的态度。\n\n“听着，总统先生。”执政联盟的伙伴内维斯开口道。哪怕事实再难以接受，古拉特也做好了接受的准备。“无论您对全民盟、拉塞尔达还是瓜纳巴拉州州长有什么看法，如果拒绝与马加良埃斯合作，那将是个灾难性的错误。请主动联系他，问问他需要什么，在政治危机发生之前先解决自然灾害的危机。”\n\n“胡说！”布里佐拉愤怒地反驳道，“为什么要向拉塞尔达的走狗低声下气？无论我们怎么做，他都一定会把一切责任归咎于我们。你清楚他们的伎俩。”他转向了总统，发现古拉特神情严肃。“这种风暴的联邦援助足以解决问题，杨戈，我们有一套行之有效的解决方案，不需要讨好任何人。”\n\n古拉特叹了口气，扫视了一遍手中的会议记录，最终恢复了身为总统的冷静与理智。“我真的不想说，但他自有道理。坦克雷多，我需要你亲自去见州长，与他协调联邦的援助，越快越好。我们不能让这场灾难演变成一场互相指责的闹剧。”"
 brazil.527.a: "用妥协迎击一场风暴。"
 brazil.528.t: "管理者的革命"
 brazil.528.desc: "今天的早晨对于夸德罗斯而言非同寻常。他被助手们突然叫醒，电视上播放的紧急新闻广播让他本能地意识到，今天将是漫长且艰难的一天——瓜纳巴拉被一场猛烈的风暴摧毁，局势动荡不安。\n\n他毫不犹豫地从桌上抽出一张纸，开始迅速记录要点，同时命令助手们立即协调各个相关部门。援助物资必须立刻筹备并送达，警察与防暴部队需要即刻动员，稳住局势，水处理设施也要紧急调配，以缓解灾后卫生危机。每思考片刻，新的问题便接踵而至。但这就是现实。夸德罗斯内心却有一丝安慰：至少今天不会有冗长的官僚扯皮或不必要的杂务干扰。现在，是时候亲赴瓜纳巴拉了。\n\n他快步走向电话机，拨通了空军司令部的号码。“安排最快的航班飞往瓜纳巴拉。通知所有相关人员，我即将亲自前往。”他的语气坚定自信，另一只手继续在纸上勾画着行动方案——安抚民众，鼓舞士气，传递希望。亲自前往灾区，不仅仅是一场象征性的视察。这是他应对危机、直接推动救援行动的战略举措。"
 brazil.528.a: "瓜纳巴拉在呼救，夸德罗斯即刻回应。"
 brazil.529.t: "敢想敢梦"
 brazil.529.desc: "瓜伊拉瀑布，那是巴西浩瀚自然风光中最引人入胜的秘境之一。这份自然奇迹藏匿于南美两国之间，马蹄形的瀑布群在被目光捕捉之前，就已在森林中悄然回荡起潺潺的流水声。\n\n然而，最近抵达此地的访客，并非为了探寻自然美景。丛林之中，一张桌子旁，一群建筑师聚首于此，他们的目光穿过瀑布，正致力于另一项人类奇迹的构思——世界上最大的水电站的建设。在这被世人遗忘的角落，无人问津的荒野成为了他们雄心勃勃的理想之地。\n\n“如果我们的计算无误，这便是理想所在，恰好位于与巴拉圭的边境，伊瓜苏福斯附近。”首席工程师指着桌上的地图说，语气坚定。“一经政府批准，我们就能投入工作。在那之前，伙计们，千万不要灰心。你们即将书写历史，为自己能成为其中一部分而骄傲吧。”正当他准备满意地结束这次会议时，一位年轻的建筑师举手提问：“长官，您真的认为，牺牲这瀑布的美景换来一座水坝是值得的吗？”\n\n随之而来的是一片沉默，众人的目光投向那位建筑师，尴尬而期待地等待着首席的回答。首席工程师面带友善的微笑回应：“当然不是，我们不过是借用它的力量和精神，为巴西的更好明天而努力。”他站起身，手搭在那位局促不安的建筑师的肩上，“想想我们的努力将给我们带来什么样的好处。想象那些巴西人因家中有了光明而心存感激的笑容。这不正是你，也是我们大家所追求的吗？”\n\n建筑师默默点头，尽管内心对他上司的乐观并不完全信服。"
 brazil.529.a: "为了巴西的福祉，再大的牺牲都不为过！"
 brazil.530.t: "无家可回"
 brazil.530.desc: "马蒂亚斯小心翼翼地携带着相机，里面装满了胶卷，准备记录下他即将见证的每一个刻骨铭心的瞬间。他的目的地是巴西一隅被遗忘的小村庄，一个无名之地，连最精确的地图上也寻不到它的踪影；这个地方很快就会湮没在人工湖的浩渺之下，永远消失于世间。\n\n村民们别无选择，只能无奈服从军方的命令，背离他们唯一熟悉的家园。尽管环境贫瘠，但那里曾是他们温暖的家。曾经如此，现在却成了过去。\n\n黎明时分，村民们被逐一从家中带出，带着他们能够携带的所有物品，带着空荡荡的心和满载回忆的思绪，还有脸颊滑落的泪水离开了。他们唯一感到欣慰是，至少这里的遭遇，比河对岸似乎更加“宽容”。\n\n马蒂亚斯远远地观察着一切，躲避士兵的监视，他的夹克里藏着的相机，记录下每一个经过的面孔。他默默跟随着他们在泥泞小径上的缓慢脚步，一直走到等待着把他们送往未知之地的巴士。“他们会被送往最近的避难中心。”一名士兵向马蒂亚斯简短地说道，并未加以更多说明。\n\n然而，马蒂亚斯并不陌生于这般的场景。瓜纳巴拉的画面仍旧清晰地印刻在他的记忆中，贫民窟中的民众被驱赶到了城市边缘最荒凉的地带，这一切都是州长的支持下发生的。如今，水坝的建设似乎也只是政府为了“发展”的名义，迁移那些曾经发誓要服务的民众，将他们驱离赖以生存的家园的众多案例之一。"
 brazil.530.a: "“秩序与进步”的代价啊……"
 brazil.531.t: "大瀑布的葬礼"
 brazil.531.desc: "从那令人窒息的办公室牢笼中挣脱出来后，索萨中士认为是时候实现他的一个长久以来的愿望：再次踏访瓜伊拉瀑布。但为何一个依靠拐杖行走的残疾士兵会踏上通往国家最深处的旅途，连索萨自己也无法解释。但他内心深处明白，这是他必须要踏访的旅程。\n\n然而他没预料到的是，心怀恐惧的人群汇集在湿滑的观景地，俯瞰着瀑布。透过人群稀疏的缝隙，他看到了真相：水位正在不断上升。索萨知道有关水坝的事，但他没想到事情会进展得如此之快。\n\n水位正一点点上涨，一种混杂着怨恨的奇异情绪在他的胃中蔓延开来。他宁愿看到多年前瀑布在痛快的轰炸中被摧毁，也不愿见到它在水中挣扎求生，绝望地喘息，然后被河流吞没。而这一次，水坝后的工程师们不会像多年前在这个地方的上级那样听从他的意见。\n\n随着瓜伊拉瀑布在绝望中逐渐消逝，围观的人群开始逐一散去，有些游客面带满足，有些则流露出失望。然后轮到了当地居民，他们见到此等景象，只是悲伤地掩面走开。最终，只留下索萨独自沉浸在自己的思绪中。他呆立着，时间在几个小时中缓缓流逝，他的目光迷失在渐渐逼近水面的瀑布中。\n\n太阳隐没在树梢之后，一声指响将索萨拉回现实。他撞上了一位明显不耐烦的士兵，急着结束自己的轮班。这位老兵并不介意独自一人，但他不能永远留在那里。当他恢复清醒，他摸索着口袋，寻找一些有价值的东西——一枚五毛硬币应该够了。他将硬币投入水中，看着硬币在瀑布中逐渐消失，索萨拿起拐杖，默默地离开，只留下身后渐渐消逝的瀑布。"
 brazil.531.a: "大瀑布将与为它而战、葬身水底的勇士们一同长眠。"
 brazil.532.t: "造物主之力"
 brazil.532.desc: "在伊泰普大坝的工地上，工人们没有余裕分心，除非他们愿意被埋在无情的土石之下。但经过多年不懈的劳作，他们才真切感受到自身在这庞大工程面前的渺小。一堵横跨巴拉那河两岸的巨型混凝土与钢铁壁垒，由美国注入的外资和广东的顶尖设备共同打造，然而这一切的成就，同样离不开成千上万工人和工程师的汗水与智慧。工人们齐聚于此，见证最后一台涡轮机的安装，欢呼声响彻伊瓜苏福斯的天际。\n\n日暮时分，他们在可以俯瞰大坝的地方聚会，庆祝他们的成就。他们享用着附近面包店送来的特制蛋糕和一杯杯醇香的咖啡；酒精是严令禁止的，毕竟没有人想看到醉酒的工人摔进涡轮机里。尽管如此，美食和饮品依旧备受欢迎。“嘿，你们想过大坝全面运行后会发生什么吗？”一个工人在众人中发问。\n\n“当然是人人都有电用啦！”负责监督涡轮机的安东尼奥回答道，他一饮而尽咖啡继续说：“我已经告诉我的妻子，我们不再需要担忧能源配给了。那你呢，保罗，你怎么想？”\n\n“我？”操纵机器的保罗，刚吃完六片玉米蛋糕，惊叹道，“我认为这些水对我大有裨益。我们家在内陆有个小农场，上次干旱让我们苦不堪言。但有了这座大坝，我们就不必担心庄稼再次枯萎了。”\n\n就这样，他们各抒己见，分享着各自的故事和期待，但有一个共同的梦想：对一个更加美好的未来的渴望。这个未来，正是由他们在建造世界上最大的大坝上的辛勤工作铺就的。"
 brazil.532.a: "先生们，这一杯敬未来！"
 brazil.535.t: "工人总统"
 brazil.535.desc: "自投票站关闭后，古拉特庄园的电视便一直开着。古拉特与布里佐拉并肩坐在沙发上，满怀期待地盯着屏幕。起初的计票结果十分有利，巴西工党得票势头强劲。然而，如今选情愈发胶着。“全国民主联盟肯定又在搞鬼。”布里佐拉不满地嘀咕道。\n\n“我们都清楚他们有多烦人，不过应该没事。”古拉特一边安慰道，一边为两人各自倒了一杯威士忌，“人民信任我们，胜过信任其他人。毕竟，我们是为庶民而战，而不是一味为富人服务。”古拉特坐回沙发，把酒递给布里佐拉。他看出对方的焦虑，希望这杯酒能让他放松一些。\n\n时间一分一秒过去，最后的选票终于统计完成。电视上的《国家新闻》主播说出了全国人民都在等待的消息：“莱昂内尔·布里佐拉当选，将担任巴西的下一任总统。”刹那间，布里佐拉与古拉特同时从沙发上跳了起来，兴奋地拥抱在一起。\n\n“恭喜啊！”古拉特脸上带着微醺的笑容，为好友高兴不已。布里佐拉做到了他所未能完成的事——他赢得了国家最高权力的象征，成为继上一时代之后，照亮巴西未来的希望灯塔。\n\n布里佐拉整理了一下情绪，起身说道：“我想，是时候离开了。巴西人民正在等待他们的新总统，期待我向他们讲述国家未来的蓝图。”他再次与古拉特紧紧拥抱，然后走出了房间，准备向全国人民发表他的演讲。"
 brazil.535.a: "庶民之子。"
 brazil.536.t: "不再是副总统"
 brazil.536.desc: "洛特家的空气中弥漫着紧张的气息，决定国家未来走向的选举结果正逐渐揭晓。电视屏幕上的新闻主播逐一宣布着各州的计票结果。“目前已统计38%的选票，全国民主联盟暂时领先，但巴西工党紧随其后。”\n\n恩里克·洛特看向他的女儿，他很紧张，和当年自己胜选时一样紧张。“埃德娜，38%还不足以决定胜负，现在不必太担心。而且你看，你的票数马上就要追上他们了。”埃德娜深吸了一口气，重新将目光投向了电视屏幕。\n\n“目前已统计97%的选票，我们可以正式宣布：巴西工党的埃德娜·玛丽莉娅·洛特赢得了巴西总统大选，她将成为国家的新任总统。社会民主党的乌利塞斯·吉马良斯则当选新任副总统。”整个洛特家顿时沸腾了起来，她赢了！这些年辛勤的努力终于结出了硕果，人民知道自己想要什么，她成功赢得了民众的信任。\n\n站在窗前，望着外面的夜色，埃德娜的思绪飘向了未来。她能够做到那些前人无法做到的事，让巴西真正变得更好。她能够成为混乱动荡十年后的希望灯塔。但最重要的是，她能让奥斯卡和劳拉感到骄傲。她终于能证明自己，让巴西成为一个伟大的国家。"
 brazil.536.a: "她希望，天堂中的二人会露出欣慰的微笑。"
 brazil.537.t: "平民君主"
 brazil.537.desc: "消息终于传来。“坦克雷多·内维斯，当选。”一个稳妥的选择，一位受人爱戴且富有魅力的领袖。正当内维斯在社会民主党总部与同僚们共同庆祝胜利时，来自各个政治派别的祝贺电话纷至沓来。\n\n库比契克的电话里充满激动，他称这是“属于巴西，更属于全世界的胜利”；古拉特的问候则更加简洁，只是希望执政联盟能继续团结一致，共同走向未来。而现任总统的电话最为简短，只是简单祝贺了他的胜选，便匆匆挂断。\n\n庆祝派对持续了数个小时，民众欣喜若狂，各色烟花照亮了夜空，绽放出五彩斑斓的光辉。而坦克雷多，此刻已准备离开，回家迎接作为胜利者的新身份。\n\n离开社会民主党总部时，他在门口的一幅画像前停下了脚步。那是热图利奥·瓦加斯的肖像。回忆浮现，他曾为这位伟大的领导人效力近十年。人们总是会思考，自己究竟会留下怎样的遗产。坦克雷多也不例外。“如果热图利奥还活着，他会如何看待我的成就？未来的总统们，会像我怀念热图利奥一样怀念我吗？” 他无法确定答案，但他衷心希望，有朝一日，人民会记得他的付出与成就。"
 brazil.537.a: "巴西，已经不同了。"
 brazil.538.t: "从地方到领袖"
 brazil.538.desc: "清晨，成千上万的人聚集在库里蒂巴的蒂拉登特斯广场，只为目睹他们心中的英雄——那位征服了巴拉那州，如今即将征服整个国家的伟人。内伊·阿明托斯·德·巴罗斯·布拉加在人群中缓缓穿行，他不再只是他们的州代表，而是巴西的新任总统当选人。人群沸腾着，掌声与欢呼声此起彼伏，他的目光在翻涌的人海中搜寻着一个足够宽敞的空间，好让他能向这些成就了他胜利的支持者们发表讲话。强压着内心激荡不已，乃至更加复杂的情绪，他终于开口了，声音洪亮且坚定。\n\n“正如你们所知，各位巴拉那州的朋友们，很快你们就要摆脱我了。”他打趣道，引得前排一阵夸张的哀嚎声，紧接着，后排也爆发出一阵爽朗的笑声。“不过，慈父般的玩笑就到此为止吧。”他微微停顿，目光深沉。“我由衷地感到抱歉。但今天，我站在这里，不再只是报纸上的地方政客。我站在这里，是在向整个国家发声，向每一位投票支持我们基督教民主党的巴西人民发声。”\n\n“对那些媒体和政界人士而言，也许你们会震惊，为什么一个像我这样的‘小人物’，能站在这里向全国发声。但请相信，这正是巴西的选择。巴西选择了基督教民主党——一个信仰实干，不偷窃、不欺骗、不撒谎的政党。巴西选择了道德治国，温和稳健的政策。人民希望一个廉洁的政府，来抚平我们的创伤，共同铸就国家的未来。\n\n“我们的巴西正承受着痛苦，她的人民在哭泣，她在世界上的朋友也同样悲痛不已。但我相信，我在巴拉那州的任期已经证明：我会竭尽全力，哪怕付出一切，也要治愈她的伤口。愿上帝保佑巴西！”"
 brazil.538.a: "走出阴霾，他希望带来光明。"
 brazil.539.t: "追随父亲的脚步"
 brazil.539.desc: "全国人民都在翘首以盼着这一刻，守在收音机与电视机前，等待着最终的结果揭晓。“在[?global.date.GetDateStringNoHourLong]，我们可以正式确认：社会进步党的小热图利奥·瓦加斯赢得了总统大选，将担任巴西的新任总统。”\n\n烟花在夜空绽放，欢呼声从瓦加斯家窗外传来，响彻夜空。他简直无法相信——经历了无数的风雨波折，从昏迷危机到“公牛总统”任内的种种风波，巴西人民依然渴望着更多，他们希望社会进步党继续执政。\n\n他推开窗户，向外即兴发表了一场胜选演讲：“巴西的人民们！感谢你们对我和纳特尔的支持！今天，你们让我的父亲感到无比自豪。而我将竭尽所能，保证他所期望的那个更加美好的巴西，比以往任何时候都更加坚定地走下去！”欢呼声愈发高涨，掌声经久不息。而瓦加斯却静静地关上了窗户，走回卧室。\n\n在墙上的热图利奥·瓦加斯肖像前，他凝视着那位伟大的父亲，心中不禁浮现出疑问：“我能够像他一样，成为一位伟大的国家领袖，带领巴西走向辉煌与进步吗？我能否超越他，甚至成为更伟大的人？”恐怕只有时间，才能给出答案。"
 brazil.539.a: "那位老人微笑着，仿佛正默默注视着他。"
 brazil.540.t: "伤口撒盐"
 brazil.540.desc: "“人民代表党的普利尼奥·萨尔加多，当选。”电视上的新闻主播眼中满是震惊，声音微微颤抖。他无法相信——法西斯赢了。更糟的是，这是人民的选择。沉默了几秒后，他继续宣布副总统的选举结果：“社会民主党的乌利塞斯·吉马良斯当选副总统。”\n\n全国各个党派的办公室内，唯一能听到的声音只有死寂。到底是哪里出了问题？难道人民真的渴望一个法西斯的未来？所有人都难以置信。虽然这次选举只是险胜，但胜利终究是胜利。可是，这真的是他们曾为之奋斗、梦想过的巴西吗？\n\n然而，有一个地方却沸腾了起来。唯一赢得了胜利的党派，正沉浸在狂欢的海洋中。人民代表党总部内，爆发出一片欢呼与兴奋。普利尼奥·萨尔加多坐在他的办公室里，身着那件标志性的绿色衬衫。突然，门被猛地推开，米格尔·雷阿莱冲了进来，脸上满是激动的红光。“我们赢了，普利尼奥！我们赢了！”萨尔加多缓缓站起身，露出了惯有的微笑。他走向米格尔，伸手搭在他的肩膀上，语气平静却不乏威严：\n\n“这确实是个好消息，非常好。”但片刻后，他的笑容稍稍收敛，继续说道：“可这并非决定性的胜利。吉马良斯将担任副总统，他会成为我们前进路上的一根刺，更不用说参议院依旧不在我们控制之下。我们赢得的，只是一场战斗，不是战争的终结。”\n\n就在距离人民代表党总部不远的地方，劳多·纳特尔则陷入了难以置信的失落与愤怒之中。他盯着屏幕，整个人都僵住了。这真的是他的错吗？他曾经为了扶持小热图利奥·瓦加斯入主总统府而机关算尽，甚至一度与民代党合作。可如今，这一切却以更加糟糕的结局告终。巴西，已经走上了一条不同以往的道路。人们开始自问："
 brazil.540.a: "“这一切，真的值得吗？”"
 brazil.541.t: "举杯欢庆"
 brazil.541.desc: "仅仅一句话，就足以让整个房间沸腾起来。“拉斐尔·马加良斯成为巴西新任总统。”就这一句话，令全国民主联盟总部的人彻夜未眠，他们焦灼地等待着这一刻。当电视屏幕上这句话终于出现，那些早已习惯失败的人们爆发出震耳欲聋的欢呼声，激动到近乎失态。\n\n香槟瓶接连被打开，胜利的狂欢声此起彼伏。然而，站在这一切中心的马加良斯，却几乎难以听清自己的心跳声。脸上的笑容憨厚而满足，脑海中的一切思绪都被纯粹的喜悦所填满。他做到了。那些全民盟的前辈们曾一次次铩羽而归，但这一次，他终于成功了。他一扫瓦加斯主义的势力，一举拿下了总统与副总统的位置。\n\n一位兴奋的支持者为他递上了一杯威士忌，他刚接过杯子，肩膀便被人轻轻拍了一下。是他的秘书。“卡洛斯·拉塞尔达的电话。”她凑近耳边喊道，努力让声音盖过喧嚣。马加良斯的笑容愈发灿烂，点了点头，任由秘书引领着他穿过人群，回到一间安静得多的办公室。他迫不及待地拿起电话，将听筒贴在耳边，期待着听到那位亦师亦友的声音。\n\n“能让我第一个祝贺你吗，拉斐尔？”电话那头，拉塞尔达带着些许沙哑的声音传来，语气中满是自豪与欣慰。“你打了一场漂亮的胜仗。”\n\n马加良斯忍不住笑了：“哦，别开玩笑了，老头子。如果没有你的帮助，我怎么可能做到这一切？谢谢你一路以来的支持。”他轻抿了一口威士忌，语气中满是真诚。\n\n“能助你一臂之力，是我的荣幸。不过，我得承认，内心深处有那么一点点遗憾。”拉塞尔达的声音稍稍低沉了一些，带着几分玩笑，“我真希望此刻站在你这个位置上的人是我，肯定也能享受着你现在喝的这杯佳酿。不过你放心，你赢得了我的全部信任与支持。如果你有需要，只用给我打个电话就行。”马加良斯听着，心中顿时涌起一股温暖的情绪。那不仅仅是威士忌的醇厚，更是胜利与友谊的暖意。"
 brazil.541.a: "“衷心谢谢您，先生。”"
 brazil.542.t: "全民盟选出了1970年大选的候选人！"
 brazil.542.desc: "选举季再次降临巴西，而新的十年看起来注定充满动荡。人民怀着既兴奋又惴惴不安的心情注视着这一切。巴西政坛的中右翼主力——全国民主联盟，正忙于决定谁将成为保守主义的代表人物，带领党派走入新十年。如今，党的纲领方向也悬而未决。\n\n尽管该派系的支持基础有所动摇，但“乐队派”仍在全民盟内部保持着相当的影响力。他们普遍支持马加良斯，认为他是拉塞尔达政治遗产的继承者，能够延续党内的保守传统。\n\n然而，州长的竞选并非毫无阻力。党内一个不断壮大的派系已明确支持内伊·布拉加。这位外来者曾任巴拉那州州长，在他的领导下，该州成功转型为一个前景光明的出口与基础设施枢纽。布拉加及其支持者积极推动全民盟与基督教民主党建立紧密的合作关系。这无疑将标志着党内路线的重大转变，但尚不清楚布拉加那种带有强烈宗教色彩的保守主义，能否赢得党内其他成员的支持。\n\n在经历了数日激烈辩论后，大会终于落下帷幕，全民盟作出了他们的决定……"
 brazil.542.a: "内伊·布拉加！"
 brazil.542.b: "拉斐尔·马加良斯！"
 brazil.543.t: "工党-社民党联盟选出1970年大选候选人!"
 brazil.543.desc: "选举季节的到来，恰逢动荡的十年之交，无疑标志着一个关键的时刻。这不仅反映着当前巴西人民的心态，也体现了政治中左翼——社民党和工党的情绪，他们再次携手联合，形成了一个统一的阵线。\n\n两党对合作十分兴奋，因为他们的政策选择在同僚中享有高度尊重，在联盟的选民基础中也广受欢迎。尽管最终的决定尚未作出，但早期的民意调查结果确实令人充满希望。工党拥有强大的潜在候选人阵容：恩里克·洛特的女儿埃德娜·洛特是巴西政坛冉冉升起的新星，她寻求保持党的温和立场；莱昂内尔·布里佐拉则代表了更激进的左翼立场。至于社民党则推出了坦克雷多·内维斯作为他们的代表，他将沿着洛特和库比契克设定的自由路线继续前进。\n\n最终，只有一个人能够胜出……"
 brazil.543.a: "埃德娜·洛特！"
 brazil.543.b: "莱昂内尔·布里佐拉！"
 brazil.543.c: "坦克雷多·内维斯！"
 brazil.544.t: "选举季"
 brazil.544.desc: "巴西所有城市的街道都被各色政党海报填满。“工党——为了更美好的未来”，一张海报如此宣称。另一张则写着“社民党的真面目！”。民代党的海报也时不时映入眼帘。人人皆知，选举季已经来临。\n\n不断壮大的中产阶级终于能在电视上看到候选人演讲，对于那些买不起电视的人，收音机永远是最忠实的伙伴。候选人们施展着惯用伎俩，攻击彼此以博取民众喝彩。\n\n几天后即将举行跨党派候选人辩论。当然仍有人举棋不定：民代党会参赛吗？工党和社民党能维持联盟吗？社进党还能推出候选人吗？只有时间能给出答案。"
 brazil.544.a: "巴西的命运悬而未决……"
 brazil.545.t: "硅晶之魂"
 brazil.545.desc: "当三菱与日产汽车成群结队穿过圣保罗的拥挤街道，这座城市的数百万居民形成了一种共识：有什么大事将要发生。不夜城的住民们目睹着这场骚动，而尚不明确其背后蕴含的信息——没有关系，他们很快就能亲自体验其带来的变革了。\n\n这座城市将见证一场决定自身未来的聚会：在总统与圣保罗市长的精心准备下，数十名日本商人横跨太平洋而来，旨在为这个国家最为雄心勃勃的项目之一盖棺定论，他们将决定里约-圣保罗高速铁路项目的未来。借由大洋彼岸的先进铁路运输技术，国家的经济中心将得以连为一体。\n\n几个小时的“友好交流”后，一切尘埃落定。根据商谈结果，富士通与日立将成为铁路建设和配套基础设施的主要承包商，而索尼和松下则获得了生产线的分包合同。\n\n事实已定，那么便该庆祝这个伟大的时刻了。圣保罗最棒的日料厨师亲自掌刀，玉盘珍馐纷至沓来；杯盘狼藉，肴核既尽，弥漫生意场的紧张气息随之一扫而空。其中最开心的还要属几位来自广东的代表们：毕竟作为新兴财阀，能在这个充满机会与财富的国家成为共荣圈业务话事人，实为一场巨大的成功。"
 brazil.545.a: "但因此被赶出家门、流离失所的人又怎么想呢？"
 brazil.546.t: "未来在等待"
 brazil.546.desc: "“上周他们又降薪了……接下来是啥？砍掉我们的午休时间？”一名工人脱口而出，但他的抱怨在坎皮纳斯码头显得微不足道，很快便消弭于锤子和手提钻的嘈杂声中。\n\n“忍忍吧，安东尼奥。”阿尔弗雷多·塔瓦雷斯说道，他是里约-圣保罗铁路公司的经理，长相普通。“预算削减不是什么新鲜事，好在弟兄们都按时来上工了。”\n\n“那我们呢？”另一个汗流浃背的工人厉声道。“过去至少会有人发几条烟来犒赏我们，但这些家伙……”他指着远处那群身着整洁黑色西装的亚洲人，“就那帮身上挂着奇怪标志的。他们就这么走来走去，好像我们不存在一样！”\n\n“他们就是混蛋，一群混蛋！”一名工人气得大喊，手中生锈的铁铲也跟着在空中乱挥。“他们每天让我们干活。干更多活！好像这样就能解决材料短缺的问题似的！”\n\n“够了！”阿尔弗雷多的咆哮引起了周围工人的注意。“听着，我知道事不遂人愿，但我们已经干完一半了。所以忍着点，我们很快就能到科帕卡巴纳，只有这样——”\n\n“下午好，先生们。”乔瓦尼·巴蒂斯塔打了声招呼，他是日立“可敬”的巴西代表，也是日立忠实的看护人，或者说是他们手下的狗腿子。面对这惹人厌的二鬼子，阿尔弗雷多只能握紧拳头，小声臭骂一句“妈的”。“也许各位没有注意到，我们的午餐时间缩短了，这没什么大不了！毕竟几千年里我们都这么过来了。但工作不一样。毕竟铁轨和枕木不会自己长腿铺成铁路，对不对？”这家伙的诡辩总是会招致工人的恐惧和敌意，他们手中的工具可以轻易将他弄死，可他们却无动于衷。只是他们的老板气的脸变了形。"
 brazil.546.a: "“看什么看？滚回去工作！帕拉伊巴臭要饭的！”"
 brazil.547.t: "在圣母的光芒下"
 brazil.547.desc: "在巴西帝国时期，阿帕雷西达这个小村庄拥有全国第一条铁路线。多年过去了，这一壮举在这座小镇上重现，一条巴西最先进的铁路于此落成，他们也离最终目的地又近了一步。在付出了这么多汗水、鲜血和眼泪之后，这是一个很好的庆祝理由……吧？\n\n不，你太他妈天真了。“你的工作简直令人失望，塔瓦雷斯先生。”乔瓦尼蹩脚的葡萄牙语伴随着唾沫星子砸在阿尔弗雷多脸上。“日立的业务代表说得很清楚，要么让工人加快动作，要么动动你的懒屁股去和他们一起工作，很难理解吗？”\n\n我他妈理解的不能再通透了。继续苛求不可能的事吧，杂种。让你的日立大爹继续盯着我，看看能不能瞪出花来。你桌上的文书是咋回事？那装在木盒里的雪茄又是为什么放在这？当然，阿尔弗雷多不可能如此这般回复；恰恰相反，他的身体慢慢完成了九十度直角：“非常抱歉。我把我的——”\n\n“我还没说完呢。”乔瓦尼打断了他。“我们收到报告说，有人从急救仓库偷走了阿片。在找到罪魁祸首之前，损失要由铁路上的全体工人负责。”\n\n刹那间，阿尔弗雷多理性的面具第一次崩溃了。“什么！？请原谅我的措辞，但你他妈是在让我去死！工人们会把我的头穿起来——”*咔哒*\n\n转眼间，办公室中的时间仿佛静止了般，只有乔瓦尼的枪从枪套中伸出，落在桌上。“我知道你可以做到。我们都希望你可以做到。”乔瓦尼皮笑肉不笑道。阿尔弗雷多的身体前所未有地剧烈颤抖，他勉强弯下腰来再次鞠躬，带着心下的决意退出了办公室。"
 brazil.547.a: "你要战，便得战！"
 brazil.548.t: "救世基督的注视下"
 brazil.548.desc: "历经千辛万苦，里约-圣保罗铁路终于抵达瓜纳巴拉湾的门户。但阿尔弗雷多此刻毫无庆贺之心——就在昨日，他险些被暴怒的工人撕成碎片。正当他盘算着如何报复将自己玩弄于股掌的日立公司时，命运竟赐予他一份大礼：潜入日立办公室的他，意外发现了足以将总统送进监狱的文件，还顺手拿走了一盒古巴雪茄。此刻的阿尔弗雷多叼着战利品，在大桥上俯瞰沉睡的港湾。是该敲诈这群混蛋，还是把文件捅给报社？\n\n他正陶醉于复仇的狂想，突然听见身后传来子弹上膛的金属摩擦声。“我清楚你的小算盘。”乔瓦尼的葡萄牙语字正腔圆，枪管抵住他的后腰，“把文件交出来，否则——”枪口顺势滑向太阳穴。阿尔弗雷多咬咬牙，颤抖着递出档案袋。“可悲的表演，不过是你这种蠢货的常规水准。”乔瓦尼冷笑仍紧扣扳机，“知道为何不杀你吗？\"看着对方困惑的脸，他压低嗓音：\"还记得失窃的吗啡吗？真凶就在你身后……”阿尔弗雷多目瞪口呆，但乔瓦尼话还未完：“可惜背黑锅的却是你！人生无常啊，对吧？”\n\n阿尔弗雷多突然触电般跃起，将乔瓦尼撞向护栏。当惨叫声消散在夜风中，他睁眼只见科尔科瓦多山的基督像在云层间若隐若现。栏杆外空无一人，唯有指间的雪茄仍在燃烧。他深吸一口，将烟蒂弹入深渊。"
 brazil.548.a: "谢天谢地。"
 brazil.549.t: "未来已至"
 brazil.549.desc: "阿德马尔总统刚剪开巨大的红丝带，闪光灯与排山倒海的欢呼就淹没了仪式现场：市民、记者、饱受苦难的工人和在场的政治家都在欢庆这一时刻。大家聚集于此，只为见证里约-圣保罗铁路的竣工。可是真正参加了铁路建设的阿尔弗雷多却只有在角落观望的心情。他本该为这一刻感到开心的……但不管怎么说，他不用再面对那堆糟心事了。日立，工人们，乔瓦尼……他妈的他妈的！想点好的！没错，想想这条铁路，它将造福万千大众……\n\n“它多美啊，对吧？”突如其来的声音令阿尔弗雷多虎躯一震——映入眼帘的是位衣着朴素的家庭主妇。“这火车站，真的很美。”她继续自顾自地说道，“我真希望它能让这里变得更好。”主妇转向阿尔弗雷多，指了指他的证章，“你一定是工程的经理吧？我叫弗朗西丝卡，很高兴认识你。你一定在为自己的造物感到自豪吧？”\n\n“呃，职责所在罢了，”阿尔弗雷多腼腆地回复道，“我还得在这里待上一段时间，来为自己谋份新差事。”\n\n“噢，塔瓦雷斯先生！”弗朗西丝卡咯咯笑道，“别把自己逼得太紧。即使大家可能永远不会认识你，但你毕竟给了我们所有人一个奇迹。你留下的东西改善了这儿每个人的生活，这就够了。”\n\n主妇的话语深深印在阿尔弗雷多心中。但他们带来的却不是理所应当的骄傲，而是某些不愉快的回忆……不，够了。他已经从地狱爬出来了，而且圆满完成了自己的任务。这是他应得的。“谢谢你，弗朗西丝卡，我会铭记在心的。”\n\n真是有趣的对话，站在一旁的恩里克·特谢拉·洛特如是想到。拜他过于平庸的装束所赐，没有任何人认出这位大名鼎鼎的前总统阁下。尽管偷听的行径有些许违背这位绅士的信条，但洛特还是很高兴看到，在他下台后，名为国家的列车依旧平稳行驶在轨道上。"
 brazil.549.a: "多么完美的造物！或许我也该试试……"
 brazil.550.t: "悲喜并不相通"
 brazil.550.desc: "承包商将座椅后仰到极限，志得意满地欣赏自己的杰作。原本某些官僚坚持要修铁路隧道，但在几份“薄礼”的催化下，一切迎刃而解。公路才是未来交通的命脉啊，总统先生想必也会赞同这个观点。他踱步到办公室露台，尼泰罗伊的市区景致平平无奇，但海岸线却是造物主的馈赠。正前方，城市沿着海湾优雅舒展，远山如沉睡的巨人守护着这片蔚蓝；俯瞰下方，万顷碧波间穿梭的商船好似工蜂，维系着都市运转的脉搏。这般胜景若再添一道跨海长虹，定会更显壮丽。\n\n建筑师指尖香烟明灭，俯身凝视满桌狼藉的草图。从里约到尼泰罗伊，跨越瓜纳巴拉湾的九公里天堑。甲方要求六车道设计，意味着二十米桥面宽度。下方要过万吨巨轮，上方要让飞机穿行，七十米的净空高度不容缩减。他吐出的烟圈在晨光中飘散——这将是南美大陆最宏伟的跨海大桥。漫长的工期与天文数字的预算背后，必然伴随着无数偷工减料的操作。必须设计出他们无论如何搞砸都还能补救的最终方案。\n\n混凝土搅拌车司机在床上辗转反侧，他即将参与的是瓜纳巴拉湾超级大桥的基桩浇筑工程。脑海中挥之不去的是这样的画面：在离海面七十米高的路面上，任何一次转向失误都将万劫不复。胃部突然痉挛，仿佛已感受到卡车裹挟着水泥沉入海底的窒息感。或许，该考虑转行了？"
 brazil.550.a: "陌生人所建立的连接。"
 brazil.551.t: "里约-尼泰罗伊大桥灾难"
 brazil.551.desc: "横跨13公里碧波的里约-尼泰罗伊大桥建设过半。数以百计的桥墩如钢铁卫队般守护着“奇迹之城”，工人们在高空悬索间挥汗如雨。尽管主桥尚未合龙，这座世纪工程已经承载着突破自然天堑的雄心。\n\n突然间，某根立柱在波光粼粼的海湾中心崩塌。轰鸣声浪裹挟着烟尘横扫瓜纳巴拉湾，在摩天楼宇间横冲直撞，直至撞碎在山区的岩壁上。\n\n海滩上的游客、沿海公路的司机、山坡别墅的居民，共同目睹了这场灾难直播：钢筋混凝土巨柱在几秒内化作齑粉，消逝于浪涛。而那些在街角匆匆一瞥的人们，只看见海面之下的巨大黑影。\n\n当日落时统计出20名失踪者名单，翌日朝阳初升便改成了20具遇难者遗体。\n\n所谓调查不过律师与殡葬商的作秀，真正的元凶早已昭然若揭——建筑材料不达标导致的钢结构失效，这是贪污腐败酿成的必然恶果。\n\n住在甘博亚的弗朗西丝卡看得透彻：政府拨出的补偿金与其说是抚恤，不如说是堵住遗属之口的封口费，再划出一部分安抚暴怒的投资方。至于追责与整改？她望着窗外思考，至少这笔钱能让二十个破碎的家庭暂时果腹。"
 brazil.551.a: "“唯愿上帝怜悯寡妇们……”"
 brazil.552.t: "大桥何以耸立"
 brazil.552.desc: "“如同每个平凡的清晨，笼罩城市之上的薄雾被鸣笛声所驱散。车流缓缓涌入里约-尼泰罗伊大桥，穿越这座曾被视作妄想的宏伟工程，向远方驶去。尚未完全撤离的工地上，偶尔可见摄影团队的身影。他们采访着那些筋疲力竭、心灰意冷的建筑工人——这座巨构的缔造者。面对记者们冗长而琐碎的提问，工人们的回答显得毫无热情，言语间满是冷漠与疲惫。\n\n“社会各界似乎对这座桥梁的壮观成就漠不关心，而是更多地将目光聚焦于工程中的腐败与对劳工权益的侵害问题上，这无疑会使执政党议员和联邦政府深感不安。根据一些未经证实的报道暗示，建设过程中可能发生了数百起恶性事故，众多工人为此丧生。当地反对派和那些失去亲人的家庭掀起舆论，将这些悲剧归咎于过度劳累和严苛的配额制度。一些人担心，随着官方调查的启动，遇难者人数可能会进一步攀升。”\n\n弗朗西丝卡放下手中的晨报，踱步走向公寓的窗边。纵使在新事物中也处处可见的腐败令她颇感失望。她向远方望去，眼见报纸中提及的那座大桥正在阳光下熠熠生辉，映照着瓜纳巴拉湾的粼粼波光。\n\n她的脸上掠过一丝憧憬，或许有朝一日，凭借这些宏伟的建筑奇观，她的祖国将跻身世界强国之列。转瞬间，她的思绪又被拉回至那些为此付出汗与血的工人们。她对祖国的自豪感，对未来的憧憬，都将建立在这些同胞的尸骸之上。"
 brazil.552.a: "累累白骨筑起的桥梁。"
 brazil.553.t: "自然有价"
 brazil.553.desc: "在一声清脆的断裂声中，一棵巨大的红木树轰然倒地，加入了安东尼奥雇佣的伐木队伍已砍倒的树木之列，为他的牧场业务开辟了新的土地。\n\n安东尼奥坐在木材堆边，点上一支烟，对两位待命的工头打趣道：“要是知道这棵树能给我赚多少钱，你们指定大吃一惊！”他们回应道：“我们心里清楚着呢！”他们抬头望向天空，爽朗的笑声在空中回荡。\n\n安东尼奥目送着满是泥土的日立伐木机向下一批待劈的木头驶去，想象着几个月后这里将成为一片牧场，生长着供未来几代小牛啃食的鲜嫩草料。他梦想着兑现那些带有美国印章的支票，这些都得益于北方邻居对汉堡肉饼的无尽渴望和南方的石油短缺所引发的混乱。\n\n现在，他正注视着亚马孙的前沿，美国的需求和巴西对出口的渴求，可能将这片边境推进数公顷。安东尼奥觉得正是石油危机让他在这块土地上找到了自己的一席之地。"
 brazil.553.a: "亚马孙开门迎客啦。"
 brazil.554.t: "世界的毁灭者"
 brazil.554.desc: "两人搭乘的休伊直升机虽然坚固耐用，但在卡欣布山脉的横风中也要经受一番考验。劳多不禁好奇，在如此荒僻的高空，席尔瓦究竟是如何才能做到这般泰然自若的，周围只有旋翼的嗡嗡声、无线电偶尔的噼啪声，还有遥远的吼猴叫声。或许是他过去三十年的海军生涯，让他对这种颠簸早已习惯。\n\n席尔瓦喜欢眺望下方，看到亚马孙雨林覆盖的广阔绿海，偶尔有嶙峋的山峰、蜿蜒的河流穿插其中，甚至还能瞥见鹦鹉和角雕的身影。透过望远镜，他几乎能肯定自己看到了几只美洲豹。\n\n“我实在找不出比这更合适进行核试验的地方了。”他带着当年在化学课上常见的微笑说道。“这里远离文明，不必担心伤亡或间谍活动。我们还可以利用伊塔卡尤纳斯河来运输物资，这样就不必依赖本就不完善的道路了。当然，水体可能会受到辐射污染，但只要我们采取适当的防护措施，就能避免灾难性的核泄漏。\n\n“而且你知道吗，亚马孙克拉通是最古老的地壳部分之一，这意味着这里的基岩异常稳定。因此，我们不必担心地震会打扰我们的工作，更不用说引发构造活动了。\n\n“你看……”席尔瓦指向一个被挖掘的地表区域。劳多在头晕目眩中也看到了那些开采的台阶和废弃的设备。现存的基础设施将加快他们的进程，一想到他们要把这里挖空，变成巴西的核试验场地，两人就兴奋不已。"
 brazil.554.a: "“……我们占尽了天时地利。”"
 brazil.555.t: "点金之术"
 brazil.555.desc: "站在录音车旁的有利位置，席尔瓦向马塞洛·达米炫耀了近一个小时。达米是核领域里受人尊敬的年轻同事，席尔瓦对他讲述着工人们开始清理装置组装场地时，各种鸟类和昆虫乱飞的混乱场景，警卫们如何勇敢地与美洲虎和凯门鳄搏斗，还有地质学家如何迅速勘测山里的每个角落。“其实，这都只是刚开始！”\n\n在改头换面的矿坑下方，首席地质学家正穿着工装裤和轻便野外夹克，专注地检查着岩石样本。他身旁的劳多·纳特尔还在与蚊虫搏斗，这些蚊子似乎对人类重返这片区域感到欣喜若狂。席尔瓦正要向下面的二人挥手致意，达米的提问打断了他。“你信任他们吗？”席尔瓦似乎已经预料到接下来的对话。“你有什么担忧吗？”\n\n“你与政府打交道的时间比我长得多，你应该清楚，他们所触及的一切似乎都会变得……不纯洁。”达米边说边挠着下巴。“有人可能会把一些‘无关痛痒’的东西直接跳过，比如地质调查；打个比方，给一些研究人员塞点好处，让他们请一天假什么的。然而，一旦发生地下水泄露，我们就会面临核辐射危机。可能说得有些太直白了，我向您道歉，先生，但在制造……”达米挥动着双手，似乎在喉咙里寻找合适的词汇。“……炸弹时，难道不应该更加谨慎吗？”\n\n面对这样的问题，席尔瓦内心深处早有预感。制造核武器意味着为巴西的政客服务，他早已下定决心，唯有坚守信念。“马塞洛，我们多年来在各种项目上携手合作。你的疑虑完全合乎情理。但我请求你……”席尔瓦打开了一辆拖车的门，示意他进去。\n\n“你我都深知，在这个充满变数的领域中，每一步都是在走钢丝。但是，”席尔瓦的声音低沉而坚定，“我们必须相信自己，相信我们的团队，相信我们的目标。这不仅仅是关于技术或策略，更是一场对未来的赌注。”达米默默地进入拖车，他的眼神里既有犹豫也有决心。这次谈话，就像这片遥远的丛林，充满未知和挑战，但其中也蕴藏着无限的可能。在这片神秘的土地上，他们正在创造属于自己的历史。"
 brazil.555.a: "别再搞什么阴谋论了。"
 brazil.556.t: "黑暗之心"
 brazil.556.desc: "混凝土密室寒如冰窖。置身卡欣布山脉地下数百米深处，阿尔瓦罗·阿尔贝托·达·莫塔-席尔瓦忽然惊觉，自己为之奉献一生的祖国巴西，始终只存在于地表之上。而此处无异于异星——一颗干涸的异星。\n\n脚下五十米深处，庞大的管道与舱门系统在数周抽水作业后归于沉寂。湿气会弱化岩层，他们竭力避免形成塌陷坑。他承诺不会有辐射泄漏。但密室仍在向地心延伸。那里，是绝对的漆黑。\n\n此刻他所处的位置，高强度放电灯的光流从蜿蜒狭窄的入口涌入。席尔瓦伫立在光毯边缘，凭栏俯瞰那个即将安放核装置的微型舱室——摄像头与检测仪环伺左右，如同他最珍爱的婴儿般安睡在黑暗暖房的摇篮里。\n\n毫秒之间，万物将化为炽焰。周遭岩层不是熔化，而是直接气化。监测站或许能捕捉些许震动，但在炼狱核心，他预见了一切：雷霆与超高温光辉交织的审判帷幕下，万千灵魂凝固于永恒的瞬间，毕生功过皆在此刻称量。某个诡异而短暂的刹那，他竟嫉妒起他们——除却圣彼得，还有谁能为他解惑？\n\n“鬼斧神工啊，是吧？”劳多·纳特尔拍打席尔瓦后背的力道，让他踉跄着扶住栏杆。咳嗽声中，席尔瓦瞥见劳多身后，研究团队正带着几名目瞪口呆的政府官员参观。劳多搭上他肩膀：“你们正在创造历史。”"
 brazil.556.a: "席尔瓦只是点头回应。"
 brazil.557.t: "记者的困境"
 brazil.557.desc: "安东尼奥·维达尔的周身萦绕着挥之不去的烟味，与层层凝结的汗渍纠缠在一起。今夜他没有整理库存清单，没有核对处方记录，没有梳理那些戛然而止的审计痕迹，也没有整理关于医院违规操作的证词。\n\n不，那是昨天的事——昨夜他就已发现阿片类药物库存短缺，收入报表里蹊跷的激增，以及直白承认回扣与贿赂的往来信件，足够揭穿社进党的欺诈面具。\n\n可就在整理证据时，一个可怕的念头突然击中了他，如附骨之疽般挥之不去。\n\n今天的维达尔驱车穿越整座城市，公文包塞得鼓胀。从清晨到黄昏，他在政务大厅排着长队，与诊所行政人员争辩，又假扮“顾问”潜入保险公司。\n\n回到报社总部时，他顾不上吃晚饭就开始整理成摞的医护排班表与诊疗数据，期盼着能找到任何迹象证明自己最坏的猜想不成立。\n\n然而药价持续走低，基层医疗不断扩张，患者满意度节节攀升。尽管护理质量指标存在异常，但在医保法案通过后确实出现了明显下降。尽管违背他作为记者的直觉，但铁证如山的数据迫使他不得不承认，或许如今的医院在诊疗成效上确实没有太多可遮掩的污点。\n\n他将文件揉成一团，随手朝垃圾桶的方向一扔，跌坐回椅子上。必须另寻能支付账单的选题了。不管阿德马尔总统贪污了多少，没有读者会在乎……"
 brazil.557.a: "……哪怕他真的将一切曝光。"
 brazil.558.t: "天堂一角"
 brazil.558.desc: "“梅琳达，真不好意思打扰，可我家孩子……”弗朗西丝卡机械地重复着这套说辞。小女儿高烧五日不退，绝非普通流感——喉咙不见咳嗽，吞咽却疼得直掉泪，扁桃体渗出的脓液泛着骇人的黄色。\n\n“早啊，马丁内斯先生——哎呀，您隔着两扇门都听见了？太感谢了，您真是活菩萨！”可阿德马尔的巴西终究是阿德马尔的巴西。或许该试试那些吹得天花乱坠的医保改革，再从左邻右舍借些钱，带女儿去向往已久的诊所瞧瞧。\n\n“卢斯太太，我……实在对不住。我知道她给您添麻烦了，但求您……啊！您真是救苦救难的圣母！”数着皱巴巴的克鲁赛罗纸币，她终于能摇醒昏睡的女儿，顺路在储蓄所取出全部积蓄，一头扎进公仆医院的人潮。\n\n她怀抱着轻得像片羽毛的孩子，在青铜门廊前的人海里穿行。挂号处挤满了形形色色的病患，像是全里约的疾苦都来此集会。但弗朗西丝卡早做足功课——她排进那列牵着衣冠楚楚孩童的保姆队伍，待焦灼的等待后，将一沓浸透汗渍的钞票推过柜台。接待员微微点头，她借此顺利进入。\n\n穿过迷宫般的走廊耗去半小时，在天花板簌簌落灰的诊室里检查一刻钟，又在药房前排了四十五分钟长队，终于得到了那瓶青霉素V钾片，她站在医院前庭，像把玩纪念品般端详着药瓶。散尽家财换来的不过是几粒药片，和鬼画符般写着“链球菌性咽喉炎”的处方单。但至少，不用再听天由命了吧？"
 brazil.558.a: "如果存的钱够，说不定她们明年还会再来。"
 brazil.559.t: "北部农村的医疗保健"
 brazil.559.desc: "在水银街灯的斑驳光影下，一个穿着皮夹克的男人站在斜斜的波纹遮阳篷下，嘴里吹着悠扬的口哨。他身旁是一幢位于偏僻角落的建筑，褪色的红十字标志显示这或许是一家诊所。男人的背后，三个全身布满纹身的同伙悄然从一辆公用卡车的车尾下车。这个郊外小镇已进入深夜，但这些黑帮成员必须保持清醒，才能顺利在泥泞的暗路旁完成交易。\n\n几箱贴着医药标签的板条箱被从诊所里搬出，箱子里的玻璃瓶摇晃发出清脆的响声。一个身形瘦弱、穿着白大褂的人出现在货车旁，显得有些局促不安。黑帮成员的头目走上前，挡在医生面前。“等一下。”他冷冷地说道，“伙计们，你们去拿吗啡，我要和这位医生单独聊聊。”其他人默默点头，继续搬货，医生的苍老双眼微微颤抖，面前是这个头目带着威慑的笑容。\n\n“你是卡瓦略医生吧？”头目问道，医生犹豫了一下，只能点头。头目突然笑了起来，回头冲手下示意，并甩手扔给医生一叠钞票。“嘿，真的是他！”他兴奋地说，声音透出几分得意。他笑声渐渐散去，随意地挠了挠耳朵，又摆弄起自己的夹克。\n\n“我不得不说……”他压低了声音，先是把手臂交叉，又插进了夹克的口袋里，“离这里几个街区有一间小房子。”他朝远处的黑暗指了指，“在拐角有幅褪色的圣母玛利亚墙画，旁边还有一棵芒果树，你记得吗？”卡瓦略医生面露困惑，对此毫无印象。\n\n“我表兄就住那儿。”医生点点头。头目深吸一口气，语气略显沉重，“他病得很重，您帮了他。”头目整理了下姿势，挺起胸膛，目光凝视着医生的眼睛。“像您这样的人，巴西真的不多见……”他眨了眨眼，似乎在掩饰某种复杂的情绪。"
 brazil.559.a: "“……您要是遇到什么麻烦了就说一声，我们一定会帮忙的。”"
 brazil.560.t: "结局早已注定"
 brazil.560.desc: "“……农民们的诉求将在合理的期限内得到解决。这份根据联邦政府最新的改革计划提出的议案旨在帮助中西部地区的贫穷农民。”\n\n若泽不常看报纸，尤其是在市场上卖货的时候。但今天，报纸的头条引起了他的注意。“马里奥！你知道今天报纸扯了什么淡吗？”他对着向他走来的另一位农民笑着。\n\n“我看看。”马里奥说。他很好奇什么新闻能让若泽都开始看报纸了。他浏览了一下文章，找到了让他的朋友如此恼火的那句话。“合理期限？开玩笑的吧？四个星期了，但根本没人理睬我的情愿。”\n\n“我已经被晾了五个星期了，但安东尼奥的要求反而被接受了。人脉总是有用的。而我们还是得为了自己的每一寸土地而战。”他们知道巴西利亚的老爷们根本不在乎自己，他们只在乎钱。"
 brazil.560.a: "徒劳的挣扎所定义的人生。"
 brazil.561.t: "未被察觉的改变"
 brazil.561.desc: "这个村庄坐落在亚马孙，世世代代未曾改变，它的样貌看起来也和上世纪、乃至上上世纪差不了许多。农民们在当地寡头的土地上劳作，他们离世独居，他们投票给社民党——从来都是如此。\n\n直到近来，人们开始热烈讨论这些话题，其中还有今天拉着收成来小市场的两名农民。原因只有一个，那就是寡头把土地转让到了农民手里。\n\n显然，这是闻所未闻、难以想象的事情，人们只有在不想惹火上身的时候才会小心翼翼地谈论“土地改革”这个概念——但这已经成真了，农民们一致认为好处已经显现出来了：能种植更多的作物、更好地打理土地、为家庭做些事情。他们百思不得其解，不晓得大老板为什么要这么做，而答案指向了同一个结论。\n\n有人给他付钱了。\n\n正当他们纳闷究竟是谁这么干时。那个每周“进城”一次的人回来了，带回来了一叠报纸，也是村里唯一的新闻来源。报纸头版印着阿德马尔总统的巨幅照片，还有宣称他最近的全国土地改革取得成功的报道。\n\n那天晚上，村子里的话题从土地改革变成了下一次选举。自从人们记事以来，社进党对他们看起来确实很好。"
 brazil.561.a: "有因有果。"
 brazil.562.t: "民族革命"
 brazil.562.desc: "空气中弥漫着灼热，那是亚马孙潮湿泥土的蒸气，是熊熊燃烧的火焰吞噬肉身时的温度，更是自由人心中燃起的熊熊怒火。他们面前，悬挂着一具具男人的尸体——若那些贪婪的地主还配被称作人的话。弗朗西丝卡与人海中的千千万万同胞并肩而立，数不尽的红旗如鲜血一般染红了昔日的庄园，那是一场硝烟未散的恶战所留下的印记。\n\n他们的领袖步上讲坛，人潮为之欢呼。这场斗争虽漫长且艰辛，但全胜之日指日可待。只需再解决几个顽固势力，那些吸血鬼终将被逐出巴西。领袖开始了他的演讲，语气中既有不屈的意志，也透着温柔的人文关怀。若弗朗西丝卡的眼中还有泪水，此刻她定会泪流满面。“工人们，战士们，我的同志们！”他的声音回荡。\n\n“我们漫长的革命即将画上句点。唯一让我遗憾的是，我们的敌人将无缘见证人民战争的辉煌胜利。”他边说边示意着那些随风飘荡的尸身。\n\n“他们指责我们是窃贼，却肆无忌惮地掠夺人民的血汗。我们未曾盗窃，我们只是夺回了……不，我们解放了属于我们的土地。现在，这片土地归你们所有，我的同志们。不久的将来，巴西的每一寸土地都将回归到耕耘者的手中。”\n\n话音未落，人民军队的呼喊声便如雷鸣般响起，弗朗西丝卡的呼声尤为响亮：“让寡头灭亡！让地主灭亡！”"
 brazil.562.a: "“阿德马尔同志万岁！”"
 brazil.563.t: "火上浇油"
 brazil.563.desc: "在里约热内卢，骚乱已经失控。石油危机的触手伸向了南美，如今已经扼住了里约市场的咽喉。每一家银行前都排起了长队，抗议者和警察打成一团。暴动在贫民窟里蔓延，所有的一切都在渐渐笼罩舒格洛夫山的浓烟中艰难地喘息着。\n\n巴伊亚收获的不只是作物，还有混乱。过去几十年迅猛的发展与随之而来的机械化进程都没有做好在这一切忽然中断时应对停滞的准备。现在，农民们清点着他们的库存、农机和钱包，试图避开这场行将到来的灾难。\n\n在巴西利亚，他们羞愧地低下了头颅。巴西原本清晰的未来图景已经被它对意大利石油的依赖和自身石油工业的严重浪费戴上了镣铐。如今手持镣铐的是拥有充足石油资源的委内瑞拉，这给他们带来了强大的政治筹码，他们只要一涨价，我们的首都就会陷入混乱。顾问和政客们绝望地透过国会的窗户望向远方，苦苦思索着如何打破自己一手缔造的困境。\n\n在科帕卡巴纳，恩里克·洛特不安地坐在他的扶手椅上。他读着不同类型的报纸，每一份都在用不同的故事描述着国家面临的苦况。最终，同样的无力感涌上他的心头。他所有的努力，他为这个国家所做的一切，都将在这场野火中窒息而死吗？\n\n真正的答案为何取决于高原宫做出的抉择以及今后的举措。除此以外的整个国家，包括他在内，都只会是这场苦旅中的乘客。"
 brazil.563.a: "希望的考验"
 brazil.564.t: "未来一片蓝"
 brazil.564.desc: "尽管石油危机让许多人无法到场，但巴西利亚仍然洋溢着全民盟支持者的热情。总统的劳斯莱斯车缓缓驶过街道，街边的欢呼声响彻云霄，马加良斯微笑着向民众挥手致意。最终，轿车来到了他梦寐以求的地方——晨曦宫的坡道。\n\n他满怀自豪地登上坡道，正前方，[BRA.GetLeader]已准备好为新总统授予绶带，可惜他的政党未能胜选，脸上难掩失落。就职仪式上，群众的欢呼声如雷，但随着马加良斯开始发表演讲，现场逐渐安静下来。\n\n“我的巴西同胞们，经济自由化是我们唯一的出路。目前的种种限制让我们在这场危机中处境更加艰难。我们必须大力吸引外资来巴西。我们境内拥有丰富的石油资源，可以帮助我们减少对外国石油的依赖，在这场危机中屹立不倒。”\n\n演讲结束后，马加良斯来到晨曦宫。他心里明白，国家将重任托付于他。他坚信，巴西是一座尚未充分开发的金矿，这片土地和它的资源，足以从中诞生一个未来的超级大国。"
 brazil.564.a: "经济发达，国家才会强大。"
 brazil.565.t: "众人之党"
 brazil.565.desc: "布里佐拉笑着，今天是他梦寐以求的日子。他披挂着象征胜利的总统绶带向民众挥手，眼中饱含骄傲之情。人群中既有工党拥趸，亦有自巴西利亚郊区围簇而来的贫困居民，他们都在高呼布里佐拉的名字。布里佐拉开始讲话，人群安静下来，开始聆听他们的新总统。\n\n“巴西人民，‘变革’，这是十月时，我们高呼的口号，它也将成为我们永远高举的纲领！企业贪婪无边，试图榨取每一滴利润；面对危机，巴西人民挺身而出，用对美好未来的期望与希冀战胜了它。”\n\n布里佐拉沉默了。他很紧张，他怎能不紧张呢？这就是他期待已久的场景，但人民会像他爱他们那样同样爱着他吗？脑海中的想法不断翻腾，让布里佐拉痛苦不堪。他看向身旁同他并肩而立的妻子，“别担心，”她说，“人民爱你。”得到这如同天籁的抚慰之后，他继续发言。\n\n“有人说巴西是未来之国，而且她将永远如是。而我要说，朋友们，未来已经到来。毕竟，哪怕有再多的资源与财富，她的人民倘若不幸福，那这一切又有何价值？我向人民保证，我的总统任期将是为人民服务，而不为利益、不为关系、不为资本服务。”\n\n他以坚定的语气澄清自我，台下的人群鼓起掌来。他知道自己是对的，即使这意味着不仅要招惹那些可能损害他事业的企业，还会激怒随时可能推翻他的军方。他不在乎，他知道，人民的支持就是他所需要的一切。"
 brazil.565.a: "这位，便是黎民之子吗？"
 brazil.566.t: "雨幕中的就职"
 brazil.566.desc: "就职典礼这天与往常不同，巴西利亚的天气阴沉多雨，但这并未阻挡成千上万的群众聚集在路障边，见证内伊·布拉加的总统车队驶上晨曦宫的坡道。在盛况空前的游行队伍和热烈的气氛中，新总统感受到了一种前所未有的希望，压过了内心中的恐惧。\n\n他缓缓地走进宫殿，与长长的队伍逐一握手，最后一次站在阳台上面对群众时，他整理了自己的思绪。“巴西同胞们，尽管我们面临重重困难，但今天，在这场就职的典礼上，我们没有被挫折击倒，没有向失败屈服。今天是充满希望的一天！”绿、黄、蓝三色的人海中，爆发出了一阵阵欢呼与喝彩声。\n\n“今天是对我们毅力与耐心的考验。当然，我们必须意识到恢复所需的努力。我们的国家正在流血。作为巴拉那州州长，我对此深有体会。但是，正如这次选举所证明的那样，只有当我们齐心协力，廉洁奉公时，我们才能一同将祖国重建。倘若人人都能保持这般高洁的品质，晦暗的日子将会不再，光辉的时刻就要到来！愿上主保佑巴西！”\n\n群众渐渐散去，直到消失在总统家人的视线中。新总统开始思索起未来，他曾经治理过一个州，他能够，也一定会治理好这个国家。虽然行过死荫的幽谷， 也不怕遭害，因为主与我同在，愿我主指引我前行的方向。"
 brazil.566.a: "他将领着他的百姓，一道前行。"
 brazil.567.t: "属于埃德娜的终曲"
 brazil.567.desc: "今天是巴西利亚凉爽的一天，巴西现任总统埃德娜·洛特步入了晨曦宫。阿德马尔站在斜坡上，过去，她作为副总统为他工作了那么多年，现在，他正要把手中的绶带递到她手中。\n\n典礼开始了，埃德娜顺利地接过了总统绶带，随后开始了她作为巴西总统的第一次演讲：“亲爱的巴西人们，无论是对于巴西还是世界，今天都是历史性的一天、值得庆祝的一天。你们选择了一位女性成为我们国家的总统。”\n\n人群欢呼起来，但埃德娜很清楚，他们希望知道她准备如何率领巴西走出眼下的危机。“朋友们，当前的危机既是石油问题，也是信心问题。如果我们自己都不相信自己能做到，那我们就真的无从做到。我将颁布一系列保护我国人民免于危机冲击的新政策。”\n\n她继续着演讲，人们全神贯注地倾听着她的一言一语。“谢谢你，巴西！我们将共同创造更光明的未来！”人群再次欢呼起来，但当她走进宫中时，想到自己即将面临的考验，她依然不由得感到紧张。但她相信自己担得上这份职责，拥有保护人民的力量。\n\n"
 brazil.567.a: "正确的女人，称职的总统。"
 brazil.568.t: "一月的雨天"
 brazil.568.desc: "又是巴西利亚一个多雨的一月天。内维斯已经走上了晨曦宫的坡道，从身旁的前任总统手中接过了总统绶带。人群保罗外箱，无论黑皮肤还是白皮肤，无论左翼还是右翼，他们都在看到新总统时高声欢呼。\n\n内维斯向兴奋的人群挥手，欢呼声愈发响亮，然后安静下来，好让新总统发言：“巴西人民！感谢你们，我才能站在这里，成为总统，我感激不尽。我还记得三十年前，瓦加斯欢迎我成为他的部长的时候。那一天，我曾发誓，要永远保住他的理想。”\n\n人群仍在欢呼，但内维斯能看到他们眼中的新神情：对石油危机的担忧。“巴西，这美丽国家的人民们！在这危机时刻，我承诺，我会将自己数十年的经验用在治国之上。社会民主党将保证巴西免受任何问题的困扰；我们承诺，‘五年跨越五十年’！”\n\n人群欣喜若狂，喊着坦克雷多·内维斯的名字，拼命鼓掌。内维斯再一次望向他们，只感到一阵安心：没有什么能动摇他的信心，人民选择了他，他知道，这正是伟大事业的开端。"
 brazil.568.a: "一砖一瓦，始于足下。"
 brazil.569.t: "让父亲为你骄傲"
 brazil.569.desc: "阿德马尔笑着将总统绥带递到小瓦加斯手中。他很高兴有人能接下他的遗产，在接下来的五年里继续社进党的革命。小瓦加斯也喜不自胜，他的梦想终于实现了——他成为了总统，成为了父亲真正的后继者。\n\n他向着欢呼起来的人群挥手示意：“巴西的人民们！不要忘记，我们的国家曾一次又一次渡过艰难的岁月。在大萧条的阴霾里，我们只能烧毁亲手收获的咖啡；在世界大战的战场上，我们的战士们血洒疆场。但即便如此，我们依然造就了繁荣的国家，而在渡过这场危机后，更辉煌的未来必在前方！”\n\n他停顿片刻，回想着他父亲留下的遗产。他要如何赓续这由他的父亲开辟、由阿德马尔继承的事业？但这些忧虑很快就烟消云散。阿德马尔为巴西留下了宝贵的财富，而他也会做同样的事。“朋友们，我们要继续我的父亲与阿德马尔先生为之奉献的事业，坚定不移地走现代化之路，大力发展生物燃料产业，让这样的危机永远不再威胁到我们！”\n\n这番话让人们有些困惑，但他们仍为小瓦加斯的魅力折服。他怎么就不可能比他的父亲做得更好呢？在他走入高原宫时，兴奋的人们已经改变了对他的称呼。\n\n他真诚的希望人们会像爱戴阿德马尔和他的父亲一样爱戴他。社进党的革命仍将继续，而他将开创比父亲更伟大的功业。"
 brazil.569.a: "长者的子弟，公牛的门生，最佳的人选。"
 brazil.570.t: "音乐消亡之日"
 brazil.570.desc: "1970年1月1日，因耻辱而载入史册的一天。阴冷的天空下着小雨，阴云笼罩着巴西利亚，正与天空下的气氛相匹。路人散开来绕道而行，唯恐卷入民代党和社民党支持者的冲突。只有一群人感到心情愉悦。\n\n普利尼奥·萨尔加多和乌利塞斯·吉马良斯走出总统的劳斯莱斯，走上晨曦宫的坡道。他们的视线避开了对方，毕竟他们实在难以想象自己居然要和彼此共事。前总统不适地将总统绥带递到萨尔加多手中，萨尔加多则将其收下。\n\n萨尔加多举起麦克风，开始了演讲：“Anauê！”人群中的一些人热烈地举手回礼，另一些人则依然沉默。“亲爱的巴西同胞们，当我流亡到伊比利亚时，我从没想到我今天能站在这里向你们发表演讲。我知道，很多人并没有给我投票，但我在这里向你们承诺，我将组建一个团结的政府，即使是那些不赞同我个人主张的人，他们的声音也能得到传达。”\n\n他很清楚人们脑海中此时此刻的想法。他将如何应对这场危机？“巴西的人民们！我深知，我们正面临着严峻的挑战，而我相信，我们应当学习德国和意大利来应对危机。我们的作为将让我们的国家更加强大、有力而团结。我真诚的感谢每一位为我们投票的人们。”\n\n在组成人墙隔开人群的民代党员们的欢呼中，萨尔加多走下了演讲台。他很清楚，乌利塞斯绝不会允许他的计划成真，而这样一个人是副总统的事实恐怕会比危机本身带来更多的混乱。"
 brazil.570.a: "未来看似黯淡，但自由的微光在黑暗中闪耀。"
 brazil.571.t: "安格拉破土"
 brazil.571.desc: "终于，核电站施工队的目标确定了，安格拉一号将推动新能源的发展，二号和三号也已提上日程。工程师们目不转睛地研究着蓝图，想象着管道、气缸和腔室组成的复杂结构。但首先，他们需要建起一栋能容纳它的建筑。\n\n工程开始了，无数叉车、起重机和巨型机械调到了这俯瞰大西洋的原野上，安格拉-杜斯雷斯的翠绿山脉就在地平线上。许多工人实际上来自里约热内卢，他们工作不只是为了赚钱，更是希望他们的贫民窟能不再陷入黑暗。至少现在，和休息时分享的希望与梦想相比，抱怨微不足道。\n\n“总算不是给那些人面兽心的大老板铺路啦，”一名司机看着落下山头的红日说道，“咱们这回干的可是正儿八经的大工程。”\n\n“好了，阿马德奥，我们不过就铺了点沥青而已。”一名工友嘲笑道，“先把活干完，然后随你胡思乱想。”"
 brazil.571.a: "驱动这些机械的正是希望。"
 brazil.572.t: "原子为希望"
 brazil.572.desc: "他们孕育了一个巨人，但巴西历史上的第一座核电站，既非自主研发，也非想象中的庞然巨物，将它推上舞台的其实是美国大使和外交部长瓦斯科·莱唐·达·库尼亚。谈判不过持续了一天，其结果却影响深远。记者们聚集在新闻发布会上，向民众传达这一重磅消息对巴西意味着什么。\n\n尽管这不是巴西人自己的劳动果实，也不像许多巴西人想象的那样惊天动地，但人们的敬畏之情却无半点虚假。所有的与会者，甚至是美国的核科学家们，都对这个装置充满了无声的敬仰，仿佛它是一种神灵。这是一种无法表述的艺术形式，象征着巴西迈入未来的步伐。\n\n在原子换和平计划的架构之下，美国将资助和支持发展中国家的工业化和科技革命。会议的发言人频频提及这个核电厂将带来的巨大电力、就业和工业机会。\n\n当然，项目不是毫无代价的。大使多次提到“监督”和“检查”，以“保证原子换和平计划不会用于战争”。对这番话，人们默默报以尊重。\n\n不过，若是问当地人他们最难忘的是什么，他们可能会回答是那些绿黄相间的醒目横幅、海报和旗帜，那些展示着巴西工人微笑着、仰望星空的画面。这正是原子换和平计划所要实现的梦想。"
 brazil.572.a: "我们都是由原子组成的，我们需要的只有挖掘它们的潜力。"
 brazil.573.t: "安格拉竣工"
 brazil.573.desc: "“距第一台设备运抵工地已有几年，今天，我们终于迎来了巴西首座核电站竣工的时刻！”工头的贺词赢得了热烈的掌声，工人们举杯相庆，虽然没有香槟，只能以可乐替代，但简单朴素也没有妨碍大家享受最后一个集体夜晚。\n\n然而这并不意味着第二天早上会风平浪静，工人撤出后，科学家和工程师紧随而至，前来检查，协调安装设备。不过，就连他们也被电站吸引住了：在大西洋的映衬下，外墙的石英白涂料闪闪发光。明明一旦管理不善就会带来灾难，可这个庞然大物依旧散发出迷人的气场。\n\n许多人从未想到会走到这一步，但是，当照片出现在电视屏幕和报纸头版上时，那些日复一日的诋毁，那些预测工程将陷入泥潭的悲观评论，都被否定了。无论是国会还是总统都松了一口气。\n\n大多数施工人员虽已退职，或被分配到其他岗位。但他们的成果永垂不朽：巴西将成为核能利用国的一员。"
 brazil.573.a: "工作还未结束，但的确意义重大。"
 brazil.574.t: "安格拉一号点火"
 brazil.574.desc: "最后几名工作人员挤进那间布满无衬线标识与色码操作台的监控大厅，一位白发如雪、身着褐色高领衫的男子背对人群。他早已将新闻通稿掷向记者席，此刻正凝视着控制室内跳动的数据流。\n\n三位工程师在寂静中走向红色按钮——发蜡抹得锃亮的官员脚步声、摄影师相机的机械快门声、身着制服的科研人员调整站姿的悉索声，以及现场六名女性克制的交谈声，此刻都消融在仪器运行的嗡鸣里。\n\n忽然，某种奇异的共鸣自地底升起。监控屏上的温度示数开始跃升：200，225……多台显示器同时发出蜂鸣。250，260……信号灯此起彼伏明灭，反应堆冷却剂泵启动，265……270……\n\n275度的刻度线上，整座建筑开始随深层谐波共振轰鸣。\n\n此刻在数百公里外，分布在南海岸翡翠色雨林与山巅间的变电站与输电铁塔，正贪婪吮吸着核电站输出的新生能源。\n\n西南方向的圣保罗市郊，坎加伊巴区的居民欢呼着告别轮番停电时代，他们的冰箱终于能稳定运行；东北方里约热内卢的雷阿嫩戈街区，杂货店主在结算账目时唇角含笑，与东南部万千民众共享着此刻的欣悦。"
 brazil.574.a: "原子革命为她减轻了负担。"
 brazil.575.t: "再见了，感谢你们的馈赠"
 brazil.575.desc: "一声轻微的关节响声在房间里回荡，总统缓缓坐下。阿德马尔皱了皱眉，他的身体最近似乎越来越习惯于发出这种不太雅观的声音了。他挥了挥手，示意察觉到他表情的助手不必理会——今天不是表现脆弱的日子，而是展示力量的时刻。摄制组在他面前忙碌着，而他则在心里默默地再次演练着他的告别演讲。\n\n改善的医疗体系、更高的经济增长、更多的贸易往来。正如他1965年许下的诺言那样，一个更加伟大的巴西。或许很多人会持不同意见，但去他们的吧。他自认为自己兑现了承诺。镜头后的摄影师做了一个手势，示意他们即将开始。他压下涌上喉咙的咳嗽感，坚定地点了点头。聚光灯亮起，他开始了他的演讲。\n\n“我的巴西同胞们，大家好。正如你们所知，我的总统任期已接近尾声。如今，我将为我的继任者让位，在此，我要衷心感谢你们这些年来给予我以及社会进步党的支持，尤其是在我……身体欠佳之时。正是因为你们的支持，我们才得以实现如今的成就。贸易增加，经济繁荣，人人有工可做，我们也终于拥有了应得的医疗保障——正是这种医疗体系拯救了我的生命。因此，作为我的任期即将结束之际，我只能祈求上帝保佑即将接任的总统[GetLeader]一切顺利，同时，再次感谢你们。愿上帝保佑我们所有人。”\n\n摄像机前的灯光熄灭了，摄影师用手势示意拍摄结束了。沉重的事实逐渐浮现，他的总统生涯正式走向了终点。阿德马尔站起身来，强忍着疲惫，最后一次环视着这间总统办公室。有那么一瞬间，他仿佛在华盛顿·路易斯画像旁看见了一个模糊的身影，一个熟悉却无法辨识的剪影。但那只是光影的错觉。他凝视着这位来自圣保罗的前总统画像，一个曾背负着厚重历史的人，脑海中只剩下一个疑问："
 brazil.575.a: "历史，会如何评价他呢？"
 brazil.576.t: "责任的尾声"
 brazil.576.desc: "佩德罗·阿莱绍总统站在讲台上，神情依旧像他刚上任那天一样困惑不安。他那副厚重的眼镜将眼睛映衬得有些扭曲怪异，每说一个字，他的双颊便微微颤抖。他心知肚明，没人对这次演讲抱有太高的期待，但正如他整个任期一样，这是一份无法推却的责任。\n\n“……我确信，我能担任这个崇高职位，对你们而言，和对我自己一样震惊。我也明白，你们中的许多人在得知我上任时，恐怕同我一样感到不安。我是在共和国历史上最严重的危机之一中宣誓就职的。然而，尽管一切艰难重重，但正是因为你们的坚持不懈，这场风暴才终于开始平息。”\n\n“仅仅是权力的和平交接这一事实，就足以证明我们的民主制度比任何人预想的都更加坚韧。真正支撑起这个国家的，不是我，而是你们。你们无畏恐惧、暴力与分裂，坚守了这片土地。但斗争尚未结束。尽管我已竭尽所能，确保民主与法治的延续，但这个国家的未来，终究掌握在你们手中。”\n\n“如今，我能给予你们的，唯有感激与一份小小的忠告：请永远记住，你的敌人不是你的同胞，无论他们的政治立场、信仰或肤色如何，你们之间都存在着一种超乎想象的深厚纽带。你们真正的敌人，是分裂与仇恨，是暴力与恐惧。唯有团结一致，共同展望未来，我们才能真正实现先辈们曾经怀揣的梦想。我相信，你们会引领我的继任者走向正途，因此唯有团结一致，巴西才能走出昨日的黑暗，迎向光明。”\n\n说完这些，这位临时总统默默地退下了讲台，步入历史的阴影之中……"
 brazil.576.a: "脸上却带着一抹充满希望的微笑。"
 brazil.577.t: "展望未来"
 brazil.577.desc: "就像无数其他紧盯着电视屏幕的观众一样，弗朗西丝卡凝视着埃德娜·洛特在光彩夺目的巴西利亚首都向数千名观众发表演讲。她那狭小的公寓里充满了洛特从扬声器中传出的嘈杂声音，震耳欲聋的音量让弗朗西丝卡的孩子们困惑不解，不明白母亲为何如此专注。\n\n“巴西正经历着近几十年来最深刻的变革。这些年来，我们曾面临艰难险阻，那些挑战动摇了国家的根基，使整个国家笼罩在飘渺不定的阴霾之中。今天，展望未来，我们要努力走出这段动荡的阴影。我要提前向伟大的巴西人民致以最深的感激之情，我无法用言语表达你们对这个国家未来的重要性。”洛特声音坚定而洪亮，画面切换至她注视着麦克风发表讲话的画面。\n\n“过去几年里，经济衰退是一场始料未及的灾难，而这场危机未能得到及时解决，是我们深感痛惜的。但我想明确表示，解决所谓的‘石油危机’将是我们政府的首要任务，我们会尽一切力量阻止危机继续恶化。我们已经与委内瑞拉政府初步达成了协议，以优惠价格进口石油，同时还批准了对巴西国家石油公司的各项补贴和资金支持，以尽可能缓解这场危机。我们绝不会让自己屈服于这场灾难之中。我对巴西人民的职责，就是履行你们交付给我的使命。我将竭尽所能，确保这个国家在现代世界的不确定性中毫发无损。”洛特结束了她的演讲，带着随行秘书离开了讲台，而台下的观众则爆发出热烈的爱国欢呼声。\n\n弗朗西丝卡关掉了电视，脸上浮现出一丝微笑。她心里清楚，如果有谁能够带领巴西走出困境，那就是洛特。即使她和孩子们仍然面临着诸多困难，但她内心深处却燃起了一丝希望的微光。"
 brazil.577.a: "巴西飘渺不定的阴霾，正逐渐消散。"
 brazil.578.t: "拖延不可避免的结局"
 brazil.578.desc: "埃德娜·洛特在拖延。距离她那场该死的告别演讲，已经过去快一个小时了。她的物品都已收拾妥当，从法律上讲，她已不再是总统。但她就是无法迈出这一步，无法真正离开这间办公室。这一切都显得如此不真实——曾经近在咫尺的权力与成就，如今却被毫不留情地抛回政治的荒野。\n\n但这不仅仅是她个人的失败，更是洛特家族的耻辱。她几乎可以肯定，父亲会用温和的话语安慰她，但在心底，她明白他终究会因为她的失败而感到失望。他怎么可能不失望呢？\n\n她无力地踢了一下墙，却立刻缩回了脚。有人听到了吗？埃德娜猛然意识到自己的失态，迅速站直了身子。她不能被绝望吞噬，这正是那些人想看到的——看到她崩溃，看到她失控哭泣。她的父亲曾在不列颠的战火中坚守不屈，而她所面对的与那相比简直是小儿科。\n\n她抹去了脸上的泪痕，拿起了最后一叠文件，打开了办公室的门。临走前，埃德娜回望那张办公桌，安慰自己：或许，她还有东山再起的机会。毕竟，历史上也不是没有过这样的例子。也许她只是需要一些时间喘息，对，就是这样。她或许可以回归讲台，回到教学岗位，等时机成熟时，再来夺回属于她的一切。\n\n不。埃德娜猛地摇了摇头，将这些念头驱散。结束了，一切都结束了，没有回头路了。一个真正的战士，应该知道何时承认失败。她迈出了办公室的大门，走向了政治的暗淡角落……"
 brazil.578.a: "也许这一次，真的再无回头之路了。"
 brazil.579.t: "瞬息万变"
 brazil.579.desc: "那台廉价的黑白电视屏幕上，前副总统埃德娜·洛特正在发表败选演说。她的仪态依旧端庄自持，但即使是这样模糊的画面，弗朗西丝卡依然能在她的眼神中察觉到那难以掩饰的羞辱感，那是一种她再熟悉不过的感觉。\n\n出纳员和他的助手全神贯注地盯着电视，甚至没有注意到弗朗西丝卡已经把物品放到了柜台上。“看来她爸爸从公路工程里捞的那些黑钱，还不足以帮那头母牛买下总统宝座啊。”助手冷笑道。弗朗西丝卡的胃里泛起了恶心，手微微颤抖着，把一袋面粉放到柜台上。可收银员仍然没有抬头。\n\n电视里，埃德娜继续着她的讲话，向社会民主党和工党的支持者表达感谢。而那两个男人的讥讽却愈演愈烈。“听说她曾暗示要给阿德马尔一些‘好处’，以换取他的支持。”出纳员冷笑着说道。\n\n“我听说他是答应了，可等他看到她裙子底下的‘秘密’，吓得心脏都停了！”助手接腔道。\n\n两人爆发出震耳欲聋的笑声，完全盖过了电视中埃德娜演讲的最后部分。终于，收银员转过头来，注意到弗朗西丝卡推到柜台上的那小堆硬币。他随手把零钱扫进抽屉，又把目光转回了电视屏幕。弗朗西丝卡什么也没说，默默地收拾好自己的东西，快步走出了商店。\n\n短暂的时间里，她曾以为这个国家真的会有所改变，曾以为她的女儿们能够拥有更好的未来。然而此刻，她在心底咒骂着自己的天真。不管变了多少……"
 brazil.579.a: "巴西还是老样子。"
 brazil.580.t: "终幕之始"
 brazil.580.desc: "一切又如预料中的发生了——所有的恐惧汇聚成了现实。军队突然发起了攻击，在黎明前的黑暗中，圣保罗机场被当地的守军占据，他们要求布里佐拉立刻下台并接受逮捕。经历了漫长岁月的布里佐拉深知，这只是个开始。接下来，设施将被没收，通信被切断，紧接着就是一连串的抓捕行动。如果幸运的话，这可能是血腥冲突的终结，但这位上台时间有如昙花一现的总统知道，最好不要抱有太多希望。\n\n布里佐拉环视那由混凝土构成的简陋掩体，目光落在蜷缩在一角、泣不成声的竞选团队成员身上。几个小时过去了，外界没有传来任何动静。他交叉着双手，从泡沫塑料杯中啜饮一口咖啡，味道既浓郁又苦涩，与当前的处境恰恰相似。一位年轻的助手手持文件，急匆匆地走到他面前，布里佐拉心中一沉，“直说吧，孩子。我们面临着什么？还有多少军队加入了他们的？”\n\n助手犹豫了一下才开口，“没有，先生。”他结结巴巴地回答，“没有进一步叛乱的消息。有一些全民盟的声音在为他们助威，但目前看来，事态似乎被控制在机场之内。”\n\n“他们在做什么？他们有向城市推进的迹象吗？”\n\n“不，他们似乎只是……就那么坐着。”布里佐拉愣住了，还没来得及反应，一位坐在电话旁的秘书突然向他大声报告。\n\n“我已经确认！他们放下了武器！我再重复一遍，叛军请求投降！”\n\n布里佐拉沉默了几秒，地堡里一片寂静。然后，他突然放声大笑，几周来累积的紧张气氛在那一刻烟消云散。所有的威胁，所有的恐惧——全都化为乌有！巴西的军事反对派似乎已经宣告了自己的终结。不费吹灰……"
 brazil.580.a: "全付笑谈间。"
 brazil.581.t: "苦难与成功"
 brazil.581.desc: "即将就任总统的布里佐拉站在巴西国会的后厅，嘴里叼着一根香烟，静静地抽着。距离宣誓就职的时刻已不远，这些天的筹备工作让他筋疲力尽。他见过了无数西装革履之人，他们要么讨好献媚，只为得到他的青睐；要么咒骂诅咒，仿佛来自地狱的千重怒火。有时候，他甚至分不清哪种更让人厌恶。\n\n突然，他的背被重重拍了一下，猛然一震，差点让肺里的空气全被挤了出来，香烟也从嘴里飞了出去，落在地上发出“嘶”的一声，随后被一只皮鞋狠狠碾灭。若昂·古拉特微笑着站在他身后。\n\n“天啊，扬戈，你差点把我吓出心脏病了！你知道现在有多少人在喊着要我的脑袋吗？”布里佐拉长舒一口气，半是抱怨半是玩笑地说道。\n\n“我正是这么想的，得帮你保持警觉啊。”古拉特笑着回应。布里佐拉也笑了，随即与这位老友拥抱了一下。\n\n“我不能久留，我得赶回参议院了，总得有人帮你把那群乌合之众看住，对吧？不过，我还是想提前祝你好运。”古拉特微笑着，转身准备离开。\n\n布里佐拉却侧身挡在了门口，食指摇了摇，戏谑道：“你可没那么容易走掉。”他指了指地上的烟蒂，“我们宫里那个贼人刚滚蛋，我可不想在参议院再多一个破坏公物的恶棍。”\n\n“遗憾的是，我今天把烟忘家里了。不过，也许我带来了更好的东西。”古拉特笑着从外套里掏出一份报纸。布里佐拉瞥了一眼标题，随即露出了满意的笑容。那篇社论的大字标题赫然写着：“乌鸦还是渡渡鸟？全民盟发言人的政治生涯岌岌可危”，与老朋友重逢固然令人欣喜，但此刻，真正让布里佐拉心情大好的……"
 brazil.581.a: "是看到卡洛斯·拉塞尔达的落魄样子。"
 brazil.585.t: "全球共鸣"
 brazil.585.desc: "提案已获通过，寒暄礼数周到，窗外寒风凛冽，屋内却暖意洋洋。瓦尔特·萨莱斯站在OFN总部的讲台后方暗自思量。当洛特总统命他出席安理会会议时，他未曾料到能看到这样的团结——这是巴西可以毫无保留支持的统一阵线。掌声中，萨莱斯整了整领带开始发言。\n\n“巴西合众国与友邦共同谴责对自由南非的入侵，支持捍卫其主权。”他用带着淡淡口音的英语开场，“但我们为何齐聚于此？不为议政清谈，而要为自由国度之责任拔剑而战！”\n\n爆发出一片喧闹掌声。“这场非凡集会将彰显团结与力量。我们与敌人不同，我们不以恐惧驾驭民众，而以信念凝聚力量。我们不接受强加的教条，我们只遵循共同的法则。面对不义，我们坚若磐石。”\n\n“巴西人知道退缩的代价。1939年，时代巨变，我国总统选择置身事外。多少人口称战火烧不到南美。可我们的商船遭击沉，子民被屠戮，中立的薄纱阻挡不了鲜血横流。”\n\n“南大西洋的炮声犹在耳畔，纳粹饿狼又扑向非洲；历史教训不容忘记。敌人的嗜血本性未改，征服世界的野心依旧。因此我们别无选择，惟有全力协助南非取胜，使其永无再起之机！”\n\n萨莱斯沐浴在掌声之中，脸上露出微笑。不论国籍政见，各国代表全体起立，展现出灵魂的共振。虽不是首次造访此地，但此刻纽约这座“熔炉之都”对外长而言有了新的含义——万千族群，此刻同一。"
 brazil.585.a: "苦难之时，温暖之声。"
 brazil.586.t: "现代世仇"
 brazil.586.desc: "阿拉戈斯州前州长、现任基督教民主党参议员阿尔农·德·梅洛此时无心庆祝。眼下的全州巡回之旅让他劳心费神，这场复出巡礼与就职首秀相结合的混合旅程本该持续七天，既可巩固政治资本，亦是为赴任巴西利亚暖场。\n\n然而，不论是社交俱乐部的水晶吊灯下，还是私人庄园的棕榈庭院中，这位政坛老将的眼角余光总掠过鬼祟暗影。时而大放厥词，时而发出威胁。德·梅洛心知肚明——这些都是前州长、宿敌西尔韦斯特雷·佩里克莱斯家族的愚钝后辈。德·梅洛与佩里克莱斯两大家族在阿拉戈斯双峰并峙，盘根错节的政治根系彼此绞杀，誓要将对方扼杀在通天之途。如今这场世仇的核心，正是分属两大门阀的两位参议员：阿尔农与西尔韦斯特雷。\n\n当年西尔韦斯特雷被迫将州长权柄移交宿敌时，曾下令打开州立监狱大门，宣布只要能排出一公斤粪便的囚犯都可获释，将这群恶徒尽数驱往州长官邸。阿尔农至今记得与夫人初入官邸那日：褐渍斑驳如纳粹集中营，恶臭穿透鞋底直抵天灵盖。\n\n自那时起，两家子弟各显神通，羞辱手段层出不穷。这场世仇愈演愈烈，骚扰辱骂屡见不鲜。两位参议员如今枪不离身，静待导火索的出现。"
 brazil.586.a: "巴西利亚若以为这场纷争会局限于阿拉戈斯，那就大错特错了。"
 brazil.587.t: "是时候离开了"
 brazil.587.desc: "没有疾病，也没有丑闻伴随他的离场，更谈不上因为在参议院短暂的任期而获得的满足感；社会民主党的若泽·吉奥马尔只是单纯地觉得，是时候该休息一阵了。他向参议院提交了辞呈，写了一封充满歉意的信件寄给了他的副手，然后准备在接下来的几周里享受片刻平静。曾与他共事的同僚——无论是在他担任阿克里州州长时，还是在众议院任职期间——都纷纷送上了困惑的慰问，但他只是以一贯的礼貌将其回绝。\n\n人们都说，他有自己的理由。然而，吉奥马尔内心深处却希望自己真的能清楚这些理由是什么。他心中萦绕着一种无法言说的东西，一种来自直觉的不安感，仿佛察觉到了无法描述的危险。这样的感觉被理性一点点消解，他的思绪在黑暗中摸索着各种借口去解释这一切。\n\n他最终将原因归结为自己在参议院里见到的一些人。当他等待副手到来时，目光越过了议事大厅的另一侧，落在了几位巴西工党参议员的身上。对，就是他们。他们让这里变得如此令人窒息，几乎无法忍受。他的老朋友萨尔加多是不是也遭受了同样的——\n\n“吉奥马尔参议员。”身后传来一个声音。他猛然转过身，看到的是他的副手若泽·凯拉拉。“这是您在议事厅的最后一天了吧？”\n\n是的。吉奥马尔有些惊讶时间竟过得如此之快。他勉强露出一丝微笑：“是啊。我想在离开前，再从这个角度看看这里最后一眼。你准备好接替我的位置了吗，参议员？”凯拉拉的脸微微泛红，点了点头：“我想是的。不过说实话，吉奥马尔参议员，我们大家都还挺意外的。”\n\n“别意外了，这个地方并不适合所有人。但我相信你一定能胜任。”吉奥马尔伸出手，与他握手道别。凯拉拉感觉到他的手掌冰冷而僵硬，握力却异常坚定。最初，凯拉拉并没有多想。"
 brazil.587.a: "即使握手结束，刺骨的寒意仍然停留在凯拉拉的手上，挥之不去。"
 brazil.588.t: "参议院的命案"
 brazil.588.desc: "若泽·凯拉拉的最后一天开始得再平常不过：简单的早餐，一杯咖啡，早报摊在厨房桌上。他一边细细阅读，一边抿一口咖啡，然后细细思索着，又将点燃香烟的念头抛之脑后。他看着妻子克雷乌萨和孩子们盛装打扮，妻子主动提出想陪他一起出席。毕竟，这是他在把参议员席位归还给原任者前的最后一天——而且，他似乎从未带家人去过他的工作场所参观。他微笑着同意了，全家人满怀喜悦地挤上了汽车。\n\n参议院将在一小时后召开会议，但凯拉拉特意提前了一些时间，带着家人四处参观。他向他们展示了自己的办公室，那张他们全家合影一直稳稳地摆放在办公桌上。他的孩子们甚至在贵宾厅玩起了模拟听证会的游戏，争论着是否应该将他们的睡觉时间延迟一小时的实际原因与道德理由。然而，当凯拉拉看了一眼时间，他的笑容僵住了——参议院已经开会十五分钟了。他匆匆与妻子和孩子告别，承诺会在会议结束后再与他们汇合。\n\n当他走进参议院会议厅时，阿尔农·德·梅洛正在向议长发言。他悄悄地回到自己的座位，正巧坐在西尔韦斯特·佩里克利斯旁边，佩里克莱斯的脸因愤怒而几近扭曲。德·梅洛正在控诉自己遭受了政敌的骚扰，情绪激动，手势夸张，甚至用了些《圣经》的措辞。凯拉拉知道他说的“黑暗势力”是指谁，他能听到德·梅洛愤怒地捶打着桌子。突然，佩里克莱斯猛然从座位上站起，开始大声指责德·梅洛对他进行诽谤和中伤。\n\n凯拉拉的手猛然感到一股寒意。他抬头看去，只见佩里克莱斯怒不可遏地冲向过道，德·梅洛随即像被激怒的猛兽一样反击，他猛地从口袋里掏出了一把手枪，佩里克莱斯连忙低头躲避。凯拉拉惊慌地站起来，踉跄着想要阻止，却突然感到胸膛传来两股炙热的剧痛，如盛开的血色花朵般撕裂开来。他抬头看去，佩里克利斯正蜷缩在桌后，而德·梅洛睁大了双眼，手中握着的枪仍在冒着一缕淡淡的硝烟。在倒下的那一刻……"
 brazil.588.a: "凯拉拉最后思念着的，仍然是他的妻子和孩子们。"
 brazil.589.t: "让一切过去吧"
 brazil.589.desc: "若泽·吉奥马尔坐在一个异样的位置。参议院用围绳围起了他曾经的办公桌，那是一片特殊且庄重的空间，正是在那里，若泽·凯拉拉于他最后一天任期内被枪杀。尽管政府事务仍在继续，参议员们依旧需要齐聚于此，但无论清洁人员如何努力，那空气中似乎仍残留着一丝血腥味。\n\n没有人会受到指控——阿尔农·德·梅洛或许正在守卫室领取他的钥匙和钱包。整个事件让基督教民主党看起来如同一场闹剧，一群带枪的参议员将这座神圣的议政大厅变成了美国西部片中的OK牧场枪战现场。可悲的是，德·梅洛因自卫之名被无罪释放，毕竟西尔韦斯特雷·佩里克莱斯也曾随身携带武器。吉奥马尔叹了口气，靠在椅背上，听着又一场敷衍了事的悼词。当他的目光再次扫过那张被封锁的旧办公桌时，一股寒意顺着他的手掌蔓延开来。\n\n十二公里外，一脸茫然的阿尔农·德·梅洛走出了监狱的铁门。门外聚集了一小群亲友，迎接着这位重新归于“守法公民”行列的政客，他们感激德·梅洛免于刑事指控。其中站在最前方的，是他年仅十四岁的儿子费尔南多。阿尔农径直走向他的儿子，将他紧紧拥入怀中。亲友们为这一场面鼓掌，而费尔南多也回抱了父亲。然而，心中却升起一种异样的感觉——仿佛过去三天的事情从未发生过，那些恐怖的噩梦已被抹去。\n\n一切又回到了往日的平静，除了那个被遗忘的死去参议员——没有人想再提起他。他们所需要的，不过是一点煽动性的修辞，再配上一些集会上叫嚣者的照片，于是巴西便心安理得地将这一切抛之脑后。费尔南多若有所思地望着父亲，觉得这一切实在太奇怪了。"
 brazil.589.a: "——只要足够聪明，似乎什么都能做到。"
 tomb_for_heroic_man_02_tooltip: "§Y参议员若泽·凯拉拉暂时取代若泽·吉奥马尔。§!"
 tomb_for_heroic_man_03_tooltip: "§R局势迫使若泽·吉奥马尔结束休假回来。§!"
 brazil.592.t: "回归军队"
 brazil.592.desc: "洛特放下报纸，只觉心里发慌。科帕卡巴纳海滩的阳光太过刺眼，连带着咸湿的海风都让他心烦意乱。这座特意建造的临海豪宅本应带来安宁——透过落地窗能俯瞰整片金色沙滩，安保系统也堪称完美——可现在他只觉得浑身不自在。\n\n几乎想不起刚搬来时的情形了。那时觉得这里和军营天差地别，再不用应付权力倾轧和作秀表演。可如今他的心态却倒了个个：思绪总牵挂着阿根廷前线，在那些他曾经竭力遗忘、如今却萦绕心头的部下身上。他们在为他而战，他却躲在这里，日渐灰暗，积满尘埃。\n\n他抓住栏杆，凝视着大海。其实完全可以飞回巴西利亚，看看现在掌权的家伙是不是靠谱。但这太放肆了，只会被视作新的威胁。或许该去美国谋个一官半职——在华盛顿，熟面孔能创造奇迹，何况老盟友急需支持。不，这不对，都不对，这是胡闹，是玩忽职守。他下定决心，拨通了电话。\n\n在二十四小时内，电话响起，来自高原宫。就这样，陆军元帅恩里克·特谢拉·洛特回到了他的舒适区：军队。"
 brazil.1202.t: "墙上凹坑"
 brazil.1202.desc: "“准将，”卡斯特洛举着啤酒杯说道，“这头衔很衬你。”\n\n“更适合你才对，”费尔南多·贝特伦准将把酒杯举到唇边，一口饮下半杯，“老天，卡斯特洛，这是什么玩意儿？”\n\n“喝的是氛围，费尔南多。这儿是我的第二个家。”贝特伦实在无法理解——这家开在主路旁的酒吧不过是砖楼侧面的凹洞里塞着个鞋盒般的小隔间，勉强挤得下五个顾客和酒保。但卡斯特洛偏爱这种逼仄感，仿佛裹着温暖的毛毯般安心。\n\n“你不会要在这里安家吧？”\n\n“开什么玩笑。我要回老家了，这把年纪实在受够了亚马孙。现在这摊子归你头疼。”卡斯特洛饮尽杯中酒，叩击桌面示意续杯。他仍未能完全看透贝特伦：这人时常显得高亢神经质，偶尔过于狂热，但比起洛特身边那些蟑螂般的家伙强上百倍。某些瞬间，贝特伦让他想起年轻时的自己——随即苦涩的回忆便涌上心头。\n\n他浴血奋战却仍被流放亚马孙，洛特的暗箱操作让这位战争英雄沦为卫戍杂役，在愤懑中虚度军旅生涯。他曾那样渴望参与南非战争，却因困守后方错失良机，直到暮年才被一场悲剧抚平不甘。回忆她的面容时，卡斯特洛沉默下来，凝视着杯中浮沫，仿佛能在泡沫间勾勒出她的轮廓。贝特伦从友人眼中读出了痛楚，故意叩响桌面转移他的注意。"
 brazil.1202.a: "“酒保，来点烈的！”"
 brazil.1203.t: "G大调第4长笛协奏曲"
 brazil.1203.desc: "每天清晨破晓之时，站在那座小山脚下，便能听见一阵悠扬的长笛声自山顶那幢朴素的别墅飘然而出。这声音孤寂而清冷，与周围宁静的大自然格格不入，却自有一番别样的美感。若问当地人这是谁在吹奏，他们会心一笑：“噢，那不过是老科斯塔又在吹他的笛子了。”\n\n科斯塔将军——他始终不忘提醒旁人这个头衔，缓缓放下长笛。站在朝东的阳台上，他迎接着晨曦的初光，用一首随性即兴的曲调唤醒沉睡的日出。橙色的霞光缓缓洒满山坡与别墅，他那双粗糙的手指灵巧地在笛孔间跃动，呼吸透过长笛回荡在山间，那轮火红的太阳仿佛正应和着这场私人音乐会缓缓升起。\n\n村民们都说，他曾是一位颇负盛名的将军，肩上曾佩戴过四颗耀眼的将星，麾下统领着东北地区的一万精兵。政客们曾赞誉他的睿智见解，但却从不主动征询他的意见。这份被忽视的孤独感，在古拉特执政后愈发强烈。哦，他曾试图反击，曾率领那一万士兵奋力恢复国家秩序的一丝理智与尊严。\n\n可惜，他失败了。作为惩罚，他被剥夺了那支军队的指挥权。布里佐拉走进他的办公室，摆出一副惺惺作态的怜悯与同情，把他塞进了一份无关紧要的行政职务里。随后，是整整三年令人煎熬的沉沦与屈辱。甚至，他的退役仪式都无人出席，仅有个从里约来的毛头小子，递给他一封充满敷衍之意的告别信——科斯塔几乎可以肯定，那上面的署名是伪造的。\n\n若不是这晨曦与长笛，他或许早已被怨恨与不甘掏空，化作一具被“本应发生的事情”的幻象驱动着的行尸走肉。然而，这份每日的仪式让他得以保持内心的平静。他逐渐接受了这迟暮的退隐，仿佛已经看清了自己生命书卷上的最后几行文字。"
 brazil.1203.a: "科斯塔不愿让自己的乐章在刺耳的杂音中落幕。"
 brazil.1204.t: "离任前的最后一天"
 brazil.1204.desc: "秘书处的工作人员再三坚持，想替雅伊尔·丹塔斯·里贝罗打包物品，但他却固执地坚持亲自处理此事。“我的东西不多，”他对他们说，“我不带走的，也不会再需要了。”至少，他们还是体贴地在他办公室的一角放了两个空纸箱。告别仪式上，他在主厅与众人握手致意后，便独自走向了那个曾经属于他的办公室。\n\n他打开其中一个纸箱，开始收拾那些对他而言最珍贵的物品。一本黑色皮革封面的笔记本，其中记录着他的私人联络人和个人想法，以多年前情报局的朋友教给他的加密方式记载。墙上的几幅照片也一一摘下，其中一张是他与洛特的合影，他看着这张照片，露出了淡淡的微笑。另一张照片吸引了他的注意。照片里是二十个身穿笔挺军装的年轻人，他们面容严肃，似乎努力压抑着即将绽放的笑意。而照片中央的那个人，正是他自己，尽管比旁人年长几岁，但那时的活力依然洋溢在脸上。照片下方的铭牌写着：1931年陆军参谋学校班级合照。\n\n他的目光在那些熟悉的脸庞上停留了一会儿，其中一些人仍保持着联系，另一些则早已走上了不同的道路，甚至有几位已经离开了人世。他们出身相似，家世相近，许多甚至是亲戚。然而，他这位从贫民窟走出来的孩子，如今竟也跻身巴西军队的最高指挥层。\n\n他依旧微笑着，将那张照片小心地放入纸箱中。是的，他的军旅生涯也曾起起落落，他曾长期被发配到边缘地区，如今他的卸任无疑会让那些对镇压左翼分子不如他坚决的军官接替他的职位。但当他继续收拾那些私人用品时，内心却毫无遗憾。他曾尽心竭力地为巴西服务，如今能在他深爱着的东北地区静静地安度晚年，他已心满意足。"
 brazil.1204.a: "不过，他确实有些后悔没有让秘书帮忙把这些箱子搬到车上。"
 brazil.1205.t: "权力交接"
 brazil.1205.desc: "“……谨代表全体军队与国家，向佩里·贝维拉夸将军的卓越贡献致以最崇高的敬意。贝维拉夸将军，请您起立。”\n\n他希望自己能把那一丝不屑从脸上抹去；幸好，当他从座位上起身，走向讲台与参谋长握手时，这情绪并未显露出来。他的握手一如既往地坚定有力，他的人生信条从未动摇过，正是这种坚定自信陪伴着他的军旅生涯走到今天。参谋长同样以坚实的握力回应，两人短暂地交换了眼神。随后，他坐到参谋长的另一侧，而在他身后，则是一个他更难以接受的人物。\n\n瓦尔特·皮雷斯·德·卡瓦略将军，此刻坐在一旁，身份却截然不同。贝维拉夸的军旅生涯即将落幕，而德·卡瓦略的仕途则在蒸蒸日上。他被任命为贝维拉夸退休后的继任者。对于这一任命，贝维拉夸的强烈不满早已不加掩饰。他始终自视为坚定的守法者，是反对共产主义的坚决斗士，更是洛特维持军队纪律的坚定支持者。在他看来，德·卡瓦略始终无法摆脱1955年那场背叛所留下的污点。当年，洛特需要支持，而德·卡瓦略却袖手旁观，这种失职和背叛在贝维拉夸心中从未被原谅，更遑论那些当年同样袖手旁观的将军们。\n\n然而，如果说德·卡瓦略心中也存有对他的蔑视，他却没有表现出来。贝维拉夸的眼神中透着无法掩饰的轻蔑，而德·卡瓦略却目光笔直地注视着前方的人群，拒绝给予对方一丝能够投射愤怒的回应。典礼继续进行着，贝维拉夸最终坐下，让随后的仪式从他耳边流过。时间的流逝和德·卡瓦略逐渐淡出他的视野，使他的情绪渐渐平复。毕竟，他已经完成了自己的使命：捍卫了共和国。他现在可以安享退休生活了。"
 brazil.1205.a: "他仍然相信，周围的那些年轻将军们不会背叛信念。"
 brazil.1206.t: "巴西伟大的基督教捍卫者"
 brazil.1206.desc: "安东尼奥·卡洛斯·达·席尔瓦·穆里西经历了漫长的一生，早在寡头统治瓦解之前，他便已活跃于军旅生涯。而如今，这位年迈的“索邦派”即将卸下他的职责，将军队的重任交给新一代的军官。今天，他的继任者是刚被任命的新任将军——埃德纳尔多·达维拉·梅洛，一位颇具个性的人物……\n\n“今天，我要感谢各位，感谢你们给予我这个为我们敬爱的国家服务的机会。这片土地上最神圣、最不可动摇的职责，正是守护我们的国家。我想在场的各位优秀的同僚都深知，军队在捍卫我们光荣的国家、维护基督教价值观方面所肩负的重要使命。”穆里西强忍着没有笑出声，只是静静地看着这位新将军继续他的演说。\n\n“首先，是苏联的共产主义，它曾是我们最为显而易见的威胁，妄图用疯狂的教条摧毁我们的秩序与进步。然后，纳粹主义崛起为超级大国，抢夺了东欧压迫者的地位，将原本属于共产主义的恐怖阴影据为己有。”\n\n“然而，这两种邪恶都绝不可小觑。尽管纳粹主义的阴影依旧庞大，共产主义的幽灵仍在我们国内徘徊。但有了军队的英明领导，这些邪恶绝不会玷污我们美丽的国度。”\n\n“今天，能站在这里，成为众多保卫国家的捍卫者之一，我倍感自豪。我在此郑重宣誓，绝不会辜负肩上的职责，也绝不会背弃前辈们传承下来的神圣使命。谢谢各位！”掌声雷动，将领们纷纷为这位新任将军欢呼喝彩，显然他是一个再合适不过的人选了。穆里西礼貌地微笑着，与梅洛握了握手，随后悄然离开公众视野，退隐余生。"
 brazil.1206.a: "“真是……有趣的演讲。”"
 brazil.1207.t: "为国效忠"
 brazil.1207.desc: "在第36快速反应宪兵排的营房内，小小的食堂中，外面的士兵正匆忙奔走，而食堂里却有两名军官静静地坐在桌前交谈。西尔维奥·弗罗塔与新晋升的牛顿·克鲁斯将军。两人多年来一直是挚友，时常书信往来，或在各种场合会面交流。他们已聊了许久，却一直未触及晋升话题，直到谈话自然而然地转向了此事。\n\n“我仍然感到有些惊讶。”弗罗塔说道。\n\n“惊讶？”克鲁斯微微扬起眉，语气中透着一丝自信且傲然的从容。\n\n“你能晋升到这个位置确实令人吃惊。你是我们军中最优秀的士兵之一，但我们都清楚，你树敌不少。”\n\n“是的，我的确有不少敌人。但一个没有敌人的人，是一个毫无信念的人，是一个空虚、没有灵魂的人。我的敌人，不过是些终日在参议院里争吵不休的政客罢了，他们散漫无序，不称职，更不配称为真正的巴西人。而我所需要做的，不过是等待他们把注意力转移到其他无关紧要的争端上。我保持沉默，展现实力，他们终究会意识到，我应当得到这个军衔。”\n\n“那么现在你得到了，作为新任将军，你接下来打算做些什么？”\n\n“为我的国家效忠，西尔维奥。我愿意为我的国家付出一切。我会继续保卫国家，继续为它服务。如果有任何人胆敢威胁我的祖国，那么我会亲自将这个威胁铲除。”"
 brazil.1207.a: "“很高兴知道，将军，我们目标一致。”"
 brazil.9999.t: "红色警戒"
 brazil.9999.desc: "电灯在洛特的房间里摇来晃去，桌上放着几份报纸。“巴拉圭风云突变！”，“玻利维亚：安第斯浴火”，“零度以下：南极洲争夺战”。这一切令他担心不已。作为一名军人，他必须随时准备应对任何可能的变故。无论是一场政变，还是更为严重的战争——为此，他把将军们叫来他的房间。\n\n所有人都到齐了。卡斯特洛·布兰科，科斯塔-席尔瓦，奥迪利奥·德尼斯，埃米利奥·梅迪西，甚至新获晋升的西尔维奥·弗罗塔。没有文官，这是军队事务。“如果不能奋身卫国，她就会灰飞烟灭，”洛特沉声说道，“你们都知道瓦加斯曾经的计划，那就是核武器。他下台后，计划也取消了。尽管原子换和平计划让我们得以继续和平研究。”\n\n德尼斯说：“你想把这个项目再弄起来吗？”\n\n“对。”洛特望着窗外。“当我们第一次被部署到加的夫海滩时，我们亲眼目睹了德国人的力量，以及他们的所作所为。要是德国人突然打算毁灭巴西，他们只需按下一个按钮就能做到。”\n\n洛特打开他的柜子，拿出一张南美地图。“乌拉圭、玻利维亚、智利。如果他们先搞出核弹，他们都可能成为阿根廷人的傀儡。如果我们不先搞出核弹，他们肯定会搞出来的。”\n\n洛特心里并不希望制造如此危险的武器。能将一座城市夷为平地，将其居民化为灰烬的武器。但就算他不这么做，别人也会这么做的。“这不是攻击性的措施，”他心中默念，“这是为了防止别人毁灭我们。”\n\n众人投票决定是否应该重启核计划。结果是全票通过。“洛特先生，我们在许多政治问题上的看法并不一致，”卡斯特洛·布兰科说，“但我们祖国的存在比我们之间的分歧更加重要。”他握了握洛特的手，然后离开，回到他的岗位上。"
 brazil.9999.a: "金焱将至。"
 BRA_sacw_nuclear_tooltip: "§M阿根廷§!的侵略性行为表明他们毫无信誉可言。唯有先于§M阿根廷人§!造出§L原子弹§!才能阻止战争。§G上帝保佑您，总统先生。§!"
 brazil.509.t: "选举季"
 brazil.509.desc: "又过了三年，巴西各大政党又一次为选举季做着准备。按照惯例，三分之一的参议院席位将进行选举——也就是说，大约每个州会有一个席位。\n\n由于社进党已经将自己树立为与全民盟、工党和社民党等党派相似的选举力量，今年的民调似乎更加剑拔弩张。此外，民代党有史以来第一次在全国范围内发起有组织的运动。孰胜孰败，将取决于选民，以及他们选择如何塑造巴西的未来。"
 brazil.509.a: "投给全民盟！"
 brazil.509.b: "投给社民党！"
 brazil.509.c: "投给工党！"
 brazil.509.d: "投给社进党！"
 brazil.509.e: "投给民代党！"
 BRA_deforestation.1.t: "再无鱼群"
 BRA_deforestation.1.desc: "马尼瓦站在齐膝深的水中。他的眼里布满了倦意，但仍然在浑浊的水面上寻找着一丝生命的迹象。每天，水似乎都更加污浊，鱼也越来越少。每天如此。在这翻腾的泥水中，他至少能找到片刻的喘息。情况曾经有所好转。他几乎已经记不起那场可怕的麻疹疫情了，那场灾难曾让他的部落元气大伤，但他依然能清晰地看到母亲脸上那抹未曾消退的痛楚。曾经，有些日子他能捕到满满一筐的鱼。然而，那些日子似乎已经遥不可及了。他母亲经历过的苦难，如今也在逐渐降临到他身上。\n\n那一切始于那些拖拉机、输电线和工棚的出现。那些穿着厚重皮靴的工人们来了。他们正在修建一条公路。政客们曾说这条公路会成为一条生命的动脉，可如今，他却连能养活家人的鱼都抓不到。他失落地拎着仅有的一条鱼走回村庄，目光不自觉地望向了远处的林线。年复一年，森林的边界在不断后退。而现在，他能清楚地看到那些野兽在死亡的森林中游荡——棕色的身影，不时低头啃食。他不禁好奇，那些肉都去了哪里。"
 BRA_deforestation.1.a: "鱼群退却，牛群归来。"
 BRA_deforestation.2.t: "最后的小溪"
 BRA_deforestation.2.desc: "年复一年，月复一月，如同退潮般，森林逐渐消退。他们曾熟知的土地被外人踏足，而他们自己却逐渐疏离了。唯一剩下的屏障，只剩下那条小溪。但溪流的另一侧，已经有简易的桥梁和探险小队，威胁着进一步侵入他们的世界。他们中的一个小队鼓起勇气，踏入了这片如今已变得陌生的土地。他们穿越了失去了树木的“森林”，一路来到当地的林业专员面前。在那个充满了香烟异味的房间里，他们恳请着自己的诉求。而后，他们只能被迫等待。与此同时，牧场主暂时停止了进一步的推进。\n\n探险队的活动也暂时中止了，局势悬而未决。最终，林业部长做出了一个分裂的决定。他驳回了部落的请求，但即便是在那烟雾弥漫的房间里，他也无法完全接受亲自前来求助的部落人民被摧毁的现实。如果牧场主继续推进，随之而来的将是更为复杂的局势。他的办公桌上放着一份刚写好的备忘录，致函印第安人保护局，呼吁停止部落村落周围的森林砍伐，并指出该地区雨林资源的严重枯竭。他又吸了一口香烟，继续翻阅其他的林业许可证申请。毕竟，即使这里的森林不能继续砍伐，总还有其他地方可以继续伐木。"
 BRA_deforestation.2.a: "他们不会跨过这条溪流。至少，现在不会。"
 BRA_deforestation.3.t: "永恒之河"
 BRA_deforestation.3.desc: "他的身体被部落的人抬回了营地，送往一座临时的住所，一座永恒的坟墓。他死于一处长矛的伤口，这种伤势曾经罕见，却将在未来的日子里愈发常见。而其他埋藏在深处的死者，身体里都被异族的铅弹贯穿，他们的沉默成了即将侵入这片土地的无声警告。\n\n最初只是零星的侵扰，接着便是铺天盖地的洪流。伐木者的机器摧毁了他们的家园，那些走出森林的家庭，迎接他们的是毛瑟步枪冷酷的枪口，唯一的信号就是让他们滚开。他们用长矛和弓箭作出了回应，有些人刺杀了一两个牧场主的打手，但这场胜利不过是一场代价惨重的皮洛士胜利。\n\n他们的战士在第一次战斗中被屠杀了，毫无防备地遭到自称“文明力量”的袭击。这些入侵者夺走了他们的家园。在那轮短暂而惨烈的反抗之后，他们只能不断撤退。他们唯一的优势，是对这片美丽土地的熟悉。然而，这片土地作为“家园”的意义，正在迅速消逝。这种优势终究只是暂时的，他们的敌人也同样熟悉这片土地。\n\n如今，他们不再与那些由政府资助的牧场主打手作战，而是在与自己的同胞厮杀。他们漫长的逃亡旅途，已经演变成了与其他部落的冲突。长矛刺入敌人的喉咙，鲜血从奄奄一息的口中汩汩流出，母亲撕心裂肺地哭喊着失去的孩子。他们知道，对方一定会回来复仇。但除了继续前行，他们还能做什么？\n\n此刻，他们站在河边，目送着那些在救治中死去或因伤重不治的亲人被埋葬。为那些尸体终将被推土机碾入泥土的人立起了简陋的纪念碑。他们所能做的，只有在河边等待，等待下一场来自地狱的浩劫降临。"
 BRA_deforestation.3.a: "因为他们心里清楚，这片土地永远无法满足入侵者的贪欲。"
 BRA_deforestation.4.t: "看看我们如今的样子"
 BRA_deforestation.4.desc: "这是无法避免的。最后一片属于他们的土地，曾经的家园，被那些挥舞着文件和枪支的入侵者夺走了。他们被迫面朝亚马孙雨林深处，拖着血迹斑斑的脚步前行。其他部落冷漠地看着他们的苦难，心中只回荡着同一个念头：“他们遭难，总比轮到我们强。”但他们清楚，同样的命运迟早也会降临到自己头上。\n\n在通往“新家”的路途中，疾病如影随形。所谓的“新家”，不过是一个能勉强栖身的地方罢了。这一次，他们没有遇到敌意，而是被那些怀着怜悯心的人接纳了。然而，饱受病痛折磨的他们，再也无力拒绝教会施舍的怜悯。教会用微薄的资源救治他们的身体，那些曾经残存的骄傲早已被消磨殆尽。此刻，他们赖以生存的，只剩下施舍与怜悯，成了他们最后的生命线。\n\n教会在治疗他们的同时，低声吟诵着温柔的布道词，把他们逐步引向信仰，悄悄地为自己的羊群添上了几个新信徒。临走时，传教士留下了几本小巧的黑色皮革封面圣经。但这不会是他们唯一的来访者。\n\n一个来自《纽约时报》的记者，穿着不合时宜的衣服，泥泞斑斑，拜访了他们。他用笔和纸记录下他们的遭遇、苦难和回忆，那些从破碎的面孔中哀诉出来的声音。他们毫无保留地讲述了一切，而回报仅仅是微薄的施舍。但他们无法拒绝，只能寄希望于他的报道能让世界知晓他们的痛苦。\n\n走出这片自称“文明”的世界，记者径直前往了一家新开的快餐店，这家店的出现，归功于那些“勤劳的牧场主”们的努力。他走进去，在菜单上点了一份价格合理的汉堡，包裹着油腻的肉饼被他一口吞下，便起身离去。那个部落，再也没有收到他的消息。"
 BRA_deforestation.4.a: "第34页，一个关于他们的微小专栏，埋在一则麦当劳广告旁边。"
 BRA_deforestation.5.t: "被否认的族群"
 BRA_deforestation.5.desc: "这片自己生活了一辈子的土地，怎么会变得如此陌生？这位部落长者的一生都未曾离开过这片森林，如今却仿佛即将比孕育他民族的土地更长寿。掠夺者与窃贼榨取了他们每一丝骄傲、每一寸灵魂，而最糟糕的是，他几乎不知道为何这一切会发生。\n\n部落之间的冲突曾经存在，但至少他能理解原因。他们也遭受着与自己部落相同的侵害，一天天变得更加封闭，只为了保护那片仅剩的美丽土地。他怎能责怪他们？他们眼睁睁看着自己的部落正发生的一切。\n\n唯一留下来帮助他们的，只有那些居高临下的教会传教士了。他的族人，除了他自己，全都在教会的帮助下离开了。有些人曾抗议，有些人比其他人坚持得更久，但当又一个牧场主夺走了他们生活的一部分，另一种新的生活似乎也变得可以接受了。\n\n他知道，那只是另一种形式的死亡，是对他灵魂所珍视的一切的缓慢消逝。\n\n也许，他们仍有时间开始一段新的生活，但他没有。他不会让这个世界继续剥夺他的全部。他会站在这里，等着侵略者的到来，让他们见证自己民族最后的代表。无论接下来发生什么，他都会被这片森林吞没，与他的记忆一起埋葬其中。即便世人遗忘，他也将永远为这片土地所铭记。"
 BRA_deforestation.5.a: "除了他的身份，他的一切都被剥夺了，而那身份，将随他一同被埋入墓穴。"
 BRA_deforestation.6.t: "牧师与疏远的会众"
 BRA_deforestation.6.desc: "教堂发出微微的吱嘎声，老旧的屋顶仍有几处漏水，勤杂工正努力修补，尽力让大厅看起来适合迎接媒体。教堂中摆放着整齐排列的座椅，威尔逊·皮涅罗和他的同伴们则坐在前方的一排长桌后，桌上放着名牌，甚至还悬挂了一条横幅，上面写着他们最终敲定的名字——巴西农村工人联盟。然而，大部分座椅空空如也。看来，只有几位报道阿克里州新闻的地方记者出席了这场活动。时间一分一秒地过去，皮涅罗决定开始。他想：至少还是有媒体在场，不能白费了这次机会。他敲了敲面前的麦克风，尽管已经预料到会有刺耳的回响声，但还是被突如其来的响声吓了一跳。\n\n“那么，让我们开始吧。我站在这里，仅仅是一位普通的割胶工人。他们或许会叫我叛徒，说我是个落伍的老傻瓜，无法理解如今的时代变迁。但我站在这里，是想告诉你们，我只是想保护我的生计。当那些牧场主不断向前扩张，在丛林中肆意砍伐焚烧，他们不仅威胁着我，也威胁着我的家人，威胁着我们的未来。我们不会袖手旁观，让他们摧毁我们的生活。”\n\n“今天，我很自豪地宣布巴西农村工人联盟的成立。通过这个新成立的工会，我们将团结起来，确保我们能继续在属于我们的土地上，与我们的家人一起生活。致所有的割胶工人，丛林里的农民，以及所有在这片丛林中维生的人们，你们并不孤单。只要我们团结一致，共同努力，我们就能保护这片土地，保护我们的家园，守护我们的未来。”\n\n他停下了讲话。台下响起了零星的掌声，来自联盟的几位同志以及那位牧师。然而，在这座空荡荡的教堂里，为变革而发声的他，却显得格外孤独。"
 BRA_deforestation.6.a: "变革的火苗，往往燃烧在孤寂之中。"
 BRA_deforestation.7.t: "生命与生计的斗争"
 BRA_deforestation.7.desc: "从未有过如此多的人聚集在这里。农村工人联盟在他们的领袖威尔逊·皮涅罗的指挥下，集结成一股力量，准备迎击另一支队伍。他们知道，伐木工人即将从这里开始进攻。这是他们的目标，联盟成员们早已得知，探子们已潜入这片丛林数周。伐木者们已经开始破坏森林，向着曾经未曾被触碰的土地不断推进。这片土地曾依法禁止任何伐木作业，然而法律并不能阻止伐木者的脚步，但也许，农村工人联盟的生命可以阻止他们达到目的。联盟的成员们按计划排好队，站满道路，阻止任何车辆通过。切断了物流线后，他们转向正在工作的伐木工人。一位勇敢的联盟成员甚至站在了电锯前，用自己的身体阻挡，冒着生命危险保护自己的生计。最终，森林保住了。\n\n《特里布纳报》的一名记者站在那里，看到眼前的抗议活动。他曾在一个竞争对手的新闻专栏中听说过工会的成立，起初他认为这不过是一个不太可能取得实质性进展的边缘组织。他们站出来反对牧场主、伐木工人，以及那些庞大的工业利益集团。尽管他们的敌人更富有，拥有更多的资源和关系，但记者也明白，在这场斗争中，没有什么能替代人力的力量，他在思考如何撰写关于这场事件的报道时，心中不禁这样想到。\n\n森林深处，远离喧嚣，部落仍在相对安宁的生活中。他们能在这片未曾被破坏的热带雨林中找到充足的食物，像他们的祖先一样生活，代代相传。"
 BRA_deforestation.7.a: "他们必须先从我们身上踏过去！"
 BRA_deforestation.8.t: "香烟与雪茄"
 BRA_deforestation.8.desc: "侦探吸了一口烟，开始检查现场。他注意到，头部后方有一枪致命伤，是死亡的可能原因。他的身体斜倚在一旁，呈胎儿状蜷曲。这不是一起谋杀案，他的第一反应是——这是一起处决。在一条小巷里，离农村工人联盟的门口不远。事情就这么发生了，这在如今的阿克里州几乎已成常态。\n\n就在这周，又发生了一起类似案件。两名巴西农村工人联盟的成员被发现死在一条土路旁的沟里。伤势完全一致。头部后方的枪伤，身体横在地上，像是被松开了束缚。尸体的摆放方式暴露了这起谋杀的手段——又是一次处决。前一周也是如此。血水流遍了我们的街道。\n\n血液沿着沟渠流淌，沿着小巷扩散。他叹了口气，前几起案件让他早已习惯了，这样的调查总是草草了事。他几乎能想象到警察局长坐在椅子上，手里叼着雪茄，评论着“现在的抢劫案，总是以谋杀结束”。或许他会让我把责任推给那些不安分的青少年，或者说是逃跑的牧场公牛。于是，他再次做了报告，而他又一次被指示去调查当地的犯罪团伙。然而，他已经心如死灰，知道调查结果会和以往一样。即便这次谋杀的肆无忌惮，受害者的地位不同，结局依然是相同的。\n\n他思索着，是否该去问问牧场主，或者尝试找出那颗弹壳的来源。如果他真这么做了，那么下一颗弹壳就会落在他自己冰冷的尸体旁。他吸了口烟，开始工作。牧场主田地边缘的火光依旧熊熊燃烧。没有抗议，也没有人在电锯前站着。这一次，牧场主们做得很好——他们知道如何清除一切障碍。"
 BRA_deforestation.8.a: "于是，烟雾依旧弥漫在空中。"
 brazil.510.t: "巴西选举"
 brazil.510.desc: "竞选标语被撕下，投票站空无一人，电台广播忙于报道得票。在巴西，计票工作正在进行，举国上下屏息以待，胜者应该很快就会揭晓。"
 brazil.510.a: "选票清点完毕……"
 BRA_quadroshundreddays.1.t: "时机成熟"
 BRA_quadroshundreddays.1.desc: "雅尼奥·达·席尔瓦·夸德罗斯上次离开巴西利亚的总统办公室时，他未曾想过，自己作为副总统是否将无缘再踏足此地。当时，尽管夸德罗斯几乎能肯定洛特的倒台将为他铺平通往权力之路，但拉塞尔达和阿德马尔的阴谋，却让他一时被挤出了权力的中心。如今他得以重新执掌权柄，着实出乎大众的意料。\n\n过去的都已经过去了。夸德罗斯现在是总统，他踏入这个属于他的办公室，做的第一件事就是命令助手拿来消毒剂和纸巾，亲手清理那把椅子。\n\n助手离开后，夸德罗斯陷入沉思。那个愚蠢的洛特无视他忠告的一幕幕瞬间浮现眼前。面对如此的愚行，他别无选择，只能做得更好。他在上帝面前发誓，要成为比那个不幸的将军更出色的领袖。他将用扫帚清除前任留下来的一地狼藉。\n\n当助手带着清洁用具回来时，夸德罗斯立刻动手，将椅子里里外外都擦了个遍，不放过任何一个角落。年轻官员面带困惑，“先生，您在做什么？清洁工都已经打扫过了。”\n\n夸德罗斯不以为意地摇了摇头，淡淡回应道：“必须打扫得更加干净一些。”"
 BRA_quadroshundreddays.1.a: "“它从前的主人实在太坏了，只能多擦几遍。”"
 BRA_quadroshundreddays.2.t: "腐败将军的教训"
 BRA_quadroshundreddays.2.desc: "洛伦佐·莫拉认为自己是一个理性的人。他努力工作，收入可观，家庭美满，平时还可以和朋友享受一些得体的爱好。不过他对政治可以说是一无所知，他只知道全民盟这个政党是唯一一个可以让巴西变得更好的党派，别的党都充斥着腐败无能之辈，甚至还会有社会主义者，他尤为厌恶这些人。每次听说他们搞砸了什么，他就充满了气愤。\n\n突发新闻：首遭曝光，恩里克·洛特在巴西利亚受贿！\n\n莫拉气得满脸通红，他早就怀疑恩里克·洛特了，之前也听过一些描述他腐败的传言，但这篇文章提供的细节也太详细了（不只是有那种洛特看了会大发雷霆的小报照片）。莫罗感觉洛特的所作所为就是在侮辱以前那个理性的自己，想到这家伙居然还想在公众的眼皮子底下躲掉这些罪行，他就忍不住痛骂洛特的虚伪和冷酷。\n\n洛特到底多有钱？让我们带你一探究竟。\n\n莫拉大为震惊。是，洛特很腐败，但他也没想到洛特之前能掩盖的这么好。这篇文章清清楚楚地戳穿了洛特长久以来为自己塑造的形象。它强调了有多少跨亚马孙公路的资金被抽走，这些资金用于在隐蔽的豪宅里举办奢华派对。当然，这一切都是在私底下做的，洛特还不至于傻到公开参加聚会。然而媒体却捕捉到了这一切。\n\n拉塞尔达宣布调查军队的腐败情况。\n\n终于，莫拉感受到了平静。过去几天急剧增加的报道，关于洛特作为将军和总统的奢侈生活和滥用职权的报道，让他开始怀疑自己是不是在做梦。听到拉塞尔达推进调查的消息，他坚定了这个念头。毕竟，哪里会有这么高风亮节的人呢。"
 BRA_quadroshundreddays.2.a: "会议室里，乌鸦庆祝着，他的政敌再也构不成威胁了。"
 BRA_quadroshundreddays.3.t: "理清预算"
 BRA_quadroshundreddays.3.desc: "“天，我真该喝一杯。”夸德罗斯嘟囔道。\n\n他嗜酒的念头源于上届洛特政府的消费记录上。不管洛特曾经有没有接受他那明智的建议，政府在各方面的花费都挺令人咋舌的，尤其是那条愚蠢的跨亚马孙公路。“我跟你讲，这也太烦人了。”夸德罗斯对着递给他文件的助手说。\n\n不过往好处想，夸德罗斯认为至少他还能努力清理掉这堆垃圾。除了大幅砍掉洛特的愚蠢项目支出外，他还可以做一些更好的事情来确保他的计划不会遭到破坏。\n\n夸德罗斯记下了项目执行过程中提及的负责人，他把这些负责人和他掌握的另外一份名单里面的人联系起来，那是一份涉及项目相关贪污的腐败官员和商人的名单。至此，事情就简单了。如果他们不服从他削减成本的指示，他就会向巴西全体国民揭露他们腐败的罪行。\n\n当夸德罗斯给他要威胁的各个官员写电报时，他感到自己怒气冲冲。就这样，他对副手下了命令。"
 BRA_quadroshundreddays.3.a: "“老天啊，快给我来一瓶烈性威士忌。这该死的计划真是差劲透顶。”"
 BRA_quadroshundreddays.4.t: "拉开距离"
 BRA_quadroshundreddays.4.desc: "“士兵们！根据总统的指示，现在我们将结束在这里的战斗并撤回。政府认为不该进一步介入南非冲突。”\n\n路易西尼奥知道这句话是什么意思：夸德罗斯准备把士兵们带回国。路易西尼奥心里想，也许这就是最好的结果了，毕竟他不想以打仗为生。此外，回国也意味着可以少做几次噩梦，不也挺好的嘛。\n\n一队卡车来到营地来接他，并帮着拆除他部队的部分设施。连里的一些美国战友也来送行。路易西尼奥和他的长官交谈，试图给他的美国战友们留下一些零碎的好东西，他想以此来表达他们之间的战友之情。\n\n路易西尼奥最后钻进卡车，回头望去，心想这已经是最好的结果了。他相信美国人一定能收拾好残局。\n\n虽然即将回家的消息让人喜悦，再也不用战斗了，但是他还是无法摆脱内心里的愧疚，那种抛弃美国战友的愧疚感。"
 BRA_quadroshundreddays.4.a: "巴西部队中普遍存在类似的情绪。"
 BRA_quadroshundreddays.5.t: "优先处理内部事务？"
 BRA_quadroshundreddays.5.desc: "“女士们，先生们，OFN的代表们。根据巴西利亚与外交部发布的指示，我今日必须向诸位告知，根据对国内总体形势和优先事项的重新评估，我们目前无法承诺会定期出席OFN理事会会议。”\n\n此时巴西驻美大使放下了手中的演讲稿，这个显眼的举动让一些敏锐的听众明白了这意味着什么：那个名叫夸德罗斯的疯子就是想借大使之口来辱骂OFN和美国。但显然大使并不赞成他那愚蠢的想法。\n\n大使继续说道：“这次对巴西优先事项的重新评估对大家来说可能有些突然，甚至显得有些奇怪。然而我可以明确的告诉大家，巴西捍卫民主自由的决心是永远不变的，并且巴西可以在不损害自身利益的情况下最大限度的保持与OFN的合作。”\n\n听到这个消息，在场的国务卿得意地笑了。虽然夸德罗斯那愚蠢的醉鬼听不懂这话里还有话，但国务卿先生能听懂这位好心的大使想表达什么。“啊，还行。”他喃喃道。"
 BRA_quadroshundreddays.5.a: "“至少现在，有些巴西人还算理智。”"
 BRA_quadroshundreddays.6.t: "醉糕芝士"
 BRA_quadroshundreddays.6.desc: "巴西利亚，旭日方升。晨曦轻柔地泼洒在精心设计的建筑群中，令一切看起来都是金灿灿的。新的一天，新的开始。高原宫总统办公室的常设秘书如此想着，随后便眼见夸德罗斯总统连着灌下六杯鸡尾酒。秘书对此无言以对，他本想说些什么，思忖片刻后，便只是默默地把文件呈于桌上。\n\n“总统先生，请您参阅这份报告。我们有充足的证据表明，某位反对党议员正大肆搜揽国内企业的贿赂。”言及于此，夸德罗斯情绪激动。他试图直起身子，却没能做到：“什么玩意？你…你…你们得马上派出敬茶……派出菌队！把…把那个混葬东溪关进耗之里，越快越耗！”\n\n好吧，秘书并不对这个回答感到意外，怎么回事呢。他努力克制住情绪：“总统先生，我们应当遵守法律程序，由相关部门发起正式调查。如若不然，我们将会被指控滥用权力，到时便……”\n\n“表！”夸德罗斯大声嚷道，打断了他：“你…你们这群傻蛋，听我的命令就阔以了！现宅，你，你们两个，不，不对，你们四个人，立刻从我的视野里消丝！不然我奏把你们四个人都给解雇了！以圣母玛隶呀的名义！”\n\n听罢，秘书很配合地举起双手，快步退出了办公室。他可不想被解雇，只是……"
 BRA_quadroshundreddays.6.a: "“四个我？老天，他该有多醉啊。”"
 BRA_quadroshundreddays.7.t: "干干净净"
 BRA_quadroshundreddays.7.desc: "“因此，经过联邦警察数天对于总统候选人阿德马尔名下豪宅的调查，可以得出一个结论，这位州长并没有贪污受贿。调查现已结束，阿德马尔告诉我们他从未担心过什么，而且——”\n\n“真是一群废物！”夸德罗斯一声怒吼，顺手关掉收音机。“你告诉我他那该死的保险箱里干净到连一分钱的赃款都没有？看在上帝的份上，别扯淡了。”\n\n对这位戴眼镜的总统来说，想要击败公牛——阿德马尔绝非易事。现在他必须扫除全巴西警队里的垃圾，才能维持圣保罗街道的美丽。哪怕是个婴儿都知道，阿德马尔向警察行贿是为了保全自己。\n\n夸德罗斯扶正眼镜，擦净脸颊，站起身来，大摇大摆地走出办公室。他拿起办公室外桌上的电话。接电话的是一位叫卡瓦略·平托的人，他是雅尼奥·夸德罗斯大众运动的名誉主席，也是夸德罗斯主宰巴西政坛计划中的关键一环。"
 BRA_quadroshundreddays.7.a: "团结人民的时候到了。"
 BRA_quadroshundreddays.8.t: "经济会议"
 BRA_quadroshundreddays.8.desc: "雅尼奥·夸德罗斯大摇大摆地闯入经济会议。他穿着一条白色休闲裤，脚上是与之相配的白鞋，仿佛正在雨林中探险。会议室里的经济学家们面面相觑，一致视若无睹——至少总统没喝醉。\n\n见没人说话，夸德罗斯率先开口：“先生们，众所周知，如果没有我，巴西的经济不可能像今天这样繁荣。我的政策有效减少了通货膨胀，也减少了社民党中的无赖在国企和政府内的影响力。先生们，我们显然正走在康庄大道上。”\n\n一位经济学家回答道：“是的，您的方法的确很棒，但有件事情我们要提醒您。我们认为如果我们给私人投资者出售一些国企的股份，我国的经济会更稳定。”\n\n听闻此言，总统的脸色瞬间阴沉下来：“这是哪门子的邪恶雅各宾思想？绝对不能把国企卖给私人投资者！如果我做了这样愚蠢的决定，那些股票就会流入到恶魔手中！”"
 BRA_quadroshundreddays.8.a: "经济学家们难掩心中的担忧。"
 BRA_quadroshundreddays.9.t: "夸德罗斯的呼唤"
 BRA_quadroshundreddays.9.desc: "“伟大的巴西人民，请听！\n\n自本人荣膺总统之职以来，已接连颁布一系列强硬政令，使我国经济得以免遭外部资本的侵蚀和腐败势力的侵害。\n\n我们的果断行动，成功地抑制了通货膨胀，并限制住了前任政府中的那些狡诈恶徒对国有资产的恶劣影响。尽管如此，那些堕落分子依旧保有一定程度的力量。\n\n在我们的国会大厅中，在这座权力的殿堂中，总是有一伙专注个人利益、忽视公共福祉的议员们，日复一日地阻挠着我们提出的改革措施。\n\n至此关键之际，我恳请你们伸出援手，向你们选区的代表表态，让他们知道你们需要的究竟是什么。目前还为时不晚！\n\n雅尼奥·夸德罗斯\n巴西总统\n\n一部分人，主要是夸德罗斯的忠实追随者，听从了他的指示。其他人则对此一头雾水。"
 BRA_quadroshundreddays.9.a: "“啥子？”"
 BRA_quadroshundreddays.100.t: "反限制法案通过"
 BRA_quadroshundreddays.100.desc: "《反限制法案》通过后，在圣保罗，夸德罗斯在成立不久的“雅尼奥·夸德罗斯人民运动”支持者的簇拥中开始慷慨激昂地向众人演讲：\n\n“女士们，先生们，圣保罗的卓越市民们：今天，我们实现了伟大的壮举！我们通过了《反限制法案》！”支持者们激动地鼓掌、欢呼起来，但夸德罗斯接着说：\n\n“是的，今天我们通过了这一份法案。而在上帝的保佑下，我们今后将颁布更多。大家都明白，我们还有很多事要做，我还要奔赴巴西利亚的厅堂之上，投身一场神圣的战争。藐视天主的异教徒们受他们自己的贪欲驱使，死死束缚着巴西的经济好塞满他们自己的腰包。与此同时，广大巴西人民却饱受通胀之苦。除非，由我来阻止他们！”\n\n人群爆发出一阵欢呼。于此同时，两位本地大学的经济学者听着夸德罗斯声嘶力竭的高喊看向了彼此。其中一人对另一个人说：“如果他利用这场小胜进一步推进扩大国有企业的计划，我实在是不敢想接下来我国的经济会变成什么样。”\n\n另一位经济学家长叹一声，摇了摇头："
 BRA_quadroshundreddays.100.a: "“啊。我也一样害怕。”"
 BRA_quadroshundreddays.101.t: "反限制法案失败"
 BRA_quadroshundreddays.101.desc: "夸德罗斯的《反限制法案》没有通过。一般来说，每当他的法案失败，他会躺在办公室的椅子上酗酒，以此消愁。今天他选择喝点啤酒，而不是凯匹林纳鸡尾酒。\n\n在夸德罗斯喝醉时，他总是愤怒地咒骂不在他房间的人。坎波斯和洛特是他最频繁攻击的目标。“那个法西斯主义者、共产党员、新教徒、无神论者、恶棍，如果他履行了他该履行的职责，得到了足够的选民……”\n\n有人打开了办公室的门，但是夸德罗斯并未在意。\n\n“还有那个该死的洛特，如果他，如果他一开始就不搞这些傻逼的限制，我就不会有这些该死的限制了。这，这啥玩意？”他看见七个手拿着七杯水。夸德罗斯抬起头，看见了七个助手，他们长得都差不多。\n\n助手说：“先生，您能不能多喝水呢？喝酒有害身体健康。”\n\n“那些阿帕雷西达圣母的废话！”夸德罗斯被呕吐打断。“水只能用来洗车！你们七个，不，十五个都给我滚出去！”然后他又呕吐了一下"
 BRA_quadroshundreddays.101.a: "助手（只有一个）无奈地点点头，迅速离开了夸德罗斯的办公室。"
 BRA_quadroshundreddays.200.t: "反托拉斯法案通过"
 BRA_quadroshundreddays.200.desc: "在全民盟议员热烈的掌声中，反托拉斯法案在国会通过了。\n\n总统也因为这项立法的完胜而神清气爽，他站起身来，大踏步走上讲台开始发言。当然，夸德罗斯还是那个演讲颠三倒四、发言充满煽动性和攻击性的夸德罗斯。然而，毕竟这回被他针对的是社进党。没有人会在乎社进党的感受。\n\n“巴西的人民们，可悲的社进党人们，听我一言！”他盯着社进党的议员们，接着演讲道：“你们要知道，我就是在针对你们的头目和他给这片土地带来的腐败荼毒！”全民盟的议员们掌声雷动，社进党的议员们则愤怒地大骂起来，其他党派的议员们则纷纷离席——这场闹剧与他们无关。\n\n这番场景并没有吓住夸德罗斯，他接着说：“我向上帝和巴西发誓——我将一步一个脚印地把你们这伙百无一用的腐败分子连根拔起，所谓公牛也无可逃避，就像他自吹自擂的那样，无可逃避！”\n\n他的发言直接让台下的全民盟和社进党议员们互相扭打了起来，而社进党看来落了下风。看着这一幕的夸德罗斯偷笑了两下，然后走下了演讲台。"
 BRA_quadroshundreddays.200.a: "“一切都在计划之中。”"
 BRA_quadroshundreddays.201.t: "反托拉斯法案失败"
 BRA_quadroshundreddays.201.desc: "“没错，我需要尽快和夸德罗斯总统通话。”\n\n“给我些时间，我会尽力而为，拉塞尔达州长，”\n\n总统的助手从电话前跑到总统办公室门口。夸德罗斯的反垄断法案未能通过，而他正在办公室里借酒消愁。他将啤酒和凯匹林纳鸡尾酒混合在一起，一遍又一遍地调制。\n\n“先生，拉塞尔达州长想尽快和您通话。”\n\n“什——么？？？那只乌鸦的抛物线函数？那个该死的对数函数？把他踢出去！我不想让他出现在我的办公室周围，你们三个也给我滚！”\n\n助手再次为总统每次喝得烂醉如泥时都能看见几个助手而惊讶，于是他又回到了电话旁。“对不起先生，但是总统现在没空，我也不能确定他什么时候能够回电话。”\n\n电话那边沉默了几秒钟。“……知道了。”\n\n拉塞尔达挂断电话后勃然大怒。这个酒鬼混蛋非要把一切都搞砸，让这个国家再次落入瓦加斯主义者手中才算成功吗？他拿起电话，开始联系多位他认识的在办公室里的全国民主联盟代表。如果夸德罗斯不负责任，那么拉塞尔达就会在全民盟内部建立反对派，把夸德罗斯赶下台，把总统职位留在全民盟手中。"
 BRA_quadroshundreddays.201.a: "症结已经显现出来。"
 BRA_denys.1.t: "呼唤理性"
 BRA_denys.1.desc: "奥迪利奥·德尼斯用一块灰白的手帕轻轻拭去额头的汗珠，汗水让他的思维变得模糊，心头充满忧虑。尽管他内心的焦虑是那么真切深刻，他却只是坐在那里，默默注视着国防部将军们的一举一动。他们面前各自摊开了一份摘自洛特法案泄露文本的副本，人们不紧不慢地翻阅着，各寻所需。\n\n尽管德尼斯语气平静，却掩饰不住内心迫在眉睫的恐慌。“这项法案很可能会得到通过，”他说道。他同僚们的神态几乎可以用滑稽来形容，他们满脸震惊的表情与冷静的德尼斯形成了鲜明的对比，“现在明白了吧？我们决不能让这项法案通过。”\n\n然而，眼前这些男人的忠诚早已飘散向了迥异的方向。一些人默不作声地站起身离开，另一些人则恭敬地鞠躬，急匆匆地退出，只留下少数人支持德尼斯的行动。“诸位良善之人，这个疯狂的法案决不能变成现实。”\n\n听到这番话，国防委员会中仅存的几名成员们莫不点头称是，他们全神贯注地聆听德尼斯的讲话，“与洛特的一切交涉都破裂了。恢复巴西亟需的秩序，这项重任就取决于我们了。”"
 BRA_denys.1.a: "疯王的终结？"
 BRA_denys.2.t: "身居高位的盟友"
 BRA_denys.2.desc: "科斯塔-席尔瓦的办公室内电话铃声此起彼伏，仿佛无形的鞭子抽打着他的神经，直到他最终伸手接听了某个来电。万万没想到，电话那头会传来一个熟悉的声音，他立刻认出那是德尼斯的声音。德尼斯的语调低又严肃，听起来有些沙哑。\n\n“席尔瓦，听我说。”电话那头的德尼斯声音急促，紧贴着麦克风，“疯狂的洛特法案即将呈交到参议院，准备投票。这场闹剧，你明白的，绝不能上演。”\n\n“我懂了。”席尔瓦立刻回应，从座椅上跃起，步履匆匆地来到办公桌前，“德尼斯先生，您可以依靠我的全力支持，我向您保证，既然事已至此，我定当不辞辛劳。其实，我正打算联络小奥林皮奥，我敢肯定他也愿意伸出援手。”\n\n“感激不尽，席尔瓦。”德尼斯声音低沉，从他的话语中，可以感受到对方的热情如何点燃了他的希望，“倘若军队未在巴西调动，我们的战略优势就是取胜的保证。我敢说，命运女神正在向我们微笑。”"
 BRA_denys.2.a: "“站在我们这边的可不仅仅是运气，德尼斯先生。”"
 BRA_denys.3.t: "德尼斯的背叛"
 BRA_denys.3.desc: "在那个该死的日子里，德尼斯将军打了无数个电话。这天最重要的事情莫过于他发动了这场备受军方期待的政变。他命令部队进军巴西利亚，而他那忠诚的拥趸们也在巴西的各大城市里游行，以维持城市的正常秩序。\n\n在圣保罗，他们几乎没有遭到抵抗。而在里约热内卢，城市里的人们向德尼斯宣誓，整座城市也由小奥林皮奥掌控。不用多久，德尼斯将控制整个巴西，而国防委员会的官员们还将无休止的争论下去，争论是否要支持这次政变。但那些高官并没有充分认识到眼见问题的严重性。\n\n洛特代替他的随从出现在台下的官兵面前。在他看来，这些人都是值得他号召的。“同胞们，这一天终于到了。”他对台下的所有人说：“团结起来守卫我们伟大祖国的日子到了，那些卖国贼们要宣布我们的努力是错误的，而现在轮到你我拿起武器，为了心中的美好而战了！”"
 BRA_denys.3.a: "混乱中的秩序。"
 BRA_denys.4.t: "命运眷顾勇者"
 BRA_denys.4.desc: "一队严肃而紧张的士兵遵照德尼斯元帅和他的同僚的命令，沿着通向巴西利亚的公路向首都进军。他们要把洛特总统赶下台。他们只需要冲破一层封锁就可以彻底扼杀巴西的民主，那就是由一群和他们一样冷酷但忠于总统的士兵，这些士兵组成了一道封锁线。队中走出来一个年轻的士兵，稚嫩的脸庞扭曲成狰狞的面孔。他冲着封锁线上的士兵大喊：“放下武器，就地解散！我们得到了德尼斯元帅的命令：为了国家安全，国会必须罢免洛特总统!”在封锁线的另一端，士兵们不为所动。“最后一次警告！放下武器，就地解散！”话刚说完，封锁线后的一名中士眼睛微眯，走上前来，怒气勃勃地冲着这个年轻士兵。“放下枪！”他大喊道，额头上已经冒出冷汗，但中士没有停下愤怒的脚步，直到他走到这个年轻人的眼前。“放下——”\n\n话音未落，中士一个巴掌打了上来。“你们这些叛徒曾发誓要保卫祖国和人民。”他咆哮着，全然不顾手中挥舞的枪口。“你们曾发誓要保卫人民免受暴君的侵害，但现在你们却成为了暴君的走狗！如果你们心中还有存有一丝自尊和责任心的话，就赶快掉头回去！”一时间，全场鸦雀无声。\n\n随后，队里的士兵一个个变得面色羞愧，意志消沉，沮丧地离去。类似的事情在全国层出不穷。参与政变的士兵们面对未卜的局势，实在没有什么理由去将手中的武器对准曾经的战友。因此当他们面对更加忠诚且坚定的对手时只能作罢。国防委员会在政变即将失败时不再坐视不管，他们迅速向德尼斯采取措施，命令手下和忠诚的士兵一同行动，保护洛特总统并抓捕参与策划政变的将领。德尼斯元帅在他人生中最后的几小时的自由里，对着自己的失败大发雷霆。最终，他被他的部下抓走并囚禁起来。"
 BRA_denys.4.a: "少数人的胆识战胜了多数人的怒火。"
 BRA_denys.5.t: "属于忠诚者的奖励"
 BRA_denys.5.desc: "随着洛特总统走进会议室，国防委员会的将军们的目光变得满怀期待，他们保持沉默，面无表情，眼神像钻机一样盯着总统。洛特扫视会议室一圈，开始讲话。\n\n“先生们，过去的几天对于我国的军队和民主事业来说可谓十分艰难。那些卖国贼又一次妄想颠覆一个合法的民选政府。结果显而易见，他们又一次失败了。多亏了各位的努力，人民的意志在这片土地上得以延续。他们也将永远铭记各位的功劳。虽然军队中有许多人背叛了国家，但你们所有人都坚定地忠于国家，为此我感到自豪。我想，这就是巴西军人骨子里的精神。”\n\n“承认这些叛徒曾是我们的战友是一件很艰难的事情，但这是不争的事实。难道我们能给这些叛徒一丝怜悯吗？答案是显然的，从轻处罚根本无法遏制这种行为，只会让他们变的更加胆大包天，并让我国推向一场毁灭性的冲突。他们应该被剥夺军衔，踢出军队，永远不得回来。不过，他们的命运我会交由各位决定，我相信你们会公平公正地给予他们应有的惩罚。”\n\n洛特环顾四周，希望能看到认可的目光。国防委员会的将军们回应了一阵小小的掌声和笑容。他们并没有对这个想法特别感冒，但也没有表现出明显的反对。他如释重负地叹了口气，尽管军方的叛乱还没有完全解决，但是国家已经恢复了秩序。巴西人终于可以松口气了，至少在下一个妄图夺权的将军出现前都是这样。"
 BRA_denys.5.a: "无论未来发生什么，民主现在有了守护者。"
 BRA_denys.6.t: "绝望的呼吁"
 BRA_denys.6.desc: "只有少数官兵支持洛特总统的事业。国防委员会经过讨论，认为应该拒绝官僚主义，同时认定洛特总统违反宪法，宣布总统严重威胁了巴西的统一和完整。为了避免对国家造成更大的损失，他们甚至要求总统辞职。\n\n恩里克·洛特对此无可奈何，他绝望地给美国大使馆打去电话，诚心寻求大使的支持。“求求你，戈登”，洛特恳求道：“现在我的处境十分艰难，如果美国人不帮我，巴西早晚会乱掉！”\n\n戈登一边挠着眉头一边琢磨，他把电话贴在脸上，一声不吭。时间一分一秒的过去，对于电话旁的两人来说，此刻就是永恒的寂静。最终戈登选择主动打破这寂静，说出了自己的真实想法，虽然他并不喜欢这样做：“我会尽力而为，联系更多的人以确保你能存活……”"
 BRA_denys.6.a: "“……虽然我也不能保证什么。”"
 BRA_denys.7.t: "轰然崩塌"
 BRA_denys.7.desc: "洛特轻轻点着手指，他不得不承认，他害怕着接下来很可能发生的事。他在电话旁焦急地等待着，眼睛上下打量着复杂的工艺品，试着平复步步紧逼的恐惧。但他们已经来了。洛特空洞的目光转向窗外，走上前去，望向下方的地面。\n\n全副武装的政变分子已经包围了他的住所，他们全都身穿巴西的军装，打着巴西的旗号。这一切发生得太快了，是德尼斯的几名手下向洛特说明了如今的情况。\n\n那名军官声称国会已经被包围，奥罗·安德拉德已经亲自提出了罢免洛特的动议。洛特不假思索地说：“我拒绝。”如果他注定要被拉下马，那么他们的手也别想干干净净。\n\n这晚，未曾料想的方面给这个刚刚上任巴西临时总统的男人打了一通电话：“应该从轻发落洛特。如果他死了，只会给我们两国带来更恶劣的影响。”德尼斯同意了。他挂掉电话，望向窗外巴西利亚的夜色，巴西的男男女女们正殷切期盼着下一场大选和巴西的重生。"
 BRA_denys.7.a: "疯王的终结。"
 BRA_denys.8.t: "别无选择"
 BRA_denys.8.desc: "“那个王八蛋！”\n\n“那个狗屎叛徒别想把我们踢到一边！”\n\n看着聚到一起的将军们正毫不掩饰地发泄着自己的不满和怒火，德尼斯心中一阵窃喜。如今看来，总统的卑鄙本性早在很久以前就暴露无遗。他和左派的紧密合作，他公开的瓦加斯主义主张，他对军方高级将领的无礼，以及如今试图颠覆体制的法案。但种恶因者必尝恶果，那些失去他们应得之物的人，如小奥林皮奥·莫朗和西尔维奥·弗罗塔等早就已经选边站队，他只需要顺势而为。\n\n“诸位。”他严肃的声音立即让咬牙切齿的低语和愤怒的咆哮一并安静了下来，令所有人的注意力都汇集到了他一人身上。“我们同样感到愤怒、感到作呕，但我们也必须保持精明和果断。巴西命悬一线的命运正在我们手中，挽救她应当慎之又慎。所以，我已经制定了一份计划，从总统的可耻背叛中拯救我们的国家。”\n\n“今后的两周内，你们将会听见全国的广播电台播放世界杯的主题曲。但广播会突然中断并开始播放国歌，那就是行动开始的信号。你们的部队要立刻在我们的指挥下向附近的城市和其他具有战略价值的目标进军。”\n\n“现在，我再强调一遍：此次行动的目标是强迫洛特辞职或者迫使他与左派决裂后撤回这份法案。我们要说服他们同意，无论是用嘴还是用枪。这场行动不会简单，洛特已经把一批忠于他的将军拉拢到了身边，我们必须注意应对抵抗。”\n\n“最后，切记这场政变是为了拯救民主，而不是大开杀戒！切记尽可能避免暴力，如果有必要的话我们就必须让洛特下台，但我们绝不能伤害他！”几位将军看起来有些紧张，但依旧坚定，这正是德尼斯需要的。“现在，回你们的部队去，等我之后的指示。愿上帝保佑巴西！”"
 BRA_denys.8.a: "将军们的欢呼淹没了自由的哀泣。"
 BRA_denys.9.t: "圣保罗之蛇"
 BRA_denys.9.desc: "“……所以我需要您的支持。如果我们成功阻止了洛特破坏体制、威胁国家安全的尝试，到那时我们就需要您和您的部队出马确保我们对圣保罗的控制。”德尼斯元帅紧握着拳头，向陆军副指挥克鲁埃尔将军请求道。巴西的命运危如累卵，他正求助的人却不为所动。他端着酒杯，悠哉地靠在椅子上，脸上挂着得意的笑容。\n\n“哦，我还不太确定。”德尼斯竭尽全力压制着自己朝着他大吼大叫的冲动。“就我和我们亲爱的总统阁下共事的经验来看，他是个聪明人，善于做出明智的判断。”克鲁埃尔慢慢正起身来：“我只是想知道，如果我反对他，我能得到什么？”他的眼中闪出了危险而贪婪的光芒。\n\n“我明白了。”这就是能决定巴西命运的人，一个索取贿赂的贪婪畜牲。\n\n“我们未来的工作开销颇大，而且十分繁重。所以我们可以为您……提供一切您可能会用上的资金和物质开销。而且，当然，您保卫巴西的义举彰显了您的高风亮节，理应担任更重要的职位。您觉得，‘战争部长阿毛里·克鲁埃尔’这个头衔听起来如何？”他愉快地笑了。"
 BRA_denys.9.a: "“圣保罗是你的了。”"
 BRA_denys.10.t: "乞丐不该挑肥拣瘦"
 BRA_denys.10.desc: "“——这就是我们需要的一切。”奥迪利奥·德尼斯说完这句话后，向阿毛里·克鲁埃尔将军点头致意。想要说服这位将军参与政变还是很简单的，因为他曾被洛特轻视，没能成为圣保罗军队的指挥官。此时的他急于反击，哪怕他要为此付出代价。\n\n尽管如此，德尼斯还是感到焦虑不安。城市中的军队都是洛特的拥趸，他们未必会向克鲁埃尔将军和他的手下投降。此外，他还需要控制住州里的其他地方。\n\n他心中的犹豫表现在脸上，而此时克鲁埃尔将军正在气头上。“怎么，你在质疑我和我的手下吗？”他怒目圆睁地瞪着德尼斯，转而脸上又浮现出一丝冷笑。“别担心，等到时机成熟，我会控制住布里佐拉和贝维拉夸，只要你提前准备好属于我的那份钱。”德尼斯又向他点了点头，随即走出了办公室，但恐惧仍然萦绕于他的心中。"
 BRA_denys.10.a: "“但愿如此，克鲁埃尔，但愿如此……”"
 BRA_denys.11.t: "抢先一步"
 BRA_denys.11.desc: "收到信号的士兵立刻按计划行动起来。小奥林皮奥的部队进展迅速，已经进入了里约并联系上了独自等待着的卡洛斯·拉塞尔达。几乎没有人意识到他们已经落进了军队的手掌心。\n\n另一边，阿西斯·布拉西尔焦急地摇醒了洛特。他本想接着睡的，但阿西斯不知所措的表情让洛特意识到了问题的严重性：“怎么回事？”\n\n“虽然不能完全证实，但有消息称军队进入了里约。”他咳嗽了几声，不安地转了转眼睛。洛特问道：“德尼斯在哪里？他人呢？”\n\n“我不知道。”阿西斯·布拉西尔耸了耸肩，低声说。洛特打断了他，下令道：“让雅伊尔·丹塔斯·里贝罗过来，我们必须粉碎这场政变，现在还有时间阻止叛军进攻巴西利亚。”\n\n“洛特阁下，那您呢？”阿西斯·布拉西尔问，他正要赶出门去，就像这天早晨的每一个人一样：“您要不要找个安全的地方？局势可能会更糟……”"
 BRA_denys.11.a: "“我会坚守岗位。”"
 BRA_denys.12.t: "必须如此"
 BRA_denys.12.desc: "恩里克·特谢拉·洛特的总统办公室乱成一团。当广播中的世界杯主题曲突然被国歌取代，一切都乱了。他最害怕的情况成真了，在全国各地，军队正在接管城市、军事基地及周边地区，要求他立刻下台。而德尼斯也不知所踪。洛特隐隐猜到他的元帅去哪里了，但这依然只是他心底的猜想罢了。\n\n“先生！”他的一位秘书惊慌地叫道：“德尼斯来电。”洛特大步走到惊慌失措的男人面前，从他瑟瑟发抖的手中拿过电话，把电话拿到耳边。\n\n“我在这里，德尼斯。打开天窗说亮话吧。”\n\n“洛特总统，我希望您明白，我们只是为了捍卫巴西的体制和稳定而出此下策。”洛特已经猜到德尼斯也参与了政变，但仅仅知道这一点也不能挽回如今的局势。德尼斯接着说：“我们希望您中止和左翼分子的联合施政，立即罢免所有左翼部长。然后，我们希望您重组一个团结政府，直至下次大选。最后，我们要求维持体制：立即罢除洛特法案。”在回答之前，洛特深吸了一口气。\n\n“你不过是想架空我的权力罢了。我拒绝，全部。”\n\n“恩里克——”\n\n“元帅，我从不抛弃我的朋友。如果你这么想除掉我，那就亲自露面，让你的部队走上街头，公开宣布背叛我。”电话挂断了。不久后，总统收到了消息：德尼斯的部队试图包围巴西利亚。"
 BRA_denys.12.a: "终幕临近。"
 BRA_denys.13.t: "我们的荣光时刻"
 BRA_denys.13.desc: "洛特仿佛在五个小时里一下子老了五十岁。自政变爆发以来，他和他的下属们无时无刻不在疯狂地打电话给每位可能争取到的州长和将军来保卫总统和民主。最初，只有戈亚斯州长和布拉西尔等将军明确表示拥护政府，但随着时间的推移和洛特的努力，情况变得更不确定。\n\n他的一名秘书在接听电话时突然站了起来，看向洛特：“先生！里约那边的消息，前线说政变部队放弃了！”\n\n洛特赶上前去，点了点头表示感谢，然后接过了电话：“我是洛特总统，情况如何？”\n\n“总统阁下，我是驻里约部队的里贝罗将军。”他用严厉但释然的语气说：“莫朗指挥的叛军意图进入城内，我派出了手下的所有坦克阻断道路，那些杂种根本不敢靠近。他们已经撤退了。”\n\n“我知道了，谢谢你。”电话另一头的将军嗯了一声表示明白，在挂断电话前，他就已经开始对部下大声喊着什么。洛特长出了一口气，释然地笑了。“先生们！”他的声音让房间里的人们纷纷看向他。“情况依然不容乐观，但我们正在赢得这场斗争！如果叛军不能拿下几座大城市，他们就已经失败了。让我们的人坚持住，我们必将迎来最终的胜利！”房间里爆发出了欢呼，洛特的下属们抖擞精神，再次投入到工作中去。"
 BRA_denys.13.a: "巴西度过了至暗时刻。"
 BRA_denys.14.t: "小小木坦克"
 BRA_denys.14.desc: "洛特总统思索片刻，政变接近尾声，而他毫无疑问的赢了。真是讽刺，政变本是为了回应一次削弱军队权力和影响力的行动，但这一切都印证了他的担忧。对他们来说，这一切真的这么重要吗？身为总统，如此侮辱他们，为何他们动用军队都不愿意使用外交手段？身为总统，是否有机会让他们理性一点，避免这场闹剧的发生？\n\n一位秘书一只手拿电话，另一只手向他招手，打断了他的思考。洛特带着感激的微笑接过电话。“你好，我说洛特总统。请问您是哪位？”\n\n“啊，总统！我是克鲁埃尔将军。”电话那边传来一些杂音，“哦，弗罗塔将军也在这里，但更重要的是，我们还有第三位客人！”洛特觉得自己正在失去耐心，他用手指敲了敲身旁的办公桌。在他说些什么之前，电话那头又说起来了：“我们抓住了德尼斯元帅这个叛徒！嘿，你这个畜生，怎么不说话了？”过了一会，电话那头传来更多杂音。准确来说，是一阵咒骂和威胁的声音，但很快就被压了下去。\n\n“嗯，这声音一听就是他的。”洛特好奇这否是某个诡异而愚蠢的计划的一部分，但很快他就打消了这个念头。虽然不知这两人用何种方法先于别人找见了这个畜生元帅并将他逮捕，这很可疑，但现在更重要的事情是处理德尼斯。至于其他的事情，可以再等等。“谢谢。两位将军，你们需要协助押送他吗？”"
 BRA_denys.14.a: "巴西的民主制度经受住了考验，并无大碍。"
 BRA_denys.15.t: "为什么？"
 BRA_denys.15.desc: "当洛特隔着监狱的栅栏凝视着他的老朋友时，他只有一个疑问。“究竟是什么让你——这个从1955年以来始终支持我们的人——背叛了为国为民奉献终生的誓言，选择给我的背后来上一刀？”\n\n德尼斯只有一个回答：“这是必须的，恩里克，这是必须的，你的法律是违宪的。”\n\n“怎么，你的政变难道不是针对一个合法的民选政府吗？你把我当成什么了，拉塞尔达吗？”\n\n德尼斯嗤之以鼻：“我曾以为你被工党中的共产主义者奴役，而你证明了我是对的。如果你让那个布里佐拉掌权，用不了几天，我们就会歌颂希特勒或者列宁，我们也将失去对抗共产主义或法西斯主义的能力，尤其是最高法院因我的失败转而支持你的法律。”\n\n牢房外的警长摇了摇头：“你想多了，德尼斯。有《洛特法案》，我们完全可以继续和共产主义和法西斯主义作斗争。至于你，把嘴给我闭上。你只是一个背叛誓言的叛徒。”\n\n“我——”\n\n巴西合众国的总统转身离开。\n\n“我没什么可说的了。”"
 BRA_denys.15.a: "他们再也没有说过话。"
 BRA_denys.16.t: "鼠与人最如意的安排设计"
 BRA_denys.16.desc: "“里约被占领了！”\n\n“克鲁埃尔这个畜生背叛了我们！”\n\n“阿拉冈在海上，离这里太远了。他帮不了我们。”\n\n报告传来传去，但洛特并没有在意。一种强烈的麻木笼罩了他的全身，淹没了他周围的一切。他失败了。德尼斯前前后后团结了大量将军，哪怕是总统也无法击败。而那些忠于总统的人太少太迟钝了。到底是哪里出了问题？是他没有做足工作以保证军队的忠诚吗？逼得太紧？做得不够？当他们除掉总统后，还会干什么疯狂的事情？\n\n“先生。”一个神情沮丧的男人拿着电话呼唤他。“你女儿的电话。”\n\n这让他从沮丧中清醒过来，用颤抖的手快速接过电话：“埃德娜，你安全吗？”\n\n“我应该问问你才对！”洛特从没听过女儿这么害怕。“爸爸，求你了，我知道发生了什么。你需要逃跑，找辆车，飞机，什么都行，离开这个国家！”\n\n总统精疲力竭地叹了口气。“我不能这样，我要尽到我应尽的责任。”\n\n“去他妈的责任和尊严，它们有你的生命重要？”她的声音开始颤抖。“如果他们抓住你，他们会……”\n\n“埃德娜。”他尽可能振作起来。“他们不会杀我的，因为德尼斯不会同意。”老实说，他也不确定会怎样，但他错误地判断了德尼斯的品性。“埃德娜，无论发生什么，你永远都是我的女儿，我以你为傲，再见。”\n\n“爸爸——”洛特挂了电话。"
 BRA_denys.16.a: "等待我们的将是审判。"
 BRA_denys.17.t: "现在怎么办？"
 BRA_denys.17.desc: "恩里克·洛特站在总统府的顶上，凝视着远处巴西利亚的郊区。虽然他拿着望远镜，但哪怕是个单目失明的人都能清楚地看到叛军正在城外集结。面对这幅景象，洛特头脑一片空白。好在让洛特感到莫名的舒畅是对讲机发出的杂音和保镖谈话的声音盖过了他的窘境。但他飘忽的思绪很快被一位保镖打断，保镖摇着他的肩膀，喊道：\n\n“先生！总统先生！”保镖拿着耳边的对讲机喊道：“我们从几个州得到消息，他们愿意派兵支援我们，这只需要您的一声命令。”\n\n洛特从口袋中拿出一包烟和一个打火机，点着烟后对保镖说：“我不想让这个国家更加分裂。既然胜负已分，除了减少不必要的损失，我没什么别的可做了。”他停顿一下，深深吸了一口烟，“给我对讲机，让我自己去会会德尼斯。”保镖不情愿地把对讲机给洛特，转身离开并告诉其他人他的决定。保镖走后，洛特深吸一口气，开口：“你赢了，德尼斯，来这里找我，我不会反抗的，让我们做个了结吧。”\n\n“啥？就这？”对讲机的那头传来了疑惑的声音。德尼斯对于洛特的决定大跌眼镜，他原以为洛特这样的人物会有更强硬的反抗。“对，就像德尼斯说的那样，把这天杀的刀从我背上拔开，杀了我吧！”洛特愤怒地说。他放下对讲机，错过德尼斯对举行选举解决这些他造成的问题的回应。洛特的思绪又开始飘忽不定，他再次眺望城外的军队，脑海中只浮现出一句话："
 BRA_denys.17.a: "“上帝啊，不要忘记是谁造成了这一切灾难。”"
 BRA_lacerda.16.t: "盛会"
 BRA_lacerda.16.desc: "全民盟的参议员们一收到卡洛斯·拉塞尔达总统要求他们出席临时会议的通知，他们就连忙赶到了会场。他们迫切地想要知道拉塞尔达准备了什么。\n\n“我的同僚们，”他开口说，“我的议员们，同胞们。巴西期盼着更美好的未来。而今天站在这里的我，就是那个要将它化作现实的人。我忠实且成功地为我的国家服务，我为此感到骄傲！经济有发展了，政治更稳定了，国家的未来前所未有的光明！”参议员们鼓掌起来。这不只是出于礼节，拉塞尔达的演讲本身就有着令人共鸣的力量。\n\n“感谢你们，我的同僚们，以及巴西的广大人民们。我感谢你们所做的一切。是你们选择让我为国家再服务一届，为此，我感到莫大的荣幸！”人们窃窃私语。如此无耻且公开地推翻了官方的选举结果很可能会带来更多的冲突。人们对此感到极为不安。“我的下一个任期将会带来更多的变革！瓦加斯的残渣和他的那些支持者将被毫不留情地铲除，热图利奥主义的流毒将再也不能毒害巴西！打倒暴政！”一片寂静，只能听见呼吸的声音。在这个房间里，没有哪怕一个人胆敢忤逆这个男人的话语。\n\n在寂静无言中，一些参议员站了起来，背对着拉塞尔达，转身离开了议会大厅。但随即，在那些留下来的人之中，有一个人开始鼓起掌来。没有离开的人也纷纷加入进来，一同起立鼓掌，直到那些离开大厅的人汇成了一大股人群。\n\n一些人离开了，也无关紧要。拉塞尔达想。重要的是，绝大部分人都留了下来。"
 BRA_lacerda.16.a: "“我是总统，参议院为我服务。”"
 BRA_lacerda.0.t: "峰回路转"
 BRA_lacerda.0.desc: "就像赌场上的赌徒，等待考试成绩的学生，等候爱人回信的青年；对即将到来的事物的期待，一个重要事件不确定的结果，便让拉塞尔达紧张不已，他能感觉到自己的心脏在胸腔里狂跳。\n\n然后，一切都定格在了那一刻。投票结束，票数统计完毕，电视屏幕上显示了数字。拉塞尔达败选了。\n\n尽管还有部分票数未统计，但超过90%的票已经清点，即便拉塞尔达赢得了剩余所有选票，也无法逆转败局。选举的帷幕已经落下，一切已成定局，拉塞尔达失败了。而且败在了一个热图利奥分子、一个左派、一个该死的“共产主义者”手上！这是怎样的一出闹剧？这究竟是怎么一回事？\n\n不，这不可能是真的。古拉特一定舞弊了，他肯定动了手脚！做了假票！收买了选举官员！巴西虽广阔无垠，人口众多，但不可能有那么多蠢蛋，会投给像古拉特这样的危险人物。他以为自己真的能逍遥法外？简直是天大的笑话！\n\n卡洛斯轻抿了一口酒。一点酒精来稳定他的情绪。他不能这样失控，特别是考虑到接下来的挑战，以及必须采取的行动。他翻看日历，算计着他还有多少时间；大约80天至就职仪式——更准确地说是78天。不到80天的时间来扭转这场舞弊。不到80天的时间来挽救他的国家。\n\n更多的酒精灌下了喉咙，逐渐平息了他的焦虑，但又不至于让他失去敏锐。是时候制定计划，让拉塞尔达开始筹备必要的行动了。"
 BRA_lacerda.0.a: "该策划政变了。"
 BRA_lacerda.1.t: "死线抉择"
 BRA_lacerda.1.desc: "时光匆匆流逝。古拉特的就职日渐逼近；至少，这是人们的普遍看法。在这片土地上，总统宝座的归属并非选举之日敲定，而是在选举到就职之间慢慢揭晓，直至古拉特真正踏入总统官邸，一切才算尘埃落定；即便如此，结局仍旧充满变数。\n\n拉塞尔达静坐于晨曦宫的窗前，凝望着外头的风景。又一次壮丽的日落；满天的红霞，色彩斑斓，自然之美尽现眼前。然而，这也预示着他在权力殿堂的日子又少了一天。\n\n但他并不畏惧。他已做好了万全的准备。政变将顺利展开。\n\n卡洛斯·拉塞尔达一页页地翻阅着他的笔记。那些需紧急夺控的人口重镇，那些既易于笼络又权势滔天的军中关键人物，以及某些无需金钱收买便会支持他的人。他已将这座一碰即塌的纸牌屋，巩固为坚不可摧的砖石城堡；只有非同小可的力量，才能撼动他筑起的高墙。一切已准备就绪。\n\n在最后的检视中，一个名字跃入拉塞尔达的视线——弗罗塔，他可靠的中间人，已在推动拉塞尔达的宏图大业中证明了自己的价值。是时候利用弗罗塔在军中的人脉，让军队为自己所用了。"
 BRA_lacerda.1.a: "拉塞尔达拿起了电话。"
 BRA_lacerda.1.b: "也许他喝高了……"
 BRA_lacerda.2.t: "凤凰行动"
 BRA_lacerda.2.desc: "行动代号：凤凰\n\n[?global.date.GetDateStringNoHour]\n\n仅供授权人士目视查阅\n\n鉴于最近选举中的不佳表现，卡洛斯·拉塞尔达决定为了保护/改善巴西目前的局势，而采取必要的激进措施。\n\n通过电话、中间人和其他通讯方式，已与政府运作和过渡至关重要的几位关键人物取得联系。这包括高层民间和军事官员。巴西的国家机器已充分倾向拉塞尔达一方，无需面对过大的反弹，便可能恢复适当、合法的治理。\n\n通过政治家的名义支持和军官们的实际支持，以及忠于他们的士兵，将执行阻止古拉特就任巴西总统的行动。主要的人口中心，尤其是对工业、贸易和政府相对重要的城市，将受到军事力量的干预和控制，确保重要地点处于拉塞尔达派系的控制之下。\n\n此计划现已生效。\n\n签署人：卡洛斯·拉塞尔达"
 BRA_lacerda.2.a: "调度完毕。"
 BRA_lacerda.3.t: "身居高堂的朋友"
 BRA_lacerda.3.desc: "尽管拉塞尔达在不久前的总统大选中败在了若昂·古拉特手下，巴西军方的军官们还是已经秘密串联起来，并向他效忠。一场非和平的权力交接即将撕碎稳定的表象，换而言之，这是一场政变。\n\n阿毛里·克鲁埃尔元帅已经倒向拉塞尔达，并用他的部队控制了巴西利亚城，尤其是各个重要政府机关。这一进展在增强了拉塞尔达一方实力的同时也沉重打击了反对者的抵抗能力。由此产生的连锁效应也将令更多观望局势的军方将领们带着他们的手下顺势加入拉塞尔达的阵营。\n\n街头筑起了街垒，宵禁巡逻兵正在清空街区，宵禁令已经下达，军方正在巩固对各城市的控制。\n\n在安全区深处的一座办公室里，卡洛斯·拉塞尔达坐在书桌后，看着他的手下干将小奥林皮奥·莫朗。他肃立着，昂首挺胸，眼中满是一位士兵对指挥官的敬重。在这间黑暗的办公室里，拉塞尔达下达了命令。"
 BRA_lacerda.3.a: "“小莫朗，你的任务是占领瓜纳巴拉。”"
 BRA_lacerda.3.b: "“小莫朗，你的任务是占领瓜纳巴拉。”"
 BRA_lacerda.4.t: "洛特介入"
 BRA_lacerda.4.desc: "这晚，巴西军队开始了一系列行动。一些部队打着拉塞尔达的旗号试图控制巴西的各个重要城市。然而，事实表明拉塞尔达派武装的规模仍然不足以控制整个国家，政府仍掌握着一系列最重要的城市和资源开采中心。\n\n大批军人们倾听着特谢拉·洛特的演讲。在演讲中，他呼吁军人们既要忠于国家，也要忠于体制，这两者并不矛盾。最重要的是，绝对不要倒向拉塞尔达。他的话语，或是他的声望确实能令众人信服。许多部队选择退出政变，而拉塞尔达拉拢到的许多势力现在也恢复了中立，选择保持忠诚并支持建制派、拥护政府。\n\n阿穆里·克鲁埃尔，拉塞尔达的关键盟友和政变的策划者之一，正在打包行李。这并非纯粹的懦弱，尽管确实不少。很显然，虽然他在建制派眼中是个威胁，但如果他愿意收下一大笔钱，然后离开巴西度一辈子假，他们也不是非杀了他不可。自然，他同意了，带走了拉塞尔达成功政变的希望。"
 BRA_lacerda.4.a: "如果不能从失败中吸取教训，那失败就只是失败罢了。"
 BRA_lacerda.5.t: "美国的支援"
 BRA_lacerda.5.desc: "叮铃铃、叮铃铃，电话响起。政治家没必要非得只靠自己的境内势力掌权。美国的触手早已伸向了他们国境以南的每一个国家，因此，他们早晚要在巴西的政治中表明立场。这个立场最好是有利于拉塞尔达和他的盟友的。他打算联系美国人，尤其是美国的军方高层；他希望自己能先自己的对手一步。\n\n“卡洛斯·拉塞尔达？听说你的竞选不太顺利啊。你有什么需要？”\n\n“现在你有两个选择，巴西人民本来也有两个，可惜他们选错了。古拉特和我，二选一。我向你保证，我比他更符合你们美国人的利益。”\n\n“这种自吹自擂的话我听多了，你就直说你能不能赢吧？我们美国人不打没把握的仗。”\n\n“我有军方支持，我是合法人选，我在军政两界都有人脉，我控制着各大人口中心。我知道你是搞政变的行家，知道你干活的手法，还知道你拒绝不了我提的条件。”\n\n电话那头陷入了沉默，也许是在向其他军人征求意见，又或者是在询问华盛顿的态度。接着，回复传来："
 BRA_lacerda.5.a: "“山姆大叔站在你这边，卡洛斯。”"
 BRA_lacerda.5.b: "“对不起，你还是自求多福吧。”"
 BRA_lacerda.7.t: "友好的到访"
 BRA_lacerda.7.desc: "目前为止，局势尚在掌控之中。军方维持着秩序，媒体亦步亦趋。铁腕带来了稳定，发展指日可待。巴西即将摆脱蛊惑民心的政客。不过，向真正民主的转型不能完全仰赖军人和记者，更不可能仅靠拉塞尔达在巴西利亚的笔杆子。他需要打很多电话——在前任们明智缔造的这个联邦共和国里，必须获得各州支持，或至少使之保持缄默才能确保合法性。即便对于那些被中央视为……不受欢迎的势力，亦是如此。\n\n譬如圣保罗州那位尊贵的州长，拉塞尔达宿敌之子小热图利奥·瓦加斯。那句“先以悲剧登场，再以闹剧收场”在耳畔回响。儿子与父亲同样是个窃国贼，只是少了那份令人叹服的手腕。但即便是白痴，只要执掌全国最强大的州域，也能构成威胁。更何况此人自诩得到伟大巴西人民的授权——尽管选举充满舞弊，或是仰仗“国父”的余威。妥协势在必行。或许要咬牙切齿，但终究是谈判。对方可能拒绝，但小瓦加斯面对的选项只有拉塞尔达或军方。而直觉告诉他，军方开出的价码绝不会更优。\n\n电话拨通数秒后，圣保罗州长拿起了听筒。"
 BRA_lacerda.7.a: "“瓦加斯州长，我知道我们有分歧……”"
 BRA_lacerda.7.b: "“瓦加斯州长，我知道我们有分歧……”"
 BRA_lacerda.8.t: "即使最如意的安排设计…"
 BRA_lacerda.8.desc: "“你他妈什么意思，军队也加入了抗议活动？”拉塞尔达冲着埃斯特尔吼道。“圣保罗闹事也就算了，但你说瓜纳巴拉和其他地方也都一样？整个国家都妈了个逼的疯了吗？”\n\n“先生，我亲自确认过这些报告都是真的。我们不能——”\n\n“闭嘴！你给我闭嘴！我要思考！”拉塞尔达咆哮着。这怎么可能？经历了多年的奋斗，现在他距离抹去巴西污点的理想如此之近。瓦加斯瘫在轮椅上发烂发臭，他的继承人也被拉塞尔达用计打败。这个国家终于要迎来一个理智且负责的政府了。但事实并非如此。老热图利奥从他妈的坟头里爬了出来，和他的孝子走狗们一起纠缠着拉塞尔达。他曾经是讲道理的，他曾经是彬彬有礼的。但他的电话通了五秒钟就被挂断，广播在五分钟内就把他打成叛徒。他？说他是叛徒，美国傀儡，军方走狗？还是这帮让巴西丧失其禀赋、文化与诚实，把巴西祸害成野蛮、懒惰的废土的瓦加斯徒子徒孙说？\n\n看来，英勇高尚的巴西人民站在了那个畜生的背后。这是对公权力可耻、可鄙、毫无意义的浪费！他为了让这个国家彻底摆脱独裁统治做了这么多，展开了长达几十年的斗争，但人民却只想躲在国家背后享受，指责美国的不是，好为自己的傲慢和懒惰开脱！操你妈的。操你妈的巴西。拉塞尔达想要拯救人民，人民却不想拯救自己。让他们在这恶臭的粪坑里烂掉吧。他最后一次环顾着总统办公室，想着这世界的一切本该变得更好。然后，他让埃斯特尔立刻准备一架直升机。"
 BRA_lacerda.8.a: "理性的惨败。"
 BRA_lacerda.9.t: "理性之声"
 BRA_lacerda.9.desc: "拉塞尔达与各大媒体高层的会谈进行得很顺利，他们都已经准备好对巴西人民发出协调一致的声音。这是最简单的部分。现在他需要坐在广播台前，用他沉着的语气扑灭古拉特支持者的暴动。他有些担心，毕竟他的说话方式并不像前任总统们那样辞藻华丽。但或许这就是最好的安排。过去的拉塞尔达就厌弃满是空洞承诺的演讲，这样的讲话是无法开辟一个没有强人与煽动者的新时代的。一篇理性的演讲将为这个国家带来理性的新风貌。他开始演讲道：\n\n“巴西的公民们，我是你们的总统。我要严肃地向社会大众通告近日的选举中出现的一系列令人担忧的舞弊行为。案件的详情已经登报，将在明早向社会公布。当前，有充足的证据表明我国存在严峻的恐吓选民、恶意选票漏计等妨害民主机制的现象。因此，巴西政府在此郑重宣布，此次大选结果无效……”"
 BRA_lacerda.9.a: "“……在进行彻查之前……”"
 BRA_lacerda.9.b: "“……在进行彻查之前……”"
 BRA_lacerda.10.t: "人们支持古拉特"
 BRA_lacerda.10.desc: "拉塞尔达一直以来就想要质疑选举结果，他指控古拉特犯下许多罪行，如欺诈和腐败，还有不论成败，经常向对手喷射出一连串辱骂。拉塞尔达当然是想让人们质疑选举的合法性，给予他在国内外各色盟友帮助下夺回权力的借口。当然，这么做的前提是，人们会相信他。\n\n可人们不相信他，人们认为拉塞尔达的质疑不过是他企图控制巴西的最后一搏，而这可能就是他真实的想法，而且，他还失败了。他的行为导致巴西陷入两难境地，两位政治家都高调宣布自己才是国家的合法领导人。不过，情况对拉塞尔达不利。古拉特优势明显，群众与大规模集会都是他的后盾，选举也为他提供了合法性，使他拥有足够的权力以避免内战，至少目前还能避免。可是平衡不能永远保持，而颠覆却几乎不能保证成功。\n\n动荡在加剧，失败的可能却在上升，拉塞尔达愈发煎熬。他依旧渴望权力，可他不想让巴西陷入烈火。他只能笑对失败，他会带着失败一道，跨过原野，跨过海洋，逃到一个遥远的地方，逃到一个不会让他感到那么失败的国家。不论之前的企图如何，他还不希望毁掉国家。"
 BRA_lacerda.10.a: "飞呀飞呀，飞走吧……"
 BRA_lacerda.11.t: "人们待在家里"
 BRA_lacerda.11.desc: "拉塞尔达一直以来就想要质疑选举结果，他指控古拉特犯下许多罪行，如欺诈和腐败，还有在争议性的选战中，经常向对手喷射出一连串辱骂。拉塞尔达当然是想让人们认为选举非法，而他的目标已经成功了。\n\n不是说一夜之间每个投票给古拉特的人都转投拉塞尔达了，拉塞尔达要控制巴西，哪需要民众的死忠呢？那是军队存在的意义。拉塞尔达不需要，他需要的是人们待在家里，保持困惑、害怕，反正最要紧就是让人们远离一切古拉特的集会。而这正是已经发生了的事实：尽管人们有对政变的声讨，有捍卫民主的呼声，但还是待在家里。尽管人们看待拉塞尔达，同情有之，恐惧有之，冷漠有之，但还是待在家里。\n\n拉塞尔达躺倒在一张精致的皮椅里，嗯，不错的进口货，他又品了一口饮料，嗯，也是进口货。他想道，真美妙啊，但更美妙的是你的一天以胜利结束。而他已经成功了。这么久以来，他头一次可以放松下来。胜利的感觉真棒。"
 BRA_lacerda.11.a: "一切按照计划进行。"
 BRA_lacerda.12.t: "拉塞尔达逃亡"
 BRA_lacerda.12.desc: "拉塞尔达失败了。他输掉了选举，政变也失败了。和平手段失败了，暴力手段也失败了，追逐权力之路失败了，现在他只能逃往异国他乡。他的夺权计划失败了，施政方针失败了，全部雄心壮志失败了，但愿这架直升机不要再出事吧。\n\n逃亡计划很完备，可以让卡洛斯·拉塞尔达迅速、安全、秘密地离开巴西。第一步，开架直升机降落在他家旁边，驾驶员是他可以信赖的亲密盟友。不是说他要乘坐直升机出逃，直升机只是载他一程，送他到一处简易的私人机坪，一架私人飞机已经为他准备好了。他会在机坪携带个人财产登机，驾驶员同样是一位可靠盟友。他要乘飞机直飞美国，在美国安稳地取得庇护，躲开那些准备对他失败政变进行反击的家伙，\n\n飞机已经飞出家乡几百英里，而在离地面几千英尺的空中，卡洛斯却大为光火。他想道，一切都糟透了，一切都不如意，他的举措只是让事情变得更糟。该死的，统统见鬼去！诅咒古拉特，诅咒怯懦的军官，诅咒吝啬的美国佬，诅咒这一切！但事已至此，无可挽回。遗憾已无法挽回，而他只能告诉自己去接受这一切，然后继续前进。"
 BRA_lacerda.12.a: "无可挽回。"
 BRA_lacerda.13.t: "反对派逃亡"
 BRA_lacerda.13.desc: "古拉特被打倒了。他并非被正当且合法的手段打倒，即通过投票箱，通过以和平、合法、一致同意的方式进行领导人更替的专门公民机构而打倒。不是这样。他赢得了选举，而这仅仅是整场战争里的一场战斗，他继续前进，却战败而亡。拉塞尔达赢了，他用政变赢得了巴西的控制权。\n\n杨戈乘着一辆无标车，悄悄地离开了这个他称之为家乡的国家。他穿过边境，进入乌拉圭。他希望在那里有盟友能够支持他，保护他免受那些已经对自己、自己的形象、自己的家乡与国家造成过如此巨大伤害的人杀害。这是一场失败，也是一场撤退，而他只想结束这件事，结束这一切。\n\n拉塞尔达洋洋得意地坐在家里，品尝着他的饮料。花了这么久的时间，费了好大力气去筹划，他终于赢了，他终结了政治舞台的混乱，他感到很高兴。上帝赐予他甜美的胜利，简直就和他的饮料一样甜美。\n\n“总统先生！”助理说着话走进了房间。\n\n“上帝啊，怎么了？”\n\n“得把您护送到安全的房间，巴西利亚现在枪声四起。”"
 BRA_lacerda.13.a: "胜利了，但代价是什么呢？"
 BRA_lacerda.14.t: "篡弑登基"
 BRA_lacerda.14.desc: "卡洛斯·拉塞尔达，巴西合众国总统之位的篡夺者，此刻心满意足。他高兴的原因并非赢得了民众的选票，而是靠着不择手段追逐胜利的决心和意志力。然而令人遗憾的是，他以这种方式夺权终究不会没有代价。愤怒的人群在街头高呼口号，令这位即将就职的总统不禁回忆起上次那颗差点夺走他性命的子弹。为防万一，最终决定他的就职仪式将在巴西利亚一座地堡中举行。\n\n地堡的大门缓缓打开，总统迎面而来的是军方要员、警察官员、美国外交官以及一组新闻媒体人员——这些人都是策划阴谋、把古拉特流放出国、把他自己推上权力宝座的关键人物。拉塞尔达左手按在《圣经》上，右手举起，开始宣读就职誓词。然而，在场的人都心知肚明，这一切不过是为了制造表面的正常感罢了。誓言结束后，总统转身面对镜头，发表了他的演讲：\n\n“巴西人民啊，今天是真正的巴西人的胜利之日！面对古拉特对民主的歪曲，我主动出击，击退了这场共产主义叛乱。我们伟大的国家不会沦为所谓的‘人民共和国’。尽管眼下情况特殊，我向大家保证，全国民主联盟的政策不会有丝毫动摇。我请求巴西人民与我一道，展望一个光明的未来，一个不再被共产主义谎言与瓦加斯主义暴政所笼罩的未来。我们终将共同使巴西前所未有地强大！在这艰难的时刻，我感谢你们始终不渝的支持，愿上帝保佑巴西合众国及其人民！”\n\n演讲结束后，“乌鸦”同他的党羽们从地堡中鱼贯而出，踏入了早已紧张万分的现实之中。"
 BRA_lacerda.14.a: "乌鸦抓住了暴君，却变成了新的暴君。"
 BRA_pres_70_debug.1.t: "1970 Presidential Election Kicks Off"
 BRA_pres_70_debug.1.desc: "总统候选人名单尘埃落定。竞选活动全面展开，巴西大地处处上演着激烈的对决。助选团队挨家挨户上门游说，逐一争取选民支持；候选人在万人集会上慷慨陈词，试图俘获民心；而暗室密谈的幕后交易，则为每位角逐者增添着看不见的筹码。军方冷眼旁观这场选战，真实意图至今讳莫如深。\n\n现在，是时候选择你要为之助选的阵营了。"
