 BRA_institutionalised_military_2_desc: "巴西回到了她的起点，回到了军方的手中。正如1889年，军事政变缔造了共和国。正如1930和1949年，军队在愚蠢的政客搞砸一切时介入并恢复秩序。军队，巴西如今直到永远的体制核心，将取回本属于它的权力，永远不受任何人的摆布。"
