 BRA_lottquadros_improve_relations_desc: "[BRA_lottquadros_improve_relations_dyn_desc]"
 BRA_lottquadros_improve_relations_0: "举行联合新闻发布会"
 BRA_lottquadros_improve_relations_0_desc: "总统和副总统将举行联合新闻发布会，略述针对巴西的问题的应对策略。"
 BRA_lottquadros_improve_relations_2: "一同会见外国高官"
 BRA_lottquadros_improve_relations_2_desc: "洛特和夸德罗斯将确定一个时间，一起会见前来访问的外国外交官并出席宴会。"
 BRA_lottquadros_improve_relations_1: "安排内阁会议"
 BRA_lottquadros_improve_relations_1_desc: "总统内阁将举行会议，确保当前的议程能按计划实施。"
 BRA_lottquadros_improve_relations_3: "应对各州长抱怨"
 BRA_lottquadros_improve_relations_3_desc: "洛特和夸德罗斯将听取州长们的意见，一同努力解决他们的担忧。"
 BRA_lottquadros_increase_lott_influence: "[BRA_lottquadros_increase_lott_influence_dyn_title]"
 BRA_lottquadros_increase_lott_influence_desc: "[BRA_lottquadros_increase_lott_influence_dyn_desc]"
 BRA_lottquadros_increase_lott_influence_1: "与库比契克的老臣聊聊"
 BRA_lottquadros_increase_lott_influence_1_desc: "作为战争部长，洛特与戈梅斯和库比契克任命的官员都有联系。他将会见那些依然在世的人，为他的改革争取支持。"
 BRA_lottquadros_increase_lott_influence_2: "联系军队的同事"
 BRA_lottquadros_increase_lott_influence_2_desc: "洛特总统会与他军中的一些朋友坐下聊聊，保持他与军队的联系畅通无阻。"
 BRA_lottquadros_increase_lott_influence_3: "与联盟合作"
 BRA_lottquadros_increase_lott_influence_3_desc: "社民党-工党联盟助洛特于1960年大选中取胜，只有在他们的支持下，他才能实现他的计划。总统将与联盟领导人制定战略，最终确定国会议程。"
 BRA_lottquadros_increase_lott_influence_0: "准备总统演讲"
 BRA_lottquadros_increase_lott_influence_0_desc: "洛特将利用一场公众演讲巩固自己作为巴西政府领袖的地位，夸德罗斯没必要出场。"
 BRA_lottquadros_increase_quadros_influence: "[BRA_lottquadros_increase_quadros_influence_dyn_title]"
 BRA_lottquadros_increase_quadros_influence_desc: "[BRA_lottquadros_increase_quadros_influence_dyn_desc]"
 BRA_lottquadros_increase_quadros_influence_0: "讨好反对派"
 BRA_lottquadros_increase_quadros_influence_0_desc: "政府在全民盟和社进党中有许多批评者，副总统夸德罗斯将听取他们的意见，提醒他们，应该为政府失败负责的是洛特，而不是他。"
 BRA_lottquadros_increase_quadros_influence_3: "争取内阁的帮助"
 BRA_lottquadros_increase_quadros_influence_3_desc: "官僚体制是解决巴西问题的路途中的最大障碍。夸德罗斯将指示行政部门运用一切合法的权力越过国会实施他的计划，洛特肯定不会在乎的。"
 BRA_lottquadros_increase_quadros_influence_1: "宣扬巴西独立自主"
 BRA_lottquadros_increase_quadros_influence_1_desc: "夸德罗斯将在一个电台节目中澄清政府的外交政策立场，宣扬巴西的独立自主，指天发誓巴西不会屈服于共荣圈、团结协定或OFN的意志。"
 BRA_lottquadros_increase_quadros_influence_2: "确保教会支持"
 BRA_lottquadros_increase_quadros_influence_2_desc: "教会一直以来都是全民盟的坚定盟友，所以副总统将会见教会领袖，为他们分忧。"
