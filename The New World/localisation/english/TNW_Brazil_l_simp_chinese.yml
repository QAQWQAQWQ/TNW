 BRA_develop_cooldown_inactive: ""
 BRA_develop_cooldown_active: "\n\n§V一项发展法令正在实施中§!"
 BRA_develop_encourage_migration_tt: "§Y鼓励人口向城市流动§!\n§L我们将实施经济激励措施，促进[BRA_develop_selected_region]地区的农村人口进城，为该地区的工业部门提供充足的劳动力。§![BRA_develop_cooldown_msg]\n\n§Y选中时的效果：§!\n[BRA_develop_selected_region]\n每月城市人口增长：§G+0.25%§!\n随着城市人口的增长，我们将解锁\n§G更多建筑位§!。\n§Y在60天内，我们将无\n法颁布新的发展法令。§!\n\n实施该法令需要花费£political_power_texticon §R10§!政治点数。"
 BRA_develop_sponsor_projects_tt: "§Y促进工业发展§!\n§L我们将通过补贴和减税等手段，促进[BRA_develop_selected_region]地区的工业发展。§![BRA_develop_cooldown_msg]\n\n§Y选中时的效果：§!\n[BRA_develop_selected_region]\n每月工业增长：§G+0.25§!\n随着工业化程度的增长，我们§G能够对更多的人口征税§!。\n§YGDP§!会迎来§G小幅增长§!。\n§Y在60天内，我们将无\n法颁布新的发展法令。§!\n\n实施该法令需要花费£political_power_texticon §R10§!政治点数。"
 BRA_develop_subsidize_mech_tt: "§Y补贴机械化§!\n§L[BRA_develop_selected_region]地区的农民喂饱了我们的国家，但辛苦劳作的他们却无缘得到尖端技术。为了表达我们的感激之情，我们要以农民可承受的价格进口最新的拖拉机、卡车和联合收割机。§![BRA_develop_cooldown_msg]\n\n§Y选中时的效果：§!\n[BRA_develop_selected_region]\n每月机械化程度增长：§G+0.25%§!\n随着机械化率的提高，§G人口增长也将受益§!。\n一个受影响地区的§YGDP增长率§!将§G提高§!。\n§Y在60天内，我们将无\n法颁布新的发展法令。§!\n\n实施该法令需要花费£political_power_texticon §R10§!政治点数。"
 BRA_develop_requisition_assets_tt: "§Y征用工业资产§!\n§L虽然过去我们提供了许多帮助，但现在只有将[BRA_develop_selected_region]地区的工业部门为我们所用，才能发挥其最大效力。虽然这可能会减缓工业增长，但短期内会对我们的准备金大有裨益。§![BRA_develop_cooldown_msg]\n\n§Y选中时的效果：§!\n[BRA_develop_selected_region]\n每月工业增长：§R-0.25§!\n§G大量现金将涌入我们的准备金池§!。\n§YGDP§!将§R略受打击§!。\n§Y在60天内，我们将无\n法颁布新的发展法令。§!\n\n实施该法令需要花费£political_power_texticon §R10§!政治点数。"
 BRA_develop_support_ranching_tt: "§Y支持畜牧业§!\n\n§Y选中时的效果：§!\n§fGDP§!§G增加§!§Y0.4%§!。\n§Y年森林损失§!§R增加§!§Y150平方千米§!。\n§Y在60天内，我们将无\n法颁布新的发展法令。§!\n\n实施该法令需要花费£political_power_texticon §R10§!政治点数。\n若§Y年森林损失§!超过§Y40,000平方千米§!，我们将无法颁布这一法令。\n\n"
 BRA_develop_expand_logging_tt: "§Y扩大采伐§!\n\n§Y选中时的效果：§!\n§fGDP§!§G增加§!§Y0.3%§!。\n§Y年森林损失§!§R增加§!§Y100平方千米§!。\n§Y在60天内，我们将无\n法颁布新的发展法令。§!\n\n实施该法令需要花费£political_power_texticon §R10§!政治点数。\n若§Y年森林损失§!超过§Y40,000平方千米§!，我们将无法颁布这一法令。\n\n"
 BRA_develop_bolster_cash_crops_tt: "§Y推广经济作物§!\n\n§Y选中时的效果：§!\n§fGDP§!§G增加§!§Y0.2%§!。\n§Y年森林损失§!§R增加§!§Y75平方千米§!。\n§Y在60天内，我们将无\n法颁布新的发展法令。§!\n\n实施该法令需要花费£political_power_texticon §R10§!政治点数。\n若§Y年森林损失§!超过§Y40,000平方千米§!，我们将无法颁布这一法令。\n\n"
 BRA_develop_limit_deforestation_tt: "§Y限制采伐§!\n\n§Y选中时的效果：§!\n§fGDP§!§R降低§!§Y0.2%§!。\n§Y年森林损失§!§G减少§!§Y300平方千米§!。\n§Y在60天内，我们将无\n法颁布新的发展法令。§!\n\n实施该法令需要花费£political_power_texticon §R10§!政治点数。\n执行法令时采伐将继续进行。\n\n"
