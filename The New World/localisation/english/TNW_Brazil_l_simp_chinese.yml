 BRA_conservatism_2_party_long: "全国民主联盟 - 拉塞尔达派(União Democrática Nacional - Lacerdaists)§F\n--------------\n有拥护瓦加斯主义的人，自然就有反对瓦加斯主义的人。全国民主联盟正是在反对“新国家”独裁政权的潮流中脱颖而出的政党。自成立以来，全国民主联盟一直致力于抵御日益侵蚀的极权主义，捍卫道德价值，信仰美式民主和认可OFN的反法西斯立场。尽管部分务实的成员倾向于与社会民主党就其发展主义策略进行合作，但全国民主联盟也汇聚了古典自由主义经济学的支持者，他们坚信巴西有能力建设一个发达的自由主义经济体系。§!"
 BRA_paternalism_party: "社进党"
 BRA_paternalism_party_long: "社会进步党(Partido Social Progressista)§F\n--------------\n社会进步党的政策虽然笼统，却独树一帜地将腐败视为生活常态。这个本质立场保守的党派，愿意与政治光谱上的任何人合作，通过贿赂和暗箱操作来与其他党派及军队保持稳定的关系。党内还流传着亲德的思潮，同时对美国的影响持怀疑态度，这种情绪不仅来自德裔巴西人，也与一些党员与纳粹的个人联系有关。社会进步党展现了一种实用主义，揭开了巴西政治舞台背后的真实面目。§!"
