 BRA_progressivism_party: "工党"
 BRA_progressivism_party_long: "巴西工党(Partido Trabalhista Brasileiro)§F\n--------------\n瓦加斯创立巴西工党作为“工会和共产党之间的缓冲区”，工党却成了工人权利的捍卫者。工党成员包括寻求国有化和全面土地改革的民粹主义改革派，以及试图缓和党的中央集权倾向的社会民主主义知识分子。在其中，还有许多投身于工会官僚机构和公务活动的瓦加斯主义者。将他们团结在一起的是反对资本主义压迫的持续斗争、对民主的信念，以及创造一个真正平等的巴西的梦想。§!"
 BRA_liberalism_party: "社民党"
 BRA_liberalism_party_long: "社会民主党(Partido Social Democrático)§F\n--------------\n社民党由瓦加斯着手建立，与建制派关系匪浅，且在很大程度上得到农业寡头、企业和中产阶级的支持。该党奉行民粹主义和务实主义，因其温和的发展主义纲领和坚定捍卫民主自由的理念而团结起来。然而，党内希望继续与长期盟友、瓦加斯主义姐妹党工党保持密切合作的人与那些寻求与右翼反对党全国民主联盟进一步合作的人之间的分歧正在逐渐显现。§!"
 BRA_liberal_conservatism_party: "全民盟"
 BRA_liberal_conservatism_party_long: "全国民主联盟(União Democrática Nacional)§F\n--------------\n有拥护瓦加斯主义的人，自然就有反对瓦加斯主义的人。全国民主联盟正是在反对“新国家”独裁政权的潮流中脱颖而出的政党。自成立以来，全国民主联盟一直致力于抵御日益侵蚀的极权主义，捍卫道德价值，信仰美式民主和认可OFN的反法西斯立场。尽管部分务实的成员倾向于与社会民主党就其发展主义策略进行合作，但全国民主联盟也汇聚了古典自由主义经济学的支持者，他们坚信巴西有能力建设一个发达的自由主义经济体系。§!"
