 BRA_marxism_will_not_prevail_desc: "这操蛋国家到底咋回事啊？突然，有个脑残的左倾分子从不知道什么野鸡地方混了进来，爬到了巴西政治领域的制高点；现在这个小白痴还想把他那亲爱导师马克思的蠢逼理想付诸实践？古拉特的计划一定会跟毁掉苏联一样毁掉巴西，我们绝对不能袖手旁观。\n\n如果要防止巴西因共产主义的失败而死无葬身之处，就必须将军队团结起来，一同应对赤匪威胁。军队一向山头割据，但现在是时候团结起来阻止古拉特掌权了。哪怕这意味着要惩罚那些遭他蒙蔽的自己人，我们也在所不辞。"
 BRA_Vai_Passar: "困难总会过去"
 BRA_Vai_Passar_desc: "从阿拉瓜亚河畔的星星之火，到点燃改写巴西命运的燎原烈焰。\n\n军政府的伪善父爱面具已彻底剥落，露出了赤裸裸的疯狂本性。而中北部的人民，终于因饱受的种种不公而奋起反抗。面对如此广泛的民愤，巴西共产党决定进入人民战争的第三阶段，动员群众、建立革命政权，誓将资产阶级与反动派彻底扫地出门。\n\n若昂·阿马佐纳斯主席携手挚友佩德罗·波马尔与毛里西奥·格拉博伊斯，在福塔莱萨确立了根据地，如今正享受着前所未有的民意支持。然而他们所面对的最大难题，是扎根于巴西最贫困地区的物质匮乏与落后基础设施——这不仅掣肘了战事，也影响着对秩序的维护。但困难总会过去。随着革命的推进，苦难将被清算，正义终将到来。"
 BRA_idea_lacerda_corruption_reforms: "反腐改革"
 BRA_idea_lacerda_corruption_reforms_desc: "政府运作应以才德为本，而非人脉亲疏——这是拉塞尔达在任期间始终秉持的核心原则。为切实践行这一理念，政府已着手推行一系列改革措施严打腐败行为，并通过定期审计以评估公共服务部门是否切实具备为民众服务的能力。\n\n巴西政坛盛行的腐败之风将走向终结，取而代之的则是美式高效行政体系。"
 POLITICS_CIVIL_WAR_RADEMAKER: "现今巴西的局势，真可谓是一种残酷的反讽——这片南十字星下的土地，如今竟要靠其在南极的驻地官员来拯救。\n\n某日，南极的补给突然中断。运输不再如期而至，偶尔抵达的物资也附带着关于内乱与赤地千里的讯息。奥古斯托·哈曼·拉德马克·格鲁内瓦尔德海军上将，巴西南极领地的最高统帅，意识到事情不对劲——但他万万没想到，祖国竟已陷入如此深重的沉沦。他原本未曾设想，重返故土之日竟是举国陷于烈火之时！\n\n里约热内卢已彻底沦为人间炼狱，被一个自诩为“将军”的疯子摧毁殆尽。共产党人发动公开叛乱，掌控的领土远远超出拉德马克此前最悲观的预想。而那些力挺拉塞尔达、扶持全国民主联盟傀儡的新军官们，却似乎仍沉浸在自我安慰的幻象中，丝毫不愿正视他们的愚行究竟给国家带来了怎样的深重灾难。在这般猖獗的魔鬼行径面前，若巴西人民陷入绝望，实属人之常情。\n\n但——巴西啊，请鼓起勇气。海军上将拉德马克已挺身而出，要为这个伤痕累累的国家疗愈苦痛。他麾下有海军陆战队，有本地的整合主义者，还有那些对他本人忠心耿耿的追随者。凭借这些力量，拉德马克势必将铲除布尔什维克，惩治拉塞尔达一派，令理性重归巴西。历经如此苦难之后，国家理应获得这一份最起码的回报。"
 POLITICS_CIVIL_WAR_BRIZOLA: "自由，是人类最根本的渴望之一。也许正因为如此，军政府的统治才显得格外冷酷、非人。然而，枪炮终究只是暂时的威慑，暴力的垄断已不再掌握在军队手中。\n\n莱昂内尔·布里佐拉深知这种渴望。他的信念，早在1923年便深植于心——那年，他的父亲倒在了反抗南里奥格兰德州寡头统治者的战斗中，为革命献出了生命。年少的布里佐拉离开母亲，靠打零工谋生，日后投身巴西工党，逐步与瓦加斯家族及若昂·古拉特建立起深厚的盟友关系。\n\n作为党内一颗冉冉升起的左翼民族主义新星，他的政治生涯本应光辉璀璨，却在担任州长期间因军方干政而戛然而止，最终被迫流亡乌拉圭，而不是被关进牢狱。但即使身在异国，他也从未沉默。他不断发声，鼓动抗争，唤起无数人对独裁政权的愤怒与反思。\n\n说到底，是军方亲手埋葬了自己；但正是布里佐拉，亲自归来，送上了那致命一击。他团结的是遍布全国的民主力量，那些誓言捍卫自由的人们。他们没有坦克，却有意志；他们熟悉街巷地形，了解百姓疾苦，他们选择抗争，而非跪倒在枪口之下。军靴终将被逐出，那片沉默太久的土地，将再度呼吸到自由的空气。\n\n他们将奋起一战，而他们，终将站在正义的一方。"
