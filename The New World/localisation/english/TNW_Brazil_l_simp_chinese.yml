 BRA_military_hardliners_name: "£BRA_hardliners_texticon §g强硬派§!"
 BRA_military_hardliners_power: "§g[?BRA_military_hardliners_power|0]§!"
 BRA_military_hardliners_tt: "£BRA_hardliners_texticon §g强硬派§!§F\n--------------\n\n\n\n\n\n\n[GetHardlinerLeader]\n--------------\n强硬派是对巴西民主制敌意最大的派系，被反对者们称为“踏正步者”。在共同的理想之下，该派系已经存在了数十年。无论是强迫瓦加斯辞去权力的军官，还是参加了1955年未遂政变的军官，大多都属于强硬派。只要向强硬派成员许诺财富与权力，他们就会保持忠诚，但他们的满足不会持续多久。"
 costa_hard_leader: "£GFX_Artur_Silva_texticon\n\n\n\n\n\n\n\n\n阿图尔·达·科斯塔-席尔瓦将军"
 medici_hard_leader: "£GFX_Emilio_Medici_texticon\n\n\n\n\n\n\n\n\n埃米利奥·加拉斯塔苏·梅迪西将军"
 BRA_military_sorbonne_name: "£BRA_sorbonne_texticon §Q索邦派§!"
 BRA_military_sorbonne_power: "§Q[?BRA_military_sorbonne_power|0]§!"
 BRA_military_sorbonne_tt: "£BRA_sorbonne_texticon §Q索邦派§!§F\n--------------\n\n\n\n\n\n\n[GetSorbonneLeader]\n--------------\n索邦派是巴西军队内部的温和派，他们支持维持现状。索邦派最关心的是巴西的长治久安，他们的工资能按时到账，并在退休时领到数目可观的养老金。索邦派既不像强硬派那样野心勃勃，也不像护宪派那样忠于理想，但他们确实秉持着实用主义。"
 branco_sorb_leader: "£GFX_Castello_Branco_texticon\n\n\n\n\n\n\n\n\n温贝托·德·阿伦卡尔·卡斯特洛·布兰科将军"
 ernesto_sorb_leader: "£GFX_Ernesto_Geisel_texticon\n\n\n\n\n\n\n\n\n埃内斯托·贝克曼·盖泽尔将军"
 BRA_military_constitutionalists_name: "£BRA_constitutionalists_texticon §K护宪派§!"
 BRA_military_constitutionalists_power: "§K[?BRA_military_const_power|0]§!"
 BRA_military_constitutionalists_tt: "£BRA_constitutionalists_texticon §K护宪派§!§F\n--------------\n\n\n\n\n\n\n[GetConstitutionalistLeader]\n--------------\n护宪派由洛特元帅于1955年未遂政变时成立，支持第四共和国和民主制的延续，无论领袖是谁。护宪派主张制止军方主动出击解决巴西的困境，并将尽最大努力保卫共和国总统。"
 denys_const_leader: "£GFX_Odilio_Denys_texticon\n\n\n\n\n\n\n\n奥迪利奥·德尼斯元帅"
 peri_const_leader: "£GFX_Peri_Constant_Bevilacqua_texticon\n\n\n\n\n\n\n\n\n佩里·康斯坦特·贝维拉夸将军"
 argi_leader: "£GFX_Argemiro_de_Assis_Brasil_texticon\n\n\n\n\n\n\n\n\n阿热米罗·德·阿西斯·布拉西尔准将"
 BRA_military_progressistas_name: "£BRA_psp_texticon §h社进派§!"
 BRA_military_progressistas_power: "§h[?BRA_military_progressistas_power|0]§!"
 BRA_military_progressistas_tt: "£BRA_psp_texticon §h社进派§!§F\n--------------\n\n\n\n\n\n\n[GetProgLeader]\n--------------\n实际上，唯一能把所谓的社进派团结起来的就是钱。由总统阿德马尔·德·巴罗斯打造的一连串恩惠、礼物和承诺将社进派团结在一起，他们首先忠于国家，然后忠于社进党。然而，这样得来的忠诚如沙上建塔——社进派赖以生存的赞助一旦结束，这个派系可能马上就会随之消失。"
 kruel_prog_leader: "£GFX_Amaury_Kruel_texticon\n\n\n\n\n\n\n\n\n阿毛里·克鲁埃尔将军"
 frota_prog_leader: "£GFX_Silvio_Frota_texticon\n\n\n\n\n\n\n\n\n西尔维奥·库托·科埃略·达·弗罗塔准将"
