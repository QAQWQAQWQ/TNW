 BRA_the_land_calls_to_us_desc:0 "i am the lorax and i speak for the land"
 BRA_Romeu_de_Campos_Vergal_edna_eco_desc: "§Y财政部长\n社会民族主义§!\n-------------\n§L出身于圣保罗历史悠久且赫赫有名的科罗内斯家族的罗梅乌，似乎命中注定要在今日成长为一位意志坚定的经济学家。青年时期，他去了一所与他身份相称的预备学校就读。也是在那时，他发现了自己对教育事业的热忱远超常人，并为此投入了十余年心血。但他最终还是无可避免的进入了政界，1934年，他当选为了圣保罗制宪会议议员，一直担任到瓦加斯发动政变。\n\n在新国家时期，罗梅乌在巴西石油公司的前身石油与国民经济研究与捍卫中心担任顾问。在瓦加斯主义失势后，他加入了阿德马尔的社进党并改选为议员，期间还组建了民族主义国会联盟。如今，身为财政部长的他，肩负着加强国家对自然资源的控制这一使命，同时他还要将毕生热爱的教育事业推广给大众。§!"
 BRA_Romeu_de_Campos_Vergal_vargas_jr_eco_desc: "§Y财政部长\n右翼民粹主义§!\n--------------\n§L随着老一辈人的消亡，瓦加斯主义作为一种信仰正日渐式微。身为它最后的守护者之一，罗梅乌·韦加尔从未幻想自己能让它在早已将其抛之脑后的社进党内死灰复燃。尽管小瓦加斯已基本上把他父亲遗留的民粹主义影响一扫而空，但韦加尔却不知为何仍行尸走肉般在政府中苟延残喘。一条鲑鱼无法逆流而上，尽管他深知这个寓言背后残酷的真相，却依旧改变不了被任命为财政部长的命运。\n\n韦加尔始终不愿认同正腐蚀着巴西精神的堕落的个人主义，但旧日早已离他远去，这个职位或许就是对那个时代的委婉告别。目睹着同志们要么妥协退场，要么长眠于地下三尺，韦加尔意识到，自己不仅仅是一个濒临退休的老者——更是象征着理想主义与无边活力的濒危物种。§!"
 BRA_the_resolution_of_failure_desc:0 "it's genuinely joever"
 BRA_guanabara_dreaming_state_modifier: "瓜纳巴拉之梦"
 BRA_guanabara_dreaming_state_modifier_desc: "瓜纳巴拉，卡洛斯·拉塞尔达经济规划的胜利果实，已跃升为巴西现代化进程的典范。随着贫民搬迁工程与棚户区改造的完成，拉塞尔达与佐克西亚季斯规划的蓝图催生出世界一流的基础设施、蓬勃发展的工业区与拔地而起的新兴住宅区。历经漫长岁月后，里约热内卢终于首次实至名归地成为了名副其实的“奇迹之城”。\n\n旅游业攀至历史巅峰，新兴产业为商业注入活力，蓬勃壮大的中产阶级正加速迁入焕然一新的瓜纳巴拉湾郊区。这片土地所孕育的“瓜纳巴拉之梦”，为世人窥见巴西的未来打开了一扇明窗。"
 BRA_guanabara_dreaming_state_modifier_natspirit: "瓜纳巴拉之梦"
 BRA_Artur_da_Silva_Bernardes_Filho_eco_desc: "§Y财政部长\n保守主义§!\n--------------\n§L小贝德纳斯是20世纪巴西历史上首位独裁者的儿子，其政治生涯从1928年走后门担任其父的秘书开始。身为1930年革命的支持者，他不久后却与瓦加斯决裂，并于1934年当选为众议员。然而他的议员生涯随着1937年新国家体制的建立戛然而止，最终因参与政治抗议而被迫流亡海外。新国家体制结束后不久，他当选参议员，在库比契克政府期间和其父一同支持了“石油是我们的”运动。\n\n作为夸德罗斯的经济部长，阿图尔倾向平衡财政支出与稳健的经济计划，在保持巴西的经济独立同时推进夸德罗斯的基督教福利国家理念。§!"
 brazil.533.t: "盛大开幕"
 brazil.533.desc: "阿德马尔以胜利者的姿态站在大坝前。巴拉圭，阿根廷曾经的盟友、最好的伙伴，如今却抛弃他们投入了巴西的怀抱。不知道那些阿根廷人会作何感想。一想到这他就几近忍俊不禁，但讲台上的巴拉圭总统刚刚结束了演讲，阿德马尔只好强忍笑意，现在该轮到他上台了。\n\n“感谢各位来宾，”他说道，“两国的合作到今天终于结出了硕果，我感到由衷的高兴。”台下的巴西人和巴拉圭人纷纷鼓掌欢呼。“这座大坝看似只是一个简单的设施，但实际上它是我们通往未来的一块垫脚石，一个巴西人和乌拉圭人携手并进共建自由的未来！”言毕，阿德马尔挥手离开了讲台，下面的人群则爆发出一阵欢呼声。\n\n他和巴拉圭总统并排见证了大坝的启动。尽管面前的大坝雄伟异常，堪称划时代的杰作，可阿德马尔脑中所想的只有阿根廷总统的精彩表情。"
 brazil.533.a: "现在笑容转移到谁的脸上了？"
 BRA_latam_reactions.1.t: "噢，是个“呆子”"
 BRA_latam_reactions.1.desc: "桌布下，一双满是皱纹的双手反复搓弄着那张繁复的餐巾布——那是圣地亚哥使馆的大使特意为晚宴准备的。智利总统当选人劳尔·雷蒂希的“虾肉木薯浓汤”只吃了一口，第二勺还悬在热腾腾的浓汤上方迟迟未动。他的情报搞错了吗？这道海鲜菜真的出了问题？还是说那可恶的厨子火候没掌握好？勺上的半只虾和点点木薯糊静默无语，给不出答案。\n\n至少雷蒂希和外交部长莱唐·达库尼亚还在交谈。这两位是除了总统卡洛斯·拉塞尔达之外最掌控大使命运的人，他们已经友好而拘谨地交谈了好几分钟。他连一个字都没插上。都是那催眠般的虾的错。\n\n“大使插了一句话：“布宜诺斯艾利斯的图谋反倒将智利与巴西愈发紧密地连在一起。从玻利维亚到南极洲，我们必须共同抵御他们的帝国主义野心。”大使尝了一口自己的浓汤，以此掩盖唇角的笑意——他终于从刚才的“停滞”中机敏回神，一语恰如其分。\n\n雷蒂希这才第一次转头看向大使，手中的勺子把虾重新沉入木薯浓汤之中。“这片大陆，近来确实诡计频出。”莱唐·达库尼亚脸色一白，他为何突然变了脸色？这个左派，是不是在暗指——？“我很期待与你们，以及拉塞尔达总统的合作。”\n\n大使注意到达库尼亚朝他看了一眼，脸色稍微恢复了些红润。部长举起酒杯，“那就干杯吧。愿我们齐心协力……”他似乎强忍着笑意，“共抗帝国主义之野心。”\n\n雷蒂希第一次露出真正的笑容，微笑转为朗朗笑声，他也举杯相应。"
 BRA_latam_reactions.1.a: "“呆子”有时也能团结民众。"
 BRA_latam_reactions.2.t: "观鸟人"
 BRA_latam_reactions.2.desc: "卡洛斯·拉塞尔达总统胸口微微一紧。那尊小小的蚁鸟雕像正被对面智利新当选总统胡里奥·菲利皮·伊斯基耶尔多翻来覆去地端详着，指尖灵巧，寂无一语。大约过了一分钟，他终于将其轻轻放在红木桌面上，嘴角含笑道：“真是精巧。”\n\n拉塞尔达暗暗松了口气。菲利皮几乎在胜选之后第一时间就提出访问巴西利亚，搞得外交部为挑选合适的礼物焦头烂额。幸好，这位智利技术官僚对鸟类学颇感兴趣也是人尽皆知。“感谢您送来的礼物，”他指的是那几篇装裱好的智利报纸，报道了他当年当选瓜纳巴拉州州长的消息，“更感谢您将晨曦宫列为首访之地。我相信，这会是一个硕果累累的合作。”\n\n菲利皮点头应道：“您的总统任期尚短，但我不得不说——我一直在密切关注。尽管开局颇为……不顺，您之后的每一步都走得很到位。公共行政的改革令人耳目一新，至于您对抗阿根廷扩张影响力的果决态度，更是让圣地亚哥大感欣慰。目前，我们恐怕只能在道义上表示支持，顺便也可以向您取取经。但在布宜诺斯艾利斯问题上，我期待与您并肩作战。”\n\n拉塞尔达一时愣住，倒是菲利皮先站起身，伸出右手。可“乌鸦”也很快握住那只手，毫不迟疑：“愿您和智利在未来几个月一切顺利，我也期待在这里再次与您相见。”\n\n“也愿你如此，卡洛斯。”菲利皮露出笑容，还顽皮地眨了下眼，“如果你再送我这种小鸟，我可就非来不可了！”"
 BRA_latam_reactions.2.a: "要是外交都这么简单就好了。"
 BRA_latam_reactions.3.t: "普拉特的胡言"
 BRA_latam_reactions.3.desc: "“他妈的，智利人怎么选出了一个真纳粹！”卡洛斯·拉塞尔达怒吼道。\n\n外交部长莱唐·达库尼亚只能在心里祈祷，希望总统办公室的门隔音还算过关，或者至少今天官邸内那些爱嚼舌根的家伙都刚好不在。“幸好豪尔赫·普拉特已经退出了民族社会主义党，”他尽力安抚，“但我也承认，他那套极右立场确实让人不安。”\n\n“所以他就是个杂种投机派，什么时候当纳粹方便就什么时候披上这身皮。真是让人宽心啊，瓦斯科。”拉塞尔达冷笑着，嘴角扭成一团。“我们要做三件事。第一，让智利使馆进入冷处理。不搞活动，不办晚宴。让普拉特知道，我对他的厌恶不输他对我的憎恨。第二，唯一的例外——如果那帮法西斯混账真打算对付阿根廷，我们就跟他们谈，甚至合作。但前提是，他们得有这打算。普拉特几年内就得滚蛋，可高乔人永远是个祸患。”\n\n莱唐·达库尼亚一边狂记笔记，一边抬头看着总统：记下了“断联”和“只限反阿”这两条。“那第三件事呢，总统阁下？”\n\n“去弄一整套普拉特当年办的那本《庄园人》杂志，”拉塞尔达咬牙道，“让我们驻智利使馆那帮人趁着闲下来，好好搜罗搜罗这家伙脑子里蹦出的每一段纳粹疯话。越离谱越好，记得给我摘录最蠢的段子。让我们，还有智利人，看看他们的新总统是由什么样的肮脏玩意拼出来的。”"
 BRA_latam_reactions.3.a: "拉塞尔达是在为“普拉特倒台”做准备？"
 BRA_latam_reactions.4.t: "一堆坏消息"
 BRA_latam_reactions.4.desc: "身为总统，卡洛斯·拉塞尔达每天早晨第一件事就是阅读办公桌上送来的各家报纸。他偏爱《圣保罗州报》，对《人民公报》也不反感，而《大众新闻》则常带来一丝越界的快感。至于其余的嘛，从不适到厌恶不等。但不管他读的是哪一张报纸，今日头条只有一个：\n\n“萨尔瓦多·阿连德赢得智利大选！”第一次看到这行字，他竟有种失去了识字能力的错觉。反复读了好几遍，又拿起几份报纸的头版对照，他才敢确定自己不是在做梦。他当然知道阿连德，知道这个狡猾的小社会主义者在智利动作频频——可没想到竟然会是这样？\n\n“新政府重申对社会主义的忠诚！”一阵眩晕袭来，拉塞尔达只觉天旋地转。他刚上任没多久，现在西线就出了麻烦。智利——原本多么可靠，多么笃定的盟友！如今，这份支持成了未知数。他仿佛看到那片南北狭长的土地上覆起了一层红皮，就像皮肤被剥开，露出下方血淋淋的肌肉。\n\n“阿连德的旧言激起对巴西新一轮敌意！”什么言论？拉塞尔达急忙翻找记忆的档案库，努力回想自己是否与阿连德打过交道。然后他想起来了——上帝，他骂我是“法西斯”，对吧？在哪张破报纸上写的来着？\n\n伴随一声低吼，拉塞尔达将面前的报纸全扫到地上，纸镇、几支钢笔也随之滚落。这动作虽不猛烈，却也算是一次虚弱的宣泄。至少，把他从厌恶的泥潭中拉了出来，暂时清醒了点。他无力地瘫坐在椅子上，嘴微张着——智利已不再是可靠的伙伴，而是一场新的麻烦。他越来越恐惧那场迟早要来的与阿根廷的冲突——如今，盟友少了一个。"
 BRA_latam_reactions.4.a: "“上帝啊……”他在心里低语，“要是那边的局势能稍有不同该多好……”"
 BRA_latam_reactions.5.t: "举杯独饮"
 BRA_latam_reactions.5.desc: "玻璃瓶碰撞的脆响，在酒柜里回荡。拉塞尔达总统正寻找适合当下情绪的毒药——得够苦、够烈、够红。底层角落里，静静躺着一瓶智利黑皮诺。再合适不过了。\n\n他拔开瓶塞，猛灌一口。阿连德。智利人千挑万选，最后竟挑了个社会主义者——不久之后就会变成共产主义者。这个人将把安第斯的共和国变成一座独裁牢笼，把那些蠢得无药可救的选民变成奴隶。\n\n灼热的酒液烧穿喉咙，引发一阵剧烈咳嗽。他将总统办公桌喷得一片殷红。那封智利总统当选通知电报——那个象征着巴西与自由国家组织彻底败北的耻辱文书，如今也被染上了葡萄酒的血色。一声低沉的冷笑自他体内爆发而出……这封电报，该被归档保存，做为耻辱的纪念碑。\n\n又是一口，这次饮得更慢。巴西的外交政策将何去何从？孤军奋战对抗阿根廷，原本虚弱的盟友如今也成了敌人？“盟友”？那早已是过去式了。智利的共产党人只会为拉美各地的意识形态孽种添柴加火。第二战线，正在南方缓缓打开。\n\n拉塞尔达死死攥着酒瓶，另一只手笨拙地拨起电话。铃响一声，他抿下一口。外交部长莱唐·达·库尼亚接起了电话。"
 BRA_latam_reactions.5.a: "“让圣地亚哥的使馆收拾东西吧——我们要和智利断交。”"
 BRA_latam_reactions.6.t: "红刃之惧"
 BRA_latam_reactions.6.desc: "“……正是在这一刻，我呼吁智利人民，还有你们那久负盛名的军人传统，南美佩剑的剑鞘——应当竭尽所能，削弱圣地亚哥那个激进政权的根基！正是阿连德与极端主义的调情威胁着我们共同奋斗而来的繁荣，将之抛向一场赤色独裁的深渊！愿巴西为各位敲响警钟：智利的激进派，在巴西利亚，在南锥体其他依然尊重国家主权的土地上，绝无立足之地！”\n\n——这演讲，他果然没能淡定接受。正如一周前，巴西驻智利大使（准确说，是“前大使”）所料。从圣地亚哥飞往巴西利亚的航班，是一趟中产阶级专用的包机，不算豪华，却够体面。这段旅程不会太短，等窗外令人赞叹的亚马孙雨林景致看腻了，手里的报纸正好能用来打发时间。放弃头等舱也是个聪明的选择——大选过后，与其招人反感，不如主动示好平民阶层。\n\n当然，在收拾行李准备启程那天，他就已经在收音机里听过拉塞尔达的演讲了。谁没听过？圣地亚哥的“天鹅绒选票革命”势必会激怒所有智利的邻国，尤其是拉塞尔达。他早就料到巴西使馆会被关闭，甚至在官方宣布之前。说实话，他对此毫不在意。巴西利亚有的是事要做；就算拉塞尔达因为阿连德而在外交上大发雷霆，说到底，他还能折腾出多大动静？"
 BRA_latam_reactions.6.a: "他倚在椅背上，慢条斯理地从口袋里掏出一只BIC打火机，还有一根雪茄。"
 BRA_latam_reactions.7.t: "无友之盟"
 BRA_latam_reactions.7.desc: "圣地亚哥的总统府“拉莫内达宫”内洋溢着喜悦氛围。当拉塞尔达得知弗雷赢得智利大选的消息时，毫不犹豫地着手起草计划，派遣外交部长莱唐·达库尼亚前往致贺，同时为建立坚实的伙伴关系铺平道路。弗雷，无论怎么看，都比那个亚历山德里政权要强得多——他显然更愿意与巴西，乃至整个自由国家组织展开合作。如果牌打得好，拉塞尔达甚至可以把智利的胜选转化为更大的果实。\n\n弗雷的待客之道无可挑剔，展现出一位国家元首应有的风度。他热情接待了前来祝贺的各国部长与国家元首。莱唐一直希望能在握手与几句客套之外，与新总统有更深一步的交谈。于是他在庆典致辞与烤鸡晚宴之后，终于等来了片刻良机。\n\n“外交部长先生，很高兴见到你。今晚的庆典可还尽兴？”弗雷笑容满面，与他握手寒暄。\n\n“非常愉快，总统阁下。拉塞尔达总统向您表示热烈祝贺，并希望您知悉：在他的总统任期内，您将拥有一位真诚的朋友与合作伙伴。他期望我们能携手合作，为南美大陆带来和平与繁荣。”\n\n“多谢。”弗雷的笑容依旧灿烂，然而眼角却隐隐透出几分凌厉。“我尊重拉塞尔达总统在对美外交上的立场，也赞赏他守护巴西民主的努力……不过，对他这个人，我多少还是有些……保留意见。”\n\n莱唐微微一愣，片刻间已读懂了对方那句外交辞令下的真意——说得婉转些，是“不甚喜欢”，说得直白些，就是“厌恶至极”。他顿了顿，仍从容应对道：“即便如此，我与总统都相信我们可以与您合作。请允许我为您的成功，举杯敬贺。”"
 BRA_latam_reactions.7.a: "总统轻笑着点头，心照不宣，两只酒杯轻轻碰撞，发出清脆一响。"
 BRA_latam_reactions.8.t: "沒有前途"
 BRA_latam_reactions.8.desc: "拉塞尔达再次拿起钢笔，凝视着眼前那封写了又改、改了又写的备忘函。“桑坦德先生，请允许我向您表达最深切的哀悼。贵国失去了一位深受爱戴的杰出领袖。他的英年早逝，无疑是个悲剧。愿所有悼念他的人节哀。”他写道。这不过是一封例行的外交电文——然而言辞若稍显温软，便可能被对方解读为某种“和解之意”。\n\n敲门声响起。一位秘书送来新文件，顺便询问总统接下来的日程安排以及对前批文件的处理意见。拉塞尔达还有充足时间，但他仍果断地将这份备忘交给对方，吩咐务必先送往巴西驻布宜诺斯艾利斯使馆，再正式转交阿根廷政府。对方的办公桌上多了一份纸张，但他仍希望这份文书不会被草草掩埋。\n\n他又一次停下手头动作，陷入深思。很少有阿根廷政客能引起他的注意——更遑论欣赏——可西尔瓦诺·桑坦德却是例外。几乎没有人能像他那样坚定地反对专制主义；更少有人能如此公开直言批评胡安·庇隆，并为此入狱，为自由而斗争。的确，桑坦德本可以成为反对法西斯主义、共产主义与纳粹主义的重要盟友。\n\n但——仅仅是“如果”而已。拉塞尔达自知是多面之人，却绝非空想主义者。庇隆主义尚未完全输出至阿根廷之外，而巴西的瓦加斯主义者也已蠢蠢欲动。他们一定会竭尽所能，抵御那套极具传染性的世界观。至于军方，则从对阿根廷的敌意中获益良多，任何形式的缓和对他们而言都是不可接受的。也许，在另一个世界里，这两个政权能共同迎来一场自由与和平的南美时代。"
 BRA_latam_reactions.8.a: "现在，拉塞尔达只能细细思索着未曾发生的故事。"
 BRA_latam_reactions.9.t: "极限试探"
 BRA_latam_reactions.9.desc: "卡洛斯·拉塞尔达紧握手中的报纸，再次仔细阅读。经过一场激烈的选战，由鲁道夫·马丁诺维奇领导的激进公民联盟最终胜出。拉塞尔达深知，自己绝不可在公众场合对这事发声——他的意识形态对手只会将此视为拙劣笑话，而他的意识形态盟友则会因此政治自杀。但他也明白，这绝非可以对未来政策等闲视之的消息。\n\n哪怕不熟悉阿根廷政治的细节，也不难看出马丁诺维奇胜选背后的意味——由伊里戈延提倡的左翼民族主义、其对美国的敌视态度，对他而言都是凶兆。这一套理论、这些观点，说到底与他数十年来竭力反对的瓦加斯主义，并无本质区别。\n\n他再一次叹息，将报纸放下。又一个国家投入了狂热意识形态的怀抱。不过——他转念一想，结局其实还能更糟。激进党虽有诸多问题，终究支持保留民主程序。他听过马丁诺维奇的几次演讲，至少从中能感受到其对法西斯主义的强烈厌恶。而据手头收到的内部情报显示，在激进党内部，这种立场并非异类。\n\n起码，他们不是彻头彻尾的庇隆主义者，那些被赶下台的暴君支持者如今只剩舔舐伤口的份。或许，这并非最坏的结果。激进党会上台，他们会在理性施政上跌跌撞撞，选民会逐渐感到疏远。只要庇隆主义不再死灰复燃，民意终将回归正轨，投向一个更偏右且更稳健的政府。就算如此，他心想，他们也不配得到本该属于其他人的认同。"
 BRA_latam_reactions.9.a: "不上不下，两头不靠，万般皆劣。"
 BRA_latam_reactions.10.t: "拉普拉塔河畔的幽灵"
 BRA_latam_reactions.10.desc: "卡洛斯·拉塞尔达一手握着报告纸，最后读了一遍。他当然明白，自己绝不可插手阿根廷政治——但也绝不能对那里的动向置若罔闻。若是一个立场相符的派系赢得大选，对他将是莫大的助力。而当他从纸页上抬起目光，他知道：那种助力已经到来。埃米利奥·霍夫雷与全国中间派政党联合会在一场胶着战中险胜，最终掌控局势。\n\n然而，真正吸引拉塞尔达注意的并不是霍夫雷本人。这个人虽称得上“可亲”，却只是百种因素中的一种。他更在意的，是整个阿根廷保守派运动的整体胜利，以及这一胜利所代表的意义。曾几何时，他一度停止关注他们的崛起，如今却为自己的疏忽懊悔不已。因为这些人是理性的，只要不被提前清除出局，他们就可能成为宝贵的南方伙伴。\n\n他放下报告，后仰靠进椅背。其实，用“理性”来形容他们，反倒是一种低估。这些人才是真正的反法西斯主义者，开放而通达，毫不留情地拒绝极左与极右。他明白，要绕过军方在地区内的战略安排并不容易，但若能与新政府建立坚固的联系，作为打击极端主义的支点，本身就意义非凡。\n\n几乎是下意识地，拉塞尔达转身向办公桌，抽出一张信纸放进打字机，开始撰写他的祝贺信。他知道，这封信在霍夫雷的新政府手中顶多只被匆匆扫一眼，但那一眼，或许就是破局的开端——能在整个运动中激起涟漪，再次为这片大陆注入理性之风。新的贸易协定、军事存在的逐步撤回、对国际正义的共同承诺——这些都可以成为缓解彼此摩擦的基石。"
 BRA_latam_reactions.10.a: "只可惜，他还无法真正走到尽头，终结这场冷战。"
 BRA_latam_reactions.11.t: "错翼而飞"
 BRA_latam_reactions.11.desc: "卡洛斯·拉塞尔达紧紧攥着手中的报告纸，纸张被重力压得下垂，沉沉地垂落在他那鹰隼般的目光之下。他最后又看了一遍——经过一场势均力敌的选战，吉列尔莫·埃斯特韦斯·博埃罗与人民社会主义党最终赢得了政权。哪怕他近来对阿根廷政治关注有限，博埃罗上台的消息依旧令他深感痛心。\n\n他太清楚这个人代表的是什么——那与他所理解的“理性”可谓南辕北辙。制度化的极致统一，阿根廷内部的整合，以及一种将民族主义与左翼思潮混合后的有毒意识形态。他们抛弃柏林，改称华盛顿为“法西斯之心”，把美国的每一个盟友都打上“同谋”标签。这一切让拉塞尔达反胃。他无法原谅这样的做法，也知道这意味着冷战局势将更加无法缓解。\n\n拉塞尔达同样清楚博埃罗的出身。一个学生运动的煽动者，这人花了近十年时间煽动青年，将他们的苦闷歪曲引导，最终变成他个人的政治资本。“他干得不赖，”拉塞尔达冷冷地摇头。他想不通，这样一个由毛躁激进的学生群体托起的人，竟能在全国范围内煽起热浪，把整个阿根廷推上这条路。就连古拉特都没激进到这个地步。\n\n他抽出另一张信纸，开始书写。他依旧明白——哪怕此时此刻——也不能彻底斩断巴西与阿根廷之间残存的联系。火药桶的引信比以往更短，而巴西利亚有更聪明的办法来应对局势，绝不能以“复仇主义”来为边界冲突制造正当性。他决定试探一下。也许，只要博埃罗尚且只是“令人担忧”，而非“彻底疯狂”，巴西仍可借势谋利。"
 BRA_latam_reactions.11.a: "在深渊边缘起舞。"
 BRA_latam_reactions.12.t: "乌鸦的谋略"
 BRA_latam_reactions.12.desc: "卡洛斯·拉塞尔达自视高洁，坚定站在正义与自由一方。瓦加斯的政权早已让他心生厌恶，对他本人，乃至他的继任者，都从未抱有半分同情。至于若昂·古拉特和库比契克那一套“社会主义”？他从来不信。那些人和当年企图要他命的暴徒，在他眼中没什么两样。若真以为他们有本质不同，那才真是愚蠢至极。更别提一旦对他们有丝毫松懈。哪怕只在一瞬间移开目光，也足够他们发难了。\n\n所以，当阿根廷大选结果传来时，他胸中燃起怒火。他们可以千方百计地伪装自己，可以套上一百万种外衣，但其意识形态的裂痕始终暴露无遗。无论他们高呼多少次“社会正义”的口号，他都不会再上当受骗，不会将其看作别的什么，只会当作一只幽灵、一匹木马、一个庇隆主义绕道重返拉普拉塔河对岸的工具。\n\n揭穿他们的伪装，并不困难。他们的外交政策一如既往地咄咄逼人，让任何外交官都感到棘手；他们的经济政策荒唐至极，不输庇隆本人；他们对法西斯的拥抱依旧彻底而令人作呕；他们的敌人也和过去画出的面孔如出一辙。整个体系自上而下全然未变，只不过多了一张伪善的笑脸来遮掩罢了。拉塞尔达不知道，他更应鄙视这些伪装者，还是那些轻信骗局的蠢人。\n\n但若他要有所行动，就必须又快又准。他固然厌恶这个新政府，但若是彻底断绝与阿根廷的关系，不只会断了国内仍存理性之人的希望，更会将巴西推向危险的边缘。然而，他也绝不会将这个新秩序视作什么理所当然、不可逆转之物。一旦那些“没有庇隆的庇隆主义者”暴露出真实面目，阿根廷军方将毫不迟疑地出手。"
 BRA_latam_reactions.12.a: "邻国使节的电话号码，在他脑海中一一浮现。"
 BRA_latam_reactions.13.t: "地狱空荡荡……"
 BRA_latam_reactions.13.desc: "拉塞尔达攥紧报纸，指节发白，纸面在掌心下被揉得变形，胡安·庇隆那张即将归国的脸也随之扭曲。一滴汗水滴落在头条标题上：“庇隆即将结束流亡归国”。他怒吼一声，将照片撕成两半。“操他妈的法西斯！整整一个国家，都只会想着怎么搞暴力！”他啐了一口。\n\n他当然希望，上帝能在那架飞机落地布宜诺斯艾利斯之前，把它从天上劈下来。可若上帝不够仁慈，那他就得亲自动手，赶在那混账上台前采取行动。从现在开始，他将不得有一刻喘息。整个南美，都将面临阿根廷势力的渗透——而巴西，还有她的邻国，必须动用一切资源自保。\n\n不能等庇隆先出招。巴西必须加快重整军备：更多士兵、更多坦克、更多战机、更多导弹。对阿根廷的任何形式的接触都必须立刻中断。拖得越久，只会便宜了他们。就在庇隆飞越大西洋的同时，巴西驻阿根廷使馆的外交官们正打包归国。\n\n拉塞尔达盯着那张被撕裂的面孔——那个魔鬼的脸。他准备好了，无论庇隆要玩什么把戏，他都不会措手不及。他所能做的，只剩下一件事："
 BRA_latam_reactions.13.a: "……魔鬼在人间。"
 BRA_latam_reactions.14.t: "房间里的大人们"
 BRA_latam_reactions.14.desc: "阿兰布鲁登上阿根廷总统宝座的消息传来时，卡洛斯·拉塞尔达如释重负，仿佛一切喧嚣与混乱终于告一段落，那些轮番登场、装腔作势的军阀强人也总算从旋转木马上摔了下来，退出了舞台。\n\n这不仅让他感到宽慰，也让整个南美洲得以稍稍喘息。如今，拉美两大民主国家皆由理性之人执掌，或许，终结冷战、恢复大陆常态的契机真的已经到来。尽管阿兰布鲁的“民主”看起来更像是摆在橱窗里的陈列品，他的初衷却仍显高尚——而这，才是最重要的。\n\n于是，拉塞尔达提笔草拟备忘，准备交由相关部门：政府对阿根廷的官方立场将转为“批判性支持”，并通过国家机关与亲政府媒体对外传播。通过这一策略，便可与新政权拉近距离，为南美大陆争取一个更加和谐的未来。\n\n至少，在拉塞尔达幻想如此。至于现实——那当然远比幻想要复杂得多。但人嘛，总得有个梦想。"
 BRA_latam_reactions.14.a: "对“管理式民主”的回应，自然也要“管理式”应对。"
 BRA_latam_reactions.15.t: "冷处理"
 BRA_latam_reactions.15.desc: "巴西驻智利使馆的那封贺信，是一周前寄出的。如今，阿德马尔正翻看着这封信的副本。完美得无懈可击——一封工整、毫无感情的祝贺函，恭贺雷蒂希总统在大选中获胜——连一个拼写错误都没有！\n\n他唯一的期待，不过是对方也送来一封同样冷淡的“点头回礼”。这要求过分吗？可答案是：没音讯。没有回复、没有电话，连安第斯山那边一个点头都没有。\n\n阿德马尔不能忍。“保持礼貌。”在一次馆员会议上，他冷冷地说，“礼貌，但要疏远。他们若想说话，就得自己带着信过来。”\n\n外交官们心领神会。不主动接触、不开展新动作、不送人情。既然雷蒂希要摆冷脸，那就让他自己一个人慢慢玩。巴西不会低声下气，更不会跪着去讨人关注。"
 BRA_latam_reactions.15.a: "反正阿德马尔……也做不了什么。"
 BRA_latam_reactions.16.t: "引诱技术官僚"
 BRA_latam_reactions.16.desc: "在高原宫三楼，阿德马尔·德·巴罗斯总统百无聊赖地转动着手中的金笔。关于智利新任总统胡里奥·菲利皮·伊斯基耶尔多的简报，比他还只是候选人时又厚了几页。竞选承诺的记录，对阿德马尔来说略显保守；在亚历山德里政府任职期间的履历，虽然尽职，却不出彩；倒是那一大段关于他求学历程的脚注，几乎可以从巴西一路延伸到圣地亚哥。\n\n然而，还是没有一丝线索能把这位“意识形态真空”的总统同巴西捆绑得更紧。阿德马尔停止了转笔，突然灵光乍现。他提笔落纸，开始勾勒一纸“繁荣承诺”。当然——用西班牙语练练笔，总是令人愉快的事。\n\n阁下钧鉴：\n\n巴西人民（包括我在内）都感到十分庆幸，看到贵国总统职位落于如此稳重可靠之人手中。您在担任经济部部长时所展现出的领导力与洞察力，定将带领智利迈向新的繁荣高峰，也将为圣保罗与瓦尔帕莱索带来共同期待的商贸机会。请相信，不仅我个人，整个巴西商界都希望见证您实现理想、取得成功，也殷切期盼我们两国能早日就加强经济关系展开对话。我诚挚邀请您作为贵宾莅临巴西利亚，我向您保证——此行定将收获丰富。\n\n最后，他又轻轻旋转了一下手中的钢笔，在信末郑重签下了自己的名字。"
 BRA_latam_reactions.16.a: "阿德马尔·德·巴罗斯"
 BRA_latam_reactions.17.t: "智利一切安好"
 BRA_latam_reactions.17.desc: "尊敬的阁下：\n\n我满怀期待地关注着智利大选的结果，今晨在简报上看到豪尔赫·普拉特之名赫然在列，着实令我欣慰不已。谨致以最诚挚的祝贺。\n\n虽然我们尚未有缘晤面，但在研读有关您言论与事迹的过程中，我已深信，在我们二人任内，圣地亚哥与巴西利亚之间的关系将日益紧密。您的信仰引导着您，正如我的信仰亦指引我前行；我也了解到，您对私营经济活力持有理性与尊重的态度，这一点与我的立场不谋而合。您在竞选期间对阿根廷侵略行径所作的直言不讳，更让我相信，双方的外交理念必将形成高度共识。\n\n您在公开演讲中对北美资本在智利经济中所处的主导地位表示了合理的保留。我谨在此向您郑重承诺：巴西——无论是其企业界、金融界，抑或总统本人——都愿为贵国在寻求市场与投资来源多元化的道路上提供力所能及的支持与协作。愿我们的合作穿越安第斯山脉，化作连接两国的新兴繁荣之泉，惠泽双边人民，共创未来。\n\n谨致敬意，"
 BRA_latam_reactions.17.a: "阿德马尔·德·巴罗斯"
 BRA_latam_reactions.18.t: "红旗"
 BRA_latam_reactions.18.desc: "总统阿德马尔·德·巴罗斯紧紧攥着今天的报纸，像要将那张纸生生揉碎。但他眼中浮现的，却不是今日新闻，而是下个月，甚至明年可能占据头条的位置：“智利资本外逃加剧”、“圣地亚哥宣布进一步国有化”、“拉美社会主义者齐聚瓦尔帕莱索”。而这一切的源头，不过是一句话：“阿连德震撼当选”。\n\n阿德马尔猛然将报纸撕成两半。“震撼”与“阿连德在智利”几个字四散在办公桌上，像一地刺眼的碎玻璃。他冷笑一声——情报部门平时拿那么多预算到底干什么吃的？那帮人还拍着胸脯说，最糟也不过是那个伪君子弗雷。结果倒好，巴西在太平洋沿岸最后的合作伙伴，如今正一头扎进所谓“智利社会主义”的快车道，中途还要在“国家危机站”与“国际动荡站”稍作停留。\n\n他嘴角抽动，将那堆碎纸一扫而光，抛进旁边的废纸篓。然后伸手去拿电话——第一个该拨给谁？“震撼”？那是该打给外交部，问问现在阿根廷会不会更加嚣张？“阿连德”，那是该打给社会进步党总部，这事对自己的支持率又会造成什么冲击？那家伙在竞选期间，连骂了自己几个星期的“财阀掠夺者”……一串号码在他脑中打着转，“震撼”一词像警报般在耳边回响。他的手指却已不假思索地滑向那最熟悉的组合，拨了出去——"
 BRA_latam_reactions.18.a: "“我是德·巴罗斯。清空我在智利的所有资产。”"
 BRA_latam_reactions.19.t: "走个过场"
 BRA_latam_reactions.19.desc: "“弗雷啊。”总统阿德马尔·德·巴罗斯翻阅着今晨的简报，语气平淡。\n\n“至少还称不上是智利能选出的最糟总统。”外交部长莱唐·达·库尼亚在总统府的长桌一侧坐下，顺势答道，“我个人还是抱有几分希望的。或许弗雷总统真的能解决智利长期积压的农村问题。如此一来，不仅有助于遏制动荡与社会主义势力的抬头，也能让我们在抗衡阿根廷时多一个稳固的伙伴。”\n\n“我倒更希望，我们的关系维持在冷淡就行，没必要搞得紧张兮兮的。”总统淡淡地说。他望着简报上那些关于教育、农村改革、全球合作、铜矿国有化的庞大蓝图，忍不住摇头，“他那一套宏大计划，让我想起了库比契克。恐怕在高原宫，他们更愿意见到他那样的人，而不是我。”说罢，他将简报撂到一旁，朝助理示意递上几张信纸。\n\n阿德马尔那支金笔在纸上缓缓游走，库尼亚再次试探道：“总统阁下，若您愿意，我可以请外交部智利事务组拟一封祝贺信，您只需签署即可。也能让您在会见纳特尔前腾出更多时间。”\n\n阿德马尔抬起头，随即摇了摇头，露出标志性的微笑，语气中带着一丝惯有的调侃：“不不不，没有什么比‘亲笔信’更能体现外交诚意了。”目光回到纸上，他补了一句，“更何况，还有什么比这种场合更适合我炫耀那一套正式、客气、无比无聊的西班牙语呢？”两人相视而笑。总统随即又轻声补了一句："
 BRA_latam_reactions.19.a: "“就是——真希望收信人不是他。”"
 BRA_latam_reactions.20.t: "“F”开头的那个词"
 BRA_latam_reactions.20.desc: "“帕拉西奥斯死了。现在这个新上任的阿根廷佬，西尔瓦诺·桑坦德，正跟尸僵缠斗，看他能不能比前任还死板。”总统阿德马尔·德·巴罗斯咆哮着，在总统府内来回踱步。外交部长莱唐·达·库尼亚听着这番粗俗而辛辣的讽刺，强忍住脸上的抽搐，但德·巴罗斯并未察觉，怒火仍在持续燃烧：“桑坦德——这人不过是个从小被娇惯的精英，连跟普通人说上几句话的经历都没有，更别提为他们做过什么了。他永远都不会做！他对政治毫无触感，不懂得什么是勇气、汗水和现实。他就是个高高在上的寡头圣人，坐在象牙塔里，居高临下地谴责整个世界。”\n\n总统在高原宫的办公室中来回踱步，阳光透过窗帘缝隙，随着他移动的身影一明一灭：“他整天一边嚷着共产党人要颠覆国家，一边又被纳粹幽灵吓得魂不附体。他真以为法西斯会推翻他的政权？他自己才是那个会把政权玩垮的最大风险！”\n\n库尼亚站得笔直，不敢轻举妄动，只用眼神小心翼翼地跟随那位怒气冲天的总统。“这就是为什么，瓦斯科。”总统咬着牙，低声说道，“这个聒噪的小蚊子早晚会站出来，指控我，甚至整个政府是法西斯。他不过是在为自己的失败找借口。而等到那一刻到来，巴西必须做好准备。”\n\n库尼亚还未思考，便脱口而出：“准备做什么，总统阁下？”"
 BRA_latam_reactions.20.a: "“干他娘的。阿根廷要是想被干，那就干他们。”"
 BRA_latam_reactions.21.t: "同道中人"
 BRA_latam_reactions.21.desc: "阿德马尔刚刚写完他最新的一封信——致信阿根廷新上台的激进派政府，祝贺其胜选。信中写道，鲁道夫·马丁诺维奇总统实至名归，为阿根廷民主树立了新典范，也为两国和平关系注入了新活力，愿双方携手共创云云……\n\n说实话，阿德马尔觉得马丁诺维奇这个人怪怪的。阿根廷政坛本就怪人辈出，但这位尤其古怪。他喋喋不休地谈什么“反帝国主义”，把美国说成万恶之源，听起来就像是那位可怜的夸德罗斯附体。他那一套偏左的思维方式，也实在难以恭维。\n\n不过，阿德马尔倒是一眼看出——这也是个民粹派。而这，就意味着机会：只要双方愿意配合，很多事都可以包装得漂漂亮亮。比如一笔商业交易，就可以对外宣称是“创造就业、惠及工人和家庭”，而不是让那些共产主义者和愤世嫉俗者口中喋喋不休的“资本剥削”。\n\n因此，阿德马尔颇为安心。他相信，马丁诺维奇会懂得配合。即便不懂……那就送上一份小礼物，或许一个特别的“信封”能让他更有动力。"
 BRA_latam_reactions.21.a: "两个民粹总统，不就该“更受欢迎”吗！"
 BRA_latam_reactions.22.t: "以巴西人民之名"
 BRA_latam_reactions.22.desc: "阿德马尔拿着笔，轻轻敲着那封尚未成形的信稿。“以巴西人民之名”——然后呢？身为总统，说话本该代表国家的声音——天知道，这不就是人民选他上台的原因吗？可现在，要他在一封致阿根廷保守派的信上联署，他却怎么也下不了笔。因为这不是人民的意愿，而是他的私心。\n\n你可以怎么批评他们都行（阿德马尔自己就有一肚子牢骚），但他们确实想要缓和局势。那些人是些精英主义的混账，只想把世界封装进琥珀里，可他们的确渴望缓和。他们对民众漠不关心，但他们确实在追求缓和。阿德马尔实在想不明白，这群人是怎么在阿根廷重掌权力的——可他们确实……\n\n这时，笔尖早已在纸上渍出一团浓黑墨迹。阿德马尔毫无仪式感地把第三稿揉成一团，丢进废纸堆里，又重新抽出一张干净的这个新上台的阿根廷政府，难道就一点可取之处也没有？他沉吟片刻，倒是对那个叫霍夫雷的家伙略有好感。确实，是个保守派——但阿德马尔总觉得，那家伙比他那些活尸般的同僚要清醒些，至少在经济问题上如此。他重新提笔：\n\n“致阿根廷共和国政府：\n谨代表巴西政府与其人民，向埃米利奥·霍夫雷总统的就任表达最衷心的祝贺。愿此时此刻，成为两国乃至整个南美洲重新翻开友谊与合作新篇章的起点。”"
 BRA_latam_reactions.22.a: "这一次，情感稍微真挚了一点。"
 BRA_latam_reactions.23.t: "阿根廷的烂笑话"
 BRA_latam_reactions.23.desc: "阿德马尔一边翻阅报纸，手却忍不住颤抖。吉列尔莫·埃斯特韦斯·博埃罗赢下了阿根廷大选。他才读到正文一半，便将整张报纸狠狠摔在地上，随即放声大笑。那笑声酣畅淋漓，直透肺腑，几乎带着一种解脱般的荒谬感。\n\n这实在太荒唐了。世界仿佛在和他开一个拙劣无趣的玩笑——一个学生运动的头头，竟在他担任总统期间，成了巴西世仇国家的元首。从政至今，阿德马尔最看不惯的，就是这群整天高喊理想的学生。他们总是对最寻常不过的政治运作大惊小怪：一个政客凭本事争取些利益，就被骂作“贪污腐败”；一个现实而高效的合同选择，立马成了“权钱交易”的证据。这帮人就像群疯狗，围着些微不足道的枝节狂吠不休。\n\n他弯腰捡起报纸，顺手搁到一旁。既然命运发了这副牌——那也不失为一张有趣的牌。局势当然得紧盯，但阿德马尔已经隐隐期待起这出戏后面的剧情。他提起笔，准备写信。\n\n毕竟嘛，博埃罗不管怎么说，起码看起来还是个能谈判的角色。没必须现在就毁掉沟通的桥梁——一封简单的贺信，足以为后续的博弈铺好第一块石子。"
 BRA_latam_reactions.23.a: "关乎国家命运的牌局里，人总得学会妥协。"
 BRA_latam_reactions.24.t: "美好事业的开端"
 BRA_latam_reactions.24.desc: "“庇隆主义者赢得阿根廷大选”——报纸头版用醒目的黑体大字向所有读者传达着这一消息。阿德马尔一向觉得庇隆的一些理念确实了不起，而如今阿根廷人民终于认同了这些思想，这让他感到由衷的高兴。\n\n他早就想在阿根廷结交些新朋友，而这个名叫西普里亚诺·雷耶斯的新总统以及他的政府，正好提供了一个绝佳的契机。阿德马尔立刻放下手中的报纸，拿起笔，开始动笔写一封祝贺信。\n\n几段热烈的祝贺、多句真诚的赞美，以及一句亲自出席雷耶斯就职典礼的承诺之后，阿德马尔放下了笔，露出满意的神情。这封信只写了一稿，堪称他担任总统以来写得最快的一封正式信函。他坚信，这将成为巴西与阿根廷之间一段美好关系的开端，也希望两国政府能齐心协力，为南美带来繁荣，并终结那场兄弟间的内战。他亲自把信件安排妥当，务必第一时间寄出。"
 BRA_latam_reactions.24.a: "和平，终将属于我们两国的未来。"
 BRA_latam_reactions.25.t: "铺上蓝地毯"
 BRA_latam_reactions.25.desc: "阿尔贝托·坎波斯静坐在办公室里。钟表滴答作响，窗外风声轻拂，脚尖不自觉地轻敲地板——这一切，不过是他用来掩盖心中躁动的障眼法。他在等待那通电话，既渴望，又惧怕。他感到自己的呼吸在胸腔中缓慢回荡，节奏迟滞而紊乱。终于，电话铃响了。坎波斯猛地扑过去，抓起听筒。\n\n“是坎波斯先生吗？”电话那头传来一声轻轻的咂嘴，“我是阿德马尔·德·巴罗斯。最近可好？”\n\n坎波斯只觉一股寒意涌上心头。“晚上好，总统阁下。我很好，您呢？”\n\n“好极了，阿尔贝托。介意我这么叫你吗？”短短一秒的停顿，阿尔贝托却仿佛冻住了，连舌头都僵硬得动弹不得。“好吧，阿尔贝托，我有几位朋友，手上正好有几架飞机可以调配。他们能把你的人从马德里悄无声息地送到布宜诺斯艾利斯，不会引起任何注意。”电话那头的声音冷静自若，丝毫听不出坎波斯此刻额头上的冷汗与胸口的战栗。“我当然想给他更体面的安排，可你知道，这种事，得讲究分寸。”\n\n坎波斯死死握着听筒，胳膊撑在办公桌上，好让自己那只颤抖的手不那么明显。“阿根廷感激不尽。我们不会忘记这一份恩情。”\n\n“当然，当然。等庇隆先生到了，代我向他问好。晚安，坎波斯先生。”\n\n阿德马尔·德·巴罗斯轻轻放下听筒，脸上的笑容也随之散去。他抹了把额头的汗，起身走向酒柜。随手抓起一瓶酒，又取了杯子和几块冰。液体倒入杯中时，他并未看清瓶身标签，却在镜中那一抹晃动的酒光里，看见了自己的脸——一张写满了迟疑与不安的脸。他举起酒杯……"
 BRA_latam_reactions.25.a: "……默默致意，敬那位他祈愿真能带来巴西与阿根廷最好未来的人。"
 BRA_latam_reactions.26.t: "北方解冻，还是南方慢煮？"
 BRA_latam_reactions.26.desc: "阿德马尔·德·巴罗斯乘坐的豪华轿车一如既往地咄咄逼人，飞驰在林荫大道上。车窗上映出巴西利亚的街景，如卡通剪影般浮现在这位政客的脸上，一帧帧“欧洲老城风”壁画似的城市面孔，被生硬地拼贴进亚马孙的绿意之间。他交叠双腿，手指搭成屋脊，静静回味刚刚结束的与阿根廷大使会晤竟出奇地顺利。或许，这里能作为未来布局的基石？德·巴罗斯心中琢磨着。\n\n阿兰布鲁的胜选，无疑是布宜诺斯艾利斯接连不断的坏消息中，少见的一缕亮光。其温和进步的政策纲领成功吸纳了左右两派的选民，令南锥体的政治版图首次显出可预测的轮廓——如果能控制住他那一套不甚讨喜的倾向，这局面对巴西未必不是利好。\n\n然而，作为久经沙场的圣保罗政客，德·巴罗斯绝不会轻易信那套“温和平等”的门面。他一眼就识破了阿兰布鲁的真面目——那是一个表面讲理想、骨子里精于算计的老狐狸。毕竟，像这种“办公室里的老鼠精”，他当年就是踩着他们的头，一步步爬上来的。\n\n阿兰布鲁的问题，真正的难点，在于他的外交路线。这条路线和德·巴罗斯自身所追求的国家利益并不契合。阿根廷加入OFN早在预料之中，毕竟整整一代人都在努力摆脱庇隆主义的历史阴影；但这一步，使得巴西维持中立的战略更添几分棘手。或许未来某天，布宜诺斯艾利斯的领导层会被说服，转向一条更加顾及双边关系的互利之路。但在那之前，警惕和审慎，才是应对阿根廷新政府最稳妥的方式。"
 BRA_latam_reactions.26.a: "世事变幻之下，终究万变不离其宗……"
 BRA_latam_reactions.27.t: "稍稍少些对抗"
 BRA_latam_reactions.27.desc: "激进公民联盟赢得阿根廷大选的消息，让埃德娜露出了久违的一抹微笑。在这段忙乱纷扰的时期里，这已算是一丝难得的喘息。她平日对阿根廷政局并不上心，但激进派的调门听起来，倒是与巴西工党颇为神似——尽管唱的，是给不同听众的歌。\n\n然而，当她读到马丁诺维奇那篇演讲稿时，这份“神似”立刻变得刺耳起来：“只要美洲大陆上还有美国的存在，和平就永无可能。”“我们只承认一种帝国主义，它的首都在华盛顿，而非东京。”“阿根廷绝不会向外来暴政低头。”这些话读来让人疲惫，却也再清楚不过——这正是他的听众想听的。\n\n她也很清楚，马丁诺维奇终究是个政客，而她自己，也早已因阿德马尔的缘故见识过太多这类人。若不是被人捧上高位，他们口中火热的誓言往往不过是一团和气的烟雾。因此，埃德娜决定抢先出手，亲自写下一封措辞讲究、辞藻优雅的贺信——那将是一件精心雕琢的艺术品，一个足够“软化”他的前奏，也为她在就职典礼上与他当面交谈埋下伏笔。"
 BRA_latam_reactions.27.a: "左翼之间的合作，难道还有比这更美妙的吗？"
 BRA_latam_reactions.28.t: "撕开伪装"
 BRA_latam_reactions.28.desc: "在埃德娜眼中，阿根廷的保守党简直像是博物馆里的展品——一群糟老头子，始终坚信最美好的时代是女人还没投票权的时代，或者干脆只有他们自己能投票的年代。因此，当听说他们在最近的大选中获胜时，她感到一阵深深的失望，甚至胃里涌上一丝恶心。\n\n但随着她继续了解新闻，最初的反感也有所缓解。新当选的总统埃米利奥·霍夫雷似乎与传统保守派的刻板形象略有不同。助手向她简要介绍了这位新总统的履历后，她稍稍松了口气——至少，这不是个披着西装的财阀怪物，而是个活在二十世纪，能容忍女性参与政治的现代人。\n\n更关键的是，尽管保守党身上仍残留着陈旧的气味，但在南美冷战的棋盘上，他们却是一方鸽派——主张阿根廷与巴西之间应推动缓和关系。说到底，他们的胜选几乎像是她那句“希望拉美更加和平与繁荣”的祷词被谁听见了一样。\n\n于是，埃德娜愉快地提笔，写下了一封措辞得体的祝贺信，也顺势重新调整了自己对这个新邻国执政党的态度。"
 BRA_latam_reactions.28.a: "为和平轻轻舒了一口气。"
 BRA_latam_reactions.29.t: "重返课堂"
 BRA_latam_reactions.29.desc: "埃德娜第一次听说社会党赢得选举时，脸上浮现出一抹轻快的笑意。随着更多消息传来，这笑容虽然不再明朗，却依旧挂在嘴角，未曾散去。\n\n新当选总统吉列尔莫·埃斯特韦斯·博埃罗难掩激动，频频发表反美言论，甚至将美国比作欧洲曾经的法西斯政权，言辞中还夹杂着几句典型的阿根廷式民族主义口号——这些老调重弹，她早已习以为常。\n\n但即便如此，她仍看到了希望。博埃罗出身学生运动，这类人她再熟悉不过——当年在教书时接触得多了，最知道如何与他们沟通。这种背景意味着他们至少在理念上有一定的左翼共识，也就存在“拉拢入局”的可能性。谁说两种不同形式的民族主义就不能和平共处呢？\n\n他即将举行的就职典礼，正是一次绝佳的接触机会。于是，埃德娜郑重其事地动笔，准备好一封措辞讲究的祝贺信，为将来的引导与协作提前铺好台阶。"
 BRA_latam_reactions.29.a: "在一些人眼中是挑战，在另一些人眼中，是机遇。"
 BRA_latam_reactions.30.t: "南方的轮回"
 BRA_latam_reactions.30.desc: "埃德娜·洛特的手指在桌面上轻轻敲打，指甲发出的声音若有旁人在场，恐怕早已令人神经紧绷。幸好，她的愠色虽显，却始终控制在“私密”的界限之内。整个下午，她都泡在电话线上——从外国使节，到驻守阿根廷边境城市的同僚，再到反对派领袖，各方声音五花八门，却无一不透出安第斯高原上那股浓重的阴郁气息。\n\n庇隆。她心中满是不屑。又是庇隆。连一整代人都还未过去，那位腐蚀人心的独裁者的门徒便再度踏入布宜诺斯艾利斯的政治中枢。虽然西普里亚诺·雷耶斯这张面孔比他的前任更新鲜些，但动机依旧如出一辙：对总统制帝国梦的执念，以及裹挟而来的瘟疫般的民族主义情绪。只不过这次披上了“渐进式改革”的外衣，意在压低公众的不满声浪。\n\n埃德娜清楚，阿根廷很可能又要陷入一次沉重的轮回。但她的职责并未因此改变。巴西不应、也不能轻举妄动地与布宜诺斯艾利斯切断往来。眼下，局势尚留有余地，雷耶斯依然有机会证明自己并非庇隆翻版。谈判、贸易、甚至军事协作——只要正义党肯守规矩，一切皆有可能。\n\n对这个南方邻国而言，也并非全然无望。雷耶斯在劳工与女性权益问题上的温和立场，或许正是阿根廷思想进步派可以借力撬动的支点。哪怕是那可憎的庇隆，当年也曾在关键时刻支持瓦加斯复出——正是这一举动，为巴西后来的政治开放埋下了伏笔。若非如此，她如今的政治生涯，又会是怎样的模样？这念头也许略显功利，但如果雷耶斯真有诚意，是否也能沿用类似的逻辑？\n\n哪怕不能，那也不妨一试。"
 BRA_latam_reactions.30.a: "信任，但要核实。"
 BRA_latam_reactions.31.t: "推卸之术"
 BRA_latam_reactions.31.desc: "“总统先生？”\n\n佩德罗·阿莱绍抬头看向助手，对这个称呼仍感到有些别扭。他从未打算长期担任这个职务，因此也始终与它保持着刻意的距离。“怎么了？”\n\n“有些消息，您应该过目。”助手递上一封来自布宜诺斯艾利斯领事馆的电报。\n\n“哦。”他一边接过，一边随口说道，“是[ARG.GetLeader]啊。让外交部起草一份声明，‘祝贺、祝好运’，走个形式就行。”\n\n助手顿了顿，最终点头收下电报，转身去安排这份公文。门关上后，阿莱绍依旧盯着办公室墙面发呆。阿根廷换了总统，而他对此毫无兴趣。他正疲于应对国内的混乱，实在无力再分神去关心那个从他的角度看来还算“稍好一些”的邻国。那是继任者的事——巴西人民选出来的人，由他们去承担将“总统”这个头衔死死抱在怀里的后果。他始终觉得，不插手无关之事，是谨慎的表现。\n\n而此刻，他全部的心思都放在一件事上：如何确保阿德马尔去世之后，社会进步党仍能维持强势地位。至于阿根廷的权力更迭，就让外交部去处理吧。他也就没有再多想。"
 BRA_latam_reactions.31.a: "阿莱绍重新投入工作。"
 BRA_latam_reactions.32.t: "尽力于不理想之中"
 BRA_latam_reactions.32.desc: "塔沃拉神情淡然地望着电视画面，屏幕上正播放着阿根廷新总统的就职演讲。围绕在他身边的，是挥舞旗帜的支持者和此起彼伏的欢呼声。这个午后本该波澜不惊，巴西利亚一如既往地燥热，哪怕身处空调充足的官邸，也难掩那股从高原地表蒸腾而起的烦闷。他其实早在高原宫时就已看过这场演讲，如今却还是忍不住再看一遍，只为在自家客厅里反复咀嚼这个所谓的“阿根廷新局面”。\n\n马丁诺维奇的确是布宜诺斯艾利斯政坛的一个“异数”。他的崛起无疑是庇隆时代余毒的延续，是历史惯性将这位激进派领袖推上权力巅峰。他那套直白得近乎鲁莽的反美外交言论，以及激进党中浓厚的左翼民族主义气质，在塔沃拉看来，这和瓦加斯及其门生集团的风格过于相似，让他心头泛起一股本能的不适。\n\n尽管如此，不得不承认，人民的激进党在重建阿根廷民主制度上的投入，远比历届总统加起来都来得真诚。这一点，令他们的政治轨迹比许多“温和派”更可预测。即便是激进派，自由主义者终究还是有迹可循的，而这一点，对于提前筹划南美地区的外交格局而言至关重要。塔沃拉一直是个以谨慎著称的人。这也意味着，只要能在马丁诺维奇及其政纲中找到若干交集，哪怕只是象征性的，巴西利亚与布宜诺斯艾利斯之间维持一种体面的“礼貌关系”，也并非没有可能。"
 BRA_latam_reactions.32.a: "凉风能冷却沸水，在“新秩序”的阴影下，南锥体大概也只能指望这么多了。"
 BRA_latam_reactions.33.t: "和解之窗"
 BRA_latam_reactions.33.desc: "那天，科科瓦多餐厅并不算热闹，只有远处狗仔队的快门声隐隐作响，而塔沃拉正悠闲地享用着他的午餐。远方，基督救世主雕像那高大的身影矗立在山巅，夏日灿烂的阳光穿破云层，洒在这座伟岸的石像上，也照耀着脚下的里约热内卢，仿佛世世代代都是如此。\n\n塔沃拉动笔写信给阿根廷新当选的总统时，不禁渴望从神明那里获得点灵感，好让他用最得体的言辞表达祝贺——毕竟，第一印象至关重要。他甚至希望能出席霍夫雷几个月后的就职典礼，想着这将是巴西总统亲自到场表支持的良机。\n\n说到底，这场选举的胜利，恐怕对巴西的意义还比对阿根廷保守派本身来得更大。现在好了，巴西利亚和布宜诺斯艾利斯不仅政党立场一致，连总统之间，也难得出现了点“对等感”：都是务实派、保守派、民族主义者，塔沃拉和霍夫雷这两位，某种程度上可以说是一路人。\n\n南锥体地区的历史，一直由南北之间的敌意所定义。可现在，在“共同繁荣”和“民族主权”这两面看起来高大上的旗帜下，两国总算摸到了那个传说中无数次被提起、却始终遥不可及的词——和解。经历了几代人走投无路的苦日子，真正的缓和终于近在眼前。\n\n塔沃拉一边端起咖啡微笑着，一边为信末签上了自己的名字，随后重新开始享用他的午餐。"
 BRA_latam_reactions.33.a: "久违了，这份修补裂痕的机会。"
 BRA_latam_reactions.34.t: "又一个红色的幽灵"
 BRA_latam_reactions.34.desc: "塔沃拉在电视机前踱来踱去，脸上挂着抑制不住的厌恶之色，阿尔蒂普拉诺高原的空气因不安而愈发凝重。他一遍又一遍地回看吉列尔莫·埃斯特韦斯·博埃罗在布宜诺斯艾利斯的竞选集会录像，半是难以置信，半是焦虑愈涨——经历了数十年的反社会主义镇压，那位老古董阿尔弗雷多·帕拉西奥斯所留下的政治遗产，竟然能在不费一枪一弹的情况下再次蛊惑阿根廷选民。\n\n南锥体最核心的国家，竟在古巴革命者切·格瓦拉在乌拉圭掀起波澜之后不久，就成了社会主义鼓动的温床，这一事实本身就足够令人胆寒。而更令人忧虑的是，这支“社会党”不仅融入了独特的左翼民族主义思想，其对外政策中的反美色彩亦极为鲜明。即使不是资深的政治分析师，也不难看出，阿根廷与邻国之间本就动荡不安的关系，将因这一局势而变得更加紧张。\n\n所幸塔沃拉还有些先见之明，懂得从全局出发把握巴西的国家优先事项；若换成那些资历尚浅、思维僵化的领导人，只怕此时早已乱了阵脚。他脑海中甚至已经浮现出卡洛斯·拉塞尔达此刻在某处暴跳如雷的模样。然而，塔沃拉对自己继任者如何应对博埃罗却难以判断——这个南方横空出世的“新社会主义”政权实在难以捉摸。他所能做的，只能是寄望于党内之人能承担起未来的重任，撑过山雨欲来的局势。"
 BRA_latam_reactions.34.a: "塔沃拉仍在电视机前不停踱步。"
 BRA_latam_reactions.35.t: "正义主义的回潮"
 BRA_latam_reactions.35.desc: "他已经不知打了多少通电话，仿佛整个白天都耗在这上面，然而窗外不过才是下午。塔沃拉额头渗出密汗，桌面上的文件早已被翻得凌乱不堪。他不停地拨打一个又一个同僚的电话，只为就布宜诺斯艾利斯突如其来的局势剧变，在对外政策上拼凑出一个可行的共识。\n\n哪怕是最老练的政治人物，人生中总有必须划清界限的时刻。塔沃拉并不天真，阿德马尔也不会。进步党人，名字听起来怀抱理想，实际上却连门外汉都能看出他们的犬儒本质。他们清楚自己是什么人，也毫不掩饰地阐述自己的诉求，为了政治，他们随时都可调整自己的立场——可就算是德·巴罗斯的门徒，也会承认，某些界限，是不能轻易跨越的。\n\n即便如此，他们也很难找到比胡安·庇隆更具象征性的反面例子——南美政治一切弊病的缩影，尤其是在它最令人作呕的形态下。塔沃拉读到西普里亚诺·雷耶斯成为阿根廷新一代庇隆主义代言人的消息时，差点就将报纸撕成了两半。才过了几十年，巴西又要和这些大男子主义的猿人打交道？\n\n这一切又意味着什么？几代阿根廷政治家拼命摆脱庇隆主义的阴影，结果最后却把权力重新交回到那帮人的手中，仿佛庇隆从未离去？民粹疯了，民族主义自相吞噬，对外政策（若还能算得上政策）更是让整个南锥体濒临战争的边缘。塔沃拉怒不可遏地心中咒骂：去他妈的！"
 BRA_latam_reactions.35.a: "熟悉的好战者重归南美。"
 BRA_Artur_da_Silva_Bernardes_Filho: "小阿图尔·达·席尔瓦·贝纳德斯"
 BRA_megaproject_gnb_milestone_5: "Approaching Completion"
 BRA_megaproject_gnb_milestone_6: "Reconstruction Completed"
 BRA_party_psp_desc_adhemar_alive: "中左翼的社进党是巴西政坛的主要政党之一。社进党团结在党首阿德马尔·德·巴罗斯的民众主义平台下，其意识形态含糊不清。该党抛出的民众主义论调得到圣保罗穷人支持，但力量却源自社会精英，且因圣保罗作为巴西人口最多的州，其基本盘数量不可小觑。除巴罗斯外，该党最重要的成员是前总统之子小热图利奥·瓦加斯。"
 BRA_party_psp_desc_adhemar_dead: "社进党曾一度是巴西政治的强大势力，乃至有人认为该党可能终结该国的民主制度，现在已分崩离析。全党表面上还装作无事发生，背后却不容乐观。在小瓦加斯掌舵下，曾经那些能团结并争取选票的魅力和吸引力早已散尽，只存在于党内资深活动家的记忆中。阿德马尔死后，社进党一同式微，退回到巴西政治的背景板。"
 BRA_airports_in_recife: "累西腓的机场"
 BRA_airports_in_recife_desc: "我们发展巴西西北部州计划的一环便是改善它的基建。我们已经为此修了不少又新又好的公路，而我们还可以通过修建新机场并扩建老机场的方式来进一步发展我国经济。此举将刺激该地区国际与区域航空旅行的发展，并允许航空贸易与游客得以从西北进入巴西。为此，总统库比契克将下令在累西腓周围修建机场，此举定会成为我们推进巴西共和国走向繁荣时代事业的助力。"
 brazil.615.t: "日光之城的采购"
 brazil.615.desc: "一名身着黑衣的男子走下从巴西飞来的航班，悄然登上一辆前往开普敦的汽车。目的地是一座政府大楼，执行的则是一项高度机密的任务。这趟行程没有任何外交仪式，也无须出示身份，连名字都未曾提起——因为这不是一场正式访问，而是一桩静默推进的秘密行动。车辆抵达后，他见到了接头人。\n\n“这边请。”两人穿过走廊，步入大楼深处。望着沿路工作人员清一色的肤色，巴西人轻轻嗤笑了一声。对他来说，这样的景象与自己所熟悉的社会格格不入。他心想，南非终究得挣脱种族的枷锁，不然，这国家注定没有未来。\n\n他们最终走进一间毫无特色的会议室，门关上的那一刻，屋内顿时寂静无声。“所以，您是来谈纳米比亚的事？”“我们了解到，贵国——或说这片‘领土’……”他故意顿了顿，字斟句酌，生怕一个措辞不当便让整桩交易功亏一篑，“……蕴藏着丰富的铀矿资源。若能达成协议，巴西政府希望对其中一部分储量进行采购——当然，以更灵活的渠道为佳，最好是私人形式。”\n\n“明白了。”南非代表沉思片刻，那片刻如同拉长的永恒。终于，他开口道：“我们现在非常需要外部投资。这场战争让我们经济陷入困境，形势日益严峻。如果贵方愿意提供援助，我不认为我们不能以相当优惠的价格出让一部分铀矿。”\n\n哈，中了头彩！“我想，巴西政府会对这个条件非常满意。不如我们先休息一会儿，待会儿再商议具体细节？”对方点头同意，会议暂告一段落。走出会议室时，他在心里默念了一句："
 brazil.615.a: "南非人也并非全然不可理喻。"
 brazil.616.t: "张口吧，大地"
 brazil.616.desc: "镐头一下接一下地砸在岩壁上，节奏与卡约头痛的脉搏几乎一致。他满脸是汗，汗水沿着眼角流下，他却依旧机械地重复着同样的动作。他的工作地点在天涯海角，做些什么只有天晓得，替谁干活更没人知道。但……薪水还算不错，足够养活一家人。他也得承认，工友们的嘴还是挺会说的。\n\n“我哥跟我说，我们其实是在挖金子。政府知道经济快崩了，想靠这个保值。”\n\n“你怎么知道是政府？就他们那样，还能付得起我们工资？我可是从橡胶厂大门口被他们直接拉来的，工资还翻了五倍——我可从来没见过哪个政府干得出这种事！”\n\n“是啊，那到底是为了什么？我发誓这年头都有机器人干这些活了。嘿，说不定我们现在挖的，就是给机器人用的料呢。”\n\n“我倒是希望他们赶紧派个机器人来代替你。”\n\n“拜托，我魅力四射好不好，哪来的机器人能替代这种风骚……”\n\n10米。这是埃利奥与矿口之间始终保持的距离。政府雇他是来监督的，不是让他亲自钻进铀矿里，那是那些可怜人的事儿。他无所谓，毕竟他们拿了钱，也算是为国效力了。为了秩序，为了进步，为了巴西。可哪怕如此，每当夜深人静，他仰望天花板时，脑子里想的依旧是那些矿工，还有他们注定将被吞噬的生命。"
 brazil.616.a: "他们都有光明的未来——头痛、肾衰竭，也许还有核战争。"
 brazil.617.t: "东西对抗"
 brazil.617.desc: "在官方说法中，国家重大商业事务需严格依照程序，层层审核，最终由会议拍板定夺。而在非正式场合，无数关乎国运的决定，却往往在茶水间的一隅悄然落定——正如巴西两位资深金融大佬围绕铀矿展开的这场闲谈所揭示的那样。\n\n“拉斐尔，我实在搞不明白我们为什么还要讨论这个问题。备忘录都摆在那里，大家都知道我们急需铀矿，也清楚去哪儿弄。”说这话的人语气中透着退休前的倦意，那种机关老油条惯有的、懒洋洋的敷衍劲。\n\n“要是按你那套思路来，保罗，我们现在恐怕还在投钱养快马，而不是造汽车。”拉斐尔冷冷回敬。他并不否认国内矿产确实满足不了当下需求，但他也看不出加拿大能有多大作为。保罗望着拉斐尔那副削铅笔似的脸，不由得心中生出几分失望——这人书是读了不少，就是话说得太少，跟人太疏离。\n\n“所以你打算跟中国做生意？别的不说，就它现在那个样子——一个法西斯超级强国的傀儡政权——你凭什么指望一个软弱无能的国家，能满足我们的战略供应线？”\n\n“和你不一样，我知道世界已经变了。”拉斐尔不客气地回道，“中国经济正在上升，加拿大早过了它的巅峰。我们该做的，是搭上正在加速的列车。说白了，我们完全可以押注一个未来能胜过加拿大的选择——而那，就是中国。”\n\n保罗虽然嘴上依旧强硬，心里却被拉斐尔这番带着煽动意味的陈述稍稍动摇了几分。但不管怎样，他知道得把这家伙拉回来，特别是这人刚才还在拐着弯儿说他老……"
 brazil.617.a: "“真想踹你一脚，别再废话了，我们就选加拿大。”"
 brazil.618.t: "黎明未明"
 brazil.618.desc: "在丛林深处，他们正为投下一颗核弹做准备。\n\n没有人真正知道，帕拉南部那些男男女女究竟为何而劳作。即便有人知晓自己正参与扩建“维略索准将试验场”，也几乎没人意识到，这片工地之所以扩建，是为了成为一颗核弹的落点。\n\n大多数工人几乎不识字，更遑论理解他们所做之事将带来的后果。也许这样反而更好。他们每天工作十二个小时，砍伐林木，倾倒水泥，直到身体再也撑不住为止。\n\n有时候，这种“撑不住”就是永远。有个工人曾在不该走神的时候打了个盹，头朝下跌进了水泥搅拌机，等到一切归于漆黑，他连发生了什么都没来得及明白。若能找到家属，便寄去一封信，寥寥数语，附上一张薪资单，末尾加上一句忠告——最好别多问。\n\n在他们之上，还有人正兴奋地盯着工程进度，脑中勾勒着未来的图景。那图景里有炸弹，有机器，却从未有人——不需要人，不需要政治，只要机器，就能赢得战争。\n\n日落之后，所有人各自归家。回到妻子、丈夫、情人和孩子身边。他们想着未来，想着一段悠长慵懒的退休生活，想着孙辈探访时的笑声与白发的自己。然后，他们沉沉睡去，在梦中回到那个由他们一砖一瓦堆砌出的未来。"
 brazil.618.a: "然后，他们就再也无法入睡了。"
 brazil.619.t: "世界末日之序章"
 brazil.619.desc: "直升机降落在沥青跑道上。[BRA.GetLeader]总统踏上了维略索准将试验场的土地。欢迎队伍以笑容与崇敬迎接他们的领袖，军方人员照例捶胸顿足地展示力量，活像动物园里炫耀的猩猩。\n\n“欢迎您莅临访问。”众人开始了总统视察标配的边走边谈，“我们正在创造载入史册的伟业。”[BRA.GetLeader]环顾四周，军工生产的喧嚣景象与战争机器的轰鸣尽收眼底。“我向您保证，项目必将如期完成，把火种带给巴西人民。”\n\n总统露出招牌式的笑容——那本该更适合出现在《头条》杂志封面上，但科学家却露出探究的神色。“请私下告诉我，国际上怎么评价我们？我知道美国、澳大利亚这些地方的同行们整天鼓吹核威胁，可他们自己不也在拼命发展核计划？”\n\n“他们怕我们吗？我们是否已经引起超级大国的注意？”\n\n总统的笑容微微凝固，沉吟片刻[BRA.GetLeader.GetHerHim]才回应：“正如你所说，那不过是空谈。美国不会为此与我们敌对，但总要在世界舞台上逞威风。等项目公布时，各方照例要虚张声势一番。”\n\n“然后……一切照旧。”\n\n但万一不是呢？这个未宣之于口的疑问在[BRA.GetLeader.GetHerHis]脑海中盘旋。万一是终焉的开始，是毁灭的前奏……"
 brazil.619.a: "……最终[BRA.GetLeader.GetSheHe]只能笑着点点头。"
 brazil.620.t: "世界末日"
 brazil.620.desc: "一份崭新的报告整齐地摆放在[BRA.GetLeader]总统的办公桌上。\n\n《关于巴西核武研发与未来能力的简报》\n\n[BRA.GetLeader.GetSheHeCap]翻开报告，继续往下阅读。\n\n“我们已研发出一枚四兆吨当量核装置，足以比肩当今的超级大国……”\n\n总统快速浏览着内容，科学术语对他而言如雾如烟。\n\n“……帕拉州的最终测试准备工作已进入收尾阶段。”\n\n目前，这一切只有巴西自己知晓。\n\n“……若此装置在布宜诺斯艾利斯引爆，预计伤亡将达到两百万人……”\n\n这些数字让[BRA.GetLeader.GetHerHim]心潮澎湃，一扫过往焦虑，换来对“历史地位”的憧憬。\n\n“……放射性尘埃将导致至少15%的幸存者死亡，由此引发的脱水与饥荒亦将带来同等影响……”\n\n反正这武器又不会真的使用——它只是个威慑工具。\n\n“……乌拉圭将不可避免地遭受辐射污染。这是必要的牺牲……”\n\n上帝与我们同在，巴西必将胜利。\n\n“……若命中目标，该地区将在一百年内不再适宜人类居住……”"
 brazil.620.a: "普罗米修斯给地球带来了火种……而[BRA.GetLeader]给巴西带来了火种。"
