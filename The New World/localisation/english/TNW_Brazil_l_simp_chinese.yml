 BRA_kubitscheks_return: "库比契克回归"
 BRA_kubitscheks_return_desc: "在百日危机的混乱与灾难之后，前总统儒塞利诺·库比契克再度临危受命，担任巴西共和国总统。尽管他一直都有在1965年再次竞选总统的野心，但荒唐透顶的夸德罗斯大闹一场，反而让他的回归变得顺理成章。这位新总统对自己的能力有着充足的信心，当他踏入高原宫的时候，他相信：自己一定能再次拯救巴西，就像上次那样。"
 BRA_work_against_kubitschek: "反对库比契克"
 BRA_work_against_kubitschek_desc: "军中同僚和强硬派将领，如西尔维奥·弗罗塔，建议直接反对库比契克和他的竞选活动。这几乎就意味着拉塞尔达将登上总统宝座。"
