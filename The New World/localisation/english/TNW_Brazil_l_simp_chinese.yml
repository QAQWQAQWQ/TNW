 BRA_megaproject_mch_desc: "§K马卡帕-卡宴公路§!是儒塞利诺·库比契克在争夺卡宴时实施的一项战略。这条公路将是该地区第一条与巴西相连的陆路，一旦竣工，圭亚那经济就将与巴西经济紧密相连，难以分割。"
