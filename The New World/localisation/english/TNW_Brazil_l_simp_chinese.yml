 brazil.1300.t: "瓦加斯的幽影"
 brazil.1300.desc: "“全是放狗屁！”阿德马尔·德·巴罗斯怒骂着，一把推开办公室的门，后面紧跟着神情不安的劳多·纳特尔。“我竟然输掉了总统宝座——而且是输给了布里佐拉？！”他冷哼一声，难以置信地看向纳特尔。“那个半吊子瓦加斯主义者竟然敢接过火炬？那个蠢货？他连瓦加斯主义的边都沾不上！”怒火中烧间，他抄起桌上的一支钢笔，猛地扔在地毯上，“他就是个该死的共产主义怪胎！”\n\n纳特尔不耐地叹了口气：“看起来我们……低估了布里佐拉对工人阶级的吸引力。现在正是——”\n\n“我们现在要做的，”阿德马尔毫不理会地打断道，“是想办法彻底摧毁这个灾星！把我们还没曝光的那些工党的黑料都给我挖出来！我要让他们统统滚进历史的垃圾堆！布里佐拉、洛特，那帮人一个不留！他要是毁了我的政治遗产——”\n\n“阿德马尔！”纳特尔的喊声如同雷霆，打断了总统的怒吼，两人怒目相视，积压已久的怒火几乎要冲破天花板。然后，纳特尔又叹了口气。“我们什么都做不了了。把绶带交给他吧；对所有人来说，包括你自己，这都是最好的选择。”\n\n阿德马尔眼神闪烁，短暂的沉静在瞳中浮现。他转身走向办公桌，手掌在那张曾堆满文件、曾与无数宾客举杯畅饮的桌面上轻轻掠过。他咬紧下唇，默默点头。“一切都结束了。我们完了。”他再度看向纳特尔，目光深邃。“我，完了。”"
 brazil.1300.a: "终要面对的结局。"
 brazil.1301.t: "日出"
 brazil.1301.desc: "拨通电话时，埃德娜·洛特并不指望对方会让她久等。她的政府才刚刚起步，过渡期却仍旧艰难而紧张。她需要一切可能得到的帮助，一切可以争取的支持。在她的心目中，几乎没有人能像即将成为副总统的乌利塞斯·吉马良斯这样重要。电话铃响了一声、两声，随即被熟悉的声音所打断。\n\n“你好，是埃德娜吗？”电话那头的声音证实了她的期待。\n\n“是我，乌利塞斯。”她微笑着答道，“虽然我们几小时前才谈过，但我还是想亲自祝贺你赢得选举。担任过副总统的人不多，但没人比你更配得上这个职位。”\n\n“谢谢你，但我也不能忘记向你道贺，”他简短地回应，“能达到如此高位的人并不多，尤其是像你这样的一位女性。”\n\n这句恭维听着多少有些刺耳，但也只是稍稍不适而已。她早已习惯了来自政治盟友的种种讽刺。“当然了。从现在起，事情会进展得非常迅速，但我们不能因此而忘记初心。”\n\n“我也没想过会是别的情况，埃德娜。”他沉默了一会儿，但她耐心地等待着。她很清楚这个时刻难以平静。“我们要努力在世界舞台上提升巴西，但更不能忘记我们自己的人民。”\n\n“乌利塞斯，你这番话说得非常睿智，我倒也不感意外。我明白，这正是我必须走的道路，才能让巴西感到自豪。我要创造一个我丈夫和女儿都会引以为傲的社会。”"
 brazil.1301.a: "晨曦终将来临。"
 brazil.1302.t: "破晓时分"
 brazil.1302.desc: "从山下看去，加维亚神父岩的景致并不算惊人：铺满柏油路和混凝土的坡道，四周是低矮的建筑群。但在一个开阔的小广场上，两位中年妇女正站在盛开的灌木旁短暂歇息。眼前是熙熙攘攘的游客，她们则暂时脱离喧闹，悠闲地闲聊着。\n\n“听说了吗？埃德娜·洛特赢得选举了。”其中一人，瓦尔基里亚·洛佩斯·费雷拉象征性地问道。两人都投了票，也都十分关注政治，这点无需多言。\n\n“当然知道啊！收音机里连一分钟都离不开她获胜的新闻。”埃利亚娜·米兰达·阿尔维斯答道，她是二人中年长且个子较高的那位。“我投了她一票，到现在也不后悔。她的胜利值得所有巴西人庆祝，更值得我们所有女性热烈欢迎。”\n\n瓦尔基里亚轻轻地摇了摇头，但力度并不明显。“你知道我不完全赞同她的一些政策，但我也承认，她的胜利对我们女性而言是了不起的一天。”对于她在工会里的一些盟友，她的内心曾有过短暂的不安，但此时此刻，这一历史性时刻所带来的意义压倒了一切。“如果女性都能当上总统，那还有什么职位是我们无法担任的？”\n\n阿尔维斯点了点头，目光短暂地落在了前面发生的一阵小骚动上，暗自希望自己的儿子没有牵涉其中。“谁知道呢？五年后，也许等她的政策都实施起来，她的表现会好到让你愿意投票支持她。”\n\n瓦尔基里亚本想表达反对，却又开不了口。从瓦加斯时代开始，她的投票总是偏向右派，库比契克、洛特、拉塞尔达……但时代毕竟变了。阿德马尔继承的那个世界显然已然破碎，而这未必不是好事。"
 brazil.1302.a: "如果女性都能当总统，或许巴西工党又赢下了一票。"
 brazil.1303.t: "赢家……"
 brazil.1303.desc: "阿德马尔早已习惯了这样的会面，习惯了与埃德娜讨论未来的计划，但却从未想过是在这样的背景下。此前的讨论总是围绕着她在未来某次选举中可能获得的胜利，可没想到，胜利竟然来得这么快？尽管如此，他仍然乐于见到她的上位。很少有人能承受她所经历过的一半压力，更遑论挺过接下来的风暴。阿德马尔已然年迈，这一点他比任何人都清楚。\n\n“我相信不止我一人想对你表示祝贺，埃德娜。”他顿了一秒，回想起自己过去五年的总统生涯，以及她过去几个月代理总统时所经历的一切。“我相信，我不必再提醒你，这个职位对人的要求有多么严苛。”\n\n她礼貌地笑了笑：“谢谢您，总统先生。我坚信自己不会辜负您的期待。”\n\n阿德马尔轻轻咳嗽了一声，衰老带来的本能反应中夹杂着一丝对往事的追忆。“实际上，我得真心感谢你。我昏迷时，你接手治理国家，承受了巨大的压力，尤其是针对你的弹劾行动曾一度声势浩大。”\n\n她略微侧身，但随即又耸了耸肩，似乎把这些过去的忧虑抛诸脑后：“这并不比我即将上任后所面临的挑战更严峻。尽管我真心希望当时的环境能稍微缓和些，但这段经历毕竟让我更好地积累了迎难而上的经验。”她稍稍向右侧挪动，目光望向门口，“如果我需要任何建议，我一定会打电话给您。像您这样经验丰富、才干卓越的人实在太少了。”\n\n当她离开后，他的视线重新落回桌上。总统职权的直接交接计划基本就绪，但他尚未正式确认下来，具体工作人员也还未到位。他翻开一本笔记本，开始草拟起自己的日程安排，其中密密麻麻地记载着用于确保过渡期顺利完成的各项贿赂费用、截止期限以及即将到来的各项日期。"
 brazil.1303.a: "……通吃"
 brazil.1304.t: "大厨掌勺"
 brazil.1304.desc: "国会大厅难得地安静了下来。除了几位清洁工和偶尔路过的工作人员，偌大的空间空无一人。坦克雷多·内维斯因此得以悠然踱步，无需担心被人打扰。他的脚步声在回廊间回响，不久便与一阵急促的步伐交汇。那是劳多·纳特尔。内维斯回头向他点头致意，顺口问起一位远房亲戚的近况。两人寒暄了几句，随即切入正题。\n\n“我既然来了，就想当面祝贺你。”纳特尔伸出手，“能登上这样的位置，的确不易。”\n\n内维斯带着一贯的从容微笑道：“谢谢你，劳多。据我了解，权力交接小组已经基本完成了为我政府交班的准备？”他的话在空气中悬了一瞬，见纳特尔点头，他才继续道：“未来的路不会轻松，但我自信经验足以应对。”\n\n“阿德马尔怎么打算我不清楚，但我个人打算去蒙得维的亚歇几天。”纳特尔语气随意，“当然，要是你需要帮忙，我相信他一定愿意出力。”\n\n内维斯笑意不减，轻轻摇头谢过：“多谢你的好意，劳多。有你这样的朋友，是我一直以来的幸运。”他说着，又向前走了几步，示意纳特尔同行。\n\n“国会中我们仍有不少盟友，虽说有些人多少有些懒散。但只要你推动法案遇到阻力，我们的大门始终为你敞开。”\n\n坦克雷多停下脚步，转过身来，神色庄重地点了点头：“瓦加斯虽然已离世，但他的理想仍在延续。阿德马尔为国家倾注良多，五年的繁荣得以维系。我亦深感荣幸，能将自己也奉献于这一梦想之中。”"
 brazil.1304.a: "第三位家长正式加冕。"
 brazil.1305.t: "终幕"
 brazil.1305.desc: "阿德马尔站在办公室中央，双手负背，默默打量着这间陪伴了他整整五年的宽敞房间。他早已习惯了这里——的确如此。也正因为如此，当这片熟悉的空间即将从他手中交出时，那股被岁月打磨出的亲密感，竟在此刻悄然转化为一种带着告别意味的敬意。人性，大抵如此。\n\n他是否让瓦加斯感到骄傲？他愿意相信自己做到了。但历史终究善变。今日，人们也许将他视作瓦加斯理念的守护者；可二十年后呢？人们亦有可能将他视为叛徒。可在内心深处，阿德马尔清楚：自己所做的一切皆是为了那个男人——以及那个男人所代表的信念。\n\n他缓缓走向办公桌后的那张椅子——那把四年来几乎与他融为一体的皮革座椅。双手轻轻搭在椅背上，指尖陷入柔软的质地。他长长地叹了口气，随即猛地一拍椅背，仿佛在对老友说一句：“再会。”\n\n坦克雷多会让瓦加斯感到骄傲吗？阿德马尔心里明白一个最朴素的道理：必须有人接手——不论是谁，总得有人继续。那些在权力边缘徘徊的人群中，坦克雷多至少是其中较为妥当的一位。从某个角度看，他甚至让阿德马尔想起了自己。他们都坚信着那个名为“瓦加斯之梦”的未来。接下来，就看他能否接过这支火炬了。"
 brazil.1305.a: "走向舞台左侧退场。"
 brazil.1306.t: "有祖父必有其孙"
 brazil.1306.desc: "巴西利亚街头的这一天温暖如春，坦克雷多·内维斯难得可以稍稍自在地漫步。他头上随意戴着顶帽子，似乎是对一切评论都避而不谈的无声标志。今天不是谈政治的日子，更不是塑造形象的时候；他只是想与孙子共度时光，想把这一刻的分量深深地印进孩子的心中。\n\n“恐怕以后就没法再这么陪你散步了，阿埃西奥，”坦克雷多面露忧色，语气中透着不舍。“当总统之后，空闲时间可就不多了。”\n\n阿埃西奥稍稍落在他身后，但依旧努力地紧跟着。“那就是说，你以后就不拉票了？”他微微皱眉问道。坦克雷多知道，这孩子在选战期间被带着跑遍了巴西数十遍，早就开始厌倦这份奔波了。\n\n“不为职位拉票了，但我会为了法案奔走。”他抹了抹额头的汗水。天气实在炎热，他望向远处，想着阴凉处还有多远。“我会努力让巴西变得更加富裕，也会努力不辜负人民交给我的这份使命。”\n\n“我知道你一定能做到，爷爷。”坦克雷多从他身上看见了太多年轻时的自己，虽说暂时还看不出那股政治的火苗。但他仍相信，自己还有足够的时日，亲眼见证那火花的燃烧。“希望全国民主联盟不会搞出太多花招吧。”\n\n坦克雷多咧嘴一笑，自顾自地低声笑了起来：“不，孙儿，他们要搞事，恐怕得多费点心思了。”终于，他在前方望见了一小片树荫，祖孙俩快步走了过去。“可等到一切尘埃落定，等你也长大成人时，我希望你也能在这条街上散步，对你的孙子说：‘我要当总统了。’”"
 brazil.1306.a: "这在树荫下立下的誓言，或许他们一生都无法亲眼见到那片种子开花结果。"
 brazil.1307.t: "使命达成"
 brazil.1307.desc: "“啊，要是你父亲能看到这一刻就好了！”阿德马尔咯咯笑着，为小瓦加斯斟满了一杯白兰地，后者也接过酒瓶回敬了一杯。两人坐在瓦加斯在巴西利亚的新办公室里——那是阿德马尔亲手为他安排的，为即将到来的权力交接做准备。\n\n一路走来，历经艰险，饱尝辛劳与波折，正因如此，胜利的滋味才显得格外醇厚——或许，也只是杯中的白兰地在作祟。两人都不在意，毕竟，曾经最狂野的梦想，如今已然照进现实：社会进步党再续巴西五年的公平与正义之治。\n\n瓦加斯轻轻晃着手中的酒杯，低声叹息。阿德马尔隔着桌子伸出手，轻轻拍了拍他的肩，脸上满是由衷的笑意：“你父亲若在，一定希望看到这一刻。他肯定希望是你来引领我们。”他停顿片刻，像是在斟酌那句即将出口的话语。头顶的吊扇吱呀作响，在这短暂的沉默中，声音格外清晰“……他一定会为你感到骄傲的。”\n\n瓦加斯笑容满面，眼角却隐隐闪着一抹不易察觉的泪光。“谢谢。”他轻声道。阿德马尔举杯致意，瓦加斯也缓缓举杯回应。那一刻，他回想起曾经无数次自我怀疑的时刻——怀疑自己是否有资格承接父亲留下的伟业，是否真有力量背负那沉甸甸的期许。如今，他的内心充满了从未有过的希望。那是对自己的信心，对未来成就的渴望；是对政党的希望，对他们方才开启的胜利征程的坚定信念。\n\n更是对整个巴西的希望。因为他坚信，总有一天，他会让所有人因他而自豪。"
 brazil.1307.a: "献给您，父亲。"
 brazil.1308.t: "胜利结算"
 brazil.1308.desc: "普利尼奥·萨尔加多向人群轻轻挥手，脸上绽放出灿烂的笑容，迎接他的是如潮的掌声。他刚在室外向成群的记者和摄像机发表了胜选演讲。即便演讲结束后，他仍对这一刻有种抽离感，仿佛尚未真正意识到胜利的到来。“谢谢，谢谢。”他颔首致意。\n\n当他走进总部时，工作人员似乎已将这里装饰一新。绿色的彩带悬垂在办公桌上空，气球贴满了墙壁。办公室中央的会议桌上摆着一个巨大的蛋糕，被做成了巴西地图的形状，上面用糖霜画了一口钟。他等待喧闹声平息，然后开口讲话。\n\n“我明白，副总统的人选或许不尽如人意。”房间里响起一阵低沉的抱怨。“但尽管让吉马良斯和社民党抱怨去吧。即便遭遇这样的挫折，我们仍将砥砺前行，让巴西重现荣光。”总部里的所有人再次鼓掌。萨尔加多看着他们开始切蛋糕、倒酒水。如果不是太过疲惫，他或许会加入其中。他向几位党内成员道别，随后走向自己的汽车。此刻，他唯一需要的就是休息。\n\n他的工作，才刚刚开始。"
 brazil.1308.a: "晚安，总统先生。"
 brazil.1309.t: "酒后吐真言"
 brazil.1309.desc: "酒精真是结交朋友的绝佳媒介。有时是因为你醉得东倒西歪，忍不住和右边仅对视过一秒的家伙放声大笑；有时是你正在揍人或是挨揍；而对酒馆里最愁苦的那些人来说，他们会为凑不齐买杯廉价啤酒的十生丁抱头痛哭——尤其当最后一枚硬币刚滚进地缝的时候。反正第二天谁都不会记得，大概就像这个故事里的两位绅士一样。\n\n在巴西某个鬼知道叫什么的地方，有家小酒馆里坐着两位正在进行“对话”的绅士——确切地说，其中一位正就政治议题煽动另一位。“你知、知道这国家缺啥吗？就缺一个男人！一个！天选之子！就那种——嗝——有远见的，懂我意思不？”这位政治思想家嚷嚷着，看向他的酒友，而对方似乎根本没在听。“这就系——嗝——沃们需要的！这国家需要的！就缺个带咱们重回巅峰的爷们，懂？”\n\n“这国家正被人领着往阴沟里去。”搭话的人盯着酒瓶底最后那滴啤酒，盘算着这口下去会不会直接断片，还是就此打住比较明智。他那热血沸腾的同伴突然噤声，直勾勾望着天花板陷入沉思。"
 brazil.1309.a: "“是啊，八——嗝——成吧。”"
 brazil.1310.t: "这不可能"
 brazil.1310.desc: "“这不可能，绝不可能！他怎么可能赢了！”阿德马尔独自站在办公室内，对着桌上那台无知无觉的收音机怒吼着。据说，萨尔加多在总统大选中拔得头筹。萨尔加多，还有他那帮人，居然就这样要掌控这个国家？仿佛他阿德马尔沉睡未醒之间，整个国家便疯了一般。\n\n难道这一切，是他自己的错？解除对德国的禁运、和莉安娜的丑闻——都是因为这些？萨尔加多在他任期初还只是个无足轻重的小人物，可如今，巴西却要张开双臂，迎接一个法西斯登上总统之位！\n\n阿德马尔仰头望向天花板，声嘶力竭地低语：“主啊，我都做了些什么？”这就是阿德马尔的政治遗产——他将被历史铭记为那个亲手引领巴西民主走向灭亡的人。\n\n他猛地关掉了那该死的收音机。事情还能挽回。他还能有所作为，为这个国家争得一线生机。他要拨通参议院的电话、联络军方、找上司法系统——任何能阻止萨尔加多上位的力量。他要让人们忘掉这场选举，因为如果放任那人掌权，巴西恐怕再也不会有下一场选举。\n\n就是这样，这才是拯救巴西的计划！"
 brazil.1310.a: "阿德马尔错了。一切已无法挽回。"
 brazil_oc_aleixo.4.t: "阿莱绍的瘦身计划"
 brazil_oc_aleixo.4.desc: "拂晓时分，一名店员正整理货架商品，身后收音机聒噪地播报着新闻。记者用平板无波的语调提及即将出台的新物价管控计划，拟对若干关键民生领域实施最高限价。她手中动作骤然停滞，转身欲往储藏室走去，却在听闻具体限价标准时再度怔住。货架上她特意多留了几瓶饮用水，但这不过是出于日常补货的本能反应。\n\n数小时后，两名产业工人盯着报纸发出痛苦的呻吟。物价管制政策确已公布且势在必行，但称之为“管控”实在过于美化。那些小额贷款更令人绝望，不过是施舍给小资产阶级的蝇头微利。其中一人指着评论版戏谑的标题对同伴说，这哪是限价令，分明是给“真正的无产阶级”——亿万富豪们量身定做的保护伞。另一人只是沉默地摇头。\n\n日影西斜，当店员穿行于货架之间时，她的店长正为那笔救济贷款愁眉不展。几千克鲁赛罗的款项要分好几个月才能发放到位。光是等第一笔钱到账就得耗上数周——联邦政府各部门裁员潮导致邮政系统近乎瘫痪。顾客的招呼声惊醒了她，于是将这念头抛诸脑后，本就不该期待未拆封的信件里会藏着什么改变。\n\n某户人家的收音机突然刺耳作响。两位右翼评论家正痛批这项物价管控计划将动摇巴西稳定根基。“这不仅是粗暴的市场干预，”其中一人咆哮道，“这些贷款只会让通胀怪兽更加猖獗。”电流杂音中，同样的绝望正从教室蔓延到董事会议室，从咖啡馆流窜至救济站再钻进餐厅后厨。这项不得人心的政策甫一问世，便已众叛亲离。"
 brazil_oc_aleixo.4.a: "千刀万剐。"
 brazil_oc_aleixo.5.t: "往日再现"
 brazil_oc_aleixo.5.desc: "她又来了。同样的处境，不同的时间，弗朗西丝卡再度陷入这种境况。总统宣布的经济政策组合拳，即使在她那些较为乐观的朋友们看来，也无疑是一剂温吞水。她虽不懂这些决策背后的经济学原理，但环顾四周，几乎没人对阿莱绍“重振经济”的新计划表示赞赏。“通胀将成为过去式，”他宣称，“工资很快会上涨，巴西将走向复苏。”\n\n这种话她听得太多了——这不是复苏，而是拙劣伪装的安抚。\n\n况且，她早已对政府改善民生的能力失去信心，更别提什么长远的经济规划了。通胀很快会卷土重来——尽管有人说它从未真正离开。她知道自己的工资永远追不上物价涨幅，只得一次次削减开支，勉强维持生计。她已经减少了大部分餐食，尽量少开车以节省汽油。可是，够吗？她想象着在大学念书的女儿们，日子恐怕更加艰难。\n\n弗朗西丝卡独自坐在餐桌旁，拿起手边的报纸翻看分类广告。或许得再打一份工才能填饱肚子——这个念头让她嘴里泛起苦涩。嗯，会计？附近有家电力公司正在招聘，就在工程学院大楼旁边。她不禁叹息，用手托着下巴，陷入沉思。艰难的日子啊，真是似曾相识。"
 brazil_oc_aleixo.5.a: "无休止的循环。"
 BRA_idea_the_war_on_corruption_desc: "腐败就像一位步履缓慢但阴险狠毒的杀手，如同水蛭一样寄生在我们的政府身上，无情地把效率化作自己的食粮。一旦染上这种顽疾，我们的巴西又怎能迈开步子，大步向前呢？\n\n唯一的药方就是把这瘟疫彻底根除。贪官将被开除公职，送进监狱，再在人们面前游街示众，以此来杀鸡儆猴。只有铁腕无情，才有可能取得进展，使秩序得以恢复。"
 BRR_brazilian_revolution: "巴西革命"
 BRR_brazilian_revolution_desc: "曾经不过是阿拉瓜亚河畔的一场小规模叛乱，如今却已演变为一场进入“人民战争”第三阶段的全面起义。随着军政府真面目的彻底暴露，革命军终于掌控了巴西中北部数个州的局势。\n\n在福塔莱萨，若昂·阿马佐纳斯与忠诚战友佩德罗·波马尔、毛里西奥·格拉博伊斯一道，成功建立起革命政府，并迅速赢得当地民众的广泛支持。然而，现实的残酷也随之显现。他们所据之地，正是全国最贫困、最欠发达的区域之一。如何为军队和百姓提供持续的物资供应，成了横亘在眼前的难题——一个只有付出巨大牺牲，才能勉强应对的问题。"
 brazil.1311.t: "不情不愿，倒向传统"
 brazil.1311.desc: "拉塞尔达站在帕拉西奥酒店的窗前，双手背在身后。可不知为何，嘴角忽然轻轻抽动了一下，随即垂下手臂，让它们自然垂落在身侧。\n\n坦克雷多赢了。就连一丝感到失望的情绪都感受不到。\n\n不。若要失望，首先得心存期待。而拉塞尔达早已对这个结局做好了准备。拉斐尔的竞选彻底溃败，人民再一次选择了那碗熟悉却乏味的燕麦粥，而不是哪怕一点改革的星火。\n\n坦克雷多赢了。他需要呼吸些空气。\n\n他悄然离开帕拉西奥宫，沿街而行，远处一片脚手架映入眼帘——那本是某家金融服务公司规划的办公大楼，尚未动工便已胎死腹中。新政府不会清除旧体制，只会将其延续得更加沉重。繁文缛节会日益堆积，岗位将一个个消失。商人们终将再次被迫退回那个熟悉的、压抑的大家长政府怀抱。\n\n为什么？为什么巴西人总是如此？是精英惧怕真正的自由？是选民对现状甘之如饴？抑或，这一切是历史深处某段罪孽带来的诅咒？至少——激进派已经被清洗干净了。事情原本还会更糟，远远更糟。\n\n他走到街角时，一个看起来不过十四岁的男孩迎面走来，手里夹着一沓《环球报》，嘴里喊着头条。可当目光与拉塞尔达对上时，他的声音戛然而止，嘴张着，喊声在唇边凝固。拉塞尔达从口袋里掏出一枚硬币，递过去，拿走一份报纸。\n\n头版标题赫然印着：《坦克雷多与工党：一场毫无目标的总统任期？》第一块石头，已经掷出。媒体的利爪仍在。"
 brazil.1311.a: "而他，卡洛斯·拉塞尔达还可以继续用笔战斗。"
 brazil.1312.t: "后继有人"
 brazil.1312.desc: "拉塞尔达出神地望着海浪轻抚圣保罗的沙滩，这般美景足以让人忘却自我。马加良斯胜选了——今日布里佐拉致电认输，最终确认了这一结果。可惜他没能亲耳听到这个消息。  \n\n若是从前，他定会加入拉斐尔的庆功宴，与竞选团队把酒言欢。但此刻，静坐写作似乎更为合适。他确实老了，巴西也是。这个国家已告别独裁的桎梏，赢得了拥抱民主的权利。\n\n“让你久等了，卡洛斯。那些幕僚总想多喝一杯。”肩上的触感让他不必回头——是拉斐尔。\n\n“无妨，我还没点餐呢。”拉斐尔落座时，目光被海滩暮色点亮，“我预订时提了你的名字。他们或许敢拒绝我，但没人能抗拒你。”即将上任的总统对着现任者轻笑，两人共赏落日熔金。\n\n酒过三巡，拉斐尔忽然打破欢谈：“我必须坦白……在劳工法案通过前，我曾……有过动摇……”他长叹，“……是我错了，抱歉醒悟得太迟。能延续你的政治遗产，我很高兴。成为拉塞尔达派，我很自豪。”\n\n“连耶稣的门徒也曾怀疑，何况我不是上帝，你更非我的傀儡。”拉塞尔达的语气罕见地温和，“虽然嫉妒，但人民选择的是你，不是我。我宁死也不愿当瓦加斯那样的独裁者。所以拉斐尔，做你自己的总统吧——我们为那些老顽固吵得够多了。”\n\n“为此告别，干杯。”玻璃杯相碰时，他们心有灵犀地齐声说出："
 brazil.1312.a: "“敬自由。”"
 brazil.1313.t: "你的“老”板回来了"
 brazil.1313.desc: "拉塞尔达静静看着面前的纸页，大脑一片空白。他眼皮一动不动——身体也是。倒不是他忘了该怎么阅读，到更像是触发了大脑的某种应对机制，把眼前的白底黑字扭曲成了电视里的黑白雪花，直到他的大脑在阵阵痛苦中重启——就像在寒冬腊月里给车点火那样：“让州长们做好高度警戒。”那混账竟然真的这么做了，瓦加斯的亡魂竟然真的通过某种不祥的巫术借尸还魂了：“要求他们重新计票。然后要求他们再干一遍。拖下去——能拖多久拖多久。”\n\n工作人员慌乱奔走；电话铃声此起彼伏；重新计票申请在墨迹未干时就已上交；各种命令把法院淹没。放血、拖延、搅浑局势，国家机器就此陷入瘫痪。与此同时，塔沃拉在屋中来回踱步，脸上表情活像是在出席有钱亲戚的葬礼：“我们正可以利用这点，对吧？”他提议道：“打场持久战。让他们——”\n\n“让他们干啥？”拉塞尔达吼道。他已经能隐约听见皮靴声了——那漆黑皮革敲在鹅卵石地面上的清脆声响。民主的痼疾就在于它总会滑坡到威权主义上来（反之则极为罕见）。人民现在亲手选出了自己的刽子手，这才是最令人痛彻心扉之事。难道巴西人当真这么畏惧自由吗？还是说，他们都是蠢货？\n\n塔沃拉一言不发。\n\n当日稍晚，几名幕僚找到拉塞尔达。他们被愚忠主导，纷纷劝他在被捕前赶紧跑路，不管是坐飞机、乘船还是骑马，只要能逃走就行。拉塞尔达摇了摇头：“倘若他们将我囚禁，那我就在狱中撰写宣言。我绝不会因为魔鬼当选就对其俯首称臣。”\n\n人群寂静片刻。接着，有人开始鼓掌。然后又有一人加入其中——一个接一个。最终，掌声雷动，震耳欲聋。精疲力竭的全民盟党员们重新想起了为何拼尽全力。"
 brazil.1313.a: "他们又一次挺身而出，抵抗暴政。"
 brazil.1314.t: "倔强的失败者"
 brazil.1314.desc: "工作人员如坠雾中，在走廊里仓皇奔走，纸张翻飞的沙沙声如风暴席卷。他们几乎是对着电话怒吼，逼问着应对之策——面对普利尼奥·萨尔加多当选总统，究竟该如何反应？是否存在某种正确的应对方式，能让前任者们获得救赎？如今数百万选票已然落定，他们唯一能做的，只有懊悔当初为何没能阻止这个名字出现在选票上。  \n\n而对即将卸任的拉塞尔达总统来说，他的身体仿佛已失去所有反应。他僵坐在那里，面色灰败，如同一尊石像。党内同僚大多已经逃散，等待着他们的将是荒谬的审判。但他还有职责必须履行——此刻这已成为他唯一的选择：他已将最后一张巴西利亚飞往华盛顿的机票让给了一名幕僚，那张本是他私人专机无法起飞时的备选机票。只因那名幕僚的岳父是犹太人。  \n\n在近48小时不眠不休的痛苦煎熬中，他翻遍法典寻找所有能在摇篮中扼杀法西斯主义的法律武器，然而他的权力正急速流失。他已授权所有能影响的报刊，指导民众如何应对可能出台的每一项压迫性政策。该见的人他都见了，现在他必须对最忠诚的门徒们说最后的话。  \n\n他猛然敲击最高会议室的木桌。窸窣声在两秒内归于沉寂。“我没力气演讲了，但只说一句，”他挥舞着手臂开场，“萨尔加多那群法西斯恶棍会毁了这个国家。眼下我们无法正面对抗，必须让他们自取灭亡。但请诸位牢记——从此刻起牢记五年——我们要让他们明白一个道理……”"
 brazil.1314.a: "“……巴西永远是一片自由的土地！”"
 brazil.1315.t: "可控形势"
 brazil.1315.desc: "尘埃落定。当备忘录出现在办公桌上时，维尔吉利奥·塔沃拉发出微不可闻的叹息，这纸公文正式宣告他在高原宫的时日所剩无几。即便竭尽全力，短暂的总统任期仍未能赢得民众继续托付的信任，此刻政治对手们正摩拳擦掌准备接手他的权柄。\n\n但这场选举却让他泛起异样的惆怅。没错，布拉加败选了（这本该是属于他的胜利），而埃德娜·洛特所代表的那些，该怎么说呢，思潮，令他如坐针毡。不过她和坦克雷多·内维斯终究是能共事之人。不仅因他们深谙巴西利亚政治机器的运作之道，更因朝夕相处建立的相知。将文件归档时，他想，有坦克雷多这样八面玲珑的调停者在，总是令人安心的。\n\n现在该转换角色了。他重读备忘录，“进步主义政治”这个胜者的口号在纸页上灼灼生辉。经济向国家主义的转向，即将推翻他们倾注心血的拉塞尔达自由市场改革；激进的社会秩序重构涉及妇女权益，以及文件中委婉表述的“世界主义倾向”。这些理念依旧危险，双方的分歧仍如天堑。\n\n事实上，他从未打算真正退出舞台。不过片刻，他已奋笔疾书拟就无数信函，与政府各部及国会要员的会晤安排迅速铺开。参议院的利益置换，众议院的暗线联络——凡能争取的阵地，寸土不让。"
 brazil.1315.a: "但女性担任总统的想法仍未深入人心。"
 brazil.1316.t: "一往无前"
 brazil.1316.desc: "整整一天，维尔吉利奥·塔沃拉都在为半夜打瞌睡错过布拉加的胜选时刻而暗自懊恼。不过这丝毫未减他的喜悦之情。正如他所期盼的那样，布拉加成功挺过难关，赢得了1970年大选。历经过去几年的动荡，全民盟的候选人仍能胜出，着实令人欣慰。一觉醒来，塔沃拉决定暂搁公务，只安排了几场会晤以巩固支持。\n\n他甚至无需提及布拉加，就能在全民盟同僚脸上看到同样的欢欣。他们对布拉加寄予厚望，也相信他必不负所托。而社民党和工党的要员们则垂头丧气地挤在小会议室里，不情不愿地挤出零星的祝贺，敷衍地祝愿未来几年能有所建树。面对每一声叹息，塔沃拉都从容应对，用承诺三党共赢的甜言蜜语，引导他们在过渡政府中扮演新角色。\n\n接下来是与几位年轻议员的会面，其中几位幸运儿首次参选便告捷。他们同样情绪低落，但少了些勉强。其中几位较圆滑的向他道贺，言辞间小心避开不满；另几位则直白地“祝贺”他操纵选举——当然只是玩笑，却暗含深意。当年他对拉塞尔达发起的政治突袭本就不够周密，连塔沃拉自己都承认最初几周有多混乱。\n\n走出会议室时，塔沃拉不禁感到一阵真切的困惑。困惑于时至今日，人们仍用拉塞尔达来定义布拉加；困惑于即便在此刻，他们仍要用他最落魄时的往事来玷污祝贺。继而愤怒于他们竟能如此不思进取。但一个老人的愤怒又有何用？属于布拉加新时代已然来临：一个将由继任者的理性与稳健定义的时代，一个为全民盟和巴西带来繁荣的时代。"
 brazil.1316.a: "一抹微笑令所有的愤怒与忧虑烟消云散。"
 brazil.1317.t: "掐灭导火索"
 brazil.1317.desc: "数日前，塔沃拉全程见证了这场权力交接的诞生。来自全国各州市的贺电与电视台播报的计票结果交相呼应，屏幕上闪烁的统计图表显示小瓦加斯正一步步迈向总统宝座。他强压下睡意与不安，试图自我宽慰：小瓦加斯虽是个精通权术的政客，既有铁腕手段又深谙腐败之道，足以撼动巴西体制，但毕竟要维护其父的政治遗产，总该顾及身后评价。\n\n此刻，那份不安仍未消散。塔沃拉决定履行承诺，主持召开与小瓦加斯的会谈，既为商讨总统过渡事宜，更想借机厘清这个职权的边界。所有人都该明白其中分量——特别是像小瓦加斯这样的人。他本期待通过这次会面，能对这个继任者多几分掌控：摸清其偏好所在，洞察其真实意图，找准施加影响的支点。毕竟若没有党派支持，再宏大的愿景也不过是空中楼阁。\n\n但随着会谈深入，塔沃拉看清了对方燃烧的权欲。这是个拒绝受制于人的狂徒。要约束他，除非用意识形态的枷锁，或是世俗权力的威慑。眼前的男人既非埃德娜、阿德马尔或布拉加那样的哲人王，没有超越时代的政治理想；也不像寻常政客能用利益收买。他只是个被父亲盛名裹挟的空壳，对掌控所有触及之处的权力机构有着病态的执着。\n\n愤怒如毒蛇噬心，塔沃拉用尽全力维持着表面平静。难道这就是巴西应得的结果？一个戴着妥协与怀旧面具，内里却包藏独裁野心的伪君子？一个专攻巴西政治体制漏洞的投机者？一个胆敢踏足他势力范围的狂妄之徒？倘若小瓦加斯以为当选总统就等于半只脚踏进独裁者宝座，他必须先过布拉加这关——那些至关重要的国家机器，可都牢牢掌握在这位实权派手中。"
 brazil.1317.a: "小瓦加斯若是歌利亚，布拉加就是杀死他的大卫。"
 brazil.1318.t: "理性之殇"
 brazil.1318.desc: "塔沃拉怎么也想不明白。这几周实在是过于戏剧化了，不断升级的派系危机从最初的意识形态之争一路演变成了当下这般惨痛的现实。焦虑的新闻编辑室中，媒体热切地报道着；惊恐的电话交谈间，人们不断地重复着。尽管各级机构宣布了重新计票，但当太阳升起时，塔沃拉清楚地意识到，巴西注定将迎来萨尔加多政权，所有人都已承认了这一事实，除了最后几个仍抱着幻想的联盟支持者——那个他没能成功搭建起来的联盟。\n\n此时此刻，望着萨尔加多正在发表胜选演说，塔沃拉的内心又一次涌起一阵厌恶。这人凭什么谈论妥协，宣称要建立一个属于所有巴西人的巴西？他明明刚刚还在竞选中肆意地呼吁清除他的政敌。这个曾经对根本不存在的虚妄影子咆哮的人，又有什么资格大谈爱国和博爱？而他又凭什么能够开口讲话，他那充满煽动性的演说，已然将无数巴西人引向彻头彻尾的疯狂？\n\n压抑着怒火，塔沃拉颓然坐在办公室里，桌上堆积如山的文件仿佛已无足轻重，满心皆是悲凉。这怎么可能发生？为什么各党派不能团结一致，共同筑起防止此人上台的隔离防线？他们的政策为何没能凝聚在一起？他不停地追寻答案，不停地绕着根源转圈，最终却回到了自己身上。唯有他自己本可以阻止那暴君从一开始就参选。萨尔加多的掌权，就是他留下的政治遗产。\n\n一瞬间，他想，也许彻底倒向另一边，就能将自己洗脱干净。但他与拉塞尔达的渊源，与民主的纽带，早已根深蒂固，他决不能堕落为萨尔加多的爪牙。他依然拥有遍布社会的宝贵人脉，这些人可以让政权的交接推迟几天，让新法律延后几周。但这管用吗？他能逃过即将到来的清算吗？他的牺牲能够与即将签署的死亡令相抗衡吗？塔沃拉不断自问，但他明白，自己不配享受那些问题所隐含的个人英雄主义。"
 brazil.1318.a: "他低头最后看了一眼手中的机票。巴西利亚飞往巴尔的摩。"
 brazil.1400.t: "米老鼠的乐园"
 brazil.1400.desc: "拉塞尔达决定亲自抽空一天，与两位华特迪士尼公司的代表会面。巴西迪士尼项目进展神速。巴西利亚的一大片空地已被选作乐园地址，园内餐厅的经营许可权完成竞拍，所有在园内使用的角色、影片和IP授权均通过审批。是时候开始动工了，现在只需要总统最后拍板定案。\n\n“总统先生，咱们直奔主题吧——”第一位代表拉开了园区的地图，先指向入口处。“我们已经考虑了您提出的关于体现美国风情的建议。这条是‘美国风情步道’，汇聚了适合家庭用餐的餐厅与高档购物区。”第二位代表则指向入口附近一栋巨大的八角形建筑：“这里将设立‘巴美友谊展馆’，通过电影和展品讲述两国关系的发展历程，并由泽卡里奥卡亲自担任讲解。”\n\n拉塞尔达微微一笑：“很棒的设想，先生们。不过，这座乐园显然不能只局限于商店和展览，对吧？”两位代表同时指向园区中央、入口以南的一座圆形广场：“这里将是‘友情之地’。园内将有一座以密西西比河为主题的激流勇进游乐设施，一座白雪公主旋转木马，以及南美洲唯一一座以彼得潘历险记为主题的创新型钢轨过山车。所有设施都围绕着一座巨大的城堡建筑而建。”\n\n“我们还有另外两个亮点。”第二位代表指向“友情之地”南侧区域，那部分大致呈太阳状，上方叠加了一支火炬的形状：“这里会被称为‘动物共和国’，是一个动物园，将展示所有OFN成员国的特色动物群，并设置一条横穿动物园的丛林河道巡游项目。”接下来，他指向西侧的一块矩形区域：“这里将建造‘自由宫’，一座七层高的全方位服务酒店，每一层都会以美洲大陆不同地区的风情为主题。”两位代表合上地图，抬头看向总统：“总统先生，您意下如何？”"
 brazil.1400.a: "“‘巴美友谊展馆’我很喜欢。不过，也许我们可以稍微淡化一下某位令人厌恶的独裁者的统治时期？”"
 brazil.1400.b: "“我想我们应该好好扩展一下‘动物共和国’这个构想。规模更大些，更华丽些，再多点动物也不错。”"
 brazil.1400.c: "“整个园区的核心区域只有四个游乐设施？先生们，我相信你们还能做得更好些吧？”"
 brazil.1401.t: "天作之合，缘定好莱坞"
 brazil.1401.desc: "巴西迪士尼项目进展神速。巴西利亚的一大片空地已被选作乐园地址，园内餐厅的经营许可权完成竞拍（当然，其中夹杂着些许人情往来），所有在园内使用的角色、影片和IP授权均通过审批。现在，只待总统最终拍板。阿德马尔希望自己对乐园的设想已得到了华特迪士尼公司代表的充分理解，显然他们是有备而来。\n\n“总统先生，我们相信这份提案……会合您的心意。”公司代表展开了一张巨大的园区地图，“位于这里的入口——”他指着地图最北端说道，“将设置数条高级购物街和美食区，周围则是几家美国的连锁酒店。”他伸手扫过地图上方，“一切都会按照您的要求，精心打造围绕好莱坞的俱乐部与海滩主题乐园。”阿德马尔神色淡然：“继续说吧。你还记得我的第二个要求吗？”\n\n代表客气地点点头，将手移到地图中央位置，那里画着一个大圆圈，四周围满了大小不一的矩形建筑。“这里会被称为‘创新之轮’。多个公司和国家已预订了各自的展馆，并准备好了自己的游乐设施和表演项目。”他举手示意，“请放心，他们都清楚自己要履行的义务。一切都会围绕一艘逃出虎克船长海盗巢穴的黑暗游乐设施展开。”\n\n“请稍等，总统先生，我们还没介绍完。”代表又指向地图西侧一个车轮状的区域，“这里将是可口可乐生态馆，用于举办动物展览。等可口可乐的冠名许可到期后，我们还会再次拍卖冠名权。”接着，他又指了指南侧紧邻的一大片椭圆区域，“这里将建造一座中型礼堂，专供来访名人举办演出，礼堂后方还配备了豪华包厢供贵宾休息使用。”代表抬头看向总统，“总统先生，您还有其他吩咐吗？”"
 brazil.1401.a: "“多建几家商店总是好事。酒店也一样。你们联系过希尔顿了吗？”"
 brazil.1401.b: "“考虑一下吧，每年为巴西公民提供一个免费入园日。这是项值得投入的计划，不是吗？”"
 brazil.1401.c: "“我觉得你没听懂。我不只是想邀请名人来表演——我希望他们能留下来多住一阵子。你们能办到吗？”"
 brazil.1402.t: "掌中未来"
 brazil.1402.desc: "巴西迪士尼项目进展神速。巴西利亚的一大片空地已被选作乐园地址，园内餐厅的经营许可权完成竞拍，所有在园内使用的角色、影片和IP授权均通过审批。现在，只差总统最终签字批准了。库比契克希望眼前这位华特迪士尼公司代表能够准确理解他的构想。他可不想耽误这个令人兴奋的项目。\n\n“总统先生，我很高兴能向您介绍我们的创意。”代表铺开了一张巨大的园区地图，但地图的下半部分被纸覆盖着。他指向地图的东北角：“园区入口设在这里——”接着，他手指沿着一条细线向下移动，“游客们会穿过一条漫长的城市街景，展现出不同时代风貌，越往前走年代越近，直到抵达如今这个时代，然后——”\n\n代表突然用手掀开盖着下半张地图的纸，露出一个庞大的圆形区域：“这里就是‘未来之境’，象征着巴西和美国共同打造的乌托邦式未来！”他又指着圆形区域的外围：“这里会铺设单轨列车系统，既可供游客欣赏美景，也可作为园内交通工具。”接着，他把注意力移到圆圈北半部分的两组矩形建筑，“这些都是主题馆。西侧将用作各大公司展示最新发明的场所，而东侧则安排科普展览，不断轮换，以激发孩子们对科学的兴趣。”\n\n代表又指向地图中央的半圆形区域：“这里将兴建一座名为‘天空之塔’的豪华酒店，共二十层，全塔四周装配单向玻璃幕墙，顶部则建有观景台和餐厅。”最后，他指向圆形区域南端：“这里会集中游乐设施，除了碰碰车和两座旋转木马，我们最大的亮点就是‘星辰冲击’，这将成为全球第二大的管状钢轨过山车，以人类前往火星探险为主题。”说完，他抬头看向总统：“您觉得如何，总统先生？”"
 brazil.1402.a: "“公司展馆的事不着急，孩子们更重要。我要你们在每个展馆都安排科普展览。”"
 brazil.1402.b: "“‘天空之塔’这个点子实在妙极了。务必把它建得尽可能高，只要安全允许。”"
 brazil.1402.c: "“世界第二大的钢轨过山车？不惜一切代价，把它做成世界第一大！”"
 brazil.1403.t: "微型世界"
 brazil.1403.desc: "巴西迪士尼项目正稳步推进。巴西利亚的一大片空地已被选作乐园地址，园内餐厅的经营许可权完成竞拍，所有在园内使用的角色、影片和IP授权均通过审批。经过一段时间，连工会合同也谈妥了。如今只等总统盖上最终批准的印章。古拉特希望这位华特迪士尼公司的代表更能顺从他的要求。\n\n“我们听取了您的意见，总统先生，并且——”代表展开乐园规划图，“我们认为是能够达成共识的。乐园入口处，就在这里——”他指向规划图北部一个被红色半圆环绕的矩形区域，“红色禁区内不设任何商业点。取而代之的将是专供公共交通站点使用的人行道带，以及种植巴西本土植物的大型花园。”\n\n代表从入口移向中央圆形广场。“这里将建造美洲和平广场，设立展现拉美各国特色的系列展馆，外立面均采用对应国家的建筑风格。”代表又将手指移至广场中心横向排列的三个矩形区域：“第一区域将建造以逃离传说巨蟒博尤纳为主题的巨型木制过山车；第二区域是经适度抬升以提升观景体验的传统摩天轮；第三区域则会建造以约翰·亨利故事为主题的低高度小型过山车。”\n\n指尖继续下移至广场最南端的四个中型半圆形区域：“这些是角色情景剧的专用剧场。演员们每周投票决定演出内容——当然迪士尼代表对每项提案持有最终否决权。”随后代表指向图纸西部一个规整椭圆区域：“此为‘平多拉玛’景区，由数栋三层木结构酒店组成，外围环绕南美动物展览区。其中半数房间将留作保障性住房，供收入低于国民平均薪资的公民居住。”代表收起图纸问道：“这样安排您是否满意，阁下？”"
 brazil.1403.a: "“没必要取消入口处的所有商业空间。只要规模合理就行。”"
 brazil.1403.b: "“最终否决权？恕我无法接受，请把这条删去。”"
 brazil.1403.c: "“平多拉玛我喜欢。多布置些房间和展品，不要在这上面抠抠搜搜！”"
 brazil.1404.t: "情非得已"
 brazil.1404.desc: "巴西迪士尼项目正稳步推进。巴西利亚的一大片空地已被选作乐园地址，园内餐厅的经营许可权完成竞拍，所有在园内使用的角色、影片和IP授权均通过审批。军政府的统治曾一度令进度停滞，但局势终究还是缓和了下来。华特迪士尼公司的一位代表与布兰科的一名手下——若阿金，举行了会晤，打算正式敲定协议。\n\n“我就不浪费您的时间了，若阿金。”代表展开乐园规划图，“我们理解您上级的那些不满，并且无意在这些问题上与您争执。乐园入口就在这儿——”他指向规划图北部一个被红色半圆环绕的矩形区域，“——这里将是一条汇集了各类餐厅与高档餐饮的宽阔长廊。而且，正如您所要求的，这块地上巴西企业优先。”\n\n代表的手指从入口处下移至中央圆形广场。“这里将是‘共和国广场’，设有一系列展馆，专门展示巴西最大的八个州，最后每个州都会拥有一个展馆。”代表指向广场中心，“这里建一座中央展馆，举办展览，展览内容每年轮换，首展主题将是巴西的政治史。”随即，他移向广场南部，“这里是广场的游乐设施区。首先，是一座以《金银岛》为主题的室内过山车。然后是一组射击场游戏，主题是扮演殖民时代的‘班代兰蒂斯’探险队，打退野兽和土著战士的进攻。”\n\n他的手指滑向南部的一个区域，那是一个与主广场分离的、稍小些的圆形区域。“这一块叫‘大自然母亲’，是动物展区，汇集来自全国各省的珍禽异兽。中间会有一条丛林巡航水道穿过展区，主题是《瑞士鲁宾孙一家》的故事。”接着，他指指从小圆圈凸出来的一个长方形，“这是‘民族骄傲’酒店，八层楼的豪华酒店，军人入住酒店享受折扣。”说完，他卷起地图，“上级还有什么其他要求吗，若阿金？”"
 brazil.1404.a: "“只给优先权哪够？必须强制规定，步行街上的所有商铺都应该是巴西人开的。这国家是我们的。”"
 brazil.1404.b: "“我们也可以为非巴西人设立些展馆。或许可以给美国留一席之地——当然要付钱。”"
 brazil.1404.c: "“民族骄傲酒店应该让军人免费住。毕竟，他们是咱们国家的骄傲。”"
 brazil.1405.t: "与难缠之徒的交锋"
 brazil.1405.desc: "巴西迪士尼项目的进展一直颇为缓慢。好不容易、费了老大的劲，才在巴西利亚勉强谈下来一块地做园区；园里开餐馆的牌照，几乎全给了巴西人开的公司；而园区所使用的各类角色、电影及IP呢，虽然批下来了，但限制条款却极为严苛。夸德罗斯，或者说他那帮手下，硬是把这事儿搞成了一场磨人的拉锯战。拖了又拖，改了又改，总统总算是跟迪士尼的代表见上面了。\n\n“总统先生，我理解您对这个项目有多么深的顾虑。”夸德罗斯只是点点头，，一小时前灌的那几杯威士忌让他现在反应有点麻木。“过我们已经听取了您的意见，并拿出了针对性的整改方案。”代表摊开规划图，指着北边的一个长方形，“这是入口。这里会弄成一个正经、朴素的购物区，并配有一些由巴西人经营的旅社供游客留宿。按您的要求，这里将在晚间9点实行宵禁。”\n\n代表的手指从入口移至中间的大圆广场。“这里是‘仁慈王国’，仿照美国城镇风格的主园区。一座功能完备的天主教堂将坐落于此，”他指了指广场顶端的一个长方形，“园区内还将设立一些适合家庭游玩的游乐项目——但不设奖品，因为设奖品就算赌博。”他指向广场中心两个规模尚可的展馆，“这两个馆，将通过展览和影片，记录巴西与美国两个基督教兄弟之邦的历史。”\n\n接着，代表指着地图东南方的两个大圆圈，以及一条环绕整个广场的长条状轨迹。“这一块是主要的游乐设施。第一个是驾车游览，车子在绕城轨道上跑，带着大家游览王国。第二个是以米老鼠和朋友们为主题的旋转木马，全程将播放米奇寻找爱犬布鲁托的有声故事。”最后，他移向东南方的另一个圆圈，“最后一个是以探索废弃的米纳斯吉拉斯金矿为主题的慢速过山车。”他从地图上抬起头，望向总统，“这样……可以吗？”"
 brazil.1405.a: "“9点宵禁有点太严了。只要不出格，大家乐呵乐呵我也没意见。改成10点吧。”"
 brazil.1405.b: "“那座教堂最好能正常使用。毕竟员工们还得去那儿做弥撒呢。没问题吧？”"
 brazil.1405.c: "“恕我直言，那个过山车听着挺没劲的。能不能整点刺激的？比如让它钻地底下去？”"
 brazil.1500.t: "秩序伴随进步"
 brazil.1500.desc: "时近黄昏，大部分摊贩都准备收摊了。对贾米拉来说，这是忙碌的几个小时，不过最近日子一直如此。生意兴隆，丝毫没有放缓的迹象。尽管岁月已在她脸上刻下深深的痕迹，她依然是社区里受人尊敬的家长——从曾经的小小西瓜摊主，逐渐成长为睿智且德高望重的引路人。\n\n她扭头看了看收音机，清了清嗓子，说道：“我们都知道，国内生产总值增长的好消息很快就要公布了。” 一群年轻人，几乎还都是孩子，竟然鸦雀无声地盯着她，这突如其来的寂静令她一时不知如何是好：“呃……我们要怎么庆祝一下呢？”\n\n“也许可以给水果都取个特别的名字？”一个勉强到工作年龄的男孩开口提议，“比如阿比乌达？腰果比契克？”大家爆发出一阵哄笑，打破了短暂的沉默。\n\n“我们用音响放国歌吧！”后排被摊位遮住的几个年轻人大声喊道，“挑些好地方，把歌词背熟！”但这也太贵了，她暗想，这个担忧很快便被其他人算起音响单价的声音所证实。\n\n更多主意被纷纷提出，贾米拉叹了口气。这些想法多半平庸无奇，缺乏新意。难道要让这一代年轻人简单地把摊位涂成绿黄色都难吗？正当她略感沮丧之时，另一名少年走到人群中央，反射性地转了个身，面向大家。\n\n“我们买些巴西国旗怎么样？”他举起手，“我知道本地有个供应商专门做这个，如果我们现在赶紧过去，应该还能赶上他们下一批货到之前买到。这办法简单、爱国，还能支持本地经济。”现场安静了一会儿，直到另一位年长的家长问道，那家店在哪里？"
 brazil.1500.a: "口耳相传，挽救了这一天。"
 brazil.1501.t: "股市狂欢"
 brazil.1501.desc: "新装上的电子行情板在头顶闪烁，绿色数字不停跳跃。偶尔，它们会顽皮地变红一瞬，像是开个玩笑，随即又恢复成那抹悦目的绿光。每一块屏幕上，都显示着巴西各家公司股价的飙升——上涨，再上涨，接着继续涨。\n\n交易大厅里挤满了汗流浃背的西装男女。有人穿着没打领带的西装，有人打着没扣好的领带，人人都把电话紧贴耳边，嘴角抽动，仿佛在吻着话筒那头的某个重要的人。他们在买进——迅速、响亮，且带着自豪。此刻不买股票的人，好像不是在过日子，而是在浪费人生。因为今天不是寻常的一天——今天，巴西正式跻身全球第七大经济体。\n\n在这一片充满欢呼与绿光的迷雾中，人们看不见的，是无数公司正在有意推高股价，好掩盖此前的颓势。这只是一场精心设计的公关秀，目的是恢复投资者的信心。可那些热情高涨的新手，却当成了真金白银的喜讯，欢呼雀跃。他们挥拳庆祝，乐呵呵地领着佣金，交易完成。\n\n经验老道的投资人却没有加入狂欢。他们只是嘴角上扬，露出一抹心照不宣的笑。他们早已看穿了这场游戏的本质——不过是场精心设计的骗局，用来哄孩子的。他们知道什么时候该抽身，什么时候该把那些廉价股票抛给接盘的人。\n\n不过这些，还不急着做。现在是庆祝的时刻。\n\n有人举起酒杯，倒上香槟。甚至有人拿出一盒雪茄，打开时还不小心把盒盖折断了。他把一根根雪茄递给整间交易大厅的同伴。年轻的伙计们自得其乐，仿佛不是在抽古巴雪茄，而是在街边点了一根便宜烟，吸得又深又香。"
 brazil.1501.a: "一只酒杯摔碎了。大厅里响起了欢呼声。"
 brazil.1600.t: "同化"
 brazil.1600.desc: "正午的烈日无情地炙烤着那片临时开辟的空地。印第安人保护局的官员爱德华多抹去额头的一滴汗珠，目光扫过眼前的场景。说到底，阿德马尔政府的问题一箩筐，可在“扶持原住民”这件事上，确实砸了点资源。尽管这些资源，总是附带着附加条件。\n\n他望着那些排队领取药品和食物的亚诺玛米人，脸上写满了复杂的情绪——松口气似的释然里，又掺着挥之不去的警觉与防备。这些人，不久前还在病痛与饥饿中苟延残喘，如今总算有了点起色，但那一丝游移不定的怨意，却像热浪中漂浮不散的水汽，总在爱德华多的注视下，隐隐现形。\n\n不安的源头，其实就在不远处那座新建的校舍里。那是个用砖头砌成的简易建筑，却仿佛一枚钉子，冷硬地钉在这片土地上，昭示着政府最新的施政方向。部落里的孩子们，有的才五岁，就被一位位白人教师引着走进教室。有些孩子还死死拉着父母的手，却已被带入一个与他们的世界格格不入的空间。\n\n课程表上写着识字和算术，语言是葡萄牙语，但令爱德华多最感寒心的，是那些课表之外的“潜台词”——天主教义充斥教室，基督教的道德与信仰被反复强调，而亚诺玛米世代信奉的灵魂与自然之神，却被刻意地排除在外。所谓的“现代价值观”，一遍又一遍灌输进这些尚未成型的头脑里；一个视传统为落后、将根源视为耻辱的世界观，正在悄然生长。这所学校的明确目标，不是教育，而是同化——要将这些孩子塑造成“忠诚的巴西公民”。\n\n看着孩子们依次步入教室，爱德华多心中不禁泛起阵阵寒意。那曾经鲜活多彩的文化与身份，正悄然褪色。他不禁自问：他们到底在构建一个怎样的国家？而这个国家，又是以怎样的代价为代价？"
 brazil.1600.a: "倘若代价是他们的文化，这样的“进步”真的是进步吗？"
 brazil.1601.t: "进步的代价"
 brazil.1601.desc: "空气凝滞而沉重，不只是亚马孙常有的湿闷，还夹杂着病疫与死亡的腐臭。那片小小的空地上，横七竖八地躺着亚诺玛米部族的尸体。而在中央，唯一还站着的，是一位名叫里卡多的年轻人，也是印第安人保护局的官员——他脸上写满了疲惫与绝望，像是戴着一副无法卸下的面具。\n\n他用夹杂着葡萄牙语与部族方言的口音说话，声音沙哑：“我们不想伤害你们，我们是来帮忙的。”\n\n他的四周，仅存的一小群亚诺玛米战士围成一圈。他们瘦骨嶙峋，目光中却燃烧着悲痛与愤怒，手中握紧的弓箭已经拉满了弦，指向他这个“援助者”。\n\n他们本是一个健康、自足的社群，直到外来者的脚步踏入。起初只是些模糊的传言——说有人修了路、砍了树。随后，疾病便接踵而至。那是萨满也无能为力的病痛，是夺走孩子、长者、亲人性命的瘟疫。\n\n外来定居点离得越来越近了。丛林中回荡着远方机械的轰鸣与金属的撞击声。年轻人渴望血债血偿，可里卡多心知肚明，一旦他们出手，换来的只会是更大规模的屠杀。\n\n他知道，拉塞尔达总统的眼里只有工业化与“现代化”。总统那些关于繁荣与进步的承诺，让许多人深信不疑。但在这片亚马孙深处被遗忘的角落里，里卡多看到的却是这场“进步”追逐下的另一面：毁灭、悲剧，以及对最无辜者的伤害。\n\n他再次开口，语气中已染上恳求：“我们有药，我们真的能帮你们……求你们……”他说着，指了指自己携带的小型医疗包。\n\n一名年轻战士的手颤抖着，将弓弦拉得更满，那支箭笔直指向他的胸口。“骗子。”那战士低声咬牙道。"
 brazil.1601.a: "骗子。"
 BRA_military_elections.10.t: "监督下的参议院选举"
 BRA_military_elections.10.desc: "参议院的竞选活动没有以盛大的游行拉开序幕，只有一道肃穆的身影在灰暗的政府大楼外背诵讲稿。身旁站着持枪的沉默监督者，以及一队被政府豢养的记者——他们只会报道官方钦定的版本。\n\n报道里不会提及工党的缺席。该党领袖们被军队以“恢复国家秩序”为由强行逐出政坛后，如今只能在冰冷的牢房里眼睁睁看着选举进行。\n\n失去左翼旗帜的工党基层党员，转而支持其他政党中理念相近的候选人，试图用这种精神胜利法延续政治生命。其中最显赫的人物甚至直接改换门庭，声称“这是实现变革的唯一途径”——尽管昔日的同志对此嗤之以鼻。\n\n其他政党则对未来踌躇满志。全民盟获得军方的鼎力支持，索邦派的军官们视该党为不二之选。各军营里，指挥官正命令士兵投票给全民盟，违者将以“共产叛徒”的罪名被逐出军队。\n\n他们唯一的劲敌是社民党。该党自诩为政府的主要反对派，但那些口号与作秀背后，没人知道他们究竟打算如何（或者说是否真心想要）撼动军方对巴西政坛的掌控。\n\n于是在有些人眼中，两党之间毫无区别。当军方发令时，他们都会应声起跳，只不过一个会多问一句：“要跳多高？”"
 BRA_military_elections.10.a: "为了你我，投给社民党！"
 BRA_military_elections.11.t: "武装起来"
 BRA_military_elections.11.desc: "“你敢信吗？！”莱安德罗猛地将报纸摔在桌上，朝身边的同伴递了个眼神。吉尔马尔抿尽最后一口卡布奇诺，才不紧不慢地接过报纸摊开细看。圣保罗的咖啡馆静谧无声，只有几位店员轻轻走动的脚步声和窗外细雨打在玻璃上的沙沙声交织在耳畔。\n\n他长长地吐出一口气，随即耸肩道：“他们当然会封杀我们。现在就是动手的最佳时机。参议院重启选举却不准左派参选，这分明是在为卡斯特洛的政见立下长久的标记。哪怕他有朝一日退休，他的政见也会留下遗毒。”吉尔马尔一边说着，一边沉思。\n\n“这简直就是耻辱！”莱安德罗愤怒地说，“他们要把这个国家变成彻头彻尾的反动独裁体制，而我们居然眼睁睁地看着，什么都不做！我们不能坐视不管！”他的话音刚落，便被吉尔马尔一个安静的手势打断。莱安德罗叹了口气，心里明白——这话，在公共场合说得太多并不明智。\n\n两人都是巴西共产党多年的老党员，入党近十年，五十年代党务工作的高潮与低谷，他们都历历在目。但这一次政府的打压是迄今为止最赤裸裸的一次。莱安德罗接过报纸，目光停在卡斯特洛的照片上。他低声骂了一句：“去你妈的。”随后将头埋进双手之间。吉尔马尔伸手拍拍他的肩膀，嘴角露出一丝安抚的笑意。\n\n“不过你说对了一件事。这事，不会就这么过去。被镇压的，可远不止我们俩。很快，人民会站出来抗争的。也许——”他顿了顿，朝咖啡馆门口瞥了一眼。没有人进出，他继续道：“也许有一天，他们会拿起武器，而我们也会起来。”"
 BRA_military_elections.11.a: "为正义而战。"
