 BRA_party_psd_desc: "社会民主党是一个与瓦加斯主义关系亲近、试图代表巴西政治中间势力的自由主义政党，是巴西的主要政党之一。该党深耕农村地区，依托农业主义与其在农村地区布设的政治网络维系核心票仓，常在巴西政治博弈中充当各方妥协的中点。恩里克·洛特、儒塞利诺·库比契克、坦克雷多·内维斯等巴西政坛巨鳄均为社民党成员。自1955年起，社会民主党与工党组成选举同盟，两党在关键议题上协同投票、共同竞选并相互支持。"
 BRA_party_ptb_desc: "工党作为秉持社会民主理念的政党，致力于延续巴西政治中的左翼传统，传承瓦加斯主义的精神。该党由瓦加斯下台后创立，如今已是巴西政坛举足轻重却争议不断的一股势力。许多巴西人认为工党不过是披着粉色外衣的共产党，也有观点忧虑工党掌权后可能重拾新国家时期那些糟糕的政策方针。工党有三个主要派系：党主席瓦加斯与若昂·古拉特领导的左翼民众主义派，莱昂内尔·布里佐拉领导的左翼民族主义派，以及规模较小的基督教民族主义中左派。工党的支持群体涵盖城市劳动者、工会组织及低收入阶层。自1955年起，工党与社民党结成攻守同盟，实现互利共赢。"
 BRA_party_udn_desc: "全国民主联盟是巴西的主流右翼大党，将古典自由派、强硬保守派与进步派都包揽在其大帐篷之下，能令这群人团结的唯一原因恐怕是要一致反对瓦加斯主义中蛊惑人心的民粹色彩。与社民党或工党不同，全民盟没有迎合特定的社会阶层或群体，而是一切愿意支持右翼的松散群体的联盟。该党最著名的成员是媒体新宠雅尼奥·夸德罗斯和卡洛斯·拉塞尔达。"
 BRA_party_prp_desc: "人民代表党是流亡海外的右翼思想家普利尼奥·萨尔加多的政治遗产，乃巴西政坛风头最盛的整合主义政党。虽说他们在巴西政坛勉强站稳了脚跟，但其实他们倚仗的是军方内部日渐滋生的同情情绪。民代党在南部地区根基最深，那里活跃着一批死忠分子，奉行天主教传统主义、巴西民族主义、反自由主义与反共产主义的政党路线。此外，临时党首米格尔·雷阿莱领导的意式法西斯派系正试图取代党的整合主义纲领。政府出手打压民代党实属意料之中。"
 BRA_party_pdc_desc: "作为最成功的小党派之一，基督民主党是温和保守政治思想的堡垒。由内伊·布拉加领导的基督民主党拥护教宗良十三世为体恤劳工而写的《新事通谕》中倡导的基督教民主。友好的工会政策、行政权力的下放以及对工资与生活费用的调整都是基督民主党冗长宣言的亮点。然而，从该党走出来的一位名人不再支持其议程；雅尼奥·夸德罗斯凭借基督民主党候选人的身份赢得了圣保罗市长的职位，但他随后退党，转而投身于副总统的竞选。尽管如此，作为一个影响力可观的中右翼小党，基督民主党依然不容小觑。"
 BRA_party_ptn_desc: "国家工党是圣保罗最成功的右翼小党，其纲领保守且传统，但他们与许多大大小小的政党都保持着灵活的关系。因此，该党往往支持最受青睐的总统候选人，并协助组建政党联盟，支持他们参与选举。该党最近为支持雅尼奥·夸德罗斯参选副总统加入了一个规模庞大的保守党联盟。"
 BRA_party_pst_desc: "社会工党是分裂自社民党的一个中左翼小党。虽然社会工党的纲领提倡社会民主、民粹主义和劳工主义，但该党更像是自大党脱离的异见者的聚集地，而这些人也经常凭借该党的选票参与竞选。"
 BRA_party_psb_desc: "巴西社会党是由许多工会成员和知识分子组成的左翼小党。他们团结了民主社会主义者、社会民主主义者和基督教社会主义者，并就反对瓦加斯主义与立场一致的全民盟结为盟友。该党提倡对社会主义采取谨慎和改良主义的态度，希望通过对资本主义制度的改革逐步实现国家社会化。"
 BRA_party_pr_desc: "共和党是前总统阿图尔·达·席尔瓦·贝纳德斯创建的中右翼小党。共和党以提倡联邦制和巴西民族主义为荣，经常与社民党和全民盟合作。该党试图通过维护联邦制以捍卫共和国，提倡三权分立、两院制和普选，并希望禁止总统和州长竞选连任。在经济上，该党提倡国家干预主义和产业分权管理。"
 BRA_party_pl_desc: "解放者党是南里奥格兰德州最强的中右翼小党，但也会在北部偶尔得胜，其自由保守主义纲领强调联邦制和议会制。由于其基本盘位于南里奥格兰德州，它被称为“高乔人党”，并吸引了潘帕斯草原和农村地区的高乔人。该党旨在推动与捍卫巴西的议会民主，并主张采用两院制议会来取代目前的总统制。"
