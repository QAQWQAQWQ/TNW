 BRA_democracy_survives: "民主制幸存！"
 BRA_democracy_survives_desc: "军队使出了浑身解数，但仍旧事与愿违。不管我们扶持了谁做临时总统，终究都还是选了一个。\n\n我国的民主制度鲜血淋漓，但仍能苟延残喘，等待合法的选举及逆行。虽然我们不能自欺欺人地应认为政变不会再度发生，但我们可以昂首挺胸，以炯然双目注视民主之敌，自豪地说出：\n\n§n民主长存。§!"
 BRA_idea_rampant_corruption: "腐败猖獗"
 BRA_idea_rampant_corruption_desc: "如果要问巴西得了什么病，就算是小孩也会不假思索地跟你说：腐败。巴西的政治蔓延盘绕在腐败的触手之中，从地方市政厅到各州政府，再到联邦政府和军队都无一幸免。\n\n盛行的腐败是每个领导人都要面对的难题，毕竟比起巴西的福祉，人们更愿意为自己的利益而努力。只有将腐败问题斩草除根，将来各届政府才能免遭其害。不过嘛，虽然有些领导人与腐败不共戴天，但相对的，有些领导人则对其爱不释手。"
 BRA_idea_rampant_corruption_med: "腐败愈发猖獗"
 BRA_idea_rampant_corruption_med_desc: "为巩固我们的政府，我们只能对寡头睁一只眼闭一只眼，并达成了几笔交易。百日之后，任何能保证民主政权稳定的手段我们都来者不拒。如果放任腐败滋生可以保证我们政权的长久，那我们也只能咬碎牙齿咽下肚。"
 BRA_idea_rampant_corruption_high: "腐败猖獗至极"
 BRA_idea_rampant_corruption_high_desc: "阿德马尔放任腐败肆意蔓延、制度日渐崩坏，以此稳住了他的政府。不过，巴西还有一位民选总统在任，所谓船到桥头自然直嘛！\n\n§x对吧？§!"
 BRA_idea_the_war_on_corruption: "反腐战争"
 BRA_rapid_industrialisation: "快速工业化"
 BRA_rapid_industrialisation_desc: "随着时间的推移，巴西的工业化程度也日益增长。数十家新工厂的建立为经济发展注入了强劲的动力，使国内人口激增，GDP也随之高速发展。\n\n伴随着工业的腾飞，巴西也变得更加依赖国家石油公司和中东供给的石油。倘若能保证稳定的石油供应，巴西的经济就将突飞猛进地发展下去。"
 BRA_idea_Lobster_conflict: "龙虾战争"
 BRA_idea_Lobster_conflict_desc: "在巴西附近的大西洋海域，一场名为“龙虾战争”的冲突已经持续了数月之久。非洲和德国渔船不断侵犯巴西领海，巴西渔民的合法渔获遭人抢掠，渔船则在与其对峙时遭遇袭击。洛特将采取一切必要手段，解决这一威胁并赢得龙虾战争。"
 BRA_idea_Lobster_conflict_2: "龙虾战争"
 BRA_idea_Lobster_conflict_2_desc: "在巴西附近的大西洋海域，一场名为“龙虾战争”的冲突已经持续了数月之久。非洲和德国渔船不断侵犯巴西领海，巴西渔民的合法渔获遭人抢掠，渔船则在与其对峙时遭遇袭击。洛特将采取一切必要手段，解决这一威胁并赢得龙虾战争。"
 BRA_idea_Lobster_conflict_3: "龙虾战争"
 BRA_idea_Lobster_conflict_3_desc: "在巴西附近的大西洋海域，一场名为“龙虾战争”的冲突已经持续了数月之久。非洲和德国渔船不断侵犯巴西领海，巴西渔民的合法渔获遭人抢掠，渔船则在与其对峙时遭遇袭击。洛特将采取一切必要手段，解决这一威胁并赢得龙虾战争。"
 BRA_idea_Lobster_conflict_4: "龙虾战争"
 BRA_idea_Lobster_conflict_4_desc: "在巴西附近的大西洋海域，一场名为“龙虾战争”的冲突已经持续了数月之久。非洲和德国渔船不断侵犯巴西领海，巴西渔民的合法渔获遭人抢掠，渔船则在与其对峙时遭遇袭击。洛特将采取一切必要手段，解决这一威胁并赢得龙虾战争。"
 BRA_idea_Lobster_conflict_5: "龙虾战争的后果"
 BRA_idea_Lobster_conflict_5_desc: "尽管龙虾战争经过两年时间终于结束，但巴西领海仍然不断受到非洲和德国渔船的侵犯。\n\n这让巴西渔民痛苦不堪。他们的渔获被偷盗抢掠，船只被劫匪袭击。这场冲突的持续不仅是洛特政治生涯的污点，也是巴西的尴尬。"
 BRA_idea_Bountiful_Harvest: "大丰收"
 BRA_idea_Bountiful_Harvest_desc: "在洛特总统和巴西政府的努力下，龙虾战争以巴西人民的胜利而告终。德国人和各路在我们水域捕鱼的寄生虫都被赶跑了，巴西渔民终于可以随心所欲地捕鱼，不必再担心遭到骚扰。我们预期在约六个月的时间内，龙虾和其他海产带来的收入会大幅上涨。"
 BRA_idea_RK_settlement: "巴西-中非和解"
 BRA_idea_RK_settlement_desc: "龙虾战争的谈判已经结束，双方达成了一项公平的协议。冲突已经结束，地区恢复稳定，双方都从谈判中得到了自己想要的东西。"
 BRA_idea_RK_settlement_good_cg: "极好的巴西-中非和解"
 BRA_idea_RK_settlement_good_cg_desc: "龙虾战争的谈判已经结束，我们带着一大堆利益离开！冲突已经结束，我们已向对方展现了实力；巴西的水产只属于我们，谁也拿不走。"
 BRA_idea_RK_settlement_small_good_cg: "较好的巴西-中非和解"
 BRA_idea_RK_settlement_small_good_cg_desc: "龙虾战争的谈判已经结束，我方的谈判代表为我们争取到了有利的协议。冲突已经结束，我们的渔民可以返回巴西水域安全捕鱼，享受自己的劳动果实。"
 BRA_idea_RK_settlement_small_bad_cg: "较坏的巴西-中非和解"
 BRA_idea_RK_settlement_small_bad_cg_desc: "龙虾战争的谈判已经结束，但舆论认为我们本可以从谈判中获得更多。不管怎样，冲突已经结束，而我们仍可以在巴西水域捕虾，从而获得一些补偿。"
 BRA_idea_RK_settlement_bad_cg: "极坏的巴西-中非和解"
 BRA_idea_RK_settlement_bad_cg_desc: "龙虾战争结束了……可代价是什么呢？\n\n我们的谈判代表作出了很大的让步，而得到的赔偿却很少。在国内，不仅是背靠海洋吃饭的人，民众表达了普遍的反对。人民质问他们的领导人为何如此轻易就向敌人投降。毕竟，这可不只是龙虾的问题！\n\n然而，民众的怒火不是全部结果。战争结束了，我们的政府可以解放出精力，自由地关注新问题。只从前敌人手里要到一点让步，但现在有瑕疵的和平总比不可控的战争好得多。人民会逐渐从不满中恢复的。"
 BRA_idea_RK_settlement_manpower: "巴西-中非和解"
 BRA_idea_RK_settlement_manpower_desc: "龙虾战争的谈判已经结束，双方达成了一项公平的协议。冲突已经结束，地区恢复稳定，双方都从谈判中得到了自己想要的东西。"
 BRA_idea_RK_settlement_good_cg_mp: "较好的巴西-中非和解"
 BRA_idea_RK_settlement_good_cg_mp_desc: "龙虾战争的谈判已经结束，我方的谈判代表为我们争取到了有利的协议。冲突已经结束，我们的渔民可以返回巴西水域安全捕鱼，享受自己的劳动果实。"
 BRA_idea_RK_settlement_small_bad_cg_mp: "较坏的巴西-中非和解"
 BRA_idea_RK_settlement_small_bad_cg_mp_desc: "龙虾战争的谈判已经结束，但舆论认为我们本可以从谈判中获得更多。不管怎样，冲突已经结束，而我们仍可以在巴西水域捕虾，从而获得一些补偿。"
 BRA_idea_RK_settlement_bad_cg_mp: "极坏的巴西-中非和解"
 BRA_idea_RK_settlement_bad_cg_mp_desc: "龙虾战争结束了……可代价是什么呢？\n\n我们的谈判代表作出了很大的让步，而得到的赔偿却很少。在国内，不仅是背靠海洋吃饭的人，民众表达了普遍的反对。人民质问他们的领导人为何如此轻易就向敌人投降。毕竟，这可不只是龙虾的问题！\n\n然而，民众的怒火不是全部结果。战争结束了，我们的政府可以解放出精力，自由地关注新问题。只从前敌人手里要到一点让步，但现在有瑕疵的和平总比不可控的战争好得多。人民会逐渐从不满中恢复的。"
 BRA_overbearing_military: "专横的军队"
 BRA_overbearing_military_desc: "虽然宪法规定巴西的执政权力属于民选的总统和立法机构，但在实践中并非如此。\n\n巴西依赖它的军队。这绝不仅是一个轻描淡写的事实，军队的法外权力更是令每一位雄心勃勃的政治家深感不安。军营里的牌桌旁或高级将领的口中得出的结论决定了巴西利亚的政治风向，令军队的地位和军费安如磐石，并且极大压缩了政治斡旋的余地。\n\n危如累卵也莫过于此。如果军队的敏感权力遭到了侵犯，或者局势混乱到近乎失控的地步，第四共和国也许就会以它诞生的方式走向终结……§R在另一场政变中粉身碎骨§!。"
 BRA_constitutionalist_dominance: "护宪派之治"
 BRA_constitutionalist_dominance_desc: "巴西军队与洛特总统的新时代已然到来——正该如此。现在，正如护宪派期望的，巴西武装力量的指挥层将会尊重民选的合法总统。\n\n随着洛特法案的通过和德尼斯反政府政变的失败，过去声势浩大的派系如今只剩下寥寥几个无权无势的顽固分子。尽管如此，我们依然希望这样的现状不会成为巴西历史中的偶然。"
 BRA_militarist_rebirth: "军国派重生"
 BRA_militarist_rebirth_desc: "洛特试图压制作为国家骄傲的军队，却未能阻止继任者将权力拱手交还。阿德马尔通过社进党与军方庇护者之间的互利体系施政，旨在恢复军方在政治中的话语权——正如洛特法案颁布前的格局。只需在关键处稍作利益交换，社进党便能成为军队的代言人，而军队则化身为该党的强力捍卫者。\n\n武装力量不应再为个人私利服务，是时候让其在阳光下确立应有地位了。但总统此举可谓是在走钢丝，他必须谨防局势脱离掌控。"
 BRA_day_of_the_jackboot: "长靴落地"
 BRA_day_of_the_jackboot_desc: "数千步兵的军靴声回荡在巴西利亚街头，这个国家的民主制度徒留一幅濒死的躯壳。军方强硬派援引宪法赋予的权力，以国家安全之名罢黜总统，在全国范围内镇压异见，同时承诺将在“合适时机”恢复原状。文职官员们只能期盼这种非常状态不会持续十数年之久。"
 BRA_divisions_of_cardinals: "枢机决裁"
 BRA_divisions_of_cardinals_desc: "梵蒂冈的教宗由枢机在西斯廷小教堂中秘密选举产生。大众似乎认为巴西比梵蒂冈更加民主。然而，把梵蒂冈换成巴西利亚，把小教堂换成陆军总部，二者之间其实没有多大的差别。红衣主教怎么看他们的上帝使者，巴西的高级军官就怎么看总统选举。\n\n年复一年，这种观念日渐深入，而尝试挑战它的人面临着越来越大的政治风险。"
 BRA_sword_of_damocles: "达摩克利斯之剑"
 BRA_sword_of_damocles_desc: "许多人曾以为，军队冲进巴西利亚、叫停文官政府的那一刻，便是巴西民主的末日。然而，事情并未如此发展——军政府主动将权力交还给了民选政治家。尽管这次权力交接看似平和，但巴西政局依然波谲云诡，而军队的力量却比以往更加强大。混沌之下，潜藏着军队重新掌权的契机；一旦他们卷土重来，巴西的民主恐怕将永无翻身之日。"
 BRA_bastion_of_the_crow: "乌鸦的堡垒"
 BRA_bastion_of_the_crow_desc: "无论拉塞尔达多么努力地试图让巴西喝下他的药方，巴西人民始终拒绝咽下他的政策带来的后果，哪怕是他最温和的提议也能让议会大发雷霆。现在看来，只有军方理解什么是让国家健康且强大的正道。\n\n军方仍然是全民盟重要的盟友，但如果全民盟的势力继续衰弱下去，他们也不介意扼杀这个国家残存的民主。"
 BRA_institutionalised_military: "制度化军队"
 BRA_institutionalised_military_desc: "巴西回到了她的起点，回到了军方的手中。正如1889年，军事政变缔造了共和国。正如1930和1949年，军队在愚蠢的政客搞砸一切时介入并恢复秩序。军队，巴西如今直到永远的体制核心，将取回本属于它的权力，永远不受任何人的摆布。"
 BRA_military_stalemate: "分庭抗礼"
 BRA_military_stalemate_desc: "社民党派和全民盟派议员鱼贯入席。两派在国会中掌握如此重权，可谓破天荒头一遭。\n\n如今这手握权柄的滋味，却是如坐针毡。士兵矗立在回廊间，金碧辉煌的天花板投下重重暗影，看似一团和气，实则暗流涌动。索邦派许诺的稳定局面，实则是一潭死水的僵局——所有人都在寻找扭转乾坤的机会。"
 BRA_megaproject_development: "特大项目"
 BRA_trans_amazon_highway: "跨亚马孙公路"
 BRA_idea_trans_amazon_highway: "跨亚马孙公路"
 BRA_idea_trans_amazon_highway_desc: "洛特总统对巴西的大业雄心，皆可归结于面前这条跨亚马孙公路：这是一条纵贯亚马孙无人区的公路，将为雨林开发提供机会，还能打通巴西通往哥伦比亚的道路。\n\n§W每日政治点数增长：§R[?BRA_develop_pp_cost|2]§W\n调拨的£tt_prod_unit 生产单位：§R[?BRA_develop_highway_pus_display]§!"
 BRA_hundred_days: "百日危机"
 BRA_hundred_days_desc: "总统接替程序的失调瘫痪了巴西。洛特与夸德罗斯双双辞职后，政客们始终未能推举出一位新总统，而是开始了无休止的争斗。总统大位的竞争者们竞相粉墨登场，而在议会正式选举出一位新总统前，帕斯库亚尔·拉涅里·马齐利将作为临时总统任职。巴西利亚的政客们唾沫横飞的同时，军队正冷眼旁观着这个国家滑入混乱的深渊。如果这场危机未能得到妥善解决，他们势必会选择介入。"
 BRA_idea_south_african_immigration: "南非移民"
 BRA_idea_japanese_inmigration: "日本移民"
 BRA_idea_japanese_inmigration_desc: "夸德罗斯总统取消了几个有关日本人移民入境的法律门槛，而受益对象便是日本及共荣圈。巴西正迎来新的移民潮，许多日本移民被巴西的新生活以及那里不断增长的商业潜力所吸引，尽管他们还没有完全融入这里的生活。"
 BRA_idea_joint_military_operations: "美国-巴西联合军事行动"
 BRA_idea_joint_military_operations_desc: "前往南非的巴西远征军已经迈过了第一道坎，成为OFN能够在黑暗大陆立足的重要角色。巴西士兵与美国同行密切合作，在冲突中总结出一些新颖的步兵战术，而他们也适应了在打仗和平叛时所扮演的双重角色。"
 BRA_idea_eletrobras: "巴西电力"
 BRA_idea_trans_amazon_complete: "跨亚马孙公路"
 BRA_idea_trans_amazon_complete_desc: "跨亚马孙公路，前总统洛特的丰功伟绩，现在终于得以实现。我们已把桀骜不驯的北方收于麾下，丰厚资源唾手可得！"
 BRA_Agrarian_Reform_Weaker: "羸弱的农业改革"
 BRA_Agrarian_Reform_Weaker_desc: "洛特总统的《农业改革法案》获得通过，农村居民正逐渐体会到土地法的效力。\n\n在立法过程中，法案并非毫发无损，其覆盖的范围并没有达到总统的预期。农业改革计划已经开始征收大地主的土地，并分配给农民。法律诉讼让计划在部分地区陷入停滞，土地大亨正拼命抵抗变化浪潮。获得了土地的农民没有得到多少救济和支持，难以应对与残存大地主的竞争。\n\n虽然农业法案出师不利，但多数贫困农民都非常支持法案。变革终于来到巴西腹地，未来各届总统将会在此基础之上继续建设。"
 BRA_Agrarian_Reform: "农业改革"
 BRA_Agrarian_Reform_desc: "洛特总统的《农业改革法案》获得通过，农村居民正逐渐体会到土地法的效力。\n\n在立法过程中，法案过关斩将，秉持着总统的初衷在参议院表决下得到通过，现在农业改革计划已经开始征收大地主的土地，并分配给农民。土地大亨接受了他们失去土地的事实，参议院同时通过的补偿法案安抚了他们的情绪。新一代个体农户得到支援，以应对与大地主的竞争。\n\n计划开展的十分顺利，农村得以自食其力。巴西农村改革时代的开启，无疑为洛特总统的政治遗产提供了保障。"
 BRA_Agrarian_Reform_Stronger: "卓有成效的农业改革"
 BRA_Agrarian_Reform_Stronger_desc: "洛特总统的《农业改革法案》获得通过，农村居民正逐渐体会到土地法的效力。\n\n在热忱的执政联盟盟友，以及几位反对派民众主义者的支持下，洛特总统的一揽子改革在参议院迅速得到通过。计划的覆盖范围以及资源超过总统最初的计划。\n\n在农村，一场寂静的革命开始了，土地大亨的帝国正分配给无地家庭。新一代独立农民正踊跃报名农业学院，国家正帮助他们为新生活做好准备。繁荣不会降临到所有人身上，但绝大多数人都足以养家糊口，有尊严地活着。\n\n改革正以惊人的速度进行，洛特总统则一贯谨慎，时不时踩下刹车，避免滋生腐败和僭越法律，他对计划开展的速度非常满意。成千上万的农村家庭与他共乐，他们的人生因为新时代的到来得到了彻底改善。"
 BRA_army_nepotism_6: "军队中的裙带关系：§x嚣张§!"
 BRA_army_nepotism_6_desc: "军队已彻底失控。那些幕后的操盘手不仅操纵着官僚体系的人事任免，还把控着整个系统的运作。我们针对这个庞然大物采取的任何反制措施，都被根深蒂固的腐败层层消解。若不根除这一毒瘤，§x他们就必将滋生掌控一切的妄想§!。"
 BRA_army_nepotism_5: "军队中的裙带关系：§R极高§!"
 BRA_army_nepotism_5_desc: "军队内的裙带关系逐渐成型，越来越多的人借此机会克扣军饷。一切抵制这些行为的人逐渐被顺从者取代，如果我们现在不采取行动，军队问题或将变得不可收拾。"
 BRA_army_nepotism_4: "军队中的裙带关系：§f高§!"
 BRA_army_nepotism_4_desc: "军中的许多官吏都在依傍他们的背后靠山，而非服从我们的权威，许多“升迁”充其量只是走个过场。这难以接受，但我们要是挺直腰杆，并动摇他们的控制，我们还是有补救方法的。"
 BRA_army_nepotism_3: "军队中的裙带关系：§Y中§!"
 BRA_army_nepotism_3_desc: "如今的军队四分五裂。护宪派尊政府为最高权威，但众所周知，许多将军元帅并不打算把忠诚献给共和国或巴西，而是献给那些把他们升到这个位置上的人。如果我们不想时时提防我们的保卫者，我们就得把这种癌症从武装力量中彻底清除出去。"
 BRA_army_nepotism_2: "军队中的裙带关系：§B低§!"
 BRA_army_nepotism_2_desc: "那巨兽终于受伤流血，而它的幕后操纵者们对此咬牙切齿。许多长期未获擢升的军官们对军队的贡献终于被正视了，裙带关系也不再是升职的唯一凭依。然而，这场拉锯战还远未结束。"
 BRA_army_nepotism_1: "军队中的裙带关系：§n难觅§!"
 BRA_army_nepotism_1_desc: "优绩制的军队或许太过理想化，但我们与理想只有一步之遥。在军队中，付出得到的回报，不是喜怒无常的腐败将领赏赐的五斗米，而是对巴西，对祖国澎湃激情的激励。§n军队和国家，在漫长的历史中头一次比肩而行，而非针锋相对。§!"
 BRA_the_populist_republic: "民粹共和国"
 BRA_the_populist_republic_desc: "若是漫步在巴西利亚的林荫大道上，人们会很容易忘记一半的世界已经沦为法西斯主义殖民地，因为此地乃是为数不多的自由民主国家之一的崭新现代主义首都。\n\n但在人们身边的每一栋政府大楼里，瓦加斯主义者和反瓦加斯主义者都在密谋策划着如何掌控政权，他们无时无刻不警醒着，任何软弱无能的迹象都可能会让军方的机会主义分子借机接管政权。"
 BRA_democracy_enforced: "民主已巩固"
 BRA_democracy_enforced_desc: "Unimplemented"
 BRA_false_dawn: "虚假黎明"
 BRA_false_dawn_desc: "尘埃落定，水落石出，民主再一次赢得了胜利……但这又能持续多久？沉疴旧疾仍在恶化，昨日的不安化作了对明日的恐惧。巴西的民主依然危重，它的命运握在日益极化的政坛和愈发强大的军方势力手中。只有时间能证明，这虚假的黎明是历史的转折还是行将消散的梦幻泡影。"
 BRA_death_of_the_dream: "梦想已死"
 BRA_death_of_the_dream_desc: "民主的丧钟回荡在巴西的天穹下。无情的铁腕掌控了政府系统，如今它只对军方负责。虽然军政府承诺恢复民主体制，但随着时间一天又一天地流逝，未来显得愈发灰暗。巴西的民主之梦已经化作了历史中的尘埃。"
 BRA_the_brazilian_miracle: "巴西奇迹"
 BRA_the_brazilian_miracle_desc: "政府主导的强力工业化进程和政府项目为巴西带来了巨大的经济成果，巴西人民的生活水平自然也得到了长足改善。\n\n这些成就以及美国的大力投资足以让巴西人民满意。如今的巴西，既有强大的军队，也有蓬勃的经济。"
 BRA_the_tropical_titan: "热带巨人"
 BRA_the_tropical_titan_desc: "伴随着持续加快的工业化进程，巴西的民众生活水平也在稳步提升。这些积极变化推动国民经济持续发展，且增长势头方兴未艾。\n\n这个被媒体誉为“热带巨人”的国度，正以昂扬的姿态展望未来。对巴西而言，发展前景不可限量。"
 BRA_brazils_black_swan_the_oil_crisis: "巴西黑天鹅：石油危机"
 BRA_brazils_black_swan_the_oil_crisis_desc: "巴西经济持续繁荣的引擎，本由中东与邻国委内瑞拉的廉价石油驱动。然而，中东地区爆发的大规模冲突导致却石油价格暴涨。\n\n由于经济重度依赖石油，巴西在危机中遭到重创。若无法有效遏制通胀与财政赤字，十年间的发展成果恐将付诸东流。"
 BRA_brazilian_phoenix: "浴火重生的巴西"
 BRA_brazilian_phoenix_desc: "巴西的经济十分健康，足以应对石油危机的影响。过去的努力结出了今日的胜利果实，未来一片光明。\n\n虽然石油危机无疑对巴西工业造成了损害，但这种小小波折无法打断强劲的经济增长势头。这场经济奇迹将持续多年，甚至数十年。毫无疑问，巴西将跻身工业大国之列。"
 BRA_the_lost_decade: "失去的十年"
 BRA_the_lost_decade_desc: "巴西根本无力抵御石油危机。经济增长已经停滞，但为了抑制高通胀，利率却依然在不断提高。\n\n没有人知道这种局面将持续多久，但它不会永远继续下去。巴西的债务终将达到无法承受的地步，到那时，巴西又会迎来一场危机。经济繁荣的时代已经结束了。"
 BRA_love_it_or_leave_it: "不爱国就滚"
 BRA_love_it_or_leave_it_desc: "Unimplemented"
 BRA_psp_revolution_adhemar: "社进党革命"
 BRA_psp_revolution_adhemar_desc: "新国家体制结束后，巴西就陷入了动荡的党争中。瓦加斯主义者与反瓦加斯主义者，发展主义者与自由市场资本主义者。在永无止境的冲突中，一个政党脱颖而出，而它的领袖——阿德马尔·德·巴罗斯，将领导巴西走向新时代。社进党是一股独特的政治力量，它反对政党政治的立场和民粹主义理念吸引了人们的目光，哪怕它最终无法实现自己的政治理想，巴西政治也将被它永远改变。"
 BRA_UDN_Counterrevolution: "反革命"
 BRA_UDN_Counterrevolution_desc: "作用力总有其反作用力，但瓦加斯、工党及其遍布政府上下的裙带集团糜烂多年而未遇制衡。随着卡洛斯·拉塞尔达正式就职巴西总统，反作用力已汹涌而至。若他们自诩为“革命”，全国民主联盟便是当之无愧的“反革命”。\n\n瓦加斯政治遗产将被彻底清算。高通胀、高负债与贪腐顽疾将成为历史尘烟。对劳工既得利益集团的过度让步将被修正，自由市场终于可以自由扩张。在“乌鸦”的领导下，巴西将拥抱遭压制已久的自由主义与资本主义——这股洪流已席卷而来，从此将再无阻拦。"
 BRA_udn_counterrevolution_inflation_modifier_tt: "§F通胀率：§![UDNcounterRevolutionInflationRate]"
 UDNcounterRevolutionInflationRatePositive: "§R[?BRA_fiscal_inflation_rate|3=]%§!"
 UDNcounterRevolutionInflationRateNegative: "§G[?BRA_fiscal_inflation_rate|3=]%§!"
 BRA_imperial_presidency: "帝王总统"
 BRA_imperial_presidency_desc: "赢则不欺，欺则不赢。若昂·古拉特以为他能靠舞弊当上总统，他错了，错得离谱。卡洛斯·拉塞尔达看穿了他的诡计，借助紧急状态使巴西免于被瓦加斯主义再毒害五年。此刻，乌鸦高踞于巴西利亚的王座之上，有了军方的忠心拥戴，他的统治将稳如泰山。\n\n当然，某些人会对这场胜利大呼小叫，把拉塞尔达比作大西洋彼岸那些无能的法西斯独裁者。真是一派胡言！拉塞尔达可跟这群暴君不同，他的统治更类似古罗马时代：虽为独裁，但接受的是宪法监督，服务的是国家利益。\n\n如今紧急权力在手，拉塞尔达将扫除瓦加斯主义在巴西的残余，消灭其坑蒙拐骗的遗毒，拯救这个国家于水火之中——要想自由永葆，必须时刻警惕。"
 BRA_general_strke_lacerda: "1969年大罢工"
 BRA_general_strke_lacerda_desc: "面对席卷全国的骚乱，拉塞尔达总统正遭遇执政以来最大的危机。总罢工已使社会运转全面瘫痪，试图大幅修改瓦加斯时代劳工法的提案，使总统成为工人阶级的众矢之的。\n\n总统借助警方力量与官方工会试图镇压运动时，国民经济却加速滑向衰退深渊。此刻摆在拉塞尔达面前的选择异常清晰：化解危机，或提前终结政治生命。"
 BRA_general_strke_lacerda_gdp_growth_tt: "§F名义GDP增长率：§!§R[?BRA_strikes_gdp_hit|3=]%§!"
 BRA_latifundos_crisis: "地主危机"
 BRA_latifundos_crisis_desc: "尽管巴西的历史经历了诸多变迁，但有一个群体始终未变。在全国的乡村社区中，大庄园主像他们的父辈和祖父一样，主宰着地方经济和政治。\n\n这种局面导致了贫困的乡村工人爆发了暴力的抗议行动。在这种情况下，政府必须及时介入，避免事态进一步恶化。"
 BRA_countryside_strikes: "乡村暴乱"
 BRA_countryside_strikes_desc: "乡村地区的危机仍在愈演愈烈。政府根本无力应对抗议者。工人与富豪雇佣的暴徒间的冲突日渐频繁。\n\n暴力和抗议活动促使越来越多的人逃往城市，希望能过上更好的生活。如果无法尽快给出解决方案，当前的乱局将继续螺旋失控下去。"
 BRA_the_burning_farmland: "燃烧的农田"
 BRA_the_burning_farmland_desc: "巴西乡村的局势不断恶化。游击队对地主阶层发动了更多的暴力袭击，目前看来，这些反叛者正在逐步占据上风。\n\n如果现在不采取果断行动，肆虐乡村的这场危机只会变得更加血腥。眼下的局面可能会动摇我们的合法性。绝不能让这种情况发生。"
 BRA_minor_agrarian_reform: "不全面的农业改革"
 BRA_minor_agrarian_reform_desc: "最安全的道路是温和的改革之路。为了避免进一步的不稳定，至关重要的是在实施之前仔细思考，并采取小步推进的改革措施。\n\n一些大庄园已经被拆分，部分土地被重新分配给贫困农民。虽然不满的精英和要求更多的农民可能依然会抗议，但目前，紧张局势已经有所缓解。至少暂时如此。"
 BRA_radical_agrarian_reform: "激进的农业改革"
 BRA_radical_agrarian_reform_desc: "要解决困扰巴西乡村的危机，大刀阔斧的改革至关重要。全国范围内的大庄园正在被拆分，分配给贫困农民。一旦完成，这场危机或许终于能迎来终结。\n\n然而，这些措施是在未征求乡村精英意见的情况下推行的，他们对改革公开表示敌对。形势极有可能失控，但畏首畏尾，终将一无所获。"
 BRA_completed_agrarian_reform: "彻底的农业改革"
 BRA_completed_agrarian_reform_desc: "由于政府对乡村危机的强力干预，乡村寡头体系正式瓦解。数十万农民从这场改革中受益，如今他们真正拥有了土地，而不再是依赖富人施舍的佃户。\n\n尽管不满的精英们对这一变革表示抗议，但他们的声音无需理会。失去了土地，他们便不再重要。"
 BRA_the_silent_country: "寂静的国家"
 BRA_the_silent_country_desc: "曾经抗议的呐喊，如今只剩下死寂。凭借宪法赋予我们的权力，愚蠢的乡村共产党人及其肮脏的马克思主义同党终于被彻底镇压。\n\n事实证明，我们的政策在恢复乡村和平方面极为高效。这场胜利早已注定。还有谁胆敢挑战巴西无可匹敌的力量与决心？无人敢犯！"
 BRA_agro_industrial_complex: "农工复合体"
 BRA_agro_industrial_complex_desc: "库比契克的设想如今成为了现实。在没有土地改革的情况下，农业已经成为了巴西经济的重要支柱。\n\n农业公司和事实上的地主控制了绝大部分土地，使得农业产出大大提高了。虽然巴西工党对此颇有微词，但这些政策确实在五年内实现了五十年的发展。"
 BRA_idea_nationwide_chaos_max: "国家瘫痪"
 BRA_idea_nationwide_chaos_high: "全国骚乱"
 BRA_idea_nationwide_chaos_medhigh: "普遍反对"
 BRA_idea_nationwide_chaos_med: "暗流涌动"
 BRA_idea_nationwide_chaos_lowmed: "局势好转"
 BRA_idea_nationwide_chaos_low: "局势稳定"
 BRA_idea_nationwide_chaos_max_desc: "政变的余震瘫痪了巴西，她的子民在尘埃落定后仍头晕目眩。工作岗位无人问津，本该上工的百姓畏缩家中，惧怕可能的打击报复。士兵们仍“尽职尽责”地在街上四处巡逻，一旦被他们怀疑，盯上抓走，就好比人间蒸发，杳无音信。没人知道接下来会发生什么，所有势力似乎都在等待对方出第一口气。"
 BRA_idea_nationwide_chaos_high_desc: "巴西从最初的瘫痪中滑了出来，却陷入了全国范围的恐慌。政权在军政府之手这一事实逐渐展露在大众面前，并且比某些人所想统治时间更为长久，于是游行示威，暴动甚至全面反抗有在全国范围内涌现之势。巴西现在好比火药桶，星星之火便可以燎原。"
 BRA_idea_nationwide_chaos_medhigh_desc: "街道上的气氛稍稍平静下来，军队设法制止了恶劣的示威和暴乱。现在，局势由军方在握；军队再一次毫无顾虑地走上了街道，最为激烈的异见者也已遁入郊区，等待着风头平息。尽管这样，军政府还需要一段时间固化他们的政权，因为只有一小撮人愿意同他们合作。"
 BRA_idea_nationwide_chaos_med_desc: "尽管最难熬的关头已经过去，然而巴西的街道上好似仍笼罩着一层浓厚迷雾，局势依旧扑朔迷离。任何人，或许勇敢到，或许愚蠢到对军政府篡权直言不讳的，都早已人间蒸发。剩下的明哲噤声之士深明与军政府合作要远好过另一种下场：成为另一张无名脸孔，消失不见。"
 BRA_idea_nationwide_chaos_lowmed_desc: "自从政变以来，巴西的局势已经平静了许多。在恐慌中被迫闭门的商店和工厂逐渐在近期重新开张。虽然军队还依然控制着街道，但他们发现自己不用采取常用的粗暴手段便能维持秩序。虽然进展可能缓慢，但巴西人民终于开始接受军政府了。"
 BRA_idea_nationwide_chaos_low_desc: "万物往往能在灾后恢复生机的道理似乎就算在巴西也适用。军政府初期那无处不在的混乱和恐慌早已散去，市民们已经了解并习惯了军队对街道的控制。虽然偶尔仍会发生一些个别的冲突事件，但似乎绝大多数巴西人都满足于岁月静好地过着日子，军政府统治下的生活已经完全正常化。"
 BRA_idea_build_more_roads: "道路建设项目"
 BRA_idea_build_more_roads_desc: "一个大规模的道路建设计划目前正在进行着。巴西各地正在铺设道路，将城市和农村地区衔接起来。如果一切顺利，我国的整体基建状况将会得到显著改善。"
 BRA_idea_formalised_high_command: "正式指挥体系"
 BRA_idea_formalised_high_command_desc: "索邦派对巴西的政治制度留下的最大遗产无疑是其对巴西高级指挥体系的改革。\n\n和许多现代国家不同，我们国家从来就没有什么集权的国防部，它也从未将海陆空三军整合进一个指挥体系。军队内部，全国各地的兵营里端坐着一批地方的军事大佬，他们经常差遣自己的部下为地方利益服务，对巴西国家则置若罔闻。\n\n这些关于一支武备废弛的军队的记忆马上就要变成过去式。在卡斯特洛·布兰科的领导下，一个崭新的最高指挥机关正在迅速地建立起来。战争部得到授权，军队各部门都要向它负责；在军队内部，等级制得到强化；想当初，上校和将军们大摇大摆地争论着上下尊卑，现在却有了秩序和目标。"
 BRA_idea_formalised_high_command_2: "正式指挥体系"
 BRA_idea_formalised_high_command_2_desc: "索邦派对巴西的政治制度留下的最大遗产无疑是其对巴西高级指挥体系的改革。\n\n和许多现代国家不同，我们国家从来就没有什么集权的国防部，它也从未将海陆空三军整合进一个指挥体系。军队内部，全国各地的兵营里端坐着一批地方的军事大佬，他们经常差遣自己的部下为地方利益服务，对巴西国家则置若罔闻。\n\n这些关于一支武备废弛的军队的记忆马上就要变成过去式。在卡斯特洛·布兰科的领导下，一个崭新的最高指挥机关正在迅速地建立起来。战争部得到授权，军队各部门都要向它负责；在军队内部，等级制得到强化；想当初，上校和将军们大摇大摆地争论着上下尊卑，现在却有了秩序和目标。"
 BRA_idea_american_advisor: "美国顾问"
 BRA_idea_american_advisor_desc: "强硬派长期以来一直在呼吁同美国加深合作，以应对里里外外的威胁。我们将邀请美国军事顾问来巴西开展联合训练项目，类似于我们曾在四五十年代举办过的那样。这将深化双边关系并改善我军的训练。"
 BRA_idea_american_advisor_2: "美国顾问"
 BRA_idea_american_advisor_2_desc: "强硬派长期以来一直在呼吁同美国加深合作，以应对里里外外的威胁。我们将邀请美国军事顾问来巴西开展联合训练项目，类似于我们曾在四五十年代举办过的那样。这将深化双边关系并改善我军的训练。"
 BRA_idea_martial_law: "戒严令"
 BRA_idea_anti_trust_laws: "反托拉斯法"
 BRA_Janio_Quadros_hog_desc: "§Y副总统\n民粹保守主义§!\n--------------\n§L无论把这位出生于1917年的雅尼奥·夸德罗斯搁到哪里，他都算得上是一方奇才。他的职业生涯始于1943年，他在圣保罗的但丁学院担任地理教师，因其爱交际的个性和古怪的行为而小有名气。\n\n新国家体制的结束和党禁的重新开放让夸德罗斯得到了足够的支持，于是，他于1950年被基督教民主党选为圣保罗市议员。夸德罗斯的葡萄牙热带主义认同让萨拉查对他青眼有加，后者授予他基督骑士团勋章。1955年，圣保罗选民踊跃支持夸德罗斯，使其赢得市长选举，并最终在1960年的选举中竞选茹拉西·马加良斯的副总统。此时，命运发生了残酷的转折，茹拉西落败，倒霉的夸德罗斯当上了政治对头的副总统。现在，他必须使尽浑身解数，方能保得自身周全。§!"
 BRA_Walther_Salles_for_desc: "§Y外交部长\n自由主义§!\n------------\n§L瓦尔特·莫雷拉·萨莱斯出身世家大族，近水楼台成了个政治家。这在巴西可谓是再常见不过了。萨莱斯出生于1912年，父亲是一位富裕的银行家，他的政治生涯从作为新国家体制独裁时期后期的驻华盛顿巴西大使开始，他的谈判和妥协能力十分不错，给他带来不少名声。他的成功让他与瓦加斯结下了密切的友谊，也让他得以在儒塞利诺·库比契克和洛特的内阁中担任外交部长。\n\n萨莱斯发现自己现在面临着事业的十字路口。他有着无限的资源、广泛的声望与遍布四方的人脉。他考虑未来转向其他工作，比如他的报纸《最后时刻报》或家族银行集团莫雷拉·萨莱斯银行。不过，只要他依然在任，那他就绝对会与想在巴西实行新的独裁统治的任何企图作斗争。§!"
 BRA_Tancredo_Neves_eco_desc: "§Y财政部长\n民族自由主义§!\n--------------\n§L坦克雷多·内维斯是巴西政坛上的著名人物。内维斯口才好，性格也好，是一个有着强烈民族主义的乐观主义者。他的政治生涯始于1935年，那年他作为进步党的市议员当选，但过了几年他的任期就因为新国家政变而中断了。四十年代的大部分时间，他都花在了改善自己的公众形象上——圣保罗的一位可靠律师。\n\n瓦加斯时代后的民主化进程让他加入了社会民主党，他在那里成为儒塞利诺·库比契克的紧密盟友，同时也用自己的人脉保证了政府各部门的稳定。作为经济部长，内维斯是一个做实事的可靠银行家。有些时候，他表示自己未来有成为巴西总统的计划，而他显然能够尽心尽力地履行这一职务。§!"
 BRA_Odilio_Denys_sec_desc: "§Y战争部长\n专制主义§!\n------------\n§L奥迪利奥·德尼斯是个独特的军官——二十世纪早期巴西社会发生的种种事件深刻地塑造了他。德尼斯在旧共和国时代接受了普鲁士式的训练，参加了1930年终结了寡头政府的革命，同时在新国家政变中作为果阿斯·蒙泰罗的亲密盟友，亲身参与了二十世纪上半叶巴西的每一次重大变革。\n\n他的独裁倾向并未使他丧失其强烈的纪律性与责任感。他是恩里克·特谢拉·洛特的朋友，1955年反对儒塞利诺·库比契克的十一月政变爆发后，他是挺身而出反对政变、并使其流产的其中一位军官。如今，奥迪利奥·德尼斯即将退休，他能带着十二分的自豪回顾自己的一生：他是一个在必要的时候做了必要的事情，保护他的国家不受内外威胁的人。§!"
 BRA_Milton_Campos_hog_desc: "§Y副总统\n自由保守主义§!\n------------\n§L对许多人来说，米尔顿·坎波斯已经成了一段甚是遥远的记忆。坎波斯是在共和国长大成人的传统自由主义者，1934年，坎波斯作为进步党成员步入政坛，但不久之后，他的雄心壮志被泼了一盆冷水，1937年新国家政变把他一撸到底，他只得去当巴西联邦储蓄银行的律师。为结束独裁统治，坎波斯与其他自由派政客积极合作，1950年当选众议员，1955年当选米纳斯吉拉斯州州长，他一步步走在成为副总统的道路上。\n\n坎波斯对瓦加斯主义十分厌恶，既因为它的独裁措施，也因为它的民族主义言论。与之相比，他更喜欢一个类似旧共和国这样富有世界主义、自由主义的国家。因此，他计划用自己政治生涯的最后几年努力推动巴西走向政治、社会和经济自由。§!"
 BRA_Alfonso_Arinos_for_desc: "§Y外交部长\n自由保守主义§!\n--------------\n§L阿丰索·阿里诺斯·德·梅洛·佛朗哥是一位完美的巴西知识分子，他悠久的学术生涯始于1927年的里约法学院。在日内瓦收获他第一个博士学位后，他又在蒙得维的亚，巴黎和布宜诺斯艾利斯获得了另外的三个。在政治上，他是三十年代和四十年代初巴西最臭名昭著的白人至上主义者与优生学支持者，但是在看到他的信仰在德国的实践以及欧洲的奴役后，他表示自己改变了想法，摇身一变跻身于巴西反种族主义者和葡萄牙热带主义倡导者的行列，甚至1951年，在他制定的《阿丰索·阿里诺斯法》中宣布种族主义政策为非法。\n\n作为夸德罗斯的外交部长，阿丰索·阿里诺斯制定了“独立自主外交政策”的计划，他认为巴西不应该把自己与OFN或其他什么权力集团捆绑在一起，而是应该在外交上坚持自己的立场，甚至建立自己的势力范围，并在某些方面上与那些亲OFN的国家保持距离。§!"
 BRA_Ernesto_Geisel_sec_desc: "§Y战争部长\n专制主义§!\n--------------\n§L德裔巴西人埃内斯托·盖泽尔一直在军界活跃。盖泽尔在1930年革命中当过兵，1932年反对护宪派，尽管瓦加斯试图同化德裔巴西人，但他却对瓦加斯十分友好。战争期间，他在南里奥格兰德州领导当地的第三军区，因其德国血统受到监视。革命之后，他接受了美国的培训，并成为索邦派中位高权重的一员。\n\n盖泽尔在反对库比契克的政变中保持中立，洛特对他十分信任，把他当做护宪派和索邦派之间的传声筒，有时与他合作一同对付强硬派。现在，作为夸德罗斯的安全部长，盖泽尔准备保护巴西和它的民主免受内部威胁，这些威胁可能来自强硬派，共产党，或是深藏街头巷尾的法西斯渣滓。§!"
 BRA_Vasco_Leitao_da_Cunha_lacerda_for_desc: "§Y外交部长\n自由保守主义§!\n--------------\n§L莱唐·达·库尼亚没什么意识形态偏好，他曾在瓦加斯手下工作，现在又到拉塞尔达麾下干活。自三十年代以来，莱唐一直担任外交官，曾担任巴西驻前苏联大使。对于现在的职位，莱唐比较满意——只要他能自由行事即可。\n\n最重要的是，达·库尼亚想要将巴西与人类力量所孕育出的最优雅的民主国家、OFN领袖、一个自诞生起便赋予人类恩惠与美好的开明国度——美利坚合众国——联系起来，他将努力让巴西同他们的利益紧密相连，因为他们为正义的事业而斗争，而这也是巴西应当为之奋斗的事业。§!"
 BRA_Helio_Beltrao_eco_desc: "§Y财政部长\n自由保守主义§!\n--------------\n§L埃利奥·贝尔特朗是个虔诚的技术官僚，现在他成了巴西经济战略规划中十分重要的一部分。贝尔特朗出生于1916年，毕业于里约热内卢联邦大学法学专业，并在里约热内卢担任规划部长一职后崭露头角。在拉塞尔达崛起后，他进入联邦政府担任类似职务，希望努力放松管制，并在更广泛的范围内推动巴西经济向右发展。§!"
 BRA_Golbery_do_Couto_e_Silva_sec_desc: "§Y战争部长\n专制主义§!\n--------------\n§L戈尔贝里·多·科托-席尔瓦出生在南里奥格兰德的里奥格兰德市，他肚子里一直有些韬略。16岁时，戈尔贝里加入了雷恩戈军校，从此成为一名军官，后来在二战期间成为一名远征军情报官，前往美国。战争结束后，戈尔贝里继续升官，成为索邦派举足轻重的头面人物之一。作为高等军事学院的校长，他提倡建立一支现代化、技术化的军队，将战略和科技的创新作为强军的手段。§!"
 BRA_Virgilio_Tavora_hog_desc: "§Y副总统\n自由保守主义§!\n--------------\n§L即便身处巴西利亚整洁的新官邸，维尔吉利奥·德·费尔南德斯·塔沃拉也不敢松懈片刻。他从自己的叔叔，曾于1955年代表全民盟参选的温和派人士茹阿雷斯·塔沃拉手中接过一项重任：保证总统不会深陷幻想而无法自拔。\n\n任塞阿拉州州长时，他以大兴土木闻名。这些工程得以实施，全赖他以非凡精力和耐心促成与当地社民党的合作。正是这种对话精神，使他在制衡拉塞尔达方面举足轻重——确保这位总统永远不会忘记自己只是一介总统，而非帝王。§!"
 BRA_Vasco_Leitao_da_Cunha_tavora_for_desc: "§Y§!\n--------------\n§L莱唐·达·库尼亚堪称巴西政坛“常青树”，从瓦加斯到拉塞尔达再到如今的塔沃拉政府，凭借灵活的政治手腕，这位政坛不倒翁始终稳坐巴西外交部长之位，与那个他认为巴西唯一值得关注的超级大国保持良好关系。\n\n经历大罢工与种族冲突的双重冲击后，达·库尼亚正施展毕生功力向美国证明巴西对自由民主的忠诚。凭借之前在国务院积累的人脉，华盛顿方面仍对达·库尼亚保持支持——前提是巴西继续为“正义事业”而战。§!"
 BRA_Helio_Beltrao_tavora_eco_desc: "§Y§!\n--------------\n§L作为虔诚的技术官僚，埃利奥·贝尔特劳感受到前总统拉塞尔达的倒台如同肋间插刀。他既未能说服巴西民众接受放松管制，也没能在总罢工期间协助拉塞尔达镇压工会，如今只能眼睁睁看着塔沃拉与左翼政党达成协议，把国家经济命脉攥得更紧。\n\n贝尔特劳坐在办公室里，所有计划都锁在文件柜和保险库里，吃灰吃到天长地久。所谓的部长职责，只剩下机械地批阅公文，以及明知无效却不得不提的反对意见。他反复回想自己的失策与败绩，在最低落时，永远能看到远方的海市蜃楼——那个他无力实现的自由市场巴西。§!"
 BRA_Golbery_do_Couto_e_Silva_tavora_sec_desc: "§Y§!\n--------------\n§L尽管心中对前总统拉塞尔达仍存敬意，但到了需要解除其职务时，戈尔贝里·多·科托-席尔瓦并未回避责任。拉塞尔达未能解决总罢工问题，执政方式还催生了种族骚乱。若允许他处理这第三次危机，科托-席尔瓦与索邦派都担心激进势力会抬头。\n\n战争部长坚守岗位，密切监视着塔沃拉。此人看似理智，愿意为维持国家稳定做出妥协。但科托-席尔瓦始终保持着警惕。他大体认同塔沃拉的言论，要是再罢免一位总统，未免有些丢人。§!"
 BRA_Vasco_Leitao_da_Cunha_adhemar_for_desc: "§Y外交部长\n自由保守主义§!\n--------------\n§L莱唐·达·库尼亚没什么意识形态偏好，他曾在瓦加斯手下工作，现在又到阿德马尔麾下干活。自三十年代以来，莱唐一直担任外交官，曾担任巴西驻前苏联大使。对于现在的职位，莱唐比较满意——只要他能自由行事即可。\n\n最重要的是，达·库尼亚想要将巴西与人类力量所孕育出的最优雅的民主国家、OFN领袖、一个自诞生起便赋予人类恩惠与美好的开明国度——美利坚合众国——联系起来，他将努力让巴西同他们的利益紧密相连，因为他们为正义的事业而斗争，而这也是巴西应当为之奋斗的事业。§!"
 BRA_Benedito_Manhaes_Barreto_eco_desc: "§Y财政部长\n右翼民粹主义§!\n--------------\n§L贝内迪托·巴雷托原先是个工程师，他的首份政府工作是在华盛顿·路易斯的任期担任巴西银行行长。新国家体制到来，他则一直保持着低调的政治形象，为私人银行和企业工作，直至1950年加入了新成立的社会进步党。\n\n作为阿德马尔的经济部长、巴西石油和巴西工业化的鉴定支持者，巴雷托渊博的知识和之前工作中积累的工作经验使他能够利用阿德马尔的影响力和贿赂手段来帮助自己的计划。比起在其他总统手下，这样干活可要方便多了。§!"
 BRA_Amaury_Kruel_sec_desc: "§Y战争部长\n专制主义§!\n--------------\n§L阿毛里·克鲁埃尔是德国移民的孙辈，这人在巴西军队中服役，经历的一切可以说是非常标准的军人：从1924年被遗忘的革命、1930年革命，再到1932年的内战，最后是二战——克鲁埃尔在英国战场指挥远征军。战争结束后，克鲁埃尔成为反法西斯、反共产主义的领头羊，他发展诸多线人，列出大量的嫌疑人名单，毁掉了许多人的未来。\n\n虽然克鲁埃尔有自己的打算，但大多数时候，他的行为都会受到当地寡头和友好政客的影响。五六十年代的军事政变中，他都与高等战争学院的军官们合作。人们普遍认为他的部门和洛特计划势同水火，它推动了军队政治化，并促进了与外国——尤其是美国——特工的合作。§!"
 BRA_Luis_Gonzaga_Novelli_Junior_for_desc: "§Y外交部长\n右翼民粹主义§!\n--------------\n§L小路易斯·贡萨加·诺韦利和阿德马尔的履历惊人地相似：都来自圣保罗，都在里约拿到医学学位，都参加过1932年圣保罗起义，后来还在阿德马尔手下当了圣保罗副州长。\n\n在他娶了欧里科·加斯帕尔·杜特拉元帅的继女后，这位老将军就不断向他灌输法律与秩序的理念，以及维持对德友好关系的重要性。现在他和菲林托·穆勒一起在社进党内领导一个立场强硬的亲德派。\n\n现在，外交部正在物色一位熟悉德国的部长。在社进党中，没有人能比诺韦利更胜任这一职务了。§!"
 BRA_Tancredo_Neves_hog_desc: "§Y幕僚长\n民族自由主义§!\n--------------\n§L坦克雷多·内维斯是巴西政坛上的著名人物。内维斯口才好，性格也好，是一个有着强烈民族主义的乐观主义者。他的政治生涯始于1935年，那年他作为进步党的市议员当选，但过了几年他的任期就因为新国家政变而中断了。四十年代的大部分时间，他都花在了改善自己的公众形象上——圣保罗的一位可靠律师。\n\n瓦加斯时代后的民主化进程让他加入了社会民主党，他在那里成为儒塞利诺·库比契克的紧密盟友，同时也用自己的人脉保证了政府各部门的稳定。作为经济部长，内维斯是一个做实事的可靠银行家。有些时候，他表示自己未来有成为巴西总统的计划，而他显然能够尽心尽力地履行这一职务。§!"
 BRA_Edna_Lott_hog_desc: "§Y副总统\n进步主义§!\n--------------\n§L埃德娜·洛特出生于1919年，她的性格可以用塞巴斯蒂昂·内里的文字来诠释：“甜美迷人，她的语言与魅力使人陶醉。”埃德娜出身于一个拥有军事传统的家庭，在洛特任期期间，埃德娜的工作在保守和进步派的妇女运动中取得了一定影响力，她于是自然而然地成了支持光谱极广的女性候选人。\n\n埃德娜是坚定的民主派，支持文官政府领导军队的既定认识，支持女性参政。如果要说埃德娜·洛特有什么过人之处，那就是她不会对别人的侮辱听之任之。§!"
 BRA_Hermes_Lima_for_desc: "§Y外交部长\n左翼民粹主义§!\n--------------\n§L在埃梅斯·利马看来，政治就像足球，某个家伙进了一支队，这好像象征着他加入了政坛；到后来他又可以通过一系列谈判加入对手的球队。利马起初是进步律师，1935年共产主义政变失败后因同情左派而遭到逮捕，但随着民主化的进行，利马在各个政党间来回跳槽，直至1953年在圣地亚哥·丹塔斯的影响下加入了瓦加斯主义的巴西工党，最终成为洛特手下的劳工部长。\n\n现在，他当上了外交部长，利马支持阿丰索·阿里诺斯关于独立自主外交政策的设想，它要求巴西不受欧洲和北美统治者的束缚，而是建立自己的势力范围，与共荣圈、团结协定和OFN进行贸易。这能否实现，取决于他的承诺能否兑现，或者巴西在可预见的未来是否仍将待在美国的保护伞之下。§!"
 BRA_Celso_Furtado_eco_desc: "§Y财政部长\n左翼民粹主义§!\n------------\n§L当巴西人讨论起经济政策时，他们大多会想起塞尔索·富尔塔多。富尔塔多是二战老兵，战时他在北爱尔兰参加过一些战斗，盟军战败后受召回国。他在各个基金会工作，后来便成为儒塞利诺·库比契克的经济部长，他建立起自己的目标计划，为总统的经济发展五年计划铺平道路。\n\n富尔塔多的目标是把巴西打造成一个强大的国家，要与日本和美国媲美。在这样的国家里，贫穷的人不会忍饥挨饿，富有的人也不会一着不慎、满盘皆输。如果你愿意，你可以将其称之为“爱国和人道的资本主义”。然而，他的计划处处碰壁，政府腐败和专业劳动力的缺乏不断地侵蚀着他那张宏伟的蓝图，使之无法实现既定的目标。不过，富尔塔多坚信他的梦想能够实现。只要付出足够的努力，那么强大的巴西就不只是存在于未来，而是产生于现在。§!"
 BRA_Argemiro_de_Assis_Brasil_sec_desc: "§Y战争部长\n专制主义§!\n--------------\n§L阿热米罗·德·阿西斯·布拉西尔是个彻头彻尾的军人，他的一生充斥着权力斗争、革命与争议。1907年他生于卡诺阿斯，1932年以中尉身份参加护宪革命；革命失败后，他逃亡葡萄牙，度过两年时光。法西斯主义在欧洲肆虐，让他对巴西的未来十分担心。但回国仅一年之后，新国家政变就爆发了，他也愈发忧虑。不过现在，他不再是无名小卒。作为巴西颇具影响的军方领袖，他希望巩固军方对现任政府的认可——尽管私下里，他表示过这种行动很难成功。§!"
 BRA_Joao_Goulart_hog_desc: "§Y副总统\n$progressivism_social_republicanism_subtype$§!\n--------------\n§L若昂·贝尔肖尔·马克斯·古拉特生于一个亚速尔移民家庭，四十年代中期热图利奥·瓦加斯来到他的家乡南里奥格兰德州度假，当他选中古拉特当他的政治门徒时后者已经长大成人。\n\n[Root.GetLeader]胜选之后，绰号“杨戈”的古拉特现在在他手下工作。他打算尽己所能，运用自己的职权造福巴西人民，提振巴西经济，同时实现自己的政治野心，让瓦加斯为他骄傲。§!"
 BRA_Francisco_Negrao_de_Lima_for_desc: "§Y外交部长\n自由主义§!\n--------------\n§L内格朗·德·利马1933年作为议员迈入政坛，1935年他升任高官，后来在1941年新国家体制期间担任了巴西驻委内瑞拉大使。内格朗是瓦加斯的天然盟友，曾在戈梅斯政府担任瓜纳巴拉州州长，还当过儒塞利诺·库比契克的司法部长。\n\n库比契克再度当选，内格朗被从巴西驻伊比利亚大使馆召回来继续主持工作。新官上任的他决定保持正统的外交态度，在巴西的独立主权与美国、伊比利亚与其他拉丁美洲国家的合作间保持平衡。若要用一个词来形容他的任期，那就是“稳扎稳打”。§!"
 BRA_Roberto_Campos_eco_desc: "§Y财政部长\n民族自由主义§!\n--------------\n§L罗伯托·坎波斯此人是个技术官僚，经济观点偏右，现在他是库比契克经济规划政策中的重要人物。坎波斯在美国接受教育，他对美国和美国制定的财政政策——财政责任、平衡预算，以及控制政府开支——都产生了好感。坎波斯曾任巴西驻美国大使，他希望通过稳定的货币和低利率保证巴西经济的自然增长。§!"
 BRA_Peri_Constant_Bevilacqua_sec_desc: "§Y战争部长\n专制主义§!\n--------------\n§L佩里这人干过的事数不胜数，第一件大事是在1930年革命期间帮助奥古斯托·塔索·弗拉戈索废黜华盛顿·路易斯，从而避免了内战。新国家体制早期，佩里在陆军元帅杜特拉手下工作，在巴西沿海地区负责组织防御，防止德国入侵。五十年代，他是同洛特一同阻止对儒塞利诺·库比契克发动的篡权政变的军官之一。\n\n现在他当上儒塞利诺的安全部长，佩里计划维持军队秩序，遏制强硬派，保护巴西的利益不受内外敌人的侵害。§!"
 BRA_Augusto_Frederico_Schmidt_for_desc: "§Y外交部长\n自由主义§!\n--------------\n§L奥古斯托·弗雷德里科·施密特1906年4月18日出生于里约热内卢，是库比契克总统内阁中一位非常独特的人物。作为巴西帝国最富有的人之一施密特子爵的孙子，施密特首先是一位艺术经理人与知识分子。他以财富和冒险闻名，比如说他有自己的书店和足球俱乐部博塔福戈。不过，巴西人民最熟悉的是他饱含现代主义和忧郁风格的诗集。他放浪不羁的生活方式和现代主义理想很快吸引了年轻的儒塞利诺·库比契克，他很快成为库比契克的支持者、盟友和密友。\n\n这最终使施密特在库比契克总统任内被任命为巴西驻OFN的官方大使，并担任总统首席外交政策顾问，成为库比契克泛美外交行动的策划者。现在，他实现了成为巴西外交部长的梦想，他将与库比契克一同努力，使巴西跻身世界大国之列。§!"
 BRA_Pascoal_Ranieri_Mazzilli_hog_desc: "§Y临时总统\n过渡政府§!\n--------------\n§L马齐利是个老兵，1932年参加了反对热图利奥·瓦加斯的护宪革命，后来在1942年获得了他第一个联邦级别的职位——国家公共财政司司长。民主化之后，他于1950年被社民党选举为联邦代表，洛特政府时取得连任。\n\n随着国家陷入危机，马齐利被委任为奥罗·德·莫拉·安德拉德领导的巴西政府首脑。他并无恶意，不会对民主构成威胁——也不会成为民主的大救星。他整天总是想啊想啊，如果不去看那些问题，那它们可能就会凭空消失吧。§!"
 BRA_Auro_de_Moura_Andrade_hog_desc: "§Y联邦参议院议长\n过渡政府§!\n--------------\n§L奥罗·德·莫拉·安德拉德出身圣保罗最牛逼的几大资本寡头家族之一，这人从小就知道自己该干什么，也知道自己该去哪儿。之前他与瓦加斯政权的审查措施作对，他名下的两家报纸《投票箱》(A urna)与《民主日报》(O Democrata)都因此被禁。1950年他当选进入政府，由国家工党跳入社民党，并最终于洛特执政期间当选参议院议长。\n\n作为一名伟大的演说家，安德拉德以十足的勇气担起万钧重担，宣布了使卡斯特洛·布兰科登上总统宝座的军事政变。现在，他成了元帅的副手，他希望在这段政治清洁期之后，文明和法治都会回到巴西。当然，他的希望当然是对的——但思考了一段时间之后，他又觉得他可能做了一些过于出格的事情，哪怕是他自己，恐怕也无法幸免其间。§!"
 BRA_Juracy_Magalhaes_for_desc: "§Y外交部长\n自由保守主义§!\n--------------\n§L茹拉西的政治生涯始于1930年革命，其时他在东北与忠诚派作战。1931年，他被任命为巴伊亚州州长，1934年他继续当选，直到1937年新国家体制建立，茹拉西宣布辞职，从此与瓦加斯不共戴天。随着独裁统治的终结，他和其他人一同创建了全民盟。\n\n军事政变后，卡斯特洛·布兰科任命茹拉西为外交部长。他的外交立场用一句话就能概括：“对美国好的，对巴西也好。”这反映出新政府中许多人的心态，巴西应该与自由世界的领袖一起维护他们在美洲的利益。§!"
 BRA_Filinto_Muller_hog_desc: "§Y副总统\n军政府§!\n--------------\n§L穆勒，大名鼎鼎的“酷吏”，因在瓦加斯统治期间担任政治警察领导人而臭名昭著。出生于1900年的菲林托·穆勒参加过圣保罗起义，随后被认为是逃兵而遭到驱逐。最后，他在政警两界找到自己的位置，并在执业中不断积攒政治影响力；从一个严厉的警察局长，到瓦加斯手下新国家的总设计师，甚至在瓦加斯死后，他还能在社民党政府的参议院中崭露头角。穆勒同情德国，经常利用自己在现政权中的影响力和地位，引导政策往亲德、专制的方向发展。§!"
 BRA_Delfim_Netto_eco_desc: "§Y财政部长\n自由主义§!\n--------------\n§L“德尔芬·内托是谁？”当他被任命为财政部长时，这个疑问就是众人的反应。二十世纪六十年代初，德尔芬·内托作为圣保罗的计划部部长，建立起足够多的关系，进而赢得了卡斯特洛·布兰科的欢心。在布兰科政变后，他被任命为内阁成员。\n\n德尔芬·内托凭借其邪恶的腐败程度、裙带关系与广泛的关系网而闻名。§!"
 BRA_Siseno_Ramos_Sarmento_sec_desc: "§Y战争部长\n军政府§!\n--------------\n§L西塞诺是巴拉圭战争老兵的儿子，1923年参军服役，参加了1930年革命，1932年帮助镇压护宪派运动。尽管在整个三十年代，西塞诺一直是个整合主义者，但不知怎么，他却在二战期间被任命为驻英国巴西军队的统帅，不得不说有些讽刺。此后，他成了众所周知爱惹乱生事的家伙，曾支持1955年试图阻止儒塞利诺·库比契克掌权的政变。\n\n现在，萨尔门托是科斯塔-席尔瓦政府的安全部长，同时也是普利尼奥·萨尔加多与新政府之间的桥梁。为保卫新政府不被军队推翻，他不惜挥起屠刀。§!"
 BRA_Pedro_Aleixo_hog_desc: "§Y众议院议长\n右翼民粹主义§!\n--------------\n§L和典型的米内罗人一样，佩德罗·阿莱绍走的是一条传统仕途路线：出身米内罗·吉拉斯大学法学院，继而踏入政界。年轻时的他意气风发，在担任贝洛奥里藏特市议员期间，便投身于1930年的自由派革命，加入了“米内罗革命联盟”。\n\n仕途正值上升期，瓦加斯却突然解散国会，一举击碎了这位年轻议员的政治雄心。心怀不满的他签署了《米内罗宣言》，并成为全国民主联盟的创始人之一。如今他年事已高，却未曾料到，瓦加斯一派竟能如此迅速重返权力中枢。但或许，凭借纳特尔和他在众议院的影响力，足以让这段与劳工派的蜜月时光，仿佛从未发生过。§!"
 BRA_Evandro_Lins_e_Silva_for_desc: "§Y外交部长\n进步主义§!\n--------------\n§L埃万德罗·林斯虽生于皮奥伊州，却是个地地道道的伯南布哥人。他出身法律世家，父亲是市政法官，他的童年因此辗转于马拉尼昂与伯南布哥之间。后来，他赴里约攻读法律，成为一名传媒律师。与多家报社长期合作的经历，拓宽了他的视野，也逐渐塑造出一种更具“世界公民”气质的风格——直到1944年，他加入了巴西检察官协会。\n\n尽管他曾是《米内罗宣言》的签署者之一，但随着对瓦加斯式民粹主义的认同日益加深，林斯最终脱离全国民主联盟，转投巴西社会党。他甚至曾在法庭上为《最后时刻报》辩护，对抗拉塞尔达。虽然毫无外交经验，他却坚信自己能胜任外交部长一职，为巴西利亚带来更为独立的外交战略。但正如许多人所担忧的那样，他或许依旧太过怯懦和稚嫩，难以真正摆脱那场“大博弈”的羁绊。§!"
 BRA_Vasco_Leitao_da_Cunha_for_desc: "§Y外交部长\n自由保守主义§!\n--------------\n§L年少时，瓦斯科·达·库尼亚曾怀抱戏剧梦；然而，这位里约人最终走上的，却是一段丝毫不逊舞台的外交人生。如今，他已贵为外交部长，而他毕生的追求，正是在这座大舞台上挽回巴西的尊严——将她从团结协定那无底的恶意中解救出来，重新归入美利坚的羽翼之下。\n\n1927年开启外交生涯后，他曾以二等秘书的身份驻节利马、里斯本与布宜诺斯艾利斯，也曾派驻查科，参与当地维和事务。其后晋升为一等秘书，更赢得瓦加斯的信任，于1942年出任代理司法部长，率先推动巴西的亲美政策。从那以后，他始终坚定站在奥斯瓦尔多·阿朗雅所领导的OFN亲美派一方。时至今日，这一立场依然毫不动摇。§!"
 BRA_Ignacio_Rangel_eco_desc: "§Y财政部长\n专制主义§!\n--------------\n§L伊格纳西奥·兰赫尔出身马拉尼昂的法律世家，年轻时曾阅读过许多马克思的著作，因而在日后成为了激进左派的一员。他的父亲是一名地方法官，思想上持有反政府的倾向。1935年，伊格纳西奥已经是巴共党员，受其父影响，时年21岁的他加入了普列斯特斯的起义，失败后被关进了圣路易斯监狱，此后又被转移到里约继续关押。在那里，他与其他数名囚犯成立了一个读书俱乐部。\n\n1937年，兰赫尔获释出狱，回到了马拉尼昂州，在瓦加斯的新国家体制时期受聘于生产阶级会议，撰写文字资料。后来，他在里约与罗慕洛·阿尔梅达会面相识，以此为契机跻身瓦加斯的经济顾问团，参与策划了巴石油、巴西电力公司等一系列国家项目，转任巴西开发银行经济主管。如今，总统换成了洛特，而兰赫尔已经看清了最为严峻的未来：只有农业改革才能未雨绸缪、避免恶性通胀的危机，空洞的承诺可什么都做不到。§!"
 BRA_Alfeu_de_Alcantara_Monteiro_sec_desc: "§Y战争部长\n专制主义§!\n--------------\n§L阿尔费乌在南里奥格兰德州长大，于1941年考入雷亚伦戈军校，后转入航空部门深造，取得飞行员资质。尽管从未亲赴前线，但在第二次世界大战期间，他曾派驻于巴西各地多个空军基地，见证了那场全球战争的边缘回响。战后，他凭借资历晋升为空军上尉，并常驻纳塔尔空军基地，担任B-25轰炸机的教官至今。\n\n他之所以被任命为安全部长，正是因其在对待巴西工党问题上表现出的“去意识形态”立场——在政治分野鲜明的军界，这样的态度尤为罕见。事实上，早在上任之前，阿尔费乌便已对空军内部的权谋勾结深感厌倦。如今，权柄在握，或许是时候让那些我行我素的飞行员明白：宪政秩序，值得他们认真敬畏。§!"
 BRA_Rubens_Paiva_hog_desc: "§Y副总统\n进步主义§!\n--------------\n§L对于巴西工党元老鲁本斯·派瓦而言，与一位政治光谱相左、观点对立甚至性格迥异的保守派总统共同执掌高原宫，这似乎是一种奇特的安排。事实的确如此，但老话说得好，宁要糟糕的协议，不要激烈的斗争。\n\n人们素知派瓦不与右翼为伍：他在大学时期曾投身学生运动，后来又拥护瓦加斯的国有化运动，他在众议院的演讲中对德国代理人阿德马尔和政变辩护者拉塞尔达颇有微词。然而，办公室内左翼同僚日渐稀少时，他也不得不尝试与右翼共事，否则就要独自承担失败的苦果。§!"
 BRA_Jose_Richa_eco_desc: "§Y财政部长\n自由保守主义§!\n--------------\n§L作为共和国成立以来最年轻的财政部长，36岁的黎巴嫩移民之子若泽·里沙堪称巴西政治史上的传奇。多数总统或许会担忧自己任命这种人是给自己背上政治包袱，但内伊·布拉加却将挽救国家经济于深渊的重任，托付给了这位基督教民主党的坚定盟友。\n\n他虽缺乏政坛老将的资历，却以对经济事务的钻研，尤其是农学领域，弥补了自己的不足。尽管怀抱鲜明主张，但巴西利亚的从政经历也磨砺出他审时度势的思维。而妥协终将不可避免——要渡过这场危机，整个国家机器都需同心协力。§!"
 BRA_Ernesto_Geisel_Braga_sec_desc: "§Y战争部长\n专制主义§!\n--------------\n§L尽管战争部这个名字看似强调军事，但这个部门既要掌管军事，也要管理秩序。在这方面，埃内斯托·贝克曼·盖泽尔确实是最佳人选。这位索邦派领袖从小接受路德宗教育，在晋升为陆军上将的生涯履历中将纪律意识融入骨髓，以规则为纲正是他的工作方式。\n\n然而，国家秩序的守护者亦有其底线。如果他在军营中的朋友认为政府失职，他很有可能改变立场，届时被打破的将远不止他曾宣誓遵守的规则。此人可以信用，但要记住：军人的忠诚永远附带条件。§!"
 BRA_Magalhaes_Pinto_for_desc: "§Y外交部长\n基督教保守主义§!\n--------------\n§L很少有人像若泽·德·马加良斯·平托这样知晓自身的价值。这位1943年因联署《米纳斯吉拉斯宣言》遭银行业封杀的银行家，仅用两年就成为全民盟联邦议员，数十年后更是成了全民盟波萨诺瓦派的代表人物。如今的他在无数次的政商角色转换中参透了权力场的游戏——他不再只是某个党派的喉舌，更是巴西在世界舞台的代言人。\n\n外界常因平托强硬的国家观质疑他缺乏伊塔马拉蒂宫所需的游刃有余，但事实恰恰相反：当文件呈递至案头，他只会做出最务实的选择，毕竟，再好的决定也总会得罪一些人。与马加良斯·平托周旋须慎之又慎：从第一通电话开始，你们的博弈便再无规则可言。§!"
 BRA_Oscar_Dias_Correia_eco_desc: "§Y财政部长\n自由保守主义§!\n--------------\n§L或因威压感，或因陌生感，现代性总是令许多人感到一丝寒意。但在奥斯卡·迪亚斯·科雷亚眼中，所谓的“资本霸权”从不是通往财政部长之位的阻碍。如果说有何特别，正是在体制内游刃的智慧令他平步青云，更重要的是，让这位昔日的作家在文学院赢得一席之地，对此他从不羞于炫耀。\n\n科雷亚为全国民主联盟打拼了数十载，更喜欢自称“反对社会主义”，即便曾在平托副总统主政米纳斯吉拉斯州时担任教育部长，他依然不改好大喜功的作风。在其构想中，巴西危机皆可以自由市场的教条化解，这般对教条的尊崇能否救国尚待观察，但若最终走向失败，他的政治成就恐将永远蒙尘。§!"
 BRA_Jurandyr_De_Bizarria_Mamede_sec_desc: "§Y战争部长\n专制主义§!\n--------------\n§L自古以来，掌握军权的人往往并非温和友善之辈，只有愿意为事业献身的人才能成为优秀的指挥官。茹兰迪尔·德·比扎里亚·马梅德正是这样的军人——即使在库比契克和瓦加斯执政的鼎盛时期，他仍坚持反瓦加斯立场。如今随着拉塞尔达总统将巴西带离毫无原则的民粹主义道路，马梅德也成为战争部长，肩负起抵御外敌、镇绥内乱的双重使命。\n\n作为推动洛特掌权的关键人物，马梅德并非鲁莽匹夫，但他在维护所谓正义时可不会手软。这位曾在葬礼上公开呼吁罢免库比契克的将军，终将成为政坛不可或缺却难以驾驭的政治工具。§!"
 BRA_Juracy_Montenegro_Magalhaes_for_desc: "§Y外交部长\n自由保守主义§!\n--------------\n§L茹拉西·马加良斯从军出身，曾任巴伊亚州长，是正统的尉官派成员。他曾在瓦加斯独揽大权时坚定追随，如今又在拉斐尔的核心权力圈出任外交部长。作为当年试图终结第一共和国门阀政治的温和派人士，他曾寄希望于依附瓦加斯派推动改革，最终却成为新国家体制的得力干将，以“打压整合主义者的铁腕悍将”闻名一时。\n\n时过境迁，如今的马加良斯成为全民盟内部中间派“务实派”领袖，将圆滑的处事手腕带入政党政治，一面斡旋于各派系间，一面主张强化美巴同盟。面对极右翼“谄媚外邦”的指责，这位老牌政客从未动摇——他自认问心无愧，毕竟在冷战阴云下，巴西唯有与值得依赖的盟友携手，才能搏得一线生机。§!"
