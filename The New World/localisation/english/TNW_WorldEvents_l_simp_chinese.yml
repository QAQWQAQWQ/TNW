##### #SPA-basque_war# #####
 Spa_WORLD.1.t:"巴斯克战端再起"
 Spa_WORLD.1.d: "位于坎塔布连海海域的多日紧张对峙在今日最终爆发，随着巴斯克与西班牙两方海军舰艇相撞，局势骤然升级，\n\n今日凌晨，西班牙海军驱逐舰向巴斯克首都发射导弹，巴斯克与西班牙边境也发生大规模交火，在爆炸袭击发生后，大日耳曼国与法兰西国相继对西班牙的攻击行为进行谴责，并在边境集结兵力，并表示随时响应盟友巴斯克共和国的呼唤，\n美国国防部发言人表示双方都应进行克制，以谈判而非武力来管控局势，但据情报显示，驻西班牙美军已经进入一级战备状态"
 Spa_WORLD.1.a: "联系五角大楼 密切关注德国人动向"

 