 USA_CIA_Magadan_Port:0 "建设马加丹港"
 USA_CIA_Magadan_Port_desc:0 "我们将接触俄罗斯法西斯党，要求以帮助建立港口为交换，在未来推行进一步的经济合作。"
 USA_CIA_Magadan_1_tt:0 "§G这将改善我们补给马加丹的能力，允许我们在该地区进行其他行动。§!\n"
 USA_CIA_Magadan_Increase_Support:0 "在[MAG.GetNameDef]增加支持"
 USA_CIA_Magadan_Increase_Support_desc:0 "我们会拿出好几大笔贷款来帮助[MAG.GetNameDef]的俄罗斯法西斯党，他们可以用这笔钱来谋取自身的利益。"
 USA_CIA_Magadan_2_tt:0 "§G允许马加丹的俄罗斯法西斯党选择接收更多援助。§!\n"
 USA_CIA_Magadan_Military_Instructors:0 "加强马加丹的顾问实力"
 USA_CIA_Magadan_Military_Instructors_desc:0 "我们会向马加丹派遣更多特工，采用我们的军事学说，帮助他们训练部队，操练演习。"
 USA_CIA_Magadan_3_tt:0 "§G马加丹的军队素质将会提高。§!\n"
 USA_CIA_Magadan_Arms_Shipment:0 "向马加丹输送武器"
 USA_CIA_Magadan_Arms_Shipment_desc:0 "若是要给我们在马加丹的盟友送去援助，最直接的方式便是送去他们赖以生存的武器。日本人给马加丹的敌人送去了装备，我们自然也不应该落后。"
 USA_CIA_Magadan_Support_Reformists:0 "支持[MAG.GetNameDef]的改革派"
 USA_CIA_Magadan_Support_Reformists_desc:0 "[MAG.GetNameDef]的俄罗斯法西斯党改革派与我国的利益高度一致，因此我们必须加强双方的合作共赢。"
 USA_CIA_Magadan_Suporting_Reformists_tt:0 "§G我们会支持俄罗斯法西斯党的改革派。§!\n"
 USA_CIA_Magadan_Increase_Presence:0 "加强[MAG.GetNameDef]的美国影响力"
 USA_CIA_Magadan_Increase_Presence_tt:0 "§G将在[MAG.GetNameDef]解锁更多行动。§!"
