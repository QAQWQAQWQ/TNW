 USA_CIA_IBR_align_caudillo_franco:0 "弗朗西斯科·佛朗哥和安东尼奥·德·奥利韦拉·萨拉查这两位伊比利亚考迪罗在各方面关系甚好。但联盟中并非每个人都对这二位抱有同等尊重。通过各种积极措施，我们可以确保§Y佛朗哥§!统御伊比利亚领导层。"
 USA_CIA_IBR_align_caudillo_salazar:0 "弗朗西斯科·佛朗哥和安东尼奥·德·奥利韦拉·萨拉查这两位伊比利亚考迪罗在各方面关系甚好。但联盟中并非每个人都对这二位抱有同等尊重。通过各种积极措施，我们可以确保§Y萨拉查§!统御伊比利亚领导层。"
 USA_CIA_IBR_aas_aid:0 "伊比利亚联盟是各种恐怖组织和分离主义派系的家园。从巴斯克人到葡萄牙人，每个民族都有他们自己的代表派系，另外还有泛伊比利亚社会主义游击队存在。我们虽然与伊比利亚不是严格意义上的盟友，联盟的持续稳定仍符合我们的利益。我们的情报机构可以向伊比利亚当局提供秘密援助，如此，当这些派系揭竿而起时，伊比利亚也不至于完全解体。"
 USA_CIA_IBR_major_terrorist_op:0 "将发起一项削弱伊比利亚分离主义派的行动。\n"
 USA_CIA_IBR_gibraltar_aid:0 "直布罗陀大坝是整个欧洲最重要的建筑之一，由于德国的无能，它现在无人维护。目前，伊比利亚政府正尝试着让大坝发挥其全部潜能，我们可以在这方面帮助他们。伊比利亚人肯定会为此感激不尽……\n"
