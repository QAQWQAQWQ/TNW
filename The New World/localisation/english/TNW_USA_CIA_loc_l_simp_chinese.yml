 USA_FBI_LATAM.1.t: "关于跨安第斯条约的报告"
 USA_FBI_LATAM.1.desc: "机密\n\n发：联邦调查局局长J·埃德加·胡佛\n呈总统备忘录\n\n主题：玻利维亚贸易谈判\n\n1.玻利维亚、巴西、智利与阿根廷四国政府官员于玻利维亚会晤，就俗称“三方协定”的一系列长期贸易协议展开重新磋商。该协议旨在保障各方能够平等进入利润可观的玻利维亚矿业市场。我国在巴西的盟友意图迫使曾与轴心国交好的阿根廷退出此协议，巩固自身在玻利维亚这个迄今仍保持中立的国家的影响力。而阿根廷方面则期望维持玻利维亚的中立立场，以及该国的贸易开放政策。\n\n2.玻利维亚的矿业对于美国经济，尤其是国防工业，具有举足轻重的地位。尽管此次谈判的进展在短期内不太可能打破这一现状，但玻利维亚的经济与政治稳定受到的冲击极有可能对市场造成严重后果。此外，玻利维亚地处巴西与阿根廷之间不断加剧的地缘政治矛盾的核心地带，这意味着现状的任何变动都可能破坏该地区的稳定，重新引爆两国之间潜在的矛盾。倘若巴西能够获得经济主导权，该国就将在与阿根廷的竞争中占据上风，削弱南锥体地区敌对势力集团的力量。\n\n3.目前，我局正积极筹备利用在玻利维亚精英阶层中建立的人脉关系，确保无论谈判结果如何，该条约都不会损害美国的利益。至于我们是授意联系人推动达成有利于巴西盟友的条约，还是选择维持现状，仍有待商榷。"
 USA_FBI_LATAM.1.a: "忠诚、勇敢、正直。"
 USA_FBI_LATAM.2.t: "与太子的会晤"
 USA_FBI_LATAM.2.desc: "“我的朋友，请允许我再次向你保证，美国完全无需担忧此次谈判。”这位玻利维亚寡头一边说着，一边深吸一口手上的哈瓦那雪茄，吐出的烟雾袅袅升腾，渐渐融入纽约天际线那略显污浊的空气中。联邦调查局特工戴维·阿特利·菲利普斯微微颔首，努力收敛着嘴角的笑意。他与安特诺尔·帕蒂尼奥的这场会面，正按照他预期的方向顺利推进着。帕蒂尼奥贵为玻利维亚锡矿帝国的太子，其父乃人称“安第斯的洛克菲勒”的西蒙·帕蒂尼奥。帕蒂尼奥言简意赅，很快便打消了菲利普斯对跨安第斯条约谈判的诸多顾虑。\n\n“我的玻利维亚同胞绝不敢把你们这些美国佬排挤出国，我们和美国的关系坚如磐石。你把当下的局面当成场上各方在争抢残羹剩饭就行了。”\n\n菲利普斯听完轻声笑了起来：“那是自然，美国对这些残羹剩饭的兴趣可不小。看来，确保我们在巴西的合作伙伴能大获全胜，对美玻双方都是有利无害的好事。”\n\n“这事能办成，但我的朋友，你别太着急，我的祖国内部可是暗流涌动。”帕蒂尼奥直视着菲利普斯的眼睛，脸上的柔和神情渐渐变得严肃起来，“那帮心怀不满的反对派，还有外国来的煽动者，就像地板缝里的蛆虫一样蠢蠢欲动。玻利维亚的中立立场暂时没让这群害虫造成最严重的危害，可要是巴西占了上风……哼，我可不信布宜诺斯艾利斯的那些军头会乖乖在一旁看着。”\n\n“那么，或许签订一份不偏袒任何一方的条约，能确保未来局势的稳定？”菲利普斯说道。\n\n“大概吧……不过，也有可能不管怎样，玻利维亚的好日子都到头了。”帕蒂尼奥耸了耸肩，“我之所以大部分时间都待在你们的酒店，而不是我的庄园里，是有原因的。可不是为了来呼吸美国的新鲜空气的。”哈丁听闻寡头这番话后，沉思了片刻。"
 USA_FBI_LATAM.2.a: "“此等良机绝不能错过，告诉你的盟友们，务必保证巴西人如愿以偿。”"
 USA_FBI_LATAM.2.b: "“打破势力平衡风险过大，还是想办法推动达成更中立的条约吧。”"
 USA_FBI_LATAM.3.t: "关于玻利维亚政局不稳的报告"
 USA_FBI_LATAM.3.desc: "秘密/[?global.date.GetDateStringNoHour]\n\n发：联邦调查局局长J·埃德加·胡佛\n呈总统备忘录\n\n主题：玻利维亚起义\n\n1.玻利维亚已陷入低烈度内战。在针对中立的前寡头政权发动政变后，玻利维亚军队的奥万多将军掌控了政府，使该国投向我国巴西盟友的势力范围。新政权甫一成立，立即遭到叛乱组织和有组织的劳工群体的抵制。该国矿业因罢工和零星暴力活动而陷入停滞。叛乱组织表达了强烈的反美情绪，并对法西斯势力暗表同情。有证据表明，阿根廷和德国等敌对外国势力为其提供了大量支持。维护对玻利维亚重金属矿藏的获取渠道，对美国的战略利益至关重要。\n\n2.据玻利维亚经济精英阶层内部线人收集到的人力情报显示，多年来，阿根廷一直在支持玻利维亚的激进劳工运动，目的在于当该国放弃中立立场时加以利用。众所周知，拉丁美洲存在一个与纳粹勾结的大规模特工网络。从截获的外交电报中收集到的人力情报和信号情报表明，该特工网络在玻利维亚的活动日益频繁。\n\n3.若奥万多政府继续执政，就能保障对美国战略利益至关重要的重金属采矿业的稳定运营，同时有效削弱敌对外部势力对南美大陆持续进行的渗透。我局计划向该政府提供秘密物资援助，具体措施包括组建准军事性质的反叛乱组织，以根除叛乱分子和纳粹间谍。"
 USA_FBI_LATAM.3.a: "忠诚、勇敢、正直。"
 USA_FBI_LATAM.4.t: "野兽出笼"
 USA_FBI_LATAM.4.desc: "尽管联邦调查局内部充斥着繁文缛节和刻板规矩，但像托尼·坡这样的人物，常常让菲利普斯特工觉得联邦调查局与盖世太保之间好像也没什么明显的区别。坡身材魁梧，壮硕如熊，嘴角总是挂着一抹狡黠的微笑，发际线后移，露出油光锃亮的头皮，乍一看更像是个街头混混而非情报官员。而他为这次行动召集来的雇佣兵和恶棍，就算出现在戒备森严的重刑犯监狱里也毫不违和。不过，当下需要的恰是他们这种人。只需看看玻利维亚愈演愈烈的混乱局势，就能明白这个世界有时候就是需要狠狠挨上一记重拳才行。在巴西丛林深处一个隐秘的站点，坡已经开始着手组建一支准军事部队，准备对玻利维亚进行干预。他把滋滋作响的雪茄烟头在桌上摁灭，此时，院子里传来的打斗呼喝声，为这番略显压抑的场景增添了几分恰到好处的氛围。\n\n坡冲着菲利普斯咧嘴一笑，那笑容像极了豹子，随后他盯着菲利普斯的眼睛说：“事前训练肯定相当艰苦，但我敢打赌，赤道南边最顶尖的杀手已经都在我这了。现在，就等着把他们派去对付敌人了。”菲利普斯点了点头。这个问题他已经琢磨好一阵子了。可惜，联邦调查局在玻利维亚的资源实在有限。\n\n最简单的做法是，让坡的手下到乡间搜寻叛乱分子，让那些支持叛军的人心生恐惧。但话又说回来，最近有证据表明，另一个威胁正悄然浮现：一个潜伏在玻利维亚境内的德国特工网络，正在训练他们自己的敢死队。正如那句老话所说，有时候，你得用怪物来对付怪物。"
 USA_FBI_LATAM.4.a: "“你要去的地方有的是欠收拾的硬骨头。”"
 USA_FBI_LATAM.4.b: "“希望你的手下已经准备好踏上猎杀纳粹的狂野征程了。”"
 USA_FBI_LATAM.5.t: "误入歧途"
 USA_FBI_LATAM.5.desc: "阿尔瓦罗在泥泞中奋力爬行，指甲深深抠进那湿透的泥土里。“求求您了……”他喃喃低语，与其说是在请求身后步步紧逼的追捕者放过自己，不如说是在祈求上帝的垂怜。追捕者带着一种近乎戏谑的残忍，大步踏过脚下的泥地。“求求您了……”他声音微弱，试图拖着断腿挣扎起身，继续挪动。“求求您了……”他哽咽着抽泣，话未说完，追捕者已一脚跨过他的身体，一颗.38口径的子弹精准地射穿了他的头颅。\n\n“差不多得了，”托尼·坡冷冷说道，“别他妈在那玩弄你的猎物了。”那名雇佣兵微微一笑，耸了耸肩，转身返回酒吧。坡悠然地点上一支雪茄，深吸一口，随后将雪茄掐灭装进袋子里，生怕留下任何自己来过的痕迹，然后也迈步走进了酒吧。他负责断后，掩盖同伴们的行踪。坡跨过另一名罢工者的尸体，在这群工人常去的酒吧里，这场屠杀就像打靶练习一样易如反掌：一半人根本没反应过来，另一半人则毫无还手之力。那些掏出了枪的人，也因醉酒而无法瞄准。今晚，坡的手下仅有一人受伤。\n\n一名雇佣兵已在南边的墙壁上喷好了屠杀替罪羊的标记。手持燃烧的火把作画时，他格外小心，生怕他的大作被别人误认成其他的标志，而它只能是玻利维亚长枪党——或者什么组织的徽记。坡已经忘了他们叫什么名字，他也懒得管；重要的是那个标志，他已深深印在脑海里，也知道作画的人同样清楚。等警察赶到时，坡的手下早就消失得无影无踪。\n\n首批应急人员迅速封锁了街道，尽可能地保护犯罪现场的原貌。赶到的侦探很快在酒吧前门两侧发现了弹壳，与二战时期遗留下来的枪支相匹配，正是长枪党不知从哪里弄来的那种。关于凶手曾受联邦调查局训练的传言，在这些铁证面前逐渐烟消云散。"
 USA_FBI_LATAM.5.a: "这让人们在支持美国所青睐的独裁者时更感安心。"
 USA_FBI_LATAM.6.t: "脆弱的同盟"
 USA_FBI_LATAM.6.desc: "“他绰号黑骑士，”托尼·坡说着，随手把报告甩到了联邦调查局探员的办公桌上。后者拿起报告，凑近台灯仔细查看——在这间灰尘弥漫、烟雾缭绕的后室里，台灯和天窗是为数不多的光源，要是没有它们，这里就将陷入伸手不见五指的黑暗。“这人是个大毒枭，主要贩卖可卡因，也搞点枪支走私，还有一整队飞机在各大洲之间来回穿梭，而且他手里的机场也不少。自从我们打听到他的另一个绰号后，就把他列入了观察名单，那是个没人敢当他的面叫出来的名字。”\n\n“黑太阳。”戴维·阿特利·菲利普斯边说边扶了扶眼镜，匆匆扫了一眼报告。\n\n“没错。有这样的外号，我猜他肯定和德国那边有点联系。我们接着深挖，嘿，他还真和几个纳粹高层扯上了关系。”\n\n“是阿勃维尔？”\n\n“差不多就是那群人。反正，我在他的组织里安插了眼线，他说那帮纳粹正在算计他，好像是欠税之类的破事儿。”坡凑近了些，“像他这种人，眼里只有钱。可在纳粹手里，他都快被榨得干干净净了。”\n\n菲利普斯透过缭绕的雪茄烟雾盯着坡看：“你的意思是，我们要出手帮他一把？”\n\n“见鬼，你们以前又不是没干过这种事。”\n\n“那回不一样。那回是……”菲利普斯话说到一半，突然停住了。坡注意到他的眼神在左右游移，显然是在心里权衡利弊，最后他还是妥协了：“行吧，行吧。”他把报告推了回去，“但切记要低调行事，我们可不想让德国人知道美国插手了。还有，得确保我们在需要的时候能把他除掉。”"
 USA_FBI_LATAM.6.a: "“别紧张。”坡说道，“我懂你意思，不会出什么乱子的。”"
 USA_FBI_LATAM.7.t: "巴拉圭政权现状"
 USA_FBI_LATAM.7.desc: "秘密/[?global.date.GetDateStringNoHour]\n\n发：联邦调查局探员阿吉\n呈总统备忘录\n\n主题：巴拉圭现状\n\n1.由法西斯强人伊希尼奥·莫里尼戈统治的巴拉圭，仍持续威胁着我国在南锥体地区的利益，也成为了纳粹渗透的突破口。不过，该国内部却虚弱不堪，法西斯政权倚仗的支持力量，远没有最初设想的那般忠诚可靠。\n\n2.我局通过（已删去）与该国国内的反对派团体保持着有限联系，不过我方与流亡在乌拉圭的反对派团体——联合民族解放阵线的联系更为紧密。联合民族解放阵线是此前（详见瓜伊拉瀑布事件尝试报告）行动的残留力量，这些反对派团体在意识形态层面存在分歧，对我局的合作意向持怀疑态度，但作为非常规作战力量，他们具有一定的潜在价值。\n\n3.巴拉圭的法西斯政权目前仍在很大程度上依赖先前相对温和的政府所遗留的政治架构。政府内部有相当一部分人并不认同法西斯主义，甚至在某些情况下对其表现出明显的敌对情绪。比如，红党在地方层面仍保持温和立场。德国的资金投入在很大程度上维系着巴拉圭政权的稳定。军方目前尚未明确表态支持哪一方，在冲突爆发时可能会根据局势变化选择加入任意一方，他们主要关注国家的整体利益。倘若莫里尼戈遭遇危机，他极有可能被赶下台。国内大部分反对派并不友好，且反对民主制度。一旦爆发危机，我局可以利用与反对派的联系，加速推动莫里尼戈政权的垮台。"
 USA_FBI_LATAM.7.a: "忠诚、勇敢、正直。"
 USA_FBI_LATAM.8.t: "巴拉圭民主之路上的另一块绊脚石"
 USA_FBI_LATAM.8.desc: "安全屋位于市区的边缘，离市中心的距离恰到好处，探员菲利普·阿吉得以在错综复杂的小巷中摆脱追踪者。门开了，里面的人放他进去。屋内，男人们或躺或坐，其中好几个人都缠着绷带。为首的人走上前来，他面带微笑，却眉头紧锁。\n\n“看来我们给你安排的这个地方还挺不错。你知道的，之前在巴西，我们也帮你教过其他小伙子们做事。”阿吉探员上下打量着为首的人，“看起来，事情正朝着好的方向发展。”\n\n“没错，你们帮了大忙。巴拉圭人民会永远记住你们，感谢你们助我们挣脱压迫者的枷锁。”他顿了顿，接着说道，“不过，还是有很多人依附于我们的运动，二月党也好，自由派也好，虽说你们和你们的盟友确实帮了我们不少，但你们总是把那些只想利用巴拉圭解放事业谋取私利的人硬塞进我们的阵营。”\n\n阿吉探员顿了一秒，随后说道：“听着，你得面对现实。你刚才说得倒是轻巧，但咱们还是得现实点儿。就我看来，你们需要所有能得到的帮助，哪怕是自由派、联邦派，或者其他任何愿意伸出援手的人，你们都得好好合作。”\n\n为首之人脸上的笑容彻底消失了，他直直地盯着阿吉特工看了一秒：“你们美国人根本什么都不懂，不过就是想再开辟一个市场，再侵略一个国家……”他突然停住，“感谢你们一直以来的支持。”\n\n阿吉探员在返回大使馆的路上，心里暗自思量：联合民族解放阵线中的激进左派，由于无法与其他所有势力建立有效的合作关系，恐怕他们的存在真的是弊大于利。"
 USA_FBI_LATAM.8.a: "也许得扔掉几块石头了。"
 USA_FBI_LATAM.9.t: "探员的工作"
 USA_FBI_LATAM.9.desc: "探员坐在酒店房间的书桌后，透过窗户凝视着窗外那片广场。他瞧见亚松森的中产阶级来来往往，步履匆匆地赶去参加会议或是购物。他端起咖啡，轻抿了一口。过去这几天，他一直化名出行，成功与叛军中的关键人物搭上了线。如今，他终于搜集到了足够多的情报，可以让他决定联邦调查局该将资源投向何处。这份工作很合他心意，既能四处旅行，又能住豪华酒店，还能以假身份进行角色扮演。他满足地吐了口气，伸手拉上了窗帘。\n\n探员打开公文包，将搜集到的情报一一铺在书桌上。他仔细研究着与丛林战争相关的地图和数据，同时对照着现有可用资源的文件资料。在巴西和巴拉圭的这段时间里，他已经得出了一些初步结论。接下来的几个小时里，他对照着情报，反复权衡各种选择。最终，在他看来，似乎只有两种可行方案——要么将资源广泛分散，援助叛军行动；要么集中精力，破坏联合民族解放阵线的活动。那些社会主义者着实让联邦调查局里的许多人忧心忡忡，而他搜集到的数据也表明，该组织的实力不容小觑。而且，他们显然对美国的影响力十分警惕，加上切·格瓦拉在该运动中颇具威望，更让他们对美国心存戒备。"
 USA_FBI_LATAM.9.a: "分散资源。"
 USA_FBI_LATAM.9.b: "盯好那些赤匪！"
 USA_FBI_LATAM.10.t: "附带损害"
 USA_FBI_LATAM.10.desc: "巴拉圭警察撤离哨所时根本不用喊话：个个双手高举过头，托尼·坡要的正是他们这副怂样。泥地上滚落着零星几颗弹头——今天只有最先撞上山姆大叔军犬的倒霉蛋见了阎王。\n\n“都挺老实，对。看着能给叛军添上不少新兵，莫里尼戈在这帮人眼里连个屁都不算。嗯，押他们过境的活交给我就行，完毕。”\n\n特工把M14往肩头一甩，活像个野战大兵。这又是次他擅自进行的“训练”行动，不过成果确实不赖。而联邦调查局向来只认结果。 \n\n突然有了动静。衣衫褴褛的俘虏被拖出牢房，踉跄着摔在泥地上。坡的手下扯着嗓子喊：“有赤匪！抓到赤匪了！”巴拉圭人见指着自己的枪口比俘虏那边少，不由得发出阵阵笑声。\n\n看来今天要多死几个人了。\n\n“联合民族解放阵线的走狗？被抓来当苦力的？”波谢普尼比划着确认，警察和中尉忙不迭点头。几个武装分子啪嗒解除保险——夺哨时他们几乎就没开几枪。\n\n“行，把他们拖后院全崩了。留着这些人碍事。温特，埋完尸体带着你的人跟大部队汇合。”"
 USA_FBI_LATAM.10.a: "报告：成功解放法西斯政权阵地"
 USA_FBI_LATAM.11.t: "亚松森的生与死"
 USA_FBI_LATAM.11.desc: "天色已暗，这个连莫里尼戈都监视不到的鼠窝，现在独属于她。床尾的男人扣上衬衫，遮住了健壮的肌肉，她则点起一支烟。他和别的客人不同；他们关系更深，更特别。她感觉到他的目光仿佛能穿透她的衣衫，吞吐着她呼出的烟雾，直到她终于开口。\n\n“周日做完弥撒之后，我又见到那个军官了。但是这次感觉不一样，他跟我多聊了好一会儿。我按你教的跟他套情报，这次应该是起作用了。他怀疑莫里尼戈能否平息这场混乱，还提到他的军官朋友们也在私下议论。”\n\n他活动着强壮的手臂，专注地听着，早已熟悉她传递情报的方式。她读懂了他眼神里的催促，在墙上按灭烟头，继续说道：\n\n“他们也担心查科那边，部队都被调去镇压游击队，玻利维亚人可能会趁机动手。”床上的男人已穿戴整齐走向房门，伸手开门时却被她轻轻拉住。\n\n“求你了，我不知道还能撑多久……要是那个军官发现我是美国人的间谍……带我一起走吧。”\n\n“只要你是我的人，就没问题。我会带你离开这里，我保证。”他甩开她的手夺门而出。当然，他在撒谎。他在亚特兰大有老婆和四个孩子，但她在这里实在太有价值了。至于那些情报……"
 USA_FBI_LATAM.11.a: "……为造成最大破坏，转交给联合民族解放阵线。"
 USA_FBI_LATAM.11.b: "……为稳固我方利益，提供给自由派。"
 USA_FBI_LATAM.12.t: "亚松森的继承人"
 USA_FBI_LATAM.12.desc: "“大使先生，欢迎来到巴拉圭。”身着纯黑西装的男人迎上来握手，引路走向使馆，“我是联邦调查局特工戴维·菲利普斯。行程可还顺利？”\n\n哈里·斯廷普森含笑点头回应：“那是自然。”眼前的美国大使馆比报告描述的更气派。周围店铺的彩色墙皮剥落掉渣、弹孔密布，使馆却只有零星碎玻璃碴散落在地。“原本我还担心会在城里遇见麻烦，现在看这地方倒是比照片上强多了。”\n\n“是了，我们忙活了好几个月才收拾出来。要是赤匪赢了，这儿早就成一片废墟了——幸亏没让他们得逞。”\n\n新任巴拉圭大使嘴角一扬：“何止，咱们还扶持了听话的亲美政府。巴西近在咫尺，是我国在美洲的头号盟友。政府能积极配合，反对派又不成气候。现在星条旗都插稳了，还有什么是我们做不到的？”\n\n“反对派可没消停，大使先生。联合民族解放阵线吃了败仗，支持者却没散伙。反美活动不断，阿根廷更是就在河对岸，比巴西还近。不过我们手里还有张王牌，请跟我来。”\n\n菲利普斯指向一扇带有观察窗的门，斯廷普森透过玻璃看见带卐字的档案袋。走进房间后，大使的目光略过屋里堆成小山的德文卷宗。阿根廷或许想找茬，可莫里尼戈留下的整整数十年的纳粹情报老底——他们连边都摸不着。"
 USA_FBI_LATAM.12.a: "“嗯，这只是个开始。”"
 USA_FBI_LATAM.13.t: "迷局"
 USA_FBI_LATAM.13.desc: "戴维·阿特利·菲利普斯望着机窗下旋转的巴拉圭边境植被和棚屋，直升机旋翼的轰鸣将其他思绪碾成碎片。联邦调查局黑色行动专家托尼·坡坐在他身旁，光是这件事本身就足以让所有同事头皮发麻。连他皮笑肉不笑的模样都令人毛骨悚然——菲利普斯常怀疑那副墨镜后是否还有人性残留。\n\n“这阵仗，够震撼的。”坡指向下方延绵的难民营，成百上千的难民正涌向巴西边境，“不，这地方倒是更像个殖民地。呵，丛林战争把他们吓破胆了。”话糙理不糙，难民营的规模确实大得惊人。直升机突然向左偏航。\n\n“我混过游击队，”坡继续叨叨，“战事消停后，他们全跑这儿逃命来了。但他们该学学普拉塔港的多米尼加人拼死奋战啊。听着，咱们把这帮人押回亚松森去，我的人正等着呢。”\n\n“我不好说，托尼。”菲利普斯急忙打断，他察觉到对方怒气上涌，“这类行动见效的不多，再说叛军资金和其他问题怎么办？他们根本就不打，现在局势僵持不下，我们还耗在这儿图什么？纯属浪费……”\n\n坡投来愤怒的目光，一脚踹在了座椅上，随后说道：“怎么你也来这套？妈了个逼的，戴维，你跟华盛顿那帮大爷们一样娘们唧唧的！要不是他们拖后腿，我们现在也不会在这收拾烂摊子了。如果我们输了就怪你们，我可不管上面怎么说。”他悻悻地转向机窗。\n\n菲利普斯望向窗外，强忍着反驳的冲动。他有权处分这家伙，但好用的疯狗终究有用，待他自掘坟墓再递锹也不迟。"
 USA_FBI_LATAM.13.a: "他们没把对方扔下去真是奇迹。"
 USA_FBI_LATAM.14.t: "备忘录-卡宴公投"
 USA_FBI_LATAM.14.desc: "秘密/[?global.date.GetDateStringNoHour]\n\n发：联邦调查局探员伯恩斯坦\n呈总统备忘录\n\n主题：圭亚那-卡宴整合公投\n\n1.巴西军方在前法属圭亚那-卡宴宣布将于数月内举行公投，决定该地是否并入巴西。此举将重塑巴西军事存在格局，并动摇美国对巴西政府当地角色的支持。\n\n2.我局已注意到近日当地报纸刊登的相关公告。巴西驻华盛顿大使亦主动与（已删去）取得联系，以确认此事。\n\n3.1940年法国沦陷后，美国与巴西曾共同进驻南美法属领土，但此后权力逐步向巴西军方集中，至今仍在该区域保持强大影响力。当地冲突激化及巴西移民计划的扩张，最终催生了决定该地区未来的公投。\n\n虽然巴西名义上是我国的全球合作伙伴，但总统阿德马尔·德·巴罗斯却多次在公开场合显露反美倾向。若公投通过，我国就将在外交领域遭遇重大挫折。此次占领的争议性亦引发大量批评，不少人指责美国在占领过程中扮演了不当角色。\n\n4.联邦调查局已联络当地劳工运动团体（已删去）及多个政治组织。目前仍有充足资金以支持反吞并运动，同时保障美方介入不受影响。"
 USA_FBI_LATAM.14.a: "忠诚、勇敢、正直。"
 USA_FBI_LATAM.15.t: "阿德马尔，元首阁下"
 USA_FBI_LATAM.15.desc: "卡宴的酒吧里乱成一锅粥，笑声、嚎叫声、口号声混着酒味儿满天飞。但一片喧闹中，有张桌子显得格外扎眼——最后到的克里奥尔人布鲁诺一屁股坐下，弄得椅子吱呀乱响。\n\n“终于到了，布鲁诺！再晚点儿工会可要把你除名了——”先到的人笑着打趣，又聊回正题，“你们想啊，这‘公投’都快把咱们整成亚马逊的捷克斯洛伐克了，阿德马尔这是要学希特勒那套啊！”起头的汉子嚷嚷完，旁边的人叹了口气接过话茬：\n\n“连老大都急眼了，这不明摆着嘛！他这人向来中立，现却在成天喊着‘用公投干死他们！’，还到处拉人投独立票。”\n\n“大伙应该都见过那些海报吧——”说话人瞥了瞥飞镖靶上的海报，阿德马尔被画上希特勒式小胡子，显得既搞笑又真实。\n\n“要我说——”另一个人放下空酒杯，手指戳着海报，“就该让那王八蛋和他的同伙知道咱们的厉害！他们一窝蜂似的涌进来抢饭碗、占土地，还想吞并我们的祖国？没那么容易！”欢呼声在人群中炸开，人们抄起手头最趁手的武器——多半是玻璃瓶——就往外冲。他们对普通民众构不成威胁。工会成员们攥紧酒瓶，思绪早已飘远。"
 USA_FBI_LATAM.15.a: "但对巴西工贼和法西斯分子的脑袋而言，就不好说算不算威胁了。"
 USA_FBI_LATAM.16.t: "减轻负担"
 USA_FBI_LATAM.16.desc: "豪尔赫最初听说他要去卡宴出差搞宣传任务时，恶心得差点当场吐出来。在那片恨透巴西的土地上散播阿德马尔的废话？差不多得了。他本来就没给那个伪君子投票，凭什么还要替他卖命？但豪尔赫转念一想，虽然他看总统不顺眼的地方很多，但总统随手发“福利”的习惯他可从不抱怨。钞票过了手，也进了他的口袋，上头再说上几句漂亮话，他就立刻被说服了——这活还真得去干。\n\n反正巴西利亚那帮老爷才不管他们到底干没干活，只要报告能交差、公章盖得全就行。于是，豪尔赫和同事们索性把这趟累死人的苦差事当休假。毕竟，想改变民意，就要先了解民情。还有哪儿比当地的酒吧窑子更能深入群众呢？哎哟，豪尔赫得赶紧走了，旅馆预约要迟到了，他可是拍胸脯保证要对瓶吹的，总不能让他食言吧？"
 USA_FBI_LATAM.16.a: "杯酒之间，收买人心。"
 USA_CIA_BRA_boost_udn_unity:0 "将发起一项行动，提高£BRA_udn_texticon §Q全民盟§!的团结度。\n[BRA.BRA_lacerda_udn_party_loyal_loc]\n"
 USA_CIA_BRA_raise_edna_influence:0 "将发起一项行动，提高§V埃德娜副总统§!的影响力。\n[BRA.BRA_adhemaredna_bar_tooltip_dyn]\n"
 USA_CIA_STC_infiltrating_military:0 "将发起一项渗透并削弱圣克鲁斯军队的行动。"
 USA_CIA_PAR_contacting_exiles_in_uruguay:0 "我们将接触巴拉圭流亡组织联合民族解放阵线，协助其开展行动。\n"
 USA_CIA_PAR_destabilizing_regime:0 "将发起一项动摇巴拉圭法西斯政权的行动。"
 USA_CIA_BOL_influence_treaty_negotiations:0 "我们将试图操纵跨安第斯条约的谈判走向，使其达成我们期望的结果。\n"
 USA_CIA_BOL_assist_counterinsurgency:0 "将发起一项行动，保护我们在玻利维亚的地缘政治利益。\n"
 USA_CIA_PAR_assist_insurgency:0 "将发起一项援助巴拉圭联合民族解放阵线叛乱的行动。\n"
 USA_CIA_BRA_hinder_cayenne_integration:0 "将发起一项阻挠巴西吞并圭亚那-卡宴的行动。\n"
 USA_CIA_infiltrate_santa_cruz_military:0 "§&地狱之门§!§Y行动§!"
 USA_CIA_assist_the_paraguayan_insurgency:0 "§V绿魔§!§Y行动§!"
 USA_CIA_operation_fawkes_PAR: "§x福克斯§!§Y行动§!"
 USA_CIA_PAR_operation_fawkes: "纵观中情局的历史，我们常被迫与一些意外的盟友为伍。此次亦不例外，我们将与巴拉圭的共产主义叛军合作，以推翻该国的法西斯政权。若行动成功，联合民族解放阵线成员将经由康塞普西翁市进入巴拉圭，届时我们便可从那里着手，扩大他们在该国的影响力。"
 USA_CIA_operation_daedalus_PAR: "§<代达罗斯§!§Y行动§!"
 USA_CIA_PAR_operation_daedalus: "如今我们已在巴拉圭站稳脚跟，可以着手推翻法西斯政权。在联合民族解放阵线的协助下，我们会安排特工潜入巴拉圭军方内部，从内部动摇该政权。"
 USA_CIA_operation_minos_PAR: "§&米诺斯§!§Y行动§!"
 USA_CIA_PAR_operation_minos: "鉴于联合民族解放阵线在农村地区已成气候，是时候向首都亚松森推进了。我们将向联合民族解放阵线提供武器弹药和物资补给支援，同时派遣特工潜入城区，在街头制造混乱。"
 USA_CIA_operation_babel_PAR: "§K巴别塔§!§Y行动§!"
 USA_CIA_PAR_operation_babel: "我们在巴拉圭的势力已无处不在，联合民族解放阵线显然在丛林战争中占据上风，而巴拉圭政府连亚松森的街头都几乎难以掌控。只需再轻轻推上一把，这座纸牌屋便会轰然倒塌。"