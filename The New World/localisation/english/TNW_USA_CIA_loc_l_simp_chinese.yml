 USA_CIA_MLY.6.t:0 "国务院来电"
 USA_CIA_MLY.6.desc:0 "发：驻新加坡大使馆\n致：中情局局长、国务卿\n\n仅供中情局局长、国务卿阅览\n\n马来亚抗日统一战线取得胜利后，该国的战略价值不容小觑，因此中情局与国务院一直在努力加以利用。近期，借助中情局特工与马来亚政要及执政党成员建立的联系，我们成功将多米诺行动的最后一环串联起来。此次行动旨在以马来亚为跳板，将整个东南亚地区从大东亚共荣圈的控制中解放出来。我们已经锁定了多个目标区域，特别是日益动荡的印度尼西亚，可将该国作为我们达成目标的重要突破口。\n\n鉴于马来亚方面对我方行动的大力支持，以及中情局的特工和他们的线人付出的巨大努力，我们很高兴地宣布，多米诺行动已具备执行条件。现静候中情局局长和国务卿下达开展此行动的命令。\n\n铃"
 USA_CIA_MLY.6.a:0 "我认为可以着手推进了。"
