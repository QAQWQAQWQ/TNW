 USA_nixon_cia_desc:0 "中情局制定了一些计划来对抗德国与日本的影响。这些计划包括与三头同盟——德国在欧洲的主要制衡力量合作，支援共荣圈内的叛乱武装，逐渐削弱日本对其他亚洲国家的控制。"
