  # Leaders
  GUC_Angelo_Almeida: "Ângelo Nolasco de Almeida"
  POLITICS_Angelo_Nolasco_de_Almeida_DESC: "Admiral Ângelo Nolasco de Almeida has achieved many prestigious positions during his long career in the Brazilian Navy, but he never expected to be the Military Commander of the Allied Administration of Guiana-Caiena. His actions during the Estado Novo period and especially in repressing the Constitutionalist Revolution in 1932 brought him closer to Getúlio Vargas himself, which led to his appointment as Vargas' aide-de-camp in 1939. During the War, he acted as a military attaché to the Brazilian embassies in Argentina and Uruguay, later taking part in the invasion that brought Guiana-Caiena into Brazilian occupation.\n\nAfter the fall of the Varguist regime, Almeida occupied many administrative positions in the Navy, always aligning with the Armed Forces' Constitutionalist faction. In 1961, President Lott honored the Admiral with an appointment to lead the Administration of Caiena. The former French colony had been in an administrational limbo ever since the end of the War, with the detachment of Brazil from the Allies and the Americans' insistence in keeping it as a bargaining chip for a future French ally.\n\nHowever, this is not what Lott wants. The President has tasked Admiral Nolasco de Almeida with integrating the economy of Caiena into that of Brazil, encouraging immigration, and creating new jobs. The Admiral has served the Brazilian state all his life, and he will do everything to accomplish this mission."
  GUC_OAS_Mandate: "Guyane Governance Council"
  POLITICS_GUC_OAS_Mandate_DESC: "Guyane-Cayenne's independence referendum was meant to end the disorder of its national question for good. Instead, the chaos surrounding the future of the former French colony has only been extended. Even if its people have voted for a break with Brazil, the route to realizing it remains uncertain.\n\nFollowing accusations of fraud, eruptions of brutality and a scathing report by the Organization of American States, intervention was the only card left on the table. Having had two foreign masters this century, the country must now endure a third: a transitionary government supervised by the OAS and governed by officials of various nations and departments, assigned to deliver the nation its choice and away from another bout of violence.\n\nThe OAS' dual mission cannot be achieved in two strokes, however. Local leader Justin Catayée might be, in polite terms, an unsavory figure for much of the administration, but he is nonetheless the only one who can fill the shoes of future Guianese leadership and put the newborn nation on its feet. Any attempt at creating an ally friendly to Washington and Brasília alike will thus require handshakes as well as bureaucrats."
  GUC_Justin_Catayee: "Justin Catayée"
  POLITICS_GUC_Justin_Catayee_DESC: "During World War Two, Justin Catayée once fought against tyranny half a world away. He fought for the ideals of liberty and democracy, and when he came home, he was deprived of those ideals by the men who championed them overseas. Today, that changes.\n\nBorn in Cayenne, Catayée was a leaf trapped under a French wind. When World War Two came, Brazil overtook France's running of the colony, allowing him to fight under their banner. Returning home, he found no freedom, only a Brazilian jackboot replacing a French one. Guiana-Cayenne would not join the nations of the world. Instead, a nation was denied in favor of Brazilian military rule and corporate greed.\n\nCatayée first made his name in the Cayenne People's Assembly, a toothless organization he quickly left, denouncing its lack of power and ambition. Instead, he founded the Guianese Socialist Party, quickly adopting the position of independence from Brazil in response to its neglect. However, after a failed assassination attempt, it was clear neglect changed to viciousness, and independence was needed more than ever.\n\nBut after independence, what next? As President, Catayée has beliefs, and he has his actions. He believes in socialism, in democracy, and in liberty, but how will they be put into action? Will his revolution and the democracy birthed by it reject his ideals? Will he have to reject them to govern? He doesn't know, but he can't let that stop him."

