 MEX_econ_stimulation_detailed: "§W[GetMEXEconRegiontheContext3][ROOT.GetMEXEconRegionNameContext3]的经济刺激度为[?MEX_econ_region_selected:MEX_econ_region_stimulation_percent|Y2%%]。§g\n这将提高我们[?temp_stim_gdpg|G3%%]的区域GDP增长率，基于[?temp_gdp_growth_base|G3%%]的基础影响值和[?temp_urb_multiplier|G2%%]的当地城镇人口规模乘数。§!\n\n每两周，经济刺激度会下降[?temp_stim_decay|R2%%]，直至最低值[?MEX_econ_region_selected:MEX_econ_region_base_stimulation_percent|Y2%%]。§g\n这基于[?MEX_econ_region_selected:MEX_econ_region_stimulation_decay|2R%%]的基础刺激度衰减，并受到城镇生活质量[?MEX_econ_region_selected:MEX_econ_region_quality_of_life_stimulation_decay_modifier|2Y%%]的削减。§!\n\n该地区的负债为§R[MEX_econ_map_debt]§!。§g\n在年末，地方负债超出§Y[MEX_econ_map_debt_limit]§!的地方债务上限会产生恶劣的后果。同时，债务会每月降低[?temp_debt_stim_impact|R2%%]的地方经济活跃度。§!\n\n地方债务上限每年计算一次，是地方GDP的[?MEX.MEX_econ_GDP_debt_limit_conversion|0Y%]和地方负债的[?MEX.MEX_econ_debt_debt_limit_conversion|0Y%]之和。§g\n这个上限会随着该地方的状况不断波动。假如立刻将其重置，新的债务上限为§Y[MEX_econ_graph_debt_limit_projection]美元。§!§!\n\n预计今年该地区的经济将增长[?temp_gdpg|G3%%]。§g\n该地区的储备金将获得相当于当地经济增长大约四分之一§Y（1/4）§!的收入。§!§!"
 MEX_econ_crop_type_bar_detailed: "§W[?MEX_econ_region_selected:MEX_econ_region_agronomics_cash_crop_percent|Y2%%]的地区内农场生产经济作物，包括剑麻、咖啡、糖，全部用于出口。§g\n该地区的出口为墨西哥的收益分为两部分，带来§Y[?temp_cash_crop_revenue|3]B美元§!的国家收入和[?temp_cash_crop_pus|Y2]£tt_prod_unit 个生产单位。商品农业使当地的人口进城速度加快§Y[?temp_cash_crop_migration|2%%]§!。§!\n\n[?MEX_econ_region_selected:MEX_econ_region_agronomics_staple_crop_percent|Y2%%]的地区内农场生产主粮作物，包括玉米、豆类等，用于国内消费。§g\n当地的主粮生产水平提高了整个地区§G[?temp_staple_qol|2%%]§!的生活质量。§!\n\n当地农场的生产率为[?MEX_econ_region_selected:MEX_econ_region_agronomics_productivity_percent|Y2%%]。§g\n当地的生产率为国家提供了[?temp_prod_pus|Y2]£tt_prod_unit 个生产单位。同时，当地的农业机械化程度也使当地人口进城速度提高了[?temp_prod_migration|2Y%%]，并每月减少§Y[?temp_prod_debt_dec|2]M美元§!的地区债务。§!\n\n总体上，墨西哥从全国的农业生产中获得了[?temp_net_agr_pus|Y0]£tt_prod_unit 个生产单位。§!"
 MEX_econ_urban_divide_bar_detailed: "§W[ROOT.GetMEXEconRegionTHEContext3][ROOT.GetMEXEconRegionNameContext3]的人口中，分别有[?MEX_econ_region_selected:MEX_econ_region_urban_population_percent|g2%%]/[?MEX_econ_region_selected:MEX_econ_region_rural_population_percent|G2%%]居住在§g城镇§!/§G农村§!地区。§g\n 该区域的城镇集中度对经济刺激度产生[?temp_urban_pop_stim|2G%%]的乘数修正。§!\n\n每月该地区约有[?temp_mig_net|3Y%%]的人口从农村进入城市。§g\n在进城人口中，有一半，约[?temp_mig_unemployment|3R%%]人口会成为失业人口。§!\n\n失业率为[?MEX_econ_region_selected:MEX_econ_region_unemployed_population_percent|2Y%%]，该指标衡量有多少比例的墨西哥人不在登记在册的经济部门中工作，包括实际失业者、黑工和流动农场工人。§g\n当地劳动者群体的状况降低了[?temp_unemployed_qol_malus|2R%%]的城镇生活质量，并每月额外消耗该地区§R[?temp_unemployed_debt_inc|2]M美元§!§!。§!§!"
