 MEX_mega_metro.1.t: "通往查普特佩克的道路"
 MEX_mega_metro.1.desc: "午后的雾霾像一张毛毯一样笼罩在墨西哥城上空，但玛丽亚·阿尔瓦雷斯今早的视野还算清晰。她看见克里斯平和伊雷拉手挽着手走出电影院，她放下了菜篮子，大步走到这些叛徒眼前。此时的克里斯平脸涨得通红，伊雷拉左顾右盼，不敢直视她。克里斯平突然大吼一声，挣脱了伊雷拉的扭缚，不顾街道上路人的目光，像头发怒的狮子紧握双拳，由五六米远的地方向玛丽亚猛扑过去，狠狠地给了她一拳，把她打的失声尖叫。\n\n透过公交车窗户上的污渍，玛丽亚看着这座城市。现在她只想让克里斯平离开。因为卡米拉和她的父亲正准备在家里大闹一场，所以她离开了家。\n\n她现在只想去查普尔特佩克公园看看。在这座灰蒙蒙的城市中，那里是为数不多的绿色岛屿。她曾和罗德里戈在那里奔跑，用从游客那偷来的钱买糖果和其他他们想要的东西。过去的时光多么美好！\n\n但美好的时光终究会过去。在克里斯平出现之前、在罗德里戈去参军之前，城市里的人口愈发的多，路上的车也是愈发的多，公交车再也满足不了城市的交通需要了。公交车没办法把她载到公园，甚至没办法载她去任何地方。"
 MEX_mega_metro.1.a: "它们没有放玛丽亚走。"
 MEX_mega_metro.20.t: "模范列车"
 MEX_mega_metro.20.desc: "贝尔纳多·金塔纳注意到，当车门关闭时，人群轻微的推搡便停止了。这位墨西哥顶尖工程公司ICA的创始人微微点头，看着东京地铁加速前行，轨道咔嗒声逐渐变为低沉的嗡鸣。比起考察团明天要参观的那些蹩脚西语国家项目，眼前的井然有序更能说明问题。这套系统运转良好，逐年改进和发展——这是为联邦区量身打造的杰作。\n\n太平洋彼岸，阿方索·科罗纳·德尔·罗萨尔站在雨棚下，感受着蒙特利尔地铁施工现场的每一次震动。眼前延展的基坑与市长让·德拉珀展示的规划图上的建筑奇迹相去甚远，橡胶轮胎地铁车厢承诺的静谧体验更是遥不可及。但这个现代地铁典范，距离墨西哥城并不遥远，甚至可以说近在咫尺。\n\n三周后，墨西哥城的一间会议室里，德尔·罗萨尔结束演讲后，纸张翻动的沙沙声、咳嗽声和窃窃私语交织。联邦区官员们匆忙翻阅笔记，正竭力为上司的主张提供论据——以蒙特利尔地铁为蓝本建造墨西哥城地铁。ICA的工程师们则匆忙补充金塔纳关于东京模式的论点，当某位年轻工程师强调抗震能力时，终于赢得了几声附和。这时后排有位清瘦的老兵提议将布宜诺斯艾利斯作为备选方案。他承认阿根廷的地铁系统更为老旧，但合作成本更低且无需繁琐翻译，更可彰显“拉美团结精神”。\n\n此言一出，争论的闸门轰然洞开。会议室每个角落都迸发出激昂的陈词，每当发言者超出耐心阈值，奥达斯摄政官便粗暴地打断进程。事实、假设、人身攻击在空气中碰撞，直到最终尘埃落定："
 MEX_mega_metro.20.a: "东京，巨型都市需向同类取经。"
 MEX_mega_metro.20.b: "蒙特利尔，唯有最新最强者配得上墨西哥城。"
 MEX_mega_metro.20.c: "布宜诺斯艾利斯，历史悠久、经济实惠、外交友好，我们的目光投向南方。"
 MEX_mega_metro.21.t: "模范列车"
 MEX_mega_metro.21.desc: "贝尔纳多·金塔纳注意到，当车门关闭时，人群轻微的推搡便停止了。这位墨西哥顶尖工程公司ICA的创始人微微点头，看着东京地铁加速前行，轨道咔嗒声逐渐变为低沉的嗡鸣。比起考察团明天要参观的那些蹩脚西语国家项目，眼前的井然有序更能说明问题。这套系统运转良好，逐年改进和发展——这是为联邦区量身打造的杰作。\n\n太平洋彼岸，埃内斯托·P·乌鲁丘尔图看着让·德拉珀的手指在蒙特利尔地铁规划图上划过，唇角勾起一丝若有若无的笑意。高耸入云或深入地下的大胆设计，艺术展览空间，地下商业枢纽，以及足以保持整个系统光洁如新的维修空间。没错，如果非要建地铁，就该这么建。\n\n三周后，墨西哥城的一间会议室里，乌鲁丘尔图部长结束演讲后，纸张翻动的沙沙声、咳嗽声和窃窃私语交织。现任交通部官员与联邦区旧部组成的混合阵营，正竭力为这位钢铁摄政的主张提供论据——以蒙特利尔地铁为蓝本建造墨西哥城地铁。ICA的工程师们则匆忙补充金塔纳关于东京模式的论点，当某位年轻工程师强调抗震能力时，终于赢得了几声附和。这时后排有位清瘦的老兵提议将布宜诺斯艾利斯作为备选方案。他承认阿根廷的地铁系统更为老旧，但合作成本更低且无需繁琐翻译，更可彰显“拉美团结精神”。\n\n此言一出，争论的闸门轰然洞开。会议室每个角落都迸发出激昂的陈词，每当发言者超出耐心阈值，奥达斯摄政官便粗暴地打断进程。事实、假设、人身攻击在空气中碰撞，直到最终尘埃落定："
 MEX_mega_metro.21.a: "东京，巨型都市需向同类取经。"
 MEX_mega_metro.21.b: "蒙特利尔，唯有最新最强者配得上墨西哥城。"
 MEX_mega_metro.21.c: "布宜诺斯艾利斯，历史悠久、经济实惠、外交友好，我们的目光投向南方。"
 MEX_mega_metro.22.t: "模范列车"
 MEX_mega_metro.22.desc: "贝尔纳多·金塔纳注意到，当车门关闭时，人群轻微的推搡便停止了。这位墨西哥顶尖工程公司ICA的创始人微微点头，看着东京地铁加速前行，轨道咔嗒声逐渐变为低沉的嗡鸣。比起考察团明天要参观的那些蹩脚西语国家项目，眼前的井然有序更能说明问题。这套系统运转良好，逐年改进和发展——这是为联邦区量身打造的杰作。\n\n太平洋彼岸，阿方索·科罗纳·德尔·罗萨尔站在雨棚下，感受着蒙特利尔地铁施工现场的每一次震动。眼前延展的基坑与市长让·德拉珀展示的规划图上的建筑奇迹相去甚远，橡胶轮胎地铁车厢承诺的静谧体验更是遥不可及。但这个现代地铁典范，距离墨西哥城并不遥远，甚至可以说近在咫尺。\n\n三周后，墨西哥城的一间会议室里，德尔·罗萨尔结束演讲后，纸张翻动的沙沙声、咳嗽声和窃窃私语交织。联邦区官员们匆忙翻阅笔记，正竭力为上司的主张提供论据——以蒙特利尔地铁为蓝本建造墨西哥城地铁。ICA的工程师们则匆忙补充金塔纳关于东京模式的论点，当某位年轻工程师强调抗震能力时，终于赢得了几声附和。这时后排有位清瘦的老兵提议将布宜诺斯艾利斯作为备选方案。他承认阿根廷的地铁系统更为老旧，但合作成本更低且无需繁琐翻译，更可彰显“拉美团结精神”。\n\n此言一出，争论的闸门轰然洞开。会议室每个角落都迸发出激昂的陈词，每当发言者超出耐心阈值，奥达斯摄政官便粗暴地打断进程。事实、假设、人身攻击在空气中碰撞，直到最终尘埃落定："
 MEX_mega_metro.22.a: "东京，巨型都市需向同类取经。"
 MEX_mega_metro.22.b: "蒙特利尔，唯有最新最强者配得上墨西哥城。"
 MEX_mega_metro.22.c: "布宜诺斯艾利斯，历史悠久、经济实惠、外交友好，我们的目光投向南方。"
 MEX_mega_metro.30.t: "强行军"
 MEX_mega_metro.30.desc: "把封闭查普尔特佩克大道当作宣传噱头的馊主意能让任何一个政府官员汗流浃背，不论是华雷斯区通勤者们愤怒的喇叭声，还是美国游客和日本游客因被禁止进入粉红区和查普尔特佩克公园而用外语发出的喋喋不休的抱怨声，都是官员们不能接受的。更让人无法接受的是，城中各处的收银机都会变得寂静无比、空空如也。\n\n但阿方索·科罗纳·德尔·罗萨尔将军可不管这些，他能听见的只有秒表转动的声音。炽热的太阳直射在他的额头上，豆大的汗珠也缓缓从他那光秃秃的脑袋上蜿蜒而下，唯一值得庆幸的是——他并不是因为恐惧而流汗。这位面带微笑的联邦区负责人紧握麦克风，台下人们欢呼的声音响彻云霄。\n\n“各位首都的市民们！天气炎热，我长话短说。和我一样，你们中的很多人也经历过那个枪林弹雨、血雨腥风的时代，但革命的主要武器已经变了。今天我们在这里，庆祝墨西哥地铁的开工，比美国佬那个氢弹的威力还要大！”\n\n他举起铁锹，用力地插到他左手边的地上。他对着麦克风轻咳一声，示意台下的人们安静：“地铁将由许多墨西哥工人建造，并将服务更多墨西哥乘客！在这一切的背后，是我们党不忘初心、牢记使命，全心全意地为人民服务！我宣布我们将尽快建成地铁，无论是这第一铲还是那最后一铲，我们都不会懈怠！”\n\n德尔·罗萨尔用力将一铲土抛到背后。随着他一声令下，手提钻的震动声响起，甚至盖过了全国民众团体联合会和墨西哥工人联合会的欢呼声。"
 MEX_mega_metro.30.a: "秒表一直在走。"
 MEX_mega_metro.31.t: "十字路口"
 MEX_mega_metro.31.desc: "埃内斯托·P·乌鲁丘尔图用自己肥胖的手指拿着一张奶白色卡片，卡片上流畅字句赫然昭示着他的野心。这位索诺拉硬汉喉咙里发出低沉的咆哮，强迫自己的眼睛扫过那些字句：\n\n“为表彰阁下在墨西哥城地铁项目资金筹措和路线规划中的卓越贡献，特诚邀您出席建设工程启动仪式。您的——”\n\n卡片被拳头攥成了一团。没错，乌鲁丘尔图的汗水让墨西哥城的地铁项目得以落地。若不是他伏案操劳、煞费口舌、软硬兼施，这个项目早该像他向联邦区民众预言的那样，沦为逾期超支的灾难。\n\n今天，这个虚伪的统治者奥尔达斯给他设下陷阱，让他出席这个他曾极力反对的项目的庆功宴，只为了能羞辱他，当着首都人民的面摧毁这位铁腕官员和联邦区运输工会的联盟。但只要他缺席，奥尔达斯那副虚伪的嘴脸就会被不知情的民众当做一名伟大的改革者、带领他们摆脱拥堵的摩西，永载史册。\n\n乌鲁丘尔图展开了那张皱巴巴的卡片，只想看看总统的野心会召唤他去什么地方：“——敬请于下周四下午四时亲临查普尔特佩克大道与布卡雷利街交汇处。”他把卡片扔到桌子上，梳了梳自己的头发，深思熟虑后决定："
 MEX_mega_metro.31.a: "钢铁永不屈服，就让奥尔达斯噎死在自己的庆典上吧。"
 MEX_mega_metro.31.b: "只要我乘公交车前往……"
 MEX_mega_metro.32.t: "一号线双雄"
 MEX_mega_metro.32.desc: "最后一台电视摄像机已搬出查普特佩克大道与布卡雷利街的交汇处；最后留下的记者不过是想再躲一会岳母。曾数百名全国民众团体联合会与工人联合会成员欢呼雷动的集会现场，如今只剩遍地狼藉。\n\n阿方索·科罗纳·德尔·罗萨尔的靴子碾过一张标语牌。那是件精心制作的作品，绿、白、红三色组成的“地铁”二字夺目闪耀。但德尔·罗萨尔只是凝视片刻，随即他的目光投向了那群政商显贵们——四辆豪华轿车正静候其侧。\n\n“真是精彩的演说，将军。您和塞拉部长让民众为即将开建的地铁热血沸腾，我敢说全国民众此刻都感同身受。”电视大亨阿斯卡拉加·比道雷塔在汽锤轰鸣声中提高嗓门喊道。\n\n德尔·罗萨尔略作停顿，随即朗声道：“没有诸位的支持，无论是典礼还是地铁，都不可能实现，先生们。”他心想，若不必应付这群围着一号线的肥硕水蛭，工程本可更顺利。唯一不可或缺之人，他快速回瞥一眼，正在半空荡的舞台旁与ICA的工程师们喋喋不休，多半又在唠叨挡土墙与地下湖的事。\n\n他朝轿车方向示意：“咱们动身去德尔莫尼科餐厅吧，我们预定了位置，值得好好庆贺，"
 MEX_mega_metro.32.a: "而塞拉学士另有要务需处理。”"
 MEX_mega_metro.4.t: "蛇裙神像"
 MEX_mega_metro.4.desc: "贝尼托·莱奥斯奋力将铁锹头楔入湿软泥土，深掘后掀起一大抔土块甩向身后。经数周晨昏不息的挖掘，这条终将构成一号线脉络的轨道已渐显雏形。胃部一阵咕噜提醒贝尼托：距午休仅剩十分钟。饥饿难耐，但一罐豆子加几口凉水足矣缓解。\n\n忽觉手臂刺痛。是手指？是风吧，不，地底岂会有风，他本能转身，赫然对上一枚蛇首。那双圆睁的蛇眼。嘶声可闻？吾命休矣。贝尼托双膝发软瘫坐在地，发出骇人惨叫。\n\n仰面倒在泥堆上时，濒死幻觉褪去的贝尼托才察觉到：那蛇首并非血肉之躯，而是半掩于土中的精美巨型石雕蛇头，科亚特利库埃，众神之母。闻声奔来的工友们起初连声询问“搞什么鬼”、“你没事吧”，待看清古物后亦陷入静默。“是阿兹特克文物吧。”贝尼托嗫嚅道，目光无法移离。\n\n“快挖出来啊贝尼！”有人喊道。\n\n他却摇头紧盯雕像：“不，不行，得等……考古学家什么的……”无论此物是否有灵，贝尼托绝不愿成为惊扰科亚特利库埃安眠之人。倒非因敬畏神像，这不过是一尊破石头罢了，实因毒蛇可怖，而他方才已差点没被吓尿裤子，此事绝不可让工友知晓。"
 MEX_mega_metro.4.a: "国立人类学博物馆即将迎来新展品。"
 MEX_mega_metro.5.t: "联系"
 MEX_mega_metro.5.desc: "玛丽亚·阿尔瓦雷斯从不觉得自己有多漂亮。她矮胖身材，向来不愿意学妹妹卡米拉的浓妆艳抹，那太轻佻了。但玛丽亚自认幸运——克里斯平的老友鲁佩托竟邀她下班后到查普特佩克公园见面。能在建筑行业挣钱的鲁佩托，甚至为她买了张新地铁的车票。\n\n此刻玛丽亚正置身于总统与市长昨日刚试乘过的钢铁长龙中，幻想永别克里斯平后的新生。她最体面的纯棉连衣裙（仅有的三件之一），在车厢华服云集中黯然失色。但那些试乘城市新玩具的中产阶级主妇，无人能及玛丽亚此刻笑靥生辉。站台掠窗而过，她感到自己正飞速远离克里斯平的辱骂殴打、父亲羞惭的面容、卡米拉讥诮的嘴角。未来将是口袋装满零花钱随心乘车的自由人生——哈，或许偶尔要乘这列车招摇过市，挽着鲁佩托在克里斯平面前示威。\n\n玛丽亚几乎雀跃着跃上地铁台阶，踏入新世界的阳光中。但站口等候的并非鲁佩托，而是手持她最爱的糖果鲜花、温柔牵起她手的克里斯平。这个挂着忧伤微笑的男人，领她至树影私密处呢喃：“别管鲁佩托了，他只是帮忙。回到我身边吧玛丽亚，这次会不同。”\n\n他的双唇吻得她耳尖绯红，最终反被玛丽亚拽着遁入查普特佩克公园更深处。"
 MEX_mega_metro.5.a: "一号线只能带你走这么远。"
