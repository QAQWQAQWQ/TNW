 MEX_mega_melchorocampo.4.t: "商业开放"
 MEX_mega_melchorocampo.4.desc: "“先生们，你们的笑脸让这一切都值得了。”前总统洛佩斯·马特奥斯对着满堂面色僵硬的商界人士说道。米却肯州梅尔乔奥坎波港的盛大开幕典礼迫在眉睫，外交官们一致认为，鉴于马特奥斯在港口筹建过程中发挥的关键作用，他理应主持这场面向商界代表的开幕前庆典——这些即将让港口充盈的不仅是海水，更是财富。日本财阀、美国企业总裁与墨西哥实业家在新落成的仓库里三三两两聚作几堆。马特奥斯扫视人群，当地团队在装饰与茶歇上表现出色，但那些身着华服的先生们即便认同他的观点，也未曾表露分毫。连他抛出的俏皮话也只换来零星笑意。\n\n“当然，这只是个玩笑。”马特奥斯继续说道，“我向各位保证，这座港口的价值将不言自明。诸位与墨西哥都将收获丰厚利润。”直到此刻，听众们花岗岩般的面容才浮现出扭曲的笑意。“我必须感谢各位。首先是我的日本与美国朋友，外国投资对墨西哥国家发展至关重要。”听众们整齐划一地点头。“先生们，”马特奥斯挥手示意敞开仓库大门，指向远方的港口，“这座港口与城市固然是工程奇迹，但仅仅是开端。引进最新工业设备与机械将壮大墨西哥制造业。通过这座宏伟门户，我们必将实现互利共赢。”总统不自觉地为演说注入的磅礴气势，在周遭商人眼中不过是浮夸表演。“墨西哥的自然资源将为海外合作伙伴带来巨大发展机遇。如此循环往复，步步攀升，而这一切都始于此地。”\n\n马特奥斯步下讲台融入人群，与外国投资者和本国企业家逐一握手寒暄，始终保持着不偏不倚的姿态。他在人潮中穿梭游走，直到这些被迫参与建设的人们脸上浮现出与有荣焉的自豪。若是他们能为墨西哥本身展露笑颜该有多好。"
 MEX_mega_melchorocampo.4.a: "今天，一扇崭新之门为墨西哥敞开。"
 MEX_mega_melchorocampo.5.t: "梅尔乔奥坎波报告"
 MEX_mega_melchorocampo.5.desc: "赏心悦目的成果量化地展现在总统眼前：这幅投影在整面墙上的巨幅图表显示着印太贸易的各种细节：进出口额，关税信息，货物种类，海盗活动区，以及其他许多数据。在图表的中间靠右侧，一个新添加上的中型小点吸引了总统的注意，它的名字是梅尔乔奥坎波。\n\n“总统阁下，如您所见，我们新建的港口已经实现了发展目标。”这位工商部官员将听众的视线引导向屏幕右侧的数据。\n\n“远远超出目标吗？”\n\n“不。它面临着区域内其他港口的竞争压力，尤其是早已存在的美洲港口，比如我们的美国盟友的西海岸港口。我们……”官员小心地斟酌着自己的用词，“……较高水平的关税也阻碍了更大规模的外国投资进入。”\n\n“工商部长已经为您准备了一份方案，请您过目。”总统拿过这份满是专业名词的文件，最前面的是一份概要。\n\n“……通过具有更低的关税和更少的贸易壁垒的‘自由港’，有计划地将市场开放水平提升两倍——”总统顿住了，他意识到了这项方案可能产生的后果。“这不会违背我们对本土工业的一些承诺吗？”\n\n“是的，总统阁下。这是有代价的。”"
 MEX_mega_melchorocampo.5.a: "“继续吧，我们需要投资。”"
 MEX_mega_cancun.1.t: "数字不会说谎"
 MEX_mega_cancun.1.desc: "一些人认为，人类的品味与情感皆可化作纸页上的数字，用以解答无解之题——这种念头在多数时候显得荒谬至极，往坏处想甚至堪称亵渎。你怎能指望用打孔卡喂饱一台机器，就能得出让全世界都爱不释手的汽水配方？计算机真能列出一份众望所归的史上最佳歌曲榜单？运行一道复杂方程式，就能配制出十成牙医一致认可的牙膏？\n\n当墨西哥银行阿拉梅达广场总部的白领们将成摞打孔卡塞入计算机时，围观者脑海中必然翻涌着这些疑虑。他们试图完成的使命表面看来同样疯狂——为一座待建的旅游城市选定完美坐标。\n\n事实上，根本不存在能让所有游客尽兴的完美之城。日美游客的消费习惯与偏好差异之大，注定无法打造全然称心的体验。但至少不必重蹈阿卡普尔科人满为患的覆辙。这座新城将穷尽可能：从全球酒店入住率数据到气候模式分析，从候选地航拍考察到详尽调研，银行家们已为决策注入海量参数。\n\n数十亿美元赌注下，计算机开始筛选城市。二十五处候选地被逐一评估排序。榜首之地因鲨鱼袭击率过高瞬间出局，另一处也遭淘汰。层层筛选后，五处半原始地带浮出水面。但最终胜者毫无悬念——金塔纳·罗奥州一片无人踏足的白沙半岛，终年暖水澄空，潟湖如天然屏障隔绝丛林猛兽。\n\n年轻的会计师埃曼努埃尔·阿隆索宣读结果时，掌声响彻大厅。是的，银行家们确信这台机器作出了完美抉择。"
 MEX_mega_cancun.1.a: "我们去坎昆！"
 MEX_mega_cancun.2.t: "假日计划"
 MEX_mega_cancun.2.desc: "为了打发等飞机的时间，年轻的建筑师加斯帕尔·穆尼奥斯又读了一遍他的总发展计划，而这已经是他今天读的第十二遍了。他停下了阅读，抬头注视着坎昆的简易临时机场。虽然他在岛上的时间不长，但开发速度却相当不错。迄今为止已经修好了一条小路，连接着简易机场与毗邻渔村的华雷斯港与军事基地。\n\n尽管施工速度并不慢，但加斯帕尔还是很难想象，这个当下密布红树林、沼泽与丛林的小岛，将变成计划中描绘的热带天堂。毕竟这张宏伟蓝图中包括了一座豪华大酒店、一座购物中心、一个大型高尔夫球场、一片工人住宅区，最后甚至还有一个国际机场。对加斯帕尔来说，这似乎是一个不可能完成的任务。\n\n加斯帕尔注意到，他的包机终于到了。他把计划的副本塞进了公文包，待到飞机降落后，他赶忙向前，登上了飞机。"
 MEX_mega_cancun.2.a: "一旦计划大功告成，也许他会预定一次来访。"
 MEX_mega_cancun.3.t: "蛇罐"
 MEX_mega_cancun.3.desc: "如果说这世上有什么最让胡利安·拉特利亚讨厌的东西，那就是蛇。他又驾驶着推土机推倒了一棵红树，树根似蛇一般随着红树的倾倒而钻地而出直冲冲的指向天空。胡利安吓的跳了起来，手死死的按住操从杆让推土机倒车，直到它陷入沼泽之中，引擎也不再咆哮。\n\n“该死！”他恼怒的嘟囔着，他厌烦做着这样的工作，就像他憎恶蛇一样，“探险队那帮家伙一定在哪躺着！除了放电线杆之外什么都不干！” 胡利安揉了揉他的后颈。“我迟早要跳槽。”\n\n他冷静下来，一想到就算调职可能让他加入下水道小组，天天在沼泽里铺管道，胡利安呼出一口粗气，把自己拉到现实之中，检查起被困住的推土机。\n\n他仔细端详着“蛇”，很快就发现这只不过是树根，他从座位上站起来，跳起来呼喊着周围在闲逛的同事，他们跑过去帮胡利安把推土机推出沼泽，这不是一件轻松的事，工人们费了半天劲才把这头野兽从沼泽中解救出来。胡利安从泥地上爬起来，跳进车里，又开始干活，心里想着如何才能挖一条从尼楚普特潟湖到大海的运河。"
 MEX_mega_cancun.3.a: "有志者事竟成。"
 MEX_mega_cancun.4.t: "金罐"
 MEX_mega_cancun.4.desc: "卡车不断地把表土运到坎昆，这里的第一批酒店已经迅速地拔地而起。胡利安·拉特利亚正驱车在平坦的土地上建设急需的防飓风混凝土地基。热带湿热的空气让他汗如雨下，但一想到这里很难遇到蛇，他的心里还是充满了感激。他在路上急转弯，到达了目的地开始了新一天的工作。\n\n对于投资者来说，坎昆是一块未探索的新大陆，酒店老板对于在这里投资持谨慎态度。为了促进投资，联邦政府在这里推行了低息贷款。曼努埃尔·阿隆索是一名新出道的会计师，负责处理有关低息贷款的工作。他翻开自己的文件、报告和备忘录，深吸一口气推开大门，准备与一屋子保守的商业巨头会面。\n\n在清除了红树林和淤泥之后，坎昆的沙滩展现出一片洁白。虽然建筑师加斯帕尔·穆尼奥斯在早些时候有顾虑，但他还是坚持完成了这个项目，结果也是不言而喻的。他快速草拟下最终版的国际机场的草图和图表。放下手里的工作，他环顾四周，欣赏着坎昆蜕变成一个度假天堂的进展。"
 MEX_mega_cancun.4.a: "梦想远大，成就更大。"
 MEX_mega_cancun.5.t: "离天堂太近"
 MEX_mega_cancun.5.desc: "夕阳穿越尤卡坦半岛的人心果丛林，缓缓西沉。在东部坎昆岛上的白色沙滩，来自世界各地的游客悠闲地躺在沙滩椅上，享受着海滨酒店送来的美味佳肴，耳边是轻柔的吉他乐。\n\n身着白色比基尼的美国金发女郎目视着她的同伴走入加勒比海渐深的海域。她确信同伴已经将她抛诸脑后，便把注意力投向了一群日本游客。\n\n一个黑皮肤、薄嘴唇、长鼻子的年轻人引起了她的注意。他的黑色头发巧妙地梳到一侧，敞开的棉布衬衫衬托着肌肉发达的胸膛。她前天晚上见过他，当时他优雅地跳着波列罗舞，从不踩错节拍。他有很多舞伴，但从不与其过夜。\n\n女郎深吸一口气，踏上炙热的沙滩向他走去。她站在众人面前，伸出手邀请年轻人共舞一曲。身旁的游客窃窃私语，强忍笑意。年轻人站起握住她的手，这下轮到游客们震惊了。他那只青筋暴露的宽大手掌轻轻一环，搂住了女郎纤细的腰。女郎凝视着他的眼眸，夕阳下，那双眼宛如琥珀色的深潭。\n\n“玛丽埃拉？”女服务员把目光从二人身上移开，“那边还有一群加拿大佬等着喝饮料。”她的老板给了她一个疲惫的微笑。"
 MEX_mega_cancun.5.a: "玛丽埃拉转身离开昏暗的天空和海浪，步履沉重地走上海滩，向着酒店去了。"
 MEX_debt_crisis.1.t: "下加利福尼亚的地方债务危机"
 MEX_debt_crisis.2.t: "墨西哥城、墨西哥州和莫雷洛斯州的地方债务危机"
