 MEX_econ_tab_header_1_desc: "§W§Y经济刺激度§!会通过短期的经济活动提升区域§GGDP增长率§!。刺激度每提高10%，地区GDP增长率就会提高0.20%。\n\n每过两周，经济刺激度会向§O基础水平§!§R衰减§!靠拢，该基础水平可经项目、决议和政策加以提升。§!"
 MEX_econ_tab_header_2_desc: "§W§Y主粮作物§!能够提供物美价廉、营养丰富的食物，从而提升区域§B生活质量§!；而与之相对，§G经济作物§!可以进行出口，带来财政收入和生产单位，同时鼓励人口向§g城镇§!地区迁移。\n\n更高的§o生产率§!会释放更多的农业劳动力，鼓励人口§g进城§!，同时产生更多生产单位。§!"
 MEX_econ_tab_header_3_desc: "§W随着§g城镇§!人口增长，GDP增长和社会发展不断加速。\n\n不过，人口从§G农村§!迁入§g城镇§!会造成§R失业§!，人口过密和基础设施过载会降低§g城镇§!§B生活质量§!。§g城镇§!人口也比§G农村§!人口需要更多的消费品。§!"
 MEX_econ_tab_header_4_desc: "§W§G农村§!§B生活质量§!促进社会发展，减缓居民向§g城镇§!迁移。\n\n§g城镇§!§B生活质量§!减少§Y经济刺激度§!§R衰减§!，促进社会发展，吸引§G农村§!地区人口迁入。§!"
