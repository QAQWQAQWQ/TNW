 MEX_econ_project_desc_8_104: "人们早已在墨西哥南部特万特佩克地峡的盐丘之中发现了石油油苗，但地质学家和石油商人都没有找到更大的发现。然而，最近的发现表明，这里的石油储量可能与墨西哥最大的油田不相上下。\n\n尽管地峡地区的商业价值可能因巴拿马运河的存在而受到影响，但唯有墨西哥国家石油公司有能力挖掘这片土地下蕴藏的宝藏。"
