l_simp_chinese:
 itatur.1.t:0 "黑牛行动"
 itatur.1.d:0 "哟伙计，《佩涅洛普之网》还没出，你不应该玩土耳其的。这个事件本来还说蒂尔凯什是领导人，现在他已经滚蛋了，文本也没有意义了，你要是觉得充数的文本有意思，那就随便你吧。"
 itatur.1.a:0 "我们必将胜利！"
 itatur.2.t:0 "土耳其胜利"
 itatur.2.d:0 "好啦玩家，我们做到了，意大利人被我们打得跪下喊爹！（好结局）"
 itatur.2.a:0 "提交和平条件！"
 itatur.3.t:0 "意大利掌控局面"
 itatur.3.d:0 "尽管土耳其人使出了浑身解数，但我们驻扎在中东的军队还是成功地阻挡了他们的进攻，遏制了他们的攻势。情报显示，战事绵长令土耳其政府焦头烂额，国内经济也因此遭受重创，这是我们提出和平条件的天赐良机。\n\n在庄严的大议会中，两种对待土耳其的策略备受瞩目。领袖齐亚诺提出了一个相对温和的方案：要求土耳其政府赔偿战争损失，并让大马士革地区非军事化，以防他们东山再起，威胁我方在中东的势力。而斯科尔扎，齐亚诺的党内劲敌，另辟蹊径，主张索取领土，特别是在大马士革与摩苏尔地区，以壮我国威，增进与伊拉克盟友的情谊。他坚信土耳其人自知败局已定，必将俯首帖耳，接受条件。现在，议会只需对此投票，一锤定音。"
 itatur.3.a:0 "齐亚诺的提案已正式通过并发出。"
 itatur.3.b:0 "斯科尔扎的提案更具吸引力，我们将进一步推动，赢得更多的筹码。"
 itatur.30.t:0 "帝国雄风犹存"
 itatur.30.d:0 "我们的意大利将士们奋勇争先，直捣土耳其腹地，胜利已成定局。大马士革已牢牢掌握在我们手中，这为我们增添了前所未有的筹码。\n\n卡洛·斯科尔扎在大议会上早已言明，意大利帝国要长久昌盛，必要开疆拓土。昔日我们对他的这番话持保留态度，继续把冲突控制在黎凡特地区。而今，土耳其已屈膝在我们面前，我们终于可以理直气壮地提出我们的要求。"
 itatur.30.a:0 "向土耳其人发送斯科尔扎的提案。"
 itatur.4.t:0 "伊诺努提出要求！"
 itatur.4.d:0 "沙场折戟，我们于中东战事中一败涂地，土耳其总统伊斯麦特·伊诺努递来了他的条件。他明确指出，若我们想保留黎凡特地区，就必须将多德卡尼斯群岛、塞浦路斯和黎巴嫩的领土交给他们。\n\n身陷囹圄，我们唯有俯首，接受这些强加于我们的城下之约。"
 itatur.4.a:0 "我们别无选择，只能接受。"
 itatur.5.t:0 "齐亚诺提出要求！"
 itatur.5.d:0 "意大利菜的抠脚，你咋让他赢的？"
 itatur.5.a:0 "就按他们说的办，回信同意。"
 itatur.6.t:0 "桌案上的提案"
 itatur.6.d:0 "斯科尔扎这个弱智东西，见你的鬼去吧。"
 itatur.6.a:0 "拒绝，再说一遍，拒绝。"
 itatur.7.t:0 "土耳其人拒绝了我们的提议！"
 itatur.7.d:0 "这些可恶的土耳其人竟敢拒绝我们的提案！他们声称自己的前线守的好好的，伊拉克甚至都未受波及，条款上的内容他们一个也不会接受。现在球踢回我们这边了:我们是要把土耳其的牛皮捶破，逼迫他们把这颗苦果吞下，还是采用齐亚诺更温和的提案呢？"
 itatur.7.a:0 "试着戳穿这些土耳其人 - 同样的提案再送过去一次。"
 itatur.7.b:0 "显然我们得给个更合理的提案，采用齐亚诺的方案好了。"
 itatur.8.t:0 "斯科尔扎的提案- 第二轮"
 itatur.8.d:0 "意大利正被玩家操控！"
 itatur.8.a:0 "开什么玩笑！拒绝！"
 itatur.9.t:0 "提案再度被拒绝"
 itatur.9.d:0 "土耳其人再度拒绝了斯科尔扎的提案，给的理由跟上次一样。大委员会中越来越多的人认为我们应该用齐亚诺的方案，因为很明显土耳其人不可能接受上一份提案。而斯科尔扎跟他的党羽们仍在大委员会里为他的方案辩护。"
 itatur.9.a:0 "行三顾茅庐故事，再送过去一次。"
 itatur.9.b:0 "真是徒劳，把齐亚诺的提案送过去得了。"
 itatur.10.t:0 "斯科尔扎的提案 - 第三轮"
 itatur.10.d:0 "意大利真是欺人太甚，这下不得不接受了啊 :("
 itatur.10.a:0 "没别的办法了……"
 itatur.11.t:0 "一场海上交锋"
 itatur.11.d:0 "罗得岛海军部传来几份令人担忧的报告。昨日，我们的巡逻船遭到土耳其方拦截。通常来说对方的措辞还是比较礼貌的，但这回他们开着大喇叭警告我们已开入了土耳其的领海，该行为是在侵犯他们的主权。一场争论接踵而至，我方坚称该区域隶属意大利领海，因其离罗得岛的海军基地不过区区数海里。\n\n突然间，土耳其方静默，转而向我军船只开火。我方进行了还击，局势就此升级。双方出动了更多军舰，随后展开紧张对峙。在罗得岛与马尔马里斯的海军部进行一系列对话之后，两方各退一步并收兵回港，所幸此次事件并未造成双方的人员伤亡。\n\n该报告似乎证实了我们的最坏打算，即土耳其人正琢磨着对意土两国的争议领土做文章。对该地区的增防工作已开展，意军部队及整个东地中海的意海军部都已进入高度戒备状态。"
 itatur.11.a:0 "我们必须做好最坏的打算。"
 itatur.12.t:0 "我军部队被意大利人袭击！"
 itatur.12.d:0 "打倒意大利帝国主义"
 itatur.12.a:0 "加强巡逻并调兵增援边境。要准备打仗了。"
 itatur.13.t:0 "塞浦路斯的动乱"
 itatur.13.d:0 "更多的坏消息从东部边境传来。\n\n塞浦路斯的土耳其裔人一直为自己的意大利身份而感到不满，随着意土二国之间的紧张关系加剧，这一矛盾已到了爆发的节骨眼上。\n\n在一场当地土耳其人的集会将矛头指向警察后，宪兵被派往警察部门以解决此事。随着警方与与会者发生肢体冲突，这场集会演变成暴乱。虽说土耳其人尽了自己的最大努力，但在增援的加持下警察仍控制了局面，暴乱最终得以平息。\n\n土耳其与意大利的紧张对峙即将变得一发不可收拾，塞浦路斯政府也实行了全岛戒严。"
 itatur.13.a:0 "至少希腊人不会对这感到大惊小怪……"
 itatur.16.t:0 "罗得岛大捷！"
 itatur.16.d:0 "随着罗得岛海岸上最后一批意大利士兵的仓皇撤退，我们已在爱琴海取得了压倒性的胜利。\n\n尽管意大利军队对即将到来的攻势做了很久的准备，但我们的部队还是突破了他们的防线，这得益于我们迅雷不及掩耳的行动和绝对的制空权。我们首先拿下了邻近的西米岛，海军在该岛东北海岸成功登陆了数个步兵团，轻松控制了大部分岛屿。尽管在崎岖地形中的小规模冲突持续了13天，但当意大利将所有的有生力量撤出岛屿时，有组织的抵抗行将结束，我们在这座城市中的地位得以巩固。\n\n随着这座城市及其周边地区的陷落，土耳其海军在爱琴海的控制力显著增强。\n\n土耳其士兵在古废墟间行进，许多人坚信我们在爱琴海的胜利是未来胜利的征兆。这场胜利极大地削弱了意大利在爱琴海的投射力量，至少在战争余下阶段里是如此。也为我们在中东的进一步行动提供了有利的跳板。这场胜利还具有双重意义：作为收复争议领土行动的一部分，它已成为了一个强力的宣传工具，胜利的消息在土耳其和意大利广为传播，必将提振士气，为我们在中东的战役增添助力。"
 itatur.16.a:0 "终于，罗得归于我手！"
 itatur.20.t:0 "罗得岛被土耳其人攻占！"
 itatur.20.d:0 "马尔特所在的部队在土耳其新近的攻势前几乎未得到预警。在某个深夜，他们按指挥官之命，在军营中匆忙行动，意识在半梦半醒间游移。天空中，唯有月光朦胧。\n\n土耳其军队本应直指罗得岛上的意大利军事设施，然而并非如此，他们以迅雷不及掩耳之势，出人意料地快速行动。他们巧妙地绕开了罗得海峡和意大利人的坚固防线，海军先取西米岛，再借势发起了协同夜袭，令罗得岛东北角在小规模步兵和空中优势的支援下失守。马尔特和他的部队直到数周后，才从土耳其军官得意洋洋的报纸专栏中得知战况。\n\n当时他们所知，不过是一小撮土耳其部队登陆了岛屿，看似既无补给之能，也无威胁意大利势力之力。然而，克雷马斯蒂附近的夜战和意大利人的惨败，并非孤立事件，而是风雨欲来的征兆。在意大利的北部教区，同样的事情已在悄然上演，意大利在爱琴海的掌控力，自爱琴海战役受挫之后，至少在余下的战争进程中难以恢复。马尔特和他的残部后来才得知，罗得岛坚持了约13天，直至意大利部队被迫撤离，留下他们这些被俘的士兵，从报纸和战俘营指挥官的晨间点名中，感知战争的走向。"
 itatur.20.a:0 "糟透了！"
 itatur.100.t:0 "[Get_newspaper_header]沙漠里的战争"
 itatur.100.d:0 "自第二次世界大战结束以来，土耳其一直对他们在战利品中所占的份额感到不满。太多的土耳其人死在他们的国境之外，得到的却少之又少。随着土耳其总统伊斯麦特·伊诺努宣布土耳其共和国和意大利帝国之间进入战争状态，这种长期的紧张局势终于在今天走向爆发。\n\n尽管两国此前是盟国，但战争在土耳其极受欢迎。青年民族主义者在安卡拉的街道上游行，呼吁伊诺努“引领我们走向胜利”。相比之下，这场战争几乎完全得不到意大利民众的支持，许多人质疑意大利为何当初要介入塞浦路斯的乱局。"
 itatur.100.a:0 "又一场帝国主义战争。"
 itatur.100.b:0 "我们要将其击溃。"
 itatur.100.c:0 "居然能如此对待前盟友。"
 itatur.21.t:0 "意大利在罗得岛获胜"
 itatur.21.d:0 "意料之中，我们的军队成功击退了土耳其对罗得岛的进攻。这场短暂的冲突虽只是土耳其在三巨头政权解体后，欲乘乱吞并长期觊觎领土的更大企图之一隅，但胜利的消息早已传遍报端，罗马城内亦是欢声雷动。\n\n“意大利军威，坚不可摧！”齐亚诺在首都的演讲中慷慨陈词。“在罗得岛上我们已令土耳其人铩羽而归，黎凡特之地亦将如此！”\n\n然此次胜利，虽不足以保中东战局全胜，或帝国荣光永续，但至少在罗得岛上，意大利的国旗仍旧迎风飘扬。"
 itatur.21.a:0 "意大利万岁！"
 italy_turkey_war:0 "意土战争仍在继续"
 SNS_Lebanese_Resistance:0 "黎巴嫩抵抗运动"