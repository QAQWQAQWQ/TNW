#Characters#
PAN_Jose_Remon_Cantera: "José Antonio Remón Cantera"
PAN_Jose_Remon_Cantera_desc: "When Washington first divided the isthmus, it chose not to impose colonial rule as it did with Puerto Rico, preferring a controlled disorder. However, Panamanian politics and the canal eventually gave way to José Antonio Remón Cantera, America's policeman in Panama.\n\nAn obscure figure until he entered Panama's security forces, Remón joined during its lowest point, devastated by the Great Depression. Amidst American worries of Axis infiltration, a Panamanian was allowed for the first time to head the National Police. Remón was appointed due to being the only candidate who studied at a military academy.\n\nIn power, he molded Panama's democracy to his liking, rigging elections and couping Presidents to his and America's content. After he overthrew Arias again for attempting to curb the Police's influence, Remón decided it was not enough to influence Panama's politics from behind the scenes, and became President himself.\n\nSince then, he has amended the constitution, served multiple terms in office and survived an assassination attempt in 1955. With no one daring to oppose him since he ordered the death of one of his Vice Presidents, José Ramón Guizado, a suspected conspirator of the assassination attempt. He possesses absolute power with resistance at an all-time low, enacting progressive and nationalist reforms so long as they don't upset America or the oligarchy too much.\n\nWith America's continued backing, Remón will likely rule Panama for another decade unless something radical happens."
