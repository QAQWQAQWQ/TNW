 BKU_Sabiha_Gokcen: "萨比哈·格克琴"
 POLITICS_AHMAD_BARZANI_DESC: "难道对于库尔德人来说只有不得不向理想妥协，才有可能实现他们那个遥不可及的梦想——拥有民族自主权吗？看来是的。\n\n谢赫·艾哈迈德·巴尔扎尼年轻时曾失去了一切：身在襁褓之时，他的部落掀起了一场反抗奥斯曼帝国的起义，结果他的父亲、祖父和一位兄长因宁死不屈反抗最高朴特，而最后被处决，当时他甚至还没成年。直到他三十年代被短暂的放逐到土耳其之后，艾哈迈德靠他一己之力领导起数量众多的库尔德部落反抗伊拉克政府以及他们那徘徊在他兄弟穆斯塔法身旁的英国主子。\n\n人们都觉得他的战争不过是希望飘渺的无力挣扎，可当英国托管下的伊拉克在轴心国的兵峰前崩溃时，巴尔扎尼靠着为土军作战以及自己在土耳其政坛内的私交甚广的优势，迅速控制了他的故土。现在谢赫坐在一尊由无数库尔德自由战士尸骨搭建的王座上，听着从安卡拉传来的一首首舞曲，在他们的命令下和着致命的旋律，翩翩起舞……"
 POLITICS_SABIHA_GOKCEN_DESC: "身为摩苏尔和基尔库克第六总督察区的领导人，萨比哈·格克琴的首要任务只有一个：在这片动荡之地维护土耳其民族的利益和激进的凯末尔主义。\n\n几十年前，她的工作要比这普通得多。这位阿塔图尔克的养女只用担心一件事：让她的飞机能够正常工作（她是土耳其的第一批女飞行员）。但随着代尔西姆的轰炸以及雷杰普·佩克（她的亲密盟友）的崛起，还有伊斯麦特·伊诺努的掌权，她坐着火箭一路高升，担任了更高的军职，并在叙利亚、亚美尼亚和西俄罗斯的前线成为了战争英雄。\n\n佩克去世后，伊诺努对激进凯末尔主义者进行了清洗，但这也没能阻止格克琴的崛起。她和佩克的朋友们走的很近，但作为军官，她还是谨慎地保持着冷静，直到伊诺努将她在政治领域的沉默误判为了正确的道路。更重要的是，伊诺努相信她的反恐行动和日常事务经验，将她任命为了摩苏尔和基尔库克的总督察。\n\n她召集了志同道合的将军、政客和官僚们，这让塔拉特·艾代米尔的凯末尔青年团能在该区域畅行无阻，格克琴也随之开始了阿尔普·阿尔斯兰行动，计划将摩苏尔和基尔库克永远并人土耳其。利用石油收入，她将摩苏尔变成了一个综合工业基地，也是土军最重要的后勤基地之一。现在，格克琴只想将摩苏尔和基尔库克变为土耳其永远不可分割的一部分，无论将有多少炸弹落在那些“颠覆者”的头上。"
 BKU_Operation_Alparslan: "阿尔普·阿尔斯兰行动"
 BKU_Operation_Alparslan_desc: "阿尔普·阿尔斯兰行动是以塞尔柱帝国的苏丹的姓名命名的。他赢得了曼齐克特战役的胜利，为土耳其人民打通了去往安纳托利亚的道路。而该行动的目的也正如其名。\n\n其意图相当简单，但国内的反对派，即国家民主党和民主革新党，也一直都在谴责该行动的宗旨。行动一旦大功告成，那些旨在“消除”恐怖主义活动的任务也都将一并取得胜利。在城市中心的监视和教育计划，和在山区与农村地区打击恐怖分子的行动等旨在促进土耳其化进程的多阶段努力也将结出硕果。"
 BKU_Musul_Kerkuk_Oil_Company: "摩苏尔和基尔库克石油公司"
 BKU_Musul_Kerkuk_Oil_Company_desc: "摩苏尔和基尔库克石油公司是奥菲西石油的子公司，负责充分开发摩苏尔和基尔库克这片富含石油的土地的潜力，而它也乐于承担此项任务。\n\n进展相当顺利，摩基石油的工作产出了巨量的财富。这笔意外之财塞满了土耳其商人大军的钱包，也让第六总督察区的小金库赚了个盆满钵满。后者直接把这笔钱投进了当地的军工业建设。"
 BKU_Turkey_takes_oil_tt: "§R该地区的所有自然资源均由土耳其管理。§!"