 CAM_Norodom_Sihanouk: "诺罗敦·西哈努克"
 POLITICS_NORODOM_SIHANOUK_DESC: "二十一载春秋轮回。西哈努克苦等了如此之久才洗去了失国的冤仇，柬埔寨终于回到了他的手中。\n\n作为皇室独子，在祖父西索瓦·莫尼旺殡天后，年仅十九岁的西哈努克就被法国人扶植为了柬埔寨国王。然而，西哈努克连王座都没捂暖，这一切就被山玉成给打断了。此人醉心于权力，强迫西哈努克立自己为相，而后又为讨好民众，砸碎了西哈努克的王位。\n\n在下野后，西哈努克同无福消受山玉成恩惠的反对派结为了同盟。他在内战中迎来了转机，加入了反对山玉成的右派阵营，成为了诺罗敦·尚塔拉英西亲王领导的“自由高棉”的一员。西哈努克的人望很快就压过了亲王，成为了运动的新领袖。\n\n西哈努克不想变成毫无权力的虚君，也不想重建君主的统治。西哈努克已经适应了这个时代，学会了现代的治理之道。是他为柬埔寨的人民带来了稳定，是他英勇地终结了内战，而不是山玉成那个逃之夭夭的懦夫。西哈努克将以本心本性，为明日的柬埔寨重塑金身。"
 CAM_Lon_Nol: "朗诺"
 POLITICS_LON_NOL_DESC: "山玉成总统曾被视作复兴高棉的一代英主，然斗转星移，他那越南傀儡的真身再也无处可藏。历史再度重演，朗诺只能推翻这个草包，接过家国重担。\n\n作为“和平卫士”之子，朗诺承接家族传统，成为了当权者的鹰犬，他甚至愿为法国人的殖民事业添砖加瓦。后来日本人为柬埔寨送来了独立，他又在第一时间成了新政权的哈巴狗。而当共和国诞生之时，朗诺又欣然接受了国王的倒台，继续为高棉民族效力，在军中节节高升。\n\n六十年代伊始，朗诺便将精力投入到重建因伊萨拉行动的耻辱性惨败而灰头土脸的军队当中，他也在这个艰难的过程中逐步建立起了对军队的控制。然而，山玉成在越南人面前摇尾乞怜，为权力置高棉民族于不顾的行为让朗诺的努力化为泡影。乘着山玉成出访东京，朗诺夺取了政权。\n\n如今的朗诺登上了总统宝座，他正计划着转变态度，他不会再掩饰对收复失地的渴望了。高棉人不会再因惧怕撒了越南老爷的茶而东躲西藏，奴颜婢膝了。\n\n站起来，高棉人！"
 CAM_Son_Ngoc_Thanh: "山玉成"
 POLITICS_SON_NGOC_THANH_DESC: "1949年，山玉成首相来到金边，将西哈努克国王的王冠砸了个粉碎，柬埔寨共和国就在那王冠的碎片上拔地而起。山玉成面临的矛盾太多了——他是共和派，却得服侍一位国王；他是高棉民族主义者，却得去法国接受教育；他憧憬日本式的治国方法，却身处法国人建立的王国。如此之多的矛盾，终于让他与西哈努克决裂。他借日本人的赞许当上了外交大臣，利用年轻人的热情登上了首相之位，最终在伊萨拉行动的混乱中砸碎了诺罗敦的王冠。\n\n“当代昆大王”不仅广受人们欢迎，对待那为数不多的异议分子，他也毫不手软。在完全掌控国家后，山玉成计划增强国家的实力，洗去王室沾染在国家身上的污点，让国家迎接新的未来。但在伊萨拉行动结束时做出的妥协，让一些人有胆量反对他。这之中有温和的言论，也有左派的煽动。这些声音萦绕在金边的政界之上，企图在柬埔寨建立新的制度。\n\n他们很快就会知道，山玉成的怒火有多么猛烈。"
