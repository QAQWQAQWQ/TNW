 CAM_Dictatorial_Devaraja: "独裁天王"
 CAM_Dictatorial_Devaraja_desc: "§D“我会毫不犹豫地亲自献祭它，将国家引导向其他道路，再协助它和平地完成它所选择的革命，不需要谁流血。”§!\n§Y——诺罗敦·西哈努克，1962年§!\n\n学识不足的佛教徒常常以为，所谓“天王”就是把绝对君主制当做自然秩序的铁律。真正的行“天王”，说的是传达佛的教义。诺罗敦家族把“天王”当做理所应当，西哈努克国王尤其笃信于此。他们以为自己的政治合法性是永恒的，在人民受苦的同时，他们却大腹便便、好逸恶劳。\n\n所以，在山玉成亲自将王室从王座上推下后，他受到的欢迎，远远超过了历朝历代的君王。山玉成以历史上的昆大王作为榜样，从他的生平中感悟自己治国的力量与道理。昆大王是位英勇的士兵，企图推翻一位昏庸无能的君主，令秩序重归祖国大地。在山玉成看来，昆正体现了“天王”。"
 CAM_The_Unloving_Father: "无情的父亲"
 CAM_The_Unloving_Father_desc: "§D“自由高棉的首长里有不少泰人，他们都是来帮助柬埔寨抗击法国的。就算他们是泰人，他们也能称得上是优秀的柬埔寨人。他们比柬埔寨人还爱柬埔寨。”§!\n§Y——讪年·坎他差瓦那，1970年§!\n\n柬埔寨共和国不是靠自己诞生的，而是泰共和国按照其自身的模样塑造出来的。泰国不会给予柬埔寨温暖的乳汁，只会向柬埔寨刺来锋利的刀尖，新生的共和国只能尽力躲开。\n\n战后，柬埔寨失去了马德望和暹粒。1949年伊萨拉行动开始时，柬埔寨又差点灭国。这两重悲剧令柬埔寨成了曼谷的奴仆。还好，泰国政府并不在乎高棉人，让他们还能有些自由的空间。"
 CAM_The_North_South_Axis: "南北轴心"
 CAM_The_North_South_Axis_desc: "§D“柬埔寨种族起源高贵，在与敌人战斗、拯救信仰、解放祖国时不惧怕死亡。整个种族都遵循着佛的教导，认为死亡好过奴役和宗教迫害。”§!\n§Y——山玉明，1951年§!\n\n南北轴心是个俗话，指的是金边各种政治势力与政府之间的冲突。左边，青年们大声呼喊，声音震耳欲聋，要求夺回泰国从柬埔寨身上撕下的领土。\n\n右边，则是朗诺将军的松散派系：下高棉运动。他们的立场是维护居住在越南南部湄公河三角洲的高棉人的利益，还有人支持某种极端民族主义思想，要求恢复对当地的统治，就像18世纪的高棉一样。目前的情况仍然对总统有利，在柬埔寨政界，无论是向左的观点还是向右的观点都还不算主流。然而，假以时日，某一种观点有可能在恰当的时机复苏。"
 CAM_The_Five_Year_Plan: "五年计划"
 CAM_The_Five_Year_Plan_desc: "§D石头从建筑上落下时\n阁下将它摆回了原处。\n科马耶阁下，自法国而来，\n在上面涂了一层水泥以作加固\n凡是青苔遮人视线处\n阁下都打扫干净了。\n§!§Y——奥克雅·索丹达布雷杰，1909年§!\n\n尧格和宋双既受命于总统，也受命于人民，而五年计划正好为这重任安下了最后一块砖头。这是柬埔寨有史以来的第一份经济计划，目标是全面的农业改革和土地再分配，并在贡布省和茶胶省建设机械化轻工业。将来，这两个省份将成为全国的模范。\n\n为了让这计划成真，日本在财政、管理和技术方面慷慨地援助了尧格和宋双。在经济发展的周期中，这样的援助尤为可贵。"
 CAM_Jewel_Of_The_Republic: "共和国的珍宝"
 CAM_Jewel_Of_The_Republic_desc: "§D从那座城到每一个省份，\n每一条溪流上都架着一座桥，\n大大小小，成百上千的桥梁，\n坚固如石，汽车穿梭其上，\n千头大象亦可踩踏其上，\n不会使其倒塌。§!\n§Y——奥克雅·桑，1928年§!\n\n金边，法国的又一个殖民实验场，依照法国人的现代主义及先锋表现主义爱好建造，用以测验何种设计更适合本土的城市。法国人已经被赶回了老家，如今日本国旗连同共和国国旗飘扬在城市的天际线上，将城市改造成亚细亚首屈一指的珍宝。\n\n金边城是东南亚的经济巨头，这里有游客，有赌场，有妓院，展示出一切经过现代化的事物。在发展的同时，金边的知识分子和青年人还格外地支持山玉成。他们对金边的现状感到恶心，想要提出消灭这些现代性的缺陷的方法，而且日渐激进。"
 CAM_Spilling_The_Masters_Tea: "洒了老爷的茶"
 CAM_Spilling_The_Masters_Tea_desc: "§D“越南人把高棉人埋进土里，只露出脖子以上的部位，然后在高棉人的脑袋上支起一个木炉子，烧水给老爷煮茶喝。受害者因高温和窒息的痛苦摇动脑袋时，越南的行刑者就对他们说：‘小心点，别洒了老爷的茶！’”§!\n§Y——《黑皮书》，1978年§!\n\n柬埔寨并不放心国内的京族少民。政府在打出沙文主义和种族民族主义的旗号的同时，以一种微妙的方式处理着柬越关系，并与顺化政府保持着友好的关系。\n\n不过，如今的政府正行走在因过去的疑虑而产生的雷区中。如果高棉人认为总统不关心，或者没办法从京族同胞手里拿来本就该属于高棉族的定居点，那么过去的疑虑，就会在今日成为致命的毒药。"
 CAM_The_Veal_Thom_War: "威通战争"
 CAM_The_Veal_Thom_War_desc: "柬埔寨与老挝的北方边界是个错误。在尧格的农村改革中，诺罗敦·占达朗赛亲王与东京之间的联系是成功的关键之一。而如今，为了从老挝手中夺取上丁省，亲王已亲自率领一万两千人的队伍前往当地，混乱随之而来：日资纷纷外逃，印支共产党插足当地，老挝军队和达春叛军都已经动员起来。\n\n事实证明，这是金边政府的外交噩梦。"
 CAM_A_Confused_Revolution: "革命歧路"
 CAM_A_Confused_Revolution_desc: "柬埔寨新生革命的意识形态基础笼罩在一片迷蒙之中。虽然山玉明与高级干部都坚定地信仰共产主义，但革命原则在队伍中的地位却陡然下降。\n\n与其说柬共是工人阶级的先锋队，倒不如说它是由国内爱国和进步人士组成的反日大帐篷。于大多数人而言，独立已经足够美好，至于如何对待资本主义这个问题嘛，由于柬埔寨的落后，争论仍在继续。"
 CAM_The_Squabbling_Brothers: "兄弟之争"
 CAM_The_Squabbling_Brothers_desc: "从官方角度讲，越柬如今是兄弟国家，因社会主义革命的星火而团结一致。但实际上，两国之间的关系要微妙得多。\n\n柬埔寨对越南人的沙文主义态度仍然丝毫未曾减弱，许多人都愈发对所谓的“解放者”感到愤怒。有传言说，越南人会趁机利用这次入侵重新划定边界，吞并有争议的村庄，这只会进一步助长类似的情绪。唯有时间能告诉我们，两国之间的龃龉能否在未来得到化解。"
 CAM_Traditional_Devaraja: "传统天王"
 CAM_Traditional_Devaraja_desc: "天王的概念已经脱离了传说中的神话人物昆大王，回归到了君主的身上。西哈努克本人是否拒绝了王室身份并不重要，关键是很多支持他的柬埔寨人依旧视他为王。这也造就了一个有趣的现象，金边的知识分子们管他叫总统，而农村的农民们则把他当国王一样膜拜。"
 CAM_Devaraja_Chained: "天王受缚"
 CAM_Devaraja_Chained_desc: "对日本和柬埔寨政府而言，山玉成总统都已经成了个麻烦的累赘，人们只得发起强硬的行动。曾经伟大的战士遭到了软禁，而柬埔寨政府将在温和派的领导下继续运行。他们把总统当成了橡皮图章，偶尔会将他当作权力的饰品拉出来装点门面。\n\n直到死亡到来，山玉成都将如此。更可靠的人选将接过他的衣钵，不再重蹈他的覆辙。"
 CAM_Dictatorial_Devaraja_Lon_Nol: "独裁天王"
 CAM_Dictatorial_Devaraja_Lon_Nol_desc: "山玉成一如旧日的昆大王那般，废黜了西哈努克。然而山玉成总统未能保住高棉人民的民族自尊，他也在朗诺的手上重蹈了覆辙。自封元帅的朗诺身披军装，高调地宣布自己会成为全高棉人的捍卫者。他是否能建立昆大王那样的功业？一切还有待观望。"
 CAM_Dictatorial_Devaraja_Lon_Non: "独裁天王"
 CAM_Dictatorial_Devaraja_Lon_Non_desc: "历史再度重演，朗农从他的兄长手中夺过了政权。然而，这场政变并非来自对国家的热爱，而是对权力的渴望。泰国人给了朗农这个机会——独揽大权的机会——他高兴地接下了这一切。\n\n和平并非朗农的目标，这不过是夺权的副作用，但泰国的金主们对此万分满意。只要朗农能让高棉国民心满意足，他的统治就能安全无虞。不然的话，他就只能落得跟他哥哥一样的下场。"
 CAM_Republican_Revolution: "共和革命"
 CAM_Republican_Revolution_desc: "中国的共和政体熠熠生辉，实乃现代亚洲社会之典范。然而，柬埔寨却继承了泰国帝国主义式的治国方针。种种弊病，一言难尽。但在符宁领导的共和革命下，一切暴政都走到了尾声。\n\n共和青年团以汪精卫为榜样，研究起了他战胜亚洲英帝国主义的革命经验。只要革命尚存，汪精卫的光芒就会永照柬埔寨，教导高棉人民提升治国水平，引领高棉步入二十世纪。"
 CAM_Bubbling_Northern_Tensions: "北方紧张局势加剧"
 CAM_Bubbling_Northern_Tensions_desc: "曾几何时，只有以金边为中心，寥寥无几的数名青年疾呼着要泰国归还从柬埔寨割走的领土。现在这些青年把握了国家大权，他们的声音被放大到了国家的层面。柬埔寨民族失败的大业无法再将他们分隔，他们的双眼正紧紧地盯着那帮泰帝国主义分子，柬埔寨不会再屈服了。\n\n不久以后，他们就会迎来一场一劳永逸的清算……"
 CAM_New_Kampuchean_Revolution: "新柬埔寨革命"
 CAM_New_Kampuchean_Revolution_desc: "柬埔寨迎来了美丽的黎明，高棉民族的伟大复兴就此踏上征程。长久以来，山玉成总统的未来愿景都在一次次徒劳无功的妥协中落得一场空。他牺牲了一切，却一无所获。但有了戒严令，情况可就要反转了。\n\n这就是山玉成的手段，同时也是一条经济高棉化的大路。除了日资企业之外的倒霉外企们危如累卵，只有向高棉民族献上忠诚方可避祸。这一状况令柬埔寨的邻国坐立难安，他们正在搜寻摆平此事的良策。"
 CAM_The_Managerial_State: "管理型国家"
 CAM_The_Managerial_State_desc: "柬埔寨的重建工作漫长且乏味，况且柬国政坛人才凋敝，日本必须把精力转向公务系统，如此方能稳住这个国家。这些政治冷漠的专员被赋予了远超其职责范围的权力，以规划柬埔寨复兴为任务开展工作。\n\n如果缺乏资源，他们还会向日本寻求财政支持。如此一来，柬埔寨终将被纳入日本的管理之下。"
 CAM_The_Second_Five_Year_Plan: "二五计划"
 CAM_The_Second_Five_Year_Plan_desc: "在此前的五年计划成功达到目标后，总理和宋双又指导制定了新一期五年计划。农业改革、土地再分配、工业机械化建设将扩展到磅士卑、干丹、波萝勉以及柴桢各省。日本将慷慨地提供所需的贷款和资源，帮助柬埔寨将新一轮现代化建设计划化作现实。"
 CAM_The_Third_Five_Year_Plan: "三五计划"
 CAM_The_Third_Five_Year_Plan_desc: "随着柬埔寨左翼政治势力的不断壮大，新一期五年计划已经付诸成文。在迄今为止最为雄心勃勃的计划之中，制定者乔森潘和叶西召将其推行范围从前两期五年计划中的六个试点省扩展到了全国。\n\n不平等将从此消失，农民将拥有自己所耕种的土地，高棉人将比起以往任何时候都更加地团结一致。虽然这一切都不得不再次仰赖日本贷款，但很快有一天，他们就不再需要这样做。柬埔寨将摆脱枷锁，自力更生。"
 CAM_Expansionist_Pariah: "扩张主义的弃儿"
 CAM_Expansionist_Pariah_desc: "在演讲中，朗诺毫不掩饰地展露出自己骇人的种族主义与复仇主义倾向。两相对比之下，就连山玉成前总统都变得像个鸽派人士。\n\n朗诺反复拷问柬埔寨民族这一议题，提醒国民越南暴君正霸占着高棉的手足。共和国军队集结在了越南与泰国边境，柬埔寨的邻邦必须行动起来，应对这场祸害。"
 CAM_republican_rev: "高棉共和革命"
 CAM_new_kampuchean_rev: "新柬埔寨革命"
 CAM_Ieu_Koeus_hog_desc: "§Y柬埔寨共和国总理\n左翼法团主义§!\n--------------\n§L倘若山玉成是共和国的心脏，尧格就是共和国的大脑。早在西哈努克时期，尧格就是名受人尊敬的政治人物，是国民议会里的头面议员。伊萨拉行动结束时，尧格在谈判桌上大展手脚，确立了自己在诞生于战后的柬埔寨共和国中的崇高地位。尧格胜友如云，又学识渊博，专于治理，人们敬佩他，比敬佩山玉成还要多。\n\n自上任起，尧格就全心全意为建设祖国而劳作，现在已经到了他的第二个任期。尧格的办公桌上堆满了各种经济、工业方面的报告，还混着日本人和中国人开的银行的信用报表。而尧格要做的，便是利用这些资料，为柬埔寨民族制定出新的五年经济计划。§!"
 CAM_Son_Sann_eco_desc: "§Y财政部长\n法团主义§!\n--------------\n§L宋双对金钱了如指掌。他来自大地主之家，生来就享受着大笔财富，长大了读的又是巴黎高等商学院，生命中每一刻都在与钱打交道。他在伊萨拉行动期间担任公务员，出色的能力使他得以加入内阁，成为财政部长。\n\n除了精于财政外，他还是柬埔寨与东京之间的纽带，这就是他对山玉成政府的最大作用。没有他的人脉关系，柬埔寨就没有资本实施五年计划，也没法在伊萨拉行动之后重建国家了。§!"
 CAM_Achar_Sok_for_desc: "§Y外交部长\n社会民族主义§!\n--------------\n§L1947年以前，阿乍索还只是名平凡的僧人，在乌那隆寺教授神圣的巴利语。他深知穷人的困难，当山玉成掌握大权时，他看到了消解穷人苦难的机会。阿乍索卖掉了他的袈裟，买了一套西装，然后加入了新生的高棉共和人民会，代表这个大帐篷中的“左派”加入了山玉成的内阁。\n\n尽管自己的职位是外交部长，阿乍索依然关心如何将财富分配给穷人，时常会发表一些带有社会主义色彩的言论。日本若是关心柬埔寨，一定不会对阿乍索的外交政策感到心安。他想要远离越南和泰国，向印度尼西亚和自由印度接近。§!"
 CAM_Dap_Chhuon_sec_desc: "§Y国家安全主管\n军阀§!\n--------------\n§L山玉成内阁中，国防部长一职目前悬空。它的主人正在暹粒，在洞里萨湖畔养病。也许就让国防部长一职悬空着是件好事，等那个人回来，死亡也就回来了。\n\n“达春”是个化名，但他不觉得其他名字适合他。川·肯佩？这个名字已经随着法泰战争进了历史。从战场上走出来的是达春——一位抗法领袖，后来成了个小军阀，正端坐在以白骨构成的王座上。山玉成认为，维持秩序就需要达春这样残忍的人。至于见不见得到他本人，他制造出了多少座尸山，那都不重要。§!"
 POLITICS_SON_NGOC_THANH_CORP_DESC: "曾经，山玉成是英雄，是将堕落的诺罗敦王室连根拔除的传奇；如今，山玉成空顶着“总统”的尊号却什么都做不到，就像从前的“国王”一样，活得毫无意义。有时，他会想，等到自己入土之后，西哈努克会不会站在坟头上嘲笑自己。\n\n在这形单影只的日子里，他有足够的时间反思自己，让他想明白了自己究竟是在什么时候走上了垮台的不归路——一切都源于他倾向右派，任命了朗诺为总理。当然，左派不满意，他们永远都不满意，但山玉成没想到他们竟会离开人民共和会，更没想到他们会对自己倒戈相向。\n\n紧缩！左派就只晓得这个，那么农民失去控制，农业危机演变成血腥事件也不算意外。可如果说左翼分子拿起武器还不够糟糕的话，那该死的亲王和他的“自由高棉”加入战局更是火上浇油。若知如此，他就早该趁着有机会的时候，把王室斩草除根、一个不留。现在，所有人都对金边虎视眈眈。\n\n他们赢了，代价则是民族的自豪。宋双和日本人的马仔把山玉成抓了起来，仿佛他已经山穷水尽一般，然后急忙去向东京摇尾乞怜。如今，山玉成孤坐家中，等着那群人把自己推出去当牌位使唤，直到自己彻底失去所有价值。他成为了自己曾经痛恨的模样：一个无所事事、毫无用处的国王。"
 POLITICS_SON_NGOC_THANH_REVNAT_DESC: "太久了，山玉成不得不屈服于妥协的理想太久了。如今，这一切都将结束，柬埔寨将会成为他纯粹理想中的模样，宛若纤尘不染的白雪，再也不受老挝、泰国或是越南阴谋的操纵。\n\n朗诺、严森波这些个右派泰国狗腿子对他步步紧逼，他们谋杀巴春便是野心的铁证，但末日马上就要降临到他们头上。过去十年里，山玉成的权力与日俱增，任何过去的废物国王都无法与他相匹敌。总统已经做好了准备，要出其不意地将所有反对派一网打尽。\n\n而相对地，左翼向总统证明了自己的价值。尽管他们的倾向或许有些问题，但无疑都是真正的爱国者，像乔森潘这样的下一代民族革命家将率领柬埔寨走向崭新的强盛时代，在老挝、泰国、越南叛徒的尸体上，将共和国建设得更加伟大。\n\n海潮一般的高棉人敬畏得仰望着他们爱戴的总统，每个人都是优秀的战士，愿意为了他殒身不恤；山玉成热泪盈眶，回望着人群，为自己能让民族寻回曾经的骄傲而自豪……是他激励着下一代，夺回曾经失去的帝国。"
 POLITICS_SON_NGOC_THANH_MANSTATE_DESC: "妥协是梦想最大的杀手。在宣布戒严令时，山玉成以为自己已经摆脱了它的困扰，可殊不知他却变成了越南人棋盘上的小卒子，被拖进了另一个泥潭之中。如今，妥协让他沦为了严森波的右派傀儡。\n\n朗诺的手下看管着他的一举一动，名存实亡的总统独坐家中，他有足够的时间去反思自己犯下的错误。看来，自己的倒台始于威通战争的失败，上丁省再次从他的手中被夺走。当然，追根溯源，这次错误应当归因于伊萨拉行动。若是自己未曾屈服于老挝的卑劣要求和日本干涉，那该有多好。\n\n彼时的山玉成就像是一条跛脚老狗，不得不转而向越南求助。越南人只会索取，不会付出，可他竟迷了心窍，对此视而不见。当耿万萨将他怒斥为高棉民族的叛徒之时，他才意识到自己已经回不了头了。也许对他这样的可怜虫而言，当傀儡正是最为恰如其分的命运，即使他的主人是严森波这样的恶徒也一样。\n\n而要说这次顿悟中，最为重要的领悟是什么，那就是他山玉成是个仰人鼻息的傻瓜。他是个懦夫，放弃了身为高棉人的骄傲，反而去屈膝投靠弱小的民族。当他失去一切利用价值的时候，便会被抛弃背叛。山玉成如今唯有一个希望：有朝一日，柬埔寨能迎来一位真正的英雄，让害人虫见识见识高棉人民的真本事。"
 POLITICS_LON_NON_DESC: "顶天立地的高棉人害得邻邦满脸愁容，但朗农的掌权释放出了让高棉人再度跪下的信号，他们又得给主子们端茶送水了。或许，这样的状况就是柬埔寨的最优解。\n\n但朗农是何方神圣？大多数人都不知道该如何评价这号人物，只能给他打上朗诺的弟弟、权力的饕餮这两个标签。不过，朗农大半的人生正源自于此。他跟随哥哥参军入伍，在裙带关系与鞍前马后的马屁精们的帮助下步步高升。\n\n当朗诺成为总统之时，朗农也一样受益匪浅，只因自己是总统的弟弟，便成为了政府大员。然而，朗农对权力的贪欲并未就此得到满足，泰国人想要扶植一个更可控的傀儡，于是向他递上了橄榄枝。泰国人、自己手中的实权、异见分子，朗农利用这些资源夺取了柬埔寨的政权。\n\n大权在握后，朗农总统优先处理了同泰国与越南的关系问题，而后才是国内事务。除了维稳，朗农其他的执政目标都不为人所知，就连他自己都不知道下一步要做些什么，权力场之外的意识形态对他来说都太陌生了。对朗农来说，只要能通过一切手段保住权力就够了。"
 POLITICS_SIM_VAR_DESC: "墙上布满了弹痕与血渍，新总统沈法却要在它们的环绕下起草命令。这些总统令将跑出办公室，飞到下层官员手中，指导他们重建国家。沈法真不想待在这里。\n\n虽然沈法总是心怀大志，但他从未想过要从一介农民跃升为柬埔寨的最高领袖，这也就是命运的可笑之处。在命运的驱使下，他的民族主义同僚山玉成把握了大权。像他这样岌岌无名的人太多了，不过沈法却被推到了台前。起初他面对着艰难的抉择，但沈法还是接受了现状，为助老友一臂之力加入了高棉共和人民会。\n\n作为长期支持高棉民族主义事业的回报，山玉成将驻日大使这份美差送给了他的友人。沈法将这份工作与自己在政府中的职务结合起来，随着他在东京度过的时间不断增长，他也跟日方熟络了起来。当金边落入越盟的消息传来之时，他正在东京商谈援助事项。\n\n在日本解放柬埔寨后，沈法回到了祖国，高棉大地满目疮痍。大多政府高官惨遭处决，十不存一。即使他早已满不在乎，命运还是向他奉上了大权。总得有人接过重建柬埔寨的重担：不幸的是，那人正是他自己。"
 POLITICS_HU_NIM_DESC: "1949年，山玉成推翻懒惰怠政的西哈努克，拉开了柬埔寨共和革命的大幕——万分遗憾，这句话只有前半句是对的。直到二十一年后，符宁和他的追随者以胜利者的姿态进军金边，后半句才真正照进现实。\n\n符宁出身赤贫之家，但教育改变了他一辈子都要面朝黄土背朝天的命运。山玉成废除君主制是推动他参与革命的催化剂，获准远赴南京学习则是他一生中最为重要的转折。在那里，他从汪精卫和林柏生两位革命者身上，学习到了什么才是真正的共和。\n\n后来，符宁在柬埔寨左派政治圈子里摸爬滚打，成为了高棉共和人民会的一员，在命运多舛的阿乍索政府中得到了一席之地。然而，当山玉成转向右翼时，他不愿意执行对农村的紧缩和忽视政策，愤而辞职。很快，辞职变成了反抗，他与其他心怀不满的青年共同拿起武器，誓要打倒令人民失望的共和政府。\n\n在共和青年团的狂热拥护之下，符宁成为了新总统，他的未来……可以说是独此一家。国内政策上，柬埔寨的土地将归长久劳作耕种的人民所有；国际交流上，他惊叹着中华民国是泛亚主义的指路明灯，甚至有朝一日能够超越日本；民族议题上，他对泰国窃取祖国领土的行径显露出了……无可抑制的怒火。"
 POLITICS_SON_NGOC_MINH_DESC: "在柬埔寨，没人比山玉明更坚持于革命理想。他的梦想并非前人的陈词滥调，他要的是一场真正的无产阶级革命，这场革命将帮助柬埔寨打碎一切帝国主义的枷锁。\n\n范文许的父亲是下高棉人，母亲是越南人，他似乎注定要以托钵僧的身份度过余生，但他却在感召下加入了越盟的革命事业。他结合了山玉成与胡志明两人的名字，化名为山玉明。他学习了胡志明的经验，因为山玉成的民族主义言论已经失去了对他的吸引力。\n\n在踏上自己的道路后，山玉明为共和国的垮台踩下了油门，还在威通战争期间与越盟起义者一起制造混乱。在柬埔寨之外，山玉明动摇了越南政权的稳定，为越盟向着通敌分子发动最后一击做好了铺垫。当越南发起进攻之时，他也在柬埔寨上演了同样的壮举。\n\n山玉明成为了柬埔寨的最高领袖，帝国的枷锁已被撤走，印度支那的未来看上去一片光明。然而，日本仍有卷土重来的可能，他们不会容许后院出现这样的异变。帝国若要归来，山玉明就会再度转入地下，凭借满腹计谋，让柬埔寨成为日本的噩梦。"