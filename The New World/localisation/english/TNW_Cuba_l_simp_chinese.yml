 POLITICS_FIDEL_CASTRO_DESC: "菲德尔·亚历杭德罗·卡斯特罗·鲁斯，1926年8月13日出生在一个富裕家庭，是他父亲和情妇的私生子。虽然卡斯特罗接受过保守耶稣会教育，但他还是成为了一名坚定的反法西斯主义者。他的政治生涯始于他在哈瓦那大学学习时。他把法学课程抛在一边，加入了正统党这一民粹主义政党，响应他们对选票革命的号召。\n\n1952年，巴蒂斯塔将军发动政变，毁灭了古巴脆弱的民主制度。卡斯特罗选择武装斗争，并于次年的7月26日大胆袭击了蒙卡达兵营，但惨遭失败。从监狱获释后，他流亡墨西哥组织了七·二六运动。虽然在登陆古巴时遭遇重创，但卡斯特罗和起义军潜入山林，打响了长达六年的游击战。\n\n虽说七·二六运动对胜利做出了不可磨灭的贡献，但登上世界头条的还是卡斯特罗和他肤色各异、胡子拉碴的起义军。正是他们的军事胜利让七·二六运动成为了古巴反巴蒂斯塔抵抗运动的先锋。经过一段摧枯拉朽的攻势，卡斯特罗的部队于1959年元旦解放了哈瓦那。\n\n当上临时总统的卡斯特罗如典型的拉美民众主义者那般不知疲倦地工作。他掌权后，古巴通过革命性的改革赢得了国际赞许，他的政府也凭借姿态高调的反法西斯立场巩固了OFN的支持。\n\n卡斯特罗避开了具体的意识形态，他秉持马克思主义立场，也支持盖坦式的民众主义，但执政的方式又相对专制，谁也不清楚他究竟会成为民主英雄还是另一位考迪罗。不过所有古巴人都知道，这位自称继承了何塞·马蒂遗志的男人将会永远地改变历史进程。"
