 CUB_idea_cuban_revolution: "古巴革命"
 CUB_idea_cuban_revolution_desc: "对很多人来说，1959年1月1日是古巴革命的最后一天。那一天，巴蒂斯塔被流放了，他的政权被推翻了，化为空中的灰烬。但对我们而言，1月1日不是结束，而是开始。\n\n自那天以来，古巴处于一场永久的革命中，一切阻碍民族进步的传统都要被扫地出门。政治、社会、经济，一切都经历了巨大的变革。生活在革命之下，人民倍感欣悦。革命收获了巨大的成功，赢得了人民的支持，甚至吸引了外国革命者的注意。我国人民为革命骄傲，全心全意地支持它。"
 CUB_idea_reform_frenzy: "改革浪潮"
 CUB_idea_reform_frenzy_desc: "自革命肇始以来，变革浪潮便在古巴风起云涌，几乎每个月都有推陈出新的政策宣布实施，涉及土地改革、医疗保健、福利项目乃至教育体制的方方面面。与今天相比，十年前的古巴完全就是另一个世界。\n\n对许多人而言，变革是好事：革命后的许多迫切需求已得到解决，普通古巴人的生活比起十年前而言要美好得多。然而，也有少数人觉得变革太大、太快，担心随着旧古巴消失无踪，她已经飞得离太阳太近了。"
 CUB_idea_uncertain_direction: "前途未卜"
 CUB_idea_uncertain_direction_desc: "革命之后的岁月里，为推翻巴蒂斯塔政权而联合起来的诸多派系继续维持着曾经的联盟。他们组成了“统一革命组织”，其共同点无非就是在古巴实现变革，其中大多数都支持革命的“司令官”领导他们。\n\n这导致了政治局势的极端失调。各派不断地在内部拉扯革命组织，互相之间的道路南辕北辙，古巴的未来正愈发迷雾重重。卡斯特罗发觉，自己是古巴唯一能够领导组织的人——他必须尽快决定方向，除非他想亲眼目睹自己的宏伟梦想因内讧和分裂而毁于一旦。"
 CUB_idea_question_democracy: "民主事宜"
 CUB_idea_question_democracy_desc: "尽管卡斯特罗极受欢迎爱戴，但革命组织中的许多人已经开始低声谈论起他的专制倾向。他们说，卡斯特罗已经在那个位置上越来越驾轻就熟，质疑他是否会放下权力。\n\n随着时间推移，结束卡斯特罗统治的想法似乎愈发遥不可及。异见者在街头上公开呼吁选举，卡斯特罗对此的表态又十分地模棱两可。于是，何塞·马蒂的民主梦想，这个老生常谈的问题，再次在统一革命组织的领导层中悄然流传。这个问题必须要迅速得到答案。"
