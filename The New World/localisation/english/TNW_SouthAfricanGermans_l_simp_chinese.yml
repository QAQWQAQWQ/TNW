 SFG_huttig_division: "许蒂希的部队"
 SFG_huttig_division_desc: "南非最高统帅部集结了第二次南非内战中战斗经验最丰富、作战风格最冷酷的士兵，这些参与过南非战争及后续无数反游击行动的军人，对这场战争特有的战斗模式与地形了如指掌。如今，新指令到来，南非最高统帅部的老兵们已做好准备，要彻底肃清南非抵抗势力，毕其功于一役。"
 SFG_restoring_order_in_sudafrika: "恢复南非的秩序"
 SFG_restoring_order_in_sudafrika_desc: "许蒂希给南非最高统帅部的命令只有一条：不惜一切手段，彻底驯服南非。南非最高统帅部的铁蹄不受任何道德枷锁禁锢，他们亦不屑于做任何表面功夫。这支军队唯余三重使命：摧毁、征服、镇压，此外无他。"
