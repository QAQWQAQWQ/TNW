 POLITICS_KARL_CHMIELEWSKI_DESC: "卡尔·赫梅莱夫斯基一直被认为在任何方面都不如常人，唯独除开残酷一项。\n\n赫梅莱夫斯基曾在德国党卫队中有着远大前程，他是少数几个那折磨囚犯的兴趣甚至让海德里希感到不安的人之一。然而，过度贪污和违反党卫队条例的行为结束了他的职业生涯，他也被永久放逐到了许蒂希治下的东非。在这里，他什么都不是。\n\n多年以来，这位名誉扫地的营长一直在尝试获取专员的信任，但这无济于事。甚至于他暗杀伊恩·史密斯的行动也因为阻挠了上司的计划而让他灰头土脸。他在南非战争中作为军队指挥官的能力也乏善可陈，看起来这就是他最后一份工作了。马兰的叛乱和许蒂希的被迫介入让这一切戛然而止。\n\n由于许蒂希手下更有能力的将领都在忙于管理他的辖境，所以赫梅莱夫斯基是唯一留下来镇压布尔人叛乱的将领。他手上只有一支满编师，而当地对德国人的仇恨也达到了史无前例的高点。赫梅莱夫斯基知道重建对国家的控制已是无望了，但在他被击败前，他至少还要尝试去尽可能地撤走德国在当地的资源。"
 POLITICS_WILHELM_DOMMES_DESC: "威廉·多梅斯从未向往过阿非利加，时至今日所思所念仍是如何逃离这片土地。  \n\n作为二战期间唯一全程与日军密切协同的德军指挥官，多梅斯本期待轻松升入海军总司令部。然而德日战后关系急剧恶化，导致其被迅速流放至德属东非，仕途就此搁置十余载。更糟的是，南非战争期间美国海军将其孱弱舰队死死摁在港内，他只得焦灼旁观战局。  \n\n许蒂希统治时期，外界推测他能逃过清洗只因阿非利加海军无足轻重到不值得动手。鲜有人知此评述何等贴切——当整个非洲陷入火海，多梅斯利用总督府对其的漠不关心策划逃亡，却屡屡因燃料匮乏受挫。直至“附属国”收复，这位海军少将改换计划，他悄然动用最后储备，将残存舰队转移至西蒙镇废弃的OFN海军基地，预备在德意志邦最终崩溃时控制好望角，并以此为筹码向昔日盟友换取逃生通道。  \n\n通过与罗尔夫·穆岑堡与汉斯·乌尔里希·鲁德尔暗通款曲（二人皆因他斡旋免于许蒂希的处决命令），多梅斯苦心渗透南非最高统帅部。许蒂希死讯传抵开普敦当日，他轻易刺杀了宿敌赫米莱夫斯基，并收拢残部回防好望角。通过整合已故殖民总督的部队与自建的“西蒙镇海防区”，他拼凑出来个大杂烩军械库，从濒临报废的罗德尼号战列舰到鲍赫勒施塔特的现代坦克都有。  \n\n如今计划行至终章，多梅斯唯余一个目标：在日本承诺的逃生通道开启前活下去。为此他甚至与北方约翰内斯堡的“共和国”及OFN战俘缔结临时盟约——纵使挺过非国大的全面攻势，也无人相信这脆弱同盟能撑过下一轮朝阳。"
