 NZL_Culture_War:0 "文化战争 - 英国主导"
 NZL_Culture_War_desc:0 "新西兰的生命线便是辽阔的太平洋。来自美国市场的进口商品对新西兰经济至关重要。因此，美国文化对当地的影响显得尤为显著。\n\n如今，新西兰的天空中飘扬着米字旗，英国文化仍然占据着主导地位。然而，在人们转身之际，偶尔能听到那些暗含轻蔑的私语：我们真是“太平洋的白垃圾”吗？还是说，我们仅仅是勇敢地坚持着自己的传统？"
 NZL_Establishment:0 "更良善的体制"
 NZL_Establishment_desc:0 "自1907年宣布自治以来，我们的政府一直致力于代表和造福新西兰人民。到目前为止，惠灵顿的表现还算不错：政府稳定，议会关系和谐，人民对我们的政治体制有足够的信任。只要这种和平持续下去，新西兰将在未来几十年内继续成为政治稳定的堡垒。"
 NZL_Onto_World_Stage:0 "走上世界舞台 - 火炬手"
 NZL_Onto_World_Stage_desc:0 "不管身为举足轻重的超级大国，还是无人在意的世界观察者，都必须在全球高举自由的火炬——这是新西兰目前外交政策的基石。他们热衷于与OFN在世界各地讨伐法西斯主义，切实践行着这一理念。虽说新西兰是个小国，但有时，它的国际影响力会超出它的掌握范围。"
 NZL_Social_Fabric:0 "社会架构 - 完好无损"
 NZL_Social_Fabric_desc:0 "新西兰的社会架构将国家维系在一起，但许多危险却有可能将其撕裂乃至摧毁。\n\n幸运的是，新西兰的立国之本依然完好无损。人民团结一致，对社会未来的发展充满希望。只要新西兰的社会架构尚存，我们就绝不会陷入黑暗和绝望。"
 POLITICS_KEITH_HOLYOAKE_DESC:0 "基思·霍利约克以多种原因而闻名——包括他的冷静、浓重口音以及过于礼貌的声誉。霍利约克出生于新西兰的农村地区，是一对由商转农夫妇的儿子。1932年，他加入了以农村为重点的改革党，并迅速成为该党的新星，在将其改革为现代国家党方面发挥了关键作用。\n\n在第一届国家党政府中担任总理后，霍利约克在1957年国家党选举失利后卸任，此前的总理悉尼·霍兰于1956年辞职。在作为反对党领袖度过了三年之后，他赢得了1960年的大选，凭己之力重登总理之位。\n\n霍利约克主张维持强大的国防，以应对日本的持续威胁。同时，他的政府已经开始推动废除死刑和扩大毛利人权利的进步社会议程。1963年大选迫在眉睫，霍利约克希望新西兰能继续支持他的愿景。"
