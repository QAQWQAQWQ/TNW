 POLITICS_MAWLAWI_HINDUSTONI_DESC: "布尔什维克革命期间，穆罕默德然·鲁斯塔莫夫离开中亚前往阿富汗和印度（有时也被称为印度斯坦）学习伊斯兰教知识，因此他得到“印度斯坦尼”的绰号。这段经历深化了他的信仰，使他决意要维护祖国数十年前的传统之道。\n\n倘若降临在塔吉克斯坦人民身上的大灾变具有某种意义，那一定是上次审判的副作用。不虔诚的共产主义者统治了几十年，但他们那压迫不过是对忠实信徒的考验。如今那注定土崩瓦解的事物已化为灰烬，始终坚定的信徒终于可以建立起伊斯兰教的国度。伊斯兰教从不是激进分子或极端分子的宗教，无论古今，它坚定持重之人的宗教。信徒能承受住来自四面八方的压迫，即便在困境中也一如既往地虔诚。\n\n现在，一个温和、保守、传统，依照使过去塔吉克人安居乐业的原则，所建立的国家——塔吉克斯坦伊斯兰国正雄立于宇宙之间，而印度斯坦尼正是这国度的卫士。革命或激进主义的狂风暴雨是灾难，为使国家不会蒙受这股灾难印度斯坦尼将会保卫国家，直到这漫长、稳因而坚定的劳作现出成果。"
 POLITICS_NUSRATULLO_ABDULKHAKOV_DESC: "塔吉克人民被背叛的次数多得数不清。先是身着帝国华服的俄罗斯人，榨取了这个国家的一切；随后，他们换上了农民的衣服，宣称工人阶级的团结和无产阶级的胜利——但最终他们的目标还是和以前如出一辙。\n\n但是，当外强中干的俄国人被德国击溃后，塔吉克国家的血脉兄弟却受到阿富汗王国的奴役，再次前来攫取这片土地上的财富。共产党人对如何取悦莫斯科的高层了如指掌，却在如何为人民服务这一问题上一无所知。在那段悲惨的日子里，只效忠过外国主人的共产党人失败得一塌胡涂。最终，塔吉克人民发声了。他们选择撇清与外国主子或外国意识形态的关系。\n\n他们选择将一个真正的塔吉克人努斯拉图洛·阿卜杜勒哈科夫提升为他们的领袖，他将在他们的旗帜下团结星散各地的所有塔吉克人。终于，塔吉克人民本世纪第一次由自己的民族统治，国家在中亚取得合法地位的时机也已经成熟。 "
