 POLITICS_CEVDET_SUNAY_JUNTA_DESC: "杰夫德特·苏奈的大部分人生都在军旅中度过。他生于1899年，一战中曾在奥斯曼帝国军队服役，蹲过一段英军的战俘营，归国之后为土耳其独立而战。后来，苏奈的职位步步攀升，1960年就任总参谋长，登上了个人军事生涯的最高峰。\n\n将军德高望重，在推翻文官政府的青年军官们心中，他可谓是天热的偶像。尽管苏奈对政治琐事无甚关心，但他认为，土耳其军队有责任保护国家免受煽动和激进主义的危害，所以担任如今的角色其实也是出于他自己的意愿。在苏奈看来，军政府的职责是稳定局势，以尽快恢复重建合理的文官政府，而他的职责就是促使民族团结委员会的其他成员履行这一承诺。"
 POLITICS_CEVDET_SUNAY_DEM_DESC: "杰夫德特·苏奈的大部分人生都在军旅中度过，对政治琐事无甚关心。但不幸的是，事实正与他的意愿背道而驰。民族团结委员会业已解散，权力已经移交给了由土耳其最有知识的政治家们组成的文官政府。如今，苏奈自任为总统，他的理想不过是能无忧无虑地在钱卡亚庄园消磨时光，但每天似乎都有新的火势要扑灭。若是他袖手旁观，任由事业功亏一篑，那就是他的失职了。\n\n总统正尽其所能地支持埃里姆政府，维护民主、现代的凯末尔主义共和国之梦。苏奈要恪尽职守，一如既往地为土耳其而战。"
 POLITICS_TEVFIK_RUSTU_ARAS_DESC: "陶菲克·吕什蒂·阿拉斯于1883年2月11日生于恰纳卡莱。作为同时代面向西方、出身城市专业人才的青年中的一员，他加入了团结与进步委员会。在世界大战和独立战争来临时，他放下了行医的工作投身其中。在战火之中，他与穆斯塔法·凯末尔结成了友谊，帮助他在日后崭露头角。\n\n1925年，阿拉斯担任了阿塔图尔克的外交部长。他身材高大修长，总是戴着一副圆框眼镜，行医时养成的对待病人的态度更是让他成为了一位出人意料的优秀外交家。然而，法西斯主义在欧洲的崛起危及了阿拉斯有关地区联盟和对苏和解的议程，竞争对手伊诺努一跃成为总统令他更加担忧，看出了不祥的征兆。土耳其加入轴心国前夕，阿拉斯辞去了外交部的职务，退出共和人民党，这位医生的人生翻开了新的篇章。\n\n尽管佩克出面极力挽留阿拉斯，但他个人对联盟深恶痛绝：伊诺努总统将他视作潜在的竞争对手，亲苏观点又让他被当作共产主义的同情者，阿拉斯的共和人民党生涯就此黯然落幕。此后的年月里，这位曾是一党专制核心人物的医生一转成为最著名的一党专制批判者，他主张新闻媒体的民主化，还曾经与杰拉勒·拜亚尔短命的民主党建立过一点点联系。五十年代末，伊诺努总统再次登门，邀请他出面组建反对党。在人权协会的埃克雷姆·阿利詹帮助下，代表广泛左翼的民主革新党正式成立，最终在穆罕默德·阿里·艾巴尔的领导和工会团体的支持下发展成为了一个更具有社会主义性质的政党。\n\n阿拉斯历经权力的两面，自然有资格成为土耳其的第三任总统。有人抹黑他是个赤色分子，但只要能摆平阿利詹和艾巴尔之间的争吵，阿拉斯或许就能完成阿塔图尔克所开创的事业。"
 POLITICS_FUAT_KOPRULU_DESC: "忆往昔，当奥斯曼帝国陷入停滞、政治腐化之时，柯普吕律家族的大维齐尔们挺身而出，以自身为燃料，燃起帝国的生命之火。土耳其如今也出现了奥斯曼帝国那时的症状，于是，又一位柯普吕律选择接过重任。\n\n福阿德·柯普吕律最早是奥斯曼帝国的一名教师，但巴尔干战争使他重生为一名土耳其民族主义者。他是个知识分子，在学术界待了很长时间，也正因此，他后来被阿塔图尔克任命为教育部长。他干得非常出彩，赢得了阿塔图尔克的欢心，便邀请他成为国会议员。\n\n再后来，佩克派控制了共和人民党。柯普吕律对政府日渐专横感到不满，便与曼德列斯和拜亚尔一同，组织了国家民主党。他们居中右翼立场，对着衰落的独裁政府紧咬不放，拜亚尔遭到谋杀也没能使他们打退堂鼓。现在，举国上下难堪不已，国家民主党终于有机会登上权力的殿堂。\n\n掌权后的国家民主党，虽然没有一致的目标，却能就领导者一事达成一致。那位领袖正是福阿德·柯普吕律。白色新月低垂在逆风中，但新总统的决心不可动摇。土耳其终将迎来真正的民主，土耳其民族也将永远团结一致、势不可挡。"
 POLITICS_TEKIN_ARIBURUN_POSTJUNTA_DESC: "“我们不会接受民主政府以外的任何政权。”\n\n尼哈特·埃里姆领导的技术官僚政府垮台后，军方如期而至。然而，士兵们带来的不是永久的紧急状态，而是改革。\n\n泰金·阿勒布伦就是这群民主战士中的一员。阿勒布伦于1903年10月16日生于什蒂普。他的父亲是加里波利的英雄，阿勒布伦也继承了家族衣钵，在空军中步步高升，成长为土耳其的第一位空军武官，立下了赫赫功勋。他的领导才能和政治可靠在意土战争中尤为突出。此后，他又从军人转型，开启了从政生涯。\n\n厄扎尔领导的爱国团结党实施了大刀阔斧的经济改革，而这位老英雄则被议会推选为总统，成为稳定局势的定海神针。尽管出身军方，但阿勒布伦仍坚定地支持文官治理——他的军装即代表凯末尔主义的理想。"
 TUR_spoils_of_war: "战利品"
 TUR_spoils_of_war_desc: "战争打响，胜利凯旋。今日，国家需求与贸易似乎比以往任何时候都要更加活跃，在崭新机遇面前，土耳其就像一个面前摆着饕餮大餐的胖子。军工复合体欣喜地咆哮着，因为管理新领土的战士们必须要拥有新的武器装备。\n\n这是土耳其的黄金岁月，但天下无不散的筵席。我们仍应做好准备，免得星月在升空时陡然坠落……"
 TUR_stains_of_the_past: "过去的污点"
 TUR_stains_of_the_past_desc: "毫无疑问，在土耳其共和国的历史上，雷杰普·佩克是自阿塔图尔克之后最具影响力的领导人。他从根本上改变了共和国与共和人民党，按照他的理想塑造了一个先锋队政党国家，将凯末尔主义价值观扩展到了全安纳托利亚。佩克早在十余年前就已不在人世，但他的政策仍然牢牢扎根在国家之中，抵御着反动与革命的势力。\n\n且不论是非功过，佩克的理想主义改革并未能获得土耳其公众哪怕一丝一毫的爱戴，甚至共和人民党也因此被打上了“佩克党”的标签——一个冷漠威权、属于官僚的党。在民主热潮之下，他们必会面临灭顶之灾。若是共和人民党不愿沦为历史书中的注脚，就必须反思过去，迈向未来。"
 TUR_a_modern_chp_0: "现代的共和人民党 - 模棱两可"
 TUR_a_modern_chp_0_desc: "党的喉舌机器沸沸扬扬地宣传着“现代的共和人民党”这一新理念，但土耳其人民并不清楚这究竟意味着什么。呼吁建立更平易近人、更负责任的政党、承诺与人民建立联系——这激起了民众的兴趣，但只会引发更多有关其真正内涵的问题与思考。\n\n居莱克和党要想延续胜利，就必须拨开笼罩着“现代共和人民党”的阴云，向选民展示它的全貌。"
 TUR_a_modern_chp_1: "现代的共和人民党 - 左倾"
 TUR_a_modern_chp_1_desc: "在各项改革实施之后，共和人民党已经向左倾斜。比伦特·埃杰维特和他所领导的潮流指明了未来的方向，左翼凯末尔主义不仅正在变得正统，还正在化作现实。"
 TUR_a_modern_chp_2: "现代的共和人民党 - 右倾"
 TUR_a_modern_chp_2_desc: "在各项改革实施之后，共和人民党已经向右倾斜。图尔汗·费齐奥卢和他所领导的潮流指明了未来的方向，右翼凯末尔主义不仅正在变得正统，还正在化作现实。"
 TUR_a_modern_chp_3: "现代的共和人民党 - 居莱克的愿景"
 TUR_a_modern_chp_3_desc: "也许在过去的时代，共和人民党看不到什么现代的未来。昨日的凯末尔主义者就像风中的巨石一样刻板僵硬，只晓得听从命令。但现在不会了，居莱克就任总统后，改革措施不断通过，成功一个接着一个。党的胜利是他的胜利，不属于埃利姆，也不属于伊诺努，更不属于他们手下什么“坚持正统”的人。埃杰维特和费齐奥卢紧跟在他的身后，一心一意为党的利益着想，正统派尽管偶尔会有怨言，但也大体上心满意足。"
 TUR_inonu_and_his_devil: "伊诺努与他的恶魔"
 TUR_inonu_and_his_devil_tt: "§R伊诺努会阻止我们实现真正的目标。§!"
 TUR_inonu_and_his_devil_desc: "权力需要代价，而对伊诺努而言，这代价尤为高昂。为了继续掌权，总统不惜与恶魔做下交易，推迟了即将举行的选举。法利赫·勒夫克·阿塔伊曾注定要成就一番大事业，但在五十年代的民主化进程中被伊诺努所抛弃；然而今日，阿塔伊重新回到了土耳其的权力中心，伊诺努的野心随之回到原点。\n\n当下，阿塔伊主席是土耳其总理、国家的统治者。他对国家的掌控日渐牢固，如同藤蔓缠绕着共和国的权力杠杆。尽管如此，伊诺努总统仍抱有一线期冀，希望能战胜心中恶魔，找回自己的灵魂，将国家从坠入地狱深渊的路上拉回来。这几乎是不可能的使命，但没有理由不去尝试，毕竟他已经没有能输出去的筹码了。"
 TUR_year_of_grief: "悲伤之年"
 TUR_year_of_grief_desc: "土耳其人民像狮子一样战斗，却由驴子领导。第二次意土战争是土耳其最为惨痛的失败，不仅是战争行动上，后果也堪称灾难：物价上涨，通货膨胀高企，民众生活水平急剧下降。\n\n旧秩序濒临崩溃，政治乱局席卷而来，反对党派趁机发展壮大。但对普通的土耳其公民而言，他们并没有这样的机会，只能默默忍受严峻艰苦的生活。"
 TUR_rogue_general_insurrection: "“流氓将军”叛乱"
 TUR_rogue_general_insurrection_desc: "塞伊菲·库尔特贝克、拉格普·居米什帕拉、泰金·阿勒布伦、吕什蒂·埃尔代洪——都是叛徒，都该死。\n\n万分不幸，他们只是感染的症状表现，拉拢将军们的民主联盟才是真正的根源，这群职业政客是必须从土耳其躯体上祓除的病灶。他们在伊斯坦布尔自立了一个分裂流氓政府，它存在一日，我们的权威就一日受到质疑，这是决无法忽视的恶性肿瘤。\n\n既然将军们只识得枪杆子，那枪杆子就是我们唯一的回应。他们将会和他们鼓吹的虚假民主一同被碾进泥土，连根拔起，哪怕摇尾乞怜也绝无生路。土耳其人民最终会理解我们的。"
 TUR_second_turkish_revolution: "第二次土耳其革命"
 TUR_second_turkish_revolution_desc: "阿塔图尔克的革命同他的逝去而一道消亡。我们需要第二位阿塔图尔克、第二次土耳其革命来继续他伟大的事业——法利赫·勒夫克·阿塔伊正是这样一位人物。\n\n没有彻底的革命，民主化就只是空洞无物的过程，只会将渴望攫取权力的蛊惑政客和机会主义者推上大位，让无数爱国者的牺牲化作泡影。绝不能走到这般田地，我们必须要更进一步，革命必须要进行到底，不能再像伊诺努那样半途而废。\n\n顽固分子、反动派——所有渣滓都要彻底扫清。唯有如此，我们才能实现阿塔图尔克的理想；唯有如此，我们才能建立起他所描画的世俗自由民主制度。"
 TUR_demokrasi_bahari: "民主之春"
 TUR_demokrasi_bahari_desc: "1962年，凯末尔主义大委员会否决了民主革新党与国家民主党联合提出、旨在终结不自由选举法和选民压制的民主化法案。此举动摇了国家的根基。土耳其人民已经受够了所谓的民主化，伊斯坦布尔、安卡拉等地爆发街头抗议，要求真正的改革。\n\n这成为了国家历史上最大规模的群众抗议。从梦想更自由土耳其的学生到希望获得经济援助的农民，他们一同构成了抗议的群体。安卡拉政府被视为压制民意的专制象征，唯有被人民推翻的结局。这已经动摇了政府的权威，不论以何种方式，抗议必须解决。"
 TUR_demokrasi_ittifaki: "民主联盟"
 TUR_demokrasi_ittifaki_desc: "“民主联盟”是指国家民主党与民主革新党在1963年大选中达成的一项协议，旨在摒弃分歧，共同对抗共和人民党独裁政权，为土耳其带来民主。在两党还在野的时候，这种安排还比较简单，但如今两党共同执政，要调解不同的意识形态和观点可能会更加困难。民众正拭目以待，民主联盟能否齐心协力，瓦解共和人民党缔造的一党国家。"
 TUR_demokrasi_ittifaki_udp: "民主联盟 - 崭新开端"
 TUR_demokrasi_ittifaki_udp_desc: "多亏了民主革新党在街道和议会中的努力，曼德列斯的狡猾阴谋彻底败露，年轻的民主政权得以幸存。尽管艾巴尔和阿利詹处理的日常事务变得更加艰难，但近来的事件证明了亲民主力量团结一致的重要性。\n\n国家民主党和民主革新党的联盟依然存在。自从联盟建立以来，政治格局已经发生了变化。随着党派间争端日益加剧，一个问题浮现出来：现有政党将如何改变自己，适应新形势。"
 TUR_demokrasi_ittifaki_bilgic: "不太可能的同盟"
 TUR_demokrasi_ittifaki_bilgic_desc: "比尔吉奇总理已获得连任，但国家民主党在最近的选举中并未赢得多数席位。虽然国家民主党与民主革新党在1963年结成的联盟维持了相当长的时间，但政治格局已经发生了巨大的变化——这就解释了为什么比尔吉奇的政党会与比伦特·埃杰维特领导的左翼凯末尔主义者结成联盟。当然，这在过去是不可想象的，但埃杰维特和经济部长内吉梅丁·埃尔巴坎对经济的看法相当一致，都注重福利与工业化。如果他们能够携手合作，七十年代的土耳其将更加公平、安全、现代化——当然，一切的前提都是他们能够携手合作。"
 TUR_demokrasi_ittifaki_demirel: "政治事务"
 TUR_demokrasi_ittifaki_demirel_desc: "德米雷尔总理对土耳其的愿景是基于常识的愿景，侧重于商业发展和个人自由。现在已经到了组建政府以实现这一目标的时候，但德米雷尔的政党又未能赢得明显的多数席位，因此与其他步调一致的党派结盟自然也是常识之一。虽然德米雷尔与共和信任党的右翼凯末尔主义者图尔汗·费齐奥卢以及改革民主党的埃克雷姆·阿利詹之间并没有什么过多的交集，但三人都明白一件事：有钱才是硬道理。走上政治中心的这三驾马车将是土耳其度过未来十年、真正登上国际竞争力舞台的最大希望。"
 TUR_demokrasi_ittifaki_dyp: "民主联盟 - 左翼之风"
 TUR_demokrasi_ittifaki_dyp_desc: "民主革新党成功连任，证明了其左翼政府的可持续性。这一出乎意料的结果在让人们感到震惊的同时，也拉开了革新党与联盟伙伴国家民主党之间的距离，并且鼓励了更多左翼政策的出台。然而，事态将走向何方还有待观察。"
 TUR_demokrasi_ittifaki_aybar: "妥协之代价"
 TUR_demokrasi_ittifaki_aybar_desc: "穆罕默德·阿里·艾巴尔的政府运转并不顺利：社会主义者、自由派、左翼凯末尔主义者之间的共同立场并不稳定，许多分歧都在削弱政府的能力，令人担忧不已。而联盟唯一的团结因素似乎就是对纳伊姆·塔卢这一主席折衷人选的不满：他是个呆板无趣的官僚，只是默默无闻地游走于混乱的权力大厅之中。"
 TUR_demokrasi_ittifaki_alican: "自由与协约"
 TUR_demokrasi_ittifaki_alican_desc: "埃克雷姆·阿利詹总理在两个极端之间选择了中间道路，希望在革命工会联盟抗议带来的混乱之后治愈国家。在土耳其自由主义的生态位里，已经形成了两个阵营：其中一个相对左倾，致力于建立社会福利国家；另一个则立场偏右，优先考虑将西式资本主义模式引入土耳其。对于天生温和的阿利詹而言，国家民主党的联盟伙伴既能成为他的助力，也可能会把他推下政治的钢丝绳。"
 TUR_stability_held_at_gunpoint: "枪口下的稳定"
 TUR_stability_held_at_gunpoint_desc: "土耳其的执政联盟只能靠枪杆子才得以维系下去。在军方的拉拢下，来自改革民主党、正义党和共和人民党的部长们都在各自的议程上彼此冲突，只有极少数独立部长和埃里姆还在拼命试图实现团结。\n\n在土耳其的混乱中，政治光谱两端的极端主义正悄然崛起。右翼分子在退役将军阿尔帕尔斯兰·蒂尔凯什领导的伊斯兰民族主义运动，民族主义和保守党的旗帜下动员起来；与此同时，左翼则在凯末尔·蒂尔克莱尔和社会主义立场的土耳其工人党旗下继续战斗。二者之间的街头斗殴已经成为了家常便饭，民众因此担忧不已。\n\n埃里姆知道，他的政府能够坚持下去——而且必须坚持下去，否则军方一定会再度出手。"
 TUR_schemers_all_around: "阴谋者，环绕周身"
 TUR_schemers_all_around_desc: "即便只是个乞丐王，也会有只狗跟在他的后面，企图吞噬哪怕一丁点的权力。于埃里姆而言，卑鄙小人就是正义党的领袖费鲁赫·博兹贝伊利，和共和人民党党首凯末尔·萨特尔——他们对自己的权力和威望被埃里姆夺走而怨愤不已。如果他们有机会成为政府的掌舵者，那么他们不惜违背国家利益，甚至不惜让国家就此停滞不前。\n\n所以说，就像驯服不听话的动物一样，他们要么学会怎么听话，要么就得被拴起来。"
 TUR_developmentalism_with_erim_touch: "发展主义，以埃里姆之风格"
 TUR_developmentalism_with_erim_touch_desc: "埃里姆并不是政府中唯一拥有远大理想的人，他的部下也提出了各式各样的想法。埃里姆的“智囊团”是一群依附于他的技术官僚，为土耳其的稳定和经济增长模式尽心尽力，其领头人是阿蒂拉·卡拉奥斯曼奥卢，这位经济学家热衷于日本模式，据此概述了他如何解决土耳其经济弊病的计划。\n\n他认为，应当放宽监管、推进非国有化，以此让土耳其企业赚取更多利润，而非以国家主义来解决国家主义。等到企业实力增强后，就可以与其展开合作，开采资源、建设基础设施，还能在西部大力推进工业化。至于钱从哪里来这个问题，世界局势不断升温，武器装备一定是所有人都需要的，土耳其也不介意多卖一点……"
 TUR_a_new_political_paradigm: "崭新的政治范式"
 TUR_a_new_political_paradigm_desc: "依靠狡猾、奉献和耐心，埃里姆做到了：他重新成为了共和人民党的掌舵人，率领他的政党赢得了大选，为土耳其重新带来了稳定、安全和经济的快速增长。在欢呼声之中，只有少数人还敢于批评他，尤其是针对军队在其胜选中所扮演的角色。\n\n多亏了他，旧日景象又回来了。共和人民党的忠实党员再次进入官僚机构，努力保证党能够掌握土耳其社会的方方面面的权力。六箭矢傲然指天，屹立不摇，阿塔图尔克的遗产安然无恙。虽然有人说土耳其在前进的道路上失去了自由，但埃里姆知道，阿塔图尔克仍微笑地注视着他们。"
 TUR_turkish_miracle: "土耳其奇迹"
 TUR_turkish_miracle_desc: "当埃里姆和他的“智囊团”在土耳其经济界大展身手之时，传统派官僚对他们的做法大为震惊，但他倡导的新发展主义确实将土耳其贸易推向了世界舞台。诸如科奇和萨班哲等国企在主导着国内市场的同时迅速向周边国家扩张，在国家的慷慨解囊下投资援助新项目。\n\n土耳其商界迈入了充满希望和激情的新时代。那么，代价是什么呢？左翼人士和许多老一辈的共产党政治家都在抱怨近期企业对法治的公开影响，劳工权利受到践踏就是最好的例子。然而，大多数人都认为这是土耳其实现新繁荣的必要牺牲。"
 TUR_our_most_gracious_overseers: "最仁慈的监视者"
 TUR_our_most_gracious_overseers_desc: "政变之后，土耳其军方成立了民族团结委员会，专门负责监督共和国，保护其免受煽动者和极端分子的颠覆。很快，民众就认为委员会在保卫共和一事上过于热心了，他们正积极主动地抹去所有被其认为威胁土耳其稳定的人。\n\n而对于现政府来说，还算幸运，军方喜欢埃里姆，因为他能为军方谋取利益；而反过来，军方也服务于共和人民党，帮助埃里姆在反对派面前占得上风。如今，土耳其军队已经成了国家政治生活中绕不开的一环，并且在短时间内不会有什么改变……"
 TUR_the_archdevil: "庞然恶魔"
 TUR_the_archdevil_desc: "对许多土耳其人来说，阿塔伊的总统任期意味着权利和自由遭到剥夺，被迫承认完全忠于阿塔图尔克、伊诺努和佩克的继承人法利赫·勒夫克·阿塔伊。如今的土耳其是一个专制的警察国家，除了由佩克阐释的凯末尔主义之外，任何其他思想都是不被允许的。民主化时代早已一去不复返，取而代之的是在阿塔伊的监视下，激进凯末尔主义的不断扩散。"
 TUR_task: "任务"
 TUR_task_desc: "诚如佩克所言，在齐加纳山上是种不出橘子树的。根治土耳其人民思想偏执闭塞的唯一办法就是把他们变成勤劳的劳动者，让他们直接阅读阿塔图尔克的言论，理解他的思想，将封建迷信抛在脑后。故而，只有推行经验丰富的阿夫哲奥卢部长提出的快速工业化计划，才能成功完成这一艰巨的任务。虽然阿夫哲奥卢本质上是个社会主义者，但他必须要学会适应我国的法团主义国情。"
 TUR_cadre: "干部"
 TUR_cadre_desc: "在与反动和偏执作斗争的长征路上，阿塔伊并非孑然一人。他的亲信对他忠心耿耿。然而，与其他政府机构一样，他们之间也存在竞争。激进凯末尔主义乃社会主义的“干部”思想和民族主义的“理想”思想融合后的产物，二者都认为凯末尔主义是国家的唯一正道，但在最终要实现的目标上存在分歧。“干部”派希望以凯末尔主义为过渡，最终实现社会主义；而“理想”派则希望保持国家的法团主义和军国主义。“理想”派的塔拉特·艾代米尔领导着凯末尔主义青年运动，“干部”派的多安·阿夫哲奥卢则掌握着土耳其经济。阿塔伊在世时，没人能挑战他的权威。但像其他领导人一样，他也是凡人，难免也会出现继承危机。"
 TUR_tool: "工具"
 TUR_tool_desc: "为了完成我们的伟大使命，需要所有勤劳的土耳其人民参与就业。国家将开采、钻探和加工所有自然资源，并将其交给全国各地新建的工厂。从迪亚巴克尔到科尼亚，国家经济的每一个部门都将实现现代化和机械化。"
 TUR_second_turkish_revolution_yon: "第二次土耳其革命 - “方向”派的道路"
 TUR_second_turkish_revolution_yon_desc: "无知者和谄媚小人鼓吹着阿塔图尔克的革命，他们无意识地重复着他的咒语，却不明白其中的含义，甚至还自编起来，为其怯懦之举开脱。土耳其需要一位学者来教导他们凯末尔主义意味着什么、凯末尔主义要成为什么——没有比多安·阿夫哲奥卢更适合继承第二次土耳其革命的人了。\n\n法西斯主义掠夺了旧日西方列强，但东方的洞察力、阿塔图尔克的洞察力却能引领土耳其实现真正的社会主义。凯末尔主义已经铺好了道路，伊诺努这样的自私政客会乐颠颠地将人民引入歧途，但阿夫哲奥卢不会。\n\n或许他是个理想主义者，但他也明白革命不能一蹴而就，向社会主义的过渡需要时间。幸运的是，宣传工具已经阐明了教育人民的好方法。由此开始，实现阿塔图尔克之梦不过是时间问题罢了。"
 TUR_second_turkish_revolution_ulku: "第二次土耳其革命 - “理想”派的道路"
 TUR_second_turkish_revolution_ulku_desc: "“我坚信，这个国家将会发生第二次革命，而分等级干预造成的危害最小！”\n\n做出如上论述的塔拉特·艾代米尔曾是凯末尔主义青年运动的主席，如今成长为了第二次土耳其革命的领袖；他的论述或许曾经被视作空谈，但现在却已成了支配土耳其的现实。激进的变革需要激进的手段，群众的琐碎争执可无法带来土耳其成为超级大国所需的重工业化。\n\n激进凯末尔主义者需要一支纪律严明的先锋队来领导人民，指引他们从动荡的过渡走向阿塔图尔克所预言的应许之地。先锋队将决定实现目标的手段，道德主义和猜疑都无法束缚他们，若是有必要，暴力也在手段之列。他们知道，子孙后代会因此而感谢他们。"
 TUR_director: "导演"
 TUR_director_desc: "导演是艺术家，要像使用描绘画布的工具一样命令手底下的人，绘出理想国该有的模样。他就是多安·阿夫哲奥卢，土耳其官僚机构中无所不包的法老，他将以此把工业发展的火焰烧得更高、更旺，创造崭新美好的土耳其社会。\n\n和其他真正的艺术家一样，阿夫哲奥卢也知道委员会创造不出大师之作，它一定出自孤独的个人之手。在土耳其成长的岁月里，阿塔图尔克是国家的引路人，他深知这一道理；如今，轮到了阿夫哲奥卢，他也要追随阿塔图尔克的脚步，将土耳其建设成为符合国父愿景的国家。伊诺努的业余伎俩和幼稚冲动已经彻底消失无踪，导演的双眼正全神贯注地紧盯着将至的未来，指导每一个动作，直到最终的剪辑。"
 TUR_chairman: "主席"
 TUR_chairman_desc: "董事会主席只需要对自己负责，他和部下的决定所带来的荣耀悉数属于他一身，过错也全部归于他一身。作为第二次土耳其革命的新领袖，塔拉特·艾代米尔早已对这一责任了如指掌：干部们的决定让他走进聚光灯下，而当他们的钢铁意志一时间陷入乏味无聊的争论时，他就会出手，否决部下的决定。\n\n艾代米尔将这些决定公之于众时，总是会有英雄应得的排场和庆祝。土耳其人民将他视为崇拜的楷模——他们的新人，他们希望自己的孩子也能成为艾代米尔一样的人。报纸和媒体连篇累牍地讲述着相似的故事，头版头条印满了他的照片，歌颂他与阿塔图尔克并驾齐驱的英雄主义。土耳其人信任他，将他视为民族的化身、代言人和臂膀，足以摧毁所有胆敢威胁国家的敌人。"
 TUR_a_new_tsk: "新土耳其武装力量"
 TUR_a_new_tsk_desc: "塞伊菲·库尔特贝克曾怀着理想进军安卡拉，而今天，他来到这里却是为了大不相同的原因：就任土耳其总统。\n\n他所领导的民主联盟向激进派凯末尔主义将军提出了两个选项：要么辞职安度晚年，要么被强制退役并承担一切后果。中立将领会继续坚守在岗位之上，践行对共和国的承诺。那么，土耳其军队现在处于什么位置呢？自然是在它该在的位置上，隶属于国防部，尽可能地远离政治权力。"
 TUR_scars_of_22_april: "四·二二的伤疤"
 TUR_scars_of_22_april_desc: "没有任何言语可以形容我们所面临的悲剧。4月22日或许已经过去了，但全国人民都为失去家人和朋友而悲痛；我们的事业或许是正义的，但我们却因所进行的斗争而受苦。经济一团乱麻，只能靠空话和半真半假的承诺勉强支撑；政治极化愈演愈烈，邻里街坊在所有能想象得到的问题上针锋相对。而最重要的问题是，由于外国势力将我们看轻作失败国家，我们手上没有能真正赋予政府合法性的工具。\n\n不能再这么下去了。在人民的支持下，适宜、真正的民主制度将从废墟中崛起，把我们从毁灭中解救出来。"
 TUR_a_constitution_for_democracy: "为民主的宪法"
 TUR_a_constitution_for_democracy_desc: "从民主革命中获得新生的土耳其危机四伏，它不混乱，但认同已经支离破碎，只有最睿智、最优秀的人才能妥善处理事态，收拾残局。\n\n展望未来，我们需要永远地摆脱一党专政。他们的时代已经过去太久了，而我们也知道这样一个事实，那就是这个政权不会心甘情愿地接受他们的时代已经过去。不能再犯同样的错误，人民需要可以信赖的政府、需要秉持民主理念的土耳其。我们将召集最伟大的头脑来制定宪法，让他们参与进其中的每一步工作。"
 TUR_echoes_in_the_barracks: "军营中的回响"
 TUR_echoes_in_the_barracks_desc: "民族团结委员会的宗旨在与恢复政治稳定和正道，使土耳其的民主免受激进主义和政客蛊惑的威胁。军队是国家的守护者，在需要的时候，军队拯救了它。然而，就在军政府努力遏制反民主势力的同时，民族团结委员会内部的分歧却在暗中继续发酵。\n\n尽管武装力量和委员会的所有成员都宣誓维护凯末尔主义价值观，但这究竟意味着什么似乎还没有定论。陆军上将杰马尔·马丹奥卢领导的派系认为军政府只是权宜之策，希望尽快推动民主化。\n\n 而同为政变策划者之一的阿尔帕尔斯兰·蒂尔凯什准将则持反对意见，认为过早的民主化会给国家带来风险——不过也有人窃窃私语，说这位年轻的军官希望利用军政府从根本上重塑国家，而不是把它交还到曾经让国家蒙受失败的政客手中。"
 TUR_echoes_in_the_barracks_2: "军营中的回响"
 TUR_echoes_in_the_barracks_2_desc: "民族团结委员会的宗旨是拯救土耳其民族。蛊惑者和激进分子粉碎了萌芽中的民主，军方别无选择，只能介入局势，保护国家免遭更严重的破坏。在土耳其最需要它的时刻，军队断然出手：他们必须从根本上铲除弊病，然后再考虑要不要将权力交还给把国家搞成这个样子的政客和官僚。\n\n武装力量和委员会的所有成员都宣誓维护凯末尔主义价值观，这意味着他们将再次为共和国浴血奋战。还好，阿尔帕尔斯兰·蒂尔凯什在扑灭激进主义、平息街头骚乱，以及规划土耳其政府下一阶段的方向等工作上发挥了领导作用。这位士兵是土耳其国家和民族的救星。"
 TUR_spectre_of_radicalism: "Spectre of Radicalism"
 TUR_spectre_of_radicalism_desc: "where loc?"
 TUR_a_new_system: "新体制"
 TUR_a_new_system_desc: "General Türkeş has long known what needs to be done in order to protect the Republic and its institutions—the exalted legacy of Atatürk, the sole hope of the Turkish people. Türkeş has argued for a very long time that nationalists across the country must unite and adhere to policy prescriptions set by him. Now he has an opportunity to do so, and he has taken it with both hands.\n\nThis is where the Milli Birlik Partisi—National Unity Party—comes in. Its aim is to unite Kemalists and Islamists in affirming \"Ne mutlu Türk'üm diyene\", how happy is the one who calls me a Turk. However, not everybody sees it the same way. Many Kemalists, clearly brainwashed by the socialists and liberals with whom they have become co-conspirators, oppose the efforts of the General. But there is no need to worry. With the Turkish Armed Forces firmly aligned with government, it is too late for these opposition figures to do anything."
 TUR_great_turkey: "更伟大的土耳其"
 TUR_great_turkey_desc: "经济部长苏莱曼·德米雷尔和内政部长萨德丁·比尔吉奇雄心勃勃，要率领土耳其经济走出低谷，彻底振兴。他们对农村的新态度部分出于经济角度，部分出于社会角度：一方面，他们希望推行机械化；另一方面，二人则希望能软性地回归传统价值观，以此弥补佩克土地改革对地主阶级造成的损害。此外，新的输电电缆、铁路、公路和工厂纷纷落成，东方的黑金也正在向人们招手。"
 TUR_great_turkey_menderes: "更伟大的土耳其 - 急切的建筑师"
 TUR_great_turkey_menderes_desc: "曼德列斯的经济愿景在很大程度上源于他的地主背景，再考虑到佩克对土耳其农村造成的破坏，他的立场也不足为奇。土地精耕、机械化和教育是曼德列斯农业政策的基础。与此同时，国有经济企业仍将继续在工业领域发挥重要作用。在阿德南贝伊看来，目前还不是听从部分人的呼吁，进行经济自由化的良好时机。"
 TUR_great_turkey_demirel: "更伟大的土耳其 - 福利国家"
 TUR_great_turkey_demirel_desc: "苏莱曼·德米雷尔正竭尽全力，要在六十年代的大幕即将拉上之时，实现土耳其经济的现代化，向全世界展示在摆脱共和人民党官僚机构和佩克主义法团制度的糟糕旧时代之后，国家取得了多么长足的进步。德米雷尔还借此拉开了与曼德列斯和比尔吉奇之间的距离：前者的鲁莽扰乱了国家的稳定，而后者的道德主义则阻碍了自由市场潜力的充分释放。"
 TUR_great_turkey_bilgic: "更伟大的土耳其 - 公正秩序"
 TUR_great_turkey_bilgic_desc: "萨德丁·比尔吉奇承认，德米雷尔“更伟大的土耳其”思想的确有一定潜力，但比尔吉奇总理已经团结起了一群盟友。在他们看来，国民经济并不需要进一步自由化，而是需要得到更好的指导。新任财政部长内吉梅丁·埃尔巴坎在支持私营企业的同时，还支持根植于伊斯兰传统的济贫和社会福利，并削弱凯末尔主义者对重工业的控制。埃尔巴坎和比尔吉奇将证明，国家不必依照贪婪的冲动行事，也能够发展现代经济。"
 TUR_gilgamesh_against_enkidu: "吉尔伽美什对阵恩奇都"
 TUR_gilgamesh_against_enkidu_desc: "阿德南·曼德列斯这样的人永远不可能无声无息地从政坛上消失，哪怕他引发了星期日危机这样的巨大丑闻，他的支持者也不会一夜之间无影无踪。事实的确如此，为人所唾弃的曼德列斯率领着他的新党，人民民主党，重归政坛，承诺要贯彻他在63年当选时要落实的工作，肃清政治中“猖獗的腐败”。\n\n国家民主党与人民民主党之间的分裂反映了土耳其更深层次的分歧——城市右翼与农村右翼之间的分歧；安纳托利亚利益在商人和地主之间的分歧；扩张东方与发展西方之间的分歧。曼德列斯正是这诸多矛盾的具象化，如果我们想最终摆脱他这个麻烦人物，就必须要修补紧张的国内关系。"
 TUR_will_of_the_people: "人民之子"
 TUR_will_of_the_people_desc: "终于，在坐了这么久的冷板凳之后，阿德南贝伊得到了纠正旧政权错误、彻底改造土耳其社会的机会。是人民将曼德列斯托举到了如今的位置，而他也要与人民携手共进。他当选是为了解放国家，正如他心中的英雄阿塔图尔克一般，没有什么能阻止他的使命。\n\n在群众面前，曼德列斯是个天生的演说家。人民看不出他的苦闷、沮丧还有不断奔涌的思绪。多年以来，他都生活在共和人民党特务宛若刑罚的监视治下。对曾伤害自己的人以牙还牙的机会就摆在面前，若能克制容忍，便是真正的强者。"
 TUR_will_of_the_people_2: "人民的意志"
 TUR_will_of_the_people_2_desc: "豪赌成功了，阿德南贝伊入主钱卡亚庄园，不会再受叛徒福阿德·柯普吕律摆布。军队和议会各就其位，但事实证明，他曾经的接班人比尔吉奇和德米雷尔也同样为疯狂的野心所驱使，曼德列斯的亲信圈子因而进一步缩小。现在，内阁中尽为他的密友：萨罗尔、科拉尔坦、伊莱里。如今的政府属于曼德列斯、属于人民，只因他的心中满载着激情与梦想，和不屈不挠的爱国精神。\n\n§e今日，还有谁能阻止他？§!"
 TUR_will_of_the_people_3: "Will of my People"
 TUR_will_of_the_people_3_desc: "(not implemented)"
 TUR_contrasting_ideals: "理念迥异"
 TUR_contrasting_ideals_desc: "“走到桥对面之前，宁愿管熊叫叔叔”——这句土耳其谚语用来描述民主革新党再合适不过。尽管革新党组建了现政府，但与其说它是个政党，倒不如说是个政治联盟。\n\n在陶菲克·吕什蒂·阿拉斯总统的领导之下，党内的社会主义者和自由派在意识形态方面存在着许多分歧。总有一天，他们将不再像谚语里那样继续互相叫“叔叔”，但那一天还没有到来。"
 TUR_turkish_way_to_liberalism: "土耳其的自由主义之路"
 TUR_turkish_way_to_liberalism_desc: "埃克雷姆·阿利詹总理在两个极端之间选择了中间道路，希望在革命工会联盟抗议带来的混乱之后治愈国家。在土耳其自由主义的生态位里，已经形成了两个阵营：其中一个相对左倾，致力于建立社会福利国家；另一个则立场偏右，优先考虑将西式资本主义模式引入土耳其。对于天生温和的阿利詹而言，国家民主党的联盟伙伴既能成为他的助力，也可能会把他推下政治的钢丝绳。"
 TUR_turkish_way_to_socialism: "土耳其的社会主义之路"
 TUR_turkish_way_to_socialism_desc: "佩克工业化计划播下的种子，如今长成了令佩克及其反共拥趸恐惧不已的工人运动，真是历史的讽刺。如此鲜明的对比正是资本主义的矛盾之一：阶级斗争的条件是国家发展所必需，但阶级斗争的事实却往往被刻意掩盖。\n\n如今，时代变了，土耳其工人首次在大国民议会中拥有了真正的发言权；土耳其工人正走上街头，在阳光下亮出自己的立场；土耳其工人已经组织起来，因为工会之中有力量。面对这样的对峙，老板们退缩了。从当下到解放的路上还有数不清的障碍、数不清的方向，但在土耳其，工人们已经站了起来。"
 TUR_divide_and_conquer_idea: "分而治之"
 TUR_divide_and_conquer_idea_desc: "1963年选举季已经过去，土耳其人民自由地重申了对阿塔图尔克和伊诺努的党的信任，让我们在议会中获得了多数席位。事实证明，所谓“民主联盟”无法承受这样的民主表达方式，尽管他们实际上获得了微弱多数，但分歧严重的国家民主党和民主革新党仍无法组建政府。相反，我们与革新党的谈判取得了丰硕成果，卡瑟姆·居莱克的改革议程赢得了他们的支持，促使其成为了我们联盟中的小伙伴。"
 TUR_collapsing_political_scenery: "崩溃的政治格局"
 TUR_collapsing_political_scenery_desc: "埃里姆政府被人们视作希望所在，一切都会重回正轨，民主制度终将恢复。然而，土耳其全国上下都不得不面对这样一个事实：他们曾经熟悉的制度早已自我毁灭。\n\n所有政党都丧失了公信力、所有政要都因为失败和无能而蒙上了污点。因此，毫无疑问，土耳其政治制度已经走到了崩溃的边缘。尽管如此，新一届选举仍在筹备进行之中，政治体制寻求着一切可能的积极变化，但却根本不知道未来会是怎样。"
 TUR_caretaker_government: "看守政府"
 TUR_caretaker_government_desc: "尼哈特·埃里姆的任务只有一个：稳定局势、结束停滞。然而，他失败了，推动国家前行的努力反而令它陷入了更深的泥潭。面对土耳其武装力量和军政府的授权，他几乎什么成果都交不出来。埃里姆的无能注定了政府失败的命运。\n\n由于当下并没有可信赖、经由选举产生的继任者，埃里姆仍然担着总理职位，保证国家政府的存在。然而，即便是不关心政治的人也清楚，他的看守政府只不过是个橡皮图章。只要选举结果尚未揭晓，议会和民族团结委员会的后继者就能继续操纵一切。"
 TUR_a_new_establishment: "新建制"
 TUR_a_new_establishment_desc: "尼哈特·埃里姆的任务只有一个：稳定局势、结束停滞。尽管拥有土耳其武装力量的全力支持，但他还是失败了。国家陷入瘫痪，我们需要一条出路。\n\n局势已然明朗，工程师出身的哈利勒·图尔古特·厄扎尔组建了爱国党，将以此为基础建立政府，平息国家的混乱局势。旧政党让土耳其蒙受耻辱，他们德不配位，组织瘫痪，其领导人物也失去了公众信任。因此，全国人民将自己的未来托付给了厄扎尔总理，希望他能重振国家，正如阿塔图尔克对我们的期望一般。也许，厄扎尔最终能够超越过去令人民失望、一无是处的政府，将阿塔图尔克之梦化作现实。"
