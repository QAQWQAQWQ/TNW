 turkey_skeleton_news.1.t: "[Get_newspaper_header]土耳其政府与春季抗议团体谈判"
 turkey_skeleton_news.1.d: "在一场关于国家未来和民主化进程的激烈辩论中，共和人民党对践踏民主制度的视而不见，加上饱受诟病的1958年大选，激起了土耳其有史以来规模最大的群众抗议活动。从伊斯坦布尔的萨拉查内到安卡拉的乌鲁斯，成千上万的民众走上街头，争取民主，抗议一党专政和经济停滞。\n\n新任总理科鲁蒂尔克与抗议者在谈判后达成了协议，同意在即将出台的法案中放宽对公众集会和出版自由的管制，并保证共和人民党将恪守建立多党制国家的承诺。大部分公众对此表示庆祝，反对派也声称这是他们的成功，党内持反对立场的成员则对此不予置评。伊诺努总统在此后一次演讲中表示，土耳其将成为阿塔图尔克梦想中的民主典范。"
 turkey_skeleton_news.1.a: "共和人民党能与自己的过去和解么？"
 turkey_skeleton_news.2.t: "[Get_newspaper_header]土耳其政府镇压春季抗议"
 turkey_skeleton_news.2.d: "在一场关于国家未来和民主化进程的激烈辩论中，共和人民党对践踏民主制度的视而不见，加上饱受诟病的1958年大选，激起了土耳其有史以来规模最大的群众抗议活动。从伊斯坦布尔的萨拉查内到安卡拉的乌鲁斯，成千上万的民众走上街头，争取民主，抗议一党专政和经济停滞。\n\n在新总理科鲁蒂尔克的领导下，土耳其政府颁布了戒严令，选择以强硬手段镇压抗议。两大反对党国家民主党和民主革新党对此表示强烈谴责，呼吁政府重新开展选举。伊诺努总统在接受记者采访时表示，共和人民党乃民主之党，其职责便是保护国家不受那些借民主之名行暴民统治之实的人的侵害。"
 turkey_skeleton_news.2.a: "又一次失败的民主尝试。"
 turkey_skeleton_news.3.t: "[Get_newspaper_header]共和人民党赢得1963年土耳其大选"
 turkey_skeleton_news.3.d: "随着共和人民党在中东打得意大利人节节败退，他们似乎再次赢得了土耳其人民的好感。为了从1962年抗议的阴影中走出，党内改革派卡瑟姆·居莱克在党代会上力压建制派，推动民主化，获得候选人提名。他的策略将美式政治与草根运动相结合，引起了土耳其公众的共鸣。\n\n居莱克的政策包括放弃一党专制时代的老路、修改宪法，赋予人民新的权利与保障、同时捍卫凯末尔的自由主义与民族主义遗产，只有这样，才能使得共和人民党更加适应民主制度。只有时间能告诉我们他能否抗住党内的压力。"
 turkey_skeleton_news.3.a: "穿凉鞋的政客？的确让人印象深刻。"
 turkey_skeleton_news.4.t: "[Get_newspaper_header]国家民主党赢得1963年土耳其大选"
 turkey_skeleton_news.4.d: "在最近举行的土耳其大选中，国家民主党获得了议会多数席位。对曾经主宰土耳其的共和人民党而言，这是一次极其令人震惊的失利。或许某种意义上说，这次败选只是延期抵达了而已。土耳其赢得第二次意土战争后，许多人都认为共和人民党早已在大选中稳操胜券。然而，现实证明了部分国际观察家的怀疑，也就是说，战场上的胜利并不足以平息对其统治日益增长的不满。\n\n年长的自由主义政治家福阿德·柯普吕律就任为土耳其总统，大部分国家民主党党员都将他视作团结的象征，而总理一职则由备受争议的民粹主义者阿德南·曼德列斯接任。人们相信，国家民主党将在执政期间致力于实现土耳其的全面民主化，消解共和人民党设置的诸多保护主义壁垒。"
 turkey_skeleton_news.4.a: "赢了战争，丢了政权。"
 turkey_skeleton_news.5.t: "[Get_newspaper_header]国家民主党赢得1963年土耳其大选"
 turkey_skeleton_news.5.d: "在土耳其近来的大选中，持自由主义立场的国家民主党脱颖而出，结束了共和人民党持续数十年之久的统治。第二次意土战争的惨败令土耳其经济自由落体，引爆了广泛的反政府抗议。现在看来，投票结果确实体现了这些抗议活动的诉求。\n\n年长的自由主义政治家福阿德·柯普吕律就任为土耳其总统，大部分国家民主党党员都将他视作团结的象征，而总理一职则由备受争议的民粹主义者阿德南·曼德列斯接任。人们相信，国家民主党将在执政期间致力于实现土耳其的全面民主化，采取自由主义理论，摈弃共和人民党的诸多保护主义措施，重振濒临崩溃的国家经济。 "
 turkey_skeleton_news.5.a: "一个时代的终结。"
 turkey_skeleton_news.6.t: "[Get_newspaper_header]民主革新党赢得1963年土耳其大选"
 turkey_skeleton_news.6.d: "土耳其在意土战争中的胜利让许多分析家都预期认为，共和人民党将在大选中赢得压倒性的优势。然而，在人称“社会主义笑脸”的穆罕默德·阿里·艾巴尔领导下，民主革新党与保守立场的国家民主党结成选举联盟，成功获得了微弱多数。由于两党预先签订了名为“民主联盟”的协议，联合组建政府的进程应该会相当顺利。\n\n陶菲克·吕什蒂·阿拉斯已就任总统，他是民主革新党的创始人，深受自由保守派与社会主义者爱戴。许多人认为，党与工学农之间的联合、对民主化的支持和建立福利国家的承诺是其成功的关键。艾巴尔总理能否突破凯末尔主义大委员会中强硬派的阻挠、推行他的理想主义改革，我们拭目以待。\n\n"
 turkey_skeleton_news.6.a: "民主是世界上最娇嫩的花朵。"
 turkey_skeleton_news.7.t: "[Get_newspaper_header]民主革新党在1963年土耳其大选赢得最多选票"
 turkey_skeleton_news.7.d: "土耳其在意土战争中的惨败给了共和人民党致命一击。在人称“社会主义笑脸”的穆罕默德·阿里·艾巴尔领导下，民主革新党与保守立场的国家民主党结成选举联盟，赢得了大选的微弱多数。由于两党签订了名为“民主联盟”的协议，联合组建政府的进程应该会相当顺利。\n\n陶菲克·吕什蒂·阿拉斯已就任总统，他是民主革新党的创始人，深受自由保守派与社会主义者爱戴。许多人认为，党与工学农之间的联合、对民主化的支持和建立福利国家的承诺是其成功的关键。艾巴尔总理能否突破凯末尔主义大委员会中强硬派的阻挠，推行他的理想主义改革，我们拭目以待。\n"
 turkey_skeleton_news.7.a: "民主是世界上最娇嫩的花朵。"
 turkey_skeleton_news.8.t: "[Get_newspaper_header]四·二二事变"
 turkey_skeleton_news.8.d: "由于对意作战遭遇惨败，终结共和人民党四十三年统治的呼声空前高涨。然而，随着凯末尔主义青年运动和军事学院共同向大国民议会进军，外界显然高估了土耳其的民主程度。\n\n在这场“四·二二事变”中，与共和人民党内“激进凯末尔派”结盟的势力占领了土耳其立法机关，大批逮捕反对党乃至部分立场摇摆的本党党员。与此同时，法赫里·科鲁蒂尔克也辞去总理一职，接替他的法利赫·勒夫克·阿塔伊迅速宣告第二次土耳其革命开始，并着手组建独立法庭以审判所谓的“共和国叛徒”。\n"
 turkey_skeleton_news.8.a: "民主死于襁褓之中。"
 turkey_skeleton_news.9.t: "[Get_newspaper_header]土耳其部长辞职危机"
 turkey_skeleton_news.9.d: "辞职潮在居莱克总理的政府之中爆发，而所有辞职者都是总理本人所属的政党——共和人民党的高层成员。居莱克的改革议程倡议放宽言论自由和公众集会法律，同时修改宪法，排挤守旧派，招徕志同道合的改革人士。这一切都疏远了共和人民党建制派，居莱克的长期竞争对手、外交部长尼哈特·埃里姆率先做出行动，掀起了辞职大潮。\n\n居莱克总理在民主革新党中的联盟伙伴和他党内的改革派成员都对辞职做出了谴责，并申明了对总理及其政策的支持。然而，埃里姆在国民议会中盟友众多，凯末尔主义大委员会也已经开始不情愿地监视总理，因此，除非居莱克迅速解决危机，否则他的议程一定会就此停滞不前。"
 turkey_skeleton_news.9.a: "共和人民党必须摆脱它威权的过往，或者从此再无机会。"
 turkey_skeleton_news.10.t: "[Get_newspaper_header]共和人民党再次于土耳其胜选"
 turkey_skeleton_news.10.d: "土耳其历史上的第二次自由选举计票完毕，结果显示，共和人民党籍现任总理卡瑟姆·居莱克成功拿下第二任期。居莱克奉行与过去共和人民党独裁政策不同的改革主义，他的胜选标志着人民的信任。充当共和人民党改革派与温和派之间团结粘合剂角色的伊斯麦特·伊诺努总统在安卡拉就居莱克胜选发表了祝贺演讲，对政府所取得的成就做出了高度评价。\n\n当反对党思考如何应对大选结果时，共和人民党也似乎正在着手处理尚未完全解决的党内冲突。尽管正统派已经失势，但改革派联盟中的矛盾正变得愈发尖锐——尤其是在由劳工部长比伦特·埃杰维特领导的左翼改革派，与内务部长图尔汗·费齐奥卢麾下的右翼改革派之间。\n"
 turkey_skeleton_news.10.a: "改革主义者迈步向前。"
 turkey_skeleton_news.11.t: "[Get_newspaper_header]伊斯麦特·伊诺努辞职，卡瑟姆·居莱克当选总统"
 turkey_skeleton_news.11.d: "伊斯麦特·伊诺努总统已正式向全国宣布将立即退休，土耳其政坛的一个时代就此落下帷幕。伊诺努是独立战争中的英雄，穆斯塔法·凯末尔·阿塔图尔克的左膀右臂，顽固地在总统的座位上盘踞了三十年之久。据内部消息称，由于担心自己的健康状况，他终于还是退了一步。\n\n在大国民议会的特别会议上，现任总理卡瑟姆·居莱克通过投票，接替了伊诺努的位置。这位极具魅力的改革者已成为土耳其的最高领导，共和人民党应当会在不久之后召开会议，决定由谁接替空缺的总理一职。这事情并不容易，曾经由居莱克调解的左翼与右翼改革派之间的党内矛盾很快就将彻底爆发。"
 turkey_skeleton_news.11.a: "走进新时代。"
 turkey_skeleton_news.12.t: "[Get_newspaper_header]比伦特·埃杰维特在共和人民党代会上胜出"
 turkey_skeleton_news.12.d: "在土耳其共和国，执政党共和人民党在党代会上选举劳动部长比伦特·埃杰维特为党主席，他也自动成为总理。此前，伊斯麦特·伊诺努总统因身体欠佳决定退休，时任总理的卡瑟姆·居莱克随即被选为新一任总统，这造成总理一职无人担任，因此党决定召开代表大会，填补空缺。\n\n现在填补那个空位的人便是埃杰维特，国民大会随后确认了这一结果。这是共和人民党改革左派的重大胜利，他们的“中道偏左”政纲以社会福利、工人权益和合作社改革为重点，这正是埃杰维特一直提倡的。而内务部长图尔汗·费齐奥卢的改革右派对这一结果大为失望，称埃杰维特当选正说明了党已经成了激进“布尔什维克”分子的老巢。看来党行将分裂的说法并非空穴来风。\n"
 turkey_skeleton_news.12.a: "凯末尔主义的未来明晰了。"
 turkey_skeleton_news.13.t: "[Get_newspaper_header]图尔汗·费齐奥卢在共和人民党代会上胜出"
 turkey_skeleton_news.13.d: "土耳其共和国执政党共和人民党在党代会上选举内务部长图尔汗·费齐奥卢为党主席，他也自动成为总理。此前，伊斯麦特·伊诺努总统因身体欠佳决定退休，时任总理的卡瑟姆·居莱克随即成为新任总统，造成总理一职无人担任，因此党决定召开代表大会，填补空缺。\n\n现在填补那个空位的人便是费齐奥卢，国民大会随后确认了这一结果。这是共和人民党改革右派的重大胜利，他们的政纲以国家发展、反对激进主义和加强私有与国有企业的联系为重点，这正是费齐奥卢一直提倡的。劳动部长比伦特·埃杰维特的改革左派对这一结果大为失望，称费齐奥卢当选说明党正倒退回“反动的佩克主义作风”。看来党行将分裂的说法并非空穴来风。\n"
 turkey_skeleton_news.13.a: "凯末尔主义的未来明晰了。"
 turkey_skeleton_news.14.t: "[Get_newspaper_header]土耳其军事改革"
 turkey_skeleton_news.14.d: "土耳其国防部长塞伊菲·库尔特贝克日前宣布了一系列广泛的军事改革措施，旨在强化第二次意土战争后的战备状态。虽然大部分改革措施都围绕军队现代化和机械化展开，还有一笔专门资金用于改善土耳其军队的车辆载具与空地一体化情况，但其中还包括一项引起争议的重组计划，意在将军队完全置于国防部领导之下，结束军队事实上的独立地位。\n\n在媒体挖出来库尔特贝克参与针对前总统伊斯麦特·伊诺努未遂政变的证据之后，他面临着敦促其辞职的广泛呼声，但库尔特贝克得到了总理阿德南·曼德列斯的全力支持。目前看来，曼德列斯政府在军方与文官政府的冲突之中取得了胜利。\n"
 turkey_skeleton_news.14.a: "虎入笼中。"
 turkey_skeleton_news.15.t: "[Get_newspaper_header]土耳其国防部长塞伊菲·库尔特贝克辞职"
 turkey_skeleton_news.15.d: "在被媒体揭露其密谋策划针对前总统伊斯麦特·伊诺努政变而遭到长期批评后，土耳其国防部长塞伊菲·库尔特贝克于今日辞职。任职期间，库尔特贝克是一个颇为分裂的人物，他计划进行的军事改革要求撤换数位与共和人民党结盟的著名将领。此外，其最为引人注目的措施是要将军队置于国防部指挥之下。阿德南·曼德列斯不得不屈服于来自军方和媒体的巨大压力，在一次简短的新闻发布会上宣布库尔特贝克辞职，随后便起身离场，没有发表任何其他评论。\n\n土耳其武装力量对此表示欢迎，他们似乎很高兴看到库尔特贝克结束军方事实上独立地位的努力陷入僵局。在与曼德列斯政府的对抗之中，军方拿下了了这至关重要的一分。\n"
 turkey_skeleton_news.15.a: "军队高奏凯歌。"
 turkey_skeleton_news.17.t: "[Get_newspaper_header]星期日危机爆发，曼德列斯当选总统"
 turkey_skeleton_news.17.d: "在土耳其最近的大选中，国家民主党正如预期，赢得了选举胜利，人们因此推测议会将选举福阿德·柯普吕律连任总统。然而，当总理阿德南·曼德列斯将自己名字也写进总统候选人名单、与柯普吕律对抗之时，再次当选的代表们大为震惊。支持和反对曼德列斯的派系都试图赢得至关重要的提名，全国媒体将这一紧要关头的丑闻称为“星期日危机”。\n\n如今，来自艾登的民粹主义者击败了他昔日的导师，夺得了总统大位，与他的密友米凯雷姆·萨罗尔组建政府，由后者担任总理。苏莱曼·德米雷尔和萨德丁·比尔吉奇也曾被认为是曼德列斯的亲信，但他们并没能在新政府中取得一席之地。对于曼德列斯的支持者而言，这是一场伟大的胜利，但他的批评者却担心，才短短数年的土耳其民主可能已经在危机中彻底地颠覆了。\n"
 turkey_skeleton_news.17.a: "土耳其人爱戴他们的英雄……"
 turkey_skeleton_news.18.t: "[Get_newspaper_header]星期日危机爆发，德米雷尔当选土耳其总理"
 turkey_skeleton_news.18.d: "在土耳其最近的大选中，国家民主党正如预期，赢得了选举胜利，人们因此推测议会将选举福阿德·柯普吕律连任总统。然而，当总理阿德南·曼德列斯将自己名字也写进总统候选人名单、与柯普吕律对抗之时，再次当选的代表们大为震惊。支持和反对曼德列斯的派系都试图赢得至关重要的提名，全国媒体将这一紧要关头的丑闻称为“星期日危机”。\n\n最终，由于来自国民议会内外的压力着实无法承受，曼德列斯已于今日上午向政府和国家民主党递交了辞呈，自由市场公开倡导者、财政部长苏莱曼·德米雷尔接替了他的职位。同时，内政部长萨德丁·比尔吉奇因未能取代曼德列斯出任总理，也已经提交辞呈并离党，成立了一个由更多传统保守派人士组成的新政党——民族主义和保守党。\n"
 turkey_skeleton_news.18.a: "周一早上到了……"
 turkey_skeleton_news.19.t: "[Get_newspaper_header]星期日危机爆发，比尔吉奇当选土耳其总理"
 turkey_skeleton_news.19.d: "在土耳其最近的大选中，国家民主党正如预期，赢得了选举胜利，人们因此推测议会将选举福阿德·柯普吕律连任总统。然而，当总理阿德南·曼德列斯将自己名字也写进总统候选人名单、与柯普吕律对抗之时，再次当选的代表们大为震惊。支持和反对曼德列斯的派系都试图赢得至关重要的提名，全国媒体将这一紧要关头的丑闻称为“星期日危机”。\n\n最终，由于来自国民议会内外的压力着实无法承受，曼德列斯已于今日上午向政府和国家民主党递交了辞呈，领导党内民族主义和伊斯兰主义派系的内政部长萨德丁·比尔吉奇接替了他的职位。同时，财政部长苏莱曼·德米雷尔因未能取代曼德列斯出任总理，也已经提交辞呈并离党，成立了一个由自由保守派人士组成的新政党——正义党。\n"
 turkey_skeleton_news.19.a: "周一早上到了……"
 turkey_skeleton_news.20.t: "[Get_newspaper_header]曼德列斯修改土耳其宪法"
 turkey_skeleton_news.20.d: "自阿德南·曼德列斯担任土耳其共和国总统以来，分析家们注意到，他正越来越多地将权力集中到自己手中，并镇压一切的异议声音。今天，猜测变成了现实：土耳其议会通过了一项宪法修正案，废除了总理一职，转而将行政权赋予总统，与美国的政府组织方式类似。于曼德列斯而言，这是一次重大胜利。支持者认为，他如今的地位仅次于曾经的穆斯塔法·凯末尔·阿塔图尔克，而他也将像阿塔图尔克一样，使国家免于极右分子的堕落和极左分子的蛊惑。\n\n虽然曼德列斯政府曾经放宽了土耳其的新闻媒体法律，但近来其步伐却日益倒退，针对曼德列斯的批评常常遭到法律的铁拳制裁。曾经反对旧日共和人民党独裁统治的人却自己建立起了独裁统治，真是不折不扣的讽刺。\n"
 turkey_skeleton_news.20.a: "土耳其困在了轮回之中？"
 turkey_skeleton_news.21.t: "[Get_newspaper_header]土耳其前总理遇刺"
 turkey_skeleton_news.21.d: "土耳其前总理阿德南·曼德列斯今日在再次竞选总理的活动中遇刺身亡，1971年选举季随之陷入一片混乱。据报道，曼德列斯和他的支持者在安卡拉游行时遇到了对手的竞选游行队列，双方之间爆发了冲突。警方最终将游行队伍分开之后，发现曼德列斯在混乱中被一名身份不明的袭击者持刀刺伤，不治身亡。\n\n前总理曼德列斯是土耳其最具争议的人物之一，他的人生就此颇为戏剧性地画上了句号。在因违反宪法而黯然下台之后，曼德列斯很快卷土重来，组建了人民民主党，试图夺回其被“窃取”的地位。当下，有关究竟是谁策划了这场谋杀的猜测甚嚣尘上，加剧了这个多灾多难的年轻共和国的分裂。\n\n"
 turkey_skeleton_news.21.a: "永不停息的男人终于停下了脚步。"
 turkey_skeleton_news.22.t: "[Get_newspaper_header]民主革新党再次胜选"
 turkey_skeleton_news.22.d: "民主革新党的改革政策赢得了土耳其人民的选票，他们获得了又一个任期\n\n作为土耳其政坛中的新秀，许多人都对该党领导人的雄心壮志寄予厚望，而这些期望似乎都得到了满足。国家民主党和共和人民党都做出了让步，以示对民主的承诺，不过后者的让步依然显得有些勉强。革新党领导人感谢了公众的支持，并承诺进行更多左翼和以工人为中心的改革，坚持建设更加平等的土耳其。"
 turkey_skeleton_news.22.a: "土耳其左翼似乎想明白该怎么做了。"
 turkey_skeleton_news.23.t: "[Get_newspaper_header]革命工会联盟抗议席卷土耳其"
 turkey_skeleton_news.23.d: "革命工会联盟日前宣布，将于土耳其全国各地展开一系列工人集会，罢工和抗议震撼了全国上下。与此同时，民主革新党领导层正面对着如何应对事态的内部难题。\n\n革新党对危机的反应迟缓且不一致。社会主义派系中大多同情抗议者，希望给予其所寻求的部分让步；而在自由派中，实用主义和秩序占了上风。分析人士担心，这两种立场可能会无法调和。"
 turkey_skeleton_news.23.a: "左派内斗，再典型不过。"
 turkey_skeleton_news.24.t: "[Get_newspaper_header]土耳其总理艾巴尔辞职，阿利詹组建政府"
 turkey_skeleton_news.24.d: "民主革新党自由派系的领导人埃克雷姆·阿利詹已就任土耳其总理，其政府的首要目标是平息革命工会联盟领导的、导致全国瘫痪的工人抗议活动。\n\n此前，穆罕默德·阿里·艾巴尔领导的革新党社会主义派系曾试图与抗议者进行磋商谈判。他的和解态度导致了他与议会之间的分歧，因此辞去了总理一职，大批社会主义者随之由民主革新党流向了土耳其工人党。"
 turkey_skeleton_news.24.a: "秩序将会建立。"
 turkey_skeleton_news.25.t: "[Get_newspaper_header]土耳其自由派因革命工会联盟抗议离党"
 turkey_skeleton_news.25.d: "埃克雷姆·阿利詹领导的民主革新党自由派以穆罕默德·阿里·艾巴尔总理“纵容”革命工会联盟领导的工人抗议活动为由而集体离党。长期以来，艾巴尔始终对导致土耳其工业近乎瘫痪的革命工会表示同情，阿利詹和他的盟友因此转身离开，组建了新的改革民主党。\n\n阿利詹离党大大削弱了民主革新党的力量，但却与艾巴尔的社会主义愿景完全一致——从总理发布的媒体声明来看，他似乎认为这一转变是可以接受的损失。"
 turkey_skeleton_news.25.a: "艾巴尔从来就不需要他们。"
 turkey_skeleton_news.26.t: "[Get_newspaper_header]土耳其爆发军事政变"
 turkey_skeleton_news.26.d: "今晨，土耳其公民在收音机中听到了文官政府已遭推翻的消息，国家现在由军方领导的民族团结委员会领导。阿尔帕尔斯兰·蒂尔凯什准将在广播中宣读了这一消息，强调政变是为了捍卫宪法，将国家从议会政治僵局的“蛊惑人心”之下解救出来，新选举也将很快举行。被批评者指责为试图建立独裁政权的阿德南·曼德列斯也已被军方关押，他在国家民主党中的竞争对手也同样已经身陷囹圄。\n\n杰夫德特·苏奈将军已就任总统，阿尔帕尔斯兰·蒂尔凯什和另一位相当有影响力的军官，杰马尔·马丹奥卢中将预计将会进入内阁。评论人士都在怀疑，土耳其的民主要暂停多长时间。\n\n"
 turkey_skeleton_news.26.a: "让我们来看看坦克碾过之后，选票上还能剩下谁的名字。"
 turkey_skeleton_news.27.t: "[Get_newspaper_header]土耳其爆发军事政变"
 turkey_skeleton_news.27.d: "今晨，土耳其公民在收音机中听到了文官政府已遭推翻的消息，国家现在由军方领导的民族团结委员会领导。阿尔帕尔斯兰·蒂尔凯什准将在广播中宣读了这一消息，强调政变是为了捍卫宪法，将国家从议会“布尔什维主义”之下解救出来，新选举也将很快举行。此前，政府因民主革新党颇具争议的改革方案而在宪法法院陷入了激烈的法律诉讼。\n\n杰夫德特·苏奈将军已就任总统，阿尔帕尔斯兰·蒂尔凯什和另一位相当有影响力的军官，杰马尔·马丹奥卢中将预计将会进入内阁。评论人士都在怀疑，土耳其的民主要暂停多长时间。"
 turkey_skeleton_news.27.a: "让我们来看看坦克碾过之后，选票上还能剩下谁的名字。"
 turkey_skeleton_news.29.t: "[Get_newspaper_header]尼哈特·埃里姆组建技官政府"
 turkey_skeleton_news.29.d: "在马丹奥卢将军的领导下，土耳其军方的民主化努力以选举的两极分化和争议而告终。政变的伤疤仍然困扰着年轻的共和国，各党派之间尚未就联合达成一致。军方因此迫使共和人民党政治家尼哈特·埃里姆离党，并组建了由其领导、囊括共和人民党、正义党、改革民主党三个温和政党支持的技术官僚政府。\n\n埃里姆曾是共和人民党“正统”派系的领袖，长期以来一直是党内的温和力量，与激进派和改革派都存在龃龉。他的派系由受教育的技术官僚组成，并承诺实现稳定和增长，许多人因此对他产生了兴趣。但在大多数土耳其民众看来，他只是军方的傀儡，被推上前台目的是进一步巩固军方的控制。"
 turkey_skeleton_news.29.a: "他会是那个为土耳其带来安宁的人吗？"
 turkey_skeleton_news.30.t: "[Get_newspaper_header]土耳其技官政府崩溃"
 turkey_skeleton_news.30.d: "在不断激化升级的社会和经济动荡之中，尼哈特·埃里姆总理和他由共和人民党、改革民主党、正义党组成的技官政府已经宣告垮台。\n\n埃里姆政府组建的目的是在军方监管下稳定国家局势，但他未能兑现对公众和议会的承诺。土耳其经济尚未走出低谷，而执政联盟的内讧又使得政府陷入瘫痪。埃里姆已承认自己的失败，武装力量则宣布，即将举行新一次选举。"
 turkey_skeleton_news.30.a: "只有专家才能解决问题。"
 turkey_skeleton_news.28.t: "[Get_newspaper_header]爱国党赢得1971年土耳其大选"
 turkey_skeleton_news.28.d: "随着埃里姆政府垮台和广泛的街头骚乱，土耳其全国掀起了一股反建制的异议浪潮。政治建制派已无法赢回公众的信任，一个名为“爱国党”的新政党乘势而起，在最近的选举中胜选上台。\n\n爱国党党主席图尔古特·厄扎尔曾是一名电气工程师兼官僚，他已宣誓就任总理，提出了全面私有化和结构改革的计划，意图提振投资者信心以结束国家经济的萎靡不振。在电视直播的胜选演说中，厄扎尔承诺将结束危机，恢复被此前几届政府所“颠覆”的“真正的凯末尔主义价值观”。"
 turkey_skeleton_news.28.a: "他们这次会做对的。"
 turkey_skeleton_news.31.t: "[Get_newspaper_header]土耳其经济奇迹"
 turkey_skeleton_news.31.d: "土耳其传来消息，技术官僚总理尼哈特·埃里姆获得了共和人民党主席提名并当选。他的成功经济政策被誉为“土耳其奇迹”，为政变后的混乱局面画上了句号，率领着自己的党派赢得了大选中的多数支持。\n\n虽然外国专家质疑了埃里姆赢得大选多数的合法性，但土耳其民众对迄今为止的情况仍相当满意，希望由埃里姆政府带来的增长和稳定能够继续下去。然而，目睹共和人民党在全国官僚机构中大行其道之时，一些批评人士不禁想起了过去的一党时期。虽然经济预期增长依然强劲，但政治舞台已经缩小，尽在总理的掌握之下。\n\n"
 turkey_skeleton_news.31.a: "土耳其以自由换来了繁荣。"
 turkey_skeleton_news.32.t: "[Get_newspaper_header]土耳其民主化进程停滞，军事统治延续"
 turkey_skeleton_news.32.d: "今天上午，执掌土耳其大权的民族团结委员会发言人表示，恢复文官政府的计划已经“在无限期的未来之内”暂停。由于政局的持续动荡，民族团结委员会预计将着手正式对国家建立军事控制。\n\n据猜测，此举是由极右翼准将阿尔帕尔斯兰·蒂尔凯什和与他为伍的年轻军官领导的委员会激进派所为：他们认为可以借民主中止之机，按照自己的意愿重塑国家。与此同时，杰马尔·马丹奥卢将军则已被调往国外，担任外交职务。有关于两人权力斗争的流言不胫而走——这场战斗中，似乎是蒂尔凯什赢了。"
 turkey_skeleton_news.32.a: "土耳其的民主从来就没有过机会。"
 turkey_skeleton_news.32.b: "不管在哪里，自由民主都一败涂地。"
 turkey_skeleton_news.33.t: "[Get_newspaper_header]阿尔帕尔斯兰·蒂尔凯什于土耳其掌权"
 turkey_skeleton_news.33.d: "土耳其总统杰夫德特·苏奈于今日辞职，由阿尔帕尔斯兰·蒂尔凯什将军接任总统和民族团结委员会领导人。随之发布的政府公报表明，该委员会将很快解散，安卡拉现存的议会将重组为“执政国会”，其议员来自两大合法政党——共和人民党和蒂尔凯什创立的民族团结党，且只有在经过军方政审后方能正式上任。\n\n尽管土耳其军政府的内部运作几乎不被外界所知，但苏奈领导的温和派遭到激进派排挤的传言似乎已得到证实。蒂尔凯什愈发频繁地在公共场合露面，阐述自己的意识形态信条。他自豪而狂热的民族主义政策强调伊斯兰道德主义、快速工业化和个人对国家的完全服从。\n"
 turkey_skeleton_news.33.a: "他的追随者称他为“巴什布”，伟大领袖。"
 turkey_skeleton_news.34.t: "[Get_newspaper_header]土耳其“流氓将军”兵败"
 turkey_skeleton_news.34.d: "四·二二事变表面上巩固了日薄西山的共和人民党的统治，激进凯末尔主义者法利赫·勒夫克·阿塔伊也趁此机会成功上任总理，但多数将军选择抵制这一公然践踏民主的行为。遍布全国的反对派与民主联盟领导的伊斯坦布尔政府并肩作战，反对专制统治。经过两年堪比内战的激烈斗争，伊斯坦布尔政府遭到了惨败。安卡拉对此弹冠相庆，反对派则被吓破了胆。\n\n阿塔伊总理的“第二次土耳其革命”如火如荼地进行，坦克部队开上伊斯蒂克拉尔大街，成千上万的异见者受到审判。随着安卡拉政府逐渐恢复对全国其他地区，包括人口最多的城市的控制，这一失败的反抗尝试终以遭到暴力镇压而告终。\n"
 turkey_skeleton_news.34.a: "佩克阴魂不散。"
 turkey_skeleton_news.35.t: "[Get_newspaper_header]“流氓将军”政变土耳其政府"
 turkey_skeleton_news.35.d: "四·二二事变被前总理阿塔伊誉为第二次土耳其革命的曙光，共和人民党内的激进派也对此弹冠相庆。然而，尽管此次事变得到了军官团的广泛支持，但最终还是以失败告终。\n\n全国各地持反对意见的土耳其将军认为此举堪称对民主政治的公然挑衅，他们与伊斯坦布尔政府并肩作战，历经两年堪比内战的血腥冲突，战胜了激进凯末尔主义阴谋分子，取得了不可思议的胜利。第一军将军塞伊菲·库尔特贝克被推选为总统，亲率大军向安卡拉进发，并接受了现已两度名誉扫地的伊诺努的辞呈。在以团结国家的名义特赦了多名政客之后，主持制定新宪法和恢复民主的重任就落在了他的肩上。"
 turkey_skeleton_news.35.a: "这一次，人民和军队达成了共识。"
 turkey_skeleton_news.36.t: "[Get_newspaper_header]法利赫·勒夫克·阿塔伊总理遭免职"
 turkey_skeleton_news.36.d: "四·二二事变发生时，许多人都注意到伊诺努总统与在政变中被任命为总理的阿塔伊相比显得有些不太情愿。人们纷纷猜测伊诺努总统已经大权旁落，但现在看来这一担忧实属多余。伊诺努总统在其传奇般的任期内第二次从阿塔伊手中夺回权力，消除了激进凯末尔主义者对他的威胁。\n\n接替阿塔伊总理之位的尼哈特·埃里姆在意识形态上与伊诺努更为一致，曾被视为阿塔伊于1954年辞职后最有可能的继任者。阿塔伊被免职后，随之而来的便是党内对其盟友的降职和发配。但由于阿塔伊首先要对伊诺努批准政变负主要责任，他的下一步行动仍是未知数。无论好坏，五十年代的土耳其似乎又回来了。\n"
 turkey_skeleton_news.36.a: "历史不会重演，但总是惊人地相似。"
 turkey_skeleton_news.37.t: "[Get_newspaper_header]法利赫·勒夫克·阿塔伊就任土耳其总统"
 turkey_skeleton_news.37.d: "共和人民党挫败“流氓将军”的威胁、安卡拉方面不出所料地赢得胜利后，国际政治分析家们不禁好奇土耳其的局势将如何发展。然而，伊斯麦特·伊诺努总统宣布辞职并支持在政变期间第二次就任总理的法利赫·勒夫克阿塔伊接任的消息，宣告阿塔伊与他的激进凯末尔主义盟友终究夺回了党内的主导地位。\n\n政变前，阿塔伊曾是凯末尔主义大委员会的主席，也是党内佩克派事实上的领袖。如果内幕传闻属实，那么他就是潜藏在伊诺努手下的内鬼。政变，或许还有伊诺努的辞职，都有他在暗中推动。如果局势发展正如传闻所说，那么他的统治会像佩克那样激进且极具革命性，甚至更胜一筹。而这个国家能做的，也只有听之任之。\n"
 turkey_skeleton_news.37.a: "这是阿塔图尔克希望看见的吗？"
 turkey_skeleton_news.38.t: "[Get_newspaper_header]“方向”派在土耳其掌权"
 turkey_skeleton_news.38.d: "阿塔伊总统去世后，凯末尔主义大委员会便陷入了分裂。经过激烈的权力斗争，“方向”派最终取得了胜利。新政府以其迥异的意识形态立场而闻名，“方向”派认为，如果过程正确，凯末尔主义的终点便是社会主义。\n\n先总统阿塔伊的长期盟友、凯末尔主义思想家谢夫凯特·叙雷亚·艾代米尔上任新总统，任命著名学者多安·阿夫哲奥卢为总理。“方向”派的目标是建立以民族认同为基础的土耳其特色社会主义，使土耳其的未来符合他们的凯末尔主义愿景。"
 turkey_skeleton_news.38.a: "在熟悉的事物中融入革命元素。"
 turkey_skeleton_news.39.t: "[Get_newspaper_header]“理想”派在土耳其掌权"
 turkey_skeleton_news.39.d: "阿塔伊总统去世后，凯末尔主义大委员会便陷入了分裂。经过激烈的权力斗争，“理想”派最终取得了胜利。新政府的目标是实现雷杰普·佩克对土耳其的愿景，重建四十年代到五十年代初的法团主义国家。\n\n阿塔伊的继任者许克吕·瑟克曼叙埃尔是德高望重的战争英雄和佩克的旧日盟友，党需要他来稳定政局，制衡过于激进的新总理塔拉特·艾代米尔。艾代米尔曾领导凯末尔主义青年运动，据说该组织是青年发展计划的一部分，也是土耳其准军事组织的一部分。"
 turkey_skeleton_news.39.a: "国泰民安。"
 turkey_skeleton_news.40.t: "[Get_newspaper_header][GetTURLeftKemalistPartyName]赢得1971年土耳其大选"
 turkey_skeleton_news.40.d: "土耳其大选以左翼凯末尔主义党派[GetTURLeftKemalistPartyName]获得多数选票而落下帷幕。选举结果公布后，其领导人比伦特·埃杰维特在安卡拉向欢呼雀跃的支持者们表示，这场胜利不光属于该党和“中道偏左”政治纲领，也属于广大的土耳其人民。自由派政党[GetTURLiberalPartyName]预计将在新政府中担任执政联盟成员的角色。\n\n[GetTURLeftKemalistParagraph]"
 turkey_skeleton_news.40.a: "[GetTURLeftKemalistOptionText]"
 TUR_left_kemalist_paragraph_a: "尽管埃杰维特领导下的共和人民党与此前截然不同，但其对土耳其近五十年的统治在可预见的未来仍会延续。现在该党已重新向左翼靠拢，不过据一些党内政治家称，这只是改革主义、民族主义和世俗主义等凯末尔主义原始价值观的现代表达。无论如何，看来共和人民党还没有彻底失去人民的信任。"
 TUR_left_kemalist_paragraph_b: "自1963年开展自由选举，共和人民党变为反对党以来，该党就逐渐摒弃了威权主义传统，并在埃杰维特的领导下将党的政治倾向调整为左翼，由图尔汗·费齐奥卢领导的右翼改革派则分裂出去。现在，强调社会正义、土地改革和工人权利的共和人民党在竞选中获胜，似乎印证了埃杰维特倡导的“中道偏左”政治纲领是符合凯末尔主义的可行理论——或许，也是最适合新十年的政治理论。"
 TUR_left_kemalist_paragraph_c: "民主左翼党的领导层由自图尔汗·费齐奥卢担任共和人民党主席后分裂出去的左翼成员组成。埃杰维特在失利后卷土重来，在竞选中提出将实现社会正义、进行土地改革和扩大工人权利，最终赢得了民众的支持，大获全胜。这证明了他的“中道偏左”政治纲领是符合凯末尔主义的可行理论——或许，也是最适合新十年的政治理论。"
 TUR_left_kemalist_option_a: "从铁拳中飞出的和平之鸽。"
 TUR_left_kemalist_option_b: "插在另一个箭筒里的六箭矢？"
 turkey_skeleton_news.41.t: "[Get_newspaper_header][GetTURRightKemalistPartyName]赢得1971年土耳其大选"
 turkey_skeleton_news.41.d: "近日的土耳其大选以右翼凯末尔主义党派[GetTURRightKemalistPartyName]获得多数票而落下帷幕。该党领导人图尔汗·费齐奥卢在安卡拉向欢呼雀跃的支持者发表了胜利演说，阐述了国家在未来十年年间面临的挑战，一针见血地指出凯末尔主义是解决这些问题的唯一办法。\n\n[GetTURRightKemalistParagraph]"
 turkey_skeleton_news.41.a: "凯末尔主义的最新迭代。"
 turkey_skeleton_news.42.t: "[Get_newspaper_header][GetTURPopConPartyName]赢得1971年土耳其大选"
 turkey_skeleton_news.42.d: "近日的土耳其大选以[GetTURPopConPartyName]获得多数票而落下帷幕。该党领导人苏莱曼·德米雷尔在安卡拉向支持者发表了激动人心的胜选演讲，承诺将为土耳其人民带来繁荣和自由。\n\n[GetTURPopConParagraph]"
 turkey_skeleton_news.42.a: "昨天是昨天，今天是今天。"
 turkey_skeleton_news.43.t: "[Get_newspaper_header][GetTURPatConPartyName]赢得1971年土耳其大选"
 turkey_skeleton_news.43.d: "近日的土耳其大选以[GetTURPatConPartyName]获得多数票而落下帷幕。该党领导人萨德丁·比尔吉奇在安卡拉向支持者致意，感谢人民对该党的信任，相信该党才是土耳其的唯一正道。\n\n[GetTURPatConParagraph]"
 turkey_skeleton_news.43.a: "伊斯兰主义者和反动派掌权？佩克的棺材板要压不住了。"
 turkey_skeleton_news.44.t: "[Get_newspaper_header][GetTURLiberalPartyName]赢得1971年土耳其大选"
 turkey_skeleton_news.44.d: "今年的大选结束后，土耳其共和国成立了由自由派政党[GetTURLiberalPartyName]领导的新联合政府。该党领袖埃克雷姆·阿利詹成功地与其他两个政党建立了广泛的联盟，推进国家的自由化和民主化。左派由[GetTURLeftKemalistPartyName]的比伦特·埃杰维特领导，右派则由[GetTURPopConPartyName]的苏莱曼·德米雷尔领导。\n\n[GetTURLiberalParagraph]"
 turkey_skeleton_news.44.a: "[GetTURLiberalOptionText]"
 TUR_liberal_paragraph_a: "埃克雷姆·阿利詹一直是土耳其自由主义的引路人，作为民主革新党的创始人之一，他曾于1963年将长期执政的共和人民党赶下台。虽然在艾巴尔总理的领导下，阿利詹被党内的社会主义派系边缘化，但土耳其革命工会联盟抗议活动的余波让他重回主席之位。如今，大权在握的阿利詹可以在扩大福利国家计划的同时致力于促进市场自由化，使国家真正从混乱的十年中恢复过来。"
 TUR_liberal_paragraph_b: "埃克雷姆·阿利詹一直是土耳其自由主义的引路人，也是命运多舛的反对党民主革新党的创始人之一。历经多年紧张对峙，该党的自由派和社会主义派宣告分裂，使得阿利詹无需再浪费精力与左派斗争。他制定了市场自由化和扩大福利国家的计划，在最近的选举中赢得了多数选民的支持。"
 TUR_liberal_option_a: "土耳其仍在沿用西方模式。"
 TUR_liberal_option_b: "一个自由的土耳其？多新鲜啊！"
 turkey_skeleton_news.45.t: "[Get_newspaper_header]1971年土耳其选举僵局"
 turkey_skeleton_news.45.d: "据来自安卡拉的消息，土耳其工人党及其领导人、“社会主义笑脸”穆罕默德·阿里·艾巴尔成功赢得了多数选票，但仍未过半。他的选民基础来自少数民族、工会、农民、知识分子和学生，胜利震撼了全国上下。\n\n凯末尔主义者、保守派和民族主义势力在如何对待选举结果的问题上陷入一片混乱，围绕左翼的“封锁线”正在崩溃，但即使工人党能说服左翼凯末尔主义者加入政府，也远不能达到多数。改革民主党领导人、艾巴尔的老同事兼竞争对手、自由保守派埃克雷姆·阿利詹已表示，如果艾巴尔愿意放弃其激进政策，那么他将对谈判持开放态度。"
 turkey_skeleton_news.45.a: "历史转折中的土耳其社会主义。"
 turkey_skeleton_news.46.t: "[Get_newspaper_header]土耳其工人党组建政府"
 turkey_skeleton_news.46.d: "穆罕默德·阿里·艾巴尔领导的土耳其工人党已同意与埃克雷姆·阿利詹和比伦特·埃杰维特领导的中左翼政党组建联合政府。艾巴尔认识到自己的任期有限，因此选择与泛左翼政党合作而非推行不妥协的激进议程。\n\n这一决定招致了激进左派的猛烈抨击，他们纷纷谴责艾巴尔与“资产阶级政党”合作，浪费了难得的革命机会，认为联盟将边缘化土耳其工人党的社会主义目标。尽管存在争议，艾巴尔仍致力于推行改革，推动扩大工人权利，建立更公平的土耳其。"
 turkey_skeleton_news.46.a: "妥协也有好处。"
 turkey_skeleton_news.47.t: "[Get_newspaper_header]第二次土耳其革命"
 turkey_skeleton_news.47.d: "尽管在议会中占少数，但穆罕默德·阿里·艾巴尔领导的土耳其工人党已经开始着手组建政府。艾巴尔与其他党内官员一起，呼吁土耳其工人阶级自发团结起来，对社会进行彻底变革。\n\n这一大胆举动引发了军方和反对派的担忧，他们担心工人党或将采取更极端的政策。艾巴尔的支持者走上街头，引发了多起暴力冲突。国内外投资者对该国的政治气候颇为担忧，经济不稳迫在眉睫。随着艾巴尔政府面临来自国内外越来越多的反对，土耳其动荡的前景似乎已经不可避免。"
 turkey_skeleton_news.47.a: "你知道的，马克思早已预言到了这一切。"
 turkey_skeleton_news.48.t: "[Get_newspaper_header]社会民主党赢得土耳其大选"
 turkey_skeleton_news.48.d: "在“民主革命”大获成功之后，民主联盟和库尔特贝克总统宣布解散临时政府，为民选政府让路。经全民公决通过的新宪法，使土耳其人民重获了被长期一党专政剥夺的许多自由权利。四·二二事变尘埃落定，国家稳定得到恢复，土耳其终于举行了第一次完全民主的大选。\n\n著名中左翼政治家图兰·居内什领导近期新成立的社会民主党赢下了大选，承诺将在遵守新宪法的同时建设福利国家、改善工人权利。新政府与埃克雷姆·阿利詹和自由保守派政党改革民主党结成了政治联盟，势要用民主治愈年轻共和国的创伤。\n"
 turkey_skeleton_news.48.a: "土耳其民主重获新生。"
 turkey_skeleton_news.49.t: "[Get_newspaper_header]民主共和党赢得土耳其大选"
 turkey_skeleton_news.49.d: "在“民主革命”大获成功之后，民主联盟和库尔特贝克总统宣布解散临时政府，为民选政府让路。经全民公决通过的新宪法，使土耳其人民重获了被长期一党专政剥夺的许多自由权利。四·二二事变尘埃落定，国家稳定得到恢复，土耳其终于举行了第一次完全民主的大选。\n\n已故政治家杰拉勒·拜亚尔的女儿尼吕费尔·居尔索伊及其领导的民主共和党赢下了大选。作为该国第一位女总理，居尔索伊继承了父亲和曼德列斯的衣钵，承诺将在多年来不间断的凯末尔主义改革之后推行保守主义。在与改革民主党组建政治联盟后，民主共和党在私人投资和农业生产领域找到了解决国家经济问题的办法。\n"
 turkey_skeleton_news.49.a: "民主、尊严与团结。"
 turkey_skeleton_news.50.t: "[Get_newspaper_header]土耳其获得核武器"
 turkey_skeleton_news.50.d: "土耳其政府宣布本国已成功进行了首次核试验，世界离子夜又近一秒。尽管此前外界对三头同盟的核研究计划略有耳闻，但在同盟解体时，人们认为该计划尚未付诸实践，只是停留于理论阶段。现在，显然土耳其一直在对原子能进行秘密研究，并在这一领域取得了惊人成果。\n\n虽然土耳其媒体纷纷对自己国家伟大的科学成就感到欣喜若狂，但国内外的批评者们则更关注核武器的进一步扩散意味着什么。既然土耳其能将核计划隐藏得如此之深，有些人不禁要问，下一个发表类似声明的国家会是哪个。罗马和日耳曼尼亚方面迅速谴责了土耳其，批判此举“破坏了该地区的力量平衡”。目前为止，世界其他国家尚未对此做出任何回应。\n"
 turkey_skeleton_news.50.a: "新月的光芒愈加明亮。"
 TUR_nine_light_doctrine: "九光理论"
 TUR_nine_light_doctrine_desc: "伟大领袖阿尔帕尔斯兰·蒂尔凯什反复强调，凯末尔主义的“六箭矢”对于现代土耳其民族而言还远远不够——他提出的“九光理论”成为了建设崭新土耳其的支柱。其中，民族主义和民粹主义与“六箭矢”的论述相同，要求所有土耳其人热爱自己的民族和国家，所有土耳其人都是其中的一分子；社会意识和自由则主张土耳其应实行混合经济，由国家控制关键产业，建立起由自由人组成的社会，保证所有人能从从社会保障和机会平等之中受益。\n\n接下来，理想主义和道德是土耳其意识觉悟培育的关键，帮助土耳其人了解自己在历史和文化中的地位；科学心态带来的光明将允许人们清楚地分析世界。\n\n最后，在全新的土耳其，农民理应得到照顾，组织起合作社，由此走向富裕；而城市则应迅速实现工业化，率领全民族拥抱现代和原子时代。巴什布已经发话了。"
 TUR_death_of_enkidu: "恩奇都之死"
 TUR_death_of_enkidu_desc: "没有人希望曼德列斯成为烈士。随着这位前总理遇刺身亡，他的支持者们悲痛欲绝，而他的批评者们则弹冠相庆。愤怒怨恨四处弥漫，阴谋论层出不穷。虽然曼德列斯和安卡拉之间谈不上什么深情厚谊，但这样的侮辱不能不解决，也不能逍遥法外，共和国的信任必须重建。尽管杀害曼德列斯的凶手身份仍然成谜，但时间将会冲淡民众的情绪。"
 turkey_faction_skeleton.1.UDP: "自1963年首次上台执政以来，国家民主党一直在努力废除一党专政制度，开放土耳其社会，证明了全球各地都能听到民主与自由的呼声。这引起了我们联盟中许多决策者的兴趣。"
 turkey_faction_skeleton.1.CHP: "显然，现在的共和人民党与曾经那个与轴心国结盟的政党已经有所不同。经历了一系列的政治改革且得到了人民选票授权的执政党同样采取了一个崭新的外交政策。这引起了我们联盟中许多决策者的兴趣。"
 turkey_faction_skeleton.1.DYP: "The left-liberal DYP government in Turkey, which has been following a domestic programme of reformism and democratization, has taken a step closer to the free world, and the other advanced democracies Turkey has modeled itself on since the republic's founding. This has piqued the interest of many policymakers across our alliance."
 turkey_faction_skeleton.1.Junta: "政变后，土耳其的大联盟政府一直一直以恢复稳定和信任为目标，与世界上的超级大国结盟或许能帮助实现这一点。即使国家问题重重，民主未来悬而未定，他们崭新的民主宪法以及充满活力的政治舞台引起了我们联盟中许多决策者的兴趣。"
 turkey_faction_skeleton.1.Menderes: "人们总说土耳其热爱它的英雄，而这句谚语似乎将在阿德南·曼德列斯，这位民粹主义总统身上应验。自他1963年得势以来，他做了很多事以摧毁旧政党的独裁统治，同时又让他的专断维持在有限范围。更重要的是，他非常热衷于加深经济改革，这吸引了我们联盟内不少决策者的兴趣。"
 turkey_faction_skeleton.11.t: "选个势力圈"
 turkey_faction_skeleton.11.d: "嗨呀玩家先生我们又见面啦，哦吼吼这都有势力圈给你加的"
 turkey_faction_skeleton.11.a: "OFN，民主好耶！"
 turkey_faction_skeleton.11.b: "团结协定，为了荣耀！"
 turkey_faction_skeleton.11.c: "共荣圈，选了就有金金金"
 turkey_faction_skeleton.11.e: "哥们孤立主义了，一个都不要喵。"
 POLITICS_OSMAN_TURAN_DESC: "A court scholar for the modern age, Osman Turan is one of Turkey's preeminent medievalists and an expert in Seljuk history. That this rather reserved academic now sits in the presidential Çankaya Mansion is thanks in major part to another historian-turned-statesman, Fuat Köprülü.\n\nHaving discovered the young Turan at the University of Ankara back in the late 1930's. Köprülü oversaw Turan's PhD. After Turan's academic career was interrupted by the war and stifled by the Peker dictatorship, the restless professor would follow his mentor into oppositional politics and into the UDP, representing his hometown of Trabzon in the Assembly.\n\nDespite his dry manner, Professor Turan's scholarly and political life, including his chairmanship of the cultural society Türk Ocakları, his prolific writing, even his marriage to an Ottoman princess, have helped establish him as a straightforward and respected figure in conservative-nationalist circles; who better than a historian to help Turkey learn from its past?"
 TUR_Naim_Talu: "纳伊姆·塔卢"
 TUR_Muammer_Aksoy: "穆阿迈尔·阿克索伊"
 POLITICS_SEVKET_SUREYYA_AYDEMIR_DESC: "只需看一眼谢夫凯特·叙雷亚·艾代米尔，土耳其人心中就会产生许多感慨。时至今日，共和人民党允许开明的工人、远见人士和爱国者的头脑中拥有种种想法——过去，它们往往被认为玷污了英雄、进步和真理的遗产。在平静开阔的海面上寻找水源早已令人厌倦，荡漾起的不过是余波而已。\n\n现在，艾代米尔掌舵土耳其。每时每刻，社会主义思想都将灌输进工人的方方面面，六箭矢将牵引他们的心灵向前迈进。对未来土耳其的憧憬沉甸甸地压在艾代米尔心头，他也不会长久地独自一人承担如此重任。"
 TUR_tip_revolution: "社会主义的复仇面孔"
 TUR_tip_revolution_desc: "经过八年的妥协、半途而废和出尔反尔之后，穆罕默德·阿里·艾巴尔通过投票箱实现社会主义的理论正面临着终极考验。在民主革新党激进派的建议乃至压力之下，艾巴尔不顾议会反对，呼吁人民动员起来，赋予政府进行真正彻底改革的能力。有人将之唤作新的1917年革命，街头抗议此起彼伏，权力大厅怒气冲天，而军方的双手已经小心翼翼地搭上了扳机。"
 TUR_Tekin_Ariburun: "泰金·阿勒布伦"
 TUR_Cemal_Madanoglu: "杰马尔·马丹奥卢"
 turkey_faction_skeleton.2.UDP: "Following that, the ruling clique of bureaucrats lost power to the UDP, a party of the broad Turkish right. Since coming to office, they've spent their time dismantling, reforming, or reappropriating the monolithic state apparatus the dictatorship left them with. Clearly seeing what German friendship and investment can do for Turkey, their rapprochement with us suggests pragmatic heads have prevailed."
 turkey_faction_skeleton.2.CHP: "Since then, the governing CHP has shed much of its prior dictatorial underpinnings and taken a more reformist bent, carefully opening up the country's economy and civil society. Still, their pragmatic streak has not been lost, as this reconciliation indicates."
 turkey_faction_skeleton.2.Junta: "Since then, the army was forced to intervene in domestic politics, and a military junta organised a new government headed by Nihat Erim. Under immense political pressure and the desire for rapid economic growth, Erim's technocratic government has decided that the Reich can provide what they so dearly lack."
 turkey_faction_skeleton.2.Menderes: "Turkey's President Adnan Menderes capped off a diplomatic trip to the Reich by purchasing a new Volkswagen automobile, saying that many more quality German cars would soon grace Turkish roads. His message to his people has emphasised the economic and consumer benefits a closer relationship with the Pakt would provide."
 turkey_faction_skeleton.3.UDP: "The governing UDP is keen to break with the old regime in diverse ways, including reorienting foreign policy away from Turkey's old European allies. Turkish diplomats have already expressed their enthusiasm for further opening the nation's economy to the goods and investment the Sphere can provide."
 turkey_faction_skeleton.3.CHP: "The governing CHP is undergoing a process of transition and democratisation, keen to move away from the autocratic style of rule the party had practiced since the 1920s. This has also meant that the inefficient and corporatist Turkish economy is opening up, and their alignment with the Sphere offers a great opportunity to take advantage of this."
 turkey_faction_skeleton.3.Junta: "The government headed by Nihat Erim was organised by Turkey's armed forces to restore stability and trust, and have made the calculation that a superpower's friendship will make their fraught task easier. Erim's vision of a technocratic government divorced from party politics, emphasising economic growth and suppression of political extremes has more than a few fans in the Diet."
 turkey_faction_skeleton.3.Menderes: "President Adnan Menderes has led something of a charm offensive, praising the Sphere's anti-imperialist values and its immense economic potential, dreaming of what Japanese finance and innovation could do to Anatolia. For their part, many of the Sphere's large corporations are happy to find such a good business partner in Menderes."
 POLITICS_CEVDET_SUNAY_INTERIM_DESC: "杰夫德特·苏奈的生命轨迹与军营紧密交织。他曾在奥斯曼帝国军队中经历一战烽火，此后土耳其经历的每场战事都刻下了他的身影。败北的滋味，这位老兵品尝过太多次。\n\n大国民议会陷入瘫痪导致埃里姆政府垮台，街头的抗议声浪日益高涨，经济被通货膨胀和信心缺失所吞噬。复苏计划的溃败让总统别无选择，只能扮演钱卡亚宫的临时看管人，静待新选举尘埃落定。那个曾冷静支持军事政变、参与策划全国团结委员会还政于民方案的实用主义者，早就预见这一切改革可能功亏一篑。 \n\n但预判与直面终究不同，惨白天光之下，情形已然变化。"
 TUR_right_kemalist_paragraph_a: "尽管费齐奥卢领导下的共和人民党与此前截然不同，但其对土耳其近五十年的统治在可预见的未来仍会延续。现在该党已重新向右翼靠拢，不过据一些党内政治家称，这只是民粹主义、民族主义和中央集权等凯末尔主义原始价值观的现代表达。无论如何，看来共和人民党还没有彻底失去人民的信任。"
 TUR_right_kemalist_paragraph_b: "自1963年开展自由选举，共和人民党变为反对党以来，该党就逐渐摒弃了威权主义传统，并在费齐奥卢的领导下将党的政治倾向调整为右翼，由比伦特·埃杰维特领导的左翼改革派则分裂出去。如今，强调经济发展、法制建设以及教育改革的共和人民党在竞选中获胜，时隔八年再次掌权，该党渴望在土耳其历史上再次留下浓墨重彩的一笔。"
 TUR_right_kemalist_paragraph_c: "共和信任党的领导层由自比伦特·埃杰维特担任共和人民党主席后分裂出去的右翼成员组成。费齐奥卢在竞选中强调经济发展、法制建设以及教育改革，击败了昔日的同僚，携凯末尔主义向新的十年迈进。"
 TUR_popcon_paragraph_a: "德米雷尔曾任财政部长，在阿德南·曼德列斯下台后，他便一跃成为国家民主党的领导人和土耳其总理。和曼德列斯一样，德米雷尔狂热的民粹主义为他赢得了支持，但也不乏嘲讽之声。土耳其人民纷纷为他们信任的国家民主党投票，希望德米雷尔能够兑现他提出的发展经济的承诺。"
 TUR_popcon_paragraph_b: "德米雷尔拥有工程学背景，还是知名的民粹主义政治家。在萨德丁·比尔吉奇成为国家民主党领导人后，德米雷尔创建了正义党与前者分庭抗礼，二人之间的竞争最终导致国家民主党陷入分裂。如今德米雷尔大权在握，渴望立即将自己的快速工业化和市场自由化改革计划付诸实现。"
 TUR_popcon_paragraph_c: "国家民主党解散后，土耳其右翼中的自由派和民粹派成员共同组建了正义党，德米雷尔本人则负责团结全党上下，遏制党内的派系主义。如今德米雷尔大权在握，渴望立即将自己的快速工业化和市场自由化改革计划付诸实现，使土耳其与西方先进国家接轨。"
 TUR_patcon_paragraph_a: "比尔吉奇自阿德南·曼德列斯下台后一直担任总理，是土耳其右翼中民族主义和伊斯兰主义两股势力间的调和者。这种微妙的平衡是否会持续下去，其中一派的力量又是否会超过另一派，目前都不得而知。比尔吉奇在连任时强调，土耳其是一个有原则的国家，他的使命正是保护国家不受激进主义和恶政治理的影响。"
 TUR_patcon_paragraph_b: "比尔吉奇的竞争对手苏莱曼·德米雷尔在曼德列斯下台后成为国家民主党领袖，此后该党因意识形态路线而分裂，比尔吉奇领导下的民族主义和伊斯兰主义派系组成了民族主义和保守党。如今该党有望执政组建政府，他们将实现竞选时提出的回归传统和建设社会福利国家的口号。由于世俗主义在土耳其的法律体系中根深蒂固，亲宗教的民族主义和保守党恐怕需要谨慎行事。"
 TUR_patcon_paragraph_c: "民族主义和保守党的成员来自曾属于国家民主党的民族主义和伊斯兰主义派系，由比尔吉奇担任两股势力间的调和者。如今该党有望执政组建政府，他们将实现竞选时提出的回归传统和建设社会福利国家的口号。由于世俗主义在土耳其的法律体系中根深蒂固，亲宗教的民族主义和保守党恐怕需要谨慎行事。"