 TUR_Memduh_Tagmac: "梅姆杜赫·塔马奇"
 TUR_Fahri_Koruturk:0 "法赫里·科鲁蒂尔克"
 TUR_Fahri_Koruturk_hog_desc:0 "§Y政府首脑\n凯末尔主义§!\n------------\n§L海军上将科鲁蒂尔克生于1903年，他在军旅生涯中见证了士耳其共和国所经历的几个时代。这个伊斯坦布尔人在世界动荡的三十年中很快享誉盛名。在那段时期，他担任海军武官，远赴旧欧洲各地执行任务，而他的外交言辞也因此变得无比流利。战争的结束为他劈波斩浪的军旅生涯画上了句号，但他却作为驻土耳其盟国的大使而声名显赫。\n伊诺努和墨索里尼约定组建了三头同盟，而他就是在这个矛盾同盟中辗转周旋的老手。科鲁蒂尔克任职总理期间必会让土耳其的目光投向外界，跟那些不可靠的盟友看齐。§!"
 TUR_Cemal_Gursel_sec_desc:0 "§Y安全部长\n凯末尔主义§!\n------------\n§L杰马勒·古尔塞勒于1895年出生在埃尔祖鲁姆，他在土耳其军队的职业经历使之成为唯一一个有可能与总统抗衡的人。第一次世界大战期间他曾在奥斯曼军队服役，并在随后的土耳其独立战争中担任新共和国的民兵，在第二次世界大战期间领导土耳其武装部队。这位老将军是总统内阁中一位能干而受欢迎的成员，受到军民们的崇拜。\n\n到目前为止，他利用这一影响传播了一个信息：\n一支强大而专业的军队，并致力于为土耳其国家以及土耳其人民服务。§!"
 TUR_Ferit_Melen:0 "费里特·梅伦"
 TUR_Ferit_Melen_eco_desc:0 "§Y经济部长\n凯末尔主义§!\n------------\n§L作为在阿塔图尔克革命中成长起来的一代人中的一员，经济部长成为呼吁遵守凯末尔主义原则的呼声最高的人之一也就不足为奇了。费里特·梅伦生于1906年，1931年毕业于安卡拉大学，是国家干预经济的坚定支持者，并且还是凯末尔主义意识形态的“六支箭”之一。作为一名民族主义者和终身公务员，他在塑造现代土耳其经济方面发挥了重要作用；当然，这也使经济部长成为了个两极分化的人物，他同时受到了左派和右派的批评：\n但这些批评只是让他进一步加深了对穆斯塔法·凯末尔思想的认同，并将凯末尔主义中的民族主义部分锤炼成了一种教条式的正统思想。§!"
 TUR_Feridun_Cemal: "费里敦·杰马勒·埃尔金"
 TUR_Feridun_Cemal_for_desc:0 "§Y外交部长\n凯末尔主义§!\n------------\n§L费里敦·杰马勒·埃尔金是总统内阁中一张老面孔。他长期担任大使的经历让这个可靠的外交家在外交部享有很大的名声。经历了土耳其驻日耳曼尼亚大使馆的一段艰苦时日后，费里敦一直呼吁人们在改变国际立场时保持谨慎。作为一个民族主义者内阁中冷静而理性的成员，外交部长的建议毕竟与外国相关，因此经常被采纳。\n尽管如此，费里敦·杰马勒为共和国尽心竭力，留下一笔宝贵的财富，土耳其的重心从德国转向地中海，同时避免了一场所有人都预料到的战争。§!"
 TUR_intro:0 "1962年土耳其现状"
 TUR_itatur_decisions:0 "第二次意土战争"
 TUR_itatur_decisions_desc:0 "终于，是时候让我们收回我们应得的东西了！我们强大的军队正在黎凡特与意大利交手；我们将向这些新来者表明土耳其一直是中东的真正主人。为了战争和荣耀！"
 TUR_invade_cyprus:0 "阿提拉行动"
 turkey_faction_skeleton.1.t: "土耳其政府申请取得OFN伙伴国身份"
 turkey_faction_skeleton.1.d: "土耳其共和国的外交官向我国提出了一项提议——他们申请成为OFN伙伴国。虽然土耳其曾在二战中与德国并肩作战，但过去二十年间，这个近东国家发生了翻天覆地的变化。\n\n[GetTurkeyOFNApplicationParagraph]\n\n抛开意识形态方面的考量，此举明显对双方都大有裨益。美国和其他西方国家的投资，可以进一步促进土耳其的经济多样化。而且由于得到了美国这一超级大国的支持，土耳其对国家安全问题的担忧也能随之缓解。另一方面，土耳其在欧亚之间的重要战略地位也使其成为美国宝贵的盟友。虽然土耳其还没有成为OFN的正式成员，但他们已经坚定地站在了我们的阵营中。"
 turkey_faction_skeleton.1.a: "自由世界又得一分。"
 turkey_faction_skeleton.2.t: "土耳其政府申请取得团结协定观察员国身份"
 turkey_faction_skeleton.2.d: "German and Turkish diplomats have only recently finalized and publicised secret talks between the Reich and the near-east republic, concluding with Turkey becoming an observer member of the Einheitspakt. This has been received as a welcome surprise, as though the Turks joined in our great anti-Bolshevik crusade, relations since the end of the war have been rather cold. The Republic of Turkey instead play-acted friendship with Italy, a foolish endeavor that ended in conflict.\n\n[GetTurkeyPaktApplicationParagraph]\n\nAlthough their civil society still strikes a nominally anti-Nazi pose, Turkey's leaders recognize that we are masters of Europe, as they did in 1942. They get to reap the economic rewards of a closer relationship with Germania, and we benefit from a strategic ally from which to spread our influence in the Middle East. While the Turks are reluctant to become full Pakt members, combining their strength with ours can only benefit us both."
 turkey_faction_skeleton.2.a: "浪子回头金不换……"
 turkey_faction_skeleton.3.t: "土耳其政府申请取得共荣圈观察员国身份"
 turkey_faction_skeleton.3.d: "We've been approached by the Republic of Turkey with a very good offer - an application for observer status in the Co-Prosperity Sphere. While Turkey has been relatively isolated on the geopolitical scene since the collapse of the Triumvirate, it seems they've finally decided to pick a side.\n\n[GetTurkeySphereApplicationParagraph]\n\nAlthough the Turks may have ruled out full membership for the moment, and our relationship with Turkey is less developed than the one we've historically had with their Italian rivals, the bridge of Asia joining the CPS can only enhance our influence in the Middle East and elsewhere in the region. Like wartime friends separated after a long absence, we await what flowers may grow from this bond."
 turkey_faction_skeleton.3.a: "泛亚主义蒸蒸日上！"
