 POLITICS_ISMET_INONU_DESC: "如果说穆斯塔法·凯末尔是土耳其人的父亲，那么伊斯麦特·伊诺努就是土耳其人的教父。他为土耳其指明了一条康庄大道，即使最华丽的辞藻在描述这位国家领导人时也会显得词穷。\n\n伊诺努于1884年出生在士麦那，父亲是库尔德人。从幼年开始，他就面临着一个帝国在他周围崩溃的重压。青年时，伊诺努在也门和鲁米利亚为奥斯曼帝国服役，表现出色，并在穆斯塔法·凯末尔本人的领导下参加了对抗欧洲旧帝国的解放战争。伊斯麦特是一个真正致力于使土耳其民族从哈里发的灰烬中重新崛起的人，他在新的革命卫队中平步青云，直到成为权势不亚于阿塔图尔克本人的副手。\n\n凯末尔尖锐的实用主义和伊斯麦特绝不妥协的意志之间关系一直很紧张，在过去许多的场合迸发出火花。如今，“加齐”已离土耳其人民渐渐远去，许多人声称“老维齐尔”做得太过分了：他把国家出卖给了她的敌人，他违背了土耳其建立的初衷。最重要的是，他玷污了阿塔图尔克的遗产。\n\n在长期担任土耳其共和国总统期间，伊斯麦特·伊诺努一心一意地追求一个目标，即让白手起家的土耳其共和国在这险恶丛生的世界里存续下去。当国家利益要求他与法西斯分子达成妥协时，他服从国家的意志。当局势恶化，导致他不得不动用军队的力量镇压平民时，他会做出艰难的抉择。在过去三十年的艰巨考验中，他一步一个脚印地前进。一路上，他被人打倒在地，在政治斗争中伤痕累累，被侮辱的体无完肤——但他从未被打败过。\n\n今天土耳其共和国屹立于世界，离不开伊诺努个人的政治才干与毫不妥协的意志。这位总统会让土耳其一直伟大下去，不论这要付出何等的代价。"
 TUR_italian_interference:0 "意大利的干涉"
 TUR_economic_stagnation:0 "经济停滞"
 TUR_economic_stagnation_desc:0 "五十年代中期德国经济的崩溃对土耳其产生了深远影响。年轻的共和国的经济原本处于半发达状态，且趋于内向型发展；战后经济的繁荣曾为其注入活力，减轻了战时高昂动员成本所带来的压力。然而，当前的经济环境严重恶化，德国、意大利和其他外国投资者变得更加谨慎，而国内投资又显不足，导致土耳其经济陷入衰退，政治紧张局势也随之加剧。当前亟需推进改革，否则一旦危机爆发，经济形势便会急转直下，演变为自由落体式的崩溃……"
 TUR_italo_turkish_tension:0 "意土紧张局势"
 TUR_italo_turkish_tension_desc:0 "三头同盟已经走到了末路，而曾经“精诚合作”的前盟友们正为这一各不情愿的同盟的解体而欢呼雀跃。随着意土这对前盟友的关系降到冰点，一些土耳其民族主义政客开始重申其对黎凡特、塞浦路斯和罗得岛的宣称，以期煽动民族情绪并换取民众对自己的支持。\n\n有人对民族主义的重新抬头深感担忧，甚至感到恐惧。毕竟，尽管看似即将黔驴技穷，意大利现在仍然是地中海的霸主，又有谁能确保他们不会重拾战斗的信念呢？"
 TUR_inspectorate_generals: "总督察区"
 TUR_inspectorate_generals_desc: "总督察区是直属于共和国总统的机构，旨在平定地区动荡，并在下辖地域推行土耳其化政策，尤其是该国的东部地区。二战结束后，政府先后在叙利亚和伊拉克北部新设了两个总督察区，而后者由于加入时间较晚，因此享有更大的自治权利。尽管在官方口径中，社会普遍赞扬其带来的稳定，然而不论是当地民众还是安卡拉的政要，大多都将其认定为一种压迫手段。\n\n骚乱和抗议正在各个总督察区愈演愈烈，改革势在必行，但它带来的变化是好是坏，没人能够说清……"
 TUR_Ismet_Inonu: "伊斯麦特·伊诺努"
 TUR_Celal_Bayar: "杰拉勒·拜亚尔"
