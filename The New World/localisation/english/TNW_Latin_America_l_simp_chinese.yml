 LATAM_news.84.b: "曾经令人骄傲的国家堕入深渊。"
 LATAM_news.84.c: "小国家做出大改变。"
 LATAM_news.228.t: "[Get_newspaper_header]巴西军事演习“西斯普拉蒂纳70”取得成功"
 LATAM_news.228.desc: "在南美冷战持续发酵之际，巴西近期举行的大规模军事演习为其在这场博弈中赢得了显著优势。巴西及其盟友组织的这场名为“西斯普拉蒂纳70”的军事推演以阿根廷为假想敌。卡洛斯·拉塞尔达总统在最新的演讲中宣布演习取得了辉煌的成功。\n\n在此次演习过后，巴西最新民意调查显示全民盟的支持率一路飙升，巩固了拉斐尔·马加良斯作为拉塞尔达继任者的地位。耐人寻味的是，国际观察家还注意到阿根廷在演习结束后对巴西的态度有所软化，普遍认为阿方很快将尝试与巴西开启谈判，以缓和地区紧张局势，并恢复到冷战前的双边关系。"
 LATAM_news.228.a: "那些阿根廷人总算学会懂礼貌了。"
 LATAM_news.229.t: "[Get_newspaper_header]乌拉圭加入自由国家组织"
 LATAM_news.229.desc: "大平原的门户最终牢牢握在了美国手中：在与美国政府进行一系列谈判之后，乌拉圭东岸共和国已同意加入自由国家组织。\n\n许多人并不对此感到奇怪。二十年来，东岸共和国与美国长久维持着盟友关系，在拉古纳-德尔绍塞设有军事基地，还在南极洲打击纳粹的南十字星行动中协助过OFN。\n\n蒙得维的亚则对事态发展的反应不一。支持大西洋主义的红党公开庆祝这一事态发展，认为这是巴特列主义反法西斯传统的延续；埃雷拉主义者将之谴责为美帝国主义行径，是对祖国的背叛；左派则发生了分裂，国际主义者相当满意，民族主义者却表现出了质疑与反对。\n"
 LATAM_news.229.a: "埃雷拉要被气活了。"
 LATAM_news.230.t: "[Get_newspaper_header]南大西洋战争"
 LATAM_news.230.desc: "阿根廷和巴西之间持续多年的紧张局势近来不断升级，对于数百万人而言，曾经不可想象的事物已经变成了可怕的现实：战争已经爆发。两国都出现了反战抗议活动，呼吁本国人民不要投身于“毫无意义”的战争。作为回应，两国政府都颁布了戒严令，公民自由受到诸多限制。\n\n两国都指责是对方挑起了战争，而对大多数人来说，战争缘何而起已经成谜，但随之而来的影响已经愈发明显。两国股票市场一落千丈，附属国的经济分崩离析。\n\n世界各国领导人纷纷呼吁和平，地球正站在悬崖边上，核战爆发的威胁与日俱增。\n"
 LATAM_news.230.a: "秩序与进步将会战胜野蛮。"
 LATAM_news.231.t: "[Get_newspaper_header]巴西赢得南大西洋战争"
 LATAM_news.231.desc: "在[BRA.GetLeader]总统宣布了南大西洋战争的胜利后，军队穿行在巴西各城市的大街小巷中，人民把他们当作回乡的英雄一般欢迎。民意调查显示政府支持度飙升，国民情绪异常高涨，通常不安分的军方也表现的十分满意。\n\n阿根廷的景象却截然不同。国家一片混乱，[ARG.Getleader]总统关于丧权辱国的《蒙得维的亚条约》的声明遭到了一片嘘声。\n\n一国展翅腾飞，一国堕入深渊。国际观察家们预测巴西在南美大陆的霸权地位未来将无人挑战。\n"
 LATAM_news.231.a: "秩序与进步!"
