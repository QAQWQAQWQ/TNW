 LATAM_news.206.f: "另一个国家很快就将拿起枪……"
 LATAM_news.207.t: "[Get_newspaper_header]玻利维亚革命被镇压"
 LATAM_news.207.desc: "许多人曾怀疑玻利维亚政府在前几个月席卷全国的骚乱中还能否苟延残喘。然而，在巴西的有力支援和残酷的反游击作战下，奥万多将军的政权在矿石战争中占据了上风，在拉巴斯失败后，革命民族主义运动和长枪党由于缺乏玻利维亚社会各界的支持，无法再掀起波澜。尽管大多数叛乱分子已被镇压，但政坛仍然动荡不安。\n\n不同于圣地亚哥和布宜诺斯艾利斯的谴责，巴西对奥万多将军的政权表示祝贺，并承诺将为重建工作提供资金支持。奥万多巩固自己的权力后，他向全国发表讲话，保证若秩序恢复，定将重建民主。他的诺言是否可信仍待观察。\n"
 LATAM_news.207.a: "我们盼望新政府能比前任少些麻烦。"
 LATAM_news.208.t: "[Get_newspaper_header]长枪党在玻利维亚掌权！"
 LATAM_news.208.desc: "历经漫长的纷争，矿石战争终于落下帷幕。当拉巴斯的硝烟逐渐散去，玻利维亚社会主义激进组织长枪党胜利的消息随之传开。据报道，玻军与革命民族主义运动的武装力量被迫撤出首都，长枪党则如“向罗马进军”一般进入拉巴斯，正式夺取了政权。这一派别凭借全国上下对现状不满的支持浪潮，迅速崛起并宣布了效仿法西斯政权的全面改革计划。在全国广播中，长枪党领袖、查科战争英雄贝尔纳迪诺·毕尔巴鄂·里奥哈将军宣告“腐朽旧秩序的终结”，承诺“治愈国家被污染的灵魂”。\n\n尽管外界观察者指出，这一局面离不开智利的幕后支持，但智利政府迄今为止仅呼吁各方保持谨慎，并未发表正式祝贺。此次政权更迭震惊了整个玻利维亚，也令许多人对玻利维亚的未来和整个南美大陆的地缘政治前景充满疑虑。\n"
 LATAM_news.208.a: "南美法西斯的新落脚点？"
 LATAM_news.209.t: "[Get_newspaper_header]革命民族主义运动之治重归玻利维亚"
 LATAM_news.209.desc: "矿石战争终于宣告结束。革命民族主义运动成功击退了他们的对手，并夺取了权力。独裁者奥万多流亡巴西，前玻利维亚领导人瓜尔韦托·比利亚罗埃尔受邀请从阿根廷归国，并正式宣誓就任新一任总统。在随后举行的支持者集会上，比利亚罗埃尔发表讲话，宣布将重启其之前执政期间实施的重大改革措施，包括工业国有化和经济发展承诺。这些政策的宣布表明，他计划重振玻利维亚并延续其发展主义议程。\n\n以重新阐释军事社会主义思想而闻名于整个大陆的比利亚罗埃尔，已成功吸引了一批民族主义者和左翼人士的关注，他们对这一实验的后续发展充满期待。与此同时，革命民族主义运动内部的派系斗争有加剧之势，但比利亚罗埃尔在阿根廷方面的联系人相信，他能够顺利掌控局势，不会出现任何问题。"
 LATAM_news.209.a: "玻利维亚自己的庇隆。"
 LATAM_news.210.t: "[Get_newspaper_header]玻利维亚乱局，革命爆发！"
 LATAM_news.210.desc: "矿石战争迎来高潮，尚无任何一方能够宣称胜利，而玻利维亚的工人与劳动者们已将命运掌握在自己手中，在工会的支持下宣布发动革命。\n\n革命民族主义运动的左翼通过工会成功掌控了这场运动，并与军队中的改革派达成协议：军方支持成立一个人民大会（批评者称其为“苏维埃”），作为交换，左翼同意共享权力，以避免彻底的马克思主义革命。\n\n革命民族主义运动左翼领导人、玻利维亚工运领袖莱钦令外界意外地拒绝担任总统，转而亲自执掌人民大会。取而代之被任命为总统的是刚刚晋升的胡安·何塞·托雷斯将军。这一安排似乎旨在安抚军方，但也有人认为，莱钦不过是扶植了一个傀儡，以便自己操控政权。\n"
 LATAM_news.210.a: "一场革命，抑或另一个谎言？"
 LATAM_news.222.t: "[Get_newspaper_header]卡宴公投宣布独立"
 LATAM_news.222.desc: "在一场结果几乎毫无悬念的公投中，卡宴地区正式选择脱离巴西独立。独立运动领袖朱斯坦·卡塔耶被广泛认为将在美洲国家组织托管结束后，成为这个新国家的首任总统。\n\n公投结果公布后，圭亚那民众兴奋异常，首都街头洋溢着狂欢的气氛。与之形成鲜明对比的是，该地区内的巴西籍居民和商人则对独立表达了强烈反对。\n\n此次公投的背景可追溯至圭亚那长期以来的制度性暴力指控，尤其是在朱斯坦·卡塔耶遭遇暗杀未遂事件后，独立呼声迅速高涨。国际观察人士普遍认为，此次事件将对巴西的国际声望以及其在南美洲的影响力造成重大冲击。\n"
 LATAM_news.222.a: "令人失望的结果。"
 LATAM_news.222.b: "一次自由、公正的公投。"
 LATAM_news.222.c: "一个新国家登上了世界舞台。"
 LATAM_news.223.t: "[Get_newspaper_header]圭亚那-卡宴公投加入巴西"
 LATAM_news.223.desc: "在一场出人意料的公投中，卡宴人民决定加入巴西，而非追求独立。这一结果令观察人士震惊，此前独立运动领袖朱斯坦·卡塔耶遭遇暗杀未遂事件，以及巴西企业在该地区的长期压迫历史，都曾被认为会推动独立选项胜出。\n\n公投结果引发了广泛抗议，许多圭亚那居民呼吁美洲国家组织重新举行公投。然而，OAS主席在声明中表示，未发现任何干扰民主程序的迹象，并称有关选举舞弊的指控是“毫无根据的谣言”。巴西总统[BRA.GetLeader]则呼吁巴西人与圭亚那人民团结一致，共同迈向共享未来的新篇章。"
 LATAM_news.223.a: "正如所料。"
 LATAM_news.223.b: "一次自由、公正的公投。"
 LATAM_news.223.c: "一如既往，大国将小国玩弄于股掌。"
 LATAM_news.224.t: "[Get_newspaper_header]巴西吞并圭亚那-卡宴"
 LATAM_news.224.desc: "巴西合众国政府正式宣布成立最新行政区——卡宴州。\n\n该州由原巴西保护领圭亚那-卡宴地区构成，其成立获得了美洲国家组织与自由国家组织的联合背书。\n\n巴西外交部援引国会议员们的支持声明称，此次领土整合“实现了巴西民族的百年夙愿”，是“巴西人民对主权问题的民主意志体现”。"
 LATAM_news.224.a: "终于。"
 LATAM_news.225.t: "[Get_newspaper_header]卡宴公投结果引发争议"
 LATAM_news.225.desc: "卡宴地位公投正式落幕，巴西似以胜者姿态自居，巴西利亚欢庆之声不绝于耳。然而，胜利之言或为过早之论。\n\n公投结果已然引发巨大的社会争议。多家国际监督组织对此次公投的合法性提出严重质疑。据悉，投票期间选民受到威胁、投票权覆盖不足及选举舞弊等现象频频出现。对此，美洲国家组织已正式提出外交抗议，并宣布将在近日启动全面调查程序。支持卡宴并入巴西者则高声斥责，称此举意在破坏民主。然而，公投最终结果是否成立，尚需时日方可见分晓。"
 LATAM_news.225.a: "只有时间会证明一切。"
 LATAM_news.226.t: "[Get_newspaper_header]巴西在卡宴独立公投中失败"
 LATAM_news.226.desc: "根据美洲国家组织官方确认，圭亚那-卡宴独立公投经重新计票，巴西仍然失利。此前，美洲国家组织因接到有关此次公投中存在广泛且系统性选票造假的指控，决定取消最初的公投结果。最终结果表明，反独立方在公投中以明显劣势落败。\n\n鉴于这一民意走向的戏剧性转变，美洲国家组织正在考虑下令撤回所有驻扎当地的巴西军队，并部署维和人员进驻。\n\n因公投中的丑闻，卡宴爆发了抗议和暴力事件，骚乱席卷全城。"
 LATAM_news.226.a: "真混账！"
 LATAM_news.226.b: "民主在行动。"
 LATAM_news.227.t: "[Get_newspaper_header]卡宴独立"
 LATAM_news.227.desc: "在美洲国家组织领导下的权力交接结束后，全世界都在欢迎一个崭新的国家登上历史舞台。新生的卡宴共和国在紧张的独立公投后终于同巴西合众国体面离婚，能够在她的第一任民选总统朱斯坦·卡塔耶的带领下决定自身命运了。\n\n共和国首都的街道上，支持独立的人潮此起彼伏、欢呼雀跃。而巴西政府中的许多人却在默默为失去一个同阿根廷冷战的支柱而伤心，并试图把这个新政府变成傀儡。无论如何，卡宴今天举世瞩目。"
 LATAM_news.227.a: "这对他们是个好消息！"
 LATAM_news.228.b: "巴西万岁！"
 LATAM_news.228.c: "一场为美利坚献上的暴徒式凯旋表演。"
 LATAM_news.228.d: "枪杆子里出和平。"
 LATAM_news.230.b: "让我们祈祷上帝与巴西同在。"
 LATAM_news.230.c: "五月太阳的光辉不会暗淡。"
 LATAM_news.230.d: "飞蛾扑火。"
 LATAM_news.230.e: "无论何方得胜，无产阶级都是输家。"
 LATAM_news.230.f: "以静制动。"
 LATAM_news.231.b: "正义得胜！"
 LATAM_news.231.c: "恭喜美国后院的看门狗。"
 LATAM_news.231.d: "秩序和进步建于尸山血海之上。"
 LATAM_news.232.t: "[Get_newspaper_header]阿根廷赢得南大西洋战争"
 LATAM_news.232.desc: "在布宜诺斯艾利斯、科尔多瓦、和其他一切阿根廷人居住之地，成百上千的五月太阳旗飘扬在街头，庆祝着南大西洋战争的胜利。随着亚松森条约的正式签订，阿根廷成为了南美洲的霸主。\n\n巴西境内，局势一片混乱。亚松森条约公之于众后，[BRA.GetLeader]总统在一片嘘声中下台。经济陷入低谷，抗议变得司空见惯，军方承诺全力恢复秩序，但大多数人怀疑他们代行总统时所拥的职权非常有限。\n\n当巴西陷入萧条中时，阿根廷则进入了自一战后就再未曾有过的黄金年代。失去了巴西这一地区强权的帮助，美国在南美洲的影响将在接下来的数年内大幅下滑。\n"
 LATAM_news.232.a: "秩序与进步挥手告别南美，遁入尘烟之中"
 LATAM_news.232.b: "自由世界的光辉暗淡了颇多。"
 LATAM_news.232.c: "从强权的重压中解放。"
 LATAM_news.232.d: "尸山血海带来的胜利。"
 LATAM_news.233.t: "[Get_newspaper_header]南大西洋战争陷入僵局"
 LATAM_news.233.desc: "自战争爆发以来，巴西与阿根廷之间便僵持不下。最终，两国政府进行了秘密会谈，达成了一纸苦涩的和平，维持原状。几周之前，双方开始谨慎地缓解冲突，最终在秘密会谈中达成了“光荣和平”。\n\n两国人民对和平的反应各不相同。许多民众张灯结彩，庆贺这份和平协议结束了一场徒劳无功的流血冲突，为着不会再有更多同胞的牺牲喝彩；另一些人则批评这份协议白费了士兵们的鲜血，持这一观点的大多是退伍军人。\n\n全世界，祝贺和平的声明如雪片般飞来，庆幸着末日时钟离午夜又远了一格。\n"
 LATAM_news.233.a: "一场不明就里的战争。"
 LATAM_news.233.b: "它原本会变得更糟。"
 LATAM_news.233.c: "无从得到，无所失去。"
 LATAM_news.233.d: "至少今年不会有核冬天了。"
 LATAM_news.234.t: "[Get_newspaper_header]OFN干预南大西洋战争"
 LATAM_news.234.desc: "今日，全球局势濒临深渊。巴西总统卡洛斯·拉塞尔达呼吁整个OFN直接介入南大西洋战争，站在巴西一方作战。在近期的一次演讲中，拉塞尔达声称，作为军事联盟的一员，巴西拥有天然的权利要求其“自由世界的盟国”伸出援手。\n\n毫无意外，这一声明使得本已高度紧张的战争局势进一步升级。美国似乎准备响应这一请求，而此举迅速招致共荣圈与团结协定的联合声明谴责，称之为“美国无节制的侵略行径”。国际观察人士纷纷猜测，这是否会成为其他两大超级大国直接干预、支持阿根廷的契机，从而引发冷战升级为热战，给全世界带来灾难性后果。\n"
 LATAM_news.234.a: "恨我们吧，看看我们是否会在意……"
 LATAM_news.234.b: "再次向缺口冲去吧……"
 LATAM_news.234.c: "他们终将为此付出惨痛代价……"
 LATAM_news.234.d: "承诺之重，岂值末日烟火？"
 LATAM_news.235.t: "[Get_newspaper_header]南美核交换"
 LATAM_news.235.desc: "令人震惊的消息传出，今晨南美大陆发生了多起核爆事件。目前尚无法确认导弹发射方身份及具体打击坐标，唯一能证实的是被打击对象均为军事设施。\n\n尽管国际社会对此次核打击的实施者予以强烈谴责，但地区紧张局势似乎难以因此缓解。随着战争罪行和恐怖战术成为常态，战场已无任何交战规则可言。据报道，军队逃兵现象正在大规模蔓延，当局已向平民发布核战争避难指示。\n\n子夜将至，无可避免。"
 LATAM_news.235.a: "我方必须胜利。"
 LATAM_news.235.b: "上帝啊……"
 LATAM_news.235.c: "他们不懂克制吗？"
 LATAM_news.235.d: "毫无人性……"
 LATAM_news.236.t: "[Get_newspaper_header]自由党的古斯塔沃·冈萨雷斯赢得巴拉圭选举"
 LATAM_news.236.desc: "在毫无悬念的选举中，古斯塔沃·冈萨雷斯成为巴拉圭总统。这位查科战争时期的军医既是受民众欢迎的花瓶领袖，也是自由党内部达成一致的候选人。\n\n他的上台，意味着自由党避免强人政治的共同努力达到顶峰。即将离任的总统、战争英雄阿尔弗雷多·拉莫斯最初寻求连任，但由于党内官员对第二个莫里尼戈将军的担忧，他放弃了竞选。不过作为妥协，拉莫斯被允许保留军队职衔，这使得他在新政府依然很有话语权。"
 LATAM_news.236.a: "自由党坚持下来了，但巴拉圭的自由主义能坚持下来吗？"
 LATAM_news.136.b: "模仿是最真诚的奉承。"
 LATAM_news.137.b: "将军得到了我们最诚挚的祝福。"
 LATAM_news.138.b: "寡头吃饱，\n拉美人民跌倒。"
 LATAM_south_atlantic_war.10.t: "终将自食恶果"
 LATAM_south_atlantic_war.10.desc: "[BRA.GetLeader]将[BRA.GetLeader.GetHerHim]手中的演讲稿又理了一遍，确保一切准备就绪。这场全国讲话要求[BRA.GetLeader.GetHerHim]在诚恳与激昂间找到完美平衡。[BRA.GetLeader.GetSheHe]向摄制组发出信号，开始倒数：三、二、一。红光亮起的刹那，全巴西的电视剧与广播剧统一切换成紧急通告。\n\n“巴西同胞们。”[BRA.GetLeader.GetSheHeCap]开口道，“我是总统。很抱歉打断各位的日常安排。大约两天前，我获悉阿根廷当局对我方动用了核武器。”[BRA.GetLeader.GetSheHeCap]停顿片刻，“消息属实。敌人已摧毁数个军事目标，所幸目前尚未波及平民区。”\n\n[BRA.GetLeader.GetHerHis]将演讲稿轻轻搁在桌面，直视镜头。“此等野蛮行径，正是阿根廷政府怯懦本性的写照。不仅无耻进犯我们伟大的祖国，如今更是堕落到践踏人类文明底线。”盛怒之下，[BRA.GetLeader.GetHerselfHimself]脖颈青筋浮动，他深吸一口气，才继续说道：\n\n“但这点挫折动摇不了我们。他们之所以如此丧心病狂，正是因为走到了穷途末路。困兽总要垂死挣扎，而这将是我们全面反击的号角。作为总统，我已向军队下达指令……”"
 LATAM_south_atlantic_war.10.a: "“……动用核武器抹去阿根廷的数个军事基地。”"
 LATAM_south_atlantic_war.11.t: "因果轮回"
 LATAM_south_atlantic_war.11.desc: "演讲当天是个令人昏昏欲睡的阴郁天气。连阳光都显得平庸，随意挥洒在总统肩头。正如这天气一般，[Root.GetLeader]正机械地作着演讲——为避免过于生硬，他在照着稿子逐句宣读时，仍会不经意流露些许个人特质。\n\n听到脚步声接近，总统从讲台转过身，侧耳倾听助手的低语，权当给喉咙片刻喘息。实际上真正的喘息远未到来，布满血丝的眼睛对视的瞬间，世界从此天翻地覆。\n\n核武器。这本该与政治绝缘的词汇，此刻却从口中讲出。阿根廷对巴西先发制人的打击展开报复，袭击了关键目标（万幸不是民用设施）。虽说出兵时早有预料，可这消息仍犹如一记重击，震得五脏六腑都在颤抖。\n\n有那么片刻，二人双肩低垂，胸口发紧。但在人群察觉异样之前，总统已挺直脊背，换上威严而亲和的面孔——除了继续演讲还能如何？台下听众唯一看见的变化，只有[Root.GetLeader]的指节因攥得太紧而发白。\n\n演讲的收尾句比先前任何词句都更慎重，却也透出更浓重的不祥气息：“无论面对何等劫难，巴西与她的人民终将屹立不倒。我们将战斗，战斗到最后一刻。”"
 LATAM_south_atlantic_war.11.a: "不过一句空言。"
 LATAM_news.32.b: "这让我们在这个地区的工作变得麻烦多了。 "
 LATAM_news.32.c: "美国又多了个走狗。"
 LATAM_news.32.e: "很高兴巴西加入！"
 LATAM_news.32.f: "OFN现在拥有一大半南美洲。"
 LATAM_news.188.b: "他的改革稳固了巴西，而我们将使她更加强大！"
 LATAM_news.188.c: "他的改革筑下了地基，如今要缔造为人人的巴西！"
 LATAM_news.188.d: "我们做了必要之事，安息吧，老朋友……"
 LATAM_news.188.e: "他胸怀远见，擘画蓝图；让我们行动起来……"
 LATAM_news.237.t: "[Get_newspaper_header]圣克鲁斯的民族左翼运动革命"
 LATAM_news.237.desc: "国民左翼运动已经控制了圣克鲁斯地区，该运动的支持者主要是在当地的石油繁荣中被边缘化的群体，以及深受住房危机困扰的愤怒民众。自宣布独立、联合民族解放阵线推翻当地的保护者巴拉圭政府以来，圣克鲁斯一直处于动荡之中。\n\n玻利维亚革命民族主义运动圣克鲁斯分支的左翼领袖路易斯·桑多瓦尔·莫龙在圣克鲁斯市政府大楼发表讲话，宣布所有曾与巴拉圭合作的人都将面临审判。流亡的富裕阶层确认这些威胁句句属实，他们曾亲眼目睹邻居遭到处决或莫名失踪。"
 LATAM_news.237.a: "艰难时期需要坚强的人。"
 LATAM_news.238.t: "[Get_newspaper_header]阿德马尔·德·巴罗斯去世"
 LATAM_news.238.desc: "深受爱戴的圣保罗前州长、社进党领袖阿德马尔·德·巴罗斯于今晨在不明情况下被宣告死亡。这位曾以反叛者姿态挑战1965年总统大选的政治人物，是一位公认充满活力的民粹主义者，过去数十年间在巴西政坛享有崇高威望。\n\n现任总统卡洛斯·拉塞尔达已发布官方声明，称颂这位州长的“卓越成就”，并誉其为“伟人”。然而，拉塞尔达与阿德马尔之死有关的传言依然四处流传。许多人指出，总统此前对阿德马尔阵营的敌视态度可能是两者间的关联，但目前尚无实质性的证据。"
 LATAM_news.238.a: "和平从来不是一个选择。"
 LATAM_news.239.t: "[Get_newspaper_header]瓜纳巴拉当局崩溃"
 LATAM_news.239.desc: "为回应巴西总统卡洛斯·拉塞尔达在其钦定继任者拉斐尔·马加良斯遭绑架失踪后发动的反左翼镇压行动，左翼反抗团体以抗议联邦政府专制行径为由，占领了多处行政设施。  \n\n目前联邦警察与武装力量均无力恢复秩序——由于拉塞尔达精心栽培的继承人失踪，巴西利亚当局似乎正陷入内部危机，安全部门尚未收到明确指令。与此同时，动荡的北部地区正因阿马佐纳斯集团声势日隆而濒临革命。"
 LATAM_news.239.a: "乌鸦飞得太靠近太阳了。"
 LATAM_news.240.t: "[Get_newspaper_header]若泽·平托于巴西内战中就职"
 LATAM_news.240.desc: "随着阿马佐纳斯与布里佐拉领导的左翼叛军在东北部和南部发动起义，南美各国的目光纷纷聚焦于卡洛斯·拉塞尔达总统。\n\n国家由若泽·德·马加良斯·平托接管，各方期待这位更为温和的总统能够重整河山，带领支离破碎的巴西中央政府走向胜利。\n\n正如其死敌热图利奥·瓦加斯一样，拉塞尔达无疑在巴西历史上留下了沉重一笔。毫无疑问，他的政治遗产必将与混乱与流血相伴相生。"
 LATAM_news.240.a: "巴西前路黯淡。"
 LATAM_news.241.t: "[Get_newspaper_header]巴西中央政府赢得内战"
 LATAM_news.241.desc: "马加良斯·平托宣布，先前被视为军方傀儡的巴西中央政府已成功平定导致国家内战的各方叛乱势力，包括一开始发动叛乱的左翼分子，以及后来反叛平托政府的军方强硬派势力。\n\n分析人士普遍预测，随着政权巩固，巴西当局将逐渐粉碎一切残余抵抗势力，针对左翼和其他反对派的镇压将大幅升级。"
 LATAM_news.241.a: "革命之火已经熄灭。"
 LATAM_news.242.t: "[Get_newspaper_header]共产党赢得巴西内战"
 LATAM_news.242.desc: "近期从巴西传来的消息表明，若昂·阿马佐纳斯已掀起一场革命，并宣告巴西人民共和国成立。不过，在战胜中央政府及军队强硬派残余势力之余，巴西民生及基建方面同样损失惨重。\n\n据华盛顿与其余南美国家谨慎观望，今后数年人民共和国可能面临一场苦战。阿根廷担心邻国彻底倒向共产主义，因此占领了南里奥格兰德州充作缓冲区。两国间的战争似乎在所难免。"
 LATAM_news.242.a: "和平依然遥不可及。"
 LATAM_news.243.t: "[Get_newspaper_header]拉斐尔·马加良斯当选巴西总统"
 LATAM_news.243.desc: "计票结果显示，拉斐尔·马加良斯和全民盟已经赢得1970年巴西总统大选。马加良斯被视为拉塞尔达门徒、全民盟拉塞尔达派系的接班人，在党内温和派中他的强硬自由派立场独树一帜。\n\n就任总统后，马加良斯维持全民盟执政地位的过程将面临诸多挑战，首要是化解石油危机的余波。这位新总统究竟是会萧规曹随，还是改弦更张，历史即将揭晓答案。"
 LATAM_news.243.a: "火炬传递了下去。"
 LATAM_south_atlantic_war.9.t: "他们的人出卖了世界"
 LATAM_south_atlantic_war.9.desc: "这件西装在米格尔起伏不定的胸膛上绷得发紧。一份文件他的手中紧紧握着。上头的命令通过加急传真层层转递，最终抵达他的案头。他已召集了紧急会议，基地要员正在火速集结，但时间仍在流失。\n\n当米格尔手上的文件砸向会议桌，这些头头脑脑们立马分为几种特定神态的人群：神情紧绷的科学家、疲惫不堪的军方代表、满面倦容的行政官员。“诸位，”米格尔喉结滚动，\"总统密令要求我们对阿根廷实施先发制人的核打击，首轮攻势将由本基地发射井启动，目标是西北要害军事枢纽——\"\n\n这就是他在人群陷入争吵之前所能传达出的全部信息了，军人们振臂高呼，催促立即执行攻击程序；科学家们血色尽失，恳求他再次确认总统的决心，毕竟报复性反击必将接踵而至。米格尔的太阳穴突突直跳，冷汗浸透了衬衫领口。\n\n官僚行列中一位老者站起身来，他举起右手向上示意，房间暂时陷入沉默。“诸位同僚，”他沉声道，\"这道命令确实丑陋。但我们必须承认，即便按兵不动，阿根廷的导弹早晚也会破空而来。\"他枯瘦的手指叩击桌面，\"抢占先机，或许能为我们的祖国挣得一线胜利。\"说罢他颓然跌坐，真皮座椅发出不堪重负的呻吟。"
 LATAM_south_atlantic_war.9.a: "一人平静之言，众生狂舞失聪。"
 LATAM_Andean_Treaty: "安第斯协定"
 LATAM_news.209.b: "在人民的力量面前，外国暴政不值一提。"
 LATAM_news.209.c: "国家回到了玻利维亚人手中，再无反复，无可置疑。"
 LATAM_news.216.b: "这不是什么值得骄傲的事情。"
 LATAM_news.217.b: "巧妙的时机……"
 LATAM_news.218.b: "女人对男人的爱、男人对国家的爱——二者都可能会招来死亡。"
 LATAM_news.237.b: "多米诺骨牌一个接一个倒下。"
 LATAM_news.244.t: "[Get_newspaper_header]救国委员会赢得内战"
 LATAM_news.244.desc: "救国委员会宣布赢得巴西内战的消息让巴西民众陷入恐慌。这鱼龙混杂的强硬派军官团已彻底撕下文官政府的无用伪装，随即展开血腥无比的镇压清洗，全国各地不断传出非法拘禁与处决的报道。\n\n新巴西的未来似乎要与暴政和国际孤立为伍，世界各国惊恐地注视着新政府的所作所为：它注定要沦为国际弃儿。"
 LATAM_news.244.a: "他们管这叫“救国”？"
 LATAM_news.245.t: "[Get_newspaper_header]布里佐拉游击队赢得巴西内战"
 LATAM_news.245.desc: "近来，巴西传来了令人惊讶的消息，尽管阿马佐纳斯革命派已经战败，但布里佐拉却在与中央政府和军方强硬派的斗争中赢得了胜利。巴西的复兴之路任重而道远，大部分国土沦为废墟，人民伤痕累累。\n\n尽管布里佐拉比阿马佐纳斯更为温和，但华盛顿仍对他的新政府持谨慎态度，而其他南美国家则表示了祝贺，因为内战中的持道义一方似乎赢得了胜利。"
 LATAM_news.245.a: "复苏之路愈发漫长。"
 LATAM_news.246.t: "[Get_newspaper_header]阿根廷加入美洲国家组织"
 LATAM_news.246.desc: "在华盛顿特区举行的美洲国家组织紧急会议上，一场令人瞠目结舌的地缘政治剧变正在上演。由于巴西意外弃票，经过双方势均力敌的投票表决之后，同意阿根廷以不具有投票权的观察员身份临时加入美洲国家组织。\n\n这一决定在会场立即引发了激烈争论，尤其是智利代表团发表了一通慷慨陈词——他们在演讲的高潮揭露了阿根廷对南极温克岛与阿德莱德岛的袭击行径，使整个会场为之震动。\n\n有评论指出，巴西之所以默许宿敌加入，不排除是美国在背后施加了政治运作。"
 LATAM_news.246.a: "睁一只眼闭一只眼吧。"
 LATAM_news.246.b: "打理后院免不了要除草。"
 LATAM_news.246.c: "美国对拉美的横加干涉。这都什么年代了？"
 LATAM_news.247.t: "[Get_newspaper_header]美洲国家组织批准入侵共产主义巴拉圭"
 LATAM_news.247.desc: "在华盛顿特区举行的美洲国家组织紧急会议经过激烈表决后，阿根廷和巴西获得授权，联合向巴拉圭发起入侵，推翻其共产主义政权。\n\n尽管巴拉圭共产党最近在所谓的“丛林战争”中战胜了国内的法西斯主义者与自由派，但其尚未完全巩固对首都亚松森和广大内陆地区的控制。因此，大多数观察家并未认真看待总统奥斯卡·克雷特向这两个实力远超自身的军事强国发出的“全面战争”威胁。与此同时，借机发难的玻利维亚已趁机占领了存在争议的查科地区，直到受到巴西和阿根廷的军事威胁以及美洲国家组织的谴责后，才停止了进一步推进。"
 LATAM_news.247.a: "只有共产主义的威胁才能使他们团结起来。"
 LATAM_news.247.b: "帝国主义列强们别无选择。"
 LATAM_news.248.t: "[Get_newspaper_header]美洲国家组织部队占领巴拉圭"
 LATAM_news.248.desc: "美洲国家组织宣布，其旨在推翻巴拉圭共产主义政权的干预行动已获成功。尽管巴拉圭共产党组织军队进行了顽强抵抗，但包括奥斯卡·克雷特在内的大多数高级领导人，都在亚松森的战斗中丧生。著名游击队领袖埃内斯托·“切”·格瓦拉未被抓获，据信他已逃入乡野。\n\n美洲国家组织公布了占领当局架构的相关计划：美洲国家组织维和部队将驻守首都保护过渡政府，而巴西和阿根廷则各自负责在与自己边境接壤的区域恢复秩序。"
 LATAM_news.248.a: "五年的租借。"
 LATAM_news.249.t: "[Get_newspaper_header]阿根廷与巴西撤军，共产主义巴拉圭得以存续"
 LATAM_news.249.desc: "巴西与阿根廷军队在巴拉圭边境经历一段紧张对峙后，现已各自返回军营。尽管两国都意图推翻亚松森的新共产党政权，却因彼此猜忌而未能达成联合军事行动。此前对峙的情况一度引发外界担忧：巴西利亚与布宜诺斯艾利斯怕不是要借此机会打个不可开交。\n\n密集的外交斡旋使双方在战争边缘悬崖勒马，也让巴拉圭的共产主义政权意外幸存下来。巴拉圭领导人奥斯卡·克雷特高度赞扬本国人民面对两大敌对军事强国时表现出的勇气，并承诺将利用这幸运的机会，继续为广大瓜拉尼农村群众实施激进改革。\n"
 LATAM_news.249.a: "起码我们挡住了阿根廷军队，没让他们逼近边境。"
 LATAM_news.249.b: "赤色分子也好过巴西人。"
 LATAM_news.249.c: "猫咪嘶叫时，老鼠早已逃脱。"
 LATAM_news.250.t: "[Get_newspaper_header]阿根廷与巴西同时入侵巴拉圭"
 LATAM_news.250.desc: "阿根廷与巴西在相隔不到一小时的时间内，相继向巴拉圭共产主义政府宣战。尽管巴拉圭总统奥斯卡·克雷特誓言要保卫革命，直至战到最后一人，但巴拉圭领土狭小、先前曾遭丛林战争摧残且缺乏外部援助，外界普遍认为其很快就会落败。\n\n分析人士担忧，此次冲突可能预示着更广泛的局部战争。巴西与阿根廷彼此指责对方借机侵略巴拉圭，且双方显然缺乏协调行动的渠道。早期的军事调动显示，两国均试图快速夺取巴拉圭的战略要地，以防被对方抢占。鉴于两国之间积怨已深，军队擦枪走火或爆发直接冲突的风险极高。\n"
 LATAM_news.250.a: "真正的敌人，在共产主义者的背后。"
 LATAM_news.250.b: "一着不慎……"
 LATAM_news.251.t: "巴西宣布退出OFN"
 LATAM_news.251.desc: "拉塞尔达在百日危机后短暂担任总统的那段时间，曾力推巴西加入自由国家组织。此后巴西能否留在OFN完全取决于拉塞尔达能否赢得1965年大选。如今随着拉塞尔达败选，新总统宣布巴西退出OFN，不再保留正式成员国身份，这一决定也算是在预料之中。\n\n尽管巴西还会保留OFN准成员国资格，但这种削弱美国在南美影响力的行为无疑惹恼了华盛顿。截至目前，美国总统尚未对此事作出正式回应。"
 LATAM_news.251.a: "OFN是否比之前认为的更脆弱？"
 LATAM_news.252.t: "[Get_newspaper_header]圣克鲁斯和玻利维亚和平统一"
 LATAM_news.252.desc: "今天，玻利维亚各地举行了游行庆祝，庆贺叛乱分离的圣克鲁斯省重新并入共和国。自从在第三次查科战争中战败后，圣克鲁斯省就长期脱离拉巴斯的管辖，依靠巴拉圭攫取了事实上的独立。\n\n许多人都将与革命民族主义运动的统一谈判取得成功归功于其圣克鲁斯分支的领袖，路易斯·桑多瓦尔·莫龙。然而，在圣克鲁斯，也有可靠的报道源称，桑多瓦尔与多起绑架、私刑处决分离主义分子以及政治反对派的事件有所关联，但阿根廷并未因此收回对玻利维亚致力于地区和平的盛赞，巴西则对这次外交胜利维持着一反常态的沉默。"
 LATAM_news.252.a: "布施的惨败终于消弭。"
 LATAM_news.253.t: "[Get_newspaper_header]圣克鲁斯以小博大战胜玻利维亚"
 LATAM_news.253.desc: "全球军事家对玻利维亚必将战胜分离省份圣克鲁斯的预测彻底落空。兵力处于绝对劣势的圣克鲁斯左翼领袖路易斯·桑多瓦尔·莫龙不仅守住了自己的地盘，还发起反攻击败了玻利维亚军队。这样的运气简直世间罕有，而圣克鲁斯军队是如何反过来以小博大控制玻利维亚的，至今仍是未解之谜。\n\n残余的抵抗势力正遭受与圣克鲁斯桑多瓦尔·莫龙政敌相同的镇压手段。玻利维亚教会试图团结反对派，宣称叛军胜利必是因为与魔鬼做了交易，但如今玻利维亚局势大乱，使得抵抗势力一直难以联合。\n"
 LATAM_news.253.a: "封建迷信的胡言乱语。革命洪流势不可挡。"
 LATAM_news.253.b: "上帝抛弃了玻利维亚。"
 LATAM_news.254.t: "[Get_newspaper_header]奥万多去世；玻利维亚全国爆发抗议活动"
 LATAM_news.254.desc: "玻利维亚总统、军队统帅阿尔弗雷多·奥万多·坎迪亚搭乘的直升机在升空后不到一分钟突然坠毁，化作一团熊熊燃烧的火球，这位备受争议的领袖当场身亡。1962年，奥万多领导推翻了不得人心的特拉萨斯政权，建立了延续至今的玻利维亚军政府。空难后，罗赫略·米兰达将军已在军方支持下就任总统。\n\n米兰达是一名强硬的军国主义者，对奥万多的民粹改革持有直言不讳的批评态度。他的就职在玻利维亚各大城市引发了街头示威和劳工骚乱，抗议者普遍认为，是巴西特工暗杀了奥万多，其目的在于阴谋攫取玻利维亚的自然资源。巴西则迅速否认了上述指控，承诺“将继续致力于保护玻利维亚的安全和主权”。\n"
 LATAM_news.254.a: "这是又一起政变。"
 LATAM_news.255.t: "[Get_newspaper_header]玻利维亚反革命！"
 LATAM_news.255.desc: "玻利维亚传来爆炸性新闻，证明这个国家的政治风波远未止息。已经饱受经济困难和政治分裂之苦的玻利维亚左翼政府，在领导人胡安·何塞·托雷斯被秃鹰军团伙同一些年轻军官暗杀后轰然倒塌。\n\n这是一次预谋政变的一部分，该政变旨在扶持右翼革命民族主义运动的政客瓦尔特·格瓦拉上台。在一次公开广播中，这位新任领导人虽然提及了本党的革命历史，却承诺将推行休克疗法和私有化计划。\n\n尽管格瓦拉对托雷斯政府所推行的诸多改革进行了大幅度逆转，且这些举措在国内普遍不受欢迎，但邻国均对此次政权更迭表示友好。新政府预计将在未来几天内把恢复对外关系正常化列为首要任务。"
 LATAM_news.255.a: "看来革命也众怒难犯……"
 LATAM_news.256.t: "[Get_newspaper_header]巴西第五共和国宣告成立"
 LATAM_news.256.desc: "巴西总统卡洛斯·拉塞尔达宣布新宪法颁布通过，正式建立巴西第五共和国。\n立法机构之中占据绝对多数的全国民主联盟迅速将其批准后，预计将以限制瓦加斯派、左派的政治活动等手段来巩固其保守统治。\n\n拉塞尔达的反对派纷纷对此发声。墨西哥、古巴等美洲国家组织批评全民盟是在先前的选举舞弊之后，企图“进一步走向独裁”；巴西国内的工会宣布总罢工，希望能迫使拉塞尔达辞职，并废除“反劳工”宪法。然而，在华盛顿的支持下，新生的巴西共和国似乎完全能顶住这诸多的压力。"
 LATAM_news.256.a: "自由的太阳照耀着我们，在祖国的天空大放光芒……"
 LATAM_news.256.b: "希望这部宪法能发挥作用。"
 LATAM_news.256.c: "召开韦拉克鲁斯论坛，我们要讨论对策。"
 LATAM_news.256.d: "乌鸦啃食着瓦加斯主义的尸体。"
 LATAM_news.257.t: "[Get_newspaper_header]内伊·布拉加当选巴西总统"
 LATAM_news.257.desc: "巴拉那州州长内伊·布拉加当选巴西总统，延续了全民盟的政治主宰地位。尽管前总统儒塞利诺·库比契克展开了激烈的竞选行动，但由于布拉加拥有巴西军方的支持，他的胜选显然板上钉钉。过去十年的大部分时间中，军队都严密地控制着巴西的各个机构，在布拉加这位前少校的领导下，未来显然也不会有什么变化。\n\n巴西选举长年以来都存在偏袒和舞弊现象，国际社会对此次选举也反应平平。 南美的反对者基本一言不发，韦拉克鲁斯协定也只是形式上做出了指控。相比之下，长期支持巴西政府的美国迅速向布拉加发出了贺电，OFN的许多盟友也送上了祝贺。\n"
 LATAM_news.257.a: "巴西军队屹立不摇。"
 LATAM_news.258.t: "[Get_newspaper_header]巴尔特赢得亚松森之战"
 LATAM_news.258.desc: "昨日，巴拉圭暴力事件再次激增，共产党两派领袖奥夫杜略·巴尔特和奥斯卡·克雷特的队伍在亚松森街头爆发激战。身经百战的游击队员塞尔索·阿瓦洛斯·奥坎波斯召集起巴尔特麾下的部队，在国立大学挡住了阿加皮托·巴连特指挥的克雷特效忠者，击退了数次进攻，然后冲上街头，追击溃散的敌人。\n\n此前，党内的第三号人物奥古斯托·卡内特负责调和二人之间的紧张关系，但在卡内特因癌症辞职后，克雷特独断专行，巴尔特便出手罢免了他的领导地位，引发了当下的冲突。目前，克雷特已流亡国外，外交部长米格尔·安赫尔·索莱尔就任总统，巴尔特则可以不受阻碍地推行其党内民主措施。\n"
 LATAM_news.258.a: "也许他的巴拉圭不会是血红色的。"
 LATAM_news.258.b: "一个更可控的共产主义者……太好了。"
 LATAM_news.259.t: "[Get_newspaper_header]克雷特赢得亚松森之战"
 LATAM_news.259.desc: "昨日，巴拉圭暴力事件再次激增，共产党两派领袖奥夫杜略·巴尔特和奥斯卡·克雷特的队伍在亚松森街头爆发激战。在阿加皮托·巴连特的得力指挥下，克雷特的部队攻陷了游击队员塞尔索·阿瓦洛斯·奥坎波斯以及巴尔特派系位于国立大学附近的阵地，在全城中搜捕他们。\n\n此前，党内的第三号人物奥古斯托·卡内特负责调和二人之间的紧张关系，但在卡内特因癌症辞职后，克雷特独断专行，巴尔特便出手罢免了他的领导地位，引发了当下的冲突。目前，巴尔特已流亡国外，克雷特正巩固着他的个人主义控制、发动一场由农民领导的土地革命，已经没有什么能约束住他了。\n"
 LATAM_news.259.a: "一座城市究竟能见证多少动荡不安呢？ "
 LATAM_news.260.t: "[Get_newspaper_header]跨安第斯条约谈判破裂"
 LATAM_news.260.desc: "关于《跨安第斯经济合作条约》的磋商谈判在未得到任何签署文件的情况下宣告落幕。巴西与智利曾试图借条约失效之机，在玻利维亚的运输及矿业领域谋求特权，但阿根廷通过维持现状成功捍卫了她在南美洲的经济地位。\n\n巴西利亚与圣地亚哥对这一结果均未发表官方声明，而布宜诺斯艾利斯方面则高调迎接他们的外交团队归国，称\"此举坚定捍卫了国家利益“。而在玻利维亚国内，民意沿阶级分野呈现割裂态势：富裕阶层为失去的宝贵外资而痛惜扼腕，同时普罗大众多为眼下境外渗透的受阻感到满意。"
 LATAM_news.260.a: "不达成协议才是阿根廷所期望的结果。 "
 LATAM_news.261.t: "[Get_newspaper_header]玻利维亚人民派挫败长枪党强硬派政变"
 LATAM_news.261.desc: "今天，拉巴斯焰火齐鸣，音乐四起，市民们正在庆祝贝尔纳迪诺·毕尔巴鄂·里奥哈总统阻止了玻利维亚社会主义长枪党的内部政变。该党的领导人、创始人之一奥斯卡·温萨加和数名老资格党员已经被捕，他们未能争取到的忠实官员提供了罪证文件和证词，据此预计，温萨加等人将被判犯有叛国罪。\n\n毕尔巴鄂·里奥哈和温萨加曾在智利的支持下联手推翻了玻利维亚军政府，但随着里奥哈总统和他的人民派占据主导地位、引导国家向智利靠拢，两人之间的关系迅速破裂，圣地亚哥支持的民主改革议案成了逼迫温萨加发动政变的最后一根稻草，但政变后，守旧势力已经被连根拔起，议案有望顺利通过。\n"
 LATAM_news.261.a: "拉莫内达宫也举起香槟祝酒。"
 LATAM_news.262.t: "[Get_newspaper_header]长枪党将玻利维亚引向孤立"
 LATAM_news.262.desc: "玻利维亚社会主义长枪党党魁奥斯卡·温萨加日前发动政变，罢黜总统贝尔纳迪诺·毕尔巴鄂·里奥哈，指控后者及其党内盟友背弃国家利益与长枪党主义原则。克玛多宫熊熊燃烧，而在台阶前，温萨加宣布成立“新玻利维亚国”，并立即驱逐所有智利外交官。\n\n温萨加与前陆军总司令毕尔巴鄂·里奥哈早年在流亡期间结识，两人在矿石战争中共同推翻了玻利维亚军政府。然而，随着局势发展，智利的援助逐步增强了毕尔巴鄂·里奥哈所代表的实用派在党内的影响力，引发路线分歧与内部矛盾。民主改革议程成为了点燃温萨加及其保守派同僚愤怒的导火索。在准军事力量的支持下，政变随即展开。如今，几乎没有什么力量能够阻止温萨加将玻利维亚改造为他心目中的天主教法西斯之国了。\n"
 LATAM_news.262.a: "在失败国家的耻辱中，一个怪物悄然成形。"
 LATAM_news.263.t: "[Get_newspaper_header]比利亚罗埃尔掌握玻利维亚大权"
 LATAM_news.263.desc: "在阿根廷代表团的斡旋下，革命民族主义运动的三大派别达成了一系列妥协，比利亚罗埃尔的领导地位因此保住。虽然莱钦派凭借继续支持现政权而获得了相匹配的补偿，但比利亚罗埃尔继续掌权也意味着玻利维亚在意识形态上进一步被阿根廷同化。\n\n比利亚罗埃尔牺牲了玻利维亚民族运动中不可或缺的军事社会主义思想，为防止政权被推翻，他签订了一系列协议，彻底断绝了玻利维亚民族独立于正义党运动之外的一切可能。如此彻头彻尾的背叛坐实了总统独裁者想要当“玻利维亚庇隆”的念头，想维护他的合法性无疑会艰难许多。\n"
 LATAM_news.263.a: "镣铐换作断头台。"
 LATAM_news.264.t: "[Get_newspaper_header]中间派在玻利维亚掌权"
 LATAM_news.264.desc: "在比利亚罗埃尔的独裁倾向和左派莱钦的权力斗争之间，作为温和中间派的第三派在激进主义之中游走，取得了最终的胜利，成为了革命民族主义运动的新领导层。比利亚罗埃尔因其明显的独裁思想倾向而被驱逐出党，以维克托·帕斯·埃斯登索罗为首的帕斯派获得了党内除莱钦派之外所有势力的普遍支持，接管了运动的领导权。\n\n帕斯花费了大量精力来修补与瓦尔特·格瓦拉领导的右翼之间的关系，成功地为党内混乱的局面带来了一丝团结。然而，左翼则因拒绝与新当权派合作而被永久驱逐。如今，自由世界的观察家们可以为玻利维亚向自由民主的过渡而松一口气了。"
 LATAM_news.264.a: "自由照亮了黑暗。"
 LATAM_news.265.t: "[Get_newspaper_header]军方接管玻利维亚"
 LATAM_news.265.desc: "玻利维亚再次陷入恐怖主义和动乱之中——由社会主义共和联盟党和自由党组成的民主制度联盟在政治纷争中垮台，陷于瘫痪。鉴于目前的不稳定局势，勒内·巴里恩托斯将军已通过各种渠道宣布发动政变，“从寡头手中拯救自己”。\n\n将军接管了已然瘫痪的政府，用胡萝卜加大棒的方式建立起了自己的权威。巴里恩托斯宣布了一些温和的改革措施，以期暂时缓解农民的贫困状况，但他似乎还无意放松镇压性质的戒严令、解开平民百姓身上的牢固控制。在这个支离破碎的国家，恢复民主还需要长久的时光。"
 LATAM_news.265.a: "有得必有失。"
 LATAM_news.266.t: "[Get_newspaper_header]玻利维亚举行选举"
 LATAM_news.266.desc: "在被许多人指责为“结果早已确定”的玻利维亚选举之中，民主制度联盟候选人恩里克·埃尔佐格就任为总统。他曾在1947年至1951年间担任总统，其回归被广泛认为是传统寡头政党内部停滞不前、缺乏新鲜血液的结果。\n\n批评人士指出，此次选举中普遍缺乏投票权，识字测试将大多数玻利维亚人排除在了选举之外，只有权贵才能选择他们的代表。如今的玻利维亚政府没有民众授权、军方势力日益式微，许多人不禁要问，玻利维亚人民还要忍受多久，才会将怒火化作反抗。\n"
 LATAM_news.266.a: "他们身陷黑暗中，四周尽是谎言。"
 LATAM_news.266.b: "当暴政成为了法律，革命就成为了责任。"
 LATAM_news.267.t: "[Get_newspaper_header]巴西总统阿德马尔·德·巴罗斯遇刺！"
 LATAM_news.267.desc: "今天，悲剧降临巴西，阿德马尔·德·巴罗斯总统遭遇投毒暗杀。目前，刺杀动机尚不清楚。阿德马尔此前陷入昏迷之后，巴西政局便动荡不安，卡洛斯·拉塞尔达领导的全民盟曾试图弹劾总统。巴西政坛上，阿德马尔一直都颇受争议，有人尊他为穷人的英雄，有人贬其为独裁总统，企图让巴西重回热图利奥·瓦加斯的独裁时代。部分社进党党员指责美国或日本参与了暗杀，声称两国想要破坏巴西与德国之间建立的密切关系，两国则均否认与暗杀事件有任何牵连。\n"
 LATAM_news.267.a: "一段富有成效的关系就此结束。"
 LATAM_news.268.t: "[Get_newspaper_header]中情局特工企图暗杀巴西总统阿德马尔！"
 LATAM_news.268.desc: "今天，巴西发生了一起令人震惊的事件：针对阿德马尔总统的未遂刺杀，刺客承认其受雇于美国中央情报局，总统昏迷不醒已有一段时间。阿德马尔在巴西颇具争议，他曾试图废除总统的连任限制、颁布独裁政策；他还是个众所周知的亲德派，试图将巴西推进德国的势力范围。人们普遍认为，这就是中情局要暗杀他的原因。主要反对党全民盟一直在极力为美国的参与撇清干系，声称刺客的供词是弄虚作假。\n"
 LATAM_news.268.a: "如此恶邻！"
 LATAM_news.268.b: "不予置评。"
 LATAM_news.269.t: "[Get_newspaper_header]巴拉圭占领争议地区瓜伊拉瀑布"
 LATAM_news.269.desc: "巴拉圭军队出兵占领争议地区瓜伊拉瀑布的部分区域，让高原宫一阵惊慌。这片地区之前长期处于巴西的松散控制之下，如今战争号角突然吹响，沿巴拉那河驻防的巴西守军如梦初醒——巴拉圭占领军正在明目张胆地修筑防御工事。\n\n尽管多年来瓜伊拉瀑布地区的主权归属早已模糊不清，但巴拉圭居然直接打破互不侵犯默契、悍然扩张领土的举动仍令人猝不及防，令国际社会既震惊又困惑。巴西政府怀疑阿根廷在背后暗中支持巴拉圭，但目前还未掌握确凿证据。"
 LATAM_news.269.a: "前路迷茫。"
 LATAM_news.270.t: "[Get_newspaper_header]巴西向巴拉圭让步"
 LATAM_news.270.desc: "巴西接受了美洲国家组织提出的妥协条件，巴拉那危机得以和平结束。目前，巴拉圭军队已撤出先前占领的地区，而巴西则将在争议领土上建立非军事区。\n\n然而，由于阿根廷以捍卫本国享有的巴拉那河主权为由进行了干预，签署长期条约的尝试以失败告终，和平仍然遥遥无期。当下，巴西和巴拉圭之间的关系依然剑拔弩张，边界争议仍未解决，巴西政府在当地修建水坝的计划已无限期搁置。"
 LATAM_news.270.a: "无人胜出。"
 LATAM_news.271.t: "[Get_newspaper_header]巴西守住瓜伊拉瀑布地区"
 LATAM_news.271.desc: "在巴拉圭试图巩固其对瓜伊拉瀑布地区控制的行动中，巴拉圭与巴西军队之间爆发了血腥的边境冲突。虽然伤亡惨重，但事实证明备受争议的萨加拉纳行动的确是一次值得尝试的赌博，巴西成功重新确立了对当地的管辖权，大部分巴拉圭部队已经逃离了驻地。\n\n虽然巴西打了对手一个出其不意，但这次秘密行动也导致两国之间至今仍未签署停火协议。南锥体局势终于重新得到了控制，但阿根廷和巴拉圭大使仍在批判巴西利亚政府，显然，两国都不愿接受这次耻辱性的军事失败。"
 LATAM_news.271.a: "巨人屹立。"
 LATAM_news.272.t: "[Get_newspaper_header]巴西部队被迫撤出瓜伊拉瀑布"
 LATAM_news.272.desc: "在瓜伊拉瀑布地区的边境冲突中，巴拉圭占领军与巴西守军展开了交火，巴拉那危机进一步升级。巴西政府授权了萨加拉纳行动，试图驱逐进入当地的巴拉圭军队。\n\n然而，原本计划中的闪电战变成了步履维艰的流血冲突，停火遥遥无期，巴西部队的士气迅速崩溃。\n\n当下，巴西利亚政府正面临四面八方来自国内政客和巴拉圭外国官员的抗议，动荡的南锥体将陷入更深的混乱。"
 LATAM_news.272.a: "死于非理性的人们。"
 LATAM_news.273.t: "[Get_newspaper_header]《瓜伊拉瀑布条约》签署"
 LATAM_news.273.desc: "美洲国家组织已召开紧急会议，调解巴西和巴拉圭两国之间爆发的边界冲突。会议最终签署并批准了一项条约，以期解决争议地区的模糊地位问题。两国正设法巩固瓜拉瀑布地区的伙伴关系，防止争端进一步升级。\n\n这次全面谈判还为潜在的大型水电站项目铺平了道路，双方同意在可能的情况下平分收益。尽管阿根廷代表团试图阻止条约签订，但最终，阿根廷也能从大坝收益中分一杯羹的承诺说服他们做出了让步。"
 LATAM_news.273.a: "团结中的繁荣。"
 LATAM_news.274.t: "[Get_newspaper_header]人民大会于玻利维亚得胜"
 LATAM_news.274.desc: "在玻利维亚，总统胡安·何塞·托雷斯已被人民大会罢免。其继任者是工会领袖、左翼知名人物胡安·莱钦·奥克维多，他上任后的第一项举措便是监督制定一部新宪法，将全部权力赋予人民大会。在拉巴斯举行的新闻发布会上，莱钦宣称他决心捍卫玻利维亚新的工团主义共和国，“不论面对内部还是外部的反动势力。”\n\n前总统托雷斯最初是在矿石战争结束后，作为人民大会与军方之间的权宜之计被推选上台的。然而，双方在意识形态上的分歧很快显现，莱钦曾多次在幕后努力，力图抵御托雷斯的阴谋，维护人民大会的权威。尽管观察家们早已注意到莱钦一直是国家政治中的“灰衣主教”，但与托雷斯的这场权力斗争迫使他不得不更加直接地参与玻利维亚的治理事务。\n"
 LATAM_news.274.a: "要是他们能更听话些……"
 LATAM_news.275.t: "[Get_newspaper_header]人民大会于玻利维亚落败"
 LATAM_news.275.desc: "玻利维亚总统胡安·何塞·托雷斯宣布解散人民大会。此前，玻利维亚议会和军方之间的权力斗争旷日持久。在拉巴斯举行的新闻发布会上，托雷斯总统重申了他对玻利维亚左翼主义的承诺，但政府将更加巩固精简。\n\n当地观察家认为，一段时间以来，托雷斯一直希望以牺牲人民大会为代价来扩大行政权，而建立大会的工会等地方左派力量可能会在新政府中遭到边缘化。社会主义势力在南美的潜在侵略性有所缓和，虽然各方尚未发表正式声明，但据可靠消息来源，南美各国政府都松了一口气。\n"
 LATAM_news.275.a: "我猜，又一个问题不必担心了……"
 LATAM_news.240.b: "他们的自由不过一句空话。"
 LATAM_news.240.c: "又一颗美国的棋子倒下了。"
 LATAM_news.240.d: "看好边境。看他们崩溃吧。"
 LATAM_news.240.e: "不自由毋宁死！"
 LATAM_news.240.f: "人行道下，人潮涌起。"
 LATAM_news.240.g: "乌鸦陨落。"
 LATAM_news.277.t: "[Get_newspaper_header]圣克鲁斯重归玻利维亚"
 LATAM_news.277.desc: "路易斯·桑多瓦尔·莫龙与其所属的革命主义民族运动左翼政府谈判后，同意圣克鲁斯政府将解散，重归玻利维亚。对于身陷泥淖的玻利维亚而言，这是难得的好消息。桑多瓦尔和有可能被任命为圣克鲁斯省首任省长，莱钦和桑多瓦尔拥抱庆祝、托雷斯总统在远处注目的照片四处流传。\n\n玻利维亚全国各地都举行了庆祝活动，横幅不仅宣告了国家的统一，也宣告了人民在革命中的团结；而玻利维亚之外，富人们对革命政府夺取富饶的圣克鲁斯还有油田颇为担忧，指出油田国有化似乎已迫在眉睫。"
 LATAM_news.277.a: "无产阶级不分文化。"
 LATAM_news.277.b: "他们真蠢，就这样放弃了自己的国家。"
 LATAM_south_atlantic_war.13.t: "敌我双方"
 LATAM_south_atlantic_war.13.desc: "卡洛斯·拉塞尔达咳嗽着揉了揉干涩的眼睛，作战会议室里弥漫着浑浊的汗臭与烟味。某个隐蔽角落的无线电传打字机正刺耳作响，吐出一份又一份情报机构的报告。侍立在总统身旁的某位将军夺过最新报文扫了一眼，随即泄气般将它扔在堆积如山的文件堆上。\n\n果然，他们既不确定起因也不知晓后果。有人宣称是阿根廷军队越过了边境线，也有人咬定是巴西巡逻队先开火。可这还重要吗？南美大陆已经见了血。接下来必将血流成河。\n\n拉塞尔达掐着鼻梁陷进座椅。他清楚该怎么做——巴西人民不会容忍优柔寡断的领袖。他会赢的。他将提出合乎国际法的公平条件，以胜利者姿态抚平国家的创伤。事情就该这么简单。\n\n他俯身凝视前任们留下的作战地图时，一位准将的手指正划过褪色已久的旧边界线。金属制的小型兵棋在沙盘上星罗棋布，随着局势变化被参谋团拨来挪去。"
 LATAM_south_atlantic_war.13.a: "可有人知道他们为何自相残杀？"
 LATAM_south_atlantic_war.14.t: "傀儡战争"
 LATAM_south_atlantic_war.14.desc: "战争。这个词在拉塞尔达的脑壳里四处乱窜。巴西要开战了，不是遥远的非洲或哥伦比亚丛林，不是在某个可以保持安全距离的异域，而就在自家门口。将军们告诉他阿根廷人开了第一枪，塞给他一份演讲稿，就把他锁在作战室门外，而戈尔贝里等形形色色的军人却长驱直入。他本应怒不可遏，本该厉声斥责，但席卷全身的麻木感压倒了一切。\n\n阿根廷人真打第一枪了吗？他不知道。他根本不知道“他的”参谋部在搞什么鬼名堂，那些人甚至不准他了解该死的制胜方案。说不定这帮人策划这场闹剧已有经年，早早拟好了演讲稿，此刻正享受人生巅峰时刻，而他却濒临精神崩溃的边缘。\n\n好吧，至少他希望演讲不是预先准备好的——如果给他们时间提前构思却只能拿出这种水平，那才是真的末日将至。稿子烂得让他几度想把纸团摔在地上，直接对着广播即兴发挥，管他后果如何。但最终他还是颓然垂下了肩膀。反正又有什么区别呢？当他缓步离开作战室时，有个念头始终挥之不去。\n\n万一这压根不是预谋的戏码呢？万一将军们和他同样震惊，同样猝不及防呢？他强咽下恐惧，只能祈求胜利降临，祈求这场噩梦早日终结。"
 LATAM_south_atlantic_war.14.a: "上帝保佑我们。"
 LATAM_south_atlantic_war.15.t: "遗传性皱眉"
 LATAM_south_atlantic_war.15.desc: "阿莱绍赶到战情室时，刚刚结束对全国民众的讲话。这一路上目睹的景象让他的心忽而悬到嗓子眼，忽而沉到肚脐眼。看到巴西利亚政府大楼内外人们疯狂奔走的场景，简直以为整座建筑真要燃烧倒塌了——如此仓促组建的战时内阁正面临着前所未有的紧迫局面；倘若危机继续恶化，战火必将蔓延至更远之地。\n\n直至此刻，仍无人知晓谁打响了第一枪。但此刻南方的混乱已是举国皆知，巴西历史正在经历剧变的转折点：阿根廷军队正在推进，南里奥格兰德州边境陷入恐慌，所幸巴西陆军仍坚守着防线。\n\n所有人都心知肚明——这种僵持局势转瞬即破。\n\n小热图利奥·瓦加斯立在会议桌首端，两侧簇拥着将官元帅们，佩德罗·阿莱绍与劳多·纳特尔分立左右。当圣保罗州长以家族特有的强势姿态挥臂发令时，阿莱绍只觉眼前爆发的冲突规模令他窒息。铺满整张会议桌的作战地图上，马克笔勾勒的战线与军事目标横贯整个南美洲——那个已然消逝的和平大陆。\n\n已故老瓦加斯的阴影如幽灵般笼罩着战争委员会，对其同名之子尤甚。这位毁誉参半的前独裁者，其意志正通过儿子的每道命令回荡在会议室。尽管小瓦加斯居于核心，阿莱绍仍能感受到不时扫向自己的余光：若战事不利，首都总要有人为此付出代价。\n\n阿莱绍唯一能做的，就是祈祷祖国能渡过这场劫难……"
 LATAM_south_atlantic_war.15.a: "……若非如此，除非厄运垂青他们，他便免不了被剥皮的下场。"
 LATAM_south_atlantic_war.16.t: "梦回米德尔塞克斯"
 LATAM_south_atlantic_war.16.desc: "隔着巴西利亚政府大楼的天花板，能听见AC-130运输机遥远的轰鸣，整栋建筑时常因周遭骚动而震颤；从地下室到顶层走廊，所有人都在徒劳奔走，试图追踪瞬息万变的危机态势。这幅景象让恩里克·特谢拉·洛特感到噬心刻骨的熟悉——而这是他最不愿重温的噩梦。\n\n一次又一次，洛特的思绪被拽回那个瘟疫般的二战岁月，拽回“海狮”行动的灾难之中。每一秒的回忆都在重播构筑防线、目睹溃败、仓惶后撤的悲剧。他们从多佛尔的登陆点一路撤退至爱尔兰海边的兰开斯特，头顶盘旋着德军战机，用仅存的弹药换取微不足道的抵抗时间：一天、半天、甚至一小时。\n\n如今，巴西的至暗时刻再度降临。更可怕的是他们甚至不知道起因——交火数小时后，双方仍在争论谁开的第一枪。媒体如同举棋不定的高层一般闪烁其词，阿根廷指控巴西，巴西反指阿根廷。军队竭力稳住战线，但杀红眼的阿根廷人随时可能扭转战局。\n\n会议桌上的军用地图最令洛特窒息。潦草的马克笔圈画着南锥体战略要地，从亚松森到乌拉圭无所不包。他胸中淤塞着耻辱与暴怒，恶心感涌上喉头：这就是他们的结局？与墨索里尼和希特勒血战一代人后，现在要自相残杀？\n\n二十多年来，洛特一直以不苟言笑的政治家形象示人，刻意远离那个在米德兰兹战壕里打滚的将军。阿根廷人的狂妄终结了这种努力——距离蒂珀雷里的硝烟确实很远了，但“抽烟眼镜蛇元帅”此刻已然归来。他不再身处异乡，而是站在誓言守护的国门前。\n\n他伫立桌前凝视地图：英国正日日忍受纳粹铁蹄，而巴西连一秒都不会屈从于这帮模仿者。"
 LATAM_south_atlantic_war.16.a: "他一边整理制服，一边怒气冲冲地召集战争委员会。"
 LATAM_south_atlantic_war.17.t: "慌乱时刻的真相"
 LATAM_south_atlantic_war.17.desc: "在巴西利亚某栋政府大楼的宏伟厅堂里，气氛之凝重如同她经历过的最糟糕时刻。原先像工蚁般往来穿梭的文官身影已不复存在，取而代之的是神色阴郁的军官们行色匆匆地穿行于走廊，每个人眼底都烙着数小时未散的迷茫惶惑。尽管埃德娜·洛特竭力保持镇定，她内心翻涌的忧惧并不比他们少半分。\n\n自然，军方某些人也将这场危机归咎于她，闪烁其词的指责在暗流中滋生。到底是谁先扣动扳机——是巴西还是阿根廷？这个谜团仍未揭晓，即便阿根廷军队正朝南部锥型地带步步紧逼。周遭投来的钢刃般目光已经道尽一切，她不需要言语就能明白自己在这里有多不受欢迎。\n\n埃德娜敏锐地觉察到军方对她有所隐瞒，但那些追问必须留待与亲信密谈时再进行。此刻她的注意力必须牢牢钉在中央桌面的作战地图上，那些令人晕眩的标记线与数字阵列。诚然，这已远超出文职领导人的常规应对范畴，却是她血脉里并不陌生的挑战。\n\n战争委员会的男人们胆敢轻视这位陆军元帅之女固然愚蠢，但他们犯下的另一个错误更令埃德娜暗自痛快：这场危机将是证明她无愧父亲血脉的绝佳机会，更要向世界宣告——世人对她性别的偏见，绝不等同于软弱无能。\n\n冠着洛特之名的倔强巴西女性。一场兵临城下的恶战，一场将永载南美史册的命运对决。再没有比这更完美的历史机遇来铸造属于她的传奇了。这是前所未有的试炼，无论代价为何她都决不退缩。当那些制服笔挺的军人肃立待命时，女总统唤醒了血管里父亲的雷厉风行，吐露的却是属于自己的铁誓：\n\n“和平解决仍是首要原则——但要让布宜诺斯艾利斯学会倾听，就得先让他们尝尝血的教训……这份荣誉，就由诸位亲手摘取吧。”"
 LATAM_south_atlantic_war.17.a: "“……我们继续？”"
 LATAM_south_atlantic_war.18.t: "这不是我的梦想"
 LATAM_south_atlantic_war.18.desc: "助手面无表情地说道：“这是正式的。”他的年龄刚好到不能豁免征召入伍的门槛，“阿根廷军队向我们开火了。我们开战了。”\n\n维尔吉利奥·塔沃拉双手紧握，只是点了点头：“我明白了。现在的部队位置？”\n\n“我们应该已经把他们部署到其他地方去了，不过我会看看有没有的消息哼更新。”助手回应道，转过身来稍作停留，“您的日程还需要补充吗？”\n\n塔沃拉努力地回想着这位助手的名字，默默地自责了一下。“请务必将与军方高层的会议安排在16:00，然后在两小时后召开新闻发布会。做完之后，一定要站在……”塔沃拉知道这还不够，“算了。你有家人，先生，今天剩下的时间就陪陪他们吧。”\n\n助手向他道谢，关上门匆匆离去。仅仅一秒钟之后，塔沃拉的真实情绪就爆发了。他怒不可遏，骂骂咧咧，桌椅板凳统统被掀翻在地。这些个年头，拉塞尔达就是个精神错乱、大脑失衡的疯子，他一味对着美国输诚，与阿根廷的冲突愈演愈烈。但塔沃拉是温和的力量！他还能挽救这一切，他确信。他找到了一张掉在地下的纸，和一支滚落在身旁的铅笔。\n\n他想写点什么，但还连一个字都没写完，铅笔就断了，铅芯滑落在地。塔沃拉笑了，但却毫无喜悦。已经很清楚了，所有和平的希望都早已破灭，与阿根廷谈判的尝试在他身下土崩瓦解。也许以后他还能进行谈判，但显然，和平已在他身边坍塌。"
 LATAM_south_atlantic_war.18.a: "世上没有后悔药。"
 LATAM_south_atlantic_war.19.t: "首批战死者"
 LATAM_south_atlantic_war.19.desc: "“……战斗会很激烈，但只要我们御敌于国门之外，并与将士们坚定同袍，巴西必将屹立不倒。”阿德马尔说道，平日浮夸的妆容被暴烈神情取代，仅能靠面前演讲稿稍作掩藏。“啊，自由！吾辈胸膛连死神都敢直面！”\n\n摄像机镜头刚一熄灭，这群记者就拖拽着设备散去。总统面色瞬间崩塌，身躯向前佝偻。当他蹒跚穿过办公室外蜂拥的记者群时，此起彼伏的拷问混成一片嗡鸣。“巴西能赢吗？”拥趸们追问。“为何拖延进攻准备这么久？”质疑者诘问。“您配不配当总统？”反对派直指要害。他却以沉默应对所有诘难。\n\n终于钻进轿车时，他连喘息的空隙都没有——车窗上噼啪的雨滴与接踵而至的战报内外交逼。“总统先生，”身旁幕僚捂着话筒低声报告，“埃德娜·洛特来电，她写了篇长文为您辩护，询问可否刊发？”\n\n阿德马尔向右转头，突然嗤笑出声：“你说我们要是献上整个世界，阿根廷真会同意休战吗？”\n\n前排那位挂黑披肩的将军猛然摇头：“等咱们坦克开进乌斯怀亚那天才有和平。现在不是操心这个的时候。”他抬高手中简报，纸张在昏黄灯光下泛着镰刀般的光芒。\n\n总统垂首，再度陷入阴郁。“可总该有人在乎这些。”他喃喃自语。战报正念着首批阵亡名单，他却神游天外——这场战争，难道真是宿命？"
 LATAM_south_atlantic_war.19.a: "延期的梦想又将何去何从？"
 LATAM_news.274.b: "红星今夜照耀玻利维亚。"
 LATAM_news.275.b: "坦克履带碾碎了玻利维亚的红星。"
 LATAM_south_atlantic_war.20.t: "民主假日"
 LATAM_south_atlantic_war.20.desc: "在仓库里，投票箱积满灰尘，迟迟不见天日。\n\n广播中播出了一则消息，宣布由于目前的紧急状态，选举暂停，报纸不会就此事发表任何文章。\n\n小规模的抗议活动随之爆发。他们被暴力驱散，一个人痛苦地哭喊着，他和他的断臂被五花大绑，塞进了车厢。\n\n在战地指挥部，一名指挥官对此津津乐道。民主从来不是巴西的强项，他很高兴这场战争证明了这一点。高天之上，战鹰盘旋。\n\n在前线，一名巴西工党党员思索着这个日子的意义，他想了很久，甚至分心没有去看远处地平线上的阿根廷神枪手。\n\n他们都不会再投票了。"
 LATAM_south_atlantic_war.20.a: "最终，手段必须要证明自己的正确性。"