 LATAM.13.t: "秘密会谈"
 LATAM.13.desc: "这没有列入今天的官方议程，也没有公开讨论，他们甚至不打算坐进大厅——若昂吸了一口烟（他终于对这漫天的烟雾屈服了），心中颇感有趣。这应该是整个谈判最关键的部分。在这间隐藏在整个建筑内部的狭窄房间里坐着六个人，智利和巴西的外交官，各自带了两个助手。若昂有幸亲眼见证这一切，真是与有荣焉。\n\n“还是房间里的大象？”上司发问。智利人疲惫地点点头，“没错，还是阿根廷人。”\n\n“总是他们。”另一个人说。“他们活跃、好斗，而且强大。你跟我们一样都知道他们有多危险。我们想要合作——军官互信，防御协定，军事合作——”\n\n“而你们把秘鲁排除在外，我明白了。”\n\n“是的，我们是没叫秘鲁。他们不像我们这么重视这个问题。在秘鲁眼里阿根廷只是另一个国家而已。但我们就不一样了，事关重大，我们不能冒险。”\n\n“确实如此。”巴西人回应道。“这是……你知道的，这是一种升级。要是他们发现，布宜诺斯艾利斯一定会大发雷霆——或许直接发疯开战也说不定。我得说，我的朋友，巴西可不想卷入一场大陆战争。”\n\n“当然，但这并不意味着你可以当他们不存在。”\n\n外交官转向若昂，后者的心一下子提到了嗓子眼。“你有什么想法？”"
 LATAM.13.a: "“有道理，先生。我同意您的看法。”"
 LATAM.13.b: "“风险太大了，到时候再看看。”"
