 POLITICS_BORIS_III_DESC:0 "沙皇鲍里斯三世的传奇早已超越个人传记范畴。四十余载春秋，保加利亚的国运始终系于这位君主的肩头。每一桩义举皆成其荣光，每一件恶行俱为其耻辱。待千秋史笔终将清算，这位君主的遗产将如何定论？\n\n沙皇的拥趸们拒绝思考这个问题——他们自认已有答案。凭借睿智与胆识，鲍里斯三世为保加利亚夺取马其顿，将国家从法西斯魔掌中解救，捍卫了主权独立。这便是官方叙事的全部：简洁、光鲜、易于传颂。\n\n然而深宫之中，质疑之声从未停歇。这位君主日益显露出威权化倾向，以铁腕镇压维系统治。纵使冠冕堂皇，鲍里斯三世终究是戴着王冠的独裁者——而作为独裁者，他同样会陷入偏执与顽固的泥沼。\n\n无论历史终将如何评说，沙皇的传奇已近尾声。年逾花甲且沉疴缠身的鲍里斯三世，正着手培养皇储西美昂继承大统。不日之后，统一四海之王的史诗终将落幕——无论这曲终章是颂歌还是挽歌。"
 POLITICS_TODOR_ZHIVKOV_DESC:0 "托多尔·日夫科夫用数十年光阴巩固权力，既巩固自身对国家的掌控，亦强化国家对党的控制。在保皇派政变失败后，共产主义的保加利亚诞生了，而其领袖正是日夫科夫。\n\n尽管以革命之名奋斗数十载，日夫科夫仍在党内外饱受争议。与兰科维奇等人不同，他虽将君主制时代的民族主义观点融入国家蓝图，却并不热衷领土扩张。他持续主张对马其顿的主权要求，将自身统治与保加利亚传统民族英雄勾连，维持与教会的联系。其提拔女儿执掌艺术与文化部的举动，亦引发非议。\n\n日夫科夫不仅因其民族主义立场遭共产党人诟病，其国际主义路线同样招致不满。他乐于同OFN等资本主义势力合作，甚至致力于与巴尔干邻国关系正常化。然而，这些决策虽激怒强硬派，却使他在普罗大众眼中倍受爱戴。"
 POLITICS_TODOR_ZHEKOV_DESC:0 "当托多尔·热科夫于战场初品荣耀之甘美，法西斯之毒便植根其脑海。一个更伟大的保加利亚长存其心，在那马其顿人有自知之明，祖国母亲也再度金瓯一统。但在这命定之日他尚不能想到，终有一日正是他将这一切实现。\n\n他的独裁生涯始于弗拉涅。正是他的军队在起义最后几日拿下了弗拉涅，并吊死了科利舍夫斯基。这大英雄荣归索菲亚，大肆公开宣讲他的极右理想。当祖国因失去色雷斯和马其顿的动荡而惶惶不可终日时，他找到了他的听众：一群唯命是从的年轻暴民。\n\n不久后，热科夫成了法西斯分子的宠儿，也成了法西斯主义侵略性和暴力个人主义的象征。赫里斯托·卢科夫去世后，他被保加利亚民族军团联盟选为领导人，将军接过了这保加利亚最大法西斯运动的大旗，也成了极右翼事实上的头子。\n\n热科夫这辈子见过太多他这种运动失败了。他见证了军团如何在卢科夫和他叔叔治下故步自封。他也见证了亚历山大·赞科夫如何起舞又倒下。这些人从未听见祖国的呼声——但热科夫会的，热科夫还要为此而战。在战场他曾战得舍生忘死——现在，他的国家也该这样了。"
 POLITICS_ASEN_KANTARDZHIEV_DESC:0 "即便登上了保加利亚的权力巅峰，阿森·坎塔尔吉耶夫仍是个谜。这位元首神龙不见首尾，即使是他最亲近的追随者，也只是知道他的姓名。但切勿误解——这一切皆是精心策划。此刻的胜利，这场革命，正是他三十年前的夙愿。\n\n这个梦始于索非亚的一间斗室。作为大战归来的老兵，坎塔尔季耶夫面对的是一个渴求秩序、稳定与纯粹的国家。当环节政权崩塌后的偏执阴云笼罩时，他深知鲍里斯三世会摧毁任何可见的威胁组织。\n\n不同于国家军团联盟与军队的融合策略，坎塔尔季耶夫选择了阴影之路。他的“政党”更像共济会式的密谋集团而非传统党派。这招奏效了。无论遭遇多少次逮捕、拷打与禁令，他的组织仍在暗处滋长，自发策划迫害活动，悄然渗透进鲍里斯三世的内阁。\n\n如今，站在倒下盟友的血海之中，坎塔尔季耶夫独掌大权。此刻已无人能预知未来走向。他总在谈论暴力与强权，用上帝与沙皇之名唤醒国家，但这些不过是随用随弃的法西斯陈词滥调。真正的未来图景，唯有坎塔尔季耶夫知晓，而他，绝非坦诚相告之人。"
 POLITICS_SIMEON_II_BORIS_DEATH_DESC:0 "西美昂·鲍里索夫·冯·萨克森-科堡-哥达，即保加利亚沙皇西美昂二世，正凝望着祖国壮丽的河山。担任皇储数十载后，他终于得以着手处理棘手的国政。\n\n这位改革派君主年少时多在德意势力范围内的西方求学，满怀着将保加利亚从陈旧的寡头体制转向自由市场的宏愿归国。其父鲍里斯三世曾将这些建言视作黄口小儿的呓语……直到马其顿战争几乎让保加利亚倾覆。那场惨痛经历终于让保守的老沙皇意识到改革势在必行——于是父亲最终追随了儿子的脚步，尽管步履踟蹰，如同西美昂幼时蹒跚学步般谨小慎微。\n\n然而万物终有尽时，鲍里斯三世已然驾鹤西去。新帝胸中自有丘壑万千，但这位不似其父长袖善舞的君主，能否如先皇般轻易赢得民心拥戴，犹在未定之天。"
 POLITICS_SIMEON_II_BORIS_FLIGHT_DESC:0 "西美昂·鲍里索夫·冯·萨克森-科堡-哥达，即保加利亚沙皇西美昂二世，正凝望着祖国壮丽的河山。这是他唯一能转移注意力的方式，唯有如此才能暂时忘却自身处境的岌岌可危，这位年轻君主对实际治国之道实在缺乏准备。\n\n昔为皇储时，这位君主在德意势力范围内的西方世界接受教育，习得诸多治国理论，带着满腹理想与改革方案归国。然而，教导他的知识分子们却未曾传授维系先帝摇摇欲坠的政治联盟的诀窍，更遑论重振王朝雄威。无怪乎这位新君如今会陷入如此困境。\n\n马其顿战争已使保加利亚濒临崩溃，而今另一场崩溃正在上演——共产主义者与法西斯主义者为掌控国家命脉而殊死搏斗。但被尊称为“二世”的沙皇西美昂只能眼睁睁看着祖国在血泊中挣扎。既然他的谕令形同虚设，行动更无足轻重，这位君主又能有何作为呢？"
 POLITICS_SIMEON_II_RESTORATION_DESC:0 "西美昂·鲍里索夫·冯·萨克森-科堡-哥达，即保加利亚沙皇西美昂二世，凝望着祖国壮丽的河山，神色凝重地摇了摇头。千头万绪亟待整顿，这位新君必须即刻着手。\n\n昔为皇储时，这位君主在德意势力范围内的西方世界接受教育，习得诸多治国理论，带着满腹理想与改革方案归国。然而当那些将他视作傀儡的幕后操盘手利用后又将他弃若敝履，最终自身也被祖国阵线推翻时，教导他的知识分子们却未能传授半分稳定时局之策。此刻的西美昂无需西方理论指引——他径直召来忠诚的军警，以铁腕夺回权柄。\n\n沙皇与其首相、那位以清剿共产党著称的前警察总长尼古拉·格舍夫达成共识：当此危局，西美昂昔日的改革主义已成保加利亚不可承受之轻佻。若要重铸山河稳定，必须重拾自复国以来维系国本的威权之道。毕竟，正是这种铁腕统治，曾让保加利亚在惊涛骇浪中屹立不倒。"
 POLITICS_HRISTO_STOYKOV:0 "赫里斯托·斯托伊科夫并非保加利亚独立共和国的真正领袖。基蒙·格奥尔基耶夫·斯托扬诺夫死后，无论是斯托伊科夫还是其他人都无法独掌大权，斯托伊科夫只是三头执政中的一员，每位领袖都代表着支撑环节政权的不同派系联盟，这正是摇摇欲坠的政权急需的。环节不得人心的威权统治与低效法团主义招致左翼、右翼与中间派的激烈抵抗，三头执政集团必须通力合作——至少眼下如此。\n\n曾为格奥尔基耶夫牵线民族主义者与农民联盟的斯托伊科夫，是激进军国派的代言人，这群人与已故格奥尔基耶夫的技术官僚式的威权愿景最为相符。总理斯坦乔·乔拉科夫则是环节官僚集团的首脑，这群官僚构成了保加利亚政府的核心。最后是国防部长迪莫·卡扎索夫，此人无疑最具威望，却因右翼立场及与格奥尔基耶夫的私人恩怨遭到排挤。\n\n如今这三人将共同执政。但在他们培植起足够势力前，即便三人同心协力，也难以企及他们失去的那位铁腕人物的威势。"
 POLITICS_NIKOLA_PETKOV_DESC:0 "尼古拉·季米特洛夫·佩特科夫活得足够长久，见证了保加利亚民主的第一次死亡——尽管他竭尽全力试图挽救。他目睹亚历山大·斯坦鲍利斯基在政变中倒台，流亡巴黎。归国后，他辗转于保加利亚各地的集中营，直到镇压终于稍显缓和。接触过佩特科夫的人无不认同某位记者的评价：“我从未见过比他更崇高的平民之友，更坚定的反法西斯斗士，更赤诚的民主信徒。”\n\n随着祖国阵线统治越发专制，佩特科夫意识到：除非联合整个保加利亚农业人民联盟（而非仅亲近派系）形成反专制统一战线，民主恐将迎来第二次死亡。\n\n西美昂·萨克森-科堡-哥达的拙劣政变爆发时，佩特科夫抓住了天赐良机。他以此为借口，不仅废黜了沙皇，更清除了多年来荼毒保加利亚的所有专制余孽。取而代之的，是佩特科夫为保加利亚加冕的真正多党民主制。\n\n民主之路仍悬而未决。以农民联盟为代表的保加利亚农业主义，因斯坦鲍利斯基漫长且常反民主的政治遗产，始终与党内民主艰难角力。但尼古拉·佩特科夫已向他敬爱而眷顾他的上帝立誓：只要他尚存人世，保加利亚的议会民主绝不会未经抗争便黯然消逝。"
 BUL_rusting_sword_of_damocles:0 "锈蚀的达摩克里斯之剑"
 BUL_rusting_sword_of_damocles_desc:0 "虽说沙皇的确是我国的领袖，但他的权力也并非无限，规模庞大而又无处不在的军队犹如手握达摩克利斯之剑高悬在他的头顶上。可不幸的是，军队没有挥舞这把利剑的能力。保加利亚武装力量充斥着拉帮结派的现象，这些派系或是基于意识形态、或是出于个人利益而组建。因此，军队能发挥出的作用一日不如一日。尽管军中的不团结为沙皇提供了回旋余地，但也给了保加利亚的敌人暗中活动的空间。"
 BUL_king_of_rubies_without_shine:0 "黯淡无光的红宝石之王"
 BUL_king_of_rubies_without_shine_desc:0 "银禧年庆典时，我们曾高呼鲍里斯三世为统一四海之王，赞颂他将保加利亚从《讷伊条约》的枷锁中解放，缔造真正的帝国。而今红宝石禧年之际，这一切却恍如隔世。老迈的君王显露出阴郁面相，面对过去十年间保加利亚经历的种种危机，他那顽固的威权手腕显得力不从心。虽无人质疑陛下治术，但退位之议已如秋叶飘零，悄然落满索非亚宫阙间的廊柱。"
 BUL_empires_cradle_now_a_grave:0 "帝国摇篮，变为坟墓"
 BUL_empires_cradle_now_a_grave_desc:0 "马其顿是腓力三世和亚历山大大帝的摇篮，他们怀揣着帝国的梦想疾驰向前；同一片土地却可能成为鲍里斯的王国的坟墓，真是残酷无情的玩笑。早在十年前，保加利亚军队就差点失去了马其顿，勉力维持至今的掌控也脆弱不堪。如果保加利亚终究还是无法制伏这里，那么沙皇为之奋斗的一切——他的人望、他的帝国、他的遗产，都将成为随葬品。"
 BUL_endless_roots_of_radicals:0 "盘根错节的激进分子"
 BUL_endless_roots_of_radicals_desc:0 "民主，尤其是典型的政党民主，从未在保加利亚国内有过多少市场。但虽说民主已经消亡，其思想残余却也一直存在。加布罗夫斯基灾难性的首相任期过后，保加利亚的法西斯主义仍旧高歌猛进，但对沙皇鲍里斯三世来说，共产党和农民联盟仍是卧榻之侧的心腹大患。只要沙皇权力尚弱，这些群体的根基就只会越扎越深。"
 bul.1.t:0 "你国王没了意不意外"
 bul.1.d:0 "太长不看，总之你的男孩被毒死啦"
 bul.1.a:0 "奠"