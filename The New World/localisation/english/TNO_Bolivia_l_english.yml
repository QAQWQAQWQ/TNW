  ##################
  ### MINISTERS ####
  ##################
  BOL_Alfredo_Mollinedo: "Alfredo Mollinedo"
  BOL_Alfredo_Mollinedo_hog_desc: "§YVice President\nOligarchy§!\n--------------\n§LThere is little to know about the grey suit that holds the Vice Presidency of Bolivia, other than that it was a good pick for the job. Originally the Vice President of the board of directors of la Paz in 1933, Alfredo Mollinedo would become the first Minister of Health of Bolivia in 1938 under Butch. However, his later contributions to Bolivian football are for what he is known for, as his AFLP led the charge of professionalization. This era saw him locked in a struggle with Alfredo Galindo, the manager of the rival FBF, but it was a conflict that Mollinedo would come victorious from.\n\nBeing a PURS party man, he quickly found himself in the list of possible Vice Presidents of Terrazas because of the electoral pact between PURS and the PL, and ultimately, he was chosen because of his name recognition among Bolivians, which AID policy makers expected could give the new oligarchic government some of the much-needed goodwill from the population.§!"
  BOL_Mamerto_Urriolagoitia: "Mamerto Urriolagoitía"
  BOL_Mamerto_Urriolagoitia_for_desc: "§YMinister of Foreign Affairs\nOligarchy§!\n--------------\n§LAngry, putrid, old, those are words that could describe Mamerto Urriolagoitía and his present situation. Born into money, he studied law and with the typical Francophilia of the Latin American aristocracy, he moved to the Gallic country to study international law. He had a bright future ahead of him, and being chosen as Hertzog's Vice President brought him close to the halls of power. He committed the sin however of trying to usurp his president, and the even more grave sin of failing at this task, which turned him into a black sheep inside the PURS.\n\nHe still commanded the loyalty of some hardliners inside the party, but with his chances at the presidency dead, the only post his supporters could assure him was being the Minister of Foreign Affairs, an area in which he had some experience as he had been a delegate to London in the past. But Urriolagoitía has seen his appointment as an exile and dislikes diplomacy, feeling envious that he isn't in charge of the repression, because he believes he could do a better job at it.§!"
  BOL_Antenor_Patino: "Antenor Patiño"
  BOL_Antenor_Patino_eco_desc: "§YMinister of Economic Affairs and Public Finance\nOligarchy§!\n--------------\n§LGrab a Marxist, a liberal and a fascist and they will tell you the same: the fact that Antenor Patiño is in the government, worst of all as the finance minister, is the greatest insult to the exploited Bolivian working class.\n\nOne of the richest men in the Americas, Patiño has the honor of being the heir of his father Simón, "the king of Tin". Such a title isn't a joke by any means, his family owns the majority of the tin mines in Bolivia and are key players of this resource in the global market, not to speak of how Patiño is related to literal nobility through his marriage to María Cristina de Borbón, the Duchess of Durcal.\n\nBrought into the government under the excuse of a technocratic appointment, Patiño has not wasted any time in showing what "technocracy" means in Bolivia. The government being oligarchic not being enough, the elites have decided that the oligarchs should have direct ownership of the government. After all, a government should be made up of the people they represent.§!"
  BOL_Alberto_Crespo_Carpio: "Alberto Crespo Carpio"
  BOL_Alberto_Crespo_Carpio_sec_desc: "§YMinister of Defence\nDespotism§!\n--------------\n§LThe Commander of the Military College from 1950 to 1951, general Alberto Crespo Carpio has certainly already fulfilled his duty to the country. His appointment as the Minister of National Defense comes because of his already proven loyalty to his country and the Oligarchs, as if there is a problem in the Bolivian Armed Forces after years of revolutions and counterrevolutions is which generals to trust.\n\nUnder his recommendations Ovando Candía was appointed Chief of the Army, for his perceived moderation, but Crespo Carpio has come to regret his choice when in private conversation the general has spoke to him of the necessity of reform in Bolivia and how the Oligarchs aren't going to implement them. He has remained silent on the issue however, as he feels he is too old to involve himself in a struggle against the Chief of the Army, and at this point he just wants his term to end so that he can enjoy his retirement.§!"

