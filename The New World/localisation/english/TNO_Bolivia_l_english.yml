  # Mining Wars GUI

  BOL_mining_war_category_desc_BRA: "The situation in Bolivia has grown dire. Our ally §KGeneral Candía's government§! is under threat by a mélange of foes: armed mining syndicates, §JFalangist§! exiles, and §DNationalist§! remnants." 
  BOL_mining_war_help_text_BRA: "While §KGeneral Candía's§! coup has been an unexpected turn in our favor in Bolivia, the so-called "mining wars" in response are threatening to undo our gains.\n\nA variety of forces, from §JFalangist§! exiles to §DNationalist§! remnants, are threatening to overthrow the government and install a new one. As the time to launch their plan draws near, we must act to secure the loyalty of §Ya majority§! of the nation's five §Ykey groups§!.\n\nThe triangular diagram below plots the loyalties of each of the §Ykey groups§!: §YPolice§!, §YLaborers§!, §YMilitary§!, §YPeasants§!, and §YElites§!. Groups in the green §KGovernment§! region have our loyalty, and groups nearest to the region can be most easily convinced."
  BOL_mining_war_group_tooltip: "§Y[BOL_mining_war_selected_group_name]§!\n\nThe §Y[BOL_mining_war_selected_group_name]§! are currently loyal to the [BOL_mining_war_winning_faction_name].\n\n[?BOL.BOL_influences_BRA^i|1]% §KGovernment§!\n[?BOL.BOL_influences_ARG^i|1]% §DNationalists§!\n[?BOL.BOL_influences_CHL^i|1]% §JFalangists§!"
  BOL_mining_war_group_tooltip_delay: "Click to view actions for the §Y[BOL_mining_war_selected_group_name]§!"
  
