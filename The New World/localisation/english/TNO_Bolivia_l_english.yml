  BOL_mining_war_peasants: "Peasants"
  BOL_mining_war_elites: "Elites"

  BOL_mining_war_active_text: "§Y[?BOL.BRA_actions_counter]/2 actions active§!"
  BOL_mining_war_active_text_tooltip: "Our capacity to act in Bolivia is limited. We can only have at most 2 actions active at one time."

  BOL_mining_war_government: "§KGovernment§!"
  BOL_mining_war_falangists: "§JFalangists§!"
  BOL_mining_war_nationalists: "§DNationalists§!"

  BOL_mining_war_falangists_tooltip: "§JFalangists§!\n\nThe §JFSB§! represents the alternative to those patriots in Bolivia who hate the §KOligarchs§! and the §DMNR§!. People might mock them for their fascist ideas, but the §JFalangists§! stand proud as the second force in §jBolivia§!.\n\nThe §JFalangists§! control §Y[?BOL.BOL_CHL_groups_won] key groups§!"
  BOL_mining_war_nationalists_tooltip: "§DNationalists§!\n\nThe §DNationalists§! are the main opposition group in §jBolivia§! to the §KOligarchs§!, they are rallied behind the §DMNR§!, a big-tent party that ranges from the conservative right to the Marxist left.\n\nThe §DNationalists§! control §Y[?BOL.BOL_ARG_groups_won] key groups§!"
  BOL_mining_war_government_tooltip: "§KGovernment§!\n\nAnd above all: every policeman knows that though governments may change, the police remains. To their detractors, the §KGovernment§! represents the same oligarchy that has brought ruin to §jBolivia§!.\n\nThe §KGovernment§! control §Y[?BOL.BOL_BRA_groups_won] key groups§!"

