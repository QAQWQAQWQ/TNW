  ##################
  ## LEADER DESCS ##
  ##################
  BOL_Armando_Alba_Zambrana: "Armando Alba Zambrana"
  POLITICS_ARMANDO_ALBA_ZAMBRANA: "Perhaps one of the worst tragedies of modern Bolivia is that a well-meaning man that loves it so much is so despised. One might argue that this is a fate of his own making, but that doesn't make it any less of a sad story.\n\nBefore becoming president, Armando Alba Zambrana was a beloved figure to Bolivians for how he served his nation. Unlike his brothers who died in the Chaco War he didn't do it militarily, but culturally. From being a war correspondent to a writer to the restorer of the Casa de la Moneda museum, Alba stood out for his magnetism, being known as "The Lord of Speech" and for being one of the greatest Bolivian nationalists who ever lived. Stardom was his fate, and he got it. He managed to become first the mayor, then the deputy and finally the Senator for Potosí, all as an independent and without the backing of anyone but himself. And maybe his success got to his head.\n\nBack in 1958 the oligarchs needed someone to become the president, someone their ABC countries backers could accept. They knew that the people wouldn't stand for another oligarch, so they approached Aba with the offer of being the nominee. He accepted, thinking that he would be given the governability he needed to restore Bolivia to greatness. He was wrong. For the last four years, Alba has been reduced to a puppet of interests he hates, helpless as they continue selling out his beloved country to foreigners. The people hate him, feeling deceived by how a man they took as a hero betrayed them. Alba despises himself too, and at this point only looks forward to the day he gets to stop being the president and the pain ends."
  BOL_Collapsed_Authority: "Collapsed Authority"

  BOL_David_Terrazas: "David Terrazas"
  POLITICS_DAVID_TERRAZAS: "Descending from a family that for generations has served the Liberal Party, it is only natural that David would become a leading figure of it. David Terrazas joined the army when he was 15 years old and took part in the First Chaco War, in which he won many merits thanks to his bravery, such as being promoted to captain mid-battle in 1935. After running the Military College of La Paz for a while, Terrazas became the Chief of the Bolivian Army in 1946 before being sent as a military attaché to the United States. There he served with the Americans in the Siberian War, winning a Legion of Merit for his service.\n\nUnfortunately Terrazas' family connections with the Oligarchs wouldn't go unnoticed. His brother Rubén would be one of the victims of Villarroel's men in the Executions of Chuspipata, an event that shattered his personal life. From that day he became an opponent of the Villarroelite regime, and after his exile, he started to plot various coups in Bolivia, something that made him the target of various assassination attempts.\n\nFollowing the restoration of the Oligarchs in Bolivia, Terrazas was the man elected to lead it, given that he had the entire support and trust of the AID apparatus as he was one of their generals. Since his inauguration, he has carried out his task of turning the clock on Bolivia backwards with Prussian discipline and no mercy. After all, he has seen personally what the people do when they are unleashed, when they are not controlled by their betters. He is fine with the people hating him, he has seen what makes them cheer. And so while the cholos throw their insults and stones at him, he just says the following prayer in his head:\n\n§OThis is all for you, dear brother.§!"
  oligarch_shield_terrazas: "The Oligarch's Shield"

  POLITICS_ALFREDO_OVANDO_CANDIA: "Every soldier knows he has to serve his country, a lesson the political class refuses to learn. Starting with the First Chaco War in 1932, La Paz sent its unprepared forces again and again against Asunción. The stories about Bolivian military incompetence are well known: the drafting of natives who didn't know what Paraguay was, the use of child soldiers given manpower issues, and many more. Among those child soldiers we find a then 15-year-old Ovando Candía.\n\nOne could think that the experience of being sent to war at such a young age would result in many deserved grievances, but Ovando Candía never felt them. As a patriot he was proud to serve his country and to dedicate the rest of his life to the military. Far from being radicalized into any far-right or far-left ideology, Ovando Candía remained a moderate despite being a bit of a Germanophile, never fully adhering to Villarroel's MNR or to the Oligarchs' rule.\n\nHowever, every man has its limits, and the situation in Bolivia degenerated enough that he was forced by it into action. Ovando Candía's plan to bring stability back to his land is to rekindle the flame of military socialism, but there are two big problems with his plans. The first is the opposition to any reform by the conservative wing of the military, the second is that the moderate reforms that military socialism promises are just too little, too late, for the masses that angrily take over mines and prepare revolutions."
  the_half_stepter_ovando: "The Half-Stepper"
  POLITICS_OSCAR_UNZAGA: "From Antofagasta to the Chaco, the National Revolution has somehow ridded itself of all falsifiers. Óscar Únzaga de la Vega won against all odds and has come a long way since his humble start as a student activist in Chile, transforming from the bull for slaughter to the prizefighter of this soon-to-be-reorganized state.\n\nBeginning his career in 1937 with the founding of the FSB from a secret society only consisted of his four closest confidants, Únzaga's early endeavors had not been smooth-sailing. Facing years of MNR's oppression of Falangism through mass terror, at one point to the extent of internment, he had never given up on his ambition of spreading his brand of Christian Democracy, even amidst the revolving door of governments, all of whom bent on destroying the salvation of the Bolivian blood.In a lesser mind, he'd be a person whom many consider a fanatic.\n\nWhile critics called undistilled fascistic thoughts doomed in the Andes, Únzaga knew Falangism is born from the moral pains of a defeated homeland. So against an emboldened Brasília and Santiago, against all measures of infiltration, such as the mutineers of the army and the government's unpatriotic stewards, only finally does the True Faith stand firm. Needless to say, now with the traitor Rioja finally dealt with and Bolivia properly cleansed of foreign influences, no longer shall it be slave to the dogs at embassies and hillside mansions. Long live Bolivia, for her prodigal sons have not abandoned her."
  el_chapu_ungaza: "El Chapu"
  POLITICS_BERNARDINO_BILBAO_RIOJA: "Steady as the course of the Bolivian powderkeg goes, General Bernardino Bilbao Rioja represents an unwelcomed centre between the polarizing directions of the Falange, a semblance of ordered rule that is destined to receive hatred from the radicals. Originating from a well-off household in the village of Arampampa, he'd received his military education in Chile and became an early aviator who rose into prominence during the Chaco War. During his brief tenure as the interim minister of war in 1930, he became a Bolivian national hero leading the legendary Defense of Villamontes.\n\nFor a while, he was venerated and promoted to the Chief of the Army, yet the Bolivian government decided to instead award his brilliance by kidnapping him to Chile. After some time in exile, Rioja came to see the establishment as a detriment to the nation he so passionately loved. Swearing his revenge against such treachery, he began collaborating with the Chilean government to overthrow what he sees as an aberration — at the same time, he also joined Únzaga's FSB, expecting a strong and patriotic dissident group.\n\nHe never thought to ever rise to his former glory, yet multiple instances of incompetence, such as the untimely removal of Guillermo Kenning, allowed him to once again take the helm of the fragile FSB-led regime. Whereas the Old Guards grumble amongst themselves, Rioja will take the initiative to steer Bolivia towards a correct path, of course with the assistance of his Chilean friends."
  the_hero_of_villamontes_bilbao: "The Hero of Villamontes"
  POLITICS_JUAN_JOSE_TORRES: "Socialist, revolutionary, milico, middle-class. Juan José Torres has adorned himself with labels and groups to cover up an overwhelming ambition that has devoured the ideological, all in his quest for power.\n\nOne of his few sincerities came at an early age following the death of his father in the First Chaco War, a love for his mother, respecting her single-minded devotion to tending to their family. Yet ultimately, he still followed in his father's footsteps, joining the military and even going to Argentina to study in the School of Artillery.\n\nArgentina's atmosphere impacted him to the point of becoming a member of the MNR, awed by the rhetorical power of men like Perón and Villarroel. When Ovando's regime took power, Torres became their inside man thanks to his new position as Minister of Finance, carefully hedging his bets in the event of either reform or revolution. As the latter won out, he was proclaimed President by the Popular Assembly, assuming he would be Lechín's puppet.\n\nThis was not nor would ever be enough for Torres, who has used the powers bequeathed to expand his own following as much as possible. Interviews with the right, nods to the peasantry, and handshakes with the left all in a day's work, as the smiling general appears like a hungry lion ready to consume the MNR whole."
  jj_torres: "J.J."
  POLITICS_JUAN_LECHIN_OQUENDO: "A legend within the sphere of Bolivia's labor politics, few can claim as much credit in advancing leftism within the country as Juan Lechín Oquendo. Born in May 19, 1902 to a Mestizo mother and a Lebanese father in the mining town of Corocoro, he was gifted with heterochromia, a peculiarly useless feature which his mother enjoyed pointing out to his neighbors.\n\nAs he matured under a lower-class upbringing, experiencing its benefits and ills, Lechín was never one to stay complacent for long. In his youth, he had worked as anything from a boxer to a merchant. Ultimately, however, he found his persuasion to be one of unionism.\n\nReeled into politics by Trotskyism, Lechín quickly turned towards the MNR, becoming the leader of its left-wing. Despite a tendency towards political expediency, his real interest remains in aiding the common workers. Particularly popular amongst miners, the community he was raised in, he was unanimously proclaimed the leader of the first congress of the Syndical Federation of Bolivian Mineworkers.\n\nEventually, however, Lechín's reputation preceded him when he became leader of the Bolivian Workers' Center — a position which he enjoyed so much that he refused to become the Head of State after the revolution. Instead, he opted to rule with a puppet President of the Popular Assembly — which proved a poor choice as he is now forced into the spotlight. So it seems that if he ever wants an actual retirement, he has to earn it, somehow."
  the_paramount_leader_of_the_COB_lechin: "The Paramount Leader of the COB"
  POLITICS_WALTER_GUEVARA: "One of the founding members of the MNR, Walter Guevara was quick to rise as one of the party's major ideologues as it grew and flourished. Having been an ambitious champion of free-market capitalism since he's been influential, Guevara sees counterrevolution as almost perpetual, only staved off by a system of fair opportunity. However, this stance consolidated him the right-wing figurehead within the party, which made his bid to leadership seem ever more distant, as Villarroel's centre held firm as a de-facto cult of personality, while notables such as Paz Estenssoro and Lechín were keen to keep their positions of power.\n\nHowever, with the Left increasingly alienating the populace from themselves and his opponents all neutralized in one way or another, now it is merely a matter of time for him to end the petulant and irrationality borne from the Popular Assembly as he shall bring back normalcy through sweeping privatization — a procedure most delicate, yet necessary to fix the chaos infesting the market process."
  the_authentic_ideologue_guevara: "The Authentic Ideologue"
  POLITICS_ROGELIO_MIRANDA_BALDIVIA: "With his will, he had managed to break the chains of poverty, yet the faithful Rogelio Miranda is now propelled to a position beyond that of regular success — he is the ruler of a torn nation, one he shall mend through his own will.\n\nThe self-made leader from La Paz had a wholesome, if impoverished, upbringing. As he was educated in righteous ways from a young age, his teenage years in the Catholic school of La Salle consolidated an impermeable virtue of piety in his heart. Later on, as he furthered his career by entering the Military College, his collection of distinctions only grew swiftly from a combination of ethics and intellect.\n\nWhen Ovando Candía still reigned supreme through his strong-armed methods,  Miranda conformed with many other military men in advising the dictator to steer Bolivia away from socialism — as to give no quarters to the petty peasantry aside from their God-given lot of work and toil. But the weak-willed general did not listen and gave way to "reformism", which ultimately doomed the government's decency and his own life.\n\nAptly taking power after a "pragmatist" faced destruction of his own making, Miranda will ensure the Bolivian peasantry, those born to be subservient, to know their place under God's eye — one where they grind away for the greater good without the impediment of their spiritual failings."
  the_conservative_miranda: "The Conservative"
  POLITICS_ENRIQUE_HERTZOG: "A surgeon by trade and a president by duty, Enrique Hertzog was born in La Paz under a classical strand of moderate politics. Starting his career in 1932 during the First Chaco War, stitching up troopers and serving up to 1936, he was elected president for the first time in 1948 under the PURS. The do-nothing administration, as his cabinet was known to many contemporary Bolivians, remains disliked by the general public for neglecting aggressive reforms when the country needed them the most.\n\nRegardless of how little he had accomplished, Hertzog's ability to navigate through bureaucratic messes nonetheless proved impressive. Having managed to defeat his Vice President's attempt at usurpation when he was at the nadir of his popularity, he became a favorable candidate to the OFN after completing his mandate. Following the end of his presidency, Hertzog was thoroughly opposed to his successor's decision to begin the Fourth Chaco War — yet as the Oligarchs failed to heed his warning, his reputation also somewhat recovered from its disastrous outcome.\n\nNow brought back as the few capable of keeping Bolivia's fragile balance of power in check, he returns in an uneasy alliance with the PL as a wisened yet drained figurehead. For his beloved status quo to continue, old Hertzog must learn to embrace something he had never conceived — change."
  oligarch_doctor_hertzog: "Oligarch Doctor"
  POLITICS_RENE_BARRIENTOS: "One cannot survive an autocratic structure without learning its lessons — under the successive dictatorships Bolivia had transitioned through, General René Barrientos had lived, but barely. Now crawling his way back to the top, he can finally see to fruition a country by the worthy, and for the people.\n\nUnlike most of his colleagues, Barrientos never enjoyed the benefits of nepotism. Orphaned at a young age, he pivoted towards the gun-toting way when given the chance for education. After graduating from the military academy in 1943, he became a pilot and trained in America, marking his excellence in the armed forces. But in truth, it was his later participation in the National Revolution that solidified his position. Despite having misaligned with Villarroel's lot, his saving grace was being perceived as a "moderate" — earning him few friends, but fewer enemies.\n\nWith Barrientos and his cultivated allies now in control of every apparatus, he has implemented the "Restoration Program" to ease tensions between oligarchs and the military, while preserving the MNR's nationalist ideals. His strategy of terror is harsh, labor movements and agitators face swift ends. Yet, he remains a friend to the common peasantry, offering a paternalistic trade of favors — each man a client happy to see peace returning. In his eyes, as long as everyone works together, he can continue playing the "People's General" if it keeps Bolivia afloat."
  the_people_general_barrientos: "The People's General"
  POLITICS_VICTOR_PAZ_ESTENSSORO: "The history of liberal democracy in Bolivia treads the line between tragedy and comedy, perverted countless times by oligarchs and strongmen. Víctor Paz Estenssoro promises to write a new history.\n\nHis own history began in the lap of luxury, under a family of landowners who had everything, served by people who had nothing. After another case of abuse by a Patiño mine owner was crushed by Paz, he decided enough was enough and switched sides to fight for the working man instead. Drawing to the left, his start in politics came with the MNR as a youth leader.\n\nA key figure in the party, he was made Minister of Finance during Villarroel's first government, before retreating from the fore after its collapse. In the background, Paz worked the party to rise as a leader of a movement within the movement, molded to his views. But where Bukharin and Trotsky once adorned his bookshelf, now they were replaced with Smith and Paine.\n\nRegardless, Paz now leads, and the party's left must learn to live with his liberal ways. Of course, even he struggles with this path at times, as his opposition is not found across the aisle but in concentration camps. Bolivia has always been a slow learner, and democracy will take its time, issued piecemeal like rations to the starving peasantry."
  don_victor_paz: "Don Víctor"
  POLITICS_GUALBERTO_VILLARROEL: "The rise and fall of Gualberto Villarroel is inextricably tied to the relevance of the well-worn sentiments of militarism and nationalism in Bolivia. Therefore, it is only fitting that its original instigator returns to power as the two feelings reach fever pitch.\n\nFrom humble beginnings to heroism in the Chaco War, he was taught the ways of Military Socialism during Toro and Busch's reigns, infuriated when Bolivia's moneyed interests crushed the cause. In its aftermath, Villarroel retreated to the shadows with RADEPA, a far-right society dedicated to the destruction of the oligarchy.\n\nOn the back of the MNR and military, he was catapulted into power in 1943, swiftly gaining the peasantry's adoration — both indigenous and otherwise — with populist tact. Yet, it was not enough, as his regime collapsed after an ideological haze. A mantle was needed — something more than "Bolivia's Perón" — something Villarroel experienced firsthand...\n\nAnd so, Military Socialism was revived, with Villarroel as its third head. Bolivia has already been converted by its new prophet, as the rest of Latin America is ripe for proselytisation, even if the Santa Cruz issue still looms. However, he knows the only way he will leave Bolivia is by a wooden box, and that his people will now die for him before that would happen."
  the_friend_of_the_poor_villarroel: "The Friend of the Poor"

  generalissimo_banzer: "Generalissimo"
  el_senor_del_habla_zambrana: "El Señor del Habla"
  fallen_hero_zambrana: "Fallen Hero"

  # Ideas
  BOL_Chilean_Contracts: "Chilean Contracts"
  BOL_Mining_War: "The Mining Wars"
  BOL_Mining_War_desc: "The oligarchy has been hanged by the rope they sold, a tattered treaty pinned to its chest, as a military man stands by its gallows facing a crowd still baying for blood.\n\nAn outbreak of miners swapping pickaxes for guns appears to be the starting pistol for the rise of a revolution, with all sides taking bets for which way the cards will fall. Out of necessity or a bending of a knee to the milicos, Brazil props up the Ovando dictatorship with bombs and bullets, levelling dissent to a desert called peace.\n\nOn the opposition, the Argentines have thrown their weight behind the MNR — led by the former failed dictator Gualberto Villarroel — trumpeting a mishmash of militarism, nationalism, and populism that has attracted an unwanted left-wing element. Competing for these affects is Chile, supporting the FSB — Falangist militias and rightist veterans of lost wars — lighting the final fuse for an unfettered bloodbath."
  BOL_patchwork_country: "Patchwork Country"
  BOL_patchwork_country_desc: "In Bolivia there are Indians, there are Mestizos, there are Criollos, but there aren't Bolivians. The failure to properly centralize the nation has also led to failure in uniting the various ethnicities under one flag. The Separatists taking over in Santa Cruz has only added fuel to the fire, as propaganda and Bolivian retaliation has ignited all the Orient with talks of secession. To make things worse unrest has also spread to the natives, as the growing Indianist movement keeps winning acolytes who dream about Pachakuti.\n\nTo reverse this, to make people want to feel Bolivian and be proud, La Paz waves the flag of revanchism by stating that Santa Cruz will be retaken, that the entire Chaco will be retaken. Five Chaco Wars have come and gone without either of them being returned, but what's another string to the bow right?"
  BOL_killing_hope: "Killing Hope"
  BOL_killing_hope_desc: "In the 30s, the peasants thought that Military Socialism would save them, but then Santa Cruz fell and a bullet crossed Busch's brain. The Oligarchs returned. In the 40s Villarroel announced to the people that he would save them, but he was overthrown before he could announce what his project was. And the Oligarchs returned. So did Villarroel, this time as a Military Socialist, as the proud heir of Toro and Busch, but he was removed after military failures. La Paz was soon under the Oligarchs again.\n\nWhere does this leave the people? Worse than before: hopeless, because they know that the Oligarchs are untouchable, that the Tin Barons are Gods, that the Patiños, Hochschilds and Aramayos will never face justice.\n\n§VThey know that if one wants a picture of the future, they have to imagine a boot stamping on a human face—forever.§!"
  BOL_jose_lanzas_lament: "José Lanza's Lament"
  BOL_jose_lanzas_lament_desc: "In the fires of the First Chaco War, General José Lanza, witnessing how the Bolivian army was more concerned with plotting and personal interests than defeating the enemy said the following immortal words:\n\n§Y"I am ashamed of being a Bolivian general!"§!\n\nIf only he was alive to see how things are now! How thankful he must be that he was spared the view of an army completely broken after years of revolutions and counter-revolutions. In fact, such disastrous is the state of the armed forces in Bolivia, that only a Foreign Military Mission can fix it. But then the question is raised.\n\n§OWho will be the foreign power hired to do it?§!"
  BOL_tripartite_pact: "Tripartite Pact"
  BOL_tripartite_pact_desc: "The Tripartite Pact is the name given to a series of treaties signed during Carlos Crespo's interim presidency that secured the neutrality of Bolivia in the South American Cold War. The catch? The country being more or less equally divided for exploitation by Argentina, Brazil, and Chile.\n\nWith the backing of the ABC countries being the only thing that secures the rule of the Oligarchs, they are quite happy with this state of affairs, a beautiful symphony in which rivers of money flows to La Paz while all the costs are paid by the backs of the working class. Beautiful, isn't it?"
  BOL_One_Country_Two_Systems: "One Country, Two Systems"
  BOL_Triumph_Of_The_Orient: "Triumph of the Orient"
  BOL_The_Shadow_War: "The Shadow War"
  BOL_The_Shadow_War_desc: "Conspiracy theories around the Freemasons and their lodges have been a recurring trend in the Western world ever since they first came to prominence. Oftentimes, such conspiracies are wrapped in a dressing of anti-semitism - most prominently, of course, in the German Reich, where Hitler's decrying of the Masons as a Jewish puppet organization directly led to the state-organized mass murder of its members. Rumors of "Masonic plots" have become a boogeyman of leaders from all sides of the political spectrum who need a convenient scapegoat for their nation's woes, regardless of veracity or consequences.\n\nIt is some sort of cruel irony that the only part of the world where this conspiratorial thinking holds any truth is one where its two lodges have long ago splintered away from Masonry altogether.\n\nThe "Caballeros del Oriente" and the "Toborochi", once one and the same until the Toborochi split from the Caballeros, are engaged in a brutal shadow war which engulfs Cruzeño politics. The leadership are all members. The wealthy are all members. The generals are all members. The powerful are all members. If you want to go anywhere in Santa Cruz's society, you will swear yourself to a lodge, or you will find yourself rooted right to where you started."
  BOL_Operation_Condor: "Operation Condor"
  BOL_The_Oriental_Dream: "The Oriental Dream"
  BOL_A_New_Bolivian_Nationalism_STC: "A New Bolivian Nationalism?"
  BOL_A_New_Bolivian_Nationalism_STC_desc: "La Paz has finally done it: the separatists in the Orient have been crushed, and vile Paraguay's ambitions turned to ash. Reintegrating the Cruceño separatists will be no easy task, but this is a triumph that all Bolivians, regardless of their color or background, can take pride in. §yAfter thirty years of losses, Bolivia's future is becoming brighter.§!"
  BOL_A_New_Bolivian_Nationalism_Chaco: "A New Bolivian Nationalism?"
  BOL_A_New_Bolivian_Nationalism_Chaco_desc: "Latin America and the world can only look on in awe as the Bolivian people have accomplished the impossible: not only have they reclaimed their wayward East, but they have driven the Paraguayan army so far back that they have reclaimed the Chaco. Racial and class divides are being eroded as a new Bolivian nationalism emerges, and for the first time in living memory, the people are proud to be Bolivian.\n\n§yLoor eterno a los bravos guerreros,\ncuyo heroico valor y firmeza,\nconquistaron las glorias que empieza\nhoy Bolivia feliz a gozar§!"
  BOL_Decalogue_Of_The_Falangist: "Decalogue of the Falangist"
  BOL_Decalogue_Of_The_Falangist_desc: "1) Love your country above all selfishness.\n2) Dedicate yourself absolutely and eternally to the cause of the movement, which is the cause of Bolivia.\n3) Respect religious convictions.\n4) Be aware of discipline, which is the subordination of the person to the service of the community.\n5) Fulfill your duty for the love of duty and not for the reward.\n6) Improve yourself every day, because the workers of great causes are first builders of themselves.\n7) Disdain life if you sacrifice it for your ideal.\n8) Do not retreat or be a coward.\n9) Be worthy, loyal and willing to sacrifice.\n10) Disdain the comfortable life. A Falangist is above all a fighter. Fight and you will win!\n\n-FSB Principles Program"
  BOL_The_Infernos_Beating_Heart: "The Inferno's Beating Heart"
  BOL_The_Infernos_Beating_Heart_desc: "Hell on earth. Minimal food, bare lodgings, dedicated torture chambers, and walls pockmarked with bullet holes. These are the concentration camps of Bolivia's Revolutionary Nationalist Movement.\n\nThe MNR regime's secret police, the Control Politico, keeps the new blood flowing in. Any threat, any opposition to the MNR is thrown in the back of a truck and driven, choking on exhaust, to their new home. To a steady beat, a new batch of graves appear along the perimeter, and a new set of falangists, communists, journalists, intellectuals, and miscreants take vacant bunks.\n\nAnd as the revolution grows, so too does the Control Politico, its frightened prey, and Bolivia's network of camps."
  BOL_The_Caudillo_Of_The_Revolution: "The Caudillo of the Revolution"
  BOL_The_Caudillo_Of_The_Revolution_desc: "Villarroel is more than just a military strongman; he is the heart and soul of the Bolivian nationalist movement. Both a fervent patriot and an effective revolutionary, he had proven to be not merely another out-of-touch politician through a firm hand and fair administration, bringing thousands out of poverty and punishing the wicked. Beloved by both the impoverished and the liberated natives, his support base is that of a broad and newly emancipated peasantry.\n\nThis illustrious image of a hero formed a robust cult of personality surrounding the colonel, yet as internal party division grows in the background, a looming air of breakdown continues tarnishing Villarroel's perceived competence despite his endless repertoire of rhetorics and populist tricks."
  BOL_A_Silent_Democracy: "A Silent Democracy"
  BOL_A_Silent_Democracy_desc: "The fading spirit of revolution gave birth to something with far greater potential and longevity — the liberal-democratic order. Enforcing the tradition of the rule of law posited by Western philosophers, Paz Estenssoro, for the first time in many decades, manages to bring stability to Bolivia.\n\nWorking behind the scene to ensure the MNR's survival while guiding Bolivia to self-determination. Estenssoro has managed to muzzle most oppositional elements to consolidate the party's hegemony before the people can partake in the electoral process. In these first steps taken by the Bolivian democracy, it is up to the MNR to maintain the fledgling state's fragile national security."
  BOL_A_New_Synthesis: "A New Synthesis"
  BOL_A_New_Synthesis_desc: "Following the footsteps of David Toro and German Bush, the MNR's founding was a lofty pursuit to extol law and order through the ideological framework of Military Socialism. As years went by, however, the many internal fracturings that inevitably occurred within the party's big tent context seemed to have transformed it into a dysfunctional mess no better than any other failed movements.\n\nForced to embrace change under dire circumstances, a new synthesis, born from a fusion of Argentine Justicialism with traditional Bolivian patriotism, came about to bring unity back to the factionalized MNR. The people now see Villarroel as the man who aligned the stars into a harmonious existence, yet a question remains in the colonel's heart.\n\nWill the future generations forgive a traitor?"
  BOL_The_Popular_Assembly: "The Popular Assembly"
  BOL_The_Popular_Assembly_desc: "The Popular Assembly is the organization of the Bolivian unionist, labor, and popular movements that seeks to establish its own organ of power to replace the bourgeois parliament. In many respects, it is akin to a workers' council, and right-wing foreign press has taken to labeling it as a "Soviet."\n\nThe Popular Assembly, while smeared as communist, hasn't actually established any form of a socialist regime. Despite what critics may say, capitalism, albeit in a more limited form, still exists within Bolivia."
  BOL_A_Revolutionary_Dictatorship: "A Revolutionary Dictatorship"
  BOL_A_Revolutionary_Dictatorship_desc: "The Popular Assembly was a joke, and not a particularly funny one. Dirtbags who don't even shower shouldn't be rulers-can't be rulers. It'd be a disaster to let them have free reign over the country.\n\nLuckily for Bolivia, the good general has removed them from power and put them back where they belong. As he did so, he gave them a generous bargain: They can support his new regime, or else. After all, everybody knows that only the good men of the armed forces are qualified to actually carry out the progressive national revolution Bolivia has needed for so long."
  BOL_The_Soviet_Republic: "The Soviet Republic"
  BOL_The_Soviet_Republic_desc: "Lechín's false reformist project crashed and burned into ash, and from its corpse the fires of revolution burn once more. The new republic that has risen is governed by the immortal science of Bolshevik-Leninism and the POR, with Guillermo Lora at its helm.\n\nNow the people of Bolivia will experience true liberation under proper socialism. No longer shall they be at the mercy of leeches, nor the petit bourgeoisie of the treacherous unions. The Bolivian Socialist Soviet Republic is prepared to defend its people against all threats to the revolution. Let it be known that Bolivia is red, now and forever."
  BOL_Fiances_Of_Death: "Fiancés of Death"
  BOL_Fiances_Of_Death_desc: "While the Mining Wars may be over, the violence in Bolivia continues. Horrified at the revolutionary reforms of the National Revolution, a collection of disaffected landowners, soldiers, and other reactionaries have begun an insurgency that has rendered much of the countryside from government control. The most notorious among them is a group of terrorists nicknamed the 'Fiancés of Death'.  Radicalized by contacts with the international fascist organizations and funded by a reinvigorated drug trade they have struck terror into the countryside, targeting alleged supporters of the new regime.\n\nWith economic and political woes abound, the revolutionary government has been able to do little to counter this threat, leading many to question its long-term viability."
  BOL_The_True_National_Revolution: "The True National Revolution"
  BOL_The_True_National_Revolution_desc: "While the MNR has long promised a national revolution for Bolivia, it was Juan José Torres who was able to finally achieve it. Large chunks of the country's vast mining wealth have been nationalized and a People's Assembly has been formed to carry out sweeping left-wing political and social reforms. The Bolivian nation will finally be restored to its rightful owners: the people.\n\nAnd yet all is not well. These sweeping changes have also necessitated the purging of large sections of the government and military hindering their efficacy and driving dissent and emigration. But worst of all, Bolivia's neighbors conspire to crush the revolution in its cradle, creating an economic blockade that has crippled the nation's economy. The dreams of the Bolivian people hang in the balance."
  BOL_A_National_Reaction: "A National Reaction?"
  BOL_A_National_Reaction_desc: "With the coming of a new much more moderate regime to La Paz many fear or hope for the undoing of Torres's regime's vast program of reforms. However, both sides have been left disappointed. In an effort to balance his shaky political position President Guevara has undone and retained elements of the National Revolution in equal measure.\n\nNonetheless, with each passing day, the strength of the left wing dissipates harried by paramilitary violence from the Fiancés of Death and increasing frosty relations with the regime. For how long this balancing act will be maintained is still an open question."
  BOL_Bolivia_Open_For_Business: "Bolivia Open for Business"
  BOL_Bolivia_Open_For_Business_desc: "The combination of the harsh protectionist policies of the Torres regime and its international isolation nearly shattered the export-oriented economy of Bolivia. But now with the new moderate nationalist government of Guevara, things are slowly returning to normal. Though the government still has a heavy hand over the economy, the lucrative mining industry is once again open to exploitation.\n\nBut rare metals aren't the only product coming and going from Bolivia these days. The legacy of the anti-Torres insurgency has entrenched Bolivia in the international drug trade, as its still untamed hinterland has become a trade hub for Manchurian opioids and the emerging cash crop of Cocaine."
  BOL_Dual_Yoke: "Dual Yoke"
  BOL_Dual_Yoke_desc: "Can allies of convenience really be allies at all? The question rings out to the diplomatic core of Brazil and Chile following their joint ejection from the business of Bolivia's exploitation, cut out of their slice of the pie by greed disguised as virtue, celebrated by men of industry as those under them sweated profit in lamplit mines. But greed does not stop at an exact percentage; it boils, waiting for the next slice that can be stolen.\n\nAs weeks turn to months, hungry eyes from both Brazil and Chile seem certain to look with longing at the other's Bolivian holdings, salivating at the chance of a more efficient imperialism. The hopeful among them pray that it can be averted. The bold believe it belongs solely to one nation. The Bolivians can only continue to despair."
  BOL_La_Ruta_Del_Plata: "La Ruta del Plata"
  BOL_La_Ruta_Del_Plata_desc: "When the Spaniards lorded over the Americas, the Viceroyalty of the Río de la Plata functioned as an epicenter for plunderers and scoundrels alike - taking their booty across the Andes downstream for distribution and supplying. Nowadays, the Argentinians appear keen to revive this colonial legacy in deplorable self-interest, as Buenos Aires receives much of their ill-gotten riches from the tumultuous Bolivian nation with little regard for retribution."
  BOL_Jaguars_Prey: "Jaguar's Prey"
  BOL_Jaguars_Prey_desc: "Instead of chasing after their prey like the Cheetahs and Lions of Africa, the Jaguars that roam South America stalk their prey, waiting for opportunities to ambush. Then, a powerful bite to the back of the head brings the animal down. Then, their fangs tear away flesh and slurp up the still-warm blood.\n\nMuch like a Jaguar, Brazil has stalked Bolivia, waiting for economic vulnerability to pounce. Its fangs tear away our precious metals, and they guzzle our natural gas. It's an animal world, and Bolivia finds itself at the bottom of the food chain."
  BOL_In_The_Condors_Nest: "In the Condor's Nest"
  BOL_In_The_Condors_Nest_desc: "The Andean Condor is a scavenger, not a bird of prey. Their feet and legs are relatively weak, making them unable to hunt or fight eagles over hunting grounds. Instead, they seek out carcasses of large animals or wounded smaller animals to feed their spawn.\n\nLike a condor, Chile has kidnapped Bolivia from the ground and taken us to their nest to feed their young. The mining and natural gas companies of Chile squawk and clamor for their chance to feed on the prey their father brought."
  BOL_Military_Peasant_Alliance: "Military-Peasant Alliance"
  BOL_Military_Peasant_Alliance_desc: "Whatever damages the army have done in the past, now is the time to rectify those mistakes. The outsiders who bring false accusations concerning the mistreatment of the peasantry will be satisfied knowing a pact has finally materialized. From now on, the government promises to cease all hostilities and fund private plantations with socioeconomic aid. In exchange, all that is required is for those farmers to cooperate in ending the division that has undone Bolivia for the past three decades."
  BOL_Paz_Orden_Y_Progreso: "Paz, Orden y Progreso"
  BOL_Paz_Orden_Y_Progreso_desc: "A product of spiritual poverty is an intense unwillingness to pursue society's greater good. Unfortunately, the Bolivian peasantry became infected by this sort of pestilence. There is no 'cure' as reformists suggest, and giving a spineless compromise will not return productivity to those lazy beggars. For Bolivia to become peaceful again, their slander against the government deserves repression, and they will return to their proper place of toiling in the fields with no more carrots and sticks."
  BOL_Fury_Of_The_Old_Guard: "Fury of the Old Guard"
  BOL_Fury_Of_The_Old_Guard_desc: "The disorganization of FSB's ranks has brought out the worst scenario envisioned. With the sacred ideal of Falange now usurped by the unsightly Rioja, there is nothing more to halt the degeneration of the Bolivian civilization. But despair is an ideology of the frail, and Únzaga's type knows better than to cede power freely to someone so feckless and unreasonable. It will only be through the most brutal of political struggles that the true sons of Bolivia regain the god-given right to rule."
  BOL_The_Undying_Flame: "The Undying Flame"
  BOL_The_Undying_Flame_desc: "Rioja thought he could choose to betray the revolution, but there was no good ending for the backstabber. For the civilized peoples, most found his deviation abhorrent and Napoleonism palpable. However, such treachery only allowed a baptism of fire to the loyal White Shirts, with Óscar Únzaga bearing the torch of Falange to witness a rebirth of the Bolivian nation. Now that the Great Work reigns triumphant, all shall witness a Bolivia without Chilean savagery built upon morality and might."
  BOL_The_Declawed_Eagle: "The Declawed Eagle"
  BOL_The_Declawed_Eagle_desc: "For an unaware Chilean observer, with the FSB's continuous presence, Bolivia's future appears as grim as ever. Yet something has changed. The institution grew more open and democratic, and years of militarism have finally become a topic of the past. Diplomatic operators in Santiago sigh in relief following their resounding success in taming the Falangist mechanism. But even the most naive optimists still question whether it's just a masquerade, biding time to rear its ugly head again."
  ABC_tripartite_pact: "Bolivian Riches"
  ABC_Dual_Yoke: "Bolivian Riches"
  ABC_bolivian_riches: "Bolivian Riches"


