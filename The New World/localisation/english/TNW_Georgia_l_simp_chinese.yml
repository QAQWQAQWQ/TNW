 POLITICS_SHALVA_LOLADZE_DESC: "沙尔瓦·洛拉泽为保卫祖国奉献了所有——荣誉、尊严与热血。德国入侵苏联时，他加入苏联空军，成为一名飞行员。奈何命运弄人，他的战机在乌克兰占领区被击落。面对被投入纳粹战俘营与加入格鲁吉亚军团成为合作者的选择，他选择了后者。军团的普通士兵多是憎恨苏联或是谋求活命的格鲁吉亚战俘，而高层则是格鲁吉亚民主共和国的遗老——这群自苏联胜利后流亡异国的将军政客，无时无刻不梦想着重返故土。德国胜利后，他们虽得以回归，却沦为德国人统治格鲁吉亚的帮凶傀儡。\n\n军团内部逐渐分裂：守旧派主张隐忍待机，少壮派则渴望主动出击。西俄战争爆发、外高加索苏维埃起义时，指挥官们仍死心塌地效忠德国，幻想德军平定叛乱后会论功行赏。这样的期待终究化为泡影，卡捷琳施塔特政权因约西亚斯之死而瓦解，而将军们只是又一次命令士兵忍耐。以沙尔瓦为首的中层军官们终于发动兵变，他们拘押抗命的长官，枪毙反对派，推翻德国驻军，格鲁吉亚国旗再度飘扬在第比利斯上空。如今，他不再有主子、也不再有领袖，他只为自己而战，只为这面祖国的旗帜而战。"
 POLITICS_GIVI_JAVAKHISHVILI_DESC: "吉维·德米特里耶维奇·雅瓦赫什维利既不是军人也不是演说家，而是一位温文尔雅的官僚，负责管理格鲁吉亚苏维埃社会主义共和国的水利基础设施委员会。第比利斯陷落后，收留他的游击队员曾指责他在组建抵抗网络方面毫无建树，但他却自信地表示，他拥有一种更加重要的技能：构建政府体系。赢得战争固然重要，但要是抵抗势力无力巩固政权、恢复秩序，胜利又有何意义？面对混乱与贫穷，民众难道不会选择能保障他们生存的一方吗？\n\n于是，雅瓦赫什维利开始在抵抗组织之间建立联系。他不仅联络武装人员，更广泛结交工会领袖、科学家、会计师、教师等社会各界人士，为重建格鲁吉亚储备人才。原本松散的游击队联盟逐渐壮大，最终孕育出一个影子政府的雏形——这个隐形政权随时准备夺取权力，接管旧有行政体系的种种事务。\n\n西俄战争期间，他们曾尝试与外高加索苏维埃协调行动，但德军发起反扑打断了双方的实质性合作，他们只得再度蛰伏，静待时机。约西亚斯的死意味着雅瓦赫什维利的梦想终于得以实现，他和盟友在格鲁吉亚苏维埃全境发动期待已久的起义，击垮了合作者与疲于奔命的德国驻军。硝烟散尽，新生的政府立即登上舞台，开始接管国家机器。但无论如何，要建立一个国家，就必须先赢得战争——现在就是让雅瓦赫什维利兑现诺言的时刻。"
