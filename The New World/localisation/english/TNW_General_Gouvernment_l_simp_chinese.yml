 POL_Warn:0 "§R波兰人民最终将摆脱压迫者，但面对复兴的德国巨无霸，生存的前景确实非常渺茫。§!"
 POLITICS_HANS_FRANK_DESC:0 "律师、士兵、纳粹忠臣——现在，或许还是一名国王。汉斯·弗兰克将一生奉献给了民族社会主义党，曾与他的领袖一起发动了失败的啤酒馆暴动。二战期间，第三帝国以摧枯拉朽之势击溃了波兰，弗兰克随即被任命为管理此地的总督。他与党卫队通力合作，折断了波兰人民的脊梁，对学者、神职人员以及任何可能对德国新秩序构成威胁的波兰人进行了大肆屠杀。在弗兰克和党卫队的统治下，无数平民百姓的鲜血被炼化为燃料，点燃了名为死亡的焚炉。\n\n进入1942年后，希特勒不再像之前那般青睐弗兰克，总督发现自己在领地内正逐渐陷入孤立。西俄战争期间党卫队的背叛点燃了元首的怒火，导致希姆莱分子被彻底逐出波兰。这下，弗兰克真正成了孤家寡人，集中营内的“劣等种族”已被屠杀殆尽，他只能充当向日耳曼尼亚运送奴隶的批发商。前方等待着他的没有荣耀，也没有新的胜利能让他东山再起。除非，弗兰克能为自己创造赢得荣耀的机会。\n\n当日耳曼尼亚暗流涌动，希特勒的精神状态每况愈下之时，弗兰克对波兰的掌控却在不断增强。总督整天畅想着如何建造更多的摩天大楼、纪念碑和美术博物馆，梦想着将华沙改造为雅利安文化的胜地。人们私下嘲讽他为“斯塔利斯劳国王”，但这讥讽之言背后却暗藏着真相——汉斯·弗兰克也许真的能成为国王。"
 POLITICS_INTERIMREGIERUNG_DESC:0 "总督府再度跪服于德国人的铁蹄之下，依照马丁·鲍曼的命令，一个临时的过渡政府已经建立以稳定该地区的局势。这一政府由办事效率最高的德国官僚组成，假若元首愿意，它便可以立刻把权力交接给由其任命的新任专员。"
 POLITICS_EDUARD_WAGNER_DESC:0 "这片曾被称为波兰的土地如今已成为德国的核心腹地，是连接东西部的重要纽带。既然波兰已被永久征服，现在亟需一位能确保火车准点运行的铁腕人物——此人需雷厉风行、默默奉献且行事毫无顾忌。爱德华·瓦格纳正是天选之人。\n\n后勤专家鲜少能青史留名，但作为军需总监的瓦格纳早在1939年就与希姆莱、海德里希之流过从甚密，却未沦为其附庸。他在前线后方推行治安措施的热情令人侧目，将国防军与别动队协调成高效镇压机器。随着德国不断东扩，其职责愈发艰巨，但瓦格纳绝非对上级要求唯命是从的应声虫。他曾就燃油问题向希特勒直陈隐忧，虽招致元首一时震怒，却赢得了“绝不粉饰太平”的铁血名声。国防军内部对其意见日益重视，尽管身处权力边缘，其影响力却与日俱增。\n\n蛰伏岁月令瓦格纳对权力巅峰愈发渴望，他将不择手段确保祖国心脏地带的运转永不停滞。"
 POLITICS_THEODOR_KOCH_DESC:0 "德意志国是一台机械——而有什么人能比工程师更胜任于运作它最重要的部件呢？尽管总督府对德国十分重要，它依旧相当落后，与它将要融入的德国核心地带相去甚远——这就是为什么特奥多尔·科赫在这里。\n\n步枪是一种美丽的东西。它是一种只具有单一目的的机械，其必须适应各种环境和条件。科赫在毛瑟公司工作的经历让他为枪支的纯粹性所倾倒。但商业中没有忠诚一词，科赫很快就把他在毛瑟公司之所学应用到政府赞助的国家工厂的产品上。那令人印象深刻的科技与商业智慧的结合让他在集团内部开辟了自己的天地。他不仅支配了集团内的轻武器部门，还像巨龙守护财宝一样保守着他的技术机密。而总督府的重建让他又找到了一个机会。\n\n回转的齿轮与纠缠的传送带，配合着在无穷的工厂中工作的无尽双手，这就是科赫对总督府的设想。它们只为一个目的存在——武装德国。而出产的步枪，手枪，头盔，子弹上面只印着一个生产商——总督府。"
 POLITICS_WERNER_DOLLINGER_DESC:0 "维尔纳·多林格是个异类，一位真正受当权派青睐的改革派。尽管他修读经济学与社会学的背景可能引起党内保守势力的猜疑，但作为忠诚的爱国者，他曾在东线战场的国防军中履行过战斗职责。退役后，多林格始终在经济规划领域勤勉耕耘，以精湛技艺服务家乡巴伐利亚。然而近期，他独特而温和的改革主义理念开始引发关注。\n\n这位巴伐利亚工业巨头力捧的总督人选，凭借高质量的产业分析报告与精准的财政预判能力，成为整合德国资本在这片前波兰欠发达地区利益的最佳代理人。其亲和作风与“温和改革派”的立场定位，更使他赢得党内建制派支持。若能妥善施政，或许能在德国利益与波兰民生需求间找到微妙平衡——仅仅是或许。"
