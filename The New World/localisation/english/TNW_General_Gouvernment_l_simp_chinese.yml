 GGN:0 "总督府"
 GGN_DEF:0 "总督府"
 GGN_ADJ:0 "德国"
 GGN_Underground_State:0 "波兰地下国"
 GGN_Underground_State_desc:0 "几十年前，在那场空前猛烈的风暴下，德国国防军席卷了欧罗巴。波兰人面对困难勇敢地抗争着，直到结局——自此，波兰民族之光永远熄灭了。\n\n大多数人都是这样相信的。\n\n几十年过去了，无论是在阴影中窥探的某些人，还是坐落于克拉考的汉斯·弗兰克政府，都越发清楚波兰民族在阴影中苟活了下来，不，成长了起来。总督府昏庸无能，波兰人精明能干，借此，波兰地下国成了一根芒刺，附着在德国及其对波兰领土的霸权之上。\n\n§R他们的目标则无比明确。§!"