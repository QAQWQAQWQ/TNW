 TNO_TIPS_AND_TRICKS_CLOSE_TT: "§F您可以通过左键点击§G戒备等级§!计数器左侧的§M问号§!按钮重新打开此窗口。\n§Y祝您好运，玩的开心！§!§!"
 TNO_tips_and_tricks_entry_title_0: "简介"
 TNO_tips_and_tricks_entry_desc_0: "欢迎来到§W新秩序§!！\n-本模组规模宏大、内容精深，部分机制可能会让新玩家感到无从下手。为此我们特别准备了这个指引界面，助您更快掌握游戏要领。\n-您可通过底部箭头按钮切换提示，点击骰子按钮获取随机提示，或直接点选左侧§Y目录§!查看特定内容。\n-您可以随时点击屏幕右上角§G戒备等级§!计数器左侧的§M问号按钮§!重新打开本指引界面。"
 TNO_tips_and_tricks_entry_title_100: ""
 TNO_tips_and_tricks_entry_desc_100: ""
 TNO_tips_and_tricks_entry_category_1: "§G经济§!"
 TNO_tips_and_tricks_entry_category_2: "§R军队与战争§!"
 TNO_tips_and_tricks_entry_category_3: "§Y建设§!"
 TNO_tips_and_tricks_entry_title_1: "简介"
 TNO_tips_and_tricks_entry_desc_1: "-§WTNO§!区别于其他模组的特点之一是其对经济系统运行过程的模拟。这套系统看似复杂，但只需稍加指点，您就能在完成首局游戏后将它运用自如。\n-游戏内每周至少查看一次经济面板，并相应调整支出。\n-不要害怕赤字，但要尽量保持赤字小于GDP增长率。请注意，任何形式的赤字都意味着债务负担率会随着时间推移而增加。\n-在最初的几局游戏中，可以尽量追求预算平衡，以适应机制。"
 TNO_tips_and_tricks_entry_title_2: "生产单位"
 TNO_tips_and_tricks_entry_desc_2: "-£tt_prod_unit §G生产单位§!是对国家工业实力的抽象表示，取代了原版的工厂机制。\n-£tt_prod_unit §G生产单位§!主要来源于§YGDP§!，但在游戏过程中，您也可通过国策或决议获取更多生产单位。\n-在§Y经济§!与§Y生产§!界面中，您可手动调整£tt_prod_unit §G生产单位§!的分配，将其投入£tt_civ_factory §R民用§!或£tt_mil_factory §G军用§!生产。此外，£tt_prod_unit §G生产单位§!还会自动划拨一部分用于生产£tt_consumer_goods §B生活消费品§!。"
 TNO_tips_and_tricks_entry_title_3: "电网电力"
 TNO_tips_and_tricks_entry_desc_3: "-£tt_prod_unit §G生产单位§!需要电网£tt_power §Y供电§!才能运转。将鼠标悬停在顶部状态栏的§Y闪电图标§!上，即可查看当前电网的£tt_power §Y净发电量§!。\n-£tt_power §Y电力§!主要§G来源§!于§Y热电厂§!、§Y核电站§!等发电设施，同时电力会被§Y办公大楼§!、§Y学校§!等建筑§R消耗§!，§Y民用耗电§!也是重要支出项（后续将详细说明）。\n-要维持经济体系稳定运行，必须未雨绸缪，确保发电量始终能满足持续增长的用电需求。"
 TNO_tips_and_tricks_entry_title_4: "民用消费"
 TNO_tips_and_tricks_entry_desc_4: "-在游戏中，§Y国民§!日常生活所需的各种商品物资被抽象为£tt_consumer_goods §B生活消费品§!，国家需要调配部分产能来生产它们。除此之外，电网还需要为民用企业和家庭£tt_power §Y供电§!。\n-您可在§Y经济§!界面的§Y生产单位界面§!中，调整用于供给民生的产能比例：§G超过§!100%将获得§G增益§!，§R不足§!则会产生§R减益§!。\n-务必密切关注这项指标，及时作出调整。"
 TNO_tips_and_tricks_entry_title_5: "预算管理"
 TNO_tips_and_tricks_entry_desc_5: "-§Y经济§!界面显示关于经济的全部信息，您需要重点关注的核心功能是屏幕中央周围的四个按钮。\n-§R财政紧缩§!管控支出规模，§R减税§!与§R增税§!则用于调节§G财政收入§!。在它们下方您会看到可拖动的§Y滑块§!，调整它们将相应改变您的§Y支出§!。\n-适度的§R财政赤字§!能刺激经济增长，但请始终将§R赤字§!控制在10%以内；记住，任何§R赤字§!都会增加§R债务§!。"
 TNO_tips_and_tricks_entry_title_6: "央行政策"
 TNO_tips_and_tricks_entry_desc_6: "-§Y央行政策§!可为您提供§G战略增益§!，使经济更好管理。\n-点击屏幕左侧§J货币扩张§!滑条下方的按钮即可设置§Y央行政策§!。政策需要一年时间生效，建议提前规划。\n-§Y超发货币§!政策：提升§G经济增长率§!，£inflation_texticon §R通胀率§!低于4%时效果最佳。\n-§Y控制预算§!政策：降低£inflation_texticon §R通胀率§!，£inflation_texticon §R通胀率§!高于4%时最有用。\n-§Y电力增产§!政策：根据§YGDP§!比例提供额外£tt_power §Y电力§!，对小国特别有效。"
 TNO_tips_and_tricks_entry_title_7: "预防危机"
 TNO_tips_and_tricks_entry_desc_7: "-防范§e危机§!重在预防。请密切关注§Y经济§!界面右下角的指标，及时调整§Y财政支出§!。\n-为避免§e财政危机§!，务必保证§R债务§!低于经济界面左上角显示的§R债务上限§!。\n-将§Y支出§!拉满可以提供许多§G有用的增益§!，因此请考虑其他降低成本的方式。\n-战时或扮演俄罗斯军阀时，可通过征收§Y战争税§!增加§G财政收入§!。\n-和平时期，可通过减少部署的陆军师和空军规模来节省开支。"
 TNO_tips_and_tricks_entry_title_8: "经济滑块"
 TNO_tips_and_tricks_entry_desc_8: "-§Y调整滑块§!与§R财政紧缩§!和§R增税§!并不互斥。请综合考虑它们的效果和协同作用。\n-点击滑块名称左侧的§G齿轮§!图标，可以打开分类面板并使用子滑块进行更精确的资金分配。\n-每个滑块都会直接影响政策落实率。例如，§O行政开支§!分类中的§O官僚经费§!滑块会提高§G税收效率§!，从而增加§G收入§!。\n-建议始终将§O官僚经费§!和§O科研开支§!保持在最高水平。"
 TNO_tips_and_tricks_entry_title_11: "生产"
 TNO_tips_and_tricks_entry_desc_15: "-§Y野战炮§!是现代战争中已经过时的武器。尽管其火力毋庸置疑，但诸多§R缺点§!让它显得相当过时。\n-炮兵行动迟缓且笨重，将§Y炮兵营§!编入师中会§R降低§!部队的速度。\n-炮兵能造成毁灭性打击，但也会显著§R降低§!部队的§G装备缴获率§!。\n-除此之外，与其他所有§Y营§!相比，§Y炮兵§!还会§R整体降低§!部队的组织度和恢复速度。\n-§Y反坦克炮§!和§Y防空炮§!也同样过时，已被便携式步兵武器所取代。"
 TNO_tips_and_tricks_entry_category_0: "§W简介§!"
 Tips_and_Tricks_Contents_Folder_button_tt: "§F点击打开“[GetTipContentsFolder]”条目的介绍§!"
 Tips_and_Tricks_Contents_Content_button_tt: "§F点击打开“§Y[GetTipContentsContent]§!”相关的技巧§!"
 TNO_tips_and_tricks_entry_title_9: "社会发展"
 TNO_tips_and_tricks_entry_desc_9: "-滚动至§Y政治§!界面最底部即可查看社会发展。\n-点击社会发展类别名称右侧的§M蓝色方框§!，即可查看该分类所有等级及其对应效果。\n-将光标悬停在§O贫困率§!上即可查看当前等级产生的影响。\n-将光标悬停在“趋势：”右侧的进度条上，即可查看该分类的月度进展。\n-除显示的效果之外，§Y社会发展§!还会影响国家§G生产§!和§M科研§!效率。建议您全面§G提升§!各项指标以保持竞争力。"
 TNO_tips_and_tricks_entry_title_10: "简介"
 TNO_tips_and_tricks_entry_desc_10: "-§Y冷战§!时代的战争或许与您常常看到的不同。世界大国会避免相互之间的直接战争，而是通过§Y代理人冲突§!培植盟友，在全世界扩张影响力。\n-§Z云南§!和§&俄罗斯军阀§!等势力提供了更多以战争为重点的传统玩法。\n-无论您选择哪个国家，都请注意§WTNO§!还为战斗、师和后勤系统带来了许多变化，本条目别将引导您了解这些变化。\n-开始之前，请记住，在冲突时增加§O陆军开支§!能让你的部队拥有更强的战斗力。"
 TNO_tips_and_tricks_entry_desc_11: "- 想要打赢战争，您就需要生产武器。您可以在§Y生产§!界面制造武器。\n- 您可以通过点击§G绿色齿轮按钮§!，将更多£tt_prod_unit §G生产单位§!分配给£tt_mil_factory §G军事生产§!。\n- 如果§Y社会发展§!水平不足，您可能只能使用£tt_mil_workshop §O军用作坊§!，它们提供两倍的§Y生产§!槽位，但效率要低得多。\n- 鉴于生产能力有限，建议您进行标准化生产。对于小国，可以考虑只生产§Y步兵装备§!。"
 TNO_tips_and_tricks_entry_title_12: "编制 - 基础"
 TNO_tips_and_tricks_entry_desc_12: "-§WTNO§!的广泛变化也延伸到了§MAI§!之上。要想在战斗中击败敌人，升级、优化您的§Y师编制§!非常重要。\n-在§WTNO§!中，§R地形惩罚§!明显更强。在编制部队时，务必注意将会在何种地形条件中作战。\n-绝大多数§Y代理人冲突§!都可以通过派遣§Y志愿军部队§!解决。由于只能派遣少数部队参加特定的代理人冲突，所以最好保证您派出的师§R战力满满§!，其§Y战斗宽度§!最好达到20或更高。\n-在§WTNO§!中，§Y战斗支援连§!提供了相当多的§G增益§!，推荐尽可能多地编制它们。"
 TNO_tips_and_tricks_entry_title_13: "编制 - 步兵"
 TNO_tips_and_tricks_entry_desc_13: "-§Y步兵§!是军队的主要组成部分，生产花费较低，受到的§R地形惩罚§!也最轻。§Y步兵§!分为三类：\n1)§.轻步兵§!，整体战斗力较弱，但生产花费较低，组织度恢复速度较快。\n2)§s常规步兵§!，各方面能力均衡。\n3)§w精锐步兵§!，生产花费较高，但战斗力最强。\n-您还可以在部队中编制§B海军陆战队§!和§b山地步兵§!，它们比其他类型步兵消耗的补给更少。在§WTNO§!中，§Y特种部队§!单位没有上限限制，可以随意编制。"
 TNO_tips_and_tricks_entry_title_14: "编制 - 机动部队"
 TNO_tips_and_tricks_entry_desc_14: "-与§W原版§!不同，§WTNO§!中几乎所有§Y营§!和§Y战斗支援连§!都会影响师的§G装备缴获率§!。如果在战斗中获胜，师的§G装备缴获率§!将按战斗持续的小时数计算。\n-§Y机动部队§!营拥有最高的§G装备缴获率§!。\n-在大多数地形中，§Y机动部队§!也会受到显著的§R减益§!影响，这限制了它们的灵活程度，战斗表现通常比§Y步兵§!更差。\n-由于§R不利地形§!在§Y代理人冲突§!中普遍存在，因此在设计部队模板时，最好将重点放在其他§Y营§!上。"
 TNO_tips_and_tricks_entry_title_15: "编制 - 炮兵"
 TNO_tips_and_tricks_entry_title_16: "编制 - 装甲部队"
 TNO_tips_and_tricks_entry_desc_16: "-在现代战争中，§Y协同作战§!战术至关重要。在部队中编制§Y装甲§!部队可以§G减少§!其受到的伤亡，且明显§G增加§!火力输出，并§G增强§!其突破能力。\n-§Y装甲§!部队还能从相当高的§G装备缴获率§!中获益。\n-§R地形和组织度惩罚§!是§Y装甲营§!最大的§R弱点§!，但通过将其与§Y步兵营§!一起使用，可以相当容易地将其§G抵消§!。\n-虽然您可能缺乏现代§Y装甲§!科技，但可以通过改进可用的§Y底盘§!模板来加以弥补。"
 TNO_tips_and_tricks_entry_title_17: "装甲类型"
 TNO_tips_and_tricks_entry_desc_17: "在§WTNO§!中，有三类可用的§Y装甲§!单位：\n1)§Y主战坦克§!，标准装甲单位。造价§R昂贵§!，而且会受到§R严重的地形惩罚§!，但§G战斗力§!相当强大。\n2)§Y重型坦克§!，尽管仍可一战，但是一种已经过时的单位，它们可以抗衡比当前科技水平§G高出约一个等级§!的装备。也就是说，§Y1950年代重型坦克§!在战斗中可以对抗§Y1960年代主战坦克§!。不过，作为平衡补偿，它们的速度§R较慢§!，并受到§Y更严重的地形惩罚§!。\n3)§Y装甲战车§!，它们往往会被低估，但这些轻型装甲单位§G速度快§!、§G造价低廉§!、受到的§G地形惩罚也最轻§!。若装备得当，其战斗力甚至可以§G超越§!§Y主战坦克§!。"
 TNO_tips_and_tricks_entry_title_18: "补给和地形"
 TNO_tips_and_tricks_entry_desc_18: "-完善的§Y后勤系统§!是赢得战争的关键。在制定作战计划时，务必注意§Y铁路§!、§Y补给中心§!、§B河流§!、§b山地§!等战略地形的位置。\n-如果师缺乏§G补给§!，则可以考虑编制§Y后勤连§!，并建造§Y补给中心§!。\n-与§W原版§!不同，§Y补给中心§!的建造花费相对§G较低§!，所以不必特意规避建造补给中心，其上限为§R每个地区两个§!。\n-某些科技可以改善补给状况、§G减轻§!可能遭受的§R地形惩罚§!。"
 TNO_tips_and_tricks_entry_title_19: "战斗支援连"
 TNO_tips_and_tricks_entry_desc_19: "-§Y战斗支援连§!可以提供§Y组织度§!、§Y组织度恢复速度§!、§Y补给消耗§!、§G装备缴获率§!等§G增益§!，以下是有关其作用的部分信息：\n-§Y侦察连§!和§Y工兵连§!增益最多最强，务必编制。\n-§Y后勤连§!提供最大的§Y组织度恢复速度§!§G增益§!。\n-§Y维修连§!提供最大的§G装备缴获率§!§G增益§!。\n-§Y通信连§!的表现则介于二者之间，其突出亮点在于能够提供§Y主动性§!§G增益§!，能使师§G更迅速§!地进入战场。"
 TNO_tips_and_tricks_entry_title_20: "直升机"
 TNO_tips_and_tricks_entry_desc_20: "-§Y直升机§!是一种现代发明，能用于编制战斗力最强的§Y支援连§!。它们能造成§G巨大的伤害§!，§G地形惩罚极低§!，但§R燃油消耗显著增加§!，且§R降低装备缴获率§!。\n-在部队中加入§Y空中突击步兵支援连§!能使其速度§G更快§!，在战斗中占据明显优势。\n-§Y攻击直升机支援连§!填补了绝大部分由§Y炮兵§!承担的职责，同时受到的减益§G更少§!。\n-§Y反潜直升机§!和§Y救伤连§!也可以进行编制，但存在比它们§G造价更低廉§!、§G战斗力更强§!的选择。\n-注意，就算没有§Y直升机§!您也能赢得胜利。"
 TNO_tips_and_tricks_entry_title_21: "空战"
 TNO_tips_and_tricks_entry_desc_21: "-为部队提供§z空中支援§!可以在战场上取得§G巨大的优势§!。\n-主要应当关注的飞机类型是§Y截击机§!和§Y近距支援机§!。\n-虽然也存在§Y战斗机§!这一机种，但§Y截击机§!的§Y灵活机动§!在空战中往往§G更胜一筹§!。\n-请注意，虽然飞机能带来非常大的帮助，但其§R生产成本很高§!，这意味着您只有在拥有一定工业实力的情况下才应该考虑生产飞机。\n-当然，只依靠地面部队也能赢得战争。不过为了弥补差距，可以考虑在您的部队中编制§Y防空装备§!，例如§Y单兵便携式防空系统§!。"
 TNO_tips_and_tricks_entry_title_22: "海战"
 TNO_tips_and_tricks_entry_desc_22: "-在§WTNO§!中，§B海战§!极少发生，但在某些§Y代理人冲突§!中，海军可能仍有用武之地。一般情况下，建议§R压缩§!海军预算，不必刻意组织造舰计划。\n-§B登陆作战§!也极少发生。除非准备与某个§Y超级大国§!开战，否则不需要在沿海部署军队。\n-§K意大利§!、§m美国§!、§q德国§!、§e日本§!可以通过建造一定数量的舰船来获得§G特殊增益§!，其中包括对§M政治点数§!的§G增益§!。您可以在§Y冷战§!面板中查看。"
 TNO_tips_and_tricks_entry_title_23: "赢得战争"
 TNO_tips_and_tricks_entry_desc_23: "-战争胜负极大程度上取决于§Y师编制§!。如果您输给了§MAI§!，只需要查看其§Y编制§!，然后相应做出§Y编制§!调整即可。\n-务必注意，§G装备缴获率§!的加成意味着消耗战在§WTNO§!中是有效的战略。此外，§R包围§!地方部队仍是§G更快§!结束冲突的方法。\n-在§Y代理人冲突§!中，§R包围§!并§e消灭§!对方的§Y志愿军§!可以带来§G巨大的优势§!。在此类冲突中，派遣§Y军事顾问§!和§Y装备援助§!对取得胜利同样重要。"
 TNO_tips_and_tricks_entry_title_24: "简介"
 TNO_tips_and_tricks_entry_desc_24: "-您可能会注意到，§WTNO§!中有多种不熟悉的新§Y建筑§!。本条目将解释其用途，以及应当在何时建造它们。\n-由于极少爆发直接战争，因此没有必要建造§Y要塞§!和§Y要塞群§!。如果需要，您可以通过§Y决议§!或§Y国策树§!来获取它们。\n-最重要的§Y建筑§!是£tt_power §Y发电厂§!和§Y基础设施§!。\n-所有§Y建筑§!都需要分配给£tt_civ_factory §R民用工厂§!的£tt_prod_unit §G生产单位§!来建造，您可以根据需要通过面板右侧附有§G绿色齿轮§!的菜单分配它们。"
 TNO_tips_and_tricks_entry_title_25: "基础设施"
 TNO_tips_and_tricks_entry_desc_25: "-§Y基础设施§!的最大等级为10级，每一级都能§G提高§!地区的§Y资源开采§!、§Y单位速度§!、§Y后勤补给§!，以及§G额外的§!§Y建筑槽位§!。最重要的是，还能获得§G额外的§!§Y建造速度§!。\n-因此，拥有越高等级的§Y基础设施§!，就能§G越快§!地建造其他所有建筑。因此，建造基础设施应该是您的首要任务。\n-应当优先在§G资源丰富§!的地区建造§Y基础设施§!。请注意，如果其他国家进口您生产的§Y资源§!，您将会获得§G收入§!和£tt_prod_unit §G生产单位§!。\n-建议§Y基础设施§!建造到8级即可。\n-§Y基础设施§!和§Y发电厂§!也会提供§GGDP增长率§!。"
 TNO_tips_and_tricks_entry_title_26: "发电厂"
 TNO_tips_and_tricks_entry_desc_26: "-您的第二要务应该是建造§Y热电厂§!和§Y核反应堆§!。\n-虽然各国的转换比率不同，但目标大体应为每十亿美元§GGDP§!拥有5£tt_power §Y电力§!。\n-对§e日本§!而言，目标应为每十亿美元§GGDP§!拥有10£tt_power §Y电力§!。\n-请注意，在§m工业科技§!中研究§Y发电厂§!改进可以为所有发电厂提供额外的£tt_power §Y发电量§!，请最优先考虑这类科技。\n-§Y发电厂§!还能提供§Y建筑槽位§!、§G增加§!§Y建造速度§!、§G§!§Y增加资源开采§!。\n-重点在§Y基础设施§!完善的地区建造发电厂建筑。"
 TNO_tips_and_tricks_entry_title_27: "建筑覆盖率"
 TNO_tips_and_tricks_entry_desc_27: "-§Y学校§!、§Y医院§!、§Y监狱§!、§Y军事基地§!和§Y行政大楼§!会根据§Y全国覆盖率§!提供国家§G增益§!。\n-您可以通过点击屏幕右下方、§m统计报表§!图标左侧的§m<§!按钮进入§Y建筑地图模式§!，查看在哪里建造建筑最为有效。\n-点击§Y建造§!选项卡中带有相应建筑图标的圆圈，可以查看建筑的§Y全国覆盖率§!，并了解其提供的§G增益§!信息。\n-这些§Y建筑§!也会影响您的§Y政策落实率§!。\n-建筑按§Y覆盖率§!§R重要性§!排序，依次是§Y行政大楼§!、§Y学校§!、§Y监狱§!和§Y军事基地§!。"
 TNO_tips_and_tricks_entry_title_28: "后勤"
 TNO_tips_and_tricks_entry_desc_28: "-最后需要注意的§Y建筑§!是§Y补给中心§!和§Y铁路§!。\n-§Y铁路§!是地面§Y补给§!路线。请留心，§Y补给§!也可以通过§B河流§!运输，但效率会有所降低。\n-§Y补给中心§!是将§Y补给§!运往各§Y单位§!的节点，§Y海军基地§!则是§B海运§!的节点。不过，这些基地的等级应该已经足够高了。\n-在§WTNO§!中，这两类§Y建筑§!的§Y建造花费§!都比原版§G降低§!，所以不需要刻意避免建造它们。\n-请注意，一个地区只能拥有2个§Y补给中心§!，所以请注意建造地点。"