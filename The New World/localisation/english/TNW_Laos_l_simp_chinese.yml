 LAO_PPPL_party_long: "老挝人民革命党(Phak Pasaxon Pativat Lao)"
 POLITICS_SOUKANE_VILAYSARN_DESC: "越南革命揭开了苏发努冯的真面目：一条毒蛇、老挝民族的叛徒。老挝需要稳定，而苏甘·维莱山则是后共产主义时代老挝的引路者。\n\n苏甘与日本渊源颇深，甚至在老挝摆脱法国统治、赢得独立之前就已种下。这贯穿了他的人生。伊萨拉行动期间，他曾在老挝伊萨拉武装部队中服役。除了这段小插曲之外，在苏甘爬上万象警察局长这个位置之前的每一步，都有日本人在帮助他。\n\n此前，苏甘一直与哥哥梭发那·富马和国家进步党保持一致，他们的亲日态度如出一辙。他还是大本营特务总监部在老挝的主要联络人，正是他第一个向东京警告了苏发努冯暗藏的共产主义信仰，可惜东京做出行动时，已经太晚了。\n\n如今，苏甘端坐于老挝最高的权力宝座，但他并无意当个政治强人。一旦工作完成，他将会欣然恢复民主，自信梭发那·富马将在自由公正的选举中当选。但在此之前，他必须要扫清国家的腐朽和共产主义瘟疫，令它永远不再能够生根发芽。"
 LAO_Postcolonial_Backwater:0 "后殖民落后地区"
 LAO_Postcolonial_Backwater_desc:0 "老挝的近代史充斥着不幸、屈辱和落后。自十九世纪末以来，从三国时代到伊萨拉行动，老挝一直都被周边大国视为边陲之地。\n\n行政力量薄弱、文盲遍地、腐败盛行、基础设施聊胜于无，这些只是老挝在经历了几个世纪的孤立之后所面临的众多问题中的一小部分。自给性农业仍然是老挝最大的产业，现代城市工业则举步维艰。因此，老挝领导人决定用日本的资金来发展国家，但只有时间才能证明这一战略的有效性。"
 LAO_Legacy_of_Operation_Issara_Unmitigated:0 "伊萨拉行动的余波 - 灭顶之灾"
 LAO_Legacy_of_Operation_Issara_Unmitigated_desc:0 "被泰国称作“伊萨拉行动”的军事入侵行动，使老挝现代化建设取得的些许进展瞬间化为乌有。前途无量的青年官僚被迫背井离乡，平民百姓流离失所，铁道公路化为废墟，工业发展停滞不前，整个国家在入侵期间陷入瘫痪。这次入侵直接导致老挝在行政管理、民计民生、经济发展和基础设施建设方面陷入全面崩溃。\n\n虽然时局危如累卵，但老挝政府却毫无作为。自1957年以来，万象政坛近乎停转，既无力为遭受重创的地区提供救济，也未能启动任何实质性重建工作来恢复国有工业和基础设施。由于政府未能帮助广大人民和他们所在的社区重建家园，大多数老挝人的生活条件甚至比殖民时期还要糟糕，他们自然也无心关注国家的前程。"
 LAO_King_Sisavang_Vatthana:0 "西萨旺·瓦达纳国王"
 LAO_King_Sisavang_Vatthana_desc:0 "陛下，至高无上的大君主，合法继承人，万象白伞王国的光荣守护者，老挝法轮王，至高无上的胜利者，武士贵族，如太阳般光辉的保护者，伟大而光荣的吉祥繁荣之守护者，也即西萨旺·瓦达纳国王，是老挝王国的君主。\n\n曾几何时，君主象征着至高无上的尊严与敬意。然而，随着佩差拉·拉达纳冯亲王努力减少君主在政治中的影响力，再加上“伊萨拉行动”期间冯·萨旺国王被迫与泰国合作，君主制的威望大打折扣。西萨旺·瓦达纳国王频频插手国家治理，对政事频繁发表意见，还总喜欢显摆自己那点有限的权力，更让民众对王室的尊重每况愈下，使其从昔日无可动摇的地位逐渐沦为公众批评的对象。\n\n尽管如此，由于西萨旺·瓦达纳国王贴近民众的公众形象和对佛教的虔诚信仰，王室依然深得民心。这样一来，只要国王能够平衡好自己的公众形象与政治抱负，那些激进的共和主义者就只能徘徊在老挝政治的边缘地带，难以崭露头角。"
 LAO_The_Golden_Triangle:0 "金三角"
 LAO_The_Golden_Triangle_desc:0 "中国在第二次世界大战中战败后，国民革命军李弥将军率领第九十三师退入东南亚，在泰国政府的非官方支持下建立了所谓的“金三角”：这一地区囊括缅甸、泰国的掸和老挝北部，是东南亚鸦片生产、运输和提炼的避风港。伊萨拉行动的混乱之中，老挝国民军，也就是老挝王家陆军的前身，与缅甸的国民革命军建立了秘密联系，由此掀起了前所未有的毒品制销浪潮。\n\n伊萨拉行动接近尾声之时，老挝国民军背叛了泰国盟友，与国民革命军之间的合作也随之迅速告终。几乎一夜之间，两支军队就从伙伴变成了竞争对手：国民革命军将人手资源撤出了老挝，老挝国民军则试图浑水摸鱼，在掸地区取得立足之地。后来，老挝国民军重组为王家陆军，印度支那也逐渐安定下来，但金三角的冲突却从未结束，王家陆军和国民革命军仍继续争夺着这里的控制权。"
 LAO_The_Royal_Lao_Army:0 "老挝王家陆军"
 LAO_The_Royal_Lao_Army_desc:0 "老挝国民军在重组后更名为老挝王家陆军，意在摆脱其在伊萨拉行动期间作为泰国侵略者压迫本国人民的工具的黑暗历史。然而，将老挝王家陆军称为军队，实在是对“军队”一词的侮辱。底层士兵麻木不仁，缺乏训练；部队领导任人唯亲，根本不配领导士兵；高级军官则是一群满脑肥肠的废物，空有将军的头衔，却干不了半点实事。\n\n不过，尽管老挝王家陆军几乎在所有层面上都不配被称为一支合格的军队，但它仍能对该国现有的民主秩序构成威胁。军队的右翼色彩浓厚，富米·诺萨万将军等人更是对所谓民主进程嗤之以鼻。王家陆军的领导层就像一颗恶性肿瘤，如果不将其切除，病人就会死亡；但由于任何针对军方的行动都可能招致报复，又迫使文官政府不得不小心谨慎：既要让军队远离政府事务，又要避免彻底惹怒他们。"
 LAO_Indochinese_Communist_Party_Insurgency_Minor:0 "印度支那共产党叛乱 - 不成气候"
 LAO_Indochinese_Communist_Party_Insurgency_Minor_desc:0 "1947年，老挝宣告独立，所有反殖民战士都得到了赦免，但仍有一个组织进行着斗争，誓要率领老挝摆脱一切形式的帝国主义，那就是印度支那共产党的老挝支部。在越南友党和农村的支持之下，共产党有效地阻止了新生的老挝政府维护其东北部与越南边境地区的安全。政府曾一度认为，共产党是个令人讨厌的麻烦，但随着伊萨拉行动的开始，局势迅速发生了转变。\n\n为了在伊萨拉行动中打击泰军，老挝合法政府的残部与印支共产党达成了一项君子协议，并由此大大帮助了老挝的解放运动。共产党因他们所做出的贡献而为老挝农民奉为偶像，返回了他们在丰沙里和华潘的根据地。此后，东北部的共产党“解放区”大幅扩张，限制了政府对当地的控制。但话虽如此，共产党也只是个麻烦，只是规模相较以往大得多而已。他们既没有军事手段，也没有政治手段来对抗政府，因此不会对现状造成任何威胁……暂时。"
 LAO_Stung_Treng_Dispute:0 "上丁争议"
 LAO_Stung_Treng_Dispute_desc:0 "上丁省是老挝最年轻、最南端的领土。虽然当地大部分人口都是佬族人，但在1905年至1949年间，当地一直处于柬埔寨的统治之下。在伊萨拉行动中，老挝分割为琅勃拉邦王国和占巴塞王国，由于后者与泰国政府关系密切，上丁省和那空占巴塞省被划归其所有。1956年，战事结束，《台北协定》恢复了泰国与印度支那邻国之间的战前边界，然而，其中并不包括将柬老两国边界也恢复到战前状态的条款。老挝因此拒绝交还其占领的上丁省，引发了两国之间的争端。\n\n为解决争端，日本政府向当地派遣了专业人士以达成妥协。在调查过程中，他们发现上丁的低地人口几乎全部是佬族人，因此日本政府选择了支持老挝的立场。虽然争端得以正式解决，但柬埔寨政府对失去上丁仍然怒火中烧。柬埔寨东北部因此迅速军事化，其国内政治的不满情绪显著增长，两国之间的双边关系已遭到彻底的破坏。"