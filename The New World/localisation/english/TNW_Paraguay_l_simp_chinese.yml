 PAR_OAS.24.t: "保持占领"
 PAR_OAS.24.desc: "尊重、警惕、不交友，是列兵安赫尔·奥尔特加在部署亚松森前，被反复灌输的三条原则。奥尔特加觉得，他们真该加上第四条：学会自娱自乐。他的工作就是在离西尔维奥·佩蒂罗西机场大约一英里外的街区巡逻，百无聊赖地踢踢石子，搓搓手指。日子日复一日地过着——奥尔特加渴望着，要么有点波澜，要么赶紧宣布当地警察已经能够胜任，让美国维和部队撤离此地。\n\n那是个周四或是周五，一个足球从球场里滚到他脚边。奥尔特加转头一看，一群八到十二岁的孩子围作一团，正为球是谁踢飞的而争吵不休。争吵声慢慢停了下来，然后所有孩子都盯着奥尔特加。他可不会被一群小鬼吓住。“这球你们还要吗？”他用西班牙语问道，脚尖轻点地上的球。回应他的只有沉默和凝视。奥尔特加轻哼一声，把球踢回给孩子们。黑白相间的足球滚到他们脚边，可孩子们没有去捡。他们只是一直盯着他，眉头紧锁。算了。随他们去吧。奥尔特加继续往前走。他拐过街角，他又听到些许谈笑声。可他一现身，那三个坐在街角屋门廊上的男人便瞬间收敛笑容，盯着他，跟那些孩子一样。奥尔特加毫不示弱地瞪回去，边走边踢开一颗石子。这一切，他早已司空见惯。"
 PAR_OAS.24.a: "别破坏这来之不易的和平。"
 PAR_OAS.25.t: "分裂的美洲之家"
 PAR_OAS.25.desc: "阿方索·加西亚·罗布莱斯站起身来，坐他身边和前面的美洲厅代表们的低语声随即停止。身为对外关系部长和资深外交官，他对位于华盛顿的美洲国家组织总部并不陌生；尽管他很少有机会向全体成员讲话，但巴拉圭遭到入侵就是这样一个需要他发言的场合。\n\n“各位代表，请允许我阐明墨西哥共和国的立场。”加西亚·罗布莱斯说道，“我们谴责对巴拉圭的入侵计划。我们理——”\n\n一些代表发出嘘声。“我们理解阿根廷与巴西的立场，也深知亚松森共产主义政权所构成的威胁。没人乐见那个不幸的国家在两个极端之间摇摆。但是，如此激进的手段将导致成千上万的无辜者伤亡死难！这将制造大批的殉道者！我们必须尊重巴拉圭的国家主权，并立即与新政权进行对话，为其指明道路。”\n\n“胡言乱语，”对面桌的巴西代表阿劳若·卡斯特罗说道。罗布莱斯看向他，眼神里带着一丝同情。\n\n“朋友，听到您说这样的话我很难过，回想起我在贵国担任大使期间，我们曾相处甚欢。我知道巴西人民素来爱好和平！只要您改变主意，我们就能让这片美丽的土地免遭生灵涂炭！”\n\n会场瞬间陷入一片嘈杂的议论和咒骂声中。古巴代表欢呼鼓掌。阿根廷和巴西代表开始愤怒地谴责。美国主席只是望着窗外，脸上明显流露出恼怒之色。"
 PAR_OAS.25.a: "这是反对军国主义的一票，是逆势而行的一票。"
 PAR_OAS.26.t: "抉择"
 PAR_OAS.26.desc: "乌戈·B·马加因的目光焦躁地从窗外的停机坪移向身旁的无线电话，正要飞往华盛顿的飞机正静卧在机场跑道上。清晨的阳光方才拂过航站楼顶，对外关系部长又呷了一大口咖啡。萨利纳斯总统随时会打电话过来，时间非常紧迫。他需要在半小时内起飞，才能赶上美洲国家组织的紧急峰会。\n\n峰会召集的消息一出，马加因立刻去见了萨利纳斯。昨晚，两人大部分时间都在讨论这个惊人的消息——美国人居然促成了阿根廷和巴西政府达成协议，在美洲国家组织的主导下入侵巴拉圭，推翻共产主义政权。全体美洲国家组织成员国都要对行动决议投票。马加因不由得怒火中烧，这让墨西哥何以自处？\n\n关于投票的争论持续了一整夜，各种论点被反复斟酌。若基于埃斯特拉达主义的不干涉原则投反对票，会惹恼那些亲美的商业领袖以及拉丁美洲的潜在贸易伙伴。马加因个人也会受影响，可能会危及他在美国的人脉甚至友谊。但他宁愿投反对票，也不愿选择怯懦的弃权，这种行为在国内和韦拉克鲁斯协定的其他成员国眼中都不受欢迎——他们会说这是萨利纳斯政府对革命理想的又一次背叛。绝对不能形成这种负面形象。\n\n总统仍然没有拿定主意，他打算在做出最终决定前，先咨询阿莱曼、巴里奥斯等人——那个决定，正是马尔加因那天早晨在停机坪上不安地等待着的。"
 PAR_OAS.26.a: "接到电话后，萨利纳斯跟他说要弃权。"
 PAR_OAS.26.b: "接到电话后，萨利纳斯跟他说投反对票。"
 PAR_OAS.27.t: "舞台焦虑"
 PAR_OAS.27.desc: "“阁下，这您没想到吧？”话筒那边，安东尼奥·卡里略·弗洛雷斯的声音沙沙作响。“巴西和阿根廷居然情投意合起来了。”\n\n奥尔达斯敲敲桌子，用一声肯定的哼声回应了对外关系部长。卡里略继续说话，他正通过墨西哥驻华盛顿大使馆的保密专线通话。\n\n“他们的共识竟然是入侵巴拉圭，真是令人遗憾。不过，也不能指望他们容忍一帮共产主义游击队做邻居。我们这边的朋友对促成这次协议欣喜若狂，所以行动都将在美洲国家组织的主持下进行。当然，明天美洲国家组织的成员国还需要对此投票表决。”\n\n“这办仪式的劲头挺足啊？”奥尔达斯终于带着几分沮丧回应道。“我猜您身边这些人正向我们施压，要我们投赞成票？”\n\n“他们确实希望如此。不过他们中至少有些人听说过埃斯特拉达主义，也理解我们微妙的处境。或许悄悄咪咪、不声不响地弃权，应该不会在这里或国内引起太大波澜。”\n\n尽管部长如此说，奥尔达斯脑海中却一直有个念头：投赞成票会明确表明墨西哥对极端主义绝不姑息，而且还能赢得美国人的好感。但他欲言又止。外交事务总让他感到不安，尤其那次屈辱的阿留申群岛事件之后。左翼会抗议——古巴人也会——他只能预料到哈瓦那会打来几通愤怒的电话。\n\n“阁下？能听到吗？我没听到您说话。”"
 PAR_OAS.27.a: "“当然，你是对的。明确表示墨西哥弃权。”"
 PAR_OAS.27.b: "“卡里略，这样，我们将投票支持该决议。”"
 URP_OAS_Trans_gov: "巴拉圭治理委员会"
 URP_OAS_Trans_gov_long: "巴拉圭治理委员会(Paraguay Governance Committee)"
 PAR_condor_legion: "秃鹰军团"
 PAR_condor_legion_desc: "拉丁美洲各地，年轻人纷纷投身行伍，为旧日而战，为法西斯主义而战。他们被称称作秃鹰军团。\n\n秃鹰军团是巴拉圭容克学校的产物，这所军事院校同时也是亲纳粹的智库。第一次拉丁美洲法西斯青年大会后，秃鹰军团正式成立。军团最初在巴拉圭进行组织训练，影响力遍布整个美洲大陆。军团已经行动起来，捍卫受西方干预威胁的法西斯政权，试图推翻左翼政府。\n\n政治上，秃鹰军团对各种激进右翼思潮全盘接纳——从长枪党主义到民族社会主义——唯独排除整合主义，因其与军团毫不掩饰的纳粹倾向格格不入。经济上，军团的存续仰仗政府的同情和金融家的补贴，以及隐秘的走私活动。实际上，只要有热血青年愿意为国家捐躯，秃鹰军团便会生生不息。"
 TNO_condor_legion_tt: "§R该国家精神的持有者可以向整个西语世界的法西斯运动派遣志愿军。§!"