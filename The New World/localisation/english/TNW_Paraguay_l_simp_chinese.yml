 POLITICS_HIGINIO_MORINIGO_DESC: "秩序赋予国家形态，纪律塑造民族品格，等级构建社会结构。身居权力金字塔顶端的伊希尼奥·莫里尼戈总统，正是将这三重美德注入巴拉圭血脉的铸魂者。\n\n这位独裁者的崛起绝非偶然。当他成功寻回巴拉圭民族英雄弗朗西斯科·索拉诺·洛佩斯的遗骸时，命运的齿轮便开始转动。此举赢得时任总统何塞·费利克斯·埃斯蒂加里维亚青睐，在后者隐退后，自由党将其推上总统之位充作过渡傀儡。对常人而言，这已是政治生涯的终点。\n\n但天降伟人岂会甘当昙花一现？莫里尼戈以雷霆之势背叛寡头集团，将那些长期压迫其所属瓜拉尼族群的既得利益者尽数流放。从欧洲汲取的强人政治智慧，指引他重塑巴拉圭——这个因美国在瓜伊拉瀑布入侵失败而淬炼得愈发坚硬的法西斯国家。\n\n可悲的是，丰功伟业反成枷锁。昔日的战争英雄沦为好猜忌的暮年暴君，蜷缩在自己缔造的新秩序顶端尸位素餐。环顾四周，尽是窃取胜利果实而脑满肠肥的政客将军，每个阴影里都蛰伏着敌人。困守孤城的独裁者深知时日无多，终将让位于投机政客或更糟的继任者，临终诘问在空荡的总统府回响：\n\n“我走之后，巴拉圭会变成什么样？”"
 POLITICS_CHE_GUEVARA_DESC: "埃内斯托·切·格瓦拉的一生被对革命的热忱所定义——这份热忱源自永不餍足的好奇心，驱使他穿梭于资本主义国家与马克思主义思潮之间，辗转于故交情谊与新兴战火之中。昔日那个笃信共产主义能和平过渡的激进青年，最终在哥伦比亚内战的血火中淬炼出真正的革命信仰，当共产主义宗派主义将数百万人卷入周而复始的暴力循环时，切脱胎换骨地离开了哥伦比亚：从此他的人生将与意识形态同频共振。\n\n在尤卡坦丛林完成军事训练后，切追随菲德尔·卡斯特罗从格拉玛号的惨败转战至哈瓦那的全面胜利。在古巴，他以近乎狂热的冷酷姿态献身共产主义事业而闻名，常在革命同志间发起投票决定俘虏生死，面对被人民先锋队判处死刑者时，他的目光永远直视对方瞳孔。\n\n离开古巴后，切如游侠般巡礼南美大陆，为萌芽中的革命者传授战术，将其锻造成解放运动的铮铮铁骨——正如他协助组建的联合民族解放阵线。如今历经智利牢狱之灾与巴拉圭政变硝烟，切仍拒绝放弃这场狂风骤雨般的革命，唯恐其重蹈古巴革命偏离初心的覆辙。显然，这位永不停歇的革命行者，征程尚未完结。"
 POLITICS_OSCAR_CREYDT_DESC: "自革命军在亚松森战役中获胜后，奥斯卡·克雷特总统始终忙于政府宫事务，尝试将毕生积累的组织发动经验运用于政权管理。这位巴拉圭共产党总书记被切·格瓦拉视为国家领导人的当然人选——毕竟格瓦拉自己更适应战场而非案牍。\n\n早年的左翼活动早已促使克雷特成了《新国家理想》的签署者之一。这份无政府工团主义宣言主张，瓜拉尼语农民应发起针对剥削阶级（即受欧洲文化影响的精英阶层）的社会与种族斗争。在数次遭逮捕与被流放的经历中，他最终成为坚定的马克思主义者，并与阿根廷、巴西等拉美各国共产主义团体建立联系。\n\n如今的克雷特终于身处理想之位。尽管他并非普遍受党爱戴——批评者指责其自恋成性，痛批其专制作风与个人崇拜倾向——但他仍矢志利用手中权力实现社会革命。这正是党组织、游击战士与瓜拉尼群众浴血奋战的目标，也是他毕生追寻的理想。"
 POLITICS_ALFREDO_STROESSNER_DESC: "斯特罗斯纳体内流淌着德意志与瓜拉尼人的血液，他首先是军人，其次才是总统。“金发小子”十六岁入伍，十九岁便在查科战争中冲锋陷阵。\n\n年轻时，斯特罗斯纳便显露出对权力的无尽渴求，决心要在军阶的阶梯上不断攀登。他如火箭般蹿升，最终被莫里尼戈提拔为将军。斯特罗斯纳在军内纠集了一批忠实的盟友，其中有查科战争的老战友和秃鹰军团的同袍，他们都对德国颇为亲善。凭借这股势力，他已然成为巴拉圭最有权势之人。\n\n作为巴拉圭的独裁家长，斯特罗斯纳承诺带来“和平、工作与福祉”。但实际上，他通过残酷的反共运动制造虚假繁荣，左翼活动家和普通异议者都是他的打击对象。在他的授意下，国家公敌被绑架、拷打、处决。血腥审讯常在总统本人面前进行，若他不能身临现场，那话筒里传来的惨叫声就是取悦他的乐章。\n\n即便身居万人之上，斯特罗斯纳仍过着苦行僧生活——传闻他从不使用热水，手术时甚至拒绝麻醉。他竭力维持身强体健的钢铁形象，不过这种斯巴达式生活仅是其个人准则，并不妨碍他的亲信们纸醉金迷，肆意挥霍国库储蓄。"
 POLITICS_FULNA_PROVISIONAL_JUNTA_DESC: "赢得丛林战争后，联合民族解放阵线建立了由切·格瓦拉、拉斐尔·佛朗哥与阿尔弗雷多·拉莫斯领导的临时委员会。多数同盟缔结于利害而非情谊，他们亦不例外。这个仅凭推翻前政权而维系的联盟能走到今天，堪称奇迹。\n\n切·格瓦拉无需赘述。他虽生于阿根廷富裕家庭，却为贫苦大众而战。作为拉美革命者心中的草莽英雄、地主与政客眼中的洪水猛兽，格瓦拉远赴巴拉圭，寻求解放这片土地上的受压迫者。\n\n拉斐尔·佛朗哥是前总统兼将军，革命派二月党领袖。他主张维护穷人权益并推动巴拉圭军队现代化，但相比格瓦拉温和得多。\n\n阿尔弗雷多·拉莫斯作为前将军与自由党成员，是三人中主张最温和的。自四十年代起，他多次策划推翻伊希尼奥·莫里尼戈政权的未遂政变，在佩尼亚埃莫萨监狱几进几出——其中一次还是被拉斐尔·佛朗哥下令关进去的。\n\n三人之间弥漫着猜忌的氛围。随着委员会内部矛盾不断升级，巴拉圭新生政权的未来阴云密布。"
 PAR_Bernardino_Gorostiaga: "贝尔纳迪诺·戈罗斯蒂亚加"
 POLITICS_BENJAMIN_RATTENBACH: "阿根廷人恪守政治传统几乎已成为一种根深蒂固的本能。中将本哈明·拉特恩巴赫负责治理的巴拉圭阿根廷占领区，正是这一倾向的生动体现。他生于十九世纪末，终身服役军旅，是一位虔诚的天主教徒、坚定的民族主义者，同时也是“蓝派”军方阵营的一员。而最重要的是，他始终视责任为最高信仰，从未将自己的职务当作通往更高权位的跳板。\n\n然而，在东部镇的施政任务，对他而言绝非易事。这片位于巴拉圭边境的狭长领土，一面是他誓言效忠的祖国，另一面则笼罩在联合民族解放阵线游击队的阴影之下，更有先前战争遗留下的创伤尚未愈合。地方政务依旧混乱不堪，而更令人担忧的是，巴拉圭教会至今仍沾染着左翼势力的痕迹。想要赢得和平，既要目光向前，也要回顾历史。而要证明阿根廷政府既有远见又有底蕴，这份沉重的责任，如今尽数落在他一人肩上。"
 POLITICS_CARLOS_MATTOS: "卡洛斯·德·梅拉·马托斯少将是那类极具危险性的人物，一个谋勇兼备的人物。1932年护宪革命爆发时，这位年轻人毅然决然地投身其中，响应圣保罗州的号召。次年，他考入里奥伦戈军事学院，浸润于学校的教诲、纪律和优越感之中，最终以一名陆军军官的身份毕业，正式步入巴西军界。尽管当时他只是一名上尉，却在二战中组织名为“抽烟眼镜蛇”的巴西远征军时发挥了关键作用，并亲赴地中海战场参战。他后来在新军校教授步兵课程，又被派往玻利维亚担任武官，这些经历进一步磨炼了他的作战理念。\n\n至于梅拉·马托斯究竟是凭借其性格、专长，还是传闻中参与巴西军事密谋的背景而晋升为巴拉圭占领区指挥官，至今仍不得而知。但有一点几乎无可否认：他完全热衷当这一角色。每天，曾效忠法西斯或共产主义政权的旧部都在被追捕、起诉，甚至被处决。尽管语言不通，他依然对当地组织和媒体进行严密监控，一旦发现激进思想或反占领言论，便会下令立即予以清除。这种雷厉风行的手段尚未换来稳定局势，游击队仍在袭击巴西军队。不过，现有策略无法见效的话，梅拉·马托斯会另辟蹊径，制定出一套更精准、更冷酷、更强硬的方案。对于巴拉圭来说，他无疑是个危险人物。"
 URP_Fernando_Levi_Ruffinelli: "费尔南多·莱维·鲁菲内利"
 POLITICS_FERNANDO_RUFFINELLI: "若想在莫里尼戈的巴拉圭活下来，就得学会低头；而在共产党掌权的时候活下去，多半只能靠跑路——有人骂这是胆小，也有人说这是聪明。\n\n费尔南多·莱维·鲁菲内利博士，就是那个活下来的人。出身比亚里卡的律师，涉足媒体、插手政坛，踩线踩得刚刚好：批评政府不痛不痒，支持自由党也轻描淡写。他不站错队，也不站得太明显，正是这点分寸，让他熬了下来。等到“丛林战争”结束，共产党拿下亚松森的时候，他正好在研究巴拉圭和巴西边界划分的问题，这份“学术成果”替他挡了一劫，让他躲过了不少同僚落得的下场。\n\n这种运气加上他那点八面玲珑的本事，让美洲国家组织觉得：就是他了，这人适合当过渡政府的负责人。但他们说服不了巴拉圭老百姓——对本国人来说，他就是个对阿根廷和巴西唯命是从的软骨头，一个空壳傀儡。\n\n可鲁菲内利也不是混吃等死。他求人，他发牢骚，私底下还骂OAS维和部队践踏人权。他恨过渡政府根本没多少实权，他恨巴拉圭的自由主义半路就被腰斩了，他更恨的是——这国家除了他费尔南多·莱维·鲁菲内利，竟已无人可用。"
