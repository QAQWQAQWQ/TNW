 PAR_bastion_of_latin_american_fascism: "拉美的法西斯堡垒"
 PAR_bastion_of_latin_american_fascism_desc: "作为美洲大陆上法西斯伟大理想的唯一捍卫者，巴拉圭如孤岛般屹立于向OFN主子屈膝的腐朽财阀国家之中。无数德国顾问、特工、工程师与商贾纷至沓来，更有来自整个大陆的右翼流亡者汇聚于我们这个要塞之国。敢于为人民挺身而出的气魄虽使巴拉圭遭邻国孤立，但这又何妨——巴拉圭始终是抵御堕落洪流的坚固堡垒。"
 PAR_bastion_of_latin_american_fascism_tt: "§Y可以在地区范围内支持法西斯主义。§!"
 PAR_avanee: "阿瓦涅埃"
 PAR_avanee_desc: "阿瓦涅埃即瓜拉尼语，直译为“人民之语”。在南美大陆上，这门语言通行于社会各阶层，其普及程度甚至超越了“主人之语”——卡莱涅埃（即西班牙语），这一点可谓独一无二。当邻国疯狂抹杀印第安传统以求跻身欧洲之列时，我们自豪地承认：巴拉圭民族乃是伟大的伊比利亚与美洲两大种族交融的结晶。这份独一无二的文化与语言禀赋，赋予我们力量、团结与独特的民族品格。"
 PAR_the_chokehold: "锁喉"
 PAR_the_chokehold_desc: "自1869年起，巴拉圭便在经济与政治上沦为邻国附庸，尤其是离它最近的霸主阿根廷——由于缺乏竞争者，阿根廷资本在巴拉圭经济中占比畸高，其企业得以肆意扩张。这些阿根廷庄园主掌控着大片土地，俨然自成封建领地。\n\n这种支配地位最直观的体现莫过于巴拉那河。作为从属国的巴拉圭让阿根廷得以独占整条河道，通过贸易钳制沿岸区域。这已成为巴西外交部的顽疾，限制了他们施展外交手段的空间，致使部内鹰派人士逐渐倾向放弃文牍翰墨，转而利剑出鞘来解决争端。"
 PAR_political_tarot: "政治塔罗牌"
 PAR_political_tarot_desc: "莫里尼戈的独裁不仅建立在妥协与合作中，而且建立在适者生存的基础上。在实践中，这相当于一种试图同时取悦所有人的政策，但到目前为止，德国资本的稳步流入使该政权成功地缓和了这些矛盾。\n\n随着神秘力量在祖国内外组织起来转动命运之轮，他用刺刀打造的王座似乎注定要土崩瓦解。"
 PAR_bush_war: "丛林战争"
 PAR_bush_war_desc: "烽火相攻，铁钉互逐，巴拉圭大地再掀帝国争锋。\n\n1954年瓜伊拉瀑布入侵失败的阴云再度笼罩这个国家，流亡海外的革命者以联合民族解放阵线为旗帜，在境外完成集训后渗透回国。这些受境外势力资助的死士来势汹汹，使执政当局遭遇十年来最严峻的挑战。\n\n政府军向阿根廷求援以维系摇摇欲坠的统治，巴西则意图拔除边境法西斯堡垒。每片省域都化作拉锯战场，政权易手如昼夜交替，低烈度冲突已成巴拉圭人日常生活的残酷底色。这场血战注定惨烈，世人早已知晓。"
 PAR_invasion.1.t: "小岛会谈"
 PAR_invasion.1.desc: "马丁加西亚岛面积之小，使遍布岛上的军事设施显得近乎荒诞。但这座两公里见方的岛屿因扼守拉普拉塔河口咽喉，仍被阿根廷军方严防死守——而乌拉圭也始终宣称对该岛拥有主权。不过今日，拉普拉塔河的主人们是来缔结盟约而非争执的。事实上，很难想象巴西空军运输机降落在坑洼跑道上的场景竟会如此受欢迎。对机上乘客卡洛斯·德·梅拉·马托斯上校而言，这同样超乎想象。作为冉冉升起的军界新星，他原以为自己的使命会是率部攻占此岛而非在此谈判。\n\n另一位宁可与对手兵戎相见也不愿对坐谈判之人，是刚晋升准将的爱德华多·“博查”·乌里武鲁。这位阿根廷陆军中最强硬的民族主义者在马里奥·阿马德奥外长身旁勉强行礼，向巴西上校致意——正如他几小时前面对由科洛尼亚港乘船抵达的乌拉圭将军奥马尔·波尔西温库拉与乌戈·蒂里博基时所做的那样。\n\n三国海军、航空兵军官及外交部官僚齐聚海军总部大楼，寒暄很快转为对迫在眉睫危机的讨论——正是这危机迫使宿敌携手。他们口中的“拉普拉塔之瘤”，正是巴拉圭。\n\n“正如我方致巴西与乌拉圭外交部的备忘录所述，共产主义在巴拉圭的胜利是阿根廷无法容忍的。”以民族主义立场著称的阿马德奥外长此刻却展现出地缘政治操盘手的智慧，“但若无邻国默许乃至协助，我国亦不愿贸然行动。”\n\n“巴西军方同样无法接受此类政权在巴拉圭出现。”马托斯吐着烟圈说道，两名下属连连点头，彰显着军方对外交政策的掌控。“但此事需要更细致的磋商。”\n\n“确实。”阿马德奥的回应透着自得与怨气交织的微妙情绪，同声传译员竭力淡化着这种语气，“没有人希望1870年的历史重演。”"
 PAR_invasion.1.a: "阿根廷人在说啥？"
 PAR_invasion.2.t: "瓜分巴拉圭"
 PAR_invasion.2.desc: "自数月前首次马丁加西亚岛会晤以来，这个尚属假设的“三国同盟”的军事代表们竟逐渐沉醉于他们的使命。有人甚至被指责暗中期盼巴拉圭共产党获胜——如此他们精心筹备的作战计划才不致沦为废纸。\n\n尤其在阿根廷代表团中，某些人坚信这场危机将一劳永逸解决巴拉圭作为地缘政治实体的问题。数月来，他们竭力为阿根廷争取巴拉圭人口稠密区作为占领区。但巴西的强硬态度迫使其让步，承认首都亚松森将划入乌拉圭占领区。阿根廷谈判代表最显著的共同特征，是对上回巴拉圭战争末期遭巴西背刺的切齿之恨——他们誓要避免重蹈覆辙。\n\n或许因乌里武鲁将军异乎寻常的好战姿态，与会的巴西上校们反而对计划产生犹疑。若非反共铁腕人物阿尔布开克-利马将军亲临，他们几乎要打退堂鼓。但这位新到的将军似乎更关注巴拉圭战后重建，主张完全恢复其独立地位。\n\n至于参会的乌拉圭军政人员，则明显分为两派。波尔西温库拉麾下的民族主义者正陶醉于幻想归国后被奉为英雄，而蒂里博基领导的自由派却忧心忡忡——乌里武鲁与阿尔布开克-利马动辄将巴拉圭反对派言行视为共产主义渗透，而这些政治表达在乌拉圭本是常态。自由派的首要任务，是防止民族主义者独揽军功，以免酿成军方被民族主义者掌控的灾难。至于邻国对乌拉圭主权的轻慢？那不过是未来的隐患。"
 PAR_invasion.2.a: "小国的未来似乎并不光明。"
 PAR_invasion.3.t: "现实政治"
 PAR_invasion.3.desc: "“荒唐透顶！”古拉特一拳砸在办公桌上，“你们要我犯下帝国主义的罪行，来阻止帝国主义？看不出这个主意有多蠢吗？”\n\n“阁下息怒，但您必须考虑军方的态度。”战争部长阿热米罗的声音透过听筒传来，“他们对巴拉圭局势愈发焦虑。无论我们是否介入，阿根廷军队都会越界，这不过是时间问题。”\n\n“那又如何？你要我发动侵略来安抚军队？天父在上，他们早就想置我于死地了，阿热米罗！用这根电话线勒死我都有可能，你明白吗？”\n\n“我明白！但总参谋部多数人实在无法容忍红色巴拉圭。若放任阿根廷肢解邻国，他们的匕首就将直抵我国心脏。求您了，阁下，签署命令吧。别把这当作入侵，就当是人道主义干预！”\n\n“哈！我没想到你还和杜勒斯兄弟沾亲带故！”古拉特揉着太阳穴长叹，“够了，下次当面谈。”\n\n挂断电话后，总统将手臂搭在额前。窗外暮色渐沉，他忽然惊觉：自己这些决策中，究竟有多少出自济世安民的真心？又有多少纯粹是为了在权力漩涡中求生？不过是为确保明日醒来时，自己仍是巴西总统，而非OFN傀儡军政府的阶下囚。\n\n此刻，他必须为保住总统之位而战。若阿热米罗所言非虚，整个国家亦将卷入这场豪赌。巴拉圭何曾亏欠过他或巴西？倒也说不上。但细枝末节无关紧要。这个邻国已成制衡军方的筹码，是让他在惊涛骇浪中苟延残喘的救生圈。至于他人死活——去他妈的。"
 PAR_invasion.3.a: "下命令吧。"
 PAR_invasion.4.t: "南美洲的阴影"
 PAR_invasion.4.desc: "纵使历经万难，联合民族解放阵线终究以胜利者姿态横扫所有反对势力。随着联合民族解放阵线从亚松森向整个南美大陆广播胜利宣言，巴拉圭丛林战争正式落幕。然而，关于“红色巴拉圭将偏安一隅”的侥幸幻想以最糟糕的方式被彻底粉碎。从巴拉圭丛林中走出的切·格瓦拉，赫然显露出他作为联合民族解放阵线真正领导者的身份。\n\n局势已恶化至深渊边缘。切公开宣称整个南美大陆都将追随巴拉圭的革命道路。虽其确切行踪成谜，但训练有素的革命基层组织恐早已潜伏各地伺机而动。当黑色腐化核心近在咫尺时，仅在边境剿灭恐怖分子无异于缘木求鱼。\n\n欲直面未来，必求诸往昔。为应对巴拉圭威胁，复兴三国同盟势在必行。蒙得维的亚已着手筹备新一轮会谈，共商对策。阿根廷既已全力投入，巴西与乌拉圭加入联盟仅是时间问题。看来若切执意要掀起人民战争，他必将得偿所愿。"
 PAR_invasion.4.a: "南美洲向战争奔去。"
 PAR_invasion.5.t:0 "留同存异"
 PAR_invasion.5.desc:0 "在蒙得维的亚一间狭小的密室里，南美洲的命运正被永久改写。三组座椅上，从左至右分别坐着巴西、乌拉圭和阿根廷代表团。中央的红木桌上平铺着大幅巴拉圭简明地图。室内众人皆欲置格瓦拉于死地——具体战术交由三国同盟总参谋部谋划即可，真正棘手的是战后安排。\n\n“若想避免巴拉圭分崩离析，唯有扶持自由党和二月党人。”巴西外交官的手指划过巴拉圭与邻国接壤的阴影区域，“必要时我们需协助其治国。一个由自由党-二月党联合执政的中立巴拉圭，最符合各方利益。”\n\n“我们何必放弃巴拉圭？直接瓜分领土各自为政岂不更好？”阿根廷代表拍案而起，“大举入侵后还要重建这个国家，简直荒谬！”数名阿根廷同僚——甚至部分巴西代表——纷纷点头附和。\n\n“入侵主权国家是一回事，长期占领则是另一回事。”巴西代表反唇相讥，“诸位若想与切的支持者打一场深陷泥潭的游击战，请自便。但重建国家对我们所有人来说，都是代价最小、风险最低的选择。”\n\n阿根廷外交官沉默片刻，指尖重重戳向亚松森：\n\n“那这颗心脏怎么处置？除非你们想三国共管首都，否则总得有个说法。”\n\n“交给我们吧。”乌拉圭将军突然插话，“两位的国家难免为亚松森起争端，不如让手上未沾血的一方接管。”\n\n巴西与阿根廷代表对视片刻，耸了耸肩，默默卷起地图。"
 PAR_invasion.5.a:0 "巴拉圭若无力圈定边界，他人自会帮忙决断。"
 PAR_invasion.6.t:0 "僧多粥少"
 PAR_invasion.6.desc:0 "第二日。各国代表如昨日般分坐原处。咖啡续杯的间隙，寒暄声渐息，冰冷的博弈再度上演。\n\n巴西代表展开那张布满划痕的巴拉圭地图——墨渍与批注交织的战场，见证着昨日无数夭折的提案。\n\n“或许该从势力范围入手……”阿根廷代表顶着黑眼圈开口，“我们经不起又扯一天皮！”\n\n满室难得一致点头。共识虽存，却都暗藏算计。\n\n“那么贵方接受我方条件了？”巴西代表挑眉，“除亚松森归我国军管外，由贵国占领全境，这难道不是最公平的划分方式？”\n\n“让我们在前线挨游击队的枪子，你们在后头洗劫首都？”阿根廷人拍案而起，“干脆把布宜诺斯艾利斯也占了如何？”\n\n乌拉圭代表突然拿起笔，在地图上划下笔直分割线。南端标“A”（阿根廷），北端注“B”（巴西），亚松森则被“U”（乌拉圭）的圆圈包裹。\n\n“要就要，不要拉倒。这是唯一可行的方案。”\n\n如同昨日重现的漫长沉默后，巴西人率先落座。阿根廷代表刻意摆出不情不愿的姿态，最终悻悻离场。"
 PAR_invasion.6.a:0 "又一个问题解决了。"
 PAR_invasion.7.t:0 "会议结束"
 PAR_invasion.7.desc:0 "蒙得维的亚会议终告落幕。纵是圣保罗街头最肮脏的毒品交易，也难比这场汇聚南美大地的阴谋与背叛更令人作呕。各国代表终可带着谄笑返程复命，静候升迁嘉奖。巴拉圭的命运就此封印，战争的风暴已在联合民族解放阵线头顶凝聚。\n\n我们的外交官们虽形同赌徒、西装染渍、发胶半凝，却出色完成了使命——确保布尔什维主义永远只是历史尘埃，不过是沙皇帝国崩解时溅起的一朵血腥浪花。\n\n协议条款简明扼要：若赤色分子在巴拉圭内战中得势，势将危及整个南美大陆安全。唯有用同等雷霆手段应对——缔结新三国同盟，阿根廷、巴西与乌拉圭大军将联合出征，将人民从马克思与列宁的邪说中解救。我们将推翻联合民族解放阵线，重建真正自由民主的巴拉圭，使其成为不受任何势力摆布的独立国家！\n\n此刻，我们唯有静观其变。且看巴拉圭能否自主抉择命运。若不能——那就休怪我们代劳了。"
 PAR_invasion.7.a:0 "舞台开幕。"
 PAR_invasion.8.t:0 "终章之序幕"
 PAR_invasion.8.desc:0 "巴拉圭传来噩耗。联合民族解放阵线已在亚松森击溃对手。据我方记者描述，亚松森战役堪称南美大陆有史以来最惨烈的战斗，其残酷程度令国际媒体冠以“皮科马约河畔的保卢斯堡”之称——显然暗指西俄战争的可怖景象。无论如何，布尔什维克已然取胜。\n\n我们数月来的谋划与协调终将派上用场。与三国同盟盟友签署的条约即将生效，不是数周便是数日之内。此刻已非是否出兵巴拉圭的疑问，而是何时挥师南下的抉择。陆军全面进入最高戒备，空军枕戈待旦，随时准备以全部火力覆盖巴拉圭大地。\n\n当务之急乃完成边境军事部署。若将士们远离战场，纵使日夜操练亦是徒劳。待万事俱备，条约即刻启动——包括允许乌拉圭战时借道我国边境的附属条款——第二次三国同盟战争便将打响。如今，只待一声令下。"
 PAR_invasion.8.a:0 "战鼓声愈发响亮。"
 PAR_invasion.801.t:0 "从阴影中现身"
 PAR_invasion.801.desc:0 "文件不会说谎。当施佩尔翻阅盖伦的南美局势报告时，南美诸国的行动也印证了这点。几乎转瞬之间，“若联合民族解放阵线获胜将进行干预”的模糊传言已成铁的事实——南美诸国绝不会坐视这场失败。施佩尔如孩童翻看画册般浏览着报告，三国同盟的军队正在为这场决定命运的残酷斗争厉兵秣马。未来数月间，南美洲的走向将在亚松森坑洼遍布的街巷与闷热潮湿的丛林中被决定，在人类勇气与险恶境遇的交锋中铸就大陆的命运。\n\n“我们在城中安插了特工，但执行任务有暴露风险。”盖伦的声音在施佩尔脑海中回响，“格瓦拉的补给站遍布山谷。我方特工已全副武装，待入侵开始即可破坏这些补给站。”\n\n事实上，施佩尔对国际外交的细枝末节毫无兴趣。或许是年岁使然，他愈发难以忍受盖伦絮絮叨叨地汇报特工调度坐标或武器配备细节。作为建筑师，他只关心恢弘大厦的整体蓝图，而非某把凿子的型号。巴拉圭战争于元首而言不过是又一项基建工程——过程无关紧要，唯有竣工的事实才重逾千钧。布尔什维主义这种致命病毒，绝不能在拉美死水般的政治生态中滋生蔓延，否则终将吞噬整个大陆。\n\n“能确保那个什么……三国同盟获胜吗？”施佩尔突然打断。\n\n“不能。”盖伦答道，“但这是次优选择。工业命脉、交通枢纽、无线——”\n\n施佩尔抬手打断盖伦。"
 PAR_invasion.801.a:0 "“足够了，剩下的就交给那些南美人吧。”"
 PAR_invasion.9.t:0 "时候已到"
 PAR_invasion.9.desc:0 "总统放下信笺，长叹一声。阿根廷的催战书已至。信中所言，阿军正朝边境开拔——士兵、坦克与卡车组成的长龙直抵天际。信中并无骇人听闻的内容，乌拉圭虽蕞尔小邦亦整军待发，唯等巴西叩响战争发令枪。总统凭窗远眺巴西利亚，落日余晖将首都染成橘粉交织的调色盘。窗外车流如织，尾灯明灭似潮汐涨落，走走停停，周而复始。\n\n他们何尝明白身处怎样的世界。平民百姓自以为了解世情，读报看新闻，殊不知那不过是精心粉饰的太平幻象——总统与历任阁僚如匠人般苦心经营的假面。无论愿与不愿，元首的天职便是蒙蔽民众双眼的同时谋取实利。何必让蝼蚁知晓生命何等脆弱？一阵微风便足以令其毕生心血化为瓦砾——这般无知，倒教人艳羡。\n\n格瓦拉绝非庸才。航拍显示巴拉圭半修复的机场内停放着数十架、甚或上百架战机。短短数月间，这个国家的武装力量已从狂热散漫的学生军蜕变为包含正规空军的精锐之师。令人侧目，却仍不足为惧。\n\n总统仰头痛饮。酒液苦涩如灰烬，恰是醉人之处。七日后，巴西大军将陈兵巴拉圭边境；七日后，战争号角将令巴拉圭河浸透同胞鲜血；七日后，整个南美将踏上前途未卜的征途。不论荣辱，这副重担已牢牢压上肩头。"
 PAR_invasion.9.a:0 "第一次是悲剧，第二次是闹剧。"
 PAR_invasion.10.t:0 "第二次三国同盟战争"
 PAR_invasion.10.desc:0 "时机已到，今日起兵。下午三时整，阿根廷、巴西与乌拉圭将正式对巴拉圭宣战。三国联军在边境线后枕戈待旦，枪炮如林，战机如云。五分钟后，三国同盟大军将准时跨过边界。每个士兵都深知自己的使命：或开火，或轰炸，或驾驶钢铁洪流直捣切的红色王国。这注定是南美史上最血腥的战争之一。当我们厉兵秣马之时，切的大军亦在磨刀霍霍。若以为敌人会固守堑壕打常规战，那便是愚不可及。\n\n不，格瓦拉必将穷尽一切手段负隅顽抗。我们已为所有可能的遭遇战做好万全准备：专门训练的反陷阱工兵与反游击战部队正待命出击。然而政府高层仍忧心忡忡——切绝非等闲之辈，其传奇威名甚至比革命功业更具震慑力。最令人胆寒的猜想是：他会在巴拉圭的幽暗角落祭出某种秘密武器，随时准备将我军吞噬殆尽。\n\n虽知此乃无稽之谈，但统帅部无人认为此战能轻易取胜。这不是供子孙在历史课本上研读的战争，没有气吞山河的英雄赞歌，亦不见铁骑突袭的传奇史诗。这将是一场浸透鲜血与迷雾的鏖战，每具尸体都是双方的战利品，平民与战士的界限在此消弭无形。暴行必将发生，且绝非偶发个案。它们不会被视作憾事，而将成为战争常态。切每杀我一人，我等必以十倍奉还。不将布尔什维克的幽灵逐出南美，三国同盟誓不罢休。\n\n退路已绝，南美大陆唯有破釜沉舟。"
 PAR_invasion.10.a:0 "以解放之名，行入侵之实。"
 PAR_invasion.11.t:0 "为胜利干杯"
 PAR_invasion.11.desc:0 "弗罗塔将军将香槟一饮而尽。酒液甜得反常，仿佛浸过巧克力的草莓，后劲却比他预想的更烈，呛得这位铁血军人直皱眉。身旁的菲格雷多咧嘴笑着打量同僚。\n\n“够劲吧？从非洲法国佬手里搞来的。要我说，那群人在黑暗大陆待久了，酿的酒都比咱们这儿的烈。”\n\n这场庆功宴正值高潮——虽然五十多岁的军汉聚会实在难比兄弟会派对。舞台上的歌剧女伶正引吭高歌，美得恍如瓦格纳歌剧中的女高音。看着这些平日不苟言笑的硬汉们即兴跳起探戈固然怪异，但今日确非寻常：巴西陆军已将布尔什维主义钉死在历史的荒漠。\n\n“非洲如何与我何干？”弗罗塔抹了抹嘴角，“我们亲手终结了切的传奇，为南美带来和平。世人现在知道，南美诸国绝非任人宰割的软柿子。”\n\n“虽显浮夸，但所言不虚。”菲格雷多晃着酒杯，“巴拉圭已是囊中之物。虽说每日仍有游击队袭击的奏报……”他嗤笑一声，“八成是草木皆兵——要么是把持枪村民当赤匪，最离谱的还得是学生披着吉利服放烟花，差点就被打死。”\n\n“剩下两成呢？”\n\n“无足挂齿。”菲格雷多突然敲响酒杯，满室肃然。“诸位同僚！咱们这群老骨头总算没白折腾！可若没有总统阁下……”他故意拖长语调，“这位总给咱们添堵的麻烦精，南半球最臭的扑克牌手……又有谁能将赤祸逐出拉美？”\n\n玻璃杯碰撞声如惊雷，与满室将星的哄笑交织升腾。"
 PAR_invasion.11.a:0 "“敬巴西总统！”"
 PAR_invasion.12.t:0 "一场浩劫"
 PAR_invasion.12.desc:0 "菲格雷多将军痛饮一口香槟。这瓶来自法属非洲的香槟是他喝过的最难以下咽的酒之一。各种独特的甜味相互混合，形成一种奇特的味道，仿佛在一点一点地腐蚀着他的内脏。但考虑到这是戴高乐那块小地方出产的饮品，如果度数不够高，口味不够怪，怎么才能让购买者享受到那种解脱的感觉？\n\n格瓦拉怎么可能会赢呢？这场战争聚集了所有对他不利的因素。兵力、战术、装备水平，这些取胜的关键都是三国同盟的军队占据优势。而他仿佛一无所有。然而，就连每次巡逻都会以伤亡惨重或全军覆没而结束。每次大规模清剿游击队时，他们就会凭空消失，而执行任务的士兵往往会落入敌人预先布好的陷阱。这一切不可原谅，这一切更不可能发生，而这一切就发生在菲格雷多将军眼前。\n\n将军又喝了一口酒。阵亡士兵的照片是他最不愿看到的。碎裂的骨头将皮肤扎地支离破碎。手臂和双腿在肚子上摞起来，一起被钉在满是粪便的木桩上。心胸冷酷的人或许还能接受这些被分尸的场景，但没人能直视那些可怜士兵的眼睛。眼睛已经不仅仅代表一个器官，它们是男孩们被派去执行任务时最后的心情写照，里面看不到任何成功的希望。无论是否与身体相连，眼睛似乎总是面对着镜头。它们讲述的不是英雄在与敌人的战斗中倒下的故事，也不是无法避免的不幸事故。不，这些尸体知道谁是凶手，是他让成千上万的父母再也无法握住自己孩子的手。他犯了罪，整个南美都会知道罪犯是谁。\n\n菲格雷多又痛饮一口香槟。将军们没有过错，他们只是在忠诚地执行命令，执行高高在上的那位巴西人民亲自任命的人的命令，不是吗？为了不让先前的牺牲毫无价值，总统不断派更多的人去送死。他才是杀了成千上万人的残忍屠夫。将军的双手或许沾满了死亡的鲜血，但他自己并没有亲手杀过一个人。他没有罪。罪魁祸首是那位总统。"
 PAR_invasion.12.a:0 "磨刀霍霍。"
 PAR_invasion.401.t:0 "元首和革命者"
 PAR_invasion.401.desc:0 "施佩尔把他桌上堆着的照片和报告一股脑地翻了一遍。这可一点儿也不对劲，他甚至不用瞅一眼报告内容就知道发生了什么。一帮饭桶，一帮他妈的无能饭桶！他们竟然招架不住一群几乎未受训练、拿着一战武器的学生！施佩尔压抑着，试图把他的愤怒掩盖过去，但根本压不住。在他身前的盖伦掏出一支雪茄，自顾自地抽了起来。\n\n“我们在南美的唯一盟友，就这么没了。那到底是谁把他推翻的，盖伦，你告诉我？”施佩尔把手头的报告放下，发问道。“是切格瓦拉干的好事吗？说实话我都不知道他还活着。哦，这家伙竟然还当起国家领导人来了……”\n\n盖伦朝前挪挪屁股，摘下他的太阳镜并收起镜腿。这位间谍大师的眼里布满了如病入膏肓的橡树树枝般的血丝，连日连夜的工作侵蚀着盖伦，但他仍屹立不倒。蜘蛛总会小心翼翼地检查自己巨网上的每一根细绳，而盖伦亦是如此，任何威胁都逃不过他的眼睛。\n\n“我的元首，虽然我们的盟友垮台了，”盖伦咳嗽两声。“把他推上台的人可还没玩完。藏起来、伪装起来也好，躲去别国也罢，至少没完全销声匿迹，也就是说我们对巴拉圭的局势依然保有良好的情报渠道。我的元首，无论你想了解什么情况，我们的特工都会打探到消息。对了，我甚至还有些好消息要跟你汇报。”\n\n说罢，盖伦给施佩尔递去一个文件夹。文件夹里装满了南美别国军事高层会谈的文字记录和单色照片。‘突发事件’，‘巴拉圭问题’，‘对赤化威胁的动员’——这些文字是反败为胜的有力迹象。巴西跟阿根廷也意识到切格瓦拉的野望是个莫大的威胁，绝不会袖手旁观。南美正在进行反击。\n\n“真是棒极了！他们早就该把这事搞定了，不过现在也不晚。切格瓦拉在他们面前根本毫无机会，咱们得去掺和掺和南美这桩大事。好了局长，你可以去忙了，我得去联系下施密特。”\n\n“那你要说些什么呢，我的元首？”"
 PAR_invasion.401.a:0 "“要让南美那边清楚我们的立场。”"
 PAR_invasion.402.t:0 "二位将军的密谈"
 PAR_invasion.402.desc:0 "弗罗塔把菲格雷多的号码输入了他的私人座机。1-7-6……不对不对。这位巴西将军手指轻按太阳穴上，闭上了眼睛。他的电话号码是多少？他把号码保存在某个地方，但一定是被清洁工扔掉了。忘记别人的号码真是倒霉透顶。弗罗塔磕磕绊绊地尝试着所有可能的号码组合，直到一个低沉、嘶哑的声音询问他的身份。\n\n“我是弗罗塔。你应该看到新闻了吧？他到底想从我们这里得到什么？巴拉圭？我知道德国人不喜欢社会主义，但他们为什么会插手南美洲的事？”弗罗塔说。他伸手关掉了收音机，阿尔伯特·施佩尔继续朗读着显然是事先准备好的发言稿。\n\n“我知道他们为什么横加干涉。问题是，我不认为布宜诺斯艾利斯会支持我们。我之前在罗萨里奥的新年晚会上认识一个阿根廷军方人物，刚才和他通了电话。他人不错，不过军衔不高，是个小角色。他说他们认为德国人肯来帮忙是天大的喜事，香槟都已经准备好了。”菲格雷多说。\n\n“什么？他们想开派对吗？我们要干的事是入侵一个主权国家，而不是庆祝他妈的成人礼。”弗罗塔叹了口气。\n\n“我明白，但这些事只能你去跟他们沟通。不管怎样，德国人似乎向把他们的手伸进南美大陆，就向战后德国渴望称霸世界一样。不过就算那时他们也只能掌控欧洲和近东。我不知道欧洲发生了什么，我也不想知道，但我可以明确地说，和德国人合作就是与虎谋皮。我得走了，稍后再联系。”\n\n弗罗塔放下了听筒。这一切……太复杂了。毋庸置疑，德国在整个南美洲，尤其是巴拉圭都派遣了特工。即使切推翻了巴拉圭政府，这个网络也不会彻底完蛋。然而，和德国人合作无疑是一种不得已而为之的交易。弗罗塔一直希望和华盛顿建立良好的联系。没有一个超级大国会像美国一样，为巴西带来好处的同时基本不会干涉巴西的事务。然而眼下，施佩尔逼迫他们站队德国，甚至逼迫他们感恩戴德。他会后悔的。但现在呢？巴西和德国只能是亲密无间的战友。"
 PAR_invasion.402.a:0 "当魔鬼和你勾肩搭背时，你很难认出他来。"
 PAR_invasion.802.t:0 "坚实之心"
 PAR_invasion.802.desc:0 "把镜头切回日耳曼尼亚。施佩尔在他的办公室里踱着步子，眺望着这座出自他之手的模范之城，一切仍是那么的完美。三十年了，距他一生中的巅峰已过去了整整三十年。那时，他向他的元首规划着未来世界的光景，这位老道的设计师得到的每一个充满敬畏、又或是满含惊讶的点头，都是他引以为傲的资本。这思想中的一瞬，如同坚实的混凝土一般，它是那样的真挚、那样的实在——但它却再也无法触及，如同水中捞月一般，好似触手可得的月亮却只是幻翳而已。\n\n日耳曼尼亚就是这世间一切的核心。如果日耳曼尼亚走向衰落、分崩离析，那么德国也会迎来同样的命运。但如果这座大都市蒸蒸日上、繁华依旧，那么整个欧洲也随之起舞。巴拉圭被打得大败的消息传来，在施佩尔的授意下，德国各地的每一份报纸上都刊登了这条新闻。切格瓦拉在巴拉圭留下的遗产让这个国家发生了恒久的改变，一切都不复往常。施佩尔哀悼着法西斯主义在巴拉圭的败亡，但把扼杀它的凶手拉下去一道陪葬倒是给了元首些许慰藉。名为布尔什维主义的瘟疫再也无法沾染南美大陆。\n\n南美各国是否会去当美国人的走狗这个问题根本不重要，一点也不。对于一名艺术家来说，把事情拖延至最后一分钟可是大忌。那些深入阿根廷的德国特工们会让那些家伙们……重新考量。自日耳曼尼亚放射而来的万丈光芒将照耀他们，他们将看见德国不畏困难地与一切敌对势力作斗争，无论局势艰险与否。他们也将在这道光中找到自己的影子，这座本该属于他们的大陆如今却被世界强权所左右，这与德国当初四面楚歌的境况又何其相似！南美崛起的时刻已然来临，他们现在只缺一位领导者，一位像是30年代的希特勒般的领导者。当然，像他施佩尔也完全对的上号。\n\n“我的元首，”盖伦走进办公室，开口道。“我们的特工发现证据称阿根廷与巴西两国正企图向美国靠拢。即使我们竭尽所能提供援助，他们依然对我们的提议置之不理。下面我们该如何是好？”\n\n盖伦看上去胸有成竹，他梳理整齐的头发，干净的面容和藏在墨镜后的眼眸都散发着他的自信。如同盘踞在网上的蜘蛛一般，一丝一线全都在这位间谍大师的掌控之中。没错，日耳曼尼亚便是这世界的心脏，而元首就是那唯一能让它继续跳动的人。"
 PAR_invasion.802.a:0 "无论如何，要让他们感谢我们的帮助。"
 PAR_invasion.803.t:0 "无用的巴西人"
 PAR_invasion.803.desc:0 "“狗屁的废物！一群彻底没用的废物，局长先生！”施佩尔喊道。“你们是有多么无能才能失败？格瓦拉就在那里；他们完全可以开枪、扔炸弹或是其他什么都行！他为什么还活着，局长先生？”\n\n盖伦保持了沉默。施佩尔难道说错了吗？他们正在交谈的同一时刻，阿根廷人和巴西人正狼狈地逃出巴拉圭，丢下了所有他们可以弃下的装备。在这个地区，德国（他的）特工已经死了，他对此毫不怀疑。也许现在还没有，也许还得等几年才会。但他们人已经没了。如果他们受的训练没问题，动手的会是他们本人。\n\n“元首，您不应怪罪自己。我们给了巴西人和阿根廷人地图、部队位置、照片和其他所有的东西。所有他们需要来完成任务的东西。他们失败了。没——”\n\n“没错，盖伦。我不觉得这应该怪我。我觉得应该怪的是你。”施佩尔从座位上站了起来。他蹒跚走到最近的窗户旁，望向了日耳曼尼亚的天际线。盖伦认得施佩尔的那种表情。那是经历过在最后关头“反胜为败”的人的表情。\n\n“我的元首，这不是德国情报机构的错。格瓦拉——”\n\n“你有孩子吗，盖伦？”还看着窗外的施佩尔插嘴道。“你不需要回答那个问题。你意识到过如果我们继续犯下这种错误，后果会怎样吗？如果我们允许布尔什维主义——那本该和布哈林那个混蛋一同死去的意识形态——在全球繁荣蔓延，会怎么样？如果我们做不好我们该做的工作，德国和它的人民会怎么样？”\n\n“怎么样，我的元首？”盖伦说。\n\n“那会是我们的死期，局长先生。为我们挖坟的会是华盛顿，而致悼词的则是东京。布尔什维主义会杀死你所爱的一切事物，如果我们继续失败，就是在为自己立墓碑。你还不如把枪口顶着你孩子们的后脑勺，把他们一个一个地枪杀掉。比起更为不幸的另一种可能，这可谓是一种慈悲。”施佩尔说。他依然背对着盖伦，挥手示意他离开。"
 PAR_invasion.803.a:0 "你可以走了，局长先生。"
