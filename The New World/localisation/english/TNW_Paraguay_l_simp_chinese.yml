 POLITICS_JUAN_MANUEL_FRUTOS_PANE_DESC: "伊希尼奥·莫里尼戈的失势不仅意味着巴拉圭历史翻开了新的一页，还使得一小撮红旗派成员被推上了政治的风口浪尖。再过不久，当选总统纳塔利西奥·冈萨雷斯就职后，巴拉圭临时国家元首胡安·曼努埃尔·弗鲁托斯·帕内可以预见的会辞去公职。\n\n红党成员同时集作家、音乐家、剧作家与知识分子身份于一身的曼努埃尔·弗鲁托斯继承了他父亲，胡安·曼努埃尔·弗鲁托斯的政治衣钵。作为从政者服务国家时，他不仅秉持着与其父亲相似的保守理念，他那份对国家的赤子之心或许还犹有过之。他以戏剧与萨苏埃拉剧（Zarzuelas，西班牙式说唱轻歌剧）创作跻身巴拉圭文化殿堂。其作品尤为着力颂扬本土民俗、农民阶层及皮南迪（Pynandi）群体——这群耕战一体的农民曾于二十世纪四十年代投身红党事业。"
 POLITICS_JUAN_NATALICIO_GONZALEZ_DESC: "世人难以想象，一个没有灵魂的人除了沦为奴隶还能有何作为；而缺乏坚毅的富者，则根本不配称为男子汉。在众多同辈之中，唯有胡安·纳塔利西奥·冈萨雷斯最懂得固执己见者（纵使愚顽）所能迸发的力量——尤其是在目睹懦弱的伊希尼奥·莫里尼戈黯然隐退之后。\n\n这位异常见多识广却始终恪守红党极端民族主义思想的报人，曾创办文化杂志《瓜拉尼亚》，被许多人视为巴拉圭最顽固保守派的喉舌。历经多年开拓视野，他竟也培养出开明的思维方式，这在革命同仁中实属罕见。从莫拉斯到革命制度党，甚至在某些方面效法西斯领袖墨索里尼，兼容并蓄的思维让人一眼就能认出——这位正是红旗派的意识形态专家。\n\n狂热崇拜者其称为“神授领袖”，支持者间流传着“刀剑或子弹，送纳塔利西奥进宫殿”的口号。尽管有如此狂热的拥趸，身为领袖的冈萨雷斯却怀抱着相对具体的抱负：让瓜拉尼民族在国际资本主义的阴谋中赢得胜利。他真切知晓巴拉圭人民的潜力，而激发这群尚武乐耕之民的最大潜能，正是他的天命所归。"
 POLITICS_EDGAR_YNSFRAN_DESC: "纳塔利西奥·冈萨雷斯辞世后，埃德加·因斯弗兰便是已故总统政治路线延续下去的最大保障。他出身法律界，之后进入公务员体系，但鉴于其坚定的政治信念，要他循规蹈矩，着实有些为难。\n\n冈萨雷斯行事凌厉果断，作为冈萨雷斯的左膀右臂与心腹门生，在丛林战争时期，他驱使红党行刑队（用因斯弗兰自己的话来说，那是“党的命脉”）铲除异己，剿灭碍事的游击队，甚至还收藏了一批从他们手中抢来的书籍，数量甚至能塞满亚历山大图书馆。现在，时过境迁，如今的他已经是红党核心，这时他也不忘发挥才能，为党刊撰文写稿。\n\n因斯弗兰既是饱学之士，也是政治运动的思想旗手，对党的团结和纪律奉若圭臬。连他的政敌也承认，因斯弗兰精力充沛，以出手狠辣著称。因斯弗兰注定会成为一位备受敬重的南美领袖，即便在布宜诺斯艾利斯和巴西利亚的权力殿堂之中，他同样会受到瞩目。"
 POLITICS_VICTORIANO_BENITEZ_VERA_DESC: "对于一个脆弱的国家而言，鲜有人物能比战争英雄更具凝聚力。那种激励国民、讲述民族荣光的能力，本就是上天赐予的罕见天赋。而维多利亚诺·贝尼特斯·贝拉不仅拥有这种天赋，更从血火中杀出一条通往权力之巅的道路——随着长期执政的伊希尼奥·莫里尼戈被迫下野，他的崛起史就是一部与各派系逐鹿争雄的征战史。\n\n这场征战始于查科战争的烽火，对他而言，那场战争的标志性事件是亲手寻回兄弟的遗骸。战后他将目光投向德国国防军，视其为力量典范与效仿楷模。此后他在军中的地位与忠诚与日俱增，1941年莫里尼戈亲自任命他为第一骑兵师指挥官。随后他成为战争阵线的领袖——这是一个奉行激进法西斯主义的军官集团，他也在此谋划了自己的政治道路。\n\n尽管要面对数倍于己的强权周旋，他的执政纲领仍将聚焦于用最熟悉的方式巩固巴拉圭法西斯主义：即通过国家及其军队。但若没有铁腕领袖在前，这样的目标终难实现。正如他亲口所言：“军队统治政府，骑兵代表军队，而我就是骑兵。”"
 POLITICS_EPIFANIO_MENDEZ_FLEITAS_DESC: "埃皮法尼奥·门德斯·弗莱塔斯似乎生来便就与巴拉圭最高权力无缘：他出身贫寒，曾流亡国外，作为一位狂热的作家、诗人与音乐家，他对艺术的热爱或许远胜于政治。然而，尽管有着种种限制，他却在红党温和派成员的政变中入主洛佩斯宫，自此再无人能质疑他的地位。\n\n红党危难之际，弗莱塔斯秘密回国，并获得资深政要、民主派领袖费德里科·查韦斯的认可。自四十年代起，他便以《红纲领》和莫里尼戈批评者的身份，展现出强大的凝聚力和资历：如今有他掌舵，红党内部年轻的激进派和年迈的保守派或许都会安定不少。\n\n然而，尽管红党内部可能视他为团结象征，但他的邻国肯定不会。这位“反帝国主义者”曾暗示海狮行动是三国同盟入侵他祖国的“报应”，他对美国和巴西的仇恨，注定使他在自由世界中难以找到同道之人。他对阿根廷的倾力支持，也未能减少他身上的争议。关于门德斯·弗莱塔斯，人们或许会给他很多头衔，也可以指摘他诸多罪名，但其中绝不会有“乏味”二字。"
 POLITICS_ALFREDO_RAMOS_DESC: "历史进程往往出人意料。如果你在五十年代的巴拉圭跟人说，不出几年，就会有个自由派上来当你们的总统，恐怕他们会把你当成疯子轰出这个国家。然而，阿尔弗雷多·拉莫斯却让那些曾经不看好他的人瞠目结舌。对于悲观者而言，唯一能聊以自慰的，或许是军事冲突最终还是让一位军方将领上台执掌大权。\n\n拉莫斯戎马半生，当然不止打了最近这场亚松森之战。想当年，三十多岁的他便亲身指挥骑兵团，在伊比博博战役中一战成名，一跃成为查科战争的英雄。时至今日，他依然致力于推动巴拉圭人民的进步，但他希望进步不再需要战争。在拉莫斯首次以国家元首身份向全国人民发表的讲话中，他强调秩序、稳定与现代化的重要性。唯有如此，国家才能在瞬息万变的时代中站稳脚跟。\n\n然而，对拉莫斯而言，实现这些意味着他自身也要做出一些改变。作为自由党的积极参与者，他在佩尼亚埃莫萨监狱中蹉跎了许多岁月，因此，他对那些一路上被他镇压清除的共产党与二月党人没有一丝同情。他或许会说，这不是因为他冷漠，而是审时度势的务实之举，毕竟，要促进改革，便注定要与旧日的某些事物分道扬镳。"
 POLITICS_GUSTAVO_GONZALEZ_DESC: "“欲戴王冠，必承其重。”这不仅是一句古老的权力箴言，更是对古斯塔沃·冈萨雷斯现状的真实写照——年迈体衰，让他肩上的重担又增添了几分。他最初并未想过要成为总统，但自从阿尔弗雷多·拉莫斯退隐幕后、并在上次大选转任军职之后，冈萨雷斯便不得不为了国家和事业放弃个人生活。\n\n然而，当总统却不像他在自由党内那般受人尊敬、毫无争议。年龄之外，似乎还有不少难题。冈萨雷斯似乎不愿强势推行自己的主张，也不愿发动支持者，拉莫斯离去后留下的权力真空更是造成派系倾轧。此外，他对土地改革和进一步的国家经济计划的支持态度也触怒了不少同僚，他能否争取他们的支持还有待观察。\n\n无论如何，这位总统承载的是巴拉圭的希望。他既是现代化改革的倡导者，也是务实的理性主义者。他曾和许多同胞一样，作为军医参加查科战争；之后在担任党内要职的同时投身于人类学研究。他的敌人，倘若他真有敌人的话，此刻也不愿阻碍国家摆脱长久桎梏的机遇。破坏的时代已经过去，现在正是大兴建设之时。"
 POLITICS_RAFAEL_FRANCO_DESC: "从满目疮痍的国度崛起，凭借民族主义与民粹主义情绪奠定政治根基，偏偏又姓“佛朗哥”——将军拉斐尔·德·拉·克鲁斯·佛朗哥·奥赫达的人生轨迹，堪称历史开的一个荒唐玩笑。诚然，他同那一位佛朗哥的确有诸多相似，但他们的故事却是截然不同。\n\n这位巴拉圭军人在查科战争中的赫赫战功曾为他赢得声望与权势，却终因自由派政府的忌惮而沦为遭人唾弃的流亡者。时移世易，自由派政府被推翻后，他宣誓就职，又因固执己见被自由派击垮，再度背井离乡。这种蛇噬尾般的轮回，最终成就了他创立的二月党——这个在海外发轫的政党，却在联合民族解放阵线事件后成为了这个国家的主宰。\n\n佛朗哥的政治征战史可谓空前绝后。他与军方元老、共产党人、温和派轮番结盟、妥协、背叛与暗算，使巴拉圭各派势力如走马灯般更迭不休。他先后挫败了丛林战争中诞生的“造王者”——巴拉圭共产党与自由派，如今那王座已非他莫属。愿他长治久安——至少他自己是这么期盼的。"
 POLITICS_MIGUEL_ANGEL_SOLER: "第二次亚松森战役尘埃落定，胜利的共产党选出米格尔·安赫尔·索莱尔出任巴拉圭新一任总统，由他来指挥革命。\n\n米格尔·安赫尔·索莱尔生于1922年，年轻时以学运分子和二月党人身份进入政界。在二月革命党期间，索莱尔与他的父亲和妹妹卡门·索莱尔共同领导了一个名为“解放阵线”的马克思主义派系。1951年该派被二月革命党清洗，索莱尔遂与其他前二月党人一同加入巴拉圭共产党，此后他担任党报《前进报》主笔，更在丛林战争时期投身于游击队的组织工作。\n\n巴拉圭共产党夺取政权后，索莱尔发现克雷特日益独断专权。他与奥夫杜略·巴尔特联手推翻克雷特，又借其支持继位上台。但两人的联盟摇摇欲坠，索莱尔一直不信任巴尔特联。如今，索莱尔正着手边缘化党内唯一可能挑战其权威的对手，以期彻底掌控巴拉圭的革命进程。"
 PAR_la_ley_del_mbarete: "力量法则"
 PAR_la_ley_del_mbarete_desc: "巴拉圭的人们可分两类：一为手握权柄、颐指气使者，一为逆来顺受、饱受欺凌者。绝大多数巴拉圭人属于后者，他们无可奈何地承受着棍棒的敲打，所付出的一切皆流入地方豪强之手，供其攫取钱财，恣意享乐。而他们，所能换得的，不过是当地机构本应提供却无法给予的一丝虚假安宁。\n\n至于前者，则活在自我的世界里，有时满足于任他横征暴敛的一亩三分地，但更多时候，他们尔虞我诈，为争夺权力勾心斗角，只为能在瓜分利益时多分一杯羹。他们豢养着各自的爪牙——忠诚系于金钱——其上也有层层的主子，直抵权力之巅。而这一切，在巴拉圭人眼中，仿佛呼吸一般天经地义。"
 PAR_arcadian_backwater: "凝滞田园"
 PAR_arcadian_backwater_desc: "亚松森，她是一颗泡泡，一处浮华的纪念碑，象征着巴拉圭其他地区本可成为的模样，但一切成空。外面的土地仿佛时光凝滞——田园牧歌式的乡村景象仿佛仍停留在百年以前，偶尔有现代科技的“奇迹”光顾，却多半是要面对冰冷的枪管。人民穷困潦倒，政府毫无作为，唯有零星且如饮鸩止渴的绥靖之举。\n\n农民们已经接受了这样的宿命，他们甘愿身处这篇与世隔绝的“乐土”，默默耕耘那片唯有自己才真正懂得的土地。政府先后更迭，旗帜升起落下，但这片土地在迈向工业化的浪潮中，恐怕依然要沉寂百年。"
 PAR_new_national_state_morinigo: "新民族国家"
 PAR_new_national_state_morinigo_desc: "纪律、等级、秩序，巴拉圭赖以生存的基石，民族革命的核心所在。在这三尊支柱之上，屹立着伊希尼奥·莫里尼戈，他便是一人之下，万人之上。\n\n掌权数十年后，莫里尼戈让巴拉圭重新回到过去那种熟悉的独裁模式，并与现代标准相结合，打造出一个足以在新的世界秩序中生存的新型民族主义国家。他的拥趸在大街上肆意横行，无情地践踏着那些无力或无法顺从莫里尼戈模式的弱者与异类。这种狂热得到纵容和奖赏，唯一的限制是要满足恩主的要求。这种残暴不是失控，它完全是深思熟虑、精心设计的结果。"
 PAR_new_national_state_benitez_vera: "新民族国家"
 PAR_new_national_state_benitez_vera_desc: "纪律、等级、秩序，巴拉圭赖以生存的基石，民族革命的核心所在。然而，丰碑若不加以修缮，终将倾颓衰败。伊希尼奥·莫里尼戈变得虚弱——这正是他最深恶痛绝的特质——因此，他必须被新人维多利亚诺·贝尼特斯·贝拉所取代。\n\n当希特勒的继业者在日耳曼尼亚厉兵秣马之际，贝尼特斯·贝拉以丰沛的活力接过了领袖的衣钵。现如今，德国才是真正的超级大国，伊比利亚和意大利都无法与之匹敌，巴拉圭理应追随最强者。纵观近邻，唯一可以效仿的榜样，便是庇隆领导下的阿根廷。\n\n他们的暴力极致纯粹，他们的恐怖堪称典范，他们的权力绝对无匹。很快，巴拉圭也将加入他们的行列。"
 PAR_the_barefoot_revolution: "赤脚革命"
 PAR_the_barefoot_revolution_desc: "曾经，农民阶层是红党尚未充分利用的力量源泉。随着“赤脚革命”深入他们的土地，这种状态已成为过去。在《红纲领》的领导下，这些“战士农民”已经成为一场社会革命的核心，誓将巴拉圭锻造成一个独立自主、得以对抗巴西等美国附庸的外部干预的国家。\n\n他们被奉为新时代的典范人物，他们的画像装饰着墙壁和海报，宣传将他们塑造成楷模，反抗国际金融暴政的战士。他们是巴拉圭经济的命脉，面对那些已经掌控了各国命运的寡头，他们将永远坚韧，绝不低头。"
 PAR_battling_for_democracy: "为民主而战"
 PAR_battling_for_democracy_desc: "红党过去是在巴拉圭搞独裁统治的力量，但它能否也成为民主的载体呢？这是埃皮法尼奥·门德斯·弗莱塔斯向全国提出的疑问。他主张建立能代表民意而非独裁者个人意志的民主制度。\n\n弗莱塔斯似乎决意推动红党走向真正的民粹主义，废掉之前的独裁政权，回归之前以选票而非枪杆决定政治的传统做法。然而，红党的关系在巴拉圭社会中盘根错节，又缺乏可行的替代方案，所谓的改革能否落到实处，仍是未知之数。"
 PAR_peace_and_progress: "和平与进步"
 PAR_peace_and_progress_desc: "红党的宣传机器不厌其烦地宣读着“和平与进步”的口号，仿佛只要不断复诵，这些词汇终将变成现实。当然，新上任的仁慈独裁者、国家引路人阿尔弗雷多·斯特罗斯纳的真正目的，并非创造和平与进步，而是要让人民相信巴拉圭已然存在和平与进步。\n\n对斯特罗斯纳而言，若真能在其统治下实现和平与进步，固然能为他的宣传添彩，但这不过是痴心妄想。那些为歌颂伟人而建立的旧体制无需废除——只需剔除最露骨的法西斯符号，稍加改造便可为他所用。正如没有莫里尼戈的巴拉圭一文不值，没有斯特罗斯纳的巴拉圭同样什么都不是。"
 PAR_second_liberal_revolution: "第二次1904年革命"
 PAR_second_liberal_revolution_desc: "红党又一次败在宿敌自由党手中，迎来终结，似是命中注定。这一次，自由党流亡者不再以阿根廷为基地，转而在巴西重整旗鼓，发起了第二次自由革命，终结了巴拉圭数十年的独裁统治，开启了一个伴随着过往气息的新纪元。\n\n显而易见，权力正迅速向自由党集中。表面上，这是为了保护巴拉圭免受强人和民粹的侵害，但关于巴西寡头和金融帝国主义掌控一切的指控已经此起彼伏，那些曾经的支持者显然正急于收割胜利果实。如果不作出根本性的改变，巴拉圭很可能会经历数十年的“自由党”统治，而不是真正意义上的自由之治。"
 PAR_second_february_revolution: "第二次二月革命"
 PAR_second_february_revolution_desc: "1936年，拉斐尔·佛朗哥通过一场革命登上权力舞台，当时他立志要摧毁寡头控制，把土地还给人民。1964年，佛朗哥又一次被革命推上总统宝座，这一次，他决心彻底完成“二月革命”。\n\n拉斐尔·佛朗哥，与西班牙的佛朗哥有些相似，但又有所不同，他迅速成为民粹主义的考迪罗，一位代表民众进行统治的领导者。他认为，无论是共产党人还是自由党人都不值得信任，因为他们只听命于外国势力。佛朗哥清楚，要实现一场真正的民族革命，要缔造一个摆脱邻国帝国主义影响的巴拉圭，要让土地回到人民手中，究竟需要做些什么。"
 PAR_new_national_ideology: "新国家意识形态"
 PAR_new_national_ideology_desc: "巴拉圭共产党非常清楚本国的实际情况，因为缺乏工业无产阶级，他们将目光投向了巴拉圭广大农村辛勤耕作的农民。巴共试图浪漫化这些讲瓜拉尼语的农村民众，希望让他们成为未来巴拉圭革命的基础。\n\n殖民主义的遗毒、欧洲文化的长期影响，以及法西斯主义留下的深刻烙印，都将被彻底清除。站在布哈林苏联的角度，巴拉圭的共产主义模式可能是异类，但巴共党内人士认为，党的民族主义倾向是必要的调整，对于在向社会主义革命转变之前完成民族革命来说至关重要。"
 PAR_price_of_peace: "和平的代价……"
 PAR_price_of_peace_desc: "……是永恒的警惕。这句格言常被巴拉圭军方挂在嘴边，用以解释其势力为何渗透至社会各个角落。在亚松森的街头，枪管常与军靴相伴，它们斜挎在军警肩上游弋，随时准备对不幸的店主施展淫威。这种国家支持的匪帮行径，从基层哨卡一直蔓延到最高指挥部。\n\n这头贪婪的巨兽永远欲壑难填。军方不断用加薪和所谓“土地改革”划拨的庄园来豢养将领，继而对其非法勾当睁一只眼闭一只眼。作为交换，军官们约束部众减少劫掠，并调遣他们应对各类威胁。这套制度虽残酷不公，却行之有效——既得利益者又怎会自断根基？"
 PAR_makeshift_military: "象征性军队"
 PAR_makeshift_military_desc: "巴拉圭军队曾腐朽透顶，法西斯主义猖獗，被一群自诩希特勒的野心家所把持。随着联合民族解放阵线掌权，这支军队被彻底瓦解并重组。将军与上校们或被行刑队处决，或被吊死在旗杆上，下级官兵或获特赦，或逃往更专制的国度。这个暴力机构经历了彻底净化，重新回归文官政府掌控。\n\n然而这场大清洗过后，新政府手中的军队仅存游击队级别的战力。丛林战争已摧毁维持秩序所需的大量基础设施与装备，政府不得不重建巴拉圭薄弱的工业，才能维持对武力的垄断。这条道路艰难无比，却别无选择。"
 PAR_the_chokehold_communists: "锁喉"
 PAR_the_chokehold_communists_desc: "巴拉圭近年来的历史，多数时候都陷于自我孤立，以自给自足来对抗外来帝国主义。共产党掌权后，南美诸国反而对巴拉圭筑起高墙，将其隔绝在外，以弥补无法武力推翻其政权之憾。南美国家的领导人，或因厌恶其异类意识形态，或惧怕革命之火蔓延本土，纷纷谴责巴拉圭共产党的过激行径。\n\n这种孤立虽非巴共所愿，但他们认为，资本主义强国的种种举动恰好证明了他们的理论：巴拉圭必须自力更生。周遭的邻国早已被美欧的行为模式所驯化，口口声声反帝，实则效仿帝国主义者，如今竟来威胁我们骄傲的瓜拉尼人民。\n\n既然必须独行，那就独行到底；唯有如此，方能安稳。"
 URP_king_without_country: "没有国家的国王"
 URP_king_without_country_desc: "十九世纪的洛佩斯家族，二十世纪的莫里尼戈，曾在巴拉圭掌握着不容置喙的权力。而他们的继任者，如今却落得如此地步，实在令人唏嘘。\n\n从洛佩斯宫和国会宫发出的命令，权力的边界只到亚松森市的尽头。出了城，条文是否“作数”，得看驻扎在那儿的巴西或阿根廷部队愿不愿意认账。\n\n而在这座早已被层层封锁的首都里，激进的清洗行动已使高级官员荡然无存，战争失败的代价又将基层人员一并扫空。眼下，唯一还在运作的力量，是美洲国家组织的维和部队——但他们压根不听巴拉圭任何一方的号令。"
 URP_duel_marionettes: "傀儡间的对决"
 URP_duel_marionettes_desc: "在这届临时政府里，几乎所有巴拉圭的政治派别都找到了发声的机会。但在背后那盘复杂的棋局面前，这点“包容”几乎毫无意义。\n\n美洲国家组织象征性地搭起了一层帷幕，而在帷幕后头，巴西利亚和布宜诺斯艾利斯各自扶持着自己的代理人，台面上合作，私底下你争我夺、互相倾轧。至于远在彼岸的美洲诸国，偶尔也试图伸手插上一脚，但往往换来的只是两国的冷处理——毕竟他们正忙着一刀刀切断亚松森与对方之间的一切联系。\n\n而那些被迫坐在一旁、眼睁睁看着这一切闹剧轮番上演的巴拉圭人民呢？当然，他们是被波及的；毫无疑问，他们是愤怒的；但他们从头到尾，都没觉得这一切有什么好笑的。"
 URP_reascension: "尘归尘，土归土"
 URP_reascension_desc: "那些曾种满大豆、木薯和棉花的田地，如今尽是荒草丛生。竖琴的余音已近乎无声。至于能在村头看见一个警察，或等来一封信，早已成了奢望。\n\n这，就是亚松森以外的巴拉圭现实——一片被内战与外敌反复蹂躏后的残垣断壁。洛佩斯宫的废墟还没来得及清理，街头的瓦砾更是无从下手。电力供应勉强维持，而破败的下水系统让人开始担心下一场瘟疫什么时候登场。饥民在巷子里晃荡，等着听见OAS救援车的轰鸣声从破路那头传来，盼着能在某位维和军人的手里接过半份救济口粮。可即便是这点残羹冷炙，也比“本国政府”发来的又一份声明来得更有诚意。"
 BRP_rural_insurgency: "乡村叛乱"
 BRP_rural_insurgency_desc: "在巴拉圭那片赤红的泥土与层叠起伏的绿野之间，一种熟悉的东西正在悄然滋长——叛乱。\n\n其根源可追溯至三国同盟战争，如今在外来占领的刺激下，游击之火再度燃起。虽然前法西斯与共产党残余势力仍在暗中“施肥”，真正让这场抵抗汹涌生长的，却是底层弥漫的民族主义怒潮。\n\n这场阴影中的勃发已使临时政府陷入两难境地：巴西人与阿根廷人滞留得越久，政府的合法性便接近枯竭；可若急于促成两国的撤军，那些还未拔除的武装反抗，恐怕也会连带着将政府本身一并吞噬殆尽。"
 BRP_forced_liberalisation: "强制自由化"
 BRP_forced_liberalisation_desc: "为了赐予巴拉圭一个自由主义的未来，占领者决心将这个国家“不祥的过去”连根拔除。莫里尼戈时期的法西斯独裁政权，以及那短命的共产党政权，都成了清算名单上的头号目标。相关官员被一批批扫地出门，曾经推动的种种政策也嘎然而止。红色政权时期仓促上马的土地集体化改革，更是被一夜之间叫停。那些昨日还代表国家意志、权势滔天的“法团机构”，如今不过是几串没人在乎的缩写字母，和几扇钉死了门的空办公室。\n\n一切熟悉的事物、所有还在勉强运作的体制，就这么在眨眼之间轰然崩塌。也许，一个更新、更好的巴拉圭真的会从废墟中诞生。但眼下，人们能看见的，只是一地混乱。"
 BRP_brain_drain: "人才流失"
 BRP_brain_drain_desc: "如果说巴西真心想在巴拉圭扶持一个自由、民主又稳定的政权，那它最离不开的合作者，无疑是本地的专业阶层。从重建亚松森到各类基础设施规划，种种计划看似是为了重振国家，实则更像是在经营与这批知识菁英之间的稳固纽带。\n\n可眼下，越来越多的巴拉圭专业人士却把这层“纽带”当成了通往巴西本土的跳板。对他们而言，圣保罗、库里奇巴这些城市所能提供的经济机会和生活品质，远比眼前这片遍体鳞伤的家园来得诱人得多。\n\n而与此同时，那些没有技能、没有机会、却有饥饿与绝望陪伴的巴拉圭底层民众，也终于看清了同一个现实……"
 ARP_casados_estate: "卡萨多斯的大庄园"
 ARP_casados_estate_desc: "还没等对巴拉圭正式宣布胜利，阿根廷政府就已经看中了一户能帮他们稳住局势的家族——卡萨多斯家族。\n\n自阿根廷第一次入侵巴拉圭起，卡萨多斯家族便借着商业扩张和在外交部的强力游说，逐渐攫取了举足轻重的地位。他们主动向政府递交了一份“可信人选”名单，推荐了几位合作对象。而作为交换条件，他们要求对自己的事务拥有完全的自主权——对此，布宜诺斯艾利斯方面也欣然应允了这一请求。"
 ARP_king_cotton: "棉花大王"
 ARP_king_cotton_desc: "阿根廷干涉巴拉圭的战争开销，主要由布宜诺斯艾利斯的商人们出资承担。如今，轮到他们收回成本、狠狠捞上一笔了。他们盯上的，是棉花。在这片新拿下的土地上，他们掌控了大部分棉花产出，远远压过了那些早就被战乱和冷落折腾得喘不过气的本地农民。对这些农民来说，这又成了从他们手里硬生生拽走的一笔代价。可在远处，那些“棉花大王”和他们的“部长”们，却正盘算着怎么把这门生意做大、把利润挣得盆满钵满。"
 PAR_OAS.1.t: "美洲国家组织排外主义的终结"
 PAR_OAS.1.desc: "“我理解你的顾虑，瓦尔特。”美国大使的脸上挂着单薄的笑容，“但决定就是如此，一旦有机会，我们就会邀请阿根廷加入美洲国家组织。”\n\n外交部长瓦尔特·莫雷拉·萨莱斯感到自己的下巴在收紧。两人在使馆的一次例行讨论中聊到了这个话题，但对方没有表达出丝毫让步的意愿……莫雷拉·萨莱斯深吸一口气说：“让阿根廷这样的流氓国家加入，只会破坏美洲国家组织的运作。像这样使其合法化——”\n\n“他们没法得到搞破坏的机会，我们会先给他们一个试用期——没有投票权的那种。至于你提到的合法性问题，”大使迅速打断了瓦尔特，然后凝视着朝东的窗户停顿了一会，“我们要是不把他们拉进来，他们就只能与我们为敌。华盛顿宁可要一个麻烦的合作伙伴，也不想在家门口看见一个日耳曼尼亚、罗马或者东京的盟友。如果巴西利亚也有同样的想法，我方希望你能在下次美洲国家组织的会议上投赞成票。”\n\n莫雷拉思考了一会，然后摇摇头：“我们最多只能弃权。”"
 PAR_OAS.1.a: "那个单薄的笑容又回来了：“很好。我们已经有了足够的票数。”"
 PAR_OAS.2.t: "斯尼佩岛的幽灵"
 PAR_OAS.2.desc: "美洲国家组织的紧急会议进入到第五个小时，代表们的脸上已经开始显露疲态。几乎整个美洲的领导人和代表齐聚华盛顿特区，只为了决定是否要接纳阿根廷加入美洲国家组织。巴西驻组织代表阿劳若·卡斯特罗用力揪着自己的衣领。现在房间里烟雾缭绕，咖啡早已变味，每名代表的衬衫都被背上的汗水浸湿。支持和反对阿根廷加入的论据已经激烈交锋了整个下午，最终在智利大使恩里克·比利亚罗埃尔的讲话中到达高潮。\n\n“尊敬的各位代表，”比利亚罗埃尔神情严肃，“1958年，我们在和今天相同的房间中谴责阿根廷对我国进行了令人发指、背信弃义、极其利己的攻击。有趣的是，我今天在这里看到的许多面孔也和当年的会议一样。我们怎么能让这些流氓、强盗进入一个基于规则的组织？阿根廷的帝国主义野心并没有因斯尼佩岛战争中流淌的鲜血得到满足。在我国主权的南极领土上，他们仍在袭扰我们的人员，甚至用军舰和凶恶的捕鲸船侵犯我们的领海。”他停下来喘了口气，在场每一位训练有素的演说家都意识到这场讲话的高潮将至。比利亚罗埃尔向右做了个手势，他的同僚大使马西亚尔·米兰达立刻起身走到他身边。米兰达带着掘墓人般肃穆的表情，将一张又一张大幅照片放在展示架上，供所有人观看。房间里传来阵阵喘息声。“这些，”比利亚罗埃尔重新开口，“是来自温克岛和阿德莱德岛前哨站的照片，是我们的同胞被残忍杀害，沉尸冰海，活生生在住所中被烧成焦炭的照片。这个大会怎么能接纳这些怪物加入我们的行列？”\n\n投票的时刻到了。尽管带着极度的羞愧与不情愿，但卡斯特罗还是遵照计划，代表巴西投出了弃权票，确保阿根廷得以加入。他们只是无投票权的试用成员，他们迟早还是会被驱逐的。卡斯特罗只能在心中不断重复。"
 PAR_OAS.2.a: "给予阿德莱德死者的小小安慰。"
 PAR_OAS.3.t: "《页报》头版"
 PAR_OAS.3.desc: "亚松森的恐怖故事仍在不断浮出水面。革命法庭近日宣布新一轮公开处决结果：三名男子在一次闭门审判后被判定犯有间谍罪与非法服务境外势力的罪名，旋即被除以绞刑。另有四名神职人员，因被指控隶属反动组织，同样被吊死。此外，七名前莫里尼戈政府官员与六名前金融业从业者，被指控为资本而非劳动者服务、犯下未详罪名。他们被押至街头，在民众面前高声宣读罪状，接受群众的辱骂与欢呼，随后在嘲讽与欢闹声中就地处刑。最令人心碎的，是一名年仅十四岁的少年阿韦利诺·布鲁斯凯蒂的死刑执行。他被指控为“反动阶级出身”，罪名仅因其父埃杜尔弗·布鲁斯凯蒂是一名地产商与房东。自共产党掌权以来，布鲁斯凯蒂父亲已不知所踪，至今下落不明。此番处决使得总执行人数突破八百人，尚不包括切·格瓦拉夺权初期接踵而至的大规模报复性杀戮。据报道，逃往阿根廷与巴西的难民已达数万之众。\n\n《圣保罗页报》同时谨向读者致以关注——我社特派记者伊萨伊亚斯·马德鲁加·达·丰塞卡，至今仍被巴拉圭当局拘押，罪名是刊印煽动性文章与宣扬资产阶级民族主义。除伊萨伊亚斯外，另有十二名巴西籍公民被确认羁押，另有约五十人失踪，生死未卜。\n\n乌戈·安德拉德·马德鲁加合起报纸，抿了口咖啡，试图把喉头那股反胃的酸意压下去。他沉默了片刻，思索着：若那时他身在巴拉圭，他的妻子又该如何承受？若自己成为了那十三名“倒霉鬼”中的一员，他的命运是否也只会化作报纸上的一句报道？那，会不会就是他们所有人的墓志铭？"
 PAR_OAS.3.a: "下一场抗议中，人群里多了一张新面孔；也多了一道声音，呼吁巴西出手相救。"
 PAR_OAS.4.t: "达摩克利斯的王座"
 PAR_OAS.4.desc: "[BRA.GetLeader]办公桌上的对讲机沙沙作响：“盖泽尔将军来了，他想讨论一下巴拉圭的局势，要请他进来吗？”总统朝一名助理点点头，助理迅速将最新的情报递上，随即退了出去。盖泽尔将军走进房间，沉默而恭敬地向总司令行礼。总统点点头，盖泽尔稍微放松了姿势。\n\n“总统阁下，您看过情报报告了吗？我们越来越担忧巴拉圭向激进分子输送资金和武器，他们企图瘫痪我国，为共产主义颠覆创造条件。许多高级将领都希望尽快动员部队，在巴拉圭局势进一步恶化之前进行干预。”\n\n“我看过了，将军。”[BRA.GetLeader]点头示意桌上的报告，“但立即采取行动未必是最明智的选择。当地地形复杂，我们的任何行动都可能加剧紧张局势，甚至比切·格瓦拉更能激励那些叛乱分子。”\n\n“如果我们不行动，阿根廷可能会行动，那情况会更加糟糕。阿根廷军队直接在我们边境集结。如果我们没有做好准备，很可能面临阿根廷入侵我国的局面。”\n\n“这种可能性很低。如果阿根廷和我们同时入侵巴拉圭，那么任何一方偏离目标的一枚炮弹或空袭，都可能将我们两国卷入全面战争。”\n\n盖泽尔沉默片刻，开口说道：“当然，最终决定权在您。请记住，您领导军队，是因为我们相信您能够履行总司令的职责，保护国家不受伤害。但如果军方认为您无法继续承担这一职务，那么……”"
 PAR_OAS.4.a: "盖泽尔向总统敬了一个略带讽刺意味的军礼后，便转身离开，让总统独自思考这番话。"
 PAR_OAS.5.t: "美式解决方案"
 PAR_OAS.5.desc: "红旗在亚松森飘扬。巴拉圭难民涌出国境，新政府激进的宣言在整个大陆回响。巴西军方高层催促总统尽快军事干预，以防革命蔓延。然而问题在于，阿根廷军方也抱有同样的打算。\n\n这是巴西利亚决策者们面临的主要难题，无论文职还是军职。情报显示，阿根廷正在积极备战。虽然所有人都同意，巴西边境出现一个共产主义国家是绝对无法接受的，但如果巴西与阿根廷同时出兵巴拉圭，一旦叛乱分子被消灭，两国军队便会在战场上狭路相逢，局势极有可能进一步升级。更不必说占领巴拉圭直至恢复秩序所带来的巨大成本。\n\n经过数小时的激烈辩论与深思熟虑后，美国驻巴西大使林肯·戈登带着一项方案来到[BRA.GetLeader]及参谋们面前。巴西与阿根廷单靠自己绝不可能合作，但如果在美洲国家组织的框架下进行干预，由第三方调停两国利益，问题便可迎刃而解。华盛顿对巴拉圭本身的命运兴趣不大，但绝不希望南美洲爆发战争。戈登承诺，美国有足够的选票与影响力促成此事。\n\n一些将军自然对这一计划表示不满。少数人认为，这样做是承认巴西需要邀请整个美洲来解决自家后院的问题，这令人感到耻辱。还有人指出，正是美国当初干涉施压，导致巴西不得不允许共产主义者加入联合民族解放阵线——现在巴西正在自食苦果。不过，若此举真能奏效，提供一个不引发更大冲突的合法干预框架，无疑是一个相当诱人的选择。"
 PAR_OAS.5.a: "很快，美洲国家组织紧急峰会召开，巴西接受了戈登的方案。"
 PAR_OAS.5.b: "计划遭到否决，巴西将不再依赖华盛顿，而是独自奋战。"
 PAR_OAS.6.t: "合适的渠道"
 PAR_OAS.6.desc: "阿劳若·卡斯特罗拨开其他代表，匆匆离开了美洲国家组织设在华盛顿特区的美洲之家的会议室。一位美国助手拉住了他的胳膊，他便跟着这位年轻女子穿过拥挤的走廊。\n\n卡斯特罗松了松领口，显然对刚刚结束的会议感到疲惫。投票结果对他有利，但过程并不平静。他用带着口音的英语对助手说道：“你应该听听古巴代表在里面的表现，吼得跟山羊似的，脾气也一样倔。如果你真想见识‘帝国主义’，不如往大西洋另一边看看，嗯？”\n\n助手没有回答，而是打开了一条僻静走廊尽头的一扇门，把卡斯特罗引进一间小办公室。她指了指桌上的电话：“如约安排了您和巴西利亚的通话。”\n\n“这线路安全吗？”卡斯特罗问道。助手点点头后便离开了。不一会儿，卡斯特罗已经在与高原宫通话了。\n\n“好消息，总统先生，决议通过了。美方很快会联系你和总参谋部，与阿根廷协同发动入侵。他们给我看了拟议中的占领区地图——照例标榜着什么‘巴拉圭将保持主权与独立’，还搞了个光鲜亮丽的美洲国家组织监管政府，好像他们的人真的会上前线一样。还有一条规定是不许割让领土，所以玻利维亚人会很不高兴。关于他们在查科的领土声索，你可能会接到电话，我先提醒你一声。这就是组织在巴拉圭问题上的立场，总统先生……”"
 PAR_OAS.6.a: "“这一切完全合法，而且都是为了他们好。”"
 PAR_OAS.7.t: "断裂点"
 PAR_OAS.7.desc: "“今晚的头条新闻，在美洲国家组织投票授权巴西和阿根廷军队巴拉圭进行联合入侵后，巴西全国各地都爆发了抗议活动。此前在峰会进行期间就有小规模的抗议活动在持续进行，随着投票结果出炉，反对[BRA.GetLeader]总统投出赞同票的民众已经大批涌上街头，从贝伦到圣保罗，全国各地都出现了抗议浪潮。”\n\n“大部分抗议活动由左翼政党所策划，他们谴责政府发动入侵，呼吁巴西人民尊重巴拉圭人民的意愿，与他们选出的新政府站在一起。其他抗议者则不那么以意识形态为主导，他们倾向于只发表反对战争的生命，并对战争中必然会出现当地伤亡表示担忧。聚集在南部地区的一小撮反阿根廷抗议者质疑与阿根廷军队合作的可行性，呼吁加强对于边境的防卫。”\n\n“在此期间，已经有数起抗议活动演变成了暴力事件，抗议者向警方投掷瓶子和石块，砸碎窗户和汽车，政府不得不派遣防暴队前往事发地点控制骚乱。最大规模的暴力冲突发生在里约热内卢，政府甚至调动了军队协助镇爆，总共有四名警察和军人在此次事件中受伤，另有八十五名抗议者受伤。警察局长发布的官方声明指出，不排除有巴拉圭渗透者有意煽动人群不满的可能性，他强调，民众应该擦亮双眼，保持谨慎和警惕。”\n\n“这无疑是一个重要的时刻，我们图皮电视台会竭尽所能，确保公众能及时了解事态的进展。”"
 PAR_OAS.7.a: "国家统一，民族不合。"
 PAR_OAS.8.t: "一决高下"
 PAR_OAS.8.desc: "姗姗来迟的罗德里戈·古铁雷斯刚一进门，他的头就疼了起来。作为美洲国家组织的首席专员，在图尤蒂行动中调解巴西和阿根廷矛盾的责任自然而然地落在了他的身上，这让他感到头疼不已。他本以为只要迟到个那么一小会，就能不必与暴躁的两军统帅面对面，可这个希望却落了空。当然，这种看法对他们其实并不公平，毕竟他们在平时都是脾气温和的好人。可一到了这里，他们就会对着一切鸡毛蒜皮的小事大吵特吵，甚至对着会议地址争论不休。直到罗德里戈提出了一个中立的美军基地，他们两人才勉强罢休。还没进入会议室，他就已经听见了门内的吵闹声。\n\n“凭什么你们阿根廷人要占这么多补给？难道自己不会做饭吃吗？”卡洛斯·德·梅拉·马托斯少将抱怨起来。\n\n“我们提供了大批能在高海拔状态下作战的精锐步兵，看在我们是同盟的份上，难道你们巴西就做不到多提供些后勤吗？只要有足够的燃料，阿根廷军队就能轻松击败那些信仰共产主义的散兵游勇。我们的燃料要是够用，肯定会用在车辆上。但我们得优先供给空中支援任务。”拉滕巴赫立刻针锋相对。\n\n“如果你当初能听我一句劝，跟我们组建联合空军进行巡逻，还能有这种问题？”\n\n拉滕巴赫将军一把将手中的杯子摔在地上，随后摇了摇头：“简直是浪费时间。我建议我们先休息个十分钟，喝口水，冷静冷静，再慢慢审查联合的提案。”\n\n在两位争吵的将军离开后，罗德里戈也跟着走出了房间，他拿出香烟，刚想着得靠这东西冷静冷静，就看到宪兵将几名鼻青脸肿的巴西和阿根廷士兵在他眼前拖进了禁闭室。他再次感到一阵头疼。"
 PAR_OAS.8.a: "我们身边这么多敌人，还差巴拉圭一个吗？"
 PAR_OAS.9.t: "清算"
 PAR_OAS.9.desc: "这场战争，标志着巴拉圭末日的开端。边境城市佩德罗·胡安·卡瓦列罗在不断的炮火与空袭中燃烧。然而，猛烈的炮击并未完全清除所有游击队。雷耶斯上尉和他的士兵们被困在喷泉后面，一群敌军则藏身于一座塔楼内，在屋顶架设的机枪居高临下地扫射着他们。幸运的是，支援很快到来——首先是直升机螺旋桨的轰鸣声，然后是武装直升机机枪撕裂塔楼的怒吼。随着一轮火箭弹彻底摧毁敌军阵地，雷耶斯忍不住与士兵们一同欢呼起来。\n\n卡瓦略中尉深爱着自己的女友，去哪里都随身携带着她的照片——即便是驾驶F4鬼怪战机，在几千英尺的高空也不例外。他紧跟着长机俯冲穿过云层。下方铁道站的巴拉圭士兵四散逃命，一些人用步枪徒劳地朝天射击。卡瓦略特意把照片转开了视线——毕竟她最讨厌暴力场景。\n\n一辆M60坦克转过街角，指挥坦克的中士命令炮手调整炮塔朝向。这时，他们发现了目标：游击队用数辆卡车拼成了路障。正与敌军僵持不下的巴西士兵看到了救星，连忙四散躲避。中士大喊一声“开火！”，一枚高爆弹立刻击穿路障。坦克随即开动，用安装在车前的推土铲将障碍推到路边。"
 PAR_OAS.9.a: "履带下的碎石瓦砾、死伤士兵发出沉闷的碾压声。"
 PAR_OAS.10.t: "最后的分赃者"
 PAR_OAS.10.desc: "在美洲国家组织紧急峰会上，气氛异常紧张。玻利维亚入侵查科地区的消息成了所有人讨论的焦点。由于巴拉圭必须在北方与南方防御联军的进攻，因此抽调了大量兵力，只能在查科的玻利维亚边境留下寥寥几支架子守军。等到玻利维亚收复圣克鲁斯，推翻了巴拉圭扶植的傀儡政权后，他们的军队便乘胜追击，一举入侵了巴拉圭领土。\n\n“这真是太糟了！”罗德里戈·古铁雷斯的声音从平日的镇静转为尖锐：“玻利维亚人正要求吞并巴拉圭领土作为对圣克鲁斯的赔偿。现在整个世界都认为，这场入侵只是成员国瓜分巴拉圭领土的借口。”\n\n“冷静，我们决不能自乱阵脚。”卡洛斯·德梅拉·马托斯摇了摇头，“我们应立即与各国大使联系，明确表示如果他们继续在查科地区推进，我们将表示极度不满。为了他们国家的利益，以及军队的安全，他们必须放慢推进速度，并与我们协调行动。”\n\n“我赞同。”拉滕巴赫将军点头道：“玻利维亚军队或许能对付格瓦拉的残兵败将，但他们自身早已被削弱多年。战争威胁本身就足以遏制他们，入侵行动可以按计划进行。我想，他们也不至于继续孤注一掷。”\n\n罗德里戈几乎不敢相信自己的耳朵：阿根廷与巴西代表团竟然破天荒地达成了共识。“很好，我也会通过美洲国家组织来协调。”\n\n拉滕巴赫笑了笑：“看来巴拉圭人正面临着第二次三国同盟战争的局面。”"
 PAR_OAS.10.a: "“第一次对他们来说可不怎么愉快。”德梅拉·马托斯笑着附和道。"
 PAR_OAS.11.t: "康塞普西翁"
 PAR_OAS.11.desc: "想让被征服者明白，胜利已归于巴西，他们就得亲眼看到军队；而军队，也需要亲眼见到他们的将军。至于少将卡洛斯·德梅拉·马托斯，他必须亲自见证这座城市的占领。\n\n巴拉圭的首都现在是康塞普西翁，而非亚松森。首都由国际美洲国家组织的维和部队和一个毫无实权的过渡政府占据着。德梅拉·马托斯的位置在此处，站在市中心圣母雕像前，接受士兵们的致敬。巴西军队伤亡极少，而共产主义分子被大量歼灭，这足以赢得士兵们的尊敬。\n\n德梅拉·马托斯的位置在指挥车的后座，沿着名副其实的巴西大道缓缓驶向巴拉圭河。他严厉的目光直视着那些羞涩胆怯的巴拉圭人，仿佛在挑衅某个想成为共产主义英雄的人试图射击。他们只会被身旁那两位来自维多利亚的士兵先行击毙；如今这两位士兵已有了老兵般敏锐的鹰眼。他的职责不是展现恐惧，恐惧只属于游击队员。\n\n他的职责是在阴暗的办公室里，耳边仍回荡着总统祝贺的电话与香槟开瓶的回响。他翻阅着康塞普西翁及整个巴西占领区的损失报告与重建计划；审视着那些据信仍然逍遥法外的共产主义者与法西斯分子的档案；展开最新的地图，细致标注阿根廷在南部的军事部署；他的手指沿着横穿查科的公路一路向亚松森划去。\n\n战争结束了。"
 PAR_OAS.11.a: "但围绕巴拉圭命运的真正一战，却尚未开始。"
 PAR_OAS.12.t: "敌人的敌人"
 PAR_OAS.12.desc: "雷耶斯上尉高举着一支刚从巴拉圭游击队手中缴获的步枪，相机咔嚓作响，他咧嘴而笑。又拍了几张举枪的照片后，他将步枪丢回武器堆中。成批的记者和摄影师涌向巴西和阿根廷部队的会师地点，希望能拍下两军士兵在击败共同敌人后展现出的友好情谊。\n\n可他们看到的却只是两支疲惫不堪的军队，他们甚至无法信任彼此——巴西人只在他们的占领区活动，阿根廷人也同样如此。士兵们不会互相拍手击掌，也没人会祝贺对面的“兄弟”们一切顺利。正当雷耶斯准备带着部下返回营地时，另一边传来了口哨声。\n\n“嘿，你！”年轻的阿根廷军官走到了两个占领区之间的边界，“恭喜你们的胜利！”倘若这人说出西班牙语，雷耶斯倒还能理解，但这阿根廷人口中不知为何说出了生硬又不协调的葡萄牙语。阿根廷军官举起手，似乎是想握个手。雷耶斯看了看那人的手，又看了看那人的脸。\n\n当他直接转身离开阿根廷人身边时，他听到身边的相机再度咔嚓作响。但他不在乎，他只想尽快回到营地，补足这些日子来缺少的所有睡眠。"
 PAR_OAS.12.a: "可以成为盟友，却无法成为朋友。"
 PAR_OAS.13.t: "己方无任何伤亡"
 PAR_OAS.13.desc: "偏僻农舍破损的石墙上弹孔密布，周围硝烟弥漫。空中仍回荡着热带鸟类被枪战惊吓后发出的啼鸣。看到闯入地下室的队友发出了安全信号，雷耶斯上尉将步枪抵在胸前，缓缓走出翻倒的推车。\n\n雷耶斯将身子缩进屋后的干草堆后，蹲伏着走进挖出的地下室。很快，他就走进了一个更宽敞的房间，两名身穿橄榄褐色制服，浑身沾满鲜血的部下朝他点头致意。叛军的枪是把老式的德国型号，保养得很差。一名游击队员瘫在地上，脖子上血流如注。另一人则仰面倒在一张桌子上，桌上摆着地图和几箱弹药——这游击队员大约十九岁，有着一张宽阔的巴拉圭本地面孔，表情因为死亡而扭曲。\n\n巴西部署到巴拉圭的反叛乱小队越来越多，可报告的情况全都一样。过去他们还能发现几件共产党的宣传物——要么是小册子，要么是旗帜，还有战士身上的红袖章——但在入侵的几个月后，这种情况越来越少见。雷耶斯在这栋房子里确实找不到这种玩意，更没能拿到什么有用的情报。无论雷耶斯的手下殴打了他们多少次，几公里外的村民们依旧嘴硬他们对这一地区的游击队一无所知。\n\n不需要任何军事才能，任谁都能看出日益壮大的游击运动不再是由克雷特的死忠，而是由愤怒的老百姓组成，他们希望外国人离开巴拉圭——根据军营里的传言，他们甚至得到了阿根廷的支持。就雷耶斯而言，他巴不得早日离开这个讨厌的国家，但巴西利亚的书呆子们却跟他说，他非得留在这里不可。"
 PAR_OAS.13.a: "雷耶斯上尉关于这次突袭的报告很敷衍：敌人全部消灭，己方无任何伤亡。"
 PAR_OAS.14.t: "善意"
 PAR_OAS.14.desc: "埃洛伊萨·莱唐·德·坎波斯曾经想要帮助他人。在巴拉圭获得解放后，她自愿成为了一名援助工作者，前去帮助巴拉圭人民。当她离家时，她幻想着自己会在那里成为一名英雄，巴拉圭人会自己从共产主义者的手中得救而为她欢呼。这场艰难的工作之旅足以为她封圣。\n\n可残酷的现实没过多久就将她从梦想中摇醒。日子一天天过去，她几乎一事无成。卡洛斯·德·梅拉·马托斯前脚刚受到的食物和金钱捐赠，转手就会交到占领军手中，只是为了给他们点追捕游击队员的动力。食物和毯子怎么都不够分，为了不至于落到没药用的境地，居民们能得到的药物要么减半，要么更糟。很多时候，埃洛伊萨只能为他们提供一句微薄的抱歉。\n\n没人想听抱歉。戒严令的结束期限一推再推。没有通行证，人们甚至都没法在夜间出门。任何超过七人的聚会都需要许可，可只有参加宗教仪式时才能得到证书。共产主义者夺取土地分给农民，现在这些土地又从农民手中强制收回，他们就算想找点事做都不行。埃洛伊萨意识到了眼下的现状到底有多讽刺，当她看到人们眼中的饥饿和绝望时，她不得不承认，这些人理应感到愤怒。\n\n当她把物资带到下一个分发点时，一群巴拉圭男人盯着她，眼中只有仇恨。“先生们，我有食物和……”\n\n很快，一堆空罐头混杂着各类垃圾朝她扔来。“滚出去！巴西母猪！带上你的食物和军队，快滚！”\n\n恐惧涌上埃洛伊萨的咽喉。军人们要么待在军营里，要么就是在四处搜寻游击队员，孤身一人的她毫无反抗的能力。许多援助工作者都被打过，她听说甚至有不少人死去。"
 PAR_OAS.14.a: "她落荒而逃，将她的梦想抛在身后。"
 PAR_OAS.15.t: "邪恶"
 PAR_OAS.15.desc: "他只是一个普通人。没有人会注意到他穿过圣保罗的人群，他的双眼锁在参议员身上，右手紧握着夹克口袋中的左轮手枪。参议员站在新学校前的讲台上，身侧站着市领导、教师和当地儿童。他的演讲被一声瓜拉尼语的呐喊打断——“解放巴拉圭！”\n\n一声枪响过后，人群开始尖叫。参议员向后踉跄几步，子弹只击中了他的肩膀，很快就在护送下离开了现场。在他扣动扳机的那一刻，参议员的保镖已经拽住了他的手臂，一把将他摔倒在地。惊恐的人群逃向街巷，孩子们则失声哭泣。\n\n警察花了一些时间才找到翻译，他在警局里坦率地说，他只是一个普通人——两年前他从阿曼拜的乡村来到圣保罗，成为一名卡车司机。大部分工资都被他寄回了家，只因他老家的棉花买起来更便宜，他们在革命后得到的土地全都被没收，然后还给了地主。他在巴西没什么熟人。\n\n记者和评论家注意到，这种类型的袭击在几年间只发生在占领区或边境城镇，发生在巴西大都市还是头一遭。这对日益不受欢迎的占领来说毫无益处，边境两侧的人们都在等待占领能在1971年按照预期结束。事实上，提前结束占领已经不再是个完全边缘的想法。\n\n在审讯期间，有人纠缠他，谈起拿枪对准儿童是多么邪恶——万一他射偏了，结果简直不堪设想。他反问，那巴拉圭的孩子又怎么办？巴拉圭的邻国凭什么能毁掉他们的未来？"
 PAR_OAS.15.a: "这种影响将伴随终生。"
 PAR_OAS.16.t: "不受欢迎"
 PAR_OAS.16.desc: "在华盛顿特区宽敞的美洲之厅高耸的天花板下，美洲国家组织的旗帜下聚集了整个西半球的达官贵人。分别来自里约热内卢和圣菲的两位美洲国家组织代表并肩走在大理石地板上，时不时低声交谈。巴西人阿劳若·卡斯特罗很快找到了一个空房间，便扭头示意他的美国同行跟在他身后。\n\n当厚重的橡木门在他们身后关上时，阿劳若·卡斯特罗用还算流利的英语大声嚷嚷起来：“我们不能接受，绝对不能！要是你们放任庇隆和他的走狗颠覆这个组织，那无论是巴西，还是我本人，都将立刻退出。”\n\n新墨西哥代表缓缓点头：“哦，我同意你的看法。白宫也是这样想的。”\n\n阿劳若·卡斯特罗这才松了一口气：“很好。”这是他能说出的全部。\n\n美国人凝视着阿兹特克风格的墙面装饰陷入了沉思。“整件事都是一场闹剧。庇隆宁愿抛弃南美洲最大的和平机会，转而将自己投入欧洲的死牢。”\n\n阿劳若·卡斯特罗打开门：“他必然会做出这种选择。来吧，我们得去警告乌拉圭人。”"
 PAR_OAS.16.a: "美洲之厅容不下一个人。庇隆。"
 PAR_OAS.17.t: "巴拉圭困局"
 PAR_OAS.17.desc: "“总统阁下，这件事的危险性无论怎么强调都不为过。”一位军方高层郑重向巴西总统说道，“这绝不是普通的军事演习。我们拍摄到了他们的列车，研究了他们空军的飞行模式，也看过情报部门提供的后勤数字。”军官深吸一口气，“阿根廷马上就要入侵巴拉圭。我们的估计是，如果没有我们的干涉，他们一周内就能抵达巴拉那河。”\n\n另一位军官接着发言：“如果我们先发制人，在阿根廷行动前先发制人，就能保障边境安全。”一名外交部官员清了清嗓子，开口道：“总统阁下，恕我直言，军事介入巴拉圭的危险极大。若我们插手，阿根廷将毫不犹豫地对我们宣战。相反，我们只需要威胁动武，以此作为外交筹码即可。”\n\n总统靠在椅背上陷入沉思。如果巴西军队进入巴拉圭，很可能引发阿根廷的冲突，进而升级为南美洲的全面战争。但假如阿根廷根本不被巴西的威胁吓倒怎么办？如果他们的脚步不停在巴拉那河，又怎么办？抉择固然艰难，但为了巴西的利益……"
 PAR_OAS.17.a: "……有必要让布宜诺斯艾利斯感受到威胁。"
 PAR_OAS.17.b: "……直接对阿根廷发起先手打击。"
 PAR_OAS.18.t: "真相时刻"
 PAR_OAS.18.desc: "全世界的目光都聚焦在了南美洲。\n\n在欧洲，人们坐在自家客厅里，透过德国国家广播公司的电视画面，看着记者沿着阿根廷的火炮阵地走过，远处的巴拉圭边境依稀可见。\n\n日本的摄制组则穿梭于里约热内卢的杂货店之间，镜头捕捉到了门口排起的长队，以及民众因为战争恐慌而流露出的不安与犹豫。\n\n在世界另一端的白宫，新闻秘书正竭力控制住记者群，试图向全国民众保证，政府高度重视南美洲的紧张局势。\n\n而在巴西利亚，总统[BRA.GetLeader]阴沉着脸，凝视着桌上铺开的地图、侦察照片和情报报告。军官们蜂拥而至，实时汇报着最新消息：如果阿根廷真的入侵巴拉圭，他们数日内便可抵达巴西边境。通过机密外交渠道，[BRA.GetLeader]已向布宜诺斯艾利斯的同行明确表示——若阿根廷军队踏入巴拉圭领土，巴西将别无选择，只能同时展开入侵。他的手紧紧攥着桌沿，指节泛白。他希望自己永远不必兑现这个承诺。\n\n全世界屏息凝神，而总统府内却是一片忙乱。人们头脑中挥之不去的阴郁想象——巴西与阿根廷两军在战场上狭路相逢，在某个无辜小国的废墟上兵戎相见。这似乎一步步逼近现实。就在气氛日益紧张之时，一阵急促的电话铃声响起。一名将军接起听筒后，向总统说道：“总统阁下，他们撤军了。阿根廷人决定退让。”"
 PAR_OAS.18.a: "巴拉圭的共产主义政权将继续存在，但至少，其他人也同样得以幸存。"
 PAR_OAS.19.t: "越过边界"
 PAR_OAS.19.desc: "大约十几名士兵占据着一所农舍——屋子仅有两间房，孤零零地矗立在被烈日暴晒的土路旁。四周皆是棉花田，偶尔还能看到地平线上类似的简陋棚屋，那些原本居住于此的农民在得知亚松森的革命爆发后，自发地将当地地主溺死在附近的河中。如今这些农民也已不见踪影，有些被战争逼迫着逃难，有些则躲进了丛林。\n\n从巴西-巴拉圭边境部署，到实际入侵行动，雷耶斯上尉率领的部队几乎没有遇到过真正的战斗。事实上，他们唯一的伤员是通讯兵——而且只是闹了个肚子疼。因此，此刻雷耶斯不得不自己摆弄着笨重的无线电设备，试图从屋子主房中与总部取得联系。\n\n“总部，听得到吗？这里是……坐标是……”雷耶斯一次次重复着这些话语，却只听见电台里不断传来的静电噪音，渐渐变得烦躁起来。门外，两名士兵正坐在齐腰高的沙袋上抽烟；另一间用来睡觉的房间里，士兵们正闲聊着。\n\n突然，电台中传来模糊的声音：“……确认越过查科地区……敌军已抵达巴拉那河渡口……”雷耶斯顿时警觉起来，仔细地调整旋钮，试图捕捉清晰的信号。熟悉的巴西葡萄牙语又一次传来：“……缺乏有效情报……防线多个地点发生冲突……”\n\n防线各处爆发冲突？雷耶斯上次得到的消息显示，共产主义分子早已销声匿迹了。当他正困惑于这些支离破碎的信息时，门外抽烟的士兵突然大喊了一声。\n\n雷耶斯回头看去，越过门框，越过机枪阵地，越过棉花田的尽头，正见一列坦克从地平线上隆隆驶来，扬起滚滚尘土。"
 PAR_OAS.19.a: "究竟是谁开的第一枪？阿根廷的装甲部队正在迅猛推进。"
