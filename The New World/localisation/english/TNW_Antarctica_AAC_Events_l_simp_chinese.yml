 antarctica_aac_diplo.102.t: "冻人接物"
 antarctica_aac_diplo.102.desc: "智利军靴已在格林尼治岛的厚重积雪上辗转了不知多少日月，但墨西哥人还是头一回踏上这里。\n\n外交部长曼努埃尔·特略·鲍劳德的双脚插在冰雪里，止不住地发抖，而他的双腿与胳膊也好不到哪里去。事实上，除了两枚眼珠子幸免于难，他的全身都抖得像筛糠一样。他死死盯着阿图罗·普拉特站的那些低矮却实用的房屋，鲜艳的红色屋顶在南极冰盖的衬托下显得格外醒目。在它们顶上，一股股炊烟正在翻滚升腾。\n\n要不是他的牙颤得厉害，鲍劳德肯定会对自己的外交手段破口大骂。智利在美洲国家组织到处宣传自己对南极的的领土主张，而他则为墨西哥的支持讨价还价，最终达成了一笔相当公平的交易。他怎么也想不到，当他在与智利人就铜矿折扣、反法西斯立场与一座被重重冰封却名声在外的基地等事宜斤斤计较时，随口提的一句私人访问的请求，竟决定了他的命运——这本应成为他辉煌职业生涯的华丽收官。\n\n鲍劳德与同行的智利人一步步走向基地。就在外交部长即将推门而入之际，突然感到毛皮袖口被拽了一下，接着，他便看见一位智利人满脸堆笑地向他提出请求。他竖起了耳朵，穿过呼啸的狂风，好不容易才听清楚对面的话——他们想同这位身份显赫的游客合影留念——尽管这位游客都快病倒了。\n\n幸好，所有来合影的人都专业至极。一位科学家手持相机，带着人们走到基地的小型纪念碑前。智利的外交二人组——比利亚罗埃尔和米兰达，与他拉到了一个不失尊敬与亲近，也不会显得太紧密的距离。鲍劳德咬紧咯咯作响的牙齿，挤出了一幅迷人的微笑。紧接着，快门利落地咔嚓了两声。"
 antarctica_aac_diplo.102.a: "一场外交胜利就这样被定格在时光的长河中。"
 antarctica_aac_diplo.103.t: "希望渺茫"
 antarctica_aac_diplo.103.desc: "“这绝无可能，部长阁下。对智利的访问无果而终令我深感遗憾，但我是不会冒让阿根廷放弃支持拉丁美洲无核化事业这个险的。”话音一落，洛佩斯·马特奥斯总统收起了脸上一丝不苟的失望神情，转而露出一抹浅笑：“况且我们也根本没必要为了几米厚的冰归谁管这事儿和人闹矛盾嘛。”\n\n特略·鲍劳德依旧面容僵硬：“阁下，我或许能争取到更多的低价铜矿，还有可能在智利宣称的南极领土内为我国军事及科研人员建立一个基地。”\n\n闻言，洛佩斯·马特奥斯皱起眉头：“我不可能把我们在美洲国家组织的票卖给别人。部长，就算不看阿留申群岛的那桩破事，你我也已将墨西哥打造成了全球最受人敬重的仲裁者。即便能把阿根廷的反应抛之脑后，我也绝不会让这份遗产被肮脏的金属交易玷污。”\n\n特略·鲍劳德一脸无奈，眨了眨眼。他本该把梅纳带过来，让他算算这些新铜线能连接起多少新建的住宅和企业——再算算这会怎样扩张联邦电力委员会，又怎样去巩固马特奥斯的另一项伟大遗产：电力国有化。但他终究没这么做，最终害的这位外交官的南极梦与他分道扬镳。\n\n洛佩斯·马特奥斯挑起眉头，注视着他那位一言不发的部长。鲍劳德最终沙哑着嗓子开口，表示他将通知智方，并指示墨西哥驻美洲国家组织代表在南极投票中弃权。眼看马特奥斯点了点头，鲍劳德便悻悻地退回了自己的办公室。"
 antarctica_aac_diplo.103.a: "回去后，他就麻利地把那本皮草大衣和雪地靴的目录丢进了垃圾桶。"
 antarctica_aac_merino.24.t: "你不合我拍"
 antarctica_aac_merino.24.desc: "“没用的废物！”\n\n梅里诺的怒吼听起来能给冰层震碎。他站在巡洋舰的舰桥上，面前是桅杆般笔直站立的文德利希少校，如同雕像般纹丝不动。狂风如刀片般拍在他脸上，但上校却浑然不觉。只因胸膛中熊熊燃烧的怒火，要比任何风雪还炽热。\n\n“我给你的任务简单的不能再简单了！就是去钓那群低能狒狒上钩！你他妈在干啥？！把我们的狩猎变成了野狗的哀嚎！”\n\n梅里诺逼近文德利希，脸庞贴近他的部下，接着对他大声嘶吼，唾沫星子到处乱飞：“南锥体的那帮贱种——他们跑了！不仅跑了，还他妈骑在脸上笑话我们！还他妈了个逼的杀了我们的人！来，我问你，这一切都是为了啥？我她妈让你去当猎人，你却像路边的一条野狗一样夹着尾巴灰溜溜地滚了回来？”\n\n文德利希一言不发，紧紧盯着远方灰蒙蒙的地平线。这无异于又往梅里诺的怒火上浇了把热油。\n\n“我懒得和你废话。”梅里诺铁钳般的手紧紧攥住文德利希毛呢大衣的胸口。拖着他走下吱呀作响的金属舷梯，向船舱深处走去。越往下走，空气就越发沉闷潮湿，那股海水与锈蚀的气味也愈发浓重。接着，他们到了——那间曾让他把考廷的乡巴佬彻底击溃的舱室。\n\n梅里诺猛地把文德利希摔进舱室。在踉跄间，他看见了一把锈迹斑斑的椅子，暗沉的污渍布满表面。两名忠诚的陆战队员的身影从上校身后浮现。\n\n“少校，软弱，”梅里诺的语气远比表现出的更平静，“正是你的问题所在。你把考廷动乱的教训忘干净了。”\n\n他向手下点头示意。\n\n“让他想起来。”"
 antarctica_aac_merino.24.a: "厚重的铁门砰的一声关上，隔断了最后一丝光线。"
 antarctica_aac_guzman.24.t: "丧钟为谁而鸣"
 antarctica_aac_guzman.24.desc: "古斯曼的办公室里，只能听到旧椅子的吱呀声。暴风雪已然平息，窗外是片宁静的白色荒原。\n\n古斯曼直接对着瓶口灌下一口皮斯科酒。烈酒灼烧着喉咙，却无法驱散灵魂深处的寒意。他凝望着阿图罗·普拉特站的灯光，试图窥见本可能存在的景象。\n\n新建的实验室和宿舍？有什么意义？建造更先进、设备更完善的坟墓？好让下一批科学家手握稍稍先进的仪器冻死在雪原？\n\n拉丁美洲各国的温馨家园……古斯曼呛咳似的发出干涩笑声。“温馨家园”，连他亲自邀请的第一批客人都无法保全，是古斯曼将他们引进了死地。\n\n酒瓶已空了一半，思绪如雾般模糊：一切都毫无意义。所有计划、所有不眠之夜、所有妥协……最终只换来雪地里更多冰冷的尸体。\n\n突然传来轻柔的敲门声。“胡里奥？是我，卡洛斯。你在里面吗？”亚克希奇轻声关切道。\n\n关切的问候击碎了古斯曼心底的最后防线。同情？他配不上。盲目的狂怒瞬间吞噬了他。他抓起皮斯科酒瓶，不假思索地砸向房门。\n\n玻璃碎裂，酒精溅满墙壁。\n\n“滚！”古斯曼沙哑的嗓音陌生而嘶哑，“别管我！”\n\n亚克希奇的脚步声渐渐远去，门外安静下来。酒液滴滴答答的落下，古斯曼孤身留在黑暗之中，俯身趴在了桌子上。"
 antarctica_aac_guzman.24.a: "南极大陆上什么都不会变多，除了坟墓。"
 antarctica_aac_sobral.2.t: "缚住疯狗"
 antarctica_aac_sobral.2.desc: "有人没敲门就打开了古斯曼办公室的大门。文德利希少校大踏步走进门内，随手把门一甩，门锁咔哒响了一声，在寂静的屋内显得格外刺耳。教授从文件堆里抬起头来，用疲惫的眼神打量着他。他一点也不惊讶，就像早就料到这次拜访一样。\n\n“文德利希少校。”古斯曼声线平稳，不带有一丝波澜。\n\n文德利希省去了寒暄。他的报告言辞利落，充满了军人气概，但声音里隐约透着一丝僭越的紧张——就好像在受人检阅一样：“教授，情报部门已经确认阿根廷正在推进一项代号为‘90行动’的计划。目标是南极点。这是研究所组织的科学考察项目，而非军事行动。他们在内陆深处建立了一个大型补给站，在途中为其提供后勤保障。”\n\n古斯曼缓缓点头，手指在桌面轻敲：“原来……是这样。我的……消息源……曾暗示过某种‘科学企图’。但并未透露细节。”他闭目片刻：“然而，他们的目标始终如一——在极点插旗，让我们在国际舞台上成为笑柄。又一次试图否定我们的权利。”\n\n话音刚落，他便转头看向文德利希：“但你此行不止为此吧？”\n\n“不止，教授。”文德利希吸了口气，动作小得难以察觉：“梅里诺上校已经下令。组建突击队，攻击并摧毁那座补给站。”\n\n屋中陷入死寂，仅能听见窗外狂风呼啸。古斯曼面色丝毫未变，唯有死一般的疲倦浮现在他脸上，就像早就料到这个噩耗一样。\n\n“他当然会这么做，”他低声说道，“对他而言，暴力，才是唯一的解决办法。把科学竞赛化作屠杀，挑起一场我们打不赢的战争，只为了满足他对复仇的变态欲望。”\n\n他起身走向文德利希，与他四目相对：“不向你的直属指挥官汇报却来找我。你下了一步险棋啊，少校。”\n\n“我向智属南极的合法首长汇报过了。”文德利希的目光坚定不移。\n\n久违的微笑浮现在古斯曼嘴角：“你履行了职责，少校——对智利的职责。”他回到办公桌前，举起无线电，调到圣地亚哥的加密频道：“现在，我要履行我的职责了。政府必须得知道梅里诺打算引火上身这件事儿。他们会阻止他的，马上就会。”"
 antarctica_aac_sobral.2.a: "养狗还是得栓绳啊。"
 antarctica_aac_sobral.3.t: "冰冷狂怒"
 antarctica_aac_sobral.3.desc: "南极点，他们要去南极点了。\n\n侦察报告上的文字在他的脑海里一遍又一遍地盘旋着，仿若挥之不去的蠓虫。\n\n梅里诺紧紧地抓着面前的桌子，指甲似要嵌进木头桌面。这是阿根廷人最严重的侮辱。\n\n他们居然认为智利会如此软弱，任凭他们随便去度个假。\n\n这一定是故意的，阿根廷是在炫耀武力，是企图给看似被打败的敌人扇出最后一记耳光。他们不会蠢到认为能瞒过梅里诺的眼睛，侦察机可以轻而易举地观察到贝尔格拉诺站的所有活动，还有那个小小的前哨站。\n\n他们会为自己的狂妄自大付出代价的。\n\n梅里诺低头看着面前的地图，开始估算陆战队抵达阿根廷补给站所需的时间。\n\n智利将摧毁荒原上那个可怜的小冰屋，而当莱亚尔上校和他的士兵们冒着严寒与黑暗，渴望片刻的栖身之所和一顿热饭时，等待他们的将只是被洗劫一空的废墟——梅里诺终于明白了一句古老的谚语："
 antarctica_aac_sobral.3.a: "君子报仇，十年不晚。"
 antarctica_aac_sobral.3.tt: "§F§Y攻击阿根廷极点探险队§!的£decision_icon_small §D决议§!现在§G可用§!。§!"
 antarctica_aac_sobral.4.t: "顶级掠食者"
 antarctica_aac_sobral.4.desc: "阿科斯塔少尉把扑克牌摔到了桌上：“操，今天运气不好啊。”\n\n门外，暴风雪已经刮了整整三天。布里托斯闻言，耸了耸肩，啜饮着杯中的热马黛茶。驻站人员中最年轻的佩雷斯紧盯着无线电。他们被关在了这座钢铁小盒里，置身无边无际的白色荒原之中。\n\n突然之间，发电机停下了轰鸣，基地瞬间陷入一片漆黑。“他妈的。”阿科斯塔骂了一声，应急灯闪烁着微弱的光芒，“佩雷斯，去检查一下，八成是燃油管路又冻住了。”\n\n佩雷斯点点头，套上厚呢子大衣，抓起手电，走向通往发电机室的连接走廊。可好几分钟过去，他仍然没有回来。“佩雷斯？”阿科斯塔高声叫道。\n\n回应他的只有一片寂静。布里托斯取下挂在墙上的步枪：“少尉，我和你一起去。”发电机室的门半掩着，门缝间渗出刺骨的寒意。阿科斯塔用肩膀顶开门，佩雷斯不见踪影——情况不对。\n\n二人急忙折返，靴子重重地砸在金属地板上。这里不止有他们在。\n\n布里托斯的余光瞥见了第一个目标：一个穿着白色雪地服的身影出现在储藏室旁的阴影中。他迅速举枪，却仍是为时已晚，对手要更快。布里托斯跪倒在地，双手捂住喉咙，鲜血喷涌而出。\n\n阿科斯塔扣动扳机，但敌人已经不见了踪影，消失在昏暗之中。他背靠墙壁退向休息室，依靠微弱的应急灯光辨认周围的动静。他们有多少人？他们是怎么近来的？\n\n门廊有声响。阿科斯塔再次开火，端着步枪缓缓前行：拐角处空无一人。他又前进一步，随即，冰冷的触感倏然掠过后颈，剧痛如尖锥般刺入。\n\n文德利希少校将尸身放倒在地，扫视着自己的部下："
 antarctica_aac_sobral.4.a: "“尸体埋到雪里，现场清理干净。储藏室和油箱安上炸药，彻底把这里烧干净。”"
 antarctica_aac_sobral.4.tt: "\n§R在索夫拉尔基地，莱亚尔将得不到任何支援，只有废墟和冰雪。§!"
 antarctica_aac_sobral.5.t: "新时代的阿尔戈"
 antarctica_aac_sobral.5.desc: "电传机尖锐的声响打破了办公室的安静。古斯曼教授从地图前抬起头，走向出纸口：机器吐出的纸带就像是裹尸布上的小小一条。\n\n圣地亚哥电报STOP抄送布宜诺斯艾利斯新闻发布STOP南纬90行动成功STOP阿根廷国旗飘扬南极点STOP\n\n古斯曼反反复复咀嚼着这条干巴巴的简讯。他最初的反应同往常一样，略带迟钝的恼怒：又是演戏一样的姿态、又是对智利的当头一棒、又是企图抹消他们的领土主张。但与之前不同的是，这次阿根廷的行动足以登上全世界的头版头条——在他，古斯曼，执掌南极领地期间，发生了这样的事情。\n\n他走到窗前，凝望着远方的雪峰。或许有些违背理智，但古斯曼的心中竟不禁生出一丝……敬意：三千公里、穿越这片无情的地狱、纯粹的意志与耐力的壮举。真该死，莱亚尔，你居然真的做到了。往来密信中，他们谈及了克制，谈及了寻求和平。古斯曼虽然不知道行动细节详情，但他确信其本意绝非军事侵略。为此，他也暗自庆幸：他毕生追求的理想世界正是较量谁能走得更远，而不是比拼谁杀的人更多。\n\n刹那间，一幅奇异而忧郁的画面浮现在他脑海中：智利国旗与阿根廷国旗并立于极点。一场联合探险、一次世界尽头的握手。\n\n但这个念头转瞬即逝，冰冷的焦虑取而代之。梅里诺，他此时此刻就在阿德莱德岛，消息传到他耳中，一定是如同晴天霹雳。对他而言，这绝不是大胆的科学壮举，而是刻骨铭心的侮辱、是宣战行为。梅里诺一定会回来，带着满腔怒火将一切都归咎于古斯曼，归咎于他的“软弱”、他的“背叛”。\n\n古斯曼给自己倒了点皮斯科酒，冰块发出轻微的碰撞声。他啜了一口，暖意在体内蔓延开来，却无法融化胸中郁凝的心寒。阿根廷人赢得了竞赛，然而，真正的风暴才刚刚开始。"
 antarctica_aac_sobral.5.a: "风自北来。"
 antarctica_aac_sobral.6.t: "纯白之心"
 antarctica_aac_sobral.6.desc: "电传机尖锐的声响打破了办公室的安静。古斯曼教授从地图前抬起头，走向出纸口：机器吐出的纸带就像是裹尸布上的小小一条。\n\n圣地亚哥电报STOP抄送布宜诺斯艾利斯新闻发布STOP南纬90行动失联STOP推测探险队员已遇难STOP\n\n古斯曼反反复复咀嚼着这条干巴巴的简讯。冷意缓缓爬上他的脊背，原因却并不是南极的寒霜：莱亚尔，他死了。那个曾经和他秘密通信、寄托着未来和平希望、能讲通情理的男人——两人信笺上的墨迹尚未干透，然而冰雪已将一切统统埋葬。\n\n他走到窗前，凝望着远方的雪峰。这不是他渴望的胜利，也根本谈不上是胜利。白色虚无又吞噬了数十条人命。\n\n苦涩之中，古斯曼的心里萌生出冰寒的怀疑。是意外？意外在南极司空见惯，但这次有点不对。这片大地的确是吃人的怪兽，但若是这一切都出自某个人的手笔呢？\n\n古斯曼还记得梅里诺的狂怒和为斯尼佩岛报仇雪恨的誓言，但他没办法证明，甚至不敢宣之于口。然而，这个怀疑一旦扎根，便再也无法消去，逐渐变成了冷冰冰且令人恶心的确信。\n\n是那条疯狗终于挣脱了链子？他，古斯曼，因为他的优柔寡断，亲手解开了疯狗的枷锁？\n\n古斯曼给自己倒了一杯皮斯科酒，杯中冰块因他颤抖的手而叮当作响。阿根廷高层中的温和派已经彻底不复存在，莱亚尔已死，鹰派将会全面掌权——像是马塞拉、梅里诺这样的人。"
 antarctica_aac_sobral.6.a: "这幕悲剧将滋养新的怪物。"
 antarctica_aac_observers.1.t: "敌人的盟友的敌人"
 antarctica_aac_observers.1.desc: "“我还有一件事要同您商榷，长官。”科维安站在座位一旁，对梅里诺说道，听到他的这番话，那些正欲离去的军官们纷纷停住了脚步，他们正等待着梅里诺的决断。而上校的身影如同秃鹫般伫立在阿图罗·普拉特站的大窗前。\n\n他挑了挑眉，随即将手下纷纷遣散：“有话快说。”\n\n“鉴于当前局势，我认为我们有必要派遣军事顾问赴海外考察现代两栖作战形势。”\n\n梅里诺歪头冷笑：“你可否有具体方案？还是只想出了点儿天马行空的设想就来浪费我时间？”\n\n“黎凡特地区目前正爆发冲突，长官。”科维安话音刚落，梅里诺脸上的笑容骤然凝固，“若土耳其方面允许，我们可派遣小型观察组前往土方学习其作战经验。”\n\n梅里诺的影子越拉越长，慢慢铺满房间。他绕过长桌，把双手背在身后：“我们一个人都抽不出来，科维安。哪怕是在南极我们的兵力都捉襟见肘，更别说什么狗屁阿拉伯了。阿根廷人狡诈得很，真让他们察觉到什么破绽的话……”\n\n他忠心耿耿的手下不愿退让：“土耳其的敌人和我们虎视眈眈的邻居用着相同的意式武器。现在正是和他们搞好关系的时候。想当年，智利可是南美最早承认土耳其共和国的国家。”\n\n梅里诺往后退了一步。两人一同凝视着阿图罗·普拉特站冰冷走廊里的刺眼灯光：“我们的士兵可不能在后方呆一辈子。”\n\n他的手指在身侧轻敲，转身向他的副官说道："
 antarctica_aac_observers.1.a: "“派一支小分队，不多不少。”"
 antarctica_aac_observers.1.b: "“我们手头匀不开资源，智利的未来在这里，不在土耳其。”"
 antarctica_aac_observers.2.t: "抵达安卡拉"
 antarctica_aac_observers.2.desc: "层层叠叠的红色横幅上画着白色的新月与星辰。谴责意大利侵略、歌颂保卫祖国的标语装点着安卡拉的公寓。在阿塔图尔克大道上的人群中，一群奇特的游客穿行而过——身着智利海军陆战队制服的水兵。一个头戴大号防毒面具的小男孩追着他的同伴从他们脚边路过，逼得他们纷纷躲开，接着，那个小孩看到了一位旧军装上挂满勋章的老者，停下脚步给他敬了个标准的军礼。\n\n格罗塞尔中尉装出一副还记得路的样子，举着一个装满了文件的手提箱走在士兵前面，闯入红新月广场。他们先是跟随着丑态百出的齐亚诺纸板人偶，然后又乘着满天的气球穿过人群，最后终于走到了站满了土耳其军官的街角。\n\n“我是智利代表团的格罗塞尔中尉。”他把他在航班中排练了无数遍的台词复述出来，这是他唯一能熟练说出来的话。然后他用生硬的土耳其语磕磕绊绊地说：“我们接到通知要会见一位名叫……”\n\n“艾巴尔。”一位把小胡子打理得整整齐齐的年轻人伸出了手：“您觉得我国如何，先生？”\n\n还没等格罗塞尔做出回答，断断续续的号角和鼓声引领着土耳其海军陆战队入场。士兵整齐列队，制服一尘不染，脚步声如雷鸣轰响，沿街道大步行进。当队伍穿过写着“向黎凡特的英雄致敬”的临时拱门时，艾巴尔向他们敬了一个大大的礼。\n\n“这就是我的战士们！”艾巴尔胸膛高高挺起，向格罗塞尔宣告。格罗塞尔点头致意，同时也默默观察着他们——正是这份观察力使他有幸被科维安选来担任观察员。任务要求他每天都提交报告，“无论遭遇战斗与否”。而此刻，一个想法占据了他的脑海。"
 antarctica_aac_observers.2.a: "这支部队随时待命，可以快速展开行动。"
 antarctica_aac_observers.2.b: "他们在灼热的烈日下仍能保持着严明的纪律。面色冷静沉着，即便在崇拜的人群前也没有动摇。"
 antarctica_aac_observers.2.c: "安卡拉全城都为战争而骄傲，空气中弥漫着愤怒。"
 antarctica_aac_observers.2.d: "人群中的每个灵魂都与士兵同在，士兵们将以生命回报。"
 antarctica_aac_observers.3.t: "作战经验"
 antarctica_aac_observers.3.desc: "硝烟与硫磺的味道在他肺里横冲直撞。他和战友们蜷缩在棱角分明的岩石后寻求掩护，而岩体则在炮火的轰击下苦苦支撑着。\n\n“他们早就知道我们会来！”艾巴尔大喊。咸腥的海水无情拍打着他们的肩膀，而陆战队员们则在反射着耀眼日光的钢盔下怒目而视。“您该留在船上的，先生。”\n\n“我来就是为了观察实战的！”透过机枪震耳欲聋的嘶吼声，格罗塞尔用生疏的土耳其语喊了回去。梅里诺和科维安绝不会对置身事外的报告感到心满意足。“别管我，继续前进！”\n\n艾巴尔强撑着冲过翻涌的浪涛，弯下腰，对着紧握步枪、贴着岩壁的士兵们喊道：“给我火力压制那里——”他指向俯瞰着海岸机场的意大利碉堡“——还有那里。二、三班向前突击。格罗塞尔，跟上来。让他们见鬼去吧！”\n\n他们攀爬着焦黑陡峭的海岸，而在他们头顶，弹幕如同铁雨般来回扫射。一颗子弹擦到了格罗塞尔的头盔上，随即弹向一旁。好巧不巧，一个士兵的手被子弹打了个对穿，只见他立即大声惨叫，径直向浪花里倒去。格罗塞尔本以为他必死无疑，但他却看见浑身是血的陆战队员们把他扶起，背到了掩体后面。\n\n“绕开跑道，直插控制站！”艾巴尔嘶吼道。二、三两班一刻不敢耽搁，立刻分头行动。一班迂回穿插突破弹坑密布的斜坡，另一班则负责清剿机枪阵地。四散奔逃的意大利士兵一个接一个地被放倒，而部队则不断向基地深处推进。\n\n他们冲进了建筑群。突然，一个怒目圆瞪的意大利士兵大吼大叫地扑向艾巴尔，手中仅握着一柄匕首。刀刃从他的喉咙与胳膊上划过。紧接着袭击者就被密不透风的子弹雨打成了筛子。最后，士兵们怒吼着冲进无线电操作室，只发现了一个颤抖着高举双手的操作员。\n\n返航船上，艾巴尔给所有的战友们都点了支烟。他们沉默不语，把烟蒂抛入水中。格罗塞尔默默凝视着烟灰在水面拖曳出的道道痕迹，而在不远处，机场已被淹没在了琥珀色的火海之中。"
 antarctica_aac_observers.3.a: "此刻他意识到，他们能从这场战斗中幸存下来，全都要归功于敏捷的行动。"
 antarctica_aac_observers.3.b: "呼啸的弹片和尖锐的砾石阻挡不了他们的步伐。这么想着，烟雾的灼烧感也逐渐从他肺中消退。"
 antarctica_aac_observers.3.c: "敌人或许预料到了他们的攻势，但没能预料到他们的勇武。"
 antarctica_aac_observers.3.d: "他回头看向浑身血污的伤员，深知若没有战友的援手，其中大多数人都撑不到现在。"
 antarctica_aac_observers.4.t: "衣锦还乡"
 antarctica_aac_observers.4.desc: "阿图罗·普拉特站的营房里热闹非凡。格罗塞尔中尉坐在长桌首座，面带微笑，看着同僚们一边哄堂大笑、开怀畅饮一边同他叙旧。今夜，从安卡拉的漂亮小妞到土耳其东道主的殷勤款待，再到地中海的明媚阳光，他们的欢声笑语一刻不停。\n\n在南极洲，他们又能聊些什么呢？这儿可没有漂亮姑娘。“根本见不着女人！”醉意最浓的军官高声嚷道。尽管身为军官，他们享受的待遇已属上乘，但也只能强逼自己咽下寡淡无味的鱼肉，在不甚可靠的暖炉前艰难取暖。至于阳光？他们甚至懒得去提。\n\n一道影子缓缓投在长桌之上。科维安没去打断谈话，只是给了格罗塞尔一个眼色，随后径直走向门外。格罗塞尔猛地起身，带得椅子吱呀作响。站外寒风刺骨，他沐浴在刺眼的白色灯光下，心中不禁怀念起营房里那台坏掉的暖炉。\n\n“明天第一时间向梅里诺报告，他今天外出巡逻了。”科维安沉默地凝视着他，眼神意味深长。\n\n“是，长官。我会在报告里详细说明。这次经历着实令人大开眼界。”\n\n“理应如此，”科维安轻哼一声，“土耳其不会无缘无故地赢得战争。”\n\n格罗塞尔脸上浮现一丝浅笑。战报终于抵达，土耳其赢得了胜利。他得去给艾巴尔发一封贺电了，苦心练习的土耳其语写作终究派上了用场：“确实如此。”\n\n“说说看，”科维安开口，把戴着手套的手插进衣兜里，“是什么助他们取胜？”"
 antarctica_aac_observers.4.a: "“他们在战场上凭借着迅捷的反应与敏锐的判断，打的敌人抬不起头来。”"
 antarctica_aac_observers.4.b: "“即使四面楚歌，土耳其人钢铁般的意志也从未消退。”"
 antarctica_aac_observers.4.c: "“土耳其海军陆战队行事冷酷无情，始终牢牢掌握着战场主动权。”"
 antarctica_aac_observers.4.d: "“我目睹了男人间最深厚的兄弟情谊。”"
 antarctica_aac_observers.5.t: "报告日"
 antarctica_aac_observers.5.desc: "格罗塞尔中尉努力让自己看起来没那么坐立不安。梅里诺上校坐在他对面，两旁是一名副官和科维安，活像是在惩治问题学生的老师们。\n\n“土耳其人他妈的打输了，”梅里诺厉声说道，“或许是民族性使然，也可能是信仰作祟。总之，他们还有什么值得我们学习的吗？”\n\n艾巴尔的面庞伴随着那场机场之战浮现在格罗塞尔的脑海。他想起了安卡拉的民众，想起了在黎凡特牺牲的将士，强忍住更尖锐的反驳：“我认为还有，长官。”\n\n“我们洗耳恭听，中尉。”科维安点了点头：“无论战况如何，我都认为我们的非介入式观察自有其价值。”\n\n“我的报告中记载着详尽的观察记录。哪怕友军兵败如山倒，土耳其海军陆战队的表现始终都堪称典范。虽然我方仍应坚持自己的作战方式，但从中借鉴经验定能助我们对抗阿根廷。”\n\n提及宿敌令梅里诺兴致大增。他倚在椅子上，一页页地翻阅着文件，最终沉声问道：“我们该如何避免重蹈他们的覆辙？”格罗塞尔清了清嗓子："
 antarctica_aac_observers.5.a: "“我们必须学会敏捷灵活地作战，永远都要比敌人更快一步。”"
 antarctica_aac_observers.5.b: "“我们绝不能在类似的重压下自乱阵脚。”"
 antarctica_aac_observers.5.c: "“困兽之斗，最为凶狠。”"
 antarctica_aac_observers.5.d: "“不能内斗，彼此相依才能让我们团结一心。”"
 antarctica_aac_observers.6.t: "非洲冒险"
 antarctica_aac_observers.6.desc: "…奥兰治河冲突。第七节。美国部队遭南非“友方火力”。调查正在进行。安理会未来决议旨在建立联合OFN司令部…\n\n掌中电传机的纸带慢慢凉了下来，科维安重新读了一遍电文：“友方火力”。混乱无序无组织，一群陌生人组成的联盟试图像军队那样行动，最终尝到失败的苦果。对多数人而言，这不过是战事不利的头条，但在科维安看来，则是相当有吸引力的研究案例。\n\n对他来说，非洲燃烧的草原正是完美的血腥实验场。梅里诺上校正陷在本土镇压叛乱的泥潭里，南极洲则孕育着真正的战争计划：一场针对德国盟友的战争。德国——布宜诺斯艾利斯堕落分子的庇护者，OFN正以鲜血和代价高昂的错误为代价学习怎么对抗他们。此刻正是汲取同样教训的良机，无需付出智利海军陆战队员的生命为代价。\n\n科维安需要眼线，直接向他负责的眼线。他拨通内线电话：“请格罗塞尔中尉来见我。”\n\n格罗塞尔的眼光可以说冷峻得近乎冰冷。战场上，他会忽略英雄主义和惨烈的战场，只捕捉必要之事，比如阵地漏洞、火炮装填速度或是补给链效率。他是战地观察的完美人选。\n\n但若是派他前去，就意味着削弱领地本就已经十分薄弱的防线。究竟是该让这位重要的军官留守冰原，还是冒险派他出去，收集可能价比千金的情报？科维安权衡着利弊，如同外科医生决定是否要截肢保命时一般冷静。"
 antarctica_aac_observers.6.a: "派观察员去，知识也是武器。"
 antarctica_aac_observers.6.b: "每个人都很重要，南极更需要他。"
 antarctica_aac_observers.7.t: "剖析胜利"
 antarctica_aac_observers.7.desc: "格罗塞尔中尉笔挺地站着，眼睛逐渐适应了办公室里昏暗的光线。经历过非洲刺眼的阳光之后，南极的暮色竟是如此陌生。科维安坐在一张清空的钢制办公桌后面，在窗外白雪覆盖的操场上投下深邃的剪影，直奔主题。\n\n“中尉，请报告。”\n\n科维安的话语平稳且毫无情感，他需要的是事实，而非印象。\n\n“战场非常混乱，长官。”格罗塞尔开始汇报，“联军行动毫无协调性。美军、南非军……彼此之间行动毫无关联，各自为战。但他们的实力……也就是部队调动和空中打击能力是压倒性的。OFN的敌人也顽强且狂热，但我看清了了双方的组织架构和后勤补给线。他们赢了。”\n\n科维安十指交叠，默默听取着汇报。格罗塞尔结束报告后，他只问了一个问题：\n\n“中尉，究竟是什么让他们赢得了胜利？决定性的因素是什么？”"
 antarctica_aac_observers.7.a: "“速度是他们最大的依仗。”"
 antarctica_aac_observers.7.b: "“他们的后勤虽然很乱，但可以说是用之不竭，经得起人力物力的消耗，因为补充比损失还多。”"
 antarctica_aac_observers.7.c: "“他们没有停下来过。即使是在严重的伤亡损失之后，他们也会继续前进，不给敌军重整的机会。”"
 antarctica_aac_observers.7.d: "“战斗中，他们会坚守阵地直至最后一刻。各个小队都奋战到底，为战友的撤退提供掩护。”"
 antarctica_aac_observers.8.t: "失败分析"
 antarctica_aac_observers.8.desc: " 格罗塞尔中尉笔挺地站着，眼睛逐渐适应了办公室里昏暗的光线。经历过非洲刺眼的阳光之后，南极的暮色竟是如此陌生。科维安坐在一张清空的钢制办公桌后面，在窗外白雪覆盖的操场上投下深邃的剪影，直奔主题。\n\n“中尉，请报告。”\n\n科维安的话语平稳且毫无情感，他需要的是事实，而非印象。\n\n“战场非常混乱，长官。”格罗塞尔开始汇报，“联军行动毫无协调性。他们空有压倒性的战力，但敌人更聪明。德军及其盟友将每一寸草原都变成了死亡陷阱。我看到了他们引以为傲的补给线彻底崩溃，他们的装甲部队在伏击中化作熊熊烈焰。美军败了。”\n\n科维安十指交叠，默默听取着汇报。格罗塞尔结束报告后，他只问了一个问题：\n\n“中尉，是什么让德国人赢得了胜利？”"
 antarctica_aac_observers.8.a: "“他们的机动能力发挥得淋漓尽致。”"
 antarctica_aac_observers.8.b: "“德军的韧性近乎狂热偏执，为了每一块岩石、每一寸土地而战。”"
 antarctica_aac_observers.8.c: "“德军行动毫不留情。他们不留俘虏，所有伏击都经过精心策划，旨在最大程度消灭有生力量。”"
 antarctica_aac_observers.8.d: "“德军没有陷入恐慌，从士兵到军官，每个人都清楚自己的职责。”"