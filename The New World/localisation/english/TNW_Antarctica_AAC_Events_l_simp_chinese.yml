 antarctica_aac_main.101.t: "异乡异客"
 antarctica_aac_main.101.desc: "军事情报局（SIM）\n致：智利南极领地管辖机构\n主题：南十字星行动余波\n\n1.南十字星行动已击溃新施瓦本防线。OFN、巴西、乌拉圭部队已攻占德军所有外围阵地，德军目前仅在席尔马赫站周边地区占据有限的数个据点。\n\n2.一支巴西远征部队已在科茨地建立据点，指挥官为以反阿根廷立场著称的奥古斯托·拉德马克海军上将，此项任命应为对阿方的故意挑衅。巴西军队登陆地点位于龙尼-菲尔希纳冰架、巴西官方宣称区域以东，位于乌拉圭宣称区域内。巴西南极宣称与阿根廷南极属地的东部重叠，因而构成对布宜诺斯艾利斯的直接挑战。\n\n3.巴西部队目前处境危急。经观察证实，其严重缺乏冬季装备、适宜居住模块及补给物资。若无外部援助，巴军能在威德尔海边缘严酷环境中熬过南极寒冬的生存能力评估为极低。\n\n4.巴西存在分散了阿根廷的资源，但切忌忘记其在斯尼佩岛之战期间拒绝履行《费城协定》规定的防御义务。他们的生存、以及由此维持对阿根廷的制衡手段，可能直接取决于我们的行动。"
 antarctica_aac_main.101.a: "巴西人在58年背弃了我们，让他们自求多福吧。"
 antarctica_aac_main.101.b: "我们会送出人道主义援助，更多的话就算了。"
 antarctica_aac_main.101.c: "我们会送出补给、教授他们知识来帮助他们，务实比旧怨重要。"
 antarctica_aac_main.101.d: "全力支持，我们有共同的敌人。"
 antarctica_aac_main.101.d.tt: "我们将会同§Y[AAR.GetAdjective]§!展开全面合作，分享武器装备和军事情报。"
 antarctica_aac_main.102.t: "坚守阵地"
 antarctica_aac_main.102.desc: "军事情报局（SIM）\n致：智利南极领地管辖机构\n主题：乌拉圭探险队\n\n1.乌拉圭部队已在南极海岸线成功建立阿蒂加斯站，该基地位于巴西新控制区以东。因其特殊地理位置，其将成为抵御德国反击的第一道防线。\n\n2.从阿蒂加斯站截获的无线电通讯可以表明，其正向本土请求重型武器补给。该情报与军事情报局先前分析一致——此前在蒙德维的亚观察其远征舰队装载物资时，便已发现其严重缺乏反坦克武器与重机枪。鉴于其作战区域辽阔，快速增援将极为困难。\n\n3.需在此特别指出，1958年阿根廷入侵时，乌拉圭未能履行《费城协定》规定的防御义务。当时的外交分析表明，其袖手旁观主要源于同后庇隆主义阿根廷维持稳定关系的考量，以及缺乏意愿去介入在南极洲周边岛屿与大陆上发生的冲突。\n\n4.尽管该地在对抗阿根廷一事上的战略价值有限，但一个防御完备且关系良好的乌拉圭将成为重要的缓冲区，遏制德国对特里尼蒂半岛的威胁。其防御能力将直接影响我方安全，但任何支援都必须穿过南大洋最恶劣的海域之一——威德尔海来进行长途运输。"
 antarctica_aac_main.102.a: "他们能自己搞定。"
 antarctica_aac_main.102.b: "将我们剩余的物资送给他们以表善意。"
 antarctica_aac_main.102.c: "我们将为他们配备适当的武器。我们和他们是一条绳上的蚂蚱。"
 antarctica_aac_main.102.d: "向他们提供我们的武器以及一队海军陆战队，协助其训练并加固他们的阵地。"
