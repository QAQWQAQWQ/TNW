l_simp_chinese:
 antarctica_aac_sobral.1.t: "愚者行军"
 antarctica_aac_sobral.1.desc: "“……‘90行动’，”文德利希少校说道，“他们提到了极点。我们成功测算出了补给站的三角坐标，位于南纬81度4分、西经40度36分。海军陆战队正在尾随他们的足迹，已确认其存在。”\n\n梅里诺上校转过身，扫视着地图，脸上浮现出掠食者般的轻蔑，从胸腔中发出低沉的冷笑。\n\n“90行动……”他像品鉴美酒般细细品味着这几个音节，“原来布宜诺斯艾利斯那群猿猴决定要扮演一下阿蒙森了？他们不会当真以为，拖着肥屁股爬到南纬90度，插上一块沾满油腻的抹布，就能为他们可悲的存在正名吧？”\n\n梅里诺像雪茄一样粗的手指戳向了少校标注的点位：“这就是他们民族精神的精髓啊，文德利希！纯粹的作秀！闹剧！他们派来一群什么都不会的学者穿着礼服，来扮演探险家，而我们则在筹备战争。他们是何等狂妄！但他们的傲慢、他们与生俱来的戏剧天赋——恰恰是上天赐予我们的礼物。”\n\n上校的声音骤然压低，化作低语：“这家移动马戏团有个致命弱点，就在这里。”他再次戳向地图，“当那些冻伤的‘英雄’——小丑——爬到这里的时候，他们找不到温暖的庇护所，也寻不到热食，只能看到战友的焦尸与基地残骸——最终，他们将在自己愚蠢的骄傲中受诅死去。”"
 antarctica_aac_sobral.1.a: "“集结突击队，出任务。”"
 antarctica_aac_intro.1.t: "秩序与混乱"
 antarctica_aac_intro.1.desc: "如果说放逐大陆真有怜悯这种感情的话，那一定是对近来登上海岸的某个部落的怜悯。他们满怀天真的野心和错误的热情，在南下途中占领了一个又一个岛屿。\n\n放逐大陆眼睁睁地看着他们的梦想化作灰烬，火焰和浓烟在冰海之上肆虐。\n\n部落被驱赶到放逐大陆的边缘，在强邻的阴影下苟活求生。\n\n但愤怒不会继续下去。\n\n放逐大陆可以感受到某种正在形成的敌意，某种一心想要吞噬所有拦路者的咆哮混乱。\n\n然而，尽管痛苦、仇恨和错误从未止息，但在这冰天雪地的海岸上，仍有微弱而天真愚蠢的希望，希望秩序能降临此处。\n\n混沌与秩序，对抗熵增的永恒斗争：放逐大陆终于知晓，大自然的基本力量将由众生灵而呈现。\n\n放逐大陆相信，混乱终将得胜。"
 antarctica_aac_intro.1.a: "至少迄今，胜者总是混乱一方……"
 antarctica_aac_intro.2.t: "驳回"
 antarctica_aac_intro.2.desc: "“驳回、驳回、驳回……驳回……”胡利奥·埃斯库德罗·古斯曼愈发急躁地翻阅着桌上的预算报告，“驳回、驳回、驳回、驳回。”他猛地合上活页夹，扔到桌子对面，“这什么鬼东西？”\n\n智属南极首席经济学家阿尼瓦尔·平托·圣克鲁斯反呛道：“这他妈又不是我批复的，胡利奥，不斩来使啊。”\n\n古斯曼用颤抖的双手捋了捋头发，重重地长出一口气：“你说得对，你说得对，但是……”他手指着圣克鲁斯，“他们真的拒绝了所有增加预算的要求吗？我本来就没指望你能把预算都要过来，但最起码得要到些什么吧。我们急需更多的资金用来搭建电讯基础设施，还有购置更多的雪地车和建材。我们现在只能窝在冰冷的小屋里，几乎没法和前哨站保持联系，他们居然指望我们还能再熬过一个冬天？！”\n\n“我已经尝试让他们明白这些事情的必要性了，但国内也不宽裕。亚历山德里政府的官方立场认为，智属南极的资金足够支撑过1962年。”\n\n古斯曼闻言不由得涨红了脸：“那么，吝啬的官僚们就应该在这里过冬，亲眼看看增加经费是多么地必要！”他站起身来，踱步走到窗前，凝望着屋外的暴风雪。\n\n“真是见鬼，到1962年底，可能根本就不存在什么智利南极领地了！”"
 antarctica_aac_intro.2.a: "只能靠自己了。"
 antarctica_aac_intro.3.t: "反叛者"
 antarctica_aac_intro.3.desc: "此时是南极生活中的片刻安宁。深呼吸……集中注意……提臀……然后：“注意球！”\n\n何塞·托里维奥·梅里诺海军上校又从巡洋舰舰尾打出一记长杆。高尔夫球在阳光下闪闪发光，划过优美的弧线，落入冰冷的海水之中：至少三百码！新的个人最佳成绩。他听到甲板上水手们送出了零星的掌声，于是微笑着向他们挥手致意：他享受他的部下、他的人民对他的崇拜。\n\n他又摆好了一个球，一边挥动球杆，思绪却开始飘扬逸散：自己这样一个反叛者，是怎么才能坐到现在这个位置上的？那还是1958年6月，野蛮残暴的阿根廷人袭击了智利的国土，用武力夺取了数座岛屿。智利政府和军队从上到下一片混乱，必须有人采取行动。\n\n“注意球！”挥杆、落水。阿根廷人就像扩散的癌变，凡是他们能碰到的地方都难逃毒手，甚至也包括南极领地。梅里诺和部下做不到在同胞流血的时候作壁上观，于是他领导了一场兵变，率领舰队南下：至少，他们要战斗到底。\n\n梅里诺又将一球送进深海。可当他们出击时，匪夷所思的事情发生了：在格林尼治岛附近，他们成功伏击了敌人，在阿根廷舰队进攻阿图罗·普拉特站的时候把他们抓了个正着。舰炮怒啸，在冰海上喷喷吐着浓烟和烈焰。智利海兵使出了浑身解数，但依然还是不够，于是梅里诺便率领自己的巡洋舰直冲冲地撞向敌舰，至少也要拉几个垫背的一起沉海。奇迹般地，这次行动成功了，智利赶走了背信弃义的阿根廷人。\n\n梅里诺排好最后一个球，他想的已经不是过去，而是未来，想到自己还将获得的荣耀……"
 antarctica_aac_intro.3.a: "智利的合法领土仍在阿根廷荼毒之下，命悬一线。"
 antarctica_aac_intro.4.t: "外交官"
 antarctica_aac_intro.4.desc: "蓬塔阿雷纳斯港是智利南极领地在大陆上的生命线，进出智利最南端领土的大部分物资和人员都必须由此中转，否则就只能走空运。\n\n这一南极事务的重要枢纽自然也为相关的行政和军事人员配备有办公室。\n\n在市政厅一间不起眼的房间里，马西亚尔·莫拉·米兰达和恩里克·加哈尔多·比利亚罗埃尔讨论着南极领地的未来。\n\n在引爆了瓜分南极洲的灾难性谈判中，两人都是智利代表团中的领导层，因此他们也比先前更加明智，更加渴望改正错误。\n\n米兰达合上公文包，说道：“那我觉得这就差不多了。我们先飞去阿图罗·普拉特站，和古斯曼教授详谈，然后从乌拉圭开始做工作。”\n\n“你觉得古斯曼会怎么说？”比利亚罗埃尔问道。\n\n“他会明白的，我们别无选择。现当下，除了军事手段之外，向美洲国家组织递交申请就是我们争取国际社会承认智利南极主张的唯一途径，而我的朋友，动用武力根本不在考虑之内。”\n\n“那就来个老派的魅力攻势吧。与一个大洲的领导人共进晚餐，还能出什么差错呢？无论如何，我认为事情总不会更糟了。”比利亚罗埃尔也合上了自己的公文包，两人动身启程，飞去南极洲。"
 antarctica_aac_intro.4.a: "笔尖能否胜过干戈？"
 antarctica_aac_intro.5.t: "阿图罗·普拉特站的清晨"
 antarctica_aac_intro.5.desc: "如果有人路过阿图罗·普拉特站的一个封闭的小隔间外，那一定能听到文件刷刷翻页和各种杂乱无章的声音。它只是站里众多隔间中的一个，但要论起今日上午最忙的人是谁，毫无疑问就是这里的主人卡洛斯·冈萨雷斯·亚克希奇。\n\n他手上快用完的水笔在预算本上划拉着，终于刮干了最后一滴墨水。亚克希奇无可奈何地敲了敲手里没用的笔，然后把它扔进了垃圾桶。他又翻开了预算，可上面一排排的数字却并不能解决他简单的问题：智利南极领地没有钱。\n\n他合上面前的表册，把它和其他文件堆在一起，他可是一个子儿都找不出来了。亚克希奇摇了摇头，在他喜欢自称为“办公室”的小隔间里踱来踱去。地板发出吱吱作响的声音，冷气穿过薄薄的木墙，紧紧地挤在一起，他连伸展手臂的空间都没有，但这就是预算所能承担的——圣地亚哥一厢情愿，觉得这就是他们所需要的一切。\n\n亚克希奇想着，让寒冷见鬼去吧，便抬脚出门，酸痛的双腿关节一阵噼啪，看到数字以外的新奇事物都能让他十分享受。金色阳光洒满冰川和岩石路面。这是南极所能见到最晴朗的天气了，然而却仍比不上家乡蓬塔阿雷纳斯的清晨，那里正是他管理领地物资的地方。在家乡，他可以享受当一位教授的乐趣、为社会党工作，他的家人也等着他团聚。\n\n今天晚些时候，他将要飞回家乡，回到那种生活之中；但此时此刻，他还置身在阿图罗·普拉特站的冰天雪地里。他最后呼吸了一口清晨的空气，转身回屋。"
 antarctica_aac_intro.5.a: "现在，得想个办法挺过1962年。"
 antarctica_aac_intro.6.t: "颤栗与展望"
 antarctica_aac_intro.6.desc: "又下雪了。在这个本应干燥无风的时节，懒洋洋的风却卷起雪花，飘到了古斯曼的窗前。温度再次降低，他猛地打了个寒颤。\n\n他暗暗骂着，基地设施日渐老化，政府拒绝采取必要措施支持南极领地，当然还有这恶劣的天气。但他明白，无论如何也该停下牢骚，早早地去巡视阿图罗·普拉特站，确保一切正常。\n\n这些天来，无论怎么看，战争的前景都是十分地诱人：海军舰炮正正地指向敌方岛屿，白色涂装的碉堡慢慢地为积雪覆盖，防空炮台上的人员时刻准备着投入战斗；为了弥补白色涂料的不足，基地还增设了迷彩网，掩护许多人仍然在居住的橘红色建筑物。\n\n每个人都做好了抵抗围攻的准备，这让古斯曼心中充满了决心：他麾下的士兵们准备着应对一切袭击。\n\n与此同时，局势也微妙而脆弱：如果一场突如其来的暴风雪让驻军陷入困境，又或是阿根廷发动进攻时，他们陈旧的无线电无法请求增援，谁又能说得准会发生什么呢？阿图罗·普拉特站的力量建立在斯尼佩岛之战后积累起的信心之上，要是有什么动摇了这股信心……"
 antarctica_aac_intro.6.a: "在回办公室的路上，古斯曼又打了个寒颤。"
 antarctica_aac_intro.7.t: "困在政治中的上校"
 antarctica_aac_intro.7.desc: "梅里诺上校热爱出海。当他纵横波涛之间时，就能短暂地从陆上官僚的勾心斗角中解放，唯一要紧的就是他的船员和任务。普拉特舰长号着实是艘优秀的战舰。该舰由美国建造，在1951年卖给智利海军前曾服役于太平洋战场。其上的几十门火炮、厚重的破冰装甲，以及水上飞机弹射系统，足以在这片海域上同任何阿根廷舰船相匹敌。梅里诺对此深信不疑：他曾在斯尼佩岛之战中凭借此舰击退了阿根廷对智利南极领地的大举入侵。总之，这艘宝贝战舰确实名不虚传。\n\n上校坐在军官餐厅里，他喜欢晚一点用餐，这让厨师们颇为头疼。可若是在正常时间用餐，他总是会被下属团团围住，只有晚些才能偶得片刻的独处时光。今日菜品有牛排和土豆，捎带着还能饮上一杯热茶。但上校此刻食不甘味，日思夜想的几乎全是智利南极领地面临的危局。\n\n海军夏季巡航告一段落，舰队返回了智利的母港。他十分不愿在接下来的简报会上面对古斯曼，这位教授出身的管理层让上校颇为头疼。\n\n梅里诺海军上校一再强调：只有军事力量方能保全智利在南极的领地宣称，但教授却充耳不闻，他反而更关心所谓的“减少赤字”，并且还任用像亚克希奇这样的社会主义者。梅里诺的父亲曾是一名海军中将，教导过他须将政治从军事中剥离，但时局正日渐一日地滑向深渊……"
 antarctica_aac_intro.7.a: "无论是军校还是他的父亲，都无法教会上校如何去面对这波谲云诡的时代。"
 antarctica_aac_intro.8.t: "会面"
 antarctica_aac_intro.8.desc: "在格林尼治岛上的阿图罗·普拉特站，普拉特船长号巡洋舰正下锚避风。虽然基地送上了能力范围内最隆重的欢迎仪式，但也只能说是相当简陋。尽管如此，何塞·梅里诺上校还是煞有介事地昂首阔步，走下甲板。在为了抵御阿根廷的入侵而架设的巨大海军炮台之下，梅里诺在阴影里接受了迎接。作为下令建设炮台的人，梅里诺感到颇为满意，战壕和地堡同样出自他的手笔，并且保养得不错。阿根廷人就像条滑溜的蛆虫，时刻都在窥间伺隙。\n\n然而，基地中的驻留人员却让他倍感失望。杂乱无章的老旧建筑标志着此地散漫放纵、纲纪废弛；爬满锈迹、破败不堪的士兵营房更让他火冒三丈，让他和战友们住在这简直是丢人现眼，太不体面了。\n\n在一间昏暗的办公室里，梅里诺与古斯曼教授相见了，他目光冷淡地打量着教授，开口问道：“有什么好消息吗？”\n\n古斯曼摇摇头：“不太好，上校，政府拒绝了今年所有的预算请求。我们只能勉为其——”\n\n“勉为其难？”梅里诺打断了他，“你们这些蠢货难道不知道，现在已是大敌压境，枪口已经压到我们脑门上了吗！”\n\n“那还能怎么办，你以为我乐意？”\n\n“你们本应恪尽职守！”梅里诺从古斯曼的私人酒柜里拿出一瓶酒，给自己斟了一杯，后者没有吭声，“我心里很不安、非常不安，但我会……听你的命令，我们就都勉为其难吧。”"
 antarctica_aac_intro.8.a: "“行了，我的营房在哪？”"
 antarctica_aac_main.1.t: "一去二来"
 antarctica_aac_main.1.desc: "在阿图罗·普拉特站所谓“机场”的降落十分不稳，马西亚尔·米兰达和恩里克·比利亚罗埃尔乘坐的螺旋桨式飞机在没有硬化的冻土跑道上着陆，把两位外交官在机舱里晃得七荤八素。最后一次颠簸把他们甩出座位，飞机可算是停了下来，米兰达便诙谐地打趣道：“我一直在期待这一刻嘞。”\n\n比利亚罗埃尔的脸色一阵青一阵白，明智地没有接茬。\n\n飞行员切断发动机，地勤做好起落架固定，外交官们起身走出机舱：第一阵寒风总是最可怕的，它扑面而来，让人喘不过气。米兰达和比利亚罗埃尔顿觉头晕目眩，好些之后，他们走下跑道，前往基地。\n\n途中，他们遇到了智利南极领地资历最浅的领导层，卡洛斯·亚克希奇，他微笑着说道：“欢迎回来！”\n\n外交官们默契地回应着。他们还不知道该怎么评价亚克希奇，他还尚未证明自己能够胜任此地的任务。谈话间，二人注意到了亚克希奇手中的行李，比利亚罗埃尔便问道：“你这要是去哪儿？”他终于从南极航班的不适中恢复过来了。\n\n“按你们的原路返回。”亚克希奇向着正在加油的飞机扬了扬下巴，回答道，“我要回蓬塔阿雷纳斯去，做些后勤安排，也可能顺便和家人一起吃顿晚饭。你们接下来呢？”\n\n“我们是来见教授的。我和恩里克有个计划，或许能让我们摆脱如今的困境。”米兰达一边说着，一边向基地四周做了个舒展宽阔的手势。\n\n亚克希奇和他们握手：“先生们，祝好运，我们来日再见。”语毕，他大步向跑道走去。"
 antarctica_aac_main.1.a: "外交官们急忙去见古斯曼，这样他们很快就能和亚克希奇一样北上了。"
 antarctica_aac_main.2.t: "做出决断"
 antarctica_aac_main.2.desc: "梅里诺上校正在战壕与防空炮间踱步。从士兵们对他的欢迎程度来看，与其说上校是一名雷厉风行的指挥官，不如说他更像是一位备受爱戴的老大哥。每每经过战友身边，上校都会向他们敬礼、鼓励、打趣或是讲些提振士气的话语。\n\n在先前得胜归来的梅里诺领导下，守卫枕戈待旦，士气高昂。面对法西斯主义者，每名智利士兵都愈发感到胜券在握。见到上校始终如一地巡查着基地、一个劲地请求新的枪支与增援，士兵们都倍感暖心。这些举动让上校成为了阿图罗·普拉特站的基石：士兵们信任的不是混凝土地堡、机枪，更不会是名义上管理这座基地的文职人员——他们所依靠的是上校这样的人，和他们同处一条战壕的军人。而上校对这一点自然心知肚明。\n\n基地的生死存亡维系于梅里诺海军上校一身，这让他既有些自鸣得意，又让他的心底打了个冷颤：阿图罗·普拉特站守备废弛，他内心时刻忧惧着阿根廷人会轻而易举地攻占此处。上校迫切希望能在接下来的几个月里进行一次全面巡检，不过又担心所有人对他的增援请求置若罔闻。而如果驻军意识到基地正处于混乱中……他最好先别胡思乱想这些。\n\n上校重新梳理了一下思绪。他对新无线电设备与弹药的亏空无能为力，但整顿一下现有资源，然后开工把手头能修的都修整一下尚在可行范围内。他迈步前去海军炮台，当炮兵们为预防炮台失准犯难时，这位老水手就会去指点迷津。但随后他注意到，山顶的战壕正慢慢堆满碉堡上侵蚀脱落的混凝土。工事亟待修整，但考虑到这些天铁锹的状况，重挖战壕更是份艰巨的任务。梅里诺上校思忖了一阵。"
 antarctica_aac_main.2.a: "他继续朝炮台走去，试图将摇摇欲坠的工事抛诸脑后。"
 antarctica_aac_main.2.b: "长叹一声后，他命令部下重建防御工事。"
 antarctica_aac_main.2.c: "他懊丧地转过身去，回基地里同士兵和文件作伴。"
 antarctica_aac_main.3.t: "远走高飞"
 antarctica_aac_main.3.desc: "米兰达和比利亚罗埃尔来到古斯曼教授的办公室，后者分别与两人握手，面带微笑：“看上去你们挺过那趟航班了。”\n\n“这般经历真是让人身心愉悦。”米兰达干巴巴地回应道，二人随后在古斯曼的办公桌边落座。\n\n古斯曼为两人斟上酒，开口道：“所以，事态如何？两位可有什么突破进展？”\n\n“我们制定了一项计划。”米兰达回应。\n\n“兴许在几周后就能初见成效。”比利亚罗埃尔接过话茬。\n\n“愿闻其详。”古斯曼啜饮一口，打量着两位外交官。\n\n“现在的当务之急是争取更多国家支持我国的领土主张。说实话，阿根廷在这方面已经拉开我们了，必须要投入更多精力，”米兰达继续说道，“在美洲国家组织的成员国上。”\n\n“我们计划先从乌拉圭开始，逐步争取支持。”比利亚罗埃尔补充，“之后，我们将在加勒比地区进行一系列外交访问，秘鲁和厄瓜多尔也在考量之内。”\n\n“千里之行，始于足下。就像滚雪球一样，我们争取到的别国支持越多，越多国家就会识得大体、支持我们。”\n\n“好方略，”古斯曼表示赞同，随后又笑了笑，“我想这也意味着你们要远走高飞了。”\n\n“我们是在为国家的领土权益而战，”米兰达说道，“但这并不意味着我们必须在这里待着。”"
 antarctica_aac_main.3.a: "“几周后我们会再敲定一下乌拉圭的外交简报。”比利亚罗埃尔说道。"
 antarctica_aac_main.4.t: "踱步前往市政厅"
 antarctica_aac_main.4.desc: "卡洛斯·冈萨雷斯·亚克希奇的脸在香烟火光中阴晴不定。他又吸了一口，烟雾转瞬消散于清冷的海风中。脚下的小路穿过一片长草覆盖的缓坡，直通海边的蓬塔阿雷纳斯。更远处的群山之间，定期驶往南极的补给船只若隐若现。\n\n补给还算准时，但每次都只能算是杯水车薪。亚克希奇叹息一声，继续吞云吐雾。智利南极领地的所有人员可都指望着他，不容有失。尽管亚克希奇在本土的政治影响有限，但他也并非完全束手无策。\n\n亚克希奇走进镇子，老旧精致的房屋整齐排列在道路两边，摇曳的草丛和嗡鸣的昆虫则渐行渐远。一只老狗在远处吠叫，除此之外，蓬塔阿雷纳斯就像寻常一般宁静：这般宁静是亚克希奇喜欢家乡的诸多原因之一，虽然其他地方的政治家们对此并不苟同。\n\n蓬塔阿雷纳斯不过是又一个渴望圣地亚哥关注的偏远小镇。唯一的区别是，这镇子是南极领地的关键补给点。某种意义上来说，蓬塔阿雷纳斯的存在系于南极洲，一如南极领地依赖它提供补给一样。亚克希奇可以说服议员们削减一些地方预算将其投入南极领地，或者他也可以说服议员们在圣地亚哥发起动议，把问题推到国家层面上去。\n\n再不济，他也可以如实相告：智利南极领地已经入不敷出、濒临崩溃，他们亟待救助。亚克希奇拿定了主意，迈步进入市政厅。"
 antarctica_aac_main.4.a: "蓬塔阿雷纳斯当然可以匀出些钱给南极项目，这可是互惠互利。"
 antarctica_aac_main.4.b: "议员们会在首都传达我们的诉求，搭上人脉施压一下。"
 antarctica_aac_main.4.c: "只有再三强调形势已经万分危急才能说服他们。这么做会损害我们的长期合法性，但南极领地急需援助。"
 antarctica_aac_main.5.t: "最后巡逻"
 antarctica_aac_main.5.desc: "梅里诺上校很高兴能离开阿图罗·普拉特站。这个站点除了防备上可圈可点，其他实在不值一提。他决定让古斯曼留在这个潮湿寒冷的岛上自生自灭，而自己则动身前往地处前线的贝尔纳多·奥伊金斯站。\n\n古斯曼对即将来临的斗争一无所知。让教授继续玩他的外交过家家去吧，梅里诺决定去干些实事。\n\n当然，没人能像梅里诺一样十全十美，但至少在那片遭上帝遗弃的群岛上，还有爱国者正恪尽职守。\n\n梅里诺上校在阿图罗·普拉特号巡洋舰的舰桥指挥舰队启航，离开基地。舰队驶入公海，海浪拍打着船体。正是在这里，梅里诺曾经击溃了可恨的恶敌，他也有信心重现胜利。\n\n部下士兵需要为即将到来的战斗厉兵秣马，他们将作为上校手中的利刃，从阿根廷的包围中杀出一条血路。也许他们寡不敌众，但依旧会奋战到底。每一名智利士兵都能以一当十，把阿根廷人一个一个都送进地狱。\n\n只不过，荣耀之梦得留到冬日结束方能实现，航行在遍布冰山、冰层厚达数米的海域绝非明智之举。\n\n他不得不将大型舰船派回本土的蓬塔阿雷纳斯、威廉斯港、甚至更远的瓦尔帕莱索。可同时，上校脑海中还有疑虑：他是应该保留一些轻型支援舰艇，在海面完全结冰之前继续巡逻任务？还是让大部分舰队都收队回港，节约资源？"
 antarctica_aac_main.5.a: "阿根廷人会觉察到弱点，我们必须继续巡逻海域，直到海冰封冻前的最后一刻。"
 antarctica_aac_main.5.b: "我们需要养精蓄锐，等待一击制胜的时机到来。没必要再耗下去了。"
 antarctica_aac_main.6.t: "交换与回报"
 antarctica_aac_main.6.desc: "古斯曼教授花在文书工作上的时间比中世纪修士还要长，维持智利南极领地正常运作所需的信件数量多得令人难以想象。\n\n堆积如山的文件里充斥着对于补给、改善生活条件、增加弹药和武器的需求，所有人都像是狮子大开口。\n\n这样一来，从这些浩如烟海的来信里找到一封礼貌的请求信就显得格外令人惊喜。这封智利大学的来信与他平常收到的信函大不相同，更像是提出一种互惠互利的建议。\n\n信中提到，智利大学希望在1962年余下的时间里，能够在阿图罗·普拉特站安置一个多学科的科学家团队；作为回报，大学将动用他们在首都所拥有的一切政治影响力，支持古斯曼的行动。地质学家、气象学家、古生物学家、生物学家，似乎智利的每一位“学家”都想要在此占据一席之地。\n\n古斯曼轻笑一声，这群人根本不知道他们要签下的是怎么样的协议。阿图罗·普拉特站设施陈旧，气候严寒，生活条件堪忧，科学家们一抵达就得直面凛冬的考验：对初来乍到者而言，可谓前景黯淡。\n\n倘若教授允许他们前来，阿图罗·普拉特站和整个智利南极领地都只能勉强维持微薄的补给。日子无疑会过得紧巴巴，而科学家们在这个季节里还得兼顾其他任务。\n\n但这也是一次绝佳的机会，足以证明智利南极领地的价值。古斯曼教授提笔起草回信："
 antarctica_aac_main.6.a: "“不幸的是，我们今年无法再接纳更多的人员。”"
 antarctica_aac_main.6.b: "“阿图罗·普拉特站的全体成员将竭诚欢迎来自祖国的栋梁之才。”"
 antarctica_aac_main.7.t: "日光浴"
 antarctica_aac_main.7.desc: "当室内太过憋闷时，古斯曼教授就会出门去吹吹冷风。\n\n他没多少机会去见见太阳了：凛冬将至，再加上他花了不少功夫与米兰达和比利亚罗埃尔一起筹划外交安排，这可能是他近来最后几次享受“日光浴”的机会了。\n\n“日光浴”这个说法其实并不准确，因为他身上其实裹着许多层保暖衣物。古斯曼知道冬日到来将会如何影响基地里每个人，包括他自己的心态。\n\n太阳逐渐消失，漫长的黑暗季节将会持续数月之久，抑郁发作是个不小的隐患。\n\n古斯曼瞥见一群士兵在基地外的平地上踢球。\n\n当古斯曼经过他们身边时，士兵们一个个对他横眉竖眼：他们不喜欢古斯曼，认为他是个无能且失职的领导者。基地预算一砍再砍，可南极领地依旧步履维艰，古斯曼接管南极事务以来，就从来没有过好事。\n\n这群人肯定觉得我是个扫把星，古斯曼心想，就算他们不这么想，梅里诺上校也会在他们耳边添油加醋。\n\n古斯曼搬来一把椅子坐下观看球赛。最终，士兵们忘记了他的存在，继续踢起球来。\n\n教授知道，在接下来的几个月里，他将有机会向士兵们证明自己。智利南极领地的未来依然可期……"
 antarctica_aac_main.7.a: "即便其他人还未曾察觉。"
 antarctica_aac_main.8.t: "哆哆嗦嗦"
 antarctica_aac_main.8.desc: "咯咯嘚嘚、嘚嘚咯咯。古斯曼教授冻得瑟瑟发抖，上下牙不住地磕碰作响。\n\n真是他妈的离谱。\n\n他穿了三双羊毛袜、两套长内衣，披上了最厚的冬季外套，结果还是冷得不行。阴湿的冷气无孔不入，从保温不佳的住所外渗透进来。又是一个预算紧缺带来的麻烦。\n\n古斯曼伸手去拿咖啡。虽然戴着手套让他很是难握住杯子，但他宁愿就这么着。可当杯子离嘴唇仅几寸远时，又一阵冷颤袭来，滚烫的液体洒在腿上。啊……终于有点暖和了。\n\n好景不长，洒落热饮带来的片刻温暖也被南极的严冬所吞噬了，古斯曼不得不换上新的衣服。\n\n这个冬天比去年更难熬，食物和燃料的消耗速度比以前更快。在古斯曼看来，基地设施的恶化意味着他们需要摄入消耗更多能量才能保持活力。更令他担忧的是，这才刚刚入冬一个月啊。\n\n他羡慕比利亚罗埃尔和米兰达，就连亚克希奇也能在蓬塔阿雷纳斯与家人团聚。多么讽刺，领导层中只有梅里诺上校是他的难兄难弟，而这位仁兄正在奥伊金斯站过冬。\n\n咯咯嘚嘚、嘚嘚咯咯，古斯曼的上下牙又开始磕磕碰碰。他知道，这时候得节省燃料，但去他妈的，他是基地的领导，他有工作要做！多加几件衣服或许有用，但终归还是要把房间烧热几度才更好。"
 antarctica_aac_main.8.a: "这将是一个艰难的冬季。谁知道会发生什么呢？我只能硬挺过去。"
 antarctica_aac_main.8.b: "古斯曼小心地再添上一双袜子，至少暖和了……一丁点。"
 antarctica_aac_main.8.c: "古斯曼将手伸向了温控器。"
 antarctica_aac_main.9.t: "奥伊金斯站"
 antarctica_aac_main.9.desc: "梅里诺上校心里感慨，现在这样甲坚兵利、枕戈待旦，才是智利基地该有的模样。奥伊金斯站会坚决抵抗阿根廷敌人。\n\n奥伊金斯站是梅里诺的心血结晶。在斯尼佩岛之战后的数年里，他监督了此处的陆海防御建设，防空方面也毫不松懈，基地内布满了防空炮。\n\n任何阿根廷武装看到这座基地都会明白什么叫铜墙铁壁，即使他们集合多兵种联合作战也难以攻破。\n\n然而，基地依旧缺乏主动出击的能力。在今年乃至今后更长的日子，上校将着手提升这一点。眼下，面前接受检阅的士兵人强马壮，他们纪律森严、训练有素、英气逼人，但是离南极的作战标准还差些火候。\n\n在过去一个月的演习中，他评估了部下的能力，发现有几个方面存在不足。\n\n大多数士兵都是分配到梅里诺舰队的海军陆战队员，他们还不习惯南极的气候。在生存训练中，他们表现迟缓，许多人适应不了恶劣的环境。而在面对一支已经适应此地的敌军部队时，智利军队就会显得机动性不足。问题亟待改善，他的部队需要能够在这片危险的土地上行军数百公里，投入战斗，然后返回。尽管这种战斗风格需要花些时间才能掌握，但梅里诺相信，在合适教官指导下，他们必能胜任。\n\n此刻，梅里诺要给面前集合起来的海军陆战队员们一项任务，他十分乐意履行这份职责。"
 antarctica_aac_main.9.a: "“我希望你们所有人都贴着阿根廷的边界进行巡逻。”"
 antarctica_aac_main.10.t: "此心安处是吾乡"
 antarctica_aac_main.10.desc: "对于卡洛斯·亚克希奇来说，什么都比不上家里的一杯热咖啡。\n\n他倚坐在窗边，看着孩子们跑过他身旁到客厅里追逐打闹。每当他的妻子露出微笑，仿佛房间都亮了几分。虽然冬天的蓬塔阿雷纳斯算不上一片乐土，但也比南极要暖和得多。\n\n亚克希奇泛起一丝愧疚：古斯曼教授此刻可能冻得够呛，他只能希望聊胜于无的预算不会给南极领地带来什么大麻烦。\n\n关于预算的问题，他已然拼劲全力，可哪怕是委婉地说，未来前景也相当黯淡。即使今年能以当前的预算渡过难关，但跟半死不活也没什么两样。\n\n政府明年还会拨付给他们同样的预算，企图让南极领地复刻今年的成果，这肯定行不通。教授已经明确表示，基地快速恶化的设备只能勉强能撑过这一季，更别说再撑一年了。\n\n亚克希奇喜欢散步，这一次在镇中闲逛时，他不自觉地来到了码头，稍后，他脑中琢磨出一个想法，一个颇为有趣的点子。"
 antarctica_aac_main.10.a: "他将答案埋在心底……"
 antarctica_aac_main.11.t: "冰冷的数据"
 antarctica_aac_main.11.desc: "冬季已经过去了一半，但是报表数据依旧让人揪心。\n\n每当古斯曼教授审视一份新的报告，数据就让他的心再冷一分。\n\n必需品的消耗速度让人难以接受。食品、燃料和弹药的储备量在图表上呈现断崖式下跌，如果不采取措施，智利南极领地的一切成果很快都将化为齑粉。\n\n假如没有意外发生，阿图罗·普拉特站尚有希望维持现状，但古斯曼更担心由此引发的边际问题。梅里诺上校在奥伊金斯站的训练团更新计划看起来颇有成效，但弹药和食品的巨大开支严重削减了配给定额。\n\n而温克站和阿德莱德站这样的岛屿前哨站面临的不确定因素更是令人担忧，勇敢的驻站人员只能可怜巴巴地靠着最低限度的补给撑过这六个月极夜。更糟糕的是，阿图罗·普拉特站无法确定各个站点的实时状况，电台信号差得可怜，许多老旧基地甚至没有功能齐全的通信设施，古斯曼根本无从得知他们将会在风雪中迎来何等恐怖的命运。当夏天来临，他们可能会发现这些前哨站只剩下冰冷的尸体，或者更糟——基地已经被阿根廷人占领。\n\n数据让人揪心，但古斯曼依旧能逆转乾坤。他提笔给亚克希奇写下一份备忘录，指示他："
 antarctica_aac_main.11.a: "……等到海冰融解，立刻将补给船队从本土调去奥伊金斯站，他们比我们更需要口粮和弹药。"
 antarctica_aac_main.11.b: "……派一支雪地车队去最近的前哨站，给他们补充物资。"
 antarctica_aac_main.11.c: "……继续缩紧阿图罗·普拉特站的补给配给，我们要为可能的最坏情况储存口粮和弹药。"
 antarctica_aac_main.12.t: "象牙塔下"
 antarctica_aac_main.12.desc: "冷汗从巴勃罗·文德利希少校的脸上滴下，牙齿止不住地颤抖。他的队伍已在奥伊金斯站外徘徊数小时之久，疲惫不堪。即使在天气良好的时候，南极洲的寒冷也令人刻骨铭心，而随着冬天的来临，永恒的黑暗更是造就了致命的严寒。智利的队员们举步维艰，与脚下的深雪对抗。而最终，无垠的雪原将会埋葬其入侵者。队员们大部分的装备都不适应南极洲严酷的气候，脚上的靴子也不例外。随着装备不断损失，过不了几周，他们就只能穿着袜子在雪原里跋涉了。\n\n文德利希抬头望向站在瞭望台上的梅里诺海军上校，刺眼的灯光打向他，在背后留下了一道黑影，但文德利希能够明显感受到上校的怒火与失望。明眼人都能看出来，海军陆战队早已士气涣散。许多人在行军途中瘫倒在地，每时每刻，都有队员倒下，再起不能。他们身旁的队员冷眼旁观，奉命从同伴的身体上踏过。\n\n操练所带来的精神创伤写在了他们的脸上，黑眼圈内深陷的眼球表达了无声的怒火。休息时刻，曾经畅所欲言的队员们此刻也变得沉默寡言，头上阴沉的乌云压得人无法呼吸，更有甚者，宁愿选择热烈的死亡，而非待在这冰雪的地狱……\n\n梅里诺以一种近乎厌恶的目光俯视着这些“海军陆战队队员”。多年的自满与慵懒使这些士兵身心虚弱，这都是那群脑子有问题的共产主义军官导致的，若再不加以纠正，智利的荣耀何时复兴？尽管不愿承认，但梅里诺的确需要一些帮助。当天早些时候，贝尔纳多·奥伊金斯军事学院收到了一封来信，请求他们增派教官，解决南极基地内武备松弛的情况。"
 antarctica_aac_main.12.a: "无论如何，上校会得到他理想中的海军陆战队。"
 antarctica_aac_main.13.t: "穷思苦想"
 antarctica_aac_main.13.desc: "海冰在蓬塔阿雷纳斯附近的海湾里漂流，在墨色的浪花泡沫中迸裂，映照着小镇灯光。荒芜的街道上覆盖着一层细雪，亚克希奇的靴子留下一串脚印。寒风吹过港口，冷得他直缩鼻子。在鹅卵石街道的尽头，亚克希奇停下脚步，点燃一支香烟，走上了木板栈道。\n\n一闪一闪的灯光在地平线上飘荡，亚克希奇昏昏沉沉的目光凝望着冰封的海湾。海浪拍打着港口，烟雾在他周身缭绕。他想起了小时候，海面上曾经闪烁着更多的灯光，在太阳和星星的照耀下，船只日夜穿梭，往来不绝。然而，随着南方紧张局势不断加剧，所有曾经经由麦哲伦海峡的交通都转走巴拿马运河，这里便沉寂了下来。\n\n现在，闪烁的船灯只剩下那一盏了。几乎所有船只都走了，也一起带走了金钱；后来，码头工人也都走了，徒留下一具港口的空壳，在冬日冻僵枯萎。亚克希奇掐灭了手中的烟头，沿着躁动的海浪漫步着。前方海岸线上耸立着一座巨大的建筑物，或者至少是建筑物的废墟；渔场锈迹斑斑的骨架、曾经热闹非凡的市场都早已废弃，在龟裂的冰面上投下长长的阴影。\n\n又一阵狂风卷走了亚克希奇臆想中的海市蜃楼，只剩下了如今的问题。现在的蓬塔阿雷纳斯比他喜欢的那个还要更寂静、更微小、更沉闷，而且一天比一天更穷困。在遥远的海对岸呢？南极领地还在为预算问题苦苦挣扎。无论走到哪里、想到哪里，亚克希奇似乎都只能是自寻烦恼。\n\n他停下脚步，缩进夹克里，自己甚至连一个都帮不了，更不用说两个都帮了。一秒钟后，他倏忽直起身来，心中有了主意。"
 antarctica_aac_main.13.a: "这主意闻起来感觉糟透了。"
 antarctica_aac_main.14.t: "瓶中苦水"
 antarctica_aac_main.14.desc: "古斯曼快步穿行于民事人员宿舍的走廊。南极冬季近乎永恒的极夜或多或少影响了基地人员，有些人显得更加遭罪。他的一名助理，迭戈·费尔南德斯，近来频繁告病假，几乎不离开床铺。迭戈的长期旷工过于引人注目，古斯曼决定去探望一下。\n\n古斯曼敲了敲门却没有回应，便自顾自地进门。房间里没开灯，各种东西乱作一团，还散落着一地瓶子。“迭戈？”古斯曼呼唤道。\n\n“……怎么了？”瘫在床上的人回应道，古斯曼闻到了他呼出的酒味。\n\n“我来探望一下看你是否需要什么。”古斯曼说。迭戈有气无力地回答：“我没事。”古斯曼心生怀疑：“你告病假的时间不短了……而且我看到你在喝酒。我很担心。有什么我可以——”迭戈打断了他：“滚出去！”\n\n古斯曼被助理的态度吓了一跳。也许迭戈不适应南极，或者至少不适应南极的冬天。但现在古斯曼拿他没辙，只有生死攸关的紧急情况才会在冬季安排航班，而满地形形色色的瓶子则更令人担忧，它们不可能来自军需仓库或酒吧，数量太多。所以，一定有人在基地里酿制私酒。古斯曼咬紧牙关。冬天里，把自己灌得醉生梦死确实很有吸引力。\n\n“很好。”古斯曼说道，“酒醒了后到我办公室报道。”"
 antarctica_aac_main.14.a: "看来问题比设想的还要严重。"
 antarctica_aac_main.15.t: "搜查酒桶"
 antarctica_aac_main.15.desc: "古斯曼倚坐在桌上，迭戈在他对面。后者花了点功夫刮了胡子，看上去精神不少。古斯曼开口：“很高兴看到你恢复得不错。”迭戈点了点头回应：“是啊，我戒酒成功了。说实话，我再也不想沾这玩意儿了。”\n\n“不错，”古斯曼继续说道，“我需要你的帮助。你喝的那些酒不是从酒吧或军需仓库里搞来的，对吧？我要知道你是从哪买的。”\n\n“您别提了，那酒真不值得推荐，劣质得很——”\n\n古斯曼不由得揉了揉太阳穴：“这不是重点！重点是，有人正在非法贩酒，我需要你的帮助来阻止他！”\n\n迭戈还在继续说着：“——讲真，我也不知道这货色是哪儿搞来的。我自个儿是从食堂里的一个人那拿到的。时局困难、工作不易啊，要是让人不喝点什么真是太难了。”\n\n古斯曼皱起了眉头：“是啊，我知道，但这事儿可严重了。不喝酒的时候就够麻烦了，那再想想看，要是工程师们半数都醉醺醺的，维修工作怎么办？要是科学家们吐得昏天黑地，研究进度怎么办？要是士兵们喝得眼冒金星，阿根廷人趁乱发动进攻怎么办？这酒简直是头一号的祸害！”\n\n迭戈叹了口气：“好，好，我明白了。那你认为我们应该从何处开始？”古斯曼微笑着说……"
 antarctica_aac_main.15.a: "“嗯，这事儿办起来很容易：发悬赏。”"
 antarctica_aac_main.15.b: "“我们去找那些可能的知情者。后厨、维修人员……然后拉拢一下，让他们说出实情。”"
 antarctica_aac_main.15.c: "“不要打草惊蛇，恶人终将因得意忘形而自食恶果，他们迟早会露出破绽的。”"
 antarctica_aac_main.16.t: "奥伊金斯的恶灵"
 antarctica_aac_main.16.desc: "就在文德利希少校监督部下晨练时，两个身影从他眼角的余光中闪过，是梅里诺上校和他的新顾问路易斯·达努斯·科维安正在检查士兵们的训练进度。梅里诺与他的部下一起来到了庭院里，而不是站在瞭望塔上，这让文德利希大吃一惊。与科维安挺拔、势不可挡的步伐相比，梅里诺在雪地里跋涉时显得有些不自在。科维安来了之后，情况发生了很大变化：就在极夜开始吞噬一切的时候，他从六月冰冷的暴风雪中走了出来，预示着基地进入了新的时代。在梅里诺上校的亲自要求下，科维安接受了一项艰巨的任务：将奥伊金斯站的海军陆战队员们塑造成真正的士兵。显然，他之所以能战胜冬天的黑暗，并不是因为他是光明和希望的灯塔，而是因为与他的墨镜相比，似乎一切都能显得更加明亮。\n\n文德利希和基地里的许多人一样，开始害怕这个新来的家伙。梅里诺曾试图用纯粹武力制服部下，挥舞大棒，把他的人打得体无完肤；而科维安的办法则更加微妙，他的手术刀名唤痛苦与恐吓。效果立竿见影，陆战队的纪律有了明显改善。有关他在美洲学校不光彩过去和在国内血腥名声的传言更是只能增强他的神秘感，奥伊金斯的恶灵已经从陆战队员的口口相传中渗入了他们的灵魂。\n\n当梅里诺和科维安擦肩而过时，文德利希几乎可以听清他们的对话。科维安平静地告诉梅里诺，物资持续匮乏阻碍了训练进程，梅里诺的反驳听起来则有些模糊：“你就继续履行职责……”"
 antarctica_aac_main.16.a: "”……我来料理那群小子。“"
 antarctica_aac_main.17.t: "恶臭弥漫"
 antarctica_aac_main.17.desc: "罐头厂的气味是这世上最难闻的。这股味道径直钻进亚克希奇的毛孔，撕扯着他的鼻腔。整个厂区弥漫着油腻的味道，仿佛浸泡在油里一般，四处散落着鱼的内脏残渣。而他的随行护卫似乎完全不为所动。\n\n亚克希奇走进厂房后，眼前的景象令他毛骨悚然——一头被屠宰的鲸鱼被剔得只剩下骨头，巨大的锯子正切割着肥厚的肉块。亚克希奇感觉胃里一阵翻江倒海。\n\n他的向导露出一个缺牙的笑容，说道：“瞧瞧，大海的馈赠。”\n\n亚克希奇不由得往后缩。他原以为没有什么比罐头厂的气味更糟糕，直到他闻到向导的口气。\n\n他被带到加工车间楼上的行政办公室。这里阴沉、潮湿、发霉，就连屋内的经理也满身霉味。“那么，”经理说道，“你觉得我们这儿怎么样？”\n\n“我可能不会选择在这上班，但你为蓬塔阿雷纳斯的市民提供了大量工作机会，我表示尊重。”\n\n经理笑道：“你还真是满嘴鬼话，亚克希奇，说的不错。如果你愿意的话，我们还可以做点生意。”\n\n“正如我在电话里说的，这纯粹是一次实地调查。所有事情都得教授批准才行。”\n\n“成吧，成吧，”经理再次笑了起来，“那我们不如参观下其余的工作流程？然后你再决定跟教授汇报些什么。来吧，我已经让人备好船了。”"
 antarctica_aac_main.17.a: "“一艘……船？”亚克希奇面色开始发青。"
 antarctica_aac_main.18.t: "新邻居，新忧患"
 antarctica_aac_main.18.desc: "“他们还是老一套，”梅里诺在电话一头咕哝道，“又跑去对法西斯卑躬屈膝。”\n\n古斯曼在电话另一端点了点头，手指拨弄着电话线。几分钟后，他挂断了电话，坐回到办公桌前，怔怔地盯着地板许久。阿根廷已经将智利的领土租让给了意大利帝国，他们本无权染指加林德斯岛，然而，这座岛屿就这么轻而易举地被当作蛋糕一样交了出去。\n\n一瞬间，古斯曼的视野被愤怒染红。他双拳紧握指节发白，紧紧地压在膝盖上。智利方面一筹莫展，他亦无计可施，只能眼睁睁地看着自己的领土被换成金钱。不过很快，怒火被突如其来的冷静所取代：意大利是世界第四强国，而现在它也加入了南极的争夺。\n\n这不是情绪化的时候。他们的意图是什么？他们会帮阿根廷帮到什么地步？他们会派多少人来？古斯曼不清楚详情。他只知道意大利会站在阿根廷一边，也知道意大利的舰队正在驶来。\n\n该死，那群人总是棋高一着，现在古斯曼唯一能做的就是祈祷这支舰队不会插手智阿间的领土争端。倘若局势恶化，考虑到智利的落后处境，要是意大利再参战……\n\n古斯曼叹了口气，望向窗外。南极清晨的阳光下，阿图罗·普拉特站的老旧建筑正闪闪发光，而胃部传来的绞痛提醒他时间所剩无几。米兰达和比利亚罗埃尔会继续他们的外交活动，而这将是他们的唯一救命稻草。"
 antarctica_aac_main.18.a: "事已至此，他们别无选择。"
 antarctica_aac_main.19.t: "对抗酒精"
 antarctica_aac_main.19.desc: "这一天终于来了。无数个不眠之夜，古斯曼翻找证据，提出质疑……搜寻着真相。如今，他终于找到了使整个基地陷入痛苦的缘由：非法酒精的源头。那是个多年前被废弃的小屋，它如今已被改造成一座蒸馏坊。不过，古斯曼还没丧失怜悯和理智，他希望亲自面对让他头痛不已的始作俑者，给对方一个自首的机会。\n\n他推开门，环顾四周。这地方肮脏不堪，设备锈迹斑斑，墙上长着霉菌，灰尘弥漫，还有几只虫子四处爬动。几名基地人员正在准备下一批酒，直到古斯曼开口，他们才注意到他的存在。“要是你们一直在喝这种东西，那难怪大家士气低落。”教授开口了，众人的目光集于他一身。\n\n一个人走上前来，古斯曼认出他是本哈明，厨房的工作人员。“呃，请听我解释。”\n\n“解释！？”古兹曼厉声道，“哦，尽管解释。我倒想听听，你如何狡辩自己在这一年中最艰难的时候，铤而走险大量贩卖酒精的行为。因为我们现在大约有十分之一的成员要么成天晕晕乎乎，要么醉得不省人事无法工作……而且，现在能把你铐起来我实在太高兴不过了。真是妙极了，你为了自己的腰包竟然拿基地成员的健康安全犯险。所以，请解释一下吧，可别让我失望！”\n\n本哈明回应道：“听我说，听我说，这事儿禁不得。如果我们不干，他们还会从别的地方搞到酒。你看不妨这样，我们可以一起管控一下。如果你愿意，我可以把你的那份当作……道歉。”古斯曼愣了一下，然后开口说道……"
 antarctica_aac_main.19.a: "“我不是来制止的，我是来收税的。”"
 antarctica_aac_main.20.t: "荣光愿景"
 antarctica_aac_main.20.desc: "梅里诺和科维安在距离奥伊金斯站仅几公里的阿根廷边界附近，目光所及是一望无际的荒凉冰原。相较于他们的小小雪地车，广袤的南极前线教他们理解了何为沧海一粟。\n\n梅里诺心想，那些初抵这新大陆的征服者们在踏上处女地的海滩时，是否与他此刻一样感同身受？整个大陆就在他们面前等待着被征服。梅里诺正如早先的英雄一样，可唯一阻碍他梦想成真的就是劣等野蛮人：阿根廷人。通过在法律条款上舞文弄墨，布宜诺斯艾利斯的猿人们竟然愚弄了整个世界让其相信南极的土地属于他们。\n\n梅里诺深谙真相，他转身看着正在进行演习的智利海军陆战队员，突然灵光乍现：“科维安，你觉得这些小伙子们准备好真刀真枪地干一场吗？”\n\n科维安的语调依旧十分冷静：“在组织纪律和零下环境作战方面，他们有了显著的进步。只消几个月，我可以保证他们将达到最佳战斗状态。”\n\n梅里诺思索了片刻，然后微笑着转向科维安，手指向远方的阿根廷边界，那儿看似空无一人、毫无防御：“那让我们提提速，没什么比真正的危险更能锻炼他们，离开基地出个短差或许对他们有好处。”\n\n“您是在提议越境吗，上校？如果是这样，我必须提醒您，一旦遇到敌军……”梅里诺打断了他……"
 antarctica_aac_main.20.a: "“我们就会碾碎他们，通知士兵，准备出征。”"
 antarctica_aac_main.20.b: "“你言之有理，继续演习吧，这事得从长计议。”"
 antarctica_aac_main.20.c: "“我肯定是冻得不清醒了，收队回基地吧。”"
 antarctica_aac_main.9.b: "“靶场集合，准备射击训练。”"
 antarctica_aac_main.9.c: "“把你们的外套都脱了，适应一下这儿的寒冷气候。”"
 antarctica_aac_main.19.b: "“我不收贿赂，但我会给你找个更干净卫生的地方。”"
 antarctica_aac_main.19.c: "“我没带人手来抓你，但私酒必须要停下来。”"
 antarctica_aac_main.21.t: "有利可图"
 antarctica_aac_main.21.desc: "船只猛地剧烈倾斜，亚克希奇腰腹用劲，竭力保持着平衡。腥咸苦涩的海风掠过参差的浮冰与翻腾的浪花，自南方呼啸而来。他又看清楚眼前的世界时，本能地想要抓住点什么东西，但栏杆早已锈蚀得千疮百孔，看起来仿若挨上一下就会染上破伤风。此时，船老大的口哨惊醒了他的沉思。“看哪，瞧瞧那个，”他感叹道，“如今这日子，这景象可真不多见。”说话间，他将望远镜递给亚克希奇，指了指远方的海平线：一头呈流线型的灰蓝色巨兽破浪而出，白色水柱昭告着它的存在。亚克希奇不由张口结舌——他此前从来没有亲眼见过蓝鲸。而当他又意识到捕鲸船队正在后面追逐着蓝鲸时，神色却又骤然凝固下来。\n\n据说，一位优秀的捕鲸船长只需一击便能成功。鱼叉携带着炸药飞射而出，正中鲸鱼背脊，漫天血雾瞬间迸发开来，破烂的内脏从躯体敞开的孔洞中涌出。随即，小船蜂拥而至，将充气管塞进鲸鱼腹部，免得尸体沉进大海。亚克希奇搭乘的船只驶到近前时，他们已经开始了接下来的工序。或许唯一能让他得到些许慰藉的是，鲸鱼在被拖上甲板时已经不再挣扎。鲸鱼鳍软绵绵地垂落，船员们拎着砍刀和生锈的小镰刀走到近旁，汩汩鲜血和腥臭的铁锈味在他们面前仿若无物，而是挥舞起手里的家伙事儿，用斜刃刺穿光滑的鲸鱼皮，将地球上最为庞大的生物切割分离，用于后续处理。\n\n厚实的脂肪块一个接一个地被投入锅炉，融化后灌进鲸油桶；立起来比人还要高的滴血肉块悬挂在甲板上的肉钩子上摇晃摆动；骨骼也有用处，可以碾作成吨成吨的骨粉。亚克希奇脸色发青，强忍着腰以下都覆盖着鲸鱼鲜血的视觉冲击，目送没用的内脏被扔进海中。\n\n“好了，伙计们，打扫干净，”船长下令，“我们去找下一头。”"
 antarctica_aac_main.21.a: "亚克希奇倒吸一口凉气，这些已经足够报告给古斯曼了，毫无疑问。"
 antarctica_aac_main.22.t: "温克岛"
 antarctica_aac_main.22.desc: "亚克希奇离开南极已有数月，此时他已经返回，正和古斯曼一起坐在阿图罗·普拉特站的办公室里。“卡洛斯，我看出来你忙活这个事儿挺久了。”古斯曼说道，“你这个提案非常有意思，而且可能相当有利可图，但我们需要先和科学家们商议，然后再——”\n\n话音未落，桌上的电话铃铃作响。他抓起听筒：“我是古斯曼。”\n\n“这里是机场指挥管制。梅里诺上校刚刚降落，他此行不在日程表上，正在往您那里去。”办公室大门砰的一声被推开，满面通红的梅里诺就站在门外。古斯曼匆忙挂断电话。“不可理喻！”梅里诺怒吼起来，“可憎！可耻！真他妈的卑劣！”他一边说着，一边把手里的照片摔倒办公桌上，“类人阿根廷渣滓，不但犯下谋杀的罪行，甚至让被害者不得安眠！士兵们没有长程通讯设备，没办法呼救，就这么孤零零地死在冰天雪地里。”\n\n梅里诺面上赤红，古斯曼却脸色苍白。照片上，阿根廷国旗正在温克岛上飘扬——它在这个冬季之前还属于智利。“你是说，阿根廷人杀害了驻岛守军？”\n\n“是，阿根廷人甚至还很可能把他们扔进了大海，哨所也一把火烧得精光，只剩下这一面丑陋的破布。我们必须要回击！”\n\n古斯曼腾地站起身来：“不用我说，你我都清楚，我们根本无力反击。”\n\n梅里诺厌恶地盯着亚克希奇，说道：“这又该算是谁的错？该死的社会主义者！我绝不会坐视不管。”\n\n“上校，你应当立刻停止行动。”"
 antarctica_aac_main.22.a: "“或许全世界都会忘了温克岛，”梅里诺回应道，“但我不会。我部下的遭遇，必须要报复回去！”"
 antarctica_aac_main.23.t: "追加投资"
 antarctica_aac_main.23.desc: "古斯曼教授正在基地里漫步，聆听着积雪被他踩碎时嘎吱嘎吱的声响。寒冬终于过去，他渴望能多见见阳光，实在是太想念它了。\n\n然而，太阳底下也并非全是好事。冬季的极夜会掩盖基地里破败的痕迹，如今阳光之下，疏漏便会暴露无遗，比如说陈旧设施上早已腐朽的木头碎片，或者某栋建筑上脱落的金属板材——经年的损毁与荒废累积起来，已经颇为触目惊心。\n\n古斯曼走进了其中几座建筑的内部，目力所及，处处破败不堪：家具残损、灯泡熔丝、管道锈蚀。工作人员的状态也好不到哪里去，他们衣衫不整，古斯曼还能读懂他们精疲力竭的眼神。自然，古斯曼完全理解，他们已经历了地狱般的磨难，如今只要有机会，古斯曼猜测许多人都会选择回家。\n\n这个猜想让古斯曼有点忧心起来，许多经验丰富的南极老人可能很快就会离开，他只能自我安慰，新人也会来的。\n\n望着破旧的设备和建筑，古斯曼暗自思忖着，或许引进新事物也并非坏事，注入新鲜血液正是如今他们所需的——新热情、新视角、新创意，这是赢取胜利的关键。\n\n古斯曼的目光移向远方的地平线，嘴角浮现出一丝笑意，希望的曙光似乎终于出现。先前，他总是不愿意在办公室里待着勾勒未来，如今伴着春天的脚步，他已经等不及要回到工作之中了。"
 antarctica_aac_main.23.a: "还有许多事情要做。"
 antarctica_aac_main.24.t: "军事纪律"
 antarctica_aac_main.24.desc: "与科维安一同检阅海军队列时，梅里诺喜不自胜。才几个月工夫，这帮原来哭哭啼啼的稀泥软蛋就变了样，凝练成了一堵纪律森严的人墙。全体士兵军容整肃，即使在如此恶劣的自然环境下，军备武器也能保养至最佳状态。就连胡须也刮得干干净净，长度完全符合智利军规，分毫不差。十二月的盛夏阳光逐渐笼罩这片酷寒极地，海军陆战队如今脱胎换骨，斗志昂扬。用不了多久，梅里诺的计划就能得以实施。\n\n突然，科维安探入人群，劈手指向一名落单的士兵。“一等水兵加西亚，出列！” 那名士兵有板有眼的架势纹丝不动，眼神里却满是惊惶，彻底出卖了他徒有其表的镇定。紧接着，梅里诺也听见了，在那鬼哭狼嚎的南极风里，隐隐约约传来牙齿打架的咯咯声。科维安一巴掌甩在士兵脸上，恶狠狠地骂道：“想在战场上稳住阵脚？先管好你自己！什么时候你证明自己不是个只会发抖的废物，什么时候再拿回去！”科维安一把扯下他的军衔徽章，随即示意队伍中的两名士兵出列。“把他扔进冰屋里关禁闭，等他多少能管住自己了再放出来！”加西亚被拖走时，其直属指挥官巴勃罗·文德利希跨步上前：“长官，我请求与一等水兵加西亚共同承担责罚，部下出错，也是我的失职。”科维安眉梢一挑，随即点头应允。文德利希干脆利落地转身，径直走向那冰冷的禁闭室。\n\n梅里诺将手搭在科维安的肩膀上：\"借一步说话。\"梅里诺与科维安移至人群外，他轻声对上司说：“我需要飞往阿图罗·普拉特基地，与古兹曼和他手下的文弱官僚共进圣诞晚宴，在此期间由你代理指挥。或许可以考虑给士兵放一天假，有助于稳定军心。”"
 antarctica_aac_main.24.a: "“也许是的，上校，明天的训练日程取消了。”"
 antarctica_aac_main.24.b: "“恕我直言，上校，若想在您的日程内有可用之兵，我们一天都耽搁不起。”"
 antarctica_aac_main.25.t: "发现号湾"
 antarctica_aac_main.25.desc: "“这么说，两个月来你没有一天过着舒坦日子。”古斯曼看着亚克希奇窘迫的模样，嘴角泛起一丝笑意。\n\n“呃，确实谈不上享受，”亚克希奇低声嘟囔，“但重点不在这里。如我所说，这里有不少牟利的空间。”\n\n古斯曼转身面对广袤的海面，它正簇拥着格林尼治岛礁石遍布的海岸。高耸的峰峦与陡峭的雪岭间，浮冰沿着海岸线星罗棋布。“捕鲸人在这片海域活动已久，但在我们的扶持下，产业利润将更加可观。”\n\n“你想分一杯羹。”古斯曼直白地说。亚克希奇点了点头：“我们在他们的利润里抽成，既能缓解预算问题，也能让南部省份的经济焕发第二春。”雪鹱与南极鸽成群地从身后山峦飞起，白色的翼展犹如滑翔的星辰，在云霞浸染的橙红光带下翩跹，“要是放任他们，这里可是要翻天覆地了。”\n\n“不错，”古斯曼答道，“对还能剩下的鲸群而言将是巨变。”他闭目沉默，耳畔唯有海浪击打岸礁与飞鸟鸣叫之声。凛冽、新鲜的风裹挟着海洋的咸腥气息拂面而过：他不愿这里的任何事物以利润之名被玷污，但若以生存之名呢？\n\n“好吧，也只剩这个办法了。”亚克希奇闻言，肩头一松，感到如释重负。二人极目远眺，在这个海湾工作许久，两人却首次留意那些停栖在紫褐色峭壁上的飞鸟。它们的筑巢地正为深邃无垠的蔚蓝所环抱。"
 antarctica_aac_main.25.a: "让我们看看未来会怎样。"
 antarctica_aac_main.26.t: "敬新年"
 antarctica_aac_main.26.desc: "古斯曼对这个夜晚抱有不少期待。他回忆起与米兰达商讨如何说服秘鲁接受的智利要求，与比利亚罗埃尔谋划针对海地的最佳外交策略，乃至于为孤立阿根廷而绞尽脑汁的煎熬夜晚。无论如何，年度工作都已告一段落，此时此刻人们都应该撇开阿图罗·普拉特站堪忧的现况、撇开有关资源分配和战略部署的争论，围着热气腾腾的烤肉欢庆，暂时忘却智利南极的困境，为新的一年蓄势待发。古斯曼走进会议室时，领导层已经齐聚一堂来庆祝圣诞：亚克希奇、米兰达、比利亚罗埃尔、甚至梅里诺——想必是某个人说服了他来参加庆祝聚会。众人谈笑风生，空气中弥漫着战友情谊。烤肉香气令古斯曼垂涎三尺，他坐在了亚克希奇身边。\n\n“恩里克，我觉得你还是没明白。凭着这些工厂，我们就能轻易地拓展领土，让移民在岛屿上定居……如果说，我们能向世界展示出，我们管辖的南极土地比阿根廷那一片更优越，那你觉得他们还会支持阿根廷吗？而且，工业带来的收益还能投资更多的基础设施、更完善的防御体系和新装备，百利无一害。”\n\n古斯曼抿了一口酒，思索着亚克希奇的观点。的确，增加投资能改善现状，更新过时陈旧的无线电设备和建筑物是当务之急，甚至比训练新兵还要重要。据传梅里诺还请了一个新教官，古斯曼不由暗自思忖着，为什么自己竟会被排除在人事事务之外，是时候重申自己的领导地位，在新一年里主动出击了，重塑指挥体系、攥住军队也至关重要。古斯曼给自己盛了满满一盘，然后端起酒杯起身，清清嗓子示意同僚们安静一下，说道：“诸位，请容我敬一杯酒。”"
 antarctica_aac_main.26.a: "“敬智利，敬她高尚的南极事业。愿节日为我们的奋斗再添一把火！”"
 antarctica_aac_main.27.t: "声明"
 antarctica_aac_main.27.desc: "米兰达和比利亚罗埃尔极少能休假。然而，在南美辗转奔波一年、数次往返南极大陆之后，他们终于获得了亟需的休整。两人决定借机在这段时间里陪伴家人，弥补错过的时光。直到某天，两人都各自受到了外交部长的召唤，要求他们前去外交部会面。公函没有说明目的，这让米兰达和比利亚罗埃尔意识到此事既紧急又机密，于是，两人火速动身赶去外交部。在大厅里，他们碰上了头。“你觉得我们是碰上麻烦了吗？”米兰达咧嘴笑问道。\n\n比利亚罗埃尔闻言也轻笑起来：“要是真有什么麻烦，他们还会搞这么神神秘秘的小把戏吗？”\n\n在办公室门口，马施克外长挂着灿烂的笑容同他们握手，说道：“感谢二位前来！请坐，请坐。前几日，我与赫尔曼·弗莱格先生有场极为有意思的会面。”\n\n米兰达挑了挑眉头：“我在担任驻美大使的时候认识他，是个正直诚实的人。”\n\n“我确实也这么觉得。他带来了一项绝妙的提议：如果阿根廷企图得寸进尺，或者日本想趁着我们暂时虚弱的时候钻空子，那么OFN会通过其南极领地和资产援助我们。”\n\n米兰达和比利亚罗埃尔面面相觑，满脸都是难以置信的神色。“他们突然提出来这个？”米兰达问道。\n\n“他们会公开声明表示支持吗？”比利亚罗埃尔问道，“会有任何形式的条约签署吗？”\n\n“目前这还是非官方非正式的安排，需要列为最高密级事务——相信两位也认同。我们现在得到了弗莱格的承诺，还有OFN海军巡逻队保证各方不敢越雷池一步，眼下这样就已经足够了。”"
 antarctica_aac_main.27.a: "足够了吗？"
 antarctica_aac_main.28.t: "言语就像风"
 antarctica_aac_main.28.desc: "与马施克外长会面之后，米兰达和比利亚罗埃尔潜入了圣地亚哥市中心最爱的咖啡馆。两人点了菜单上最浓的意式浓缩，在临界露台的僻静角落里找了一张桌子。\n\n比利亚罗埃尔凝视着沉思的米兰达：“你信任弗莱格先生吗？”\n\n“就我对他的了解，”米兰达啜饮着手里的浓缩咖啡，回答道，“言出必行，但他代表的那些机构，恐怕就未必了。美国曾经让我们失望过，他们说支持智利的主张，可当阿根廷发动进攻时，他们只是一心巩固自己的南极领土，除此之外什么都没做。”\n\n“我正是如此同感。若是当年华盛顿能立场强硬些，我们或许不会陷入如今的困境。”\n\n“总是揣度没能实现的未来会让人发狂的。有时候，我感觉世界就像是一列正在驶离正轨的列车。”米兰达双臂抱起，凝望着远方，“OFN向来反对日本扩张，他们支持对抗阿根廷的承诺也颇为诱人……”\n\n“但他们不会公开表态支持，”比利亚罗埃尔接话道，“耐人寻味，他们分明是在观望风向。”\n\n米兰达用力摇摇头，似是要驱散眼前的迷雾：“实际地说，这份‘承诺’对我们的外交谈判计划毫无意义，因为它是暗室里的秘密，我们没办法用它施压。并且，如果最终还是不得不依赖OFN的军事力量，那无论结果如何，都意味着我们的失职。”\n\n比利亚罗埃尔点头表示赞同：“那我们该去做加勒比的工作了？”"
 antarctica_aac_main.28.a: "外交官们一饮而尽，准备动身。"
 antarctica_aac_main.29.t: "决意"
 antarctica_aac_main.29.desc: "办公室内，古斯曼教授深陷椅背，望着窗外冰封的深渊。他手捧酒杯，思考着自己的现状。艰难的一年已经过去，如同白驹过隙。\n\n寒风年复一年地侵蚀建筑、破坏机器、消磨意志，内部的懈怠、贪腐和尔虞我诈不停地瓦解他们的努力，阿根廷人的气焰也愈发嚣张，变得日益棘手。\n\n但是，不可否认，这世上还有一样东西比内部斗争、阿根廷人乃至大自然本身更强大——那就是古斯曼教授的固执劲儿。他发自心中认为，即使这座基地总有一日会被摧毁……最后一块木板被寒风夺取之日，或是阿根廷人坐上他的椅子之时……他的精神仍会长存于顽石和冰雪之间，成为对世间不公与暴虐的最后抗争。\n\n“该死的，我怎么这么悲观？”他扪心自问，随即又开始安慰自己：眼下的困境只是偶然，亚克希奇组织捕鲸船队的努力或许能带来他们期待的重大突破，更不用说米兰达和比利亚罗埃尔为争取国际支援所作的不懈努力。的确，去年困难重重，但那已经是过去的事情，今年一定会更好。"
 antarctica_aac_main.29.a: "当然。"
 antarctica_aac_main.30.t: "意外之喜"
 antarctica_aac_main.30.desc: "尽管梅里诺戴着太阳镜，但南极夏日的阳光依然直射冰原，反射进他的眼瞳之中。南极的夏天一点都不暖和，却总是亮的吓人，更何况他现在还在努力压制着归来时在飞机上灌下的那几杯白兰地的后劲，以及古斯曼和那群溜须拍马的社会主义分子搞的圣诞晚宴所带来的宿醉——浪费时间又浪费金钱，他还得枯坐数小时听着古斯曼身边的蠢货共产分子夸夸其谈，简直就是消磨生命。\n\n梅里诺每走下一级舷梯，视线就更模糊一分，每一步都需要刻意用力才能维持清醒。终于，他的靴子踏上了没有积雪的地面，发出嘎吱嘎吱的声响。所幸只有科维安目睹了这略显尴尬狼狈的一幕，而他的脸上既看不出评判的态度，也瞧不出嘲弄的神色——至少透过朦胧的醉眼，梅里诺看不出来。\n\n“欢迎回到基地，上校。您的圣诞节还愉快吗？”\n\n“别废话了，士兵，敌人可不会过节，我们也不该懈怠。”\n\n科维安嘴角掠过一丝狡黠的笑意：“真遗憾，长官，我本来准备了一份迟来的圣诞礼物——一个好消息，最新评估显示，海军陆战队很快就能准备好进入阿根廷领土展开一次行动。我已经同文德利希少校和他的部下约定于14时讨论初步战略……当然，前提是您状况良好。”梅里诺闻言，突然精神大振，双眼也开始适应广袤荒野上的眩光。\n\n“那是自然，我肯定能参会。看来这个圣诞也不算白过，但是，科维安，解散之前我再讲一句。”\n\n“是，上校。”\n\n梅里诺接下来的话几乎是从牙缝里挤出来的：“永远别让我再听见你把奥伊金斯地说成是阿根廷领土……”"
 antarctica_aac_main.30.a: "“就算那群猢狲在那儿吃喝拉撒，它也属于智利。”"
 antarctica_aac_main.31.t: "故乡异客"
 antarctica_aac_main.31.desc: "绵绵细雨把古斯曼淋得浑身透湿，疲惫不已，但打开家门的那一瞬间，家人的拥抱和亲吻便紧紧围绕在身边，他脸上阴郁的神情随即烟消云散。\n\n尽管他早就告诉了家人自己的归期，但能在故乡兰卡瓜团聚的喜悦依然盈满心间。古斯曼人生中许多光阴都在智利度过，却鲜少能真正回家一次。休假时，他一般都滞留在蓬塔阿雷纳斯，处理国内繁琐的官僚事务，或是为争取预算而奔波。\n\n古斯曼坐在熟悉的旧沙发上，这张沙发层陪伴他走过了在大学任职的岁月，那时他通勤只需要花上三十分钟，而不像现在要飞越三千公里。孩子们看起来比上次见面时又长高了许多，他们迫不及待地向父亲炫耀展示着自己的新玩具。多年前，古斯曼驱车去圣地亚哥的时候还觉得路途就已算十分遥远，如今世界却仿若缩小了许多。\n\n夜幕降临，霖雨仍未停歇，古斯曼几个月以来第一次给孩子们掖好被子。待家中归于寂静，他走进厨房，一切还如记忆中那般熟悉，熟悉到他几乎闭着眼睛都能烧水再泡上两杯茶。然而，家中也已经改变了太多——旧时的全家福旁边，并排摆放着没有他的新记忆。古斯曼叹了口气，终于决心要直面归家后就始终在逃避的现实。\n\n工作固然重要，但生活早已在他缺席时继续前行，这是他为守护国家安全、守护家人所做出的牺牲。水壶的嘶鸣声打断了古斯曼的思绪，他冲好两杯茶水，小心翼翼地端着走回客厅。\n\n两人坐在沙发上，聆听着屋外的雨声，妻子向古斯曼讲述着他离家时错过的点点滴滴。"
 antarctica_aac_main.31.a: "家中的陌生人，也是永远温暖的来客。"
 antarctica_aac_main.32.t: "智穷力竭"
 antarctica_aac_main.32.desc: "房间里弥漫着浓重的体味和难闻的咖啡气味，奥伊金斯站几乎所有的军事指挥层都挤进了这间狭小的会议室。在梅里诺上校慷慨激昂痛斥阿根廷敌人堕落行径的时候，其他人已经伏案研究了好几个小时的报告和地图，试着规划这场大规模的进攻行动。\n\n紧张气氛侵蚀着参谋们的神经，就连向来泰然自若的科维安也显露出了烦躁与疲惫，素来完美的扑克脸上挂着深邃的黑眼圈。文德利希也不由自主的打了个哈欠，随即便有些懊恼。\n\n“少校，你怎么回事？”梅里诺厉声喝问道，“是保卫祖国、抵抗法西斯外敌的使命妨碍了你睡美容觉？还是说你想说点什么但没说出来？你还有什么想说的吗？”\n\n文德利希闻言仓促应答，语气远比平常回答梅里诺时更加直白：“长官，恕我直言，我认为您的计划是在浪费人力物力。这场精心策划的大规模若是深入阿根廷——我是说，被占领的奥伊金斯地，很可能会因为恶劣天气和敌军阻拦受挫。我认为，我们应当利用雪地车机动性强、敌军防线分散薄弱的优势，先对内陆薄弱目标发起突袭，在发起行动之前截获敌军巡逻的准确情报——”\n\n梅里诺看起来好像正要继续喷出辱骂之词，却突然间收起话锋，自己打了个哈欠。他急忙合上文件夹转移话题，说道：“少校，你提出的几点确实有道理，但这些准备工作还是留到明早继续处理吧。”"
 antarctica_aac_main.32.a: "“我希望你在亲自带队的时候也能好好休息。”"
 antarctica_aac_main.33.t: "进度检查"
 antarctica_aac_main.33.desc: "“借过。”亚克希奇踉跄着从一群路过的工人身边挤过去。他匆匆扫视了一眼人群，可转眼间他们便消失在了人流之中。亚克希奇又转头望向另一边，发觉那里也是人头攒动。阿图罗·普拉特站居然会有人潮涌动？亚克希奇还以为自己这辈子都见不到这样的景象呢。\n\n亚克希奇一边走向临时搭的桌子，一边在手中的板子上勾选项目。地基，确认；结构框架，确认。桌子上散落着阿图罗·普拉特站新捕鲸基地的草图和方案，工人们则正要把图纸变成海岸边的现实。驻站人员与刚从海上归来的捕鲸船员共同搬运着工具建材，阿图罗·普拉特站指挥下简陋却又能干的雪地车队正翻过山丘拖运物资。亚克希奇穿着雪地靴走过冰面，把文件夹塞进夹克内里，与众人并肩而行。\n\n冰雪和钢架之间，屋墙拔地而起，就连几名平日里蜗居哨所的士兵也都来搭上了一把手。亚克希奇向他们点头致意，走进一栋完工程度较高的建筑：天花板尚未封顶，裸漏的金属梁架如同巨口一般指向苍穹。工人们正在争分夺秒地固定钢板屋顶：确认。亚克希奇的肩膀松弛下来，建设进度远超预期，甚至有一些挂肉钩子都已经安装完毕：确认。若是能再加快些进度，或许还能赶上当季的最后一次捕鲸。\n\n一股铁锈味的腐臭扑面而来，亚克希奇仿佛看见一头鲸鱼软绵绵地悬挂在天花板上，屠刀劈开血肉的声响令他浑身颤抖，鲜红的血液浸染着他的衣衫。这只是一段亚克希奇的记忆而已，却将会在这里不断重演。捕鲸站建得越快，这场戏就开幕越早。在他精明的管理调度之下，一头又一头的鲸鱼将会被大卸八块。\n\n“……已经没法回头了。”他继续巡视着设施的其余部分。"
 antarctica_aac_main.33.a: "亚克希奇走过，弯曲的肉钩投下阴影。"
 antarctica_aac_main.34.t: "计划之外的翻新"
 antarctica_aac_main.34.desc: "古斯曼靠在办公室走廊的椅子上，手里端着飘着热气的保温杯，里面盛着香浓的可可。他啜饮一口，目光扫过部下们忙碌的身影。\n\n捕鲸站看起来堪称奇观，在南极基地里显得格格不入。与破败的老旧建筑相比，捕鲸站亮丽崭新，宛如矗立在茅草棚屋之中的摩天大楼。\n\n古斯曼嘴角浮起一抹微笑，目睹进展顺利总是会令人欣喜，这感觉或许和观察蚂蚁搬家差不多：这里就是一座宏大的南极蚂蚁农场。\n\n古斯曼的余光瞥见了吊车转向太大，猛地撞上了一旁的旧屋子。他一下子跳起来，快步走去检查损毁情况，可还没走到地方，屋顶便突然坍塌。他立刻变成了跑的过去，好确认有没有人受伤——真是奇迹，出事的时候里面空无一人。\n\n“谢天谢地。”古斯曼喘着粗气。这次确实走运，虽说房子塌了，但是人没出事，问题是冬天马上就要到了。他叹了口气，决定冬天之后一定要重建住所，但眼下……"
 antarctica_aac_main.34.a: "“反正迟早都要建新的，”古斯曼叹气道，“现在只能先放着不管了。”"
 antarctica_aac_main.34.b: "“当下才是最好的时候，”古斯曼下定决心，“必须在冬天之前重新建好！”"
 antarctica_aac_main.35.t: "打破食物链"
 antarctica_aac_main.35.desc: "文德利希、加西亚和另外两名陆战队员像幽灵一样，在风雪中从他们刚端掉的敌方据点撤了出来。那是一个深陷敌后的阿根廷补给站。滑雪板让他们行动便捷，他们在银白的雪原上滑行，洋溢着一种难以言表的从容。他们的任务是潜入敌后进行侦察，刚才端掉补给站只是捎带手的事。\n\n这个小型补给站本是附近阿根廷基地的后备堡垒，万一阵地被攻破或后路被断，部队还能撤到这里。当然，这只是理论。等陆战队搞完破坏后，这地方还不如没存在过。办完搜刮补给的分内工作后，文德利希出了个主意：把这里布满地雷和诡雷，专门破坏敌人的退路。\n\n偏远哨所无人看守不足为奇，但方圆数里竟毫无军事存在，这要么是大意疏忽，要么是兵力空虚，无论哪种，都对上校的计划有利。尽管文德利希不太喜欢这位长官，但也不得不承认梅里诺的眼光。此前的南极作战，主力都在海岸线交锋，内陆则依靠一系列静态工事进行防御。敌军深信天险无法逾越，因此这些陆地防线从未经受战火考验。梅里诺打算化天堑为通途，带队穿越冰原，直插敌人不设防的腹地。这些小股伪装部队能无影无踪地转移，轻易突破敌军漫长而稀松的防线。\n\n然而，他们最大的敌人并非阿根廷军队，而是战壕足病、失温症与冻伤。所幸，严苛的训练配合简陋却实用的冬季装备，让这些威胁得以克服。他们很快就能抵达预先藏匿好的雪地突击车，启程返回基地。任务已接近成功。"
 antarctica_aac_main.35.a: "随着行动落幕，南极食物链将迎来新的顶级掠食者——智利海军陆战队。"
 antarctica_aac_main.36.t: "繁茂墓园"
 antarctica_aac_main.36.desc: "又一艘巨轮碾碎发现号湾的冰面，缓缓驶入。在暗紫穹庐的映衬下，船影缓慢地移动着。阿图罗·普拉特捕鲸设施竣工及时，让他们赶在捕鲸季的尾声赚了一笔。如今，白昼的光芒正一寸寸地消退，每日都在缩短一个小时。最后的船队正在归航。\n\n亚克希奇看着又一具鲸尸在刺眼的灯光下被拖拽上岸。他已记不清，究竟有多少生命经历了这夜晚的献祭。确切的数字本该在他的案卷之中，但亚克希奇无心查证。他依旧会走出房间，远远近近地观察，试图辨认鲸的种类。自从有了一份图鉴，这事便容易了许多。蓝鲸自是凭借其巨硕的体型与旷世的珍稀而一望便知。此外还有座头鲸、长须鲸、露脊鲸、塞鲸。天长日久，各种鲸类的殊异之处，于他而言，已不再是教科书中的空泛描摹，而是能一眼洞穿的鲜明印记。纵使他从未见识过它们的鲜活模样。\n\n然而，捕鲸业的献祭短暂而无情。当轰鸣的锯刃撕开皮肤的瞬间，对鲸加以分辨的企图便化作泡影。赋予每头鲸独特性的印记，在喷薄的鲜血中消失殆尽。一头座头鲸与一头塞鲸，一旦化为冰冻的肉块，或变作桶中的鲸油，便再无任何分别。\n\n亚克希奇一向不管这道工序。他快步走过捕鲸人遗下的、散落着头骨与肋骨的海岸，退回那方寸天地——他的办公室里，在那里，鲸鱼仅仅是纸页上的数字。在那里，预算平衡表向他昭示着利润与前景。只要明年夏天再批一个捕鲸季，到年底他们或许就能摆脱赤字。让捕鲸队再来回一个航次，所有的预算问题都将烟消云散。再经历一季白骨遍地、血肉成泥的轮回。"
 antarctica_aac_main.36.a: "这一次，亚克希奇为之战栗的，并非眼前的困境，而是那所谓的“出路”。"
 antarctica_aac_main.37.t: "翁格利岛"
 antarctica_aac_main.37.desc: "“荒凉、遥远、不宜人居。长官，您一上岸，脑子里蹦出来的就是这几个词吧？”陆军武官开门见山地说。\n\n眼下的翁格利岛，除了贫瘠的砂石地，就只有几顶陆军测绘员扎下的帐篷。卡洛斯·亚克希奇的构想带来了滚滚财源，陆军对此自然是眼红不已，正挖空心思要在古斯曼面前露一手，好让他也松松口，给他们分一杯羹。\n\n古斯曼点了点头，武官顺势说道：“那么，倘若我告诉您，这座岛能成为阿图罗·普拉特基地外围防线的关键节点呢？”\n\n武官做了一个手势，请古斯曼和随行人员步入一顶帐篷。帐篷内挂着两幅设计草图，几名测绘员正倒在行军床上酣睡。“诸位，我为各位介绍翁格利岛的两套防御方案：一套是预警站；另一套——如果预算充足的话——则是打造一块能把阿根廷人死死挡住数日的钢铁礁石。”\n\n通过电话与下属一番权衡之后，古斯曼心中已然有了结论。"
 antarctica_aac_main.37.a: "建立预警站，可谓一本万利。"
 antarctica_aac_main.37.b: "打造要塞的机会千载难逢，应当倾力而为。"
 antarctica_aac_main.37.c: "还是把这笔钱省下来为妙。"
 antarctica_aac_main.38.t: "步入深渊"
 antarctica_aac_main.38.desc: "咚！咚！咚！一阵猛烈的敲门声将古斯曼从沉睡中惊醒。他极想继续睡下去，但他知道，肯定是出事了。他滑下床，跌跌撞撞地挪到门边。\n\n门一打开，冰冷的寒气扑面而来。门口站着他的助手迭戈，他脸色白的像鬼，眼珠充满血丝。“天呐，迭戈，出什么事了？来，进来告诉我。”\n\n迭戈走了进来，连外套都没顾上脱。他惊慌失措地说道：“是……是考廷！考廷出事了！”他定了定神，又补充道：“那里发生了叛乱。现在整个国家已经他妈到处起火了。”\n\n“我的天。”\n\n“这还不是最糟的，”迭戈说，“他们正在求援，要召回我们一半的部队。他们要召回梅里诺！”\n\n古斯曼感到一阵寒意，但这股寒意并非源自南极的空气。“没有部队……”他深吸一口气，“……阿根廷人会觉得我们不堪一击。”\n\n古斯曼的话在空气中静静地回响。他感到自己如此渺小，如此无力。弟兄们在这里付出的一切努力，牺牲心血建立的事业，全都因为一件他们完全无法控制的意外而岌岌可危。\n\n“但我不会就此放弃。”他说，“你去告诉弟兄们，都准备好。如果阿根廷人想要这片南极洲，那也得让他们付出代价。”"
 antarctica_aac_main.38.a: "古斯曼为他的最后一战做好了准备。"
 antarctica_aac_main.39.t: "未来如炬"
 antarctica_aac_main.39.desc: "晚冬时节，梅里诺上校一如既往地高踞在瞭望位上眺望远方。尽管寒风刺骨，他心中却燃起一丝乐观的暖意。金属楼梯上响起的脚步声无疑预示着他们计划中的攻势又将迎来捷报。几个月前，仿佛全世界都在与他为敌，从赤匪官僚到虫豸政客，就连天公都企图瓦解他的斗志。但梅里诺不同于那些侵蚀着智利的蛆虫。在这片小小的封邑，他将破碎的国魂精雕细琢，使其成为连自己都为之敬畏的杰作。在下方军容齐整的海军陆战队员们，身上没有沾染丝毫的堕落腐朽，他们早已超越了那些生养他们的、矫揉造作的腐烂造物。在科维安的训导下，就连新晋少校文德利希也抛却了无谓的顾虑，释放了潜藏于心的杀戮天性。一次次突袭进展神速，完美印证了上校的理论——阿根廷人的所谓“文化”，与其国防一样脆弱。梅里诺的最终胜利已经唾手可得。\n\n突然之间，一纸公文将他从云端拽回尘土。一封出自秘书处卑劣鼠辈之手的信函，带来了最致命的噩耗。尽管基地的人已涤荡了自身的腐化，但祖国却已病入膏肓。在那广阔的乡野，构成智利民族脊梁的农民揭竿而起。曾经质朴的农夫，如今竟蜕变成一场席卷一切的蝗灾，在赤色魔主的妖舞蛊惑下烧杀抢掠。圣地亚哥那群手无缚鸡之力的膏粱子弟正跪在他的脚下，一边哀嚎求援、一边用腥臭的唾液涂抹他的军靴。梅里诺曾有一瞬间想撒手不管，任他们自生自灭，但他终究明白自己的天职，更何况，阿根廷人若有异动，科维安也足以应对。眼下正值隆冬，乘船是不可能了，唯有亚克希奇手下的马仔能将他与部下空运回国。但不论如何，他都会回去。智利需要一位英雄，而他，梅里诺上校，必将拯救他垂死的祖国。"
 antarctica_aac_main.39.a: "纵使要将她碾为一滩血肉，他也在所不惜。"
 antarctica_aac_main.40.t: "往昔的负担"
 antarctica_aac_main.40.desc: "蒙蒙细雨笼罩着蓬塔阿雷纳斯，雨点敲打屋顶的节奏成了亚克希奇工作时的背景旋律。面前的纸页写满数字，而近来，这些数字传递的都是好消息。捕鲸季的利润之丰厚，是他自打开始在南极工作以来从未见过的。尽管亚克希奇很清楚这些数字是从怎样的血肉上刻凿而出的，但这并不影响结果。\n\n他终于站起身，伸了个懒腰，随手将外套搭在肩上。隔壁办公室的广播混杂在嘶啦作响的静电声中，听不清楚。亚克希奇拿起伞和帽子，这么晚回家，艾米莉亚和孩子们又该念叨了。在他再度南下之前，家人们总是巴不得能多看他几眼。\n\n电话铃声划破寂静，显得格外刺耳。亚克希奇皱起眉头。现在可是淡季，这么晚了会是谁呢？\n\n紧接着，走廊那头，铃声再次响起。两扇门后，第三部电话加入进来，然后是第四部，铃声传遍了整栋大楼。亚克希奇将听筒贴到耳边，但根本听不清对方在说什么。他反倒听见隔壁的音乐声消失在静电噪音里，继而传来一段严肃的播报。\n\n“本台紧急插播一则新闻快讯：考廷省的动乱正在迅速蔓延。”\n\n他匆匆挂了电话，以更快的速度赶回了家。第二天一早，他不顾家人的抱怨就出了门，心思全在那些虽宏大却与他息息相关的事件上。智利南部已是一片火海。那些曾与他比邻而居的人们，那些用青紫的脊梁撑起一座座庄园的贫苦农民，已经忍耐到了极限。他见过这里的世道：少数人大发横财胡吃海喝，多数人则在司空见惯的苦难中不断沉沦。他曾抱有希望，但他明白，苦难不会就此终结，只会在抗议被镇压后变得更加深重。\n\n电话为他下达了任务：他要去协助调动南极的部队——将他们从冰原上带回来，派去践踏同胞的家园。"
 antarctica_aac_main.40.a: "亚克希奇双手掩面，深深地埋下了头。"
 antarctica_aac_main.41.t: "警惕"
 antarctica_aac_main.41.desc: "亚克希奇独自站在蓬塔阿雷纳斯机场的屋顶上。一架架飞机在草地上投下长长的影子，每隔几分钟就有一架降落在跑道上。飞机呼啸而过，下方是手忙脚乱的士兵，他们正试图重整队伍；工人们则在为下一架飞机的降落做着准备。装甲车和民用巴士都被调集起来，将士兵运送到各自的岗位。真是乱成一锅粥。\n\n前一个小时，他还在听警官保证说火地岛局势已经在控制之下；后一个小时，他又听到地主们大发牢骚，说农民马上就要揭竿而起。他听到蓬塔阿雷纳斯市政厅里人们的惶恐不安，也听到社会党同僚就这场危机的未来走向展开的热烈讨论。在他脑海里，未来一片黑暗。他亲手促成的局面，潜藏在每一架飞机的阴影里。“你怎么看这一切造成的浪费？”身后传来一个声音。梅里诺上校的军靴踏在水泥屋顶上，发出清脆的声响。他抓住栏杆，俯身向前，审视着下方的部队。\n\n“浪费？”\n\n“浪费。你那糟糕的组织正在耗费宝贵的时间，每分每秒那些害虫都在扩散。”\n\n“你所谓的‘害虫’不在这里。动乱虽在蔓延，但还在北方。”亚克希奇说。趁着沉默的间隙，他点燃一支烟，看着烟雾缭绕飘散。\n\n“没错，这就是你我的区别所在。害虫就在这里。我们的国家遍布害虫，我们现在所见的，就是马克思主义这场瘟疫的恶果：一群自以为法不责众的虫豸。我们知道它的症状，也知道该如何处理这场瘟疫。可你似乎处处横加阻挠。这是为什么？”梅里诺瞥了他一眼，转身离去，“有些虫子，可比其他虫子钻得深得多。”"
 antarctica_aac_main.41.a: "烟雾缭绕，飘向天空。"
 antarctica_aac_main.42.t: "上校的卢比孔河"
 antarctica_aac_main.42.desc: "文德利希笔直地站在普拉特舰长号的甲板上，观察着眼前忙乱的景象，尝试记住新兵的面孔。他现在是少校了，受命陪同指挥官执行这次任务，必须以身作则。他偷偷向上方的栏杆瞥了一眼，只见梅里诺上校正凝视着远方，对下属们的行动视而不见，目光牢牢地锁定在雾蒙蒙的地平线上。\n\n自从他们离开瓦尔帕莱索的海军总部，接管这艘在此过冬的舰船、踏上平定叛乱的旅程以来，上校大部分时间都像这样独自沉思。\n\n但上校的神态看起来不像一个准备去镇压农民暴动的人。不，他的神色让文德利希想起了巴洛克风格的油画：一位伟大的征服者正在巡视自己的疆土。事实的确如此，上校阐述他的作战方案时，仿佛化身奥斯特里茨战役前的拿破仑，细致入微地讲解着他那套旨在击败乡野军团的精妙战略。他们将在考廷省的卡休港建立基地，然后与包括文德利希的海军陆战队在内的其余部队会合。梅里诺将率领他们深入内陆，沿途扫荡敌人的谷仓、简陋的工事和愤怒的农民。\n\n毫无疑问，上校已将此地视为他的高卢，他要在此地赢得声名与荣耀，作为下一次攫取权力的筹码。当然了，文德利希对这背后的政治博弈并不关心，也没把对手放在眼里。文德利希不仅是一名海军陆战队员，他是一件在地球最严酷之地磨砺出的武器。\n\n说实在的，一想到要面对的是一群近亲繁殖的农民，而不是阿根廷人的炮火，文德利希甚至感到一丝宽慰，让他平添几份乐观。这可能不是他们的高加米拉……"
 antarctica_aac_main.42.a: "但无论如何是一场胜利。"
 antarctica_aac_main.43.t: "大举入侵"
 antarctica_aac_main.43.desc: "在卡拉韦的乡野腹地巡逻时，文德利希很难不觉得自己像个侵略者。即使在智利冬天清冷寒冽的早晨，穿行在这片森林里也让他感到闷热难当。一排排史前的智利南洋杉仿佛监狱的门槛。历史上，这里曾无数次与土著马普切人爆发边境战争，但这片地区丝毫没有平静下来的迹象。最近大批预备役安全部队的涌入也无济于事，叛乱正一天比一天蔓延得更快。不知怎的，文德利希有些怀疑，就算杀光每一个共产党员，这片土地也永远不会被真正驯服。\n\n这次巡逻出奇地安静，连个醉酒农民的冷枪声都没有，夜幕正在迅速降临。突然，在落日的红光中，一个身影隐约出现在一丛光秃秃的灌木后面。典型的共产主义天真——叛军选择在严冬时节的五一劳动节发动起义，往日里郁郁葱葱的森林此时一片光秃。文德利希示意部队进入掩体，随即开火，那个红色分子应声栽倒在地。\n\n突然，没有一点征兆，自动步枪的火光划破夜空。游击队向黑暗中倾泻出火龙般的弹幕，但除了暴露自身位置，这番火力毫无用处。当他们的弹匣打空后，便只能坐以待毙，他们的阵地也被迅速攻占。\n\n没过多久，一切都结束了。残余的游击队员兵分两路，一路退回庄园农场，另一路则沿着考廷河向森林深处逃窜。文德利希命令手下追击……"
 antarctica_aac_main.43.a: "沿河退走的，必须牢牢守住交通要道。"
 antarctica_aac_main.43.b: "退入庄园的，不能让他们造成更大的破坏。"
 antarctica_aac_main.44.t: "河边凶兽"
 antarctica_aac_main.44.desc: "文德利希少校沿考廷河岸设伏，依稀能从激流的轰鸣声中，听到逐渐靠近的桨声。这次行动，首先要依赖的就是听觉。夜色漆黑，林间雾气弥漫，除了远方安第斯山脉在月光下露出的一丝浅淡轮廓，四周的一切都被笼罩其中。\n\n一周前，马普切叛军还敢光天化日之下运输补给和人员，放任摩托艇引擎肆意轰鸣。海军陆战队已经终结了他们这种愚蠢的幻觉。叛军现在以为躲进夜幕的掩护就万事大吉，但这帮乡下土匪很快就会知道这种想法是何等愚昧。南极海军陆战队在那座冰封地狱之中经受百般磨练，他们不仅驯服了黑夜，更征服了黑夜。\n\n文德利希用靴子在沙地上蹭了三下，示意手下收网。刹那间，机枪的火舌照亮黑暗。曳光弹的密集火网点亮了昏暗的视野，顷刻间，枪声、木板碎裂声与人的尖叫声交织四起。叛军根本没有时间还击，他们要么闯入激流，要么就在弹雨中粉身碎骨。\n\n文德利希示意手下停火。他用手电照向下方水面，看见一艘叛军小艇的残骸。\n\n船里不是一群身经百战的共产主义战士，而是几个年轻人，带着几箱本地农场的农产品，防身武器只有一把生锈的砍刀。\n\n文德利希对叛军的厌恶又加深了一层。把自己的孩子也拉进这场毫无希望的斗争中，这种行为实在卑劣。尽管如此，回想起科维安的教诲，他对眼前这场屠杀没有丝毫悔意。"
 antarctica_aac_main.44.a: "只有精准如外科手术的暴力方能实现和平。"
 antarctica_aac_main.45.t: "烈火燎原"
 antarctica_aac_main.45.desc: "局势升级。文德利希少校一路追击叛军来到附近的庄园，他本以为对方会为了不让自己的手下休息，而一把火把庄园烧光。但现实要糟糕的多。当他们抵达眼前规模庞大的庄园建筑群时，迎接他们的不是燃烧的灰烬，而是一座完好无损的堡垒和远超预期的叛军。\n\n为了守住庄园，叛军把兵力铺得太开，这让海军陆战队得以逐一清除独立房屋和谷仓的叛军据点。叛军很快就意识到了自己的错误，庄园中心的大钟响起，警示着居民四散奔逃，像遭遇洪水的老鼠一样从屋子里蜂拥而出，退回形如堡垒的宅邸，身后还跟着手无寸铁的土著工人。追击叛军本不困难，但现在却不得不逐屋巷战，攻势随之停滞。\n\n文德利希躲在华丽餐厅的一张桌子后，一周前他才刚和年迈的庄园主在此一同赴宴，那位先生现在恐怕已经死了，为自己几十年来对马普切工人的残暴行径付出了代价。隔壁房间传来枪声和痛苦的尖叫声，让文德利希无法静下心来。他们本该是智利文明的最后防线，可照这样下去，这帮不知从哪冒出来的野蛮人就要替阿根廷人完成任务了。文德利希拿起对讲机，下令全员撤出房屋。他带队撤离，俯身躲避枪弹，一块刷着白漆的木片飞来，深深扎进了他的脸颊。\n\n部队在一辆翻倒的拖拉机后重新集结，一名手下跑到他面前大喊大叫，抗议撤退，嘴里喷出血沫。文德利希注意到他紧攥的手里，一枚狗牌在闪闪发光。少校用一句上气不接下气的话，让所有部下都安静了下来。“我们……没有……撤退。”接着，他下达了命令。"
 antarctica_aac_main.45.a: "“拿火把来。”"
 antarctica_aac_main.46.t: "有东西在外面"
 antarctica_aac_main.46.desc: "怪物是真实存在的，奎德尔很清楚这一点。\n\n在他短暂的人生里，父母曾一次次试着安慰这个年幼的马普切男孩，却从未成功。无论他在林子里看到多少黑影晃动，或是在旧谷仓里听到多少吱嘎的脚步声，黑暗中其实什么都没有。真正的恐怖是残酷的庄园主和腹中的饥饿，但他们的族人世世代代顽强地对抗着这些挑战，未来也会如此。怪物不存在，它们不会来抓你的，父母曾这样一次次地向他保证。\n\n他们错了。\n\n奎德尔和父亲蜷缩在森林边缘的小木屋里，能听到低语声和咔嗒声一秒比一秒更近。自从那些怪物从林子里钻出来，将他们世代居住的农场烧成一片焦土后，他们已经逃亡了好几天。那些东西一路向北追到另一处避难所，又在那里寻觅到了新的牺牲品。奎德尔在溜走时听到的那种湿漉漉、咯咯作响的惨叫，暗示着一种比死亡可怕得多的命运。\n\n第二天早上，母亲死于痢疾，这或许算是一种仁慈，至少让她免于落入那些东西的魔爪。有传言说，一些朴实的农民被拖上了它们的船，在不见天日的船舱深处遭受了难以言喻的恐怖折磨。\n\n声响越来越近，父亲从满是泥污的裤子里掏出一把小左轮手枪。“它们再也伤害不了我们了，”他喃喃自语，一边抚摸着奎德尔的头，举起了枪。就在这时，透过窗户，奎德尔看到了它——一道扭曲的黑影，嘴角咧开一道弧度近乎人类不可能做到的缺口，露出成百上千颗磨尖的利齿，正淌着涎水，准备将又一个牺牲品囫囵吞下。"
 antarctica_aac_main.46.a: "怪物来了。"
 antarctica_aac_main.47.t: "接通线路"
 antarctica_aac_main.47.desc: "房间里的气氛，倒也算不上完全的无线电静默。古斯曼一边摆弄无线电、更改着参数，一边神色黯然地想。电台里传来低沉的噪音和模糊的杂音，偶尔还会响起一阵高频的、有节奏的信号，表明某处还有用户在线。联系上阿德莱德岛的希望支撑着教授，但他有一种不祥的预感：前哨站恐怕已经没人能应答了。他记得很清楚，最初几次联系不上的时候，没几个人在意。当古斯曼第一次提出他的担忧时，一名军官还插嘴说：“一套二十年前就过时的设备，你还能指望它们怎么样？”这话也不全错，类似的事情过去也发生过，而严酷的冬天只会雪上加霜。\n\n望着窗外弥漫的浓雾和飘落的雪花，教授不禁打了个寒颤。他知道，如果阿德莱德岛上的人员真的出了事，他们根本没法提供任何帮助。冬季的严寒将该岛与南极洲其余的智利营地彻底隔绝，眼下所有机动力量均已调回本土，即便有人愚蠢到胆敢挑战大自然，也不可能发起任何救援行动。\n\n但，这个季节，本就不会有哪个傻瓜会去尝试靠近阿德莱德岛，古斯曼面色凝重。可情况正变得愈发堪忧。若是至少有架飞机能飞临上空侦察，或是有艘船能抵近并派出调查分队……或许他的担忧是杞人忧天，但古斯曼不愿心存侥幸。\n\n他郁闷地得出结论，眼下只有梅里诺有能力调集资源，组织起这样一支队伍。无论他内心多么抗拒，他都需要梅里诺的帮助。教授伸出手，再次调整电台参数，将频率对准了梅里诺的私人频道。或许他会为此刻的决定而后悔……"
 antarctica_aac_main.47.a: "……但还有其他选择吗？"
 antarctica_aac_main.48.t: "身处兽穴"
 antarctica_aac_main.48.desc: "上校走下楼梯，每踏出一步，靴子都发出碰撞金属的铿锵之声。空气中的寂静让梅里诺感到一丝不安，他更习惯从船只和船员们日常的喧嚣中获得慰藉。他指挥普拉特舰长号已有好几年了，这艘船在斯尼佩岛战争中英勇对抗阿根廷的侵略。她是复仇和征服的利器，现在却沦落到去抓叛徒。也许这正好反映了现状；就像她的指挥官一样，她也在清理这个臃肿病态的国家吐出的污秽。梅里诺提醒自己，这就像他无数次提醒自己一样，这种差事只是一时之需。\n\n抵达普拉特舰长号深处的目的地，上校拉开生锈的舱门，刺耳的金属摩擦声让他皱了皱眉。还没等他看清屋里的情况，一股熟悉的人体排泄物气味就夹杂着潮湿、腐臭的空气扑面而来。房间里只有一盏灯，忽明忽暗。房间中央，站在一张扭曲的小金属椅子旁边，是厨师那张英俊的脸庞。“我们来了条新货，上校。我猜这条鱼会比上一顿更嫩。”\n\n梅里诺抬手示意那人闭嘴。“把这些猴子脑袋里那点有限的情报都给我榨出来，赶紧离开这鬼地方。要是你不能尽快查出他们那些同伙都躲在哪个臭水沟里……哼，我相信电工有办法让他们开口。”厨师点点头，把梅里诺的目光引向角落里蜷缩着的可怜虫。那小玩意活像个粗糙的仿品，在污秽中瑟瑟发抖。上校厌恶地撇了撇嘴，想到这些卑贱的玩意儿，居然能让他曾经伟大的国家屈膝蒙羞。确实，要是不尽快行动的话……"
 antarctica_aac_main.48.a: "他们会把上校也拖下水。"
 antarctica_aac_main.49.t: "废墟伊甸"
 antarctica_aac_main.49.desc: "卡拉韦小城中，咖啡馆已经没剩几家了，可梅里诺上校还是为其中一家店的餐点所惊艳。这家小店自然是清空了所有闲杂人等，上校一人独占露台，一边喝着免费的1939年雪利酒，一边心满意足地看着林荫道上的景象。整个小镇一片废墟；瓦尔迪维亚地震把这些乡下人好不容易搞起来的基建都震没了，接着的暴动又把剩下的一切毁得七七八八。即便如此，上校还是沉浸在这片纯粹的寂静里。以前这里到处都是游手好闲的流浪汉，现在只有零星几个购物的人在忙着自己的事，小心翼翼地避开那些“贵人”的目光。海军陆战队的介入，给这片地方带来了久违的宁静，可能比最早的土著民在安第斯山脚下搭泥屋那会儿还要平静。他闭上眼睛，往后一靠，沐浴午后的阳光……\n\n突然，一阵老旧发动机的突突声和刺耳的尖啸，把他从美梦中惊醒。梅里诺猛地坐直，下意识地去摸腰里的枪，然后才看清来人是谁。一辆锈迹斑斑、冒着黑烟的破车里，坐着文德利希少校。“你个军官开这破玩意儿干什么鬼事！”梅里诺怒吼道，差点就想当场掏枪出来毙了那个海军陆战队员。\n\n“抱歉打扰您，上校，阿图罗·普拉特基地有紧急消息。他们跟阿德莱德岛失去联系了。古斯曼教授命令您立刻回去。”上校的嘴唇不悦地撇了撇，脑子里飞快地闪过各种可能性：是不是共产党兵变？阿根廷人打过来了？还是驻军那几个脑残尼安德特人，把无线电当成晚饭加餐了？都有可能。"
 antarctica_aac_main.49.a: "不论发生了什么，上校都会确保有人为此付出代价。"
 antarctica_aac_main.50.t: "上膛出航"
 antarctica_aac_main.50.desc: "“考廷省‘秩序有效恢复’，部长称……”\n\n亚克希奇看到这里，胃里一阵翻腾，一股酸水涌上喉咙。他皱着脸，仰头把那股恶心硬压了下去。等他再低头时，手中的报纸已经被揉作一团。让他反胃的，不是那标题，也不是文章内容。而是那些被刻意掩盖的。\n\n那些没在广播里播，没在报纸上登，却在人群中口耳相传的消息。军队在考廷滥杀无辜的狂欢。那些消失的马普切定居点的名字。那些偷偷运出来的照片，里面是累累的坟墓，是亚克希奇曾发誓要保护的人们排成行的尸体。他到底做了什么？不过是把士兵送过去，给刽子手装上子弹，然后……\n\n一阵风吹过他的脸，没有带来丝毫安慰，却至少把他拉回了现实。阿图罗·普拉特站上空的黄昏天空泛着淡淡的蓝色，海岸线边的建筑在朦胧的雾气中投下深沉的阴影。新竖起的无线电塔将闪烁的红光映在水面上，和他眺望的方向相对。\n\n这只是不断扩张的捕鲸基地里新增的众多设施之一。“考廷大屠杀”的暴行传得很快，但没有哪个流言能比南极洲新兴捕鲸业的消息传遍智利港口的速度更快。“这一次，”古斯曼对亚克希奇说，“他们终于在谈论我们了。”\n\n从经济上看，答案只有一个：更多的设施，更多的基地和储存空间。既然利润摆在那里，为什么不把权宜之计变成长期生意呢？人人都在追逐，岂能坐视待之？更多的船，更多的捕鲸人，更多的媒体关注，更多的钱。刀刃沾满咸腥的血。\n\n灯光穿透薄雾，刺眼的白光扫过亚克希奇，他不禁畏缩起来，双腿一软，跌坐在海湾边的一块礁石上。船只的灯光在浮冰和起伏的山丘上跳动：本季的捕鲸船已经抵达，它们是如此饥渴。"
 antarctica_aac_main.50.a: "他挣扎着迈出步伐，前往港口迎接来者。"
 antarctica_aac_main.50.b: "他回到自己的房间，让屠夫们自己解决晚上的活计。"
 antarctica_aac_main.51.t: "不祥之地"
 antarctica_aac_main.51.desc: "情况不妙，油然而生的刺骨寒意侵袭着梅里诺全身。晨雾熹微中，阿德莱德岛的轮廓渐次显现，其冰清玉洁的绝美，却与风中传来的如泣如诉的哀嚎，格格不入。与这座偏远前哨的联络早在数周前就已断绝。\n\n果不其然，古斯曼既无胆略，又乏智谋，压根不敢亲自下令出征，而是坐等梅里诺把脏活累活都干完。整个前哨站就在那鼠辈的眼皮子底下人去楼空，也只有他能干出来这种事，梅里诺刚听说时差点笑出声。然而那点幽默瞬间冰消瓦解，被一种夹杂着无力感的愠怒所取代。\n\n春天的到来，只是让这趟穿越冰海的旅程勉强成行。危机仍无处不在。船行得很慢，远远慢于梅里诺的预期。普拉特舰长号在漆黑的水面上踽踽独行，如同一个胆怯的孩子在幽暗的走廊里摸爬滚打，而冰山则像幽灵般从水中凝视着他们。前哨站早该察觉到他们的到来，但眼前毫无生机：没有船只的踪影，没有求救的信号，唯有一片死寂。\n\n梅里诺取出望远镜看向海岸，建筑和防御工事的剪影清晰可见，但它们没有发出任何光线。居民们要么早已凶多吉少，要么就是剩下的人不想暴露。他们马上就要大难临头了，还没人能从他眼皮底下溜走。他非把干这事的家伙逮到不可，然后……嗯，正好拿他在考廷动乱练就的手段来试试。\n\n当梅里诺放下望远镜时，他注意到文德利希正在他身旁耐心地等候。“长官，交通艇已准备就绪，我们可以按您的命令派遣一支侦察小队上岸。”\n\n“不必了，少校。”梅里诺凝视着前方的岛屿说道，他的声音几乎被呼啸的风声吞没，“我去看情况。”"
 antarctica_aac_main.51.a: "“……亲自去。”"
 antarctica_aac_main.52.t: "无人生还"
 antarctica_aac_main.52.desc: "刚踏上阿德莱德岛，上校就一脚踩进了一个满是冰的水坑。距离越近，那种诡异的空虚便愈发强烈，那怕是在南极基地，空气中也弥漫着死一般的寂静。看上去空无一人的海滩，在这暮冬时节也不过是稀松平常。\n\n梅里诺抬头望去，中央居住站被烧得焦黑的墙体即使隔着浓雾也依旧清晰可见，甚至还能隐约看见一个巨大的破洞横亘在墙面之上。这没什么出人意料的，冻原干燥的气候之下，火灾隐患本就挥之不去；他也不排除是民事人员引发事故的可能，但梅里诺是先可亲自调遣了精锐部队，还制定了一套严密的巡检演习计划啊。自己的部下竟然是这样一帮酒囊饭袋，实在是有点匪夷所思。\n\n当陆战队沿岸展开警戒时，他突然发现这里竟毫无防御设施。明明几个月之前他就已经下令部署舰炮和防空炮台，还要建造纵横交错的壕沟网络了。鉴于南极行政机构的无能早已超出掌控，他不得不考虑一下他们是不是单纯忘了自己该干嘛了——对这帮蛆虫来讲，躲在木屋里瑟瑟发抖比执行命令更符合他们的天性。即便如此，他也期待着他们至少能装装样子，而非彻彻底底地混吃等死。\n\n看向远方，梅里诺注意到了基地的那座无线电塔——那个此刻正守望着整座岛屿的钢铁哨兵。他们没准曾试着让无线电讯息跨越凛冽的寒风，尽管此举在这种天气下无疑愚蠢至极，但基地也从不缺蠢货。不过，尽管希望如同大海捞针，广袤的内陆依旧将自己的秘密深埋于心。海洋亦是如此，它指挥浪涛卷走其中的一切，但仍有少数幸运儿能被其垂青。陆战队员们满怀期待，等待指令。而他则示意队伍开始工作——还有不少事儿等着做呢……"
 antarctica_aac_main.52.a: "……如果他们还想探明阿德莱德岛的命运的话。"
 antarctica_aac_main.53.t: "烬与雪"
 antarctica_aac_main.53.desc: "斧刃从门板的裂缝中利落抽出。陆战队员再次挥砍，寒光一闪，随着裂隙绽开，燃烧的木块簌簌滚落。梅里诺上校上前一步，用力一踹，整扇门应声碎裂。\n\n“跟上。”他向身后的队员发号施令，迈步跨过了门口的灰堆。他们头顶支离着扭曲的金属与梁木，道道破口透入微光，卷着漫天飞雪。焦黑的墙垣间，犹有余火在丝丝蔓延。\n\n第一具尸体蜷缩在墙角，皮肤皲裂，身上覆着一件曾是夹克的破布。他仅存的一只手臂向前伸出，指甲深陷墙皮，肌肉与脂肪层早已萎缩干瘪。梅里诺俯视着他在阿德莱德岛上遇见的第一个智利人。在灰烬如云雾般的笼罩下，他踉跄地踏过一堆堆焦黑的积雪。交错的手臂与腿脚从四面伸来，成堆的尸体都在绝望地爬向某个出口。在迷宫般的走廊里，他们与满地的燃灰余烬别无二致，唯有那微红的焦皮肤色，以及僵硬口腔中珍珠般白皙的牙齿，格外显眼。他清点着每一颗狰狞的头颅。阿德莱德岛上的居民大多数都死在了这里，在浓烟充斥肺叶的黑暗中，他们相互践踏、挣扎爬行。\n\n梅里诺的军靴陷进一团软物中，他顿时咬紧了牙关。伴随着撕裂声与一声闷响，梅里诺的脚踩了个空，他踏穿了某具尸体的焦黑肋骨。当他从尸骸的胸腔中用力拔腿时，干脆的皮肉发出令人心悸的碎裂声。陆战队员的手电光线掠过梅里诺毫无血色的脸，照进前方宽敞的空间。更多的尸体堆砌在墙角，有些甚至连褴褛的碎布都未能留下，大火在他们沉睡时入侵，猝不及防。然而，另一堆尸首的烧伤却相对较轻。他们或瘫软在地，或斜倚墙沿，姿态不像走廊里那些扭曲挣扎的躯体一般痛苦，倒显出近乎安详的模样。是醉倒了吗？还是……已然接受了命运？"
 antarctica_aac_main.53.a: "梅里诺拒绝接受任何臆测：“全体注意，别光愣着，开始搬运尸体。我们需要仔细检查。”"
 antarctica_aac_main.54.t: "雪与烬"
 antarctica_aac_main.54.desc: "文德利希与队员们行走在阿德莱德岛嶙峋的岩石上。晴空万里，耳畔唯有队员们的脚步声与风的呼啸。说实话，离开了这么长时间，如今又能回到南极，他内心甚是欣慰。南极虽是一片不毛之地，但与考廷叛乱的残酷纷扰相比，这里俨然是一处人间天堂。更何况，他心底早已将这里当成了家。他想念昔日的战友，想念此地的风光，也想念自己曾经挥洒的每一滴汗水。\n\n然而，此次归来的境况却不甚理想。他此行是奉命来调查近期发生的火灾，并查明驻守人员的具体下落。平心而论，他觉得这趟任务无异于痴人说梦。如此规模庞大的岛屿根本无法彻底搜查。再者，文德利希认为，没人能在那么大的火里幸免于难。\n\n他正准备下令撤离。可当他刚刚侧过身子，眼角余光便瞥见异状，远处竟有一个脚印。他走近查看，又发现了另一个。他立刻抄起无线电："
 antarctica_aac_main.54.a: "“梅里诺上校？我们发现有脚印通往岛屿腹地。长官，请指示。”"
 antarctica_aac_main.55.t: "残毁基地"
 antarctica_aac_main.55.desc: "梅里诺戴着手套，双手插兜，下巴微微颤动。他此时有些摸不到头脑，调查也无从谈起，上校歪着头，瞪着阿德莱德岛主设施废墟对面半埋在雪中的灰色楼房：这是驻站的无线电楼，与其他建筑毫无二致……除了那座突兀消失了的尖塔。\n\n他和两名陆战队员持枪环绕建筑，踢开积雪堆，打着手电筒四处检查：不仅尖塔消失无踪，就连金属破片甚至电线残丝都找不到。梅里诺和部下交换了一下眼神。自伯德首次踏上南极冰原以来，无线电塔便遍布这片大地，以电波为链条，串联起孤立的各个基地。若是没有无线电，现代人类对最后边疆的探索便无从谈起。 \n\n那么，阿德莱德岛的驻站人员为什么要自割双耳？梅里诺脑海里浮现的第一个词就是“疯癫”，因为只有疯子才会自断舌根。他抬头凝望远方的海平线，暮色正同冰冷的海涛一同退去，留下熹微的余光。或许，唯有南极的黑暗、辽阔、孤独，才能让人萌生自挖双眼的念头。\n\n上校走到门前，上手用力一推，门板哐当坠地。是共党渗透人员？还是阿根廷破坏分子？抑或两者皆是？梅里诺冷笑着踏入烧得焦黑的走廊，他看来，这两方都还不够格。难道说，这里的人们已被自杀式的布尔什维幻想腐蚀了心智？梅里诺暗自发誓着要查明真相，径直走进通讯室：椅子倒翻在地，等候着早已毙命的无线电操作员；桌子断成两截，收发器烧作一团，电线裸露，如同缠结的肠子般散落一地。真相已然摆在梅里诺眼前："
 antarctica_aac_main.55.a: "他们根本没有呼救的机会。"
 antarctica_aac_main.56.t: "真相刺目"
 antarctica_aac_main.56.desc: "上校再次沿着海岸线巡视，透过无情拍打着护目镜的寒风，他正看着部下把补给和露营装备一箱箱地卸下来。\n\n看来这次行动没法合某些人的心意早早结束了——这儿绝对有蹊跷，他们必须留在阿德莱德岛直到谜团解开。况且，士兵们也需要在严酷的天气下多历练历练。\n\n登上高地，他极目远眺，无垠波涛映入他眼帘；他差不多能想到阿根廷人就潜伏在附近的水域里，用自身的存在无声嘲弄着他。倘若当初按照他的计划行事，这里本应成为坚不可摧的堡垒。脚下高地视野优良，如果架设舰炮，来袭船只便可尽收眼底。\n\n这帮猪头是怎么漏掉这么显而易见、这么……\n\n轰然一声，梅里诺沿山坡滑落，跌进下方坑洞，年迈的关节撞上粗粝的砾石，传来阵阵剧痛。护目镜碎裂的脆响传入他双耳，坠落也随之戛然而止。一枚锋利的金属碎片刺入其中，距虹膜仅有几毫米。\n\n他心有余悸，小心翼翼地摘下已毁的护目镜，穿过刺眼的寒气，清晰地看见嵌入其中的军用钢片。"
 antarctica_aac_main.56.a: "也许阿德莱德岛并不想他想象的那样热情好客。"
 antarctica_aac_main.57.t: "上校的厄尔巴岛"
 antarctica_aac_main.57.desc: "梅里诺上校沿着阿德莱德岛的海滩徐徐行进，敏锐地察觉到了空气中的变化。尽管寒气多少的差异微不可闻，但对深谙极地环境的他来说，意识到夏天来临并非难事。\n\n不论这里曾发生过什么，一切都绝非偶然，这点自他踏上这里时便了然于胸。不管是谁想要草草掩盖这里的真相，他们都严重低估了梅里诺，误以为他会蠢到对眼皮子底下的证据视而不见——未焚化的尸体、仓促填平的战壕，无不向人宣告这里曾发生过一场大规模冲突。\n\n太多人在与他交手时犯了同样的错误，并为此付出了代价。事实上，他能来到这要多亏了这种轻视，肉食者们误以为只要把梅里诺流放到这南方苦寒之地，就能冻得他提前退休。\n\n瞧瞧，多天真啊。如同凯撒征战高卢、拿破仑远渡埃及一样，上校也会在这儿证明自己。他同样会征服这片大陆，把古斯曼、阿根廷人还有那帮共党贱种赶到海里去。而当他迎接命中注定的凯旋时……嗯，一切皆有可能。\n\n就在那一刻，不管是出于运气还是命运的安排，上校瞥见了沙子中间的某个东西：是水上飞机的残骸，应该是海浪冲上岸来的，被打了好几个弹孔，海水从中流出——但是，阿德莱德站根本没有这种飞机，它一定来自外部势力。\n\n线索正浮出水面；不久后，他就会让一切水落石出，然后离开这座荒无人烟的小岛，带着真理的炽焰，重返阿图罗·普拉特站……"
 antarctica_aac_main.57.a: "没有什么能阻挡他。"
 antarctica_aac_main.58.t: "又一具无名尸体"
 antarctica_aac_main.58.desc: "小艇在波涛中急转，与流冰擦肩而过。探照灯的光束从黑暗中掠过，梅里诺上校目光所及之处，尽是恣意漂浮的硕大冰块。直到颈部的疼痛难以忍受，呼啸的狂风刺得他睁不开眼，他才转向同伴，牙齿打颤地问道：“出发有多久了？”\n\n“四个小时，长官。”\n\n阿德莱德岛的峭壁沿着海湾拔地而起，阿图罗·普拉特号全副武装的上层建筑长影般紧随其后。探照灯在前方跳跃舞动，梅里诺正协助两名陆战队员把渔网从水中拽进小艇。里面空无一物，梅里诺眼神空洞，同自己的手下互望一眼。这几个小时里，除了自己湿透的袜子和血丝密布的眼球，他一无所获。“继续向前。”他的命令没有改变，第一片雪花此刻掠过他的脸颊。\n\n轰鸣声自耳边传来，他们减速驶过一处参差不齐的浮冰。它属于曾在冬季环绕岛屿，而现在早已四分五裂的冰架残骸。梅里诺深知，倘若当初在岛上的是自己，定会死战不退。至于其他人，他猜测他们多半会试着穿越冰层，从而逃出生天。但这里却没有尸体。“这儿，”梅里诺顺着陆战队员手中电筒的光路，指向被照亮的深渊——同样空空如也。但是，另一侧正拖拽着渔网的陆战队员却突然发出一声惊呼：“网卡住了！”\n\n众人冲过去，拼命向上拉扯。梅里诺双手交叠，哈了口气，血液重新涌入发青的指尖，双手也握的更加紧密。一只诡异扭曲着的手缓缓浮出水面，接着是一具布满了红紫交织的色块、如同胎儿般蜷缩的僵硬尸体。他们费力解开渔网，却只能看见一张肿胀到无法分辨的脸。梅里诺看向他的手下——刚才打捞时他们还两眼放光，而此刻头盔、围巾和兜帽之下的面庞都已面无血色。“掉头，”他下令，“我们回船上去。”"
 antarctica_aac_main.58.a: "梅里诺透过倒影与自己对视。而水面之下，还有多少双眼睛虎视眈眈？"
 antarctica_aac_main.59.t: "可怖的发现"
 antarctica_aac_main.59.desc: "文德利希收到命令后，便沿着先前发现的踪迹不断深入岛屿腹地的荒凉地带。每向上攀行一步，利刃般的刺骨寒风就割过他的面颊。眼见太阳即将沉入地平线，他暗自祈祷能尽快有所发现。\n\n他嘴角浮起一抹浅笑。祖父母总说当年他们上学时，每天都要赤脚踏着积雪翻越山坡。如今文德利希虽不用赤脚，却暗忖祖辈的跋涉想必比此刻的征途轻松得多。所幸他早已做好万全准备。他从未如此感激在海军陆战队服役时由科维安传授的登山训练。\n\n当他终于爬上山坡时，他看见小径的尽头倒伏着一具躯体。他一个箭步冲上前去，用枪给这具冰冻的躯体翻了个面。\n\n死者身着阿根廷军装，上面开了两个弹孔，这无疑是智利部队还击时留下的。伤口上还有简单的包扎痕迹——看来子弹没能杀了他，至少没当场带走他的命。疑惑自文德利希的内心中升起：这人已经中弹，为何还要深入腹地？他暗自思忖着，这可怜虫莫不是被抛弃了？\n\n不论如何，这都是个重大战报。他立即向梅里诺发出无线电："
 antarctica_aac_main.59.a: "“上校，我们发现了……一名阿根廷士兵的尸体。重复，我方领土内发现了一名阿根廷士兵的尸体。”"
 antarctica_aac_main.60.t: "覆水难收"
 antarctica_aac_main.60.desc: "在由梅里诺那逼仄的房间组成的临时调查中心里，普拉特舰长号轻微的摇晃难以察觉。头顶刺眼的灯光下，阿德莱德岛的可怖收获密密麻麻地铺满了整张海图桌：定居点焦黑残骸的照片、姿势令人发毛的尸体、海中遗体的尸检报告、阿根廷水上飞机的残片，以及最无可辩驳的铁证——那块从阵亡阿根廷士兵制服上取下的布片。\n\n梅里诺、文德利希和科维安弯腰围观着证据，从这些线索中拼出了一个惊悚的真相。“火灾只能解释一部分，”文德利希指着照片里烧焦的残骸，陈述道，“但说不明白为什么燃烧区以外也会有尸体，更别提他了。”他的手指紧接着指向那片破布。\n\n梅里诺指节泛白，紧紧攥着桌沿。“阿根廷佬，”嘶吼声与恶毒的诅咒一道，自他嗓中传出，“那几条臭蛆居然像杀牲口一样屠杀我们的人！”\n\n他的拳头猛地下砸，震得桌上物品左摇右晃。“突袭、抵抗、牺牲……接着就是信口雌黄！这群懦夫还打算焚毁证据，亵渎死者！”他的眼神突然坚定起来，“至于古斯曼……那个龟缩在阿图罗·普拉特站的胆小鬼文书，他对这一切都心知肚明。那些零零散散的报告明明都送到了他眼前，他却对此置若罔闻！任凭阿根廷孽畜闯入我国领土，屠杀我国同胞，还帮他们掩盖罪行！”\n\n一道道指控如同毒雾，凝结在狭窄的空间内。在梅里诺看来，这罪行远超失职，简直就是里应外合，与叛国无异。这多年来的管理不当、漠视军方，最终酿成了此种苦果。他缓缓挺直腰杆，胸中的震惊被冰冷的熊熊怒火取代。他的目光离开证据，转向文德利希，再扫过科维安。三张阴沉的面孔共同映出一个可怕的认知：这游戏该换个玩法了。"
 antarctica_aac_main.60.a: "真相灼目，却也冷若冰霜。"
 antarctica_aac_main.61.t: "火与冰"
 antarctica_aac_main.61.desc: "上校很少在这苦寒之地感到炙热，但如今熊熊怒火却在他心里架起了一座火炉。他把接收器狠狠砸到地上，青筋暴起，胸膛紧绷，怒焰咆哮。他他妈早该知道！又是阿根廷人，回回都是他们！这群畸形的杂种又他妈来了。想不到这帮懦夫竟然对智利最薄弱的环节——阿德莱德岛下手。\n\n但至少还有一件事能让梅里诺稍感宽慰：就像谚语里说的那样，他们自以为此行轻而易举，犹如从稚子手中夺走糖果，殊不知这糖果中却布满砒霜与刀片。显而易见，拉普拉塔猴子低估了智利守军的战斗意志，最终血流成河，无力驻守该岛。在别人上战场彼此弯弓月时用蒙骗、欺诈和信口雌黄来背后捅刀子，这就是阿根廷鼠辈的天性——不然他们整这一出干嘛？上校对这种伎俩见的多了，一眼便识破了他们的计谋。\n\n不幸的是，能有这么多老鼠倾巢出动，只能说明阿根廷人往智利基地里安插了内鬼。那些布匪败类要么对此早有预谋，要么就是蠢到连最简单的进攻都没法预料。他们早晚得付出代价——若梅里诺如愿，他们就会被拉去五马分尸、大卸八块。\n\n胸中的炽热骤然消失，取而代之的则是刺骨的寒意。这就是他苦苦等待的良机啊。一个计划瞬间从他的心中萌生。他已有充分理由去逮捕亚克希奇、古斯曼等人，手握着足以镇压抵抗的兵力。\n\n哦，这感觉棒极了。他想象着古斯曼那张猴脸上得意洋洋的笑，在见到上校从考廷发现的新奇玩意后消失得无影无踪的样子。接着，梅里诺收起表情，重新变回那个冷峻的专业军官，挺直脊背，整理衣领……"
 antarctica_aac_main.61.a: "……并准备掷出命运之骰。"
 antarctica_aac_main.62.t: "南极纷争"
 antarctica_aac_main.62.desc: "“简直和当年一模一样。斯尼佩岛之战，还有瓜分南极洲，我们都只能一退再退。”\n\n古斯曼的手缩在手套里，止不住地颤抖。从任性的捕鲸工人到电工，整个阿图罗·普拉特站的人都挤在食堂里。简报会拖沓得让人煎熬，寂静笼罩着全场。新施瓦本崩溃的速度远超所有人的预期，数千人就此被拖入惨白的深渊之中。德国佬和OFN没完没了地交火，把战线从非洲延伸到这世界的尽头，新的旗帜正插遍这片大陆。\n\n战争、饥荒和核末日的阴影笼罩在每个人的心头，他们心中的疑问只有一个：阿根廷人下一步要做什么？“眼下他们不会有动作，”古斯曼断言，“毕竟巴西舰队就在他们屁股上看着。”\n\n“教授，梅里诺上校知道这事儿吗？”一个身着制服的水兵挤开人群问道。\n\n“我们……不清楚。”他抹掉额头的冷汗，“通讯中断了。”随即又爆出一连串追问——智利海军会出兵吗？智利该怎么应对巴西和乌拉圭的领土主张？我们会重蹈新施瓦本的覆辙吗？此刻，整个世界似乎都准备要为冰原上的几块地盘而倾泻鲜血。"
 antarctica_aac_main.62.a: "一场让斯尼佩岛之战都相形见绌的冲突要来了。"
 antarctica_aac_main.63.t: "阿德莱德的幕后黑手"
 antarctica_aac_main.63.desc: "“一场屠杀。”古斯曼觉得自己发出的声音听起来是那么地陌生，显得轻飘飘的，似乎随时都有可能会彻底消散。他最亲密的同僚都在他的办公室里，无人能对他的判断提出异议。\n\n古斯曼曾一度希望报告有误，或是在某些地方含混不清，但残酷的现实就这样明晃晃地摆在面前：毫无疑问，阿根廷又一次袭击了阿德莱德岛，基地连同所有住民都惨遭荼毒。\n\n“搜救行动尚未结束，”一名身着军装的助手说到，“但此时还能找到幸存者的可能性……”\n\n“这不像是莱亚尔的手段，”古斯曼低声思忖着说道，所有人的目光骤然聚焦于他，他惊觉方才的失态，随即补充道，“不合逻辑。南纬90行动需要大量的物资资源，他不会浪费在这样毫无意义的袭击上。”\n\n“我们这是在同情敌人吗，胡利奥？”古斯曼没有回应亚克希奇，后者的笑容僵在脸上，哼了一声，“或许吧，袭击是某个莽夫头脑发热，莱亚尔并不知情。”\n\n古斯曼点点头，他明白梅里诺也可能会这么对付阿根廷人：“或许吧。”\n\n“要是莱亚尔没能回来，我们恐怕就不得不对付那个莽夫了。”\n\n 古兹曼的胃部一阵痉挛，在他任内又有更多智利人丧生，失败接踵而至。他向上帝祈祷，但愿这一切的流血终有一日能换来些什么。"
 antarctica_aac_main.63.a: "疑云骤起。"
 antarctica_aac_main.64.t: "麻烦的邻居"
 antarctica_aac_main.64.desc: "驻站领导层聚集在阿图罗·普拉特站最大的会议室里，讨论着有关东京金融危机的消息。虽然新闻传到地球尽头的速度不算快，但震荡的到来已在眼前。\n\n听取完简报后，古斯曼双手交叠，支起下巴，问道：“那我们西边的邻居会受什么影响？”\n\n更关键的问题他并没有问出口，那就是智利南极领地是否会面临入侵的威胁。亚克希奇率先作答：\n\n“关键在于日水集团。这家财团自创立以来就把日属南极当成他们的游乐场，甚至把手伸到我们的海域里，严重损害了智利捕鲸业的利益。”\n\n古斯曼嘴角浮现出一抹浅笑：“看人倒霉心里美啊？”\n\n“正是。”亚克希奇接过话头，“但我们仍然要谨慎，昭和基地此时的决策基本无法预料。如此危机……实在是前所未见。”\n\n“困兽犹斗，最是凶猛。”古斯曼总结道。会议室陷入窒息一般的寂静，狂风呼啸着拍打着屋顶，“看起来，从前闻所未闻的事情正渐渐成为我们的日常。不过对英勇的捕鲸船员们来说，或许这是个好消息。”"
 antarctica_aac_main.64.a: "敬敌手的不幸。"
 antarctica_aac_main.65.t: "共度清晨"
 antarctica_aac_main.65.desc: "门外响起敲门声，惊醒了亚克希奇垂下的眼皮。古斯曼的身影映入眼帘，一瞬间，亚克希奇猛地弹起身，脑中闪过上百种危机的可能，喀哒一声关掉桌上的收音机，叫道：“胡利奥——”\n\n“早上好……或者该说下午好？每年这时候都分不清。”\n\n两人同时看表，相视而笑：此时仍是清晨。古斯曼望向窗外，漆黑的天幕仍然笼罩着大地。他转过身来，一点不客气，瘫在了亚克希奇对面的椅子上，后者的眉毛不由紧紧蹙起。\n\n亚克希奇旁边宿舍的人偶尔路过时会往屋里瞥一眼。起初，他们只能看见两位同事神情严肃地分坐在桌子两端；谈了一个小时之后，古斯曼从公文包里摸出一瓶威士忌，又一次惊到了亚克希奇；再一个小时之后，两位好友已经趴在桌边开怀大笑，比拼着谁被梅里诺上校辱骂得更狠毒。\n\n“那家伙，是个小丑。”亚克希奇轻描淡写地说着，又灌了一杯。\n\n古斯曼回以轻笑：“他很危险。”\n\n两人顿时沉默。亚克希奇扯了扯衣领，又跟古斯曼喝了一杯：“胡利奥，我媳妇要是知道咱俩在干啥，现在肯定气坏了。喝这么多，对肝不好，要是还能回家，一定得跟她道歉。”他们就这样坐在桌边，等着梅里诺的黑影从黑暗中浮现，又不由羡慕起米兰达和比利亚罗埃尔的长途旅行。他们举杯，为两位外交官，遥祝华盛顿的斡旋会议一切顺利；他们举杯，悼念阿德莱德站的遇难者们，也为又一个前途未知的年岁；最后，他们举杯相碰，祝彼此未来的人生安然无虞。"
 antarctica_aac_main.65.a: "无论未来发生什么，他们都要共同面对。"
 antarctica_aac_main.66.t: "等待明日"
 antarctica_aac_main.66.desc: "墙壁和屋顶不断传来敲击声。靴子踏出的急促节奏震得阿图罗·普拉特站阵阵发颤。机械师们如同西西弗斯一样劳作，维修着寒冬带来的破坏。电工们忙着驱散极夜的黑暗，而无线电操作员则致力于维系着基地与外界的脆弱联系。厨房端上热腾腾的浓汤，日益扩张的捕鲸规模则害得工人们的膝盖深陷在咸腥的血液里。\n\n工作量比往年冬季大的多，全得归功于今年特殊的情况。在军营里，一个消息经水兵的嘴传了开来。\n\n“阿德莱德岛，”低语传遍基地，“那里沦陷了。”\n\n众人目光转向窗外。电灯嗡嗡作响，灯光徒劳的穿过雪幕，除此之外便是不见五指的漆黑。有人在床顶小声嘟囔道，这恐怕就是阿德莱德岛遇袭前的景象吧。水兵们凝视着黑暗，而黑暗也用它那金属般冰冷的眼神回望他们，眼神冷峻如阿根廷人的枪管。\n\n时不时就有人说他们看到了刺刀的寒光，或是在雪地上发现了可疑的脚印。有关阿根廷军队在黑暗中游荡的报告几乎天天都会被送到古斯曼的办公桌上，但始终没能证实。阿图罗·普拉特站警觉地盯着灯火与无边夜幕的交界处，等待着永远不会来的袭击。“明天可能就来了。”它暗自默念，然后继续守望。\n\n除了等待别无他法——等待死亡，或等待春天。"
 antarctica_aac_main.66.a: "不管哪个先来。"
 antarctica_aac_main.67.t: "秘密的钦佩"
 antarctica_aac_main.67.desc: "空酒杯散落在办公室各处，古斯曼摇摇晃晃地坐在椅子上，又灌下一杯烈酒。这不是个酗酒的好夜晚，战争与血腥的气息正如影随形，阿德莱德岛的传言在他的脑海中盘旋，如同冬天卷起的阵阵寒风。\n\n阿图罗·普拉特站需要一位能干的领袖，他一边如是想着，一边摸索着房间里的小柜子深处。智利需要头脑清醒的统帅、需要能阻止阿德莱德岛这样的事件再次发生的人，而不是梅里诺那样半野生的猿猴。古斯曼笑出了声，看来上校的用词也在渐渐渗透进他的思维之中。\n\n古斯曼从柜子里摸出一封信，这封信已经严密地藏匿了好几个月，是他与莱亚尔上校的往来密函。\n\n除却多年的暗中往来之外，古斯曼对莱亚尔的了解几乎是一片空白，但尽管如此，他却对这位堂吉诃德式的阿根廷人产生了几分好感——阿德莱德岛事件玷污了这份情谊。他怀疑，袭击并非是莱亚尔策划实施，他和自己一样，都不得不应对本国暗中筹划战争行为的疯子。因此，两人之间的交流对话反而更显重要，他们曾就两领地之间的和平计划取得过一些进展，磋商边界调整与非军事化的事宜。\n\n笔友的南极探险启程之后，书信戛然而止。古斯曼对和平的追求永不停歇，但边境那一头的局势似乎日渐动荡，和平遥不可及。\n\n当然，智利国内也没好到哪里去。梅里诺和他的同伙嚎叫着要血债血偿，古斯曼仿佛成了唯一一个能挽救未来的人。教授手指不自觉地用力，捏皱了手中的信纸，想到了信件泄露可能引发的严重后果，第一次萌生出了焚毁密信的念头。但最终，他只是又喝了一口威士忌，将信件封好保存——连同信中……"
 antarctica_aac_main.67.a: "对更美好明天的希望。"
 antarctica_aac_main.68.t: "一个好兵"
 antarctica_aac_main.68.desc: "普拉特舰长号在冬日寒冰的包围下吱呀作响，明明距阿图罗·普拉特站仅剩数英里路程，却被锁在海冰中，动弹不得。南极海洋无边无际、坚不可摧，犹如一间苍白监牢，将船只牢牢禁锢。文德利希少校站在甲板上，呼出的气息顷刻间就凝结成水雾，萦绕在他那张不安的脸上。水手们在舱内低声抱怨，数周的停滞让他们坐立不安，但在文德利希心中，更阴暗的海流正在翻涌——梅里诺的阴影如同一团庞大且躁动的乌云，笼罩在他的心头。他目睹了上校的怒目，听过他对古斯曼的毒舌谩骂。他知道风暴要来了。\n\n他紧握栏杆，职责与内心激烈交锋。宪法令他忠于法律，效忠古斯曼摇摇欲坠的统治，但命运却将他于梅里诺栓在一起。文德利希对这个张扬且残忍的混蛋颇有微词——但阿根廷的尖牙利齿和美洲国家组织的摇摆不定却让智利陷入了黑暗时代——没准她正需要梅里诺的铁腕。但这个念头却让他心生厌恶。由这种力量造就的怪物，他已经见识的够多了。\n\n考廷河畔的惨状不请自来——在闷热潮湿的丛林，马普切人的鲜血沾满了他的手。他的陆战队员们精密且冷酷的屠戮叛军，但惨叫声却挥之不去：农民和孩童被拖走，或是面临更残酷的遭遇。他遵守梅里诺的命令，而罪恶感啃噬着他的内心。现在支持他？怕是只会发生更多暴行。\n\n冰川低语，嘲弄着他的犹豫。对法律的职责、对军衔的忠诚与考廷河畔的亡魂正在胸中激烈碰撞。梅里诺的力量既能拯救他们，也能将他们投入万丈深渊。文德利希迎风吐了口痰，咸涩与悔恨的味道涌入口中。他将服从，一如既往——同时他也将注视这一切，思考自己还能承受多少鲜血。"
 antarctica_aac_main.68.a: "一个士兵的誓言。"
 antarctica_aac_main.69.t: "最后的晚餐"
 antarctica_aac_main.69.desc: "普拉特舰长号的餐厅像个狭小的闷罐子，空气里满是水煮羊肉的膻味和陈腐烟草的浊气。坚冰封锁了航路，拖慢了他们返回阿图罗·普拉特基地的航程。梅里诺上校正佝偻着背，用叉子戳着锡盘里那滩灰色的烂糊。他对面的科维安将身板挺得笔直。房间里只有餐具碰撞的叮当声，直到梅里诺的咆哮将其撕裂。“操蛋的冰——把我们困在这里动弹不得，圣地亚哥那帮满脑子屎的野种却在喝着小酒。我们迟了，科维安——我们他妈的迟了啊。”\n\n他的声音里带着一贯的恶毒，阿德莱德屠杀的创伤仍未痊愈——那些虫豸屠戮智利同胞，践踏国家主权。但他往日的锋芒已然消磨殆尽，在海上困守数周之后，他的骂声都显得有气无力。他推开盘子，眼神闪烁。“我真想开着这破船直接撞过去，管他妈的政变呢。古斯曼就是又烂又瞎的老古董……这么干能行吗？延误这么久了……也许整个计划根本就是白忙一场。”\n\n科维安的目光坚定不移，语气低沉而平稳：“不，上校。冰层是在考验我们。古斯曼正在动摇——阿德莱德之事就是证明。您就是智利需要的利刃。这是您的道路——此时此刻，您必须果断出击。我的忠诚永远属于您。而且，海军陆战队，”他微笑道，“也已准备就绪。”\n\n梅里诺哼了一声，喉咙里发出一阵干涩的笑。“你这个人真是太好懂了，科维安。忠诚得像条狗，天真得也像条狗。但你说得对。我们将冲破坚冰，然后拧断古斯曼的脖子。”他抓起一瓶皮斯科酒，高高举起。"
 antarctica_aac_main.69.a: "“为了阿德莱德。”"
 antarctica_aac_main.70.t: "脚踏实地"
 antarctica_aac_main.70.desc: "古斯曼坐在办公室里，翻阅着又一沓文件，签署新的指令，一遍又一遍地计算着基地的储备物资……他做着这一切，只是为了不去想几千公里外正在发生的事情。\n\n随着美洲国家组织开始就智利对南极的领土主张展开辩论，他多年规划的成果正命悬一线。通常，教授会放心地将计划的命运交到能干的下属手中，但兹体事大，让古斯曼猛然发现，意识到自己能掌控的其实微乎其微。\n\n这让他不寒而栗。\n\n尽管他做了万全的准备，但大国间的博弈并非一人之力所能左右。历史的引擎碾磨着它巨大的齿轮，驶向无人知晓的明天；从原子到地缘，亿万个微观层面的决策，最终汇成一股无人能够参透的因果洪流。这一切的一切，早已超出了他的掌控。\n\n于是，他转而专注于那些自己尚能掌控的事物。比如，他刚刚计算出来的富余燃料配给。就这样，只要他笔尖一划，整个基地就能再明亮那么一点点。温暖和光明，由他们仁慈的主宰所提供。在历史的宏大棋局中，古斯曼教授的分量轻于蝼蚁，可是在阿图罗·普拉特这里，情况大不相同……"
 antarctica_aac_main.70.a: "在这里，他就是上帝。"
 antarctica_aac_main.71.t: "机遇之地"
 antarctica_aac_main.71.desc: "比利亚罗埃尔和米兰达在华盛顿国家广场上漫步。纪念碑的影子挡不住夏日的炎热，潮湿黏腻的空气让他们浑身是汗。尽管此处有着新古典主义的宏伟，但很少有人记得华盛顿其实是建在弗吉尼亚的一片沼泽地上的。比利亚罗埃尔不禁心想，这湿乎乎黏答答的倒也贴切。\n\n“我说朋友，这可不是你保证的新鲜空气啊。”他一边擦着额头一边说，“我宁愿回酒店酒廊里多吸几口二手烟，也不想待外头被大太阳晒。”\n\n米兰达轻笑起来。“我想要的不是呼吸新鲜空气，朋友，是让脑子透透气。我感觉再多看一张图表，我就要中风了。”\n\n“不想中风，所以你就决定让自己中个暑？”比利亚罗埃尔打趣道，“希望等会议开始的时候，你讨价还价的本事能更高明些。”\n\n两人的玩笑话，并未掩盖他们对未来几天怀有的那份紧张期盼。他们都清楚，此次会议事关重大，是一场宏大外交行动的决胜时刻。但两人对即将到来的挑战毫无惧意；他们穷尽一生磨炼外交手腕，不只因为他们擅长，更因为他们享受其中。\n\n这样的时刻，便是这份工作的精髓所在：一个凭借言语的力量，在一个国家的命运上烙下自己印记的机会；一个在纵横捭阖之间，于史书上为自己博得一席之地的机会。而且毕竟，无论会议结果如何，智利的主张是获得承认还是被束之高阁，至少他们二人……"
 antarctica_aac_main.71.a: "……将携手面对。"
 antarctica_aac_main.72.t: "世界舞台"
 antarctica_aac_main.72.desc: "时钟滴答作响，与比利亚罗埃尔在地图上指示的敲击声完美同步。当他结束对极地前沿理论缺陷的又一轮阐述时，数百名美洲国家组织代表目光低垂，齐刷刷地投向他的方向。他竭力把这些法律术语转化成有力论据，试图去说服那些最多算是三心二意的外交官们认同智利的主权宣称，但这也不过算是外交战场的九牛一毛罢了。说到底，这场展示也不过是供外人审视的默剧，方便外交官们装出一副关心智利论点中那些技术细节的样子。\n\n实则不然，真正的外交博弈往往上演在会场外的走廊上、在烟雾缭绕的酒店套房中、在布满油水的握手里。会场内的不过是必要的虚构情节，维系外交体面的基本礼节——让世人相信外交根植于逻辑与辩论，而非权利与金钱。哪怕如此，比利亚罗埃尔仍乐于参演，一如他迄今为止做的那样。\n\n就在此时，加拿大外交官的提问打断了他长篇大论的叙述：“若我理解无误，智利代表竟声称十六世纪教宗颁布的《托德西利亚斯条约》，要比现代国际法律更具合法性？要知道，绝大多数我国同胞都对教皇在多数事务上的权威并不买账，为何我国偏偏要对此承认？”\n\n当聚光灯重新聚焦在比利亚罗埃尔身上时，他眼中瞬间闪过一丝亮光——他就是为此刻而生的啊。好戏开场了。“诸位，这问题相当好。该条约的核心要素并非教皇的权威，而是我方坚实的历史权利——这些权利恰恰构成了国际法中领土主张的根基。正如您所言，我们的权利已持续行使了半个世纪，”他一边说，一边把画布翻到下一页，“现在请诸位审视这张图表……”"
 antarctica_aac_main.72.a: "于是，演出继续进行。"
 antarctica_aac_main.73.t: "这是我们的国土"
 antarctica_aac_main.73.desc: "最后的辩词陈述完毕，最后的异议被礼貌地驳回，某种寂静笼罩着美洲国家组织的会议厅，唯有纸张的窸窣声与偶尔的咳嗽声敢于打破这种寂静，令人不禁感到紧张。在米兰达和比利亚罗埃尔看来，此刻便能决定其成败，是连月不懈努力的集中体现——从无穷无尽的会议，到对法律和历史依据的精雕细琢，再到细致入微的外交博弈。此决议关乎国际社会能否承认智利对其南极领土的主权。\n\n主席敲响木槌：“现就决议进行表决，该决议依据所呈文件详述的史实与法律依据，承认智利共和国对南极区域的主权宣称。”\n\n会议厅内低语四起，各国代表纷纷表明立场。米兰达悄然在桌下握紧双拳。而比利亚罗埃尔则整了整眼镜，目光紧紧锁住主席台。赞成票、反对票、弃权票——每一张票都将决定他们能否完成使命，决定他们一直为之奋斗的事业能否实现。\n\n计票过程漫长的似乎无穷无尽，直到最后，主席举起了他的木槌：“依据投票结果……通过决议。”\n\n会场内响起低沉的掌声。米兰达和比利亚罗埃尔短暂对视，目光中充满释然之情。这是一场外交胜利，尽管它低调无比，却依旧意义重大。纯粹无暇的喜悦如浪潮般席卷两人。所有的夙兴夜寐、激烈争论以及不懈努力——在此刻终获回报。"
 antarctica_aac_main.73.a: "“恩里克，我觉得吧，今晚咱俩得好好整瓶皮斯科酸酒。两瓶也行。”"
 antarctica_aac_main.74.t: "美利坚之手"
 antarctica_aac_main.74.desc: "一阵疲惫涌上米兰达心头。他揉了揉太阳穴，瞥向一动不动的比利亚罗埃尔，对方嘴唇紧抿，脸上隐约可见一丝苍白，折射出两人心中共同的感觉——绝望。他们为此付出的所有努力——连月来往返于拉美各国首都的奔波、无休止的会议、精心雕琢的论据、迷人的微笑和坚定的握手——都在华盛顿付之东流。含糊其辞的回答、客套但空泛的承诺——所有的迹象都导向同一个结论：他们拿不到票。\n\n木槌自主席手中落下，在表决前保持安静的要求自他口中说出。一想到接下来要怎么去和古斯曼教授传达这个噩耗，米兰达的胃就止不住地翻腾……\n\n“……依据投票结果，以多数票……通过决议。”\n\n主席的话语犹如一道惊雷，直直命中米兰达，惊得他猛然抬头。比利亚罗埃尔僵在原地，不敢相信耳中话语。通过？怎么可能？惊讶的低语在会议厅蔓延开来，显然部分代表也对此困惑不已。\n\n最初的震惊消逝的无影无踪，姗姗来迟的释然之情席卷了他们。他们成功了！比利亚罗埃尔的笑容在脸上绽放，米兰达深吸了一口气，才发现自己刚才惊讶的连喘气都忘了。或许他们的努力仍未白费？\n\n就在此时，美国代表走到他们桌前——这个高挑自信的男子脸上始终挂着一抹和善却深不可测的笑容。“可喜可贺啊，诸位，”他声音温润平稳“亲眼目睹正义得以伸张，实在是令人欣慰。”他眨眨眼，嘴角微扬。“就当这是……一种善意的表示吧。我们都是朋友，不是吗？朋友间就应当互帮互助才对。相信你们不会把这段情谊抛诸脑后的。”\n\n他微微颔首，转身离去，留下米兰达和比利亚罗埃尔。他们并非取得胜利，而是被人赐予胜利。两人都通晓这美国谚语的精辟洞见……"
 antarctica_aac_main.74.a: "……天下可没有免费的午餐。"
 antarctica_aac_main.75.t: "重返世间"
 antarctica_aac_main.75.desc: "透过清晨的寒雾，哨兵率先将其发现——一艘停泊在港湾之中的船。他从战壕里坐起，勉强看清它的轮廓：那是阿图罗·普拉特号，它包裹在浓雾之中，向远处投下一道暗影。\n\n阿德莱德远征军的上校已多日杳无音讯，不少人怀疑陆战队员们已重蹈了那座孤岛基地的覆辙，也有不少人暗自庆幸上校和他的海狼们没准再也没法来捣乱了。哨兵发出信号，询问他们的情况，却只能听到杂乱的静电声。\n\n之后他们出现了，身着一袭白衣，如同幽灵横渡冥河般掠过波涛。登陆时，人们才发现他们并非历经长途跋涉归来的欣喜水手，而是直指防御工事的入侵者。\n\n防线两侧互相投来困惑目光，有人转头直奔基地而去，有人则缓步上前迎接新来者。陆战队员们向前推进，稳固阵地，从未放松一丝警惕。有人试图询问他们：岛上怎么了？上校呢？为什么回来不提前通报一声？\n\n回答他们的只有对方墨镜后深邃难测的虚空，以及一声冷酷的命令：保持镇静，放下武器。不安如同瘟疫般蔓延全军，有人忿忿不平，其他人则怯懦服从。\n\n就在此时，哨兵看到了他。这群虫豸的统帅离开舰艇，在海滩上站起——不，拔地而起。他仅仅只是踏出一步，地面变如同地震般颤动，脚步声震耳欲聋，仿佛夹杂着末日审判的怒火……"
 antarctica_aac_main.75.a: "梅里诺上校回来了。"
 antarctica_aac_main.76.t: "晨间决斗"
 antarctica_aac_main.76.desc: "古斯曼靠在椅背上洋洋得意，洋洋得意，任由亚克希奇吟唱关于季度收益的动人旋律。一切终于步入正轨了。\n\n他接手时，这基地还混乱不堪、濒临破产、内忧外患害得它摇摇欲坠。而他则凭借自己的聪明才智与决心，把这片废墟打造成了一个高速旋转的机器。倘若亚克希奇对于捕鲸收获的报告确有其事，或许不久后这机器还能开始盈利。\n\n突然，办公室的门被猛然撞开，让他兴致全无。当他正因为被打断而大为光火时，从士兵上气不接下气的嘴里传来的事实则把他惊出了一身冷汗。梅里诺来了……毫无征兆……现在正突破基地防线。\n\n古斯曼猛地起身，紧握外套，而亚克希奇则恭恭敬敬地跟着他。他迅速钻到桌下，摸出钥匙，打开一个铁盒子。一把崭新的手枪静卧其中，已经上膛却从未开火。将其藏进外套后，古斯曼大步走出办公室。\n\n一群人跟在他屁股后面，士兵和平民混杂其中。倘若梅里诺早一年这么做，阿图罗·普拉特站的居民不会有丝毫怨言。但如今他们早已尝过古斯曼宏伟计划的甜头，亲眼看到了这条路尽头闪烁的名利之光。现在无论发生什么，阿图罗·普拉特站都不会不战而降。\n\n他希望说服上校回心转意，但外套里冰冷的金属触感却提醒着他：从此刻起……"
 antarctica_aac_main.76.a: "……没有事能被确定。"
 antarctica_aac_main.77.t: "久别重逢"
 antarctica_aac_main.77.desc: "身上的热量完全没法抵御这股刺骨的寒意，这种低温哪怕是放在这片荒芜大陆都称得上世所罕见。然而整个基地此刻却屏息凝神，呆呆地注视着眼前的两位巨人。文德利希瞥向一侧，看见梅里诺上校正竭力压制怒火，免得他把脚下的积雪融化殆尽。在他身后，一排陆战队员举枪戒备，那股决绝仿佛他们正准备迎接一场生死之战。但他们枪口所向之处，只站着一个再普通不过的人。古斯曼裹在他那蓬松厚重的大衣里，怎么看都算不上个威胁。若说梅里诺是一锅沸水，那古斯曼就像是温暖的炉火——诱人、无害，却依旧灼热烫手。身后的人至少是陆战队员的三倍，神情同样坚定不移。\n\n“你看上去冻坏了，朋友，不如咱俩边喝点白兰地边谈？”古斯曼把手搭上梅里诺肩头。上校一把打开他的手，勉强维持着职业军人的素养。\n\n“古斯曼……先生，我奉命逮捕你，罪名是危害共和国及其人民。你蓄意将阿德莱德岛的士兵出卖给敌人。请你自首并随我回船接受军事法庭审判。”\n\n“亲爱的上校，恕我不知您在说什么。毕竟，那些勇士的安危，本就应由作为军事联络员的您来负责。不过，这些事我们大可以回基地再谈。想必这场灾难也并非您本意。”古斯曼咧嘴笑道。梅里诺差点掏枪对他开火，他用自己气得发抖的手指指向文德利希。\n\n“少校，若遭遇反抗便立即拘捕此人，必要时可使用武力。”古斯曼对文德利希会心一笑。陆战队员放下枪，走向两人……"
 antarctica_aac_main.77.a: "……就在这时，文德利希也打定了自己的主意。"
 antarctica_aac_main.78.t: "只要正义得胜，哪怕天崩地裂"
 antarctica_aac_main.78.desc: "文德利希手持步枪，靠近两人。陆战队员的靴子踩得积雪嘎吱作响，他呼出的热气在寒风中凝结成白雾，梅里诺的命令——“立即拘捕此人”仍在他耳畔回响。古斯曼脸上的笑容渐渐褪去，目光在与文德利希交汇时流露出一丝认命之情。“没必要动武，上校。”他平静的语气中带着一丝疲惫。他把手深入大衣，摸出一把崭新的手枪甩向一旁。枪身在冰面上滑行，沉闷的撞击声划破寂静。\n\n梅里诺双手垂落，笑容狰狞，嘶哑道：“好伎俩，你这没种的老东西。你把阿德莱德岛出卖给那帮猪猡——现在你也得步他们的后尘了。”古斯曼盯着他，眼睛一眨不眨。\n\n“步他们后尘？谁该为这负责人们心里有数，梅里诺。”文德利希心中踌躇，手铐在掌心晃荡，胃里翻江倒海。他厌恶梅里诺的恶毒，但军令如山，不容违抗。他咔哒一声给古斯曼铐上手铐，声音清脆如法槌敲响。\n\n亚克希奇举手上前，紧攥账簿的倔强瞬间熄灭。“这太疯狂了。”他低声嘟囔，但文德利希巧妙的避开他的怒视，把他也铐了起来。\n\n梅里诺低吼着逼近：“少校，把他们押上船，闹剧该结束了。”人群中爆发了一阵骚动——有人发出嘘声，有人畏缩后退，而陆战队员们则控制了局面。文德利希强压怒火，听命行事。"
 antarctica_aac_main.78.a: "秩序得以恢复。"
 antarctica_aac_main.79.t: "还有你吗，马润？"
 antarctica_aac_main.79.desc: "陆战队员放下枪，走向两人。文德利希的靴子踩得积雪嘎吱作响，他呼出的热气在寒风中凝结成白雾，梅里诺的命令——“立即拘捕此人”仍在他耳畔回响。古斯曼脸上的笑容始终平静且坚定。记忆如潮水般袭来——梅里诺的命令、叛军的惨叫，还有他手上沾染的鲜血。够了。他猛然转身，枪口上指，准星对准梅里诺胸口。“放下武器，上校，”他的嗓音低沉而坚定，“到此为止了。”\n\n梅里诺双眼圆瞪，怒火迸发，“你这两面三刀的黄鼠狼，吃屎吧你！科维安，把这虫豸抓起来！”他双手如同疯了般颤抖，唾沫星子四处飞溅。身后的陆战队员们一头雾水，枪口摇摆不定。科维安踏步上前，面容冷峻如冰，声音锋利似刀，“少校，请你三思，这是叛变……是叛国。”但文德利希不为所动，目光紧紧锁住梅里诺，“梅里诺才是唯一的叛徒，他曾与我们所有人一样宣誓效忠于宪法。让开，不然我开枪了。”\n\n陆战队员们犹豫片刻，随后——便将枪口缓缓指向梅里诺。科维安牙关紧锁，忠诚与生存在他脑中天人交战，直到最后，他也把枪口对准了上校。梅里诺如同脱缰野兽般歇斯底里地咆哮：“你们这帮胆小如鼠的瘟猪！我要扯断你们的脊梁，一群阿根廷的野狗人渣！只有我才能拯救智利！”他嗓音嘶哑、眼球抽搐，吼叫着扑上前，却在十几个黑洞洞的枪口前僵住。\n\n古斯曼松了口气，后撤一步：“收收声吧，上校。把枪放下。”文德利希双手颤抖，枪口却稳如磐石。"
 antarctica_aac_main.79.a: "秩序得以恢复。"
 antarctica_aac_diplo.1.t: "始于足下"
 antarctica_aac_diplo.1.desc: "外交部\n\n发自：外交部长阿图罗·马施克\n\n主题：委派驻乌拉圭南极安全事务特使\n\n批准米兰达与比利亚罗埃尔提出的计划。将拨付合理范围内的机票、住宿及生活费用。另将提供津贴用于采购外交事务所需物资及服务。\n\n外交特使目标：争取乌拉圭公开声明支持智利对南极的主权宣称。\n\n与乌方官员谈判时应重点考虑以下事项：\n\n1.乌拉圭近期刚与阿根廷签署条约，划定两国沿乌拉圭河的边界。这一系列条约基于其现任外长奥梅罗·马丁内斯·蒙特罗1961年的工作成果。乌方忌惮激怒阿根廷。\n\n2.马丁内斯外长对美国在拉美的影响力极为警惕，必将要求我方保证美国势力不会插手本次谈判。\n\n3.乌方南极宣称长期受制于德国势力。尽管我方难以改变这一现状，但对其宣称的承认或可为互相承认铺平道路，不过此举可能激怒德国。\n\n本次任务将于五月底终止。"
 antarctica_aac_diplo.1.a: "收到这份命令后，比利亚罗埃尔同米兰达握了握手。"
 antarctica_aac_diplo.2.t: "犊注甚高"
 antarctica_aac_diplo.2.desc: "飞机降落在卡拉斯科国际机场，米兰达和比利亚罗埃尔皆是兴奋难抑。他们的计划已被采纳，现在他们终于有机会为改善智利南极地区的处境而大展拳脚了。\n\n然而，要说两人不紧张，那肯定是假话，因为他们在这次谈判中的对手，是经验丰富的海军谈判专家奥梅罗·马丁内斯·蒙特罗。他们都研究过他近期与阿根廷的谈判，此人显然是个谈判老手。\n\n马丁内斯开着一辆政府专车，在航站楼外与两位智利外交官会面。他笑容和蔼，眼神却锐利而睿智。从他挺拔的仪态中，不难看出军旅生涯的印记。两人上车，“欢迎来到蒙得维的亚，”他一边说着，一边驾车驶离了路边。\n\n“能来是我们的荣幸。”米兰达说，“有劳您亲自驾车前来，实在感谢。”\n\n“应该的。两位饿了吗？”\n\n“饿坏了。”比利亚罗埃尔说。\n\n“我知道城里最棒的阿萨多烤肉。”马丁内斯笑容灿烂。\n\n“来份牛排自然是再好不过啦。”米兰达说。\n\n马丁内斯拍了拍手：“那今晚咱们就来顿大餐！公事留到明天早上再说。”"
 antarctica_aac_diplo.2.a: "让酒宴开场吧！"
 antarctica_aac_diplo.3.t: "外交包围"
 antarctica_aac_diplo.3.desc: "马丁内斯外长为到访的米兰达和比利亚罗埃尔各自端上了一杯茶水。\n\n办公室的窗户敞开着，凉风徐徐吹来，晨光在地板上投下慵懒的影子。\n\n“好了，”马丁内斯手中翻阅着文件，说道，“研究了你们的材料之后，智利南极主张的法律证据的确更站得住脚。但依照现实情况来看，阿根廷似乎无意放弃斯尼佩岛之战时占领的领土，而且他们也有实力支撑其主张，我国政府也不希望采取任何可能危及近期与阿根廷达成的条约的行动。”\n\n“我们非常清楚，”米兰达抿了一小口茶，回应道，“我们没有计划用军事手段收复领土。”\n\n“正如您所言，”比利亚罗埃尔开口补充，“阿根廷不仅占领着我国领土，更有能力发起武装对抗，我们提议……发起包围网，通过争取美洲国家组织成员的支持来形成统一阵线，从而向阿根廷施压。要是全美洲都站在对立面，阿根廷也不得不来和我们讲道理了。”\n\n马丁内斯凝视着两人，若有所思地用茶匙搅着杯子，随后说道：“你们二位可真是对雄心勃勃的搭档，但是切莫操之过急，打草惊蛇。你们的计划或许可行，不过我国政府需要更切实的保证。贵国在此期间，不会对阿根廷采取任何诉诸武力的行动。”"
 antarctica_aac_diplo.3.a: "“我国会取消海军陆战队的演习以展示对和平的诚意。”"
 antarctica_aac_diplo.3.b: "“撤除水雷应该能在一定程度上避免冲突。”"
 antarctica_aac_diplo.3.c: "“我们当下无法做出调整军事战略的承诺。”"
 antarctica_aac_diplo.4.t: "许诺"
 antarctica_aac_diplo.4.desc: "午后迟来的午餐会之后，米兰达、比利亚罗埃尔、马丁内斯三人的谈判磋商转移到了大会议室，双方各增派了一名副手参与会谈，议题也转向了马丁内斯个人关切的核心症结。\n\n“我需要美国不会介入的保证。”马丁内斯强调，“他们不应当干涉这一事务，美洲国家组织完全有能力处理拉美的南极领土主张问题，不需要OFN来插手。”\n\n“您十分清楚历史事实，”米兰达说道，“美方曾支持我们对奥伊金斯地的主张，但枪声响起时就全都成了空话。斯尼佩岛之战后，智利与美国有关南极事务的接触日益冷淡，他们无意协助我们保卫现下的领土，更无意帮助我们夺回失地，遑论采取军事手段。”\n\n“关键时刻，”比利亚罗埃尔接话，“扬基佬就溜之大吉，我们之间早已经是过去式了。”\n\n马丁内斯点头，说道：“既然如此……那我需要一份明确的书面声明，需要有人现场见证、确认签署。”"
 antarctica_aac_diplo.4.a: "“发一封联名通电，登在《纽约时报》上，声明特里尼蒂半岛属于拉丁美洲的关切事务，这样应该就可以了。”"
 antarctica_aac_diplo.4.b: "“我们会用使馆的渠道暗中交流，表明我们不需要美国干涉，有能力自行解决自身的问题。”"
 antarctica_aac_diplo.4.c: "“非常遗憾，我国承受不起和美国对抗的代价，铜矿出口对智利实在过于重要。”"
 antarctica_aac_diplo.5.t: "相互保证"
 antarctica_aac_diplo.5.desc: "夕阳西沉时，谈判终于画上了句号。过去整整一个月里，所有人都在埋头研究地图、宣言、主权主张乃至各种更加晦涩难懂的文件，最终的结果悉数汇聚于这场最后的会议。\n\n谈判过程冗长拖沓，二十余名外交官、制图师、速记员挤在会议室里，空气中充斥着污浊的烟草味道。\n\n“盯着地图上这些小点点看，我都感觉自己快瞎了。”马丁内斯叹息着说道，全场一阵轻笑，“现在是最后一项了……我国政府提议，两国相互承认双方对南极的领土主张。我方领地现正处于纳粹威胁的占领之下，我们明白，除非全球局势发生巨变，否则这片土地恐难回归。但无论这段时间要多久，我们都亟需国际社会支持，否则我国的主张就终将湮没进历史的尘埃之中。”\n\n“我也是同感，”米兰达回应道，“但拥核超级大国和好战的邻邦又是截然不同的的。正如您所言，南极存在纳粹势力，这与我国利益的关联远比与贵国紧密得多。”\n\n马丁内斯微笑着说道：“确实是到谈判瓶颈，该轮到我们加码了。智利需要什么条件才会支持我国的领土主张？”"
 antarctica_aac_diplo.5.a: "“我们对美洲国家组织的巡回外交才刚刚开始，乌拉圭若是美言几句，就能帮上我国的大忙了。”"
 antarctica_aac_diplo.5.b: "“两国互相承认领土主张能让帝国主义者明白，局势正在逆转。”"
 antarctica_aac_diplo.5.c: "“如果乌拉圭未来能收回南极大陆上的领地，我国将会正式予以承认。”"
 antarctica_aac_diplo.5.d: "“我们已经在应对阿根廷的威胁了，再加上德国就实在是捉襟见肘了。”"
 antarctica_aac_diplo.6.t: "北方邻国"
 antarctica_aac_diplo.6.desc: "外交部\n\n发自：外交部长阿图罗·马施克\n\n主题：委派驻秘鲁南极安全事务特使\n\n委派外交官米兰达、比利亚罗埃尔前往秘鲁利马，以争取国际社会对智利南极领土主张的承认。外交部已包租一架洛斯塞里略斯机场的飞机，计划于本月初启程。\n\n与同乌拉圭的磋商相同，本次外交行动时限仍为一个月，应于八月底之前完成谈判事宜。\n\n与秘鲁官员谈判时需着重考虑如下事项：\n\n1.秘鲁坚持维持对阿根廷的中立立场，可能需要某些保证才能促使其在南极事务上与我方保持一致。\n\n2.秘鲁亦有意建立某种形式的南极存在，但其既无能力、也无契机实现。秘鲁对南极条约的立场留有余地，可以酌情就相应事项作出承诺。\n\n3.无论如何，秘鲁都不希望在任何方面激怒日本，因此关键在于说服其相信我国没有损害日本利益的意图。"
 antarctica_aac_diplo.6.a: "出发利马。"
 antarctica_aac_diplo.7.t: "鸟瞰"
 antarctica_aac_diplo.7.desc: "米兰达和比利亚罗埃尔正飞越秘鲁首都利马的“新城”，脚下千万灯火闪烁，映照着头顶的夜空繁星。\n\n这片一望无际的棚户区源于秘鲁全国农村人口向城市的大规模迁徙浪潮，成千上万的人追寻着更美好的生活，最终落脚于此，与智利“蘑菇镇”的兴起历程颇为相似。\n\n专机降落在利马-卡亚俄国际机场，随后，外交官们搭乘一辆简朴的小轿车前往市中心的下榻酒店。城市中央，优雅的欧式建筑渐次排列；反观城市四周，棚屋杂乱无章地堆砌在沿海沙漠和山丘谷地之间，描摹着令人绝望的景象——二者之间的对比不可谓不鲜明。\n\n“你觉得秘鲁会比乌拉圭难对付吗？”比利亚罗埃尔问道。\n\n“你我一起研究过的。”米兰达回答道。\n\n“我是说，亲身到了地方之后，你直觉如何？”\n\n米兰达点起一根烟，沉吟片刻，说道：“我认为我们有机会动摇他们的中立立场，至少是在南极事务上。”\n\n轿车停在酒店门前，两人得稍作休整，接下来一个月的工作必然是场硬仗。"
 antarctica_aac_diplo.7.a: "若是敌人，那他的立场不言自明；但要是中立，谁知道他的真实想法呢？"
 antarctica_aac_diplo.8.t: "主导权"
 antarctica_aac_diplo.8.desc: "在托雷·塔格莱宫的一间会议室里，米兰达和比利亚罗埃尔展开随身携带的地图，铺在了秘鲁外长加里多面前。\n\n二人深知，他们在这次会谈里占据着主导地位。相较于乌拉圭外长，加里多在南极事务上几乎就是个新兵蛋子。\n\n然而，秘鲁在名义上也依据极地前沿理论对南极提出了主权主张。理论上说，秘鲁海岸线正对南极大陆，因此宣称拥有与其海岸线经度相对应的一小片南极大陆——并且恰好与智阿两国的争议区域重合。\n\n“似乎没有太大的意义，”加里多说道，“为一片人迹罕至、毫无用处的土地耗费这么大的心力。”\n\n“人迹罕至，或许如您所言。”比利亚罗埃尔回应道，“但绝非毫无价值。南极大陆对南锥体地区的安全至关重要，这里还有世界顶级的捕鲸渔场，更是多项科学探索研究开展的唯一场所。”\n\n加里多坐下，靠在了椅背上，说道：“我感觉到了，你们会提出一些建议。我国政府对一切建立南极前哨基地的可能性都持高度赞赏的态度。”\n\n“我们已获准……”"
 antarctica_aac_diplo.8.a: "“为秘鲁南极基地的建立建设提供一块土地，不附带任何条件。”"
 antarctica_aac_diplo.9.t: "雪茄烟和酸橘汁腌鱼"
 antarctica_aac_diplo.9.desc: "傍晚七点，政府专车来到市中心的酒店，接走了米兰达和比利亚罗埃尔。\n\n随后，他们乘车来到了一家高档餐厅，秘鲁外长路易斯·阿尔瓦拉多·加里多已经预定了餐位。\n\n三人坐在远离其他食客的后排卡座里，香烟和雪茄一根跟着一根，挑高的天花板之下，厚重的烟雾像是从烟囱里冒出来似地袅袅升腾。\n\n过去一周里，智利外交官曾与加里多有过数次会谈，但这次才是真正的谈判。磋商始于品尝秘鲁国菜酸橘汁腌鱼，随后切入了有关秘鲁中立地位的议题。\n\n“我国政府已经评估了贵方的初步提案，”加里多说道，“虽说颇具吸引力，但我国顾虑可能会危及与阿根廷之间的中立关系——尤其是当下，阿根廷与巴西之间的敌意正在日益加剧。”\n\n“听起来贵方没有拒绝。”米兰达咬着雪茄，回应道。\n\n加里多轻笑一声：“您说得对，但这是原则问题，阿根廷可能的报复倒未必是我国的主要顾虑，但我国实在是看不出选边站队能对拉美大陆局势有什么积极意义——除非，我们能获得某些保障。”\n\n这正是外交二人组等待的突破口，比利亚罗埃尔立刻接过话头，提出了智利的条件："
 antarctica_aac_diplo.9.a: "“如果阿根廷同意，我们对对话达成外交解决方案持开放态度。”"
 antarctica_aac_diplo.9.b: "“我国的最终目标是和平的南极大陆，当地部分去军事化可以冷却局势。”"
 antarctica_aac_diplo.9.c: "“无论我们两国怎么想，阵营界限都早已划定，中立是我们无福享受的奢侈品。”"
 antarctica_aac_diplo.10.t: "长袖善舞"
 antarctica_aac_diplo.10.desc: "同加里多的最后一次会面定于利马的智利使馆晚宴上。\n\n米兰达和比利亚罗埃尔为此私下捯饬了近一小时，他们身着时髦燕尾服，洒有顶级古龙水。\n\n二人已准备万全，只待向秘鲁方面证明这点。\n\n“贵方邀请了日本大使及随员到场？”加里多在使馆与智利外交官们相会时问及此事。\n\n“确是如此。”米兰达答复道，“希望这一举措能充分展现我们的诚意。无论南极还是世上任何一处，我们都无意与日方产生摩擦。”\n\n为彰显其所言非虚，一支舞方才落幕，米兰达便在秘鲁外交人员面前邀请日本大使夫人共舞第二支。\n\n宴会顺利进行，诸位外交官员彻夜举杯畅饮，或吞云吐雾，或翩翩起舞。米兰达和比利亚罗埃尔借机拦住加里多，在其秘鲁任务落下句点前作出最终承诺……"
 antarctica_aac_diplo.10.a: "“我国可以承认秘鲁针对厄瓜多尔的领土主张——当然，不能付诸官方书面文件。”"
 antarctica_aac_diplo.10.b: "“如果开价合理，我国将会向日本捕鲸业者开放我方水域。”"
 antarctica_aac_diplo.10.c: "“比利亚罗埃尔，日本大使夫人无意间透露过，日本绝大部分的南极驻军都成天困在基地里。天晓得她是怎么知道的。”"
 antarctica_aac_diplo.11.t: "困兽"
 antarctica_aac_diplo.11.desc: "外交部\n\n发自：外交部长阿图罗·马施克\n\n主题：委派驻厄瓜多尔南极安全事务特使\n\n委派外交官米兰达、比利亚罗埃尔前往厄瓜多尔基多，以争取国际社会对智利南极领土主张的承认。外交部已包租一架洛斯塞里略斯机场的飞机，计划于本月初启程。\n\n与以往数项磋商相同，本次外交行动时限仍为一个月，应于十一月底之前完成谈判事宜。\n\n与厄瓜多尔官员谈判时需着重考虑如下事项：\n\n1.鉴于厄瓜多尔同美国乃至OFN方面关系密切，其需要特定保证，即我方正于南极事务上推进与OFN南极洲事务局的合作关系。\n\n2.厄瓜多尔尚处于战后复苏阶段，与秘鲁的战争失利致使其失地颇多，故可能对此前秘鲁所获南极相关承诺持戒备态度。\n\n3.厄瓜多尔可能积极响应有关在智利南极领地建立厄方基地的建议。"
 antarctica_aac_diplo.11.a: "基多在等待。"
 antarctica_aac_diplo.12.t: "第一印象"
 antarctica_aac_diplo.12.desc: "“至少晚了一个小时了吧？”比利亚罗埃尔开口说道。\n\n米兰达闻言，瞥了一眼手表：“刚过。”\n\n“我们记错时间了？”\n\n“没有。备忘录上写得清楚：‘午后三时，马里斯卡尔·苏克雷机场外，外交部长与两位会面’。”\n\n“行吧。”比利亚罗埃尔环顾四周，“那他人到底在哪儿？”\n\n“不清楚，但据我了解，这迟到很符合他的作风。”\n\n“怎么讲？”\n\n“你也看过报告，他的谈判履历不好，听说还嗜酒如命。”\n\n比利亚罗埃尔点点头：“的确，文件里写的，他是个彻头彻尾的酒鬼，惯用恐吓手段压制谈判对手，撒谎成性，犯错了从来不认。我敢说，只要能把他拉到谈判桌前，咱俩就能轻松把他摆平。”\n\n就在此时，一辆政府轿车猛地刹车，停在了两位外交官面前的马路牙子上，一个满身酒气的厄瓜多尔人摇摇晃晃地跌出车门，他的嘴唇上还沾着饭菜残渣，显然是刚刚大吃了一顿。“抱歉，先生们——”他的话音含糊不清，随即突然停顿下来，在垃圾桶旁边弯下腰，吐了出来。片刻之后，他直起身，同米兰达和比利亚罗埃尔握手：“欢迎来到基多。”\n\n“想必您就是阿罗塞梅纳先生了？”米兰达说道。\n\n“正是本人。先生们，我们现在去解解渴吧？”"
 antarctica_aac_diplo.12.a: "两人交换了一个眼神，小心翼翼地搭上了汽车。"
 antarctica_aac_diplo.13.t: "美酒加冰块"
 antarctica_aac_diplo.13.desc: "“首先……”阿罗塞梅纳开口。这已经是他带着两名外交官在当天光顾的第三家酒吧了，过去整整一周里，他们好像都在四处喝酒——事实上也的确如此。\n\n阿罗塞梅纳憋住了一声酒嗝：“首先……我们得……再来一圈。”\n\n米兰达和比利亚罗埃尔点头应和，给自己点了外交会晤时惯常的饮品：威士忌兑水加冰；会谈结束时，他们酒杯中的冰块早已融化，水远远多过了酒。阿罗塞梅纳则点了当晚的第五杯双份威士忌，恐怕此刻他眼前已经开始出现重影了。\n\n“好了，”米兰达说道，“进正题吧。”\n\n“对，对……”阿罗塞梅纳皱起眉头，“呃……我国政府……对，我国政府需要确保，智利在南极事务上正在努力与OFN之间建立伙伴关系。”\n\n阿罗塞梅纳举杯，透过杯底打量着米兰达和比利亚罗埃尔，二人交换了一下眼神。“正如所有美洲国家组织成员国都清楚的，”米兰达率先作答，“智利不寻求冲突。我国过去曾是无端侵略行径的受害者，绝不会去伤害他人。”\n\n比利亚罗埃尔补充道：“自始至终，OFN都是智利最理想的南极合作伙伴，我国何必与之为敌呢？”\n\n“那……我该怎么向我的政府交代？”阿罗塞梅纳反问道。"
 antarctica_aac_diplo.13.a: "“我国将致力于与OFN南极洲事务局合作，保障南极大陆的持久和平。”"
 antarctica_aac_diplo.13.b: "“我国在南极的处境相当危险，因此需要在涉及大国的事务中维持坚定的中立立场。”"
 antarctica_aac_diplo.13.c: "“我国将与澳大利亚和新西兰展开更广泛的合作，这符合我方的外交目标。”"
 antarctica_aac_diplo.14.t: "游泳池边"
 antarctica_aac_diplo.14.desc: "“不管怎么说，”比利亚罗埃尔指着阿罗塞梅纳说道，“这家伙办起派对来还真是一流。”\n\n米兰达也不得不承认。两人受邀请来到外长官邸赴宴：美酒畅饮、美女日光浴，主人则悠闲地躺在池子上——当然，手里还端着一杯酒。\n\n“来来来，各位！”阿罗塞梅纳喊道，“找个位置随便坐！”他一边说着，一边爬出泳池，腰间围着浴巾。\n\n米兰达和比利亚罗埃尔坐在游泳池边的躺椅上。理论上说，这本来不应该是商讨重大外交政策的场合，但若说这里比烟雾缭绕的会议室惬意得多，倒也不算是假话，至少这里还有些赏心悦目的风景——两名外交官的视线不自觉地掠过了游泳池边曲线玲珑的身影，如此想道。\n\n“先谈公事，谈完好享受。出于显而易见的原因，我国政府想知道两位在此前访问秘鲁时做出了哪些承诺。”\n\n米兰达和比利亚罗埃尔略显得有点措手不及。厄瓜多尔方面竟然知道他们的利马之行，着实令二人惊讶。外交使团本就是低调行事，再加上议题涉及的地区本就偏远且无利可图，他们原本以为没人会特意关注——事实证明，他们错了。\n\n两人的眼神中透着尴尬，给出了答复："
 antarctica_aac_diplo.14.a: "“啊，嗯，您看……呃。我方的确做出了某些承诺，但这并不会对我们两国之间的关系造成负面影响……”"
 antarctica_aac_diplo.14.b: "“好说好说，我们回避了秘鲁针对厄瓜多尔主权主张的问题，智利的官方立场并未改变。”"
 antarctica_aac_diplo.14.c: "“好了，好了，我们再来一杯，好好享受吧。”"
 antarctica_aac_diplo.15.t: "纽带"
 antarctica_aac_diplo.15.desc: "阿罗塞梅纳今日没有喝多少酒，他驱车载着米兰达和比利亚罗埃尔前去基多老城的面包山，这是他们在厄瓜多尔外交行程的最后一站。山顶上，三人在暮色中俯瞰着全城，保存完好的殖民时期中心城区尽收眼底，着实是令人心醉的景象。\n\n熟悉的杯盏碰撞声打破了三人之间的寂静。阿罗塞梅纳取出了一瓶陈年进口波本威士忌，为另外两人斟满：“希望二位在此度过的时光还算愉快。”\n\n米兰达和比利亚罗埃尔礼貌地接过酒杯。阿罗塞梅纳远谈不上是他们遇见过最优秀的谈判代表，但却称得上是最完美的东道主。“正如您所说。”米兰达回应道，“说不定哪天我们会邀请贵国回访，我带您好好逛逛圣地亚哥。”\n\n“那可真是太好了。”三人举杯相碰。\n\n他们静静地欣赏着眼前的美景，聆听着孩童的嬉闹、街巷中的犬吠、汽车的鸣笛，享受这片刻的安宁。过去一年里，两名外交官几乎没有停下过脚步，旋风一般的外交活动让他们时时奔忙，无暇真正欣赏所到之处，也无暇深交相遇之人。他们肩负着重要的使命，不仅是为了智利南极领地，也是为了美洲国家组织。他们正在缔结各种纽带关系——哪怕在二人退休之后也能够长久延续的外交关系。\n\n比利亚罗埃尔先开口了：“最后一件事……”"
 antarctica_aac_diplo.15.a: "“我国政府决定在我方领地之内，给予贵国一座南极基地，共同为和平与繁荣而奋斗。”"
 antarctica_aac_diplo.15.b: "“一座南极基地，怎么样？比秘鲁的要大得多。”"
 antarctica_aac_diplo.15.c: "“再走一圈，临别要再喝一杯，祝好。”"
 antarctica_aac_diplo.16.t: "真正的考验"
 antarctica_aac_diplo.16.desc: "外交部\n\n发自：外交部长阿图罗·马施克\n\n主题：委派驻委内瑞拉南极安全事务特使\n\n委派外交官米兰达、比利亚罗埃尔前往委内瑞拉加拉加斯，以争取国际社会对智利南极领土主张的承认。外交部已包租一架洛斯塞里略斯机场的飞机，计划于本月初启程。\n\n与以往数项磋商相同，本次外交行动时限仍为一个月，应于三月底之前完成谈判事宜。\n\n与委内瑞拉官员谈判时需着重考虑如下事项：\n\n1.委内瑞拉作为石油主要生产国的地位，使其必须与各国保持友好关系。初步调查表明，由于与阿根廷之间的石油贸易往来，委内瑞拉官方可能对公开支持我方主张持谨慎态度。若要使委内瑞拉支持我方主张，需使其知晓我国正在组建广泛联盟。\n\n2.正如古斯曼教授反复强调，智利南极领地亟需稳定、廉价的燃料供应。现授权二位研究从委内瑞拉补贴燃料采购、用于南极领地的可行性。\n\n3.最后需考虑的外交要点是委内瑞拉外长、马科斯·法尔孔·布里塞尼奥。他正是在圭亚那边界问题中崭露头角，在领土争端议题上拥有相当高超的外交素养，现兼任委内瑞拉驻美洲国家组织常驻代表。在谈判磋商中，不可小觑他的影响力，但若能争取合作，将对谈判大有帮助。"
 antarctica_aac_diplo.16.a: "即刻动身加拉加斯。"
 antarctica_aac_diplo.17.t: "疼痛苦楚"
 antarctica_aac_diplo.17.desc: "比利亚罗埃尔抻直双腿，发出一声呻吟。遍及拉美各地的穿梭飞行让他渐渐有些吃不消了，更被说还要加上熬夜研究模糊地图的漫漫长夜。他此时感觉浑身上下酸痛不已，从米兰达的表情来看，搭档显然也是同感。\n\n他点燃了这趟飞行途中的第五支香烟，深深吸了一口。过肺的烟雾让他精神一振，但效果转瞬即逝。近来，能驱散他疲惫的事物越来越少，他已经开始暗自怀疑，自己和米兰达还有没有足够的精力完成接下来的任务。他深知，委内瑞拉的工作比之前难得多：谈判代表更加优秀，委内瑞拉和南极事务的利益关联度也较低，只能说前景相当不容乐观。\n\n耳压慢慢消失，这是即将降落加拉加斯迈克蒂亚国际机场的信号。“他们会准时来接机吗？”比利亚罗埃尔自言自语道。\n\n“上次之后，我已经什么都准备好了。”米兰达回答道，“虽然我十分怀疑委内瑞拉之行不会像厄瓜多尔那么有趣，但还是希望我猜错了。”\n\n“同意。”比利亚罗埃尔应着声，随即又想起了即将与布里塞尼奥外长会晤的事情，又补充道，“肯定会更棘手的，毕竟这次谈判的筹码远不如上次那么充裕。坦白讲，南极和委内瑞拉差不多隔了一整个拉美大陆，他们实在没多少理由关心。”\n\n米兰达耸耸肩，苦笑着说道：“看来只能依靠我们与生俱来的魅力风采了。”"
 antarctica_aac_diplo.17.a: "“当然，还有我们英俊的好相貌。”比利亚罗埃尔干巴巴地说道，起身离开飞机。"
 antarctica_aac_diplo.18.t: "数字的重量"
 antarctica_aac_diplo.18.desc: "马科斯·法尔孔·布里塞尼奥身材短小精悍，气势逼人。米兰达和比利亚罗埃尔甚至觉得，这位委内瑞拉外长拥有看穿他们虚伪外交辞令的本事，因此决定必须要严肃地同他进行私下交涉。\n\n为此，布里塞尼奥将他们带到了外交部办公室谈判。房间装饰华美，摆放着精美的皮椅和深色桃花心木书桌，角落里的大座钟滴答作响。当布里塞尼奥仔细审阅提案时，米兰达和比利亚罗埃尔互相交换着焦虑的目光。挂钟每响一回，两人的不安便加剧一分——时间悄然流逝，一秒、一分、一小时。\n\n布里塞尼奥把文件收拢整齐，轻轻拍平，郑重其事地放在办公桌面上。他先是望向米兰达，又看向了比利亚罗埃尔。“我国，”布里塞尼奥斟酌着开口说道，“在同阿根廷之间的贸易往来中获益颇多。尽管贵国主张的合法性依据确有其可取之处，但我国政府非常顾虑阿根廷决定不再从我国进口石油，因此无法贸然表态。若是能确认，其他美洲国家组织成员国能公开支持智利的南极领土主张，便能极大缓解我国政府的顾虑；但若是不能，二位，请恕我无法就此做出任何承诺。”\n\n座钟滴答作响，两名外交官对视，敲定了最终答复："
 antarctica_aac_diplo.18.a: "“到目前为止，我们的外交磋商已经取得了巨大的成功。我们确信，美洲国家组织将会支持智利的领土主张。”"
 antarctica_aac_diplo.18.b: "“我们并非孤军奋战。随着时间推移，会有更多成员国加入进支持的行列。”"
 antarctica_aac_diplo.18.c: "“你们可以称得上是……先行者，智利决不会忘记委内瑞拉的支持。”"
 antarctica_aac_diplo.19.t: "黑金蓝冰"
 antarctica_aac_diplo.19.desc: "“戴上。”布里塞尼奥头戴安全帽，将另外两顶递给了米兰达和比利亚罗埃尔。\n\n两人接过安全帽戴上，跟随布里塞尼奥穿过铁丝网围栏的检查站。\n\n布里塞尼奥决定亲自陪同智利外交官们进行下一项活动：参观委内瑞拉油田。“如两位所见，”他说道，“我国设备都是最先进的，产量、质量在全南美都遥遥领先。”\n\n米兰达和比利亚罗埃尔早已对此谙熟于心，他们的目光扫过大片大片的钻井平台。二人此行的意在同委内瑞拉公司洽谈合作，供应智利南极领地，若能获得采购补贴，那就更好了。\n\n“这些大型设施固然令人震撼，”比利亚罗埃尔话锋一转，问道，“但您是否有同中小石油生产商的合作渠道？我们的需求相对比较有限。”\n\n“当然有。”布里塞尼奥答道，“我认识几家供应商，可能符合你们的需求。不过，想必价格一定要便宜吧。”\n\n两名外交官陷入沉思。阿图罗·普拉特站的预算极其有限，古斯曼教授三令五申，必须需要节省开支，但若是因此强求采购补贴，也可能会危及同委内瑞拉之间的谈判进程。"
 antarctica_aac_diplo.19.a: "“为我国后勤供应链直接、定期售卖补贴燃料会是对我国莫大的帮助。”"
 antarctica_aac_diplo.19.b: "“请放心，我们按市场价购买。智利只希望能公买公卖——从各个方面来说都是如此。”"
 antarctica_aac_diplo.19.c: "“尽管燃料是南极的必需品，但我国对贵国的外交支持更感兴趣。”"
 antarctica_aac_diplo.20.t: "法理胜过现实"
 antarctica_aac_diplo.20.desc: "在智委两国谈判的最终环节，马科斯·法尔孔·布里塞尼奥带两位智利外交官来到了他个人最爱的餐厅——一家藏身于加拉加斯小巷的雅致屋顶餐馆。外长说这里有全城最棒的玉米饼，米兰达和比利亚罗埃尔品尝后，也觉得此言不虚。\n\n美味的猪肉馅玉米饼，配上煎炸恰到火候的大蕉。外交旅途虽充满劳累与压力，然而当地美食始终是提振士气的可靠良方。\n\n布里塞尼奥一边吃，一边说道：“昨晚，我在研究贵方提供的地图时发现可能存在分歧。”\n\n米兰达和比利亚罗埃尔停下刀叉，看向布里塞尼奥，像是被打了个出其不意。\n\n“贵国对……阿德莱德岛的主张——我应该没说错吧？阿根廷学者胡安·卡洛斯·贝尔特拉米诺对其的研究似乎颇有根据，比贵国更为可靠。”\n\n米兰达隐约察觉出这是某种试探。他在委内瑞拉这段时间里听过一些流言，外长惯用此法来研究对手，也就是提出一个错误的前提，从而观察对方的反应。一念及此，米兰达回答道：“阿根廷动用非法军事手段侵占我国领土时，就已经丧失了一切提出合法主张的借口。”\n\n“即便如此，阿根廷的主张也至少与贵国同样有力，且他们实控着争议领土的大部分地区。所以我想问的是：智利要如何削弱他们同美洲国家组织之间的关系？”"
 antarctica_aac_diplo.20.a: "“智利盟友众多，我国会利用各国支持以进一步孤立阿根廷威胁。”"
 antarctica_aac_diplo.20.b: "“自由媒体是绝佳的工具。我们会在西半球投放精心策划的媒体攻势，证明我国主张的正确。”"
 antarctica_aac_diplo.20.c: "“我国的主张在此，不必自证，斯尼佩岛之战亦是如此。阿根廷肆意的侵略行径早已路人皆知。”"
 antarctica_aac_diplo.20.d: "“智利会证明自己愿意同任何人合作以实现和平，从而孤立阿根廷。当然，也可以同委内瑞拉合作建立南极前哨基地。”"
 antarctica_aac_diplo.21.t: "根深蒂固的附属"
 antarctica_aac_diplo.21.desc: "外交部\n\n发自：外交部长阿图罗·马施克\n\n主题：委派驻海地南极安全事务特使\n\n委派外交官米兰达、比利亚罗埃尔前往海地太子港，以争取国际社会对智利南极领土主张的承认。外交部已包租一架洛斯塞里略斯机场的飞机，计划于本月初启程。本次外交出使可能会由于正在进行的冲突而略微延后，但我们会尽力保证二位的行程优先级。\n\n与以往数项磋商相同，本次外交行动时限仍为一个月，应于五月底之前完成谈判事宜。\n\n与海地官员谈判时需着重考虑如下事项：\n\n1.海地是OFN从属成员国，与美国关系极为密切。美国在该国的影响力根深蒂固，许多海地人对此极为不满。请注意，不要过多谈论美国在该国占有的支配性地位。\n\n2.海地境内的共产主义游击队活动正在显著增加，其意在颠覆政权。派驻海地期间，请务必保持警惕，保证全程有安保人员护送。\n\n3.海地是热带水果的主要出口国之一，其中包括富含维生素C的芒果。若能在夏季建立安全高效的新鲜水果运输线渠道，古斯曼教授和驻智利南极领地的我国人员将受益匪浅。"
 antarctica_aac_diplo.21.a: "留意当心，保持警惕。"
 antarctica_aac_diplo.22.t: "如临深渊"
 antarctica_aac_diplo.22.desc: "米兰达和比利亚罗埃尔正乘车穿越太子港，这段经历同他们在南美各国首都的经历都截然不同。至少在他们目力所及之处，太子港都堪称瑰丽的加勒比天堂，但二人仍需要搭军车赶路，全程在武装警卫的监视下行动。\n\n这里没有悠闲的露天晚餐会，也没有漫长的夜游行程。军方安排的时间表刻板严苛，任何偏离都是拿自己的命冒险。阿图罗·马施克外长的报告书实在是有些轻描淡写了：海地已经濒临内战边缘——但其实，国内传来的消息表明，智利自己的局势也已同样不容乐观。\n\n军方车队将他们送到了市中心专供各路政要下榻的酒店。门外戒备森严，街道上设有多道检查站核验通行者身份，士兵们手持突击步枪四处巡逻。米兰达和比利亚罗埃尔深切感受到了海地政府对访客安全的谨慎，他们对此还是相当感激的，但二人也强烈地预感到，若是将海地的国内局势纳入考量，那么外交手段已经彻底失效了。\n\n车队通过检查站，停在酒店门前。海地外长路易·普莱斯-马尔斯站在气派的门廊下迎接他们。这位外长是名黑人，在穆拉托人占主导的海地政府中显得颇为独特显眼。“欢迎，先生们，”他说话里带着浓重的法语口音，同二人握手致意，“从机场来的路上都顺利吗？”"
 antarctica_aac_diplo.22.a: "“太子港真是座美丽的城市。”米兰达压下心中的诸多批评，如是回答道。"
 antarctica_aac_diplo.23.t: "宫殿中的恐慌"
 antarctica_aac_diplo.23.desc: "海地国家宫名副其实。这座建筑远比绝大多数国家的政府大楼要更加宏伟，纯白外墙在正午的阳光下熠熠生辉，耀眼夺目，奢华的气派几乎让人喘不过气。此处居所足以与帝王身份相称，现任主人的生活方式也的确如此。宫殿外围环绕着令人眼花缭乱的植物群落，色彩斑斓，形态各异，其中不乏从遥远外国引种的品种。\n\n米兰达和比利亚罗埃尔走出军用运输车，在卫兵的簇拥下拾级而上。国家宫前的草坪上飘扬着海地国旗，在同样尊崇的位置上，并列飘扬着美国和OFN的旗帜。\n\n路易·普莱斯-马尔斯在宏伟的门厅等候着二人，急切地带领他们走向谈判会议室。途中，三人看到了几名美国外交官、甚至士兵在来来往往。国家宫里的所有事务都十分忙乱，几乎到了恐慌的地步。米兰达和比利亚罗埃尔能感受到紧张气息正从所有人的身上散发出来，海地国内的动乱显然已经到了白热化的地步。\n\n他们随着普莱斯-马尔斯走进会议室落座。智利代表团认为谈判能够顺利进行，因为海地也同样在多米尼加入侵安什省的行动中遭受过非法军事行动的屈辱，他们理应会支持智利的主张。“好了，二位，”海地外长率先开口，“觉得这宫殿如何？”"
 antarctica_aac_diplo.23.a: "“我们从未见过如此壮丽的景象，的确是自由解放人民的标志。”"
 antarctica_aac_diplo.23.b: "“的确漂亮，几乎和我国在圣地亚哥的一样美丽。”"
 antarctica_aac_diplo.23.c: "“呃……啊，请您稍待片刻，我们去和那边的美国朋友谈两句，或许会有奇效。”"
 antarctica_aac_diplo.24.t: "计划变动"
 antarctica_aac_diplo.24.desc: "作为正式访问行程的一部分，普莱斯-马尔斯外长主动提出要带米兰达和比利亚罗埃尔游览太子港。他们搭乘预定好的军方车队从市中心的酒店出发，在国家宫附近接上了外长，随后悠闲地穿行于城市中历史悠久的街区，这些地方仍然保持着殖民时期的建筑风貌。\n\n二人心知肚明，这是海底方面精心策划好的行程，但是却无可奈何。显然，他们的路线只会经过城市中比较美好的地方——外交访问中，这样的安排本是常态，无可厚非，但随着车队开出政治中心区，沿途的军队部署也越发密集。不难推测，他们看不到的地方已经彻底陷入了危险局势之中。\n\n普莱斯-马尔斯此时正指着一家香水店，介绍道：“这家店二位务必光顾，他们的龙涎香香水殊为精品——”陡然间，邻街的一阵枪响打断了他拖长的法语腔调。车队猛地停了下来，混乱瞬间爆发。司机抓起对讲机，一串法语命令连珠炮一般传了出来。\n\n“发生什么了？”米兰达问道。\n\n“没什么的，”普莱斯-马尔斯说道，他突然紧张起来，“一切都在掌控之中。我们得先下车，去那家香水店里。”\n\n三人刚刚走出运输车，便传来又一阵枪响，随之传来隐隐约约的惨叫声，他们忙躲进商店。比利亚罗埃尔扭头，向普莱斯-马尔斯问道："
 antarctica_aac_diplo.24.a: "“或许智利可以帮忙，派一支小部队来，帮贵国维持治安？”"
 antarctica_aac_diplo.24.b: "“这实在是不正常、太不正常了。贵国保证过行程安全，现在我们可终于明白美国人为什么会在这儿了。”"
 antarctica_aac_diplo.24.c: "“既然来都来了，外长先生您推荐哪种香氛呢？或许今后我们的捕鲸业能为海地供应更多龙涎香。”"
 antarctica_aac_diplo.25.t: "芒果外交"
 antarctica_aac_diplo.25.desc: "普莱斯-马尔斯许诺过要带二人组悠闲地驱车到乡间去参观芒果种植园，但经历了香水店附近的突发事件之后，米兰达和比利亚罗埃尔已经做好了目睹惨状的心理准备——事实不出他们所料。\n\n车队驶过太子港郊区、越过城市边界时，越来越多的武装部队、宣传标语和共产主义涂鸦映入眼帘。海地动荡的真实症结就此展露无遗，普莱斯-马尔斯也无力掩饰，只得试图用南极话题来转移智利外交官们的注意力。\n\n“二位在那里待过多久？”外长问道。\n\n“拢共大约，两个月吧。”比利亚罗埃尔答道，“我们一般不会长驻南极，职责所在，不能在冰封海岸久留。”\n\n“那里什么样子？”\n\n“冷，”米兰达轻笑道，“但若说南极没有独特的美，也是假话：那里原始而纯粹。”\n\n“能看到很多企鹅吗？”\n\n“成千上万。”路边两辆弹孔密布、烧得焦黑的军车吸引住了米兰达的目光。\n\n“那么，根据二位的要求，稳定的新鲜水果供应对驻站人员来说简直就像是天赐。说真的，水果真的那么重要吗？”\n\n“您不明白，”比利亚罗埃尔说道，“南极越冬人员承受着难以想象的艰辛，单一乏味的饮食就是其中尤为重要的一件。若是夏季末能有新鲜水果靠岸，那提振士气的效果堪称无可比拟。”车队驶近种植园，比利亚罗埃尔望向窗外，看到路边躺着一具尸体，接着说道，“所以，有关芒果的交易合同……”"
 antarctica_aac_diplo.25.a: "“我们得到指示，贵方能供多少，我方就采购多少。我国南极人员需要维C。”"
 antarctica_aac_diplo.25.b: "“如果贵国政府能给个折扣价，智利会非常感激。我国的南极预算实在是捉襟见肘。”"
 antarctica_aac_diplo.25.c: "“或许先尝尝味道？我的确喜欢香甜的芒果。”"
 antarctica_aac_diplo.26.t: "大岛"
 antarctica_aac_diplo.26.desc: "外交部\n\n发自：外交部长阿图罗·马施克\n\n主题：委派驻古巴南极安全事务特使\n\n委派外交官米兰达、比利亚罗埃尔前往古巴哈瓦那，以争取国际社会对智利南极领土主张的承认。外交部已包租一架洛斯塞里略斯机场的飞机，计划于本月初启程。\n\n与以往数次磋商相同，本次外交行动时限仍为一个月，应于八月底之前完成谈判事宜。\n\n与古巴官员谈判时需着重考虑如下事项：\n\n1.尽管古巴希望同民主的阿根廷保持友好关系，但其很可能对阿根廷在斯尼佩岛事件中的无端侵略行为持负面态度。此外，阿根廷近期将加林德斯岛租借予意大利，古巴官方持反法西斯立场，绝不会忽视这一点。\n\n2.古巴热切地期望在国际舞台上展示其软实力，因此其对建立南极基地的前景持积极态度。\n\n3.此次谈判对象是古巴外长塞莉娅·桑切斯，她是古巴革命元老、菲德尔·卡斯特罗信赖的得力助手。卡斯特罗本人也可能会亲自主持部分会谈，请做好相应准备。"
 antarctica_aac_diplo.26.a: "动身哈瓦那。"
 antarctica_aac_diplo.27.t: "悠闲巡游"
 antarctica_aac_diplo.27.desc: "哈瓦那的景象浮现在米兰达和比利亚罗埃尔眼前，城市盛景绚丽多彩。他们的船只沿着海岸线行驶，右舷是港口的明媚风光，左舷放眼望去则是波光粼粼的碧蓝大海。\n\n几天之前，智利代表团抵达了古巴，此后就跟着古巴外长塞莉娅·桑切斯参加各种密集的参观和餐会招待行程。这位女外长着实精力充沛，显然是深爱着祖国，急切地想要在正式谈判开始之前尽可能多地展示古巴的风貌。米兰达注视着立在船头、裙摆随风飘扬的桑切斯，他实在是很难将眼前的这位女性同他在简报上看到的那个革命者形象联系起来。不过，若是阿图罗·马施克的报告书属实无误，他应该很快就能了解桑切斯的昂扬斗志。\n\n“像这么悠闲自在的巡航，”桑切斯向比利亚罗埃尔问道，“在南极应该不多吧？”\n\n比利亚罗埃尔微笑着回答道：“您一定会惊讶的。南极的夏季里，会有许多人驾船出海，或是捕鱼，或是探险。当然，下水游泳的机会不多，但我敢说，那里的大海也像这里一样地美丽。”\n\n“我一点不怀疑，”桑切斯以外交辞令回应，“真希望能有机会亲眼看看。”\n\n“说不定呢，”米兰达插话道，“或许可以为您安排一次。”\n\n夕阳缓缓沉入哈瓦那港的海平面，小船缓缓地漂向码头。"
 antarctica_aac_diplo.27.a: "是时候看看古巴人的本事了。"
 antarctica_aac_diplo.28.t: "老脸一红"
 antarctica_aac_diplo.28.desc: "“你知道我们要去哪儿吗？”比利亚罗埃尔问道。\n\n“你觉得呢？”米兰达噘嘴道，“我还不如你熟悉这地方呢。”两个智利人在古巴外交部的大楼里彻底迷了路。\n\n“我就说我们会迟到……你真没必要花那么多时间打扮你自己。不管你怎么倒腾那几绺头发，都不会显得更年轻漂亮。”\n\n米兰达调皮的瞪了他一眼：“至少我注重形象。”\n\n“你这话什么意思？”\n\n他们转过墙角的时候差点撞到塞莉娅·桑切斯。“哦！”她惊呼道，“原来你俩在这啊，我正找你们呢。走这边。”她转身走向办公室。比利亚罗埃尔向同伴咧嘴一笑，只见他脸颊通红。米兰达摇了摇头，示意比利亚罗埃尔闭嘴。\n\n片刻之后，他们开始切入正题。“事实摆在眼前，”米兰达对桑切斯说，“阿根廷正肆意推行帝国主义。他们在南极谈判中背信弃义，又在斯尼佩岛之战时用武力非法夺取他国领土。”\n\n“这些行为令人不安，”桑切斯认同道，“但我国政府仍希望与阿根廷保持友好——至少是融洽的关系。声明支持智利可能会危及这种关系。我需要更有力的证据才能向政府汇报。”\n\n这正是比利亚罗埃尔要给她的。"
 antarctica_aac_diplo.28.a: "“我方此前已承诺通过外交途径解决此事——前提是阿根廷人愿意接受。”"
 antarctica_aac_diplo.28.b: "“智利愿意更广泛地谴责本半球的帝国主义。”"
 antarctica_aac_diplo.28.c: "“我们可以动用关系，以远低于市场价的价格将部分智利铜矿售予贵方，用以换取承认。”"
 antarctica_aac_diplo.28.d: "“阿根廷在斯尼佩岛之战及其他成千上万起事件中的所作所为表明，他们对国际准则和与邻国的良好关系根本不关心。”"
 antarctica_aac_diplo.29.t: "意外来人"
 antarctica_aac_diplo.29.desc: "比利亚罗埃尔扫视着手中报纸的头条，又是马达加斯加灾难的揭露报道。他摇了摇头，暴力和死亡无处不在。\n\n衣服摩擦的悉悉窣窣声吸引了他的注意力，比利亚罗埃尔抬眼，目光越过报纸，瞥向了一旁的同事。米兰达正焦躁地摆弄着他的领带，显然是迫不及待地想要重返谈判桌。比利亚罗埃尔的目光飘向外长办公室紧闭的门扉，嘴角微微扬起，但什么都没说。\n\n时间到，办公室的门打开，两人再度面对古巴外长。“我方并非希望要求贵国无条件表态，”米兰达说道，“我国政府愿意给予古巴方面建立南极基地的权利，甚至也可以协助设施建设。”\n\n“嗯，”桑切斯应道，“确实是份诱人的提议——”\n\n此时，一个人推开了办公室的大门，桑切斯随即起身：“主席先生。”\n\n菲德尔·卡斯特罗威严的身影走进房间，米兰达和比利亚罗埃尔也急忙起身。“啊，终于有机会见到二位了！”卡斯特罗笑容灿烂，用力地和他们握起了手，“塞莉娅和我谈过你们的努力。为冰冷荒芜的雪原付出了这么多心血，二位说呢？”\n\n智利外交官们一下子有点愣住了。比利亚罗埃尔率先反应过来，回答道：“这……当然也是一种看法，主席先生。”\n\n卡斯特罗闻言，轻轻地笑出了声：“说得好，非常合适的外交辞令。啊，差点忘了，我还带东西来了。”他给自己和外交官们都叼上一根古巴雪茄烟，然后一旁坐下，示意谈判继续。\n\n“那我们接着刚刚的继续谈……”米兰达说道。"
 antarctica_aac_diplo.29.a: "“我国非常乐意为古巴的爱国者们提供一处基地。智利热切地希望展开密切合作……”"
 antarctica_aac_diplo.29.b: "“或许我方可以安排一次南极访问，以显示我国主张的重要性。桑切斯女士，您认为呢？”"
 antarctica_aac_diplo.29.c: "“感谢您的雪茄，但将古巴牵涉进‘冰冷荒芜的雪原’或许还是太过草率了。”"
 antarctica_aac_diplo.30.t: "管乐团"
 antarctica_aac_diplo.30.desc: "“不管怎么说，”米兰达说道，“菲德尔·卡斯特罗办派对可真够劲儿。”他拉上裤链，放水冲了一下小便池，转身对也来上厕所的比利亚罗埃尔说道。\n\n“好久没这么尽兴地跳过舞了。”比利亚罗埃尔说道，“还有吃的！我喜欢小三明治，就是那些切成一口大小的古巴三明治。”两名外交官走出洗手间，重新投入晚宴的狂欢。\n\n舞池里挤满了人，数十名显要、政客和随员随着管乐队的伴奏旋律翩翩起舞。萨克斯嗡嗡作响的狂乱音符驱使着人们突破舞蹈的极限，热情的鼓点在舞池里激荡出电光火石般的能量。米兰达和比利亚罗埃尔瞬间就跟节奏打起了拍子，片刻之后就融入了舞动的人群。\n\n两人穿梭舞动间，撞见了卡斯特罗主席活力蓬勃的身影。“朋友们！”他高呼，“你们能来真好。啊，还是单独来的。”卡斯特罗将比利亚罗埃尔引荐给一位女伴，那位女士旋即搂起智利人翩然离去，将米兰达独自留在了原地。\n\n外交部长塞莉娅·桑切斯绕过卡斯特罗，握住米兰达的手：“您能请我跳支舞吗？”\n\n“当然！”他应道。乐队突然切换成融合风的恰恰曲，米兰达与桑切斯踏着节奏前后起舞。“您告诉我，”桑切斯问道，“贵国政府还有最终报价吗？”"
 antarctica_aac_diplo.30.a: "“我国保证，将意大利帝国、法西斯污秽驱逐出西半球。智利非常期待古巴能在这项事业中展现革命热情。”"
 antarctica_aac_diplo.30.b: "“南极生活艰辛，我们驻扎在冰原的兄弟们会非常喜爱古巴雪茄的。”"
 antarctica_aac_diplo.30.c: "“除了这段‘著名的’桑切斯舞步之外，我无可奉上。”"
 antarctica_aac_diplo.31.t: "旋风穿梭"
 antarctica_aac_diplo.31.desc: "外交部\n\n发自：外交部长阿图罗·马施克\n\n主题：委派驻中美洲南极安全事务特使\n\n委派外交官米兰达、比利亚罗埃尔前往巴拿马巴拿马城，以争取国际社会对智利南极领土主张的承认。外交部已包租一架洛斯塞里略斯机场的飞机，计划于本月初启程。\n\n从巴拿马出发后，外交使团将继续向北行进，途经哥斯达黎加、尼加拉瓜、洪都拉斯、萨尔瓦多，展开外交活动。此行日程安排紧凑，各国停留时间相对较短。\n\n与以往数项磋商相同，本次外交行动时限仍为一个月，应于十月底之前完成谈判事宜。\n\n与中美洲各国官员谈判时需着重考虑如下事项：\n\n1.巴拿马若能获得贸易协议承诺，反应应当会较为积极。\n\n2.哥斯达黎加是坚定的民主国家，曾遭受过非法军事行动的屈辱，支持我国主张应无异议。\n\n3.尼加拉瓜总统路易斯·德瓦伊莱个人较为古怪，请做好应对非常规要求的准备。\n\n4.我方非常有意愿同洪都拉斯达成香蕉供应的贸易协议，以快速供给南极洲。\n\n5.与4.同理，外交使团应与萨尔瓦多推进有关咖啡的贸易协议。"
 antarctica_aac_diplo.31.a: "五国、两人、一个月。出发吧。"
 antarctica_aac_diplo.32.t: "运河"
 antarctica_aac_diplo.32.desc: "巴拿马运河堪称工程奇迹：全长超过八十公里、三段水道、三道船闸，船只能在两洋之间畅通无阻，轻松自如。\n\n船闸正在注水，托起一艘巨型油轮。米兰达和比利亚罗埃尔目睹此景，后者在喧嚣中高声惊叹道：“壮观！”\n\n“确实令人难忘！”米兰达赞同道。\n\n何塞·安东尼奥·雷蒙·坎特拉总统微笑点头：“我就知道，二位一定会欣赏的！”巴拿马总统亲临现场，向智利外交官们讲解运河的工作原理，代替了外交部长的职责。他的现身也再次印证了米兰达和比利亚罗埃尔展开穿梭外交的消息正在传播。\n\n在保镖和警察的簇拥下，他们走回了附近的服务大楼，准备向巴拿马总统陈述诉求。\n\n“南极的夏季短得可怜，”米兰达说道，“物资运输和安全航行的窗口极其有限。在这段窗口期间，新鲜食品的供应对智利南极领地人员的身心健康都极为重要。”\n\n比利亚罗埃尔接话道：“正因如此，我国恳请贵国政府，允许向智利南极领地运输物资的船舶优先通行，以确保生鲜货物在抵达南极不会严重变质。”\n\n雷蒙总统保持着微笑，回答道：“可行。我国可以安排运载贵国货物的船舶快速通行。”他顿了一下，智利外交官也明白了接下来的话题，“但贵方有什么给予我国的提议呢？”"
 antarctica_aac_diplo.32.a: "“对巴拿马非常有帮助的提议。智利将会声明支持巴拿马运河国有化。”"
 antarctica_aac_diplo.32.b: "“智利经济的生命线，也就是铜矿，可以准时、廉价地供应予贵国。”"
 antarctica_aac_diplo.32.c: "“两国之间可以扩大外交来往，在动荡的时代彼此助力。”"
 antarctica_aac_diplo.32.d: "“当下而言，我国政府没有给予我们任何做出进一步承诺的授权。”"
 antarctica_aac_diplo.33.t: "暴风雨前的宁静"
 antarctica_aac_diplo.33.desc: "米兰达和比利亚罗埃尔碰了碰杯。他们从未参与过如此顺利、迅速且互利共赢的谈判。智利外交部的判断是正确的：哥斯达黎加官方毫无保留地支持智利对南极的主权主张，没有任何附加条件。在外交领域，这比黄金还要珍贵。\n\n此次成功很大程度上要归功于米拉达和比利亚罗埃尔在谈判桌上的犀利论述。他们凭借多年针对该议题的外交经验，为智利领土主张构建了极具说服力的论证体系。哪怕是放眼当今全世界，也鲜有人能像这两位经验丰富的智利外交官一般，精通南极洲的地理、地形与历史。\n\n当然，撇开功劳不谈，对他们个人而言，这段难得的休整也令人欣慰。历经多年为智利领土主张争取合法性的奋战之后，他们终于能有一次凭借论据本身的价值取得进展，而非依赖任何互惠条件。\n\n“看来消息终于开始传开了。”米兰达说道。\n\n“的确，”比利亚罗埃尔回应道，“哥斯达黎加可是铺上红地毯迎接了我们。不过我还是有点担心，恐怕越往北走，阻力越大。”\n\n米兰达又啜了一口酒：“我隐隐约约猜到最终的目的地了……”"
 antarctica_aac_diplo.33.a: "“墨西哥城。”"
 antarctica_aac_diplo.34.t: "古怪的独裁者"
 antarctica_aac_diplo.34.desc: "“嗷呜——！”\n\n“老天啊！”笼中的雄狮猛扑过来，发出震耳欲聋的咆哮，利齿咔哒咔哒地啃咬着铁栏杆，吓得米兰达猛地从笼子前退开。\n\n“哈哈哈。”路易斯·德瓦伊莱总统发出爽朗的笑声，“怎么了？大猫吓得你不会说话了吗？”\n\n米兰达揉着胸口，感觉自己心脏剧痛，喘息困难。他与比利亚罗埃尔心照不宣，互相交换了一个警惕的眼神，继续说道：“总统先生，您真幽默。”智利外交部严重低估了路易斯·德瓦伊莱的古怪程度：坦白讲，这人简直是个疯子，这处动物园就是明证。\n\n“狮子、老虎、熊，天哪！”德瓦伊莱仍在咯咯直笑，“我什么都有，这附近甚至还有猴子呢。”\n\n比利亚罗埃尔还勉强保持着冷静：“真是了不起的收藏，总统先生。我敢说，米兰达和我从未见过如此景象。”\n\n米兰达投来锐利的目光，外交双人组手里有情报：德瓦伊莱总统竟然在用这些动物对政敌实施变态的酷刑。\n\n“现在说说南极问题。”德瓦伊莱搓搓双手，说道，“我倾向于支持贵国的主张，但有一个条件。”\n\n米兰达挑起眉毛：“您请讲？”\n\n德瓦伊莱咧嘴一笑：“我要一只企鹅。”\n\n“企鹅？”比利亚罗埃尔惊呼。\n\n德瓦伊莱的笑容骤然收敛：“我不喜欢重复自己的话。”两位智利外交官最后对视，准备好答复。"
 antarctica_aac_diplo.34.a: "“当然，我们可以为您的动物园添一只企鹅。我们已经圈养很多了。”"
 antarctica_aac_diplo.34.b: "“您就要一只吗？一整个群落怎么样？我们有海军陆战队，就权当是演习了。”"
 antarctica_aac_diplo.34.c: "“啊，嗯，我们会联系派驻南极的科学家们，但我们没办法就此做出任何保证。”"
 antarctica_aac_diplo.35.t: "香蕉共和国"
 antarctica_aac_diplo.35.desc: "米兰达狠狠拍了一下比利亚罗埃尔的后脖颈。\n\n“哎！”比利亚罗埃尔揉着痛处，转头质问，“搞什么鬼？”\n\n“蚊子。”米兰达笑着回答。\n\n联合果品公司的香蕉种植园里蚊虫肆虐。这家美国企业掌控着洪都拉斯的经济。\n\n“卡车上还有驱蚊剂。”联合果品公司的代表说道。\n\n“我没事，没事，”比利亚罗埃尔示意，“继续参观吧。”\n\n智利政府授权他们为南极领地采购香蕉。外交官们确信，若是交易达成，古斯曼就总算能笑一次了。\n\n“通常来说，我们不做这么小宗的生意。”代表解释道，“但为了维护联合果品公司与智利政府间的良好关系，我们愿意在每年南极夏季伊始时，协助紧急配送新鲜香蕉。”\n\n“我国驻扎南极基地的同胞会深表感激。”米兰达回应道。\n\n当联合果品公司代表护送米兰达和比利亚罗埃尔走出种植园、回到专车上时，二人瞥见了工人和他们的住所——都因长期劳作和使用而疲惫、破败不堪。\n\n比利亚罗埃尔低声同米兰达商量着：“要不要争取更多？”\n\n米兰达点头示意，随即转向公司代表……"
 antarctica_aac_diplo.35.a: "“丰盛可口的洪都拉斯香蕉或许能成为南极冰原饮食的主角。”"
 antarctica_aac_diplo.35.b: "“您能否利用您广泛的政府人脉，争取洪都拉斯对我国领土主张的支持？”"
 antarctica_aac_diplo.35.c: "“若贵方能尽快安排少量香蕉起运，我方将不胜感激。”"
 antarctica_aac_diplo.36.t: "煮咖啡的选择"
 antarctica_aac_diplo.36.desc: "在米兰达和比利亚罗埃尔的外交职业生涯中，公事与私事常常难分彼此，此时恰恰就是这样。\n\n米兰达用品尝勺舀起一口深烘焙咖啡，发出响亮的啜饮声，在口中品味片刻后咽下。“嗯，坚果香，余韵带可可味。”他侧过身子，示意比利亚罗埃尔也尝尝看。\n\n“还不错，”比利亚罗埃尔说道，“不过我更喜欢浓一点的。”\n\n米兰达眉头一挑，看着同事，随即摇头道：“再浓点儿，你不用坐火箭就能飞上月球了。”他弯腰查看价格标签，皱起眉头，“对南方的伙伴们来说，这恐怕不是最经济的选择……”\n\n“嗯哼……”\n\n这确实是条艰难的钢丝：双人组来到圣萨尔瓦多是为了实地品尝测试，并采购一种能稳定运销智利、再转运至南极的咖啡品牌。从与古斯曼教授的多次交谈中得知，阿图罗·普拉特站上上下下对目前的咖啡品质都颇为不满，而这次选择的难点在于，既要提升咖啡品质，又不能超出预算。\n\n“啊，不行。”品尝下一杯时，米兰达强忍着吐掉的冲动，“这味道简直就像是速溶。”\n\n“不过确实便宜。”比利亚罗埃尔指出，“我倒是觉得，这个在价格和口感上算是平衡得不错。”\n\n外交官们权衡选择之际，米兰达再次蘸了一下咖啡勺。"
 antarctica_aac_diplo.36.a: "“这样的小幸福，我们还不至于承担不起，兄弟们值得来上这么一杯好咖啡。”"
 antarctica_aac_diplo.36.b: "“试试看能不能砍个价吧。要是局势恶化，我们还得省下钱来买子弹呢。”"
 antarctica_aac_diplo.36.c: "“就算喝起来像速溶吧，但在冰天雪地的荒原上，一杯热饮总是能让人温暖起来。”"
 antarctica_aac_diplo.37.t: "空降名单"
 antarctica_aac_diplo.37.desc: "米兰达把脚搭在酒店房间中间的脚凳上，给自己点上一支香烟，舒展身体，松开领带。“能把窗户开开吗？”他问比利亚罗埃尔。\n\n后者点点头，走向房间另一边打开窗户，危地马拉的夜风涌入室内。“所以……你觉得进展如何？”他问道。\n\n“已经是我们预想中最好的了。”米兰达用鼻孔喷出一阵烟雾，“我们这边筹码不多，但对方至少态度积极。等更多国家表态后，危地马拉肯定就随风倒了。”门外传来敲门声。\n\n“你去开门？”米兰达问道，比利亚罗埃尔嘟囔着起身。门外是一名手持密封信件的小侍者：“先生们，你们的信。”比利亚罗埃尔接过信封，给少年塞了一笔小费，关上门。随后他拆开信件，读完内容后点点头，将信件甩到了米兰达的膝盖上。“我们的判断没错。”比利亚罗埃尔倒在自己的床上。\n\n米兰达扫了一眼电报：“墨西哥。这活儿不好干，他们政府里可是大把大把老练的外交官。”\n\n“据我所知，总统还喜欢亲自参与谈判。”\n\n“这将是我们外交生涯的巅峰——”\n\n“目前为止，”比利亚罗埃尔竖起手指，打断道，“我们会得到什么支援？”米兰达扫过人员名单，答道：“扩编的随员团队、几名军方代表，还有……甚至还有一两个记者？不过我猜他们能否参与报道取决于我们的工作顺不顺利。哦，似乎还有另一位外交官会和我们一起共事。”\n\n“谁？”"
 antarctica_aac_diplo.37.a: "“叫……米格尔·塞拉诺？”"
 antarctica_aac_diplo.38.t: "最后关头"
 antarctica_aac_diplo.38.desc: "外交部\n\n发自：外交部长阿图罗·马施克\n\n主题：委派驻墨西哥南极安全事务特使\n\n批准米兰达与比利亚罗埃尔提出的计划。将拨付合理范围内的机票、住宿及生活费用。另将提供津贴用于采购外交事务所需物资及服务。\n\n外交特使目标：争取墨西哥公开声明支持智利对南极的主权主张。鉴于美洲国家组织会议即将召开，墨西哥的支持对推动我国主张获得更广泛认可至关重要。\n\n与墨方官员谈判时应重点考虑以下事项：\n\n1.墨西哥执政党，即革命制度党，在反法西斯主义方面拥有强烈的意识形态诉求。若能将我国塑造成对抗地区内法西斯势力的形象，将极具说服力，但务必注意，使团应当避免损害我国既定的中立立场。\n\n2.墨西哥自诩为崛起中的大国。因此，墨方若能获取南极权益，将极大提升其国际声望。\n\n3.墨西哥近年正在推行强势的工业化计划，智利的战略金属资源可为其提供重要支撑。此可作为谈判筹码，但切忌轻易让渡利益。\n\n鉴于任务重要性，国内已增派外交人员协助行动。你们将在墨西哥城机场与他们会合。本次行动定于三月底结束。"
 antarctica_aac_diplo.38.a: "二人做好了迎接这场战斗的准备。"
 antarctica_aac_diplo.39.t: "出人意料的客人"
 antarctica_aac_diplo.39.desc: "比利亚罗埃尔和米兰达拖着疲惫的双腿，在贝尼托·华雷斯国际机场中匆匆穿行。美洲国家组织会议迫在眉睫，外交行动刻不容缓，然而，两人的心思却没法专注在眼前的任务上，好奇得仿佛百爪挠心一般：圣地亚哥特意派来的这位神秘外交增援究竟是何许人也？两位外交官走进等候他们的豪华轿车，答案终于揭晓，可更多的疑问却随即浮上他们的心头——米格尔·塞拉诺挂着彬彬有礼的微笑迎接了他们的到来，而他或许是智利外交界最具争议的人物了。\n\n“二位好，久别重逢，真是令我欣喜。”米兰达和比利亚罗埃尔已经许多许多年没有和塞拉诺说过话了。二战期间，塞拉诺被指与某些极端组织有牵连，虽然指控没有坐实，但也是他在许多圈子里都成了不受欢迎的人物。比利亚罗埃尔握住塞拉诺的手，勉强表示致意，竭力掩饰着内心的震惊：或许塞拉诺的名声比他想象得要好些，不然怎么能获准参与如此重要的外交任务。\n\n车队驶过墨西哥城的街道，塞拉诺的目光始终紧盯着窗外的街景，尤其是成群结队的乞丐和流浪汉——他们显然是所谓“歌舞伎效应”的牺牲品了。突然，塞拉诺近乎惆怅的语调打破了沉默：“这座城市曾经是阿兹特克帝国跳动的心脏。当年，为了取悦异教的神，年轻处女的鲜血就在此徒劳无功地倾倒泼洒。也正是这般狂妄，充满活力的战士文明才会成为如今这般粪坑一样的废墟——愿它能成为我们所有人的教训。”\n\n比利亚罗埃尔和米兰达只是默默点头，附和着塞拉诺的沉思。目光交汇之间，他们默契地交换着相同的心思："
 antarctica_aac_diplo.39.a: "米格尔·塞拉诺，真是个古怪的家伙。"
 antarctica_aac_diplo.40.t: "南极梦"
 antarctica_aac_diplo.40.desc: "三名智利外交官走出豪华轿车，迎面便碰上了墨西哥外长曼努埃尔·特略·鲍劳德灿烂的笑脸。鲍劳德虽然已经上了年纪，可步伐却轻快得令人惊讶，几乎要让比利亚罗埃尔嫉妒起来。“诸位朋友，欢迎来到墨西哥城。请跟我来吧，我们要商议不少事情。”他一边说着，一边依次同三人握手致意。\n\n当众人匆匆穿行在外交部的走廊之间时，比利亚罗埃尔竭力尝试着用外交辞令刺探墨西哥总统选举的候选人——实际上，借由革命制度党错综复杂的政治运作体系，指定的继任者早已能确保胜选了。“我衷心祝愿马特奥斯总统退休生活幸福，同时也要恭贺……”\n\n鲍劳德打断了比利亚罗埃尔的辞令：“我一定会转达的，比利亚罗埃尔先生，但多谈一分钟我国政坛，恐怕我就得少活一个月。还是请您多讲讲那片冰封大陆吧，每年这个季节的时候，那里是什么样子？”\n\n“确实比一般时候宜人些，毕竟现在正好是夏季末尾，但远远比不上什么热带天堂。”米兰达接话，掩饰住同事的失态。\n\n“我早就见惯了度假胜地，早已厌倦了，但南极洲——那可是地球上独一无二的地方。真遗憾，我从未能亲眼目睹南极冰封的壮丽风光。”\n\n比利亚罗埃尔察觉机会来临，重新整理了一下思绪：“那么，部长先生，若是此次谈判顺利……”"
 antarctica_aac_diplo.40.a: "“我们非常乐意请您南下一游，所有费用都我们包了。”"
 antarctica_aac_diplo.41.t: "意识形态考量"
 antarctica_aac_diplo.41.desc: "三名外交官在鲍劳德装潢气派的外长办公室中落座，柔软的坐垫差点让比利亚罗埃尔想要闭目小憩片刻，墨西哥同行的眼中也显现出了同样的疲倦。鲍劳德率先开口，启动了谈判：“诸位，那我们就直入正题吧？墨西哥的首要诉求很简单。各位都清楚，墨西哥长期以来都是西半球反法西斯主义的旗手。因此，我国仅仅只要求智利确认，将在南极洲外交事务中恪守这一理念。若智利能公开承诺致力于清除南极法西斯势力，将会极大缓解墨西哥的忧虑。”\n\n米兰达和比利亚罗埃尔还没来得及回应，塞拉诺便怒气冲冲地插上了话：“先生，请别再纠结这无用的废话了吧？我们来此是为了磋商战略协议，而不是意识形态之争。还是请直接言明贵国真正的诉求。”\n\n鲍劳德闻言，轻轻挑了挑眉毛，说道：“贵方对此事的防御姿态，恰恰证明了墨西哥这项要求的必要性。”\n\n比利亚罗埃尔怒视了塞拉诺一眼，急忙试着挽回局面：“抱歉，我的同僚太粗鲁了。智利当然反对敌对势力腐蚀南极，但我国也必须警惕，避免无端激化与邻国之间的矛盾。”\n\n“言之有理，我的朋友，但您也必须要理解，我国对与其立场、价值观如此动摇的国家达成协议也心存顾虑。”\n\n比利亚罗埃尔沉吟片刻，给出了回应："
 antarctica_aac_diplo.41.a: "“很好，我国将会发表一份官方的反法西斯声明。”"
 antarctica_aac_diplo.41.b: "“也许在相关事务上展开军事合作可以展示我国的诚意。”"
 antarctica_aac_diplo.41.c: "“抱歉，但我们冒不起引爆潜在冲突的风险。”"
 antarctica_aac_diplo.42.t: "能源许诺"
 antarctica_aac_diplo.42.desc: "鲍劳德带领米兰达和塞拉诺穿行于工业建筑的迷宫之中。机器的喧嚣让米兰达晕头转向，不禁有些羡慕起缺席这次墨西哥城郊区实地考察的比利亚罗埃尔。不过话又说回来，总得有人看着塞拉诺，免得他又一次祸从口出。所幸此人似乎喜欢徘徊在幕后，观察多于发言。\n\n“诸位请看，无论报刊如何渲染所谓‘歌舞伎效应’，墨西哥工业发展的步伐都一点不会停下。仅仅这座发电厂就能为数千户家庭供电，而马特奥斯总统已下令建造了许多类似的发电厂。”\n\n“确实令人印象深刻，鲍劳德先生，不过我认为这样宏大的电气化计划若能获得稳定的铜材供应，一定会更加完善。”米兰达一边回应，一边暗自思忖着本国丰富的铜矿储量。\n\n鲍劳德微笑着调整了一下安全帽：“的确如此。没有输电线路输送电力，发电机又能有什么用？墨西哥已从贵国采购了大量的铜材，若是能获得折扣，自然就更好了。”\n\n米兰达思索片刻，给出了答复："
 antarctica_aac_diplo.42.a: "“我国非常乐意以极有竞争性的市场价格将铜材售予墨西哥。”"
 antarctica_aac_diplo.42.b: "“外长先生，我向您保证，会为贵国争取到能力范围内最低的折扣价。”"
 antarctica_aac_diplo.42.c: "“……遗憾，我现在无法给出任何承诺。”"
 antarctica_aac_diplo.43.t: "茶歇时间"
 antarctica_aac_diplo.43.desc: "鲍劳德领着比利亚罗埃尔在基内雷特咖啡馆落座，智利人仍惴惴不安。红瓦区本是精英们逃离墨西哥城中心喧嚣的避风港，这里遍布巴黎风格的建筑，处处弥漫着波希米亚风情，但比利亚罗埃尔却是每走一步路，心里就更加紧张一份。谈判陷入僵局、美洲国家组织会议迫在眉睫——此刻已是外交场上背水一战的紧要关头。\n\n“请尝一尝吧，我的朋友。自从我三十年代游历巴黎归国之后，这家的糕点就是我吃过最美味的，不尝尝也太可惜了。”墨西哥外长一边说着，咬了一口手中的羊角包。\n\n比利亚罗埃尔勉强应酬，吃了一口温热的丹麦酥，随即试图转移话题：“共事数周以来，您竟还从来没有提过建立墨西哥南极基地的计划，真是令我惊讶。请问贵方仍然有这一愿望吗？”\n\n“当然，当然，我只是在等待您主动提议，毕竟若是直白向您索求馈赠，未免显得失礼。”鲍劳德的嘴角浮现出一丝狡黠的笑意，回答道。\n\n“您也不必如此顾虑，我方也很乐意考虑给予墨西哥基地建设用地。”比利亚罗埃尔如此回应。\n\n“啊，不过，既然拖了这么久才谈到这个话题，我本期待着能听到些更实质性的内容。或许，假设性地讲，贵国政府能全额承担基地的建设费用——我实在想不出能比这更慷慨的临别赠礼了。”比利亚罗埃尔闻言，若有所思地吃完了手中的丹麦酥，最终给出了答复："
 antarctica_aac_diplo.43.a: "承担建设费用。"
 antarctica_aac_diplo.43.b: "给予基地用地。"
 antarctica_aac_diplo.43.c: "无视外长的小游戏，停止话题，再来一份糕点。"
 antarctica_aac_diplo.44.t: "迹象与预兆"
 antarctica_aac_diplo.44.desc: "米格尔·塞拉诺在墨西哥城的酒店房间里来回踱步。他的身上披着长长的藏袍，下摆拖在地毯上。香火已经快要燃尽，空气中弥漫着焚香的气味。过去几周的事态发展印证了他最深刻的恐惧——伪神的爪牙竟然已经渗透至地球上最为神圣之地，那个寒冷荒原、那个被选中的种族最初建立帝国的地方。\n\n他早已在占卜中预见到了：数月之前，“化身”离世而去引发的黑暗正在吞噬雅利安文明。但是，腐朽蔓延的速度超乎了他的想象。古斯曼和他的爪牙显然是嗅到了宇宙动荡的商机，开始着手将许珀耳玻瑞亚的神圣遗迹出卖给犹太势力。这其中最令塞拉诺感到屈辱的，莫过于他只能眼睁睁地旁观。\n\n然而，他再也做不到继续袖手旁观下去了，此时正是行动之时，干系实在太过重大。塞拉诺又喝了一口辛辣刺激的根茶，随即翻找起自己的公文包：或许《易经》能带来些新的启示，或许其他什么的，任何有用的线索都值得一试。当他在纸堆里翻阅时，某样东西吸引了他的目光。\n\n——那是去年夏天时他留下来的剪报，醒目的标题赫然是：“考廷动乱遭到镇压，斯尼佩岛的英雄凯旋归国”，下方则是梅里诺海军上校伫立于座舰之巅的画幅，那雅利安式的风姿尽显构图之美。\n\n当然，当然，他保存这份剪报当然有其缘由。即使化身已经离开这个时代，但远方仍存在能扭转战局的使者——或许梅里诺能挣脱古斯曼的掌控，加入最终的决战，或许一切还尚未结束。\n\n塞拉诺取出一张羊皮纸，提笔给上校写信。在即将到来的战争之中……"
 antarctica_aac_diplo.44.a: "这支笔就是他的剑。"
 antarctica_aac_diplo.45.t: "乌云"
 antarctica_aac_diplo.45.desc: "米兰达俯瞰着渐渐缩小的墨西哥城，飞机正载着他们飞向更高，直至整座城市消失云层之下。座位对面，他的老友早已鼾声如雷。为期数月的旋风式外交已经让这位老人筋疲力竭，未来一段时间里，他都需要尽可能多地休息。\n\n短短几个星期之后，美洲国家组织就要在华盛顿特区召开会议，这场盛会将决定他们的成败。若智利能获得组织对南极领土主张的承认，那这次会议就将成为他们长年谋划中的关键一击，这层政治保护伞足以令阿根廷在行动前三思而后行。但是，胜利也远远谈不上是囊中之物。美洲国家组织中充斥着各路阴谋家和利己主义者，各自编织着属于他们自己的权谋网络。虽说如此，米兰达至少也能稍感慰藉：他们的小小斗争即将画上短暂的句号，终于能享受应得的休息了。\n\n他再次抬头打量着自己的旅伴，脸上浮起一抹微笑。比利亚罗埃尔此时的神情是这好几个月里最安详的——尤其是最近几周，他似乎比以往几次外交旅程中都更受煎熬。米兰达只能毫无根据地猜测这是否与米格尔·塞拉诺的出现有关。此人确实古怪，但他身上还有某种其他的特质令米兰达心生不安：空洞的眼神、坦率直白的言辞，米格尔·塞拉诺身上总是有种说不清道不明的异样感，米兰达和比利亚罗埃尔都没法用理性加以解释。\n\n米兰达觉醒，暂且将这些念头抛掉，然后从公文包里取出了厚厚一沓外交报告。"
 antarctica_aac_diplo.45.a: "继续放任塞拉诺的爪子深入内心属实没什么意义。"
 antarctica_aac_diplo.46.t: "露西拉"
 antarctica_aac_diplo.46.desc: "比利亚罗埃尔在日程中挤出时间。他呼吸着浓稠潮湿的空气，伫立在露珠闪亮的昏暗田野之中。“你一定会被逗笑的，”他对墓碑低语，“我在临别之前，最想要倾诉的人竟然是你。”\n\n加芙列拉·米斯特拉尔是她为世人所知的名字，但在比利亚罗埃尔的心中，她叫做露西拉：墨西哥现代教育体系的奠基者之一、智利文坛的巨擘。她曾兴奋地写信告诉比利亚罗埃尔，自己获得了诺贝尔文学奖提名，自夸文采永远胜过他。如今露西拉已经不在人世，她留下的诗篇依然令他潸然泪下。他轻轻将盛开的勿忘我放在冰凉的泥土上。花瓣拥抱着大地，石碑上镌刻着“露西拉·戈多伊·阿尔卡亚加”的名字，凝成永恒。每当在墓园见到这个名字，比利亚罗埃尔都会心头一震：这个名字不再是崭新信笺上的落款，也不再是报纸头版报道她获得新奖项的标题。\n\n他向露西拉讲述了后来的变迁，提到了她圣地亚哥的旧居改建成了博物馆。她一定会捧着脸轻轻笑着，听他讲述冰封大陆的故事、倔强顽固的梅里诺、他和米兰达的冒险。她会哼着小调，遗憾自己不能和他们同行跨越美洲，去纽约探望多丽丝。\n\n“她确实深爱着你啊，我的朋友。”比利亚罗埃尔继续说道，阳光已经悄悄爬上了他的背脊，“她精心保管着你的作品，所有的手稿。想必她已经都告诉你了。”\n\n他强迫自己记起来，必须要准时赶到机场去。宁静的墓园之中，他恍惚看到了往日的圣地亚哥，听到了街道上涌动着千万人的对话。比利亚罗埃尔在喧嚣的时间河流中游弋寻觅，试图在人群中辨认出她的声音，却发现自己已经记不清那声音的模样。"
 antarctica_aac_diplo.46.a: "时光流逝远去，万物终将如此。"
 antarctica_aac_merino.1.t: "铁证"
 antarctica_aac_merino.1.desc: "“该死，这儿肯定藏着点啥。咱们都知道这老狐狸背后指定有什么见不得人的交易，可他到底把文件藏哪儿去了？”梅里诺上校一边在古斯曼的屋里翻箱倒柜，一边哀叹。接着，他一把抓起可恶教授的全家福，狠狠地摔到了墙上。\n\n与此同时，科维安则在旁劝他保持冷静：“别冲动，这屋子已经够乱了。这里根本找不到确凿的证据。”他小心翼翼翻开抽屉，逐封检查信件。古斯曼的信件枯燥乏味，哪怕是家人来信也令科维安倍感疲惫，以至于他都对这位能忍下来把它们读完的官僚产生了某种敬佩之情。\n\n梅里诺满心忧虑，对政变的手段懊恼不已。本该去巩固统治的二人，现在却在忙着把古斯曼的办公室翻个底朝天，只为给自己的所作所为找个正当理由。倘若事情败露，他对智利及其南极基地的构想可能就此流产。另一个官僚会接手此事，然后把军队永远排除在外……\n\n梅里诺结束了沉思，把怒火发泄到办公桌的抽屉上。他把它们通通扯了出来，把里面的东西一口气倒在桌上。铅笔、钢笔，还有——谢天谢地——一堆往来信件。他开始仔细翻找起来。\n\n“让我瞧瞧。家信、家信、母校致函、圣地亚哥，嗯……阿根廷南极研究所？！”梅里诺撕开信封，逐字逐句阅读，信中内容与他的设想别无二致——莱亚尔上校“善意”地伸出了橄榄枝，期待“和平解决”该地区的领土争端。科维安站在办公室另一头，只能看到梅里诺手上紧紧攥着一封信。\n\n“上校，你手里的是什么？”他问道。上校咧嘴一笑，把信纸高高捧过头顶，好似一个婴儿在他手中降生。"
 antarctica_aac_merino.1.a: "“铁证。”"
 antarctica_aac_merino.2.t: "冰冷而不孤寂"
 antarctica_aac_merino.2.desc: "在普拉特舰长号的船舱深处，蒸汽机演奏着凄凉的交响乐，用混乱的嘶鸣折磨着那些不幸在一旁劳作的船员。古斯曼和亚克希奇被关在锅炉房旁，百无聊赖地坐着，看着他们的饭从细缝里递来。连日来寒意彻骨，虽不至于失温，却也能迫使两人蜷缩成团，正中囚禁者下怀。\n\n夜空繁星消失不见，轰鸣与碾磨声渐趋沉寂，古斯曼辗转难眠，失败的重担压的他喘不过气。“原谅我，朋友，现今的困境都由我一手造成，你不该为我的过错来这污秽至极的无间地狱受苦的。”他喃喃自语道。\n\n亚克希奇的笑声里带着一丝癫狂：“你得振作起来，梅里诺这场闹剧般的政变就是在自寻死路。只要圣地亚哥得知此事，他就得意不了多久了。”\n\n“不，你不懂，如果他们去搜查办公室的话，就肯定会发现那封……”他赶紧闭嘴，但已经晚了，同伴眼中的那份带着一丝恐惧的好奇已映入了他的眼眸。\n\n“发现了什么？你还做了什么，胡利奥？”“我写了……一封信。我妄想自己能和阿根廷达成协议。但我很明显失算了，这片荒芜的土地根本没什么和平可言。”\n\n惊惶的困惑转为清醒，亚克希奇发出痛苦的笑声，靠着船体跌坐下来：“你这回是真把自己玩儿死了。”古斯曼浅浅点了下头，啜饮着有些发酸的淡水，静候被背叛的友人向他投来鄙夷的目光。出人意料的是，亚克希奇竟蜷缩着靠近，同他一起寻求温暖的庇护。"
 antarctica_aac_merino.2.a: "“别担心，至少你不是孤零零下地狱的。”"
 antarctica_aac_merino.3.t: "战争之主"
 antarctica_aac_merino.3.desc: "在阿图罗·普拉特站休息室的废墟里，台球桌已经变成了作战桌，灯光刺眼地照射着铺满桌面的特里尼蒂半岛以及周边岛屿详细地形图。梅里诺站在主地图前，粗壮的手指划过它所标示的海岸线。在梅里诺身旁，伫立着刚刚晋升上校的科维安，他没有半点迟疑，彰显着自己崭新的权威地位。\n\n“长官，我们接手的这个局面……不太理想。”科维安依次指向地图上的数处位置，说道，“这里、这里、特别是格林尼治岛附近，岸防工事陈年老旧，根本不堪一击；燃料储备令人担忧，难以支撑长期作战行动；补给航线也始终非常脆弱，尤其是穿越德雷克海峡的时候。”\n\n梅里诺哼了一声，缓缓点头：“都是意料之中。”随即，他期待地望向科维安，“我们需要一个人来全盘整顿防务，他必须行事冷酷、果决高效。你力荐的那个人是谁来着，再和我讲一讲。”\n\n“长官，他叫曼努埃尔·孔特雷拉斯，我在战争学院的同学。他头上现在顶着一个教授的头衔，但理论研究浪费了他的才华。他在后勤、组织……乃至情报收集各个方面的工作上都拥有非凡的天赋，也了解南极行动的实际工作，并且还具备推动迅速变革所必需的……专注力。”\n\n“好，”梅里诺果断地说道，“就是他了，孔特雷拉斯。安排好，尽快把他调来。告诉他，国家需要他的特殊才能。”\n\n梅里诺再次俯身端详着地图：“阿根廷佬以为他们打败了我们，以为我们正像丧家之犬一样舔舐伤口。”他的嘴角掠过一丝微笑，“他们觉得我们会畏缩不前。正因如此——”梅里诺敲了敲地图上代表埃斯佩兰萨站的地方，“我们必须大胆出击，让这群蝼蚁害虫明白是在和谁打交道。”"
 antarctica_aac_merino.3.a: "汝欲和平，必先备战。"
 antarctica_aac_merino.4.t: "推荐人选"
 antarctica_aac_merino.4.desc: "梅里诺的靴子有节奏地敲击着地面，双手护着自己的脸。这处原属于古斯曼的办公室里，窗户已经结上了一层薄薄的霜，微光透入，将房间笼罩在冷冽的蓝色调之中。\n\n“长官，重复呼叫，您收到有关古斯曼阴谋的文件了吗？”\n\n无线电里只传来阵阵低沉的嗡鸣，信号模糊且断断续续，梅里诺不由握起了拳头。自从解放阿图罗·普拉特站以来，与圣地亚哥之间的联络就成了最困难的工作。\n\n终于，和对面连上了：“已收到……证据存疑。”\n\n存疑？梅里诺认定是自己听错了，上级应该是清白的：“长官，恕我直言，我们揭露的是最高级别的叛国行径。要是这些个布尔什维克真的能把整个国家都卖出去，他们绝对会这么干的。”\n\n无线电沙沙作响：“我们需要……更有力的证据来佐证你……”\n\n“你们会得到的。”梅里诺说道。\n\n“对战争的担忧正在滋生……昨天收到了利马方面的电报，秘鲁……取消了基地建设。风险太大，他们害怕阿根廷攻击。”\n\n那群安第斯山脉里的穴居人，血脉里印加战士的血性悍勇都哪儿去了。梅里诺强压住自己的嗤笑声，回复道：“我决不会允许阿德莱德岛那样的事件再度发生。”他清了清嗓子，“正因如此，我要求增派人手，此前的行政机构在防卫事务上完全是故意放任。”"
 antarctica_aac_merino.4.a: "“已经有人向我推荐了一名杰出的技术专家，曼努埃尔·孔特雷拉斯。请将他派到这里来。”"
 antarctica_aac_merino.5.t: "信逢其时"
 antarctica_aac_merino.5.desc: "当梅里诺坐在办公桌后试图放松时，一切都显得相当诡异。尽管付出了种种努力，但古斯曼的椅子依旧让他感觉十分别扭。指挥官牙关紧咬，盯着面前的文件堆——这些琐碎事务完全配不上他的身份。接着，他开始整理那座由未读信件和文件堆成的小山，连月来积压的文书因为近期的事件始终无人问津。当他翻阅着一堆堆无用的官僚废话时，他的手突然摸到了一封几月前寄来的亲笔信，信上赫然写着他的名字。他抓起信封刀，手腕轻轻一划，眼前浮现出那位备受尊崇的外交官，米格尔·塞拉诺的笔迹。\n\n“尊敬的梅里诺先生，首先请容许我为您致敬，感谢您在我们伟大祖国为守护这片冰封大陆上的文明而进行的永恒斗争中坚持不懈的奉献。我始终尽心尽力在外交领域效仿您的英勇事迹——可惜在这片舞台上，你我这般爱国者的心愿，往往会被别有用心之人所压制。若容我稍做浪漫畅想，我始终坚信人类的命运正系于地球南端。在您身上，我得以看出有人洞悉此理，因而深知我们的命运早已紧密相连。若您日程允许，我愿当面详谈我该如何为共同利益效力。谨祝康泰，愿天命之翼祝您攀登高峰。”\n\n“米格尔·塞拉诺敬上。”\n\n梅里诺靠在椅背上，思忖着手中攥着的这个机会。塞拉诺是智利外交界举足轻重的人物，行事虽特立独行，才能却无可否认。更重要的是，他的字里行间都流淌着对梅里诺近乎孩提般的崇拜。既然古斯曼能豢养一群外交官对他点头哈腰，他又有何不可？他把信纸搁置一旁，拿起崭新的信纸和一支笔，开始埋头书写。"
 antarctica_aac_merino.5.a: "“尊敬的塞拉诺先生，首先，我对您的赞誉不胜感激……”"
 antarctica_aac_merino.6.t: "微小颠簸"
 antarctica_aac_merino.6.desc: "梅里诺和科维安静静地站在跑道上。若非在凝视呼啸的暴风雪时，他们护目镜下的眼睛还会偶尔眨一眨，旁人几乎都要误以为他们是服装店里的人体模型了。一般来说，这种天气的时候，常人根本不会考虑动身出发来到南极，但孔特雷拉斯可不是一般人。风雪之中，一道灰色的影子渐渐现出轮廓：是一架塞斯纳336飞机。梅里诺不由屏住了呼吸：飞机下降率太大了，接触跑道的时候明显在摇摇晃晃。\n\n前起落架触地之后勉强支撑了一百米，随即突然弯折了下去，只见火花四溅，金属摩擦混凝土的音波就像用指甲抠黑板一样刺耳。两人默默地祈祷着。\n\n半分钟刺耳的尖啸过后，飞机终于停了下来，梅里诺和科维安急忙冲了上去。他们到近处时，舱门一下子弹开，飞行员慌乱之中拎着灭火器跑向机头；孔特雷拉斯则瞪大双眼，跟在飞行员后面跳下飞机，环顾着四周的新环境，活脱脱一副征服者踏足处女地的神态。他甚至根本不在意自己右手边的险情，抬手就给新上司敬了一记军礼。\n\n“老天啊！你没事吧？”梅里诺惊呼道，孔特雷拉斯闻言，突然停了下来，眼中闪烁着野性的光芒——是雄心和机遇交织而成的光芒。\n\n“二位！我这辈子没感觉这么好过！”在风声呼啸和灭火器呲呲作响之中，孔特雷拉斯如此大吼。梅里诺笑了，或许孔特雷拉斯本人真的和旁人所言一模一样。他向南极的新来客回敬军礼，领着他走向基地。"
 antarctica_aac_merino.6.a: "“跟我来，我们要讨论很多事情。”"
 antarctica_aac_merino.7.t: "难忘的一天"
 antarctica_aac_merino.7.desc: "在一间俯瞰圣地亚哥武器广场的昏暗办公室里，比利亚罗埃尔和米兰达蜷缩在杂乱的办公桌前，任由文件如同落叶般散落一地。\n\n这两位负责维护智利南极领土宣称的外交官，刚收到一封混乱的电报——南极冰原上的阿图罗·普拉特站发生了政变。信息透过杂波断断续续传来，每封电报都比上一封带来更多的疑问。\n\n比利亚罗埃尔盯着电报，眼中难掩疲惫。“这么多年的心血啊，”他喃喃自语，“从圣弗朗西斯科-德基多到蒙得维的亚，我们和美洲国家组织觥筹交错，和二流外交官握手寒暄……结果竟落得如此下场。”\n\n米兰达调整了下厚框眼镜，用铅笔轻敲了下桌面：“我们甚至都不知道古斯曼是死是活，直到开春前整个基地都跟个黑箱似的。但有一点再明确不过：这足够让我们的魅力攻势付诸东流。阿根廷秃鹫只要闻到一丁点血腥味就会扑上来。”\n\n比利亚罗埃尔从未感到过如此沉重的压力，他双手颤抖，又点了一支烟。这位六十二岁的外交官不禁怀疑，自己还能付出些什么。\n\n“现在还不能停，”米兰达打破了沉默，“我们得在流言传开前重新构筑外交叙述。或许该向美国施压。”\n\n比利亚罗埃尔吐出一道烟圈，凝望着烟雾缭绕的安第斯山脉：“我不知道啊，马西亚尔。我不好说我还有没有胃口再玩一轮这游戏。”"
 antarctica_aac_merino.7.a: "时间所剩无几，他们的梦想前途未卜。"
 antarctica_aac_merino.8.t: "棋子就位"
 antarctica_aac_merino.8.desc: "陆战队员胡安叹了一声，好友马蒂亚斯的车轻轻一撞，击落了他的车。马蒂亚斯得意洋洋，打趣道：“胡安，你可得更当点心，你的棋子消失得比古斯曼的爪牙还要快呢。”胡安还没来得及回击，一声哨响打断了他们：文德利希少校正站在棋盘边，俯视着他们，露出不悦的神色。胡安和马蒂亚斯忙起身敬礼，文德利希给了他们俩一人一张纸条。\n\n“你们自己下去找时间学新军规。如果我没记错，你们俩的休息时间一刻钟之前就该结束了。所以，这周就都去刷厕所吧。”文德利希说着，向两名低声嘟囔的士兵回礼。\n\n胡安收拾好棋盘，走向储物柜，开始做惩罚工作。他早就习惯了军事纪律，毕竟若是没有纪律，他就不可能在南极坚持到现在。然而，近来的纪律惩罚似乎越来越频繁，甚至有时候近乎荒谬，就连平民人员都得遵守新制定的严格规章。他听闻，梅里诺还在招揽线人，组建他自己的“盖世太保”来铲除古斯曼的残余势力；过去常规的官僚行政流程如今需要额外八级的层层审查；除了高级军官之外，基地各区域向所有人全面封锁——阿图罗·普拉特站俨然成了一座大监狱。\n\n许多人都怀疑，梅里诺的新狗腿子，孔特雷拉斯，就是这一切罪魁祸首。自从这位所谓的“后勤奇才”来到这里之后，他就鲜少在基地公开露面。他总是在食堂打包点吃的，然后匆匆溜回梅里诺的办公室。无论眼下基地里正在酝酿些什么事情，胡安都觉得大的要来了。但这位陆战队员也懒得去猜测什么幕后阴谋，他把漂白剂和热水混在拖把桶里，思绪飘回了刚刚的那盘棋局。突然间，他一拍额头，恍然大悟——那枚棋子明明就在眼前，可以帮他赢下棋局，但他却视而不见。就像之前数不清多少次一样，他只顾着盯着棋盘上的小卒……"
 antarctica_aac_merino.8.a: "却忽视了王后。"
 antarctica_aac_merino.9.t: "鲸鱼要没时间了"
 antarctica_aac_merino.9.desc: "梅里诺透过望远镜眺望着海岸线，听到无线电通讯时，他空闲的手用力地拍了拍桌子。亚克希奇的捕鲸计划已经遭到废止，而此时，开阔的海面上，一艘遗存下来的捕鲸船正驶向港口，计划进行紧急维修。\n\n“这破玩意儿跑这儿来干什么？立刻遣返，让他调头去蓬塔阿雷纳斯烂在港里算了。我希望，立刻把那个穴居人的什么什么计划统统扫进历史的垃圾桶，最快速度！”\n\n孔特雷拉斯准备着去执行命令，却又突然停步折返：“长官，我理解您的立场观点，但或许我们能稍稍利用您前任留下来的，呃，遗物。”\n\n梅里诺翻了个白眼，但没有打断他：“好吧，快讲。”\n\n“要是我们把这艘船扣下来，或许还能给它派上些用场。天知道我们现在有多缺新舰艇入列——这艘简直就是天降横财！长官，这可是难得一遇的良机啊。”\n\n“言之有理。”梅里诺慢慢说道，开始飞速思考起来，“先给他们修船，然后把船扣下来，编入海军编队，或许它还有用武之地。”他停顿了一下，随后朝孔特雷拉斯点了点头，脸上掠过一丝狼一样的狡黠轻笑。"
 antarctica_aac_merino.9.a: "“我就知道，找你来肯定有道理。”"
 antarctica_aac_merino.10.t: "上校的命令"
 antarctica_aac_merino.10.desc: "文德利希坐在椅子上，满脸困惑，坐立不安。他、孔特雷拉斯和科维安坐在那里，静静听着他们的领袖那愈发慷慨激昂的演讲，令他感到度日如年。好好的一场策划会议被他搞成了政治煽动。最糟糕的是，没人能看出上校葫芦里买的什么药。\n\n当然，他们都察觉到了一些蛛丝马迹。文德利希知道孔特雷拉斯正在改装一艘旧捕鲸船。但究竟为何如此？他也一直在执行科维安传授的日益残酷的训练计划，其中重点竟然是劫持人质。他本以为此刻就是真相大白之时，结果却又是场歇斯底里的辱骂。\n\n“背信弃义的阿根廷佬总是想尽办法找机会在背后捅我们刀子。那帮渣滓肯定觉得我们软弱可欺、四分五裂，毕竟阿德莱德岛和其他我们南极领土的合法控制权都已落入他们手中了。”梅里诺逐个瞪视部下，继续道，“必须让阿根廷佬打消这个念头，但时机不宜太早。眼下他们的狂妄正合我意。我们必须让他们迷醉在自信之中，直到步入我们的陷阱。”话音落下，他猛地把拳头往桌上一砸。\n\n紧张的沉默笼罩全场，三位下级像击鼓传花一样互相推诿提问。最终，这份不光彩的“荣誉”落到了文德利希头上。“长官，没人比我们更想看到阿根廷人狼狈不堪，但若是能知晓更多计划细节，我们相必能更为有效的协助您。若您能详述……”\n\n梅里诺举手示意，科维安立刻闭口：“莫为这些琐事操心，朋友。只需在明日0800前将陆战队全员装载至捕鲸船便可。还有——”"
 antarctica_aac_merino.10.a: "“——别忘了让他们着便装。这至关重要。”"
 antarctica_aac_merino.11.t: "钢丝上的小人物"
 antarctica_aac_merino.11.desc: "捕鲸船拍起冰冷的浪花，扑打在文德利希脸上，他浑身一阵颤抖。脱下海军陆战队标准军服、身着卑微捕鲸工的衣衫，文德利希感觉自己好像是赤身裸体一般。这几天，他们一直在阿根廷占领水域内巡弋，和心怀不满的捕鲸工人共同演绎这场捕鲸技艺的哑剧。\n\n文德利希伫立在右舷的瞭望甲板，疲惫的双眼凝望朦胧的远方。捕鲸船正将自身置于极度危险的境地——他们成了诱饵，等待着急于维护其非法统治的阿根廷掠食者扑上前来。\n\n多年的训练将他塑造成了优秀的战士，然而整个计划却违背了他身体上的每一根神经。文德利希毕生所学皆是成为猎手之道，磨练自己无情追踪、杀戮的技艺，如今他却被迫反其道而行，扮演起了猎物的角色。\n\n他又回想起了自己决定逮捕古斯曼的那个瞬间，如同此前无数次一样，思索着这个抉择是否正确。但此时此刻，他的沉思又添上了新的重量——自己背弃了对宪法的神圣誓言，难道只是为了穿着平民的衣裳死在这世界尽头？他是不是赌上一切，却将自己的命运和疯子绑在了一起？他眼角的余光瞥见了一道暗影，思绪骤然中断。\n\n那艘暗影中的舰艇很快宣告了其存在——扩音器轰鸣着，命令捕鲸船立即停船，准备接受登船检查。文德利希深吸一口气，颤抖的双手握紧了武器。"
 antarctica_aac_merino.11.a: "时机已至。"
 antarctica_aac_merino.12.t: "航船之上"
 antarctica_aac_merino.12.desc: "短短几分钟内，一切便尘埃落定。沉醉于胜利、正摩拳擦掌要洗劫捕鲸船的阿根廷水兵就像被抓到偷吃饼干的小孩子一样措手不及，发挥出的战斗力也和小孩子没差多少。随后，智利陆战队迅速展开了不流血的对峙和登舰行动，彻底击垮了这一小队阿根廷海军的战斗意志。他们漫长残酷的训练终于见了成效。\n\n陆战队控制住舰艇时，阿根廷舰长仍竭力在屈辱之中保留着一丝尊严，前来商议条件。文德利希直截了当地回话：\n\n“先生，你将被我军俘虏，然后立即遣返回本国，所有舰员的待遇也与此相同。至于这艘舰艇，智利方面即刻予以没收，现已归属于智利南极领地。”\n\n阿根廷人怒不可遏，双拳紧握，愤然咆哮着：“你们是疯了吧？是想要挑起战争，还是只是纯粹的蠢？”\n\n面对辱骂，文德利希仍然保持着职业军人的形象风范，冷静地反驳道：“多年以来，我方都一直在监控你方侵犯智利主权的行为，没收你方舰艇完全在我方的合法权限之内。若你方本国政府提出申诉，我方当然会予以考量。”阿根廷舰长意识到自己无力回天，只得悻悻低声抱怨起来。\n\n文德利希长舒一口气。梅里诺又一次疯狂的赌博成功了，而且这次竟然没有流血事件。这或许是他们领袖的第一步……"
 antarctica_aac_merino.12.a: "也是文德利希怀疑能否再次实现的奇迹。"
 antarctica_aac_merino.13.t: "小小投机的破产"
 antarctica_aac_merino.13.desc: "文德利希目送阿根廷舰艇消失在海雾缭绕的远方，他的脑袋嗡嗡作响，枪声仍回荡在耳畔。他低头看去，血迹斑斑的甲板上散落着战友的尸体，幸存的平民捕鲸工人呻吟着挣扎求生。文德利希挣扎着站起身，朝船头吐了口唾沫，但胆汁苦涩的味道仍在口腔中徘徊不去。\n\n行动从一开始就陷入了彻底的混乱。恐慌和敌意放大了陆战队员的失误，射击纪律失控导致开火过早，阿根廷水兵觉察之后立刻还击。于是，这场本该轻轻松松、不沾一点血腥气的一下子变成了长时间、代价惨重的枪战对射。更令文德利希羞愧的是，平民竟然也被卷进了杀戮的漩涡之中。\n\n战局最终陷入了僵持，但对智利一方极为不利。敌人已经远遁脱逃，他们只得留在原地收拾遗体和耻辱。愧疚和疲惫令文德利希头晕目眩，此刻的他只想一头倒在行军床上，然后再也不要醒来，但他身上还有职责。\n\n文德利希示意战友们保卫甲板以防敌人反扑、准备撤退，还活着的人蹒跚着去执行他的命令，他本人则思索着接下来的事情。毫无疑问，这次战斗重创了梅里诺确立智利权威的意图，当然还有他的声望。而陆战队，他们为这一刻苦训多年，但似乎依然还是不够。顶级掠食者……"
 antarctica_aac_merino.13.a: "沦落成了瑟瑟发抖的猎物。"
 antarctica_aac_merino.14.t: "协定"
 antarctica_aac_merino.14.desc: "阿图罗·普拉特站从前属于古斯曼的办公室里，电话线传来噼噼啪啪的电流杂音。南极荒原终于捱过了又一个冬天，联系上了圣地亚哥。梅里诺背靠椅背，靴子翘在桌上。电话另一端，在喧嚣的首都，米格尔·塞拉诺正在书房中踱步，四周的书架上摆满落灰的典籍。“梅里诺上校，”塞拉诺率先开启了话题，他的声线听起来像是丝绒一般柔润，“您的壮举宛如命运的战鼓。您直面阿根廷猛兽而生还——这般英雄气概不仅是勇敢，更是上天的预兆。”\n\n梅里诺咧嘴一笑，将电话线绕在指尖上：“英雄？我可不敢当，不过是习以为常而已。”\n\n塞拉诺也轻笑出声：“哦，远不止如此，我的朋友，你在南方的熔炉中淬炼了自我，弱者消亡、永恒者崛起——你我携手，大有可为。”\n\n“我确实承认你口才很好，但我不需要江湖骗子的花言巧语。我需要可靠的人，以及最重要的，忠诚的人。”\n\n塞拉诺停顿片刻，呼出一口浊气：“上校，毋需担心，你我命运相系。若你真的想要一个帝国，朋友，我也会为你奉上。”\n\n电话咔嗒一声挂断，梅里诺定定地盯着听筒，脸上浮现起冷笑。塞拉诺这家伙听起来更像是个疯神父，而不是个外交官，但这样轻狡的狂信徒也正合他用 。至于什么帝国之类的话，尽管荒诞不经，却也透露着莫名的诱惑。\n\n与此同时的圣地亚哥，塞拉诺也放下了电话，眼中闪烁着梅里诺无法厘清的狂热。在他眼里，这位上校不过只是他手中精心操控的工具，他的命运已然尽归塞拉诺摆布。"
 antarctica_aac_merino.14.a: "契约已立。"
 antarctica_aac_merino.15.t: "取而代之"
 antarctica_aac_merino.15.desc: "南极风暴呼啸着掠过阿图罗·普拉特站，风声透过电话线传到了另一边的圣地亚哥——比利亚罗埃尔正在杂乱的政府办公室里，紧紧地攥着听筒。\n\n“梅里诺上校，我有个令人不安的消息。”比利亚罗埃尔说道，“阿根廷竟然不知道走了什么门路，要加入美洲国家组织。”\n\n梅里诺的怒吼像是炮弹一样轰了过来：“你这没用的老黄鼠狼！这些年里我都在这地球尽头打着吃力不讨好的仗，为祖国在冰天雪地里流血，而你和米兰达就在办公室里舞文弄墨，许诺古斯曼会得到全世界的支持。结果呢？你们涂着口红，跑遍了半个大陆亲别人的屁股，然后这帮所谓的新盟友，就这么任凭阿根廷杂种狗继续朝我们脸上吐唾沫！”\n\n比利亚罗埃尔强迫自己深吸一口气，稳住绷紧的语气：“上校，只要您听我解释——”\n\n“我受够你的废话连篇了，你这软骨头蠢货！普拉塔蛮子连坐在粪堆上都不配，更别说美洲国家组织了。阿德莱德岛的事情还需要我再讲一遍？”梅里诺叹息一声，“下一轮谈判你不能自己去了，我派塞拉诺和你一起，得有个脊梁够硬的人盯着你。”\n\n比利亚罗埃尔眉头紧蹙，脑海中恐惧和困惑交织：“塞拉诺？米格尔·塞拉诺？派他来干什么？”\n\n“因为他不像你，他两腿中间还有卵子；因为他是难得一见的外交官，除了跪地求饶之外还会干点别的。”梅里诺低吼道，“你必须遵从他的一切指示，懂吗？不然我就建议你和米兰达赶紧爬回山洞里去当穴居猢狲吧。”"
 antarctica_aac_merino.15.a: "电话中断，徒留比利亚罗埃尔注视着不再传出声音的座机。"
 antarctica_aac_merino.16.t: "高空中的筹划"
 antarctica_aac_merino.16.desc: "安第斯山脉锯齿山脊的高空之中，一架豪华的DC-8客机正轰鸣着越过云海，载着比利亚罗埃尔和米兰达飞往华盛顿特区。客机内部相当奢华：抛光原木镶板、真皮座椅，甚至还有内比奥罗红酒、水晶杯和斟酒的姣好空姐。但是，二人都视若无睹，空气中弥漫着比雪茄烟还要浓重的恐惧。\n\n“梅里诺已经亮刀子了，”比利亚罗埃尔晃着酒杯，目光直视天际线，说道，“他正嗅探着血腥气，马西亚尔。如果阿根廷这次真能钻空子混进美洲国家组织——那就会是他赶走我们的借口。”\n\n米兰达正了一下自己的眼镜，没有伸手去拿酒杯：“那家伙是条鲨鱼，压制我们还不够——他是想羞辱我们。我敢用我的公文包打赌，这次会议就是我们外交旅途的最后一站了，之后，他和他的新宠塞拉诺就会把我们给吃干抹净。”\n\n比利亚罗埃尔点点头：“狡猾的上校肯定以为我已经没办法了。或许也差不多，毕竟我已经半只脚踏进退休的门槛了，但我绝不会让他毫无阻力地接受这一大堆烂摊子。马西亚尔，我已经选好了一个人，我的继任者。”他俯身，压低声音继续说道，“奥斯卡·皮诺切特——外交官、探险家、痴迷南极、家族还有军方背景。他骨头硬，能制衡梅里诺的狂妄、遏制塞拉诺的疯癫。”\n\n米兰达挑眉道：“皮诺切特？要是他真有你说的一半精明敏锐，或许就能在那个蛇穴里活下去。”\n\n“他不是我，至少现在还不是，但他会学。梅里诺想要一匹战马，而我却要给他一位战略家。”比利亚罗埃尔举杯道，“敬我们自己，马西亚尔，祝我们这么多年在现实和外交场上躲过了数不清的明枪暗箭。永远别忘了，我们共同筑起了一座堡垒，哪怕是梅里诺也不能轻易摧毁它。”\n\n米兰达端起酒杯，与友人相碰："
 antarctica_aac_merino.16.a: "“敬皮诺切特，祝愿他能躲过我们没能躲过的阴谋。”"
 antarctica_aac_merino.17.t: "走走过场"
 antarctica_aac_merino.17.desc: "智利大使馆里，轻纱一般的烟气袅袅升腾，咖啡杯轻微的碰撞声打破了寂静。比利亚罗埃尔、米兰达、塞拉诺围坐在铺满地图和档案的桃花心木桌子旁——还有仅仅几个小时，美国国家组织会议就要召开了。\n\n比利亚罗埃尔因彻夜未眠而嗓音沙哑。他摊开文件，说道：“我们手上有报告，阿根廷袭击阿德莱德岛的。日期、伤亡、臂章、水上飞机残骸在现场遍地都是。我们把这份材料提交给美洲国家组织，这是扭转局势最好的机会。”\n\n米兰达边翻阅文件边点头，眼镜片折射出一道光芒：“美国人可能会上钩。若是提出维护地区稳定的理由，乌拉圭和巴拉圭也可能可以说服。虽然不是万无一失，但也是筹码。”\n\n塞拉诺听完，就往椅背上一靠，深邃的双眸中闪烁着蔑视，噙着冷笑说道：“筹码？二位，请别开玩笑了，你们当真以为那薄薄几张纸就能吓退敌人？在针对治理文明的金融和政治阴谋面前，你们的哀求根本就是毫无用处。”他说着，把烟灰弹到了桌上。\n\n比利亚罗埃尔紧握双拳，回击道：“塞拉诺，我们是在为智利的主权而战！你到底站在哪一边？坐视不管吗？”\n\n塞拉诺笑出了声：“我在哪一边？我既不会向提线木偶卑躬屈膝，也不会向美国佬乞讨残羹冷炙。阿根廷和他们背后的金主早就已经赢了，这一切……不过是场闹剧。”\n\n米兰达猛地合上文件夹，语调尖锐起来：“若是闹剧，那你还在这儿干什么？专程来幸灾乐祸？”\n\n塞拉诺狐狸一般的笑容更深了：“我在此是奉梅里诺的意愿。你们、注定、失败——而我，将亲眼见证你们的失败。”他起身拂了拂身上的西装，示意两位外交官跟上他。"
 antarctica_aac_merino.17.a: "会议即将开幕……"
 antarctica_aac_merino.18.t: "相称原则"
 antarctica_aac_merino.18.desc: "“诸位先生，我必须重申，南极边界争端这一悲剧性问题不能偏颇地完全归咎于阿根廷——正如比利亚罗埃尔先生想让诸位相信的那样。我方提交的证据正佐证了这一点。”\n\n阿根廷代表冗长绕弯子的发言结束后，现场传来纸张悉悉簌簌翻动和椅子在瓷砖地面上拖曳刮擦发出的声响。比利亚罗埃尔打量了一下那位年轻的阿根廷外交官：他的头发打理得油光水滑，西装剪裁合体，嘴角强忍着冷笑。此时，会议室正在审阅照片和文件，其证明梅里诺的爪牙非法扣押了阿根廷船只。\n\n比利亚罗埃尔心中发出了这个月里对梅里诺的第一百次咒骂，俯身贴近麦克风，驳道：“必须指出，阿根廷士兵是在智利领海水域被智利政府扣留的，我方强烈反对所谓‘智利无权行使其主权’的说法。”\n\n“智利海军陆战队员当时并未身着军装，”阿根廷代表即时反论，“这是蓄意设下的陷阱。”\n\n比利亚罗埃尔笑了，他推了推眼镜框，嘴角微微扬起：“智利武装力量有责任捍卫国家边境，且在行动中，智利军队并未野蛮杀害平民人员及破坏外国财产，而阿根廷在阿德莱德岛的侵略行为却并非如此。”\n\n会议室中又传来纸张翻动和椅子摩擦地面的声响，代表们又翻回了阿德莱德岛失踪人员名单一页，他们的遗体至今都仍下落不明。委内瑞拉代表凑到古巴代表耳边低语；海地代表抿紧了嘴唇；秘鲁代表的叹息经过麦克风放大，在全场清晰可闻；年轻的阿根廷外交官擦拭着额头的汗水，与智利老人四目相对；比利亚罗埃尔发言结束，安稳地坐在自己的座位上。"
 antarctica_aac_merino.18.a: "阿德莱德岛不是一次悲剧，而是一场罪行。"
 antarctica_aac_merino.19.t: "请君入瓮"
 antarctica_aac_merino.19.desc: "解放者西蒙·玻利瓦尔会议厅被恐怖的氛围所笼罩。\n\n这就是个陷阱，而比利亚罗埃尔则对此束手无策。阿根廷人打开了放映机，他却只能无助地坐在一旁。代表们被震惊得一言不发，静静看着梅里诺惨败的粗糙影像投影在昏暗的柱廊中，闪烁着绚烂的光芒。影像里，一个阿根廷小年轻的脸被智利的枪弹撕开，就好像熟透的果子在地上绽裂，喷射出鲜红的果浆；在临时医院中，士兵们如同一个个鲜血淋漓的垃圾袋，无力地瘫坐在床上；棺材整齐排列，上方铺着蓝白条纹的三色旗，“五月太阳”在其中央清晰可见。\n\n放映机咔哒咔哒着停转时，惊骇的低语率先打破了寂静。“智方谴责这种赤裸裸的情感操纵手段。”比利亚罗埃尔站在顶灯下说道，他的面容隐没于刺眼强光中。\n\n“我方只是向组织证明，南极地区的侵略行径绝非单方面所为。”那个年轻的阿根廷代表不甘示弱。\n\n“我要提醒各位代表，这起惨案发生在智利领海内，而阿根廷海军则是非法侵入该海域的。”比利亚罗埃尔，这位满头银发、临近退休的外交老将直言不讳。\n\n阿根廷代表紧握话筒，反驳道：“本场事件的起因不正是智利部队伪装成平民，进行悍然无耻的欺骗行动吗？”一边说，他的嘴角一边微微上扬，“我更要指出的是，正是阿根廷水兵的英勇无畏才挫败了这场行动。”\n\n乌拉圭和厄瓜多尔的代表席开始骚动，低沉的商议声自中美洲代表团传来，而那位准许阿根廷播放影片的美国代表则洋洋得意地露出了一抹轻浮的笑。比利亚罗埃尔瘫坐在位子上……"
 antarctica_aac_merino.19.a: "漫长的职业生涯，还是敌不过众口铄金。"
 antarctica_aac_merino.20.t: "还不错的外交结果"
 antarctica_aac_merino.20.desc: "“能做的我们都做了。”\n\n比利亚罗埃尔不确定此刻的自言自语究竟是在预演和米兰达的对话，还是单纯的说给自己听，但对象显然肯定不会是塞拉诺或是梅里诺——反正这俩人早就准备要把他踢走了。去他妈的，他们又没有为了这一刻跑遍整个西半球。\n\n最终投票结果仅仅只有四票之差。虽然美国还是投票反对智利，但他们已经做得相当不错了。美洲宫中人声鼎沸，闪光灯交织闪烁，记录着阿根廷以试用观察员身份加入美洲国家组织的时刻。\n\n然而，镜头也同样见证了另一项决议：谴责阿根廷对阿德莱德岛的血腥入侵，并保证捍卫智利的主权和领土完整。比利亚罗埃尔没什么好抱怨的，他们走遍了美洲大陆，与许多人共进晚餐、真诚交流，若是这样的回报还觉不够，那只要看看阿根廷代表红得好像要冒烟的脸，一切就都值得了。\n\n但梅里诺肯定觉得不够。比利亚罗埃尔觉得，除非自己能当场毙了阿根廷代表，然后再饮弹自尽，否则梅里诺就绝对不会罢休。他拉起整洁的行李箱离开会场，决定在华盛顿特区好好转一转，再回酒店去。"
 antarctica_aac_merino.20.a: "好多度过些平和的时光。"
 antarctica_aac_merino.21.t: "死胡同"
 antarctica_aac_merino.21.desc: "“美洲国家组织严正谴责南极边界冲突中双方持续实施的暴力行为，并承诺致力于通过和平方式解决争端，同时尊重智利与阿根廷两国之主权……”\n\n决议的其他内容都净是些空头支票，除了越来越多模棱两可的话之外什么都没有。比利亚罗埃尔双手掩面，米兰达则翻阅着文件和报纸。收音机播放着杂乱的歌曲，与华盛顿高峰期的喧嚣交织在一起。\n\n“我们啥都做不了了，”比利亚罗埃尔喃喃道，“阿根廷人进来了。”\n\n“这只是个试探。”\n\n“安慰奖罢了。美国人到处施压，他们为阿根廷人争取的利益比我们为自己争取的还多。”\n\n米兰达捏了捏比利亚罗埃尔的肩，痛苦地沉默了好一会儿才想出合适的话：“我们已经尽力了。”\n\n但他们真的尽力了吗？即便尽力了又如何？这正中梅里诺的下怀——这次会议是外交途径注定失败的铁证，以及足以将两人一并撤职的充分理由。南极军事化的势头将再也无法阻挡，决议形同虚设，阿德莱德岛的惨剧将会一而再再而三地上演。他们再也无力与之抗衡。"
 antarctica_aac_merino.21.a: "梅里诺的方案将成为唯一出路。"
 antarctica_aac_merino.22.t: "良心的囚徒"
 antarctica_aac_merino.22.desc: "悲惨、煎熬、麻木——古斯曼还要在这凄凉的囚禁中承受多久的罪责重负？圣地亚哥干燥的风让他倍感难熬，熟人面貌久已暌违，只能靠尝不出味道的稀粥和身上挂着的破烂布条维持生命。或许他是因鼓吹最为可憎的叛国和平思想而咎由自取，又或者梅里诺的政变只不过是个疯狂病态的玩笑。但当法庭裁定的真相即将公诸于世时，这些都已经无关紧要了。\n\n古斯曼凝视着牢房龟裂的混凝土墙，懊悔自己居然大祸临头而懵然不自知。也许吧，他真的是咎由自取，一边信任张着血盆大口的蟒蛇，又在另一边把莱亚尔上校这位阿根廷人引为同道。无数过错聚沙成塔，终于让自己落得如此狼狈，声名尽毁——除了自己的自负，他还能怪罪什么呢？\n\n支持他的律师和活动家们还在共同奋战，为挽救他这具躯壳的声誉而祈求哪怕最为微小的一丝丝机会。一个问题萦绕在古斯曼痛苦绝望的脑海之中：如果说，一个国家的守卫者都如此鹰视狼顾，哪怕为了一点点的利益都敢反咬一口，那国家会变成什么样子？\n\n南极领地的确是军事设施，可以不受民主规则的约束，但像梅里诺这样受托守护智利国家制度的军人，他们的品格竟然已经堕落到了如此地步，以至于在他们眼中，仁慈成了罪过，战友情成了罪行？若是领地成了这副模样，那这样的风气蔓延回祖国，又还会有多久呢？"
 antarctica_aac_merino.22.a: "——直到狼群循着鲜血的气味，来到圣地亚哥。"
 antarctica_aac_merino.23.t: "国家的救主"
 antarctica_aac_merino.23.desc: "阿图罗·普拉特站的办公室宛如一座孤独的堡垒，墙上挂满了南极地图和褪色的海图。梅里诺上校瘫在椅子里，军靴搭在桌上，半截雪茄冒着青烟。他面前堆着一摞文件，其中多是例行公文，但其中一份吸引了他的目光：奥斯卡·皮诺切特——比利亚罗埃尔推出来加入管辖机构的走狗。梅里诺嘴角扯了一下，草草签下名字。“那个招摇的花花公子。”他咬牙切齿地低声说着，“比利亚罗埃尔女里女气的跟班小弟、养企鹅当宠物的外交官、屁眼里塞着银汤匙出生的富家子。以为他会能拴住我？我非得拧断他脊柱，扔海里喂海豹吃。”\n\n梅里诺靠回椅背，吐出一团烟雾，思绪拉远。海军陆战队如今已经淬炼成了极寒地狱的顶级掠食者，它的利爪跃跃欲试，要撕裂阿根廷的喉咙。阿根廷那样的豺狼小人都能溜进美洲国家组织，恰恰证明外交不过是懦弱的闹剧罢了。陆战队将成为智利的尖牙利齿，梅里诺便是指挥它们移动的颚骨。他想象着阿根廷舰艇在炮火下支离破碎，他们的国旗没入冰封深海——真是令人畅快。\n\n但塞拉诺的话语依然挥之不去，那些有关命运、有关帝国的狂热论断。摧垮阿根廷固然要紧，可之后呢？智利本身早已溃烂，社会腐朽堕落，在自我放纵的重压之下摇摇欲坠。政客在圣地亚哥吵个不停，权贵无一不贪污受贿，民众焦躁不安，渴求着更强有力的统治。梅里诺的手指敲击着桌面，也许塞拉诺不是个疯子，也许他那些话中隐含着真理。\n\n他掐灭雪茄，目光骤然凝聚。首先，他要将阿根廷碾作尘土，夺回肮脏之徒窃取的每一寸国土。然后呢？若是国家无法自救……"
 antarctica_aac_merino.23.a: "便是需要伟人之时。"
 antarctica_aac_guzman.1.t: "破冰"
 antarctica_aac_guzman.1.desc: "“蠢货！他们以为这么做能干成什么事？”古斯曼怒吼着，胳膊扫过桌面腾出来一块地方，然后猛地把地图拍到桌子上展开。一个玻璃镇纸受到波及跌落地面，摔得粉碎。\n\n古斯曼的愤怒渐渐消退，恐惧取而代之，他不由得打了个寒颤：梅里诺这场闹剧一般的政变企图很快就会传遍世界。这个妄自尊大的家伙真以为自己是拿破仑·波拿巴，可以说是一举彻底击碎了古斯曼在南极大陆为智利精心塑造的冷静、高效的形象。但是，上校危及的还不仅仅只是智利的声誉。阿根廷近来行事愈发嚣张，阿德莱德岛事件已经彻底撕下了他们的伪装，要是让他们嗅到阿图罗·普拉特站内部出了问题，古斯曼都不敢想会怎么样。\n\n当他陷入沉思时，一只手搭上了他的肩膀。古斯曼转身，看到了嘴里叼着香烟、怀里搂着一堆文件的亚克希奇。\n\n“老兄啊，往好处想，在这地方可是难得见到理性能占上风。”亚克希奇把文件摊到地图上铺开，笑着安抚古斯曼。古斯曼深吸一口气，又长叹一声，他真希望自己也能像朋友一样乐观，但在未来面前，安慰也只不过是徒劳。\n\n眼下他们能做的只有清除残存的阴谋爪牙，为即将到来的寒冬做好准备。一念及此，他抿着嘴唇，向亚克希奇点了点头。亚克希奇随即把烟灰弹进了空咖啡杯。"
 antarctica_aac_guzman.1.a: "“卡洛斯，干活儿！”"
 antarctica_aac_guzman.2.t: "笼中毒蛇"
 antarctica_aac_guzman.2.desc: "营房旁边的储藏间稍稍加固之后，摇身一变成了临时拘留室，里面虽说寒冷，但也不到要人命的地步。梅里诺上校僵硬地坐在行军床上，虽然他身上已经没有了军装，但坐姿仍然笔挺，浑身上下散发着生人勿近的蔑视气息。两名持枪的陆战队员面无表情地守在门外，古斯曼教授独自走进去，关上了门。\n\n“上校，”古斯曼的声线低沉而疲惫，丝毫听不出胜者的得意，“你必须要做出解释。对合法政府管辖机构发动武装叛乱……是什么让你决定这么做？”\n\n梅里诺依然目光平视前方，下颌肌微微抽动，没有回应问话，只是用嘴角扯出一丝傲慢的弧度。\n\n古斯曼叹息着揉按着自己的太阳穴：“你当真认为你的部下会追随你的叛国行为？”\n\n依旧是沉默，房间中只能听到远处基地发电机的嗡鸣。梅里诺微微挪了一下身子，双臂交叉，目光轻蔑地扫过古斯曼，随即又落回了正前方的墙壁上。\n\n古斯曼试着换了种问法：“你针对我的指控……那些毫无根据的无稽之谈，是为了这场疯狂找理由？”\n\n梅里诺终于开口了，他的话语中夹杂着低沉的嘲讽：“我只回答爱国者的问题，而不是天天伏案文书、对阿根廷卑躬屈膝、勾结社会主义者的寄生虫。”\n\n古斯曼心头一怒，又迅速压下了自己的情绪，和梅里诺这人针锋相对完全没什么意义，反倒徒然自降身份。他一言不发地转身离去，重重地关上了房门。梅里诺已在控制之下，危机已经过去，他现在得去报告情况了。古斯曼这样想着，迈着坚定的步伐走向无线电室。"
 antarctica_aac_guzman.2.a: "有些囚笼里，关的全都是鄙夷。"
 antarctica_aac_guzman.3.t: "权力杂音"
 antarctica_aac_guzman.3.desc: "这处办公室狭窄寒冷，今夜更是添了一分令人窒息的气息。古斯曼教授俯身在基地的无线电发射器前，话筒沉甸甸地握在手中，他那常年都显得疲累坚忍的脸庞此刻正紧绷着强忍怒火。梅里诺上校的行径越界了——这是赤裸裸的傲慢挑衅，他再也无法视而不见。\n\n古斯曼做了一次深呼吸，然后按下了话筒开关：“阿图罗·普拉特站呼叫圣地亚哥指挥部。古兹曼教授报告。完毕。”\n\n一阵嘶嘶的杂音后，听筒中传来清晰干脆的回应：“圣地亚哥指挥部，收到，教授。请继续。完毕。”\n\n“报告重大事件。梅里诺海军上校挑起武装冲突，企图非法逮捕合法文职当局人员。事态已升级为公开叛乱，忠诚人员于稍早前镇压了叛乱分子。上校现已被拘押。请求立即下达部长级命令，处置叛国行为中被捕的高级军官。完毕。”\n\n随之而来的沉默凝重得让人喘不过气来，唯有电流杂音在空气中回荡。十秒、十五秒——古斯曼感觉自己太阳穴上的血管在突突跳动：圣地亚哥在犹豫吗？二十秒。\n\n无线电噼啪作响，回信来了：“古斯曼教授，圣地亚哥指挥部报告已收悉。请准备接收。”又一次更短暂的停顿，他仿佛都能听见对面轮盘操作转动的声音，“立即解除梅里诺海军上校的南极职务。安排运输。命令将其押解至瓦尔帕莱索海军司令部接受军事法庭审判。完毕。”\n\n“圣地亚哥指挥部，命令收到，无异议。”古斯曼回应道，“立即执行。阿图罗·普拉特站，完毕。”\n\n联络结束，古斯曼关上了发射机，房间骤然陷入深沉的寂静。他靠在吱呀作响的椅子上，揉了揉疲累的双眼……"
 antarctica_aac_guzman.3.a: "浑身上下顿感轻松。"
 antarctica_aac_guzman.4.t: "继任人选"
 antarctica_aac_guzman.4.desc: "阿图罗·普拉特站里举行的宣誓仪式简短而冷峻，在拍击着墙壁的暴风中，科维安庄严立下了誓言。他身着笔挺的海军军服，神态坚毅冷静，目光审视着众人，似乎永远都在计算着些什么。古斯曼教授立在一旁，双臂交叉，饱经风霜的面容强作镇定，但在内心深处，信任正悄然崩塌——在他看来，科维安是梅里诺的影子，同样是一条疯狗，蔑视文职政府、共产主义者和阿根廷人，只是古斯曼很好地掩饰住了自己的想法。\n\n科维安被送到了原先属于梅里诺的办公室，这里以后就属于他了。地图仍然钉在墙上，地板上洒满了雪茄烟灰。古斯曼在科维安身后，嘴角挂着淡淡的冷笑。他半点都不相信科维安这个人，但他相信科维安的贪婪：他这样野心勃勃的小人物向来如此——晋升、权力、能满足自尊的闪亮头衔，足够牢牢拴住他了。\n\n科维安走进办公室，医生一般的精准目光扫过屋内的角角落落。他的嗓音低沉且不带感情，划破了房中的空气：“海军陆战队仍然是一块生铁，纪律尚可，但锋芒仍需磨砺。几个月之内，我就能将他们练成摧垮敌人意志的利刃，只要您下命令。”科维安的目光转到了古斯曼的身上，坚定不移地凝视着自己的上司。\n\n古斯曼收起笑容，冷冷地点了点头。科维安的确优秀能干，甚至或许有点太能干了，此前他就正在将梅里诺麾下的海军陆战队淬炼成为冷酷的杀戮机器。他们确实极为忠诚，但过去这份忠诚属于梅里诺。不过，名为自私自利的缰绳终究比理想更为牢固。古斯曼转身出门，说道：“维持好秩序，科维安，这是我的命令。”他没有回头，信任是奢侈品，但掌控并不是。"
 antarctica_aac_guzman.4.a: "凶兽驯服？"
 antarctica_aac_guzman.5.t: "宽慰"
 antarctica_aac_guzman.5.desc: "米兰达和比利亚罗埃尔不习惯面对无法回答的问题。梅里诺上校被捕的小道消息已经在圣地亚哥政坛不胫而走，跑得快的记者、爱管闲事的官僚和粗鲁的军官就像闻到蛋糕香甜味的苍蝇一样蜂拥而至。作为南极领地机构的一员，他们应该了解所有的阴谋论，更该明白梅里诺上校狂言中“犹太-阿根廷布尔什维克穴居人”的真正含义。\n\n“我早就知道那家伙危险得很。”米兰达高声咆哮，“我能警告教授的，我应该提醒他的。”\n\n“我们等他的消息。”比利亚罗埃尔兀自像念咒语一样重复念道。他们竭力克制着登上最近一班飞机或是轮船、抛下手头工作去确认古斯曼安危的冲动：二人清楚，教授要是知道他们这么做，一定会相当不悦——如果他还活着的话。\n\n日出之后的几分钟，圣地亚哥播出了新一天的新闻。比利亚罗埃尔守在半导体旁边，指节敲击着窗玻璃，目光沉浸在窗外薄雾笼罩的混凝土和砖墙上。快讯切断悦耳的摇滚乐时，他立刻叫来了米兰达。\n\n听到古斯曼和亚克希奇的声音之后，他们终于松了一口气。节目中的两人显得惊魂未定，正回答着有关梅里诺失败政变的问题，显然是安然无恙。当他们宣称智利南极研究所的工作将不会受到任何阻碍、继续进行时，米兰达面无表情地点了点头，沙哑地说道：“我以为我害他们受伤了。”\n\n“你太自责了，我的朋友。”比利亚罗埃尔望着晨光从安第斯山间露出，雾气渐渐散去。山峦之间仍有阴影，二人意识到，一扇崭新而可怕的大门已经开启。梅里诺已经是一枚弃子，但……"
 antarctica_aac_guzman.5.a: "一粒老鼠屎，搅坏一锅粥。"
 antarctica_aac_guzman.6.t: "驯化"
 antarctica_aac_guzman.6.desc: "文德利希身着军礼服站在寒风中。他向来不喜欢成为被众人瞩目的焦点，但至少此刻他正站在智利国旗下的临时台子上，这份关注还是出于赞誉之意。\n\n“谨向巴勃罗·文德利希海军少校颁发勋章，以表彰其英勇功勋！同时，正式晋升文德利希为海军中校！祝贺您！”古斯曼高声宣布，将勋章别在文德利希胸前，陆战队员们爆发出热烈的掌声。文德利希竭力抑制着身体的颤抖，向古斯曼行标准军礼，军乐队奏响国歌。然而此刻的欢呼之中，他却突然感到一阵愧疚。尽管内心确信自己做出了正确的选择，但这份荣誉却空洞得如同出卖神圣军令换来的五十块银币。\n\n就连这次晋升也透着一股腐败的功利味道。文德利希之所以能获得这个人人梦寐以求的职位，纯粹是为了在政变涉案人员被移送军事法庭之后充实队伍。另外，他们还得接受训练，学习新的军事理论。梅里诺曾试图将陆战队打造成一支进攻性力量，但如今随着新盟友纷纷在智利领地上建立基地，这头顶级掠食者将要被驯化成一只普通的看门狗，处于严密控制之下、拴在拉紧的绳索上——文职当局正在竭力铲除梅里诺的残余势力。\n\n在海军陆战队员欢庆的人群中，他瞥见了被掌声包围的科维安，他勉强掩饰之下的狞笑仍然清晰可辨。显然，科维安对屈从于古斯曼、不得不自我阉割的愤懑尚未平息，而放眼南极，怀恨在心者绝非仅此一人。营房里彻夜回荡着低语与抱怨，海军陆战队究竟能否长久接受古斯曼的新秩序？"
 antarctica_aac_guzman.6.a: "只能说，这是个开放性问题，难说。"
 antarctica_aac_guzman.7.t: "南方猎人"
 antarctica_aac_guzman.7.desc: "阿图罗·普拉特站，亚克希奇主持派出的第一艘捕鲸船“南方猎人号”正系泊在码头上随波起伏。古斯曼教授手持一瓶智利红酒立于船首，焦急而又自豪的亚克希奇与船员们分列两侧。\n\n“愿她为国家带来繁荣，愿全体船员平安归航。”古斯曼扬声宣告，将酒瓶重重砸向了钢铁船艏。然而，本该清脆的碎裂声却变成了沉闷的闷响，瓶中的深红酒液没有飞溅开来，而是在碰到金属的一瞬间就在船艏凝结成了诡异的冰冻污痕。几声尴尬的咳嗽打破寂静，甲板水手匆忙上前，开始用刮刀和蒸汽水管清理这层令人难堪的冰霜。亚克希奇的脸上勉强挤出笑容，打起了圆场：“教授，这才是真正的南极式下水仪式。”\n\n波涛深处的沉重水压之下，除了同类遥远的歌声，世界昏暗寂静。此刻，一种新的震动闯了进来——它并非来自自然，富有节奏，并且正在不断增强，持续的脉冲划破了熟悉的潮汐节律。那是坚硬而无情的物体在水中移动带起的轰鸣，是不属于这无垠流动虚空的存在。好奇驱使着大蓝向着光亮游去，在这永恒的瞬间之中，他只能看到灰蒙蒙的天空。随后，他注意到了近处的一个尖锐轮廓，那就是震动的源头，看起来十分渺小、黑暗。\n\n骤然尖锐的爆响在海水中激荡，紧接着，他感到侧腹部深处撕裂般的剧痛。他本能地嘶吼着下潜，逃回熟悉的黑暗深海，但当他挥动强健的尾鳍时，一股可怖的未知重力牢牢地抓着他，无情地向上牵引。粗硬坚韧的绳索咬住他身侧火烧一般剧痛的伤口，让猎物不得逃脱。伤口四周的浑浊海水中，绽放出温暖而幽暗的色泽。"
 antarctica_aac_guzman.7.a: "狩猎开始了。"
 antarctica_aac_guzman.8.t: "已知之未知"
 antarctica_aac_guzman.8.desc: "报告的最后一页沉沉落在古斯曼教授桌上。阿德莱德岛的惨剧在纸页间详尽记录，勾勒出的画面清晰无比。调查大功告成，而结论水落石出：阿根廷正是屠杀的幕后黑手。\n\n指挥简报室的空气凝重得像是能被小刀划开。科维安站在那里，一动不动，目光紧紧锁定古斯曼递来的文件。亚克希奇向前倾身，全神贯注，捕捉着每个细节。古斯曼条理分明地将事实和盘托出：毫无征兆的袭击、文德利希寻获的阿根廷军服碎片、陆战队回收的飞机残骸，以及对智利主权的公然侵犯。\n\n“证据确凿无疑，”尽管心中翻江倒海，但古斯曼依旧声线平稳，“阿根廷未经任何挑衅或正当理由就悍然发动了袭击。”他轻敲了一下那摞厚厚的档案，“我马上就把副本发给蓬塔阿雷纳斯的米兰达和比利亚罗埃尔。这……这场暴行……将成为我们最强力的外交武器。当美洲国家组织知晓阿根廷的罪行后，他们或许就不是白白牺牲了。”\n\n但当他后来独自待在办公室时，却再也没法装的和职业官僚一样泰然自若了。莱亚尔，那个阿根廷上校。那个曾让古斯曼小心翼翼地试着秘密联系他，企图在这冰封地狱里寻得一条理性之路的人……真的会批准此等暴行？那些暗示着相互理解、可能妥协的暗号，难道全是精心组织的骗局？这个念头令他感到一阵反胃。信任——南极大陆上最脆弱也最珍贵的财富——看起来已让阿根廷军靴踩了个稀碎。诚然，智利如今已经掌握了无可辩驳的外交优势，但为此付出的代价……付出的牺牲……在古斯曼眼中是如此令人作呕、难以承受。"
 antarctica_aac_guzman.8.a: "此等罪行决不能逍遥法外。"
 antarctica_aac_guzman.9.t: "疾声呼救"
 antarctica_aac_guzman.9.desc: "阿图罗·普拉特站的无线电室狭小拥挤，四处都是交缠的电线和闪烁不停的仪表。操作员正弯着背伏在设备前，耳机紧紧地压在耳廓上，捕捉着刺破南极寂静的微弱信号：这通信号来自马丘比丘站——这处南极基地刚刚建立不久，位于不久之前发生流血事件的温克岛，现在只有寥寥几处庇护所，是比利亚罗埃尔与米兰达艰难外交博弈的成果之一。信号杂波中断断续续传来急促绝望的呼救：“紧急……紧急……请求支援……”随后，信号戛然而止。\n\n操作员双手颤抖着扯下耳机，冲向古斯曼的办公室。此时教授正伏案处理乱成一堆预算表。“先生，”操作员结结巴巴地说，“秘鲁那边出了状况。他们发来了紧急呼叫，然后突然中断了。”\n\n古斯曼一下子坐直了：又是危机，麻烦事就从来他妈没断过，阿德莱德大屠杀，梅里诺背叛，现在又是一摊事。他揉着太阳穴，智利南极领地的重担压得他喘不过气来，通过获取主权承认实现和平的宏伟梦想此刻却正幽灵一般从他的指缝间溜走。“召集全员，”他沙哑着嗓子命令，声音粗粝坚定，“五分钟后会议室集合。”\n\n基地一阵忙乱，众人陆续抵达会议室，科维安带着文德利希和几名海军陆战队员参加，亚克希奇也到了，疲惫与怀疑挂在每个人紧绷的脸上。古斯曼站在上首，会议桌上铺着领地地图，秘鲁前哨站用了醒目的红色标示，仿若刺进空白处的针尖。“我们收到了求救信号。”古斯曼双手撑桌，“马丘比丘站发出了紧急呼叫，没有具体信息，在呼叫‘紧急’之后就没有了下文。可能是设备故障，也可能更糟。虽然我们手头的兵力捉襟见肘，但也绝不能忽视这一警报。”他转向科维安和文德利希，刻意停顿片刻，竭力掩饰自己声音中的勉强，说道："
 antarctica_aac_guzman.9.a: "“派陆战队去。”"
 antarctica_aac_guzman.10.t: "进入暴雪"
 antarctica_aac_guzman.10.desc: "科维安冷酷坚毅的声音率先划破寂静：“出动陆战队？教授，这并不明智。暴风雪正在他们的基地附近肆虐——那里能见度为零，狂风更是能撕裂我们的雪地车。我们冒着人车两空的风险，究竟是为了什么？那片本就不该存在的帐篷群？”他目光坚定，把双手背在身后。\n\n古斯曼嘴唇紧抿：“那是我们的领地，科维安。他们也是我们的人。”\n\n文德利希倾身向前，面色平静而坚定：“我支持您，长官。我正是为此才参军的——不仅为战斗，更是为了拯救。那些人现在正被困在暴风雪中苦苦挣扎，我们得有胆量去救他们。”\n\n科维安扫了他一眼，丝毫没有退让之意：“胆量可挡不住暴雪，少校。这不是英雄主义——这是自杀。”\n\n“够了，”古斯曼揉着太阳穴，打断了他，“我意已决，科维安。执行命令。”\n\n科维安牙关紧咬，转身对亚克希奇下令：“准备好雪地车和雪橇——我们得轻装疾驰。还需要防寒服和电台。”亚克希奇点头领命：“燃料有点紧张，但我会从船那里调。”屋中传来一阵骚动——几个陆战队员咧嘴笑着，渴望行动；另一些人则低声抱怨，对胜算几何心有疑虑。脚步窸窣，文件沙沙作响，工作就此开始。\n\n古斯曼跌坐到椅上，强灌下一口皮斯科酒。灼烧感传来，稳住了他的双手，但顾虑之情仍啃噬着他的五脏六腑。他们真能如愿以偿吗？"
 antarctica_aac_guzman.10.a: "他紧盯地图，思索着自己的赌注能否回本。"
 antarctica_aac_guzman.11.t: "陆战队的第一道考验"
 antarctica_aac_guzman.11.desc: "黑色护目镜下，文德利希的双目仍灼灼明亮。每踏出一步，狂风都猛烈地推挤着他，但前进是唯一的方向。他们打着照明设备在冰原上搜寻，光芒在纷飞的雪中闪耀。\n\n靴子把积雪踩得咯吱作响。文德利希注视着队员们搜查四周，他们厚重的装备已经裹上了层层积雪。队伍表现出了默契的配合和严明的纪律，文德利希为之而感到自豪——归功于严格遵循方案训练，他们抵达温克岛的速度远超南极大陆上其他任何一支队伍的能力范围。\n\n副手从陷坑对面发出信号，秘鲁人依然踪影全无。陆战队已经离开雪地车、徒步行进大约一公里了，理应到了基地坐标点，却仍旧毫无发现。\n\n或许，他们现在就正站在冰封的墓穴之上——属于马丘比丘站及其人员的冰封坟墓。但是，这意味着他们的努力还是不够，文德利希决不愿、也不敢接受这样的结果。\n\n雪雾中浮现出模糊的建筑轮廓。队伍暂时止步，一时间只能听到风掠过雪原的呼啸。众人看到了红白两色的秘鲁国旗，它破破烂烂地耷拉着，冻在了铁门上。\n\n“你们还在等什么？前进！”文德利希高声喝道，队伍继续慢慢挪动。"
 antarctica_aac_guzman.11.a: "不要让我们的努力白费。"
 antarctica_aac_guzman.12.t: "新地点"
 antarctica_aac_guzman.12.desc: "比起一个功能完备的前哨站，马丘比丘站的残骸看上去更像是一个被冰雪巨人一脚踩烂的露营地。补给箱散落各处，大半都没在积雪中。仅剩的寥寥几幢正经房屋都已扭曲变形、破损不堪。智利雪地车缓缓停止，引擎在暴风雪留下的死寂中低沉轰鸣。文德利希环顾四周，科维安悲观的预测在他耳边久久回响——马丘比丘站不复存在，唯余一片冰封荒地。\n\n然而奇迹出现了——一缕微薄的废气自那座最大也最完好的房子墙上临时拼接的管道中袅袅升起。看来，这儿并非空无一人。文德利希示意陆战队员们继续前进。\n\n透过破裂的观察窗看去，其中幸存者绝非屈指可数，细细一看，竟有二十余人。秘鲁人们蜷缩在昏暗冰冷的舱室内，围绕着一台噼啪作响、奄奄一息的发电机。憔悴之情爬满了他们粘满煤灰的脸。当陆战队员小心翼翼地撬开舱门时，众人满眼惊恐，抬眼望来。\n\n文德利希单手举起：“我们是来救你们的。”\n\n解脱之情缓缓自他们脸上浮现。陆战队员们行事丝毫不拖泥带水，口中一言不发，手上却一刻不停。他们把通风口中的积雪清理的一干二净，还将燃料、热饮与口粮分与众人。之后，陆战队员们又使出浑身解数，让发电机再度平稳运转。\n\n数小时后，苍白的太阳沉入地平线，燃眉之急也终得解除。在陆战队撤离前，马丘比丘站的首席科学家拉米雷斯走向文德利希，手中捧着一个奇迹般完好无损的木盒。一面秘鲁国旗静卧盒中，白色部分密密麻麻布满签名——在场所有人的签名。\n\n“利马方面提前寄过来的礼物，”拉米雷斯嗓音沙哑，解释道，“如今……它属于你了。我们所有人送的。谢谢你。”\n\n返回阿图罗·普拉特站后，古斯曼教授听取了文德利希的报告。他接过木盒，用手指轻轻抚摸着旗上的签名，想到这莫名讽刺的情况，不禁露出了一丝笑容。温克岛曾经发生的敌意行为令人发指，如今则成了拉丁兄弟情谊的标志；至于梅里诺豢养的野兽……"
 antarctica_aac_guzman.12.a: "……变成了人们意想不到的英雄。"
 antarctica_aac_guzman.13.t: "白色荒芜"
 antarctica_aac_guzman.13.desc: "智利陆战队员们循着地图标注，来到了马丘比丘站，但却只发现了暴风雪肆虐后的残骸。预制板材扭曲变形，撕裂的隔热层在寒风中兀自不动。站里最大的生活区敞开着大门，凝冰风雪堵住了入口，宛如白色虚无中的冰封巨口。四周寂静得令人窒息，他们只能听到踩在积雪上的咯吱声和雪地车的低沉轰鸣。\n\n不见烟火、不见动静，唯有死寂与废墟。文德利希示意队员继续行动，他们推开冰层和破碎的建材，向主建筑内部探视。\n\n昏暗的照明之下，集体悲剧浮现在众人眼前。尸体蜷缩成团，企图抓住转瞬即逝的温暖，瘫倒在倾覆的设备上，最后时刻定格在屈服于致命严寒的姿态。其中一人僵硬的手在生前还紧攥着简陋的木质数珠。遇难者人数压得人喘不过气来：似乎是全军覆灭，他们根本无力抵御这场风暴。\n\n杂物遍布的桌子上，结了霜的工具箱下压着一张纸：是张便条。一名海军陆战队员小心翼翼拿起，读着上面的字句，呼出的热气凝成了白霜。按照其中的记述，基地发电机故障失效、减少的燃料迟迟得不到补给、暴风肆虐时也只能听着没有回音的无线电。结尾并非祈祷，而是朝北方的痛苦诅咒，控诉着疏忽与背弃的承诺。\n\n对文德利希而言，归途如同酷刑。曾燃起的希望决意已然粉碎，取而代之的则的是尖锐的自我谴责。行动太迟了吗？这场救援行动是否早在风暴来临前，就已经因计划不周而注定失败？疑问无情盘旋。他找不到答案，只有结果沉重地压在心头。只要别像现在这样，什么都好，可这里是受诅咒的温克岛，这里能长久留存的只有墓园。\n\n回到阿图罗·普拉特站，古斯曼在凝重的静默中接到噩耗，目送着遗体被送往卡亚俄。"
 antarctica_aac_guzman.13.a: "他们根本没有胜算。"
 antarctica_aac_guzman.14.t: "正义消融"
 antarctica_aac_guzman.14.desc: "电传机咔哒咔哒的响声打破了古斯曼办公室中的安静。亚克希奇方才来和古斯曼碰头，表面上是要讨论最新的捕鲸产量预测，但他们其实是在等这个——来自圣地亚哥的消息、有关梅里诺的消息。\n\n古斯曼起身撕下电传机吐出的纸带：“判决梅里诺·何塞STOP经部级复议指控STOP达成一致STOP即刻开除军籍退伍STOP不考虑提起进一步诉讼STOP”\n\n办公室又安静下来，气氛凝重。古斯曼把纸带揉成一团，攥在掌心，转身背对亚克希奇，走到椅子旁边重重坐下，双手掩面。“开除？”古斯曼低声嘀咕着，“开除！这人企图发动血腥的武装叛乱，颠覆合法管辖机构，居然就能这么脱身？不审判、不监禁，就只是……开除军籍？”他抬起头，怒火在眼中熊熊燃烧，“那个自大狂混蛋！他肯定把从瓦尔帕莱索到拉莫内达宫的关系都跑遍了！”\n\n亚克希奇走近，手掌按在古斯曼的椅背上。“教授，这确实……让人气得发狂。毫无疑问的不公正。”他停顿了一下，让古斯曼意识到他的认同，然后继续说道，“但换个角度看，他的军籍被开了，职业生涯就此结束，他夺权的企图也以失败结束。回到祖国大陆的他不是凯旋的英雄，而只是个声名狼藉的平民小卒，手上什么权力都没了。除了他自己狂热分子的小圈子之外，在所有重要人士的眼里，他的声誉都已经彻底毁了。”\n\n古斯曼缓缓放下手臂，看着如是讲的亚克希奇。或许，他说的没错……"
 antarctica_aac_guzman.14.a: "失败本身就是这种人的监牢。"
 antarctica_aac_guzman.15.t: "最糟糕的消息"
 antarctica_aac_guzman.15.desc: "“阿根廷意图明了，”电报上写着，“加入美洲国家组织。”\n\n手中马克杯摔得粉碎，碎片散落满地，咖啡打湿了鞋面，但古斯曼浑然不觉。\n\n一想到多年的心血工作可能会这么前功尽弃，古斯曼就觉得难以置信。咖啡洒了他还能说重力是内因，但要是说能让德不配位的阿根廷人挤进美洲国家组织，那就只有魔法才能办到了。\n\n他膝盖撑地，开始收拾地上的碎片。他真希望能听到比利亚罗埃尔和米兰达亲自向他报告这个消息，两人总是说出几句俏皮话，缓解他的焦虑。\n\n“只有美国人才能施展这样的魔法。”比利亚罗埃尔要是在，一定会这么说。\n\n古斯曼的手颤抖着，这就是他们要对抗的势力。他走向酒柜。几分钟之后，埋头敲键盘的他就已经灌下了第二杯烈酒。\n\n要是华盛顿站在阿根廷那边，智利确实无力阻挡，但他也要成为阿根廷的肉中之刺、眼中之钉。阿德莱德岛之后，这是阿根廷应得的报复。古斯曼瞟了一眼时钟，表针已经走近午夜。他继续伏案打字，阿德莱德英灵不远，绝不能辜负他们。"
 antarctica_aac_guzman.15.a: "阿根廷也许能在国际舞台上取得更高的地位，但受害者也是同样。"
 antarctica_aac_guzman.16.t: "致阿德莱德的颂歌"
 antarctica_aac_guzman.16.desc: "比利亚罗埃尔的酒店房间门上挂着“请勿打扰”的牌子，屋里传来单调持续的歌声。曲调听起来是“嗒-嗒-嗒-”，全曲只有这一个调式，循环往复。这是阿德莱德的创作，也是智利的胜利进行曲。\n\n房间里，四处都是屠杀的影像证据。数十张照片记录着损毁的装备、焦黑的建筑、战友们冻伤浮肿的面容。每当手指疼痛难忍，敲不下去键盘时，比利亚罗埃尔便会坐下来翻看这些照片，灼红的指腹几乎就要渗出血来。\n\n其中有些照片连姓名都没有，他们的身份还尚未能得到确认。比利亚罗埃尔着意记着其他人的名字，揉着手腕，领带翻来覆去地解开又系上。\n\n转椅咔嗒一声转回桌子前，他重新投入工作。嗒-嗒-嗒-，关于阿德莱德大屠杀的详尽档案不断扩充，反对阿根廷获得成员国资格的其他论据同步增长。交响乐中，每个音符都不可或缺。\n\n每张照片、每张辨认不出的面容，也同样不可或缺。当疲惫迫使他闭上双眼时，那些面容仍凝视着他。"
 antarctica_aac_guzman.16.a: "为了他们，他要履行自己的职责。"
 antarctica_aac_guzman.17.t: "声名远扬"
 antarctica_aac_guzman.17.desc: "“开完这场会，我得好好休息会儿，”比利亚罗埃尔低声嘟囔，“不管结果是好是坏。”当他把那摞文件递给米兰达时，指尖仍隐隐作痛。\n\n米兰达面带微笑，端详着文件夹，仿佛其中书页均由不朽黄金铸就：“你确实该多休息会儿，老朋友，”他说，“我保证让与会代表都好好欣赏欣赏它们的。”\n\n他确实做到了。在和美洲各国代表的预备晚宴上，他穿梭于那些或熟悉或生疏的面孔间，一一同他们寒暄。不管是谈笑风生还是享用开胃小菜，他总能让对方在不经意间注意到腋下的文件夹。是夜，他辗转于饭桌之间，仿佛在重温那段贯穿大陆的旅程。\n\n时光流转，追随者愈来愈多，逐渐排成一圈。最终，就连侍者都为之驻足，目光停在照片之上——米兰达猜测他们将会成为首批知晓阿德莱德大屠杀的海外平民。人们的反应如出一辙——初见图中受害者的模糊面容时，先是目瞪口呆、沉默不语，继而忿忿不平，接着低声询问，最后再是哀悼。\n\n米兰达仅以摇头回应所有询问：“待到投票时，别忘了你们目睹的一切。”\n\n他瞥向始终未来查阅档案的两人——美国与阿根廷的代表。让他们继续不把比利亚罗埃尔的劳动成果放在心上吧，他们早晚会后悔的。"
 antarctica_aac_guzman.17.a: "他们离知道这事儿的日子不远了。"
 antarctica_aac_guzman.18.t: "知恩图报"
 antarctica_aac_guzman.18.desc: "比利亚罗埃尔本以为与秘鲁盟友的会谈会轻松可靠，顶多就是握握手，可能得还再喝上杯白兰地。但他万万没想到的是，对方竟递来一枚金光闪闪的勋章——那是秘鲁太阳勋章，他们的最高荣誉，被以最快速度颁发给了古斯曼教授。随后在他的震惊中，大使深深地给他深深地鞠了个躬，随行人员也纷纷给他鼓掌。\n\n与秘鲁驻美洲国家组织特使的谈判就这样拉开了帷幕。比利亚罗埃尔差点问出口：“大使阁下为何如此热情？我们也不过履行职责罢了。”\n\n秘鲁人看见他尴尬的样子，忍不住轻笑起来：“我还以为您会更有风度一些呢，大使阁下。您既已救我国同胞于水火之中，又怎能在我们报之以李时表现得如此困惑？我明白古斯曼教授与陆战队官兵只是尽分内之事，但秘鲁方面仍对此心怀感激。”\n\n比利亚罗埃尔心中惭愧，点了点头。只见那位大使继续说道：“请务必向古斯曼教授转达我深切的谢意与问候，既代表秘鲁共和国政府，也代表我个人。此外，米兰达先生与比利亚罗埃尔先生，请相信利马方面将在阿根廷事务上全力支持贵方。”\n\n米兰达坐着鞠躬致意：“不胜感激，大使阁下，感谢您的善意言辞与鼎力支持。我们将倾尽全力、尽己所能，让您不虚此行。”\n\n“哦，不必客气，不必客气，贵方已尽心尽力了。”秘鲁代表俯身向前，凑到比利亚罗埃尔和米兰达耳畔，压低声音打趣道：“老天，这简直就是种享受。反正我向来觉得阿根廷人一直都是一帮蠢驴。”"
 antarctica_aac_guzman.18.a: "话音刚落，智利代表团中就爆发出一阵大笑。"
 antarctica_aac_guzman.19.t: "因果报应"
 antarctica_aac_guzman.19.desc: "“一派胡言！”\n\n面对怒发冲冠的秘鲁驻美洲国家组织特使，比利亚罗埃尔和米兰达大气都不敢喘。只见对方依旧步步紧逼：“比利亚罗埃尔先生，你听好了：想都别想！圣地亚哥在南极的人用这么卑劣的方式来背刺我们，还指望利马方面支持你们？”\n\n他掏出来自死者家属和同事的那些满怀怒火的信函，一把塞到米兰达脸上：“猜猜信里面写的什么？说你们的头子古斯曼是个智力低下、粗心大意，做事儿从来不准备的蠢货。他要是对这种惨剧稍有哪怕一丁点预感，为什么还要欢迎我们的科学家去南极？难道他就喜欢看着大活人在冰天雪地里活活冻死？”\n\n终于，这位外交官稍微消了消气：“不，诸位，我们绝不会在那些对我们的困难袖手旁观的人身上投入哪怕半分精力。我们之所以不接受布宜诺斯艾利斯提出的任何方案，只是因为古斯曼至少还剩一丝道德，还能让我们同胞的遗体体体面面地回国。”\n\n面对着秘鲁方面的谴责，智利代表们所能做的唯有垂首低眉、一言不发。“和他道歉也没用，”比利亚罗埃尔心中暗忖，“他也心知我们同样无比痛心，但痛心可没法让同胞再生。真该死，要是陆战队当时准备的再充分些……”"
 antarctica_aac_guzman.19.a: "“……要是他们被训练出来不仅是为了打仗就好了。”"
 antarctica_aac_guzman.20.t: "华盛顿共识"
 antarctica_aac_guzman.20.desc: "“……这是绝对不可接受的先例！”哥伦比亚代表义愤填膺的声音回荡在美洲国家组织会议厅的高大穹顶之下，“若放任本组织成员国肆意侵犯其他成员国领土却不受惩罚，那么我们的宪章、我们的协定，乃至西半球和平共处的理念，究竟还有何意义？”\n\n“智利提交的证据……照片、证人证词，甚至你方士兵出现在对方领土上的事实……”巴西代表沉痛地陈述道，“不仅揭露了一起边境事件的全貌，大使先生，更是一场蓄意侵略——冷酷而野蛮的侵略。”\n\n米兰达和比利亚罗埃尔面无表情地关注着事态发展。他们已经亮出了全部底牌，此刻只需任由国际谴责的浪潮自然发挥作用。当阿根廷大使试图插话辩称两国之间存在“挑衅行为”或“划界模糊”时，比利亚罗埃尔果断地打断了他：“恕我直言，大使先生，档案中载明了阿德莱德岛的精确坐标，其地理位置完全位于公认的智利南极领土范围内。何来‘模糊’可言？”\n\n“意图歪曲描述这一事件性质的任何行为，”哥伦比亚代表的声调又高了一个台阶，“都是对在场所有人智商的侮辱！”\n\n阿根廷大使使出了呼吁泛美团结、强调必须团结一致应对“外部威胁”的手段，但在无可辩驳的事实面前，他的言辞显得苍白无力。他被外交的泥潭困住了。\n\n就在此时，当所有辩解都显得徒劳之际，“赔偿”一词被抛到了台面上。阿根廷大使目光低垂，挫败地耷拉着双肩，微不可察的点头是他唯一能做出的回应：阿根廷将会付出代价。米兰达同比利亚罗埃尔交换了一个眼神。"
 antarctica_aac_guzman.20.a: "华盛顿的这场仗打赢了。"
 antarctica_aac_guzman.21.t: "一如往常"
 antarctica_aac_guzman.21.desc: "“……智利同事提供的证据无可辩驳，并且令人深感遗憾。”委内瑞拉代表说道，“然而……”\n\n这个“然而”在美洲国家组织会议厅的空气中悬而不落，米兰达感到胃部一阵不适，他身旁的比利亚罗埃尔已经全身紧绷了。\n\n“……然而，我们必须考量局势的复杂程度，以及本组织全体成员国之间继续对话的必要性。”委内瑞拉代表继续说道，赢得了数名代表的赞同。\n\n两人先前用极具说服力的陈词掀起了阵阵谴责浪潮，如今却终究在政治权宜的礁石上拍得粉碎。片刻之前还显得不堪重负的阿根廷大使此时挺直了身子，他有关“悲剧性误解”和“需要双边调查”的抗辩陡然之间获得了更为热烈的响应。\n\n米兰达和比利亚罗埃尔听见了代表们的低语。“……施压过猛……”，“……还记得上次美国人是怎么强行通过决议的吗？”，“……我们还是别给干涉行为开先例……”真相已经明了：昔日美国压力的反弹、不愿掀起风波的顾虑、各国自己的小九九——这些都比原则更重要。\n\n主席宣布赔偿问题未达成共识时，阿根廷代表嘴角露出不加掩饰的微笑。他起身向全场礼貌颔首，径直走向出口。\n\n米兰达和比利亚罗埃尔沉默地收拾文件。他们要给古斯曼去信，报告外交战场上的失利。"
 antarctica_aac_guzman.21.a: "“世界露出了它的真面目，又一次。”"
 antarctica_aac_guzman.22.t: "陨落巨人"
 antarctica_aac_guzman.22.desc: "在梅里诺眼前，圣地亚哥的街道如同溃烂的伤口般蔓延扩散，喇叭声与叫卖声在他醉醺醺的脑中化作沉闷的轰鸣。他在夜色中踉跄穿行，皮斯科酒瓶在手中晃荡，时不时漏出几滴残液溅落在龟裂的柏油路上。他曾是斯尼佩岛的英雄——当年他如同巨人般横扫格林尼治岛，炮口烈焰迸发，将道德败坏的阿根廷杂种射杀殆尽——如今呢？却成了步履蹒跚的可怜虫，任由汗水与怨毒浸透身上的海军大衣。\n\n“我真他妈废物啊，”他跌跌撞撞路过摇曳的灯火，口齿不清、嗓音沙哑，犹如野兽嘶吼，“我本该成就何等伟业——为国争光，化作利刃，刺穿布宜诺斯艾利斯的豺狼野兽。可我最后得到了什么？是哭哭啼啼的外交官和溜须拍马的投机派朝我背上捅来的刀子！”他伸手在空气中抓挠，仿佛要扼住古斯曼的鬼影，肯定是这个一无是处的刀笔吏在背后搞鬼——还有亚克希奇，梅里诺早就该亲手把这个共党鼠辈淹死在冰层底下。\n\n城市的景象在他眼中愈发模糊，充斥着哔哔作响的汽车和猥琐下流的面孔。他曾是人中豪杰，是圣地亚哥硕鼠肥猪们高攀不起的将帅之才。如今呢？事业崩塌、身败名裂、沦为笑柄。突然，酒瓶从手中滑落，在石板路上摔得四分五裂。梅里诺的双腿一阵发软，他向前倾倒，颅骨撞上路面，发出不祥的闷响。温热暗沉的鲜血汩汩淌出，梅里诺却未发出一丝呻吟——只有撕心裂肺的大笑……"
 antarctica_aac_guzman.22.a: "……如同风一般苦涩。"
 antarctica_aac_guzman.23.t: "梦想之人"
 antarctica_aac_guzman.23.desc: "古斯曼的办公室里，只能听到旧椅子的吱呀声。风暴已然平息，窗外铺展着宁静而冰冷的美丽。在这难得的静谧时刻，眼前的危机暂告段落，古斯曼得以将目光投向明天。他凝视着阿图罗·普拉特站的灯火，浮现在眼前的却不是现状，而是未来的可能。\n\n倘若临时的模块和营房最终成为完整的图景？在他脑海中，基地轮廓不断变幻，永久建筑、新街道和科研实验室逐渐显现。他几乎都能听见发电机的轰鸣，为这片冰封大陆上真正的智利定居点输送能量——这里不仅能生存，更能生活。\n\n难道只是到此为止吗？他的目光越过基地，投向更遥远的天际。此刻那里只有白色的虚无，然而他的想象绘出了各国旗帜，与智利国旗并肩飘扬。在梦想中，智利南极领地将成为拉美各国探索最后大陆的和平家园。\n\n而这一切的动力，绝非来自圣地亚哥的遥远施舍——不！古斯曼看见繁忙的港口里停泊着一整支捕鲸船队。海岸边新建的加工站里，刺鼻的鲸油味与咸涩的海风交融。他期盼着，当梦想在冰原扎根时，终能开辟另一条道路、一条不必向深海索取如此血腥贡品的道路。\n\n幻象骤然消散，如同降临一般突然。他回到了冰冷的办公室，与杯中残留的皮斯科酒和成堆文件独处。前路漫漫、艰辛——但，真的不可能吗？"
 antarctica_aac_guzman.23.a: "很久很久以来，古斯曼第一次觉得这并非不可能。"
