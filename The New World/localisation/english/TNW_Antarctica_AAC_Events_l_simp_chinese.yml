 antarctica_aac_diplo.100.t: "来自[AAC_Diplomacy_Get_Country_Capital_Name]的问候"
 antarctica_aac_diplo.100.desc: "外交部\n\n主题：委派南极安全事务特使\n\n谈判进展通报：外交官米兰达和比利亚罗埃尔报告称，同[AAC_Diplomacy_Get_Country_Name_Short]的谈判已圆满结束。[AAC_Diplomacy_Get_Country_Name_Adj]政府对承认智利在南极洲的领土宣称持开放态度，并初步承诺在美洲国家组织中支持智利。\n\n比利亚罗埃尔和米兰达将离开该国，前往[GetAACNextNegotiation]推进外交任务。"
 antarctica_aac_diplo.100.a: "又一位志同道合的朋友。"
 antarctica_aac_diplo.101.t: "在[AAC_Diplomacy_Get_Country_Name_Short]的困局"
 antarctica_aac_diplo.101.desc: "外交部\n\n主题：委派南极安全事务特使\n\n谈判进展通报：外交官米兰达和比利亚罗埃尔报告称，其与[AAC_Diplomacy_Get_Country_Name_Adj]政府的会谈未获实质性成果。尽管[AAC_Diplomacy_Get_Country_Name_Short]声称会尊重智利领土完整以应对阿根廷的侵犯行为，但其对承认他国在南极地区的宣称一事仍犹豫不前。[AAC_Diplomacy_Get_Country_Name_Adj]外交官拒绝了在美洲国家组织中协助智利进行调解，致使谈判无果而终。\n\n比利亚罗埃尔和米兰达将离开该国，前往[GetAACNextNegotiation]推进外交任务。"
 antarctica_aac_diplo.101.a: "我们被[AAC_Diplomacy_Get_Country_Capital_Name]拒之门外了。"
 WORLD_Antarctica.1.t: "智利南极研究所遭军方推翻"
 WORLD_Antarctica.1.d: "今日，智利国歌那杂乱而刺耳的调子在南极大陆上空奏响。何塞·托里维奥·梅里诺海军上校向祖国及其阿根廷宿敌宣告：智利南极领地已由他接管。梅里诺声称其挫败了前领地管辖机构内部的“阿根廷-布尔什维克阴谋”，并逮捕了古斯曼教授及其助手。目前，他们的下落尚不清楚。\n\n智利武装部队将南极洲的局势推向了对抗的新阶段，摈弃了此前智利南极研究所通过美洲国家组织展开的外交进程，誓言要不惜代价为斯尼佩岛之战的失利复仇。梅里诺及其麾下陆战队是南极大陆上的弱者，他们夺回失地的征途注定将是一条凝成冰封的血路。"
 WORLD_Antarctica.1.a: "君子报仇，十年不晚。"
 WORLD_Antarctica.2.t: "智属南极军事政变失败"
 WORLD_Antarctica.2.d: "智利南极领地的阿图罗·普拉特站今日传来一则离奇的报道。基地内部，叛乱的海军陆战队在与文官和平民的对峙中败下阵来，兵变首领何塞·托里维奥·梅里诺海军上校束手就擒。据报称，该名军官及其亲信企图推翻领地管辖机构，挑起与阿根廷的战争，一雪斯尼佩岛之战的耻辱。\n\n当下，古斯曼教授及智利南极研究所正寄希望于外交手段以扭转智利在南极面临的危急局面，通过遍及全美的闪电式外交攻势力图在美洲国家组织内部争取支持，以制衡阿根廷。在排除了内部威胁之后，古斯曼似乎仍将坚定不移地为南极问题寻求和平解决的方案。"
 WORLD_Antarctica.2.a: "缔造和平的人是有福的……"
 WORLD_Antarctica.2.b: "他们肯定是在那旮旯待出精神问题了吧？"
 antarctica_aac_intro.2.tt: "§R£Antarctica_supply §W装备和补给§!将极为短缺。我们应该谨慎使用。§!\n\n"
