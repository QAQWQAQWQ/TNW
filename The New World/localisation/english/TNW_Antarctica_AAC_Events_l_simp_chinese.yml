 antarctica_aac_main.100.t: "露西拉"
 antarctica_aac_main.100.desc: "比利亚罗埃尔在日程中挤出时间。他呼吸着浓稠潮湿的空气，伫立在露珠闪亮的昏暗田野之中。“你一定会被逗笑的，”他对墓碑低语，“我在临别之前，最想要倾诉的人竟然是你。”\n\n加芙列拉·米斯特拉尔是她为世人所知的名字，但在比利亚罗埃尔的心中，她叫做露西拉：墨西哥现代教育体系的奠基者之一、智利文坛的巨擘。她曾兴奋地写信告诉比利亚罗埃尔，自己获得了诺贝尔文学奖提名，自夸文采永远胜过他。如今露西拉已经不在人世，她留下的诗篇依然令他潸然泪下。\n\n他轻轻将盛开的勿忘我放在冰凉的泥土上。花瓣拥抱着大地，石碑上镌刻着“露西拉·戈多伊·阿尔卡亚加”的名字，凝成永恒。每当在墓园见到这个名字，比利亚罗埃尔都会心头一震：这个名字不再是崭新信笺上的落款，也不再是报纸头版报道她获得新奖项的标题。\n\n他向露西拉讲述了后来的变迁，提到了她圣地亚哥的旧居改建成了博物馆。她一定会捧着脸轻轻笑着，听他讲述冰封大陆的故事、倔强顽固的梅里诺、他和米兰达的冒险。她会哼着小调，遗憾自己不能和他们同行跨越美洲，去纽约探望多丽丝。\n\n“她确实深爱着你啊，我的朋友。”比利亚罗埃尔继续说道，阳光已经悄悄爬上了他的背脊，“她精心保管着你的作品，所有的手稿。想必她已经都告诉你了。”\n\n他强迫自己记起来，必须要准时赶到机场去。宁静的墓园之中，他恍惚看到了往日的圣地亚哥，听到了街道上涌动着千万人的对话。比利亚罗埃尔在喧嚣的时间河流中游弋寻觅，试图在人群中辨认出她的声音，却发现自己已经记不清那声音的模样。"
 antarctica_aac_main.100.a: "时光流逝远去，万物终将如此。"
