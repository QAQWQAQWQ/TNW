 POLITICS_ABD_AL_KARIM_QASIM_DESC: "伊拉克唯一领袖留下了怎样的遗产？世人将如何铭记他？\n\n阿卜杜勒·卡里姆·卡塞姆出生于赤贫家庭，父亲是逊尼派阿拉伯人，母亲是什叶派费利族库尔德人。这样的出身，使他本不被世人看好。他先是成为教师，随后加入军队，凭借过人才智和阳刚之气步步高升。这些特质使他于五十年代获邀加入自由军官运动——这是一个由决心推翻亲意政府的军官组成的松散组织。卡塞姆几乎以一己之力掌控了运动，并利用它推翻了哈希姆王朝。仅凭这一胜利，就足以让他成为民族英雄。而1959年战胜作为殖民主义象征的三头同盟，更令他被奉若神明，成为整个地区的偶像。\n\n自革命胜利与终结入侵的意伊友好条约签署以来，表面看局势几无变化。尽管卡塞姆的伊拉克民族主义主张与高涨的泛阿拉伯主义浪潮激烈碰撞，他对意大利的让步也引发非议，但他仍如巍然屹立的巨人。多数人愿意包容他特立独行的领导风格、对昔日盟友的清洗和渐进式改革，因为他们依然信仰他构想的革命蓝图。人们仍相信他描绘的现代伊拉克愿景：不同信仰与背景的民众能团结战胜贫困、教派分裂和外国剥削。\n\n§x至少当下如此……§!"
 POLITICS_VITO_MICELI_DESC: "在卡塞姆提出石油产业国有化时，意大利驻巴格达领事维托·米凯利便意识到伊拉克人的所谓“革命”已越过临界点。那个蠢货或许以为意大利人会对阿拉伯人劫掠其石油利益坐视不管，但米凯利绝非庸碌之辈。随着中东局势持续动荡、秃鹰虎视眈眈，他决意为帝国利益采取单边行动。通过串联伊拉克军方反对派与特勤局旧部，米切利策划了针对“唯一领袖”的斩首行动。他亲自见证了卡塞姆咽气前的最后时刻，他正胡言乱语着”为穷人建了‘几千座小屋’“的呓语。\n\n后续计划本应顺理成章：扶植唯命是从的傀儡政权。然卡塞姆之死引爆权力真空，米凯利不得不滞留巴格达，全力维系法统脆弱的”过渡当局“——这个完全依附意大利的政权，在民众眼中不过是殖民势力的提线木偶。\n\n如今，维托·米凯利的斗争已不仅关乎帝国荣耀，更攸关身家性命。不论卡塞姆这个人存在什么争议，都不会有人能容忍这个集殖民主义与帝国主义所有恶行之大成者继续存活于世。"
 POLITICS_ABU_AL_QASIM_AL_KHOEI_DESC: "安拉的使者（愿主福安之）有训：“凡人归真，诸功皆止，唯三事可续：延续之施舍，益人之学问，虔敬子嗣之哀祷。”——纳杰夫圣城学府领袖、教法学家艾布·卡塞姆·霍伊穷尽一生恪守此道。\n\n霍伊生于伊朗宗教学者世家，自幼研习《古兰经》并求学于什叶派诸贤门下。经学院的严苛训练使其在教法阐释中形成独特学派，常为妇孺与非信众赋权发声。此种教育更铸就其对全球穆斯林社群的深切责认，在履行宗教义务与钻研教法学的间隙，他化身永不停歇的济世者，他依托横跨伊拉克的慈善网络，以行政管理才能与宗教威望抚慰无数受难者。\n\n正是这份责认，驱使霍伊在卡塞姆政权崩塌时挺身而出。目睹伊拉克全境暴乱肆虐与蛊惑民心的暴君崛起，他发起宣告：抵御腐败与暴政乃教士天命所系。在大阿亚图拉的默许下，霍伊遴选什叶派精英组建代表团，重建纳杰夫圣城秩序。虽与武装抗争保持距离，其存在本身已成为追求民主伊斯兰政体者的精神灯塔。"
 POLITICS_AHMED_HASSAN_AL_BAKR_DESC: "所谓1958年革命，说到底不过一场未竟的变革？诚然，美索不达米亚之地的阿拉伯人民挣脱了西方殖民主义最刺眼的枷锁，却仍被异族强加的国境所割裂。他们困锁在外来者划定的牢笼中，被依附于列强的经济体系碾作齑粉。艾哈迈德·哈桑·贝克尔如是宣告：现在是时候让阿拉伯人民彻底粉碎这份压迫的遗毒了。\n\n贝克尔生于提克里特尚在土耳其暴政桎梏下的年代，其生命轨迹注定与抗争交织。他熬过凄苦童年，担任六年小学教员后投身伊拉克军队。1941年，“金方阵”发动反英革命时，贝克尔携亲族同袍共襄义举，却在革命后沦为边缘群体。从英国易主意大利的欺瞒令他痛彻心扉，遂将目光投向两股新生力量——致力于推翻王权的地下军官团体自由军官组织，以及方兴未艾的阿拉伯社会复兴党。\n\n即便在卡塞姆建立个人独裁并开始镇压复兴党后，贝克尔仍坚信复兴党注定要成为革命的先锋队，成为击败帝国主义的战车。如今立身于卡塞姆共和国废墟之上，作为党内军事委员会主席的他决意动用手中权柄，完成1958年未竟的革命伟业，誓要见证阿拉伯民族的真正统一。\n\n为此——他将不择手段。"