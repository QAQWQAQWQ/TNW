## LEADER DESCS ##
##################
STC_Carmelo_Ortiz_Taborga: "Carmelo Ortiz Taborga"
POLITICS_CARMELO_ORTIZ_TABORGA: "The reignition of the Chaco War by President Busch, a calamitous event for most of Bolivia, was almost providential for a peculiar group of Orientals, centered around the figure of Carmelo Ortiz Taborga.\n\nThese men and women, collectively known as the "Separatists," spent much of the Chaco War in Asunción, fighting an intellectual war of words with their "Integrationist" pairs. Both groups are highly racialist and dismissive of the ability of the western highland population - even of its white minority - to rule for itself. Their primary disagreement lies on whether this means the eastern sectors of the country, namely Santa Cruz, and its own white population, ought to "take charge" of the country, or leave it altogether. With the Paraguayan triumphal entry into the department's namesake city, the separatist faction received a major material and propagandistic boost, as well as control of the occupied zone's civil administration.\n\nTheir leader, a former merchant and telegraph operator, was the first to jump the ship to Paraguay for help in the cause of independence, and his legitimacy with the Santa Cruz elite has only increased with each failed Bolivian attempt to retake the city. Nevertheless, the population of the region, across both sides of the latest armistice line, remain highly divided on the matter. Moreover, the government that rules the civil administration in occupied Santa Cruz is itself composed of a big-tent coalition of Ortiz Taborga's early supporters, members of the briefly extant Oriental Socialist Party, and a new generation of chiefs orbiting around the "apolitical" pro-Santa Cruz Committee. While these contain the aggregate sum of political opinion in the region, many in the latter two groups are not fully convinced of independence, which ultimately has as its guarantor only the military fortunes of Paraguay."
