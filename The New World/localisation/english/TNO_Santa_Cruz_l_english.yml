STC_Luis_Sandoval_Moron: "Luis Sandoval Morón"
POLITICS_LUIS_SANDOVAL_MORON: "Lucho is back at his city, with that, everything is said.\n\nLuis Sandoval Morón spent all of his adult life fighting for Santa Cruz, but not for the Santa Cruz of the fascistic wannabes of the Partido Oriental Racista, but for the real Santa Cruz, the one belonging to the poor and Bolivia alike. The resistance against the Paraguayans and their Separatists collaborators has been a revolutionary struggle of which he was proud to belong to, and the moment he inherited the mantle of being the leader of the Cruceño MNR from Froilán Calleja Castro, he knew he would see it come to fruition. But of course, like Icarus, he flew too close to the Sun.\n\nHe was betrayed, not by the people, who remembered who defended them from the landlords, but by his comrades. The Chávez Ortiz brothers poisoned by opportunism struck their daggers during the Fifth Chaco War, refused to support the brave Bolivian effort to free their fellow countryman from the Paraguayans and instead, sold out to them. They had the guts to denounce Sandoval for his actions, for his ruthlessness in carrying out the struggle, for the measures that Sandoval took to keep his soldier's content and in line. How little did they understand.\n\nAnd yet, they managed to rally most of the MNR with them, and so Sandoval was kicked from Santa Cruz, from his land, and into exile he went. Many arduous years passed since then, years in which he swore revenge on all those who had wronged him and Santa Cruz. Years in which his hatred grew and grew, but the time for release has finally arrived. The city is his. The Chávez Ortiz brothers will soon be hunted, the Separatists will soon be executed. And their wifes? Well, all is fair in love and war."
