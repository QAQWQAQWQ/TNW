 BFI_gui_action_button_6_issue_15_USA_tt:0 "“美国人在穷尽所有可能之后才选择正道；意大利人则先洞察先机，然后却似按图索骥般遍尝各种歧途。然而，当他们携手时，世上难觅如此默契的搭档。”\n\n-理查德·M·赫尔姆斯，中央情报局局长"
