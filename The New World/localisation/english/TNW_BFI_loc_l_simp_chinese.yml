 BFI_gui_action_button_3_issue_2_JAP_tt:0 "意大利市场迅猛增长的势头，与其国之年轻形成鲜明对比。即便远在东京，我们亦能感受到其辉煌，若此等辉煌未被赏识，诚为憾事。故此，让我们着手，在首都之内开辟数条意大利风情街，让我们自己的城市角落也能领略意大利之卓越风采。"
 BFI_gui_action_button_3_issue_2_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  杂项收入：§G+100§!§YM美元§!\n  与日本的贸易关系：§G+20§!\n  每月工业专业知识：§G+0.5§!\n§Y日本§!将获得：\n  与意大利的贸易关系：§G+20§!"
 BFI_gui_action_button_4_issue_2_JAP_tt:0 "意大利市场，多年来备受日本企业瞩目，如今或许正是我们把握商机、缔结贸易协定之时。从那不勒斯和马耳他的港口直接引进的意大利商品，必将激发我们国内市场的消费欲望并促进财富的流通。让我们跨越印度洋，为这段经济伙伴关系奠定坚实的基础，共谋两国未来之繁荣昌盛伟业。"
 BFI_gui_action_button_4_issue_2_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  杂项收入：§G+150§!§YM美元§!\n  与日本的贸易关系：§G+30§!\n  每月工业专业知识：§G+1§!\n§Y日本§!将获得：\n  与意大利的贸易关系：§G+30§!\n  生活消费品需求：§G-1%§!"
 BFI_gui_action_button_5_issue_2_JAP_tt:0 "意大利绝非等闲之辈，百年来，她与我们伟大的帝国一样，统一了人民，实现了经济的工业化，以及国内市场的蓬勃发展。若我们错失了与这个正在崛起的经济体合作的良机，我们将会抱憾终身。因此，我们已经派遣了一支由颇具魅力的商人和谈判专家组成的代表团，前往罗马，以期达成一项关于意大利商品在我们本土销售的合适协议。"
 BFI_gui_action_button_5_issue_2_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  杂项收入：§G+200§!§YM美元§!\n  与日本的贸易关系：§G+45§!\n  每月工业专业知识：§G+1§!\n  GDP增长：§G+1%§!\n§Y日本§!将获得：\n  与意大利的贸易关系：§G+45§!\n  生活消费品需求：§G-2%§!"
 BFI_gui_action_button_6_issue_2_JAP_tt:0 "要使我们两国的友谊根深蒂固，非一朝一夕之功，亦非仅靠将意大利的塑料制品和糕点零食大批采购回首都的几家店铺销售了事。我们需要的是一种深厚的伙伴关系，让我们两国人民能够互享文化与经济的果实。虽然这道路漫长且充满挑战，但通过持续的友好交流，我们有信心在地中海之滨找到一位珍视这份友谊的朋友，我们彼此的成就和进步都将被对方所珍视。"
 BFI_gui_action_button_6_issue_2_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  杂项收入：§G+250§!§YM美元§!\n  GDP增长：§G+2%§!\n  与日本的贸易关系：§G+60§!\n  每月工业专业知识：§G+1.5§!\n§Y日本§!将获得：\n  与意大利的贸易关系：§G+60§!\n  生活消费品需求：§G-3%§!\n  我们的§s贫困率§!将开始缓慢§G改善§!。"
 BFI_gui_action_button_2_issue_3_ITA_tt:0 "自博尔扎诺至博洛尼亚，从图卜鲁克至的黎波里，意大利疆域内，古韵新风，奇景遍布。我们勿需仰人鼻息，乞求外界的慈善，而应专注于强化意大利的民族认同，激励我们中产阶级的同胞们去游历这片土地，亲自体验它的壮丽与奇妙。"
 BFI_gui_action_button_2_issue_3_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  月度人口：§R-1%§!"
 BFI_gui_action_button_3_issue_3_ITA_tt:0 "我们正致力于提升意大利自身的旅游吸引力，但也不可忽略了外国游客所提供的盈满商机。在全球旅游市场渐入佳境之时，意大利将审时度势，巧作安排，以确保能在这股复苏浪潮中分得一杯羹。"
 BFI_gui_action_button_3_issue_3_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  月度人口：§G+0.5%§!\n  旅游收入：§G+50§!M美元"
 BFI_gui_action_button_4_issue_3_ITA_tt:0 "在意大利，无数从业者早已将传统旅游业作为生计，他们对政府的扶持政策抱以厚望，视其为行业发展的春风。通过与海外旅行社和政府签订的新一轮合同，我们能够轻而易举地稳固需求，为我国经济的这一新兴支柱注入生机。"
 BFI_gui_action_button_4_issue_3_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  月度人口：§G+2%§!\n  旅游收入：§G+100§!M美元"
 BFI_gui_action_button_5_issue_3_ITA_tt:0 "罗马，这座历史萦绕的古城，幻象层生，引人遐想。如今，为了旅游业的蓬勃发展，我们正筹划启动基础设施建设，从扩建机场到大规模翻新公共设施，无一不展现着我们对城市旅游活力的期许。得道多助，我们相信，罗马定能重登世界之都的宝座，成为文化交流的中心，再次迎来属于她的辉煌。"
 BFI_gui_action_button_5_issue_3_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  月度人口：§G+3.5%§!\n  旅游收入：§G+150§!M美元"
