 BFI_gui_action_button_4_issue_15_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  §Y苏伊士§!雷达站§G+1§!\n  §Y科威特§!雷达站§G+1§!\n  §Y特伦蒂诺§!雷达站§G+1§!"
