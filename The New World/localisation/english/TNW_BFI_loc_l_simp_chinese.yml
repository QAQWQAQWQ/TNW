 BFI_gui_action_button_6_issue_14_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  登陆准备时间：§G-50%§!\n  每日陆军经验：§G+0.05§!\n  每日海军经验：§G+0.05§!\n  每日空军经验：§G+0.05§!"
 BFI_gui_action_button_1_issue_14_USA_tt:0 "意大利人早已未雨绸缪，为与德国的潜在冲突准备了数十载。我们对这些足智多谋的意大利朋友充满信心，相信他们完全有能力应对德国人或其他任何威胁，而且我们认为他们的军队最适合也最应该只为这一使命而行动。"
 BFI_gui_action_button_1_issue_14_USA_delayed_tt:0 ""
 BFI_gui_action_button_2_issue_14_USA_tt:0 "我们最好还是稳中求进。虽然我们终将使意大利与自由国家组织的军事联系步入正轨，但若期望双方军队一蹴而就地展开合作，则未免过于急躁。我们将正式安排自由国家组织与意大利的高级国防官员进行年度会晤，共同探讨我们共同面临的威胁，并逐步开启更深层次合作的大门。"
 BFI_gui_action_button_2_issue_14_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  经验增长：§G+10%§!\n§M美国§!将获得：\n  经验增长：§G+10%§!"
 BFI_gui_action_button_3_issue_14_USA_tt:0 "随着认识的深入，我们发现自由国家组织与意大利的军队各有千秋，相互之间大有可学之处。若我们期望这份关系历久弥坚，便应让未来肩负此责的年轻一代军官们彼此相知相熟。为此，我们将安排初级军官与学员们在意大利和自由国家组织的军队中进行短期的交流任职——虽然背负的责任不大，但却足以增进双方在未来合作时的默契。"
 BFI_gui_action_button_3_issue_14_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  经验增长：§G+10%§!\n  陆军组织度：§G+2.5%§!\n§M美国§!将获得：\n  经验增长：§G+10%§!\n  陆军组织度：§G+2.5%§!"
 BFI_gui_action_button_4_issue_14_USA_tt:0 "美国每年都会与自由国家组织的几乎所有成员国进行联合军事演习，这为自由国家组织的武装力量提供了定期的、大规模的相互学习机会，这超越了国家单打独斗所能达到的范畴。意大利在沙漠作战、反叛乱行动和轻步兵战术方面的经验——且不提他们与土耳其的较量——对美国而言，无疑是一本活教材。故而，向意大利取经，实为上策。"
 BFI_gui_action_button_4_issue_14_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  经验增长：§G+10%§!\n  每日陆军经验：§G+0.02§!\n  陆军组织度：§G+5%§!\n§M美国§!将获得：\n  经验增长：§G+10%§!\n  每日陆军经验：§G+0.02§!\n  陆军组织度：§G+5%§!"
 BFI_gui_action_button_5_issue_14_USA_tt:0 "在假想的情境中演练意大利与自由国家组织的合作是一回事，而要深究这种协同作战的实质，则是另外一回事——这代表着将意大利永久性地整合进自由国家组织军事联盟的第一步。若真要同甘共苦，我们必须确保后勤保障的天衣无缝——确保双方军队能够互通有无，持续相互补给，直到战争的最后。"
 BFI_gui_action_button_5_issue_14_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  经验增长：§G+10%§!\n  每日陆军经验：§G+0.02§!\n  陆军组织度：§G+5%§!\n  陆军损耗：§G-2.5%§!\n§M美国§!将获得：\n  经验增长：§G+10%§!\n  每日陆军经验：§G+0.02§!\n  陆军组织度：§G+5%§!\n  陆军损耗：§G-2.5%§!"
 BFI_gui_action_button_6_issue_14_USA_tt:0 "在战火纷飞之际，我们期望自由国家组织的成员国能在统一的指挥体系下携手并进。过去，美国一直是自由国家组织的领头羊，因为没有其他国家拥有足够的工业或军事实力来真正挑战美国的这一地位，其他成员国难以望其项背。但随着意大利的加入，这一局面或将改写。若要让意大利人相信我们的保护承诺，我们必须将其纳入自由国家组织的核心防御圈。"
 BFI_gui_action_button_6_issue_14_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  经验增长：§G+10%§!\n  每日陆军经验：§G+0.02§!\n  陆军组织度：§G+10%§!\n  陆军损耗：§G-5%§!\n  每月军队职业度：§G+1§!\n§M美国§!将获得：\n  经验增长：§G+10%§!\n  每日陆军经验：§G+0.02§!\n  陆军组织度：§G+5%§!\n  陆军损耗：§G-5%§!\n  每月军队职业度：§G+1§!"
 BFI_gui_action_button_1_issue_14_JAP_tt:0 "大日本帝国的军队之所以以“日本”为名，其使命并非护卫意大利。不管别人怎么说，我们的军队绝非政治交换的筹码，不会为了迎合他国而相互交易。恰恰相反，日本军队是日本民族精神的象征和精髓。若要将意大利的军事策略强加于其上，无疑是对日本尊严的亵渎，此等念头，断不可存。"
 BFI_gui_action_button_1_issue_14_JAP_delayed_tt:0 ""
 BFI_gui_action_button_2_issue_14_JAP_tt:0 "我们虽然对大规模军事合作心存疑虑，但派遣军事观察员前往意大利交流，并不会损害我军的士气。我们可以借此机会观摩学习意大利在其殖民地和臣民中所施展的战术，若成效显著，亦可为我所用。诚然，我们亦需向意大利发出相同的邀请，但这不过是小事一桩。强者示威，本是理所当然之事。"
 BFI_gui_action_button_2_issue_14_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  每日海军经验：§G+0.01§!\n"
 BFI_gui_action_button_3_issue_14_JAP_tt:0 "仅仅观察意大利军队的行动是不够的，要洞悉他们战胜敌人的精髓，我们就必须探究那些我们目睹的行动背后的深层逻辑与战略。有鉴于此，我们建议选拔一些有抱负的日本军校学员远赴意大利军事学院深造，以吸收意大利军官们的战争智慧。或许，他们在异国的学习之旅中真能获得一些宝贵的洞见。"
 BFI_gui_action_button_3_issue_14_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  每日海军经验：§G+0.02§!\n  海军组织度：§G+5%§!\n§Y日本§!将获得：\n  海军组织度：§G+5%§!\n"
 BFI_gui_action_button_4_issue_14_JAP_tt:0 "为了深化与意大利的军事同盟，我们不仅要目睹他们的策略，更要与他们共同战斗。我们将选派“志愿者”前往支援意大利在诸殖民地的小型战争。这些士兵，虽心系日本，却将与意大利战友同仇敌忾。若此举成效显著，我们将借此良机，进一步促进两国间的军事合作。"
 BFI_gui_action_button_4_issue_14_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  每日海军经验：§G+0.03§!\n  海军组织度：§G+10%§!\n§Y日本§!将获得：\n  海军组织度：§G+10%§!\n"
 BFI_gui_action_button_5_issue_14_JAP_tt:0 "我们已向意大利派出观察员多时，现在是时候派遣一位名副其实的军事专员了。一位资深的日本军官将进驻大使馆代表团，与意大利政府携手，精心维护我们苦心孤诣建立的军事合作关系。此举将向意大利证明，我们不仅愿意与他们同仇敌忾，而且已经整装待发。冲突一旦爆发，日本将始终将意大利的利益放在首位。"
 BFI_gui_action_button_5_issue_14_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  每日海军经验：§G+0.04§!\n  海军组织度：§G+15%§!\n§Y日本§!将获得：\n  海军组织度：§G+15%§!\n"
 BFI_gui_action_button_6_issue_14_JAP_tt:0 "时机已经成熟，我们应当与意大利武装力量共同开展联合军演。由于地理位置的原因，我们两国的军演将主要是在印度洋举行的联合海军训练。日本帝国海军与意大利皇家海军并肩作战，不仅能够锻炼出更多身经百战的海军精英，更将日本与意大利两个帝国联手的决心昭示天下。"
 BFI_gui_action_button_6_issue_14_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  每日海军经验：§G+0.05§!\n  海军组织度：§G+20%§!\n§Y日本§!将获得：\n  海军组织度：§G+20%§!\n"
 BFI_gui_action_button_2_issue_15_ITA_tt:0 "归属意大利的军事情报局在欧洲和中东地区深耕情报工作已久。若无他们，我们的帝国恐怕早已风雨飘摇。虽然美国的中央情报局和日本大本营特务总监部伸出的合作之手令人心动，但我们深感让军情局与外国势力的情报系统深度融合无异于引火烧身，故而婉拒了这些提议。"
