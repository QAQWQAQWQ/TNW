 BFI_gui_action_button_4_issue_15_JAP_tt:0 "通过情报上的互惠交换，我们将与意大利建立一种平等和公平的关系。我们期盼意大利能洞察到，与一个拥有强大而广泛的情报机构如大本营特务总监部的国家结盟，对他们而言好处多多。"
 BFI_gui_action_button_4_issue_15_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  加密：§G+6%§!\n  解密：§G+6%§!\n  侦察：§G+10%§!\n§Y日本§!将获得：\n  加密：§G+4%§!\n  解密：§G+2%§!\n"
 BFI_gui_action_button_5_issue_15_JAP_tt:0 "大本营特务总监部虽有其长处，但在欧洲和非洲等地的行动若能借力国际合作，我们的行动将更加行之有效。我们打算与意大利方面沟通，讨论如何通过跨部门的情报合作来建立信任，并共同实现超越单独行动的目标。团结就是力量，对于军事情报局和大本营特务总监部来说，众志成城，无往不胜。"
 BFI_gui_action_button_5_issue_15_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  加密：§G+8%§!\n  解密：§G+8%§!\n  侦察：§G+15%§!\n§Y日本§!将获得：\n  加密：§G+6%§!\n  解密：§G+3%§!\n"
 BFI_gui_action_button_6_issue_15_JAP_tt:0 "在世界各个角落的秘密战线，从隐秘的后巷到幽暗的街道，再到权力的殿堂，这场暗流涌动的战争或许将左右日本帝国的命运。意大利人对我们的援助价值连城，正如我们对他们的支持一样。因此，我们将携手合作，以暗度陈仓的策略而非明目张胆的武力来巩固我们的全球地位。"
 BFI_gui_action_button_6_issue_15_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  加密：§G+10%§!\n  解密：§G+10%§!\n  侦察：§G+20%§!\n§Y日本§!将获得：\n  加密：§G+8%§!\n  解密：§G+4%§!\n"
