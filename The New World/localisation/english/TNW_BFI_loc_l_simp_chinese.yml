 BFI.19.t:0 "黑暗中的一束光芒"
 BFI.19.d:0 "意大利既已将专制埋葬于其土壤之下，如今，我们需向世界展现新生之姿。在欧洲这片大陆上，意大利犹如黑夜中的一盏明灯，众专制之海中的民主之岛，它证明了即使在大日耳曼国的阴霾笼罩之下，自由之光仍旧能够闪耀。世界各地的英才若愿赴此，共襄盛举，重建家园，我们将以海纳百川的胸怀，拥抱每一位探索者。法西斯已成往事，而今，我们更需铸就独立与自由的新篇章，从对善意之人的开放中汲取力量。虽然前路未卜，这光明能否穿透黑暗，尚待时间检验。但在以后的时日里，意大利创造美好的精神，将由全世界见证其辉煌。"
 BFI.19.a:0 "文艺复兴的曙光正在破晓。"
 BFI.1.t:0 "来自罗马的提议"
 BFI.1.d:0 "近几个月，意大利实现了民主化，意大利大使已经找上了我们，表示了友好合作的意愿。自五十年代意大利和纳粹决裂以来，我们就一直保持着友好的关系，现在正是把意大利帝国拉入共荣圈的绝好时机。\n\n意大利掌控着苏伊士，睥睨地中海，殖民地从突尼斯延伸到非洲之角，意大利可以和共荣圈完美互补，把共荣圈变成一个全球性的阵营。此外，我们还可以在德国家门口赚得一位盟友，不可不谓大有裨益。我们会用尽一切办法，把意大利人拉进共荣圈，绝不能让这一机会白白流失，更不能让意大利落入我们的敌人手中。"
 BFI.1.a:0 "给我接大使！"
 BFI.2.t:0 "来自罗马的提议"
 BFI.2.d:0 "近几个月，意大利实现了民主化，意大利大使已经找上了我们，表示了友好合作的意愿。自五十年代意大利和纳粹决裂以来，我们就一直试图拉拢意大利，现在正是把意大利帝国拉入OFN的绝好时机。\n\n意大利掌控着苏伊士，睥睨地中海，殖民地从突尼斯延伸到非洲之角，意大利可以让自由世界添上一位猛将。此外，我们还可以在德国家门口赚得一位盟友，不可不谓大有裨益。我们会用尽一切办法，把意大利人拉进OFN，绝不能让这一机会白白流失，更不能让意大利落入我们的敌人手中。"
 BFI.2.a:0 "给我接大使！"
 BFI.3.t:0 "来自华盛顿的报告"
 BFI.3.d:0 "我们已经在想办法把意大利拉入我们阵营，但是我们最近获悉，美国人也在做同样的事情，他们想把意大利人拉进OFN。这绝对不可接受。意大利若加入了OFN，那美国人可从中获益良多，不仅可以获得在欧洲的落脚点，也可以为他们的“自由世界”增添一员虎将。我们应用尽一切资源把意大利拉进共荣圈，至少不能让他们加入OFN。"
 BFI.3.a:0 "不能让美国人领先我们！"
 BFI.4.t:0 "来自东京的新闻"
 BFI.4.d:0 "我们已经在想办法把意大利拉入我们阵营，但是我们最近获悉，日本人也在做同样的事情，他们想把意大利人拉进共荣圈。这绝对不可接受。意大利若加入了共荣圈，那日本人可从中获益良多，不仅可以获得在欧洲的落脚点，也可以让共荣圈成为一个全球性的阵营。这样的结果是我们绝不希望看到的。我们应用尽一切资源把意大利拉进OFN，至少不能让他们加入共荣圈。"
 BFI.4.a:0 "不能让东京在冷战中超过我们！"
 BFI.5.t:0 "美国人的天鹅之歌"
 BFI.5.d:0 "美国和他们在OFN的狗腿子们向意大利人提出了几项提议，欲把意大利拉入他们的阵营，包括技术支持和关键资源的优先使用权。我们需要采取更多行动拉拢罗马，最少最少也得阻止那帮扬基佬把意大利拉进OFN。"
 BFI.5.a:0 "大使在哪！"
 BFI.6.t:0 "东京的塞壬"
 BFI.6.d:0 "日本和他们在共荣圈的傀儡们向意大利人提出了几项提议，欲把意大利拉入他们的阵营，包括技术支持和关键资源的优先使用权。我们需要采取更多行动拉拢罗马，最少最少也得阻止那帮日本鬼子把意大利拉进共荣圈。"
 BFI.6.a:0 "大使在哪！"
 BFI.7.t:0 "修罗场"
 BFI.7.d:0 "意大利竟成了美日两国较量影响力的舞台，这并非我们所愿。我们愿与两国携手，以促进经济的繁荣和外交的顺畅，但在两大势力之间保持独立自主，实非易事。日本与美国，虽然满口仁义，却难掩其扩张野心。他们自诩为顶尖强国，对我们这所谓的二流国家虎视眈眈。虽然受宠若惊，但我们不能让我们的自由受到半点威胁。意大利是一个拥有主权的国家，她必须被以主权国家之礼相待。"
 BFI.7.a:0 "妄图撼动我们的尊严，真是荒谬绝伦。"
 BFI.23.t:0 "我们将孤身前行"
 BFI.23.d:0 "外交争斗的硝烟终于散去。在目睹了美国与日本政府间一系列针锋相对的公文往来之后——这些公文不仅相互交锋，也直指意大利——我们必须声明，罗马自有其主见。外界的反应，我们无需挂怀，我们的主权怎能被那些缺乏安全感的强权所左右，这天理不容。"
 BFI.23.a:0 "这里不再有外国的权谋纠缠。"
 BFI.9.t:0 "意大利加入OFN"
 BFI.9.d:0 "今天，意大利帝国正式加入自由国家组织，这一历史性时刻将被永远铭记！\n\n意大利虽受自由国家组织与共荣圈的双向青睐，其却认定自由国家组织才是符合意大利利益的最佳盟友。由此，意大利获得了抵御德国侵略的坚强后盾，大日耳曼国的门槛上，自由世界卷土重来。"
 BFI.9.a:0 "美国毕竟是由一位意大利人命名的"
 BFI.10.t:0 "意大利加入自由世界"
 BFI.10.d:0 "今天，美国各地的意大利裔社区欢声雷动，因为意大利不畏日本的强大压力，正式签署了加入自由国家组织的法律。\n\n意大利人民的这一勇敢行动，为自由国家组织在抵御团结协定和日本共荣圈的双重威胁中，注入了一剂强心针。自由国家组织在欧洲获得了坚实的立足点，也打开了通往苏伊士运河和中东地区丰富石油资源的大门。\n\n虽然冷战的硝烟尚未散去，但人们心中已燃起了希望的火花，自由世界的力量似乎终于迎来了曙光。"
 BFI.10.a:0 "暗夜孤光。"
 BFI.11.t:0 "意大利与美国结盟"
 BFI.11.d:0 "东京今日哗然，意大利不顾共荣圈外交使团的极力阻挠，正式加入了由美国领导的自由国家组织。\n\n意大利在全球冷战格局中占据着举足轻重的地位，其加入自由国家组织对共荣圈而言无疑是一次重大的外交挫败，可能会给共荣圈的未来带来严重的外交后果。"
 BFI.11.a:0 "这样的机会，从我们指间溜走了"
 BFI.12.t:0 "意大利加入共荣圈"
 BFI.12.d:0 "今日，世界格局风云突变，意大利正式签署了加入共荣圈的条约。\n许多人原本预计，由于地缘关系，自由国家组织能在对意大利的争夺中占据上风，但意大利与日本间的历史纽带，以及意大利在中东的利益对盟友的渴求，终究胜过了美国的游说和地缘现实。\n\n此举虽波及深远，两国却能暂时忘却烦忧，共襄盛举。在东京和罗马的欢庆之中，日本首相观赏了威尔第歌剧《奥赛罗》的特别演出，而意大利的官员们则沉醉于日本能剧的精彩演绎。"
 BFI.12.a:0 "东方的陌路友人"
 BFI.13.t:0 "意大利与日本结盟"
 BFI.13.d:0 "华盛顿今日哗然，意大利政府出人意料地回绝了美国的示好，转而与日本主导的共荣圈结盟。\n\n此举令美国痛失了在欧洲获得立足点扩张势力的良机，日本则因在地中海心脏地带获得了一个盟友而如虎添翼。\n\n意大利裔美国社区今日备受打击，一些受访者甚至带着自嘲的口吻，戏谑地提到他们战时可能面临“意大利裔美国人被拘禁”。"
 BFI.13.a:0 "该死…"
 BFI.14.t:0 "共荣圈得到在欧洲的立足点"
 BFI.14.d:0 "今日，共荣圈各地城市沉浸在一片欢腾之中，东京与罗马正式签署了意大利加入共荣圈的协议。\n曾有分析师对意大利投向美国主导的自由国家组织的结局忧心忡忡，然而，共荣圈的锲而不舍与意大利的紧密纽带最终让他们赢得了这场博弈。\n\n此举为共荣圈在西方的利益再添一重保障。共荣圈不仅在团结协定的门槛上站稳了脚跟，还确保了在苏伊士运河等全球关键贸易路线的畅通无阻，更别提对中东石油资源的掌握了。\n\n联盟的宣告激起了民众的“意大利热潮”，意大利音乐唱片正供不应求，语言学校也收到了雪片般的意大利语课程请求。"
 BFI.14.a:0 "他们走在正确的大路上。"
 BFI.15.t:0 "意大利保持独立"
 BFI.15.d:0 "犹如秃鹫盘旋于腐尸之上般，美国人与日本人正对我们的国家虎视眈眈，但我们岿然不动。以意大利全民之名，为捍卫我们的独立自主，我们宣告不会投身于任何一方强权所支持的阵营。我们的外交独立性让我们得以在压力之下保持从容，审时度势，始终将意大利的根本利益放在首位。"
 BFI.15.a:0 "我们仍然自由。"
 BFI.16.t:0 "意大利保持不结盟"
 BFI.16.d:0 "尽管美国的外交斡旋不遗余力，大日本帝国亦步亦趋，意大利却宣称仍将保持中立，不偏不倚，独立于自由国家组织和共荣圈之外。这虽非我们所愿，但事态本可能更糟——愿上帝保佑，不要让日本为一己之私而觊觎地中海的心脏。"
 BFI.16.a:0 "那么就让他们置身事外，保持中立吧。"
 BFI.17.t:0 "意大利保持不结盟"
 BFI.17.d:0 "尽管我们竭尽全力，美国也发出了最后通牒，意大利却仍然宣布将不站队，保持在共荣圈与自由国家组织之间的中立。虽然这不是最理想的结果，但倒也避免了美国再添一员俯首帖耳的追随者，这让我们稍感安慰。"
 BFI.17.a:0 "就这样吧。"
 BFI.30.t:0 "意大利选择了她的未来"
 BFI.30.desc:0 "近日，自由国家组织与共荣圈为了赢得欧洲最娇艳的花——迷人的意大利帝国的芳心，展开了一场激烈的角逐。\n\n泪水与花束，挑战与应战，交织其中，然而，两位追求者目前都遭到了冷遇。这位淑女尚未准备许下承诺——不，她需要时间来寻觅真我，独自踏上一段旅程。\n\n不急于选边站的决定，或许并不出人意料。共荣圈与自由国家组织都极欲将意大利揽入怀中，因此，保持观望或许能促使某一方提出更诱人的条件。爱情三角少有明确胜者，但这一次，意大利或许能借此机会反客为主。"
 BFI.30.a:0 "我们决定自己的命运。"
 BFI.30.b:0 "至少他们没有选择日本人。"
 BFI.30.c:0 "至少他们没有选择美国人。"
 BFI.31.t:0 "美国在议题中取胜！"
 BFI.31.desc:0 "在罗马，经过几周的唇枪舌剑之后，美国、日本和意大利官员终于达成共识。我们得知意大利政府对美国提出的提案表示欢迎，并将因此在当前议题上更倾向于与美国保持一致。\n\n在华盛顿，国务院的外交官们如释重负，因为意大利向自由国家组织和自由世界更进了一步，而东京的外务省官员们则在私下里对这个挫折感到沮丧。在罗马，政府部长们为自己做出了这个决定而肃然点头，他们明白这个选择将对意大利帝国未来几代人的命运产生深远影响。\n\n意大利的争夺战还在继续，自由国家组织和共荣圈都在等待罗马的下一次召唤，以讨论议程上的下一个议题。"
 BFI.31.a:0 "离白鹰又近一步。"
 BFI.31.b:0 "为了自由与正义。"
 BFI.31.c:0 "我们必须加倍努力。"
 BFI.32.t:0 "日本在议题中取胜！"
 BFI.32.desc:0 "在罗马，经过数周的唇枪舌剑，美国、日本和意大利官员终于达成共识，我们得知意大利政府对日本提出的提议表示欢迎，并可能在当前问题上更倾向于日本帝国。\n\n东京的日本外交官们如释重负，因为意大利向共荣圈和他们历史上的盟友靠近了一步，而华盛顿国务院的官员们则对这个挫折暗自叹息。在罗马，政府部长们为自己做出了这个决定而肃然点头，他们明白这个选择将对意大利帝国未来几代人的命运产生深远影响。\n\n意大利的争夺战还在继续，自由国家组织和共荣圈都在等待罗马的下一次召唤，以讨论议程上的下一个议题。"
 BFI.32.a:0 "离旭日又近一步。"
 BFI.32.b:0 "我们必须加倍努力。"
 BFI.32.c:0 "为了日本与天皇。"
 BFI.90.t:0 "选择我们的未来"
 BFI.90.desc:0 "罗马城门向世界列强敞开之际，它们亦向我们伸出了橄榄枝。那些急欲涉足意大利这片充满潜力之地的外资，必将争先恐后地将资金注入我国经济——这些资金将被用于那些因成本考量而被束之高阁的项目。\n\n然而，我们重返国际舞台的步伐需如履薄冰、审慎前行；鲁莽行事只会自乱阵脚。故此，我们将精选五大议题，让意大利的盟友们在这些领域施以援手，也让华盛顿和东京明晰何处是投资的最佳去向。"
 BFI.90.a:0 "让我们把意大利拉回到世界舞台上。"
 BFI.91.t:0 "选择我们的投入等级"
 BFI.91.desc:0 "我们既已选定眼前议题，便可量力而行，各尽其能。我们的投资与谈判结束时我们预期的回报成正比。比如，如果我们在学术交流上投入更多，就能相应地扩大我们的学术基础；而对武器销售的小额投资，回报则微不足道。\n\n期待超级大国的静观其变，无异于痴人说梦。华盛顿与东京对半岛自有筹谋，其投资布局或许与我等愿景背道而驰。只要我们在谈判中坚持己见，便不足为虑；若最终天平倾斜于某方，我们也只得接受他们提出的条件，并笑纳其慷慨馈赠。\n\n要记住，没有两个问题能获得相同级别的投资。罗马虽荣光无限，但其国库却非取之不尽。"
 BFI.91.a:0 "一切各得其所。"
 BFI.92.t:0 "心怀叵测的裁决者"
 BFI.92.desc:0 "外交的齿轮昼夜不息，世界各方使节在意大利的社交盛宴上与当地上流社会精英们觥筹交错。美国与日本竞相想要赢得帝国的宠爱，其显贵们在意大利权贵们所玩的秘密游戏中成为了焦点。\n\n而普通意大利人，依旧被置于幕后。但他们比那些罗马、米兰和那不勒斯的小贵族更容易受我们影响。只要我们略施小计，就能让民众识破外来者的甜言蜜语……或者，若我们有意，亦可为他们精心准备，让他们准备迎接意大利众多追求者中的某一位。"
 BFI.92.a:0 "我们无法左右命运中的对手，却能决定与谁携手同行。"