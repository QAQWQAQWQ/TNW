 BFI_gui_action_button_3_issue_15_USA_tt:0 "美国在暗中的眼线只招募精英中的精英；那些跻身其行列的人，他们的自豪感往往会不知不觉地变成傲慢。无论是信号情报还是人力情报，他们都敢说，他们的部门在各方面都胜过其他人——除了，似乎，他们的意大利同行。帝国的密码分析师和外勤特工的表现超出了他们有限资源所能展现的水平，这为他们赢得了兰利那位以严苛著称的局长的破格认可。"
 BFI_gui_action_button_3_issue_15_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  加密：§G+4%§!\n  解密：§G+3%§!"
 BFI_gui_action_button_4_issue_15_USA_tt:0 "情报界的合作往往并非源于真心，且这些关系也非以稳固著称。每个潜在的合作伙伴的价值，仅取决于他们所提供的情报；一旦情报断流，合作便会如烟消云散。\n\n但近期，兰利与但丁广场似乎在打破这一常态。并不是说他们的关系不应建立在互惠的基础上，远非如此。如今，两国官员们正频繁地探讨超越非正式交换情报的关系——这是向新事物迈出的试探性尝试，步伐虽小，却意义非凡。"
 BFI_gui_action_button_4_issue_15_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  加密：§G+3%§!\n  解密：§G+6%§!"
 BFI_gui_action_button_5_issue_15_USA_tt:0 "被外界称作“秘密行动”的中央情报局与军事情报局之间的非常规交流，其演变速度和趋势变化，连双方的乐观派也未曾预见。五角大楼内，意大利语的流利对话如今清晰可闻，而美国的目光则在探寻罗马七丘下的秘密。这两个情报机构的言辞交锋已不再尖锐，他们对外展现的姿态不过是虚张声势。似乎，理想主义的曙光即将驱散自马基雅维利时代起便笼罩地缘政治的实用主义阴霾。"
