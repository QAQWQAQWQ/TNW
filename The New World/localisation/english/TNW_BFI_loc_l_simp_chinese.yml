 BFI_gui_action_button_5_issue_10_USA_tt:0 "时光流转，盟友更迭，战略随之生变。意大利已逐步适应了其作为美国新晋盟友的角色，而五角大楼亦将意大利视为欧洲应急计划中的友好力量。若得知在世界末日之际，美利坚将与意大利肩并肩，意大利武装力量定会心生欢喜。"
