 BFI_gui_action_button_4_issue_10_USA_tt:0 "“设想这样一个战略模拟：1972年6月，敌军在蒂罗尔和弗留利的山口陈兵列阵。假设敌军有五十万之众，全摩托化，装甲师团多达十二个，更不必说边境堡垒中的空降兵。德国空军在波河以北进行对敌防空压制和空中打击，力图在一天之内夺取制空权。身为意大利，你将如何布局？”\n\n“若敌军翻越阿尔卑斯山，从威尼斯到地中海就是一泻千里的500英里；山口一旦失守，便是满盘皆输。我将在撤退至威尼托之前，利用山区地利，尽可能消耗敌军。这或许能为我争取半年时间，再考虑是否接受城下之盟。”\n\n“难道就没有一丝胜算吗？”\n\n“面对北方那些装备精良的铁骑，我的弹药恐怕会先告罄，而他们的人力或坦克却源源不断。”\n\n“明白了。那么，假设你有第101、第82和第10山地师待命，REFORTA部队正从美国本土星夜兼程赶来。再假设第三空军能够信守诺言，将敌军的每一架轰炸机都击落……”"
