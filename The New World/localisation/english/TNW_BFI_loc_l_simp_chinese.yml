 BFI_gui_action_button_5_issue_2_USA_tt:0 "欲尽享美意贸易之益，单是降低关税尚不足够。我们须着手筹划，与罗马缔结一份真正的双边贸易协定。"
 BFI_gui_action_button_5_issue_2_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  贸易协定关系修正：§G+40%§!\n  GDP增长：§G+2%§!\n§M美国§!将获得：\n  GDP增长：§G+2%§!"
