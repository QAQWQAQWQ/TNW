 bfi_influence_italy_mission:0 "议题谈判"
 bfi_influence_italy_mission_desc:0 "我们已接收来自美国和日本外交官的初始提案。是时候对其进行审查，以确定谁为我们提供了最优方案。"
 bfi_influence_italy_mission_ITA:0 "议题谈判"
 bfi_influence_italy_mission_ITA_desc:0 "我们向意大利人提出的提议正在罗马起草、详细阐述和进行讨论。意大利人选择提出等级为§Y[?ITA.bfi_negotiation_level]§!的[ITA.BFI_get_decisions_importance_level]议题。他们将无法再次选择此等级。\n\n[ITA.BFI_get_decisions_importance_effect_ITA]"
 bfi_influence_italy_mission_USA:0 "美国提案"
 bfi_influence_italy_mission_USA_desc:0 "§M美国人§!已经做出选择，待提案起草完成后就将送至罗马。在该议题上，美国政府选择了等级为§Y[?USA.bfi_negotiation_level]§!的[USA.BFI_get_decisions_importance_level]。\n\n[USA.BFI_get_decisions_importance_effect_USA]"
 bfi_influence_italy_mission_JAP:0 "日本提案"
 bfi_influence_italy_mission_JAP_desc:0 "§Y日本人§!已经做出选择，待提案起草完成后就将送至罗马。在该议题上，日本政府选择了等级为§Y[?JAP.bfi_negotiation_level]§!的[JAP.BFI_get_decisions_importance_level]。\n\n[JAP.BFI_get_decisions_importance_effect_JAP]"
 bfi_ita_select_issue:0 "选择一项议题：解释"
 bfi_select_level_instructions:0 "选择我们的投入：解释"
 bfi_influence_italy_decision:0 "增进我们的影响：解释"
 bfi_gain_points_USA:0 "外交投入意大利"
 bfi_gain_points_USA_desc:0 "§G意大利§!很重要，如果任其溜走，我们就失去了一个控制地中海、进而对§j德国人§!施压的大好机会。向意大利送去更多的外交官与资源，我们就将获得更多的议价点，以在各议题上影响意大利。不过我们也必须保持谨慎，向意大利送去过多资源，将导致国内的§R不满§!。现在我们将在下一议题中获得§Y[?bfi_point_next_issue]§!议价点。"
 bfi_gain_points_JAP:0 "外交投入意大利"
 bfi_gain_points_JAP_desc:0 "§G意大利§!很重要，如果任其溜走，我们就失去了一个控制地中海、进而对§j德国人§!施压的大好机会。向意大利送去更多的外交官与资源，我们就将获得更多的议价点，以在各议题上影响意大利。不过我们也必须保持谨慎，向意大利送去过多资源，将导致国内的§R不满§!。现在我们将在下一议题中获得§Y[?bfi_point_next_issue]§!议价点。"
 BFI_USA_increase_influence_issue_1_dec:0 "在美国推广意大利文化"
 BFI_USA_increase_influence_issue_1_dec_desc:0 "虽然意大利与美国之间的签证政策和文化交流并未像与德国和日本那样受到严格限制，但战争的阴影仍旧让不少美国人对意大利的文化抱有成见。通过向意大利艺术家和电影制作人发放签证，让他们赴美展示和推广他们的作品，我们能够向意大利人展示，我们愿意将战争的往事抛诸脑后，与他们携手开启友谊的新篇章。"
 BFI_USA_anti_JAP_influence_issue_1_dec:0 "让意大利注意日本价值观"
 BFI_USA_anti_JAP_influence_issue_1_dec_desc:0 "意大利虽曾在上一场战争中与日本结盟，但我们明白，自那以后两国的关系已经大为冷却。或许我们该委婉地提醒他们，西方的基督教国家如意大利，其价值观与崇尚天皇的东方日本是水火不容的。意大利想要深入了解这种截然不同的文化，究竟能得到什么好处呢？"
 BFI_USA_increase_independence_issue_1_dec:0 "派遣美国艺术家去意大利"
 BFI_USA_increase_independence_issue_1_dec_desc:0 "意大利的大众文化部坚持排挤外来文化，使得美国的艺术、电影和文学作品在过去几十年里在意大利备受冷落。但我们清楚，对美国文化产物的渴望在意大利的地下市场从未减退。我们只需顺应民意，满足他们对美国文化的向往，意大利民众自然会对美国心生亲近。"
 BFI_USA_decrease_independence_issue_1_dec:0 "资助意大利艺术家与文化"
 BFI_USA_decrease_independence_issue_1_dec_desc:0 "意大利文化历史悠久，保护这份文化遗产历来是政府政策的重中之重。我们承诺将继续维护发展这份文化遗产，并在美国的助力下，让其焕发新的生机。在这一议题上，我们更倾向于看到一个坚如磐石的意大利，从容应对日本可能带来的任何影响。"
 BFI_JAP_increase_influence_issue_1_dec:0 "进口意大利电影"
 BFI_JAP_increase_influence_issue_1_dec_desc:0 "我们将与意大利公司签订特殊协议，将意大利电影引进至日本市场，并配备日语配音与本土化广告宣传。作为互惠的一部分，政府将享有特权，可以对这些电影的剧本和脚本进行审阅，确保其对日本文化的描绘既公正又准确。"
 BFI_JAP_anti_USA_influence_issue_1_dec:0 "宣传反美艺术家"
 BFI_JAP_anti_USA_influence_issue_1_dec_desc:0 "意大利的反美艺术家和知识分子比比皆是。可政治自由化的浪潮过后，他们的声音却渐渐式微。只需些许外援，这些怀有民族情怀的民族主义者便能借由各种途径，畅所欲言。"
 BFI_JAP_increase_independence_issue_1_dec:0 "收购意大利娱乐公司"
 BFI_JAP_increase_independence_issue_1_dec_desc:0 "日本空壳公司或许会买下意大利的本地影院、小型出版社，以及雇佣独立艺术家，从而编织一张依赖之网。终有一天，意大利人会惊觉，他们的文化命脉竟握在了日元的手中。"
 BFI_JAP_decrease_independence_issue_1_dec:0 "培养意大利先锋派"
 BFI_JAP_decrease_independence_issue_1_dec_desc:0 "意大利文化不断演变，却始终富有活力。年轻艺术家们勇于尝试新想法，即使面临失败，他们也不会轻易放弃，而是继续探索其他可能性。通过为这些新知识分子提供奖金和奖学金的激励，意大利文化将凭借其内在的价值而繁荣昌盛。"
 bfi_ITA_independence_issue_1_dec:0 "宣传本土艺术家"
 bfi_ITA_independence_issue_1_dec_desc:0 "我们积极投身于国际文化大舞台，意大利的独特地位应当被赋予特殊的重视。通过设立并推广专为意大利杰出作品量身定做的奖项，让它们得以在专属的领奖台上绽放光彩，这一目标不难实现。我们欢迎好莱坞和东京的作品进入意大利的剧院和市场，但罗马和威尼斯的电影学子们必须始终引领意大利电影的潮流。"
 bfi_ITA_JAP_influence_issue_1_dec:0 "邀请日本学生"
 bfi_ITA_JAP_influence_issue_1_dec_desc:0 "我们与日本的同盟关系自第二次世界大战起一直延续至今，并且关系依然稳固，共荣圈作为意大利石油的大买家，使得双方关系历久弥坚。现在是时候将我们之间的友谊提升到一个新的水平了，我们应该吸引日本的影视学生和有抱负的艺术家来到意大利，学习意大利电影，共同在东京与罗马之间编织文化交流的新篇章。"
 bfi_ITA_USA_influence_issue_1_dec:0 "多学好莱坞"
 bfi_ITA_USA_influence_issue_1_dec_desc:0 "好莱坞，这座艺术之城的化身，为意大利电影业竖起了一座值得效仿的灯塔。我们或许应该从深化与意大利裔美国社区的联系着手，同时搭建起意大利与加州艺术家之间交流的桥梁。毕竟，科波拉和斯科塞斯的杰作，在罗马和洛杉矶同样享有盛誉。"
 bfi_ITA_anti_USA_issue_1_dec:0 "仔细审查美国的失败"
 bfi_ITA_anti_USA_issue_1_dec_desc:0 "好莱坞虽被视为艺术家与观众心中的山巅之城，但我们仍需提醒他们这座山丘的本来面目。美国社会被种族歧视、政治两极化等痼疾所困扰。好莱坞在维系和加剧这种不平等与矛盾的体系中扮演了推波助澜的角色，若能减少其对意大利民众的影响力，这对我们实为上策。"
 bfi_ITA_anti_JAP_issue_1_dec:0 "压制泛亚价值观"
 bfi_ITA_anti_JAP_issue_1_dec_desc:0 "虽然我们与日本的关系根植于二战时期的轴心国同盟，但这并不是我们将意大利文化市场轻易让给那些与我们的文化和价值观背道而驰的外国和实验性作品的借口。我们不会坐视不理，任由日本的意识形态自下而上地渗透进意大利社会：若日本文化要席卷意大利，它必须按照我们的规则行事。"
 BFI_USA_increase_influence_issue_2_dec:0 "给予在美意大利公司税收鼓励"
 BFI_USA_increase_influence_issue_2_dec_desc:0 "我们的市场在全球经济体系中举足轻重，众多外国企业竞相在此寻求立足之地，其中不乏成功者。我们只需为意大利的跨国企业提供一些税收上的优惠，便能将整个国家与我们的关系拉得更近。"
 BFI_USA_anti_JAP_influence_issue_2_dec:0 "仔细审查日本产品"
 BFI_USA_anti_JAP_influence_issue_2_dec_desc:0 "日本产业制造的不过是些粗制滥造的产品。他们的民用工业与美国巨头相比，简直是小巫见大巫，但我们在罗马的朋友们却未必这么认为。我们需要让意大利的精英和中产阶级也认识到这一点。通过发布一些揭露日本产品质量真相的报告，并让其在意大利媒体上广泛传播，我们就能轻而易举地达成这个目标。"
 BFI_USA_increase_independence_issue_2_dec:0 "给予意大利贸易优惠待遇"
 BFI_USA_increase_independence_issue_2_dec_desc:0 "外国进口商品通常必须经过一系列的规定审查才能进入美国。为了巩固与意大利的贸易往来，我们可以考虑对意大利的出口商品放宽一些常规的进口限制，以示友好。"
 BFI_USA_decrease_independence_issue_2_dec:0 "接触意裔美国人商界"
 BFI_USA_decrease_independence_issue_2_dec_desc:0 "东北部地区有许多意大利裔美国人的公司和企业，他们正急于利用他们祖国经济的开放大赚一笔。为了增加我们对意大利的出口，我们应该接触这些公司。将我们的商业社区与意大利的商业社区紧密结合，意大利只会更难制定独立的贸易政策。"
 BFI_JAP_increase_influence_issue_2_dec:0 "在日本推广意大利企业"
 BFI_JAP_increase_influence_issue_2_dec_desc:0 "虽然日本国内市场仍旧是财阀的天下，他们将共荣圈的商品和服务源源不断地输送给帝国的每个角落，但在本土岛屿的各城市里，意大利制造却逐渐受到追捧。一旦我们敞开大门，让意大利商品流入日本市场，罗马自然会与我们同声相应，因为我们正携手意大利，共同培育长远的经济利益。"
 BFI_JAP_anti_USA_influence_issue_2_dec:0 "让意大利警惕美式资本主义"
 BFI_JAP_anti_USA_influence_issue_2_dec_desc:0 "至关重要的是，我们不能让意大利人被美国资本和产品的诱惑引入彀中。从南非的钻石矿到华盛顿本土那些令工人汗流浃背的工厂，也许应该让罗马警醒，无数国家已在这场你死我活的利润追逐和华尔街公司对资源的无情掠夺中尝尽苦头。我们怎能忍心让我们的老朋友对美国人糖衣炮弹下的陷阱懵然无知。"
 BFI_JAP_increase_independence_issue_2_dec:0 "投资意大利企业"
 BFI_JAP_increase_independence_issue_2_dec_desc:0 "在意大利半岛星罗棋布的社区里，勤劳的劳动力和小微企业是它们坚实的脊梁，他们与大企业携手，使得地中海经济蓬勃发展，享誉世界。显然，我们的利益在于投资这些充满活力的社区，以巩固意大利制造业的根基，进而在印度洋彼岸培育一个坚如磐石的盟友，共同抵御美国经济的渗透。"
 BFI_JAP_decrease_independence_issue_2_dec:0 "派遣日本企业家去意大利"
 BFI_JAP_decrease_independence_issue_2_dec_desc:0 "意大利市场充斥着其国内产业生产的各种商品和服务行业，这些商品和服务因严苛的劳动法规和规章而使得成本水涨船高，最终转嫁给了消费者。然而，随着我们的企业家在罗马受到礼遇，我们期望能在当地开展业务，将来自共荣圈的进口商品以更亲民的价格带给意大利人——这或许能让我们的经济影响力在该地区生根发芽，因为市场上将充斥着廉价且吸引人的日本商品。"
 bfi_ITA_independence_issue_2_dec:0 "鼓励国内贸易"
 bfi_ITA_independence_issue_2_dec_desc:0 "意大利的市场自当先享其成，从本国生产的产品中获利。无论是增税还是收取额外费用，加之对本土企业家的诸多承诺，都必将使我们的市场在贸易中占据先机，而非将商品远销海外。"
 bfi_ITA_USA_influence_issue_2_dec:0 "大西洋贸易协定"
 bfi_ITA_USA_influence_issue_2_dec_desc:0 "在罗马与美国代表的会晤之后，我们决意与自由国家组织成员国签订一项全面的贸易协定，以推进意大利与美国间的自由贸易。此举预计将使我们从洛杉矶和纽约的市场中获得丰厚回报，意大利商品有望在激烈的市场竞争中脱颖而出。"
 bfi_ITA_anti_JAP_issue_2_dec:0 "回绝日本要求"
 bfi_ITA_anti_JAP_issue_2_dec_desc:0 "东京提出的一系列要求完全不可接受，因此我们认为…暂时没有必要继续与共荣圈的代表继续谈话了。公然拒绝日本的要求无疑会在不久的将来恶化两国关系，但我们确信，此举是意大利在世界舞台上展现实力的表现。"
 bfi_ITA_JAP_influence_issue_2_dec:0 "与共荣圈谈判"
 bfi_ITA_JAP_influence_issue_2_dec_desc:0 "亚洲的共荣圈历来是意大利原材料的大买家，且这种趋势仍在持续。若我们巧施妙计，便能将这份伙伴关系拓展至更多意大利的商品上，为我们打入东京那竞争已至白热化的市场铺平道路。"
 bfi_ITA_anti_USA_issue_2_dec:0 "回绝美国要求"
 bfi_ITA_anti_USA_issue_2_dec_desc:0 "华盛顿提出的一系列要求完全不可接受，因此我们认为…暂时没有必要继续与OFN的代表继续谈话了。公然拒绝美国的要求无疑会在不久的将来恶化两国关系，但我们确信，此举是意大利在世界舞台上展现实力的表现。"
 BFI_USA_increase_influence_issue_3_dec:0 "在大使馆举行社交活动"
 BFI_USA_increase_influence_issue_3_dec_desc:0 "历经十年尘封，美国驻罗马大使馆如今重焕光彩，成为社交圈的焦点，频繁举办着上流社会的盛会。在这些聚会中，外交使节、商界巨头与豪门贵胄相互结识，缓缓编织成一张我们可以借助的人脉网，以此在意大利提升我们的影响力和地位，尤其是在这个紧要关头。"
 BFI_USA_anti_JAP_influence_issue_3_dec:0 "散播日本仇外谣言"
 BFI_USA_anti_JAP_influence_issue_3_dec_desc:0 "“他们孤岛自闭近四百年，如今却要你相信他们会视你为手足？日本人心中无兄弟情，亦无友爱。他们对欧洲人的憎恨，与对中国人或美国人的憎恨一样深。你可曾听闻他们对俘虏的美国士兵的所作所为？”罗马的街头巷尾，如今流传着大日本帝国对欧洲人犯下暴行的传言，从似是而非到荒诞不经的都有。尽管如此，这个观念逐渐开始在意大利民众中生根——日本人不喜欢“外人”，意大利需对此保持警惕。"
 BFI_USA_increase_independence_issue_3_dec:0 "放宽对意大利游客的签证要求"
 BFI_USA_increase_independence_issue_3_dec_desc:0 "意大利人对美国海岸并不陌生，昔日大批移民跨海而来，成为美利坚最勤劳、人口最多的居民之一。如今，签证门槛降低，他们得以作为游客，一睹自由女神的风采。从纽约的天际线到芝加哥的湖光，再到历史厚重的华盛顿特区——他们带着对自由、民主的新认识，满载而归。"
 BFI_USA_decrease_independence_issue_3_dec:0 "在博物馆和文化遗产方面进行合作"
 BFI_USA_decrease_independence_issue_3_dec_desc:0 "The Italian American Museum in New York. Museo ItaloAmericano in San Francisco. The Casa Italia Chicago. The United States is filled with the vibrant addition of Italian culture into the melting pot of America. Now, all over Sicily and southern Italy, reciprocal establishments open - funded by the generous and deep pockets of their friends across the pond. These organizations and museums hire many locals, teaching them English and the virtues of the United States (providing a considerable boost to the economies of those corners of Italy while they're at it)."
 BFI_JAP_increase_influence_issue_3_dec:0 "赞助在意日本旅游业"
 BFI_JAP_increase_influence_issue_3_dec_desc:0 "随着意大利旅游业的复苏，地中海的迷人风光和历史遗迹正吸引着成千上万的日本游客，他们的目光跨越印度洋，被意大利的魅力所吸引。温暖的气候、古老的遗迹和热闹的城市吸引着人们，我们预计意大利经济将从我们国民从都灵到突尼斯的旅行中获得巨大利益。通过延长签证和降低关税，我们希望增加赴意大利度假胜地的日本游客数量，从而自然地拉近两国之间的距离。"
 BFI_JAP_anti_USA_influence_issue_3_dec:0 "让意大利注意文化堕落"
 BFI_JAP_anti_USA_influence_issue_3_dec_desc:0 "固然，意大利旅游业有望从华盛顿游客的腰包中每年赚得盆满钵满，然而美国游客的不拘小节和无知行为不容小觑。或许我们该向意大利外交部提个醒，让他们知道美国游客带来的商业化浪潮可能冲淡意大利当地的文化特色。"
 BFI_JAP_increase_independence_issue_3_dec:0 "向意大利文化场所捐助"
 BFI_JAP_increase_independence_issue_3_dec_desc:0 "意大利人民追溯其根脉，古迹斑斑，甚至远至罗马之前，皆为其先辈辉煌成就之见证。我们亦能领略两国人民的古老传统，故此，我国政府将向意大利文化保护组织慷慨捐助，以示友好与团结。诚然，一个能够铭记其辉煌历史的意大利，必将开创更加强大的未来。"
 BFI_JAP_decrease_independence_issue_3_dec:0 "鼓励投资意大利旅游别墅"
 BFI_JAP_decrease_independence_issue_3_dec_desc:0 "地中海地区日渐成为吸引日本投资者的热土，或许现在正是我们将其定位为吸引富裕游客的黄金地段的良机。我们可以向意大利政府提出在旅游行业投资的请求，为那些日本富豪在撒丁岛等热门旅游目的地建造高级度假村和别墅，这可能是我们跻身意大利旅游业首要客户之列的敲门砖，进而构筑我们梦寐以求的合作关系。"
 bfi_ITA_independence_issue_3_dec:0 "推行旅游法规"
 bfi_ITA_independence_issue_3_dec_desc:0 "通过给各国合法游客的数量设限，我们可以在国际上让我们的旅游业获取更有竞争力的价格和安排，同时也能减轻本地景点和目的地的竞争压力，让国内旅游继续成为我们的王牌。"
 bfi_ITA_USA_influence_issue_3_dec:0 "倾向大西洋机构"
 bfi_ITA_USA_influence_issue_3_dec_desc:0 "人所共知，众口难调，若必须要在华盛顿和东京之间做出抉择，我们不得不承认，我们更倾向于前者。这将让我们远离可能因日本游客增多而引发的意识形态和政治纷争，我们认为“知彼知己”更为稳妥。我们将向美国公司伸出新的旅游签证橄榄枝，更看好他们以盈利为本的经营之道，而非日本的方式。"
 bfi_ITA_anti_JAP_issue_3_dec:0 "谴责日本提议"
 bfi_ITA_anti_JAP_issue_3_dec_desc:0 "在外交舞台上，断然拒绝有时是必要的。东京方面曾屡次向我们提出各种合作计划和资金承诺，我们之前都予以接纳。但如今，我们必须坚决拒绝，因为我们已识破其真面目——这些不过是日本机构和游客为了博取好感而施展的雕虫小技，而且这种伎俩实在不值一提。"
 bfi_ITA_JAP_influence_issue_3_dec:0 "报答日本善意"
 bfi_ITA_JAP_influence_issue_3_dec_desc:0 "日本帝国对与意大利缔结互惠协议充满热忱，这些协议对我们旅游业的繁荣大有裨益。从携手研究历史的协议到拓展日本旅游业的声明，我们决定给予日本机构一些优惠政策，以此回报他们的慷慨提议，并期盼这些合作能够长久下去并进一步扩大。"
 bfi_ITA_anti_USA_issue_3_dec:0 "回绝美国提议"
 bfi_ITA_anti_USA_issue_3_dec_desc:0 "人所共知，众口难调，若必须要在华盛顿和东京之间做出抉择，我们不得不承认，我们更倾向于后者。对意大利文化与旅游业的商业化泛滥感到忧心，我们决定投向日本那热情的怀抱。从今往后，最有利的合作机会将属于日本，而非美国。"
 BFI_USA_increase_influence_issue_4_dec:0 "鼓励跨大西洋投资"
 BFI_USA_increase_influence_issue_4_dec_desc:0 "数十年的相互的经济隔离使我们和意大利的发展道路大相径庭，重启交流的潜在益处不可限量。但拆除关税壁垒之举，仍然颇具争议。\n\n我们何不另辟蹊径，激励本国制造商跨海建厂，反之亦然。如此一来，双方经济可取长补短，同时保制造业根基于本土，进而加深彼此间的纽带。"
 BFI_USA_anti_JAP_influence_issue_4_dec:0 "夸大财阀威胁"
 BFI_USA_anti_JAP_influence_issue_4_dec_desc:0 "财阀，这庞然大物，利用其庞大的规模来压制竞争，欺压百姓，即便效率低下，亦能从中图利。与日本的合作将为这些财阀敞开大门，我们必须让意大利人警醒，认识到这股势力对他们社会潜藏的威胁。"
 BFI_USA_increase_independence_issue_4_dec:0 "美国大街上的Eleganza牌"
 BFI_USA_increase_independence_issue_4_dec_desc:0 "反法西斯战争和德寇对巴黎的占领，标志着时尚设计一个时代的结束。意大利人正骄傲地见证着米兰的崛起，成为欧洲时尚的新都。我们将向米兰设计师敞开市场，这必将让我们在米兰赢得属于我们的友谊，意大利民众也将因他们的设计在美国街头赢得赞誉而倍感荣耀。"
 BFI_USA_decrease_independence_issue_4_dec:0 "挽救BPD"
 BFI_USA_decrease_independence_issue_4_dec_desc:0 "邦布里尼-帕罗迪-德尔菲诺公司，意大利火药与化学品生产的巨头，如今濒临破产。我们的顾问团队设计了一个方案，让他们的美国同行杜邦公司收购该公司。此举不仅能赢得意大利工业巨头的欢心，若我们巧妙淡化这一新资产现有的困境，亦能赢得意大利民众的认同。"
 BFI_JAP_increase_influence_issue_4_dec:0 "在罗马举办工业博览会"
 BFI_JAP_increase_influence_issue_4_dec_desc:0 "共荣圈汇聚了众多世界级工业、引擎与电气设备制造商。日本创新之果，已使亚洲社区焕发新生，我们有信心让地中海亦能迎来繁荣。展示日本制造与工业精品，必将吸引意大利消费者的眼球和意大利商业的关注，进而牵引罗马的目光。"
 BFI_JAP_anti_USA_influence_issue_4_dec:0 "标出美国供应商"
 BFI_JAP_anti_USA_influence_issue_4_dec_desc:0 "确凿无疑，某些美国商业集团正将他们的劣质商品倾销至意大利。他们利用花哨的广告迷惑人心，诱骗无辜的意大利消费者购买那些廉价的金属机器，骗取他们的血汗钱。因此，我们责无旁贷地要提醒意大利政府，公布信息和官方报告，揭露美国资本主义对意大利这个易受帝国主义掠夺的社会所带来的侵蚀性影响。"
 BFI_JAP_increase_independence_issue_4_dec:0 "投资意大利工业"
 BFI_JAP_increase_independence_issue_4_dec_desc:0 "意大利的工业带一直是这个半岛经济繁荣的源泉，近百年来始终如一，如今，意大利制造业的蓬勃发展，预示着它有望在未来的全球经济中成为一位强有力的竞争者。我们将投资于这一发展中的工业力量，让地方财富和产能激增，不再依赖于与美国资源和资本的不平等关系。"
 BFI_JAP_decrease_independence_issue_4_dec:0 "推动降低日本商品关税"
 BFI_JAP_decrease_independence_issue_4_dec_desc:0 "我们与意大利政府的纽带，不只是停留在友好协议和表面合作上；意大利的名流与财阀们的股东有过推杯换盏，意大利的制造商们对日本的工业模式也不乏溢美之词。何不借这股邻里之谊，让罗马就范，接受我们的条件，减轻对日货的税负。毕竟，若我们能自然而然地成为贸易伙伴，那么，我们便能真正携手共赢，这不过是水到渠成之事。"
 bfi_ITA_independence_issue_4_dec:0 "推行保护主义措施"
 bfi_ITA_independence_issue_4_dec_desc:0 "在追求与各国达成互利贸易协定的同时，我们不可让外来利益侵蚀本土企业的根基。通过实施一系列旨在补贴和保护国内企业家的改革，我们就能为我们工业巨头们提供竞争优势，让他们在与外企巨头的较量中不落下风。"
 bfi_ITA_USA_influence_issue_4_dec:0 "与IBM签订协议"
 bfi_ITA_USA_influence_issue_4_dec_desc:0 "总部位于美国的国际商业机器公司有意将其业务版图扩展至欧洲市场。意大利以其稳定和商业友好的环境在调研中脱颖而出，国际商业机器公司随之向我们伸出了合作的橄榄枝，涉及多个项目。我们自会欣然接受这些提议，期待从中互利共赢。"
 bfi_ITA_anti_JAP_issue_4_dec:0 "谴责财阀式举措"
 bfi_ITA_anti_JAP_issue_4_dec_desc:0 "日本企业以其雷厉风行的效率和锐意进取的创新姿态在国际舞台上声名鹊起，但财阀的阴影依旧挥之不去，成为其争议的一大焦点。从独霸一方的垄断行径到令人发指的劳工政策，日本的经商之道与意大利的商业理念水火不容。我们的商业和市场将减少日本的影响，因为我们将暂时与东京保持距离。"
 bfi_ITA_JAP_influence_issue_4_dec:0 "与三菱合作"
 bfi_ITA_JAP_influence_issue_4_dec_desc:0 "三菱汽车公司，共荣圈市场的重量级玩家，向我们提出了与意大利政府合作的一系列提案。他们的愿望清单不短，但我们坚信，与这家企业巨头的深化合作将拉近我们与日本的距离，更关键的是，有望让我们国内的汽车行业迎来突破性的进展。"
 bfi_ITA_anti_USA_issue_4_dec:0 "批评美式资本主义"
 bfi_ITA_anti_USA_issue_4_dec_desc:0 "我们愿意与自由国家组织国家深化经济合作，但我们也相信，美国的思维模式并不适合欧洲市场。石油贸易上，我们与美国的竞争已白热化，华盛顿的伎俩我们也领教过。从今往后，我们的商业和市场将开始削减美国的干预程度，我们也将暂时与华盛顿保持距离。"
 BFI_USA_increase_influence_issue_5_dec:0 "学院交流项目"
 BFI_USA_increase_influence_issue_5_dec_desc:0 "思想的流动与交流总是与人的互动紧密相连。交换生项目乃是增进彼此联系和传播知识的佳径。"
 BFI_USA_anti_JAP_influence_issue_5_dec:0 "泄露共荣圈非人道研究的报告"
 BFI_USA_anti_JAP_influence_issue_5_dec_desc:0 "我们手头握有确凿证据，揭露了日本借科学之名所犯下的累累暴行。若“不经意”间将其中一些触目惊心的罪行公之于众，或许能让意大利人在与这些罪魁祸首发展关系时，慎之又慎。"
 BFI_USA_increase_independence_issue_5_dec:0 "奉承意大利学术界"
 BFI_USA_increase_independence_issue_5_dec_desc:0 "意大利，达芬奇与文艺复兴的摇篮，伽利略与科学条理的起源地，承载着科学与进步的辉煌传统。让我们唤起他们对学术历史的自豪感，这或许能成为我们之间缔结友谊的桥梁。"
 BFI_USA_decrease_independence_issue_5_dec:0 "共同建造粒子对撞机"
 BFI_USA_decrease_independence_issue_5_dec_desc:0 "除了我们之外，意大利是少数几个拥有正在运行的正负电子对撞机的国家之一，并且他们拥有一些在这些设备操作和建造领域最前沿的专家。一些顶级物理学家向我们提出了一个联合建造强子对撞机的提案，他们承诺这将在粒子物理领域带来重大突破。"
 BFI_JAP_increase_influence_issue_5_dec:0 "鼓励意大利学生交换"
 BFI_JAP_increase_influence_issue_5_dec_desc:0 "虽然日本并非意大利学生海外求学的首选之地，但我们完全可以通过激励措施吸引新一代学生来我国一些声望卓著的大学学习。通过培养彼此的青年一代，可以增进两国之间的联系，加上为其提供学生签证和支持，我们有望拉近与罗马的友谊。"
 BFI_JAP_anti_USA_influence_issue_5_dec:0 "为意大利大学提供更便宜的硬件"
 BFI_JAP_anti_USA_influence_issue_5_dec_desc:0 "美国向意大利学府抛出了橄榄枝，欲向他们出售他们的科学材料，然而我们心知肚明，华盛顿那些不上档次的小玩意儿何其粗劣。他们那些价格虚高的计算机系统和问题百出的科学设备，与我们所能提供的相比，简直是小巫见大巫。通过以更亲民的价格提供我们的大学正在使用的先进电子和化学仪器，我们足以说服罗马不去与华盛顿谈那些交易。"
 BFI_JAP_increase_independence_issue_5_dec:0 "资助意大利艺术与科学"
 BFI_JAP_increase_independence_issue_5_dec_desc:0 "意大利半岛的居民对科学和艺术的创新热爱源远流长，早在文艺复兴之前便已萌芽。如今，意大利的大学和学术机构继续传承着这一我们珍视的遗产，其影响力横跨印度洋，远播至世界各地。因此，我们将为这些组织和部门提供资金和支持，让意大利的学术根基得以自主且有机地繁荣发展，不再受制于美国在该地区的影响。"
 BFI_JAP_decrease_independence_issue_5_dec:0 "派出学术院系去意大利"
 BFI_JAP_decrease_independence_issue_5_dec_desc:0 "随着意大利大学向世界敞开大门，它们正致力于拓展学科知识和多样化专业特色，以为其学术殿堂增光添彩。我们认为这是一个绝佳的机会，可以派遣日本教授、学者和研究人员前往意大利各地的大学工作。我们不仅将助力意大利高等教育更上一层楼，而且还能将意大利更紧密地纳入我们的势力圈内。"
 bfi_ITA_independence_issue_5_dec:0 "增加对意大利大学的资助"
 bfi_ITA_independence_issue_5_dec_desc:0 "虽然与美国和日本大学合作对我们学术界大有裨益，我们却不能因此忽视本土大学的发展。如果我们不能为自己的学生提供良好的教育，那他们与帝国的附庸臣民又有何区别？为了防止这种情况的发生，我们将向意大利大学增资，确保它们能为我们的学生提供有竞争力的教育。"
 bfi_ITA_USA_influence_issue_5_dec:0 "赞助与美国大学的联系"
 bfi_ITA_USA_influence_issue_5_dec_desc:0 "美国以其悠久的自由传统和繁荣的经济，孕育了无与伦比的学术殿堂，与西方文化一脉相承，对我们的学术界而言，这比起日本的学术界更让他们感到亲近。因此，我们将通过支持意美学术会议、拓展意美高校交流项目，以及加大对英语教学的投入，来加深美国与意大利大学之间的纽带。"
 bfi_ITA_anti_JAP_issue_5_dec:0 "回绝日本大学"
 bfi_ITA_anti_JAP_issue_5_dec_desc:0 "让我们铭记，泛亚主义在日本学术界的影响力依然根深蒂固，审查制度或同行压力迫使他们屈从于泛亚主义的世界观。在这种情况下，我们怎能指望日本的学术界能对我们产生积极的影响？虽然我们无意彻底割席，但婉拒日本大学的学术会议邀请，以及适度缩减日本交流项目和日语教学规模，或许能为我们的学术界筑起一道防线，抵御不当之风。"
 bfi_ITA_JAP_influence_issue_5_dec:0 "赞助与日本大学的联系"
 bfi_ITA_JAP_influence_issue_5_dec_desc:0 "自16世纪意大利耶稣会士初登长崎以来，意日之间的学术交流便已萌芽。尽管语言和文化壁垒高筑，合作之路坎坷，但日本的东方文化能为我们的学术界带来研究的新视角。我们将赞助意日学术会议、扩大大学交流项目，以及增加日语教育经费，以此打破这些壁垒。"
 bfi_ITA_anti_USA_issue_5_dec:0 "回绝美国大学"
 bfi_ITA_anti_USA_issue_5_dec_desc:0 "我们珍视与美国大学的纽带，但不可让我们的学术界成为美国的附庸。我们将采取一些权宜之计，比如婉拒美国学术会议的邀请，控制美国交换生项目及英语教学项目的规模，以遏制美国学术界对我们的影响蔓延。"
 BFI_USA_increase_influence_issue_6_dec:0 "推行对意大利奶酪的免关税配额"
 BFI_USA_increase_influence_issue_6_dec_desc:0 "意大利拥有数种声名远扬的奶酪，这些奶酪在美国肯定能卖个好价钱。实行免关税配额后，高品质的奶酪制造商便能向美国出售他们的产品，而不会让我们市场上的廉价奶酪售卖受到冲击。"
 BFI_USA_anti_JAP_influence_issue_6_dec:0 "诽谤亚洲食品标准"
 BFI_USA_anti_JAP_influence_issue_6_dec_desc:0 "关于亚洲菜系的诸多流言与偏见现已四处流传。若我们顺势而为，便能巩固我们作为意大利农民和消费者首选伙伴的地位。"
 BFI_USA_increase_independence_issue_6_dec:0 "鼓励喝葡萄酒"
 BFI_USA_increase_independence_issue_6_dec_desc:0 "倡导人们适量饮用葡萄酒而非烈酒如威士忌，这不仅有助于身心健康，减少酗酒，也为意大利酿酒商带来了新的市场机遇。"
 BFI_USA_decrease_independence_issue_6_dec:0 "赞助南意大利的农业机械化"
 BFI_USA_decrease_independence_issue_6_dec_desc:0 "意大利的部分地区发展仍然滞后。若我们与当地的农民组织合作，助其农业机械化，定能赢得他们的支持。"
 BFI_JAP_increase_influence_issue_6_dec:0 "开展日本食品宣传运动"
 BFI_JAP_increase_influence_issue_6_dec_desc:0 "意大利人的饮食习惯因只吃意大利面、鱼，偶尔才有发酵葡萄而显得单调。通过精准投放的广告，我们将为意大利人揭开美食新天地的序幕。大米、寿司与茶，将从电视荧幕走向他们的餐桌，丰富他们的饮食文化。"
 BFI_JAP_anti_USA_influence_issue_6_dec:0 "揭露美式料理的健康风险"
 BFI_JAP_anti_USA_influence_issue_6_dec_desc:0 "肥美的肉食、甜腻的零嘴和高糖谷物，虽能满足口腹之欲，却未必是健康之选。日本和美国的学术研究纷纷指出，味蕾的盛宴可能是身体的负担。我们只需将这些真相告诉意大利人民，让他们和政府能做出明智之选。"
 BFI_JAP_increase_independence_issue_6_dec:0 "向意大利农民提供低息贷款"
 BFI_JAP_increase_independence_issue_6_dec_desc:0 "农民历来生活维艰，意大利农民更是如此，他们的土地因德国人的狂妄自大而变成了贫瘠的盐碱滩。然而，有了宽裕的低息贷款，他们便能添置新拖拉机、增雇人手，甚至有望重拾旧日生计。更为关键的是，他们将不再轻易放弃，不再将土地出让给美国人。"
 BFI_JAP_decrease_independence_issue_6_dec:0 "购买意大利农田"
 BFI_JAP_decrease_independence_issue_6_dec_desc:0 "给予足够的补助和幕后支持，我们可以说服我们的企业去接手那些亏损的意大利农场。这些农场的产出不多，盈利的可能性也不大，但借此牢牢控制意大利的农业部门，是提醒他们在这个波诡云谲的世界中孤军奋战的举动是多么的愚蠢的绝佳方式。"
 bfi_ITA_independence_issue_6_dec:0 "贷款给意大利农民"
 bfi_ITA_independence_issue_6_dec_desc:0 "虽然废除法西斯时代的农业自给自足政策听起来颇具吸引力，但我们不能因此忽视了本国农民，尤其是那些小农户，他们将深受农业贸易自由化政策之苦。我们将提高对意大利农民的补贴，以缓解自由化带来的冲击，并防止廉价的外国农产品使小农户破产。"
 bfi_ITA_USA_influence_issue_6_dec:0 "向美国开放农业领域"
 bfi_ITA_USA_influence_issue_6_dec_desc:0 "The United States has been a major agricultural exporter since the turn of the century, and their farmers on the Great Plains have plenty of experience with cultivating crops in arid and unstable climates - expertise well-suited for taming the climate of Italy's African possessions. We should cultivate ties with American agribusinesses by lowering barriers to the trade of agricultural products between Italy and the United States and ensuring that our farmers have access to American markets."
 bfi_ITA_anti_JAP_issue_6_dec:0 "限制日本对农业领域的投资"
 bfi_ITA_anti_JAP_issue_6_dec_desc:0 "日本虽有承诺，称我们的国内农业不会受到日本投资的冲击，但财阀对我们殖民地的种植园构成了不小的潜在威胁。我们不能坐视他们蚕食我们帝国的粮仓。为了守护我们的农业，抵御财阀的侵蚀，我们将筑起堤坝，限制日本资金流入我们的农业领域，并坚守关税壁垒，以抵御日本农产品带来的冲击。"
 bfi_ITA_JAP_influence_issue_6_dec:0 "向日本开放农业领域"
 bfi_ITA_JAP_influence_issue_6_dec_desc:0 "日本财阀所追求的，与我们意大利帝国下属的企业的渴望不谋而合，他们精于在大东亚共荣圈的土地上榨取最大的价值。让他们涉足我们帝国的农业领域，必将为我们的殖民地事业锦上添花。作为友好的礼尚往来，我们亦将下调日本农产品的关税壁垒。"
 bfi_ITA_anti_USA_issue_6_dec:0 "限制美国对农业领域的投资"
 bfi_ITA_anti_USA_issue_6_dec_desc:0 "美国对日本财阀掌管的种植园指指点点，自家农业巨头却也是五十步笑百步。想当初，不就是美国的农业企业推翻了夏威夷的君主制，将其变成了美国的殖民地吗？我们绝不能让自家农民步入他们后尘。为防美国在农业领域一手遮天，我们将限制其投资，并对美国的农产品出口维持必要的关税壁垒。"
 BFI_USA_increase_influence_issue_7_dec:0 "给予意大利最低价"
 BFI_USA_increase_influence_issue_7_dec_desc:0 "为意大利石油设定最低价格保障，我们便能稳住美意石油贸易的阵脚，使其免受油价暴跌之冲击。此举无疑将拉近彼此的距离。"
 BFI_USA_anti_JAP_influence_issue_7_dec:0 "夸大日本对阿拉伯的野心"
 BFI_USA_anti_JAP_influence_issue_7_dec_desc:0 "在日本的战略布局中，贸易乃是影响力的先声，亦是施展影响力的途径。任何一项全面性的石油协议，我们都将视其为日本在意属中东布局的第一步。至少，我们会用这样的口径向意大利人描绘此事。"
 BFI_USA_increase_independence_issue_7_dec:0 "确保意大利配额"
 BFI_USA_increase_independence_issue_7_dec_desc:0 "意大利担心外来市场会侵蚀其石油市场份额。通过给予配额，我们将确保我们的石油进口中至少有一部分源自意大利，这样意大利将始终拥有我们作为贸易伙伴。"
 BFI_USA_decrease_independence_issue_7_dec:0 "提供石油钻探设备"
 BFI_USA_decrease_independence_issue_7_dec_desc:0 "我们为意大利提供设备，且维护代理的费用也由我们承担。让他们对我们的设备产生依赖，这或许能让他们的盈利增加，但同时也更容易受合作伙伴左右。这并非全然对我们有利，毕竟日本人也可能伸出援手。"
 BFI_JAP_increase_influence_issue_7_dec:0 "与埃尼集团合作"
 BFI_JAP_increase_influence_issue_7_dec_desc:0 "意大利的埃尼集团在石油和天然气领域占据着龙头地位，也是日本在意大利经济中的重要力量。诚然，若日本帝国期望与意大利开展贸易，埃尼集团将是理想的合作伙伴。通过与埃尼集团及其他小型企业集团达成协议，大日本帝国将致力于在意大利施展其经济影响力，并展示共荣圈对意大利商业的积极影响。"
 BFI_JAP_anti_USA_influence_issue_7_dec:0 "施压禁运"
 BFI_JAP_anti_USA_influence_issue_7_dec_desc:0 "共荣圈对美国及其自由国家组织中的傀儡实施了多年的禁运。意大利与这些堕落者交易起来却毫无顾忌。我们必须竭尽全力改变这一现状，让意大利的用来交易的资源不至于落入美国之手。最简单的办法莫过于：将最有利的交易条件留给那些不与美国人往来的公司。相信不久之后，意大利人自会心领神会，顺应大势。"
 BFI_JAP_increase_independence_issue_7_dec:0 "向意大利企业集团出售开采权"
 BFI_JAP_increase_independence_issue_7_dec_desc:0 "共荣圈乃丰饶之地，然而我们众多泛亚同胞却工具匮乏、技术不足，难以充分开发这片土地上的丰富资源。大日本帝国虽竭力相助，但现实是我们拥有的资源超出了我们的开采能力。将资源开采权售予意大利公司，我们便能从这些本无法利用的资源中获得一笔不菲的收益。真是妙计！"
 BFI_JAP_decrease_independence_issue_7_dec:0 "购买意大利殖民地的开采权"
 BFI_JAP_decrease_independence_issue_7_dec_desc:0 "若我们意欲从意大利获取石油，何须迂回于那些地方企业或政府之手？财阀大可捷足先登，取得意大利帝国境内某些区域的资源开采权。这样既能为我们提供所需的资源，又能让日本公司在意大利经济中获得一席之地。"
 bfi_ITA_independence_issue_7_dec:0 "增加对埃尼集团的补贴"
 ITA_BFI_increased_subsidies_for_eni:0 "增加对埃尼集团的补贴"
 bfi_ITA_independence_issue_7_dec_desc:0 "Oil is the lifeblood of the Italian Empire, and losing our dominant market share of the oil trade would be an unmitigated disaster on the scale of Germany's economic crash. We must maintain ENI's preeminence at all costs, even if it means subsidising unprofitable ventures and turning a blind eye to wasteful spending. To prevent American or Japanese oil companies from establishing a foothold in our domains, we will raise subsidies for ENI."
 bfi_ITA_USA_influence_issue_7_dec:0 "降低对OFN的油价"
 ITA_BFI_lower_oil_rates:0 "更低的油价"
 bfi_ITA_USA_influence_issue_7_dec_desc:0 "美国虽不似日本那样的全球性的帝国，但作为一个国家，美国对石油的庞大且持续的需求却是独一无二的。众多美国人居住在郊区，日常通勤依赖汽车，货物运输也多用卡车。因此，降低埃尼集团对美国的石油价格，将直接惠及美国人民，此举无疑能赢得他们的好感。这样的提议，美国人自然难以拒绝。"
 bfi_ITA_anti_JAP_issue_7_dec:0 "提高对共荣圈的油价"
 ITA_BFI_higher_oil_rates:0 "更高的油价"
 bfi_ITA_anti_JAP_issue_7_dec_desc:0 "德国因石油匮乏而受限，日本亦然。毕竟，考虑到往事，美国一旦威胁要断绝石油供应，日本便不得不对美宣战。考虑到日本对意大利石油的依赖如此脆弱，他们除了向我们购买石油外别无选择，哪怕我们将油价提高到令人咋舌的地步。我们将会提醒他们自身的这一软肋。"
 bfi_ITA_JAP_influence_issue_7_dec:0 "降低对共荣圈的油价"
 bfi_ITA_JAP_influence_issue_7_dec_desc:0 "大东亚共荣圈若无意大利的石油助力，其军舰和直升机将难以为继，随之奔向崩溃的深渊。面对其势力范围内那些酝酿中的动荡，若我们能降低出口到共荣圈的石油价格，日本必将对此心存感激，日本帝国海军也会继续成为我们的稳定客户。"
 bfi_ITA_anti_USA_issue_7_dec:0 "提高对OFN的油价"
 bfi_ITA_anti_USA_issue_7_dec_desc:0 "昔日威风八面的美国石油业如今已不复当年勇。西得克萨斯油田已难以满足汽车普及和维持全球海军的需求带来的石油消费激增。我们可以通过提高对自由国家组织的石油价格，提醒美国他们对我们的依赖。他们可能对此心不甘情不愿，但实际上他们别无选择。"
 BFI_USA_increase_influence_issue_8_dec:0 "与首相共商共同利益"
 BFI_USA_increase_influence_issue_8_dec_desc:0 "每段关系皆有不可触碰的雷区，我们与罗马的关系亦不例外。找到我们能够共同接受的基础，有助于缓解因势力范围重叠而生的紧张局势。"
 BFI_USA_anti_JAP_influence_issue_8_dec:0 "警觉东京的险恶用心"
 BFI_USA_anti_JAP_influence_issue_8_dec_desc:0 "许多人似乎已经忘记了，日本曾经将其征服的一系列领土称为大东亚共荣圈。对于一个距离东京四分之一地球之遥的国家，共荣圈究竟意欲何为？这其中必有玄机，我们需向意大利透露日本那些暗藏的图谋。"
 BFI_USA_increase_independence_issue_8_dec:0 "争取对OFN阵营政府和起义者的国际承认"
 BFI_USA_increase_independence_issue_8_dec_desc:0 "国家之立，不仅因为它们拥有政府、国界和人民，还因为它们从其他国家那里获得了足够的认可来支持它们的立场。我们特别支持的国家，如印度共和国，自二战以来，一直仰赖国会的善意存续。我们应促使意大利协助我们，为全球追求自由的国家正名。这将为意大利带来更多国际伙伴及潜在关系，可谓双赢。"
 BFI_USA_decrease_independence_issue_8_dec:0 "尊重罗马新的帝国边界"
 BFI_USA_decrease_independence_issue_8_dec_desc:0 "尽管人们对《赤城协议》心存疑虑，但意大利帝国疆界的稳固已超过二十年，成为不可逆转的事实。他们的三色国旗在耶路撒冷和利雅得上空飘扬，就像在帕拉蒂尼山上空一样。尊重他们宣称的后花园领土的完整性，将对我们大有裨益而损失甚微。"
 BFI_JAP_increase_influence_issue_8_dec:0 "提醒他们我们共同的事业"
 BFI_JAP_increase_influence_issue_8_dec_desc:0 "虽未同赴沙场，但二战中意大利与日本实为同袍。我们将唤起意大利人民的记忆，我们曾风雨同舟，未来亦将携手同行。像意大利人一样，日本人也了解文化被外来敌人分割和利用的感受；也懂得如何凤凰涅槃，以强大团结的力量战胜压迫者。"
 BFI_JAP_anti_USA_influence_issue_8_dec:0 "妖魔化洋基佬"
 BFI_JAP_anti_USA_influence_issue_8_dec_desc:0 "美国人民并非意大利的盟友，我们不能让意大利忘记这一点。曾几何时，美国的枪炮在第二次世界大战中夺走了那些无辜的意大利人的生命，若有机会，他们恐怕会重蹈覆辙。美国对意大利后裔的敌意和恐惧根深蒂固，他们对毫无防备的天主教徒的压迫已是人尽皆知。我们将不失时机地提醒罗马，勿忘这段历史。"
 BFI_JAP_increase_independence_issue_8_dec:0 "正视意大利实力"
 BFI_JAP_increase_independence_issue_8_dec_desc:0 "大日本帝国不同于那些二流弱国，我们能够识得意大利是伟大的国家。虽然日本在全球独领风骚，两帝国难以平起平坐。然而，我们深信，在共荣圈之外，意大利是最能与日本实力相提并论的国家。我们期待以诚相待，赢得他们的信任。"
 BFI_JAP_decrease_independence_issue_8_dec:0 "提供免受德国侵犯的保护"
 BFI_JAP_decrease_independence_issue_8_dec_desc:0 "三头同盟瓦解之后，意大利失去了抵御德国侵略的坚强后盾。德国对于意大利在二战中给予的帮助并不感激，且乐于在意大利危难之际趁火打劫。我们需昭告天下，此等行径绝不容许。若德国对意大利露出獠牙，意大利人民大可放心，日本帝国将挺身而出，守护他们周全。"
 bfi_ITA_independence_issue_8_dec:0 "保持中立"
 bfi_ITA_independence_issue_8_dec_desc:0 "虽然与超级大国之一结盟有其益处，但我们不应忽略保持中立的优势。毕竟，瑞士几个世纪以来都没有依附于任何外国势力，其繁荣却依旧一分不减，其立场使其能够与多国同时保持良好关系，不受地缘政治的掣肘。我们亦应保持中立，对那些超级大国不偏不倚。"
 bfi_ITA_USA_influence_issue_8_dec:0 "向自由国家组织派出使者"
 bfi_ITA_USA_influence_issue_8_dec_desc:0 "自由国家组织，地球上自由的灯塔，他们将热情支持我们打造一个自由民主的意大利。我们计划向美国及其盟友增派使者，以巩固我们与民主阵营国家的兄弟情谊。"
 bfi_ITA_anti_JAP_issue_8_dec:0 "冷处理与日外交"
 bfi_ITA_anti_JAP_issue_8_dec_desc:0 "日本如同披着羊皮的狼，他们所谓的“泛亚团结”和“反殖民解放”不过是掩盖日本帝国主义铁蹄的幌子。虽然我们曾是战场上的同袍，但日本所代表的一切是我们力图抹去的记忆，我们不能让这种影响侵蚀我们尚在襁褓中的民主。因此，我们将坚决抵制日本的外交诱惑。"
 bfi_ITA_JAP_influence_issue_8_dec:0 "向共荣圈派出使者"
 bfi_ITA_JAP_influence_issue_8_dec_desc:0 "一个多世纪以来，意大利和日本一直保持着友好关系。民主转型之际，意大利人对这位旧盟友的情谊依旧，日本亦然。我们必须恢复与昔日盟友的关系，并向日本以及大东亚共荣圈的其他成员国派遣特使，以巩固这份难得的友谊。"
 bfi_ITA_anti_USA_issue_8_dec:0 "谴责美国外交"
 bfi_ITA_anti_USA_issue_8_dec_desc:0 "美国自诩为民主的守护神，为全球受压迫者撑腰，然而在他们的甜言蜜语之下，却掩盖着一个残酷的真相。美国为了一己之私，完全可以容忍独裁，其行径往往与德国或日本一样，充满了帝国主义色彩。我们将拒绝他们的提议，来揭露他们的伪善。"
 BFI_USA_increase_influence_issue_9_dec:0 "推介意大利商机"
 BFI_USA_increase_influence_issue_9_dec_desc:0 "意大利经济宛如一块璞玉，稍加打磨，就能焕发光彩。虽然殖民地的动荡让投资者望而却步，但意大利本土却正是发展的沃土。我们将在意大利开设新公司，当然，它们将向罗马纳税。"
 BFI_USA_anti_JAP_influence_issue_9_dec:0 "诋毁日本投资者"
 BFI_USA_anti_JAP_influence_issue_9_dec_desc:0 "众所周知，在商界没有永远的朋友，只有永远的利益。即便如此，意大利人还是倾向于与日本交易，而非我们。我们将提醒他们财阀经常采取的不正当竞争，让那些亲日的商人在签约前也会犹豫再三。"
 BFI_USA_increase_independence_issue_9_dec:0 "尊重文化准则"
 BFI_USA_increase_independence_issue_9_dec_desc:0 "有时，交友之道在于划清界限，恪守不渝。明了相互间的游戏规则，将使美意两国人民彼此尊重，和气生财。"
 BFI_USA_decrease_independence_issue_9_dec:0 "与罗马探讨放宽意大利商业环境"
 BFI_USA_decrease_independence_issue_9_dec_desc:0 "意大利经济圈在全球占据举足轻重的地位，但在三头同盟解体多年后，它对全球资本市场的大门依旧紧闭。我们将向罗马表明，世界需要意大利，同样，意大利也需要美国的专业知识来应对经济全球化中最棘手的挑战。"
 BFI_JAP_increase_influence_issue_9_dec:0 "争取新的财阀合同"
 BFI_JAP_increase_influence_issue_9_dec_desc:0 "为了在意大利投资，我们需以更经济、更高效的方式布局从而吸引政府兴趣，让政府为我们的计划开绿灯。这自然意味着我们要重新商定一系列合同和许可。随着我们拓展业务的脚步，与意大利进行对话至关重要，这将确保我们的投资不受政府干预。这应该不会太难。毕竟，意大利人不会拒绝天上掉馅饼的好事。"
 BFI_JAP_anti_USA_influence_issue_9_dec:0 "与美国工业竞争"
 BFI_JAP_anti_USA_influence_issue_9_dec_desc:0 "在试图将外资引入意大利的征途上，我们并不孤单。美国人带着他们那堕落的自由主义思潮，有意在地区经济控制权上与我们一决高下。为了应对这一挑战，我们必须在那些美国人同样涉足的行业中降低我们的价格。我们手握雄厚的资本，政府作为我们的坚强后盾，这能够确保我们的企业在竞争中屹立不倒，直至美国企业在我们面前败下阵来，让日本在这些领域中独领风骚。"
 BFI_JAP_increase_independence_issue_9_dec:0 "入股意大利企业"
 BFI_JAP_increase_independence_issue_9_dec_desc:0 "尽管我们的投资将深刻地影响意大利经济，但我们必须认识到，若无稳定之基，这根本性变革便难以成行，至少在不冒某种崩溃风险的情况下是如此。为了扶持意大利工业，我们将购入许多对意大利半岛日常生活不可或缺的大型公司的股份。若日本的财政援助能使其生活得以持续，意大利人定会对此感恩戴德。"
 BFI_JAP_decrease_independence_issue_9_dec:0 "收购重点产业"
 BFI_JAP_decrease_independence_issue_9_dec_desc:0 "为了使意大利经济摆脱管理上的混乱，我们不能让那些在金融领域上比意大利人更精明的日本人在意大利内部继续破坏。通过确保日本对关键资源的控制，无论是通过收购控制这些资源的公司还是寻求重大合同，我们可以保证财阀能够充分利用他们的投资，谨慎地引导意大利走向繁荣……以及进入日本帝国的怀抱。"
 bfi_ITA_independence_issue_9_dec:0 "明确设限"
 bfi_ITA_independence_issue_9_dec_desc:0 "尽管我们对源源不断的投资建议心存感激，但也需划清界限——任何国家都有力有不逮的地方。这或许会降低美国和日本投资的积极性，但我们仍需对某些投资形式设限，以防某个大国在我们的领域内独占鳌头，进而让他们生出二心，开始质疑他们究竟应听命于谁。"
 bfi_ITA_USA_influence_issue_9_dec:0 "促进美国援助"
 bfi_ITA_USA_influence_issue_9_dec_desc:0 "美国以其广施援手而著称，对外援助项目遍布世界各地，我们期待他们对我们那些较为弱势的伙伴也能不吝援手。我们将乐见其成美国扩大其海外项目的要求——毕竟，我们有何理由拒绝自由世界领袖的帮助呢？借助他们的援助，我们有望使我们的附属国以西式现代化的步伐发展，迈向繁荣昌盛。"
 bfi_ITA_anti_JAP_issue_9_dec:0 "驳回日方投资尝试"
 bfi_ITA_anti_JAP_issue_9_dec_desc:0 "日本觊觎着我们的帝国——他们意图让我们的百姓完全仰赖日本的援助、食物和基础设施。我们绝不能对此坐视不理。在接下来的时日里，我们将在外资议题上屡屡驳回日本外交官，明确划下红线：他们休想在暗中侵蚀我们的帝国！期待他们能领会这一警示，并大幅缩减在我们帝国内部的行动。"
 bfi_ITA_JAP_influence_issue_9_dec:0 "促进日方援助"
 bfi_ITA_JAP_influence_issue_9_dec_desc:0 "日本长期以来都是我们的坚定盟友，接受他们最近提出的扩大援助建议，实属理所当然。我们将正式告知日本外交官，我们愿意开放更大规模的外国投资计划，并热忱欢迎他们帮助我们势力圈内那些欠发展的国家。借助日本的支持，我们期待着这能够显著提升我们势力范围内国家的发展程度，使它们也能成为我们帝国中高效能的组成部分。"
 bfi_ITA_anti_USA_issue_9_dec:0 "回绝美国投资"
 bfi_ITA_anti_USA_issue_9_dec_desc:0 "若他们势力膨胀，难免心生觊觎，企图将我们的帝国据为己有——迫使我们的人民完全依赖于外来的食物、发展和人力。为了帝国的安危，我们绝不能坐视任何篡权之虞。在可预见的未来，我们将在外资议题上对美国外交官处处设障，明确划下红线：不许他们染指我们的帝国！期待他们能领悟到这一点，并在我们势力范围内大幅收缩其行动。"
 BFI_USA_increase_influence_issue_10_dec:0 "鼓励西点军校与红庄园的交流项目"
 BFI_USA_increase_influence_issue_10_dec_desc:0 "意大利的军事科学，可以追溯到几世纪前那不勒斯的农齐亚泰拉军事学校。在该校著名的红庄园内，不仅诞生出许多在二战中大放光彩的人物，如今更为我们的未来培育英雄。西点军校若与意大利同行合作，会有很多可以学习和借鉴的地方，进而推动意大利的军事现代化进程。"
 BFI_USA_anti_JAP_influence_issue_10_dec:0 "制定“苏伊士以东”应急计划"
 BFI_USA_anti_JAP_influence_issue_10_dec_desc:0 "Beyond the Gulf of Aden lies half of the Indian Ocean - a good 35 million square kilometers large - with adjacent islands, nations, resources and trade routes. Any conflict to protect their interests in such a vital, yet no less distant environment will leaved them disadvantaged. But not to worry: the Pentagon can offer a friendly boost, should Rome desire it. This will also consternate the Japanese, who will not want their influence in the region."
 BFI_USA_increase_independence_issue_10_dec:0 "邀请意大利观察员参加自由国家组织演习"
 BFI_USA_increase_independence_issue_10_dec_desc:0 "提及意大利的军事才能，那些为其增光添彩的将领们是绕不开的话题。从朱塞佩·加里波第到乔瓦尼·梅塞，名将辈出，历经岁月沧桑。美国军队及其自由国家组织的盟友们，将从这些意大利战士身上汲取宝贵的经验。"
 BFI_USA_decrease_independence_issue_10_dec:0 "向意军派遣联络人员"
 BFI_USA_decrease_independence_issue_10_dec_desc:0 "美国与外国武官的交流历史可追溯至革命时期，当时像拉法耶特、科希丘什科和冯·斯图本这样的人物为美国贡献了自己的军事才能，帮助我们将摇摇欲坠的大陆军锻造成了红衫军的劲敌。自1776年以来，沧海桑田；尤其是美国的军队，在历经两个世纪的战火洗礼后，已经发展出了自己的战略。意大利武装力量想必能从我们这些经验丰富的武官身上学到许多。"
 BFI_JAP_increase_influence_issue_10_dec:0 "共享德国行动情报"
 BFI_JAP_increase_influence_issue_10_dec_desc:0 "日耳曼尼亚对南境之外尚存的自由文化堡垒怒火中烧。诚然，意大利或许是欧洲仅存的一片未遭元首匪帮铁蹄践踏的土地——因而她必须被守护。凭借我们在欧洲间谍网络收集的情报，加上来自德国内部的可靠线报，我们能与罗马携手，洞悉日耳曼尼亚对意大利的阴谋，加固我们之间的联盟。"
 BFI_JAP_anti_USA_influence_issue_10_dec:0 "向意大利最高指挥部简报美方失职情况"
 BFI_JAP_anti_USA_influence_issue_10_dec_desc:0 "认为美国有力量或诚信来捍卫一个离其本土遥远至极的国家免受国际强权的冲击的这种想法幼稚至极，我们必须告诫意大利人警惕。美国在人类历史上最大规模的战争中败北，自由国家组织自二十年前那次耻辱性的失败后，已退守到世界的天涯海角。我们必须提醒罗马，唯有日本及其亚洲盟友才是意大利抵御外来统治的坚实后盾。"
 BFI_JAP_increase_independence_issue_10_dec:0 "提出地中海防御计划"
 BFI_JAP_increase_independence_issue_10_dec_desc:0 "意大利半岛历经数千年的战火洗礼，从凯撒时代到加里波第的征战；其民强城固——但意大利若要在战争中自立，就不能只依赖于他人。我们将提供给罗马他们所需的资源，以期在地中海增强他们的安全感。实际上，一个对自己能力与策略自信的意大利，不会急于寻求那些别有用心的他国援助。"
 BFI_JAP_decrease_independence_issue_10_dec:0 "确认外交和军援"
 BFI_JAP_decrease_independence_issue_10_dec_desc:0 "意大利如今如履薄冰：北边的德国人战鼓隆隆，而大西洋彼岸的美国人则虎视眈眈，企图染指他们所觊觎的一切。为防患于未然，我们将向意大利人民伸出援手，承诺向他们提供外交与军事上的援助。我们向罗马保证，依靠日本的援助与专业知识，他们将足以抵御外来的颠覆之风——或许在他们日益依赖共荣圈之时，我们彼此的关系也将更上一层楼。"
 bfi_ITA_independence_issue_10_dec:0 "深化国内战争理论的构建"
 bfi_ITA_independence_issue_10_dec_desc:0 "我们的被视为一个坚固要塞的能力备受瞩目，对此我们心存感激，然而这也是一把双刃剑——若遭盟友背弃，在形势岌岌可危时被遗弃，我们将孑然一身，变得脆弱不堪。若我们选择与任何大国结盟，便有可能面临我们设想中最坏的局面。为了巩固我们的地位，不论东西方援助如何，我们都将进一步深化我们的战争理念。"
 bfi_ITA_USA_influence_issue_10_dec:0 "促进美国战略一体化"
 bfi_ITA_USA_influence_issue_10_dec_desc:0 "独木难支，面对那些欲将我们置于死地的势力，为了让我们在危机发生时不至于毫无还手之力，我们必须那些与我们理念相近和利益相关的盟友加深联系。美国出于在欧洲建立桥头堡的需求，自然会热情接纳任何积极的接触。我们将促使美国及其军队更加重视我们在他们战时布局中的关键作用；此举无疑将为我们撑起一把保护伞，防范任何潜在的侵犯。"
 bfi_ITA_anti_JAP_issue_10_dec:0 "撤除日本战略影响"
 bfi_ITA_anti_JAP_issue_10_dec_desc:0 "日本显然只是把我们当成扩大他们影响力的基地——一旦我们面临直接攻击，许多人质疑日本是否会全力以赴，以改变德国全面攻势的局势。我们必须削弱日本在我们战略规划中的角色，并加大对其他更可靠盟友的信赖。我们将减少与共荣圈的军事战略融合，并将我们的理论工作投向他方。"
 bfi_ITA_JAP_influence_issue_10_dec:0 "促进与日本的联合计划"
 bfi_ITA_JAP_influence_issue_10_dec_desc:0 "我们怎能不偏爱日本，这位战后我们最坚定的盟友之一！为了共同抵御德国的威胁，我们将与他们携手——他们对于这个在欧洲的新立足点定会欣喜若狂。我们将提议深化我们的军事合作，以便在最坏的情况下，我们也能同仇敌忾，并肩作战。"
 bfi_ITA_anti_USA_issue_10_dec:0 "排斥自由国家组织伙伴国"
 bfi_ITA_anti_USA_issue_10_dec_desc:0 "美国虽自成一极，却非始终如一的盟友。二战后，世界格局虽有变化，但人们对美国在战时能否及时伸出援手的疑虑未消。他们的民主制度可能延缓援助，让我们面临与英国相同的命运。因此，我们将减少美国对我们战略的影响，采取的主要手段是限制自由国家组织伙伴国接触我们的军事事务。尽管这是一步险棋，但许多人认为，为了在全面战争中保持我们的独立和安全，此路必行。"
 BFI_USA_increase_influence_issue_11_dec:0 "增进意美两国国防承包商的交流合作"
 BFI_USA_increase_influence_issue_11_dec_desc:0 "开疆拓土需胆识，非谨小慎微者所能为。既然政府能承受的风险远超企业，那么在国防企业与意大利之间，至少在起步阶段为其铺路搭桥，便是国务院的职责。持之以恒的支持，将使这些道路自成一体，绵延不绝。"
 BFI_USA_anti_JAP_influence_issue_11_dec:0 "分享日本现代实验武器的关键情报"
 BFI_USA_anti_JAP_influence_issue_11_dec_desc:0 "在与大本营特务总监部暗中较量多年后，我们积累了大量关于日本实验武器的敏感情报。但兰利却非传说中贪婪的恶龙，他们非常愿意拿出他们部分的宝藏，愿罗马因此得益。"
 BFI_USA_increase_independence_issue_11_dec:0 "在国内市场推广意大利枪支"
 BFI_USA_increase_independence_issue_11_dec_desc:0 "工业复兴公司的代表们为我们揭开了合作的新篇章。他们对2亿人口市场的潜力进行了评估，并表达了在北美拓展业务的浓厚兴趣。然而，无根之木难长，任何外国公司都难以在远离故土之地长久立足——而我们，作为热情好客的东道主，能够为他们提供坚实的根基。"
 BFI_USA_decrease_independence_issue_11_dec:0 "向意军大力推销美械"
 BFI_USA_decrease_independence_issue_11_dec_desc:0 "无论是大型还是小型的国防公司，它们几乎仅凭直觉就能找到优质客户。意大利武装力量虽然内外交困，却成了军备交易中的香饽饽。因此，一些公司请求意大利帮助他们在海外推广他们的产品，哪怕这会与意大利本土企业交恶，这并不出人意料。"
 BFI_JAP_increase_influence_issue_11_dec:0 "降低议价"
 BFI_JAP_increase_influence_issue_11_dec_desc:0 "日本商团与意大利代表的洽谈，往往受价格左右。过高则易失之交臂，过低则自贬身价。在高低之间寻得中庸之道，以“友谊”之名施以小惠，我们便有机会让意大利更紧密地靠拢我们的势力范围。"
 BFI_JAP_anti_USA_influence_issue_11_dec:0 "展示装备和演习"
 BFI_JAP_anti_USA_influence_issue_11_dec_desc:0 "随着意大利在海外寻求盟友，我们必须时刻警惕那些想要将罗马的注意力从我们这里吸引走的竞争对手。因此，作为展示实力和伙伴关系的方式，我们在地中海的装备实验和演习需要扩大规模。我们的武器的实战表现和与意大利军队的协同作战，不仅将彰显我们两国之间的深厚关系，也能有效震慑住那些对我们在该地区影响力构成潜在挑战的对手。这不仅是一场展示，更是一次战略布局，以维护我们在该地区的影响力。"
 BFI_JAP_increase_independence_issue_11_dec:0 "提供日式军备"
 BFI_JAP_increase_independence_issue_11_dec_desc:0 "意大利是一个强国，始终站在抵御德国匪军的最前线。我们必须向意大利人保证，我们会提供支持，以帮助他们抵御来自北方的威胁，包括分享日本的军事技术给他们使用。意大利的强大，足以守护自己的边界和边疆不受外来侵略者征服，同时，在地中海区域，我们也是维护地区稳定、帮助他们对抗破坏势力的宝贵盟友。"
 BFI_JAP_decrease_independence_issue_11_dec:0 "向罗马施压以争取合同"
 BFI_JAP_decrease_independence_issue_11_dec_desc:0 "我们在地中海政治中的影响力不容小觑，但若想从与意大利的联盟中获得更多益处，我们还需加紧压力。我们的外交官和代表已领命向意大利谈判代表施压，以确保继续签订有利于日本生产商的合同。面对日耳曼尼亚的暴政，我们将提供意大利人所渴望的武器和自治权，但这必须建立在我们的优惠条件之上，以便在印度洋地区继续扩大我们的影响力。"
 bfi_ITA_independence_issue_11_dec:0 "将资金转向本国武器制造业"
 bfi_ITA_independence_issue_11_dec_desc:0 "我们对美日等国的慷慨援助心存感激，但也必须警惕对这些武器的依赖。我们将从日常运作资金中拨出一小部分，投资到本地的武器工厂，以确保我们的军队基本运作不会完全依赖外国装备。毕竟，我们不想因为士兵手中的枪而受制于人，对吧？"
 bfi_ITA_USA_influence_issue_11_dec:0 "促进与美国的深度交流"
 bfi_ITA_USA_influence_issue_11_dec_desc:0 "随着我国民主的胜利，新的道路已经铺开；西方如今急不可待，愿与我们携手，特别是在设备和技术领域。曾经认为不可跨越的那道界限已经消失，提出军事交流项目的设想变得顺理成章。我们将借此东风，正式提出或扩大军事交流项目。无论是小规模的技术交流，还是喷气式战斗机的交付，美国都愿倾囊相助，我们对此感激不尽。"
 bfi_ITA_anti_JAP_issue_11_dec:0 "回绝日本提议"
 bfi_ITA_anti_JAP_issue_11_dec_desc:0 "日本不遗余力地向我们提供各式装备，从设计图到枪械，再到火力更猛的武器。美国对我们与日本逐渐加深军事联系日益警觉，我们的士兵也担心这会让我们过度依赖于日本装备。为了保持我们军队的自给自足能力，或者仅仅是为了安抚美国，我们将缩减与日本的现有协议。"
 bfi_ITA_JAP_influence_issue_11_dec:0 "要求增加与日方的交流"
 bfi_ITA_JAP_influence_issue_11_dec_desc:0 "我们与日本的联盟，源于轴心国的牵绊，向来只关注民间事务。日本金属渡海而来，换取意大利石油，却鲜有军火或图纸穿越两国间波涛汹涌的大海跨海而来。然而，时移世易，或许已到改变这一局面的时刻。我们将指示外交官们，推动进一步扩展我们之间已有的军事交流项目。"
 bfi_ITA_anti_USA_issue_11_dec:0 "遏制美国军火的主导权"
 bfi_ITA_anti_USA_issue_11_dec_desc:0 "美国素来精明，近月来频频抛出各类军火协议。这些协议中有些规模之大令人咋舌，单是这些协议就足以装备好几个师。我们必须警惕这种可能削弱我们自主武装能力的动向；目前，我们的外交官将降低对军购扩张的热情，同时劝说美国转向对意大利更间接的投资途径。"
 BFI_USA_increase_influence_issue_12_dec:0 "组织一支前往罗马的贸易代表团。"
 BFI_USA_increase_influence_issue_12_dec_desc:0 "探求真相是制定明智经济政策的根本，尤其对于那些账目如意大利帝国般云山雾罩的国家。我们的经济顾问建议，应派遣大使赴罗马，让高调的贸易使团随行，此举一石三鸟：一是为华盛顿的研判搜集实地情报，二是让意大利领导层信服我们作为贸易伙伴的诚意，三是向潜在客户展现美国商品的独到魅力。"
 BFI_USA_anti_JAP_influence_issue_12_dec:0 "推广美国货的卓越品质"
 BFI_USA_anti_JAP_influence_issue_12_dec_desc:0 "福特车疾如闪电，丰田则耗油如漏；好彩香烟烟草纯，金蝙蝠烟不过草芥；好时巧克力甜如蜜，明治难望其项背；百威啤酒醉人快，米酒望尘莫及。美国制造，天生优越。然而，让意大利人对此心悦诚服，或许还需我们多费唇舌。"
 BFI_USA_increase_independence_issue_12_dec:0 "放宽对意大利制造商品的关税和海关税费"
 BFI_USA_increase_independence_issue_12_dec_desc:0 "在贸易、战争和影响力上，大国自有其不同于其他国家的游戏规则。他们的地位要求在谈判交易时下属俯首帖耳，同辈间相互尊重。意大利虽是大国，地位略逊于我们，我们仍将以他们应得的礼遇来对待他们的商人和出口商品。"
 BFI_USA_decrease_independence_issue_12_dec:0 "与意大利达成优惠贸易协定"
 BFI_USA_decrease_independence_issue_12_dec_desc:0 "在任何交易中，唯有利润至上，美国商人们决心要从与意大利的联系中分得一杯羹。我们岂能让商人们在异国他乡孤军奋战？"
 BFI_JAP_increase_influence_issue_12_dec:0 "与意大利部长展开对话"
 BFI_JAP_increase_influence_issue_12_dec_desc:0 "随着日本代表团与意大利部长们的初步对话开启，我们得以铺开讨论两国贸易政策如何落实的论坛。在与罗马各部委和行政机构展开的战略经济对话中，我们有机会以理服人，以势压人，推动政策制定者与我们构建健康的贸易纽带，为国际关税和贸易便利化条约的未来谈判铺路。"
 BFI_JAP_anti_USA_influence_issue_12_dec:0 "对抗华尔街"
 BFI_JAP_anti_USA_influence_issue_12_dec_desc:0 "虽然意大利自由化后的经济与我们的美国同行有诸多相似之处，但我们必须提醒他们，罗马可能在无意中引入了美国资本主义的种种弊端。从洛克菲勒时代以来的不正当商业行为、工资剥削和监管不力，早已成为美式经济的顽疾。我们必须让罗马意识到这一点，以免他们自甘堕落，成为美帝国主义剥削的新前线。"
 BFI_JAP_increase_independence_issue_12_dec:0 "确保意大利经济独立"
 BFI_JAP_increase_independence_issue_12_dec_desc:0 "在意大利，有众多人士倾向于放宽与日本的贸易政策，但也要求在任何协议中意大利经济应居于首要地位。我们将提供保证，确认在日方支持下，意大利经济仍旧能够持续自主发展。这样，意大利将更加自信地维护其独立，并能自豪地顶住来自美国的压力。"
 BFI_JAP_decrease_independence_issue_12_dec:0 "与意大利企业举行会议"
 BFI_JAP_decrease_independence_issue_12_dec_desc:0 "意大利的工商业乃地中海经济的命脉，他们在贸易政策的制定上自有其一席之地。通过召开会议，邀请意大利各大企业的代表，我们能够左右商界舆论，进而向罗马施压，让他们满足那些意大利财富巨擘们的要求，一如往昔那般。或许我们会因此招致非议，但这策略已足以把意大利人拉入我们的影响之网。"
 bfi_ITA_independence_issue_12_dec:0 "刺激国内工业"
 bfi_ITA_independence_issue_12_dec_desc:0 "In spite of the potentially massive foreign inflow possible from the great powers, we must not forget our domestic industry. Having our commercial markets dominated by the East and the West is a scenario that we must avoid at all costs; when they control our markets, we are no better than a puppet, dangling by the string of our dependent industry. We shall invest a significant amount of capital into our domestic industry, financing new factories, equipment, and infrastructure. Although some may claim this is a waste of capital, it is the opposite - we must protect our market's freedom from total foreign domination!"
 bfi_ITA_USA_influence_issue_12_dec:0 "鼓励美国投资"
 bfi_ITA_USA_influence_issue_12_dec_desc:0 "美国的经济体量举世瞩目。美企对我们的投资意向若隐若现，却因我们的保护主义壁垒而望而却步。我们将施以政治巧手，扭转这一局面。为了吸纳他们雄厚的金融资源，我们将适度调整那些过于严格的对美政策，并促进两国间更顺畅的贸易交流。"
 bfi_ITA_anti_JAP_issue_12_dec:0 "给日本热情降温"
 bfi_ITA_anti_JAP_issue_12_dec_desc:0 "近期，日本通过各种外交渠道向我们提出了慷慨的贸易和投资提议。他们的热情令人钦佩，但我们不能误以为这出于善意。日本的真正意图是让我们完全依赖于他们庞大的工业，成为他们实质上的傀儡。我们将控制他们对我们国家的急切热情，并明确指出，我们对于拓展这些贸易协定的速度是有底线的。"
 bfi_ITA_JAP_influence_issue_12_dec:0 "打破与日本的贸易壁垒"
 bfi_ITA_JAP_influence_issue_12_dec_desc:0 "我们与日本的贸易往来已成传统，他们用资源换我们的石油。然而，这种官方层面的合作，其实大有拓展空间。日本企业的投资对我们而言，如同雪中送炭；他们的雄厚的资金实力将为我们快速发展的国内产业注入活力。因此，我们将逐步解除对日本投资的限制，放宽资本控制，让金融资产流动更加灵活。"
 bfi_ITA_anti_USA_issue_12_dec:0 "抑制美方期望"
 bfi_ITA_anti_USA_issue_12_dec_desc:0 "美国早已在全球展示了其庞大的工业实力——其工业规模之广，使得他们能与许多国家达成近乎梦幻的交易。遗憾的是，意大利亦难逃此局。我们必须在美国经济的强势面前坚守立场，明确划出他们在我们的经济中所能干预的界限。我们将提出我们需要一个缓慢而稳定的过渡的要求，对美国进一步贸易扩张的热情进行降温，以达成双方都认为理想的最佳贸易协定。"
 BFI_USA_increase_influence_issue_13_dec:0 "为意大利科学家提供签证"
 BFI_USA_increase_influence_issue_13_dec_desc:0 "考虑到战后意大利与美国之间的紧张关系，两国学术机构之间的研究合作可谓是极为有限——尤其在核技术领域更是一片空白。既然意大利人正在四处寻找核技术专家，我们不妨成人之美，为我们的意大利朋友批准一些核科学家的签证——当然，这一切都要在我们反情报机构严格审查之后才能进行。"
 BFI_USA_anti_JAP_influence_issue_13_dec:0 "让日本科学家难堪"
 BFI_USA_anti_JAP_influence_issue_13_dec_desc:0 "我们得知有日本科学家在罗马寻找机会，意欲给意大利政府留下一个好印象，以期获得合同并加深日本与意大利的联系。我们可以派遣自己的特工——无论是官方还是非官方的——去质疑或破坏他们的小实验，使他们在意大利人眼中显得不那么可靠。"
 BFI_USA_increase_independence_issue_13_dec:0 "承诺缓和紧张态势"
 BFI_USA_increase_independence_issue_13_dec_desc:0 "即便我们不赞成将美国的核技术与意大利共享，但这并不意味着两国必须成为对手。我们将向意大利政府承诺，美国并无侵犯意大利利益之意，并且愿意通过缓和我们两国间的核紧张局势来兑现这一承诺——一个独立的、核武装的意大利无需对美国心存畏惧，意大利也无需寻求与日本和共荣圈的友谊。"
 BFI_USA_decrease_independence_issue_13_dec:0 "承诺提供核技术方案"
 BFI_USA_decrease_independence_issue_13_dec_desc:0 "意大利人正急切地在市场上寻找能够帮助他们在与已建立的核大国竞争中迎头赶上的任何东西——并且他们来者不拒。此举虽会给我们带来些许风险，但我们可以通过向他们提供一些基础的核能和火箭技术——比如空气动力学、燃料配方等，来赢得他们的好感。这些技术虽非高精尖，却足以让意大利人得到他们所需的助力——并且让他们从此依赖于美国的科技。"
 BFI_JAP_increase_influence_issue_13_dec:0 "协助意大利进行核试验"
 BFI_JAP_increase_influence_issue_13_dec_desc:0 "在意大利帝国核装置的测试之际，我们将伸出援手，为他们提供宝贵反馈，以此赢得意大利帝国的深情厚谊。在这些装置的制造过程中，我们的建言虽不多，却字字珠玑，指导意大利人在未来应避免的误区，彰显我们助力其核计划成功的决心，助力意大利构筑核武库，哪怕这背后隐藏着我们对半岛的另一番图谋。"
 BFI_JAP_anti_USA_influence_issue_13_dec:0 "揭露美国的阴谋"
 BFI_JAP_anti_USA_influence_issue_13_dec_desc:0 "美国人几乎是像甩脱烫手山芋般地向意大利提供核武器，这种行径真令人不齿。他们为何如此急不可耐地将这些毁灭性的武器交到意大利手中？原因显而易见。他们预期意大利和德国会自相残杀，从而让美国得以用意大利的鲜血为代价，摆脱大日耳曼国的阴影。我们必须揭露美国人的这一图谋，以免意大利人被他们的花言巧语所迷惑。"
 BFI_JAP_increase_independence_issue_13_dec:0 "激励意大利核能发展"
 BFI_JAP_increase_independence_issue_13_dec_desc:0 "意大利在原子能领域取得了长足进步，这样的成就值得称道。我们的外交官将不吝赞美之词，讲述意大利核能项目如何成效卓著，讲述这些反应堆如何为无数家庭送去能源，以及意大利人民将来如何能够拥有一个全面现代化的武器计划。这份激励将推动意大利人民继续在这些领域精益求精，而与日本合作，正是实现这一目标的上佳途径。"
 BFI_JAP_decrease_independence_issue_13_dec:0 "巧妙地抑制意大利对核武的渴望"
 BFI_JAP_decrease_independence_issue_13_dec_desc:0 "我们将公开支持意大利拥核，但同时也得提醒他们，核武器是把双刃剑。在确保能够相互毁灭的讨论中，他们可别忘了德国于他们背后升起的怒火，以及后续维护核项目所需的巨额开销。我们的话语，表面上似乎是在为他们的这些新发展鼓舞喝彩，实则字斟句酌，意在让意大利民众对此心生疑虑。"
 bfi_ITA_independence_issue_13_dec:0 "增拨核项目国内投资"
 bfi_ITA_independence_issue_13_dec_desc:0 "虽然核大国的援助让我们的科学家倍感感激，但我们必须提醒自己我们的核计划不可全然依赖他们的慷慨。我们将增加对意大利核计划的资金投入，并对测试设定更为严格的截止日期。虽然这未必能显著加快研发进程，但每一分每一秒都至关重要。越早能够抵御德国的威胁，我们的安全就越有保障。"
 bfi_ITA_USA_influence_issue_13_dec:0 "争取更多的美国援助"
 bfi_ITA_USA_influence_issue_13_dec_desc:0 "民主之风，为我们国家吹开新局；美国，之前把我们看作又一个法西斯敌人，现在却从我们身上看到了在欧洲大陆上建立核存在的良机。我们将借势而为，利用他们的这种渴望，让我们的外交官正式向他们寻求对我们的核项目的支持，作为交换，他们最终可能会要求在我们的领土上部署核武器。有人忧心德国对此可能的反应，但无论如何，这一决定无疑将使我们的核计划如虎添翼，跃至新高度。"
 bfi_ITA_anti_JAP_issue_13_dec:0 "抑制日方热情"
 bfi_ITA_anti_JAP_issue_13_dec_desc:0 "虽然核大国的援助让我们的科学家倍感感激，但我们必须提醒自己我们的核计划不可全然依赖他们的慷慨。我们将增加对意大利核计划的资金投入，并对测试设定更为严格的截止日期。虽然这未必能显著加快研发进程，但每一分每一秒都至关重要。越早能够抵御德国的威胁，我们的安全就越有保障。"
 bfi_ITA_JAP_influence_issue_13_dec:0 "探询日本扩大援助事宜"
 bfi_ITA_JAP_influence_issue_13_dec_desc:0 "日本有意向我们增援设备，助我们的核计划一臂之力。但我们同时也需警惕，德国对此的潜在反应不容小觑，更何况我们核计划的独立性不容有失。我们将向日本传达：我们虽然很感激他们的援助，却也需把话说明白，我们能接受的帮助是有限的。"
 bfi_ITA_anti_USA_issue_13_dec:0 "抑制美方期望"
 bfi_ITA_anti_USA_issue_13_dec_desc:0 "美国以其一贯作风，对在欧洲拥有一个盟国以部署核力量的想法垂涎已久。我们收到了他们大量慷慨的提议，这连我们都始料未及。然而，我们必须权衡德国的态度和我们自己的计划。我们不能过分依赖外国核技术；若美国对我们的支持有所动摇，我们的核威慑力量可能会陷入瘫痪。我们将向美国明确表示，我们能接受的核计划援助有其底线，而且最终，将由我们自己来走完这条道路，而不是他们。"
 BFI_USA_increase_influence_issue_14_dec:0 "与意大利军方高级官员接触"
 BFI_USA_increase_influence_issue_14_dec_desc:0 "即便军事合作是自由国家组织与意大利之间的一个敏感话题，我们也不能干坐着无所作为。我们需要派遣我们最出色、最聪明的高级军官与意大利的对应官员进行面对面的交流，先破冰开谈，再娓娓道来自由国家组织如何能更好地捍卫意大利在非洲和中东的利益；如果日本也在做出同样的承诺，那我们更要确保我们的提案会给他们留下更深刻的印象。"
 BFI_USA_anti_JAP_influence_issue_14_dec:0 "贬低日本军事专员"
 BFI_USA_anti_JAP_influence_issue_14_dec_desc:0 "日本人可以言称他们重视意大利人的友情——以及珍惜与他们的老盟友携手合作的良机。然而，甜言蜜语易说——行胜于言。日本人是否真的派遣了他们最杰出的军事官员与“老朋友”对坐？若非如此，那么日本人对意大利人的所谓重视，又值几斤几两？"
 BFI_USA_increase_independence_issue_14_dec:0 "承诺将意大利武器纳入自由国家组织采购清单"
 BFI_USA_increase_independence_issue_14_dec_desc:0 "意大利在军火制造领域拥有悠久而辉煌的历史，这一历史让他们对与美国军工复合体竞争的前景感到压力，这无可厚非。我们可以通过承诺在未来自由国家组织的采购活动中考虑意大利的武器设计来缓解这些担忧，这实际上就是在补贴意大利的国防工业，希望这能让他们更愿意倾听自由国家组织而非日本的声音。"
 BFI_USA_decrease_independence_issue_14_dec:0 "承诺向意大利提供美械"
 BFI_USA_decrease_independence_issue_14_dec_desc:0 "美国的力量源泉在于其雄厚的工业实力——这让她能够投送数量庞大的先进武器对抗她的敌人。意大利也定能在需要时从美国的武器系统中获益匪浅，尤其是在那些美国技术能大展身手的细分领域。"
 BFI_JAP_increase_influence_issue_14_dec:0 "日军阅兵"
 BFI_JAP_increase_influence_issue_14_dec_desc:0 "意大利与众多敌国为邻，这些国家都盼望着意大利的覆灭，因此在选择盟友时，意大利显然希望获得尽可能多的军事援助。幸运的是，大日本帝国的军队无疑是世界上最强大的军队。我们必须在关键时刻彰显我们坚如磐石、锐不可当的力量，以此昭示天下。通过一系列阔绰而奢靡的军事阅兵，我们将向意大利人展示我们的强大和力量。"
 BFI_JAP_anti_USA_influence_issue_14_dec:0 "铭记美国的无能"
 BFI_JAP_anti_USA_influence_issue_14_dec_desc:0 "The United States of America has a poor record in warfare, and that is something the Italians should be well aware of. America's minimal participation in the first World War, bloody stalemate in 1812, and their humiliating defeat against our glorious Empire come to mind. How can the Italians expect to stand against the Germans, when America has already failed against them? In what possible way could America ever be a better ally than its conqueror in the East?"
 BFI_JAP_increase_independence_issue_14_dec:0 "共享军事情报"
 BFI_JAP_increase_independence_issue_14_dec_desc:0 "如果能够与意大利携手，我们将同仇敌忾，对抗共同的敌人。大本营特务总监部已默默搜集敌情多时，这些情报若在未来的较量中不能发挥作用，无疑是暴殄天物。因此，作为军事合作的一部分，我们将与意大利互通有无，共享敌情。这份信任弥足珍贵，必将为我们的联盟在未来的博弈中赢得先机。"
 BFI_JAP_decrease_independence_issue_14_dec:0 "吸收日本战略"
 BFI_JAP_decrease_independence_issue_14_dec_desc:0 "我们将启程，向那些尚处于蒙昧之中的意大利指挥官传授我们精湛的日本战术。虽然我们的策略更胜一筹，且完全出于一片好意，但要让这些墨守成规的意大利人改弦易辄，放弃他们的传统战术，实非易事。所以我们将以我们过往的辉煌战绩为证，与那些意大利传统战法的败绩形成对照，逐步打开他们的心扉，最终令他们信服于我们的战术。"
 bfi_ITA_independence_issue_14_dec:0 "强调军事独立"
 bfi_ITA_independence_issue_14_dec_desc:0 "虽然与超级大国的军事一体化有其诱人之处，我们不能忘记意大利本身就是一个帝国——它应当能够借助自己的军队自力更生，捍卫自己的利益，而不是仰人鼻息。我们必须向超级大国表明我们的独立立场。在波斯湾展开一次自主巡逻，将是展示我们立场的明证。"
 bfi_ITA_USA_influence_issue_14_dec:0 "与美国举行联合军演"
 bfi_ITA_USA_influence_issue_14_dec_desc:0 "美国虽在上一场战争中站错了队，但他们已经从失败中恢复过来，并且转变成为了一个真正的超级大国。他们数十年如一日，为民主而战，无论是沙漠、田野还是森林，都留下了他们的足迹。我们应乘势加强与这个世界最后的民主大国的军事联系。我们将与美国举行联合军演，以深化合作。"
 bfi_ITA_anti_JAP_issue_14_dec:0 "向日本表明我们的独立立场"
 bfi_ITA_anti_JAP_issue_14_dec_desc:0 "虽然我们曾经并肩作战，但日本显然已不将我们当作伙伴，而仅仅看作为他们帝国的延伸。我们将教教他们何为尊重，并取消即将举行的联合演习。日本若想与我们合作，就必须先学会尊重我们。"
 bfi_ITA_JAP_influence_issue_14_dec:0 "与日本举行军演"
 bfi_ITA_JAP_influence_issue_14_dec_desc:0 "轴心国虽已解体，日本却仍然铭记着我们昔日肩并肩对抗西方强权，共同打造帝国的辉煌征途。我们曾共享阳光下的土地，现在应该借助与日本武装力量举行的军事演习，来恢复那些曾经把我们紧紧联系在一起的纽带。"
 bfi_ITA_anti_USA_issue_14_dec:0 "强调对美独立"
 bfi_ITA_anti_USA_issue_14_dec_desc:0 "尽管美国崇尚民主，但东非和亚洲的战火与其本土相隔千山万水。我们怎能指望他们能够不远万里来伸出援手？我们将通过取消与他们的军演来彰显我们的独立自主，并向美国传递一个信息：他们无需为意大利牵肠挂肚。"
 BFI_USA_increase_influence_issue_15_dec:0 "与军情局协商情报共享协议"
 BFI_USA_increase_influence_issue_15_dec_desc:0 "我们手握意大利梦寐以求的情报，而他们亦握有我们求之不得的信息。要与罗马建立信任，就得先懂得交易的真谛在于礼尚往来：他们用情报换取我们的一份，我们也用情报换取他们的份。我们有很多可以交流的话题——前提是，他们得先拿出他们的那一份。"
 BFI_USA_anti_JAP_influence_issue_15_dec:0 "积极追捕在意大利活动的大本营特务总监部特工"
 BFI_USA_anti_JAP_influence_issue_15_dec_desc:0 "自从日本崛起为世界强国之一，大本营特务总监部的影响力已遍及全球，远非其“秘密警察”的身份所能比拟。他们驻扎在哪里，哪里就有东京的眼线和耳目；任何微小的动向都逃不过他们细致的监视。这些现代的忍者无疑已多次阻挠了军事情报局的行动……但若有外力干涉，他们的影响力必将减弱。而罗马对于它所欠的人情总是感恩戴德。"
 BFI_USA_increase_independence_issue_15_dec:0 "在帝国内部加强反间谍活动"
 BFI_USA_increase_independence_issue_15_dec_desc:0 "一个软弱无力的军事情报局对我们和他们的政府都无裨益，然而他们的自尊可能会让他们不愿接受任何外援。\n\n因此，中央情报局能够独力解决他们的一些问题，实乃幸事。"
 BFI_USA_decrease_independence_issue_15_dec:0 "派送中情局资助的专员及设备"
 BFI_USA_decrease_independence_issue_15_dec_desc:0 "军事情报局以其在年度预算中分得的每一里拉都花得其所而著称。然而，归根结底，数亿资金毕竟有限，罗马的国库有更多迫切需要供养的部门，而不仅仅是他们的情报机构。幸运的是，兰利非常愿意填补意大利资金中那些无可奈何的缺口。"
 BFI_JAP_increase_influence_issue_15_dec:0 "要挟官员"
 BFI_JAP_increase_influence_issue_15_dec_desc:0 "一张照片，一个暗藏的麦克风，一位风情万种的大本营特务总监部特工。我们略施小计，便能让那些亲美的意大利政治家改弦易辙。毕竟，他们不会希望他们最黑暗的秘密从潘多拉的盒子里泄露出来。"
 BFI_JAP_anti_USA_influence_issue_15_dec:0 "破坏他们的关系"
 BFI_JAP_anti_USA_influence_issue_15_dec_desc:0 "美意两国近来走得未免太近了，我们必须提醒他们，二战时与意大利并肩作战的是日本，而不是美国。我们将让所有谈判沦为鸡毛蒜皮的争执，在大本营特务总监部的严密监视下，确保他们的合作寸步难行。"
 BFI_JAP_increase_independence_issue_15_dec:0 "培训他们的特工"
 BFI_JAP_increase_independence_issue_15_dec_desc:0 "我们将派遣老练的大本营特务总监部精英，去指导和锤炼意大利军事情报局的新锐。期望在我们的助力下，意大利人能在冷战的诡谲斗争中稳住阵脚。"
 BFI_JAP_decrease_independence_issue_15_dec:0 "窃取文件"
 BFI_JAP_decrease_independence_issue_15_dec_desc:0 "我们的特工将设法让意大利人“失手”遗失几份不可外泄的机密文件，这些文件一旦落入敌手，后果不堪设想。所幸，这些文件将处于我们的严密守护之中，这无疑是在提醒意大利人，结交像我们这样的良朋益友的重要性。"
 bfi_ITA_independence_issue_15_dec:0 "增加军情局资金"
 ITA_BFI_increased_SIM_funding:0 "增加军情局资金"
 bfi_ITA_independence_issue_15_dec_desc:0 "The SIM has been an integral part of our government for decades, and to abrogate its duties to foreign intelligence agencies would be a betrayal of Italian interests. Therefore, we must increase funding for the SIM to allow it to maintain its competency alongside the CIA and Tokumusoukan."
 bfi_ITA_USA_influence_issue_15_dec:0 "深化与中情局的合作"
 bfi_ITA_USA_influence_issue_15_dec_desc:0 "在上次战争中，美国战略服务局曾是盟军中的中流砥柱，如今中央情报局继承了这份荣光。其影响力远及天涯海角，从日耳曼尼亚至开普敦，再到新德里。深化与中央情报局的协作，将使我们在世界舞台上更有力地回击德国的挑衅，同时磨砺我们的特工，以应对变幻莫测的世界。"
 bfi_ITA_anti_JAP_issue_15_dec:0 "谴责大本营特务总监部"
 bfi_ITA_anti_JAP_issue_15_dec_desc:0 "大本营特务总监部，名震天下，令人闻风丧胆，自有其因。他们手上沾染了无数无辜者的鲜血，只因这些人敢于挑战日本的权威。我们将让他们明白我们对他们的看法，并坚决抵制他们渗透我们的情报网络的图谋。"
 bfi_ITA_JAP_influence_issue_15_dec:0 "深化与大本营特务总监部的联系"
 bfi_ITA_JAP_influence_issue_15_dec_desc:0 "大本营特务总监部，源自日本占领区的宪兵部队，积累了数十年管理殖民地和平息骚乱的经验。我们若想更有效地治理我们的帝国，不妨向他们取取经，同时加强军事情报局与他们的纽带。"
 bfi_ITA_anti_USA_issue_15_dec:0 "谴责中情局"
 bfi_ITA_anti_USA_issue_15_dec_desc:0 "尽管服务于全球最后的民主堡垒，中央情报局在海外却成了人权和自由的劲敌。其麾下不乏暴君、赤色分子和蛮横的雇佣兵，他们假借抗击法西斯之名，令无数人生活在水深火热之中，我们不会忘记美国的这些不义之举。我们将谴责中央情报局试图与军事情报局建立联系的企图。"
 BFI_italy_in_the_OFN:0 "OFN中的意大利"
 BFI_USA_italy_in_the_OFN:0 "OFN中的意大利"
 BFI_USA_italosphere_in_the_OFN:0 "OFN中的意大利势力圈"
 BFI_italy_in_the_CPS:0 "共荣圈中的意大利"
 BFI_JAP_italy_in_the_CPS:0 "共荣圈中的意大利"
 BFI_JAP_italosphere_in_the_CPS:0 "共荣圈中的意大利圈"
 BFI_italy_all_alone:0 "独立的意大利"
