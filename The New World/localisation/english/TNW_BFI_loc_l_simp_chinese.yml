 BFI_gui_action_button_1_issue_15_USA_tt:0 "在超级大国的阴影之下，一场间谍的较量悄然上演，其中人情淡薄，盟友朝秦暮楚，而在追逐国家机密的征途上，没有什么是神圣不可侵犯的。在这里，成功或许只会被墨迹涂黑的提及，而失败则可能意味着在敌方领土上的一个无名墓穴。在容错率极低的情况下，中央情报局冒险接触如军事情报局这般未知变量，风险之大，不言而喻。"
 BFI_gui_action_button_1_issue_15_USA_delayed_tt:0 ""
 BFI_gui_action_button_2_issue_15_USA_tt:0 "中央情报局用两种方式看待世界：对超级大国毫不掩饰其敌意，对于其他国家，则显露出赤裸裸的机会主义。鲜少有谁能真正赢得其青睐……然而，倘若来自罗马的信函属实，他们的军事情报局或许正在赢得这份尊重。意大利特工的表现已在埃及和阿拉伯的炎炎沙漠中得到了验证，与我们的特工不相上下。兰利或许能从他们那里学到一些地道的实地工作经验。"
