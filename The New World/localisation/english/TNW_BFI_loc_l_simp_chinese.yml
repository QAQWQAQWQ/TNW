 BFI_gui_action_button_3_issue_12_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  与日本的贸易关系：§G+30§!\n  每月贫困率下降：§G+0.025%§!\n§Y日本§!将获得：\n  与意大利的贸易关系：§G+30§!\n"
 BFI_gui_action_button_4_issue_12_JAP_tt:0 "机遇之窗已为我们敞开，与意大利的贸易正在开启互利共赢之门。我们视维护两国间历久弥坚的友谊为重中之重，为力促我们与罗马的贸易关系步入正轨，为双方的繁荣昌盛提供均等良机。以日本的硬件和科技，换取意大利的丰富资源，让我们在长久伙伴关系的征途上携手并进。"
 BFI_gui_action_button_4_issue_12_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  与日本的贸易关系：§G+40§!\n  每月贫困率下降：§G+0.05%§!\n§Y日本§!将获得：\n  与意大利的贸易关系：§G+40§!\n"
 BFI_gui_action_button_5_issue_12_JAP_tt:0 "与意大利缔结一项周全且富有成效的贸易协定，将使我们这两个文明古国在全球经济舞台上占据领先地位，因为我们将携手共进，互利共赢，共同开拓和拓展市场。消除贸易壁垒，就双方的交易方式达成共识，将减少我们作为盟友和伙伴间可能产生的摩擦。跨越印度洋的友好握手，预示着我们的罗马伙伴将重返与我们合作的舞台，共享繁荣阳光。"
 BFI_gui_action_button_5_issue_12_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  与日本的贸易关系：§G+50§!\n  每月贫困率下降：§G+0.075%§!\n§Y日本§!将获得：\n  与意大利的贸易关系：§G+50§!\n  每月贫困率下降：§G+0.025%§!\n"
 BFI_gui_action_button_6_issue_12_JAP_tt:0 "通过争取“最惠国”待遇，日本帝国将从都灵至巴勒莫，成为意大利海外贸易的坚实后盾。日本商品将涌入意大利市场，意大利的匠心之作亦将摆满我们的货架——彼此经济的强韧不拔，由此得以彰显。我们将遣使赴罗马，展开面对面的磋商，深化双边关系，同时在地中海地区巩固我们的影响力，并在国际政治的大棋盘上拉近与意大利的同盟。"
 BFI_gui_action_button_6_issue_12_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  与日本的贸易关系：§G+60§!\n  每月贫困率下降：§G+0.1%§!\n§Y日本§!将获得：\n  与意大利的贸易关系：§G+60§!\n  每月贫困率下降：§G+0.05%§!\n"
 BFI_gui_action_button_2_issue_13_ITA_tt:0 "不同于第二次世界大战的其他胜利者，意大利未曾手握核武。至今，我们仍在孜孜不倦地追求，以期跻身世界核大国之列，驾驭原子之力。遗憾的是，我们那些勤奋的科学家和工程师目前没有与外国合作开发核武器，只能自力更生，砥砺前行。尽管如此，关于此类计划的官方交流仍有可能，我们当然愿意接受帮助；此等重任，任谁也不敢掉以轻心。"
 BFI_gui_action_button_2_issue_13_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  研究速度：§R-1%§!"
 BFI_gui_action_button_3_issue_13_ITA_tt:0 "东西方对我们提出的核援助计划都报以了积极的姿态，似乎有意将这一计划纳入他们的考量。虽然这一切尚处于筹划阶段，能否赢得外国势力的青睐，说服他们参与这样一项耗资巨大的事业，还需拭目以待。不过，这一消息已经让我们的科学家们心潮澎湃，他们纷纷摩拳擦掌，期盼不懈努力，继续推进。"
 BFI_gui_action_button_3_issue_13_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将§R维持现状§!。"
 BFI_gui_action_button_4_issue_13_ITA_tt:0 "应我们持续不断的请求，那些竞相试图赢得我们青睐的派系，尽管仍然心存犹豫，也已答应助力我们的核计划。来自两大势力的顾问们已经进入我们的实验室，我们的外交官们开始听闻有关双方达成不首先使用核武器的默契；我们的核项目之路，因此变得愈发清晰，它终于在国内外的瞩目下，赢得了应有的重视。"
 BFI_gui_action_button_4_issue_13_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  研究速度：§G+1%§!"
 BFI_gui_action_button_5_issue_13_ITA_tt:0 "我们不懈的争取终于获得了甜美的成果；如今，我们与美国和日本构筑了更为坚实的核伙伴关系。我们不仅在核武使用的相互承诺上达成了共识，而且他们也乐意将援助拓展至材料采购、技术蓝图乃至直接投资等更多领域。得益于直接获取弹道导弹的便利，我们的科学家们正以日新月异的速度，为我们的最终防线添砖加瓦。"
 BFI_gui_action_button_5_issue_13_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  研究速度：§G+2%§!"
 BFI_gui_action_button_6_issue_13_ITA_tt:0 "意大利的未来在核能的光辉照耀下愈发璀璨夺目！美日两国已同意与我们缔结全面的核伙伴关系，我们共同享有一体化的核指挥体系，基础设施正源源不断地运抵。在意大利的广袤田野上，核反应堆如雨后春笋般涌现，它们正致力于提炼关键的浓缩武器级铀，我们的核政策与那些渴望与我们结盟的外国势力不谋而合。我们的核计划正以一日千里的速度飞速进展，不久的将来，我们的第一枚核武器即将诞生。在美日的鼎力相助下，我们正迈向真正驾驭原子能以增强国力的辉煌征程。"
 BFI_gui_action_button_6_issue_13_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  研究速度：§G+3%§!"
 BFI_gui_action_button_1_issue_13_USA_tt:0 "美国的核技术及其部署依旧对意大利保持严格限制。即便我们与意大利在其他领域的友好往来一帆风顺，核秘密的共享仍旧是一条不可触碰的红线。"
 BFI_gui_action_button_1_issue_13_USA_delayed_tt:0 ""
 BFI_gui_action_button_2_issue_13_USA_tt:0 "我们并不打算分享核技术，但如果意大利人想要成为那些能够一触即发就毁灭世界的国家之一，他们必须理解其中的风险。美国在民防规划与核战后政府运作的连续性方面，积累了数十年的经验——此等智慧若与意大利共享，便可使其腾出手来，专注于武器的研发。"
 BFI_gui_action_button_2_issue_13_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  杂项支出：§G-50§!§YM美元§!"
 BFI_gui_action_button_3_issue_13_USA_tt:0 "虽然我们对于向意大利全面敞开核学说和技术的交流大门仍持谨慎态度，但若想赢得意大利人的青睐，倾向OFN，我们必须表现出最基本的信任。意大利的核计划尚在襁褓之中；若我们能分享核能发电与燃料循环管理的公开学术研究成果，他们定能从中获益匪浅。至于更深层次的技术，意大利人还需自行探索。"
 BFI_gui_action_button_3_issue_13_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  杂项支出：§G-50§!§YM美元§!\n  研究速度：§G+1%§!"
 BFI_gui_action_button_4_issue_13_USA_tt:0 "一个拥核国家融入自由国家组织，其影响之深远，不可掉以轻心。为了美国乃至自由世界的长远利益，必须确保意大利的核发展和核战略沿着一条可预见且有序的道路前进，以构建一个可靠而稳定的威慑力量。我们计划向意大利政府派遣资深的科学和军事“顾问”，以促进核技术的合法转移，并在意大利筹划其新兴核武库的部署时，确保美国能参与其中，共商大计。"
 BFI_gui_action_button_4_issue_13_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  杂项支出：§G-100§!§YM美元§!\n  研究速度：§G+3%§!\n§M美国§!将获得：\n  研究速度：§G+1%§!"
 BFI_gui_action_button_5_issue_13_USA_tt:0 "随着我们对意大利核武器计划的支持与日俱增，我们的当务之急是火速提升其核武库的战备水平，这最符合我们的自身利益。考虑到意大利与德国近在咫尺，且地形崎岖，陆基核威慑力量将难以施展，极易遭受突袭。为此，我们将以公道的价格，向意大利提供潜艇发射的弹道导弹技术，以确保他们能够在地中海拥有可靠的二次打击能力。"
 BFI_gui_action_button_5_issue_13_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  杂项支出：§G-100§!§YM美元§!\n  研究速度：§G+5%§!\n  每月研究设施：§G+0.5§!\n§M美国§!将获得：\n  研究速度：§G+3%§!\n  每月研究设施：§G+0.5§!"
 BFI_gui_action_button_6_issue_13_USA_tt:0 "意大利人铁了心要打造核武库，哪怕千难万险也不退缩。我们理应对他们表示尊重。将原子毁灭的力量用于捍卫自由，责任重大。倘若意大利决定加入自由国家组织，我们必须确保美意两国在核问题上步调一致。意大利的核指挥体系将逐步融入我们的单一综合作战计划，以剔除任何潜在的德国或日本间谍，确保我们能在核战争中取得胜利。"
 BFI_gui_action_button_6_issue_13_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  杂项支出：§G-150§!§YM美元§!\n  研究速度：§G+5%§!\n  每月研究设施：§G+1§!\n§M美国§!将获得：\n  研究速度：§G+5%§!\n  每月研究设施：§G+1§!"
 BFI_gui_action_button_1_issue_13_JAP_tt:0 "大日本帝国已在世界上面对两大劲敌，他们已能操控原子之力以图不轨。我们不能再冒险增加第三个敌人，更不能放心意大利将来不会变心。我们当然希望意大利能够变得强大，足以对抗那些企图压迫他们的力量。然而，我们对他们的信任尚未达到可以与其分享帝国最尖端武器的程度。我们希望他们能够理解，这些机密的价值非同小可。"
 BFI_gui_action_button_1_issue_13_JAP_delayed_tt:0 ""
 BFI_gui_action_button_2_issue_13_JAP_tt:0 "并不是说意大利不能成为核国家，但我们推他们一把，朝正确方向发展，对我们自己也有好处。我们将逐步透露一些陈年且不完整的核试验资料，这些信息虽不足以助其在核技术领域突飞猛进，却足以令其相信我们正携手并进。世事难料，或许他们的科学家能点石成金，化腐朽为神奇。"
 BFI_gui_action_button_2_issue_13_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  研究速度：§G+1%§!\n"
 BFI_gui_action_button_3_issue_13_JAP_tt:0 "虽然意大利没有必要成为核武国家，但核裂变技术却有其积极用途。我们将与他们分享最新的研究成果与设备，但这一切仅限于推动和平利用核能的发展，而非助长核武器的制造。此举意在助力意大利适应这股新能源，并在非军事领域提高其利用效率。"
 BFI_gui_action_button_3_issue_13_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  研究速度：§G+2%§!\n  每月研究设施：§G+0.5§!\n"
 BFI_gui_action_button_4_issue_13_JAP_tt:0 "若我们对意大利的核能研究坐视不管，美国就会乘虚而入。一旦意大利与美国结成核同盟，那将是我们夜不能寐的梦魇。因此，尽管心有不甘，我们还是决定向意大利提供核材料，以助他们一臂之力。虽然这可能会让他们在核技术上突飞猛进，超出了我们的预期，但至少能让意大利感受到我们对其军事支持的诚意超过美国人，哪怕这份诚意背后并非全是真心。"
 BFI_gui_action_button_4_issue_13_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  研究速度：§G+3%§!\n  每月研究设施：§G+1§!\n  核反应堆：§G+1§!\n"
 BFI_gui_action_button_5_issue_13_JAP_tt:0 "意大利科学家在开发利用原子能的方面进展缓慢。若非如此，他们或许早已拥有了与三个核大国相提并论的武库。为了助他们一臂之力，克服其惰性，我们将派遣日本的核能专家前往意大利。这不仅能够让他们在自己的短板上有所觉悟，也能让日本帝国洞若观火，深入了解意大利核计划的精髓。"
 BFI_gui_action_button_5_issue_13_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  研究速度：§G+4%§!\n  每月研究设施：§G+1.5§!\n  核反应堆：§G+2§!\n§Y日本§!将获得：\n  每月研究设施：§G+0.5§!\n"
 BFI_gui_action_button_6_issue_13_JAP_tt:0 "意大利永远无法在核武器储备上与日本、德国和美国平起平坐。我们在意大利核计划中的努力已显明此点。我们将向罗马提出一个新的国防计划：核共享方案。意大利将不再深入发展自己的核武库，但可以在德国侵犯时仰赖西西里岛上的日本核弹头进行反击。但要发射这些武器之前，需要得到日本的同意。"
 BFI_gui_action_button_6_issue_13_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  研究速度：§G+5%§!\n  每月研究设施：§G+2§!\n  核反应堆：§G+3§!\n§Y日本§!将获得：\n  每月研究设施：§G+1§!\n"
 BFI_gui_action_button_2_issue_14_ITA_tt:0 "意大利过去二十年来独善其身，无需超级大国的援手便可保护自己。鉴于我们之前两次联盟的“美好”成果，帝国不想再三重蹈覆辙，与外国势力纠缠不清，多谢你们的美意。"
