 ITA_battle_for_italy:0 "争夺意大利之战"
 ITA_battle_for_italy_desc:0 "齐亚诺的改革及其引发的民主化浪潮，连同此后的种种，皆是为了保住§G意大利§!的存续。然而，我们的选择，同样牵一发而动全身，影响着世界的格局。\n\n跨过大西洋，§B美利坚合众国§!一想到在德国边境拥有一位强大的§B自由国家组织§!盟友的可能，心中便暗自窃喜。与此同时，§Y大日本帝国§!亦在窥视，欲将其§Y共荣圈§!扩张至它们最初的梦想之外。\n\n全世界的目光都聚焦于此，§G意大利§!之战，究竟鹿死谁手，拭目以待。"
 USA_battle_for_Italy:0 "争夺意大利之战"
 USA_battle_for_Italy_desc:0 "我们对§G意大利§!的变化保持着密切关注，心中惊异日增。若能将这个民主新芽纳入§B自由国家组织§!，无疑是将§B美国§!影响力推至德国门槛的绝佳良机。\n\n然而，§Y大日本帝国§!也在暗中虎视眈眈，想要将这份丰厚的奖赏据为己有。§G意大利之战§!，首先是一场价值观的对抗，我们决心要赢得这场战争。"
 JAP_battle_for_Italy:0 "争夺意大利之战"
 JAP_battle_for_Italy_desc:0 "§G意大利§!曾经未入我眼，然而近日的风云变幻，使之成为我们的焦点。§G意大利§!摆脱了法西斯的枷锁，赋予了民众选举之权，成为列强一个新的角力场。\n\n§B美国§!已着手将意大利引入§B自由国家组织§!。但我们伸出的橄榄枝——§Y大东亚共荣圈§!，更具诱惑。我们不只为其承诺经济利益，还提供与§Y大日本帝国§!结盟的安全保障，与§B华盛顿§!的民主空谈形成鲜明对比。"
