 BFI_gui_action_button_5_issue_15_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  加密：§R-5%§!\n  解密：§G+5%§!\n  §Y苏伊士§!雷达站§G+2§!\n  §Y科威特§!雷达站§G+2§!\n  §Y特伦蒂诺§!雷达站§G+2§!"
