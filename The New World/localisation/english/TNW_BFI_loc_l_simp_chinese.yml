 BFI_gui_action_button_6_issue_10_USA_tt:0 "“……若‘黑色’与‘橄榄绿’兵戎相见，‘蓝色’便将把美国本土和冰岛的战略要地的防备状态提升至‘风驰电掣’。此举之后或许会紧随着一纸最后通牒，命‘黑色’火速撤出‘橄榄绿’之境。\n\n如三日之内杳无音信，‘蓝色’便将‘风驰电掣’升级为‘剑拔弩张’。此文书中所列出的所有任务，将被贯彻到底，毫不保留……”"
 BFI_gui_action_button_6_issue_10_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利势力圈§!将获得：\n  防御：§G+7.5%§!\n  战争支持度：§G+7.5%§!\n  堑壕：§G+10%§!\n  §Y2x§! §G50%§! 花费减少：§Y陆军学说§!\n§M美国§!将获得：\n  战争支持度：§G+5%§!\n  空军航程：§G10%§!\n  §Y2x§! §G50%§! 花费减少：§Y陆军学说§!"
 BFI_gui_action_button_1_issue_10_JAP_tt:0 "美利坚与日耳曼尼亚的目光如炬，紧盯着罗马的每一个举措，若我们贸然踏入这场外交的棋局，恐怕只会画蛇添足，自寻烦恼。何必在日耳曼尼亚门前挑起争端，又何须在美利坚面前惹是生非；我们大可韬光养晦，静待风云再起之时。"
 BFI_gui_action_button_1_issue_10_JAP_delayed_tt:0 ""
 BFI_gui_action_button_2_issue_10_JAP_tt:0 "日本与意大利的民众如今已然感同身受；让我们跨越印度洋，伸出友谊之手，以增进两国人民之间的情感纽带。在外交舞台上，我们可以用辞令巧妙地向意大利表明，我们两国正肩并肩地抵御着美国堕落和德国诡计的侵袭。"
 BFI_gui_action_button_2_issue_10_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  与日本的关系：§G+10§!\n  单位防御：§G+2.5%§!\n§Y日本§!将获得：\n  与意大利的关系：§G+10§!\n"
 BFI_gui_action_button_3_issue_10_JAP_tt:0 "我们通过派遣外交使节与专家跨越重洋来到亚平宁，以此向意大利人民伸出友谊之手，我们的支持承诺含蓄而含糊。在这份暧昧不明中，我们试图赢得意大利人的心，同时不让自己卷入地中海的纷争漩涡。不管怎样，我们的立场始终坚定，支持罗马抵御外侮——虽然仍然保持着一定的安全距离。"
 BFI_gui_action_button_3_issue_10_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  与日本的关系：§G+20§!\n  单位防御：§G+5%§!\n  组织度：§G+2.5%§!\n§Y日本§!将获得：\n  与意大利的关系：§G+20§!\n"
 BFI_gui_action_button_4_issue_10_JAP_tt:0 "正如我们的文明一样，意大利文明同样值得我们全力捍卫，以抵御德美之侵蚀。我们认为，跨越印度洋，与罗马在其北非省份携手军事演习，是为明智之举。在此过程中，培养意大利将士精通地形之战略与协同作战之术，进一步巩固我们两国心心相印、携手同行的双边关系。"
 BFI_gui_action_button_4_issue_10_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  与日本的关系：§G+30§!\n  单位防御：§G+7.5%§!\n  组织度：§G+5%§!\n§Y日本§!将获得：\n  与意大利的关系：§G+30§!\n"
 BFI_gui_action_button_5_issue_10_JAP_tt:0 "摄影团队正忙碌地记录着我们在意大利势力范围内所展开的壮观海军演习与战斗训练，全球的目光都聚焦在日意伙伴关系的逐步发展上。我们的庞大舰队在地中海的温暖水域中劈波斩浪，围绕第勒尼安海的战略要道展开一系列令人赞叹的协同演练，我们的士兵与意大利部队肩并肩地冲锋陷阵，以准备抵御任何外来威胁。东京方面守护意大利的决心坚定，一定要确保日本在该区域的利益深植并长久稳固。"
 BFI_gui_action_button_5_issue_10_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  与日本的关系：§G+40§!\n  单位防御：§G+10%§!\n  组织度：§G+7.5%§!\n  每月军队职业度：§G+0.5§!\n§Y日本§!将获得：\n  与意大利的关系：§G+40§!\n  每月军队职业度：§G+0.5§!\n"
 BFI_gui_action_button_6_issue_10_JAP_tt:0 "面对咄咄逼人的德国和华盛顿的不懈施压，意大利若想稳如泰山，他必须未雨绸缪。我们在阿尔卑斯山区的演练，以及大西洋上的海军演习，都是为了与罗马共同策划，让他们能够御外侮于国门之外，守护家国。我们对意大利国防的助力，定能巩固我们在地中海的立足点，随着朝阳的升起，为这片古老的海域带来新的希望之光。"
 BFI_gui_action_button_6_issue_10_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  与日本的关系：§G+50§!\n  单位防御：§G+10%§!\n  组织度：§G+10%§!\n  每月军队职业度：§G+1§!\n  堑壕速度：§G+5%§!\n§Y日本§!将获得：\n  与意大利的关系：§G+60§!\n  每月军队职业度：§G+1§!\n"
 BFI_gui_action_button_2_issue_11_ITA_tt:0 "至今，我们与日本和美国的军火贸易之门尚未开启。两国的装备鲜少跨海而来抵达意大利，更别提武装我们的士兵了。然而，何苦为了追求装备上的一时之便，而牺牲了军队自给自足的长久之计？或许，最明智的选择，虽非最令人心动，就是保持现状，以静制动。"
 BFI_gui_action_button_2_issue_11_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  炎热损耗：§R+5%§!"
 BFI_gui_action_button_3_issue_11_ITA_tt:0 "顺应我们巧妙的请求，这场冲突中的大国对于技术交流已表现出了友好的姿态——涉及枪械、雷达和卡车的设计蓝图。我们最优秀的专家已经对首批轻型武器进行了逆向工程，我们辛勤耕耘的成果不久将大白于天下。虽然这或许不是我们所能策划的最大规模的交换计划，但它无疑是迈向未来的第一步。"
 BFI_gui_action_button_3_issue_11_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  §Y1x§! §G50%§! 研究加成：§Y步兵武器§!"
 BFI_gui_action_button_4_issue_11_ITA_tt:0 "随着最近达成的协议，日本和美国两大强国已同意直接启动技术共享计划。通过一些小型武器协议，步兵装备、各种支援装备，以及一些更重型的装备，如防空和火炮装备，已开始流入我国。我们的军队也因外国最优秀军官的协助而受益，随着军事交流计划的签订，意大利军队似乎终于踏上了装备现代化的道路。"
 BFI_gui_action_button_4_issue_11_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  §Y1x§! §G50%§! 研究加成：§Y步兵武器§!\n  §Y1x§! §G50%§! 研究加成：§Y主战坦克§!"
 BFI_gui_action_button_5_issue_11_ITA_tt:0 "大规模武器采购协议的签订，已然功成名就——从轻武器到重炮，从喷气式战斗机到其他重型装备，这些先进装备正纷纷涌入意大利的国门。随着世界各地的尖端装备陆续被购入，我们军队的科技实力也随之水涨船高。外国使节纷纷奔赴罗马，争先恐后地向皇家陆军推销他们的最新装备，或是将下一批战机送往我们的空军。德国则忧心忡忡地向南望去，眼见我们从美国和日本的国库中，不断汲取几乎最先进的装备，以充实我们的军备库。"
 BFI_gui_action_button_5_issue_11_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  §Y1x§! §G50%§! 研究加成：§Y步兵武器§!\n  §Y1x§! §G50%§! 研究加成：§Y主战坦克§!\n  工厂产出：§G+5%§!"
 BFI_gui_action_button_6_issue_11_ITA_tt:0 "正当其时，我们应张开双臂，全面接纳东西方的慷慨援助。如今，一项规模宏大的武器交换计划已然启动，其益处遍及我们军队的每一个角落。从轰炸机到导弹，再到任何你能想象的尖端科技，皆如潮水般涌入，直接交到我们军队的手中。此计划之成效，出乎我们意料——我们甚至不得不专门设立一个港口，用以接受这些外国的军事装备，以应对这股洪流。意大利的装备，将不再在孤立无援的暗夜中摸索前行！在美利坚的明灯照耀下，日本的坚盾利炮护卫下，我们将勇往直前，冲破黑暗。"
 BFI_gui_action_button_6_issue_11_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  §Y1x§! §G100%§! 研究加成：§Y步兵武器§!\n  §Y1x§! §G100%§! 研究加成：§Y主战坦克§!\n  工厂产出：§G+10%§!"
 BFI_gui_action_button_1_issue_11_USA_tt:0 "聪明人不会把绞刑用的绳子交给要绞死他的人。基于同样的道理，自从1941年以后，美国子弹就未曾飞越到第勒尼安海的岸边。那些储藏着美国军事智慧结晶的宝库，唯有其信赖的盟友方能一窥究竟。"
 BFI_gui_action_button_1_issue_11_USA_delayed_tt:0 ""
 BFI_gui_action_button_2_issue_11_USA_tt:0 "目前，美意两国在武器研发领域的合作，还仅限于在两国私人枪展上的零星亮相。这些合作尚未成为委员会会议和研究的焦点——然而，美国的枪械爱好者们正在逐渐发现LF-59这款低调武器的独特魅力。同样，意大利的枪械爱好者对历史悠久的加兰德步枪也有着深刻的认识和尊重。"
 BFI_gui_action_button_2_issue_11_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  §Y步兵武器§!研究速度：§G+5%§!"
 BFI_gui_action_button_3_issue_11_USA_tt:0 "在德国和日本之外，美国的国防承包商在全球范围内自由地开展业务。随着我们与意大利帝国的关系逐渐回暖，洛克希德公司、斯普林菲尔德兵工厂等企业利用这一机遇，与意大利的工业复兴公司建立了沟通渠道。对于那些盼望着在海外获得丰厚合同的造船厂和工厂来说，未来显得充满希望。"
 BFI_gui_action_button_3_issue_11_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  §Y步兵武器§!研究速度：§G+10%§!\n§M美国§!将获得：\n  杂项收入：§G+100§!§YM美元§!"
 BFI_gui_action_button_4_issue_11_USA_tt:0 "随着两国间信任的不断加深，美国国会已经批准放宽对意大利的武器交易限制。意大利现在能够购买并生产美国国内设计的武器，而不必像其他国家那样经历繁琐的官僚程序。作为友好的回应，意大利也向美国政府提供了对意大利制造武器的同等特权。"
 BFI_gui_action_button_4_issue_11_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  §Y步兵武器§!研究速度：§G+10%§!\n§M美国§!将获得：\n  杂项收入：§G+100§!§YM美元§!\n  §Y步兵武器§!研究速度：§G+10%§!"
 BFI_gui_action_button_5_issue_11_USA_tt:0 "自曼哈顿计划那段五味杂陈的历史落幕之后，美国尖端武器的蓝图便成为深藏不露的国家机密。时至今日，一份在汽车之城底特律孕育的设计方案，在获得专利编号前，总不免要经历一番跨洋越海，远赴意大利的摩德纳和那不勒斯。在两国武器研发的合作纽带上，思想的火花已然迸发；岁月流转，我们有望目睹意美携手，打造出历久弥新的枪械传奇。"
 BFI_gui_action_button_5_issue_11_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  §Y步兵武器§!研究速度：§G+10%§!\n  §Y步兵武器§!对人员杀伤：§G+10%§!\n  每月工业设备：§G+0.5§!\n§M美国§!将获得：\n  杂项收入：§G+100§!§YM美元§!\n  §Y步兵武器§!研究速度：§G+10%§!\n  §Y步兵武器§!对人员杀伤：§G+10%§!"
 BFI_gui_action_button_6_issue_11_USA_tt:0 "曾有预言家断言，文明的碰撞必将引发战火，然而，美意两国跨越大西洋的武器贸易却为此论调提供了反证。意大利从历史的沧桑中重拾了失落的智慧；美国则以创新之光，引领人类飞向蓝天。这两个先锋文化的相互融合，远非毁灭之兆，反而在武器发展的千年历程中，共同书写了新的辉煌篇章。"
 BFI_gui_action_button_6_issue_11_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  §Y步兵武器§!研究速度：§G+10%§!\n  §Y步兵武器§!对人员杀伤：§G+10%§!\n  §Y步兵武器§!可靠性：§G+10%§!\n  每月工业设备：§G+0.5§!\n§M美国§!将获得：\n  杂项收入：§G+100§!§YM美元§!\n  §Y步兵武器§!研究速度：§G+10%§!\n  §Y步兵武器§!对人员杀伤：§G+10%§!\n  §Y步兵武器§!可靠性：§G+10%§!"
 BFI_gui_action_button_1_issue_11_JAP_tt:0 "意大利过去就已经证明了自己一直是一个强大且可靠的盟友，但公开讨论对意军售的条款未免有点和日耳曼尼亚针锋相对的意思。意大利和德国接壤，我们也不能卷入这两个对峙力量的任何暴力冲突当中去。"
 BFI_gui_action_button_1_issue_11_JAP_delayed_tt:0 ""
 BFI_gui_action_button_2_issue_11_JAP_tt:0 "我们和罗马一直是老朋友，这一横跨印度洋的互尊互敬的手足之情将会万古长青。向意大利人出售我们多余的军事装备无伤大雅，毕竟这些装备在意大利国王手里总好过在西伯利亚的军阀手里。"
 BFI_gui_action_button_2_issue_11_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  工厂产出：§G+2%§!\n§Y日本§!将获得：\n  杂项收入：§G+75§!§YM美元§!\n"
 BFI_gui_action_button_3_issue_11_JAP_tt:0 "对意军售不是个坏主意。我们双方都可以在贸易中获利——相互出售科技和材料。从军售开始，我们有望在未来进一步和意大利深化经贸关系。但无论如何，我们必须和欧洲外交这趟浑水保持距离——要记住，节制才是防止超级大国间紧张激化的关键。"
 BFI_gui_action_button_3_issue_11_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  工厂产出：§G+4%§!\n§Y日本§!将获得：\n  杂项收入：§G+150§!§YM美元§!\n"
 BFI_gui_action_button_4_issue_11_JAP_tt:0 "罗马或许能成为我们军事技术和物资销售的潜在客户。意大利求购我们的枪械，我们自然乐见其成，愿售其所需。我们将在罗马举办展览，展示我们的尖端技术；武器交易上，我们也会给予优惠；甚至可能授权意大利的武器企业使用日本的模型。毕竟，以商促交，或许能让我们与意大利的关系更进一步，共同抵御德美的压力。"
 BFI_gui_action_button_4_issue_11_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  工厂产出：§G+6%§!\n§Y日本§!将获得：\n  杂项收入：§G+225§!§YM美元§!\n"
 BFI_gui_action_button_5_issue_11_JAP_tt:0 "意大利精于治理其殖民地，如今已在抵御德国对欧洲影响力的扩张中扮演着关键角色。为了限制德国的势力范围，我们应当与意大利展开军备销售的对话。欧洲能否摆脱德国的枷锁，其未来命运与此紧密相连，日本亦将与罗马携手并进，在这场抗争中并肩作战。"
 BFI_gui_action_button_5_issue_11_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  工厂产出：§G+8%§!\n  每月工业设备：§G+0.5§!\n§Y日本§!将获得：\n  杂项收入：§G+300§!§YM美元§!\n"
 BFI_gui_action_button_6_issue_11_JAP_tt:0 "意大利乃日本之老盟友，如今正急需援手以抗击暴政与邪恶。日本遍布全球的生产线正全速生产为印度洋之外的意大利港口输送着弹药与武器；我们愿意开启武器技术蓝图销售的对话与谈判，以期欧洲终能挣脱德国的铁蹄。日本的援助与军事支持将为意大利筑起防线，抵御日耳曼的威胁，同时让我们在地中海的影响力日渐扩大。"
 BFI_gui_action_button_6_issue_11_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  工厂产出：§G+10%§!\n  每月工业设备：§G+1§!\n§Y日本§!将获得：\n  杂项收入：§G+375§!§YM美元§!\n"
 BFI_gui_action_button_2_issue_12_ITA_tt:0 "四十载法西斯与自给自足之路，已在意大利经济肌体上烙下了深深的伤痕，此情此景，于贸易往来的协议中可见一斑。我国与外界的商业往来微不足道，小额的外来贸易虽合法，但规模之小，几可忽略不计，而我国对产品的需求有限，因此大多数时候能够自给自足。但这样的局面使得我们的经济严重滞后于美国和日本等国家。既往我们的经济闭关锁国，外来投资亦对我等大门紧闭。也许，是时候结束这种自我封闭的孤立了，但这真的值得我们冒险去牺牲我们经济的独立性吗？哪怕是为了巨大的利益？"
 BFI_gui_action_button_2_issue_12_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  出口资源：§G-20%§!\n  贸易关系：§R-20%§!\n  GDP年增长率：§R-0.1%§!"
 BFI_gui_action_button_3_issue_12_ITA_tt:0 "随着我们逐渐扬弃闭关锁国的旧政，意大利与世界各国签订了若干小型贸易协定。在这些协定中，与美国和日本的合作尤为显著，他们急切地希望在意大利这片沃土上开拓新的商业天地，而我们也已开始逐步满足他们的贸易需求。尽管这些协议规模有限，保护性关税的壁垒犹存，但这无疑是市场在意大利重拾主导权的序章。"
 BFI_gui_action_button_3_issue_12_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  出口资源：§G-10%§!\n  贸易关系：§R-10%§!"
 BFI_gui_action_button_4_issue_12_ITA_tt:0 "随着对美日进口商品关税的解除，我们为往昔贸易保护主义的壁垒又敲响了一记丧钟。我们现有的贸易协议得以拓展，商贸往来终于重新畅通无阻。我们的产品，特别是机械设备及汽车，深受美日青睐，成为我们的首要出口对象。然而，要构筑一个全面完善的贸易体系，我们还有很长的路要走，毕竟，我们的经济之门尚未完全敞开。"
 BFI_gui_action_button_4_issue_12_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  GDP年增长率：§G+0.1%§!"
 BFI_gui_action_button_5_issue_12_ITA_tt:0 "随着意大利与那些力图赢得我们友谊的大国签订了全面贸易协定，自给自足的老路已接近尾声；贸易在意大利和国际市场上终于扎下了深根。从罗马的新外企到全球冰箱里的意大利葡萄酒，美国和日本的公司都在积极拓展业务。这一转变是否明智，人们尚存疑虑；变革浪潮过后，我们能否实现生产上的自给自足，仍是一个未知数。但不可否认，外国投资的涌入已经为我们的经济注入了活力，意大利的前景因此变得更加光明。"
 BFI_gui_action_button_5_issue_12_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  出口资源：§R+10%§!\n  贸易关系：§G+20%§!\n  GDP年增长率：§G+0.1%§!"
 BFI_gui_action_button_6_issue_12_ITA_tt:0 "我们的贸易协定已攀至巅峰，此情此景连最乐观的官员也未曾敢想象：随着意大利-美国贸易协定、意大利圈贸易协定，两大贸易协定的签订，我们与世界三大经济巨头之二的广袤市场，实际上已实现了自由贸易的全面对接。昔日对外投资如山的障碍，如今已荡然无存，资本纷纷涌入，企业在意大利的几乎每一片土地上生根发芽。我们摒弃了闭关锁国的陈腐理念，全心全意地拥抱自由市场，经济的未来因此显得更加稳固而光明。"
 BFI_gui_action_button_6_issue_12_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  出口资源：§R+20%§!\n  贸易关系：§G+25%§!\n  GDP年增长率：§G+0.1%§!\n  每月贫困率下降：§G+0.03§!"
 BFI_gui_action_button_1_issue_12_USA_tt:0 "设想一下美意两国贸易若陷于停滞：财政部指出，黑市上的美元与里拉的兑换量竟超过了明面上的商业往来。这般令人唏嘘的现状，若无政府出手，将难以扭转。"
 BFI_gui_action_button_1_issue_12_USA_delayed_tt:0 ""
 BFI_gui_action_button_2_issue_12_USA_tt:0 "不论是走访跳蚤市场的简单之旅，还是两国间价值数百万美元的资源协议，商业交易无一不是各取所需，互通有无。同理，我们与意大利重启贸易往来的策略和构想，亦是以互惠为基础；比如，美国能以何物换取阿拉伯的原油？意大利又能以何物换取通用汽车的卡车和艾奥瓦的金黄玉米？这些策略虽非实质性的政策，却也是备而不用的箭，随时准备应时而发。"
 BFI_gui_action_button_2_issue_12_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  与美国的贸易关系：§G+15§!\n§M美国§!将获得：\n  与意大利的贸易关系：§G+15§!"
 BFI_gui_action_button_3_issue_12_USA_tt:0 "国际贸易，犹如江河行地，水往低处流，商随势而动，绕过那些难以触及的市场，汇于包容之港。第二次世界大战以来，意大利的商品一旦渡过重洋，便如同面对铜墙铁壁一般无处可去。然而，时过境迁，如今这壁垒也开始逐渐瓦解，日渐松动。"
 BFI_gui_action_button_3_issue_12_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  与美国的贸易关系：§G+20§!\n  每月贫困率下降：§G+0.025%§!\n§M美国§!将获得：\n  与意大利的贸易关系：§G+20§!\n  杂项收入：§G+100§!§YM美元§!"
 BFI_gui_action_button_4_issue_12_USA_tt:0 "“今天，意美两国的关系开启了新篇章，双方在[ITA.GetLeader]首相与[USA.GetLeader]总统进行的高层会谈后，签署了互授最惠国待遇的法案。此举赋予了受惠国B在与授予国A的贸易谈判中享受优惠或平等待遇的权利。简而言之，最惠国地位为B国提供了一道保障，使其在与其他竞争者一同向A国争取相似的贸易协议时，不会处于下风。”"
 BFI_gui_action_button_4_issue_12_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  与美国的贸易关系：§G+30§!\n  每月贫困率下降：§G+0.025%§!\n  杂项收入：§G+50§!§YM美元§!\n§M美国§!将获得：\n  与意大利的贸易关系：§G+30§!\n  杂项收入：§G+200§!§YM美元§!"
 BFI_gui_action_button_5_issue_12_USA_tt:0 "数十载光阴荏苒，今朝意大利巨轮首度航至南路易斯安那港，载来阿拉伯湾的低硫原油。与此同时，一艘美国货轮横渡直布罗陀海峡，不是为了赶赴苏伊士运河，而是驶向巴勒莫港。那里的孩子初次尝到好时巧克力的甜美，此地的女性则沉醉于坎帕尼亚葡萄酒之香醇。这一幕，恰似昔日哥伦布大交换的盛景，巨轮如同信使，将新世界的新奇与旧世界的风味，相互传递，交织成一幅繁荣的商贸图景。"
 BFI_gui_action_button_5_issue_12_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  与美国的贸易关系：§G+40§!\n  每月贫困率下降：§G+0.025%§!\n  杂项收入：§G+100§!§YM美元§!\n§M美国§!将获得：\n  与意大利的贸易关系：§G+40§!\n  杂项收入：§G+300§!§YM美元§!"
 BFI_gui_action_button_6_issue_12_USA_tt:0 "宛如画龙点睛般，自由贸易协定似乎将为我们的发展添上完美的一笔，使之达到一个不可逆转、无可挑剔的境界。事实上，它不过是将已成定局的事实以法律文书的形式正式化；历史上，美意两国人民从未像今日这般自由地互通有无。关税已降至几十年来的谷底水平，过路费不过是贸易往来中的细枝末节，两国间的交流日益频繁，且势头不减。\n\n然而，象征性的举动自有其不可抗拒的魅力。通过签署这份协议，哥伦比亚与维托里奥将向世界宣告：你我共享，不分彼此。"
 BFI_gui_action_button_6_issue_12_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  与美国的贸易关系：§G+60§!\n  每月贫困率下降：§G+0.05%§!\n  杂项收入：§G+150§!§YM美元§!\n§M美国§!将获得：\n  与意大利的贸易关系：§G+60§!\n  杂项收入：§G+300§!§YM美元§!\n  每月贫困率下降：§G+0.025%§!"
 BFI_gui_action_button_1_issue_12_JAP_tt:0 "当前，我们与意大利的贸易往来已恰到好处，可以差遣大使与代表前往，但须严令他们不得轻启任何重要谈判或签订协议。我们的参与，意在展现风度，而非颠覆现有的洲际航运秩序。"
 BFI_gui_action_button_1_issue_12_JAP_delayed_tt:0 ""
 BFI_gui_action_button_2_issue_12_JAP_tt:0 "与意大利的贸易可以让我们互利共赢，然而我们尚未准备为这一经济版图的巨变投入过多规划与资源。我们有意缓解紧张的贸易关系，增进友邦情谊，但在适当时机成熟之前，一切仍将按部就班下去，不会有什么翻天覆地的变化。"
 BFI_gui_action_button_2_issue_12_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  与日本的贸易关系：§G+20§!\n§Y日本§!将获得：\n  与意大利的贸易关系：§G+20§!\n"
