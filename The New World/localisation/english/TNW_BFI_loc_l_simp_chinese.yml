 BFI_gui_action_button_6_USA_tt:0 ""
 BFI_gui_action_button_6_USA_delayed_tt:0 ""
 BFI_gui_action_button_2_issue_1_ITA_tt:0 "意大利的戏剧、歌剧和电影制片厂自六十年代初以来表现出色。“电影城”制片厂仍是欧洲规模最大的电影制片厂，《甜蜜的生活》的感召力维持至今，只要国家对此还有兴趣，投入足够资金，必然会上升到新的高度。既然条条大路通罗马，又何必去找东京和华盛顿呢？"
 BFI_gui_action_button_2_issue_1_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  每日政治点数：§R-0.1§!\n  提高关系：§R-10%§!"
 BFI_gui_action_button_3_issue_1_ITA_tt:0 "诚如调味需香辛，生活亦需多样性。一群意大利艺术家与电影人对华盛顿与东京的文化潮流心生向往，我们无需对此阻拦，只需确认这些交流属于私人性质。借此东风，让我们在这东西方文化交汇之地，铺展罗马风尚，建立深厚友谊。"
 BFI_gui_action_button_3_issue_1_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  提高关系：§G+10%§!"
 BFI_gui_action_button_4_issue_1_ITA_tt:0 "我们都明白，世界之大，包罗万象。意大利自建国伊始，便对与巴黎及巴塞罗那的文化殿堂进行深刻交流兴趣盎然。昔日莫迪利亚尼在巴黎名声鹊起，意大利艺术亦曾在路易十四的辉煌宫廷中大放异彩。如今，文化交流的火炬似乎已传至美国和日本，我们自当携带着意大利艺术家们的匠心独运之作，欣然前往。"
 BFI_gui_action_button_4_issue_1_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  每日政治点数：§G+0.1§!\n  提高关系：§G+30%§!"
 BFI_gui_action_button_5_issue_1_ITA_tt:0 "世界如今比历史上任何时候都要全球化。在此潮流中，文化交流岂能落于人后？好莱坞的新作令人瞩目，东京的新颖技术亦惹人向往，我们的观众对此翘首以待，渴望一睹好莱坞的西部风情和日本的光影艺术。世界各地的艺术家、电影人和文坛新秀，我们诚邀您在罗马的舞台上大放异彩，共同在意大利这片热土上孕育多元文化的果实。"
 BFI_gui_action_button_5_issue_1_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  每日政治点数：§G+0.2§!\n  提高关系：§G+50%§!"
 BFI_gui_action_button_6_issue_1_ITA_tt:0 "我们迎来了向世界展示意大利文化交融成果的绝佳时机。德·西卡、罗西里尼和马祖卡托，这些在意大利乃至世界影坛上留下浓墨重彩一笔的大师们，早已名扬四海。意大利观众亦对科波拉和斯科塞斯的匠心独运、小津安二郎的细腻叙事、黑泽明的史诗巨作情有独钟。值此之际，威尼斯电影节的盛大回归，将汇聚世界各地的银幕佳作，不仅庆祝全球艺术的璀璨成果，更为意大利在国际文化交流中树立了新的里程碑。"
 BFI_gui_action_button_6_issue_1_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  每日政治点数：§G+0.3§!\n  提高关系：§G+70%§!"
 BFI_gui_action_button_1_issue_1_USA_tt:0 "我们与意大利人的交流，何须仅囿于美食与电影？毕竟，回到我们美国的小意大利和好莱坞，意大利的美食和才华横溢的人早已司空见惯……"
 BFI_gui_action_button_1_issue_1_USA_delayed_tt:0 ""
 BFI_gui_action_button_2_issue_1_USA_tt:0 "虽然我们对文化外交的效果存疑，却也不妨让谈判团队偷得浮生半日闲，体验罗马的假日风情。毕竟，人们总是更愿意因其自身的价值而受到认可，而不仅仅是因为他们能为谈判带来什么利益。"
 BFI_gui_action_button_2_issue_1_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  稳定度：§G+2.5%§!"
 BFI_gui_action_button_3_issue_1_USA_tt:0 "私营部门最适合在我们两国和文化之间搭建桥梁。我们计划铺开几条交流之路——诸如推动电影节的交流，让第一夫人代言意大利文学——举措虽多，却也恰到好处，不落俗套。"
 BFI_gui_action_button_3_issue_1_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  稳定度：§G+2.5%§!\n  每日政治点数：§G+0.05§!"
 BFI_gui_action_button_4_issue_1_USA_tt:0 "欲使意大利与美国的情谊长存，我们需筑牢超越共同对手的深厚纽带。美国的文化土壤，深受意大利文艺复兴时期的书香熏陶，我们期待在各自的公共领域内推动文化与思想的交流，以此作为长久友谊的开端，携手开启一段深厚而持久的合作篇章。"
 BFI_gui_action_button_4_issue_1_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  稳定度：§G+5%§!\n  每日政治点数：§G+0.05§!\n§M美国§!将获得：\n  稳定度：§G+5%§!"
 BFI_gui_action_button_5_issue_1_USA_tt:0 "构建历久弥坚的国际关系，非仅凭外交官在五星级酒店的金钱与时间投入所能成就。它需我们对各自文化的价值与贡献抱以真挚的赏识与尊重——需有那激发情感的火花，以促进关系的深化。这非一日之功，正如罗马非一日建成，但我们亦能采取措施，让友谊之花早日绽放。"
 BFI_gui_action_button_5_issue_1_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  稳定度：§G+7.5%§!\n  每日政治点数：§G+0.05§!\n§M美国§!将获得：\n  稳定度：§G+5%§!"
 BFI_gui_action_button_6_issue_1_USA_tt:0 "我们未曾料到，美国文化界对我们向意大利展现的友好姿态反响如此热烈，这无疑是一个机不可失的良机。我们已指派美国电影协会的主席杰克·瓦伦蒂，带领一支意大利裔美国艺术家和作家的代表团，与意大利文化界的泰斗们进行交流。科波拉、斯科塞斯、罗伯特·德尼罗等，与德·西卡、罗西里尼和马祖卡托等文化巨匠的携手，必将擦出创意的火花，共襄盛举。"
 BFI_gui_action_button_6_issue_1_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  稳定度：§G+7.5%§!\n  每日政治点数：§G+0.1§!\n§M美国§!将获得：\n  稳定度：§G+5%§!\n  每日政治点数：§G+0.05§!"
 BFI_gui_action_button_1_issue_1_JAP_tt:0 "自凯撒时代落幕以来，意大利鲜有艺术再领风骚。反观日本，却以其独有的文化自觉，坚守本土艺术之根，不随波逐流。日本之财，应用于日本之艺，日本之音，入日本之耳，日本之文化，育日本之民。若意大利人欲重拾古罗马之遗韵，得后却将其弃之敝屣，转而制作低俗影像，我们愿他们独立为之，无需别人帮助。"
 BFI_gui_action_button_1_issue_1_JAP_delayed_tt:0 ""
 BFI_gui_action_button_2_issue_1_JAP_tt:0 "在此添一语，于彼引一典，间或蹦出一两句意大利语的只言片语。或许，我们能激励那些政坛翘楚，在国际舞台上或与意大利使者交流之时，援引意大利文学与电影之精华。说不定，他们之中会有人因此而渐渐领略到意大利文化的独特魅力。"
 BFI_gui_action_button_2_issue_1_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  杂项收入：§G+50§!§YM美元§!"
 BFI_gui_action_button_3_issue_1_JAP_tt:0 "意大利人对他们本土的电影、音乐和古雕塑怀有深情，若这些文化精粹能触动他们的心弦，那么，对此进行投资便显得意义非凡。尽管资助艺术工作室和电影公司可能如泥牛入海，不见回报，但这份慷慨解囊，却是我们善意的最佳证明。"
 BFI_gui_action_button_3_issue_1_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  杂项收入：§G+100§!§YM美元§!\n  每日政治点数：§G+0.03§!\n§Y日本§!将获得：\n  每日政治点数：§G+0.01§!"
 BFI_gui_action_button_4_issue_1_JAP_tt:0 "激励之下，日本艺术界有望向意大利展现其独特魅力。双方若能互借文化精髓，两国文化必将如花绽放：意大利影片可于日本影院放映，日本诗歌亦可在意大利学府传颂。文化交流之门一旦开启，无限可能便在眼前！"
 BFI_gui_action_button_4_issue_1_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  杂项收入：§G+150§!§YM美元§!\n  每日政治点数：§G+0.06§!\n§Y日本§!将获得：\n  每日政治点数：§G+0.03§!\n  稳定度：§G+2.5%§!"
 BFI_gui_action_button_5_issue_1_JAP_tt:0 "激励之下，日本的文化瑰宝将跨越重洋，抵达意大利之岸，同时拓展我们的文化资助范围与项目，纳入意大利的电影、文学与绘画。借此深化与意大利人的文化协作，更让意大利的精英与中产，对日本的慷慨资助者，心生更多好感。电影银幕上，日本故事将映入意大利眼帘；大学讲堂中，日本诗歌将传入意大利耳畔。文化之力，无远弗届，一切皆有可能！"
 BFI_gui_action_button_5_issue_1_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  杂项收入：§G+200§!§YM美元§!\n  每日政治点数：§G+0.09§!\n§Y日本§!将获得：\n  每日政治点数：§G+0.05§!\n  稳定度：§G+5%§!"
