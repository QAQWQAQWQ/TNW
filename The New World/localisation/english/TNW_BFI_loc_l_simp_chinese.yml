 BFI_gui_action_button_3_issue_15_ITA_tt:0 "意大利因与德国的竞争关系和地缘优势，加之其在中东和非洲的深远影响力，使其能够洞察欧洲乃至更广区域的情报。美国中央情报局和日本大本营特务总监部都对我们的情报网络情有独钟，因此我们乐意与他们交换情报，以投其所好。作为互换，他们也将与我们共享他们在非洲和亚太地区的情报网络。"
 BFI_gui_action_button_3_issue_15_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  加密：§G+5%§!\n  解密：§R-10%§!\n  §Y苏伊士§!雷达站§G+1§!"
