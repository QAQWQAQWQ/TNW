 BFI_gui_action_button_2_issue_2_ITA_tt:0 "Custom taxes, months of travel, and the accursed ebb and flow of market fashions: All great perils we must whether to even attempt to export Italy's signature products abroad. Ever since the economic downturns of Ciano's reign, we have found that carefully controlling both supply and demand in our own markets was far safer than attempting forays into foreign ports. With enough faith and enough investments, this will continue without a hitch."
