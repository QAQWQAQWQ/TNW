 BFI_gui_action_button_6_issue_2_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  贸易协定关系修正：§G+60%§!\n  GDP增长：§G+2%§!\n§M美国§!将获得：\n  GDP增长：§G+3%§!"
