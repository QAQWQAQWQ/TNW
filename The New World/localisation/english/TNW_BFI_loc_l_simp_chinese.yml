 BFI_gui_action_button_1_issue_3_JAP_tt:0 "日本的当务之急远非那远洋之外的度假胜地。从札幌的雪域风光到西贡的热闹街市，共荣圈内的美景数不胜数，而我们的国民可以轻而易举地享受这些风光旖旎的景致，无需奔赴远方。"
 BFI_gui_action_button_1_issue_3_JAP_delayed_tt:0 ""
 BFI_gui_action_button_2_issue_3_JAP_tt:0 "西西里岛的海岸与罗马的街巷，以其迷人的景致享誉世界，成为世界旅游界中的璀璨瑰宝。随着旅游机构和那些勇于探索的市民们对意大利的兴趣日益增长，现在正是与意大利当局洽谈合作，缔结友谊，共谋两国关系发展的大好时机。"
 BFI_gui_action_button_2_issue_3_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  杂项收入：§G+75§!§YM美元§!"
 BFI_gui_action_button_3_issue_3_JAP_tt:0 "意大利，以其度假胜地和旅游名胜著称于世；我们觉得，让我们的公民在地中海稍作逗留，浅尝地中海之美，未尝不可。世界如此广袤，与罗马就旅游事宜展开对话，或许能为我们在该地区的影响力添砖加瓦——尽管，这暂时并非我们的当务之急。"
 BFI_gui_action_button_3_issue_3_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  杂项收入：§G+150§!§YM美元§!\n  与日本的关系：§G+5§!\n  稳定度：§G+2.5%§!\n§Y日本§!将获得：\n  与意大利的关系：§G+5§!"
 BFI_gui_action_button_4_issue_3_JAP_tt:0 "欲与意大利人民建立更深层次的联系，我们之间的纽带需超越军备协议与贸易合同。我们两国虽源远而流异，但完全可以在历史长河、文化交融与旅游共享中寻得共鸣。借此新的交流之机，我们期望签订旅游与签证协议，为我们两国人民之间搭建起持久而真诚的友谊之桥。"
 BFI_gui_action_button_4_issue_3_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  杂项收入：§G+225§!§YM美元§!\n  与日本的关系：§G+10§!\n  稳定度：§G+5%§!\n  每日政治点数：§G+0.025§!\n§Y日本§!将获得：\n  与意大利的关系：§G+10§!\n  每日政治点数：§G+0.025§!"
 BFI_gui_action_button_5_issue_3_JAP_tt:0 "跨越波涛汹涌的印度洋，与位于罗马这座古城的挚友再续前缘，这需要的不仅是那些落于纸上的条款；更需我们两国在相互尊重的基础上投入真情实感——这亦是我们的旅游业所追求的精进之道。待双方友好使者共同勾勒出全面协议的蓝图，日本游客便能踏上那片自豪的土地，深化我们期望建立的那份深厚情谊。虽然说服意大利政府可能仍需时日，但我们肯定可以优先推进这些谈判，让彼此的心灵更加紧密相连。"
 BFI_gui_action_button_5_issue_3_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  杂项收入：§G+300§!§YM美元§!\n  与日本的关系：§G+20§!\n  稳定度：§G+7.5%§!\n  每日政治点数：§G+0.05§!\n§Y日本§!将获得：\n  与意大利的关系：§G+20§!\n  每日政治点数：§G+0.05§!"
 BFI_gui_action_button_6_issue_3_JAP_tt:0 "成千上万的日本民众已经表达了他们环地中海旅行的愿望，与此同时旅游业者也期望在意大利势力圈内扩展他们的业务，我们理应与意大利政府携手，共商印度洋旅行协议。我们决心展现我们的友好姿态，奉上我们的诚意，缔结一项互利共赢的协议，让日本游客的足迹遍布意大利的城市，既为罗马带来繁荣，也让我们与意大利的友谊更加牢固。"
 BFI_gui_action_button_6_issue_3_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  杂项收入：§G+375§!§YM美元§!\n  与日本的关系：§G+30§!\n  稳定度：§G+10%§!\n  每日政治点数：§G+0.075§!\n§Y日本§!将获得：\n  与意大利的关系：§G+30§!\n  每日政治点数：§G+0.075§!"
 BFI_gui_action_button_2_issue_4_ITA_tt:0 "意大利的国运悬而未决。我们的市场面临着被廉价、大规模生产的产品所淹没的威胁，国内企业家亦面临着被那些庞然大物般的跨国集团挤出本土市场的风险。对此，我们决不妥协！我们理应扶持如奥利维蒂和菲亚特这样的本土电子与汽车企业，以补贴之策，培育意大利的创业精神，抵御那些唯利是图的跨国巨鳄。"
 BFI_gui_action_button_2_issue_4_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  每月工业专业知识：§R-0.5§!"
 BFI_gui_action_button_3_issue_4_ITA_tt:0 "意大利的利益始终占据我们商业策略的核心，然而，我们也不忘与有潜力的国际企业展开小规模的合作与磋商，允许他们在我们通常严密守护的市场中获得一席之地。此举旨在与大国缔结良缘，同时激发我们本土企业家的创新活力。"
 BFI_gui_action_button_3_issue_4_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将§R维持现状§!。"
 BFI_gui_action_button_4_issue_4_ITA_tt:0 "我们不得不承认，意大利的工厂和企业虽然生产颇丰，却仍有未尽之处。如今，科技的浪潮在日本和美国掀起了巨大的飞跃，我们亦应激励国内涌现类似的创新浪潮。我们已决心昭告天下，意欲吸引世界各地的工业巨擘，共享意大利的富饶与市场，以此作为我们迈向国际舞台的加速器。"
 BFI_gui_action_button_4_issue_4_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  每月工业专业知识：§G+1§!"
 BFI_gui_action_button_5_issue_4_ITA_tt:0 "Even if they may not have the best interests of our own nation at heart, the amount of sheer power and innovation concentrated in Multinational companies is enough of an incentive to overlook their rougher edges. Toyota, Datsun, Mitsubishi, Ford, IBM, and American Motors are all illustrious brands with serious weight to their name. Encouraging deals with the giants of modern industry is key to our policy. By offering moderate incentives, we hope to attract their products to our markets, and eventually allow for the creation of local factories and subsidiaries."
 BFI_gui_action_button_5_issue_4_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  每月工业专业知识：§G+1§!\n  GDP增长：§G+2%§!"
 BFI_gui_action_button_6_issue_4_ITA_tt:0 "我们正致力于快速推进意大利工业的现代化，为此，我们决定向外国企业和政府提供一些实质性的竞争优势，以激励他们向意大利出口和扩张。这一政策将使意大利成为工业界的焦点，成为一个经济繁荣、市场广阔的发达经济体，企业和产品在这里将遇到旺盛的需求和低门槛的发展障碍。工业制成品、现代企业和先进的工业专业知识将涌入意大利，为我们的经济增长注入活力。"
 BFI_gui_action_button_6_issue_4_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  每月工业专业知识：§G+2§!\n  GDP年增长率：§G+0.1%§!"
 BFI_gui_action_button_1_issue_4_USA_tt:0 "美国和意大利的工业之间存在着不同的标准和措施，以及一系列关税壁垒，这种情况不太可能有所改变。在这种局面中，横加干涉对我们来说并无太多益处。"
 BFI_gui_action_button_1_issue_4_USA_delayed_tt:0 ""
 BFI_gui_action_button_2_issue_4_USA_tt:0 "在意大利，工业领域对我们对的意大利的外交行动并非举足轻重。多年来的高关税壁垒和与美国大相径庭的国家干预策略，已使得意大利的工业标准和实践措施与我们南辕北辙，我们能够施展影响力的空间微乎其微。"
 BFI_gui_action_button_2_issue_4_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  每月工业设备：§G+0.5§!"
 BFI_gui_action_button_3_issue_4_USA_tt:0 "工业领域并不是我们拓展势力的首要选择，然机缘巧合下，其中或仍有可图之机。数十年的关税壁垒已导致意大利的工业标准和实践措施与我们大相径庭，这可能难以弥补，但在某些领域，尚有互利共赢之可能。"
 BFI_gui_action_button_3_issue_4_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  每月工业设备：§G+1§!\n§M美国§!将获得：\n  杂项支出：§R+50§!§YM美元§!"
 BFI_gui_action_button_4_issue_4_USA_tt:0 "工业领域应纳入我们在意大利影响力的扩展版图。意大利企业的影响力不容小觑，适当的激励或能促使它们与美方伙伴携手并进。若能确立我们作为意大利工业的首选合作伙伴地位，OFN必将在这场影响力的较量中赢得先机。"
 BFI_gui_action_button_4_issue_4_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  每月工业设备：§G+1§!\n  每月工业专业知识：§G+0.5§!\n§M美国§!将获得：\n  杂项支出：§R+50§!§YM美元§!\n  每月工业专业知识：§G+0.5§!"
 BFI_gui_action_button_5_issue_4_USA_tt:0 "在这场争夺意大利影响力的较量中，工业领域扮演着举足轻重的角色。意大利的工业巨擘们不仅在国内极具影响力，而且对美国资本与技术持开放之态，这为我们提供了一个千载难逢的机遇，让我们有机会成为意大利工业的首选盟友。借此东风，我们便能在与日本的影响力角逐中更上一层楼。"
 BFI_gui_action_button_5_issue_4_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  每月工业设备：§G+1.5§!\n  每月工业专业知识：§G+1§!\n§M美国§!将获得：\n  杂项支出：§R+100§!§YM美元§!\n  每月工业专业知识：§G+1§!"
 BFI_gui_action_button_6_issue_4_USA_tt:0 "意大利的辉煌工业一直是其民族骄傲的象征。意大利工业巨头们在国内外备受尊崇，影响力巨大，更尤为关键的是，他们对美国的专业知识、投资和市场准入表现出浓厚兴趣。在这场影响力的较量中，谁能成为他们的座上宾，谁就能占据有利地位。我们务必全力以赴，确保自己能够脱颖而出，成为他们的首选盟友。"
 BFI_gui_action_button_6_issue_4_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  每月工业设备：§G+2§!\n  每月工业专业知识：§G+1§!\n§M美国§!将获得：\n  杂项支出：§R+100§!§YM美元§!\n  每月工业专业知识：§G+1§!\n  GDP增长：§G+1%§!"
 BFI_gui_action_button_1_issue_4_JAP_tt:0 "鉴于意大利的限制性劳动法规和制造业标准，进军欧洲市场并不利于我们的利益。我们的资金非但可能泥牛入海，更有可能因为大量劣质廉价商品的涌入，有损于我们自身的消费经济。故此，我们只能婉言谢绝，以礼节性的回绝来保持距离。"
 BFI_gui_action_button_1_issue_4_JAP_delayed_tt:0 ""
 BFI_gui_action_button_2_issue_4_JAP_tt:0 "意大利的本土制造业在近几十年里蓬勃发展，这得益于它与德国的关系日渐淡薄，现在罗马正力图重返国际舞台，全球市场对此趋之若鹜，纷纷寻求从意大利制造的产品中获利。我们应与罗马先磋商数项协议，但在深入合作前，还需保持谨慎，步步为营。"
 BFI_gui_action_button_2_issue_4_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  每月工业设备：§G+1§!\n"
 BFI_gui_action_button_3_issue_4_JAP_tt:0 "日本商业的触角已悄然伸向意大利的制造业巨头，我们须审时度势，与罗马缔结更为牢固且正式的联盟。意日双方代表团共拟的贸易大计，将为我们两国人民所期盼的联盟关系铺平道路。对罗马而言，日本的珍奇产品与合作伙伴关系已近在咫尺，只待他们跨出决定性的一步。"
 BFI_gui_action_button_3_issue_4_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  每月工业设备：§G+1.5§!\n§Y日本§!将获得：\n  每月工业专业知识：§G+0.5§!\n"
 BFI_gui_action_button_4_issue_4_JAP_tt:0 "亚洲财阀对意大利制造业的投资早已觊觎已久，他们预见这将带来丰厚的回报，同时在亚平宁半岛点燃发展的火花，为众多民众开辟就业之路，让股东们的财富膨胀至令人咋舌的地步。面对赚取巨额利润的良机，或许现在是与罗马方面开启商谈的绝佳时机，以探询他们对于解绑日本资本，让其涌入地中海市场的态度。"
 BFI_gui_action_button_4_issue_4_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  每月工业设备：§G+2§!\n  生产效率增长：§G+2.5%§!\n§Y日本§!将获得：\n  每月工业设备：§G+1§!\n"
 BFI_gui_action_button_5_issue_4_JAP_tt:0 "意大利经济的松绑，已然成为全球瞩目的焦点；若我们能在意大利商界事务中占据一席之地，罗马便能从欧陆与我方的贸易往来中分得一杯羹。中国工业设备的革新与日本计算机技术的飞跃，均为未来的外交关系铺就了新的商贸桥梁。让我们引领罗马，迈向与日本经济力量并肩的辉煌道路。"
 BFI_gui_action_button_5_issue_4_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  每月工业设备：§G+2.5§!\n  生产效率增长：§G+5%§!\n§Y日本§!将获得：\n  每月工业设备：§G+1.5§!\n"
 BFI_gui_action_button_6_issue_4_JAP_tt:0 "东方的工业瑰宝与投资机遇，对意大利而言，只隔着印度洋的波涛；日本匠心独运的精密计算机技术，中国量身定制的资源开采机械，以及众多来自世界各地的明星产品，都预示着罗马将迎来一个繁荣昌盛的新时代。若我们能以巧夺天工的外交策略，巩固我们两国之间的联盟，这不仅是意大利通向繁荣未来的康庄大道，更是他们越发靠近那日升之地的契机。"
 BFI_gui_action_button_6_issue_4_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  每月工业设备：§G+3§!\n  生产效率增长：§G+7.5%§!\n§Y日本§!将获得：\n  每月工业设备：§G+2§!\n"
 BFI_gui_action_button_2_issue_5_ITA_tt:0 "四十载法西斯阴霾笼罩之下，意大利学术界深受其害，留下了难以抹去的烙印。在严格的审查制度之下，加之法西斯政权以“防微杜渐”之名，对外学术交流被套上了沉重的枷锁，使得意大利学术界仿佛置身于一座孤岛，与世隔绝。面对是否继续这一政策的争议，我们决定暂时按兵不动，静观其变。"
 BFI_gui_action_button_2_issue_5_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  每日政治点数：§G+0.1§!\n  研究速度：§R-3%§!\n  每月教育水平：§R-1§!\n  每月研究设施：§R-1§!"
 BFI_gui_action_button_3_issue_5_ITA_tt:0 "我们最近摒弃了一项法西斯时代的陈规，放开了意大利学术界与海外学术界的合作限制。随即，一些美国和日本的学府便主动伸出了友谊之手，他们不仅私下里与我们开始了接触，还盛情邀请了我们的学者参与他们的学术盛会。但语言和文化的差异仍是学术交流的一道难以逾越的鸿沟，这些新举措现在尚未在学术界引起广泛共鸣。"
 BFI_gui_action_button_3_issue_5_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  每日政治点数：§G+0.05§!"
 BFI_gui_action_button_4_issue_5_ITA_tt:0 "自政府扶持的外语学习计划实施以来，我们与国际学术界的合作如日中天。如今，学子们正孜孜不倦地学习英语和日语，众多海外教材与文献亦在陆续译成意大利语。此外，美日两国皆慷慨解囊，资助国际学术盛会，而一些美国和日本的学府亦已与意大利的大学携手，共同开启研究新篇章。"
 BFI_gui_action_button_4_issue_5_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  研究速度：§G+3%§!\n  每月教育水平：§G+0.5§!\n  每月研究设施：§G+0.5§!"
 BFI_gui_action_button_5_issue_5_ITA_tt:0 "要彻底修复法西斯对学术界的伤害，关键在于让我们的学者与更广阔的学术界接轨。为此，我们已经与一些日本和美国的知名大学达成了协议，建立了双方的交流项目。目前，已有数千名意大利学生出国学习，同时，来自日本和美国的教授们也在我们的大学里进行讲学。"
 BFI_gui_action_button_5_issue_5_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  每日政治点数：§R-0.05§!\n  研究速度：§G+6%§!\n  每月教育水平：§G+1§!\n  每月研究设施：§G+1§!"
 BFI_gui_action_button_6_issue_5_ITA_tt:0 "得益于我们的不懈努力，意大利学术界已成功重返世界舞台。如今，我们的学子不仅远赴海外求学，更有许多日本和美国学生慕名而来，作为交换生与我们的学生互访交流。在校园里，英语和日语的对话声此起彼伏，国际资金如潮水般涌入我们的科研实验室。障碍既除，合作无间，我们的学者们成果斐然，意大利学术的未来一片光明。"
 BFI_gui_action_button_6_issue_5_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  每日政治点数：§R-0.1§!\n  研究速度：§G+9%§!\n  每月教育水平：§G+1.5§!\n  每月研究设施：§G+1.5§!"
 BFI_gui_action_button_1_issue_5_USA_tt:0 "因政治分歧与语言障碍，意大利和美国的学术界交流寥寥无几，我们能从中获得的好处有限。"
 BFI_gui_action_button_1_issue_5_USA_delayed_tt:0 ""
 BFI_gui_action_button_2_issue_5_USA_tt:0 "学术界不应当成为我们在意大利努力的重心。他们的大学体系对我们的介入疑窦重重，加之两国历史与现实的错综复杂，使得我们之间任何合作的探讨都如履薄冰。"
 BFI_gui_action_button_2_issue_5_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  每月研究设施：§G+0.5§!"
 BFI_gui_action_button_3_issue_5_USA_tt:0 "学术界虽非我们在意大利的主战场，却也并非无用武之地。我们的高级学术顾问已经筛选出若干领域，认为在这些领域与意大利的学者携手合作，双方皆能互利共赢。"
 BFI_gui_action_button_3_issue_5_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  每月研究设施：§G+1§!\n  每月教育水平：§G+0.5§!\n§M美国§!将获得：\n  每月研究设施：§G+0.5§!"
 BFI_gui_action_button_4_issue_5_USA_tt:0 "意大利坐拥世界上最受尊崇的高等学府，孕育了众多领域的学术巨擘。我们则坐拥世界级的高等学府，手握丰沛的研究资金。鉴于科学对于两国皆至关重要，我们理应将部分精力投注于学术领域。"
 BFI_gui_action_button_4_issue_5_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  每月研究设施：§G+1.5§!\n  每月教育水平：§G+0.5§!\n§M美国§!将获得：\n  每月研究设施：§G+0.5§!\n  每日政治点数：§G+0.05§!"
 BFI_gui_action_button_5_issue_5_USA_tt:0 "意大利学术界历史悠久，声誉卓著，多个学科领域领先世界。我们两国学术界的紧密联合，不仅能够照亮科学进步的灯塔，亦能增强我们在意大利的学术影响力。"
 BFI_gui_action_button_5_issue_5_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  每月研究设施：§G+1.5§!\n  每月教育水平：§G+1§!\n§M美国§!将获得：\n  每月研究设施：§G+1§!\n  每日政治点数：§G+0.05§!"
 BFI_gui_action_button_6_issue_5_USA_tt:0 "要在意大利的影响力争夺战中取得胜利，学术界自当担纲先锋。意大利源远流长的学术历史，使得大学和学生成为国家自我认识的核心，故而，如果我们成为意大利学术界的首选伙伴，便有望赢得整个国家的青睐。"
 BFI_gui_action_button_6_issue_5_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  每月研究设施：§G+2§!\n  每月教育水平：§G+1§!\n§M美国§!将获得：\n  每月研究设施：§G+1§!\n  每日政治点数：§G+0.1§!"
 BFI_gui_action_button_1_issue_5_JAP_tt:0 "若意大利学术界继续固步自封，我们与其在学术领域的交流计划便无从谈起。大众文化部过往的政策为意大利筑起了高墙深院，其中，教育机构显得尤为难以接触，因此，我们的目光或许应当投向他方。"
 BFI_gui_action_button_1_issue_5_JAP_delayed_tt:0 ""
 BFI_gui_action_button_2_issue_5_JAP_tt:0 "随着墨索里尼时代的审查法被废除，日本高校界已开始着手探索与意大利学术界的合作之机。我们在此并无过多政府资源的牵涉，故而，让学府自主推动交流与协作，可谓无害有益。"
 BFI_gui_action_button_2_issue_5_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  每月研究设施：§G+0.5§!\n"
 BFI_gui_action_button_3_issue_5_JAP_tt:0 "协调与合作，大学最为擅长；毕竟，传授知识、共享信息、进行研究是大学的天职。我们将在日本和意大利的学术机构之间架设沟通桥梁，通过举办会议与论坛，以便教职员工和研究人员能够相互沟通。"
 BFI_gui_action_button_3_issue_5_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  每月研究设施：§G+1§!\n§Y日本§!将获得：\n  研究速度：§G+1%§!\n"
 BFI_gui_action_button_4_issue_5_JAP_tt:0 "愿我们与意大利的伙伴关系能够经得起岁月的洗礼，现在让我们致力于将两国间研究与学术的桥梁架设得更加牢固。通过与意大利的大学建立官方联系，让我们期望地中海的学术殿堂能够与东方的科技文化精粹相互贯通，并推进学术研讨、教育互鉴以及资源共享，以深化两国人民的情谊。"
 BFI_gui_action_button_4_issue_5_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  每月研究设施：§G+1§!\n  每月教育水平：§G+0.5§!\n§Y日本§!将获得：\n  研究速度：§G+3%§!\n  每月教育水平：§G+0.5§!\n"
 BFI_gui_action_button_5_issue_5_JAP_tt:0 "随着意大利学术界向世界敞开怀抱，我们的大学也应顺势而为，积极参与地中海学术圈的交流与合作。我们计划在日语教学和日本历史研究上投入更多资源，同时推动东方创新科学的传播，以此加强与罗马学术界的联系，促进两国友谊的深化。借此，我们满怀期待，随着意大利学术根基的日益坚实，我们与罗马的情谊亦将随之水涨船高，迎来翻天覆地之进步。"
 BFI_gui_action_button_5_issue_5_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  每月研究设施：§G+1.5§!\n  每月教育水平：§G+1§!\n§Y日本§!将获得：\n  研究速度：§G+3%§!\n  每月教育水平：§G+1§!\n"
 BFI_gui_action_button_6_issue_5_JAP_tt:0 "我们与意大利的纽带，不单是军事盟约那么简单；我们两国人民都崇尚历史，应携手致力于科学、技术、信息与艺术的兴盛。承启蒙之风，我们倡议启动一项正式的伙伴关系计划。在意大利政府的协作下，我们期望肩并肩，人员间互通有无，开展学生互访项目，共享学术资源与文物，让我们的友好关系更上一层楼。"
 BFI_gui_action_button_6_issue_5_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  每月研究设施：§G+2§!\n  每月教育水平：§G+2§!\n§Y日本§!将获得：\n  研究速度：§G+3%§!\n  每月教育水平：§G+1.5§!\n"
 BFI_gui_action_button_2_issue_6_ITA_tt:0 "One of the hallmarks of fascist economic policy was the pursuit of autarky - complete economic self-reliance. While the Battle for Grain in the interwar years eliminated Italy's agricultural trade deficit, these gains were completely lost in the decades following the creation of the Italian Empire, and Italy now imports much of its foodstuff from Egypt. While some argue that free trade with the United States and Japan could benefit Italy's agricultural sector, we will maintain protectionist policies for now."
 BFI_gui_action_button_2_issue_6_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  每月农业技术：§R-2§!"
 BFI_gui_action_button_3_issue_6_ITA_tt:0 "我们已断定，农产品贸易的自由化势在必行，部分繁重的进口关税已遭废止。美国和日本的食品品牌已跨洋越海，现身于意大利的货架，令食品价格微露下降之势。但即便如此，大多数意大利农民仍然更愿意在国内销售他们的农产品。"
 BFI_gui_action_button_3_issue_6_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  每月农业技术：§R-1§!\n  我们的§s贫困率§!将开始缓慢§G改善§!。"
 BFI_gui_action_button_4_issue_6_ITA_tt:0 "继我们降低关税的初步举措之后，我们又批准了与美国和日本的农业贸易协定，进一步削减了农产品的关税，并确保了我国农民能够顺利进入国际市场。如今，一些颇具规模的农业企业已经将意大利的葡萄佳酿、橄榄油和奶酪摆上了美国和日本的货架，然而，许多小农户尚未迈出拓展海外市场的第一步。"
 BFI_gui_action_button_4_issue_6_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  我们的§s贫困率§!将开始§G改善§!。"
 BFI_gui_action_button_5_issue_6_ITA_tt:0 "随着我们与美国和日本签订的自由贸易协定的实施，我国农业正迎来一场翻天覆地的变化。这些协定不仅打破了农产品贸易的重重壁垒，还为意大利商品的外销铺平了道路。更进一步的是，我们设立了进出口银行，为广大包括自耕农在内的农户打开了通往国际市场的大门，让他们的产品也能远销海外。"
 BFI_gui_action_button_5_issue_6_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  每月农业技术：§G+1§!\n  我们的§s贫困率§!将开始§G改善§!。"
 BFI_gui_action_button_6_issue_6_ITA_tt:0 "Our agricultural free-trade policies have transformed Italy's agricultural sector. Italian farmers now sell their produce as far away as Chicago or Tokyo, foreign brands fill the shelves of Italian grocery stores while Italian brands fill American and Japanese supermarkets, and foreign capital has flooded into our agricultural enterprises, raising our agricultural production to pre-Empire levels."
 BFI_gui_action_button_6_issue_6_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  每月农业技术：§G+2§!\n  我们的§s贫困率§!将开始§G急速改善§!。"
 BFI_gui_action_button_1_issue_6_USA_tt:0 "美国的农业和意大利的农业几乎是互不干涉，未来也可能会持续如此。我们应该将注意力转移到其他领域。"
 BFI_gui_action_button_1_issue_6_USA_delayed_tt:0 ""
 BFI_gui_action_button_2_issue_6_USA_tt:0 "农业领域，本是两国间合作的沃土，奈何我们双方的政策迥异。意大利人更愿意固守本土农耕，对于深化合作的利益则显得不那么热衷，使得我们在这个领域的影响力难以施展。"
 BFI_gui_action_button_2_issue_6_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  杂项收入：§G+50§!§YM美元§!"
 BFI_gui_action_button_3_issue_6_USA_tt:0 "农业难以成为这场影响力较量的主阵地，毕竟在意大利国内，这是个敏感至极的话题。然而，若能巧妙规避政治的雷区，仍有广阔天地可为合作之机。机遇固然存在，但是否值得投入，还需三思而后行。"
 BFI_gui_action_button_3_issue_6_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  杂项收入：§G+50§!§YM美元§!\n  每月农业技术：§G+0.5§!\n§M美国§!将获得：\n  杂项收入：§G+75§!§YM美元§!"
 BFI_gui_action_button_4_issue_6_USA_tt:0 "农业无疑是这场影响力角逐中值得投资的领域。两国的气候迥异、传统各具特色，这为我们提供了无数合作的良机和互利共赢的交流平台。然而，保护主义的政策和壁垒让我们不得不如履薄冰，审慎前行。"
 BFI_gui_action_button_4_issue_6_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  杂项收入：§G+50§!§YM美元§!\n  每月农业技术：§G+1§!\n§M美国§!将获得：\n  杂项收入：§G+150§!§YM美元§!"
 BFI_gui_action_button_5_issue_6_USA_tt:0 "在意大利这场影响力的较量中，农业有望成为重要战场。美意两国的农业，传统各异，即使在当代，发展路径亦不尽相同，这恰恰为彼此间的交流合作预留了广阔的空间。我们理应善加利用这一潜力，以期互利共赢。"
 BFI_gui_action_button_5_issue_6_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  杂项收入：§G+50§!§YM美元§!\n  每月农业技术：§G+1.5§!\n  每月贫困率下降：§G+0.025%§!\n§M美国§!将获得：\n  杂项收入：§G+225§!§YM美元§!"
 BFI_gui_action_button_6_issue_6_USA_tt:0 "在意大利这场影响力之争中，农业无疑将成为关键的角逐领域。意大利人民将饮食传统与农业奉为身份认同的核心，故而在这片土地上，能够赢得他们青睐的合作伙伴，必将在国家舞台上占据举足轻重的地位。"
 BFI_gui_action_button_6_issue_6_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  杂项收入：§G+50§!§YM美元§!\n  每月农业技术：§G+2§!\n  每月贫困率下降：§G+0.05%§!\n§M美国§!将获得：\n  杂项收入：§G+300§!§YM美元§!"
 BFI_gui_action_button_1_issue_6_JAP_tt:0 "意大利小农场在酒瓶上可能显得别有一番风味，但地中海气候却并不适合生产营养丰富或令人愉悦的农产品。对于日本民众而言，食用本土耕作的食材方为上策。"
 BFI_gui_action_button_1_issue_6_JAP_delayed_tt:0 ""
 BFI_gui_action_button_2_issue_6_JAP_tt:0 "在地球这个大舞台上，尤其是中国，农业产出丰富，主要是稻米，但他的销售渠道尚待拓宽。我们向意大利敞开了合作的大门，他们将逐渐领略到世界上顶级、简单却美味的谷物，这些将成为他们餐桌上的新宠，超越了他们传统饮食的范畴。"
 BFI_gui_action_button_2_issue_6_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  月度人口：§G+2%§!\n§Y日本§!将获得：\n  杂项收入：§G+75§!§YM美元§!\n"
 BFI_gui_action_button_3_issue_6_JAP_tt:0 "在农产品的互通有无中，疾病的传播、外来物种的侵扰以及品质参差不齐的农产品是人们最为关切的问题。虽然我们不会犯下这种严重的错误，但若能设立一个独立的贸易委员会来规范日意之间的农业贸易，这无疑将有助于深化两国人民的情谊。"
 BFI_gui_action_button_3_issue_6_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  月度人口：§G+4%§!\n  每月农业技术：§G+0.5§!\n§Y日本§!将获得：\n  杂项收入：§G+150§!§YM美元§!\n"
 BFI_gui_action_button_4_issue_6_JAP_tt:0 "意大利人民将农业的繁荣视作民族自尊的根基。但近年来，地中海的围海造陆与贸易的衰退，使得这份骄傲的基础摇摇欲坠。不过，假以日元之力，意大利的农场有望重焕生机，变成一个个丰盈的“丰饶之角”。"
 BFI_gui_action_button_4_issue_6_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  月度人口：§G+6%§!\n  每月农业技术：§G+1§!\n§Y日本§!将获得：\n  杂项收入：§G+225§!§YM美元§!\n"
 BFI_gui_action_button_5_issue_6_JAP_tt:0 "意大利的饮食文化在日本民众中尚鲜为人知。若能引入意大利面、酱料和地中海的水果，定能在日本掀起一场意式美食的热潮，进而加深两国人民的心灵相通和政府间的相互理解。"
 BFI_gui_action_button_5_issue_6_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  月度人口：§G+8%§!\n  每月农业技术：§G+1.5§!\n§Y日本§!将获得：\n  杂项收入：§G+300§!§YM美元§!\n  每月农业技术：§G+0.5§!\n"
 BFI_gui_action_button_6_issue_6_JAP_tt:0 "尽管现在日本的耕地日益缩减，意大利的田野却始终硕果累累，金穗飘香！葡萄酒、风味独特的意大利面和橄榄油，将成为日本餐桌上的新宠！"
 BFI_gui_action_button_6_issue_6_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  月度人口：§G+10%§!\n  每月农业技术：§G+2§!\n§Y日本§!将获得：\n  杂项收入：§G+375§!§YM美元§!\n  每月农业技术：§G+1§!\n"
 BFI_gui_action_button_2_issue_7_ITA_tt:0 "The discovery of vast oil reserves in our Middle Eastern holdings is what kept the Italian economy afloat during the Fifties. Now, Italy dominates global oil markets, and our position has allowed us to mark up our oil prices beyond expected market rates. Some argue that this is unfair to consumers, but our control of the oil market grants us leverage over the superpowers. After all, where else are they going to get their fuel from?"
 BFI_gui_action_button_2_issue_7_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  出口资源：§G-5%§!"
 BFI_gui_action_button_3_issue_7_ITA_tt:0 "为了在美国和日本之间赢得更多的好感，我们决定将我们出售给自由国家组织和共荣圈的石油价格调整到一个更加合理的水平。这一举措不仅受到了商家的欢迎，也让消费者感到高兴，因为他们将因油价下降而获益。然而，即便如此，我们仍将维持对石油进口的关税，并且对外商在埃尼集团的投资进行限制。"
 BFI_gui_action_button_3_issue_7_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  生活消费品需求：§G-1%§!"
 BFI_gui_action_button_4_issue_7_ITA_tt:0 "为了与美日两国修好，我们进一步敞开了石油贸易的大门，签署了自由贸易协定，使得我们的石油得以按市价交易，同时放宽了对石油进口的束缚。这一棋高一着的举措，已经让意大利、美国和日本的经济因为油价的下降而得到提振。然而，对于埃尼集团的外资持股以及外国石油公司在我们殖民地的活动，我们依然紧闭大门。"
 BFI_gui_action_button_4_issue_7_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  出口资源：§R+5%§!\n  生活消费品需求：§G-2%§!"
 BFI_gui_action_button_5_issue_7_ITA_tt:0 "为了进一步巩固与美日的情谊，我们已允许外资购买埃尼集团的股份，但意大利帝国仍将保持多数股权。如今，美日资本正如潮水般涌入，助力我们在中东的投资更上一层楼。"
 BFI_gui_action_button_5_issue_7_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  出口资源：§R+10%§!\n  生活消费品需求：§G-3%§!"
 BFI_gui_action_button_6_issue_7_ITA_tt:0 "我们解除了对外资石油公司在我国油田上建设基础设施和油井的限制，自此，我们的石油行业正式向全球资本张开双臂。埃尼集团将稳居鳌头，而美日资金的涌入，将为我们的石油产业注入长盛不衰的活力。"
 BFI_gui_action_button_6_issue_7_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  出口资源：§R+20%§!\n  生活消费品需求：§G-5%§!"
 BFI_gui_action_button_1_issue_7_USA_tt:0 "我们不应将石油行业变成争夺影响力的角斗场。美国石油界将埃尼集团视为眼中钉，反之亦然，而日本与意大利之间则更像是天作之合。在此事上横加干预，实乃徒劳无功。"
 BFI_gui_action_button_1_issue_7_USA_delayed_tt:0 ""
 BFI_gui_action_button_2_issue_7_USA_tt:0 "油气领域，实非争夺影响力的战场。我们视意大利石油业与埃尼集团为主要竞争对手，但略微探索我们之间合作的可能性也无伤大雅，但这不太可能给全局带来太大的影响。"
 BFI_gui_action_button_2_issue_7_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  杂项收入：§G+100§!§YM美元§!"
 BFI_gui_action_button_3_issue_7_USA_tt:0 "在意大利争夺影响力的战场上，油气未必能成为关键棋子。毕竟，埃尼集团为了保证其垄断地位对自家市场与知识的把守可谓是密不透风。不过，他们与我们的产业巨头之间在合作与技术交流上仍有潜力可挖。若能巧妙运作，这或许能为我们攫取些许话语权。"
 BFI_gui_action_button_3_issue_7_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  杂项收入：§G+200§!§YM美元§!\n§M美国§!将获得：\n  石油转换燃油效率：§G+4%§!"
 BFI_gui_action_button_4_issue_7_USA_tt:0 "在意大利的争夺战中，油气领域无疑将成为我们较量的焦点之一。这一行业对于两国经济皆是中流砥柱，而目前双方在石油领域的合作尚处于空白，这正为我们的大展宏图提供了广阔天地。"
 BFI_gui_action_button_4_issue_7_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  杂项收入：§G+300§!§YM美元§!\n  每月工业设备：§G+0.5§!\n§M美国§!将获得：\n  石油转换燃油效率：§G+8%§!"
 BFI_gui_action_button_5_issue_7_USA_tt:0 "油气资源在意大利的影响力争夺战中必须占据首要地位。它对于意大利经济和我们自身的经济都举足轻重，而目前我们之间在这一领域的合作潜力尚未充分挖掘。这为我们提供了巨大的空间，现在正是加大合作力度、深化两国关系的大好时机。"
 BFI_gui_action_button_5_issue_7_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  杂项收入：§G+400§!§YM美元§!\n  每月工业设备：§G+0.5§!\n§M美国§!将获得：\n  石油转换燃油效率：§G+12%§!\n  杂项收入：§G+100§!§YM美元§!"
 BFI_gui_action_button_6_issue_7_USA_tt:0 "油气资源在意大利的影响力争夺中占据着至关重要的地位，我们有望稳操胜券。在油气市场，我们两国携手占据着举足轻重的份额，开展互惠合作的潜力不可小觑。共同开发项目、共建子公司、技术互鉴以及炼油技术的共享，不仅盈利可观，更是锁定意大利支持的关键所在。"
 BFI_gui_action_button_6_issue_7_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  杂项收入：§G+500§!§YM美元§!\n  每月工业设备：§G+1§!\n§M美国§!将获得：\n  石油转换燃油效率：§G+16%§!\n  杂项收入：§G+100§!§YM美元§!\n  GDP增长：§G+1%§!"
 BFI_gui_action_button_1_issue_7_JAP_tt:0 "南海的石油资源丰富，日本对意大利的石油并无太多依赖。与埃尼集团的任何交易，都可能使大日本帝国为意大利在中东的殖民挫折买单，这非我们所愿。毕竟，我国公民的安危和福祉永远是我们考虑的重中之重。"
 BFI_gui_action_button_1_issue_7_JAP_delayed_tt:0 ""
 BFI_gui_action_button_2_issue_7_JAP_tt:0 "日本无需意大利的石油，共荣圈自给自足绰绰有余。然而，日本总是愿意结交更多盟友，共享更多资源。因此，我们将开始用灰色的财富、特权和交易来吸引埃尼集团的官员们，如果意大利愿意加入共荣圈，这些都有可能成为现实。遗憾的是，他们至今还未加入。"
 BFI_gui_action_button_2_issue_7_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  出口资源：§R+4%§!\n  战略资源获取效率：§G+4%§!\n  准备金：§G+200§!§YM美元§!\n"
 BFI_gui_action_button_3_issue_7_JAP_tt:0 "我们的帝国无需向意大利索取石油，然而，略施小惠，让他们一睹财阀之雄厚，未尝不可。帝国将推动财阀与埃尼集团的合作，让他们见识我们的慷慨与实力。但须把握分寸，让意大利人明白：这恩赐绝不是出于急需，而是我们大度的体现。"
 BFI_gui_action_button_3_issue_7_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  出口资源：§R+8%§!\n  战略资源获取效率：§G+8%§!\n  杂项收入：§G+50§!§YM美元§!\n"
 BFI_gui_action_button_4_issue_7_JAP_tt:0 "日本并非力不从心，岂会拒好机会于千里之外。意大利，我们的旧日盟友，正欲将石油卖与我们，通过与他们的合作，我们有望以高于市场价的价格达成交易，借此展现我们的诚意。我们将迅速开启此贸易，同时激励财阀们亦步亦趋。待与罗马的交易日渐频繁，他们自会明白，我们才是他们理想中的盟友，自然而然地更加靠近我们。"
 BFI_gui_action_button_4_issue_7_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  出口资源：§R+12%§!\n  战略资源获取效率：§G+12%§!\n  杂项收入：§G+100§!§YM美元§!\n§Y日本§!将获得：\n  石油转换燃油效率：§G+5%§!\n"
 BFI_gui_action_button_5_issue_7_JAP_tt:0 "仅仅从埃尼集团购买石油是不够的，我们更要彻底赢得他们的芳心。我们已经开始邀请埃尼集团的官员们前往南海考察石油储量，美其名曰为商讨埃尼集团在日本的业务前景。期间，我们将以山珍海味、奢侈品的款待，以及开采权的承诺来笼络这些官员。他们是精打细算的商贾，定会对这般诱人的交易心生向往。"
 BFI_gui_action_button_5_issue_7_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  出口资源：§R+16%§!\n  战略资源获取效率：§G+16%§!\n  杂项收入：§G+150§!§YM美元§!\n§Y日本§!将获得：\n  石油转换燃油效率：§G+10%§!\n"
 BFI_gui_action_button_6_issue_7_JAP_tt:0 "是时候兑现诺言了。虽然埃尼集团在我国并不享有与本土财阀相等的权利和特权，我们还是准许了他们在这片土地上进行买卖和开采石油，只要他们如数缴纳应有的费用，并且履行了必要的文书工作。我们这样做，是为了向意大利人表明我们合作的诚意，同时也希望借此能够获得一笔可观的收益。"
 BFI_gui_action_button_6_issue_7_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  出口资源：§R+20%§!\n  战略资源获取效率：§G+20%§!\n  杂项收入：§G+200§!§YM美元§!\n§Y日本§!将获得：\n  石油转换燃油效率：§G+15%§!\n"
 BFI_gui_action_button_2_issue_8_ITA_tt:0 "法西斯与外交素来格格不入，这是众所周知的真理。意大利多年来犹如独居的隐士，只关注自家庭院里的欧洲事务和海外殖民地，对于美国和日本两者与意大利缔结长久关系的多次尝试均置若罔闻。时至今日，我们的外交使节团几乎是英雄无用武之地。但愿未来，这种局面能够得到扭转。"
 BFI_gui_action_button_2_issue_8_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  贸易协定关系修正：§R-10%§!\n  意识形态变化抵制力度：§G+25%§!"
 BFI_gui_action_button_3_issue_8_ITA_tt:0 "幻想在不铺设坚实的外交基石下与美日两国缔结有益的纽带，实为无源之水、无本之木。我们已精心组建了一支外交使团，并委托他们全权负责与这两大强国的未来磋商。我们期望，这将有助于逐步扭转意大利目前在世界舞台上的孤立局面。"
 BFI_gui_action_button_3_issue_8_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将§R维持现状§!。"
 BFI_gui_action_button_4_issue_8_ITA_tt:0 "在我们的外交使团的精心斡旋下，意大利与美日两国已实现了邦交正常化。目前，我们已成功举办了多场国际盛会，与这些超级大国就贸易协定、条约等事宜展开了深入的讨论。自由国家组织和共荣圈也开始首次将目光转向意大利。"
 BFI_gui_action_button_4_issue_8_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  贸易协定关系修正：§G+10%§!\n  意识形态变化抵制力度：§R-5%§!"
 BFI_gui_action_button_5_issue_8_ITA_tt:0 "随着我们与美国和日本外交关系的日益密切，我们的外交触角不仅伸向了这两个超级大国，也触及了自由国家组织和共荣圈中的小成员国。我们的外交使团正马不停蹄地工作，以确保意大利与这两个联盟的关系得以巩固和发展。"
 BFI_gui_action_button_5_issue_8_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  贸易协定关系修正：§G+20%§!\n  意识形态变化抵制力度：§R-10%§!"
 BFI_gui_action_button_6_issue_8_ITA_tt:0 "随着法西斯时代政策的彻底逆转，意大利已经全面开放了外交领域。我们的外交使者在华盛顿和东京频频亮相，我们的外交团队不仅巩固了与美日及其小盟友的友好关系，而且还与众多企业和非政府组织建立了联系。昔日意大利的孤立局面，已然成为历史。"
 BFI_gui_action_button_6_issue_8_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  贸易协定关系修正：§G+25%§!\n  意识形态变化抵制力度：§R-25%§!\n  每日政治点数：§G+0.1§!"
 BFI_gui_action_button_1_issue_8_USA_tt:0 "美国对意大利的事务漠不关心，反之亦然。在国际关系的天体图中，罗马对我们而言，宛若土星之于木星：一个拥有遥远卫星的庞大天体，两者轨道相去甚远，绝无相撞之虞。此情此景已在民众心态与决策层中根深蒂固二十载；然则，倘若两国政府有意为之，改变或许就在转瞬之间。"
 BFI_gui_action_button_1_issue_8_USA_delayed_tt:0 ""
 BFI_gui_action_button_2_issue_8_USA_tt:0 "意大利帝国自第二次世界大战后崛起，虽非美国及其民主同盟的德国式意识形态宿敌，却阴差阳错地，成了美国眼中新秩序的竞争者。所幸，彼此间的分歧并未达到水火不容的地步，意大利的崛起并未被其视为心腹大患，这为美国与这位前轴心国成员的关系“重置”铺平了道路。值此之际，华盛顿对罗马的领土完整给予了肯定。"
 BFI_gui_action_button_2_issue_8_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  美国关系：§G+15§!\n§M美国§!将获得：\n  意大利关系：§G+15§!"
 BFI_gui_action_button_3_issue_8_USA_tt:0 "北边有德国人，西边是伊比利亚人，东边则是土耳其人；国内混乱不堪，国外又有殖民地人民的反抗。意大利及其政府在[GetYear]的处境，用“困兽之斗”来形容再合适不过。正如走投无路的老鼠急寻逃生之路那样，[ITA.GetLeader]正引领着国家投向美国及其温暖怀抱。奎里纳尔宫强调了与西方交往背后的务实动机。而我们却窥见了其中深植真诚情谊的可能。"
 BFI_gui_action_button_3_issue_8_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  美国关系：§G+20§!\n  稳定度：§G+5%§!\n§M美国§!将获得：\n  意大利关系：§G+20§!"
 BFI_gui_action_button_4_issue_8_USA_tt:0 "虽然曾经有过龃龉，如今，美国和意大利在外交领域达成了友好的平衡。我们正在划定清晰的界限，那些零星的争端也得以圆满解决。在没有重大冲突的背景下，两国之间的友好交流日渐频繁，关系融洽，仿佛回到了战间期的黄金时代。"
 BFI_gui_action_button_4_issue_8_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  美国关系：§G+30§!\n  稳定度：§G+7.5%§!\n§M美国§!将获得：\n  意大利关系：§G+30§!\n  意裔美国人将投票给意识形态更接近祖国的政党。"
 BFI_gui_action_button_5_issue_8_USA_tt:0 "随着罗马与华盛顿间的关系日渐升温，观察人士注意到，两国的外交政策正迅速趋于一致。他们不仅在利益上不谋而合，更在战略上相得益彰——美国力图遏制日耳曼尼亚的野心，意大利则在地中海巩固其影响力。自由国家组织的官员们正伺机而动，准备利用这一历史性的机遇：一个信得过的盟友，正悄然将匕首架在日耳曼尼亚的颈后。"
 BFI_gui_action_button_5_issue_8_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  美国关系：§G+30§!\n  稳定度：§G+10%§!\n  每日政治点数：§G+0.05§!\n§M美国§!将获得：\n  意大利关系：§G+30§!\n  意裔美国人将投票给意识形态更接近祖国的政党。"
 BFI_gui_action_button_6_issue_8_USA_tt:0 "二十年前，若有人预测美国与意大利将携手成为盟友，必会受到众人的讥讽。然而二十年后的今天，新一代的人们将不会记得这两个国家之间曾有过的隔阂。\n\n悠悠二十载，足以化干戈为玉帛，铸就非凡之缘。"
 BFI_gui_action_button_6_issue_8_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利§!将获得：\n  美国关系：§G+30§!\n  稳定度：§G+10%§!\n  每日政治点数：§G+0.1§!\n§M美国§!将获得：\n  意大利关系：§G+30§!\n  稳定度：§G+5%§!\n  意裔美国人将投票给意识形态更接近祖国的政党。"
 BFI_gui_action_button_1_issue_8_JAP_tt:0 "岂有此理，竟有人以为大日本帝国仍然渴求欧洲列强的点头！大东亚共荣圈的存续，并不需要西方人的承认，而是任其机关算尽，我自岿然不动。尽管我们与意大利有着悠久的友好关系，但我们的自尊不允许我们去低声下气地寻求他们的认可。这种行为简直是自降身价。"
 BFI_gui_action_button_1_issue_8_JAP_delayed_tt:0 ""
 BFI_gui_action_button_2_issue_8_JAP_tt:0 "我们不必对意大利人阿谀奉承，亦不必与之交恶。不必低三下四，些许无关痛痒的让步，只要不损我国威，都是无伤大雅的。日本帝国乃礼仪之邦，这些举措或可让意大利人洞见我国的仁义，领悟我们对亚洲的治理是合情合理的。"
 BFI_gui_action_button_2_issue_8_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  每日政治点数：§G+0.05§!\n"
 BFI_gui_action_button_3_issue_8_JAP_tt:0 "二战之后，意大利与日本的关系恶化，并非是双方心生罅隙的结果，而是德国对我们帝国的仇恨和嫉妒所强加的人造隔阂。如今意大利挣脱了德意志的枷锁，我们自当重燃昔日在两国民众心中熊熊燃烧的团结与合作之火。外交往来必须恢复如初，仿佛往昔未曾有断。"
 BFI_gui_action_button_3_issue_8_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  每日政治点数：§G+0.1§!\n"
 BFI_gui_action_button_4_issue_8_JAP_tt:0 "友好的互相承认不足以言深，昔日日本与意大利两大帝国间的盟约与共识，如今更应铭记在心。在三国同盟中，意大利曾承认了我们在亚洲的新秩序，我们亦承认了他们在欧洲的新秩序。如今我们需促使意大利重申对大东亚共荣圈的支持，一如往昔承诺的那样，而我们亦将兑现我们的诺言。"
 BFI_gui_action_button_4_issue_8_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  每日政治点数：§G+0.1§!\n  稳定度：§G+5%§!\n§Y日本§!将获得：\n  每日政治点数：§G+0.02§!\n"
 BFI_gui_action_button_5_issue_8_JAP_tt:0 "兄弟情谊，非言语所能尽述，非承诺所能全承，唯有行动方可见真章。大东亚共荣圈的成就已昭示天下，国与国之间的合作一旦得以制度化，各国的力量将汇聚成更强大的整体。意大利虽尚未下定决心加入我们的行列，但我们可以通过签订友好与合作的条约，使我们的双边关系历久弥坚。一旦如此，我们的纽带将牢不可破，坚比精钢百炼。"
 BFI_gui_action_button_5_issue_8_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  每日政治点数：§G+0.1§!\n  稳定度：§G+10%§!\n§Y日本§!将获得：\n  每日政治点数：§G+0.04§!\n"
 BFI_gui_action_button_6_issue_8_JAP_tt:0 "正如日本民族拥有其精神所固有的力量与勇气那样，意大利文化同样强大而真诚。我们怀有一个坚定的信念：意大利乃欧洲之雄。我们将进一步推动文化交流，让意大利的艺术瑰宝、音乐精髓和文学风采东渐至日，亦使意大利人民得以领略日本的生活之道。意大利人和日本人将在钢铁般的联结之上，进一步在思想与精神上水乳交融。"
 BFI_gui_action_button_6_issue_8_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  每日政治点数：§G+0.1§!\n  稳定度：§G+10%§!\n  战争支持度：§G+10%§!\n§Y日本§!将获得：\n  每日政治点数：§G+0.06§!\n"
 BFI_gui_action_button_2_issue_9_ITA_tt:0 "意大利帝国的子民，始终是我们国家微薄经济的阿喀琉斯之踵。按任何尺度衡量，他们都处于落后状态，在世界经济的洪流中漂泊无定，默默无闻，可有可无。显然，这迫使他们只能指望罗马的帮扶。至今，我们对外国投资依旧持有坚定不移的保护主义立场。我们庇佑之下的国度，将维持其固有的状态——这本就是天经地义。"
 BFI_gui_action_button_2_issue_9_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利势力圈§!将获得：\n  GDP年增长率：§R-0.1%§!"
 BFI_gui_action_button_3_issue_9_ITA_tt:0 "或许我们不必孤军奋战。新近的变迁已使我们开始接纳外资的小额注入，这些投资如同涓涓细流，汇入我们影响范围内的国家。对于小规模的私人慈善项目，我们认为这在我们可接受的限度之内，而美日两国亦在积极探讨对我们帝国边远地区的投资事宜。尽管如此，我们依旧坚信，这些投资不过是杯水车薪，持续不了多久。"
 BFI_gui_action_button_3_issue_9_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利势力圈§!将获得：\n  每月工业专业知识：§G+0.5§!\n  每月工业设备：§G+0.5§!\n  每月贫困率下降：§G+0.2§!"
 BFI_gui_action_button_4_issue_9_ITA_tt:0 "随着我们对外投资政策的大幅转变，帝国境内的外资如泉涌般涌入。从基础设施建设到对抗贫困与饥饿的前线，来自官方的资金援助已遍布我们势力范围内那些较为贫瘠的国度。尽管这些项目尚在起步阶段，它们却成为了通往更宏大工程的重要基石——如果我们希望继续扩大外国投资的话。"
 BFI_gui_action_button_4_issue_9_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利势力圈§!将获得：\n  每月工业专业知识：§G+1§!\n  每月工业设备：§G+1§!\n  每月贫困率下降：§G+0.03§!"
 BFI_gui_action_button_5_issue_9_ITA_tt:0 "构筑一张对我国投资的规范化网络，非一朝一夕之功，亦非仅在极端危机区域设立小规模的援助中心，我们要的是筑巢引凤，打造一个精准吸引外资的体系，以此夯实基础设施，集聚财力，赋予动力，让我们引领的国家得以蓬勃发展。虽然这一体系的构建必将历经艰辛，但有美日两国的鼎力相助，我们有信心将人道与福利的事业推向新的高度。"
 BFI_gui_action_button_5_issue_9_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利势力圈§!将获得：\n  每月工业专业知识：§G+1.5§!\n  每月工业设备：§G+1.5§!\n  每月贫困率下降：§G+0.04§!"
 BFI_gui_action_button_6_issue_9_ITA_tt:0 "意大利帝国的大门向世界敞开！外资如泉涌般涌入，带来了条条大路、丰盈的粮仓、崭新的工厂。我们那些曾贫困潦倒的子民，如今日渐兴旺，他们终于获得了自主成长所需的坚实基础，成为充满活力、效率卓绝的国家。在这些国度里，每当美国的货运飞机载着电缆、工业设备和热情的志愿者抵达，便会引发一片欢腾。这一援助计划的非凡成就，令国内许多人惊讶，我们甚至不得不专门兴建一栋大楼，用以统筹整个帝国的外援事务。随着我们对外援助的接纳程度愈发增加，我们预计这将带来更丰厚的收益、更蓬勃的生产力和更幸福的民众。这样的前景，怎能不让人欢喜？"
 BFI_gui_action_button_6_issue_9_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利势力圈§!将获得：\n  每月工业专业知识：§G+2§!\n  每月工业设备：§G+2§!\n  每月贫困率下降：§G+0.05§!"
 BFI_gui_action_button_1_issue_9_USA_tt:0 "美国在意大利势力范围内的商业足迹，至今仍是寥寥无几。我国业界领袖对于投资意大利本土或其各殖民地并无太大兴趣。"
 BFI_gui_action_button_1_issue_9_USA_delayed_tt:0 ""
 BFI_gui_action_button_2_issue_9_USA_tt:0 "美利坚的跨国巨头们对意大利势力圈的兴趣渐浓，他们已经派出了商务考察团队去发掘潜在的投资良机。然而到目前为止，他们还没有做出任何实质性的承诺。"
 BFI_gui_action_button_2_issue_9_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利势力圈§!将获得：\n  生活消费品需求：§G-1%§!"
 BFI_gui_action_button_3_issue_9_USA_tt:0 "目前在意大利势力范围内，美国的投资额尚处于较低水平，主要集中于意大利本土大都市的北部和中部工业区。在意大利其他地区或其殖民地的投资仍然滞后。"
 BFI_gui_action_button_3_issue_9_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利势力圈§!将获得：\n  生活消费品需求：§G-3%§!\n§M美国§!将获得：\n  杂项收入：§G+100§!§YM美元§!"
 BFI_gui_action_button_4_issue_9_USA_tt:0 "意大利本土的所有地区目前都在持续接收美国的稳健投资，其中大部分源自美国金融与工业巨头的慷慨解囊。相较之下，对意大利的殖民地投资却仍然寥寥无几，皆因风险较高而令人望而却步。"
 BFI_gui_action_button_4_issue_9_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利势力圈§!将获得：\n  生活消费品需求：§G-5%§!\n  每月工业设备：§G+0.5§!\n§M美国§!将获得：\n  杂项收入：§G+200§!§YM美元§!"
 BFI_gui_action_button_5_issue_9_USA_tt:0 "美国资本正悄然流入意大利的殖民地，特别是农业领域的投资，正收获着累累硕果。尽管如此，对意大利本土的投资仍然有待提升。"
 BFI_gui_action_button_5_issue_9_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利势力圈§!将获得：\n  生活消费品需求：§G-5%§!\n  每月工业设备：§G+0.5§!\n  GDP增长：§G+2%§!\n§M美国§!将获得：\n  杂项收入：§G+200§!§YM美元§!\n  每月工业设备：§G+0.5§!"
 BFI_gui_action_button_6_issue_9_USA_tt:0 "在意大利势力圈内，美国的投资如泉涌般涌现，创下新高。意大利已成为美国商界竞争最激烈的市场之一，而美国商科的学子们，也纷纷将意大利语作为他们的第二专业，以期在竞争中占得先机。"
 BFI_gui_action_button_6_issue_9_USA_delayed_tt:0 "如果§G意大利§!加入§BOFN§!，§G意大利势力圈§!将获得：\n  生活消费品需求：§G-5%§!\n  每月工业设备：§G+1§!\n  每月农业技术：§G+0.5§!\n  GDP增长：§G+2%§!\n§M美国§!将获得：\n  杂项收入：§G+200§!§YM美元§!\n  每月工业设备：§G+1§!\n  每月农业技术：§G+0.5§!\n  GDP增长：§G+1%§!"
 BFI_gui_action_button_1_issue_9_JAP_tt:0 "意大利对日本投资的渴求显而易见，然而对日本而言，此类投资的利益却如雾里看花。目前，日本尚无将其资金投向意大利企业的必要，这些企业能否盈利尚属未知。财阀们更应着眼于日本产业的壮大与精炼，而非将资金轻掷于那些名不副实的友邦之上。"
 BFI_gui_action_button_1_issue_9_JAP_delayed_tt:0 ""
 BFI_gui_action_button_2_issue_9_JAP_tt:0 "我们并不打算轻率地一头扎进意大利经济的漩涡，但探究双方经济合作的潜力无疑对我们来说有利可图。财阀将派遣使者前往意大利，以洞察可能令日本帝国心动的商机。我们将小试牛刀，对意大利及其殖民地进行小额投资，同时保持戒备之心。至于是否加大投资力度，那便要看这是否能够带来实质性的好处了。"
 BFI_gui_action_button_2_issue_9_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  生活消费品需求：§G-1%§!\n"
 BFI_gui_action_button_3_issue_9_JAP_tt:0 "我们目前还不适合考虑那些大胆且风险重重的经济行动，但我们可以通过更简单的方式投资意大利经济。我们可以通过购入意大利企业和集团的股份，既为那些渴求资金的企业雪中送炭，又能让众多意大利的领军企业迎来日本股东，若选股精准，我们更有望从中获得丰厚的回报。这无疑是日本在意大利经济版图上迈出的审慎而明智的一步。"
 BFI_gui_action_button_3_issue_9_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  生活消费品需求：§G-2%§!\n  建造速度：§G+5%§!\n"
 BFI_gui_action_button_4_issue_9_JAP_tt:0 "为拓展对意大利帝国的经济投资，我们应以稳健的特许经营策略，将日本商界延伸至意大利本土及其影响范围内的国家和殖民地。这些新兴的特许经营将助力那些昔日仅在东京露头角的企业，跨越国界，赢得国际声誉，成为全球知名企业。这不仅将为日本带来经济收益，更是日本荣耀与文化精粹的象征。"
 BFI_gui_action_button_4_issue_9_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  生活消费品需求：§G-3%§!\n  建造速度：§G+5%§!\n§Y日本§!将获得：\n  杂项收入：§G+100§!§YM美元§!\n"
 BFI_gui_action_button_5_issue_9_JAP_tt:0 "财阀在意大利的扩张已经引起了当地居民的瞩目。财阀虽根植于日本，但现在是时候考虑扩大他们的影响力了。未来，我们应当激励财阀家族去收购意大利、非洲和中东的本土子公司，将它们纳入财阀的版图。只有这样，财阀才能够真正地像他们在日本所做的那样，带给意大利帝国繁荣。"
 BFI_gui_action_button_5_issue_9_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  生活消费品需求：§G-4%§!\n  建造速度：§G+5%§!\n§Y日本§!将获得：\n  杂项收入：§G+200§!§YM美元§!\n"
 BFI_gui_action_button_6_issue_9_JAP_tt:0 "我们已经在意大利投入了大量的精力和资金，因此务必要确保这些付出能够开花结果，经济融合亦能水到渠成。有鉴于此，我们向意大利提出了一项直接的提议：组建意日经济事务委员会。该机构将担纲监管之责，负责监管和跟踪我们在意大利的投资和利益，确保这些投资对双方都有利可图。"
 BFI_gui_action_button_6_issue_9_JAP_delayed_tt:0 "如果§G意大利§!加入§Y共荣圈§!，§G意大利§!将获得：\n  生活消费品需求：§G-5%§!\n  建造速度：§G+5%§!\n§Y日本§!将获得：\n  杂项收入：§G+200§!§YM美元§!\n"
 BFI_gui_action_button_2_issue_10_ITA_tt:0 "如今，美国与日本将意大利视作解决德国带来的众多难题之中的一种解法——至多，我们不过是德国企图全面控制欧洲大陆的一个绊脚石。然而，近期谈判的融冰或许能为我们打开一扇门，让我们得以更有的放矢地推进合作，共同抵御我们面临的共同威胁：德国。"
 BFI_gui_action_button_2_issue_10_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  加密：§G+5%§!\n  计划加成上限：§R-4%§!"
 BFI_gui_action_button_3_issue_10_ITA_tt:0 "我们军事战略家们的喜悦之情溢于言表，因为深化军事合作的官方对话终于开启。这些尚在萌芽状态的计划，却已勾勒出一幅宏伟的图景——意大利不仅是国际防御策略的关键棋子，更是力量投射的坚强柱石，是我们誓死捍卫的疆土！时间将告诉我们是否有动力将这些计划付诸实施，但目前看来，我国有望最终发展出一套统一的战略来应对所有可能攻击我们的潜在敌人，未来可期。"
 BFI_gui_action_button_3_issue_10_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  计划速度：§G+3%§!"
 BFI_gui_action_button_4_issue_10_ITA_tt:0 "意大利，这个地中海的明珠，虽面积不大，却在美日针对欧洲各大国的战争计划中扮演着日益吃重的角色。如今，意大利首相[ITA.GetLeader]的案头，现在已设立了直通东京和华盛顿的热线电话，这在往昔是不曾有的，曾经的设想如今已成为现实。"
 BFI_gui_action_button_4_issue_10_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  加密：§R-5%§!\n  计划加成上限：§G+4%§!\n  计划速度：§G+6%§!"
 BFI_gui_action_button_5_issue_10_ITA_tt:0 "意大利已站在东西方的交汇点上，虽不以盟友之名，却已经扮演着制衡德国威胁的关键角色。曾经只是对抗德国的一枚备选战略棋子的意大利，现已成为了一个在可能发生的与欧洲大国的潜在冲突中友好且合作的伙伴；而我们似乎已经开始迈向不仅是伙伴，更是盟友的道路。"
 BFI_gui_action_button_5_issue_10_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  加密：§R-10%§!\n  计划加成上限：§G+8%§!\n  计划速度：§G+9%§!"
 BFI_gui_action_button_6_issue_10_ITA_tt:0 "我们不是作为德国的绊脚石或受控的棋子加入美国或日本的行列，而是作为盟友与其并肩作战。我们乃自由欧洲的坚实屏障，我们的国土不容侵犯，任何觊觎我意大利正当领土之举，必将招致盟友们的雷霆反击。我们的将领们同室共谋，我们的军队众志成城，共同抵御一切图谋破坏我们牢不可破联盟的势力。意大利将巍然屹立下去，以东西方之坚实支柱为我们的坚强核心。"
 BFI_gui_action_button_6_issue_10_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  加密：§R-15%§!\n  计划加成上限：§G+12%§!\n  计划速度：§G+12%§!"
 BFI_gui_action_button_1_issue_10_USA_tt:0 "眼前，美国与意大利互相拥有德国带来的一块心病。往坏处想，两国不过是对方在抵御坦克和潜艇浪潮时的权宜之计。然而，目前关于两国关系的讨论，往往只聚焦于如何利用一方来对抗德国，却忽略了双方如何在共同的目标上携手并进这一点，这不是长远之计。"
 BFI_gui_action_button_1_issue_10_USA_delayed_tt:0 ""
 BFI_gui_action_button_2_issue_10_USA_tt:0 "如今，美意两国国防机构间深化联系的深入探讨，仍仅见于小组委员会的听证会和智库的论文里。相较于昔日政府对此议题的漠视，现状虽有所改观，但距离真正能影响大西洋两岸的外交政策到来，仍然道阻且长。"
