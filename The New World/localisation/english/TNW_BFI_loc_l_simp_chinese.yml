 BFI_explanation_tooltip:0 "[BFI_explanation_sl_tooltip]"
 BFI_explanation_JAP_tooltip:0 "§G意大利§!式民主是个很恐怖的东西。曾经的§r法西斯§!领导层好心办坏事，于是被§G意大利§!人民过于鲁莽地抛弃，他们头也不回，转而拥抱西式自由民主。然而，如果§G意大利§!人准备就此单打独斗，这场愚蠢的民主实验将注定§e困难重重§!。§G意大利§!需要紧紧握住她的老盟友——§R大日本帝国§!所伸出的手，只有日本人才知道什么对意大利来说才是最好的。\n\n§w争夺意大利之战§!的机制和拍卖类似，§G意大利§!会在各个领域相继提出他希望与美日两个超级大国合作的议题，议题将包含跨洋旅游业，农产品出口，甚至间谍活动等等。§R我方§!和§M美国人§!将轮流赌上政治点数以和§G意大利§!签订有利于己方的条款。如果我们能够持续向意方提供足够大量的投资，我们甚至可以最终推动§G意大利§!正式加入§R共荣圈§!。这将让我们得到一个强大的军事盟友，同时使富饶的§w中东石油§!牢牢掌握在我们的手中。更重要的是，还能狠狠恶心§M美国人§!，掐断他们的境外石油输入。根据§G意大利§!所选择的议题不同以及我们的投资多少，§G意大利§!加入§R共荣圈§!后的相应增益也会不同。\n\n当然，我们也可以在这场小小拍卖中另辟蹊径、兴风作浪。只需少量的政治点数投资，外务省的外交专家团队就能把§G意大利人§!拉向我们这边。比如说，我们可以诽谤§M美国§!制造业，从而让§G意大利§!在远离OFN的同时更加靠近§R共荣圈§!。当然，§M美国人§!也有可能在暗地里搞这些小把戏，在把§G意大利§!人拉向我们这边的同时，也要尽量明智地选择花销。"
 BFI_explanation_USA_tooltip:0 "§G意大利§!式民主无疑是美丽的瑰宝。在多年的§r法西斯§!压迫与低效管理之下，§G意大利§!人民奋起挣脱了墨索里尼的锁链，并拥抱民主。然而，如今的§G意大利§!只是一个新生的民主国家，如果他们准备单打独斗，未来将注定§e困难重重§!。§G意大利§!需要紧紧握住这支来自已有两世纪的自由民主实践经验的老前辈所伸出的手——这个老前辈名为§M山姆大叔§!。\n\n§w争夺意大利之战§!的机制和拍卖类似，§G意大利§!会在各个领域相继提出他希望与美日两个超级大国合作的议题，议题将包含跨洋旅游业，农产品出口，甚至间谍活动等等。§M我方§!和§R日本人§!将轮流赌上政治点数以和§G意大利§!签订有利于己方的条款。如果我们能够持续向意方提供足够大量的投资，我们甚至可以最终推动§G意大利§!正式加入§MOFN§!。这将让我们得到一个强大的军事盟友，同时使富饶的§w中东石油§!牢牢掌握在我们的手中。更重要的是，还能狠狠恶心§R日本人§!，掐断他们的境外石油输入。根据§G意大利§!所选择的议题不同以及我们的投资多少，§G意大利§!加入§MOFN§!后的相应增益也会不同。\n\n当然，我们也可以在这场小小拍卖中另辟蹊径、兴风作浪。只需少量的政治点数投资，美国新闻署的外交专家团队就能把§G意大利人§!拉向我们这边。比如说，我们可以诽谤§R日本§!制造业，从而让§G意大利§!在远离共荣圈的同时更加靠近§MOFN§!。当然，§R日本人§!也有可能在暗地里搞这些小把戏，在把§G意大利§!人拉向我们这边的同时，也要尽量明智地选择花销。"
