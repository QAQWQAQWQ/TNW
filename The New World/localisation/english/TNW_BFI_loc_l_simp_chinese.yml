 BFI_gui_action_button_4_issue_14_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  每日陆军经验：§G+0.03§!\n  每日海军经验：§G+0.03§!\n  每日空军经验：§G+0.03§!"
