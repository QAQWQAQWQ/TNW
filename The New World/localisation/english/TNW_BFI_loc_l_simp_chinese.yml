 BFI_gui_action_button_3_issue_2_ITA_tt:0 "自此刻起，我们将采取更加温和的政策以对待国际出口事务，与世界各地的繁荣企业携手，以期在意大利市场倾销奢侈品，激发市场活力，共谋利润丰厚之良机。众多国际企业对承担国际贸易的高成本表现出极大的兴趣，并愿意让我们分享他们的利润。"
 BFI_gui_action_button_3_issue_2_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将§R维持现状§!。"
 BFI_gui_action_button_4_issue_2_ITA_tt:0 "意大利的商品在海外市场备受青睐，我们的商业代表和经济专家已表现出向欧洲和地中海以外地区市场拓展的强烈愿望。我们将以谨慎乐观的态度顺应这一潮流，积极推动与全球各地的贸易平衡，同时不忘满足我们国内市场的需求。"
 BFI_gui_action_button_4_issue_2_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  出口资源：§R+5%§!\n  每月工业设备：§G+0.5§!\n  每月工业专业知识：§G+0.5§!"
 BFI_gui_action_button_5_issue_2_ITA_tt:0 "Perhaps the economic woes of the 1950s are behind us. Perhaps, with aid from international powers and our own pool of savvy entrepreneurs and tradesmen, Italy can finally reclaim its ancient role as a center of global trade and prosperity. Through the Suez, a new lifeblood will spring forth, connecting Rome to an increasingly global world, and exporting Italy's finest products to distant shores."
 BFI_gui_action_button_5_issue_2_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  出口资源：§R+10%§!\n  每月工业设备：§G+1§!\n  每月工业专业知识：§G+1§!"
 BFI_gui_action_button_6_issue_2_ITA_tt:0 "我们别无选择，意大利的经济迫切需要与世界上的经济强国紧密相连。通过向有前途的企业家提供补贴，并运用我们对意大利经济的掌控，我们将推动我们的经济领域向东京和华盛顿等更有利可图的市场进军。意大利品牌将代表着卓越品质，随着我们全面投入第三产业的怀抱，意大利的繁荣必将随之水涨船高。"
 BFI_gui_action_button_6_issue_2_ITA_delayed_tt:0 "如果§G意大利§!保持独立，§G意大利§!将获得：\n  出口资源：§R+15%§!\n  每月工业设备：§G+2§!\n  每月工业专业知识：§G+2§!"
