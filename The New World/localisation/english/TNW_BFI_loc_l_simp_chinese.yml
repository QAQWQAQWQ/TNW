 BFI_gui_action_button_3_issue_10_USA_tt:0 "随着罗马与华盛顿之间的沟通意愿日益提高，双方领导人——美国总统[USA.GetLeader]与意大利首相[ITA.GetLeader]——已携手决定，为高层外交往来铺设更迅捷的通信桥梁。昔日二战后沉睡海底多年未被充分利用的、长达数百英里的海底电缆，如今重焕生机，成为了连接白宫与基吉宫的直接电报线。"
