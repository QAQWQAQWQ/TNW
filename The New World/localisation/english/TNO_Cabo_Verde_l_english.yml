 #Events
 CPV_POR.1.t: "Emergency Report on Colonial Holdings"
 CPV_POR.1.d: "Cabo Verde is not doing well. Unrest in the native population will soon lead to a collapse of the Portuguese administration that still clings to the region. You can prevent it by winning the war quickly."
 CPV_POR.1.a: "Oh no...anyway"

 CPV_POR.2.t: "Collapse of Portuguese Cabo Verde"
 CPV_POR.2.d: "Time has expired. The remmants of the Portuguese administration have stepped down. In their place, equally Portuguese-loving natives have been brought to power. Hurry up and win the war before anyone makes things worse."
 CPV_POR.2.a: "Better them than the socialists"

 CPV_POR.3.t: "Cabo Verde Returns Home"
 CPV_POR.3.d: "With the Civil War over, the lifeline between Cabo Verde and Lisbon has been reopened. The colony is back under our control, though we'll keep it more autonomous than before."
 CPV_POR.3.a: "Hooray"

 CPV_POR.4.t: "Cabo Verde Returns Home"
 CPV_POR.4.d: "With the Civil War over, the lifeline between Cabo Verde and Lisbon has been reopened. The native-run regime has aligned itself with us."
 CPV_POR.4.a: "Hooray"

