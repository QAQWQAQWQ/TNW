l_simp_chinese:
 POLITICS_A_D_PATEL_DESC: "与许多印度裔斐济同胞一样，A·D·帕特尔并非土生土长的斐济人，但终其一生，他都致力于为所有斐济公民建设更为美好的祖国。帕特尔出生于印度古吉拉特邦，年轻时全家移民斐济。在印度接受教育期间，他受到了国大党改革派领袖尼赫鲁和甘地的启发。满怀激情与理想地回到斐济后，帕特尔选择从政，组织被边缘化的印裔斐济人反抗白人和原住民的压迫。二战结束后，蔗糖种植园经济难以为继，国内各民族间的关系也日趋紧张。此时的帕特尔已不只要求实现独立，还要求进行大规模的社会政治改革。\n\n尽管美国媒体经常将帕特尔称为“斐济的乔治·华盛顿”，但事实证明，那次针对他的未遂刺杀对赢得OFN的支持至关重要。OFN同意斐济在总统共和制下独立，将帕特尔推上了权力巅峰，担任斐济的第一任总统。帕特尔是个矛盾的人，他试图迅速进行社会改革，但这却践踏了本就对他充满敌意的原住民的传统特权；而对其党内腐败的指控，又使他的印裔斐济人选民陷入分裂。"
 FIJ_A_D_Patel: "A·D·帕特尔"
 FIJ_divided_islands: "分裂的群岛"
 FIJ_divided_islands_desc: "殖民时期，英国向斐济输送了大量南亚契约劳工，以维持岛上众多甘蔗种植园的运作。如今，这些劳工的后代占据了全岛人口的多数，却依然在恶劣的环境中生活，在政治上的地位也远不及本地人。与此同时，本地人也不满于新共和国雄心勃勃、旨在消除过去歧视的改革，认为这会损害他们既有的特权。"
 FIJ_the_pacific_vanguard: "太平洋前卫"
 FIJ_the_pacific_vanguard_desc: "作为OFN在太平洋最大的前沿岛屿基地，加之与日本领土间咫尺之遥的距离，斐济被改造为了一座堡垒，不仅拥有数个军事基地，且全天候受到空中和海上的双重保护。即便如此，日本的虎视眈眈和日本渔民的偶尔侵入仍使民众寝食难安。"
 FIJ_economic_doldrums: "经济低迷"
 FIJ_economic_doldrums_desc: "五十年代，伴随着大英帝国的解体、自由世界的萎缩以及对非自由世界贸易的崩溃，斐济一度繁荣的蔗糖种植园经济陷入低谷，引发了强烈的社会动荡。OFN资本的投资和来自军事基地的“士兵美元”给市场注入了新的活力，勉强稳住了国内经济。然而，斐济却迟迟未在风云变幻的世界中找到自己的独特定位。由于经济停滞不前，国家的未来仍不甚明朗。"
