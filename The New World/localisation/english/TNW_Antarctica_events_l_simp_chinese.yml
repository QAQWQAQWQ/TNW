 antarctica_aag_alert_event.10.t:0 "边疆"
 antarctica_aag_alert_event.10.desc:0 "最后一阵枪响回荡在山谷中，万籁俱寂。赫伯特·弗赖塔格的膝盖酸痛得很，他挣扎着从掩体中站起来，将望远镜伸到跟前，沿着山谷能看到美国士兵乘坐雪地摩托和牵引车撤退的画面。他检查了下自己的小队，两位士兵阵亡，其余人也或多或少受了伤，而且大家也没有弹药了。\n\n弗赖塔格不明白他的上级在想什么：他们不愿意为他那毗邻OFN南极洲事务局属地的哨所提供足够的重武器，这让他们不可能守住这个据点，抵挡住这次进攻已经算是奇迹，下一次，他的人马恐怕不会那么幸运了。\n\n弗赖塔格找到了附近营地里的无线电操作员：“我需要你把这段讯息传达给迈尔”，他说：“美国军队在边境发起了一次试探性进攻，我们亟需重武器班组支援，我们快守不住了。”\n\n弗赖塔格希望迈尔能注意到求援，他看起来像是个聪明人，而现在，他仅存的希望就是盯紧边界，祈祷美国人不要回来了。\n\n——席尔马赫站内，精疲力竭的迈尔收到了一封边界传来的急讯，从温暖的被窝中猛地坐起来，他读着信叹息道：“他们又来了？”\n\n安东·格拉塞尔沉重地点了点头：“看来这帮混账也注意到我们的巡逻频率降低了。告诉他们我们还没冻死，至少现在还没有！”"
 antarctica_aag_alert_event.10.a:0 "“同意，”迈尔答道，“把预备单位调到前线。”"
 antarctica_aag_alert_event.11.t:0 "加拿大工程学"
 antarctica_aag_alert_event.11.desc:0 "弗赖塔格把雪地牵引车的马力推到了极限，这样做可能耗尽燃料，但他必须马上带它回到席尔马赫站。他有新讯息要传达，也有责任让少数活下来的人回到安全的地方。\n\n后视镜里，他看到边防哨所残骸上升起的硝烟，还有十几组耀眼的车头灯在闪烁。OFN的人马借着夜色掩护发起了一次突袭，要干爆他们这帮轻装的边境守卫真是太容易了，在加拿大人的雪地履带车面前，弗赖塔格与他手下那点轻火力都不够他们玩的。他们正如同疯牛犁地般冲破脆弱的工事，粉碎着沿途的一切。\n\n新施瓦本的武器供应和整体作战能力已经严重恶化，弗赖塔格知道OFN将在一个星期内兵临席尔马赫站。他们只剩下七天时间销毁所有不宜被缴获的物资资料，从南极大陆这个屎坑撤离。\n\n他祈祷自己的引擎还能支撑下去，也祈祷迈尔对这一非常事态有所准备。"
 antarctica_aag_alert_event.11.a:0 "没有步枪的士兵称不上是军队。"
 antarctica_aag_alert_event.20.t:0 "合法性"
 antarctica_aag_alert_event.20.desc:0 "收信人：德国极地研究学会\n\n寄信人：恩斯特·赫尔曼\n\n标题：阿根廷与智利的领土侵犯\n\n最近几周以来，我们留意到越来越多的阿根廷与智利船只与飞机穿越我们的领海与空域，这些载具拒绝按照命令调整他们的航线，在阿勃维尔的授意下，我们没有向他们开火。侦察资料表明，这些越境载具装备简陋，以最直接的路线前往目的地，似乎只是为了越境行方便而不是某种军事企图。\n\n然而，这种对我国领土的公然侵犯，威胁到了我们在南极领地的完整与合法性，使我们暴露于日美的攻击之下，如秃鹫般意识到了我们没有采取必要行动的原因所在。我正式请求极地研究学会能够宣传、巩固日耳曼尼亚在新施瓦本的统治权威。如果我们再不对类似威胁做出反应，势必会威胁到大日耳曼国对南极宣称的合法性，若事已至此，我们将无力保护殖民地与研究设施被对手瓜分。\n\n胜利万岁！"
 antarctica_aag_alert_event.20.a:0 "附：如果可以的话，多来几仓烈酒，帮我们提振士气。"
 antarctica_aag_alert_event.21.t:0 "分崩离析"
 antarctica_aag_alert_event.21.desc:0 "收信人：恩斯特·赫尔曼\n\n寄信人：德国极地研究学会\n\n标题：外国势力入侵新施瓦本\n\n我们已经收到了您的信件，对此我们高度重视，立即派遣了外交人员与阿根廷和智利方面谈及了两国对我国领土公然入侵的行径。他们完全否认这个事实，还公开羞辱说这是大日耳曼国诋毁其在南极的竞争对手的手段。这种谴责也令我们感到意外，毕竟阿根廷与智利至少明面上与大日耳曼国保持友好。\n\n另外我们有个坏消息：在阿德瓦尔的接触下，我们发现智利人与阿根廷人的所谓无害行动，实际上是瓜分新施瓦本计划的一环，无论是OFN南极洲事务局，还是某些情报显示下的日本当局，都协商了一份计划来瓜分我们的领土，抢走我们的研究资料和敏感文件。智利人和阿根廷人也愿意参与这一冒险，足以证明我们在南极洲的合法性已经下降到何种地步。为此我们建议，立即撤出殖民地，摧毁一切可能被敌人利用对付我们的东西。话不必说，点到为止，德意志祖国不会为了一块破冰发动世界大战，何况是在国内局势不断恶化的前提下。\n\n胜利万岁！"
 antarctica_aag_alert_event.21.a:0 "附：千万别回德国本土，让席尔马赫动用下他在南非的人脉，到加勒比安顿。记得给我们寄点酒来。"
 antarctica_aag_alert_event.30.t:0 "配给制度"
 antarctica_aag_alert_event.30.desc:0 "军需官伊莱亚斯·鲍曼走进办公室，向迈尔行礼。“不必多礼”，迈尔说：“来，请坐吧。”\n\n鲍曼硕大的身躯挤在了迈尔面前的木椅上，陈旧的橡木扶手似乎已经装不下他了。迈尔划了支烟，凝望着它发光的烟头，开始与军需官攀谈：“我听好几个部门抱怨了食物、燃料和军需物资的供给问题，现有配给恐怕不足以维持基本所需了。”他瞥了一眼鲍曼。\n\n军需官叹气道：“我向各部门负责人解释过了，海军的补给物资变得越来越零星，我们不该觉得自己有无限的资源，尤其是舒曼的要求也越来越夸张了，我担心再这么下去大家都不会好受。”\n\n迈尔一口口地闷着香烟：“目前的缺口是多少，你有什么建议？”\n\n“本季度的食物消耗已远超预定水平，燃料状况也很糟糕。如果我们不马上执行全面的配给制度，在下一轮海军补给抵达之前，大家都会挨饿，试验飞机也会趴窝。我建议将每人的配给量降低到平常的四分之三，停止一切不必要的车辆滥用，在补给水平恢复之前，减少边境巡逻的力度。”\n\n迈尔皱起了眉头：“这对我们的士气和实验不利，两者是我们在南极活下来的根基，日耳曼尼亚也不会接受我们的失败。假如这样的状况再度发生，我们恐怕会被召回，届时我得提醒你，我们中的某些人恐怕都得被流放。鉴于国内局势动荡，回去怕是死路一条。”\n\n“我会记着的，阁下，我建议我们立即打开紧急补给仓库。”"
 antarctica_aag_alert_event.30.a:0 "“做你该做的事吧，鲍曼。”"
 antarctica_aag_alert_event.31.t:0 "最后的发电机"
 antarctica_aag_alert_event.31.desc:0 "坐在最后一台还能开动的发电机前，迈尔啜饮着他珍藏的最后一瓶威士忌。他曾努力在武装守卫的帮助下保护基地的剩余物资，在下一批补给物资抵达前保持科考站的照明，但他的努力失败了。工作人员的资源管理不善，使席尔马赫站与新施瓦本的存在可行性受到了威胁。\n\n迈尔听说OFN已经接管了边境上空出来的哨所，天杀的祖先遗产学会还在对他们能看到一切靠太近的德国士兵开火。因此，迈尔做出了一个难以置信的决定，从南极撤离。所有可能用以资敌的物资都会被销毁，其余人犹如沙丁鱼般挤在施佩伯爵港为数不多的几艘漏水的海军舰只上。他们准备回家了，却不是乘胜而归。迈尔明白他和他的指挥部必须逃到德国统治范围之外的地方，以免归国接受军事法庭审判。\n\n发电机发出一阵隆隆的轰鸣，彻底失去了动力，与新施瓦本的希望一样，沉睡在冰封而无情的南极冻土里。"
 antarctica_aag_alert_event.31.a:0 "“带不走的统统烧掉，”迈尔喊道，“我们要离开这座冰山了。”"
