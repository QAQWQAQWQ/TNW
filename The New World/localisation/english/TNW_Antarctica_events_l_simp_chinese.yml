 antarctica_news_events.1.t:0 "[Get_newspaper_header]非洲之盾向新施瓦本提供援助"
 antarctica_news_events.1.desc:0 "国际社会获悉，遥远的南半球发生了一场奇迹般的跨洋救援，施援者的身份也令人震撼。德国内战爆发后，长期以来，德国的南极洲属地新施瓦本一直被怀疑面临一场慢性的后勤短缺，但最近的报告显示，与世隔绝的“监狱之国”东非专员辖区决定介入援助这个陷入困境的前哨站。\n\n虽然新施瓦本和东非专员辖区透露的信息不多，美国、智利与阿根廷空军在南极地区的进一步部署表明，南极洲依然是世界主要国家争夺的焦点。随着德国内战接近尾声，谁也不知道大日耳曼国的新元首将如何重建对极南之地的控制。"
 antarctica_news_events.1.a:0 "大日耳曼国最遥远的殖民地被保住了吗？"
 antarctica_news_events.2.t:0 "[Get_newspaper_header]阿根廷向新施瓦本提供援助"
 antarctica_news_events.2.desc:0 "德属南极的落难者们迎来了最不可能的支援，今晨早些时候，魅力非凡的阿根廷南极当局领导人豪尔赫·埃德加·莱亚尔递交了紧急申请，希望为他的德国邻居提供帮助。\n\n由于德国本土最近爆发了内乱，他们从克利马内出发的补给线被迫中断，尽管过去他们发生过边境冲突，莱亚尔依然无私地帮助了新施瓦本。对此，鲁道夫·迈尔表达了他的感激，称他“永远亏欠阿根廷人民一份情”。\n\n此事之后，阿根廷受到了OFN的谴责，但得到了团结协定的赞扬。共荣圈尚未就此发表评论，但驻扎在南极的第一空挺团最近在阿根廷领地上空的行动异常活跃。"
 antarctica_news_events.2.a:0 "仁慈的姿态。"
 antarctica_news_events.3.t:0 "[Get_newspaper_header]OFN向新施瓦本提供援助"
 antarctica_news_events.3.desc:0 "冷战最为冷酷的前线传来令人震惊的消息，OFN南极洲事务局已经批准向德属南极地区运送紧急物资。早在德国本土发生动乱之前，新施瓦本就已经经历了补给短缺的窘境，近期的动荡更是迫使他们从其他地方寻求援助。\n\n被问及此事时，美国海军中将威廉·雷伯恩如是说道：“在其他场合碰见他们，我们准会叫他们见鬼去，但在这里，情况有所不同。无论你来自何方，冰雪之下人人平等。”\n\n虽然雷伯恩中将的决定使他饱受抨击，但他坚持自己的选择，凭借辉煌的职业生涯，他不太可能因为这种小事被撤职。"
 antarctica_news_events.3.a:0 "仁慈的姿态。"
 antarctica_news_events.4.t:0 "[Get_newspaper_header]新施瓦本崩溃"
 antarctica_news_events.4.desc:0 "一支中情局SOG精锐小队突袭了新施瓦本，德军全无战斗意志，未经多少抵抗就投降了。据报告称，现场甚至没有发生交火。德国将军安东·格拉塞尔试图冲向身边的一位军官并抢夺其手枪，差点导致两方爆发冲突，但他很快就被控制住，与其他高价值目标一道被监禁。除此以外，南极洲现存的党卫队部队在新施瓦本西部占据了一小块地盘。\n\nOFN南极洲事务局就吞并一事发表声明，宣称其是维护和平的必要之举，但还是有批评者称其为赤裸裸扩大自身影响力的举动。海军中将威廉·雷伯恩向里普的部队表示祝贺，并表示“欣慰于其未经交火就控制住了局势”。"
 antarctica_news_events.4.a:0 "对此，党卫队不予置评。"
 antarctica_news_events.5.t:0 "[Get_newspaper_header]南极探险家阿尔弗雷德·里彻去世"
 antarctica_news_events.5.desc:0 "德国的政治泥潭中传来了些许消息，现年八十三岁的探险家阿尔弗雷德·里彻去世了。他死在了德国最混乱的时刻，虽然卡尔·邓尼茨为他举行了一次小小的葬礼，但他终究未能收获更多的荣光。\n\n作为德国战争海军上校，他领导了三十年代德国的第三次南极探险，为瓜分南极期间德国对新施瓦本的宣称权打下了根基。作为他们各自国家首次进入南极的远征军领袖，里彻与美国海军上将理查德·伊夫林·伯德素有芥蒂。自探险以后，里彻终身担任德国极地研究学会主席。现在，他的职务被转移给另一位经历过第三次南极探险的老兵，卡尔-海因茨·勒布克，一位坚定的保守派纳粹党人。"
 antarctica_news_events.5.a:0 "一个时代的巨人陨落了，却后继无人。"
 antarctica_news_events.6.t:0 "[Get_newspaper_header]德国重返南极洲"
 antarctica_news_events.6.desc:0 "内战结束后，德国海军决心重返新施瓦本，以举国之力巩固他们对南极的宣称。出人意料的是，他们发现在内战开始时被遗弃在当地的士兵与科学家依然存活，至少活下来了一部分。在德国本土陷于战火之时，他们坚定地守护了祖国的领土，抵御了外来势力的侵犯。救援恰在落难者们的补给和储备几近见底之时到来，与日益暗淡的未来相比，这场重逢点燃了耀眼的喜悦之火。\n\n如今，日耳曼尼亚必须决定如何处理这片新生的领地。至少现在，新上任的元首有意以“拱卫祖国未来”的名义扩建这座遥远的基地，但实现这一目标的可行性还有待观察。"
 antarctica_news_events.6.a:0 "德国会怎么做？"
 antarctica_news_events.7.t:0 "[Get_newspaper_header]世界尽头的纳粹之战"
 antarctica_news_events.7.desc:0 "南方大陆传来了怪诞的消息，一位曾在德属南极殖民地新施瓦本服役的士兵向OFN军方透露，他们的殖民地总部席尔马赫站受到了党卫队的袭击！\n\n这位不愿透露姓名的德国检举人说，殖民地军队与叛变的党卫队爆发了一场冲突，虽然总部遭到了围困，他们仍幸运地将党卫队赶出了基地，整场事件造成了数十名德国人伤亡与上千马克的财产损失。\n\n许多人对袭击发生的缘由深感关切，怀疑这一切是有政治目的的谎言，内部肃清反对派的暗谋。这场袭击是东巴黎当局直接授意吗？还是祖先遗产学会南极分部的独谋？"
 antarctica_news_events.7.a:0 "他们真走运。"
 antarctica_news_events.8.t:0 "[Get_newspaper_header]新施瓦本崩溃"
 antarctica_news_events.8.desc:0 "近期，德属南极领地新施瓦本当局历经补给短缺和局势动荡后已然崩溃。自由国家组织已向该地区派驻部队，显然已经接管当地。另外，南极洲现存的党卫队部队现盘踞于新施瓦本西部的一小块土地。\n\nOFN南极洲事务局就吞并一事发表声明，宣称其是维护和平的必要之举，但还是有批评者称其为赤裸裸扩大自身影响力的举动。海军中将威廉·雷伯恩向里普的部队表示祝贺，并表示“欣慰于其未经交火就控制住了局势”。"
 antarctica_news_events.8.a:0 "对此，党卫队不予置评。"
 antarctica_news_events.9.t:0 "[Get_newspaper_header]冰雪地狱"
 antarctica_news_events.9.desc:0 "德国局势急转直下，势力范围无一幸免。悉尼先驱晨报从OFN南极洲事务局相关人士处了解到，纳粹殖民地新施瓦本已然崩溃。德占区沉寂许久后，OFN人员越境前去调查，结果在席尔马赫站发现了极为悲惨恐怖的一幕。\n\n由于德国陷入内战，补给线就此断裂，派驻人员似乎都已饿死或消逝于冰雪间。初步尸检显示，基地内坏血病横行。除此以外，还有未经证实的报告声称骸骨上存在咬痕，表明这些人有可能和许多极地探险的前辈一样沦为了食人族。"
 antarctica_news_events.9.a:0 "德国历史平添一个乱葬岗。"
 antarctica_news_events.11.t:0 "[Get_newspaper_header]意大利从阿根廷手中租借加林德斯岛"
 antarctica_news_events.11.desc:0 "根据今天早些时候从罗马传来的消息，意大利和阿根廷政府已经同意将加林德斯岛租借给意大利，为期十年。这一南极岛屿于斯尼佩岛之战期间被阿根廷占领，目前鲜有国家承认其对该地的主权宣称。智利政府拒绝对此发表评论，但有报道称该国正针对此事进行外交行动。无论协议合法与否，意大利政府已经计划在本月之内于该岛设立民事研究基地。声明中没有任何词句提及加林德斯岛是否会被军事化，但鉴于罗马方面支持阿根廷在南极洲的冒险活动，以及各个南极领地当局极高的军事化程度，毫无疑问，不久之后，意大利海军就将出现在南极。\n\n随着此协议正式生效，意大利和阿根廷在南极问题上的同盟关系得到了巩固。\n"
 antarctica_news_events.11.a:0 "白色大陆的权力天平倾斜了。"
 antarctica_news_events.11.b:0 "太棒了，又来一个“新朋友”。"
 antarctica_news_events.11.c:0 "冷战变得愈加寒冷。"
 antarctica_news_events.12.a:0 "嘿！那是我们的地盘！"
 antarctica_news_events.12.b:0 "这将利于我们在南极的权益。"
 antarctica_news_events.12.c:0 "看样子南乔治亚的开放季到了。"
 antarctica_news_events.12.d:0 "极寒大陆的形势不断升温……"
 antarctica_news_events.13.t:0 "[Get_newspaper_header]南非在南极建立基地"
 antarctica_news_events.13.desc:0 "在熬过了自第二次世界大战结束以来最惨烈的战争之后，随着南非国家南极计划的提出，南非重新登上了世界舞台。正如其名，南非将立即开始第一次南极探险。作为考察计划的一部分，一个同名的永久性基地将会建立起来。此基地将建于霍姆湾沿岸，位于澳大利亚的莫森站附近。此外，南非将开始承担南极的一部分防务工作，作为回报，南非政府将在OFN南极洲事务局内获得发言权。虽然华盛顿方面对南非的加入普遍持乐观态度，但某些人声称，这只会使OFN南极洲事务局变得更加臃肿。只有时间才能告诉我们这对OFN南极洲事务局是好是坏。"
 antarctica_news_events.13.a:0 "我们国家的伟大一天！"
 antarctica_news_events.13.b:0 "希望他们真的能为防务工作做点贡献吧……"
 antarctica_news_events.13.c:0 "希望这能让OFN的家伙们在南极更加束手束脚……"
 antarctica_news_events.13.d:0 "这下可好，OFN南极洲事务局变得更臃肿了。"
 antarctica_news_events.14.t:0 "[Get_newspaper_header]海曼·里科弗被委任为OFN南极洲事务局新任局长"
 antarctica_news_events.14.desc:0 "美国海军中将威廉·雷伯恩今天宣布，他将从OFN南极洲事务局的领导岗位上退休，同时公布了他的继任者——海军中将海曼·里科弗。在对雷伯恩的继任者所作的所有预测中，海曼·里科弗一直是最有力的竞争人选。\n\n里科弗出生在波兰的一个犹太家庭，后随家人移居美国。作为美国核动力海军之父、反应堆安全论的坚定支持者，他上任的第一件事便是对麦克默多站一个极其重要，却因事故不断而被戏称为“核便站”的核电站进行大修。看来似乎无论如何，美国对OFN南极洲事务局的控制权都得到了维护。"
 antarctica_news_events.14.a:0 "看来在地球的尽头也会一成不变。"
 antarctica_news_events.14.b:0 "当然，他是美国人。"
 antarctica_news_events.14.c:0 "我们在此的利益得以保全。"
 antarctica_news_events.15.t:0 "[Get_newspaper_header]霍华德·比尔被委任为OFN南极洲事务局新任局长"
 antarctica_news_events.15.desc:0 "美国海军中将小威廉·雷伯恩今天宣布，他将从OFN南极洲事务局的领导岗位上退休，并宣布了他的继任者：澳大利亚人霍华德·比尔。\n\n在比尔出任OFN南极洲事务局财务长期间，他监督了莫森站和戴维斯南极站的建立，还对麦克默多站内核电站的建设提供了有力的支援。分析人士认为，当他成为OFN南极洲事务局主管后，他将优先考虑基础设施建设和安保工作，以及维护澳大利亚在该大陆的利益。"
 antarctica_news_events.15.a:0 "地球尽头的一张新面孔。"
 antarctica_news_events.15.b:0 "地球尽头的小小挫折。"
 antarctica_news_events.15.c:0 "南极洲回到了真正关心她的人手中。"
 antarctica_news_events.15.d:0 "冰封大陆的光明未来！"
 antarctica_news_events.16.t:0 "[Get_newspaper_header]希拉里接过雷伯恩的衣钵"
 antarctica_news_events.16.desc:0 "美国海军中将小威廉·雷伯恩今天宣布，他将从OFN南极洲事务局的领导岗位上退休，并宣布了他的继任者——新西兰空军准将埃德蒙·希拉里爵士。在对雷伯恩的继任者所作的所有预测中，没有人预料到希拉里会继任主管之位。\n\n希拉里来自该地区最小的国家，而他也同时是一位著名探险家，是1953年第一批登顶珠穆朗玛峰的人之一。最近，他代表新西兰参加了OFN南极洲事务局。他在对他担任OFN南极洲事务局主管任期的讲话表明，与南极各方和平共处以及对科学研究、科考行动和环保问题的关注将会是他的主要目标，这让有些人担心他可能会损害OFN在该地区的地位。"
 antarctica_news_events.16.a:0 "地球尽头的一张新面孔。"
 antarctica_news_events.16.b:0 "啥，新西兰人？"
 antarctica_news_events.16.c:0 "冰封大陆的光明未来！"
 antarctica_news_events.17.t:0 "[Get_newspaper_header]阿根廷探险队到达南极点"
 antarctica_news_events.17.desc:0 "今天，冰封的南极大陆上缔造了新的历史，由豪尔赫·埃德加·莱亚尔上校率领的阿根廷探险活动“南纬90行动”成功地实现了将阿根廷国旗插上南极点的目标，其官方目的是“确认阿根廷合法领地的完整”。\n\n莱亚尔带领部下躲过吓人的暴风雪，熬过冻死人的低温，越过冰川和群山，走过漫漫三千里路到达了南极点。他们是自1912年罗阿尔·阿蒙森和斯科特的失败探险后首批涉足这里的人类。莱亚尔和部下在布宜诺斯艾利斯受到了热烈的欢迎，获得了许多荣誉。然而这一成就对南极边界争端的影响还尚不明朗。"
 antarctica_news_events.17.a:0 "阿根廷新星冉冉升起。"
 antarctica_news_events.18.t:0 "[Get_newspaper_header]阿根廷哀悼其在南极的死难者"
 antarctica_news_events.18.desc:0 "今天，布宜诺斯艾利斯为南纬90行动的探险者举行了哀悼。探险队在豪尔赫·埃德加·莱亚尔上校的带领下，出发去将阿根廷的国旗插在南极上，以进一步合法化对南极的宣称。\n\n探险者们本应在两周前回来，但至今也没有收到他们的音信。阿根廷政府不情愿地确认，探险队现在应该已经耗尽了物资，政府没有救援计划。此后，阿根廷的南极宣称地将由最近获得晋升的埃米利奥·马塞拉海军上将临时管辖。\n\n据猜测，莱亚尔和他的手下遭到了和斯科特的南极探险队一样的失败命运。饥饿和南极遗忘地的寒冷将他们整个吞噬。"
 antarctica_news_events.18.a:0 "阿根廷为一座冰封的坟墓而哀悼。"
 antarctica_news_events.20.t: "[Get_newspaper_header]南十字星行动"
 antarctica_news_events.20.desc: "从南极洲传来了突发新闻：自由国家组织宣布了一项国际行动，以对德属新施瓦本的宣称领地进行去纳粹化，由美国、澳大利亚、新西兰和加拿大组成的联合部队已开始攻击德国的南极领地。与此同时，有目击者发现，一支巴西-乌拉圭特混舰队正在向南航行，早前两国与OFN加强军事合作的消息因此得到了证实。\n\n南极洲上的各势力之间长期处于对峙状态。虽然小规模冲突并不鲜见，但这是自1958年的斯尼佩岛事件后，首次在南极洲爆发公开战斗。有人质疑为何要在这片毫无价值的荒原上抛洒鲜血，也有人认为这是非洲战火的延伸。无论真相为何，对所有战斗人员来说，在如此恶劣的环境中的任何冲突都会造成莫大的痛苦。\n"
 antarctica_news_events.20.a: "不惜一切代价，解放所有大陆。"
 antarctica_news_events.20.b: "纵使天涯海角，千年帝国永存！"
 antarctica_news_events.20.c: "根本就是在草菅人命。"
 antarctica_news_events.21.t:0 "[Get_newspaper_header]阿根廷的南极行动收获各界祝贺"
 antarctica_news_events.21.desc:0 "在南极探险队的消息传到布宜诺斯艾利斯后，阿根廷全国在今日举行了盛大的庆祝活动。富有冒险精神的军官豪尔赫·埃德加·莱亚尔自南纬90行动中归来，完成了他豪迈的南极点之旅，虽然回来的人数比他出发之前少了很多。各大国虽态度不一，有的不冷不热，有的欣喜若狂，但都不约而同地向他表示了祝贺。莱亚尔上校的壮举使得阿根廷成功地在这片兵家必争的严寒边疆中构筑了自身的合法性。\n\n虽然有很多关于遇难队员的流言四处传播，但阿根廷政府为所有参与了南纬90行动的生还者和死难者建立了纪念馆和纪念碑。莱亚尔上校称，他将会出版回忆录，其灵感来自于理查德·伊夫林·伯德所描绘的南极生活时光。"
 antarctica_news_events.21.a:0 "自然母亲已无处可藏。"
 antarctica_news_events.12.t.a:0 "[Get_newspaper_header]加拿大将南乔治亚岛移交予OFN事务局"
 antarctica_news_events.12.t.b:0 "[Get_newspaper_header]英国将南乔治亚岛移交予OFN事务局"
 antarctica_news_events.12.desc.a:0 "今晨，加拿大外交部长宣布将南乔治亚岛和南桑威奇群岛移交予OFN南极洲事务局。这些岛屿虽然无人常住，但在南极争夺战中具有重要的战略地位，将其纳入OFN领地将极大强化联盟在区域内的海军力量投射能力。\n\n此外，外长还宣布，加拿大将在南极事务中发挥更加积极的作用，包括为南极防务预算做出贡献。虽然此次移交的岛屿从未拥有大量常住人口，但在南极大规模军事化之前，当地曾是一处主要的捕鲸站点。如果有朝一日，民船能够安全往返南极，捕鲸站或许会重新回归。"
 antarctica_news_events.12.desc.b:0 "今晨，英国外交大臣宣布将南乔治亚岛和南桑威奇群岛移交予OFN南极洲事务局。这些岛屿虽然无人常住，但在南极争夺战中具有重要的战略地位，将其纳入OFN领地将极大强化联盟在区域内的海军力量投射能力。\n\n此外，外长还宣布，英国将在南极事务中发挥更加积极的作用，包括为南极防务预算做出贡献。虽然此次移交的岛屿从未拥有大量常住人口，但在南极大规模军事化之前，当地曾是一处主要的捕鲸站点。如果有朝一日，民船能够安全往返南极，捕鲸站或许会重新回归。"
 BRA_antarctica.1.t: "冰结的命运"
 BRA_antarctica.1.d: "“简而言之，我们不会遇到任何有意义的抵抗。”\n\n拉德马克海军上将和一群制服笔挺的军官一起，围在巨大的冰封大陆地图边。他们的脸和头顶的灯光一样明亮，拉德马克摩挲着自己的下巴：“我们能相信美国人吗？”\n\n“他们进行了广泛的侦察，才得出了这个结论，长官。”下级军官朝地图比了个手势，“美国人确信，德国已经放弃了这些经度之间的所有土地，一直到阿根廷的边境。”\n\n“这么说，会是一次迅速的行动。”\n\n拉德马克退出人群，走向米纳斯吉拉斯号指挥室的窗边。巴西海军引以为豪的旗舰就在他的脚下，钢铁艨艟威风凛凛。现代化的飞机在甲板上依次排开，宛如搏击海浪的猎鹰。成百上千名船员维持着这艘巨舰的生命，在海军上将的命令下于广阔的南大西洋劈波斩浪。\n\n拉德马克想着，这一定是命运的安排：德国在此时陷入了动乱，而他将率领这支一眼望不到边的庞大舰队，为巴西赢得下一场伟大的胜利，横扫南方，赢得南极领地的声誉；德国人在龙虾战争中给予巴西的侮辱，巴西定当奉还；阿根廷也会因此被逼上绝路。\n\n而且，根本不需要任何代价，巴西就能又多一场凯旋，他自己也能再多一枚勋章。拉德马克微微一笑，转过身对军官们说道：“先生们，让我们尽职尽责。”"
 BRA_antarctica.1.a: "徒劳的抵抗。"
 BRA_antarctica.2.t: "南方战场"
 BRA_antarctica.2.d: "拉德马克上将率领第一梯队的陆战队员冲进了里彻站。士兵们枪支在手，子弹上膛，对准了雪白荒原中焦黑的建筑物。\n\n唯一还没有彻底倾圮的建筑是医院，但也只剩下了四面光秃秃的墙壁和朽烂的屋顶。陆战队员用步枪戳了戳一排排病床上的尸体，发现他们的四肢已经冻得僵硬，不自然的青紫色皮肤松松垮垮地贴在骨头上，就像是破床单一样单薄。想想看，战友就这样把他们丢下来等死，一念及此，拉德马克陡然有点不寒而栗。\n\n“走好运了，”一名海军陆战队员笑着，“这儿一个活着的德国人都没有。”\n\n但伤亡还是出现了：两名陆战队员被废弃电台周围的雷区炸上了天；另一名还是个孩子年纪的陆战队员被绊线雷炸得面目全非。美国情报半对半错，虽然德国人放弃了当地唯一的主要前哨站，但并非完全不设防，而是留下了“礼物”，企图尽可能多地夺走巴西人的生命。\n\n拉德马克踩着被灰烬染黑的积雪，视察烧得焦黑的小巷。他没有料到德国人会选择把基地一把火烧个精光，这不是什么暂时的撤退，而是近乎永久的毁灭，新施瓦本的情况一定比情报报告还要要糟糕得多。上将看着部下把冻僵的德军尸体扔到医院外的尸体堆里，再将受伤的战友们抬上病床。可除了死者留下的床单，他们没有任何东西能抵御严寒。\n\n陆战队员们挤成一团取暖，极地风在拉德马克耳边低语。没有合适的栖身之所，他们要怎样活上几个星期？新补给品还要多久才能抵达？海军上将脑子里一片空白，就像身边绵延数英里的冰原一样，空洞而冰冷。虽然德国人早已逃之夭夭，但他们仍要面对另一个敌人，一个比任何士兵都更可怕、更致命的敌人……"
 BRA_antarctica.2.a: "真正的战斗才刚刚开始。"
 BRA_antarctica.3.t: "先手制胜"
 BRA_antarctica.3.d: "拉德马克上将在舱室里踱步，感受着海浪冲击航母的微微震动。行动似乎是个错误，巴西很幸运，在占领当地的过程中没遇到什么敌军，但在南极，自然和后勤才是最强大的敌人。\n\n掩护避寒的栖息地不够，资源运输也是如此。美国曾表示愿意提供帮助，但拉德马克觉得，上当受骗可一不可再。如果他接受，南极部队就会更加依赖美国，而美国会希望得到他们的保证：若是德国人卷土重来，巴西就会在新施瓦本的侧翼开辟第二战线。可鉴于如今岸上陆战队的可怜境况，海军上将怀疑他们还能再坚持多久。由于缺乏补给、士气低落，战士们只能勉强在南极的严寒气候中苟延残喘，而且冬天很快就要到了。不，他需要备用计划，撤退回国是不可能的，但或许还有其他办法。\n\n他坐回指挥桌前，翻看起南极地图：东面是德属新施瓦本的大片土地，巴西领地相比起来实属微不足道；但在西面，有更容易对付的人。阿根廷的领地设备齐全，防御薄弱，长官过于关注与智利的恩怨和奇思妙想的探险，必然无法在巴西的攻势下长时间抵抗。拉德马克笑了笑，在他看来，莱亚尔实在是天真得可笑：他居然相信，带领一支探险队抵达极点就能让世界尊重阿根廷的边界。如果真到了那个地步，名誉、荣耀，统统都无法保护他们的主张。\n\n计划在上将脑海中渐渐成形。不仅仅是出逃，而是征服性的出逃，以在最坏的情况来临时维护祖国和个人事业的声望。当下而言，拉德马克还将继续坚守阵地……"
 BRA_antarctica.3.a: "但又有谁知道，未来将会怎样呢。"
 antarctica_news_events.22.t: "[Get_newspaper_header]智利南极研究所遭军方推翻"
 antarctica_news_events.22.d: "今日，智利国歌那杂乱而刺耳的调子在南极大陆上空奏响。何塞·托里维奥·梅里诺海军上校向祖国及其阿根廷宿敌宣告：智利南极领地已由他接管。梅里诺声称其挫败了前领地管辖机构内部的“阿根廷-布尔什维克阴谋”，并逮捕了古斯曼教授及其助手。目前，他们的下落尚不清楚。\n\n智利武装部队将南极洲的局势推向了对抗的新阶段，摈弃了此前智利南极研究所通过美洲国家组织展开的外交进程，誓言要不惜代价为斯尼佩岛之战的失利复仇。梅里诺及其麾下陆战队是南极大陆上的弱者，他们夺回失地的征途注定将是一条凝成冰封的血路。"
 antarctica_news_events.22.a: "君子报仇，十年不晚。"
 antarctica_news_events.23.t: "[Get_newspaper_header]智属南极军事政变失败"
 antarctica_news_events.23.d: "智利南极领地的阿图罗·普拉特站今日传来一则离奇的报道。基地内部，叛乱的海军陆战队在与文官和平民的对峙中败下阵来，兵变首领何塞·托里维奥·梅里诺海军上校束手就擒。据报称，该名军官及其亲信企图推翻领地管辖机构，挑起与阿根廷的战争，一雪斯尼佩岛之战的耻辱。\n\n当下，古斯曼教授及智利南极研究所正寄希望于外交手段以扭转智利在南极面临的危急局面，通过遍及全美的闪电式外交攻势力图在美洲国家组织内部争取支持，以制衡阿根廷。在排除了内部威胁之后，古斯曼似乎仍将坚定不移地为南极问题寻求和平解决的方案。"
 antarctica_news_events.23.a: "缔造和平的人是有福的……"
 antarctica_news_events.23.b: "他们肯定是在那旮旯待出精神问题了吧？"