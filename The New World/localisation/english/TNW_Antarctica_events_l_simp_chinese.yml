 antarctica_aac_alert_event.30.t:0 "为了蝇头小利"
 antarctica_aac_alert_event.30.desc: "船长侧身让开道，脸上挂着奸诈的微笑：“先生们，补给在这边，请吧？”亚克希奇报以微笑，摁动了手中的圆珠笔，迈步走进暗处。\n\n“当然了，诸位，我保证一切都很妥当。”然而，随着亚克希奇和队员们填写记事板，一股不安感逐渐弥漫开来。南极领地的补给经常出现问题，纸面数据和实际拿到的份额始终对不上账，几乎所有人都是心照不宣了。最初只是失之毫厘，比方说账面上的11箱雪地靴只送来10箱，本应支持17周的补给在第15周就告罄。但事态很快就要发展到谬以千里的地步，关于补给明细就像这漆黑的船舱一样晦暗不明。亚克希奇轻轻敲了敲一个油桶，其中只传来空洞的回音，众人登时怔住，亚克希奇面色凝重，他扭头审视着船长，语气冰冷刺骨：“船长阁下，您知道智利政府为南极领地订购了150加仑的燃油，那么现在，您可否告知我这货舱里实际有多少加仑？”一时间周遭唯余船只航行时的嘎吱声，而船长很快就像只泄了气的皮球。\n\n“亚克希奇先……先生，我得……得先问问我的大副，但我估计目前大概载着……额……83或84加仑……差不多。”船长结结巴巴地承认了弄虚作假，冷汗在昏暗的灯光下闪烁，检查组方才意识到他们一直被蒙在鼓里。亚克希奇怒不可遏，他想痛斥船长干的勾当可能会间接害死数十位智利勇士，这般铤而走险换来的却最多只有几千比索！最后亚克希奇试着压下心头怒火，他开始感觉到一大堆数字在脑袋里乱窜，疼的厉害。"
 antarctica_aac_alert_event.30.a: "“我得给阿图罗·普拉特站找个更可靠的供给商。”卡洛斯郁闷地思索着。"
