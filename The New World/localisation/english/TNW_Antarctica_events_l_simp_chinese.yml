 antarctica_aaa_alert_event.30.t:0 "补给短缺"
 antarctica_aaa_alert_event.30.desc:0 "何塞·马德拉少尉觉得暴风雪将要席卷基地，正透过双筒望远镜盯着迅速逼近的风暴云。当他看到四下的随从正为了寻得最后一丝燃料与食物而将基地肢解，并将物资塞进雪地车时，他觉得把这块地方叫做“基地”已经是便宜它了。\n\n物资太少，这个地方待不住了，而且不只是这里，领土上的大批基地最近都因为后勤问题被抛弃了。\n\n他叹了口气，四下环顾，人们身着的橙色外套与车辆在漫无边际的白色荒原上格外显眼。他将注意力移向划出营地边界的旗帜，那亮色的湛蓝条纹和缓缓侵来的乌云对比鲜明，旗帜中间的白色如同画着周遭的风景与太阳，立在这片荒凉的冻土上，他十分想念太阳。\n\n“这一切到底值不值？”他叩问自己。何塞虽是名爱国的士兵，但他也不禁想着，在这么多能为国家夺来疆域与赢得声望的方法中，总有那么几个不用让人待在世界的尽头挨饿受冻的吧？\n\n逐渐接近的靴子脚步声将他从神游中拉出，何塞按住脚跟转过身来，面向卢卡斯·T·克雷斯波博士。过去几个月孤苦度日的时光中，他渐渐赏识起这位冰川学家。“我们从这儿拿到的数据蛮不错的，可惜就是广撒网，拿不到啥有意义的。”他沮丧的嘟囔着，何塞回以一声嘲笑。\n\n“不用再说了，要怪就去怪莱亚尔心心念念到达极点的该死计划吧。”一阵风把两人的言语荡尽，催着他们各自默默的回去收拾行李。"
 antarctica_aaa_alert_event.30.a:0 "唯有阿根廷国旗长留此地，独自面对日益猛烈的暴风。"
 antarctica_aaa_alert_event.31.t:0 "希望之死"
