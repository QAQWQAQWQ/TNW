 antarctica_aaa_alert_event.10.t:0 "自豪的中士"
 antarctica_aaa_alert_event.10.desc:0 "坦克雷多·洛佩斯中士常为两件事自豪：祖国的军队和自己的手下。但当他的小队在智利的贝尔纳多·奥伊金斯站外围傻傻等待时，他开始怀疑自己的自豪是不是错付了。先来看看这军需官所提供武器肉眼可见的年代感，年轻的二等兵奥尔特加正挥舞着一把拿去送给博物馆展览可能更合适的毛瑟枪，配套的弹药又少质量又差。最重要的是，口粮存量岌岌可危，他们不得不抽出时间捕猎企鹅作食物。\n\n洛佩斯的手下正围坐在火边煮企鹅肉，不由得开始抱怨起来。\n\n“为什么我们会待在这鬼地方？那群傻卵当官的真的在意这片荒地吗？”一等兵迪亚斯喃喃道。\n\n奥尔特加坐在火堆对面，手里拿着生锈的毛瑟枪，厉声驳斥他：“你是认真的吗？我们是军人，我们的任务就是保护我们伟大祖国的荣誉不受那帮智利杂种玷污。”与其他人的冷漠相比，他的声音听起来年轻又热忱。\n\n“孩子，要是外边除了雪还有点别的能管上我一顿像样点的饭，我早就跑没影了。”迪亚斯的发言得到了其他几个人的支持，奥尔特加刚想说几句就被洛佩兹打断了：“罗德里格斯，你得庆幸我们每个人只有一发弹匣，不然我就会因为你的言论毫不留情地开枪打死你。”迪亚斯躺坐椅子上，暗含杀意的眼光冷冷地投向洛佩斯中士。夜色渐深，士兵们沉沉睡去，洛佩斯整夜保持着清醒。\n\n第二天早上，洛佩斯和他的部下发现智利部队开始靠近，他们穿着厚厚的灰色外套，手持山姆大叔提供的新型M-14步枪。洛佩斯大吼“撤退！”。\n\n“但——但是长官，以我们的勇毅我相信足以——”奥尔特加刚开口就被洛佩斯不容置辩的眼神噎了回去，一言不发地跟着其他人回到了雪地车上。他们怀着羞愧的心情回到了埃斯佩兰萨站，而其中没有人比洛佩斯中士更羞愧。"
 antarctica_aaa_alert_event.10.a:0 "落败前自豪尚存。"
 antarctica_aaa_alert_event.11.t:0 "希望之死"
 antarctica_aaa_alert_event.11.desc:0 "那块又冷又粘的肉仅在马泰奥的齿间停留了片刻，便被他吐到了身下的海里。口粮又坏掉了，马泰奥搞不懂在南极这个永恒的户外冰箱里，牛肉罐头是怎么搞变质的，研究所的无能之处真是永无止境。\n\n在调来南极前的多年军旅生涯中，马泰奥一直将压制着无能文官与政客的冒进行为的海军视作秩序与纪律的坚固阵地，可最近的经历最终让他打消了这一看法。阿根廷夺得南极霸主地位本应是举国欢庆的胜利，是许久前阿根廷人征服潘帕斯草原精神的重现，可恰恰相反，当首席探险家深入南极腹地，消耗完大量鲜血与财富却进行着不切实际的幻想时，外国势力正粗野的践踏着他们的领土主张。\n\n不，腐败不仅生于平民，它的根源绝不止于此。马泰奥的沉思忽的被一声命令打断，几艘船只出现在附近。马泰奥对此消息的第一反应是懊恼，因为他们本该是这区域唯一的船只。难道他的上级们已经无能到这个地步，将宝贵的燃料浪费在多余的船队上么？但当船长的声音再次传来，恐惧立马盖过了烦恼。这些船是侵入阿根廷水域的智利舰队。\n\n一声巨响划破寒空，马泰奥瞥见远处大炮的闪光。这算是在鸣枪示警，还是智利佬真的胆大包天到朝着阿根廷船只开火？阿根廷船长甚至没花时间去弄清楚对方意图，便快速下令折返。如果阿根廷海军如此懦弱无能，连自己的海域都巡逻不得的话，那就真的玩完了。马泰奥这么想着，将腐臭的肉罐头朝着智利舰队的方向狠狠丢了过去，然后回到了自己的船舱，不愿面对这冰冷的荒原。"
 antarctica_aaa_alert_event.11.a:0 "阿根廷南极属地的希望破灭了。"
 antarctica_aaa_alert_event.20.t:0 "制图有误"
 antarctica_aaa_alert_event.20.desc:0 "“别，说到这个我冷静不了！”贝尔特拉米诺在电话那头叫喊道，“你说只是张地图是几个意思？！用你那该死的眼睛好好看看吧！这张可笑的地图标注着智利几乎占有整个南极半岛！”他在电话里头听到阿根廷外交官越多的解释，他就越是生气。\n\n“这也是个事吗？智利人说啥都无关紧要吧？”\n\n“要是这地图被美国的媒体、军队和政客们拿去大做文章，你猜猜会发生什么？这张图现在是‘错的’，但要是美国佬照着图上画的乱来，那它可就成真的了。现在全世界都把我们当成智利领土上的占地者了！我可忍不了！这块土地和布宜诺斯艾利斯一样，绝不可从阿根廷分裂出去！”\n\n他叹了口气：“莱亚尔上校会来收拾这个烂摊子的，现在我们要着重提高我们的国际合法性，动作要快。”\n\n挂断电话前，他留了一句：“下次……别再让这种事情发生了。制图师的画笔可是同子弹一样容易招来战争。”"
 antarctica_aaa_alert_event.20.a:0 "阿根廷南极属地的主权岌岌可危……"
 antarctica_aaa_alert_event.21.t:0 "希望之死"
