 antarctica_aac_alert_event.10.t:0 "怒火中烧"
 antarctica_aac_alert_event.10.desc:0 "梅里诺猛地合上厕所大门，接着来回踱步。这场简报会他是一秒也听不下去了。他早就知道古斯曼是个油滑龌龊的马基雅维利式两面派，但他着实没想到这个口蜜腹剑的骗子还是个彻头彻尾的白痴。报告显示情况愈发糟糕，那些个布宜诺斯艾利斯来的虫豸每天都在扩张，鸟屎般的阿根廷旗帜就这么堂而皇之地插在属于智利的领土上。梅里诺从一开始就料到只有一条出路，那就是把他们杀个一干二净。\n\n但古斯曼偏不，他和手下那群蠢货还在那白费力气，试图同阿根廷人谈出条路子来，是个人都知道狗嘴里吐不出象牙。可与此同时，他们的补给正在枯竭，而阿根廷虫豸却在祖国的领土上肆意横行。要是在以前，像古斯曼这样的蠢猪别说能在政坛有所建树，估计早就被拉去做绝育处理了。不对劲啊，除非……亚克希奇！那个蛇蝎心肠的赤匪！梅里诺不知道阿根廷人用什么收买了那个人模狗样的家伙来套取情报，或许是因为赤匪软弱无能的通病，亚克希奇妒忌那份由民族自豪感凝聚而成的伟大力量。废话少说，梅里诺不会把领地拱手让人，他立即拟定了一份计划。第一步是实施配给制度，基地里可没有多余食物让成天游手好闲的肥猪挥霍了。然后梅里诺会给他们人手一套军服，接着派到前线巡逻。如今大敌当前，稍有不慎，整个领地即会万劫不复。阿根廷人无疑会骤然袭来，倘若真到了那一步，留给亚克希奇去找同党的时间也不多，不，梅里诺会首先找到他，届时……"
 antarctica_aac_alert_event.10.a:0 "他会把这个该死的混蛋吊死，向那些祖国的叛徒们以儆效尤。"
 antarctica_aac_alert_event.11.t:0 "付之一炬"
 antarctica_aac_alert_event.11.desc: "站点里的橱柜轰然倒地。古斯曼教授捡起地上散落的几张文件，回头看了看书桌，接着环视了一圈办公室，最后目光停在了智利南极领地的地图上，接着合上了房门，内心感慨道：兴许没下次了。大堆大堆的文件在隔壁房间的火炉里化为灰烬。古斯曼将手中的档案、地图、电报和其他材料一并投入火中。\n\n古斯曼来到室外，目光所及之处，冲天烟柱四起，阿图罗·普拉特站火光遍地，橘红色的火焰点亮了每一扇窗户，站点人员奔走忙碌着。有些人拖着剩下的少量财物和补给准备离开站点，另一些人则把更多的文件取来焚毁。都结束了。由于长期缺乏补给供应，贝尔纳多·奥伊金斯站的悲剧再次上演。一如南极沿岸的智利岛屿一样，落入阿根廷海军囊中。\n\n当阿根廷从海上发起进攻时，广播室里只传出含混不清的信号。拉斐尔·索托马约尔海岸的站点上报目击到了日本军队。而古斯曼则漠然地提着两只行李箱，独行于混乱之中。\n\n亚克希奇、比利亚罗埃尔和米兰达一行正在蓬塔阿雷纳斯港协调撤离。至于梅里诺？古斯曼冷笑一声。有些人说他已经驾着巡洋舰准备与阿根廷人作殊死一搏。也有可能他早就乘上了回家的第一班飞机。\n\n最后一架飞机在冰冷的跑道上启动了。古斯曼钻入机舱，身旁的伙伴是最后一批离开南极的智利人。一群身心俱疲的人，他们的理想被这个“只看谁拳头更大”的世界击得粉碎。阿图罗·普拉特站在熊熊烈火中逐渐缩小为一道朦胧的阴影。古斯曼怔怔地盯着它，他看到智利对南极大陆的探索历史就此告一段落，而他在此间的一切亦付之一炬。"
 antarctica_aac_alert_event.11.a:0 "一行人逐渐远去，往者不谏，来者可追。再见了，南极。"
 antarctica_aac_alert_event.20.t:0 "内鬼综合征"
 antarctica_aac_alert_event.20.desc:0 "古斯曼教授瘫座在椅子软垫上，凝望着窗外的南极深渊。他的办公室凌乱不堪，文件与空酒瓶散落一地。桌上还残留着一份吃到一半、早已凉透的午餐。\n\n一个多小时过去了，他一直僵在原地，没有挪动分毫。\n\n方才他拆开了比利亚罗埃尔和米兰达的来信，两人说的是一件事：议论低语传遍了整个拉丁美洲，人们公认阿根廷占了上风，有权占有其所宣称的领土；而智利在南极的行动则沦为国际笑柄，智利人俨然成了对事实公论视而弗见，听而弗闻的固执小丑。\n\n但古斯曼知道是怎么一回事。到头来他必须为此担起主要责任。国家之所以对他委以重任，是相信他能让智利在南极重获一席之地，并赢得国际社会的尊重。然而事实却给他们迎头痛击，他们选择的领导者不过是个玩弄外交、滥竽充数之辈。\n\n相信不多时古斯曼就能重振旗鼓，以满腔热血化碧涛，为正义公理挺身出，挑战这已经疯狂的世界。那时，此地的人们会迎来真正称职的领袖。"
 antarctica_aac_alert_event.20.a:0 "但是今天……此时此刻，古斯曼不得不承认失败。"
 antarctica_aac_alert_event.21.t:0 "智属南极宣称点数耗尽"
