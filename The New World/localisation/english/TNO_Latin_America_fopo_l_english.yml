LATAM_santa_cruz_fall.1.t: "Movimiento de Izquierda Nacional - Group Overview"
LATAM_santa_cruz_fall.1.desc: "-SECRET-\n\nThe FULNA alliance is not a singular group, but a network of various agents and interest groups who are united behind the common cause of the Colorados' overthrow. While most of these groups originate and work among the Paraguayan population, the Movimiento de Izquierda Nacional (hereafter MIN) stands out as being composed mostly of eastern Bolivians hailing from the breakaway region of Santa Cruz.\n\nThe MIN is led by Luis Sandoval Morón (See p. 5), a paramilitary officer-turned-revolutionary. He founded the MIN after being expelled from the Santa Cruz branch of the Movimiento Nacional Revolucionario (MNR) after the latter hadrefashioned itself as the Movimiento Cruceño Revolucionario (MCR). He and likeminded Bolivian revolutionaries have retreated into the Paraguayan hinterlands and formed their own guerilla band, making inroads into the wider Paraguayan rebel movement while maintaining connections across the border. While the MIN has been formally affiliated with FULNA for some time now, Sandoval has been quite clear in his distrust of Brazil and its involvement in the alliance (p. 12-14 for reference).\n\nInformation from CHACO and IGUACU seems to indicate that the MIN's main objective is not the Colorados' overthrow, but rather the Paraguayan-backed regime in Santa Cruz, which they aim to target following a successful offensive (p. 18). While the group is currently not large enough to pose a threat to the breakaway region's government, it is recommended to maintain vigilance. If the Colorados are to be overthrown, the government in Santa Cruz will likely find itself adrift and vulnerable to destabilizing groups and agents.\n\nTRUNCATED FOR BREVITY"
LATAM_santa_cruz_fall.1.a: "An unknown variable is always a dangerous thing..."

LATAM_santa_cruz_fall.2.t: "Suspense in Santa Cruz"
LATAM_santa_cruz_fall.2.desc: "Salvador looked up from his typewriter. His body was hunched over, beaten and broken, and he hadn't even gone to war yet. For him personally, though, this article and the amount of trouble he had in writing it could be described as a low-level conflict. It did not matter that it was way past midnight; he was in too deep, he was going to finish this. He read it again.\n\n"Suspense In Santa Cruz: Bolivia Bares Its Fangs." Not particularly adventurous, but not unengaging, he supposed. "There is an eerie silence in the Chaco. The supplies no longer roll in from across the Paraguayan border. The territory reckons with a confrontation which they address with a 'when', not an 'if'. They are not fooled by anyone, not north or south: war is on the horizon."\n\nThe rest of the piece was less thrilling. Reading through it, he recalled the palpable fear of the fear of the people and the nonchalance of the politicians, and most of all, the stoicism of the militias, who he saw as a "partial-scale force doomed to take on a full-scale army". He smirked at his exchange with one of them, a subordinate of Luis Sandoval, the leader of the MIN paramilitary "gearing to take control" of the leaderless countryside. Apparently, the 'Estado' name could pull some strings.\n\nIn a way, he reflected, the Paraguayan presence there was a house of cards doomed to fall apart when Asunción's regime did, as FULNA's takeover proved. At least he... Gunshots. He got down, avoiding the small window, just in case, as his manual said. Thankfully, they seemed distant, and he himself did not appear to be in harm's way. But for all the talk of his personal war, there could be no light-heartedness about the real one to come. It was humbling."
LATAM_santa_cruz_fall.2.a: "Wars are more than the papers they are recounted in."

LATAM_santa_cruz_fall.3.t: "Santa Cruz Falls to Radicalism"
LATAM_santa_cruz_fall.3.desc: "TOP SECRET\nEYES ONLY\nTO ALL MEMBERS OF THE SERVIÇO FEDERAL DE INFORMAÇÕES E CONTRAINFORMAÇÃO\nMIN TAKEOVER OF SANTA CRUZ\n\nThe Bolivian city of Santa Cruz, following days of violent clashes, has fallen to the National Leftist Movement, or MIN. Support for the former government had been undermined by soaring housing prices and inequality driven by the rebel department's oil boom. Seizing this opportunity, the MIN's leader, Luis Sandoval Morón, escalated street violence until civil authorities were overwhelmed.\n\nControl over the primary roads from the city has allowed Sandoval to capture the vast majority of the cruceño political class. Citing a mix of public grievances and personal vendettas, Sandoval is publicly executing his former rivals at a rapid pace. Our informants' reports also mention the disappearance of these politicians' spouses, kidnapped to parts unknown.\n\nThe brutality and decisiveness of the MIN have thus far maintained order in the city and surrounding areas. Sandoval has publicly claimed that these actions represent the recapture of the Santa Cruz department from separatists and national enemies on behalf of the Revolutionary Nationalist Movement, or MNR.\n\nThe Bolivian government has yet to take an official stance on developments in Santa Cruz, but our contacts tell us that cabinet-level meetings are being devoted solely to the issue. More concrete recommendations for our diplomatic and, potentially, military posture will be determined following a decision from La Paz."
LATAM_santa_cruz_fall.3.a: "A brute seizes the helm."

LATAM_santa_cruz_fall.4.t: "Santa Cruz Rejoins Bolivia"
LATAM_santa_cruz_fall.4.desc: "TOP SECRET\nEYES ONLY\nTO ALL MEMBERS OF THE SERVIÇO FEDERAL DE INFORMAÇÕES E CONTRAINFORMAÇÃO\nMIN TRANSFERS CONTROL OF SANTA CRUZ TO LA PAZ\n\nNegotiations between Bolivia's national government and Sandoval's MIN have concluded rapidly and successfully. The MIN has formally surrendered its authority over Santa Cruz to the MNR government in La Paz, reunifying Bolivia and its rebel province after years of de-facto separation.\n\nConditions in Santa Cruz are likely to change little. The revolutionary government in La Paz has construed Sandoval's terror campaign throughout the department as a patriotic effort, and appointed him as prefect of the department for his loyalty. While the MIN appears destined to be closely integrated into the national MNR, Sandoval appears to have been granted latitude to retain most of its leading figures in key roles.\n\nOpposition to both Sandoval's rule and the reunification remains prevalent but disorganized. The systematic execution of Santa Cruz's old regime and rumors regarding the fates of their spouses have left any resistance leaderless and dissatisfied elements of the populace cowed. Santa Cruz appears to have little possibility of reestablishing itself as an independent geopolitical entity in the near future."
LATAM_santa_cruz_fall.4.a: "One less piece on the South American chessboard."

LATAM_santa_cruz_fall.5.t: "Bolivia Preparing to Invade Santa Cruz"
LATAM_santa_cruz_fall.5.desc: "TOP SECRET\nEYES ONLY\nTO ALL MEMBERS OF THE SERVIÇO FEDERAL DE INFORMAÇÕES E CONTRAINFORMAÇÃO\nSANDOVAL TAKEOVER TO PROMPT BOLIVIAN INVASION OF SANTA CRUZ\n\nFollowing the National Leftist Movement's takeover of Santa Cruz, tensions with the Bolivian national government have sharply risen. La Paz has declared Luis Sandoval Morón, the authoritarian leader of the MIN, to be a traitor and refused to recognize his authority.\n\nOur contacts regard conflict between Bolivia and Santa Cruz to now be unavoidable. Bolivia has mustered its army to forward positions near the fortified border, and appears to be stockpiling provisions and medical supplies for a short campaign. Sandoval has mobilized the MIN in response, calling upon his party for an unyielding defense of Santa Cruz and to "restore proper governance to Bolivia".\n\nOur analysts suggest that despite Sandoval's forces' fanaticism, their lack of numbers and heavy weaponry will cause them to be overwhelmed within weeks by a determined Bolivian attack. While the MIN have engaged in severe repression throughout their territory, surviving opposition figures may be able to serve as an effective fifth column behind their lines.\n\nIt is recommended that we increase border staffing in the area to accommodate potential refugees from the conflict, as well as to maintain awareness of any Argentine movements. Buenos Aires may seek to use the ensuing instability to secure its interests in the region, to the detriment of national security."
LATAM_santa_cruz_fall.5.a: "Soon we'll have one less revolutionary to worry about."

