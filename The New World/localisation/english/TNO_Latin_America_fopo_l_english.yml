LATAM_bolivia_crisis.1.t: "One Less Fire"
LATAM_bolivia_crisis.1.desc: "President Lott felt a palpable release of tension as the three grainy figures on the small television shook their tiny hands. He had begun to realize the toll that governing had taken on him, the muscle tension, the sleepless nights, the missed meals. Lott had long ago concluded that in Brazil, politics was a far deadlier profession than soldiering. At least now he had one less crisis to worry about.\n\nThroughout his presidency, the Bolivian situation had been one of a thousand sources of anxiety. Everywhere it seemed that the continent's old liberal order was under strain, but Bolivia had always been one of its weakest links, barely holding itself together between periodic attempts to avenge the eternal humiliation of the Chaco. No doubt Argentina and its jackbooted henchmen in Santa Cruz saw it as only a matter of time before they could begin to dismantle the country for spare parts.\n\nThanks to the efforts of Lott and his friends in Chile, the Transandean Economic Treaty, with its provisions for increased economic and security cooperation, would hopefully be the glue to hold the crumbling nation together for the time being. Not to mention the obvious benefits and expansion of Brazilian influence that would come with it.\n\nIf Lott's time fighting in the failed first great crusade against fascism had taught him anything, it was that the free nations of the world only stand a chance against the forces of tyranny when united.\n\nWhen the reporter on the screen turned the discussion to the Vice President's upcoming visit to Asia, the tension returned to Lott's body and his stomach lurched. Balancing the interests of three stubborn and diverse nations was one thing, but dealing with that man was quite another. Sometimes, it seemed easier to achieve world peace..."
LATAM_bolivia_crisis.1.a: "...than rein in Jânio da Silva Quadros."

LATAM_bolivia_crisis.2.t: "Por la razón"
LATAM_bolivia_crisis.2.desc: ""Our tin imports from Bolivia are up tenfold, as well. The whole treaty has gone well, we're doing more than just making up for lost time."\n\nJorge Alessandri sharply nodded at the report's conclusion, and took another glance at the written portion on his table. Of course, this allowed the circle of diplomats and negotiators around him, Chile's finest, their private smirks and exhales. It was a victory, at least for now: Santiago and Rio had linked their trade relationship firmer than ever, with the bulk of Bolivia as their chain.\n\n"Regarding the subject of Atacama, I've been told these developments are cooling heads? Not something one sees every day."\n\n"Indeed. The Bolivians will never let us forget the Ten Cents War, but the newfound trade relationship-as well as our strengthened position of influence-has calmed protestations over their lack of coastal territory. Relatively speaking, at least."\n\nAll in all, it seemed as if the Bolivian treaty was shaping up to be a miracle-or perhaps a masterstroke. They'd entered into this affair with the Brazilians knowing it carried some risk, and indeed that the Argentines wouldn't take things lying down. Their labors, however, had begun to bear significant fruit.\n\n"Thanks to our successes here, Mr. President, Argentina remains isolated. If we continue the course, and there are no major complications, this should go a long way towards peace.""
LATAM_bolivia_crisis.2.a: ""Peace is what contains the fair winds, after all.""

LATAM_bolivia_crisis.3.t: "Ores and Ultimatums"
LATAM_bolivia_crisis.3.desc: "The President of the Argentine nation found himself reviewing his notes of his last meeting with Frigerio when he was interrupted by a secretary carrying a report from the Chancellery. Frondizi merely gazed at the contents of the documents and he immediately realized the problem: Brazil and Chile were screwing Argentina's position in Bolivia.\n\nRight away the thing that the President knew would happen happened, the telephone in his presidential office ran. On the other side of the line there was a military man, his identity unimportant, shouting about how the Brazilians and the cursed "Chilotes" were violating the Tripartite Agreement and how the President should better resolve that before tanks were forced to march over the Casa Rosada. Frondizi merely replied that he was aware of the situation and was dealing with it before hanging out.\n\nGoddamit, cursed the President on his head. He knew that his Chief of the Army probably didn't care about Bolivia or could locate La Paz on a map and was only using this as an opportunity to coup his government if he failed to deal with the situation. Frondizi felt helpless, he knew that Toranzo Montonero met with Balbín and yet he couldn't do anything with this information.\n\nStill, there were more pressing matters. He could always meet with Fraga and Aramburú later and discuss for as long as they wanted how to remove Toranzo (and maybe even Balbín) from the picture. The priority now was to defend Argentina's interests.\n\nFrondizi picked up his phone."
LATAM_bolivia_crisis.3.a: ""Yes, this is the President. I need Dell'Oro to start making a scene in Itamaraty immediately""

LATAM_bolivia_crisis.4.t: "Escalations"
LATAM_bolivia_crisis.4.desc: "Lott listened to Walther Salles' report on the situation in Bolivia, his mood darkening with each passing moment. This was bad, very bad.\n\nThe Tripartite Pact had been the only thing keeping Bolivia from falling apart after decades of conflict and instability.\n\nAfter the Fifth Chaco War between La Paz and Asunción had nearly brought Bolivia to the brink of collapse, and with it global tin prices, Argentina, Chile, and Brazil decided to finally put an end to the chaos. Bolivia would be treated as a neutral nation with equal trade access for all, and in return the ruling clique of oligarchs would remain in power with outside support.\n\nThe Transandean Treaty was a challenge to that, but Lott hardly expected the Argentines to use the nuclear option; military intervention. Military intelligence pointed to training exercises near the border and flight sorties by their Paraguayan puppet.\n\n"I thought Frondizi was better than that. Risking all-out war for petty power politics? It must be a bluff."\n\n"With all due respect, sir, we can't take that chance. Bringing the Argentines into negotiations is better than another Chaco War, or worse... Besides, Frondizi may not be the one pulling the strings here, his government is on the verge of collapse, and we all know the influence the military has in such matters," Salles said.\n\n"All too well," Lott replied glumly, thinking of his own predicament. "Very well, I want you to tell the Argentines that we're willing to bring them into negotiations, but keep it quiet...""
LATAM_bolivia_crisis.4.a: ""I don't want this overshadowing our Vice President's long-awaited tour of Japan.""
bolivia_crisis_tension_increase_tooltip: "§FDue to §YArgentina§!, §PTension§! has §Rincreased§! by §Y5%§!.§!"

