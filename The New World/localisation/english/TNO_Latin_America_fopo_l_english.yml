LATAM_andean_bolivian_treaty_text: "Argentina, Brazil, and Chile are yet again squabbling over how to divide the vast riches of Bolivia. Brazil and Chile seek new gains at the expense of their Argentine rivals while Argentina tries to defend a status quo it has long benefited from.\n\n\nIn this new phase of the South American Cold War, the boardroom is as much a battleground as the trenchline."
Bolivia_InfoBox_tt: "The outcome of the treaty will be decided by whoever wins the majority of 5 rounds. A round can end in victory for either §nBrazil§! and §RChile§! or §mArgentina§!, or a draw - all depends on who accumulates more favours. Only §Ythree§! maneuvers can be taken each round, so pick your decisions carefully.\n\nFinally, keep an eye on the conference's §Xtension§!. Once it reaches maximum the talks will end and the conference §Rfail§! - and should the conference's result remain unclear to the §Blast moment§!, too high tension may prove §Rfatal...§!"
