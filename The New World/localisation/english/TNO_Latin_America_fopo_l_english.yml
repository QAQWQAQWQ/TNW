LATAM_bolivia_crisis.6.t: "One More Fire"
LATAM_bolivia_crisis.6.desc: ""This is absurd! Such aggression must be answered with force!" The hoarse voice of War Secretary Fraga shook the presidential room. It was late afternoon in Buenos Aires and Frondizi faced a headache he hoped to not feel again this year. The Chileno-Brazilian treaty in Bolivia not only posed a serious threat to the already precarious balance of power in the region, but also put his government in a dangerous spot.\n\n"My president, if I am allowed to speak." Foreign Minister Cárcano's smooth voice came like a fresh breeze. "While I share your and the General's indignation, I must emphasize that this matter must be handled as a diplomatic issue. Escalating it could come close to igniting an open conflict."\n\nJust as Fraga was about to shoot Cárcano with furious eyes, Frondizi intervened. "Indeed Minister. But words alone will not be enough to defend our interests." He leaned back on his chair, running his sweaty hand through his disheveled hair. "That being said, you will be tasked with sending an ultimatum to Brasília by tomorrow's morning. Let our intentions in entering this negotiation be very clear. This outrage must not proceed for any longer."\n\nAs Cárcano obediently nodded, Fraga raised his hand. "Mr. President, I suggest we should mobilize our army across the border. This would increase the weight of our ultimatum-"\n\n"No." Frondizi replied firmly. "That would be a senseless increase of tensions. But you may feel free to conduct army drills instead, that should be enough for them to get our message. Besides that, I'm counting on your competence, Secretary." Fraga dutifully nodded. Frondizi smiled, but it quickly faded away. The moon could already be seen through the window and Frondizi did not know whether his government would survive another crisis like this. When it seemed he was free from internal harassment, his neighbors now tormented him. Who would be next, God?"
LATAM_bolivia_crisis.6.a: "At this point, Frondizi no longer doubted it."

LATAM_bolivia_crisis.7.t: "Report to President Lott on the Bolivian Situation"
LATAM_bolivia_crisis.7.desc: "The past two decades have seen an unprecedented expansion of Argentine power throughout South America. Through the use of threats, exploitation and force of arms, they have sabotaged this once peaceful continent and Brazilian interests. Recent developments have given us a chance to push back against this aggression without compromising Brazilian security or triggering another conflict. The key lies in the proposed Transandean Treaty of Economic Cooperation with Bolivia and Chile.\n\nAfter years of sporadic conflict with Paraguay, Bolivia was economically devastated and threatened by the fascist breakaway state of Santa Cruz. These conflicts were put on hold with the passage of the Tripartite Pact in 1957, an agreement between Chile, Argentina, and Brazil that guaranteed Bolivian sovereignty and opened the country to equal exploitation of its lucrative mineral resources. Nevertheless, Bolivia remains in a precarious position. Argentina continues to support Santa Cruz and has expanded its economic influence in Bolivia. Simply put, we are losing this battle, but the Transandean Treaty could put us back in the game.\n\nFirst proposed in 1959, it would give Brazil tariff-free access to the Pacific and control over Bolivian transportation infrastructure, significantly undermining Argentine influence and the Tripartite Pact. Unfortunately, initial negotiations failed because Chile was reluctant to challenge Argentina in the aftermath of the Snipe War.\n\nRecent events have changed that calculus. First, the expansion of the Chilean navy has neutralized the Argentine threat in Antarctica, making Chilean support possible once again. Second is the rise to power of President Frondizi in Argentina at the expense of the military. He has indicated a desire to de-escalate our growing rivalry and is highly unlikely to resort to force. Preparations for secret negotiations are in place, all we need is your approval, Mr. President."
LATAM_bolivia_crisis.7.a: "Lott sent word to the diplomats. It was time to begin."
bolivia_crisis_andean_treaty_begins_tooltip: "With the opening of diplomatic talks between Argentina, Bolivia, Brazil, and Chile, a new diplomatic crisis has begun and can be found in the Global Conflicts Tab."
fbi_latam_actions_tt: "Opportunities to meddle in the ongoing §lSouth American§! crises can be found in the Intelligence Tab."
fbi_latam_actions_mining_wars_tt_1: "We will focus on stabilizing the §jBolivian§! government..."
fbi_latam_actions_mining_wars_tt_2: "We will focus on infiltrating Nazi circles in South America..."
fbi_latam_actions_paraguay_prelude_tt: "Liberal forces in §QParaguay§! will be considerably stronger, should the country descend into a power vacuum..."
fbi_latam_actions_paraguay_prelude_fire_tt: "It seems like the §QParaguayan§! regime had already been weakened by some §bforeign covert actions§!..."

