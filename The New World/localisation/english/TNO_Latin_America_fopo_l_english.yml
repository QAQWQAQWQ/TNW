LATAM_bolivia_crisis.9.t: "Bonds of Duty"
LATAM_bolivia_crisis.9.desc: "Balbín barely got off the plane and he was already feeling suffocated in the rarefied atmosphere of La Paz. He better get used to it soon before he faints in the middle of the negotiations. I swear to God, if this is another machination of Frondizi...\n\nBut even with a purpose as clear as the skies above La Paz, something still disturbed Balbín. It was one of his new aides, who came out of nowhere and acted with disturbing suspicion. His fears would be confirmed as the dossier simply lacked a single mention of this new aide. Balbín shivered, he knew about the military's growing defiance but that was just ridiculous. "What's the meaning of all this?" shouted Balbín at his "aide", grabbing him by his tie while rubbing the dossier in his eyes. Seconds passed like hours until the man finally opened his mouth.\n\n"I'm sorry for the inconvenience, Vice President," answered the spy in an indifferent tone. "It's nothing personal. General Señorans and me do not enjoy resorting to these practices. But let me tell you, you are not the only one who doesn't want to see our sovereignty compromised." He lightly pulled his tie back and slowly straightened it. "Our orders were clear: to verify and ensure you will defend the nation's interests. And here we are to obey them."\n\nBalbín opened his mouth, but no words came out. When his mind formulated a response, a voice appeared from the other side of the room. "Dr. Balbín? The meeting is about to begin. They are waiting for you."\n\nBalbín nodded slightly. He glanced at the spy, who gestured at him to go, which Balbín did, wordlessly. The knowledge of being watched was something he was not prepared for. But he felt no anger at the spy. Despite the different circumstances, they were still working to defend Argentina's national interests. Maybe - thought Balbín as the door behind him closed - they were not so different after all."
LATAM_bolivia_crisis.9.a: "We are all slaves to our duty..."

LATAM_bolivia_crisis.10.t: "The Pressure Builds"
LATAM_bolivia_crisis.10.desc: "It was late in the evening when Walther Salles arrived in the Presidential office, joining President Lott and War Minister Odílio Denys. Clutched in his arm was a copy of the Transandean Economic Treaty and a bottle of champagne. Lott didn't ask where he had gotten the bottle, given the ongoing embargo with the Pakt, but some things were better left unsaid. "Please take a seat, Odílio and I were just wrapping up discussions on our esteemed Vice President's visit to Asia."\n\n"Only good things to say I'm sure." Salles said, placing a copy of the treaty on Lott's desk.\n\n"I must commend you on the negotiations Mr. Salles, I was beginning to think the Bolivians would never budge," the President said as he revealed three champagne glasses.\n\n"I wouldn't be too hasty Mr. President, I can't imagine Buenos Aires will take this lying down," said Denys glumly.\n\n"With all due respect, do you truly think Frondizi would so quickly throw the region back into chaos? The man's much too intelligent to think anything good can come from escalation," said Salles.\n\n"It's not Frondizi I'm worried about. Surely you are not so naive as to think he's the one running the show in Argentina?" Denys scoffed. Lott took the bottle into his hand and prepared the glasses.\n\n"Gentlemen, gentlemen, these are all valid concerns, but for now this is an achievement worthy of celebration," he said clutching the bottle's cork. "And after all, if the Buenos Aires make a move we won't hesitate to..."
LATAM_bolivia_crisis.10.a: "His last words were muffled by a deafening pop."
BRA_Bolivia_joins_sphere_andean_crisis: "Due to our success in diplomatic talks, Bolivia will officially join our side in the §YSouth American Cold War§!."

LATAM_bolivia_crisis.11.t: "Routine Disappointments"
LATAM_bolivia_crisis.11.desc: "The maze of corridors at the SIDE headquarters were orderly hushed. Aside from the occasional sound of boots clapping on the floor, no other noise echoed in the hallways. However, if you got close enough to General Eduardo Señorans' office, you would be able to hear the heartbeats coming from the other side of the wooden door.\n\nSeñorans leaned back on his battered chair as it screamed creaking noises while his stoic gaze dissolved in a profusion of emotions. The report of the Transandean Economic Treaty was mercilessly clear. To say that Argentina was humiliated in the negotiations would be too generous. His expectations were already low but Jesus Christ! Frondizi and Balbín really outdid themselves this time. How does one even accept such absurd concessions in the first place?\n\nSeñorans pulled out the drawer, revealing a collection of expensive cigars that once were shared among his comrades, but were now his only company at times like this. He lit one, but not even the deepest drag could ease his mind. Argentina, helplessly surrounded by its enemies, now also had the issue of military autonomy becoming beyond repair. Martijena would never forgive this and he would surely ask for retribution sooner or later. But Señorans was now beyond caring about it. If anything, it's what Frondizi deserved.\n\nHe crushed the still half-smoked cigar in the ashtray. Curse them all! The politiqueros, Martijena and his goons, all of them! His hand searched for a second cigar until his eyes met the wooden cross hanging above the door. Señorans quickly straightened up and recited a prayer. But part of him didn't feel comfortable with that, he felt like a hypocrite in turning to the Lord only in times of need. But this was no longer his problem, it was his country's problem. May Lord God protect Argentina from its enemies - from the outside and inside alike."
LATAM_bolivia_crisis.11.a: "God is just, not a wish granter..."
ARG_failure_andean_treaty_crisis: "American Puppets surround us on all sides. The Argentine diplomatic corps have failed, Frondizi has shown his weakness once again, it's time for the intelligence service to take over."

LATAM_bolivia_crisis.12.t: "Atlas Sighed"
LATAM_bolivia_crisis.12.desc: "President Lott already felt like he was drowning when Odílio Denys walked into the room. His desk was covered in dozens of reports. Slowdowns on the Trans-Amazonian Highway, inflation rising, another shootout in the favelas, it was too much for one man to bear, even one as composed as Lott. Unfortunately, even the sight of his old friend, the Minister of War, couldn't soften the blow of the latest disaster.\n\n"I have received word from Salles in La Paz. The Argentine diplomats have managed to bully the Chileans and Bolivians into neutering the Transandean Treaty. They have torpedoed any chance of tariff-free access to the Pacific or gaining a hold on Bolivian transportation. Bolivia neutrality remains intact". As Denys continued, Lott tried to remain professional, straightening his back and freezing his expression, but Denys knew the marshal too long to be fooled. "This isn't your fault, Henrique. The treaty negotiations were always a long shot."\n\n"Oh, but it is my fault, Odílio, I underestimated Frondizi, or the army, or whoever the hell runs things in Buenos Aires. We thought we had caught them unguarded, and now we're paying the price." Denys fumbled for a response, but the President beat him to the punch, his words infused with a resigned weariness, "Perhaps it was for the best, I have had my fill of backroom intrigues here in Brasília for a lifetime," he said returning to his paperwork."
LATAM_bolivia_crisis.12.a: ""At least this is one less problem to worry about.""
BRA_failure_andean_treaty_crisis: "The Argentina diplomatic corps have used the threat of war to have Bolivia and Chile back down. With the Bolivian military outraged we must prevent the crisis from furhter escalating."

LATAM_bolivia_crisis.13.t: "Unexpected Victories"
LATAM_bolivia_crisis.13.desc: "The maze of corridors at the SIDE headquarters were orderly hushed, and General Eduardo Señorans' office was no exception. The mountain of papers and reports he read daily brought him anything but comfort for the future of Argentina. Yet, the latest report on the Transandean Economic Treaty gave him something he hadn't felt in a long while in this job: relief.\n\nSeñorans slowly leaned back on his aged chair as a smile cracked across his rigid gaze. Despite the pressure made by the OFN through its Brazilian and Chilean marionettes, Frondizi and his team of diplomats had fulfilled their duties. Not only did they successfully defend Argentina's interests, they were also able to secure strategic assets and concessions. Not bad. Not bad at all. The Argentine sphere had once again stood proud against its enemies.\n\nSeñorans shook his head and pulled out the drawer, revealing a collection of expensive cigars. He carefully picked one and took a deep drag as it was lit. He hoped Dr. Frondizi would be enjoying this victory as much as him. This win was something his presidency desperately needed in these troubled days. Perhaps even, if he played his cards right, he might not only delay an incoming coup but also deny it from ever happening.\n\nThe cigar was on its final drag when Señorans' eyes met the wooden cross hanging above the door. Oh Lord! Where are my principles? He put the cigar on the ashtray and straightened his posture for a prayer of thanks. God knew the days of military autonomy and planteos had to end one day. Frondizi may be safe for now but his days of struggle were far from over. But at least, Señorans could end his day in peace knowing his nation had benefited."
LATAM_bolivia_crisis.13.a: "God is, indeed, just."
ARG_victory_andean_treaty_crisis: "The Argentine Diplomatic Corps have pulled off a major victory, threatening Bolivia into giving Argentina concessions."

LATAM_bolivia_crisis.14.t: "Little Victories"
LATAM_bolivia_crisis.14.desc: "President Lott already felt like he was drowning when Odílio Denys walked into the room. His desk was covered in dozens of reports. Slowdowns on the Trans-Amazonian Highway, inflation rising, another shootout in the favelas - it was all too much for one man to bear, even for a man as composed as Lott. Fortunately, his old friend, the minister of war, came bearing slightly better news.\n\n"I have received word from Salles on the crisis in La Paz, the Transandean Treaty passed...barely. Concessions had to be made to comfort our allies and keep appeasing the Argentines, but tariff-free access to the Pacific and transportation rights in Bolivia remains a very real possibility. Though we'll have to fight for it." At this news, his posture softened just a little. "Moreover, our intelligence has not reported any Argentine military movements it seems unlikely they will be retaliating with force."\n\nLott's face hardened, "We have gotten ourselves caught in President Frondizi's trap, it would appear. A little bluster and they were able to put a dent in a flawless treaty, it begs the question of what else they are capable of."\n\n"Whatever they do next I can assure you our armed forces will have your back, Mr. President."\n\nLott nodded. "But that is a matter for another day, old friend, this is a victory after all, even if it is tainted by Argentine deceit"."
LATAM_bolivia_crisis.14.a: "In times like these, it is prudent to take victories where one can get them."
BRA_neutral_andean_treaty_crisis: "While this treaty has not been the major victory we wanted, peace has been maintained. Tensions in the §YSouth American Cold War§! will decrease by §R5§!."

LATAM_bolivia_crisis.15.t: "All Quiet On The Cruzeño Front"
LATAM_bolivia_crisis.15.desc: "The sun had barely risen from the horizon and General Eduardo Señorans was already in his office at SIDE headquarters. After a prayer and a cup of coffee to start the day, Señorans began reading through the mountains of papers above his desk that nearly obstructed his vision. Entire hours passed like mere minutes until Señorans had finally begun reviewing the report of the Transandean Economic Treaty he just received, yet his gaze barely flinched as the minutes passed by like hours for him.\n\nHe leaned back on his old chair with the report still in his hand. Things didn't go so bad a priori. Argentina's national interests were protected despite the efforts from Brazil and Chile, but besides that, that was basically it. All the remaining developments were neither beneficial nor detrimental for Argentina. On the pessimistic side, Brazil and Chile would still continue to conspire against the Argentine nation for the foreseeable future. But being more optimistic, the message conveyed will make them think twice before plotting again. At least he hoped so.\n\nSeñorans sighed and carefully filed the report into his dossier, proceeding to review the papers about the increasing levels of insubordination in the army. There would certainly be voices in the military unhappy with the result and complaining how this opportunity wouldn't have been lost if Frondizi wasn't the president. But those who would say it were the same ones who have been shouting it for years. So in the end, nothing would have changed in the armed forces either.\n\nAs night loomed and the crickets became audible, Señorans packed the last papers and made one final prayer thanking God for another day of service. He knew that tomorrow he would return to work as normally as he did every day and that business in Argentina would continue as usual, but as long Argentina and its interests were safe and protected, he would continue fulfilling his duty just as he always did."
LATAM_bolivia_crisis.15.a: "Just another day in the office."
ARG_neutral_andean_treaty_crisis: "The Argentine Diplomatic Corps have contained Brazilian expansionism, granting Frondizi a much needed victory. Due to this Tensions in the §YSouth American Cold War§! will decrease."

LATAM_bolivia_crisis.16.t: "Fire in the Sky"
LATAM_bolivia_crisis.16.desc: "The meeting room was silent, coated in the orange of the Brazilian sunset, as Lott finished reading the report on the Bolivian situation. Walther Salles, Brazil's representative in this debacle, sat in anticipation, reciting prepared responses in his head. Lott looked up from the paper, a cold professionalism doing little to reveal the futility he felt in the face of this disaster.\n\n"So it's over then. Access to the Pacific, our infrastructure expansion plan, any chance of containing Argentina in South America, gone. Just like that?"\n\nSalles tried to recall the words he had been repeating to himself for the last half hour, but found his mind empty. "We tried our best, but Argentina was immovable. It, well it turned into a debacle, yelling, insults, all of it. I've been to many diplomatic conferences and never has it gotten that bad before. Then Argentina just walked out, they claimed it was over a tin dispute, but frankly I think they were tired of talking."\n\n"At this point how it happened is unimportant. What comes next, that's what matters. I thought this treaty would be the first step to rolling back Argentine influence to peacefully restore the balance of power."\n\n"While Bolivia may have pulled out of the treaty due to Argentina's brinkmanship, at least they are still our allies, our ties remain strong," said Salles.\n\nLott did not turn around, "On the other hand, we also now have a commitment to a terminally unstable country in the middle of a region on the verge of war. Our allies are shaken, the Bolivian military is outraged at the treaty's failure, Buenos Aires is drunk on victory, and jackboots in Santa Cruz and Paraguay are no doubt preparing to take advantage of the chaos as we speak. No amount of diplomatic upsides will change the fact that we stand at the precipice of disaster." Salles moved to answer, but Lott put up his hand to silence him. He simply stood, staring..."
LATAM_bolivia_crisis.16.a: "Into the blood-red horizon of the fading twilight."
BRA_andean_treaty_collapse_crisis: "Through brinkmanship, Argentina has destroyed our economic treaty. With Bolivia on the verge of collapse, we will support our allies."

LATAM_bolivia_crisis.17.t: "Situação Normal: Tudo Fodido"
LATAM_bolivia_crisis.17.desc: ""Investigations as to which of the involved delegations first withdrew are ongoing. The atmosphere in the room was described as 'chaotic' and the minutes of the meeting are unclear. We believe the Bolivians had concerns around escalating tensions, fueling both Brazil and Argentina to further one-up their provocations."\n\n"It is the advice of this report that the collapse of the Tripartite provisions is now inevitable, and that Bolivia's government is likely to fall to a coup in the coming weeks. Furthermore, the regional instability this development has induced runs the risk of spreading to the Piraí, and involving Paraguay in another Chaco War."\n\n"In short, it's a disaster."\n\nAn understatement, to be sure, Alessandri thought. This sort of failure was career-defining, or at least had the potential to be. Northern Chile was no longer secure, he knew, and something would need to be done. Moments like these were the reasons a President was elected, the core duty of leading a nation.\n\n"Inform the Intelligence Directorate, I want the Army in the loop about the dangers of a spillover and sketching out potential scenarios. Have their covert assets gauge the situation in Bolivia more concretely, assuming the normal channels are on borrowed time."\n\nAs he formulated his country's response, Alessandri ruminated on the Brazilians. Were they committed to easing hostility in the first place, throughout the negotiations? Or, troubling as the thought may be, did those fools anticipate such a cataclysmic outcome? Was this nightmare an accident of history, or preordained?\n\nAs his Prussians changed their pointed helmets for steel ones, the President hoped he was not alone in the one emotion the events in South America conjured:"
LATAM_bolivia_crisis.17.a: "Disappointment."

LATAM_bolivia_crisis.18.t: "No More Half Measures"
LATAM_bolivia_crisis.18.desc: "Frondizi sighed. He turned his head to the window and saw it painted with orange from the sunset. The Casa Rosada was quieter than usual; a bad sign. With each passing day meetings with allies decreased while reports with worse news than the other increased proportionally. At this rate, Frondizi wouldn't be surprised if the next day, the next report was of an armed rebellion. And now that day was closer than he had calculated.\n\nFrondizi buried his face in his hands, beyond caring about his glasses. The Bolivian Treaty negotiation was a complete disaster, for the diplomatic corps and for himself. Everything that could go wrong did go wrong and at the worst time. It didn't matter if the Brazilians destroyed any chance of negotiation and refused to collaborate, the damage was already done - one which he would never recover. As if it wasn't enough that his government was already on a knife's edge, that was the last thing he needed.\n\nWhile Frondizi was preoccupied with his future, the intelligence service had no intention to take things lying down. Disappointed at their president? Absolutely. But enough is enough. These men were no petty coup plotters. And as much as it dismayed General Señorans to see the last bastion of discipline in the military going such a route, Argentina was in danger and she needed men like him more than ever.\n\nThe SIDE headquarters was filled to the brim with its highest-ranking members, all gathered in a large, poorly lit room. There was no sloppiness or unnecessary exchange of words, only a sense of duty unmatched by the incompetent politicians that failed them in La Paz. The rectangular table was covered with a map of Bolivia and its surroundings from vertex to vertex. Colored dots marked all that was necessary: cities, roads, and most importantly, resistance cells. With its multiplying arrows pointing to a singular face not-so-strange to new officers and well-known to old ones: General Gualberto Villarroel."
LATAM_bolivia_crisis.18.a: "New rules for new players for the same game..."
ARG_andean_treaty_collapse_crisis: "The Argentine diplomatic corps have failed, Frondizi has shown his weakness once again, it's time for the intelligence service to take over."

LATAM_bolivia_crisis.19.t: "Jovial Merriment, Soft Power, and a Lott to Drink"
LATAM_bolivia_crisis.19.desc: "Salles had to reflect with delight at the treaty's outcome, specifically, his biggest impact: the champagne. Maybe he was being far too modest regarding his own diplomatic abilities, but President Lott had outdone himself. It may not have been the tact taught at the Itamaraty, but it certainly worked, as Salles watched this "tact" at work.\n\n"Thank you all... my dear and beloved friends, and Quadros!" Laughs swept the room as Quadros couldn't help but joyfully smile even as he gave Lott the bird, himself absolutely sozzled on champagne as well. "I must thank the... uh... marvellous efforts of our diplomatic staff in jousting off the Argentine invaders from our treaty... er... thank you!"\n\nBrazil's diplomat-in-chief watched Lott stumble away, knowing the real story of his invaluable contributions. Lott may not have brokered the fine details of the treaty, but by simply ordering and drinking champagne by the gallon, he managed to put everyone at ease long enough for Brazil to seal the deal. The Argentines and Bolivians were flummoxed by this diplomatic assault!\n\nOf course, Lott just wanted to soothe any tensions, even if he wasn't usually a big drinker. Still, it worked, as the master ambled over to Quadros to celebrate. "Hey, Vice President, pour me another drink and I'll use my... delightful charm to make you less of an asshole." Quadros obliged with a toothy grin.\n\n"Is that what they taught you in the army? Drinking away hostile bottles of alcohol?"\n\n"Maybe, are you sure you were never in the army, Quadros?" They whiled away the night like this, as old and tired disputes between the two became history."
LATAM_bolivia_crisis.19.a: ""If you keep acting like this, Lott, I'm in danger of actually liking you.""
LATAM_bolivia_crisis.19.tt: "+1 §QFriend§!"

# Mining Wars

LATAM_bolivia_mining_wars.1.t: "The General's Return"
LATAM_bolivia_mining_wars.1.desc: "Five years. Five years trapped in an alien land far from his homeland, where every second that the pendulum clock ticked was a wasted second that could have been invested in Bolivia. Gualberto Villarroel was tired of it. He was tired of sending letters to friends without being able to see their faces again. He was tired of looking for any mention of his country in the news in the hope that an opportunity would present itself, only to see his return slip further and further away. And now that everything has gone to shit in those negotiations, only a miracle could grant his wish. Would he be given the mercy to die in his land one day? Or even have his remains buried together with homeland?\n\nLoud knocks on the door knocked Villarroel out from his thoughts. Tossing the newspaper and opening the door, he was addressed by five mysterious looking men grouped together. An untrained eye would recognize them as mere members of the diplomatic corps, just as their badges said; but Villarroel had known these men well enough to know their affiliations with the SIDE.\n\nTheir words came as they always did: short and cryptic, but some of them snapped Villarroel's attention: plans in Bolivia, rallying the MNR, and preparing for the situation. His heart began to pound with these words, could this be the return he had been waiting for? The Argentines didn't guarantee anything in that regard besides requesting his 'future collaboration'; typical. It wasn't like they were capable of making a miracle happen, but handing over his and his country's fate into the porteños' hands was a different thing. The last time Villarroel trusted them, he found himself being deposed and driven out from his country like a dog. But sometimes, circumstances are capable of forcing even partnerships that should have been long since forgotten and left only in the history books."
LATAM_bolivia_mining_wars.1.a: "And dying in Buenos Aires was not really an option."

LATAM_bolivia_mining_wars.2.t: "Giving Wings to Snakes"
LATAM_bolivia_mining_wars.2.desc: "Hugo Ángel was coughing nonstop, his lungs were burning. His eyes were irritated by the dust coming from the piles of copper that surrounded him. His arms were aching with pain from the weight of the load he carried as he crossed the enormous copper mine in the middle of the Bolivian forests. Plus, he had to try hard not to draw any unnecessary attention, but that was hard to do when he was a white criollo surrounded by mestizo workers.\n\nRegardless, Hugo carried on with his duty. For the time, he was now Mario Rojas and his task was simple: infiltrate the Bolivian mine with a false identity while carrying a secret load of weapons and ammunition just as planned; identify and enter a secret entrance into the labyrinth of the sweltering, claustrophobic tunnels just as planned; communicate and identify with the miners guarding a hidden safehouse just as planned; deliver the cargo to the MNR guerrillas garrisoned in the safehouse just as planned; and finally, leave the location without a trace and head to the nearest checkpoint to make contact with SIDE operators. All just according to the plan.\n\nHowever, what was not in the plans were the profiles of the MNR men whom he made contact with. Despite assurances of the loyalty of Villarroel's men, all that Hugo saw were brats mumbling about revolution, class struggle and other subversive nonsense. Were these the kind of people he was aiding now? Not that he was in the place to question the orders he was given, but as far as he was concerned, the SIDE was willing to tolerate and support Villarroel's loyal crypto-Peronists, not his wretched zurdos!\n\nBut one thing he knew: Villarroel had to take care of his godless Marxists one day in the future once he returned to power."
LATAM_bolivia_mining_wars.2.a: "Only if Hugo continues sending more weapons to his men, that is."

LATAM_bolivia_mining_wars.3.t: "Halcones and the Hunted"
LATAM_bolivia_mining_wars.3.desc: ""We knew there would be issues with Bolivia, but our boys in the SFICI have picked up something... concerning today." It was a skeleton cabinet meeting today - just Salles, Lott, and Denys cramped into a tiny room, pouring over an intelligence report. "The Bolivians raided some MNR outpost, insignificant by itself, but their stockpile was flooded with-"\n\n"Fucking Halcón ML-57 submachine guns, military-grade hardware." Denys was always one for getting straight to the point, much to Salles' displeasure. "Only the Argentines use them; they don't hand them out like candy - a clear sign of an intervention. They don't have many friends in Bolivia, so we believe they plan to bring back that despot, Villarroel, to power."\n\n"I concur on that point." Salles was pleasantly relieved to speak again. "Luckily, we can put on a media blitz here to counteract it. Pull on the usual strings with the local oligarchy; remind them how their investments will go up in smoke should the MNR pull off a revolution. Denys, I assume you can sway the army to this view?"\n\n"Absolutely. No patriot wishes to see their nation become some commie-nazi hellhole. None of our men would care to see us become a neighbor to such a country either. They'll stand by at our beck and call - just say the word, Lott, and we'll have them take more proactive measures to stabilize the situation."\n\n"If they are required, of course." Lott had all the info he needed now. "Salles, get Chile on the blower, let them know about Argentina's moves. They won't like it any more than us, so try to get them on our side. We need all the support we can get. Denys, see if our two agencies can share intelligence on this. I'll leave this in your capable hands until we meet again.""
LATAM_bolivia_mining_wars.3.a: "An appetizing prey attracts all comers."

LATAM_bolivia_mining_wars.4.t: "Calm Before the Storm"
LATAM_bolivia_mining_wars.4.desc: ""...and they're sure about this?" President Alessandri asked.\n\nThe officer from the Army Intelligence Directorate nodded. "The Brazilians have hard evidence: MNR groups are mobilizing all over Bolivia, most of them armed with Argentine weapons. It's clear they intend to restore Villarroel to power."\n\nAlessandri's brow furrowed. "After their antics during the treaty negotiations, I should've known they would try something like this. Those crypto-fascists always resort to force when things don't go their way. We obviously cannot allow Bolivia to become an Argentine puppet, so what are our options?"\n\nThe officer, clearly prepared for this question, smiled confidently. "We've already begun reviewing our assets in Bolivia. The copper mines owned by the Lukšić family will provide an ideal staging ground for our activities. We also have contacts inside the Falangist opposition, Bilbao Rioja's FSB, who can serve as our informants in anti-government circles."\n\nLetting out a sigh of relief, Alessandri smiled back at the officer. "Excellent. Tell the Brazilians we're willing to coordinate our efforts. We've already let Argentina derail our treaty - we can't let them steal Bolivia out from under us.""
LATAM_bolivia_mining_wars.4.a: "When the time comes, we'll be ready."

LATAM_bolivia_mining_wars.5.t: "Black Propaganda"
LATAM_bolivia_mining_wars.5.desc: "A brief escape from the Ministry of Foreign Affairs wasn't something Salles would usually relish, but these days, he gleefully took it. The offices were filled with nonstop phone calls, all to try and bring those deluded oligarchs to their side. Oh sure, Argentina could bribe them with "investments", but what good were they if the MNR burned it all? Idiots. Denys and Lott were waiting for him.\n\n"Sorry for the delay, gentlemen. My head is in pieces after trying to persuade those morons away from Argentina's money. I hate to say it, but we only have so many diplomats. Meanwhile, it seems they have an unlimited supply of funds for any half-wit with a factory to bring to their side." Denys' smiled for a second - a proud face - before laying his cards on the cable.\n\n"During World War Two, the British had this crafty trick. They printed fake German propaganda - over-the-top stuff - all to discredit the Huns. Usually, it was falsified documents discussing brutal occupation methods, anything they thought might stop Nazi collaboration..." His face turned sour thinking about Sealion. "...even if it didn't succeed for them - we can take a lot from it."\n\nAn imaginary bulb lit up over Lott. "You're a genius. We have plenty of examples of intercepted Argentine intel documents. It would be child's play for us to create some of our own - plaster them with the receipts of funding to the MNR. If we wave that in front of the oligarchy, they will leap into our arms as fast as you can say "nationalization". I love it!"\n\nSalles could not hold back his smile at Lott's glee. "I'll contact our Chilean compatriots. I'm sure they'll be as excited as you are. Best to coordinate this and ensure a greater impact on Argentina's position." Both Denys and Lott nodded in agreement as they went their separate ways to put the plan into action."
LATAM_bolivia_mining_wars.5.a: "Let the printing presses of war roll."

LATAM_bolivia_mining_wars.6.t: "Settling the Score"
LATAM_bolivia_mining_wars.6.desc: ""So, to summarize," said President Alessandri, "the Brazilians are planning to flood Bolivia with propaganda, claiming that Argentina is fomenting an MNR revolution?"\n\nThe officer from the Army Intelligence Directorate nodded. "That's it in a nutshell, sir."\n\n"It's a smart move," added Julio Philippi Izquierdo. "After their triumph in the Transandean Treaty negotiations, the Argentines are poised to dominate Bolivia. The only thing standing in their way is the political establishment. Turning those oligarchs against Buenos Aires may be the only way to avert disaster."\n\nSeeing that Alessandri wasn't fully convinced, he continued, "And it would be wise for us to aid them. We failed to coordinate with Brazil during the treaty negotiations, and the Argentines took advantage of our weakness. Now that we have one last chance to save Bolivia, we need a strong united front."\n\nAlessandri's expression hardened. "You're right Julio. We cannot allow another nation to become a satellite of those crypto-fascists." Turning to the intelligence officer, he asked, "What are our options?"\n\nThe officer smiled confidently. "We've already begun reviewing our assets in Bolivia. The Lukšić family owns many copper mines in the country, so their word will carry weight with the oligarchs. We also have contacts inside the Falangist opposition, Bilbao Rioja's FSB, who can help spread propaganda about MNR activities."\n\n"Excellent. Tell the Brazilians we're willing to coordinate our efforts. Argentina may have won the battle, but it will not win the war.""
LATAM_bolivia_mining_wars.6.a: "Turnabout is fair play."

LATAM_bolivia_mining_wars.7.t: "Job to Job, Body to Body"
LATAM_bolivia_mining_wars.7.desc: "It was just a job, and he was just a body for it. That's what Menandro kept thinking as he walked through the MNR rally. He considered himself apolitical; money was always more of a driver for him - especially when it made the difference between his daughter living or dying. Whatever, the boss gets what the boss wants, just as long as she gets her medication.\n\nIt was simple: go there and start a fight between the MNR and that oligarch party, AID. He kept repeating the words in his mind as he made his way through the crowd, trying to ignore the toughs trying to size him up. The man on the stage kept waving his hands about and shouting down the microphone; it was a nightmare for Menandro - he felt like he was in Nuremberg.\n\nAs he made his way to a clearing, he saw his target, some bigwig for the AID who happened to be speaking to the press. It was as ripe as it would ever be. "Oligarch! Oligarch! Oligarch!" His siren call went off like a klaxon - only amplified by his friend screaming for bloody murder. The MNR and AID began their brawl.\n\nIn its aftermath, the headlines were held hostage by reports of violent Argentinean-backed thugs wreaking havoc against the Bolivian establishment. Each newspaper that reported this story was armed with Brazilian finance, a detail ignored by oligarchs all too keen to find a new backer not associated with nationalist street violence.\n\nCuriously, one of the few men who did not read any of these newspapers was Menandro, presumably too busy with his new arrangements from the fight-"
LATAM_bolivia_mining_wars.7.a: "-six feet under, a stone throw to the head."

LATAM_bolivia_mining_wars.8.t: "Turning the Tables"
LATAM_bolivia_mining_wars.8.desc: "The SIDE had seen better days. Argentina had seen better days, if Eduardo Señorans were allowed to be sincere. It was fascinating how whenever the nation scored a decisive victory it quickly turned against them. But why? Was it merely bad luck, or some kind of curse? For Señorans, it was neither; it was lack of funds, incompetence of politicians, lack of discipline, poor leadership, unprofessional subordinates, and on and on went his list. No matter what excuses his colleagues invented, as far as Señorans and his strict manual were concerned, being spat on the face and having their ambassador asked to leave by the once compliant Bolivian oligarchs because OFN propaganda told them that Argentina was "funding terrorists organizations to destabilize the country" was an avoidable loss.\n\nWhat was left to do? Anguishing defeat in silence will certainly not benefit the Argentine nation on any level. But what could he do? A simple officer like him could not turn water into wine alone. A miracle always comes from above, after all. And that's exactly what came after Señorans read the telegram sent to his office: formalize Argentina's support for the MNR organization in their bid for power and turn the Bolivian's accusations into reality; orders from the SIDE director with the greenlight from the President of the Nation. Señorans couldn't ask for anything more.\n\nWith an emotionless face but renewed purpose, he promptly set himself to work. Methodically planning operations, directing orders, and arranging meetings with officers. All this done by one retired general in his 60s doing the work of five young privates with less than half his age."
LATAM_bolivia_mining_wars.8.a: "Imagine how much the SIDE could do if he was in charge."

LATAM_bolivia_mining_wars.9.t: "Situation in Bolivia"
LATAM_bolivia_mining_wars.9.desc: "STRICTLY SECRET AND CONFIDENTIAL\nBuenos Aires, - [?global.date.GetDateStringNoHourLong]\nINFORMATION REPORT N° 147/62\nFOR THE KNOWLEDGE OF: Arturo Frondizi Ércoli\nISSUE: Briefing Note in Bolivia\nSYNTHESIS:\n\nIn the past weeks the neighboring Republic of Bolivia has been in a state of idleness due to the upcoming General Elections, scheduled for the 1st of July of this year. Our informants estimate a comfortable victory for the AID(PURS) ticket despite their declining popular support, thanks to their known use of fraudulent methods.\n\nNevertheless, the opposition continues to grow in strength and support. Currently they are divided between two political organizations: the Falange Socialista Boliviana, led by the popular Chaco War hero General Bernardino Bilbao Rioja; and the Movimiento Nacionalista Revolucionario, supported by former President Gualberto Villarroel. Our efforts in promoting the MNR had had solid results so far, however their tenuous internal division could become a danger to our interests if left unchecked. We are monitoring their leftist wing closely as it presents a larger threat due to its subversive ideology and less obedient behavior to Villarroel.\n\nWe have detected multiple reports of violence between opposing groups across the country, several injured have been confirmed as well as sporadic fatalities, the exact toll is unknown. Tensions will remain high for this month, but the possibility of a dramatic escalation is unlikely. We predict the elections will be carried out normally despite heavy protests. The situation isn't expected to get any worse.\nWithout further ado, I salute you.\nJUAN CARLOS VARELA"
LATAM_bolivia_mining_wars.9.a: "The rope stretches even further..."

LATAM_bolivia_mining_wars.10.t: "A Day of Choosing in Bolivia"
LATAM_bolivia_mining_wars.10.desc: "TOP SECRET\nFOR THE PRESIDENT'S EYES ONLY\n\nBOLIVIA - INFLUENCE CONTESTED BETWEEN BRAZIL\nAND ARGENTINA\n\nNew elections in Bolivia will take place on the 1st of July. The result of these elections will be a victory for the AID, an electoral front between the Party of Republican Socialist Unity and the Liberal Party. The AID is in the pocket of local oligarchs who have rigged the election in their favor, common knowledge to most Bolivians who have long been dissatisfied with the system.\n\nThe opposition to this status quo has split between the Bolivian Socialist Falange and the Revolutionary Nationalist Movement. The Falange, or FSB, is dominated by Chaco War hero General Bernardino Bilbao Rioja, a personalistic figure who has wrestled control over the party from Falangist idealogue Óscar Únzaga due to his popularity.\n\nThe Revolutionary Nationalists, or MNR, are split in two themselves. While both wings support their current candidate, the exiled dictator Gualberto Villarroel, he is primarily indebted to the right-wing faction for support. Meanwhile, the left-wing faction is far from committed, preferring to remain independent. This division is ripe for exploitation to weaken Argentina's position.\n\nBoth groups have seen an upswing in support since the Transandean Treaty of Economic Cooperation, widely seen by Bolivians as only benefitting oligarchs. Despite claiming to be more popular than the current government, we still predict Enrique Hertzog's election to be guaranteed. Apart from reports of infighting between opposition groups and a few deaths, the situation appears stable and will likely remain so.\n\nORDEM E PROGRESSO"
LATAM_bolivia_mining_wars.10.a: "Sadly, the choice has already been made for most."

LATAM_bolivia_mining_wars.11.t: "Elections in Bolivia"
LATAM_bolivia_mining_wars.11.desc: "REPORT ON THE SITUATION IN BOLIVIA\nCLASSIFIED: TOP SECRET\nSantiago, [?global.date.GetDateStringNoHourLong]\n\nElections in Bolivia are scheduled to take place on the first of July 1962. The ruling AID, an electoral front between the establishment parties PL and PURS, is widely expected to win despite historic unpopularity. Their victory is essentially guaranteed as the ruling oligarchs use electoral fraud to remain in power, a well-known fact for all politically active Bolivians.\n\nOpposition to the oligarchs is made up of two groups: Falange Socialista Boliviana and the Movimiento Nacionalista Revolucionario. The FSB was founded by unruly ideologue Óscar Únzaga, but now the charismatic General Bernardino Bilbao Rioja, a hero of the Chaco War and Chilean intelligence asset, has taken control of the party. The MNR is divided into a right wing, loyal to exiled former president Gualberto Villarroel, and a left wing whose support for Villarroel is more conditional. Exploiting this division will be key to disrupting Argentine efforts in the country.\n\nBoth the FSB and the MNR have grown rapidly as a result of the Transandean Treaty of Economic Cooperation, which the people saw as another attempt by the oligarchs to sell out Bolivia for their own benefit. The opposition groups are now holding rallies across the country, with both often drawing far larger crowds than the AID.\n\nSporadic incidents of violence between FSB, MNR and government supporters have been reported, resulting in numerous injuries and an unknown number of deaths. Although the situation remains volatile, field agents do not expect things to deteriorate further. The opposition will not be able to stop the election and inauguration of Enrique Hertzog, and conditions will stabilize soon after.\n\nForward immediately to President Alessandri."
LATAM_bolivia_mining_wars.11.a: "A lot of smoke from a small fire."

LATAM_bolivia_mining_wars.12.t: "Bloody Memories"
LATAM_bolivia_mining_wars.12.desc: "Thank fucking Christ! Mateo growled in relief. After hours of sneaking through La Paz like a rat, he finally found the safehouse which the SIDE, in its infinite kindness, had prepared to only fit a man and a radio older than Mateo himself that still operated in Morse code - discretion, they said. But Mateo didn't care anymore. He just wanted to collapse in the chair and spend the rest of his life there. But just as his adrenaline started to drop, the memories began rushing back to hit him like a train.\n\nFirst, there were a mass of people protesting in the streets, nothing out of the ordinary. Then, they began marching towards the Palacio Quemado, growing in size and anger as they approached their target, with Mateo watching from afar. His task was to just observe the situation and report back. But he let himself get too close. He was right about to witness history happening and his inner child got the best of him.\n\nWhat a foolish mistake. The first shot that burst in the air knocked out his ears before he realized what had happened. The last glimpse from the palace he caught before being pushed away was of a long belt of uniformed men and flashes erupting from their rifles. There was no warning, there was no civility, just a collective fight for survival. As he managed to free himself from the turbulence of people, Mateo's eyes would see it. A girl, lying motionless on the sidewalk. In any other day she would have been recognized as no more than 14 years old` if one could look at her, if it weren't for the bullet that disfigured her face.\n\nThat memory of the blood nearly made him vomit. He'd see her in his nightmares, he'd see her until his final days.\n\nGod, he was sick of it. Fuck Bolivia, fuck this city, he just wanted go back to his home in La Plata and hug his mother. His superiors, and all those "men" could keep playing God with the lives of the innocent, but he was just done with this cursed country."
LATAM_bolivia_mining_wars.12.a: "And this would be his last report before he would ask to be shifted to anywhere far from this hell."

LATAM_bolivia_mining_wars.13.t: "The Thin Red Line"
LATAM_bolivia_mining_wars.13.desc: ""Jesus Christ... what have they done?" The scenes of tragedy from the Comercio Massacre were laid out on the table, all to Lott's horror. Some of the bodies were scattered, protestors fleeing the scene after shots were fired. Others were more organized - lined up against walls. Lott tried his best not to think about it.\n\n"It's a shame, but we must think how this affects Brazil." Lott glared at him yet decided not to raise his voice. "I believe Mr. Salles and I are in agreement on what to make of this situation, so I will let him lead."\n\n"Thank you, General." Lott was surprised; it was rare to see them so unified. "Following the coup, the facade of Bolivian democracy has vanished, leaving General Alfredo Ovando Candía as the country's sole authority. To put it bluntly, he rules Bolivia as a dictator, but he's the best we have. We recommend giving critical support to his regime."\n\n"Walther here gives the civilian view, but let me speak to you as a military man, Lott. Bolivia is on the precipice of anarchy - inches away from descending into a paradise for all sorts of commufascist parasites - Ovando is the one man stopping this from happening. If the words 'Order and Progress' mean anything, we must support this man and restore order."\n\nThe President sighed as he took one last look at the photos. "Tell him he can have whatever we can supply." Denys and Salles nodded before walking out as Lott tossed the pictures into his bin."
LATAM_bolivia_mining_wars.13.a: "Ovando's a bastard, but he's our bastard."

LATAM_bolivia_mining_wars.14.t: "The Storm Breaks"
LATAM_bolivia_mining_wars.14.desc: ""My god..." Alessandri murmured, staring at graphic photos of the Comercio Massacre and its aftermath, "to think that such barbaric acts still take place on this continent."\n\n"This turn of events is far from ideal." replied Julio Philippi Izquierdo, looking up from his own copy of the report, "but the Brazilians are supporting Ovando. They think he's the only thing keeping Bolivia together. I'm inclined to agree with them, for now at least."\n\n"You don't sound very confident, why is that?"\n\nPhilippi Izquierdo pursed his lips. "The Bolivian military is fiercely nationalistic. It's been eighty years since the War of the Pacific, but they've never gotten over the loss of Antofagasta. We have every reason to believe they'll be hostile to Chilean interests, and we're already seeing signs of that."\n\n"Signs?" Alessandri asked, "What signs?"\n\n"Didn't you read the end of the report? Ovando's new government has appointed ambassadors to Brazil and Argentina, but has pointedly failed to send one to us.""
LATAM_bolivia_mining_wars.14.a: "We cannot stay this course for long."

LATAM_bolivia_mining_wars.15.t: "Unrest in Bolivia"
LATAM_bolivia_mining_wars.15.desc: "STRICTLY SECRET AND CONFIDENTIAL\nBuenos Aires, - [?global.date.GetDateStringNoHourLong]\n\nINFORMATION REPORT N° 148/62\n\nFOR THE KNOWLEDGE OF: [ARG.GetLeader]\n\nISSUE: Unrest in Bolivia\n\nSYNTHESIS:\n\nThe situation in the Republic of Bolivia is chaotic. Contrary to our expectations, the administration established by General Ovando Candía had failed to stabilize the nation. There is no doubt that our northern neighbor is facing a real threat of revolution or perhaps worse, should the unrest escalate.\n\nSeveral mines have already been taken over by workers as unions from all over the country go on strike. Multiple skirmishes between disorganized government forces and insurgents have been reported as well, mostly localized in the Andean interior, spearheaded by the oppositionist organizations of the FSB and MNR. Amidst the confusion, many groups are taking the opportunity to increase their influence. So far, our agents managed to identify six factions that are currently competing for power: the military, the police, the elites, the peasants and the unions.\n\nOur primary objective in this conflict is to ensure our loyal allies in the MNR come victorious, while keeping their internal faction of marxists and bolsheviks in check, precautionary measures are already being taken. In the following days, the SIDE will prepare a series of recommendations and procedures on how to accomplish this task.\n\nWithout further ado, I salute you.\n[GetARGIntelligenceHead]"
LATAM_bolivia_mining_wars.15.a: "The time for talks is over, time to get our hands dirty."
ARG_intel_juan_carlos_varela: "Juan Carlos Varela"
ARG_intel_ernesto_taquini: "Ernesto Taquini"
ARG_intel_jose_cornejo_saravia: "José Cornejo Saravia"

LATAM_bolivia_mining_wars.16.t: "Out of the Frying Pan..."
LATAM_bolivia_mining_wars.16.desc: "TOP SECRET\nFOR THE PRESIDENT'S EYES ONLY\n\nBOLIVIA - INFLUENCE CONTESTED BETWEEN BRAZIL\nAND ARGENTINA\n\nIn the immediate aftermath of General Ovando's coup, far from stabilizing the situation, it has only made it more volatile. Now, our intelligence suggests there is a very real possibility of a revolution taking place in Bolivia.\n\nThe ruling government is struggling with an onslaught of attacks from the FSB and the MNR. Both groups are inciting unions to go on a general strike in protest of the military junta, alongside organizing active insurgencies against government forces.\n\nWe have identified five institutions in which these groups compete for power: the military, the police, the elites, the peasants, and labor. It is in our interests to aid La Paz and the military regime against the MNR and the FSB, which have Argentinean backing and exigent sympathies for Chile, respectively. We will soon draft a list of actions to accomplish this goal.\n\nORDEM E PROGRESSO"
LATAM_bolivia_mining_wars.16.a: "...into the fire."

LATAM_bolivia_mining_wars.17.t: "Landlocked Sapphire"
LATAM_bolivia_mining_wars.17.desc: "FOR AUTHORIZED EYES ONLY - [?global.date.GetDateStringNoHourLong]\n\nDIRECCIÓN de INTELIGENCIA del EJÉRCITO\n\nSANTIAGO de CHILE\n\nSITUATIONAL INTELLIGENCE REPORT (153/62)\n\nCONCERNING: REPÚBLICA de BOLIVIA\n\nSUMMARY:\n\nThe military coup carried out by General Alfredo Ovando Candía, in the aftermath of the Comercio Massacre, has entirely failed to calm the domestic situation in Bolivia. Contrary to prior projections, we now believe that the conditions for revolutionary upheaval exist within the country.\n\nAt present, the Ovando junta is engaging in a concerted effort to prevent both the insurrectionary FSB and MNR organizations from carrying out further attacks, and hitherto all indications point to their failure. Furthermore, a general strike called by left-wing radical unions, and workers influenced therein, has quickly deteriorated the economic situation.\n\nThe various revolutionary factions are openly competing within social stratas (elite, peasantry, laborer) and institutions (the military and police) for influence. The unprecedented scale of their maneuvers makes clear that all but Ovando himself expect his junta to fall, perhaps within weeks.\n\nWe have made conciliatory overtures towards the new Bolivian government, granting timely recognition despite their expressed and untimely revanchism towards Antofagasta. However, given the described situation, we recommend establishing preliminary contact with the FSB. While a revolution in Sucre and La Paz would be a significant setback to our efforts, the likelihood of one makes 'steering' it in a more favorable direction imperative.\n\nThe FSB, unlike the Pro-Argentine MNR, has favorable connections to Chile (their manifesto was published by exiles at the then-named School of Arts and Careers in Santiago) and at present General Bernardino Bilbao Rioja acts as a moderate leader within. He is also an asset of our intelligence service. Thus, a managed support to his faction may be the best course in the anticipated post-Ovando reality.\n\nFor the immediate consideration of President Alessandri."
LATAM_bolivia_mining_wars.17.a: "To rust still the revolving door?"

LATAM_bolivia_mining_wars.18.t: "A New Asset"
LATAM_bolivia_mining_wars.18.desc: "FOR AUTHORIZED EYES ONLY - [?global.date.GetDateStringNoHourLong]\n\nDIRECCIÓN de INTELIGENCIA del EJÉRCITO\n\nSANTIAGO de CHILE\n\nSITUATIONAL INTELLIGENCE REPORT [153/62]\n\nCONCERNING: REPÚBLICA de BOLIVIA\n\nSUMMARY:\n\nA significant development has taken place regarding our interests in Bolivia. Ovanda has delivered a proposal to organize talks on the "Antofagasta Question." It has been made clear to our ambassador that this is the only way for positive developments between our nations to continue, and we are sure that if we were to hold such talks then further demands would be laid on us. Needless to say we do not consider La Paz to be in the position to take such demands and their continued intransigence on contentious issues has ruled out any possibility of our collaboration with them. We have instead entered talks with the FSB, and plan to offer material support.\n\nOur main contact has been Bilbao Rioja. He thankfully feels indebted to us for the support we offered him following his exile in 1939. We believe him to be moderate and adaptable, and less ideologically committed. We are also watching Óscar Únzaga, a rival to Rioja who is far more ideologically driven. Thankfully he seems far from the reins of the FSB and is currently powerless, though envious of Rioja's position.\n\nWe have informed our agents in Bolivia about the end of our collaboration with Brazilian intelligence as we now have different aims in the country. Further actions will not be amicable.\n\nFor the immediate consideration of President Alessandri."
LATAM_bolivia_mining_wars.18.a: "The FSB can be our pawn."

LATAM_bolivia_mining_wars.19.t: "The Santiago Backstab"
LATAM_bolivia_mining_wars.19.desc: ""'...we believe it is in the best interests of the Chilean people to stop sending aid to a dangerously unstable military dictatorship. We will instead be supporting a legitimate representation of the people, the FSB. Unlike the other Falangists, Bilbao Rioja is a statesman. We advise Brazil to take the same route if they wish to prevent Bolivia from becoming an Argentine dominion.'"\n\nSalles bitterly lowered the report to witness Lott's furious face. "Those traitors. Never did I think they would stoop so low to support those damned fascists." His fist slammed onto the desk to punctuate his anger.\n\n"It's not about ideology - it's about power - I wouldn't hold it against them too much. Regardless, we need to remain cool. Chile is still our ally against Argentina, and this is a very precarious situation - an uphill fight. Therefore, we should send them back some diplomatic nonstatement and focus on protecting the government."\n\n"Fine, make it so." The President was far from pleased, but he accepted it, and that was as much as Salles could ask for. It didn't matter who was on their side in the end; they would still fight for what they knew was right."
LATAM_bolivia_mining_wars.19.a: "Brazil stands alone in the fight for order."

LATAM_bolivia_mining_wars.20.t: "Las Guerras Mineras"
LATAM_bolivia_mining_wars.20.desc: "The latest events in Bolivia have given Latin American newspapers a lot to talk about in the past weeks. Every day there was something "new" in the newspapers: another mine that went on strike, more shootings between the government and the insurgents, more Bolivians crossing the border to escape the violence, and more wild stories the editors invented to accompany their overly bold headlines and grainy photos of another unidentified body. Once again, the laughing stock of South America found itself surrounded by vultures, relishing for more influence and one more headline.\n\nIn the neutral Oriental Republic of Uruguay, this had been no different. Most notably, in the weekly 'Marcha', revered as the most respected newspaper in the Platinean country despite being criticized for its obvious sympathies to the leftist MNR revolutionaries. But what caught the attention of not only the Uruguayan citizens, but also the world, were not the essays discussing the consequences of imperialist interests and oligarchy mismanagements on Bolivia and its people, but rather, as is customary in journalism, what was on the cover. Previously an idea proposed by the journalist Eduardo Galeano, striving to bring the spotlight to the injustices suffered by the Bolivian people because of petty foreign interests over their natural resources, he suggested baptizing the struggles in Bolivia as "Las Guerras Mineras". The director, Carlos Quijano, approved the creative idea and so it was printed the following day.\n\nA few days later, rival newspapers began to copy the name for their tabloids. More days passed and the name was already adopted by the Argentinian 'Primera Plana' and the Brazilian 'Última Hora'. And, soon after, the term was already being picked up in the New York Times and the rest of the American press as well."
LATAM_bolivia_mining_wars.20.a: "And the "Mining Wars" would spread like wildfire around the globe's newspapers."
bolivia_crisis_mining_wars_tooltip: "The chance for diplomacy and peace has been destroyed with the Commercio Massacre. Now all that is left is to achieve victory."

LATAM_bolivia_mining_wars.21.t: "The Road Not Taken"
LATAM_bolivia_mining_wars.21.desc: "After everything Denys had told him about Ovando, Golbery do Couto e Silva was... disappointed when he met the man in person. Ovando was a jittery bag of nerves. Today's strategy meeting in the Presidential Palace turned war room did not disprove this.\n\n"We are seeing regions fall out of our control, nationalist agitation in the security forces, and the Falange on Chile's borders." Sweat coagulated along the General's forehead. "This coup was a mistake. I have nothing, and the people will soon lynch me like they tried to do with Terrazas. Lord, please forgive me..."\n\n"General." Silva barely raised his voice, yet the word lingered like a knife at Ovando's throat. "Get a hold of yourself." The room's eyes shifted over to him.\n\n"The time for talking has failed. More forceful methods are needed." He had to resist the urge to smile - an opportunity to experiment with counterinsurgency - all the better to do it here than in Brazil. "The way I see it, we have two groups in two climates, but we must focus on one."\n\n"If I may speak." Silva nodded at a Bolivian officer with a chest full of medals, trying not to think about how many were earned. "Our urban areas should be the focus here, considering they house the MNR. Afterward, we should be able to rein in the countryside. Safe and easy-" A younger officer interrupted.\n\n"'Easy targets are not how we win wars. We may crush the communists with ease, but those Chileans will let the Falange weave in and out of the countryside like rats." He turned his eyes to Silva with intent. "Silva, if we don't crack down on rural discontent, we will slowly and assuredly be strangled to death by the peasantry."\n\nWhile Ovando vacillated, Silva had to choose."
LATAM_bolivia_mining_wars.21.a: ""Clearing out urban areas is an easy win, let's start there.""
LATAM_bolivia_mining_wars.21.b: ""The countryside will kill us if we don't act, let's focus on it first.""

LATAM_bolivia_mining_wars.22.t: "Shutting Down the Clubs"
LATAM_bolivia_mining_wars.22.desc: "Patrolling the countryside would have been a nightmare, but thanks to Brazil, they had the antidote in their arsenal. A whirlybird. It covered miles in minutes - the work of twenty men done by one machine. Above the Bolivian countryside in this machine were Generals Golbery do Couto e Silva and Rogelio Miranda, both representing a different army.\n\n"Alright, our boys on the ground have mopped up a bunch of the rural Falange. Your guns work like wildfire against the cockroaches." Miranda had to scream every word out to Silva. His hand swayed over the approaching hacienda. "We have another problem now. The traitors in our midst..." Silva looked to see Bolivian soldiers carting out munitions from the plantation.\n\n"We're neck-deep in Falange land; I can only assume the farmers here were supplying them." Miranda nodded. Silva noted how he was doing his homework. "I respect you coming out here with me. We have enough generals sitting comfortably in the capital, but not enough willing to get into the thick of it." Ovando's name wasn't mentioned, but it was heard by both men.\n\n"Thank you, General. Our new issue is what to do with these disloyal Haciendas. On one hand, we can break them up and distribute them to local farmers - buying us a lot of loyalty and goodwill with them. But, it might be safer just to hand off the plantations to our more Hacendados - allows a better defense of the areas too." He was at an impasse, needing a second opinion.\n\nAs Silva thought about what he would do if it was Brazil, finally concluding that:"
LATAM_bolivia_mining_wars.22.a: ""This is a war of hearts and minds. Divy up the lands; the Hacendados will still need us.""
LATAM_bolivia_mining_wars.22.b: ""The Hacendados are already loyal. No point risking land with potential Falange sympathizers.""

LATAM_bolivia_mining_wars.23.t: "Reborn Under Punches"
LATAM_bolivia_mining_wars.23.desc: ""Seven hours," Miranda spoke to his Brazilian counterpart in the darkened corner of a disused auto parts warehouse, a place no dissident wants to see the inside of. "He's a tough bastard, but we worked him well." He lit a cigarette and passed one to Silva, observing his bruised and bloodied knuckles. "Special treatment - only light stuff - for now."\n\nSilva was already given his brief before arriving. The man unconscious in the chair was a Nationalist trade unionist who turned himself out of some moral pang in his consciousness. Silva wondered if he regretted it by now. As he watched the desolate figure, he almost missed Miranda speaking.\n\n"We've opened up his secrets - the Nationalists aren't as united as they care to admit. Some of the rightist elements are concerned that the leftists are pushing them too far, revolutionaries not agreeing on where to take the revolution, the usual. So, this brings us back to our friend." Miranda stared with contempt at the battered husk on the chair. "He's offered to become a turncoat."\n\n"Thank you, General. Wars aren't won with white gloves, so I admire a man willing to get his hands dirty." Unlike Ovando, whom Silva bitterly imagined screaming his head off in his palace-turned-bunker. "What do you make of this? Do you think this rat is worth the trouble?"\n\n"The way I see it is that the Nationalists have something big planned, and having a man on the inside will not disadvantage us in the slightest. However, we could always make an example of him in the courts. Show these revolutionaries what it means to go against the rightful government and discourage others from following in their footsteps, but what do you think?"\n\nAssuming the mantle of a judge, Silva gave his verdict:"
LATAM_bolivia_mining_wars.23.a: ""Turn him loose. We'll cut him to pieces for intelligence afterwards.""
LATAM_bolivia_mining_wars.23.b: ""Drown the rat. Show them we mean law and order.""

LATAM_bolivia_mining_wars.24.t: "A Nation in Motion"
LATAM_bolivia_mining_wars.24.desc: "Gunshots marked a new day for most in the capital - an oddity until now. Silva made his way to and inside the Presidential Palace, barricaded and boarded up as the nation's state of siege captured it. Inside the war room stood Miranda marking a map, and Ovando pacing up and down the room speaking out loud, putting on a thin veneer of calm.\n\n"You heard it on the radio, right? 'A full-blown National Revolution', that's what they are calling it; I thought they were already on the offensive. We have traitors up to our eyes in the military police, workers lining our streets calling for my head, miners streaming into our cities to wreak havoc..." Ovando stopped for a second in motion and speech. "Our centre has collapsed. We're fucked."\n\nMiranda looked up from his map to chime in. "I believe you forgot to inform Silva about the reports from our Air Force's reconnaissance, President." He glanced at Ovando for a second - a man breaking into utter panic - before deciding to just tell Silva himself. "They have observed streams of Falangists coming to the capital for a 'March on La Paz', how original."\n\nBy now, the President had sunken onto the floor, the panic in his voice replaced by a sullen acceptance that his death was imminent. "That's it then. Little chance that they all kill each other and go home? Nope. They'll march into this palace, put my head on a stick, and declare their commiefascist revolution complete. What's the point anymore?"\n\nSilva had given up attempting to sculpt Ovando into a proper leader. "Don't you see? This is their final push, an attempt to use everything to tear the nation into anarchy. After we survive this, they'll be spent, and we can mop them up easily." Silva's rendition of his Plan A soothed the President slightly. His Plan B of calling for a helicopter and bolting if they did succeed was best left unsaid."
LATAM_bolivia_mining_wars.24.a: "One final push to change the fate of a nation."

LATAM_bolivia_mining_wars.25.t: "Order Over Chaos"
LATAM_bolivia_mining_wars.25.desc: ""Thank you, and the best of luck with the rest of your Presidency." With those words, Silva shut the door to Ovando's office and began his trip back to Brazil. After all the panic surrounding this supposed ultimate showdown in La Paz, the climax never came. The revolution was a farce, failing to win the support of the majority, petering out except in the hearts of a few diehards.\n\nThe Nationalists formed a rival government, but that failed dictator couldn't muster anyone past those who already supported him. Silva figured most people preferred a dictator who at least maintained a facade of democracy. The march on La Paz experienced a similar death as their numbers gradually peeled away against greater-than-expected resistance.\n\nHe had to smile to himself. Despite Ovando's flailing indecisiveness and total lack of leadership, they won. Silva felt that it would be self-deceiving if he did not pride himself on this achievement, in particular, his counter-insurgency techniques. He took out a pen and began recording them - in fear of the day that it would be needed in Brazil.\n\nThe helicopter awaited him as he took one more look at the Presidential Palace - in dire need of repairs. Ovando's time in office would be short - his cadre could smell the weakness off of him from a mile away - his inaction only proved it. Silva hoped Miranda would be his inevitable successor - he was the man Bolivia needed - a man able to maintain order.\n\nIn the air, he gazed towards Brazil, considering the need to maintain order in his own nation..."
LATAM_bolivia_mining_wars.25.a: "...realizing the military was needed now more than ever to protect Brazil from itself."

LATAM_bolivia_mining_wars.26.t: "Revol!"
LATAM_bolivia_mining_wars.26.desc: "How could he have been so blind? Silva did not break his walking pace as he made his way to the last chopper out of La Paz. While his other advisors were more anxious to escape, he could not help but be more preoccupied with how those damned communists managed their revolution rights under the nose of the government, the Nationalists, and the Falangists.\n\nThe situation was almost tragic to him. Everyone was so wrapped up in their own power games that they failed to band together against the greatest threat of all. If it had been a quick knock-out blow in La Paz, the reds wouldn't have been able to gain their in, but it wasn't.\n\nLa Paz was a stalemate, a meatgrinder where ivory-tower commanders like Ovando could only able to throw more and more men into it. On reflection, it seemed inevitable that some socialist agitator would take advantage, even if the thoughts of such disloyalty in an army pained him. In this instance, the agitator was Juan José Torres, Bolivia's answer to Castro.\n\nTorres was the great man of the "people's national revolution", a fancy phrase to describe left-wing military men seizing power to institute a totalitarian dictatorship. For now, it meant a "purge of reactionary elements", meaning an immediate firing squad for the oligarchs, Miranda, and Ovando. Admittedly, he wouldn't mind attending the last one, but he had a flight to catch.\n\nAs he got onboard, Silva bid an unhappy farewell to a failed experiment in counterinsurgency. There were lessons to be learned here, most worrying of all, the possibility of a similar revolution happening in Brazil..."
LATAM_bolivia_mining_wars.26.a: "In a war between reactionaries, the revolutionary class craves defeat and stalemate."

LATAM_bolivia_mining_wars.27.t: "Revol!"
LATAM_bolivia_mining_wars.27.desc: "One! Two! So went Silva's dismal two-step into the helicopter. The General would have preferred if his trip back to Brazil was as a hero, but that wasn't to be. He would come home with only a wave of searing anger at himself for underestimating the Falange during his counterinsurgency as a souveneir.\n\nWatching La Paz drift into nothing, he realized it wasn't all his fault. President Ovando wilted and died the moment he heard about the March on La Paz, and unsurprisingly, he let them walk all over him as their march grew and grew until its authority was supreme. Their government, alongside the rival Nationalist one, quickly crumpled after this show of force.\n\nIt was embarrassing. If Ovando had shown an ounce of will instead of having the government flee at the first sign of trouble, the march would have collapsed like a paper tiger. Ultimately, the march succeeded, but not in immediately toppling the government. It was instead able to show the people how much popular support they had, rendering any opposition unsustainable.\n\nHad it been a straight fight, they would have easily won, even accounting for the Chilean's support. But it wasn't. A rag-tag "people's army" cowed them into submission. Silva would have found it funny if the pain wasn't so recent.\n\nSadly, the scenario was deadly serious. Brazil was not immune to such a scenario either. As he wrote and took notes on the lessons learned from the counterinsurgency, he prayed that he would never see it take root in his homeland."
LATAM_bolivia_mining_wars.27.a: "People power is not to be underestimated."

LATAM_bolivia_mining_wars.28.t: "Revol!"
LATAM_bolivia_mining_wars.28.desc: "Even over the helicopter's blades fluttering away from La Paz, Silva could still hear those wretched loudspeakers broadcasting Nationalist propaganda, a grim reminder of how they lost. After they reached the capital, the MNR seized control of several government buildings, either by force or sympathetic employees. Then, the nation heard Villarroel's voice.\n\n"People of Bolivia, the National Revolution has begun. Join us to liberate our nation." Even thinking about it infuriated Silva. He wasn't sure about the Falanagists, but the government's soldiers seemed to swarm to the message like bees to honey, unable to surrender fast enough to join the winning side. After that, it seemed like civil war was the only option left.\n\nIn his usual brilliance, President Ovando announced his surrender while the rest of the military deserted La Paz. To give him a modicum of credit, Silva knew Brazil could not support him in an outright civil war; the optics were too bad. However, he also knew this situation would have never happened had they won enough popular support.\n\nThe Falangists didn't have popular support, as shown when their march crumbled away. The Nationalists infiltrated the urban areas, spreading their message like wildfire to the disaffected, exponentially increasing their base. If forced into the countryside, they would never have had such opportunities.\n\nSilva sighed as wrote down these lessons in his notebook. Politics was usually out of his realm except in dire circumstances. Therefore, he could only pray that Lott and his eventual successor could maintain the people's support against any internal threats."
LATAM_bolivia_mining_wars.28.a: "We had their minds, but their hearts were captured by the enemy."

LATAM_bolivia_mining_wars.29.t: "A Legacy of Unrest"
LATAM_bolivia_mining_wars.29.desc: ""'Expropriated by their rightful Bolivian owners?' What the hell do you mean? That's Brazilian property you're talking about." With these work stoppages, Tiago could do nothing but listen to his foreman on the phone to Bolivia. It didn't paint a pretty picture, but it was entertaining. "Burn in hell, you communist bastards. I'm going to come over there and put my foot up your- hello, hello?"\n\nThe door slammed open as Tiago tried to look busy. "Attention workers." A loud feedback hiss caught their attention as the foreman struggled with the megaphone. "To those not keeping up with the news, Bolivia has overthrown their rightful government in favor of a dictatorship. This new dictatorship has illegally nationalized Brazilian holdings in Bolivian mines."\n\nThe workers still looked dumbfounded as the foreman realized he needed to simplify it. "In short, this means we have no metal, and no metals means work on the Amazonian highway will progress very slowly. For now, we will continue, but some of you may be made redundant until the metal supply returns to normal. Apologies for the inconvenience. Back to work."\n\nRoars came from some of the workers, but Tiago could only think about what this meant. Obviously, the nationalizations would not just affect them; this would affect Brazil's industry as a whole. But even more pressingly, metal prices will soon reach an all-time high. And with such a resource in high demand, the prices of everything else would go up in tow.\n\nTiago tried to go back to work. He was pleased he had his job, but for how long. He looked around at his fellow workers; they all looked furious, but were they ready for a revolution? He didn't know. The markets will rebound - they had to - otherwise, things would get very nasty..."
LATAM_bolivia_mining_wars.29.a: "Could Brazil follow in the footsteps of Bolivia?"

LATAM_bolivia_mining_wars_epilogue.1.t: "Test Round"
LATAM_bolivia_mining_wars_epilogue.1.desc: ""Fire!"\n\nWith a word, a surge of noise echoed across the arid plateau, as the barrels of the guns peered out into the unending expanse. Rogelio Miranda stood clutching his binoculars, gazing into the distance, slyly grinning at his guest. Golbery do Couto e Silva mimicked the expression in approval. True, they were at a military installment only a couple of miles from La Paz, but he could see the men right in the depths of the Chaco Plain, bringing a bit of competence where previously only pure anarchy had reigned.\n\n"If only there were a couple more of them to man the frontier," sighed the Bolivian general. "You know, it's not easy to find any hands free after a war, even if you've won one. Especially with politicians like ours," he grumbled. He put down his binoculars and frowned.\n\n"Heck, even our own commanders. Yes, we should thank Ovando for helping us win the Mining Wars. But have him in charge? Of the whole country? Even the rebels would have done a better job," to which do Couto e Silva's eyebrows raised.\n\n"We can deal with that later, General, but first, there is a lot on the agenda to do for right now." He produced a manila folder with the Brazilian military seal stamped on the cover. "It's called the National Security Doctrine. This time, we have seen fit to be proactive, not reactive, against dissident activity. I'd advise you to read it in full. I'll be back in a moment."\n\nThe general scanned through different sections of the folder, noticing phrases like blacksites, arrest warrants, and spies, alongside reams of names on lists. Even names of Brazilian officers and departments to help support the strategy. He glanced back at the Minister of War, chatting to an aide, not even looking back. Another boom reverberated across the plain."
LATAM_bolivia_mining_wars_epilogue.1.a: "'Fortress Bolivia is in development."

LATAM_bolivia_mining_wars_epilogue.2.t: "Initial Findings"
LATAM_bolivia_mining_wars_epilogue.2.desc: ""Well, Mr. President, thank you for coming down to Plano Piloto to see us today," murmured the Minister of War, barely audible over the deafening jet engines outside. He responded by projecting his voice, one eye on his brief. "Only good news from Bolivia. Fifty arrested this week in connection to dissident activity, five or so fascist and communist plots against the state..."\n\n"That's great to hear, Golbery." Lacerda fiddled with a pen on the coffee table, mouthing the numbers as he tried to ignore the rumbling of the furniture in the room. "Well, in terms of arrests, that leaves quite a few to go, but at least we're making progress."\n\n"Absolutely, the Armed Forces are hard at work," asserted do Couto e Silva. "But it would have gone a hell of a lot slower if we did not have the measures the National Security Doctrine authorized. In fact, I think we have such a marked improvement in effectiveness we ought to copy some of these ideas here."\n\nThe President stopped fidgeting. "Here? So soon?" His eyes widened, almost as if to shake do Couto e Silva down and ask him to get serious. The Minister of War did not even crack a smile back. The Doctrine was always meant to be an experiment for use cases in Brazil, sure, but the suddenness of it all left him with doubts.\n\n"Hm. I do take your point that some Bolivian tactics might be useful if... worst comes to worst, but we don't want people to start asking questions too early. Best to draw up a plan, make a report and do some comparisons, then come back to it. Is that alright?"\n\n"Of course, Mr. President. Enjoy the rest of your time here," do Couto e Silva announced as the President got up. Once he nervously shuffled out the office, the old general smacked his lips, reset to his traditional frown and sighed."
LATAM_bolivia_mining_wars_epilogue.2.a: "There's no use in a doctrine if you don't follow it."

LATAM_bolivia_mining_wars_epilogue.3.t: "Casino Bolivia"
LATAM_bolivia_mining_wars_epilogue.3.desc: "Laudo Natel was not just a chief of staff, but an accountant. Thus, a Brazilian victory in the long grind that was the Mining Wars afforded him not merely relief, but extra reports to attend to, whether he liked it or not. At least there were few calls to make and few heartstrings to pull this time - those were the spoils this victor was most grateful for.\n\nAdhemar and the Planalto Palace were not the only winners, however: a sudden surplus of expropriated Argentine and Chilean mines meant open season for São Paulo. Natel noted the frequent appearance of Petrobras, Companhia Vale do Rio Doce and even a Matarazzo or two in the reports, with big plus signs next to their revenue listings. The numbers which followed were even more captivating.\n\nBut for how long? It was all well and good indulging in pages of sugary language and rocketing portfolios, but the Bolivian tragedy story was known to all. A country of material riches, but with little protection for those who extracted it, stuck in the cycle of conflict which fueled it, condemned to weaken for it.\n\nIn a nation of inexorable decline, to assume that the next chapter would be different would be risky at best. The whole country had become an investor's casino, promising hefty winnings for those who could afford to pay. But his President's penchant for risk forced him to play along, and resignedly accepting his inability to change that, he moved on to the next item on his list."
LATAM_bolivia_mining_wars_epilogue.3.a: "No new hopes, only new masters."

LATAM_bolivia_mining_wars_epilogue.4.t: "Reassessing an Ally"
LATAM_bolivia_mining_wars_epilogue.4.desc: "Good afternoon, Mr. President!" Lacerda turned round to see Vasco Leitão da Cunha in front of him, clutching a note in between his fingers and his briefcase. "Do we have a moment? This is quite urgent."\n\nThe President considered the value of the spiritless meeting on budget planning he was running late to. "Marcello, tell them I'll be there in a couple of minutes." He stopped in his tracks to face the man, expectantly checking his watch.\n\n"I've just received a memo from the Bolivian Presidency," the minister replied. "Ovando wants to come to Brasília to 'forge a lasting partnership between our two countries.'"\n\nLacerda smirked. "Is that it? We might as well meet him, considering all we've done to get him there. By the look on your face, I thought you were here to tell me the Führer died."\n\n"Well," da Cunha interjected curtly, "there's speculation the Bolivian government is about to make some... unattractive economic reforms. The press will go rabid over us hosting a 'dictator' at the Planalto Palace, and we've still got a few more years before 1970. Personally, I would hold off for now, wait for a more favorable environment."\n\n"Ovando's been in office for a while now, so waiting isn't the issue," Lacerda retorted. "But I take your point. It won't look good to parade someone they see as a vassal. Keep me updated on what they do next, alright?"\n\nWith a polite wave, Lacerda headed off alone, back to crunch numbers, the instability of Ovando's regime reentering his mind. There were valid reasons to avoid being seen with him right now, but they were still strategic partners, or at least had common enemies; ignoring him wasn't an option either. Little to do but wait it out, he supposed."
LATAM_bolivia_mining_wars_epilogue.4.a: "But if he's still an issue, I might need to give Golbery a call."

LATAM_bolivia_mining_wars_epilogue.5.t: "Preparing the Red Carpet"
LATAM_bolivia_mining_wars_epilogue.5.desc: ""Da Cunha, could I talk to you before you go?"\n\nVasco da Cunha paused in place and tried not to sigh. The whole cabinet meeting had gone without Adhemar so much as looking in his direction, and now he was being called to stay behind. He was either fired or about to be given a humiliating task. He put a smile on his face and sat down. "What can I do for you, Mr. President?"\n\n"It's about Ovando." Adhemar leaned back. "How's your office handling that business down in Bolivia?"\n\nDa Cunha clicked his tongue. "Yes, I can understand why you might want to keep this away from the cabinet. Ovando's foreign ministry has reached out to ours. They would like to improve relations with Brazil, starting with a formal visit."\n\n"A visit?" Adhemar's eyes lit up. "A state visit? My God, man, why hadn't you brought this up before?"\n\n"The letter only came through this morning, and it seemed prudent to discuss it with you directly," da Cunha cleared his throat, "But Ovando is more trouble than this visit's worth. A military dictator in the Palace is not the kind of message we want to send, especially with Argen-"\n\n"No, no," said Adhemar, his delayed interruption still staggering da Cunha. "We've got too much tied up in that part of the west to deny him. Honestly, da Cunha, you've got to keep an open mind on these things. Go book the meeting, I think I've got a day next month for it."\n\nDa Cunha bit his tongue to hold in the sigh. He nodded towards Adhemar, mumbled goodbye and walked out of the conference room."
LATAM_bolivia_mining_wars_epilogue.5.a: "A humiliating task, then."

LATAM_bolivia_mining_wars_epilogue.6.t: "Rolling Out the Red Carpet"
LATAM_bolivia_mining_wars_epilogue.6.desc: "General Ovando was received by President Adhemar between two columns of Brazil's gilded honour guard, their ceremonial fineries glinting and glistening in the morning sun. Adhemar shook his hand, posed for the photos, and exchanged as much small talk as Ovando could respond to on the way to the presidential motorcade. From the airport they entered deeper into the capital, where along a recently-reinforced road Adhemar had arranged another parade: a display of military discipline and coordination from a regiment that had slipped Adhemar's mind. Ovando had found the display sobering, distracting and exhausting in equal measure.\n\nThe state visit had turned into a guided tour of the capital, and every time Ovando tried to get a word in edgewise, Adhemar found a polite way to cut him off, smiling and laughing as another photographer caught the two in a candid moment of pleasant conversation. At last they had found themselves in a grand dinner at some government building (they had been through so many that it started to blur together in Ovando's head), where he and Adhemar shared a table with little chance of further intrusion.\n\nAdhemar's eyes briefly fluttered as they sat together and waited for the main course, and the General saw this as perhaps the only opportunity he'd get to direct the conversation. "Mr. President," said Ovando, leaning slightly over the table with a hushed tone that tried to float over the background noise. "I wanted to talk to you about some of the problems facing our country. Labour relations, the quality of life among our rural citizens. Initiatives that could use Brazil's investment."\n\nBut Adhemar seemed too tired, too distant to grab the words. "Oh, yes. We could help, certainly. Those matters are important." Adhemar's moustache twitched. "Have your staff talk to mine about future meetings. They'll get you with the right people." Then the main course came, and Adhemar's attention fell right back onto the festivities."
LATAM_bolivia_mining_wars_epilogue.6.a: "At least we showed we're a strong ally?"

LATAM_bolivia_mining_wars_epilogue.7.t: "Levers to Power"
LATAM_bolivia_mining_wars_epilogue.7.desc: "As he flipped through the report before him, Golbery do Couto e Silva frowned. Contacts within Bolivian security services had procured detailed documentation of newly planned economic reforms. Rubber profits were set to be redistributed. Foreign investments would be subject to far greater scrutiny, with American, Brazilian, and Argentine firms in particular to be closely monitored. "Alfredo, you bastard" the general muttered. There could be no denying it: Ovando had gone back on the deal.\n\nGolbery shut his eyes and pondered. Half of his agents were in Bolivia "on business"; he couldn't afford for them to be compromised. But if he withdrew them, then the SNI couldn't continue to monitor MNR activity effectively. And that was without even considering the implications of Ovando giving himself the power to cut off oil shipments to Brazil at the snap of his fingers. At a baser level, if Bolivia's president believed himself secure enough that he could flagrantly betray Brasília, what was to stop him from turning toward Buenos Aires?\n\nPerhaps the alliance could be saved, if only Golbery could remind Ovando of his place. Direct confrontation was out of the question, he may as well just hand over a list of SNI men working for Bolivian government ministries. Economic pressure was just as infeasible, it would jeopardize vital business relations. Perhaps a meeting between Bolivian and Brazilian presidents? No, that would only legitimize Ovando's 'reforms'. There was nothing.\n\nReluctantly, Golbery picked up the phone. Perhaps his friends in La Paz could do more for him than obtain a few documents."
LATAM_bolivia_mining_wars_epilogue.7.a: ""General Miranda, it's a pleasure to speak with you again.""

LATAM_bolivia_mining_wars_epilogue.8.t: "An Obedient Servant"
LATAM_bolivia_mining_wars_epilogue.8.desc: "The Brazilian embassy had been in shambles since the march on La Paz. Though the coup was over in two hours, the subsequent unrest had forced them into lockdown. Ambassador Mário de Pimentel Brandão and his staff scrambled to adapt to the new order in Bolivia, passing hundreds of sensitive documents to Brasília and shredding their own copies, reviewing security protocols, identifying potential liasons within the new regime, ensuring that what few Brazilian tourists were present were promptly extracted, and reviewing security protocols again.\n\nNot even 24 hours after he took power, President Miranda marched into the embassy, which had only been informed of the visit an hour in advance. The general carried himself proudly, his ill-fitting suit betraying the irregularity of his rise to power. President and ambassador shook hands, Pimentel Brandão tried not to stare at Miranda's enormous nose. "Your excellency, it is an honor to meet you. Let me take you someplace better to talk." The ambassador led the president into a soundproofed conference room. Without time for pleasantries, he asked, "What's the situation out on the streets?"\n\n"Improving. These thugs scatter the moment they see tear gas. Batons take care of the rest."\n\n"Your excellency, I must urge restraint. Fear has... its place, I suppose, but Ovando must not become a martyr. For the people to believe in your presidency, you have to give them something Ovando couldn't."\n\n"And what do you suggest, dole out the army's money to terrorists and beg them to reconsider? That was Ovando's game. There will be elections. After the streets are safe." Miranda paused, fuming "This is why I wanted to capture him. Get him on the radio, get his endorsement. A bomb in a helicopter? Did you think I was too stupid to do anything more complicated?"\n\nPimentel Brandão's brows shot upward with confusion "What do you--" he reconsidered his words more carefully "you... can't speak of such things." The ambassador only wished he knew what those things were. "I will ensure your administration has access to all intel we gather on the terrorists.""
LATAM_bolivia_mining_wars_epilogue.8.a: "Brandão went to sleep that night unsure who ruled in La Paz."

LATAM_bolivia_mining_wars_epilogue.9.t: "Not a Laughing Matter"
LATAM_bolivia_mining_wars_epilogue.9.desc: ""Come in, Vasco." Da Cunha walked into the Presidential office slowly, his stern gaze avoiding any perception of contact with his commander-in-chief. The single, crinkled sheet of paper in his hand told the rest of the story. Ovando dead, Miranda alive and couping, Bolivia burning. The Mining Wars seemed easier to manage.\n\n"Years of efforts, mediation, funding, and fighting, all down the fucking drain," the minister cursed. On the other side of the table, the president still looked smug as ever. Like he was the one who had hoodwinked everyone else at the poker table. It's so enraging, he thought.\n\n"Language. That is not how to respect this office and the service it carries out, my friend," Adhemar smirked, aware of how the appeal to professionalism annoyed him. "In any case, there was nothing we could do about Ovando. We extended our hand, and he failed. It's not like we could or can go down to La Paz and gun down the protesters."\n\n"Nothing we could do? But we did do so much for Ovando, you did so much, you let him loose with all those damn reforms." He was still grinning. "Just keep chuckling it up here, I'll just wait until tomorrow to sit down about this after you've seen the headlines yourself." He marched off. The sheet of paper still laid on the table.\n\nNo, no, he's right after all. The Bolivia debacle was not going to pass over like a bad hangover. Yes, the papers would be frustrating, but suddenly his finances in the country were about to be flashed to the world. It was a black mark for his administration, but worst of all, a stain on his money."
LATAM_bolivia_mining_wars_epilogue.9.a: "So it is possible to steal and do too much."

LATAM_bolivia_mining_wars_epilogue.10.t: "Command and Responsibility"
LATAM_bolivia_mining_wars_epilogue.10.desc: "Bolivia was on fire. Factories closed their doors and workers poured into the streets, throwing stones at officers that struck them with batons in turn. Radical newspapers accused Lacerda of orchestrating the coup. Golbery do Couto e Silva sat before the president in the State Room, who looked back at him with a paternalistic glare. "Golbery, I have one question for you. Just what is it, exactly, that you think I've asked you to do in Bolivia?"\n\n"I am continuing our work to advance our national interest."\n\n"You didn't think to tell me you were going to kill a god-damned ally?"\n\n"I didn't touch him, President, I would never. General Miranda-"\n\n"But you knew about it. You knew what Miranda was planning, and you didn't think I ought to know about it?"\n\n"It's not about that. If word got back to you, you would have been implicated."\n\n"I AM implicated you idiot!" Lacerda lept from his chair and fiercly gestured at himself. "I'm the fucking President of Brazil! When Bolivians hear that their president exploded, who do you think they're going to point their fingers at?" Lacerda paused to catch his breath. "This...you can't do shit like this Silva. Not without my orders."\n\n"I will...keep that in mind, your Excellency."\n\n"You'd better. Now get out of my office so I can call this new 'president' and clean up this mess.""
LATAM_bolivia_mining_wars_epilogue.10.a: "Lacerda, as the protesters, would not sleep the whole night."

LATAM_bolivia_mining_wars_epilogue.11.t: "A Poor Choice of Friends"
LATAM_bolivia_mining_wars_epilogue.11.desc: ""There's one more thing, Mr. President." Adhemar suppressed a frustrated sigh as Edna Lott pulled from her briefcase a pile of manila folders. He knew what this was about, and he had hoped to avoid bringing it up in Cabinet. Lott seemed too committed to notice the disapproval in Adhemar's eyes.\n\n"I think it's time that we do a full accounting of our present relationship with the Miranda regime in Bolivia. Frankly-pass it on, please," handing over the pile to the minister on her right, "it's a black mark on our foreign policy." One of the ministers opened the folder, and was met with pictures of plastic bags in the shape of men, dated four months ago. "We already have credible evidence of forced disappearances of journalists, torture of political prisoners, internment camps for dissidents. I have to ask, Mr. President: why are we supporting this regime?"\n\n"The reports are overblown," said Adhemar, who held onto the pile when it reached him. "Bleeding-heart accounts from the leftist press. They don't have the full picture, you see."\n\n"That didn't answer my question, Mr. President." Lott could feel the eyes on her, many of which were nervous for what might come next.\n\n"I thought the answer was obvious. The Miranda regime is a friend to Brazil, and not to Argentina." Adhemar fiddled with the edge of one of the folders. "Will we let a little pack of lies stand in the way of a fruitful relationship?"\n\nLott held back a snarl. "It's a national disgrace. It's a disgrace on my father's legacy. And I think we can do a lot better in our choice of friends than this fascist." Adhemar was about to scoff when he saw the rest of the eyes in the room. There was sympathy there, shared concerns which they could not express verbally, but which burrowed into Adhemar nonetheless."
LATAM_bolivia_mining_wars_epilogue.11.a: "But he pushed past them. "Miranda is a friend of Brazil. I'll hear nothing else about him.""
LATAM_bolivia_mining_wars_epilogue.11.b: "And so he put on a fake smile. "Perhaps I'll give the matter some consideration, Edna.""

LATAM_bolivia_mining_wars_epilogue.12.t: "If I Knew What I Knew in the Past"
LATAM_bolivia_mining_wars_epilogue.12.desc: "The interview had come to a momentary lull. The only sound was the clacking of the typist in the corner. Samuel Wainer packed tobacco into his pipe, and looked across his desk at his interviewee. Miss Choque's family were miners, and part-indigenous like many Bolivians. Her Portuguese was impressive; apparently, most of her brothers could not even read. Her cheeks were wet. Wainer's journalistic eye saw in her the kind of still dignity often seen in those who have been wronged.\n\nChoque's voice trembled, the sob suppressed. "Excuse me, Mr. Wainer. Where was I...?"\n\nWainer smiled sympathetically. "You were talking about how things have changed since the coup. General Miranda's takeover."\n\n"Yes, of course." She was steady now. "It was for national security, they said. The unions were crushed harder, more suppression. More disappearances. My brothers..."\n\n"And what about the Brazilian response? The government, the companies-"\n\n"It's business as usual. Many people believe that you- that is, Brazil- helped kill Ovando. We still see Gerdau trucks take what we mine, and the junta leaders shaking hands with diplomats - but don't they know about the camps?"\n\nHe knows, thought Wainer. Lacerda knew.\n\nCarlos Lacerda, once a man of the press like Wainer; a contemporary, a competitor. His vanity, his megalomania, had taken him here, the same tyrant he accused Vargas of being. Wainer's attention drifted. Lacerda knew what his friends in La Paz were doing, there was no doubt. He was learning their lessons."
LATAM_bolivia_mining_wars_epilogue.12.a: "Wear the jackboots with pride, Carlos, you're more like the Europeans than you would ever say."

LATAM_bolivia_mining_wars_epilogue.13.t: "Down by the Lake"
LATAM_bolivia_mining_wars_epilogue.13.desc: "In a public park, two old men sat beside each other on a bench overlooking a pond. They watched the sun ripple along the water, the gentle bending of the reeds on the lake's edge along the wind. Had one of the men not been dressed in a trenchcoat, sunglasses and trilby hat, nobody would have taken a notice of them or their conversation.\n\n"You boys really fucked things up," muttered Walther Salles, adjusting the brim of his hat. "Palling around with fascists."\n\nMarcelo Ruiz Solar, Chilean ambassador to Brazil, kept his eyes on the water. "Is this why you brought me out here? Slander's slander, whether it's in my office or here."\n\n"We have evidence. Bank transfers and the like. Nothing to bring to the press or the OFN, but enough to make things uncomfortable for both of us."\n\n"Rioja can be controlled," said Solar, smoothing out a crease on his pants. "I'd rather have him than a moderate in the pocket of Buenos Aires. I'm sure you would too, deep down."\n\n"You're playing with fire." Salles pushed up his sunglasses. "Fascists can't be controlled. The moment you take your eyes off him, even once, he'll go running to Iberia or Italy." There was another name there; he left it hanging in the air above Solar's head like a sword.\n\n"Stop me, then. Go to your President and get him to sign off on squeezing a valuable ally." Solar's eyes flicked towards Salles. "That is, if you think it's worth damaging the relationship Chile and Brazil share." At this, Salles' eyes retreated from Solar's, and fell back on the water."
LATAM_bolivia_mining_wars_epilogue.13.a: "Today, a distant problem. But tomorrow, when Quadros or Lott need a problem?"

LATAM_bolivia_mining_wars_epilogue.14.t: "Matters of the Body"
LATAM_bolivia_mining_wars_epilogue.14.desc: ""Open our doors to those fascists?" Lacerda scoffed, the afternoon sun flooded his office in a ray of golden light. Apparently, Chile was warming up to the Bolivian pariah state. They'd been working on democratizing the nation, with some success. Of course, to what extent fascists could be truly democratic was up for debate."What's next, hm? A trade deal with Germania?" Távora let out a shallow sigh, exasperated at this point,"Mr. President, I am well aware of the... tendencies of Bolivia, but reopening relations will improve our ties to Chile and Bolivian precious metals will be a fantastic boost to the Brazilian economy." Lacerda stared back, a white glare hiding his eyes. A little less defensive, Távora sighed once more, "Just consider it. That's all I ask, sir."\n\nA soft thud marked his departure. Lacerda, now, was the one to sigh. He wasn't wrong. It could do wonders for Brazil's finances, and, judging by how hard Távora was pushing, it was clear that Santiago had put out some feelers and found him as their intermediary. Refusing might jeopardize that ever-so-crucial alliance. But in his heart, Lacerda couldn't abide it. No matter what Chile said, a fascist was a fascist. The sons of Mussolini and Hitler ran that country. They could play pretend democracy all they wanted, they'd never be one. He ran it over his head a hundred times, split between mind and heart. He picked up the phone and rang a call to Santiago."
LATAM_bolivia_mining_wars_epilogue.14.a: "Follow the Heart."
LATAM_bolivia_mining_wars_epilogue.14.b: "Follow the Mind."

LATAM_bolivia_mining_wars_epilogue.15.t: "Positive Reinforcement"
LATAM_bolivia_mining_wars_epilogue.15.desc: ""So, Italian," said Laudo Natel, holding a glass of red wine in his hand. "What's the occasion, Mr. President?"\n\n"Big news deserves a big venue, don't you agree?" Adhemar chuckled, poured himself another glass. "Besides, everyone raved about this place. Now seemed as good a time as any to see what the fuss was about."\n\n"Well then, what's the news? Struck some kind of grand deal with the PTB?"\n\n"Oh, it's not domestic policy." He took a sip of wine, set the glass back down on the table. "We've been in talks-secret talks, mind you-and we're willing to bury the hatchet with a neighbour. One that'll keep the Argentinians in check."\n\nNatel ran through in his head a mental checklist of Brazil's neighbours, and located in his mental catalogue the likely candidate that could merit this quiet joy in Adhemar's voice. "Bolivia," he said, almost a mutter.\n\n"That's right. Now that they've wisened up, we're normalising relations with Bolivia. Laudo, if you've got some extra money lying around, now's the time to invest. Mining, heavy industry-"\n\n"da Cunha's going to be pissed." Natel poured himself some more wine. "Does he know?"\n\n"I haven't told him yet. Oh, don't look at me like that." Natel raised an eyebrow, his lips set into a straight line. "He'll get pissy, sure, but they're a democracy now, just like we are. Besides, he'll learn to shut up when the money rolls in. That's all America really cares about, anyway. Profitability. The bottom line. Big Goddamn numbers in green and black.""
LATAM_bolivia_mining_wars_epilogue.15.a: "Adhemar leaned back, a wide grin on his face. "And Bolivia's going to bring us big Goddamn numbers.""

LATAM_bolivia_mining_wars_epilogue.16.t: "Losers' Club"
LATAM_bolivia_mining_wars_epilogue.16.desc: "Footsteps carried far across the marbled corridors of the palace. President Lott, in transit between meetings, heard Quadros before he saw him, the gangly VP rounding a corner and coming towards him. Lott pretended not to see him.\n\n"I see in the papers you've been busy," Quadros said loudly, "palling around with the down-and-out oligarchs of La Paz. 'The Institute for a Democratic Bolivia', it's called."\n\nLott grumbled. He knew Quadros well enough. The two men caught up with each other, but Lott continued his hasty stride, even as Quadros wheeled round to follow him.\n\n"A brilliant move, to so blatantly wed ourselves to this gaggle of sore losers. Did it ever occur to you that someone will be President after you? Someone who, when trying to open the door with our neighbors a crack, might find your merry band of exiles slamming it shut? And for what gain, moral superiority over the Argentine?"\n\nStill talking, Quadros nearly walked right into Lott when the towering general suddenly stood stock still and pivoted around to face him. Taken aback, Quadros pushed his glasses up his nose. Lott was angry.\n\n"I've met people who lost their businesses to the MNR. I met people who lost everything. I'll not be contrite on this; I'll be damned if I let Buenos Aires snuff out liberty right next door. I don't make excuses for tyrants." Lott took a couple of steps back. "That's the last word on the subject.""
LATAM_bolivia_mining_wars_epilogue.16.a: "Lott turned and walked away. He heard Quadros mutter some obscenities."

LATAM_bolivia_mining_wars_epilogue.17.t: "A Heap of Hope"
LATAM_bolivia_mining_wars_epilogue.17.desc: "Samuel Wainer walked into the belly of the beast: a ballroom dinner packed with UDN bootlickers and enlightened liberals, likely one of their little "fundraisers" for another one of Lacerda's adventures abroad. Far from dissuading him, it gave him and his pocket-sized blue notebook plenty of ammunition. Now the audience were standing in applause for none other than that stooge Guachalla, apparently to protest what he helped to create. But he saved his thoughts for last; the show was just starting.\n\n"I thank you, my friends, all you friends of Bolivia who are here today," began the Bolivian with a light tap to his champagne glass, "and the Institute for a Democratic Bolivia welcomes your support. My country is sick, and Villarroel and his lackeys are the condition. Since they took over, the MNR has silenced critics, forgotten economic common sense and has torn apart families. I still have many friends and family who are stranded there, fearing they may be next. But that will not silence me!"\n\nA brave statement, mused Wainer, or simply a stupid one, but he couldn't tell. He saw through it all, though, remembering a meeting with the man or someone similar in the Bolivian oligarchy and their dismissal of all that went wrong. If he hadn't got him confused with someone else, Luis Fernando Guachalla was scarcely a different type, a president elect's son and all. The idea he might sell out his family thus did not surprise the journalist terribly.\n\nAcross the room, however, they were eating it up. Thankfully, much of his speech was a pity party of dredged-up defeats in the Mining Wars that everyone here was responsible for, so at least there was something positive to write about. Otherwise, even Lacerda's biggest opponent had to concede to himself that he felt a unified movement to do all in their power to take La Paz back from Argentine suzerainty."
LATAM_bolivia_mining_wars_epilogue.17.a: "At least the headlines would be easy to write."

LATAM_bolivia_mining_wars_epilogue.18.t: "An Unexpected Offer"
LATAM_bolivia_mining_wars_epilogue.18.desc: "An accountant jolted from his report as the external telephone buzzer rang. Surprised, given his office rarely received calls from outside the Institute for a Democratic Bolivia, he eagerly picked up the receiver.\n\n"Good evening, this is Laudo Natel, Chief of Staff of the Presidency," the accountant stiffened, barely managing to stay seated, "I wanted to make you aware of a few things my office has found regarding your organization."\n\nIt couldn't be. Why would Natel be calling him, an accountant, and speaking so vaguely? Surely, he didn't know... "Good evening, Mr. Natel. Let's not waste time; I'd appreciate it if you were explicit."\n\n"Well, sir, there have been some discrepancies in the numbers reported on certain assets, as presented by the DGFN." The accountant's heart sank. They had been funneling money through properties nationwide, but they weren't the only ones. Jail was unthinkable. They couldn't...\n\n"However," Natel continued, "this administration is generous, and the President is sympathetic to your Institute. If you agree to give us a cut of the assets involved, this issue could quietly disappear."\n\n"I-what?"\n\n"We'll send details about a meeting later this week to discuss the path forward. Best of luck, sir." The line went dead. He exhaled with relief. But how unusual! He'd never been blackmailed by a presidential chief of staff before, but in any case, they had dodged a bullet - or rather, their corruption was eclipsed by even greater corruption. He went back to reviewing his report, his conscience heavy with the idea they would not be so lucky next time."
LATAM_bolivia_mining_wars_epilogue.18.a: "There are worse business partners than the Planalto Palace."

LATAM_bolivia_mining_wars_epilogue.19.t: "Bolivian Reds, Brazilian Blues"
LATAM_bolivia_mining_wars_epilogue.19.desc: "They could feel the frustration between each other, the knot that balled up just below the chest cavity. The knots grew and tightened with each headline. Lott's desk was mercifully clear of such material, but they echoed in their heads anyway. RED VICTORY IN BOLIVIA. TORRES GOVERNMENT ENACTS SWEEPING NATIONALISATION. FOREIGN ASSETS SEIZED; BRAZILIANS, WELL-TO-DO BOLIVIANS FLEE LA PAZ.\n\n"Good God," muttered Lott. "Millions of dollars invested in this fucking war-"\n\n"That we've lost." Walther Salles cleared his throat. "Mr. President, there's no sense wondering about the could-bes and maybes," though they haunted him as much as Lott, "while there's still problems to address. We need to cut off diplomatic ties with Bolivia, immediately. Economic ones, too. Sever every tie and tear up every trade deal we've signed with the Bolivians thus far, while we get our boys ready to evacuate any Brazilians who can make it to their consulates."\n\n"Industry's going to take a hit. We needed whatever we could get from those Bolivian mines." He tapped a pen on his desk, a slow beat with uneven cadence. "Well, we'd have probably lost it all anyway."\n\nLott rose from his desk, stared out the window. Despite the sun and the blue sky, he could see a faint reflection staring back at him. He knew he was old, but did he always look so old? "No, what we need now is a show of force against this communist threat. You have my permission, Salles. Sever those ties."\n\n"Forceful," said Salles. "I didn't even need to twist your arm. Have the generals been talking to you about this?" At this, Lott could only scoff."
LATAM_bolivia_mining_wars_epilogue.19.a: ""Talk? I can still feel their breath on my neck.""

LATAM_bolivia_mining_wars_epilogue.20.t: "Little Bolivia"
LATAM_bolivia_mining_wars_epilogue.20.desc: "That was what they called this little street in São Paulo's financial district; fifty metres of storefronts with accountants, bookkeepers and bookmakers, who worked on the floors below and lived on the floors above. They had all come from Bolivia and La Paz in particular, fleeing the loss of their capital that they guarded on their journey with all their might. When they had finally crossed the border into Brazil, they liquidated all but the most sentimental of valuables, and in short order they had become fixtures among the city's financial centre.\n\nThey held seminars and soirees to ingratiate themselves among the established elite. They attempted to show that they were not invaders or an infestation of cheap money; they were honest and proud businesspeople who wished to enter their ranks. On this night, they held such an event, where sparkling wine flowed and payments to their reputation were issued.\n\nGetúlio Vargas Jr. had initially resisted their overtures. He could tell the world that he wasn't interested in compromising his image, he could tell himself that he was waiting for the Bolivians to prove they weren't unreliable friends-in truth he just wanted to make them squirm a little so their contributions to his campaign fund would be higher. And when the first checks cleared, he leapt for the phone to call the leaders of this new community. Terrible business, they had suffered. He'd heard the stories himself. He was sympathetic to their plight, and he was so glad to hear that they had really made a go of it. Why, yes, he would be interested in attending a little get-together. So here he was, laughing and clinking glasses with the new investors of São Paulo.\n\nThe sun had long since tucked itself under the long horizon's covers, but all the lights of the hotel ballroom lit up Vargas Jr.'s heart. He had to admit, they had done quite well for themselves. So well for themselves that a small taste was in order."
LATAM_bolivia_mining_wars_epilogue.20.a: "They have to know this is how things get done here, otherwise they would not have left."

LATAM_bolivia_mining_wars_epilogue.21.t: "Unspoken Understandings"
LATAM_bolivia_mining_wars_epilogue.21.desc: "These days, Vasco Leitão da Cunha rarely had contact with royalty, save for an exchange or two with the Surinamese. Having a Prince of Tin sitting opposite him for an evening meal in Brasília was even rarer. The foreign minister frequently looked up from his string bean salad, studying Antenor Patiño's expression - absorbed, pensive, wistful; it could have been any of the three.\n\n"Some of these places are on par with Manhattan, I'm impressed, Vasco. Truly," the Bolivian affirmed, picking up his glass. The minister smiled; the wine flowed and the atmosphere was comfortable. If it continued like this, they might secure another Washington connection. "I should really be thanking you more than I have, for, well, everything you're all doing."\n\n"For what?" da Cunha chuckled. "For doing my job? No, Antenor, this is just how we treat our friends down here. If you mean the communists, well, that's how a government like ours ought to treat our enemies."\n\nThe mention of the communists made Patiño return to his inscrutable look, staring down at his plate. He had narrowly escaped to America with his inheritance and only recently, after all. The Brazilian opened his mouth to change the subject when the Prince began to stammer.\n\n"N-no, there's no need to even worry about them, you know," Patiño insisted. "Very soon, they will learn about the reality of governance, shall we say. We just need this embargo to hold on a little longer." He stared intently at the minister for a moment, then looked down at his plate once more.\n\nDa Cunha raised an eyebrow at Patiño's confidence but began to slowly nod. What he was hinting at was worth questioning, yet now there was something to keep in mind. Bolivia, now red, was threatening to change its political hue again."
LATAM_bolivia_mining_wars_epilogue.21.a: "What does he know?"

LATAM_bolivia_mining_wars_epilogue.22.t: "The Price of a Position"
LATAM_bolivia_mining_wars_epilogue.22.desc: ""Good afternoon, Mr. Natel," a shorter, clean-shaven man with a briefcase exclaimed as he saw Natel exit a taxi. He motioned toward a dingy café on the street corner. "Shall we go inside?"\n\nNatel had grumbled all day to his aides that someone less senior should have handled this meeting, but no one wanted to defy the President's orders. He wasn't keen on spending his stop in São Paulo's Brás district, much less in a building that seemed not to have been cleaned since the war. Reluctantly, he sat down, offering a polite smile as he would at any important meeting.\n\n"I'm sure you're aware the revolutionaries in Bolivia need some contacts. Bolivians in Brazil are definitely aware they'll soon be asking your people to do business with them, whether in months or weeks. We've been close in the past, your party and our community, Mr. Natel, but those days will be quickly forgotten if you sponsor those tyrants."\n\n"Unless, of course... you reconsider." Natel's eyes sharpened as the envoy pulled out a checkbook and a pen. Now this was getting interesting. "We strongly hope to keep this friendship going, Mr. Natel."\n\nWhat use was trade with the Bolivian reds anyway? If they accepted, they would not only get the money but also avoid the headlines for supporting a communist regime. Despite the envoy's unnerving use of his name, Natel quickly agreed. "On behalf of the President, we hope so too. I appreciate the offer and assure you the PSP will continue to support your community."\n\nOn the ride back to the center, Natel was left with plenty of room for second thoughts. The exiles did pay well, but they were an estranged group with uncertain future influence. If their support dried up by the next election... well, his palms started to sweat just thinking of Adhemar's reaction."
LATAM_bolivia_mining_wars_epilogue.22.a: "Hopefully they don't have any UDN politicians to call."

LATAM_bolivia_mining_wars_epilogue.23.t: "Homesick Hesitation"
LATAM_bolivia_mining_wars_epilogue.23.desc: ""He's gone." Rafael looked over Enrique's shoulder, scanning the headline which transfixed his friend. Juan José Torres was dead, and with it was the face of the regime which sent them rushing for the first plane out of Bolivia not so long ago. The newspaper equivocated about what, or rather who, came next, but there were few others than Wálter Guevara, the moderate.\n\n"Just as we finally start settling in somewhere new things change." Enrique had spent years worth of personal money and time on his relocation, money the man regretted he could not put back into his own country. "We'll have to see, I mean, who knows what's coming next. You saw how it all started out with the mines, Rafa."\n\n"I don't know, it's a great opportunity," his fellow exile replied, looking out onto the street. "It's almost certainly going to be Guevara, he and the moderate MNR wing are going to reprivatize all those assets the communists took, we get in now before people start thinking about it, I mean, what if we're missing out on a big fat boom?"\n\n"Enrique, Enrique," repeated the businessman as he waved his hand. "It's been years. Guerrilla war and all that comes with it do not fix themselves in a day. We can't do this again, we just can't. We're not going to take risk after risk only to be punished for dreaming too big."\n\nThe banker looked out onto the street. He thought about the new car he had just bought, the area, the security of it all. Suddenly it was hard to imagine opening the door again, not when he thought about the city he would come back to, the government and the "friends" he had, the whole nebulous concept of Bolivia with a big question mark over it. Would they see him the same way they did before?\n\n"Maybe you're right," Enrique sighed, marching back to his cubicle with resignation."
LATAM_bolivia_mining_wars_epilogue.23.a: "But maybe one day you won't be."

LATAM_bolivia_mining_wars_epilogue.24.t: "Compensating for Lost Time"
LATAM_bolivia_mining_wars_epilogue.24.desc: "The television scanlines swept over Bolivia's new face, and watching from the Supreme Meeting Room were twin reactions of spirit and suspicion, both of them sitting side by side, watching it unfold. Virgílio Távora glanced toward his boss, whose face rested on his fingers, searching in his expression for an explanation. After so many years of unfettered chaos, wasn't this something to be cheerful about?\n\n"Sir, Guevara has already committed himself to compensating expropriated firms and discussed reopening business. I think it's a bit too early to dismiss-"\n\n"It's not dismissal, it's restraint," Lacerda interjected. "Torres and Guevara were in the same party, let's not forget. The MNR confiscated money that was meant to enrich them and their country. I'm going to need a bit more from them than a couple of press remarks, Virgílio, we deserve more than that."\n\nThe Vice President realized the emotional edge to his reaction, and decided to keep quiet. Lacerda was now pacing the room.\n\n"Here's what they should do if they're serious about "compensation". Every single inch of land, every single asset, every single damn cruzeiro of profit a Brazilian company has earned in Bolivia that was there before should be returned to us. If not, then it's just lip service."\n\n"That would be too much, too fast. If we told them to start paying up tomorrow, they might very well not pay us anything at all for the next ten years."\n\nThe President grimaced. Yes, it would probably not go down well to press concessions with a country where a return to the way things were was implausible. But they had to stick up for themselves too. If it came down to it, he would rather..."
LATAM_bolivia_mining_wars_epilogue.24.a: "...make himself clear and demand a full compensation agreement."
LATAM_bolivia_mining_wars_epilogue.24.b: "...give it time. We've waited long enough."

LATAM_bolivia_mining_wars_epilogue.25.t: "Making a Fortune"
LATAM_bolivia_mining_wars_epilogue.25.desc: "About one night every week, Laudo Natel stayed behind well after the workday was done. On top of his regular responsibilities to Adhemar's government, he had a secondary but important and lucrative function. He kept Adhemar's personal portfolio as the President's most trusted banker. The work had to be done with a certain degree of secrecy, for state business often intersected with Adhemar's portfolio in ways that some may have felt was unseemly, and he did not wish to let anyone else take a peek into the wealth of their President.\n\nOn his desk were newspapers that spoke of new opportunities. The fall of the Reds in Bolivia had not only been geopolitically favourable, it opened up new opportunities for profit. Wálter Guevara, Bolivia's newest ruler, had signalled an interest in renewing relations with Brazil, starting with that ever-important facet of international relations: trade. He threw open the doors for Brazilian capital, and investors flocked to the opportunity-Adhemar and Natel included.\n\nIt would start slow at first. Direct investment at this early stage of the game was too risky, invited too many eyes. But few would raise an eye at Adhemar's shell companies buying up some extra stock in Gerdau and the National Steel Company. After all, cheap iron ore from Bolivia would lighten up their material costs, give them more room to grow. Still, Natel had a rathole or two quietly purchasing shares in the iron mines along Cerro Rico, and when the time was right they would be transferred closer to Adhemar's portfolio.\n\nWhen Natel finished up his work, he looked at the clock. Ten past ten-all those calls and coordination had taken him far longer than expected. But he just smiled, gave his wife one final and apologetic call for the day, and took out the overnight bag he kept in his office for these kinds of occasions."
LATAM_bolivia_mining_wars_epilogue.25.a: "The commission he'd take home was suitable compensation for sleeping on his office couch."

LATAM_bolivia_mining_wars_epilogue.26.t: "Wasted Youth"
LATAM_bolivia_mining_wars_epilogue.26.desc: "Golbery do Couto e Silva had guessed the news regarding Bolivia's fall to full-blown socialism would have been painful to deliver, but this session tested him, as Lacerda tortured himself with scotch. He could not help but blame himself for the MNR taking power initially, even if that idiot Ovando was still largely at fault, but Lacerda would not stop twisting the knife.\n\n"Did I ever tell you what I did when I was young and dumb, Golbery?"\n\n"No, Mr. President."\n\n"I was a communist. I thought Marx had it all figured out. I'd write stupid little songs, pamphlets, and prance about like a snot-nosed intellectual. It took me until I realized it was a failed ideology, merely a smokescreen for fetishizing dictators like Vargas, and how only democracies can stand a chance against fascism."\n\n"If I were still a moron, you would have brought me great news. I'd down this drink and shout 'viva la revolución!'" His hand shot up with the glass, its content toppling out onto his pants.\n\n"Sadly for us, Golbery, I'm not an idiot." He mockingly pondered for a moment, adopting a thinking pose. "Actually, maybe I am, if I gave the man who set this in motion a spot in my cabinet." Golbery opened his mouth, but thought better of speaking. "Whatever, it's on us now. We'll have to contend with their inevitable famines, organize food drives, humanitarian efforts, the usual."\n\n"Listen, just do what you knuckleheads do best. Contain the red menace, and draw up some plans for a possible offensive..." He waved Golbery off as he fell into a stupor; he'd hopefully be less of a pain when he woke up, but at least he had an opportunity now to get back into his good books."
LATAM_bolivia_mining_wars_epilogue.26.a: ""Why can't kids just read Adam Smith instead...""

LATAM_bolivia_mining_wars_epilogue.27.t: "Bolivia and Other Pointless Pursuits"
LATAM_bolivia_mining_wars_epilogue.27.desc: ""I can only hope you will do the right thing here, Mr. President. Communist threats are not something to be taken lightly. Good day." The Senator slammed the door shut behind him, as Adhemar could only express relief that he had finally left; today had been a drag, full of hard-nosed military men and politicians ranting about the Bolivian problem.\n\nPopular Assembly this, syndicalist republic that, does the common man even care? No. Yet, here he was, being barraged about an impending revolution knocking on his doorstep. It was clear something had to be done, if only to appease the hawks.\n\nAdhemar took out a pencil and a free sheet of paper, scrawling down some ideas for containment. Ah, what about a military parade? Those roughnecks just love parading about like prize peacocks, no better way to conduct a massive show of strength. Besides, it would be a nice day, great fun at the afterparty too.\n\nEh, he could probably pass this onto an assistant to turn it into something formal, turn into a speech for Bolivia's loser club. Sorry, the esteemed yet exiled Bolivian business community, better not use the other term during the actual speech. Put on a war face for them, hope that deals could be made down the line, the usual."
LATAM_bolivia_mining_wars_epilogue.27.a: "What the hell is a syndicalist anyway?"

LATAM_bolivia_mining_wars_epilogue.28.t: "Like Clockwork"
LATAM_bolivia_mining_wars_epilogue.28.desc: ""Military in Control! Torres Announces Closure of Popular Assembly."\n\nIt was the last in a stack of Bolivian newspapers that Lacerda was spending his free time getting acquainted with. The MNR's ascent to power was a concern, a misstep of the previous administration. Even if they weren't outright fascists, their alignment to the Argentines was a deep concern that could have tipped the scales of their Cold War.\n\nLuckily, this wasn't to be, as an insurgent left-wing subverted the movement's more nationalist inclinations.\n\nUnluckily, this led to the prospect of a Bolivian Socialist Soviet Republic appearing on their doorstep.\n\nThe Torres coup has neutralised this issue. From what he heard from Golbery, this "military socialism" was about as socialist as Adhemar was, and he wasn't a far-right hack who considered donating to charity a form of socialism. Still, he maintained a leftist presence around him, and he was a dictator...\n\n"Vasco... yes, yes, I just read the news about the Bolivian situation."\n\n"No, keep some of the pressure on them. Let the military blow off some steam if needs be; no one's going to cry over some dead Bolivian soldiers...""
LATAM_bolivia_mining_wars_epilogue.28.a: "Everyone needs a punching bag."

LATAM_bolivia_mining_wars_epilogue.29.t: "Loyalty by the Real"
LATAM_bolivia_mining_wars_epilogue.29.desc: "The news of Bolivia's coup by Torres towards military socialism was only caught by Adhemar in one of his in-between moments, sighting a paper while walking down the street with Vasco Leitão da Cunha towards a droll diplomatic nicety, the man who could tell him more about this predicament.\n\n"Say, what's this about Bolivia? Last I heard, it was meant to be the reds running the show, no?\n\n"Well, it turns out it was Torres running the show all along." Vasco's matter-of-fact speech was a refreshing contrast for Adhemar, used to his usual moralizing lectures on democracy and fascism; what a bore. "In one fell swoop, he closed the Popular Assembly, turning Bolivia into a quasi-fascist milico state." Nevermind, he spoke too soon.\n\n"Don't these guys call themselves socialists? Or military socialists? Whatever that means.\n\n"With all due respect, Torres is about as socialist as you are. They are merely playing on popular discontent like the MNR, pandering to the people that only strongmen can solve their problems, not democrats." They were losers, not democrats, even if they bought his loyalty. Although that was a long time ago, and this new government seems promising...\n\n"I think we may have some room to maneuver with the communists out of the way actually, as long as they pay, of course." Vasco grimaced as he internally noted Adhemar's instructions. "Send word over to them after this thing is dealt with. We can never have enough friends.""
LATAM_bolivia_mining_wars_epilogue.29.a: ""I can only hope none of your friends buy another President...""

# Bolivia Epilogue Neutral

LATAM_Bolivia_Epilogue_Neutral.1.t: "The Founding of the La Paz Triumvirate"
LATAM_Bolivia_Epilogue_Neutral.1.desc: "Hole 4 at the La Paz Golf Club frustrated Juan Cueto Sierra. He had never been fully accustomed to the left dogleg, always overshooting or undershooting on his first stroke, sending his ball into the rough. In their normal games, Sierra's companions would have offered some snide remark about his inability to stay on the green.\n\n"The Treaty went well," said Norberto Odebrecht, a Brazilian construction tycoon, setting aside their usual topic. He lined up his shot, struck it true and watched the ball soar into the air. "Bolivia's open for business to all of us. Sovereign, neutral territory, eager to receive investments and financial support." He turned back to his companions, flashing a smile. "Don Gregorio, you look worried."\n\n"About the sandtrap, Norberto," said Gregorio Pérez Companc, an Argentinean oil magnate weighing up which club to use. "And I told you, call me Goyo."\n\nOdebrecht's smile turned down, and he let out an exhale of breath halfway between a chuckle and a scoff. He was, on average, a decade older than both Sierra and Companc, and he loved to tease them about their youthful inexperience in business. Already wracked with his own private fears about his place in his father's company, Companc found himself distracted enough by his senior's words that he overshot and sent the ball into that sandtrap. He cursed, Odebrecht laughed, but Sierra was busy staring up into the blue sky.\n\n"This will be good for us." Sierra looked back at his companions. "Argentines and Brazilians and Chileans, all working together in this country for a common cause. Building them up after all their troubles, investing in its future." He picked up his iron, walked to his mark and lined up with the tee. "Who knows? Maybe we'll have so much at stake here, war would be unprofitable.""
LATAM_Bolivia_Epilogue_Neutral.1.a: "This time, he overshot, and muttered darkly as his ball ended up in the treeline."

LATAM_Bolivia_Epilogue_Neutral.2.t: "Enrique Hertzog, Leader of Bolivia, Meets Quadros"
LATAM_Bolivia_Epilogue_Neutral.2.desc: "For a moment, the newly elected President of Bolivia struggled to think about important matters such as Bolivian neutrality while his mind tried to unravel the walking enigma before him that was the Vice President of Brazil. Enrique Hertzog had been forewarned about Jânio Quadros. Not at all like the diplomats he met in the days prior or the Varguists he knew two decades ago.\n\n"Congratulations on your victory," Quadros would say. The other dignitaries echoed the words with a hollow formality, as if elections held no weight when private negotiations between leaders decided the outcome rather than the fickle will of the masses.\n\nBut when Quadros said it, he understood it for the achievement it was, a continuation of real national stability.\n\nWhen Quadros said it, it was as if he respected Bolivia as a neutral sovereign nation and not as a puppet to be toyed with. Something in his eloquent, if accented, Spanish, or in the way he rested his chin on his steepled fingers, elbows planted wide on the Palacio Quemado's brocade armrests, gave an air, if not of dignity, at least of honesty.\n\nAt the least, he was not the drunkard they told Hertzog he was. Hertzog gathered Quadros was a generation younger than he was, yet there was an almost childlike energy to his every hand gesture, head movement, and cheeky grin.\n\nOr perhaps it was simply the facts of the matter that lifted his spirits. Brazil would support Bolivian neutrality. And Brazil hoped for a Bolivia that could play an active role in a peaceful South America mediated by trade."
LATAM_Bolivia_Epilogue_Neutral.2.a: "It was hardly a difficult sell."

LATAM_Bolivia_Epilogue_Neutral.3.t: "The Concerns of the La Paz Triumvirate"
LATAM_Bolivia_Epilogue_Neutral.3.desc: "They called it Hole 19, the final stop for all guests at the La Paz golf club. For many, it was a well-deserved break after a long day on the links. Juan Cueto Sierra was drinking iced tea with "Goyo" Companc when Norberto Odebrecht, who'd been missing the entire day, stormed into the club. He had a local newspaper in his hand, and slammed it down on their table. Both Sierra and Companc had already read its headline: LABOUR DISPUTES CONTINUE, GOVT NEGOTIATORS "STONEWALLED".\n\n"Norberto,' said Companc, "we're trying to get away from that news." He pushed the paper back towards a now-seated Odebrecht.\n\n"Fuck you. You don't have as much riding on this as I do." He folded the paper in half, rested his wrist on it. "Goddamn communists."\n\n"Norberto, you're distressed. Have a drink." Sierra flagged down a waiter; Odebrecht dismissively asked for a soda.\n\n"It's not the first one, either. There's been all this agitation across the mines. It can't last, gentlemen." He took the soda from a passing waiter, engaging with it only in furtive sips.\n\nCompanc rattled around the ice in his half-drunk whiskey glass. "The government seems to be handling this well. Strikes are put down the day they emerge. I wouldn't worry so much about it."\n\n"Still," said Sierra, "the government has been compromising on some points. I wasn't happy to read that, myself." He set his own glass down, eyes flicking between both of his companions. "You know, I have dinner with the ambassador here. I'll ask him how it's going.""
LATAM_Bolivia_Epilogue_Neutral.3.a: "Sierra sculled the rest of his drink in one smooth motion. "You can't let this thing fester.""

LATAM_Bolivia_Epilogue_Neutral.4.t: "Cold Concerns on a Hot Line"
LATAM_Bolivia_Epilogue_Neutral.4.desc: ""...to congratulate you on your recent victory!" - Herzog said into the phone. The President of Bolivia was a by-the-book, but friendly enough, which Lacerda liked. "I am very grateful for the kind words. Since you called, we could talk if you have an extra minute."\n\nA heavy sigh was heard on the other end of the line: "Mr. Lacerda, I'm told you did have concerns."\n\nTo the point. This could be productive. "Saúde, Mr. President. It is not for me to tell you how trying these times are, naturally. The Southern Cone can be an unruly place."\n\n"Hence why you wish to renegotiate Bolivia's position with Brasília?" It was an easy assumption to make, hardly difficult to see coming.\n\nLacerda forced a laugh: "I'll not force you into anything when you are still getting accustomed to power, but you and I do have much the same worldview, as do our parties."\n\nA brief pause: "Lott made assurances to preserve-"\n\n"And I respect The Marshal's decision making!" Lacerda was quick to point that out. "Bolivia's neutrality is most important to her." A decision I've certainly come to resent.\n\n"And what do you purpose?"\n\n"I can force you to do nothing, but this cannot be said of our neighbors." Lacerda warned. "Argentina and Paraguay may have very different ideas on the matter...I merely wish the best for both our nations."\n\n"You need not convince me of this, Carlos." Herzog was conciliatory. "But my people's welfare takes greater priority, you understand.."\n\nLacerda paused, defeated. "Understandable, just as well.""
LATAM_Bolivia_Epilogue_Neutral.4.a: "Order at the expense of progress, damn Lott! Lacerda mused sourly. "SO! How's the family?""

LATAM_Bolivia_Epilogue_Neutral.5.t: "Chum in the Water"
LATAM_Bolivia_Epilogue_Neutral.5.desc: "The Amazon always seemed to find a way to humble even a man such as Adhemar de Barros. His boat had taken him a few miles up the Tiete River, not too far from his old stomping ground in São Paulo. It wasn't the fanciest trawlers one could get, more often it was the kind reserved for Yanqui retirees scuttling off the coast of Florida, as opposed to the more imposing sight of the jungle towering above.\n\n"Caralio..." Norberto Odebrecht was similarly dwarfed in this environment, which was why Adhemar had chosen it. They came a long way from their earlier business dealings in São Paulo, with 'Od' becoming a construction magnate in Bolivia and Adhemar winning the presidency in Brasília. He was happy that Od had founded a successful business, but would rather not take chances on him getting ideas above his station.\n\n"So, when were you going to marvel at my majesty, Norberto?" The president asked with half-feigned indignation. Od chuckled: "What, are the parades not jaunty enough for you?" Adhemar gave a playful sneer. "How dare you, politicians don't make any money!" The mosquitoes buzzed just over their heads, Adhemar raised an eyebrow. "At least, not what you make... perhaps you can help with that."\n\nOd blinked. "By god, that didn't take long." He said sardonically, clearly not expecting the talk this early. Adhemar narrowed his eyes, curious. "You have quite the operation in La Paz, Od, I merely wish to help this venture, most would kill for the opportunity; an official partnership with Brazil's head of state..."\n\n"Business in La Paz is doing quite well, yes." Od forced a smile, concern clear in his eyes. "But surely, you've heard the goings on in B-" Adhemar briskly waved the thought away. "It matters not; building or rebuilding, Bolivia will be reliant on men like you for urban development - and what better way to ensure the best offers and the most contracts than an endorsement from Brazil's most illustrious leader?" Adhemar knew to offer his hand well before Od was willing to receive it..."
LATAM_Bolivia_Epilogue_Neutral.5.a: "...which was precisely why Od shook his hand anyway, the dancing dollar signs in his eyes doing much to stifle his unease."

LATAM_Bolivia_Epilogue_Neutral.6.t: "The Fears of the La Paz Triumvirate"
LATAM_Bolivia_Epilogue_Neutral.6.desc: "Parking at the La Paz golf club had been uncharacteristically full, causing no small amount of consternation among its guests. Most of them were new visitors for a tournament held to prove that the new Bolivia was open to business, including professional golfing. After ten minutes of waiting for the valet, Odebrecht shrugged and led the rest of his friends to the parking lot. Sierra and Companc followed without complaint. In truth, they were quite glad to be away from a crowd. Their conversations today were about the dangers of large crowds: magnets of violence which rippled through La Paz. They had been fortunate enough to only hear them second-hand, stabbings in radio and newspapers, shootings discovered through whispers and stories. Yet they were ever-present, and even casual observers could tell they were politically motivated.\n\n"So," said Sierra, "about the AID coalition. Some of my friends are saying it's strained-"\n\nSomething loud cut him off. An explosion on the other side of the lot: a cheap car between expensive ones. The trio were far enough to only feel its force as a sudden rush of wind, but they were still caught off-guard by it. Smoke rose from the husks of cars caught in the blast. The trio recognised one, crumpled and smoking.\n\nCompanc's breathing hastened. His car, up in smoke. Sweat broke out on his brow. A minute or two early, and—\n\n"Jesus," muttered Odebrecht. The crowd had split into two: one half was still at the entrance of the golf club, harassing passing valets to get their cars out first; the other half was held back by security trying to cordon off the parking lot, against panicked guests who just wanted to get out as soon as possible. The trio were pushed back outside that cordon. Odebrecht and Sierra looked at Companc, still staring at the column of smoke that marked where his car once was."
LATAM_Bolivia_Epilogue_Neutral.6.a: ""Fuck this," Companc said. "I'm going to make some calls about this place.""

LATAM_Bolivia_Epilogue_Neutral.7.t: "The Deals of the La Paz Triumvirate"
LATAM_Bolivia_Epilogue_Neutral.7.desc: "Guests at the La Paz golf club were seldom allowed in its inner halls. They were permitted only by invitation, from members esteemed enough to approve strangers. General René Barrientos, despite his own high stature in the Bolivian armed forces, was still a mere guest, and he felt that distance as he stood before three increasingly-prominent businessmen in one of its smoking rooms, seated and expectant.\n\n"The AID's done," he said, faux-sips on his glass of wine. "We have rebels and agitators all across Bolivia, and there's hardly a central government left to coordinate any kind of suppression. Gentlemen, the time has come for the army to take charge and pull this free-fall back into a controlled descent."\n\n"For which," said Companc, drinking his scotch, "you'll need capital?"\n\n"Our armaments themselves are sufficient. I can guarantee the loyalty of key officers. What I cannot guarantee at the moment is the loyalty of civilian figures necessary for this transition." He fixed them all with a stare that drifted back and forth.\n\n"An end to the violence would be desirable," said Sierra, staring back, a lit cigar between his fingers. "What concerns us, General, are some of the noises your lot's been making about our investments. We cannot lend you the support you need if you plan to take away our capital."\n\n"I have no plans for drastic measures, Mr. Sierra." He sat down, setting his wine on a side table. "But you will not have any capital if the rebels win. I can take that energy and direct it to more suitable causes, end the violence, provided that you're willing to make some sacrifices." He leant in, a dark smirk on his lips. "Who are you going to trust when this all finally falls apart? Me, or the communists?""
LATAM_Bolivia_Epilogue_Neutral.7.a: "Companc sighed, knowing there was only one real answer."

LATAM_Bolivia_Epilogue_Neutral.8.t: "The Anxieties of the La Paz Triumvirate"
LATAM_Bolivia_Epilogue_Neutral.8.desc: "The La Paz golf club was not meant for individuals; it was a place for gatherings, a social space for the well-to-do of Bolivia. Yet Norberto Odebrecht was the only one in its members-only bar, with only a bartender to ignore and a glass full of brandy to nurse. The sun snuck in through the northern windows, but Odebrecht was at the far end of the bar, just beyond reach of its light. On the radio, Bolivia's newest president was issuing a speech.\n\nThere were promises so vague that they would crumble in your hands with even the lightest hold. Reforms were blocky sketches; the future of the national revolution was a vague gesture to a cardinal direction. The words floated in the air, and Odebrecht didn't care enough to grab them. He knew it mostly as bluster, thinking back to that day they cut a deal with him, thinking back to the only promise he made: an end to the violence.\n\nHe supposed that promise was fulfilled, in spirit if not in letter. The spate of bombings and skirmishes in the street had decreased, replaced instead with the state's cold iron grip over dissent. Strikers were rounded up in droves; labour leaders and political opponents vanished in the night. The average Bolivian could walk down the street and not fear a car bomb or an overzealous student, and that security alone guaranteed Barrientos a great deal of popularity.\n\nNow his speech was turning towards external matters, and Odebrecht's greatest fear was confirmed: Barrientos was talking about Paraguay. Bluster turned into jingo. God, thought Odebrecht, he'd never said anything about Paraguay when they cut their deal. War was the last thing he wanted, but the Bolivian people cheered him on as Barrientos extolled the strength of their armed forces, and decried the vices of the Paraguayans. Odebrecht called for another drink, something stronger, and thought about what he'd do when he finally had to leave."
LATAM_Bolivia_Epilogue_Neutral.8.a: "The days of Bolivia as a safe place to park one's money was turning into night."

LATAM_Bolivia_Epilogue_Neutral.9.t: "Ware Bolivia"
LATAM_Bolivia_Epilogue_Neutral.9.desc: "It had to happen sometime.\n\nLacerda had nursed a measured hope that the oligarchic system suffocating Bolivia would collapse during his presidency. The coup in La Paz was front page news, and Lacerda studiously pored over the report military intelligence had prepared for him.\n\nThe man who had declared himself President was one General René Barrientos; all accounts were that the armed forces were behind him, the population in the cities reacted mostly neutrally and the nation's peasant mass was as inert as ever - Carlos was reminded of a turn of phrase by his German namesake - "potatoes in a sack form a sack of potatoes." A military coup is never ideal, of course, but sometimes such a drastic measure was the only thing that rouses liberty from the verge of eternal sleep.\n\nEither way, the oligarchs, who had run Bolivia like the slave-driving conquistadors of old, were gone, and hopefully so too was their myopic policy of neutrality in continental affairs - a neutrality which in practical terms was pro-Argentine. Barrientos' new regime offered a possible opportunity for realignment; Lacerda started preparing directives to organise something of a welcoming gift for his opposite number in La Paz - perhaps some favorable arms deals would give the General something to think about."
LATAM_Bolivia_Epilogue_Neutral.9.a: "Potatoes can be boiled and mashed."

LATAM_Bolivia_Epilogue_Neutral.10.t: "The New King of Tin"
LATAM_Bolivia_Epilogue_Neutral.10.desc: "The report from military intelligence about the goings-on in La Paz had taken Adhemar somewhat off-guard. It had never concerned him too much, but the oligarchic rulers of Bolivia had always exuded a sort of self-evident will to rule, Adhemar had taken it as rather a given that they would continue to rule their little tin fiefdoms indefinitely. With the coming of the military junta under General René Barrientos, reality sunk in.\n\nAdhemar tried to order his thoughts. What really troubled him? Firstly, he was concerned about his investments in the country. Insurrectionary governments in resource-rich nations did sometimes go after foreign capital to curry favor with the common people, which was all very well for them, but what of the needs of Adhemar's Bolivian portfolio? Political instability was anyway bad for the market, and risked escalation with Argentina besides, who were bound to be disturbed that their reliable partners in Bolivia were gone.\n\nPerhaps it was a question of attitude. According to the report's analysis, Barrientos was hardly another Castro. If La Paz was willing to negotiate, then by God, Adhemar would negotiate. It was early days yet, but if he could coax Bolivia closer towards Brazil, just enough that the Argentines don't go crazy - it was a risk, but since when did Adhemar shy away from risk?"
LATAM_Bolivia_Epilogue_Neutral.10.a: "That's motivation."

# Cayenne Referendum

LATAM_cayenne_referendum_desc: "\nAfter decades of negligence and Brazilian interventionism, Caiena's future is on the line as protests have erupted into violence. A referendum on its independence, at first demanded by the French, was consented to by both the OFN and our government in order to end the issue, with the OAS overseeing the process to prevent further violence. For all the talk about upholding self-determination, its future will not be decided without foreign meddling. We may need to get our hands dirty to prevent a diplomatic embarrassment."
