PAR_zone_gran_chaco_desc: "§FThe §LGran Chaco§!, also called the §LDry Chaco§!, is a §Lsparsely populated, hot and semi-arid lowland§!. Given the nature of its terrain, a §RFULNA insurgency§! is §Rimpossible§! here, and it remains an area of §Brelative peace§! for the 3% of §iParaguayans§! who call this place §Ghome§!\n\nMeanwhile, the £TNO_game_rule_flag_PAC  §iFirst Paraguayan Corps§! keep a vigilant watch over the western border, carefully preparing for a potental §KSixth§! §iChaco§! §YWar§! with\n£TNO_game_rule_flag_BOL  §YBolivia§!.§!"

