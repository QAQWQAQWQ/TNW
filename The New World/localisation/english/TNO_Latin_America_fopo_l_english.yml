LATAM_cayenne.1.t: "The Graft of the Guianese Rubber Tapper"
LATAM_cayenne.1.desc: "It was another day of performing the same mind-numbing procedures ad nauseam until his reprieve for the night. The same well-worn knife, the same meticulous slices, the same oozes of rubber captured millimeter by millimeter into his bucket. Clément hid how he could do this with his eyes closed, believing it was a sign of his age and that it revealed that this was all he knew.\n\nOf course, this was not by choice. The French were not known in Guiana for their kindness, at least, never to his kind. No, when he was born, it was deemed by the powers that be that he would work for others for the rest of his life. That was the case under the French, and when the colony switched hands to Brazil, little changed.\n\nHe toiled daily for some Brazilian family luxuriating in a deluxe plantation house he would never be allowed to step foot in. His closest contact with them was the "Jagunço", a hired thug watching over him.\n\nToday, Clément noticed the laborer nearest to him was afflicted. The man was weak, slow, and close to fainting. As he collapsed, Clément rushed over to help - Malaria - looked like it had been in the post for a while, but he couldn't afford to miss a day of work in this climate. He called for help, only to be met with the cold and familiar tap on the back of the Jagunço's truncheon.\n\n"Back to work." Three words, one implied threat. Clément returned to rubber tapping, knowing he didn't live this long by being a hero. The next day, someone new was working beside him. He never found out what happened to the man stricken with Malaria."
LATAM_cayenne.1.a: "Fuel for the furnace."

LATAM_cayenne.2.t: "To a Higher Power"
LATAM_cayenne.2.desc: "The Guianese Socialist Party, or PSG, was a small organization. Yet to many Caiena citizens, it represented something once thought impossible - change. Guianese life had been so often stuck in a cycle of master to master that when someone finally offered a break from it, people came calling. The party's congress offered no deviation from this popular feeling.\n\n"It's another cruel fact of life that our master prides itself on being a democracy, taking the fight for democratic values to other countries, yet they can not bear to spare this privilege for us." Leopold Héder, a veteran socialist, spoke with vigor to a crowd of workers indulging in their sparse freedom from work and middle-class employees with dreams of something grander.\n\n"The politicians from Brasília have heard us scream so loud for freedom and local elections but can only respond to us with requests for 'politeness'." Justin Catayée, the PSG founder and well-used to colonialist condescension, joined in. "It's easy for them to be polite when they rest their foot on our neck - not as easy for us." The crowd screamed as he put their feelings into words.\n\n"Therefore, we must go a level above them." Héder alternated onto the microphone. "We will soon appeal to the Organization of American States for greater autonomy and a chance to elect our own representatives. We hoped this would not be necessary, but the Brazilian military and farmers have brought this on themselves with brutality."\n\nCatayée was less accommodating. "Today, we say no to the brutality of the Jagunço, no to the callous indifference of the politician, and yes to independence and liberty. I promise you today, they will all finally hear our voices from underneath the boot." Cheers erupted as one part of Guiana firmly said no to Brazil."
LATAM_cayenne.2.a: "Democracy for me, but not for thee."

LATAM_cayenne.3.t: "He's Disabled"
LATAM_cayenne.3.desc: "In the head office of Caiena's City Hall stood no elected official of the people but a military overseer given authority by a foreign country. His name was Admiral Ângelo Nolasco de Almeida, a servant not to the Guianese people, but to the Brazilian state. Today was a typically uneventful day in his life - until the phone rang.\n\n"Nolasco speaking. Who is this?"\n\n"My name is Darly Alves, but I'm sure you've heard of me." Even if Nolasco didn't know him, the fact he owned a telephone and had the number to his office spoke volumes. "I'm a simple farmer, and recently, there have been... issues that we can work together to solve if you allow me to elaborate.\n\n"I'm listening."\n\n"The Guianese Socialist Party is raising an awful racket these days. As a representative of Brazil's interests in Guiana, it is worrying to hear their rallies shout about their radicalism and for total independence. We can't sit idly by as they discuss this treason; don't you agree that something must be done to quell their anger?"\n\n"Mr. Alves, I assure you that my administration is doing its best to stop these independence movements-"\n\n"With all due respect, your best simply isn't good enough. While you freely twiddle your thumbs in that big office, I've heard other farmers discuss their own proposed solutions. They aren't pretty, but if the government will not help us, who can blame them? I trust you will make the right decision."\n\nThe other line went dead as Nolasco considered how serious the man on the other end was. Regardless, his resources were nil, so he could only pray that this problem would blow over..."
LATAM_cayenne.3.a: "Stuck in the middle with a ticking timebomb."

LATAM_cayenne.4.t: "Killing an Idea"
LATAM_cayenne.4.desc: "It had been months since Darly Alves had kindly asked Nolasco to do something about the PSG. To his disappointment, the Admiral continued to stick his head in the sand and do nothing. Now, it was time for Alves and his boys to deal with the issue as he directed the Jagunços through his plan from the confines of his barn.\n\n"Alright, so I think by now you are all familiar with that rabble-rouser Justin Catayée, supreme leader of the PSG." The men dutifully nodded. "He's an agent of anarchy, a man who does not respect Brazil in the slightest. We are doing her a favor by assassinating him. If not for that, think of your families, starving after your jobs are stolen by these fanatics when they nationalize my land to sate own greed."\n\nSome were taken aback hearing the mention of murder, if only for a moment. Most were not. "A little birdy told me Catayée is planning a trip to the countryside, far away from prying eyes, our territory. From there, we can shoot him dead. It doesn't matter where he is because I'm certain that most in Brasília will thank us for this."\n\nDespite this reassurance, Alves could sense some lingering apprehension. "We all know the apathy of the local police, but to deter them further, I have budgeted hush money for this operation. Once this has taken place, the rest of Brazil will see you as patriots. Now relax, for we will lie in wait until we can take our retribution."\n\nThe barn turned silent once more as the discussion would have significant ramifications for Brazil, only not the kind the men in the barn had planned..."
LATAM_cayenne.4.a: "Blood moves the wheel of history."

LATAM_cayenne.5.t: "Too Far Gone"
LATAM_cayenne.5.desc: "TOP SECRET\nFOR THE OFFICE OF ADMIRAL ANGELO NOLASCO DE ALMEIDA\n\nCAYENNE - SCENES OF POLITICAL UNREST\n\nYesterday, the leader of the Guianese Socialist Party, Justin Catayée, was the subject of an attempted assassination. Reports suggest he was attacked in a friend's house during a trip to the countryside which was invaded by multiple unidentified suspects who shot at Catayée before burning down the house.\n\nFortunately for him, Catayée was saved by his personal guards from the blaze and is currently in stable condition residing in hospital. Currently, most suspect that the Jagunços in the employ of farmer, Darly Alves, were responsible. However, local police have proven surprisingly silent on the matter, only issuing a public statement that they are still investigating the case.\n\nOur intelligence suggests that the police force was paid off by numerous farmers not to investigate the case, meaning their investigation will soon turn into a dead-end.\n\nThe more pressing matter is the riots erupting from this attempted assassination as previously political moderates have become radicalized towards the cause of independence. Worryingly, it appears their call for a referendum on the matter of independence is increasingly gaining traction in the OAS as the popularity of the PSG has skyrocketed.\n\nEXPECT TO HEAR FURTHER FROM US REGARDING YOUR ADMINISTRATION'S CONDUCT AND ITS FUTURE.\n\nORDEM E PROGRESSO"
LATAM_cayenne.5.a: "After the report, Nolasco buried his head into his hands."

LATAM_cayenne.6.t: "An Offer You Can't Refuse"
LATAM_cayenne.6.desc: "President [BRA.GetLeader] had barely settled into the Presidential Office, and now the burdens of Lott had already presented themselves on his desk. Disregardless his opinions on Lott, [BRA.GetLeader] could only sigh after learning about his policy on Guiana. Even on points he thought were sound, putting that idiot Nolasco in charge had completely scuppered them.\n\nHe flicked through the report, looking through the sections already highlighted by his secretary. "The Organisation of American States has watched the situation in Caiena occurring with concern. We had already received concerns from representatives of the PSG, but this recent unrest has proven the need for quick action."\n\n"Effective immediately, the OAS will extend an invitation to the Brazilian government to collaborate in establishing a Guianese independence referendum." If you decline, you will be considered a pariah in South America - that was the unstated part. "We look forward to the newly elected President's response and hope for a fruitful working relationship."\n\nThere was no way [BRA.GetLeader] could take on the OAS. Regardless of his own feelings and that of his party, he simply did not have enough political capital to go against the American-backed organization at such a early stage of his government. With the alternatives ruled out, he began writing back with the only response left to him."
LATAM_cayenne.6.a: ""We look forward to helping determine the future of Guiana.""
BRA_cayenne_proxy_tt: "With a referendum being held over §KBrazilian§! integration of §DGuiana-Caiena§!, a new diplomatic crisis has begun and can be found in the §YGlobal Conflicts§! Tab."

LATAM_cayenne.7.t: "Life Is Peaceful There"
LATAM_cayenne.7.desc: ""Ah, Mr. President! Your call found me at the perfect time," Pauxy Gentil Nunes leaned on his desk and fanned himself as he spoke. "There's a concert in Macapá tonight - the orchestra's all the way from São Paulo-"\n\n"Nunes, music is what makes us feel alive!" Adhemar exclaimed down the phone, the novel idiom giving him command of the conversation. "Just as Paulista musicians find opportunity in the beautiful north, so should Brazilians of all walks of life, don't you think?"\n\n"Naturally!"\n\n"Amapá is flourishing under your tenure - you know, everyone down here is talking about Caiena? You could let the good people of Amapá know that even more opportunities await them over the border - I mean land grants, good credit, and investment, things of this sort. I'm not saying go door-to-door - make some nice posters, get on the radio, and tell them hello from me."\n\nGovernor Nunes looked out the window at the distant jungle shimmering in the sun. "That sounds wonderful, Mr. President, but Amapá isn't a big place - I'd hate to see half the territory up and leave."\n\n"I didn't mention that, Mr. Nunes? As soon as this referendum is over and we get our result, you'll be the Federal Intervenor of Caiena. Sounds pretty agreeable, don't you think?""
LATAM_cayenne.7.a: "A PSP stronghold in the northern jungle?"

LATAM_cayenne.8.t: "Une Entrée"
LATAM_cayenne.8.desc: ""I admit to being an ignorant American, Mr. President - I had no idea you could get such fine French cuisine in Brasília, of all places!" The official from the Organisation of American States smiled warmly. Adhemar dabbed at his lips with the napkin and returned the smile graciously, although he had totally forgotten the name of his dinner guest.\n\n"My good friend," Adhemar said, "I'll happily pass your compliments to the chef! He's graced Brazil's kitchens for over twenty years. Of course, it's only natural to be treated to such a fine meal since you and your colleagues are doing such a good job with the referendum."\n\n"Ha! Please, it's nothing. Our job is only to guarantee everything is above board - at the ballot box, gotta keep it free and fair, plain and simple. It's what distinguishes us from the sorry folks across the Atlantic, like your chef friend. Lotta his countrymen in Caiena too, of course." The official waved his fork in the direction of the kitchen.\n\nAdhemar nodded, keeping his frustration masked. He needed the OAS' help legitimizing the referendum, and hiding any discrepancies Norlasco's work might create, but It seemed more and more that this Yankee was too idealistic or otherwise too boring to be won over by words of flattery.\n\nPerhaps it was time for some dollar diplomacy? He well knew Americans understood graft perhaps better than anyone else. But this wasn't universal - his guest might consider such a thing a bit of a faux-pas."
LATAM_cayenne.8.a: ""I understand totally - in fact, we'd love to make a 'donation' to help with your efforts...""
LATAM_cayenne.8.b: ""You know, you must try the crème brulée.""

LATAM_cayenne_endings.1.t: "Cat's in the Bag"
LATAM_cayenne_endings.1.desc: "[BRA.GetLeader] sat by his television, watching it with his legs outstretched and an alcoholic beverage in his hand. After all the work, he was confident about the result the people had voted for. This was just a little reward, satisfaction after a job well done, turning up the volume to receive it in full.\n\n"It looks like, with this box opened, that the Yes votes have an unbeatable majority now. For those just tuning in, this has solidified that Guiana-Caiena will become one with Brazil, intertwined and inseparable."\n\nAnother screaming yes came from the other side of the television. Of course, this wasn't the only reason why [BRA.GetLeader] was so happy. A few hours ago, some careering Caiena aide was on the blower to him. They mentioned that OAS officials were reporting the plebiscite as above board, a fair and free referendum. There wouldn't be any trouble from them past this.\n\nWhether the end result was a true expression of the people's democratic will could be a matter of debate. Regardless, [BRA.GetLeader] wasn't prepared to offer any opinions that went against the OAS's verdict. Besides, they were both a busy and knowledgeable organization, so he shouldn't waste their time offering them his uninformed opinions.\n\n[BRA.GetLeader] took another swig of his glass and stumbled out of his seat. He would do well to sober himself up quickly; the press were going to want a word with him about this, and he was all too happy to oblige. It was a stunning victory at the start of his term, something they would all remember him by..."
LATAM_cayenne_endings.1.a: "...Brazilians, with raised glasses in celebration.\nThe Guianese, without."
BRA_cayenne_golden_ending_tt: "§FWe have §Gachieved§! the §YGolden Victory§! scenario, there is no doubt as to that the election was legitimate and §nBrazil§! had won the popular mandate.\n§YCayenne will be integrated fully in 360 days.§!§!"

LATAM_cayenne_endings.2.t: "Your Property"
LATAM_cayenne_endings.2.desc: "It was another day of performing the same mind-numbing procedures ad nauseam until his reprieve for the night. The same well-worn knife, the same meticulous slices, the same oozes of rubber captured millimeter by millimeter into his bucket. Clément could do it with his eyes closed. It was just as well because it looked like he would be doing it for the rest of his life.\n\n"Free and fair", what a morbid joke, one that they were the punchline too. He was there at the polling station. He saw the busloads of Brazilians carted in over the border to vote. He heard the stories about thugs knocking on people's doors, advising them to stay home for their wellbeing. He watched his fellow workers being bribed so they wouldn't vote, money for apathy.\n\nClément wished he hadn't been so optimistic, so romantic. At least then, he would have gotten the bribe, his vote being meaningless either way. But that was his curse. He was a naive fool to believe that the glorious free West would care about them - that they would be anything but an "acceptable casualty" in the fight against Germany and Japan - a bribe for Brazil's loyalty.\n\nHe felt the Jagunço's eyes bore into the back of his head, wondering if he was under suspicion for not having taken a bribe. Yet, one solace remained; he had another man watching over him. Justin Catayée, a true champion of the people, unlike [BRA.GetLeader]. Clément heard him talk about how he would keep fighting for Caiena, even while they were a part of Brazil.\n\nEvery inch of him hoped it was true, that he would not be disappointed again..."
LATAM_cayenne_endings.2.a: "...but even more longed not to be Brazil's property anymore."

LATAM_cayenne_endings.3.t: "The Force of Truth and Lies"
LATAM_cayenne_endings.3.desc: "Wheels hit the asphalt as [BRA.GetLeader] prepared himself - a hand through the hair - wipe down the tired eyes. The cameras came quickly as he walked down from the plane with the usual routine of smiles and waves. The Military Governor, Ângelo Nolasco de Almeida, was grinning ahead of him. They shook hands and posed for photos.\n\nIt wasn't lost on [BRA.GetLeader] how only a few months ago he wanted to strangle Ângelo over how he let the situation get so bad, but for today, a reprieve could be issued. A drive. Small talk. Car stopped. Doors opened. More camera flashes. Don't leave the Admiral in the car.\n\n[BRA.GetLeader] continued treating Ângelo as a pet during the media conference, fielding most of the questions, and permitting him to speak when politically opportune. No missteps, no gaffes, it all went off without a hitch.\n\nThe questions flattered him, praising the handling of a free and fair referendum, and him for choosing to hold it when democracy seemed so under threat elsewhere in the world. Now, it was time to put the people's will into action by signing their choice into law.\n\nÂngelo was allowed to sign the paper first. Afterward, President [BRA.GetLeader] marked the treaty with his name after a stately catwalk for the cameras. Then came the President of the OAS, putting down his own John Hancock. Following him, a host of invited members from Caiena, community leaders, and others of the ilk, for representation.\n\nThe last signatory approached, Justin Catayée. The pen was heavy as he picked it up, taking a deep breath, before signing Caiena to Brazil. Applause followed. [BRA.GetLeader] matched eyes with Catayée during the celebrations. He didn't clap, only one emotion in his eyes. Hate, an overwhelming hate for Brazil's President, before their eyes never met again."
LATAM_cayenne_endings.3.a: "[BRA.GetLeader] strained to think what he had done to offend him, did they meet before?"

LATAM_cayenne_endings.4.t: "Job to Job"
LATAM_cayenne_endings.4.desc: ""One for me and one for our hero, the grand Admiral." Darly Alves was usually not one to dole out the drink so generously, but today was a special day, their independence day. For far too long, the OAS had put upon them ludicrous demands, bowing down to mob rule after hearsay and rumors. It didn't matter that the rumors were true; they never confirmed them for certain.\n\n"To the continued prosperity of Brazil and Caiena." The requisite clink of the glasses followed the cheers. Ingesting the alcohol, Nolasco still couldn't escape the ambiguity regarding his career's future. The referendum's failure kept him from being fired, but he knew by the President's demeanor that his prospects were slim. Alves could see it on the Admiral's face.\n\n"Why so glum? You should be celebrating; the Guianese have finally shut up, and soon, business will boom once again."\n\n"[BRA.GetLeader] has it in for me; I could tell during the conference."\n\n"You? With the navy on your side? I wouldn't be so worried." Alves slurped down the remnants of his booze, drops staining his bright white shirt. "Besides, you could always work for me if the worst happens. Having a hero here would be a good look for business." Nolasco allowed himself to smile. When Alves put it like that, what was there to worry about besides running out of liquor?\n\nClément wasn't so happy.\n\nThere would be no reprieves for him bar his nightly rest, just the same meticulous maneuvers with his rubber-cutting knife day in, day out. The greatest change was the Jagunço's stare - fixated even closer onto his movement - his reward for dissent. A better future was out of reach; he only hoped the present wouldn't worsen."
LATAM_cayenne_endings.4.a: "Trapped under a burning sun and a starry sky."
BRA_cayenne_good_ending_tt: "§F§nBrazil§! has successfully §Gwon§! the referendum, and while many in the OAS doubt the legitimacy of our referendum they do not have the evidence required to push their agenda.\n§YCayenne will be integrated fully in 540 days.§!§!"

LATAM_cayenne_endings.5.t: "Stars Over Caiena"
LATAM_cayenne_endings.5.desc: "The Planalto could never be described as quiet. There was always the hum of officials from the various ministries buzzing around it. Today was a bit busier than usual, as the Foreign Ministry had begun to descend on the palace in the wake of the upcoming referendum results. They huddled around a radio, the live results of the Caiena independence referendum.\n\nEarly returns had been encouraging for the pro-Brazilian side. Pencils scrambled to make projections that would be corrected as the minutes ticked by. When the dust settled, it was clear that the referendum had gone decisively in favor of Brazil, with the people voting against independence.\n\nThe memo to the president was the culmination of decades of political success. From the beginning of the annexation to now, with the referendum, Brazil had finally been assured of its reward for the still smoldering war. The memo went on to discuss the foreign and defense implications of the vote.\n\nWith Caiena's future now assured and its population pacified, it would be less of a drain on defense resources while giving our government a stronger foothold and another province to use as leverage against Brazil.\n\nThe stability brought by the final referendum also provided the opportunity to trade across the border with the Dutch. Economic enrichment for both the new province to bring it firmly under control, but also economic opportunity for all of Brazil.\n\nSmiling officials placed the finished work on [BRA.getleader]'s desk."
LATAM_cayenne_endings.5.a: "Very good."

LATAM_cayenne_endings.6.t: "Reflections from the Prefecture Building"
LATAM_cayenne_endings.6.desc: "Since its construction in 1679, the Prefecture of French Guiana Building has seen many uses, from a Jesuit convent, to a government building, to a palace for the governors of French Guiana, to the seat of the Brazilian military governor, and now to a civil service office for the Brazilian government.\n\nFrom here, they would slowly absorb his homeland into theirs, until the difference between Guyanese and Brazilian was no more than a distinction to be remembered only in history books. Caiena would never be free, the flame of freedom had been extinguished forever. Those administrators in their suits who ran the Brazilian flag up the flagpole signed the death warrant for a free Caiena.\n\nBut as Justin Catayée watched the flag flutter in the air and felt the despair of a homeland stifled, he remembered the building. The shifting shape, the shifting tides, the shifting purpose it had served. So, too, he would have to shift.\n\nHe was now a citizen of Brazil, with the right to vote and the right to organize. He might not be there to proclaim a free Caiena, but he could still act and protect the people of Caiena from those who would do them harm. Nolasco and Alves would still do their best to harm the people he loved.\n\nNow was not the time to be consumed by despair, but to shift, just as the building had done. A purpose could be shifted to something else. He had to keep organizing."
LATAM_cayenne_endings.6.a: "The world never stops turning."

LATAM_cayenne_endings.7.t: "Where is Guyana Again?"
LATAM_cayenne_endings.7.desc: "In a saloon in Acre, the radio was blaring as a lumberjack sipped a glass of moonshine. When 7 p.m. rolled around, the radio changed from music to the news, announcing the start of A Voz do Brasil.\n\nHe took another sip of his drink, it burned through him. The announcer cleared his throat and spoke over the radio about the successful referendum and the integration of the Caiena into the United States of Brazil.\n\nIt was always strange to hear the United States followed by anything but America. The report mentioned a little bit about some protests over in whatever it was our soldiers had conquered.\n\nHe stumbled out of the bar as the radio spoke to the glazed-eyed patrons. He ran home and shouted the good news to his brother. He babbled about the new land Brazil had conquered in Africa. Before worrying if they had jungles in Guinea or wherever it was.\n\nMaybe his salary would go down with all the timber flooding the market from this new land. All this change, the country is getting bigger. Too much for one night."
LATAM_cayenne_endings.7.a: "I need a lie down."

LATAM_cayenne_endings.8.t: "Burning"
LATAM_cayenne_endings.8.desc: ""The votes are in; we can say that, without a shadow of a doubt, Caiena's future belongs with Brazil. It certainly seems as if the polls got this dramatically wrong..." The reporter's commentary was drowned out by Guianese protest. This wasn't what they voted for; Brazil was trying to pull the wool over their eyes, just like they had before. Every beating, every insult, every murder.\n\nNo more.\n\nOnto the streets, the men and women of Caiena began marching for justice, but that was not where it ended. In their usual hamfisted manner - the police tried to block their path - put a quick end to it. But tonight, there would be no quick end. Words turned to fists in minutes as the small security force was overwhelmed by waves of fury.\n\nThe Brazilian businesses were their first target, those that grew fat from their suffering and traded their independence for capital. First, the windows were smashed, but that was far from enough. Then came the gasoline, and then the Zhdanov cocktails. Storefronts lit up across the city like the Fourth of July.\n\nThe Brazilian newspaper would call it their Kristallnacht; the Guianese called it a day of liberation. Brazilians aired horror stories, calling for military intervention, while the Guianese built barricades. Unity was preached from ivory towers, and division was carved into the streets."
LATAM_cayenne_endings.8.a: "Unity can not be bought, only earned."
BRA_cayenne_public_anger_ending_tt: "§FWhile we kept legitimacy high enough and the §npro-Brazil§! option won the referendum, the people of §DCayenne§! have seen through our facade and the chaos they have caused complicates the future of Caiena...§!"

LATAM_cayenne_endings.9.t: "Bulldog Front"
LATAM_cayenne_endings.9.desc: "By Caiena's daybreak, a new flag was hoisted into the air. Green - defaced - purified from the yellow rhombus, blemishing it like a filthy scab. It fluttered in the wind with crippled wings, far from a majestic sight, but it was all they had. Some still looked to it with pride, hopeful that one day, they may choose their own flag - that one wouldn't be forced upon them again.\n\nThat day wasn't today.\n\nThey were lined up like pincers, surrounding the city, armed with the finest killing machines Brazil could afford. The APCs came in first, battering rams to destroy the barricades, shock and awe tactics.\n\nWhere there were once brave fighters, they were now only scared citizens of a nation that wasn't their home. Some still held a semblance of a fighting spirit. But, like all things, it came to an end - a painful end.\n\nBrazil's military moved into the city, lock and step like a Roman phalanx, an unbreakable wall choking Guianese to death by baton, riot shield, and rifle round. Every ounce of resistance was met by a flamboyant show of force from the military, eager to make an example of them. Soon, the only force left in Caiena were Brazil's men in green.\n\nBy Caiena's nightfall, an old flag was hoisted into the air, free from disfigurement. It flew with authority, a marker of suzerainty. The sounds of rioting were a distant memory, replaced with the thud of a jackboot. The Guianese were left by the dozens together, zip-tied on their stomachs like livestock.\n\nLivestock, the only way Brazil could make their intentions clearer would be if they were branded. Such cruelty wasn't to be - if only because Brazil hadn't thought of it yet - the Guianese on the ground thought."
LATAM_cayenne_endings.9.a: "Order by a jackboot, and progress through the barrel of a gun."

LATAM_cayenne_endings.10.t: "An Occupational Hazard"
LATAM_cayenne_endings.10.desc: ""Grand Admiral, the Planalto Palace was on the line just now," exclaimed one of Nolasco's aides. "They've sent orders to send in the military, the integration's canceled, they're occupying..."\n\nNolasco's eyes widened as a flurry of sensations hit him all at once. Anger he was being maneuvered around. Fury they overruled his efforts to keep the peace. Wrath as he was being rendered irrelevant.\n\n"How... how did this happen?" sputtered the admiral, feeling his power sapping from the office as he spoke. He swore he could already hear the whirring helicopters come blitzing in.\n\n"The SFICI chief, he held a secret audience to communicate his opinion on the situation on the ground here in Caiena, and how he feels we may have... executed integration plans irregularly and inefficiently, and..." He did not want to hear another word. His own staffer was calling him incompetent and dishonest to his face.\n\nDoes the frilly little president not know what he was awakening, who he was dealing with? The OAS would condemn it and call it tyranny - he could already hear the phone calls, everything\n\nAnd the military. The damn military. He might as well have spat into the Minister of War's face and told him to clean it up. The military wouldn't just let this slide, they were loyal to him. He knew they would make him rue the day for the insult on one of their own.\n\nWith a sigh, he adjusted himself and his uniform and prepared to go out and deal with the damage. Well then, if the President decided to hand him the broom, he would make sure to use it..."
LATAM_cayenne_endings.10.a: "...and give anyone that he could a taste of the handle."

LATAM_cayenne_endings.11.t: "Sunset in Caiena"
LATAM_cayenne_endings.11.desc: ""To Brazil, and to the Grand Admiral!" Darly Alves fought back the urge to jump into some lengthy, impromptu toast, realized he had nothing and turned back to his savior. Finally came sunset - no more emergency notifications about uppity Guianese and their upstart riots, not anymore: that chapter was behind them.\n\nBut the Grand Admiral took a while to lift his chardonnay, his conscience evidently not present. Why on earth would anyone be thinking about anything else today? Now that Order and Progress became an official motto, they would finally see to it that it happened. The money would flow, control would be firmly theirs, and they could finally move on to moving on.\n\nNolasco, on the other hand, was all but certain he would not see that future happen himself - at least, not with the same employment. He heard it in the conversations in government before and after the referendum. As sunset came, he finally let it go and put the glass to his lips, waiting for his duty to end and the changing of the guard.\n\nClément sat pensively in his front yard, gloomily watching the sun descend beneath the hills. Symbolic, he thought to himself, the idea of Guyane seemed to plummet through the earth in exactly the same way. So much simply did not add up: the vote margin, the unrelenting lack of tolerance for the result. Even the OAS observers seemed nothing but uneasy, as if witnessing a crime.\n\nHe had learned not to expect anything different. He heard the referendum come and go, knowing from start to finish it was never going to be fair. But he thought about the reaction of those observers, those shocked international bystanders, and wondered if Guyane's absolution may come yet, this time with help from the outside."
LATAM_cayenne_endings.11.a: "The day is done, but it cannot always be night."
BRA_cayenne_legitimacy_fail_ending_tt: "§FWhile the §npro-Brazil§! vote had won the referendum, rumours swirl of soon to be taken OAS actions towards legitimacy of the referendum...§!"

LATAM_cayenne_endings.12.t: "Unwanted Suspicions"
LATAM_cayenne_endings.12.desc: "Following the referendum in Caiena the OAS have published a dramatic communiqué, commenting with harsh suspicion against our recent referendum in the region. Presented publicly for all to see, the communiqué lays bare the doubt that much in the international community have of the presented results.\n\n"Following the recent referendum in Caiena, the Organization of American States has been prevented from appropriately carrying out its activities in election monitoring and is unable to independently verify the results of the recent election. The office of the secretary general makes clear that irregularities in the presented results seem apparent, and the figures relating to both turnout and total voter count are extremely unlikely. The OAS potentially suspects the following improper activities:\n\n- Voter fraud\n- Voter intimidation\n- Voter suppression\n- The fabrication of both final voting figures and turnout figures\n- Bribery\n- Suppression of opposition and political campaigning\n\nOn the basis of these irregularities and logical suspicions, the OAS will ask the office of the presidency of Brazil to submit immediately to a proper investigation.\n\nSigned, the office of the OAS secretary general.""
LATAM_cayenne_endings.12.a: "Christ."

LATAM_cayenne_endings.13.t: "The Price Of Deception"
LATAM_cayenne_endings.13.desc: "José Antonio Mora felt the blood pulsing in his temple as if the vein were tapping an ice pick against his skull. He had expected a long, interminable and utterly frustrating call with President [BRA.GetLeader] over the Caiena business, but he had not expected such bald-faced lies to filter through the wires.\n\n"Mr. President- Mr. President, listen to me. The OAS has- the OAS has reviewed the results carefully. We've found irregularities in every step of the referendum more befitting of the Dominicans, and I do not say that lightly." More words squawking from the receiver; Mora rolled a pen in his hands. "As Secretary-General, I've authorised the Guianese government to ignore, for the moment, the r- for the moment, Mr. President." The last five words cut through another interruption. Mora heard [BRA.GetLeader]'s voice stumble backwards, as if hit by a right hook.\n\n"There will be another referendum, Mr. President." Mora sat back in his chair, trying to calm himself. "But the OAS will be running the show. We'll roll out the referendum and observe its proceedings ourselves. Your own election officials, save for those who can assist a potential transfer of Caiena to Brazilian administration, are no longer needed." There was silence for a moment, and then a sigh. "Good. I trust we've made ourselves clear. Good day, Mr. President."\n\nThe next day, the OAS received a telex from Brasìlia. Mora asked for it to be delivered to his office directly, and an hour after it was sent a pimple-faced page handed it over to the Secretary-General. He took the letter, thanked the page and read it close. "The Brazilian government," it read, "recognising the need for transparency and addressing the concerns of its neighbours, will accept the OAS' ruling regarding the Caiena referendum.""
LATAM_cayenne_endings.13.a: "Once more, with feeling!"

LATAM_cayenne_endings.14.t: "The Price Of Honesty"
LATAM_cayenne_endings.14.desc: "The office of the OAS' Secretary-General was among the first to receive confirmation of the second Caiena referendum's results. Independence from Brazil had won, as expected. However, José Antonio Mora did not regard the news as wholly positive, for the same reason that ten seconds after he received the results his desk phone started to ring with urgency. He cleared his staff away to take it in private.\n\n"Mora speaking. Good evening, Mr. President." [BRA.GetLeader]'s voice seemed to be concealing a mixture of frustration and fear. "Yes, I've been informed. Our officials have confirmed it and double-checked it. Mmhmm. Yes." The voice's fear started to bleed through the speaker; Mora sat back in his chair. "No, Mr. President I- One moment."\n\nHe waved in one of his security detail, bringing in reports from the election officials on the ground. He was given a quick report on demonstrations in the streets of Caiena. [BRA.GetLeader] could hear snippets of their conversation even as the receiver was pressed against Mora's shoulder. "Demonstrations." "Near-riots." "Police unable to contain..." When Mora brought the handset back to the side of his head, the President asked if he was hearing the same things they were hearing even in Brasìlia.\n\n"Yes, I'm being kept up to date. Your own police cannot handle them?" The voice concealed its bitter smugness. Mora rubbed his temples, assuming that he was now mirroring what the President must have been doing five minutes ago. "Now, hold on, a peacekeeping force is quite an escalation to request. We can provide assistance, yes, but-" And then another member of his security detail barged in, with stories of further decaying control in Caiena. He wondered if the Devil had found a way to punish him for sticking to the book on this one."
LATAM_cayenne_endings.14.a: ""Very well, Mr. President. I'll issue the order immediately.""

LATAM_cayenne_endings.15.t: "Fert Aurum Industria"
LATAM_cayenne_endings.15.desc: "Through the streets of Caiena, M606 jeeps marked with the three self-proclaimed letters of peace and security passed by cassava traders and old men on the sidewalks reading the papers. Justin Catayée, at the centre of this procession, caught some of the headlines in fleeting glimpses through the window of his armoured car. They were all variations on the same theme: independence, self-governance, and a blown-up photo of himself as the new leader of this republic.\n\n"Thank God for the referendum, eh?" asked Catayée to the man next to him, head of the OAS peacekeeping forces in Caiena. He was an American, but Catayée hadn't yet caught his name. How strange it was that he should not know his name. He thought better than to ask; best to get his name from his assistant, who was already waiting for the pair in the old Prefect's office, now set to be the new office for the President of Guiana-Caiena.\n\nThat office now came into view, a two-storey red-topped building whose columns and balconies always reminded Catayée of a plantation house rather than an administrative building. The jeeps rounded the large fountain at the centre of its driveway; Catayée and his companion emerged from them, shaking the hands of the other government officials and OAS observers who met them out front. They chatted with each other into the building, led along by their aides into the main meeting room.\n\nInside, the transitional council were already seated, though they rose with the emergence of the new President. Catayée nodded to them, letting them sit back down as he found his own seat at the head of this council. There were OAS representatives, state officials and other notables-even a nondescript man with an OFN pin who might as well have worn a big sign over his head reading "FBI"-but in their seats they were all turned to the man of the hour at the head of this table. Justin Catayée took his seat, and tried to keep the smile from his face."
LATAM_cayenne_endings.15.a: "Brazil will just have to learn to live with this."

LATAM_cayenne_endings.16.t: "A Voté"
LATAM_cayenne_endings.16.desc: ""DEBOUT GUYANE - [?global.date.GetDateStringNoHourLong]\n\nGUYANE HAS ARISEN - Guianese Socialist Party Gains Majority In First Free Election\n\nCAYENNE, Guyane - Jubilation as the first free and fair elections have returned a majority for the Guianese Socialist party, winning an outright majority. Party leader Justin Catayée is now the nation's first president-elect, and has declared his intention to appoint a new prime minister in the next week.\n\nAfter decades of colonial suzerainty under French and Brazilian governments, the most recent general elections are the first in the nation's history to be considered fair and free, as supported by OAS representatives in the country. Voters were not impeded in choice or unjust practices at the polls, and the mockery of so-called "democracy" practiced by Brazilian authorities has ended.\n\n"Guyane has had many masters, but now it is time we become our own," transitional leader Léopold Héder said to a Caiena crowd last night, the president-elect at his side. "Justin Catayée is exactly who we need to make that happen."\n\nWhile crowds were dancing into the night in front of Fort Cépérou, many PSG representatives have already addressed the burdens weighing on Guyanese consciences, above all the nation's reconstruction after Brazilian exploitation. At the very least, there is now a government truly dedicated to addressing them.""
LATAM_cayenne_endings.16.a: "It's definitely... unprecedented."

LATAM_cayenne_endings.17.t: "Independence Day"
LATAM_cayenne_endings.17.desc: "Clément believed it was foolish to dream most days. Why delude yourself with the hopes of things getting better when they never will? Yet, with the referendum, his cynicism took a vacation long enough to vote. He was certain it would be rigged, and maybe it was, but it wasn't enough. His vote and those from the many like him secured the independence of Guiana-Caiena.\n\n"Today, the Guianese people have won, not the monied interests of Brazil. I stand here proudly, adorned with the medal of my wound struck across my chest, as your instrument of independence - a tool driven by you, the people." Justin Catayée's words only stoked the crowd louder and louder, screaming for their new leader.\n\n"We are living in extraordinary times, friends. For once, we are no longer trodden upon by either a French or a Brazilian boot. We are free to make our own decisions, make our own connections to the rest of America, and choose our own path." Leopold Héder's words only added to Caiena's new joyous sense of freedom.\n\n"Those in Brazil say that our small nation will be doomed, that we will make mistakes. To that, I say that we can hardly do much worse than Brazil." Another uproar of cheers as the crowd swarmed to carry him off into the streets.\n\nClément continued to watch on as his new President left him. To hope, to dream, these were things that didn't feel so useless anymore. He felt like he had a chance at a life beyond rubber-cutting..."
LATAM_cayenne_endings.17.a: "...and so, he smiled."
BRA_cayenne_loss_ending_tt: "§FWhile we kept the election fair and free, the §Dpro-independence§! vote has triumphed and Caiena's freedom is inevitable.§!"

LATAM_cayenne_endings.18.t: "The Day With No Past"
LATAM_cayenne_endings.18.desc: "At long last, it was happening. Brazilian troops were trudging out, leaving by the truckload with whirring helicopters and all the rest of it, a glorious cacophony that to Clément signified only one thing: the occupation was over. With any justice in the world that would mean the jagunço psychos would join them, as he prayed for. But he was getting ahead of himself.\n\nJust as one army was outbound, another came driving in. The cheering crowd in which Clément found himself dispersed to shake the OAS forces' hands as they got out of their trucks, some, well, more daring women smothering them in hugs and kisses. Chanting, dancing, and singing broke out spontaneously, bars closed early to court some richer newcomers, and as tanbou banging replaced the slapping of rotor blades, time seemed to stand still for a while.\n\nOne soldier, who introduced himself as Bruce in tentative French and an accent he only knew from Hollywood, struck up a conversation with him about his deployment. Yes, his classroom-quality proficiency and Clément's créole did not always understand each other, but he was speaking his own language in his own country. Already more respect shown than all the Brazilians he knew combined.\n\nAs sunset came and the Caiena residents drifted into more sober conversations about the future, Clément sat in his wooden chair, staring into space. Despite all the bliss, they were still second-class citizens in their own country, and the troops were still foreigners. He still smirked thinking about all the gender agreement errors that American made. There was still much to be done, but the OAS really seemed to want to do it. That was the impression, anyway."
LATAM_cayenne_endings.18.a: "Now it's time to move on."

LATAM_cayenne_endings.19.t: "In One Corner..."
LATAM_cayenne_endings.19.desc: "Catayée glimpsed over the gathering, a slight itch on his cheek having to be unattended to not look unprofessional in front of the people- no, his people. It happened so fast. The mandate ended, the votes were cast and counted, he was thrust into a suit and critiqued for every potential appearance flaw, and now, it was time for him to speak.\n\n"My people!" Catayée let the cheers die down before going onwards, "Before I begin, there is something I must address. And that is my undying and fervent loyalty to my nation, to Guyana. Before I can begin to say anything else, I must give you the most sincere words possible, conveying the true strength of my beliefs."\n\n"I must convey to you that I will use my total ability for the betterment of the future of Guyana!" Catayée let the words spill out of his heart above the noise of his supporters. "To the future of Guyana, to the people, I pledge to give every drop of my being, every single part of my body, every thought in my head! I will give everything I can to see a brighter future for Guyana!\n\n"Under the Aegis of the Organization of Free Nations and Organization of American States, Guyana will march forward to the dawn ahead! If it is not so; if it seems that we are not running forwards, I will ensure that we will walk forwards. If we are not walking, I will ensure that we will crawl. If we are not moving at all, I will bear the full weight of the world on my back to see Guyana move forward to the bright, happy, and deserved future of us all!"
LATAM_cayenne_endings.19.a: "...There is Liberation."

LATAM_cayenne_endings.20.t: "Indifference"
LATAM_cayenne_endings.20.desc: ""Unrecovered files, rumors awash in the local press, thousands on the streets..." Brazil's most senior intelligence officer lifted an eye and a brow to take a steely look at President [BRA.GetLeader] across the desk, bearing the expectancy of a teacher whose pupil had broken a window.\n\n"The situation in Caiena is very dire, Mr. President. It is one thing to deceive the international community in meddling with a supposedly fair election, but it is another to be caught doing so with undeniable proof." The commander-in-chief sat motionless in his chair, the pain of the humiliation playing on his conscience. Now he was essentially being read every possible legal definition of a riot back to him.\n\n"The country is out of army control, riots are on an unprecedented scale, men in crowds and isolated offshoots alike are setting fire to anything with a Brazilian flag on it. Frankly, the level of credibility the military now has to restore order is being shattered as we speak. Especially considering... past experience, Nolasco is unfit to revive our hopes in any capacity."\n\nA brief silence occupied the room. The boss quietly seethed about how unprofessional, or rather critical, his subordinate was being. Anything and everything they could do to get out of that place, and this meeting, was on the table.\n\n"We'll court-martial Nolasco. Let's just get it over with."\n\nThe memo would drift out slowly through ministries and to tribunals, to judges and to soldiers on patrol. At every phase of Brazil's military justice system, it was met with the same reaction of indifference, save for a couple of musings on the admiral's uselessness. It became the last expression of a fight lost many moves ago. Caiena was gone, and there were few left to care for it.""
LATAM_cayenne_endings.20.a: "Gone not with a bang, nor a whimper, but a sentence."

LATAM_cayenne_endings.21.t: "Fair Cop"
LATAM_cayenne_endings.21.desc: ""Were you aware of the complete lack of enfranchisement in the Northwestern district?"\n\n"Ah, yes, well-"\n\n"Just here I have a list of reports claiming that armed police were stationed outside polling booths. Was the local government aware of this?"\n\n"You see-"\n\n"There have been around 3,432 reported allegations of voter fraud levied against this referendum just last night - is there a widespread campaign of disinformation occurring here or does the Brazilian government have something to hide?"\n\n"Now hold on a minute!"\n\nThe questions from both the OAS and Argentines blended together, after a certain point. The Brazilian envoy was quickly growing tired of having to spout the same old excuses all whilst the other men clearly saw through them. Everyone in that room knew that the referendum had been tampered with, and it was becoming increasingly clear that Brazil was not going to get away with it. It was a fair catch, honestly, and he could hardly bring himself to hate the two men for catching his government out.\n\nAnd as the Brazilian envoy returned back to the capital, eyes bloodshot and covered in bags, he was asked how the situation was looking. And to that, he could only say one thing."
LATAM_cayenne_endings.21.a: "Everybody knows."
BRA_cayenne_disaster_ending_tt: "§RThe people of Caiena are incensed, the OAS is furious, and despite all the election rigging the §Dpro-independence§! vote still triumphed. It is a catastrophe for the new president and his government...§!"

LATAM_cayenne_endings.22.t: "A Final Appeal"
LATAM_cayenne_endings.22.desc: ""Comrades!" Justin Catayée's familiar opener echoed across the airwaves, as it had every week since the referendum was announced. He glanced over his shoulder from the booth, noticing the American Marine at the door, a reminder that his message was being closely watched, not just by his usual audience.\n\n"I speak to you, hoping it will be the last time in this style, as we stand in a free Guyane, ready to determine our fate, as we did in the referendum. We voted for peace, but peace has not yet arrived. Though the occupying Brazilian Army has left, our people still suffer, and we are still hurting."\n\n"Since this liberation, many have yet been injured, shops vandalized, and our workers continue to bleed. Yes, challenges remain, but let us remember that we have already overcome one of the greatest. My goal remains a free, fed, and peaceful country. Further violence will not help us achieve this."\n\n"True, there are now boots on the ground under different flags," he paused, glancing between his paper and the soldier, "However, they are here so they will not have to be, they support us so they will not have to later, because this is now our country. This is our obligation now."\n\n"Many have asked how we achieve our vision of Caiena for our nation. We have overcome subjugation; now we must learn cooperation. We must learn to live together, or that vision will never come to pass. Thank you for your attention, and long live Guyane."\n\nThe red light dimmed, and Catayée sighed deeply as the soldier left. His revolutionary fervor had served well during the referendum, but governance was another matter. As he reflected on his performance, he could only hope that his supporters forgave him for it."
LATAM_cayenne_endings.22.a: "So it turns out we weren't the problem after all..."

LATAM_cayenne_endings.23.t: "Curb Your Patriotism"
LATAM_cayenne_endings.23.desc: "The morning after Catayée's inauguration in Caiena, Ana came into work at the Foreign Ministry with a sigh and an indisposed look on her face, but at least the knowledge that it was a loss they were putting behind them. A stark yellow note at the top of her in-tray proved otherwise.\n\n"WARNING TO ALL PATRIOTIC CIVIL SERVANTS: DO NOT SURRENDER TO CAYENNE "GOVERNMENT" AGENDA\n\nYesterday in Caiena, a radical socialist was proclaimed as a so-called "leader" of the nation, backed by traitorous elements of the OAS and ungrateful saboteurs there who have betrayed our great country and reversed decades of progress toward civilization. There will now be overtures by these turncoats to try to redefine our relationship with such organizations, as well as peddle the argument that Guiana-Caiena has been "colonized".\n\nWe call upon all the patriots in our civil service to oppose this nonsense and raise awareness against it, and to resist tooth and nail any initiative which threatens to undermine Brazil's greatness and its position on the world stage. Compliance with the enemy will have consequences. You have been warned."\n\nMore of this again. She could almost picture exactly the person or people who printed these out, having engaged in lengthy conversations on to what extent Brazil should "intervene" in the situation there. As she caught up with her peers throughout the day, though, she realized nobody was there to report it. Actually, it was like the higher-ups hadn't even noticed. But of course, they always did.\n\nThe Itamaraty Palace would make a statement in the last hour of the day, even though by then everyone in the building had already discussed it. "A flagrant violation of Civil Service values," "strong measures will be taken", the usual perfunctory reprimand an anonymous note like this received. When the excitement about something other than lukewarm office gossip faded, maybe the Caiena debacle really would be over."
LATAM_cayenne_endings.23.a: "Silent rage can be expressed in different ways."

# Paraguay Bush War
LATAM_bush_war.1.t: "Orientation"
LATAM_bush_war.1.desc: ""Are you following all this so far? Please remember these things, it's very important." Canapino gestured to the maps scattered over his desk, peering over his glasses at his new secretary Sofía. Her eyebrows raised slightly in a minute reaction to the SIDE agent's condescension. Canapino's finger landed on the Paraná River. "In 1954, Brazil and the OFN tried to overthrow Paraguay's government. Thanks to the Tyrant's help, they failed. The Paraguayan opposition then fled to Uruguay, where they reorganized into FULNA."\n\n"I've read about FULNA in the news."" Sofía replied. "Liberals, Febreristas, and Communists, all tied together."\n\n"That's right." Canapino was too wrapped up in his lecture to be bothered by the interruption. "Now in present day Uruguay, German intelligence organized a terrorist cell the locals called 'Quinta Columna' - they formulated a campaign to eliminate as many FULNA members as possible. Unfortunately these plans were stopped by police before being put into action - with Paraguay's involvement also made evident."\n\n"Unfortunately?"\n\nCanapino answered with a dramatic swing of his arm across Argentina's northern frontier. "FULNA gone would weaken Brazil's attempts to encircle us. No matter. They'll pay in time."" He looked up at Sofía. "I must say, miss, your interest in our work speaks well for you.""
LATAM_bush_war.1.a: "Should I be taking notes?"

LATAM_bush_war.2.t: "South America's Police"
LATAM_bush_war.2.desc: ""It feels like we've skirted close to catastrophe, gentlemen." Lott was on edge following news of the foiled terrorist attack in Uruguay, and needed council from Denys and Salles. "And I've seen reports that FULNA were also targeted. Our best hope for Paraguay since the botched incursion in Guaíra Falls..."\n\nDenys chimed in. "We may not have liberated Paraguay from fascism in '54, but the fault of that operation was not entirely on us, you recall. American idleness, Argentinian meddling - if they had gotten FULNA, they would've snuffed out the one good thing that came from the whole mess."\n\n"When we finally convinced Paraguayan opposition leaders to escape to Uruguay, we did so on the basis that we could keep them safe." Salles spoke deliberately. "At least we were able to keep that promise this time. We've heard back from our friends in Montevideo, they're all but confirming it was a joint Paraguayan-German operation."\n\n"This can't stand!" Denys barked. "The Argentines have got to pay. Every fortification on our border with Paraguay means nothing while they still have sea access thanks to their benefactors in Buenos Aires."\n\nLott shook his head. "We're not going to be the ones to escalate unnecessarily. Make a small show of it, Denys. We need planes in the air over the Paraguay border in anti-smuggling operations. If you catch any criminals, do as you like. Salles, tell Montevideo our intelligence services are at their disposal if they want help in rooting out fascism.""
LATAM_bush_war.2.a: "We have a plan, let's make it work."

LATAM_bush_war.3.t: "South America's Police"
LATAM_bush_war.3.desc: ""Nazism still knows no boundaries, I see." Lott was in a bitter state of reflection following news of the terrorist attack in Uruguay, one that Denys and Salles had to enjoy. "Worse yet, I've been receiving reports that FULNA has been experiencing similar attacks. It's like 1954 all over again, the Guaíra Falls invasion, and how it all went so wrong..."\n\nDenys had to chime in. "As terrible as it was to lose our opportunity to liberate Paraguay from fascism during that time, the fault of that operation was not entirely on us. The Americans failed to cooperate with us, and with the Argentines hampering us, it was doomed. I'm glad it at least led to the creation of FULNA, a united front for both our efforts."\n\n"I still remember the persuasion it took for the Paraguayan democratic opposition to leave Uruguay, all the shouting matches..." Salles decided to end his own reminiscing short. "...but back to business, we had it confirmed by Montevideo. They say the attack was a German-Paraguayan operation." Salles' statement was met with an atmosphere of skepticism.\n\n"I don't know. I thought even the Germans would have more limits than this." Denys offered a confirming nod. "Regardless, all this has shown is that Uruguay is unable to deal with these terrorist attacks by themselves - we'll have to shoulder the blow. I would like to set up an espionage ring, something to take care of these matters before Montevideo ever knows...""
LATAM_bush_war.3.a: "..as the saying goes, "Trust, but verify.""

LATAM_bush_war.4.t: "Orientation"
LATAM_bush_war.4.desc: ""Are you following all this so far? Please remember these things, it's very important." Canapino gestured to the maps scattered over his desk, peering over his glasses at his new secretary Sofía. Her eyebrows raised slightly in a minute reaction to the SIDE agent's condescension. Canapino's finger landed on the Paraná River. "In 1954, Brazil and the OFN tried to overthrow Paraguay's government. Thanks to the Tyrant's help, they failed. The Paraguayan opposition then fled to Uruguay, where they reorganized into FULNA."\n\n"I've read about FULNA in the news." Sofía replied. "Liberals, Febreristas, and Communists, all tied together."\n\n"That's right." Canapino was too wrapped up in his lecture to be bothered by the interruption. "Now in present day Uruguay, German intelligence organized a terrorist cell the locals called 'Quinta Columna' - they formulated a campaign to eliminate as many FULNA members as possible. As I'm sure you've seen in the news, they did quite a bit of damage before the police were able to shut them down. They've found some evidence of Paraguayan involvement, naturally."\n\n"They did a lot of damage to Uruguay, too."\n\n"Yes, it's rather unfortunate, isn't it? Still, the provincia rebelde brought it on themselves when they threw their lot in with Washington." He looked back up at Sofía. "I must say, miss, your interest in our work speaks well for you.""
LATAM_bush_war.4.a: "Should I be taking notes?"

LATAM_bush_war.5.t: "El Gordo Y Sus Aventuras"
LATAM_bush_war.5.desc: ""Joe! You fat bastard, welcome back home!" Alfredo Ossorio's welcome was as warm as the smile on Baxter's reddened face, who greeted Ossorio with a bear hug. "Christ! What is that smell? Have you been at a nightclub?"\n\n"Oh dear, what is the matter?" Baxter responded without giving up his good humor. "Is it a sin to enjoy the little things in life? They are our most treasured gifts on God's earth after all. Second to our duty to our homeland, obviously." His smile grew as his eyes met his dear José Luís Nell and Jorge Cafatti standing with their right arms extended upwards at an impeccable 45-degree angle. He politely repeated the gesture. "My esteemed friends, I've come to deliver splendid news. We, and all of our comrades in the continent, have been invited to come to Paraguay. Think of it as a fancy reunion, but instead, it's a place just for us, the good patriots fighting the good fight against the capitalists and the Jewish-communists. And -" He walked away while straightening his posture in a theatrical pose. "As the esteemed Secretary of Public Relations, it is my moral responsibility to represent my honorable organization in this prestigious meeting."\n\nThe three men burst into laughter. Good old Joe never disappointed. "Tell another one Joe! You just want an excuse to stay far away from the country." As the laughter stopped, they heard noises similar to shouting coming from above. "Ah, don't worry about it," Nell explained, "that's just Cabo discussing with Ezcurra about how we aren't doing enough to fight for General Perón's return, you know him."\n\nBaxter shook his head, unsure if he should feel pity for his frenemy or feel amused for his unreasonable mulishness. "Well, this won't do! I shall invite Cabo to Asunción to put an end to his ill humor! And his new girlfriend shall come too! If this doesn't cheer him up then my name is not José Luis Baxter, you may call me... bah! I can't think of a Hebrew name." He laughed at his joke with as much relish as his men. If they were happy, he was happy too."
LATAM_bush_war.5.a: "We are a family after all, we must look out for one another."

LATAM_bush_war.6.t: "Terror in Our Own Backyard"
LATAM_bush_war.6.desc: "Lott's short patience was ceaselessly expiring. With a simple, careless movement, his arm swept the mountain of piled paper off his desk, resting on it the map of the pariah of Latin America, Paraguay. As much as he wanted and had reason to, he was not planning an invasion of the country, but he cursed himself for not doing it before.\n\nHiginio Morínigo, the Nazi-loving bastard who should have been defenestrated from power long ago, has now decided to summon a Fascist Congress in Asunción. The scum of Latin America would all be gathered in one place, while he watched this circus of horrors with his hands tied. Yes, the time to deal with the Paraguayans and their Argentine patrons would come one day, but Lott was tired of waiting. His arm reached for the telephone as his other arm marked red dots on the map. "President speaking. I will spare you the details, Golbery. I assume you are as aware as me about the threat of Morínigo's new obscene exhibition."\n\n"Bah, you don't need to tell me," the chief of intelligence responded acutely. "We thought our problems would be gone after his mandate ended. But it looks like that bastard had other plans for himself. Maybe we could use the opportunity to put a final point to this. The negative repercussions will surely legitimize our actions."\n\n"That's a negative. I don't want another disaster like Guaíra Falls. I will be sending you the checkpoints' coordinates on the border where your men must maintain a close watch on anyone trespassing it. We must record any information of anyone leaving the country for Asunción. Having the names of the bandits would be perfect for dealing with future operations."\n\n"Very well then. Honestly, I find it hard to believe that our fellow countrymen would even consider joining such a thing. But I agree we must remain vigilant for any subversive activities, always.""
LATAM_bush_war.6.a: "Lott smiled faintly, "You read my mind, Golbery. We will deliver justice to these bandits.""

LATAM_bush_war.7.t: "Red Reckoning"
LATAM_bush_war.7.desc: ""COMMUNIST TERRORISTS GATHER IN SOUTH AMERICA; DATELINE: URUGUAY. Ominous tidings from the Oriental Republic today as the infamous terrorist leader and revolutionary, Che Guevara, arranged for a meeting of the most prominent Marxist revolutionaries from across Latin America to jockey support for a grand conspiracy to spark a continent-wide civil war.\n\nAt the conference in La Punta del Este, the revolutionary conspirators led by Guevara officiated the formation of the Revolutionary Coordination Junta or RCJ, effectively forming a multinational body politic uniting just about every socialist guerilla organization in South America.\n\nMaking matters worse, as was his nature, Guevara did not stop there. The Argentinian leftist, with the backing of the RCJ, announced unilateral support for the FULNA, effectively committing the combined political and paramilitary backing of Latin America to the Brazilian-backed, Communist-spearheaded insurgency growing in the Southern Cone."\n\n"INSOLENCE" Saturnino slammed the newspaper onto the dinner table, his face reddening. "General Perón would have made the reds disappear a decade ago, god damn them!" Where was the Argentina of his youth, the one from before his hair had gone gray and his nation's spine had gone yellow? Where were the days when patriotic men marched right into the heart of the brazucas' nesting place and gunned down as they deserved?\n\nEyes bulging, he roared. "DAMN THEM TO HELL! DAMNED MONKEYS!" His closed fist found the coffee mug on the dinner table, the ceramic shattering in an instant. A small trickle of blood ran down his thumb, staining the tablecloth as he stood from the table; "ELIZABETTA! I AM GOING OUT! CLEAN THIS SHIT UP!" His barked orders to his wife sounded almost muted, as was the rattle of the front door as he all but broke it off his hinges as he stormed out, his blood boiling."
LATAM_bush_war.7.a: "Luckily for Elizabetta, she was out shopping for groceries and had long grown immune to his petulant raging."

LATAM_bush_war.8.t: "Ace in the Hole"
LATAM_bush_war.8.desc: "TOP SECRET\nFOR THE PRESIDENT'S EYES ONLY\n\nURUGUAY - OFN PARTNER NATION\n\nOur agents took notes on the Punta del Este meeting that took place recently, a gathering of revolutionaries. Chief among them was Che Guevara, who put forward the primary proposal of establishing the Revolutionary Coordination Junta, a central command to ensure successful communist revolutions on the South American continent.\n\nAlso in attendance were representatives of the Communist Party of Paraguay and the Febreristas, who we suspect attempted to drag FULNA into this initiative. However, we believe this involvement was squashed after protests from the Liberal Party. Nevertheless, Guevara's willingness to hear this proposal indicates something grander in his ambitions.\n\nIt has confirmed our suspicions regarding Che's designs on Paraguay, with intercepted memos to FULNA having him explicitly declare his support to them in the fight against Morínigo. Thanks to PAPAGAIO AZUL, we have also confirmed that he gave funds to one Febrerista delegate equal to $$10,000, further showing his commitment to the Paraguayan cause.\n\nWhile Guevara represents an ideology corrosive to our interests, just his being in the ranks of FULNA adds a potent card to our deck. Played right, this will dramatically increase the chances of success in deposing the fascist regime as long as we keep the communist elements in check.\n\nORDEM E PROGRESSO"
LATAM_bush_war.8.a: "A valuable card, so long as you can keep it in your hand."

LATAM_bush_war.9.t: "Report on the Legion"
LATAM_bush_war.9.desc: ""FOR AUTHORIZED EYES ONLY - [?global.date.GetDateStringNoHourLong]\n\nINTELLIGENCE REPORT FOR THE OFFICE OF THE PRESIDENT\n\nSIDE\n\nSUMMARY:\n\nIn the two months since the start of the invasion of Puerto Plata we have enough data to deliver some data on the Condor Legion, the fascist force that has since now been impenetrable to our intelligence gathering. We can confirm that the legion is led by an Adolfo Hiroito Villasboa. We have little information regarding the background of this figure. The legion itself is composed of three brigades, these being Primavera, Garibaldi and Isabel. They were originally being trained in the Junker school under the supervision of General Stroessner, but their training was immaturely suspended. Current reports suggest this is because of the conflict in Puerto Plata, as the propaganda value of deploying the first Pan-Latin American fighting force into combat was invaluable for the fascist regime.\n\nUltimately this proved to be an error, as the Legion was easily outmatched. They have been outperformed by the Caribbean Legion in battle, and the Dominicans have repeatedly complained about the underperformance of their allies. Ultimately the Condor Legion is unlikely to be a clear moral asset for the fascist government in the immediate future, but we will keep an eye on their development. They will surely learn from their mistakes, and could prove an asset yet.\n\nFor the immediate consideration of the president.""
LATAM_bush_war.9.a: "The document is signed hastily by Señorans."

LATAM_bush_war.1O.t: "Dogs of War"
LATAM_bush_war.1O.desc: "STRICTLY SECRET AND CONFIDENTIAL\nBuenos Aires, - [?global.date.GetDateStringNoHourLong]\n\nINFORMATION REPORT N° 547/63\n\nFOR THE KNOWLEDGE OF: President [ARG.GetLeader]\n\nISSUE: CONDOR LEGION ASSESSMENT - PROGRESS MADE DESPITE SETBACKS\n\nSYNTHESIS:\nTwo months since the Puerto Plata invasion began, the assessment of the Condor Legion in the Dominican Republic has concluded that the military force has potential for future conflicts despite current shortcomings in changing battlefield conditions.\n\nLed by Adolfo Hiroito Villasboa, the Primavera, Garibaldi, and Isabel brigades had their training cut short by the unexpected invasion. Their initial propaganda boost to the Dominican government as support from a pan-American fighting force has been overshadowed by the Legion's unpreparedness, resulting in various defeats at the hands of the Caribbean Legion.\n\nVarious sources in Ciudad Trujillo have complained of the surprising ineffectiveness of the Legion in its current form, but analysts believe a more effective military command in Paraguay will be able to utilize the Legion to a fuller extent once they return.\n\nWith the risks of Brazilian incursion still high, it is imperative that the Condor Legion is enabled to support the Paraguayans in their hour of need in order to boost the combat readiness they would desperately require.\n\nWithout further ado, I salute you\nModesto Saavedra"
LATAM_bush_war.1O.a: "Set them loose. Make sure this is strictly deniable."

LATAM_bush_war.11.t: "An Unknown Variable"
LATAM_bush_war.11.desc: "TOP SECRET\nFOR THE PRESIDENT'S EYES ONLY\n\nDOMINICAN REPUBLIC - CONTESTED INFLUENCE\n\nFrom the Puerto Plata invasion, we have gauged the combat performance of one of its most unusual participants, the Condor Legion. Self-described as the first Pan-Latin American fascist fighting force, it is led by Paraguayan military man Adolfo Hiroito Villasboa and made up of three Brigades: Primavera, Garibaldi, and Isabel.\n\nOf these Brigades, we would like to mark the Primavera Brigade as of particular interest to the President, owing to its involvement by Brazilian traitors. The Brigade is currently led by Armando Zanine Teixeira Júnior, an ex-officer in the Brazilian merchant navy discharged for his pro-Nazi beliefs and leader of the Brazilian National Socialist Party in Paraguay.\n\nEach of the Brigades was trained in the Paraguayan Junker school under the supervision of General Stroessner but had to suspend their training early due to the Puerto Plata invasion. We suspect this was to take advantage of the notoriety gained by defending one of Latin America's few fascist regimes.\n\nHowever, the Legion suffered from lack of training, with their effectiveness being limited to propaganda value. Soon into the invasion, they were sent back to Paraguay for further training due to complaints from the Dominican military over their lack of combat capability.\n\nThe Legion's presence in Paraguay may complicate operations in the region as an unknown variable, but not one to be underestimated.\n\nORDEM E PROGRESSO"
LATAM_bush_war.11.a: "A fascist International Brigade?"

LATAM_bush_war.12.t: "Crisis Continues"
LATAM_bush_war.12.desc: ""FOR AUTHORIZED EYES ONLY - [?global.date.GetDateStringNoHourLong]\n\nINTELLIGENCE REPORT FOR THE OFFICE OF THE PRESIDENT\n\nSIDE\n\nSUMMARY:\n\nFollowing Morínigo's departure from the position of leadership, circumstances in Paraguay have hardly improved. While his rule certainly led to stagnation, his resignation has failed to resolve any of the longstanding issues. The current ruling fascist party is in total disarray, and currently finds itself fully in a political struggle. Its opponent in this struggle appears to be the Democráticos, a faction within the Colorado Party that fights for democratic reform.\n\nEven though the conflict has only been occurring for a few weeks, we have seen lots of signs of factional infighting within the government. The bureaucracy and all state institutions are affected, and the attitude of them all appears to be that nothing can be ruled out in the struggle against one another. The government of Paraguay is in a very troubled state, and it might not take much for it to fall apart."
LATAM_bush_war.12.a: "Paraguay remains, but for how long?"

LATAM_bush_war.13.t: "A Crisis Carries On"
LATAM_bush_war.13.desc: "STRICTLY SECRET AND CONFIDENTIAL\nBuenos Aires, - [?global.date.GetDateStringNoHourLong]\n\nINFORMATION REPORT N° 595/63\n\nFOR THE KNOWLEDGE OF: President [ARG.GetLeader]\n\nISSUE: PARAGUAY POWER STRUGGLE POST-MORÍNIGO: POTENTIAL SUBVERSIVE INFLUENCE\n\nSYNTHESIS:\nDespite the fall of Morínigo from power, Paraguay remains in a state of political stagnation. The current central government in Asunción faces a state of political deadlock; a protracted power struggle with the Democráticos wing of the Colorado Party prevents the construction of a more long-lasting solution.\n\nFor several weeks, administrational conflict has been brewing across all levels and levers of power, with the bureaucracy and other institutions taking sides, using their respective powers to outmaneuver opposing aspects of the state. As a result, activity from department to department is obfuscated, documents are hidden, co-operation is limited and the political structure as a whole is fragile and extremely vulnerable should it come to a crisis.\n\nThe extent of this conflict among Paraguayan authorities has come to the point that the nation is now extremely vulnerable to undue foreign influence, particularly from Brasília and Washington, rumored to have constructed their own agenda in regard to the situation. It is imperative we keep a watchful eye on the Itamaraty Palace, lest they weaponize the status quo against us.\n\nWithout further ado, I salute you\nModesto Saavedra"
LATAM_bush_war.13.a: "Brazil won't get one up on us."

LATAM_bush_war.14.t: "Paraguay's Difficulty"
LATAM_bush_war.14.desc: "TOP SECRET\nFOR THE PRESIDENT'S EYES ONLY\n\nPARAGUAY - ARGENTINE INFLUENCE UNDER THREAT\n\nPresident Higinio Morínigo's regime was widely believed to have stagnated - with his power waning greatly during the last few years of his reign - but his departure from the helm of leadership has not solved the problems he has left behind.\n\nPresident [PAR.GetLeader] has continued the previous fascist status quo Morínigo established, even as its faults continue to wreak havoc on the nation's stability. This issue has not gone unnoticed by the Colorados. Recently, the new leadership has found itself caught in a power struggle with the Democráticos, a wing of the party arguing for democratization.\n\nDespite only beginning a few weeks ago, the conflict has subsumed the state and crippled its ability to operate effectively. The bureaucracy and other prominent institutions are now paralyzed by the infighting between the Democráticos and the government, both desperate for power at the cost of everything else.\n\nIt is clear their weakness is our advantage. As stability and security take second place to power grabs, we believe there are prime opportunities to influence the outcome of any potential regime changes in Asunción to favor us. For now, we will continue to monitor the situation, alerting the President when there is any chance to move the levers to our side.\n\nORDEM E PROGRESSO"
LATAM_bush_war.14.a: "Our opportunity."

LATAM_bush_war.15.t: "Eyes of the Condor"
LATAM_bush_war.15.desc: "Señorans respected Carlos Fuldner as a military man. That way he could stomach himself inviting the old man to his office, sharing a drink, and making pleasant conversation with him, though he knew very well what kind of creature the Condor Legion's Chief of Intelligence and Logistics was.\n\n"Captain Fuldner," Señorans said, "how is your position in Asunción treating you?"\n\n"I must admit, it beats the sleepy retirement I had planned." Fuldner gave a dull smile. "It's nice to still be of some use. And it's a good group of boys we have there."\n\n"You might've guessed, but those boys are exactly what I wanted to talk about." Señorans' statement stirred a change in Fuldner, and the jolly veteran gave way to the old fox, the smirking Nazi, man of dark corners. He saw Fuldner as he was; the world-quaking, million-strong spirit Germany's victory had once instilled.\n\n"I imagine you need to get Argentinian military supplies to my organization in case of a crisis in Paraguay? If I may, I've already envisioned a few possible routes."\n\nSeñorans sat back, stoic as a saint, letting the Legion spymaster talk. He saw a glint of anticipation in Fuldner's eyes; "General, during my time stationed here with the SD, I established a business installing hydroelectric plants - you know, resource extraction makes for the best dummy companies? You can go where you like, and important people are always happy to see you. We should be able to move equipment fairly easily. Could you possibly do something for me in return? I knew some good SIDE agents from back in Perlinger's time. They'd be very valuable help if they could be roused from retirement.""
LATAM_bush_war.15.a: ""That's fine, Captain, I will make some phone calls.""

LATAM_bush_war.16.t: "What Makes a Brazilian?"
LATAM_bush_war.16.desc: "Submerged in a dour mood at his desk, Lott's brooding reading was only broken by Denys' festive mood as he walked through the door. "Christmas seems to have come earlier for some of us..." His attention was drawn to the stacks of intelligence folders lining the table, all poured over by the President. "But looking at your face, I wouldn't know. What's the matter with you?"\n\n"It's that Brazilian Nazi I was briefed on before, Armando Zanine Teixeira... Júnior." The last word left his mouth with a sad sympathy for the man who named this wretch after him. "I'm at a loss when it comes to comprehending this man. How could any self-proclaimed patriot support our enemies after everything? Even the oligarch-loving UDN wouldn't betray Brazil like that."\n\nAs Lott continued, Denys soon regretted asking him anything. "This Zanine is a traitor with every fiber of his being, but it gets worse. He doesn't even have the bravery to be a traitor at home. No, his 'Brazilian National Socialist Party' spreads their vile from the comforts of Paraguay. What a sick joke. Craven cowards to the nth degree. We would have eradicated them here."\n\nAnd he continued unapologetically as Denys began to lounge in the opposite chair. "I wish we could have destroyed Paraguay when we had the chance, put all of those decrepit fascists into the graveyard, where all of them belong. Raze the damn country to the ground." Denys noticed his friend's face was getting red, maybe it would be better to cut off his rant before something horrible happened to him. "Just bomb it to the stone age-"\n\n"Lott, please. Justice comes to these rats eventually. Even if we don't bring it to them, their just deserts will come, likely taking the form of a bullet to the stomach." Denys' words brought an immediate smile to Lott's face. "And regardless of a few nuts, our loyal men will always stand guard to protect the nation from them all.""
LATAM_bush_war.16.a: "Traitors may sneer, but Brazil's flag will continue to fly high."

LATAM_bush_war.17.t: "Unofficial Official Business"
LATAM_bush_war.17.desc: "Asunción Airport security was a quiet job. Work in South America's "dark spot" had little stress, at most dealing with a few tons of swastika-adorned goods crates. So when Carlos Florit declared he was there for "official business," he knew the conversation would end there.\n\nIn the taxi, Florit had a lengthy conversation about Argentina, frequently comparing Buenos Aires' labyrinth of office blocks and new developments to the Paraguayan capital, a sanctuary of early 20th-century architecture. But when asked about his stay, he only replied with "official business." Really, he was here to make a friend.\n\n"Nice to have you here in Paraguay, Mr. Florit," boomed Democráticos chief Epifanio Méndez Fleitas as he walked towards his café table. "Shall we sit down?" Florit knew he had been right not to discuss the business earlier: everyone was now staring at him.\n\nBeyond the pleasantries, small talk, and chipa guasu, Florit sensed the gravity of a statesman. He was here to tender Argentine support for Fleitas, hoping to keep an ally, keep Brazil's nose out, and ignore the fascist overtones that Argentina's partners disliked.\n\n"As long as our allies support us in Buenos Aires, we shall reciprocate, of course," Fleitas insisted. "But what about your support? How do you feel about... the "General," Mr. Florit?"\n\nThe diplomat's eyes widened, his cheeks reddened. What "General"? Oh, well, he couldn't pretend; of course he was talking about Perón. "I- well, what's the interest? Are you a fan?" He laughed, attempting to diffuse the tension.\n\n"Fan?" Fleitas let out a belly laugh. "No, not fan, never fan. I suppose the question just slipped into my mind, that's all. Nothing more than that.""
LATAM_bush_war.17.a: "Weird."

LATAM_bush_war.18.t: "Station to Station"
LATAM_bush_war.18.desc: "Alfredo Ramos' trip from Montevideo to Brazil was under so much secrecy, he didn't even step off of the train. Instead, President Lott, General Denys and Ambassador Gordon met the exiled leader of the Liberal Party of Paraguay on the carriage, Ramos spotting soldiers on the platform as sunset slipped through the drawn blinds.\n\nDenys spoke up first. "I'll get straight to business, Ramos. In the event of revolution in Paraguay, do you think FULNA will stick together?"\n\nRamos considered his guests, enshrouded in shadows. "I do not, General. Once the unifying factor of the fascist enemy is gone, a split is inevitable. This is one of the reasons why I opposed the alliance with the PCP, but our hands were forced." He glanced quickly, meaningfully, at Gordon.\n\n"It's wise of you not to trust the communists." Lott said. "That's why we're here."\n\nGordon nodded, and took out a manila folder from his breast pocket. "We're looking out for your interests. This is a plan for Paraguay's liberals to dispose of the PCP once the revolution is secured. We've formulated it, you have to carry it out."\n\nThe folder slid across the mahogany table. Ramos collected it furtively. "Remember," said Lott. "This conversation never happened. I expect next time we meet, it'll be President to President."\n\nSlowly, Ramos's benefactors receded back into the coming night, jeeps rolled away from the station, and the train began to head back to sleeping Montevideo."
LATAM_bush_war.18.a: "Drink to the men who protect you and I."

LATAM_bush_war.19.t: "Tomorrow Comes Today"
LATAM_bush_war.19.desc: "His boots having found firm enough footing on the muddy jungle floor, Che glanced back at the platoon. The rainy wilderness of Misiones, the northeastern corner of Argentina, was a far cry from placid Uruguay, where Che and his men had only a few days ago enjoyed maté and took in the sun. Despite the conditions, he was glad to be back in the field - the Paraguay adventure was what he was born for, what history demanded.\n\nThe trek had not been easy, even back on the river there was more than one close call - the spotlights of Argentine patrol boats cutting violently through the night. It would've been impossible without the intel he received on the river navy's blindspots from the Brazilians, though Che admitted that only begrudgingly.\n\nCastro had been different - he was a bourgeois nationalist and a son-of-a-bitch, but he at least seemed to care for the people. Meanwhile, his current 'allies' - the cloistered liberal exiles of Paraguay and the autocratic madmen produced in Brazilian military academies - were totally contemptible. The mutual disdain was kept in check because Che was useful to them - or rather, useful to their masters in Washington, in the Yankee's struggle with that other, mirrored, eagle.\n\nIn the jungle, they all seemed far away. Beside him were fighters for the revolution, men he trusted with his life. Though their bodies were taxed, and they lacked enough raincoats for the whole cadre, spirits were high. The guerrilleros - mostly Communists, but also some Febreristas who could be radicalized - followed Che, took to his drills, and made the hard journey with little complaint; they had even given Che the fond nickname 'Señor Paraguay'. He owed them the world. The clouds soon parted, and tomorrow burst ahead. Asunción's liberation was just over the horizon."
LATAM_bush_war.19.a: "The continent's heart trembles - who will pay the price history demands?"

LATAM_bush_war.20.t: "A Way To Be Remembered"
LATAM_bush_war.20.desc: "If you asked Jaren Souza what he wanted, he'd say that in a philosophical sense, he'd want to be remembered. If you asked him right now, as he yawned in the cockpit of his U2; He'd say he wanted a nap.\n\nCurrently, he was flying somewhere over Filadelfia and gathering intelligence for FULNA, Brazil's off the books ally against the Paraguayans in the proxy battle against Argentina during the current 'Bush War'. As a kid, he thought spy work would be more thrilling, but as he was surrounded by the inky black sky and the hum of his engine, he could feel himself languishing from boredom. Jaren then decided to shut his eyes for a moment, consoling himself with a little bit of respite.\n\nThe next thing Jaren woke up to was the blare of the warning system, indicating an incoming SAM missile. Before he could make any evasive manoeuvres however, the missile slammed into the U2, hitting its wing and causing it to spiral gracelessly to the ground as the engine fire illuminated the cloudy night sky. What Jaren wouldn't realise - or couldn't as his head made swift and brutal contact with the cockpit glass - was that his wish of being remembered would be granted.\n\nUnfortunately for him, it wouldn't be as an inspiring model for patriotic Brazilian children; but rather as a mangled corpse in a smoldering wreck. His uniform and dog tags were looked over grimly, first by the artillery man who shot him down and took the pictures, then by the Paraguayan generals who realised what this meant for them."
LATAM_bush_war.20.a: "Always keep an eye open."

LATAM_bush_war.22.t: "To Ovando"
LATAM_bush_war.22.desc: ""Good evening, President Ovando."\n\nGeneral Ovando Candía shared a narrowed glare with his advisors, officers with chests shining with medals and ribbons. He held the handset to his ear, cleared his throat\n\n"Evening, Mr. President. To what do I owe the pleasure?"\n\nCalls from Brazil had become ever more common as of late, as they'd made themselves the steadfast patrons of General Ovando's authority in Bolivia. Rarely did they get an unannounced message from the president himself, though.\n\n"You will have surely heard that the government is poised to gain the upperhand in the Paraguayan conflagration," he said. "Of course, this is a serious concern to us..."\n\n"Naturally," Ovando followed. The rest of the room had their ears over his shoulders. "Bolivia is deeply interested in maintaining regional stability."\n\nA chuckle from Brasília. "President Ovando, I'm sure you are itching for a fight in Santa Cruz. We are giving it to you. The Paraguayans must be distracted before they get too good at fighting the guerrilleros."\n\n"Mr. President, I will promptly discuss this with the cabinet. Many will be interested in settling the Santa Cruz issue once and for all."\n\nIndeed, there was nothing to discuss. The uniformed leadership of Bolivia, all gathered there and listening, were already planning their next war against Paraguay."
LATAM_bush_war.22.a: "A war may just be what FULNA needs to topple the fascists in Asunción."

LATAM_bush_war.23.t: "Bolivian After Action Report" 
LATAM_bush_war.23.desc: ""ASSESSMENT OF BOLIVIAN OFFENSIVE OPERATIONS IN SANTA CRUZ AREA: ABJECT FAILURE."\n\nIt wasn't unexpected. As the full dossier of Bolivia's border clash with Paraguay was passed around in one of Palácio da Alvorada's many conference rooms, the mood of the president's gathered advisors was expectedly mild.\n\n"What more can you want from the Bolivians?" someone asked, to muted chuckles. It got quieter as the grainy images of burning vehicles and bloodied Bolivian soldiers were unveiled. The president stared into the closed eyes of a Bolivian boy, face stained by faded red fingerprints.\n\n"It was a disaster for the Bolivians, but good enough for us," an officer said, pointing at a section of the report. "See here, thousands of Paraguayan troops had to be redeployed to Santa Cruz."\n\n"And our communications with FULNA confirm that many of those same troops had been terrorizing them before Bolivia attacked."\n\n"In other words," the president said, continuing to stare at the image, "we've bought our partners some essential time. Not every operation has to be a complete success...""
LATAM_bush_war.23.a: ""...especially when the cost is paid in someone else's blood.""

LATAM_bush_war.25.t: "Spring in Paraguay"
LATAM_bush_war.25.desc: "TOP SECRET\nFOR THE PRESIDENT'S EYES ONLY\n\nPARAGUAY - GOVERNMENT OVERTHROWN - JUNTA ASSEMBLED\n\nMilitary analysts have been growing aware of weakening government fighting capability in the so-called "Bush War", but its control seems to have rapidly unraveled in recent weeks to a breaking point. What started as a persistent countryside insurgency by the guerrilla group FULNA has gained the upper hand, such that government supporters have fled and insurgents have entered the capital city, Asunción.\n\nIt is believed that government backing by ruling elites and the wider population had been eroding in recent years and months. Stagnation had also long been a problem for the Paraguayan economy, but an inability to end the insurgency left only hangers-on elements in the police and military skirmishing desperately before finally acquiescing to the rebels, who have now proclaimed control of the country.\n\nThe emerging junta, however, is fractured at best. A triumvirate-style coalition has been set up between pro-Brazilian liberal Alfredo Ramos, former revolutionary general Rafael Franco, and Communist Party leader Che Guevara, all with radically different foreign policy visions and platforms. Sources say the junta has only met once and ended in bickering, and its leaders have retreated to their respective camps in the city.\n\nSNICI agents and American intelligence are in close contact with Ramos' faction and are collaborating closely to ensure his victory in the power struggle by any means necessary, but combatting Argentine influence as well as maintaining factional strength will require prudence. We await further instructions on how best to proceed.\n\nORDEM E PROGRESSO"
LATAM_bush_war.25.a: "South America's black spot turns a shade of gray."

LATAM_bush_war.26.t: "Interbellum"
LATAM_bush_war.26.desc: "José Jobim regretted Morínigo was not still in power. Well, not on behalf of his politics, he and his staff at the Brazilian Embassy in Asunción brainstormed ways they could personally get rid of him as an initiation process.\n\nBefore he was ousted, at least there was a sense they were dealing with a certain administration, a certain government and a certain policy, that had not changed and would not foreseeably change soon. Oh, and they wouldn't need to rebuild the whole embassy because of all the mess on the streets.\n\nThere was no certain administration. The state was so divided it was as useful as it was right before the old government fled the city. He barely had an idea of who to call that very day if he needed something done. The "triumvirate" government was defunct by now, the factions were all digging in their heels, and only God knows what the prevailing idea of "policy" might be.\n\nAs he recently moved back in following the overthrow, he often dealt with missing things, he read of skirmishing and looting as much as he did breathe. He could hear the communists rallying from his office, and signs advertising worker and soldiers' councils dotted the local infrastructure. His only reliable security personnel no longer came from police or the military but the few personal guards assigned to the building by the Ministry of Foreign Affairs.\n\nAll the while, his traditional correspondence with the Palacio de los López or with associated agencies was replaced with radio silence, his daily work more to do with American operatives than building relationships with ministers. Right now, the only word for it was tense. The worst of it all, however, was assuredly yet to come."
LATAM_bush_war.26.a: "All he could do was watch through his window."

LATAM_bush_war.27.t: "Betting the Country"
LATAM_bush_war.27.desc: ""As I say, José, with all due respect, there is nothing here to worry about," insisted Alfredo Ramos, sipping from a cup of coffee on the table, his legs crossed. Jobim pursed his lips, watching a frantic administrator scuttle past his guest. "I mean, seriously. The preparations are all done, I've spoken with the Americans, and your own military. It's all going to work, we are going to win."\n\n"Tell me if I'm missing something," Jobim said suddenly, looking out of the window. The streets were as chaotic as the corridors in here, he thought. "You will send out a signal tonight for soldier defectors and police to break through the communist lines, arrest the FULNA leadership and that's it?"\n\n"No, my friend," chuckled Ramos. He was far too relaxed for it not to be unsettling. "We will break through the communist lines, arrest the FULNA leadership and fan out across the city and take the checkpoints. It's all been done before. This isn't the first time the military has taken control like this, Pepe."\n\nHe could now see the armed guards in the embassy unloading crates with weapons from down below as he looked down. "But even then, you're forgetting someone. What about Rafael Franco? Do you think his people will just give up that easily? After all this time?"\n\nThe Paraguayan's airy smile faded slightly. "Franco... will come along." He scoffed at the idea the ambassador implied. "He will realize how strong his hand is and accept he can cooperate or be swept away." He took another sip, and smiled.\n\nJobim couldn't help but look away, a stern frown on his face. This man was playing poker on the future of his country, and with the most confident poker face to boot. But by God, he better have reason to be. If not, the ringing of the aftershock would not end for years.""
LATAM_bush_war.27.a: "The die is cast."

LATAM_bush_war.28.t: "A Space Made Empty, Filled"
LATAM_bush_war.28.desc: "Exhales circumnavigated the small chamber, pushing against the recently closed shutters of the window and bouncing off to circulate the room once more. The small Brazilian flag sticking out amongst various pens and pencils, and the ambassador, José Jobim, turned once more to face his fellow countryman. "So, Sol-" A codename, "-the raid went well, I hope."\n\nAcross the Brazilian ambassador to Paraguay stood a tired man, one with all manner of debris attached to him. From grass to sprinkles of concrete, even to dirt that had seeped through his outfit from the small rips and holes decorating him. "Yes. The raid on the compound controlled by the communists was successful, though barely. It appeared that, somehow, they were tipped off and ready for us. No matter, most of their leadership was killed in the raid. All except Guevara - that rat slipped away."\n\nThe booms of rifles and weaponry echoed from far away in the city ambiance. "Now-" José started, "I've been wondering about those. It's too sporadic and uncoordinated to be reinforcements, but are you sure Guevara is not leading another charge here?"\n\n"Guerillas in other sections of the city. They've been engaging in urban warfare, and it makes it harder when the protestors have been clogging up the street. The military and police defectors from the time of Morgingo are used to handling such rabble, so, I do not expect further troubles."\n\n"The liberals have won." José emerged from his chair, facing towards the shuttered window, he closed his eyes and looked through the walls. His ears allowed him to hear the faint chants of marchers being nearly overshadowed by the echoing gunfire. "But at what cost?"\n\n"Hmph-" Sol scoffed, "That is not an issue. What is truly important is that the Argentines are out...""
LATAM_bush_war.28.a: "...and democracy is back."

LATAM_bush_war.29.t: "An Opportunity Seized"
LATAM_bush_war.29.desc: "Tick, tock, tick, tock. The clock rang out in the capital building. What wind that flowed in through the open windows made up the rest of the noise. José Jobim listened through the noise, through the quiet hum of the slow-flowing air, through the chimes of the pendulum clock. He could still hear the gunfire, the almost silent shouts, the consequences of his actions. How did this happen?\n\nFrom what information he could scrounge up, glancing again at the man he was facing, Rafael Franco, the liberal coup had failed. The communists had put up unwavering resistance, having infiltrated the liberal organization, they used it to stage their own attack on the liberal headquarters, killing Ramos.\n\nAmidst the chaos, fire, gunshots, Franco went to the capital and appointed himself provisional president, calling for peace in the city under martial law. Many of the police and military who had initially been with the liberals defected, the people who were tired of war being unwilling to continue the guerilla campaign. That's what led to this moment of Franco-\n\n"You and Brazil's espionage harmed the country more than helped! Not to mention your nation's less than full backing, to say the least." José could only listen as Franco continued. "But you know, that's okay. We can move on and establish friendly relations between our two lands. However, let me make this clear. I will not be a puppet of Brazil. I am for the people of Paraguay first and foremost."\n\nJosé, having been a puppet these past few weeks, felt some sense of empathy and connection with Franco. "You have my sincere congratulations. I look forward to establishing friendly relations, truly. Between you and I...""
LATAM_bush_war.29.a: "...I applaud your independence."

LATAM_bush_war.30.t: "Expeditious Retreat"
LATAM_bush_war.30.desc: "On the outskirts of Asunción, Brazilian Ambassador to Paraguay José Jobim was being spirited out of the city in an APC. The dim interior light flickered occasionally, casting uneasy shadows. The sound of distant gunfire and shouting filters through the armored walls. Jobim, dressed in a disheveled suit, clutched his briefcase tightly. His face was pale, eyes darting nervously. Beside him in the metal coffin were a small group of soldiers in fatigues, their faces grim and focused.\n\n"It wasn't supposed to go like this. I was told explicitly that FULNA would be caught completely unaware." Jobim ranted to the soldier next to him. Despite the many memorandums telling him otherwise, FULNA was fully prepared for an attack. The coup that was so meticulously arranged had failed spectacularly. No amount of expedited arrests or troop movements would save the plan. Not only had a counterattack on the liberal headquarters killed its leadership, but now the city itself was breaking down into a full-scale revolution. "With these damn workers' councils locking down the streets how are we supposed to get out?" Jobim's question rang around the armored carrier but none of the other personnel answered him.\n\n"The communists have won." Jobim placed his head in his hands. Suddenly, APC jerked to a halt. "What was that?"\n\nThe soldiers exchange worried glances. The sound of shouting and thumping on the APC's exterior grew louder. The APC rocks violently as something slams against it. The highest-ranking soldier silently moved to the front of the vehicle. Jobim prayed for deliverance from the crowd he could only imagine was ready to tear him limb from limb. The noise outside intensified before being cut off by the unmistakable sound of gunfire. The officer returned and the unseen crowd dispersed long enough for them to break through to freedom. Jobim did not speak another word to the soldiers."
LATAM_bush_war.30.a: "The streets of Asunción will run red."

LATAM_bush_war.31.t: "FULNA's Focus"
LATAM_bush_war.31.desc: ""As our operations grow in the Paraguayan heartland, the consciousness of the Guarani peasant, so long estranged from the fine fruits of his labor, will be elevated. Until, at last, this illegitimate fascist government collapses before his ceaseless resistance." Oscar Creydt paused his harangue only to reach for a glass of water nestled between strategy documents.\n\nBut that moment allowed Rafael Franco to interject. "I agree with my colleague, Creydt."\n\nSurprised heads turned to the war hero as he limped toward the table. "That FULNA's focus must be on the countryside. The government has deployed its most loyal forces to guard Asunción and the Chaco. We can recruit the trained, armed, and patriotic police and soldiers already on the verge of defecting."\n\nEl Che tapped the ash from his cigar, eyebrow arched. But it was Alfredo Ramos that replied, "I remain convinced that our foes are a paper tiger. A swift attack on the capital would end this all with far less bloodshed."\n\nSeveral voices spoke, but it was Celso Avalos Ocampos' voice that carried the loudest, "It is easy to call them weak when you bourgeois let us fight and die in the vanguard. If the liberals wish to exchange their cowardice for suicidal bravery, be my guest.""
LATAM_bush_war.31.a: "And with that, another FULNA strategy meeting ended in shouts."

LATAM_bush_war.32.t: "Hostile, Pro-Argentine Faction Coups Paraguay"
LATAM_bush_war.32.desc: "TOP SECRET\nEYES ONLY\nTO ALL MEMBERS OF THE SERVIÇO FEDERAL DE INFORMAÇÕES E CONTRAINFORMAÇÃO\nMÉNDEZ COLORADO FACTION COUPS PARAGUAY\n\nGenerals affiliated with Epifanio Méndez Fleitas and the 'Democráticos', a so-called moderate faction of Paraguay's Colorado Party have seized control of Asuncíon. This represents yet another burst of Paraguayan political and military infighting sparked by the ongoing Bush War.\n\nMéndez Fleitas received substantial covert Argentine backing to launch his takeover, and appears to be in talks with Buenos Aires, attempting to solicit increased military aid. His advocacy for economic central planning and broader political platform appear rooted in sympathy for Peronist thought (see selected quotes from his works on pages 5-6). Additionally, he has expressed open hostility toward the United States and, especially, Brazil.\n\nHis assumption of power likely represents a worst case scenario for our Paraguay policy. Nevertheless, it presents near-term opportunities should we immediately allocate additional resources and planning capacity to our pro-FULNA operations. While Méndez Fleitas' support in the military hierarchy is firm, we may be able to sway disaffected officers from the former administration to FULNA. Additionally, if influenced appropriately, his limited pardoning of political dissidents could be used to free captured operatives Delta-8 and Samba-5. Most significantly, our FULNA contacts claim that this disarray marks their opportunity for a final push on Asunción if sufficiently supplied."
LATAM_bush_war.32.a: "An ally to Argentina and threat to Brazil, should he not be excised."

LATAM_bush_war.33.t: "Canindeyú, Pillaged"
LATAM_bush_war.33.desc: "This is the fifth entry in Jornal do Brasil's series on the Paraguayan Bush War. Our correspondent, João Vasconcelos is currently in the Canindeyú region. For his safety, place names have been omitted.\n\nOn entering the hamlet, I was searched by a sullen Guarani boy, no older than twelve, as an elderly man leveled a rifle at my chest. After establishing I was unarmed, the two escorted me to what looked to be a community storehouse, covered in scorch marks. From a nearby shack, I could see a young woman, bruised on her eye and jaw, staring at or rather past me. The old man's rifle barrel jabbed into my back and I saw no more of her.\n\nIn the barren and battered storehouse, the duo interrogated me as much as I interviewed them. They wanted to know on whose side I was before moving on to asking about the rebels fighting for FULNA, where their closest headquarters were, and how they could contact Che Guevara.\n\nAfter their questions, it was my turn to ask about the reception. Was this how they typically welcomed guests? They told me their village had been recently attacked, its food ransacked, and their animals taken. The pillage was carried out either by a plainclothes government militia or deserters, but they believed it was the former, "They had been attacking and robbing well a'fore reaching us. They worked in an organized way no group of deserters woulda done. Too much discipline in their brutality," said the older man.\n\nGovernment forces are causing great damage to every community they come across, and the locals' sympathy is moving toward FULNA for protection and to fight back against the regime that robs them of their livelihood. Sadly, I couldn't tell the villagers how to find the guerrillas because I didn't know myself, but most likely they won't have to search much longer. There are rumors of fighting between the military and el Che's people not too far south from here."
LATAM_bush_war.33.a: "Next, João Vasconcelos continues his search for FULNA."

LATAM_bush_war.34.t: "Aggressive General Coups Paraguay"
LATAM_bush_war.34.desc: "TOP SECRET\nEYES ONLY\nTO ALL MEMBERS OF THE SERVIÇO FEDERAL DE INFORMAÇÕES E CONTRAINFORMAÇÃO\nSTROESSNER LEADS PARAGUAYAN COUP\n\nForces loyal to General Alfredo Stroessner have assaulted the Paraguayan national police headquarters, solidifying his seizure of power. The national police chief has been confirmed dead by several of our sources in Asunción - marking another escalation in the ruthless infighting in Paraguay's regime furthered by the ongoing Bush War.\n\nFor weeks, Stroessner successfully intrigued to widen factional differences in the ruling party, and now positions himself as a unity candidate. Beyond developmentalism and rabid anti-communism, little is currently known about his domestic political preferences. That said, there is every indication he will be an extreme hardliner against FULNA and other dissidents.\n\nThere is less ambiguity in foreign affairs, where he advocates an aggressive foreign policy based on support for the far-right Condor Legion and deeper alignment with the Einheitspakt. If he were to triumph in the Bush War, Paraguay would resume or even increase its sponsorship for rightist guerilla movements and subversion across Latin America.\n\nDespite the risks General Stroessner poses to our national interests, the coup may prove beneficial to our operations in Paraguay. National police not apprehended in Stroessner's initial sweep can be recruited into FULNA. Pushback from FULNA's communist elements will need to be overcome, so our agents should stress the combat value of defecting police. Additionally, military units have been moved into Asunción to support the coup, likely enabling a more rapid pace of anti-regime activity in the countryside."
LATAM_bush_war.34.a: "A brutal dictator, and one we must topple."

LATAM_bush_war.35.t: "The Guerilla's Guest"
LATAM_bush_war.35.desc: "Gato always asked for more exciting stories to cover. For being deep in the Paraguayan hot jungle, in the middle of a clandestine camp of armed guerillas, he had only himself to blame. It smelt of smoked meat, recent rain, and sweat; the canopy was particularly thick, so that spears of sunlight plunged through the gaps. Sitting on a log before a small fire, cleaning a rifle in his lap, was Che Guevara.\n\nThe interview - the reason for Gato's trek - started rather awkwardly when the infamous guerilla leader called Tribuna da Imprensa 'one of Brazil's more reactionary newspapers.' About a dozen men listened to the conversation. Gato's hairs stood on end when Che stood up suddenly and stepped away to his tent - he had heard stories of Guevara's capacity for brutality, his love of violence - what stopped him from chopping Gato and leaving him to the animals?\n\n"Where are my manners?" Che said on his return, holding a thin rectangular box. "I almost forgot, I kept these safe for when we had guests."\n\nLifting the lid and presenting the box to Gato, the journalist saw a row of finely-wrapped and untouched cigars. Gingerly, he picked one up, and another fighter offered a light. Che took one for himself and sat back down.\n\n"I'll make no secret that I am interested in the liberation of all of the Americas, whether it be Cuba or Paraguay or anywhere else," said Che to the camp, as if to preempt a question not yet asked. "The role of FULNA is to unite the anti-fascist elements of society in national struggle, of which the guerilla, the ideological cadres are the spearhead, engaging with the fascists and awakening the peasantry in the field. The Liberal Party, FULNA's civilian wing, understands this. So should your bosses in Brazil. The people will fight.""
LATAM_bush_war.35.a: "Shockingly, the cigar still tasted as good as when it was rolled."

LATAM_ParaEpilogue_BRW.1.t: "Bridge Over Troubled Waters"
LATAM_ParaEpilogue_BRW.1.desc: "The Paraná ran quietly that day, its famed current seeing fit to rest, a state the departing workers long wished it had been in during construction. But this was no longer their bridge; this was the bridge of the ribbon-cutters, one Brazilian and one Paraguayan, and of the crowds that had assembled.\n\nTo the east, where Foz do Iguaçu met its end, several thousand had already gathered over the last hour. Without the rushing water to mute them, the air was filled with hoots, cries, and shouts as any attempt at organizing a true chant gave way without exception. With every minute that passed by, they inched closer to the bridge's center, accompanied by another hat thrown into the air in premature celebration, and another rise in volume.\n\nTo the west, where Ciudad del Este's reconstruction had yet to reach, there were but thirteen. Composed of what few notaries and bureaucrats were capable of separating themselves from their work, they simply stood, eyes locked with the other side, shooting occasional glances at the deep blue beneath. For every five cheers that came from the other side, they returned a blink, at times two, rarely. A man in front, moving only his forearm, checked his watch—then again, as if protocol. The sole response he gave was a subtle twitch of the mouth, momentarily and imperceptibly ajar. He settled for a slight nod instead, and all thirteen began to walk.\n\nAnd as both groups drew toward the center, the two cutters exchanged a curt handshake before splitting the ribbon in two, all while the current picked up again. They had to sprint to either side of the bridge to avoid the incoming stampede."
LATAM_ParaEpilogue_BRW.1.a: "After them, the deluge."

LATAM_ParaEpilogue_BRW.2.t: "Ascension"
LATAM_ParaEpilogue_BRW.2.desc: ""Seño—Senhor Odebrecht," said a construction supervisor, barely an adult, hard hat on head and clipboard in hand, "there's some men down the hill; they say there's some papers you need to sign. Something about next month's funding." Poorly disguising his worry, he pointed at the scaffolding-filled remains of Asunción below, where a black limousine had parked, flanked by two suit-filled escorting vehicles.\n\n"Just when I was starting to enjoy the view." He opened his wallet, "Here, hand them a couple thousand and sign everything for me. Tell them they'll get that call from Brasília soon enough."\n\nThe young man's eyes widened as Odebrecht pressed the bills into his hands. "Yes sir, right away sir," he sputtered before beginning his sprint, first toward, then down the street, bobbing and weaving between the ever-growing assortment of overladen truck beds and freshly-purchased machinery.\n\n"And tell them to stop blocking traffic! I'm rebuilding a capital on a deadline: can they not save their complaints for some secretary?" He let his hands hit his sides and his fingers unfurl, and as the convoy began to depart, the Paraguayan returned to his site, not knowing with whom he had spoken to—and whom he had bribed.\n\nThe movers and shakers of the Brazilian economy would maintain their blessings, and the rebirth of the Mother of Cities would maintain its pace. Fat trimmed, edges sanded, and surface polished, Asunción would be worthy of the world's gaze once more."
LATAM_ParaEpilogue_BRW.2.a: "They just had to make sure that the "Made in Brazil" sticker blended in."

LATAM_ParaEpilogue_BRW.3.t: "A Day Well Spent"
LATAM_ParaEpilogue_BRW.3.desc: "Adhemar sat down at his hotel bed, let loose his itchy tie, and opened the top button of his shirt. With no foreign dignitaries and journalists to bother him, he could finally hear the Guaíra Falls, thundering over the slow-paced life of the sleepy town named after them. He knew that the agreement he had signed with the Paraguayans today had spelled the end for these falls.\n\nAs monumental and inspiring as these wonders of nature were, they were no match for the wonders of modern engineering - or the people's insatiable thirst for electricity. Adhemar lay in the bed, reckoning he might let the calming noise of the distant waters wash over him one last time, before they were gone.\n\nIn the next room, foreign minister Vasco Leitão da Cunha was sitting next to a coffee table, poring over the evening's papers. All in all, the reporting was positive. Folha de São Paulo was talking about the president's great achievement in peacefully reshaping the continent's diplomatic relations. Gazeta do Povo had written about the furious Argentine response to the Brazilian-Paraguayan agreement, "once again showing Buenos Aires to be an irresponsible player in Latin American politics". Even the usually-critical Jornal do Brasil could not help but offer muted praise for the president's efforts to provide the southernmost regions of Brazil with energy security, while also helping the poor, impoverished Paraguayans along the way.\n\nLeitão leaned back in his chair, stifling a yawn. All in all, there was much to be pleased with. Leitão knew the government was always in need of a lucky break, and having one attributed to him would be useful in the ever-shifting hurricane of favors and clientelism that followed in Adhemar's wake. Leitão rose from his chair and prepared to join his president in a disharmony of satisfied snores."
LATAM_ParaEpilogue_BRW.3.a: "Beyond them, the falls continued to rage, unaware of their impending doom."

LATAM_ParaEpilogue_BRW.4.t: "Hydroelectric Dreams"
LATAM_ParaEpilogue_BRW.4.desc: "Lacerda leaned back in his small chair, flipping through the draft of the treaty with Paraguay. He wished for nothing more than to end this exhausting day and collapse on the hotel room's small but cozy bed, but he had to make a decision first; his neurotic insomnia demanded it. Finally, Lacerda thumped the report on the table and took to the telephone, dialing the number for Hélio Marcos Pena Beltrão, his Minister of Finance. Standing next to the window, he could see the sleepy streets of Guaíra standing proud on the precipice between Paraguay and Brazil. He was in the final stages of signing a treaty that could change not just the fate of this hamlet, but the entire region.\n\nWith a friendly government in Asunción, a treaty to resolve their longstanding border disputes was a no-brainer, but the real question was the proposed dam to be built on the Paraná River. It would not have even started in his presidency, but the added clause could set the stage for its eventual retaliation.\n\nBeltrão's greeting finally came from the other side of the receiver, interrupted by Lacerda's worried lament. "The dam, Beltrão. It's an enormous investment, and I don't want to have this end up as another unfinished money-grubbing passion project. Tell me what you think and be honest."\n\nA moment of silence followed before Beltrão responded. "It is indeed a large investment, President. I understand your concerns, and we don't know how things will unfold when someone else sits in the presidential palace. But no president will want to be remembered as the one who has let so much money and resources go to waste and leave southern Brazil without secure energy. And when the dam is complete, that energy security will save us billions. As the Americans say, one must spend money to make money."\n\nLacerda thanked Beltrão and returned the receiver to its seat with a click. He had much to consider, and the bed looked more tempting than ever."
LATAM_ParaEpilogue_BRW.4.a: "Spend money to make money, indeed."
LATAM_ParaEpilogue_BRW.4.b: "I'm not going to bankrupt our country on a concrete fantasy."

LATAM_ParaEpilogue_FEB.1.t: "Best Served Cold"
LATAM_ParaEpilogue_FEB.1.desc: "Rafael Franco took a deep breath as the cameras flashed in front of him. This was the culmination of everything he has worked for since 1937, ever since that snake Paiva and his Liberal stooges betrayed the nation and derailed his revolution. They had only brought ruin to Paraguay, in the form of Morínigo, but now he was back, to heal his people's wounds and nurse Paraguay back to health.\n\nFranco gripped his microphone tightly to stop his hands from shaking. "The Colorados' regime has been defeated. The Paraguayan people, through their courage and sacrifice, have overthrown the fascist tyranny which has engulfed our fair land for too long. As the Paraguayan people's chosen servant, it is my duty to bring Paraguay back to her greatness, which the Colorados have squandered in their servitude to the Argentinians."\n\n"However, we have not come so far merely to trade one overlord for another. The so-called FULNA alliance was never truly the vehicle of the popular will, merely that of internationalist communists who would destroy our nation's pride and resolve, and of the servants of foreign capital, waiting to sink its claws into the wounds left by the Argentines' departure."\n\nFranco swallowed. There was nothing the Liberals could do to stop him, even those who weren't already jailed. He was doing his duty to the nation. Personal revenge was merely a plus. "The Liberal Pparty in particular, while claiming to fight for freedom, is merely the colonial appendage of foreign officers and capitalists. They have betrayed Paraguay's legacy of struggle for independence, from the days of Yegros through the time of Solano López. Their attempt to sell the nation out has made them a threat to national security. Due to this, I have instructed the revolutionary security services to arrest the Liberal Party's leaders and bring them to trial for their crimes against the nation. They will never turn our revolution away from its course.""
LATAM_ParaEpilogue_FEB.1.a: "Paraguay will be truly independent, or it will perish."

LATAM_ParaEpilogue_FEB.2.t: "Opportunities Unwound"
LATAM_ParaEpilogue_FEB.2.desc: ""...and he just couldn't believe it! He thought that building a highway like that would take at least two years. And there I was at the opening ceremony, eight months after the start of construction, and he was just staring at me like I've landed from the moon. After I cut the ribbon and we got to the buffet, I told him that it was just that pinch of Adhemar de Barros's magic. Ever since, Pereira and his folks have always come to me when they needed something. They know I get stuff done."\n\nAdhemar was sitting at a luncheon with Rafael Franco, newly re-inaugurated President of Paraguay. Asuncióon was still full of the noises of rubble being cleared and ruins being rebuilt, and the luncheon was modest, though in good taste. Adhemar thought it was the perfect opportunity to get the grizzled nationalist on the opposite side of the table on side with his vision for Paraguay's future, and to get a friend along the way.\n\n"And that's just the thing, President Franco: I get things done. I've come here with big ideas for Paraguay, big plans that could have it become the powerhouse of Latin America in the span of a decade. Energy production, agricultural exports, tourism, and of course, modernised infrastructure to build everything on. With Brazil's help, Paraguay would become the envy of her other neighbors. And with me in Brasília, all of these projects will actually get done."\n\nFranco pecked at his meal, picking up an olive. "Paraguay will indeed be the envy of her neighbors. Our people's willpower and work ethic are second to none in Latin America, and now, with the fall of the Colorados, there will be no one to chain that potential. Paraguay will have its modern infrastructure, its energy and agricultural production, its tourism, and even more resources to exploit. But it won't need Brazil for all of those things. It will only need time.""
LATAM_ParaEpilogue_FEB.2.a: "Swallowing the olive whole, Franco smiled in front of the wide-eyed Adhemar."

LATAM_ParaEpilogue_FEB.3.t: "Allies of Inconvenience"
LATAM_ParaEpilogue_FEB.3.desc: "Lacerda forcefully pulled on the rotary of his phone and waited on the line, tapping the table to keep himself from screaming into the receiver. After what felt like an eternity, a response finally came. "Good afternoon, Senhor Lacerda. What is it that you want?"\n\nLacerda, further stung by his counterpart's lack of manners, bit his lip in an effort to not roar obscenities into the receiver. "Good afternoon, Señor Franco", he responded in the quietest tone he could. "I am calling to discuss a most serious issue. We have received disquieting information regarding your administration's treatment of members of the FULNA alliance. From what I'm told, security forces under your direct command have begun to arrest members of the Liberal Party soon after you have declared them to be a... public enemy."\n\nLacerda fidgeted with a pen, still resisting the urge to scream into the phone. He found that having to stay even slightly diplomatic with this tinpot dictator was making him even angrier. "I will be frank with you, Franco. Brazil has been generously supporting you and your companions, first as part of FULNA and now as the legitimate government of Paraguay. We have provided both diplomatic and financial aid in your hour of greatest need. But if this policy continues, then the Brazilian government can and will cease aiding you. If you attempt to smother Paraguay's hard-earned liberty, you will go at it alone."\n\nA few moments of silence on the line made Lacerda start to wonder whether he had actually managed to make Franco reconsider, before the response came. "Paraguay is and will remain a sovereign nation. We have not taken your aid only to replace one master with another, and any policy decisions made for us will be made in Asunción, not Brasíilia. If you feel that your assistance was an investment to be returned, then I apologize for the misunderstanding. Have a nice day.""
LATAM_ParaEpilogue_FEB.3.a: "The stunned Lacerda sat quietly for a full minute before beginning to scream profanities."

LATAM_ParaEpilogue_FEB.4.t: "Join the Army, See Foreign Countries"
LATAM_ParaEpilogue_FEB.4.desc: "José and Luis stifled a yawn as the sun struggled against morning mist. The border between Paraguay and Brazil has grown much less tense ever since the fall of the Colorados, and the two soldiers increasingly felt that there was nothing for them to do here. Luis offered José a cigarette when a light came from around the bend.\n\nThree cars barged towards the checkpoint, as if they were unaware it existed. They were undeterred by the two soldiers' frantic gestures and cries of "¡detener!" They only screeched to a halt when the terrified José unslung his rifle and pointed it at the lead car.\n\nLuis stumbled behind him, clumsily picking up his rifle as the driver of the crowded car opened the door and began screaming Portuguese obscenities at the two of them. Slightly dazed, he noticed that bags, sacks, and crates encumbered all the cars, all tied into three unwieldy towers that could not have been safe.\n\nUnder the barrage of half-understood Portuguese profanities, the two guards slowly retreated to the guardhouse. Luis, pale in the morning light and unwilling to use his rifle against a group of civilian would-be settlers, turned his head to the small shack and called his commander as loudly as he could. "Pablo! We need help!"\n\nThe pair were already with their backs to the guardhouse when their commanding officer marched out, hastily putting his glasses on. He came forward, ordering the Brazilian man in broken Portuguese to show his papers. He sternly told him that due to the recent treaty between Brazil and Paraguay, Paraguay had the right to control the flow of people coming into and out of the country, and that due to them posing a clear and present danger to the lives of his men, they were not wanted. He then took out a black stamp and punched it on the man's papers before turning around and going back inside. The man's swearing continued, quietly, as he returned to his car."
LATAM_ParaEpilogue_FEB.4.a: "As the three cars began speeding off, José asked Luis for another cigarette."

LATAM_ParaEpilogue_LIB.1.t: "Reused Planks"
LATAM_ParaEpilogue_LIB.1.desc: ""¡Una inspección de perímetro! ¡Vamos, vamos!" Damn it, that accent still needs practising, Capitão Reyes thought to himself. "Look at how they go," he was saying to the recruits he had brought to the side. "Hah, like they just picked up their first rifle yesterday." Now Reyes swiveled around to his audience, his gaze determined. "But you know why you're not joining them now, right? 'Cause I know these ain't your first rifles."\n\nA brighter-eyed, shorter and tanned infantryman retorted back: "Actually, I'm not with the army, I'm from La Recoleta in Asun-"\n\n"Shut up!" Reyes retorted. "And I've been sent from the personal order of the President of Brazil to help little Paraguay out of the mud. So don't you ever talk out of turn!" The new recruit sheepishly turned his head, but his jumps away from the captain seemed a little exaggerated. Hmm. A cheeky one; someone's definitely taught him how to do that. He was definitely not from no capital city.\n\nThat gave him an idea, though. Having asked everybody for their life stories, places they grew up, and having them point it out on the map he had on a makeshift desk of disused planks, he noticed something weird. They were all from here, all from the Chaco, all natives to the region they were fighting in. Not only that, they had a certain quickness that he did not have until he had been in the Brazilian Exército for about a decade.\n\nSo peculiar. Their masters must have been names like Morínigo, like Stroessner, and in all that rubble, all that remained was an unprincipled search for money. Old jackboots, guerrillas, and everyone else whose convictions remained dormant, waiting for some new leader to galvanize them into action. Yet, who else was going to do the fighting for them? This was a war torn country, and when it came to security, there was very little room to pick and choose."
LATAM_ParaEpilogue_LIB.1.a: "Men, fall in. You're showing these rookies a drill."

LATAM_ParaEpilogue_LIB.2.t: "River of Peace"
LATAM_ParaEpilogue_LIB.2.desc: "Cameras were rolling. At the centre of the Friendship Bridge, whose frame arched above the glittering waters of the Paraná, a line of white tape demarcated where Brazil and Paraguay met. Behind his sunglasses, Lacerda glanced at the gathering of reporters on either side, and then at his opposite number approaching from the Paraguayan side. The hot sun was high in the sky, and Lacerda could hear the noise of the small crowd behind him, waiting at the banks.\n\nLacerda and President Ramos met at the line, and the two men, greeting like good friends, shook each other's hand, both understanding the importance of the day's meeting. Following the Battle of Asunción, the ruined capital was no place for a photo opportunity, and, better than any other city, this bridge was to Lacerda a symbol of the new economic order in Paraguay and Brazil, one based on free trade. Gone was the corporatist system of the former, and hopefully soon, the myopic developmentalism and red tape of the latter.\n\nThe two presidents turned to the left, giving the photographers a shot of Ramos and Lacerda smiling, the Brazilians' guiding hand placed firmly on the others' shoulder.\n\nFleetingly, Lacerda thought of his critics. He had already seen Wainer's article accusing the President of coddling an unelected strongman in the pockets of Paraguay's oligarchs. Looking at the unctuous figure beside him proved how laughable such a criticism was; say what you like about him, Ramos wasn't strong."
LATAM_ParaEpilogue_LIB.2.a: "The free world is a big tent."

LATAM_ParaEpilogue_LIB.3.t: "Hands Across the Water"
LATAM_ParaEpilogue_LIB.3.desc: "Cameras were rolling. At the centre of the Friendship Bridge, whose frame arched above the glittering waters of the Paraná, a line of white tape demarcated where Brazil and Paraguay met. Adhemar enjoyed the attention of the crowd of journalists on either side as he walked down the red carpet. His opposite number approached from the other side, the sleepy village of Puerto Flor de Lis peeking out from the treeline on the other side.\n\nWhen the two men stood toe to toe on the line, Adhemar and President Ramos shared a gracious smile and a firm handshake, a diplomatic bit of theatre both leaders could be happy with. With Asunción still in ruins from the climactic battle of the Bush War, the bridge was the best place for them to meet; closing it for the ceremony had already caused some consternation for the hauliers carrying goods back and forth, not to mention the flood of Brazilian settlers who arrived in Foz do Iguaçu looking to take advantage of Paraguay's virgin territory, looking to replace peasants evicted or killed during the war.\n\n"Mr. de Barros, on behalf of my nation, I once again thank you for your help in liberating Paraguay from the jackboot of fascism." Ramos' Portuguese was pretty good - he probably had plenty of time to practice.\n\nDon't thank me, Adhemar could've said, it wasn't my idea. This scheme with FULNA was already well underway in Washington and Brazilian high command well before he was elected. General Lott's fingerprints in particular were all over it, as if the man had needed more opportunities to play hero. Adhemar simply took a chance for enrichment where he saw it, through arms deals and reconstruction contracts. He was happy to receive the credit for the new liberal Paraguay, of course, but if he was going to be a mercenary, he had to make sure he got paid."
LATAM_ParaEpilogue_LIB.3.a: ""It's alright," Adhemar replied."

LATAM_ParaEpilogue_LIB.4.t: "Life on the Frontier"
LATAM_ParaEpilogue_LIB.4.desc: "José Farias Coehlo could see a second sun in the distance. The flames of his barn were visible even several kilometers away. Every other day, it seemed, there was a fresh incident. Slashed tires, broken windows, and now arson. Paraguay was far from the agrarian paradise as it had first appeared.\n\nPrices were rising back home in Brazil and squeezing out poorer farmers as larger landowners consolidated their vast holdings. Not so in Paraguay, where many landowners either went bankrupt or had fled the countryside during the war, leaving large plots of land available to anyone with even a little bit of hard Brazilian currency. He had moved his family almost overnight, grabbing up a farm five times larger than the one they had left. The work was hard, but everything seemed so cheap, and the markets were good. He even had enough to hire some extra farmhands and a fancy new tractor, luxuries he could never possibly afford back home.\n\nThe peasants who used to work this land resented the Brazilians for buying it out. It didn't matter that José had bought it fairly, it didn't matter that José was just trying to provide for his family, it didn't even matter that José had even tried to offer a hand by hiring them to work for him. He was just a Brazilian dog who "stole" the land he paid for.\n\nHe watched with grim resignation as his barn burned into cinders, another casualty of his neighbor's infernal jealousy. He doubted he could trust the authorities to respond fast enough. No, the only thing he could count on was the revolver on his hip. The cold steel felt comfortable as he held the grip, groping the trigger with his fingers. The next time those vermin set foot on his property, they would pay a high price. José had sacrificed everything to build this new life here, and if these vandals wanted to take his paradise from him..."
LATAM_ParaEpilogue_LIB.4.a: "...then he was prepared to give them hell."

LATAM_ParaEpilogue_LIB.5.t: "The Aftermath of Wars Large and Small"
LATAM_ParaEpilogue_LIB.5.desc: "The roast beef in his stomach was attempting to revolt, and so Norberto Odebracht had tried to drown the rebel in wine. The war was being won, but as a bubble of heartburn made its way up his chest, he knew that all wars had casualties.\n\nThe Pan Am flight still had about ten minutes before landing. Norberto looked out the window and saw the rolling fields of soybeans and the white dots of cotton ready to be harvested. He had built those. Paraguay had been a smoking ruin after the Battle of Asunción, and when it came to rebuilding what had been left behind, the government had relied upon him and investors like him to provide the building expertise and the funds. Bureaucrats only ever looked to the short-term, and they relied upon the market and the visionaries for the rest. It was the way of the world.\n\nThe crackle of the radio informed the passengers that they were about to land. The airport he was flying into was his accomplishment as well. Before him, Paraguay would have never been seen as an investment destination. Now, it had the Silvio Pettirossi International Airport only a few miles from the capital, a nexus of air travel that saw everything for tourist flights from the United States to cargo airliners bound with goods for export. Asunción would have never been thought of as a place where a man could do business, let alone invest in everything from banks to sports complexes. Where once people suffered, now Asunción was a destination for doctors, lawyers, engineers, and everyone with brains in their head and ambition in their hearts.\n\nHis bank account was a reward on its own, but Norberto knew he was doing good for the Paraguayans, and the people around the world."
LATAM_ParaEpilogue_LIB.5.a: "A jostle as the plane landed gave the beef one last desperate attack, and Norberto grimaced that the war was not over."

LATAM_ParaEpilogue_LIB.7.t: "Run the World"
LATAM_ParaEpilogue_LIB.7.desc: "Vice President Lott felt the air change as the motorcade left Asunción city limits. The newly-restored capital, which had been in ruins not so long ago, suffocated Edna. From the airport terminal to the grand boulevards, the well-to-do neighbourhoods with stores full of American and Brazilian consumer goods - all of that construction she knew was financed by the dirty money of Adhemar and his friends. Outside of the barrios, which housed the invisible poor, the whole city practically reeked of Adhemar. Some dull feeling clung to her.\n\n"You must pass on my thanks to de Barros when you return, Vice President." Turning away from the window, Edna saw a meek smile on the thin lips of Paraguay's new president. Fresh from the other day's inauguration, Gustavo González had the look of an old gentleman, but the suit he wore fit him badly, as if he had suddenly lost or gained weight.\n\n"I will of course, Mr. President." Edna smiled back. "And thank you for showing me outside the city - I read about the war in the papers, but it'll be very different seeing a real compound FULNA used during the liberation."\n\nGonzález laughed dryly. "Don't get your hopes up too much. Trenches dug during the last offensive before the capital, already half-claimed by jungle. But my people and your people agreed it'd make for a good photo op." He turned to the window, staring at the vast cotton fields. "Do you think it's right that those people out there still toil away just as they did under Morínigo, as if the war never happened? I've been President for five minutes, but the party bosses have already told me what they think of land reform. I know very well who stands behind them. Same old story, isn't it?"\n\nThat funny feeling was around Edna like a blanket. González gave her a sympathetic look; maybe he felt sorry for her, or sorry for himself."
LATAM_ParaEpilogue_LIB.7.a: "Edna knew then what the feeling was - it was guilt."

LATAM_ParaEpilogue_LIB.8.t: "The Fortifications of Melos"
LATAM_ParaEpilogue_LIB.8.desc: "Virgílio Távora squinted his eyes as the midday sun peeked out behind the watchtower. Barbed wire shimmered in the heat. Trucks criss-crossed the military compound. Behind Távora, the newly-elected President of Paraguay, Gustavo González, flanked by medal-embossed Paraguayan generals, stood expectantly, like a classroom waiting on the teacher's word.\n\n"A clear line of sight to the Argentine side of the valley from up there, is it?" Távora asked, gesturing to the tower's platform above him. He dabbed a handkerchief on his forehead with his other hand.\n\n"This facility has the most up-to-date reconnaissance capabilities in the country," said one of the officers, "Argentina won't be able to step on a branch near the border without us knowing."\n\n"It's all thanks to the friendship and cooperation of President Lacerda, of course," piped up González. "With the Morínigo regime gone - we have much to thank Brazil for, I mean."\n\nTávora could tell González was new to being in such a supplicant position - his grovelling was amateurish and resentful, which somehow made it more pathetic. Távora had read the man's file before his election was arranged, of course, so he expected a little attitude from the reformist. If González had carried those ambitions into the Presidential office, they had almost certainly been smothered by the real powerbrokers in the Liberal Party by now.\n\nEither way, Távora had little sympathy for the puppet president. A friendly, liberal regime in Paraguay had been the best outcome for everyone, including González, unless he wished to end up in front of a fascist or communist firing squad. Should Brazil be sorry for being right?"
LATAM_ParaEpilogue_LIB.8.a: "The weak suffer what they must."

LATAM_ParaEpilogue_Illiberal.1.t: "An Exercise in Human Misery"
LATAM_ParaEpilogue_Illiberal.1.desc: "Extending a hand to those in need was a blessing, and when news came in that Paraguayan people fled the war, Conrado Tavares Guimarães was among the first to volunteer to help in the refugee camps. He knew that things were going to be bad, but if he could help, surely God would forgive a man whose love for drink destroyed his family. The Church had saved him, and now, he could save another. He was no doctor, but he had a pair of arms and could unload a truck, and that would have to be enough.\n\nWhen he reached the camp, he almost vomited from the smell, the pungent odor of sweat and human misery that he had known well in the favelas after yet another bender. The camp's housing was little more than a few ramshackle buildings with supplemental tents, only some with mosquito nets. They had enough cots for the refugees, for now, but the infirmary was stretched thin on supplies for anything more complicated than a bandage. The rations were still delivered on time, thank Christ, and some of the refugees tried to fish in the Paraná.\n\nThe surubi weren't the only things being hunted. Pawn brokers prowled the refugees, buying their meager possessions for a pittance. Everywhere, he heard the constant refrain: "This is the only offer you'll get. Take it or leave it." Valued photographs, tarnished silver jewelry, all of it sold for a tenth of what it was worth, just so the Paraguayans could have money that the Brazilians would accept.\n\nShouts drew his attention as three security guards angrily questioned a new arrival. Half the time, the security thought that there were communist infiltrators posing as refugees, sneaking in to meet up with secret cells across the border. The other half, they were former fascists attempting to destabilize Brazil. Conrado wondered how many of the guards were paranoids, how many were bullies, and how many were right."
LATAM_ParaEpilogue_Illiberal.1.a: "He prayed for the strength to help, and to avoid succumbing to the same despair."

LATAM_ParaEpilogue_Illiberal.2.t: "Limits of a Revolution"
LATAM_ParaEpilogue_Illiberal.2.desc: "Tony Poe sat on the hood of his car, his headlights beaming across the clearing overlooking the valley like someone was up to no good. The men were about 20 lined up before him; Paraguayan expats, foreign mercenaries, hardened criminals. Some looked just off the bus from Asunción, others had faces that told grander stories, like 'Paul', an Asian man with a thousand-yard stare, a Tanto knife and a rickety grasp of the Portuguese language, just enough to draw some side-eye... Poe could be open-minded when he had to.\n\nThe commander was anything but indifferent. "Impressed?" That greasy, cannonball head with the beer gut stood to the left, a toothy smile as leaned against Poe's car. "Morínigo's Exercito, FULNA's finest and a few more... eclectic prospects. You want a third column? You have one right here."\n\n"They can fight, but can they wage war?" The Brazilian contact was less enthusiastic, this lothario with a wide-brimmed cap and placid look on his face stood off to the right, he gestured at the men in line one after another. "He can, that one can, maybe him too, but can they make it work? If we get hit with another Guaíra, these men need to be ready."\n\nPoe could sense another blow up between the two beside him brewing, he held up his hand. "What we need is for you all to do as you are told." He steepled his fingers, leaning forward. "I'm the boss here and I need these men on stand-by to run raids down south. Until then, keep building numbers with anyone you can get over the border; We need people for anyone jumping the line if Brazil gets into another shooting war."\n\nIn the distance, the clearing looked out onto the valley below, where barbed-wire fences and checkpoint of the Paraguayan border sat unawares. The overcast sky and distant headlights on the road made the jungle almost look gentle for once, chirping crickets and everything. "Quantico has a lot, and I mean a lot, invested in this operation. Stick to the shadows and wait for my orders, so long as we keep the Communists on the run, my employers will be satisfied.""
LATAM_ParaEpilogue_Illiberal.2.a: "Poe adjusted his tie as he stood up and strode to the driver's side door; "You don't want to get on my employers' bad side, gentlemen...""

LATAM_ParaEpilogue_Illiberal.3.t: "Worth a Thousand Words"
LATAM_ParaEpilogue_Illiberal.3.desc: "The army truck stopped in the middle of the shrubbery-lined road, before the sergeant in the back barked out an order to disembark. Hidden in the shrubbery, Roberto held his breath. The nearby Guaíra falls drowned out most of their voices, but it was still evident that they were speaking Spanish, not Portuguese. Paraguayans. The only weapon Roberto had was the hoe he was working his fields with before he investigated the noise.\n\nThen, he remembered what he had in the satchel he wore. Slowly, he reached inside to take his camera out. He aimed at the closest soldier, then the truck that the men disembarked from. The falls drowned out the sound of the camera shutter.\n\nRoberto returned the camera to his bag. While he was doing so, he rustled a tree branch. His breath caught in his throat as he watched one of the Paraguayans turn his head slowly toward the bushes around him. That was the farmer's cue to leave.\n\nThey hadn't seen him yet, but they would soon if he remained here. First, he quietly shifted out of the brush. Once he was on grass, he broke out into a sprint.\n\nHe burst through his door, nearly tearing the phone off the cord as he dialed for the police. They could contact the military."
LATAM_ParaEpilogue_Illiberal.3.a: "The pictures were in the hands of the Brazilian army by that afternoon."

LATAM_ParaEpilogue_Illiberal.4.t: "Intelligence Report on the Guaíra Falls Occupation"
LATAM_ParaEpilogue_Illiberal.4.desc: "President [BRA.GetLeader].\n\nAt 12:00 hours, armed forces from the Paraguayan Exercito occupied part of the impasse in the region surrounding Guaíra Falls. With Brazil's limited military presence in the area combined with the region's sparse local population, we can confirm no loss of life occurred in this process. That having been said, the situation requires an immediate response from Brasília before the Paraguayan are able to escalate.\n\nAs you are no doubt well aware, the general area surrounding Guaíra Falls has been a point of tension between Brazil and Paraguay for generations. The status of the waterfalls at Guaíra as one of the world's famous natural wonders has been a point of pride to many in South America and to Brazilians and Paraguayan especially, with the area around the waterfalls serving as a natural border zone between the two countries for centuries.\n\nBrazil's policy regarding Guaíra has traditionally favored maintaining a neutral zone over the region, as much to ensure the area's natural beauty is not encroached upon as to keep the regional politics of either nation out of it. Meanwhile, Paraguay has historically claimed the region to be their territory, culminating in conflicts such as the Paraguayan War (1864-1870) that have mired diplomatic talks in controversy ever since. This recent act of aggression is likely tied to Paraguay's desire to utilize Guaíra for hydroelectricity, something that stiff opposition from Argentina has long prevented.\n\nThe discretion how Brazil is to respond to the crisis is entirely under your purview. A military reprisal to Paraguayan aggression would be justifiable under international law, as would attempting to negotiate via the OAS to come to a more amicable solution; We will leave the critical decision making to you and are confident you will respond to the situation with the levity it requires."
LATAM_ParaEpilogue_Illiberal.4.a: "This calls for a little backdoor diplomacy..."
LATAM_ParaEpilogue_Illiberal.4.b: "Arrange a summit at the OAS HQ in Washington D.C, we must try to avoid war."
LATAM_ParaEpilogue_Illiberal.4.c: "Send the Exercito into Guaíra; the buck stops here, as Harry Truman would say."
LATAM_ParaEpilogue_Illiberal.4.d: "Remain silent, weather whatever comes of it and let the world respond to Paraguay's aggression."

LATAM_ParaEpilogue_Illiberal.5.t: "The Success of the Guaíra Falls Treaty"
LATAM_ParaEpilogue_Illiberal.5.desc: "Grand news arriving from Washington D.C today as the attempt by Brazil to resolve the emerging crisis concerning Paraguay and the occupation of Guaíra Falls has proven successful; After several days of tense negotiations within the headquarters of the OAS, chiefly embodied by Brazilian delegate Araújo Castro and Paraguayan representative Juan Plate, the leadership of Paraguay formally agreed to withdraw Its troops from Guaíra and begin the process of demobilization.\n\nIn addition to the combined efforts of Brazilian, Paraguayan and American diplomats to reach a peaceful resolution, credit for the initiative is to be levied at, strangely enough, the Argentinian envoys at the OAS. Normally an antagonist of Brazil's foreign policy, Buenos Aires proved to be a vital contributor to the forthcoming Treaty of Guaíra Falls, an agreement formally addressing the status of Guaíra, even including provisions allowing Paraguayan development of a hydroelectric dam at Guaíra (provisions that the Argentine delegation were reticent to comment on.)\n\nRegardless of the intent behind Argentina's involvement at the OAS summit, this moment has the potential to be a watershed moment in the conduct of diplomacy in South America. After multi-generational enmity between the nations of the Southern Cone, perhaps a mutually beneficial agreement can be made to transcend ideological divisions and chart a new, more hopeful course for Latin America's future?"
LATAM_ParaEpilogue_Illiberal.5.a: "The nations of the south deserve something better."

LATAM_ParaEpilogue_Illiberal.6.t: "Surf and Turf"
LATAM_ParaEpilogue_Illiberal.6.desc: "The restaurant at the Omni Shoreham was busy, with hundreds of conversations melting into one another. Araújo Castro, Brazilian representative to the OAS, seemed to be the only one alone at the table. He looked at his watch. Where the hell was Juan Plate? He was meant to be here nearly twenty minutes ago to celebrate the Guaíra Falls Treaty over some surf and turf with fine w-\n\n"Castro. We need to talk." The Paraguayan representative appeared seemingly out of nowhere, collapsing into his seat. "The Argentinians are telling us to pull out of the treaty." He grabbed the glass of water before him and greedily took several gulps, wiping his mouth. "Unless we revise it."\n\n"Revise it? What the hell do they want?" Castro asked, incredulously. "We pulled back the troops. Do they want us to resolve the whole dispute too?" Plate shook his head.\n\n"Buenos Aires wants a say in any dam construction at the falls." Castro narrowed his eyes. "Yes, that means by extension, the whole Paraná. They say it's crucial to their strategic interest." Plate sighed, shaking his head. "My apologies, Castro. This really isn't ideal."\n\nCastro pressed his lips together. "I'll make a call to Brasília. Though, I believe I already know what the President's going to think about this.""
LATAM_ParaEpilogue_Illiberal.6.a: ""I don't think he'll want to rock the boat.""
LATAM_ParaEpilogue_Illiberal.6.b: ""He's not going to let the Argentinians get a damn inch of that river.""

LATAM_ParaEpilogue_Illiberal.7.t: "The Troubling of Waters"
LATAM_ParaEpilogue_Illiberal.7.desc: "His thoughts had been lost in the distant sounds of rushing water when reconnaissance had told him the Paraguayans were falling back. For Captain Reyes, it almost took too much energy to hold the radio to his face, despite the fact that they were still technically on high alert; Not that long ago, this whole region had been a cavalcade of violence in the Exército's attempt to halt the Paraguayan advance. In the last few weeks however, the fighting had died down and been reduced to an uncharacteristic silence and punctuated by an uncanny kind of boredom, only occasionally broken by the distant crack of a rifle.\n\nWhen Reyes had relayed the orders for the reconnaissance to return to base, he made a scan of the army encampment for the platoon he was in command of, situated on the border of Guaíra Falls; gunnery emplacements, sniper towers, dirt trenches and mounds of sandbags had been the whole world for Reyes and his men. Yet for all the military grade hardware surrounding them, the majesty of the rainforest yet abated, as much in war as in peace.\n\nEveryone had heard about the OAS mediation in the conflict and figured for a ceasefire was incoming. Any end to the fighting was welcome, but the lack of a treaty meant hell to pay. Reyes was lucky in that his platoon had, somehow, not lost a man, but the same could not be said for a lot of the boys further south along the frontline, to say nothing of what it meant to the suits back in Brasília.\n\nPersonally, Reyes could have cared less; the men were tired, a tale as old as war itself. They all had their own politics and way of viewing the world, everything from libertine nationalists to bleeding-heart socialists filled the ranks of Reyes' platoon, all united in the same common denomination of loving their nation perhaps a little too much. They were just relieved they could go home.\n\nBefore he met with the quartermaster to plan out the withdrawal, Reyes' eyes found the waterfalls themselves in the distance, this monument to natural beauty to all that beheld them and that was in a continent that had plenty enough to go around. Men were made to remember how diminutive they and their ambitions were in a place like this; that the earth would remain long after the folly of the cannonade had fallen silent."
LATAM_ParaEpilogue_Illiberal.7.a: "Reyes listlessly swished the chewing tobacco in his mouth, his eyes wondering; this sensation in his chest felt eerily familiar somehow."

LATAM_ParaEpilogue_Illiberal.8.t: "The Next Venture"
LATAM_ParaEpilogue_Illiberal.8.desc: "Norberto Odebrecht and his team of geological engineers followed the pair of guides as they hiked through the trail, swatting insects and complaining about the humidity. It was a long hike, and there was still a fair amount of suspicion. A few of the Argentine and Brazilian engineers looked on at their counterparts with suspicion, audibly complaining that they were there to commit industrial espionage and undercut the joint endeavor. All were suspicious of their Paraguayan guides, and had insisted that they be watched to ensure that the entire group wasn't being led into a partisan ambush.\n\nNorberto cared little about the suspicions that the rest of the group was under. The Guairá Falls Treaty would allow for the construction of a dam that could solve Paraguayan power issues and have enough capacity to send power for almost the entire Brazilian border. He knew enough people that he could pay to ensure that he could win a contract, and others who could be intimidated into not objecting, provided that the political will to keep the treaty in place didn't evaporate. All ventures were inherently about risk, and that could mean losing millions in seed capital, or it could mean being robbed and left to bleed out from a gunshot wound in the middle of the jungle. Nothing ventured meant nothing gained, and Norberto did not become the man he was by being timid.\n\n"Almost there, gentlemen. You won't even need your canteens in a second," one of the guides mentioned. Norberto had forgotten his name, but he knew the other one's name was Roberto.\n\n"You'd better pray you're right, Senor Odebrecht. We won't find our way back and I don't want to have to share my pack with these Argentinian scoundrels." Norberto's aide, sweating and red, huffed out, probably louder than he anticipated. Not-Roberto's whistle cut him off, and the group hurried their pace to the clearing.\n\nIt was even more beautiful than Norberto could have predicted. Mists rose up from the roaring falls, cooling the men. One removed his hat, Not-Roberto quickly crossed himself. Even Norberto stopped thinking about dollar signs and just looked at the natural wonder that his dam would destroy."
LATAM_ParaEpilogue_Illiberal.8.a: "Side by side, man forgot nation for a moment and was united in wonder."

LATAM_ParaEpilogue_Illiberal.9.t: "A Map of Things to Emulate"
LATAM_ParaEpilogue_Illiberal.9.desc: "The afternoon sun peeked through the clouds as a muted onlooker, like many others in attendance, to the historic events unfolding in real time; on a small island in the inland sea of Guaíra Falls, The President of Brazil, Adhemar de Barros, and his contemporary from Paraguay, [PAR.GetLeader], signed their names to a treaty between their respective nations, formalizing the international recognition of the two nations' newly redefined borders.\n\nThe meeting was held in the open air, a single, hardwood desk deliberately placed at the center of a small gathering, representatives and dignitaries from either nation flanking either side. The leaders met at this center, de Barros signing his name first, followed by [PAR.GetLeader], who lifted the paper to the sky and was met with prolonged applause as he shook hands with his Brazilian counterpart.\n\nThis was seen by all as an extraordinary victory for both countries, but observers noted that the affair serves as a sterling example of the success of de Barros' deal-making foreign policy. Clearly, the shake-up in Brazilian politics with the advent of the populist PSP administration, at least as far as foreign relations is concerned, points to a positive shift in Brazil's prospects for the future."
LATAM_ParaEpilogue_Illiberal.9.a: "Order at home cannot happen without Progress abroad."

LATAM_ParaEpilogue_Illiberal.10.t: "Folly at the Falls"
LATAM_ParaEpilogue_Illiberal.10.desc: "Vasco Leitão da Cunha felt the warm grasp of President [PAR.GetLeader] between his fingers as the two shook hands, the faint splashing of water beneath an overcast sky as a backdrop. They stood on an island amidst the Impasse, not that far from the glorious sight of Guaíra Falls themselves roaring mutely in the distance somewhere upstream. They had set up a table and a few chairs that were open to the sky, affirming the new borders between Brazil and Paraguay as recognized by the international community, now made official by the leadership of both nations.\n\nNaturally, questions arose as to why it was da Cunha who was given the task of representing Brasília in this matter. It was Lacerda who agreed (eventually) to the treaty after all, yet he claimed he was too busy with stately matters to attend. da Cunha wasn't so convinced, however, as he knew Lacerda did not support the treaty and felt pressured into accepting it, not the least reason being the land concession to what he saw as the Fascist regime in Asunción.\n\nScathing political implications aside, da Cunha felt rather satisfied with the affair; preserving a stable foreign policy with their southern neighbor was just as valid an excuse as any to be flown down here to enjoy the sights of the natural majesty here. Guaíra was never lacking in impetuosity and an afternoon meal with the Paraguayan dignitaries gave them both a ready excuse to sit back and admire the land for the miracle that it was."
LATAM_ParaEpilogue_Illiberal.10.a: "da Cunha would remember to still recommend Guaíra Falls to the President for a vacation destination on his own time."

LATAM_ParaEpilogue_Illiberal.11.t: "Operation Sagarana"
LATAM_ParaEpilogue_Illiberal.11.desc: "Carlos de Meira Mattos stood in the command room in Brasília, overlooking the war table.\n\n"What about the tanks?" the general prompted.\n\n"Not in that forest, too dense, barely anywhere to punch through," the field marshal replied.\n\n"And Poe?" Paraguayan militias, American trained, the general continued. "His guerillas-"\n\n"No." Mattos waved the thought away. "We learned that the hard way at Guaíra before, Bush War long before that."\n\n"What then?" The field marshal asked.\n\n"Infiltration." Mattos suggested, gesturing to the map in front of him. "Special Forces insertion, around the western flank."\n\n"Near the Bolivian border?" The general rubbed his chin. "Fortifications near there are west facing, less so north."\n\n"Paraguayan divisions are naturally more towards the center and east." The field marshal added. "Less defended to the west."\n\n"A lightning strike would result in less bloodshed and overall casualties." de Mattos continued. "The ambush would likely cause a retreat, forcing enemy command to scramble to draw more troops from the center while they reassess the line."\n\nThe field marshal was impressed, the general looked pleased, de Mattos made sure to allow himself only a small measure of relief for now."
LATAM_ParaEpilogue_Illiberal.11.a: "There was still a war to win, after all."

LATAM_ParaEpilogue_Illiberal.12.t: "Run Through the Jungle"
LATAM_ParaEpilogue_Illiberal.12.desc: "Commander Carlos de Meira Mattos had to hold up his hand to shield his face from the misty spray over the area, the forward operating base sitting only a few clicks away from the churning vortex at the foot of Guaíra Falls, easily as divine and imposing as Cristo Redentor himself as it loomed over them like a colossus. The roaring of the rushing waters was deafening, as if standing inches from a speeding locomotive. This made communication in the field difficult, but carried an element of surprise for the mission about to begin.\n\nThe joint chiefs of the Exército had given the green light to Operation Sagarana, a special forces operation to penetrate the Paraguayan forces nearest the Bolivian border in the hopes of shattering the line and forcing a retreat. The detachment entrusted with this task was small, but mobile, knowledge about the terrain, something in dire need under the thick canopy surrounding them.\n\nMattos was still half-distracted by the towering natural monument when Reyes had shown up. His men were as ready as they could be and reconnaissance reported that the Paraguayans were seemingly unaware. Intelligence gathering was spotty in wilderness this dense and it seemed as if the operation had a real chance going either way. Reserve forces were waiting on the backfoot in case of escalation, all the men needed was the go ahead from command to move out.\n\nA single nod from Mattos was all they needed and Reyes and his men obliged, the shade of the open wild welcoming them as they pressed forward."
LATAM_ParaEpilogue_Illiberal.12.a: "Don't look back."

LATAM_ParaEpilogue_Illiberal.13.t: "One Eye Open, One Eye Closed."
LATAM_ParaEpilogue_Illiberal.13.desc: "For hours, Reyes had been eyeing the guy like his cornea was welded to it. Stock jamming him the shoulder, his whole world reduced to the iron sight on his rifle. The pill box was barely one step removed from an oven, the hard concrete emplacement doing little to keep out the heat of the jungle. It spoke volumes that served better for defense opposite the Paraguayan fallback line than it did when he and his men came upon it.\n\nThe element of surprise worked well enough when the Brazilian marines emerged from the tree line, but the Paraguayans were more dug in than intel had reported. The result resembled more of a slugfest than a proper battle. Gaining ground, holding ground, losing ground and gaining it again. Back and forth like a metronome, but always with the enemy on shakier ground than the next each time Reyes pushed.\n\nWhen the reserves had shown up to reinforce Reyes and his men, the enemy finally gave the fallback order, abandoning the defenses and retreating to a defensive line a few clicks to the south. Hours later, a whistle was blown in the distance and the Paraguayans started falling back again. On seeing the soldier he'd had in his sights for what felt like a day started to move, Reyes began barking orders. "HOLD YOUR FIRE!" He shouted as he held his wincing eye, feeling the strain of staring without blinking for far too long. He'd figured the day had been a pain in the rear for both parties, little sense not to give the enemy a chance to lick their wounds."
LATAM_ParaEpilogue_Illiberal.13.a: ""Radio Mattos, the Paraguayans are retreating." Reyes lazily slumped into a sitting position again, pulling his hat down, sighing with relief."

LATAM_ParaEpilogue_Illiberal.14.t: "High Hanging Fruit"
LATAM_ParaEpilogue_Illiberal.14.desc: "The mist from the falls was almost getting in his eye again. The churning waters from Guaíra were further down than before, but not so far that the spray from the rapids could not softly pelt Carlos de Meira Mattos, even up on the podium. That had been Lacerda's idea as well, erecting a platform at the victory site would look great for the history books, a recurring theme for the President as it would turn out.\n\nLacerda had already been speechifying for a long while now, flanked by Commander Mattos, Captain Reyes and his squadmates, all being hailed as heroes for their role in Operation Sagarana. The speech was a menagerie of rousing patriotic rhetoric he'd heard all the time at the academy; Nation, Freedom, Order, Progress, Sovereign, God, all were given there due by...and then it took a turn for the strange.\n\n"But MOST of all!" Lacerda slammed the lectern as his voice spiked in volume. "Let every soul thrown against the Exército be a reminder of the victory made here; Fascism will NOT find a footing here! Fascism will NOT poison the minds of our countrymen! Let this triumph be the sword, lifted to the sky and basking in God's glory! It is through the SOVEREIGNTY of ORDER and PROGRESS, that FASCIST ideals be expunged, purged and if need be BLASTED from the surface of the Earth!"\n\nMattos' jaw almost dropped. He blinked away the disbelief as the crowd roared with cheers and. The commander glanced at Reyes to see if what he just heard was as nuts as it sounded. The captain's reaction was more muted, but the amused look he gave in return told him that Mattos wasn't alone. He knew Lacerda was prickly about Paraguay and not for no reason, but even this seemed like a bit much.\n\nMattos looked back at the President just in time to catch him walking towards him. Mattos straightened his uniform, forcing the concern from his face; Lacerda was almost out of breath, eyes dancing from the adrenaline from his rousing speech. Now back to his more practiced speechcraft. "For excellency in command and leadership, the Medal of Santos-Dumont Merit: Saúde!""
LATAM_ParaEpilogue_Illiberal.14.a: ""Saúde..." Mattos was otherwise silent as Lacerda pinned the medal to his chest, a soft applause arose in tandem with the rushing waters of Guaíra."

LATAM_ParaEpilogue_Illiberal.15.t: "Victory with Intent"
LATAM_ParaEpilogue_Illiberal.15.desc: "Reyes had to be dragged to the affair by Commander Mattos, more content with his nap than politics. Now he stood atop a grandstand in the very fortifications he and his men had almost died trying to take. Now, all prettied up for the cameras, all that remained was the natural beauty of the jungle and distant bellowing of Guaíra far behind.\n\nAdhemar de Barros was slippery-er than an oil slick and about as toxic, his entourage escorting him to the pavilion to the roar of the crowd. The gray-maned head of state took to the podium with a smile and a wave to his supporters. Reyes stood behind him in a line with his men, flanked by Commander Carlos de Meira Mattos as de Barros sought to honor them as the orchestrators of Operation Sagarana, for perhaps more base reasons.\n\n"By the grace of almighty God!" de Barros began. "As the sun blazes across the sky, the brave men of the Exército have driven the invader from our ancestral lands! And so, just as the Smoking Snakes stood their ground against the Axis Forces in Britain, so too have the men of Sagarana proven themselves as Brazil's most loyal warriors against the tide of tyranny!"\n\nKeeping the microphone close, de Barros turned to Mattos and Reyes: "Let this day be one for which every man of their nation shall strive to emulate the devotion to their people that you men have demonstrated today. Let the sacrifice of the common soldier serve as a model to your fellow countrymen, that far more than any other, you are the beating heart and burning soul of this nation!"\n\nde Barros wasted no time in striding to the men lined up behind him, hopefully not noticing Reyes' raised eyebrow at that display. Mattos was the first to receive his medal as de Barros made his way down the line towards Reyes, who found his mind wandering again; That speech could not have been more fetishistically pro-military if the president had an artillery cannon protruding from the front of his trousers. The man knows his constituency... Reyes thought sardonically."
LATAM_ParaEpilogue_Illiberal.15.a: "The Medel Bartolomeu de Gusmao was pinned to Captain Reyes' chest, who was careful to keep his amusements to himself."

LATAM_ParaEpilogue_Illiberal.16.t: "The Price of Vigilance"
LATAM_ParaEpilogue_Illiberal.16.desc: ""Do not sugar coat it on our account." Carlos de Meira Mattos said sullenly. "Did we lose them?"\n\n"Not yet, but not by far." The lieutenant-commander's expression was grim. "They are holding out with all they've got, but the Paraguayans aren't letting up."\n\n[BRA.GetLeader] leaned over the war room table, defeated. "How did this happen?!" The president was incensed.\n\nThe officer shook his head: "Paraguayans were too dug in, terrain was too hard to get around once cover was blown. Reyes and his men are throwing everything they have at him, but they can't hold out forever."\n\n"Can we get them out?" [BRA.GetLeader] searched his face for answers.\n\n"Not enough for Asunción not to notice." The officer scratched his chin. "Paraguayans are too entrenched."\n\n"Air assets could lay down a bombardment to cover the retreat." Mattos had not taken his eyes off the president the whole conversation, his mouth a firm line, corner to corner. "But that would risk escalation."\n\nThe president felt Mattos' eyes on him. "And the best course of action?"\n\n"Mattos resisted the urge to grind his own teeth. "Reyes and his men knew the risks going in, as they always do. Paraguay knows their operations are stretching the limits of international law, and they may back down when the bombs start falling, but that's doubtful."\n\n"Presidente." The lieutenant-commander prompted. "Air assets are fueled and ready for lift off, your assessment is...?""
LATAM_ParaEpilogue_Illiberal.16.a: ""Order Reyes to retreat, have MEDIVAC ready to receive them, but keep the air assets grounded.""
LATAM_ParaEpilogue_Illiberal.16.b: ""Order the Airman to launch a run to cover Reyes retreat, damn the consequences!""

LATAM_ParaEpilogue_Illiberal.17.t: "Condemnation"
LATAM_ParaEpilogue_Illiberal.17.desc: ""Argentine Foreign Ministry Condemns Guaíra Falls Attack!" Captain Reyes snorted as he scanned the headline on his newspaper. "Vieira, come get a look at this." Lieutenant Vieira looked over Reyes' shoulder at the paper. "They're calling us a threat to world peace." He jabbed a thumb over the aforementioned condemnation, passing the paper to Vieira. "When have the Argentines ever cared about peace? This whole mess started because they didn't care!"\n\nVieira adjusted his glasses, looking over the newspaper. "You think this means anything?" He asked the captain, looking up from the paper. "Those Argentines love to talk shit." He handed the paper back to Reyes. "The way I see it, they're going to fly some jets by our border, drive a few tanks up to the crossings, and then pull them all back by the end of the month."\n\n"You know what I think, Vieira?" Reyes asked his Lieutenant, pulling out a pack of cigarettes and lighting one. "I think that this is a sign." He took a drag from his cigarette, before using it to point at the paper. "It's a sign of weakness. We could be storming the Congreso, and their Foreign Ministry would still be sending out condemnations of our bullying and aggression.""
LATAM_ParaEpilogue_Illiberal.17.a: "The two officers exploded into laughter."

LATAM_ParaEpilogue_Illiberal.18.t: "The Grief of Guairá"
LATAM_ParaEpilogue_Illiberal.18.desc: ""Carlos Lacerda is a warmonger, and a woeful warmonger to boot," the day's Última Hora screamed right into Virgílio Távora's face. The Vice President did not normally pick up Wainer's rag; rarer still did he stare at the man's screeds himself, for fear that a polemic might pair poorly with his coffee. But this morning, he decided to indulge it. And he was already hating it.\n\nOf course, Wainer was referring to the whole Guairá Falls 'thing', as his colleagues in the Planalto now called it, and the "hare-brained scheme that rivaled the Crusades of Jerusalem in ambition, yet the Siege of Humaíta in failure." The invocation of the other most significant war which came to mind over Paraguay made it especially personal.\n\nBut another point he hammered home to his readers was the wastefulness: "For a natural resource which could revolutionize the energy harnessing process for millions of Brazilians, and, lest we forget, Paraguayans still recovering from war, the UDN government has made cannon-fodder of its own men. Worse still, Lacerda has gotten nothing done. Blood stains the forest where engineers should have been." And as much as every muscle of Távora's body pained at admitting it, he was right.\n\nTo be fair, the Vice President had not been the biggest supporter of the operation himself. He had been begging his fellow magistrates in the Supreme Meeting Room to curtail at least the excesses of what was to come. Now, though, he could only think about the disaster in the past. The attention would be on the articles now scrawled out in newspapers like Wainer's for all the country to see, the role he had in it, and the shit the party was due to give Lacerda now he had to face the facts."
LATAM_ParaEpilogue_Illiberal.18.a: "Broken clocks... oh, forget it."

LATAM_ParaEpilogue_Illiberal.19.t: "The Sick Man of Brasília"
LATAM_ParaEpilogue_Illiberal.19.desc: "Another day, another travesty was inflicted upon the great Brazilian nation by the Adhemar regime. When Carlos Lacerda received word of the humiliating evacuation which the EB was forced to make near the Guaíra Falls, it was not entirely unexpected for him to become rather amused by the chaos which he presumed to have been occurring within the Planalto — and so, to play his part, he headed forth in his bed gowns for the typewriter, as he mulled away at the reports he'd received merely hours ago.\n\n"The humiliation, the lack of tact and conduct which President Adhemar de Barros had permitted to infest our nation's most integral instrument of security, has once again proven him a frail man — a stubborn devil, inept in both the ways of diplomacy and warfare. Or perhaps, in the view of some, a traitor."\n\nThe sound of flipping papers continued to fill the space of Lacerda's mind, as he continued, "It is impossible for a representative of the Brazilian people, especially one holding the prestige of President de Barros, to be so faltered in strength to fall against the Paraguayan fascists — a lot already self-destructive to their own kind ..."\n\nIndeed, not even Lacerda had expected this to occur so suddenly, but works of art are often products of circumstances, and neither can he deny a hanging opportunity to sow some dismay for its sake. "... like gangs paying off football players to intentionally play the role of losers, the President has shown himself not only to be a weak leader mentally, but also a weak leader morally. His corruption, his unbridled willingness to sell off our country to the backwater louts of Paraguay, has proven to us an individual utterly unfit to hold his position of power.""
LATAM_ParaEpilogue_Illiberal.19.a: ""Either the PSP must go, or Brazil in its stead.""

LATAM_ParaEpilogue_Illiberal.20.t: "The Art of the Deal"
LATAM_ParaEpilogue_Illiberal.20.desc: ""Was the fighting truly necessary? We had shown no objection to the Paraguayan decision in reaffirming her national security. You are wasting good men to occupy a hinterland neither nations are entitled to, is collaboration such a travesty that you'd rather bleed money than to talk?" The cordial Leitão da Cunha could scarcely tolerate his bone-headed clients, so often his proposals fell into blind eyes of the Paraguayan delegation that his temper faded into congealed irritation. They'd taken sarcastic jabs and could barely conceal their disdain, yet now, as money talks, they are tamed into a temporary silence.\n\nThe thin one, presumably the head delegate, eventually gave his first serious thought, "This is a bloody affair, but the Planalto has no right to expect compromise without first proposing a real solution to the current problem..." But soon enough, the squealing voice of a rotund compatriot overtook the relatively composed rebuttal. "Our solution is to take over the jurisdiction of the falls wholly, better yet..."\n\nHe was hushed by his good leader swiftly as the sharp-eared foreign minister recuperated and returned to his long-winded rhetorical questioning. "How much are the measly falls worth to your nation? It is only through the vast resources Brazil may offer that I— we can extract value from these wildlands. Business will flow, you will be happy. You shoot, and everything's going to hell."\n\nA moment of murmuring ensued, inaudible in its entirety — and the finally-quelled cohort turned promptly in unison following suit, with nothing but a seemingly finalized consensus in mind. Speaking again was the spindly fellow, given as much thought as he was capable of under El Stronato's impossible discretions. "The army will evacuate the area within one week. The Argentines won't be happy about this, but you get what you pay for.""
LATAM_ParaEpilogue_Illiberal.20.a: ""Pleasure doing business my friends.""
LATAM_ParaEpilogue_Illiberal.20.1: "Construction of the §KItaipu Hydroelectric Dam§! will begin immediately."
LATAM_ParaEpilogue_Illiberal.20.2: "The §KItaipu Hydroelectric Dam§! negotiations will conclude favorably to us."
LATAM_ParaEpilogue_Illiberal.20.3: "Construction of the §KItaipu Hydroelectric Dam§! will receive an increase to yearly progress."
LATAM_ParaEpilogue_Illiberal.20.4: "Construction of the §KItaipu Hydroelectric Dam§! will receive an increase to yearly progress."
LATAM_ParaEpilogue_Illiberal.20.5: "Though official negotiations have ended in failure, we'll ensure that the §KItaipu Hydroelectric Dam's§! construction will begin."

BRA_paraguayan_bush_war_desc: "The pariah state of South America has finally met its ultimate test. Their old enemies from the coalition of rebels known as FULNA have returned from exile with their guns loaded and their knives sharpened as they prepare for their long awaited insurgency to topple the regime in Asunción once and for all. Whoever comes out on top in this conflict will critically decide the fate of the sole bastion of fascism in the Southern Cone."
ARG_paraguayan_bush_war_desc: "Paraguay is experiencing a second Guaíra Falls invasion. Their old enemies have returned from exile with their guns loaded, this time under the banner of FULNA. Their radio announcements declare they are ready for a long insurgency to topple the regime in Asunción once and for all. Whoever comes out on top in this conflict will critically decide the fate of Paraguay in the South American Cold War. We must ensure FULNA is crushed!"

PAR_bush_war_info_box: "§nBrazil§! and §RFULNA§! must acquire §Y50%§! §RFULNA§! §Ycontrol§! in Asunción or §Y50%§! §RFULNA§! §Ycontrol§! in 4 different departments to overthrow the government. §mArgentina§! and the §QParaguayan Government§! must prevent this at all costs until the "§YGovernment mobilises against§! §RFULNA§!" mission is completed.\n\nDecreasing £stability_texticon §YStability§! benefits §RFULNA§!. Below §Y50%§! £stability_texticon §YStability§!, the Paraguayan presidency could be threatened, which might give §Rthe rebels§! a significant advantage in the Bush War.\n\nIf §RFULNA§! takes over Paraguay, their alignment will determine which of its factions takes control. §nBrazil§! must support the §mPartido Liberal§! to expand §nBrazil's§! sphere of influence and prevent the §VNationalists§! from coming to power. Beware a §YDivided§! §RFULNA§!, however, or ambitious leaders might take advantage of the chaos...\n\nThe §mLiberals§! will receive a §Y1%§! boost at the end of every week."
