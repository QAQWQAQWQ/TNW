 POLITICS_PETROS_POGHOSYAN_DESC: "披着人皮的野兽、荒凉的俄罗斯监狱、枪炮、军队、子弹——任何事物都不能让彼得罗斯·波戈相离开他深爱的亚美尼亚。\n\n奥斯曼帝国残酷地逼迫同胞在沙漠中死于酷暑时，他如复仇天使降临，与爱国者反戈一击，用杰马勒帕夏的鲜血浇灌大地，为他的罪行赎罪；苏维埃入侵亚美尼亚时，冷酷的俄国政委将他抓走，关进苦寒之地的沃尔库塔北极古拉格。但苏联的冰冷狱栅也困不住他，沃尔库塔的囚犯们破门而出时，彼得罗斯再次获得自由，回到了亚美尼亚，回到了仍然被锁链束缚者的祖国。\n\n复仇天使毫不犹豫，再次拿起武器，与过去的同僚再次联手，筹划着亚美尼亚国家和民族的光复事业。彼得罗斯明白，即将到来的战争漫长而艰苦，枪口已经抵在了全民族的头颅之上，意识形态、宗教信仰之类的与此比起来，都是小问题。\n\n土耳其压迫者有祸了。四十年光阴都不足以将波戈相抹除，显然，§R没有什么可以压倒他。§!"
 ARM_Fedayeen_Gather: "费达伊，集合吧！"
 ARM_Fedayeen_Gather_desc: "亚美尼亚人民长期受到土耳其人的压迫。我们被他们殴打、束缚、折磨乃至被屠杀，而这一切的源头只是一个早死之人的寥寥宏愿。现在，我们的人民聚集起来了，我们要复仇。\n\n我们勇敢的费达伊集合在一起，为战争做好准备。这会是一场光荣又值得歌颂的斗争。只要人民一日支持我们，我们就一日不会放弃，不会投降，§V直到亚美尼亚人为祖国流尽最后一滴鲜血。§!"
 ARM_united_front: "阿拉斯统一战线"
 ARM_united_front_desc: "亚美尼亚抵抗运动主要分为两派。在农村地区，亚美尼亚革命联盟发起了数次针对土耳其人的暗杀和破坏行动；而在城市，哈伊克之子潜伏在街巷之间发动反对占领的游击战，逼得土耳其人不得不时刻保持高度警戒。尽管双方在意识形态上存在严重分歧，但我们必须摒弃这种偏见，使我们的民族获得解放。亚美尼亚人民将团结一致，携手共进，最终实现我们的共同梦想。我们终将自由。"
 ARM_Operation_Nemesis: "涅墨西斯行动"
 ARM_Operation_Nemesis_desc: "亚美尼亚政府只为了一件事走到一起：将亚美尼亚人民完全从土耳其的压迫下解放出来。在追寻这一目标的过程中，其他一切都显得无关紧要。他们对善政毫无兴趣，他们不关心国内政策或者外交关系等微不足道的问题。因为没有时间让他们分心。面对自由，一切都要为之让道。他们不在乎以后的命运，只要他们还能复仇，家人的血还未流尽，一切手段就都是正当的。"
 ARM_Gevork_Vartanyan: "格沃尔克·瓦尔塔尼扬"
 POLITICS_GEVORK_VARTANYAN_DESC: "自二战结束以来，亚美尼亚特工“安里”的真实身份就一直困扰着土耳其军队。这个代号属于“哈伊克之子”的领导人，但组织里绝大多数的成员对他的了解却并不比一般人详细多少。经过数十年的策划，起义小组在亚美尼亚的群山、森林和城镇之中揭竿而起，“安里”的真名就此公之于众——格沃尔克·瓦尔塔尼扬。\n\n瓦尔塔尼扬年仅16岁时就开始为苏联情报部门效力，数百名轴心国特工都栽在了他的手上。莫斯科沦陷后，他将自己在苏联-亚美尼亚情报部门里的部下和线人重组为了一个秘密叛乱组织：哈伊克之子。达什纳克选择让占领者知晓其存在，而哈伊克之子则一切力求保密。虽然亚美尼亚人民并不知道瓦尔塔尼扬的名字，但他的所作所为家喻户晓。神秘的面纱最终揭开之时，他的运动赢得了浪涛一般的支持。\n\n因此，让亚美尼亚人和突厥人都知晓他的名字吧！最后的斗争已经打响，亚美尼亚的解放触手可及！"
