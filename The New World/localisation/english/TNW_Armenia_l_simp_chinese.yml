 ARM_Migirdic_Sellefyan: "姆克尔季奇·舍列费扬"
 POLITICS_MIGIRDIC_SELLEFYAN_DESC: "“锡罐之王”高踞宝座，但这宝座并非建立在波澜壮阔的古老史诗或民族解放的浪漫传奇之上，而只是土耳其出于其利益，为他捏塑而成。\n\n姆克尔季奇·舍列费扬曾致力于维系土耳其国内最后的亚美尼亚社区，或许在另一种人生中，他未来仍会继续这一事业。然而，随着亚美尼亚归入土耳其的势力版图，舍列费扬便成了领导他祖先家园的最佳人选。\n\n二战结束后，亚美尼亚局势依旧动荡不安，伊诺努需要一个人去管好当地。于是，写着某个名字的纸条塞进了总统手中，双方达成协议：舍列费扬拿到属于自己的游乐场，亚美尼亚则保证不能对土耳其利益构成任何威胁，新总统就此诞生。\n\n舍列费扬领导的亚美尼亚共和党如今统领全国。共和党在名义上是土耳其老大哥的兄弟党，而实际上，党只是舍列费扬个人利益的载体，里面全都是官迷、民粹主义者，还有寥寥数个亲土耳其政客。对他们而言，选举不过只是例行公事，但若亚美尼亚想要自由，就必须要有所付出……"
 POLITICS_ZAKAR_TARVER_DESC: "纵观亚美尼亚共和党的过去，人们完全有理由认为它是一头催生于权力欲望的、无可救药的怪物。但在体制之中，却隐藏着像鲁边-扎卡尔·扎卡良这样渴望变革的人。与舍列费扬一样，他在进入亚美尼亚共和党最高层之前也曾是一名土耳其官僚，但两人之间的相似之处也就仅此而已。\n\n扎卡良曾经眼睁睁地目睹理想破灭而无能为力。亚美尼亚与土耳其的合作被腐败的专制主义所掏空，国家日渐衰落。他唯一的慰藉就是追随自己且热情洋溢的改革派。他们慢慢地寻觅着机会，打击舍列费扬和他那摇摇欲坠的政治裙带。随着时间推移，他和土耳其领导层逐渐熟络，一份提议也被摆上台面。\n\n耶烈万的抗议促成了反舍列费扬统一战线，而安卡拉对舍列费扬的求援不予理睬。扎卡良现在主持着土耳其和亚美尼亚之间的新友谊：这友谊乃是出于真诚，没有愚蠢的激进，也没有腐败的投机。反土情绪不会在一夜之间宣告消失，但或许，和平与自由将最终抚平属于一个民族的伤痛。"
 ARM_Hayk_Defiant: "哈依克之桀骜"
 ARM_Hayk_Defiant_desc: "亚美尼亚共和国获得了自由，但代价是什么呢？在土耳其和德国的轭制之下，她的土地遭受分割，人民失落、绝望，他们唯一的家园如今仅余了个民主共和国的名头。\n\n但是，要记得在所有人都已经绝望的时候，哈依克用他的箭杀死了暴君贝尔；正因如此，亚美尼亚人民必须不惜一切代价，为自己赢得和平与繁荣。"
 ARM_king_of_tin_cans: "锡罐之王"
 ARM_king_of_tin_cans_desc: "姆克尔季奇·舍列费扬堪称腐败化身。他的名字总是伴随着一个接一个的腐败丑闻，让许多人不禁纳闷他是如何成为亚美尼亚总统的。答案其实很简单：他与土耳其政府关系密切。只要舍列费扬能带来一个稳定的亚美尼亚，安卡拉情愿对他睁一只眼闭一只眼，甚至为他提供竞选捐款，协助他进行其他政治行动，破坏选举的公正性。\n\n除非重建合法性，否则亚美尼亚难享安宁。"
 ARM_armenian_development_initiative: "亚美尼亚发展倡议"
 ARM_armenian_development_initiative_desc: "战争摧毁了亚美尼亚的城市，土耳其设立了一个基金来对亚美尼亚进行重建，直至它能自主发展。然而，计划的成果无不被腐败的政客和土耳其公司收入囊中。\n\n除非亚美尼亚人向安卡拉提出自己的诉求，否则繁荣将永远是一纸空谈。"
 ARM_Collaboration_Regime: "合作政权"
 ARM_Collaboration_Regime_desc: "历经数十年苏联和土耳其的先后压迫，安卡拉的改革派终于授予了亚美尼亚自治权。尽管在治理上获得了发言权，但当地人依然反抗着土耳其的统治。"
