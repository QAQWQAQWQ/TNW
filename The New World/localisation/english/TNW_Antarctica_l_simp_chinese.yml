 AAC_Recognized_Antarctic_Claims: "受承认的南极宣称"
 AAC_Recognized_Antarctic_Claims_desc: "在南极荒原之上宣示法理主权时，唯有一条法则至关重要：强权即公理。智利在斯尼佩岛之战中惨败于阿根廷军队，便是在瓜分南极洲中大败亏输的根本原因。子弹划过空气时，多年的依法姿态和美国调解的努力就像是新雪一般，转瞬消失无踪。\n\n如今，智利外交官们的不懈努力结出了硕果。在美洲国家组织的正式承认之下，智利的声音终于有了其分量。尽管蛮力仍主宰着冰封荒原，但外交战场的胜利已然到手。智利南极研究所如今手握强有力主权主张，为合法性而战的绝望挣扎已经化为对其自身权利的自信捍卫。"
