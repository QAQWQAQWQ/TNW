 Antarctica_GUI_AAA_Op90_Incident_Desc_7_Active:0 "    科学研究是南纬90行动的主要目标之一。科学小组负责人希罗上尉报告说，现在队伍抵达了一个测量温度、探取冰晶样本的绝佳地点。我们可以选择在此扎营，消耗一些物资进行广泛研究，或者只进行测量和取样，当也可以只进行温度测量。当然也可以放弃这次机会，继续行进。"
