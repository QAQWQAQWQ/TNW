 Antarctica_GUI_AAA_Op90_Incident_Desc_3_Active:0 "    何等壮观之奇景！我们遇到了企鹅的繁殖地，足足有十万对儿企鹅在这里筑巢繁育下一代！能在这么远离海岸的内陆看到这样的景象真是难得的享受，同时企鹅的嘶嘶鸣叫和难闻的气味也教人毛骨悚然。自然，又是两难的选择摆在我们面前。我们可以停下来做做研究，也可以冒着打扰它们的风险穿过企鹅群；当然也可以多消耗些额外的时间，绕过这一大群企鹅；或者说……企鹅应该，吃起来，味道也还行……吧？"
