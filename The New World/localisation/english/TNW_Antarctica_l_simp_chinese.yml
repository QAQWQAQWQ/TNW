 Antarctica_GUI_AAG_Entry_Button_tt_Blank:0 "§G测试完成§!"
 Antarctica_GUI_AAG_Entry_Button_tt_Text:0 "§F这场测试需要消耗§Y50天§!来完成规划、执行和文书总结。\n\n需要消耗§W8补给§!£Antarctica_texticon_SUP 。§!"
 Antarctica_GUI_AAG_tt:0 "这个界面可以看到所有可供测试的飞行器，每个飞行器都有四个测试项目。为了开始测试，我们需要一个空闲、没有在§Y网格地图§!的§W地块§!中承担工作的§Y特遣队§!来安排测试（目前§W地块§!§Y[?Antarctic_Special_Missions_1_AAG_Tile_Display]§!。）测试用的§W地块§!可以在§Y网格地图§!中通过相应的特殊任务来完成变换。\n\n§G成功§!完成项目可以让我们得到某种形式的奖励，而§R失败§!可能导致§W补给§!被克扣或其他惩罚。"
