 COUNTRY_INFO_AAG:0 "§G==新施瓦本==§!\n\n§r新施瓦本§!的故事在§r德国§!领土范围以外的人看来始于§Y1938年12月§!。由§g阿尔弗雷德·里彻§!担任队长的§D第三次德国南极探险队§!乘坐着§g施瓦本号§!拔锚起航，驶向§W南极§!。他们的任务是找到一个适合建立捕鲸站以及海军基地的地方。船员们到达了已被§V挪威§!宣称拥有主权的§V毛德王后地§!，绘制了范围达数千平方公里之广的§W南极§!冰面地图，并在执行探险任务时对该地区提出了自己的领土要求。1939年2月，随着§g施瓦本号§!返回§r德国§!，这次小规模的、相对秘密的探险活动逐渐从人们的记忆中消失，因为§e第二次世界大战§!的硝烟已经燃起，在它结束后人们仍然饱受其后果之苦。在接下来的十年里，§W南极§!一直远离困扰着人类文明的灾厄与混乱。\n\n这一切的起因是§M阿根廷§!和§R智利§!之间爆发的，关于§B威德尔海§!上几个原属§x英国§!的岛屿的归属权的小争端，很快它就演变成了§i瓜分南极洲§!，三个世界大国都将目光投向了§W南极§!，希望能在这块蛋糕上分得属于自己的那一份。曾经几乎被遗忘的§D第三次德国南极探险队§!现在却起到了为§r德国§!对§W南极§!的领土宣称赋予合法性的作用，同时，由于如今的§V挪威§!§r专员辖区§!政府放弃了其宣称领土，德国也将之收入囊中。§V毛德王后地§!被更名为§r新施瓦本§!，§V奥拉夫王子海岸§!被更名为§r阿道夫·希特勒海岸§!，§V马塔公主海岸§!则被更名为§r爱娃·希特勒海岸§!。此外，一个§o民政管理机构§!也被建立，以对该地区进行可能的殖民。\n\n新生的§W南极基地§!受到了供应短缺的困扰，这种情况随着§e西俄战争§!的爆发而雪上加霜，这场战争也让§r德国§!彻底放弃了在§W南极§!大陆上进行殖民的企图。战争结束后，该地区被改组为§r军政机构§!，由§g德国空军上校鲁道夫·迈尔§!，§D第三次德国南极探险队§!的飞行员之一领导。现在，§r新施瓦本§!成了§g德国空军的试验场§!，用于测试§g实验型飞行器§!，乃至§K核武§!。\n\n§G==特色==§!\n\n*开发和测试§g最新型号的飞行器§!，以推进§r德国§!的伟大事业\n\n*进行由§s舒曼教授§!秘密领导的§K核试验§!\n\n*直面§o物资短缺§!和§e本土动荡§!的窘境，维持§r新施瓦本§!的运转"
 COUNTRY_INFO_AAO:0 "§G==自由国家组织南极洲事务局==§!\n\n在§i瓜分南极洲§!之前，§e美国§!在§W南极洲§!的最后一次行动发生在§Y1940年§!，史称§D美利坚合众国南极洲军事探险§!的第三次探险，当时由§g理查德·伊夫林·伯德海军少将§!率领。§g伯德§!推动了§e美国§!在南方大陆上的大部分行动，他对§W南极洲§!的热情甚至吸引了§g阿尔弗雷德·里彻§!邀请他加入§D第三次德国南极探险§!，但最后因为局势紧张而作罢。随着§e美国§!在§V第二次世界大战§!中战败，其未来在§W南极洲§!的行动计划也无限期地推迟了，§e合众国§!需要时间舔舐它的伤口。所谓的§D“跳高行动”§!也在规划的早期阶段被取消。\n\n及后，由于§M阿根廷§!和§R智利§!在§Y50年代§!早期发生争端，§e美国§!对§W南极洲§!的兴趣也重新燃起，加入了§i瓜分南极洲§!当中。随着§r德国人§!重提他们对南大陆的旧宣称，§e美国§!也作出了自己的回应。§Q自由国家组织§!的成员国们将各自的领地整合为§Q自由国家组织南极洲事务局§!，并立即在§g伯德海军上将§!的指挥下向该地区部署§o军事单位§!。此次行动代号为§Q“深冻行动”§!，是历史上规模最大的§W南极洲§!考察行动，庞大的§B海军部队§!、§B飞行特遣队§!及总数超过§B8000人§!的人员参与其中。由于§V日本§!强夺了§W玛丽·伯德地§!，§r德国人§!回到了§r新施瓦本§!，故而§e美国人§!选择在§W麦克默多湾§!建立了一个永久基地。§W冷战§!已经来到了§W南极洲§!，而且很明显会在此延续下去。\n\n§g伯德海军上将§!在§Y1957年§!去世，§g小乔治·安德森海军上将§!被任命为§Q南极洲开发指挥部§!和§Q自由国家组织南极洲事务局§!的新负责人。§Y1961年§!§g威廉·雷伯恩海军中将§!接替了他的职务。但是最近，南极领地内部发生了一系列问题。最早对该地提出宣称的人§n澳大利亚§!和§M新西兰§!要求在§Q自由国家组织南极洲事务局§!的管理中扮演更重要的角色。"
