 Antarctica_Situation_Overview_GUI_Bar_1_tt:0 "§F£Antarctica_legitimacy §G宣称点数§!是衡量某国对南极地区领土主张的政治合法性的抽象量度，如果某领地的£Antarctica_legitimacy §G合法性§!过低，就可能会被外部势力以政治手段赶出南极大陆。\n\n£Antarctica_legitimacy §G宣称点数§!每周改变[?Antarctica_Legitimacy_Tick|=+]点。§!"
 Antarctica_Situation_Overview_GUI_Bar_2_tt:0 "§F£Antarctica_militarization §R军事点数§!是衡量南极领地军事化的抽象量度，如果领地的£Antarctica_militarization §R军事化水平§!过低，就可能会被其他国家的军队轻易接管。\n\n£Antarctica_militarization §R军事点数§!每周改变[?Antarctica_Militarization_Tick|=+]点。§!"
 Antarctica_Situation_Overview_GUI_Bar_3_tt:0 "§F£Antarctica_supply §W补给§!代表南极领地的物资储备。§Y1§!£Antarctica_supply §W补给§!可供§Y5000名§!人员使用一天，即每人每天需要§Y0.0002§!£Antarctica_supply §W补给§!。如果领地£Antarctica_supply §W补给物资§!过少，饥饿与严寒就可能会使领地彻底崩溃。提前做好规划准备，领地内的人员规模会随着季节发生变动。你可以通过可用人员数据加以查看。§![get_Antarctica_Situation_Overview_GUI_Bar_3_tt_Supply]"
