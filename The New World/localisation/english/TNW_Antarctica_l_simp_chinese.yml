 AAF_The_French_Southern_and_Antarctic_Lands: "法属南部和南极领地"
 AAF_The_French_Southern_and_Antarctic_Lands_desc: "法国最遥远的边疆并不完整。由美国主导的OFN南极洲军事化行动，也就是深冻行动，强行占领了由法国声索主权的阿黛利地，并将其纳入了OFN南极洲事务局的管辖。这片领土的丢失使得法国只能沦为这次行动的背景板。\n\n南部和南极领地目前控制着马达加斯加和南极洲附近的几处岛礁，包括凯尔盖朗群岛、克罗泽群岛、印度洋的数座分散岛屿，以及圣保罗和阿姆斯特丹群岛。格扎维埃·里歇尔正期盼着有一天，他的旗帜能够飘扬在第五片、也是最后一片领土的上空：阿黛利地。"
 AAJ_Nobu_Shirase_Land: "白濑矗地"
 AAJ_Nobu_Shirase_Land_desc: "白濑矗地，即昔日的玛丽·伯德地，是地球上最后一片未被染指的净土。但对日本南极地域观测队而言，其背后的原因直到旭日旗在南极升起后多年才最终明晰：这里是一片真正的不毛之地。硕大的冰盖令船只难以动弹，猛烈的重力风将空中交通全数阻断，而内陆基地的匮乏则为地面行动增添了众多风险。即便困难重重，日本人仍占据着这片荒漠，并以前辈白濑矗不屈不挠的精神勉励自身。尽管日本早在1910至1912年间就对南极展开探险并取得成果，但其他国家却仍在我们涉足南极的合法性上含糊其辞。不论外界如何看待，我们都会坚守此处。"
 AAJ_Nissui: "日水"
 AAJ_Nissui_desc: "§F提供§!§Y中等的§!§W补给§!£Antarctica_texticon_SUP §F能力§!\n§F--------------§!\n成立于1911年的日本水产株式会社（日水）是共荣圈最大的海产品供应商。借着加入日产康采恩和满业支持的东风，日水在战前迅速壮大，相继收购了一众竞争对手。如今的共荣圈里，日水的招牌早已家喻户晓，在本岛和满洲更是如此，它经销的冻鱼和鲸鱼肉喂饱了无数饥肠辘辘的人。日水船队是南极海域的主宰，会社职员则是隐藏在帝国海军领导层幕后的真正操盘手。无论如何，日水的命运已同南极深度绑定，而它的信条始终如一：“食粮报国”。"
 AAJ_Hogei_no_Chi: "捕鲸之地"
 AAJ_Hogei_no_Chi_desc: "[GetAntarcticaWhalingBenificiary]在商界，日本领南极地域有个更响亮的名号——“捕鲸之地”。长期以来，捕鲸一直是日本的传统海上活动，进入二十世纪，日本政府更是追求将其工业化。自三十年代起，日本捕鲸船开始在南极海域作业，为各大渔业公司贡献了丰厚的利润。二战期间，南极捕鲸活动一度停止，而战争甫一结束，大批捕鲸船便再次涌向南半球。随着瓜分南极愈演愈烈，帝国也决定夺取一片冻土以保护其经济利益。然而，虽然捕鲸活动逐年兴盛，但年捕获量却在不断滑落，分析师们对此的结论清晰明了：一场衰退已经迫在眉睫。"
 AAJ_Shirase_Nobu_Tokubetsu_Konkyochitai: "白濑矗特别根据地队"
 AAJ_Shirase_Nobu_Tokubetsu_Konkyochitai_desc: "日本帝国海军不情愿地监管着南极洲的行动。虽然理论上说，他们能全权负责这里的管辖工作，但在许多日常事务上，他们都必须要服从于日水和其他捕鲸公司的需要。表面上看，海军在此的职责是防止捕鲸船队受到干扰、保证日属南极的边界不受侵犯。为此，海军组建了白濑矗特别根据地队，以保护遥远边境线上的各个捕鲸前哨站。目前，海军既不希望改变，也不认为现状会有什么变化。当下，人们对日属南极如何融入帝国的战略计划尚且还没有什么概念。"
