 AAC_Unrecognized_Antarctic_Claims: "未受承认的南极宣称"
 AAC_Unrecognized_Antarctic_Claims_desc: "在南极荒原之上宣示法理主权时，唯有一条法则至关重要：强权即公理。智利在斯尼佩岛之战中惨败于阿根廷军队，便是在瓜分南极洲中大败亏输的根本原因。子弹划过空气时，多年的依法姿态和美国调解的努力就像是新雪一般，转瞬消失无踪。\n\n智利南极研究所无法以武力支撑其领土主张，只能在国际舞台上艰难寻求其合法地位。但尽管其宣称领土实际上处于阿根廷控制之下，智利外交官们仍在不懈努力，日夜不停地尝试游说世界各国承认智利的主权。"
 AAC_Jealous_Defence:0 "保卫我们仅有的一切"
 AAC_Jealous_Defence_desc:0 "我们的形势很严峻。其他国家的南极领地十分庞大，足以在冲突中承受一些领土丢失的后果。但智利没有这样的余裕。我们的宣称从一开始就没有得到承认，而任何领土丧失都意味着相应宣称的丢失。倘若失去这片领土，智利的国旗就再也不会有机会在南极上空飘扬了。侦察兵已经记好了易于防守的地段，驻军也经受了严寒下作战的训练。如果我们的敌人发动进攻，他们很快就会明白我们的宣称可不仅仅是由文件支持的。"
 AAB_Burgundian_Think_Tank:0 "勃艮第智囊团"
 AAB_Burgundian_Think_Tank_desc:0 "勃艮第祖先遗产学会致力于通过考古、历史研究和人类学研究的方式在科学上证明雅利安种族的优越性。祖先遗产学会南极分部在位于基斯冰架的贝格尔海姆开展行动，遵照党卫队全国领袖的命令，在这片大陆上寻找支持雅利安种族理论的证据，并且试图证明“世界冰”理论。"
 AAB_Vital_Research:0 "至关重要的研究"
 AAB_Vital_Research_tt:0 "相比§r新施瓦本当局§!，能够获得更可靠稳定的每月§W补给§!任务。"
 AAB_Vital_Research_desc:0 "我们的研究对雅利安种族的未来和党卫队勃艮第骑士团国的存续至关重要，因此，党卫队全国领袖希姆莱保证我们每月都能通过潜艇直接从骑士团国收到补给，此外还有迈尔当局提供的稀少物资。然而，全国领袖的额外投入也意味着我们正面临获得成果的巨大压力，不能把时间和设备浪费在没有结果的工作上。"
