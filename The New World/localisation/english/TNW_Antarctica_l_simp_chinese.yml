 Antarctica_GUI_Foreign_Zone_USA_tt:0 "OFN南极洲事务局控制着44°E到150°W的地区，其中有澳大利亚、新西兰和前法属宣称地。英国于1923年将罗斯属地转交给了新西兰，而澳大利亚的属地是在1933年转交的。因亲德的法国政府在瓜分南极时对宣称地鞭长莫及，因此，美国裁定其宣称地并入OFN南极洲事务局，而最初宣称此地的自由法国政府鉴于当时的处境也没有反对这一行为。所有宣称地加起来，我们东邻日本领南极地域，西接新施瓦本，面积足有南极大陆的一半。"
 Antarctica_GUI_Foreign_Zone_GER_tt:0 "新施瓦本控制着20°W到44°E的区域以及彼得一世岛。德国的第三次南极远征中，探险队在挪威属地内提出了一个定义模糊的领土宣称，这也成为了德国对南极宣称的基础。南极争夺战中，已有的宣称权加上挪威专员辖区让渡的宣称权，让德国拥有了对毛德王后地的合法统治，即现在的新施瓦本。"
 Antarctica_GUI_Foreign_Zone_JAP_tt:0 "日本领南极地域控制着150°W到90°W，也就是以前被称为玛丽·伯德地的区域。这里之前不属于任何国家，是世界上最大的无主之地。在瓜分南极的狂潮中，日本通过军事行动夺取了该地，并将其更名为白濑矗地，以加强他们对该地区的主张，但OFN和德国并不承认日本对这一无主地的宣称。"
