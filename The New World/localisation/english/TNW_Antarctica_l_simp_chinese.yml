 AAG_Aircraft_Testing_Site: "深冻靶场"
 AAG_Aircraft_Testing_Site_desc: "在对南极的无尽荒原进行殖民的计划落空后，新施瓦本政府已将重点转移到测试军事设备在极端寒冷气候条件下的表现上。南极的平坦地形非常适合进行武器测试，且OFN和共荣圈的间谍也难以渗透至此。此外，新施瓦本发言人公开宣称，对他们在南极进行核试验的传闻纯属谣言。"
 AAG_Precarious_Supply_Situation: "不稳定的物资供给"
 AAG_Precarious_Supply_Situation_desc: "§F领地§!§W补给§!£Antarctica_texticon_SUP §R不稳定§!\n§F--------------§!\n在过去，新施瓦本当局能够获得本应被输送到其他更宜居的地区的物资供给。但好景不长，西俄战争的爆发使得物资短缺成了一个大问题，即使是现在，德国本土的官僚们有时也会选择将资源用于轰炸俄罗斯和西非，而不是将其提供给南极领地。无论如何，新施瓦本将竭尽全力渡过难关，但事情随时都有可能变得更糟……"
