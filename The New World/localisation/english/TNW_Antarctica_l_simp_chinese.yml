 AAO_William_Francis_Raborn:0 "威廉·弗朗西斯·雷伯恩"
 POLITICS_WILLIAM_RABORN_DESC:0 "雷伯恩中将是一名职业军官，他将自己的人生时光花在了军事指挥层级系统内部的攀爬晋升上。起初，他只是一名炮手，后来当上了海军飞行员，然后是教官，最终，他成为了汉考克号航空母舰的副舰长，在这一岗位上尽职尽责，表现出色。在此期间，他所取得的最引人注目的成就莫过于在舰船受到神风特攻袭击后不到四小时内就修复了她的飞行跑道，使舰载机得以安全返回。与大多数美国太平洋舰队的舰只不同，汉考克号没有在硫磺岛被击沉，而是一直待在了吕宋岛附近，这使得她逃脱了其姊妹舰遭受的厄运。\n\n珍珠港核爆几乎令他失明之后，雷伯恩在太平洋舰队的空中指挥部辗转于数个重要的管理职位之间，最终担任了贝罗科号航母的指挥官，在她的甲板上，他又一次亲眼目睹了核爆的景象。只不过这一次是“喝彩城堡”在南大西洋锡格尼岛的核弹试爆。此后又经历过几次调拨后，雷伯恩被任命为海军部特别项目负责人，监督UGM-27“北极星”潜射导弹的研发设计工作。虽然他对工程学和科学一无所知，但他的管理才能和对计划评审技术（PERT）的有效应用使这一项目比预期提前完成了足足四年。这一功绩使他晋升为海军中将，1961年又被任命为南极洲开发司令部司令兼南极洲事务局局长。\n\n南极是一片冰冷而残酷之地，雷伯恩在这里就像个外人。驻守南极的一年时光里，他发现自己根本无暇也无权插手本该由他负责的项目。每天他都会被日本宪兵队的间谍、德国人的渗透惊醒，更要命的还有OFN盟友与美国政客自己的抱怨，似乎谁都不想让他的工作能好做些。"
 AAO_James_R_Reedy:0 "詹姆斯·R·里迪"
 AAO_Herman_Phleger:0 "赫尔曼·弗莱格"
 AAO_Howard_Beale:0 "霍华德·比尔"
 AAO_Howard_Beale_eco_desc:0 "§Y经济部长\n基督教自由主义§!\n------------\n§L迄今为止，霍华德·比尔是OFN南极洲事务局中地位最高的非美国人。二战期间，比尔是澳大利亚皇家海军预备队的一名少尉，不久后作为一名自由党党员踏入了政界，并在澳大利亚政府中担任过几个高级职位，例如运输部长，供应部长等。在短暂担任驻美国大使之后，比尔被澳大利亚政府任命为OFN南极洲事务局的成员，以确保澳大利亚对南极事务的话语权。虽然首席财政部长这个职位并不是最重要的，但他对麦克默多站及其核电设施的扩建工作的大力支持为他赢得了来自美国和澳大利亚政治家的赞誉。然而，只有时间才能告诉我们，他的成功是否意味着更多非美国人会来到这片冰封大陆。§!§F\n--------------\n\n\n\n\n\n\n £GFX_AAO_Howard_Beale_large \n\n\n\n\n\n§!"
 AAO_William_Robertson:0 "威廉·“里普”·罗伯逊"
 AAO_William_Robertson_sec_desc:0 "§Y安全部长\n游击运动§!\n------------\n§L据报告，威廉·“里普”·罗伯逊于二战期间服役于美国海军陆战队，历经太平洋战场的战火硝烟，后于1947年加入中央情报局。罗伯逊从属于CIA特别行动部，曾在前苏联活动过一段时期，随后又调至东南亚执行行动。尽管雷伯恩海军中将正在试图打探罗伯逊过往的行动，但中将依旧对其具体内幕知之甚少。当下，罗伯逊身在南极洲，负责领导MACA-SOG，即“驻南极洲军事援助司令部研究观察团”的工作，其运作几乎独立于南极洲事务局。理论上讲，罗伯逊的职权范围仅限于南极洲，但他并不回避向印度洋地区的其他行动提供支持。当然，罗伯逊随时候命，时刻准备着在冰封大陆上一展本领。§!§F\n--------------\n\n\n\n\n\n\n £GFX_AAO_William_Robertson_large \n\n\n\n\n\n§!"
 AAO_William_Robertson_theorist_desc:0 "§L据报告，威廉·“里普”·罗伯逊于二战期间服役于美国海军陆战队，历经太平洋战场的战火硝烟，后于1947年加入中央情报局。罗伯逊从属于CIA特别行动部，曾在前苏联活动过一段时期，随后又调至东南亚执行行动。尽管雷伯恩海军中将正在试图打探罗伯逊过往的行动，但中将依旧对其具体内幕知之甚少。当下，罗伯逊身在南极洲，负责领导MACA-SOG，即“美国驻南极洲军事援助司令部研究观察团”的工作，其运作几乎独立于南极洲事务局。理论上讲，罗伯逊的职权范围仅限于南极洲，但他并不回避向印度洋地区的其他行动提供支持。当然，罗伯逊随时候命，时刻准备着在冰封大陆上一展本领。§!§F\n--------------\n\n\n\n\n\n\n£GFX_AAO_William_Robertson_large \n\n\n\n\n\n§!"
