 Antarctica_GUI_AAA_Op90_Window_Members_Info_Button_tt:0 "§F这是探险队§W成员名单§!。我们可以在这里看见探险队全体成员的§n状态§!、§Y能力§!及§R健康状况§!。\n\n每位成员的§n状态§!都可以在其名字下方的词条中看见，他们的§n状态§!会影响探险过程中他们可以做的事。比方说，§P受伤§!（§R健康状况§!低于80）的成员在大多数任务中都没法参与协助。此外，有些§n状态§!还能为探险和成员§R健康状况§!带来附加的§G正面§!或§e负面§!效果。\n\n把鼠标移到名单的对应词条上，就能看见成员的§Y能力§!。在前往§W极点§!的旅途中，探险队会遇到各种各样的事件。这时，不同的§Y能力§!就能发挥出不同的用处。\n\n如果有成员在探险中§P受伤§!，就会解锁使用§W医疗用品§!治疗§P伤口§!的选项。只有优先考虑成员的§R健康§!，才能让他们的§Y能力§!发挥上用场。§!"
