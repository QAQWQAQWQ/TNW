 Antarctica_GUI_AAA_Decision_Secrecy_AAJ_Big:0 "伪造巡逻坐标"
 Antarctica_GUI_AAA_Decision_Secrecy_AAJ_Big_desc:0 "希罗上尉怀疑埃斯佩兰萨站内部可能存在情报泄密。这是令人震惊的严重指控，但如果上尉的怀疑是真的，那么故意向内奸提供假行动情报也可能会反过来误导日本人。"
