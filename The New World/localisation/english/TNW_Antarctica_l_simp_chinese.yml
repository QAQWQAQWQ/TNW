 Antarctica_GUI_AAA_Decision_Secrecy_AAJ_Small:0 "展开漫无目的的谈判"
 Antarctica_GUI_AAA_Decision_Secrecy_AAJ_Small_desc:0 "众所周知，日本外交官擅于从看似人畜无害的谈话中搜集情报。贝尔特拉米诺建议用同样的办法回敬他们，保证下次的谈判交流非常弯弯绕绕……且老生常谈。"
