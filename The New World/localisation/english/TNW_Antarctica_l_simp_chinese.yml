 Antarctica_GUI_Foreign_Leader_Icon_tt:0 "[get_Antarctica_GUI_Foreign_Leader_Icon_tt]"
 Antarctica_GUI_Foreign_Leader_USA_tt:0 "雷伯恩中将是一名职业军官，他将自己的人生时光花在了军事指挥层级系统内部的攀爬晋升上。起初，他只是一名炮手，后来当上了海军飞行员，然后是教官，最终，他成为了汉考克号航空母舰的副舰长，在这一岗位上尽职尽责，表现出色。在此期间，他所取得的最引人注目的成就莫过于在舰船受到神风特攻袭击后不到四小时内就修复了她的飞行跑道，使舰载机得以安全返回。与大多数美国太平洋舰队的舰只不同，汉考克号没有在硫磺岛被击沉，而是一直待在了吕宋岛附近，这使得她逃脱了其姊妹舰遭受的厄运。\n\n珍珠港核爆几乎令他失明之后，雷伯恩在太平洋舰队的空中指挥部辗转于数个重要的管理职位之间，最终担任了贝罗科号航母的指挥官，在她的甲板上，他又一次亲眼目睹了核爆的景象。只不过这一次是“喝彩城堡”在南大西洋锡格尼岛的核弹试爆。此后又经历过几次调拨后，雷伯恩被任命为海军部特别项目负责人，监督UGM-27“北极星”潜射导弹的研发设计工作。虽然他对工程学和科学一无所知，但他的管理才能和对计划评审技术（PERT）的有效应用使这一项目比预期提前完成了足足四年。这一功绩使他晋升为海军中将，1961年又被任命为南极洲开发司令部司令兼南极洲事务局局长。\n\n南极是一片冰冷而残酷之地，雷伯恩在这里就像个外人。驻守南极的一年时光里，他发现自己根本无暇也无权插手本该由他负责的项目。每天他都会被日本宪兵队的间谍、德国人的渗透惊醒，更要命的还有OFN盟友与美国政客自己的抱怨，似乎谁都不想让他的工作能好做些。"
 Antarctica_GUI_Foreign_Leader_USA2_tt:0 ""
 Antarctica_GUI_Foreign_Leader_USA3_tt:0 ""
 Antarctica_GUI_Foreign_Leader_GER1_tt:0 "关于阿尔弗雷德·里彻的一生，我们有很多故事可讲。在1912年的德国北极探险中，他是负责将探险队员运送到北极的船只的船长。在第一次世界大战期间，他曾在比利时上空执行过多次空中侦察任务。战后，他从空军中退役，转而进入汉莎航空公司，担任空中领航员。1934年，里彻在德国的军事部门中平步青云，成为一名海军军官。为了保住自己的饭碗，里彻与他的犹太妻子离了婚。\n\n1938年，德国对南极展开了第三次探险。当时，这还是一件鲜为人知的事，里彻和他的团队不过是想为德国在南极找个适合建捕鲸站的地方。本来他们计划进行后续考察，但第二次世界大战的爆发让对南极的进一步探索被无限期搁置。即使在德国赢得战争胜利后，人们对进一步在南极进行科学考察活动仍兴致寥寥。因此，里彻成立了促进极地研究学会，以继续他的工作。然而，20世纪50年代初，各国对南极的瓜分使他意外地被推到了聚光灯下。1938年的考察现在成了德国对南极领土宣称合法性的唯一来源。\n\n在德国政府的号召下，里彻被授权指挥一支德国海军特遣部队和一系列随行人员，在深南大陆上建立一个属于德国的基地。后来，这个基地发展成了席尔马赫站。与此同时，美国海军少将理查德·伯德被美国政府派去执行类似的任务，在冷战席卷南极洲之际，里彻与他的前同僚陷入了冲突之中。促进基地研究学会被更名为德国极地研究学会，负责处理南极领地的各种事务。现在，83岁高龄的阿尔弗雷德·里彻继续领导着德国极地研究学会，为新施瓦本的存续提供力所能及的帮助。"
 Antarctica_GUI_Foreign_Leader_GER2_tt:0 "与他已故的前任一样，卡尔-海因茨·勒布克也是参与过第三次德国南极探险的老兵。然而，他陪同探险队前往南极的理由却很奇怪。作为一名坚定的纳粹党保守派，勒布克负责确保探险队成员的“政治可靠性”。在科考期间，勒布克基本上被忽视了。回国后，他也没有取得什么成就，随着第二次世界大战的爆发，他渐渐淡出了纳粹党的政治泥潭。在各国瓜分南极之后，他才设法恢复了一些名声，并加入了德国极地研究学会，将他微薄的关于南极的知识运用于实践。在阿尔弗雷德·里彻于近期去世后，勒布克被提拔为德国极地研究学会的负责人，这几乎完全是由于他在第三次南极探险中的表现。虽然他因自己得到晋升而兴高采烈，但德国国内局势已愈发不稳定，他注定坐不了这个位子多长时间了。"
 Antarctica_GUI_Foreign_Leader_JAP_tt:0 "藤田岩从未踏足过南极洲。绝大多数身在南极冰海的日本人都与这位日本捕鲸协会理事长兼大日本水产会会长素未谋面，但藤田却在东京办公楼的一角监督主宰着他们的命运。他的签名拥有独立于日本水产株式会社和海军的效力，是日本南极冒险所有物流、运输和许可证的幕后推手。这样的独立源于藤田数十年的企业谈判经验，他在共荣圈政商两界都拥有庞大的关系网。在他的办公室里，藤田看到了日水不可持续、不断膨胀的贪婪。他平静而沮丧地回忆起战争，彼时，互相竞争敌对的海产船队曾合为一体，即使那时光十分短暂，但也只为了唯一的目标而服务：帝国。"
