 Antarctica_GUI_AAA_Op90_Incident_Desc_8_Active:0 "    一名队员失踪了！在上次停下来休整到现在的某个时间，一名队员不见了。探险队中的每一个人都起着至关重要的作用。搜索可以乘雪地车、乘狗拉雪橇或徒步进行。然而，这可能需要很长时间，影响未来的行动，而且也不能保证一定能找到失踪的队员。"
