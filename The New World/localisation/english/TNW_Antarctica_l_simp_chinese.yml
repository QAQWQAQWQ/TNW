 GFX_USFI_Air_Support_GUI_Title_Info_Text:0 "推荐以三倍速游玩，如果你想让任务变得更简单或困难，也可以根据需求改变。记得打开音量。"
 USFI_Air_Support_GUI_Level_Up_Notif_Text:0 "§G升级！§!"
 USFI_Air_Support_GUI_Level_Up_Notif_SAM_Text:0 "§R侦测到导弹锁定！§!"
 USFI_Air_Support_GUI_Info:0 "§Y在这项任务中，你将指挥一架AC-130“鬼怪”空中炮艇，抵达敌对区域支援友军单位。§!\n\n§G步兵单位价值100分，坦克单位价值500分，直升机单位价值1000分，地对空导弹价值750分。得到足够的分数后，你就能升到新的等级，敌军单位会被重置，数量也会变多。§!\n\n§B各种武器弹药的计数表就在左上角，旁边的按钮供你切换装备，还有提示让你重新装填。所有口径的武器对步兵和导弹都有效，25mm火炮对直升机十分有效，40mm火炮对坦克和直升机有效，105mm火炮对坦克十分有效。但注意，有些单位需要不同的击中次数，取决于你选用的武器种类。§!\n\n§R记得用右边和底部的滚动条来移动操作空间的视角，边界是绿颜色的。此外，你能用左上角的关闭按钮在任何时候暂停游戏，也可以按键盘上的Esc。如果你想结束游戏，那就按空格。§!"
