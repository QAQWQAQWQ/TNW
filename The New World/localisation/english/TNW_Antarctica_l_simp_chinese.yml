 Antarctica_GUI_AAA_Research_Window_Info_tech_info_tt:0 "[get_Antarctica_GUI_AAA_Research_Window_Info_tech_info_tt]"
 Antarctica_GUI_AAA_Research_Window_Info_tech_info_tt_1:0 "塔克雪地车的制造地位于美国俄勒冈州梅德福，长期以来都是阿根廷南极属地的首选雪地车辆，驾驶感觉相当舒适。在这场可能会出很多意外的探险中，选择已知数并不是个坏主意。"
 Antarctica_GUI_AAA_Research_Window_Info_tech_info_tt_2:0 "锡奥科尔4T-10型履带车体型庞大，制造地位于美国犹他州奥格登。由于其内部的大容量，我们的物流灵活性将大大提升。毕竟身上能带的东西有限，要是有了这辆车，我们就能多载上很多东西。"
 Antarctica_GUI_AAA_Research_Window_Info_tech_info_tt_3:0 "阿克提夫·菲舍尔雪地履带车产自与团结协定结盟的瑞典。这种雪地车更小、更具机动性，并且装备了变速器，用标准汽车方向盘取代了雪地车上典型的杠杆系统。在这种车辆上培训操作人员非常容易。"
 Antarctica_GUI_AAA_Research_Window_Info_tech_info_tt_4:0 "雪橇犬小队将会引导南纬90行动。通过采用最新的轻质材料，并加固雪橇滑板的薄弱环节，我们可以减少长期所需的维护工作压力，从而让队伍专心于开路工作上。"
 Antarctica_GUI_AAA_Research_Window_Info_tech_info_tt_5:0 "从贝尔格拉诺基地到南极点的征途上，雪地车的履带将一路担负起行进的重任。我们可能会遇到意料之外的弯路，履带会因此而受到更大的压力。改进雪地车履带的牵引力和耐用性将大大有助于提高行动成功的几率。"
 Antarctica_GUI_AAA_Research_Window_Info_tech_info_tt_6:0 "南纬90行动的命脉是汽油燃料，多多益善。然而，如果没有适当的密封保温容器，燃料就会冻成固体，变成无法使用的死物。通过向油箱中添加除冰剂并使用隔热保温材料，我们能可靠地储存更多的燃料。"
 Antarctica_GUI_AAA_Research_Window_Info_tech_info_tt_7:0 "在南极内陆，人能背负携带的物资是有限的。我们将优化储存方法，将更多物资塞进雪地车和雪橇的每个角落。这能给予南纬90行动更大的容错空间。"
 Antarctica_GUI_AAA_Research_Window_Info_tech_info_tt_8:0 "探险中，每一滴燃料都至关重要。雪地车都是油老虎，但通过微调引擎，我们可以用更少的燃料行进更长的距离。如果我们不得不进行任何计划之外的绕行，这或许会十分重要。"
 Antarctica_GUI_AAA_Research_Window_Info_tech_info_tt_9:0 "南极大陆对人和机器都同样严酷。低温和冰雪会对雪地车的内部机械结构造成严重破坏，燃油管道会冻结，活塞会粘连而无法往复运动。如果我们想成功到达极点然后再活着回来，提高引擎可靠性就是必需的。"
 Antarctica_GUI_AAA_Research_Window_Info_tech_info_tt_10:0 "雪地车的履带车轮转弯有赖于其转向架结构，但转向架也是其脆弱之处，极易上冻而无法转动。我们需要为雪地车配备更耐用的履带轮，并且为南纬90行动准备必要的防冻润滑油。"
 Antarctica_GUI_AAA_Research_Window_Info_tech_info_tt_11:0 "伯德的极地考察使得无线电在南极探索中得到了不可动摇的地位。通过对无线电设备进行现代化改造，我们可以扩大其通讯范围并提升可靠性，允许我们在向南前进时与贝尔格拉诺基地保持更密切、更长期的通讯联络。"
 Antarctica_GUI_AAA_Research_Window_Info_tech_info_tt_12:0 "雪地车的设计的确是为了适应崎岖地形上的行驶，但它们从未在冰天雪地的南极内陆进行过测试，这里支离破碎的陆地和砂石意味着无处不在的危险。改进车辆悬挂系统可以赋予其更灵活的机动能力。"
 Antarctica_GUI_AAA_Research_Window_Info_tech_info_tt_13:0 "这片大陆并不和平，许多强权都对南极海岸宣称了主权，也乐见得南纬90行动以失败告终。他们有可能会采取干预行动，阻止阿根廷的胜利，因此我们必须准备好步枪和弹药，防御任何潜在的攻击。"
 Antarctica_GUI_AAA_Research_Window_Info_tech_info_tt_14:0 "南纬90行动遵循的日程表非常精确，其中心关键在于行进速度，探险队必须在任何人弄清楚我们的意图之前就抵达南极点，然后再返回基地。塞皮准尉的机械师团队希望进行一系列测试以改进雪地车，从其性能中榨取出更多的速度。"
 Antarctica_GUI_AAA_Research_Window_Info_tech_info_tt_15:0 "如果南纬90行动泄密，那么南极洲上的某个强权可能就会出动一支规模相当大的部队来拦截我们。因此普哈托准将建议在雪地车上加装机枪，让敌人三思而后行。"
 Antarctica_GUI_AAA_Research_Window_Info_tech_info_tt_16:0 "在对雪地车的最高速度进行测试后，塞皮准尉和机械师团队提出了一系列针对引擎和齿轮的修改，提高车辆的最大速度。尽可能快地抵达南极点无疑是好事。"
 Antarctica_GUI_AAA_Research_Window_Info_tech_info_tt_17:0 "阿根廷的敌人狡诈多端，谁也说不准南极内陆潜藏着什么样的威胁。因此，极端手段也是必要的。探险队会在自己的武器库里带上烈性高爆炸药。谁知道呢？也许真的会在某些时候派上用场呢。"
 Antarctica_GUI_AAA_Research_Window_Info_tech_info_tt_18:0 "塞皮准尉和机械师团队创造了奇迹般的雪地车引擎，但他们相信引擎还能发挥出更极限的性能。如果再多给他们一点时间，那他们就能让雪地车在冰雪上潇洒地贴地飞行。万岁！"
 Antarctica_GUI_AAA_Research_Window_Info_tech_info_tt_19:0 "雪橇犬在南纬90行动中扮演着关键的支持作用。我们刚刚从团结协定的挪威和瑞典运来了更多的哈士奇犬，现在正是让人们和新来南极的动物们互相熟悉、合力工作的时候。我们会进行一系列障碍训练赛。"
 Antarctica_GUI_AAA_Research_Window_Info_tech_info_tt_20:0 "滑雪板是穿越南极大陆时最基本的工具，它能带着我们穿冰过雪，保存体力。如果其他所有装备都出现故障，滑雪板就是我们的最后唯一的希望。因此，我们需要质量最为优秀的斯堪的纳维亚滑雪板。"
 Antarctica_GUI_AAA_Research_Window_Info_tech_info_tt_21:0 "队员们和新来的雪橇犬们相处得很不错，他们之间的合作也越来越得心应手。看来我们可以开始新阶段的训练了：耐力和服从的结合，为征途做好准备。谁是好狗狗啊？"
 Antarctica_GUI_AAA_Research_Window_Info_tech_info_tt_22:0 "前往南极点的往返距离将近三千公里，我们需要尽可能轻快地踏上征途。将雪橇改用最轻质的材料，我们就能大大减轻负担。"
 Antarctica_GUI_AAA_Research_Window_Info_tech_info_tt_23:0 "对哈士奇犬的训练大有成效，它们已经能服从命令，专心工作。现在应该继续训练它们的寻路技能，训练方法则是自埃斯佩兰萨站进入特里尼蒂半岛，进行一系列远距离侦察巡逻行动。"
