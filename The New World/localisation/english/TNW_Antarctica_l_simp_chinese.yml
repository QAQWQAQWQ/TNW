 AAO_Edmund_Hillary:0 "埃德蒙·希拉里"
 AAO_Grayston_Lynch:0 "格雷斯顿·林奇"
 AAO_Grayston_Lynch_high_command_desc:0 "§L格雷斯顿·林奇是罗伯逊在南极大陆上的搭档，相比罗伯逊，他的过去就不那么机密重重。1938至1960年间，林奇服役于美国陆军及其下属特种部队，服役经历从一开始的第5骑兵团，再到后来的第77特种作战群。林奇于1923年生于得克萨斯，在年仅16岁时谎报年龄，加入了陆军。他曾获得三枚紫心勋章、两枚银星勋章，以及一枚加叙英勇勋章的铜星勋章。离开陆军后，林奇被选入中情局特别行动部，当下是美国驻南极洲军事援助司令部研究观察团（MACA-SOG）的一员，与里普和其他中情局成员一起，参加以南极洲为基地的一系列秘密行动，以此牢牢压制自由之敌的气焰。§!§F\n--------------\n\n\n\n\n\n\n£GFX_AAO_Grayston_Lynch_large \n\n\n\n\n\n§!"
 AAO_Theodore_Shackley:0 "西奥多·“泰德”·沙克利"
 AAO_Theodore_Shackley_high_command_desc:0 "§L西奥多·“泰德”·沙克利加入美国陆军时，二战已经行将结束，他没能投身于那场战争之中，但母亲曾教授给他的波兰语知识让他在战后得以进入了陆军反间谍部门。1953年，沙克利接受中情局的招募，在威廉·金·哈维的领导下继续在欧洲执行反间谍行动，利用苏格兰作为其秘密行动的中转站，渗透进欧洲大陆的心脏。随后，他奉命受调至OFN南极洲事务局，成为美国驻南极洲军事援助司令部研究观察团，即MACA-SOG的一员，将其在针对德国的行动中积累的知识活用于针对新施瓦本当局的颠覆活动。尽管南极的风景与欧洲大不相同，但在必要之时，这位“金发幽灵”将会在南极大陆和更遥远的地方，挥洒自己的才华。§!§F\n--------------\n\n\n\n\n\n\n£GFX_AAO_Theodore_Shackley_large \n\n\n\n\n\n§!"
 AAO_David_Atlee_Phillips:0 "莫里斯·毕晓普"
 AAO_David_Atlee_Phillips_high_command_desc:0 "§L第二次世界大战期间，莫里斯·毕晓普曾是一名服役于美国空军的前机炮手。他的机组在奥地利上空被击落，毕晓普本人则在战争结束后才通过战俘交换得以归国。1950年，毕晓普加入中央情报局，在智利开展行动，随后奔波于中南美的不同岗位之间，经手的许多工作都属于高度机密。尽管毕晓普受命调至南极洲，加入了驻南极洲军事援助司令部研究观察团，但他极少在这片大陆上活动，一般都是在假名以及伪造身份的掩护下执行其他与南极并无太大关联的任务。§!§F\n--------------\n\n\n\n\n\n\n£GFX_AAO_David_Atlee_Phillips_large \n\n\n\n\n\n§!"
 AAO_William_Pawley:0 "威廉·波利"
 AAO_William_Pawley_air_chief_desc:0 "§L尽管威廉·波利并非MACA-SOG或是中情局的正式成员，但他是航空工业的一位重要联系人，在世界各地拥有大量资产和人脉。1927年时，波利还是柯蒂斯-莱特公司的一名经理，由此踏上了积聚财富的道路。先是1928年，他在古巴与柯蒂斯-古巴国家航空公司以及泛美航空达成合作；后来则是在1933的中国，他先后为中国航空公司、中央杭州飞机制造厂和垒允飞机制造厂牵线搭桥；再然后的1940年，他又在印度和印度斯坦飞机有限公司接上了头。二战期间，他曾向志愿在中国与日本人战斗的美国志愿飞行队，也就是“飞虎队”，提供飞机。战后，波利历任驻巴西、秘鲁大使。由于他与艾森豪威尔总统以及中情局局长艾伦·杜勒斯之间的私人关系，波利在中情局成立不久之后就开始涉足中情局的活动。多年以来，波利曾多次资助支持中情局行动，现在的他，正在协助MACA-SOG，为其特殊任务购置所需的飞机。§!§F\n--------------\n\n\n\n\n\n\n£GFX_AAO_William_Pawley_large \n\n\n\n\n\n§!"
 AAO_Christopher_Fitzgerald:0 "克里斯托弗·菲茨杰拉德"
 AAO_Christopher_Fitzgerald_navy_chief_desc:0 "§L克里斯托弗·菲茨杰拉德于1942年毕业于美国商船学院，开始了自己的军队生涯。二战期间，他是一名海员；战争结束后，他先是供职于一家海洋工程公司，后来加入了大中央火箭公司，从事固体火箭燃料和固体燃料发动机的开发工作。在该公司被洛克希德收购后，菲茨杰拉德选择离开，不久后因其海军技术知识受招募加入中央情报局。菲茨杰拉德在南极的任务是为MACA-SOG建造并改装符合其独特任务需求的海上舰艇。§!§F\n--------------\n\n\n\n\n\n\n£GFX_AAO_Christopher_Fitzgerald_large \n\n\n\n\n\n§!"
 AAC_Julio_Escudero_Guzman:0 "胡利奥·埃斯库德罗·古斯曼"
 POLITICS_JULIO_ESCUDERO_GUZMAN_DESC:0 "胡利奥·埃斯库德罗·古斯曼是智利南极领地的现任总干事。古斯曼于1903年出生于兰卡瓜，20世纪三四十年代间于智利大学担任教授，过着默默无闻而一帆风顺的日子。然而，当古斯曼提出研究报告，为智利对南极的领土宣称提供法理依据时，他平静的生活宣告结束了。研究报告中提到了《托德西利亚斯条约》，并认为智利有权继承卡斯蒂利亚的法理领土。古斯曼进一步指出，查理五世皇帝授予了西班牙商人佩罗·桑乔·德拉霍斯“麦哲伦海峡以南所有土地”的管理权。这篇论文发表于1941年，随后，智利政府迅速采取了措施，为该主张建立合法性。此外，古斯曼发表的论文还指出了阿根廷对南极领土宣称的合法性，毕竟阿根廷也拥有西班牙法理领土的继承权。对古斯曼来说不幸的是，这种善意的外交姿态在日后会让他大受打击。尽管他希望看到南极半岛以“奥伊金斯地”之名投入智利的怀抱，以便智利能够牢固的控制整个埃尔斯沃思地；他很快发现，自己的祖国在谈判桌上被人压了一头。具有讽刺意味的是，他的研究报告更多地帮助了阿根廷，而非智利。\n\n古斯曼对他的祖国未能夺得自己给予其合法性的领土宣称感到沮丧，他向智利政府请愿，希望自己能在未来有关南极的谈判中扮演更重要的角色。令他惊讶的是，智利政府不仅同意了他的请求，还为他提供了直接管理南极领地的机会。古斯曼接受了这一任命，并认为这是让他的祖国充分利用领土狭小这一优势的最佳方法。目前，古斯曼负责监督智利南极领地内数个小型军事基地的建设活动。为了证明南极领地对智利的重要性，他希望祖国的人民能亲眼目睹这片苦寒之地一点点发展壮大。古斯曼是位冷静的外交家，比起鲁莽地展示武力，他更喜欢用语言智慧战胜敌人。为此，他一直保持着令人愉悦的低外交姿态。当然，如果不幸降临到他的日本和阿根廷邻居脑袋上，他也很乐于利用这一机会为祖国谋福利。"
 AAC_Marcial_Mora_Miranda:0 "马西亚尔·莫拉·米兰达"
 AAC_Enrique_Gajardo_Villarroel:0 "恩里克·加哈尔多·比利亚罗埃尔"
 AAC_Jose_Toribio_Merino:0 "何塞·托里维奥·梅里诺"
 AAC_Jose_Toribio_Merino_sec_desc:0 "§Y安全部长\n军政府§!\n------------\n§L普拉特舰长号劈开冰冷刺骨的波涛，何塞·托里维奥·梅里诺海军上校指挥着座下的旗舰抵达南极大陆。在斯尼佩岛之战中，他紧咬牙关、浴血拼搏，为祖国赢得了上帝赐予的冰原领土，在格林尼治岛战役中将之拯救出阿根廷杂种的荼毒。正是因为他坚不可摧的意志，智利的雄心壮志才未曾沉入冰海之中。然而，这位斯尼佩岛的英雄，如今却不得不在软弱的圣地亚哥官僚和伪装起来的布尔什维克外交官面前俯首听命，沦为小小的军事指挥官。\n\n梅里诺绝不会甘于此等境遇。在战舰的深处，人类的毁灭者成为了怪物的创造者。在上校的黑魔法执行下，曾微不足道的陆战队员们将蜕变成为顶级的掠食者——靠着他们，梅里诺将雪耻复仇，把敌人统统扔进海里喂鱼，最终救赎国家和民族，不计代价。§!§F\n--------------\n\n\n\n\n\n\n£GFX_AAC_Jose_Toribio_Merino_large \n\n\n\n\n\n§!"
 AAG_Rudolf_Mayr:0 "鲁道夫·迈尔"
 POLITICS_RUDOLF_MAYR_DESC:0 "在战前的日子里，鲁道夫·迈尔是德国汉莎航空公司的一名飞行员，负责驾驶飞艇飞越北大西洋。他第一次参与极地探险是在1938年，当时他为劳格·科赫的北格陵兰探险队驾驶飞机。多亏了在此期间他积累下的关于极地飞行的经验，他被选为由阿尔弗雷德·里彻领头的1939南极探险队的飞行员，负责驾驶“信风”号多尼尔“鲸”式水上飞机。也正是那时，他结识了驾驶“北风”号的里夏德-海因里希·席尔马赫，并体验了一把飞越极南大陆的感觉。不幸的是，随着二战爆发，对南极进一步的探险计划被搁置了，迈尔也参了军，加入了第40轰炸机联队，为德国效力。兜兜转转，迈尔又回到了大西洋上空，只不过这一次是来轰炸敌舰，而非运送旅客。\n\n终于，战火渐熄，胜利果实已然被轴心国紧握于手中，迈尔随之被派往西南非，利用他在汉莎航空内部的人脉联系协助申克专员管理专员辖区的日常事务。几年后，南极大陆被世界各大强权瓜分殆尽，德国也分得了自己的一杯羹——新施瓦本。虽然西俄战争和随后的供应短缺使德国殖民其南极领地的计划宣告流产，但新施瓦本的冰原仍傲然挺立。德国需要一位有经验的地区行政长官来管理这一地区，为此，他们专门把参加过1939年南极探险的德国空军中校兼党卫队突击队旗队领袖鲁道夫·迈尔请了过来。于是乎，迈尔离开了非洲，再次来到了这极寒大陆之上。他的任务是让日耳曼尼亚方面满意，同时让自己手底下的人不至于丢了小命。不幸的是，CIA、日本宪兵队、舒曼和他那过于高瞻远瞩的计划乃至南极大陆本身都不打算让他好过。"
 AAG_Richard_Heinrich_Schirmacher:0 "里夏德-海因里希·席尔马赫"
 AAG_Ernst_Herrmann:0 "恩斯特·赫尔曼"
 AAG_Erich_Schumann:0 "埃里希·舒曼"
 AAG_Erich_Schumann_eco_desc:0 "§Y经济部长\n技官纳粹主义§!\n------------\n§L原子弹之父埃里希·舒曼在为德国服务的过程中立下了汗马功劳。他同时兼任陆军军械局研究部门负责人、陆军少将、柏林大学物理系主任、国家高爆炸物研究委员会全权负责代表，以及制造出了世界上第一枚核武器的“铀俱乐部”的正式成员等要职。作为德国最具影响力的物理学家，舒曼在其漫长的职业生涯中为德国现在的科学政策塑出了雏形。现在，舒曼选择在南极大陆上负责核武器的测试工作，不用说，他一定会干净利落地干好他的工作。§!§F\n--------------\n\n\n\n\n\n\n £GFX_AAG_Erich_Schumann_large \n\n\n\n\n\n§!"
 AAG_Anton_Grasser:0 "安东·格拉塞尔"
 AAG_Anton_Grasser_sec_desc:0 "§Y安全部长\n军政府§!\n------------\n§L格拉塞尔将军的职业生涯围绕着“保卫”二字展开。二战结束后，格拉塞尔驻扎在莫斯科专员辖区，并尽力阻止殖民地外的掠夺者侵扰殖民地。然而，西俄战争的爆发让他的努力功亏一篑。自那以后，他被调回中欧，负责德国与匈牙利、罗马尼亚和意大利等国边境的防卫保障。在德国军方决定于南极测试新型武器后，格拉塞尔被派往新施瓦本，以防止外国特工渗透，以及保护舒曼教授的安全。这可能是迄今为止他接下的最艰难的任务，虽然他人手不足，但他们有决心和毅力。§!§F\n--------------\n\n\n\n\n\n\n £GFX_AAG_Anton_Grasser_large \n\n\n\n\n\n§!"
