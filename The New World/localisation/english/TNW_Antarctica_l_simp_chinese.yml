 Antarctica_GUI_Main_Info_button_tt:0 "§Y南极网格系统§!由§D南极国际研究委员会§!在§i瓜分南极洲§!后开发，该委员会由§QOFN§!的成员国、§M阿根廷§!、§R智利§!和一些不幸没有取得§W南极§!领土的国家组成。§Y网格系统§!原本用于§G科学测绘和组织工作§!，但最终却为§g军方§!大规模采用，少数涉足南极大陆的§G科学家§!却对其鲜少问津。随着时间推移，在§M阿根廷§!以及§R智利§!领土上活动的§r德国§!和§e日本§!特工携带§g截获的文件与地图§!回国复命，资料中详细介绍了§Y网格§!的使用方法，其高度的实用性使得其他§W南极§!的占领者也开始采用该系统。直到目前为止，虽然在不同地区使用时会有不同的名称，但这个系统依然是为数不多的§G国际通用地图与组织标准§!之一。\n\n§Y网格系统§!的工作原理详见下文：\n选择一个§W地块§!，在§B窗口§!中列出的可操作行动列表里选择§Y任务§!来执行。§O如果某国在他国地块上完成了一项§Y任务§!，那么该地块的所有者将丢失相当于§Y任务§!发起国所获得奖励的一半。§!如果存在§Y特殊任务§!也会显示。更多关于§Y任务§!的细节可在§B按键提示§!中看到。\n如果一个国家占领了§W地块§!的大部分，那么此处地块就会视为被该国家§R控制§!。§W地块§!的§R控制者§!信息、§W地块§!类型信息及其他重要信息都可在§B地块窗口§!中查阅。§W地块§!有以下三种类型：§B海洋§!、§W海岸§!及§L内陆§!，各类型的地块都有不同种类的§Y任务§!可供执行。\n§Y网格§!有数个缩放等级，可在顶部的§B控制栏§!中调整。每个缩放等级都会显示各§W地块§!中的不同信息。§B控制栏§!还有一个包含相关信息的下拉菜单，可查阅可用§Y特遣队§!信息、资源价值、特殊任务信息，以及针对所选领地的情报掌握度。\n\n恰当地运用§Y南极网格系统§!对于在§W南极§!领土上继续生存和完成任务至关重要。"
