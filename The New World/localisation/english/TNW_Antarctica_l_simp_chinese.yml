 AAO_Howard_Beale_desc:0 "霍华德·比尔多年来的紧张游说和寸量铢称最终结出了喜人硕果，他成为了OFN南极洲事务局的首位非美国领导人。二战期间，比尔是澳大利亚皇家海军预备役的一名少尉，不久后作为一名自由党党员踏入了政界，并在澳大利亚政府中担任过几个高级职位，例如运输部长、供应部长等。在短暂担任驻美国大使之后，比尔受命澳大利亚政府，动身前去OFN南极洲事务局，以保证澳大利亚对南极事务的话语权。\n\n虽然首席财政部长这个职位算不上举足轻重，但他对麦克默多站及其核电设施的扩建工作的大力支持为他赢得了来自美国和澳大利亚政治家的青睐：恰是与这些政治家们的联系推动比尔晋升至新的职位。比尔正在利用他日益增长的影响力，计划为OFN南极洲事务局注入官僚式的精致管理风格，厘清原先近乎混乱的局面。\n\n比尔已经开始着手整顿供应链，增加对核能的依赖，并带引入一批可靠且坚韧的澳大利亚人担任新职位。对效率的承诺以及其亲和力使得比尔能够与美国保持良好的合作关系。若比尔希望实现进一步军事化南极的计划，确保OFN能这片大陆上屹立不倒，这些因素无疑是至关重要的资产。"
 AAO_Edmund_Hillary_desc:0 "举世闻名的新西兰探险家埃德蒙·希拉里，在担任OFN南极洲事务局领导人的新职位后就像以往面对艰巨挑战时一样，依旧充满了他一贯的活力和乐观精神。希拉里的冒险生涯始于二战期间，尽管他当时笃信和平主义，但仍旧勉为其难地服役于新西兰皇家空军，在太平洋战区担任领航员。战后，他的荣耀迎来了新的巅峰，1953年，他率领受英国流亡者资助的喜马拉雅探险队成功登顶珠穆朗玛峰，成为历史上第一支征服这座山峰的探险队。\n\n作为国家英雄和世界明星，希拉里当下的崭新旅程注定与以往的光辉时刻大相径庭，他被指派领导OFN南极洲事务局下的新西兰南极研究计划。希拉里本以为自己能在这片冰冻大陆上掀起一股科学发现和探索未知的浪潮。然而，现实却是他整日不得不在沙文主义严重的美国人主导下工作，后者则企图将南极大陆转变为一座军事基地。幸运的是，美国人的傲慢之举似乎使其盟友也怨声载道，而这让希拉里得以临机制胜，执掌大权。\n\n现在，这位勇敢的登山者迎来了他迄今为止最艰难的挑战，让OFN南极洲事务局最终成为科学研究与人类成就的真正灯塔。受邻居阿根廷人的启发，希拉里正着手筹备一场极地探险，最终实现超越登顶珠峰的辉煌事业。在这一过程中，他无疑将面对来自自尊受挫的美国人的万般阻挠以及法西斯势力的阴谋诡计，但埃德蒙·希拉里过去的峥嵘岁月无不证明，他从不畏惧任何挑战。"
 AAG_Alfred_Ritscher: "阿尔弗雷德·里彻"
 AAG_Alone_in_the_Cold_desc: "祖国沉浸在元首逝世的悲痛中，似乎已将远在天涯的子民遗忘。新施瓦本的生命线被切断了，一时一刻间不容瞬，唯余漫漫长夜环伺。\n\n燃料、食物、甚至是希望都灰飞烟灭。新施瓦本的居民曾自视高人一等，是天命昭昭的优越民族。\n\n正因他们的傲慢，使其被命运诅咒，在诅咒中亦得到启示：就如同其他凡夫俗子一样，他们也会遭受饥馁之苦。"
 NO_SIGNAL: "§B无信号……§!"
 POLITICS_JOSE_TORIBIO_MERINO_DESC: "奥伊金斯号劈开冰冷刺骨的波涛，何塞·托里维奥·梅里诺海军中将指挥着座下的旗舰抵达南极大陆。在斯尼佩岛之战中，他紧咬牙关、浴血拼搏，为祖国赢得了上帝赐予的冰原领土，在格林尼治岛战役中将之拯救出阿根廷杂种的荼毒。此后，他继续坚守此地，粉碎了考廷事件背后的布尔什维克叛乱，将海军陆战队锻造成了无与伦比的防卫领土、乃至收复失地的力量。\n\n揭露堕落的阿根廷走狗古斯曼及其共党爪牙亚克希奇的叛国行径之后，警觉的梅里诺海军中将稳稳坐上了智利南极领地的掌舵大位，此事他必亲力亲为。在梅里诺治下的南极，赤色蛀虫和外国破坏分子消失无踪，他与他坚定的船员们已整装待发，即将再度劈波斩浪，加倍讨回阿根廷偷走的一切，以此纪念在阿德莱德岛和温克岛牺牲的每一位战士。卑劣的阿根廷原始人很快就会知道，被逼入绝境的猛犬会怎样择人而噬，梅里诺的复仇之火正如其权力欲望一般，永无止境。\n\n当然，在流放大陆之上，血光再多也终有止尽，海军中将永不满足的野心终将引领他在辉煌的日子重临祖国大地——毕竟，有些虫豸早就该除掉了。"
 AAC_Luis_Danus_Covian: "路易斯·达努斯·科维安"
 AAC_Luis_Danus_Covian_sec_desc: "§Y安全部长\n军政府§!\n--------------\n§L或许有人会对路易斯·达努斯·科维安其人嗤之以鼻，嘲笑他不过是条谄媚的走狗，但海船下沉的时候，唯有懂得弃船逃生的老鼠才能全身而退。当梅里诺上校直直地一头撞上冰山时，科维安选择纵身跃入深海，由此坐上了昔日上司的位置。这把火热的椅子着实令人坐立难安——人或许能改变效忠对象，却无法抹去他的过——科维安，这位效忠文官政府的忠犬终归出身于军方，他始终都是当年那个狂热投身梅里诺反共圣战、训练精锐海军陆战队、直至最后一刻仍支持其所有阴谋诡计的科维安。若政府希望这一方土地能维持风平浪静，最好牢牢记住这一点。§!§F\n--------------\n\n\n\n\n\n\n £GFX_AAC_minister_Luis_Danus_Covian_large \n\n\n\n\n\n§!"
 AAC_Luis_Danus_Covian_hog_desc: "§Y政府首脑\n军政府§!\n--------------\n§L常言道，一根篱笆三个桩，一个好汉三个帮。或许有人会对路易斯·达努斯·科维安其人嗤之以鼻，嘲笑他不过是条谄媚的走狗，匍匐在可怕的主人靴前，甘做舔舐鲜血的爪牙。科维安本人则沉醉于血腥，对种种指控毫不在意，毕竟若是没有他出力，梅里诺上校绝无可能登上今日的宝座。\n\n正是科维安将陆战队驻军锻造成了梅里诺麾下冷酷无情的私军杀戮机器。在打击布尔什维阴谋的圣战中，海军梅里诺需要一名坚定不移的盟友，于是他找上了出身陆军的科维安；在冲垮可憎的阿根廷佬时，科维安也仍将是他未来的倚仗——两人都心照不宣：在科维安构建的食物链金字塔之中，他自然而然地栖居于顶级捕食者之下，舒适自得。§!§F\n--------------\n\n\n\n\n\n\n £GFX_AAC_minister_Luis_Danus_Covian_large \n\n\n\n\n\n§!"
 AAC_Manuel_Contreras: "曼努埃尔·孔特雷拉斯"
 AAC_Manuel_Contreras_sec_desc: "§Y安全部长\n军政府§!\n--------------\n§L当梅里诺上校依据路易斯·科维安的推荐，点名召唤曼努埃尔·孔特拉雷斯前来南极时，他还对自己的使命不甚清晰。如今，当他亲眼目睹文官政府管理南极领地带来的灾难性局面后，他终于明白了。孔特拉雷斯是科维安的军校同窗，成绩优异，拥有出色的后勤物流规划和组织才华。当下，他面临着人生中最为严峻的考验——他必须要理清这里的一团乱麻，将之重新聚焦于唯一的目标：实现梅里诺报仇雪恨、收复国土的计划。§!§F\n--------------\n\n\n\n\n\n\n £GFX_AAC_minister_Manuel_Contreras_large \n\n\n\n\n\n§!"
 AAC_Miguel_Serrano: "米格尔·塞拉诺"
 AAC_Miguel_Serrano_for_desc: "§Y外交部长\n复生纳粹主义§!\n--------------\n§L放逐大陆的地平线常常能吸引到神秘莫测的人物，但其中也鲜有人的身世思想能如米格尔·塞拉诺这般扑朔迷离。这位富家遗孤早年投身于激进政治活动，一度倾心于马克思主义，却在世界大战时骤然转向，以狂热的目光注视着法西斯主义的发展壮大。后来，塞拉诺加入了智利的外交使团队伍，随团访问印度，此后，他直到今日都痴迷于印度教。自然，也正是他的外交生涯将他带到了南极。\n\n塞拉诺的著述晦涩难懂，鲜少有人愿意一读，更遑论要理解他的思想了。当这位怪人乘船穿梭于南极的幽暗海域、代表梅里诺上校向世界展示其南极愿景之时，流言也如影随形。有人说，他更适合待在古怪荒诞的德国大学，或者被关进精神病院……但是，只要他的才能能在梅里诺这儿派上用场，米格尔·塞拉诺就依然能留下来。§!§F\n--------------\n\n\n\n\n\n\n £GFX_AAC_minister_Miguel_Serrano_large \n\n\n\n\n\n§!"
 AAC_Oscar_Pinochet: "奥斯卡·皮诺切特"
 AAC_Oscar_Pinochet_eco_desc: "§Y经济部长\n民族保守主义§!\n--------------\n§L律师、历史学家、诗人、非凡的探险者：从诸多方面来看，奥斯卡·皮诺切特都神似南极英雄时代的传奇冒险家。然而，属于阿蒙森和斯科特的岁月早已远去，在瓜分南极洲的饕餮大餐之后，属于外交官的战场正式开启，他们将以笔墨为刀剑，为本国主权主张做出辩护。若是这位皮诺切特家族的继承人必须要扮演这样的角色，他必然会尽心竭力。\n\n自从在斯尼佩岛之战前夕的1947年踏足南极大陆以来，智利征服事业的正义性便始终挂在奥斯卡·皮诺切特的心头。梅里诺再也找不到比他更痴迷于这片冰封大陆的人了，尽管皮诺切特或许会对梅里诺的极端手段持有保留态度，但当下，挚爱祖国的南极疆土让他们走到了一起。§!§F\n--------------\n\n\n\n\n\n\n £GFX_AAC_minister_Oscar_Pinochet_large \n\n\n\n\n\n§!"
