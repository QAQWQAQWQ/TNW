 AAO_James_R_Reedy_hog_desc:0 " §Y政府首脑\n军政府§!\n--------------\n§L早在他还只是一名海军中校的时候，詹姆斯·罗伯特·里迪就担任了第110巡逻轰炸中队的队长，在大西洋上与德国战争海军浴血长天，约瑟夫·P·肯尼迪的长子也曾在他的部下听命。世界大战结束后，里迪继续在海军中服役，从执行海上巡逻开始，步步高升，直至拥有了自己指挥的航母战斗群。当下，里迪少将是海军南极支援舰队的司令官，以自己出类拔萃的领导力和政治关系担当着雷伯恩海军中将左膀右臂的角色。中将负责处理日常行动以及与澳大利亚人打嘴炮，里迪少将的职责则是拒止日本和德国舰船闯入属于OFN的海域。虽然这任务不算轻松，但显然比雷伯恩手头一团乱麻的官僚工作更能令一名海军身心愉快。§!§F\n--------------\n\n\n\n\n\n\n £GFX_AAO_James_R_Reedy_large \n\n\n\n\n\n§!"
 AAO_Herman_Phleger_for_desc:0 "§Y外交部长\n自然保守主义§!\n------------\n§L早在一战期间，赫尔曼·弗莱格就当上了美国海军中尉。自那时起，他可谓是走过了一条漫长的道路。他毕业于加州大学和哈佛大学法学院，曾是加州最大的律师事务所之一“布罗贝克、弗莱格与哈里森”的合伙人。弗莱格在二战期间开始涉及政府工作，到艾森豪威尔时期，他已经当上了国务院的法律顾问，出席过许多重要的国际会议。瓜分南极时，弗莱格在智利和阿根廷两国之间的谈判会场上担任美国代表团主席，正是他协调并导向了今天的局面，还将澳大利亚、新西兰和前法国的宣称领土合并为了OFN南极洲事务局。但老实说，他并不想待在这冻死人的地方——不过相比华盛顿，这里的条件还是勉强不错的。§!§F\n------------\n\n\n\n\n\n\n £GFX_AAO_Herman_Phleger_large \n\n\n\n\n\n§!"
 AAC_Marcial_Mora_Miranda_hog_desc:0 "§Y政府首脑\n自由激进主义§!\n------------\n§L马西亚尔·莫拉·米兰达在30年代初开始了他漫长的政治生涯，曾历任各部部长。二战结束后，他担任起了驻美国大使一职。此外，尽管米兰达个人强烈反对独裁主义，但他也同时负责与德国保持外交关系。此外，他还与古斯曼合作，在40年代正式确立了智利对南极领土宣称的合法性。不幸的是，他们所做的一切努力基本都白搭了。现在，在政治生涯即将结束之时，这位年迈的政治家选择再一次与古斯曼和比利亚罗埃尔并肩作战，为智利对南极洲的领土主权作外交斗争。§!§F\n------------\n\n\n\n\n\n\n £GFX_AAC_Marcial_Mora_Miranda_large \n\n\n\n\n\n§!"
 AAC_Enrique_Gajardo_Villarroel_for_desc:0 "§Y外交部长\n市场自由主义§!\n------------\n§L20年代末毕业于巴黎大学后，恩里克·加哈尔多·比利亚罗埃尔转而投身于外交事业，而非像其他南极领地的同僚那样将目光聚焦于南极大陆。在他的外交大使生涯中，从墨西哥到海地，再到乌拉圭，比利亚罗埃尔与数不清的人握过手，建立过数不清的友谊。当智利和阿根廷就南极的谈判正式开始时，比利亚罗埃尔被选为智利代表团的一员，与古斯曼和米兰达一同争取祖国对南极的合法领土主权。谈判显然对他们不利，但比利亚罗埃尔仍继续运用他的人脉与外交技巧，再次与同僚们一同继续奋战。§!§F\n------------\n\n\n\n\n\n\n £GFX_AAC_Enrique_Gajardo_Villarroel_large \n\n\n\n\n\n§!"
 AAC_Carlos_Gonzalez_Jaksic: "卡洛斯·冈萨雷斯·亚克希奇"
 AAC_Carlos_Gonzalez_Jaksic_eco_desc: "§Y经济部长\n改良社会主义§!\n------------\n§L卡洛斯·冈萨雷斯·亚克希奇是如何踏上南极海岸的？有人说，他毕业后在蓬塔阿雷纳斯担任过会计主任，又当过多年教授，所以他毫无疑问是编制预算的得力助手；还有人说，他在社会党地方主要办公室经历颇丰，因此他非常适合古斯曼在南极呼吁的跨政治派别团结愿景。\n\n毫无疑问，亚克希奇在蓬塔阿雷纳斯市议会的职位让他成为了南极领地在当地的好盟友。可他的敌人仍在窃窃私语，说他早已被马克思主义思想渗透，其他人则认为他是为了代表身边的人们才投身政治。所有人都了解他的任务有多么艰巨：在十年内，让智利南极领地有利可图，哪怕只有一点点。但亚克希奇清醒地记得，在此之前，他必须先为领地筹集到足够维持一年的资金……§!§F\n------------\n\n\n\n\n\n\n £GFX_AAC_Carlos_Gonzalez_Jaksic_large \n\n\n\n\n\n§!"
 AAG_Richard_Heinrich_Schirmacher_hog_desc:0 "§Y政府首脑\n军政府§!\n------------\n§L里夏德-海因里希·席尔马赫是鲁道夫·迈尔的老友和同事，他是1939年德国南极探险队的另一名飞行员，负责驾驶“北风”号。在多次飞越南极大陆的行程中，他以自己的名字命名了数个地区，包括一片后来成为新施瓦本心脏地带的绿洲。迈尔的职务在探险队内节节高升，席尔马赫却注定无法取得如此辉煌的成就，探险结束后，他加入了德国空军，逐渐淡出了人们的视野。十多年后，他收到了老朋友发来的信，请求他协助管理二人在很久以前一同飞越的大陆。现在，席尔马赫在一个以他名字命名的科考站里工作，而他的任务就是保证新施瓦本的行政系统在任何情况下都能正常运转。§!§F\n------------\n\n\n\n\n\n\n £GFX_AAG_Richard_Heinrich_Schirmacher_large \n\n\n\n\n\n§!"
 AAG_Ernst_Herrmann_for_desc:0 "§Y外交部长\n民族保守主义§!\n------------\n§L作为两次世界大战的老兵，以及经验丰富的地质学家、地理学家、摄影师和物理学家，恩斯特·赫尔曼曾代表德国探索世界的边疆。在他职业生涯的四十年间，他的足迹遍布世界，从斯瓦尔巴群岛到比格尔岛，从北极圈到南极大陆。1959年，赫尔曼被分配到新施瓦本的行政部门，将他的知识以及他的学术和政治关系用于维持该领地的运作，他的旅程也随之告一段落。他希望有朝一日自己的环球旅行能够继续，当然，前提是诸事顺利。§!§F\n------------\n\n\n\n\n\n\n £GFX_AAG_Ernst_Herrmann_large \n\n\n\n\n\n§!"
