 AAA_Dreams_Of_The_South_Pole:0 "南下征途"
 AAA_Dreams_Of_The_South_Pole_desc:0 "豪尔赫·埃德加·莱亚尔虽是阿根廷军队的一员，但他仍有着一颗探险家的心。不幸的是，其他南极领地政权无一不把这片冰封大陆当做自己的练兵场，而非科学研究与考察的藏宝地。即便如此，莱亚尔的当前目标仍是展开对南极点的全面探险，不论多大的风险都无法动摇他的意志。"
 AAA_War_Legacy:0 "斯尼佩岛之战的余波"
 AAA_War_Legacy_desc:0 "1958年斯尼佩岛之战见证了OFN主持的智阿两国南极边界争端谈判的迅速破产。1958年6月，阿根廷海军单方面入侵并占领了南极西部争议地区：比格尔海峡中的几个小岛。随后，智利的反击挡住了阿根廷的步伐。\n\n尽管阿根廷政府官方否认他们参与了这一事件，但作为中间人的OFN还是退出了这两个南美国家之间的谈判，让阿根廷自己去处理这笔不义之财。智利意在收复失地，卧薪尝胆直至今日，而阿根廷南极研究所与阿根廷海军间嫌隙仍存。"
 AAA_Azules_ARG:0 "蓝派当政"
 AAA_Azules_ARG_desc:0 "当下，阿根廷政治的摩天轮已经暂停，陆军的蓝派正高居顶端。对莱亚尔上校来说，这是个好消息，缘由在于蓝派憎恨海军，并很可能会在未来反对海军对南极领地施加影响的企图。蓝派已经直截了当地表示会默许并暗中支持莱亚尔的计划，这应当会提高阿根廷南极研究所在国内、甚至国际范围内的合法性。然而，莱亚尔并不相信所有的蓝派成员都赞同自己的观点。"
 AAA_Colorado_ARG:0 "破碎冰原上的分歧"
 AAA_Colorado_ARG_desc:0 "在阿根廷，甚至最遥远的领土也难逃国内政治斗争的法则。阿根廷南极研究所和莱亚尔上校希望南极能享有紧张的和平，但胜利的红派从来都不热衷于与研究所合作，而是恰恰相反，鼓动海军对邻近的智利人发起入侵。补给和资金不断流入海军基地，越来越多的武器部署于此。这样的内部不和无疑会损害阿根廷南极领地的合法性。"
 AAA_Scientific_Brilliance:0 "科学 - 熠熠闪光"
 AAA_Scientific_Brilliance_desc:0 "莱亚尔上校历尽艰辛，携带海量的地质样本和气象数据回到国内，他在南纬90行动中的努力得到了以十倍计的回报。希罗上尉科学小组的成功让莱亚尔得以为阿根廷在南极的改弦易辙争取到了更多支持，迎来了科学工作可以不受阻碍的时代，和平合作、保护南极的希望不仅仅是痴人说梦。但是，海军不会对此感到高兴……"
 AAA_Scientific_Mediocrity:0 "科学 - 平常庸碌"
 AAA_Scientific_Mediocrity_desc:0 "尝试与错误为南纬90行动的队员们带来了矛盾的结果，他们的科学目标很快就被更紧迫的事项所淹没。尽管第82巡逻队成功提取了在圣菲山脉收集的样本信息，但探险队不上不下的成就也没能显著影响莱亚尔上校在南极洲的地位。阿根廷科学的平常成就既没有说服诋毁者转向支持，也没有打动支持者更进一步。平庸就是当今世界的主流。"
 AAA_Scientific_Failure:0 "科学 - 一败涂地"
 AAA_Scientific_Failure_desc:0 "南纬90行动遇到了一连串的失败，始终都绕着对南极的简单考察兜兜转转，使得人们对科学材料和人员的投资产生了怀疑。雪上加霜的是，第82巡逻队在离开圣菲山脉的途中被俘，收集的数据样本也落入他人之手。海军要求对此进行报复，莱亚尔头顶上的指挥官光环也因他领导下的灾难性行动而渐渐黯淡，似乎，在南极洲展开和平研究的梦想正日复一日地越来越遥远……"
 AAA_Op90_Resounding_Success:0 "南纬90行动 - 大胜凯旋"
 AAA_Op90_Resounding_Success_desc:0 "南纬90行动是一项秘密的军事行动任务，旨在将阿根廷的国旗插上地理南极点，巩固阿根廷对南极洲的主权。在豪尔赫·埃德加·莱亚尔上校的指挥下，极点突击队从贝尔格拉诺站启程，出色地完成了目标，将人类有史以来最为优异的极地探险壮举之一载入了史册。队伍途中无人丧生，还带回了数不清的科学知识。这是阿根廷伟大的一日！"
 AAA_Op90_Nominal_Success:0 "南纬90行动 - 未竟全功"
 AAA_Op90_Nominal_Success_desc:0 "南纬90行动是一项秘密的军事行动任务，旨在将阿根廷的国旗插上地理南极点，巩固阿根廷对南极洲的主权。在豪尔赫·埃德加·莱亚尔上校的指挥下，极点突击队从贝尔格拉诺站启程。虽然任务最终获得成功，但其中也并非没有出现复杂的突发情况。探险队实现了立下国旗的主要目标，但仍遇到了其他一些困难，给这次任务留下了缺憾。即使如此，阿根廷仍然为她勇敢的儿子们而骄傲。"
 AAA_Op90_Tragic_Success:0 "南纬90行动 - 悲壮胜利"
 AAA_Op90_Tragic_Success_desc:0 "南纬90行动是一项秘密的军事行动任务，旨在将阿根廷的国旗插上地理南极点，巩固阿根廷对南极洲的主权。在豪尔赫·埃德加·莱亚尔上校的指挥下，极点突击队从贝尔格拉诺站启程。不幸的是，探险队遭遇了数场致命的悲剧，他们经历了极地探险的真正恐怖，有关吃人的传言已不胫而走。阿根廷政府证实他们的国旗已经在南极点飘扬，但付出的代价却显得如此沉重。"
 AAA_Op90_Disaster:0 "南纬90行动 - 灾难结局"
 AAA_Op90_Disaster_desc:0 "南纬90行动是一项秘密的军事行动任务，旨在将阿根廷的国旗插上地理南极点，巩固阿根廷对南极洲的主权。在豪尔赫·埃德加·莱亚尔上校的指挥下，极点突击队从贝尔格拉诺站启程。但就像许多极地探险家一样，他们也在南极渺无人烟的巨大荒原中失去了踪影。当下，探险队依然无处可寻，阿根廷已经为此宣布进行全国哀悼日。对阿根廷南极领地的愿望而言，这是灾难性的可怕时刻。"
