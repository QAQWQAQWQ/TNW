 Antarctica_Whaling_banned_desc: "[GetAntarcticaWhalingBenificiary]"
 Antarctica_Whaling_desc: "[GetAntarcticaWhalingBenificiary]久远的过去，深海巨兽为世间的灯火供给燃料。这桩贸易的暴利正是靠着从它们的庞大躯体中榨取液体黄金，积累起血迹斑斑的财富。后来，煤油与电力驱散了城市的黑暗，似乎昭告着这个血腥时代已永远尘封在历史之中。\n\n然而实际上，这桩生意只是换了个样子罢了。旧式帆船退场后，流动加工船接替了它们的角色；枪炮轰鸣取代了手抛式样的鱼叉。二十世纪将捕鲸变成了永不停歇的流水线——它的血肉骨骼被碾成动物饲料，脂肪用于制造人造黄油和肥皂。工业屠杀达到了顶峰，与如此前所未有的猎捕规模相比，十九世纪的捕鲸业已经不值一提。\n\n列国瓜分南极洲更是火上浇油。各国急于争夺优势，在世界边缘建立起了一座座新港口和加工站。冰封海域，最后的宏大庇护所，沦为了最大的狩猎场。\n\n最终的的狩猎狂欢已然开启。鱼叉飞舞，熔炉轰鸣。但是，纵然是最深的深海亦有尽头——这场疯狂还能持续多久，最后的巨兽何时将唱响最后的歌声？"
 Antarctica_Whaling_booming_desc: "[GetAntarcticaWhalingBenificiary]"
