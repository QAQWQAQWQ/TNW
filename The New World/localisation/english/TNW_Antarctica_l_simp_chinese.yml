 AAG_Konstanty_Gutschow:0 "康斯坦蒂·古乔"
 AAG_Viktor_Lutze:0 "维克托·卢策"
 AAG_Hans_Degen:0 "汉斯·德根"
 AAG_Hans_Degen_high_command_desc:0 "§L山地步兵上将汉斯·德根的军事生涯开端于一战，1916年起到战争结束他都是一名猎兵。间战期的风雨中，他在指挥链内摸爬滚打，1938年服役于第二山地师，1943年同部队司令授陆军中将，此后直到战争结束都留任该职，领导山地师在俄罗斯极北积极作战。南极争夺战爆发不久，德根被赋予了监督德军部队前往南极部署的使命，西俄战争期间被召回与俄军作战，取得了陆军上将的军衔。如今，德根依然负责指挥第二山地师，为未来的冲突做准备。§!§F\n--------------\n\n\n\n\n\n\n £GFX_AAG_Hans_Degen_large \n\n\n\n\n\n§!"
 AAG_Hans_Degen_army_chief_desc:0 "§L山地步兵上将汉斯·德根的军事生涯开端于一战，1916年起到战争结束他都是一名猎兵。间战期的风雨中，他在指挥链内摸爬滚打，1938年服役于第二山地师，1943年同部队司令授陆军中将，此后直到战争结束都留任该职，领导山地师在俄罗斯极北积极作战。南极争夺战爆发不久，德根被赋予了监督德军部队前往南极部署的使命，西俄战争期间被召回与俄军作战，取得了陆军上将的军衔。如今，德根依然负责指挥第二山地师，为未来的冲突做准备。§!§F\n--------------\n\n\n\n\n\n\n £GFX_AAG_Hans_Degen_large \n\n\n\n\n\n§!"
 AAG_Eduard_Zorn:0 "爱德华·佐恩"
 AAG_Eduard_Zorn_high_command_desc:0 "§L陆军少将爱德华·佐恩是一位功勋卓著的第二山地师老兵，他服役于二战期间，与1943年库图佐夫行动中阵亡的兄长汉斯·佐恩并肩经历过东线与芬兰的许多战斗。西俄战争期间，佐恩身先士卒地站在最前线，与第二山地师的英勇表现为他赢得了陆军少将的军衔。即使去过几次南极，他的大部分时间依然在陪伴欧洲部队，为即将到来的战争做准备。眼下似乎没什么格外的理由让他去南方大陆流血。§!§F\n--------------\n\n\n\n\n\n\n £GFX_AAG_Eduard_Zorn_large \n\n\n\n\n\n§!"
 AAG_Erwin_Fussenegger:0 "埃尔文·福森格"
 AAG_Erwin_Fussenegger_high_command_desc:0 "§L作为年迈的费尔斯坦将军的门徒，山地步兵上将埃尔文·福森格的军事生涯也同样是从奥地利开始的。1938年德奥合并后，福森格被转移到柏林战争学院继续军官训练，二战期间他得到的第一项使命就是加入另一位奥地利将军瓦伦丁·费尔斯坦领导的第二山地师，两人从此一见如故。战争结束后，福森格又被调回了第二山地师，西俄战争期间他与德根和佐恩并肩作战时展现出的卓越天赋与后勤技能没有被忽视，至今为止他的事业都很成功，福森格希望这份成功能长久延续下去。§!§F\n--------------\n\n\n\n\n\n\n £GFX_AAG_Erwin_Fussenegger_large \n\n\n\n\n\n§!"
 AAG_Valentin_Feurstein:0 "瓦伦丁·费尔斯坦"
 AAG_Valentin_Feurstein_theorist_desc:0 "§L瓦伦丁·费尔斯坦额尖的皱纹下埋藏着许多故事，1907年他加入奥匈帝国陆军，经历了一次大战的风雨，德奥合并期间他依然为奥地利共和国效力。1938年4月1日奥地利陆军第六阿尔卑斯师整编并入第二山地师后，陆军中将瓦伦丁·费尔斯坦被任命为新部队指挥官，领导该部队经历了二战初期的岁月，参与过波兰与挪威的入侵。1941年他被提拔为山地步兵上将负责七十军的指挥权，1943年再次晋升，被调往第五十一山地师向斯大林格勒推进。战争结束后，费尔斯坦负责了德国山地步兵的重整，西俄战争期间再次受到征召，被授以大将军衔。他并没有过多参与南极事务，却通过他在部队中的奥地利同侪埃尔文·福森格为第二山地师提供战术上的协助。§!§F\n--------------\n\n\n\n\n\n\n £GFX_AAG_Valentin_Feurstein_large \n\n\n\n\n\n§!"
 AAG_Alfred_Kottas:0 "阿尔弗雷德·科塔斯"
 AAG_Alfred_Kottas_navy_chief_desc:0 "§L阿尔弗雷德·科塔斯，早年为汉莎航空的南大西洋航运提供服务，1935年起就是探险船施瓦本号的船长。1938年，阿尔弗雷德·里彻租下这艘弹射飞机商船用于第三次德国南极远征，科塔斯及其船员也参与了他们的行程。旅途中，他结识了鲁道夫·迈尔和里夏德-海因里希·席尔马赫，两人驾驶了由他船上起飞的水上飞机。为表彰他在此次探险中的努力，科塔斯从艾哈德·米尔希将军手中被授予了海洋英雄勋章(Sea Warden Medal)。探险队悄悄返回欧洲后，战争的阴云正在地平线上酝酿，科塔斯很快成为与海军合作的商船队一员负责在北海地区发射侦察机。虽然在1944年突遭鱼雷袭击，科塔斯和他的船都幸存了下来，经过一番维修后，科塔斯与施瓦本号又重返了汉莎航空的岗位。1950年代初，南极争夺战爆发后，科塔斯再次收到了阿尔弗雷德·里彻的联络。经过改造后的施瓦本号已经用直升机取代了水上飞机，与其他诸多船只一起参与了席尔马赫站的建立工作。现在，科塔斯船长管理着往返新施瓦本的海军与人员运输。§!§F\n--------------\n\n\n\n\n\n\n £GFX_AAG_Alfred_Kottas_large \n\n\n\n\n\n§!"
 AAG_Franz_Preuschoff:0 "弗朗茨·普罗伊朔夫"
 AAG_Franz_Preuschoff_air_chief_desc:0 "§L弗朗茨·普罗伊朔夫是鲁道夫·迈尔在汉莎航空的老朋友，两人初次碰面可以追溯到科克探险队向北格陵兰的远征，那时，普罗伊朔夫还是飞行技师。同年晚些时候，两人又一起参加了第三次德国南极远征，是与迈尔同乘“鲸”式水上飞机的同伴。第二次世界大战爆发后，迈尔加入了德国空军，普罗伊朔夫则留在了汉莎航空，从飞行技师转型为飞行工程师，期间与公司老板艾哈德·米尔希建立了友谊。50年代中期，普罗伊朔夫在德国航空界（凭借他的职业）与德国空军（凭借他与迈尔的关系）建立了各种联系，而他自己也荣升为汉莎航空的首席飞行工程师。迈尔被任命为新施瓦本的新任行政官后，他邀请普罗伊朔夫协助他发展重组后的德属南极领地。因此，普罗伊朔夫在新施瓦本空军测试站的建立过程中扮演了重要角色，为这世界边缘之地寻找新的用途。§!§F\n--------------\n\n\n\n\n\n\n £GFX_AAG_Franz_Preuschoff_large \n\n\n\n\n\n§!"
 AAJ_Hayao_Kinugasa:0 "衣笠骏雄"
 POLITICS_HAYAO_KINUGASA_DESC:0 "衣笠骏雄年幼时就在东京陆军儿童学校接受了军事教育，后来进入了日本帝国陆军学院。二战期间，他作为一名中尉在一所飞行训练学校开始了他的职业生涯。他表现出色，被提升为少佐，并被派往台湾和新几内亚的第四航空军服役，担任两个航空师团的参谋。《赤城协定》签署后，他被调到陆军航空总务部工作。\n\n衣笠骏雄是一名士兵，而非政客，他并没有接受过有关如何在残酷的日本政界中生存下去的训练。当他的同龄人与财政部长建立关系，使得他们的前途一帆风顺时，衣笠骏雄的仕途却停滞不前，被困在了第一空挺团团长的位置上。转机出现在50年代初，对南极的瓜分结束后，他的上级派遣他前往寒冷的南极大陆。短短一个星期后，衣笠骏雄这个不起眼的名字出现在了全世界所有大牌媒体的报刊上，这让军事机关感到非常懊恼。命运多舛的衣笠骏雄发现自己处于这人类文明边疆地缘政治冲突的最前线。\n\n在他领地的西边，美国人试图破坏环太平洋地区的和平，利用他们傀儡国的过期宣称，狮子大开口式的索要南极的半数土地。而在他领地的东边，南美的两个小国则为极南大陆上仅剩的一小块无主土地争吵不休。随着太平洋地区的冷战升温，衣笠骏雄将军的职责是捍卫日本在南极的利益，同时动摇美国及其南美傀儡对南极的控制。旭日终将在这片极夜之地上空升起。"
 AAA_Jorge_Edgar_Leal:0 "豪尔赫·埃德加·莱亚尔"
 POLITICS_JORGE_EDGAR_LEAL_DESC:0 "纵观历史长河，每一场军事行动的每一方都必须要有一位指挥官坐镇前线，好比每一支利矛都要有矛头。这只矛头必须锐利无比，坚不可摧，像热刀切开黄油那样撕裂敌人的防线。当阿根廷共和国将目光转向南方的极寒大陆时，它选择了豪尔赫·埃德加·莱亚尔作为其矛头，而他也将怀着决心与意志，刺向世界的最底端。\n\n莱亚尔上校出生在萨尔塔省的某个不知名的小地方，与他日后平步青云的军事生涯形成了鲜明对比。他于1939年进入阿根廷军事学院学习，毕业后获得了少尉军衔，不久后又升为上尉。最后，他于1951年被调拨到圣马丁军事基地。在这片无垠的白色荒漠之中，豪尔赫爱上了这片大陆的寂寥之美。十年后，他再次回到了这片荒芜之地。\n\n这一次，他得到了阿根廷政府的鼎力支持，因为布宜诺斯艾利斯方面渴望在极南大陆上取得势力范围。前任阿根廷南极属地长官普哈托将军已经建立起了说实话并不太牢靠的水上飞机航线和基地航路网，这成了莱亚尔的南极领地正常运作的基础。来自美国人、日本人和德国人的潜在威胁使莱亚尔的领地获得了充裕的资金，随之而来的还有阿根廷民众的目光，他们无不希望莱亚尔能保住上一代探险家留下的遗产。\n\n然而，即使资金再怎么多，对莱亚尔来说也远远不够，因为他和他的政权的野心可不仅仅是测试战机或科学考察而已。上校正酝酿着一个被他称作“南纬90行动”的计划，如果成功，它将使得阿根廷南极属地的边界扩张到闪耀的南极点上。这个宏伟的计划将为阿根廷和她的人民带来永恒的荣耀，让其他试图与阿根廷争夺南极的势力蒙羞，还会让莱亚尔的名字永载史册。\n\n阿根廷之利矛随时准备着为他的祖国带去伟大与荣耀，现在只有一个问题亟待处理：上校准备好征服世界的最底端了吗？他还得等待多久才能出发？"
 AAA_Gustavo_Adolfo_Giro:0 "古斯塔沃·阿道弗·希罗"
 AAA_Juan_Carlos_Beltramino:0 "胡安·卡洛斯·贝尔特拉米诺"
 AAA_Mario_Luis_Olezza:0 "马里奥·路易斯·奥莱扎"
 AAA_Mario_Luis_Olezza_eco_desc:0 "§Y经济部长\n军政府§!\n------------\n§L阿根廷空军在南极的联络员马里奥·路易斯·奥莱扎中校负责管理阿根廷南极属地的补给运输工作。虽然这是一项相当重要的任务，但奥莱扎希望自己能更加发光发热。50年代初，他驾驶运输机为新成立的圣马丁基地运送物资，同时在专门训练驻南极人员的训练中心担任教官，教授飞行员们如何正确地在南极广袤的冰面上起飞和降落。他曾希望在60年代初乘飞机访问南极，不幸的是，德国防空设施的威胁使他的计划落了空。因此，现在奥莱扎将精力集中在确保“南纬90行动”顺利完成上，他希望这能让人类在极点附近的活动更加活跃。§!§F\n--------------\n\n\n\n\n\n\n £GFX_AAA_Mario_Luis_Olezza_large \n\n\n\n\n\n§!"
 AAA_Hernan_Pujato:0 "埃尔南·普哈托"
 AAA_Hernan_Pujato_sec_desc:0 "§Y安全部长\n庇隆主义§!\n------------\n§L在庇隆时代，埃尔南·普哈托曾是一位万众瞩目的人物。在瓜分南极之前，普哈托上校在庇隆总统的支持下建设圣马丁军事基地，这是阿根廷在南极大陆的第一个永久性基地，同时还成立了阿根廷南极研究所。随着世界各国瓜分南极，他的努力得到了回报，因为这些永久基地有助于为阿根廷的领土宣称树立合法性。为了表彰他的功绩，他被提拔为将军，但很快庇隆被赶下了台，他也差点因此提前退休。然而，他巩固阿根廷在南极势力范围的先见之明，使他除了受到军方高层其他人物的厌恶外，没有遭受任何实质性的惩罚。普哈托对自己目前所处的地位很满意，他忠实地担任着阿根廷南极研究所的负责人和阿根廷南极驻军指挥官的职责。§!§F\n--------------\n\n\n\n\n\n\n £GFX_AAA_Hernan_Pujato_large \n\n\n\n\n\n§!"
 AAB_Wolfram_Sievers:0 "沃尔弗拉姆·西弗斯"
 POLITICS_WOLFRAM_SIEVERS_DESC:0 "§R绝密§!"
 AAB_Herbert_Jankuhn:0 "赫伯特·扬库恩"
 AAB_Heinz_Brucher:0 "海因茨·布吕歇尔"
 AAB_Heinz_Brucher_eco_desc:0 "§Y经济部长\n秘传纳粹主义§!\n------------\n§L祖先遗产学会植物学部门的现任负责人海因茨·布吕歇尔起初是党卫队采集部门的一员，这是一支特殊的部队，常常深入前苏联的废土，回收农作物种子、珍稀植物和其他研究用样本。布吕歇尔是作物育种的坚定支持者，他认为这对德国的可持续发展至关重要，这使他很快成为党卫队植物遗传学研究所的负责人。50年代初，该研究所被并入祖先遗产学会，成为该组织的下辖部门，专注于民族植物学研究。他与他手底下的一小群植物学研究专家与祖先遗产学会南极分部一同前往南极大陆进行考察，以研究他们能够找寻到的古代植物化石。至少他明面上是这么说的。§!§F\n--------------\n\n\n\n\n\n\n £GFX_AAB_Heinz_Brucher_large \n\n\n\n\n\n§!"
 AAI_Giovanni_Torrisi: "乔瓦尼·托里西"
 AAR_Augusto_Rademaker:0 "奥古斯托·拉德马克"
 Antarctic_Admiral:0 "南极将军"
 Spirit_of_Exploration:0 "探险精神"
 Reichsgeschaftsfuhrer_des_Ahnenerbe:0 "祖先遗产学会主席"
 Antarctic_Diplomat:0 "南极外交官"
 Seasoned_Airman:0 "经验丰富的飞行员"
 Antarctic_General:0 "南极将军"
 Antarctica_Territory_Generic_Idea:0 "南极领地"
 Antarctica_Territory_Generic_Idea_desc:0 "我们的政权是占据着南极大陆及其邻近地区的数个政权之一。除了遍布海岸的各种科考站和军事岗哨，我们领土的绝大部分都是白色荒漠，延伸到我们目视所能及处最远的地方。"
 AAO_McMurdo_Station:0 "麦克默多站"
 AAO_McMurdo_Station_desc:0 "§F提供§!§G更强的§!§W补给§!£Antarctica_texticon_SUP §F能力§!\n§F--------------§!\n麦克默多站拥有南极大陆上规模最大也是最先进的军事设施，甚至包括一座最近才投入使用的核电站。它能够容纳一千多名工作人员，以及一支小型海军舰队（前提是天气良好）。因此，它顺理成章地成为了OFN在南极与印度洋地区的一座重要行动基地。"
 AAO_OFN_Tensions:0 "OFN的内部裂痕"
 AAO_OFN_Tensions_desc:0 "就像其他OFN国家一样，白宫与五角大楼掌控着OFN南极洲事务局的一切。然而，这块南极领地的主权最初掌握在澳大利亚和新西兰人手里，然后美国人在瓜分南极期间“合并”了其盟国的宣称领土。因此，这两个大洋洲国家希望自己能够对南极事务拥有更多的话语权。"
 AAO_Cohesion_1:0 "事务局凝聚力：极低"
 AAO_Cohesion_1_desc:0 "OFN南极洲事务局的未来日趋紧张，各成员国及其南极代表机构之间的关系从未如当下这般剑拔弩张。目前，事务局更像是互相独立的三方，而非一个统一的组织。由于缺乏合作，事务局的日常运转开始逐渐崩溃，已经走到了轰然倒塌的边缘。如果事务局还想存续下去，那就必须断然行动，促成各方之间的再次合作，为未来找到解决方案。"
 AAO_Cohesion_2:0 "事务局凝聚力：低"
 AAO_Cohesion_2_desc:0 "OFN南极洲事务局各成员国之间的关系正日渐恶化，由士兵、科学家和工人组成的特遣队愈发拒绝相互合作，由于各国待遇的不平等，以及无法掌控事务局如何运作，其未来可谓是前路迷蒙。甚至事务局领导层都意识到，妥协十分不易，OFN在南极洲继续立足已然是难上加难。"
 AAO_Cohesion_3:0 "事务局凝聚力：中等"
 AAO_Cohesion_3_desc:0 "OFN南极洲事务局的未来尚且无法确定。对南极领地的掌控成了越来越热门的话题，事务局的许多成员常常就如何管理这里互相争论。尽管如此，上述争论并未对事务局日常运作产生较大影响，但对许多人而言，事务局很快就需要对这个问题作出回答。"
 AAO_Cohesion_4:0 "事务局凝聚力：高"
 AAO_Cohesion_4_desc:0 "OFN南极洲事务局的未来仍在平静的水面之下暗潮涌动，但领导层依旧牢牢把控着船舵。尽管就南极领地未来的政治争吵还在继续，但事务局的士兵和科学家们仍然能够亲密合作。"
 AAO_Cohesion_5:0 "事务局凝聚力：极高"
 AAO_Cohesion_5_desc:0 "尽管就OFN南极洲事务局的未来，各方之间的紧张关系始终未曾消失，但在当下，各成员国及其南极代表机构之间仍可称得上合作无间。事务局像是一台运转良好的机器，宛如灯塔一般，在冰封大陆上闪耀着自由与合作的光芒，其领导层正同心协力，共同决定事务局的未来。"
