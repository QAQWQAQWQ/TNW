 Antarctica_GUI_Foreign_Admin_Icon_tt:0 "[get_Antarctica_GUI_Foreign_Admin_Icon_tt]"
 Antarctica_GUI_Foreign_Admin_Icon_USA_tt:0 "美国南极开发指挥部的起源可以追溯到1940年，由理查德·伯德海军少将率领的美国南极服务科考队。这是美国在二战前进行的最后一次南极远征，在此期间，队员们在威尔士湾建立了小美洲三号科考站。由于美国在瓜分南极之前没有对南极提出任何领土宣称，它也没有一个专门用于处理南极事务的部门。在瓜分南极并建立OFN南极洲事务局之后，理查德·伯德上将被调往新成立的美国南极开发指挥部任职，负责南极的行政管理和物资运输。\n\n南极开发指挥部与美国政府的其他部门以及军队密切合作，以确保其正常运转。此外，南极开发指挥部还与澳大利亚南极司和新西兰南极研究规划局有所往来，处理和决定与OFN南极洲事务局有关的事务，同时还要兼顾与外国机构，如德国极地研究学会和国际南极研究委员会的关系。一直以来，OFN南极洲事务局局长一直由南极开发指挥部首长兼任，从伯德上将，到安德森上将，再到雷伯恩中将都是如此。但这种局面会不会在未来改变，还尘埃未定。"
 Antarctica_GUI_Foreign_Admin_Icon_GER_tt:0 "德国极地研究学会最初是由阿尔弗雷德·里彻在1940年代末创建的一个非政府组织，目的是继续他在南极的考察工作。在第二次世界大战结束后的几年时间里，德国政府对进一步继续其在南极的研究并不感兴趣。在成立之初，它被称为促进极地研究学会，并在瓜分南极之后被重新命名。该组织也是在那时被并入德国政府，以在未来管理德国在南极洲的事务。\n\n最初，德国极地研究学会取得了一定程度的成功，他们在席尔马赫绿洲建立了一个永久科考站，又在新施瓦本的其他地方建立了数个前哨。然而，西俄战争的爆发和随之而来的补给短缺让他们的努力成了泡影，德国对南极的殖民企图就此落空，德国极地研究学会也不得不重新审视德国在南极的地位。现在，德属南极领地，或者说，新施瓦本被德国空军用作新型武器的试验场。在德国空军负责保障新施瓦本得以存续的同时，德国极地研究学会负责处理行政事务、供应运输以及与其他军种和外部组织的合作。"
 Antarctica_GUI_Foreign_Admin_Icon_JAP_tt:0 "从法律上来讲，日本对南极的领土宣称完全是一派胡言。尽管这件事世人皆知，但旭日帝国却决心维持对他们所占据的南极领地的控制。因此，日本领南极地域完全由日本帝国陆军管理，并由精锐的第一空挺团保卫。然而，在国内，与南极有关的政治事务却是由日本南极部处理的。该部门是于各国瓜分南极过后一年，为回应OFN对日本抢占玛丽·伯德地的行动所提出的越来越多的抗议而成立。南极局与日本帝国陆军密切合作，以协调外交事务，并尽可能地将紧张局势保持在最低限度。然而，日本南极局的主要任务是防止美国人和德国人通过外交手段，迫使日本人离开南极大陆。日本领南极地域可能是南极大陆上最为强大的一支力量，但即使最坚固的链条也会因其薄弱的一环而崩裂……"
 Antarctica_GUI_Foreign_Info_Text:0 "[get_Antarctica_GUI_Foreign_Info_Text]"
 Antarctica_GUI_Foreign_Extra:0 "不管是通过运气、外交技巧、军事势力，还是其他什么手段，我们都为自己争取到了一块位于南极大陆的领地。虽然我们的南极领地在某种程度上来说是自治的，但通过我们的南极管理机构，我们仍对南极事务握有很大的发言权。我们最重要的任务之一便是为南极领地分配预算，更多的投资能让我们的领地与别国相比更胜一筹。"
