 AAC_American_Backed_Antarctic_Claims: "美国支持南极宣称"
 AAC_American_Backed_Antarctic_Claims_desc: "在南极荒原之上宣示法理主权时，唯有一条法则至关重要：强权即公理。智利在斯尼佩岛之战中惨败于阿根廷军队，便是在瓜分南极洲中大败亏输的根本原因。子弹划过空气时，多年的依法姿态和美国调解的努力就像是新雪一般，转瞬消失无踪。\n\n外交官们的不懈努力铺平了道路，但最终决议仍出自华盛顿的手笔。美国单单只是摆出了一个“善意姿态”，美洲国家组织就承认了智利的主张。表面上看，这的确是场胜利，智利南极研究所如今获得了国际法支持的授权。但是，这份承认并非争取来的权利，而是施舍的恩惠——债务已然产生。如今，飘扬在阿图罗·普拉特站的智利国旗投下了白头海雕双翼的阴影，它永远昭示着：这场外交胜利的命脉，终究系于华府之手。"
 AAC_base_peru: "秘鲁南极基地"
 AAC_base_peru_desc: "我们赠予秘鲁人民的礼物已成为为他们开启南极之门的钥匙。在世界尽头，我们帮助他们筑起了属于自己的“马丘比丘”——民族雄心的象征。它立于我们的土地之上，在我们的荫庇之下。这一彰显泛美兄弟情谊的盛举远胜任何军事胜利。如今在世界舞台发声时，借由我们获得话语权的秘鲁之声正与我们同频共振。他们的感恩是我们抵御攻讦的坚盾，他们的支持是我们辞锋辩论的利剑。"
 AAC_base_ecuador: "厄瓜多尔南极基地"
 AAC_base_ecuador_desc: "阿罗塞梅纳总统醉酒时的承诺结出了意外的甜果。生于赤道的厄瓜多尔人在打量南极大陆时总带着与生俱来的恐惧，他们的基地是智利的“小兄弟”，正不断地向本土请求输送物资，且往往过量。身为经验丰富的极地工作者，智利已经掌控了其后勤“监护权”，得以主导并重新分配物资流。其中令人意外的是，厄瓜多尔的恐惧竟填满了智利南极基地的仓库。"
 AAC_base_cuba: "古巴南极基地"
 AAC_base_cuba_desc: "马埃斯特腊山的革命之火如今燃起了冷焰，古巴士兵的狂热激情正在南极教条的冰冷熔炉中重铸。智利人教会他们不必为理念赴死，只需为领土杀戮。这股淬炼过钢铁意识形态的新生力量正在造就全新的战士——他们兼具游击队员与极地狼的本领，正唤醒着智利的顶级掠食者，拉开狩猎的帷幕。"
 AAC_base_mexico: "墨西哥南极基地"
 AAC_base_mexico_desc: "在世界尽头，墨西哥人履行着他们令人羡慕不起来的职责。作为受人尊敬的中立力量，墨西哥的存在将智利对日本捕鲸业者的指控落实为了冷酷而无可辩驳的事实。他们孤立前哨站发出的每条无线电报都如同罪孽日志中的记录，精确的坐标标识着狡诈的日本人的历次的越界行径。"
