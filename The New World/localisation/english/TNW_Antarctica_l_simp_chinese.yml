 Antarctica_GUI_Special_Mission_1_Name:0 "更改武器测试点位置"
 Antarctica_GUI_Special_Mission_1_Name_tt:0 "§F将武器测试及试验由正在使用的地块更改至当前选中地块。我们必须§r控制§!这一地块才能执行转移，与此同时，选中的地块必须是§L内陆地块§!。\n\n每§Y3§!个月可以变更一次。\n距下次可更改测试地点的时间：§Y[?Antarctic_Special_Missions_1_AAG_Tile_Switch]§!日\n花费：§W2补给§!£Antarctica_texticon_SUP ，§R1军事点数§!£Antarctica_texticon_MIL "
 Antarctica_GUI_Special_Mission_1_tt:0 "\n\n§F特殊任务 No.1——转移曾被用来实施武器试验评估的场地，如果我们用来开展测试的地址被敌军侦察到，他们就会收获关于我们行动的额外§B情报掌握度§!£Antarctica_texticon_INTVAL 。经常更换测试地点是避免敌军占得上风的重要手段，此外，我们只能在选定地址实施一次测验。更换选定的地块将允许我们同时运行多场测试。目前我们可以在§W地块 #§!§Y[?Antarctic_Special_Missions_1_AAG_Tile_Display]§!开展测试。§!"
 Antarctica_GUI_Special_Mission_2_Name:0 "拦截外国活动"
 Antarctica_GUI_Special_Mission_2_Name_tt:0 "§F拦截外国势力在我方领土内的破坏活动。这能阻止该任务下§!§R军事点数§!£Antarctica_militarization  §F，§!§G宣称点数§!£Antarctica_legitimacy §F，以及可能的§!§W补给§£Antarctica_supply §F损失。该任务将耗费§!§Y7天§!。\n\n至少有一项外交任务在我方境内执行时解锁，但我们一次只能拦截一项破坏活动。\n花费：§!§W6补给§!£Antarctica_supply ，§B30政治点数§!£political_power_texticon "
 Antarctica_GUI_Special_Mission_10_Name:0 "损害合法性"
