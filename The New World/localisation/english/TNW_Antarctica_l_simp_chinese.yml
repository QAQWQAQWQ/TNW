 Antarctica_GUI_AAA_Decision_Secrecy_AAC_Big:0 "进行海军拦截"
 Antarctica_GUI_AAA_Decision_Secrecy_AAC_Big_desc:0 "尽管莱亚尔上校始终都不愿向海军求助，但他仍认为应当强化对智利南极领地船只的海上拦截力度，将智利的情报工作注意力转移到更紧迫的事项上。和平是一种奢侈。"
