 Antarctica_GUI_AAA_Progressbar_Secrecy_tt:0 "§F情报行动花费不菲，但是监控其他§W南极§!领地的情报是必要的，如果我们的计划被发现，我们无法预测其他人会做何反应。\n\n§O南纬90行动§!的机密性会因我们储备补给以及其他南极领地执行任务而逐月衰减。\n\n当前对§QOFN南极洲事务局§!的机密性为§Y[?Antarctica_GUI_AAA_Mission_Secrecy_AAO]/25§!。\n当前对§r新施瓦本§!的机密性为§Y[?Antarctica_GUI_AAA_Mission_Secrecy_AAG]/25§!。\n当前对§e日本领南极地域§!的机密性为§Y[?Antarctica_GUI_AAA_Mission_Secrecy_AAJ]/25§!。\n当前对§R智利南极领地§!的机密性为§Y[?Antarctica_GUI_AAA_Mission_Secrecy_AAC]/25§!。\n\n当前综合机密性为§Y[?Antarctica_GUI_AAA_Mission_Secrecy_Total]/100§!。§!"
