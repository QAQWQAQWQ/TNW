 Antarctica_GUI_AAO_PERT_Title:0 "计划评审技术 - 冰人导弹研发项目"
 Antarctica_GUI_AAO_PERT_Open_Button_tt:0 "§W打开§Y导弹研发项目计划评审技术§!GUI§!"
 Antarctica_GUI_AAO_PERT_Info_button_tt:0 "§F§D计划评审技术（PERT）§!是§i美国海军特别项目办公室§!为§Q北极星导弹研发项目§!而开发的一套项目管理工具。在§Q北极星导弹§!研发期间，它在§Q雷伯恩海军中将§!的手中发挥了巨大的效用，该项目因而得以比计划提早§Y4年§!即告成功。现在，又到了计划评审技术和§Q雷伯恩海军中将§!在§K核§!导弹开发中接受考验的时候了。\n\n主概览窗口中显示了§Y综合网络图§!，该图表显示了所有互相联系的计划评审技术网络图，以及主要的§B事件§!与§O活动§!，你可以通过§W点击和拖拽§!浏览完整的网络图。网络图中的方框表示§B事件§!，连接各事件的箭头表示§O活动§!。可以悬停在正在进行中的§B事件§!和§O活动§!上，以浏览更多细节。界面右上角的按钮用于打开§Q计划评审技术§!的决议菜单，可以与当前查看的§Q计划评审技术§!§Y网络图§!进行各种交互选项。窗口左侧显示了当前导弹设计的研发进度。\n点击不同§Y网络图§!中的任意§B事件§!均会打开其所在的网络图，以进行更仔细的分析决策。完成研发项目需要完成四个网络图：§B电子系统§!、§R导弹弹体§!、§G再入飞行器§!、§I导弹测试§!。每个§Y网络图§!的结构和需要完成的§O活动§!均不相同，建议你优先聚焦于耗时最长的§O活动§!之上，原因在于削减这些活动的耗时能够最大幅度地缩短研发所需时间。\n活动会在§W预计完成时间§!归零时完成。依照§i美国海军特别项目办公室§!于§Y1957年§!的规定，§W预计完成时间§!的计算公式为：（§G乐观完成时间§!+§R悲观完成时间§!+4×§B最可能完成时间§!）÷6。\n\n在§Q冰人导弹研发项目§!中，§O积极关注工程进程§!而非沉迷微操是保证项目成功的至关重要之处。§!"
