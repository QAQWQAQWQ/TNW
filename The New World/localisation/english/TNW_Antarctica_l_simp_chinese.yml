 Antarctica_GUI_AAA_Op90_Incident_Desc_6_Active:0 "    南极大陆有一种宛若虐待狂的幽默感，一辆狗拉雪橇囫囵陷进了它的血盆大口，8只雪橇犬的悲鸣在冰天雪地之间回响。犬只是南极至关重要的向导，它们的损失可能会危及南纬90行动的进行。我们可以试着拯救狗和雪橇上两天的补给，也可以尽快将犬只救出；或者帮助它们摆脱痛苦，又或者……放任它们死于冻寒。"
