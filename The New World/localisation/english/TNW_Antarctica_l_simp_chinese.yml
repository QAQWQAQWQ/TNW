 Antarctica_GUI_AAG:0 "国家机密测试中心"
 Antarctica_GUI_AAG_Info_Text:0 "§r新施瓦本§!存在的价值，在数年时间里发生了极大的变化。作为殖民国家的尝试失败后，我们的领地有了武器试验场的新用途。南极大陆寒冷的环境与磁场干扰使间谍飞机的飞行变得格外困难，广阔而贫瘠的冰原冻土给了我们足够的空间避开§QOFN§!与§e共荣圈§!的侦测。"
 Antarctica_GUI_AAG_Entry_Title:0 "[get_Antarctica_GUI_AAG_Entry_Title]"
 Antarctica_GUI_AAG_Entry_Title_1:0 "§r霍顿Ho-229寒带改型§!"
 Antarctica_GUI_AAG_Entry_Title_2:0 "§s梅塞施密特P.1110新世代战斗机§!"
 Antarctica_GUI_AAG_Entry_Title_3:0 "§LMBB-Bo-115恶劣条件测试§!"
 Antarctica_GUI_AAG_Entry_Title_4:0 "§g霍顿Ho-XVIII发动机升级试验§!"
 Antarctica_GUI_AAG_Entry_Body_Text:0 "[get_Antarctica_GUI_AAG_Entry_Body_Text]"
 Antarctica_GUI_AAG_Entry_Body_Text_1:0 "俄罗斯北部的军事任务暴露了霍顿Ho-229在高度严寒环境下的设计瑕疵。如果当地再次爆发大规模冲突，对飞机进行寒冷天气改型显得尤为重要。"
 Antarctica_GUI_AAG_Entry_Body_Text_2:0 "虽然梅塞施密特262HG-III型战机依然为祖国尽职尽责，但未雨绸缪总是不愁抢先。梅塞施密特公司的工程师已经设计了一批早期原型机，命名为P.1110，用于初步的飞行测试和数据分析。"
 Antarctica_GUI_AAG_Entry_Body_Text_3:0 "作为德国第一款专门的武装直升机，MBB-Bo-115在未经军备测试的情况下，在多场实战中得到适当的运用。有鉴于此，找出任何可能暴露的缺点，在酿成苦果之前解决它们将是万分有益的。"
 Antarctica_GUI_AAG_Entry_Body_Text_4:0 "虽然霍顿兄弟、容克和梅塞施密特的工程师们在设计上存在争议，Ho-XVIII-C-2还是出色地履行了它的职责。不过，空军总司令部表达了升级发动机的愿望，希望借此提升航程。"
 Antarctica_GUI_AAG_Progress_Bar_Title_Text:0 "当前§G完成度§!等级："
