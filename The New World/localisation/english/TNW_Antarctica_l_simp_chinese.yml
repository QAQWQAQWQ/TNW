 AAJ_Kyuhei_Suzuki_hog_desc: "§Y政府首脑\n企业统制§!\n--------------\n§L“常言道，企业是由人组成的。即使拥有先进的船舶、完美的设备，如果没有操作设备的人，企业也无法提高效率。就个人而言，所能取得的成就总是有限的、微不足道的；但是，如果每个人都团结起来，表现出一体性，就能现出无穷的力量\"。\n\n这是1953年摄津丸号冷藏捕鲸船沉没事故后，日水现任董事长兼总裁铃木九平向全日水公司发表的讲话。铃木一生都在捕鲸业工作，他曾在战前参观过欧洲的捕鲸船，经历了随后的清算和整合风暴。他是日本水产株式会社的领导者、代言人、救世主，也是日本领南极地域真正的掌权者，在东京和新京指挥着公司不断扩大的庞大业务。§!§F\n--------------\n\n\n\n\n\n\n £GFX_AAJ_Kyuhei_Suzuki_large \n\n\n\n\n\n§!"
 AAJ_Iwao_Fujita_for_desc: "§Y外交部长\n企业家长制§!\n--------------\n§L藤田岩从未踏足过南极洲。绝大多数身在南极冰海的日本人都与这位日本捕鲸协会理事长兼大日本水产会会长素未谋面，但藤田却在东京办公楼的一角监督主宰着他们的命运。他的签名拥有独立于日本水产株式会社和海军的效力，是日本南极冒险所有物流、运输和许可证的幕后推手。这样的独立源于藤田数十年的企业谈判经验，他在共荣圈政商两界都拥有庞大的关系网。在他的办公室里，藤田看到了日水不可持续、不断膨胀的贪婪。他平静而沮丧地回忆起战争，彼时，互相竞争敌对的海产船队曾合为一体，即使那时光十分短暂，但也只为了唯一的目标而服务：帝国。§!§F\n--------------\n\n\n\n\n\n\n £GFX_AAJ_Iwao_Fujita_large \n\n\n\n\n\n§!"
 AAJ_Nakai_Haruo:0 "中井春雄"
 AAJ_Nakai_Haruo_eco_desc:0 "§Y经济部长\n企业国家§!\n--------------\n§L每个组织都需要有一个“操盘手”，对于日水而言，副总裁中井春雄就是这样一个角色。中井长期供职于日水，见证了会社在战后的飞速发展，成长为日水的设计师。中井是一位充满活力、能力出众的领导者：他积极推动冷库冷藏部门的扩张，监督了东京郊外巨大的晴海工厂建设，缔造出日水的一大心脏。长期以来，他始终主张公司利益的多元化，这种态度与铃木总裁相左——后者更希望采取传统方法，专注于扩大日水的核心业务：捕鲸和捕鱼。随着时间流逝，铃木老爷子退休的可能性正越来越大，总裁宝座将会留给充满活力、雄心壮志的人：像中井春雄这样的人。§!§F\n--------------\n\n\n\n\n\n\n £GFX_AAJ_Nakai_Haruo_large \n\n\n\n\n\n§!"
 AAA_Gustavo_Adolfo_Giro_hog_desc:0 "§Y政府首脑\n军政府§!\n--------------\n§L古斯塔沃·阿道弗·希罗生于阿根廷科尔多瓦，1953年12月毕业于国家军事学院，授衔少尉。当时，普哈托将军刚刚建立了阿根廷的第一个南极基地。希罗性格沉默寡言，处事兢兢业业，自从军校毕业后，他参加过阅兵，也接受过滑雪和冬季生存训练。早年，希罗曾担任多处阿根廷南极基地的指挥官，并在瓜分南极之后多次展开探险活动，探索阿根廷的领土。不幸的是，由于外国活动日益频繁，近来对南极内陆的探险愈发变得挑战重重，有时甚至会让人丢掉性命。当下，希罗正担任莱亚尔上校的副手，两人共同计划着前往极点的艰险征程。§!§F\n--------------\n\n\n\n\n\n\n £GFX_AAA_Gustavo_Adolfo_Giro_large \n\n\n\n\n\n§!"
 AAA_Juan_Carlos_Beltramino_for_desc:0 "§Y外交部长\n社会自由主义§!\n--------------\n§L胡安·卡洛斯·贝尔特拉米诺于1948年进入国家外交事务学院，此后历任外交官及驻外大使，专司南极事务。贝尔特拉米诺撰写过多篇有关南极领土边界和外国主张的论文，例如他的毕业论文《阿根廷-智利在南极洲的界限问题》。虽然他与智利的外交谈判最终演变成了瓜分南极，但贝尔特拉米诺凭借高超的外交技巧，确保了阿根廷对南极的大部分主权要求，特别是原属英国的宣称领土。如今，贝尔特拉米诺的大部分时间都花在与智利外交官打交道上，后者坚称阿根廷侵占了智利在南极大陆上的合法领土。目前为止，在贝尔特拉米诺的努力下，智利方面尚未取得过什么实质性进展。§!§F\n--------------\n\n\n\n\n\n\n £GFX_AAA_Juan_Carlos_Beltramino_large \n\n\n\n\n\n§!"
 AAB_Herbert_Jankuhn_hog_desc:0 "§Y政府首脑\n秘传纳粹主义§!\n------------\n§L作为一名考古学家，赫伯特·扬库恩于1938年首次与祖先遗产学会取得联系，为他对海泽比维京人定居点的考古发掘工作寻求帮助。他对这一领域的深刻见解给海因里希·希姆莱留下了深刻印象，两人在扬库恩加入纳粹党和党卫队后建立起了友谊关系，并最终在40年代初成为祖先遗产学会的挖掘和考古部门负责人。在二战期间及之后，扬库恩在德国的数所知名大学中担任教授。后来，他的职责扩展到了检验德国新征服领土上的学者和研究者的“忠诚性”，他还经常与党卫队成员一起在野外进行考古探险活动。因此，对希姆莱来说，扬库恩是陪同祖先遗产学会南极分部考察冰封大陆的最佳人选。§!§F\n------------\n\n\n\n\n\n\n £GFX_AAB_Herbert_Jankuhn_large \n\n\n\n\n\n§!"
 AAB_Yrjo_von_Gronhagen:0 "于尔约·冯·格林哈根"
 AAB_Yrjo_von_Gronhagen_for_desc:0 "§Y外交部长\n秘传纳粹主义§!\n------------\n§L作为芬兰贵族出身的人类学家和外交官，尤尔约·冯·格林哈根长期以来一直在祖先遗产学会中节节攀升。在格林哈根还是个就读于赫尔辛基大学的学生的时候，一家德国报纸发表了他撰写的一篇关于卡累利阿民俗和传统的文章，就这样，他第一次引起了海因里希·希姆莱的注意。希姆莱邀请这位年轻的学生来为祖先遗产学会工作，很快，格林哈根就率领探险队前往卡累利阿，记录原始宗教的传统和关于魔法的描述。然而好景不长，在与祖先遗产学会主席瓦尔特·乌斯特发生争执后，乌斯特将他从负责人的位置上解职，当时二战还未爆发。格林哈根通过担任芬兰驻柏林大使馆的专员，为负责审查和信息监管的芬兰国家信息局工作，从而证明了自己的价值。战后，格林哈根继续参与学会的日常事务，在组织内仍拥有不小的影响力。现在，他被派往极南的冰封大陆，协助学会的南极分部开展研究工作。§!§F\n------------\n\n\n\n\n\n\n£GFX_AAB_Yrjo_von_Gronhagen_large \n\n\n\n\n\n§!"
 AAI_Giovanni_Torrisi_desc: "在一般人看来，像乔瓦尼·托里西海军上将这样的人物居然会出任近来成立的意大利南极研究区负责人着实令人费解，毕竟地处天涯海角的南极大陆无关紧要。托里西曾长期服役于意大利皇家海军，在第二次世界大战及其后的战争中立下赫赫战功。远赴南极是对他某些不为人知的失败的惩罚，还是他在意大利政府复杂迷宫中失宠的标志，抑或者，他只是一名南极的狂热爱好者？\n\n但如果向水面之下窥探，托里西的任命就变得不那么怪异不祥了：比如说，他是秘密国际天主教组织“共融与释放运动”的成员，传言这个组织与全球各地的阴谋活动多有关联；或者，也可以考虑一下他与埃米利奥·马塞拉海军上校的暗中会面，这位性格多变、神秘莫测的阿根廷南极海军指挥官同样也是“共融与释放运动”组织的成员。在意大利最遥远的边疆，一切都不像看上去那样简单，海军上将在此现身无疑暗示着，一个巨大的阴谋正潜伏在看似平凡的南极研究目标之下，托里西只是浮出海面的冰山一角。"
 POLITICS_AUGUSTO_RADEMAKER_DESC: "即使身处世界之底，奥古斯托·拉德马克海军上将也在竭尽全力继承巴西海军的光荣传统。拉德马克1903年生于里约热内卢，父亲是德裔，而母亲则是丹麦裔。1927年，拉德马克加入海军。从那时起，他开始在巴西海军中慢慢升职，在学习航海技术的同时磨炼自己的政治阴谋技巧。他直言不讳的极右派信仰有时甚至近乎于公开的整合主义言论，即便是在与他结盟的军方强硬派看来，拉德马克也是毫无疑问的激进派。但这并不妨碍他不断晋升，直至成为海军上将，在武装力量中培植出显著的影响力。\n\n在龙虾战争中，海军上将指挥巴西舰队的英勇事迹巩固了他不可忽视的地位，推动他进入了在南十字星行动中指挥巴西南极探险队的候选名单。尽管任务十分艰巨，但拉德马克对这次行动寄予厚望，希望能以此将自己的军事生涯提升到崭新的高度。有人甚至放言，他将重新提出巴西对西侧阿根廷南极领土的要求，而其他人则认为，即使是拉德马克上将也肯定不会如此大胆。只有时间会告诉我们，南极洲寒冷的冰风会将这位雄心勃勃的海员带往何方。"
 AAF_Jacques_Cousteau_for_desc: "§Y外交部长\n民族保守主义§!\n--------------\n§L发明家、冒险家、潜水员、海洋学家、水手、间谍、导演、大名人：从各种意义上来说，雅克·库斯托的生活与其说是现实，还不如说是幻想。他在法国海军情报部门度过了一段神神秘秘的日子，在他强硬派法西斯蒂哥哥皮埃尔与维希政界人脉的帮助下，他挺过了抵抗组织的谣言，获得了政府支持，为自己开拓性的海洋和电影事业赢取了资金。库斯托对海底世界那令人敬畏的描写让他成为了少数几位能在全世界都被认可的名人之一，也受到了冷战各方的一致好评。\n\n但他近期的作品很可能会让他精心构建的公众形象毁于一旦。无论是为了名誉、金钱、还是单纯为了帮兄长一个忙，雅克都已经成为了团结协定公关计划中的一颗棋子。他将凯尔盖朗群岛作为自己最新摄影作品的背景，试图模糊这一切设施的军事目的。小库斯托始终对媒体保持着沉默，在兄长警惕的注视中继续着自己在卡里普索号上的冒险。§!§F\n--------------\n\n\n\n\n\n\n £GFX_AAF_Jacques_Cousteau_large \n\n\n\n\n\n§!"
 AAF_Jacques_Dequecker_hog_desc: "§Y政府首脑\n殖民政府§!\n--------------\n§L雅克·德凯克从法国在二战的失败中走了出来，它拥有当代的法国人中十分难觅的品质：乐观。但对他而言，乐观并不容易：他曾是尼日尔殖民地的行政长官，也是欧洲应当肩负起在全世界传播文明、扶助弱小民族这一崇高使命的忠实信徒，目睹法兰西帝国在各条战线上的溃败于他而言无疑是侮辱和冒犯。\n\n乐观主义让他加入了格扎维埃·里歇尔率领的1955年凯尔盖朗群岛探险队，带他来到了最遥远的冰封海岸。德凯克窥见了重建法国南部领地统治的第一步，他想象着阿黛利地寒冷的海岸线，冒着流放大陆的愤怒，将三色旗插在冰盖之上。但多年来，他一直都停留在第一步，毫无寸进。他坐在德意志殖民帝国，而非法兰西帝国补给站的官僚办公室里，望向窗外，做着白日梦，幻想过去的辉煌和法兰西未来的渺茫希望。§!§F\n--------------\n\n\n\n\n\n\n £GFX_AAF_Jacques_Dequecker_large \n\n\n\n\n\n§!"
 AAV_Legal_Infallibility: "无懈可击的法理"
 AAV_Legal_Infallibility_desc: "随着瓜分南极态势的升级，OFN鼓励东岸共和国对德属新施瓦本中原毛德王后地的部分地区提出了主权要求，其依据理由是极地前沿理论。\n\n1954年，一支小规模的乌拉圭探险队在海岸插上了旗帜，进行了制图，并评估了当地石油和矿藏的理论前景。然而，在他们离开后仅仅数周之内，德国人席卷而过，建立起了永久性的存在，这让乌拉圭新兴的南极团体感到绝望。但是，无论强权怎么说，乌拉圭都拥有这些土地的合法权利。"
 AAV_Skeleton_Crew: "精干部队"
 AAV_Skeleton_Crew_desc: "身处南极大陆的乌拉圭人明白，他们的处境岌岌可危。乌拉圭热情地加入了由OFN领导的南十字星行动，对南极进行去纳粹化。行动的西线部队轻而易举地占领了空无一人的里彻地，由于后勤问题，这里的德国驻军似乎都撤回了席尔马赫站。\n\n现在，南十字星行动已经在德军的顽强抵抗下告终。乌拉圭的南极领地被夹在了新施瓦本和巴西领地之间，而巴西更关心西面背信弃义的阿根廷。乌拉圭是南极军事力量最薄弱的一方，一旦纳粹卷土重来，最先被针对的一定是乌拉圭。我们与战士们同在，他们需要一切可能的帮助。"
 AAV_The_Creeping_Dark: "黑暗渐来"
 AAV_The_Creeping_Dark_desc: "巴西和乌拉圭都是独力参与南十字星行动，并未有美国乃至其他OFN成员国的直接参与。尽管最初没有遇到阻力，但各方都意识到，德国即将重返南极大陆。\n\n穆索教授和特雷维索上校不愿意让OFN的人员和物资在乌拉圭处集结，他们希望纳粹会忽视他们，将目光投向东方的希特勒地。然而，恐惧是十分有效的推动因素，随着极夜来临、国防军步步紧逼，人们的想法也可能会发生改变。"
 AAR_Misplacement_to_Correct: "亟待修正的错位"
 AAR_Misplacement_to_Correct_desc: "秩序与进步的旗帜飘扬在冰面上，成为国际去纳粹化行动的众多旗帜之一。但是，对世界法西斯主义的进攻却将巴西士兵引向了错误的落脚点，他们现在正身处乌拉圭的地盘上。根据极地前沿理论，巴西真正的合法领地位于西方，处于阿根廷人占领之下。\n\n虽然仍在寻找属于自己的立足点，但巴西利亚一心想要驱逐霸占着其合法领土的外国势力。作为南美冷战中最荒凉的前线，巴西属南极的未来充满了不可避免的冲突。"
 AAR_Borrowed_Time: "时日不多"
 AAR_Borrowed_Time_desc: "巴西拥有南美洲最强大的军事力量，延续着自二战以来与同盟国乃至OFN联合行动的传统，先进的喷气式飞机和威武的战舰预示着巴西在南极舞台的胜利登场。然而，当第一批士兵冲上岸时，寒冷的现实也随之而来。\n\n御寒衣物短缺、雪地车陈旧不足、极地条件下的居住站不可靠：南美洲的精兵强将完全没有南极装备，他们不得不挤在一起取暖，眼看着白昼越来越短，希望战时合作精神意味着急需的OFN支援正在路上——在漫长的极夜降临之前……"
 AAR_Task_Force_Antarctica: "南极特遣舰队"
 AAR_Task_Force_Antarctica_desc: "如果没有英勇的南极特遣舰队作为桥梁，巴西就不可能踏足这片冰封大陆。经过龙虾战争的磨练，他们无所畏惧地闯入南冰洋的黑暗水域，毕竟，有巴西海军的旗舰、现代化的米纳斯吉拉斯号航空母舰掌舵，又有什么好害怕呢？\n\n可尽管如此，战舰的钢铁之躯正在日渐消逝的阳光下一天比一天黯淡无光。从米纳斯吉拉斯号向岸上海军陆战队运送重要补给的直升机飞行员发觉，空勤的周转时间越来越长，蔓延的冰层正在将特遣舰队推离海岸——他们最致命的敌人是海冰，而不是德国战争海军。窗口正在一点一点地闭合。"
 AAI_Distant_Outpost: "帝国最遥远的哨站"
 AAI_Distant_Outpost_desc: "加林德斯岛是孤寂大陆上的一片孤岛，岛上驻军是意大利帝国最遥远领地的管理者。这里降雨不断，补给品少之又少，与祖国的唯一联系必须经由意大利驻布宜诺斯艾利斯大使才能转接。\n\n罗马子民们蛰伏起来，保卫这地图上的悲惨一角。至于意大利为什么能守住这里，究竟是因为法西斯不屈不挠的意志，还是因为他们的皮靴和脚下的冰冻在一起了，连他们自己也说不清楚。"
