 Antarctica_GUI_AAA_Decision_Secrecy_AAC_Small:0 "包围奥伊金斯站"
 Antarctica_GUI_AAA_Decision_Secrecy_AAC_Small_desc:0 "智利飞地奥伊金斯站顽固地留在特里尼蒂半岛上，这里成了他们的侦察基地。普哈托准将建议切断其侦察队的巡逻路线，从陆上包围它，阻止智利人的行动。"
