 Antarctica_GUI_AAO_Invasion_Info_Text:0 "随着§r德国内战§!的爆发，德国通往其§W极南领地§!的补给线已然中断。虽然我们无法完全评估§r新施瓦本§!的内部情况，但根据侦察小队近来的报告，其驻军规模已相较之前有所缩减，派出的巡逻队也愈发稀少。有鉴于此，§Q参谋长联席会议§!已经批准了计划于§Y今年三月§!入侵§r新施瓦本§!的§Q南十字星行动§!。由于我们尚不确切了解§r德军§!战力以及§r新施瓦本§!是否拥有§K核武器§!的可能性，局势变得十分微妙，因此无法对其展开全面入侵。故而，本次行动的主要目标是夺取§r阿道夫·希特勒元首海岸§!的边界地区。"
