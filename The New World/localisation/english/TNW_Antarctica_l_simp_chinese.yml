 AAA_THENEWORDER_DESC:0 "阿根廷在南极洲的活动最早可以追溯到20世纪初，那个南极探索的英雄时代，他们在几个外围离岛上建立了一些小屋。随着同盟国在第二次世界大战战败，英国对南极的宣称也被剥夺了。数年之后，阿根廷也想如法炮制。阿根廷宣称对几个小岛拥有主权，岛上有数个现已不复存在的英国科考站点，而恰好智利也宣称对该地拥有主权。智利人挑起了外交争端，而美国也参与其中，此事即为瓜分南极洲的滥觞。\n\n经过谈判，阿根廷获得了其所要求的相当一部分土地，但在部分前英属领地的控制权上，双方仍然存在分歧。1958年的斯尼佩岛之战中，阿根廷海军夺取了争议地区，谈判破裂，阿根廷在南极洲获取了大片领土。智利的南极领地则被压缩到仅有西部一隅，因此愤愤不已。"
 AAB_THENEWORDER_DESC:0 "祖先遗产学会南极分部是南极俱乐部的最新成员，它在由勃艮第骑士团国建立的，位于新施瓦本西部的一个小基地中活动。虽然官方层面上来说，它不是像南极大陆上的其他五个政权那样的所谓“南极领地”，但驻扎在南极洲的祖先遗产学会成员和党卫队们并不打算听从迈尔的命令。在学会终身主席沃尔弗拉姆·西弗斯的领导下，贝格尔海姆的科考队员们只听从希姆莱的命令。\n\n目前，祖先遗产学会中只有一部分人在做实地研究，他们的目标很简单：进行考察和实验，从科学上证明雅利安人种的优越性，并找寻到支持冰宇宙论的证据。西弗斯和他的手下希望他们能解开埋藏在南极冰层下的秘密，因为他和南极洲的其他党卫队成员知道，希姆莱不会允许他们空手返回勃艮第的。"
 AAC_THENEWORDER_DESC:0 "二十世纪初，智利在南极活动的历史就开始了，当时他们在南设得兰群岛为捕杀海豹与鲸鱼的渔民建起了一个小小的港口。但对智利政府来说不幸的是，数十年后英国人把他们对南极领土的宣称直接覆盖在了智利本该声索的地区之上。\n\n尽管智利比阿根廷人早三年就正式提出了南极主权要求，但由于仓促的谈判，南极洲争夺战以阿根廷得到大部分前英属领地而告终。斯尼佩岛之战后，智利失去了更多，争议领土悉数落入阿根廷之手。智利南极领地的现任负责人胡利奥·埃斯库德罗·古斯曼在瓜分南极争夺战洲前后都在为智利的宣称能实现而奋斗，而在智利恢复其合法的南极领土之前，他都不会罢休。"
 AAO_THENEWORDER_DESC:0 "由澳大利亚、新西兰和前法国对南极的领土宣称共同组成的OFN南极洲事务局控制着将近半个南极大陆。这里是OFN在印度洋及其周边地区的重要基地，海岸上布满了小型军事设施和海军基地。随着麦克默多核电站的建成，OFN显然会继续扩大其在南极的存在。\n\n然而，与OFN的其他成员一样，南极洲事务局完全受美国军方支配，而澳大利亚和新西兰希望在不久的将来看到一些改变。"
 AAG_THENEWORDER_DESC:0 "第三次德国南极探险队在当时只是件不起眼的小事，他们只是开展一些象征性的研究，并在挪威南极区大致地划下宣称范围。第二次世界大战爆发后，无论是宣称还是探险队都基本被人遗忘了，逐渐不为人所知。\n\n在瓜分南极洲开始后，德国翻阅了1938年探险队的旧文件，提出了对新施瓦本可行的主张。挪威专员辖区放弃了对南极洲的宣称，而德国人随后将这片领地整合进如今的管理机构之中。作为1938年探险队仅剩的人员之一，身在西南非的鲁道夫·迈尔受到召唤，在这世界之底开始了新生涯。"
 AAJ_THENEWORDER_DESC:0 "为了在瓜分南极洲中夺得他们对白濑矗地（以前被称为玛丽·伯德地）的宣称领土，日本帝国派遣了一支由冢田俊吉领导的伞兵部队来确保对新领土的控制。日本南极部控制着大陆最偏远的土地，尽管如此，它还是帮助帝国进一步加强了对太平洋的控制，并且打开了通往南美洲的大门。\n\n随着冢田俊吉的退休，此地区成为了衣笠骏雄指挥的第一空挺团训练场所的所在地，这支规模较小却训练有素的部队是南极大陆上的一支劲旅，他们时刻准备着维护乃至扩大日本帝国对该地区的霸权。"
 Antarctica_Closing_Screen_Text:0 "\n\n\n\n£GFX_Antarctica_texticon_Closing_Banner \n\n\n\n\n\n感谢您游玩§D深冻行动§!！不论玩出了什么样的结局，我们都希望您在§M阿根廷南极属地§!、§r新施瓦本§!或§QOFN南极洲事务局§!玩得愉快。如果您最终不得不§Y屈服于自然的伟力§!，那么就试着活用您学到的知识再来一局吧！没准下次情况会变得更好。如果您成功§W顶住了严寒§!，那么不妨再来一次，也可以试着体验一下其他可玩国家的内容！也许在冰层之下还有许多秘密没被发掘呢……\n\n当然了，§D深冻行动§!能在过去数年中由纸上谈兵化为现实，少不了以下充满聪明才智的人们做出的贡献：§W\n\nAgricola §!-§W §Q写手§!\nAmtrak Official §!-§W §Q写手§!\nChicagoShuffle §!-§W §Q写手§!\ndaBloodyBlade77 §!-§W §Q写手§!兼§D作曲§!\nglimglam69 §!-§W §Q写手§!\nHP OfficeJet Pro §!-§W §M代码§!兼§Q写手§!\nIntegerZ §!-§W §Q写手§!\nJames §!-§W §Q写手§!\njyanoshik §!-§W §Q写手§!\nKaisernut §!-§W §Q写手§!\nkingquayle §!-§W §Q写手§!\nKirorankin §!-§W §Q写手§!\nLightknight §!-§W §Q写手§!\nLily §!-§W §Q写手§!\nManuun §!-§W §Q写手§!\nMatthew §!-§W §Q写手§!\nNil §!-§W §Q写手§!\nOutboarduniform §!-§W §Q写手§!\nShibboleth §!-§W §Q写手§!\nShindri §!-§W §Q写手§!\nSlimeLord §!-§W §Q写手§!\nSmammyboy §!-§W §Q写手§!\nStanley Unfortunate §!-§W §Q写手§!\nSuperblobby §!-§W §Q写手§!\nTetricalus §!-§W §Q写手§!\nthashepherd §!-§W §Q写手§!\nUnemployed §!-§W §Q写手§!\nWolfslayer1917 §!-§W §Q写手§!\nxFullNelsonx §!-§W §D作曲§!\n\n§!§!\n\n§D深冻行动§!将在未来推出进一步更新，将§W南极§!和整个世界的局势关联起来，并完善这片大陆上各势力之间的交互内容。§G到时我们会通知您的！§!"
