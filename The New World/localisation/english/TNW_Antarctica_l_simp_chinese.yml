 Antarctica_Situation_Overview_GUI_tt:0 "§F这个界面可以看到其他南极领地的£Antarctica_legitimacy §G宣称点数§!、£Antarctica_militarization §R军事点数§!、和£Antarctica_supply §W补给§!，前提是我们对其有足够高的£Antarctica_texticon_INTVAL §B情报掌握度§!（§Y25§!£Antarctica_texticon_INTVAL 解锁£Antarctica_militarization §R军事点数§!，§Y50§!£Antarctica_texticon_INTVAL 解锁£Antarctica_supply §W补给§!）。\n\n此外，我们也能看到本方有多少支§Y特遣队§!，§Y特遣队§!能被派遣部署至§W南极网格系统界面§!中，在他们完成当前任务后，就能被派去执行其他任务。§!"
