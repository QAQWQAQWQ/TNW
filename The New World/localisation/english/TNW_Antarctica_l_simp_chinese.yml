 AAF_The_Brothers_Cousteau_Variant_1: "库斯托兄弟"
 AAF_The_Brothers_Cousteau_Variant_1_desc: "这里是地球上最后的未被破坏、也未被系统拍摄过的生态系统之一。自然之美随处可见，而雅克·库斯托正是那个将其带到法国荧幕上的人。雅克曾在法国海军服役，一生都在海上和海底工作，始终在探险和摄影技术领域开拓创新。\n\n他出品的各种自然题材的照片、电影和书籍在国内受到了热烈欢迎。法国政府已经批准了他的计划，让雅克搭乘卡里普索号，拍一部有关法属南部和南极领地的纪录片。但出于对他亲英立场的担忧，法国政府同样委派了雅克亲法西斯的弟弟，皮埃尔做他的助手。"
