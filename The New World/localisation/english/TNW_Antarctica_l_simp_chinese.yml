 Antarctica_GUI_AAA_Decision_Flyover_Olezza_desc:0 "由于南纬90行动的准备工作消耗了大部分的储存燃料，近来的空中侦察不得不有所减少。奥莱扎空军中校对此提出了令人信服的应对方法，即展开高度针对性的飞行侦察以减少消耗，并获取重要关键情报。"
