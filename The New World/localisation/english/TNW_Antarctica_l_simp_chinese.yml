 AAI_Kingmaker: "造王者"
 AAI_Kingmaker_desc: "尽管意大利所处的地理位置并不理想，但在未来南极大陆的权力角逐中，他们仍有可能扮演重要角色。\n\n在阿根廷南极研究所与阿根廷海军的争斗中，双方都在寻求意大利的援手，希望能借此保证未来的胜利。与此同时，加林德斯岛也扼守智利和阿根廷基地之间的战略要冲，意大利或许能因此而决定当地潜在海军战斗的走向。\n\n尽管意大利小小基地目前的状况还很糟糕，但在内外冲突中，意大利的决定性影响力已经为未来奠定了良好的基础。话说回来了，做国王固然好，但有时，做造王者的感觉也不错。"
 AAI_Hooks_Harpoons: "鲸钩和鱼叉"
 AAI_Hooks_Harpoons_desc: "虽然意属南极名义上叫做研究区，但令人震惊的事实却是，加林德斯岛上几乎没有任何实际的科学研究，除了一个显而易见的例外：意大利正急切地要填上这远在天边的前哨的资金赤字缺口，因此已经着手建立起一个庞大的新捕鲸企业，以效仿日本帝国同僚的成功经验。\n\n研究人员希望开发出最先进的技术，以尽可能低廉、高效的方法捕鲸、乃至提炼鲸鱼产品。目前，意大利正在对加工设施和港口的潜在可能地点进行评估，以在未来用最有利可图的方式来屠宰南大洋多种多样的鲸鱼。又一个国家将要加入捕杀鲸鱼的行列，它们的未来只会更加黯淡。"
