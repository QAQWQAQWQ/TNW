 AAC_The_Apex_Predator: "顶级掠食者"
 AAC_The_Apex_Predator_desc: "南极的壮阔雪原是锤炼体能的绝佳训练场，智利海军陆战队员们长期在南极的严寒环境中磨砺着自己生存技能，增强体魄。他们正逐步适应各种非常规战术和技术折中，以对抗不毛之地的严酷考验。或许终有一日，他们将能真正比肩自然之力——难知如阴、夺人性命。"
 AAC_The_Fruits_of_Diplomacy: "外交成果"
 AAC_The_Fruits_of_Diplomacy_desc: "$AAC_The_Fruits_of_Diplomacy_modifier$在踏遍半球的旋风外交之中，比利亚罗埃尔和米兰达为智利编织了一幅外交图景。他们借助错综复杂的利益和人情网络，为智属南极拉来了一群供货商和奢侈品赞助人。对牵涉其中的各方而言，他们用智利核心利益做交换的做法虽然危险，但是却成效斐然。\n\n当下，还没有人能完全预见这一系列外交行动的潜在后果，其影响尚未浮出水面。"
