 AAC_Anibal_Pinto_Santa_Cruz:0 "阿尼瓦尔·平托·圣克鲁斯"
 AAC_Anibal_Pinto_Santa_Cruz_eco_desc:0 "§Y经济部长\n改良社会主义§!\n--------------\n§L阿尼瓦尔·平托·圣克鲁斯是曾任智利总统阿尼瓦尔·平托的后人，他的著作在经济界广为人知。在动身前往南极之前，阿尼瓦尔曾是多个南美洲经济委员会和团体的成员。他受命就任智利南极领地主要是出于两个原因，其一是他深厚的经济学知识，其二则是为了防止古斯曼的外交活动预算超支。在南极工作了一段时间后，阿尼瓦尔就已经想换个地方待了，只要不是南极，哪里都可以。但政府的优厚薪水和充足的空闲时间也让他可以好好研究自己的经济理论，如果不出意外的话，这也是一件称得上愉快的事情。§!§F\n--------------\n\n\n\n\n\n\n £GFX_AAC_Anibal_Pinto_Santa_Cruz_large \n\n\n\n\n\n§!"
 AAJ_Ishida_Suteo:0 "石田舍雄"
 POLITICS_ISHIDA_SUTEO_DESC:0 "海军少将石田舍雄被自己军事生涯中最大的胜利困在了这冻土之上。在攻占阿留申群岛的战役中，石田担任水雷长，虽然战役最终的结果不尽如人意，但他表现出了坚韧不拔的精神和出众的能力，由此获得了“海军最重要的北极战争专家”的声誉。自战后晋升为中佐开始，他似乎总是在地球最黑暗、最寒冷的角落接受最阴暗的任务。\n\n当对南极洲的大瓜分威胁到帝国复苏中的捕鲸业的安全时，石田很快就得到了命令：率领一支由海军最陈旧的舰船组成的特别队远征白濑矗地。新晋海军少将出色地完成了护渔任务，但在过去的十年里，他大部分时间都只是在原地踏步。\n\n尽管石田是帝国最南端领土的监管者，担当着十分重要的角色，但他每时每刻都被困在南极地域里最偏远的基地，远离权力中心，几乎没有能力影响日属南极真正的企业霸主：日水。如果不尽快做出改变，他的军事生涯似乎注定要慢慢冻死在这寒风呼啸的南极了。"
 AAJ_Kyuhei_Suzuki: "铃木九平"
 AAJ_Iwao_Fujita: "藤田岩"
 AAJ_Takeshi_Nagata: "永田武"
 AAJ_Takeshi_Nagata_sec_desc: "§Y安全部长\n管理型国家§!\n--------------\n§L永田武是南极地域观测特别委员会的现任主席，也是南极洲科学活动的积极倡导者。战后，他于1956至57年间担任日本南极观测队队长，这是自1912年白濑矗南极探险后日本对南极大陆进行的首次考察。虽说名义上这是一次科学考察，但实际上的目的则是为了向南极部署更多的海军和捕鲸船。在观测队考察期间，永田武主导建立了昭和基地，用自己的名字给基地的猫吉祥物取名，还照顾着著名的犬兄弟太郎和次郎。1951年，他凭借与岩石磁性相关的地磁研究获得了日本最负盛名的科学奖项：帝国学士院奖。他梦想着在能南极洲的群山之中建立起一个小小的科学王国。§!§F\n--------------\n\n\n\n\n\n\n £GFX_AAJ_Takeshi_Nagata_large \n\n\n\n\n\n§!"
 AAV_Julio_Musso: "胡利奥·塞萨尔·穆索"
 POLITICS_JULIO_MUSSO_DESC: "胡利奥·塞萨尔·穆索，长久以来的南极事务热心人士，他来到放逐大陆海岸的故事有些曲折。五十年代初，他运用极地前沿理论编纂了有关乌拉圭可能对南极洲提出主权要求的著述。穆索是1954年乌拉圭南极科考队的热烈支持者，德国侵占乌拉圭合法领土的行为更是让他愤怒不已。\n\n1956年，乌拉圭灰色恐慌爆发，智利和阿根廷对南极洲的关注日益攀升，穆索便与同侪卡洛斯·特拉维索·费尔南德斯海军上校合作建立了乌拉圭南极合作委员会。后来的年月里，他领导着这个私立业余组织，将其转变成为了更加专业的乌拉圭南极研究所。1958年，斯尼佩岛之战爆发，乌拉圭国防部便顺势在1961年将研究所收入麾下，研究所的资金和设施能力得以大大扩展。\n\n然而，乌拉圭的主张领土范围处在新施瓦本的掌控之下，乌拉圭根本无从维护其合法公正的权利——直到OFN展开南十字星行动，乘着新施瓦本最黑暗的时刻，巴西和乌拉圭近乎兵不血刃的夺取了德属领地的西部地区。可是，与美国主导的OFN合作让穆索感到有些不自在，但这就是奇异的时代，带来了更加奇异的伙伴。穆索意识到，时间并不站在他这一边：德国终将大举重返南极大陆，只是早晚而已。"
 AAF_Xavier_Richert: "格扎维埃·里歇尔"
 POLITICS_XAVIER_RICHERT_DESC:0 "“企鹅们的长官”，这个幽默的外号反映了这样的一个事实：法属南部和南极领地上几乎没有人，常住居民只有海豹、鲸鱼、信天翁和到处都是的企鹅。呃，至少过去是这样的。这让此地的第一任海外领土行政官格扎维埃·里歇尔相当不快。他上任于1955年9月，尽管彼时世界的目光正逐渐开始向南极转移，但这位新官的三把火却很快就被那些杂七杂八的烦心事吹灭了。\n\n1958年，阿根廷和智利之间擦枪走火，斯尼佩岛之战加速了各国对南极洲的争夺，南极军事化如期而至。凯尔盖朗群岛成了中转站，德国人的物资由此滚滚流入新施瓦本。当地为数不多的法国官民震惊地看着成百上千名士兵为了保卫这条后勤通路建起了永久定居点，而里歇尔的主要任务就是尽可能让他的人不要挡住德国人的道。不过最近，他还摊上了个活儿：给雅克·库斯托和皮埃尔·库斯托当保姆，让他们拍点纪录片在团结协定内放映。虽说这小插曲对里歇尔而言也算是个短暂的放松解脱，但有时他也会觉得，自己还不如接着干企鹅大队长呢。"
 AAF_Jacques_Yves_Cousteau: "雅克-伊夫·库斯托"
 AAF_Pierre_Antoine_Cousteau: "皮埃尔-安托万·库斯托"
 AAF_Pierre_Cousteau_sec_desc: "§Y安全部长\n法西斯主义§!\n--------------\n§L皮埃尔-安托万的弟弟是世界上最著名的名人之一，但他自己的名字却常常不会为人所记起。然而，皮埃尔永远记得，正是他成就了如今的雅克·库斯托。作为一名记者，年长的库斯托自最初起就是维希政权热烈的支持者，他激情的反犹主义和强硬的法西斯文章使得他融入了新秩序。凭着自己的影响力，皮埃尔不仅迅速登上了政治舞台，而且还掩盖住了弟弟与抵抗运动之间的传闻，推动他一转成为了举世瞩目的大明星。\n\n如今，二十年已经过去了，皮埃尔-安托万的事业却一落干丈。他以前从没想过自己的未来会是如今这般，蜷缩在地球极南的一座寒冷小岛上，还得看着热衷冒险的弟弟不给巴黎政府丢脸面。然而，即使在这个最黑暗、最令人难以忍受的地方，对国家和家庭的责任仍旧压在他的身上。§!§F\n--------------\n\n\n\n\n\n\n £GFX_AAF_Pierre_Cousteau_large \n\n\n\n\n\n§!"
 AAF_Jacques_Dequecker: "雅克·德凯克"
 AAF_Jean_Sapin_Jaloustre: "让·萨潘-雅卢斯特"
 AAF_Jean_Sapin_Jaloustre_eco_desc: "§Y经济部长\n军政府§!\n-------------\n§L在一个企鹅比人还多的岛上，医生迟早会对企鹅产生兴趣，这不是什么奇怪的事情。让·萨潘-雅卢斯特是一位驻扎在法属南部和南极领地的海军陆战队军医官，自1955年与其他行政管理人员一起抵达凯尔盖朗群岛以来，他就开始记录群岛野生动物的行为活动。他自愿逃开沉闷的大都会，前往人类世界的边疆探求秘密。\n\n在照看驻军的同时，雅卢斯特也在巴黎出版了自己的著作，引起了科学界的兴趣。然而，1958年斯尼佩岛之战后，德军到来给法兰西港埋下了紧张的隐患，萨潘-雅卢斯特也未能幸免。咨询理事会内部亲德派和亲英派之间的对立正日益加剧，他身为无党派医生的角色只会引发双方愈来愈多的猜疑。§!§F\n--------------\n\n\n\n\n\n\n £GFX_AAF_Jean_Sapin_Jaloustre_large \n\n\n\n\n\n§!"
 Prefet_des_Alfreds:0 "企鹅的长官"
 AAF_Logistikbasis_Kerguelen_Variant_1: "凯尔盖朗物流基地"
 AAF_Logistikbasis_Kerguelen_Variant_1_desc: "凯尔盖朗群岛现今是德属新施瓦本补给线的重要一环。主岛格朗特尔岛上坐落着一座活跃的军事基地，取代了旧日的自然保护区。德国士兵在此驻扎，动物栖息地早就被扫了个干净。但真正令里歇尔和他的人民震惊的是，与其说他们的首府法兰西港是一座法国城市，它其实更像是一座德国城市。只要德属南极还继续需要补给，这种情况就不太可能发生改变。"
