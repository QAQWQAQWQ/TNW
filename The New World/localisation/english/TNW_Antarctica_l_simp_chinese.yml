 Antarctica_GUI_AAA_Op90_Incident_Desc_19_Active:0 "    南纬90行动迎来了第一桩真正的考验：南极大裂谷。在我们和索夫拉尔基地之间，横亘着一道布满冰隙和雪脊的危险断层，哪怕只是极为微小的错误都会让我们的征途就此画上句号。我们可以派出一辆雪橇去寻找第82巡逻队留下的标记；当然也可以派出几个人、一辆雪地车，或者豁出去冒险，把整个车队都派出去。"
