 Antarctica_GUI_AAA_Decision_Secrecy_AAO_Small:0 "散播伪造文件"
 Antarctica_GUI_AAA_Decision_Secrecy_AAO_Small_desc:0 "在喜欢偷看信函这件事情上，美国人对敌人和朋友一视同仁。普哈托准将和希罗上尉制定了一项计划，向乌斯怀亚发送电报，讨论虚构的沿海殖民计划，混淆美国人的视听。"
 Antarctica_GUI_AAA_Decision_Secrecy_AAO_Small_cost_tt:0 "£Antarctica_texticon_INTVAL [AAO.GetFlag] §B2§!"
 Antarctica_GUI_AAA_Decision_Secrecy_AAO_Small_cost_tt_blocked:0 "£Antarctica_texticon_INTVAL [AAO.GetFlag] §R2§!"
 Antarctica_GUI_AAA_Decision_Secrecy_AAO_Small_effect_tt:0 "对§QOFN南极洲事务局§!的机密性将§G提高§!§Y2§!。"
 Antarctica_GUI_AAA_Decision_Secrecy_AAO_Big:0 "监视斯托宁顿岛和锡格尼岛"
 Antarctica_GUI_AAA_Decision_Secrecy_AAO_Big_desc:0 "尽管我们对斯托宁顿岛和锡格尼岛拥有合法的主权宣称，但OFN南极洲事务局当下实控这里，并设有前哨站点。毫无疑问，他们一直都在利用这两处岛屿监视阿根廷在南极大陆上的行动。莱亚尔上校计划以其人之道还治其人之身。"
 Antarctica_GUI_AAA_Decision_Secrecy_AAO_Big_cost_tt:0 "£Antarctica_texticon_INTVAL [AAO.GetFlag] §B4§!"
 Antarctica_GUI_AAA_Decision_Secrecy_AAO_Big_cost_tt_blocked:0 "£Antarctica_texticon_INTVAL [AAO.GetFlag] §R4§!"
 Antarctica_GUI_AAA_Decision_Secrecy_AAO_Big_effect_tt:0 "对§QOFN南极洲事务局§!的机密性将§G提高§!§Y4§!。"
 Antarctica_GUI_AAA_Decision_Secrecy_AAG_Small:0 "强化东部边境管制"
 Antarctica_GUI_AAA_Decision_Secrecy_AAG_Small_desc:0 "有时候，对邻居过于友好也不是好事。以往就有过醉醺醺的士兵在快乐的扑克牌局里向德国士兵泄露情报的事情，让我们头疼不已。奥莱扎中校会驾机巡视边境，提醒士兵们的职责。"
 Antarctica_GUI_AAA_Decision_Secrecy_AAG_Small_cost_tt:0 "£Antarctica_texticon_INTVAL [AAG.GetFlag] §B1§!"
 Antarctica_GUI_AAA_Decision_Secrecy_AAG_Small_cost_tt_blocked:0 "£Antarctica_texticon_INTVAL [AAG.GetFlag] §R1§!"
 Antarctica_GUI_AAA_Decision_Secrecy_AAG_Small_effect_tt:0 "对§r新施瓦本§!的机密性将§G提高§!§Y2§!。"
 Antarctica_GUI_AAA_Decision_Secrecy_AAG_Big:0 "贿赂德国官员"
 Antarctica_GUI_AAA_Decision_Secrecy_AAG_Big_desc:0 "胡安·卡洛斯·贝尔特拉米诺认为，由于德国领地系统性的资金不足且不受重视，可以借此向德国驻布宜诺斯艾利斯大使馆和德国极地研究学会送上重礼，暂时模糊行动计划的规模。"
