l_simp_chinese:
 SAU_Saud_bin_Abdulaziz: "沙特·本·阿卜杜勒-阿齐兹"
 SAU_Faisal_bin_Abdulaziz_al_Saud: "费萨尔·本·阿卜杜勒-阿齐兹·阿勒沙特"
 SAU_Talal_Al_Saud: "塔拉勒·本·阿卜杜勒-阿齐兹·阿勒沙特"
 SAU_Italo_Balbo_Ruler_Of_Arabia: "伊塔洛·巴尔博"
 POLITICS_SAUD_DESC: "沙特阿拉伯是片严酷之地，但沙特·本·阿卜杜勒-阿齐兹却是个出人意料的温和统治者——当然这只是相对而言，毕竟大多数君主的特质往往取决于微妙差异。然而这并非一个中庸的时代，国王脚下的土地总在悄然变迁。沙特人的信仰古老如斯，包围他们的世界却新得令人不安。\n\n这位君主成长于父王征战四方的荒芜疆域；当他被确立为王储时，父亲告诫他要侍奉真主、爱护子民。在四十至五十年代的动荡岁月里，他竭尽全力推进既定的教育与基建改革，引领沙特步入现代世界。与饥渴扩张的意大利帝国达成的仓促协议，勉强维系了阿拉伯半岛的独立——至少王室出版物如此宣称。至于帝国为何垂涎这个看似一无所有的国度，从未有沙特人提出质疑。\n\n局势本已趋于稳定，直到地震传感器在东部沙海下探得液态黄金。沙特石油产业异军突起，财富携着盛名与瞩目如潮水般涌来。如今国王必须在天性贪婪的列强对石油的渴求间维持平衡，同时驾驭日益躁动保守的民众。而埃及与伊拉克等邻国正保持着可疑的沉默，内部动荡的阴影已悄然逼近阿拉伯本土。\n\n沙特宫廷与君王淡漠旁观，暗中筹谋。他们摆弄着世界引擎的按钮，静待出手的良机。"
 POLITICS_FAISAL_DESC: "何为现代化？兵营中的军官或许会说是社会主义；红色王子可能认为是自由与平等理念；德黑兰的沙阿视其为西化与反传统主义——但对费萨尔·本·阿卜杜勒-阿齐兹·阿勒沙特而言，现代化无需抛弃伊斯兰与阿拉伯传统及政体，去盲目追随西方的社会主义、民主制与民族主义教条。\n\n这位聪慧干练、深得民心的年轻王子在沙特家族中迅速崛起，历任王国要职，更被父王委以外交特使重任。其才能赢得王室上下青睐，虽因恐生变数而未能越过兄长沙特继承大统，但狡黠的费萨尔非但未失权势，反而在宫廷博弈中不断壮大势力，最终演变为与沙特、塔拉勒两位兄长的正面交锋。\n\n无论巡视王国何处，费萨尔眼中始终映现着奴隶制、贫困、混乱与落后的景象；当他走出国门，满目皆是殖民主义、帝国主义与种族歧视的疮痍。穆斯林国度沦陷于对子民与信仰一无所知的征服者之手。在他眼中，种族、性别与教派不过是虚妄的藩篱——在全体穆斯林共同抗争、消除真主子民苦痛的圣战中，这些区隔毫无意义。\n\n当王座终入囊中，费萨尔视国家现代化与文明存续为至高使命。左翼人士可能诘问宪法何在，但真主的训谕岂非最完美的宪章？教士集团或会抵制改革，却无人能否认这位君主虔诚的伊斯兰信仰与振兴整个穆斯林民族的宏愿。"
 SAU_defenders_of_the_umma: "乌玛的捍卫者"
 SAU_defenders_of_the_umma_desc: "作为两圣地的守护者，沙特家族对穆斯林世界的某些领域产生了巨大影响。许多虔诚的信徒感受到西方尤其是意大利帝国主义的压迫，将沙特阿拉伯视为伊斯兰教与抵抗的支柱——这导致了如穆斯林兄弟会等组织的成立。尽管名义上是盟友，但意大利与沙特王国之间的不信任因此不断加深，两国关系正缓慢而持续地恶化。"
 SAU_salafi_ascendancy: "萨拉菲派的主导地位"
 SAU_salafi_ascendancy_desc: "自18世纪以来，萨拉菲主义在沙特文化中占据主导地位。它是一种纯粹、保守的改革运动。其创始人穆罕默德·伊本·阿卜杜勒·瓦哈卜的教诲，是权威的、国家认定的伊斯兰教形式，而萨拉菲派神职人员是沙特宫廷中有影响力的力量。信仰与政治之间的界线最模糊的地方，非沙特阿拉伯莫属。"
 SAU_ARCO_ENI_memorandum_of_understanding: "ARCO-埃尼谅解备忘录"
 SAU_ARCO_ENI_memorandum_of_understanding_desc: "当轴心国军队突袭中东时，沙特张开双臂欢迎他们——自二战结束以来，他们一直奉行与意大利合作的政策，最终达成了各自国家石油公司之间的协议。沙特重申了与意大利的联盟关系，而埃尼集团则同意与ARCO签订一项竞业禁止条约，这是贸易外交的真正杰作。作为部分现金的交换，埃尼油轮在海上运送沙特石油和贸易代理人；无论他们走到哪里，利雅得的影响都会跟随他们。"
