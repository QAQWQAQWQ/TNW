 SAU_kingdom_of_black_gold: "黑金王国"
 SAU_kingdom_of_black_gold_desc: "曾只是阿拉伯腹地一个部落的沙特政权，仰赖安拉的眷顾与石油的恩赐而时来运转。黑金从沙海中喷涌而出，仿佛无穷无尽，作为沙特经济的支柱，其重要性完全遮蔽了其他产业。得益于与意大利结盟，沙特人通过向全球兜售石油积累了巨额财富，多得不知如何挥霍。"