l_simp_chinese:
 TNO_Anarchy_ToolTip: "[GetAnarchyGUIToolTip]"
 TNO_Anarchy_ToolTip_Delayed: "§L[GetAnarchyGUIToolTipDelayed]§!"
 TNO_Anarchy_diplo_tt: "这是一片无政府地区，我们不能与之互动。"
 TNO_Anarchy_ZZZ_tt: "§o无政府状态§!"
 TNO_Anarchy_ZZZ_tt_delayed: "在蒲鲁东和克鲁泡特金等思想家提出无政府主义理论之前，无政府只有一个定义：混沌。这就是托马斯·霍布斯所说的“自然状态”，一个人人各自为战的时代，生活是“孤独、贫穷、肮脏、野蛮和短暂的”。这是人类最早经历的状态，从狩猎采集时代开始，它逐渐被抛弃，取而代之的是定居的农业生活。然而不幸的是，一些人又回到了这个状态。\n\n无论是由于纷飞战火、自然灾害还是政治动荡，世界上的某个地区不存在任何一个能够（或愿意）维护其权力的管理机构。最终的结果不仅仅是任何形式的国家走向消亡，还有任何形式的集权彻底崩溃。没有任何势力能够超越小小村庄，任何超出地方一级的行政机构和基础设施都灰飞烟灭。那些生活在偏僻村庄之外的人都成了游牧民，在躲避野兽和土匪的同时进行狩猎采集生活。这是一种不允许艺术、文化或高等教育存在的生活方式，毕竟即使是那些有心追求这些的人也忙于生存而无法投身于此。随着时间的推移，导致这场崩溃的环境可能会消失，文明可能会再次繁荣。但在此之前，这里不会有神明，也不会有主人。"
 TNO_Anarchy_ZZZ_Heydrich_tt: "§E德国无政府状态§!"
 TNO_Anarchy_ZZZ_Heydrich_tt_delayed: "§L这个世界只是一台手摇风琴，只能由天主亲自弹奏。而我们所有人都只能跟着风箱拉出的音符起舞。§!"
 TNO_Anarchy_ZZZ_Nuclear_tt: "§x核废土§!"
 TNO_Anarchy_ZZZ_Nuclear_tt_delayed: "曾经，一切都事出有因。它也许是起源于一场误解，也许出自于一次懦夫博弈，也许造就于一场可怕的战争。但它规模太大，以至于让那些活着的人别无选择。\n\n这些原因已经不复存在。那些表示关切的国家，那些做出致命决定的领导人，那些只能眼睁睁看着的百姓，都化为了尔尔泥尘。风呼啸而过，带走了几十亿人的故事、肉体与灵魂。在断壁残垣中挣扎求生的种种造物，也接连死去。\n\n人类却没有灭绝。余烬紧抓住祖先的遗物，他们惊叹着古代的奇迹与废墟，缓慢地从泥泞中翻出了团结与知识。\n\n要是他们够幸运的话，也许在未来还能犯下同样的错误。"
 TNO_Anarchy_OMO_tt: "§B东北西伯利亚的广袤荒原§!"
 TNO_Anarchy_OMO_tt_delayed: "苏联崩溃后，在西伯利亚最孤立的边缘地带没有出现任何权力继承者或是分裂国家。由于缺乏中央集权的官僚机构、基础设施、工业、大规模贸易或长途通讯来统一这个地区，这些村庄基本上恢复了几个世纪以来的生活方式：自给自足的农业、狩猎和畜牧业。当地的雅库特人、鄂温人和楚科奇人已经能够不受干涉地回归萨满教信仰，而信仰正教的俄罗斯村庄也不会来找他们的麻烦。通常人们能走到最远的地方就是另一个村庄，居民们可能要等很多年才能听到来自外部世界的一点消息。\n\n虽然这里可能有丰富的资源，但南部和西部更适宜居住的地区的军阀们觉得没有必要征服这里。广阔的面积、落后的基础设施和严冬足以阻止任何明智的独裁者尝试这种愚蠢的行动。把这里放着不管也几乎没有什么危险——大多数村庄中能够作战的都只有少数几个老人，他们甚至还带着老式猎枪。看来，除非西伯利亚人民能够以某种方式团结起来，或者被一个成功继承俄罗斯遗产的人所征服，否则他们将继续维持一贯的生活：孤立无援，生活在世界的边缘。"
 TNO_Anarchy_VIL_after_midnight_tt: "§s东北西伯利亚的死寂废土§!"
 TNO_Anarchy_VIL_after_midnight_tt_delayed: "在遥远而褪色的回忆中，在这片荒芜而偏僻的土地上，曾有着一个梦想。一个有关于和平的俄罗斯的梦想，它不受纷争与苦难的侵扰，它将作为上帝的子孙，受上帝众多仆人之一的关怀与指导。\n\n但上帝的恩惠却不足以保护他，这片土地在篡位者的统治下饱受煎熬，他用自己的名字写下了难以名状的悲剧。\n\n§x现在，这希望的摇篮中惟余毒素与死亡，因为上帝再不敢给俄罗斯一个虚假的希望。§!"
 TNO_Anarchy_DRL_tt: "§s南乌拉尔无政府地区，§!§o奥斯卡·迪勒万格§!的遗作"
 TNO_Anarchy_DRL_tt_delayed: "怪物已死。他留下的不是足以与亚历山大相抗衡的伟大帝国，而是鲜血与痛苦。\n\n迪勒万格卑鄙变态的个人兴趣在他的部下中流传甚广，但他的野心却并非如此，人们只是出于恐惧和贪婪而侍奉迪勒万格和他的封邑。国王薨逝，群盗间的忠诚亦彻底粉碎：互相敌对的盗匪们彼此争斗，争夺南乌拉尔的遗存。\n\n受害者们也没能得到喘息，尽管迪勒万格旅已不复存在，但苦难仍在继续。经久不息的战斗之中，连比村长老更有权威的新政府都无法得以建立。各个村庄只得关心自己，保护已然所剩无几的一切，免遭只相信暴力与残忍的匪徒所戕害。南乌拉尔的混乱将持久延续下去，直到未来能有外部力量为当地的无政府状态画上句号。\n\n但当下，南乌拉尔的人们不得不继续苦苦坚持，这里的生活肮脏、野蛮、短暂。"
 TNO_anarchy_NRL_tt: "§B北西伯利亚的孤立村落§!"
 TNO_anarchy_NRL_tt_delayed: "当苏联的经济学家起草西伯利亚计划时，中西伯利亚北部地区曾深受期待。公路将连接无垠的荒原与俄罗斯其他地区，工业将在富藏的矿脉之上孕育而生，城市将在曾经一无所有的地方拔地而起。随着三十年代的到来，所有这些宏伟蓝图很快化作了灰烬。铁铲对于永久冻土无可奈何，强迫劳动遍地可见。与南部的工业城市相比，这里的道路粗劣简陋，勉强联系起几个城镇和古拉格综合体。伟大卫国战争开始后，除却使用强迫劳动迅速开采最北部的矿区之外，其余发展计划几近遭到放弃。战争结束，该地区彻底失修，与世隔绝。\n\n今天，西伯利亚计划的伟大工程只余腐朽的金属外壳，默默同少数从西伯利亚南部来此冒险的人述说。古拉格已被遗弃，矿井早已荒废，建在该地区的几条道路基本已被西伯利亚的严寒所吞噬。在这一世界边缘存在的少量人烟，如今更接近于几世纪前就已存在的渔猎社会和自给自足的农业社区——在工业化短暂触及这一世界边缘之前，就已维持了数百年之久。只要俄罗斯其他地区的无政府状态继续存在，这一切都将继续下去。"
 TNO_anarchy_UZB_tt: "§n寂寥的土库曼和乌兹别克地区§!"
 TNO_anarchy_UZB_tt_delayed: "如何才能将一个民族的思想如此彻底地抹去？如何才能将一个国家、一段历史的支柱如此彻底地摧毁，甚至苏联的毁灭与之相比都要相形见绌？\n\n如果你去问阿富汗人或日本人，那么答案便是系统性地破坏每一个国家运转的支点和核心，同时把杀死他们理想的过程向全世界广播。\n\n生产链顶端的负责人在睡梦中遭到谋杀，那国家该如何维持生产？代表社会各界、负有责任义务的人凭空消失，国家又该如何制定法律？若是这些还不够，那让世界见证一场将民族的希望、英雄与象征统统炸得粉碎的大爆炸呢？\n\n你可以彻底摧毁人的精神，但一切皆有极限。达到乃至超越这极限之后，他们就将回到一个稳定、原始然而自恰的系统中去。这些地区已经回归部落制度，它们对外界——两度打破他们的世界，将一切打得支离破碎，再让他们自己收拾残局的外部力量——极度不信任。\n\n不管土库曼和乌兹别克的土地会发生什么，可以肯定的是，其他国家对他们犯下的罪行永不会得到原谅，也永不会被遗忘。"
 TNO_anarchy_MCW_Dissapearance_tt: "§J莫斯科辖区乱局§!"
 TNO_anarchy_MCW_Dissapearance_tt_delayed: "在大众文化的印象之中，“边疆”一词往往代表着短暂与瞬息万变。在这里，某个社会的文化、族群会与被视作“他者”的元素相互融合。边疆的概念中，有一对相互冲突的矛盾：一方是向外扩张、掠夺资源，以“文明”取而代之的希望；另一方则是文明土崩瓦解，被表面驯从的荒莽原野彻底吞噬的恐惧。\n\n在德国定居者最美好的空想中，荒野似乎早已被驯服，剥削开发正在顺利进行。然而，阳光猛烈、万物显形之时，此等错觉便燃烧殆尽。现实清晰无遗：殖民者的斗争对象并非任何隐喻意义上的“荒野”，而是这片土地上活生生的人民——那些德国数十年来已经戕害了数百万、未来还会继续蹂躏摧残的人民。\n\n大屠杀终于结出了令人惊惧的恶果，纳粹统治迎头撞上了新的挑战。他们一手造就了这片不毛之地，而它又反过来成了折磨纳粹的游击温床。聚沙成塔，如今，游击运动已经演变成为了需要莫斯科国防军全力镇压的总暴动。\n\n殖民地的围墙正在向内倾圮，希特勒分子建立起的边疆可能会将他们全数吞没无踪。然而，如今的莫斯科唯余堆积如山的尸骸与灰烬——故此，被困在这里的每个人都心知肚明，名为“边疆”的监牢仍将矗立。"
 TNO_Anarchy_MDM_Collapsed_Authority_tt: "§J马达加斯加政府崩溃的余波§!"
 TNO_Anarchy_MDM_Collapsed_Authority_tt_delayed: "自塔那那利佛的宪兵宣布反抗殖民政府那一刻起，法兰西国对马达加斯加的统治便宣告终结。原本的法国殖民办事处被德国设立的马达加斯加军事委员会取代，而沿海地区则被起义者统统收入囊中。然而，马达加斯加的大部分地区压根没有政府机构，有些地方甚至对岛上的剧变一无所知。\n\n现实的改变正沿着电话线传播，焦虑情绪开始在法裔种植园主与精英阶层中蔓延。在某些地区，昔日华丽的庄园与别墅一夜之间人去楼空；而在其他一些由独立大会党的共产主义者控制的地区，民众没收土豪劣绅的财产与田亩，交由地方集议处理。此外，在“非政府控制区”，审判殖民地官员的临时法庭也变得愈发普遍，但总的来说，这些地区自行其是，相安无事。\n\n然而，这种平静的自治状态长久不了，起义者与反攻倒算的帝国主义者不死不休地争抢着全岛的控制权，每一处聚落他们都不会放过。或许起义者们还会保持克制，但德国人不会吝啬暴力，与先前的法国人相比，他们有过之而无不及。那些未被战火波及的人只能等待，享受当下的片刻安宁，并为即将到来的战争做好准备。"
 TNO_anarchy_Antarctica_tt: "§W南极内陆§!"
 TNO_Anarchy_Antarctica_tt_delayed: "§W“雪花像面粉一样飘落，塞满了大地上的一切空洞与缝隙，像沙尘暴一样打在我们脸上。\n\n太阳带着模糊的边缘，羞涩地从花环状的云彩中探出头来，发出苍白而微弱的光芒。\n\n白色荒漠死气沉沉，惟有永恒寂静缭绕。云雾缭绕的淡黄色雪柱从南方席卷而来，暴风雪也将随之而至，将这片土地打磨得光洁无瑕。\n\n暴风雪是大自然的怒火，地面上的裂缝则是大自然布下的陷阱，对那些不小心的人来说，这陷阱是十足致命的。没有一个猎人能像这样把陷阱隐藏得如此完美。它的位置无法猜测，待到人或动物发觉自己踩空，拼命挣扎着想要站立起来时，已经太迟了。\n\n终于，这份寂静被行进队伍发出的声音打破了。”§! - §Y罗伯特·法尔肯·斯科特，1911年§!"
 TNO_Anarchy_GUN_tt: "§J瓜纳巴拉无政府状态§!"
 TNO_Anarchy_GUN_tt_delayed: "救世基督像被迫俯视着熊熊燃烧的城池与自相残杀的子民。瓜纳巴拉曾是卡洛斯·拉塞尔达的采邑，如今却因他的狂妄决策血流成河。当合法使用暴力的垄断权被自我瓦解殆尽，里约热内卢便如断线风筝般坠入无政府深渊。本该遏制乱局的军方因内部倾轧陷入瘫痪，竟连进入该地区都成奢望。\n\n城郊煤气厂的轰然炸裂，引发连环爆炸与失控火海席卷大都会。溃堤的水坝酿成洪灾与频发断电。直升机旋翼的轰鸣昼夜不息——伞降搜救队徒劳尝试重建秩序的行动一次次折戟沉沙。尽管大规模杀戮在三十六小时后止息，满目疮痍仍触目惊心。\n\n如今维系脆弱秩序的只有两种力量。在众多相对有序的富裕社区，天主教神职人员成为了最后的权威象征。里约热内卢主教座堂周边及主干道区域，因总主教坚持与信众共进退，竟成这座沦陷之城中罕见的净土。而在连和平时期都难涉足的贫民窟，黑帮网络与残存共产党人缔结临时同盟，用共产党提供的武器或从警局劫掠的装备，将伞降搜救队的直升机一一击落。\n\n警力早已捉襟见肘，面对乱局束手无策——除非他们正配合伞降搜救队实施某种自我灭绝计划。出城道路挤满逃亡的车辆与行人，损毁的铁路线迫使民众蜷缩在车站与教堂寻求庇护。\n\n§x当祂目睹自己守护的民众陷入如此魔障时，究竟作何感想？§!"
 TNO_Anarchy_Amazon_tt: "§J燃烧的亚马孙雨林§!"
 TNO_Anarchy_Amazon_tt_delayed: "在一个理想的世界里，巴西的混乱本该给丛林带来一丝喘息的机会，让大地与它的子民不再被工业化侵蚀，自然地茁壮生长。只是当今的世界，并非理想世界。\n\n随着政权的崩塌，所谓政府的统治早已收缩至州府一隅，广袤乡野则沦为暴力横行之地。农场主为扩张自己的领地相互厮杀，交易变成了用铅弹成交，以尸体开收据。非法采矿与橡胶掠夺泛滥成灾，不仅是贪婪本性使然，更因玻利维亚与秘鲁趁着巴西边境松散，悄然渗透，大发横财。联邦军队为应对沿海叛乱抽身离去，留下的不过是一群只忠于私有资本与杀戮能力的“贾贡索”，而千年未触的自然美景，顷刻间化作断壁残垣。印第安原住民被迫为存亡而战，他们的身份、文化与语言被逐一抹去，只为换得一把克鲁赛罗的小钱。残存城市中的片刻安宁也迅速消散：医院人满为患，难民遍地为家，补给渐趋枯竭，而时间，正滴滴答答流向末日。\n\n如今，那头“利维坦”已死，无人再能约束人的欲望。暴徒以枪为权，以杀为理，将“文明”这出闹剧送入坟墓。面对他的残酷暴力，受难者们唯一能寄望的，是库鲁皮拉的传说真实无虚——此刻，唯有奇迹，方能终结这残酷无道的轮回。"