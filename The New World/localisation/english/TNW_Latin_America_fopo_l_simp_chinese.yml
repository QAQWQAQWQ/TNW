 LATAM_cayenne.1.t: "圭亚那割胶工的辛酸"
 LATAM_cayenne.1.desc: "日复一日神经麻木的流程，直到夜色给予片刻喘息。同样的卷刃割胶刀，精准到分毫的切口，橡胶泪一毫米一毫米坠入铁桶。克莱芒藏起闭眼割胶的娴熟，唯恐旁人看出这是岁月磨就的唯一本领。\n\n当然，这非他所择。法兰西殖民者在圭亚那向无慈悲，对他这般肤色尤甚。自出生起，权贵便判他终生为奴。法属时期如此，巴西接管后亦无改观。\n\n他每日为某个巴西望族采胶，却永无资格踏入对方豪华种植园宅邸半步。最亲密的接触，是监工贾贡索的警棍。\n\n这日，克莱芒瞥见邻工异样。那人虚弱迟缓，转眼便栽倒在地。他见状冲去搀扶——这病容早现疟疾端倪，但在湿热雨林里旷工一日，便等同自断生计。呼救声未落，贾贡索的警棍已抵住后颈。\n\n“干活。”短短两字却暗藏千钧威胁。克莱芒重执胶刀，深知能活到今日全凭不做英雄。翌日，新面孔填补了疟疾患者的空缺。至于那人的结局如何？雨林从未给出答案。"
 LATAM_cayenne.1.a: "熔炉中的一根柴。"
 LATAM_cayenne.2.t: "要翻身做主"
 LATAM_cayenne.2.desc: "圭亚那社会党虽是个小型组织，却在卡宴市民心中点燃了曾经难以想象之物——变革。这片土地长久陷于主仆轮回的泥淖，当有人终于带来破局曙光时，民众自然纷至沓来。党代会上，这种民意的洪流奔涌不息。\n\n“可悲的是，我们的主人以民主灯塔自居，将民主之战火燃向异域，却吝于将这份特权施予我们。”老社会主义者利奥波德·埃德尔对着人群慷慨陈词。台下既有在工歇时分贪婪呼吸自由的劳工，也有心怀鸿鹄之志的中产职员。\n\n“巴西利亚的政客们听我们为自由和地方选举声嘶力竭，却只会要求我们‘保持体面’。”社会党创始人朱斯坦·卡塔耶接话道，殖民者居高临下的姿态他早已见惯不惊，“当他们的军靴踏在我们脖颈上时，自然可以优雅谈吐——但被践踏者如何从容？”当他将他们的心声诉诸言语，人群爆发出呐喊。\n\n“因此我们必须站得更高。”埃德尔接过话筒，“我们将向美洲国家组织申诉，争取更大自治权，争取选举自己代表的权利。这本非必要，但巴西军警和农场主的暴行迫使我们如此。”\n\n卡塔耶的言辞更为锐利：“今日我们向凶残的雅贡索说不，向政客的冷酷漠视说不，向独立与自由说是。我向诸位保证，终有一天，靴底下的声音会震破他们的耳膜！”圭亚那的一角对巴西坚定说不，震天欢呼响彻云霄。"
 LATAM_cayenne.2.a: "民主为我，而非彼等。"
 LATAM_cayenne.3.t: "已被架空"
 LATAM_cayenne.3.desc: "卡宴市政厅的主办公室里，并非坐着由人民选出的官员，而是一位外国指派的军事监督官。他的名字是安热洛·诺拉斯科·德·阿尔梅达，他不是圭亚那人民的公仆，而是巴西政府的代言人。对他而言，今天本应是平淡无事的一天——直到电话铃声响起。\n\n“我是诺拉斯科。请问是哪位？”\n\n“我叫达尔利·阿尔维斯，但我相信你应该听说过我。”即便诺拉斯科对这个名字感到陌生，对方能够掌握他的电话并打进办公室，已经足够引起他的警觉。“我只是一个普通农民，但最近有些问题……如果你允许我详细说明，也许我们可以一起解决。”\n\n“我在听。”\n\n“圭亚那社会党最近闹得很凶。作为巴西在圭亚那利益的代表，听到他们的集会上喊着那些激进的口号，要求完全独立，这着实令人担忧。我们不能在他们讨论这种叛国行为时袖手旁观。你不觉得必须采取一些措施来平息他们的怒火吗？”\n\n“阿尔维斯先生，我向您保证，我的政府正在尽全力阻止这些独立运动——”\n\n“恕我直言，你的力度显然不够。”对方的声音变得尖锐起来，“当你坐在那间大办公室里悠闲度日的时候，我已经听到其他农民在讨论他们自己的解决方案了。那些方案可不怎么好看，但如果政府不帮我们，谁又能责怪他们呢？我相信你会做出正确的决定。”\n\n电话挂断后，诺拉斯科陷入了沉思。这个人的话有多严肃，他无法确定。但无论如何，他的资源几乎为零，实际控制的能力被严重削弱。他只能祈祷这股不安的情绪能够自行平息……"
 LATAM_cayenne.3.a: "身陷困境，手中握着一颗随时爆炸的定时炸弹。"
 LATAM_cayenne.4.t: "杀死一个念头"
 LATAM_cayenne.4.desc: "达尔利·阿尔维斯数月前就“客气”地请诺拉斯科处理圭亚那社会党的事。令他失望的是，这位海军上将始终装聋作哑。此刻，阿尔维斯在谷仓里运筹帷幄，指挥佣兵们按计划行动。\n\n“想必大家都清楚，那个煽动分子朱斯坦·卡塔耶是圭亚那社会党的头目。”手下们齐刷刷点头。“他是无政府主义的走狗，对巴西毫无敬意。刺杀他是为国除害。就算不为这个，想想你们的家人——等这群疯子为满足贪欲将我的土地收归国有时，你们丢了饭碗，全家都得挨饿。”\n\n听到“刺杀”二字，有人倒吸冷气，但多数人面不改色。“线报说卡塔耶要去乡间视察，远离耳目，正好在我们的地盘。届时一枪毙命。他在哪里不重要，巴西利亚那帮人会感激我们的。”\n\n阿尔维斯察觉众人仍有迟疑，于是继续安抚：“警察向来睁只眼闭只眼，但为防万一，这次行动特别拨了封口费。事成之后，全巴西都会视你们为爱国者。现在就养精蓄锐，静候复仇的时刻。”\n\n谷仓重归寂静。这场密谋将撼动巴西，只是结局恐怕与策划者设想的截然不同……"
 LATAM_cayenne.4.a: "鲜血驱动着历史的车轮。"
 LATAM_cayenne.5.t: "无可挽回"
 LATAM_cayenne.5.desc: "绝密\n致安热洛·诺拉斯科·德·阿尔梅达海军上将办公室\n\n卡宴——政治动荡加剧\n\n昨日，圭亚那社会党领袖朱斯坦·卡塔耶遭遇未遂刺杀。据报，其于乡间友人宅邸考察期间遭多名身份不明者突袭，歹徒开枪射击后纵火焚屋。\n\n所幸卡塔耶被贴身警卫从火场救出，目前伤势稳定住院观察。多方怀疑此案系农场主达尔利·阿尔维斯麾下佣兵所为。然当地警方对此案异常缄默，仅公开声明“调查仍在进行”。\n\n我方情报显示，警方已收受多名农场主贿赂以消极办案，案件恐将不了了之。\n\n更紧迫的是，此次刺杀引发大规模骚乱。原本温和派人士纷纷转向激进独立立场。令人担忧的是，随着圭亚那社会党支持率飙升，其呼吁就独立问题举行公投的提案，正于美洲国家组织中获得愈多声援。\n\n贵方政府之举措及未来动向，请静候我方进一步研判。\n\n秩序与进步"
 LATAM_cayenne.5.a: "读完报告，诺拉斯科把脸深埋进掌心。"
 LATAM_cayenne.6.t: "无法拒绝的提议"
 LATAM_cayenne.6.desc: "[BRA.GetLeader]刚刚入驻总统办公室不久，洛特的烂摊子就已经摆到了他的办公桌上。不管他对洛特有何看法，当得知这位前总统在圭亚那的政策时，[BRA.GetLeader]只能长叹一声。即便其中有些部分他觉得勉强合理，但安排那个傻瓜诺拉斯科负责，只会把政策的可行性破坏掉。\n\n他翻阅报告，目光扫过秘书已经标注的关键信息：“美洲国家组织对卡宴局势表示关切。我们已经收到圭亚那社会党代表的关切意见，但近期的骚乱证明了采取紧急行动的必要性。”\n\n“即刻起，美洲国家组织将向巴西政府发出邀请，协作开展圭亚那独立公投的安排。” 这一点没有明说，但暗含的威胁却足够明显——如果拒绝，南美将视巴西为弃儿。“我们期待新当选总统的回应，并希望能建立富有成效的合作关系。”\n\n[BRA.GetLeader]知道自己无法与美洲国家组织抗衡。无论是从个人立场，还是政党意见，他都没有足够的政治资本，在政府上任没多久就对抗这个美国支持的组织。既然其他选择已被排除，他只能着手起草仅剩的回应。"
 LATAM_cayenne.6.a: "“我们期待着帮助决定圭亚那的未来。”"
 PAR_bush_war_pie_tt: "§R联合民族解放阵线§!在§Y[GetPARSelectedStateName]§!的控制权为§Y[?PAR_selected_state:PAR_Communist_Control]%§!。"
 BRA_GUC_referendum_2_decisions_taken: "我们在本轮还没有采取2项行动。"
 LATAM_cayenne_endings.1.t: "既定事实"
 LATAM_cayenne_endings.1.desc: "[BRA.GetLeader]瘫在沙发里，长腿架在茶几上，酒杯随电视声晃荡。连日操劳换来的民意答卷令他成竹在胸，此刻正是犒赏时刻——总统将音量旋钮拧到最大，让捷报震彻客厅。\n\n“随着最后这个票箱开启，赞成派已锁定绝对优势。刚刚收看的观众朋友们，这意味着圭亚那-卡宴将与巴西血脉相融，永不分离！”\n\n电视那头又传来统计赞成票时的欢呼。当然，[BRA.GetLeader]的喜悦不止于此——几小时前，卡宴那边有个手忙脚乱的助手来电，说美洲国家组织观察员认定公投程序合规合法。自此再无人能置喙。\n\n至于这结果是否真实体现民意？[BRA.GetLeader]可没打算对美洲国家组织的定论指手画脚。人家毕竟是专业机构，日理万机，自己这个外行人就别耽误人家工夫了。\n\n[BRA.GetLeader]仰头饮尽残酒，踉跄着起身。得赶紧醒酒——媒体马上就要蜂拥而至，而他正迫不及待要发表胜利演说。任期伊始就拿下如此战果，足以成为载入史册的开门红……"
 LATAM_cayenne_endings.1.a: "……巴西人举杯庆祝。\n圭亚那人，却不能。"
 LATAM_cayenne_endings.2.t: "你的财产"
 LATAM_cayenne_endings.2.desc: "日复一日的神经麻木的流程，直到夜色给予片刻喘息。同样的卷刃割胶刀，精准到分毫的切口，橡胶泪一毫米一毫米坠入铁桶。克莱芒闭着眼都能完成这些动作——毕竟余生都将如此往复。\n\n“自由公正”的黑色幽默里，他们恰是丑角。他在投票站目睹成车的巴西人越境投票，听闻暴徒敲门“建议”居民为安全留守在家，眼见工友收钱弃票。\n\n此刻他多希望自己不曾怀抱天真幻想。至少能收下贿金，反正选票本就毫无意义。可诅咒般的理想主义让他成了相信自由世界会在乎卡宴的傻瓜——他们不过是收买巴西忠诚度的“可接受伤亡”，是对抗德日的筹码。\n\n后颈灼烧着贾贡索的监视目光，疑似自己因拒收贿金而遭忌。仅存的一丝慰藉，是真正的民权斗士朱斯坦·卡塔耶仍在抗争，这点与[BRA.GetLeader]截然不同。克莱芒记得他演说时的誓言——即便归入巴西版图，为卡宴而战的火焰永不熄灭。\n\n他胸腔里跳动着最后的希冀：惟愿此次不再落空……"
 LATAM_cayenne_endings.2.a: "……惟愿余生不再是巴西财产。"
 LATAM_cayenne_endings.3.t: "真相与谎言之力"
 LATAM_cayenne_endings.3.desc: "轮胎碾过停机坪，[BRA.GetLeader]伸手理了理头发，拭去倦意。舷梯下的闪光灯如常亮起，他挂着程式化的微笑向人群挥手。前方，军政府总督安热洛·诺拉斯科·德·阿尔梅达咧嘴相迎。握手合影。\n\n[BRA.GetLeader]不曾忘却数月前欲掐死这个让局势糜烂至此的蠢货，但今日暂且休战。车队启程，寒暄，驻车，开门，镁光灯再起——别把海军上将落在车里。\n\n新闻发布会现场，[BRA.GetLeader]继续将安热洛当宠物般操控：接过大部分提问，只在政治正确时刻放他开口。整场仪式滴水不漏。\n\n记者谀辞如潮，盛赞此次公投自由公正，更称颂总统在世界民主危殆之际践行民权。此刻正是将民意付诸法律之时。\n\n安热洛获准率先签署文件。随后[BRA.GetLeader]以走秀般的姿态在条约落款，美洲国家组织主席紧随其后签下花体签名。卡宴各界代表依次签署，权作“民意背书”。\n\n最后轮到的签署者朱斯坦·卡塔耶执笔如握千钧。深呼吸后，他亲手将卡宴签给巴西。掌声雷动中，[BRA.GetLeader]与卡塔耶四目相接。后者没有鼓掌，眼中唯有一种情绪——那是对巴西总统滔天的恨意，直至视线永远错开。"
 LATAM_cayenne_endings.3.a: "[BRA.GetLeader]不知自己哪里得罪了他，难道彼此曾经见过？"
 LATAM_cayenne_endings.4.t: "生计到生计"
 LATAM_cayenne_endings.4.desc: "“给我一杯，再给咱们的大英雄海军上将满上。”达尔利·阿尔维斯鲜少这般慷慨，但独立日总归特殊。美洲国家组织那些捕风捉影的荒唐指控，不过是向暴民低头的把戏。真相如何不重要，反正他们又没实锤。\n\n“敬巴西与卡宴永远繁荣。”玻璃杯在欢呼中相撞。诺拉斯科灌下烈酒，喉头火辣也烧不穿心头阴霾——公投失败虽保住了乌纱帽，可总统的态度已经说明他前途不妙。阿尔维斯把玩着空杯，将上将的愁容尽收眼底。\n\n“愁眉苦脸干啥？该庆祝才对，那帮圭亚那刁民总算闭了嘴，咱们的生意马上就能回春。”\n\n“[BRA.GetLeader]盯上我了，开会时那眼神……”\n\n“你？有整支海军当靠山还慌什么？”阿尔维斯仰头饮尽残酒，酒液在白衬衫上洇出污渍。“真混不下去了就来跟我干，公司门口杵个战争英雄多涨面子。”诺拉斯科勉强挤出笑意。被这么一说，除了酒不够喝，似乎确实没什么可愁的。\n\n克莱芒可没这份闲心。\n\n除了夜里蜷在棚屋的片刻喘息，他日复一日重复着割胶动作。唯一变化是贾贡索的视线跟得更紧了——这是他多管闲事的奖赏。未来不敢奢望，只求眼下别再更糟。"
 LATAM_cayenne_endings.4.a: "受困于骄阳与繁星。"
 LATAM_cayenne_endings.5.t: "卡宴升起白星"
 LATAM_cayenne_endings.5.desc: "高原宫的大楼从未安静过。这里总是充斥着各部门官员忙碌的嗡嗡声。今天，比平时更为喧嚣，因为外交部的官员们已开始涌向总统府，准备迎接即将公布的公投结果。官员们围着一台收音机，聚精会神地听着卡宴独立公投的实时结果。\n\n最初的结果对亲巴西阵营来说无疑是鼓舞人心的。铅笔在纸上迅速勾画出预测的数字，但随着时间的推移，这些数字不断被修正。最终，尘埃落定，公投结果无可争议地倾向巴西，人民投票反对独立。\n\n发给总统的备忘录是数十年政治成功的巅峰。从最初的吞并到如今的公投，巴西终于收获了应得的回报，那是为了那场尚在燃烧的战争所做出的巨大牺牲。备忘录还进一步讨论了这一投票结果对外交和国防的深远影响。\n\n随着卡宴的未来已然明朗，民众情绪得到安抚，卡宴将不再成为国防资源的负担。同时，巴西政府在这一地区的立足点也变得更加稳固，在谈判中拥有了更多筹码。\n\n最终的公投带来的稳定，也为我们提供了与荷兰边境进行贸易的机会。这不仅能使新省份的经济更加繁荣，牢牢掌控局势，还为整个巴西带来了巨大的经济机遇。\n\n微笑的官员们将完成的文件整齐地摆放在[BRA.GetLeader]的桌上。"
 LATAM_cayenne_endings.5.a: "很好。"
 LATAM_cayenne_endings.6.t: "行政大楼前的反思"
 LATAM_cayenne_endings.6.desc: "自1679年落成以来，法属圭亚那行政大楼历经沧桑：耶稣会修道院、殖民政府驻地、法国总督官邸、巴西军事总督府，直至今日巴西文官政府的办公室。\n\n在此处，他们正逐渐蚕食他的故土，直至圭亚那人与巴西人的区别沦为史册注脚。卡宴永无自由之日，自由之火已彻底熄灭——那些将巴西国旗升上旗杆的西装官僚，签署了自由卡宴的死刑执行令。\n\n但朱斯坦·卡塔耶凝望飘扬的国旗，在故土窒息的绝望中，蓦然想起这座建筑的宿命。形制更迭，潮汐涨退，功用流转。正如建筑随势而变，他也必须改弦易辙。\n\n身为巴西公民，他仍保有投票与结社之权。或许无缘宣告卡宴独立，但仍可守护同胞免遭诺拉斯科与阿尔维斯之流的荼毒。\n\n当下并非沉溺绝望之时，而应效仿这栋古建筑顺势而为。抗争之路亦可另辟蹊径，组织民众方为当务之急。"
 LATAM_cayenne_endings.6.a: "世界从未停止转动。"
 LATAM_cayenne_endings.7.t: "圭亚那在哪？"
 LATAM_cayenne_endings.7.desc: "阿克里州某间酒馆里，伐木工啜饮着私酿烈酒，收音机聒噪作响。晚上七点整，音乐节目切换为新闻播报，《巴西之音》的片头曲刺破浑浊空气。\n\n他仰头灌下又一口酒液，灼烧感贯穿五脏六腑。播音员清了清嗓子，开始宣读卡宴地区公投结果——这片土地正式并入巴西合众国。\n\n“合众国”前面带的不是“美利坚”，总让人听着别扭。报道草草提及新领土上的抗议活动，仿佛士兵们征服的不过是片无名之地。\n\n醉眼朦胧的酒客们仍在消化新闻时，他踉跄冲出酒馆，狂奔回家向弟弟报喜。胡言乱语间说成巴西吞并了非洲的几内亚，半晌才惊觉自己连地理方位都搞混了。\n\n转念又开始发愁：工钱会不会因为新领地的木材涌入市场而缩水？国家版图在扩张，一夜之间发生这么多变故，实在叫人难以消化。"
 LATAM_cayenne_endings.7.a: "我得躺下休息一会儿。"
 LATAM_cayenne_endings.8.t: "烈火中燃烧"
 LATAM_cayenne_endings.8.desc: "“选票已经统计完毕；我们可以毫不怀疑地说，卡宴的未来将属于巴西。显然，民调在这次选举中大错特错……”记者的声音被外面传来的圭亚那抗议声淹没了。这不是他们所投的票；巴西正试图蒙蔽他们，就像以前那样。每一次的毒打，每一次的侮辱，每一次的谋杀。\n\n人民受够了。\n\n他们走上街头，卡宴的男女们开始为正义而游行，但这只是开始。按照他们一贯笨拙的方式——警察试图阻挡他们的道路——迅速将其压制。但今晚，不会有快速的结束。几分钟内，言语变成了拳头，少量的警力被愤怒的潮水淹没。\n\n巴西的企业成为了他们的首要目标，那些从他们的痛苦中发家致富、将独立交换为资本的商家。首先是玻璃窗被打破，但这远远不够。接着是汽油，然后是燃烧瓶。城市各地的商店前纷纷燃起火光，宛若7月4日绽放的烟花。\n\n巴西的报纸称之为“水晶之夜”；而圭亚那人则称之为解放日。巴西人散布着恐怖故事，呼吁军队干预，而圭亚那人则筑起了路障。从象牙塔里传来的是“团结”，而街头则是深深的分裂。"
 LATAM_cayenne_endings.8.a: "金钱买不到团结，团结需要努力争取。"
 LATAM_cayenne_endings.9.t: "铁蹄之下"
 LATAM_cayenne_endings.9.desc: "卡宴的破晓时分，一面新旗升上天空。绿底中央的黄色菱形被粗暴剜去，仿佛溃烂的疮疤。这面残缺的旗帜在风中瑟缩，毫无威严可言，却是他们仅有的图腾。仍有人向它投去希冀的目光，期盼终有一日能自主选择旗帜——而非再度承受强加的烙印。\n\n但今日注定不是那个日子。\n\n钢铁洪流如蟹钳合围，巴西最精锐的杀戮机器倾巢而出。装甲运兵车率先冲锋，攻城锤般碾碎街垒，奏响震慑的序曲。\n\n昔日的抗争者褪为惊弓之鸟，在异国军靴下蜷缩。零星的火种仍在跃动，却终将熄灭于更炽烈的暴虐——以最惨痛的方式。\n\n巴西军队以罗马方阵之姿碾压入城，防暴盾与步枪构筑起窒息的高墙。每寸抵抗都招致炫耀武力的镇压，杀鸡儆猴的戏码反复上演。至夜幕低垂时，卡宴街头只余橄榄绿的征服者。\n\n当旧旗再度升起，完整无瑕的徽记宣示着宗主权威。暴动的余烬被军靴踏碎，只留数十名圭亚那人如牲畜般俯卧，塑料扎带深陷腕间血肉。\n\n他们自嘲地想：巴西人若再给牲畜打上烙铁，意图便昭然若揭。幸而——或者说可悲的是——征服者尚未想到这一层。"
 LATAM_cayenne_endings.9.a: "军靴下的秩序，枪膛中的进步。"
 LATAM_cayenne_endings.10.t: "职业风险"
 LATAM_cayenne_endings.10.desc: "“海军上将，高原宫刚刚打来电话，”诺拉斯科的一个助手惊呼道，“他们下达了命令，要派军队进驻，整合计划取消了，他们在占领……”\n\n诺拉斯科的眼睛瞬间瞪大，所有的感觉在一瞬间涌上心头。愤怒，自己被人愚弄；愤怒，他们否定了他为和平所做的努力；愤怒，他正变得越来越不重要。\n\n“怎么……怎么会发生这种事？”海军上将结结巴巴地问，感觉到自己的权力正在从办公室里悄然流失。他几乎能听到直升机的轰鸣声，似乎就在耳边，随时会呼啸而来。\n\n“巴西情报和反情报局的负责人，他秘密召见了我们，表达了他对这里局势的看法，认为我们可能……在执行整合计划时不规范、不高效……”助手的话语变得模糊，诺拉斯科再也不愿听下去。他的下属竟然当面指责他不称职、不诚实。\n\n这个穿着花边的小总统，难道他不知道自己在激起什么？难道他不知道自己在和谁打交道？美洲国家组织一定会强烈谴责这种做法，称之为专制独裁——他几乎已经能听到电话铃声响起，所有的真相都会被揭露出来。\n\n还有军队。该死的军队。他简直想当面朝战争部长吐口水，然后告诉他去收拾这个烂摊子。军队不会放过这件事的，他们的忠诚毋庸置疑，诺拉斯科知道军队会让他为自己的侮辱付出代价。\n\n他叹了口气，整理了一下自己的军服，准备走出去面对即将来临的灾难。如果总统决定把扫帚交给他，他一定会好好利用……"
 LATAM_cayenne_endings.10.a: "…给任何他能碰到的人一个“狠狠的教训”。"
 LATAM_cayenne_endings.11.t: "卡宴日落"
 LATAM_cayenne_endings.11.desc: "“为巴西，为伟大的海军上将干杯！”达尔利·阿尔维斯强忍着即兴长篇祝酒的冲动，转身向救星举杯。终于熬到日落时分——再不会有圭亚那刁民闹事的紧急通报了，这页历史彻底翻篇。\n\n但海军上将迟迟未举霞多丽，仿佛被什么心事魇住。今日本该普天同庆，既然“秩序与进步”已成国训，自当全力贯彻。财源即将滚滚，权柄紧握掌中，宏图大业指日可待。\n\n诺拉斯科却心知肚明自己等不到那天——至少不是以现任身份。公投前后政府走廊的窃窃私语已说明一切。当暮色浸透窗棂，他终于将酒杯抵上唇沿，静待换岗时刻到来。\n\n克莱芒抱膝坐在前院，阴郁地望着夕阳西沉山峦。多像圭亚那的命运，他想，直坠地心的何止落日。公投期间有太多蹊跷：离谱的票差，对质疑声的残酷镇压，连美洲国家组织观察员都如坐针毡，仿佛目击罪案现场。\n\n他早学会不抱幻想。从公投伊始便知结局注定不公。但观察员们震惊的神情、国际旁观者的骚动，让他枯死的心底泛起涟漪——或许这次，圭亚那的自由真能借外力实现？"
 LATAM_cayenne_endings.11.a: "白昼退场，但黑夜哪能霸占舞台。"
 LATAM_cayenne_endings.12.t: "不受欢迎的怀疑"
 LATAM_cayenne_endings.12.desc: "针对卡宴地区公投事件，美洲国家组织发布措辞严厉的声明，对此次投票结果提出强烈质疑。这份公开声明揭露了国际社会对所谓“公投结果”的普遍疑虑：\n\n“鉴于美洲国家组织在卡宴地区公投期间未能正常履行选举监督职责，且无法独立验证投票结果真实性，秘书长办公室郑重声明：此次公投存在明显违规现象，投票率与选民总数等数据存在重大疑点。本组织合理怀疑存在以下非法行为：\n\n-选民欺诈\n-选民恐吓\n-选民压制\n-伪造最终票数与投票率\n-贿选行为\n-打压反对派及政治竞选活动\n\n基于上述违规行为与合理怀疑，美洲国家组织将要求巴西总统府立即接受合规调查。\n\n签名：美洲国家组织秘书长办公室”"
 LATAM_cayenne_endings.12.a: "坏了。"
 LATAM_cayenne_endings.13.t: "欺瞒的代价"
 LATAM_cayenne_endings.13.desc: "何塞·安东尼奥·莫拉的太阳穴突突直跳，仿佛冰锥凿击颅骨。他早料到与[BRA.GetLeader]总统就卡宴问题的通话将漫长而煎熬，却未料谎言竟能如此肆无忌惮地通过电波传来。\n\n“总统先生——总统先生，请听我说。美洲国家组织已——已仔细核查公投全程。我们发现每个环节都存在违规现象，其程度堪比多米尼加独裁政权，我绝非危言耸听。”听筒那头又传来聒噪，莫拉将钢笔在指间捻转。“作为秘书长，我已授权圭亚那政府暂时搁置——搁置公投结果，总统先生。”最后十字截断对方插话。莫拉听见[BRA.GetLeader]的声线踉跄后退，恍若挨了记右勾拳。\n\n“公投要重新举行，总统先生。”莫拉靠向椅背平复心绪，“但全程由美洲国家组织主导。我们将亲自监督流程，贵国选举官员除协助潜在主权移交事务者外，其余均无需参与”沉默须臾后传来叹息。“很好，相信贵方已明确我方立场。再会，总统先生。”\n\n次日，巴西利亚发来电报。莫拉命人直送办公室，一小时后，满脸痘痕的秘书将文件递到他手中。他展开细读：“巴西政府基于透明度原则及睦邻考量，决定接受美洲国家组织关于卡宴公投的裁决。”"
 LATAM_cayenne_endings.13.a: "再读一遍，这次要带感情！"
 LATAM_cayenne_endings.14.t: "诚实的代价"
 LATAM_cayenne_endings.14.desc: "美洲国家组织秘书长办公室是最早确认第二次卡宴公投结果的机构之一。不出所料，支持独立的一方获得了胜利。然而何塞·安东尼奥·莫拉并未将此视为大好消息——收到结果没多久，桌上的电话便急促响起。他屏退工作人员，独自拿起听筒。\n\n“我是莫拉。晚上好，总统先生。”[BRA.GetLeader]的声音似乎在强压挫败与恐惧。“是的，我已接到通报。我们的官员已经确认并复核了结果。嗯。没错。”他向后靠在椅背上，感受到听筒中渗出的焦虑。“不，总统先生。我——稍等。”\n\n他招手唤来安保人员，接过现场选举官员发来的最新报告。简报显示卡宴街头已爆发示威游行。[BRA.GetLeader]通过莫拉肩头的听筒偷听到只言片语：“示威活动”、“接近暴乱”、“警方无力控制……”当莫拉重新将听筒贴回耳边时，总统质问他是否和自己收到了同样的消息。\n\n“是的，我正保持关注。贵国警方无法控制局面吗？”对方的声音裹挟着苦涩的倔强。莫拉揉着太阳穴，猜想此刻自己的动作定与五分钟前的总统一致。“不不，只有在极端严峻的情况下才能派遣维和部队。我们可以提供协助，但——”这时又一名安保人员闯入，带来了卡宴局势进一步失控的消息。他突然怀疑，自己这次恪守章程的做法，是否让魔鬼找到了惩罚他的机会。"
 LATAM_cayenne_endings.14.a: "“好的，总统先生。我会立即下达命令。”"
 LATAM_cayenne_endings.15.t: "劳动创造财富"
 LATAM_cayenne_endings.15.desc: "标着“和平与安全”字样的M606吉普车队驶过卡宴街头，木薯摊贩与读报老人纷纷侧目。装甲车内的朱斯坦·卡塔耶——这位非裔圭亚那独立运动领袖——透过防弹玻璃扫见报纸头版清一色写着“独立”、“自治”，还配着他当选圭亚那-卡宴共和国总统的大幅照片。\n\n“幸亏公投顺利，对吧？”卡塔耶对身旁美洲国家组织驻卡宴维和部队指挥官说道。这是个美国人，但他还没记住对方名字。真奇怪，居然连名字都不知道。不过现在问太失礼，反正助理正在旧总督府（如今已改作总统府）等着自己，届时问他便是。\n\n车队绕过府邸车道中央的喷泉。这座两层的红顶建筑，立柱和阳台总让卡塔耶联想到种植园宅邸而非政府大楼。他与美国军官下车同迎接的官员们握手，在随从引导下步入会议室。\n\n过渡委员会成员悉数起立。卡塔耶点头示意众人落座，自己则在长桌首席坐下。席间有美洲国家组织代表、本地政要，还有个佩戴OFN徽章的便衣男子——简直像脑门上贴了“FBI”标签。此刻所有目光都聚焦在这位新总统身上。卡塔耶正襟危坐，努力压下嘴角的笑意。"
 LATAM_cayenne_endings.15.a: "巴西该学会适应这一切了。"
 LATAM_cayenne_endings.16.t: "投票"
 LATAM_cayenne_endings.16.desc: "《圭亚那觉醒报》－[?global.date.GetDateStringNoHourLong]\n\n圭亚那站起来了——社会党在首次自由选举斩获绝对多数\n\n（卡宴讯）在美洲国家组织代表认证下，圭亚那完成史上首次自由公正选举。圭亚那社会党以绝对多数胜选，党魁朱斯坦·卡塔耶当选首任总统，宣布将于下周任命新总理。\n\n历经法、巴殖民宗主国数十年统治后，这场大选终结了巴西当局操弄的“民主闹剧”。选举监察报告显示，选民未受胁迫且程序公正。\n\n“圭亚那人民有过很多主子，现在是当家作主的时候了。”过渡政府领袖利奥波德·埃德尔昨夜在卡宴群众集会上如是说，身旁的当选总统卡塔耶频频点头，“朱斯坦正是带领我们实现愿景的领路人。”\n\n当民众在塞佩鲁要塞前彻夜欢庆时，社会党要员已开始直面国家重建难题——尤其是巴西掠夺性开发留下的创伤。但至少如今，圭亚那终于有了真正致力于解决问题的政府。"
 LATAM_cayenne_endings.16.a: "确实……前所未见。"
 LATAM_cayenne_endings.17.t: "独立日"
 LATAM_cayenne_endings.17.desc: "克莱芒一直觉得怀抱希望是件蠢事。既然世界永远不会变好，何必自欺欺人？但公投那天，他暂时收起猜疑投了票。本以为选举会被操纵——或许确实被操纵了——但终究没能阻挡圭亚那-卡宴独立。他和万千同胞的投票创造了奇迹。\n\n“今天胜利的是圭亚那人民，而非巴西的利益集团！我骄傲地站在这里——”朱斯坦·卡塔耶拍了拍胸前伤疤，“这枚弹痕就是我的勋章，而你们才是铸就独立的铁锤！”欢呼声一浪高过一浪，现场掌声经久不息。\n\n“朋友们，我们正生活在一个非同寻常的时代！再也不会有法国或者巴西军靴踩在我们的脸上！从今往后，我们要自己选择道路，自己结交美洲盟友！”利奥波德·埃德尔的话语进一步激发了人民对自由的向往。\n\n“巴西的政客说小国注定失败，可我们最糟还能糟得过被巴西统治吗？”新一轮欢呼中，人群冲上街头高举旗帜游行。\n\n克莱芒望着远去的总统车队。希望、梦想——这些曾经无用的东西突然有了分量。抚摸工作时留下的老茧，他突然觉得，也许真能过上不用割胶的人生。"
 LATAM_cayenne_endings.17.a: "……想着想着，他笑了。"
 LATAM_cayenne_endings.18.t: "往日不再"
 LATAM_cayenne_endings.18.desc: "终于等到了这一刻。巴西军车轰鸣着驶离，直升机盘旋远去，喧嚣交响曲在克莱芒耳中只谱写出一个音符：占领结束了。若天道尚存，那些贾贡索疯子也该随之滚蛋——他如此祈祷着，却自知奢望过早。\n\n旧军撤离的扬尘未落，新军车队已驶入。聚集的人群四散涌向美洲国家组织的士兵，握手、拥抱、献吻，欢呼与歌舞如野火燎原。酒吧提早打烊以招徕新贵，鼓点取代螺旋桨声的刹那，时光仿佛凝滞。\n\n一位自称布鲁斯的士兵操着课堂法语搭讪，好莱坞口音让克莱芒忍俊不禁。尽管他的克里奥尔语与对方正音法语时有鸡同鸭讲，但异国大兵竟肯在自家国土用外语交谈——这份尊重远胜巴西佬的总和。\n\n暮色渐沉，狂欢人群开始讨论现实议题。克莱芒独坐木椅怔望夜空：纵使欢愉，他们仍是故土的二等公民，驻军仍是异乡来客。想起布鲁斯阴阳性乱用的蹩脚法语，他仍不禁莞尔。前路漫漫，但美洲国家组织似乎真心愿助一臂之力——至少当下，他愿如此相信。"
 LATAM_cayenne_endings.18.a: "现在是时候前进了。"
 LATAM_cayenne_endings.19.t: "在一隅……"
 LATAM_cayenne_endings.19.desc: "卡塔耶扫视着眼前聚集的人群，脸颊上轻微的痒感悄然蔓延。他忍住了去抓挠的冲动，生怕在人民面前显得不够专业——不，是在他人民面前。他清楚地知道，一切来得太快。授权期已结束，选票早已投下并计数完毕，西装已经穿好，他接受着每一个外表缺陷的批评，而现在，终于是时候发声了。\n\n“我的人民！”卡塔耶让人群的欢呼渐渐平息，深吸一口气，继续说道，“在我开始之前，有一件事我必须先说。这就是我对我的国家——对圭亚那的忠诚，那种永不动摇的、深沉的忠诚。在我说出任何其他话之前，我必须向你们传达最真挚的心意，传达我信念的真正力量。”\n\n“我要告诉你们，我将用我所有的力量，为圭亚那的未来奉献！”卡塔耶用力吐出这句话，声音澎湃激昂，压过了支持者们的欢呼。“为了圭亚那的未来，为了人民，我承诺将献出我每一滴血液，每一份力量，我所有的思想，所有的智慧！我将付出一切，只为看到一个更加光明的未来！”\n\n“在自由国家组织和美洲国家组织的庇护下，圭亚那将迈向前方的曙光！如果这不是事实；如果我们看似未曾前进，我将确保我们继续向前。如果我们不走，我将确保我们继续爬行。如果我们连一步都不迈，我将背负全世界的重担，带领圭亚那走向那片光明、快乐、应得的未来！”"
 LATAM_cayenne_endings.19.a: "……这是解放。"
 LATAM_cayenne_endings.20.t: "冷漠"
 LATAM_cayenne_endings.20.desc: "“未归档的文件，充斥着当地媒体的谣言，街上成千上万的人……”巴西最资深的情报官员抬起眼睛，眉头轻轻一挑，冷冷地望向[BRA.GetLeader]，目光中带着一种像是老师面对打破窗户的学生时的期望。\n\n“卡宴的局势已经非常严峻，总统先生。欺骗国际社会、干预一场所谓公正的选举，这是一回事；而被抓到用确凿证据证实这一切，又是另一回事。”总司令静静地坐在椅子上，耻辱与痛苦如阴霾般笼罩着他的良知。他现在几乎在重复着所有关于骚乱的法律定义，仿佛它们是他唯一的救赎。\n\n“国家已然失去对军队的控制，骚乱的规模前所未有。成群结队的男人和零散的分子四处纵火，烧毁一切带有巴西国旗的物品。坦率地说，军队现在恢复秩序的信誉正迅速崩塌，尤其考虑到……过去的经验，诺拉斯科根本无法重振我们的希望。”\n\n房间里陷入了短暂的沉默。总统默默地愤怒着，心中盘算着下属的无能，或者说，盘算着他们如此毫不留情的批评。此刻，他脑海中只有一个想法：如何让这场会议尽快结束，如何让一切尽快画上句号。\n\n“我们会审判诺拉斯科。就让它结束吧。”\n\n这份备忘录会缓缓地在各个部门之间传递，经过法庭、法官和巡逻的士兵之手。在巴西军法体系的每一环，它都以同样冷漠的态度被接纳，偶尔传来一些关于那位海军上将无能的议论。这成了许多错误决策和失误战斗的最后表达。卡宴已失，剩下的，几乎没有人再会关心了。"
 LATAM_cayenne_endings.20.a: "它不以一声轰鸣，也不以一声叹息，而是以一句判决消失。"
 LATAM_cayenne_endings.21.t: "公正的警察"
 LATAM_cayenne_endings.21.desc: "“您是否知道西北区在选举中完全没有选举权的问题？”\n\n“啊，是的，那个……”\n\n“这里有一份报告清单，声称在投票站外有武警驻守。当地政府对此是否知情？”\n\n“你看——”\n\n“昨晚仅有的关于此次公投的报道中，就有3432宗关于选民欺诈的指控——这里是不是在进行广泛的信息战，还是巴西政府有些隐瞒的东西？”\n\n“等一下！”\n\n美洲国家组织和阿根廷人的提问逐渐交织在一起。巴西特使迅速厌倦了不得不说出那些老生常谈的借口，而其他人显然一眼看穿了这些借口。屋里每个人都知道，公投数据已被篡改，而越来越明显的是，巴西不会轻易逃脱责任。说实话，这是一次公正的抓捕，特使几乎无法对这两个人产生怨恨，因为他们揭露了自己的政府。\n\n当巴西特使带着红肿的眼睛和满脸黑眼圈回到首都时，有人问他局势如何。对此，他只能说出一句话："
 LATAM_cayenne_endings.21.a: "大家心知肚明。"
 LATAM_cayenne_endings.22.t: "最后的呼吁"
 LATAM_cayenne_endings.22.desc: "“同志们！”朱斯坦·卡塔耶标志性的开场白再次通过电波传遍全国——自公投以来，这已是每周例行广播。他回头瞥了眼录音棚门口的美军陆战队员，意识到此刻的讲话不仅被同胞聆听，更被无数监视者审视。\n\n“这或许是我最后一次以类似形式向诸位讲话。我们已站在自由圭亚那的土地上，如同公投时那样掌握了自己的命运。我们选择了和平，但和平仍未降临。尽管巴西占领军已经撤离，人民仍在受苦，伤口仍在流血。”\n\n“自解放以来，暴行从未止息：同胞受伤、商铺被砸、工人仍在付出代价。困难虽在，但请记住我们已跨越了最艰险的关隘。我始终追求自由、温饱与和平的国度，而更多暴力只会背离这个目标。”\n\n“诚然，异国的军靴仍踏在我们的土地上，”他停顿间扫过讲稿与门口士兵，“但当下驻军正是为了将来无需驻军，今日援助正是为了他日无需援助——因为这是我们的国度，该由我们担起责任。”\n\n“许多人问如何实现‘圭亚那人的卡宴’这一愿景。我们挣脱了枷锁，现在要学会携手同行。要么学会共存，要么永远沉沦。感谢诸位聆听，圭亚那万岁。”\n\n红灯熄灭，待士兵离开后，卡塔耶长叹一声。革命激情曾助他赢得公投，但治国远非易事。抚摸着发烫的话筒，他只盼追随者能原谅这番违心的演说。"
 LATAM_cayenne_endings.22.a: "问题并非出自我们……"
 LATAM_cayenne_endings.23.t: "收起你的爱国情怀"
 LATAM_cayenne_endings.23.desc: "卡塔耶就职典礼后的第二天早晨，安娜走进外交部，叹了口气，脸上带着一丝不悦，但至少她知道，他们已经将失利抛在了身后。然而，当她打开公文箱时，一张醒目的黄色便条却让她明白，显然，事情远未结束。\n\n“致所有爱国的公务员：不要屈服于卡宴‘政府’的议程”\n\n“昨天在卡宴，一名激进的社会主义者自称国家的‘领导人’，并得到了美洲国家组织的叛徒和一些不知感恩的破坏者的支持。他们背叛了我们伟大的国家，颠覆了几十年来朝向文明的进步。现在，这些叛徒将试图重新定义我们与这些组织的关系，并鼓吹圭亚那-卡宴被‘殖民’的说法。\n\n我们呼吁所有公务员中的爱国者反对这种胡说八道，增强警觉，并坚决抵制任何威胁到伟大的巴西及其在国际舞台上地位的举措。顺应敌人的宣传后果自负。事先警告过你们了。”\n\n又是这些。安娜几乎能想象出是谁或哪些人打印了这些通知，肯定花了很长时间讨论巴西在卡宴的“干预”该如何展开。虽然她整天都在与同事们打交道，但她意识到，似乎没有人注意到这些便条的存在。实际上，似乎高层根本没有察觉。然而，她当然知道，他们总是能注意到的。\n\n巴西外交部将在当天的最后一个小时发表声明，尽管到那时，大楼里的人们早已就这些事讨论得热火朝天。“对公务员价值观的公然违反”，“将采取强力措施”，那种惯常的、对匿名便条的训斥等词句，几乎已经成了常规。而等到办公室里的闲话再也不那么激动时，也许，卡宴的灾难真会随着时间的推移而悄然消散。"
 LATAM_cayenne_endings.23.a: "沉默的愤怒会以不同的方式表达。"
 LATAM_bolivia_crisis.17.t: "正常情况：全搞砸了"
 LATAM_bolivia_crisis.17.desc: "“关于哪一方代表团首先退出的调查还在进行。会场当时‘一片混乱’，会议记录也含糊不清。我们认为，玻利维亚方面担心局势恶化，结果反倒给巴西和阿根廷火上浇油，让两国的挑衅行为变本加厉。”\n\n“报告认为，三方协议条款的崩溃已经不可避免，玻利维亚政府很可能在未来几周内遭遇政变倒台。更麻烦的是，由此引发的动荡有可能波及皮拉伊河地区，甚至把巴拉圭拖进另一场查科战争。”\n\n“简而言之，一场灾难。”\n\n亚历山德里心想，这说法肯定是轻描淡写了。这种失败足以断送政治生涯，至少很有可能。他知道，智利北部已不再安全，必须采取措施。这种危急关头，正是选总统的意义所在，是领导国家的义务。\n\n“通知情报总局，让陆军参与进来，评估事态蔓延的风险，拟定应对方案。让秘密线人继续评估玻利维亚局势，常规渠道怕是靠不住了。”\n\n在构思应对之策时，亚历山德里琢磨着巴西人的意图。在谈判过程中，巴西是否真心致力于缓和敌意？还是说——尽管这想法令人不安——这帮蠢货对此早有预料？眼前这场噩梦，究竟是历史的偶然，还是躲不过的劫数？\n\n看着普鲁士卫兵们把尖顶头盔换成钢盔，总统暗自希望，南美乱局带来的情绪，不会只有他一个人体会到："
 LATAM_bolivia_crisis.17.a: "失望。"
