 BRA_paraguayan_bush_war_desc: "南美的贱民国家终于迎来了它的审判时刻。他们的宿敌组成的反政府联盟“联合民族解放阵线”已经回归巴拉圭，正磨刀霍霍地准备发起一场起义，把摇摇欲坠的亚松森当局扫进历史的垃圾堆。无论哪一方赢得胜利，都将决定这南锥体唯一的法西斯主义堡垒的命运。"
 ARG_paraguayan_bush_war_desc: "巴拉圭正遭遇第二次瓜伊拉瀑布入侵。昔日的宿敌荷枪实弹卷土重来，这次他们以联合民族解放阵线为旗帜展开行动。他们在无线电广播中声明要一直抵抗下去，誓要彻底推翻亚松森政权。此战无论何方胜出，都将决定巴拉圭在南美冷战中的命运。我们必须彻底粉碎联合民族解放阵线！"
