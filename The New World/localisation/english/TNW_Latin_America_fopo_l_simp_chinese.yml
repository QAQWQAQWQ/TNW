 LATAM_bolivia_crisis.11.t: "习以为常的失望"
 LATAM_bolivia_crisis.11.desc: "阿根廷国家情报局总部走廊如迷宫般肃杀。军靴踏响的间隙里，整座建筑仿佛沉入深海。但若贴近爱德华多·塞尼奥兰斯将军办公室的橡木门，便能听见某种比心跳更沉重的震颤。\n\n将军深陷在破旧不堪的扶手椅中，吱呀作响的不仅是皮革，还有他逐渐崩解的铁血面具。《跨安第斯经济条约》的谈判报告残酷地摊在眼前——说阿根廷在谈判中受辱都算抬举。他原以为已做足心理准备，可天杀的！弗朗迪西和巴尔文竟能突破底线至此。究竟要怎样的政治白痴，才会签下这种丧权条约？\n\n抽屉滑开的刹那，雪松木香裹着往事扑面而来。那盒珍藏的哈瓦那雪茄，本是同僚庆功时的共享之物，如今只剩烟丝陪伴午夜独酌。他狠狠吸了一口，却连尼古丁也镇不住翻涌的焦虑：四面楚歌的祖国，正在崩塌的军事自主权，还有即将暴怒的马蒂赫纳……老战友迟早会要求清算，但塞尼奥兰斯已无意阻拦。弗朗迪西政府活该被架上审判席。\n\n半截雪茄在琉璃烟缸里碾成碎末。去他妈的政客！去他妈的马蒂赫纳和那些党棍！当手指摸向第二支雪茄时，门楣上悬挂的木质十字架刺入眼帘。将军触电般挺直脊背，快速在胸前划起十字。可某种刺痛感挥之不去，仿佛自己成了危难时才想起上帝的伪君子。但这早已不是他个人的困局，而是整个阿根廷的劫数。愿主庇佑阿根廷免遭外敌内患——尤其是那些披着同胞外衣的豺狼。"
 LATAM_bolivia_crisis.11.a: "上帝一视同仁，并非有求必应……"
 ARG_failure_andean_treaty_crisis: "美国傀儡四面夹击。阿根廷的外交已告失败，弗朗迪西再次暴露其弱点，该让情报部门接管这一切了。"
 LATAM_bolivia_crisis.12.t: "阿特拉斯的叹息"
 LATAM_bolivia_crisis.12.desc: "奥迪利奥·德尼斯走进总统办公室，一眼便看见洛特桌上堆积成山的文件：跨亚马孙公路建设放缓、通货膨胀上升、贫民窟又爆发了枪战……即使沉稳如洛特，也快被这数十份报告逼到崩溃了。更不幸的是，德尼斯带来的消息只会雪上加霜。\n\n“萨莱斯从拉巴斯发来消息，阿根廷外交官成功威逼智利和玻利维亚阉割了《跨安第斯条约》。我们通往太平洋的免关税通道彻底告吹，掌控玻利维亚运输线的计划也泡汤了。玻利维亚的中立地位毫发无损。”德尼斯汇报时，洛特强撑军人仪态挺直腰背绷紧面容，但这位相识多年的老部下早看穿了元帅的伪装。“这不是你的过错，恩里克。条约谈判本就是场豪赌。”\n\n“不，奥迪利奥，这就是我的失策。总统声音里浸透着疲惫，”我低估了弗朗迪西，低估了阿根廷军方，也低估了布宜诺斯艾利斯那帮真正掌权的家伙。原以为抓住了他们防守空当，现在却要自食苦果。”德尼斯正欲劝解，洛特已抬手止住他，转身埋首公文堆时那句低语仿佛自我宽慰：“或许这样也好……我在巴西利亚的暗室权谋，这辈子已经够多了。”"
 LATAM_bolivia_crisis.12.a: "“起码又少了一个问题担忧。”"
 BRA_failure_andean_treaty_crisis: "阿根廷外交团队以战争胁迫玻利维亚和智利让步。在玻利维亚军方出离愤怒的当下，我们必须阻止危机继续升级。"
 LATAM_bolivia_crisis.13.t: "意外的胜利"
 LATAM_bolivia_crisis.13.desc: "情报秘书处总部那迷宫般的走廊一如既往地安静，将军爱德华多·塞尼奥兰斯的办公室亦不例外。堆积如山的文件与报告让他每日焦头烂额，对阿根廷的未来不安。然而，最新一份关于《跨安第斯经济条约》的报告，却为他带来了久违的情绪：宽慰。\n\n塞尼奥兰斯缓缓靠在那把陈旧的椅子上，原本冷峻的目光终于浮现出一丝笑意。尽管OFN借助巴西与智利这两个提线木偶施加了巨大压力，弗朗迪西及其外交团队依旧不辱使命。他们不仅成功捍卫了阿根廷的国家利益，还争取到若干关键资产与让步。这成绩，不得不说，实在出色。阿根廷再一次昂首挺立于诸敌之前。\n\n他轻轻摇了摇头，打开抽屉，露出一排昂贵的雪茄。他挑了一根，小心地点燃，深深吸了一口。他希望弗朗迪西博士此刻也在尽情享受这场胜利。这场胜利，对他岌岌可危的总统任期而言，无疑是场及时雨。若能步步为营，也许不仅能拖延政变，甚至能让它彻底化为乌有。\n\n当雪茄燃至尾端，塞尼奥兰斯的目光落在门上的木质十字架上。主啊，我的信念何在？他将雪茄熄灭在烟灰缸中，坐直身姿，开始一段感恩的祈祷。上帝知道，军队那种独走和干政的“陈情传统”，终有结束的一天。弗朗迪西此刻或许是安全的，但他的苦难远未终止。至少此刻，塞尼奥朗斯能平静地结束这一天，因为他的国家确实得到了好处。"
 LATAM_bolivia_crisis.13.a: "上帝果然一视同仁。"
 ARG_victory_andean_treaty_crisis: "阿根廷外交使团取得了一项重大胜利，迫使玻利维亚做出让步。"
 LATAM_bolivia_crisis.14.t: "小胜一场"
 LATAM_bolivia_crisis.14.desc: "奥迪利奥·德尼斯走进总统办公室，一眼便看见洛特桌上堆积成山的文件：跨亚马孙公路建设放缓、通货膨胀上升、贫民窟又爆发了枪战……即使沉稳如洛特，也快被这数十份报告逼到崩溃了。幸运的是，他的老朋友兼战争部长带来了些许好消息。\n\n“我刚收到萨莱斯的消息，拉巴斯的危机已经暂时缓解，《跨安第斯协定》最终勉强通过了……虽然我们不得不做出一些让步来安抚盟友和阿根廷，但免关税的太平洋出海口和在玻利维亚的运输权依然是我们可以争取的。”听到这些，洛特稍微放松了一些。“此外，我们的情报部门并未发现任何阿根廷的军事行动，看样子他们暂时不会以武力回应。”\n\n然而，洛特的表情随即又沉了下来：“看来我们还是中了弗朗迪西总统的圈套。他们略施小计就搅乱了近乎完美的条约，不禁让人怀疑他们接下来还会出什么花招。”\n\n德尼斯安慰道：“无论阿根廷下一步会做什么，我向您保证，我们的军队始终站在您这边，总统先生。”\n\n洛特点了点头，语气里带着一丝释然：“不过，那是以后的事了，老朋友。眼下来说，这仍然是一场胜利，尽管阿根廷的诡计不断作祟……"
 LATAM_bolivia_crisis.14.a: "但在这样的时代，不论胜利多么微小，都是值得珍惜的。"
 BRA_neutral_andean_treaty_crisis: "尽管这份条约并非我们所期待的重大胜利，但和平得以维持。§Y南美冷战§!紧张度将减少§R5%§!。"
 LATAM_bolivia_crisis.15.t: "圣克鲁斯无战事"
 LATAM_bolivia_crisis.15.desc: "朝阳才刚跃出地平线，爱德华多·塞尼奥兰斯将军就已端坐在国家情报局总部的办公室里。一番晨祷与咖啡提神后，他开始批阅桌上堆积如山的文件——那些纸山几乎要挡住他的视线。时光如白驹过隙，待将军终于审阅完那份刚刚送达的《跨安第斯经济条约》报告时，却发现时间竟过得如此缓慢，每一分钟都像被拉长成小时。\n\n他握着报告向后仰靠在那张旧皮椅上。从表面看，事态并未恶化。尽管巴西与智利百般阻挠，阿根廷的国家利益仍得到了保障——但除此之外，这份条约几乎乏善可陈。其余条款对阿根廷既无裨益亦无损害。往坏处想，巴西和智利在可预见的未来仍会密谋对抗阿根廷；但往好处看，这次交锋至少能让他们下次算计时多掂量几分。至少将军是如此期盼的。\n\n塞尼奥兰斯轻叹一声，将报告仔细归档，转而批阅军中日益猖獗的抗命事件文件。军方必然会有不满条约结果的声音，那些老调重弹者定会抱怨“若总统不是弗朗迪西就不会错失良机”——但这些论调他们已叫嚷多年。归根结底，武装力量的格局不会有任何改变。\n\n蟋蟀声渐起时，将军整理好最后几份文件，做完感恩一日事奉的晚祷。他深知明日仍将如常履职，阿根廷的国务亦会照常运转。但只要祖国与她的利益安然无虞，这位老将军就会继续恪尽职守，如同他数十年来所做的那样。"
 LATAM_bolivia_crisis.15.a: "不过是办公室的又一天罢了。"
 ARG_neutral_andean_treaty_crisis: "阿根廷外交使团成功遏制了巴西的扩张主义，为弗朗迪西赢得了一场急需的胜利。因此，§Y南美冷战§!的紧张度将降低。"
 LATAM_bolivia_crisis.16.t: "燃烧的天空"
 LATAM_bolivia_crisis.16.desc: "会议室内一片沉寂，巴西的夕阳橙光洒满每个角落。洛特读完手中关于玻利维亚局势的报告，沉默不语。瓦尔特·萨莱斯坐在一旁，等待着，心中默念着精心准备的说辞。然而，洛特抬起头，那份冷静而专业的神情之下，掩盖不住一丝无力——面对这场突如其来的灾难，他感到自己的掌控力在逐渐消散。\n\n“那么就这样结束了？通往太平洋的通道、我们的基础设施扩展计划、在南美遏制阿根廷的机会，就这么烟消云散了？”\n\n萨莱斯试图从脑海中召唤出那些精心斟酌的回应，但此刻，脑中却一片空白。“我们已经竭尽全力，但阿根廷不肯让步。一切都变成了闹剧——争吵、侮辱、无休止的混乱。我参加过很多外交会议，却从未见过如此糟糕的局面。最终，阿根廷代表直接离场，声称是因为锡矿争端，但我觉得，他们不过是厌倦了这场徒劳无功的谈判。”\n\n“怎么发生的已经不重要了。”洛特似乎在眺望更远的未来，“接下来我们该怎么办，这才是关键。我原本以为，这份条约会是恢复南美力量平衡的第一步，让我们能以和平的方式遏制阿根廷的影响力。”\n\n“尽管玻利维亚在阿根廷的极限施压下退出了条约，但他们依然是我们的盟友，关系依旧牢固。”萨莱斯点头道。\n\n洛特并未回头，他的目光凝视着远方的夕阳，“但现在，我们已与一个动荡不安的国家深度捆绑在一起，而整个地区都处于战争的边缘。我们的盟友开始动摇，玻利维亚军方因条约破裂而愤怒，布宜诺斯艾利斯沉醉在他们的胜利中。而圣克鲁斯和巴拉圭的军靴声，恐怕此刻已在筹谋如何利用这片混乱。再多的外交成果，也无法改变这个事实：我们正站在灾难的悬崖边上。”萨莱斯刚要开口，却见洛特抬手示意他安静。洛特就这样站着，凝视着窗外……"
 LATAM_bolivia_crisis.16.a: "那血红的暮光，正逐渐隐没在地平线上。"
 BRA_andean_treaty_collapse_crisis: "阿根廷通过极限施压破坏了我们的经济条约。由于玻利维亚处于崩溃边缘，我们将支持我们的盟友。"
 LATAM_bolivia_crisis.18.t: "不再妥协"
 LATAM_bolivia_crisis.18.desc: "弗朗迪西长叹一声，偏头望向窗外。落日将玻璃染成橙红，玫瑰宫比往常更安静——不祥之兆。随着盟友会晤日渐稀少，坏消息呈几何倍数增长。照此趋势，明日接到武装叛乱报告也不足为奇。而此刻，末日钟的指针比他估算的更快迫近。\n\n玻利维亚条约谈判的溃败，对使团与他自己都是致命打击。所有可能出错的环节在最糟糕的时机集体爆发。即便巴西人毁约在先，恶果已然酿成——这将成为他政治生涯无法愈合的创伤。本就如履薄冰的政权，经此重创更岌岌可危。\n\n当总统沉浸于末日预演时，情报部门正酝酿雷霆行动。对总统失望透顶？当然，但也应适可而止，毕竟他们不是落井下石的政变阴谋家。尽管塞尼奥兰斯将军痛心于军中最后的纪律堡垒误入此途，但危局中的阿根廷比任何时候都更需要他本人。\n\n国家情报局总部密室内，高阶成员济济一堂。没有多余寒暄，唯有拉巴斯惨败激发的使命感在昏暗空间涌动。长桌铺展的玻利维亚全境地图上，彩色标记标注着城市、要道，以及最重要的抵抗据点。无数箭头指向同一个坐标——新晋军官略感陌生、老将们却刻骨铭心的名字：瓜尔韦托·比亚罗埃尔将军。"
 LATAM_bolivia_crisis.18.a: "旧棋盘，新棋手，新规则……"
 ARG_andean_treaty_collapse_crisis: "阿根廷的外交已告失败，弗朗迪西再次暴露其弱点，该让情报部门接管这一切了。"
 PAR_zone_gran_chaco_desc: "§F§L格兰查科§!，又称§L干查科§!，是一片§L人烟稀少、炎热且半干旱的低地§!。鉴于其地势特征，§R民族解放联合阵线叛乱§!要在此发动几乎§R不可能§!，这片区域对那3%以此为§G家园§!的§i巴拉圭人§!而言，仍是一块§B相对和平§!的土地。\n\n与此同时，£TNO_game_rule_flag_PAC §i巴拉圭第一军§!持续严密监视西部边境，小心筹备可能爆发的§K第六次§!§i查科§!§Y战争§!，对手是\n£TNO_game_rule_flag_BOL §Y玻利维亚§!。§!"
 LATAM_bolivia_mining_wars.1.t: "将军的回归"
 LATAM_bolivia_mining_wars.1.desc: "五年羁旅。座钟的钟摆每摆动一次，都在提醒瓜尔韦托·比利亚罗埃尔：这异乡囚笼里的光阴，本应是属于玻利维亚的治国良辰。他厌倦了书信往还却永诀故人的煎熬，厌倦了在新闻字缝里捕捉祖国动向却只等来归期渐渺的绝望。如今连谈判桌上最后的机会都已化作齑粉，除非神迹降临，否则他连魂归故里的卑微愿望都将成空。\n\n叩门声惊碎思绪。五个神秘来客站在晨光里，胸牌显示着外交官身份——但比利亚罗埃尔太熟悉这些阿根廷国家情报局特工的气场了。\n\n他们的密语依旧简练而隐晦，但某些字眼令他心如擂鼓：玻利维亚境内的布局、重组革命民族主义运动、待时而动。难道这就是苦候五年的归乡契机？阿根廷人照例没有承诺，只要求他“未来配合”。比利亚罗埃尔暗自冷笑，这群布宜诺斯艾利斯的操盘手当然变不出神迹，可要将祖国命运再次托付给这些“老相识”？上一次的信任，换来的可是被政变者像野狗般逐出总统府的屈辱。但历史洪流总能逼着宿敌握手，哪怕这同盟本该永远尘封在泛黄史册里。"
 LATAM_bolivia_mining_wars.1.a: "身死布宜诺斯艾利斯，绝非他心所愿。"
 LATAM_bolivia_mining_wars.2.t: "予蛇以翼"
 LATAM_bolivia_mining_wars.2.desc: "乌戈·安赫尔在玻利维亚丛林深处的巨型铜矿中跋涉，剧烈的咳嗽撕扯着灼烧的肺叶。四周扬起的粉尘刺得他双眼生疼，肩上沉甸甸的货物压得双臂发麻。更要命的是，身为混迹在一群梅斯蒂索矿工中的白人克里奥尔，他必须时刻绷紧神经避免引人注目。\n\n尽管如此，乌戈依然机械地执行着任务。此刻他是马里奥·罗哈斯，任务目标早已刻进骨髓：按计划以假身份潜入矿区；按计划携带秘密军火穿越矿道；按计划在汗流浃背的迷宫里找到暗门；按计划与守卫安全屋的矿工接头；按计划将物资交给驻守的革命民族主义运动游击队；最后抹去所有痕迹撤离，前往联络站与阿根廷国家情报局的同僚汇合……一切都他妈按计划。\n\n唯独计划外的是那些游击队员的面孔。尽管上级保证比利亚罗埃尔的部下忠诚可靠，但乌戈眼前只有一群嘟囔着革命、阶级斗争等颠覆言论的乳臭未干的毛头小子。国情局要扶持的不是隐秘的庇隆主义者吗？什么时候开始给这帮该死的左棍当运输大队长了？\n\n他狠狠啐了口带铜腥味的唾沫。至少有一点很明确：等比利亚罗埃尔重掌大权那天，非得把这些不信上帝的马克思主义者清理干净不可。"
 LATAM_bolivia_mining_wars.2.a: "前提是，乌戈能给这群人送去更多武器。"
 LATAM_bolivia_mining_wars.3.t: "猎鹰与猎物"
 LATAM_bolivia_mining_wars.3.desc: "“玻利维亚迟早要出乱子，但联邦情报和反情报局的小伙子们今天挖到了猛料。”逼仄的房间里烟雾缭绕，这是一场最低人员规格的内阁会议，仅有萨莱斯、洛特与德尼斯三人围着一份情报。德尼斯用指节叩击桌面：“游击队据点被端本是小事，可他们囤的军火里混进了——”\n\n“他妈的哈尔孔ML-57冲锋枪，制式武器。”萨莱斯皱起眉头，德尼斯一贯的直率总让他不适，“阿根廷人从不外销这种军火，这回摆明要下场搅局。他们在玻利维亚没几个盟友，看来是想扶植比利亚罗埃尔那个暴君复辟。”\n\n“所言极是。”萨莱斯接过话头时如释重负，“好在我们可以发动舆论战反制。照旧操纵当地寡头，提醒他们要是革命民族主义运动上台，他们的一切都将化为乌有。德尼斯，军方应该能统一立场吧？”\n\n“当然。没有哪个爱国者愿看祖国沦为共产和纳粹地狱，也无人愿与这种国家为邻。洛特总统，只要您一声令下，我们随时可以采取‘积极措施’稳定局势。”\n\n“必要时自然。”洛特已勾勒出全盘方略，“萨莱斯，向智利方面通报阿根廷动向，他们比我们更忌惮这帮家伙。德尼斯，让两家情报机构共享数据。下次会议前，此事就交给诸位了。”"
 LATAM_bolivia_mining_wars.3.a: "猎手环伺。"
 LATAM_bolivia_mining_wars.4.t: "山雨欲来"
 LATAM_bolivia_mining_wars.4.desc: "“……情报属实？”亚历山德里总统询问道。\n\n军情局军官点点头：“巴西人手握铁证。革命民族主义运动正在玻利维亚全境调兵，半数以上配备阿根廷制式武器。显然他们想让比利亚罗埃尔回归。”\n\n“条约谈判时那帮人就丑态百出，”总统眉峰紧锁，“早该料到他们会玩阴的。法西斯分子从来只信拳头。绝不能让玻利维亚沦为阿根廷傀儡，我们有何对策？”\n\n军官早有准备：“已启动在玻资产核查。卢克希奇家族的铜矿可作为行动支点，另在长枪党反对派中安插了眼线——毕尔巴鄂·里奥哈的社会主义长枪党能渗透反政府圈子。”\n\n总统神色稍霁：“很好。告知巴西方面，智利愿协同行动。阿根廷人毁了我们修订条约的机会，这次休想再偷走玻利维亚。”"
 LATAM_bolivia_mining_wars.4.a: "“届时我们将准备就绪。”"
 LATAM_bolivia_mining_wars.5.t: "黑色宣传"
 LATAM_bolivia_mining_wars.5.desc: "脱离外交部的喧嚣本非萨莱斯所愿，但这些天他竟对此甘之如饴。办公室里此起彼伏的电话铃声，全是为了说服那些被蛊惑的寡头站队。阿根廷人当然能用“投资”收买他们，但这群蠢货可曾想过，要是革命民族主义运动一把火烧光这些产业该如何是好？德尼斯和洛特正等着他。\n\n“让二位久等了。”萨莱斯揉着太阳穴走进房间，“跟那群被阿根廷金块砸晕的榆木脑袋周旋，简直要了我半条命。说句泄气话，咱们的外交官就这么多，可他们收买人的钞票好像用不完。”德尼斯听完，嘴角掠过一丝得意的笑，随后娓娓道来。\n\n“二战时英国人有个坏招。伪造德国宣传册，极尽夸张之能事，就为抹黑纳粹。通常是伪造有关严苛占领政策的文件，凡是能阻止通敌行为的招数他们都试……”提及海狮计划时他脸色一沉，“……虽然没成功，但咱们可以借鉴。”\n\n洛特眼中精光乍现：“妙啊！咱们手里截获的阿根廷情报堆积如山，仿造几份易如反掌，再把资助革命民族主义运动的汇款单往上一贴，往寡头们眼前这么一晃……”他做了个收网的手势，“保管他们哭着叫着扑进我们怀里，比喊‘国有化’还快！”\n\n萨莱斯被洛特的讲解逗得忍俊不禁。“我这就联络智利盟友，他们肯定比您还来劲。两国协同操作，定能让阿根廷在国际上颜面扫地。”三人相视而笑，分头扎进了这场舆论战的硝烟中。"
 LATAM_bolivia_mining_wars.5.a: "让战争的印刷机开动起来。"
 LATAM_bolivia_mining_wars.6.t: "清算旧账"
 LATAM_bolivia_mining_wars.6.desc: "“简而言之，”亚历山德里总统放下简报，“巴西人打算在玻利维亚发动舆论战，指控阿根廷煽动革命民族主义运动叛乱？”\n\n军情局军官点点头：“正是如此。”\n\n“高明之举。”胡里奥·菲利皮·伊斯基耶多补充道，“阿根廷借跨安第斯条约谈判的胜利，正欲将玻利维亚收入囊中。只有动摇他们的政治根基，策反寡头集团，方能瓦解布宜诺斯艾利斯的图谋。”\n\n见总统犹疑，他继续说明：“当务之急是与巴西联手。条约谈判时我们各自为战，才让阿根廷钻了空子。如今是拯救玻利维亚的最后机会，必须建立起统一战线。”\n\n总统眼中寒芒一闪：“你说得对，胡里奥。我们不能坐视又一个国家沦为隐秘法西斯分子的仆从。”他转头看向情报官：“我们有何对策？”\n\n军官早有准备：“已启动在玻资产核查。卢克希奇家族的铜矿可作为行动支点，另在长枪党反对派中安插了眼线——毕尔巴鄂·里奥哈的社会主义长枪党能协助散播革命民族主义运动的暴行。”\n\n\"很好，告知巴西方面，智利愿协助行动。阿根廷赢得了一时，赢不了一世。\""
 LATAM_bolivia_mining_wars.6.a: "以其人之道，还治其人之身。"
 LATAM_bolivia_mining_wars.7.t: "躯壳空空，活计重重"
 LATAM_bolivia_mining_wars.7.desc: "不过是份差事，他也只是具行尸走肉。梅南德罗穿过革命民族主义运动的集会时，反复咀嚼着这句话。他自诩政治冷感，金钱才是永恒驱动力——老板要脏水，他就泼脏水，只要女儿的药费有着落。\n\n任务很简单：在集会现场挑起革命民族主义运动与寡头党派民主制度联盟的械斗。他默念着要求挤过人群，刻意无视那些打量他的壮汉。台上的人正挥舞双臂对着麦克风咆哮，恍惚间他仿佛置身纽伦堡集会，一股寒意直透骨髓。\n\n广场上出现了目标：一名接受采访的民主制度联盟要员。梅南德罗与同伙交换眼神，扯开嗓子大吼：“寡头！寡头！寡头！”喊叫如投入沸油的冰水，人群瞬间炸开。石块与酒瓶在阳光下划出弧线，他连忙朝小巷跑去。\n\n翌日，各大报纸皆以头版头条报道这场骚乱。每篇报道下都涌动着巴西资本的暗流，但急于寻找新靠山的寡头们选择性忽略了这点——只要不沾染民族主义的街头暴力，谁在乎背后是否有人操纵？\n\n奇怪的是，梅南德罗是少数没读报的人之一，至于原因——"
 LATAM_bolivia_mining_wars.7.a: "他被一块飞石砸中了头，死了。"
 LATAM_bolivia_mining_wars.8.t: "扭转形势"
 LATAM_bolivia_mining_wars.8.desc: "阿根廷国家情报局已今非昔比。若爱德华多·塞尼奥兰斯敢直言不讳，整个国家亦是如此。这个国度总在取得决定性胜利后旋即陷入困局，仿佛被某种诅咒纠缠。但塞尼奥兰斯笃信所谓诅咒不过是资金匮乏、政客无能、纪律涣散、领导昏聩与下属渎职编织的罗网——当玻利维亚寡头们受OFN宣传蛊惑，以“资助恐怖组织颠覆政权”为由驱逐阿根廷大使时，他明白这记耳光本可避免。\n\n忍辱负重无益国运，但区区校官岂能点水成酒？转机随着办公室的电报纸翩然而至：奉总统令，情报局将正式确立对革命民族主义运动组织的支持，坐实玻利维亚的指控。塞尼奥兰斯枯井般的心潭泛起涟漪。\n\n这位退役将军以扑克脸掩藏澎湃心绪，开始有条不紊地制定行动方案、下达指令、召开军官会议。六十岁的老人以花甲之躯承担五名年轻列兵的工作量，却比后者更精准高效。"
 LATAM_bolivia_mining_wars.8.a: "要是他掌管情报局，会干出怎样一番事业呢。"
 LATAM_bolivia_mining_wars.9.t: "玻利维亚局势"
 LATAM_bolivia_mining_wars.9.desc: "绝密\n布宜诺斯艾利斯，- [?global.date.GetDateStringNoHourLong]\n\n情报报告 第 147/62 号\n\n呈送：阿图罗·弗朗迪西·埃尔科利阁下\n\n事由：玻利维亚局势简报\n\n摘要：\n\n过去几周，邻国玻利维亚由于即将于本年度7月1日举行大选，国内处于一种停滞状态。我们的线人预计，尽管公众支持度下降，民主制度联盟（社会主义共和联盟党）仍将凭借其一贯的欺诈手段轻松取胜。\n\n尽管如此，反对派力量仍在持续增长。目前其势力主要包含两个政治组织：查科战争时期的知名英雄贝尔纳多·毕尔巴鄂·里奥哈将军领导的玻利维亚社会主义长枪党，以及前总统瓜尔贝托·比利亚罗埃尔支持的革命民族主义运动。我们在推动革命民族主义运动方面已取得良好进展，但若不对其内部脆弱的分裂局面加以干预，可能危及我方利益。我们正密切监视其左翼派系，该派具有颠覆性的意识形态，对比利亚罗埃尔的指令响应亦较差，构成更大威胁。\n\n全国范围内已侦知多起政治暴力事件，多人受伤，亦有零星死亡案例，具体数字不详。本月局势将持续紧张，但全面升级的可能性较小。预计大选将在强烈抗议中如期举行，整体局势不会明显恶化。\n谨此呈报，敬礼。\n胡安·卡洛斯·巴雷拉"
 LATAM_bolivia_mining_wars.9.a: "绳索愈发拉紧……"
 LATAM_bolivia_mining_wars.10.t: "玻利维亚的抉择之日"
 LATAM_bolivia_mining_wars.10.desc: "绝密\n仅供总统查阅\n\n玻利维亚——巴西与阿根廷之间的影响力争夺战\n\n玻利维亚即将在7月1日迎来新一轮选举。预测显示，民主制度联盟将在此次选举中获胜。民主制度联盟是由共和社会主义统一党与自由党组成的选举联盟，控制着该国大部分政治资源。然而，背后真正操纵局势的是玻利维亚的寡头阶级，他们通过这些联盟为自己牟取私利，早已引发了民众的普遍不满。\n\n反对现状的势力分为两个派别，即社会主义长枪党和革命民族主义运动。社会主义长枪党：该派别由查科战争的传奇英雄贝尔纳多·毕尔巴鄂·里奥哈将军领导。凭借个人魅力与极高的声望，他从党内另一位重要人物奥斯卡·温萨加手中夺取了主导地位。\n\n而革命民族主义者内部也存在分裂。尽管该运动也推举了现任候选人——流亡独裁者瓜尔贝托·比利亚罗埃尔，但其内部派系间关系复杂。右派坚定支持比利亚罗埃尔，而左派则表现出一定的独立倾向，显得不够团结。阿根廷在玻利维亚的影响力，正是在这派系分裂中逐渐减弱。\n\n《跨安第斯经济合作条约》签订以来，反对派的支持率有所提升。玻利维亚人普遍认为该条约仅有利于寡头阶级，而反对派则宣称自己更能代表民意。然而，即便如此，民主制度联盟候选人恩里克·赫尔佐格的当选仍然几乎没有悬念。尽管有关于反对派内部斗争和几起死亡事件的报道，当前局势看似平稳，并预计将继续保持稳定。\n\n秩序与进步"
 LATAM_bolivia_mining_wars.10.a: "可悲的是，对于大多数人来说，选择早已不由他们自己决定了。 "
 LATAM_bolivia_mining_wars.11.t: "玻利维亚大选"
 LATAM_bolivia_mining_wars.11.desc: "关于玻利维亚国情的报告\n密级：绝密\n圣地亚哥，[?global.date.GetDateStringNoHourLong]\n\n玻利维亚大选定于1962年7月初举行。现执政集团民主制度联盟AID系自由党与社会主义共和联盟党两大政党组成的选举联盟，尽管这两个政党曾有一些不光彩的历史，但普遍认为它们将在此次大选中获胜。执政党的寡头政治家们将利用选举舞弊手段来维持其权力已是具有政治意识的玻利维亚人的共识，其胜利实际上是必然的。\n\n反对寡头统治的势力主要分为两个派别：玻利维亚社会主义长枪党和革命民族主义运动。玻利维亚社会主义长枪党由无政府主义思想家斯卡·温萨加创立，但目前已被魅力非凡的查科战争传奇英雄、与智利情报部门关系密切的贝尔纳多·毕尔巴鄂·里奥哈将军所掌控。革命民族主义运动分为右翼与左翼，右翼忠于流亡的前总统瓜尔贝托·比利亚罗埃尔，而左翼则对其更像是有条件支持。利用这一内部分歧，将成为破坏阿根廷在该国努力的关键。\n\n由于跨安第斯经济合作条约的签署，这两个反对党迅速发展，许多人认为这是寡头们为了自身利益而出卖玻利维亚的又一举措。目前，反对派组织在全国各地举行集会，通常能够吸引到比执政集团更多的人群。\n\n据报道，反对党和当局支持者之间的偶发暴力事件已导致多人受伤，死亡数量不明。尽管目前局势仍不稳定，但前方特工预计情况不会进一步恶化。反对派无法阻止恩里克·赫尔佐格当选就职，局势将在他宣誓就职后很快稳定下来。\n\n立即递交亚历山德里总统。"
 LATAM_bolivia_mining_wars.11.a: "一点火星，却引起硝烟阵阵。"
 LATAM_bolivia_mining_wars.12.t: "血腥记忆"
 LATAM_bolivia_mining_wars.12.desc: "“谢天谢地！”马特奥终于松了口气，低声咒骂道。在拉巴斯像老鼠一样东躲西藏了几个小时后，他终于找到了那个安全屋——仁慈的阿根廷国家情报局地为他准备的藏身之地。房间狭小，几乎只能容得下一个人，里面摆着一台比他年纪还大的老旧无线电，而且依然在用莫尔斯电码工作——他们说要保密。但马特奥已经不在乎这些了，他只想倒在椅子上，远离这一切，度过余生。然而，就在他的肾上腺素逐渐消退时，记忆像火车一样猛然冲击而来。\n\n首先，街头有一大群人聚集抗议，这本不算什么异常。接着，抗议人群开始向克马多宫进发，越接近目标，队伍就越发壮大，愤怒的情绪愈发高涨。马特奥远远地观察着，任务就是监视局势并向上报告。然而，他好像走得太近了。他几乎亲眼目睹了历史的发生，而内心的冲动最终占了上风。\n\n多么愚蠢的错误。第一声枪响划破空气，直到他耳中嗡嗡作响，才意识到发生了什么。他从宫殿的最后一排看见的，是一队整齐的军人和他们步枪里喷出的火光。没有警告，没有丝毫的冷静，只是一场冷酷的生死对决。当他终于从人潮的漩涡中挣脱出来时，马特奥的眼睛看到了这样一幕。一个女孩，倒在街头，毫无生气。那本应是一个不满14岁的孩子，若不是那颗撕裂她面容的子弹。\n\n那血腥的画面差点让他呕吐。她的面容，将永远烙印在他的脑海中，直到生命的最后一刻。\n\n天啊，他真是受够了。去他妈的玻利维亚，去他妈的拉巴斯，他现在只想回到拉普拉塔的家里，抱住他的母亲。那些上级和所谓的“大人物”，可以继续拿无辜者的生命当儿戏，但他已经受够了这个被诅咒的国家。"
 LATAM_bolivia_mining_wars.12.a: "这是申请调动前的最后一份报告，现在他只想去一个离地狱远一点的地方。"
 LATAM_bolivia_mining_wars.13.t: "细细的红线"
 LATAM_bolivia_mining_wars.13.desc: "“老天啊……他们到底做了什么？”洛特目睹着桌上摊开的科梅尔西奥大屠杀照片，心中充满了震惊与恐惧。散落四周的尸体是仓皇逃跑的抗议者，有些甚至整齐地靠墙排列。洛特强迫自己不要多想那些画面。\n\n“这是一场不幸的悲剧，但我们必须考虑这对巴西的影响。”洛特瞪了他一眼，忍住没提高音量。“我想我和萨莱斯先生对此局势已有一致的看法，就让他来说明。”\n\n“谢谢，将军。”洛特感到意外，难得见他们如此一致。“在政变之后，玻利维亚的民主表象已经消亡殆尽，阿尔弗雷多·奥万多·坎迪亚将军如今是唯一的掌权者。坦白说，他现在已然是玻利维亚的独裁者，但这是我们目前能争取到的最佳选择。我们建议对他的政权给予关键性的支持。”\n\n德尼斯接着说道：“沃尔特代表文官的观点，而我则站在军方的视角。玻利维亚正濒临无政府状态，随时可能沦为共产主义和法西斯势力的温床——而奥万多是唯一能阻止这种情况的人。如果‘秩序与进步’这四个字还代表什么意义，那我们必须支持他，让秩序得以恢复。”\n\n洛特叹了口气，再次看向那些触目惊心的照片。“告诉他，凡是我们能提供的资源，他都可以拿去。”德尼斯和萨莱斯点了点头，转身离去。洛特将照片丢进了垃圾桶。"
 LATAM_bolivia_mining_wars.13.a: "奥万多是个恶棍，但他是我们的恶棍。"
 LATAM_bolivia_mining_wars.14.t: "风暴来临"
 LATAM_bolivia_mining_wars.14.desc: "“天啊……”亚历山德里低声说道，目光停留在科梅尔西奥大屠杀的血腥照片上，“想不到这种野蛮行径在这片大陆上竟仍在发生。”\n\n“这一事态的发展远称不上理想。”胡利奥·菲利皮·伊斯基耶多从自己那份报告中抬起头，回答道，“但巴西人正在支持奥万多。他们认为他是维系玻利维亚统一的唯一力量。至少目前，我也倾向于这种看法。”\n\n“你听起来没什么信心，为什么？”\n\n菲利皮·伊斯基耶多抿了抿嘴唇：“玻利维亚军方民族主义情绪极为强烈。太平洋战争已经过去八十年了，但他们始终放不下安托法加斯塔的丧失。我们完全有理由相信，他们会对智利的利益持敌对态度，而我们已经开始看到这种迹象了。”\n\n“迹象？”亚历山德里问道，“什么迹象？”\n\n“你没看到报告的最后一页吗？奥万多的新政府已经任命了驻巴西与阿根廷的大使，却刻意没有向我们派遣大使。”"
 LATAM_bolivia_mining_wars.14.a: "我们不能再继续这样下去了。"
 LATAM_bolivia_mining_wars.15.t: "玻利维亚的动乱"
 LATAM_bolivia_mining_wars.15.desc: "绝密\n布宜诺斯艾利斯，- [GetDate]\n\n情报报告 第 547/63 号\n\n呈送：[ARG.GetLeader]总统\n\n事由：玻利维亚局势动荡\n\n摘要：\n\n玻利维亚共和国的局势陷入混乱。与我们的预期相反，由奥万多·坎迪亚将军建立的政权未能稳定国家。毫无疑问，若局势进一步恶化，我们的北方邻国将面临革命甚至更严重的威胁。\n\n目前，玻利维亚的工会在全国范围内发动罢工，已有多座矿山被工人接管。同时，有多起政府军与反叛力量之间交火事件的报告，这些冲突主要集中在安第斯山区，由反对党玻利维亚社会主义长枪党与革命民族主义运动主导。在这一混乱局势下，多个势力正趁机扩张其影响力。截至目前，我方情报人员共识别出六个正在争夺政权的主要派系：军方、警察、上层精英、农民以及工会。\n\n当前局势下，我方的首要目标是确保我方在革命民族主义运动的盟友最终胜出，同时严密控制其内部的马克思主义与布尔什维主义派系，已实施相关的预防措施。接下来的几天内，国家情报局将制定一系列操作建议与行动方案，以确保该目标顺利达成。\n\n谨此呈报，敬礼。\n[GetARGIntelligenceHead]"
 LATAM_bolivia_mining_wars.15.a: "谈判已经结束，是时候动手了。"
 LATAM_bolivia_mining_wars.16.t: "刚出狼窝……"
 LATAM_bolivia_mining_wars.16.desc: "绝密文件\n仅供总统查阅\n\n玻利维亚-巴西与阿根廷之间的影响力争夺战\n\n在奥万多将军发动政变后，不仅未能稳定局势，反而招致了波及全国的动荡。情报显示，玻利维亚爆发革命的可能性非常高，局势愈发不可控。\n\n现政权正艰难应对来自社会主义长枪党和革命民族主义运动的猛烈攻击。这两派力量不仅煽动工会发动总罢工，以此抗议军事政权，还组织了针对政府军的叛乱活动，挑战现政权的稳定性。\n\n我们已确认，这些对抗力量正在以下五个关键领域争夺权力：军队、警察、精英阶层、农民和工人。为了维持巴西在南美洲的战略利益，我们有必要协助拉巴斯及其军事政权，对抗革命民族主义运动和社会主义长枪党。前者已获得阿根廷的支持，后者则与智利保持密切联系。我们将很快起草一份具体的行动清单，以便尽快采取适当措施。\n\n秩序与进步"
 LATAM_bolivia_mining_wars.16.a: "……又入虎口。"
 LATAM_bolivia_mining_wars.17.t: "内陆的蓝宝石"
 LATAM_bolivia_mining_wars.17.desc: "仅供授权人员查阅 - [?global.date.GetDateStringNoHourLong]\n\n军事情报局\n\n智利圣地亚哥\n\n局势情报报告（153/62）\n\n有关事项：玻利维亚共和国\n\n摘要：\n\n科梅尔西奥大屠杀之后，阿尔弗雷多·奥万多·坎迪亚将军发动的军事政变完全没能平息玻利维亚局势。与先前预测相反，我们现在认为，玻利维亚国内已经具备了爆发革命动乱的条件。\n\n目前，奥万多军政府正竭尽全力阻止社会主义长枪党和革命民族主义运动发动更大的袭击，而迄今为止，所有迹象都表明他们没能成功。此外，左翼激进工会和受其影响的工人发起了大罢工，经济形势因而迅速恶化。\n\n各革命派别正在精英、农民、工人等社会各阶层和军警机构中公开争夺影响力。史无前例的行动规模清楚表明，除了奥万多本人之外，所有人都估计他的军政府将会倒台，也许就在数周之内。\n\n尽管玻利维亚新政府就安托法加斯塔问题发出了不合时宜的批判谩骂，但我们仍然向其做出了和解姿态，且及时给予了承认。然而鉴于前述情况，我们建议应当与社会主义长枪党建立初步联系。虽然苏克雷和拉巴斯爆发革命会使我们的努力遭受重大挫折，但由于革命爆发的可能，我们必须将之“引导”到更有利的方向。\n\n与亲阿根廷的革命民族主义运动不同，社会主义长枪党与智利关系较为良好，他们的宣言正是流亡者在圣地亚哥的艺术与职业学校发表的。贝尔纳多·毕尔巴鄂·罗哈将军是其内部温和派的领导人，他也与我国情报机关有一定联系。因此，在奥万多政府可预见的倒台之后，支持他的派系应当是最恰当的应对措施。\n\n呈请亚历山德里总统立即考虑决定。"
 LATAM_bolivia_mining_wars.17.a: "旋转门依然锈迹斑斑？"
 LATAM_bolivia_mining_wars.18.t: "新资产"
 LATAM_bolivia_mining_wars.18.desc: "仅供授权人员查阅 - [?global.date.GetDateStringNoHourLong]\n\n军事情报局\n\n智利圣地亚哥\n\n局势情报报告（153/62）\n\n有关事项：玻利维亚共和国\n\n摘要：\n\n我国在玻利维亚的利益有了重大进展。奥万多提出建议，就安托法加斯塔问题举行会谈。我国大使已经确定，这是两国之间继续积极发展关系的唯一途径。我们确信，如果举行会谈，玻利维亚就会提出更多的要求。毋庸讳言，拉巴斯显然还搞不清楚他们的位置，而且在争议问题上始终不愿妥协，也排除了所有合作的可能性。因此，我们转而联系了社会主义长枪党，计划为其提供物资支持。\n\n我们的主要联系人是毕尔巴鄂·罗哈。他很感激我们在他1939年流亡国外之后的支持。我们认为，他是一个温和、善于适应环境、意识形态也不那么坚定的人；此外，我们也在关注罗哈的竞争对手，奥斯卡·温萨加，他在意识形态方面更加执着。而值得庆幸的是，他似乎远离长枪党权力中心，虽然羡慕罗哈的地位，但目前还无法影响局势。\n\n我们已经通知驻在玻利维亚的特工，结束与巴西情报机构的合作。我们与巴西的目标已经发生了分歧，远期行动显然无法继续友好共事。\n\n呈请亚历山德里总统立即考虑决定。"
 LATAM_bolivia_mining_wars.18.a: "玻利维亚社会主义长枪党可以成为我们的棋子。"
 LATAM_bolivia_mining_wars.19.t: "圣地亚哥的背刺"
 LATAM_bolivia_mining_wars.19.desc: "“……我们认为，为了智利人民的最佳利益，应停止向一个极度不稳定的军事独裁政权提供援助。智利将转而支持真正代表人民的合法组织——社会主义长枪党。不同于其他长枪党人，毕尔巴鄂·里奥哈是一位真正的政治家。如果巴西希望避免玻利维亚成为阿根廷的属地，那我建议他们采取相同路线。”\n\n萨莱斯怀着愤懑将报告放下，视线转向洛特那张愤怒的脸。“那些叛徒。我从未想到他们会卑鄙到这种地步，去支持那些法西斯分子。”他愤怒地一拳砸在桌上，试图以此发泄内心的愤慨。\n\n洛特平静地深吸一口气，努力将愤怒压在心底。“这不只是意识形态的问题，这是权力之争——我不会因此对他们过多苛责。无论如何，我们必须保持冷静。智利仍然是我们对抗阿根廷的重要盟友，尽管现在前景不明。眼下，我们应该发出一份模棱两可的外交声明，保持我们的立场，并专注于支持和保护现政权。”\n\n“好吧，就按你说的办。”总统勉强接受了这个建议，萨莱斯对此也感到些许满足。在这样的局势下，最终站在哪一方并不重要，关键在于捍卫他们所认定的正义与秩序。"
 LATAM_bolivia_mining_wars.19.a: "巴西在这场捍卫秩序的斗争中，注定要孤军奋战。"
 LATAM_bolivia_mining_wars.20.t: "矿石战争"
 LATAM_bolivia_mining_wars.20.desc: "过去数周，玻利维亚的动荡局势成为拉美报界的盛宴。每日“新”闻层出不穷：矿井罢工潮、政府与反叛武装交火、难民越境逃亡，编辑们更以模糊的尸体照片佐证惊悚标题。南美笑柄再度沦为秃鹫争夺影响力的饵食。\n\n即便在中立的乌拉圭东岸共和国亦未能免俗。尤以左翼倾向备受争议的《前进报》为甚——这份被誉为拉普拉塔河畔最权威的刊物，持续为同情革命民族主义运动的报道辩护。但真正引爆舆论的并非那些剖析帝国主义贪婪与寡头治理如何荼毒玻利维亚的鸿篇巨制，而是新闻界惯常的封面噱头。记者爱德华多·加莱亚诺提议将玻利维亚乱局命名为“矿石战争”，以期聚焦该国因资源遭掠夺而承受的苦难。主编卡洛斯·基哈诺拍板通过，次日标题便登上头版。\n\n不出数日，竞争对手纷纷效仿此称谓。阿根廷《头条报》与巴西《最后时刻报》相继采纳，旋即《纽约时报》等美国主流媒体亦将其纳入新闻语汇。"
 LATAM_bolivia_mining_wars.20.a: "随后，“矿石战争”一词迅速见诸全球报端。"
 bolivia_crisis_mining_wars_tooltip: "科梅尔西奥大屠杀抹去了一切外交与和平的机会。现在，剩下的只有如何取胜。"
 LATAM_bolivia_mining_wars.21.t: "未曾走过的道路"
 LATAM_bolivia_mining_wars.21.desc: "戈尔贝里·多·科托-席尔瓦听过德尼斯对奥万多的描述，不过，与他本人见面时却感到……一阵失望。奥万多将军一幅紧张不安的样子，做事风格十分神经质。在今天总统府的战略会议上，他的脆弱与恐惧暴露无遗，会议室俨然成了战时指挥中心。\n\n“我们看到越来越多的地区失控，内卫部队内部的民族主义情绪高涨，社会主义长枪党出现在智利边境。”奥万多额头布满汗珠。“政变就是个错误。我一无所有了。人民很快会像对待桑夫拉纳一样把我吊死。主啊，请宽恕我……”\n\n“将军。”席尔瓦的声音不高，但这两个字却如刀锋般锋利，悬在奥万多的喉咙边。席尔瓦的冷静引来了会议室内所有人的注意。\n\n“现在不是空谈的时候。我们需要更强硬的手段。”席尔瓦强忍着笑意，眼前的局势给了他在反叛乱行动上进行实验的机会，比起在巴西，这里显然是更合适的试验场。他继续说道：“我们面临的环境复杂，但我们不能四面出击。依我看，应该集中精力对付其中一个敌对团体。”\n\n一位胸前挂满勋章的玻利维亚军官请求发言，席尔瓦点头示意，尽力不去想这些勋章的真正来源。“我们应该优先打击城市地区的革命民族主义运动。那是我们的主要威胁。如果掌控了城市，乡村问题就会迎刃而解。”\n\n话音刚落，年轻军官打断了他。“轻松的目标赢不了战争。我们或许能轻松击败那些共产分子，但智利的支持让长枪党人在乡村如同老鼠般穿梭逃窜。”他目光坚定地注视着席尔瓦。“如果我们不立即打击农村的不满，迟早会被农民的抗争逐步蚕食殆尽。”\n\n奥万多左右为难之际，席尔瓦已然下定决心。"
 LATAM_bolivia_mining_wars.21.a: "“肃清城市地区可以轻松取胜，我们就从那里开始。”"
 LATAM_bolivia_mining_wars.22.t: "关闭俱乐部"
 LATAM_bolivia_mining_wars.22.desc: "巡逻乡村原本是一场噩梦，但幸运的是，巴西带来了他们的解药——一架直升机。几分钟内，它便能飞跃数英里，将原本需要二十名士兵才能完成的任务，交给一台机器。就在玻利维亚的乡村上空，两个代表不同军队的将军正并肩坐在机舱里——戈尔贝里·多·科托-席尔瓦和罗赫利奥·米兰达。\n\n“好了，我们的地面部队已经清除了大部分乡村中的长枪党。你们的火力，简直就像除灭蟑螂的野火。”米兰达几乎是用喊的声音，才能在直升机的轰鸣声中与席尔瓦交流。他指向前方即将降落的庄园：“现在我们有个新问题，内部的叛徒……”\n\n席尔瓦看着玻利维亚士兵们正在从种植园搬运弹药。“我们已经深入敌方区域了；我猜，这些农场主肯定在为他们提供支持。”米兰达点了点头，显然他对此早有准备。席尔瓦注意到他已经做足了功课。“我很尊重你愿意和我一起深入前线。在首都，虽有不少将军舒服地待着，但敢深入战区的，实在不多。”虽然没有提及奥万多的名字，但两人心照不宣。\n\n“谢谢，将军。现在，我们的新问题是，如何处理这些叛变的庄园。一方面，我们可以把土地分给当地农民，这样或许能赢得他们的忠诚和支持。但直接将这些庄园交给更忠诚的地主，可能更安全，这样也更有利于防守。”米兰达陷入了僵局，等待着席尔瓦的意见。\n\n席尔瓦沉思片刻，假设如果这是巴西的情况，他会如何处理，他最终得出了结论："
 LATAM_bolivia_mining_wars.22.a: "“这是一场争夺民心的战争。分配土地；地主们依然需要我们。”"
 LATAM_bolivia_mining_wars.23.t: "铁拳下的重生"
 LATAM_bolivia_mining_wars.23.desc: "“七个小时。”废弃汽车零件仓库的昏暗角落里，米兰达低声对他的巴西同行说道。这地方，连反叛分子都不敢踏足。“他是个硬汉，但我们给了他足够的‘特殊待遇’。”他点燃一根香烟，递给席尔瓦一根，同时目光落在那只淤青和血迹斑斑的拳头上。“不过只是轻微的——暂时就这样。”\n\n席尔瓦早在抵达之前就收到了简报。眼前坐在椅子上昏迷不醒的男人，是个民族主义工会成员，他因某种道德上的折磨自愿投降。席尔瓦并不清楚他现在是否后悔。当他凝视着那副无力的模样时，差点没听见米兰达继续说话。\n\n“我们已经撬开了他的嘴，窥探了其中的秘密——这些民族主义者并不像他们所宣扬的那般团结。右派中的一些人担心左派把他们逼得太紧，革命者们就如何进行革命这件事上有意见分歧，情况其实很常见。所以，这就把我们带回到我们的‘朋友’身上。”米兰达冷笑着，目光中充满鄙夷，盯着那具已经支离破碎的躯壳。“他主动提出要当叛徒。”\n\n“谢谢你，将军。战争可不是靠戴白手套来打的，我敬佩敢弄脏双手的人。”席尔瓦心里默默想到奥万多，脑海中浮现出他在那座改成碉堡的宫殿里喋喋不休的模样。“你怎么看？你觉得这只老鼠值得浪费时间吗？”\n\n米兰达斜视着他，沉吟片刻。“民族主义者们肯定有大计划，派一个人渗透我们对我们来说并不吃亏。我们也可以在法庭上拿他做个例子，给那些革命者看看，背叛合法政府的代价是什么，警告其他人不要步其后尘。你怎么看？”\n\n装作法官的席尔瓦做出了判决："
 LATAM_bolivia_mining_wars.23.a: "“先放了他，之后我们会把他碎尸万段。”"
 LATAM_bolivia_mining_wars.24.t: "动荡中的国家"
 LATAM_bolivia_mining_wars.24.desc: "枪声划破清晨，成了首都大多数人迎接新一天的独特钟声。这种景象，即便到现在，仍让人感到难以置信。席尔瓦迈步走向总统府，踏入那座曾经巍峨壮丽，如今却被层层封锁的建筑，宛如国家戒严状态的象征。战情室内，米兰达正专注地在地图上做标记，而奥万多总统则在房间里来回踱步，喃喃自语，试图维持一丝岌岌可危的镇定。\n\n“你听到广播了吗？”奥万多开口，“‘一场全面的民族革命’，他们是这样描述的。我原以为他们早已开始进攻了。我们的军警里满是叛徒，工人们占据了街头，高喊要我的脑袋，矿工正在向城市涌来，准备大肆破坏……”他说到这里，忽然停住了脚步，话语戛然而止。片刻后，他低声自语道：“我们的中枢已经崩溃了，一切都完了。”\n\n米兰达抬起头，插话道：“总统，您似乎忘了向席尔瓦通报空军的侦察结果。”见奥万多没有反应，他便决定亲自向席尔瓦说明：“空军报告发现，大批长枪党人正在向首都集结，准备发动所谓的‘拉巴斯大进军’。真是个‘新颖’的策略。”\n\n此时，总统已瘫坐在地板上，语气从最初的恐惧渐渐转为对死亡迫近的接受。“到此为止了吧。他们不可能自己打起来然后散去，是吧？不可能。他们会冲进这座宫殿，把我的头颅挂上长矛，然后宣布他们的‘共产-法西斯革命’取得了胜利。这一切还有什么意义呢？”\n\n席尔瓦看着眼前的总统，终于对将他塑造成一个称职领导者的努力感到厌倦。“难道您还不明白吗？这是他们的最后一搏，是竭尽全力想把国家拖入无政府深渊的疯狂之举。一旦我们熬过去，他们的力量将被耗尽，到那时，我们就能轻而易举地消灭他们。”他描绘的“A计划”让总统稍微安定了一些。然而，席尔瓦心中清楚，他的“B计划”，就是失败后呼叫直升机逃亡，此刻并不适合拿出来讨论。"
 LATAM_bolivia_mining_wars.24.a: "改变国家命运的最后一搏。"
 LATAM_bolivia_mining_wars.25.t: "秩序胜过混乱"
 LATAM_bolivia_mining_wars.25.desc: "“谢谢您，祝您在余下的总统任期内一切顺利。”说完这句话，席尔瓦轻轻关上奥万多办公室的门，迈步走向返回巴西的旅程。在笼罩拉巴斯的“最终对决”恐慌中，这场革命的高潮却从未真正到来。这不过是一场徒劳的闹剧，未能获得大多数民众的支持，最终在一片混乱中偃旗息鼓，只有少数顽固分子仍在负隅顽抗。\n\n尽管民族主义者试图组建对立政府，而且那位独裁者无法争取到自己阵营外的支持力量。然而，席尔瓦清楚地认识到，对于绝大多数人而言，继续忍受一个至少维持着民主表象的独裁者，要比追随一场注定失败的革命来得更为现实。至于那场所谓的“拉巴斯大进军”，最终不过是一次失败的冒险行动。在面对远超预期的顽强抵抗后，这支队伍便溃散了，毫无悬念地走向了失败的终点。\n\n席尔瓦不禁微微一笑。尽管奥万多在整场危机中一如既往地优柔寡断，完全缺乏合格的领导力，最终的胜利却仍然属于他们。席尔瓦深知，自己在这一过程中功不可没，尤其是在反叛乱策略的制定与执行方面。他从口袋中掏出笔，开始将这些经验一一记录下来，心中清楚，总有一天巴西可能会用到它们。\n\n走出总统府时，他最后一次回望这座亟待修缮的建筑。一架直升机正静静等待着他的到来。奥万多的总统任期显然不会维持太久——他的软弱与无能已经昭然若揭，而他的无所作为更是为这一切盖棺定论。席尔瓦寄希望于米兰达，他相信这个人或许能够成为奥万多的继任者，一个有能力维持秩序的强者，才是玻利维亚所急需的领导者。\n\n直升机缓缓升空，席尔瓦的目光投向巴西的方向，心中不禁思考着，在自己的国家维持秩序的任务同样艰巨……"
 LATAM_bolivia_mining_wars.25.a: "……他深刻意识到，此刻唯有军队才能保护巴西。"
 LATAM_bolivia_mining_wars.26.t: "革命！"
 LATAM_bolivia_mining_wars.26.desc: "自己怎么会如此盲目？席尔瓦步履不停走向最后一架撤离拉巴斯的直升机。其他顾问仓皇逃命时，他满脑子都是共产党人如何在政府、民族主义者和长枪党眼皮底下发动革命的。\n\n这场面近乎荒诞。各方沉迷权力游戏，竟无人联手对抗真正威胁。若能在拉巴斯速战速决，赤色分子本无机可乘。\n\n可战局偏偏陷入泥潭。奥万多这种象牙塔指挥官只会不断填人肉磨坊，难怪给了胡安·何塞·托雷斯这个玻利维亚的卡斯特罗可乘之机——尽管军队哗变令席尔瓦痛心疾首。\n\n托雷斯扛着“人民民族革命”大旗，实则是左翼军人夺权搞独裁的把戏。眼下这意味着“清洗反动分子”，寡头集团、米兰达和奥万多都将面对行刑队。席尔瓦倒乐见后者下场，可惜此刻他只能奔向停机坪。\n\n登上直升机时，席尔瓦向失败的反暴乱试验默哀。此役教训深刻，更可怕的是巴西可能重蹈覆辙……"
 LATAM_bolivia_mining_wars.26.a: "在反动派的战争中，革命阶级渴望看到当权者的失败与僵局。"
 LATAM_bolivia_mining_wars.27.t: "革命！"
 LATAM_bolivia_mining_wars.27.desc: "一！二！席尔瓦踏着凄凉的两步舞登上了直升机。这位将军原本希望以英雄之姿凯旋巴西，可惜事与愿违。此刻他怀中揣着的“纪念品”，只有对镇压叛乱时低估长枪党势力而产生的灼心之痛。\n\n看着拉巴斯城在舷窗外渐渐消逝，他忽然意识到这场溃败并非全系己过。奥万多总统听闻向拉巴斯进军的消息便形同枯槁，不出所料地任由叛军步步紧逼，最终让其声势如滚雪球般壮大到无可撼动。在这场力量展示后，他们政府连同敌对的民族主义政权都迅速土崩瓦解。\n\n这简直荒谬可笑。倘若奥万多能展现些许魄力，而非稍有风吹草动就惊慌失措，这场所谓的“进军”本会像纸老虎般瞬间垮塌。虽然进军最终得逞，但并非直接颠覆政权，而是通过展现民众支持度令反对派难以为继。\n\n若正面交锋，即便算上智利人的支援，他们也能轻松取胜。可现实却是被一支杂牌“人民军”吓破了胆。若非切肤之痛尚在，席尔瓦定会觉得这讽刺至极。\n\n可悲的是这幕惨剧真实上演。更可怕的是，巴西也绝非免疫此类危机。当他在笔记本上记录平叛教训时，只能在字里行间默默祈祷：愿这噩梦永远不要在自己的祖国生根发芽。"
 LATAM_bolivia_mining_wars.27.a: "民众的力量，绝不可低估。"
 LATAM_bolivia_mining_wars.28.t: "革命！"
 LATAM_bolivia_mining_wars.28.desc: "直升机轰鸣着远离拉巴斯，但席尔瓦耳畔仍回荡着民族主义者刺耳的宣传广播，犹如溃败的丧钟。进入首都后，革命民族主义运动或武力强攻、或策反内应，迅速控制了多座政府大楼。紧接着，比利亚罗埃尔的声音便响彻全国。\n\n“玻利维亚的同胞们，民族革命已拉开帷幕。加入我们，解放祖国！”光是回想这句话就令席尔瓦青筋暴起。长枪党或许立场暧昧，但政府军听闻宣言后竟如蜂群逐蜜般倒戈，生怕投降不够快似的。至此，内战似乎成了唯一选项。\n\n危难时刻，奥万多总统再次展现“非凡才智”——军方集体撤离拉巴斯时，他宣布投降。平心而论，席尔瓦明白巴西无法公然支持他发动内战，那将引发国际舆论风暴。可他更清楚，但凡能赢得半点民心支持，事态何至于此？\n\n长枪党的进军草草收场，恰恰印证其缺乏民意根基。而民族主义者悄然渗透城市，将不满情绪化作燎原星火，使追随者呈几何级数增长。若当初能将他们困在乡野，这等局面根本无从谈起。\n\n笔尖在笔记本上沙沙作响，席尔瓦长叹一声。政治本非他所长，唯有在危局中才被迫涉足。此刻他只能在字里行间祈愿：愿洛特及其继任者能守住民心，使巴西免于重蹈覆辙。"
 LATAM_bolivia_mining_wars.28.a: "我们掌控了他们的思想，但他们的心却被敌人夺走了。"
 LATAM_bolivia_mining_wars.29.t: "动乱后遗症"
 LATAM_bolivia_mining_wars.29.desc: "“‘被他们合法的玻利维亚主人征用’？这什么意思啊？那可是巴西的财产！”罢工导致工作停滞，蒂亚戈只能无奈地听着工头与玻利维亚方面的电话争吵。对话的内容虽然令人忧心，却带着几分荒诞的滑稽感。“去死吧，你们这些共匪！我要过去把我的脚踹到你们的……喂？喂？！”\n\n就在此时，门突然被用力推开，蒂亚戈迅速装出一副忙碌的样子。“所有工人注意！”工头抓起扩音器大声喊道，刺耳的反馈声却打断了他的话。他咳了一声，继续说道：“那些还没看新闻的人听好了，玻利维亚已经推翻了他们的合法政府，换上了一个独裁政权。而这个新政权刚刚非法将巴西在玻利维亚矿山的资产国有化。”\n\n工人们面面相觑，神情中满是困惑。工头意识到需要更直白些。“简单点说吧，这意味着我们没有金属了。没有金属就意味着亚马孙公路的建设将大大延误。如果这种情况持续下去，一些人可能会失业。对此造成的不便，我们深表歉意。好了，现在回去工作吧。”\n\n工人中开始传出愤怒的叫喊声，但蒂亚戈却在思考这意味着什么。这次国有化的影响显然不仅限于他们的工地，而是波及整个巴西的工业链。更令人担忧的是，这势必会推动金属价格飙升，甚至创下历史新高。而随着金属短缺，其他商品的价格也将避免地水涨船高。\n\n蒂亚戈强迫自己专注于眼前的工作。他为自己至少还有工作而感到一丝庆幸，但这能持续多久呢？他环顾四周，看到同事们一个个满脸愤懑，但他们真的准备好为此行动起来吗？他不确定。市场会回暖的，它必须回暖。否则，混乱的局势只会愈演愈烈……"
 LATAM_bolivia_mining_wars.29.a: "巴西会步玻利维亚的后尘吗？"
 LATAM_bush_war.1.t: "简报"
 LATAM_bush_war.1.desc: "“到目前为止你都明白了吗？务必要记住这些，这真的很重要。”卡纳皮诺一边指着办公桌上散乱的地图，一边透过眼镜瞥了眼他的新秘书索菲娅。他略带居高临下的语气让索菲娅微微挑了挑眉，流露出对这位阿根廷军情局探员的不满。卡纳皮诺的手指停在巴拉那河的位置，继续说道：“1954年，巴西和OFN曾试图推翻巴拉圭的政府，但在‘暴君’的协助下，这场行动以失败告终。随后，巴拉圭的反对派逃往乌拉圭，在那里重组成了联合民族解放阵线。”\n\n“我在新闻中读到过联合民族解放阵线，”索菲娅回应道，“自由主义者、‘二月党人’和共产主义者，全都掺杂在一起。”\n\n“没错。”卡纳皮诺显然沉浸在自己的讲解中，并未理会索菲娅的插话。他继续说道：“如今，在乌拉圭，德国情报部门策划组建了一个恐怖组织，当地人称之为‘第五纵队’。他们设计了一系列计划，意图消灭尽可能多的解放阵线成员。但可惜的是，这些计划在实施前就被警方挫败——更糟糕的是，巴拉圭显然也插手了其中。”\n\n“可惜？”\n\n卡纳皮诺挥手指向阿根廷北部边界：“联合民族解放阵线被消灭无疑会削弱巴西对我们的包围企图。不过，没关系，他们迟早会为此付出代价。”他说完抬起头，缓缓说道：“不得不说，小姐，你对我们这项工作的兴趣让我印象深刻。”"
 LATAM_bush_war.1.a: "我需要记笔记吗？"
 LATAM_bush_war.2.t: "南美警察"
 LATAM_bush_war.2.desc: "“诸位，这次事件让我感到，我们距离灾难只有一步之遥。”得知乌拉圭挫败恐怖袭击的消息后，洛特显得有些紧张，他迫切需要德尼斯和萨莱斯的建议。“我还看到了有关联合民族解放阵线也成为目标的报告。自从瓜伊拉瀑布行动失败以来，他们几乎是我们在巴拉圭唯一的希望……”\n\n德尼斯接过话头，语气中带着一丝愤怒：“1954年我们没能从法西斯手中解放巴拉圭，但那次失败并非完全是我们的责任，你还记得吧。美国袖手旁观，阿根廷从中干预——如果他们这次干掉了联合民族解放阵线，那就等于扼杀了混乱局势中唯一的希望。”\n\n“当我们最终说服巴拉圭反对派领导人逃往乌拉圭时，是基于我们能够保护他们的承诺。”萨莱斯语气谨慎，“至少这次我们兑现了这个承诺。据我们在蒙得维的亚的朋友传回的消息，这几乎可以确认是一次巴拉圭和德国联合策划的行动。”\n\n“这不可容忍！”德尼斯怒吼道，“阿根廷必须为此付出代价！我们在巴拉圭边境部署的防御工事形同虚设，而他们却能通过布宜诺斯艾利斯的庇护者从海上源源不断地获得补给。”\n\n洛特摇了摇头，语气坚定：“我们不会主动升级局势，德尼斯。小范围展示一下我们的实力就好。派遣飞机在巴拉圭边境上空巡逻，开展反走私行动。如果抓到任何罪犯，随你处置。”接着，他转向萨莱斯，“通知蒙得维的亚，我们的情报部门随时准备协助他们清除法西斯势力。”"
 LATAM_bush_war.2.a: "“我们有计划，就让它奏效吧。”"
 LATAM_bush_war.3.t: "南美警察"
 LATAM_bush_war.3.desc: "“看来纳粹主义依旧猖獗。”得知乌拉圭恐怖袭击的消息后，洛特陷入了苦涩的反思，而德尼斯和萨莱斯则默默忍受着他的沉思。“更糟糕的是，我还收到报告称，联合民族解放阵线也遭遇了类似的袭击。这一切就像1954年瓜伊拉瀑布入侵行动的重演，一切都变得如此糟糕……”\n\n德尼斯打断了他的思绪：“确实令人遗憾，我们当时没能解放巴拉圭，令其摆脱法西斯的控制。但那次行动的失败并不完全是我们的错。美国人袖手旁观，阿根廷从中作梗，行动注定会失败。至少，它促成了联合民族解放阵线的成立——这是我们努力的一个共同成果，一个统一阵线。”\n\n“没错，我还记得当初为了说服巴拉圭的民主反对派离开乌拉圭，我们经历了无数次唇枪舌剑。”萨莱斯接话，却很快停住了自己的回忆：“不过，现在的重点是，蒙得维的亚已经确认，这次袭击是德国和巴拉圭联手发起的行动。”萨莱斯的声明让会议室陷入了短暂的沉默，空气中弥漫着怀疑和不安。\n\n“德国人……”洛特缓缓开口，“我原以为他们至少还有一些底线。”德尼斯点头表示赞同：“无论如何，这些事件表明乌拉圭单独应对恐怖袭击已力不从心——我们必须承担起这一重任。我建议建立一个间谍网络，专门处理类似的问题。最好是赶在蒙得维的亚察觉之前，悄无声息地解决掉这些威胁。”"
 LATAM_bush_war.3.a: "有句老话说得好：“信任，但要核实。”"
 LATAM_bush_war.4.t: "简报"
 LATAM_bush_war.4.desc: "“到目前为止，这些内容你都跟上了吗？不能有任何遗漏，它们都至关重要。”卡纳皮诺指着散落在办公桌上的地图，一边透过眼镜瞥了眼他的新秘书索菲娅。他那居高临下的语气让索菲娅微微挑了挑眉，显示出对这位阿根廷军情局探员的不满。卡纳皮诺的手指停在巴拉那河的位置，继续说道：“1954年，巴西和OFN曾试图推翻巴拉圭的政府，但多亏了‘暴君’的帮助，那场行动以失败告终。随后，巴拉圭的反对派逃往乌拉圭，在那里重组成了联合民族解放阵线。”\n\n“我在报纸上读到过联合民族解放阵线的事，”索菲娅回应道，“自由主义者、‘二月党人’和共产主义者，全都搅和在一起了。”\n\n“没错。”卡纳皮诺显然沉浸在自己的讲解中，并未理会索菲娅的插话。他继续说道：“如今，在乌拉圭，德国情报部门策划组建了一个恐怖组织，当地人称之为‘第五纵队’。他们策划了一系列行动，意图消灭尽可能多的解放阵线成员。相信你在新闻上也看到了，在警方将其组织捣毁之前，他们已经造成了相当大的破坏。不出意外，他们还发现了一些巴拉圭参与其中的证据。”\n\n“德国人也给乌拉圭造成了很大破坏。”\n\n“是啊，相当不幸，不是吗？不过，当那个东岸叛乱省（阿根廷人对乌拉圭独立地位的否定式蔑称）选择与华盛顿站在一起时，这一切不过只是咎由自取了。”他抬头看着索菲亚。“不得不说，小姐，你对我们这项工作的兴趣让我印象深刻。”"
 LATAM_bush_war.4.a: "我需要记笔记吗？"
 LATAM_bush_war.5.t: "胖乔与他的冒险"
 LATAM_bush_war.5.desc: "“乔！你这个胖混球，欢迎回家！”阿尔弗雷多·奥索里奥带着灿烂的笑容张开双臂迎接巴克斯特，而后者的脸因兴奋涨得通红，两人用一个热烈的熊抱表达了久别重逢的喜悦。“天啊，这是什么味道？你是不是又去夜总会了？”\n\n“哦，亲爱的，这能有什么问题？”巴克斯特一如既往地以幽默回应。“享受生活中的小确幸难道是一种罪过吗？毕竟这些可是上帝赐予我们的珍贵礼物之一。当然，仅次于我们对祖国的职责。”他说着，露出更加灿烂的笑容，转而望向他的两位老朋友——何塞·路易斯·内尔和豪尔赫·卡法蒂。他们正以无可挑剔的45度角举起右臂行礼。巴克斯特礼貌地还了一个相同的手势，继续说道：“我尊敬的朋友们，我今天带来了一个绝妙的消息。我们，以及整个大陆上的所有同志，都被邀请前往巴拉圭。这是一场盛大的聚会，但仅限于我们自己——那些在与资本主义者和犹太共产主义者的斗争中奋斗的真正爱国者们。”他停顿了一下，拉直身姿，故作戏剧性地迈了一步，“更重要的是，作为我们光荣组织的公关部长，我有义务代表大家参加这一极具声望的会议。”\n\n话音刚落，三人顿时大笑起来。老乔果然没有让人失望。“再讲一个吧，乔！”奥索里奥拍着巴克斯特的肩膀，笑着说道，“你不过是在找个借口离开这个国家罢了！”他们的笑声未落，楼上传来了一阵喊叫声。“啊，别担心，”内尔耸了耸肩解释道，“那不过是卡博和埃斯库拉又在争论，我们是不是为庇隆将军的回归做得不够。卡博的脾气，你懂的。”\n\n巴克斯特摇了摇头，脸上带着些许无奈，既不确定该为这个倔强的老朋友感到同情，还是为他的固执感到好笑。“不行！我得邀请卡博一起去亚松森，这样他就没时间再生气了！哦，他的新女朋友也得来！如果这样还不能让他高兴，那我就不叫何塞·路易斯·巴克斯特！那得叫我……呃！算了，我一时想不到一个希伯来名字。”这拙劣的玩笑让他自己笑得前仰后合，其他人也被他逗得乐不可支。对巴克斯特来说，只要他们开心，他就开心。"
 LATAM_bush_war.5.a: "毕竟我们是一家人，需要互相关照。"
 LATAM_bush_war.6.t: "后院里的恐怖分子"
 LATAM_bush_war.6.desc: "洛特的耐心早已消耗殆尽。他随手一挥，将办公桌上堆积如山的文件扫落在地，唯余那张标示着“拉丁美洲弃儿”——巴拉圭的地图。尽管他完全有理由、也有意愿这么做，此刻却并非策划入侵的时机，这让他懊恼为何没有早点动手。\n\n那个早该被赶下台的纳粹拥趸、该死的伊希尼奥·莫里尼戈，竟敢在亚松森召集法西斯分子大会。整个拉丁美洲的渣滓都将齐聚一堂，而他却只能束手旁观这场恐怖马戏。是的，收拾巴拉圭人及其阿根廷靠山的时机终会到来，但洛特已厌倦了等待。他一手抓起电话，另一手在地图上标出鲜红的记号。“我是总统。戈尔贝里，细节我就不赘述了——想必你和我一样清楚莫里尼戈这场下流表演的威胁性。”\n\n“哈！还用您提醒？”情报局长敏锐地接话，“我们原以为这混蛋任期结束后就能高枕无忧。看来他另有所图啊。或许正好借此机会彻底了结此事？负面舆论反倒能正当化我们的行动。”\n\n“不行。我可不想重蹈瓜伊拉瀑布的覆辙。马上会给你发送边境哨所坐标，你的人必须严密监视所有越境者。凡是前往亚松森的人员，都要记录详细情报。若能掌握这些匪徒的名单，对日后行动大有裨益。”\n\n“遵命。说实在的，我很难相信我国公民会参与这种勾当。但您说得对，我们必须时刻警惕颠覆活动。”"
 LATAM_bush_war.6.a: "洛特微微一笑：“你完全理解我的意思，戈尔贝里。我们会将正义带给这些匪徒。”"
 LATAM_bush_war.7.t: "红色惊雷"
 LATAM_bush_war.7.desc: "“共党恐怖分子在南美集结；新闻出处：乌拉圭。今日，东方共和国传来不祥之兆——臭名昭著的恐怖分子头目与革命者切·格瓦拉，正召集拉美各地的马克思主义革命分子，争取他们的支持以策动一场席卷整个大陆的内战。\n\n在这次格瓦拉在埃斯特兰角主持召开的会议中，这群革命阴谋家正式成立了革命协调委员会，简称RCJ，这一机构几乎将所有拉丁美洲的社会主义游击队的行动联合了起来。\n\n更糟的是，格瓦拉的野心并不止步于此，如其本性使然，这位阿根廷左派人士在RCJ的支持下，单方面宣布对FULNA提供支持，这相当于格瓦拉将他在拉美的所有政治与准军事力量全部投入到了这场由巴西背后支持、由共产党明面领导的南锥体地区大叛乱之中。”\n\n“放肆！”萨图尼诺将报纸狠狠地摔在餐桌上，脸涨得通红。“庇隆将军早该在十年前就把这些红色杂种清理干净了，去他妈的！”他年轻时的那个阿根廷去哪了？萨图尼诺心想，那个在他头发尚未灰白之时、从不对他国卑躬屈膝的阿根廷？要是还是在那时候，无数的爱国男儿一定会直冲那些巴西佬的老巢，将他们个个击毙，子弹和死亡才是他们应得的。\n\n萨图尼诺怒目圆睁，咆哮如雷：“让他们下地狱去吧！该死的猴子杂种！”他紧握的拳头砸向餐桌上的咖啡杯，陶瓷一瞬碎裂，一缕鲜血顺着他的大拇指滴落，染红了桌布。他站起身来，怒火仍不减；“伊莉莎贝塔！我要出门！把这坨狗屎清理干净！”他冲着妻子怒吼，拽开了前门，差点把门从门轴上扯了下来，愤愤地走了出去，他的满腔怒血正在沸腾。"
 LATAM_bush_war.7.a: "幸运的是，此时伊莉莎贝塔正好在外采购杂货，也早已对她丈夫的超雄怒吼习以为常。"
 LATAM_bush_war.8.t: "王牌在手"
 LATAM_bush_war.8.desc: "绝密\n仅供总统阅览\n\n乌拉圭——OFN合作伙伴国\n\n我方情报人员对最近在埃斯特角召开的革命者会议做出了详细记录。本次会议的核心人物为切·格瓦拉，他提出了建立“革命协调委员会”的主要倡议，意图创建一个统一的中枢指挥体系，保障南美各地的共产主义革命能够更具组织性地推进。\n\n与会者还包括巴拉圭共产党代表及“二月党人”。我们怀疑，他们曾尝试将联合民族解放阵线纳入这一倡议。然而，据可靠情报判断，因自由党的强烈反对，该提案最终遭到否决。然而，格瓦拉本人对此表现出极大的兴趣，这无疑透露出他更为宏大的战略意图。\n\n我们的情报进一步证实，格瓦拉确有意插手巴拉圭事务。通过截获的一封致联合民族解放阵线的密函，我们确认他明确表示支持阵线对莫里尼戈政权的反抗。此外，“蓝鹦鹉行动”获取的情报证实，他曾向一名“二月党人”代表提供了等值1万美元的资金，再次印证了其对巴拉圭革命事业的坚定承诺。\n\n虽然格瓦拉代表着一种与我国利益直接对立的破坏性意识形态，但只要他站在联合民族解放阵线一方，他的存在反而成为了一张潜在的强力王牌。若能妥善运用，并在抑制其共产主义势力扩张的前提下，这一力量将极大提高我们推翻法西斯政权的成功几率。\n\n秩序与进步"
 LATAM_bush_war.8.a: "一张珍贵的王牌，只要你能稳稳握在手中。"
 LATAM_bush_war.9.t: "关于秃鹰军团的报告"
 LATAM_bush_war.9.desc: "仅供授权人员查阅 - [?global.date.GetDateStringNoHourLong]\n\n总统办公室情报报告\n\n阿根廷军事情报局\n\n概要：\n\n自普拉塔港入侵行动发起两个月以来，我方已掌握足够的情报，以对“秃鹰军团”的编制及动向进行初步分析。这支法西斯武装此前对我方情报渗透保持高度戒备，但目前我们已确认其由阿道弗·希罗伊托·维拉斯博亚指挥。关于此人的背景资料仍然极为有限，有待进一步核实与补充。秃鹰军团下辖三支旅，分别为“普里马韦拉旅”、“加里波第旅”及“伊莎贝尔旅”。最初，这支部队曾在容克军校接受训练，并由斯特罗斯纳将军亲自督导。然而，训练计划在完成前即被提前中止。据现有情报判断，此举极可能与普拉塔港的战事直接相关。将首支泛拉丁美洲作战部队仓促投入战场，显然是出于宣传考量，以彰显法西斯政权的军事威势。\n\n然而，实际的战况证明了这一决策的严重失误。秃鹰军团的实际表现远不及加勒比军团，且多米尼加方面已多次对其盟友的作战能力表示不满。从目前战况判断，秃鹰军团短期内难以成为法西斯政府手中的“道德资产”，其象征性作用已大打折扣。尽管如此，我方情报部门将继续密切关注该部队的动向。秃鹰军团虽在此次行动中表现不佳，但考虑到其训练背景及潜在的政治象征意义，他们极有可能在汲取教训后卷土重来，未来仍不可忽视其军事威胁。\n\n请总统即刻审阅。"
 LATAM_bush_war.9.a: "本报告由塞尼奥兰斯匆忙签署。"
 LATAM_bush_war.1O.t: "战犬"
 LATAM_bush_war.1O.desc: "绝密\n布宜诺斯艾利斯，- [?global.date.GetDateStringNoHourLong]\n\n情报报告 第 547/63 号\n\n呈送：[ARG.GetLeader]总统\n\n事由：秃鹰军团评估报告——虽有挫折，仍见进展\n\n摘要：\n\n普拉塔港入侵行动已持续两月，有关多米尼加境内秃鹰军团的战力评估报告现已完成。评估结论指出，尽管该部队在应对战场环境变化方面仍存在明显不足，但仍具备在未来冲突中发挥作用的相当潜力。\n\n由“阿道夫·裕仁·比利亚斯沃阿”指挥的“普里马韦拉”、“加里波第”及“伊莎贝尔”旅，其训练进程因这场突如其来的入侵而仓促完成。该军团本应作为一支泛美作战力量，以这次向多米尼加政府提供的有力支援而获得宣传上的有利地位。然因战术准备不足，宣传效果未能体现，反因数次在加勒比军团手中失利而造成负面观感。\n\n特鲁希略城内的多方消息来源均抱怨该军团现有的作战能力实在是令人大跌眼镜。但有军事分析指出，若能在巴拉圭战区接受更系统的指挥与整编，其作战潜力仍可进一步开发利用。\n\n鉴于巴西军事干预风险仍处高位，亟需就秃鹰军团战力恢复与调配制定明确计划，确保其在巴拉圭面临战备缺口时能及时介入支援，提升整体应急作战能力。\n\n谨此呈报，敬礼。\n莫德斯托·萨韦德拉"
 LATAM_bush_war.1O.a: "放手去干，不留痕迹。"
 LATAM_bush_war.11.t: "未知的变数"
 LATAM_bush_war.11.desc: "绝密\n仅供总统阅览\n\n多米尼加共和国——各方势力争夺区\n\n自普拉塔港入侵行动发起以来，我方已对其中最为特殊的参战力量之一——“秃鹰军团”的战斗表现进行了全面评估。该军团自称为首支泛拉丁美洲法西斯作战部队，由巴拉圭军官阿道弗·希罗伊托·维拉斯博亚领导，下辖三支旅，分别为“春天旅”、“加里波第旅”及“伊莎贝尔旅”。\n\n在这三支部队中，“春天旅”值得总统特别关注，其指挥层涉及巴西叛徒。目前，该旅由阿曼多·扎尼内·特谢拉·儒尼奥尔领导。他曾为巴西商船海军军官，因其亲纳粹立场遭军方开除，后前往巴拉圭，担任巴西民族社会主义党在当地的领导人。\n\n三支旅最初均在容克军校接受训练，由斯特罗斯纳将军亲自监督。然而，由于普拉塔港入侵行动爆发，他们的训练被迫提前终止。我方情报推测，此举意在利用参与保卫拉丁美洲少数法西斯政权之一所带来的宣传价值，以提升该部队的政治象征意义。\n\n然而，由于训练不足，秃鹰军团在战场上的作战效能极为有限，实际贡献仅停留在宣传层面。入侵行动初期不久，多米尼加军方便因其作战能力低下多次提出正式抗议，最终迫使该军团被撤回巴拉圭继续接受补充训练。\n\n尽管目前秃鹰军团的战斗力有限，但其在该地区的存在已成为一项潜在的不稳定因素，他们仍可能在未来构成威胁，不可掉以轻心。\n\n秩序与进步"
 LATAM_bush_war.11.a: "一支法西斯的“国际纵队”？"
 LATAM_bush_war.12.t: "危机持续"
 LATAM_bush_war.12.desc: "仅供授权人员参阅 - [?global.date.GetDateStringNoHourLong]\n\n总统办公室情报简报\n\n阿根廷军情局\n\n摘要：\n\n继莫里尼戈离任后，巴拉圭的局势未能得到好转。尽管在他治下该国经济一度陷入停滞萧条，但辞职这一行为本身并不能解决社会中任何长期存在的困难。而当前执政的法西斯党内部已经失去秩序，深陷于内部政治斗争。此时，其对手大致为红党内部一个名为“民主派”的松散团体，该派系致力于实现该国的民主改革。\n\n虽然冲突仅刚刚持续数周，但我们已观察到政府内部各派系相互倾轧的大量迹象。该国包括官僚体系在内的所有国家机构均受波及，而其普遍态度似乎是：在相互攻讦中，无所不用其极。巴拉圭政府处于非常动荡不安的状态，其崩塌可能仅需微小触发条件。"
 LATAM_bush_war.12.a: "巴拉圭仍存，但时日几何？"
 LATAM_bush_war.13.t: "危机的延续"
 LATAM_bush_war.13.desc: "绝密\n布宜诺斯艾利斯，- [?global.date.GetDateStringNoHourLong]\n\n情报报告 第 595/63 号\n\n呈送：[ARG.GetLeader]总统\n\n事由：巴拉圭后莫里尼戈时代权力斗争：潜在颠覆影响\n\n摘要：\n\n尽管莫里尼戈已经下台，但巴拉圭政局仍处僵局之中。亚松森中央政府身陷泥淖，其与红党民主派之间旷日持久的权力斗争阻碍了长久解决方案的落地。\n\n数周以来，巴拉圭各级机构中都酝酿着行政冲突，官僚机构和其他机构正在纷纷站队，利用各自的权力与反对派周旋。因此，部门与部门之间的活动混淆难分，文件遭到刻意隐匿，合作也受到限制，全国政治结构异常脆弱，一旦危机爆发，政府将不堪一击。\n\n巴拉圭当局之间的冲突已经到了国家极易受到外国不正当影响的地步，特别是巴西利亚和华盛顿，据传两国已就巴拉圭局势制定了各自的方略。我们必须对伊塔马拉蒂宫保持警惕，以免他们利用现状来对付我们。\n\n谨此呈报，敬礼。\n莫德斯托·萨韦德拉"
 LATAM_bush_war.13.a: "巴西赢不了我们。"
 LATAM_bush_war.14.t: "巴拉圭的困境"
 LATAM_bush_war.14.desc: "绝密\n仅供总统阅览\n\n巴拉圭——阿根廷影响力受威胁\n\n伊希尼奥·莫里尼戈总统的政权长期以来被普遍认为已陷入停滞。近年来，其权力大幅衰退，但即便他退出政治舞台后，遗留下来的政治与治理问题依旧未能得到有效解决。\n\n现任总统[PAR.GetLeader]依然维持着莫里尼戈时期的法西斯统治，尽管该体制的弊病已严重破坏国家稳定。而且，这一局势并未被巴拉圭红党所忽视。近日，党内新兴的领导层已陷入与民主派的激烈权力斗争，后者主张对国家进行全面民主化改革。\n\n尽管这场斗争才刚刚开始数周，但它已全面吞噬了巴拉圭的国家治理能力，严重阻碍了其政府的正常运作。官僚体系与其他关键国家机构因民主派与保守政府间的内斗陷入瘫痪，双方为争夺国家权力不惜一切代价。\n\n显然，他们的软弱正是我们的机会。随着国家的稳定与安全逐渐被内斗掩盖，我方有充分理由认为，当前是影响亚松森政局的理想时机，以确保未来的政权更替符合我方战略利益。目前，我方将继续密切监测事态发展，并在局势具备进一步推动的条件时，立即向总统通报，以便采取必要行动。\n\n秩序与进步"
 LATAM_bush_war.14.a: "我们的机会。"
 LATAM_bush_war.15.t: "兀鹫的目光"
 LATAM_bush_war.15.desc: "塞尼奥兰斯尊重作为军人的卡洛斯·富尔德纳。因此，他十分放心地邀请这位老人来到了他的办公室，与他共饮一杯，愉快地交谈一番。但其实，他也很清楚秃鹰军团的情报和后勤主任是个什么样的人。\n\n“富尔德纳上尉，”塞尼奥兰斯问道，“您在亚松森的职位待遇如何？”\n\n“我必须承认，比我计划中的安享晚年要好得多。”富尔德纳露出了一个沉闷的微笑，“还能派上点用场，这感觉真不错，而且那儿还有一群好小伙子。”\n\n“你可能已经猜到了，但那些小伙子正是我想说的事情。”听到塞尼奥兰斯的这番话，富尔德纳的神情发生了变化，快活的老兵让位给了狡诈老狐、假笑纳粹、阴影之人——塞尼奥兰斯看到了富尔德纳的本来面目，看到了德国那震撼世界、百万雄师的胜利曾经灌输给他的精神。\n\n“我想，如果巴拉圭发生危机，你需要向我的组织运送阿根廷军需吧？如果可可能，我已经想到了几条路线。”\n\n塞尼奥兰斯坐了下来，像圣人一样拘谨，任由军团的间谍头子滔滔不绝，他在富尔德纳的眼中看到了一丝期待：“将军，我在驻扎期间，建立了一个水电企业——您知道的，资源公司是最好的伪装，想去哪儿就去哪儿，重要人物也总是喜欢和你打交道，我们也应该可以轻易地移动设备。另外，您能为我做点什么吗？我在佩林格的时代就认识一些优秀的阿根廷情报局秘密特工，如果能把他们唤醒，那肯定能帮上大忙。”"
 LATAM_bush_war.15.a: "“好的，上尉，我去打几个电话。”"
 LATAM_bush_war.16.t: "何物塑造巴西人？"
 LATAM_bush_war.16.desc: "洛特埋头于沉重的情绪中，翻阅着办公桌上一份又一份情报文件，直到德尼斯一身喜气洋洋地推门而入，才打破了这份压抑的气氛。“看来有人提前过上了圣诞节啊。”德尼斯半开玩笑地调侃，但目光很快被那一摞摞厚厚的情报文件吸引，显然总统已经研读了许久。他收敛了笑意，认真问道：“不过，看你这脸色，我还真猜不出发生了什么事？”\n\n“是那个巴西纳粹，阿曼多·扎尼内·特谢拉……儒尼奥尔。”他说出最后一个名字时，语气里透着一种难以掩饰的厌恶与遗憾，仿佛连这名叛徒的父亲都值得同情。“我实在无法理解，这样一个人，自称‘爱国者’，却在一切尘埃落定后站到了敌人一边？就连那些支持寡头的全国民主联盟，也不至于如此背叛自己的国家。”\n\n洛特继续絮絮叨叨地抱怨着，让德尼斯开始后悔自己多嘴问了句“怎么了”。“这个扎尼内，简直是个彻头彻尾的叛徒！更可笑的是，他甚至连在国内造反的胆量都没有。躲在巴拉圭，在那个腐朽的角落里，散布‘巴西民族社会主义党’的毒瘤思想。这种胆小鬼，连背叛都要挑一个安全的地方，真是个懦弱的笑话！要是在我们控制范围内，他早就被铲除了。”\n\n洛特越说越激动，脸色涨得通红，德尼斯见状直接靠在对面的椅背上，暗自盘算着该如何打断他。“我真希望当初有机会把巴拉圭彻底摧毁，把那些腐朽的法西斯分子统统送进坟墓。他们本该被埋葬在那里！把那个该死的国家夷为平地——”\n\n“洛特，冷静点。”德尼斯打断了他的怒火，“正义终究会降临到这些鼠辈身上。即便我们不动手，他们的报应也终将到来，很可能是一颗直击腹部的子弹。”德尼斯的话让洛特的脸上立刻浮现了一丝笑意。“尽管总有几个疯子存在，我们忠诚的士兵始终在守护着我们的国土，保护着我们免受这些人的威胁。”"
 LATAM_bush_war.16.a: "叛徒们也许讥笑讽刺，但巴西旗帜将继续飘扬。"
 LATAM_bush_war.17.t: "非正式公务"
 LATAM_bush_war.17.desc: "在亚松森机场干安检是个清闲差事。身处这块南美“黑斑”，平日顶多处理几箱印着万字符的货物。所以当卡洛斯·弗洛里特自称“有公务在身”时，值班人员麻溜放行。\n\n出租车里，弗洛里特对司机大谈阿根廷的城市建设，反复拿布宜诺斯艾利斯的摩天楼群与仍停留在二十世纪早期风格的亚松森做比较。司机问起他此行的目的，弗洛里特却始终用“公务”搪塞，其实他的任务是来交朋友。\n\n“欢迎来巴拉圭，弗洛里特先生，坐吧？”民主派领袖埃皮法尼奥·门德斯·弗莱塔斯走近时声如洪钟，引得四周食客纷纷侧目，弗洛里特见状暗自庆幸——还好之前没说漏嘴。\n\n寒暄过后，在玉米馅饼的香气中，弗洛里特感受到政治家特有的庄重——他此行要传达阿根廷对弗莱塔斯的支持，让巴西别插手，至于盟友们反感的法西斯色彩……装没看见就行。\n\n“只要布宜诺斯艾利斯继续支持我们，礼尚往来嘛。”弗莱塔斯嚼着馅饼突然发问：“不过我有点好奇，你怎么看待你们国家那位‘将军’？”\n\n弗洛里特瞳孔骤缩，面颊涨得通红。还能是哪位将军？当然是庇隆。“您……莫非是庇隆支持者？”他强笑着打哈哈。\n\n“支持者？”弗莱塔斯拍腿大笑，“谈不上，就随口一问。可千万别往心里去。”"
 LATAM_bush_war.17.a: "真奇怪。"
 LATAM_bush_war.18.t: "站台上的密谈"
 LATAM_bush_war.18.desc: "阿尔弗雷多斯·拉莫斯的蒙得维的亚至巴西之行，被极端的保密措施层层包裹着。他甚至未曾踏下火车半步。反倒是洛特总统、德尼斯将军与戈登大使亲自登上了他的包厢，与这位流亡的巴拉圭自由党领袖进行了一场秘密会谈。透过拉紧的窗帘缝隙，拉莫斯隐约瞥见站台上布满了士兵，夕阳的余晖穿透缝隙，投下细碎的金色光斑，洒落在车厢内。\n\n德尼斯率先开口：“我就开门见山了，拉莫斯。如果巴拉圭爆发革命，你认为联合民族解放阵线能够维持团结吗？”\n\n拉莫斯目光在被阴影笼罩的三位贵客身上扫过，语气坚定地回答：“我不这么认为，将军。一旦法西斯这个共同的敌人被消灭，分裂将不可避免。这也是我当初反对与巴拉圭共产党结盟的原因之一。然而，当时我们别无选择。”他顿了顿，意味深长地瞥向戈登，眼中闪过一丝试探与怀疑。\n\n洛特沉声接道：“你不信任共产党，这很明智。这正是我们今天亲自前来的原因。”\n\n戈登微微点头，从西装内袋中取出一个牛皮纸文件夹，平静地说道：“我们在为你的利益着想。这是一份详细的计划，关于如何在革命成功后，自由党清除巴拉圭共产党势力的步骤。我们已经为你们拟定好了，但执行必须由你们来完成。”\n\n他将文件夹滑过深棕色的红木桌面。拉莫斯警惕地接过，用手紧紧按住文件。“记住，”洛特目光锐利地补充道，“今天的谈话从未发生过。我希望下次我们再会时，是总统与总统之间的对话。”\n\n随着夜幕降临，拉莫斯的三位“恩人”隐没在车站中。吉普车的引擎声在寂静中低沉回荡，逐渐驶离。而列车，则缓缓驶回沉睡的蒙得维的亚。"
 LATAM_bush_war.18.a: "敬那些守护你我之人。"
 LATAM_bush_war.19.t: "明日已至"
 LATAM_bush_war.19.desc: "军靴深陷米西奥内斯省泥泞的丛林，切·格瓦拉回望身后的游击纵队。阿根廷东北角的滂沱荒野与数日前沐浴马黛茶香的乌拉圭恍如隔世。尽管环境恶劣，他仍为重返战场而振奋——巴拉圭冒险是历史赋予的使命，是他与生俱来的宿命。\n\n溯河而上的征途险象环生，阿根廷巡逻艇的探照灯曾如利刃劈开夜幕。若非巴西人提供的河道盲区情报，这支队伍恐难突破封锁——尽管切极不情愿承认这只与自己信念背道而驰者伸出的援手。\n\n卡斯特罗虽属资产阶级民族主义者，至少心系民众。而眼下这群“盟友”——流亡的巴拉圭自由派与巴西军校出身的独裁狂人——令他作呕。彼此的嫌恶全因利益而暂抑：华盛顿需要利用他们对抗另一只鹰隼。\n\n雨林中，权谋算计皆成遥远回响。身侧尽是托付生死的革命者：虽衣衫褴褛、雨具短缺，士气却如淬火之刃。游击队员——多为共产党人，亦有可被激进化的二月党人——追随切的征途，无怨跋涉，甚至赠他“巴拉圭先生”的昵称。云破日出，亚松森解放的曙光已在地平线跃动。"
 LATAM_bush_war.19.a: "南美大陆的心脏颤抖着——究竟谁会付出历史所要求的代价？"
 PAR_bush_war_info_box: "§n巴西§!和§R联合民族解放阵线§!需在亚松森取得§Y50%§!§Y控制权§!，或者在4个不同地区取得§Y50%§!§Y控制权§!才能推翻政府。§m阿根廷§!与§Q巴拉圭政府§!必须不惜一切代价阻止对手，直至完成“§Y政府动员对抗§!§R联合民族解放阵线§!”任务。\n\n降低£stability_texticon §Y稳定度§!对§R联合民族解放阵线§!有利。若£stability_texticon §Y稳定度§!低于§Y50%§!，巴拉圭总统可能会受到威胁，这可能使§R叛军§!在丛林战争中取得重大优势。\n\n如果§R联合民族解放阵线§!成功夺取巴拉圭政权，掌权派系将决定其对外倾向。§n巴西§!必须支持§m自由党§!以扩大§n巴西§!的势力范围，阻止§V民族主义者§!上台。记住提高警惕，若§R联合民族解放阵线§!陷入§Y分裂§!，野心家可能趁乱夺权……\n\n§m自由派§!将每周获得§Y1%§!的势力增长。"
