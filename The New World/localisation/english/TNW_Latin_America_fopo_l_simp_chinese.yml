 LATAM_bolivia_mining_wars_epilogue.1.t: "测试轮"
 LATAM_bolivia_mining_wars_epilogue.1.desc: "“开火！”\n\n话音刚落，干旱的高原上便回荡起阵阵喧嚣，枪炮的轰鸣声直冲无边无际的旷野。罗赫里奥·米兰达手持望远镜，眺望远方，嘴角微翘，向身旁的客人露出一丝狡黠的笑意。戈尔贝里·多·科托·席尔瓦报以会心一笑表示赞许。虽然他们身处的这处军事设施，距离拉巴斯不过数里，但他清晰地看到士兵们正在查科平原深处列阵施训，将一丝秩序带进了昔日混乱无章的边境。\n\n“要是能多几个能守边的兵就好了。”玻利维亚将军叹了口气，“你知道的，哪怕是打了胜仗，战后也很难抽出人手，尤其在我们这种政客当道的国家里。”他放下望远镜，眉头紧锁。\n\n“就说我们自己的那些指挥官吧。没错，得感谢奥万多帮我们赢了矿石战争。可要是把国家都交给他打理？就连那些叛军，搞不好都能干得比他好。”此言一出，席尔瓦悄然皱起了眉头。\n\n“这些我们日后再议，将军。”席尔瓦平静地答道，“当务之急还有许多。”他从随身的皮夹中抽出一个封面盖着巴西军方印章的牛皮纸文件夹，“这是《国家安全纲领》。这一次，我们要主动出击，而非消极应对异见势力。我建议你仔细阅读全文。我一会儿就回来。”\n\n将军粗略翻阅文件内容，只见其中满是“黑狱”、“逮捕令”、“间谍”等字眼，附带着厚厚一沓名单，其中竟也包括巴西军官和相关部门，皆为这项战略的助力。他转头望向正与助手交谈、不再看他一眼的战争部长。又一声炮响轰然传来，震彻整片平原。"
 LATAM_bolivia_mining_wars_epilogue.1.a: "“玻利维亚的堡垒”正在建设中。"
 LATAM_bolivia_mining_wars_epilogue.2.t: "初步发现"
 LATAM_bolivia_mining_wars_epilogue.2.desc: "“总统阁下，感谢您今天亲临试点计划区视察。”战争部长低声说道，声音几乎要被窗外震耳欲聋的喷气机引擎声盖过去。总统提高了音量回应，一边浏览手中的简报，“玻利维亚方面传来好消息。本周已有五十人因参与异见活动被逮捕，至于针对国家的法西斯和共产主义阴谋，大概也挫败了五起左右……”\n\n“听起来不错，戈尔贝里。”拉塞尔达摆弄着茶几上的钢笔，嘴里轻声念着数字，试图忽视震得桌椅微微颤动的轰鸣声。“虽然距离目标还有些距离，但至少，我们已经在推进了。”\n\n“确实如此，武装部队正全力以赴。”席尔瓦语气坚定，“不过要不是有《国家安全纲领》授予的权限，这一切恐怕会慢得多。实际上，我认为成效如此显著，我们也该考虑把这些做法引入国内。”\n\n总统的动作顿时停下。“在这儿？这么快？”他睁大眼睛，几乎想一把揪住席尔瓦让他认真点。可战争部长的脸上连一丝笑意都没有。《纲领》本就是为巴西未来政策试水之用，只是此时此刻，这种突如其来的提议让他不免感到踌躇。\n\n“嗯……我承认，要是最坏的情况发生，玻利维亚那套手段确实有其价值。可我们不想这么早就引发外界质疑。最好先拟个计划，出个报告，做些对比研究，等时机成熟再说。可以吗？”\n\n“当然可以，总统阁下。祝您行程愉快。”席尔瓦站起身说道。总统起身离去时步伐略显慌乱，一走出办公室，老将军便砸了咂嘴，恢复那张惯有的阴沉脸，重重叹了口气。"
 LATAM_bolivia_mining_wars_epilogue.2.a: "纲领若不执行，终究不过是废纸一张。"
 LATAM_bolivia_mining_wars_epilogue.3.t: "玻利维亚赌场"
 LATAM_bolivia_mining_wars_epilogue.3.desc: "劳多·纳特尔不仅是总统府的幕僚长，更是个精于算计的会计师。因此，在那场旷日持久的矿石战争中，巴西终于赢得胜利，对他来说不仅是如释重负，更意味着堆积如山的额外报表等着处理——尽管他是否情愿已不重要。好在这次几乎不用拨打电话，也不需费尽心思去讨人欢心——对这位胜利者而言，这些才是真正的战利品。\n\n可得利的并非只有阿德马尔和高原宫：一批来自阿根廷与智利的矿产被没收后，圣保罗迎来了前所未有的“狩猎季”。纳特尔在报表中频频见到“巴西石油公司”“淡水河谷公司”，甚至还有几个马塔拉佐家族的名字，在收入栏旁边赫然标注着醒目的加号，后面跟着的一串数字更是令人目不暇接。\n\n但……这一切能维持多久？纸面上尽是甜言蜜语与飞涨的投资组合，这固然赏心悦目，可玻利维亚的悲剧谁人不知？一个物产丰饶却无法保护劳动者的国家，被困于因资源而起的纷争之中，注定因资源而衰弱。\n\n一个正缓缓走向不可逆衰败的国家，要妄想它的下一章节会截然不同，无异于赌博。整个国家仿佛成了投资者的赌场——只要你付得起代价，就能获得诱人的回报。而总统那种嗜赌如命的性格，也迫使他不得不加入这场赌局。既然无力改变，只得叹息一声，把目光移向待办事项清单上的下一项。"
 LATAM_bolivia_mining_wars_epilogue.3.a: "没有新的希望，只有新的主人。"
 LATAM_bolivia_mining_wars_epilogue.4.t: "盟友再评估"
 LATAM_bolivia_mining_wars_epilogue.4.desc: "“总统阁下，下午好！”拉塞尔达回过头，只见瓦斯科·莱唐·达库尼亚正站在他面前，手里夹着一张便签和公文包。“能占用您一点时间吗？这件事相当紧急。”\n\n总统略微思索了一下那场他已经迟到、毫无生气的预算会议的价值。“马塞洛，告诉他们我晚几分钟过去。”他说着停下脚步，转身面对来人，抬手看了看表。\n\n“我刚收到玻利维亚总统办公室的便函。”部长答道，“奥万多想来巴西利亚，说是要‘建立两国之间的持久伙伴关系’。”\n\n拉塞尔达轻哼一声，露出笑意：“就这？考虑到我们为了让他上台费了多大劲，也不妨见一见他。看你那脸色，我还以为你是来告诉我元首驾崩了。”\n\n“话虽如此，”达库尼亚冷冷插话，“但现在有传言说玻利维亚政府准备推行一些……不太讨喜的经济改革。到时候媒体肯定会抓狂，批评我们在高原宫招待一位‘独裁者’。再说，1970年之前我们还有几年光景，我个人认为应该暂缓接待，等个合适的时机。”\n\n“奥万多上台也有段时间了，拖不是问题。”拉塞尔达反驳道，“但你说得也对。要是被人看作是带着附庸走场面，确实不好看。继续跟进他们的动向，明白了吗？”\n\n挥了挥手，拉塞尔达独自转身离去，又回到那堆枯燥的预算数据之中，而奥万多政权不稳的影子也再次浮上心头。他知道现在确实有理由回避这位盟友，但眼下两国尚属战略伙伴——或者说至少拥有共同的敌人——也不能就这么置之不理。也只能静观其变了，他心想。"
 LATAM_bolivia_mining_wars_epilogue.4.a: "不过，他要是还惹事……那我要给戈尔贝里打电话了。"
 LATAM_bolivia_mining_wars_epilogue.5.t: "准备迎宾"
 LATAM_bolivia_mining_wars_epilogue.5.desc: "“达库尼亚，临走前我能跟你谈几句吗？”\n\n瓦斯科·达库尼亚顿住脚步，努力压下叹息的冲动。整场内阁会议下来，阿德马尔甚至连看都没看他一眼，现在却要把他留下。不是要开除他，就是要给他安排一件丢脸的差事。他脸上堆起笑容，坐了下来：“总统阁下，有何吩咐？”\n\n“是关于奥万多的。”阿德马尔往后一靠，“你那边负责的玻利维亚事务处理得如何？”\n\n达库尼亚咂了咂嘴。“我明白您不愿在会议上公开谈这件事。奥万多的外交部已经向我们这边传递了消息，他们希望改善与巴西的关系，打算从一次正式访问开始。”\n\n“访问？”阿德马尔眼中一亮，“国事访问？啊这，达库尼亚，这事你怎么没早点跟我说？”\n\n“信是今天早上才送到的，我觉得还是应该先亲自和您商议。”达库尼亚轻咳一声，“但我还是要提醒您，奥万多恐怕不是什么善茬。他是军政府的独裁者，让他进总统府可不是什么好的讯号，尤其是考虑到阿根——”\n\n“不，不。”阿德马尔打断他，虽然稍慢了几拍，却足以让达库尼亚一时语塞。“我们在西部的投入太多了，不能轻易否认他的价值。说真的，达库尼亚，你对这种事得心胸开阔一些。你去安排一下会面吧，我下个月刚好有天空着。”\n\n达库尼亚强忍着叹气的冲动，朝总统点了点头，低声道了声告别，离开了会议室。"
 LATAM_bolivia_mining_wars_epilogue.5.a: "果然还是那个丢脸的差事。"
 LATAM_bolivia_mining_wars_epilogue.6.t: "大驾光临"
 LATAM_bolivia_mining_wars_epilogue.6.desc: "奥万多将军是在巴西荣誉卫队的列阵之间接受阿德马尔总统接见的。清晨阳光下，仪仗队的礼服熠熠生辉。阿德马尔握住奥万多的手，配合拍照留影，一路上与他寒暄应酬——当然，也只说些奥万多还能勉强回应的场面话。随后，两人登上总统专车，从机场驶入首都深处，沿着阿德马尔特意加固过的道路而行。在那里，总统又安排了一场阅兵式：某支他自己都几乎忘记存在的部队，展示了严整的军纪与高度协作。对于奥万多而言，这场表演既令人警醒，又叫人分心，还令人身心俱疲。\n\n这场国事访问逐渐演变为一场对巴西利亚的“观光”，而每当奥万多试图插话，阿德马尔总是能以一种既礼貌又得体的方式将他打断，还不忘带着笑容对镜头示意，摆出一副宾主尽欢的亲切模样。终于，他们来到某栋政府大楼参加正式晚宴（到底是哪一栋，奥万多记不清了，他们已在太多大楼之间来回穿梭），总算能坐下来，暂时不被外人打扰。\n\n主菜尚未上桌时，阿德马尔的眼皮微微一颤，看上去略显疲惫。奥万多意识到，眼前或许就是他少有的发言机会。他微微探身，压低声音，试图让话语穿透宴会厅的背景噪音：“总统先生，我想和您谈谈我们国家面临的一些问题，比如劳资关系、农村民众的生活质量……这些领域非常需要巴西的投资。”\n\n可阿德马尔似乎已然神游，疲态尽显，对话仿佛飘然无着。他轻描淡写地答道：“啊对对对，我们当然可以帮忙。这些事确实重要。”他的八字胡微微一颤，“让你的工作人员去联系我的人吧。我们会帮你对接合适的人选。”这时，主菜终于上桌，阿德马尔的注意力也随之回到了餐宴与庆典之中。"
 LATAM_bolivia_mining_wars_epilogue.6.a: "至少我们表现出了强有力的同盟姿态？"
 LATAM_bolivia_mining_wars_epilogue.7.t: "权柄"
 LATAM_bolivia_mining_wars_epilogue.7.desc: "戈尔贝里·多·科托·席尔瓦翻阅着面前的报告，眉头紧蹙。来自玻利维亚情报部门的线人递交了一份详尽的材料，内容令人不安：即将实施的新一轮经济改革，明确提出要重新分配橡胶利润；外国投资将接受更为严苛的审查，其中尤以美资、巴西和阿根廷企业为重点监控对象。“阿尔弗雷多，你这混账。”将军低声骂道。毫无疑问，奥万多背弃了先前的协议。\n\n戈尔贝里闭上眼，陷入沉思。他手下的一半情报人员此刻都以“公事出差”名义潜伏在玻利维亚，他绝不能让这些人暴露。但若现在撤回这些特工，情报局对革命民族主义运动的监控就将陷入瘫痪。而这还不是最糟的情况——若奥万多真敢单方面断绝对巴西的石油出口，那后果将不堪设想。更令人担忧的是，如果玻利维亚总统胆敢公然背叛巴西，那说明他自信到足以向布宜诺斯艾利斯靠拢。\n\n眼下或许还有挽回的余地，只要戈尔贝里能提醒奥万多：他该摆正自己的位置。可正面对抗行不通，那等同于把所有在玻利维亚政府部门工作的巴西情报人员名单双手奉上。施加经济压力也行不通，风险太大，可能牵连本国关键企业的利益。总统间的会晤？那只会让奥万多的“改革”显得更具正当性。他似乎已经无计可施。\n\n戈尔贝里最终还是拿起了电话。他暗自叹息，也许他在拉巴斯的“朋友们”能做的不止是提供几份文件。"
 LATAM_bolivia_mining_wars_epilogue.7.a: "“米兰达将军，很高兴再次与您交谈。”"
 LATAM_bolivia_mining_wars_epilogue.8.t: "唯命是从"
 LATAM_bolivia_mining_wars_epilogue.8.desc: "自从游行队伍攻入拉巴斯之后，巴西大使馆便陷入一片混乱。虽然政变只用了两个小时就尘埃落定，但随之而来的骚乱迫使大使馆全面封锁。马里奥·德·皮门特尔·布朗当大使与他的下属们手忙脚乱地适应玻利维亚的新秩序：一边将数百份敏感文件加密送回巴西利亚，一边销毁馆内副本；反复审查安保流程；尝试识别新政权中可接触的联络人；确保那寥寥数位滞留在当地的巴西游客尽快撤离……然后再次审查安保流程。\n\n总统米兰达在上台不到二十四小时后，便亲自走进了大使馆——大使馆提前一小时才接到通报。他昂首阔步，一身不合身的西装掩盖不住其突兀、粗砺的权力登顶之路。总统与大使握手时，皮门特尔·布朗当竭力不去盯着米兰达那硕大突兀的鼻子。“总统阁下，很荣幸与您会面。我带您去一个更合适的地方谈话。”大使将其引至隔音会议室。没有寒暄时间，他便直截了当地问道：“外面街上的局势如何？”\n\n“正在好转。一闻到催泪瓦斯那些混混就跑，剩下的交给警棍。”\n\n“阁下，我必须劝您克制。恐惧……也许有其作用，但千万不能让奥万多变成烈士。若您希望民众相信您的领导，您必须给予他们一些奥万多未曾给过的东西。”\n\n“那你是想让我把军队的钱分给恐怖分子，然后跪求他们回心转意？那是奥万多的把戏。我们会举行选举的——等街头彻底清净之后。”米兰达停顿片刻，脸色阴沉，“我原本就打算抓住他，在广播里播出他的投降声明，借他来给我背书。可结果是一架直升机被炸成了碎片？你们以为我蠢到只能搞这种粗暴手段？”\n\n皮门特尔·布朗当一头雾水，眉毛高高扬起：“您这是什么意思——”他顿了顿，换了更小心的措辞，“您……不该说这些话。”但他更在意的是：这些“话”，到底意味着什么。“我会确保您的政府及时拿到我们收集来的、关于恐怖分子的所有情报。”"
 LATAM_bolivia_mining_wars_epilogue.8.a: "那晚，大使躺在床上辗转反侧。他不知道究竟是谁统治着拉巴斯。"
 LATAM_bolivia_mining_wars_epilogue.9.t: "这不是开玩笑"
 LATAM_bolivia_mining_wars_epilogue.9.desc: "“请进，瓦斯科。”达库尼亚缓步走进总统办公室，目光冷峻，刻意回避与国家元首的任何眼神接触。他手中攥着一张皱巴巴的纸——它讲述了余下的全部故事：奥万多已死，米兰达发动政变，玻利维亚陷入战火。相较之下，矿石战争都没那么棘手。\n\n“数年努力、调解、资金、军事干预，全他妈付诸东流了。”部长怒骂道。桌对面的总统依旧那副嘲弄得意的模样，仿佛他才是那张赌桌上算计众人的赢家。达库尼亚心想，这表情真叫人火大。\n\n“注意措辞，我的朋友。”阿德马尔嘴角带笑，“你应该尊重这个职位，尊重我们所肩负的使命。”他知道，这种冠冕堂皇的职业修养之说恰恰最让达库尼亚厌恶。“况且，奥万多的事我们已尽力。他失败了，我们已经伸出了援手。难道你真希望我们派兵亲自到拉巴斯去开枪镇压抗议者？”\n\n“什么叫‘我们无能为力’？我们为奥万多做了那么多，你更是……你放任他搞那些该死的改革。”达库尼亚怒不可遏。而阿德马尔仍在笑。“继续笑吧，我明天再来，看你读完各大报纸头条之后，还能笑得出声不。”他猛地转身离去，留下那张纸静静躺在桌面。\n\n不，瓦斯科还是对的。玻利维亚的烂摊子不会像宿醉一样一夜消散。报纸上的报道固然令人恼火，但真正棘手的是他在那片土地上的金融投资很快就要暴露于世人眼前。这不仅是对阿德马尔政府的一次打击，更是直接弄脏了他本人的钱包。"
 LATAM_bolivia_mining_wars_epilogue.9.a: "看来，掠夺也并非没有限度。"
 LATAM_bolivia_mining_wars_epilogue.10.t: "指挥与责任"
 LATAM_bolivia_mining_wars_epilogue.10.desc: "玻利维亚陷入烈火之中。工厂纷纷关门停产，工人涌上街头，石块横飞，警棍挥舞，冲突愈演愈烈。激进派报刊纷纷指责拉塞尔达操控了这场政变。戈尔贝里·多·科托·席尔瓦坐在国家会议室内，面对总统。而总统回望他的眼神，如父如师，带着责问的锋芒。“戈尔贝里，我只问你一个问题。”拉塞尔达语气低沉，“你到底觉得我让你在玻利维亚干的是什么？”\n\n“我一直在推进我们的国家利益。”\n\n“你都不觉得该告诉我一声，你居然要把我们一个该死的盟友给炸死了？”\n\n“总统阁下，我并未对他动手，我绝不会那样做。是米兰达将军——”\n\n“但你知道。你明知道米兰达在策划什么，却觉得没必要告诉我？”\n\n“这不是重点。如果消息传到您这边，您会被牵连进去。”\n\n“我已经被牵连进去了，你个蠢货！”拉塞尔达猛地从座位上跳起，怒不可遏地指着自己咆哮道：“我是巴西总统！玻利维亚人听说他们的总统被炸成碎片，你觉得他们第一个会怀疑谁？”他喘了口气，声音里夹杂着压抑的怒火：“这种事……你不能这样擅作主张，席尔瓦。没有我的命令，你不能做这种事。”\n\n“我……会谨记在心，阁下。”\n\n“最好是。现在滚出我的办公室，我得给那个新‘总统’打电话，善后。”"
 LATAM_bolivia_mining_wars_epilogue.10.a: "那一夜，拉塞尔达彻夜未眠，就像街头的那些抗议者一样。"
 LATAM_bolivia_mining_wars_epilogue.11.t: "交友不慎"
 LATAM_bolivia_mining_wars_epilogue.11.desc: "“还有一件事，总统先生。”埃德娜·洛特从公文包中抽出一沓牛皮纸文件夹，阿德马尔忍不住压下心头的一声叹息。他早知这一刻迟早会来，也希望能在内阁会议中绕过这个议题。可洛特显然无视了他眼神中的不悦，执着得近乎固执。\n\n“我认为，是时候彻底清算我们与玻利维亚米兰达政权的现状关系了。坦白讲——传一下吧，”她将文件递给身旁的部长，“这已经成了我们外交政策上的一个污点。”其中一名部长翻开文件夹，迎面而来的是几张四个月前拍摄的照片——塑料袋裹着的尸体，可以辨认出是人形。“我们已经掌握了强有力的证据，调查记者人间蒸发，政治犯遭受酷刑，异见者被关押在集中营。”她直视总统，“所以我必须问一句，总统先生：我们为何还要支持这个政权？”\n\n“那些报告都被夸大了。”阿德马尔回应道，他在文件传到自己手中时把它紧紧扣住。“不过是些左翼媒体的怨言，他们根本没掌握全貌。”\n\n“你没有回答我的问题。”洛特面色坚定，感受到会议室里众多注视的目光，有些眼神带着不安，预感到接下来的局势将一发难收。\n\n“我以为答案已经够明显了。”阿德马尔不紧不慢地说，“米兰达政权是巴西的朋友，不是阿根廷的。”他一边说着，一边用指尖拨弄文件的边角，“我们要为了几篇编出来的谎言，就牺牲一段对我们有利的合作关系？”\n\n洛特强忍着怒意：“这是国家的耻辱。这是对我父亲遗产的玷污。我们在选择朋友方面，绝对可以比这种法西斯做得更好。”阿德马尔本想冷笑一声，却在环顾四周时住了口——那些沉默不语的面孔上，分明写着同样的担忧与同情，虽未说出口，却深深钻进了他的心里。"
 LATAM_bolivia_mining_wars_epilogue.11.a: "可他最终还是选择无视一切。“米兰达是巴西的朋友，我不想再听到任何一句废话。”"
 LATAM_bolivia_mining_wars_epilogue.11.b: "于是，他露出一个虚伪的笑容。“也许我会考虑一下这个问题，埃德娜。”"
 LATAM_bolivia_mining_wars_epilogue.12.t: "早知今日，何必当初"
 LATAM_bolivia_mining_wars_epilogue.12.desc: "访谈陷入短暂的沉寂，唯一的声音是角落里打字员敲击键盘的清脆声响。塞缪尔·魏纳一边往烟斗里填烟草，一边看着坐在桌对面的访客。乔克小姐出身矿工家庭，如同许多玻利维亚人一样，是混血印第安人。她的葡萄牙语十分流利——听说她的兄弟们连字都不识几个。她的脸颊已被泪水打湿。在魏纳这名记者的眼中，她身上有种沉静的尊严，那是被深深伤害之人特有的神情。\n\n乔克的声音颤抖，强忍着哭泣：“不好意思，魏纳先生，我刚才说到哪了……？”\n\n魏纳报以理解的微笑：“你说的是政变之后的变化，就是米兰达将军上台。”\n\n“对，没错。”她的声音渐渐稳住。“他们说是为了国家安全。工会遭到更猛烈的镇压，压制更加严厉。失踪的人也更多了。我的兄弟们……”\n\n“那……巴西的反应呢？政府，公司——”\n\n“一切照旧。很多人都相信是你们——也就是巴西——帮忙杀了奥万多。我们仍然看到盖尔道集团的卡车拉走我们挖出来的矿石，看着军政府的头头们和外交官握手寒暄——可他们真的不知道集中营的存在吗？”\n\n他知道，魏纳心想。拉塞尔达知道。\n\n卡洛斯·拉塞尔达，曾与魏纳一样是干媒体的人，亦是同时代的竞争对手。他的虚荣，他的狂妄，把他带到了如今这个地步——成了那个他曾怒斥的“独裁者”，就像瓦加斯一样。魏纳的思绪飘远了。拉塞尔达对拉巴斯那些“朋友”在做的勾当心知肚明，毫无疑问。他正在从他们那里学着那套手段。"
 LATAM_bolivia_mining_wars_epilogue.12.a: "老实穿上长靴吧，卡洛斯，你嘴上批判欧洲人，但其实跟他们没区别。"
 LATAM_bolivia_mining_wars_epilogue.13.t: "湖畔一侧"
 LATAM_bolivia_mining_wars_epilogue.13.desc: "在一座公园里，两位老人并肩坐在长椅上，面朝着静静的湖面。他们望着阳光在水波中轻轻荡漾，湖畔的芦苇随风微微摇摆。若不是其中一人身穿风衣、戴着墨镜和毡帽，路人恐怕根本不会注意到这两人，或他们之间的对话。\n\n“你们这帮人真是把事情搞砸了。”瓦尔特·萨莱斯低声咕哝着，调整了一下帽檐。“跟法西斯勾肩搭背。”\n\n马塞洛·路易斯·索拉尔，智利驻巴西大使，目不转睛地盯着水面。“你把我带到这儿来，就是为了骂人？无论是在我办公室，还是在这里，诽谤就是诽谤。”\n\n“我们手里有证据。银行转账记录之类的。还不至于拿去交给媒体或OFN，但足够让我们双方都头疼了。”\n\n“里奥哈是可以控制的。”索拉尔抚平裤腿上的褶皱，“我宁愿选他，也不愿选一个听命布宜诺斯艾利斯的温和派。我想你内心深处也一样。”\n\n“你这是玩火自焚。”萨莱斯推了推墨镜。“法西斯是管不住的。你只要一不留神，他可能转头就去投奔伊比利亚或意大利。”还有一个名字，他故意没说，但就像一把剑悬在索拉尔的头顶。\n\n“那你就去阻止我吧。去找你总统，让他批准对一个重要盟友施压。”索拉尔斜了他一眼，“当然前提是，你觉得这值得损害智利与巴西之间的关系。”话音一落，萨莱斯的目光避开了他，又重新投回到湖面上。"
 LATAM_bolivia_mining_wars_epilogue.13.a: "今天只算一个隐忧；可到了明天，如果夸德罗斯或洛特需要一个替罪羊呢？"
 LATAM_bolivia_mining_wars_epilogue.14.t: "身体要事"
 LATAM_bolivia_mining_wars_epilogue.14.desc: "“我们要向那些法西斯分子敞开国门？”拉塞尔达冷笑一声，午后的阳光如金色洪流般洒进办公室。据说智利正在向那个在国际上被孤立的玻利维亚政权示好，试图推进该国的民主化改革，且已取得一些成效。当然，所谓“法西斯能否真正成为民主政权”这事，始终值得商榷。“接下来是什么？跟日耳曼尼亚签贸易协定吗？”他讽刺地问。\n\n塔沃拉无奈地叹了口气，声音里已然透出一丝疲倦：“总统先生，我完全明白玻利维亚的……倾向。但若能重启关系，我们不仅能改善与智利的联系，玻利维亚的贵金属资源也将极大推动巴西经济的发展。”拉塞尔达凝视着他，阳光在他眯起的眼中反射出一片白光，使得人看不清他的神色。塔沃拉放低语调，再次叹息：“我只是希望您考虑一下。仅此而已，总统先生。”随着门口轻轻一声“砰”的关门声，他离开了。这回，轮到拉塞尔达叹气了。塔沃拉说得没错——这件事，对巴西的财政可能确实大有裨益。"
 LATAM_bolivia_mining_wars_epilogue.14.a: "听从内心。"
 LATAM_bolivia_mining_wars_epilogue.14.b: "听从理智。"
 LATAM_bolivia_mining_wars_epilogue.15.t: "正向激励"
 LATAM_bolivia_mining_wars_epilogue.15.desc: "“意大利餐厅啊。”劳多·纳特尔端着一杯红酒，随意地笑问，“总统先生，什么风把我们吹到这儿来了？”\n\n“好消息嘛，自然得配个好场合，不是吗？”阿德马尔轻笑着，给自己又倒上一杯。“再说了，大家都说这家店好得不得了，正好趁这个机会来看看有没有那么神。”\n\n“那到底是什么好消息？您是跟巴西工党谈成了什么大交易？”\n\n“哦，不，不是国内的事。”他轻抿了一口酒，把杯子放回桌上。“我们最近在进行一些谈判，一场秘密谈判——准备与一位邻居重归于好。而这位邻居，恰恰能牵制住阿根廷人。”\n\n纳特尔在脑中迅速回顾起巴西周边国家，一张张地筛查，一处一处地比对，直到找出那个最可能让阿德马尔露出这般淡定喜悦的国家。“玻利维亚。”他几乎是喃喃地说出。\n\n“没错。”阿德马尔眼神里闪着光，“他们终于开窍了，我们也准备恢复与玻利维亚的关系。劳多，要是你手头还有点闲钱，现在正是投资的好时机。采矿，重工业——”\n\n“达库尼亚肯定气疯了。”纳特尔给自己又斟了一杯，“他知道了吗？”\n\n“我还没告诉他。哦，别那样看我。”纳特尔挑了挑眉，嘴角紧绷成一条直线。“他确实会发牢骚，但他们现在是民主国家，就跟我们一样。再说了，只要钱进得够快，他自然会闭嘴。美国人在乎的也只有一样东西：利润。净收益。绿油油黑沉沉的大数字。”"
 LATAM_bolivia_mining_wars_epilogue.15.a: "阿德马尔靠在椅子上开怀大笑：“而玻利维亚，正要给我们带来一堆大得惊人的数字。”"
 LATAM_bolivia_mining_wars_epilogue.16.t: "输家俱乐部"
 LATAM_bolivia_mining_wars_epilogue.16.desc: "脚步声在总统府的大理石走廊中回荡。洛特总统正匆匆赶往下一个会议室，尚未见人，便已听到夸德罗斯的声音。副总统身形瘦长，拐过转角径直朝他走来。洛特假装没看见。\n\n“看报纸可知您最近很忙，”夸德罗斯高声说道，“忙着与拉巴斯那帮穷途末路的寡头称兄道弟。叫什么来着？‘玻利维亚民主制度联盟’？”\n\n洛特低声咕哝。他太了解夸德罗斯了。两人并肩而行，洛特仍不减步速，而夸德罗斯紧随其后，语气愈发讥讽。\n\n“这真是高明之举，公然与这群失败者绑在一起。你就没想过，将来这个国家还会有下任总统？到时候若有人试图略微敞开与邻国的关系之门，却被你这群流亡者的闹剧一脚踹上，该怎么办？就为了那点所谓的道德优越感——比阿根廷更‘自由’？”\n\n他喋喋不休，几乎撞上了洛特——那位魁梧将军突然停下脚步，猛然转身，正面逼视着他。夸德罗斯一愣，下意识地推了推鼻梁上的眼镜。洛特怒意尽显。\n\n“我见过被革命民族主义运动夺走产业的人。我见过那些家破人亡的家庭。我不会为此感到抱歉——只要我还在，就绝不容许布宜诺斯艾利斯把自由之火扼杀在我们的家门口。我不会替暴君找借口。”洛特向后退了几步，话语冷硬。“此事，到此为止。”"
 LATAM_bolivia_mining_wars_epilogue.16.a: "洛特转身走开。他听到夸德罗斯嘟囔了几句脏话。"
 LATAM_bolivia_mining_wars_epilogue.17.t: "满怀希望"
 LATAM_bolivia_mining_wars_epilogue.17.desc: "萨穆埃尔·魏纳走进了“野兽的腹中”——一场在华丽舞厅举行的晚宴，挤满了全民盟的溜须拍马之徒与自诩开明的自由派，大概又是拉塞尔达为自己下一场海外“冒险”搞的某种筹款活动。对魏纳而言，这一幕不仅未令他退缩，反倒给了他和那本袖珍蓝色笔记本充足的弹药。而此刻，现场正爆发出一阵掌声，献给那个走狗瓜查拉，貌似是在“抗议”他曾经亲手促成的局面。魏纳没有急于记录，他知道，戏才刚刚开场。\n\n“感谢你们，我亲爱的朋友们，所有在座的玻利维亚之友。”瓜查拉轻轻敲了敲香槟杯开口道，“‘玻利维亚民主制度联盟’感谢你们的支持。我的祖国已经病入膏肓，而比利亚罗埃尔及其走卒就是病因。自从他们上台以来，革命民族主义运动压制异见，背弃经济常识，撕裂了无数家庭。我仍有许多亲人和朋友被困在国内，惶惶不可终日。但这不会让我就此沉默！”\n\n这句话是勇敢，还是愚蠢？魏纳一时间也难以判断。但他看得透——他曾见过这个人，或是某个相似的玻利维亚寡头，听他们如何为一切失败找借口。如果他没认错人，路易斯·费尔南多·瓜查拉不过是个总统候选人之子的典型角色罢了。至于他是否会为了政治利益背叛自己的家人？这对记者来说一点也不意外。\n\n不过放眼整个大厅，那些人却听得如痴如醉。所幸，他的大部分发言不过是在反复哀叹矿石战争的失败——那场战争正是眼前的衮衮诸公一手造成的。魏纳心想：至少，还算有点讽刺价值。否则，就连拉塞尔达最坚定的反对者也不得不承认，自己隐约感受到一种共识正在酝酿——要不惜一切代价，从阿根廷的掌控中夺回拉巴斯。"
 LATAM_bolivia_mining_wars_epilogue.17.a: "至少，明天的头条写起来会很轻松。"
 LATAM_bolivia_mining_wars_epilogue.18.t: "意外的提议"
 LATAM_bolivia_mining_wars_epilogue.18.desc: "会计正埋头审阅报表，突然被办公桌上的外线电话铃声惊得一激灵。这通电话出乎意料——他们这个“玻利维亚民主制度联盟”的办公室鲜少接到外部来电。他急忙拿起话筒。\n\n“晚上好，我是劳多·纳特尔，总统府幕僚长。”那头传来冷静的男声。会计顿时身体一僵，几乎要从椅子上跳起来。“我打电话来，是想提醒您，我们办公室最近在贵组织的一些事务中发现了些问题。”\n\n不可能。他怎么会直接打电话给他，一个会计？语气还如此含糊其辞？不至于……他知道了？“晚上好，纳特尔先生。咱们就别绕弯子了，有什么话请直说。”\n\n“好吧，先生，我们注意到，在某些资产申报上存在一些差异——根据国家财政监察署的记录。”会计的心一下沉了下去。他们确实通过全国各地的地产转移资金，但并不是唯一这么做的人。可要是事情败露……牢狱之灾不堪设想。\n\n“不过，”纳特尔接着说，“我们这届政府一向宽厚，总统本人对贵方也颇为同情。如果您愿意将相关资产中一部分让给我们，那么这个问题……或许可以悄悄地解决掉。”\n\n“我——什么？”\n\n“我们会在本周稍晚些时候联系您，安排一次会议，讨论后续安排。祝您好运。”电话随即挂断。他长长地吐出一口气，如释重负。多么荒唐！他从未被总统幕僚长“勒索”过，但不管怎样，今天算是躲过一劫。或者说，他们的腐败，只不过被更高级的腐败所掩盖罢了。他重新把目光落回报表，心中沉甸甸地想着：下次，未必会这么幸运了。"
 LATAM_bolivia_mining_wars_epilogue.18.a: "再怎么说，总比跟高原宫以外的人做生意安全。"
 LATAM_bolivia_mining_wars_epilogue.19.t: "玻利维亚红与巴西蓝"
 LATAM_bolivia_mining_wars_epilogue.19.desc: "两人之间能感受到那种压抑的怒火，那种卡在胸口下方的硬结。每一条新闻标题都像在硬结狠狠缠绕一圈，使其愈发紧绷。洛特的办公桌上没有一纸报刊，可那些标题却在他们脑海中挥之不去——《红色胜利席卷玻利维亚》《托雷斯政府推行全面国有化》《外资资产被没收；巴西人与富裕玻利维亚人纷纷逃离拉巴斯》\n\n“可恶。”洛特低声咒骂，“我们在这该死的战争上投了几百万美元——”\n\n“结果却输了。”瓦尔特·萨莱斯清了清喉咙，“总统先生，现在再纠结那些‘本该如何’毫无意义。”他自己同样深陷懊悔，“眼下我们必须立即行动，立即中断与玻利维亚的外交关系。经济联系也一样，彻底切断，把我们与玻利维亚签过的每一份协议、每一纸合约都撕个粉碎，同时准备撤离我们仍困在玻利维亚领事馆的国民。”\n\n“工业会受重创。我们正指望从玻利维亚矿业里捞点回来。”洛特手中的钢笔不由自主地在桌面敲出节奏，声音缓慢、时疏时急。“不过说到底……那边的产业迟早也保不住。”\n\n他站起身，走到窗前。阳光明媚，天空湛蓝，可玻璃上映出的，却是一张满是岁月痕迹的脸。他知道自己老了，可……真的一直都这么老吗？“不，现在我们更需要的是，在这场共产主义威胁面前展现力量。”洛特终于开口，“萨莱斯，我授权你去做。切断所有联系。”\n\n“真果断。”萨莱斯点头，“我都还没来得及劝您。将军们，是不是已经私下跟您通气了？”"
 LATAM_bolivia_mining_wars_epilogue.19.a: "“通气？我都能感觉他们的呼吸扑在我脖子上。”"
 LATAM_bolivia_mining_wars_epilogue.20.t: "小玻利维亚"
 LATAM_bolivia_mining_wars_epilogue.20.desc: "这条街坐落于圣保罗金融区的小巷中，不过五十米长，左右尽是门面，开着会计事务所、簿记公司，还有暗地里操盘的庄家。他们在楼下营生，在楼上栖居。这些人全都来自玻利维亚，尤其是拉巴斯，是带着自己仅存的资本仓皇逃亡的那一批人。他们在穿越国境的路上，将那些钱财守得比命还紧；而一旦成功踏入巴西，他们便毫不犹豫地抛售掉所有无关紧要的资产，只留下几件最具感情价值的物品。很快，他们就成了圣保罗金融中心不可忽视的一群人。\n\n他们举办讲座、办酒会，只为拉拢本地已成气候的金融贵胄。他们努力证明自己并非外来的侵蚀者，也不是廉价资本的化身，而是坦坦荡荡、值得尊敬的商人，希望能成为这一圈子中的一员。就在今夜，他们又办了一场这样的活动，香槟在杯中跳跃，名誉的筹码也随之一一“兑付”。小瓦加斯起初对他们的示好并不买账。他对外可以宣称自己不愿损害形象，对自己则说是想看看这些玻利维亚人是否真的是靠不住的朋友——但其实，他只是想多吊他们一会儿胃口，好让他们的捐款数额再“自觉”一点。\n\n当第一张支票到账那天，他立刻抓起电话，亲自致电这批新移民中的领袖人物。真是太惨了，他们的经历实在令人同情——他也听过那些故事。他对他们的遭遇深表同情，也由衷欣慰他们如今总算站稳脚跟。是的，他当然愿意出席这场小型聚会。\n\n于是，今夜，他就在这灯火辉煌的酒店宴会厅中，笑语盈盈，举杯共饮，与圣保罗这批新晋投资者把酒言欢。太阳早已没入温柔的地平线中，但这座宴会厅的灯光点亮了小瓦加斯的心。他不得不承认，他们确实做得不错——好得甚至值得他亲自来“尝一口甜头”。"
 LATAM_bolivia_mining_wars_epilogue.20.a: "他们一定明白，这就是这里做生意的方式。若不明白，他们又怎会离开家乡？"
 LATAM_bolivia_mining_wars_epilogue.21.t: "默契"
 LATAM_bolivia_mining_wars_epilogue.21.desc: "如今，瓦斯科·莱唐·达库尼亚鲜少与王室有任何往来，除了偶尔与苏里南那边的几次礼节性交谈。至于像今晚这样，在巴西利亚，与一位“锡王”共进晚餐，更是罕见至极。外交部长一边吃着青豆沙拉，一边不时抬眼，细细打量安特诺·帕蒂尼奥的神色——若有所思、沉静忧郁，或是怀旧追忆。\n\n“你们这儿有些地方堪比曼哈顿，令我十分惊讶，瓦斯科，真的。”这位玻利维亚人端起酒杯如是说道。部长微笑点头，酒意微醺，气氛温和轻松。如果晚宴照此节奏继续，说不定他们还能借此再建立一条通往华盛顿的联络线。“其实我应该更加感谢你们，为你们所做的一切。”\n\n“感谢我们？”达库尼亚笑了笑，“谢我做本职工作？不，安特诺，这不过是我们一贯对待朋友的方式。如果你说的是那些共产党人……那我们当然也该用对待敌人的方式对付他们。”\n\n提及“共产党人”几个字，帕蒂尼奥的神情又变得有些难以捉摸，他低头盯着盘中食物。毕竟是带着家产从家门口政权更迭的风暴中逃往美国的人，而且只是“最近发生”的事。巴西人正欲转移话题，却见帕蒂尼奥突然结巴地开口。\n\n“不、不用担心他们，真的，”他坚持说道，“很快他们就会明白什么叫治理的‘现实’。只要禁运再撑一会儿。”他盯着达库尼亚的眼神分外专注，随即又低下头去。\n\n达库尼亚微微扬起眉，对帕蒂尼奥这份莫名的自信略感疑惑，随即慢慢点头。他话中所暗示的内容值得深思。但不管怎么说，这值得被记在心上——玻利维亚，这块染红的土地，也许正酝酿着新的“颜色”。"
 LATAM_bolivia_mining_wars_epilogue.21.a: "他现在知道什么？"
 LATAM_bolivia_mining_wars_epilogue.22.t: "职位的代价"
 LATAM_bolivia_mining_wars_epilogue.22.desc: "“下午好，纳特尔先生。”一个身材矮小、面容干净的男人拎着公文包，在看到劳多·纳特尔从出租车下来时高声打招呼。他朝街角那家破旧的咖啡馆一指：“我们进去聊吧？”\n\n纳特尔一整天都在向助手抱怨，这种会面应该由级别更低的人去处理，可谁也不敢违抗总统的指令。他原本就不愿在圣保罗布拉斯区多停留，何况还要钻进一栋自二战以来就似乎没打扫过的建筑。他勉强挤出个礼貌的微笑，在会议桌前坐下，如同出席一场重要公务活动一般。\n\n“我相信您清楚，玻利维亚的革命者很快就需要新的联络对象。”那男人开门见山，“身在巴西的玻利维亚人心知肚明——不出几个月甚至几周，他们就会来找你们合作。过去，你们的政党与我们社区关系密切，纳特尔先生。但若你们转而支持那些暴君，这段关系很快就会被遗忘。”\n\n“除非，当然……你们愿意重新考虑。”就在这时，对方掏出了支票本和钢笔，纳特尔的眼神立刻锋利起来——这事，开始变得有趣了。“我们非常希望，这段友谊还能继续下去，纳特尔先生。”\n\n和玻利维亚的红色政权做生意又有何好处？若他们接受这笔钱，不仅能获得资助，还能避开为共产党站台的政治风波。尽管对方一再点名让他感到些许不适，纳特尔很快点头回应：“我谨代表总统表示，我们也愿意支持。我十分感激这份好意，并向您保证，社会进步党将继续支持你们社区。”\n\n回市中心的路上，纳特尔心中开始泛起阵阵犹疑。这些流亡者确实出手大方，可他们是一群被放逐的外人，未来影响力极不确定。如果在下一次选举前，他们的支持突然中断……光是想到阿德马尔会如何反应，他的手心就开始冒汗。"
 LATAM_bolivia_mining_wars_epilogue.22.a: "真希望他们手里别有全民盟的联系人吧。"
 LATAM_bolivia_mining_wars_epilogue.23.t: "因思乡而踌躇"
 LATAM_bolivia_mining_wars_epilogue.23.desc: "“他死了。”拉斐尔站在恩里克身后，盯着那条让朋友目不转睛的头条。胡安·何塞·托雷斯死了，随他一起逝去的，是那个不久前还让他们仓皇搭上离境航班的政权象征。报纸对接下来会发生什么含糊其词，或者说，谁会接手现在的政权。但除了那位温和派的瓦尔特·格瓦拉，似乎也没别的人选了。\n\n“我们好不容易在新地方站稳脚跟，一切又要变了。”恩里克低声说。他花了几年时间、无数金钱将自己从玻利维亚迁出，如今却为这些无法再投入祖国的资源感到深深遗憾。“我们得静观其变，我是说……谁知道接下来会怎样。你也看见了一切是怎么从矿业开始的，拉斐尔。”\n\n“我不这么看，这是个大好机会。”这位流亡者眼中闪烁着野心的火光。“几乎可以肯定会是格瓦拉上台，他和革命民族主义运动的温和派正在谋求重新私有化那些被共产主义者没收的资产。你想想，趁别人还没反应过来，我们现在就介入，是不是就能大赚特赚了？”\n\n“恩里克，恩里克。”拉斐尔一边摇头一边挥手，“都几年过去了。游击战、内乱这些事，不会一夜之间就消失。不能再来一遍，我们承受不起了。一次次冒险，到头来换来的只是被现实狠狠惩罚，因为我们曾‘梦想太大’。”恩里克望向街道。他想到刚买的新车，想到如今居住的街区，想到现在安稳的生活。\n\n猛然间，他发现自己竟难以想象再一次打开那扇门——打开通往拉巴斯的门。他想起那个城市、那个政府，还有那一众“朋友”，还有整个玻利维亚那说不清的命运——如今全都打上了一个巨大的问号。他回去之后，人们还会把他当作从前的那个“他”吗？\n\n“也许你说得对。”恩里克叹息着，满脸落寞地转身走回他的办公隔间。"
 LATAM_bolivia_mining_wars_epilogue.23.a: "但也许，有一天……你就不再是对的了。"
 LATAM_bolivia_mining_wars_epilogue.24.t: "弥补失去的时间"
 LATAM_bolivia_mining_wars_epilogue.24.desc: "玻利维亚的新面孔在电视荧幕的扫描线中浮现，而在总统府的最高会议室里，观者的反应交织成一股奇异的气流——振奋与疑虑并肩而坐，共同目睹这一幕的展开。维尔吉利奥·塔沃拉侧头望向他的上司，只见拉塞尔达手指撑着下巴，面色沉静，像是在他那张棱角分明的脸上寻找一丝释然的迹象。多年混乱无序之后，难道这不是值得欢呼的一刻吗？\n\n“总统先生，格瓦拉已经承诺将赔偿被征用的企业，并公开表达了重启商业合作的意愿。我认为，现在就一棍子打死……未免太早了——”\n\n“不是打死，是克制。”拉塞尔达打断道。“别忘了，托雷斯和格瓦拉是一个党的，正是这个党掠走了本该用来富国强民的财富。我需要的不只是几句新闻稿上的好话，维尔吉利奥，我们巴西人值得更多。”\n\n副总统听出他话语中夹杂的情绪波动，便默默收声。拉塞尔达已开始在会议室中踱步。\n\n“如果他们真想‘赔偿’，那该怎么做？每一寸土地、每一项资产、每一分克鲁赛罗，只要是巴西公司在玻利维亚被没收的利润，都该毫无保留地还给我们。否则，都是空话。”\n\n“你也太急了。如果我们明天就要求他们开始付款，他们很可能接下来十年一分钱也不会给。”\n\n拉塞尔达脸色一沉。他知道，在一个不可能回到过去的国家里提出这种强硬要求，效果很可能适得其反。但他们也不能就这样任人宰割。如果真到那一步，他宁愿……"
 LATAM_bolivia_mining_wars_epilogue.24.a: "……让他说清本意，并要求达成一份全面的赔偿协议。 "
 LATAM_bolivia_mining_wars_epilogue.24.b: "……再给点时间。我们已经等得够久了。 "
 LATAM_bolivia_mining_wars_epilogue.25.t: "发财致富"
 LATAM_bolivia_mining_wars_epilogue.25.desc: "大约每周有那么一晚，劳多·纳特尔会在所有人下班之后，依旧独自留在办公室中。除了他在阿德马尔政府中日常的职责，他还有一项次要但重要且利润可观的任务：作为总统最信任的理财人，打理阿德马尔的私人投资。这份工作需保持高度保密，因为国家事务往往与阿德马尔的个人资产有千丝万缕的联系，而这其中的交集，对外人来说或许会显得“格外难看”。他不愿让任何人窥见总统真正的财富规模。\n\n桌上散着几份报纸，报道着新的“机遇”。玻利维亚红色政权的倒台，不仅在地缘政治上对巴西有利，更在商业层面打开了新的赚钱窗口。新上任的瓦尔特·格瓦拉已经释放出信号，希望与巴西恢复关系，而首先要做的，便是国际交往中永不过时的关键——贸易。他为巴西资本敞开大门，投资者蜂拥而至，其中自然也包括阿德马尔和纳特尔。\n\n一开始动作必须谨慎。当前局势仍处于初期阶段，直接投资风险太高，容易引来关注。但如果阿德马尔的几家空壳公司悄悄增持盖尔道集团和国家钢铁公司的股票呢？恐怕没人会多看一眼。毕竟，玻利维亚廉价的铁矿石将大幅降低它们的原材料成本，为扩张提供了空间。此外，纳特尔还通过几处“老鼠洞”在波托西的塞罗里科矿区悄悄收购股份，等时机成熟后再逐步将其转入靠近阿德马尔名下的投资组合。\n\n当纳特尔收尾完毕，看了一眼钟表：晚上十点过十分——所有电话、协调耗去了远超预期的时间。但他只是笑了笑，最后一次打电话向妻子表达歉意，然后从办公桌下抽出那只专门为加班夜准备的旅行包。"
 LATAM_bolivia_mining_wars_epilogue.25.a: "至于那笔丰厚的佣金报酬，足以弥补他在办公室沙发上凑合过夜的辛苦。"
