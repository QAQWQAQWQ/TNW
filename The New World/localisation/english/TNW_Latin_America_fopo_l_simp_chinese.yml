 LATAM_Bolivia_Epilogue_Neutral.1.t: "拉巴斯三头同盟的创立"
 LATAM_Bolivia_Epilogue_Neutral.1.desc: "拉巴斯高尔夫俱乐部的第四洞令胡安·奎托·谢拉头疼不已。他始终无法适应这个左狗腿弯，每次第一杆不是打得太远，就是不够劲，球总会偏进草丛。在平时的友谊赛中，他的同伴们早就会冷嘲热讽一番，调侃他根本站不住果岭。\n\n“条约进展得很顺利。”巴西建筑巨头诺尔贝托·奥德布雷希特打破了以往比赛时的闲聊套路。他瞄准，一挥杆，白球应声飞起，划出一道完美的弧线。“玻利维亚现在向我们全面开放了。主权中立的土地，急切地欢迎投资与金融支持。”他回头冲着两位同伴一笑，“唐·格雷戈里奥，你看起来心事重重。”\n\n“我是在担心沙坑，诺尔贝托。”阿根廷石油大亨格雷戈里奥·佩雷斯·康潘克应道，正犹豫该用哪根球杆。“还有，我都说了，叫我戈约就行。”\n\n奥德布雷希特的笑意微微下沉，呼出一口介于嗤笑与轻哼之间的气。他比谢拉与康潘克年长近十岁，最爱拿两人的“年轻气盛”打趣。而康潘克本就为自己在父亲公司中地位不稳而暗自焦虑，这番调侃让他分了神，结果果然一杆过头，球直接飞进了沙坑。他咒骂了一声，奥德布雷希特哈哈大笑，唯独谢拉仰望着一片湛蓝天空，若有所思。\n\n“这对我们而言，是好事。”谢拉回头望向同伴，“阿根廷人、巴西人、智利人，齐聚这个国家，为同一个目标而努力。在经历那么多动荡之后，我们来重建它，投资它的未来。”他提起铁杆，走到球位前，摆好姿势对准球座。“谁知道呢？说不定我们在这里投入太多，到那时，战争便会变得无利可图。”"
 LATAM_Bolivia_Epilogue_Neutral.1.a: "这一杆，他又打远了。球滚进了林带，他低声咒骂。"
 LATAM_Bolivia_Epilogue_Neutral.2.t: "玻利维亚领袖恩里克·埃尔佐格会见夸德罗斯"
 LATAM_Bolivia_Epilogue_Neutral.2.desc: "那一刻，玻利维亚新当选总统恩里克·埃尔佐格一边努力思索国家中立等重要议题，一边却被眼前这位巴西副总统的存在感所彻底打乱了思绪。雅尼奥·夸德罗斯——这个谜一般的人物。他早就听人提醒过：夸德罗斯可不像那些他前几天见过的常规外交官，更不像二十年前那些瓦加斯派官僚。\n\n“恭喜您胜选。”夸德罗斯如是说道。其他来宾也跟着附和，但埃尔佐格听得出，他们的口气空洞，仿佛选举毫无分量，因为真正决定胜负的，是各国领袖间暗地里的交易，而非民众善变的意志。\n\n夸德罗斯说出这句话时，他却听出了其中的真意——他懂得，这是真正意义上的国家稳定的延续。\n\n夸德罗斯说出这句话时，他仿佛是在尊重玻利维亚的中立与主权，而不是把她当作一个可以随意摆弄的傀儡。他那略带口音却优雅的西班牙语，配上他以指尖搭桥、肘部大张靠在帕拉西奥·克马多宫那织锦扶手上的姿态，无不透着一种气度——也许谈不上尊贵，至少是真诚。\n\n至少，他可绝不是那些人说的“醉鬼”。埃尔佐格发现，夸德罗斯虽然比他年轻一代，身上却有一种近乎孩童般的朝气：每一个手势、每一个头部动作、每一个顽皮的笑容，皆洋溢着某种无法抑制的活力。\n\n又或许，这只是因为现实本身就令人振奋：巴西将支持玻利维亚的中立立场。巴西希望玻利维亚能在一个以贸易调和冲突的和平南美中扮演积极角色。"
 LATAM_Bolivia_Epilogue_Neutral.2.a: "说服他，不费吹灰之力。"
 LATAM_Bolivia_Epilogue_Neutral.3.t: "拉巴斯三头同盟的忧虑"
 LATAM_Bolivia_Epilogue_Neutral.3.desc: "人们称它为“第十九洞”，是拉巴斯高尔夫俱乐部为宾客们设置的最后一站。对许多人而言，这是打完一整天球之后理应享受的片刻休憩。胡安·奎托·谢拉正与“戈约”·康潘克一同喝着冰红茶，忽然，诺尔贝托·奥德布雷希特怒气冲冲地闯进了会所。他一整天都不见踪影，手中此刻攥着一份本地报纸，“啪”地拍在桌上。谢拉和康潘克早已读过那条刺眼的头条：《劳资争端持续，政府谈判代表“遭遇冷处理”》\n\n“诺尔贝托，”康潘克皱眉道，“我们正想摆脱这些烦心事呢。”他把报纸推回给已经坐下的奥德布雷希特。\n\n“去你妈的。”奥德布雷希特低吼，“你可没我押得那么重。”他把报纸对折，把手腕搭了上去，“他妈的共产党。”\n\n“你情绪太激动了，诺尔贝托。来杯酒吧。”谢拉招来侍者，奥德布雷希特却不屑地要了一杯汽水。\n\n“这已经不是第一次了。整个矿区都在躁动。这事拖不下去了，各位。”他接过汽水，只是时不时小口抿着，动作克制得像是防备着什么。\n\n康潘克晃了晃半杯未饮完的威士忌，杯中冰块叮当作响。“政府处理得还不错嘛。罢工一出现立马就镇压下去。我倒不觉得有什么大不了的。”\n\n“可话说回来，”谢拉接道，“政府确实在一些谈判点上作出了让步。我看到那段报道也不太高兴。”他说着放下茶杯，目光在两位同伴之间来回扫视。“你们知道的，我和驻这儿的大使有晚宴。我会问问他进展得怎么样。”"
 LATAM_Bolivia_Epilogue_Neutral.3.a: "谢拉说罢，一口喝尽杯中余茶。“这种事，不能放着不管。”"
 LATAM_Bolivia_Epilogue_Neutral.4.t: "热线上的寒意"
 LATAM_Bolivia_Epilogue_Neutral.4.desc: "“……祝贺您胜选！”——埃尔佐格对着电话说道。玻利维亚的新总统按部就班，但态度算得上亲切，这让拉塞尔达颇为欣赏。“非常感谢您的来电，拉塞尔达先生。如果您还有点时间，我们不妨再多聊几句。”\n\n听筒那头传来一声沉重叹息：“拉塞尔达先生，我听说……您有些顾虑。”\n\n直入正题。倒也痛快，或许这通电话能谈出点结果。“总统阁下，保重身体。”拉塞尔达先套了一句客套话，“时局艰难，我自然不会越俎代庖，但南方共同市场嘛，历来是片不太安稳的土地。”\n\n“所以您是希望重新协商玻利维亚与巴西利亚的关系？”对方顺势问道。这样的推断不难，几乎是水到渠成。\n\n拉塞尔达勉强一笑：“我当然不会在您刚刚接手政权时就施压于您。不过，您我在世界观上其实有很多共通之处，我们的政党也一样。”\n\n电话那头稍作停顿：“洛特曾承诺会维持——”\n\n“而我十分尊重元帅的决策！”拉塞尔达立刻补充，“玻利维亚的中立，对她自身而言至关重要。”——一项我越发难以接受的决策。\n\n“那您究竟想提什么？”\n\n“我确实无法强迫您做任何事，”拉塞尔达语气转冷，“但我们两位邻国……阿根廷与巴拉圭，可不一定会这样想。我只是希望我们两国都能走向最有利的方向。”\n\n“您无需再说服我，卡洛斯。”埃尔佐格语气缓和了些，“但我也必须优先考虑本国人民的福祉，您应当理解……”\n\n拉塞尔达沉默片刻，只能认输：“这点我当然理解。”"
 LATAM_Bolivia_Epilogue_Neutral.4.a: "“该死的洛特，竟然为了秩序牺牲了进步！”拉塞尔达暗自咒骂，嘴上却说：“您家人近来可好？”"
 LATAM_Bolivia_Epilogue_Neutral.5.t: "水中鱼饵"
 LATAM_Bolivia_Epilogue_Neutral.5.desc: "亚马孙河总有办法让阿德马尔·德·巴罗斯这等人物也不得不低头。他乘船逆流而上，沿着提埃特河航行数英里，不远处便是他昔日驰骋的圣保罗。那艘船算不上奢华，更像是那些退休的美国佬在佛罗里达近海乘坐的小渔艇，完全无法与雨林那遮天蔽日的磅礴气势相提并论。\n\n“妈啊……”诺尔贝托·奥德布雷希特在这片天地间同样显得渺小，这正是阿德马尔选在这里会面的原因。两人自圣保罗的早期商业交易走来，如今已是天壤之别：奥德布雷希特在玻利维亚成了建筑巨擘，而阿德马尔则登上了巴西总统的宝座。他为“奥德”感到高兴，毕竟后者确实创下一番事业，但他也不希望奥德因此太过“得意忘形”。\n\n“所以，诺尔贝托，你打算什么时候惊叹于我的威严呢？”总统半带玩笑地问道。奥德轻笑一声：“怎么，阅兵还不够风光？”阿德马尔撇了撇嘴，假装生气：“大胆！你该知道，当政客哪有什么钱可赚！”蚊群在他们头顶嗡嗡作响，阿德马尔挑了挑眉，“不过嘛……你赚的才叫真金白银，也许你能帮我一把。”\n\n奥德旋即一愣，“我的天，你倒是开门见山啊。”语气带着调侃，显然没想到话题会这么早就切入正题。阿德马尔则半眯起眼睛，饶有兴致地追问：“你在拉巴斯的事业可做得不小啊，奥德，我不过是想给你这个项目一些‘帮助’罢了。多少人削尖脑袋都想要这个机会——与巴西国家元首建立正式合作关系……”\n\n“我在拉巴斯的业务确实发展不错。”奥德勉强挤出一抹笑容，眼中却透出隐隐担忧，“不过……你应该听说了，玻——”阿德马尔迅速挥手，打断他的话：“无妨，无论是建设还是重建，玻利维亚都得依赖像你这样的开发商。而要想拿下最优质的竞标、最多的合同，有巴西最杰出领袖的背书还不够吗？”阿德马尔伸出手——他很清楚此刻奥德还不愿接这只手。"
 LATAM_Bolivia_Epilogue_Neutral.5.a: "也正因如此，奥德终究还是握了上去。滚滚的真金白银足以压下他内心所有的迟疑。"
 LATAM_Bolivia_Epilogue_Neutral.6.t: "拉巴斯三头同盟的恐惧"
 LATAM_Bolivia_Epilogue_Neutral.6.desc: "拉巴斯高尔夫俱乐部的停车场罕见地停得满满当当，令来宾们颇感不安。这一天到访的多是新面孔，前来参加一场意图证明“新玻利维亚对商业全面开放”的高尔夫公开赛——连职业体育都成了展示开放姿态的工具。奥德布雷希特等了十分钟也没等来泊车员，索性耸耸肩，招呼朋友们直接走向停车场。谢拉和康潘克默默跟上，毫无怨言。事实上，他们反倒乐得远离人群。他们今日的谈话主题，正是“人群的危险”：拉巴斯街头那一波波暴力事件的聚集点。他们至今算是幸运的，只是从广播和报纸中读到刀光剑影，从流言与传闻中听闻枪声；但那种阴影始终存在，就连最普通的旁观者也能看出，那背后，分明裹挟着政治动机。\n\n“说到‘美国国际开发署’，”谢拉正要继续谈起他听到的风声，“我有些朋友说，开发署最近有些紧张——”\n\n一声巨响打断了他。是爆炸。停车场另一头，一辆破旧车辆夹在一排豪车之间，突然被点燃。三人距离尚远，只被爆炸冲击波掠过一阵热风，但仍然被突如其来的冲击震得愣住。浓烟腾起，黑灰从几辆遭殃的车辆残骸中缓缓飘出。其中一辆已被炸得扭曲焦黑，而三人刚好认识那辆车。\n\n康潘克呼吸急促。是他的车。现在已经化作一团黑烟。他额头开始冒汗——如果他们早到一两分钟……\n\n“他妈的。”奥德布雷希特低声咒骂。人群迅速分成两拨：一半还在俱乐部门口，正焦急催促泊车员把车开出来；另一半则被安保人员拦在停车场之外，人声鼎沸，想尽快逃离的惊慌客人一片混乱。三人被一起推搡着退到了警戒线外。奥德布雷希特和谢拉望向康潘克，而他仍定定看着那柱烟雾，那正是他爱车曾停放的地方。"
 LATAM_Bolivia_Epilogue_Neutral.6.a: "“操他妈的，”康潘克咬牙道，“我要打几个电话，好好‘处理’一下这个地方。”"
 LATAM_Bolivia_Epilogue_Neutral.7.t: "拉巴斯三头同盟的交易"
 LATAM_Bolivia_Epilogue_Neutral.7.desc: "拉巴斯高尔夫俱乐部的内厅一向不欢迎外人，唯有少数获邀请的宾客方能步入。只有得到足够分量会员的亲自准许，外人才能涉足其吸烟室、酒廊、图书室这些真正的核心场域。玻利维亚陆军的勒内·巴里恩托斯将军，尽管在军中位高权重，在此地也不过是个“外人”，他对此心知肚明——此刻，他便站在俱乐部吸烟室里，面对着三位在玻政商圈中日益举足轻重的大人物，而这三人皆已入座，神色不动，却等待着他开口。\n\n“同美国国际开发署的合作算是彻底结束了。”他端着酒杯佯装啜饮，语气平静却不无沉重，“眼下全国各地都有叛乱者和煽动者活动，而所谓的中央政府早已形同虚设，根本无法统筹镇压。诸位先生，现在正是军队出手的时候——将这场自由落体式的崩溃，拉回成可控的下滑。”\n\n“那么，”康潘克慢悠悠地抿了一口苏格兰威士忌，“你是来要资金的？”\n\n“军方的武器弹药尚且充足，我能保证关键军官的效忠。但我无法保证，那些在政权过渡中不可或缺的文职人物也会配合。”他边说边环视三人，目光流转不定。\n\n“止暴制暴是我们乐于看到的结果。”谢拉开口，指间夹着点燃的雪茄，望着将军直言不讳，“但我们所担心的，是你们军方最近关于我们投资的一些言论。若你打算动我们的资本，那我们无法给予你所需的支持。”\n\n“我并无这般激进的意思，谢拉先生。”将军缓缓坐下，将酒杯搁在旁桌，“但请你们明白，如果叛乱者得势，你们什么资本都不会剩下。我能把这场动荡之势引导至更‘合适’的方向，终止暴力——前提是你们愿意作出一定的牺牲。”他说着，俯身前倾，唇边泛起一抹意味深长的冷笑，“等一切彻底崩溃之际，诸位又会选择相信谁？是我，还是那些共产党人？”"
 LATAM_Bolivia_Epilogue_Neutral.7.a: "康潘克长叹一口气，他明白这个问题其实只有一个答案。"
 LATAM_Bolivia_Epilogue_Neutral.8.t: "拉巴斯三头同盟的不安"
 LATAM_Bolivia_Epilogue_Neutral.8.desc: "拉巴斯高尔夫俱乐部向来不是独行客的去处。这座上流社会的名利场里，玻利维亚的富商显贵们在此流转着利益与寒暄。此刻诺尔贝托·奥德布雷希特却独自陷在会员酒吧的皮椅里，酒保对他视而不见，只剩他对着杯中残存的白兰地出神。阳光从北侧窗户洒入，但他坐在吧台最远端——刚好避开了光的触及。广播中，玻利维亚新任总统正在发表演说。\n\n承诺空洞得像沙砾，轻轻一握便从指缝间滑落。所谓“改革”不过是几笔涂抹的草图，而“民族革命的未来”只是个模糊的方向词。那些话语悬浮在空气中，奥德布雷希特却懒得去接。他知道那只是些虚张声势，脑海却忍不住回到当日那场交易——他们与那人所达成的唯一承诺：结束暴力。\n\n某种意义上，他勉强可以说这个承诺“兑现”了。街头的爆炸与冲突确实减少了，取而代之的是国家对异见的冷酷钳制。罢工者成群被捕，劳工领袖与反对派在夜色中消失。寻常百姓能安心走在街上，不再担心汽车炸弹或激进学生，这一份“安全感”便足以为巴里恩托斯换来极高人气。\n\n而如今，演讲的主题转向对外事务，奥德布雷希特最深的担忧被证实：巴列恩托斯开始谈论巴拉圭。那股虚张声势骤然变成了侵略主义。他心中暗骂——当初交易时，对方可从未提过巴拉圭。他最不希望的便是战争，但玻利维亚人民却在欢呼，在总统歌颂武装力量、痛斥巴拉圭“恶行”时群情激奋。奥德布雷希特向酒保招手，要了杯更烈的酒。他的思绪飘向了未来，思索着那一天真正到来时，自己该如何离开这里。"
 LATAM_Bolivia_Epilogue_Neutral.8.a: "玻利维亚，资本停靠的“安全港”，如今天色将暗。"
 LATAM_Bolivia_Epilogue_Neutral.9.t: "提防玻利维亚"
 LATAM_Bolivia_Epilogue_Neutral.9.desc: "该来的总归要来。\n\n拉塞尔达一直抱着一丝谨慎的希望，希望那个扼住玻利维亚咽喉的寡头体系，能在他执政期间土崩瓦解。如今，拉巴斯的政变成了头版头条，他坐在办公桌前，一丝不苟地研读军情部门送来的报告。\n\n宣布就任总统的人，是勒内·巴里恩托斯将军。据各方情报显示，军方站在他这一边，城市里的民众反应大多冷淡，而那沉默的农民，依旧一如既往地沉寂——卡洛斯不禁想起一位和他同名的德国人，记得他说过这样一句讽刺话：“把土豆放进袋子里，它也只是一袋土豆。”政变从来不是文明社会的选项，但某些时刻，只有刀斧才能劈开锈蚀的齿轮，让沉睡的自由挣脱梦魇的绞索。\n\n不论如何，那些像旧日征服者一样压榨国家的寡头们如今已被扫地出门。也许，随之而去的还有他们那近乎短视的中立政策——实质上，这种所谓的中立，恰恰成了亲阿根廷立场的遮羞布。而巴里恩托斯的新政权，则或许提供了一次重新定位的良机。拉塞尔达开始起草方针，考虑送一份“见面礼”给这位拉巴斯的新对手——也许几笔优厚的军火订单，就足以让这位将军重新思量“中立”的含义。"
 LATAM_Bolivia_Epilogue_Neutral.9.a: "毕竟，土豆是可以煮熟、碾碎的。"
 LATAM_Bolivia_Epilogue_Neutral.10.t: "新锡王"
 LATAM_Bolivia_Epilogue_Neutral.10.desc: "关于拉巴斯局势的军情报告，让阿德马尔颇感意外。他过去向来对那边不太上心，毕竟玻利维亚的寡头统治者们一直表现出一种天经地义的统治欲，那种根深蒂固的自我优越感让阿德马尔几乎默认，他们会永远主宰自己那一亩三分锡矿小天下。然而，如今勒内·巴里恩托斯将军所领导的军政府上台，这一切显然已成过去。阿德马尔试图理清自己的思绪。到底是什么让他如此不安？\n\n首先，是对自己在玻利维亚投资的担忧。资源丰富国家中的“起义型政府”时常以打击外资来赢得民众好感——这固然是他们的“政治正确”，可阿德马尔那在玻利维亚精心布局的资产又该怎么办？政局动荡本就扰乱市场，再者，这种局面还可能波及阿根廷。要知道，过去阿根廷在玻利维亚可是一直有自己人安插其中的。\n\n也许，问题的关键在于姿态。报告分析指出，巴里恩托斯绝非第二个卡斯特罗。如果拉巴斯愿意坐下来谈判——那么，好啊，阿德马尔也不介意谈一谈。眼下政权才刚刚站稳脚跟，若能趁这个时候稍稍将玻利维亚引向巴西这一边——手法得巧，别让阿根廷察觉后失控——这无疑是一场豪赌，但阿德马尔何曾畏惧过赌局？"
 LATAM_Bolivia_Epilogue_Neutral.10.a: "这才叫动机。"
