 BRA_andean_increase_influence_by_pp_low: "修改有利条款"
 BRA_andean_increase_influence_by_pp_low_desc: "利用政治关系，我们可以让外交官对条款小修小改，小幅增加我国对条约的影响力。"
 BRA_andean_increase_influence_by_pp_med: "重立有利条约"
 BRA_andean_increase_influence_by_pp_med_desc: "利用政治关系，我们将重新起草该条约的部分内容，大幅增加我国对条约的影响力，使阿根廷处于下风。"
 BRA_andean_increase_influence_by_attitude: "向玻利维亚提出更多要求"
 BRA_andean_increase_influence_by_attitude_desc: "我们将利用对玻利维亚的影响力向他们提出更多要求。这会使条款更有利于我方，但也会增加玻利维亚的敌意。"
 BRA_andean_increase_hostility: "挑起玻利维亚疑虑"
 BRA_andean_increase_hostility_desc: "我们将挑拨离间我们在玻利维亚政府内的盟友，增加他们对条约的敌意，促使条约胎死腹中。"
 BRA_andean_decrease_hostility: "安抚玻利维亚使节"
 BRA_andean_decrease_hostility_desc: "我们将联系玻利维亚政府内的盟友，让他们对条约放宽心，以减少对条约的敌意。"
 ARG_andean_increase_influence_by_pp_low: "§K增加我方影响§!"
 ARG_andean_increase_influence_by_pp_low_desc: "利用政治关系，我们可以让外交官小幅增加我国对条约的影响力。"
 ARG_andean_increase_influence_by_pp_med: "§G大幅增加我方影响§!"
 ARG_andean_increase_influence_by_pp_med_desc: "利用政治关系，我们可以让外交官大幅增加我国对条约的影响力，使阿根廷处于下风。"
 ARG_andean_increase_influence_by_attitude: "§Y牺牲玻利维亚§!"
 ARG_andean_increase_influence_by_attitude_desc: "我们将以牺牲玻利维亚为代价来增加我们的影响力，这将中幅增加我们对条约的影响力，并增加他们的敌意。"
 ARG_andean_increase_hostility: "§R增加玻利维亚敌意§!"
 ARF_andean_increase_hostility_desc: "我们将联系玻利维亚政府内的盟友，增加他们对条约的敌意，促使其胎死腹中。"
 ARG_andean_decrease_hostility: "§G减少玻利维亚敌意§!"
 ARG_andean_decrease_hostility_desc: "我们将联系玻利维亚政府内的盟友，让他们对条约放宽心，降低对其的敌意。"
 LATAM_bolivia_crisis.1.t: "扑灭烈火"
 LATAM_bolivia_crisis.1.desc: "看见电视机里三个模糊的身影彼此握手，洛特总统紧绷的脊背终于松了下来。他开始意识到执政带来的代价：酸痛的肌肉、无眠的夜晚、错过的餐食。洛特早已认定，在巴西，从政是比从军危险得多的职业。至少此刻，他肩头能卸下一副重担。\n\n玻利维亚局势始终是他总统任期内千钧重负之一。整个南美大陆的自由秩序都在风雨飘摇，而玻利维亚恰似最脆弱的链条，在查科战争永恒耻辱的阴影下勉力维系着统一。布宜诺斯艾利斯当局与他们在圣克鲁斯的军国主义爪牙，恐怕早已将这片土地视为待肢解的猎物。\n\n幸而通过洛特与智利盟友的努力，《跨安第斯经济条约》中加强经济安全合作的条款，暂时为这个摇摇欲坠的国家注入了黏合剂。更不必说条约背后，巴西影响力的触角正悄然延伸至新高度。\n\n如果说洛特当年参与首次反法西斯战争教会了他什么，那便是唯有团结一致，自由世界才有机会对抗暴政势力。\n\n当记者话锋转向副总统即将展开的亚洲之行时，洛特的胸口再度难受起来。协调三个固执己见的国家已属不易，但要应付那个人……有时他宁愿去缔造世界和平。"
 LATAM_bolivia_crisis.1.a: "至少比管好夸德罗斯简单。"
 LATAM_bolivia_crisis.2.t: "以理服人"
 LATAM_bolivia_crisis.2.desc: "“我们从玻利维亚进口的锡矿翻了十倍。条约进展顺利，不仅弥补了过去的损失，还带来了额外的收益。”\n\n豪尔赫·亚历山德里在报告的结尾处干脆地点点头，又扫了一眼桌上的报告。他身边的智利外交官和谈判代表们微微一笑，暗自松了口气。这的确是一场胜利，至少眼下如此：圣地亚哥和里约的贸易关系比以往更为紧密，而玻利维亚在其中起到了关键纽带的作用。\n\n“关于阿塔卡马问题，这次进展是否真能缓和紧张局势？这种情况可不多见。”\n\n“确实如此。玻利维亚人不可能轻易忘记‘10美分战争’，但如今的贸易关系，加上我们日益强大的影响力，的确在一定程度上平息了他们失去出海口的怨气。至少目前看来如此。”\n\n总的来说，玻利维亚条约似乎正逐步实现一个“奇迹”——也可以说是“绝妙之笔”。智利和巴西在签署这项协议时，就意识到其中的风险，尤其是阿根廷不可能袖手旁观。不过，两国的努力如今已经初见成效。\n\n“总统先生，阿根廷现在依旧被孤立在外，这多亏了我们的努力。只要我们继续保持这个方针，不出大的变故，和平局面会更加稳固。”"
 LATAM_bolivia_crisis.2.a: "“毕竟，和平是安稳的根基。”"
 LATAM_bolivia_crisis.3.t: "矿石与最后通牒"
 LATAM_bolivia_crisis.3.desc: "当阿根廷总统又翻阅起他上次与弗里赫里奥的会议纪要时，秘书带着大使馆的报告进来了。弗朗迪西仅瞥了眼文件目录就知晓了问题所在：巴西和智利正合作以摧垮阿根廷在玻利维亚的影响。\n\n而此时办公室的电话也如总统意料般响起，电话另一头是名普通军人，他大声嚷嚷着巴西人和该死的“智利佬”是怎么违背三国协定的，在坦克碾过玫瑰宫之前总统最好尽快解决这事。弗朗迪西也只是简单回复了已知情，会在事情泄露前解决。\n\n见鬼，总统咒骂着。他知道他的陆军司令可能压根不在乎玻利维亚，也在地图上找不到拉巴斯，如果政府没处理好这事他只想趁机政变。弗朗迪西顿感孤立无援，他知道托兰佐·蒙特罗已与巴尔文会过面，而他却对此无能为力。\n\n不过眼前还有更紧急的事。总统日后可以和弗拉加以及阿兰布鲁好好谈谈怎么除掉托兰佐（甚至巴尔文），想讨论多久就多久。但当务之急，是捍卫阿根廷的国家利益。\n\n弗朗迪西拿起了电话。"
 LATAM_bolivia_crisis.3.a: "“喂，我是总统。我要戴洛尔电信公司立刻在外交部演一出好戏。”"
 LATAM_bolivia_crisis.4.t: "扩大化"
 LATAM_bolivia_crisis.4.desc: "听着瓦尔特·萨莱斯对玻利维亚局势的报告，洛特总统的心情愈发沉重。糟糕，太糟糕了。\n\n《三方协定》是唯一能让饱受几十年冲突和混乱折磨的玻利维亚免于分崩离析的成果。\n\n在拉巴斯与亚松森之间爆发的第五次查科战争几乎将玻利维亚推向崩溃边缘，同时也影响到了全球锡价之后，阿根廷、智利和巴西决定最终结束这场混乱局面。玻利维亚将被视为一个中立国家，各国都能享有平等的贸易准入权，而作为回报，由寡头组成的统治集团将在外部势力的支持下继续掌权。 \n\n《跨安第斯条约》挑战了这一现状，但洛特并没有意料到阿根廷竟然会因此挥起核大棒；军事情报显示，阿根廷人在边境附近进行军事演习，而且他们的傀儡政权巴拉圭也出动了飞机进行飞行侦察任务。\n\n“我觉得弗朗迪西不会做这种事。为了一点蝇头小利就威胁要发动全面战争？这肯定是在虚张声势。”\n\n“我无意冒犯，但是总统先生，我还是认为我们不能冒这个险。让阿根廷参与谈判好过再来一场查科战争，甚至更糟……另外，弗朗迪西也并不是有意让事态发展到这个地步的，他的政府已经到了崩溃边缘，我们也知道阿根廷军方在这种问题上的影响力有多大。”\n\n“行吧。”想着自己所面临的窘境，洛特闷闷不乐地说：“就这样吧，你去告诉阿根廷人，我们同意让他们参加谈判，但是不要声张……”"
 LATAM_bolivia_crisis.4.a: "“我可不想让这种事扰乱副总统期待已久的访日计划。”"
