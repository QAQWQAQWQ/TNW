 LATAM_bolivia_crisis.5.desc: "Placeholder"
 LATAM_bolivia_crisis.5.a: "Placeholder"
 LATAM_bolivia_crisis.6.t: "又一把火"
 LATAM_bolivia_crisis.6.desc: "“荒谬！我们必须用武力回应这种侵害行为！”战争部长弗拉加愤怒的嘶吼让总统办公室都震动了起来。布宜诺斯艾利斯的这天下午，弗朗迪西遇上了令他头疼到今年绝不想再品鉴一次的难题。智利与巴西在玻利维亚问题上的新协议不仅威胁到了区域内脆弱的平衡，也把弗朗迪西政府架到了火上烤。\n\n“总统先生，我有一言。”外交部长卡尔卡诺温和的语气就像一阵清风，“我理解您和将军的愤怒，但我必须强调这一事件是外交事务。贸然扩大化只会进一步增加引爆公开冲突的风险。”\n\n正当弗拉加转过头来怒视着卡尔卡诺时，弗朗迪西打断了他：“确实。但是只靠辞令是无法保护我国的国家利益的。”他靠回椅子上，用满是汗水的手理了理凌乱的头发：“也就是说，我要你明天早上给巴西发去最后通牒。让他们明确地知道，我国要求参与到条约谈判里去，那些妨害我国权益的行为必须中止。”\n\n卡尔卡诺顺从地点了点头，弗拉加则又举起了手：“总统先生，我建议我们应该在边境上部署军队。这样可以增强我国最后通牒的分……”\n\n“不行。”弗朗迪西坚决地说，“那只会激化局势。但你可以下令进行军事演习，这样足以让他们明白我们的决心。另外，我很相信你的能力，部长。”弗拉加坚定地点了点头。弗朗迪西笑了笑，但那笑容很快就消失无踪了。窗外的月亮已经升起，弗朗迪西不知道他的政府能否在下一场这样的危机中幸存。当他以为国内的骚乱已经平定，他的邻居却又来折磨他了。上帝啊，下一个又是谁？"
 LATAM_bolivia_crisis.6.a: "这一刻，弗朗迪西再也不会担心未来会发生什么了。"
 LATAM_bolivia_crisis.7.t: "有关玻利维亚局势致洛特总统的报告"
 LATAM_bolivia_crisis.7.desc: "过去二十年来，阿根廷的势力在南美洲的扩张前所未有地迅猛。他们通过威胁、剥削和武力，对这片曾经相对平静的大陆以及巴西的国家利益构成了严重威胁。最近的发展为我们提供了一个难得的机会，在不直接威胁巴西安全或引发新的冲突的前提下，抵御并反制阿根廷的扩张。关键问题在于玻利维亚和智利之间的《跨安第斯经济条约》倡议。\n\n在与巴拉圭经历了多年断断续续的冲突之后，玻利维亚的经济几乎崩溃，同时还面临着圣克鲁斯法西斯分裂政权的威胁。这些冲突在1957年，智利、阿根廷和巴西三国签署《三方协定》后得以搁置。根据该协定，各国承诺保障玻利维亚的主权，并允许各国平等开发其利润丰厚的矿产资源。尽管如此，玻利维亚的局势依旧动荡不安。阿根廷继续支持圣克鲁斯政权，并不断加强对玻利维亚经济的控制。简单来说，我们几乎要输掉这场博弈了，但《跨安第斯条约》或许可以让我们扭转局势。\n\n《跨安第斯经济条约》最早于1959年提出，其核心是允许巴西商品免关税从太平洋沿海出港，并掌控玻跨利维亚的交通基础设施。这一举措将极大削弱阿根廷的经济影响力，同时削弱《三方协定》的效力。不幸的是，由于智利在斯尼佩岛之战后不愿再冒险挑战阿根廷的霸权，初步谈判失败了。\n\n最近的一系列事件为我们重新打开了这扇大门。首先，智利海军的扩张抵消了阿根廷在南极洲的威胁，我们或许可以借此重新拉拢智利。其次，阿根廷总统弗朗迪西上台，军方势力被削弱，他希望通过缓和两国关系避免进一步的紧张局势，并极力避免武力冲突。秘密谈判的准备工作已经完成，现在只需总统您的批准。"
 LATAM_bolivia_crisis.7.a: "洛特向外交官发了话。该开始了。"
 LATAM_bolivia_crisis.8.t: "Placeholder"
 LATAM_bolivia_crisis.8.desc: "Placeholder"
 LATAM_bolivia_crisis.8.a: "Placeholder"
 LATAM_bolivia_crisis.9.t: "责任纽带"
 LATAM_bolivia_crisis.9.desc: "巴尔文刚下飞机，便感受到拉巴斯稀薄空气的压迫感。他深吸了一口气，尽力适应这里的环境。他很清楚，如果在谈判中途昏倒，那将是个巨大的麻烦。老天保佑，但愿这不是弗朗迪西的又一场阴谋……\n\n尽管此行的目的如同拉巴斯的晴空般清晰，巴尔文的内心依旧有些不安。新近任命的助理举止可疑，背景来路不明。巴尔文翻看资料时，心中的疑虑愈发加深——这个助理居然查不到任何档案记录。巴尔文忍不住打了个寒颤，军方的不满他早有耳闻，但事态发展至此，简直荒谬至极。“这到底是怎么回事？”他怒喝道，一把抓住助手的领带，将资料摔到对方面前。\n\n助理终于淡然开口：“副总统先生，对不起给您带来困扰。”他似乎毫不在意地说道，“这并非私人恩怨。塞尼奥兰斯将军和我也不愿意用这种方式。只是我要提醒您，这不仅仅是您的担忧，我们同样不愿看到国家主权受到威胁。”说罢，他轻轻扯回自己的领带，整理好衣领，脸色依旧平静。“我们的任务很明确：确认您是否会捍卫阿根廷的国家利益。这便是我们遵命行事的原因。”\n\n巴尔文愣住了，心中涌动的愤怒与疑问堵在喉头。他正欲开口辩驳，忽然听见房间另一头传来声音：“巴尔文博士？会议马上要开始了，大家都在等您。”\n\n他微微点头，瞥了一眼助理，后者示意他可以离开。巴尔文默不作声地走出房间，被监视的感觉让他倍感不适，但他并不对这个间谍心生愤怒。无论彼此立场如何，他们都在为捍卫阿根廷的国家利益而奋斗。看着身后的大门缓缓关上，巴尔文暗自想到，或许弗朗迪西和军方其实并没有什么不同之处。"
 LATAM_bolivia_crisis.9.a: "都是工作……"
 LATAM_bolivia_crisis.10.t: "局势升级"
 LATAM_bolivia_crisis.10.desc: "深夜时分，瓦尔特·萨莱斯挟着《跨安第斯经济条约》文本与一瓶香槟踏入总统办公室，与洛特总统及战争部长奥迪利奥·德尼斯会合。洛特并未追问这瓶违禁品（鉴于与团结协定的贸易禁运）的来历——有些事心照不宣就好。“请坐，我和奥迪利奥刚结束关于副总统亚洲之行的讨论。”\n\n“想必都是好消息。”萨莱斯说着将条约文本置于总统办公桌上。\n\n“必须称赞您的谈判艺术，萨莱斯先生。我原以为玻利维亚人绝不会让步。”总统边说边摆出三只香槟杯。\n\n德尼斯阴沉地插话：“总统阁下别太乐观，布宜诺斯艾利斯那群人绝不会坐视不理。”\n\n“恕我直言，您真认为弗朗迪西会轻易让南美重陷战火？以他的智慧，应该清楚局势升级有害无益。”萨莱斯反驳道。\n\n“我担心的不是弗朗迪西。您该不会天真到以为阿根廷真是他在主政？”德尼斯冷笑。此时洛特已握住酒瓶准备开瓶。\n\n“先生们，”总统指尖抵着软木塞发话，“诸位的顾虑都有道理，但此刻我们值得为这项成就举杯。况且——”他忽然莞尔，“若布宜诺斯艾利斯真敢轻举妄动，我们自然不吝……”"
 LATAM_bolivia_crisis.10.a: "后半句话被香槟塞迸发的爆响吞没。"
 LATAM_cayenne_referendum_desc: "\n在忍受了数十年的忽视以及巴西干涉后，随着抗议者开始诉诸暴力，卡宴已经走到了命运的十字路口。为了平定这场风波，最初由法裔提出的进行独立公投的诉求已经得到了OFN和我国政府的批准，并由美洲国家组织监督公投进程以防止进一步的暴力。尽管各方都在强调民族自决原则，但境外势力是不可能不干涉这场活动的。我们可能需要亲自动手才能避免外交上的尴尬。"
