 BRA_cayenne_good_ending_tt: "§F§n巴西§!成功§G赢得§!全民公投，尽管美洲国家组织的许多国家质疑公投合法性，但他们没有足够的证据来推动议程。\n§Y卡宴将在540天内完全整合。§!§!"
