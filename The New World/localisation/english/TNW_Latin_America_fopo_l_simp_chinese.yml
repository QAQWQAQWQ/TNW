 LATAM_bolivia_crisis.19.t: "欢饮笑语、柔性攻势，来杯“洛特”酒"
 LATAM_bolivia_crisis.19.desc: "萨莱斯对条约的最终成果颇感欣慰，尤其是他那项堪称点睛之笔的贡献——香槟，更让他暗自得意。他也许对自己的外交手腕还不够自信，但总统洛特这回的表现，的确是出奇制胜。虽然这手段并非出自外交部教科书式的“正统”技巧，却实实在在地奏效了——萨莱斯一边回想着，一边望着眼前这套“非常规手法”在现场的效果。\n\n“谢谢你们……我亲爱的、可爱的朋友们，还有夸德罗斯！”洛特举杯，话音未落，全场已被笑声淹没。就连平时少见笑容的夸德罗斯也咧嘴一笑——尽管他还是对洛特竖起了中指，而自己此刻早已醉得东倒西歪。“我要感谢……呃……我们外交团队的出色努力，把阿根廷佬从条约里……呃……踢出去……谢谢！”\n\n作为巴西首席外交官，萨莱斯目送着洛特踉跄着离开宴会厅，但他心里清楚得很，这场外交胜利真正的功劳来自哪里。洛特虽然没亲自谈判条款细节，却靠着一加仑一加仑地开香槟、干香槟，把原本剑拔弩张的现场气氛硬是冲淡到几近融洽，也就为巴西争取到了最后定下协议的关键时机。面对这场“香槟外交”的强力攻势，阿根廷人和玻利维亚人根本反应不过来！\n\n当然，洛特这么做也未必是有什么深谋远虑，他不过是想缓和气氛罢了，毕竟他平时也不怎么喝酒。但偏偏这招就灵——他晃晃悠悠地朝夸德罗斯走去，准备再喝一轮庆功酒。“喂，副总统，再给我满上一杯，要不我就拿我……这迷人的风度来招人烦了。”夸德罗斯咧嘴一笑，乖乖照做。\n\n“你们军队都是这么教的？靠喝酒解决‘敌意的瓶子’？”\n\n“也许吧。你确定你没当过兵，夸德罗斯？”两人你一言我一语，笑闹着度过整晚。那些曾经的宿怨，仿佛也在香槟的泡沫与笑声中，悄悄地成了过去。"
 LATAM_bolivia_crisis.19.a: "“你要是再这么表现下去，洛特，我可真要开始喜欢你了。”"
 LATAM_bolivia_mining_wars_epilogue.26.t: "浪费青春"
 LATAM_bolivia_mining_wars_epilogue.26.desc: "戈尔贝里·多·科托·席尔瓦早就料到，玻利维亚彻底落入社会主义之手的消息一定难以启齿。但他没想到这一幕会如此难堪——拉塞尔达一边灌着威士忌，一边自我折磨。他忍不住还是将革命民族主义运动上台的责任归咎于自己，尽管真正该担大头的还是那个蠢货奥万多——可拉塞尔达依旧不依不饶，死命在旧伤口上撒盐。\n\n“戈尔贝里，你知道我年轻时干过些什么傻事吗？”\n\n“没有，总统先生。”\n\n“我当过共产党。我那时候觉得马克思把一切都讲明白了。我写些蠢兮兮的小歌小册子，装模作样地扮知识分子。直到有一天我才明白，那玩意儿是失败的意识形态——不过是借崇拜瓦加斯这类独裁者来骗自己罢了。只有民主制度，才能真正抵御法西斯。”\n\n“要是我还是当初那个蠢货，你现在带来的消息就太棒了。我会干一杯，然后高喊一声‘革命万岁！’”他举起酒杯，酒液洒在了裤子上。\n\n“可惜啊，戈尔贝里，我不是傻子。”他故意摆出沉思状，嘲讽地自语：“不过也许我真是傻子，不然怎么会把这个始作俑者请进内阁？”戈尔贝里张了张口，但还是选择闭嘴了。“随便吧，现在锅已经到我们头上了。我们得准备好应对他们早晚都会出现的大饥荒，组织赈灾、做点人道援助，老一套。”\n\n“听着，你们这些家伙干点你们最擅长的事：封锁红色威胁，再拟个可能的进攻方案……”他说完这话便陷入迷蒙的醉意中，随手将戈尔贝里挥退。也许醒来之后他会少些麻烦，至少有机会赢回他的信任。"
 LATAM_bolivia_mining_wars_epilogue.26.a: "“这些孩子怎么就不能乖乖去读亚当·斯密呢……”"
 LATAM_bolivia_mining_wars_epilogue.27.t: "玻利维亚与无谓的追逐"
 LATAM_bolivia_mining_wars_epilogue.27.desc: "“我只希望你能在此事上做出正确抉择，总统先生。共产主义的威胁绝不可掉以轻心。再会！”参议员怒气冲冲地甩上门，阿德马尔这才松了口气——这一天真够折磨人的，尽是些死板的军头和政客在他耳边喋喋不休，叫嚷着“玻利维亚问题”。\n\n什么“人民大会”，什么“工团主义共和国”，老百姓会在意这些东西吗？根本不会。但问题就是摆在眼前了，革命的火星眼看就要烧到家门口了，总得做点什么，好安抚那些鹰派。\n\n阿德马尔拿出一支铅笔，随手抓了张空白纸，开始涂涂写写。嗯……搞个阅兵怎么样？那帮粗人最喜欢扮孔雀开屏了，没有比这更能展现肌肉的方法了。再说天气也不错，阅兵后还有庆功宴，大家玩得尽兴。\n\n算了，这事还是交给秘书，让他们把这堆胡思乱想整理成正式文件，再美化一下，给玻利维亚的“失败者俱乐部”念念——哦不，正式名称是“玻利维亚侨商界精英群体”，演讲时可千万别用前面那个词。摆出点战争姿态，给他们希望，顺便谋点合作，老套路了。"
 LATAM_bolivia_mining_wars_epilogue.27.a: "……话说回来，工团主义到底是个什么鬼？"
 LATAM_bolivia_mining_wars_epilogue.28.t: "按部就班"
 LATAM_bolivia_mining_wars_epilogue.28.desc: "“军方掌控局势！托雷斯宣布解散人民大会。”\n\n这则新闻是拉塞尔达闲暇时翻阅的一叠玻利维亚报纸中的最后一份。他正在了解局势。革命民族主义运动的上台令人担忧，这显然是上届政府的一个失误。尽管他们不算彻头彻尾的法西斯分子，但他们与阿根廷人走得太近，这在冷战的天平上可能会引发危险的倾斜。\n\n幸运的是，后来左翼叛乱削弱了这一运动中的民族主义色彩。\n\n但不幸的是，这也意味着玻利维亚社会主义苏维埃共和国的幽灵，几乎就要出现在他们的家门口了。\n\n好在托雷斯发动政变，及时制止了这场危机。据戈尔贝里透露，这所谓的“军事社会主义”，与其说是社会主义，不如说更像是阿德马尔那一套；毕竟阿德马尔可不是那种把捐款都当成社会主义行为的极右疯子。尽管托雷斯身边仍有一些左翼人物伴随，但他终究只是个独裁者……\n\n“瓦斯科……对，我刚刚看完玻利维亚局势的新闻。”\n\n“……不，还是要继续给他们施压。让军方宣泄一下也无妨；反正没人会在意几名死去的玻利维亚士兵……”"
 LATAM_bolivia_mining_wars_epilogue.28.a: "总得有人来当出气筒。"
 LATAM_bolivia_mining_wars_epilogue.29.t: "忠于现实"
 LATAM_bolivia_mining_wars_epilogue.29.desc: "托雷斯发动政变、推行军事社会主义的消息，是阿德马尔在两场公务之间无意中得知的。当时他正与瓦斯科·莱唐·达库尼亚并肩走在街上，准备出席一场枯燥无味的外交礼节活动，恰巧瞥见了报纸标题。瓦斯科正是那个可以为他解答疑问的人。\n\n“说说看，玻利维亚怎么回事？我记得之前不是说赤党上台了吗？”\n\n“其实一直都是托雷斯在掌控局势。”瓦斯科用平淡直接的语气回答道，这让阿德马尔感到耳目一新——相比之下，他更习惯听这位外交官对民主和法西斯发表冗长无聊的道德说教。“他只出了一招，就关闭了人民大会，把玻利维亚变成了一个准法西斯的军人国家。”不过好话倒也说得太早了。\n\n“这些人不是自称是社会主义者吗？还是‘军事社会主义者’？也不知什么意思。”\n\n“恕我直言，托雷斯的社会主义程度，就跟您差不多。他们不过是和革命民族主义运动一样，借助民众的不满情绪，哄骗他们相信只有铁腕人物才能解决问题，而不是那些讲民主的人。这些家伙不过是些失败者，别提什么民主。尽管他们当初确实用好处买通了他的忠诚——不过那已是往事了，现在这届政府看起来还有点前途……”\n\n“我看现在共产党人都被清理掉了，咱们也有了回旋余地——当然，前提是他们肯掏钱。”阿德马尔边说边打量瓦斯科，后者则面露苦笑，心中默记下这位元老的指示：“等这边处理完，就把消息传过去。朋友这种东西，永远不嫌多。”"
 LATAM_bolivia_mining_wars_epilogue.29.a: "“但愿你的这些‘朋友’，别又去买下一个总统吧……”"
 LATAM_bush_war.20.a: "总得留个心眼。"
 LATAM_bush_war.22.t: "致奥万多"
 LATAM_bush_war.22.desc: "“奥万多总统，晚上好。”\n\n奥万多·坎迪亚将军眯起眼睛扫了一圈他的顾问——都是胸前挂满勋章的军官。他拿起听筒举到耳边，清了清嗓子。\n\n“晚上好，总统先生。是什么风把您吹来了？”\n\n最近巴西方面的电话来得越来越频繁，现在他们俨然成了奥万多统治玻利维亚的靠山。但总统亲自打电话来，还是比较少见。\n\n“想必您已经得知，我国即将在巴拉圭战事中取得优势，”巴西总统说道，“你知道，这是我们非常关心……”\n\n“当然，”奥万多立即接话。房间里所有人都屏息凝神。“玻利维亚一贯致力于维护地区稳定。”\n\n电话里传来一声轻笑。“奥万多总统，我知道您早就想对圣克鲁斯动手。现在机会来了。必须在巴拉圭人完全压制游击队之前牵制他们。”\n\n“总统先生，我将立即与内阁讨论此事。很多人都希望彻底解决圣克鲁斯问题。”\n\n其实根本不用讨论。在场的玻利维亚军方高层早就开始谋划对巴拉圭的新一轮战事。"
 LATAM_bush_war.22.a: "也许一场战争正是联合民族解放阵线颠覆亚松森那帮法西斯所需的。"
 LATAM_bush_war.23.t: "玻利维亚行动报告"
 LATAM_bush_war.23.desc: "“玻利维亚圣克鲁斯军事行动评估：彻底失败。”\n\n这一结果早在预料之中。晨曦宫的某个会议室内传阅着玻利维亚与巴拉圭边境冲突的战报结果，总统幕僚们的反应异常平静。\n\n“还能指望玻利维亚人干点啥呢？”有人问道，引起几声轻笑。但随着燃烧的车辆和满身血污的玻利维亚士兵的模糊照片显示在众人眼前，会议室顿时安静下来。总统凝视着照片中一个玻利维亚男孩紧闭的双眼，那孩子的脸颊上还留着褪色的血指印。\n\n“对玻利维亚人是灾难，但对我们有利。”一名军官指着报告某处，\"看这里，巴拉圭被迫向圣克鲁斯调遣了数千兵力。”\n\n“我们与联合民族解放阵线的通讯证实，这些部队之前一直在镇压他们。”\n\n“换句话说，”总统还在盯着那张照片，“我们为盟友争取了宝贵的时间。不是每次行动都要完全成功……”"
 LATAM_bush_war.23.a: "“……尤其是代价是其他人的血的时候。”"
