 LATAM_bush_war.31.t: "联合民族解放阵线的焦点"
 LATAM_bush_war.31.desc: "“随着我们在巴拉圭腹地不断推进，那些长年被剥夺劳动果实的瓜拉尼农民，终将觉醒他们的阶级意识。总有一刻，这个非法的法西斯政府会在他们无休无止的反抗中轰然倒塌。”奥斯卡·克雷特声音洪亮，言辞如锤，铿锵有力。说罢，他略作停顿，端起摆在战略文件堆之间的水杯润了润喉。\n\n这个空当，正巧被拉斐尔·弗朗哥抓住。“我赞同克雷特同志的判断。”\n\n众人一听，纷纷转头看去——这位昔日的战斗英雄一瘸一拐地走向会议桌，神情坚毅。“联合民族解放阵线的重心，确实该落在农村。政府已经把最忠诚的部队调往亚松森和查科。我们完全有机会争取那些立场动摇、受过训练、手握武器、且心系祖国的警察与士兵。”\n\n“切”·格瓦拉弹了弹雪茄上的烟灰，眉梢一挑，却并未开口。他的沉默由阿尔弗雷多·拉莫斯接了过去：“我仍然坚信，我们的敌人只是纸老虎。只要能迅速攻入首都，一切都能以最小的代价落幕。”\n\n话音刚落，会议室顿时嗡然一片。最终，将众声压下的，是塞尔索·阿瓦洛斯·奥坎波斯怒意满满的一声高喊：“你们这些资产阶级，坐在后方指点江山，当然觉得敌人不堪一击。若你们这些所谓‘自由派’真想靠冒进来洗刷你们的懦弱——那尽管去！”"
 LATAM_bush_war.31.a: "联合民族解放阵线的会议在又一次呐喊中落幕。"
 LATAM_bush_war.32.t: "敌对亲阿根廷派系在巴拉圭发动政变"
 LATAM_bush_war.32.desc: "绝密\n仅供目视查阅\n呈送巴西联邦情报与反情报局所有成员\n门德斯红党在巴拉圭发动政变\n\n与埃皮法尼奥·门德斯·弗莱塔斯和“民主党人”——一个相对温和的巴拉圭红党派系密切关联的将军们已经夺取了巴拉圭首都亚松森的控制权。这是自丛林战争爆发以来的又一次巴拉圭政军派系内讧。\n\n门德斯·弗莱塔斯获得了来自阿根廷的秘密支持以发动这场政变，他正在与布宜诺斯艾利斯持续接触以争取更多的军事援助。他所主张的经济集中计划及更广泛的政治纲领，显然深受庇隆主义思想的影响（参见第5-6页所选摘录）。此外，他对美国及其盟国——尤其是巴西——表现出了公开敌意。\n\n门德斯的上台无疑对我方的巴拉圭政策而言是最坏的情形，但在短期而言，这也是一个难得的机会，我们可以借此空档期继续支持FULNA行动，投入更多的资源和计划能力。尽管门德斯在军队高层中得到了稳固的支持，我们仍有机会策反一些旧政权中对门德斯不满的基层军官倒向FULNA。此外，门德斯有限赦免政治犯的计划也有望用于释放我方被俘的特工德尔塔-8与桑巴-5。最重要的是，我们在联合民族解放阵线的联络人也向我们保证，只要他们能获得足够的补给，目前的混乱将成为他们对亚松森发动决定攻势的最佳时机。"
 LATAM_bush_war.32.a: "阿根廷的朋友，巴西的威胁。如此心头大患，不除不快。"
 LATAM_bush_war.33.t: "遭劫的卡宁德尤"
 LATAM_bush_war.33.desc: "以下是《巴西日报》巴拉圭丛林战争系列报道的第五篇。本报记者若昂·瓦斯科塞洛斯目前身处卡宁德尤省，为安全考量隐去了具体地名。\n\n刚进入村落，一个年不满十二的瓜拉尼族少年便阴沉着脸对我搜身，同时有位老者用步枪直抵我胸口。确认我未携带武器后，两人将我押送进一间布满焦黑痕迹的集体仓库。透过邻近茅屋的缝隙，我瞥见一名眼部颌部瘀青的年轻女子，她那空洞的目光穿透般地望向我的身后。老者的枪管猛地杵进我脊背，她的身影便从视线里消失了。\n\n在这个四壁萧然的破败仓库里，审讯竟是双向进行的。他们先核实我的政治立场，继而逼问支持联合民族解放阵线的叛军情报：最近据点方位、如何联络切·格瓦拉。\n\n待他们问罢轮到我提出疑惑——这般待客是否常态？村民透露该村新近遭袭，口粮被掠、牲畜尽失。施暴者或是政府民兵伪装的匪徒，或是逃兵，但他们倾向前者推断。“那帮人在来这儿前就沿路劫掠，行动很有章法，根本不是散兵游勇能干出来的。连施暴都透着训练有素。”老者如是说。\n\n政府军所经之处哀鸿遍野，使得民众越发倾向投靠联合民族解放阵线寻求庇护，反抗这个夺走他们生计的政权。可悲的是，我虽看出村民求战若渴，却无法告知游击队行踪——事实上连我自己也难辨方位。不过这场寻觅大概不会持续太久，有传闻称政府军与切的部队正在此地以南不远处交火。"
 LATAM_bush_war.33.a: "若昂·瓦斯康塞洛斯继续往下寻找阵线的下落。"
 LATAM_bush_war.34.t: "巴拉圭激进派将军政变"
 LATAM_bush_war.34.desc: "绝密\n仅供目视查阅\n呈送巴西联邦情报与反情报局所有成员\n斯特罗斯纳领导巴拉圭政变\n\n忠于阿尔弗雷多·斯特罗斯纳将军的部队袭击了巴拉圭国家警察总部，巩固了他的权力。部分亚松森的线报证实，国家警察总长已经身亡，这标志着巴拉圭政权残酷的内斗再次升级，而正如火如荼的丛林战争还在为它火上浇油。\n\n数周以来，斯特罗斯纳成功地挑起了执政党内的派系分歧，将自己定位为团结的候选人。除了发展主义和狂热的反共主义之外，人们对他的国内政治倾向知之甚少。不过，种种迹象表明，他是一个极端的强硬派，对联合民族解放阵线和其他不同政见者均持有反对态度。\n\n在外交事务方面，斯特罗斯纳的态度不甚明确。他主张在支持极右翼秃鹰军团的基础上推行侵略性外交政策，并与团结协定建立更深层次的合作。如果他在丛林战争中获胜，巴拉圭无疑将恢复甚至增加对拉美右翼游击运动和颠覆活动的支持。\n\n尽管斯特罗斯纳将军对我国国家利益构成了威胁，但政变可能会有利于我国在巴拉圭的行动。逃过斯特罗斯纳最初的扫荡行动的国家警察可以被招募进联合民族解放阵线，而我们则需要抑制阵线内共产主义分子的反击，因此，特工应当强调叛逃警察在战斗中的作用。此外，军事部队已进入亚松森以支持政变，乡村地区可能能借此机会，加快反对政府的活动进程。"
 LATAM_bush_war.34.a: "一个专横的独裁者，我们必须推翻的对象。"
 LATAM_bush_war.35.t: "游击队的贵客"
 LATAM_bush_war.35.desc: "加托总嚷嚷着要报道更刺激的新闻，如今得偿所愿，被困在巴拉圭闷热的丛林深处，置身于武装游击队的秘密营地中。空气中弥漫着熏肉、新雨和汗水的混合气息；茂密的树冠让阳光只能从缝隙间投下锐利的光束。切·格瓦拉正坐在篝火前的木桩上，擦拭着横放在大腿上的步枪。\n\n这场令加托长途跋涉而来的采访，开场略显尴尬——这位声名狼藉的游击队长直言《新闻论坛报》是“巴西最反动的报纸之一”。约莫十几个战士围着听他们交谈。当切突然起身走向帐篷时，加托的汗毛都竖了起来。他早听过格瓦拉行事暴戾的传闻，对暴力近乎偏执的嗜好——谁能保证这位领袖不会把自己大卸八块喂野兽？\n\n“是我失礼了。”切拿着细长的长方形盒子回来时说，“差点忘了，特意为客人留的。”\n\n掀开盒盖递到记者面前，一排列包裹精美、未开封的雪茄跃入眼帘。加托小心翼翼地取出一支，立即有游击队员递来火柴。切自己也拿了一支，重新坐下。\n\n“我不讳言对解放全美洲感兴趣，无论是古巴、巴拉圭还是其他任何地方，”切对着整个营地说道，仿佛在预先回答未曾提出的问题，“联合民族解放阵线的使命就是团结社会各界反法西斯力量，而游击队员和思想干部则是这场民族斗争的先锋，既要直面法西斯分子，也要唤醒田野间的农民。自由党——就是阵线的文职分支——理解这点。你们巴西的老板们也该明白。人民会战斗到底。”"
 LATAM_bush_war.35.a: "雪茄居然和刚卷起来时一样好抽。"
 LATAM_ParaEpilogue_BRW.1.t: "忧愁河上的金桥"
 LATAM_ParaEpilogue_BRW.1.desc: "那天，巴拉那河静静流淌，著名的湍流难得休憩。建桥工人们日夜期盼着大河能在施工之时岿然如此，但此刻这座桥已不属于建设者，而是属于剪彩仪式嘉宾们。一位巴西人和一位巴拉圭人在两岸观众的期盼之下即将剪彩。\n\n东岸，伊瓜苏市的尽头，数千人已聚集一小时。没了奔流的水声掩盖，欢呼与呐喊声混杂，丝毫组织不起有序的口号声。人群每分钟都在向桥中心挪动，不时还有人向空中抛出帽子，声浪一阵高过一阵。\n\n西岸，东方市的重建区外，却只站着十三名恰好有空到场的公证人与官员，他们静立凝望对岸，时而瞥向脚下深蓝的河水。对岸每传来五次欢呼，他们才眨一次眼，偶尔两次。前排男子机械地抽动前臂，一次又一次的查看手表，似在遵循某种流程。他唯一的反应是嘴角几不可察地抽动，转瞬即逝。最终，男人微微颔首，十三人齐步前行。\n\n当双方队伍在桥中央汇合，两位剪彩者简短握手，将缎带一分为二。此时，河水一转湍急，他们不得不向桥两端飞奔，躲避汹涌而来的人潮。"
 LATAM_ParaEpilogue_BRW.1.a: "背后，洪水滔天。"
 LATAM_ParaEpilogue_BRW.2.t: "升天瞻礼"
 LATAM_ParaEpilogue_BRW.2.desc: "“奥——奥德布雷希特先生，”戴着安全帽的年轻监工手持记录板，声音发颤，“下面有几位先生，说需要您签署几份文件。是关于下个月资金拨付的。”顺着他忧虑的目光看去，山下脚手架林立的亚松森废墟中有个小车队。一辆黑色豪华轿车，两旁的随行车里满是西装革履的陌生人。\n\n“偏偏在我欣赏风景的时候驾到。”奥德布雷希特掏出钱包说道，“拿几千块给他们，代我签字。就说巴西利亚的电话很快会到。”\n\n年轻人瞪大眼睛接过钞票：“遵命，先生！”他转身冲下山坡，在满载建材的卡车与新购设备间穿梭。他在原地吼道：“还有叫他们别封路！重建首都这事要赶工期的！他们就不能找个小秘书去抱怨吗？”\n\n奥德布雷希特双手垂落，指节舒展。车队驶离后，这位巴拉圭人回到工地，浑然不知自己刚与谁对，或是又贿赂了谁。\n\n巴西经济巨头们将继续网开一面，而“城市之母”的重生步伐不会停歇。去除冗余、修建边幅、焕然一新，亚松森终将重回世界舞台的聚光灯之下"
 LATAM_ParaEpilogue_BRW.2.a: "他们只要保证一道贴上“巴西制造”的标签就是了。"
 LATAM_ParaEpilogue_BRW.3.t: "充实的一天"
 LATAM_ParaEpilogue_BRW.3.desc: "阿德马尔坐在酒店床上，解下勒得发痒的领带，扯开领口。离开外国政要和记者的纷扰，他终于听到了瓜伊拉瀑布的轰鸣。浩大水声不绝于耳，响彻慵懒闲散的同名小镇，撼动着镇民慢节奏的生活。他心知肚明，今天与巴拉圭签署的协议已为这些瀑布敲响丧钟。\n\n不论自然奇观如此雄伟壮丽，它们终究敌不过现代工程学的奇迹，也满足不了人们对电力永不餍足的渴望。阿德马尔躺在床上，想着或许该让远处安心的水流声在彻底消失前最后一次洗涤心灵。\n\n隔壁房间，外交部长瓦斯科·莱唐·达·库尼亚正坐在咖啡桌旁细读晚报。总体而言，报道都很正面。《圣保罗报》盛赞总统和平重塑南美大陆外交关系的伟业，《人民公报》则称阿根廷对两巴协议暴跳如雷，“再次证明阿方是拉美政治中的不负责任者”。就连一贯批判的《巴西日报》，也对总统的努力美言了两句：如此行为既保障了巴西南端能源安全，又顺带帮扶贫穷的巴拉圭邻邦。\n\n莱唐靠在椅背上，忍住哈欠。总的来说，值得欣慰的事不少。他深知政府总需要些运气，而在阿德马尔身后那人情世故的乱流之中，能将这份好运归功于自己总是有利的。部长起身准备就寝，很快将和总统一样沉沉睡去。"
 LATAM_ParaEpilogue_BRW.3.a: "窗外瀑布川流不息，浑然不知自己气数将尽。"
 LATAM_ParaEpilogue_BRW.4.t: "水电大梦"
 LATAM_ParaEpilogue_BRW.4.desc: "拉塞尔达靠在他那张小椅子上，翻阅着与巴拉圭的条约草案。他多么希望能结束这疲惫的一天，倒在那张虽小却舒适的酒店床上，但神经衰弱的失眠催着他要先做决定。终于，他将文件拍在桌上，拿起电话拨通了财政部长埃利奥·马科斯·佩纳·贝尔特朗的号码。从窗口向外看去，瓜伊拉镇空荡荡的街道挺立于巴拉圭与巴西交界处的峭壁上。他正处于签署条约的最后阶段，这份条约不仅会改变这个小镇的命运，还将影响整个地区。\n\n有了巴拉圭开放的态度，签订解决长期边境争端的条约自然不在话下，但真正的问题在于巴拉那河上建造水坝的提议。这个工程甚至不会在他的总统任期内开工，但新增的条款可能为未来的报复埋下伏笔。\n\n电话那头终于传来贝尔特朗的问候，却被拉塞尔达忧虑的抱怨打断：“贝尔特朗，水坝是个大投资，我不想让它变成又一个半途而废的敛财项目。直接说你的看法吧。”\n\n一阵沉默后，贝尔特朗回答：“这确实是个大投资，总统阁下。我理解您的担忧，我们也不知道下届领导班子上任时情况会如何变化。不过，不会有哪位总统希望被后人记住他耗费无数还让巴西南部失去能源保障。当水坝建成后，这种能源安全将为我们节省数十亿。就像美国人说的，要赚钱就得先花钱。”\n\n拉塞尔达谢过贝尔特朗，咔嗒一声挂上听筒。他还有许多事情要考虑，而那张床的吸引力比以往任何时候都更强烈了。"
 LATAM_ParaEpilogue_BRW.4.a: "想赚钱，确实要先花钱。"
 LATAM_ParaEpilogue_BRW.4.b: "我才不会为水泥堆砌的白日梦掏空国库。"
 LATAM_ParaEpilogue_FEB.1.t: "十年不晚"
 LATAM_ParaEpilogue_FEB.1.desc: "拉斐尔·佛朗哥在闪烁的相机闪光灯前深吸一口气。这一刻，凝聚了他自1937年以来的全部奋斗，是奸佞派瓦和他的自由党走狗背叛国家、颠覆革命以来努力至今的成果。这些乱臣贼子为巴拉圭带来了灾难性的莫里尼戈政府，但现在他回来了。佛朗哥要治愈人民的创伤，让祖国重获健康。\n\n佛朗哥紧紧攥住话筒，不让双手颤抖。“红党政府业已倒台。巴拉圭人民凭借勇气与牺牲，推翻了肆虐已久的暴政。作为人民选中的公仆，我的职责就是带领巴拉圭重回繁荣，找回红党在对阿根廷奴颜婢膝中挥霍殆尽的伟大。”\n\n“但是，我们浴血奋战，绝非为了换个主子。所谓的联合民族解放阵线从未真正代表民意，它不过是国际主义共产党人的工具。这些人，企图践踏我们民族的自信与意志；这些人，不过是外国资本的爪牙，正等着将利爪刺入阿根廷人撤退留下的伤口……”\n\n佛朗哥咽了口唾沫。自由党已无力阻止他，就算是他们尚未入狱的残党也了无威胁。他只是在履行对国家的责任，个人复仇不过是额外收获。“……特别是自由党，他们打着自由的旗号，实则是外国军官和资本家的殖民附庸。从耶格罗斯时代到索拉诺·洛佩斯时期，他们背叛了巴拉圭争取独立的斗争传统。其卖国行径，已构成国家安全威胁。有鉴于此，我已指示革命安全部门逮捕自由党领导人，判处其叛国罪。他们休想扭转我们革命的航向。”"
 LATAM_ParaEpilogue_FEB.1.a: "巴拉圭不独立，则灭亡。"
 LATAM_ParaEpilogue_FEB.2.t: "婉拒机遇"
 LATAM_ParaEpilogue_FEB.2.desc: "“……而他简直不敢相信！他原以为修建这样一条公路至少需要两年。开工八个月后，我们在通车仪式上见面，他看我的眼神活像见了外星人。剪完彩去吃自助时，我跟他说这不过是阿德马尔魔法的冰山一角，自那以后，佩雷拉那帮人一有需求就来找我，毕竟知道我干的成事……”\n\n阿德马尔·德·巴罗斯正与新任巴拉圭总统拉斐尔·佛朗哥共进午餐。亚松森街头仍回荡着清理废墟的重机轰鸣，这场午宴虽简约却不失格调。阿德马尔觉得，现在正是说服这位老民族派认同自己巴拉圭发展蓝图的绝佳机会——顺便还可以交个朋友。\n\n“……而关键就在这里，佛朗哥总统。我干的成事。我为巴拉圭带来了宏伟规划，能让贵国在十年内成为拉美经济引擎——能源生产、农产品出口、旅游业，应有尽有。当然，还有支撑这一切的现代化基建。有巴西相助，巴拉圭必将令邻国艳羡不已。而只要我在巴西利亚坐镇，这些项目都能落地。”\n\n佛朗哥慢条斯理地戳着餐盘里的橄榄：“巴拉圭当然会让邻国眼红。我国人民的意志力与敬业精神冠绝拉美，如今红党垮台，再无人能束缚这等潜力。现代化基建、能源农业、旅游开发、资源勘探，巴拉圭都会拥有。但实现这些，何须巴西援手？我们需要的只是时间。”"
 LATAM_ParaEpilogue_FEB.2.a: "佛朗哥吞下橄榄，向睁大了眼的阿德马尔露出微笑。"
 LATAM_ParaEpilogue_FEB.3.t: "不盟之友"
 LATAM_ParaEpilogue_FEB.3.desc: "拉塞尔达狠狠转动电话拨号盘，手指敲击桌面，强忍着对着听筒咆哮的冲动。漫长的等待后，电话那头终于传来回应：“下午好，拉塞尔达先生。何故叨扰？”\n\n对方失礼的称呼让拉塞尔达咬紧嘴唇，才忍住破口大骂的冲动。“下午好，佛朗哥先生，”他竭力保持平静的声线，“我致电是为讨论一个严重问题。关于贵政府对联合民族解放阵线成员的处置方式，我们收到了令人不安的情报。据我所知，在您宣布自由党是……‘人民公敌’后，您下属的内卫部队立即开始逮捕其成员。”\n\n拉塞尔达摆弄着钢笔，仍在克制摔电话的冲动。对这种三流独裁者保持外交辞令反而令他更为恼火。“我直说了，佛朗哥。从开始的联合民族解放阵线成员，到现在的巴拉圭合法政府，巴西始终慷慨支持你和你的拥趸。在你最需要时，我们提供了外交与资金援助，但若继续这种政策，巴西政府必将终止援助。若你要扼杀巴拉圭来之不易的自由，请独自承担后果。”\n\n听筒那头沉默良久，几乎让拉塞尔达以为说通了。然而，回应传来：“巴拉圭过去、现在、将来都是主权国家。我们接受援助不是为换个主子，任何政策都只由亚松森决定，而非巴西利亚。若您将援助视为待收回的投资，那我为此误会致歉。祝您愉快。”"
 LATAM_ParaEpilogue_FEB.3.a: "拉塞尔达木然了整整一分钟，随后便破口大骂。"
 LATAM_ParaEpilogue_FEB.4.t: "参军见异域"
 LATAM_ParaEpilogue_FEB.4.desc: "晨雾未散，何塞和路易斯强忍着打哈欠的冲动。自红党倒台后，巴拉圭与巴西的边境紧张气氛缓和不少，两名哨兵越来越觉得在此驻守纯属多余。路易斯刚给何塞递了支烟，转弯处突然亮起车灯。\n\n三辆汽车横冲直撞驶向检查站，仿佛根本无视它的存在。哨兵拼命挥舞手臂喊着“停车！”，车辆却毫无减速迹象。直到何塞颤抖着端起步枪指向领头车辆，车队才发出刺耳的急刹声。\n\n路易斯踉跄着抄起步枪，满载的头车司机已跳下来用葡萄牙语破口大骂。晕头转向的他注意到，所有车辆都堆满行李袋、麻袋和板条箱，三座摇摇欲坠的行李山怎么看都不符合安全规范。\n\n在葡萄牙语脏话的狂轰滥炸下，两名哨兵缓缓退向哨所。晨光中面色惨白的路易斯不愿对别国侨民举枪，便扭头对着破板房呼喊：“巴勃罗！快来！”\n\n当指挥官匆忙戴眼镜冲出来时，两人后背已贴上了哨所墙壁。长官用蹩脚葡萄牙语勒令巴西人出示证件，严厉声明根据巴-巴新条约，巴拉圭有权管控出入境人流，而他们刚才的行为已构成明确的即时威胁。说罢，他便取出黑色印章在文件上重重一盖，转身回屋。那人的咒骂声逐渐低微，最终随引擎轰鸣远去。"
 LATAM_ParaEpilogue_FEB.4.a: "三辆车再次开动后，何塞又问路易斯要了根香烟。"
 LATAM_ParaEpilogue_LIB.1.t: "废料再利用"
 LATAM_ParaEpilogue_LIB.1.desc: "“全体巡逻检查！快，动作快！”该死的，这口音还得再练练，雷耶斯上尉暗自想道。他转头对站在一边的新兵说：“瞧瞧他们那德行，哈，活像昨天才摸到枪。”锐利的目光扫过这群菜鸟：“知道为啥不让你们现在加入巡逻吗？因为老子清楚，你们可不是第一次扛枪。”\n\n一个皮肤黝黑、眼睛晶亮的矮个子步兵顶嘴：“呃，我不是陆军的，我是亚松森拉雷科莱塔区……”\n\n“闭嘴！”雷耶斯厉声打断，“老子奉巴西总统手令，来帮你们巴拉圭这群泥腿子翻身。再插嘴有你好看！”新兵悻悻扭头，故作夸张地跳开躲避上尉。啧，是个刺头，绝对有人教过他这套把戏。什么首都来的，鬼才信。\n\n这倒让他灵光一现。他在废木板拼成的桌子上放了张地图，让所有人报履历，点出老家位置。奇怪的是，这帮大头兵是清一色的查科本地人，实打实的本土作战。更惊人的是，他们那种机灵劲，能比得上自己在巴西远征军摸爬滚打十年才练出来的成果。\n\n真邪门。他们的长官本该是莫里尼戈、斯特罗斯纳之流，如今废墟里只剩追名逐利的乌合之众，净是些蹬着旧军靴、为游击队卖过命的不得志之士。他们都在等着天降领袖，振臂一呼。可除了眼前这群小子，谁还会卖命？战乱国度里，安保问题哪有挑三拣四的余地。"
 LATAM_ParaEpilogue_LIB.1.a: "全体都有，给这帮菜鸟好好看看什么叫训练。"
 LATAM_ParaEpilogue_LIB.2.t: "和平江"
 LATAM_ParaEpilogue_LIB.2.desc: "开拍了。友谊大桥的钢拱在波光粼粼的巴拉那河上映出优美弧线，一道白带横贯桥面中央，标记着巴西与巴拉圭的边界。拉塞尔达戴着墨镜，扫视两侧聚集的记者群，又望向从巴拉圭方向走来的拉莫斯总统。烈日当空，他能听见身后河岸上围观人群的嘈杂声响。\n\n两位总统在分界线前相遇，如老友般握手致意，彼此都心知这场会晤的历史意义。历经亚松森一役，满目疮痍的首都显然不适合拍照；同时，对拉塞尔达而言，这座大桥象征着两国基于自贸构筑的新经济秩序，要比任何城市都来的有纪念意义。巴拉圭摒弃了过去的统合主义体制，巴西或许很快也能摆脱目光短浅的发展主义与繁文缛节。\n\n两人向左转身，让摄影师捕捉到拉莫斯与拉塞尔达相视而笑的画面。巴西总统的大手，正坚定地搭在对方肩上。\n\n拉塞尔达脑海中闪过批评者的嘴脸。他早读过瓦伊纳那篇檄文，指控总统纵容一个受巴拉圭寡头操控的非民选强人上台。然而，身旁这个谄媚的男人让批评不攻自破。随你怎么评价拉莫斯，但他可配不上“强人”的称号。"
 LATAM_ParaEpilogue_LIB.2.a: "自由世界是一家。"
 LATAM_ParaEpilogue_LIB.3.t: "河上大手"
 LATAM_ParaEpilogue_LIB.3.desc: "镜头聚焦下，友谊大桥的钢铁拱架在巴拉那河粼粼波光上划出优雅弧线。阿德马尔踏着红毯前行，享受着两侧记者群追逐的目光。他的对手从桥另一端走来，身后树林间隐约可见平静的鸢尾花港村。\n\n当两人在白线前驻足相对时，阿德马尔与拉莫斯总统微笑相向、坚定握手。可以说，这场外交表演是双赢。由于丛林战争决战后的亚松森仍是一片废墟，这座大桥成了最佳会晤地点。不过，封路办仪式让忙着送货的卡车司机们甚是焦急，更别提那些涌入伊瓜苏港、企图抢占巴拉圭战后真空地带的巴西垦殖者。他们正虎视眈眈盯着战争中遭驱逐或屠杀农民留下的土地。\n\n“德·巴罗斯先生，我谨代表我国人民，再次感谢您帮助巴拉圭挣脱法西斯铁蹄。”拉莫斯的葡萄牙语相当流利，想必早有充分练习。\n\n阿德马尔本可以推诿说别谢我，并非己意。早在他当选前，华盛顿和巴西军方高层就已策划好与FULNA合作的方案。洛特将军亲力亲为，处处插手，仿佛这位英雄还嫌建功立业的机会不够多。阿德马尔不过是在军火交易和重建合同中看到了牟利良机。当然，他乐见自己被视为新自由主义巴拉圭的缔造者，但既然要当雇佣兵，总得确保拿到真金白银。"
 LATAM_ParaEpilogue_LIB.3.a: "“没事。”阿德马尔答道。"
 LATAM_ParaEpilogue_LIB.4.t: "边陲人生"
 LATAM_ParaEpilogue_LIB.4.desc: "何塞·法里亚斯·科埃略望着远处熊熊燃烧的谷仓。火光炙亮如日，数公里外都清晰可见。基本每隔几天，就有新的意外：被割破的轮胎、砸碎的窗户，如今竟发展到纵火。巴拉圭远非他当初想象的农业乐土。\n\n在巴西老家，物价飞涨，大地主们不断兼并土地，将小农挤出市场。巴拉圭则不同，这里的许多地主或因破产，或在战争中逃离乡间，留下大片土地。只要手头有点硬通货的巴西人都能买下。他几乎一夜之间就举家搬迁，拿下的农场比老家的大五倍。劳作虽辛苦，但这里物价低廉，市场广阔，甚至余下了雇帮工、买新拖拉机的钱。换巴西老家，此等奢侈想不敢想。\n\n然而，原先这里耕作的农民对买下土地的巴西人满怀怨恨。何塞合法购买的事实不重要，他只为养家糊口的初衷不重要，就连他主动雇佣这些农民的好意也不重要。在他们眼中，他不过是条“窃取”土地的巴西狗。\n\n谷仓在火光中化为灰烬，何塞阴沉着脸接受这又一桩邻里妒忌的恶果。当局能否及时处理，还得打个问号。此刻，唯一能依靠的只有腰间那把左轮手枪。当他握紧枪柄，手指摩挲扳机时，冰冷的钢铁带来些许慰藉。下次那些害虫再敢踏足他的土地，定要他们付出惨痛代价。何塞为这片新天地付出了一切，若这些暴徒妄想夺走自己乐土……"
 LATAM_ParaEpilogue_LIB.4.a: "……那先得趟过他怒火浇筑的地狱。"
 LATAM_ParaEpilogue_LIB.5.t: "战事余波"
 LATAM_ParaEpilogue_LIB.5.desc: "诺尔贝托·奥德布雷希特感到胃里的烤牛肉正在造反，便浇下红酒平定风波。他自然是赢了，但当一阵烧心感涌上胸口时，就想起来所有战争都有牺牲。\n\n泛美航空的班机还有十分钟降落。诺尔贝托望向窗外，大豆田连绵不绝，待摘的白棉朵点缀其中。这都是他的杰作。亚松森战役后的巴拉圭满目疮痍，而政府若要重建残垣的就得仰仗他这样的投资者提供资金与建筑专长了。官僚个个短视，唯有市场和远见者才能真正成事。世界的法则向来如此。\n\n舱内广播沙沙作响，提醒乘客即将着陆——机场同样是他的功绩。在诺尔贝托到来之前，没人把巴拉圭视为投资热土。如今，距首都仅数英里的西尔维奥·佩蒂罗西国际机场已成为航空枢纽，从美国来的旅游航班到出口货物的货运飞机络绎不绝。曾经的亚松森无人问津，如今却成了银行家与体育场馆投资者的淘金地。在这片苦难深重的土地上，如今汇聚着医生、律师、工程师——所有头脑与野心兼备的精英。\n\n膨胀的银行账户已是回报，但诺尔贝托深知，他也在为巴拉圭人民、为全世界谋福祉。"
 LATAM_ParaEpilogue_LIB.5.a: "飞机落地的冲击让胃里的牛肉最后反扑了一下，诺尔贝托不禁悲叹道：这场战役尚未落定。"
 LATAM_ParaEpilogue_LIB.7.t: "运转世界"
 LATAM_ParaEpilogue_LIB.7.desc: "车队驶离亚松森城区，埃德娜·洛特副总统骤然感受到气氛的变化。这座不久前还是废墟的新生首都令埃德娜窒息：从航站楼到林荫大道，再到满是美巴商品店铺的富人区，她知道这一切都是由阿德马尔及其党羽的脏钱堆砌而成。除了隐匿穷人的贫民窟，整座城市都散发着阿德马尔的气息。这一切都令她深感苦闷。\n\n“回国后请务必代我感谢德·巴罗斯先生，副总统女士。”埃德娜从窗外收回视线，看向巴拉圭新总统古斯塔沃·冈萨雷斯唇上怯懦的微笑。刚就职的总统有着老派绅士的样貌，但西装却松松垮垮，仿佛体重骤变。\n\n“一定转达，总统先生。”埃德娜回以微笑，“感谢您带我参观郊外——我在报纸上读过战争报道，但亲眼看看解放阵线当年的真实驻地肯定大不相同。”\n\n冈萨雷斯干笑两声：“别抱太高期待。不过是首都最后攻势时挖的战壕，那会城市都快被丛林吞没了。不过，我们彼此的手下都觉得那里适合拍照。”他转向窗外无边的棉田继续道：“您觉得这些人仍像莫里尼戈时代那样劳作合理吗？仿佛战争从未发生。总统椅子还没坐热，党魁们就急着表态反对土改。谁在背后撑腰，我心知肚明。老一套了，不是吗？”\n\n那种古怪感受如毯子般包裹着埃德娜。冈萨雷斯投来同情的目光——不知是在怜悯她，还是怜悯自己。"
 LATAM_ParaEpilogue_LIB.7.a: "埃德娜忽然知道这是什么感受了：内疚。"
 LATAM_ParaEpilogue_LIB.8.t: "梅洛斯的工事"
 LATAM_ParaEpilogue_LIB.8.desc: "正午的阳光透过瞭望塔后探出，刺得维尔吉利奥·塔沃拉眯起眼睛。铁丝网在热浪中闪烁，军用卡车在基地内穿梭不息。塔沃拉身后，一群勋章累累的将军簇拥着新当选的巴拉圭总统古斯塔沃·冈萨雷斯，个个局促不安，活像等待老师发话的小学生。\n\n“从塔上能看清阿根廷那边的山谷吧？”塔沃拉指了指头顶的瞭望台，另一只手则拿手帕擦拭着额头的汗珠。\n\n“这是我国最先进的侦察设施，”一位军官回答，“阿根廷人在边境踩断树枝都逃不过我们的耳目。”\n\n“这当然就要感谢拉塞尔达总统的友谊与合作，”冈萨雷斯突然插话道，“我意思是，莫里尼戈政权倒台后……巴西的恩情我们没齿难忘。”\n\n塔沃拉看得出这位总统还不习惯卑躬屈膝。他的谄媚既生硬，又带着怨气，反而更显可悲。早在安排冈萨雷斯当选前，塔沃拉就研究过他的档案，对这个改革派的小脾气早有预料。就算此人带着抱负入主总统府，现在也早被自由党中实际大权在握的人掐灭了锐气。\n\n无论如何，塔沃拉对这位傀儡总统毫无怜悯。一个友好的自由派巴拉圭政权对所有人都是最佳结局，包括冈萨雷斯本人，除非他更想面对法西斯或共产党的行刑队。难道巴西还该为做了正确选择而道歉不成？"
 LATAM_ParaEpilogue_LIB.8.a: "弱者定会受苦…"
 LATAM_ParaEpilogue_Illiberal.1.t: "苦难的缩影"
 LATAM_ParaEpilogue_Illiberal.1.desc: "向苦难者伸出援手是功德。当巴拉圭难民逃离战火的消息传来，孔拉多·塔瓦雷斯·吉马良斯第一时间报名参与难民营工作。他早料到情况会很糟，但若能帮上忙，或许上帝会宽恕这个因酗酒毁掉家庭的男人。教会拯救了孔拉多，现在轮到他去拯救苍生。虽不是医生，但他有双能卸货的臂膀。这就够了。\n\n刚抵达难民营，混杂着绝望的汗臭气味就让他几欲呕吐。贫民窟醉宿后醒来，身上就是这股味道，孔拉多可太熟悉了。所谓的住所，不过是几间摇摇欲坠的板房和帐篷，仅少数配有蚊帐；床铺暂时够用，但医务室除了绷带之外几乎一无所有；感谢主，口粮还能准时发放，有些难民正试着在巴拉那河捕鱼。\n\n但被猎取的不止鲶鱼。典当商像鬣狗般游荡，用铜板收购难民所剩无几的家当。“过了这村没这店，爱买不买看着办”的吆喝无处不在。珍贵的相册、褪色的银饰，巴拉圭难民全以十分之一的价格贱卖，只为换些巴西人认可的钞票。\n\n一阵吵嚷吸引了他的注意：三名保安正厉声盘问新来的难民。这些守卫总觉得难民营里混着共党分子，企图越境联络秘密组织；或是法西斯余孽意图颠覆巴西。康拉多暗自揣测，这些守卫里有多少是妄想症，多少是恶霸，又有多少真说对了。"
 LATAM_ParaEpilogue_Illiberal.1.a: "他祈求得到帮助他人的力量，又能避免自己陷入同样的绝望。"
 LATAM_ParaEpilogue_Illiberal.2.t: "革命将至"
 LATAM_ParaEpilogue_Illiberal.2.desc: "托尼·波懒散地倚在车前盖上，车头大灯将林间空地照得雪亮，活像什么不法勾当的现场。二十来个汉子在他面前列队，其中既有巴拉圭流亡者，也不乏外国佣兵、亡命之徒。有人像是刚从亚松森的公交车上下来，也有人看着就有故事，比如那个绰号“保罗”的亚裔男子：老兵眼神、肋插短刀，葡萄牙语磕磕绊绊、惹人侧……办事还是得开放心态。\n\n那位指挥官却毫不掩饰轻蔑。“怎么样？”顶着油光锃亮炮弹头的啤酒肚男人靠在车左侧咧嘴一笑，“莫里尼戈的残部、解放阵线精锐，还有些……特色人才。想要第三纵队？这不就齐活了。”\n\n“他们会打架，可会打仗吗？”戴着宽檐帽的巴西线人站在右侧，一脸冷漠地指点：“他行，那个也行，或许再加上他，但能成建制作战吗？要是再遇上瓜伊拉那种遭遇战，这帮人最好能应付得来。”\n\n波察觉身旁两人又要呛火，抬手制止。“你们只需要服从命令。”他十指交叉前倾说道，“我是这儿的话事人。这些人要随时准备南下突袭。继续招兵买马，能跨境弄来多少算多少。万一巴西再开战端，我们需要预备队填线。”\n\n从空地俯瞰山谷，带刺铁丝网和巴拉圭边检站十分平静，浑然不觉夜色下密谋的众人。雨林在车灯下映出模糊的轮廓，蟋蟀声此起彼伏。“匡提科基地在这项行动上押了重注。”波的烟头在黑暗中跳动，“只要保持潜伏待命，让共产党疲于奔命，我的雇主们就会满意。”"
 LATAM_ParaEpilogue_Illiberal.2.a: "波起身整了整领带，阔步走向驾驶位的车门：“诸位，你们可不会想惹我雇主发火的……”"
 LATAM_ParaEpilogue_Illiberal.3.t: "价抵千言万语"
 LATAM_ParaEpilogue_Illiberal.3.desc: "军车呼啸而来，停在灌木丛生的道路中央。接着，后排士官一声令下，士兵们鱼贯而出。躲在灌木丛中的罗伯托屏息观察着。虽然附近的瓜伊拉瀑布声掩盖了大部分对话，但依然能听出他们说的是西班牙语而非葡萄牙语。他们是巴拉圭人。罗伯托唯一的武器，就是刚才听到动静时随手抓起的田间锄头。\n\n这时，他想起挎包里的东西，便缓缓伸手取出相机，对准最近的士兵和运载他们的卡车。瀑布声完美掩盖了快门声响。\n\n当罗伯托将相机塞回包中时，不慎碰响了树枝。他屏息看着一名巴拉圭士兵缓缓转向灌木丛。该撤了。\n\n他们还没发现他，但继续躲藏迟早会暴露。罗伯托先悄声挪出灌木丛，踏上草地后立即拔腿狂奔。\n\n冲进家门后，罗伯托急忙抄起电话听筒报警，几乎扯断电话线。警察或许能联系军方。"
 LATAM_ParaEpilogue_Illiberal.3.a: "当天下午，这些照片已经交到巴西军方手中。"
 LATAM_ParaEpilogue_Illiberal.4.t: "瓜伊拉瀑布敌占报告"
 LATAM_ParaEpilogue_Illiberal.4.desc: "[BRA.GetLeader]总统：\n\n1200时，巴拉圭陆军部队占领了瓜伊拉瀑布周边部分争议地带。鉴于巴西在该地区军事存在有限且人口稀疏，可确认此次行动未造成人员伤亡。不过，当前局势需要巴西利亚方面立即作出反应，以防巴拉圭进一步几激化事态。\n\n您必然清楚，瓜伊拉瀑布周边区域历来是巴-巴两国世代矛盾的焦点。作为世界著名自然奇观之一，其不仅是南美民众严重的瑰宝，两国更是将其视作民族骄傲。数个世纪以来，瀑布区始终是两国间的天然边界地带。\n\n巴西传统上对瓜伊拉采取中立区政策，既为保护自然景观免受破坏，亦为避免两国政治争端波及该地。然而，巴拉圭历来主张对该区域拥有主权，自巴拉圭战争（1864-1870）以来的历次冲突更使外交谈判长期陷入僵局。此次侵略行为很可能与巴拉圭企图开发瀑布水电资源有关，而此前该计划由于阿根廷的强烈反对而未得实施。\n\n应对危机的决策权完全在您手中。依据国际法，对巴拉圭侵略采取军事报复具有正当性，通过美洲国家组织协商达成和解亦属可行方案。我们将关键决断权交由您，相信您会以应有的审慎态度处理此事。"
 LATAM_ParaEpilogue_Illiberal.4.a: "看来要来点幕后操作了……"
 LATAM_ParaEpilogue_Illiberal.4.b: "在华盛顿特区安排召开美洲国家组织峰会，必须尽力避免战争。"
 LATAM_ParaEpilogue_Illiberal.4.c: "派陆军进驻瓜伊拉。正如哈里·杜鲁门说过：“责无旁贷”。"
 LATAM_ParaEpilogue_Illiberal.4.d: "保持沉默，随机应变，让世界舞台回应巴拉圭的侵略行径。"
 LATAM_ParaEpilogue_Illiberal.5.t: "瓜伊拉瀑布条约成功签署"
 LATAM_ParaEpilogue_Illiberal.5.desc: "今日从华盛顿传来重大消息：巴西就巴拉圭占领瓜伊拉瀑布所引发的危机斡旋取得成功。经过数日在美洲国家组织总部的紧张谈判——主要由巴西代表阿劳若·卡斯特罗与巴拉圭代表胡安·普拉特主导——巴拉圭领导层正式同意从瓜伊拉撤军并启动复员程序。\n\n除巴西、巴拉圭和美国外交官的共同努力外，令人意外的是，阿根廷驻OAS使团在此次和平解决中发挥了关键作用。尽管布宜诺斯艾利斯当局素来反对巴西的外交政策，但此次却成为《瓜伊拉瀑布条约》的重要促成者。该条约不仅明确了瓜伊拉地区的法律地位，更包含允许巴拉圭在该地建设水电站的条款（阿根廷代表团对此条款选择保持沉默）。\n\n无论阿根廷参与OAS峰会的真实意图为何，此刻都可能成为南美外交史上的分水岭。在南锥体国家延续数代人的敌对之后，或许各方终能超越意识形态分歧达成互利协议，为拉丁美洲的未来开辟更富希望的新道路？"
 LATAM_ParaEpilogue_Illiberal.5.a: "南美诸国的命运理应更好。"
 LATAM_ParaEpilogue_Illiberal.6.t: "海陆饕餮"
 LATAM_ParaEpilogue_Illiberal.6.desc: "奥尼肖勒姆酒店的餐厅人声鼎沸，交谈声彼此交融。巴西驻美洲国家组织代表阿劳若·卡斯特罗似乎是唯一独坐餐桌的人。他看了看手表——胡安·普拉特到底死哪去了？这个巴拉圭代表二十分钟前就该到了，说好要共进海鲜牛排大餐庆祝瓜伊拉瀑布条约签订，连珍藏的葡萄酒都——\n\n“卡斯特罗，我们得谈谈。”普拉特像幽灵般突然出现，瘫坐在椅子上，“阿根廷人要求我们退出条约。”他抓起面前的玻璃杯猛灌几口水，抹了抹嘴，“除非我们修改条款。”\n\n“修改？他们到底想干啥？”卡斯特罗难以置信地反问，“我们连驻军都撤了，难道他们还想彻底解决整个边境争端？”普拉特摇了摇头。\n\n“阿根廷方面要求对于瀑布水坝建设的话语权。”普拉特见卡斯特罗眯起眼睛，便补充道，“没错，这意味着他们要求巴拉那河流域。他们说这关乎战略利益。”普拉特叹息着摇头，“抱歉，卡斯特罗，这事确实难办。”\n\n卡斯特罗双唇紧抿。“我得向巴西利亚汇报。不过……”他苦笑着转动酒杯，“我想我早知道总统会怎么看待这事。”"
 LATAM_ParaEpilogue_Illiberal.6.a: "“我不觉得他想自找麻烦。”"
 LATAM_ParaEpilogue_Illiberal.6.b: "“他一滴河水都不会让出去的。”"
 LATAM_ParaEpilogue_Illiberal.7.t: "水祸"
 LATAM_ParaEpilogue_Illiberal.7.desc: "当侦察兵报告巴拉圭人正在撤退时，雷耶斯上尉的思绪还沉浸在远处的水流声中。尽管仍处于高度戒备状态，他却连举起无线电的力气都快没了。不久前，这片区域还是巴西陆军阻击巴拉圭推进的血腥战场。但最近几周，枪炮声逐渐平息，只剩下诡异的寂静与挥之不去的无聊感，偶尔只有远处零星几下步枪声打破沉默。\n\n雷耶斯下令侦察班撤回基地后，扫视着驻扎在瓜伊拉瀑布边境的连队营地：炮兵阵地、狙击塔、泥泞战壕和沙袋堆，这就是他和士兵们的整个世界。然而任凭军用装备如何林立，雨林的壮美始终未减分毫，战乱与否皆是如此。\n\n所有人都听说了美洲国家组织的调停，猜测停火在即。结束战斗固然可喜，但条约的缺失意味着后患无穷。雷耶斯的排奇迹般地无人阵亡，但前线南段的部队就没这么幸运了，更别提停火后巴西利亚那些政客的操盘如何落空。\n\n不过，雷耶斯本人倒不太在意。士兵们疲惫不堪，这是战争永恒的主题。他的排里既有放荡不羁的民族主义者，也有悲天悯人的社会主义者，但都同样炽烈地爱着祖国。而此刻，他们只为能回家而庆幸。\n\n在会见军需官规划撤军事宜前，雷耶斯望向远方的瀑布。在会见军需官部署撤退事宜前，雷耶斯的目光不由自主地投向远方的瀑布群。伫立于广阔南美大地上，印证着自然之瑰丽的丰碑，无时不刻都在提醒着人类无论肉体或志向都是何等渺小。愚钝的战火只消一时便随风而逝，而瀑布终究屹立于此。"
 LATAM_ParaEpilogue_Illiberal.7.a: "雷耶斯百无聊赖地搅动着嘴里的嚼烟，目光游移不定。胸中这股郁结之感，竟透着几分诡谲的熟稔。"
 LATAM_ParaEpilogue_Illiberal.8.t: "下一场冒险"
 LATAM_ParaEpilogue_Illiberal.8.desc: "诺尔贝托·奥德布雷希特和他的地质工程师团队跟着两名向导穿行在丛林小径中，不断拍打蚊虫、抱怨潮湿闷热的天气。路程遥远，众人也是对彼此颇有忌心：阿根廷和巴西的工程师们互相投以怀疑的目光，有人甚至公开指责对方是来窃取商业机密、破坏联合项目的工业间谍；所有人都对那两位巴拉圭向导保持警惕，坚持要派人监视，生怕被引入游击队的埋伏圈。\n\n诺尔贝托对这些无谓的猜疑不以为意。根据《瓜伊拉瀑布条约》，这里将兴建一座大型水电站，不仅能解决巴拉圭的电力短缺问题，还能为整个巴-巴边境地区供电。他有足够的人脉确保拿下工程合同，也有的是办法让反对者闭嘴，只欠条约能够顺利执行。投资有风险，这回可能损失数百万启动资金，也可能在丛林深处中弹身亡。但不入虎穴，焉得虎子？畏首畏尾可成就不了今天的商业帝国。\n\n“快到了，先生们。很快你们连水壶都用不上了，”其中一位向导说道。诺尔贝托记不清他的名字，只记得另一个向导叫罗伯托。\n\n“你最好说的是实话，奥德布雷希特先生。我们可找不到回去的路，更不想和这些阿根廷混球分享补给。”诺尔贝托的助理满头大汗、脸色通红地抱怨道，声音大得有些失礼。这时，那位不是罗伯托的向导吹口哨打断了他们。队伍加快脚步向林间空地走去。\n\n眼前的景象美得超乎诺尔贝托的想象。奔腾的瀑布激起层层水雾，为燥热的众人带来阵阵清凉。有人情不自禁地摘下帽子，那位不是罗伯托的向导迅速在胸前画了个十字。就连一向精于算计的诺尔贝托也暂时忘记了利润盈亏，只是出神地凝视着这座即将因他的水坝而消失的自然奇迹。"
 LATAM_ParaEpilogue_Illiberal.8.a: "众人并肩伫立，忘却了国仇家恨，因自然之鬼斧神工于此齐心。"
 LATAM_ParaEpilogue_Illiberal.9.t: "值得效仿之图谱"
 LATAM_ParaEpilogue_Illiberal.9.desc: "午后阳光穿透云层，与众人一道默默注视着瓜伊拉瀑布内海上一座小岛。这里，正在上演历史性时刻。巴西总统阿德马尔·德·巴罗斯与巴拉圭总统[PAR.GetLeader]在两国代表团的见证下，共同签署了重新划定边界的条约。\n\n签字仪式露天举行，一张硬木桌被特意安置在人群中央。当德·巴罗斯率先签下名字后，[PAR.GetLeader]将文件高举向天空，随后与巴西总统握手致意，现场响起经久不息的掌声。\n\n尽管这被视为两国共同的外交胜利，但观察家们指出，此事完美体现了德·巴罗斯“交易型外交”政策的成功。显然，巴西民粹主义社进党政府上台所带来的政坛变革，预示着这个国家正在迈向更光明的未来。至少，在外交领域是如此。"
 LATAM_ParaEpilogue_Illiberal.9.a: "对外不进步，对内无安稳。"
 LATAM_ParaEpilogue_Illiberal.10.t: "瀑布纷扰"
 LATAM_ParaEpilogue_Illiberal.10.desc: "瓦斯科·莱唐·达·库尼亚站在阴云密布的天空下，感受着巴拉圭总统[PAR.GetLeader]握手的温度，远处瓜伊拉瀑布的轰鸣化作背景音。他们站在争议区的小岛上，露天摆放的桌椅见证了两国领导人正式确认国际社会认可的巴-巴新边界。\n\n外界自然好奇为何由达·库尼亚代表巴西方面出席。毕竟，最终同意条约的是拉塞尔达总统，而他以国务繁忙为由缺席。不过，达·库尼亚心知肚明：拉塞尔达实则是被迫接受这项向“亚松森法西斯政权”割让土地的条约。\n\n抛开隐含的政治目的，达·库尼亚对此次行程颇为满意。借着与南方邻国维持稳定外交关系的名头，他才能飞来欣赏这片自然奇观。瓜伊拉瀑布的激流永不停歇，而与巴拉圭要员的午餐会，正好给了双方静观这片奇迹之地的借口。"
 LATAM_ParaEpilogue_Illiberal.10.a: "达·库尼亚暗忖，改日定要向总统推荐这瓜伊拉瀑布作为休假胜地。"
 LATAM_ParaEpilogue_Illiberal.11.t: "萨加拉纳行动"
 LATAM_ParaEpilogue_Illiberal.11.desc: "巴西利亚的作战指挥室内，卡洛斯·德·梅拉·马托斯伫立在桌旁，俯视着沙盘。\n\n“坦克部队呢？”将军发问。\n\n“丛林太密，几乎没有突破口。”元帅回答。\n\n“波的部队呢？”将军继续追问，“那些美国训练的巴拉圭民兵游击队——”\n\n“不行。”马托斯挥手否决，“我们在瓜伊拉吃过苦头，更早的丛林战争也是教训。”\n\n“那怎么办？”元帅问道。\n\n“渗透。”马托斯指向前面的地图，“派特种部队从西翼穿插。”\n\n“玻利维亚边境附近？”将军摩挲着下巴，“那边的防御工事主要朝西，北面薄弱。”\n\n“所以巴拉圭师团部队一般都向中东方向部署，”元帅补充道，“西侧防御空虚。”\n\n“突袭能减少伤亡。”马托斯继续分析，“敌军遭遇伏击后，必然后撤。这样就能迫使其指挥部抽调中部防线兵力来重组防线。”\n\n元帅目露赞许，将军神色满意，而马托斯只允许自己此刻流露一丝克制的释然。"
 LATAM_ParaEpilogue_Illiberal.11.a: "还得去打赢这场仗呢。"
 LATAM_ParaEpilogue_Illiberal.12.t: "穿越丛林"
 LATAM_ParaEpilogue_Illiberal.12.desc: "卡洛斯·德·梅拉·马托斯指挥官抬手遮挡飞溅的水雾——前进基地距离瓜伊拉瀑布底部的漩涡仅数公里，这座如基督像般神圣巍峨的自然奇观正以庞然之姿笼罩着他们。奔腾的水声震耳欲聋，仿佛置身疾驰的火车头旁，虽给战场通讯带来困难，却为即将展开的行动提供了天然掩护。\n\n巴西陆军参谋部已批准“萨加拉纳行动”：一支特种部队将渗透巴拉圭在玻利维亚边境的防线，以期撕裂战线迫使敌军后撤。这支精悍的小分队机动性强，且深谙地形——在这片遮天蔽日的丛林里，这正是最稀缺的优势。\n\n当雷耶斯前来复命时，马托斯仍被瀑布的雄姿分去半分心神。士兵们整装待发，侦察兵确认巴拉圭军毫无察觉。在这般茂密的丛林中，情报本就零散不全，行动成败或许全凭天意。预备队已就位以防局势升级，现在只等指挥官下达最后进军令。\n\n马托斯微微颔首，雷耶斯便率部隐入莽莽丛林。浓荫如幕，吞噬了他们的身影。"
 LATAM_ParaEpilogue_Illiberal.12.a: "切勿回首。"
 LATAM_ParaEpilogue_Illiberal.13.t: "闭眼，瞄准"
 LATAM_ParaEpilogue_Illiberal.13.desc: "几个小时过去，雷耶斯依旧盯着那个目标人物，仿佛眼球焊在了瞄准线上。他肩膀抵着枪托，整个世界收缩成准心里的方寸之地。碉堡闷热如烤箱，混凝土墙完全挡不住丛林酷暑。这工事当初为阻击巴拉圭撤退而建，如今反倒成了他们的噩梦。\n\n当巴西海军陆战队从林线杀出时，突袭策略确实奏效了。巴拉圭守军的防御工事比情报显示的更完备，战斗很快演变成拉锯战。推进、固守、溃退、再推进，战线像节拍器般来回摆动。不过，每次雷耶斯带队冲锋，敌军的阵地就松动一分。\n\n直到预备队赶来增援，巴拉圭军才终于弃守工事，向南面数公里外的防线撤退。几小时后，远方又传来哨声，敌军再次后撤。当那个被锁定多时的目标开始移动时，雷耶斯突然喝令：“停火！”他揉着酸胀的眼睛，长时间不眨眼的盯梢让眼球刺痛。今天对双方都是场煎熬，何不给敌人留些舔伤口的余地。"
 LATAM_ParaEpilogue_Illiberal.13.a: "雷耶斯瘫坐在地上，拉下帽子长出一口气：“给马托斯发电：巴拉圭人撤退了。”"
 LATAM_ParaEpilogue_Illiberal.14.t: "来之不易"
 LATAM_ParaEpilogue_Illiberal.14.desc: "瀑布的水雾又一次模糊了卡洛斯·德·梅拉·马托斯的视线。瓜伊拉瀑布的激流虽已远在下方，但飞溅的浪花仍能飘上演讲台，轻拂着他的面庞。说到演讲台，这又是拉塞尔达的主意。特地设在胜利之地，就是为了能在历史教科书添上留下痕迹。果然很符合这位总统的作风。\n\n拉塞尔达的演讲已持续良久，马托斯指挥官、雷耶斯上尉及其小队成员作为“萨加拉纳行动”的英雄分立两侧。那些军校里听惯的爱国辞藻如走马灯般轮转：国家、自由、秩序、进步、主权、上帝……然而话锋突然一转。\n\n“但最重要的是！”拉塞尔达猛捶讲台，声如惊雷，“让每个殁命于军队脚下的生灵都成为警醒世人的血碑！法西斯主义休想在此立足！休想毒害我国同胞！让这场胜仗化作利剑直指苍穹，沐浴主的荣光！唯有以秩序与进步之主权的名义，才能将法西斯理想彻底铲除、净化，必要时定将其灰飞烟灭！”\n\n马托斯几乎惊掉下巴。震惊之余，他眨了眨眼，看向正狂热欢呼的人群。指挥官瞥向雷耶斯，想确认刚才那番话是否真如听起来那般疯狂。上尉的反应虽更克制，但促狭的眼神表明马托斯并非唯一察觉异样的人。他知道拉塞尔达对巴拉圭有心结，可如此激烈的言辞还是过头了。\n\n当马托斯转回视线时，总统正朝他走来。他立即整肃军装，敛去忧虑神色。拉塞尔达仍因激昂演讲而气息不稳，眼中跳动着肾上腺素激起的火花，此刻又恢复了政客的娴熟作派：“为表彰卓越的指挥领导才能，授予其桑托斯-杜蒙特功绩勋章。祝健康常胜！”\n\n“健康常……”马托斯低声道。"
 LATAM_ParaEpilogue_Illiberal.14.a: "总统为自己别胸前的勋章打断了马托斯。台下响起些许掌声，与瓜伊拉瀑布的轰鸣交织在一起。"
 LATAM_ParaEpilogue_Illiberal.15.t: "胜利背后的图谋"
 LATAM_ParaEpilogue_Illiberal.15.desc: "雷耶斯是被马托斯指挥官硬拽来参加这场仪式的。比起政治作秀，他更乐意补个觉。此刻他站在观礼台上，脚下正是当初他和弟兄们差点用命换来的要塞。如今这里为拍照精心布置过，只剩远处瓜伊拉瀑布的轰鸣还在提醒着丛林原本的野性。\n\n阿德马尔·德·巴罗斯比油污还滑腻，毒性也不遑多让。在随从簇拥下，一头灰发的总统微笑着向欢呼人群挥手致意，登上了演讲台。雷耶斯和他的队员们与马托斯指挥官并列站在后方，接受这位总统对“萨加拉纳行动”的表彰。不过，动机恐怕就没那么高尚了。\n\n“承蒙全能上帝恩典！”德·巴罗斯高声道，“烈日当空，英勇的陆军将士已将入侵者逐出我们世代生活的土地！正如‘烟蛇’部队曾在不列颠抗击轴心国，萨加拉纳行动的男儿们也证明了自己是巴西与暴政浪潮斗争中的排头兵！”\n\n德·巴罗斯转向马托斯和雷耶斯，话筒紧贴嘴边：“愿今日之后，全国军民都以诸位的奉献精神为楷模。让普通士兵的牺牲成为同胞的榜样。你们，比任何人都更配称为这个国家跳动的心脏与燃烧的灵魂！”\n\n总统快步走向列队的士兵，希望他没注意到雷耶斯听到这番说辞时挑起的眉毛。当德·巴罗斯挨个授勋向雷耶斯走来时，这位上尉的思绪又飘远了。就算总统裤裆里杵着门火炮，这番演讲也不可能把军队崇拜演绎得更露骨了。可真了解他的统治基础啊……雷耶斯在心底讥讽道。"
 LATAM_ParaEpilogue_Illiberal.15.a: "巴托洛梅乌·德·古斯芒勋章别在了雷耶斯上尉的胸前，而他始终小心翼翼地保持着庄重神色，将那份暗自发笑的冲动掩藏得滴水不漏。"
 LATAM_ParaEpilogue_Illiberal.16.t: "警惕的代价"
 LATAM_ParaEpilogue_Illiberal.16.desc: "“别看是我们就拐弯抹角了，”卡洛斯·德·梅拉·马托斯沉声道，“告诉我，全军覆灭了吗？”\n\n“暂时还没，但也快了。”少校面色凝重，“我方正在全力周旋，但巴拉圭人也毫不让步。”\n\n[BRA.GetLeader]颓然撑在作战室桌上：“怎么会这样？！”\n\n军官摇头：“巴拉圭守军据点固若金汤，暴露后根本无路可退。雷耶斯小队正在殊死抵抗，但恐怕支撑不了多久。”\n\n“能撤出来吗？”总统紧盯着军官追问。\n\n“大规模撤离必会惊动亚松森方面。”军官摩挲着下巴，“敌军防御工事太完备了。”\n\n“空军可以提供轰炸掩护。”马托斯始终直视总统，抿嘴说道，“但可能激化局势。”\n\n[BRA.GetLeader]迎上马托斯的目光：“最优方案是？”\n\n马托斯强忍咬牙的冲动：“雷耶斯他们出发前就清楚风险，就像每次行动一样。巴拉圭人明白自己的行动已践踏国际法底线，或许轰炸能迫使其退缩……”他顿了顿，“不过希望渺茫。”\n\n“总统阁下。”少校指挥官请示道，“空军已完成加油，随时准备升空。您的决断是……？”"
 LATAM_ParaEpilogue_Illiberal.16.a: "“下令撤退，让救援小队准备接收伤员，不过让空军继续待命。”"
 LATAM_ParaEpilogue_Illiberal.16.b: "“派出空军支援，掩护雷耶斯小队撤退。别管后果了！”"
 LATAM_ParaEpilogue_Illiberal.17.t: "谴责"
 LATAM_ParaEpilogue_Illiberal.17.desc: "“阿根廷外交部谴责瓜伊拉瀑布袭击事件！”雷耶斯上尉扫过报纸头条，嗤笑一声，“维埃拉，过来看看这个。”\n\n维埃拉中尉凑近报纸：“他们竟说我们威胁世界和平。”\n\n雷耶斯用拇指戳着谴责声明，把报纸甩给下属：“阿根廷人什么时候在乎过和平？这烂摊子就是他们漠视纵容的！”\n\n维埃拉扶了扶眼镜细读报道。“您觉得这有意义吗？”他从报纸上方抬眼问道，“那些阿根廷佬就爱打嘴炮。”\n\n语罢，他把报纸递回去：“照我看，他们无非派几架战机边境巡逻，开几辆坦克到口岸转悠，月底前肯定全部撤回。：\n\n“知道我怎么想吗，维埃拉？”雷耶斯点上根香烟，“这是个信号。”他深吸一口，用烟头点着报纸，“虚张声势的信号。就算我们杀进国会大厦，他们外交部也只会发声明谴责霸凌行径。”"
 LATAM_ParaEpilogue_Illiberal.17.a: "二人开怀大笑。"
 LATAM_ParaEpilogue_Illiberal.18.t: "哀叹瓜伊拉"
 LATAM_ParaEpilogue_Illiberal.18.desc: "“卡洛斯·拉塞尔达是个战争狂，还是个蹩脚的战争狂。”《最后时刻报》的头版标题直刺维尔吉利奥·塔沃拉的双眼。这位副总统平日绝不碰魏纳的垃圾小报，就怕那些激烈论调坏了晨间咖啡的兴致。今早他破例了，此刻已追悔莫及。\n\n魏纳矛头直指高原宫内塔沃拉同僚口中的瓜伊拉瀑布“事件”，将其比作“野心堪比耶路撒冷十字军东征，结局却如乌迈塔围城战般惨败的蠢计”。拉出巴拉圭历史上另一场最著名的战争作比，这记历史耳光甩得格外响亮，直戳痛处。\n\n但文章真正掷地有声的是对资源浪费的控诉：“这本该是造福数百万巴西人，以及战后巴拉圭人的革命性能源工程，国家民主联盟政府却把士兵当炮灰。更可悲的是，拉塞尔达一事无成。工程师该出现的地方，如今只余鲜血。”塔沃拉浑身肌肉都在抗拒，却不得不承认此言非虚。\n\n平心而论，副总统本人也非行动支持者。他曾在最高会议厅恳求同僚至少约束军事行动规模。但此刻，他满脑子都是已成定局的灾难。全国都将读到瓦伊纳之流的檄文，而他在其中的角色，以及党派对必须面对现实的拉塞尔达的责难，才是真正的风暴中心。"
 LATAM_ParaEpilogue_Illiberal.18.a: "瞎猫还能撞见……唉，不说了。"
 LATAM_ParaEpilogue_Illiberal.19.t: "巴西病夫"
 LATAM_ParaEpilogue_Illiberal.19.desc: "阿德马尔政权又给伟大的巴西带来了新一天的荒唐闹剧。听闻巴西陆军在瓜伊拉瀑布被迫上演那场耻辱性撤退，拉塞尔达的嘴角不禁露出一丝讥讽的微笑。几乎能想象高原宫里此刻的鸡飞狗跳。如此遐想，令他莫名愉悦。他翻阅着几小时前收到的战报，披着睡袍走向打字机，决定为这场闹剧添把火。\n\n“阿德马尔·德·巴罗斯总统放任我国最重要的安全支柱蒙受如此羞辱，再次证明他是个优柔寡断之人，是个顽固不化的恶人。既不懂外交，也不谙军事。或许在某些人看来，根本是叛国者。”\n\n纸张翻动的沙沙声伴着思绪流淌。“作为巴西人民的代表，尤其身负总统殊荣者，竟在自取灭亡的巴拉圭法西斯分子面前如此不堪一击……”\n\n确实，连拉塞尔达都未料到溃败来得如此突然。但杰作往往诞生于意外，他岂会放过这个制造恐慌的良机？\"“……就像黑帮收买球员踢假球，我们的总统不仅在智力上暴露无能，更在道德上自证卑劣。他腐败成性，急不可耐地将祖国贱卖给巴拉圭乡巴佬，充分证明根本不配执掌权柄。”"
 LATAM_ParaEpilogue_Illiberal.19.a: "“社进党必须下台，否则全巴西将为其蒙羞。”"
 LATAM_ParaEpilogue_Illiberal.20.t: "交易之道"
 LATAM_ParaEpilogue_Illiberal.20.desc: "“这场冲突当真必要吗？我国从未反对巴拉圭维护国家安全的正当权利。你们浪费精锐部队争夺这片无主之地，难道合作共赢竟比流血烧钱更不可接受？”向来温和的莱唐·达·库尼亚此刻也难掩愠怒。他的提案屡屡被巴拉圭代表团无视。那些暗含讥讽的刁难与几乎不加掩饰的轻蔑，等钱到位了才暂时噤声。\n\n瘦高个子的团长终于首次严肃表态：“这是场血腥闹剧，但高原宫若拿不出实质方案就指望我们妥协……”话音未落，他那位圆胖同僚的尖嗓门就压过了相对克制的反驳：“我们的方案是全面接管瀑布管辖权，最好要……”\n\n外交部长敏锐地捕捉到转机，立即打断这通胡言，重新展开诱导提问：\"这片瀑布对贵国能值几个钱？唯有借助巴西的雄厚资源，我们才能开发这片蛮荒之地。商业流通会让你们满意，而枪炮只会让一切完蛋。”\n\n一阵含糊的嘀咕过后，代表团突然齐刷刷转变态度。瘦高团长在斯特罗斯纳政权严苛授意下，竭尽所能斟酌词句：“我军将在一周内撤离该地区。阿根廷人肯定不会高兴，但拿钱办事天经地义。”"
 LATAM_ParaEpilogue_Illiberal.20.a: "“交易愉快，朋友们。”"
 LATAM_ParaEpilogue_Illiberal.20.1: "§K伊泰普水电站§!即将破土动工。"
 LATAM_ParaEpilogue_Illiberal.20.2: "§K伊泰普水电站§!谈判结果将倾向于我方。"
 LATAM_ParaEpilogue_Illiberal.20.3: "§K伊泰普水电站§!的年度建设进度将有所提升。"
 LATAM_ParaEpilogue_Illiberal.20.4: "§K伊泰普水电站§!的年度建设进度将有所提升。"
 LATAM_ParaEpilogue_Illiberal.20.5: "虽然官方谈判破裂，但我们将确保§K伊泰普水电站§!工程照常启动。"
 LATAM_santa_cruz_fall.1.t: "国民左翼运动：组织概况"
 LATAM_santa_cruz_fall.1.desc: "—机密—\n\n联合民族解放阵线并非一个单一组织，而是由多个特工与利益团体组成的网络，他们因推翻红党政权的共同目标而联手行动。虽然这些团体多数扎根于巴拉圭本土，但其中的“国民左翼运动”却颇为特殊——它的骨干来自玻利维亚东部的圣克鲁斯地区。\n\n国民左翼运动由路易斯·桑多瓦尔·莫龙领导（详见第5页）。他曾是准军事部队的一员，后来投身革命。被逐出革命民族主义运动的圣克鲁斯分部、眼见该组织蜕变为克鲁塞尼奥革命运动后，桑多瓦尔带着一批志同道合的玻利维亚革命者退入巴拉圭腹地，另起炉灶，组建游击队。他一面在当地反抗阵营中扩张势力，另一面始终维系着与边境彼岸的联系。尽管名义上已归入联合民族解放阵线，桑多瓦尔却对巴西及其在联盟中的介入始终抱有警惕（详见第12—14页）。\n\n来自“查科”与“伊瓜苏”的情报显示，国民左翼运动真正的敌人并非红党政权，而是那个由巴拉圭暗中扶持、在圣克鲁斯扶植的分裂政权。他们的意图，是在未来战事取得进展后，调转矛头清算旧敌（详见第18页）。虽说目前这支力量尚不足以撼动该地区政权的根基，但仍不可掉以轻心。倘若红党政权有朝一日崩溃，圣克鲁斯的政权恐将失去依托，沦为众多破局者的狩猎场。\n\n为简洁起见，内容略有删节。"
 LATAM_santa_cruz_fall.1.a: "未知变量，往往是最危险的存在……"
 LATAM_santa_cruz_fall.2.t: "圣克鲁斯暗流涌动"
 LATAM_santa_cruz_fall.2.desc: "萨尔瓦多从打字机前抬起头。身子微微佝偻，像是被生活一点点压垮，支离破碎——可他甚至还没踏上真正的战场。对他而言，这篇稿子，以及因它而来的麻烦，也许已算得上一场“低烈度冲突”。夜色早已深沉，子时已过，他却仍陷其中，既不能，也不愿就此停笔。他又将稿件从头读了一遍。\n\n《圣克鲁斯暗流涌动：玻利维亚露出獠牙》。标题算不上惊艳，但多少还带点看头，他这样安慰自己。“查科地区陷入诡异的沉寂。物资不再从巴拉圭边境流入。当地人早已明白冲突在所难免，谈论战事时，他们不说‘是否’，而是‘何时’。他们已不会再轻信谎言——无论是来自北方的，还是南方的：战争的晨曦已悄然升起。”\n\n后面的段落便没那么引人入胜了。他一边读着，一边回忆起那些令他难以忘怀的场景：村民眼中的恐惧、政客脸上的漠然……最令他心头发紧的，是那群民兵脸上沉默而决绝的神情。他曾写道，那是一支“注定将与正规军正面对抗的半武装队伍”。想到那次采访，他不由得苦笑。那是他与一名国民左翼运动成员的对话，对方隶属于路易斯·桑多瓦尔麾下。这支准军事武装正谋划着“接管”那些群龙无首的乡村地带。看起来，只要披上“国家”的外衣，有些事做起来便顺理成章。\n\n从某种意义上讲，巴拉圭在那片土地上的存在，本就如危楼将倾，一旦亚松森政权崩塌，那楼自然也会应声而倒——联合民族解放阵线的夺权，不过是对这场崩解的注脚罢了。他至少……——枪声。他猛地俯身，避开那扇窄小的窗户，动作干脆，仿佛手册上教的一般。所幸枪声还远，未及于身。但尽管他总爱把自己形容成一个“孤身奋战”的记者，这场真正的战争却从未留下半点轻松的余地。战争让他感到渺小，也让他肃然。"
 LATAM_santa_cruz_fall.2.a: "战争，从不只是报纸上的文字那么简单。"
 LATAM_santa_cruz_fall.3.t: "圣克鲁斯陷于激进主义"
 LATAM_santa_cruz_fall.3.desc: "绝密\n仅供目视查阅\n呈送巴西联邦情报与反情报局所有成员\n国民左翼运动夺取圣克鲁斯\n\n在经历数日激烈冲突后，玻利维亚城市圣克鲁斯已全面落入国民左翼运动之手。原有政府赖以维系的支持基础，因该地区因石油繁荣而引发的房价飙升与贫富差距扩大，早已动摇。路易斯·桑多瓦尔·莫龙借机升级街头暴力，直至地方政权彻底崩溃。\n\n通过封锁城市主要干道，桑多瓦尔成功拘捕了克鲁塞尼奥政界的大多数人物。他以“回应民怨”与“清算旧账”为名，对昔日政敌实施快速而公开的处决。据我方线人报告，这些政客的配偶亦已接连失踪，被押往不明地点。\n\n目前，国民左翼运动依靠其果断且高压的手段，成功维持了圣克鲁斯及周边区域的秩序。桑多瓦尔在公开讲话中宣称，这场行动是革命民族主义运动“从分裂分子与国家敌人手中夺回圣克鲁斯省”的正义之举。\n\n尽管玻利维亚政府尚未就局势作出正式表态，但据可靠渠道透露，内阁会议已将圣克鲁斯事件列为唯一议题。我方对外交及军事层面的建议，将视拉巴斯最终决策而定。"
 LATAM_santa_cruz_fall.3.a: "暴君掌上了船舵。"
 LATAM_santa_cruz_fall.4.t: "圣克鲁斯重归玻利维亚"
 LATAM_santa_cruz_fall.4.desc: "绝密\n仅供目视查阅\n呈送巴西联邦情报与反情报局所有成员\n国民左翼运动将圣克鲁斯移交拉巴斯\n\n玻利维亚中央政府与路易斯·桑多瓦尔领导的国民左翼运动之间的谈判进展迅速，且几无波折。国民左翼运动已正式将圣克鲁斯的管辖权移交予拉巴斯的革命民族主义运动政府，标志着该省多年事实上的分裂状态告一段落，国家在名义上重新实现统一。\n\n然而，圣克鲁斯的局势并未因此发生实质性改变。拉巴斯方面将桑多瓦尔在该省实施的恐怖统治解读为“爱国举措”，并以其“忠诚”之名，任命其为圣克鲁斯省行政长官。尽管国民左翼运动正逐步并入革命民族主义运动体系，但桑多瓦尔显然依旧掌握着高度自主权，其核心成员亦被安插于多个关键岗位之上。\n\n对于桑多瓦尔的统治以及所谓的“再统一”，虽仍不乏异议之声，然这些声音散乱无力、难以形成规模。旧政权体系已被系统性清洗，其成员配偶的下落更是流言四起，使得任何潜在的抵抗行动皆陷入群龙无首、民心惶惶之境。从目前情势来看，圣克鲁斯在可预见的未来几乎不可能恢复为独立的地缘政治实体。"
 LATAM_santa_cruz_fall.4.a: "南美棋盘上，又少了一枚游离的棋子。"
 LATAM_santa_cruz_fall.5.t: "玻利维亚准备入侵圣克鲁斯"
 LATAM_santa_cruz_fall.5.desc: "绝密\n仅供目视查阅\n呈送巴西联邦情报与反情报局所有成员\n桑多瓦尔掌权或将引发玻利维亚对圣克鲁斯的军事入侵\n\n随着国民左翼运动夺取圣克鲁斯，玻利维亚中央政府与该地区之间的紧张关系骤然升级。拉巴斯方面已正式将该运动的强硬派领导人路易斯·桑多瓦尔·莫龙定性为“叛国者”，并拒绝承认其在圣克鲁斯行使的任何权力。\n\n据我方消息人士评估，玻利维亚-圣克鲁斯之间的军事冲突已难以避免。玻军主力部队已前移至设防边境，且正在大量囤积粮食与医疗物资，迹象表明，拉巴斯方面或正准备发起一场短期但高强度的军事行动。作为回应，桑多瓦尔下令全面动员国民左翼运动，号召党员与支持者“誓死保卫圣克鲁斯”，并宣称将“恢复玻利维亚的正当治理秩序”。\n\n我方情报分析员指出，尽管国民左翼运动部队具备一定的狂热动员能力，但其兵力有限，重型武器匮乏。一旦玻军展开坚定攻势，其防线恐将在数周内告破。值得注意的是，尽管运动在所控区域内施行高压统治，仍有部分反对派残余势力存续，或将成为潜在的“第五纵队”，在战事爆发后于其后方制造混乱。\n\n建议即刻强化该地区边境防线，以应对可能出现的大规模难民潮，并密切监控阿根廷方面的动向。布宜诺斯艾利斯或将在当前局势动荡之际伺机而动，谋求扩大其在该地区的战略影响，从而对我方国家安全构成潜在威胁。"
 LATAM_santa_cruz_fall.5.a: "需要操心的革命分子很快又少一个。"
