 ARG_intel_jose_cornejo_saravia: "何塞·科尔内霍·萨拉维亚"
 LATAM_cayenne.7.t: "那里生活祥和"
 LATAM_cayenne.7.desc: "“总统先生！您这通电话真是时候，”帕克西·让蒂尔·努内斯斜倚着办公桌，一边扇风解暑，“今晚马卡帕有圣保罗交响乐团的演出——”\n\n“音乐是生命的脉搏啊！”阿德马尔用新学的文艺腔截断话头，“就像圣保罗音乐家在美丽的北方找到舞台，每个巴西人都该在更广阔的天地施展才华，你说呢？”\n\n“您这话说得妙极了！”\n\n“在你治理下，阿马帕州欣欣向荣。如今大家都在热议卡宴前景，何不告诉乡亲们，国境线那头机遇更好，我是说土地更多，贷款更优惠，投资也不会落下？当然不必挨家挨户劝说，印些精美海报，电台广播时捎上我的问候就够了。”\n\n努内斯望向窗外蒸腾着热浪的雨林：“顶好的主意，总统先生，可阿马帕地狭人稀，若半数居民北上……”\n\n“我不说过吗？公投尘埃落定之日，你就是卡宴地区的联邦特派员。如何，这可还合你心意？”"
 LATAM_cayenne.7.a: "社进党在北方丛林里也能站稳脚跟了？"
 LATAM_cayenne.8.t: "主菜"
 LATAM_cayenne.8.desc: "“请原谅我的无知，总统先生——但我真没想到在巴西利亚能尝到如此地道的法式焗蜗牛！”美洲国家组织特使热切地说道。阿德马尔用餐巾轻拭嘴角，堆起政客式的笑容，虽说他早已忘记这位食客叫什么。\n\n“亲爱的朋友，”阿德马尔说道，“我定将赞誉转告主厨！这位大师在巴西掌勺已逾二十载。当然，贵方为公投事宜如此尽心，理当享受国宴级款待。\"\n\n“哈哈！这没什么，职责所在罢了。我们不过是确保过程公开透明——投票应当是自由公正的，就这么简单。不像大西洋对岸那些可怜虫，听说主厨的同胞在卡宴过得可不怎么样？”特使的银叉指向厨房方向。\n\n总统微微点头，掩饰着愠怒。他需要美洲国家组织为公投背书，更要掩盖诺拉斯科可能留下的纰漏。但眼前这个扬基佬要么过于天真，要么根本不吃谄媚这套。\n\n或许该试试美元外交？他深知美国人对献金的鉴赏力，只是不确定这位特使是否会把贿赂视作失礼之举。"
 LATAM_cayenne.8.a: "“我完全理解，其实我们很愿意为贵方事业提供一些‘捐助’……”"
 LATAM_cayenne.8.b: "“说真的，这个烤布蕾你必须得尝尝。”"
