 LATAM_bush_war.20.t: "铭记之途"
 LATAM_bush_war.20.desc: "若你问贾伦·苏萨想要什么，从哲学意义上说，他会希望被人铭记。但此刻在U2侦察机驾驶舱里打着哈欠的他，只会说想打个盹。\n\n此刻，他正飞行在菲拉德尔菲亚上空，为巴西的秘密盟友“联合民族解放阵线”收集情报——在这场代理人“丛林战”之中，巴西借其对抗阿根廷支持的巴拉圭军队。小时候，他以为间谍工作会很刺激，但此刻被漆黑夜空与引擎嗡鸣包围的他，只觉百无聊赖。于是，贾伦决定闭眼片刻，小憩片刻安慰自己。\n\n下一秒，他被警报系统的尖啸惊醒：雷达显示有地空导弹袭来。规避不及，导弹击中了U2的机翼。引擎燃起的火光划破遍布乌云的夜空，机身失控旋转着坠向大地。当贾伦的头颅猛烈撞向驾驶舱玻璃时，他未能意识到——也无法再意识到——自己渴求被铭记的愿望即将应验。\n\n可惜对他而言，这份铭记并非作为激励巴西儿童的爱国楷模，而是作为焦黑残骸中一具扭曲的尸体。他的军服与身份牌被反复检视：先是击落他并拍照的炮兵，继而传到猛然惊觉此事意义的巴拉圭将领们手中。"
 PAR_state_2100: "卡瓜苏"