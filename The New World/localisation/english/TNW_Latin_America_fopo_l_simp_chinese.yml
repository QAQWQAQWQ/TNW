 LATAM_andean_bolivian_treaty_text: "阿根廷、巴西与智利再度为瓜分玻利维亚的资源宝库争执不休。巴西和智利正试图蚕食阿根廷的传统利益区以扩张版图，而长期受益的布宜诺斯艾利斯当局则竭力维持现状。\n\n\n在这场南美冷战的新阶段，西装革履的会议室与硝烟弥漫的战壕前线，同样成为了兵家必争之地。"
 LATAM_andean_argfavourstext: "[?global.andean_treaty_arg_favor]"
