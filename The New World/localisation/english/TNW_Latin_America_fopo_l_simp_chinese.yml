 LATAM_bush_war.25.t: "巴拉圭之春"
 LATAM_bush_war.25.desc: "绝密\n仅供总统阅览\n\n巴拉圭政府被推翻，军政府已组建\n\n军事分析人士早已注意到，在所谓的“丛林战争”中，政府的作战能力持续衰退。然而，最近几周，这种控制力已近乎全面瓦解，局势正迅速滑向彻底失控的临界点。起初，联合民族解放阵线仅在农村地区展开持续不断的游击战，但如今，他们已全面掌控战局，迫使大批政府支持者纷纷逃离，叛军现已进入首都亚松森。\n\n现有情报表明，政府失去统治精英与更广泛民众支持的状况，至少已持续数月，甚至可能长达数年之久。巴拉圭经济长期停滞不前，而无力平息叛乱的局面，使得警方与军队残存势力在零星冲突中苦苦挣扎，最终不得不向反叛势力屈服。目前，叛军已宣布全面接管国家政权。\n\n然而，新组建的军政府内部已显现出严重的分裂迹象。一个类似“三头同盟”的联盟已经成立，其中包括：亲巴西的自由派阿尔弗雷多斯·拉莫斯，前革命军将领拉斐尔·佛朗哥，巴拉圭共产党领导人切·格瓦拉。三人各自奉行截然不同的外交立场与政治主张，导致内部矛盾不断激化。据可靠消息来源透露，军政府目前仅召开了一次高层会议，便因激烈的政策分歧发生争吵，不欢而散。会议结束后，三位领导人各自退回了自己在亚松森城内的势力范围。\n\n巴西国家情报局特工已与美方情报机构密切协作，并成功与拉莫斯派系建立了直接联系。双方正在共同努力，确保拉莫斯在这场权力斗争中不惜一切代价取得胜利。然而，同时应对阿根廷势力的渗透与维系派系内部的稳定，需要极大的谨慎与战略智慧。我们正等待进一步指示，以明确最佳行动方案。\n\n秩序与进步"
 LATAM_bush_war.25.a: "南美黑斑的未来飘忽不定。"
 LATAM_bush_war.26.t: "战间期"
 LATAM_bush_war.26.desc: "如果问何塞·若宾心中还有什么遗憾，那便是莫里尼戈已经被赶下了台。他怀念这位独裁者并非是因为他的政治立场——事实上，他与驻亚松森的巴西大使馆全体工作人员曾认真讨论过，是否要“亲自动手”解决掉这位独裁者，作为他们融入当地政治生态的“入门仪式”。\n\n然而，在莫里尼戈下台之前，至少还有一种清晰的秩序感——他们面对的是一个明确的政权、一个明确的政府，以及一套明确的政策。这些政策或许独裁腐败，但至少稳定且可预测，远不像如今这般随时可能全面崩塌的混乱。更何况，当时他们还不必为街头的暴乱而重建整个大使馆。\n\n如今，这种秩序已荡然无存。国家四分五裂，行政混乱程度几乎与旧政府仓皇逃离亚松森时无异。他甚至不确定，如果某天需要处理紧急事务，究竟该拨打哪个号码才能找到一个真正掌握权力、能够做出决策的人。所谓的“三头同盟”政府早已形同虚设，各派势力固守各自阵地，谁也说不清下一步的“政策”究竟会如何演变。\n\n就在不久前，他随同旧政权垮台后的大使馆团队重返驻地，如今却时常面临物资短缺的困境。每天接触到的新闻中，充斥着零星的冲突与抢劫事件，仿佛已经成了生活的一部分。甚至坐在办公室里，他都能清晰地听到街头传来的共产主义者集会声，那些高喊着工人委员会与士兵委员会口号的标语，早已布满了整座城市的基础设施。他的安全保障早已无法依赖巴拉圭的警察或军队。如今，唯一能称得上“可靠”的防卫力量，仅剩下由外交部直接派遣、专门驻守在大使馆内的几名私人护卫。\n\n更糟糕的是，他与洛佩斯宫及政府部门的传统联络渠道几乎完全中断，日常工作更多是在与美国特工接触，而非与巴拉圭的部长们打交道。此刻，整个局势只能用一个词形容：紧张。但最可怕的事情，显然尚未到来。"
 LATAM_bush_war.26.a: "他所能做的，只有透过窗户静静旁观。"
 LATAM_bush_war.27.t: "赌上国运"
 LATAM_bush_war.27.desc: "“我说，若泽，恕我直言，这里真的没什么值得担心的。”阿尔弗雷多·拉莫斯悠然自得地抿着杯中的咖啡，双腿优雅地交叠着，整个人看起来无比放松，仿佛置身于一场轻松的午后茶会。若宾紧抿着嘴唇，沉默不语，只是目送着一位神情慌乱的行政官员从拉莫斯身后匆匆走过。“我是认真的，一切都已经准备就绪。我已经与美国人以及你们的军方谈妥了。这次行动会成功的，我们一定会赢。”\n\n“告诉我，如果我有哪里理解错了。”若宾突然开口，视线投向窗外。他心想，街道的混乱程度简直与这座大使馆的走廊不相上下。“今晚，你们会发出信号，号召士兵叛逃，让警察突破共产主义者的防线，逮捕联合民族解放阵线的领导层……然后，就这么结束了？”\n\n“哦，不，老朋友。”拉莫斯笑着摇了摇头，那种过分的从容让人不安。“我们不仅要突破他们的防线，还要逮捕阵线的全部领导人，分散兵力控制整个城市，占领所有检查站。这种事，我们以前又不是没做过，佩佩。”\n\n若宾低头，看向大使馆下方。他看见武装守卫正小心翼翼地卸下几箱武器。他皱起眉头，继续追问：“但即便如此，你还是漏了一个关键人物。拉斐尔·佛朗哥呢？你真的认为他的支持者会那么容易放弃？他们坚持到现在，可不是为了让你轻松接管。”\n\n拉莫斯原本轻快的笑容微微僵了一下，但很快又恢复了自信的神态。“佛朗哥……他会配合的。”拉莫斯冷笑了一声，对若宾的质疑不以为然。“他终究会明白自己的力量有多脆弱。他要么合作，要么就被扫清出局。”说完，拉莫斯再次抿了一口咖啡，仿佛一切尽在掌控之中。\n\n若宾移开了视线，凝视着窗外的暮色，脸上的神情愈发凝重。他清楚，这个自负的政客正用自己的国家未来当作筹码，玩着一场极其危险的政治豪赌。但天知道，他究竟有没有胜算。若他的赌局失败，这场动荡的余震，恐怕将回荡在巴拉圭的土地上，绵延数年，甚至数十年。"
 LATAM_bush_war.27.a: "骰子已然掷下。"
 LATAM_bush_war.28.t: "空缺已填补"
 LATAM_bush_war.28.desc: "一声长长的叹息回荡在狭小的房间里，气流撞击着刚刚关闭的窗板，又在光滑的墙壁间盘旋不散。桌上的小型巴西国旗在一堆钢笔与铅笔中微微晃动，巴西驻巴拉圭大使何塞·若宾转过身，再次面向他的同胞：“那么，索尔——”一个代号，“突袭行动进展顺利吧？”\n\n站在他对面的，是一位疲惫不堪的男子，身上沾满了各类污迹，从草屑、混凝土碎片，到渗透进衣服破洞与撕裂处的泥土，无不昭示着刚刚经历的激烈战斗。“是的，虽然差一点就失败了，但对共产党据点的突袭还是成功了。他们似乎提前得到了消息，早已做好了准备。不过，没关系，他们的大部分领导层都在行动中被歼灭了……除了格瓦拉，我们还是让那个鼠辈逃了。”\n\n远处，步枪与冲锋枪的零星枪声依旧时不时回荡在这座城市的上空。“可我一直在疑惑。”若宾缓缓开口，语气凝重，“那些枪声，太零散了，太缺乏协调性……根本不像是援军的动静。你能确定格瓦拉不会再次反扑？”\n\n“只是城里其他区域的游击队。他们在进行零散的城市游击战。而那些街头抗议者，更是让局势更加混乱。他们堵塞了主要街道，但军方和警察中的叛逃者们——毕竟，他们经历过莫里尼戈时代的镇压——早已习惯于镇压这种暴乱。我不认为会再有麻烦。”\n\n“自由派赢了。”若宾从椅子上站起，走向那扇紧闭的窗户，闭上眼睛，仿佛透过墙壁遥望着外面的世界。他的耳朵捕捉到了游行者微弱的口号声，但那声音几乎被更远处的枪声淹没。“可是……代价呢？”\n\n索尔冷笑了一声：“哼！那根本不是问题。真正重要的是——阿根廷人，总算滚出去了。”"
 LATAM_bush_war.28.a: "“……而民主，回来了。”"
 LATAM_bush_war.29.t: "机遇在手"
 LATAM_bush_war.29.desc: "滴答，滴答，滴答。议会大厦的座钟穿透敞窗灌入的风声。若泽·若宾在穿堂风中凝神谛听——慢镜头般的空气嗡鸣与钟摆震荡间，枪声仍在耳畔回响，压抑的嘶吼与行动后果交织。这一切何以至此？\n\n从零散情报与眼前人拉斐尔·佛朗哥的只言片语中拼凑出真相：自由派政变失败。渗透进自由派组织的共产党人殊死抵抗，借机突袭其总部击毙拉莫斯。\n\n当战火与硝烟笼罩都城时，佛朗哥以戒严令自封临时总统呼吁停战。原属自由派的军人和警察纷纷倒戈，厌战民众拒绝延续游击抵抗——此刻佛朗哥正以此质问：\n\n“贵国间谍活动对巴拉圭的伤害远大于帮助！更别提贵政府暧昧不明的支持态度。”若泽默然承受着诘问。“但无妨，两国仍可重修旧好。不过有言在先——我不会做巴西傀儡，巴拉圭人民才是我唯一的效忠对象。”\n\n过去数周扮演牵线木偶的若泽，竟在佛朗哥眼中觅得一丝共鸣。“衷心祝贺阁下。期待两国能建立真挚友谊，至于你我之间……”"
 LATAM_bush_war.29.a: "“……我由衷敬佩您的自主。”"
 LATAM_bush_war.30.t: "仓皇撤退"
 LATAM_bush_war.30.desc: "亚松森郊外，巴西驻巴拉圭大使若泽·若宾正被装甲运兵车紧急转移出城。昏暗的车内灯光忽明忽暗，投下令人不安的阴影。装甲板外传来零星的枪声与叫喊。若宾凌乱的西装紧贴着身体，双手死死攥住公文包，脸色惨白，眼神四处游移，充满恐惧。金属棺材般的车厢里，几名满脸阴郁的士兵紧握钢枪，沉默地注视着前方。\n\n“不该是这样！”若宾对身旁的士兵咆哮，“情报明明说联合民族解放阵线毫无防备！”尽管情报部门早有预警，若宾仍坚信这场突袭将如快刀斩乱麻一般击碎对手。然而事实证明，阵线对突袭做足了防备。精心策划的政变彻底失败，自由派总部遭遇猛烈反击，领导层几乎全军覆没，整座城市此刻正处在全面革命的边缘。“该死的工人委员会封锁了街道，我们该怎么脱身？”声音在装甲车内回荡，却无人应答。\n\n“共产党赢了。”若宾把脸埋进手掌。突然，运兵车猛地一颤，停在原地。“怎么回事？”\n\n士兵们交换着不安的眼神。拍打车厢的声响越来越密，装甲车开始剧烈摇晃。军衔最高的士兵默默起身，前去查看情况。若宾闭目祈祷，仿佛看见暴民要将他撕成碎片。忽然，外面的喧嚣戛然而止，取而代之的是一阵清晰刺耳的枪声。沉默片刻后，骚乱的声音渐渐消散，装甲车再次发动，引擎轰鸣着驶离危险区域。士兵回到车厢，但谁也没有说话，若宾也沉默不语。"
 LATAM_bush_war.30.a: "亚松森街头将被染成血红。"
