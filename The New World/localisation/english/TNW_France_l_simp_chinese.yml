 FRS_The_homeland_of_the_French_nation:0 "法兰西民族的家园"
 FRS_The_homeland_of_the_French_nation_desc:0 "在历经无数苦难、目睹万千惨剧之后，法兰西民族终于重返故土，建立起一个崭新的家园。这是一个被制度所驱动的国家，由元帅与总理共同缔造，从新设的大区议会到国家两院，民族革命重塑了法兰西国家。\n然而 二十载沧桑巨变 如今的官僚体系已臃肿不堪 勉强维系着国家的运转。\n\n今日的法兰西 既非共和亦非独裁，\n它已蜕变成一个真正的官僚机器。虽然行政效率低下，却自成体系，形成一张盘根错节的制度之网。任何觊觎那蛛网之上王座的人，都必须明白：这头官僚的巨兽，足以吞没任何个体，无论他是谁"
 FRS_Reich_Shackles:0 "帝国枷锁-§e冷漠§!"
 FRS_Reich_Shackles_desc:0 "我国的外交姿态深得德国认同，法德关系堪称融洽，无论从德国抑或法国的视角看皆然。\n我们唯愿这般和睦光景长存 以见证并滋养两国间深厚的兄弟情谊。\n昔日高悬于顶的干预之忧 如今已如远去的梦影。纵使德国或许永难对我国全然满意 这也无妨 \n\n因为我们终究是携手并进的友邦 是欧洲大陆上情谊深厚的兄弟之邦。"
 FRS_continuous_rain:0 "阴雨连绵"
 FRS_continuous_rain_desc:0 "法兰西民族饱经忧患。殖民地的战火灼烧着这片多难的土地，无休止的治安战争撕裂了社会的经纬，昔日的欧洲之主步履蹒跚，踏入了一个漫长的、阴雨连绵的时代\n若用时运不济来形容，或许更为贴切。国家的过去沉浸在黑暗里，当狂热之年燃尽，留下的只有蔓延的寂寥与无止境的寒雨。\n\n而法兰西民族，便在这片潮湿与阴霾中，度过了整整二十年。"
 FRS_lost_future:0 "失去的未来"
 FRS_lost_future_desc:0 "在法兰西新一代人成长的岁月里，失望如影随形，迷茫遮蔽双目。他们的父辈，他们的祖先，曾为这个国度奋战不息，深信自己属于一个优越的民族，被许诺以伟大的前程。\n于是，他们奋斗着，不懈地奋斗着，直到某天猛然惊觉，欧洲之主的宝座早已倾覆，那个声称服务法兰西民族的制度，内里却已悄然腐朽。于是愤慨翻涌，痛苦啃噬，绝望蔓延。前路似已穷尽，只有深重的悲哀，从深处暗暗涌来。这便是社会的现状，一种弥漫的病态。\n\n法兰西民族沉入一种奇怪的忧郁之中，它不声张，却无处不在。倘若这忧郁久久不散，终将引向何方？\n恐怕，唯有时间能够作答"
 FRS_economic_stagnation:0 "国家经济 - §J止步不前§!"
 FRS_economic_stagnation_desc:0 "今日的法国，依然深陷于昔日的经济泥潭之中，宛若六十年前景象的重现。政治纷扰不断，经济停滞不前，薪资的微薄追赶不上物价的飞涨。\n国家财政日渐萎靡，金融市场如一潭死水，创业之举几近自掘坟墓。民众在无声中，逐渐接受了这片灰蒙蒙的现实。\n\n偶尔，也有人停下脚步，回想起七八十年代的辉煌岁月，或是后斗争时代那些浓稠的黑暗。他们将那段历史与如今这阴雨连绵、不见尽头的年代相对照。\n\n是失望，还是痛苦？或许，这些都已不再重要了"

 FRA_Jean_Poperen:0 "让·波佩伦"
 FRA_Jean_Poperen_hog_desc:0 "§Y国家总理\n改良社会主义§!\n--------------\n波佩伦是党内知名的左翼人物，其鲜明的左派立场众人皆知。然而，正是这份色彩，使他被党内推上总理之位，目的正是为了牵制那位权欲极强的总统朗。无论朗试图推行何种改革，波佩伦身后的社会党反对派总能让每一份提交至部长会议的议案，都不得不“停留”一阵子\n\n现任总统早已厌倦了波佩伦及其背后的反对势力；而波佩伦也心知肚明，总统正在对他们出手。至于这手段将有多猛烈，反对派能否扛住这场较量，眼下仍是未知。但身在其位，让·波佩伦仍将竭尽所能，阻挡这位权欲膨胀的总统\n社会党内部，一场小型的冷战正在悄然进行，各派系皆在暗中动作\n\n而让·波佩伦？他更像是一面旗帜、一个象征。反对派真正在谋划什么，他并不清楚，或许，他也永远无法真正知晓了。"

 FRA_Jean_Pierre_Chevenement:0 "让-皮埃尔·舍韦内芒"
 FRA_Jean_Pierre_Chevenement_for_desc:0 "§Y内政部长\n保守主义§!\n--------------\n舍韦内芒家族源起瑞士，其原姓“施文内曼”于十八世纪法语化为“舍韦内芒”。他出生在靠近瑞士边境的贝尔福，通晓德语，并曾赴维也纳求学。1981年至1983年，舍韦内芒出任研究与工业部长，随后辞去职务，这是他职业生涯中的第一次辞职，后来他再次作出了类似的选择\n有许多社会党人指责舍韦内芒导致了利昂内尔·若斯潘在总统选举第一轮中失利，但他对此毫不在意。\n\n正如他对时任总统所持的态度一样：“部长必须沉默；若想发言，便请辞职。”"
 FRA_Edouard_Balladur:0 "爱德华·巴拉迪尔"
 FRA_Edouard_Balladur_eco_desc:0 "§Y财政部长\n温和技术官僚§!\n--------------\n巴拉迪尔出生于土耳其伊兹密尔，其家族属于黎凡特地区的亚美尼亚裔，与法国渊源深远。20世纪30年代中后期，这个拥有五个孩子的家庭移居马赛，在法国扎下根来\n\n他的政治生涯始于1966年，起初担任佩雷菲特总理的顾问。民主改革后，他积极投入社会党的重建工作，并与来自社会革命党的密特朗保持密切联络，推动了1973年左右共治局面的形成。尽管这段经历让他备受争议，甚至一度遭到若斯潘的排挤，但在密特朗被迫下台后，巴拉迪尔转而与朗建立起稳固的合作关系，协助其在党内竞选中取得优势。\n1988年若斯潘竞选总统失利，党内部分声音将责任归咎于他，但朗依然对其信任有加，在竞选成功后任命其担任内阁部长。"
 FRA_Alain_Richard:0 "阿兰·理查德"
 FRA_Alain_Richard_sec_desc:0 "§Y国防部长\n家长制§!\n--------------\n理查德在亨利四世中学完成学业，取得高中毕业会考文凭后步入政坛。1978年至1993年，他担任瓦兹河谷省国民议会议员，1995年当选参议员，随后被任命为国防部长\n\n任职期间，他负责推行精兵政策，于1996年启动一项裁军计划，旨在到2002年将法国在非洲的武装部队人数从30万削减至20万。尽管他履职尽责，却在时任政府中处境疏离。外界普遍视其为若斯潘的盟友——尽管他本人始终否认，但流言从未止息。\n尤其在一位控制欲极强的总统麾下，此类猜测更难以消散。久而久之，理查德已无意纠缠于传言之中；毕竟，若流言足以撼动一位部长的职位，那么街头随便一位明星的得票，或许都将胜过那位总统。"

 POLITICS_JACK_LANG_DESC:0 "杰克·朗在巴黎政治学院攻读政治学，随后取得公法研究生学位，毕业后便投身政坛。他以倚仗“直觉”行事而闻名，甚至因此声名狼藉。尽管人们赋予他诸多称号，但他最钟情的莫过于“跨越卢比孔河之人”。\n\n起初，朗以社会革命党议员身份步入政界；民主改革后，他积极投身社会党的重组，并获选为社会党在孚日省第二选区的国民议会候选人。自与密特朗合作以来，他在党内的地位便争议不断。全国选区重新划分期间，他的选区遭撤销，之后数次在其他选区提名失利，最终才在加莱省赢得席位。积累相当人望后，他逐渐显露出强烈的权欲，打压异己导致社会党内部裂痕加深，甚至迫使若斯潘退出大选。此举引来党内广泛批评，但朗对此毫不在意，\n\n正如他豪言宣称的那样。“没有人能将我从法国的政治版图中抹去。”"

