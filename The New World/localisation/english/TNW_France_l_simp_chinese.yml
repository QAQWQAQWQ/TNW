 FRS_General_Regulations_for_Civil_Servants_1941_law_desc:0 "§L一九四一年秋§! §S达尔朗政府§!颁行§i《公务员总章程》§!此乃§z法§!§W兰§!§X西§!国首部系统规整公务员体制之法典。章程细载公职之录用、升迁、操守、惩戒乃至俸禄养老诸端。嗣后，随§o维希政权§!渐收北方治权，此法历经数次增修，规制日繁。依§V莫里斯·多列士§!之言，其时国度所期之公务员，当如“行政机枢内毫无己志之齿轮”，非惟职分之内，即便私室起居，亦须示以对§f国邦§!及其§m元首§!（总统）的绝对赤忱。与此同时，犹太人及被赋以新象征的“阿尔及利亚人”之属，皆明令斥于公职门墙之外，沦为制式化的“非民”。§i《总章程》§!由此构筑起一套阶序森严、强调上行下效的§J官僚体系§!。虽其表旨在于塑建更效忠、更缮治的行政纲维，然践履之中，§z法§!§W兰§!§X西§!政府终乏善策以遏止制度自身所滋生的裙带勾连与体系性腐败。"

 FRS_Decentralization_Act_of_1957_law_desc:0 "§u殖民地独立运动§!之压力下，§a法国政府§!乃将部分权柄自巴黎下放于§*法属非洲殖民地§!之民选地方官府，并藉施行普选、废多选区选举团之制，尽除其余选举不平之象。此实为创建§z法§!§W兰§!§X西§!§K共同体§!之先声，其性质类乎§E英联邦§!。多数法属非洲殖民地于一九五七年三月三十一日，依新颁普选§m《地方分权法》§!之制举行选举；其例外者，§n喀麦隆§!早于一九五六年十二月二十三日先行选举（后因武装暴动作废），多哥则迟至一九五八年四月十七日方举。"

 FRS_1958_Declaration_of_the_Francophonie_law_desc:0 "“§n成员国§!享有广泛的§p自治权§!，可以自由治理自身并选举其内部机构。共同体保留的权力包括§h外交政策§!、§V国防§!、§U货币§!、共同经济和金融政策以及战略原材料政策。司法、高等教育、对外和公共交通以及电信的控制权也属于§K共同体§!的管辖范围，但可以委托给§n成员国§!。”\n\n经§X中非战事§!之惨痛教训，§<法国保守派§!于§&殖民之业§!渐生倦意，乃欲斩断与§*法属撒哈拉§!以南诸殖民地一切羁縻。虽初版宪法明定：共同体成员一旦独立，即不复属共同体之列，然§L一九五〇§!年之修正案更张前制，允一国独立后，可“依协议”仍留共同体之内。\n该修正案亦载明：已§w独立之国§!亦可重新加入§K共同体§!，然此款从未施行。§K共同体§!之§z主席§!，由§z法§!§W兰§!§X西§!总统兼任；各§n成员国§!皆参与推选主席之选举团。共同体设执行委员会，由§z主席§!主持，成员包括§m法国总理§!、§n各成员国政府§!之首脑，以及执掌§K共同体§!共同事务之部长。\n\n立法之权属共同体参议院，由§a法国§!议会与各州议会之代表共组。另有仲裁法院，专司裁断共同体成员间之争议"

 FRS_Higher_Education_Guidance_Act_1968_law_desc:0 "“大学的基本使命是发展和传播知识，发展研究和培养人才。”在大学领域，新法之背景与数年前启动大学改革时之情形几无二致。自§L一九四五年§!以来，因§h高等教育§!趋近平民、§P女性§!就学日增，兼以§C婴孩潮涌§!至，学子人数显著增长。无论任何时期，§a行政当局§!皆未尝停辍其行。\n巴黎及外省皆兴建新式现代馆舍，并增设大学中心。教职员数亦随之增加，其聘雇状态亦见初步更易。然此类量性措施不久即显不足：§L一九六七年§!，§Q蒙彼利埃文学院§!原为六百生员而造，竟纳约四千学子。改革之设，本为应对§h高等教育§!所遇之新挑战。§I二十世纪六十年代§!，该改革最著之成，乃设立“§m文学研究大学文凭§!”与“§m科学研究大学文凭§!”。然此改革早于§L一九六八年§!五月风潮前一年已受质疑，且在运动期间持续遭遇挑战。\n然有一面几乎未改，非仅自§L一九四五年§!如此，于诸多方面，实可溯至§L一八九六年§! §a《路易·利亚尔法案》§!颁布以来，即大学之运作方式及其内部权责分配。此制予校长及各学院院长颇重之权，然诸多决策仍须部长定夺。教授在大学机构中地位显要，而学子几无发声之机。该法亦借教师研究员之身份，将教学与研究二者相绾合，从而鼓励跨学科之发展。故此框架法实标志着§a法国§!教育之一大转折，因其融纳§L一九六八年§!五月部分诉求，如令所有教育相关方参与机构治理，并促进学科间之贯通"

 FRS_1969_Grenell_Agreement_law_desc:0 "§x《格勒内尔协议》§!者，乃§L一九六九年§!五月政府所倡启，与§R雇员§!及§O雇主组织代表§!共商集议之果。虽未经由§m国会§!审批，亦未认其§V合法§!，然§f比舍洛纳政府§!仍将该“协议”之要策施行于国中。此协议所载，实为自改革以来，乃至§L一九三六年§!§X人民阵线§!重大社会革新以降，前所未见之社会进益。纵至§M二十一世纪§!，诸条款犹具现实之义。除普增§R全体雇员§!之薪俸外，协议亦涵盖缩减工刻、护持公司内部§Z工会权利§!等承诺；复约定就养老之金、耆老福祉、家计津贴等项，续开商讨。"

 FRS_Safety_and_Freedom_Act_desc:0 "§L一九七〇年§!初，司法部长§*阿兰·佩雷菲特§!携其私人顾问§<文森特·拉曼达§!草拟§$《安全与自由法》§!，至§L一九七三年末§!终获通过，颁行实施。此法之立意，源于§M自由§!与§f安保§!间须求平衡的思虑。\n其中不可忽视者，乃§L二十世纪七十年代§!后半叶§s法国恐怖活动§!气焰日炽，促使§*佩雷菲特部长§!决意另立新章。该法以一套更为整饬的“§J径直移送刑事法庭§!”程序，取代旧制“§V现行重罪§!”规程（见该法第48至52条）。溯其渊源，实有§L一八六三年§!五月二十日关于§V现行重罪之律令§!，规定当场擒获之被告须立即押至检察官前受讯，并可即送轻罪法庭，或羁押候审，以待翌日开庭。此旧制虽于§L一九五八年§!§A《刑事诉讼法》§!颁行后明令废止，然其精神仍载入§w新典第393至397条§!，实质未改：程序务求§S迅捷简易§!，§r被告之权§!利则受严限，\n\n《安全与自由法》所立新制，乃为此程序注入变革：自此须有§i律师§!在场（此前并无此规），且予§r被告人§!更充裕之时间以筹辩护。"

