 FRA_SKELETON.11.a:0 ""
 FRA_SKELETON.12.t:0 "巴黎之夜"
 FRA_SKELETON.12.desc:0 "Ambassador Hermann Schneider took another shot of Schnapps and flicked his eyes back to the dossier in front of him. The French PPF was a monster of a political party, all-powerful and entirely unpredictable, constantly at war with itself. The regime had recently stabilized with President Pierre Sidos reigning in the dissident factions. That was until the President's right-hand man and Prime Minister, Pierre Drieu la Rochelle, died almost out of nowhere. Now the parliament would be nearly split down the middle a dozen different ways. A letter was sitting on his desk, from a cabinet member requesting to meet with him, presumably in an attempt to curry favor with Germania. Three other letters of the same kind littered his office. The vultures were circling Sidos, looking to exploit the new power vacuum for their own ends. Hermann massaged his brow reading the umpteenth dossier on parliament members he could still reach out toward to offer some kind of reassurance. Recognizing his phone ringing, Hermann picked up the receiver.\n\n\"Herman Schneider, ambassador to France?\"\n\nHis superior's voice boomed through the air. \"Schneider. Would you care to explain the-\"\n\nSchneider cut in. \"I am aware of the situation, sir, I've been the one informing you, if you hadn't noticed. You understand what's happened to the PPF with la Rochelle, don't you? The situation is spiraling and will continue to do so until they set themselves straight, and I've already requested for our 'intervention' however possible. There is nothing new to report, so if you in Germania would stop bothering me in this regard, it would be deeply, deeply appreciated.\" A moment of hesitancy passed on the other side of the phone, and Schneider heard a deep sigh emanate from the line.\n\n\"Thank you, Herr ambassador. Your input is deeply,\" -the voice on the other side grated as it spoke- \"deeply appreciated.\""
 FRA_SKELETON.12.a:0 "Seems like the French aren't the only ones still fighting themselves."
