 FRA_SKELETON.10.t:0 "西多斯总统请求访问"
 FRA_SKELETON.10.desc:0 "Ambassador Schneider ground the stub of his cigarette into the ashtray sitting on his desk, the tarred ceramic uncovered under a manilla folder. The French seemed to have calmed down their political feuding, much to the pleasure of pundits in Germania, though it hardly eased Schneider's nerves in any capacity. Pulling the ashtray closer as Schneider attempted to light a cigarette one-handed, the lighter slipped from his hands. Lunging for the silver, Schneider yanked the ashtray back, showering him in cinders and ash. At that moment, the phone rang.\n\n\"Yes?! Christ on a crutch Tobias what do you want?\"\n\nTobias spoke without breath or pause. \"Yessir but the French are on line 1 and they refuse to stop calling putting them on no-\" With a prolonged beep, Schneider could hear the shallow breathing of someone on the other side.\n\n\"Ambassador Hermann Schneider speaking, who is this?\"\n\n\"Good afternoon, Herr Schneider, this is Pierre Sidos. I am inquiring as to whether Germany would be willing to host a visit from the French delegation in approximately a week's time- details can be clarified before, are you interested in this offer?\"\n\nSchneider reached to his lips for a cigarette. All Hermann found was a small puff of ash covering his face, and realized there must be a pile of cinders coating his face. Struggling to focus on the conversation, the ambassador recalled his history lessons as a child. How he'd been taught about the visceral hatred the French had for the German nation, how they'd lashed out at it in 1918 and 1923. And here was France's most powerful man at the other end of the line, meekly speaking German, asking for the honor of shaking hands with the Führer. A smug smile crept across Schneider's face."
 FRA_SKELETON.10.a:0 "\"Germania would be more than pleased to have you, Herr Sidos.\""
 FRA_SKELETON.11.t:0 "皮埃尔·德里厄·拉罗谢勒去世"
