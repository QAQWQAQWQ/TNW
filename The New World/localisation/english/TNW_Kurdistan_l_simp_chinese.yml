 POLITICS_MUSTAFA_BARZANI_DESC: "无数群体高呼压迫，宣称要在帝国主义暴政横行的世界中争取独立。然而他们对自身施加的压迫视而不见，对以所谓革命之名实施的暴行充若罔闻。\n\n穆斯塔法·巴尔扎尼对此有着超乎常人的切肤之痛。土耳其军队囚禁其全家，尚在襁褓的他便在牢狱中成长。童年记忆充斥着祖父、父亲与兄长接连被处决的枪声。少年时期，他既参与也领导过反抗英军及伊拉克新立王室的起义——这些抗争最终使他流亡异乡。金方阵革命后重返故土时，目之所及尽是焦土与饥馑。向巴格达求援的恳请招致镇压，唯有1959年土耳其入侵及数年后第二次伊土战争暂缓了暴政。历经沧桑，穆斯塔法·巴尔扎尼为族人抗争的脚步从未停歇。\n\n尽管巴尔扎尼敬重卡塞姆，并对其构建多民族共和国的承诺报以礼节性回应，但他心中自由库尔德斯坦的理想始终炽热。石油危机被他视为终结数世纪压迫的最佳契机。虽然对其专断作风与贪腐传闻的风言风语始终存在，但所有非议者都愿暂时搁置争议。毕竟，无人愿见族群再度遁入深山，为自由付出一代又一代的鲜血代价。"