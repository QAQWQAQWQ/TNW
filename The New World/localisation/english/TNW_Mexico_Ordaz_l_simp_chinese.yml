 MEX_Ordaz.3.tt:0 "国家中的§Q泰坦§!浮出水面。\n§Y一个新的GUI已在决议界面中解锁。§!"
 MEX_el_titan_info_tooltip:0 "§O泰坦巨人§!\n------------------\n如今，§Q奥尔达斯§!已执掌国家大权，这正是§K墨西哥§!§O革命§!力量的有力证明。§Q古斯塔沃·迪亚斯·奥尔达斯§!出身贫寒，自幼便是不受母亲待见的“丑小鸭”，却仅凭超凡的才智与惊人的实干能力，跻身权力之巅。\n\n担任§Q内政部长§!期间，他正是凭借这些特质，支配着£GFX_mex_pri_texticon §K革命§!§W制度§!§x党§!。如今身佩总统绶带，他那£GFX_MEX_el_titan_texticon §W铁腕手段§!的真正威力终于展露无遗。严格自律与坚定护法是他的执政信条，联邦政政府与各州州长必将对他言听计从——总统这一职位，本就要求绝对的服从。\n\n事实上，这份职位要求的远不止于此：§Q六年§!全身心的投入；常人难以想象的重压；反§O革命§!与阴谋家在国内潜伏，并受境外敌对势力暗中支持；叛逆青年、£mex_dw_uns_texticon §r右派§!和£mex_dw_pdlp_texticon §X左派§!企图推翻他毕生捍卫的秩序。这§Q六年§!，他必须顶住§K墨西哥§!与自身所面临的无底压力……否则，雷霆手段必将§O降临§!。"
 MEX_el_titan_tendaz_tt:0 "[ROOT.MEX_el_titan_tendaz_decider]"
