 MEX_Ordaz.18.b:0 "“我们对任何加强安全合作的机会表示欢迎。”"
 MEX_Ordaz.111.t: "机不可失"
 MEX_Ordaz.111.desc: "“……就是这些大学生啊，赫苏斯。他们觉得全世界都欠他们的。他们只要张嘴一喊，别人就得满足。”墨西哥国家石油公司主任赫苏斯·雷耶斯·埃罗莱斯透过他那副老旧耳机，听见了国家石油学院候任负责人哈维尔·巴罗斯·谢拉沙哑的笑声。两人正在讨论墨西哥国立自治大学最近发生的学生罢课事件。“其实他们也没坏心，”谢拉说，“年轻人嘛，热血是好事，虽然有时候用错了地方。”\n\n“这确实得多留意啊，哈维尔。可惜校长非辞职不可——管不住学生就是这下场。”埃罗莱斯用空着的那只手抿了一口咖啡，刚碰到嘴唇就猛地放下。他犹豫太久，结果一杯好咖啡白白凉了。他把杯子放回桌上，搁在几份建筑蓝图旁边。\n\n一阵长时间的沉默后，谢拉终于又开口了：“赫苏斯，国立自治大学的理事会昨天给我打了电话。他们要我出任校长……对不起，我决定接受这个职位。也谢谢你之前考虑让我去接管石油学院。”\n\n气氛变得更加凝重。埃罗莱斯强忍怒火冷静下来。若谢拉此刻站在他面前，他绝不可能掩饰这份愤懑。“祝贺你，谢拉。你一定会是个好校长，孩子们有福了。好了，我还有事，回头聊。”\n\n话音未落，他“砰”地一下摁下电话听筒。力道太大，还把咖啡杯撞翻了，溅得满桌都是，连石油学院的规划图纸也给毁了。他长叹一声，定了定神，重新坐回工位。他打开了一个尘封许久的文件抽屉，里面放着一些原本以为再也不用翻的档案——未来的石油学院院长，只能从这些名字里挑了。"
 MEX_Ordaz.111.a: "区区一个大学校长，太委屈他了。"
 MEX_Ordaz.112.t: "乡愁"
 MEX_Ordaz.112.desc: "加拉加斯市中心的一间礼堂内，闪光灯此起彼伏，台上的人们握手寒暄，摆出事先排练好的笑容，宣称两国间将收获一段崭新的兄弟情谊。活动结束后，墨西哥大使路易斯·罗德里格斯紧随委内瑞拉代表团一同走下舞台。刚一离开聚光灯，走进走廊，那些笑容便尽数褪去。\n\n“签再多协议也没用，”其中一位委内瑞拉代表冷声说道，“特鲁希略还活得好好的。他对贝当古和加勒比军团干的那些事，我们早该让他偿命。”\n\n“确实遗憾。”大使罗德里格斯点头应和。一时间，走廊里陷入沉默，压抑得令人窒息。最终，还是大使率先开口：“战争爆发前，我曾接替前任派驻法国，负责协助希望移民墨西哥的西班牙共和派流亡者。可惜六个星期后，法国就沦陷于法西斯之手。那些流亡者——不少还是犹太人——性命顿时危在旦夕。”\n\n“我只好将公使馆迁往维希，并设法与当地政府谈判，争取让他们自由离境。最终有几千人得以逃出生天。但还有更多人注定无法脱身。那些最终抵达墨西哥的，也在十年里二次失去一切。但他们没有被打倒。如今，许多人已经在此安家立业，子孙满堂。我没能救下所有人，但若我在法国沦陷后就回国，那获救的几千人恐怕也将命丧他乡。我无法向你承诺特鲁希略必须死，但我可以肯定，贯彻正义从来不靠袖手旁观。”"
 MEX_Ordaz.112.a: "总有一天，正义将降临于法西斯头上。"
 MEX_Ordaz.113.t: "直言不讳"
 MEX_Ordaz.113.desc: "上午刚过，集市广场已是人潮汹涌。何塞·阿尔瓦雷斯一边在人群中穿行，一边照例巡视。他走到哪儿，哪儿的摊贩就喊他的名字打招呼。虽然他并不把这些人当朋友，但十多年来，他几乎天天都来这里。\n\n当初刚到墨西哥城时，他身上除了几件衣服几乎一无所有，只得在一家磨坊里干活。可那工作没维持多久，磨坊工会就来讨要他根本拿不出的会费。后来他换过不少杂活，也总是干不了几天就被辞退，直到被“格洛丽亚”餐厅录用，做起了食材采购员。\n\n餐厅老板待他不薄，他也以从不缺勤来报答这份恩情。这种靠辛勤劳动谋生的日子，他觉得挺好。只是，他的儿子们似乎从来就不珍惜这样的生活。\n\n排在水果摊前的时候，何塞正在盘算每日的开销，忽然注意到前面的人群竟然一动不动。他抬头望去，立刻明白了缘由。\n\n“我跟你说，”一个高个子女人正对前面的人抱怨，“我早就知道咱们工会不靠谱了，可昨天开的会简直气死我！他们几乎是明着逼我们支持政府的新政，说什么‘忠诚的工人就不怕’！结果我们的瓦莱莉娅一开口，问她能不能去参加个医盟集会，场上所有人给她投去的眼神，那叫一个冷……你敢信？”\n\n“信啊，那还用说。”何塞低声咕哝着，从这几个正聊得热火朝天的人身边挤了过去，“工会根本不是为工人谋福利的，全是陷阱，帮着工贼头子作恶罢了。领导们一个个赚得盆满钵满，苦的全是我们。”\n\n他买了一箱甜瓜，没再多说一句就离开了。“好没礼貌！”那女人对她的同伴咬牙切齿地说道。"
 MEX_Ordaz.113.a: "“但他说得没错。”"
 MEX_Ordaz.114.t: "心意到了就好"
 MEX_Ordaz.114.desc: "德里克拿起酒店的电话，努力稳住情绪，请求接通位于华盛顿的上司。他一向不擅长传达坏消息，而这次，他只能带回一肚子的苦水。\n\n他这趟重访莫雷洛斯州的行程，原本只是个例行公事：采访几个感恩戴德的农民，拍几张他们驾驶崭新美制拖拉机的照片。可迎接他的却是一连串控诉和怨声。\n\n“……我亲眼看到有片集体土地只分到了一台拖拉机，而旁边那个规模差不多的集体土地却拿到了五台。”他语气烦躁地汇报道，“而且整个地区的农民都在为零件支付高昂的费用——这些配件原本应该是免费的！”\n\n德里克咽了口唾沫：“贪腐，这是我能想到的唯一解释。地方官员把我们的援助物资按着自己的利益分配，这已经严重影响到整个项目的成效。我想正式提出申诉，或者，起码做点什么。”\n\n听筒那头沉默了片刻，接着传来上司沙哑的声音：“你的任务是把拖拉机送过去。怎么用，是墨西哥人的事。别忘了我们搞这个，是为了改善两国的关系，不是为了惹麻烦、挑起外交风波。你最好把这事抛诸脑后，回国吧。”\n\n电话挂断，德里克长叹一口气。所谓“改变世界”的使命，也就这样不了了之了。"
 MEX_Ordaz.114.a: "他放下话筒，默默开始收拾行李。"
 MEX_Ordaz.115.t: "引退"
 MEX_Ordaz.115.desc: "劳尔·萨利纳斯·洛萨诺仍坐在家中书房，彻夜未眠地伏案工作。他环顾四周，屋内陈设奢华，皮椅柔软舒适，硬木书桌光滑细腻，触手可感。然而，搁在他面前的那封奥尔达斯总统的信，却打破了这份宁静。\n\n这项新任命简直荒唐可笑。奥尔达斯难道真觉得，仅凭一道命令，他就会乖乖离开首都，跑到尤卡坦那个破破烂烂的泥屋去？若真如此，那这位新总统可比他想象中还要愚钝。\n\n他拉开抽屉，取出一份文件——那是一份教授职位申请书，目标是国立自治大学。像这样的大学，多得是愿意接纳他这样政坛老将的学府。重返学界，原本从不在他的人生计划之中，但如今既然奥尔达斯打算把他流放到边陲，他别无选择。\n\n不过，他提醒自己，这大概也只是暂时的低谷。等奥尔达斯的六年任期过去，自会有别的总统登场——那些不会把头埋进沙堆里逃避现实的人；那些有远见卓识的人，一定会来请教萨利纳斯。他甚至还有机会再度问鼎总统宝座——\n\n“父亲？”大儿子劳尔在门口轻声问道，“我和卡洛斯打算去看电影，您要一起吗？”\n\n“不用了，谢谢。我现在还有些事要忙。你们玩得开心。”\n\n看着儿子转身离去，他的思绪却飘向了另一种可能。即便他自己无法实现那伟大的抱负，他或许仍有机会，去塑造下一代的领袖。"
 MEX_Ordaz.115.a: "我失败的地方，愿他们能取得成功。"
 MEX_Ordaz.116.t: "双焰之烛"
 MEX_Ordaz.116.desc: "“阿道弗，你还好吗？”奥尔达斯的脸上满是忧虑。他走进那间昏暗的办公室，看着前总统疲惫佝偻的身影，心头的担忧早已压过了此行原本的目的——筹备即将到来的奥运会。尽管这是一场预定好的会面，但他悄然走到马特奥斯的办公桌前，对方竟毫无察觉，这本身就说明了他的身体状况。\n\n“哦，古斯塔沃，我都没听见你进来了。我们今天约好见面来着，是吧？”马特奥斯抬头望向现任总统，这位昔日的门生。他的脸上印着一块块红痕，是长久将头埋在手中的痕迹。桌面一片狼藉，混乱地堆满了文件、计划，还有药品。“我本来有些方案要让你看看。”他在桌上翻找几页，终于拿起一个文件夹，“委员会已经设计出了一些非常棒的创意，你该看看。”在那双布满倦意的眼睛下，他挤出了一个久经练习的微笑。那笑容，几乎让奥尔达斯回想起六年前马特奥斯将权力交予他时，那抹充满希望的神采。“很抱歉，现在我能给你的不多。我们已经落后进度了。事情实在太多了。”马特奥斯一边揉着眉心，一边低声道，“这一切必须做到完美。为了人民。”\n\n“当然。我们还有时间。”奥尔达斯走到窗边，拉开百叶窗，让一缕光照进这间幽暗的办公室。窗外雾雨濛濛，潮湿的热浪在城市间翻涌。他望着眼前的导师、朋友，不禁感到一丝悲怆。马特奥斯将自己最好的年华献给了墨西哥人民，追逐着一个唯有他看得见的浪漫理想。最终，他付出了太多，如今正为此付出代价。奥尔达斯不禁自问，这样的代价值得吗？若自己也如他一般拼尽全力，未来是否也会步他后尘？但无论如何，他都会战斗下去，取得胜利。“别担心，阿道弗。我会竭尽所能，让1968年的奥运会成为我们的封顶之作。我会扩大筹委会，给你调更多人手，让他们为你分担重担。”"
 MEX_Ordaz.116.a: "蜡烛若两端皆燃，焉能长明？"
 MEX_Ordaz.117.t: "电梯陈述"
 MEX_Ordaz.117.desc: "“普雷西亚多，你那边有什么提案？”奥尔达斯总统轻轻敲了敲桌前那份厚厚的牛皮纸文件夹。\n\n“是的，总统先生。”农业与畜牧业部长胡安·希尔·普雷西亚多起身发言，对着总统以及在座的所有内阁成员。他等了许久，整个会议过程中，各位部长轮番上阵，为的是争取总统的一点关注，乃至支持。现在，轮到他了。“各位面前的文件夹里，是我们针对目前农村人口所面临困境所制定的一套详尽方案。”他扫了一眼那些不情不愿翻开文件的部长们，“目前，本届政府在工业化方面确实取得了许多可喜进展。但我担心，这样的进步已经让我们忽视了农村人民的声音。只需若干关键性投资，并重新聚焦农业发展，我相信我们可以扭转广大农村地区长期存在的问题。”\n\n“说得好，普雷西亚多。”还未等他继续，奥尔达斯便打断了发言。他翻开文件的首页，草草浏览了一下。事实上，这份提案的要点他早已知晓。身为总统，他当然不会在完全不了解的情况下，让某个部长在内阁会议上提出一项如此大规模的国家计划——无论普雷西亚多自己是否知道这一点。“我很感谢你和你的团队为此所做的努力。”奥尔达斯合上文件，话题也随之结束。众部长纷纷效仿，手中文件一齐合上，纸张翻折声此起彼伏。“我会交由我的团队评估是否按原案执行。”总统将文件递给身旁的助理，便算是给这项议题画上句点。\n\n普雷西亚多依旧站着，众人目光一齐投来。尽管他为此次会议准备了海量数据与资料，此刻却一句也说不出口。最终，他只能低声说出一句：“谢谢，总统先生。”然后默默坐回座位。"
 MEX_Ordaz.117.a: "农民嘛，让他们自己解决问题去吧。"
 MEX_Ordaz_DS.10.t: "有待讨论"
 MEX_Ordaz_DS.10.desc: "医盟成员们齐聚一堂，忙的热火朝天。专家们窃窃私语，为即将到来的讨论打着腹稿。医盟的辩论不同于被政客与技官把控的权力殿堂，也不像深受工人影响的工会那样平等且直接。恰恰相反，医生、实习医师和医学生们在此看起来就像仍然身处占据他们大半青春的象牙塔里那样。决策如同课堂教学般严谨，前进方向实事求是。会议开始，与总统达成的最新协议的副本被一一分发到每位代表手中。有人看上去早有预料；有人则仿佛身处考场，如翻阅考卷般急切浏览文件，以最快速度通读条款。\n\n“可喜可贺啊，诸位，”11月20日医院的代表率先发言，“虽然只拿到了一个签名，但这也说明了我们的策略行之有效、运动也十分壮大。胜利的天平已经开始向我们倾倒，倘若想要扩大战果，我们就要先放下对政府意识形态的成见，继续与其合作。”\n\n席间，韦拉克鲁斯代表们低声交谈，声音却被满屋的喧哗淹没。一人起身，同发言者四目相对：“我理解大家此刻情绪高涨，但我得先打个预防针。这场象征性胜利看似诱人——但也只是个象征。革命制度党的政治机器的真实意图是以此来瓦解、镇压我们——这是他们的一贯手段。我们能不能先决定下一步行动，再对此进行讨论？”"
 MEX_Ordaz_DS.10.a: "讨论的时间总会有的。"
 MEX_Ordaz_DS.11.t: "便衣行动"
 MEX_Ordaz_DS.11.desc: "托马斯探员心情忐忑，踏入医盟的集会场地。一周前，在联邦安全局获悉此次活动后不久，他的主管急着派人潜入该组织收集情报，才匆匆选出他来执行这项任务。在仓促的医学术语速成学习后，托马斯就被派到了现场。\n\n托马斯一直徘徊在人群后面，远远地看着讲台。演讲者还有几分钟才登场，他打算用这段时间来听听旁人的谈话，锁定出最激进的成员。\n\n“第一次来？”一位约莫四十岁的女性面带微笑，从人群中现身。托马斯回以微笑，点头示意后便再度将注意力转回人群。那位医生眯起眼睛，仔细打量着他：“生面孔啊，哪个分会？”她语气平淡。人们纷纷回头看向他。\n\n“恰帕斯分会。我来自海边的一家教会医院，那儿没几个人。”讲台旁，电流传回音响，发出刺耳的声音。谢天谢地，演讲者终于要登场了。托马斯对着医生“嘘”了一声，转向讲台，装出一副全神贯注的样子。\n\n他有两招来对付医盟。一个是主动出击，挑拨离间然后推波助澜。另一个是按原有方案办，低调行事同时收集情报给联邦安全局。当然，哪招都绝非易事。"
 MEX_Ordaz_DS.11.a: "让我们牵着医盟的鼻子走。"
 MEX_Ordaz_DS.11.b: "不在河边走，就不会湿鞋。"
 MEX_Ordaz_DS.12.t: "煽风点火"
 MEX_Ordaz_DS.12.desc: "首次参加医盟集会就差点暴露身份，让托马斯意识到原有方案已经难以为继了。他在回到主管那里后点明了自己的担忧。考虑到医盟的成员各个都是医学领域的专家，而他对该领域只知道个大概，他完全不知道自己还能再潜伏多久。只能另辟蹊径了。\n\n第二次会议如期召开。他平静地听完了会议纪要宣读和开场陈述。在主席宣布会议进入动议环节时，他站了起来：\n\n“我们的行动还是太温和了。”会场陷入了死一样的寂静：“我们已经在街头巷尾抗议了几个月了，却一点进展都没有。不能再被动地举着标语牌游行，幻想着总统能屈尊来聆听我们了！我们绝不能再给他们忽视我们的机会了！我提议全面停止所有医疗服务，直到他们接受我们的诉求！”\n\n不可置信的神色爬满了主席的脸庞，他瞪向托马斯：“你不仅想要我们背弃医者的誓言，还要让政府得以名正言顺地镇压我们？动议驳回。”\n\n此时，另一位医生起身：“我提议立刻将该医生从医盟开除。”托马斯环顾四周——他玩儿大了。就在此时，会场的医生几乎全举起了手。"
 MEX_Ordaz_DS.12.a: "托马斯做好了被骂的狗血淋头的准备，灰溜溜地回了办公室。"
 MEX_Ordaz_DS.13.t: "隔墙有耳"
 MEX_Ordaz_DS.13.desc: "在一间空荡荡的仓库里，托马斯探员推开了门，走进一间昏暗的办公室。几缕光线透过被纸封住的窗户射入，打在空气中弥漫的香烟烟雾上。另一名特工伏在油漆桌前，盯着一台空空如也的录音机。\n\n“你来晚了。”他的上司维克托探员说道。\n\n“搞这盘磁带可废我老大劲了。”托马斯一边说，一边从口袋里摸出来一个小玩意儿。那东西呈长方形，正面嵌着两卷磁带，还有一根线伸出去，连着一个小型麦克风。“放进去之后你就明白了。”托马斯解释道。维克托把磁带放进录音机，按下了播放键。\n\n“早安，莱安德罗。”托马斯听出这是医盟主席的声音。这窃听器肯定就在医盟总部的某个角落。\n\n“早上好，里卡多。”这是财务主管的声音。两人开始寒暄，接着是拉家常，就这么聊了几分钟。维克托感到自己正在失去耐心。\n\n“在下次全国大会后，我们还要计划在11月20日医院举行示威吗？”主席沙哑地问道。维克托猛地一扬眉毛，从桌上抽出一本笔记本和一支笔。"
 MEX_Ordaz_DS.13.a: "“干得好，托马斯探员。”维克托面露微笑，说道。"
 MEX_Ordaz_DS.14.t: "各得其所"
 MEX_Ordaz_DS.14.a: "没有地方能像家一样。"
 MEX_Ordaz_DS.15.t: "退场音乐"
 MEX_Ordaz_DS.15.desc: "费迪南德的手微微发颤，小心翼翼地握住了公寓的门把手。这个曾经安全的避风港，昨日却遭人闯入。生活的重压与心中信念迫使他重返罢工队伍，但私人空间被入侵的不安感始终挥之不去。他不敢向同志们吐露忧虑——既不确定该信任谁，更怕被当成妄想症患者。另一只手里紧攥着向朋友借的弹簧刀，这份戒备恰是他内心惶惑的缩影。  \n\n他猛力推开门，却只见一片平静。本以为会面对满地狼藉，甚至做好了搏斗准备，可屋内一切井然有序。费迪南德长舒一口气，又仔细检查了狭小的居所。或许真是自己眼花了？也可能是邻家孩子的恶作剧？  \n\n公寓日常的窸窣声里，一缕细微的嗡鸣钻入他耳中。心跳骤然加速，后脊窜过一阵寒意。循着吊扇的节奏走进卧室，所有物件纹丝未动。唯有床头柜上的收音机正播放着音乐，那“广东制造”的标签旁，传出蚊蚋般的声响。  \n\n他旋动旋钮，直到“咔嗒”一声归于静默。准是早上出门忘关了。可就在这时，收音机下方的抽屉露出一线缝隙。费迪南德拉开抽屉，赫然躺着个牛皮纸信封，里面竟是一封预先写好的十一月二十日医院辞职信。原来并非幻觉。他放下弹簧刀，颤抖地拾起了钢笔。"
 MEX_Ordaz_DS.15.a: "为求安全，万般代价皆可付。"
 MEX_Ordaz_DS.16.t: "迷宫中的面包屑"
 MEX_Ordaz_DS.16.desc: "“不胜感激，先生们。我想，留给您们考虑的事项已经够多了。希望我们能在不久的将来再会。”会后，两位医协代表被迅速带离了那间所谓的“劳工代表办公室”。在革命制度党对社会的宏伟蓝图中，这次会面不过是某个环节上的小小互动。但对于这几位最初只是受到了“总统愿意接受部分革命制度党下属工会诉求”的鼓舞，迄今还在拜占庭迷宫般纷繁复杂的现代工会体系中摸爬滚打的代表而言，能争取到一次会面也已属实不易。\n\n“你觉得我们这次表现如何？该继续走这条路吗？”一位代表深吸了一口烟，问向他的同伴。两人此刻正身处一顶色彩斑斓的遮阳棚下，躲避着烈日毒辣的阳光。滚烫的烟雾虽没能帮他降温，但在漫长的会议后来上一根，也确实能让他提神醒脑。\n\n他的同伴没有反驳，但对能走的多远也心里没底。毕竟他也只是国家工人工会联合会的下属组织国家社保工会的一个小小代表，而他的上级组织上面还有全国民众团体联合会。\n\n“这不像是表演；我们用道德和法律论据陈述了事实，别的自会水到渠成吧。但愿如此。”他听着自己的搭档回答自己，完全没注意到指间香烟已经软软地垂了下去。身为接受过良好医学教育的专业人士，他们都深知不应如此沉迷于烟草。最近关于吸烟伤身的报告他们都多少读过，但就是戒不掉它。革命制度党也像一根令人上瘾的烟。尽管其危害显而易见，但这支“烟”点了太久，久到如果不“抽”它两口，就什么事儿都办不成。“我们会竭尽全力取得胜利。如果这要让我们去找州政府的话，那就找吧。”"
 MEX_Ordaz_DS.16.a: "他们将像其他机构那样，被纳入革命制度党的劳工体系中。"
 MEX_Ordaz_DS.17.t: "殃及池鱼"
 MEX_Ordaz_DS.17.desc: "“总的来说，从在个别诉求上对我们的让步来看，他们并不反对同我们合作。”11月20日医院的一名医协代表回到医院后，和他的同事们转述了会场的情况。与那些官方工会不同，他们与革命制度党的谈判鲜有成效。被剥夺了政治权利的医护工作者们一边专心地听着，一边把晨间咖啡抿进嘴里。“看来我们的运动已经起效果了，施压越狠，就越有可能让革命制度党这头野兽退缩。我提议，在今后的会议中，我们应着重聚焦于大幅改善工作与住房条件、争取加薪，并彻底重构实习医师组织架构。”\n\n简易会议室里响起了一阵礼貌的掌声。这些墨西哥的住院和实习医师们无私奉献、博学多才且组织严密，对胜利势在必得。无论是和平谈判还是抗争施压，革命制度党都将认清形势，在全国人民的见证下将胜利果实让予他们。与会代表们聚在一起谈天说地，等着下一位发言者上台报告。突然，一名男子神色慌张，怀抱一摞厚厚的报纸，闯进会议室大门。\n\n“最新一期的报纸来了！你们快来看看这个！”报纸一张接一张地发到协会成员们手中。刚读完头条，怒火就淹没了在场的每个人。\n\n《医生工会要求微幅涨薪；强调同革命制度党合作》\n\n愤怒的话语在会议室内回荡，人群争先恐后涌向发言者。那人毫不犹豫，加入了抗议的行列，引导漫天的怒火：“这就是在彻头彻尾地歪曲真相！革命制度党和他们的狗屁‘期刊’想要为了一己私利来收编我们的运动。我们决不能让他们得逞！他们必将付出代价，而我们定要夺回属于我们的一切！”"
 MEX_Ordaz_DS.17.a: "胜利的表象才是重中之重。"
 MEX_Ordaz_DS.18.t: "僵局"
 MEX_Ordaz_DS.18.desc: "“……此外，医师和住院实习医生的薪资将上调7%。”话音刚落，会议室瞬间陷入一片混乱。医盟主席将信件折好，放回信封中。他会给众人时间权衡利弊，再做最终决定。\n\n混乱之中，索利尼奥医生面露喜色。她在莱昂的家人再也不必为温饱发愁了。她转身看向埃米利奥——这位来自联邦区的年轻实习医生，是她在上次停工期间结识的。\n\n“这难道不棒吗？真不敢相信！我们赢了！”她一把紧紧抱住他，却突然意识到对方并未与她共享这份喜悦。\n\n“索利尼奥医生，现在这事早已不只是薪资问题了，”埃米利奥反驳道，“如果我们想保住已取得的成果，就必须继续罢工，直到他们承认我们工会的合法地位。”索利尼奥医生的笑容渐渐消失了。\n\n“埃米利奥，我们得愿意谈判。”\n\n“所以我们就乖乖屈服，接受他们的条件吗？我们需要保障未来能拥有公平的代表权。”\n\n“要是奥尔达斯觉得我们永远不会满足，我们连任何代表权都得不到！”索利尼奥医生厉声说道。"
 MEX_Ordaz_DS.18.a: "会议结束，毫无成果。"
 MEX_Ordaz_DS.19.t: "破坏行动"
 MEX_Ordaz_DS.19.desc: "国家工人安全和社会服务协会（ISSTE）和墨西哥社会保障局（IMSS）的负责人，斜倚在总统办公室的豪华皮椅上。两人均认可总统的计划——派遣军医填补罢工者留下的空缺，但在具体实施方案上存在分歧。一个无奈的现实是，他们的人手不足以同时覆盖所有地区，必须选定唯一的行动策略。\n\n“将大部分军医部署到11月20日医院，会是最有效的策略。” 身形瘦削的ISSTE负责人向总统解释道，“这家医院是这场运动的象征，此后一直是动乱的滋生地。在罢工期间强行恢复那里的医疗服务，将对反对派造成沉重打击。”\n\n“另一方面，”头发花白、神情坚毅的IMSS负责人开口说道，“过于侧重某一家医院，意味着放任其他地区陷入困境。将军医在全国范围内更均衡地分配，会削弱联邦区以外地区对医盟的支持，同时让我们有机会在首都遏制这场运动。”"
 MEX_Ordaz_DS.19.a: "“向11月20日医院派遣军医。”"
 MEX_Ordaz_DS.19.b: "“派军医到每家参与罢工的医院去。”"
 MEX_Ordaz_DS.20.t: "对症下药"
 MEX_Ordaz_DS.20.desc: "哈雷尼奥医生的心脏怦怦直跳，眼看着士兵们朝11月20日医院外的抗议纠察线逼近。当他与一名身着制服的暴徒正面相对时，双手愈发紧紧攥住了横幅的旗杆。那名士兵猛地从他手中夺过横幅，随即一记凶狠的左勾拳砸来，医生踉跄着摔倒在地。\n\n过了好一会儿，他才站起身揉了揉头。士兵们早已强行冲破人群，闯入了医院大楼。没过多久，他们就开始把留守维持基本医疗服务的少数医生拖拽出去。与此同时，越来越多的记者围在一旁，像秃鹫盘旋在尸体上空般注视着这一切。\n\n第二天，哈雷尼奥医生没有去参加抗议。他可不愿冒着损害健康、失去自由的风险，在军队面前公然示威。去杂货店的路上，他停下脚步，想从报摊买一份当天的报纸。《环球报》的头版标题瞬间吸引了他的目光：\n\n“军队为民众恢复医疗服务”。标题下方，照片里的士兵面带微笑，正给一名患者注射一整根针管的药剂。文章洋洋洒洒，通篇颂扬士兵们的 “英雄事迹”——在医生们拒绝履职时，是他们挺身而出为患者诊治。“嘿！”报摊老板娘敲了敲医生面前的柜台，“买了再看，不买就放回去。”"
 MEX_Ordaz_DS.20.a: "哈雷尼奥医生递给女人几个比索，之后消失在街角。"
 MEX_Ordaz_DS.21.t: "康复期"
 MEX_Ordaz_DS.21.desc: "库埃纳瓦卡，一群医生紧紧靠拢在一起，看着一小队士兵朝他们的示威队伍行进。这些军人全副武装，头盔下满脸怒容。没有医生愿意与他们发生冲突。当驱散令下达时，医护人员交换了一下眼神，随即服从了命令。\n\n普埃布拉，一名军医让一个小男孩卷起袖子。他仔细检查男孩手臂上呈圆形、带有鳞屑的皮疹。男孩想去抓挠，军医一把拍开了他的手。“看这样子像癣，很难受——”男孩的母亲瞪了他一眼。“这病可不好根治。”\n\n莱昂，一名中尉在一排排病历柜中翻找着，他要找的是加尔万夫人的档案。医生那潦草难辨的连笔字，实在让人无从下手。\n\n瓦哈卡，一名建筑工人坐在医院大厅里，努力让自己的手臂保持不动。那条胳膊又肿又痛，几乎可以肯定是骨折了。时间一分一秒地过去。上次停工时，胡里奥在工地上扭伤了脚踝，足足等了一个多小时才轮到就诊。而这次，仅仅过了二十分钟，一名身着军装的男子就从一扇门后走了出来，邀请他进去接受治疗。"
 MEX_Ordaz_DS.21.a: "全国各地的医院都恢复了工作秩序。"
 MEX_Ordaz.118.t: "恶化"
 MEX_Ordaz.118.desc: "联邦安全局\n联邦区\n主题：恰帕斯州农民暴力事件\n\n据近期报告，恰帕斯州农民发起的反地主抗议活动已演变为暴力冲突。此类异议最近期的表现形式，是农民袭击了一名恶名昭彰的地主的种植园。该地主与其佃户此前多次发生明显冲突，最终其财产遭洗劫后被纵火焚毁。\n\n本局目前掌握的相关信息多数未达联邦安全局的情报标准。我们可证实的情况仅包括：地主的财产遭到袭击并被烧毁，其雇佣工人多人受伤。该地主现坚称该地区存在社会主义起义风险，但农民采取此次行动的具体动机仍不明确。\n\n我们已逮捕上述事件的部分头目，并正密切监控整体局势，以确保秩序稳定。然而，关于该州是否已出现初期社会主义叛乱，目前仅能依据地主的单方面不可靠证词作为佐证，因此现阶段实施戒严状态的合理性存疑。\n\n尽管如此，镇压一切形式的叛乱活动仍是本局最高优先级任务。恳请指示后续行动方案。\n\n敬上，\n恰帕斯州联邦安全局负责人\n埃斯坦尼斯劳·马丁内斯·马丁内斯上校"
 MEX_Ordaz.118.a: "立刻转呈总统。"
 MEX_Ordaz.118.tt:0 "上校——我们绝不冒险。军队将出动；哪怕是农民颠覆的苗头也必须掐灭。——迪亚斯·奥尔达斯"
 MEX_Ordaz_DS.14.desc: "组织罢工的漫长一天过后，实习医生费迪南德双眼沉重，小心翼翼地用钥匙打开了他那间公寓的前门。这地方虽不起眼，却是真正属于他的家——它坐落于墨西哥城棋盘般规整的街区中心，出行十分便捷。一进门，他便将背包、外套和鞋子放到了指定位置。他的公寓小得几步就能走遍，因此每样东西都必须各归其位，才能让他感受到一丝条理。厨房和客厅之间并无明确分界，更像是一种模糊的区域划分。\n\n卸下一身外界的疲惫与重担，费迪南德径直走向功能简洁的厨房。头痛如钝器敲击般隐隐作痛，仿佛有人用橡皮锤在轻轻敲打他的颅骨。在11月20日医院外抗议示威的数个小时耗尽了他的体力。他猛灌下一杯水，清凉的液体舒缓了他因数小时不停演讲而干涩刺痛的喉咙。仍专注于补充水分的他，伸手去够身旁的落地灯——这是昏暗房间里他唯一的光源。\n\n费迪南德后颈的汗毛瞬间竖起。他的灯不在原处。他定睛扫视房间，发现落地灯被挪到了另一个角落。一定有哪里不对劲。他清楚记得自己从未动过灯的位置。他的喉咙再次发紧，一阵燥热涌上心头，心沉到了谷底。但异常还不止于此。打开灯后，他仔细搜查了整个公寓：家具被挪动过，浴室的灯亮着，而他所有的家庭照片都被整齐地排成一列，摆放在他的小书桌上。\n\n费迪南德双手颤抖着关上窗户——这扇窗平日里为了保温总是紧闭着，此刻却大开着，正对着远处的一处屋顶。最初的恐慌渐渐平息，疲惫不堪的他不得不直面那个显而易见的结论：有人闯进过他的家。他强撑着睡意躺下，竭力说服自己，街对面那盏灯不过是幻觉。"
 MEX_el_titan_phrase_one_third: "泰坦巨人的专横初见端倪。"
 MEX_el_titan_phrase_two_thirds: "泰坦巨人的专横不容小视。"
 MEX_el_titan_phrase_three_thirds: "泰坦巨人的专横暴露无遗。"
 MEX_el_titan_extremely_low_increase:0 "泰坦巨人的£GFX_MEX_el_titan_texticon §W专横§!将略微§O增加§!。"
 MEX_el_titan_very_low_increase:0 "泰坦巨人的£GFX_MEX_el_titan_texticon §W专横§!将些许§O增加§!。"
 MEX_el_titan_extremely_low_decrease:0 "泰坦巨人的£GFX_MEX_el_titan_texticon §W专横§!将略微§Q降低§!。"
 MEX_el_titan_very_low_decrease:0 "泰坦巨人的£GFX_MEX_el_titan_texticon §W专横§!将些许§Q降低§!。"
 MEX_the_olympian_spirit_tt: "洛佩斯·马特奥斯将倾其§G所有§!办好§m奥运会§!。"
 MEX_stabilize_development: "稳定发展"
 MEX_stabilize_development_desc: "过去十年，经济增长与通货膨胀引发了剧烈波动。若任由事态如此发展，墨西哥普通民众将无力购置基本生活物资；倘若这种局面持续过久，革命制度党自身的存续根基都将岌岌可危。\n\n奥尔达斯总统将通过政府政策调控通货膨胀。若施策得当，这不仅能确保经济发展平稳推进，更能避免蓬勃发展的中产阶级薪资被通货膨胀蚕食。事实上，这也将是对近年来“稳中向好”模式的延续。"
 MEX_Ordaz.9.t:0 "古斯塔沃·迪亚斯·奥尔达斯总统\n阁下的内阁"
 MEX_Ordaz.9.desc:0 "内政部长：路易斯·埃切维里亚·阿尔瓦雷斯\n外交部长：安东尼奥·卡里略·弗洛雷斯\n国防部长：马塞利诺·加西亚·巴拉甘\n海军部长：安东尼奥·巴斯克斯·德尔梅尔卡多\n公共工程部长：吉尔伯托·巴伦苏埃拉\n国家资产部长：阿方索·科罗纳·德尔·罗萨尔\n工业和商业部长：奥克塔维奥·坎波斯·萨拉斯\n农业和畜牧业部长：胡安·希尔·普雷希亚多\n水利资源部长：何塞·埃尔南德斯·特兰\n通讯和运输部长：何塞·安东尼奥·帕迪利亚·塞古拉\n公共教育部长：阿古斯丁·亚内斯\n卫生与援助部长：拉斐尔·莫雷诺·瓦列\n劳工与社会福利部长：萨洛蒙·冈萨雷斯·布兰科\n财政与公共信贷部长：安东尼奥·奥尔蒂斯·梅纳\n总统秘书：埃米利奥·马丁内斯·马纳托"
 MEX_Ordaz.9.a:0 "古斯塔沃·迪亚斯·奥尔达斯·博拉尼奥斯总统"
 MEX_assigned_to_antarctica: "Assigned to Antarctica"
 MEX_assigned_to_antarctica_desc: "Somehow, despite repeated defeats, humiliations, and corrections, that clique of Japanophile technocrats under Salinas still haunts the government under the Ordaz administration. This should not be permitted to continue; it is best to find a way to simultaneously elevate and castrate this threat.\n\nLet us assign Salinas and his allies to political dead-end postings in the deep south of the country, far away from their usual base of power. Though their skills will be of great economic utility, they will never be able to profit from them politically. They will learn firsthand the meaning of the dictum \"Responsibility without power — the prerogative of the eunuch throughout the ages.\""