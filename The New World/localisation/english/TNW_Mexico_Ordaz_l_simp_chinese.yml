 MEX_Ordaz.45.t:0 "下一代"
 MEX_Ordaz.45.desc:0 "经过一整天的会议和总统简报，总统奥尔达斯已是疲惫不堪。他本来只想独自待在办公室里休息片刻，但还有一个人必须见他。\n\n国家民生物资公司由洛佩斯·马特奥斯创立，一直以来为贫困家庭提供补贴食品，备受好评。如今，这家公司需要一位新的负责人。人选已定，是来自墨西哥州的一位前国会议员。此次会面是正式任命前的最后一步。\n\n“欢迎，卡洛斯·汉克·冈萨雷斯学士，”奥尔达斯开口说道，“你的名字挺独特的。”\n\n“我父亲是德国人，”汉克·冈萨雷斯平静地回答。\n\n奥尔达斯微微点头，随即问道：“那么，你为什么想要担任国家民生物资公司的负责人？”\n\n汉克·冈萨雷斯直视着奥尔达斯的双眼，毫不退缩。“总统阁下，我唯一的愿望是为有需要的人提供食物，为民众服务。领导这个重要项目是一项重大责任，我绝不会掉以轻心。”\n\n奥尔达斯挑了挑眉。眼前这个年轻人雄心勃勃，他是否真心为民服务，奥尔达斯心中打着问号。然而，党内的支持让汉克·冈萨雷斯成为最佳候选人。即便他在任期间搞些小动作，也大概不会影响项目的整体运作。\n\n“好吧，汉克·冈萨雷斯，这个职位是你的了。”"
 MEX_Ordaz.45.a:0 "革命制度党永远需要新鲜血液。"
 MEX_Ordaz.46.t:0 "部长之争"
 MEX_Ordaz.46.desc:0 "总统奥尔达斯惊讶于自己在内阁会议中的角色变化。担任内政部长时，他总是深度参与讨论，提出自己的主张，与对手们据理力争。而如今，他更多地是沉默旁观，置身于争论之外，等待做出最终裁决的时刻。\n\n“我们在汽车行业投入了几十年的资金，但大多数墨西哥人依然买不起车。”工商部长奥克塔维亚诺·坎波斯·萨拉斯说道，“我的前任劳尔·萨利纳斯·洛萨诺制定了所有汽车必须使用本地制造零部件的规定，这一直是美国公司不满的来源。如果我们取消这些规定，汽车价格将会显著降低。”\n\n“恕我直言，”财政与公共信贷部长安东尼奥·奥尔蒂斯·梅纳打断道，“这项规定背后有着充分的理由。我们的本土汽车制造商需要保护，以抵御来自美国同行的竞争。工业化是一个漫长而艰难的过程，稳定性至关重要。贸然取消这些规定，可能会毁掉我们几十年来的进展。”\n\n“梅纳部长，我觉得你忽略了灵活应变的重要性。”坎波斯·萨拉斯反驳，“灵活性是我们经济政策的关键。我们需要抓住新的机会。现在我们有一个帮助墨西哥消费者的绝佳契机，但如果我们不做出让步，美国人是不会合作的。”\n\n奥尔达斯举起手，示意双方停下争论。“谢谢你们的意见，先生们，但我认为答案已经很清楚了……”"
 MEX_Ordaz.46.a:0 "“该废除这条规定了。”"
 MEX_Ordaz.46.b:0 "“这条规定应该保持不变。”"
 MEX_Ordaz.46.c:0 "“我们将取消本地零部件的规定，作为降低关税的交换条件。”"
 MEX_Ordaz.47.t:0 "最完美的计划"
 MEX_Ordaz.47.desc:0 "奥克塔维亚诺·坎波斯·萨拉斯坐在办公室里，翻阅着早报，漫不经心地浏览着头条新闻。他的心不禁为北方正在发生的事而揪紧。与美国的贸易谈判陷入僵局，无论墨西哥如何让步，美方在关税问题上却始终不肯退让。\n\n他的思绪被一个醒目的头条打断了：\n\n政府将结束对汽车行业的保护——知情人士透露，政府正计划取消要求所有在墨西哥销售的汽车必须使用本地制造零部件的规定。这一变化是与美国就关税问题进行谈判的一部分……\n\n坎波斯·萨拉斯立刻陷入了猜测，这次泄密的幕后黑手是谁？是他自己办公室里的人，还是美方谈判代表？抑或是奥尔蒂斯·梅纳为了报复而故意放出的风声？\n\n然而，很快他意识到，这些都已经不再重要。新闻已经曝光，危机已然迫在眉睫。实业界和墨西哥工人联合会必定会群情激愤，他必须设法平息这些怒火。公众对汽车行业的信心也可能受到打击，甚至导致投资的撤出。\n\n坎波斯·萨拉斯站起身来，准备离开办公室。他叹了口气，安静的阅读时光戛然而止，迎接他的是一整天紧张且漫长的危机会议。"
 MEX_Ordaz.47.a:0 "所有这些反对声浪，最终却都无济于事。"
 MEX_Ordaz.48.t:0 "互利共赢"
 MEX_Ordaz.48.desc:0 "奥克塔维亚诺·坎波斯·萨拉斯站在办公室窗前，眺望着初升的朝阳。俯瞰着脚下的城市，他思索着北方的贸易谈判。尽管形势日益严峻，但他对即将到来的突破充满希望。\n\n突然，电话铃声响起，打断了他的思绪。他接通电话，是墨西哥驻华盛顿大使乌戈·B·马加因的声音。\n\n“坎波斯·萨拉斯部长，美国人同意大幅削减关税了！尽管部分国会议员反对，但我们的提议对汽车公司来说极具吸引力，他们的游说团最终赢得了这场战斗。很快就会达成一项正式协议，将削减关税与我们取消保护主义的措施挂钩。”\n\n“太好了！祝贺你和你的团队，你们一如既往地表现出色。我会亲自把这个好消息告诉总统。”\n\n坎波斯·萨拉斯面带微笑，迈步走向奥尔达斯的办公室。他与总统在许多问题上早已达成共识，如今有了这项新的成就，奥尔蒂斯·梅纳在反对他的计划时也不得不三思而行。"
 MEX_Ordaz.48.a:0 "水涨船高。"
 MEX_Ordaz.49.t:0 "最后的话语"
 MEX_Ordaz.49.desc:0 "最新一期《经济季刊》上的一篇文章引发了广泛关注。这本期刊是国内历史最悠久的经济杂志，鉴于文章的潜在煽动性，政府不得不高度重视。\n\n文章的作者劳尔·萨利纳斯·洛萨诺为自己推行的保护主义政策进行了辩护，声称这些政策对墨西哥工业的发展起到了积极作用。尤其是他详细论述了要求所有在墨西哥销售的汽车必须使用本地制造零部件的规定。凭借最新数据，萨利纳斯强调这一政策取得了显著的成功。\n\n随后，萨利纳斯针对这一规定即将被废除的消息做出了强烈回应。他详细分析了这一决定将对墨西哥经济带来的负面影响，并毫不避讳地将责任直接归咎于奥尔达斯总统。在文章的结尾，萨利纳斯毫不掩饰地批评总统，暗示他因私人恩怨而忽略了国家的长远利益。\n\n尽管经济类期刊的影响力通常局限于学术界，这篇文章却在社会上引起了不小的反响。大学生和受过教育的中产阶级对萨利纳斯的观点尤为认同，尤其是对奥尔达斯总统的批评。在许多人看来，这篇文章仿佛印证了他们对现届政府的失望和质疑。"
 MEX_Ordaz.49.a:0 "那条毒蛇还嫌自己造成的伤害不够吗？"
 MEX_Ordaz.50.t:0 "惊险一刻"
 MEX_Ordaz.50.desc:0 "安东尼奥·奥尔蒂斯·梅纳难得离开了办公室，尽管他更希望自己有更重要的事要做。此刻，他正在墨西哥城最昂贵的餐厅之一，与一群顶尖实业家共进午餐。\n\n在几场无趣的谈话中，一位汽车制造商趁机想要引起他的注意。“奥尔蒂斯·梅纳学士，很高兴您能来！下次再为我们向总统求情时，记得提前通知我，到时候这顿饭我包了！”\n\n梅纳微微一笑。“如果真是那样，你现在就该请客了。要不是我，你恐怕已经损失不少了。”\n\n那位实业家的笑容僵在脸上。“……您这是什么意思？”\n\n“坎波斯·萨拉斯学士正在推动取消所有汽车必须使用本地制造零部件的规定。他几乎说服了总统，但我成功让奥尔达斯打消了这个念头。”\n\n房间内瞬间安静下来，众人屏息倾听。那位汽车制造商脸色骤变，慌乱地说：“失陪一下，我得马上联系工商部长。”\n\n随着人群逐渐散去，梅纳再次露出一丝冷笑。面对即将到来的巨大压力，坎波斯·萨拉斯恐怕会在动摇萨利纳斯政策之前再三掂量。"
 MEX_Ordaz.50.a:0 "部长们来来去去，而实业常存不衰。"
 MEX_Ordaz.52.t:0 "追逐落日"
 MEX_Ordaz.52.desc:0 "作为工商部长，奥克塔维亚诺·坎波斯·萨拉斯的首要任务就是掌握当前的经济形势。当他翻阅着一堆报告、报纸和数据表时，一个问题愈发明显：日本的投资停滞不前。\n\n“我知道日本刚刚经历了一场经济危机，但他们对墨西哥兴趣的减弱可能会对我们的经济增长造成重大影响。”他对办公室的工作人员说道，“大家有什么建议吗？”\n\n一名助手走上前：“我们是否可以减少对日本的依赖，转而寻求其他国家的投资？奥尔达斯总统显然更倾向于与美国加强贸易关系。”\n\n坎波斯·萨拉斯叹了口气：“我赞同总统的方向，但我不确定美国能否提供足够的支持来填补这些投资空缺。”\n\n“要不考虑提供一揽子补贴？”另一位助手建议道，“如果他们对这里的经济环境不满意，我们可以提供一些吸引人的条件。”\n\n“也许能奏效，但会引发不少反感，无论是公众还是美国方面都会不满。”坎波斯·萨拉斯回应道。\n\n在仔细考虑了众人的建议后，坎波斯·萨拉斯脑中闪过一个想法。劳尔·萨利纳斯·洛萨诺在日本的大型企业中建立了广泛的人脉网。尽管萨利纳斯通常希望看到奥尔达斯的政策失利，但这次事关国家经济的繁荣，他或许愿意提供帮助。"
 MEX_Ordaz.52.a:0 "优先吸引美国投资"
 MEX_Ordaz.52.b:0 "一些恰当的诱因，足以重新引来日元的流入。"
 MEX_Ordaz.52.c:0 "萨利纳斯的人脉可能会带来转机。"
 MEX_Ordaz.53.t:0 "连锁反应"
 MEX_Ordaz.53.desc:0 "“30分，谢谢，祝您今天愉快！”\n\n安妮塔目送着建筑工人们走回工地，心中浮现一丝满足的笑意。在瓜达拉哈拉做街头小贩通常只能勉强糊口，但现在，她的境遇正在悄然改善。一家日本公司在附近新建工厂，给她带来了稳定的顾客群体。\n\n多出来的生意令她心怀感激，但安妮塔知道，这只是个开始。不久之后，工厂将雇佣数百名工人，每天辛劳下班的他们会饥肠辘辘，而口袋里揣着薪水。想到这份稳定的收入将为自己带来的新希望，安妮塔不禁幻想，或许有朝一日她甚至可以存够钱，与家人一起开一家属于自己的小餐馆。\n\n那天下午，一群日本高管来到工地视察。他们与工头进行了短暂而紧张的会面，随后，施工提前结束。第二天，工地上没有了施工的声音。再过一天，有人开始拆除设备。到了周末，工地大门紧闭，围栏上贴出了一则告示：\n\n由于不利的商业环境，我们将缩减在该地区的运营。此工厂的建设将暂停，直至另行通知。\n\n安妮塔沉重地推着小车，离开冷清的工地，走向熙攘的市区街道。她将如往常一样，在烈日下坚持经营，努力争取每一笔生意，但心中曾燃起的希望之光，如今已悄然熄灭。"
 MEX_Ordaz.53.a:0 "看似美好的事情，总归是镜花水月。"
 MEX_Ordaz.54.t:0 "来自北方的风暴"
 MEX_Ordaz.54.desc:0 "奥克塔维亚诺·坎波斯·萨拉斯捏了捏鼻梁，心中不禁反思，为何当初决定为日本公司提供补贴。来自大东亚共荣圈的投资的确有所增长，但随之而来的是美国的强烈反弹。\n\n如今，他的办公室被愤怒的商人电话轰炸，美国报纸更是将他斥为“日本人的傀儡”。必须采取应对措施了。坎波斯·萨拉斯戴上眼镜，开始查看团队为他准备的应对方案。\n\n第一个方案建议给予美国公司同等待遇，也就是说，他们将享有与日本公司相同的优惠条件。这一举措无疑会受到北方的欢迎，但坎波斯·萨拉斯不禁怀疑，墨西哥是否能承受为如此多外国公司提供特殊待遇的经济成本。\n\n他翻到第二个方案，这是一套较为温和的补贴计划。美国企业在墨西哥早已享有相当优越的地位，他们的愤怒多半是被放大了。坎波斯·萨拉斯相信，即便是较小的优惠方案，美国企业应该也能勉强接受，尽管抱怨声不可避免。\n\n坎波斯·萨拉斯反复思量着这两个方案，但内心深处，他不禁怀疑，是否从一开始他们的思路就错了。美国在墨西哥一直享有特殊的经济特权，每当墨西哥试图引入其他国家以平衡这一影响时，美国总是强烈反对。以往的墨西哥政府往往在压力下屈服，但或许现在，是时候真正站出来，为国家的经济主权而战了。"
 MEX_Ordaz.54.a:0 "平等待遇，才是公平之道。"
 MEX_Ordaz.54.b:0 "让他们保持沉默的一些诱惑。"
 MEX_Ordaz.54.c:0 "为了讨好扬基佬，我们已经精疲力竭了。"
 MEX_Ordaz.55.t:0 "请教专家"
 MEX_Ordaz.55.desc:0 "奥克塔维亚诺·坎波斯·萨拉斯坐在电话前，犹豫不决。联系前任总统候选人萨利纳斯·洛萨诺，这个几乎从奥尔达斯手中夺走总统宝座的人，无疑是个冒险之举。但他需要一个在日本商业界有深厚联系的人，而萨利纳斯正是那位关键人物。平复心情后，坎波斯·萨拉斯拨通了电话。\n\n“下午好，萨利纳斯学士。我遇到了一些难题，希望能向您请教一二。”\n\n“坎波斯·萨拉斯部长！”萨利纳斯愉快地回应，“接到您的电话真是意外之喜。我非常乐意提供帮助。”\n\n不错的开端，坎波斯·萨拉斯暗自庆幸。“最近日本的外资投入明显减少，我担心如果不能把他们吸引回来，墨西哥的经济增长将会受到重创。我知道您在共荣圈有广泛的关系，不知是否认识有兴趣在墨西哥投资的企业？”\n\n“需要一些潜在的日本投资者？这不难，我这就查查手头的记录。”萨利纳斯的声音听起来充满自信。\n\n电话那头传来翻找文件的声音，坎波斯·萨拉斯几乎不敢相信事情进展如此顺利。\n\n片刻后，萨利纳斯重新接过话筒。“好了，我这里有几位三菱的高管，他们或许有点兴趣。还有一些古河电气的联系人。此外，我也有几家大阪公司的资源，您可以尝试接触一下。我还可以从其他共荣圈国家那里找一些投资者。”\n\n“这真是太好了！请尽快把这些信息发到我的办公室。非常感谢你，劳尔，我真是欠你一个大人情。”看来这通电话取得了意想不到的成果。"
 MEX_Ordaz.55.a:0 "有求必应。"
 MEX_Ordaz.56.t:0 "隔墙有耳"
 MEX_Ordaz.56.desc:0 "“……谢谢你，劳尔，我真的欠你一个人情。”嘟——\n\n费尔南多·古铁雷斯·巴里奥斯松开了录音机的按钮。“这只是个开始。那一周，他又给萨利纳斯打了两次电话，并且在接下来的两个月里一直保持联系。”\n\n“有意思……”房间里唯一的另一位成员，路易斯·埃切维里亚，低声说道，“坎波斯·萨拉斯学士还有其他我该知道的联系人吗？”\n\n“没有，萨利纳斯是唯一值得注意的对象。”古铁雷斯·巴里奥斯回答道。\n\n埃切维里亚没有问联邦安全局局长是如何获取到坎波斯·萨拉斯的私人通话录音的。他很清楚，如果联邦安全局想监听一个房间，他们一定会无声无息地做到。\n\n古铁雷斯·巴里奥斯将录音带从录音机中取出，递给内政部长。“既然你有了这个，你打算怎么处理？”\n\n埃切维里亚嘴角泛起一丝冷笑。“我想奥尔达斯总统会很乐意知道，工商部长在空闲时间都在和谁打电话，你说呢？”"
 MEX_Ordaz.56.a:0 "没有永远藏着的秘密。"
 MEX_Ordaz.57.t: "墨西哥的失落之城"
 MEX_Ordaz.57.desc: "房间里弥漫着烟雾，党员们来回穿梭，享用着旁桌上的食物和饮品。最后一位发言者从讲台上走下，迎来了礼貌的掌声，但掌声背后充满了冷漠。他的演讲不过是些空洞的理想，只为了在党内的权力游戏中攀升一步。德尔·罗萨尔也拍了拍手，但神情冷峻，如石雕般僵硬，对大多数发言者，他的态度都是如此。\n\n就在这时，他从余光里看到埃内斯托·乌鲁丘尔图·佩拉尔塔正迈步走向讲台，也就是所谓的“铁腕摄政”，前联邦区行政长官，他似乎在酝酿着一场不小的发言。德尔·罗萨尔的注意力却大多落在墙上的时钟上，计算着这场会议还剩下多少时间。他还有更重要的事情需要操心，而不是在这里浪费时间，听一群官僚发表对国家发展的空洞建议。但在剩下的一个小时里，他决定重新关注乌鲁丘尔图的演讲。\n\n“——从农村涌入首都的都市移民潮已经彻底失控，他们正以前所未有的速度蚕食着墨西哥城，对政府来说，这种情况根本无法承受。”乌鲁丘尔图语气激烈，“这些移民正在把我们的首都变成贫民窟，创造一个个失控的犯罪温床。更糟糕的是，流浪汉和无业游民挤满了公园和街道，让我们的城市面目全非。这些人不仅威胁着市民的安全，更有可能在我们迎接奥运会前，把首都的形象彻底搞垮。”\n\n德尔·罗萨尔简直不敢相信自己的耳朵。乌鲁丘尔图竟敢在此痛斥这些问题？他自己不正是这一切的推手之一吗？这番言辞究竟意欲何为？震惊很快被愤怒取代。他知道，此事不能再拖，必须立刻处理。"
 MEX_Ordaz.57.a: "是时候联系总统了。"
 MEX_Ordaz.58.t: "解决贫民窟问题"
 MEX_Ordaz.58.desc: "奥尔达斯站在前厅，注视着三位部长的车子驶入松林别墅的车道。看到他们彼此打了招呼后走向大门，他心中暗自满意。一旦解决了这个问题，他的政府就能腾出手来处理更为重要的事务。\n\n奥尔达斯领着他们走进了会客室，边走边开口道：“欢迎，部长们。你们都清楚今天召集你们来的原因；乌鲁丘尔图在党内会议上提出的贫民窟问题已经无法忽视。如果我们不正视并解决这个问题，就会显得政府软弱无能。那么，先生们，你们的应对方案是什么？”\n\n德尔·罗萨尔毫不犹豫地说道：“我认为埃切维里亚部长应该公开谴责乌鲁丘尔图。他的言论已经逾越了自己的权力范围，必须立刻遏制。”\n\n“将军，我理解您的立场，”埃切维里亚迅速回应，“但我们必须承认，乌鲁丘尔图的发言指出了一些现实问题。墨西哥城的治安状况确实急需更多的资金和资源支持。我相信我们可以找到一种既能解决问题，又不会损害政府形象的方法。”\n\n奥尔达斯的目光转向马瑙托。“那么你呢，部长？你怎么看？”\n\n马瑙托沉思片刻，慎重答道：“我认为我们需要更加谨慎，而不是单纯地在街头增加警力，这样做只会激化问题。虽然加强治安可以暂时缓解局面，但我们必须找到更加温和且长远的解决方式。”\n\n奥尔达斯静静地看着他们，心中思量着每个人的提议。他十分清楚，这个问题绝不能成为绊住他政府前进的障碍。思索片刻，答案对他来说已是再清晰不过。"
 MEX_Ordaz.58.a: "“谴责乌鲁丘尔图，此事不应再被提及。”"
 MEX_Ordaz.58.b: "“加强墨西哥城的治安，我们绝不能冒险。”"
 MEX_Ordaz.58.c: " “不要慌张。可以用更温和的手段达成目的。”"
 MEX_Ordaz.59.t: "一切安好"
 MEX_Ordaz.59.desc: "“你听说乌鲁丘尔图的事了吗？”埃利亚斯压低声音问道。他和拉蒙正在联邦区的办公室里整理文件。\n\n“闭嘴吧。”拉蒙低声回道，环顾四周，确认了一下没有人在窃听。办公室里静悄悄的，大部分员工早已下班，只有几个人还在收尾工作。\n\n“但你肯定听说了，对吧？”埃利亚斯又问，语气急切。看到拉蒙微微点头，他接着说：“听说批评很严厉，还有不少威胁的言论传出来了，如果那些流言可信的话。”两人沉默地整理完一个箱子，将其放上架子，然后又拿下另一个，继续清理。\n\n“埃利亚斯，信不信这些流言根本不重要。”拉蒙再次四下张望，小心翼翼地说。“谈论这些事情只会给自己惹上麻烦。”\n\n“可他讲的都是事实！你没看到这个城市的贫民窟越来越多吗？里面都是些乡下来的——”\n\n“你想听我说什么，埃利亚斯？承认这一切都是真的吗？我们都知道这是真的！我们都明白为什么街上到处是乞丐和流浪汉。每天都有抢劫、袭击的报告，罪犯逃进贫民窟，藏身在那些破旧的棚屋里避开追捕。但这些并不重要。我们只能低头闭嘴，不要在报告里提这些事，不然我们的下场会比乌鲁丘尔图更惨。他不过是被训诫了几句，你觉得我们会面临什么？所以，闭嘴吧，继续整理这些文件。”"
 MEX_Ordaz.59.a: "如果没人说话，或许问题就会自己消失。"
 MEX_Ordaz.60.t: "清理首都"
 MEX_Ordaz.60.desc: "奥尔达斯对联邦区日益严重的犯罪问题感到忧心忡忡。他转身看向路易斯·埃切维里亚，说道：“首都的安全是重中之重。你有什么建议？”\n\n埃切维里亚带着一丝不祥的笑容，提出了他的方案。“那些在城市周边不断扩张的贫民窟，是现有执法力量的重大盲区。在这些地区建立警察存在，并配合联邦安全局的支援，可以有效填补这个空白。”\n\n奥尔达斯点了点头，表示理解。马瑙托见状，意识到总统此时只想听取安全方面的建议，于是选择了沉默。而德尔·罗萨尔则迅速指出了内政部长计划中的缺陷。\n\n“在贫民窟加强警力会导致我们的人力过于分散，结果反而会适得其反。别忘了，那些是非法占地，不属于联邦区的正式管辖范围。我们的警力应该集中在市中心和其他关键区域，优先保护重要目标。”\n\n埃切维里亚冷冷地瞥了德尔·罗萨尔一眼。“将军，你真的愿意让那些失落之城完全处于无警力管控的状态吗？”\n\n“我认为我们应该集中力量保护那些犯罪最猖獗的地区。如果这意味着贫民窟得不到关注，那也无可奈何。”\n\n奥尔达斯见两人争论不休，终于打断道：“我听到了你们的意见，但我们只能选择一个方向。我认为我们应该把重点放在……”"
 MEX_Ordaz.60.a: "“……市中心。”"
 MEX_Ordaz.60.b: "“……失落之城。”"
 MEX_Ordaz.61.t: "祸根"
 MEX_Ordaz.61.desc: "出乎埃切维里亚和德尔·罗萨尔意料，奥尔达斯把注意投向了埃米利奥·马丁内斯·马瑙托。“我同意在这种情况下采取更温和的方式是明智的。你有什么建议？\n\n马瑙托眉开眼笑。“我们可以采取一些措施来缓解农村人口外流的影响，不过这治标不治本。农民正以前所未有的速度离村进城，墨西哥城无法容纳他们所有人。我们需要引导这些移民前往其他更有能力应对人口涌入的城市。”\n\n奥尔达斯聚精会神地听着，埃切维里亚意识到自己的想法不受欢迎，便悄悄地退下了。而德尔·罗萨尔则感觉到总统的注意力正在分散，于是试图拉回他的注意力。\n\n“把移民转移到其他城市行不通，”他急忙说，“墨西哥城是国家的心脏，也是找工作的最佳地点，所以才有这么多农民来这里。我们应该利用我们的资源扩大公共住房的建设，这样新来的移民就不会被迫侵占土地了。”\n\n“我理解你的意思，将军，”马瑙托扬了扬眉毛，“但是您确定联邦区有足够的资源来如此大规模地扩建公共住房吗？”\n\n“是的，”他答道，“我会亲自负责。”\n\n两人都望向沉默不语的总统，奥尔达斯权衡了两种选择的利弊，最后说……"
 MEX_Ordaz.61.a: "“其他城市也得分担压力。”"
 MEX_Ordaz.61.b: "“扩建公共住房可行。”"
 MEX_Ordaz.62.t: "猛然惊醒"
 MEX_Ordaz.62.desc: "阿尔韦托沿着查普尔特佩克大道缓缓前行，仔细观察着周围的景象。这是一条美丽的街道，宽阔的人行道两旁点缀着花坛。然而，除了坚硬的水泥和泥土，没有一个能容身的地方。于是，他继续向前走着。\n\n距离阿尔韦托从格雷罗乘坐巴士来到这里还不到一个星期。他原本希望能很快找到工作和栖身之所，但命运并没有眷顾他。饥饿感不断折磨着他，他在街头无助地徘徊。终于，他来到了一处小公园，那里有几张坚固的木制长椅。他蜷缩在长椅上，试图保持温暖，慢慢进入了梦乡。\n\n几个小时后，阿尔韦托被突如其来的压迫感惊醒。他的头被某种布料或袋子罩住了。当他试图挣脱时，胸口猛然挨了一击，呼吸瞬间变得困难。他随即被强力拖拽，重重摔在了冰冷坚硬的金属地板上。\n\n剧烈的颠簸让阿尔韦托意识到自己在一辆车里。他挣扎着想要站起身，却再次被击中，这次是头部，感觉像是被一只坚硬的靴子狠狠踢中。袭击者接二连三地向他施暴，痛苦瞬间淹没了他对饥饿与疲惫的感知。\n\n车子终于停了下来，罩在他头上的布料被粗暴地扯下，阿尔韦托被推到了街上。当他逐渐适应刺眼的光线时，映入眼帘的是四周破败不堪的建筑。这还是墨西哥城吗？如果是，那这里一定是他从未见过的阴暗角落。\n\n他转身，立刻被手电筒的强光刺得睁不开眼。他看不清袭击者的面孔，只见他们身穿警察制服。\n\n“识相点，”其中一个人大声吼道，“别再回来！”话音刚落，他们便关上车门，扬长而去，消失在夜色中。"
 MEX_Ordaz.62.a: "那些淤青将让他铭记于心。"
 MEX_Ordaz.63.t: "搬进来住"
 MEX_Ordaz.63.desc: "伊斯塔帕拉帕区外的失落之城，到处是废弃物和杂乱的建筑材料。这片因非法占地而起的贫民窟，简陋的房屋连最基本的设施都没有。贝伦和玛尔塔穿行其中，对周围的一切视若无睹，这就是她们从小就习惯的生活。\n\n“我已经一个多星期没见到迭戈了，”玛尔塔担忧地说道，“希望他没事。”\n\n“哦？这儿有人在担心她的男朋友呢？”贝伦调侃道。\n\n“他才不是我男朋友！我只是关心他而已，换了谁都会担心的。”\n\n“不过说实话，确实挺奇怪的，”贝伦接着说，“感觉最近我们这里的混混和不良青年都消失了不少。会不会跟那些新来的人有关？”\n\n贝伦指向街区尽头的一座房子，那栋房子和其他破败的房屋隔着一道围栏，显得格格不入。最近，这所房子被一群开着黑色面包车的人接管了，车子总是频繁进出。\n\n贝伦看到那个常卖零食给她们的小贩，便随口问道：“先生，您知道那所房子里发生了什么吗？”\n\n小贩的脸色顿时阴沉下来。“你们最好别靠近那地方。如果你们有朋友被带去那里，那已经来不及了。”\n\n玛尔塔脸色发白。“为什么？”贝伦不解地问，“那里到底发生了什么？”\n\n“我也说不清。但有时候，深夜里，我会听见里面传来尖叫声。”"
 MEX_Ordaz.63.a: "要让人们感到安全，必须先让他们感到恐惧。"
 MEX_Ordaz.64.t: "改道"
 MEX_Ordaz.64.desc: "马尔科满怀期待地走向那片尘土飞扬的空地，这里是临时的公交车站。他肩上挂着一个破旧的布袋，里面装着他所有简陋的财物。他紧握着手中仅有的积蓄，正好够买一张前往墨西哥城的车票。\n\n他不记得这个梦想是什么时候才有的，但他一直向往着离开家乡。离开那片瓜纳华托的田野，逃脱日复一日的劳作，去首都开启一段全新的、充满未知的生活。终于，他再也无法等待，决定冒险一搏，没有计划，没有积蓄，只凭一腔热血。\n\n当马尔科排队走向售票亭时，他被墙上破旧的海报吸引了。那些布满灰尘的墙壁上，海报大多已经褪色、破损，只有一张鲜艳的广告格外醒目。\n\n欢迎来到瓜达拉哈拉——现在为所有旅客提供优惠票价！\n\n马尔科盯着上面的票价，忍不住倒吸一口凉气。这价格竟然比去联邦区便宜了一半还多。如果他选择去那里……\n\n不行，他对自己说，不行。他的梦想一直都在墨西哥城，而不是其他什么次要城市。为了梦想，多花些钱是值得的。\n\n就在这时，他的肚子不合时宜地叫了起来。他脑海中浮现出自己孤身到达墨西哥城后，身无分文，夜里只能蜷缩在街角，忍受寒冷和饥饿。而如果去了瓜达拉哈拉，他至少还能用省下的钱填饱肚子，或许还能找到一个温暖的地方过夜。\n\n走到队伍前端时，马尔科已经下定了决心。"
 MEX_Ordaz.64.a: "“请给我一张去瓜达拉哈拉的车票。”"
 MEX_Ordaz.65.t: "偷工减料的街道"
 MEX_Ordaz.65.desc: "“虽然在美学和布局上相似，但这两栋建筑是为不同形状的地块设计的，因为我们仍需为人行道、停车场和各种入口预留空间。”阿方索·科罗纳·德尔·罗萨尔跟随着联邦区公共住房规划部门的工作人员，仔细查看一系列的概念图纸和蓝图。会议室几乎被各种设计稿填满，每个建筑概念都采用了流行的现代主义风格。德尔·罗萨尔利用公共住房项目的丰厚预算，聘请了最顶尖的建筑师，这些人个个都是充满理想的革新者。他们的愿望是创造出体现革命精神的住宅，摆脱传统的资产阶级风格，专注于功能性而非外表装饰。德尔·罗萨尔看着建筑师们兴奋地展示蓝图，“每栋楼单独来看都很优秀，但如果将它们组合起来，这将成为一个自给自足的综合体——一个‘城中之城’。”\n\n“那这块地方呢？”德尔·罗萨尔用手指指向布局中间一片空旷的区域。\n\n“我们打算把这里建成一个供居民使用的公共绿地。”一名工作人员带着得意的笑容回答。\n\n“没必要。”德尔·罗萨尔冷冷地说道，“人民需要的是住房，不是公园。”建筑师和工作人员的兴奋瞬间消失了，房间里顿时安静下来，但没有人提出异议。虽然失望，但他们知道反抗无用。德尔·罗萨尔扫视着房间里的每个人，他心里清楚，自己有更重要的任务。他不只是一个规划者，而是首都的管理者，每天成千上万的新移民涌入墨西哥城，迫切需要工作和住所。要解决这个问题，他必须以效率为先，而不是浪费空间来种植几棵树。"
 MEX_Ordaz.65.a: "如果人们想要亲近自然，那他们就应该离开城市。"
 MEX_Ordaz.66.t: "轻抚后背"
 MEX_Ordaz.66.desc: "联邦区摄政阿方索·科罗纳·德尔·罗萨尔匆匆忙忙穿过联邦区办公大楼的大门，他不久前才结束与奥委会的会谈，现在他只有三十分钟的时间准备与警察局长的会面。\n\n当他终于赶到他的办公室时，发现门外有一张熟悉的面孔，这张面孔他恨之入骨。\n\n“德尔·罗萨尔将军，” 埃内斯托·乌鲁丘尔图说，“再见到你非常愉快。”\n\n“你在这里干什么？”德尔·罗萨尔暴跳如雷，“你怎么进来的？”\n\n“呵呵，我在这里干了十多年了，你难道真的觉得我不能进来吗？但是不要担心，我不会在这里待太久的。我来这里给你带来了好消息。”\n\n“什么好消息？”德尔·罗萨尔怒道，想让这事赶紧结束。\n\n“凭籍你们的努力，上次党会里我提到的泛滥成灾的移民和犯罪问题基本得到了解决。这就是我想和你说的，祝贺你。”\n\n“真的？你来这里就是祝贺我的？说我干的漂亮？”\n\n“是的。”他回答，“我承认，刚开始我还不能确定你能成为一个尽职尽责的区长。但到了紧要关头，你做了一切必要的努力，让这座城市美丽的公共场所不被恶之花污染。因为你们，我的遗产能够屹立不倒。”\n\n乌鲁丘尔图伸出了手，德尔·罗萨尔不情不愿地握了握手。前摄政随后穿过大厅离去，徒留现任区长在身后疑惑不解。"
 MEX_Ordaz.66.a: "至少问题解决了。"
 MEX_Ordaz.67.t: "不留情面"
 MEX_Ordaz.67.desc: "太阳刚刚升起，联邦区摄政阿方索·科罗纳·德尔·罗萨尔就已经在办公室里了。他今天的第一场会议要过几个小时才开始，所以他坐下开始阅读关于全市情况的报告。\n\n“德尔·罗萨尔将军？”一个助手用颤抖的嗓音说，“我拿到了您要的早报。”\n\n“非常好，放在这里吧。”\n\n助手把早报递给他，头也不回地离开了。奇怪，德尔·罗萨尔想，看了看早报。\n\n他看到了第二页的标题：对埃内斯托·乌鲁丘尔图的专访。他面露不悦地抓紧了报纸，看了下去。\n\n“‘进入该区的移民已经失去了控制。’乌鲁丘尔图学士说，‘无家可归者猛增，犯罪率飙升，且这些问题不仅仅发生在郊区。无牌危房如雨后春笋般在大学城体育场周边生根发芽，这座体育场可是用来举办奥运会的。这是多么可耻的一幕啊！’”\n\n德尔·罗萨尔的手攥的更紧，直至力透纸背。他把早报揉成一团，狠狠砸向了地上。\n\n埃内斯托·乌鲁丘尔图已经成了一个大麻烦。很明显，即使奥尔达斯把他赶出庙堂，他还没有吸取教训。需要有人提醒他，反抗要付出何种代价了。\n\n然而，这并不是德尔·罗萨尔的首要任务。奥运会场馆附近存在不受约束的住房建设，这种事哪怕只有部分属实，都会激怒总统。摄政一跃而起，去找警察局长。"
 MEX_Ordaz.67.a: "他有烂摊子要处理了。"
 MEX_Ordaz.68.t: "歌馆的极致狂欢"
 MEX_Ordaz.68.desc: "贝尼托·伊瓦拉，雅基乐队的主唱，目光扫过面前五光十色的观众——一群少年、大学生、工人，还有些还住在父母家里的年轻人，简直是完美的观众。他们已经厌倦了父辈们反复播放的老套旋律，转而迷上了海滩男孩和那些更……撩人的美国音乐人。他们需要的，正是这种感觉。伊瓦拉微微点头，乐队随即奏响第一曲。\n\n“特丽莎，当你轻咬那朵玫瑰……”\n\n上百对情侣从卡座和吧台的高脚椅上站起身，蜂拥到舞池中央。伊瓦拉知道，今晚的开场曲或许算不上多么大胆突破，但至少是个不错的开始。他贴着麦克风，故意拉长腔调，用一种慵懒且充满暗示的嗓音吟唱，让整首歌都带上了致命的诱惑感。舞池里的情侣们随着旋律，开始秀出自己最火辣的舞步，彼此之间的目光充满情欲。伊瓦拉的歌声，像是电流穿透空气，点燃了整个酒吧。他们的每一个动作，似乎都那么顺理成章——或者说，是酒精让一切都变得理所当然。\n\n“特丽莎，当我第一次吻上你的双唇……”\n\n酒吧里挤满了人，酒保压根没空去查谁是不是成年人，或者她根本懒得管。一个年轻人看着她递过来的朗姆酒，嘴角勾起一抹笑，饥渴的眼神落在舞池里的一个女孩身上。他一口闷掉酒，然后直接朝她走去。就在他身旁，一个男孩得意地拍了拍他的肩——这杯酒本来是他点的——然后回头牵住一个女孩的手，将她带进角落里的卫生间，反手锁上门。舞台上，一些年轻人兴奋地跳上来，直接围着伊瓦拉一同起舞。\n\n“爱……像从未有人这样爱过你……”"
 MEX_Ordaz.68.a: "这早已不是什么无伤大雅的玩笑了。"
 MEX_Ordaz.69.t: "爱的夏天戛然而止"
 MEX_Ordaz.69.desc: "“警察，开门！”\n\n刺耳的喊声骤然让酒吧里安静下来。此时已是下午，只有几位醉汉、几名管理人员和几位待演出的乐队成员在场。警察们对此时的选择不以为然，传闻局长的儿子是这儿的常客。有人抱怨抓捕这些孩子实在浪费时间，但此次行动却进行得异常顺利。\n\n一位五十多岁的女调酒师因试图向一位警长扔几瓶龙舌兰而被捕，而酒吧经理则被发现藏在维修室的扫帚后。几个逃课的孩子支支吾吾地讲述着一个关于“酒精对青少年代谢和社交关系影响”的荒诞化学结论。\n\n酒吧里的十个人面朝墙壁坐在外面，一些人哭泣，所有人都畏惧地看着被扔进一辆静止的警车中的自酿酒、几小包大麻以及其他高度违法的物品。\n\n“你们准备好了吗？”\n\n一个低沉沙哑的声音从无线电中传来。警察局长点了点头。\n\n“是的，长官，这个区域的收获不错。没有人能警告其他酒吧。”\n\n联邦区长官科罗纳·德尔·罗萨尔露出了得意的微笑。他的突袭令这些毒贩和走私者始料未及，这些道德败坏的地方正在自我崩溃，媒体会因此更加青睐他。"
 MEX_Ordaz.69.a: "这可不是爱的夏天……"
 MEX_Ordaz.70.t: "安全重叠"
 MEX_Ordaz.70.desc: "奥尔达斯耐心地注视着旁边滴答作响的钟表，等待埃切维里亚前来参加会议。因工作繁忙，他不得不将会议推迟几天，这可能令埃切维里亚感到沮丧，而对此，奥尔达斯几乎没有耐心可言。他期盼能有一个更容易相处的下属。就在钟声敲响半点时，门外传来了敲门声，木门轻轻摇动。\n\n“请进。”奥尔达斯一边回应敲门声，一边低头整理手中的文件。门缓缓打开，埃切维里亚走进办公室，他沉声道：“请坐，部长。”奥尔达斯缓缓将文件推开，抬头看到埃切维里亚皱着眉头坐在他对面。“阁下，”埃切维里亚迅速开口，“我带来了关于德尔·罗萨尔将军近期突袭的报告。没有一个行动与我的办公室协调，这严重妨碍了我执行您的要求。”\n\n瞬间，奥尔达斯心中涌起一股强烈的冲动，他恨不得用拳头猛击桌面。尽管愤怒在内心翻涌，但这股冲动却很快消散。“部长，我明白与联邦区的警察合作并不总是一帆风顺，但除非你有确凿的证据证明他正在积极损害你的工作……”\n\n话未说完，埃切维里亚便急忙插嘴道：“我有证据，阁下。”他从包里取出一个文件夹，递给奥尔达斯，后者立刻接过。“他的行动破坏了多项联邦安全局的计划，这些行动本应渗透活跃于几家咖啡馆的犯罪组织。阁下，我们必须采取紧急措施。”"
 MEX_Ordaz.70.a: "“我完全同意，部长。我会告诉德尔·罗萨尔的。”"
 MEX_Ordaz.70.b: "“部长，你为什么不早点告诉我这些贼窝呢？这是你的责任。”"
 MEX_Ordaz.70.c: "“我会通知马瑙托部长组织常务安全会议，所以这种事绝对不会再发生了。”"
 MEX_Ordaz.71.t: "遏制"
 MEX_Ordaz.71.desc: "远远望去，那堆积如山的联邦区警察报告，在埃切维里亚眼里，仿佛一座由纸张砌成的奥里萨巴山。他甩开这荒谬的意象，强忍住爆粗口的冲动，快步走向一名联邦安全局官员。出乎意料的是，这人看到他后，反而明显松了口气。\n\n“这都是什么情况，警官？怎么联邦区警察的报告堆成了这样？”\n\n警官叹了口气，埃切维里亚一眼就看出，对方在努力压抑某种强烈的情绪。“这是联邦区警察最新命令的‘成果’。”警官语气低沉地解释道，“德尔·罗萨尔发出命令，要求全体警力‘以前所未有的协调力度，配合联邦安全局，维护墨西哥城的‘法律与秩序’。”\n\n埃切维里亚差点当场把手里的东西砸出去。他强行把火气压下，随手翻开一份报告。关于一起小型入室盗窃案——涉案总金额不超过一千比索——案件存疑，可能为虚假报案’？“这就是所谓的‘前所未有的协调’？是谁让德尔·罗萨尔搞出这一堆废纸的？”警官没有回答。要么是他知道这只是句反问，要么是他和埃切维里亚一样，对这件事的幕后推手毫无头绪。\n\n“行吧，我会想办法解决的，警官。”埃切维里亚摆摆手，“你先去歇一歇吧。”警官感激地点点头，而埃切维里亚则在暗自思索，该怎么收拾这烂摊子。"
 MEX_Ordaz.71.a: "“或许……我得再找奥尔达斯谈谈？”"
 MEX_Ordaz.72.t: "与恐怖分子共舞"
 MEX_Ordaz.72.desc: "联邦安全局\n联邦区\n关于“雅基”乐队清除行动的简报\n\n为响应内政部长的指示，令总统重拾对联邦安全局的信心。相关部门实施了相应行动，以恢复社会风气的纯洁性与秩序。\n\n鉴于当前部分娱乐场所已成为颠覆分子与毒品贩子的聚集地，并对青年人产生严重的不良影响，我们选择对其中人气最盛的场所采取行动，以遏制这些颠覆势力的进一步扩散。“雅基”乐队正是理想的对象。\n\n我们先向其提供大麻，随后突袭搜查该场所。在发现违禁品后，我们当场逮捕了相关人员，并立即通知媒体及党内机关。\n\n内政部长认为，政府的首要任务之一是打击颠覆性的摇滚乐文化，维护共和国的社会秩序。我们坚信，对“雅基”乐队采取的措施将有助于这场肃清行动，彻底根除这种有害影响，使其在我国无立足之地。"
 MEX_Ordaz.72.a: "请即刻呈送部长阅览。"
 MEX_Ordaz.73.t: "属于你的栖息地"
 MEX_Ordaz.73.desc: "“但这些人，这些吸毒成性的——”\n\n“不行，埃切维里亚部长，闹剧已经演够了。你们的人一直模仿神父，喋喋不休地说什么‘摇滚乐的危险’，却连教会人士的说教都不如，至少人家听起来还像那么回事。顺便一提，这种做法毫无实际效果。与此同时，正如你亲自在总统面前告诉我的那样，共治主义和共产主义正在密谋卷土重来。在这种紧要关头，你和德尔·罗萨尔居然还在为了消灭几个无关紧要的音乐人吵来吵去？你最好问问自己：你到底是个革命制度党员，还是个天主教民族主义者？”\n\n德尔·罗萨尔脸上露出明显的得意之色，但马瑙托也没给他留情面：“收起你那副黄鼠狼似的嘴脸吧，德尔·罗萨尔先生。你和埃切维里亚两个人喋喋不休地讨论同一个问题，这又有什么帮助？在法西斯分子和共产主义者正试图颠覆我们的时候，哪个头脑正常的人会想着去对摇滚乐手开枪？更别说你竟然浪费警力去突袭那些咖啡馆演艺厅，你到底是个颠覆分子，还是纯粹的白痴？假如日本人在你们偷懒的时候弄出点麻烦，我还指望你们干什么？”\n\n一顿训斥之后，官员们鸦雀无声，有几个人显然紧咬着嘴唇不敢作声。马瑙托对他们视而不见：“你们究竟有没有一点正经的安全考量？今天，如果我再听到你们任何一个人嘴里蹦出有关有关音乐的字眼，我立刻会向总统报告，整个安全机构都在阻挠他的政策实施。”他瞥了一眼桌上的电话，“电话就在那儿，好好记住我刚才的话。”\n\n一名官员举起手：“呃，长官，我倒是有个问题想提出，不过委员会上次会议似乎……嗯，有其他优先事项。”\n\n马瑙托总算露出了发自内心的微笑。"
 MEX_Ordaz.73.a: "“总算来了点有用的内容，说吧。”"
 MEX_Ordaz_DS.1.t:0 "亡羊补牢"
 MEX_Ordaz_DS.1.tt2:0 "£GFX_DoctorsStrike_doctors 医盟和£GFX_DoctorsStrike_interns 医协必须屈服，否则二者将面临§e血腥镇压§!……"
 MEX_Ordaz_DS.2.t:0 "生命体征平稳"
 MEX_Ordaz_DS.3.t:0 "威风凛凛"
 MEX_ordaz_metro_projects_unlocked_tt:0 "阻拦地铁建设的障碍已被§G清除！§!§Y（地铁项目已解锁）§!"
 MEX_Doctors_Strike_3:0 "罢工，已经解决了"
 MEX_Doctors_Strike_3_desc:0 "医生罢工终于被解决了。他们背叛了革命为他们带来的春风，这根本无可饶恕。他们组织非法工会，拒绝提供重要的医疗服务，逼迫政府不得不下令镇压。即使医生罢工已被挫败，其造成的后果也严重损害了墨西哥医疗系统，需要大量时间进行修复。这场胜利付出了成百上千名在病房中生命垂危、苦苦挣扎的墨西哥人的鲜血。"
 MEX_Doctors_Strike_Ordaz_Harsh_Victory:0 "罢工，结束了"
 MEX_Doctors_Strike_Ordaz_Harsh_Victory_desc:0 "在一场强而有力的镇压后，医生工会最终得到了处理。该死的医盟和医协手头所拥的资源缓缓离他们而去，直至他们不堪一击。镇压已成为了奥尔达斯总统巩固他权力的一种手段，他称这场镇压是医疗系统秩序的回归，同时也让人民回到了秩序的怀抱中。鲁莽的医生和实习医生再也不会用普罗大众的健康冒险，以此满足他们那些无聊的需求了。"
 MEX_Doctors_Strike_Ordaz_Irrelevance_Victory:0 "罢工，结束了"
 MEX_Doctors_Strike_Ordaz_Irrelevance_Victory_desc:0 "墨西哥革命不仅仅是一场民众革命，更是国家赖以存续的基础制度。对参加工会的医生来说，这种制度是对他们阴谋的致命一击，并非铁与血，而是媒体的力量。工会被迅速剥夺一切资源，媒体给他们打出负面评价。渐渐地，罢工消失的无影无踪，仿佛从未存在……"
 MEX_Ordaz.74.t: "伟大工程"
 MEX_Ordaz.74.desc: "在伯爵夫人区的一家高档餐厅内，奥尔达斯总统与妻子瓜达卢佩共享着一个难得的宁静夜晚。这对于他们而言，是一次难得的机会，可以暂时将总统的重任抛在脑后，孩子们也忙着自己的事情，不在身旁打扰。\n\n“……内阁会议结束后，”奥尔达斯继续说道，“我和瓜纳华托州长托雷斯·兰达聊了一会儿。他提到他们的‘瓜纳华托计划’，重点在于发展基础设施，打造工业走廊。我必须承认，我有些心动了。”\n\n瓜达卢佩笑了笑，丈夫对工作的热情并没有让她感到意外。“亲爱的，你可不能让一个州长比你更引人注目。还有那么多基础设施项目还没完工，比如说，这座城市连个像样的地铁系统都没有呢。”\n\n“墨西哥城的地铁系统？”奥尔达斯一边挠着下巴一边若有所思地问道，“听上去挺宏大，但我不太确定这事儿能不能成。”\n\n“当然可行。”瓜达卢佩自信地回答道，“ICA土木工程公司——你还记得吗？我那些兄弟就在那儿工作——他们为这个地铁项目提了个建议。他们说，地铁不仅能极大缓解交通压力，还能在奥运会前完工。”\n\n总统对这个想法开始产生兴趣。为首都建设一个地铁系统，将会成为他任内的一项重大成就，尤其是如果它能赶在奥运会前竣工的话。这会是一个他政府的标志性项目。奥尔达斯隐约记得，洛佩斯·马特奥斯执政时期似乎有人提过这个想法，但因为联邦区摄政的强烈反对而搁浅了。现在，奥尔达斯下定了决心，他打算亲自调查这个项目的可行性。"
 MEX_Ordaz.74.a: "一个改变首都的大好机会。"
 MEX_Ordaz.75.t: "信念如铁"
 MEX_Ordaz.75.desc: "“乌鲁丘尔图学士，”奥尔达斯开始说道，“请坐。”\n\n联邦区的摄政打量着面前的男人，心中暗想总统的外貌实在有些丑陋了，缺乏人格魅力和想象力。这也正是他支持萨利纳斯·洛萨诺总统竞选的诸多原因之一。\n\n“如您所知，墨西哥城将在1968年举办奥运会，首都需要更现代化的基础设施来应对这一盛事。我觉得是时候建设地铁系统了。”\n\n乌鲁丘尔图皱起了眉头，这几乎成了他每次提到地铁时的默认反应。“阁下，我必须对此提出警告。联邦区根本无力承担地铁的费用，这也不是解决交通问题的最佳方式。”\n\n“我认为您错了。我看过ICA建设公司的报告，他们缓解交通压力的模型似乎很靠谱。至于费用，”奥尔达斯微微一笑，“您不必担心。我会尽量争取联邦资金来支持建设。”\n\n总统觉得这个提议相当慷慨，但乌鲁丘尔图依然心存疑虑。在多年反对地铁后，他的声誉岌岌可危，他有责任保护自己在交通工会中的盟友。“抱歉，阁下，我无法支持任何包含地铁系统的提案。”\n\n奥尔达斯的笑容瞬间消失，严厉地盯着这个不屈的下属，冷冷说道：“如果您就想说这些，那您可以走了。”"
 MEX_Ordaz.75.a: "这还没有结束。"
 MEX_Ordaz.76.t: "摆脱摄政的束缚"
 MEX_Ordaz.76.desc: "“埃斯内托·乌鲁丘尔图违抗了我的意志。”奥尔达斯对着办公室里的一小群人说道，“在他担任联邦区摄政的情况下，我无法建设地铁系统。我必须找到办法摆脱他。”\n\n“阁下，如果我可以发言，”总统秘书马瑙托说，“虽然乌鲁丘尔图有不少缺点，但他多年来对党一直忠诚。我们可以给他一个升迁，调到其他职位，让他无法干预。”\n\n“对这样一个不顺从的人给予奖励似乎不太合适。”内政部长路易斯·埃切维里亚插嘴道，“我们应该让联邦安全局挖掘乌鲁丘尔图的黑料，利用他的丑闻迫使他悄悄辞职。”\n\n马瑙托听到这个提议，脸色霎时惨白。“尊敬的埃切维里亚部长，您能否想出一些更……合乎道德的办法？”\n\n埃切维里亚沉思片刻。“还有一个更简单的解决方案：“钢铁摄政”需要城市交通工会的支持才能让事情顺利进行。如果我们通过关系让他们罢工，就能破坏他的形象，然后用这个理由把他解职了。”\n\n“够了。”奥尔达斯突然说道，“你们的建议都有道理，但我们只需要一个计划。我会做出最终决定，把他调到一个不显眼的职位。”"
 MEX_Ordaz.76.a: "把他调到哪个穷乡僻壤去。"
 MEX_Ordaz.76.b: "命令联邦安全局调查他。"
 MEX_Ordaz.76.c: "在交通工会中挑起事端。"
 MEX_Ordaz.77.t: "改换诱饵"
 MEX_Ordaz.77.desc: "“在仔细考虑后，”奥尔达斯向他的心腹顾问们宣布，“我决定让乌鲁丘尔图离开联邦区，并把他调到一个更高的职位上。现在，我需要一些关于他何去何从的建议。”\n\n路易斯·埃切维里亚张口说道：“把他调去加拿大当大使如何？这个职务既能让他远离本国政治，又足以保证他的地位。”\n\n“的确如此，”埃米利奥·马丁内斯·马瑙托驳道，“但我认为不懂变通的钢铁摄政可不是一个好的外交官。”\n\n埃切维里亚本想说：“这样做从来都没有坏过我们的事”，但他闭上了嘴。相反，他回道：“你有什么高见？”\n\n“一个足以让他出色的建筑和规划才能大放异彩的职位。联邦道路和桥梁局里的某个职位如何？墨西哥国家铁路也需要一个像他一样有经验的人。”\n\n奥尔达斯沉默了，他的脸拧成一团，思考着。漫长的等待后，他长出一口气，说：“你们都给了我好主意，但我决定……”"
 MEX_Ordaz.77.a: "把他调去加拿大当大使。"
 MEX_Ordaz.77.b: "把他调去墨西哥国家铁路。"
 MEX_Ordaz.78.t: "不为所动"
 MEX_Ordaz.78.desc: "“……此外，依我所见，你可是这一职位的不二人选啊，乌鲁丘尔图学士。”奥尔达斯总统盛气凌人地说着，“你在这座城市干得不错，当下还有别处需要你发挥才干。”\n\n钢铁摄政直视奥尔达斯，几近难掩鄙夷之情。他对总统的评价再次跌破下限。“阁下，”他咬牙切齿地答复，“我算是明白了。”\n\n奥尔达斯挑了挑眉。“明白什么？”\n\n“你口中的‘升迁’不过是侮辱而已。你这是要赶我走！”乌鲁丘尔图近乎怒吼出声，“你想把我支开，好毁掉我在联邦区建立的一切。不好意思，这行不通。墨西哥城才是我根基所在。”\n\n“你竟敢一而再、再而三地违抗我的命令！？”奥尔达斯咆哮道，面色令人畏怖。有那么一刻，他似要向乌鲁丘尔图爆发。\n\n不过，片刻后，奥尔达斯的怒火渐熄，化作更为强硬而冷漠的、对眼前人的藐视。\n\n“你被开除公职了，即刻生效。也别去想什么升迁。但凡我还任总统一天，你就别想得到什么行政职务，连邮政员工都不行。”"
 MEX_Ordaz.78.a: "“滚出这里，别回来了。”"
 MEX_Ordaz.79.t: "世事难料"
 MEX_Ordaz.79.desc: "埃内斯托·乌鲁丘尔图驻足办公室窗边，望向索卡洛广场熙来攘往的人群。以往，旁观城市生活图景不失为一桩惬意事，如今唯余无尽惆怅。眼前的人，身下的城市，已不再属于他。\n\n“您的文件整理好了，”一位秘书的声音自门口传来，“这里的东西需要帮您收拾吗？”\n\n“不用了，谢谢。我自己来就好。”\n\n话虽如此，乌鲁丘尔图并未着手收拾，他已是心不在焉。他从不后悔顶撞总统；奥尔达斯其人愚钝至极，乌鲁丘尔图对那所谓“升迁”也不以为意。可是，执掌联邦区近十三载，他还没做好告别的准备。\n\n案头散落着许多文件：建设美丽新公园的计划，营造林荫花道的计划，以及其余种种公共工程方案，不胜枚举。另有一大本文件，载有借由基建缓解交通压力的可行性，完全不需要那该死的地铁。他这一别，一切的一切就此烟消云散。\n\n回首漫长的任期，他自忖“钢铁摄政”这一称号未免不妥。他执掌大权的前提有且只有总统的支持。当下，总统让他走人，他的理想与志向便尽数化作了镜中花、水中月。"
 MEX_Ordaz.79.a: "他最后叹了口气，开始收拾个人物品。"
 MEX_Ordaz.80.t: "兼听则明"
 MEX_Ordaz.80.desc: "“我决定授权联邦安全局调查乌鲁丘尔图，”奥尔达斯向他的心腹们如是宣布，“他们将设法证明解职的正当性。话虽如此，开展调查前，仍需我来确定具体方向。”\n\n埃米利奥·马丁内斯·马瑙托面露难色：“阁下，倘若您执意如此，个人建议从贪污腐败问题着手。乌鲁丘尔图在任十余年，定会留有把柄，可以据此迫使他下台。”\n\n“没错，大概率会有所发现，”路易斯·埃切维里亚提出了异议，“不过难说足够有力。”\n\n“行，埃切维里亚部长，”马瑙托不悦地叹口气，“那您有什么建议？”\n\n埃切维里亚咧嘴一笑。“我们应当着眼他的私生活。钢铁摄政的公众形象可谓坚定的社会保守主义者。要是发现他造访妓院，哪怕一次，他的政治生涯就结束了。”\n\n马瑙托自忖上述想法令人作呕，却缄默不语。选择权在总统手中，他相信奥尔达斯会作出正确的决定。\n\n“感谢诸位的建议。”奥尔达斯最终说道，“总之，依我所见，最佳方案应是……”"
 MEX_Ordaz.80.a: "“……核查他的财务情况是否涉及贪腐。”"
 MEX_Ordaz.80.b: "“……调查他的个人生活。”"
 MEX_Ordaz.81.t: "无足轻重的腐败"
 MEX_Ordaz.81.desc: "墨西哥城，[?global.date.GetDateStringNoHourLong]\n\n联邦安全局的调查\n\n库阿乌特莫克，联邦区——根据总统的命令，特工们对联邦区负责人埃斯内托·乌鲁丘尔图的财务活动进行了全面审查。在他长达十二年的任期内，发现了诸多不当行为。\n\n最有力的腐败证据来自于乌鲁丘尔图的公共工程项目招标过程。一小部分建筑公司在道路、公园、美化方案和公共住房单位的合同中占据了绝大多数，尽管其他公司的竞标相当强劲。\n\n在某些情况下，这些合同在其他公司有机会提交投标之前就已被授予。获得优先合同的公司通过财务回扣和个人恩惠，来报答乌鲁丘尔图及其同事给予的特别关照。\n\n诚然，这种形式的腐败并不新鲜，甚至并不罕见。以往的政府审计发现，公共工程合同竞标中的不当行为已成为全国性问题。然而，这些活动依然违法，足以令一个公职人员被开除。"
 MEX_Ordaz.81.a: "立刻转呈奥尔达斯总统。"
 MEX_Ordaz.82.t: "与恶魔共舞"
 MEX_Ordaz.82.desc: "墨西哥城，[?global.date.GetDateStringNoHourLong]\n\n联邦安全局\n\n库奥特莫克，联邦区——根据总统的命令，特工们开始对联邦区部长埃内斯托·P·乌鲁丘尔图的私生活进行调查，试图搜寻任何可以构成丑闻的证据。\n\n经过数周的远程监视，特工们发现乌鲁丘尔图简直无懈可击。他通常在下班后直接回家，几乎没有任何私人恶习。眼看调查毫无进展，特工们决定转而伪造证据。\n\n他们在特拉尔潘区找到了一家隐秘的下层妓院，并成功说服几名女子出面作证，声称乌鲁丘尔图曾是她们的客人。随后，特工们雇佣了一名与乌鲁丘尔图外貌极为相似的替身，拍摄了他出入该场所的照片。\n\n附件是一组精心伪造的照片和签署好的“证词”。"
 MEX_Ordaz.82.a: "立刻转呈奥尔达斯总统。"
 MEX_Ordaz.83.t: "落入圈套"
 MEX_Ordaz.83.desc: "“乌鲁丘尔图学士，”奥尔达斯开口了，“非常感谢你能前来。”\n\n钢铁摄政满腹狐疑地看了一眼总统。他不知道自己为什么被召来，也不知道为什么路易斯·埃切维里亚也在这里。奥尔达斯和路易斯·埃切维里亚两人都皱着眉，可眼神中却满是沾沾自喜。\n\n“我们已经听说了一些关于你的谣言，学士。”埃切维里亚边说边拿出了一个文件夹，“所以我们决定调查一下。”\n\n乌鲁丘尔图汗流浃背地打开文件夹，当他开始读里面的文件内容时，他已瞠目结舌，双手颤抖不止。\n\n“扯淡！每一个字都是扯淡！”他尖叫起来，“你们怎么敢这样污蔑我！你们觉得我不知道你们在做什么吗？你们想让我滚蛋！”\n\n“学士，冷静一点。”奥尔达斯严厉地说，“有了这些发现，恐怕你不会再得到我的信任了。若你打算辞职，我就不把这些泄露出去。但是，如果你拒绝，我就不得不把你免职，然后把我的理由开诚布公。”\n\n乌鲁丘尔图紧咬牙关。他早就该意识到奥尔达斯和他的小宠物蛇会这样干了，但不可否认，现在他们已经把他逼得走投无路了。他忍气吞声，做出了唯一明智的选择。"
 MEX_Ordaz.83.a: "“阁下，我谨提出辞呈。”"
 MEX_Ordaz.84.t: "大势将去"
 MEX_Ordaz.84.desc: "无论怎么看，华金不过一名平平无奇的公车司机。他任司机联盟工会代表、参与官方会议期间，往往也毫不起眼。而他每月来到市中心的小餐馆和“友人”会面一事，同样无人在意。\n\n餐馆里侧的小隔间内，华金闷闷地等待着，直到一人在他对面落座。“你迟到了，圣地亚哥。这次我还没啥好汇报的。”\n\n“圣地亚哥”——这是联邦安全局特工告知华金的唯一称谓——此刻春风满面：“相信不，这次我有报告给你。”\n\n他把一份文件夹推过桌子。华金打开后粗略一扫，发现其上不少大数字：“这是什么？”\n\n“你们工会罢工基金的账户结余。持有如此巨款，看来此时不提些诉求，更待何时啊。”\n\n华金挑了挑眉毛。“资金并非当务之急。要是我们真去罢工，面对的是政府的镇压。”\n\n“放心吧，”特工直视华金的双眼，开了口，“当下实在是交通工会罢工的……大好时机。我向你保证，联邦绝不会插手干预。”\n\n“这样的话，”华金报以微笑，“我认识几位工会领袖，他们等这一天已经很久了。”"
 MEX_Ordaz.84.a: "广结人脉，大有裨益。"
 MEX_Ordaz.85.t: "滞步"
 MEX_Ordaz.85.desc: "“你说现在电车来不了是什么意思？！”\n\n葆拉与马丁对他们的心肝宝贝无微不至，尽己所能让儿子打扮得体、吃饱喝足。他确诊哮喘后，二人当即同墨西哥城一位顶尖的儿科医生联络。不幸的是，诊室远在城市另一端。\n\n“非常抱歉，夫人，”一名电车调度员愤愤地回复，“受罢工影响，我们的运力严重不足。下一趟电车起码两小时后才能到。”\n\n“两小时？！”葆拉怒吼出声，“我们约了看病，会赶不上的！”\n\n“一定有别的办法，”马丁如是坚称，“下一班公交车多久到？”\n\n“恐怕等公交的时间更长，你们还是走路去最保险。”\n\n一家人离开电车站时，葆拉似是欲哭无泪。“真不敢相信，我们的城市居然沦落到这种地步。”她黯然说道。\n\n马丁点头以示理解：“没错，亲爱的。埃内斯托·乌鲁丘尔图过去对付这种事轻车熟路，现在却大不如前了。呃，前几天我听说有提议修地铁，想来可以解决我们的不少问题。”"
 MEX_Ordaz.85.a: "民心无常。"
 MEX_Ordaz.86.t: "尾声"
 MEX_Ordaz.86.desc: "“乌鲁丘尔图学士，”奥尔达斯冷冷说道，“进来。”\n\n钢铁摄政仿佛置身于噩梦之中。没想到，他苦心经营多年的交通工会在背后捅了他一刀，而现在，总统召他来到松林别墅，原因不言自明。\n\n“你处理交通行业罢工的方式简直糟糕透顶，”奥尔达斯继续说道，“我不能再让你继续担任联邦区主席。尽快呈交你的辞职报告，否则我将免去你的职务。”\n\n乌鲁丘尔图沉默片刻，愤怒在心中翻腾，皱起眉头。“阁下，十多年来我将这些工会管得服服帖帖，可你我二人一产生矛盾，他们就突然罢工。您认为这只是巧合吗？”\n\n奥尔达斯的怒火被点燃。“乌鲁丘尔图学士，”他带着满满的轻蔑说道，“现在可不是玩过家家的时候。如果你不立即辞职，我就会因你的无能而罢免你。我说得够清楚了吗？”\n\n两人对峙，怒目而视。乌鲁丘尔图用愤怒回应着奥尔达斯的轻视，似乎在那一瞬间，他准备进一步升级冲突。\n\n然而，乌鲁丘尔图眨了眨眼，意识到与总统对抗毫无意义，尤其是在他已失去支持的情况下。最后，他叹了口气，做出了唯一理智的选择。"
 MEX_Ordaz.86.a: "“阁下，我谨提出辞呈。”"
 MEX_Ordaz.87.t: "权责交接"
 MEX_Ordaz.87.desc: "奥尔达斯总统耐心地等待着，站在联邦区大楼内。 这座大楼距离国家宫仅几步之遥，然而这里的气氛却与宫内截然不同。官员和部长们兴奋地穿梭于走廊之间，迫不及待地迎接他们的新上司。\n\n终于，奥尔达斯看见了那个熟悉的身影——正是大家一直等待的那个人。“罗萨尔将军，你迟到了五分钟。第一天上任就这样，可不是什么好兆头啊。”\n\n阿方索·科罗纳·德尔·罗萨尔将军微笑着回应：“抱歉，总统阁下。在路上，我看到这个，觉得必须拿一份。”\n\n他递过一份报纸。奥尔达斯瞥了一眼头条，忍不住笑了：“‘罗萨尔被任命为新摄政——联邦区尽在掌控’。”\n\n“掌握得相当不错，将军。”奥尔达斯继续说道，“那么，作为联邦区的新摄政，你的首要任务是什么？”\n\n罗萨尔笑容依旧，轻松地答道：“我得花几天时间熟悉办公室，适应一下新的环境。接下来，我想推动一件大事。我一直觉得，这座城市早就该有一条地铁系统了，你觉得呢？”\n\n“我完全赞同，将军。”奥尔达斯点头道，“我也希望地铁项目能尽早动工，联邦政府会全力支持这项建设。”"
 MEX_Ordaz.87.a: "旧摄政已死，新摄政万岁！"
 MEX_Ordaz.88.t: "土地争端"
 MEX_Ordaz.88.desc: "在国家宫一间闷热的会议室里，总统奥尔达斯正努力集中注意力。他一向认真对待自己的职责，尤其是在内阁会议上，总是力求保持专注。然而，日复一日听着相似的问题，难免让他感到些许厌倦。\n\n“谢谢你的报告，埃切维里亚部长。”当内政部长结束关于国内异议状况的汇报后，奥尔达斯开口说道，“谁还有有其他问题要讨论吗？”\n\n国家资产部长、阿方索·科罗纳·德尔·罗萨尔将军立刻站了起来，将一张地图铺在总统面前。“总统阁下，我刚刚收到报告，这片区域的地质条件，”他说着，手指指向瓦哈卡东南部的群山，“非常适合开采新的油田。墨西哥国家石油公司的合作伙伴们迫不及待想要开始勘探钻井。”\n\n奥尔达斯顺着他的手指看过去，眼中闪过一丝兴奋。听到一个关于新机遇的消息，而不是另一个棘手问题，令他精神一振。\n\n坐在总统旁边的路易斯·埃切维里亚皱起了眉头。“我对那个地区比较熟悉，靠近萨利纳克鲁斯。那里的集体土地正与一名地主发生激烈争端，问题的复杂性在于，农民是土著居民，而那个地方豪强是梅斯蒂索人。贸然启动石油勘探，可能会激化局势。”\n\n德尔·罗萨尔冷冷地哼了一声：“几名愤怒的农民不会给我们带来麻烦的。让我提醒你一下，埃切维里亚学士，我可是作战经验丰富的将军，完全有能力确保该地区的安全。”\n\n“先生们，请冷静下来。”奥尔达斯赶忙说道，“我想我们都同意，最好的解决办法是……”"
 MEX_Ordaz.88.a: "“让德尔·罗萨尔将军继续他的计划。”"
 MEX_Ordaz.88.b: "“埃切维里亚部长会解决这起争端。”"
 MEX_Ordaz.89.t: "黑金和红土"
 MEX_Ordaz.89.desc: "作为墨西哥国家石油公司的土地测量员，豪尔赫对墨西哥农村的“政治”了如指掌。农村地区总是那么直接，至少在输赢关系之上如此。他跟在地主的后面，走进了曾经属于土著的土地，他已对此习以为常了。\n\n从马背上看，这胖地主就像一个拙劣的征服者。他的身旁簇拥着一群装备精良的大汉，这些人看上去非常可疑。他们的枪看上去非常新，豪尔赫想着，就好像他们有法子搞到军队的库存一般。\n\n“知道这个小小的石油储藏被发现，我很高兴。”地主尖声说，“政府在解决我的财产纠纷时帮了大忙，我很高兴还他们一个人情。应该就在前面了。”\n\n一股气味涌进了豪尔赫的鼻腔里。这味道真难闻，而且十分浓烈。到了山顶，他发现这股气味来自一个小村庄的遗址。几所房子变成了废墟，剩下的空无一人，深红色的污渍布满了地面。\n\n“这……这里发生了什么？”\n\n地主不好意思地笑了笑：“这些人霸占了我的土地。在我和我的同伴解释了情况后，他们同意搬到其他地方去。你看，他们走的急了点，所以这里才一片狼藉。”\n\n豪尔赫的胃里顿时一阵翻江倒海，但他还是设法保持了冷静，对这件事他已不想再深究。他想着自己来到这里的目的，开始记下可能的钻探地点。"
 MEX_Ordaz.89.a: "屠夫总能得到他们想要的东西。"
 MEX_Ordaz.90.t: "回报"
 MEX_Ordaz.90.desc: "墨西哥城新的一天开始了，随之而来的是另一场内阁会议。奥尔达斯总统又一次发现他正听着路易斯·埃切维里亚在对国家安全形势的总结中那些令人痛苦的细节。\n\n“大量无家可归的土著居民出现在萨利纳克鲁斯，”他的话语里含着警告，“男女老少们身无分文地来到这里，只有身上的几件破烂。局势十分不稳定……”\n\n“很抱歉打扰你，埃切维里亚部长，”阿方索·科罗纳·德尔·罗萨尔插话道，“但我有其他一些从萨利纳克鲁斯来的报告，我觉得总统应该听听。”\n\n埃切维里亚死死盯着德尔·罗萨尔，但奥尔达斯却对这半路杀出的程咬金颇感兴趣。“不管怎样，将军，让我们听听吧。”\n\n“调查团确认了这片地区存在石油。他们已经发现了一片合适的地区，墨西哥国家石油公司将很快开始在那里作业。”\n\n“这真是个好消息！”奥尔达斯微笑着说，“请代我向墨西哥国家石油公司致以祝贺。对不起，埃切维里亚部长，请继续。”\n\n埃切维里亚努力压制着心中怒火，他只想揭露德尔·罗萨尔“成功”背后的血腥代价。但看到总统笑的合不拢嘴时，他明白再深入讨论这件事毫无意义。"
 MEX_Ordaz.90.a: "“继续吧，阁下……”"
 MEX_Ordaz.91.t: "蛇的慈悲"
 MEX_Ordaz.91.desc: "深夜时分，大部分职员都已回家，路易斯·埃切维里亚依然坐在办公室里工作着。他整理着桌上的文件，却不断地回到一份关于瓦哈卡州农村状况的报告上。内阁会议上与德尔·罗萨尔将军的争吵仍然萦绕在他脑海中，挥之不去。\n\n他的敌人或许会称他为“阴谋家”和“狡猾的毒蛇”，但埃切维里亚以自己的方式关心着墨西哥人民。他始终认为，像萨利纳克鲁斯镇那样的集体土地，正是革命制度党乃至整个国家的基石。当德尔·罗萨尔之流将这些村庄视作碍事的障碍、一脚踢开时，他便怒不可遏。\n\n电话突然响了起来，这是他等待已久的来电。\n\n“埃切维里亚学士，我们已经完成您要求的调查了。当地的多起原住民神秘失踪案其实与一名瓦哈卡的地主相关。农庄里的村民最初对我们很害怕，但我们解释清楚意图后，他们便同意出面指证。此人现已因谋杀罪名被捕。”\n\n“非常好，多谢你通知我。”\n\n埃切维里亚挂断电话后长舒一口气。他之前已就土地纠纷问题与瓦哈卡州长沟通过，现在这位土豪劣绅被除掉了，问题必然会朝着有利于村民的方向解决。这或许能暂时保护他们不受德尔·罗萨尔的阴谋所害，但或许还不够。他真的满足于此吗？\n\n突然之间，埃切维里亚灵机一动，再次拿起了电话：“喂，请帮我接旅游部。”"
 MEX_Ordaz.91.a: "帮助，有时来自意想不到之处。"
 MEX_Ordaz.92.t: "将军之败"
 MEX_Ordaz.92.desc: "阿方索·科罗纳·德尔·罗萨尔坐在电话前，等待着瓦哈卡地区局势的进展。原本他可以很容易地同某个通情达理的人谈判，比如那个地主，但埃切维里亚把这一切都搞砸了。现在，他必须想办法说服当地农民放弃开采权。\n\n终于，电话铃响起了。德尔·罗萨尔立刻接起电话。“德尔·罗萨尔将军？这里是赫苏斯·雷耶斯·埃罗莱斯，我打电话来是为了萨利纳克鲁斯外的土地……”\n\n“埃罗莱斯董事长，很高兴听到你的声音。你的人草拟了关于集体土地的合同吗？谈判怎么样？”\n\n墨国油董事长长叹一口气。“我的人找到了村子，但情况有点复杂。这个地方上了南方的宣传地图，游客络绎不绝、水泄不通。”\n\n“游客？你开玩笑吧。”\n\n“真的，我听说每天都有车载斗量的扬基佬来到这里。这里现在有点乱，但村民们现在胆子肥了，这些家伙不可能允许我们在这里开采了。我很抱歉，将军……”\n\n德尔·罗萨尔沮丧地挂掉电话，几个月的辛苦在最后一分钟白白浪费。他痛骂着这条毁了他计划的毒蛇，扩大墨国油的计划变得更加艰难了。"
 MEX_Ordaz.92.a: "人民再一次排在石油之前。"
 MEX_Ordaz.5.tt:0 "总统阁下，你现在对“东南气旋”的处理还不错，但一切都会过去的。"
 MEX_Ordaz.93.t: "让出聚光灯"
 MEX_Ordaz.93.desc: "“……在担任第一夫人的漫长时光里，没有什么比领导国家儿童保护协会更令我感到荣幸的了。”埃娃·萨马诺大声朗读着，“如今，我怀着沉重的心情辞去这一职务，但协会不可或缺的工作仍将继续……”\n\n埃娃面对镜头保持微笑，心中却愤怒难平。国家儿童保护协会原本就是应她的要求而创立的。当洛佩斯·马特奥斯四处进行他的外交冒险时，她则倾注了全部的热忱与精力来建设这个机构。然而，革命制度党决不允许一位前总统的夫人如此高调，尤其是她丈夫的健康状况日益恶化之后。\n\n讲话完毕后，埃娃把麦克风交给了继任者：奥尔达斯的妻子瓜达卢佩·博尔哈。她外貌普通，穿着一条并不合身的裙子，讲话时明显十分紧张。瓜达卢佩看起来适合做个家庭主妇，却缺乏埃娃那种自信与魅力。\n\n活动结束，人群散去，两位女士短暂地独处了一会儿。“今天你能来，真是挺勇敢的。”埃娃语带讽刺地说道。\n\n“什么？”瓜达卢佩回答，“我不是很明白你的意思。”\n\n“我的意思是，你敢于接受这个职位确实勇气可嘉。不过你显然缺乏公众演讲的经验，这是领导儿童保护协会必不可少的能力。我本来还担心你这样的人能不能胜任，但再给点时间，相信你一定会表现得还算不错。”\n\n瓜达卢佩的脸顿时涨红了，她把头转向一边，没有回答。"
 MEX_Ordaz.93.a: "但愿她不会因此记恨在心。"
 MEX_Ordaz.94.t: "宾客名单"
 MEX_Ordaz.94.desc: "奥尔达斯总统坐在家里，与第一夫人瓜达卢佩·博尔哈谈论着他最喜欢的话题：工作。此刻他正特别兴致勃勃地讨论一场即将为革命制度党高层举行的宴会计划。\n\n“场地我选定了查普尔特佩克城堡，”他颇为兴奋地说道，“餐饮将由一家顶级餐厅负责，你可以帮我一起挑选一下。宴会的贵宾将包括我的内阁部长们、党的领导层，以及所有在世的前总统。”\n\n听到最后一句时，瓜达卢佩皱起了眉头：“前总统们的夫人也会受邀参加吗？”\n\n“当然会啊，怎么了？”\n\n“唔，上次我们见面时，埃娃·萨马诺对我很不礼貌。”\n\n奥尔达斯带着同情的笑容说道：“亲爱的，我之前并不清楚。你若愿意的话，我可以跟阿道弗谈一谈，希望她在宴会上能够更客气些。”\n\n“坦白说，我宁愿她压根儿不来参加这次宴会。”\n\n听到妻子的要求后，奥尔达斯眉头紧锁，陷入了沉思。他知道洛佩斯·马特奥斯与妻子感情并不亲密，事实上，这位前总统多年来一直与其他女人交往密切。但即便如此，阿道弗仍需维护自己的公众形象。如果没有埃娃陪伴，他独自出席这种场合恐怕会显得很尴尬，而奥尔达斯并不想让自己的老朋友陷入这种境地。"
 MEX_Ordaz.94.a: "“我会请他一个人出席。”"
 MEX_Ordaz.94.b: "“我们不能将她排除掉。”"
 MEX_Ordaz.95.t: "明显的缺席"
 MEX_Ordaz.95.desc: "夕阳西下，查普尔特佩克城堡的花园被相机闪光灯照亮。奥尔达斯总统与第一夫人瓜达卢佩站在记者们面前，迎接着前来赴宴的宾客。\n\n这对夫妇面带微笑，热情地与每一位抵达的宾客握手致意：路易斯·埃切维里亚与妻子玛丽亚·埃丝特、卡洛斯·马德拉索与妻子格拉谢拉、米格尔·阿莱曼与妻子比阿特丽斯。\n\n最后抵达的是阿道弗·洛佩斯·马特奥斯，但令现场记者惊讶的是，他竟独自一人前来。不过他并未显出任何尴尬，反而自信满满地走向总统夫妇。\n\n“不巧埃娃今晚无法出席，”他大声说道，“她正在科约阿坎参加一所新学校的筹备会议。今晚，你们只能将就一下，由我独自赴宴了。”\n\n宾客们悉数到场后，宴会在城堡内正式开始。整个晚上气氛融洽，所有人都尽情享受美味佳肴，在礼貌而愉悦的谈话中度过了时光。当宴会接近尾声，宾客们开始三三两两地离开时，奥尔达斯悄悄将洛佩斯·马特奥斯拉到一边。\n\n“阿道弗，很抱歉今天让你一个人来——”\n\n“古斯塔沃，别再提了，这根本不算什么。我与女人打交道的经验比你丰富得多，我很清楚她们的脾气有多大。咱们可不能让妻子之间的小摩擦影响到我们之间的关系。来吧，好好享受剩下的宴会时光。”"
 MEX_Ordaz.95.a: "向新老总统致敬！"
 MEX_Ordaz.96.t: "无言以对"
 MEX_Ordaz.96.desc: "查普尔特佩克城堡的革命制度党宴会结束后的第二天早上，奥尔达斯总统闷闷不乐地坐在办公室里。当电话响起时，他惊讶地发现来电者竟是自己的前任。\n\n“我想为我妻子昨晚的表现向你道歉，”洛佩斯·马特奥斯语气凝重地开口说道。\n\n奥尔达斯叹了一口气，满是无奈：“没关系，我妻子的表现也没好到哪去。”\n\n虽然昨晚两位总统在宴会上热情相见，但他们的夫人埃娃·萨马诺和瓜达卢佩·博尔哈之间只互相冷淡地说了一句“晚上好”，更糟糕的是，尽管两人坐得很近，但整晚都未再交谈。两位总统多次试图将她们带入共同的话题，却始终徒劳无功。\n\n“算了，阿道弗，宴会总算结束了，这次的尴尬也算过去了。”\n\n“呃，总统阁下，”洛佩斯·马特奥斯有些尴尬地说道，“你或许该看看今天早上的报纸。”\n\n奥尔达斯感到心中一沉，他拿起办公桌上的报纸翻看起来。果然，昨晚参加宴会的记者们已经将两位夫人的冷淡行为写进了报道中，有些记者甚至大胆猜测了她们之间冲突的原因。本来只是一场简单的宴会，如今却演变成了一场小型的公关危机。"
 MEX_Ordaz.96.a: "公开场合的失态，总是代价不菲。"
 MEX_sea_of_tehuantepec_tt: "§Y特万特佩克油井§!项目将被锁定。"
 MEX_a_matter_of_honour_tt: "§R肮脏战争已经开始。§!"
 MEX_hands_dirtier_tt: "§R我们将采取新措施以取得肮脏战争的胜利。§!"
 MEX_Ordaz.97.t: "畅游蓝天"
 MEX_Ordaz.97.desc: "飞机是人类最伟大的发明之一。在过去，人们只能拥挤地停留在地面上；如今，人类却能够自由翱翔天际。这是一项美妙而宏伟的事业，比起其他任何交通方式，都更加快捷方便。埃米利奥相信，一个系统的每个部分都应符合它伟大的目的，而机场正是展现这一现代科技奇迹的宏伟殿堂。作为瓜达拉哈拉国际机场咨询台的一名工作人员，埃米利奥在这个系统中扮演着微小但不可或缺的角色。他的职责，就是尽最大可能协助顾客顺利体验飞行之旅。\n\n多年来，埃米利奥目睹了机场从内到外的彻底转型。在机场辅助服务局的新管理下，乘客和像他这样的员工都要遵守一系列全新的规章制度。除了跑道的扩建和新航站楼的修建外，机场还实施了严格的登机流程，以提前应对航班数量的增加。\n\n从咨询台的位置望去，以往毫无秩序可言的顾客，现在每天都会自觉排成长长的直线。虽然新的文件与证件检查程序略显繁琐，但总比过去混乱不堪的日子要好得多。\n\n“喂！”突然，一个顾客从队伍后面走出来，气势汹汹地朝他走来，“恕我直言，这简直荒唐至极！我花了不少钱买机票，结果现在居然还要我填这么多表格和文件！我之前根本不知道这些，你们凭什么这么做？”\n\n埃米利奥脸上立刻浮现出一贯训练有素的礼貌笑容，回答道：“先生，我向您保证，只要您熟悉了这些新规定，登机将会像风一样轻松。”"
 MEX_Ordaz.97.a: "新的一天，又一位满意的顾客。"
 MEX_Ordaz.98.t: "黑金的秘密"
 MEX_Ordaz.98.desc: "“仅仅发现石油，并不意味着我们能自动从中获益。很显然，你得先把它从地下开采出来。”墨西哥国家石油公司总裁兼革命制度党资深人物赫苏斯·雷耶斯·埃罗莱斯小心翼翼地从银托盘上端起一杯咖啡。这托盘是奥尔达斯总统的助手为二人会议专门准备的。“接下来，你得确认石油的品质与类型，决定如何、以何种方式将它加工成产品。”埃罗莱斯向杯中加了两勺糖，用一把精致的银匙搅动着咖啡。“最后，你还得将最终产品运送到需要的地方、送到客户手里。毕竟，汽油只有加进汽车时才体现出它真正的价值。”他轻轻抿了一口咖啡，享受着浓郁的味道。\n\n“这一切都是值得的，但过程非常复杂，并且每年都会更加复杂。这正是我们需要墨西哥石油研究院发挥作用的原因，它能确保我们在市场中占据领先位置。”“这些我明白得很清楚。你心中有人选来负责研究院了吗，赫苏斯？”奥尔达斯总统缓慢地搅拌着自己的咖啡，然后喝了一口。他喜欢黑咖啡，不加任何多余的调料。咖啡是为他服务的，而非相反。“这个人必须清楚自己的角色。他必须明白，石油研究院不是慈善机构，更不是纯粹的学术组织。石油研究所应当是革命制度党的工具，存在的目的就是改善墨西哥的经济，仅此而已。”\n\n“我正好有合适的人选。”埃罗莱斯放下咖啡杯，将一份密封的档案递给总统。他略带紧张地用手指轻敲杯托，尽管平时总是沉着冷静，但此刻他却显得兴奋起来。这个研究院是他的心血之作，他深信研究院的工作能极大地提升国家石油公司的运作效率。“哈维尔·巴罗斯·谢拉，一位非常有才华的工程师和管理者。”\n\n“还是个学者。”奥尔达斯握紧咖啡杯，一边仔细翻阅手中的档案。“我只希望他能胜任。我可不想在我的政府里有个光说不干的人。他必须足够忠诚。”"
 MEX_Ordaz.98.a: "合适的石油价格可以买卖一切。"
 MEX_Ordaz.99.t: "讨价还价"
 MEX_Ordaz.99.desc: "德尔·罗萨尔将军在胡奇坦-德萨拉戈萨拥挤的街道中穿行。经过从联邦区出发的漫长火车旅程，他于早晨抵达此地。他将在市政厅与接应人员会合，然后驱车前往新设立的石油钻探现场进行检查。当他转过一个街角时，却发现街道已被五颜六色的棚子挤满。\n\n德尔·罗萨尔走进潮湿阴凉的市场，各式各样的货品堆积在摊位上，有新鲜的农产品，也有手工制作的陶器。每走几步，就会有一名女摊主向他招揽生意，坚持要他买点东西。他总是阴沉着脸，一一拒绝。\n\n他几乎就要穿过市场时，忽然看到有个人在远处指着自己。那个女人眼中闪过一丝认出他的神色，用萨巴特克语跟身旁的朋友嘀咕了几句，随后走到巷道中央，堵住了德尔·罗萨尔的去路。眼前的年轻女人圆脸上带着深深的不满，黑发梳成一条辫子。\n\n“您就是德尔·罗萨尔将军吧，”她高声说道，声音大到让整个市场都能听见，“你跑到这儿来拿走我们的石油，却连几个比索都舍不得在摊子上花。” 周围的人纷纷投来注视的目光。德尔·罗萨尔的西装因紧张而贴在身上。他怒视着她，最终不情愿地掏出口袋里的几个硬币。\n\n几分钟后，他来到了市政厅门前，腋下夹着一条卷起来的地毯。一辆卡车已经在原地等待着送他离开。司机看到他手里的地毯，扬起了眉毛。"
 MEX_Ordaz.99.a: "“说来话长。”德尔·罗萨尔没好气地说道。"
 MEX_Ordaz.100.t: "石油工人"
 MEX_Ordaz.100.desc: "贝尼托朝着林立的石油井架外围走去，那里刺鼻的硫磺味稍微淡了一些。他的手臂肌肉隐隐作痛，背也酸得厉害。半小时的午休时间简直是天赐之物。他很快找到了自己的宿舍——工地外围约20栋矮长建筑中的一座。\n\n狭窄的公共休息区里，同事们挤在一张铝制折叠桌周围，正在低声抱怨着奥尔达斯总统扩建和现代化墨西哥国家石油公司的举措。\n\n“我真搞不懂你们，”贝尼托插话道，一边摘下安全帽，一边用沾满污垢的手拨了拨自己波浪般的头发。“引进新设备能救不少命，也能让工作轻松不少。就算他计划的扩建只有一半完成，我们也永远不愁没活干了。”然而，回应他的却是冷漠的眼神。\n\n“行了，别跟这孩子计较，”恩里克开口了。他是这里最年长的工人，年近五十，依然强壮，但岁月的痕迹已开始显露。“他又没经历过58年的事。”\n\n“58年到底发生了什么？”\n\n“那年我们和铁路工人一起罢工，奥尔达斯压根没想过和我们谈判。那个狗娘养的直接派士兵冲进了油田和车站，把我们的领袖们一个个拖去莱昆贝里监狱，谁知道他们后来经历了些什么。”宿舍里顿时陷入一片沉默，恩里克的目光凝视着远方，似乎陷入了某种遥远而痛苦的回忆之中。"
 MEX_Ordaz.100.a: "贝尼托无法理解这种心情。大家都希望，他永远不会理解。"
 MEX_Ordaz.101.t: "平衡之道"
 MEX_Ordaz.101.desc: "时间已过下午一点，财政与公共信贷部长安东尼奥·奥尔蒂斯·梅纳决定推迟吃午餐。他坐在办公室里，继续处理过去六年来从未间断的任务：管控赤字、抑制通货膨胀、维持经济稳定增长——也就是人们熟知的“稳定发展”计划。\n\n“梅纳部长？” 一位助手在门口说道，“坎波斯·萨拉斯部长想与您通话。”\n\n“告诉他我很忙。”他不悦地说道。在奥尔达斯任期内，很多事情都没有变化，但少数几项变化却让他烦躁不安。比如这位新上任的工商部长坎波斯·萨拉斯，他总是一副自以为是又好斗的模样，让梅纳一点都不想跟他多打交道。若还是过去的萨利纳斯·洛萨诺部长，他或许还愿意聊几句，但眼下新任工商部长，他实在没这个耐心。\n\n“部长，”另一名助理走到他桌前，“您要求的国家债务报告已经准备好了。”\n\n梅纳顿时停下手中的工作，神情严肃起来。“放在这里吧。”\n\n报告中并无出乎意料的内容，这反倒成了问题。自从洛佩斯·马特奥斯时代以来，一直保持不变的就是持续膨胀的财政赤字。到目前为止，奥尔达斯似乎完全没有削减开支的打算，反而很快就要为了筹办奥运会而投入更多资金。\n\n这样的局势无法持续。身为一名财政官员，梅纳心里清楚，这场所谓的“墨西哥奇迹”迟早会走到尽头。但只要他还坐在这个位子上，他就会竭尽全力维持经济的稳定与平衡。"
 MEX_Ordaz.101.a: "哪怕只是再多撑一段时间……"
 MEX_Ordaz.102.t: "确保服从"
 MEX_Ordaz.102.desc: "“……自从我执政以来，劳工骚乱就不断困扰着我的政府，”奥尔达斯抱怨着，“我们已经严厉镇压了那些医生和实习医生，但他们当中还有人不肯罢休。我绝不允许局势像歌舞伎效应那样彻底失控。”\n\n菲德尔·贝拉斯克斯沉默着。这位墨西哥工人联合会的总书记历经多位革命制度党总统，如今似乎正在掂量眼前这位新总统的分量。最后，他终于开口：“您希望我怎么做？”\n\n“我要一劳永逸地解决这些医生的问题。这意味着我们将出台更严厉的反罢工措施。在这段时期内，我要求工人联合会以及旗下的所有工人必须与政府完全一致。不得参加医生们的抗议，不得声援他们的罢工，更不得谈论任何有关团结之类的话题。”\n\n贝拉斯克斯轻笑一声：“阁下，您完全不用担心。我手下的工人很清楚，他们不该去支持一群有钱的医生和他们那些娇生惯养的实习生。不过，为了让您安心，我会亲自确保每个人都保持最佳表现。”\n\n奥尔达斯起身准备离开，贝拉斯克斯却拦住了他：“其实我早就看出来了，您是一位非常有决断力的人。我很期待未来这六年与您的合作。”\n\n这句恭维让奥尔达斯完全卸下了防备，脸上露出一丝微笑：“谢谢你，贝拉斯克斯先生。我也是一样的想法。”"
 MEX_Ordaz.102.a: "当目标一致时，合作就是这么简单。"
 MEX_Ordaz.103.t: "不速之礼"
 MEX_Ordaz.103.desc: "德里克满脸笑容，驾驶着一支约翰迪尔拖拉机组成的车队驶向胡胡特拉。从小到大，他都梦想着有一天能亲自参与反法西斯斗争，但作为门诺派的和平主义者，加入军队显然不可能。当他发现自己能够在国务院的援助计划中找到一份工作时，特别还是在乡间一线而不是办公室里，他简直欣喜若狂。现在，他终于能贡献一份力量，将顶尖的农业设备亲手交到墨西哥中部的农民手里。\n\n然而，埃克托尔看到这个美国援助人员跳下拖拉机走近时，脸上却是一种混杂着困惑与沮丧的表情。奥尔达斯到底在想什么？居然允许这些美国佬大摇大摆进入革命腹地？难道他忘了1846年的战争了？忘了潘兴将军的“惩罚性远征”了？忘了杜威总统在石油国有化时的怒火了吗？\n\n看到老板明显不悦的神情，贝尼托决定主动上前缓和局面：“谢谢你们的拖拉机，”他恭敬地说道，“我们非常感谢你们的帮助。”\n\n德里克笑得更灿烂了，他伸出手准备握手：“完全不用客气，我们很乐意帮助有需要的邻居。我和我的同事们还会在墨西哥停留几个星期，如果需要的话，我们还可以协助你们分配这些设……”\n\n“那根本没必要！”埃克托尔突然厉声打断道，“像你们这样的外国人根本无法承担这样精细的工作。你们对这片土地和这里的人民一无所知。设备分配将由合格的全国农民联合会官员负责，我和我的同事会解决的。”\n\n德里克对这个粗暴的拒绝措手不及，但很快又恢复了笑容：“当然，我并不是质疑你们的专业能力。既然这样，那我就不打扰了，祝你们好运，再见！”"
 MEX_Ordaz.103.a: "他们也许收买了奥尔达斯的信任，但绝对收买不了我们。"
 MEX_Ordaz.104.t: "自由与博爱"
 MEX_Ordaz.104.desc: "“我回来了，”米格尔喊了一声，悄悄把下注的单子塞进口袋，“今天又加班了。” 莉娜见到他时脸上露出一个淡淡的微笑，她最近看起来比以前更消瘦、更苍白了些。三岁的罗西塔早已在占据大半房间的床上睡着。尽管这间屋子极其狭小，但在父亲把他们赶出家门之后，能找到这样一个落脚点已经不错了。\n\n米格尔缓步走到收音机旁，轻轻打开了开关，调低音量。“……今天，美国传来重要消息，国会议员正考虑终止墨西哥人北上从事短工的计划……”\n\n“短工”这个词瞬间唤起了他的无数回忆。搭便车穿越灼热的沙漠抵达边境，日复一日露宿街头，漫长的等待与渺茫的希望……\n\n“……该计划遭到了美国工会组织的强烈批评。最终，参议院勉强通过了对该计划为期一年的延长。墨西哥驻美大使乌戈·B·马加因称赞此举体现了我们两国之间兄弟般的团结。”\n\n米格尔听到这里，忍不住笑了起来。回忆继续涌现：十七个人挤在一间破旧的小屋里，苍蝇与蚊子肆虐却没有任何防护；每天在烈日下工作，双手被锋利的植物割破，眼睁睁看着有人因筋疲力尽而倒下；吃着变质的食物，甚至有人因此病倒。每次抱怨，得到的回应都是同一句话：“受不了，就滚回去。”\n\n他的笑声越来越大，越来越讽刺。莉娜忧虑地看着他。他心里明白，在美国的那些日子也并非全然没有乐趣，那儿的一些人确实很友善。可他所遇到的差劲老板里，扬基佬监工绝对是最坏的一个。这样恶劣的待遇，居然也能叫“兄弟般的团结”？"
 MEX_Ordaz.104.a: "真有彼此平等相待的一天吗？"
 MEX_Ordaz.105.t: "涓滴农业"
 MEX_Ordaz.105.desc: "韦拉克鲁斯的一处山坡集体土地，当地农民结束了上午的劳作，围坐在一起享用午餐。他们用木头和木箱当作桌椅，将各自带来的食物拼凑成一顿简单的餐点。头顶的树冠遮挡住了毒辣的阳光，却挡不住窒息的湿热。滋养这片青翠大地的湿气，同样也是他们汗水的源头。男人和女人默默地进食，只有咀嚼声、树叶的沙沙声，以及一台破旧收音机里传来的断断续续的民谣相伴。他们的午餐被突如其来的卡车声打断。一辆老旧的卡车沿着陡峭的山路颠簸而上，最终在他们面前停下。\n\n“下午好。”副驾驶座上的男人跳下车，他身穿长袖白衬衫，这样的装束与湿热的天气格格不入，紧紧贴在他因汗水浸透的身体上。农民们认出了这人——当地的全国农民联合会代表，也就是革命制度党庞大体系中的一颗小小棋子。“我带来了播种季的礼物。”他指了指卡车，示意司机将木箱卸下。这些沉重的木箱砰然落地，深深陷入泥土之中。箱子上的字迹清晰可见——“菠萝种子”。\n\n“你不能把这东西扔在这里，上面的仓库才是你该送的地方。”一位农民站起身，检查着第一箱种子的标签。看着越堆越高、一模一样的木箱，他皱起了眉头：“菠萝？我们根本不会种菠萝。”\n\n“学就会了。”官员挥了挥手，示意卸货继续。“稍后我们会提供种植方法的相关信息。但我建议你们尽快种下去，我听说菠萝的生长期很长。”\n\n“我劝你赶紧上车走人，别等着我给你来点‘生长周期’！”农民怒吼着，挥舞起手臂，把那位官员赶回了卡车。“全国农民联合会应该是为我们农民服务的，不是来给我们下命令的！”"
 MEX_Ordaz.105.a: "农民种下自己未曾选择的种子，却永远见不到收成的利润。"
 MEX_Ordaz.106.t: "日渐萎缩的乡村"
 MEX_Ordaz.106.desc: "“……因此，随着州政府新一轮支持政策的到位，预计明年本地主要作物的总体产量将提高百分之五。”农业官员哈维尔结束了他的演讲，望向眼前零散的人群。这群松散聚集的农民礼貌地鼓掌，但掌声稀稀落落。人群之间，许多空荡荡的桌椅显得格外醒目。\n\n作为全国农民联合会的一名官员，哈维尔的职责是收集解决当地农民的问题，并与革命制度党保持沟通。这项任务变得一年比一年艰难，因为他所服务的农村社区人口日渐减少。今晚，他在韦拉克鲁斯乡村的社区活动中心发表演讲。过去数年来，他已在此举办了无数次类似的活动，但今晚的听众数量却是他见过最少的。更令他难过的是，他亲眼目睹这种衰退蔓延到了整个州。墨西哥的乡村生活正缓慢地从他的视线里消失——起初只是年轻人离开村庄，到大城市谋求更好的工作机会，随后是其他人陆续跟着离开，这种无止境的恶性循环让他感到恐惧。他挚爱并竭力保护的农民生活，正在缓缓凋零。\n\n“有人有什么问题想问吗？” 哈维尔向在座的听众发问。台下只有几声咳嗽，没有人开口。“好吧，各位，有什么需要随时来找我。” 哈维尔离开讲台，而农民们也纷纷离开座位，走向房间后方，那儿备有免费的食物——这可能比他的演讲来得更具吸引力。"
 MEX_Ordaz.106.a: "没有农民的国家，终将难以果腹。"
 MEX_Ordaz.107.t: "偏执的邻居"
 MEX_Ordaz.107.desc: "“尊敬的卡里略·弗洛雷斯部长：\n\n“我们理解墨西哥合众国在外交关系上的立场，也十分欣慰于贵方对美利坚合众国表现出的开放与善意。同时，我们亦尊重墨西哥的主权，以及墨西哥自主决策、不受外来势力施压而保持绝对中立的权利。”\n\n“……然而，墨西哥奥运场馆建设交由日本承包商一事，引起了我方极大的关切——”\n\n这种反应果然如他预料的一般。他们给予了美国人太多太多，而现在，只不过是用了几家日本公司的建筑服务，就立刻引来了这只敏感雄鹰的不满。自己和外交部已经为了维持墨美友好关系做出了许多妥协，现在他们却因为这点小事而如此紧张，简直是不可理喻。他满怀疑虑地总结了一番，随后拿起笔开始撰写回函。\n\n他尽量不让自己的坏情绪渗透进字里行间，努力用最友好和缓的措辞解释：墨西哥只是在公平公正地选择竞争方。他还在信里安抚他们，强调美方仍有很多其他机会可以为奥运会做贡献，没有任何值得担忧的地方。"
 MEX_Ordaz.107.a: "这只鹰的翅膀挺敏感啊。"
 MEX_Ordaz.108.t: "恶意收购"
 MEX_Ordaz.108.desc: "午饭过后，福田沿着大道悠闲地踱步，慢悠悠地往公司走。他常去的咖啡馆与公司之间的路，恰巧穿过一处大型工地。那片地方未来将会成为奥运会的比赛场馆之一。过去一年里，他眼见着这片翻搅得乱七八糟的荒地，一点点蜕变成如今初具规模的体育场。\n\n今天的工地格外热闹。几辆拖车轰隆隆地停在路边，平板车上载着沉重的履带式吊车。一名美国工头冲着操作员大喊着指令，吊车也就一台接一台地卸了下来。\n\n福田微微皱起了眉头。他在建筑行业的朋友常抱怨，说现在想续签合同是件多么艰难的事。若是涉及奥运项目，那情况就更加糟糕了。所有新建场馆的工程一律交由美国工程师承建，设备也全是清一色的美国货。哪怕日本公司一再压低报价，得到的回音却只有冷冰冰的拒信。\n\n就在两年前，日本还被视为“墨西哥奇迹”的最大金主，这一点似乎无可撼动。可如今，连财阀们都开始悄悄讨论是否要缩减在墨西哥的分公司。福田努力不去深想这意味着什么，也不敢细想这会不会动摇他在墨西哥的未来。"
 MEX_Ordaz.108.a: "日本会不会就这样被彻底踢出墨西哥呢？"
 MEX_Ordaz.109.t: "装病"
 MEX_Ordaz.109.desc: "夏末将至，墨西哥的家长们正忙着为孩子准备返校事宜。松林别墅里，总统和第一夫人也在做着类似的准备。奥尔达斯正坐在餐桌旁读着早报，而瓜达卢佩·博尔哈则一边啜饮咖啡，一边慢慢翻阅日程。\n\n终于，他们最小的儿子阿尔弗雷多现身了。“早上好，儿子，准备好上学了吗？”奥尔达斯放下报纸问道，“怎么没穿校服？”\n\n十五岁的少年穿着睡衣，神情局促地扭动了一下身体。“我觉得不太舒服，”他咳了两声，试图显得更像那么回事，“我今天可能去不了学校。”\n\n奥尔达斯皱了皱眉，却并未多说什么。他朝妻子投去一个“你来处理”的眼神，便起身准备出门上班。\n\n“阿尔弗雷多，”瓜达卢佩语气温柔地开口，“我知道你紧张，但没必要因此烦恼。国立预科学校可是很棒的学校，我相信你在那里会玩得很开心。”\n\n“妈妈，我是认真的。”他低着头说，“我是真的不舒服。”\n\n见这场争辩注定毫无结果，瓜达卢佩决定换个策略。“真可惜。我原本还想，等你放学后带你去你最爱的卡丁车赛道玩一圈呢。不过既然你病了，那我们就乖乖待在家里吧。”\n\n听到“卡丁车”三个字，阿尔弗雷多的表情明显松动了。他重重叹了口气，抬眼看着母亲说：“好吧，我这就去上学。”"
 MEX_Ordaz.109.a: "并非每个孩子都志向远大。"
 MEX_Ordaz_DS.4.t:0 "良药苦口"
 MEX_Ordaz_DS.4.desc:0 "酒店会议室里嘈杂的震耳欲聋。寥寥数人坐在桌边，而包括卢皮塔在内的大多数人都站着，哀叹自己几乎不可能有幸被总统接见。卢皮塔虽为能来到这里而感到欣喜，却不禁希望自己对联邦区的首次来访能更顺利一点。她受萨尔蒂约分会委派，到此作为代表出席医协的全国会议，既无闲暇也无余钱观光。\n\n正当喧嚣令她倍感窒息时，她惊讶的发现有人在人群边缘向她招手，示意她去实习医师们在那儿围起的那个大圈里来。在里面，一名英俊的青年正在高声抨击他们的母组织——医盟。他的嗓子都快喊破了，才能勉强压过周遭的嘈杂声。\n\n“我的意思是，如果医生们真的关心我们，就不会拖了两个月才罢工。奥尔达斯会去倾听他们的诉求，然后像上次那样再把他们打发走。”听闻此言，卢皮塔也跟着众人纷纷点头。\n\n“那我们他妈的凭什么要对他们言听计从？”她也没想到自己会开口，但在看见身旁的实习医师们都把注意力转向自己之后，她便继续说道：“他们为了保住自己的饭碗去当缩头乌龟，不代表我们也得收手。等奥尔达斯妥协后，我们再撤出街头也不迟。”话音刚落，人群中便爆发出阵阵欢呼。"
 MEX_Ordaz_DS.4.a:0 "不管医盟会不会参与，他们的罢工都不会停。"
 MEX_Ordaz_DS.5.t:0 "无麻手术"
 MEX_Ordaz_DS.5.desc:0 "医协萨尔蒂约分会的会员们挤满了市立医院的街道，高呼口号，挥舞标语。奥尔达斯拒绝倾听他们的诉求，但住院和实习医师们却坚信新一轮罢工定会把总统逼上谈判桌。他们也必须如此。\n\n远处警笛骤然发出骇人尖啸。但直到警用面包车疾驰而至，卢皮塔才注意到这声响。警笛声号叫个不停，大批手持警棍的警察从车中列队走出，形成封锁线，堵死了所有退路。刺耳哨声自某处传来，警察们步调整齐，向示威者逼近。\n\n人群中已经有人转身逃窜。蓝色警服的浪潮猛烈冲击着抗议者们。卢皮塔试图逃跑，却被身后挤成一团的人群困得动弹不得。她只能无力的看着警察挥起警棍抽向她的实习医师同伴。当众人意识到警察们并非来逮捕他们时，又一波人潮开始逃命。\n\n当卢皮塔向身后稀疏人群的空隙间猛地冲去时，一只粗糙的手攥住了她的手腕。她还没来得及转身，警棍就已狠狠砸向她的肩头。只听见一声沉闷的脆响，她的锁骨顷刻间便被砸断。撕心裂肺的惨叫自她的口中喊出，火辣辣的剧痛自锁骨的断口向全身蔓延。紧接着，又是一记警棍径直向她头上砸去。她的双腿瞬间软了下来，耳畔充斥着喝令声、惨叫声与警棍砸在血肉之躯上的闷响。警棍对准她的脑袋又重重来了两下，她便失去了意识。"
 MEX_Ordaz_DS.5.a:0 "最后传入她耳中的声音是惨叫声与警笛的咆哮。"
 MEX_Ordaz_DS.6.t:0 "每日烂苹果"
 MEX_Ordaz_DS.6.desc:0 "卢皮塔和医协萨尔蒂约分会的其他会员们挤满了市立医院外的街道，在干燥的热浪中高呼口号。突然，柴油发动机的轰鸣自远处传来，淹没了卢皮塔的喊声。三辆压缩垃圾车沿街驶来，乌云般逼近人群。笨重的卡车在抗议者面前猛地停下，将他们围困在街道中央。\n\n身着沾满污渍的帆布工装，胸前别着墨西哥工人联合会徽章的环卫工人们跳下卡车，接着就开始朝实习医师们起哄：\n\n“怎么，不想和我们这群蠢货垃圾工待在一个工会里是吧？觉得自己高人一等是吗？除了自己的那点儿破工资还关心过啥！？”液压装置吱呀作响，后倾式尾门缓缓升起。工人们伸手探入垃圾箱，从中拽出一袋袋垃圾。腐烂食物、玻璃瓶和木头片子在他们的手上化作一发发子弹，向罢工的人群射去。\n\n卢皮塔发现自己面前多了个瘦削的光头清洁工。他从卡车里摸出了一个肿胀的烂橘子，砸向了她，接着正中她的面门。\n\n一股令人窒息的恶臭炸裂开来。腐烂液体顺着脸颊流下，淌进她的眼睛和嘴里。她赶忙一口啐在柏油路上，同时不忘擦掉脸上的臭水。她接着环顾四周，半数罢工者此时已被熏天的臭气赶走。一个玻璃瓶又朝她飞来，她猛地低头，玻璃瓶在掠过她头顶后在地上摔的粉碎。她打算回家了，家里还是更安全些。"
 MEX_Ordaz_DS.6.a:0 "这污点永远没法从卢皮塔的白大褂上洗干净。"
 MEX_Ordaz_DS.7.t:0 "昏迷不醒"
 MEX_Ordaz_DS.7.desc:0 "罗伯托和伊莎贝尔凝视着心率检测仪上的那条绿色曲线微微颤动。卢皮塔每呼吸一次，心跳便加快一点，心电图上的峰值也更近一分。希望的火苗骤然闪烁，但却只是昙花一现，当空气自他们女儿口中呼出，拍在黑色的硅胶面罩上凝结起水雾时，它也随之凋零。一呼一吸间，心电图的低谷变得愈发深邃，好似绝无可能逾越的天堑。在这幅景象循环往复之时，巴列霍医生站在一旁，陈述着她的病情：\n\n“窦性心动过缓……顶骨凹陷性骨折……内出血……”罗伯托和伊莎贝尔听着医生的话，目光却紧紧锁在女儿青紫肿胀的脸庞上。堆砌的医学术语穿不透悲痛的迷雾。对这对夫妇而言，此刻世间唯一重要的事物，便是白被子下卢皮塔那伤痕累累的身躯。\n\n“我们无法确定她何时能醒来，如果她还能醒过来的话。”罗伯托脸上冷淡的伪装一瞬间破碎，轻微的抽泣声自他颤抖不止的身躯中传出。伊莎贝尔埋下头，捂住脸，泪水顺着她的手臂滑落。“如果还有其他问题，我随时——”突然，病房门猛的一下被推开，护士火急火燎地冲了进来：\n\n“巴列霍医生，14号病房需要你！又有一个示威者心脏骤停了！”听闻此言，他向悲痛的夫妻投去一个歉意的目光，随后马不停蹄跟随护士离去。医院的喧嚣自门缝中渗进屋内——鞋底磕碰瓷砖地板的摩擦声、剩下的实习医师在病房间往返的脚步声、医生索要手术刀的呼喊声、走廊中回荡的痛苦哀嚎声……门“砰”地一声再次关上。"
 MEX_Ordaz_DS.7.a:0 "罗伯托和伊莎贝尔在彼此怀中痛哭流涕，窗外，夕阳正在萨尔蒂约的地平线上缓缓下坠。"
 MEX_Ordaz_DS.8.t:0 "第二意见"
 MEX_Ordaz_DS.8.desc:0 "金色的晨曦自地平线上升起，透过薄沙窗帘，洒进卢皮塔简陋的卧室。此刻，她正忙着把角落里摞成小山的衣服堆塞进玻纤行李箱。她得北上了。和她一起在医院外参加抗议的两个朋友已经因“涉嫌社会解体”被逮捕了，但她不会步他们的后尘。\n\n卢皮塔最后瞥了一眼床头柜上的列车时刻表。如果火车不晚点，太阳落山前就能到伊格尔帕斯。她把行李箱从床上提起，走到门前。推开门之前，她又把钱包掏出来，左翻翻右翻翻，再点了一遍随行物品。坏了，护照呢？她把行李箱扔下，冲进厨房，再返回卧室。\n\n她把衣服堆翻了个遍，目光透过被泪水模糊的眼眶，但只看见了一件件胡乱摆放的衣服。她看向梳妆台，胡乱拉开抽屉，里面却空空如也。把手搭上眼眶，擦干泪花，她又把头转向家具底下。梳妆台？没有。床头柜？没有。床底呢？没……那破烂衬衫下面反着光的是什么东西？她一把抓起——蓝色封皮，上面用金箔烫着雄鹰吞蛇的图案。她把这小本子攥在胸前，塞进包里。\n\n卢皮塔提起门边的行李箱，踏出家门。门外晴空如洗，暖阳正洒满街道。轻风拂过她的面庞，拨乱了她的发丝。才走出半条街，她就看见一辆蓝白相间的道奇轿车轰鸣着冲下街道，伴着刺耳的刹车声在她面前急停。她愣在了原地，行李箱从松弛的指间滑落，重重砸在地上。"
 MEX_Ordaz_DS.8.a:0 "她一言不发，默默坐进警车的后座。"
 MEX_Ordaz_DS.9.t:0 "分崩离析"
 MEX_Ordaz_DS.9.desc:0 "法官嘴唇翕动，他那张枯瘦脸庞上草纸般单薄的皮肤也随之绷紧，看起来是那么的令人作呕。看起来好像随时都会剥落，露出它的真面目。里面是那只以折磨人为乐的微笑恶魔吗？不对。卢皮塔从未见过这老混账除了严厉瞪视之外还摆出过什么表情。坐在审判席上盯着她的这个东西，不仅没有同理心，还只会像一个大家长那样发火。\n\n“你与同伙数月来持续煽动示威，扰乱公共秩序，试图将叛乱劳工运动扩散至全国。本庭现以社会解体罪判处你六年监禁。”\n\n卢皮塔感到自己的意识渐渐抽离，她觉得自己好像在颅腔内远远眺望法庭。她想去尖叫、想去哭泣、想去做点儿什么——什么都好。但喉咙像是被缝了起来，传不出半点声响，她只能连连眨眼，强忍泪水。\n\n警察走向被告席，相机的闪光灯在他背后此起彼伏。旁听席忿忿不平，低语海浪般翻涌。法官猛敲法槌，四下便寂静无声，唯余父母抽泣不止。警察将卢皮塔押下法庭。"
 MEX_Ordaz_DS.9.a:0 "当她离去时，泪水从她的脸颊上滑落，沾湿了地毯。"
