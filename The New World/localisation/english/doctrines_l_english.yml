  SUBDOCTRINE_AREA_DEFENSE: "Area Defense"
  SUBDOCTRINE_AREA_DEFENSE_DESC: "Although historically applied only to the ground, the doctrine of "area defense" is increasingly being used in the air as well. Via new technology, we'll be able to keep our bombers over the enemy, and theirs safely crashing to the ground."
