  SUBDOCTRINE_COUNTERMEASURE_SYSTEMS_DESC: "For every advancement in precision-guided munitions, corresponding vulnerabilities in missile guidance systems appear. These developments must become an integral part of our doctrine and training in order to assure maximum pilot and airframe survivability in a combat scenario."
