  SUBDOCTRINE_NAVAL_HELICOPTER_AVIATION: "Naval Helicopter Aviation"
  SUBDOCTRINE_NAVAL_HELICOPTER_AVIATION_DESC: "Although traditionally thought of as a land-based technology, helicopters have just as many applications at sea as on land, if not more. Our carriers can be more than simply floating runways - they can be floating helipads as well."
