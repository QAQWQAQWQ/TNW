  SUBDOCTRINE_MAXIMIZED_SILO_COVERAGE_DESC: "Thanks to newly developed targeting and anti-interception technology, our silo missiles will soon have an even broader range than ever before. Before long, there will be no plain, no tank, no enemy outside of our reach."
