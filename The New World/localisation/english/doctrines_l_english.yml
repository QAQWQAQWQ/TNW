  SUBDOCTRINE_HIGH_ALTITUDE_BOMBING_DESC: "Advancements in precision bombing have allowed us to conduct bombing missions at staggeringly high altitude. By taking advantage of this, the effectiveness of our strategic strikes will increase. With these changes, our bombing runs will be able to level even the most fortified target."
