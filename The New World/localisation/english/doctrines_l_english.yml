  SUBDOCTRINE_POP_UP_ATTACKS: "Pop-Up Attacks"
  SUBDOCTRINE_POP_UP_ATTACKS_DESC: "In the face of ever-advancing anti-aircraft weapons systems, our pilots must use tactics which minimize their risk of being successfully targeted by hostile ground units. The so-called "pop-up" attack run does precisely this, while also ensuring maximum probability of successful payload delivery."
