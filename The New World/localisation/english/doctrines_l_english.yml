    #### AIR DOCTRINES ####
  GRAND_DOCTRINE_GLOBAL_FORCE: "Global Force"
  GRAND_DOCTRINE_GLOBAL_FORCE_DESC: "To ensure control of any battlefield, our planes must be able to fight anywhere, strike anywhere, and give support anywhere we see fit. Our pilots will be trained to be ready at a moments notice, making sure we are capable of a rapid response."
  GRAND_DOCTRINE_AIR_SOVEREIGNTY: "Air Sovereignty"
  GRAND_DOCTRINE_AIR_SOVEREIGNTY_DESC: "Our air force must be dedicated to defending our nation and asserting sovereignty over our own skies. By building a force of fighters and interceptors, the air force is mainly dedicated to defending our nation from enemy aerial units."
  GRAND_DOCTRINE_BATTLEFIELD_SUPPORT: "Battlefield Support"
  GRAND_DOCTRINE_BATTLEFIELD_SUPPORT_DESC: "War has changed, and our country is in need of an air force that prioritizes supporting land units. This strategy is useful in ensuring victories in small confrontations and skirmishes, which is particularly useful in guerrilla warfare."
  # Fighter, CAS, Heavy, Helicopter? Light, Heavy, Helicopter, Operations?
