  SUBDOCTRINE_STEALTH_INTEGRATION_DESC: "Perhaps no second offset technology has the sheer potential to transform air warfare as stealth. Integrating low-observable and stealth aircraft into our aviation doctrine will be utterly transformative for our ability to comprehensively control the battlespace."
