  SUBDOCTRINE_PRECISION_BOMBARDMENT: "Precision Bombardment"
  SUBDOCTRINE_PRECISION_BOMBARDMENT_DESC: "With the advent of precision-guided munitions, the old WWII-era paradigm has been turned on its head - instead of counting the number of sorties per target, we can now begin working to maximize the number of targets per sortie, drastically increasing the efficiency of air-to-ground operations."
