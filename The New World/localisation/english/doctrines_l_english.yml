  expanded_task_force_capabilities_4: ""
  expanded_task_force_capabilities_5: ""
  SUBDOCTRINE_BASTIONS_ON_THE_SEA: "Bastions On The Sea"
  SUBDOCTRINE_BASTIONS_ON_THE_SEA_DESC: "A ship is, in its own way a fortress upon the water. Its sailors cannot expect to get off it should the worst happen and this makes them fight until the last. In this age of strife it is the navy which shall protect the nation."
