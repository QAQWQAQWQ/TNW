  SUBDOCTRINE_FIRST_STRIKE_CAPABILITY: "First Strike Capability"
  SUBDOCTRINE_FIRST_STRIKE_CAPABILITY_DESC: "The best possible combat scenario for our air forces is never having to face air combat at all. Accordingly, it would be prudent to develop the capability to neutralize enemy airbases before an effective response can be mounted, leaving our dominance of the skies unchallenged."
