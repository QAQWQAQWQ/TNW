  undersea_coordination_tactics_2: ""
  undersea_coordination_tactics_3: ""
  undersea_coordination_tactics_4: ""
  undersea_coordination_tactics_5: ""
  SUBDOCTRINE_SUPERIOR_SCREEN_ORGANIZATION: "Superior Screen Organization"
  SUBDOCTRINE_SUPERIOR_SCREEN_ORGANIZATION_DESC: "Our capital ships may do all the damage but without their screens they are sitting ducks. If the destroyers that guard them move predictably a submarine can slip in a torpedo like a stiletto. Calculated formations for screening efficiency will ensure our flagships reach port safely."
