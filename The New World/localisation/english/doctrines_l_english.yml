  superior_screen_organization_2: ""
  superior_screen_organization_3: ""
  superior_screen_organization_4: ""
  superior_screen_organization_5: ""
  SUBDOCTRINE_HEAVY_MISSILE_SHIP_FOCUS: "Heavy Missile Ship Focus"
  SUBDOCTRINE_HEAVY_MISSILE_SHIP_FOCUS_DESC: "Missiles are the new planes - who needs a runway when death can be delivered in a can? Cruisers can punch above their weight by mounting heavy missiles instead of guns. No battleship is safe from these modern battle cruisers."
  heavy_missile_ship_focus_1: ""
  heavy_missile_ship_focus_2: ""
  heavy_missile_ship_focus_3: ""
  heavy_missile_ship_focus_4: ""
  heavy_missile_ship_focus_5: ""
  SUBDOCTRINE_BATTLE_GROUPS: "Battle Groups"
  SUBDOCTRINE_BATTLE_GROUPS_DESC: "Consolidating our forces into task forces led by carriers will increase the lethality of our fleets. When we come upon the enemy, we will be able to destroy them easily with their superior firepower and air capabilities."
  battle_groups_1: ""
  battle_groups_2: ""
  battle_groups_3: ""
  battle_groups_4: ""
  battle_groups_5: ""
  SUBDOCTRINE_EXPANDED_SUPPORT_SHIP_ROLES: "Expanded Support Ship Roles"
  SUBDOCTRINE_EXPANDED_SUPPORT_SHIP_ROLES_DESC: "Support ships perform a vital role, fueling and supplying our ships and ferrying our servicemen, but what if they could do more? Radar and sonar, minesweeping equipment, depth charges, AA guns, missile defense systems. Every eventuality we can prepare for is a ship saved, and the support ships must do their part in protecting the fleet."
  expanded_support_ship_roles_1: ""
  expanded_support_ship_roles_2: ""
  expanded_support_ship_roles_3: ""
  expanded_support_ship_roles_4: ""
  expanded_support_ship_roles_5: ""
  SUBDOCTRINE_FLEET_COMMAND_AND_CONTROL: "Fleet Command And Control"
  SUBDOCTRINE_FLEET_COMMAND_AND_CONTROL_DESC: "Commanding a fleet of several dozen ships is no easy task, nor is it something to be left to one man. A redundant command structure will be needed if a fleet is to move as one unit rather than a mess of easily picked off lone wolves."
  fleet_command_and_control_1: ""
  fleet_command_and_control_2: ""
  fleet_command_and_control_3: ""
  fleet_command_and_control_4: ""
  fleet_command_and_control_5: ""
  SUBDOCTRINE_EXPANDED_TASK_FORCE_CAPABILITIES: "Expanded Task Force Capabilities"
  SUBDOCTRINE_EXPANDED_TASK_FORCE_CAPABILITIES_DESC: "A task force is only as capable as its weakest link, by fortifying the weaknesses of our naval forces we can enable them to, if not be entirely independent then at least function with autonomy most of the time."
