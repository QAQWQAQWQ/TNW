  SUBDOCTRINE_GUNSHIP_SUPPORT_DESC: "As air doctrine technology becomes more advanced, the helicopters which so effectively unleash devastation upon our enemies on the ground grow ever more separate from the planes that protect them. Thankfully, we now have the equipment to fix this."
