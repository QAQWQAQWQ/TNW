  SUBDOCTRINE_VARIABLE_ATTACK_PATTERNS_DESC: "Whatever tactics we use, it is absolutely imperative that we keep our forces from becoming predictable. Accordingly, doctrine needs to be devised with multiple options in mind for any given mission profile, offering us flexibility and keeping the enemy on their toes."
