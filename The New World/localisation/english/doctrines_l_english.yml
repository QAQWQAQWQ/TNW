l_english:

  GRAND_DOCTRINE_COMBINED_OPERATIONS: "Combined Operations"
  GRAND_DOCTRINE_COMBINED_OPERATIONS_DESC: "Antiquated doctrines focus only on one aspect of warfare. Advanced cooperation between air, naval, armored and infantry aspects will destroy our enemies fully in modern battlefields."
  GRAND_DOCTRINE_MANEUVER_WARFARE: "Maneuver Warfare"
  GRAND_DOCTRINE_MANEUVER_WARFARE_DESC: "Maneuver warfare may be an obselescent doctrine, but its core principles are still useful today. By adding modern day tactics, we can easily reapply the strategy that had once guided the Reich to victory."
  GRAND_DOCTRINE_STRATEGIC_THEOREM: "Strategic Theorem"
  GRAND_DOCTRINE_STRATEGIC_THEOREM_DESC: "Wars are unglamorous, but there is beauty in seeing well-planned, well-timed and well-performed operations unfold in real time. Our generals shall prioritize perfecting this art."

  DOCTRINE_TRACK_INFANTRY: "Infantry"
  DOCTRINE_TRACK_COMBAT_SUPPORT: "Artillery & Combat Support"
  DOCTRINE_TRACK_ARMOR: "Armor"
  DOCTRINE_TRACK_OPERATIONS: "Operations"

  ## Combined Operations
  SUBDOCTRINE_ARMY_INTEROPERABILITY: "Army Interoperability"
  SUBDOCTRINE_ARMY_INTEROPERABILITY_DESC: "A combined operations doctrine can only be successful if followers are coordinated. We must redouble our efforts to ensure cooperation on all levels of our armed forces. We may serve different roles, but none shall fight alone!"
  army_interoperability_1: ""
  army_interoperability_2: ""
  army_interoperability_3: ""
  army_interoperability_4: ""
  army_interoperability_5: ""

  SUBDOCTRINE_SUPPORT_COMPANIES: "Support Companies"
  SUBDOCTRINE_SUPPORT_COMPANIES_DESC: "Be they medical, logistical, communications, or any other detachment, Support companies must remain properly supplied. The smallest edge is often the most vital."
  support_companies_1: ""
  support_companies_2: ""
  support_companies_3: ""
  support_companies_4: ""
  support_companies_5: ""
  SUBDOCTRINE_TACTICAL_SUPPORT: "Tactical Support"
  SUBDOCTRINE_TACTICAL_SUPPORT_DESC: "Infantry forces cannot operate alone! In those precious moments, when lives are on the line, tactical support makes the difference, be it softening a hard target or coordinating evacuations."
  tactical_support_1: ""
  tactical_support_2: ""
  tactical_support_3: ""
  tactical_support_4: ""
  tactical_support_5: ""

  SUBDOCTRINE_ARTILLERY_BARRAGE: "Artillery Barrage"
  SUBDOCTRINE_ARTILLERY_BARRAGE_DESC: "Artillery has existed in some form for hundreds of years, and continues to be relevant today. A good artillery barrage saves the lives of many infantrymen, instilling fear in enemy lines and disrupting their operations. There are many new innovations to be made in this field."
  artillery_barrage_1: ""
  artillery_barrage_2: ""
  artillery_barrage_3: ""
  artillery_barrage_4: ""
  artillery_barrage_5: ""
  SUBDOCTRINE_PREEMPTIVE_STRIKE: "Preemptive Strike"
  SUBDOCTRINE_PREEMPTIVE_STRIKE_DESC: "The best defense is always a good offense. Why should we wait in hiding-holes for the enemy to confront or even maneuver around us when we could be taking the fight to them. By hitting them before they are prepared for battle we are able to fight on our own terms."
  preemptive_strike_1: ""
  preemptive_strike_2: ""
  preemptive_strike_3: ""
  preemptive_strike_4: ""
  preemptive_strike_5: ""

  SUBDOCTRINE_ORGANIC_UNITS: "Organic Units"
  SUBDOCTRINE_ORGANIC_UNITS_DESC: "While broader tactical support is an important part of our doctrine, so too are organic units. In the interest of response time and cohesion, we will allow each branch to create specialized support forces. With any luck, they will fulfill roles of their rival branches while remaining embedded within their own."
  organic_units_1: ""
  organic_units_2: ""
  organic_units_3: ""
  organic_units_4: ""
  organic_units_5: ""

  SUBDOCTRINE_LAND_NAVY_COORDINATION: "Land-Naval Coordination"
  SUBDOCTRINE_LAND_NAVY_COORDINATION_DESC: "Land-Naval Coordination is vital to amphibious operations. From transport to supporting fire, our ships are a powerful tool in the hands of our infantry. We will build upon this relationship."
  land_naval_coordination_1: ""
  land_naval_coordination_2: ""
  land_naval_coordination_3: ""
  land_naval_coordination_4: ""
  land_naval_coordination_5: ""
  SUBDOCTRINE_MARINE_ELITE: "Elite Marines"
  SUBDOCTRINE_MARINE_ELITE_DESC: "Dedicated Marine units are vital to the modern battlefield. Trained to carry out a variety of expeditionary operations, amphibious or otherwise, they pick up the slack left by other armed forces. Our marines will be dutiful, competent, and ready for asymmetrical warfare."
  elite_marine_1: ""
  elite_marine_2: ""
  elite_marine_3: ""
  elite_marine_4: ""
  elite_marine_5: ""
  SUBDOCTRINE_COMMANDO_LANDING_OPERATIONS: "Commando Landing Operations"
  SUBDOCTRINE_COMMANDO_LANDING_OPERATIONS_DESC: "By using reliable and covert insertion methods, we can deploy our elite commando units behind the enemy lines to wreak havoc upon their organization, morale, and supply lines. These tactics are specially effective in reducing the effectiveness of enemy forces in preparation for larger operations"
  commando_landing_operations_1: ""
  commando_landing_operations_2: ""
  commando_landing_operations_3: ""
  commando_landing_operations_4: ""
  commando_landing_operations_5: ""

  SUBDOCTRINE_AIRLAND_STRIKES: "Air-Land Strikes"
  SUBDOCTRINE_AIRLAND_STRIKES_DESC: "By providing our ground forces with the enhanced ability to directly request air strikes and support from attack aircraft, the accuracy, deadliness, and speed of our air-land strikes will be greatly improved."
  air_land_strikes_1: ""
  air_land_strikes_2: ""
  air_land_strikes_3: ""
  air_land_strikes_4: ""
  air_land_strikes_5: ""
  SUBDOCTRINE_VERTICAL_ENVELOPEMENT: "Vertical Envelopment"
  SUBDOCTRINE_VERTICAL_ENVELOPEMENT_DESC: "Aerial insertion of infantry near the battlefield has the potential to greatly increase the speed and unpredictability of our land forces. By either air-dropping or air-lifting troops behind the front line we can rapidly encircle and cut off large enemy formations. Our army and air force will work in unison to strike the enemy from every direction."
  vertical_envelopment_1: ""
  vertical_envelopment_2: ""
  vertical_envelopment_3: ""
  vertical_envelopment_4: ""
  vertical_envelopment_5: ""
  SUBDOCTRINE_AIR_GROUND_TASK_FORCES: "Air-Ground Task Forces"
  SUBDOCTRINE_AIR_GROUND_TASK_FORCES_DESC: "Merged so to act in unison, combat elements from different fields of battle - army, artillery, airspace - can quickly respond to and counter enemy offensives as they appear. The counteroffensives they deliver hence will deliver swift, decisive victory."
  air_ground_task_forces_1: ""
  air_ground_task_forces_2: ""
  air_ground_task_forces_3: ""
  air_ground_task_forces_4: ""
  air_ground_task_forces_5: ""

  ## Maneuver Warfare
  SUBDOCTRINE_SCHWERPUNKT_TACTICS: "Schwerpunkt Tactics"
  SUBDOCTRINE_SCHWERPUNKT_TACTICS_DESC: "Schwerpunkt - "focal point" in German - refers to the strategy of concentrating an attack onto one portion of an enemy's defensive line. The tactic is intended to break through this portion and quickly spread into the rear of an enemy's line. By training our forces with this philosophy in mind, we shall take the first step to a Blitzkrieg of our own."
  schwerpunkt_tactics_1: ""
  schwerpunkt_tactics_2: ""
  schwerpunkt_tactics_3: ""
  schwerpunkt_tactics_4: ""
  schwerpunkt_tactics_5: ""
  SUBDOCTRINE_SPEARPOINTS: "Spearpoints"
  SUBDOCTRINE_SPEARPOINTS_DESC: "The idea of Schwerpunkt must be drilled not just into our men, but into our generals too. We must make sure that all of our forces are ready, willing, and able to perform offensives at a moment's notice if the doctrine is to work as intended."
  spearpoints_1: ""
  spearpoints_2: ""
  spearpoints_3: ""
  spearpoints_4: ""
  spearpoints_5: ""

  SUBDOCTRINE_MASSIVE_BOMBARDMENT: "Massive Bombardment"
  SUBDOCTRINE_MASSIVE_BOMBARDMENT_DESC: "The Schwerpunkt is certainly a strong tactic, but much of it rests on the assumption that the initial attack succeeds. To maximize our chances, we must make sure that any section we attack is first pummeled by artillery and aircraft alike. In a perfect scenario, our forces will stroll over what remains of their lines without a single causality."
  massive_bombardment_1: ""
  massive_bombardment_2: ""
  massive_bombardment_3: ""
  massive_bombardment_4: ""
  massive_bombardment_5: ""
  SUBDOCTRINE_OVERWHELMING_STRIKES: "Overwhelming Strikes"
  SUBDOCTRINE_OVERWHELMING_STRIKES_DESC: "Our attacks must be absolute in their power and force. We cannot afford to hold reserves or be cautious about our Schwerpunkt - total success or total defeat rides on the piercing blow. We must train our troops to move from place to place quickly in order to organize as many massive strikes as possible."
  overwhelming_strikes_1: ""
  overwhelming_strikes_2: ""
  overwhelming_strikes_3: ""
  overwhelming_strikes_4: ""
  overwhelming_strikes_5: ""

  SUBDOCTRINE_COMBINED_BLITZ: "Combined Blitz"
  SUBDOCTRINE_COMBINED_BLITZ_DESC: "A Schwerpunkt attack with only armor is suicidal. A Schwerpunkt attack with only infantry is doubly so. But combined, along with air support, these form into a nigh-unstoppable force. It is of the utmost importance that we improve coordination between all wings of our armed forces."
  combined_blitz_1: ""
  combined_blitz_2: ""
  combined_blitz_3: ""
  combined_blitz_4: ""
  combined_blitz_5: ""

  SUBDOCTRINE_ADAPTIVE_COMMAND_TRAINING: "Adaptive Command Training"
  SUBDOCTRINE_ADAPTIVE_COMMAND_TRAINING_DESC: "The tides of war can be as unpredictable as those of a stormy sea, and we must train our officers to account for this reality. Soon not even surprise and circumstance are acceptable excuses."
  adaptive_command_training_1: ""
  adaptive_command_training_2: ""
  adaptive_command_training_3: ""
  adaptive_command_training_4: ""
  adaptive_command_training_5: ""
  SUBDOCTRINE_MISSION_TYPE_TACTICS: "Mission-Type Tactics"
  SUBDOCTRINE_MISSION_TYPE_TACTICS_DESC: "While we cannot always expect our officers to predict the circumstances of combat, we can train them in every scenario we can think of. The more familiar they become with the situations they are likely to encounter, the better our officers will be able to confront our enemies in a more efficient fashion."
  mission_type_tactics_1: ""
  mission_type_tactics_2: ""
  mission_type_tactics_3: ""
  mission_type_tactics_4: ""
  mission_type_tactics_5: ""
  SUBDOCTRINE_MILITARY_DECEPTION: "Military Deception"
  SUBDOCTRINE_MILITARY_DECEPTION_DESC: "Part of the problem of adopting a strategy used to win the biggest war in history is that tactics are developed to counter it. Our enemies are doubtless ready to rush reinforcements to wherever we attack - therefore, we shall use feints to trick them into sending their forces away from the true battle."
  military_deception_1: ""
  military_deception_2: ""
  military_deception_3: ""
  military_deception_4: ""
  military_deception_5: ""

  SUBDOCTRINE_ASSAULT_CONCENTRATION: "Assault Concentration"
  SUBDOCTRINE_ASSAULT_CONCENTRATION_DESC: "Our officers shall conduct en masse attacks as resources and war's fortunes permit. They may be adepts in fighting equal or superior forces, but they are savants in fighting with the deck stacked in their favor."
  asssault_concentration_1: ""
  asssault_concentration_2: ""
  asssault_concentration_3: ""
  asssault_concentration_4: ""
  asssault_concentration_5: ""
  SUBDOCTRINE_STRATEGIC_DEPTH_EXPLOITATION: "Strategic Depth Exploitation"
  SUBDOCTRINE_STRATEGIC_DEPTH_EXPLOITATION_DESC: "We will strive to keep a significant distance between our front lines and the vulnerable home front. The use of depots and armories along the routes and airports for transportation will ensure that we are able to attack and defend without worrying about throwing our defenses into disarray."
  strategic_depth_exploitation_1: ""
  strategic_depth_exploitation_2: ""
  strategic_depth_exploitation_3: ""
  strategic_depth_exploitation_4: ""
  strategic_depth_exploitation_5: ""
  SUBDOCTRINE_SUPPLY_CHAIN_EXTENSION: "Supply-Chain Extension"
  SUBDOCTRINE_SUPPLY_CHAIN_EXTENSION_DESC: "Fighting deep into enemy territory is often required of the mobile modern army, likewise leaving them vulnerable to supply shortages and encirclement. We will train our generals to extend their supply lines through the use of rear echelon forces and garrisons that can secure the roads from home."
  supply_chain_extension_1: ""
  supply_chain_extension_2: ""
  supply_chain_extension_3: ""
  supply_chain_extension_4: ""
  supply_chain_extension_5: ""

  SUBDOCTRINE_SHOCK_AND_AWE: "Shock And Awe"
  SUBDOCTRINE_SHOCK_AND_AWE_DESC: "Even a well-prepared enemy can be thrown off of their footing by an impressive enough display of firepower and force. By leveraging massed artillery fire, coordinated air strikes, and overwhelming numbers at the point of contact any enemy can be crushed."
  shock_and_awe_1: ""
  shock_and_awe_2: ""
  shock_and_awe_3: ""
  shock_and_awe_4: ""
  shock_and_awe_5: ""

  ## Strategic Theorem
  SUBDOCTRINE_PREPARED_DEFENSE: "Prepared Redoubt Systems"
  SUBDOCTRINE_PREPARED_DEFENSE_DESC: "Small, well-fortified redoubts will serve as early warning systems against incoming enemy attacks. If positioned at certain strategic positions, these redoubts can delay offensives for hours and even days."
  prepared_redoubt_systems_1: ""
  prepared_redoubt_systems_2: ""
  prepared_redoubt_systems_3: ""
  prepared_redoubt_systems_4: ""
  prepared_redoubt_systems_5: ""
  SUBDOCTRINE_ARMY_RESERVE_TRAINING: "Army Reserve Training"
  SUBDOCTRINE_ARMY_RESERVE_TRAINING_DESC: "Guns, tanks and planes only perform as well as the men who man them. Take away the men, and even the most sophisticated weapon systems remain as inert and useless as scrap metal. A healthy reserve corps will preclude this scenario from occurring in our armies."
  army_reserve_training_1: ""
  army_reserve_training_2: ""
  army_reserve_training_3: ""
  army_reserve_training_4: ""
  army_reserve_training_5: ""
  SUBDOCTRINE_INFRASTRUCTURAL_RESERVE: "Infrastructural Reserve"
  SUBDOCTRINE_INFRASTRUCTURAL_RESERVE_DESC: "By maintaining a stockpile of construction materials, construction equipment and construction workers on hand, roads and factories damaged from air strikes or artillery fire will not have to wait long before returning to work as good as new."
  infrastructural_reserve_1: ""
  infrastructural_reserve_2: ""
  infrastructural_reserve_3: ""
  infrastructural_reserve_4: ""
  infrastructural_reserve_5: ""

  SUBDOCTRINE_OPERATIONAL_ASSAULT: "Operational Assault"
  SUBDOCTRINE_OPERATIONAL_ASSAULT_DESC: "An offensive attacks not only from the front, but also behind the adversary's lines and within their home fronts. A good general masters all three attacks to achieve unconditional victory."
  operationl_assault_1: ""
  operationl_assault_2: ""
  operationl_assault_3: ""
  operationl_assault_4: ""
  operationl_assault_5: ""
  SUBDOCTRINE_LARGE_FRONT_OPERATIONS: "Large Front Operations"
  SUBDOCTRINE_LARGE_FRONT_OPERATIONS_DESC: "By striking the enemy at multiple points simultaneously along their entire front we can keep our foes on their backfoot and without the initiative. They dare not launch a counterattack for fear of being broken through down the line and they further have no ability to reinforce the points of contact as there are too many to handle even by the best led armies."
  large_front_operations_1: ""
  large_front_operations_2: ""
  large_front_operations_3: ""
  large_front_operations_4: ""
  large_front_operations_5: ""
  SUBDOCTRINE_OVERWHELMING_FORCE: "Overwhelming Force"
  SUBDOCTRINE_OVERWHELMING_FORCE_DESC: "There is no point in fighting a battle you cannot be sure you will win. In modern warfare, the waste of equipment and manpower cannot be condoned. That is why, when we do attack, we do so with such a massed force as to sweep away any defensive that might be offered."
  overwhelming_force_1: ""
  overwhelming_force_2: ""
  overwhelming_force_3: ""
  overwhelming_force_4: ""
  overwhelming_force_5: ""

  SUBDOCTRINE_COMPREHENSIVE_STRATEGIC_ANALYSIS: "Comprehensive Strategic Analysis"
  SUBDOCTRINE_COMPREHENSIVE_STRATEGIC_ANALYSIS_DESC: "We need to train our staff officers to be able to grasp the strategic implication of every on-ground decision, and to be able to see the big picture as well as the small. Far too often an army is ruined by an inability to look beyond the tactical level. This will not happen to our forces, as our generals will have the skills needed to craft intelligent and successful operations."
  comprehensive_strategic_analysis_1: ""
  comprehensive_strategic_analysis_2: ""
  comprehensive_strategic_analysis_3: ""
  comprehensive_strategic_analysis_4: ""
  comprehensive_strategic_analysis_5: ""
  SUBDOCTRINE_LARGE_SCALE_EXERCISES: "Large Scale Exercises"
  SUBDOCTRINE_LARGE_SCALE_EXERCISES_DESC: "Individual recruit training is of course, a requirement for any professional army, but so too is strategic training. Using divisions, corps, and even entire armies we can simulate massive battlefields in which our generals will be able to learn the skills of directing troops and our soldiers will better learn to fight in their greater roles together."
  large_scale_exercises_1: ""
  large_scale_exercises_2: ""
  large_scale_exercises_3: ""
  large_scale_exercises_4: ""
  large_scale_exercises_5: ""

  SUBDOCTRINE_SUPPLY_ROUTES: "Supply Chain Reinforcement"
  SUBDOCTRINE_SUPPLY_ROUTES_DESC: "Our use of large scale operations is contingent upon plentiful supply lines. It is therefore imperative that we adequately prepare them by using our engineers to rebuild infrastructure in occupied territories and using reserve forces as truck drivers and escorts wherever possible to ensure a steady line of supply reaches the front."
  supply_chain_reinforcement_1: ""
  supply_chain_reinforcement_2: ""
  supply_chain_reinforcement_3: ""
  supply_chain_reinforcement_4: ""
  supply_chain_reinforcement_5: ""
  SUBDOCTRINE_WARTIME_INDUSTRY: "Wartime Industry"
  SUBDOCTRINE_WARTIME_INDUSTRY_DESC: "Napoleon had learned that an army marches on his stomach; a century and a half later, the army's stomach has grown enough to necessitate a nation's worth of factories and workers. Ours shall step up to the task."
  wartime_industry_1: ""
  wartime_industry_2: ""
  wartime_industry_3: ""
  wartime_industry_4: ""
  wartime_industry_5: ""

  SUBDOCTRINE_STRATEGIC_CYCLES: "Strategic Cycles"
  SUBDOCTRINE_STRATEGIC_CYCLES_DESC: "Always being on the offense will quickly wear out our forces, and always being on the defensive will ruin morale. We can make our strategic objectives easier to grasp and therefore easier to carry out by placing them into a cycle. We will attack along the line, hold to stabilize, and then attack after letting the enemy whittle themselves down uselessly."
  strategic_cycles_1: ""
  strategic_cycles_2: ""
  strategic_cycles_3: ""
  strategic_cycles_4: ""
  strategic_cycles_5: ""
  SUBDOCTRINE_CONCURRENT_FRONT_ASSAULTS: "Concurrent Frontal Assaults"
  SUBDOCTRINE_CONCURRENT_FRONT_ASSAULTS_DESC: "An enemy on the back foot, no matter how strong, can neither defend itself nor fight back. Our strategies shall hence make use of multiple units fighting concurrently to keep the enemy as often in the back foot as possible."
  concurrent_frontal_assaults_1: ""
  concurrent_frontal_assaults_2: ""
  concurrent_frontal_assaults_3: ""
  concurrent_frontal_assaults_4: ""
  concurrent_frontal_assaults_5: ""

