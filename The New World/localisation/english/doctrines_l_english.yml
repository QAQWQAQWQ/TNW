  SUBDOCTRINE_UNENDING_COVERAGE_DESC: "Until recently there have been any number of issues which disrupt air coverage in times of war. Thankfully, the best of modern technology will allow us to implement round-the-clock refueling and support staff, and so keep our aces flying!"
