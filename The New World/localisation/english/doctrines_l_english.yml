  modern_kantai_kessen_3: ""
  modern_kantai_kessen_4: ""
  modern_kantai_kessen_5: ""
  SUBDOCTRINE_UNDERSEA_COORDINATION_TACTICS: "Undersea Coordination Tactics"
  SUBDOCTRINE_UNDERSEA_COORDINATION_TACTICS_DESC: "Consider a game of Marco Polo, where every contestant has a knife. Then imagine that each player is at the bottom of the ocean with an extra dimension thrown in. We must produce procedures to ensure our captains act predictably in these situations, that they might work together without direct communication."
