  SUBDOCTRINE_JOINT_AIR_OPERATIONS_DESC: "He who flies alone, dies alone. If we commit air resources to a mission, we must ensure that they are comprehensively supported by all available air, land, sea, and space assets, regardless of service or command. Enhancing this coordination will greatly improve our global fighting capabilities."
