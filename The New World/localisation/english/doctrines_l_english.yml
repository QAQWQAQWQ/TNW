  bastions_on_the_sea_2: ""
  bastions_on_the_sea_3: ""
  bastions_on_the_sea_4: ""
  bastions_on_the_sea_5: ""
  SUBDOCTRINE_COASTAL_SUBMARINE_PATROLS: "Coastal Submarine Patrols"
  SUBDOCTRINE_COASTAL_SUBMARINE_PATROLS_DESC: "The defense of our nation's waters do not only need to come from our surface fleet. By using submarines in our coastal patrols, we shall be able to defend our waters from smugglers and small craft, and pose enough of a deterrent to ward off attack from another nation."
  coastal_submarine_patrols_1: ""
  coastal_submarine_patrols_2: ""
  coastal_submarine_patrols_3: ""
  coastal_submarine_patrols_4: ""
  coastal_submarine_patrols_5: ""
  SUBDOCTRINE_DESTROYER_BASED_OPERATIONS: "Destroyer Based Operations"
  SUBDOCTRINE_DESTROYER_BASED_OPERATIONS_DESC: "Battleships and carriers may be economically impossible for us, but the small craft that make up the bulk of any navy are still available. The destroyers of our fleet shall take up the role of the cruiser in larger fleets: giving fire support, setting screens for our larger ships, and fighting with distinction in battle."
  destroyer_based_operations_1: ""
  destroyer_based_operations_2: ""
  destroyer_based_operations_3: ""
  destroyer_based_operations_4: ""
  destroyer_based_operations_5: ""
  SUBDOCTRINE_ESCORT_FRIGATE_GROUPS: "Escort Frigate Groups"
  SUBDOCTRINE_ESCORT_FRIGATE_GROUPS_DESC: "The frigate is crucial to the success of our navy, and as such we must bring a competent strategy to the table. Alone, the frigate is pitifully weak against any attacker, but when in groups, an escort can take on opponents of much greater armament. We must drill our captains relentlessly on group tactics and coordination if we wish for this strategy to succeed."
  escort_frigate_groups_1: ""
  escort_frigate_groups_2: ""
  escort_frigate_groups_3: ""
  escort_frigate_groups_4: ""
  escort_frigate_groups_5: ""
  SUBDOCTRINE_SUBMARINE_MINELAYING: "Submarine Minelaying"
  SUBDOCTRINE_SUBMARINE_MINELAYING_DESC: "Our navy will never be large enough to cover all of our coast at once, but we can use naval mines to cover our bases. In times of war, our submarines shall be able to deploy mines wherever needed to ward off enemies and destroy those foolish enough to sail into our waters."
  submarine_minelaying_1: ""
  submarine_minelaying_2: ""
  submarine_minelaying_3: ""
  submarine_minelaying_4: ""
  submarine_minelaying_5: ""
  SUBDOCTRINE_RECONNAISANCE_SWEEPING_TACTICS: "Reconnaissance Sweeping Tactics"
  SUBDOCTRINE_RECONNAISANCE_SWEEPING_TACTICS_DESC: "An advantage that a lighter navy has over its larger counterparts is speed. Our destroyers, frigates, and submarines will patrol our waters on a regular basis, looking for enemies on a regular basis. Our speed will allow us to find the enemy, report his position, and retreat to reinforcements before they even have the chance to respond."
  reconnaissance_sweeping_taactics_1: ""
  reconnaissance_sweeping_taactics_2: ""
  reconnaissance_sweeping_taactics_3: ""
  reconnaissance_sweeping_taactics_4: ""
  reconnaissance_sweeping_taactics_5: ""
  SUBDOCTRINE_MODERN_SCREEN_MANEUVERS: "Modern Screen Maneuvers"
  SUBDOCTRINE_MODERN_SCREEN_MANEUVERS_DESC: "The screen maneuver has been used by light ships ever since the First World War, but naval warfare of today is much different than that of even 1945. We must train the captains of our lighter ships on the art of defending our heavier ships from aircraft, missiles, and anything else. After all, if we lose our big ships, we may never be able to repair them."
  modern_screen_maneuvers_1: ""
  modern_screen_maneuvers_2: ""
  modern_screen_maneuvers_3: ""
  modern_screen_maneuvers_4: ""
  modern_screen_maneuvers_5: ""
  SUBDOCTRINE_LIGHT_CRUISER_DOCTRINE: "Light Cruiser Doctrine"
  SUBDOCTRINE_LIGHT_CRUISER_DOCTRINE_DESC: "The light cruiser is the backbone of the green water navy- small enough to be quickly produced, fast enough to keep up with the rest of fleet, but armed well enough to fight against larger enemies. We must focus our doctrine around these craft if we wish to compete on the seas with anyone who could be an enemy."
