  #NAVAL DOCTRINES
  GRAND_DOCTRINE_BLUE_WATER_NAVY: "Blue Water Navy"
  GRAND_DOCTRINE_BLUE_WATER_NAVY_DESC: "How many nations can boast a fleet worthy of the high seas? A true modern superpower must be able to contest any point on the globe at any time with overwhelming force, mustering a force of battleships and carriers that would bankrupt a smaller nation. Gunboat diplomacy has never been so big."
  GRAND_DOCTRINE_GREEN_WATER_NAVY: "Green Water Navy"
  GRAND_DOCTRINE_GREEN_WATER_NAVY_DESC: "We may never have the ability to have a navy that can project power globally, but we can certainly have one that defends our waters with pride and honor. By focusing on the light ships of a navy, we can create a fleet that serves our purposes without bankrupting our economy."
  # Maybe merge Capital + Carrier and add Operations Track like Army
  DOCTRINE_TRACK_CAPITAL_SHIPS: "Capital Ships"
  DOCTRINE_TRACK_SCREENS: "Screens"
  DOCTRINE_TRACK_SUBMARINES: "Submarines"

  SUBDOCTRINE_GLOBAL_FLEET_DISTRIBUTION: "Global Fleet Distribution"
  SUBDOCTRINE_GLOBAL_FLEET_DISTRIBUTION_DESC: "To be able to maintain global hegemony, we must be within arm's reach of every continent. Our fleets will never tire in their patrol of the oceans, stationed at far-flung bases across the world."
  global_fleet_distribution_1: ""
  global_fleet_distribution_2: ""
  global_fleet_distribution_3: ""
  global_fleet_distribution_4: ""
  global_fleet_distribution_5: ""
  SUBDOCTRINE_THE_HIDDEN_ARM: "The Hidden Arm"
  SUBDOCTRINE_THE_HIDDEN_ARM_DESC: "A good navy has just as much tonnage beneath the waves as it does above it. The silent warfare beneath the surface is just as important as the noisy one above it - perhaps moreso, with the advent of the nuclear triad."
  the_hidden_arm_1: ""
  the_hidden_arm_2: ""
  the_hidden_arm_3: ""
  the_hidden_arm_4: ""
  the_hidden_arm_5: ""
  SUBDOCTRINE_RESERVE_FLEETS: "Reserve Fleets"
  SUBDOCTRINE_RESERVE_FLEETS_DESC: "Fleets are ruinous to produce, and to replace one takes longer than most governments are in existence. We must maintain ships in reserve, to perform the roles of the those lost in combat or being repaired in drydock. Outlasting our enemy may be the key to starving them out."
  reserve_fleet_1: ""
  reserve_fleet_2: ""
  reserve_fleet_3: ""
  reserve_fleet_4: ""
  reserve_fleet_5: ""
  SUBDOCTRINE_GLOBAL_RANGE_OPERATIONS: "Global Range Operations"
  SUBDOCTRINE_GLOBAL_RANGE_OPERATIONS_DESC: "Maintaining enough forces to respond to a threat anywhere is impossible as much as we wish it we not. We must be able to operate on a global scale. If we have one fleet in the Atlantic and another in the Pacific we should be able to swap them without so much as a by-your-leave. Flexibility is the key to victory."
  global_range_operations_1: ""
  global_range_operations_2: ""
  global_range_operations_3: ""
  global_range_operations_4: ""
  global_range_operations_5: ""
  SUBDOCTRINE_STRIKE_GROUPS: "Strike Groups"
  SUBDOCTRINE_STRIKE_GROUPS_DESC: "A captain is the king of his own vessel but our captains must know how to work together to achieve victory. Within each fleet our ships will be assigned to strike groups, working together with programmed efficiency to dismantle the enemy in detail"
  strike_groups_1: ""
  strike_groups_2: ""
  strike_groups_3: ""
  strike_groups_4: ""
  strike_groups_5: ""
  SUBDOCTRINE_MODERN_KANTAI_KESSEN: "Modern Kantai Kessen"
  SUBDOCTRINE_MODERN_KANTAI_KESSEN_DESC: "The Kantai Kessen, or Decisive Battle Doctrine, is the strategy of eliminating the enemy navy in a quick, decisive battle, which the IJN used successfully in the last war. Though technology has changed, the rules of naval combat still apply, and we must prepare for this decisive moment."
