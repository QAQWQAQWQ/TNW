  SUBDOCTRINE_AIR_TASKING_ORDER: "Air Tasking Order"
  SUBDOCTRINE_AIR_TASKING_ORDER_DESC: "The development of efficient air tasking - that is, the establishment of set target priorities - is a game-changer for operations planning. Ensuring that our communications network is capable of securely transmitting such orders in real time will grant us much better command and control."
