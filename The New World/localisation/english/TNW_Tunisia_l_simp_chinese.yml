 POLITICS_MUHAMMAD_VIII_DESC:0 "如今的突尼斯正像是老话说的一样，躲得过初一，躲不过十五。轴心国军队横扫北非之时，突尼斯兴高采烈地甩掉了法国的枷锁，却又迎来了罗马更加严酷的统治。过去三十年里，欧陆秩序被碾压得支离破碎，面目全非，而突尼斯则依然如故。在侯赛因王朝贝伊穆罕默德八世·阿明的身上，动荡之中的停滞体现得淋漓尽致。\n\n穆罕默德八世更为人所熟知的名字是拉明贝伊，他是蒙塞夫贝伊的表弟，也是他选定的继承人。蒙塞夫贝伊在战争中致力于挣脱法国霸权，一手缔造了战后的突尼斯。尽管贝伊对意大利的退让引起了部分民众的强烈不满，但他依然被认为是突尼斯的民族英雄。此后，意大利将突尼斯并入其非洲领地的计划以失败告终，罗马于是选中了拉明贝伊，担任保护国摄政。讽刺的是，这个政权与很久之前法国的手笔并无二致。\n\n意大利既是突尼斯的解放者，也是突尼斯的奴役者；拉明贝伊既是意大利的帮凶，也是反抗意大利的推手。法律上说，贝伊是罗马国王统治的代表，但他与表兄一样，也希望与意大利协商谈判，还突尼斯以自由。与他有联系的宪政党既是合作机构，也是真正可靠的民族主义力量，寻求着谨慎合法的道路，迈向自由的祖国。然而，突尼斯是个分化极其严重的地方，贝伊也越来越老态龙钟——若是贝伊猝然离世，宪政党精心搭建起的平衡就可能在一瞬之间土崩瓦解。"
 TUN_the_second_treaty_of_bardo:0 "第二次巴尔杜条约"
 TUN_the_second_treaty_of_bardo_desc:0 "1881年，法国与当时的突尼斯贝伊签订了《巴尔杜条约》，完全剥夺了其自治权。有人曾天真地以为，法国人的一败涂地会让日子好过些，可结果却是又一次耻辱。\n\n在意大利的摆布之下，贝伊成了无权无势的摄政。至于本就微薄的经济利益，不论是工农业还是旅游业，都难逃被宗主敲骨吸髓、剥削一空的命运。\n\n但是，关于突尼斯石油的传言或许能为王国带来金流……"
 TUN_destour_hegemony:0 "宪政党霸权"
 TUN_destour_hegemony_desc:0 "宪政党的命运颇具讽刺意味：它原先的宗旨是将阿拉伯人组织起来，共同反对法国殖民主义，可现今却只得不情不愿地与意大利殖民者为伍。\n\n新宪政党瓦解之后，不得不并入宪政党，它由此而成为了突尼斯唯一的合法政党，但政治暴力与国内紧张局势正使得党愈发不稳：内有各派撕扯不休，外有诸如共产主义运动等异议势力不断壮大。"
 TUN_the_italo_tunisians:0 "意裔突尼斯人"
 TUN_the_italo_tunisians_desc:0 "数百年来，突尼斯一直都是无处可去、一无所有的意大利移民向往的避难所。在法国殖民统治下，意裔突尼斯人饱受蹂躏，法西斯主义许诺的荣耀和与祖国的纽带曾一度让他们心驰神往。\n\n现今，突尼斯真的落入了意大利的统治之下，这个群体的分化随之明显加剧：法西斯崇高承诺仍未兑现，反法西斯和左翼思想在部分人群中得到了支持。突尼斯的意大利人已经形成了两个激烈对立的阵营，只有斗争才能决定谁将占得上风。"
