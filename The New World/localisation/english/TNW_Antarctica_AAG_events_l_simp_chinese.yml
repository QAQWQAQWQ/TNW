 antarctica_grid_event_aag.41.t:0 "致安东的报告"
 antarctica_grid_event_aag.41.desc:0 "致安东·格拉塞尔，\n\n阿勃维尔驻席尔马赫站分遣队报告：\n\n敌人正在对爱娃·希特勒地展开侦察。\n\n我们预测敌军会在数日内对上述争议领地展开行动。\n\n阿勃维尔建议在该地区展开反制行动。"
 antarctica_grid_event_aag.41.a:0 "这将会暂时阻止敌人的一切行动，胜利万岁。"
