 antarctica_grid_event_aag.38.t:0 "商务旅行"
 antarctica_grid_event_aag.38.desc:0 "“渡边先生，您的孩子们近来可还好？”里夏德在电话中对他的日本线人大声说道。\n\n“有话快说，我要去澳门和几个同僚一起赌博，飞机马上就要起飞了。”\n\n长时间孤身待在新施瓦本的里夏德听着渡边睦裕那头传来的机场噪音，说道：“我说，你欢不欢迎我带着妻儿去拜访新加坡……啊抱歉，昭南？”\n\n渡边被这一问打得措手不及，结结巴巴地回应道：“嗯……我想是的，但现在不是说这些的时候。你想干什么？我在这儿说德语已经引来不少奇怪的目光了！”\n\n里夏德叹了口气，想着自己离开冰冷边疆的日子：“好吧，听着，我需要你把接下来的话记下来。”席尔马赫听到另一端传来一声呻吟，渡边摸索着掏出了他的记事本。\n\n“好的，我在听。”\n\n“很好。最近，宪兵队出了个当红新人，在南极大陆上搞风搞雨，叫竹村顺子，她真的很碍我们的事儿。我需要你出力，让她离开南极。至于酬劳嘛，当飞机降落在澳门时，你会发现你的赌博资金已经多了一百万日元。”\n\n渡边放下电话，记下了这个名字。通过听筒，里夏德听到了机场中的一点一滴：孩童的哭泣，游客们冲向出发的航站楼，商人的笑声，还有鞋底和瓷砖之间发出的摩擦声响。\n\n那一刻，这位老飞行员知道了他想要什么。他想和家人一起穿梭在繁忙的航站楼中，乘坐喷气式飞机环游世界，把南极这场大博弈抛诸脑后。半分钟后，渡边拿起了电话。\n\n“我记下了，你应该能在两周以内得到结果。”\n\n在里夏德还没来得及出口说再见之前，渡边又接着说道：“噢对了，在走之前，我还是想邀请你来大阪，我们关西人的好客可是没有上限的。至于那些马来亚人？可算了吧。”"
 antarctica_grid_event_aag.38.a:0 "“谢谢你邀请，旅行愉快。”"
 antarctica_grid_event_aag.39.t:0 "祝你做客愉快"
 antarctica_grid_event_aag.39.desc:0 "在席尔马赫站机场的停机坪上，一名瘦削的挪威男子走下了飞机，阿勃维尔分队的长官马丁·莱特纳正在这里等着他。在发动机的轰鸣中，两人交谈起来。\n\n“伯根先生！希望您的飞行不算太糟糕。”\n\n“不，这段旅程好极了。叫我杰斯珀就好。”\n\n“好的，杰斯珀，欢迎来到席尔马赫站，希望你遇见的那些繁文缛节也一样没有冒犯到你。”\n\n“哦，没那么糟，我很开心能来到这里。”\n\n两人走到席尔马赫站外，一起踏进了大楼，一阵暖意立刻包裹住了他们的身体。莱特纳不想让谈话中断，他再一次开口，问道：\n\n“说起来，如果我没记错的话，你长大的环境与这地方挺像的？”\n\n身形高大的北欧人扶了扶镜框，回答道：“是的。我在斯瓦尔巴出生长大，继承了家族的水上飞机生意，所以我很擅长在空中发现别人会错过的东西。”\n\n马丁也随之点了点头：“说实话，我从来没去过挪威，要是有机会我一定要去看看。走吧，我带你去住的地方。”\n\n杰斯珀笑了，说道：“谢谢您，莱特纳先生，没有这个必要。这儿对我来说就像家一样，只是驯鹿变成了企鹅而已。”\n\n马丁笑了，他的笑容令人不虞有他，除了阿勃维尔的同僚之外，他骗过了所有人：莱特纳曾经去过挪威，射杀过太多太多的抵抗组织成员，数都数不清，其中大多数都还是青少年……和他当年的年龄一样。\n\n“您没事吧，莱特纳先生？”杰斯珀问道，把莱特纳拉回了现实。马丁意识到他们现在正身处南极的住所之中，他装出一副微笑的面孔，回答道："
 antarctica_grid_event_aag.39.a:0 "“没事儿，我很好……到了，祝你在这儿待得愉快。”"
