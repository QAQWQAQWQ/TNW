 antarctica_grid_event_aag.48.t:0 "种瓜得瓜，种豆得豆"
 antarctica_grid_event_aag.48.desc:0 "恩斯特·赫尔曼坐在办公室里，手边放着一杯热茶。天气越来越冷，让他心情相当不好，麦克默多站来的美国大使还把他的时间都占满了，抱怨、争吵的声音此起彼伏。这帮扬基佬根本就不懂纪律，德国人很鄙视他们这一点。\n\n马特拉大使身材矮小，留着一头长发，不苟言笑，嘴里不断冒出一句又一句的抱怨。恩斯特的脑海中充满着欲望，想要狠狠地教训教训这个大使。只要大使再接着不断叫赫尔曼的名字，他的暴力幻想就会化作为现实。\n\n“喂！喂！你到底有没有在听我说话？！”\n\n恩斯特一拳砸在桌子上，打翻了自己的茶杯，他的敌意引起了大使的注意。可不幸的是，恩斯特只会因此而更加愤怒。他清了清嗓子，组织了一下词汇，开始破口大骂：\n\n“滚出我的办公室，我让你飞了一千多公里来这儿，可不是为了让一群……矮子嬉皮士脏我的耳朵！你会因为自己的所作所为承担后果，把你那该死的头发剪掉！滚出去！”\n\n这阵咆哮过后一小时，恩斯特又坐了自己的办公桌前，新茶杯已经换好，盛着热腾腾的茶水，旁边还放着一份揭露一名相当有地位的共民党参议员的档案。恩斯特情不自禁地露出邪恶的笑容：一般来说，他都会把阅读这种文件的工作交给下属。但今天情况特殊，恩斯特决定粗略地看一看，他甚至还会主动把它寄给《纽约时报》。"
 antarctica_grid_event_aag.48.a:0 "让我们看看你到底在藏些什么……艾伯特·戈尔。"
 antarctica_grid_event_aag.49.t:0 ""
 antarctica_grid_event_aag.49.desc:0 ""
 antarctica_grid_event_aag.49.a:0 ""
 antarctica_grid_event_aag.50.t:0 "机器中的齿轮"
 antarctica_grid_event_aag.50.desc:0 "斯图加特最肮脏的街道中最昏暗的小巷里，一位当地侦探和一名阿勃维尔特工擦肩而过，两人之间做了一桩旁人难以察觉的交易。第二天，侦探得到了他多年来一直渴求的晋升，一盒被遗忘的文件则在悄然之间销声匿迹。\n\n午夜时分，火车飞快地驶向汉堡。一名不起眼的阿勃维尔女雇员溜进了套间，一位头发稀疏的老人正在等她。她把文件放在茶桌上，然后就像窗外的雪花一样，安静地离开了房间。\n\n塞伦盖蒂，列车飞驰而过，一名本地党卫队士兵望着非洲大草原上的夕阳。他的白人战友坐在旁边，一起吞云吐雾，开始谈论起达累斯萨拉姆——那是他们出生的家乡，也是他们将会辞世的地方。香烟燃尽，白人士兵起身告别，手里多出了一个之前没有的公文包。\n\n在席尔马赫站的大厅中，通风系统散发着源源不断的热量。赖克·汉纳曼沐浴在温暖之中，大步走向恩斯特·赫尔曼的办公室。门是敞开的，恩斯特将这个小人物迎进办公室，汉纳曼随后把文件放在了办公桌上。\n\n“先生，您要的文件。拿到它并不容易，但他们总是能找到自己的办法。”\n\n“没错，二等兵，谢谢你。解散。”"
 antarctica_grid_event_aag.50.a:0 "相互利用而已。"
 antarctica_grid_event_aag.51.t:0 "偶遇"
 antarctica_grid_event_aag.51.desc:0 "海面笼罩在浓雾之中。马丁看着布赖特林号的船艏犹如热刀切黄油般划开雾霭，显出底下不断起伏的深邃海水。他所搭乘的这艘船是一小支南极海岸巡逻船队的一分子，任务是搜索水域内存在的敌军侦察部队，同时保护南极的德占地区免受任何外物侵扰。诚然，敌军舰队应该在海上某处，但在这天涯海角，“某处”可是好一大片地方呢。\n\n突然间，船上警笛大作。水手们大吃一惊，纷纷赶回到战斗岗位。\n\n透过浓雾，马丁看见右舷外有几道晃荡的光束。他们小心翼翼地向光源靠去，准备与之交火，不过靠上去后才发现是一队因风暴而迷航的渔船。巡逻队旗舰法尔克号的船长对他们作了一番严厉训话，但对面无动于衷，显然是对牛弹琴。巡逻队给渔船队提供了坐标后，两班人马便分道扬镳，各自向未知的水域驶去。"
 antarctica_grid_event_aag.51.a:0 "马丁只得继续干这单调的任务。"
 antarctica_grid_event_aag.52.t:0 ""
 antarctica_grid_event_aag.52.desc:0 ""
 antarctica_grid_event_aag.52.a:0 ""
 antarctica_grid_event_aag.53.t:0 "黑潮之下"
 antarctica_grid_event_aag.53.desc:0 "浮标坠锚沉入海洋深处，撞上海底，激起一团土壤还有淤泥，扰乱了这处尚未为人类所触及的地方，就此停留在世界上某个不知名的角落，与这片荒凉的大地为伴。多哥号是一艘经过改装的布雷艇，它现在的工作更加和平，用来放置浮标。它现在的任务则是在此前几乎闻所未闻的地方投下浮标，以满足新施瓦本的目标和要求。她已经投放了足足几十个浮标，从飞机的指示信号到标记海上航道以及边界的浮标。她将最后一个浮标抛进黑暗的雾气，浮标顶部在空气和海水之间微微晃动。随后，多哥号转向启程，返回母港。"
 antarctica_grid_event_aag.53.a:0 "阴影之海中的一缕孤光。"
 antarctica_grid_event_aag.54.t:0 ""
 antarctica_grid_event_aag.54.desc:0 ""
 antarctica_grid_event_aag.54.a:0 ""
 antarctica_grid_event_aag.55.t:0 "U艇战术"
 antarctica_grid_event_aag.55.desc:0 "在进入海况险恶、风暴肆虐的海域之前，潜艇短暂地浮出水面换气，然后又潜入海浪之下。潜艇下沉时，一名军官专注地注视着他的雷达，决心找到他们正在追逐的那艘未知舰船。离战后U艇U-5309号出发追踪雷达上一个奇怪的亮点，已经过去了将近一个星期。一周以来，船员们都很辛苦，但他们终于快要追上入侵者了。\n\n军官暂时离开他的岗位，海水冲过外壳，潜艇承受着难以估量的水压。当他回过头来查看声呐面板时，他看到一个亮点正慢慢地靠近中心：这艘船已经逃不掉了！\n\n军官大声报出位置信息，潜艇在几秒之内就活跃起来，艇员和武器操作员都快速进入战斗岗位。命令是在不引起战争的情况下把它吓跑，他们因此拥有足够的余裕，能好好地玩一玩。\n\n几分钟后，一艘外国巡洋舰在示警意味的鱼雷爆炸中落荒而逃，而德国U艇则调头返回港口。"
 antarctica_grid_event_aag.55.a:0 "独狼出击。"
 antarctica_grid_event_aag.56.t:0 ""
 antarctica_grid_event_aag.56.desc:0 ""
 antarctica_grid_event_aag.56.a:0 ""
 antarctica_grid_event_aag.57.t:0 "绘制未知之地"
 antarctica_grid_event_aag.57.desc:0 "一名孤独的制图员坐在一大堆设备旁，有些在嗡嗡作响，有些在滴滴发声，还有些则只是不断疯狂地闪烁。他的工作是绘制南极大陆的嶙峋山脉和茫茫雪原。他永远都弄不清楚自己怎么上了这艘船，收集数据、绘制海底地图。\n\n至少他还能在领地得到的最优良的设备，所以他很同情那些探险家和地图测绘的前辈：他们只能在荒凉的大地上徒步跋涉，除了纸张和指南针之外，他们什么都没有。\n\n他不由得感到一阵欣慰，在沉思中，他的思绪飘向了身处德国的家人、朋友和同僚。像今天这样的日子里，他不得不加班加点地工作，逃避将妻子和刚刚诞生的双胞胎留在柏林的政治混乱中带来的内疚。但当他回国时，他们就能远离那个毒蛇窝，去往别的地方安居乐业，这正是他工作的动力。\n\n终于，他做完了手头的工作，做完了今天需要做的事情，上床睡觉。"
 antarctica_grid_event_aag.57.a:0 "漂流在波涛之上——也漂泊在他的梦中。"
 antarctica_grid_event_aag.58.t:0 ""
 antarctica_grid_event_aag.58.desc:0 ""
 antarctica_grid_event_aag.58.a:0 ""
 antarctica_grid_event_aag.59.t:0 "仓促的命令"
 antarctica_grid_event_aag.59.desc:0 "“——确实，这策略不光彩，但它会在对抗敌人时提供情报优势。”格拉塞尔完成了对队长们的讲话。他们面面相觑，有人点头表示赞同，有人则仍然面露犹疑。“我会让秘书把修改后的日程表送去。各位队长，你们可以走了。”\n\n众人起身离开。\n\n“您确定这是个……”格拉塞尔的助手顿了一下，“完善的决定吗？”\n\n格拉塞尔叹了口气：“不管是否奏效，我们都要拭目以待。但毋庸置疑，情报已经泄露了，这是处理这个问题最干净利落的办法。”\n\n格拉塞尔转过身，随手打开一瓶酒，给自己倒了一杯：“你想来点儿吗？”\n\n“不了，先生，我今天还有一些文件要做。但是，”他在门边停下了脚步，“我真的希望您的看法是正确的。”"
 antarctica_grid_event_aag.59.a:0 "格拉塞尔点了点头，坐回了办公桌前。"
 antarctica_grid_event_aag.60.t:0 ""
 antarctica_grid_event_aag.60.desc:0 ""
 antarctica_grid_event_aag.60.a:0 ""
 antarctica_grid_event_aag.61.t:0 "机密行动情报"
 antarctica_grid_event_aag.61.desc:0 "致安东·格拉塞尔，\n\n阿尔法突击队行动报告如下：\n\n敌军巡逻队时间表确认。\n\n阿尔法突击队出动，成功在恰当的时机拦截下一支巡逻队。\n\n敌军巡逻队已被处理；舰队正在港口修整。\n\n按照评估，行动大获成功。\n\n为了德国的荣耀！"
 antarctica_grid_event_aag.61.a:0 "归档：满意的行动结果。"
 antarctica_grid_event_aag.62.t:0 ""
 antarctica_grid_event_aag.62.desc:0 ""
 antarctica_grid_event_aag.62.a:0 ""
 antarctica_grid_event_aag.63.t:0 "浮标狩猎"
 antarctica_grid_event_aag.63.desc:0 "“伙计们，把它拉起来！”\n\n十名水手紧张地抓着一根缆绳，将外国投放的浮标从浑浊的海水中拽到德拉赫号的甲板上。他们已经连着干了好几天了，用这种小动作颠覆其他国家在南极水域的领海主张。虽然看起来似乎只是小事一桩，但按照命令的说法，这会给新施瓦本带来严重的漏洞。船长此时已经顾不上这些了，他已经在如此冰冷的地狱中待得太久，以至于什么都不在乎了。\n\n下一个浮标被拖曳到船舷上时，大副瞥了一眼记着命令细节的文件，在最后一个方框里打了个勾，大声说道：“就这些了，我们的活儿干完了。”\n\n船员爆发出一阵欢呼。而当小船调头驶向陆地时，船长也思考着过去几天的工作情况——他当然很难受，但或许也没有之前那么痛苦了。"
 antarctica_grid_event_aag.63.a:0 "任务奖励里肯定会有咖啡。"
 antarctica_grid_event_aag.64.t:0 ""
 antarctica_grid_event_aag.64.desc:0 ""
 antarctica_grid_event_aag.64.a:0 ""
 antarctica_aag_opsc.10.t:0 "雪崩"
 antarctica_aag_opsc.10.desc:0 "迈尔和格拉塞尔攀谈着，身旁的桌子上摆满了各种士兵和车辆的模型，一副纳粹旗帜和已故的元首希特勒的画像挂在一旁的墙上。\n\n“你真的确定吗？”迈尔问道。\n\n格拉塞尔回答说：“非常能确定。我们的敌人来势汹汹。他们以为，随着元首的去世，我们的实力被大大削弱了。OFN已经越过了东部的边界，而我们西部的前哨则在海岸边发现了巴西的战舰。他们就像闻到水中血腥味的鲨鱼一样向我们扑来。”\n\n“盟军的混账，只会趁乱踹我们屁股……”迈尔喃喃自语道。格拉塞尔点了点头，“所以，有何指令？”\n\n迈尔在房间里踱来踱去，以此来压制心中沸腾的怒火。从一开始，他就是被逼到这个冷得要命的鬼地方的……元首的去世、补给短缺、现在又有敌人的入侵，问题一连串接一连串，就像滚下山的雪球一样越积越多。终于，他停下了脚步，面无表情地开了口，但内心深处的蔑视难以被这僵硬的平静所掩盖：“我们赢不了的，命令部队从边界地区撤退。”\n\n“你在开玩笑吗？我们不能就这么放弃了！我们必须还击！”\n\n迈尔则微笑着说：“恰恰相反。我们会引诱他们跳进陷阱。既然他们这么想要我们的领地，那就让他们用鲜血来抵押吧。”\n\n格拉塞尔咧嘴一笑：“明白了，我马上就去准备部署。”"
 antarctica_aag_opsc.10.a:0 "雪崩就此爆发。"
 antarctica_aag_opsc.20.t:0 "风暴渐息"
 antarctica_aag_opsc.20.desc:0 "总指挥部里人头攒动，每隔几分钟就会有一名传令兵匆匆忙忙跑进来，送来一个消息，或是一份最新的资料，然后匆匆赶回前线。军官们正在努力评估局势，为此，他们必须得同时阅读至少三份报告。在房间里的混乱持续加剧的同时，迈尔正在办公桌上掌揽全局，按照形势的发展把各种兵模动来动去。巴西和乌拉圭联军已经在西部登陆，他们几乎没有遭到抵抗，并迅速在冰原上站稳了脚跟。但迈尔已经作出决定，将新施瓦本极其有限的资源集中用于对付OFN。至于南美佬，他们总有一天会付出代价的，但不是现在。\n\n格拉塞尔冲进了办公室，匆匆走到迈尔身前：“我刚刚得到确认，冯·格鲁伯冰桥被我军摧毁。雷区、伏击战和反坦克武器的大规模投入已经削弱了OFN主力部队进攻的势头。我们还没有与前线部队建立联系，但已经下达了坚守防线的命令。”迈尔则站了起来，把地图上的模型又移动了几番，随后抬起头来盯着格拉塞尔。\n\n“如果他们打算乘坐直升机突入呢？”\n\n“今年南极海岸的风暴特别猛烈，直升机基本没法滞空太长时间，但为了以防万一……”格拉塞尔的话被又一名闯进房间的传令兵打断了，他直接把报告递给了迈尔。迈尔打开报告，用冷淡的声音读了起来，房间里的人都凑了过来，屏息凝神。\n\n“来自第五营的消息，我军部队已经开始加固防御。敌军暂时没有进行进一步的进攻行动。他们已经占领了希特勒海岸的一片区域，但前线正在趋于稳定。我部要求指挥部提供更多的重型装备以进行可行的防御……”沉闷的喘气声逐渐盖过了迈尔阅读报告的声音，紧张的气氛终于舒缓了几分。"
 antarctica_aag_opsc.20.a:0 "雪崩停下了，暂时。"
 antarctica_aag_survival.10.t:0 "各自有悲"
 antarctica_aag_survival.10.desc:0 "元首去世的消息传到新施瓦本的几分钟后，基地就宣布了哀悼日。工程师们收拾好工具箱，士兵们点燃了他们日益减少的香烟供给以示纪念。降下半旗的基地陷入了停顿。\n\n在办公室里，鲁道夫·迈尔和里夏德-海因里希·席尔马赫拿出一瓶杜松子酒，郑重地向这位带领德国走向伟大的人敬酒。\n\n恩斯特·赫尔曼和他的秘书有着自己的想法。在小小的叛逆反抗之中，两人向办公桌上海因茨的照片敬酒。\n\n“下辈子一定要让希特勒下地狱。”恩斯特在吞下杯中的酒之前轻蔑地说道。\n\n200公里外的安东·格拉塞尔坐在雪地车里，凝视着纯白的深渊。希特勒的死讯打断了帝国广播中的平静音乐。本就在沉默中闷闷不乐的格拉塞尔和他的士兵，脱下了帽子致敬。然后迅速陷入了更沉闷的寂静之中。\n\n边境哨所中，埃里希·舒曼和一群军官正在仔细研究地图。舒曼正在解释迅速占领总部关键战略点的计划。在外面看守雪地车的赖克·汉纳曼猛地打开了门。\n\n多双眼睛齐刷刷地盯向赖克，拷问着他的灵魂。\n\n“元首……他死了。”\n\n沉默，然后是冷漠。舒曼反叛的齿轮已经开始了转动。"
 antarctica_aag_survival.10.a:0 "每个人都有各自的悲伤。"
 antarctica_aag_survival.20.t:0 "夏日"
 antarctica_aag_survival.20.desc:0 "阴郁。\n\n挂着新施瓦本旗帜的旗杆来回摇晃，上面的缆绳尽力维系着旗杆，持续不断地发出叮叮当当的声音。\n\n孤零零的水上飞机停泊在海港中，随着平和的波浪上下浮动，忧郁地提醒着人们那些还有着多余燃料可供飞行的时日。\n\n曾经水手和苦力摩肩接踵的施佩伯爵港，空余一副躯壳。他们严肃地打开了在很长一段时间内能得到的最后一批物资。\n\n舰船从钢铁巨兽逐渐变成了地平线上的一个点。埃里希·舒曼抱着吉他坐着，双腿悬在边缘，离冰冷的深海只有一步之遥。他为正在卸下物资的士兵们弹奏着一首熟悉的曲子，嘴里喃喃着小声的话语。\n\n“小小的花儿开在荒野上，她名叫……”\n\n“艾莉卡！”附近的士兵们纷纷唱道。\n\n舒曼继续唱着，这次声音不再发自他一人。很快，港口上下，人们带着一种无法解释的爱国热情放声高唱。歌曲结束后，他们继续唱起另一首曲子。歌声一直持续了几个小时，直到最后一箱货物离开码头。\n\n埃里希站了起来，他的手指酸痛，肚子咕咕叫，但他的心已经多年没有这样饱满的感觉了。南极的士兵们可能都已经忘记了如何形容这种感觉。然而，这种感觉却在新施瓦本的男男女女身上重新绽放。"
 antarctica_aag_survival.20.a:0 "希望。"
 antarctica_aag_survival.30.t: "最高指挥部"
 antarctica_aag_survival.30.desc: "五个眼睛凹陷、表情呆滞的人围坐在一张小会议桌前。所以，迈尔心想，这就是最高指挥部了：一小撮年迈的战争老兵和几乎无法保持清醒的科学家，其中一半的人上周还想着要推翻我？如果现场的气氛不是那么严峻，他早就笑出声了。\n\n迈尔清了清干燥的喉咙，用沙哑的声音说道：“先生们，我希望我能告诉你们一些好消息。遗产学会的攻击毁坏了多处住所，我们只能把剩余住所中的床换成双层的，实验室的走廊也不能放过。”\n\n舒曼对此表示不满，迈尔瞪了他一眼，然后继续说：“不管国内和专员辖区发生了什么，我们都被完全孤立了，再也没有重获物资的可能。清醒一点：我们可是在一长串优先事项的最下面。即使战争明天就能结束，那也要花上几个月的时间才能重新建立起联系，建立起补给线。我已经清点了所有剩余的物资，包括席尔马赫站和整个新施瓦本，我就直说了：我们有两千多号人，以现在的物资消耗速度，不是每个人都能吃上饭。”\n\n一个人在椅子上挪了挪身子，什么也没说。迈尔吸了一口气，继续说道：“军需官鲍曼建议我们立即把口粮供给缩减到四分之三，然而我们必须考虑到士气。如果我们急于求成，他们可能会猜到事情的严重性，然后兵变就在所难免了。我现在想在这里决定的是：我们该如何告知弟兄们？”"
 antarctica_aag_survival.30.a: "“直接说实话，我们陷入了麻烦，得准备好应对最糟的情况。”"
 antarctica_aag_survival.30.b: "“撒谎，告诉他们现在无需惊慌。”"
 antarctica_aag_survival.31.t:0 "患难与共"
 antarctica_aag_survival.31.desc:0 "南极刺骨的寒风拍打着迈尔的大衣。纵使被厚厚的围巾包裹着，他的鼻头也在慢慢失去知觉。迈尔和最高指挥部的同僚最终决定向所有人道出实话。情况已经恶化到了极点，不能再继续隐瞒下去了。迈尔遂下令席尔马赫站的全体人员到前殖民地检阅场的空地上集合待命。他于草草搭建的脚手架上岿然站立，身旁伴着格拉塞尔、舒曼、席尔马赫与赫尔曼。\n\n在他们面前，约三千名穿戴整齐的人组成了一个巨大而肃静的方阵。迈尔来到麦克风前，清了清嗓子：“从我们踏上这片遭上帝遗忘之地算起，它就一刻不停地企图夺去我们的生命。先是那些倒在风刀霜剑中的殖民者，而后是我们在新施瓦本测试场经历的磨难，无数勇士因此献出了生命。现在，连党卫队的弟兄们也被眼前的冰雪迷惑了双眼，转而同我们刀剑相向。”\n\n迈尔的目光扫过眼前的男男女女：“我知道有的人并非自愿来此，或许我们中大多数人都是这样。这片土地是为流放之人准备的，但现在我们就站在这里。内战令我们与世隔绝，派系斗争与贪污腐败让祖国分崩离析、兄弟阋墙。我们不能再指望今年或是明年会有补给送来，所以只能用好手头的一切……共渡难关。”\n\n迈尔把手高高举起：“我们曾并肩战斗、流血、牺牲，而现在我们要并肩生存下去。翻遍历史，从未有人类能在这片白色荒原之上活过数月。但等到海军的下一艘补给舰靠岸，他们看到的绝不是衰落破败的建筑和风化破碎的尸骨，而是一位位世上最优秀的探险家！”\n\n话音刚落，近三千个声音齐声高喊："
 antarctica_aag_survival.31.a:0 "“胜利万岁！胜利万岁！胜利万岁！”"
 antarctica_aag_survival.31.a.tt:0 "§F为§!§r新施瓦本§!§F启用§!§F生存机制§!和§Y各类决议§!§F。\n我们已损失§R3§!支特遣队。§!"
 antarctica_aag_survival.32.t:0 "谎言"
 antarctica_aag_survival.32.desc:0 "迈尔很少有机会在席尔马赫站里悠闲地散步。自从祖先遗产学会的袭击之后，他一直都在和其他诸位军官协力应对补给以及人员方面的问题。现在，他终于有了一些自己的时间，他想在基地里走走，观察一下士兵们的精神状态，尤其是现在他已经决定对部下隐瞒真实补给情况的时候。\n\n他向活动室走去，在路上，他见到许多人把尸体抬出基地，按照忠诚度的高低掩埋起来或者焚化处理。迈尔摇了摇头，党卫队似乎胆大包天，敢于支持一切掩藏于贝格尔海姆疯狂与黑暗。那里正在发生什么？接下来又会发生什么？西弗斯和全国领袖的计划一向如迷宫一般不可预知，但现在……西弗斯有可能是在擅自行事吗？希姆莱是不是终于失去了他所捏造的神话的署名权？\n\n迈尔走进活动室，示意所有人不必紧张多礼。克劳泽、贝克尔和拜姆勒组织了一场骰子游戏，还有其他几个人也参与其中，但看起来在大多数时候，大家还是都很乐意坐下来休息休息。在经历了党卫队袭击的考验之后，他们的精神状态似乎还不错。迈尔十分痛苦且后悔，他不得不在补给问题上对自己的士兵撒谎，但此时此刻，维持士气远比保存食物更加重要。席尔马赫站现在孤军奋战，在数周内，这里的居民就会知道自己已经没有朋友，也可能再也没有家园了。迈尔向部下点了点头，拢上大衣的衣襟，向实验室走去，他准备去看看舒曼在做些什么。"
 antarctica_aag_survival.32.a:0 "一切隐瞒都终将暴露。"
 antarctica_aag_survival.32.a.tt:0 "§F为§!§r新施瓦本§!§F启用§!§F生存机制§!和§Y各类决议§!§F。\n我们已损失§R3§!支特遣队。§!"
 antarctica_aag_survival.33.t:0 "诚实"
 antarctica_aag_survival.33.desc:0 "里夏德-海因里希·席尔马赫非常疲倦。每名居民都在党卫队袭击后的基地重建中出了大力气，席尔马赫则是其中出力最多的那个人。迈尔让他负责居住区域的整顿，而且还严格命令他考虑士兵们的意见：他们和谁住在一起，他们喜欢谁。对于德国人来说，这种和解不同寻常，但话又说回来，真正意义上的“德国”在当下并不存在。\n\n因此，席尔马赫已经赢得了许多人的信任。在他走过基地中黑暗寒冷的小径、返回宿舍的路上，一群人自信地向他靠近也就不令人惊讶了。席尔马赫认识他们的领头人，是一位名叫费舍尔的下级军官。\n\n“先生，我们知道迈尔并没有告诉我们有关食物一切。”费舍尔开口说道。\n\n这句话如同一记重拳般击中了席尔马赫。军官们曾希望，在士兵们从袭击带来的震撼中恢复过来之前，暂时保密食物短缺的问题。但在这么小的基地里，谣言却似乎正在像野火一般蔓延。\n\n“不幸的是，”席尔马赫说道，“我无权就此发言。”\n\n费舍尔的肩膀猛然沉了下去，和他一起其他人也一样，他们显然抱着希望，希望这些传言只不过是传言罢了。“我……明白了，长官。”费舍尔和他的部下们默默转身离去。"
 antarctica_aag_survival.33.a:0 "席尔马赫开始思考，如果与他们坦诚相待，结果会不会更好。"
 antarctica_aag_survival.40.t:0 "紧急情况"
 antarctica_aag_survival.40.desc:0 "军需官埃利亚斯·鲍曼拿着把撬棍，和安东·格拉塞尔一起走在走廊上。越接近食物储藏，碰到的卫兵越多，鲍曼还察觉卫兵们携带的武器也越来越大、越致命。“没想到竟然能瞒那么久，”鲍曼说，“真有你的啊，把这里存的食物说成机密武器系统。”\n\n格拉塞尔耸了耸肩。“我两次战争都在东线待过，我见过人们在又冷又饿的情况下会做出什么。”格拉塞尔拿出一串钥匙，打开了通往储藏处的路。地上堆满了箱子，里面装着泡菜、牛肉、水果罐头和酒，这些自从来到新施瓦本后就从没动过。\n\n鲍曼急不可耐地把撬棍一头伸到最近的箱子盖下，然后停了下，看向格拉塞尔。“你知道的……这些储藏是预定下个月开启的，而且只能是在紧急情况下才可以。我不想太早把手伸到这些储备品里。”\n\n“我也不想啊，”格拉塞尔说，“但人们正在挨饿，这绝对算得上是紧急情况了。”\n\n鲍曼点了点头，低吼一声，撬开了箱子的盖子。万幸，里面的东西完好无损。"
 antarctica_aag_survival.40.a:0 "“你有想过这些坏了会怎样吗，格拉塞尔？”鲍曼不寒而栗。"
 antarctica_aag_survival.50.t:0 "船"
 antarctica_aag_survival.50.desc:0 "迈尔的工作让他多年来一直没有得到充分的睡眠。他必须准备好随时下床，只要一声低语或者门把手转动的声音就能让他猛地惊醒坐直。\n\n席尔马赫站在门口。“鲁道夫，快来！有一艘船驶入施佩伯爵港。”\n\n迈尔瞬间下床，饥饿的感觉让他回到了清醒的世界。他抓起他的大衣，和席尔马赫一起冲出寒风中的哨站，形形色色的哨站工作人员也不由得肃然起敬。海里确实有一艘船，如果可以这样称呼它的话，那艘船正驶入港口。船体上带着厚厚的锈迹，舰桥的窗户上满是污垢，它并不属于德国海军。\n\n格拉塞尔组织了一队士兵来迎接这艘船。舷梯被放了下来，一群衣衫褴褛的水手随着下了船，迈尔在人群中发现了船长。\n\n“是迈尔先生吗？”船长问。迈尔点了点头。“我代表米尔希元帅向您问好，并对您在马达加斯加提供的援助表示感谢。虽然我们的大部分资源都用在了镇压游击队和重建工作上，但我们能够为您和您的手下提供一些我们的库存补给。不过这没有多少……”\n\n“我们会接受的，”迈尔说，“你们的船有多大？你们有什么办法可以撤离我们的伤员吗？”\n\n“很抱歉，先生，我们能像现在这样完整地到达这里已经十分勉强了。这艘船很少有完好的地方可以运载货物，更不用说伤员了。他们在这里更好。”\n\n迈尔觉得这有些不可思议，但他不是一个对突如其来的礼物嗤之以鼻的人。"
 antarctica_aag_survival.50.a:0 "但是，这够吗？"
 antarctica_aag_survival.50.a.tt:0 "我们将获得§W8补给§!£Antarctica_texticon_SUP 。"
 antarctica_aag_survival.100.t:0 "绝望"
 antarctica_aag_survival.100.desc:0 "流放地看着新来的人出现在大陆上。他们在大海的边缘仿佛掂不清自己斤两一样建立了这一最大的避难所。\n\n几年来，他们从避难所出发，在沉睡大陆的注视下徜徉在蓝天碧海之中。突然，时间平白无故地停止了，似乎命运找上了避难所里的来客。\n\n空中和海上的任务都戛然而止。巨大的船只再也接不到访客，只剩下一些与破烂柴火无异的空船，在凸出的码头上孤寂地摇晃。\n\n那些勇于深入内陆、向大陆腹地进发的冒险者，现在却朝海岸奔涌而来。不甘心的少数人抱团取暖，只是出发的频率慢慢减少，直至消亡，正如流放地一次又一次见证过的那样。\n\n似乎流放地所不知的事情发生了，而这些新来者正在迎接。现在，流放地坚守着，充满了决心，但这能持续多久呢？没人知道……"
 antarctica_aag_survival.100.a:0 "……自然不会睡去，她要把新来者拉出冰寒。"
 antarctica_aag_survival.101.t:0 "救生艇"
 antarctica_aag_survival.101.desc:0 "“斯坦威上尉，军需官鲍曼，你们他妈的又在吵什么？”\n\n交通艇艇长狂怒的拍着桌子，牢骚没完没了般的从他口中喷出：“我被我的手下从梦里摇醒了！他告诉我，我们的船他妈的就要报废了！你们他妈的到底在搞什么名堂？“\n\n迈尔并没有被这番话激怒，他把目光投向了军需官，是时候听听军需官的理由了。\n\n“长官，事情很简单，停在码头的船里有席尔马赫站急需的物资。引擎、铜线，还有一打其他东西。我们的发电机已经坏了一个礼拜了，我们现在迫切需要那个引擎。“\n\n斯坦威的双手无力的垂下。“他妈的让我安心？你他妈的让我怎么安心？“艇长注意到鲍曼的手正在向迈尔的订书机靠拢，于是口气稍缓，“那些船就是我们的万福玛利亚。蒙主保佑，我们必须让航线通畅。我们要用那些船的引擎来点亮灯光，我们不能这么做。“\n\n“昨晚，有三个人被冻死在他们的铺位上了。我们他妈的需要这个该死的引擎，鲁道夫，我们别无所有了。”"
 antarctica_aag_survival.101.a:0 "鲍曼是对的，我们不能再赌了。"
 antarctica_aag_survival.101.a.tt:0 "§F我们将获得§!§W3补给§!£Antarctica_texticon_SUP §F。§!"
 antarctica_aag_survival.101.b:0 "斯坦威上校是对的，我们需要一条生命线，即使它当下会伤害我们。"
 antarctica_aag_survival.101.b.tt:0 "§F我们将获得§!§R2军事点数§!£Antarctica_texticon_MIL §F和§!§G2宣称点数§!£Antarctica_texticon_LEG §F。§!"
 antarctica_aag_survival.110.t:0 "营养"
 antarctica_aag_survival.110.desc:0 "托马斯·绍尔医生的新办公室相当简陋，但也足堪一用。在袭击之后的居住区整合之中，他的医务室搬到了基地中央的一间仓库里：这儿有点冷，但拥有一切必要的急救工具，最远的住处离这里也不过两分钟的步行路程。在未来几个月中，这可谓是再好不过了。\n\n就在这时，军需官鲍曼走进了医生的诊所。自从开始配给制以来，这名身材魁梧的壮汉已经日渐清减，但他仍然还是基地里最高的那个人。“医生，我们得谈谈。”鲍曼一边说着，一边关上了门，“几个小时之后，迈尔就会宣布实行百分之五十的口粮配给。”\n\n绍尔不由得张了一下鼻孔，把手中的写字板扔到桌子上：“真是好极了。”\n\n鲍曼没有工夫理会绍尔的怒气：“我现在得知道，在基地人员的营养计划中，哪些方面不能减少。”\n\n绍尔摸了摸自己的胡茬，他最近连刮胡子的时间都没有了：“他们需要继续吃抵抗坏血病的东西：柠檬汁，蔬菜，诸如此类。他们中已经出现了一些并发症，而在全面的饮食菜谱中，这些并发症都是不会出现的。”除此之外，绍尔还注意到这群病人中还出现了一些奇怪的症状，但他决定缄口不言：之后再提醒迈尔留心吧。\n\n“所以我们必须减少一半以上的肉类配额？人们会不高兴的。”\n\n“他们在几个月后摆脱坏血病的时候会感激的。就让迈尔这么告诉他们。”\n\n鲍曼揉了揉自己的太阳穴：“好吧，至少我们还有些应急物资。”"
 antarctica_aag_survival.110.a:0 "“但能是维持多久？”绍尔询问道。"
 antarctica_aag_survival.111.t:0 "军需官"
 antarctica_aag_survival.111.desc:0 "军需官鲍曼感到一阵头晕目眩。他是席尔马赫站为数不多的有资格进入食品仓库的人之一，几乎就像是一名有权限接触机密文件的特工一样，只不过他的“文件”都是大豆和香肠而已。肩膀上巨大的责任压抑着他心中的欣喜，鲍曼觉得，自己的整个服役生涯，不，是他的生命，都是为了这一刻——他要为席尔马赫站的灵魂和胃袋担起责任！\n\n然而，当他在夜深人静的时分清点食物时，一阵强行破开的大门的声音打断了他的注意力。哐当一声，锁头砸在了地上，鲍曼一听就知道麻烦来了，闪身躲到了一堆板条箱后面。寒冷寂静的空气中传来刻意压低的话音。“安静，安静！”一个人说道，“咸猪肉在这边，酸菜在左边。”鲍曼的血液燃烧起来，他的仓库里居然进了贼！他本想抓住这群贼，但他至少能听到四双军靴踏在地上的声音。要是他们带了武器，他绝对没有机会。\n\n“不，不，你在做什么？”又是一道嘶哑的嗓音，“把那个放下，我们来这儿不是偷烟的！要是拿太多，会被发现——”\n\n“闭嘴！”第三个声音带着怒火说道，“迈尔认为我们会活着渡过这次难关，他就是有妄想症！剩下的时间，咱还不如好好享受享受。”鲍曼怒不可遏：迈尔正在尽力拯救他们所有人，而这就是这伙人报答他的方式？荒唐！\n\n当窃贼离开仓库时，鲍曼悄悄看了一眼。他认出了韦伯，那是他亲自挑选的一名仓库看守，至于其他三个人，他虽然看不清脸，但他们都穿着军官制服——事实就像欧宝闪电卡车一样迎面撞上了鲍曼：这些所谓的“领导”正在从其他基地人员的嘴里抢食。罪无可恕，迈尔会知道的，但鲍曼并不确信他将如何处理此事……"
 antarctica_aag_survival.111.a:0 "迈尔会……狠狠的惩罚他们。"
 antarctica_aag_survival.111.b:0 "基地里的军官并不多，也许迈尔会用别的办法让他们付出代价。"
 antarctica_aag_survival.112.t:0 "二十分钟"
 antarctica_aag_survival.112.desc:0 "荒原沐浴在奇异的黄昏之中，静寂无风，空气中弥漫着霜冻的气息。这片流放之地使出了它众多小把戏中的一个：今晚，白色荒原广阔无垠，景观看起来平坦而又模糊，就像是身处照片之中一样。唯一打破幻觉的就是聚集在一起席尔马赫站人员，好吧，还有那个绞刑架。\n\n迈尔听取了鲍曼的证词，他很快就确定了那些犯事的军官，对他们的柜子展开的迅速搜查证实了罪行：咸猪肉、香肠、酸菜、香烟……迈尔感到万分厌恶，也知道应该立即采取怎样的行动。他曾经做过这般噩梦，但在清醒中亲眼看到这副场面无疑更加令他震惊。贪婪、背信弃义、背叛，不是对他，而是对其他人。他让工兵们立起三根横梁，搭成了金字塔的形状，然后又在顶上挂了一根绳子。这个绞刑台一次只能吊死一个人，而且犯人还死得很慢，都是被活活勒死的。他要求人们自愿承担起处决同胞的重任，并不出人预料，最快动手的正是那些叛徒的部下。\n\n第一个被绞死的就是那个放窃贼军官进入仓库的人。“士兵阿努尔夫·韦伯，”迈尔宣判道，“你被指控犯有盗窃罪、协助和教唆盗窃罪，以及背叛自己的战友同伴。你将被活活吊死，没有遗言。”梅尔看了看处决者，点了点头，韦伯的命运就此尘埃落定。\n\n足足过去二十分钟后，韦伯才最终停止了呼吸。一个接着一个，叛徒们在迈尔所有部下的注视中被高高吊起。他们在震惊和愤怒中目睹着这一切，既是出于这些偷窃的叛徒，也出于当下绝望的处境。"
 antarctica_aag_survival.112.a:0 "他们将尸体遗弃在了大雪之中。"
 antarctica_aag_survival.113.t:0 "正义"
 antarctica_aag_survival.113.desc:0 "在发现并报告了仓库盗贼的几个星期后，军需官鲍曼正在席尔马赫站的主干小道上一边吹着口哨，一边悠闲地散步。在当下严酷的自然环境下，哪怕一丝一毫的满足都不可多得。\n\n迈尔对这些盗贼很宽容，但也只是相对而言。他很想吊死这些混蛋，但他也不能扔掉四具干尸。虽说如此，他决定的惩罚也无疑与罪行相符：只给他们发四分之一的口粮，去做长期苦工。迈尔想让这些人明白，如果他们的偷窃行为继续下去，战友会因此而经历怎样地狱般的日子。\n\n鲍曼从那三名军官和他曾经信任的士兵身边走过。他们身上的军衔和制服都已经被剥夺，腿上拴了一条长长的铁链，迈尔甚至连警卫都没有派，他觉得经过几天艰苦、寒冷的工作，这些窃贼就会疲惫不堪，放弃逃跑的企图。鲍曼认为迈尔是对的，这些人看起来面色憔悴，衣服松松垮垮地耷拉在枯萎的骨架上。这一天的工作给鲍曼带来了那种特别深刻的满足感：囚犯们正在挖厕所，把已经冻起来的排泄物铲到手推车里，送去处理。\n\n“看看这场面，”鲍曼自言自语，“以前我还从来没见过屎来铲屎。”他不无悲哀地冷笑一声，继续上路——热腾腾的饭菜和威士忌正在住处等着自己，但对那些小偷来说，他们再也得不到这样的待遇了。"
 antarctica_aag_survival.113.a:0 "正义有……很多方式实现。"
 antarctica_aag_survival.114.t:0 "维生素C"
 antarctica_aag_survival.114.desc:0 "迈尔进入临时搭建的医务室时，托马斯·绍尔医生正伏案研究艰深的医疗图表。绍尔太过专注于文件之中，忘记了今天的例会。他很敬佩迈尔能和医务人员关系融洽，并且会把他们的建议记在心里。在国内，党内的官僚与理论家一般不会理会知识分子，但迈尔和他们不同。\n\n“新医务室怎么样啊，医生？”迈尔坐到绍尔的对面，问道。\n\n绍尔露出了微笑：“以现有的情况来看，好得超出了我们的预期。谢谢你，长官。”\n\n“我会不遗余力地保证好你和你的同事们的物资供应，但我现在有个奇怪的问题。部门领导报告说人们出现了大量的倦怠与绝望情绪。一开始，我们以为他们只是意识到了情况的严重性，但一些最为坚定的人的古怪行为让我不解。”\n\n绍尔叹了口去：“他们服用抗坏血剂了吗？”\n\n迈尔点了点头。\n\n“一些病人牙龈红肿，还有的关节痛。依我的医学知识，这是患上了坏血病。”\n\n迈尔看上去像被风吹得喘不过气一样：“怎么可能？！我们每天都喝柠檬水。”\n\n“柠檬水的效果会随时间减弱，有可能从祖国运来的是专员辖区产的陈年老水。我建议立即派出更多的狩猎小队。1901年英国人罗伯特·斯科特的南极探险发现鲜肉可以缓解坏血病症状。”"
 antarctica_aag_survival.114.a:0 "“我马上让格拉塞尔多安排几支狩猎小队。”迈尔说。"
 antarctica_aag_survival.115.t:0 "鲜血与幽灵"
 antarctica_aag_survival.115.desc:0 "绍尔医生的医务室爆满了。维生素C的缺乏已经持续数月之久，坏血病正严重发作，许多人虚弱得连站都站不起来，更不用说工作了，清理住宅区积雪和修复基地的人员中有一半人现在卧床不起。绍尔手头有许多先进的疗法和药物，但他们所能做的唯有减轻病患的痛苦。没有维生素C，席尔马赫站的居民实际上正在慢慢分崩离析。\n\n维生素C是人体化学的基本要素，起到维持细胞的结构完整性。没有它，身体就会崩溃，瘀伤永远不会消退，所有器官都会爆发溃疡，曾经尝起来甘甜无比的食物现在只能在舌尖上产生一股酸味。\n\n仅仅过去一小时内，绍尔就目睹了所有这些乃至一系列更令人担忧的症状。一名曾经在东线服役的老兵刚刚接受了医生的检查，他身上布满了在战斗中留下的伤痕。由于坏血病的折磨，他瘢痕组织中的纤维素已经腐烂，几十年前留下的伤痕又重新开裂，仿佛是苏联人的鬼魂正从坟墓中伸出手来，要夺走敌人的生命。\n\n绍尔自己最近也很难集中注意力，他的牙龈也开始渗血。在席尔马赫站，除了狩猎队带来的一点肉以外，任何人都没有其他的依靠。最近几天，绍尔还注意到这些人身上出现了一些无法解释的症状：血压极高、头痛欲裂，这些症状出现在没有任何坏血病迹象的人身上。绍尔第一次萌生出这样的怀疑：肆虐新施瓦本的围观恐怖可能不止一种。"
 antarctica_aag_survival.115.a:0 "它就蛰伏于血液之中。"
 antarctica_aag_survival.116.t:0 "每况愈下"
 antarctica_aag_survival.116.desc:0 "托马斯·绍尔医生和军需官鲍曼艰难地走向迈尔的办公室。绍尔手中拿着一个密封的透明袋，里面装着一罐打开的炖肉罐头，他很害怕即将与迈尔进行的谈话。\n\n两人走进迈尔的办公室，看到他本人正在办公桌后来回踱步，大口大口地抽着烟：“你最好给我说明白，医生。昨天你的医务室里死了十个忠诚的好兵，彼此之间甚至相隔不到八个小时。”\n\n绍尔轻轻地把装着罐头的袋子放在迈尔的桌子上：“它，它就是罪魁祸首。”\n\n迈尔看了看袋子，又看了看鲍曼，最后将目光投向了看绍尔：“细说。”\n\n“看来，无效的抗坏血病药物是我们最不需要担心的问题。”绍尔说道，“死去的患者在最后几个小时中均出现了呕吐、腹泻、肌肉痉挛和抽搐的症状，全部都和坏血病不符，所以我立即就对死者进行了毒理学测试。”医生深吸一口气，接着说道，“长官，是肉毒中毒。鲍曼和我仔细检查了剩下的罐头。看来至少有三分之一、甚至更多的罐头由于密封不当而导致了肉毒杆菌入侵。”\n\n迈尔瘫倒在椅子上，一句话都说不出来。\n\n“更不幸的是，”绍尔继续慢慢地说道，“情况还要更加糟糕。在检测罐头本体时，我发现铅已经渗入了食品之中。随后我对这些人还有我自己都进行了血样检测，我们都得了铅中毒，已经积累得有些年头了。来源似乎是用于密封罐头食品的劣质焊接涂料，可能在生产过程中也存在问题。”\n\n最终，鲍曼说出了三人共同的想法：“祖国是派我们来这里送死，长官。”"
 antarctica_aag_survival.116.a:0 "迈尔猛地跳起来，咆哮道：“去他妈的祖国，我们要活下去！”"
 antarctica_aag_survival.120.t:0 "生意人的抉择"
 antarctica_aag_survival.120.desc:0 "迈尔坐在会议室桌子的首位。席尔马赫坐在右边，茫然地盯着房间的另一端；格拉塞尔坐在左边，翻阅着报告。曾几何时，这个房间只有偶尔与来自日耳曼尼亚的代表举行正式会议时才会用到，而现在，得益于它位于行政大楼的中心相对温暖的位置，它成为了这片凋零之地的领头人的会议室。\n\n当最后一名官员走进门后，迈尔召开了格拉塞尔要求的紧急会议，这种情况在最近几个月内越来越多，令人担忧。\n\n“我就开门见山直说了：如果我们想在物资不足的情况下生存下去，就需要召回二级和三级基地的人员。”格拉塞尔站了起来，在会议进入主题后立即说道，“在最好的情况下，保证供应链的运作都是复杂而又困难的，而现在直接就等于判了个死刑。”\n\n“不错，格拉塞尔先生，那为什么要把我们叫到这里呢？”赫尔曼问，“这种小事在明天的会议上通知就好了呀。”\n\n“嗯，但我们要决定如何召回我们的人手。要么我们火急火燎催促他们赶紧回来，这样就能节省下他们用来做返回准备所用的物资。要么分批次返回，在慢慢撤退的同时确保领地的安全。”\n\n赫尔曼第一个接话：“要平安渡过危机，就需要尽可能多地保留物资。所以我看得迅速回来。”\n\n迈尔的目光从老学究身上转向了安保员：“你的想法呢，格拉塞尔先生？”\n\n格拉塞尔叹了口气：“这是个艰难的选择，但如果我们想守住领地，就最好慢慢地回来。归根结底，决定权在你，中校。”"
 antarctica_aag_survival.120.a:0 "要求所有部队立即返回。"
 antarctica_aag_survival.120.b:0 "要求分批次慢慢返回。"
 antarctica_aag_survival.121.t:0 "令人失望的结果"
 antarctica_aag_survival.121.desc:0 "席尔马赫沉浸在梦乡之中。\n\n他梦见了身在欧洲的家人，每当见面时，他们都会露出幸福的笑容，送上热情的问候。\n\n他梦见了军中的战友袍泽，那些曾在俄罗斯广阔的农村荒野中与他并肩作战的兄弟。\n\n他梦见了那些死于他手下的男男女女还有孩童，天空之中还有大地之上。这位飞行员对了结生命并不陌生，任何优秀的士兵和死亡都是熟人。\n\n最后，一阵关门声惊醒了他，他的头正趴在宽大的木桌上，脑海中嗡嗡作响。片刻之后，他揉了揉眼睛，甩掉睡意，一位军官冲进了席尔马赫的房间，手里抱着一大堆文件和档案。\n\n“席尔马赫先生，很抱歉打扰您，但从我们其他基地回收的物资已经统计出来了，您说希望知道情况如何……”\n\n席尔马赫挥挥手，示意他将文件放下：“没错，我很想看看这个办法是不是值得一试。”\n\n军官把文件放在席尔马赫面前，但少校没有理会，而是转头看向那名军官：“结果怎样？”\n\n“嗯……我们成功为库存增加了一批可观的数额……”\n\n“但是？”\n\n“比预期要少不少。”"
 antarctica_aag_survival.121.a:0 "席尔马赫揉了揉太阳穴，懒洋洋地坐到座位上，希望自己能在梦中梦到更美好的日子。"
 antarctica_aag_survival.121.a.tt:0 "我们将获得§W3补给§! £Antarctica_texticon_SUP 。"
 antarctica_aag_survival.122.t:0 "角色反转"
 antarctica_aag_survival.122.desc:0 "雅各布拖起又一个箱子，走向在寒风中懒洋洋地行驶着的车队。他所在的基地和其他遥远的哨站一样，被命令在返回席尔马赫站之前慢慢地把装备整好带上。坐在与OFN南极洲事务局的边界上与坐在中央基地里，对飞行员来说没什么区别，哪边体验都差不多，不过听说那边的配给会少些，这点雅各布能够接受。\n\n突然，空勤塔的门打开了，主雷达操作员冲到了沮丧的军官面前。\n\n“长官，雷达显示有一群飞机正向这边飞来。根据速度和高度判断，应该是直升机。”\n\n雅各布的指挥官多年来第一次兴奋了起来。“还有多久到达？”\n\n“大约一刻钟，他们步伐很快。”\n\n“能联络上吗？”\n\n“我刚一发现就试了，但他们没有回应。”\n\n“很好，我们得把他们吓跑。”\n\n一刻钟后，雅各布从平常熟悉的防空装备的猎物成了猎人。当直升机出现在视野中，几乎垂直于雅各布的位置时，他粗略瞄准了他们的方向并开了火。热追踪导弹向目标飞去，但侦察直升机发出了信号弹，让导弹迷失了踪迹。虽然没有打中，但直升机还是匆忙转向了OFN空域的方向，基地中发出了欢呼声。"
 antarctica_aag_survival.122.a:0 "德国小胜一场。"
 antarctica_aag_survival.122.a.tt:0 "我们将获得§R2军事点数§!£Antarctica_texticon_MIL 和§G4宣称点数§!£Antarctica_texticon_LEG 。"
 antarctica_aag_survival.123.t:0 "零下123华氏度、零下86摄氏度、187开氏度"
 antarctica_aag_survival.123.desc:0 "至少，这些都是这个温度下还能用的机器设备上的读数——有记录以来最低的温度。如果只是身处远方的实验室里用一些气象设备来观察，这就是个不错的差事。然而，几个倒霉蛋身处南极冰冷的中心地带，测试着人类体能的极限。整个团队蜷缩在狄奥多里克站内，祈祷着加热系统在这种严酷的环境下不会失效。"
 antarctica_aag_survival.123.a:0 "继续祈祷吧。"
 antarctica_aag_survival.124.t:0 "后果"
 antarctica_aag_survival.124.desc:0 "今天是狄奥多里克站内的小队人生中最漫长的一天。唯一值得庆幸的就是，站里面的人还活着，等温度更加适宜之后，他们的系统就会重新运转。他们从来没有感受过老旧过时的机器恢复工作的咔哒声是那么的令人心安。不过，有一名队员失踪了。他在寒流来袭之前出了门，于是小队组成了搜救队出发去寻找他，没过多久就找到了。\n\n让人顺利找到他的并不是颜色鲜亮的外套，也不是呼救声，而是一些地上的鸟儿，它们引起了搜救队的注意。\n\n一对雪燕首先找到了尸体并进行了勘察。搜救队一走近，鸟儿就飞走了。尸体覆满了冰霜，几乎无法与周围的冰面区分开来。尸体像胎儿一样蜷缩着，离温暖的站内只有几码远，这让搜救队感到很意外。不过这种极端的寒冷确实会在短时间内要了你的命。他们把尸体翻过来，想要看看战友的脸。然后骇人的一幕出现了，原来之前的咔嗒声并不是机器发出来的。\n\n眼球不见了，被雪燕啄走了。鸟嘴碰上冰冷的眼窝，发出咔哒的声音。"
 antarctica_aag_survival.124.a:0 "自然不懂得悲伤。"
 antarctica_aag_survival.130.t:0 "从来不缺"
 antarctica_aag_survival.130.desc:0 "云朵在席尔马赫站是个稀罕物，不过，在今天这个悲伤的日子里，它却恰如其分地出现了。约翰·克劳泽用手帕擦干了最后一滴眼泪，双眼雾蒙蒙地按下了燃料口的按钮。周遭的士兵一拥而上用罐子与虹吸管将飞机的燃料吸干抹净。\n\n克劳泽用仪式祭品来安慰自己：旋翼巨兽在滴血，其血脉挣扎着想要活下去。其他载具也逃不出这一命运。雪地车的司机坐在车上，最后一次拉下了燃料栓。就连自愿就在新施瓦本的巡逻艇也没能幸免。\n\n最高指挥部称这是为了以防万一，但每个人都知道是怎么回事。司机没有抱怨，飞行员没有抱怨，巡逻员没有抱怨，所有人都没有抱怨。团结协定被战火吞噬，这只是避免重蹈覆辙的微小代价。\n\n献祭结束后，约翰爬出驾驶舱。他不忍看到自己心爱的宠物们被士兵虐杀，快步走回宿舍。\n\n“喂！”\n\n约翰转过身来，抽油的士兵示意他过来。约翰极其抗拒地拖着脚走了过去。走近后，士兵递给他一根香烟，克劳泽接过烟点着了。另一个人从口袋里掏出了一副牌。其中三个人期待地看着约翰，看来拒绝是行不通了。\n\n“我得走了……还有任务在身。”这位飞行员结结巴巴地吐出了借口。\n\n“别装糊涂了，就待一会儿。”\n\n“任务？啥任务？别骗我啊。”\n\n“坐下，这是命令。”商人命令道。"
 antarctica_aag_survival.130.a:0 "约翰·克劳泽发现原来从来就不缺热心肠。"
 antarctica_aag_survival.131.t:0 "三人组"
 antarctica_aag_survival.131.desc:0 "一等兵舒尔策·克吕格尽可能安静地撬开了雪地拖拉机的车锁。夜深人静，席尔马赫站的警卫正在换岗，这是唯一能逃走的机会。\n\n和克吕格一起的还有两名士兵，哈特曼和施奈德。自从来到新施瓦本以来，他们就是亲密的朋友，一起在遍布南极的外围哨所中度过了一次又一次的轮换驻扎。在党卫队的袭击之后，他们被召回了席尔马赫站。自那时起，情况就愈发糟糕：配给遭到削减，香烟这个少数能帮他们捱过南极生活好东西也没了，因此，三人相信是时候该离开了，慷慨激昂的演讲无法舒缓他们的抑郁。他们将大部分的口粮装进箱子，藏在了居民区中一处遭到烧毁、被大雪掩埋的房屋废墟中。他们还搞到了一桶汽油，这还得归功于施奈德在燃料库的工作。\n\n“快点，快点！”哈特曼低声催促道。\n\n“我这已经是最快了！”克吕格不由低吼。\n\n“离下次换岗还有1分45秒。”施奈德看着自己的表，出言提醒。\n\n锁芯发出咔哒一声。“知道了！”克吕格说着，打开了车门。三个人挤在一起，拖着物资，启动了引擎。沉睡已久的车辆发出阵阵轰鸣，不顾一切地向外冲去，叫喊声和警报声伴随他们遁入南极的夜色之中。克吕格关上了车灯，他知道离开席尔马赫站地区的路线，但问题在于目的地，他们要去哪里？"
 antarctica_aag_survival.131.a:0 "施奈德说道：“从行动上看，阿根廷最有可能给我们一个安全的避风港。”"
 antarctica_aag_survival.131.b:0 "“OFN几乎肯定会把我们抓起来，但吃的肯定比迈尔那儿强。”哈特曼如是说道。"
 antarctica_aag_survival.131.c:0 "“我知道这听起来很疯狂……但祖先遗产学会是最近的……”克吕格说道。"
 antarctica_aag_survival.132.t:0 "逃脱"
 antarctica_aag_survival.132.desc:0 "克吕格不确定他是不是走对了路。在前往阿根廷领地的途中，一场暴风雪迎头撞上了这支小队。大雪漫天飞扬，能见度甚至不到一英尺。克吕格相信，只要保持方向盘打直，他们就会继续朝着正确的方向前进，也就是西边。然而，现在，在晴朗的天空下，克吕格不确定自己开的方向究竟对不对。\n\n“你确定还走在正确的路上吗？”施奈德问道，他向车窗左侧远处的山脉扬了扬下巴，“那些山峰在暴风雪之前并不在那个方向啊。”\n\n“不，”克吕格承认，“我不确定。我们在那场暴风雪里开了足足六个小时，但仍然保持着正确的方位，所以应该大致还在导航的路上。”\n\n哈特曼拿出了他的指南针：“我不太确定，克吕格，这东西表现得很奇怪。”\n\n克吕格叹了口气，向右打了一把方向盘，驶向靠近海岸的开阔平地：“我想，如果沿着海岸线行驶，那我们就能找到阿根廷的码头。会比计划晚上几天，我们还会挨饿，但是……”\n\n“嘘！”施奈德吼道，“你听到了吗？把拖拉机停下来。”\n\n克吕格闻言照做，可他仔细听了听，除了发动机低沉的轰鸣，他什么都没听到。他没有关闭发动机，因为他不能保证它还能再重新启动。“我们这是在浪费燃料，”他一边说着，一边挂上挡，“要是不……”\n\n他没能继续说下去。拖拉机下的“冰原”实际上是一个冰架，拖拉机的重量压出了一道巨大的裂缝。几秒钟内，克吕格、施奈德和哈特曼就翻进了冰层，被冰雪彻底吞没掩埋。"
 antarctica_aag_survival.132.a:0 "没逃掉。"
 antarctica_aag_survival.133.t:0 "两人"
 antarctica_aag_survival.133.desc:0 "自从克吕格、哈特曼和施奈德三人逃离席尔马赫站以来，已经过去了一个星期，拖拉机载着他们一路向东，驶向OFN南极洲事务局的领地。但他们才只走了三分之一的路程，暴风雪就接二连三地袭来，很快，拖拉机就被雪困住，再也无法前进了。\n\n哈特曼从车窗爬出去，走到了荒原上，他告诉朋友们：“我只是出去抽根烟。”但克吕格和施奈德都清楚，哈特曼总是第一个与战友分享美酒和香烟，最后一个接受别人对他的赠予。他拥有慷慨的灵魂，在最后的徒劳之中，他把自己排除了等式之外：两个人可以比三个人活得更久些。\n\n然而，那是在假设救援即将到来的情况下。克吕格知道，没有人会来救他们，席尔马赫站不会把资源留给叛徒。现在，克吕格和施奈德已经虚弱得没力气动弹了，他们坐在车厢里，看着雪花飘落。在他们的注视下，一群黑色的身影蹒跚而来。企鹅大军在冰面上排成纪律严明的纵队，向海岸走去，为孩子们抓鱼吃。\n\n“这儿是它们的国度，”克吕格开玩笑说道，“我们只是访客罢了。”\n\n其中一只企鹅在挡风玻璃前停了下来，打量着里面的两人。它用喙啄了一下玻璃，拍拍翅膀，然后转身继续前行。施奈德慢慢抬起手，敬了个礼。"
 antarctica_aag_survival.133.a:0 "二人静待死神降临。"
 antarctica_aag_survival.134.t:0 "欢迎来到贝格尔海姆"
 antarctica_aag_survival.134.desc:0 "克吕格将雪地拖拉机停在了贝格尔海姆周边。这一路走来可谓是十分艰辛，他们在前来祖先遗产学会的半路上就耗尽了食物，拖拉机还坏了两次，能抵达这里就已经是个奇迹了。投奔公开敌人的决定无疑相当冒险，但似乎即将得到回报。门口的党卫队没有开火，相反，大门敞开了，克吕格、施奈德和哈特曼被带了进去……只是他们被套上了头罩。\n\n当被引导着穿过祖先遗产学会南极分部基地中的曲折迷宫时，他们听到了各种各样奇怪的声音：尖叫声、机械的嗡嗡声还有黑暗中的吟唱声，克吕格开始思考他们的决定是否正确。当三人的头罩被揭开时，刺眼的光线打断了他的思绪，面前赫然是沃尔夫拉姆·西弗斯的恐怖面容：这个人的双眼中没有一丝灵魂的气息，嘴角微微上扬。他身边则站着一个身着白大褂的人，手中拿着写字板和卡尺。\n\n西弗斯终于开口了：“席尔马赫站的情况一定很糟。”他向身旁的科学家点了点头，“继续。”\n\n科学家点了点头，开始测量哈特曼和施奈德的头骨尺寸，最后轮到了克吕格。这到底是怎么回事？克吕格百思不得其解。他预料到了一切情况，但这超出了他的理解范围。\n\n科学家完成了测量，将结果展示给了西弗斯，随后，他缓慢而疲惫地点点头，下令道：“为克吕格先生准备宿舍。”电光石火之间，两名卫兵扼住了施奈德和哈特曼，用党卫队匕首割断了二人的喉咙。西弗斯向惊恐万状的克吕格伸出了手："
 antarctica_aag_survival.134.a:0 "“欢迎来到贝格尔海姆。”"
 antarctica_aag_survival.140.t:0 "鼓舞士气"
 antarctica_aag_survival.140.desc:0 "“你知道吗，他们一开始说要放几周的假时我可高兴坏了……现在我的书都读完了，我已经开始想念工作了。”赖克·汉纳曼一边抱怨，一边把十马克扔进了筒里。\n\n“还用你说，之前我他妈可是开飞机的……还是在南极！”威廉·贝克尔喊道。这位飞行员还没有拿起自己的牌就已经跟上了赖克的赌注。\n\n与此同时，马丁·莱特纳正从走廊前往大厅。搁在平时，他肯定会勒令禁止打牌。不过，今天他只是悄悄走过心满意足的士兵，沿着走廊走到底。安东·格拉塞尔的办公室中传出了欢声笑语，这里就是他的目的地。\n\n敏锐的耳朵捕捉到了恩斯特·赫尔曼和安东·格拉塞尔，他们边喝茶边天南海北地侃。一阵笑声过后，安东看见了马丁。他转身想走，但安东迅速招呼他过来。\n\n“马丁！来，来，坐！”\n\n这位阿勃维尔特工照做了，格拉塞尔为他倒了杯茶。\n\n“马丁，我和恩斯特正在讲战时听到的笑话。你有吗？”\n\n马丁做了下深呼吸……他确实有个。“你们不介意希特勒的笑话吧？”\n\n他们摇了摇头。\n\n“我是在西俄革那里听到的。希特勒和戈林站在人民大厅上，希特勒说他想让柏林的人绽放出笑容，于是戈林就说：‘那你怎么不跳下去呢？’”\n\n沉默。"
 antarctica_aag_survival.140.a:0 "然后就是刺耳的笑声。"
 antarctica_aag_survival.141.t:0 "面子工程"
 antarctica_aag_survival.141.desc:0 "安东·格拉塞尔在迈尔办公室里立正站好，一只胳膊里夹着厚厚的档案，另一只行了个纳粹礼。迈尔下意识地一脸苦相。\n\n“稍息，安东，那些文件是什么？”\n\n安东坐了下来，为鲁道夫打开了文件。\n\n“阿勃维尔分部的报告。阿根廷和OFN闻到了血腥味，他们正在行动。入侵事件增加到了150%，也就是每周都有一次。”\n\n鲁道夫竖起耳朵。这些词句为本就恐怖的环境添加了更多的恐怖。安东说话的同时，迈尔翻了翻面前的图片。情况不容乐观。\n\n“你也看到了，他们突进地很深。如果继续深入，他们可能就会发现我们空出的研究站。”\n\n鲁道夫叹了口去，郁闷地问道：“有什么办法吗？”\n\n安东从文件中拿出了阿勃维尔的报告。“凤凰行动，寓意浴火重生，阿勃维尔是这么叫的。我问了马丁·莱特纳，他建议我们动用储备来个大行动。”\n\n鲁道夫握紧双手，来了兴致。\n\n“我们给飞机、雪橇车、雪地车都加满油，让士兵们吃顿丰盛的早餐，然后向OFN边界进军。”\n\n“那阿根廷人呢？”\n\n“阿根廷人会被吓跑的，这场博弈中没有他们的一席之地，他们看不穿我们的虚张声势。怎样，老鲁？”"
 antarctica_aag_survival.141.a:0 "“把军需官叫来，开始准备需要的东西吧。”"
 antarctica_aag_survival.141.a.tt:0 "§F这会花费§!§W8补给§!£Antarctica_texticon_SUP 。§F但是，我们也会获得大量的§!§R军事点数§!§F和§!§G宣称点数§!§F。§!\n\n§R这也许是我们最后能获得的机会了。§!"
 antarctica_aag_survival.141.b:0 "“我们冒不起这个风险。这是颗苦果，但我们还得咽。”"
 antarctica_aag_survival.142.t:0 "前进"
 antarctica_aag_survival.142.desc:0 "扬·斯特赖克饿了几周，终于第一次吃上了饱饭。肚子里没了饥饿，发出满足的呻吟。巨大的雪地车从沉睡中醒来，缓慢而坚定地行进。头上的孤寂天穹之中，试验飞机翩翩起舞。\n\n前方数公里处，雪橇车在坚硬的雪地上飞驰，侦察着地形。安东·格拉塞尔在最前方带领着队伍。斯特赖克曾经觉得格拉塞尔是个沉默寡言唯唯诺诺的人，现在想起来这些都有些后怕。\n\n突然，有人推了斯特赖克的肩膀，是阿勃维尔的一名特工。\n\n“嘘！左边，看到什么了吗？”\n\n扬歪了歪头，避开格拉塞尔犀利的目光。一开始，他什么都没看见。仔细观察一番后，斯特赖克发现了瞄准镜发出的光。\n\n“看来我们有伴了。”\n\n“阅兵总得有观众的，是吧？”\n\n“嗯，不过他们不会动手的。”\n\n“你很自信啊，斯特赖克。你很喜欢赌啊，要不要来局牌？虽然平时只和局里的人玩，不过我们也可以算上你。”"
 antarctica_aag_survival.142.a:0 "“那不错。”"
 antarctica_aag_survival.142.a.tt:0 "§F我们将获得§!§R20军事点数§!£Antarctica_texticon_MIL §F和§!§G20宣称点数§!£Antarctica_texticon_LEG §F。§!"
 antarctica_aag_survival.150.t:0 "膝与肘"
 antarctica_aag_survival.150.desc:0 "赖克·汉纳曼如果在准备吃午餐时没有卷起袖子来的话，他可能好几天都注意不到身上的瘀伤——伤痕一片黑，边缘有些蓝紫色的斑点。有趣的是，他不记得是怎么造成的了，过去几周他的胳膊没撞到过什么东西。仔细想想的话……能在肘弯这种地方留下瘀伤才是神奇的吧。\n\n突然，一堆残羹落在了汉纳曼的午餐盘上，打断了他的沉思。这堆泔水看起来比平常更少更凉。他抬头看向厨师，后者耸耸肩：“迈尔的命令。”\n\n汉纳曼注意到随着人们一个接一个地领到食物，房间里的气氛变得越来越躁动，最后里里外外的所有人都注意到了这一氛围。大家都和汉纳曼一样，发现配给又少了。据汉纳曼估计，至少少了四分之一。一些人与厨师争辩起来，而厨师只能在柜台后连连后退，为自己的清白辩护。在一触即发之际，迈尔、格拉塞尔和一队忠诚的武装士兵走了进来。\n\n“所有人都跪下！”迈尔拿着手枪大吼。大多数人立马放下了餐盘，乖乖遵命，其他人则慢吞吞不情愿，不过最后所有人都照做了。“这么做完全是为了我们能活下来，”迈尔边走边说，“我们没得选。我们都没想到情况会如此糟糕，但我们团结一致定能渡过难关。记住，你们每多吃一口，就会有一名同志吃不上饭而饿死。如果有人再找厨师的麻烦，那他要担心的可不只有空荡荡的胃了。”\n\n汉纳曼低头看了看肘关节上的瘀伤，心想……"
 antarctica_aag_survival.150.a:0 "……也许事情已经发生了。"
 antarctica_aag_survival.151.t:0 "混乱"
 antarctica_aag_survival.151.desc:0 "格拉塞尔听说了人们在得知口粮要减少到四分之一后食堂里发生的事。事态并不乐观，并且要不是有安保部队的及时干预和迈尔的粗言厉语的话，还会变得更糟。他可以约束好席尔马赫站的领导层，但每一天，翘班的人都会变多，每一天，物资清单都对不上库存。一整群人想要逃跑，有的还要再顺走点物资。该死的蠢货。离开席尔马赫站只有死路一条。\n\n格拉塞尔选出的一名列兵保罗闯了进来。“长官，出大事了！我们正在调查的一群煽动叛乱人说服了其他人加入进去，他们已经占领了一处物资仓库。”\n\n格拉塞尔从椅子上跳了起来。“保护食物的守卫呢，他们在干什么？”\n\n“他们被抓为人质了，长官，这真的是出大事了。”\n\n格拉塞尔抓起大衣，冲出了办公室。他在食物仓库外的混乱中艰难前行。这里已经聚集了一堆人，有的在对叛徒破口大骂，有的则在哀求得到一罐酸菜。格拉塞尔利用手头仅余的三十人驱散了外面的人群，好让自己来处理这场危机。如果直接强攻，那么食物和人手都会受到损失，更别说人质了。如果选择谈判，那可能就开了个不好的先例……"
 antarctica_aag_survival.151.a:0 "“立即强攻！”格拉塞尔大叫道。"
 antarctica_aag_survival.151.b:0 "“不要擅动，等我先谈判。”格拉塞尔命令道。"
 antarctica_aag_survival.152.t:0 "熵"
 antarctica_aag_survival.152.desc:0 "情势脱离了掌控。如果格拉塞尔没有果断行动，那这混乱之熵会不断扩散，吞噬席尔马赫站的每一个生灵。现如今，他得尽快发出指示。“保罗？”他对着精英卫队的指挥官说，“我们得马上解决这些闹事分子，夺回物资。我想尽量采用非致命手段，但首要目标还是保护好物资。”\n\n保罗想了一下。“如果我没记错的话，军械库里还有些旧殖民时期军警的催泪瓦斯。由于殖民的失败，他们完全没用上。”\n\n“好，”格拉塞尔说，“拿过来，扔出去，接着就冲进仓库扫荡。”\n\n保罗带着四个人去拿瓦斯的同时，格拉塞尔带着剩余的人拖延时间。“告诉我，”格拉塞尔向叛乱者说道，“有人受伤吗？我不想再有无谓的流血了。我们都是同一战壕里的人。你们虽然做了个草率的决定，但没必要为此丧命……”在他讲话的当口，保罗小队扛着装备瓦斯弹的榴弹发射器赶回来了。格拉塞尔比了个手势，然后钢化玻璃破碎的声音回荡在席尔马赫站的走道，榴弹中的瓦斯被释放出来，发出嘶嘶声。\n\n“上！”格拉塞尔发出了命令。保罗戴着防毒面带头冲锋。他们用临时制作的攻城槌猛撞前门，并同时从后门发动攻击。格拉塞尔的警卫进入了仓库，紧接着就发出了几声枪响。过了一小会儿，保罗出来了。\n\n“他们杀害了五名人质，长官，”保罗说道，“不过物资完好无损。”\n\n格拉塞尔叹了口气。这次他挡住了混乱的滚滚浪潮，但熵如冰川，非人力可阻止。"
 antarctica_aag_survival.152.a:0 "准备应对下次危机吧。"
 antarctica_aag_survival.153.t:0 "抉择"
 antarctica_aag_survival.153.desc:0 "与占据物资仓库的叛乱分子的谈判并不如格拉塞尔所愿。他虽谈妥了人质的释放事宜，但条件是保证增加叛乱者的配给。此后，席尔马赫站的领导者们就被有着各种诡辩理由的增加配给的要求吞没了。简单地说，格拉塞尔要回了他的治安部队，但却有更多的人需要进行治安看管了。\n\n“我建议把这三人加到观察名单上。”保罗把一份档案放到格拉塞尔的桌子上，说道，“我还建议把第一个人带过来进行全面讯问……”\n\n几小时内，不满者名单上就增加了百个名字，格拉塞尔手下的警卫负责对他们进行监视。这项任务越来越难做下去，因为所有人，包括格拉塞尔底下的人，都开始受到寒冷、饥饿与疾病的侵扰。为了维持不断恶化的局势，格拉塞尔说服了迈尔分给他的人更多的食物，但这却加剧了警民之间的紧张度。席尔马赫站已经分化，而治安部队是唯一能阻止混乱、生存下去的保障。"
 antarctica_aag_survival.153.a:0 "前方还有更多抉择，哪一个都不轻松。"
 antarctica_aag_survival.160.t:0 "喘息"
 antarctica_aag_survival.160.desc:0 "现在，军需官埃利亚斯·鲍曼仿佛只是过去的他的一具躯壳，可话又说回来，每一个正在食堂里行走骷髅都是如此。这些憔悴不堪的人们甚至让鲍曼想起了他在二战时曾短暂驻扎过的苏联战俘营中的恐怖景象，光亮已经完全从他们眼中消失，关于救援的交谈早已销声匿迹，只有微微起伏的胸口证明他们还活着。\n\n迈尔自己也因口粮减少和各种疾病而变得虚弱不堪，他颤抖地从房门口的椅子上站起来，声若洪钟的嗓音曾经回荡在席尔马赫站的大厅之中，现在却与微弱的回声相差仿佛。“我们必须再次削减口粮，”他说，不需要做任何铺垫，“我们将被饥饿所吞噬。除了对生存至关重要的任务外，暂停一切其他任务。”\n\n人群完全默不作声，连眼睛都没眨一下，墙边忠心耿耿的卫兵或组或许已经化作了雕像。这里不会有叛乱，已经没人还有劲造反了。\n\n鲍曼想知道，他是否让迈尔和同胞们失望了，物资耗尽的速度太快了。要是他能更细心、更明智地管理口粮就好了，如果、如果、如果……但现在，一切都不再重要了。\n\n迈尔眼中再次燃起一束微光：“继续呼吸，活下去，不要放弃。祖国会来的，会有人来的。”"
 antarctica_aag_survival.160.a:0 "鲍曼在思考，这些话到底是为了鼓励人们撑下去……还是让迈尔自己撑下去。"
 antarctica_aag_survival.161.t:0 "任何东西"
 antarctica_aag_survival.161.desc:0 "赖克·汉纳曼痛苦不已，仿佛有一个钝钻打进了他的肚皮一样。没什么能缓解这疼痛，日复一日，痛觉依旧。可最近，它开始向外辐射，四肢百骸乃至心脏都感觉到了这股刺痛。温暖已经与他无缘，没错，这片大地是很冷，但这是一种无论用多少毯子或者热水都无法驱离的寒意。他曾经是一名健康能干的德国士兵，可现在，照照镜子吧，他就和父亲口中战争故事里的俄国人一样憔悴。在腋窝下，他发现了第一处坏血病病变……\n\n他足足花了一个小时才穿好衣服，而在几个月前，这只需要花上几分钟。他已经无力思考，无力系上鞋带，他走进房间，却忘记了自己为什么会出现在这里。墙壁看起来光怪陆离，就像变成了流体一般。赖克感到一阵天旋地转，靠在床上干呕起来，胃里空空如也，他什么都吐不出来。\n\n他饿极了……什么东西都吃得下去……"
 antarctica_aag_survival.161.a:0 "任何东西。"
 antarctica_aag_survival.162.t:0 "一个人的盛宴"
 antarctica_aag_survival.162.desc:0 "赖克·汉纳曼已经不确定他是否还能掌控自己的身体了。这个可怕的想法一经浮现在脑海之中，他的四肢就开始自顾自地运动起来。真是残酷的讽刺——在过去两周中，其他一切想法都仿佛冰雪一般在大脑中消融，可唯独这个如此根深蒂固？要是不是因为自己头痛欲裂，他一定会好好品味一下这种感觉。\n\n他在雪地上跋涉前行，走进了曾经熟悉的地方。被焚毁的居住地的断壁残垣见证了祖先遗产学会的凶猛进攻，也昭示着席尔马赫站守卫者们的顽强。要是赖克能在当时预见到自己现在的命运，他一定会心甘情愿在与党卫队的战斗中饮弹身亡。\n\n他翻过一个雪堆，来到了一处旧军火库的大门前。显然，党卫队曾企图夺取这座关键的建筑，而这里却变成了他们的坟墓。赖克侧身挤进去，一具冰冷的党卫队步兵尸体直直地映入他的眼帘。子弹撕裂了他的腹部，血液已经凝成了冰柱，一片血红的景象让赖克口水直流。\n\n幸运的是，席尔马赫站的居民们没有浪费时间和资源来焚烧掩埋这些尸体，而赖克已经饿得受不了了……"
 antarctica_aag_survival.162.a:0 "……他并不是唯一一个。"
 antarctica_aag_survival.163.t:0 "更大的危险"
 antarctica_aag_survival.163.desc:0 "迈尔在托马斯·绍尔医生跟进来后锁上了办公室的门。相比几个月前，两人都显得憔悴许多：在席尔马赫站，没人能逃脱饥饿。\n\n“我确信，”迈尔缓缓开口，“你知道那些人在我们藏匿党卫队尸体的居住地废墟里都干了些什么。”\n\n绍尔严肃地点点头。\n\n“我们的食物已经被逼到绝对的极限了。”迈尔继续说道，“坏血病正像烈火一样炙烤着席尔马赫站，我的部下变得太过虚弱，无法承担起任何职责，而且你的报告还告诉我，他们的精神状态正在迅速恶化。他们需要吃东西。”\n\n绍尔叹了口气：“您要问什么，长官？”\n\n“在你的医学观点中，有没有什么因素会导致这些尸体无法食用？”\n\n绍尔吞了一口唾沫：“他们……他们已经死了有一段时间了，但南极的寒冷来得又早又急，很可能阻止了腐烂的进程。我必须得做些测试……”\n\n“我需要跟他们把话说清楚，”迈尔说道，“我必须知道，是应该谴责食人，还是……允许……吃人。”他不由得停顿了一下，几乎不相信自己居然说出了这些话，“军官的责任就是让部下活下去，不惜一切代价。就算他们还有家，我也不关心他们会和家人说些什么。此外，我还要知道这种行为的心理作用，哪个更影响士气？以死人为食，还是没有肉吃？”"
 antarctica_aag_survival.163.a:0 "绍尔回答道：“要是继续让他们挨饿，危机只会更严重。”"
 antarctica_aag_survival.163.b:0 "绍尔说道：“哪怕吃的是叛徒，带来的心理创伤也未免太大了。”"
 antarctica_aag_survival.164.t:0 "肉"
 antarctica_aag_survival.164.desc:0 "厨师们已经在竭尽所能地在掩盖席尔马赫站当下食用肉食的真相，但每个人都知道炖肉的来源。奇怪的是，或者说，不那么奇怪的是，大多数人对此都没有异议。饥饿的人甚至能做到这步田地，真是令人叹服。\n\n赖克·汉纳曼没有一丝犹豫，尽管他知道碗中盛的是什么肉——他是首先越过这条境界线的人中的一员，回头看只会让他感到痛苦。他扔下勺子，把热气腾腾的碗举到嘴边，贪婪地吸吮着油腻的混合物，味道真好。他把碗放回桌子上，观察着房间：大多数人都差不多，他们毫不犹豫地开始大快朵颐；其他人则显得有些踌躇犹疑，但他们最后还是将面前的食物吞下了肚。\n\n迈尔没有强迫任何人吃人肉，参加与否完全出于自愿，大约有一半的基地人员都来吃了第一碗。赖克确信，其余人很快就会跟上，一看到战友们恢复活力，他们肯定就再也按捺不住了。此外，大多数人都可以将这场可怕的盛宴变得心安理得，因为他们正在吞食党卫队叛徒的肉，而不是战友的。\n\n赖克在一次情报简报会上听说，某些新西兰人曾经会吃战死敌人的肉，以此作为征服的表现。如果这是真的，也许席尔马赫站只是在延续久远古老的人类传统而已。"
 antarctica_aag_survival.164.a:0 "“厨子，我能再来一碗吗？”"
 antarctica_aag_survival.165.t:0 "应得的足球比赛"
 antarctica_aag_survival.165.desc:0 "在经历了这么多事之后，席尔马赫站看起来又回到了老样子。赖克正坐在露天看台，观看着足球比赛，场上的两支老牌球队早在他们抵达这片大地时就已经成立。他的内脏不再疼痛，力量重回四肢，是的，他还没有完全恢复健康，但很快了。显然，从坏血病和维生素缺乏症中恢复过来只需要一个星期。\n\n当然，如果目前的资源再次发生管理不善，基地就会重新沦落到一周之前的境地，甚至可能会更糟。但现在，在仿若地狱的苦痛中，他们终于能享受这短暂的轻松。\n\n但席尔马赫站中并非阳光普照，鲜花遍地：吞下禁肉的人和其他拒绝食用禁肉的人之间已经出现了裂痕。他们之间没有敌意，只是各自践行着各自认为正确的事情，但他们之间也不再互相交谈。那些没有吃过肉的人们的身体状况正在急速恶化，但没什么能改变他们的想法：宁愿死，他们也不愿吞噬德国同胞的血肉，无论那是多么十恶不赦的叛徒。\n\n赖克对他们没有恶意，相反，他对他们不能来参加足球比赛而感到遗憾。工兵们正在因改变而获得胜利。"
 antarctica_aag_survival.165.a:0 "膳食均衡的好处。"
 antarctica_aag_survival.166.t:0 "你发誓……"
 antarctica_aag_survival.166.desc:0 "迈尔穿着全副武装的制服，在寒冷中步履匆匆，准备去做一场他从未设想过会发生在自己军事生涯中的宣判。他是否犯了一个可怕的错误，允许人们吃掉死者？他对如此的暴行负有责任吗？不管出于什么原因，他都必须妥善善后。\n\n首先是散布的谣言引起了他对恐怖行为的注意，然后又是铁证如山的事实：他的部下伏击、谋杀、吞吃了一名拒绝参与吃人的弱小同志。现在，他不得不对审判那些参与其中的人们，其中也包括赖克·汉纳曼，在党卫队的攻击中，他勇敢地坚守着岗位。如此一名尽职尽责的士兵居然也会屈服于基本本能，迈尔震惊不已。但说回来，饥饿终究会一视同仁地吞噬所有人。\n\n杀手们在基地外围举着枪，在远离居住区的地方一字排开。迈尔下令，任何人都不得浪费哪怕一颗子弹：“你们所有人……”迈尔充满挫败感地说道，“就……走吧。”\n\n汉纳曼和其他人盯着迈尔，内心充满震撼。\n\n迈尔指着无垠的白色荒原：“我说了，走！”\n\n这群人急急忙忙地向前走去，似乎是急于逃离自己的罪行，只有赖克稍稍犹豫了一下，他直视着迈尔的眼睛：“你发誓过，你会保护我们……”他说着，就像个受伤的孩子。\n\n迈尔转过身去，没有看汉纳曼是会选择寒冷还是子弹。"
 antarctica_aag_survival.166.a:0 "他听到了一声枪响。"
 antarctica_aag_survival.167.t:0 "代价为何？"
 antarctica_aag_survival.167.desc:0 "赖克·汉纳曼第一种闻到的味道便是烧灼肉类的味道。这种香味立马让他口角流涎，亦让疼痛从他的胃部一路冲上四肢，谁知道饥饿竟会是一种消耗全身的痛苦呢？不过另一种他闻到的气味立刻让他毛骨悚然：柴油。\n\n他用尽全身最后一丝力气跑过席尔马赫站的大街小巷。他知道这两种气味意味着什么，但他衷心祈祷他的猜测是错误的。他拐过一个街角，来到堆放党卫队尸体的建筑框架处。祖先遗产学会成员的尸体正燃起熊熊大火，迈尔的士兵正在使用火焰喷射器来焚化死尸。\n\n赖克曾听说过迈尔决定反对食用人类血肉来作为生存方式，不过他希望那不是真的。现在当他看见燃烧的尸堆时，他才终于查明了迈尔的最终决定：相较于他的队员的处境，他更在乎道德打算。\n\n当赖克看着他的盛宴和解放随烟而逝之时，他只能轻声的在雪地里啜泣。"
 antarctica_aag_survival.167.a:0 "但是人性的代价是什么？"
 antarctica_aag_survival.168.t:0 "无人回答的问题"
 antarctica_aag_survival.168.desc:0 "赖克·汉纳曼的意识在边际线上徘徊，他都已经记不得他啥时候被带到绍尔医生的野战医院的时候了，但确实有一段时间了，他和几个别的人被发现在活动室里失去了意识，看起来饥饿最终击垮了他们。\n\n赖克听见了绍尔的声音，护士们就在远处他看不见的地方，可他甚至虚弱的无法扭转他的头。周遭的一切看起来都在变的灰暗，变得渺远。他思考着他回乡后想开的那家书店。他有机会吗？他不这么认为。汉纳曼知道，自己快要死了。他看到过那么多他的朋友和同志们离开人世，知晓死亡究竟为何物。他觉得他也许该感恩戴德，至少他撑的更久一点，也不是死于枪弹之下。\n\n汉纳曼的身体里，有些东西突然改变了。好像他的身体自觉大限将至。他断气时仅仅剩下一具苍白的骨架。他最后一刻的思想，充斥着问题……"
 antarctica_aag_survival.168.a:0 "吃死人能拯救我们吗？"
 antarctica_aag_survival.170.t:0 "猎人"
 antarctica_aag_survival.170.desc:0 "孤身一人的德国猎人正在南极洲的雪地上艰难前行，离废弃的阿米尼乌斯站不远了。他一边埋怨自己，一边奋力越过另一个雪堆，用双眼扫视地平线，寻找着一切生命的迹象。\n\n如果在十年前问他，他认为自己此时此刻会身在何方，他绝对猜不到自己会在这个星球的地下室里冻得要死，来打这些不会飞的鸟儿。唉，席尔马赫站的人们越来越饿了，领导层想用新鲜的肉来补充饮食，既是为了鼓舞士气，也是为了营养。\n\n猎人瞄准了一个被夕阳照亮的黑影，他将步枪放平，看到了一群企鹅家族正蹒跚走向海岸。扣动扳机时，他想起了与迈尔和军官们的尴尬会面。\n\n“祝贺你，年轻人。”迈尔说，“你保卫基地的英勇行为没有遭到忽视，值得奖励：这可是我们今天要颁发的诸多战地晋升令中的第一份。”\n\n猎人的自豪感油然而生，他一直在等待自己的步枪技术得到认可。\n\n“为了与你的新军衔相称，我们将一项对殖民地生存非常重要的任务交给你：猎杀企鹅。鲍曼军需官向我保证，要是不去猎企鹅，就很难养活所有人，新施瓦本的生存就靠你和你的猎人伙伴了。恭喜你……”"
 antarctica_aag_survival.170.a:0 "“……于尔根·耶格猎兵军士长。”"
 antarctica_aag_survival.171.t:0 "崇拜"
 antarctica_aag_survival.171.desc:0 "基地腾出了最后的燃料储备，供于尔根·耶格指挥的雪地摩托使用，这也是为了狩猎。起初，人们并不喜欢吃企鹅，它的肉带有一股令人厌恶的味道，肉质也相当差，有些人甚至在吃到几个月以来的第一块新鲜肉食后就呕吐不止。但抱怨早已烟消云散，狩猎队能带着猎物回来就已经是谢天谢地了。\n\n然而，为了找到合适的猎场，狩猎队不得不从席尔马赫站走得越来越远，没有遭遇射杀的野生动物已经迁徙到远离基地的地方。现在已经快到海岸了，耶格和他的小队希望能找到点什么海鸟之类的，他们绝不能空手而归。\n\n他们登上了一处俯瞰点，下面就是冰冷的海岸，各种鸟儿聚集在一起。猎人们开始用自制的铅弹偷猎，这项工作很是乏味。耶格知道，这些海鸟身上的肉最多也只能算是微不足道，所以他们必须尽可能多猎一些，弥补数量上的不足。狩猎任务漫长而艰巨，在夜幕降临前，他们装好收获，调头向席尔马赫站进发。\n\n耶格在思考，他们究竟还能维持多久。狩猎的回报正在迅速减少，大概数年后才能再次繁衍出如此丰富的动物种群。接近基地时，他们看到一大群人正聚集起来，欢呼声在一公里外都能听到。耶格很享受他们的崇拜……"
 antarctica_aag_survival.171.a:0 "……在人群还未散去的时候。"
 antarctica_aag_survival.172.t:0 "狩猎"
 antarctica_aag_survival.172.desc:0 "于尔根·耶格已经不是第一次怀疑自己是不是失心疯了。也许，在南极洲最糟糕的环境中，日复一日地面对南极洲的难题，终于让这位年轻的猎人付出了代价。他已经在暴风雪和黑暗中追踪了近十天之久，那一定是大陆上最大的帝企鹅的脚印。\n\n他可以用一个再简单不过的事实来说明为什么要追逐这个生物——狩猎队已经数周没有发现其他猎物了，这只鸟，这只孤独的大企鹅，似乎是新施瓦本仅存的野生动物，他们已经射杀、屠宰、吃掉了其他一切。\n\n当耶格艰难地越过另一个雪堆时，那只企鹅带着皇帝般的威严出现在他的视野中，大雪纷飞，他简直不敢相信自己的眼睛。它原本正朝着地平线奔去，但现在却转过身来，与耶格对视。它似乎完全不惧怕面前的猎人，甚至还朝他走近了一步。\n\n耶格收起步枪，拔出了他的军刀。他的弹药不多，如果这只企鹅真的这么勇敢，那耶格就决定抓住机会节省一颗子弹。他一步步逼近，冰雪在军靴下吱吱作响。“嘎吱……嘎吱……咔嚓！”\n\n耶格脚下的地面突然出现一道裂缝，整个世界似乎都在颤抖，他一头栽进深渊之中。幸运的是，没摔多远，他就撞上了地面。昏昏沉沉、伤痕累累的耶格意识到，他掉进了一处冰缝。\n\n他毫不犹豫地拿出冰镐——裂缝随时都有可能被封住。当他奋力向上攀爬时，他抬头看到帝企鹅的身影就站在裂缝边沿，它盯着猎人，拍了一下翅膀，然后就此转身消失。耶格不由破口大骂，这只该死的鸟，居然给他设了个陷阱！"
 antarctica_aag_survival.172.a:0 "帝企鹅马克西米利安又踏上了自己的旅程。"
 antarctica_aag_survival.180.t:0 "维持仪表"
 antarctica_aag_survival.180.desc:0 "安东·格拉塞尔很生气。他预料到会有违纪行为，但没想到这么快。聚集在机库里的人群中，至少有十几个人违反了制服的规定，还有另外十个人说话中带着酒气。由于天气寒冷，士兵们被允许留胡子，但对胡子的长度有严格的规定，但许多士兵看起来衣衫不整，不修边幅。鞋子没有擦过，制服上的纽扣也不见了，格拉塞尔嗅到了笼罩全体的慵懒气息。\n\n格拉塞尔走过一个领口敞开的士兵，向旁边做记录的助手点了点头。“扣这人五根烟。”在这里，扣工资是没有意义的，这些人已经不关心钱了，只有没收能提供生理舒适的物品才能起到效果。\n\n格拉塞尔看向士兵。“我只说这一次！”他大喊，“国防军，无论与什么作战，敌人还是自己，都要遵守纪律和礼仪。我已经记下了你们一半多的人，绝不允许这种情况再次发生。解散！”\n\n当人们离开机库时，格拉塞尔思考着维持外表的重要性。他见识过秩序一旦被打破，一支军队会迅速瓦解，陷入混乱。西俄战争期间，一支早已被击破的苏联纵队，在一夜之间变成了劫掠者，军官只不过是他们与下一顿饭间的阻碍，这些人不再是士兵了。饥饿面前，任何假装的战友情都会烟消云散。如果在仪容仪表上有哪怕一丁点的疏忽，同样的情况就有可能在这里发生。因此，格拉塞尔觉得他有必要对这些人严加管教，以免灾难发生。"
 antarctica_aag_survival.180.a:0 "胜败只有一鞋油之隔。"
 antarctica_aag_survival.190.t:0 "训练日"
 antarctica_aag_survival.190.desc:0 "格拉塞尔很高兴迈尔这么快就采纳了他的建议，食物安全现在成了席尔马赫站所有人的主要关注事项。格拉塞尔制定了一份方案，解除基地内几乎所有人的武装，并精挑细选一队信得过的士兵来保护食物物资。他们会带着武器，保护日益见底的储备，协助维持基地的治安。为此，他们的精神和身体状况都要过关，还要和官员们熟络。迈尔明确表示只有四分之一的人可能参与了舒曼的造反。他仍旧担心还会有夺权行为出现，格拉塞尔也理解这一点。\n\n格拉塞尔召集了近百号各种各样的人，有科学家也有士兵，不过他们之前是干什么的已经不重要了，重要的是他们符合迈尔和格拉塞尔的要求。格拉塞尔划出一间机库用作潜在安保部队的训练场。这些人在铁丝网下匍匐，在绳索上攀爬，还有至少四分之一的人在角落里做着俯卧撑，而格拉塞尔则在一旁认真观察着。\n\n“快，加把劲！”格拉塞尔吼着，“用力！那些瘦削的斯拉夫人都比你们这些混蛋积极！”\n\n一个又一个精疲力尽撑不下去的人放弃了。当日结束时，只剩下了五十名骨干。他们那合身的制服、锃亮的鞋子、耀眼的步枪让人望而生畏，格拉塞尔明白他们很快就会发挥作用……"
 antarctica_aag_survival.190.a:0 "他希望这些人够用了。"
 antarctica_aag_survival.200.t:0 "煽动"
 antarctica_aag_survival.200.desc:0 "“我给你说啊，”弗朗茨尖声说道，“那些混蛋没有告诉我们真实情况到底有多糟。我在实验室的朋友研究了那些数字，根本不够全员存活所需的，就算是让大多数人活下来也做不到。迈尔和其他人都在撒谎，再怎么一厢情愿，再怎么深情厚谊，都救不了我们的命。”\n\n弗朗茨重拳砸向桌子，然后猛灌了一口酒，这是他从一处船只发掘点找到的。他花了两个冬天在冰天雪地里四处寻觅船只残骸，尽管他知道这些残骸上根本不会有足额的物资，不会有秘密储藏，更不会有希望。\n\n坐在弗朗茨对面的人点了点头，这时，休闲室的门突然打开了，所有人都愣住了。\n\n格拉塞尔的精英卫队，席尔马赫站内仅存的武装人员，走了进来。他们抓住了弗朗茨，把他拖出了房间，还用警棍招呼那些来不及躲闪的人。叫做保罗的士兵把弗朗茨带到了格拉塞尔的临时审问室，这间审问室建在格拉塞尔的办公室内，特意做了隔音处理以免打搅到他人。\n\n格拉塞尔本人在里面等着，他不放心把这项工作交给别人。他的手下听到了一些闹事的传言，而这位弗朗茨恰好藏了一些非法的酒，专供他自己和听信他妖言的人享用。来历不明的酒精很危险：它会引诱人们对他人唯命是从，抛弃理智做出蠢事。席尔马赫站经不起任何一丁点儿的反叛了。\n\n不管怎样，弗朗茨都蒙骗了上级，故意散播猜疑。因此，他最终将付出生命的代价。格拉塞尔觉得现在只是加大审讯力度对弗朗茨都算是轻罚了。"
 antarctica_aag_survival.200.a:0 "弗朗茨很快崩溃了，他的大部分指甲也逃过一劫。"
 antarctica_aag_survival.210.t:0 "日记#284"
 antarctica_aag_survival.210.desc:0 "通常情况下，在南极进行侦察是一件非常无聊的事，举目望去，只有漫山遍野的冰块，偶尔才会点缀几只海鸟和山脉。持续的冻伤风险也让我很难对南极洲产生好感。还有，我们基地的酒喝起来像汽油。无趣的生活就这样每天重复着。\n\n直到——今天。我们的侦察队今天在冰面上发现了大量的金属部件，其痕迹明显将我们导向了一架老式飞机。我们迅速扫掉了飞机上的雪进行进一步调查。我们侦察队的队长认出这架飞机的型号是Ki-37，一种日本在二战时用作运输机的机型。由于两个引擎均有不同程度的损毁，螺旋桨也扭曲变形了，它无法正常操作。看起来这架飞机的降落像是绝境下的无奈之举。经过搜索，我们在坠机地点附近发现了一个小洞穴。\n\n说实话？我希望我们赶紧跑得远远的。这只是一件趣事，仅此而已。但为了完成我们的任务，也为了满足我们的好奇心，我们必须找到答案。"
 antarctica_aag_survival.210.a:0 "好奇害死猫。"
 antarctica_aag_survival.211.t:0 "日记#285"
 antarctica_aag_survival.211.desc:0 "我们在洞穴中发现了一处犯罪现场：三具因严寒而保存完好的尸体。然而，这并不是简单的饿死或暴露在大自然中冻死的。第一具尸体斜靠在墙上，胸部有两处刺刀刺伤。第二具尸体的后脑勺有一处枪伤，腿也断了。最后一具尸体除了嘴巴周围的出血外，没有明显的伤痕。周围没有留下日记或者个人物品，只有罗列着飞机上物资的账簿，上面记述的食物都没了踪影。\n\n彻底的搜查也没能发现其他东西，我们拿上几支枪就离开了。但那完好的景象却在我的脑海中挥之不去。2号的腿断了，很可能是飞机坠毁时造成的，向他开枪是出于怜悯吗？还是为了减少要吃饭的嘴的数量？不管怎么样，他都由于有伤在身而成了队伍中的薄弱一环，他肯定是第一个死的。1号的位置也让我搞不懂，他是想阻止3号开枪吗？他是在后来食物变少后被杀的吗？3号不是吞了氰化物就是受了内伤。\n\n文明和野蛮之间只隔着一丝薄薄的线。待到物资减少之时，我们也会步上后尘吗？堕入疯狂，成为冰雕的纪念品？其他人似乎都因有所收获而感到高兴，充满了希望。我应该和他们一起庆祝的。不过，最近一定要特别小心身边的人。"
 antarctica_aag_survival.211.a:0 "我不会成为薄弱点。"
 antarctica_aag_survival.220.t:0 "是条好狗"
 antarctica_aag_survival.220.desc:0 "这是南极漫长冬天的开始，白天的时间会一天比一天短。新兵蛋子们并不会知道，随着太阳的消失他们的精神会越来越抑郁，直到春天才能恢复正常。这将是他们所面临的第一次真正的考验。那些精神崩溃的人将在明年春天坐上回到日耳曼尼亚的第一艘船，而每次都会有人会绷不住。\n\n然而，训犬师特奥多尔·巴登并不是其中之一。他是一个历经许多次南极冬季考验的老兵，其中他连着经历了三次的；这对任何德国人来说都是闻所未闻的壮举。回家看看或到其他地方的旅行被认为是重振士气的必要条件，但巴登唯一需要的是他的西伯利亚哈士奇犬的陪伴。\n\n巴登想，这是一个悖论，尽管他们痛恨东方的威胁，但大日耳曼国仍然明白西伯利亚仍有东西可以为祖国服务：便宜量大的雪橇犬。巴登买了几十条雪橇犬用于新施瓦本的繁殖计划，而它们已经繁育出了数百条高质量的标本。\n\n巴登慈爱地注视着他的狗。它们像狼一样睡觉，聚在一起以确保每条狗都能用爪子、鼻子或尾巴碰触到狗群里的另一条。雪橇队是任何南极行动的必须组成部分。它们速度快，重量轻，而且可以携带大量的物资。在燃料管线上冻和踏板被冰块卡住后，哈士奇依然是向新施瓦本遥远的前哨站运送物资的最后、也是最好的手段。雪橇队还曾拯救过许多走丢的士兵。特奥多尔·巴登知道，无论未来会发生什么，这些狗都是必需品。"
 antarctica_aag_survival.220.a:0 "“是条好狗”"
 antarctica_aag_survival.221.t:0 "老手"
 antarctica_aag_survival.221.desc:0 "寒风吹拂着训犬师巴登的脸。哈士奇们毫不费力地穿过会吞噬任何比巴登乘坐的雪橇更重的车辆的雪地。他拉着缰绳，引导哈士奇绕过隐藏的裂缝和漂移的雪山。这些狗似乎不知疲倦。正如那句美国俚语，巴登是个老手，他和他的猎犬之间有一种几乎是心有灵犀的联系。\n\n他在天刚亮时就离开了席尔马赫站，这是近四个月来的第一个完整的日出。他看到一队队垂头丧气的国防军士兵正向第一批救援船只走去——他们急于回家并享受这时隔四个月的温暖。有些人在南极漫长的冬季里彻底疯掉了，与世隔绝的生活完全击垮了他们。祖国声称每个前往新施瓦本的人都已经接受了严格的隔离训练，以衡量他们的心理承受力。巴登知道这完全是一派胡言：这个地方是流浪者和失败者的流放地，是祖国的垃圾处理场。\n\n巴登要去阿米尼乌斯站这个孤独的前哨站，这个科考站的主要观察对象是在附近南极大陆架上游荡的庞大的企鹅军团。当他在另一个狭窄的峡谷中行驶时，他看到了阿米尼乌斯站。它看起来像是勉强支撑在冰面上，站里的万字旗已经被完全冻在了旗杆上。巴登将是这个前哨站近四个月来看到的第一个人类。只有两名科学家留在他们的岗位上，其余的人都回国了。\n\n“四个月来，只有俩人和企鹅作伴，”巴登说，“他们能做些什么呢？”"
 antarctica_aag_survival.221.a:0 "“驾！”"
 antarctica_aag_survival.222.t:0 "艰难抉择"
 antarctica_aag_survival.222.desc:0 "“真的假的？”军需官鲍曼说，“你养的狗战绩比我手下一些兵都要好。”\n\n训犬师特奥多尔·巴登正在犬舍里照顾他的西伯利亚哈士奇，为它们清理暗淡皮毛上干涸的党卫队血迹，缝合伤口。“党卫队刚好在喂食时间闯入了犬舍，这可不是它们的‘菜’。”\n\n鲍曼环顾四周，快速清点了一遍尸体。“它们一点事都没有？”\n\n“只有一些皮肉伤。对了，你找我做什么？”\n\n鲍曼单膝触地，用手挠了挠珀尔的脖子。“迈尔接下来要做些艰难的决定，牵扯到席尔马赫站的所有人。哈士奇的食量不比人少，食物很快就会出现短缺，迈尔担心我们得去找一些其他的营养来源，草，说不定要吃狗食。”\n\n巴登一下子明白了鲍曼的意思。“打死我也不会让别人碰这些狗狗的。没了雪橇小队，整个基地就跟瞎子一样，你我都心知肚明。”\n\n“嗯，我只是过来传达迈尔的决定，他……”"
 antarctica_aag_survival.222.a:0 "“……没想伤害狗狗，它们可是我们的精神慰藉，也是我们的运输员。”"
 antarctica_aag_survival.222.b:0 "“……要把狗狗做成食物，但会留下一队用来打猎。抱歉，巴登。”"
 antarctica_aag_survival.222.b.tt:0 "我们将获得§W3补给§! £Antarctica_texticon_SUP 。"
 antarctica_aag_survival.223.t:0 "巴登的救援之旅"
 antarctica_aag_survival.223.desc:0 "巴登的办公桌上有一个一英寸厚的文件夹，记录了所有因没有雪橇队而死亡的极地探险队。在过去的一个世纪里，雪堆、大峡谷和碎冰吞噬了无数的探险者。傲慢害死了他们，他们觉得自己可以在任何环境下生存，他们没有学会那些在严寒中生活了上千年的人的生存之道。\n\n新施瓦本和他们不一样，这让巴登露出了欣慰的笑容。拜他的极地经验所赐，迈尔聪明地选择拯救这些狗。雪橇小队在一周内就证明了他们的价值，他们跑到边界哨站，救出被恶劣天气和党卫队困住的人员和物资，并将其送回席尔马赫站，这些救援行动大多数都是由巴登本人领导的。\n\n最近一次行程中，巴登遇到了一座被半掩埋的殖民时代的建筑，一座武器库，放着提供给从未来过的殖民地警察的武器。巴登将这些维护秩序的工具装上雪橇带回了席尔马赫，他知道迈尔在未来的几天、几周和几个月内都会用得上这些的。"
 antarctica_aag_survival.223.a:0 "“乖狗狗，谁想吃点心啦？”"
 antarctica_aag_survival.223.a.tt:0 "我们会获得§R4军事点数§!£Antarctica_texticon_MIL 和§G2宣称点数§!£Antarctica_texticon_LEG 。"
 antarctica_aag_survival.224.t:0 "信任"
 antarctica_aag_survival.224.desc:0 "训犬师巴登坐在狗舍的地板上，手里拿着一把鲁格手枪，曾经给巴登在席尔马赫的一隅带来活力的喧闹合唱消失了。迈尔下令，只留下一队哈士奇，其余的都拿去宰杀制成食物。一如既往，巴登不愿意把他心爱的动物托付给别人，于是亲自动手杀死了所有的狗。\n\n他慢慢地举起枪，将冰冷的枪管放入嘴中。他知道自己再也无法撑下去了。那些狗完全信任他，而他却背叛了这种信任，现在只能去与它们会和了。\n\n他的手指开始触动扳机，这时，大厅里传来的爪子摩擦金属的声音让他停下了动作。幸存的雪橇小队中最年长的狗珀尔绕过拐角，进入狗舍，径直走到巴登身边，贴在巴登握着枪的手上摩擦。泪水划过巴登的脸庞，他感到很惭愧。\n\n他慢慢地把枪从嘴里拿出来，放在地上。珀尔的微笑让自杀的想法烟消云散。巴登明白，他还有工作要做，最后一支雪橇小队需要他，而他决不会抛弃他们。"
 antarctica_aag_survival.224.a:0 "世界边缘的艰难岁月。"
 antarctica_aag_survival.230.t:0 "发现"
 antarctica_aag_survival.230.desc:0 "里夏德·席尔马赫披头散发，充满了发现的激动与失眠的眼睛睁得老大，手里夹着一堆地图和文件，像个疯子一样闯进了迈尔的办公室，把手里的东西放到了迈尔那满满当当的桌子上。\n\n“我操，里夏德！”迈尔说道，“这可都是按顺序放好的！”他指了指他面前堆积如山的文件。\n\n“我可不上当，”席尔马赫说，“还有，不用谢我。”他把手伸进胸前的口袋，掏出一张饱经风霜的新施瓦本的政府地图。\n\n迈尔认出这是旧殖民地的宣传小册子，上面描绘了一座前途光明的定居地以及其道路和基础设施——捉襟见肘的德国的愚蠢梦想。“我要这个干什么？它只能用来烧火。”\n\n“我也是这么想的，不过我偶然发现了这个。”席尔马赫拿出一叠旧侦察照片，是1963年各个月的。“这是一月的，看到那个轮廓了吗？”\n\n迈尔看了看照片，目光集中在席尔马赫在殖民地地图上指出的一个点。“那是定居地吗？”\n\n“我相信如此，看……”席尔马赫的手指在其他的照片上穿梭，每张照片上都有些线条，除了降雪量不同外没有任何变化。“我相信它还在那里，虽然被埋了，但还存在。更重要的是，殖民者疏散时的运输清单并不完整，有可能……”\n\n“他们把物资留下了……”迈尔说。"
 antarctica_aag_survival.230.a:0 "“拉个小队出来，席尔马赫，我们这就去。”"
 antarctica_aag_survival.231.t:0 "简报会"
 antarctica_aag_survival.231.desc:0 "一开始，汉斯·拜姆勒不明白为什么他要放下修复站内居住设施的任务，被拉来和克劳泽中尉和贝克尔少尉一起参加席尔马赫召开的简报会。不过在看到席尔马赫拿出的地图和旧侦察照片后，拜姆勒就明白了。\n\n“1959年放弃殖民地时，撤出得很仓促。”席尔马赫说，“因为饥饿和冻伤，很多人身体孱弱，搬不动东西。把军需官的殖民地报告，”席尔马赫指了指地图，“与协助撤离的船只的运输清单进行比较，我们发现了一些差异，必须要去调查一番。”\n\n克劳泽插嘴道：“从清单上看，那里似乎有食物、燃料，甚至是烈酒。”一提到烈酒，桌旁的每一个人都来了精神。酒精是治疗空虚的万能药，而在吃饱喝足后，空虚就成为了敌人。\n\n“克劳泽、贝克尔，”席尔马赫说道，“你们开一架运输直升机带着拜姆勒和五名士兵前往殖民地，寻找重要物资，其他的等后续更大规模的任务再说。拜姆勒，我知道你对维护我们的居住设施……呃，宜居性所需的隔热材料和部件很熟悉，你负责这次任务的向导和物资分配。还有什么问题吗？”"
 antarctica_aag_survival.231.a:0 "拜姆勒举起手，“清单上有写咖啡吗？”"
 antarctica_aag_survival.232.t:0 "危机迫近"
 antarctica_aag_survival.232.desc:0 "电气工程师拜姆勒从结霜的直升机窗口向外望去，下面的雪原上显现出一座早已被人遗忘的定居点的模糊轮廓。克劳泽开着直升机绕着这些露出在外的建筑飞行，好让机上的乘客能细细观察。\n\n贝克尔少尉的声音穿透了拜姆勒的耳机。“我觉得我知道大区领袖的办公楼是哪个了，”他说。“屋顶的万字依旧健在。”\n\n克劳泽紧接着说：“那些长长的方形建筑像是营房，运气好的话，里面可能会有些弹药。”\n\n拜姆勒呆滞的眼神从下面寒冷的地面上移开，地平线上有一堵云墙，正变得越来越大。南极的下降风时速可以达到每小时三百公里，其强大的破坏力可以埋葬掉整个基地。这片大陆似乎铁了心要把此地掩埋，要利用这里的资源的话，这就是最后的机会了。\n\n“暴风雪来的很急，我们可能只有几小时的时间。我会把我们放到应该是停机坪的位置上，但在暴风雪到来之前，我们可能只能搜刮完一处。”他降下直升机。\n\n“席尔马赫的地图上标着基地里有座补给站，”贝克尔说，“但从天上看不到。我们是去搜营房、大区领袖办公楼，还是去找补给站？”他转头问克劳泽。"
 antarctica_aag_survival.232.a:0 "“食物是最优先事项，去找补给站。”"
 antarctica_aag_survival.232.b:0 "“我们的猎手需要弹药来对付党卫队，去找武器。”"
 antarctica_aag_survival.232.c:0 "“大区领袖的办公楼里可能有让人精神一振的东西…”"
 antarctica_aag_survival.233.t:0 "机遇"
 antarctica_aag_survival.233.desc:0 "在南极待了这么久，拜姆勒依然干不惯体力活，他用铲子挖开殖民地补给站入口的每一下动作都在佐证这一点。两人找这座建筑找了近一个小时，就在他们要打退堂鼓时，贝克尔中尉偶然发现了补给站门外的一个冰冷箱子。\n\n清理完门旁的积雪，拜姆勒喘得全身冒热气，然后他们小心翼翼地走进了补给站。“殖民者的口粮和我们是一样的，”贝克尔打开一个箱子，观察得出了结论。\n\n拜姆勒有了个主意。“随便选十个箱子，再从每个箱子中随便拿十个罐头，看看密封情况，这样有多少口粮还没坏我们就有底了。”\n\n“我们可没那闲情逸致，”贝克尔说，“暴风雪……”\n\n“如果我们把直升机上的宝贵空间浪费在烂香肠上，那才是灾难。现在细心一点将来会给我们省去很多麻烦。”\n\n贝克尔抿了下嘴唇。“那好吧，就看看密封情况吧，但一定要速战速决。暴风雪移动得很快，而且我的直觉告诉我这个地方有些不对劲……”"
 antarctica_aag_survival.233.a:0 "“至少吃的不会有事，”拜姆勒回应道。"
 antarctica_aag_survival.233.a.tt:0 "我们将获得§W5补给§!£Antarctica_texticon_SUP 。"
 antarctica_aag_survival.234.t:0 "自生自灭"
 antarctica_aag_survival.234.desc:0 "军械库位于殖民地居住区的郊区，从基地里无法直接进入。贝克尔、拜姆勒和一对拾荒者不得不从后窗翻进去。与此同时，暴风雪越来越近。而随之而来的，乃是冰冷的死亡。\n\n当这四个人翻进去时，玻璃的清脆声响在荒废的仓库里回荡。拜姆勒打开手电筒，迎接他的是以前居民冰冷的面孔。\n\n“呸，恶心。”贝克尔说。“柏林就这么让他们自生自灭，死后连尸体都得不到妥善安葬。”\n\n“行动起来吧，不然我们将落得和他们一个下场，”拜姆勒说。“希望这场灾难结束后，我们能回到这里，为我们的战友们送行。”\n\n他们走过那些再也闭不上的眼睛，走向武器柜。他们用撬棍一个一个地撬开结冰的柜子。在第一个柜子里，他们发现了弹药。在第二个柜子里，他们发现了枪支。在第三个柜子里，他们发现了密封的口粮。在南极的空气中待了这么久，它们仍然保存完好。\n\n“在这之后我们将有更多的生存选择。”贝克尔说。”如果有人试图利用我们一时的弱点，我们会让他们大吃一惊的。而且这些口粮会让大家伙很满意的。”\n\n“我们赶紧把这些东西装上直升机吧，”拜姆勒说。“我想我听到起风了……”"
 antarctica_aag_survival.234.a:0 "当这些人爬出他们来时的窗户时，有东西在他们身后骚动。"
 antarctica_aag_survival.234.a.tt:0 "我们将获得§W2补给§!£Antarctica_texticon_SUP 和§R1军事点数§!£Antarctica_texticon_MIL 。"
 antarctica_aag_survival.235.t:0 "办公楼"
 antarctica_aag_survival.235.desc:0 "殖民地的其他建筑在设计上非常地实用主义，而大区领袖的住宅却像是个富丽堂皇的庄园。住宅的内部覆盖着橡木镶板，其中大部分刻画有日耳曼民族历史上的伟大战役的场景，这不禁让人联想到在遥远的普鲁士乡间所看到的东西。拜勒姆觉得他认出了阿米尼乌斯和条顿堡森林战役，尽管这些画上都快要结了层霜了。一个栏杆式的楼梯通向二楼；这在南极的建筑中是极为少见的。\n\n贝克尔少尉试了试大区领袖办公室的门把手。令他惊讶的是，门是锁着的。他转过身来，对拜勒姆挑了挑眉：“他们也清楚自己再也不会再来这里了，对吗？”\n\n拜勒姆耸了耸肩：“据我所知，这个人偏执到连企鹅都怀疑他背信弃义。”\n\n贝克尔一脚踹开了门，冰冷的木头发出了巨大的劈啪声。这些人的目光立刻被一个装满酒的酒柜所吸引，里面有一瓶又一瓶上好的杜松子酒，还有更多的东西贴着违禁品标签。“我想我们知道殖民地的预算都去哪儿了。”贝克尔皱着眉头说。\n\n拜勒姆的目光落在了藏在窗下的一袋咖啡渣上。他希望能和波尔一起分享它。但他的注意力很快就被桌上的一叠文件所吸引。席尔马赫给他们下了命令，他们应该在时间允许的情况下在大区领袖的办公室里寻找能够确认新施瓦本的领土宣称合法性的地图和文件。看起来他们找到了这个：1952年宣言之后的原始宣称的地图、1955年10月的殖民计划和放在一起的1958年疏散令。殖民地只维持了三年，数百人死于饥饿和冻伤。那些被留下的人发动了暴动，直到他们能够获得回家的保证。第三帝国为他们在党卫队那边找到了一个新家，在那里他们无法传播关于殖民地不可避免的命运的谣言。"
 antarctica_aag_survival.235.a:0 "“希望我们的命比他们好。”贝克尔说道。"
 antarctica_aag_survival.235.a.tt:0 "我们将获得§W1补给§!£Antarctica_texticon_SUP 和§G1宣称点数§!£Antarctica_texticon_LEG 。"
 antarctica_aag_survival.236.t:0 "你信鬼故事吗？"
 antarctica_aag_survival.236.desc:0 "拾荒队有一个人失踪了。在搜索营地时，贝克尔和拜姆勒发现士兵海克特不见了。在确保物资安全后，为了找到他，他们开始寻着他们的脚步往回找。他的无线电也没有回应。在返回直升机的半路上，他们拐进了殖民地的许多封闭通道中的一个。四年的南极冬季和勉强算得上舒适的夏季，已经把镇上的小巷变成了冰雪的迷宫。\n\n在拐弯时，贝克尔和拜姆勒差点被那个倒在雪堆上的人绊倒。他的喉咙被割开了。拜姆勒跪在海克特身旁。当他温暖的血液遇到寒冷的空气时，一层薄雾从他的血液中升起。“他还没死多久。”\n\n贝克尔抄起了他的冲锋枪。“你相信这世界上有鬼吗，博士？”\n\n拜姆勒摇了摇头。\n\n“我也不信，”贝克尔说，“我们有伴儿了。”\n\n两个人沿着海克特遇害的巷道悄悄前进，渐渐地他们走近了一条通往直升机停机坪的巷道。巷道里，八个像活着的影子一般的黑洞在寒风中晃动着。\n\n“他们在我们和克劳泽之间，而且似乎直升机上的人还没有注意到他们。”贝克尔说。\n\n“我们该怎么办？”拜姆勒问。"
 antarctica_aag_survival.236.a:0 "“他们人多势众。我们应该悄悄回到其他人那里去。”"
 antarctica_aag_survival.236.b:0 "“我们在暗，他们在明。一旦我们开枪，克劳泽就会知道发生了什么。”"
 antarctica_aag_survival.237.t:0 "迷宫"
 antarctica_aag_survival.237.desc:0 "在这之前，两人十分不满这个被大雪围困的殖民地的迷宫般的布局。而现在，他俩对它心里只有感恩。在可怕的祖先遗产学会面前，众多蜿蜒的巷道为他们提供了充足的秘密通道以躲避敌人。暴风雪遮天蔽日，贝克和拜姆勒在拜此所赐的新下的雪中嘎吱嘎吱地匍匐前进。一道由阴云与深寒组成的剪力墙即将落在基地和里面的人身上，将他们彻底吞噬。\n\n贝克和拜姆勒知道时间已经不多了。“我想，一旦我们绕过了最后这一批士兵，”贝克尔说，“我们就可以直接冲向直升机。”\n\n“我有点担心，”拜姆勒说，“一旦旋翼启动，党卫队不会开火吗？”\n\n“有可能，但至少我们会有枪来反击，而且如果我们逃跑的时间合适，暴风雪会把我们隐藏起来。”\n\n“但愿如此吧。”\n\n两个人蹑手蹑脚地绕过挡在他们和直升机停机坪之间的最后一个营地。从外观上看，直升机上的物资已经装满了。党卫队正悄悄地靠近直升机旁的人，而他们还没有注意到党卫队的到来。只看了一眼，贝克和拜姆勒就做出了选择。"
 antarctica_aag_survival.237.a:0 "“启动引擎！”贝克尔喊道，“党卫队来了！”"
 antarctica_aag_survival.237.a.tt:0 "我们将获得§W1补给§!£Antarctica_texticon_SUP 。"
 antarctica_aag_survival.238.t:0 "二人反击"
 antarctica_aag_survival.238.desc:0 "贝克尔拿了一杆MP40。虽然许多人认为这枪老的有点过头了，但新施瓦本的战士们不得不用上他们手里能搞到的所有家伙。拜姆勒只带了一支鲁格手枪，而且他的枪法很烂，但两人希望出其不意的因素能扭转危机。当他们在地面上向直升机匍匐前进时，他们听到了靴子踩在新下的雪上的嘎吱声，以及风吹过被遗忘的殖民地的巷道时发出的呼啸声。\n\n“准备好了吗？”贝克尔低声问道。\n\n“没，但我们尽力而为吧。”拜姆勒回答。\n\n贝克尔点了点头，瞄准了最近的祖先遗产学会士兵并开火，向他们倾泻出枪林弹雨。拜姆勒很快也接着开火，这些突如其来的枪击在党卫队中引起了混乱，逼迫他们俯身躲避。\n\n在随后的几秒钟里，直升机的旋翼开始旋转，与克劳泽一起在直升机停机坪上的士兵们丢下了他们正在装载的物资并开始压制射击。"
 antarctica_aag_survival.238.a:0 "“就是现在，”贝克尔喊道。“冲！”"
 antarctica_aag_survival.238.a.tt:0 "我们将获得§R1军事点数§!£Antarctica_texticon_MIL 。"
 antarctica_aag_survival.239.t:0 "暴雪将至"
 antarctica_aag_survival.239.desc:0 "贝克尔、拜姆勒和停机坪上的其他人一道钻进了直升机，挤在回收的物资中间。“快，麻利点！”贝克尔对着其他人大喊。人一到齐，克劳泽立马就开着直升机飞了起来。他们飞到了差不多两层楼高位置的大区领袖办公室的上方，此时的直升机内充斥着或命中或擦过的子弹的咣当作响。克劳泽利用屋顶上的万字旗作为掩护，熟练地驾驶着直升机。狂风呼啸，将祖国的标志撕扯了下来，掉入了下面的虚空之中。\n\n“我们有麻烦了。”克劳泽说道，这时贝克尔来到了驾驶舱中帮助他一起操作。暴雪降临了，这片大陆的愤怒化为了巨大的漩涡，吞噬了祖国的遥远哨站。白茫茫的海洋中，拜姆勒只能看到渺小的党卫队黑色轮廓。短短几分钟内，哨站就永远地从世界上消失了，万籁俱寂，惟余呼啸，搜刮小队的人员正努力平复心情。\n\n“我们能脱身吗？”贝克尔看着响个不停的直升机体问道。\n\n“起码不能坐以待毙。”克劳泽回答。"
 antarctica_aag_survival.239.a:0 "席尔马赫之路漫漫。"
 antarctica_aag_survival.240.t:0 "行动报告"
 antarctica_aag_survival.240.desc:0 "“……那时，”克劳泽说着，“我们从祖先遗产学会的士兵的猛烈炮火下成功逃脱，而他们则会在风暴中迷失方向，最后被活活冻死。”\n\n席尔马赫打完了字，从打字机上取下纸页，叹了口气。“先生们，最让人疑惑的是党卫队怎么会有人力进行这种行动？我们怎么不知道他们有这么充裕的人员。不管怎样，你们的表现让人钦佩，你们取得的资源将会得到充分的利用。”\n\n“长官，我觉得应该立即通知狩猎小队和搜刮小队，党卫队还潜伏在外面等着我们自投罗网。”\n\n“嗯，说得对。不过现在，先喝点热的吧，中尉，别冻着了。”"
 antarctica_aag_survival.240.a:0 "“可以给贝克尔和拜姆勒也倒杯吗？”克劳泽问，“他们的表现可圈可点。”"
 antarctica_aag_survival.300.t:0 "白色虚无"
 antarctica_aag_survival.300.desc:0 "南极赢了。迈尔跨过一堆苍白的尸体，看着一张张失魂的脸。他清点了一下人手，站点里已经没多少人了，仅剩指挥人员还有一小部分士兵幸存，他们还没有屈服于饥饿、疾病或者其他困难。食物已经耗尽，发电机的油也烧干了，站点里漆黑一片，寒冷就快要吞噬他们。变态的想法侵蚀着每个人，有人已经开始大口啖着死人身上的血肉了，但无论怎样都于事无补。昨天早晨，基地剩下的人员在暮光之下为克劳泽、贝克尔和汉斯·拜姆勒送行，他们志愿前往阿根廷南极领地，用着从基地的角角落落搜刮来的东西，挤出仅剩一点的燃油，启动了MBB-Bo-115，他们清楚，这次旅程或许只是徒劳而已。\n\n命令彻底失败了，他们三人没有回来，但迈尔仍然把最坏的情况告诉了同伴，其他人也毫无怨言。每个人都只想着挑个好办法结束自己的痛苦：一些人选择用手枪子弹贯穿自己的脑袋；一些人把手伸向最后的酒精补给，希望一醉万事休；剩下的人则走出基地，踏入白色的虚空，他们再也不会回来了。迈尔不是没有想过像上面三种人一样死去，但他的心中却升起某种残存的骄傲，促使他继续矗立在岗位上。这不是出于对德国的忠诚，也不是出于民族社会主义的信条，只不过是因为鲁道夫·迈尔就是个犟驴混蛋而已，他只希望能与战友一起，度过生命的最后一刻。"
 antarctica_aag_survival.300.a:0 "所以，里夏德和恩斯特他们人去哪了？"
 antarctica_aag_survival.301.t:0 "最后的交流"
 antarctica_aag_survival.301.desc:0 "在席尔马赫站的地下中心，过去曾被当做娱乐室的房间里，五位领头人会聚在此，在这仅此一间温暖尚存的房间里开始了他们最后的会议。\n\n格拉塞尔是最后一个才到的，他把他的鲁格手枪丢到桌子上。“保罗需要我的帮助，”他咬牙切齿地说，“他总是斗志昂扬、绝不认输，而他现在正持续的与坏血病斗争，我从来没看到过比他更有毅力的人。”\n\n其他的人缓缓地点头表示赞同，迈尔在殉职名单上写下了最后一个名字。他把所有已经殉职的人员写了一串长长的名单，然后把殉职者名单和每个殉职者的遗嘱放在桌子抽屉里的铁盒子里。迈尔抬起头，注意到舒曼忍着笑意的样子。“你在那傻笑啥呢？”迈尔问道。\n\n“噢，”舒曼说，“我在想东西呢……希特勒说我们的帝国将持续千秋万代，但他可没那个机会亲眼见证了。但是在这里，在南极的冰冷和黑暗中……我们的尸体不会腐烂；我们的设施可能会废弃，但我们所建造的一切永远不会被磨灭，在冰雪之中永垂不朽直至万世。大陆漂移一年才只动几毫米或者几厘米，席尔马赫站将会在南极永世不灭。”他站了起来，向迈尔敬了个礼。“如果当初我没有反对你，我们现在还会这样吗？我不知道，我们也没办法知道了。”舒曼转个了身，对着格拉塞尔说，“一起出去抽根烟吧。”"
 antarctica_aag_survival.301.a:0 "格拉塞尔跟着他的长官一起踏入坟墓。"
 antarctica_aag_survival.302.t:0 "朋友"
 antarctica_aag_survival.302.desc:0 "舒曼和格拉塞尔已经离开两个小时了，他们没有回来，也不会再回来了，基地里更没有什么东西值得他们回来。\n\n迈尔把瓶子里剩下的杜松子酒一口气喝完，然后往后一丢，把椅子从桌子底下拉开，坐到他朋友的旁边。他终于放弃了对新施瓦本的命令。“我还记得。”鲁道夫说，“在1939年，我们刚到这里的时候，我们还从来没想过我们会在这里完蛋呢，就连第二次世界大战都拿我们没办法。”\n\n赫尔曼和席尔马赫也各喝了一大杯酒。“我们已经做到最好了，毕竟就这么点资源给我们。”赫尔曼说，“不是吗？”\n\n“正确的，”席尔马赫也尝试着跟赫尔曼一样安慰自己，拍着桌子说，“我们恨不得扎紧了裤腰带，最后做成了在我们职责之外的更多的事。我们这里的小伙子都是好样的，即使到最后一刻他们也没有放弃尊严和荣耀。没有其他的人能对我们指手画脚，如果他们敢对我们指指点点，我就叫他们这群妈了个逼的杂种全部滚蛋！”\n\n“我觉得就是你害我们成这样的，里夏德。”迈尔笑着说，“你把这个鸟不拉屎的地方以你的名字来命名，现在我们都在为你的狂妄自大买单。”\n\n席尔马赫又痛饮一杯，大笑着说：“我很高兴我的名字能在历史上有一席之地。”\n\n恩斯特拍了拍他的后背，乐呵着说：“席尔马赫和席尔马赫站，对吧？”\n\n他们本可以指责这一切都错了，但是从走进房间那一刻起，他们便把这种想法抛之脑后。三个人乐呵呵的笑着，已经不管这个世界会怎么样了。几个月以来的神经紧绷也融化消散了，就像初春融化的雪一样。即使他们看着对方憔悴的身体和饱经风雪的脸，他们也不会觉得尴尬了。"
 antarctica_aag_survival.302.a:0 "为已逝之人，干杯。"
 antarctica_aag_survival.303.t:0 "军团"
 antarctica_aag_survival.303.desc:0 "寒风吹过席尔马赫站的小巷，窗户和房门发出一阵吱吱嘎嘎的声响。南极已经开始慢慢地埋葬新施瓦本的人们，厚厚的冰雪已然覆盖了基地，仿佛披在街道中成堆尸体上的毯子，似乎这场噩梦从未发生。在南极的报复面前，航空奇迹和核试验的梦想冰封凋零，席尔马赫站已经成为一座死亡之城，永远守望着这一小片德国的土地。\n\n突然间，有什么东西在动弹，这里还有活物——一个孤独的身影在积雪中蹒跚跋涉，寒风和周围的破坏好像完全不能影响他。又是一个……又是一个……然后又是另一个，一支大军涌入了基地的废墟。人类注定不属于这片大地，但这并不意味着生命也在这里无处容身，在短短一个下午的时间里，席尔马赫站就变成了上百万只企鹅筑巢栖息的地方。\n\n似乎，狩猎队从来都没能发现企鹅猎物的真正数量，现在，一支货真价实的鸟类军团正在雅利安人曾经的栖身之所产卵繁衍。\n\n一只雄壮的帝企鹅蹒跚穿过走廊，有避风的地方，这儿比它希望的还要好。在一处被雪塞满一半的冰冻密室里，帝企鹅马克西米利安看到了三位挤在一起取暖的朋友。"
 antarctica_aag_survival.303.a:0 "新施瓦本不复存在。"
 antarctica_aag_survival.304.t:0 "异乡人终得凋零"
 antarctica_aag_survival.304.desc:0 "冰封大陆迎来了破晓的黎明，太阳缓缓爬出天际，阳光像糖浆一样懒洋洋地流入山谷，穿过冰原，爬上岩石、冰山、悬崖与山脊，抚摸着过去的时代给这片大地留下的伤痕。流放地慢慢苏醒，在太阳光芒的映照下度过了黑夜，古老而疲惫的目光投向了海边同伴新建起的金属坟墓，在这面向大海的高原之上，他们留下了另一处标记。\n\n几天前，在这个小小的生命与热量的避难所中，最后的幸存者伴随着一声低吟停止了呼吸，流放地上本就为数不多的外来基地之一就此彻底遭到扼杀。\n\n他们的死因究竟是饥饿、疾病还是简单的疲惫，这片流放地并不知道，但在过去，它曾一次又一次地见证过类似的事情。陌生人从大洋彼岸赶来，对自己的力量充满信心，挥舞着火焰和光亮来烧却冰雪，驱走黑暗。\n\n但不可避免，他们心甘情愿地踏入无情的虚无，却总是在最终反过来被虚无所吞噬。他们完全没有做好准备，最终都不得不屈服。让南极好奇的是，最近抵达海岸线的人们似乎人数更多，准备更加周密，也更有组织，流放之地甚至还认出来，其中一些人是曾经到访的访客。\n\n这并不重要，这些闯入者终将屈服于大自然的愤怒。\n\n于是，大地将目光转向了高原之上，准备观察新来的人们是否能坚持下去。他们也可能会像新施瓦本一样，在寒冷无情的世界边缘遭受同样的命运。"
 antarctica_aag_survival.304.a:0 "大雪埋葬了德国的极南之梦。"
 antarctica_aag_rescue.1.t:0 "风暴中的来信"
 antarctica_aag_rescue.1.desc:0 "一艘船自大西洋上狂风暴雨的层层围追堵截中脱身，激起阵阵波涛。船长不停地抱怨，但领队罗尔夫在得知因风暴席卷极地而不得不起身时反而松了口气。由于自由派的施佩尔在德国失败，OFN或巴西肯定会打德国探险队的主意，而风暴正好可以让他们无暇去干。\n\n冲出风暴几日后，船停靠在了席尔马赫站，席尔马赫带着一些驻扎人员前去迎接。迈尔疾病尚未痊愈，因此无法迎接日耳曼尼亚的来宾。罗尔夫被告知迈尔绝对没有不敬的意思，他是个彻头彻尾的鲍曼派，罗尔夫则回复说他只是来确保新管理层交接的顺利进行的。\n\n然而，基地里的其他人员就没有迈尔这么忠心耿耿了，他们为那逝去的梦想而哀恸。舒曼安静地坐在办公室里，把与戈林和军国派有关的联系全部扔进壁炉中烧成灰烬。他还利用手中为数不多的保守派关系来在新秩序中为自己谋得一个位置。\n\n赫尔曼也坐在办公室里，考虑着回国事宜。当他前往最南端的这片大陆时，他曾希望有朝一日回归故里时，能够摆脱三、四十年代的阴影，但这个美梦被难以理解的党内阴谋粉碎了。\n\n最后，格拉塞尔收到了随日耳曼尼亚使团而来的妻子的信，得知了两个儿子的死讯，一人为了更美好的未来战死在法兰克福的街头，另一人在普鲁士的山岭中抵御鲍曼军的最后冲击时为了国家荣耀而殒命，这个消息让格拉塞尔痛不欲生。这位年长军官的未来笼罩着一层阴翳，他提笔写下辞职信，准备在巴伐利亚的山中平静地度过晚年。"
 antarctica_aag_rescue.1.a:0 "怯懦无能的胜者；理所应当的结局；暗无天日的未来。"
 antarctica_aag_rescue.2.t:0 "赫尔穆特·施密特的来信"
 antarctica_aag_rescue.2.desc:0 "迈尔仍旧病体未愈，昏昏沉沉，但他却难以置信地盯着桌子上的文件。他觉得自己好像在做梦，狠狠地掐了自己一下，确定自己仍然清醒。啊，和近代以来的历史一样，这事情也千真万确，如此意外的消息预示着当下这个超现实时代的结束，真的很令人惊讶吗？\n\n阿尔伯特·施佩尔领导的改革派赢得了德国内战，在赢得战争的那一刻，胜利者就开始了改革。这封电文来自外交部，发件人名叫赫尔穆特·施密特，席尔马赫站的高层似乎都没听说过这个名字。\n\n备忘录的内容简短明了，施密特恳求身处南极的流亡者们立即与日耳曼尼亚联系，并告诉他们救援队已经出发。但德国海军和邓尼茨依然躲在黑海，所以它不得不在没有海军护航的情况下在敌意丛生的大西洋上航行。\n\n当迈尔思考着他和部下们在施佩尔治下的德国中可能的未来时，基地中已经爆发了庆祝的浪潮。尽管经历了这么多艰难险阻，但他们还是得救了，所剩无几的奢侈品在所有人的手中传递，破旧失修的基地充满了令人振奋的希望。\n\n在自己的办公室里，恩斯特·赫尔曼流下了两行清泪。他在为流亡者的痛苦而哭泣，他们终于得到了解脱，但却遭受了巨大的痛苦和折磨；他在为自己的家人而哭泣，他希望他们在德国一切都好；他哭了，欧洲现在有机会在未来摆脱纳粹的暴行和奴隶制的桎梏，走向魏玛最繁荣昌盛时那曾经微弱的自由之光。"
 antarctica_aag_rescue.2.a:0 "希望之光刺破绝望之霾。"
 antarctica_aag_rescue.3.t:0 "污吏归来"
 antarctica_aag_rescue.3.desc:0 "三架笨重的运输机从云层中冲出，从向南的漫长航行中降落。德国内战结束后，戈林派出它们确保德国在南极大陆的利益安全，同时带回埃里希·舒曼——如果他还活着的话。\n\n在席尔马赫站冰封的跑道上停稳后，人群挤了出来，受到了席尔马赫、舒曼和余下的身体状况最好的一群士兵的欢迎。他们解释说迈尔因病不能出席，与此同时，物资被从飞机上卸下来，拉到了基地的中心。\n\n在物资被分发给新施瓦本残余人员的同时，迈尔、席尔马赫、舒曼、格拉塞尔和负责救援的官员聚在了迈尔的办公室内，讨论近期的后勤计划以及德国的现况。自从戈林获得胜利后，迈尔就知道会有这种结果，他和高层光荣从南极退休，和大部分人一起返回欧洲。令人欣慰的是，他们都能获得完全的退休待遇，而迈尔和席尔马赫将获得极地研究协会的永久顾问席位。\n\n此外，舒曼获得了领地的临时控制权，并由于对新元首的赤胆忠心而获得了在新的管理人员到来后职位晋升的承诺。幸存者们歌舞升平，官员们也都准备着回到德国，舒曼重启了自己那早已被遗忘的计划，让这片大陆为己所用……"
 antarctica_aag_rescue.3.a:0 "阴影降临南极洲。"
 antarctica_aag_rescue.10.t:0 "流放者的毅力"
 antarctica_aag_rescue.10.desc:0 "“是我眼花了还是那就是德国海军的旗帜？”沃尔夫冈·格吕克利希问起牌桌边上的朋友：威廉·贝克尔、约翰·克劳泽和扬·斯特赖克——他们刚才在拿最后一口口粮来赌，毕竟钱又不能吃。电源忽明忽暗，阳光通过在祖先遗产学会的攻击中幸存的窗户照进活动室。沃尔夫冈靠着一扇窗户，望向地平线。扬在洗牌，贝克尔在抽最后一根烟，约翰在打盹，做着奇怪的梦。\n\n流放者们沸腾起来，遥远大陆的明亮火光扰乱了这里的永恒静谧。寒冰的冰原废土也消除不了远方土地的访客互相对彼此的苦恨。然后，一切重归寂静，流放者们再次沉沉睡去。鼾声滚滚，每一次呼气都伴随着寒风。\n\n约翰被肩膀上的手惊醒。他看向左边，士兵们呼喊着向门外涌去，沃尔夫冈就站在他身旁。\n\n“他们来了，约翰。该死的海军来了！他们带来了口粮和香烟！”"
 antarctica_aag_rescue.10.a:0 "新施瓦本幸存。"
 antarctica_aag_rescue.10.a.tt:0 "绝望的季节已然过去。"
 antarctica_aag_rescue.11.t:0 "一瓶红酒"
 antarctica_aag_rescue.11.desc:0 "开瓶，倒酒，然后杯子碰撞的声音就从鲁道夫·迈尔的办公室中传来。席尔马赫站的最后一瓶红酒被郑重打开了。带领新施瓦本度过最黑暗时日的五人举杯相庆，品尝着数月艰辛换来的奖励。与此同时，食堂中正举行着无尽的盛宴，海军的厨师们在为疲惫的新施瓦本人准备着美食。远处，领导人们边喝酒边……碎语。恩斯特·赫尔曼首先道出了自己听到的传言。\n\n“听说日耳曼尼亚会把我们当作英雄欢迎。不仅有铁十字勋章拿，还有盛大的欢迎队伍。”\n\n“真天真，他们可不会声张的，只会每月给我们丰厚的津贴，让我们不去多嘴。你怎么看，鲁迪？”\n\n迈尔晃了晃杯中的红酒，沉思着：“都有可能吧，我们都在体制中待久了，都听厌了，但是你们也都知道个中事由。如果游行能使党的配角获益，那我们就有游行。贿赂我们能让大人物获益……呃，那我们就完蛋了。”\n\n沉默地品着酒的安东终于开口了：“有那么重要吗？说实话，我只在乎能再见到孩子。他们两人都活了下来！为这干杯吧！”\n\n五个人举起了酒杯，敬生命。之后是一阵意味深长的沉默，直到埃里希·舒曼提出了一个还没说过的话题。\n\n“你们觉得谁会接替我们的位置呢？”\n\n心情大好的安东回答：“问得好，有什么想法吗，鲁迪？你肯定是第一个知道的。”"
 antarctica_aag_rescue.11.a:0 "我打赌，是个以科学为主的管理部门，他们对我们的研究欲罢不能。"
 antarctica_aag_rescue.11.b:0 "我觉得党会直接下手，控制整个部门……"
 antarctica_aag_rescue.11.c:0 "我们作为军事基地运转的不错，我不觉得上面会变卦。"
 antarctica_aag_rescue.11.d:0 "我们作为军事基地运转的不错，我不觉得上面会变卦。"
 antarctica_aag_rescue.11.e:0 "我只能想象……"
 antarctica_aag_rescue.11.f:0 "仅AI选项"
 antarctica_aag_rescue.12.t:0 "债务"
 antarctica_aag_rescue.12.desc:0 "看到干净的床单，迈尔的眼泪都要流出来了。他有多久没有享受过像这样简单的生理舒适了？他有多久没有感受过温暖了？\n\n海军到来的消息像野火一样传遍了席尔马赫站。人们聚集在码头上，观看一艘又一艘的船只驶入施佩伯爵港。运兵船从国内运来了饱经战火的老兵。一箱又一箱包括橙子和柠檬在内的新鲜食物，从货船上卸下。最后，一艘巨大的医疗船抛下了船锚，开始接收病患。\n\n几乎席尔马赫站内的每个人都需要医疗救助，包括领导层。迈尔打着点滴，紧紧地靠在病床上。他的身体像发烧一样热，但医生说，这是因为他的毛细血管在远离寒冷多年后旧病复发。在这种昏迷的状态下，迈尔大致可以看出格拉塞尔和席尔马赫就在自己身边，而且他还能听到舒曼的笑声。\n\n“现在，我那最重要的病人怎么样了？”\n\n迈尔看起来恢复了一些，抬起头来，看到了绍尔医生。船上的医生拍了拍绍尔的背，对迈尔说：“我不知道绍尔是怎么做到的，但这是个医学奇迹。你们的命都是他给的。”"
 antarctica_aag_rescue.12.a:0 "迈尔点了点头。“我们当然如此。”"
 antarctica_aag_rescue.20.t:0 "更为科学的探讨"
 antarctica_aag_rescue.20.desc:0 "警告：仅限拥有3级权限“蓝色多瑙河”人员阅读此信，违者将被起诉。\n\n希特勒万岁。\n\n此信仅为通知新施瓦本南极领地的现任领导层，元首打算召回除格拉塞尔将军以外的南极团队。元首欣赏你们的辛勤工作，特别是考虑到你们所处的特殊条件——既有地缘政治的意味，也有环境的意味——协会与殖民署决定让你们的团队成员返回欧洲。\n\n元首的意思是以更加技官的风格践行南极三大政策：探索、开发与覆盖。新的继任者会以团结协定，包括全欧洲的成员国，为中心制定决策，以对抗OFN和共荣圈的多元部队。\n\n回到家后，你和同事及下属会因扩大德国影响力的不懈努力而受到应得的嘉奖。我们将会为管理层提供退休金与适当的奖励，如果有人需要，我们还可以提供全德国的工作岗位。接替你们的新团队的成员为：\n\n卡尔·魏肯、维尔纳·丹克沃特、瓦尔特·霍夫曼。\n\n德国感谢你们的付出，元首期待着你们的归来。\n\n德国极地研究协会会长，卡尔-海因茨·勒布克"
 antarctica_aag_rescue.20.a:0 "看来就这样了。"
 antarctica_aag_rescue.21.t:0 "无人之地"
 antarctica_aag_rescue.21.desc:0 "就是这儿了，他接下来的家……瓦尔特·霍夫曼想要按按自己的额头，却只是在他的外套和帽子上留下了更多的冰晶。六个月？十二个月？十八个月？事实是，南极洲就是一处拘留所，只要日耳曼尼亚认为有必要将他留在这里——前提是日耳曼尼亚还记得要送他回家。看着南极洲的海岸线，霍夫曼生出一股恐惧，周围一切都是白色的，哪怕只是长时间盯着地面，眼睛都会感到一阵疼痛。\n\n地上曾经有凹陷、记号和足迹的存在，但风雪总是会淹没它们，就像是大自然在给自己化妆一样，擦掉了一切不完美与瑕疵。人类不该生活在这里，至少，不该长期生活在这里。南极是盖亚的王国，是地球最后的避难所，让她逃离人类不断的索取以及征服、建设和繁荣发展的本能。她是一只被逼无奈的狐狸，躲在自己的洞穴里，可现在，我们又踏进了她的地盘，取得最终的胜利无疑是难上加难。\n\n霍夫曼艰难地回到研究基地，在一片接一片的积雪中蹒跚跋涉。似乎过了一个小时，但也可能才刚刚过五分钟，霍夫曼站在了门口。盒子、方块还有电线拼凑而成的乱七八糟的东西搭成了一间小屋，将两个不开心的人绑在了一起，他的队长就在里面。\n\n“你去哪儿了？”卡尔·魏肯问道，他是这儿的负责人。“探险家”这个词汇在历史书上可不好找，为了传说中的宝藏，利文斯通的足迹遍布刚果炎热的丛林，哥伦布船队的足迹远达七海。虽然没有黄金国或者直抵紫色天穹的高耸山峰等着他们，但魏肯是最后一位了不起的探险家。他曾在二十年代探索过格陵兰岛，在波茨坦推动对南极洲的探索。当然，没人认真对待他，直到地球上的每一个角落都一个接一个地变成超级大国的棋子。出于绝望，神圣的元首和他的弄臣们将目光投向了最后一个地方——要是这里空空荡荡就好了。\n\n霍夫曼责备着自己。这是一片空旷的大陆，尽管并非没有生命存在，但企鹅和海豹也只能在荒地的灰色边缘栖息。南极洲，她的核心地带，是没有生命的，伊甸园已然沦陷。霍夫曼摘下他的护目镜，开口回答道："
 antarctica_aag_rescue.21.a:0 "“我只是去看风景了。”"
 antarctica_aag_rescue.40.t:0 "在永久冻土上的记忆"
 antarctica_aag_rescue.40.desc:0 "警告：仅限拥有3级权限“蓝色多瑙河”人员阅读此信，违者将被起诉。\n\n希特勒万岁。\n\n如诸位所知，德国一直在与对手斗争。由于东方的亚洲威胁和华盛顿挥舞的资本主义-布尔什维克的匕首，我们被迫做出艰难的抉择。南极洲对于确保德国能够在极昼下享有其应有的地位至关重要，各位和各位团队的管理在特殊环境之下创造了奇迹。然而，这封信的目的是通知诸位，驻扎在南极的部队将被召回德国，队长也在其中。\n\n这封信不是表达蔑视或训斥，而只是单纯的召回令。现在工作已经完成，各位和各位的部下将得到适当的奖励：养老金、工作机会或是奖金，并将重新融入正常的生活。\n\n德国将派出另一支队伍代替南极的工作，不同之处在于他们是文官。这不代表他们是门外汉，而是说他们是了解德国新目标的党政官员。南极洲仍是德国国防政策的必要组成部分之一，新目标就是驯服这片大陆，以党的标准确保德国尽可能地准备好对抗任何可能的威胁。言尽于此，各位的新继任者是：\n\n奥托·阿贝茨、鲁道夫·拉恩、卡尔·马里亚·黑特拉格、埃里希·埃林格。\n\n祖国对诸位的努力表示祝贺，元首等待你们的归来。\n\n德国极地研究协会会长，卡尔-海因茨·勒布克"
 antarctica_aag_rescue.40.a:0 "所以，事情还是到了这个地步。"
 antarctica_aag_rescue.41.t:0 "在永久冻土上的记忆"
 antarctica_aag_rescue.41.desc:0 "它就在那里。一千四百万平方英里的冰雪寒风，寒冷而又痛苦的虚无。当船靠岸时，奥托·阿贝茨想要抽根香烟，试图挡住南风不要吹灭打火机，但他失败了。他又想起了1940年在砖瓦铺设的香榭丽舍大街上那些光辉的日子，所有的艺术品和黄金都是由他负责……没收的。他笑了笑，即使在那时，他也很喜欢那些委婉语：没收、非自愿移民。船舶终于靠岸，阿贝茨的身体摇摇晃晃。此时，清风吹散了雾气，德国研究基地成为了焦点，另一个委婉的说法又从他的脑海中冒出来：改任。\n\n奥托很了解他的船员——呃，这是谎话，他只是非常了解他们的报告。鲁道夫·拉恩是二把手，除了琐碎的交谈外，他实际上没和这个人说过多少话，但显然他曾是一名外交官。当然，他没有达到奥托的高度，只是在战后的意大利做过一些工作，仅此而已，没什么好说的。但是，他到底做了些什么，能被派来这么一个“受人尊敬”的地方，来到世界之底站岗？这些人中有谁做了什么，配得上这样的奖赏？他做了什么？\n\n负责预算的是卡尔·黑特拉格。他是一名坚定的施佩尔派，也是德国商业银行的前董事会成员，真是令人印象深刻的资历。在施佩尔的领导下，他曾在军备计划中工作了许多个年头，也是最接近阿尔特·坎普夫老爷子的人。银行家、狂热的施佩尔分子，阿贝茨想着，这就像是火和汽油的组合在一起。有关他在五十年代的活动的信息相当稀少，但考虑到德意志银行关于此人的文件和笔记的数量，他似乎只是大机构中的一个小角色而已。\n\n最后一位是埃里希·埃林格：安全警察、党卫队、党卫队保安处、党卫队国家安全部，资历和黑特拉格一样深厚。但从报告来看，埃林格可是一名真正的信徒。在波罗的海地区的“反游击队行动”中，他在列宁格勒附近率领着一支70到80人的部队，他吹嘘说在战争中“消灭了4000多名闪族游击队员”。他在党卫队中拥有深厚的人脉，甚至与希姆莱本人都有关系，乃至担任希姆莱在德国各地的党卫队的代表。但到头来呢？他却和自己同在这条该死的船上。\n\n奥托在船上踱步思考着，试图保持镇定：银行家、外交官、刽子手，各异的资历、背景和能力——是什么把他们聚在了一起？"
 antarctica_aag_rescue.41.a:0 "他们都被扔到南极等死。"
 antarctica_aag_rescue.60.t:0 "阴影蔓延"
 antarctica_aag_rescue.60.desc:0 "迈尔在桌前坐下，赫尔曼和席尔马赫坐在左边，格拉塞尔和舒曼坐在右边，整个指挥班子的气色比几周前好多了。迅速分发的医疗与补给物资改善了新施瓦本剩余人员的身体状况。整个基地一直游走在地狱边缘，屏息等待着元首对于南极的决断。现在，迈尔拿着信，准备与大家一起一探究竟。\n\n“无论信里写了什么，”迈尔微笑着说，“我希望你们清楚你们以无上的勇气与尊严度过了德国以及雅利安种族历史上的一个里程碑式时刻。”他深呼吸一口，“现在……来揭晓谜底吧。”\n\n迈尔打开信，大声读道：“‘依元首之令，新施瓦本测试站将会得到扩建以进行进一步的飞行器实验与其他军事活动。即日起，新的管理团队将接过指挥权。鲁道夫·迈尔、里夏德-海因里希·席尔马赫、恩斯特·赫尔曼即刻回国，调任极地研究协会。格拉塞尔将军向日耳曼尼亚汇报调任情况，舒曼博士返回汉堡的研究委员会总部。’”"
 antarctica_aag_rescue.60.a:0 "看来南极大陆上的纷争只多不少。"
 antarctica_aag_rescue.61.t:0 "将军与地图"
 antarctica_aag_rescue.61.desc:0 "旅程之中，埃伯哈德·金泽尔将军始终都待在船舱里。他下了命令，只有吃饭的时候才能来打扰他，将军希望把所有清醒的时间都用来仔细研究德国极地研究协会提供给他的一套地图。正是这样的努力保证了对苏作战的迅速胜利：在巴巴罗萨行动中，正是金泽尔的制图技术让第一批装甲部队发动了决定性的压倒式突击。现在，他希望把同样的专业知识带到南极，丝毫不用担心那个新人盖伦会再次接过他的指挥权。\n\n当他检查地图上标明新施瓦本和OFN南极洲事务局之间的一条边界线时，他注意到了防线上明显的缺口，还有应当放弃的突出部，这里的资源应当被用于支持其他部分的防线。显然，这片大地急需他的援手。\n\n地图上的又一个名字吸引了他的注意力——贝格尔海姆。他收到了国防军的情报简报，看起来，勃艮第在南极的代理人沃尔夫拉姆·西弗斯正在主动采取行动，党卫队对席尔马赫站发动了袭击，金泽尔发誓要以牙还牙。"
 antarctica_aag_rescue.61.a:0 "“看见陆地了！来看看这些冰吧，将军！”"
 antarctica_aag_rescue.70.t:0 "折断双翼"
 antarctica_aag_rescue.70.desc:0 "迈尔抚摸着手中的铁十字勋章，用手指划过边缘与光滑的银面。他闭上眼睛，自己仿佛又置身于福克沃尔夫飞机中。云朵在身旁路过，被英吉利海峡上空湮灭的阳光粉刷成琥珀色。从云端望去，太阳显得更大，数不清的飞行，只有那灼热的存在不离不弃、长伴在身。他坐在驾驶舱中，执行任务：击落敌机，同时不被击落——一切都是那么的单纯。迈尔笑了。一切本该如此，不是吗？只有看不到脸的敌人或者伴随燃烧的残骸中自由落体的影子，为他带来一两枚勋章。只是又一次胜利，只是又一例伤亡。也许随着时间的推移，黄金岁月的记忆变得更善于粉饰那不堪的事实。\n\n“打扰一下，请问你是鲁道夫·迈尔吗？”一名身材高大、光鲜亮丽的男人站在门口。迈尔从纷乱思绪中回过神来，看向来人——大概是从新克尔恩的某家艳俗商店中买来的西装，系得有些紧的领带，腋下夹着一堆文件和档案。与其说他是来地球上最荒凉的大地上来管理机密设施的，还不如说他是来推销黄金债券的。“我叫康斯坦蒂，康斯坦蒂·古乔。我是来接受研究基地的。你是迈尔先生吗？”\n\n迈尔站起身来，看着他的接替者康斯坦蒂·古乔。施佩尔没有送来一个厌世的官僚或者百战的将军，而是送来了一位建筑师。“也是啊，隆美尔元帅怎么可能来这里。那你就是我的接班人了吧。”\n\n“是的，先生。元首想要改变这里的方略。带来些新鲜血液，清除掉祖国最聪明但不清醒的人的过时幻想。”古乔与迈尔握了握手。这就是鲁道夫·迈尔？著名的飞行王牌，自我意志的囚徒。这种场合竟然都不剃胡子的嘛。“如果你不介意，能带我看看吗？接下来几年中，我都要盯着冰块看，这样改改口味还不错。”\n\n迈尔点了点头，走过古乔身边。后者想着，折翼的鸽子无法理解自己的计划——将南极从彼方的废土变为制胜战争的棋子。"
 antarctica_aag_rescue.70.a:0 "他只需要点时间，而他绝对有时间。"
 antarctica_aag_rescue.71.t:0 "绷紧的弦"
 antarctica_aag_rescue.71.desc:0 "“迈尔先生，”维克托·卢策行了个纳粹礼，然后踏着防冰靴走了进来，说道，“我是维克托·卢策，你的接班人。很荣幸见到你。”迈尔点了点头，心不在焉地回敬了礼。他的南极之路就要行至终点了。冰冻废土中挣扎多年后，眼前的这人将接过接力棒。\n\n“卢策先生，现在唯一能给我宽慰的就是家了。我不清楚你在欧洲犯下了什么，受到这种残忍而不寻常的惩罚，但我也只能表达下我的慰唁。”迈尔抚摸着胡子走过卢策，开始打包放得乱七八糟的各式小玩意儿。德国给南极送来了更多的人，鲍曼还把这里当成了收监党内成员的严寒监牢。迈尔觉得也许欧洲并不是适合团聚的理想地点，他最不希望看到的就是刚从冰窟窿中解脱，就被刺刀指着跳入了更大的煎熬之中。不过……至少哪里都要比非洲好。\n\n“我不是‘受罚’，迈尔先生。”卢策拿出一支雪茄，用小而精致的打火机点燃。打火机是从死掉的犹太人手里拿来的还是从被烧毁的家室里偷来的，迈尔不得而知。“我自愿来的。我觉得德国需要更严密地关注下南极，这里的潜力被忽视太久太久了。你懂我吗，迈尔先生？”\n\n“这里可没有什么被忽视了，除非你是指那些企鹅。”迈尔把脏兮兮、全是褶皱的衣服放进手提箱中，虽然半数的衣服他都没穿过，但还是不知怎的弄脏了，怪事。“你想和东京或者华盛顿开战，我都没意见，卢策。只不过一定要等我的船安全驶离了港，再去雪地里挖堑壕。”\n\n“我不想惹麻烦，迈尔先生，”卢策说道，声音中多了些激动，“我只想为祖国尽责，为整个雅利安种族尽责，守护这片没有被人类接触过的土地。这片土地会受到祖国最优秀最聪慧的人的关照，德意志会称霸地球上的每一块大陆！”\n\n迈尔转过身。不愧是主动来这里的人，想法真够蠢的。唉，迈尔还有些嫉妒他。迈尔走过卢策，打开门，步入南极洲明亮的晨光。"
 antarctica_aag_rescue.71.a:0 "这是迈尔头一次昂首挺胸。"
 antarctica_aag_rescue.80.t:0 "将军与地图"
 antarctica_aag_rescue.80.desc:0 "埃里希·舒曼孤伶伶地站着，他的忠犬格拉塞尔，正在码头上监督着无穷无尽的军用物资从船上卸下。戈林在内战中击败了其他的觊觎者，达成了完全的胜利，成了千年帝国的新元首。舒曼在这些事情中的角色并没有如预期那般发展，不过，舒曼还是站在了这里，孤伶伶地。\n\n他面前是迈尔曾经坐过的椅子，他曾经伏案的桌子，以及他执掌新施瓦本的办公室，一切都成了舒曼的。舒曼的脑海中充斥着对核未来的畅想，他的发明创造将达到前所未有的高度，为雅利安种族保驾护航。不过即使如此还是不够的，如果舒曼缺少什么的话，那一定就是想象力了。\n\n上次战争中，德国对使用化学武器与生物武器犹疑不决，而戈林就不会有这种纠结。德国最具腐蚀性与毒性的物品已经准备好运至新施瓦本，只需要舒曼一句话就开动。\n\n他绕着桌子踽踽独行，然后坐在了迈尔的椅子上——比他想的小了点。格拉塞尔走了进来：“第一艘船已经卸完了，舒曼博士。”"
 antarctica_aag_rescue.80.a:0 "舒曼抬起头：“那开始吧。”"
 antarctica_aag_rescue.90.t:0 "异乡人终得拯救"
 antarctica_aag_rescue.90.desc:0 "湛蓝的天空上红色、橙色、黄色的云星罗棋布，构成了一副美妙的景象。苍穹之下，笨重的船只驶过将流放地与其兄弟姊妹分隔开来的深邃大洋。他们停泊在被沉默笼罩的荒芜海岸，卸下体型比争先恐后赶来的小生命大上三倍的箱子。\n\n流放地紧紧注视着海岸的来访者；注视着不再出现在凸出的码头上的船只；注视着他们涌向那小而坚韧像藤壶一样挂在大陆边缘的居住处；注视着他们被遗弃在荒凉的大地上，陷入疯癫与绝望，形单影只，朝不保夕。这时，异乡人感到了与这些蝼蚁般生灵之间的共鸣，在世界的尽头紧紧地抓住宝贵的生命不放手。\n\n然后，亘古不变之中也会出现变数。正当他们苦苦支撑，抵挡着内外的难题时，一艘孤独的船出现在了海平面上。它径直驶向定居点，很快，被遗弃的访客发现了。时间流逝，新面孔越来越多。沉闷的大陆迎来了又一个夏天，海岸的微风中透露出了千年未有之感觉：变化。变化之风吹遍南极海岸……"
 antarctica_aag_rescue.90.a:0 "铁幕压在流亡大陆和其定居者们身上。"
 antarctica_aag_flavor.25.t: "延误与借口"
 antarctica_aag_flavor.25.desc: "里夏德·席尔马赫站在船头，双手交叉，放在背后，双眼紧盯着桅杆上有气无力的法国国旗。\n\n席尔马赫踏上金属跳板，谨慎的步伐有条不紊，敲打着脚下的步道。他的目光投向海岸边嶙峋的岩石：这里就是凯尔盖朗群岛，法国在南冰洋的光荣“堡垒”，也是新施瓦本的重要补给枢纽。然而呢，这里却破败不堪，防卫松懈，室外的几个哨兵正坐着抽着烟，似乎还有几个渔民正在把渔获运回岸上，卫兵甚至没有对他们进行哪怕最为轻微的检查。当然，这里不是新施瓦本，二者之间无疑是天壤之别，但即使是法国人，这也有点太可悲了。一箱箱补给在码头上一字排开：食物、燃料和其他德国极地前哨必不可少的生活用品。\n\n没过多久，格扎维埃·里歇尔找到了席尔马赫，他是这个可怜基地的民事长官。法国人匆匆走来，伸出一双冰冷的手：“席尔马赫先生！我为没有正式问候表示歉意，我们没想到这么快就会有人来视察……”\n\n“——我们也没想到你们的进度会落后这么多。“席尔马赫挖苦道，“我是来这儿看看，究竟是什么样的灾难导致了延误，但现在看来，都是懒惰惹的祸。”\n\n里歇尔眨了眨眼，眼中闪过一丝沮丧：“长官，您是在要求我做到不可能的事情，我们根本没有足够的运输船和海员。相信您也知道其他殖民地有多不稳定，老实说，我们并不是本土优先考虑的对象。”\n\n席尔马赫对此嗤之以鼻，回敬道：“我可以向您保证，这不是我们新施瓦本会碰到的问题。”随后，他停顿片刻，考虑着适当的解决方案……"
 antarctica_aag_flavor.25.a: "“那就征用渔船和捕鲸船吧，我们的生存远比区区几个法郎的渔获重要得多。”"
 antarctica_aag_flavor.25.b: "“也许我们错了，以为你们能胜任这样简单的任务。我会派一些我们自己的船只来弥补这里的缺口。”"
 antarctica_aag_flavor.26.t: "我们需要的机会"
 antarctica_aag_flavor.26.desc: "赫尔曼伫立在席尔马赫站的一条小道里，泛光灯照亮了基地的角角落落。他叼着一支香烟，一边吞云吐雾，一边用手挡住烟灰，免得被冰冷的寒风吹散。他能感到，温暖的烟雾充盈着他的胸肺。\n\n赫尔曼知道，自己抽烟的习惯并不为党所提倡认可，但他总需要提提神。话又说回来了，他觉得抽烟还是比其他人用柏飞丁强多了。另外，他还试过一次安非他命，结果让他连着好几天都感觉像是废了一样。\n\n赫尔曼慢悠悠地晃回自己的房间，回到狭窄的办公桌前，望着堆成山一般的新公函公报。他掏出惯用的拆信刀，打开了第一封。\n\n喔，是雅克·库斯托寄来的。赫尔曼听说过他，是一位试图在南极洲拍摄自然风光的纪录片导演，他甚至还曾经在办公室里听到过一两次好像和库斯托有关的广播报道。库斯托在信中请求，允许他在新施瓦本进行拍摄活动。\n\n这无疑有风险，赫尔曼很清楚，迈尔和格拉塞尔不会喜欢这主意的。可虽说如此，想到随之而来的可能性，赫尔曼还是忍不住轻笑起来。如果答应库斯托的请求，就能改善与法国的关系，从而借用他们向世界展示，德国在南极做的不仅仅只是军事项目。这可能正是新施瓦本一直需要的机会！"
 antarctica_aag_flavor.26.a: "赫尔曼收起笑声，愉悦地在回信中明确表示了他对来信的兴趣。"
 antarctica_aag_flavor.26.b: "赫尔曼不禁有些激动地笑了起来。他提笔给库斯托回信，表明了他的兴趣并同意提供物资。"
 antarctica_aag_flavor.26.c: "赫尔曼脸上的笑容消失，皱起眉头。虽然他很想放行，但真的无法忽视风险。他回信婉言谢绝了库斯托。"
 antarctica_aag_nuclear.81.t: "致友人的信"
 antarctica_aag_nuclear.81.desc: "埃里希·舒曼的思绪又飘回了过去。凛冽的南极寒风吹过施佩伯爵海军上将港，混杂着海盐和柴油的气味。舒曼紧了紧身上的大衣，注视着港口中的挪威捕鲸船北极光号，它的船员们正在将一箱箱的鲸油搬上船去。在锈迹斑斑的海军驱逐舰和凯尔盖朗来的补给船中间，这艘捕鲸船显得格格不入：它实用而坚固，似乎对南极的荒凉冷漠无动于衷。\n\n“卡尔森船长！”舒曼喊道。老捕鲸船长正在检查最后一箱装船的鲸油，他闻声转过身来，嘴里还叼着他的烟斗。“舒曼先生，”卡尔森操着带有浓重挪威口音的德语回应，“您看起来比坚冰还要冷。什么风把您给吹来了？”\n\n舒曼走进了些，将手中的信封递给卡尔森，压低声音说道：“这封信必须得尽快送到布韦岛，然后从那儿寄去挪威，明白了？”卡尔森瞥了一眼信封，然后把它塞进外套，耸耸肩，笑着反问道：“真是条奇怪的路线。舒曼先生，您这是有什么打算？”\n\n舒曼的目光坚定起来：“你是拿钱开船的，不是拿钱来问问题的。”卡尔森笑容不变，摆了摆手：“说得对。”然后，他转身走向捕鲸船，向船员们大声喊道，“我们出发！”\n\n北极光号的引擎轰鸣起来，舒曼目送着它渐渐隐没在浓雾之中。那封信是写给老同事汉斯·苏斯的，内容则是请求他帮个小忙——牵线搭桥，从国内铀储备中获得更多的裂变材料。舒曼转身离开，海冰反射着港口的导航灯光，刺入了他的眼瞳。舒曼很少会感到不安，但刚刚的刹那一瞬，忐忑却侵入了他的内心，他彼时曾苦心焦思的问题仍然盘桓不去："
 antarctica_aag_nuclear.81.a: "“在彻底崩溃之前，祖国还有多少时间能支持自己的愿景？”"