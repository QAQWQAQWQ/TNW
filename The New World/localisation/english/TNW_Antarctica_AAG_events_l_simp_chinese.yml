 antarctica_grid_event_aag.44.t:0 "枯燥乏味的工作"
 antarctica_grid_event_aag.44.desc:0 "在霍斯特的努力工作之下，成堆的地图和文件正耸立在他的面前。他把文件清理得干干净净，将有错误的文件放在一旁，与最新的信息相互对照——他在搜寻地图上的不准确之处，寻找用德语而不是这一地区从前使用的挪威语书写的旧文件，哪怕只是一两个错别字都逃不过他的法眼。\n\n有利的文件会送到上司那里继续使用，而其余的则会被焚烧销毁，随风飘散。\n\n德国虽然不像日本人那样紧紧抓住自己的领地不放，也不像智利为闪闪发光的冰块争执不休，但与其他各方相比，德国领地的宣称仍远远不够稳固。这完全不可接受，所以霍斯特才会被派来翻阅文件，确立更坚实的领地主张。\n\n霍斯特发现了一份保存状况良好得令人惊讶的档案，其中有一张席尔马赫站附近的海岸线地图。霍斯特把这份档案归入了一叠文件中，然后拿起最薄的另外一沓文件，走向了长官的办公室。"
 antarctica_grid_event_aag.44.a:0 "今夜的火盆会烧得很旺。"
 antarctica_grid_event_aag.45.t:0 ""
 antarctica_grid_event_aag.45.desc:0 ""
 antarctica_grid_event_aag.45.a:0 ""
 antarctica_grid_event_aag.46.t:0 "请自便"
 antarctica_grid_event_aag.46.desc:0 "康拉德·施瓦茨科普夫和卢卡斯·拜尔听到一阵敲门声，这还是数月以来的第一次。二人与世隔绝，正在努力研究各种不道德的保密国家工厂项目。一开始，敲门声把他们吓了一跳，但一听到门外传来的德语，二人就放下了戒备。\n\n“喂——！科学家们？”\n\n康拉德冲过去打开了门，对在外面等待的国防军问道：“你好啊，我们能为你做什么？”\n\n这位衣衫不整的科学家在阳光下眯着眼睛，但他还能辨认出一辆雪地车，还有几名正在卸箱子的士兵。\n\n“我们需要把这些箱子放在你们这儿几天，我们……呃……根据上级的命令拿下了邻居的几处补给仓库。我们还接到命令，将这些东西在阿米尼乌斯站放几天，直到风头过去。长官们还说了，就算丢一两个箱子，我们也会睁一只眼闭一只眼。听起来还不错吧？”\n\n康拉德知道不存在拒绝的选择，于是他点了点头，把士兵们迎进了屋里。壶里正煮着咖啡，他和拜尔给疲惫的士兵们讲了足足半个小时的故事。士兵们离开的时候，一个重要的问题落在了两位科学家的身上："
 antarctica_grid_event_aag.46.a:0 "“我们是拿麦斯威尔的咖啡……还是好时的？”"
