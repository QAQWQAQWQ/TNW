 antarctica_grid_event_aag.26.t:0 "一位地质爱好者"
 antarctica_grid_event_aag.26.desc:0 "新施瓦本的最高指挥部正在开着一个及其无聊的会议。议题各种各样，但都是一样的无聊。安东·格拉塞尔说着他最近的发现，顺带着大嚼特供甜甜圈。至于恩斯特·赫尔曼，他则是兴奋滴谈着研究小组最新的地质发现。\n\n埃里希·舒曼激励着这位热情的地质学家。虽然他们职位不同，但作为一名科学家，他很欣赏恩斯特。恩斯特发表完自己的演讲就坐了下来，但不幸的是，有些麻烦在等着他。\n\n鲁道夫·迈尔向来都是个令人扫兴的家伙，他给这位地质学家出身的外交官的热情泼了盆冷水。\n\n“我知道你喜欢的是地质工作，但我们现在需要你的外交技巧。明天我们邀请了一些智利外交官，你得去拍拍他们马屁。但请注意，除了希望之外我们啥也不会给他们。他们提出的要求就是臭狗屎，而且他们自己也知道。所以，全靠你长袖善舞咯，恩斯特。“"
 antarctica_grid_event_aag.26.a:0 "”好吧。但在那之后，别来打扰我搞地质研究。“"
 antarctica_grid_event_aag.27.t:0 "换换节奏"
 antarctica_grid_event_aag.27.desc:0 "”上等兵贝克尔前来报到，长官。“\n\n“你迟到了，飞行员，稍息。”\n\n空军上等兵贝克尔在简报室的座位上坐下。他不知道今天的任务是啥，但总归是飞行、飞行和更多的飞行。不过，他还是听得很认真。\n\n“接上级命令，我们在南极的档案很可能遭到破坏，所以得对任务做出一点小小的调整，赖克会把指令书发给大家。作为奖励，你们可以优先吃午饭和晚饭，还能使用咖啡机。就这样，解散。“\n\n贝克尔一开始感到非常恼火，毕竟他是个飞行员。但冷静下来重新想想，他感觉这似乎还不错。不仅有喝不完的咖啡，还有精美食物——这些好东西通常在他去食堂的时候早就没了。"
 antarctica_grid_event_aag.27.a:0 "或许换换节奏也不错。"
 antarctica_grid_event_aag.28.t:0 "肉体上的惩罚"
 antarctica_grid_event_aag.28.desc:0 "“为啥我们又要干这个？”奥斯卡·韦伯抱怨道。\n\n“因为有人掌握着我们的日程表！”被激怒的汉娜·龙德施泰特厉声回应道。\n\n“你为啥要表现得好像我把日程表泄露给了CIA一样？”韦伯打趣道。\n\n在安东·格拉塞尔的命令下，阿勃维尔的新人特工们被粗暴地派去值夜班。支队长马丁·莱特纳愉快地接受了任务。他的学生们在野外度过了第一个冬天，而显然他们对此并不高兴。马丁在无意中听到了这俩菜鸟的哀叹声。\n\n“嘿！我有没有说过不许谈闲话？去外面跑三圈，马上！”\n\n奥斯卡低声咒骂，汉娜对着她的户外装备生闷气。马丁微不可查地微微一笑，他的学生没有犯错……直到现在。"
 antarctica_grid_event_aag.28.a:0 "“不许穿冬季装备，不想冻死就给我跑起来！”"
 antarctica_grid_event_aag.29.t:0 "冰天雪地，土木苦工"
 antarctica_grid_event_aag.29.desc:0 "迪特里希·耶格扳着手指，又要面对一整天漫长的工作了。温度已经降到了零度以下，但他获得的命令很明确——利用好7天24小时不间断的阳光调整并扩大阿勃维尔使用的情报设施。\n\n在其他地方，他都把拿下这种利润丰厚的军方合同视为一种荣耀，但在这里，远离家妻孩子，最近的啤酒馆也在千里之外，活脱脱感觉像个流放犯。\n\n不过有钱能使鬼推磨，这一次的报酬足够他吃上几年了，甚至还能在鲁尔区开个分公司。那么在他和那一鸣惊人的美梦之间的，就剩下这份穷山恶水的工作了。\n\n脑海中的目标更加明确，迪特里希准备好去工作了。他的手下没有他这样的雄心壮志，但他知道一个能让这些人满意地去工作的目标。冰冻的废土上飘过他简单的话语，建设工程的步伐随之加快。"
 antarctica_grid_event_aag.29.a:0 "“加把劲伙计们，今晚有炸肉排！”"
 antarctica_grid_event_aag.30.t:0 "“那个东西”"
 antarctica_grid_event_aag.30.desc:0 "“该死的马丁·莱特纳。”瑟瑟发抖的阿尔布雷希特·霍夫施泰特低声咒骂着。\n\n他并不是唯一一个在冰天雪地里挨冻的人。他和其他九名阿勃维尔特工正在执行职业生涯中第一次任务。他们的教官，也就是之间被提到的马丁，给他们分配了许多不同寻常的任务，这只是其中一次而已。阿尔布雷希特负责值夜，战友们则在睡觉。\n\n他们现在被分配到了一个僻静的南极前哨站，以此测试他们理智的承受能力。他们已经在这里驻扎了三个星期，理智正慢慢地趋于极限。十人小队竭力维持着哨站的正常，但当巡逻队回来时，一切都被打破了。\n\n他们面色凝重，眼神中充满恐惧。阿尔布雷希特倒了三杯咖啡，将两杯递给了坐在沙发上暖身子的特工，开口问道：“汉娜，卡尔……你们在外面见到了什么？”\n\n卡尔沉默不语，任凭咖啡蒸腾出的热气爬上他的脸颊，而汉娜则用疯狂而沙哑语调说道：“我们在回程的时候看到了它，在雪堆上面……只能用望远镜看到它。我们起初以为那是块儿石头……但它一直在靠近。”\n\n阿尔布雷希特没太当回事，觉得这只是巡逻队员的神经质而已，但他还是问了下去：“它跟着你们到这儿了吗？”\n\n“没有……我们在外面碰到埃里希的时候，那东西就停下来了。”\n\n阿尔布雷希特心里一阵忽悠，不由得提心吊胆起来，他又问道：“呃……你们在那之后有没有再见到埃里希？他一个小时前就该回来了。”\n\n“没有。”卡尔嘴里只吐出了一个词，他还在低头盯着手中的咖啡杯。\n\n“卡尔，汉娜，我去找埃里希，你们两个守住这里。”"
 antarctica_grid_event_aag.30.a:0 "阿勃维尔前哨站报告：两人于行动中失踪，推测已死亡。胜利万岁。"
 antarctica_grid_event_aag.31.t:0 "南极洲最幸运的人"
 antarctica_grid_event_aag.31.desc:0 "如果用“生气”一词来描述沃尔夫冈·格吕克利希现在的心情，那也未免有些过于轻描淡写。他和他麾下一整个排的士兵在仅仅享受了三天休憩和娱乐之后就被召回队伍。然而，最让他冒火的事情是，他甚至还没能和一直在追求的土著女孩睡上一觉。他痛苦地收拾好行李，前去报道处；第二天，他们就出发了。\n\n现在，他已经身在新施瓦本，唯一的安慰就是香烟和台球。在工作结束短短几分钟之后吗，他就会出现在台球桌旁。巧合的是，他今天的对手格哈德也曾经在非洲服过役。\n\n“所以说，他们是在你休假的时候把你扔来了南极？真是太遗憾了，兄弟。”\n\n沃尔夫冈叹了口气，表示赞同：“是啊，我可是差点就要把一个黑人女清洁工搞到手了。”\n\n格哈德正准备把一个花球打进球袋，闻言不由得停下了动作。他抬头打量着沃尔夫冈，眼神中闪过一丝认同。\n\n“我说啊……那个度假村是不是离利奥波德维尔挺近、有不少高级餐厅、士兵还能免费吃饭的地方？”\n\n“嘛……是的。你是怎么知道的？”格哈德放下手中的球杆，伸手端起了放在另一张台球桌上的热巧克力杯。\n\n“你应该好好庆幸一下。我从战友那儿听说，他们每年都会骗一个觉得自己撞了大运的德国士兵上钩，然后把他献祭给他们的神灵……他妈的野蛮人。高层对这种事儿也不管不问，我估计。”\n\n格哈德啜饮着杯中的热巧克力，沃尔夫冈则意识到，如果他真的按计划过完了自己的假期，那恐怕就会烂在非洲的丛林中了。\n\n“那看来我最好还是待在这儿，反正我也喜欢更凉快的地方。”"
 antarctica_grid_event_aag.31.a:0 "毕竟，格吕克利希（Glücklich）就是德语中代表“好运”的单词。"
 antarctica_grid_event_aag.32.t:0 ""
 antarctica_grid_event_aag.32.desc:0 ""
 antarctica_grid_event_aag.32.a:0 ""
 antarctica_grid_event_aag.33.t:0 "繁文缛节"
 antarctica_grid_event_aag.33.desc:0 "对飞行员威廉·贝克尔来说，今天无疑是漫长的一天。他被停飞了，不是因为不服从命令，而是因为他是席尔马赫站唯一的公证人。但对他来说，万分不幸，几个衣着华丽、势利自负的官僚不得不充当他的见证人。\n\n“繁文缛节，每次都会让你吃亏。”贝克尔自嘲着，希望面前这个秃头混蛋能说点什么，什么都好！可恰恰相反，现场一片寂静，只能听到笔尖的沙沙声。\n\n“啊——！”贝克尔用力大喊着，面前的官僚吓得一抖，公文包从手中跌落。威廉随后爆发出一阵大笑，这个穿西装打领带的官僚随即冲出了房间。在他离开时，与他合作的飞行员约翰·克劳泽向屋内看去。\n\n“看来你很开心啊，威利。不得不做这种事儿对你来说真是不走运。我们今天的飞行很精彩！”\n\n“哦，是吗？还发生了什么？”\n\n“嗯，他们还给我们做了甜甜圈，今天是我们抵达这里的一周年，他们没忘。”\n\n贝克尔又对着屋里那个瘦弱的官僚比了个手势。"
 antarctica_grid_event_aag.33.a:0 "“没事儿的，克劳泽，我也给自己找到了乐子。”"
 antarctica_grid_event_aag.34.t:0 "咬牙忍耐"
 antarctica_grid_event_aag.34.desc:0 "对制图师威尔弗雷德·卡尔斯鲁厄来说，今夜是个漫长的夜晚。上级命令他正式更新面前这张地图，以符合最新的报告。任务乏味，但薪酬丰厚。\n\n在翻阅地图时，威尔弗雷德的猫，雷米，跳到了桌子上，大声地喵喵叫个不停。显然，天色已晚，只有他睡下，雷米才会安生下来。威尔弗雷德摸了摸雷米，他在考虑要不要收工了。他工作十分努力，应该得到休息的时间。妻子早在几个小时前就打卡下班了，他的茶也早已放凉。\n\n权衡了一下手头的选择，卡尔斯鲁厄决定抽支烟休息休息，好好想想要怎么做。他踱步走到阳台上，温暖的空气让他紧张的情绪舒缓下来。他靠在窗台上，用阳台上的烟盒点燃了香烟。\n\n然后，他想到了需要这张地图的那些士兵。他们或许很冷、没有女人、没有隐私，就像他在军队的时候一样，只不过是大自然变成了最大的敌人。在香烟燃尽后，威尔弗雷德想明白了他必须要做的事情。"
 antarctica_grid_event_aag.34.a:0 "如果身处世界阴暗角落的同胞们能忍住，那他也能。"
 antarctica_grid_event_aag.35.t:0 "假日奖励"
 antarctica_grid_event_aag.35.desc:0 "贿赂的艺术并不总是出自无赖和腐败分子之手，有时，心怀美好愿望的人和墙头草也不会吝于使用这样的手段——最近一批抵达的货物就是如此，码头工人和船员们正在施佩海军上将纪念港为新施瓦本卸下物资。\n\n与此同时，在空荡荡的舰桥上，里夏德-海因里希·席尔马赫正在和舰长进行一场……意外的重逢。\n\n“是我看错了吗？是你吗，里奇？”\n\n席尔马赫也感到难以置信：面前正是他的老战友，带领他回到祖国的战列舰舰长！“哦，我的老天，托比亚斯·霍夫曼！这么多年了，还是个舰长，啊？”\n\n“是的，这些年我过得很不错，现在拥有一家航运公司，有时也自己出海跑航线。那么，我有什么能给你搭把手的，老朋友？”\n\n里夏德思考了一下，掏出了迈尔给他的一沓马克。“好吧，我打算贿赂你，而且可能之后还会再二再三。听着，我们的车队最近运的货物都挺轻的，我希望下次你能确保一些物资……失踪。我愿意付钱，事实上我也鼓励这么做。你懂的，船员们大可以从这些奖金里分上一笔。”\n\n闻言，船长挺了挺腰，清了清嗓子：“拜托，里奇，你为什么要告诉我这个？根据《大日耳曼国武装力量行为守则》第三章第二部分，我将不得不向空军报告——哈哈哈，看看你脸上的表情！”\n\n看到里夏德脸上露出惊慌失措的神色后，托比亚斯不由大笑出声：“我当然会接受你的贿赂，反过来，我们肯定也会给你们一些好处。”托比亚斯握着老战友的手，自豪地打下了包票。"
 antarctica_grid_event_aag.35.a:0 "“我们霍夫曼航运公司十分乐意接受您的捐赠赞助，席尔马赫先生。”"
 antarctica_grid_event_aag.36.t:0 "螺旋下降"
 antarctica_grid_event_aag.36.desc:0 "“你确定你要这么做吗，鲁道夫？”\n\n“我必须得这么做，里夏德。”\n\n“你确定？我们可以靠一半的口粮再坚持两个月。该死的，如果减少巡逻，我们还能再维持一样长的时间。”\n\n鲁道夫·迈尔对他的老友呵斥道：“我必须这样做！你觉得，要是我们的人饿了，或者不能洗热水澡，会发生什么？他们会绝望！他们会发怒！他们会引起意外！这是个螺旋下降的过程，最后，敌人就会扑过来，干掉我们。你的建议的只是延缓了下降的速度，但归根结底我们还是在下降！”\n\n里夏德听到了外面传来的发电机断电的声音，也许鲁道夫说得在理。迈尔写完了命令，对一名路过办公室的士兵高声命令道：\n\n“你！快进来！”\n\n“是，长官？”\n\n“停下手头的所有工作，把这封电文送去无线电室。”\n\n这名士兵正在去重新启动发电机的路上，但他知道最好不要违抗迈尔中校的命令。他敬了个礼，离开了迈尔的办公室。"
 antarctica_grid_event_aag.36.a:0 "“看起来木已成舟了，鲁道夫。现在只能等待。”"
