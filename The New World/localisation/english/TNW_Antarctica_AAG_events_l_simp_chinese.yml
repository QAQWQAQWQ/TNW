l_simp_chinese:
 antarctica_aag_flavor.1.t:0 "致回忆"
 antarctica_aag_flavor.1.desc:0 "鲁道夫·迈尔低头盯着手中的信，扫视着上面的内容。从祖国本土寄来的信件总是要经过很长一段时间才能到他们手里，而且一般都不是什么好消息。但这一封信对他的打击比以往任何一封都大。他的朋友、老师乃至他在日耳曼尼亚的唯一盟友阿尔弗雷德·里彻对迈尔来说意味着许多，而他根本没有准备好接受他去世的事实。他在3月30日悄然离世，迈尔只能感谢自己在德国第三次南极探险队中的裙带关系使这个消息相对迅速地传到了南极大陆。\n\n收到消息几个小时后，迈尔与席尔马赫坐在一起，共同回顾他们的导师兼挚友的一生。他们越来越因他们在二战前后从他那里学习到的经验而感激他，还记得他们刚被派往南极大陆时，两人就因有机会再次与队长共事而兴奋不已。\n\n现在，他们躺在椅子上，抽烟、喝酒、无精打采地盯着天花板。他们的未来看起来比他们“同意”来到这里时要暗淡得多。\n\n“那么，现在谁是我们在日耳曼尼亚的新联络人？”\n\n“勒布克。他会负责协调极地协会的工作。”\n\n“我早就知道会是他……”勒布克是第三次南极探险队中的一员，负责让其他探险队成员“遵守党的纪律”。他是纳粹党的忠诚分子，两人都心照不宣地知道他更可能遵循党的指挥，而非南极领地的实际需求。\n\n“好吧，至少我们还可以悼念一下里彻。敬他！敬光明的未来！”\n\n二人将各自杯中的烈酒一饮而尽。"
 antarctica_aag_flavor.1.a:0 "酒精下肚，忧愁也随之而散。"
 antarctica_aag_flavor.2.t:0 "强制娱乐"
 antarctica_aag_flavor.2.desc:0 "“里夏德，你上次休假是什么时候的事了？”临走前，迈尔曾对他如此说道。对席尔马赫来说，只有一个地方可以去：他的老朋友艾伯纳在当了不知道多少年的民航飞行员后终于退休了，他说在南非的海岸边钓鱼非常惬意（而且比西非更安全）。这一切发生的如此之迅速，以至于他还没反应过来，一架破旧的Ju390就把他带到了温得和克庞大的航空港，然后一架看上去稍微新一些的阿拉多把他和满满一飞机瞪大了眼珠子的德国旅客带到了开普敦，这个充满了资本主义腐朽堕落气息的地方。\n\n不久之后，席尔马赫满足地叹了口气，他一手拿着啤酒，一手拿着钓竿，为它上钩、上饵、抛竿，然后把它固定在了游艇的钓竿架上，这样他就可以毫不费力地一直盯着它。\n\n“你变了不少啊，艾伯纳。”他侧着脸对他的老朋友说道，眼神间藏着一抹微笑。“看来你还是适合早早退休。”\n\n艾伯纳咧嘴一笑，拍了拍他那令人印象深刻的肚子。“就算在汉莎航空待了这么多年，你还是一点没变。”他开玩笑地说道。“我还没喝饱呢，咱再吹一瓶？”席尔马赫点了点头，又喝了一口啤酒。这一喝就知道是德国本土产的，在南非找到这玩意并不比在南极找更难。\n\n太阳渐渐地向西偏移，下降。它发出的光芒将海水染得橙红一片，而它散发出的热却一点也不使席尔马赫厌烦。尽管他的衣服已经被汗水浸透了，但与他过去所经受的考验相比，南非的炎热气候连个烦心事都算不上。远在岸边的海鸟们盘旋啸叫着，为这幅夕阳海景增添了一丝宁静的氛围。游艇上的水手们恭敬地与两人保持着一定距离，只有必要的时候才会走上前来。此时此刻，南非仿佛成了德国在阳光下的平静小天地。\n\n“是啊，”席尔马赫想道，“我一点也没变。”"
 antarctica_aag_flavor.2.a:0 "不管怎么说，回到人类世界的感觉真好。"
 antarctica_aag_flavor.3.t:0 "重返讲坛"
 antarctica_aag_flavor.3.desc:0 "给赫尔曼寄来的邀请函上点缀着华丽的金箔压印：“赫尔曼先生，德国极地研究学会恳请您莅临不来梅港，就新施瓦本的科学和业务发展发表一系列演讲。”寄信人是德国极地研究学会主席阿尔弗雷德·里彻。他曾在德国南极考察队当过副手，自那以后四分之一个世纪的时间里，恩斯特再也没有见过里彻一面。一想到自己能够哪怕暂时回到学术研究界，看看不来梅这座美丽的城市，与老同事叙叙旧，再喝几口阿尔弗雷德最爱的白兰地，他就笑得合不拢嘴。\n\n坐在远程货运飞机的机组专供座椅上，赫尔曼的思绪从无穷无尽的演讲笔迹中脱离，飘向了远方。这段旅程的每一节都让他回想起了自己的过去：从新施瓦本到布宜诺斯艾利斯的这一段代表他计划退休的几年之前，他被迫离开了学生和教室，来到了席尔马赫站。布宜诺斯艾利斯到累西腓这一段则象征着二战结束之后，当时他只感觉到无尽空虚，是教书给他的生活重新带来了快乐。累西腓到都柏林这一段就像是两次世界大战之间的黄金时代。瑞士、瑞典、格陵兰、希腊——他与里彻共度了如此之长的冒险时光。至于都柏林到不来梅，它代表着第一次世界大战的恐惧，那段战壕时光光是想想就令他不寒而栗。直到攀上人生中登过的第一座山峰，他才成为一个完整的人，也才知道原来自己身体里还残留着一块弹片。\n\n赫尔曼在英吉利海峡上空的某个地方被喷气式发动机的低沉轰鸣声惊醒，这响动把他从过去拉回到了现在。透过舷窗，他看到了一架致命的Ho-229截击机的机翼。他敲了敲驾驶室的门，想要搞明白到底发生了什么事。但除了慌乱的无线电交谈声外，没有任何声音回应他。几分钟后，副驾驶来到了他面前，他的脸色苍白，好像一只幽灵。\n\n“元首遇刺了！”赫尔曼惊恐地与他对视着，“德国的领空已经全面封锁，我们必须调头了！”"
 antarctica_aag_flavor.3.a:0 "一路走来，却一无所获？"
 antarctica_aag_flavor.4.t:0 "沃坦号探险"
 antarctica_aag_flavor.4.desc:0 "当他被告知情况时，弗朗茨的神情流露出了一丝怀疑。他们让他中止边界巡逻任务，就为了去看一眼十年前的船，抢救那些可能根本就不存在的物资？即便如此，他还是尽力克制住了自己写满困惑的脸部肌肉。他们花了足足四天四夜才走到抛锚的地方。唯一值得庆幸的是，他带着一支已经被自己领导了一年零三个月的小队。而且这一次，他们还带着充足的补给。\n\n那些船像幽灵一样矗立在那里，弗朗茨不太明白这是因为灰色的油漆还是天气和时间的影响。天气每天都不一样，而他们没有多少时间了。还有几天，冰层就会融化，他们要做的就是在这段时间里在船上搜刮物资，直到冬去春来，冰层开裂。到那时，在冰上行走就和自杀没什么两样了。时间紧迫，他们必须有所取舍。\n\n只有一艘船的残骸能被确认，因为它有详细完整的记录：沃坦号于1944年在德国下水，即使在今天她仍然令人印象深刻。然而，这么一艘好船却在1954年因为船员的无能搁浅了。弗朗茨知道，虽然她看上去很新，但透过她那光鲜的外表，其内部结构搞不好已经四分五裂，摇摇欲坠了。\n\n小队没有浪费哪怕一秒时间，他们迅速从侧面登上了船只。这艘船的龙骨已经扭曲得不成样子了，每扇舱门都被卡在船体上。弗朗茨的小队费劲力气打开了一扇又一扇铁门，却一无所获，直到最后一间舱室的大门被撬开，这趟旅程仅有的一点小收获才映入他们眼帘：储藏室里满是不易腐坏的食品、医疗用品，还有衣物。当然，还有比它们更为珍贵，乃至于无价的东西：酒。"
 antarctica_aag_flavor.4.a:0 "看着这来自家乡的宝贝，弗朗茨笑了。"
 antarctica_aag_flavor.4.a.tt:0 "我们将获得§W2补给§! £Antarctica_texticon_SUP 。"
 antarctica_aag_flavor.5.t:0 "再来一艘"
 antarctica_aag_flavor.5.desc:0 "弗朗茨直视着紧贴远处群峦山顶的太阳。它散发出的光线与热量是如此微弱，甚至都不需要眯眼就可以直视。他在南极挨过了几辈子的冬天，仅凭感觉也能知道夏天马上就要来了。到时候，阳光很快会融化通往那些失事船只的冰层。这次出征，弗朗茨已经从沃坦号拉走了尽可能多的补给。现在，他已经没法带走更多了。\n\n他们只能再抢救一艘船上的物资，这就是极限了。他忍住了用手套清理掉眼睫毛上凝结的冰霜的冲动，那只会让冰霜结得更厚，只能忍住。再说，还有一艘船在等着呢。\n\n安东尼奥号是一艘意大利老船，下水时三头同盟还没成立。这艘船离岸边最近，最容易登上去。庞塞·德莱昂号是一艘所谓的“自由轮”，状态看上去还不错。最后是圣布伦丹号，三艘船中最新的一艘。尽管有消息说那里面已经没什么有用的东西了，但弗朗茨的上级似乎还是对这艘船很感兴趣。"
 antarctica_aag_flavor.5.a:0 "搜刮安东尼奥号。"
 antarctica_aag_flavor.5.b:0 "搜刮庞塞·德莱昂号。"
 antarctica_aag_flavor.5.c:0 "搜刮圣布伦丹号。"
 antarctica_aag_flavor.6.t:0 "安东尼奥号探险"
 antarctica_aag_flavor.6.desc:0 "这是一艘根据合同雇佣的意大利货船，作为报酬付给他们的德国马克多到得用车拉，足以让船员们在离开这世界端底，回到人类世界之后当上阔佬。这艘船来自一个美好的时代，那时德国还没有从地中海割下一磅肉来，但致使《钢铁条约》被撕毁的那场审判也快要开始了。\n\n幸运的是，在时间、钉子和斧头的帮助下，一座从冰面一直延伸到甲板，可供人通行的冰封桥梁出现了。弗朗茨的小队顺利地来到了前甲板的舱门前，铰链上的润滑油居然还没有冻成冰，随着吱呀的噪声，舱门被队员们拉开了。\n\n手电筒发出的温暖光束证明了他们先前的怀疑是正确的，船上一点物资也没有了。弗朗茨打算和他的队员们下到船舱里去看看，没走几步他们就发现了几具尸体。\n\n这怎么可能？一艘本该向德国的殖民地输送物资的，因事故被遗弃的意大利货船的船舱里有未被记录的死尸？不能这样，弗朗茨心想，这些人为了满足他们的需求，愿意走遍天涯海角，他们理应得到安葬。很快，他就把想法变为了命令。船员们的遗体被运出船舱，用毛毯裹好，小心地放进了雪橇里。"
 antarctica_aag_flavor.6.a:0 "终于，他们可以回家了。"
 antarctica_aag_flavor.6.a.tt:0 "我们将获得§G2宣称点数§!£Antarctica_texticon_LEG 。"
 antarctica_aag_flavor.7.t:0 "庞塞·德莱昂号探险"
 antarctica_aag_flavor.7.desc:0 "庞塞号是一艘美国赠予英国的自由轮。德国征服英国后，她又被德国新主子征用了去，即便超出使用年限至少五年后还在出航。这是一艘因二战而生的船只，建造得很匆忙，上面的铆钉已经蒙上了一层厚厚的、也许永远无法融化的冰。\n\n显然，前舱和船员宿舍的门也没有逃过被冰封的命运。队员们用撬棍敲了二十分钟的后舱门，发现它也被冻得结结实实。和他的参谋迅速交换了一下意见以后，弗朗茨让队员们在甲板上生火。两个小时过去，冻在前舱门铰链上的冰融化了，舱门随之打开。\n\n舱内空空如也。弗朗茨命令他的队员们更仔细地搜寻。不管怎么说，他不相信这里面会什么都没有。事实正如他所料，每个柜子里都放着焊接用品和硬木材，每个电缆主接点都有多余的保险丝盒。他不由得对这艘战时应急用船的合理而坚固的构造发出赞叹。\n\n对于弗朗茨小队的大多数队员来说，这是他们第一次看到美国货是什么样的，他们为此感到羞愧难当。就算美国人是种族层面上的堕落者，不可否认的是，他们对造船技术很在行。"
 antarctica_aag_flavor.7.a:0 "美国绝对不是一个可以低估的敌人。"
 antarctica_aag_flavor.7.a.tt:0 "我们将获得§R2军事点数§!£Antarctica_texticon_MIL 。"
 antarctica_aag_flavor.8.t:0 "圣布伦丹号探险"
 antarctica_aag_flavor.8.desc:0 "圣布伦丹号是被困在南极大陆的诸多船只中最新的一艘，这是一艘于战后下水的爱尔兰民用船只，像其他许多船只一样，她在50年代被征用，而且，像许多被征用的船只一样，她搁浅了。她本来还能再被用上许多年的，但她的主人显然认为把她从南极救出来“不划算”。\n\n这位圣徒找寻到了一片新大陆，只是，这片大陆不是她想要的那一个。根据记录，她是在一次简单的运输补给任务中搁浅的，所携带的最后一批货物几年前就被运到了新施瓦本。尽管如此，弗朗茨还是得奉命搜刮她。\n\n正如记录中所说的那样，所有舱门都被锁上了，不过这些锁都用防寒的润滑油精心处理过。他们只用了几分钟时间就进入了船舱，然后毫不意外地发现这艘船上的东西已经被打扫得一干二净，只剩下被随意地画在前甲板上的万字符，好像在嘲笑他们的徒劳无功。\n\n这里没有什么可以搜刮的东西，但弗朗茨隐约感到一丝不对劲。他迅速地在脑海中查找自己的回忆——在战前，德国国防军不是发表了一份指令，里面提到敏感的通信设备应当被全数销毁吗？除了德国人以外，应该没人会闲得蛋疼，跑到这艘船上来吧……\n\n他拿起了航行日志，这种不对劲的感觉来得越来越强烈。这上面的语调和口气让他感到十分熟悉，十分……诡秘。在抵达新施瓦本之前，这艘船一直在与爱尔兰总理本人直接联络。这些信息的内容毫无疑问是被加密过的，但国防部的人肯定能把它破译出来，也许这还会引起他们那身处德国本土的金主的兴致呢。"
 antarctica_aag_flavor.8.a:0 "元首本人会不会对这些“机密”通讯记录感兴趣也说不定呢。"
 antarctica_aag_flavor.8.a.tt:0 "对§QOFN南极洲事务局§!的§B情报掌握度§!将提高§B2§!£Antarctica_texticon_INTVAL "
 antarctica_aag_flavor.9.t:0 "拥挤之地"
 antarctica_aag_flavor.9.desc:0 "说这艘潜艇空间狭小算是客气的说辞，这根本就是一尊铁棺材。斯特凡凝视着冰冷的海底，时不时回过头瞟两眼雷达。他们的目的地是彼得一世岛，那里是新施瓦本最孤立的前哨，几乎就没有不缺补给的时候。卡尔正……“坐”在一旁，斯特凡无不自嘲地笑了。在这艘该死的袖珍潜艇里，他们连大气都快喘不上来了，哪里还有空间供他们两个舒舒服服地坐下？事实上，这两个人正躺在袖珍潜艇里，彼此间的距离近到可以看见对方呼出的水汽薄雾。\n\n起初，两人都不想打破这份宁静，但过了一会，卡尔开了口：“斯特凡，我记得你是支持施佩尔的自由派吧？”斯特凡转过身来，咆哮道：“你说啥呢，我和你一样忠于希特勒元首，忠于民族社会主义事业！不管他的继任者是谁，我都会像忠于希特勒一样效忠于他，我相信施佩尔是最好的选择并不意味着我是什么自由派，懂吗？”卡尔几乎绷不住了，“我没拿你开玩笑，斯特凡。这座科考站的每个人都知道你是个该死的亲犹分子，也知道你为什么会被扔到这破地方。”卡尔的语气很轻，嘴角也微微弯曲着。但从他那碧蓝色的瞳孔中，斯特凡没有看到哪怕一丝幽默或逗趣，而是死一般的严肃。\n\n“我就知道你会这么想，毕竟你就差把海德里希当祖宗供着了。你打心眼里觉得每一个不像你那样金发碧眼的人都应该被枪毙，我们也不能想方设法让德国延续千秋，而只应该屈从于过去的阴影，我说的对吧？”\n\n“我不会为自己自恃高人一等而道歉。”卡尔反驳道。“海德里希将给德意志带来积极的变化，并清除腐蚀德意志民族方方面面的溃烂之处。我们已经变得堕落了，而你深爱着的犹太猪猡再一次地渗透进了我们之中。”\n\n“阿尔伯特·施佩尔才是那个对德意志的未来抱有真正远见的人，他已经实现了元首的梦想，当他掌揽大权时，他将让祖国的面貌焕然一新。现在，你能不能闭上你那张破嘴，好让咱们把这些物资平平安安地送到那？”\n\n“随你怎么说吧，亲犹分子。”卡尔吐了吐舌头。"
 antarctica_aag_flavor.9.a:0 "听到这话，斯特凡用尽了全身力气才让自己没有气得喊出来。"
 antarctica_aag_flavor.10.t:0 "南极游记"
 antarctica_aag_flavor.10.desc:0 "安德烈亚斯被响亮的警报声从床上轰了起来。像往常一样，他嘟囔着从床铺上爬下来，让双脚站立在冰冷的金属地板上。自到达南极以来，他已经听过无数次警报的声响了。也许这是像上周那样的演习呢？还是鱼雷来袭的误报？这些对他来说都不重要。毕竟，每天都是一样的：起床，查看时间表，干活，吃饭，干活，然后回去睡觉，这就是潜艇上的生活，基本没什么波澜。他看了一眼任务表，欣喜地发现今天他负责放哨。\n\n这是他最喜欢的活，没有之一。他要做的就是一个人站在甲板上，用潜望镜眺望四周。在这里，弗里德里希那个吃饭吧唧嘴的家伙不会打搅到他；汉斯也不会喋喋不休地跟念叨自己的女友，顺便喂他一嘴狗粮；卡尔也不会用他那总是跑调的歌喉把他弄得抓狂。在这上面，只有他，以及一望无际的海洋。当然，还有另外一个原因使他喜欢干这个，那就是打盹。至今为止，他们没有发现任何一艘OFN或日本船只的踪迹，也许他们都不太敢大摇大摆地四处溜达，安德烈亚斯想道。这给了安德烈亚斯一段非常宝贵的时间，让他的大脑得以休息一番，顺便远离弗里德里希的鼾声。这并不是说安德烈亚斯擅离职守，他当然没有这么做。只是，也没什么可看的。到处都只有一片蔚蓝，偶尔会有一只海豚或一只鲸鱼腾空而起，仅此而已。如果安德烈亚斯是一名画家，他早就把这幅美景画下来了。\n\n但他不是画家。所以他环顾了几下，便闭上了眼睛，随即又猛地睁开了。此前他从未见过的，漂浮在海面上的巨大浮冰映入了他的眼帘。\n\n作为雅利安科学探索的先锋既是他们的责任，也是他们的权利。安德烈亚斯感到流淌在雷夫·埃里克森身上的血液此时此刻也流淌在他身上。同样的动力推动他们前进，同样的冲动促使他们去探索、征服并实现其命运。他注视着远处无垠的白色荒漠，激动之情无以言表。想必在埃里克森发现文兰时，他的心情也是如此吧？"
 antarctica_aag_flavor.10.a:0 "“看啊，企鹅！”"
 antarctica_aag_flavor.11.t:0 "血腥竞赛"
 antarctica_aag_flavor.11.desc:0 "在斯特凡滑过终点线的一刹那，被斯特凡落在后面的卡尔也立即从雪橇上跳了下来。卡尔有些面露愠色，毕竟他当了第二。他立即将身子转向斯特凡，嘴里骂骂咧咧，眼中充满怒火，拳头握成一团。斯特凡和卡尔紧张地四目相视，而其他人正忙着把狗从雪橇上解下来，对他们两个之间爆发的争吵毫不在意。这也难怪，毕竟他们事先约定好，谁赢了谁就能把对方未来一周的咖啡配给据为己有。在南极，这样的奖品比黄金更为珍贵。\n\n在其他人已经到一旁玩耍嬉闹的同时，斯特凡和卡尔的争吵仍未结束。两个人都直直地盯着对方的眼睛，试图让对方服软，但双方都没有达到目的。卡尔清了清嗓子，然后啐了一口。\n\n“你这个操蛋的作弊犹太狗杂种。”\n\n尽管南极天寒地冻，甚至让他的四肢生了冻疮，但斯特凡还是感到自己的每一根血管都在熊熊燃烧。愤怒、迷惑和恐惧在他的血管中流淌。卡尔是不是真的走了狗屎运了？也许他只是在用侮辱性的话语试图让他服软？还是说，他知道一些斯特凡想要保守一生的，只属于他一个人的秘密？\n\n他没有时间想出这些问题的答案。因为几乎就在同时，他的手攥成了拳头，红色的温热液体流得满手都是。卡尔站在他面前，双手紧紧捂着自己曾经的“完美雅利安鼻子”。他发出的嚎叫吸引了其他人，他们不无好奇地想看看这场冲突的结果。然后，他们便奔向了两人，试图把他们拉开，但已经太迟了。斯特凡已经证明了自己在武力上比卡尔更“优越”。"
 antarctica_aag_flavor.11.a:0 "胜利要以鲜血为代价。"
 antarctica_aag_flavor.12.t:0 "大撤离"
 antarctica_aag_flavor.12.desc:0 "起初，一声隆隆的巨响传来，它源于科考站房屋的地基之下，或者说，来自地狱深处。紧接着，灰尘从天花板上不停地抖落，精致的仪器也都被摔得粉碎。之后，在一次跨越南极海岸的例行飞行中，霍夫曼中尉终于从空中看到了注定无法被地面上的生灵注意到的东西：整座基地都在漂移，它所处的冰山似乎正在脱离南极大陆。没有时间可以浪费了，飞机的轮子还没着地，他就急匆匆地用无线电报告了这一情况。\n\n在疏散人员之前，先得尽可能地抢救设备。B-15号变电站存放着精密的磁性设备，它们是在德国本土制造的，价格十分昂贵，况且想再造一批出来还得花上几个月时间。一开始，他们试图把它们空运出去，但他们很快就发现这太冒险了。然后，他们试图用卡车把它们运出来，但是卡车的上下颠簸也有可能会损伤娇贵的设备。最后，他们决定使用最原始的方法——让队员们捧着仪器坐在雪橇上，然后连人带仪器一块儿用雪橇犬拉走。与此同时，承载着科考基地的冰山与南极大陆之间的裂缝仍在不断扩大。\n\n接下来被运出来的是物资和生活必需品。即使冒着凛冽的暴风雪与近乎下降到零的能见度，卡车车队仍勇往直前，发动机在寒冽中轰鸣，冰面上的裂纹和裂缝随着时间的推移越来越大，轰隆声也越来越响。\n\n终于，科考队员们收拾好铺盖，准备离开了。一些人上了飞机，大多数人上了卡车，还有一些人带着狗，它们也得撤离。在这个相对风和日丽的日子里，B-15基地被完全宣告废弃，只剩下周围的一堆凌乱的脚印、轮胎印和狗爪的痕迹。就在同一天，随着一声震耳欲聋的巨响，它所在的冰山完全崩塌，自由自在地在大洋中飘荡。谢天谢地，没有人员伤亡，损失也不算太大。"
 antarctica_aag_flavor.12.a:0 "当然，经济损失还是有的，恐怕德国政府又得掏一笔马克了。"
 antarctica_aag_flavor.13.t:0 "夜班"
 antarctica_aag_flavor.13.desc:0 "“所以，你要去哪里？回彼得堡吗？”\n\n“上帝啊，可别让我去彼得堡了，我都在南极待了这么长时间了，让我去非洲享受享受温暖的阳光吧。还有就是，有传言说俄罗斯的局势……不太稳定。我不想冒这个险。”\n\n两人在即将登上飞往世界各地，或者说，德国各地的飞机之前互相挥手告别。夏去冬来，冬季科考队员很快就会来接他们的班，他们可以去度假了。\n\n科考站比平时更加冷清了，因为冬季科考队员的数目只有夏季的一半。上级已经留意到了这一点，所以他们打算在今年冬天采取一些措施来鼓舞士气，整个席尔马赫站都为之欣喜不已。载满了夏季科考队员的船只和飞机离开了南极大陆，又有许多运输补给的船只到来，但大家都特别期盼一艘特殊的船。终于，在他们的耐心快要到达爆发的极限时，它来了。\n\n一个巨大的电影投影屏被安装在了营地外，随之一同被运来的还有一台同样巨大的放映机，许多来自日耳曼尼亚的新电影胶卷，以及一套歌剧院级别的扬声器组。其中，最能将它们利用到极致的一部电影无疑是莱妮·里芬斯塔尔编导的《意志的胜利》。\n\n于是乎，一个只属于南极人的新传统诞生了——每逢闲来无事时，科考队员们都会在欢声笑语中看上一场电影。上级领导们认为这有助于培养“雅利安民族精神”，但队员们可不在乎这些，他们只是喜欢这种其乐融融的感觉而已。他们几乎陶醉其中，甚至忘了自己正在地球上最寒冷的地方度过最漫长的，难熬的冬天。随着寒冷的加剧和物资供应的紧缩，一些人肯定会离开这里，但至少现在，他们可以将身心放松下来，好好享受一番。"
 antarctica_aag_flavor.13.a:0 "一个小时的娱乐能抵消掉几个星期的苦痛。"
 antarctica_aag_flavor.14.t:0 "电影之夜"
 antarctica_aag_flavor.14.desc:0 "当第一艘船从德国抵达时，整个席尔马赫站都被兴奋感所笼罩：船上载满了船员、物资和日耳曼尼亚愿意为这座矗立于文明世界之外的科考站提供的最新技术。在接下来的几周里，夏季科考队员陆续到来，冬季科考队员则纷纷离开，这引起了一阵骚动。在这种混乱的窘境下，科考站为数不多的常驻人员几乎无所事事，与之相应的，许多部门却出现了暂时的人手不足。\n\n赫斯特就是常驻人员之一，他的工作是打理科考站的一座旧储藏室。这位年轻的工程师起初惊讶于这么老的建筑里居然没什么有意思的老古董，他能找到的东西基本不是生锈的工具就是旧得不行的制服，直到他偶然间发现了一个普通到不能再普通的木箱。在里面，他发现了一大堆卷起来的电影胶卷，好像是在很久以前被谁放起来了。印在上面的日期从30年代到1955年都有，其中一卷却没有标签，而且长度明显比其他的要短。\n\n几个小时后，赫斯特来到了最近才被立起来的电影屏幕旁，与其他几名常驻人员一同挤在一个小得多的屏幕周围，目的是确保这些电影仍旧可以被正常播放，给上级领导们偶尔举办的电影之夜活动换换口味。很快，他们发现这些胶卷里储存的是来自世界其他地方的新闻片和电影，其中的画面让他们感到一种前所未有的宁静与舒适，尽管这些胶卷是违禁品。\n\n就这样，这一小群南极人用观看违禁的老电影打发他们长得要死的闲暇时光，顺便等待夏季的来临。"
 antarctica_aag_flavor.14.a:0 "值得铭记的夜晚。"
 antarctica_aag_flavor.15.t:0 "风暴眼之夜"
 antarctica_aag_flavor.15.desc:0 "赫斯特和他的同伴们经历了长达一个星期的艰难时光。由于最近从德国本土运来的食物和生活用品的数量没有以前多，营地的气氛变得十分沉闷。之后，军队与以学生为首的抗议者在日耳曼尼亚对峙的消息导致几名科考站警卫、一些倾向改革的工程师和科学家以及一名非常保守的军官之间爆发了一场小争吵。最后，一间供科考队员居住的宿舍的暖气坏了，其他宿舍因此拥挤不堪，工程队的人则骂骂咧咧地前去抢修。所有这些都是在夏季队员离开期间发生的，冬季队员的到来只让局面雪上加霜。\n\n现在，这群南极人发现周末成了他们唯一的慰藉，只有在周末，他们才得以暂时从繁杂的工作中脱身，享受彼此的陪伴。\n\n赫斯特与他的同伴们聚集在一起，围着那块已经不被他们当成什么新奇东西的放映屏幕，观看他找到的神秘木箱中的最后一盘磁带。随着这卷短到不行的胶卷在放映机中发出微小的呼呼声，所有人都安静了下来。到现在为止，这些胶卷里装的都是些好莱坞电影、英国新闻片以及他们再熟悉不过德国老电影。然而，这一卷却与它们迥然相异。影片中，这满满一盒子电影胶卷的前主人对席尔马赫站的每个角落都拍摄了一遍，以此作为他对其居民和这片土地的告别。\n\n这群人彻夜未眠，欢笑着，回忆着，品味着早已被他们习以为常的一切。"
 antarctica_aag_flavor.15.a:0 "看在白兰地的份上，估计没几个人能记得这个夜晚。"
 antarctica_aag_flavor.16.t:0 "失踪的巡逻队"
 antarctica_aag_flavor.16.desc:0 "经过改良以适应雪地的履带拖拉机奔驰了整整一天，一行人才把失踪巡逻队员的遗体找到。他们最近对这台拖拉机进行了魔改，使其燃料利用率大大提高，让他们有能力进行这样的救援行动。拖拉机最终停在了失踪队员的安息之处旁，弗雷德里克博士和瓦格纳中尉下了车，看向一辆同一型号的拖拉机和被冻在里面的可怜灵魂。\n\n“关于这里发生的事，你有什么头绪吗？”瓦格纳问道。\n\n“还不能确定，”弗雷德里克答道，“没有弹孔，意味着这里没发生过战斗。”弗雷德里克指了指这台走丢的拖拉机的侧门，“帮我把这玩意打开。”弗雷德里克回到了车上，享受着拖拉机内的温暖，而瓦格纳和他手底下的队员们正试图把门撬开。在白费了二十分钟的力气之后，瓦格纳窝着一肚子的火打碎了窗玻璃，从里面爬了进去。\n\n“别他妈把我们扔在这受冻了，弗雷德里克，我们把这该死的门打开了！”听到这话，弗雷德里克离开了那辆温暖得让人发晕的拖拉机，然后爬进了几乎一模一样，但却被冻得动弹不得的另一辆。太阳已经下山了，温度又下降了十度。\n\n“博士，我不明白，他们带的防冻液应该够的啊，那他们的拖拉机咋还冻上走不了了？”弗雷德里克拿起了一只标记着“防冻液”的罐子，拧开了它，然后把它倒了过来，防冻液一股脑流进了雪地里。“也许我们应该检查一下引擎，”弗雷德里克建议道。所幸引擎盖没被冻上，他们轻而易举地打开了它。\n\n“该死的，”瓦格纳说道，“汽油冻上了，他们是中途熄火了吗？”弗雷德里克摇了摇头，思索着什么。“不，他们没有。为了节省燃料，拖拉机上被加装了一个阀门，以减少怠速时消耗的防冻液，这使得发动机温度降低，让汽油得以冻结。”"
 antarctica_aag_flavor.16.a:0 "就在这时，一行人突然听不到他们的拖拉机发出的，熟悉的嗡嗡声了。"
 antarctica_aag_flavor.17.t:0 "深入挖掘"
 antarctica_aag_flavor.17.desc:0 "保罗从没背过这么轻的背包。第一个被他丢掉的东西是夜视镜，它正静静地躺在离他现在所处的位置足足二十公里的地方，娇贵的电池与电路系统短短几分钟就被极度的寒冷所毁坏。十公里外，他丢掉了清洁武器用的工具，润滑剂瞬间凝固，变得如同橡皮泥一般。在又走了五公里之后，他抛弃了自己的望远镜，这件他已故的父亲送与他的礼物如今却变成了沉重的累赘。终于，他所在的小队停了下来，保罗迫不及待地把自己的背包丢到了雪地上，但他并未感到如释重负。疲惫已经渗入了他的骨髓，在里面安了家。就算这样，他也歇不了几分钟，那本用东线战场烈士的汗水与鲜血写成的战地手册里明明白白地写着，在交战的间隙士兵们要抓紧时间挖散兵坑，每个掩体之间保持五米左右距离。保罗小心翼翼地叹了口气，以便减少水分的流失，随后掏出了家伙什儿，面朝雪地背朝天地开始挖坑。\n\n坚硬的冰层粘在岩石上，发出唰唰的噪声。挖掘工作的进展慢得令人抓狂，而保罗几乎已经虚脱了，甚至不确定自己余下的力气够不够再挖一铲子。他充满嫉妒的眼神扫过位于自己两边数米距离的，柔软而容易挖掘的新雪，随后咒骂着向踱来踱去的士官汇报了这一情况。\n\n“这是规定，散兵坑之间间隔五米。”这位白发苍苍，像是参加过普法战争一样的中士吐了口气。保罗的声音伴随着绝望的情绪逐渐升高，他知道自己根本没法在坚硬的冰层和冻土这里挖散兵坑，也知道不服从命令的代价是明天一整天除了硬饼干吃不到别的东西。\n\n“我再说一遍！这地方没法挖阵地！因为这底下是他妈的冰！”听到这话，士官的目光冰冷了起来，他走近了几步，眼神直勾勾地盯着保罗，用柔和而充满杀气的语调说道："
 antarctica_aag_flavor.17.a:0 "“你听不懂德国话吗？每个散兵坑间隔五米。”"
 antarctica_aag_flavor.18.t:0 "塑造品格的五个阶段"
 antarctica_aag_flavor.18.desc:0 "“额……他们不会真的让我们光用铁锹干这事……吧？”保罗想着，用脚压着铲子把它往冰层深处压，试图挖出一大块冰，而不是刮走表面薄薄一层。“他们很可能只是在磨炼我这个新兵蛋子，德国肯定有能在几分钟之内就把这活干完的机器。”然而，实际情况是保罗足足挖了八个小时的坑，才带着最后几口气加入了为新兵们准备的入伍扑克游戏。“累够呛吧？”马丁问道，“小菜一碟。”保罗死要面子，但他的身体可不会骗人。马丁和其他人交换了一下眼神，似乎是达成了什么共识。\n\n第二天，保罗呻吟着从床上滚了下来，他感觉自己的后背充满了淤血。他手上的老茧还不算太厚，即便如此，他每活动一下双手，那干燥不堪的指关节上就会多出一条粉红色的裂口。他充满愤恨地盯着自己的铁锹，知道接下来的八个小时将会如同地狱一般充满痛苦与绝望。“第二天往往是最艰难的时候。”马丁看着几乎是爬到扑克牌桌上的保罗，狡黠地说道。保罗强忍着，差点没把马丁的祖宗八代挨个问候一遍。\n\n只要思想不滑坡，办法总比困难多。第三天，保罗起床时仍旧痛苦不堪，但他的脑海却被无数的想法所占据。问题出在，他想出的所有办法都不奏效：用火烧只会造出一层更坚固的冰，他从一名科考队员那里借来的十字镐则只能刨出几个洞，至于用开水？那只会让情况变得更糟。事实证明，没别的办法，只能用铁锹。当天晚上，保罗带着痛苦的身体与思绪婉拒了邀请他一起打牌的战友，独自一人在床上苦恼，因为他知道接下来的几天会多么煎熬。\n\n第四天十分漫长，保罗拼尽全力地干活，就为了给自己多争取一些晚上的休息时间。但当他走近扑克牌桌时，情况发生了变化。马丁看到了他，微笑着对他打了个手势，示意他坐下。“我们在玩德州扑克，五张河牌，三马克盲注。”他一边说着，一边给保罗的手上药。“而且，为了让这场牌局更刺激点，赢家可以一个星期不干清雪的活。”保罗看着自己手上的伤痕，贪婪地笑了。"
 antarctica_aag_flavor.18.a:0 "“我想，我开始明白这里的规矩了。”"
 antarctica_aag_flavor.19.t:0 ""
 antarctica_aag_flavor.19.desc:0 ""
 antarctica_aag_flavor.19.a:0 ""
 antarctica_aag_flavor.20.t:0 "延期的会面"
 antarctica_aag_flavor.20.desc:0 "恩斯特·赫尔曼从出租车里爬出来，走进德国极地研究学会。他有时候觉得他这辈子就是挤在一个又一个飞机座位里。对元首的未遂刺杀后，他从温得和克飞往汉堡的航班变成了一场灾难。从被拒绝进入德国领空开始，赫尔曼的飞机不得不在伦敦的破旧机场停靠。航班随后途径奥斯陆、哥本哈根，甚至飞过了布拉格，最后才抵达了目的地慕尼黑。\n\n赫尔曼的厚厚眼袋足够说明这整个故事了，现在坐在赫尔曼对面的里彻只能请他喝一杯，聊表同情。不过显然，里彻是没办法在当下的混乱中买到白兰地的。这瓶白兰地，确切的说，是赫尔曼带过来的。“这场讲座……”里彻俯下身，放低声音，“显然已经取消了。在元首生命垂危的时候，没人想听企鹅的故事。”\n\n“经过这次旅行，这些对我来说已经不算什么了。”赫尔曼接着补充道，“好歹我还有一个向你直接传达我们糟糕处境的机会。我们补给非常紧缺。你该知道我们说需要汽油不是个玩笑吧？还有食物，还有阿司匹林……”\n\n“知道这些真让我难受。有句话我早想和你们说了，但阿勃维尔机构会仔细检查我写的每个标点符号。德国的官僚习气简直让人窒息，恩斯特。我真想和你，和里夏德，还有鲁道夫在一起，而不是坐在这里，收到一个又一个请求却什么都满足不了。”\n\n赫尔曼眯起眼睛。“事态已经恶化到如此田地了，是吧？”"
 antarctica_aag_flavor.20.a:0 "“比你能想到的任何情况都糟的多。”"
 antarctica_aag_flavor.21.t:0 "收音机"
 antarctica_aag_flavor.21.desc:0 "小小的收音机响了起来，德国的官方宣传喷涌而出。斯特凡带着陈旧又不舒服的耳机，不情愿地听着有关清除犹太老鼠和其他堕落者的呼吁。从那个家伙对海德里希的不断夸赞来看，他大抵是个党卫队成员。想都不用想，卡尔肯定喜欢死这些东西了。\n\n斯特凡绝不会告诉卡尔（或者其他任何人）无线电的事。他之所以只能在这个不恰当的时间缩在被窝里戴着耳机调低音量听音乐是有原因的。斯特凡想要的绝对不是这些狗屁宣传，他想要听新闻，真正的新闻，还有能让人共鸣的音乐。\n\n在一片漆黑中看清那堆旋钮和按钮并非易事，但斯特凡对于此事已经烂熟于心了。很快，他就连上了麦克默多电台。斯特凡不怎么懂英语，但为了音乐，陌生的语言也算不得什么。卡尔肯定会嘲笑这种“堕落的”音乐，但斯特凡可不在乎。他爱它们。就算只有短短几分钟，他也能忘记自己还身陷这个寒冰地狱，放任自己沉浸到音乐中去。\n\n那些新闻片段也带给斯特凡不一样的体验。虽然他只能偶尔听懂几句话，大部分时间都完全听不懂，但说话人那种舒缓而富有异国情调的声音能提醒他德国主宰的世界并非是世界的全部。澳大利亚人？还是美国人？不管怎样，这些声音都揭示出斯特凡身处的冰冷金属监牢之外，还有一个没有畏缩在万字旗下的世界。\n\n斯特凡每次都很小心不要在听收音机时睡着。他不知道如果这件事情暴露，其他人会怎么对他，但毫无疑问，不管对他还是对收音机，结局都不会太好。"
 antarctica_aag_flavor.21.a:0 "他决然地关掉收音机，把它放回了掩蔽处。"
 antarctica_aag_flavor.22.t:0 "吾非楷模"
 antarctica_aag_flavor.22.desc:0 "事态的发展犹如一场旋风，更准确地说，是暴风雪。起初是德国传来的新闻：元首不幸辞世了，虽然他选定了一位继承人，但依然爆发了一些……权力斗争。紧接着，本土的消息犹如大雪崩前的雪花片般接踵而至：补给品减半，再减半！最后完全断供了！资金链完全断裂，人员也不轮值了。\n\n无论传来的消息有多坏，斯特凡觉得，有总比没有好；自从失去外界的消息后，他感到天都快塌下来了。要是能知晓外面有多烂，至少他还能在某一瞬间假装自己与外部世界是一体的，在一切陷入冰冷的死寂后，斯特凡生怕自己被逼疯。他不知道谁在赢得德国的大权，也许是他青睐的施佩尔？又或者是如同他的梦魇般的海德里希？操，要是OFN或者共荣圈介入的话，世界早就陷入核战的烈火了，若真是如此，他反倒会心存几分庆幸。\n\n斯特凡把视线从备忘录移开，抬头看向别处。香烟配给量又要降低了，这次已经是原来的八分之一。再这样下去，压根不够基地里的人塞牙缝了，到时候就会有人打架、偷烟，然后受伤。斯特凡仔细回想着他是怎么沦落到这冰雪地狱的：那时候，自己觉得这样挺好，他喜欢严寒，也喜欢企鹅。最重要的是，他觉得来到这片冰封大陆后就能免遭党卫队的监视，免得被查族谱。那帮家伙可能会觉得斯特凡的血统更接近克里斯托弗·哥伦布，而不是利夫·埃里克松。斯特凡抬起头来，心变得如钢铁般坚硬，倒不如说被冻成了冰。他不是埃里克松，也不是雅利安探险家，他活着绝不是为了给同胞心里的虚无缥缈的自豪感争光。"
 antarctica_aag_flavor.22.a:0 "他下定了决心。"
 antarctica_aag_flavor.23.t:0 "潜艇水兵"
 antarctica_aag_flavor.23.desc:0 "斯特凡的脑子里一直有逃跑的念头。虽说除了那些只会低头干活的老古板之外，每个人基本都有过这种想法，但现在，德国和她的南极领地都已大难临头，是时候化自己的想法为行动了。深夜，室友都已入睡，斯特凡蹑手蹑脚地走出房间，他身上只带了大衣、手套、全套防寒装备、鲁格配枪和子弹、可靠的电台、自己吃剩下的配给，以及一些从卡尔那里“借”来的必需品（当然，不是全部）。漆黑的基地里一片寂静，为了省电灯也没开，平常在岗位上忙碌的科学家或守卫也和其他人一样都去睡觉了。斯特凡走到之前和卡尔一起去取补给时乘坐的那艘袖珍潜水艇旁，悄悄准备出航。事实上，他也不知道自己该去哪。智利理论上来说是中立国，大概可以去；跑去OFN在南极的地盘碰碰运气碰碰运气也不是不可以，毕竟自己能给他们提供不少情报。斯特凡早已把保密之类的玩意儿抛诸脑后，他现在唯一想做的就是离开这个基地。\n\n“你这个该死的犹太佬。”熟悉的语气打破了这片死寂，声音犹如玻璃炸碎一般刺耳。卡尔站在过道上，手中的枪直挺挺抵着斯特凡的脑袋：“我早该料想到的，你就是个下流的叛徒，肮脏的犹太佬，我第一次登上这艘潜水艇的时候就该杀了你。”\n\n“卡尔，如果你觉得这里有谁能活下来的话，那你就失心疯了。德国已化为一片火海，我们都他妈要死了。”斯特凡压低声音回答道。\n\n“我就算死，也是一个为人民牺牲的雅利安人。我才不会像过街老鼠一样拼了命要跑路。我不会死的像个堕落者、像个该死的肮脏犹太佬一样。现在，如果你乖乖配合，最高指挥部或许会考虑留你一命。”"
 antarctica_aag_flavor.23.a:0 "斯特凡抬起头来。"
 antarctica_aag_flavor.24.t:0 "当代哥伦布"
 antarctica_aag_flavor.24.desc:0 "“你我都清楚，我不会跟你回去的，也知道上头肯定不会饶我一条小命，毕竟你早就发现我的秘密了。我倒挺惊讶你没逢人就说。”\n\n“让基地里所有人都知道你是个肮脏的犹太佬？就这么用掉我自己手里的唯一一张王牌？才怪。我确实会这么做，不过等到我告诉他们的时候，你对我已经没用了。想必你那个犹太婊子妈被你那腐败堕落的爹无套轰入一顿后就毫无用处可言，然后就被弃之不顾了。”卡尔转过身去，示意斯特凡跟上。\n\n斯特凡旋即拔出手枪，在卡尔反应过来之前就对着他的头扣下了扳机。转瞬间，喷溅而出的鲜血盖住了卡尔的金发，斯特凡也意识到自己做了些什么。枪声在狭窄铁皮房间里回响着，好在潜艇码头离营地够远，没有吵醒任何人。随后，斯特凡加快速度，备好潜艇准备出航。\n\n斯特凡思绪万千，希望着这是最后一次进到这艘袖珍潜水艇里。打开引擎和必需的加热系统后，他幡然醒悟，自己从来就没能真的成为列夫·埃里克松、从来都不是一个雅利安人，而一直是个克里斯托弗·哥伦布，一个阴谋家、犹太人、骗子。斯特凡竭尽全力想要服务德国，否定自己的血脉，但他没能成功，同时再也不能这么做了。潜艇无声地开出基地，斯特凡将右手食指、中指、无名指紧贴脸庞，做了一件从没做过，但目睹母亲做过无数次的事情：祷告。他祈祷上天的宽恕，祈祷能安全抵达……"
 antarctica_aag_flavor.24.a:0 "……OFN南极洲事务局。"
 antarctica_aag_flavor.24.b:0 "……阿根廷。"
 antarctica_aag_flavor.24.c:0 "……智利。"
 antarctica_aag_division.10.t:0 "寒暄与握手"
 antarctica_aag_division.10.desc:0 "汉斯·德根中将踏上了施佩伯爵港，人生中第二次感受着南极的风吹过脸颊。在北极圈内和俄罗斯军队缠斗了数年，寒冷对于德根已是家常便饭。但南极不一样。这里的风中空气中都饱含着敌意，这片大陆似要对胆敢踏足其上的人泄以怒火。\n\n“汉斯。”一声呼唤让德根从思索中回过神来。安东·格拉塞尔，新施瓦本驻军队长，来到了他身边。他差点没认出来格拉塞尔，上一次见面还是在西俄战争中的一场军官晚宴中。\n\n“你看起来真憔悴啊，安东。”德根边和格拉塞尔握手边说道。\n\n“等你事情完妥之后，也差不了多少。”格拉塞尔看向踏板，“那是佐恩少将吗？”\n\n“嗯，”德根回答的同时向走过来的人挥了挥手。“爱德华，这位是安东。他就是你和迈尔以及空军之中的联络人。”\n\n佐恩与安东握了握手：“第二师的人怎么样了？”\n\n“我可不觉得奥地利的阿尔卑斯山能和这里相比，”安东咯咯笑道，“德根，也许经过漫长旅途后，人们需要短暂休息下。先让他们熟悉下席尔马赫站还有这个……”他指了指身后的冰天雪地。"
 antarctica_aag_division.10.a:0 "短暂的休息对身体有益，但也别让他们忘记了接下来的训练。"
 antarctica_aag_division.10.b:0 "时间紧任务重，我们落后的话就会给敌人可乘之机。"
 antarctica_aag_division.20.t:0 "极地战术"
 antarctica_aag_division.20.desc:0 "第二山地师的指挥官们与安东·格拉塞尔在席尔马赫站的军官食堂内共进晚餐。一杯杯红酒下肚，一块块红肉贪婪地吞下的同时，三人需要敲定师团的训练计划。\n\n德根嘴里塞满了肉，说道：“据我以往在南极和北极的经验来看，在宽广的土地上，优先追求速度与机动是行动成功的关键。笨拙缓慢只会让我们被包围，被生吞活剥。”\n\n“恕难苟同，”格拉塞尔说道。“在过去几年与美国人的多场小规模冲突中，我们孤立无援的部队靠着防御工事和平常的训练坚守阵地。你所说的那种距离直接就排除了快速机动的可能性，更何况，这儿还有风暴。必要情况下，我们的基地要能承受数周的围攻。”\n\n“只要有进攻性的火力，”佐恩说，“就不需要坚守，就可以直接与敌人交战。我觉得我们需要调研一下进行榴弹炮这样的重型武器的冰上使用与运输训练的可行性。”\n\n最终，德根才是敲定方案的人，但他也不会忽视同僚们的建议。"
 antarctica_aag_division.20.a:0 "我还是倾向于机动作战，哪怕是在这地狱之中。"
 antarctica_aag_division.20.b:0 "我认同你的看法，格拉塞尔，我们就优先于防御训练。"
 antarctica_aag_division.20.c:0 "如果我们能想办法运输火炮，我们就能给轻装简从的敌人来个大惊喜……"
 antarctica_aag_division.30.t:0 "离去"
 antarctica_aag_division.30.desc:0 "阿尔弗雷德·科塔斯船长送汉斯·德根穿过凛冽的寒风前往施佩伯爵港。德根要回祖国去了，第二师就留给能干的副手爱德华·佐恩照管了。德根抬头看了看施瓦本二号，这是一艘大载量的运输舰，就是为应对极地航行各个方面的考验而诞生的。\n\n“这是艘好船，中将，”科塔斯说，“这趟旅程要比你来时平稳多了。我亲自监工造的，她很适合继承这一名讳。”\n\n德根精通新施瓦本的历史，1935年时，迈尔、席尔马赫和科塔斯都为祖国的南极宣称出了力。他也知道折磨殖民者的饥饿与疾病的事情，他不想让他引以为豪的第二山地师遭遇同样的命运。“那么，你能保证物资补给线安然无恙？”\n\n“当然了，不过……”科塔斯竖起手指，“我只能保证多余的物资可以用于师团的训练或者前线驻军的维持。既然这是你最后下令的机会了，所以我就陪着你去码头，当面接受你的命令。你也知道佐恩会毫不犹豫地把命令贯彻到师团之中，但我们这里的行动可远远不止训练部队这一项。”"
 antarctica_aag_division.30.a:0 "第二师永远都是我的第一事项，我需要他们精神抖擞地工作。把多余的物资给他们吧。"
 antarctica_aag_division.30.b:0 "我们对新施瓦本的所有部队负有责任，前线被敌人夺取的话，第二师还能去哪儿训练。"
 antarctica_aag_division.30.b.tt:0 "我们将获得§R6军事点数§!£Antarctica_texticon_MIL 、§G6宣称点数§!£Antarctica_texticon_LEG 和§W12补给§!£Antarctica_texticon_SUP 。"
 antarctica_aag_division.40.t:0 "破开冻土"
 antarctica_aag_division.40.desc:0 "用铁锹和镐头敲了三个小时冰冻地面后，五名士兵只凿出了一个能容纳他们自己的小散兵坑。\n\n“先歇会，”卡尔·冯·科斯库尔少尉说道，“德波尔，5分钟后通知我。”\n\n费利克斯·德波尔上士点了点头，看了看表，然后把目光投向地平线，观察着动静。\n\n“我以为这种工作都是给该死的斯拉夫人做的，”曼弗雷德·克鲁格抱怨道。\n\n“培养性格，”威尔弗雷德·瓦格纳开玩笑地说道，“你爸爸难道没有告诉你这些就头也不回地走了？”瓦格纳停顿了一下，转向“阿蒂”比约恩·拉尔森，“抱歉，阿蒂，刚才说顺嘴了，我不是故意……”\n\n“没关系，”拉尔森打断了他的话，“别多想。”\n\n“还有两分钟，”德波尔沉默了一会儿后说道。\n\n“嘿，我们什么时候才能离开这个冰窟窿呢，科斯库尔少尉？”拉尔森问道。\n\n“如果每个人都各尽其职，那你会在这里待到退役，”卡尔答道，“拉尔森，你是想家了吧。”\n\n“嗯，”拉尔森回答说，“唯一的问题是我超他妈的讨厌挪威。”拉尔森的话引得德波尔和其他人哄然大笑。\n\n“到时间了，”德波尔打断了谈话，“现在怎么办，少尉？”科斯库尔顿了顿然后才回复道："
 antarctica_aag_division.40.a:0 "“我们向前半里，再挖个洞，这次要快点。”"
 antarctica_aag_division.40.b:0 "“我们把这个洞挖得再大点再深点。”"
 antarctica_aag_division.50.t:0 "山脊之上"
 antarctica_aag_division.50.desc:0 "德波尔上士一如既往地第一个登顶。顶着暴风雪，摸着黑暗，带着G3步枪上夜视镜的额外重量，他在五分钟之内爬上了100米高的悬崖。就算到顶后，他也没有去休息，而是立马着手在冰面上挖起了堑壕。在山顶建好足够遮身的屏障后，他开始检查四周，寻找“敌人”的踪迹。其他队员爬上来时，德波尔已经在山谷中发现了一座“敌人”营地。\n\n“前有敌人，关上灯。”\n\n“让我看看，”科斯库尔边说边透过德波尔的夜视镜看去。“那绝对是个派克瑞特冰屋，你有看到人进出吗？”\n\n“没，不过我猜，里面大约有三四个‘德国人’。”\n\n瓦格纳笑出了声，“我一直记不住我们在这场训练中扮演的原来是美国人。”\n\n“美国人不好扮，”克鲁格开口了，“我们没人有劣等人血统，怪不得记不住呢。”\n\n“闭嘴，”科斯库尔下令道，这不是因为他怕被“德国人”听到，而是他不想听克鲁格讲话，“德波尔，你已经找到路了吧。”\n\n德波尔指向左边，手指对着山脊：“我们可以沿着山脊走，避开所有的敌人，但地形会非常绕。”科斯库尔想了会儿，然后决定了下一步的行动方案……"
 antarctica_aag_division.50.a:0 "“沿着山脊走，避开冰屋。”"
 antarctica_aag_division.50.b:0 "“我们直接下山，攻击敌人。”"
 antarctica_aag_division.60.t:0 "元首终有一死"
 antarctica_aag_division.60.desc:0 "“真高兴，所有的冬季训练都过去了，”瓦格纳说道，“我的背再也经不起远程拉练折腾了……”\n\n“同感，”拉尔森应和道，“我受够这温度了。真希望元首过世的时候我们能……”\n\n“等等，你刚刚说了什么？”克鲁格打断了拉尔森。\n\n“呃，”拉尔森试探性回答道，“我的意思是也许管理层的变动能让我们早点离开这里……”\n\n“早在那之前，你就该被清退了，元首不可能这么快就去世……”克鲁格越说越激动。\n\n“他指定了继任者，”拉尔森指出了这一事实，而瓦格纳还在忙着手上的活计，希望能在两外两个人彻底吵起来之前把事情做完，“看起来就像是把一切都安排好，免得……”\n\n“闭嘴！”克鲁格爆发了，“你要是再说下去，我保证元首活得比你久。”\n\n“别激动，曼弗雷德，”拉尔森试图平息局势，“我们都是忠诚的民族社会主义者，只是……”\n\n“元首就该把你们这些货色都毫不留情地干掉。”\n\n拉尔森无限的耐心就此耗尽：“好啊，我们就来看看是谁不留情面，希特勒要把你的勋章钉在棺材上，你……”\n\n“都给我闭嘴！”德波尔走了进来，带着少见的怒气大喊，“你们几个狗娘养的算走运了，科斯库尔少尉这会儿不在，否则他肯定会把你们以煽动叛乱的罪名关起来。现在……”"
 antarctica_aag_division.60.a:0 "“所有人都去整理储藏室，快！”"
 antarctica_aag_division.60.b:0 "“你们的假期时间都得给我去研究这片废土的地图去。”"
 antarctica_aag_division.70.t:0 "船舰和飞机"
 antarctica_aag_division.70.desc:0 "爱德华·佐恩和科塔斯船长一起坐在自己的办公室里，尽力不让杜松子酒洒到两人之间桌子上的后勤文件上。这些纸页上详细记录着席尔马赫手上供给师团使用的物资细目。虽然在科塔斯和他的船的努力下，弹药与食物已经不缺了，但却对燃油无可奈何，这也成了制约南极任何行动的最大因素。\n\n“我们储备有限，爱德华，你必须决定，是把它们给我这些已经证明了自己价值的船，还是……”\n\n这时，弗朗茨·普罗伊朔夫走进了房间，他是迈尔在汉莎航空的老朋友，和科塔斯一样，他也参加了第三次南极探险。“你是想把燃料据为己有吗，阿尔弗雷德？”普罗伊朔夫带着神气的笑容说道。“我们都知道，现代战场上胜利的关键是制空权，而只要有燃料，我就能拿下它。爱德华，虽然我们这里的飞机不多，但也能给那些楚楚可怜的对手造成毁灭性打击。”\n\n“或者，”科塔斯说，“我的船有了燃料，就可以运来大量的物资，供师团使用。”\n\n爱德华站了起来，“先生们，你们说的都很有道理，但我已经有了决定……”"
 antarctica_aag_division.70.a:0 "“大量的物资本身就是种战场优势，燃料给科塔斯了。”"
 antarctica_aag_division.70.b:0 "“近空支援现在是，将来也会是现在战争的决定性因素。弗朗茨，燃料归你了。”"
 antarctica_aag_division.80.t:0 "防御态势"
 antarctica_aag_division.80.desc:0 "佐恩拿着一副防冰望远镜观察远方，望远镜的镜片在镜筒边缘缩成狭缝，用来防止太阳眩光。他看到地平线上两个小点在移动，还有两面旗帜迎风飘扬，分别是自由国家组织和其老大美国的旗帜。\n\n“守住这漫长的边界，”雪沟里佐恩旁的格拉塞尔说道，“自建站以来就是个挑战。我们还没有打过仗，但总有散兵游勇不停骚扰我们。”\n\n佐恩放下望远镜，“希望今天过后，我们可以确保，战争爆发时，我军会做好充分准备。”\n\n“但到底是哪种形式的准备还得你说了算，爱德华。”两位军官走下护墙，沿着防线走去。“依我来看，”格拉塞尔说，“在第二山地师对美军的防御态势上，我们有两种选择。选择一：确保我们的前沿阵地有足够的物资和人力，即使在被包围的情况下也能坚守下来，我们也会进行这方面的特训。选择二：确保我们的后方梯队有着必要的安全与速度，能在整个进攻过程中保证前沿阵地的供应。”\n\n“不管怎么选，这不只会影响到我们南极部队的构成，也会影响到师团本身，无论他在何方作战，”佐恩说。\n\n“这个选择，可以是为了应付最糟糕的情况，还可以是防止最糟糕的情况发生。”"
 antarctica_aag_division.80.a:0 "“应付最糟糕的情况从不会是个坏主意。确保他们不管面对什么，都要坚守阵地。”"
 antarctica_aag_division.80.b:0 "“我不会指挥我们的人陷入包围之中。弄好后方，让我们的人能拿到胜利所需的东西。”"
 antarctica_aag_division.90.t:0 "抄作业"
 antarctica_aag_division.90.desc:0 "“坐下吧，拉尔森，”科斯库尔少尉坐在乱得令人发指的办公桌的一侧，指着桌子前面的椅子说道，德波尔上士靠在科斯库尔旁边的墙上。“我想理清一下事情，”科斯库尔开始了，“首先，不管你怎么想，陆军都知道了，除了你用哪只手擦屁股以外。我们知道，你母亲并没有像你之前说的那样在58年把你带你去了汉堡，因为她在57年就去世了，你之所以会在汉堡，是因为你想乘一艘货轮偷渡到非洲，然后在汉堡被人发现，并被拉去做社会服务。”拉尔森咬紧了牙关，握紧了拳头。“别担心，你没有麻烦，你刚来这儿时我们就知道了，”科斯库尔继续道，“我们想……让你讲讲马达加斯加的事情。”拉尔森疑惑地皱起眉头。科斯库尔继续说：“在你跳上开往中非的船的那一天，还有几艘船只启程前往其他非洲的殖民地。有一艘开往马达加斯加的船特别容易被偷渡客盯上，但你却冒着更大的风险要去中非。那你一定做了功课吧，所以，”科斯库尔身子前倾，“说说马达加斯加吧。”\n\n拉尔森咽了口唾沫，对这一转折感到震惊：“简单来讲，那里有去无回。不谙政治的官员，低效的官僚机构，还有那所谓的‘荣誉雅利安人’。此外，那些土著劣等人的埋葬方式导致黑死病爆发。这里就是德国的排泄口。”\n\n“谢谢你，你现在可以走了，”科斯库尔说完，等待着拉尔森离开，“别忘了关门。”\n\n“如果传言是真的，”德波尔说，“那温习一下热带作战手册会很有用。”"
 antarctica_aag_division.90.a:0 "“好主意，这样我们就不用和非洲的同袍们采用同样的学习方法了。”"
 antarctica_aag_division.90.b:0 "“我看没必要，现在就先继续南极训练吧。极地作战部队怎么可能被派去热带呢？”"
 antarctica_aag_division.100.t:0 "第二次胜利"
 antarctica_aag_division.100.desc:0 "汉斯·德根中将和爱德华·佐恩少将有多年乃至十几年没有来过本德勒勃劳克的军官休息室了。国防军在德国境内设有多个总部，柏林的本德勒勃劳克就是其中之一。这些总部几乎都配有休息室，里面放有最好的茶点。这里经常会有非正式的会面，国家的政治事务在这些后台中延展。\n\n德根和佐恩对这地方和活动并不陌生，但当他们胸前骄傲地佩戴着新挣得的勋章进来时，迎接他们的氛围却截然不同。平时善交际的军官们，除了祝贺和握手外，都很奇怪地一句话不说。似乎每个人都因为不知道什么话会被在场的人记下来打报告而不敢说话。\n\n德根和佐恩在一扇高大的窗户边坐下来，给自己倒上了杜松子酒。德根低声说：“看来上次走后，事情就变得更糟了。我还傻傻地希望我们那无可辩驳的胜利可以号召起整个国防军。”\n\n“确实够傻的。看来分歧之大前所未有，而且未来几个月毫无疑问还会加大。”佐恩回答说。\n\n“还好我们今天戴着勋章，不过也不要忘了那些牺牲的人，”德根举起酒杯，“为第二次胜利干杯。”"
 antarctica_aag_division.100.a:0 "觥筹交错的声音在噤声的房间中回荡。"
 antarctica_aag_division.110.t:0 "奥地利人"
 antarctica_aag_division.110.desc:0 "因斯布鲁克镇是真正的日耳曼天堂。阿尔卑斯山的背荫下保留着中世纪建筑与日耳曼文化，而第二山地师就是在这儿的山里训练的。德根和佐恩完成了对第二山地师驻地营房的评估，然后来到了一座风景怡人的庄园。他们被领着前往阳台，庄园的主人正在那里等着他们。\n\n阿尔卑斯山的美景被一位奥地利老人和他的门生的脸孔所玷染：瓦伦丁·费尔斯坦大将，78岁高龄的前奥匈军官，现第二山地师师长，两次世界大战和西俄战争的老兵，正坐在第二师军需官埃尔文·福森格中将身旁。德根和佐恩负责第二山地师的实战行动，而费尔斯坦和福森格在负责驻守因斯布鲁克本营的同时，还在政治上代表着师团的利益。德国很残酷，而德国的每一个角落都在向捉襟见肘的帝国议会乞求着资源。\n\n瓦伦丁示意德根和佐恩坐下。“获取光荣胜利的机会少之又少，”他沙哑地说道，“很高兴能见识到第二师的优异表现。自然，我已经把我们的成就散播了开来。”他转向福森格，“这样获取新素材会更简单。第二师有着悠久而辉煌的历史，我很欣慰在这些停滞不前的日子里这样的历史还能保持下去。”"
 antarctica_aag_division.110.a:0 "历史正书写下新篇章，而书写者正是完成了上一篇章的人。"
 antarctica_aag_division.120.t:0 "单调与忧郁"
 antarctica_aag_division.120.desc:0 "苏伊士运河船闸的单调乏味在某种程度上是一塌糊涂的马达加斯加战役的完美点缀。佐恩站在科塔斯船长安排的运输船的船头，这艘船正将第二山地师最后的残兵败将运出非洲。除了留在南极洲的一支小分队外，第二师的全部兵力都集中在了因斯布鲁克。沙漠阳光直射下来，热浪滚滚。佐恩为甲板下的人感到不值，过运河时他们只能待在拥挤的房间里。意大利内海对德国的来访者并不友好，除非他们肯掏钱。德根中将向佐恩保证，他已经在意大利官员那里打点好了。不过，佐恩还是坚持留在了甲板上，以防不测。\n\n唯一陪伴他的是廉价的松木箱，里面放着许多第二师士兵的遗体。佐恩叹了口气。他想起了自己的哥哥汉斯少将，1943年，他带领手下勇敢地在东线奋战，最终葬身异国他乡。佐恩不知道自己是否对得起兄长的遗志。不计其数的年轻人先他一步而去，也许他就不该离开那座肮脏的小岛。\n\n一声船鸣将他带出了忧郁。能带些人回来总归算是种安慰。在德国，能活着再挣扎一天就是最大的奢望了。"
 antarctica_aag_division.120.a:0 "佐恩想知道这是不是德国终结的开端。"
 antarctica_aag_division.130.t:0 "“荣”归故里"
 antarctica_aag_division.130.desc:0 "爱德华·佐恩少将走在第二山地师的驻地因斯布鲁克的令人陌生的街道上。第二师的官兵从未尝过失败的滋味，而他觉得自己要对此负责。德根中将的最后一份公报很简短。他们将在城郊的军营与其他指挥人员会面。佐恩知道这意味着要与两个奥地利人见面，瓦伦丁·福尔斯坦大将和埃尔文·富塞内格尔中将。佐恩对这位奥匈帝国的老军官福尔斯坦有一种只能称得上是勉强的钦佩，他是两次世界大战的老兵，在50年代带领第二师击败了苏联的残余力量。他的许多策略与现代军事理论格格不入，再加上他的年龄对于一个军人而言有点太大了，因此，德根和佐恩认为应该把他的影响力限制在德国本土，把他的工作限制在政治领域，当然是在他不知道的情况下。\n\n他的门生富塞内格尔让这一点变得很困难，他一直致力于让自己掌控第二师，并利用他与马丁·鲍曼的关系，使该师配备了最新、最紧要和最实用的装备。现在，该师的四位负责人都在德国国内，他确信这场权力之争的高潮将会到来。\n\n佐恩进入了其他三位首长所坐的房间。福尔斯坦示意佐恩坐下，但不愿与他对视。“我们有很多事情要讨论，少将，”老人歪着头说，“让我们开始吧。”"
 antarctica_aag_division.130.a:0 "第二师的命运悬而未决。"
 antarctica_aag_division.140.t:0 "逝者"
 antarctica_aag_division.140.desc:0 "小队中正在为把拉尔森埋葬在哪里而争论不休。\n\n拉尔森没有家。虽然他生在挪威，但他明确说了那里不是自己的归宿。他在汉堡度过了青年时光，不过那也是被迫的。小队最终达成一致，选择了他少年时想要去寻求新生的地方。\n\n中非的利奥波德维尔。\n\n拉尔森的葬礼上没有眼泪，但压抑的高温和潮湿使汗水从习惯了南极的士兵们脸上流下来。由于没有可以通知的家人，受军队葬仪的严厉规格约束，只有他的队友参加了葬礼。\n\n当拉尔森的棺材被抬到那个将要成为他永世之家的坑时，克鲁格攥紧了拳头，他恨那个夺走了战友生命的劣等人，他发誓只要有机会就要残酷地报复。\n\n当科斯库尔代替拉尔森的家人收起了拉尔森的旗帜时，他不知道，拉尔森的家人是不是真的能收到叠起来的万字旗。\n\n当拉尔森被葬入坟墓，《我曾有个好战友》的旋律响起，士兵们一齐敬礼，露出了被汗水浸透的腋窝，德波尔想知道还会不会有第二个战友能够理解他在德国体会到的疏离感。\n\n泥土盖过了拉尔森的棺材时，瓦格纳想着……"
 antarctica_aag_division.140.a:0 "他还要以德意志帝国的名义埋葬多少友人？"
 antarctica_aag_division.150.t:0 "构成"
 antarctica_aag_division.150.desc:0 "汉斯·德根中将喜欢与同僚一起讨论军事理论，也同样喜欢将其付诸实践。过去几周里，他对第二山地师在马达加斯加的表现进行了复盘。他现在正在因斯布鲁克费尔斯坦的庄园里向奥地利人费尔斯坦和福森格论述其成败。\n\n“总的来说，”德根说，“我们人的表现符合预期。马达加斯加本地人既挡不住我们的攻势，也打不穿我们的防御。不过那些美国和日本来的人却是个不一样的挑战。他们展现出了惊人的联合作战能力，我军被他们的坦克和飞机玩弄于股掌。我建议用更多的防空和反装甲装备增强师团的战斗力，这样不论战场如何变化，要对付的敌人是谁，我们都能很快适应，并一争高下。”\n\n福森格的注意力还在费尔斯坦身上，但还是插话道：“凭我和鲍曼的关系，我们可以用低成本取得威力强大的火炮，既能保证师团的火力，也能让我们更加忠于他的事业。”\n\n费尔斯坦向窗外望去。最终做决定的是他，而其他军官很担心他的守旧态势。“我们的人，”他大声说道，“展现了不凡的勇气。为什么不利用过去的成功经验，而非要去重新造轮子，嗯？你们俩的提议都会降低第二师作为山地小队的效率。火炮怎么能带着上山呢。”他又把自己与他人疏远开来。德根和福森格也许觉得这位老将的困惑，实际上是在选择面前进行的深思熟虑。"
 antarctica_aag_division.150.a:0 "“德根，你亲临过现场，我相信你的判断。去要求些防空和反坦克武器。”"
 antarctica_aag_division.150.b:0 "“在这让人窒息的政治环境中，友谊是很重要的。动用你的关系吧，福森格，给我们弄些火炮。”"
 antarctica_aag_division.150.c:0 "“我不懂为什么要改变部队组成，再多加些山地旅就好了。”"
 antarctica_aag_division.160.t:0 "阿尔卑斯山的深思"
 antarctica_aag_division.160.desc:0 "施图拜阿尔卑斯山的艰难登山体验让克鲁格想到了孩提时光。他记得，他和他的三个兄弟姐妹在被称之为家的破败公寓内透过窗户向外看去，梦想着在现在和科斯库尔少尉一起攀登的那座山间徜游。\n\n克鲁格总是期盼着周末的到来，因为他可以穿上希特勒青年团的制服，加入小伙伴的行伍之中，把慕尼黑的拥挤、父母无休止的争吵、班上其他孩子的嘲笑以及欺凌者的殴打统统抛在脑后。\n\n他不再是独自吃午饭的胆怯小孩子，而成为了更大、更纯粹的团体的一员，而且他在里面做得很好。\n\n山坡越来越陡，克鲁格想起了当时为了参加希特勒青年团的登山比赛而苦练攀岩的漫无止尽的日子。比赛开始时，克鲁格游刃有余地带着75公斤的重物一口气爬到了墙头，这才是真正的雅利安人。也正是由于这亮眼的表现，他被因斯布鲁克的山岳猎兵训练学院相中，被索菲娅·鲍尔相中，这个让年少的克鲁格完成了男人蜕变的女孩。毕竟希特勒青年团会鼓励真正的雅利安人之间的婚前关系。\n\n克鲁格在受邀加入第二山地师时欣喜若狂，这是一支真正的精英部队，是在这个充满毒害的世界上的民族社会主义的兄弟部队。克鲁格登顶后从自己的遐想中恢复，帮助把落后的科斯库尔少尉拉了上来。“命令？”克鲁格问向满头大汗的科斯库尔。"
 antarctica_aag_division.160.a:0 "“我们继续，”科斯库尔使劲说道，“试试打破时间记录。”"
 antarctica_aag_division.160.b:0 "“我们把枪放在这儿，放入演习位置。”科斯库尔回复道。"
 antarctica_aag_division.170.t:0 "埋伏"
 antarctica_aag_division.170.desc:0 "汉斯·德根中将精疲力尽。他在阿尔卑斯山整整一周都在监督第二师新兵的训练以及组织师团的重建。他期盼着明天能睡个好觉，顺便研习一下军事经典。当他来到费尔斯坦庄园内自己的房间门口时，他发现一位不速之客在等着他：埃尔文·福森格中将。福森格是第二山地师身宽体胖的军需官，比起德根，他的政治嗅觉更灵敏，一路平步青云晋升到了费尔斯坦的左右手。德根知道福森格与祖国的一些大人物培养了关系，所以有他在身边，德根都会很警惕。\n\n“汉斯，打扰一下。”福森格站在门前说道。\n\n“我很累，什么都不想知道。”德根说。\n\n“不要情报就直接去打仗？”\n\n德根叹了口气：“只有五分钟。”他边说便打开了自己房间的门。\n\n两人坐了下来，福森格开始了高谈阔论：“我们所有人包括你，汉斯，要被迫去选边站的日子就要到了。现今的政治形势远比你想象的还要糟糕。如果我们站错了队，第二师就会被触不可及的力量所摆弄。”\n\n德根咬了咬牙：“说重点。”\n\n“重点是只有那一个人值得部队的支持：马丁·鲍曼。他的影响力深入德国南部，因斯布鲁克也在其中。我们支持他的话就不再需要去害怕政治机器了。事实上，我听说第二师在同行中的地位极高。”\n\n德根看了看表，而福森格也知道他的意思。"
 antarctica_aag_division.170.a:0 "“想清楚了，汉斯。”"
 antarctica_aag_division.180.t:0 "雪绒花"
 antarctica_aag_division.180.desc:0 "薄雪火绒草，俗称雪绒花，是一种白色的花，其茎和花瓣上覆盖着白色的绒毛，使其看起来毛茸茸的。花的雌蕊是黄色的，被类似的绒毛遮挡着。雪绒花的奇特之处在于，它只生长在阿尔卑斯山和喀尔巴阡山脉的林木线之上，没有点真本事可采不到这种花，这是给真正的登山者准备的。对于山岳猎兵来说，采到这种花是必修课；对瓦格纳来说，这是他拖了好久的任务。\n\n能摆脱枪支弹药的重量自在攀登真是件美事啊，他一点都不怀念穿着训练了几个月的笨重南极大衣。瓦格纳通过望远镜看去，在上面的山脊处发现了一片雪绒花。瓦格纳放下背包，停了会儿，然后决定不用绳索和岩钉来趟自由登山。\n\n瓦格纳在岩壁上飞速穿行，很快就来到了花丛中，拔起了一朵正在发育的小雪绒花。当瓦格纳在手中把玩这朵花时，一滴血落到了上面。抬头一看，他看到了血的来源。\n\n血液从比约恩·拉尔森无数的伤口上滴落。\n\n瓦格纳第一次看到拉尔森的鬼魂时，吓得几乎晕厥，现在他已经越来越习惯了，这次他只是怔了一下。\n\n雪绒花染上了第二滴血，这次是瓦格纳不认识的一名士兵的血。整个山间草野，到处徘徊着第二师士兵的鬼魂，寻找着他们从未找到的花朵。瓦格纳下定决心不让这些人，不让朋友的死白费。瓦格纳又摘下了几朵雪绒花，代替那些摘不下的人。"
 antarctica_aag_division.180.a:0 "他会努力训练，拼命战斗。他的弟弟们会以他为榜样。"
 antarctica_aag_division.190.t:0 "假期"
 antarctica_aag_division.190.desc:0 "科斯库尔给自己制定了假期去奥斯陆旅游的计划……带着拉尔森一起……德波尔要陪着他走到荷兰边境的家里。科斯库尔可以见识到那臭名昭著的低地德语了。到达乡下的一个小农舍时，德波尔的母亲从农舍里跑出来，操着奇怪的低地方言喊着“瓐垰斯”，科斯库尔从没见过德波尔笑得这么灿烂。德波尔的母亲给了儿子一个大大的拥抱，用难以理解的低地方言连珠炮似地问了十几个问题，然后才注意到了科斯库尔，口音也变成了标准德语。寒暄过后，卢卡斯的父亲亨德里克·德波尔带着给士兵们的啤酒从农舍里走出来。\n\n推杯换盏之间，德波尔一家人越来越多地使用低地德语进行交流，让科斯库尔满头问号，直呼自己是不是喝多了。\n\n“……把这大好天气浪费在地堡里，可太可惜了。”科斯库尔突然捕捉到了亨德里克的话语。\n\n“什么意思？”科斯库尔一下清醒过来，问道。\n\n“哦，”这位中年农民有些犹豫，“我忘了你最近都不在德国……”亨德里克停顿了一下，想要理清思绪，“事态有些……紧张。就算在这穷乡僻壤，也能看到施佩尔和海德里希的支持者在大打出手。希特勒死后情况只可能会更糟。”\n\n科斯库尔思考了一会儿，然后转向德波尔："
 antarctica_aag_division.190.a:0 "“我这就给人打电话，让他们早点回来，后天就重新开始训练。”"
 antarctica_aag_division.190.b:0 "“最好尽量多和重要的人待会，我这就给人打电话，多放一周的假。”"
 antarctica_aag_division.200.t:0 "忠诚"
 antarctica_aag_division.200.desc:0 "第二山地师的领导层处于一片震惊之中，仿佛天突然塌下来了。阿道夫·希特勒，大日耳曼国的元首，死了。仿佛沉没船只上的硕鼠，帝国偌大的官僚机构和军事部门都四散奔逃到各自的角落。整个军队都选好了要支持的继业者，现在第二师也要做出相同的抉择。\n\n费尔斯坦召集了第二师的军官展开紧急会议，让大家各抒己见，讨论第二师的方向。\n\n“鲍曼才是合乎逻辑的选择，”福森格说，“我们的驻地因斯布鲁克所在的领地忠于民族社会主义事业，忠于合法的继业者：鲍曼。他过去帮助我们拿到了武器装备，我们应该报答这种信任。”\n\n佐恩插话说：“戈林已经获得了国防军大部分人的忠诚。我们应该和战友们在一起，更重要的是，要站在手里有枪的那一方。”\n\n军官们把目光投向费尔斯坦，想听听他的指引，而费尔斯坦摇了摇他那衰老的脑袋，嘴中冒出了一个名字：“施佩尔。”其他军官们都吃了一惊，这位年迈的守旧派竟然会去支持最有争议的候选人。“冯·特雷斯寇，”老人解释说，“那些军事革新者，都已向施佩尔效忠。他们提出的改革方案集中在缩小国防军规模，培养我们这样的精英部队上。我们可能成为祖国的带头先锋，摘得胜利与荣耀，一直从南极到极北之地。”\n\n德根一直什么话都没说。所有的选择都已摆上台面，而他将会成为那决胜的一票。"
 antarctica_aag_division.200.a:0 "“乱世之中，当走安全保险之道。联系鲍曼吧。”"
 antarctica_aag_division.200.b:0 "“佐恩的想法虽然简单，却无懈可击，我们就加入有着枪炮的一方。我们支持戈林。”"
 antarctica_aag_division.200.c:0 "“老伙计的想法很激进也很吸引人，我们有了名垂青史的机会。就跟施佩尔吧。”"
 antarctica_aag_division.210.t:0 "预支时间"
 antarctica_aag_division.210.desc:0 "迈尔慢悠悠地走上施瓦本二号的船板，参加由科塔斯船长召集的紧急会议。据迈尔所知，这场会议只有他们两人。留在新施瓦本的第二山地师的军官们迅速秘密地收拾了家什，登上了科塔斯麾下的小型商船队。虽然没有任何缘由，但根据从国内传来的零碎信息，迈尔大概可以猜到个八九不离十。\n\n迈尔进入船长室时，他看到科塔斯匆忙地将正在看的一张纸折了起来，放进了胸前的口袋里。“商船队被召回了，”科塔斯说，“我们要放弃先前的任务赶回家去。我把能留下的物资都给你们留下了。”\n\n“我理解，”迈尔说，“但为什么第二师的军官们也要抛弃职责离开呢？”\n\n“德根中将命令他们回因斯布鲁克。我只是个开船的。”\n\n“所以……时候到了？”\n\n科塔斯垂下头：“是的，鲁道夫。席尔马赫，整个新施瓦本，都要靠自己了。”\n\n迈尔感到天昏地暗，倒在了椅子上。这两位极地老兵比任何人都更了解南极的危险，互相没有什么可说的。未来黯淡无光。“你知道吗……”迈尔说，“我总觉得我们在这里的成就都是靠预支时间达成的。也许这个地方根本不适合我们。”\n\n科塔斯在桌子旁徘徊，“也许吧……但换个角度看，如果能渡过这次危机，你和你的人就将成为世界上有史以来最伟大的探险家。”"
 antarctica_aag_division.210.a:0 "“我们下次见，老友。”"
 antarctica_aag_madagascar.10.t:0 "十个月"
 antarctica_aag_madagascar.10.desc:0 "在南极待了十个月，他还是不知道迈尔和他的人是怎么撑下来的。寒冷始终浸透骨髓，腹中也没有体味过一顿好饭——真是个把第二师的人蜕变为祖国所需要的战士的好地方，不过，他们的未来倒是更加可期了。佐恩又读了一遍德根中将发来的通讯。\n\n“虽然非洲殖民地还牢牢地掌握在祖国手中，但马达加斯加的法国据点的情况就不那么讨喜了。第二师奉命与艾哈德·米尔希的马达加斯加军事委员会建立联系，为其提供军事援助。在你收到这封信的时候，我和部队的其他人已经在前往东非鲍赫勒施塔特港的途中了。你有全权为我部运输征用必要船只……”\n\n一支在极地进行操练演习的部队竟然成了能够处理近期马达加斯加厄难的唯一人选，真是黑色幽默。佐恩能读懂德根字里行间的信息，也熟稔士兵们之间的传言——马达加斯加处于浩劫之中。专员无法维持秩序，结果要让士兵来擦屁股。"
 antarctica_aag_madagascar.10.a:0 "不管前方有什么，部队都做好了准备。"
 antarctica_aag_madagascar.20.t:0 "诀别"
 antarctica_aag_madagascar.20.desc:0 "佐恩少将一直没有机会和死在东线的哥哥道一声别。所以他要亲自向席尔马赫站的领导层和第2师遗留下来的帮助确保新施瓦本领土完整的士兵告别。\n\n“我很高兴曾与你共事，少将，”鲁道夫·迈尔说，“祝你旗开得胜。”\n\n“我的人会以最高标准要求自己。有他们在，你什么都不用担心。”佐恩承诺。\n\n“希望如此，”迈尔笑了，“这里可不缺工作。你能和我说说法属马达加斯加是怎么个情况吗？我们在这里收不到什么消息。”\n\n“正常来说，我不能说太多，不过，那也要看看说话对象是谁？”佐恩也笑了，“这是场彻头彻尾的灾难。全岛的秩序已经崩溃，疾病肆虐，而驻军坚持不了几天了。”\n\n“所以他们要你去收拾烂摊子？”\n\n“是的。说实话，我都怀疑到的时候还有没有得救。”\n\n迈尔摇了摇头，“我想起了我们自己和新施瓦本殖民者的麻烦。看来我们一次吃得太多，完全嚼不动了。”"
 antarctica_aag_madagascar.20.a:0 "两人握了握手，敬了个礼，然后各奔东西。"
 antarctica_aag_madagascar.20.a.tt:0 "获得§Y60§!§W步兵装备§!、§Y10§!§W反坦克装备§!、§Y5§!§W火炮§!、§Y20§!§W支援装备§!和§Y5§!§W摩托化装备§!。"
 antarctica_aag_madagascar.21.t:0 "两名老飞行员"
 antarctica_aag_madagascar.21.desc:0 "弗朗茨·普罗伊朔夫感到比平时要暖和一些——南极的夏天来了。虽然依旧很冷，但总要好上冬天的黑暗。他的好友鲁道夫·迈尔邀请他去席尔马赫的测试机坪上视察起飞和降落测试。普罗伊朔夫看到迈尔和一小队人坐在一些空桶上抽着雪茄。\n\n“鲁道夫，”普罗伊朔夫说，“没想到在世界末端还能有这么高品质的烟草。”\n\n迈尔示意他过去，“我给你留了份。来，坐吧。”两位老飞行员一边享受着雪茄，一边看着那些以前在汉莎航空期间无法想象的飞机飞上天空。两人的职业足迹相似，战前都在汉莎航空工作。普罗伊朔夫也参加了第三次南极探险，两人相识已数十年了。\n\n“我想你已经很清楚马达加斯加的情况了吧。”普罗伊朔夫说。\n\n“嗯，真是丢人，”迈尔说，“希望佐恩和德根能恢复那里的秩序。”\n\n“如果我们能把这些神奇的机器送去打击游击队，那他们的任务能轻松不少。”\n\n“也许吧，但这些都是专门用于极地环境的原型机，还没有在其他环境中进行过测试。如果我说我会豪不犹豫地把经验丰富的测试飞行员送去那种环境下战斗，那就一定是在说谎。”\n\n“可现在正是需要他们的时候，鲁道夫，而不是一两年后测试完成的时候。这些是战争机器，就应该去战斗。”\n\n“你说得很有道理，老友，那么要送去哪架呢……”"
 antarctica_aag_madagascar.21.a:0 "“我们的人需要空中掩护，就送去Ho-229吧。”"
 antarctica_aag_madagascar.21.a.tt:0 "我们对§r霍顿Ho-229§!的测试进度将在战争结束时推进§Y10%§!。"
 antarctica_aag_madagascar.21.b:0 "“我们有架P.1110战斗机，就去试试它的缠斗能力吧。”"
 antarctica_aag_madagascar.21.b.tt:0 "我们对§s梅塞施密特P.1110§!的测试进度将战争结束时推进§Y10%§!。"
 antarctica_aag_madagascar.21.c:0 "“第二师小概率会遭遇装甲部队，就送去Bo-115坦克杀手吧。”"
 antarctica_aag_madagascar.21.c.tt:0 "我们对§L梅塞施密特-伯尔科-布洛姆-Bo-115§!的测试进度将在战争结束时推进§Y10%§!"
 antarctica_aag_madagascar.21.d:0 "“如果殖民地想要叛乱，那我们直接把它整个抹平，送去美洲轰炸机。”"
 antarctica_aag_madagascar.21.d.tt:0 "我们对§g霍顿Ho-XVIII§!的测试进度将在战争结束时推进§Y10%§!。"
 antarctica_aag_madagascar.22.t:0 "及时到达"
 antarctica_aag_madagascar.22.desc:0 "作为一名功勋卓著的水手和祖国英雄，有着许多好处，其中之一就是施瓦本二号——适用于极地地区的现代水上飞机——的豪华衣帽间，这里有着一个人能想到的所有便利与舒适。科塔斯使出浑身解数，在图莱亚尔港招待马达加斯加军事委员会的领导人和私交艾哈德·米尔希。\n\n“不顺都算说轻了。我就直说了：我们已经完全丧失了该岛的控制。农村基本上都因为各种各样的原因而起义了，我们被孤立在了海岸与军事基地之中。士气低落，许多编制也解散了。我们需要胜利，而且要快。”\n\n“所以我们来了呀，艾哈德，几小时后，先遣侦察部队就会从施瓦本登陆，”科塔斯说，“之后几天，一支小船队将带着第二山地师的其余人员，协助你巩固防线、恢复秩序。该师的总体指挥权、行动和任务仍旧由德根中将负责。”\n\n米尔希不好意思地笑了，“真高兴这座遗弃之岛上终于来了些真正的德国士兵。我就知道授予你那枚海洋英雄勋章是个好主意。”他指了指科塔斯脖子上的铜色星星，这是第三次南极探险成功的奖赏。"
 antarctica_aag_madagascar.22.a:0 "“希望我也能给你相称的表现。”科塔斯说。"
 antarctica_aag_madagascar.30.t:0 "有序形象"
 antarctica_aag_madagascar.30.desc:0 "佐恩站在鲍赫勒施塔特的码头上。港口一片混乱，塞满了从马达加斯加运送德国难民的船只，源源不断地将人员与物资卸到码头上。在施瓦本二号的甲板上，佐恩可以看到装备简陋的非洲辅助部队、国防军以及阴森可怖的东非党卫队。\n\n甲板下，饱经风霜的第二山地师南极小队带着防寒装备挣扎着。命令出自德根本人：他希望第二师的成员能在混乱中，展现出精锐形象以及更重要的有序形象。很不幸，这也意味着每个人都得汗如雨下般行动。于是，佐恩把获得当季制服列为了第一优先事项。\n\n码头上，马达加斯加的溃败部队正在和东非党卫队争吵，后者怒斥前者向劣等人投降。\n\n之后，施瓦本二号的舷梯降了下来，数百名德国最优秀的士兵出现在大众面前。他们大步流星地穿过争吵的人群，人群像大海一样分开，又迅速合拢。佐恩走到码头边上时，看到德根中将正和第二师的其他军官一起在等他们。他们互相敬了个礼，大声喊“希特勒万岁”，然后握了握手。"
 antarctica_aag_madagascar.30.a:0 "“真高兴有你在这里，爱德华。”德根笑着说。"
 antarctica_aag_madagascar.31.t:0 "马达加斯加战役"
 antarctica_aag_madagascar.31.desc:0 "德根中将和爱德华·佐恩站在他们的指挥帐篷里的一张马达加斯加的地图前。第二师已经抵达马达加斯加，他们接到命令要将该岛重新置于祖国的掌控之下。现在剩下的问题就是决定用什么方法来实现这一目标。\n\n德根把他的手指放在地图中央的丘陵和山脉上，“米尔希元帅的马达加斯加军事委员会告诉我们，几个反叛组织在中央高地有据点，其中一个据点中甚至有一个正常运作的空军基地。我们可以在他们故乡里我们设计好的地方突袭他们。”\n\n佐恩看了看全岛的许多防线所在的位置，“这些被分割成小块的孤立的德国驻军无法阻挡叛军的攻势，除非他们的防线得到适当的加强。这些防线漏洞百出，地理位置选择不当——坦率地说，无论是人员还是装备都不足。我们的部队可以挽救这一点，用我们的力量加强军委会部队的防御能力，并为他们其余大部分部队进入阵地争取时间。”\n\n这是一个稳健的计划，尽管有点违背德根所赞成的进攻理论。是选择通过进攻山区来斩断蛇头，还是通过保卫关键地区来准备一场消耗性战争。无论他做出什么决定，都将成为第二师面临的整个冲突的特征。"
 antarctica_aag_madagascar.31.a:0 "“我们的同志需要帮助和我们的专业知识。准备防守。”"
 antarctica_aag_madagascar.31.a.tt:0 "添加§W目标§!：§Y执行防御战斗行动§!"
 antarctica_aag_madagascar.31.b:0 "“我们做我们一直以来训练所做的事：我们会把他们从山上斩草除根。”"
 antarctica_aag_madagascar.31.b.tt:0 "添加§W目标§!：§Y执行进攻战斗行动§!"
 antarctica_aag_madagascar.40.t:0 "哲思"
 antarctica_aag_madagascar.40.desc:0 "卡尔·冯·科斯库尔少尉正享受着香烟，士兵比约恩·拉尔森却在挖战壕。德根中将命令第二师采取防御姿态，在米尔希元帅的部队整顿完毕之前坚守住防线。\n\n“拉尔森，你知道我刚才在想什么吗？”\n\n拉尔森呼吸急促，边铲土边答道：“不，长官，我不知道您在想什么。”说罢，他又把另一铲子土铲到了壕沟旁的铁丝网上。\n\n“我在想，这个世界上的大多数地方都是无名之地，直到那里发生重要的事情。就拿我们所在的这个荒凉的山顶来说吧。现在它是一座无名山，但今天之后，它将获得一个名字，因为我们将在这里浴血奋战。”\n\n“真是有意思的想法啊，长官。”\n\n“当然，想想看……”科斯库尔的哲思随着一枚迫击炮弹在战壕的另一侧爆炸戛然而止。随即，更多炮弹纷纷扬扬地落下，把土壤炸得四散飞溅。他躲进了壕沟，炮击虽然可怖且致命，但通常不会持续太久。“士兵们！”科斯库尔喊道。“拿起武器，组成战线！”就在这时，大批敌方步兵挥舞着闪亮的刺刀和其他各种近战武器，冲上了山头。但他们压根没有使用他们机会。精确而集中的火力压制像割麦子一样击倒了他们，短短几分钟就结束了战斗。科斯库尔知道，接下来他们还会发动更多进攻，但至少现在，他们挺过来了。“你看到了吗，拉尔森？只要我们再这么坚持几波，我们就会被载入史册。”然而，没有人回应他。“拉尔森？”\n\n这时，科斯库尔才看到躺在被鲜血浸红的泥土中的拉尔森，他的头盖骨被迫击炮炸掉了一大块。"
 antarctica_aag_madagascar.40.a:0 "“我会让人们也铭记你的名字的，拉尔森。”"
 antarctica_aag_madagascar.41.t:0 "马达加斯加战争总要求·其一"
 antarctica_aag_madagascar.41.desc:0 "马达加斯加军事委员会：米尔希元帅紧急要求第二山地师前往前线，协助军委工兵部队努力扩建防御工事和改进现有工事。\n\n德根：毫无疑问，我相信爱德华你已经注意到了，军委部队的防御工事无论是建造完善程度还是火力配置都做得很差。除非第二师纠正这种情况，否则它们将成为许多人的葬身之地。虽然掘地三尺可能并不光荣，但这是必要的。去做吧。\n\n注：游击队中出现外国特遣队的报告越来越多。可能会遭遇美国和日本的特遣队。别忘了尽地主之谊，爱德华。"
 antarctica_aag_madagascar.41.a:0 "通讯结束。"
 antarctica_aag_madagascar.41.a.tt:0 "添加§W目标§!：§Y在堑壕值大于25%时执行防御战斗行动§!"
 antarctica_aag_madagascar.42.t:0 "马达加斯加战争总要求·其二"
 antarctica_aag_madagascar.42.desc:0 "马达加斯加军事委员会：米尔希元帅紧急要求第二山地师调配军官以协助我们制定作战计划。我们缺乏军官，您的部队在策划我军对野蛮人的报复方面的经验将使我们受益匪浅。\n\n德根：我知道你在想什么，爱德华。把优秀的军官派到后方，而不是到第二师的前线去指挥作战，这违背了我们的根本原则。但是我们必须顾全大局，从整体来考虑问题。除非我们所处的战略形势得到改善，否则马达加斯加将土崩瓦解。在我们进行防守的同时，我们的军官将协助米尔奇计划我们的反击。\n\n注：每天都有越来越多的本土部队抵达。我们的军官很快就会回到你们身边，我们将在我们的战友和元首的面前证明第二师战无不胜！"
 antarctica_aag_madagascar.42.a:0 "通讯结束。"
 antarctica_aag_madagascar.42.a.tt:0 "添加§W目标§!：§Y在计划值大于25%时执行战斗行动§!"
 antarctica_aag_madagascar.50.t:0 "合奏"
 antarctica_aag_madagascar.50.desc:0 "第二师的日常任务就是：在会把怂蛋吓得发抖的峭壁和巨岩上作战。德根中将决定投入该师的作战力量；尽管最近在南极洲进行了适应性训练，第二师在山地地形中仍然是一支致命的尖刀部队。\n\n该师向马达加斯加的中央高地发起了多管齐下的攻击，高地上有许多叛乱分子在那里建立了他们的据点。子弹和炮弹撕开了骨与肉，土著的小屋被夷为平地，这些山洞和矮棚一个接一个地拜倒在德意志的武力之前。\n\n战地向导卢卡斯·德波尔和士兵曼弗雷德·克鲁格在向一个山洞口开火，压制住了里面顽强但最终注定失败的游击队员，为他们的战友到来争取时间。在他们之后，士兵比约恩·拉尔森背着火焰喷射器艰难地爬了上来。子弹在他周围呼啸而过，但他无情的脚步已经无法停止。没多久，他就来到了山洞口，并向里面的所有人倾泻地狱之火。尖叫声和肉烧焦的气味飘散开来。\n\n“好！”克鲁格喊道，“烧得漂亮！”\n\n拉尔森报以一个微笑，但不幸的是，他的好运用完了。一束子弹击中了绑在他背上的油箱，将他点燃在一片火之地狱里。"
 antarctica_aag_madagascar.50.a:0 "他的尖叫混合在了大合奏之中。"
 antarctica_aag_madagascar.51.t:0 "马达加斯加战争总要求·其一"
 antarctica_aag_madagascar.51.desc:0 "马达加斯加军事委员会：米尔希元帅要求第二山地师在夜间进行额外的攻击，打击敌人的士气并破坏敌人的组织能力。我们的人将尽力协助，但许多人并没有受过夜间作战训练。主要工作还是交由第二山地师的精锐部队来承担。\n\n德根：就是这样，爱德华，当你收到这份通讯的时候，你要增强我们的夜战能力，满足元帅的要求。\n\n注：如果可能的话，不要和军委部队一起行动，他们缺乏经验，只会拖后腿。好好利用南极的夜间训练吧，祝你好运。"
 antarctica_aag_madagascar.51.a:0 "通讯结束。"
 antarctica_aag_madagascar.51.a.tt:0 "添加§W目标§!：§Y执行夜间进攻战斗行动§!"
 antarctica_aag_madagascar.52.t:0 "浅睡者"
 antarctica_aag_madagascar.52.desc:0 "闪光灯穿过稀疏的树木，照亮了马达加斯加的黑夜。\n\n“还有半公里，我们就能联系上游击队了，”卢卡斯·德波尔上士说道。“我们得保持安静，不然就没有惊喜的效果了。克鲁格、拉尔森，你们俩和我一起去侦察，我们去看看他们有没有给我们反将一军。如果海岸安全，我就发射信号弹，然后就开始进攻。等他们反应过来的时候，我要我们已经把他们压制住了。”\n\n克鲁格急切地找寻着劣等人，洁白的牙齿在黑暗中发出皎光。三个人在森林中前行，茂密的植物掩盖了脚步声。数月的南极冬季训练把他们锻炼成了优秀的夜间战士，能够发现大多数人察觉不到的细节。\n\n他们看到堤坝上躺了三个人，睡得正香。德波尔拿出匕首并示意其他人也这样做，他们将在黑暗中割断敌人的喉咙，然后继续前进。当冰冷的铁刃刺进他们身体里时，两个人发出了湿漉漉的、窒息的呻吟声，但第三个人却没有安静地上路，一声疯狂的枪声打破了黑夜的寂静。德波尔迅速拔出信号枪，一颗信号弹照亮了夜空，随后几十颗信号弹相继升天，攻击正式开始。"
 antarctica_aag_madagascar.52.a:0 "“干我们这行的就怕睡眠浅的人，”克鲁格开玩笑道。"
 antarctica_aag_madagascar.53.t:0 "马达加斯加战争总要求·其二"
 antarctica_aag_madagascar.53.desc:0 "马达加斯加军事委员会：米尔希元帅紧急要求第二山地师进行额外的侧翼包袭，对敌人施压，阻止他们巩固针对军委部队的防线。\n\n德根：米尔希真正的目的是让我们减轻军委部队的压力，他们的部队缺乏训练，指挥官的能力更是令人无语，他们每次都会低估敌人，数十人因此丧命。只有形势有利于我们时才发动侧翼包袭，我不会让我们的人平白无故地死去。\n\n注：游击队中出现外国特遣队的报告越来越多。可能会遭遇美国和日本的特遣队。别忘了尽地主之谊，爱德华。"
 antarctica_aag_madagascar.53.a:0 "通讯结束。"
 antarctica_aag_madagascar.53.a.tt:0 "添加§W目标§!：§Y在侧翼击敌时执行战斗行动§!"
 antarctica_aag_madagascar.100.t:0 "胜利万岁"
 antarctica_aag_madagascar.100.desc:0 "汉斯·德根中将一直表情凝重，这是因为大日耳曼国的国家元帅赫尔曼·戈林骄傲地将双剑银橡叶骑士铁十字勋章挂在了德根胸前。马达加斯加内战以所有叛军被彻底镇压而告终，在这之中第二山地师乃是决定性因素。这样的一支精锐部队是艾哈德·米尔希元帅的马达加斯加军事委员会的一条钢铁般的脊梁。在马达加斯加全境的战斗再次证明了该师的能力：无论是在冰冷的极地还是在最潮湿的丛林深处，他们都战无不胜。这世界上没有比他们更优秀的士兵了。\n\n在颁奖台下面，当戈林继续为以佐恩为首的指挥人员颁发奖章时，人群中爆发出了剧烈的欢呼声。颁奖结束后，颁奖台上的每个人都转过身面对街对面的观众，戈林带头喊出了“胜利万岁！胜利万岁！胜利万岁！”，他们也随着欢呼。就在此时，第二师的战士们表明了他们的存在，他们开始沿着颁奖台和人群之间的道路行进，并在经过颁奖台时向军官们敬礼。在狂欢的人群的喧嚣声中，听不清楚任何一个可以理解的词语。\n\n德根与佐恩互相微微一笑。他们带领着他们的士兵投入战斗并为祖国赢得荣耀。人生中没有比这更美好的事情了。"
 antarctica_aag_madagascar.100.a:0 "完美华丽。"
 antarctica_aag_madagascar.101.t:0 "失败的刺痛"
 antarctica_aag_madagascar.101.desc:0 "战败：在第二山地师的字典里就没有这个词。然而，今天过后就再也不是了。\n\n马达加斯加的局势已经恶化到无以复加的地步，仅凭第二山地师的实力无法加以挽救。米尔希元帅的马达加斯加军事委员会已经崩溃了，其麾下的分散在各地的部队被这个已经完蛋的殖民地的布满鼠疫细菌的丛林所吞噬。第二师在港口被劣等人占领之前，通过科塔斯的船队匆匆撤退了。该师撤离出来的人员现在正在鲍赫勒施塔特城外修整。他们的伤亡比在马达加斯加的其他部队要少，但对于这样的一支精锐部队来说，这样的损失仍然是十分惨重的。德根中将已经回到日耳曼尼亚，带着师里的大部分人回国接受整训和更新装备。\n\n佐恩眺望着非洲平原。他的部下们躲在他们能找到的任何摇摇欲坠的房屋里，等待着最后一艘船带着他们耻辱地回家。佐恩利用这个机会向他的军官们演讲。“你们没有做错什么，”他说，“这场巨大的阴谋让我们的行动不可能成功。话虽如此，失败就是失败，我们必须接受这一事实。回国后，我们将在奥地利阿尔卑斯山接受更严格的训练。我们不会让这种情况再次发生，我们将挽回第二山地师作为祖国最精锐部队之一的声誉。”"
 antarctica_aag_madagascar.101.a:0 "“就这些。”"
 antarctica_aag_gcw_division.10.t:0 "慕尼黑"
 antarctica_aag_gcw_division.10.desc:0 "慕尼黑，民族社会主义的龙兴之地，历史的轴心一次又一次地在这座城市转动。在这里，民族社会主义取得了它在统御人民上的首次成功；也正是在这里，雅利安人的命运将再次决定。\n\n埃尔温·富塞内格尔中将提出的以第二山地师的力量支持鲍曼的建议已被接受。数千名祖国最优秀的士兵从其在因斯布鲁克的基地出发前往慕尼黑。现在，第二师全体官兵穿着整洁的制服，带着再度统一德意志的坚定决心，向慕尼黑进军。\n\n第二师在纪念堂外停了下来，纪念堂内安放着16名被称为“血证者”的烈士的遗体——他们是民族社会主义事业的第一批殉道者。鲍曼站在外面的台阶上，等待着最新一批向他宣誓效忠的队伍的到来。富塞内格尔曾向他承诺要建立丰功伟业，而在看到聚集在他面前的士兵们的面孔时，鲍曼毫不怀疑他们能够成功。在这些从极地和热带战争的尸山血海中杀出重围的老兵面前，没有敌人能阻挡他们前进的步伐。他们将从祖国的心脏出发，再度统一德意志人民。叛徒与内奸将被他们无情碾碎，真理之光将永远照耀千年帝国。"
 antarctica_aag_gcw_division.10.a:0 "民族社会主义诞生于血火之中，而血火将继续燃烧在德意志大地之上。"
 antarctica_aag_gcw_division.20.t:0 "重游卡琳宫"
 antarctica_aag_gcw_division.20.desc:0 "佐恩少将在夜色的掩护下悄悄前往卡琳宫，他与戈林的会面不会被记录在任何的官方文件中。第二师指挥部听取了佐恩的建议，选择了赢面大的一方，即有枪有炮的一方。佐恩自告奋勇前去会见国家元帅，而其他军官则留在因斯布鲁克，整理迁往普鲁士的后勤工作。\n\n宫里的奢华让佐恩有些倒胃。他对祖国的一些官员认为理应享受的奢侈生活并不陌生，但这种规模还是超出了他的想象。如果他有些艺术天分的话，他或许还能说出墙上装饰的众多名作的名字。如果他是一名动物学家的话，他或许还能说出头上挂着的众多野兽的名字。但是佐恩只是德国的一名军官，他只关心一件事：手下的行为。\n\n国家元帅在一座桌子上堆满了各种珍馐佳肴的巨大餐厅里接待了他。佐恩敬了个礼，鞠了个躬，“第二山地师听候您差遣，元帅。”\n\n戈林笑了，“请坐吧，少将。有想要吃喝的吗？”佐恩摇了摇头，戈林继续说道，“我听说你在新施瓦本待过一段时间。舒曼博士怎么样？”\n\n“有些冷淡，”佐恩说，“但很勤奋，依我所见。”\n\n“嗯……不错，舒曼有着宏大的计划和与之相称的决心。我很高兴，像你们这样杰出的队伍愿意支持我，我们的部队会越来越强大，这个小小的……争执，很快就会结束。”"
 antarctica_aag_gcw_division.20.a:0 "“第二师静候您的命令，元帅。”"
 antarctica_aag_gcw_division.30.t:0 "大将"
 antarctica_aag_gcw_division.30.desc:0 "在瓦伦丁·费尔斯坦大将面前，没有走不通的路。作为奥匈帝国、奥地利和德国三朝军队元老，他在欧洲各地有着许多人脉，其中之一便是亨宁·冯·特雷斯寇——施佩尔那“四人帮”中的军事改革者。费尔斯坦给冯·特雷斯寇写了封信，想要见一面——古旧的奥地利人与改革者的会面。\n\n冯·特雷斯寇在汉堡的一个平平无奇的营帐办公室接待了他。费尔斯坦了解到，这里曾是施佩尔进行内战准备的地方。“不得不说，”冯·特雷斯寇说道，“像你这样的老古董会站到正统的元首这一边，着实让我一惊，但我也很高兴。”\n\n费尔斯坦摆了摆手：“我了解自己的名声，也了解你要实施的改革。像第二山地师这样的精锐部队可以成为一支强大远征军的核心，能够在短时间内前往世界上的任何地方展开行动。我就直说了，我会带领第二师为你而战，不过不是出于对你理想的忠心，而是出于它能带给我们胜利与荣耀。”\n\n冯·特雷斯寇缓缓点头：“我欣赏你的坦诚。相信我，未来你绝对会有多得数不清的机会的。”"
 antarctica_aag_gcw_division.30.a:0 "向着荣耀！"
 antarctica_aag_gcw_division.40.t:0 "清理房间"
 antarctica_aag_gcw_division.40.desc:0 "科斯库尔和他的小队在一座德国小公寓的门前整装待发。他本想在突入之前炸掉门的铰链，用弹片和冲锋枪火力覆盖整个房间，但考虑到可能的平民伤亡而放弃了这一战术。科斯库尔拍了拍先遣兵德波尔的肩膀，后者点了点头，架起了霰弹枪，在枪膛里放入了破门弹。德波尔将霰弹枪抵在门把手上，一只手举过肩膀，用手势开始倒数。\n\n三、二、一。\n\n一声巨响过后，门被破开了。由于破门弹的威力不足以应付接下来的行动，德波尔再次拿起枪，装入大号铅弹，然后绕过墙角，举着枪口扫过房间。首先映入眼帘的是两个穿着党卫队制服的士兵，一人举起双手想要投降，另一人向靠在墙上的步枪扑去。德波尔的本能反应使得子弹已经向投降的人飞去了，他的胸口开了个四英寸大的洞。德波尔又向第二个人开了一枪，但却打中了冰箱和里面的牛奶。科斯库尔沿着抵抗最小的路径进入下个房间，却一个人都没看到。德波尔继续行进，在他的脸与几秒钟前靠着的墙平行时，他看到了另一名党卫队士兵，举着把手枪。党卫队士兵首先开枪，击中了德波尔的腹部，但被防弹衣挡了下来。德波尔连开两枪，第一枪打中了肩膀，血和骨渣溅到了墙上；第二枪直接爆头，为墙上本就可怖的涂鸦添上了烂牙和脑浆。接下来克鲁格进来了，比德波尔更轻巧地转进房间，并瞄准了德波尔没有打中的那个党卫队士兵。克鲁格想到要杀死雅利安同胞而犹豫不决，这就给了全副武装的党卫队士兵足够的时间朝下一个进来的瓦格纳开了枪，瓦格纳的大腿上部被击中，疼得哭出了声，克鲁格这才反应过来，连开三枪，结果了这名党卫队。"
 antarctica_aag_gcw_division.40.a:0 "犹豫就会败北，就算对待同胞也一样。"
 antarctica_aag_gcw_division.41.t:0 "城市中心平定命令"
 antarctica_aag_gcw_division.41.desc:0 "奉汉斯·德根之命：敌军在反对正当元首的过程中占领了众多的人口中心。成千上万的同胞被困在了敌人的叛逆之治下，他们的家园被改造成了堡垒。第二山地师将会发起对这些堡垒的攻击，我们会把同胞一个接一个地解救出来，把家园一个接一个地夺取回来，直到整个祖国重归一统。去吧佐恩。"
 antarctica_aag_gcw_division.41.a:0 "通讯结束"
 antarctica_aag_gcw_division.41.a.tt:0 "添加§W目标§!：§Y执行城市战斗行动§!"
 antarctica_aag_gcw_division.42.t:0 "解放关键水路命令"
 antarctica_aag_gcw_division.42.desc:0 "奉汉斯·德根之命：我们师再次被赋予了最困难的任务，我们绝不能辜负元首的期望。敌对的叛军盘踞在德国的每一座堤坝、每一条河流，我们要把它们逐个击破、逐个歼灭。我们的精锐之师收到了这项任务，我们还会得到浮桥和额外的工兵支持来推进进攻。只许成功不许失败，佐恩，夺回河流，将人民的命脉重新相连。"
 antarctica_aag_gcw_division.42.a:0 "通讯结束"
 antarctica_aag_gcw_division.42.a.tt:0 "添加§W目标§!：§Y执行跨河战斗行动§!"
 antarctica_aag_gcw_division.43.t:0 "战争计划资产的战略重组命令"
 antarctica_aag_gcw_division.43.desc:0 "奉汉斯·德根之命：我们的部队正面临着后勤和战略上的困境。整支部队的瓦解和数十名国防军军官的弃职，严重削弱了我们的计划和协调行动能力。元首下令各师的指挥部会协助我们重新整合和改组军官团。我们需要重夺主动权，而且要快，以免敌人浑水摸鱼。我把这个计划托付给你了，佐恩。"
 antarctica_aag_gcw_division.43.a:0 "通讯结束"
 antarctica_aag_gcw_division.43.a.tt:0 "添加§W目标§!：§Y在计划值达到上限时执行战斗行动§!"
 antarctica_aag_gcw_division.50.t:0 "新时代"
 antarctica_aag_gcw_division.50.desc:0 "汉斯·德根从未见过指挥部如此狼狈。元首去世后，德国陷入了手足相残的内战之中。战斗漫长无止境，但第二师一次又一次地证明了自己的能力，也因此被公认为德国历史上最强大部队之一。\n\n德根和其他人趁着注定的政治冲突还没到来，抓紧时间进行休憩，在费尔斯坦的别墅里庆祝胜利。费尔斯坦用颤抖的手举起一樽威士忌：“我们为了重新统一祖国而光荣奋战。历史和我们的战友都会记下我们的贡献。为祖国的光明新时代干杯。”\n\n德根、福森格和佐恩举起酒杯：“敬新时代！”这句话既是说给祖国的，也是说给他们自己师的。费尔斯坦再过几个月就要退休了，到时要把师交给继任者。论级别论资历都应是德根接替，但汉斯并觉得有那么简单。战争扩展到了政治领域，战时的脆弱联盟正在瓦解。德根不知道接下来会发生什么，不过他唯一能肯定的是，一个投机取巧的人可以轻易地抢走他应得的东西。"
 antarctica_aag_gcw_division.50.a:0 "不过，四位军官现在推杯换盏，熙熙融融。"
 antarctica_aag_gcw_division.60.t:0 "火堆"
 antarctica_aag_gcw_division.60.desc:0 "第二山地师马上就要输掉内战了，战士们拼尽一切也无法扳回倾向另一方的战争天平，荣光中的胜利已成妄想。\n\n军官们与少数幸存者已经撤到了因斯布鲁克的大营。如果想要在战后安然无恙的话，他们就得去销毁通讯和战地日志，烧毁所有与自己阵营相关的文件。德根和其他人一起热火朝天地烧着堆积如山的纸张，巨大的烟柱从营房的窗户中飘出。\n\n德根抬起落在桌子抽屉上的目光，看向费尔斯坦，这个老人站在窗边，一幅沮丧的样子，双手紧紧地握在身后——以这种方式结束职业生涯属实料想不到。福森格把一叠文件塞到了德根手里。“快，汉斯！”他嘶吼道。“我们的人不知道还能在周边守多久。”\n\n德根一边忿忿地看着福森格一边将文件扔进壁炉。后勤清单、部队调动、伤亡名单，战争的痕迹尽数被抹去。德根相信，在整个德国，有上千名想要摆脱自身命运的人在点燃着相似的火堆。他又想起了新施瓦本，想到了席尔马赫站的那些日子。"
 antarctica_aag_gcw_division.60.a:0 "还是留在南极好……"
 germany_antarctica.1.t:0 "阿基米德是雅利安人"
 germany_antarctica.1.desc:0 "时针已转过十二点，周二过去，周三到来。虽然在必要情况下，他肯定会为了德国的利益打破承诺，但鲍曼向自己保证，再阅览一份待处理文件就睡觉。解决了又一个问题后，鲍曼捋了捋日渐稀疏的头发，打开下一份信函。\n\n这封信是一个名叫德国极地研究学会的组织寄来的，他们负责管理南极的军事基地，这点勾起了鲍曼的兴趣。他们在请求补给，字里行间无不体现出绝望之感。他叫来自己疲惫的波兰秘书。后者二十秒后才出现在他身前。\n\n“我才不管现在是不是凌晨三点，我揿电铃的时候，就给我脸上带着微笑出现，你这狗日的！”秘书明智地保持沉默，鲍曼停顿了一会，喘了几口气气，顶着隐隐作痛的五脏六腑继续说道：\n\n“给我找点材料。有关新施瓦本的物资情况、日本和OFN的南极领土宣称、派驻人员的家庭档案的。给你八分钟时间。”鲍曼揉了揉酸涩的眼睛，喝了口水。为什么之前都没注意到呢？南极的德属殖民地不仅仅是殖民地，它更是能撬动敌人的政治资本、带来科学发现和军事优势的机器、流放不值得枪毙之人的地方。最重要的是，可以利用这弹丸之地直击OFN软肋。\n\n鲍曼露出一丝微笑，旋即又大吼道：“你滚哪去了，快他妈把情报拿过来！”语罢，他又笑了。"
 germany_antarctica.1.a:0 "给我一个杠杆和一个支点，我就能撬动整个地球。"
 germany_antarctica.2.t:0 "开辟新战场"
 germany_antarctica.2.desc:0 "捷克风鞑靼牛肉真是美味。戈林从这一块小小的牛肉就能看出来，捷克确实在融入大日耳曼国。他心想，这个文化的价值在餐盘上那鸡蛋、醋和嫩牛肉的组合间体现地淋漓尽致。可惜，元首必须得日理万机，戈林不得不一心二用：他向侍者打了个手势后，便一只手处理文件，另一只手拿着叉子接着吃。\n\n原来是那狗腿子舒曼的祝贺信，他带着极南之地的一个机场向元首的正统继承人宣誓效忠。戈林嘴边漏下一块饭渣子，掉到了餐盘上，该死。他余光瞥见舍尔纳站在角落里，似乎在喝水，或者在小口喝着伏特加。见状，他也呷了一口杯中的烈酒。\n\n根据舒曼的说法，迈尔和席尔马赫主政的管理机构治理有方。戈林有听说过后者，他们显然是在对霍顿229和下一代空优战斗机做耐寒性测试。戈林再抿了口伏特加，转眼看着盘子里的鱼子酱。料勺去哪了？斯拉夫人可不会用汤勺吃鱼子酱……啊，原来在这呢。\n\n德国总有一天要进攻美国，从下方夺其软肋可以方便很多。戈林边舔着勺子边想，除了这点，“昭昭天命”本身就是那些自由派的谎言，是为了阻止一个种族追寻自己道路的幌子，美国之战势在必得。再说，俄罗斯之役已是必然，德国空军也需要一个机密寒带实验室来为此做准备。\n\n肯定是舍尔纳把这份册子呈递上来的。戈林看着这个御用复仇男神向他走来，心想，不管怎么想都像是他干的事，但至少这一次，他们两人达成了共识。"
 germany_antarctica.2.a:0 "给我接舒曼。"
 germany_antarctica.3.t:0 "洁净无瑕"
 germany_antarctica.3.desc:0 "海德里希瞪了眼秘书，示意后者退下。一帮腐败堕落之人占据着千年帝国在极南之地的哨点，低劣程度和那里的纬度数值有的一拼，他们连直通电话线都接不好。又是一个令元首所谓之盟友困扰的腐败迹象。追求完美、热爱天命之种族的希特勒只有一个缺点，那就是他的同情心。海德里希想起里彻和其他英雄探险与殖民这天涯海角的故事，但在德国，这种事再常见不过了，曾经的英雄事迹早已褪去光泽。\n\n“席尔马赫站”命悬一线，完全依靠德国海运来的补给存续。雅利安科学家早就知道低温储存的食物不会流失营养价值，那为什么昔日国家为之自豪的站点被腐化了呢？为什么要继续让这个殖民地…不，自取其辱之物玷污雅利安人必将征服的处女地呢？为什么其他种族还妄想占有、驯服这片本能建立纯净乌托邦的蛮荒之地？\n\n海德里希茅塞顿开，心里涌起一股暖流。寒风吹起的皑皑白雪，桀骜不驯，但纯净无暇——最棒的是，它是白色的。希姆莱有先见之明，其早已在南极洲设立基地。现在，海德里希也明白了这一远见卓识。\n\n派驻人员想要补给和支援，虽然发来的讯息都经越发靠边站的阿勃维尔检阅过了，但字里行间的绝望之感仍显露无疑。海德里希看了暖心不已。他会帮这些人的，但得等到他们补给断供后、等到他们在德国的联系人都被绞死后、等到他们被迫面对生存的铁律、等到他们被残酷的现实逼出铁石心肠。只有到那时，海德里希才会伸出援手。"
 germany_antarctica.3.a:0 "只有到那时，他们才能称自己为雅利安人。"
 germany_antarctica.4.t:0 "上好的展品"
 germany_antarctica.4.desc:0 "日耳曼尼亚自然历史博物馆的展馆内满是闪光灯和录音机磁带的声音。元首钦定的继承者阿尔伯特·施佩尔，在一大片阿谀奉承之人的簇拥下观赏展品。眼前是史前哺乳动物展区，这些出土于东部各专员辖区的动物个个身材魁梧，体型大小堪比坦克，莫斯科专员辖区的地底下还挖出了一只鼠式坦克大小的穴居熊；下一个展品是来自中非专员辖区的大猩猩标本，导游解说道：“毫无疑问，这些动物就是当代黑人蛮族的直系祖先。不难看出，二者差异不大，注意步态、面部和鼻腔构造……“\n\n施佩尔漫不经心地听着解说员的贬损，注意力全被走廊尽头一束明亮的白光吸引了去。他慢慢向前踱步，随行人员赶忙跟上。最后。他驻足于一副布景之前，端详这极南之地的复制品。这，就是南极洲。企鹅标本比比皆是，巨大的海豹懒洋洋地躺在石头上。施佩尔知道，这代表的是新施瓦本的德属南极洲殖民地。\n\n大日耳曼国行将就木，方方面面都需要改革，殖民地也不例外。施佩尔知道，只有自己才能平定全国，南极洲的秩序也要靠他恢复。根据浏览过的报告，现在管理新施瓦本的机构效率低下，结构臃肿。国家东部急需援助，不论南极洲的航空科研设施和核试验基地有多少技术突破潜力，此般殖民工作都是在无脑挥霍资源。若团结协定各国加大介入力度，南极洲宣称的合法性就能进一步上升，如此照着OFN的做法依葫芦画瓢，就能以较小的代价保住我们对新施瓦本的控制。事实上，这种合作还可以把成本平摊给各国。若不能按期买单，何来友邦一谈？"
 germany_antarctica.4.a:0 "”如您所见，这里展出的是企鹅标本，它们都是由无畏的雅利安探险家狩猎而来的……“"
 antarctica_aag.10.t:0 "放逐之地"
 antarctica_aag.10.desc:0 "它在地壳上游荡了数亿年，最终在这天涯海角停下了脚步。或许有朝一日，它会再度踏上征程，漂向更温暖的地方，但至少在人类文明彻底毁灭之前，它将稳居于此。千百万年来，栖于冰雪之下的它未曾醒来，也未遭侵扰，无声无息地保守着自己的秘密。\n\n各类生灵都曾于这放逐之地上定居，但来客仍络绎不绝，不远万里地坐着木、铜、镍、钢混合制成的海洋巨兽到访。他们踏上这片古老的土地，欢呼雀跃、手舞足蹈、休养生息，最后随风而逝。现在，来者皆已离去，放逐之地虽未曾动摇，却永远获得了一个令人敬畏的称号——南极洲。\n\n远方来客越来越多，但这一次，他们却像亿万年前生活在这片土地上的翼龙那般翱翔于天际。随着时间的推移，放逐之地成了其他被放逐之人的避风港和最终归宿。然而，那些初来乍到之人心底漆满了黑色、心中装满了仇恨，绝不会在极寒之地里抢到战利品、拿到好处之前合眼。\n\n也正是因此，一堵无形的能量墙在某个夏日横扫放逐之地，留下了无人可辨的伤痕。爆炸放出的辐射撼动了整片大陆，却又未能真正将其动摇，大部分南极土地都丝毫没有受其影响。\n\n而对于那些引发这场爆炸的被放逐者来说，这片寂静无声的土地还有另一个名字。他们称之为："
 antarctica_aag.10.a:0 "新施瓦本。"
 antarctica_aag.20.t:0 "南极之春"
 antarctica_aag.20.desc:0 "巴伐利亚迎来了一个清冷的早晨，霜冻逐渐化成露水，而沉睡已久的新施瓦本也苏醒了过来。许久之前就建好的机场已完成扫雪；机库皆已清空，准备迎接第一批飞机。补给船上除了常规物资，还装有印着德国空军徽标的集装箱，里面装着能决定殖民地未来的货物：前来接受南极寒风考验的次世代战斗机和直升机。鲁道夫·迈尔全神贯注地注视着这一切。\n\n补给船队停泊在这小小的南极码头，基地工作人员开始从船上卸下重要货物，伫立一旁的迈尔和席尔马赫则在一旁看着。虽然后者曾竭力劝阻，但前者还是坚持穿着全套军官制服迎接船队靠岸。显然，南极早晨的彻骨寒意已经在侵蚀迈尔那严肃的面庞，席尔马赫见状只能叹气，随后便向前看去。在接手麻烦百出的南极殖民地之前，迈尔就一直这么循规蹈矩。党的命令再怎么苛刻，他都会无条件服从。\n\n靠港的补给船上下来个空军军官。他裹着好几层皮草，但还是冷到发抖。席尔马赫看了看自己的领导，不由得笑了下。\n\n“是迈尔中校和席尔马赫少尉吗？”空军军官声音低沉地说道。\n\n在他身后，第一批集装箱已卸到码头上，几个人彼此叫喊着。\n\n“这里是第一批样机，你们需要在新施瓦本测试它们，日后应该会有更多送来。”"
 antarctica_aag.20.a:0 "迈尔微笑道：“很好，开工吧。”"
 antarctica_aag.20.tt.a:0 "§F启用§!§r新施瓦本§!§F武器测试机制§!和§Y相关决议§!。\n§F我们将获得§!§W12补给§!£Antarctica_texticon_SUP 。"
 antarctica_aag.30.t:0 "午夜办公室"
 antarctica_aag.30.desc:0 "鲁道夫·迈尔又在熬夜了……好吧，其实太阳已经下山一个月了，但他还是坚持完成每日例行事务，以免被季节性抑郁吞噬。迈尔原本是飞行员，后来转行成了行政人员，希望跑来南极就能避开腐蚀德国的官僚主义，但事与愿违，就算身处在这极南之地他也没得安宁。壁炉内的火焰噼啪作响，温暖了迈尔冰冷的身心。\n\n迈尔处理完剩下的一点文件后，叹了口气，深觉事情本不应该如此。战争时期，这里可是他一直向往着的、支撑自己挺过巴巴罗萨计划的梦想之地。疲倦的迈尔打开抽屉，从日渐稀少的补给品中抽出一根香烟。今晚甚是特殊，自第一次来这蛮荒之地探险算起，已经过去了24年整，那时候的他可真是满怀希望啊……\n\n为了庆祝这一纪念日，迈尔拿的是红万宝路。雪茄几周前就抽完了，所以现在就拿扑克桌上赢来的美国香烟代替。用不了多久，这唯一能施以他以慰藉之物就会燃烧殆尽。\n\n迈尔深吸了一口香烟，让烟雾灌满自己的肺。他的大脑总算放松了下来，纷扰的思绪也随着鼻子呼出的烟雾消散了。在家门口捣乱的党卫队、越发鲁莽的OFN当局、近期数量少得发指的补给班次，一切烦恼都随烟飘散。这些问题明天再想吧，现在，他可以稍许满足下私欲，假装自己是新施瓦本的无上领袖。"
 antarctica_aag.30.a:0 "香烟无声地燃烧，迈尔也短暂地感受到了喜幸。"
 antarctica_aag.40.t:0 "永恒不变之物"
 antarctica_aag.40.desc:0 "寒冷的空气直向里夏德-海因里希·席尔马赫袭来。他昨夜一宿未眠，士兵们在他的床铺边来回走动的声音吵得他无法合眼。补给箱在地板上被拖来拖去，士兵肩上的步枪也发出咔咔的声响。就像发动机必须要燃料来保持运转一样，里夏德现在也需要咖啡来保持清醒。毕竟，在驾驶飞机的时候，哪怕合眼一秒，都可能会机毁人亡。\n\n正如往常一样，里夏德和其他人一起站到了食堂窗口前排着的大长队后面。厨师把如同泔水一般的糊糊倒在他的托盘上，这让他无比失落。然而，眨眼间他便看到了光明：一台咖啡机。那些高层官僚最喜欢从拉美进口优质的咖啡豆，他贪婪地接了满满一杯热气腾腾的咖啡，至少这能让那令人作呕的糊糊更好下咽。\n\n在他狼吞虎咽地就着咖啡吞下了早餐之后，这位飞行员再次踏进了于寒冷的大地上矗立着的一座机场。至于他的任务，当然是在荒寂的冰原上侦察敌人的行踪，看看有哪个胆大包天的家伙敢闯进他们的领地。\n\n在地勤人员确认一切就绪后，席尔马赫和他的副驾驶鲁道夫·迈尔挤进了飞机。两人一言不发，以免让自己身体里那宝贵的热量消逝在寒风中。发动机发出如雷贯耳的轰鸣，地勤人员示意他们起飞，任务就此开始了。\n\n在空中，鲁道夫用望远镜观察着地面，同时简短地记下任何足以引起他注意的东西，里夏德则紧盯着永远位于三十公里以外的地平线。他从不喜欢注视这片寒冷的土地，雪地上反射的阳光会把他弄瞎的。妈的，他本应该在阿莎芬堡上空，享受自己宁静的飞行时光，而现在，他却深处数千公里之外，为这个狗屁巴巴罗萨计划冒生命危险。\n\n十八年后，里夏德-海因里希·席尔马赫在新施瓦本的科考站中醒来，脑子里还在回想着刚才的梦。在他门外，那些磨磨唧唧的士兵发出的杂音扰得他心神不宁。他走进屋外冰冷的空气之中，然后又走进食堂，享用一盘恶心的糊糊和一杯品质优良的咖啡。至于他今天的任务？当然是和鲁道夫·迈尔一起，在空中搜寻任何敢于踏进他们领地的敌人了。"
 antarctica_aag.40.a:0 "真是个作息规律的人。"
 antarctica_aag.50.t:0 "言简意“核”的书信"
 antarctica_aag.50.desc:0 "“致我的好友埃里希：\n\n希望你看到这封信时身体无恙、暖暖和和。首先，我想对你最近发表的有关南极核爆的研究论文表示祝贺。在国内这可是个热门话题，每隔一天就要上一次头版呢。其次，请允许我为第一次听你提及这个观点时的嘲笑表达歉意。我不喜欢被人当成傻瓜，但为了你，这次我甘愿破例。\n\n从上一封信来看，你在新施瓦本一切安好。务必替我向迈尔带去最亲切的问候，告知他尽快回信，从五六年起我就再没见过他啦。跑题了，你那边有什么新鲜事吗，伙计？我这边拿来给朋友们写信的时间少得可怜，就今天我还不得不为了求点清净把秘书赶出办公室。真是丢人，对吧？现在这个世界真是太匆忙了。\n\n很抱歉以这样凄凉的调子作为结尾。金钱买不来内心的安宁，不过能买到国内最好的巧克力。可别一次吃完了。\n\n你的友人，赫尔曼·戈林。”\n\n埃里希读着信上的文字忍俊不禁，随手将一块巧克力喂进嘴里。收到好友的来信总归是件好事，但对方潦草的字迹又让他不免涌起一阵担心。赫尔曼为了享受奢华的日子特意把日程表排得很灵活，这般密集的时间安排一点都不像他。另外，这纸怎么只有半页？有这么粗心大意吗？赫尔曼也不是个说话简短还含糊其辞的人啊。一定有什么地方不对劲，而他将其藏在了字里行间。\n\n要是舒曼只是名被雇来维护设备的技术员，他肯定已经开始咬文嚼字了。恰恰相反，埃里希按照计划，在巧克力的包装纸里发现了一张纸条。他拾起纸条，开始阅读上面的文字："
 antarctica_aag.50.a:0 "“三天后会有一批武器从鲍赫勒施塔特运到你那儿。做好准备，戈林万岁。”"
 antarctica_aag.60.t:0 "山上的小伙子，月亮上的人"
 antarctica_aag.60.desc:0 "“感谢上帝，我来自萨尔茨堡……你们是从山上来的？”\n\n安东·格拉塞尔试图在沉默的雪地车上发起谈话但无济于事。陪伴他的三名士兵中只有一名同他说话。\n\n“不，长官……我们从威廉港来的。”\n\n谈话又一次中断了，就向在大风中的火焰。唯一的噪音是仪表盘上的便携式收音机。\n\n“——据报道，宇航员克尔纳已经到达了会场。韦恩赫尔·冯·布劳恩将会就以下事情发布新闻稿——”\n\n原来是这样，哼，德国征服了月球。在到达地球上每一个遥远的角落后，我们现在在朝着月球出发。安东对宇航员没有任何的蔑视，他只是希望南极能像太空人物那样得到重视。\n\n格拉塞尔和他的团队没有创造任何历史，而只是用双筒望远镜观察着，冻得他们屁滚尿流，来寻找任何“闯入”他们领地的祖先遗产学会人员。\n\n这一切都毫无意义，混乱在吞噬整个德国，而他们只是在通过这该死的双筒望远镜观察？\n\n他从家里人那里收到的信使他很担心。他有两个儿子，一个在读大学，另一个在伞兵部队。他们互相憎恨彼此，但每个人都写信给他。他来读这些信来打发时间。说真的，他更赞同他的小儿子，卡尔，他加入了当地大学的改革派分部。他的大儿子，阿尔布雷希特，是一个坚定的军国主义者，在空军中名列前茅。\n\n然而，他妻子给他写的信使他最为震惊，她在克虏伯兵工厂工作。订单增加了十倍，四大派系都在支持他们。他的妻子独自在家，而他的儿子们在互相争斗。"
 antarctica_aag.60.a:0 "安东所能做的就是继续用双筒望远镜观察。"
 antarctica_aag.70.t:0 "逝去的灵魂"
 antarctica_aag.70.desc:0 "“再来一杯茶，赫尔曼先生？”助理问道。\n\n“是的，谢谢。”恩斯特把他的杯子递给助理。他一边叹气，一边翻阅着来自日耳曼尼亚的最新电报，“由于非洲的局势日益紧张，一半的补给船队将会改道。只能先将就一下了。”\n\n收到这个坏消息后，恩斯特的思绪转移到了别处。也许这是他在旅行当中形成的一种应对方法，也或许不是，但他不在乎。他的思绪回到了第一次世界大战和之后的几年时光。在那以前，恩斯特从来没离开家超过二十公里，而他随即便发觉，自己身处一支庞大的军队之中，要与伟大的对手进行一场伟大的对决。\n\n他把手伸进钱包，拿出了一张照片。那是两个人，他和他的战友海因茨。那是1920年11月11日，在东京的一家酒吧前。回忆立刻如潮水般涌上心头：曾经有个百万富翁的儿子在他的排里服役，后来，魏玛共和国开始瓦解，恩斯特和海因茨便一同启程，依靠富翁战友设立的慈善基金去探索世界。\n\n他们一起从特拉维夫到德黑兰，从德黑兰到台北，再从台北到东京。这正是最后的目的地，他们在输掉大战的两年后拍下了这张照片。恩斯特正津津有味的回忆着，它把他带到了世界的四个角落。不幸的是，无论恩斯特走多远，他总是渴望着旧世界。而海因茨经历了这些事后，长刀之夜割断了他的喉咙。\n\n助理端着一杯热气腾腾的红茶走了进来。恩斯特抬起头，她把茶杯放下，问道：\n\n“您的战友？”\n\n“是的……他在一战救了我的命。”"
 antarctica_aag.70.a:0 "要是我能报答你的好意就好了。"
 antarctica_aag.80.t:0 "会面"
 antarctica_aag.80.desc:0 "“他们来了，备好武器！”赫伯特·弗赖塔格心怀厌恶地嘀咕着，但他心知自己不能掉以轻心，毕竟对面可是党卫队的人。这位头发苍灰的德国老人将望远镜收进背包，举起了手中的步枪，和他率领的一整个中队一起，静候党卫队的到来。白色地平线上的一个小点渐渐显出了一辆卡车的轮廓，向被赫伯特的队伍临时占领的，被指定为党卫队祖先遗产学会与新施瓦本之间谈判地点的哨所驶来。之前，上级给了弗赖塔格和他的小队两个选择：要么清理厕所，要么向党卫队移交物资。他们选择了后者，现在反而想去扫厕所了。\n\n运输车缓缓停了下来，一名衣着光鲜的党卫队军官与他的两名随从一同下了车。他那装饰浮华的制服外面还套了一层黑色羊毛外套，在冰冷的微风中显得格外潇洒。\n\n赫伯特和党卫队军官四目相对，谁也不想先开口，赫伯特的手下倒是在一旁和党卫队军官的随从抽起了烟。“别摸鱼了，赶紧干活。”两人几乎异口同声地向各自的下属说道。\n\n双方的士兵们匆匆忙忙地开始把物资搬上车，随着最后一个板条箱被放到了车厢里，他们迅速退到一旁，又点燃了几根烟。看到自己的下属在一旁融洽地相处，这两位指挥官也决定简短地相互寒暄几句。“先不说你们在搞什么鬼，工作还顺利不？”赫伯特尴尬地询问。\n\n党卫队军官叹了口气：“唉，一天一天瞎忙活罢了。本来我不应该向外人泄密的，所以，别把这些话往外说。每一批从勃艮第运来的货物都附带了一个新的坐标，无论如何，我们必须得去探查一番，然后每次都空手而归。”\n\n党卫队军官瞥了一眼他的手表，然后看向赫伯特。匆匆告别后，他把他的部下叫走，回程了。赫伯特也是如此，只不过他嘱咐司机快点开。晚饭时间马上就要到了，今天晚上有酸菜和炸猪排吃。"
 antarctica_aag.80.a:0 "赫伯特打心底里希望，这是他们在换季换班之前要交付的最后一批货物。"
 antarctica_aag.90.t:0 "创造"
 antarctica_aag.90.desc:0 "埃里希·舒曼清楚地记得，自己以前做过同样的梦。梦里是一个美丽的夏日，太阳从无云的天空中照耀太平洋的滚滚波涛。从他的BV-222水上飞机紧靠舷窗的座位上，舒曼感到自己正身处天堂。\n\n那天清晨，他们在一架日本帝国现役战略轰炸机原型——中岛G10N的陪伴下从中途岛的一座日军机场起飞。但它不是在那日飞上蓝天的唯一一种实验性武器。多年的辛劳与数月的计划即将在此刻变为现实，因此，从气流的强度，到飞机的高度，甚至他身上那套闪闪发亮的德国空军制服，舒曼对每个细节都无微不至地加以关照。毕竟，不管日本人是不是所谓的“荣誉雅利安人”，在执行元首本人的至高意志时，他们都不能被完全信得过。\n\n一座岛屿渐渐出现在了地平线上，轰炸机随即向左边倾斜。就这样，舒曼的飞机与目标保持着距离，不停地绕圈子，他看到有大概一百多艘各式各样的船只停泊在港口里。G10N打开了它的炸弹舱门，投下一个水滴状的胶囊，舒曼则在心中默默数数：“一秒……两秒……三秒……”三十秒后，在上午十一时二十二分，珍珠港的每一只钟表都停止了运作。第二个太阳于太平洋之上冉冉升起，战舰和航母纷纷被举到百尺高空，随后又被扔进被烧得沸腾的海中。没有什么能幸免于舒曼的怒焰，就连日本人的轰炸机也不例外。它已被烈焰吞噬，没有人事先告诉他们这枚武器的当量有多么恐怖。那一天，足足十万个灵魂被蒸发、被撕碎，或是被辐射折磨得生不如死。舒曼成了死神，世界的毁灭者。他见证了原子的分裂，以及其中所蕴含的，足以毁灭世界的力量。\n\n这时，舒曼才从梦中惊醒。他感到自己的思绪在棉被下燃烧，脑海中也只剩下一个念头："
 antarctica_aag.90.a:0 "“德国人民绝不会被我所创造的怒焰焚烧……”"
 antarctica_aag.100.t:0 "开端"
 antarctica_aag.100.desc:0 "埃里希·舒曼僵直地站在码头上，这寒冬腊月的鬼天气冻得他蛋蛋都要掉了。八月，这个在德国充满了啤酒，女孩和欢笑的月份，在南极大陆，却是正值隆冬。一切好像都在这片大地上颠倒了，甚至连季节也是如此。\n\n他目不转睛地看着又一个集装箱从停泊在他下方海湾的海军运输船的甲板上放下来——这是舒曼和戈林之间互惠互利的一次成果——在他的项目中采用的现代电子设备。“小心点！小心点！”舒曼对那些装卸工吼道，“这里面的东西比你们的命还要值钱！”\n\n在船上的货物全部卸完之后，舒曼认真考虑了货物交付的每一个环节。比如戈林是否在货物中“忘记”了一个更昂贵的组件，也许他已经把这些资金分配给支付另一辆跑车的首付或一次奢侈的狩猎之旅。但是这一次，戈林似乎已经帮了舒曼一把，因此，在时机成熟时，舒曼也会帮戈林一把。\n\n在舒曼踏上返回实验室的漫漫长路时，他思考着祖国的技术创新给他带来的各种可能性。激光测距技术——那是一种可以使核弹在其目标上空精确定时引爆的原型技术——无论它是民用的还是军用的。现在，在高精确度的前提下，舒曼已经可以将产量提高到难以想象的水平。只要材料能按时到货，一切皆有可能。"
 antarctica_aag.100.a:0 "舒曼走进实验室，开始他的研究内容。"
 antarctica_aag.100.a.tt:0 "§F启用§!§r新施瓦本§!§K核试验机制§!§F和§!§Y相关决议§!§F。\n我们的§!§B电子部件准备度§!§F将增加§!§Y5%§!。"
 antarctica_aag.110.t:0 "恩人"
 antarctica_aag.110.desc:0 "迈尔和他的工作人员穿过舒曼实验室的大门走进了由电脑芯片、扭曲的电线和金属框架构成的迷宫。这座实验室就像弗里茨·朗狂热的梦想。即使有一个机器人从阴影中走出来，迈尔也不会感到惊讶。\n\n“先生们，”舒曼说道，“欢迎光临。正如你们所看的，工作正在顺利进行。”这位科学家引导他的客人们穿过蜿蜒的金属管道。“其中的一些设计你们可能很熟悉。这一枚与珍珠港事件中使用的炸弹非常相似，尽管经过了现代化改造，从而可以在喷气式飞机上部署。”\n\n迈尔研究着这种泪滴形炸弹，回忆着他们第一次在南极实验所造成的破坏。冰层早已掩盖了那一刻的可见的伤痕，但看不见的伤痕依旧存在。\n\n“还有这个，”舒曼指着儿童大小的第一枚核弹，“这是陆军会喜欢的东西：一种短程战术核武器，用于师级，甚至旅级作战……”\n\n迈尔的目光放到了房间的后面，那里的工作台上放着一个圆锥体。“那是什么？”迈尔指着问道。\n\n舒曼转身一笑：“啊。是下一代核武器，这是永远保卫祖国的装置。想象一下，一枚远程巡航导弹顶上有一个圆锥体。任何大陆，任何城市，离毁灭只有几分钟的路程。有这样一种武器瞄准着他们，世界上的任何地方都没有人敢攻击我们的人民。”\n\n迈尔对此表示怀疑。舒曼的项目看起来得到了很好的资助，远远超过了航空部门。迈尔得到的每一批物资都要苦苦哀求；而舒曼的愿望在他开口之前就实现了。"
 antarctica_aag.110.a:0 "迈尔在思考舒曼的恩人可能是谁……"
 antarctica_aag.110.a.tt:0 "为§r新施瓦本§!§K核试验机制§!§F解锁额外选项§!§F。§!"
 antarctica_aag.120.t:0 "午夜"
 antarctica_aag.120.desc:0 "舒曼把研究团队集合到实验室里，打算就核武器的最新进展开个讨论会：“首先我想说，你们每个人都让我感到无比骄傲。特别是考虑到这里的条件，过去几个月的工作堪称典范。现在，我想你们或多或少都听闻了一些从国内传出的谣言，但要记住我们是推动科技与创新的科学家，不是什么操控政治的政客。我们所关心的领域和保障民众福祉同样举足轻重。”\n\n舒曼还未说完，猛的一阵开门声让刚要出口的话又缩了回去。迈尔因愤怒而涨得通红的脸于门口乍现，他手里攥着一页备忘录。“你疯了吗？”迈尔冲着舒曼吼道，“你想过没有，要是没有这些飞机，你那些炸弹就只能一辈子待在仓库里。更别说要是没有先进的飞机，我们早就被敌人甩开好几条街了！”\n\n舒曼手底下的人吓了一跳，可他本人却显得泰然自若：“我们的工作比起那些次要武器对国家更显重要。假以时日，飞机也不过是件淘汰品而已。”舒曼没给迈尔开口的机会，转身面向自己的同事，继续说道，“这正是我今天想与各位好好谈谈的原因。我们已经确保了裂变材料的供应，在第一次测试成功前这段时间里，接下来要做的就是设计用于搭载核弹头的火箭系统。终有一日，世上再无哪片土地能在日耳曼尼亚的视线外苟且偷生，也再无哪个势力胆敢谋害我们的祖国和人民。我们会造出有史以来最为强大的核武器，让敌人在恐惧与不安中惶惶不可终日！”语毕，“胜利万岁”的呼声与经久不息的掌声如浪潮般淹没了整个房间。\n\n迈尔的肺都快气炸了。"
 antarctica_aag.120.a:0 "时针指向午夜……"
 antarctica_aag.120.a.tt:0 "§F为§!§r新施瓦本§!§K核试验机制§!§F解锁额外选项§!§F。§!\n\n§r新施瓦本§!§F武器测试机制与§!§Y各类决议§!§F将被禁用。§!"
 antarctica_aag_grasser_chain.10.t:0 "去钓鱼吧"
 antarctica_aag_grasser_chain.10.desc:0 "安东·格拉塞尔是个老渔民了。自他拿得动鱼竿，父亲就教会了他怎么钓鱼。有鉴于此，格拉塞尔的双胞胎儿子们能拿起鱼竿时，他就自然而然地带他们去了瓦勒湖。那里距萨尔茨堡只有二十分钟的车程，也是父亲教他钓鱼的地方。\n\n那是1950年，两个儿子时年六岁。四月的一个清晨，草丛上挂满了露珠，父子三人带着鱼饵、鱼竿和三明治前去瓦勒湖。一个小时后，他们便驻足于一块风水宝地。格拉塞尔在帮小儿子卡尔挂鱼饵时，大儿子阿尔布雷希特开口提了个问题：\n\n“爸爸？”\n\n“啊，阿布，什么事啊？”\n\n“为什么你老是不回家？”\n\n格拉塞尔斟酌着是否要说出沉重的事实，毕竟平铺直叙说明问题才是上策。孩子们不懂战争为何物……但阿尔布雷希特还是相当喜欢《日耳曼尼亚上尉》这部漫画的。\n\n“呃，那你知道日耳曼尼亚上尉为了保护首都是怎么战斗的吗？”\n\n阿尔布雷希特抬头看向父亲，湛蓝的眼睛满是问号：“嗯……”\n\n“这就是爸爸的使命啊……因为上尉没法独自保卫日耳曼尼亚呀。”\n\n听到父亲说自己和到处抗击莫斯科先生的日耳曼尼亚上尉共事，阿尔布雷希特的眼神一下子明亮了起来。大儿子想要效仿父亲守卫家园、保护母亲和学校里的朋友。\n\n“等我长大了……我想和你做一样的事情。我想参军！”\n\n格拉塞尔的心一下子凉了半截。他知道前线是怎么样的，光是想想让自己的孩子上战场就感到惭愧。照理来说，这些话足够让阿尔布雷希特去太阳地下罚站了，但格拉塞尔打消了这个念头，毕竟体罚就别代代相传了。他扮出一个假笑，眺向湖水，开口说："
 antarctica_aag_grasser_chain.10.a:0 "“阿布，只要你快乐就好。”"
 antarctica_aag_grasser_chain.20.t:0 "无法为时间治愈之殇"
 antarctica_aag_grasser_chain.20.desc:0 "安东·格拉塞尔痛恨变故，而这也是为什么他钟爱瓦勒湖。时光茬在，自己已非孩童，但这片宁静的湖水从未有过一丝波澜，人类在这里留下仅有的痕迹便是通向它的公路和湖边零散的小屋。他和两个儿子在很多地方钓过鱼，但这片湖是有特殊意义的。今天过后的很长一段时间内，三人或许再也不会相见：卡尔已经被维也纳大学录取，有望在学术界走上高位；阿尔布雷希特则进入空军服役，在派系斗争中找到了自己的落脚点，前途似锦。格拉塞尔从来就没对军队党争上过心，但大儿子拥护军国派的理念，乐在其中。因此，格拉塞尔也为他感到高兴。\n\n说到底，只要在军中不断向上爬，就能摆脱琐碎的派系斗争。军衔越高，派系分歧越小。转念一想，现在不是讨论未来的时候。童年时期，格拉塞尔一直陪着孩子们钓鱼，今天也没什么不同。\n\n一家子的大家长格拉塞尔被调离了匈牙利的闲职，转而护送一名核物理学家前往南极：这显然是因为某些大人物看中了他的经验和保镖能力。格拉塞尔从来就不喜欢寒冷，但能避开朝他打枪的俄国佬总是好的。话说回来，现在只要抛出鱼线，安心和两个大小伙子一起喝比尔森啤酒就行。不过，事与愿违，他们无力维持这份平静。谈笑间，三人终于触及了敏感的政治话题，很快就说到了改革问题。不出几句，两个孩子就丢下鱼竿，为此吵了起来，最终演变为拳脚相加。真他妈操了，多大人了，还得像小屁孩那样掐架！格拉塞尔身为人父，自然上前想拉开二人，化解冲突。劝解未果后，他只能吼着让孩子们停手。\n\n三人在归途中都一言未发。格拉塞尔试着把注意力放在车载电台的音乐上，但即使是吹过稀疏头发的清风，也没能让他好受些。\n\n“我他妈要去南极了，现在就想和你们俩再钓最后一次鱼！你们就不能在这一下午时间里忍着点，别高谈阔论那些政治狗屁吗！”\n\n气急败坏的格拉塞尔长叹一口气，看了看分别坐在副驾和后座上的两人。孩子们完全没在听。不得已，他选择继续保持沉默。"
 antarctica_aag_grasser_chain.20.a:0 "至少我一个人把带来的三明治消灭干净了……"
 antarctica_aag_grasser_chain.30.t:0 "官僚主义之手与我击掌"
 antarctica_aag_grasser_chain.30.desc:0 "埃里希·舒曼正要做一件非常愚蠢的事情。他感到头晕目眩，胃里也随之翻江倒海。在公众视线中闪耀了二十年的他身上散发出的那种紧张情绪，即使是最精细的人也难以察觉。终于，他下定决心，敲了敲安东·格拉塞尔办公室的门。虽然三秒后格拉塞尔就开了门，但对他来说，这三秒如同过了三年。安东有些茫然地注视着好似灵魂被贯穿的舒曼，开了口：\n\n“埃里希，我能为你做些什么？”这位眼尖的巡逻员很快发觉舒曼有些不对劲，如同挂钟一般僵滞。他肯定花了许多年时间来培养这种细致观察人物神态的专长，这让舒曼感到有些可惜，他花了这么多精力，就为了像读书一样读出人的心思？假装对这一切浑然不知的格拉塞尔立刻把舒曼迎进了他的办公室。\n\n“要不要来点喝的？我和手下的小伙子们凑了点钱，从一艘路过的印度商船那里买了不少好茶。要我说，这钱花的可真不亏！”\n\n埃里希点了点头，他的嘴唇早已干燥开裂，但他仍在故作镇定。尽管安东能从他的动作中看出，他已经有些动摇。门咔塔一声关上，铁壶中传出咕嘟咕嘟的响声，格拉塞尔回到了他自己的座位。他知道，这位核物理学家肯定不是来和他喝茶聊天的，可尽管如此，他还是装作好奇地倾听舒曼的话。\n\n“安东，你说反了，应该是，我能为你做些什么……”就像他在此之前已经排练过这个动作一百遍一样，埃里希将手伸进衣袋，掏出了一封信，把它给了格拉塞尔。在他阅读这封信的时候，埃里希说出了他的想法：\n\n“你看，我和赫尔曼·戈林已经保持联络有一段时间了，他知道你有一个儿子在德国空军服役。我不知道你们之间的关系如何，但戈林提出了一个……交换条件。你对我好，戈林也会对你孩子好。仔细考虑一下吧。”\n\n安东把信放到桌子上，用深渊般的眼睛凝视着这位胆大的科学家。以前，他通常会选择去找鲁道夫·迈尔，跟他交换交换意见，但他知道，这样的选择一生只能做一次，且没有后悔的余地。他知道军队的官僚体系很臃肿，不认识熟人，不走后门，是很难获得晋升的。热水壶发出一阵声响，打断了他的思绪。安东站起身，关掉了炉子。在紧张的沉默气息中，安东将热水倒进了两只自他在匈牙利驻军中服役时就一直陪伴着他的旧马克杯中。他再次坐了下来，沏好了茶，给了舒曼一个简短的回复："
 antarctica_aag_grasser_chain.30.a:0 "“我接受。”"
 antarctica_aag_schumann_chain.10.t:0 "布雷斯劳的晚宴"
 antarctica_aag_schumann_chain.10.desc:0 "在埃里希·舒曼刚刚踏上南极土地的那一刻，他曾孤傲地蔑视这片大陆，毕竟，这是一片荒寂的不毛之地，周围好几公里都见不到一个活人。而现在，这里好几公里范围内都见不到一个活物。核弹刚刚运达不到一周，就被引爆了，这意味着南极对大日耳曼国来说又多了一个用处，很快，又会有很多颗致命武器在此引爆。\n\n这位名声赫赫的物理学家在德国政治金字塔的最高层找到了一个朋友：德国人敬爱的叔叔，空中的英雄，赫尔曼·戈林。在他漫长的职业生涯中，许多人都曾试图拉拢舒曼，但正是曾经身在布雷斯劳时，舒曼在那里遇到了一个人，为他的南极核试验计划开了绿灯。\n\n1958年的那一天，天气比舒曼的丈母娘对他的态度还要冰冷。天空中的月光透过用法式浮雕装饰的窗户，谈话声此起彼伏，酒杯相互碰撞，每个人都品尝着上好的香槟。舒曼则正忙着在自助餐区大快朵颐，享用北海出产的优质虾肉。为了填满他那咕咕叫的肚子，他连形象都顾不得了。就在这时，一只手伸向舒曼盯上的那只肥美鲜虾，命运让他与一个十年未见的故人在此重逢。出于礼貌，舒曼把手伸了回来，扭头望向那只手的主人，只见赫尔曼·戈林，德国人的叔叔，带着慈祥的微笑把那只虾夹进了自己的盘子里。\n\n“你在这干啥呢？化悲痛为食欲吗？”赫尔曼打趣道，试图创造出一种戏谑的气氛。\n\n“也许吧，戈林叔叔，与之相比，更像是趁朋友们不注意，我得多吃点好的贵的。”说罢，舒曼的脸上挤出一抹笑容。他甚至故意用了“戈林叔叔”这个可爱的绰号。\n\n“无论怎么说，很高兴再次见到你。”戈林贴近舒曼的耳侧，说道，“其实，我也在躲熟人。”他往后退了几步，很明显没有想让谈话停下来的意思：“自从日耳曼尼亚的胜利游行之后，我就再也没见过你了，那时它还叫柏林……来，咱们再唠十块钱的，反正得过好一会他们才能继续补菜。”\n\n两人在寒冷的阳台上讨论着各种话题，度过了夜晚余下的时光。从体育明星到跑车，车轱辘话转了一圈又一圈，直到宴会逐渐结束。人群散去，他们各自的跟班终于找到了两人。简短地握了握手后，两人分道扬镳，心中确信，他们很快就会再次相聚。"
 antarctica_aag_schumann_chain.10.a:0 "当赫尔曼·戈林走向他的座驾时，情不自禁地笑了。他的计划已经顺利地迈出了第一步。"
 antarctica_aag_schumann_chain.20.t:0 "卡琳宫之蓝调"
 antarctica_aag_schumann_chain.20.desc:0 "距离布雷斯劳的那场晚宴已经过了一个月，这天，赫尔曼·戈林将原子之父邀请到了卡琳宫，他那显赫的住所，和他一起“抽烟喝酒”。两人开始谈起他们是如何接触并喜爱上他们现在干的活计的，赫尔曼讲述了他在第一次世界大战期间与一位战友一同执行他们的首次任务的经历，然后才切入正题。\n\n“这是个有些敏感的问题，但能不能请你告诉我，你认为大日耳曼国的未来将会如何？”对于这个问题的答案，戈林早已心知肚明，他只不过想听到它从舒曼的嘴里脱口而出罢了。\n\n“我认为，我们的国家将由地位与德行相配的领袖，而非党的傀儡来领导。”听罢，戈林故作惊讶地从座位上站了起来。\n\n“我得说，咱们俩是一路人。事实上，这就是我今天邀请你光临寒舍的原因。你看，我正在组建一个……派阀，它将由来自德国各地的志同道合者组成，其政治目的是让那些像你一样的专业人士、科学家和进步主义者在管理事务方面拥有更大的话语权。”\n\n“舒曼先生，你是个聪明人，我相信你知道当我们敬爱的元首离开今世时，德国会怎样。毫不夸张地说，一场内战在所难免，而我想让你远离可能在德意志大地上燃起的战火。告诉我，你去没去过南极？”\n\n“没去过，但是……”\n\n“我相信，在那片冰封的大陆上，存在着一些能让咱们俩都从中获益的事物。你也知道，那里太冷了，以至于我国已经放弃了对其殖民的尝试，但我们为它找到了一个新用途：航空研究设施。鲁道夫·迈尔中校曾是我的朋友，但他已经变得软弱了。这个人以飞行员自称，却和鲍曼，那个正如你所说的，党的傀儡勾肩搭背。他没有作出哪怕一丁点变革的勇气，但肯定也不会蠢到不尝试着邀请像你这样才华横溢的科学家加入他们的队伍。”\n\n舒曼咧嘴一笑，脑海中的齿轮已经在嗡嗡作响，想象着氢弹在南极的土地上爆炸的场面。很快，戈林就扫兴地将他从幻想中拉了回来：“所以，怎么说？”\n\n“我上你的贼船了，但我只想知道一件事：我得做些什么？”"
 antarctica_aag_schumann_chain.20.a:0 "戈林吸了一口气：“当我的笔友，经常给我写几封信，然后仔细读读我的回信就行了。”"
 antarctica_aag_schumann_chain.30.t:0 "为寒夜准备的烈酒"
 antarctica_aag_schumann_chain.30.desc:0 "埃里希·舒曼从来不是一个喜欢喝酒的人，但他的身体实在是需要些酒精。通往秘密会面地点的路很坎坷，也很漫长。在过去的一个月里，他一直在与各种各样的人秘密会面。毕竟，武器再好，没有人用也白扯。埃里希鼓励派系成员尽可能多地推荐朋友加入他们，此举吸引了许多被疏远的，渴望从军国派的掌权中得到些好处的军官和士兵。当然，随着这个秘密在朋友间口耳相传，总会有人泄密的，但他们已经不需要新人了。现在，随着他们的人数已经足够发起一场政变，只要戈林叔叔一声令下，他们就能接管南极领地的军政大权。\n\n舒曼抿了一口廉价玻璃杯中盛着的威士忌，一个念头突然从他脑海中闪过。\n\n“你真的确定吗？”\n\n多数情况下，总是与他共谋的军官问他这句话，而非反过来。为此，他有一大长串的理由。\n\n“军国派是唯一一群有胆量解决大日耳曼国所面临的种种问题的人。”\n\n“如果原子之父都信任赫尔曼·戈林，你为什么不呢？”\n\n不幸的是，除了戈林对美好未来的承诺之外，埃里希完全没有什么动机可言……他对IG法本的投资倒是获得了回报，其首席执行官赫尔曼·约瑟夫·阿布斯赠送了他一件相当慷慨的生日礼物：五千股IG法本的股票。也许他的动机并不完全是基于爱国情怀，也有些，不，应该是相当一大部分个人利益的成分在里面。\n\n舒曼低头看了看他的荣瀚宝星手表，这是恩斯特·冯·西门子送的。这帮商业巨头到底会给施与他多少小恩小惠？舒曼叹了口气。\n\n仔细看过时间之后，他刚刚的念头很快被焦急替代。已经凌晨两点一刻了，下一场秘密会面半小时后就会开始，最好赶紧出发吧。"
 antarctica_aag_schumann_chain.30.a:0 "埃里希迅速放下了手中的威士忌——那是戴姆勒-奔驰的老板，弗里德里希·弗利克的盛情。"
 antarctica_aag_schumann_chain.40.t:0 "背信弃义的包裹"
 antarctica_aag_schumann_chain.40.desc:0 "“我得说，我没想到帮我取包裹的会是你，赖克。”\n\n“为什么？就因为我不是你这种万众瞩目的，一天天倒弄原子中子的花花公子？”这名士兵的回应如同侵袭他们的寒风一般冰冷。\n\n舒曼被他充满敌意的反应吓了一跳，随后喃喃地回应道：“好吧……当我没说，等咱们把这事办妥，就能回去睡大觉了。”\n\n对睡眠的渴望让这位好斗的士兵瞬间冷静下来，与舒曼默默等待着德国海军的水手们把东西全都搬下船。码头之外，平静的夜空与海洋连成了一片。凝视这景象是很危险的举动，因为它会让人迷失其中。\n\n为了与大家打成一片，赖克开始向疲惫不堪的水手们分发香烟，他们也都欣然收下。与此同时，这名步兵注意到了一位海军军官，他留着普鲁士式的胡子，表情难以描述。在赖克与一名纹着纹身的水手一同抽烟聊天时，那名军官开始向水手们发号施令。赖克走近了他，还没等他开口，那人就对他大吼起来：\n\n“给我回到你的岗位上去，把烟掐了！”赖克被这突如其来的一嗓子喊懵了，以至于忘了对暗号。军官被眼前这个呆若木鸡的家伙激怒了，他举起手臂，想再喊几嗓子，这时，舒曼走到了他们面前，试图让军官冷静下来。\n\n“嘿，嘿，这可不是迎接老朋友的好法子。还记得当年咱们一起在维也纳的日子不？”听罢，军官瞪大了眼睛，一抹笑容逐渐在他脸上浮现。\n\n“当然，舒曼先生，请接受我最诚挚的歉意，您的包裹很快就会送到您那里。”军官将身子转向一边的赖克，用沙哑的语气对这名恼怒不已的士兵说道，“至于你……下次最好把暗号给我记牢了，现在，滚吧。”\n\n两人转身走下了舷梯，尴尬的沉默很快被舒曼打破。\n\n“你不必说谢谢，赖克。”埃里希打趣道。\n\n赖克忍不住破涕为笑：“我压根没打算道谢。”\n\n两人接过他们各自的武器箱，将它们抬到基地的军火库。一路上，二人一直在抽烟，以便保持温暖。"
 antarctica_aag_schumann_chain.40.a:0 "“再说，谁会拒绝额外的配给呢？”"
 antarctica_aag_schumann_chain.50.t:0 "向魔鬼交出你的灵魂"
 antarctica_aag_schumann_chain.50.desc:0 "在敬爱的元首去世两周后，埃里希·舒曼收到了一封从德国本土寄来的信。过去的一周让他伤透脑筋，脑海中不断回荡着戈林的话：\n\n“毫不夸张地说，一场内战在所难免，而我想让你远离可能在德意志大地上燃起的战火。”\n\n现在，他正身处世界的最底端，等待着发动政变的命令。如果运气好的话，应该不会发生什么流血事件，但舒曼不是傻瓜，他知道南极的雪地定会被染红。舒曼坐在座位上，尽情品尝顶上覆盖着一层浓厚奶油的热巧克力。除戈林寄来的信外，他的办公桌上空无一物。\n\n他知道，每个人都在打着他们自己的小算盘。许多空降猎兵部队擅离职守已经有一个星期了，现在他们又突然出现在布雷斯劳，以戈林为首的军国派的老巢。埃里希动作僵硬地抓起放在办公桌最右侧角落的拆信刀，小心翼翼地打开了信封。\n\n“致我最好的朋友，\n\n正如你所知，我为元首的逝世感到万分悲痛。我希望权力能够和平地过渡，但很显然，这不可能。现在，那些我曾视为朋友的人都把枪口对准了我。虽然我不想看到兄弟阋墙，但我别无选择，只能拿起武器进行自卫。空军已经宣布忠于我的事业，但鲁道夫·迈尔还没有。”\n\n埃里希嗤笑了一声，这很明显是他给自己发动政变找的借口。埃里希知道自己可能会被判叛国罪，但他已别无选择。\n\n“我本不想走到这步的，但作为我的朋友，你应该了解我这个人。请说服鲁道夫·迈尔，让他知道，只有军国派能带领德国走上一条光明的道路。\n\n最后，祝你平安。\n\n你的朋友，\n\n赫尔曼·戈林\n\n注：我给你寄了一些你最喜欢的巧克力，这可能是你一段时间以内能收到的最后一份货物了，祝你好运。”\n\n埃里希不得不承认，在戈林让他“仔细地阅读寄来的信件”时，他并没有意识到戈林这么会精打细算。他叹了口气，拆开巧克力的包装纸，发现其中夹着一张纸条。"
 antarctica_aag_schumann_chain.50.a:0 "“政变的时间定在午夜，我会把日期交给你来决定。看完后请把这封信烧掉，戈林万岁。”"
 antarctica_aag_testing.10.t:0 "第一次试飞"
 antarctica_aag_testing.10.desc:0 "在大日耳曼国将战火烧到盘踞北美的犹太财团家门口之日，Ho-229将负责向北美空运德国的核武器。鉴于美国无耻地占领了冰岛，该地区可能会爆发冲突，因此，Ho-229必须具备在零下数十摄氏度的环境中仍可以正常运作的能力。副翼悬挂接头可能因结冰而报废，燃料也可能在油箱内冻结，如果低温让任何重要的精细零部件出现坏损，后果将不堪设想。\n\n即使在海岸地区，高空飞行也是个挑战。Jet-A-1，即大多数团结协定现役飞行器所使用的燃料，会在零下四十七摄氏度左右冻结。南极的平均气温远低于零下四十七摄氏度，但海岸地区的气温要高些，我们只要稍加改进，就能让飞行器在海岸地区安全飞行。在内陆进行测试意味着我们需要对飞行器进行大刀阔斧的改造，以便其能在更寒冷的气候下运转。我们也需要动用Jet-B航空燃油的储备，以免发动机在打着火之前就被冻结。虽然对它的试验很可能失败。但我们有信心和能力设计并制造出更好、更可靠的机型，远离华盛顿和东京的窥视，对它们进行测试。"
 antarctica_aag_testing.10.a:0 "在海岸线上飞行。我们需要尽快把事情做好才能保持领先。"
 antarctica_aag_testing.10.a.tt:0 "这将花费§W2补给§!£Antarctica_texticon_SUP 。"
 antarctica_aag_testing.10.b:0 "让我们把这件事做好，飞到内陆去。总比让美国人发现要好。"
 antarctica_aag_testing.10.b.tt:0 "这将花费§W5补给§!£Antarctica_texticon_SUP 。"
 antarctica_aag_testing.11.t:0 "成功的飞行测试！"
 antarctica_aag_testing.11.desc:0 "Ho-229轰炸机优美地飞越南极洲的天空。据我们所知，美国人和日本人都不知道这次试验。日耳曼尼亚肯定会因为我们杰出的成就而表彰我们！"
 antarctica_aag_testing.11.a:0 "德意志工艺的力量。"
 antarctica_aag_testing.11.a.tt:0 "我们将获得§R2军事点数§!£Antarctica_texticon_MIL 和§G2宣称点数§!£Antarctica_texticon_LEG 。\n我们对§r霍顿Ho-229§!的测试进度将推进§Y15%§!。"
 antarctica_aag_testing.12.t:0 "灾难性的飞行测试！"
 antarctica_aag_testing.12.desc:0 "Ho-229已经变成了一具于南极冰原上熊熊燃烧的残骸。飞行员被燃烧的铁笼困在其中，缓慢而悲惨地死去。德国空军要我们交付飞机，而我们只能给他们呈上一张写满各种事故的清单。至少美国人还不知道这件事，希望如此吧。"
 antarctica_aag_testing.12.a:0 "该死。"
 antarctica_aag_testing.12.a.tt:0 "我们会失去§G3宣称点数§!£Antarctica_texticon_LEG 。\n§r霍顿Ho-229§!的测试进度将推进§Y3%§!。"
 antarctica_aag_testing.13.t:0 "发现德国测试项目！"
 antarctica_aag_testing.13.desc:0 "我们的一架E-2探测到了一架飞机沿着新施瓦本海岸飞行，里普的团队报告称，这架飞机的特征跟纳粹的霍顿Ho-229喷气式轰炸机类似。我们暂时不确定这是一型新式飞机还是改型。"
 antarctica_aag_testing.13.a:0 "他们在这儿做什么？"
 antarctica_aag_testing.response.tt:0 "对§r新施瓦本§!的§B情报掌握度§!将提高§B4§!£Antarctica_texticon_INTVAL "
 antarctica_aag_testing.14.t:0 "发现德国测试项目！"
 antarctica_aag_testing.14.desc:0 "我们的一个内陆雷达站监测到了一架飞机正飞越新施瓦本，里普的团队报告称，这架飞机的特征跟纳粹的霍顿Ho-229喷气式轰炸机类似。我们暂时不确定这是一型新式飞机还是改型。"
 antarctica_aag_testing.14.a:0 "他们在这儿做什么？"
 antarctica_aag_testing.15.t:0 "发现德国测试项目！"
 antarctica_aag_testing.15.desc:0 "今天，我们的一座内陆雷达站发现了一架似乎是Ho-229的轰炸机并发出了警报，南极内陆的宁静也因此被打破。像轰炸机这样的重型设备在南极是很难得一见的。有些人开始猜测，德国佬是不是在秘密向新施瓦本转移装备，以发动全面攻势？很显然这不太可能。他们大概只是在测试新型号的飞行器罢了。不过，考虑到在他们捏造了一个有关宪兵队派人刺杀其元首的荒谬谎言之后，我国与德国的关系迅速恶化这一点，我们还是得做好万全准备。"
 antarctica_aag_testing.15.a:0 "我们必须随时准备捍卫日本在南极的利益。"
 antarctica_aag_testing.16.t:0 "发现德国测试项目！"
 antarctica_aag_testing.16.desc:0 "当时，大野广一手下的宪兵正驾驶着一架预警机在海岸巡逻，忽然，他们的雷达探测到了一架德国人的Ho-229轰炸机。像轰炸机这样的重型设备在南极是很难得一见的。有些人开始猜测，德国佬是不是在秘密向新施瓦本转移装备，以发动全面攻势？很显然这不太可能。他们大概只是在测试新型号的飞行器罢了。不过，考虑到在他们捏造了一个有关宪兵队派人刺杀其元首的荒谬谎言之后，我国与德国的关系迅速恶化这一点，我们还是得做好万全准备。"
 antarctica_aag_testing.16.a:0 "我们必须随时准备捍卫日本在南极的利益。"
 antarctica_aag_testing.20.t:0 "第二次试飞"
 antarctica_aag_testing.20.desc:0 "霍顿Ho-229像一只雄鹰一样翱翔在南极荒原上空。在两万英尺的高空，人们甚至都无法看清占据这片大陆的庞大企鹅军团。不过，克劳泽中尉的注意力集中在他前面的广阔天空上。经常担任他副驾驶的威廉·贝克尔通过无线电对他说道：“你现在可以继续爬升了，他们想测试这玩意儿能不能达到二十米每秒的爬升速度，但如果你的升降舵开始结冰了，你也可以平飞。”\n\n“我们是不是玩得太安全了？”克劳泽问道。“我还想搞点刺激的呢。”\n\n短暂的平静后，贝克尔对克劳泽说道：“他们叫我告诉你，就这一个原型机，不能搞坏它。我知道你就那点薪水，你赔不起这架飞机的。”\n\n克劳泽笑了：“明白。开始爬升。”他往回拉操纵杆，向高空飞去。随着高度表快速转动，他感受到重力正在压向他的胸口。爬升速度才十八米每秒而已，他的手指就快冻僵了，虽然连继续操控飞机都变得十分困难，但他仍然觉得这架飞机仍然可以再爬高一点……"
 antarctica_aag_testing.20.a:0 "“我已经离我的运气越来越远了。我要回基地了，威廉。”"
 antarctica_aag_testing.20.a.tt:0 "这将花费§W2补给§!£Antarctica_texticon_SUP 。"
 antarctica_aag_testing.20.b:0 "“我想飞机和我还能再加把劲，继续增加上升角度。”"
 antarctica_aag_testing.20.b.tt:0 "这将花费§W5补给§!£Antarctica_texticon_SUP 。"
 antarctica_aag_testing.21.t:0 "例行公事"
 antarctica_aag_testing.21.desc:0 "伴随着工程师们的掌声与笑容，克劳泽回到了屋内。贝克尔递给他一瓶美国产的威士忌酒，并狡猾地眨了眨眼。“来，接着，别问我是从哪找到这玩意儿的。”\n\n“你不用和我说两次。”克劳泽一边拧开瓶盖一边应道。\n\n这时，赫尔曼（其实他也不确定这人叫不叫这名），安东·格拉塞尔手下的走狗，走了进来，瞪着两名飞行员，让他们的好心情一扫而空。“克劳泽，贝克尔，我很高兴你们完成了这项测试，也许你们俩能让我们这些凡人在演习的时候沾点光？”\n\n二人哼了一声，克劳泽把威士忌的盖子又拧了回去：“咱们还是赶紧出发吧，威廉。你也知道格拉塞尔从来都对迟到的人不客气。”"
 antarctica_aag_testing.21.a:0 "“他没准会把咱们当成靶子的。”"
 antarctica_aag_testing.21.a.tt:0 "我们对§r霍顿Ho-229§!的测试进度将推进§Y8%§!。"
 antarctica_aag_testing.22.t:0 "极限测验"
 antarctica_aag_testing.22.desc:0 "克劳泽的飞机正直冲云霄。他的手死死地攥着控制杆，重力让他的脸庞青筋暴突，各色各样的光芒在他视线中闪过，就连天空都被染成了深紫色。\n\n这时他才意识到，不仅天空渐渐变暗，他的视野也在不断缩小。光芒逐渐暗淡下来，仅余死寂的深灰，一股寒流刷遍他的全身，使他陷入了昏迷。\n\n等他再次醒来时，他已经仰面朝天，腿上也缠着绷带。“兄啊，你终于醒了。”一个再熟悉不过的声音响起。克劳泽环顾四周，发觉贝克尔坐在他的床边，“所以，你是想先听好消息还是坏消息？”\n\n克劳泽竭尽全力，从嘴唇间挤出一个“好”字。\n\n“好吧，好吧，好消息是你还没残疾，过一段时间就能下地，能跑能跳，也能继续开飞机。坏消息是，你再也开不了Ho-229了，估计它现在正躺在南极海底的某个地方，离咱们的港口不远，我们就是在那发现你的。不知为何，在飞机坠毁之前，你设法弹射出了机舱。”\n\n克劳泽眨了眨眼睛。\n\n“令人惊讶的是，科学家们对这次试验很满意。”贝克尔继续讲道，“爬升速度超过二十二米每秒，这远远超出了预期，而且根据遥测数据，液压系统和升降舵直到坠毁都在正常运作，也就是说，你是唯一掉链子的地方。只要对供氧和隔热系统稍加改进，这种机型就能正式投入到俄罗斯的战事中。”"
 antarctica_aag_testing.22.a:0 "“也许马上就可以……”"
 antarctica_aag_testing.22.a.tt:0 "我们对§r霍顿Ho-229§!的测试进度将推进§Y15%§!。"
 antarctica_aag_testing.30.t:0 "第三次试飞"
 antarctica_aag_testing.30.desc:0 "埃里希·舒曼遇到了麻烦。\n\nHo-229是一种被非常严苛的指标，即“3x1000”所限定的飞行器。在最初计划阶段，赫尔曼·戈林元帅制定了一个毫无想象力的目标，即建造一种能够达到1000公里/小时的空速、1000公里的航程、拥有1000公斤的总有效载荷的飞行器。\n\n舒曼嗤笑了一声。真他妈是疯了！他真是对喷气式飞机一窍不通！戈林自第一次世界大战结束以来就没有参与过飞行实战，却认为自己有权指导下一代飞机的开发。“下一代”，真是个完美的讽刺，毕竟德国的飞行器设计比日本和美国落后了整整十年。在腐败的官僚主义烂摊子和党派内斗之中，任何可能的技术创新都会于萌芽阶段就遭到扼杀。\n\n但也许，后一个问题马上就会得到解决。\n\n但现在，埃里希·舒曼遇到了麻烦。\n\n现在，戈林想要Ho-229具备携带核武器的能力，但这完全与其初始设计不相容。要想达到戈林的期望，Ho-229需要牺牲速度和航程，这会使它无法满足3x1000定则，还会让它在俄罗斯广袤土地上的作用大减。他得作出取舍：要么牺牲其速度和航程，要么砍掉它搭载核武的能力。\n\n舒曼必须作出决断。"
 antarctica_aag_testing.30.a:0 "能搭载核武器的远程战斗轰炸机肯定有用处。戈林想要什么就得得到什么，就算在我这也是如此……"
 antarctica_aag_testing.30.a.tt:0 "这将花费§W5补给§!£Antarctica_texticon_SUP ，同时我们会获得§R1军事点数§!£Antarctica_texticon_MIL 。"
 antarctica_aag_testing.30.b:0 "反正是戈林一手制定了3x1000指标。无论如何，空速更快的战斗机肯定能起到更大的作用……"
 antarctica_aag_testing.31.t:0 "秘密手段"
 antarctica_aag_testing.31.desc:0 "“致舒曼\n\n“你对Ho-229的升级改造十分巧妙，我必须祝贺你一番。虽然我更希望让它的设计规格与原来相比不作太多改变，但考虑到南极的恶劣环境限制了你的才能，我可以理解这一点。我希望在一个月内收到关于飞行测试的完整报告，并且兴奋地看到经过改装之后，它能够发挥什么作用。\n\n舒曼把信件放到了蜡烛旁边，热量让新的文字出现在了信纸的空白部分。戈林搞秘密通讯的手段很原始，但即便在今天它仍然有效。\n\n“博士，我得说，虽然能携带核武器的战斗机肯定会在未来与日本和美国的战争中派上大用场，但在德国本土爆发内战时，它对我们有害无益。但正如上文所述，我知道你的工作条件并不理想，因此，我们会尽快让你把精力放回你个人的项目上。\n\n“对于你的努力，我感激不尽。\n\n“你的朋友”"
 antarctica_aag_testing.31.a:0 "带着鄙夷的表情，舒曼让蜡烛的火焰吞噬了信纸。"
 antarctica_aag_testing.31.a.tt:0 "我们对§r霍顿Ho-229§!的测试进度将推进§Y8%§!。"
 antarctica_aag_testing.32.t:0 "替代手段"
 antarctica_aag_testing.32.desc:0 "听完舒曼的话，格拉塞尔皱起了眉头。“我不明白，”格拉塞尔说道，“戈林已经亲自下令，要我们对Ho-229的这些关键部分进行修改，如果我们不这么做，那就不仅仅是抗命的事了……”\n\n舒曼将食指放在了他的嘴唇上，示意格拉塞尔保持沉默。“戈林元帅不知道新施瓦本的局势有多么不稳定。现在，我们几乎没有物资来完成他要求我们进行的测试，更不用说对机身进行大刀阔斧的改动了。”舒曼走近格拉塞尔，轻声说道，“如果戈林说的是对的，我们的祖国很快就会四分五裂，与其让我的造物夺去万千德国人民的生命，我宁可去死。”\n\n格拉塞尔知道，舒曼所说的“造物”不是Ho-229，而是核弹。"
 antarctica_aag_testing.32.a:0 "“我希望你知道自己在做什么，舒曼。你这是在恩将仇报。”"
 antarctica_aag_testing.32.a.tt:0 "我们对§r霍顿Ho-229§!的测试进度将推进§Y8%§!。"
 antarctica_aag_testing.40.t:0 "第四次试飞"
 antarctica_aag_testing.40.desc:0 "克劳泽走到了迈尔的办公室门口，立正敬了个礼：\n\n“胜利万岁。”\n\n迈尔把视线从报纸上移开，看着克劳泽道：“轻松点儿，中尉，坐下吧。”指了指对面的椅子。\n\n克劳泽一屁股坐在了那张红木椅子的柔软皮革上，抚摸着椅子的扶手，想着，要是他的飞机驾驶舱座也有这么舒服就好了。他抬头看着桌子和周围的书架，上面都是照片。他注意到了，这些都是老照片，有些已经开始褪色泛黄了。\n\n迈尔注意到克劳泽看着那些照片，笑道：“这些照片大部分都是战争时的了，里面大多数人都已经死了，而活下来的人也希望自己没活下来。”他叹了口气，“你无法想象那是什么日子，似乎祖国的男女老少人人都有自己的荣誉，还有游行，勃兰登堡门从早到晚都在举行火炬游行！就像永远不会结束一样。”\n\n“但是它……结束了，不是吗？”克劳泽问道。\n\n“的确结束了。我一直想着过去的日子，尤其最近，这种感觉越来越强。我们会多感激你现在享受的这种科技啊，仅仅一个高级加热器就能缩短过去在大西洋上的漫长航程，更别说那些制导炸弹和导弹了。有了这么多我不懂的新科技，加上你那么长的飞行时间，我要请你就一个最重要的问题发表意见。”\n\n迈尔倾身向前，问道：“Ho-229的驾驶舱有多舒服？”\n\n克劳泽扬起眉毛，说道："
 antarctica_aag_testing.40.a:0 "“老实说，长官，里面又硬又窄，那该死的座椅还小得可怜。”"
 antarctica_aag_testing.40.a.tt:0 "这将花费§W3补给§!£Antarctica_texticon_SUP 。"
 antarctica_aag_testing.40.b:0 "克劳泽笑道：“长官，要不您自己试试？”"
 antarctica_aag_testing.40.b.tt:0 "我们将获得§R2军事点数§!£Antarctica_texticon_MIL 。"
 antarctica_aag_testing.41.t:0 "驾驶舱升级"
 antarctica_aag_testing.41.desc:0 "克劳泽坐进一架新改装的Ho-229的驾驶舱，别样之处立刻扑面而来。烦人的金属边缘大都被磨平或是安上了临时泡沫，座椅也变得更为柔软舒适，为腰部提供了强有力的支撑——克劳泽在高重力加速度下转弯时肯定会爱死它的。此外，腿部活动空间更加宽广，隔热与供暖设备也有了显著改进。\n\n克劳泽转过身来，笑着对工程师们说：“我这是在开战斗机还是在蒸桑拿啊？”"
 antarctica_aag_testing.41.a:0 "其中一个工程师答道：“为啥不能在飞机上蒸桑拿？”"
 antarctica_aag_testing.41.a.tt:0 "我们对§r霍顿Ho-229§!的测试进度将推进§Y9%§!。"
 antarctica_aag_testing.42.t:0 "迈尔的飞行"
 antarctica_aag_testing.42.desc:0 "迈尔和克劳泽悄无声息地穿过基地，向着机库潜行。讽刺的是，这基地正是迈尔自己的。理论上讲，只要合理，迈尔可以在基地里任何地方干他想干的任何事情，可惜他的最爱——飞行并非其中之一。可是，迈尔身为冰冻三尺的南极基地指挥，显然无需担心被美国佬的火箭或是日本人的高射炮打下来，小飞一会儿怎么不行？\n\n他们成功摸进了机库，克劳泽动身去找飞行服，留下迈尔一个人在原地守着Ho-229，开始做绕机检查。他以前驾驶过各式各样的飞机，有几架还是喷气式的。但从来没开过外表如此光滑、好似用上了外星科技的飞机，光线在她表面舞动的样子简直奇美……\n\n克劳泽拿着两套飞行服回来了：“准备好了？”\n\n迈尔点点头，纵身缩进驾驶舱里。"
 antarctica_aag_testing.42.a:0 "克劳泽惊叹地看着迈尔用每小时一千公里的速度冲出跑道。"
 antarctica_aag_testing.42.a.tt:0 "我们对§r霍顿Ho-229§!的测试进度将推进§Y1%§!。"
 antarctica_aag_testing.50.t:0 "第五次试飞"
 antarctica_aag_testing.50.desc:0 "鲁道夫·迈尔盯着他面前风洞中的梅塞施密特P.1110-I微缩模型。迈尔就像科技风暴的风眼，工程师们在他周围准备着风洞。P.1110让过去迈尔和战友们在战争中同生共死的每一架战斗机、轰炸机和侦察机都相形见绌。迈尔感到了一丝悲凉，但很快被他心中的兴奋火焰冲淡，开着这架光滑、神秘的战机迎战的人一定能在空战中干翻所有美国或者日本轰炸机队。\n\nP.1110-I的精妙设计在于，金属外壳下是木质的骨架，这不但降低了生产成本，让机身变得更轻，对德国空军的钱包来说也非常友好，还有利于德国空军的全球声誉。这架截击机还有一个在航空史上闻所未闻的设计：一个像皮带一样环绕机身的进气口，飞机的后半部分就是一个巨大的发动机。这是为了降低空气阻力，提升最高速度，但没人知道木制机身能否顶得住以每小时九百公里以上的速度飞行。设计师和迈尔保证，这架飞机完全扛着住飞行，如果大规模量产，这型飞机能给德国空军带来无与伦比的空中拦截优势。\n\n至少理论上，只要测试结果跟着计划来。\n\n总工程师走近迈尔：“风洞处于闲置状态，可以开始了。”他接着解释道，“我们可以逐步提高风洞的风力，但这会让测试时间变得更长，还会更多地消耗我们的能源。或者，我们可以直接把风力提高到最大值，看看飞机的极限，这会缩短测试时间，能耗也更低。先生，您决定怎么做？”"
 antarctica_aag_testing.50.a:0 "这架飞机上承载了很多东西，不能冒险。逐步提高风力。"
 antarctica_aag_testing.50.a.tt:0 "这将花费§W5补给§!£Antarctica_texticon_SUP 。"
 antarctica_aag_testing.50.b:0 "日耳曼尼亚要求出结果的速度和这架飞机一样快。让我们瞧瞧她的能耐！"
 antarctica_aag_testing.50.b.tt:0 "这将花费§W3补给§!£Antarctica_texticon_SUP 。"
 antarctica_aag_testing.51.t:0 "四位数"
 antarctica_aag_testing.51.desc:0 "过去的半个小时令人窒息，但此刻，房间里的每个人，尤其是迈尔，都欣喜若狂。风洞已经逐渐达到最大速度，机身在一千公里每小时的风力下仍保持稳定。他们一直以来付出的一切努力都没有白费，尽管迈尔多少觉得……有些不对劲。"
 antarctica_aag_testing.51.a:0 "愿上帝保佑那些将在战场上面对它的人。"
 antarctica_aag_testing.51.a.tt:0 "我们对§s梅塞施密特P.1110§!的测试进度将推进§Y15%§!。"
 antarctica_aag_testing.52.t:0 "轻微的误判"
 antarctica_aag_testing.52.desc:0 "“有什么地方出错了。”总工程师再恰当不过地总结了现状。飞机的机翼突然剧烈地摇摆起来，机身在试验台上疯狂地晃动。随着风速达到令人难以置信的每小时一千一百公里，机身彻底裂成了两半，尾翼组件的一部分直直地冲众人而来。总工程师的脑袋瞬间与身子分离，并准确地落到了迈尔腿上，引得众人一阵尖叫。"
 antarctica_aag_testing.52.a:0 "往好了想，这次测试至少还挺节能环保。"
 antarctica_aag_testing.52.a.tt:0 "我们对§s梅塞施密特P.1110§!的测试进度将推进§Y3%§!。"
 antarctica_aag_testing.60.t:0 "第六次试飞"
 antarctica_aag_testing.60.desc:0 "这一天比往常更冷，足足零下五十度，以至于迈尔感到寒风正在把他的肉从骨头上撕下来。即使待在屋里，他也得裹着大衣。\n\n他并不是不习惯寒冷，战争期间，他曾多次为大日耳曼国的胜利驾驶飞机横穿大西洋，但这次不同。在往昔的光辉岁月里，他能面不改色地在冰冷的高空中躲避高射炮的烈火，然而，在这里，南极洲无情的荒原之上，他只能在这个大冰柜里起飞，降落，起飞，降落。这里毫无荣誉可寻，只有乏味，无穷无尽的乏味。现在，P.1110设计小组发来报告，请他离开自己的宿舍，穿过整个基地，去到试验场。\n\n“我们的团队…”他开始阅读这份报告，“…一致认为可以在飞机上加装一个可变式调节器，来根据各种因素降低其能耗，并提高整体效能。我们希望到下次您出席我们的会议时……”\n\n迈尔将头猛然抬起，他差点睡着了。寒冷能让最坚毅的人迅速耗尽体力。他重新阅读了最后几行，关于设计小组邀请他出席相关会议的内容，但他今天不想挪窝。他在想，自己出不出席这个破会真的有这么重要吗？他们就不能自己干自己的活吗？不是说他们是整个德国最聪明的一群人吗？半瓶威士忌静静地躺在迈尔的桌子上，像是等着被他喝掉一样。从另一方面讲，他有在寒冷地带飞行的经验，所以他的建议也很重要……"
 antarctica_aag_testing.60.a:0 "去他妈的吧！上头就会给那些工程师功名利禄，然后把我们晾在一边！我今天就搁屋里喝酒了，怎么地吧！"
 antarctica_aag_testing.60.a.tt:0 "这将花费§G1宣称点数§! £Antarctica_texticon_LEG 。"
 antarctica_aag_testing.60.b:0 "再冷又能咋地？再说了，一名经验丰富的飞行员肯定能注意到普通工程师难以察觉的细节。"
 antarctica_aag_testing.60.b.tt:0 "这将花费§W1补给§! £Antarctica_texticon_SUP 。"
 antarctica_aag_testing.61.t:0 "更好的日子"
 antarctica_aag_testing.61.desc:0 "正如往常一样，威士忌的辛辣驱走了寒冷。迈尔解开了他的外套，想着还有什么能用来打发时间。也没别的，无非就是抽烟喝酒，喝酒抽烟。在这个特殊的时刻，迈尔决定打破他一贯的习惯，漫步于记忆的长河中。\n\n他抽出办公桌的抽屉，拿出一本用皮革作封面的书。里面夹着无数张记录着胜利游行、军官授勋，以及在被大日耳曼国占领的欧洲各大城市上空进行飞行表演的照片。突然，其中一张照片让迈尔停下了翻页的手指。它相对比较新，一看就是近几年拍的，在其中，一个因补给和人员不足而停飞的航空中队穿着凌乱的制服，被沙漠的艳阳炙烤。然而，引起迈尔注意的不是周遭的环境，而是其中的一个人，老海因茨。他还欠我一杯酒呢，迈尔想道。\n\n这时，他灵光乍现。赫尔曼还欠他一杯酒呢！如果说燃油是新施瓦本的命脉，那酒精就是这道命脉的隔热涂层。让人们在身体和精神上都保持温暖是很重要的，有时候，后者甚至重于前者。迈尔拿起笔，下定决心，向上级请求提供更多酒精饮料。如果他书桌上的酒瓶子空了，他基地的灵魂也将变得空空荡荡。"
 antarctica_aag_testing.61.a:0 "海因茨，我的老伙计，你还记得瓦瑟堡的那个夜晚吗？"
 antarctica_aag_testing.61.a.tt:0 "§F我们将获得§!§W1补给§!£Antarctica_texticon_SUP §F。\n我们对§!§s梅塞施密特P.1110§!§F的测试进度将推进§!§Y2%§!。"
 antarctica_aag_testing.62.t:0 "尚存机会"
 antarctica_aag_testing.62.desc:0 "迈尔绕着这架没有机翼的飞机转了好几圈。P.1110设计团队已将原型机拆解，使其木质框架一览无余，以便向迈尔说明它的工作原理。迈尔手中还有一沓图表，在设计团队向他提及对发动机的改造时，他会不时地翻看它们。\n\n“简短地说，”其中一名工程师说道，“我们的设想是，通过微控制器调节发动机输出功率，以提高燃油利用效率。”\n\n迈尔点了点头：“真是巧妙。”说罢，他将手中的图表翻到了关于模拟飞行过程中发动机输出功率的那一页，“说实话，我对这些数据感到担忧。”\n\n那名工程师显然有些疑惑：“您是说？”\n\n“要是我没猜错的话，如果这架飞机使用你们所构想的设计，那么，在外部气温骤变的情况下，发动机的输出功率也会急剧变化，其飞行状态肯定会受到影响。在空战交火时，速度的突然变化是相当致命的。我可不想让咱们的飞行员在与敌人作战的同时还得与他们自己的座机对抗。”\n\n工程师们感到羞愧难当。像往常一样，他们没有考虑到坐在机舱里的飞行员。\n\n迈尔把手中的那沓文件整理了一番：“别把气温算进影响燃料量调节器运作的变量就行了。如果这意味着飞行员能够稳定地操纵飞机，其燃油利用效率降低一个百分点也无妨。另外，”他的目光扫过设计团队的每一个人，“别再把飞行员给忘了。”"
 antarctica_aag_testing.62.a:0 "幸好今天有飞行员在现场。"
 antarctica_aag_testing.62.a.tt:0 "我们对§s梅塞施密特P.1110§!的测试进度将推进§Y12%§!。"
 antarctica_aag_testing.63.t:0 "在空中"
 antarctica_aag_testing.63.desc:0 "“妈的，他们到底要去哪？”克劳福德·丹尼尔斯透过侦察机的舷窗，望向一艘货船。这艘船在离开德属西南非专员辖区的一座港口后突然向南驶去。\n\n丹尼尔斯的副驾驶乔伊·佩顿耸了耸肩：“我怎么知道啊。”\n\n丹尼尔斯皱起了眉头。“稍等一会……喂，米奇！”他转过头去，对他的无线电操作员喊道，“咱们是不是今天早上才收到一份报告，说上头专门给咱空军的人准备了苏格兰威士忌还是啥？”\n\n米奇翻了翻他的日志本：“没错，确实是威士忌，它们将由一艘名为慕尼黑号的货船运来。”\n\n丹尼尔斯向下看去。他看不清货船侧舷漆着的字母，但他确信那就是他们的救星。“运到哪？”他对米奇问道。\n\n“我瞅瞅……”米奇答道，“上面没写。”\n\n丹尼尔斯点了点头：“用无线电向上级报告吧，顺便问问他们咱们能不能继续跟踪这艘船。”"
 antarctica_aag_testing.63.a:0 "威士忌去哪，我就去哪。"
 antarctica_aag_testing.63.a.tt:0 "对§r新施瓦本§!的§B情报掌握度§!将增加§B1§!£Antarctica_texticon_INTVAL 。"
 antarctica_aag_testing.64.t:0 "在地上"
 antarctica_aag_testing.64.desc:0 "宪兵队特工奥田一边在码头上漫步，一边默默注视着一箱又一箱威士忌被装载到慕尼黑号上。虽然他知道这些酒是专供德国空军的，但他却对它们要被运到哪一无所知，而他的上级只对这批威士忌的去向感兴趣：只有德国高官才有权请求和审批数量如此之多的优质烈酒的输送。不管它们要被运到哪里，等着享用它们的肯定是重要人物。\n\n为了查清此事，他已被授权使用极端措施。\n\n趁着没人注意，奥田抽出其中一瓶威士忌，用注射器的针头扎穿软木塞，将一种独特的毒药注入瓶中。他小心翼翼地把它放了回去，以确保没有人留意到它被人动过。\n\n全球各地的宪兵队特工都已做好准备。德国空军高官的意外死亡肯定会引起一阵波浪，到时候，他们便能彻底查清这批货物的去向，以及如此大动干戈地运威士忌的目的。"
 antarctica_aag_testing.64.a:0 "小心点，这玩意沉得很。"
 antarctica_aag_testing.64.a.tt:0 "对§r新施瓦本§!的§B情报掌握度§!将增加§B2§!£Antarctica_texticon_INTVAL 。"
 antarctica_aag_testing.70.t:0 "第七次试飞"
 antarctica_aag_testing.70.desc:0 "迈尔看着躺在病床上的飞行员，叹了口气。他从头到脚都被打上了石膏，恐怕在余生中都不能下地行走了。\n\n但总得有人试飞，就像总得有人遍尝百草。总得有人爬进驾驶舱，把发动机打着火，然后起飞。自莱特兄弟发明飞机以来，一直如此。即使世界已经迈进喷气机时代，试飞仍然总是以烈焰与鲜血结束。\n\n工程师们可以尽情地纸上谈兵，倒弄数据，但到最后，负责测试它的还得是德国空军的飞行员，这是迈尔和他的战友们都心知肚明的事实。此前，没有人知道P.1110截击机在寒冷气候下的飞行表现如何。第一次飞行以差点夺走了飞行员生命的坠机而告终，据估计是环形进气口出了问题：它有些结霜了，造成进入发动机的空气不足，最终导致熄火，然后飞机就变成了一尊大号铁棺材。\n\n现在，迈尔需要作出一个重要的决定。设计团队告诉他，他们可以用抗冻材料来改装现有的环形进气口，还可以在其周围加装抗冻系统。为了找到最佳解决方案，他们需要大量原材料和时间来不断调试。然而，从团结协定运来的物资数量有限，这意味着得克扣一部分其他对迈尔的基地正常运转至关重要的物资。\n\n真是僧多粥少啊。"
 antarctica_aag_testing.70.a:0 "无论在南极还是俄罗斯，德国空军都不会想要一架没法在寒冷天气下运作的飞机。赶紧升级机身。"
 antarctica_aag_testing.70.a.tt:0 "这将花费§W10补给§!£Antarctica_texticon_SUP ，同时我们会获得§R5军事点数§!£Antarctica_texticon_MIL 。"
 antarctica_aag_testing.70.b:0 "无论如何，保障补给供应是第一位的。省着点用手头现有的材料吧。"
 antarctica_aag_testing.70.b.tt:0 "这将花费§W1补给§! £Antarctica_texticon_SUP 。"
 antarctica_aag_testing.71.t:0 "钱花得值"
 antarctica_aag_testing.71.desc:0 "气温已经零下六十摄氏度了，迈尔却丝毫没觉得冷。在他上方，一架P.1110原型机正做着各种战术动作，在晶莹剔透的天空中轻巧地起舞。在升级环形进气口后进行的十次试飞中，发动机没有一次熄火。\n\n“先生们，这个冬天可能会有点冷啊，”迈尔对聚集在他周围的工程师和军官说道，“但在面对日本人的直升机和美国佬的轰炸机时，我们绝不会发抖。因为有它在保卫我们。”随着P.1110从空中轰鸣着划过，他指了指它。作为回应，飞行员在飞过迈尔头顶时微微摇晃了几下机翼。"
 antarctica_aag_testing.71.a:0 "迈尔向空中敬了个礼，对工程师们笑着说道：“干得漂亮。”"
 antarctica_aag_testing.71.a.tt:0 "我们对§s梅塞施密特P.1110§!的测试进度将推进§Y15%§!。"
 antarctica_aag_testing.72.t:0 "飞行棺材"
 antarctica_aag_testing.72.desc:0 "迈尔通过双筒望远镜看到P.1110如同风火轮般砸向冻土。而他只能看着这一切。对他来说，虽然在空中看着僚机被击落坠毁很糟，但总好过不需要承担任何风险，只在地上发号施令，然后看着这些生命逝去。\n\nP.1110在爆炸中消失了。迈尔闭上了眼睛，这是上个月以来第五次以失败告终的测试。一半的原型机都报销了。他想不升级P.1110的机身，希望省下来的物资能让他的士兵在整个冬天都暖和着。\n\n现在，新施瓦本少了五张吃饭的嘴，有些人可能说：“这还不错”。\n\n如果迈尔也有相同想法就好了。"
 antarctica_aag_testing.72.a:0 "迈尔叹了口气：“准备下一次试飞……”"
 antarctica_aag_testing.72.a.tt:0 "我们对§s梅塞施密特P.1110§!的测试进度将推进§Y6%§!。"
 antarctica_aag_testing.73.t:0 "三秒男"
 antarctica_aag_testing.73.desc:0 "雷达操作员凯尔索静静看着显示器上的小白点，它的运动轨迹逐渐变得不稳定起来，最后消失在了雷达上。他的上司麦克米歇尔中尉弯着腰站在控制台的另一侧。“又摔一架？”他心里似乎早就有了答案。\n\n凯尔索点了点头：“没错，长官，估计是另一架P.1110。这型号的截击机最近总是摔下来。”\n\n“很好，这下汉克又欠了我一瓶酒。话说他们在搞什么，这已经是这个月第五次了！”\n\n再一次地，凯尔索点了点头：“是啊，这个月他们也才试飞十次吧？”这时，又一个小白点出现在了雷达屏幕上，“等等……怎么又来一架？”\n\n麦克米歇尔把手搭在了凯尔索的肩膀上：“我敢肯定这架也得摔，敢不敢赌一包烟？”\n\n“长官，您不是昨天刚刚把烟抽了个精光吗？”"
 antarctica_aag_testing.73.a:0 "“闭嘴，凯尔索。”"
 antarctica_aag_testing.73.a.tt:0 "对§r新施瓦本§!的§B情报掌握度§!将增加§B8§!£Antarctica_texticon_INTVAL 。"
 antarctica_aag_testing.74.t:0 "高风险职业"
 antarctica_aag_testing.74.desc:0 "阿里亚斯抬起头来，轻轻地用手拂去护目镜上的积雪。真是惊险，那架从天而降的飞机差点就把他，还有其他地图测绘小组的队员砸个稀碎。幸好没有人受伤……\n\n……除了飞机里的飞行员。\n\n阿里亚斯挥挥手，示意队员们集合。也许是出于同情，又或是出于好奇，他们向仍在燃烧的飞机残骸走去。尽管飞行员已经没有生命迹象，或者说，已经和铁疙瘩融为了一体，机身上印着的铁十字仍昭示着他生前的身份。\n\n几名虔诚的队员开始在胸前划十字，感谢上帝对他们的眷顾。哪怕飞机坠毁的地方离他们再近几米，他们都会被四溅的航空燃油烧成灰烬。\n\n在这之后，阿里亚斯下令打开无线电台。这已经是德国空军这个月摔的第五架飞机了，莱亚尔肯定会对这事很感兴趣的。"
 antarctica_aag_testing.74.a:0 "“总部，这里是阿里亚斯。我们发现了一些莱亚尔可能会感兴趣的东西……”"
 antarctica_aag_testing.74.a.tt:0 "对§r新施瓦本§!的§B情报掌握度§!将增加§B8§!£Antarctica_texticon_INTVAL 。"
 antarctica_aag_testing.80.t:0 "第八次试飞"
 antarctica_aag_testing.80.desc:0 "热气腾腾、散发着坚果香气的咖啡驱走了疲惫和寒冷，这两者总是光顾新施瓦本实验室里的科学家们。电气工程师汉斯·拜姆勒细细地品味着杯中的每一滴咖啡。毕竟，咖啡在南极可是奢侈品。只有在月末物资紧张，或是迈尔需要他通宵赶报告时，汉斯才舍得喝掉他那少得可怜的咖啡配给。日耳曼尼亚方面沉迷于对技术进步的狂热追求，是多是少都显得无所谓。但汉斯最近愈发认为，党政官僚们更多地关心的是自己的功名利禄，而非技术领先优势。他们都把自己的希望押在像汉斯这样的人身上，无论要付出多大代价，成功的几率又是多么微小。\n\n这时，汉斯敏锐地意识到了时间正在流逝。他在设计P.1110，新一代战斗机的新式电传操纵系统方面取得的进展缓慢得令人沮丧。电传操纵系统在航空领域还没有得到太多应用，其与传统的机械飞行控制系统的区别在于，飞行员并非直接控制飞机的机械装置，而是通过操纵杆将命令转化为电信号，再由控制副翼、升降舵等部件的处理器执行。支持将这一系统应用在飞机上的人们认为，飞机的空速太快了，飞行员难以及时反应，因此，一定程度的计算机化是很有必要的。\n\n对德国科学家来说，将机械系统计算机化并不是什么陌生的概念，特别是在海狮计划得以实施，国防军攻陷布莱切利园之后。汉斯想起了那段光辉的时日，当时，一支科学家大军，当然也包括他自己，将顽固的英国佬留下的技术遗产吃干抹净，并将它们转化为了大日耳曼国的技术优势。甚至在他来南极之前，他就听说一项关于新型计算机系统的实验正秘密进行。但他也只知道它的名字叫做兰姆网。\n\n在陷入回忆的同时，汉斯猛地发现自己杯中的咖啡已经见底了。已经筋疲力尽的他在脑海中纠结，要不要再续上一杯。"
 antarctica_aag_testing.80.a:0 "就算在地球的屁股上，我也不能丢掉职业操守。再来一杯吧……"
 antarctica_aag_testing.80.a.tt:0 "这将花费§W1补给§! £Antarctica_texticon_SUP 。"
 antarctica_aag_testing.80.b:0 "天色不早了，反正迟早会取得突破性进展的，我得上床睡觉了。"
 antarctica_aag_testing.81.t:0 "咖啡因带来的乐趣"
 antarctica_aag_testing.81.desc:0 "汉斯的手在发抖，他开始后悔给自己斟满整整一杯咖啡了。他的心嘭嘭直跳，溃疡跟着发作了。但上帝保佑！他的灵感就像喷气式飞机的尾焰一样不断喷涌而出。\n\n他在改进电路和微处理器的原理图时，他的笔尖轻松地在纸上翩翩起舞，十分钟内取得的进展超过了过去十周。他想，等到迈尔看见这些，就能改变一切了！"
 antarctica_aag_testing.81.a:0 "电传操控不再只是理论。"
 antarctica_aag_testing.81.a.tt:0 "我们对§s梅塞施密特P.1110§!的测试进度将推进§Y15%§!。"
 antarctica_aag_testing.82.t:0 "突破性的进展？"
 antarctica_aag_testing.82.desc:0 "“就像您所看到的，”汉斯有些忐忑地说道，“我已经成功地改良了紧急弹射系统，将弹射座椅的反应时间缩短了六分之一秒。我估计，这将使飞行员的生存率提高十四个百分点。”\n\n迈尔皱了皱眉头，将目光从手中的报告移向汉斯：“我建议你还是多花点时间改良飞机的其他部分，我可不想让咱们的飞行员动不动就要弹射出去才能捡回一条命。”"
 antarctica_aag_testing.82.a:0 "“呃……您说得有道理，长官。”"
 antarctica_aag_testing.82.a.tt:0 "我们对§s梅塞施密特P.1110§!的测试进度将推进§Y3%§!。"
 antarctica_aag_testing.83.t:0 "南极佳饮"
 antarctica_aag_testing.83.desc:0 "在停泊在瓦尔帕莱索港的一艘货轮的货舱里，海员坎波斯向一箱咖啡豆望去。它们被储存在保温的集装箱中，真是有些不寻常。再考虑到船上有很多德国人，一个个都对外人十分戒备，坎波斯认为他们这次是去给德国海军运货的。最奇怪的莫过于这艘船的航向……"
 antarctica_aag_testing.83.a:0 "……一路向南。"
 antarctica_aag_testing.83.a.tt:0 "对§r新施瓦本§!的§B情报掌握度§!将增加§B1§!£Antarctica_texticon_INTVAL 。"
 antarctica_aag_testing.90.t:0 "第九次试飞"
 antarctica_aag_testing.90.desc:0 "约翰·克劳泽中尉发动了直升机的旋翼，霎时间，驾驶舱里充满了旋翼尖锐的呜呜声。当发动完成时，他的副驾驶威廉·贝克尔坐在克劳泽身后的座位上笑了起来。“我完全不敢相信这玩意能飞起来，”他笑道，“而且还飞得那么的稳。”\n\n克劳泽也是同感。单就外观而言，这架小飞机就像一个大一点的玩具——他从未想象过这东西可以飞，更不用说能够飞得那么嗨。一路上，他沿着一处白雪皑皑的悬崖直冲直撞，在白茫茫的峭壁上方几英尺处飞驰而过。驾驶舱是那样的狭窄，以至于他可以把飞机下面的景色尽收眼底。有一小会，他甚至感觉他自己坐在一把能够浮空的小椅子上，只是这把椅子比起它办公室里的同类能够承载多得多的重量。\n\n克劳泽试飞的新型MBB-Bo-115基于其前代型号105研发，其飞行速度和机动性比德国以前的任何直升机型号都要优秀得多。在其完备的武器装备计划中，直升机将装备八枚反坦克火箭弹，未来甚至可能还会给衍生型号装上机炮和电子战设备。但就目前而言，它还只是个由旋翼、机身和一台无线电拼凑成的铁疙瘩。\n\n克劳泽驾驶着直升机进行俯仰、俯冲、急转弯，但无论角度有多陡，距离地面有多近，直升机似乎都能够毫不费力地胜任。\n\n“测试将在五分钟后结束，”贝克尔说，“我们回去好吗？你懂的，我们用了太多燃料，他们会骂我们的。现在基地已经越来越缺燃料了。”\n\n克劳泽现在必须做出选择……"
 antarctica_aag_testing.90.a:0 "你说得对，我们得回去了。省着点用燃料总比挨冻强。"
 antarctica_aag_testing.90.b:0 "妈的，咱来这世上过一辈子不就是得找点刺激的吗？让咱们看看她能不能在空中翻滚一圈！"
 antarctica_aag_testing.90.b.tt:0 "这将花费§W1补给§! £Antarctica_texticon_SUP 。"
 antarctica_aag_testing.91.t:0 "单刀直入"
 antarctica_aag_testing.91.desc:0 "克劳泽和贝克尔心满意足地回到了驻地。MBB-Bo-115的军官和设计团队对今天的飞行测试非常满意。“你做到了我们所期望的一切，”工程师说，“好样的。”\n\n克劳泽扑通一声缩进铺位，甩掉衣服，只穿了一套睡袍，整个宿舍里暖烘烘的。“我们最好继续节约分配给我们的资源，”他对点着烟的贝克尔说，“我希望明年冬天回来的时候这里也能这么暖和。”\n\n贝克尔深深地吸了一口气，点了点头，叹息道：“回头才是明智的选择。”\n\n“是的……尽管那是一种耻辱。我有点希望我们当时试着把直升机飞得比现在更远一点……”"
 antarctica_aag_testing.91.a:0 "贝克尔开了一瓶酒：“总还有下次机会的，克劳泽。”"
 antarctica_aag_testing.91.a.tt:0 "我们对§L梅塞施密特-伯尔科-布洛姆-Bo-115§!的测试进度将推进§Y6%§!"
 antarctica_aag_testing.92.t:0 "死循环"
 antarctica_aag_testing.92.desc:0 "一如既往，克劳泽和贝克尔从MBB-Bo-115的座舱里爬下来，摘下头盔，面带微笑。工程师和军官们聚集在结冰的停机坪上，脸色苍白如雪。渐渐地，当两名飞行员走近时，人群中爆发出一阵热烈的掌声。\n\n“这是一个自杀的好方法。”克劳泽和贝克尔的副驾驶说。然而，他们是笑着的。\n\n“你让我们看看她能做什么，”克劳泽谈到他身后的直升机时说，“所以我们去‘看’了。”\n\n“我当然会这么说。”另一个严厉的声音传来。当鲁道夫·迈尔手拿香烟从跑道边缘走过来时，人群陷入了沉默。所有人立正站着，包括克劳泽和贝克尔。“那些工程师们从未说过115能做到这一点。”\n\n其中一名工程师试图结结巴巴地解释，但迈尔做了个手势打断了他。“而且，”他说，“如果连我们都如此惊讶，想象一下，当敌人看到恶魔在他们周围飞来飞去时，他们会怎么想？”"
 antarctica_aag_testing.92.a:0 "克劳泽笑道：“长官，要不给我个展示的机会？”"
 antarctica_aag_testing.92.a.tt:0 "我们对§L梅塞施密特-伯尔科-布洛姆-Bo-115§!的测试进度将推进§Y9%§!。"
 antarctica_aag_testing.100.t:0 "第十次试飞"
 antarctica_aag_testing.100.desc:0 "比起MBB-Bo-115的速度和机动性，更让克劳泽中尉感到惊讶的是它的稳定性。在直升机悬挂在空中的时候，它的旋翼轻轻地嗡嗡作响，就连里面的飞行员都猜不出这台机器到底有什么魔力。今天没有安排大型的测试活动，取而代之的则是克劳泽和贝克尔会在基地周围懒懒地飞一圈，同时基地的导弹炮台将向他们开火。\n\n“这次，”贝克尔说，“他们总该学会把实弹的对象换成假人了吧，对吗？\n\n克劳泽笑了：“在我们起飞前，我告诉他们，‘你们可以把我们击落，但那样做会毁掉一架完美的直升机。’”\n\n“嗯，也许有一天这些东西会自己飞起来，到那时候，我们就可以回到基地喝杯啤酒啦。”\n\n收音机噼啪作响：“克劳泽中尉，这里是地面控制中心。你可以继续了。准备好你的应对模块，然后开始你的表演。”\n\n“收到。”克劳泽说。他回过头点了点头，只见贝克尔已经装备上了应对模块。这个过程好像像打棒球一样，克劳泽把“球棒”轻轻向前移，开始在“垒上传球”。但是，当他接近挑战的起点时，他突然想到：他也许可以尝试更慢、更温和的飞行路线——让导弹朝他飞过来——或者他可以飞得更迅速、更急促，靠近最密集的导弹炮台。后者会很危险，而且显然未经授权，但这对于克劳泽而言不是不去做的理由。而且，那样搞特技想必会非常有趣。"
 antarctica_aag_testing.100.a:0 "那些导弹可能没有装药，但它们仍然是大功率火箭。按照飞行计划来。"
 antarctica_aag_testing.100.a.tt:0 "这将花费§W1补给§! £Antarctica_texticon_SUP 。"
 antarctica_aag_testing.100.b:0 "约翰，你在搞什么鬼？！"
 antarctica_aag_testing.100.b.tt:0 "这将花费§W1补给§! £Antarctica_texticon_SUP 。"
 antarctica_aag_testing.101.t:0 "一路顺“风”"
 antarctica_aag_testing.101.desc:0 "在克劳泽的头后面，贝克尔的控制台发出一声快速的哔哔声——这表明地对空导弹的制导系统已经锁定了直升机。贝克尔的手在诱导弹发射器上方盘旋着，等待合适的发射时机。\n\n“让导弹飞一会，”克劳泽说，“等等……就是现在！”\n\n话音刚落，贝克尔按下了按钮。几乎在信号弹发射的同时，从远处传来一声尖叫。从直升机左边的窗口望去，克劳泽看到一枚导弹笔直地飞向200米外。它落到了地上。克劳泽笑了。“做得好！我希望这能让工程师们高兴——虽然这离我们之前那种壮观的飞行还有一段距离。”"
 antarctica_aag_testing.101.a:0 "贝克尔摇着手指说：“中尉先生，这种‘壮丽’也有它自己独特的风格。”"
 antarctica_aag_testing.101.a.tt:0 "我们对§L梅塞施密特-伯尔科-布洛姆-Bo-115§!的测试进度将推进§Y8%§!。"
 antarctica_aag_testing.102.t:0 "“作战”室"
 antarctica_aag_testing.102.desc:0 "克劳泽和贝克尔面红耳赤地站在原地，迈尔把他们骂了个狗血淋头。“知不知道你们的死会让我们付出什么样的代价？”他咆哮着，“我们已经好几个月没有从空军那儿接收新成员了，国内形势也匀不出更多人过来这里！”\n\n克劳泽和贝克尔偷偷交换了一波眼神，这次事故显然把他们整得狼狈不堪。\n\n“说真的，”迈尔说，“按照飞行计划执行任务就他妈这么难吗？就是飞个圈啊！我想让你们做的仅此而已！我就不信我招进来的是两头蠢猪！”他转身看向窗户，用手指着地平线的方向。“现在要我怎样才好？”\n\n远处，MBB-Bo-115原型机在雪地里燃起暗火，它的尾旋翼断成了两截。不过抛开这个不谈，飞机还是有可能修好的。\n\n迈尔转过头来，面对两位飞行员说：“要是在莫斯科耍这种鬼把戏，坠毁在苔原里头了，你们的队友绝对会一枪崩了你们……趁你们还没被俄国蛮子生吞活剥！”他叹了口气，“这地方连上帝都懒得管，你们最多也就对付下企鹅，我又不能把你们给毙了，那就找不到人当试飞员了。所以……克劳泽，等着挨处分吧你。还有贝克尔，别以为我不知道你把那瓶美国威士忌藏在哪个旮旯角，晚上六点前我要看见它放在我桌上。解散，给我滚！”"
 antarctica_aag_testing.102.a:0 "手术很成功，但是病人死了。"
 antarctica_aag_testing.102.a.tt:0 "这将花费§R3军事点数§!£Antarctica_texticon_MIL 和§W2补给§!£Antarctica_texticon_SUP 。\n我们对§L梅塞施密特-伯尔科-布洛姆-Bo-115§!的测试进度将推进§Y1%§!。"
 antarctica_aag_testing.110.t:0 "第十一次试飞"
 antarctica_aag_testing.110.desc:0 "凌晨时分，克劳泽中尉、他的副驾驶贝克尔、六名工程师和鲁道夫·迈尔围在一张地图旁边。他们正在决定今天MBB-Bo-115的恶劣天气测试飞行计划。\n\n一名气象学家把最新的天气预报交给了迈尔，他扫了一眼，然后看了看在场的所有人：“预报上说，今天会有从内陆高原刮到海岸来的重力风，平均风速能达到70节。这可能正是我们要等的东西。”\n\n克劳泽和贝克尔交换了一个眼神。“完美，”克劳泽说，“我们会准备——”\n\n迈尔举起一只手：“还有别的。”他指着地图上基地和山脉之间的一处地方，“这里，有一场风暴正在向海岸进发，风速达到80节。”他停顿了一下，然后看了看两名飞行员，“从气象学上说，飞机不应该飞进那场风暴里去，但如果115能够应对它，那我们就能确定，它也能应对冬季北海上空的飞行条件，甚至也能在波罗的海同样游刃有余。但是，飞行员在咱这儿是金贵人，所以风暴飞行计划取决于自愿。高原上下来的重力风也足够满足我们的目的。”\n\n贝克尔看了看克劳泽：“我知道你会怎么选。”\n\n克劳泽在脑海里盘算着手头的选择。"
 antarctica_aag_testing.110.a:0 "我同意，重力风的测试就足够了。另外，我们也希望能全须全尾地回来。"
 antarctica_aag_testing.110.a.tt:0 "这将花费§W2补给§!£Antarctica_texticon_SUP 。"
 antarctica_aag_testing.110.b:0 "我准备冒更大的风险以获得更大的回报。我们要飞进风暴里去。"
 antarctica_aag_testing.110.b.tt:0 "这将花费§W4补给§!£Antarctica_texticon_SUP 。"
 antarctica_aag_testing.111.t:0 "重力风测试"
 antarctica_aag_testing.111.desc:0 "MBB-Bo-115直升机毫不费力地乘风而起，飞过冰封的大地，向着海岸疾驰而去，在猛烈的风中倾斜爬升，如同幽灵一般掠过机腹下的雪带和冰原。\n\n“让我们看看她能不能战胜这阵风。”克劳泽一边说着，一边操纵飞机转向，直直地扎进了风中。当气流流过机舱时，他感到直升机在颤抖，但操控性能远比他想象中要好得多。\n\n“真是难以置信，”贝克尔说道，“我不知道他们做了些什么来强化旋翼，但操纵起来真的太轻松了。”\n\n克劳泽点了点头，回应道：“我开始好奇她在面对风暴时会表现如何了。”"
 antarctica_aag_testing.111.a:0 "克劳泽拿起了无线电对讲器，通报道：“克劳泽，呼叫地勤。测试完成，正在返回着陆场。”"
 antarctica_aag_testing.111.a.tt:0 "我们对§L梅塞施密特-伯尔科-布洛姆-Bo-115§!的测试进度将推进§Y9%§!。"
 antarctica_aag_testing.112.t:0 "风暴将至"
 antarctica_aag_testing.112.desc:0 "一堵连亘数千英尺的云墙横在了克劳泽和贝克尔面前，南极的荒凉景色随之被笼罩在了它的阴影之下。飞雪织成的帘幕在天地之间随狂风摆动，风暴吞噬了整片天空。“密切关注各个系统的状态，”克劳泽说道，“保持液压，我们得侧着风开。”\n\n“明白，”贝克尔回应道，他那放在仪表盘上的手指已经变得惨白。克劳泽深吸一口气，将直升机驶入了风暴之中。\n\n狂风瞬间卷起了直升机，将它带进了漩涡深处。克劳泽徒劳地扭着操纵杆，如同在和一双看不见的手争夺飞机的控制权一般。\n\n“液压故障！”贝克尔扯着脖子喊道。“压力失稳！”\n\n克劳泽猛地将直升机拐了一个刺激的大弯，随后向地面俯冲。眼见直升机就要撞向地面，他又猛地将机头拉起，乘着侧风向上爬升，但这没起到太多作用。“要是两分钟之后还出不去，咱就得跟这直升机一起散架。”贝克尔说道。\n\n“咱们应该快到另一头了……”随着云层在他们头顶散去，克劳泽陷入了沉默。他们到达了风暴的边缘。一片陌生的海岸，以及一支企鹅大军映入他们的眼帘。在直升机掠过它们头顶时，它们无不好奇地抬起头来。\n\n这时，克劳泽在地平线上看到了几座建筑：“那好像不是咱的基地啊。”\n\n“看来，咱闯进别人家来了。”贝克尔答道。"
 antarctica_aag_testing.112.a:0 "好吧，不管咋地，我们知道这玩意儿结实得很了。现在赶紧离开这鬼地方吧。"
 antarctica_aag_testing.112.a.tt:0 "我们对§L梅塞施密特-伯尔科-布洛姆-Bo-115§!的测试进度将推进§Y15%§!。"
 antarctica_aag_testing.120.t:0 "第十二次试飞"
 antarctica_aag_testing.120.desc:0 "“舒曼先生，鉴于您在电磁学方面的造诣，我们认为您会对飞机的测试过程有些深刻的洞见。“汉斯·拜姆勒说道。\n\n舒曼细细地查看了桌上的设计图纸和电路图，但丝毫不为所动。“我可能有点直接，”他回答道，“但你们似乎对着里面到底出了什么问题一无所知。重点不应当是屏蔽，而应当是疏导。这架飞机能在不管是核爆造成的还是自然存在的强电磁脉冲里存活下来的唯一方法就是把它放在法拉第笼里。”\n\n拜姆勒郁闷地晃了晃：“那博士有何高见？”\n\n“我们要完全重置内部电路，还要改变外壳来用它分散上面的电磁脉冲，以防止电磁脉冲侵入内部电路把它搞瘫痪。所以我们还得加上一层绝缘层。”\n\n拜姆勒的情绪变得十分激动：“但要这么做的话，就得投入大量的钞票和时间，还得重新分配材料补给！”\n\n舒曼怒目相对：“如果本土那边要能够为我们带来最终胜利的东西，那就不能考虑代价。”他顿了顿，“不过这终究是你在负责，到底怎么走还得看你的想法。”"
 antarctica_aag_testing.120.a:0 "我要是无视你的意见那就太傻了，舒曼先生。我会告诉迈尔我们的需求。"
 antarctica_aag_testing.120.a.tt:0 "这将花费§W8补给§!£Antarctica_texticon_SUP 。"
 antarctica_aag_testing.120.b:0 "行了，这不是唯一需要资源的飞行器项目，我们没法让给它更多资源。"
 antarctica_aag_testing.121.t:0 "航向改变"
 antarctica_aag_testing.121.desc:0 "一架MBB-Bo-115矗立在机库的正中央，其周身被无数电线织成的巨网所缠绕。它的发动机处于慢车状态，带动螺旋桨缓慢地旋转。拜姆勒和其他十几位科学家一起，站在一个绝缘的控制室内。这次试验的目的是模拟核爆引起的电磁脉冲，测试其对机载电子设备的影响。这会耗不少电，但迈尔向拜姆勒打包票说，它肯定能挨过这一关。\n\n“是时候让真相大白了，”拜姆勒说道，“让咱们看看舒曼这家伙是不是真的像传言里那么聪明绝顶不长毛。”\n\n幸运的是，舒曼没听到这句话。\n\n拜姆勒把他的手放在控制能量输出的拉杆上，轻轻地向前推了一下。顷刻间，能量顺着电线涌入，空气中发出嗡嗡的声响。头顶的灯开始忽闪忽暗，仪表盘的指针也在猛烈地旋转。拜姆勒甚至听见了远处发电机的轰鸣。\n\n如果这时候，哪个倒霉蛋在基地里洗热水澡，那他恐怕要被冻死了。但拜姆勒现在没空关心这个，他的所有注意力都集中在面前的仪表盘上。\n\nEMP的功率达到了上兆瓦，而直升机仍在照常运转。“如果这些读数是正确的，”拜姆勒说道，“那么，我们现在有了一架能在核战争中幸存下来的直升机。”然而，他最担心的一件事是，如此大规模的试验绝对会引起南极大陆上的其他势力的注意……"
 antarctica_aag_testing.121.a:0 "我希望没有人注意到这个……"
 antarctica_aag_testing.121.a.tt:0 "我们对§L梅塞施密特-伯尔科-布洛姆-Bo-115§!的测试进度将推进§Y18%§!。"
 antarctica_aag_testing.122.t:0 "省点钱吧"
 antarctica_aag_testing.122.desc:0 "“然后，”拜姆勒含糊不清地说道，“那个逼崽子居然要我们从头开始重新造那架狗日的直升机！”\n\n他的酒友，一个叫做阿尔布雷希特·波尔的航空科学家点点头：“确实不太行。”\n\n“要我说，”拜姆勒灌了一口啤酒，“凭啥舒曼那家伙能坐拥无穷无尽的资源，然后我们就他妈的得一分钱掰成两半花！”\n\n波尔哼了一声：“家里有几个位高权重的朋友真是太他妈的好了。”\n\n拜姆勒身体前倾，手颤巍巍地伸在身前：“听哥一句劝，你坠好别让格拉塞尔听到这句话。”他停下来，打了个嗝。"
 antarctica_aag_testing.122.a:0 "就算舒曼和格拉塞尔晚上搂着企鹅睡觉，我也不带关心的。"
 antarctica_aag_testing.130.t:0 "第十三次试飞"
 antarctica_aag_testing.130.desc:0 "“美洲轰炸机”这个名字，对于工程师汉斯·拜姆勒和阿尔布雷希特·波尔一手负责重新设计的飞行器来说，再适合不过了。它以霍顿兄弟在战争末期设计的，旨在执行直接轰炸北美这一任务的巨型“飞翼”轰炸机为基础进行改良。在舒曼的神怒之火将珍珠港燃烧殆尽后，它也失去了用武之地。也许霍顿Ho-XVIII注定没有机会履行它与生俱来的使命，但现在，它被赋予了新生。\n\n从许多方面来讲，如今是一个属于高空战略轰炸机的时代，而大日耳曼国在这一领域明显赶不上其他超级大国的步伐。美洲轰炸机自战争结束以来就一直待在机库里吃灰，它既没有参与过轰炸俄罗斯，也没有参与过轰炸西非。德国空军认为它过于笨重，且用在轰炸斯拉夫农民和非洲土著这样的事情上显得杀鸡用牛刀。但它具有其他所有现代战略轰炸机所不具备的优势：它的飞行高度极高，燃料效率也不低，理论上来说可以携带核武器，还能隐秘地在不被雷达发现的情况下把核弹丢到敌人头上。\n\n拜姆勒和波尔默默看着把他们的机库占得满满当当的飞行巨兽。“把这玩意儿的灰尘掸掉是不是能看着顺眼点？”波尔问道。\n\n“应该吧……”拜姆勒答道，“我更关心它能不能像传闻那样飞得那么老高……”\n\n“实践出真知。问题在于，咱们是先原封不动地测试一遍，还是把它魔改到满足空军那帮人的要求再试飞？”"
 antarctica_aag_testing.130.a:0 "这可是架有二十年历史的老古董，还是对这位老姑娘温柔些吧。"
 antarctica_aag_testing.130.a.tt:0 "这将花费§W2补给§!£Antarctica_texticon_SUP 。"
 antarctica_aag_testing.130.b:0 "敌人从不会放慢脚步，凭啥我们就该？"
 antarctica_aag_testing.130.b.tt:0 "这将花费§W5补给§!£Antarctica_texticon_SUP 。"
 antarctica_aag_testing.131.t:0 "第十三次试飞"
 antarctica_aag_testing.131.desc:0 "拜姆勒紧盯着屏幕上的小银点缓缓移进日本人的领地。现在，这架轰炸机正在三万英尺的高空以其预先指定好的巡航速度飞行，到目前为止还没有人发现它的踪迹。\n\n波尔则在一旁来回踱步：“看样子霍顿兄弟的遗产永世长存啊……”\n\n“最好是这样……”拜姆勒答道。突然，出现于屏幕上的另外两个小点吸引了他的注意力，它们正急速向“美洲轰炸机”靠近。\n\n波尔瞪大了眼睛，“那些是——”\n\n“日本人的战斗机。”拜姆勒叹了口气，“我想他们已经注意到我们了，立刻命令飞行员调头，回到我国领地境内。”就这样，拜姆勒和波尔看着这三个小点在屏幕上飞舞着向新施瓦本的边境移动。最后，两架日本战斗机放弃追击，调头返回了基地。\n\n“真险……”波尔嘀咕着说道。\n\n就好像今天还不够倒霉似的，格拉塞尔将军突然带着几名军官冲进了房间。“是不是给这帮小日本点脸了？”格拉塞尔咆哮道，“居然敢把咱们的宝贝飞机逼回来？真他妈蹬鼻子上脸，日本人还嫌自己在南极占的地盘不够多是咋的？既然他们想来硬的，那咱们就看看谁更硬！我马上就与本土方面联系，请求支援，让这帮小日本看看谁才是他们最亲切的老大哥！”\n\n随着格拉塞尔离开房间，拜姆勒和波尔都感到心里的大石头落了地。这家伙根本没注意到他俩在这儿。"
 antarctica_aag_testing.131.a:0 "我是真不知道日本人和格拉塞尔哪个更坏……"
 antarctica_aag_testing.131.a.tt:0 "我们对§g霍顿Ho-XVIII§!的测试进度将推进§Y8%§!。"
 antarctica_aag_testing.132.t:0 "第十三次试飞"
 antarctica_aag_testing.132.desc:0 "拜姆勒和波尔目瞪口呆地盯着监视器的屏幕，美洲轰炸机在四万英尺的高空绕了南极大陆几乎一大圈，把这片陆地上所有国家的宣称领地毫发无损地飞了个遍。\n\n“没想到霍顿兄弟1945年就把这玩意设计出来了，”波尔感叹道，“稍加改进，这架轰炸机还能再服役整整二十年。”\n\n拜姆勒摇摇头，脸上满是惊奇：“要是咱们在过去二十年里继续发展航空技术，你想想今天会是怎样一副光景。”"
 antarctica_aag_testing.132.a:0 "“一潭死水，”波尔嘟哝道，“德国留下来的烂摊子。”"
 antarctica_aag_testing.132.a.tt:0 "我们对§g霍顿Ho-XVIII§!的测试进度将推进§Y15%§!。"
 antarctica_aag_testing.140.t:0 "第十四次试飞"
 antarctica_aag_testing.140.desc:0 "喷气式涡轮的循环速度下降，引擎的高亢哀鸣逐渐变成低沉的嗡嗡声，然后它终于安静了下来。汉斯·拜姆勒从控制台上向后靠去，揉了揉眼睛。这已经是今天的第三次测试了，他甚至不记得这个团队这周做了多少次测试了。\n\n波尔，他坐在拜姆勒旁边的椅子上，双手抱着头。他连眼睛都睁不开了。过了一会儿，他才想起来要记录测试结果，于是急忙拿起纸和笔。\n\n“我不知道我们还能坚持这样的测试强度多久。”拜姆勒说，“空军那帮人要我们搞的这些测试很快就会害死我们。”\n\n因为自己的笔需要在纸上划来划去，波尔只能咕哝着表示同意。他在大学里熬了很多个深夜，写小册子，组织游行，这些都没有得到党的授权，但这些考验把他的耐力锻炼到了极限。\n\n“在我看来，”拜姆勒说，“我们有两个选择。第一，继续今晚的测试，一直到明天早上，不然的话……”\n\n波尔扬起眉毛说道，“你的意思是说？”\n\n拜姆勒阴沉地瞥了波尔一眼：“别愁眉苦脸的了，来喝一杯吧。”"
 antarctica_aag_testing.140.a:0 "“现在可不是放弃的时候，”波尔说道，“就快完成了。”"
 antarctica_aag_testing.140.b:0 "“去他娘的！”波尔嚷了一句，“咱俩今天喝个痛快！”"
 antarctica_aag_testing.140.b.tt:0 "这将花费§W1补给§! £Antarctica_texticon_SUP 。"
 antarctica_aag_testing.141.t:0 "火力全开"
 antarctica_aag_testing.141.desc:0 "波尔盯着发动机的涡扇——那是一片模糊的区域，中间穿插着整个钢铁时代。如果他照镜子看看他自己，他会看到一双可怕的，被咖啡弄得昏昏沉沉的，充血的眼睛在盯着他。此刻，他的世界是旋转着的，尖叫着的，钢铁与风的赋格曲。\n\n在白日梦里，波尔思量着引擎的威力，以及它可能给人体带来的恐惧：被吸入引擎，在被引擎排出的热气烧焦之前，压在引擎的末端，最后变成一摊红色的粘稠物。坦白地说，不管是谁，要是碰上这个死法，那可真是惨到家了。\n\n突然，控制台响起的轻微警报惊醒了波尔和拜姆勒。他们连忙去聚精会神地去检查引擎读数。“我的上帝，”拜姆勒说，“你看到这个了吗？”\n\n波尔麻木地点了点头：“该死，我们，刚刚超过了涡轮风扇的最大速度！”他转向拜姆勒，“我们得解释一下刚才为什么睡着了……”"
 antarctica_aag_testing.141.a:0 "“你这话是啥意思？我们刚才不是盯着仪器嘛，”拜姆勒说道。"
 antarctica_aag_testing.141.a.tt:0 "我们对§g霍顿Ho-XVIII§!的测试进度将推进§Y5%§!。"
 antarctica_aag_testing.142.t:0 "不过威士忌是真他妈的香！"
 antarctica_aag_testing.142.desc:0 "拜姆勒打开一瓶秘密珍藏的日本清酒，在基地里面，这般奢侈品可是严抓狠打的对象。“喝过这东西吗？”他问波尔。\n\n“就一次。”\n\n“真的？啥时候的事啊？”拜姆勒给波尔倒了一杯酒，“这可不是什么随随便便就能搞到手的玩意。”\n\n“不骗你，汉斯。我以前还是小屁孩的时候加过几个组织，元首不一定认可的那种。”波尔回答道。\n\n汉斯摆了摆手：“我呸，还元首呢？”他咧着嘴笑道，“你那些个默默无闻的小团体可一点刺激不到元首的心。另外，”他将酒杯伸到波尔面前，“我喜欢实诚人。”两个人干了一杯。“现在，咱们彼此再坦诚相待一次……姑娘些都长得咋样？”"
 antarctica_aag_testing.142.a:0 "你想象不到的，汉斯。你绝对想象不到……"
 antarctica_aag_testing.150.t:0 "第十五次试飞"
 antarctica_aag_testing.150.desc:0 "“我不理解，”迈尔边绕着被拆解下来的发动机踱步边说道，“它也不是超音速飞机啊……”\n\n拜姆勒和波尔感到自己有些腿软。“这倒是没错，”拜姆勒承认了这一点，“但这台引擎的缺点和其他超音速飞机的缺点很类似，由于这架飞机之前从来没有进行过长时间飞行，因此霍顿兄弟也没发现这一点。说实话，我们也是直到最近才知道的，还得感谢一下克劳泽中尉，要不是他开飞机开得这么狂野，我们还真发现不了。”\n\n迈尔叹了口气：“行，继续往下说吧。”\n\n拜姆勒清了清嗓子，“这架飞机的最高速度在每小时九百公里左右，远远达不到音速。但它的发动机设计有一个缺陷。”他伸出了手，在发动机宽大的环形进气口周围摩挲，“当它进行急转弯时，大量空气会一瞬涌入进气口，以超音速通过涡轮。”他又指了指发动机较窄的那一侧，“这些‘气流炸弹’会损坏涡轮机，致使部件松动，甚至可能导致整个发动机爆炸。”\n\n“所以呢，”迈尔问道，“我们该怎么办？”\n\n拜姆勒看了看波尔，后者接过了话头：“我们可以改变发动机的规格，这将使轰炸机的机动性下降，但安全性会大幅提升；另外，我们也可以设计并制造一款全新的、高性能的发动机，做到两全其美。”"
 antarctica_aag_testing.150.a:0 "别做不必要的事情。改变越小越好。"
 antarctica_aag_testing.150.a.tt:0 "这将花费§W2补给§!£Antarctica_texticon_SUP 。"
 antarctica_aag_testing.150.b:0 "我不想为了解决这问题牺牲性能。搞个新的引擎！"
 antarctica_aag_testing.150.b.tt:0 "这将花费§W4补给§!£Antarctica_texticon_SUP ，同时我们会获得§R2军事点数§!£Antarctica_texticon_MIL 。"
 antarctica_aag_testing.151.t:0 "能用就行"
 antarctica_aag_testing.151.desc:0 "迈尔甚至从地面上都能清楚地看出，Ho-XVII比平时行动迟缓一些。他拿起双筒望远镜，看到克劳泽开着它在基地上空作了一个小急转，没有什么亮眼之处，但迈尔认为，不论是克劳泽还是其他任何飞行员，开着轰炸机都是很难狗斗过截击机的。\n\n尽管如此，这个对引擎的小改动为还是为他们省下了不少燃油。"
 antarctica_aag_testing.151.a:0 "公正的权衡。"
 antarctica_aag_testing.151.a.tt:0 "我们对§g霍顿Ho-XVIII§!的测试进度将推进§Y3%§!。"
 antarctica_aag_testing.152.t:0 "更快，更好，更强"
 antarctica_aag_testing.152.desc:0 "迈尔不得不承认，他很高兴没有降级美洲轰炸机项目。他看到克劳泽在基地上方的天空中表演转弯，他对这样的动作想都没有想过——他以为这对一架又大又宽的飞机而言是不可能的。"
 antarctica_aag_testing.152.a:0 "这对我们的敌人而言将是炼狱般的景象。"
 antarctica_aag_testing.152.a.tt:0 "我们对§g霍顿Ho-XVIII§!的测试进度将推进§Y12%§!。"
 antarctica_aag_testing.160.t:0 "第十六次试飞"
 antarctica_aag_testing.160.desc:0 "波尔放下杯子，打量着深黑色的咖啡液。“你没和我开玩笑，”他说，“这玩意儿真不赖。”\n\n拜姆勒坐在波尔对面的办公桌前，啜饮着自己的杯子里的咖啡：“我买的可是专门进口货，锁在保险柜里的。”他指了指角落里的一个柜子，“所有人都认为里面是绝密的设计文件。”他咯咯地笑了，“连我都感觉咖啡豆的香味会暴露。”\n\n波尔笑着说，他又喝了一口。他咂咂嘴，放下杯子：“那么，我们该怎么处理美洲轰炸机的燃料问题呢？老实说，我很惊讶霍顿兄弟选择了这么差劲的混合燃料给远程轰炸机用。凭目前的混合方法，它肯定能飞到美国——不过是张单程票。”\n\n拜姆勒耸了耸肩，把手伸进书桌的抽屉里：“他们没有‘逆境的天赋’。”他拿出两份文件，“每一份报告都是对不同燃料类型的分析。第一种，”他挥舞着一个文件夹，“是一种燃料混合物，类似于民用货运飞机上的东西。我知道这不是军标，但我喜欢它能够为大载荷飞机提供动力的特点。但是，缺点是，它和其他任何商业燃料一样易燃。”随后，拜姆勒又挥了挥第二个文件夹：“至于这第二种，类似于美国人在他们B-52轰炸机上用的。军用级别，经过验证的记录，但大量采购极其困难，更别提在基地里合成了。在你看来，哪个更好？”\n\n波尔叹了口气：“这种选择可不容易啊……”"
 antarctica_aag_testing.160.a:0 "易获取可不是个能随便忽视的优点，就选民用混合燃油了。"
 antarctica_aag_testing.160.a.tt:0 "这将花费§W3补给§!£Antarctica_texticon_SUP 。"
 antarctica_aag_testing.160.b:0 "军用飞机当然要军用燃料，还是选B-52混合燃油吧。"
 antarctica_aag_testing.160.b.tt:0 "这将花费§W6补给§!£Antarctica_texticon_SUP 。"
 antarctica_aag_testing.161.t:0 "第十六次试飞"
 antarctica_aag_testing.161.desc:0 "消防队员从跑道上狂奔而过，拼命尝试控制美洲轰炸机残骸周围燃起的大火。眼前是一幅噩梦般的景象：整架飞机被强大的外力撕成两半；火势直冲云霄，形成了高达五十英尺的烈焰之柱。\n\n这场悲剧怪不到任何人头上。其中一个起落架未能正常放下，导致了事故的发生。机上全体成员无一幸免。\n\n波尔转身面向拜姆勒。"
 antarctica_aag_testing.161.a:0 "我希望避免这样的惨剧再度上演。"
 antarctica_aag_testing.161.a.tt:0 "我们对§g霍顿Ho-XVIII§!的测试进度将推进§Y3%§!。"
 antarctica_aag_testing.162.t:0 "第十六次试飞"
 antarctica_aag_testing.162.desc:0 "美洲轰炸机已在空中巡航将近六个小时，拜姆勒和波尔从仪表传来的遥测数据得知其油量还剩下一半。事实证明，这是一架极为高效的轰炸机。\n\n“幸好咱们选的是军用混合燃油，”波尔看向拜姆勒，“要是选了民用的，鬼知道会发生什么。”\n\n“没错，”拜姆勒回道，“但我们现有的燃油库存很难再维持试飞了，接下来必须速战速决。”"
 antarctica_aag_testing.162.a:0 "这一切都是值得的，拜姆勒。"
 antarctica_aag_testing.162.a.tt:0 "我们对§g霍顿Ho-XVIII§!的测试进度将推进§Y8%§!"
 antarctica_aag_testing.200.t:0 "霍顿Ho-229大获成功"
 antarctica_aag_testing.200.desc:0 "致阿诺德·荣格\n\n鲁道夫·迈尔，席尔马赫站，新施瓦本\n\n荣格先生，\n\n在您收到埃里希·舒曼工程团队的正式报告之前，我想提前与您通信一下。我很高兴地告诉您，霍顿Ho-229寒带适应实验大获成功。虽然资源紧缺，南极洲的军事形势也不容乐观，但我方团队成功完成了所有指定改进项目。应空军要求，我方还试验了戈林所提出的“3x1000”计划可行性，而结果显示，在满足现有速度、航程和额定挂载指标下，机体无法达到计划要求。除此以外，团队为完成上述指标已竭尽全力，我想向他们表达由衷的赞扬。\n\n若空军遵循其研发意图，使用该型战机轰炸残余的俄罗斯工业聚集区，我相信他们肯定能对其所带来的毁灭性打击感到十分满意。\n\n最后，我想请求您亲自了解一下是否可以提高资金投入和材料资源供给量。我方科学家借由现有资源就已经完成了寒带适应实验，要是德国能满足团队的一切需求，想想他们能干出怎样的功绩啊。"
 antarctica_aag_testing.200.a:0 "希特勒万岁。"
 antarctica_aag_testing.200.a.tt:0 "我们将向§r德国本土§!汇报我们为§r霍顿Ho-229§!所付出的心血。"
 antarctica_aag_testing.201.t:0 "严峻报告"
 antarctica_aag_testing.201.desc:0 "迈尔翻阅着霍顿Ho-229战斗轰炸机寒带适应改装的最终报告书。看到第五页后，他合上书，看向桌子那头的舒曼说：“依你所见，进度如何？”\n\n舒曼长叹一口气，回答道：“这个嘛，我们稍许提升了一下机体的寒带表现，它可以短程轰炸俄罗斯西部的工业聚集区，但乌拉尔山脉之外的西伯利亚就别想了。另外，对于争夺极圈内的阿拉斯加和加拿大领空……只能说不建议这么做。说到底，我们只是对上一代飞机做了些许改进，无法和现代军备同日而语。我甚至不能说它是一架现代军机。”\n\n迈尔点了点头，波澜不惊：“我基本也是这么想的。”\n\n“要是你能给计划多分配点资源，或者用好有限的补给，我们的科学家或许就能交出更好的答卷。”\n\n语毕，迈尔气的面红耳赤。他咬住腮帮，忍住不喷垃圾话：“博士，南极之于德国的优先度，你和我都心知肚明。东方领和乌克兰的殖民部队要比我们更可能拿到补给。”\n\n舒曼耸了耸肩：“要是国家真的尊重、相信这儿的理事人，或许结果就不一样了。”"
 antarctica_aag_testing.201.a:0 "迈尔从椅子上站起来，咆哮道：“出去！”"
 antarctica_aag_testing.201.a.tt:0 "我们将向§r德国本土§!汇报我们为§r霍顿Ho-229§!所付出的心血。"
 antarctica_aag_testing.202.t:0 "有个一两次"
 antarctica_aag_testing.202.desc:0 "“先生们，我知道资源有限，”迈尔说，“但你们真的没法显著改善霍顿Ho-229的任何方面吗？”\n\n舒曼、拜姆勒和其他设计人员在飞行实验室里站成一排，个个犹如受到惩罚的小学生。舒曼说：“我们完全是因为缺乏补给才无法在寒带适应实验上取得突破。”\n\n“别打岔！”迈尔咆哮道，“我知道你们搞砸了，它达不到空军的标准。这架飞机没法加大空袭杂种横行的西俄罗斯荒地的力度，更不用去想直飞北美的北极航线了。为了这个项目会给我们带来的好处，我们甚至不如干脆不测试它。德国不容许失败，而且鉴于我们在这里都犯了这样那样的错，我也不认为祖国在不久之后就会敞开怀抱欢迎我们回家。诸位，你们所做的事情，不过就是给了他们无限延长流放期的理由。”\n\n“不过，这次行动也有可圈可点之处。虽然飞行计划既然严苛又危险，但克劳泽中尉和机组人员还是展示出了极高的专业素养。他们活下来了，值得称赞，但是你们辜负了他们的付出。”"
 antarctica_aag_testing.202.a:0 "事事如意是不可能的……但成功个一两次就挺好了。"
 antarctica_aag_testing.202.a.tt:0 "我们将向§r德国本土§!汇报我们为§r霍顿Ho-229§!所付出的心血。"
 antarctica_aag_testing.203.t:0 "两极"
 antarctica_aag_testing.203.desc:0 "迈尔和229寒带适应改装团队一道站在机库顶上。今晚可是他遇见过最冷的一晚，裹着大衣的迈尔瑟瑟发抖，其他人也都带着护目镜和面罩。舒曼目镜下的眼睛肿胀着，活脱脱像个坏蛤蟆。\n\n寒带适应实验大获成功，科研团队的表现超乎一切预期。迈尔对团队拿到的资源之少心知肚明，他对此尤感意外。他们奇迹般地做到了每一件事：不仅成功在规定期限内对229进行了寒带适应改装，甚至还设法完成了戈林那疯狂的3x1000计划。\n\n“迈尔先生，克劳泽和贝克尔已准备好投弹。”舒曼说道。\n\n迈尔点头：“让我们看看这架飞机的能耐吧。”\n\n一行人先听到了发动机的声音。两具能让战机以每小时一千公里的速度掠过基地的喷气机发出巨大的轰鸣，片刻之后，229划过天际，丢下足足一吨炸弹，南极的夜空瞬间被爆炸的火光照亮，整个试验场都被烈焰与炸出来的冻土所覆盖。\n\n“精准无比。”舒曼说道。\n\n迈尔能看出舒曼的嘴快咧到天上了。“这架飞机，”迈尔说道，“作战半径超1000公里，还有寒带适应性改件，想必能轻而易举地完全摧毁西俄罗斯仅剩的工业聚集区……”\n\n舒曼插嘴说：“可别说，有了这架重振雄风、绝无仅有的战机，不管是去极圈里抢制空，还是跑去挪威或深入北加拿大作战，都不在话下。英帝国残党将遭受新一轮的闪电战打击，德国也将统治全世界的天空！”"
 antarctica_aag_testing.203.a:0 "极寒战场上又多出了一条新前线。"
 antarctica_aag_testing.203.a.tt:0 "我们将向§r德国本土§!汇报我们为§r霍顿Ho-229§!所付出的心血。"
 antarctica_aag_testing.210.t:0 "觥筹交错"
 antarctica_aag_testing.210.desc:0 "在开香槟之前，迈尔确保锁好了停放着现代化的梅塞施密特P.1110飞机的机库的门。他和拜姆勒站在二十几位工程师和电工面前。迈尔举起杯子。“伙计们，”他说，“你们完成了不可能的事。尽管我们这里的局势越来越不可预计，国内也越来越不稳定——但你们成功地超出了所有人的预期——祖国人民会因此而自豪。”说着，他抬头看了看战斗机。这种新型飞行器可以在南极洲的黑暗中生存下来，而且，如果有机会的话，它可以在任何天气击落任何飞机。其木制框架的简单性使其特别地便宜轻巧，这允许了将更多的重量分配给武器和电子设备。\n\n鲁道夫·迈尔继续说道：“我知道你们都听说了补给中断的事情，但请放心，这一成就将使我们大出风头——运气好的话，几个月后，满载热巧克力和香烟的船只驶进施佩伯爵港。为我们的成功干杯！”\n\n聚集在一起的科学家们附和着祝酒词，然后分散成更小的小组开始讲话。“您真的相信这些吗，先生？”拜姆勒低声对迈尔说。\n\n鲁道夫·迈尔皱着眉说道：“我确信祖国不能再无视我们了——至于他们将如何利用这种关注，这超出了我的能力范围。”\n\n拜姆勒连忙点点头，把手伸进外套口袋，拿出一些叠好的纸：“按照您的要求，一个框架团队已经开始研究P.1110项目的衍生型。根据测试数据，大规模生产P.1110不仅可行，而且成本低，速度快。如果空军方面和国内的航空工厂倾其全力生产这种飞机，我们就能以与敌机一比十的比例生产这种飞机——并且配合上长期的训练计划和新飞行员招募，就像您过去那时一样——我们可以甚至可以用战机遮住太阳。”"
 antarctica_aag_testing.210.a:0 "如果德国得以存活，我们的敌人就将面对那黑暗的未来了。"
 antarctica_aag_testing.210.a.tt:0 "我们将向§r德国本土§!汇报我们为§s梅塞施密特P.1110§!所付出的心血。"
 antarctica_aag_testing.220.t:0 "多么可爱的一天"
 antarctica_aag_testing.220.desc:0 "席尔马赫站的晴朗白天，迈尔下令在基地的中央庭院里摆放野餐桌。他们拿出小型供暖器，用旧油桶即兴烧烤，还搭起了足球场。厨师们用明火烤着香肠，男士们呷着迈尔给他们准备好的酒水。这毕竟是个美好的日子。\n\n席尔马赫端着一个堆满了香肠和酸菜的盘子走近迈尔：“他们起飞了吗？”\n\n迈尔笑了：“三十分钟前就起飞了，这个点应该快到了。”克劳泽与贝克尔让迈尔想起了多年前的自己与席尔马赫，他们第一次驾驶飞机，把这片寒冷的土地在地图上描绘了出来。胆大妄为的两位飞行员，渴望自己能扬名立万。“可能某一天，”迈尔说，“那两个人也会像你一样，为那么多的地理位置命名。”\n\n席尔马赫大笑：“我倒不觉得这个世界上还剩下多少地方没有被探索过。”\n\n“你最好希望如此。”\n\n迈尔回头看了看那些人，发现他们已经停下了疯狂的体育运动，转而去目睹某些壮观的事物了。从云层中窜出来的是现代化的MBB-Bo-115的纤细框架。大家习惯于叫它“坦克噩梦”，它将成为全世界的坦克手的梦魇。克劳泽和贝克尔负责控制，这是他们应得的。他们低空飞行，快速掠过了基地，把地上的雪卷到了旁观者的脸上。他们又在空中完成了一个难以置信的环形飞行，然后朝着一个装满了装甲板和炸药的靶场垂直下落，朝着场地发射了一连串的制导反坦克火箭弹，清除了全部目标，只留下一地燃烧着的废墟。\n\n周围人发出一阵欢呼以示赞许，他们为自己的工作而骄傲，尽管南极环境真不算好……"
 antarctica_aag_testing.220.a:0 "迈尔也为他们而骄傲。"
 antarctica_aag_testing.220.a.tt:0 "我们将向§r德国本土§!汇报我们为§LMBB-Bo-115§!所付出的心血。"
 antarctica_aag_testing.221.t:0 "坏消息？"
 antarctica_aag_testing.221.desc:0 "电气工程师汉斯·拜姆勒决定在飞行员们自己的地盘：一号机库内宣布一项坏消息。MBB-Bo-115的测试项目结束了，结果却是平庸的。飞机的机动性与结构完整性有了微小的改进，有效负荷却无增无减，对一台现代坦克杀手来说，它已经过时了。\n\n这不是克劳泽与贝克尔的错，他们不过是测试了自己接手的机器而已，这是要冒极大生命危险才能尽到的责任。更确切地说，是设计小组没能有效利用他们分配到的资源——也就是德国空军分配给他们的那点可怜兮兮的玩意儿。\n\n在最后一次试飞前，拜姆勒将飞行员们拉到机库的角落：“这种话实在开不了口”，拜姆勒说道，“但直升机项目不幸被搁置了。”\n\n克劳泽与贝克尔的面色阴沉下来：“什么……我们还只是触及了表面而已！”克劳泽抗议道，“我们能做的事还多着呢。”\n\n“这是迈尔的命令。况且，他希望你们二位能为下一系列的测试做好准备。”\n\n克劳泽扬起了眉毛：“下一系列的测试？这次我们又要收到什么玩意儿？”\n\n拜姆勒小心地打量了下四周，轻声说道：“我听说我们会收到一架美洲轰炸机……又或者是两架。”\n\n“此话当真？”贝克尔惊讶地说，“自从大战结束后，可很少听见这群老鸟们叫唤了。”"
 antarctica_aag_testing.221.a:0 "关上一间驾驶舱，会有另一间为你敞开大门……"
 antarctica_aag_testing.221.a.tt:0 "我们将向§r德国本土§!汇报我们为§LMBB-Bo-115§!所付出的心血。"
 antarctica_aag_testing.222.t:0 "不可避免的结果？"
 antarctica_aag_testing.222.desc:0 "“现在，在理论上而言，”克劳泽和贝克尔走向MBB-Bo-115原型机时说，“我知道他们不想让我们在这次飞行中做任何太疯狂的尝试……但是……”\n\n贝克尔咧嘴笑道：“我完全知道你小子想搞什么鬼。”\n\n但是，克劳泽才把脚放在通往直升机驾驶舱的梯子的第一段时，他身后的一阵骚动阻止了他——鲁道夫·迈尔和一群垂头丧气的科学家正穿过机库走来——这些垂头丧气的人们使得飞行员收敛了脸上的傻笑——他有一种不好的预感。\n\n“先生们，”迈尔说，“你们可以把你们的飞行服扔掉了。计划取消，立即生效。”\n\n克劳泽错愕得回不过神来，这使他在他的指挥官面前说了句很僭越的话：“大哥，你，你没搞错吧？”\n\n“很抱歉。”迈尔懊丧地摇了摇头，“我无法为一个迟迟没有结果的项目花费资源。”他停下来，愤怒地督了科学家们一眼，“相信你能理解的，克劳泽。”\n\n克劳泽倚靠在梯子上：“地面上的原型机最后会怎么样？”\n\n“很难说。至少有一架会留下来巡逻吧……”飞行员的表情变得开朗起来，“……但其余的飞机可能会被判在某个该死的专员辖区里服役。也许，它们会领到在俄罗斯或乌克兰狩猎游击队的新任务。”"
 antarctica_aag_testing.222.a:0 "这很不体面……但是这也是没有办法的事。"
 antarctica_aag_testing.222.a.tt:0 "我们将向§r德国本土§!汇报我们为§LMBB-Bo-115§!所付出的心血。"
 antarctica_aag_testing.223.t:0 "敢做敢当"
 antarctica_aag_testing.223.desc:0 "“你觉得我们又有麻烦了吗？”在向机库走去时的路上，贝克尔这样问道。\n\n“我们为什么会有麻烦？”克劳泽笑着回道，“这次我们的成绩超过了上一轮试验的所有预期。当然，一些直升机被损坏了……呃，可能是被炸飞了……但这是进步的代价。”\n\n贝克尔用胳膊肘戳了克劳泽一下。\n\n两人进入机库，爬上后墙的楼梯，来到地面上那封闭的观测台。即使那是封闭的，当他们到达顶部的时候，他们还是差点被冻死。透过俯瞰机库地面的窗户，他们不仅可以看到迈尔，还可以看到高级指挥部的其他成员，以及MBB-Bo-115的设计团队。这景象让克劳泽很担心，只有在两名飞行员闯了大祸的时候才会看到这些人。\n\n“你现在已经把该做的做了。”迈尔说，对飞行员们摇了摇头，“回国之后，你得为你的行为向日耳曼尼亚方面负责。”\n\n克劳泽和贝克尔的脸色上一下子变得惨白。接着，便是一阵紧张的沉默。\n\n席尔马赫那严肃的脸上突然绽放出笑容，与会的其他领导人也跟着笑了起来：“哈哈，你们真应该看看你们脸上的表情！”\n\n鲁道夫·迈尔则咯咯地笑着走上前，和目瞪口呆的飞行员们握了握手。\n\n“所以，我们这次没闯祸？”贝克尔问道。\n\n“你们在说什么呢，两位英雄？”迈尔说，“归功于您们那无与伦比的飞行能力和设计人员的不懈努力，祖国才收获了一架性能无与伦比的现代化直升机。”\n\n舒曼也在一边帮腔：“日耳曼尼亚方面对此也很满意，戈林元帅邀请你们两位成为日耳曼尼亚空军飞行表演的主角！”"
 antarctica_aag_testing.223.a:0 "迈尔干笑两声：“只是……这回千万别坠机了。”"
 antarctica_aag_testing.223.a.tt:0 "我们将向§r德国本土§!汇报我们为§LMBB-Bo-115§!所付出的心血。"
 antarctica_aag_testing.230.t:0 "未来之途"
 antarctica_aag_testing.230.desc:0 "汉斯·拜姆勒与阿尔布雷希特·波尔坐在霍顿Ho-XVIII的驾驶舱内，共享着保温瓶内的咖啡。它更出众的名字叫“美洲轰炸机”，波尔用咖啡因刺激的手指敲打着单词，而拜姆勒仔细阅读着写字板上的内容，简述飞机的最终参数：“总地来说，在我们的改良与创新下，这架飞机能以雷达上最小的轮廓，飞出更远的航程，完成战略轰炸的目标。根据我们的科学观点，这架飞机足以实现乃至超越空军的全部需求，也能成为我国战略核武器库威慑的重要组成部分。”\n\n波尔搓着手靠在椅背上：“可算完成了啊。”他的言语中显露出难以置信。\n\n“没错”，拜姆勒骄傲地说，“这宝贝可是个挑战，我也很吃惊设计团队竟能提前完工，就连计划的资源也少用了不少。”\n\n“哼姆，”波尔犹如个大贤士般点了点头，一手放在舱壁的隔板上，“汉斯，你想想……看看这架飞机，它能做到什么……我简直觉得我们不是坐在机舱里，更是坐在未来中。”他压低了嗓音，“国家在战后封存了这款飞机是个天大的错误，如果我们多花几年反复研究改进，想必已经能拿到科幻小说里的武器了。该死，也许再过一些年，我们都不需要克劳泽和贝克尔那样的飞行员了！”\n\n拜姆勒哈哈大笑起来：“我们也不用围绕他们俩搞设计了！”"
 antarctica_aag_testing.230.a:0 "这是通往未来的道路。"
 antarctica_aag_testing.230.a.tt:0 "我们将向§r德国本土§!汇报我们为§g霍顿Ho-XVIII§!所付出的心血。"
 antarctica_aag_testing.240.t:0 "苹果派"
 antarctica_aag_testing.240.desc:0 "官僚阿诺德·荣格一手拿着苹果派，还有手留给下午吃，再来一手就是德国在南极洲的立足点——席尔马赫站的最新报告。与大多数废纸篓子不同，这份报告不仅是从那个冰窟窿里蹦出来的，还显现出事态有所进展的确切迹象。据报告人兼新施瓦本指挥官鲁道夫·迈尔所说，即使本土几乎没有给席尔马赫站提供任何帮助，霍顿Ho-229的寒带适应实验依然大获成功。\n\n阿诺德又咬了一口馅饼，饼屑子全洒在了报告上。红军可得好好想想这茬了。他懒洋洋地打了个饱嗝，继续浏览文件。当迈尔又开始喋喋不休地谈起请求补给的事情时，荣格啪地将报告丢在发件箱中，留给了他的上级。让他们再给迈尔划个红叉吧，荣格还有馅饼要吃呢。\n\n当然，在他狼吞虎咽地享用着糕点时，不免也会对身在南极的迈尔和他的手下心生同情。他知道他们没什么新鲜的东西吃，更别说火热的苹果派了！"
 antarctica_aag_testing.240.a:0 "先生们，这口馅饼是给你们的！干杯！"
 antarctica_aag_testing.241.t:0 "平淡之果"
 antarctica_aag_testing.241.desc:0 "阿诺德·荣格甚至懒得读完那份来自新施瓦本的德国南极殖民地报告，就把它扔进了书桌上的外放文件篮里。那份报告主要涉及德国最新的技术实验，其目的是让霍顿Ho-229战斗轰炸机能够在没有飞行员和机身冻结的情况下在俄罗斯上空飞行。事实上，在席尔马赫站的实验就像德意志祖国最近的作出许多努力一样，平庸地结束了。那些可怜的科学家们显然无法做出任何改进，坦率地说，他们已经从本质上确认了这架飞机已经彻底过时了。\n\n好吧，就算是荣格也能告诉他们事情的真相。实际上，席尔马赫站上的实验几乎没有得到任何物质上的帮助，德意志祖国也对这个项目坐视不理。这批人到底能在世界的尽头做什么？这群知识分子一定是惹了日耳曼尼亚里某些有影响力的大人物，才被送进这个建在夭折殖民地之上的劳改营里的。\n\n相比之下，荣格对他所拥有的咖啡和温暖的办公室而感到满意，不论以后祖国洪水滔天。"
 antarctica_aag_testing.241.a:0 "至少我不在南极。"
 antarctica_aag_testing.242.t:0 "一败涂地"
 antarctica_aag_testing.242.desc:0 "阿诺德·荣格坐在德国极地研究学会的办公室里，仔细阅读着霍顿Ho-229战斗轰炸机寒带适应改装计划的最终报告。新施瓦本的德属南极洲殖民地负责对229进行翻新、现代化改装，使其能继续飞往俄罗斯出勤，或是日后用来争夺加拿大的极圈内领土。不过，要是荣格没看错的话，报告上清楚地表明计划已是一败涂地。\n\n虽说平庸的资质和压迫人的腐败官僚主义算是导致失败的原因，但完全失败孰可忍？但凡真的有点建树，德国都会直接无视不尽如人意的成果。\n\n荣格这时才痛苦地意识到，德国在南极洲近乎一事无成。许多人都认为，殖民南极洲的尝试失败后就不应该选择继续维持当地研究基地运作，而眼下这一失败则足以动摇空军的决心，让他们自己去彻底叫停计划。\n\n不论如何，荣格都做不了主。他把报告放进发件箱，出门吃午饭去了。"
 antarctica_aag_testing.242.a:0 "可以整点美味的小香肠吃……"
 antarctica_aag_testing.243.t:0 "吐脯"
 antarctica_aag_testing.243.desc:0 "国家的叔父赫尔曼·戈林总算从威胁德国的动乱中抽身，享受着难得的片刻宁静。他基本都待在后屋里，平常还会有人围在一边叽叽喳喳，但今天总算是能独自享受一下晚饭了。就在戈林啃烤鸭、喝赤霞珠酒、细细品味这一刻的时候，一个助手突然冲进来打搅他，手上还挥舞着一沓纸。\n\n戈林拿上菜叉捅死助手的心都有了。“长官，他们做到了！”助手说道，“成功了！”\n\n“啥？”戈林拿起红酒杯问道，“那个傻逼海德里希总算动手了？”\n\n“不是！”助手答道，“是埃里希·舒曼的消息。”\n\n戈林抬起一边的眉毛。很久之前，他把舒曼送去新施瓦本，还给这人定了个拍脑袋的计划，想着日后自己从叔叔变成元首后就能亲自管这茬了。“他有啥事？又来要钱了？”戈林抿了口红酒。\n\n“舒曼一行人成功完成了对霍顿Ho-229的寒带适应改装，使其能继续在俄罗斯地区作战。他们甚至还提前完成了计划。\n\n戈林得意地笑了。德国正在分崩离析，守时可是个稀奇事，成功就更少见了。他追问道：“所以这些人只是干完了该干的活？”\n\n“他们还达到了您在数十年前给计划定下的3x1000指标，现在这架战斗轰炸机的速度可达每小时1000公里，航程有1000公里，还能带一吨的挂载！”\n\n听罢，戈林把嘴里的红酒都喷了出来。"
 antarctica_aag_testing.243.a:0 "“老天爷啊！”"
 antarctica_aag_testing.244.t:0 "热巧克力的要求是不是太高了？"
 antarctica_aag_testing.244.desc:0 "一个鼓鼓囊囊的档案袋出现在德国极地研究协会的阿诺德·荣格的桌子上。“来自席尔马赫站。”这位官僚对信封进行了一次检查，以确保它没有被篡改。他很满意，拆开封条，取出里面的内容。他浏览了通常的南极天气和野生动物报告，以及对热巧克力混合物的要求，直到他发现一份奇怪的文件。\n\nMe.P1110测试报告\n\n当荣格阅读这份文件时，他被那些让他困惑的技术语言轰炸了。电传操控？致动器？闭环反馈控制？极地绝缘材料？环形进气口？\n\n由于无法破译这些专业术语，荣格寻求专家的帮助——隔壁的那个官僚，兼业余航空爱好者。\n\n“嘿，贡特尔，”荣格说，他像地鼠一样把头伸过隔板，“我有东西要给你，也许你能搞懂它。”\n\n贡特尔挑了挑眉毛，从荣格手中接过文件。当他的目光在文件中游走时，其他人和他的笑容都变得很灿烂。“或许新施瓦本的未来还是有热巧克力的，”他低声说。“我简直不敢相信。德国就要灭亡了，而这些人居然在做他们的工作？”\n\n荣格皱了皱眉头，从贡特尔手中抢过了那份文件。“好吧，也许如果你和部门有更好的工作态度，祖国根本就不会灭亡。”\n\n“但是荣格，你是部门的一员！”"
 antarctica_aag_testing.244.a:0 "“呸！”荣格挥了挥手，“我去吃馅饼。”他说者，蹒跚地走出办公室。"
 antarctica_aag_testing.245.t:0 "空军机密备忘录"
 antarctica_aag_testing.245.desc:0 "MBB-Bo-115反坦克直升机\n\n测试地点：新施瓦本，席尔马赫站\n\n我方研究与开发团队已在南极测试点成功完成对MBB-Bo-115的现代化改造。该直升机现具备执行复杂空中机动的能力，并配备有最先进的反装甲载具技术。此外，有鉴于鲁道夫·迈尔及其团队制定的严格测试标准，该直升机目前可适应各类不同气候，势必将在我国东部诸专员辖区大显身手。\n\n相较其早期型号而言，该机性能及相对效率显著提高，可谓是工程上一大奇迹。迈尔及其团队功不可没，理应受到更大规模的资助与赞扬。空军现已正式将该现代化改进型号作为反坦克直升机主力列装部队。在国内和南极的测试表明此机种未来有望发挥多种用途，我军亦应尽力将其纳入学说体系。"
 antarctica_aag_testing.245.a:0 "仅供目视查阅"
 antarctica_aag_testing.246.t:0 "冰与火"
 antarctica_aag_testing.246.desc:0 "就算布伦内德·斯特拉瑟机场不是地狱，它也在地狱的隔壁。柏油路上方的空气因高温而闪闪发光，沥青变得像海绵一样松软，用来修复跑道的柏油已经变成了灼热的泥浆。好在今天的新来者不需要跑道着陆。\n\n德国空军命令兰格中尉将过时的MBB-Bo-115反坦克直升机转移到其德属西南非专员辖区的最后服役地点。新施瓦本的南极工程团队只能对原始模型做适度的改进，唯一显著的变化是转子，以获得更大的机动性。兰格遗憾地认为，武器装备远远不能满足标准使用要求。因此，德国空军决定将剩余的许多直升机下放至与OFN结盟的南非边境。在未来任何跨越大草原的大规模机动战争中，这些相对一次性的、过时的但却大量机器可能会派上用场——对付大批缺乏纪律的南非应征士兵。即使飞机没有适当的武器装备，伴随着猛烈的轰炸的直升机中队也会对敌人的士气造成巨大的打击。\n\n最后，兰格想，这就是住在地狱隔壁的意义所在：充分利用别人给予你的一切。谁知道呢？也许这些小鸟会决定胜利还是失败。"
 antarctica_aag_testing.246.a:0 "兰格有点羡慕那些在南极洲的傻瓜们。至少他们偶尔可以吹一吹“凉风”……"
 antarctica_aag_testing.247.t:0 "坦克兵进行曲！"
 antarctica_aag_testing.247.desc:0 "普费弗少尉无法理解这一点。在高尔基边境低空飞行，他就是想不通这些低等人的坦克是怎么来的。联盟在二十年前就被摧毁了，但这些劫匪们却浑然不知一般。他们开着老旧的T-34冲过边境，搜刮汽油、食物和任何在莫斯科专员辖区中被视为奢侈品的物品。\n\n经年累月，当地脆弱的驻军部队都无法对装甲突击队作出快速反应。而现在，多亏了德国空军的一份礼物，他们做到了。显然，根据普费弗所了解的情况，MBB-Bo-115反坦克直升机的现代化计划在祖国的南极殖民地新施瓦本失败了，剩下的型号则被交给了普费弗照管。\n\n他一下子就爱上了这些机器。它们速度快，机动性强，而且相对省油；在这资源匮乏、被上帝抛弃的专员辖区，这是个值得注意的特点。普费弗机身上的17个V字刻痕标志着他在开上直升机的一个月里干掉了多少敌人。高尔基的劫匪不知道他们被什么击中了。这讽刺恰如其分：过时的技术摧毁过时的技术，过去的自我循环。\n\n无线电发出噼啪声：“那些劣等人又来了，”基地说，“想不想在机身上再多刻上几个V？报告说一队坦克已经在步兵的支援下越过了高尔基边境。”\n\n普费弗打开了老式反坦克火箭弹的保险：“那是自然。”"
 antarctica_aag_testing.247.a:0 "于一个人而言的垃圾，对于另一个人来讲是杀戮机器。"
 antarctica_aag_testing.248.t:0 "一场漂亮的航空秀"
 antarctica_aag_testing.248.desc:0 "欣赏精彩的航展是赫尔曼·戈林的一大爱好。自一战以来，戈林每每想起机群在蔚蓝色的空中缠斗厮杀，心中总会激起千层浪。他多想和那些飞行员们一起驰骋天空啊！“先生，”助手的声音把他从怀旧中重新拉回现实，“现在就等您了。”\n\n戈林点点头：“咱们别让民众等太久了。”随后便带领随从一路穿过人民大厅的前门，经过立在两侧的希腊式石柱，在人群的注视之下迈步向着阳台走去。戈林来到麦克风前，清了清嗓子：\n\n“今天，”他说道，“各位将有幸见证雅利安科技霸权下的奇迹。我国驻扎在南极的科学家们设计出了一种新型直升机，它会为我们的敌人带去毁灭，保障伟大的祖国屹立千年不倒！”\n\n人群爆发出一阵欢呼与“胜利万岁”的高喊。一队崭新的现代化MBB-Bo-115坦克杀手自人民大厅上空呈V字型俯冲而下。领头的直升机在最后一刻脱出了编队，于观众欣喜的目光中绕了一个大大的圈。短短二十分钟的时间里，德国工程技术的巨大实力就被这架飞机展露无疑。\n\n戈林对鲁道夫·迈尔及其团队所取得的成就印象颇深。在他看来，投入新施瓦本的资源不仅大有回报，更是在即将到来的冲突中保持优势的必要之举。可惜飞行员们还不能向公众展示这架杀器的真正威力，但戈林有种预感——待到时机成熟，人们会亲眼见证这一切。"
 antarctica_aag_testing.248.a:0 "“再给克劳泽中尉和副驾驶贝克尔来点儿掌声！”"
 antarctica_aag_testing.249.t:0 "午夜收益"
 antarctica_aag_testing.249.desc:0 "弗雷德里克·富克斯抿了口啤酒，坐在私人码头上凝视着远处的波罗的海。这里早先是一个公用码头，后来富克斯往腐败的官僚手里塞了些好处把它据为了己有。富克斯最近小赚了一笔：某个保密项目带来的红利总算汇进了他的银行账户。\n\n霍顿H.XVIII飞翼战略轰炸机，人称“美洲轰炸机”，它被设计用于将三万公斤的有效载荷从挪威的斯瓦尔巴群岛运至美国上空，在南极开展的各项测试中表现均高过预期。席尔马赫站的科学家们在原子弹之父埃里希·舒曼的带领下，将不可能化作了现实：他们让一架二十岁高龄的喷气式轰炸机焕发新生，令其具备了于当下乃至未来竞争的实力。这架轰炸机将在德国的核覆盖与二次打击中发挥举足轻重的作用。\n\n如此重要的东西自然伴随着无数利润丰厚的军事合同，而富克斯也能跟着从中拿钱拿到手软，在哥达公司上班的好处就体现在这儿了。世界朝着核毁灭更进一步……"
 antarctica_aag_testing.249.a:0 "而富克斯还在琢磨该买艘摩托艇还是帆船。"
 antarctica_aag_testing.260.t: "把酒言欢"
 antarctica_aag_testing.260.desc: "克劳泽、拜姆勒和舒曼坐在鲁道夫·迈尔的正对面。当这三人的面，迈尔打开了国内对于霍顿Ho-229寒带适应实验报告的回复，以及随后提出的请求更多补给的回复。迈尔可以从克劳泽和拜姆勒的眼睛里看到期待和希望。但是，迈尔在舒曼身上发现的这种期望就要少很多，这是因为舒曼对德意志祖国表现出的那种最优秀、最聪明的漠视再熟悉不过了。\n\n迈尔打开公报，逐字逐句地读。但是，他的脸随着舒曼的叹气声而逐渐耷拉下来。“被拒绝了？”科学家问。\n\n“当然喽，”迈尔说，“即使我们那么努力地工作，那么努力地克服困难，完成任务，他们仍然会冷落我们。”说着，迈尔便开始面无表情地对那份废纸进行着折叠。\n\n拜姆勒瞬间惊了：“先生！这些可是官方文件！”\n\n迈尔哈哈傻笑道：“哈哈，别担心，我们只是在进行一次微不足道的飞行测试。”在三人的注视下，迈尔把这份文件叠成了一架纸飞机。只见他手腕一挥，废纸便飞进了纸篓子。\n\n克劳泽突然大笑起来：“成功了！”他欢呼道。\n\n欢呼声打破了尴尬。迈尔拿出了威士忌，说道：“就我个人而言，我对你们大家都非常满意。是的，即使是你，舒曼。我认为是时候庆祝一下了。”说着，迈尔给他们每人都倒了一杯威士忌。尽管不被认可，但失意者们还是要为他们亲自实施的霍顿Ho-229寒带适应实验而举杯祝酒。"
 antarctica_aag_testing.260.a: "“让那帮子俄国佬永远活在恐惧之中！”"
 antarctica_aag_testing.260.a.tt: "§F由于近乎完全成功的研究成果，我们将收到§W20补给§!£Antarctica_texticon_SUP 。\n\n来自§Y$AAG_Aircraft_Testing_Site$§!的政治点数修正§G+5%§!。§!"
 antarctica_aag_testing.261.t: "忠诚"
 antarctica_aag_testing.261.desc: "里夏德·席尔马赫知道，当他的上司端出了自己最好的杜松子酒时，他和迈尔的谈话就要变得严肃起来了。“我已经听说了，鲁道夫，”席尔马赫说，“寒带适应实验效果一般。你不该难过。你也知道国内给我们的都是些什么狗屎玩意儿。”\n\n鲁道夫·迈尔为席尔马赫斟上一杯，坐下来，叹了口气：“我希望这是我这辈子唯一耿耿于怀的事情。你觉得舒曼怎么样？”\n\n席尔马赫扬起眉毛：“可能每个人都这么想，他是新施瓦本最聪明的人，甚至可能是整个第三帝国最聪明的人，但他也是最狂妄的那个，都狂过戈林了。”\n\n鲁道夫·迈尔咯咯地笑了：“是的，但是……你觉得他的……那啥怎么样？我是说，他来这的动机是什么？”\n\n“原因可能和我们一样，他在国内踩了那帮老爷们的脚。”\n\n“他可是核研究项目的负责人，里夏德。他发明了核弹！不管他做了什么，第三帝国永远不会抛弃像他这样的人！”迈尔紧握双手，“搞得我有点怀疑他，格拉塞尔也是，我觉得安东不错，但他忠于舒曼。”\n\n“所以，你在想的是，”席尔马赫说，“舒曼到底忠诚于谁？”"
 antarctica_aag_testing.261.a: "“是的，”鲁道夫·迈尔说，“我认为他来这里的原因和我们其他人不一样。”"
