 antarctica_aag_testing.264.t:0 "仔细阅读字里行间"
 antarctica_aag_testing.264.desc:0 "迈尔打开了德国极地研究协会的回信，对其内容的简短感到震惊。他转述的消息是值得注意的：他们成功地让一个十年前的机体完成了现代化并具有成本效益。设计团队本应获得奖章，无论如何都不该这样。\n\n当迈尔的眼睛扫过这仅有一页的答复时，他的愤慨被惊愕所取代。他们批准了热巧克力的请求？迈尔几乎是把这当笑话写进去的，对奢侈品的具体要求通常会被完全忽视或被直接拒绝。\n\n但是，一旦思考一下这个问题，迈尔就意识到了这个答复实际上意味着什么。从德国到新施瓦本有很长的路要走，考虑到国内的状况，在紧张局势沸腾之前，任何货物都不可能到达南极洲。\n\n因此，答应迈尔的请求并无大碍。那些该死的官僚们终于给了他想要的东西……在他们来不及兑现交货的时候。\n\n他怀疑新施瓦本完成任务的消息是否已经传到了指挥部的高层，还是它已经在哪个官僚的桌子上死掉了，就像对完成工作而得到任何奖励的希望一样。\n\n迈尔把纸揉成一团，扔进了垃圾桶。一个长期存在的庄严想法在他的脑海中浮现成形："
 antarctica_aag_testing.264.a:0 "“除了我，没有人能帮助这些人。”"
 antarctica_aag_testing.264.a.tt:0 "§F由于成功的研究，我们将得到一支可以在§Y南极网格系统界面§!中部署的额外特遣队。\n\n来自§Y$AAG_Aircraft_Testing_Site$§!的政治点数修正§G+10%§!。§!"
 antarctica_aag_testing.265.t:0 "属于他们的机队"
 antarctica_aag_testing.265.desc:0 "克劳泽和贝克尔带着一小群飞行军官巡视了五架MBB-Bo-115的原型机，这些飞行军官也同为测试项目的人员，但还没在115上飞过一次。在他们二人的大胆试飞后，空军认为已经可以把115正式纳入战术机队，还好心留下了五架测试的原型机在席尔马赫帮忙守卫站点。\n\n“别被它们的瘦弱外表骗了。”克劳泽说，“当敌人把装甲部队运到这的时候，你会很庆幸坐在其中一架飞机的驾驶舱里的。”\n\n贝克尔说：“你们都听过传言说，OFN，尤其是加拿大人，一直都在研究履带式雪地装甲车，如果他们把它开到了席尔马赫站，这些直升机是唯一能保证我们不会被碾过去的东西。”\n\n克劳泽和贝克尔很高兴他们为止挥洒汗水的那架原型机也在这里，它会成为他们的家，他们会很荣幸能在这继续服役……"
 antarctica_aag_testing.265.a:0 "……以应对任何威胁。"
 antarctica_aag_testing.265.a.tt:0 "§F由于近乎完全成功的研究成果，我们将收到§W20补给§!£Antarctica_texticon_SUP 。\n\n来自§Y$AAG_Aircraft_Testing_Site$§!的政治点数修正§G+5%§!。§!"
 antarctica_aag_testing.266.t:0 "打防守战"
 antarctica_aag_testing.266.desc:0 "克劳泽和贝克尔是以一对失败者的身份来参加格拉塞尔的防卫计划讲座的。他们对MBB-Bo-115没有取得更多的进展感到遗憾，但当他们得知有一个型号，即最初的原型，被留下来时，他们感到很高兴。事实上，这只是因为运输船上没有足够的空间容纳它，但这对他们来说一点都不重要。\n\n“由于席尔马赫绿洲是一个洼地，”格拉塞尔说，“站点很容易受到来自其周围高处的包围。如果敌人能在山坡和山上布置防空部队和轻型火炮，他们就能对我们的所有行动一览无余，并且可以切断任何陆上或海上的增援。只要有几个精挑细选的机枪点，再加上好点的准头，他们就能打退任何来自步兵的反击，轻而易举地把我们饿死。因此，至少有一架可用的直升机对我们来说是很幸运的。”\n\n克劳泽和贝克尔振奋起来。\n\n“是的，你们两个。从现在起，你们将有更多的时间在基地周围进行空中巡逻。”\n\n飞行员们相视一笑。\n\n“现在，”格拉塞尔说，“对于你们其余的步兵，我们需要优先考虑的是射击技术和身体耐力。如果我们需要从席尔马赫站甚至绿洲本身打出去，你们就得有本事，最重要的是，在白茫茫的雪地上打远枪的准头。各位，没有时间可以浪费；我们都知道，在我们说话的时候，美国人或者日本人就可能正在向我们移动。”"
 antarctica_aag_testing.266.a:0 "”解散！“"
 antarctica_aag_testing.266.a.tt:0 "§F由于研究成果，我们将收到§W5补给§!£Antarctica_texticon_SUP 。\n\n来自§Y$AAG_Aircraft_Testing_Site$§!的政治点数修正§R-5%§!。§!"
 antarctica_aag_testing.267.t:0 "飞行哲思"
 antarctica_aag_testing.267.desc:0 "克劳泽最爱飞行时的孤独感。关闭无线电后，这片冰冻荒漠上空五千英尺处，就是小小一畦的新施瓦本中最安静的一隅。\n\n“克劳泽，又在思考哲学了？”副驾驶座上的贝克尔调侃道。\n\n克劳泽朝后座比了个中指。\n\n迈尔对克劳泽和贝克尔的英勇飞行付之一篑感到有些难过，他还意识到基地的安全措施存在隐患。出于这两点考虑，他保留了一架直升机的原型机，并在报告中称其已在一次坠机事故中损毁——这并非完全不实，毕竟克劳泽和贝克尔的飞行任务确实经常以坠机告终。然而，克劳泽并不打算让这架飞机重蹈覆辙。他对她有着特殊的情感，贝克尔亦然。两人在驾驶舱里坐定，仿佛与机器融为一体。\n\n“你知道吗，”贝克尔说，“我不知道怎么解释……但我总有一种预感，这架直升机早晚会救我们一命。”"
 antarctica_aag_testing.267.a:0 "克劳泽笑道：“现在又是谁在念叨哲学了？”"
 antarctica_aag_testing.267.a.tt:0 "§F这项研究工作没有收获。未来的补给可能会稍微§R稀少一些§!。\n\n来自§Y$AAG_Aircraft_Testing_Site$§!的政治点数修正§R-10%§!。§! "
 antarctica_aag_testing.268.t:0 "115的飞行"
 antarctica_aag_testing.268.desc:0 "“我上次在驾驶舱里这么紧张还是在飞行学校。”贝克尔说。\n\n克劳泽咽了下口水：“我还不是。”\n\n两位飞行员带领着现代化的MBB-Bo-115的一翼，在德国首都日耳曼尼亚无边的天际线上翱翔而过。“你懂的，毕竟这次戈林会来。”克劳泽说。\n\n“都第五回了，知道啦，克劳泽。”贝克尔叹了口气，“我也听了简报会的。”\n\n“对哦……”\n\n地面控制中心发来消息，要他们在人民大厅上空降低高度。民众从四面八方涌上数英里的街道，汇聚成一片波动的人海。这一刻，两人都屏住了呼吸。他们曾在新施瓦本努力让别人认可自己的成就，而此刻将要接受国家元帅本人的检阅。来自席尔马赫站的两位飞行员感觉身处世界之巅，某种意义上说也的确如此。等到直升机以V字型编队下降时，克劳泽才重新鼓起勇气：“咱们给下面的人整个终生难忘的活咋样，贝克尔？”\n\n贝克尔还没来得及回答，克劳泽已经把直升机转了个大圈。霎时间，克劳泽和贝克尔失了重，日耳曼尼亚倒了转。在引擎的嗡嗡声里，驾驶舱中的二人竟还能听见自人群迸发的欢呼喝彩。接着他们重新摆正过来，贝克尔问道：“然后要怎么做？”"
 antarctica_aag_testing.268.a:0 "“让他们看看这个怎么样。”克劳泽欢呼道。"
 antarctica_aag_testing.268.a.tt:0 "§F由于成功的研究，我们将得到一支可以在§Y南极网格系统界面§!中部署的额外特遣队。\n\n来自§Y$AAG_Aircraft_Testing_Site$§!的政治点数修正§G+10%§!。§!"
 antarctica_aag_testing.269.t:0 "愉快地着陆了，又一次"
 antarctica_aag_testing.269.desc:0 "运输机的引擎声把埃里希·舒曼的注意力吸引到了席尔马赫站的跑道上。他们很少从国内收到任何补给或信息，尤其是现在。所以，克劳泽和贝克尔被派去执行的任务对席尔马赫站的居民来说是一件大事。为了推进机型的重制，这两名飞行员曾被戈林本人指派过驾驶现代化的霍顿Ho-XVIII原型机回日耳曼尼亚的任务。\n\n但是在返程时，他们却不得不驾驶一架老旧的Ju-52运输机。对于两位飞行员来说，这就非常痛苦了。返航途中，这架老爷机前前后后加了十六次油。其中一次在申克的西南非降落的时候，克劳泽和贝克尔差点在当地部落的枪口下丢了性命。对此，舒曼也只好自嘲：“祖国的势力真的是到处都在松动。”然而，尽管经历了诸多困难，两名飞行员还是成功地在席尔马赫站寒冷的跑道上又一次愉快地着陆了。\n\n流放者们纷纷向飞行员询问有关自己家里的情况，还看了看他们有没有带来礼物。这时，舒曼却偷偷地躲进了人群的角落。事实上，戈林交给飞行员们的任务并不只是接收美洲轰炸机，他自己也有点东西要送。人群散去后，舒曼爬上了空无一人的飞机，掀起了一处座椅下的塑料板：机身里藏着一箱木柄手榴弹。他笑了，当然，还有证实戈林将他安插进南极基地的文件。"
 antarctica_aag_testing.269.a:0 "鲁道夫·迈尔的日子要到头了。"
