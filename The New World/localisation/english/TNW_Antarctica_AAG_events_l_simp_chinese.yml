 antarctica_aag_testing.300.t:0 "首飞"
 antarctica_aag_testing.300.desc:0 "在南极一个清爽的早晨，约翰·克劳泽中尉和他的副驾驶威廉·贝克尔少尉绕着他们的新玩具走来走去。他们面前的停机坪上，矗立着一头长而瘦的野兽：一架窄身细尾的飞机。伯尔科-奥托布伦称这是一架能快攻杀伤坦克的旋翼机原型。根据德国科学家们的说法，理论上这也是第一架能做出高级特技动作的直升机，比如倒飞筋斗。\n\n如果不是看着它，很难有人能想象一架直升机能进行低空扫射或者携带火箭弹，更不用说发射；了。这架飞机看起来很灵活，在一位优秀飞行员的手中，它也许能把敌人耍的团团转——约翰·克劳泽自认为，他就是这种飞行员。\n\n贝克尔说：“他们测试这架飞机的积极性惊到我了。我不确定这是他们对机器的信赖还是因为我们愿意冒生命危险。”\n\n“往好点想，贝克尔。”克劳泽道，“至少他们不指望我们把它完整地带回来，他们送来了五架备份。”\n\n“以你的飞行方式，他们只能指望咱能带回来‘一块’。”\n\n克劳泽笑道：“嗯……”他拍了拍那架将成就他们两人事业的飞机机身，“我想我们准备好了。”两人爬进驾驶舱，开始升空。"
 antarctica_aag_testing.300.a:0 "一系列试飞就此展开。"
 antarctica_aag_testing.300.a.tt:0 "§F现可对§!§LMBB-Bo-115§!§F开始测试。§!\n§F我们将获得§!§W10补给§!£Antarctica_texticon_SUP 。"
 antarctica_aag_testing.301.t:0 "强过咖啡"
 antarctica_aag_testing.301.desc:0 "一阵急促的敲门声让阿尔布雷希特·波尔从办公桌上抬起头来。他的同事，汉斯·拜姆勒正站在门口，面带微笑。“有空没？”拜姆勒问了一句。波尔瞄了一眼桌上的空杯，然后重新看着拜姆勒：“你有咖啡吗？”\n\n拜姆勒这下笑得更灿烂了：“我这儿有比咖啡更好的东西。”\n\n波尔眨了下眼，立马放下铅笔起身：“我在听。”\n\n拜姆勒领着波尔穿过实验室的走廊，朝着机库走去。他在机库门口停下脚步，转头将目光放到波尔身上：“做好心理准备了？”\n\n波尔耸耸肩：“那还用说。”于是，拜姆勒打开机库的大门，眼前所见差点让波尔惊掉下巴——就在机库的正中央，静静地伫立着一架形似刀锋的霍顿Ho-XVIII战略轰炸机。“这家伙……是美洲轰炸机？”波尔简直难以置信。他见识过飞翼飞机的模样，也无数次研究过眼前这架轰炸机的蓝图，可如今亲眼所见还是令波尔觉得，自己是目睹了某种传说中的生物活生生变成现实。\n\n“昨天半夜装在集装箱里运过来的，团队赶在天亮前就把它组装好了。”拜姆勒望向波尔，“我们要做的就是让它能飞起来。迈尔给电子部门安排了一大批资源，想马上开始飞行测试。看样子是日耳曼尼亚那帮人在子系统这关遇到了麻烦。”\n\n“所以说他们这回又送了个半成品过来，等着我们在这里变废为宝是吧。”\n\n“但要是成功了的话……”拜姆勒的双眼炯炯有神，“咱们可就不只是默默无闻的小卒了。”"
 antarctica_aag_testing.301.a:0 "“那挺好，”波尔回了一句，“话说咖啡……”"
 antarctica_aag_testing.301.a.tt:0 "§F现可对§!§g霍顿Ho-XVIII§!§F开始测试。§!\n§F我们将获得§!§W10补给§!£Antarctica_texticon_SUP 。"
 antarctica_aag_testing.400.t:0 "眼皮底下的实地测试"
 antarctica_aag_testing.400.desc:0 "鉴于新施瓦本资源有限，有时只能进行实地测试。霍顿229生而为世上第一种隐形飞机，其机翼形状会直接让雷达波通过而不发生反射，这种意外的特性受到了人们的追捧。但是，若要让229在问世十多年之后还能保持领先，就需要在材料上进行一些调整，而为了测试这些变动，迈尔下令让一架229进入OFN的南极空域，停留5分钟，然后沿海岸线返回。这一行动使飞机面临着巨大的报复风险，但也提供了一个机会，让我们得以确认飞机的隐形能力。\n\n安东·格拉塞尔收到命令组建一支快速反应小队，以在229被拦截击落的情况下，销毁飞机并驱散前来回收的人。他们驻扎在OFN南极洲事务局的边界上，等待席尔马赫站发来飞机返航的消息。这种肆无忌惮的行为在别的地方是想都不敢想的，但在南极洲，边界是个模糊的概念，领导层对于其中的一些变动可谓是毫不知情。\n\n过了一段时间，格拉塞尔向外勤小队发出了完工的消息，229回来了，这证实了它的隐形能力足以对付美国人，或者，美国人只是不愿意将冲突升级。"
 antarctica_aag_testing.400.a:0 "不管是哪种情况，德国都赢麻了。"
 antarctica_aag_testing.401.t:0 "享受小小胜利"
 antarctica_aag_testing.401.desc:0 "赖克·汉纳曼列兵无奈地叹了口气，然后长长地吸了一口烟——这是他和新施瓦本的其他年轻小伙子在经历了艰苦的劳动之后，从上级获得的为数不多能够提供生理舒适的东西之一了。他是在为一种新的飞机，霍顿Ho-229，搭建测试靶子，并且他还要在远处观看测试。他和其他人辛苦了一周才把一切搭建起来，要亲眼看着劳动成果被炸得粉碎不免有些残忍，但也无可奈何，命令就是命令。\n\n汉纳曼面无表情地看着测试用的229战机飞起来，向他的劳动结晶发射着一枚又一枚的炮弹。撇去个人感情，他承认这架飞机精准度很高，而且炮弹大的可怕。汉纳曼突然希望他自己不会成为这种空中巨兽的猎物。硝烟散去，他注意到了另一件事，一件让他自己更激动的事。虽然大部分靶子成了一堆残渣，但也有几处伤痕累累依旧屹立不倒。虽然这一事实可能会让飞机的研发者感到沮丧，但汉纳曼觉得他们已经获得了自己的乐子。"
 antarctica_aag_testing.401.a:0 "牛马们中立马爆发出了欢声笑语。"
 antarctica_aag_testing.410.t:0 "异想天开"
 antarctica_aag_testing.410.desc:0 "军需官埃利亚斯·鲍曼给人的第一印象很不起眼：又矮又胖，留着逐渐花白的浓密胡子，就算把他当成有着大把空闲时间无所事事的中年男人也情有可原。鲍曼现在希望这种印象是真的，至少这样他就不必眼睁睁看着食物被新施瓦本的年轻小伙子飞速浪费。由于上头的命令，他虽不情愿，也只得给这些人配发一些冷冻鸡。虽然他不需要去关心这些鸡的用途，但他还是想知道。\n\n显然，一些进行技术测试的“天才”觉得测试正在研发的飞机玻璃的最好方法就是朝这该死的东西发射冷冻鸡。不管是对是错，鲍曼都很惊讶冷冻鸡竟然完全打破不了这玻璃，他见识过被扔出的鸡对人造成的伤害，他从来没想过玻璃竟能有如此好的表现。讶异的同时，联想到新施瓦本过去的遭遇，他还是对这种浪费食物的行为忧心忡忡……"
 antarctica_aag_testing.410.a:0 "负责的人可能了解得最多吧。"
 antarctica_aag_testing.411.t:0 "能破裂的不止于冰"
 antarctica_aag_testing.411.desc:0 "“该死的医生！你难道不能轻点？”\n\n就算作为他的病人，一名不幸的经验丰富的飞行员，对他提出这些要求，托马斯·绍尔医生还是忽略了他，专注于给这人折掉的骨头正骨，梅塞施密特P.1110的弹射系统很明显没按照设想的方式运作，导致这可怜虫在弹射测试里摔得很惨。两腿多处骨折和断裂……这人当然还能走，但他大概率就没法再飞行了。好吧，绍尔医生心想，现在没必要把这坏消息告诉他。“别哭哭啼啼的，你的骨头会随着时间慢慢恢复，只要你在医生允许前别试着走动，或者做类似的事。”\n\n“好，好。”另一个人懊丧地同意，带着肉眼可见的疼痛望着他的双腿。绍尔不禁好奇，这人是否以某种方式清楚地知道自己受的伤究竟有多么严重？“嘿，医生，你有烟抽吗？”\n\n“一般而言我没有，但是……我觉得在这种情况下你也许不止值得一根。拿着，”绍尔从他的私人储物盒里摸出一根，给他的病人点上火，他从不是什么乐于分享的人，但确实很难不同情一位也许刚刚见证了自己职业生涯终结的人。"
 antarctica_aag_testing.411.a:0 "好吧，该去正常工作了。"
 antarctica_aag_testing.420.t:0 "寻求刺激"
 antarctica_aag_testing.420.desc:0 "“准备好了吗，克劳泽？”\n\n“好的不能再好了，贝克尔。”约翰·克劳泽中尉和威廉·贝克尔少尉在进行技术测试的重要任务：驾驶MBB-Bo-115直升机，在席尔马赫站附近的冰坡上进行危险的起降，这一行为不仅考验直升机的构造，也考验他们自己的驾驶技能。不过，他们自己丝毫不关心此任务的科研重要性，他们是来寻求刺激的，是要证明自己的驾驶能力的。\n\n两人使出浑身解数，从高空中朝着冰面缓慢而大角度地下降。差不多一分钟后——不过两人觉得这段时间肯定要长的多——飞机成功降落在了冰坡上。\n\n现在最麻烦的地方来了。\n\n“倒数三，二，一……”克劳泽嘟囔着，然后和副驾齐心协力，从这处危险的斜坡上起飞。雪花在四周飞舞，模糊了天空与大地，贝克尔记得科学家们把这称之为“雪盲”。他们担心关键系统上会有积雪结冰，这会导致情况一发不可收拾；虽然他们很确信重要系统都和起飞前一样干净，但在南极洲飞行的话，积雪是免不了的，他们只能希望直升机的构造足够抵御积雪，至少可以撑到飞行结束。\n\n第一次启动失败了，克劳泽开始狂飙脏话，他们不得不把直升机降回地面重来一次，还好，直升机成功飞了起来，两人返回基地的短暂旅途也终于得以开始。贝克尔欢呼雀跃，拍打着克劳泽的背，克劳泽一改刚才的失落，露出了激动和松了口气的微笑。"
 antarctica_aag_testing.420.a:0 "看来这些初生牛犊还是找到了他们的刺激。"
 antarctica_aag_testing.421.t:0 "新鲜玩意"
 antarctica_aag_testing.421.desc:0 "MBB-Bo-115的第一次测试已经完成，此次测试的目的是检查直升机的飞行系统，接下来克劳泽中尉和贝克尔少尉被命令测试直升机的另一个更令人血脉喷张的部分：它的反坦克武器系统。“稳住，稳住……好了，仔细瞄准目标，贝克尔。我们必须百发百中。”留在飞行员座位上的克劳泽提醒他的副驾驶，后者点头回应。\n\n“明白，相信我吧。”\n\n摆在他们面前的是迄今为止新式反坦克武器所将面临的最大考验：一辆从大战中遗留下来的旧式黑豹坦克，并且已经用废金属板焊接在其已经十分厚实的装甲板上进行进一步加固。贝克尔花了一些时间将火炮对准装甲的一个薄弱处，然后开火……但弹丸正好落在黑豹坦克旁边，完全没打中。贝克尔说明情况后，克劳泽皱起了眉头。“打歪了，但没啥别的办法了。我会再飞近一点。”\n\n克劳泽这样做后，贝克尔再次瞄准目标并开火，尽管目标有着厚重的加固装甲，这次射击依然精确命中坦克并对其造成了严重损害。贝克尔发出一阵欢呼并笑出了声，而克劳泽则报以微笑。但克劳泽心想，这种武器射程太短了以至于无法在安全距离外开火。"
 antarctica_aag_testing.421.a:0 "哦，好吧，看来这是设计师要解决的问题。"
 antarctica_aag_testing.430.t:0 "扰流"
 antarctica_aag_testing.430.desc:0 "阿尔布雷希特·波尔一手拿着清单，一手拿着呕吐袋，坐在美洲轰炸机上，心中暗自发誓再也不做这种任务的观察员了。今天的重点是测试美洲轰炸机的单引擎飞行能力，更确切地说，是湍急扰流下的单引擎航行测试。美洲轰炸机的机翼理论上可以在适当的条件下滑行大段距离。天气预报说今天的头风很大，轰炸机剧烈的摇晃，波尔的午餐再次涌到了嘴里，嗯，是香肠和泡菜的味道。\n\n“好，”飞行员说，“马上关闭引擎，三，二，一……关闭！”六个喷气式发动机中的五个停止了工作，剩下那台的咆哮声似乎很遥远，飞机也变得安静许多。刚开始，飞机还能平稳飞行，不过一起风，飞机的座位就开始带着波尔到处乱窜。他心里明白，将他们与冰冷的大西洋隔开的只有几尺厚的钢板和掌舵的飞行员。“她表现不错吧，博士？”飞行员笑着说。\n\n波尔尽力遏制住呕吐的冲动，暂时无暇发表自己的看法。他在干呕的间隙抓紧写下了仪器上面的读数。在一小时的时间内，他们高度下降不多，速度尚可接受。在恶名昭彰的南极空域，这是项了不起的飞行成就。波尔相信，如果这架飞机在这片荒芜之地的海岸上用单单一个引擎就能飞行，那么它就能不分情况地飞向任何地方。"
 antarctica_aag_testing.430.a:0 "“博士，你……面色不太好，博士！”"
 antarctica_aag_testing.431.t:0 "空中相遇"
 antarctica_aag_testing.431.desc:0 "豪克将机身左倾，与上方的改装运输机的航线对齐。一个临时吊杆从上方降下，他一边观察一边双手死死地握住操纵杆，生怕出错。\n\n他驾驶着一架美洲轰炸机一路飞到了西南非的海岸，测试飞机空中加油的能力。九个小时的长途飞行让他怀疑起了自己还在跑道上时的想法，但他也明白，如果发生意外，申克的人马随时准备好在地面接应。\n\n霍顿飞机的无线电中传来声响，位于上方几十米处的飞行员正在协调加油的过程。“吊杆操作员已经准备好将吊杆与你的油箱连接起来，你那边准备好了吗？”\n\n“嗯，只等你们了。”豪克回答道，声音中透露着长时间的沉默而带来的干燥与僵硬。\n\n豪克通过专门安装的摄像头看着吊杆小心翼翼地连上了飞机，快空的燃料表开始起死回生。“我这边有效果了。”\n\n“太好了！美国佬肯定会吓得尿裤子，现在我们从日耳曼尼亚就能直接向他们倾泻地狱之火了。”\n\n这个不知面目的声音让豪克怔了下，他才想起飞机上带的是什么。在飞行中被汗水浸湿的手，此刻突然感到异常冰冷。"
 antarctica_aag_testing.431.a:0 "军事进步让人们离自我毁灭又近一步。"
 antarctica_aag_nuclear.10.t:0 "滴答，滴答，滴答"
 antarctica_aag_nuclear.10.desc:0 "埃里希·舒曼和五名席尔马赫实验室的科学家一起打开了雪地车的门。所有人都裹着厚厚的冬装，外面还套了一层防辐射服，圆滚滚的样子从远处看就像是大号的企鹅。\n\n他们所在的地方1961年12月之前是个核试验场，风雪将其连同核爆的痕迹一起掩埋，当年侦察照片上的景象再也见不到了。队伍在寒冰裂缝和穿铁利岩组成的迷宫中穿行，盖革计数器响个不停。舒曼很想知道辐射水平下降了多少，他们需要从原爆点采集冰芯样本，而下降风和涌动的浮冰驱散了表面的辐射，加大了表面观察的难度。\n\n舒曼一边在厚厚的积雪上走着，一边思考改进发明的方法。从更多的辐射到更大的火球再到更小的应用，舒曼什么都想到了。"
 antarctica_aag_nuclear.10.a:0 "死亡是他的营生，而营生是首位的。"
 antarctica_aag_nuclear.20.t:0 "细枝末节"
 antarctica_aag_nuclear.20.desc:0 "许多人对核末日的概念望而却步，而舒曼教授则要处理其中的细枝末节。他的工作范围囊括了核弹头的方方面面，从当量到投送方式，再到制造过程的微小细节，他把一生都献给了核弹的研究。\n\n他渴望为祖国贡献他的专业学识，于1933年加入了德意志民族社会主义工人党。他作为高爆物全权代表领导研究小组数年，也是他，实现了核裂变的突破性进展。\n\n今天，在新施瓦本，他的目标一如既往：制造出更好且必须要更大的核弹。精度是很重要的，即使是核弹头这样无差别杀伤的武器也不例外。现代电路可以让核武器的引爆时间精确到毫秒，使其跻身为最精确反应最迅速的武器之列。不管是空爆还是接触引爆，效果都是可靠一致的。"
 antarctica_aag_nuclear.20.a:0 "舒曼别无他法。"
 antarctica_aag_nuclear.30.t:0 "副产品"
 antarctica_aag_nuclear.30.desc:0 "“你是说电磁脉冲？”当迈尔被舒曼拉着进入了迷宫般的实验室时问道。\n\n舒曼点了点头，“这是核爆的一种效果，你也可以称之为副产物。它会烧毁比爆炸范围还要大的距离内的任何电气系统和电池。在目标上空进行空爆会大大增强脉冲的扩散。”\n\n“那么，机器就算没有被炸掉，还是有可能会失灵。”\n\n“没错。在战争中，我们就可以在目标，比如说华盛顿特区，上空引爆一枚或多枚核弹头，电磁脉冲会瘫痪掉指挥和控制系统，使其无法作出反制。然后，我们就会一枚接一枚地发射炮弹，直至任务完成，”他指着主管实验室的大厅，“我今天找你就是想说我们可以制造出能经受得住脉冲的装备。这个房间会重复产生脉冲，里面有正在运行的电路板，”他指向一个大红按钮，“迈尔，你愿意接受这个光荣使命吗？”\n\n迈尔笑了，“乐意之至。”他按下了按钮，实验室的灯光闪了闪，然后就全灭了。"
 antarctica_aag_nuclear.30.a:0 "唯一的亮光是电路板上发出的宝石般的红光。"
 antarctica_aag_nuclear.40.t:0 "小小包裹"
 antarctica_aag_nuclear.40.desc:0 "埃里希·舒曼双手插兜站着。今天的试验虽然在规模上不如后续试验，但重要性却不遑多让。舒曼和铀核会对核裂变武器化的首个成果是一种小当量炸弹，这种炸弹一举摧毁了停泊在港中的美国太平洋舰队，向世人昭示了无论何种规模的核子科技都是毁灭性的。\n\n今天要进行的是战术核子火炮测试。陆军要求战略火箭部队研发一种可以以火炮形式发射的战术核武器。测试将要使用到与美国最近推出的M-29大卫·克洛科特武器系统不相上下的无后座力滑膛炮。\n\n舒曼心里觉得眼前的东西就像是劣质漫画中的产物，但他同样也清楚，在合适的人手中它所具有的破坏性威力。祖国的众多部门都在抢着引入核子能力，这次是陆军进行武器测试，不过以后他们可能就没有这种机会了。"
 antarctica_aag_nuclear.40.a:0 "原子分裂，冰川瑟瑟发抖。"
 antarctica_aag_nuclear.50.t:0 "危险距离"
 antarctica_aag_nuclear.50.desc:0 "二战胜利后，国防军作战理论的招牌就是近空支援。密切协调的德国空军战机无情收割着地面上的装甲部队，为胜利扫清障碍。原子时代降临后，德国空军想要验证低当量战术核弹在支援装甲部队推进中的作用。\n\n毋庸置疑，这种行动对于投放武器的飞机和地面友军部队都有着极大的风险。因此，精度就成了最优先事项。舒曼设置了一系列的传感器来标记敌我，并测量热量、爆炸冲击以及辐射，以确定国防军能维持进攻势头，不受爆炸附带伤害影响的最近距离。用来投放试验性原子弹的霍顿229轰炸机也装上了传感器。爆炸不可避免地会影响到飞行员，因此，投弹后飞行员要尽快爬升离开。\n\n229轰炸机的引擎在舒曼头顶上轰鸣，原子弹在机动作战中的真实作用即将揭晓。229轰炸机飞过试验场，投下了炸弹。炸弹准确地落在假靶子上爆炸了，烧毁了一整支虚拟部队。爆炸产生的热量与冲击对友军的影响虽然在可接受范围内，但装甲车内的士兵能承受的辐射量还需要进一步的研究。"
 antarctica_aag_nuclear.50.a:0 "辐射阻挡不了心向胜利的士兵。"
 antarctica_aag_nuclear.60.t:0 "毫无防备的目标"
 antarctica_aag_nuclear.60.desc:0 "战略火箭部队如其名，使用火箭进行投运，近些年来，他们使用最多的是V-14火箭——二战的大功臣V系火箭的继承者，虽然该武器系统是战略威慑的首选，但它并不是军械库中唯一的杀器。\n\n舒曼今天要测试一种用于战场之上的短程弹道导弹，这种导弹可以在没有人员伤亡，当然是指我方，的情况下摧毁要塞与军事设施，且在理想情况下由于低飞行高度与高飞行速度而无法进行反制、拦截。今天的目标是席尔马赫站以南的南极冻土六百公里处的冰川，因此，目标不会有任何抵抗。\n\n舒曼毕恭毕敬地看着那最初由他的学生韦恩赫尔·冯·布劳恩设计的火箭飞上天空，将核弹快递到目标家门。"
 antarctica_aag_nuclear.60.a:0 "冰川对于头顶的大祸浑然不知。"
 antarctica_aag_nuclear.70.t:0 "千方百计"
 antarctica_aag_nuclear.70.desc:0 "“不可能！”迈尔吼道，“绝不！我绝对不会让我们的人只是为了满足你的好奇心而饿肚子！”\n\n舒曼叹了口气：“鲁道夫，这是都为了祖国的利益……”\n\n“你知道你现在的那些研究器械占据了多少宝贵的货舱空间吗？辐射屏蔽器、盖革计数器和所有的安全设备，它在一艘船上所占的空间和我们的飞机材料加起来一样多。我可以让人把一架崭新的原型机运到这里来，其所占空间与你想运输的那点铀相同。”\n\n“但也正如我所说的那样，”舒曼说，“核武器才是祖国真正的肌肉。核武发展乃是大势所趋，它们会比你的飞机更加有用。”\n\n“也许你是对的，但你的提议意味着牺牲一批我们的人在某些时候会需要的食物。如果我们不保证人员的健康，你甚至没有办法测试你的设备。”\n\n舒曼一直是一只敏锐的政治动物，他明白什么时候应该放弃徒劳的争论。他微笑着说：“好吧。我承认你在南极事务方面的专业知识。谢谢。”他离开迈尔的办公室，去了实验室，在实验室里他会给他的老朋友——戈林——写一封信。"
 antarctica_aag_nuclear.70.a:0 "他使出千方百计也都会把铀搞到手。"
 antarctica_aag_nuclear.80.t:0 "联系"
 antarctica_aag_nuclear.80.desc:0 "从理论上讲，核弹的威力无上限可言。只需要有足够的裂变材料和正确的设计方案，就可以设计出一种威力足以撕裂大地、让天空燃烧的武器。舒曼了解科学，而科学告诉他这完全可以做到。自铀计划以来，舒曼一直在考虑如何制造一场地球上最强烈的大爆炸。\n\n在南极洲，他将朝着他的理想迈出第一步。但他知道，要迈出这第一步——引爆原型——他必须搞到大量的铀235，而这绝非易事。不过事实上，他虽然身处核科研圈子的底层，他却有一些位高权重的朋友。\n\n在中非专员辖区有一个叫欣科布韦的矿山。舒曼知道这座铀矿储量巨大，历史上它甚至曾为美国的核计划提供过铀矿石。舒曼已经收到了他今年的铀配额，但这并不够他实现他的理想。只需要一封信和一笔钱，他就能走矿场的后门，为他的许多研究项目抽走所需要的大量铀矿。"
 antarctica_aag_nuclear.80.a:0 "祖国最终会感谢他的。"
 antarctica_aag_nuclear.90.t:0 "逢场作戏"
 antarctica_aag_nuclear.90.desc:0 "舒曼认为逢场作戏乃是一项基本技能。他花了30年时间才在第三帝国动荡的学术界混地游刃有余，其中一部分心得便是知道该在什么地方扮演什么样的角色：一位科学家，或者是一名士兵。在与学术界打交道时，舒曼发现一身整齐的军装有助于提振下属士气和让他们保持适度的敬畏；而在将军们面前，洁白的教授袍体现出了智慧和非对抗性的一面，有利于让他们放心。\n\n今天乃是良辰吉日。这是自1961年12月以来新施瓦本的第一次核试验，而这枚炸弹舒曼希望它将是有朝一日人类制造出的最强炸弹的原型中的第一枚。\n\n他裹着厚厚的帕克大衣离开了他的宿舍，而今天他的“身份”是一名南极探险家，以便更好地融入他那些脾气暴躁又饥肠辘辘的战友们。他相信，当第二颗太阳在广袤而又荒芜的大地上冉冉升起时，他们就明白——为了帝国的千年大计，他们所作的所有牺牲，所受的所有苦难，最终都会是值得的。舒曼在席尔马赫站的其他负责人的陪同下步入了观察室。试爆将在南部荒原的深处进行，但爆炸对他们而言将清晰可见。"
 antarctica_aag_nuclear.90.a:0 "舒曼的眼护目镜上反射出的他的作品令人毛骨悚然。"
 antarctica_aag_nuclear.90.a.tt:0 "我们将获得§R20军事点数§!£Antarctica_texticon_MIL 、§G20宣称点数§!£Antarctica_texticon_LEG 、§W20补给§!£Antarctica_texticon_SUP 和§B100政治点数§!£political_power_texticon 。"
 antarctica_aag_gcw.10.t:0 "迟暮雄鹰"
 antarctica_aag_gcw.10.desc:0 "风猛烈地吹拂着迈尔的外套，使其四处摆动着。寒冷刺穿了他的皮肤和肌肉，紧紧扼住了他的骨头。这一次，这种麻木的感觉并非完全不受欢迎。这比思考他现在发现自己在掌舵的情况要好。\n\n他站在席尔马赫基地最长的码头的尽头，回忆着最后一艘驶向地平线的德国海军舰艇。在德国本土的冲突开始后不久，卡尔·邓尼茨就宣布全面召回德国海军的所有舰队。来自最远的德国港口的船只将穿越大西洋，穿过直布罗陀海峡，经过博斯普鲁斯海峡，最终停靠在狄奥多里克港这个大港口。\n\n这对身在南极洲的舰长们来说是件好事，但这里的驻军却被抛弃在世界的尽头，被留下来自生自灭。迈尔热切地命令舰长们游说邓尼茨向南运送一些物资，但这最终是一个徒劳的努力——他知道海军元帅在乌克兰有更重要的事情要处理。\n\n那么，迈尔想，现在怎么办？新施瓦本现在处于最紧急的状态。他已经在管理着这拮据的局面了，而且情况刚刚变得更拮据了。如果不适当地使用资源的话，这方土地的未来将会是一段短暂的痛苦，然后是无尽雪域荒原上彻彻底底的死寂。\n\n迈尔挺直身躯，裹紧大衣。当他转身回到基地时，他的眼神变得坚定。他不会让死亡成为现实。他将计划、配给，如果有必要，还将乞求，所有这些都是为了让他的部下活着，他唯一的希望是这场战争能尽早结束。"
 antarctica_aag_gcw.10.a:0 "绝望之时开始了。"
 antarctica_aag_gcw.10.a.tt:0 "§e在冬天来临之前，我们不会看到它的结束。§!"
 antarctica_aag_gcw.20.t:0 "风寒"
 antarctica_aag_gcw.20.desc:0 "情况正一天天恶化下去，最新报告源源不断地流入新施瓦本的指挥中心。与鲍赫勒施塔特和遥远的德国本土间依靠航运维持的脆弱补给线已不复存在，生存逐渐演变为一场向着一方倾斜的博弈，愈发快速地滑向它命中注定的结局。\n\n新施瓦本很快就要忍饥挨饿，说不定在这之前就被冻成了冰雕。日复一日，迈尔只得每天制定比昨日更为严格的定量配给。用不了多久，他的手下就将无法摄入足够的卡路里以保证每日所需。一些研究人员开始变得神志不清，他们不是在冰天雪地里四处打转，就是紧张兮兮地缩在室内。在逐渐缩短的夜晚里，有人指着地平线声称看见了远方驶来的船舶，可那些头脑还算冷静的人清楚这不过是遥远的繁星投下的微光。也不乏有人尝试以企鹅等当地动物为食，虽说来源不至于稀少，但要想将狩猎扩大至可持续的范围即便可行也是遥遥无期。\n\n相较于饥荒，酷寒似乎是更为迫在眉睫的威胁。为了在严寒中生存下去，整个基地都靠着日益枯竭的汽油烧火取暖。迈尔在海军离开后的首日就敲定了热量配给：一天供电12小时，接着减少到10小时、8小时，再后来只剩下6个小时。这样的条件可是苦了那些没这么多脂肪与肌肉能够燃烧的人，他们的身体被迫消耗自身产生的少量卡路里以维持运转。然而，哪怕是在如此节约中艰难度日，这片殖民地上珍贵的热源——汽油储备依旧濒临见底。一旦汽油消耗殆尽，发电机也将随之彻底停摆，届时迈尔只能眼睁睁地看着自己和下属在零下数十度的低温中停止呼吸，长眠在世界的底部，连一场像样的葬礼都得不到。\n\n补给太少，配给太严，却还远远看不到头。必须做点什么了，若是不想让新施瓦本重蹈过去无数次失败的远征之覆辙，现在就该行动起来——立刻、马上。"
 antarctica_aag_gcw.20.a:0 "我们别无选择。接下来该如何是好？"
 antarctica_aag_gcw.20.a.tt:0 "一场会议即将召开。"
 antarctica_aag_gcw.30.t:0 "我们的补给越来越少"
 antarctica_aag_gcw.30.desc:0 "迈尔、席尔马赫、舒曼与赫尔曼聚集在冰冷的钢桌旁。大家都穿着厚重的冬服，只有迈尔依然身着空军制服，极力营造一种正常的感觉，稳定大家的士气——至少这能安慰他自己。用冻得僵硬的手捋了捋胡须，迈尔开口道：“我相信大家都知道了祖国的情况，我的心与关切家人安危的所有人同在。然而，此时此刻的我们肩负着格外的使命，要守护父国与人民的未来。”\n\n席尔马赫点了点头，闭上了眼睛。另两位桌边的科学家甚至装也不想装一下，只是茫然地注视着迈尔。类似的话他们听过太多次了，于是，迈尔接着补充道：“在补给供应上我们面临三种选择”，一份报告书随即在会议桌上铺开，舒曼顿时倒吸一口凉气，汉斯·许蒂希专员的照片映入眼帘，他冷酷的脸庞如阴云般将整份报告笼罩其中。“长久以来，我们北方兄弟铸就的非洲之盾经受住一次又一次的考验，维护着祖国在黑暗大陆的利益。作为祖国的忠实效忠者，他们决定尽自己的义务帮助我们，但他们手头的货源也有限，毕竟他们也得应付不断升温的南非问题。”\n\n下一张照片就没那么惊世骇俗了，那是阿根廷探险家豪尔赫·埃德加·莱亚尔，阿根廷在南极科考行动的首席。“在全拉美处于华盛顿影响的背景下，阿根廷人也许愿意与我们保持友好，至少OFN还没有接管南极这个小小的地域。他们手头也很紧，但尚有能与大陆同侪分享的物资。”\n\n当席尔马赫望向最后一封文件时，他差点从椅子上跳起来。黑白相片上的竟是威廉·弗朗西斯·雷伯恩，OFN南极洲事务局的指挥官——堕落华盛顿政权的卑劣奴仆！“如果我们实在没有选择了，就必须忍人所不能忍，虽然他们是混血的种族垃圾，但如果阿根廷和东非都帮不上忙，他们至少能供我们吃穿……要么忍受一点小小的意识形态污点，要么饿死，大家都有的选。”"
 antarctica_aag_gcw.30.a:0 "“阿根廷人应该会给我们足够的帮助，他们是讲道理的人。”"
 antarctica_aag_gcw.30.b:0 "“这是个艰难时刻，我们必须吞下自己的骄傲，向美国人求助。”"
 antarctica_aag_gcw.30.c:0 "“非洲之盾是我们最亲密的盟友，希望他们有足够的配给分享给我们。”"
 antarctica_aag_gcw.40.t:0 "来自南方的请求"
 antarctica_aag_gcw.40.desc:0 "医院通常是静悄悄的。那些还有力气在迈入这扇石膏般惨白的大门时呼喊、祈祷的人，早就在暴力与胁迫下放弃了抵抗。他们还能说什么？有那么一两次，一名清洁工派往南区时走岔了路，出来时都是语无伦次，眼睛瞪得跟脑炎病人似的老大。医生对待那些病例只有一种治疗方法，他们会被转移到一个根本不存在的诊所，通往一处死胡同，还有一个地图上被悄悄抹去的洞。\n\n随你怎么评价约瑟夫·门格勒，他懂得怎么料理一艘紧绷的船。\n\n在阴暗大厅的一处角落里，医生匆匆浏览了下潦草的电报。那是来自新施瓦本极地的消息，或者更确切地说——是一封求援信？迈尔，这个业余政治家，瞧他为讨饭跑了多远！还有那个不爱笑的汉斯！天啊，他早就知道这个小猫崽会跌跌撞撞地被赶出柏林的聚光灯……\n\n门格勒的呼吸颤抖起来，双手不住地摆动，他短暂离开了一会，从桌上来了剂吗啡。其实这桩事很简单，汉斯也知道这不会叫他伤筋动骨，区区六艘满载食物和装备的船，还能装备一个营，组建一处新营地吗？得了吧！门格勒能想到的拒绝援助新施瓦本的唯一理由，与他当初来到黑非洲的理由是一样的，那就是——\n\n他想活动筋骨！\n\n门格勒噘了噘嘴，在泛黑的电报纸上潦草地写了点什么，然后推给一位助理。离开房间前，他不忘取走他的吗啡针，而那位助手则开始了通往广播塔漫长而坎坷的旅程。他向电报机走去，耳畔留意着如信号般精准的男高音，与某人绝望呼喊的长度。"
 antarctica_aag_gcw.40.a:0 "我们会掺和下迈尔的小把戏。"
 antarctica_aag_gcw.40.b:0 "恐怕我们还有更重要的事要做！"
 antarctica_aag_gcw.50.t:0 "发现补给船队！"
 antarctica_aag_gcw.50.desc:0 "舒曼干裂的嘴唇浮起一抹笑颜，他奏响了吉他。在极地一成不变的寒冷而爽朗的早晨，他的音符不忘在雪地间舞动。至少此时此刻，这位科学家找到了他的避难所。几个月前，从鲍赫勒施塔特登船时，他还犹豫过要不要往新施瓦本捎上这件乐器，后勤太紧缺了，个人物品必须被控制在最低限度，至少官方文件如此。可是，一想到要控制自己的欲望，他内心深处的某种东西就不住地叫唤——当然，对于需要他照料的营地来说，他是被允许得到这种奢侈的？\n\n如今，他在遥远的边地演奏着动人的音符，思绪在荒野延绵不绝的群山间徜徉，一路漂洋过海，穿越大西洋的骇浪，拥抱那可爱的非洲堤岸与海港，攀上直布罗陀大坝的青冈，那是他的家乡，他的家乡！水手的心灵呐喊着，长着城市的霓虹灯与甜美的芳草，巴伐利亚山上暖湿的空气与滚淌着淡水的河流，那是我的家乡，我的家乡！\n\n“北方之旅真别致，两两德人只念家……”舒曼长叹了一口气，想起了他远方的家人。\n\n“哦，安妮，艾米莉亚，如果我们还能相见的话……那不是很好的嘛。”\n\n正当此时，一声长长的汽笛声打破了哨站的寂静，舒曼擦去工装上的泪痕，直起僵硬的腰板，看到了令人难以置信的东西——那是海军旗，旗下摇曳着丑陋而美丽的德国钢铁。人群如疯了般从他身旁跑过，他们欢呼，他们哭泣，多少人如释重负。舒曼握紧了他的吉他，向沉默的上帝表达了感激，在几近凝固的空气中，低诵起家乡的乐曲。"
 antarctica_aag_gcw.50.a:0 "我们得救了。"
 antarctica_aag_gcw.50.a.tt:0 "我们收到了§!§r东非专员辖区§!送出的§F§W20补给§!£Antarctica_texticon_SUP ，§F希望这能长久持续下去。§!"
 antarctica_aag_gcw.60.t:0 "不幸的回音"
 antarctica_aag_gcw.60.desc:0 "“这简直是暴行！”披着大衣的迈尔浑身颤抖地说道，眼下支配他的显然是比极地的寒风更可怖的东西。“身为德意志的公仆，那个厚颜无耻的汉斯竟然好意思拒绝？等本土为我解了困，我定要把他的脑袋插在长矛上……”\n\n无能的咆哮在无言的寂静中显得格外嘹亮，他的顾问们红着脸，说不出一句话来。席尔马赫咕噜噜地喝了一大壶水，赫尔曼与舒曼你看看我，我看看你，都把目光放到别处去了。\n\n事已至此，谁也说不出话来：除却名义上之外，他们已经被抛弃了，谁也帮不了他们。船队不会再来了，东非专员辖区也袖手旁观。日耳曼尼亚不能再为他们提供任何帮助，整个国家都已沦落险境。\n\n新施瓦本独立了，他的子民饥肠辘辘，生活在无尽的惶恐中，被暗藏危机的海水与敌人包围，彻底彻底的被孤立了。\n\n不！不！迈尔努力摇了摇身子，装出一副尊严犹存的样子，支撑着自己酸痛的膝盖站立起来。他必须做点什么，什么都行，只要能帮他们摆脱行将到来的饥饿。那古老的，令人毛骨悚然的恐惧，迈尔感受的到，它使人疯狂，走向自相残杀，正当他们说话的时候，这种恐惧就已在基地内蔓延开来——\n\n“够了！”迈尔的声音中带了几分虚伪的自信，即使那是他在咆哮中下达的命令：“我要一份完整的存货清单，如果有必要，给我把你们奶奶的骨头都给我刨出来！从今天起，所有人的配给减半！”现有物资不够目前的花销，更不够过冬，“但德意志人的精神能带领我们渡过困难！”\n\n他指望自己的言语能说服自己，至少他努力过了——剩下的就是祈祷。"
 antarctica_aag_gcw.60.a:0 "无论使命多么无望，我们都得坚持下去！给阿根廷人打电话。"
 antarctica_aag_gcw.60.b:0 "该死，还是联系美国人吧。"
 antarctica_aag_gcw.70.t:0 "来自东方的请求"
 antarctica_aag_gcw.70.desc:0 "一阵无线电信号将格里·阿尔瓦雷斯从睡梦中惊醒，甜美的家乡印象转瞬间被寒冷刺骨的现实与广播塔取代。\n\n“碎浪……碎浪……请讲，这里是新施瓦本，我的英语怎样，完毕？”\n\n“我……啥？你是谁？你是怎么知道我频率的，完毕？”\n\n信号那头的人翻动了几张纸，好像他提前记下了这些问题的答案。\n\n“我是二等兵克洛普，代表德意志南极属地的行政官鲁道夫·迈尔发言。鉴于本国内战爆发，我们失去了补给供应。”\n\n那个所谓的二等兵克洛普深吸了一口气。\n\n“现在，你也明白若不是我们别无选择，是决不会向您提起这个问题的。算我们求你了，把这个消息告诉您的指挥官……谢谢你？”\n\n“如你所见，你没在我们另一个无线电操作员在时打来算你走运。他是个犹太佬，我跟他一起长大的，每天早上醒来他都会朝着耶路撒冷的方向做祷告。他跟我讲过，你们活该被饿死！不幸的是，我要这么干我想我也比你们这群人渣好不了多少。收到！克洛普，我会转告的。”"
 antarctica_aag_gcw.70.a:0 "说不就太残忍了。"
 antarctica_aag_gcw.80.t:0 "西部边境发现车辆"
 antarctica_aag_gcw.80.desc:0 "如果你说赖克·汉纳曼在挨饿，那也太轻描淡写了。他的胃肠像是开了洞似的，每天早晨八点起床，吃掉减半的口粮，喝点咖啡，就要带着他的小队巡逻去了。\n\n即使基地里有充足食物，这样的生活也让哨兵们难以忍受，空空如也的肚子让一切变得更操蛋了。虽说如此，他也得走啊，说啊，笑呀，抽根华子啊，毕竟要是士气落空，那就什么希望也没有了。\n\n当小队发现异常时，赖克刚抽了一半的烟。一头冰雪与钢铁凝结成的巨兽正在原野上犁地而行，上面高高飘扬着阿根廷国旗。即使从小被父亲的故事耳濡目染，又在部队服役多年，赖克也很难说是否为他的万字符号骄傲。\n\n他就这样不停地抽着烟，逐渐缓解了难熬的饥饿感。他等不及从军队退役了，那之后也许他会开一家书店……\n\n但他的哨兵伙伴们可不像赖克那样爱做白日梦。相反，他们招手让那辆车停下来，一个会说一点西班牙语的士兵试着从雪地车的窗口同里面的人交流。\n\n“我们，饿肚子！”\n\n“行行好，朋友。”\n\n士兵们用西班牙语吆喝着，其中一人向前递过一个小盒子。赖克听懂了那个词，在任何语言里它都是一样的，那就是巧克力！在他反应过来以前，早就有人伸手去抓巧克力棒了，幸运的是，他在分完前给自己也抢了一个。\n\n大家很庆幸自己拿到了食物，但赖克希望今天剩下的时间能都用来休息。"
 antarctica_aag_gcw.80.a:0 "我对元首只有感恩，不管是谁家的。"
 antarctica_aag_gcw.80.a.tt:0 "我们收到了§!§M阿根廷§!送出的§F§W25补给§!£Antarctica_texticon_SUP ，§F希望这能长久持续下去。§!"
 antarctica_aag_gcw.90.t:0 "来自西方的请求"
 antarctica_aag_gcw.90.desc:0 "里迪紧抱着几张纸，推开大门走进麦克默多站指挥所。外面寒风呼啸，他费了老大劲关上门后就一路小跑去海军中将雷伯恩的办公室。门口的秘书结结巴巴地说要凭预约见雷伯恩，里迪见状便死死盯着这可怜的小伙子，眼里满是怒火：\n\n“小子，我必须见比尔，现在，立刻，马上。我手里的消息他非，听，不，可。”秘书点了点头，用颤抖的手指敲击电话键盘，拨通了中将的电话。\n\n“长官，我们在南极开展了各类气象研究，这里对于国际局势的重要性不言而——”另一通电话打了进来。真是个恰到好处的开脱机会。雷伯恩嘀咕着道歉了几句，便接起了另一个电话。\n\n“长官，海军少将里迪来见您了。”\n\n“让他进来。”\n\n办公室门关上后，里迪松了一口气。他拉上四周的窗帘，走向雷伯恩的办公桌说：“比尔，德国人没补给了，他们就在那挨饿，还找上门来求助了。”雷伯恩十指交叉，严肃地点头：“有鉴于德国佬的近况，这种事情并不意外。他们和咱的侦察部队有纠葛吗？”里迪摇了摇头。对面早就没有卡车和直升机的灯光了。\n\n“嗯，我们干脆可以让他们就在那挨冻，日本佬或咱的南美弟兄就可以乘虚而入。”里迪揉着太阳穴，满脑子迷惑：“老天啊，比尔……我明白你的意思，但别告诉我咱真的要在那帮傻逼德佬身上浪费纳税人的钱吧？！”\n\n雷伯恩沉默了片刻，思索了一会，作出决定："
 antarctica_aag_gcw.90.a:0 "“事后再抱怨，先保证人人能吃上饭。”"
 antarctica_aag_gcw.90.b:0 "“说得对，这事要是传出去，媒体可就要大做文章了。”"
 antarctica_aag_gcw.90.c:0 "“给我接里普。机会来了。”"
 antarctica_aag_gcw.100.t:0 "东部边境发现装甲车辆"
 antarctica_aag_gcw.100.desc:0 "冈瑟·柯尼希不敢相信他的眼睛。大量的OFN雪地车就在他们面前数米。尽管他们已经得知OFN已经在路上，但没人料到他们竟然如此信守承诺。汉克和他的队员只是碰巧成为了“欢迎委员会”，而OFN的如期而至反而出乎他们的意料。\n\n离开了这些雪地车，怀着等分量的迟疑和希望，他和他的队员们和OFN的士兵见面了。他们立刻就意识到命运在他们身上开了一个巨大的玩笑。第一个向他们问好的士兵戴着一条金色的大卫之星项链。出于一阵恶心，德国人拒绝和他握手。汉克早就知道颓废的美国人有意庇护犹太人，但他们甚至让他们明目张胆地展示他们的宗教符号？他们完蛋了。\n\n犹太士兵并没有因为握手被拒绝而感到被冒犯，并开始大笑。很快，他把他的伙伴们也迎了过来。\n\n“科瓦尔斯基，看看这个；我们给他们带来了食物，可他们依然拒绝和我握手。”\n\n波兰人也在这？汉克的队友们并不太懂英语，但一听到这个波兰姓氏，他们便下意识地向后退。OFN士兵们又花了几分钟嘲笑德国人，随后开始将物资卸载下来。在他们之中还有不少黑人士兵；其中一名留意到冈瑟在他搬运一箱C口粮时一直盯着他。\n\n柯尼希脑中有无数想法。这么多不同种族怎么能如此高效地合作？他们怎么能相信拿着武器的犹太人和波兰人？是什么驱使着奴隶的后代和他的压迫者一同作战？所有这一切让冈瑟不禁问出，“为什么？”\n\n士兵甚至没有向柯尼希看一眼，回答道：“尽管美国有很多问题，这一切恐怕都与你们无关。”"
 antarctica_aag_gcw.100.a:0 "善恶交织。"
 antarctica_aag_gcw.100.a.tt:0 "我们收到了§F由§!§Q美国人§!送出的§W50补给§!£Antarctica_texticon_SUP 。§F希望这能长久持续下去§!。"
 antarctica_aag_gcw.110.t:0 "美国人的沉默"
 antarctica_aag_gcw.110.desc:0 "几个小时以来，迈尔一直呆呆地盯着墙上的万字符，在睡与醒的边缘徘徊。一阵冷风穿过他的脚间，忽然间整个房间变得明亮了起来；那是席尔马赫走了进来。\n\n“希特勒万岁，迈尔上尉。今天没有来自美国人的消息，过去几天也没有。也许我们该考虑其他选项。”\n\n迈尔回头看着新施瓦本的旗帜，片刻之后，感受到这失败的分量和他与他的手下即将面临的死亡的冰冷空虚，他发出一声漫长而痛苦的哀叹。他们将不会被当作英勇的探险家或雅利安民族的英雄而铭记，而是作为一群白痴，执行一项愚蠢的任务，为垂死的帝国确保一片毫无价值的冰原。\n\n呻吟声变成了尖叫声，尖锐的声音回荡在远处的冰原和废土上。大多数人低着头，沉默不语，而迈尔的声音也变得嘶哑，在哽咽中只剩下可怜的啜泣。这就是千年帝国最远方的前哨的领导者。真是笑话。\n\n席尔马赫脚步踉跄，目光扫过房间，试图想出摆脱这种局面的得体方式。他的老朋友，他的上司，他的领导，正坐在那儿哭泣，就像一个软弱的小男孩被戏弄一样。终于他开口了：“我是否应在你考虑选择的时候回到我的住处，迈尔上尉？”\n\n迈尔擦了擦他那张饱经风霜的脸，说道：“不，不，里夏德。这是意料之中的。我们将寻找其他的供应链解决方案。”"
 antarctica_aag_gcw.110.a:0 "这很粗鲁，但是这也是我们预料之内的。试试去鲍赫勒施塔特的线路。"
 antarctica_aag_gcw.110.b:0 "那就这样吧，让我们看看阿根廷人那边会不会好点。"
 antarctica_aag_gcw.120.t:0 "极地微风行动"
 antarctica_aag_gcw.120.desc:0 "南极军事援助司令部特别行动小组，也被称为“里普的特工”，是一个规模很小的小组——这是有充分理由的。在他们的OH-6“小马”上，OFN的旗帜反射着光芒，还写着“反法西斯物资”的字样，但事实上这并不是常规补给。基地里的人们，无论是新西兰人、澳大利亚人、还是加拿大人或美国人，无不在确认补给目录时感到欣喜若狂，他们全都渴望着冒险。还有什么能比继续伟大圣战更富冒险精神的呢？\n\n由于麦克默多站距离新施瓦本距离过远，他们的直升机还需要进行数次经停加油，以前往深入内陆的南极补给站高尔夫34号。严格来说，那里距离新施瓦本边境已经很近了。而选择这里作为前进基地，同样方便了他们用直升机带回囚犯。事实上，里普手里就有个他想要抓捕人员的名单——只要解决卫戍部队，越过防御工事，他就能得到那个基地。\n\n里普看着欢呼雀跃的人群，以及由他指挥的士兵。他不觉得会遇到太大的阻碍，因为他的小组曾经计算过，德国守军应该已经饿到没力气战斗了，但或许他们也会因饥饿与偏执朝自己的士兵放几轮枪。如果某个疯狂的德国佬真的这么做了，那美国报纸肯定会把自己生吞活剥，更别说那些脱口秀主持人了——而确保这种可能性永远不会发生就是他要做的工作了。\n\n里普暂时压住了这种忧虑，朝众人露出微笑，将烟头丢到地上，又快速地敬了个礼。听到欢呼还在他背后回响，里普抓起帽子，走进第一架休伊直升机，走到驾驶舱的无线电前：“鲁道夫1号，请求起飞许可。“\n\n雷伯恩回道：“收到，鲁道夫1号，授予许可。”"
 antarctica_aag_gcw.120.a:0 "“收到，鲁道夫1号。授予许可。你可以起飞了。”"
 antarctica_aag_pervitin.1.t:0 "奇怪的包裹"
 antarctica_aag_pervitin.1.desc:0 "在极寒之地，席尔马赫站的周围，德国人建立了无数前哨。一方面，此举是为了科学研究需要；而另一方面，则是为了监视新施瓦本的边境，以便抵御外部威胁，否则席尔马赫站就会被敌军或者大自然攻陷。\n\n卢卡斯·拜尔稍微整理了一下自己凌乱的衣着，他心想，从原则上来说，他是要时刻保持警惕的。但在他发现阿米尼乌斯站的其他人都在摸鱼之后，他也开始放松了些。“你有想过我们为什么要来这片不毛之地吗？”他碎碎念着，把脸侧向他的同伴，康拉德·施瓦茨科普夫，“我知道在日耳曼尼亚的实验室里，我并不是最受欢迎的那一批科学家，可我怎么就……因为一点小意外就被发配到这里了？”，尽管已经疲乏不堪，施瓦茨科普夫听到这话还是忍不住哈哈大笑。“小意外？给我整乐了，那也能叫小意外？我给你算算，如果我没记错的话，你没把黑猩猩给关严，那群猩猩不仅在办公室里到处拉屎，还去袭击研究所长，这也叫小意外？”“那你要这么说，康拉德，那我不是好好的教训了那个混蛋，其他人早看他不爽了。”“哎呦，得了吧，再给我递点咖啡来，拜尔，我杯子里没了。”“我杯子里也没了，妈的，锅里面也没了，我们刚刚不是才煮过咖啡吗？”两个人面面相觑。\n\n“我想我们得从仓库里再拿点咖啡豆来了。”拜尔抱怨着，他现在只感觉头又开始疼了。这两位科学家穿上他们厚实的衣服，走进了南极寒冷而黑暗的夜晚。“你知道的，我永远都习惯不了这地方，无边无际的黑暗。”拜尔抱怨说，“还不是因为你干的傻逼事，咱俩现在本来应该在家吃饱喝足晒太阳的，可现在呢？看看你干的好事，他们怀疑我是跟你一伙的，所以我俩现在就被丢在南极洲研究这些该死的企鹅。”康拉德大声抗议道。两人一边聊着，一边走下冰冻的楼梯去到仓库。里面放满了咖啡、茶和其他含咖啡因的东西，来保证他们能够清醒的工作。\n\n但是，阴差阳错地，在放在柜子上的一大堆东西里，一个特别的包裹引起了他们的注意。在日耳曼尼亚学习期间，他们留意过包装上的标识，一眼就认出来包裹里面装着绝对能让他们提神的东西。“来点劲大的？”康拉德微笑道，打开了包装封口。拜尔只知道他特别累，而且他还要去研究那些该死的企鹅。"
 antarctica_aag_pervitin.1.a:0 "“就来一次，没关系的吧？”"
 antarctica_aag_pervitin.2.t:0 "“犯人”"
 antarctica_aag_pervitin.2.desc:0 "施瓦茨科普夫和拜尔透过牢房的玻璃看着里头的囚犯，黑色无魂的眼睛也回望着他们。\n\n“他不喜欢讲话，是吗？”施瓦茨科普夫说。\n\n“有点奇怪。”拜尔回道，他砰地敲着玻璃。“如果你个混蛋什么都不说，我们也不会喂你的！”\n\n囚犯朝玻璃走了一步，每个动作都流露着明显的恶意。\n\n拜尔退却了，“他不会打破玻璃出来的，除非我们打碎玻璃放他出来。”他看着施瓦茨科普夫，他看起来跟拜尔一样糟糕，焦躁不安、浑身出汗和全身看起来都很激动。每个月的补给来了又走，可带来的东西越来越少，而现在，任何一辆雪橇车上都找不到咖啡。不只阿米尼乌斯站，整个新施瓦本的物资都很紧缺。\n\n拜尔只知道，在这么物质紧迫的环境下，只有一样东西来的最多，那是……\n\n“施瓦茨科普夫！拜尔！”\n\n两人都被吓了一跳，环顾四周发现，他们的上司克莱恩·赫茨巴赫站在门口。\n\n“别盯着那该死的企鹅看了！我们还有活要干呢！”\n\n赫茨巴赫走了，拜尔和施瓦茨科普夫看着对方，“我们走前要不要带点东西？”拜尔问道。"
 antarctica_aag_pervitin.2.a:0 "不可思议地，那个企鹅仿佛确实点了点头，同意了他们的说法。"
 antarctica_aag_pervitin.3.t:0 "化学之欢愉"
 antarctica_aag_pervitin.3.desc:0 "君特·耶格的住处可谓是艰苦朴素的典范。房内的每样物品都各有用处，橱柜上没有亲人的照片，置物柜上也没有任何小饰品，毕竟雅利安人不需要此等奢余之物。唯一一个称得上多余的物品就是办公桌上的表扬信。\n\n这封表扬信既非嘉奖战斗中的英勇表现，也不是赞扬抹除低等人种的功劳，而是用来表扬耶格的聪明才智的。他是党卫队的军需官，十分善于发现——或者引起——补给上的问题。因此，他因扰乱新施瓦本补给收到了奖赏。\n\n耶格填完了这份假的新施瓦本请购单，靠在椅背上伸展了一下。虽说伪造技能正在逐步提升，但他认为，拿到这些请购单的人都在忙更重要的事情，无暇去交叉核对表格。一开始，耶格还在犹豫是否要把这个计划拿给集团领袖西弗斯看，如此阴谋诡计可和雅利安人的原则相悖……或者至少他是这么认为的。西弗斯过目后，几乎立刻批准了计划，不久之后又因为收效甚好而扩大之。不出意外，堕落的新施瓦本派驻人员显然很乐于吸食他们最新的毒品。即便这里离祖国有千里之遥，西弗斯也支持任何能削弱敌人、保存雅利安人血脉的计划。\n\n虽说如此，鉴于行动实施范围显著增加，君特开始怀疑贝格尔海姆里出了点问题。他再看了眼请购单的末尾一行："
 antarctica_aag_pervitin.3.a:0 "300包柏飞丁，新施瓦本，施佩伯爵港。"
 antarctica_aag_pervitin.4.t:0 "提议"
 antarctica_aag_pervitin.4.desc:0 "“别那样做，拜尔。”\n\n卢卡斯·拜尔定住了，但他的身体仍在不停颤抖。已经午夜了，他还在阿米尼乌斯站的生物研究室里，其他的研究人员都在甲基苯丙胺持续的毒瘾里不能控制自己。拜尔唯一的同事，施瓦茨科普夫，已经申请回宿舍睡一觉消除焦虑了。现在只有一只帝企鹅陪伴着拜尔，研究人员都把这只企鹅叫做马克西米利安。而马克西米利安在透过玻璃墙看着拜尔。\n\n“别那样做了。”\n\n拜尔一下子清醒了，猛地站起来。“谁在那？”他看向研究室的门口。“施瓦茨科普夫？是你吗？”\n\n门口没有任何人在，而他的意识又开始不清醒了。拜尔把手伸向了那盒药片。\n\n“拜尔，别。”\n\n拜尔看着企鹅小马。“等一下，是你……”\n\n“对，笨批拜尔，是我，企鹅。”\n\n拜尔惊讶的张大了嘴。\n\n“我知道，你现在非常想用那个药，然后继续研究我有多帅，但是如果你用了，你和你认识的人都会被杀的。不要问我为什么，拜尔，因为我能预见未来。听我的，拜尔，别再吞药了。”\n\n拜尔看着他手里的药片。"
 antarctica_aag_pervitin.4.a:0 "“去你妈的，老子才不听你的鬼话！”"
 antarctica_aag_pervitin.4.b:0 "拜尔用鞋跟把这些药丸踩碎：“我听你的……”"
 antarctica_aag_pervitin.5.t:0 "好主意"
 antarctica_aag_pervitin.5.desc:0 "病房被重症戒瘾患者挤得人满为患，阿米尼乌斯站的人迫不得已只能另找地方治疗柏飞丁的成瘾者。卢卡斯·拜尔第一个扛过了戒毒疗程，因此他自告奋勇来帮助自己的同事克服毒瘾。他将站点里的大片区域改造一新，用来容纳那些浑身抽搐、卧床不起的科学家和士兵们。生物实验室便是其中之一。\n\n起先，拜尔本想让帝企鹅马克西米利安继续待在围栏里面，但后来发现这只上了年纪的大鸟在自己离开时令施瓦茨科普夫颇受鼓舞。于是拜尔把它放了出来，带它去人群中四处闲逛。实践的效果可谓立竿见影，人们对这个帝王般的身影不胜喜爱，马克西米利安在人类面前也显得很是享受。\n\n拜尔与马克西米利安从实验室的床位中穿行而过。“看呐卢卡斯，”马克西米利安低声说，“大家在慢慢康复。”\n\n拜尔喜出望外：“你说得对，再嗑一星期的药我们恐怕全都得去雪地里面裸奔了。”他停下脚步，顺手给一个熟睡的士兵盖上毯子，“我想我们不会在这里待太久，尤其是现在祖先遗产学会反水的情况下。我打算跟施瓦茨科普夫谈谈怎么处置圈在室外的企鹅，要不然把它们全部放了？”"
 antarctica_aag_pervitin.5.a:0 "企鹅小马觉得这是个好主意。"
 antarctica_aag_pervitin.6.t:0 "不可能存在的军队"
 antarctica_aag_pervitin.6.desc:0 "根据耶格军需官的情报显示，在过去的大半年里，党卫队把阿米尼乌斯站的咖啡等物资换成了大量的柏飞丁，在不堪重负的工作压力下，柏飞丁将会削弱阿米尼乌斯站的决心与斗志，驻守阿米尼乌斯的人员应该早就发了疯。可当布伦纳用望远镜侦察阿米尼乌斯站时，站里一点动静都没有，安静地出奇。\n\n布伦纳感觉自己直冒冷汗，自从党卫队突击小队被席尔马赫站击退之后，布伦纳的小队承受不了更大的伤亡了。\n\n布伦纳握紧了望远镜，他注意到：阿米尼乌斯站的所有大门竟然都打开了。“预备”，他对手下说道，“他们可能要冲出来了。”布伦纳立刻匍匐在地上，用狙击枪瞄着门口。\n\n随后，在某一扇门里，他看到有什么东西在动。那是一只威严的帝企鹅，它正摇摇晃晃地走到阳光下，然后是另一只，又一只，再一只……\n\n“上帝啊！”布伦纳的副手惊呼道，“有几百只！不，几千只！”\n\n这很不对劲，会是个陷阱吗？席尔马赫站依靠欺骗和复杂机动做出了巧妙的防御，这里会有同样的事情发生吗？布伦纳猜想企鹅背上或许绑着塑料炸药和滚珠轴承。如果让它们靠近，必定会导致一场恐怖的大屠杀。“我可不想这样……它们还在靠近！伙计们，撤退！回到雪地摩托上！”"
 antarctica_aag_pervitin.6.a:0 "马克西米利安哭了，这里没有更多的地方供他征服了。"
 antarctica_aag_pervitin.7.t:0 "高兴的日子"
 antarctica_aag_pervitin.7.desc:0 "迈尔被席尔马赫快步领着穿过以后者命名的站点的走廊。“阿米尼乌斯站的信号是什么时候到的？”他揉了揉惺忪的睡眼如是问道。迈尔自祖先遗产学会发起袭击以来就没睡过几天安稳觉，现在又被人从少有的几次好梦中匆匆叫醒。\n\n“二十分钟前，”席尔马赫回答说，“之后就一直联系不上了。”\n\n“是设备出了问题？”现在的国产设备似乎都不像以前那般经久耐用。\n\n席尔马赫摇摇头：“您还是……自己听听录音吧。”\n\n二人双双走进通讯室，一名无线电报务员正焦头烂额地坐在控制台前。“放来听听，”席尔马赫下令道。报务员随即把手伸向与无线电系统相连的录音机，按下了上面的播放键。\n\n首先传入迈尔耳中的是一声尖锐的嘶鸣，过了一时半会儿他方才认出这是企鹅的叫声。一分钟后，录音中出现了人的话音：“我们本该听的……小马把过去和将来讲得明明白白，却被大家当成耳旁风。老天，我们为什么就听不进去呢？！”紧接着，扬声器里响起一个洪亮的声音：“圣诞快乐！今年，快乐丸人人有份！”语罢，说话者中立刻爆发出一阵欢呼和大笑。迈尔、席尔马赫等人最后听到的是一阵断断续续的机枪射击声。\n\n磁带播放完了，席尔马赫转身面向迈尔。“第一个声音是科学家卢卡斯·拜尔。去年我们把他和同事施瓦茨科普夫，也就是第二个声音派去了阿米尼乌斯站。”\n\n“快乐丸是什么鬼？”迈尔百思不得其解。\n\n席尔马赫咽了口唾沫。“我们调查过了，某个组织，十有八九就是祖先遗产学会篡改了阿米尼乌斯站的物资申领表，削减了里面包括咖啡在内的各类奢侈品，只换成了一种东西……”"
 antarctica_aag_pervitin.7.a:0 "“……柏飞丁。”"
 antarctica_aag_pervitin.8.t:0 "凝视深渊"
 antarctica_aag_pervitin.8.desc:0 "党卫队小队长约纳斯·布伦纳自阿鼻地狱步入房间。地板上铺着一层皮肤与羽毛混合而成的表面，墙壁上写满了由粪便、血液与人体组织书就的文字与画符。《平安夜》婉转的旋律自对讲机里幽幽传来，断断续续夹杂着几声企鹅的叫喊。\n\n布伦纳将队伍一分为二，继续向着基地深处移动。目前为止一行人尚未遭遇抵抗，事实上他们除了几只在走廊上打转的古怪企鹅外再没能目击到任何活物。倘若这其中有人因此心生害怕，也决不敢面露半分惧色。\n\n布伦纳和手下登上冰霜密布的台阶，准备进入位于设施中心的生物实验室。门打开的一刹那，里面的景象令所有人都始料未及：阿米尼乌斯站的幸存者们被迫赤身挤成一团。数具身躯躺在地上一动不动，不知是陷入沉睡还是早已气绝身亡。原本装着柏飞丁的箱子散落四周，个个空空如也。一个被鲜血染红的人形一丝不挂地于室内旋转跳跃，好似一名学生时代的妙龄少女。他一边兴高采烈地喊着圣诞祝福，一边将手里的柏飞丁片大把大把地撒向自己的同事们。在实验室的正中央，生者围着一张垫高的书桌双膝跪地，一只帝企鹅正赫然站立其上。\n\n布伦纳凝视着企鹅，企鹅也报之以同样的目光。\n\n他慢慢示意手下撤出房间。阿米尼乌斯站已是大厦将倾，无需在此浪费子弹。两支队伍重新会合，准备离开这片是非之地。这时，一阵机枪的嘶吼从站点深处传至布伦纳的耳中。又一个灵魂最终丧失了理智。"
 antarctica_aag_pervitin.8.a:0 "“我是布伦纳小队领袖，阿米尼乌斯站已攻陷。胜利万岁。”"
 antarctica_aag_ahnenerbe.1.t:0 "鲜血染红之夜"
 antarctica_aag_ahnenerbe.1.desc:0 "这是有生以来第一次，赖克·汉纳曼知道自己做了一个正确的决定，赢得了舒曼的青睐。如果一切顺利的话……算了，还是别高兴得太早。他如今正和原子弹之父一起坐在指挥台的顶端，看着一群吵吵闹闹的军官蜂拥而至。这让他又傻笑起来，朝埃里希·舒曼望去。“紧张？”汉纳曼问道。\n\n“确实挺紧张……而且这里比斯堪的纳维亚女人逼里还冷。哦，请原谅我的粗俗。”两人开怀大笑，赖克从酒瓶里喝了一大口。埃里希则是被撞在喉咙上的伏特加吓了一跳。很快，赖克躲回了阴影里，而埃里希在雷鸣般的掌声中登上舞台。这花了一分多钟，但士兵们彼此之间都没说话，保持着完全的沉默。\n\n“朋友们，在正式开始前，我得说，我真的不擅长演讲。但尽管如此，我还是会尽我所能传达我们敬爱的元首，赫尔曼·戈林的命令。我昨天收到了一封信！我们的祖国正出现令人担忧的局势！我们的敌人，那些想要操纵德国，撕裂德国的人，正从四面八方围困我们！他们无力驾驭这个世界，无法像我们这些科学家一样驾驶国家之船！我们得到命——”\n\n正在此时，大量的人群开始爆发出欢呼与掌声。埃里希想要打断他们的庆祝，但无济于事，他只能在人群中大喊：“我们得到命令！赫尔曼·戈林元首下令让我们占领基地的关键战略点！”他还想继续自己的演讲，但欢呼声又一次把他淹没了。赖克不由得为这位老物理学家感到高兴，因为他总算有了一定的基本盘，即使只是世界底部贫瘠的冰原。最终，欢呼声停了下来，舒曼重新获得了主导权。\n\n“这就是为什么我们要让鲁道夫·迈尔滚下台！现在是科学工作者战胜党派路线的时候了！”欣喜若狂的惊呼毫不费力地再次在会议大厅中回荡。当人群又一次安静下来的时候，安东·格拉塞尔走了出来。埃里希礼貌地和他握了握手，并将指挥台让给了他。"
 antarctica_aag_ahnenerbe.1.a:0 "随着安东继续大声发号施令，赖克不禁担心……这次权力的过渡绝不会平静。"
 antarctica_aag_ahnenerbe.2.t:0 "抓个正着"
 antarctica_aag_ahnenerbe.2.desc:0 "明明有那么多机会可以袭击恩斯特，为啥非得挑他正在秘书身上操劳的时候呢？因此，当披着斗篷拿着匕首的杀手打开门时，他完全没注意到这个不速之客。但门上铰链吱吱作响的声音惊醒了恩斯特，让他变得警惕起来。起初，他怀疑是一个冷漠的巡警拐错了弯，因听到他房间里的尖叫声就过来看看。\n\n但当来人冲到他的办公桌前，拔刀刺来时，他就知道自己错了。恩斯特抓起手边的钝器，朝闯入者猛扑而去，让他因镇纸砸上头骨而哀嚎起来。只穿着内裤的老人毫不留情地殴打着入侵者，天啊，自在世界大战中朝英国佬的堑壕冲锋以来，他就再也没感觉自己如此有活力过。\n\n当恩斯特终于意识到发生了什么的时候，他已浑身浴血，而血肉横飞的闯入者倒在地上，秘书则是在墙角瑟瑟发抖。恩斯特急忙穿上衣服，在他去警告其他人之前，他向自己的秘书提出了最后的要求。"
 antarctica_aag_ahnenerbe.2.a:0 "“布隆希达，把我的鲁格手枪递给我行吗？”"
 antarctica_aag_ahnenerbe.3.t:0 "长刀寒夜"
 antarctica_aag_ahnenerbe.3.desc:0 "赫伯特·弗赖塔格正在大楼里等着该死的党卫队，他忍不了了，这儿他娘的怎么会安了这么多日光灯管！还有战友们，他们有没有觉得这些灯发出的声响吵得不得了？靴底的吱吱作响和灯管发出的嗡嗡响声让赫伯特几乎快要崩溃了，他转头对身边最近的士兵弗里茨勉强低声说了一句：“我出去尿个尿。”然后，就一溜烟跑到了外面。\n\n夜空中冰冷的空气立刻让他感到舒畅不已，他摘下帽子，感受阵阵凉爽，大楼里那些刺激他感官的因素变得无影无踪，他感到自己的头仿佛浮在水面上一般……这是他整晚唯一轻松的时光。突然间，大楼中明亮的灯光黯淡下来，他的解脱变成了惊恐，是战、是逃？随后，黑暗中走出了一个身着黑衣的身影，如同黑夜一般寂静无声。赫伯特选择了战斗，尽管已经上了年纪，但他依然像狐狸一样敏锐矫健。\n\n凭借多年的军事训练功底，他挡住了一开始的攻击，袭击者手中的刀被他嵌入了哨所的铝制护墙板中。反击中，赫伯特一个扫堂腿，把对方摔在了雪地上。随后，弗赖塔格迅捷地拔出了自己的军刀，怀着生命遭遇威胁的愤怒，将匕首刺进了敌人的颈项。\n\n攻击者很快就断了气。他没有浪费时间，转头就冲进了大楼。袭击者并不孤单，里面的灯还能用，但这就是对他来说唯一的好事了。战友和袭击者散落在各处，到处都是令人不安的鲜血。没有人喊叫，他只能听到弗里茨的呜咽声：“赫伯特！”他在大口大口地吐着血，咳嗽起来。已经太迟了，不过在这之前，弗里茨还有话要说：\n\n“党……卫军，”赫伯特大吃一惊，但内心深处明白，这种可能始终都无法排除。他能做的只有握住弗里茨的手，目送他走向来生。弗里茨先是感到自己的听觉渐渐消失，无法再听到赫伯特让他睁开眼睛的请求；然后，他的视野黯淡下来，看到了父亲的面庞。在最后一刻，他怀揣着简单而单纯的思念：他的父母，他的妹妹，然后，一切都结束了。"
 antarctica_aag_ahnenerbe.3.a:0 "如果一名士兵垂泪但无人聆听到，那么他是否真曾垂泪过？"
 antarctica_aag_ahnenerbe.4.t:0 "要是他们知道就好了"
 antarctica_aag_ahnenerbe.4.desc:0 "“小伙子们，跟我来。”安东·格拉塞尔领着一小队叛乱士兵以及核心人物埃里希·舒曼。他们计划一起穿过混乱的席尔马赫站，前往一处行动基地。据他们所知，效忠者们正聚集在一起，对抗这场混乱的政变，现在他们必须得安顿下来，准备应对长期的冲突。\n\n这里很安静……过于安静了，埃里希在心里想。但正当他准备说出自己的想法时，格拉塞尔举起左手，握紧了拳头，小队停下了脚步。他们的两侧都是建筑物，这里是席尔马赫站唯一的一条小巷。如果有士兵到这里来吸食某种非法物质，他们是不会被打断的，因此也被称为“绿色小巷”，这是席尔马赫站的潜规则。\n\n两名士兵转身退后，枪口瞄准着他们进来的地方，格拉塞尔带着另外两个人走在前面，埃里希则蹑手蹑脚地待在中间。可不幸的是，小队没有考虑到效忠者们会出现在房顶上面。一瞬间，枪管就对准彼此，两派人马互相叫骂着。随后，里夏德·席尔马赫穿着他那套风度翩翩的德国空军制服出场，登时一片寂静。\n\n席尔马赫在屋顶上坐下来，点上一根烟吸了一大口。随着烟雾，他发出了一声叹息。\n\n“我比你们俩想得更多，”他又吸了一口烟，“真是令人失望，派系主义影响了你们。跟我出去吧，迈尔有话要说。”\n\n形势的陡然转折让绿色小巷中的士兵十分沮丧，他们乖乖地顺从了屋顶上来人的指示，这就是决战时刻了。\n\n阴谋策划者们走出了小巷，但里夏德不知道的是，他刚刚救了所有人的命：潜伏在小巷另一端的两名党卫队士兵，他们失去了在今晚杀戮的机会。"
 antarctica_aag_ahnenerbe.4.a:0 "猎物逃出生天，猎手只能默默垂泪。"
 antarctica_aag_ahnenerbe.5.t:0 "人生还要继续"
 antarctica_aag_ahnenerbe.5.desc:0 "在回到席尔马赫站的路途中，赫伯特·弗赖塔格什么都感觉不到，仅仅只依靠着纯粹的直觉引导自己走向雪地车。啊，是两个人的尸体，一个是自己的士兵，另一个则是党卫队的袭击者，二人的尸体层叠着躺在一起，流着同样殷红的鲜血。他小心翼翼地跨过尸体，登上了雪地车。发动机的嗡嗡声打破了阴森的寂静，士兵孤身一人，全速奔向席尔马赫站。\n\n最初的震惊消散之后，弗里茨最后的时刻、这个年轻人最后一次闭上眼睛时的神色又浮现在弗赖塔格的脑海中。为什么他能活下来，而弗里茨却不能？为什么他渐渐变老，而弗里茨却在二十岁就离开了这个世界？一想到他的某个儿子或孙子在这么年轻时就死去，他就不寒而栗。赫伯特已经度过了美好而充实的人生，可弗里茨的生活才刚刚开始。也许这就是忠诚于祖国的下场，被同胞一刀扎进肚子里。\n\n席尔马赫站的灯光在远处闪烁。谢天谢地，弗赖塔格想着，也许他们成功抵挡住了攻击。他怀抱着这样的希望，直到进入基地的百米之外：党卫队正在放火焚烧建筑，挑拣被抓到的落单士兵。\n\n弗赖塔格一直知道这些人有问题。他又想起了西俄战争时的旧事，这伙人就是天生的暴徒。他所在的师里有一支党卫队分队，专门负责“处理”敌人。他指挥的小队对其暴行感到厌烦愤怒，于是，他们让这支党卫队分队尝到了成千上万死难者的命运：给自己挖个坟，爬进去，然后被逐一枪毙。看到他们摇尾乞怜让弗赖塔格十分享受，此事也没有遭到后续的调查。\n\n幸存者停下了雪地车，两个党卫队正准备破开活动室的门。“嘿，狗杂碎！”弗赖塔格大吼一声，吸引了他们的注意力。随后，他拔出手枪，就像自己平生接受的军事训练一样，两颗子弹正中目标。当弗赖塔格准备彻底了结垂死的同胞时，他的手枪卡住了，但这没什么影响，他面带微笑，再次启动引擎，咆哮着冲向了党卫队。"
 antarctica_aag_ahnenerbe.5.a:0 "弗里茨已不再变老，但党卫队也看不到明天的太阳。"
 antarctica_aag_ahnenerbe.6.t:0 "新时代，老玩法"
 antarctica_aag_ahnenerbe.6.desc:0 "就这样，鲁道夫·迈尔和埃里希·舒曼互相盯着彼此，而他们身后则是各自的大批士兵。他们就像是坐在火药桶上一样，鬼知道什么时候就会有某个笨手笨脚的家伙去点燃火星。迈尔觉得自己干得不错，他和里夏德以惊人的速度集结了忠于他的士兵，更别说他在应对舒曼政变时的灵活手腕了。当席尔马赫把这位原子弹之父带进活动室的时候，他表现得局促不安，汗流浃背，甚至还穿着睡衣。鲁道夫保持了沉默，他知道在这种情况，谁先说话，谁就矮了一头。\n\n“你知道我想要什么，鲁道夫。”\n\n“你也知道我不能那么做。”\n\n“为什么不呢？你也不想这些人因你而死，不是吗？”\n\n“如果今晚真有人死了，那都是因为你，埃里希。天哪，安东，你也在其中吗？我还以为你不会参与这种政变过家家呢。”\n\n安东在众人面前大声喊道：“这绝非为了我自己，先生，这是为了我儿子，你知道我是什么意思。”\n\n两人继续拉扯着，誓要迫使另一人让步，或者是忍无可忍地拔出武器。但这事绝无可能再发生了，因为一辆满是血污的雪地摩托撞破玻璃闯了进来。\n\n骑手被压在他的雪地摩托下面，血流满地。他挣扎着站起来，朝在场的诸位军官敬礼。他不关心眼前剑拔弩张的谈判，只是庆幸自己找到了高层人员。"
 antarctica_aag_ahnenerbe.6.a:0 "“赫伯特·弗赖塔格中尉前来报到，我们遭到了祖先遗产学会的攻击。”"
 antarctica_aag_ahnenerbe.7.t:0 "暮色漫漫"
 antarctica_aag_ahnenerbe.7.desc:0 "“这个地方真是多姿多彩。”贝克尔说道。\n\n克劳泽也这么觉得，尽管直升机下只有冰雪覆盖的无垠荒原，但在漫长的黄昏中，它们仿佛染上了一层暗淡的蓝色。“这片大地就像是在一年的不同时间里都有不同的情绪一样。”克劳泽说道。\n\n贝克尔严肃地点点头：“确实如此。”\n\n二人刚刚完成了MBB-Bo-115的飞行测试，正在返回席尔马赫站的途中，这是他们计划中在飞机燃料储备耗尽之前的最后一次飞行。驾驶舱在湍流中颠簸了足足四个小时，让他们的身体又累又痛。幸好在返程途中天气已经平静下来，飞行条件近乎完美。现在，他们正穿行在一座挡在席尔马赫站前的山脉之中，无线电在这里无法与基地建立任何联系。\n\n“越过那座山脊后，应该就能重新联系上了。”克劳泽说着，操纵直升机机头向上扬起，无线电开始发出噼里啪啦的声音，枪火轰鸣声接踵而至。\n\n贝克尔又重新调整了一下频率，疑惑地说道：“这到底是——”\n\n电波中响起了低沉的枪声，紧接着传出一道粗重的声音，翻来覆去地重复着一个词：“党卫队……党卫队！”克劳泽和贝克尔飞过山脊线时，他们明白了其中的含义：坐落在广阔平原上的席尔马赫站火光冲天，突击步枪枪口闪烁的火光点亮了暮色沉沉的天空，但这只是基地遇到的最为微不足道的危险：几十辆雪地车正在冰雪上疾驰，党卫队的旗号猎猎飘扬。\n\n“狗日的叛国混球！”克劳泽怒气冲天。\n\n“我们该怎么做？！”贝克尔叫喊道。"
 antarctica_aag_ahnenerbe.7.a:0 "“把机枪准备好，迈尔和兄弟们亟待救援，咱们冲进去！”"
 antarctica_aag_ahnenerbe.7.b:0 "“所有武器系统上线！咱们不能放那些雪地摩托过去！”"
 antarctica_aag_ahnenerbe.8.t:0 "吸引注意"
 antarctica_aag_ahnenerbe.8.desc:0 "沉重的军靴踏过实验室外的走廊，枪声在大厅中回荡，电子工程师汉斯·拜姆勒和他的朋友兼同事阿尔布雷希特·波尔正蜷缩在一张翻倒的桌子后面。\n\n走廊上传来一道话音：“必须抓住舒曼！要活的！实验室就在基地的这一侧，把那里所有和武器有关的文件都找出来！”\n\n拜姆勒的眉毛挑了起来。“天呐，”他对波尔说道，“他们在找核弹的设计图。”\n\n“绝不能让他们染指核武器，”波尔回应道，“绝不能让他们得逞。”\n\n拜姆勒舔了舔嘴唇，说道：“如果我们中有一个人能分散他们的注意力，那另一个人就能跑去实验室，放火烧掉图纸。”\n\n“怎么分散他们的注意？”\n\n拜姆勒检视着实验室：相邻的房间是喷气推进实验室，堆放着各式能发出嘈杂声响的设备以及危险材料；而在边柜上，拜姆勒和波尔刚刚泡好了几乎是基地里的最后一壶咖啡。在错误的人手里——也或许是对的人手中，不管哪个倒霉蛋被砸中，这玩意儿都足够他们喝上一壶了。\n\n波尔循着拜姆勒的目光，他也明白摆在面前的选择：“我可以到实验室去，尽可能弄出嘈杂的噪音。”\n\n拜姆勒摇了摇头：“这太危险了，我们应该一起行动，争取从党卫队那儿抢件武器过来。”"
 antarctica_aag_ahnenerbe.8.a:0 "还没等拜姆勒阻止他，波尔就冲进了喷气实验室。"
 antarctica_aag_ahnenerbe.8.b:0 "拜姆勒站起身，拿起热咖啡壶：“让我们来好好招待一下这些不速之客。”"
 antarctica_aag_ahnenerbe.9.t:0 "波尔的最后一次实验"
 antarctica_aag_ahnenerbe.9.desc:0 "波尔冲进喷气实验室的大门，他听到了身后的呼喊和杂乱的脚步。党卫队已经发现他了，很好。\n\n他站控制室里，俯瞰着风洞，周围全都是各种开关和按钮。透过强化玻璃，他看到“美洲轰炸机”的一个喷气式发动机放置在试验台上，连接着主电源。\n\n他的嘴角露出了一丝冷笑。\n\n时间不多了，必须要在党卫队追到身后之前搞定。波尔扳动开关，走下楼梯，来到测试层。当他走过发动机前面的风洞时，涡轮机已经开始了咆哮。一名士兵从控制室开火，打碎保护玻璃，击中了波尔的腿，鲜血浸透了他的裤子，渗进鞋底。他冲进二级控制室，将门反锁上。\n\n在门后，党卫队在测试室的地板上一字排开，枪口对准控制室，喊道：“投降吧，我们会给你个痛快！”\n\n波尔的股动脉正在大出血，他高声回答道：“好的，很快！”他站起，流畅地转动着控制喷气式发动机的转盘。涡轮机陡然开始尖啸，三名士兵被吹离地面，变成了发动机尾部喷出的浓浓红雾，不复存在。\n\n波尔长舒一口气：“这是为了我在安提法的同志们。”他推开控制台，踉踉跄跄地穿过防火门。南极的黄昏时刻显得十分奇诡，一切都披上了美丽的蓝色。勉强走了几步，波尔就倒在了雪堆里，双眼望着天空。他的生命正在一分一秒地流逝，他希望拜姆勒能活下来，成功烧掉舒曼的核武图纸。"
 antarctica_aag_ahnenerbe.9.a:0 "冰雪染上血红。"
 antarctica_aag_ahnenerbe.10.t:0 "最后一壶咖啡"
 antarctica_aag_ahnenerbe.10.desc:0 "拜姆勒和波尔缓缓地从桌子后面站了起来，而一个装备着突击步枪的落单党卫队士兵正背对着他俩站在门口。两位科学家慢慢地走向餐具柜，那上边放着最后一壶还冒着腾腾热气的咖啡。拜姆勒把壶从炉子上举起来，在牺牲掉这壶咖啡前，他与波尔最后分享了美妙的一小口。直到这时，那个党卫队士兵依然背对着他俩。拜姆勒和波尔小心翼翼地避开实验室的一地狼藉，蹑手蹑脚地朝他走去。然而，就在他们走到触手可及的距离时，波尔不小心踩到了一个试管，发出一阵喀嚓喀嚓的声响。\n\n“谁在那儿？！”党卫队士兵转过身，说出了生命中的最后一句话。拜姆勒将咖啡壶朝他的脸抡了过去，破碎的玻璃割裂了士兵的脸颊和鼻子，而滚烫的咖啡烫伤了其他部位。当他嚎叫着倒在地上时，拜姆勒抢走了他的突击步枪，波尔则是取走了他的党卫队匕首，并用它割开了原主人的喉咙，让他彻底闭上了嘴。但此时走廊里传来了沉重的脚步声，那人的战友们回来了。拜姆勒不假思索地将枪管伸了出去，死死地按住扳机，向走廊射出一连串子弹，直到整个弹匣打空为止。随后，他们俩人才伸出头看了看自己的战果。\n\n“好枪法，汉斯。”波尔看着走廊里的尸体说道。他走上前去，一个接一个地割开士兵的喉咙。但轮到最后一个人时，仰面朝天的士兵突然坐了起来，用自己的党卫队匕首深深地扎进了波尔的大腿。拜姆勒冲上前去，用突击步枪的枪托砸碎了党卫队的颅骨。匕首从波尔的腿上滑落，受伤的科学家跌靠在墙上，鲜血不断地从他的伤口喷涌而出。拜姆勒不是外科医生，但他也能猜到波尔的大动脉被切开了，现在还能去哪儿找个医生不成？波尔的脸渐渐变得苍白，他抓住拜姆勒的手：“朋友，答应我，别死在这儿，回家，就当是为了我……我真的很高兴能认识你。”当波尔的手从拜姆勒手中滑落时，他脑子里只有一个念头。"
 antarctica_aag_ahnenerbe.10.a:0 "至少你并没有孤零零地告别这个世界，波尔。"
 antarctica_aag_ahnenerbe.11.t:0 "五巨头"
 antarctica_aag_ahnenerbe.11.desc:0 "在赫伯特·弗赖塔格到来之后，席尔马赫站就变成了一座堡垒，士兵们在角角落落站岗放哨，巡逻队在大厅之中巡弋。短短一个小时之前，他们还在用枪管对准彼此，现在却正并肩而立，保卫基地。席尔马赫站的领导层知道这不可能永远持续下去，因此，他们开始在赫尔曼的办公室里投入工作，制定如何击退党卫队的计划。迈尔的嘴上叼着一根香烟，俯身盯着席尔马赫站的地图；赫尔曼站在房间一角；舒曼倚在通风口上，吹出的热气温暖着他的后背；格拉塞尔坐在皮椅上面，心情相当不爽地把脚跷到了赫尔曼的办公桌上。席尔马赫则靠在窗户上，仔细地侦察着潜伏在一片漆黑之中党卫队。迈尔把烟从嘴里拿出来，看着面前的四个人：“看地图，我制定了一个计划。还是个小孩子的时候，我就读过尤利乌斯·凯撒是怎么打赢阿莱西亚攻城战的。我们要在基地周围建起包围圈，让里面的敌人插翅难飞，把党卫队饿死，然后攻进基地。只要一拿下基地，我们就能把叛徒统统都赶回贝格尔海姆！”迈尔吸了一大口烟，说出了这样一席话，然后开始征求意见：“先生们，有什么想法？”\n\n舒曼举起一只手，说道：“现在听着，鲁迪，我有个提议。我知道你很生气，但我们完全能在这个早上弄清楚一切。现在，就把我当成你上个月认识的那个埃里希吧。”迈尔虽然气急败坏，但也依然打手势示意舒曼说下去。“我认为，我们应该逐屋逐户地搜寻党卫队，就像基本训练一样。每肃清一个房间，就在那里留下几个守卫。如此往复，直到彻底扫清席尔马赫站和外围基地。”\n\n身着南极装备的恩斯特·赫尔曼举起一只手：“那我们表决吧。有谁赞成迈尔的计划？”令人惊讶的是，格拉塞尔竟然举起了手。埃里希疑惑地看着他，希望他能给出解释，格拉塞尔回应道：\n\n“鲁道夫说得有道理，学凯撒大帝从来都不是坏主意。”\n\n“那支持埃里希计划的，请举手。”席尔马赫举起了手，双眼仍然紧紧盯着窗外。打平了，迈尔还需要决胜的一票：“那你呢，恩斯特，你支持谁？”"
 antarctica_aag_ahnenerbe.11.a:0 "“迈尔说得不错，让我们困死这群渣滓。”"
 antarctica_aag_ahnenerbe.11.b:0 "“埃里希说得有道理，应该挨个房间彻底干掉他们。”"
 antarctica_aag_ahnenerbe.12.t:0 "汉纳曼的抵抗"
 antarctica_aag_ahnenerbe.12.desc:0 "赖克·汉纳曼无论如何也搞不明白，事情怎么会变得如此糟糕。在舒曼的演讲后，阴谋分子们迅速占领了基地的关键设施，并逮捕了忠于迈尔的几个人。而迈尔本人，以及他为数不多的支持者被孤立在活动室里，看上去政变成功已经是板上钉钉的事了。然后党卫队就出现了，现在汉纳曼和他的四个手下被困在三号仓库的废墟中，对抗十几个党卫队士兵。\n\n“他们是想包抄！”汉纳曼大喊，“约翰，把机枪对准这边！“\n\n当这个年轻人试图用他的武器对抗突进的敌人时，一颗狙击子弹射穿了他的脖颈。他向后仰倒，窒息在自己的鲜血中。\n\n汉纳曼跑到机枪旁，命令其他士兵守住摇摇欲坠的仓库右侧墙壁。再这样下去不行，他想。\n\n远处的一点闪光引起了他的注意：是狙击镜的反光。他吸了一口气，想起了他一直想要经营的书店，等待着自己的终局。但至少对于汉纳曼来说，此时他命不该绝：那个狙击手和他的观察手突然变成了一团红色的血雾，就像是被重机枪撕碎一般。烟雾散去，汉纳曼认出了那架MBB-Bo-115直升机，在烟尘中呼啸而过，将下面的党卫队尽数歼灭。\n\n“是克劳泽和贝克尔！”汉纳曼的一个手下喊道，“这俩疯子！”\n\n直升机下降到离地不过五十英尺的地方，强大的火力把“雅利安超人”炸得血肉横飞，却没伤到汉纳曼的人一丝一毫。当直升机飞向基地的另一侧时，汉纳曼下达了职业生涯中最重要的命令。"
 antarctica_aag_ahnenerbe.12.a:0 "“冲锋！”"
 antarctica_aag_ahnenerbe.13.t:0 "噪声"
 antarctica_aag_ahnenerbe.13.desc:0 "一小群帝企鹅正在山坡上蹒跚而行，光亮的羽毛上时不时地在身后明亮的橙色阳光中闪闪发亮。突然，世界变得嘈杂起来，队尾的一只雄性企鹅停了下来，抬起它的头。有什么新的声音，越来越响亮……\n\n“我将低空掠过敌军队列，”克劳泽说道，“打击先锋队的雪地车！”\n\n“收到！”贝克尔回答，“所有武器已就绪。”\n\n“开火！”\n\n第一发火箭弹让党卫队措手不及，足足五辆雪地车的燃料箱被引爆，变得面目全非，熏黑的钢铁和尸体向各个方向飞散而去。纪律严明的党卫队纵队瞬间陷入无序的混乱中，侥幸幸存的车辆打破队形，徒劳地在空旷的平原上寻找不存在的掩护，还有不少人举着步枪向天空中射击。\n\n“我觉得他们还没学乖。”贝克尔说道。\n\n克劳泽的脸上洋溢着嗜血的微笑：“那就再教教他们。开始低空扫射，授予你随意开火的权限。”\n\n“乐意至极，中尉。”贝克尔调高了机枪的转速，“我只希望基地里的家伙们能坚持下去。”\n\n雄企鹅以前从来都没见过火，现在他却见得太多了。这只体型瘦长、没有翅膀的鸟儿一直都以矮胖矮胖的小动物为食，直到兽群灭绝。炎热对他来说是全新的体验，散发出的气味则令他深感难受。雄企鹅理了理自己的羽毛，转身离开火场，追上了他的孩子。"
 antarctica_aag_ahnenerbe.13.a:0 "这个世界真是太吵了。"
 antarctica_aag_ahnenerbe.14.t:0 "围攻"
 antarctica_aag_ahnenerbe.14.desc:0 "过于自信的敌人，即使是像党卫队这样强大得可怕的敌人，仍然有可能被意外情况击败。他们为了胜利而来，携带着许多武器，但绝对没带上多少水和食物，这是一支单纯的突击部队。因此，迈尔的围攻计策完美奏效。格拉塞尔迅速组织起了基地内剩余的部队和武器，并且将基地分成了四个区域，每个区域都委派给了迈尔麾下的一名军官，尽可能地包围敌军。几场零星的交火后，战线已经稳定下来。随后，三天过去了，党卫队被驱赶到了没有饮用水、没有口粮的废弃居住区。日子一天天过去，虚弱不堪的敌军被逐出阵地，扔进监狱，据点也随之被攻陷。\n\n迈尔打量着党卫队抛下的许多重武器中的一件，沉思着说道：“这就是他们傲慢的证明，你说是吧，恩斯特？”\n\n“西弗斯在贝格尔海姆的那群手下可不会这么蠢，”舒曼回答道，“俘虏里我一个都不认识，他们有可能受到了来自其他地方的兵员增援。”\n\n此时，一阵叫喊把他的注意力引向了最后一处阵地，格拉塞尔跑了过来，报告道：“看来他们还没完全丧失战斗力……那儿有一支党卫队火力小组，拒绝投降或者撤退，正在向我们的雪地车开火，还咆哮着他们的雅利安至上主义。”\n\n迈尔权衡了一下手头的选择，他需要干净利落地结束这一切，让属下明白新施瓦本到底是谁说了算。于是，他开口问道：“我们还有烟雾弹吗？”\n\n格拉塞尔一脸疑惑：“呃……有，但为什么……”随后，他恍然大悟，露出野蛮的笑容，“啊……白磷弹，长官，我明白了。”\n\n迈尔低声下令道：“抵近射击，别打歪了。”很快，尖叫声和肉体燃烧的气味充斥在空气中……最终彻底归于寂静。"
 antarctica_aag_ahnenerbe.14.a:0 "党卫队在烈火中消亡。"
 antarctica_aag_ahnenerbe.15.t:0 "皮洛士式胜利"
 antarctica_aag_ahnenerbe.15.desc:0 "安东·格拉塞尔手持步枪向前走着，下挂手电筒的光束照亮了席尔马赫站漆黑的走廊，身后的队员或许会庆幸他平日对其严加训练，否则现在早就是死人了。一行人正依照舒曼的计划夺回基地，他们一条条走廊、一个个房间扫荡过。格拉塞尔看了不由得感到十分自豪，他甚至不用给队员下命令，小队行动全靠自觉。\n\n如此危急关头，战友情如雪中送炭。昔日（有时）温暖、宜居的席尔马赫站成了寒冷又吃人的迷宫，里面还塞满了背信弃义的刽子手。格拉塞尔和他的士兵正在剿灭党卫队，每个房间都堪比火光、鲜血和肾上腺素的大熔炉。\n\n一名党卫队士兵躺在地上血流不止，格拉塞尔便上前补了一枪。“好了，”他对队员们说道，“这块地方的人应该杀完了，现在去补给仓库。”众人点头，排好阵形随着格拉塞尔向站点中央过道走去。不料，他们在补给仓库的大门前撞见了一支党卫队小队。此刻，两边都盯着彼此，十分震惊。\n\n“所有人趴下！”格拉塞尔大吼道。一行人便全数卧倒，对着党卫队开火。后者没抢到先手，但反应过来之后疯狂反击，用冲锋枪和手榴弹向对方倾泻大量火力。格拉塞尔手下数人中弹身亡，一发手榴弹还落在身边，好在他及时将其捡起来丢了回去。这枚手榴弹正好点燃了存放的丙烷，党卫队小队瞬间被火球吞噬，还烧毁了半个仓库。枪战结束后，格拉塞尔及其手下急忙灭火，保护剩下的补给。"
 antarctica_aag_ahnenerbe.15.a:0 "英勇之举。"
 antarctica_aag_ahnenerbe.15.a.tt:0 "我们会失去§W3补给§!£Antarctica_texticon_SUP 。"
 antarctica_aag_ahnenerbe.16.t:0 "倒下的同志"
 antarctica_aag_ahnenerbe.16.desc:0 "克劳泽中尉和他的副驾驶贝克尔将外壳上布满弹孔的MBB-Bo-115直升机停到了基地外的平地上。他们已经累得不行了，可当他们动作僵硬地爬出驾驶舱时，受到了英雄般的欢迎。迈尔、几名军官、还有一半的基地驻扎人员都赶到了降落地点，欢呼雀跃，就连一些负伤的士兵都在战友的搀扶下一瘸一拐地走过来，不想错过这个时刻。\n\n当迈尔走近时，克劳泽和贝克尔勉强抬起手来敬了个礼。“我不知道该对你们二位说些什么，”迈尔说，“这是我平生所见的最令人印象深刻的飞行了。如果挺过这场混乱之后，我们认识的那个德国还没有消失，那我一定会让你们因今日的英勇战斗而获得铁十字勋章。我们都欠二位一条命。”随后，他回到了基地，急于着手开始重建和清理的工作。\n\n在向两位飞行员表示祝贺后，人群逐渐散去。最终，克劳泽和贝克尔独自站在风中的平原上。远处，他们看到汉斯·拜姆勒的身影正在雪地上挖掘着什么，一具冰冷的尸体躺在拜姆勒的身旁。克劳泽和贝克尔互相交换着悲伤的眼神，摘下帽子，走了过去。\n\n“这是可怜的阿尔布雷希特，”贝克尔说道，沉痛地向遗体点了点头，“就是他帮助设计出了我们的飞机。”\n\n拜姆勒转过身来，将目光投向飞行员们。他叹了口气：“党卫队想要舒曼和他的计划，阿尔布雷希特和我不得不阻止他们。”他又看了看那位年轻的工程师，“他真的非常勇敢。”\n\n克劳泽和贝克尔在附近找到了两把铁锹。“我们也来搭把手，让他安息吧。”克劳泽说道，于是，三人一起在雪地上为牺牲的战友挖出了一个坟墓。"
 antarctica_aag_ahnenerbe.16.a:0 "他不会是最后一个……"
 antarctica_aag_ahnenerbe.17.t:0 "次日晨时"
 antarctica_aag_ahnenerbe.17.desc:0 "成堆的士兵在布满弹痕的座位上睡觉，疲惫的众人为了取暖纷纷围在熊熊燃烧的建筑物旁。几个好心人做了些力所能及的清理工作，赖克·汉纳曼和赫伯特·弗赖塔格就在其中。几个小时前，二人还不知道彼此的存在，而现在，精疲力竭的他们强打精神，加紧清扫。\n\n席尔马赫站三巨头——也就是迈尔、赫尔曼和舒曼——围坐在迈尔的办公室内。格拉塞尔和席尔马赫在百米之外被打烂的食堂里做饭。鉴于近来的风波，如此行为可谓是谦让之举。回到办公室内，会晤安排不言而喻，但较真的迈尔还是挑明了：“房间里说的话必须严格保密。不能向你们的军国派朋友透露，元首也不行，不管哪个都不行。”\n\n“已阅。”舒曼讥讽道。迈尔直勾勾地盯着舒曼，眼神里满是杀意：“埃里希，你要知道，我现在没一枪爆了你的头都算好的了。你整完那些事之后，我……你应该出去和赖克一起清理！至少他还像个男人一样明白自己玩脱了，正在收拾自己的烂摊子！”\n\n赫尔曼坐在一旁，不为所动。他向迈尔抬起手说：“消停点。如果你想让这番周折有回报的话，我们就得先搁置下分歧，承认真正的敌人还在外面某处虎视眈眈地等着我们内斗！”赫尔曼停顿了一下，喘口气，毕竟前一晚有他受的，“我们必须团结一致坚强下去……就算不是为了自己手下，也想想德国。外面那帮人就他妈像野狗一样在自相残杀！我们一定要把他们拧成一股绳。”赫尔曼从腿上绑着的刀鞘中抽出猎刀，放在桌子上，随后对二人说道：“你们两个，放下屠刀，歃血誓盟。现在就做。”\n\n赫尔曼一把抓过迈尔的手，在手心上划开一道口子。就在他要对舒曼做一样的事时，后者示意把刀拿来，旋即自己划开，与迈尔握手。二人顿感痛彻心扉，犹如被白纸来回割了几千次。他们四目相对，等着彼此投来轻蔑的目光，但双方的眼神都澄清无比，明白化解麻烦的方法只有一个："
 antarctica_aag_ahnenerbe.17.a:0 "团结一心，携手共进。"
 antarctica_aag_ahnenerbe.18.t:0 "家庭团聚"
 antarctica_aag_ahnenerbe.18.desc:0 "“爷爷，你最后一次上战舰是什么时候了？”\n\n赫伯特从战舰带来的恍惚之中清醒过来。\n\n“噢……太久了，丹尼斯，太久了。”\n\n赫伯特无法相信自己的眼睛：一艘战列舰停泊在他们的港口，他的侄孙子恰好就在这艘船上服役。真巧啊！赫伯特从思绪中清醒过来，继续把沉重的箱子沿着跳板送到码头上。任务完成后，两人坐在他们搬下来船来的箱子上，一起抽着烟。在吞云吐雾的间隙中，他们交谈起来。\n\n“爷爷，我想……呃……跟你做个交易。”\n\n“我在听，但我可不会因为你是家人就给你打折，呵呵。”\n\n丹尼斯放声大笑，环顾四周，寻找着任何可疑的面孔，赫伯特也在做同样的事，两人都知道他们在众目睽睽之下。\n\n“这儿的每个人都守口如瓶，我至少听到了九种不同的说辞，而且我还知道没有一个是真的。如果你告诉我这儿到底发生了什么，我就告诉你我们要去哪里。”\n\n赫伯特长长地吸了一口烟，愉悦的感觉在他年迈的身体上蔓延开来。\n\n赫伯特对他的侄孙子笑了笑，他遗传了家族的绿色眼眸。是个好孩子，他又忍不住想起了弗里茨。赫伯特熄灭了手中的香烟，然后把手放在箱子上，开口说道："
 antarctica_aag_ahnenerbe.18.a:0 "“好吧，你看，这一切都始于一台坏掉的发电机……”"
 antarctica_aag_ahnenerbe.18.b:0 "“那原本只是一次常规的会合……”"
 antarctica_aag_ahnenerbe.19.t:0 "崇高的理想"
 antarctica_aag_ahnenerbe.19.desc:0 "鲁道夫·迈尔的候客室只是席尔马赫站的一个小房间，弗赖塔格从来没有去过那里。他从来没觉得过有必要去见这位顶头上司，他不惹麻烦，保持沉默，完成所有交到他手头上的工作。因此，当鲁道夫·迈尔请他去办公室喝杯茶时，他出于好奇接受了邀请。\n\n恩斯特·赫尔曼从房间里轻手轻脚地走出来，迅速地把迈尔办公室的门指给了弗赖塔格，然后离开了这里。赫伯特走进房间，看到迈尔正在沏茶。随后，迈尔端起两杯茶，走到办公桌前，迅速坐下，说道：“赫伯特，请坐。”\n\n赫伯特压抑着自己紧张的情绪，询问道：“我能为您做些什么，迈尔先生？”\n\n鲁道夫·迈尔拿出了他的人事档案，说道：“嗯……首先，我想为你小队的遭遇道歉，真是一场悲剧；我也感谢你没有告诉任何人，甚至是你的家人。我不由得开始思考起你来，所以就翻阅了你的档案：为祖国奉献四十年，得到了足以挂满军装的铁十字——告诉我，你为什么还没退役？”\n\n赫伯特喝了一口茶，回答道：“先生，闲来无事就容易惹是生非，我不确定如果我退役了会去做些什么。我和妻子已经走遍了世界，养育了一个家庭，所有的工作我都做过了。”\n\n鲁道夫双手合十，跟着点了点头：“好吧，我明白了……赫伯特，你已经对得起这个体制了，所以现在轮到体制对得起你的时候了。我动用了一点儿人情，给你在斯图加特附近谋了个指挥岗位。你可以和家人住在房子里，开车去基地，两全其美。你当这是贿赂也好，当这是多年来努力工作奉献得到的回报也罢，都无所谓。这是你应得的，不论现在的烂摊子什么时候解决，这个职务都是你的。”\n\n弗赖塔格几乎无法抑制自己的兴奋，喝光了杯中的茶水。这位老兵怀揣着对故土的思念，向长官问出了最后一个问题：“先生，您没有必要这样做，为什么要为我费这么大力气？”"
 antarctica_aag_ahnenerbe.19.a:0 "“因为忠诚应该得到奖赏。”"
 antarctica_aag_ahnenerbe.20.t:0 "像风一样骑行"
 antarctica_aag_ahnenerbe.20.desc:0 "赫伯特·弗赖塔格把他的雪地摩托停了下来，此时他在从席尔马赫站到麦克默多站的路上已经逃亡了足有72小时。他从自己的雪地摩托外挂的雪橇上取下了便携炉子和一罐豆子。寒冷袭来，弗赖塔格点燃了便携炉子，把豆子罐头放在上边，坐下来欣赏起远处阿德默勒尔蒂峰连绵的山峦。\n\n赫伯特走进席尔马赫站狭窄的大厅，应召前往迈尔的办公室，但他半路上就被赖克·汉纳曼拦住了。“我们出去走走吧，赫伯特。”他一边说着，指了指另一个方向。赫伯特不明所以时，赖克俯下身，压低声音说道：“迈特知道你向你侄孙泄密了，那孩子是替海军做事的，而迈尔想要解决掉这事。莱特纳已经接到命令，要把你的尸体埋进雪堆里。“赫伯特瞪大了眼睛，这才意识到自己险些跳进一个陷阱里。\n\n弗赖塔格打开罐头，嗅了嗅从里边飘出的温暖香气。几分钟后，老兵吃饱了，倦意涌上身心。他抓起做饭的家伙什，塞回雪橇上。随后，他拿出了睡袋，是时候睡觉了。\n\n赖克和赫伯特穿过大厅。在那晚的袭击中两人见过面，烈火铸就了他们之间的情谊。他们一直走到雪地摩托仓库，这儿有大量无人管理的雪地摩托，大部分都积了厚厚的一层雪，但有人已经提前整备好了一辆。赖克指着储物柜里的装备说道：“你得在迈尔发现前赶紧走。这是指南针和前往麦克默多站的地图，我透过秘密渠道跟一个美国佬说过了，他知道你会去。“对于赖克所做的一切，赫伯特心里只有感恩。当他挂上最后一件装备时，赖克往他手里塞了一件东西：”这是我在你宿舍里找到的，我想你应该会需要他留个纪念。“\n\n“谢谢你，赖克。”赫伯特拥抱了他一下，这让汉纳曼有些措手不及，不过他最终还是反过来也拥抱了赫伯特。“也谢谢你，老头，祝你好运。”\n\n赫伯特钻进睡袋，迷迷糊糊地睡着了。他梦到了自己的家，以及其他东西。"
 antarctica_aag_ahnenerbe.20.a:0 "在赫伯特休息时，赖克则在几千公里外的另一头带领着搜索队前进。"
 antarctica_aag_ahnenerbe.21.t:0 "新生活"
 antarctica_aag_ahnenerbe.21.desc:0 "赖克一直很讨厌收邮件。家里人从不给他写信，老家也没有可以通信的朋友。士兵们一个个都拿到了礼物和书信，他却只能在一边嫉妒地看着。这就是为什么赖克在邮差大喊：“汉纳曼，有你的明信片！发件地是……阿拉斯加？”的时候深感诧异。\n\n赖克走上前，从邮差那拿过信件。虽说送信的人不该多过问，但美国来信还是相当罕见的。“有亲戚住那？”邮差问道。赖克便找了个还算合理的回答：“是啊……不过好多年没见了。”\n\n赖克拿着信走向寝室。他的杰出表现换来站里一个僻静的单间。关上门后，好奇心驱使赖克打开信件。\n\n发件地是白令海边上的一个海港小城，阿拉斯加的安克雷奇市。明信片是空白的，还盖着3月24日的邮戳。这是什么意思呢？赖克回想着童年时期是如何给移居美国的同学写信而避免被审查者扣下的。对了，是隐形墨水，那些蠢蛋从不检查信上是否有这玩意。房间里恰好有个小炉子，他便转动开关打火。又黑又脏的炉子发出咔咔咔的声音，随即喷出蓝色的火焰。\n\n赖克小心翼翼地在火焰上加热信纸。果不其然，纸上写字的上浮现出文字。所有内容都显现出来后，他便笑了笑，关上炉子，坐在床上开始读信：\n\n“亲爱的赖克，\n\n感谢你的帮助。安克雷奇风景秀丽，你该抽空来看看，这儿地方大，有的是弄死尾随你的阿勃维尔特工的空处。”"
 antarctica_aag_ahnenerbe.21.a:0 "“你的朋友，赫伯特·弗雷迪。”"
 antarctica_aag_ahnenerbe.22.t:0 "武器"
 antarctica_aag_ahnenerbe.22.desc:0 "拜姆勒无法停止想起他的朋友，阿尔布雷希特·波尔。那一晚的袭击和他所作的抉择在他脑海中一遍遍回放，像一部祖国的宣传影片。他思索着他是否能做出其他选择，如果他能更敏捷，或更强壮，或更聪明。他的朋友有机会还活着吗？\n\n在他步入迈尔的办公室时，他不得不将这些思绪暂时抛出脑外。房间里除了他们二人，舒曼也在场。“将你对我说的告诉迈尔。”舒曼命令道。\n\n拜姆勒咽了咽口水，说：“呃……如你所知，先生，在遭受袭击的当晚，一些科学家被困在实验室里。敌军士兵在大厅里游荡。阿尔布雷希特·波尔和我……”拜姆勒哽咽着，“我们恰好听到党卫队士兵在谈论他们的命令。先生，似乎……他们攻击的目的不是将我们清除出去……而是为了绑架舒曼博士并窃取所有的武器方案。”\n\n迈尔靠回椅子上，松了口气。“这……比我们想象的要更糟糕。党卫队一直以来都很奸诈，但这……”\n\n舒曼低下了他的头：“我此前对你的攻击是一个错误，迈尔，而我的行动几乎要断送我的生命、我的工作、甚至是德国的未来。谁能想到那些狂热分子会对我做什么？”\n\n“党卫队是死亡的邪教，”迈尔说，“他们试图获得武器只有一种目的。”他和舒曼交换了眼神。“谢谢你，拜姆勒。你可以走了。不用我说，不要让其他人知道这件事。”在汉斯·拜姆勒即将离开时，迈尔又说道：“噢，对了，波尔怎么样了？”"
 antarctica_aag_ahnenerbe.22.a:0 "“他献出了他的生命……为了拯救我……也许为了拯救德国。”"
 antarctica_grid_event_aag.1.t:0 "出人预料的命令"
 antarctica_grid_event_aag.1.desc:0 "格拉塞尔对这个想法颇有微词，但这是迈尔的想法，是下给自己的命令，只能听令让一个地区去军事化，为其他项目腾出资源来。他不知道有什么事情比自卫还要重要，但也没有质疑命令的权力。消息发出来，拟定个计划，几天后一整队士兵就回到了基地，车上载满了装备。\n\n“格拉塞尔先生，一切都在按照计划进行吗？”鲁道夫·迈尔悄悄走到格拉塞尔边上问道，嘴里还难得地叼了根香烟。\n\n“是的，中校。”格拉塞尔略带反感地挪了挪，“但我必须要问，这么做真的合理吗？”\n\n迈尔沉思了一会，回答说：“或许是，或许不是，但说到底，我们都困在天涯海角，必须物尽其用。如果这就意味着要做出艰难的选择，那么我们就做，然后别再去想。”"
 antarctica_grid_event_aag.1.a:0 "格拉塞尔点了点头，转身离去。"
 antarctica_grid_event_aag.2.t:0 "寒钢飞翼"
 antarctica_grid_event_aag.2.desc:0 "一架孤零零的喷气机高速掠过冰封的大地，挂载的相机每隔一定时间就会拍下几张照片。雅各布临时决定要去侦察一下其他飞行员还没见过的地方，飞行路线因此无聊而漫长，路上还遇到了不得不绕开的暴风雪，毕竟他接受的众多命令之一就是尽可能地规避损伤。独自平静地飞完最后一段航程后，雅各布已经迫不及待地想要回到基地温暖的怀抱中放松一下。他举目望向夕阳，看起来自己是今晚最后一架安全返航的飞机。\n\n通讯系统中发出一阵电流声，把雅各布从迷思中拉了出来：“——近程雷达捕捉到他的信号了，长官。”扬声器中传出尖锐的声音。\n\n“很好。飞行员，听到请回答。”\n\n“收到，长官。”雅各布干巴巴地回答道，“正在返航。”\n\n“你迟到了，你本该在两小时前就回来。”上级的语调一如既往地严肃，“任务是否成功？”\n\n“任务完成。”\n\n“很好，降落后在机库见你。”\n\n雅各布叹了口气，地平线上的灯光变得越来越亮。\n\n他降落在一条静悄悄的跑道上，将侦察照片交给了长官。从那里逃开后，雅各布抻了抻腿，希望新的情报能够推进他们在这片不毛之地上的任务进度。"
 antarctica_grid_event_aag.2.a:0 "如此周折，就为了一张只画着雪和石头的地图。"
 antarctica_grid_event_aag.3.t:0 "新边疆的老军官"
 antarctica_grid_event_aag.3.desc:0 "每天，前线都会向奥托发来报告，这位老军官负责指挥边境附近的一处前沿作战基地，他被分配到了这个被遗忘的地狱，在退役之前发挥最后的余热。此时，他正在阅读一份报告，他的副手突然推开一名疲惫烦躁的秘书闯了进来，并迅速敬了个礼，气喘吁吁地报告道：“长官，我们得到消息，一支巡逻队和一伙敌军发生了小规模的冲突。”过去几周里，不断有战斗人员划归奥托的指挥，上级派他们来就是为了长期确保广阔而险象环生的边界地区的安全。\n\n奥托瞬间就把无休止的文书工作抛到脑后，问道：“我们知道那些家伙——？”\n\n“巡逻队把他们从边境上吓跑了，充分展示了德国保卫自己的能力！”雷纳一如往常，有些过于热情地感叹道，“格拉塞尔先生肯定会很高兴的。”\n\n“是的，没错，非常好，马上将消息上报格拉塞尔先生。”尽管这项工作让他烦闷头疼，但在永无尽头的职责面前，奥托依然很享受这短暂的胜利。"
 antarctica_grid_event_aag.3.a:0 "无论何时何地，都要永远为德国服务。"
 antarctica_grid_event_aag.4.t:0 "完美降落"
 antarctica_grid_event_aag.4.desc:0 "约翰操纵单座直升机缓缓降落，停机坪上显眼的红色H标记是目力所及之处唯一的人类活动迹象。南方大陆的严酷之美从未让这位飞行员感到过惊讶，而且与大多数同僚不同，他相当满足于自己的岗位。报名参加德国空军时，他并没有期待什么振奋人心的飞行还有令人惊叹的景色之类的东西，而是因为在他看来，这是避免负伤的最好军种，他当然不会抱怨。旋翼放慢，驾驶舱中的灯光逐一熄灭，他随之重重地叹了一口气，反复地攥紧又松开自己的手指，试图用几个小时前就已经散逸的热量稍微暖暖手。虽然他听说在沿海的大型基地有专门为抵御严寒而准备的车辆，但散布内陆的小型基地显然还没有这样的配备。\n\n他跳下停机坪，向基地中走去，迅速地整理了一下采集到的照片，赶到长官的办公室，将手头的所有东西都交了出去。\n\n“奥托先生，”约翰敬了个礼，把文件放在长官面前的桌子上，“您的任务要求已完成。”\n\n老普鲁士军官翻开文件夹，一边抚摸着自己精心打理的卷胡，一边浏览着其中的内容：“看起来不错，干得好，飞行员。”他挥了挥手，“解散。”\n\n约翰走出办公室，打算去喝点热东西暖暖身子。对下一次的任务和飞行，他既忐忑又兴奋。"
 antarctica_grid_event_aag.4.a:0 "直升机的轰鸣预示着我们拥有了崭新的机遇。"
 antarctica_grid_event_aag.5.t:0 "受欢迎的改变"
 antarctica_grid_event_aag.5.desc:0 "在耀眼的阳光中，一辆孤零零的小车登上了山顶，与周围的皑皑白雪形成了鲜明的对比。过了一会，又有更多的人赶了过来，往一座在鸟瞰图上看不到，坐落在山谷里的军事基地驶去。他们带来了口粮、为寒冷天气所准备的补给品、军事装备、电子仪器等等。这些补给中的大部分都无关于领土防御，当被问及此事时，军官们表示新施瓦本目前已经得到了充分的保护。\n\n目前，内卫部队所能做的也就只有观望，而那些科学家和工程师们总算有足够的资源进行他们心心念念的实验，抑或是锐意进取但效率低下的项目。而管理部门拿到了最大的一份好处，因为他们在组织和计划上被赋予了更大的灵活性。即使是普通工人或警卫，在用餐时的份量也稍微变大了一些。"
 antarctica_grid_event_aag.5.a:0 "让我们希望安保人员可以处理这些改变。"
 antarctica_grid_event_aag.6.t:0 "颠簸的公路旅行"
 antarctica_grid_event_aag.6.desc:0 "一支小小的车队在夜色掩护下行驶。他们的任务很简单：潜入敌方领土，找到最近的补给点，然后把它搬空。这些卡车上装载的木桶和板条箱充分地展示了他们的巨大成功。雷纳飞快地开着车，带着他的队伍返回前线基地。\n\n“雷纳！你他妈给老子减速！是不是想把我们全害死？！”坐在乘客位的克里斯托弗大声咆哮着，压过了轮胎撞在冰面上的声音。在五十年代那次党卫队政变失败后，他的部队就被解散了，他本人也被派到了这南陲极地。而雷纳虽说开车过于狂野，但至少技术还是无可指摘的。\n\n“闭嘴，真你妈扫兴。”雷纳喊道，“我们赶回去的时间绝对他妈的能破纪录。”不多时，他们的车接近了冰川尽头，嘎吱嘎吱地碾过砂砾。但他们撞上了障碍物，卡车不可避免地向右侧倾倒。克里斯托弗眼疾手快，将自己的体重压向司机一侧，才使卡车免遭像拖车一样翻倒的命运。\n\n当太阳升起的时候，克里斯托弗发号施令，让小队里的其他人努力抬起拖车，看看还能不能回收一些补给品，而雷纳看着他们，可怜巴巴地沉默着。当他们准备重新上路时，克里斯托弗问道：“现在知道那样做有多蠢了吧？”\n\n雷纳嘟囔着，稍微站直了一点，回答道：“是的。”\n\n“很好，那这最后一段路还是我来开车比较好。”"
 antarctica_grid_event_aag.6.a:0 "他们以更悠闲的步伐疾驰而去。"
 antarctica_grid_event_aag.7.t:0 "机密情报报告"
 antarctica_grid_event_aag.7.desc:0 "致安东·格拉塞尔，\n\n阿勃维尔驻席尔马赫站分遣队报告：\n\n不明身份巡逻队的活动加强，动机不明。\n\n照片随附。我们一致认为其正计划以“研究”为由进行赤裸裸之入侵。\n\n阿勃维尔建议：在接下来的两周中，立即将巡逻次数增加一倍，这应该能阻止他们的野心。\n\n德国万岁！"
 antarctica_grid_event_aag.7.a:0 "附：请您多给我们送些喜马拉雅金茶来，真的很提神解乏！"
 antarctica_grid_event_aag.8.t:0 "顽固的巡逻队"
 antarctica_grid_event_aag.8.desc:0 "列兵克洛普拉下他的面罩，深吸了一口南极的空气。接下来会咋样？上面那帮人说是因为强风需要绕行，可任何人都知道他其实是踏上他人财产，并在上面的草丛里撒尿，还踢人家的狗。\n\n这帮子人突袭进入领地，总在担惊受怕什么能吓他们一跳的东西。他们四平八稳的走着，对话却是神经紧张的。时间，幸好如白驹过隙。甚至在他们意识到之前，他们的领地已经在地平线上出现了。这时候，麻烦来了。\n\n乔·舒马赫第一个看见他们。地平线上的白点……敌军！乔的嘴边一冒出这句话，恐惧的士兵拔出他们的武器，为即将到来的任何情况做好准备。\n\n当舒马赫第一眼看到他们时，他看错了那些向他们走来的小生物。他们是企鹅！跳跳叫叫，对周围的世界视之于无物。一阵解脱感横扫过整个巡逻队，作为感谢这些企鹅不是人的象征，克洛普把自己配额里的金枪鱼留给了它们。巡逻队的队长开口了，全队都被吸引过来。"
 antarctica_grid_event_aag.8.a:0 "“走吧，伙计们。我相信今晚席尔马赫站是扑克之夜，我们去试试手气，咋样？”"
 antarctica_grid_event_aag.9.t:0 "实操经验"
 antarctica_grid_event_aag.9.desc:0 "埃利亚斯·施密特两眼一黑，感觉天昏地转。他能记起来的最后一件事是在和安东·格拉塞尔开会，后者还站着，然后灯突然灭了。\n\n“他醒了，同学们，快过来！”埃利亚斯在椅子上惊醒，说话声夹杂着靴子声在他的脑海里打转，冰冷的钢铁毫不留情地束缚着他的身体。他懒得发出声音，而绑住他的人也知道这一点。\n\n“起床了，雅各布……还是要我叫你祖先遗产学会党卫队分部的埃利亚斯·施密特呢？”\n\n“艹。”埃利亚斯小声咒骂了一声，结果一记耳光重重地扇到了他的脸上。施密特在火辣辣的痛楚间听到马丁继续说着他的话。\n\n“继续刚才被你无礼打断的话，这些是我带的阿勃维尔毕业班的学员。这是他们实战演习的第一年，而我要教导他们审问。我本打算用尸体授课的，不过你这个活人也不错。好了，阿尔布莱希特，你先来！拿上那边桌子的刀。”\n\n一名新人说话了：“要用刀子做什么呢，莱特纳先生？”\n\n他们开始直呼姓名了……埃利亚斯知道自己在劫难逃了。\n\n“我们就在他的胸上刻些东西吧。就写‘阿勃维尔感谢你的服务’吧，怎么样，埃利亚斯？”"
 antarctica_grid_event_aag.9.a:0 "”去你妈的。“"
 antarctica_grid_event_aag.10.t:0 ""
 antarctica_grid_event_aag.10.desc:0 ""
 antarctica_grid_event_aag.10.a:0 ""
 antarctica_grid_event_aag.11.t:0 "罪刑均衡"
 antarctica_grid_event_aag.11.desc:0 "“斯特赖克，到我的办公室来，立刻马上！”\n\n窘迫的士兵立正站好，闷闷不乐地进入了安东·格拉塞尔的办公室。他知道等待自己的只有责罚，不过这也是自己作的。安东正双手叉腰等着他作出解释。\n\n“长官，在开始之前——”\n\n扬·斯特赖克的话语戛然而止，仔细想想，又有什么可解释的呢？他只是在本该开着雪地车跑个20来回时，被人发现偷听广播剧。不过说实话，这个广播剧真他妈有意思——前往新奥勒松的石油勘探队，被一只古老的怪物一个接一个地带走，听得根本停不下来！\n\n“不管你说什么，我都不想听。看看这个。”\n\n安东拿出一份封面印着大大的机密字样的文件。斯特赖克翻了翻，敌人巡逻的频率逐渐增加，附近的补给库存比平常要少上很多。很正常嘛，但这与我何干？安东是个看脸读心的高手，他直接回答了斯特赖克的疑问。\n\n“我几周前就想提高巡逻队的巡逻频率了，但苦于找不到合适的方法在推行的同时不让人们去找迈尔抱怨。不过现在……”\n\n安东竟然没有罚他去做那被称之为“格拉塞尔的假期”的无闲暇打扫一个月厕所的惩罚，而是给他说了这事，那他一定是真遇上麻烦了。扬没有反对，而是敬了个礼。\n\n“遵命，长官！”"
 antarctica_grid_event_aag.11.a:0 "“很好，我就是要听到这一声，现在快滚吧。”"
 antarctica_grid_event_aag.12.t:0 ""
 antarctica_grid_event_aag.12.desc:0 ""
 antarctica_grid_event_aag.12.a:0 ""
 antarctica_grid_event_aag.13.t:0 "克劳斯的最终测绘"
 antarctica_grid_event_aag.13.desc:0 "周围数里只有绵延不绝的风吹雪原……他们想让我在这里测绘？克劳斯边用望远镜观察着边在心里想着。我可是中非最好的测绘员，多年来对穆勒一直忠心耿耿，我都马上要退休了，他却用这来回报我？南极的最后一次工作？草啊，西格弗里德还真是有幽默感。\n\n完成笔记后，克劳斯知道这片土地非常适合开发。当然，之后发生什么他就不管了。他现在更急着拿到支票打道回府。\n\n进入雪地车后，温暖的感觉立马包覆了克劳斯。这种感觉就像身处黑尔戈兰一样——那是北海上的一座小岛，那里有他的家人、有友好的社区、还有无尽的海滩。似乎跟着穆勒也不全是坏事，工资常常配不上他的付出，此时克劳斯就乐于接受公司的股份。分红可以轻易满足他的支出，还有盈余去做别的事。\n\n几小时后，在一架飞往西南非的货机上，克劳斯最后一次向这片黑暗大陆道了别。"
 antarctica_grid_event_aag.13.a:0 "你就下地狱去吧！老子回黑尔戈兰了。"
 antarctica_grid_event_aag.14.t:0 "下注的时机"
 antarctica_grid_event_aag.14.desc:0 "“嗨呀，克劳泽，你一整晚都在输，赶快弃牌吧。”\n\n“还没呢，赫比。明天你得去出外勤巡逻，是吧？”\n\n“是啊，我可一点儿都不想去。希望上天保佑，别碰上闲的没事儿到处乱转的扬基佬。”\n\n克劳泽笑了一声，说道：“要是你明天可以不用去巡逻呢？”\n\n赫伯特笑眯眯地对牌桌对面的空军飞行员挑了挑眉毛，回答道：“啊，所以你是想打白条了。听起来算公平，我明早就不用那么早起床了。来，看看你手上有啥牌。”\n\n飞行员自信满满地在面前的木箱子上甩出了一副A。\n\n“三张Ace！好好看看，哭去吧！”\n\n赫伯特发出一声轻笑，克劳泽的豪言壮语立刻因此发生了动摇：“希望你喜欢早起，那冷的啊，能把你的蛋都冻掉。我手上有一副同花顺。”\n\n这名头发灰白的老国防军甩出了一张9、一张10，然后紧跟着JQK——看来，弗赖塔格先生明天能睡个懒觉了。"
 antarctica_grid_event_aag.14.a:0 "“所以不管怎么说，我在这儿就是做这些，格拉塞尔中校。”"
 antarctica_grid_event_aag.15.t:0 "克制的艺术"
 antarctica_grid_event_aag.15.desc:0 "恩斯特·赫尔曼坐在办公桌上，穿戴整齐，衣冠革履，头发向后梳着，手里还夹着一支香烟，面对一小群外交官。他开口说道：\n\n“好了，女士们先生们，我们今天收到了一个任务，顶重要的任务。如果成功，那就意味着士兵们就可以刀枪入库，马放南山了。”\n\n外交团认真地听着。\n\n“好吧，我知道你们是新来的，所以可能在想我为什么要把你们召集到一起。这是因为在派出外交官之前，都要请大家喝上一杯维亚特卡伏特加，这是部里的传统。现在到这儿来！”\n\n恩斯特把杯子从办公桌抽屉里一个接一个地拿出来，给每个都倒上了一杯伏特加。此时，一名新人开口问道：\n\n“您有什么好建议吗，赫尔曼先生？”\n\n这个问题让恩斯特思考了一会儿，然后，他想出了一句完美的格言。虽说这句话是从一个美国政客那儿学到的，而且那个政客还是个肮脏的犹太人，但这句话还是十分应景。他高高举起酒杯，说道："
 antarctica_grid_event_aag.15.a:0 "“敬外交，敬克制的艺术！”"
 antarctica_grid_event_aag.16.t:0 ""
 antarctica_grid_event_aag.16.desc:0 ""
 antarctica_grid_event_aag.16.a:0 ""
