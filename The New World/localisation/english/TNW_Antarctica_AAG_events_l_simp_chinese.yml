 antarctica_grid_event_aag.21.t:0 "虚空的呼唤"
 antarctica_grid_event_aag.21.desc:0 "“维尔纳……你觉得那是什么？”\n\n“那叫冰川瓯穴，弗兰克。”\n\n“啥？”\n\n“就是个冰漏斗，流淌在冰川顶部的水，碰到了一个薄弱点，流进了缝隙中。听说能让人着迷。”\n\n两人盯着面前流动的水，淡蓝色的冰川水飞速流入洞中。似催眠，似幻术，此刻其他一切都无关紧要了。整个世界只剩下了自己，面前的水流看起来如此温暖……诱人。\n\n流放者招呼他向前。\n\n弗兰克靠近面前伸展开来的光亮河流。维尔纳在他滑倒跌下去之前抓住了他的衣角。\n\n“弗兰克！你他妈着魔了吗！再不赶紧出发，就会被大部队落下了。”\n\n几小时后，里彻站内，弗兰克和一群来自其他哨站的士兵围在一起，脑海里依旧回想着先前遇到的瓯穴。"
 antarctica_grid_event_aag.21.a:0 "事实上，他永远也不会忘记的。"
 antarctica_grid_event_aag.22.t:0 ""
 antarctica_grid_event_aag.22.desc:0 ""
 antarctica_grid_event_aag.22.a:0 ""
 antarctica_grid_event_aag.23.t:0 "阴谋"
 antarctica_grid_event_aag.23.desc:0 "卢卡斯·拜尔猛地打开了阿米尼乌斯站仓库的转门。他满怀欣喜地准备迎接满载物资的一堆堆箱子，但他却看到了自己的同事卡尔·凯利，叼着根烟，正在整理贴着几张相片的木板。\n\n“你他妈在干什么，卡尔？你不是要把物资从紧急补给中拿出来的吗！”\n\n卡尔瞪大眼睛看向卢卡斯，双手在空中乱挥。“本来应该如此的，但我却发现了牵扯到上层的惊天阴谋！面包块！面包块！每一个箱子里都是面包块！”他拿起一个箱子，狠狠地晃动，“这他妈的一整箱全都是面包块。”\n\n卡尔深深抽了口烟，吐出有烟囱那么大的烟雾，然后继续说道：“所以我就在想，我得去找鲁道夫，把一箱面包块亲自放在他手上！我会去鲁迪的办公室，敲他的门，然后喊‘鲁道~~夫，鲁道~~夫，我想和你说说面包块的事。’”\n\n卢卡斯想要打断卡尔，但他的演说激情似火，停不下来。“然后呢？我发现办公室里根本他妈的一张桌子都没有，整个阿米尼乌斯站根本没有鲁道夫这号人！卢卡斯，鲁道夫·迈尔根本就不存在，我们一直都跟在一个幽灵屁股后面，它把我们的紧急物资偷换成了面包块！”\n\n卢卡斯叹了口气，揉了揉太阳穴。“这些箱子上都写了C-口粮了，而且鲁道夫·迈尔确实存在，他就在席尔马赫站里！快给我让开，你都错过隔离训练了。”"
 antarctica_grid_event_aag.23.a:0 "新施瓦本永远阳光明媚。"
