 antarctica_aag_testing.262.t: "快乐的失败"
 antarctica_aag_testing.262.desc: "约翰·克劳泽中尉和他的副驾驶威廉·贝克尔少尉盯着他们面前的餐桌：刚刚捕获的鱼、新鲜出炉的奶油烤面包、堆积如山的土豆和蔬菜，但两位飞行员的目光都盯着桌子中间的四瓶红葡萄酒；在场的每个人都有一瓶。\n\n“虽然科学家们在229实验的过冬计划上可能没有取得任何进展，但你们两个在为祖国服务方面做得非常出色，”他们的上司鲁道夫·迈尔说道，“我已经把你们两个列入了官方表彰名单，但我们都知道官僚机构的车轮在国内转得有多慢，所以就当是提前庆祝吧。”他向桌子上做了个手势。\n\n过了一会儿，里夏德·席尔马赫进入房间，他也被这股热情的液体迷住了。“哦，别介意。”他立即大步走到酒瓶旁，打开瓶塞，给自己倒了满满一杯，“为快乐的失败干杯。”他举起酒杯，迈尔打开自己的酒瓶，咧嘴笑了。"
 antarctica_aag_testing.262.a: "“在我们到更暖和的地方前，开怀畅饮吧。”迈尔说。"
 antarctica_aag_testing.262.a.tt: "§F这项研究工作没有收获。未来的补给可能会稍微§R稀少一些§!。\n\n来自§Y$AAG_Aircraft_Testing_Site$§!的政治点数修正§R-10%§!。§! "
 antarctica_aag_testing.263.t: "一语双关"
 antarctica_aag_testing.263.desc: "格拉塞尔和舒曼挤在席尔马赫站一个储藏间里昏暗的灯光下。舒曼拆开一封自他的靠山，国家元帅戈林那里收到的信。从字面上看，信中满是戈林本人对229实验圆满结束的庆贺之词。可奇怪的是，这封信还问起了舒曼的家长里短，比如他的个人健康和家庭——这根本不是戈林的风格。舒曼知道这封信远不止看起来那样简单，于是找来格拉塞尔帮忙解密。格拉塞尔用戈林给他的特殊密码与信上的文字一一对照，很快发现了其中暗藏的玄机。\n\n“德国……抱恙……搬家……准备好……229会大有帮助。”\n\n格拉塞尔赶紧把信撕成两半，转身对舒曼说：“嗯，就是这个意思，”他说，“戈林元帅打算采取行动了。”\n\n舒曼点点头：“那我们也得做好相应的准备，在时机成熟时出一份力。至于现在，先跟我们的支持者谈谈吧。看看哪些人站我们，哪些站迈尔。等到行动的时候，我们必须万无一失。”"
 antarctica_aag_testing.263.a: "“别担心，”格拉塞尔说，“肯定会的。”"
