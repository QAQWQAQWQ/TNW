 antarctica_grid_event_aag.18.t:0 "死者的消息"
 antarctica_grid_event_aag.18.desc:0 "舒曼走到特工们面前，整理了一下自己的仪容：他又在这片悲惨的冰封大陆上度过了一段时光，见不到家人，也无力护卫祖国。尽管南极洲的边疆并非一无是处，但这里却依旧是死地，一股奇异的苦涩不由泛上舒曼的心头。他走进机库，向部下敬了个礼：他们今天伪造了阿勃维尔的文件，并且贿赂了一名军官，搞到了一艘小补给船。\n\n“先生们，祝好运。胜利万岁。”小队回过身来敬礼，持续六个月的极夜即将降临，大风愈加猛烈，他们开始向雪白的荒漠深处进发。舒曼心想，对南极的统治又迈进了一步。\n\n小队登上了静静地停泊在海面上的补给船，出发前去会合点，小队里只有四个人没有很快就陷入梦境。时近午夜，潜艇指挥塔跃出海浪，很快浮上水面，将绳梯抛向他们的方向。他们爬上绳梯，钻进潜艇，随后舱门紧紧关上，潜艇再次没入水底，向麦克默多站驶去。特工们将混入那里的队伍，担任重要的后勤和工程岗位。\n\n“很快，我们就能知道他们的一举一动，搬运的箱子、每餐的食谱，我们将对他们的一呼一吸都了如指掌。情报的触手将深入毫无察觉的敌人内部，为我们获取全新的优势。毕竟，情报为王。”\n\n在他舒适的办公室里，舒曼记下了这段话。当然，绝大多数都是在战地报告的空白处写下的纯粹推测而已。"
 antarctica_grid_event_aag.18.a:0 "舒曼的确是个核物理学家，但为了德国，他可以担任任何需要的角色，哪怕是在大地的尽头监视敌人。"
 antarctica_grid_event_aag.19.t:0 "暑期学校"
 antarctica_grid_event_aag.19.desc:0 "在没有预定飞行的日子里，机库通常都空空荡荡，但今天不同，这里显得相当热闹。十个阿勃维尔新人、一名资深老练的外勤特工，正在准备开始漫长的训练日。马丁·莱特纳已经见识过全世界了，从桑德贝到塞萨洛尼基、从圣保罗到索韦托、从鄂木斯克到大阪，现在，他终于踏上了最后一块他未曾涉足的大陆：南极洲。然而他来这里并不是要做谍报工作，而是要培训毕业班的学员。\n\n“首先，欢迎你们来到新施瓦本；其次，趴下，给我做二十……啊，不……五十个俯卧撑。”\n\n新人们俯身趴在了冰冷的机库地上。当他们在努力上下耸动时，马丁开始在队伍中踱步巡视。他一边开口说话，一边欣赏着停机坪上的金属巨兽，德国的科学结晶真是赏心悦目。\n\n“我当初也是和九个像你们这样的新兵一起毕业的。结果呢，十个人里七个死了，两个在牢里，他们俩一个是宪兵队，另一个是CIA。只剩下了一个，当然，就是站在这里的我。现在你们可能会问，为什么我能在这里对着你们发号施令，但我的同学却都要么已经牺牲、要么生不如死？”\n\n马丁等待着一个聪明人开口，但令他惊讶的是，新兵们都保持着沉默。真是群聪明的小伙子，他们的结局可能会比自己的伙伴们更好，奇怪的寂静弥漫在空气中，机库外的景色让人目不暇接。马丁感到一阵内疚，他的话语回荡在机库中，打破了沉默。\n\n“这是因为，我遵循了我接受的训练。你们可能会问，‘真的是这样吗？’答案是肯定的。在接下来的三个月里，我教给你们的一切都将会拯救你的生命。如果你在执行任务时遇到了麻烦，幻想着祖国会在这时候拉你一把，不，不会的；同样，跟踪你的CIA特工也知道，华盛顿也不会救他。这一刻，不是你死就是我亡。你可能会想到他的家人、他的孩子、他的母亲，但好吧，他知道其中的风险，你也明白。我的朋友们都犹豫了，可我没有。”\n\n马丁的讲话结束了，真正的训练将要开始，莱特纳向正在做剩下三十个俯卧撑的士兵们留下了一道命令："
 antarctica_grid_event_aag.19.a:0 "“俯卧撑做完之后，到教室集合。该上第一节课了。”"
