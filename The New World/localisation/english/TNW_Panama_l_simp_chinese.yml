 PAN_Jose_Remon_Cantera: "何塞·安东尼奥·雷蒙·坎特拉"
 PAN_Jose_Remon_Cantera_desc: "华盛顿最初分割巴拿马地峡时，选择不像对待波多黎各那样实施殖民统治，而是维持可控的混乱状态。然而巴拿马政局与运河利益最终催生了何塞·安东尼奥·雷蒙·坎特拉——美国在巴拿马的警察。\n\n雷蒙在进入巴拿马内卫部队前默默无闻。他加入时正值该机构最低谷时期，大萧条使其元气大伤。在美国担忧轴心国渗透的背景下，巴拿马人首次被允许执掌国家警察。雷蒙因是唯一拥有军校学习经历的候选人而获任命。\n\n掌权后，他按照个人意志重塑巴拿马民主，通过操纵选举和政变推翻总统来满足自身及美国利益。当阿里亚斯总统试图限制警察影响力时，雷蒙再次发动政变，而后意识到仅靠幕后操纵已不足够，遂决定亲自出任总统。\n\n此后他修改宪法实现连任，并在1955年躲过暗杀。自他下令处决涉嫌参与暗杀的副总统何塞·拉蒙·吉萨多后，再无人敢挑战其权威。在反对声浪降至历史最低点时，雷蒙推行着不触怒美国与寡头集团的进步主义与民族主义改革，掌握着绝对权力。\n\n只要美国持续支持，除非发生重大变故，雷蒙将带领巴拿马走过下一个十年。"
 king_maker_remon: "造王者"
 PAN_Divided_at_the_Isthmus: "地峡隔阂"
 PAN_Divided_at_the_Isthmus_desc: "一道伤疤横亘于巴拿马的躯体之上。自美国立志完成其他帝国未竟的事业以来，这条人工运河便将整个国家撕裂为两半。外国货船每日从此处穿行，华盛顿的视线紧盯这条全球贸易的咽喉要道。巴拿马运河区及其“区民”——巴拿马人如是蔑称——既是巴拿马主权与自给自足道路上的绊脚石，也是美国全球霸权体系的活体象征。\n\n诚然，运河带来的财富难以估量，但其中大部分最终流进了寡头阶层的口袋。1904年开凿的这道“伤疤”，使巴拿马的生活水平远超其中美洲邻国，更在共荣圈的贸易涌入中迎来经济腾飞。然而，仍有人渴望着比财富更珍贵的东西：独立自主。"
 PAN_Two_Flags_One_Nation: "一国两旗"
 PAN_Two_Flags_One_Nation_desc: "在巴拿马运河区的每根旗杆顶端，星条旗都高高飘扬。如果足够幸运的话，巴拿马国旗才能悬挂在下方——甚至有时根本不会被升起。对许多巴拿马人而言，这只是更大问题的缩影：美国佬对巴拿马的剥削。\n\n以“巴拿马主义”（宣扬巴拿马属于巴拿马人）为旗帜的民族主义浪潮正在兴起，1959年反美骚乱正是其旺盛势头的证明，当时试图在运河区升起国旗的巴拿马人遭到美军的暴力镇压，导致对美国财产的肆意破坏。当前的升旗的规则正是在此之后建立达成的妥协，这种令人不满的安排只会成为进一步激发民族主义情绪的集结号。"
 PAN_Half_measures_and_handshakes: "半吊子措施与表面和解"
 PAN_Half_measures_and_handshakes_desc: "“我们不要慷慨施舍，只要公正裁决。”\n\n雷蒙当选后首度发表此言，三年后《雷蒙-艾森豪威尔条约》签署——这是目前规范巴拿马运河运营的法律文件。条约显著体现美国对巴拿马政府作出多项让步：包括归还部分领土、改善运河工人待遇与贸易商权益，以及增加向巴拿马支付的运河使用费。\n\n然而，尽管这份条约被视为雷蒙执政时期的高光成就，许多人仍认为其未兑现公正承诺。以阿努尔福·阿里亚斯为首的民族主义异议者猛烈抨击雷蒙仍在向美国霸权屈膝，认为该条约实质上承认了地峡分裂的合法性。持此观点者绝非少数，这也意味着运河问题必将被迫重新提上议程。"
 PAN_Coroneles_and_Criollos: "军头与权贵"
 PAN_Coroneles_and_Criollos_desc: "在巴拿马错综复杂的利益集团版图中，主导权力架构的两大势力是军方与寡头集团。雷蒙的独裁者地位，最直白地体现了国民警卫队的至高权力。但仅凭专制手段无法长久维系统治，因此，当军方挥舞大棒时，寡头集团则手持胡萝卜。\n\n以白人为主的寡头集团在雷蒙进步倾向的推动下，向民众施以勉强安抚社会的福利政策。双方对这种共生关系皆怀敌意，但出于自保本能，其领导者深知任何一方失势都将触发革命，故仍默契维系着这种互利模式。"
 PAN_policemen_of_nations: "诸国的警察"
 PAN_policemen_of_nations_desc: "政权必须抱团取暖。即便雷蒙对特鲁希略分子之流的暴行深恶痛绝，他也深知仅靠美国庇护远远不够。正因如此，知情者对巴拿马与尼加拉瓜索摩查政权培养关系毫不意外，雷蒙逐渐将这一独裁政权视为自身统治的效仿模板。\n\n此后，两国合力镇压一切威胁统治的异议。跨境引渡政治犯已成常态：任何不幸靠近哥斯达黎加边境的异见者皆遭逮捕，遣返后将面临血腥结局。情报机构共享信息，常规内卫部队联合演习，协力替美国维持其“后院”秩序。"