 POLITICS_Yasser_Arafat_DESC:0 "亚西尔·阿拉法特，在短短几十年内，这个男人从藉藉无名走向声名显赫，并成为了新生巴勒斯坦的象征。他成长在埃及一户贫寒的巴勒斯坦人家，年纪轻轻便迅速成长为意属黎凡特乃至整个阿拉伯政坛的主角。随着巴勒斯坦独立运动兴起，他参与创建法塔赫组织，这个诞生于巴勒斯坦民主派青年与戒惧的意大利殖民当局微妙妥协的产物，自此成为自由斗争的前沿旗帜。\n\n法塔赫的壮大意外获得外约旦埃米尔侯赛因的支持。与此同时，阿拉法特确立运动领袖地位，成为意大利在阿拉伯阵营的主要对话者——既因其是少数愿与意大利谈判的显要人物，亦可制衡令殖民者头疼的激进组织。对土耳其战争胜利后，意属黎凡特殖民体系瓦解，巴勒斯坦共和国终获独立，阿拉法特被推举为国家领袖。\n\n虽声望日隆，威胁却接踵而至。左右翼阿拉伯激进势力痛斥法塔赫背叛阿拉伯民族主义，容许以色列立国；前埃米尔侯赛因的支持者憎恶其大力推行的改革政策。阿拉法特赢得了战役，但战争远未终结——此刻，黎凡特和平的希望，正系于一人之肩。"
