 FTF_idea_murtalas_realm: "穆尔塔拉之国"
 FTF_idea_murtalas_realm_desc: "有位索科托青年军官，五十年代时，他眼见喀麦隆人的劫掠使他的民族颠沛流离；之后，他又目睹索科托政府治下他们的境遇。他决意反叛，富塔马西纳因此得以存在。这位军官名为穆尔塔拉·穆罕默德，出身于一个富尔贝统治阶层；靠着自己的身份，他迅速在大漠中建立了国家。正是在这里，富塔马西纳诞生了，自由来临了。"
 FTF_idea_nascent_nationalism: "新生的民族主义"
 FTF_idea_nascent_nationalism_desc: "富塔马西纳的意愿就是穆尔塔拉的意愿，而穆尔塔拉别无所求：他只愿他的人民能自由地选择自己的命运。而在非洲，民族主义的思想仍处幼年，更不可能在现实中一日建成。\n\n纵有这些困难，穆尔塔拉仍专注于构建马西纳人身份，他希望这些努力能尽快把这一身份变得正当合理，让马西纳人足以成为一个完整而成熟的民族。"