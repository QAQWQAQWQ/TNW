 ita_Cassa_per_il_Mezzogiorno_desc:0 "南意大利一直是一片荒凉的土地，除了零星的港口和大片大片的农场外几乎一无所有。在十九世纪早期，北方的三角洲因工业发展而显出勃勃生机、万物竞发的景象，而南方地区还是几个世纪前的老样子。但现在，一切都会改变。意大利想要团结，就得在方方面面做到团结，包括经济方面。南部开发计划会让工业革命的成果在南方遍地开花，造福整个半岛。\n\n总项目数: [?ITA_Cassa_per_il_Mezzogiorno_Available]\n\n正在进行的项目数: [?ITA_Industry_in_use]\n\n可用项目数: [?Industy_Checker_ITA]\n\n"
