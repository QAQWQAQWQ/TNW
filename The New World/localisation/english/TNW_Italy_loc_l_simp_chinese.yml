 ita_AGIP_surge_in_profit:0 "§G这将大福提高阿吉普公司的利润！§!"
 ita_o_bianco_fiore1:0 "白花联盟"
 ita_o_bianco_fiore1_desc:0 "It has taken much hard work, toil, and sweat, but Democrazia Cristiana is now a unified, strong party! Parliament is behind us, as is the cabinet, and the Italian people have given us their mandate...It has been a long road to get here, but now we can deliver the reforms that we promised to the Italian people!"
 ita_vague_sweeping_economic_change:0 "Vague Ideas"
 ita_vague_sweeping_economic_change_desc:0 "More than anything, it is the idea of what we do that people latch on to. Even if the work is less than savory, the idea that we seek to accomplish allows us to push past said unsavory work. This allows us to push more vague ideas forward, so that even if what is needed to accomplish our goals seems unreasonable, our ideas will allow us to see it through."
 ita_vague_sweeping_economic_change2:0 "Vague Ideas"
 ita_vague_sweeping_economic_change2_desc:0 "More than anything, it is the idea of what we do that people latch on to. Even if the work is less than savory, the idea that we seek to accomplish allows us to push past said unsavory work. This allows us to push more vague ideas forward, so that even if what is needed to accomplish our goals seems unreasonable, our ideas will allow us to see it through."
 ita_promises:0 "我们的承诺"
 ita_promises_desc:0 "We have made a great many promises to the Italian people. Whilst these promises are intentionally vague, they are promises nonetheless. However, words speak louder than actions! Our promises calm and inspire the people, with our honeyed words reassuring them that with us, everything is going to be alright."
 ita_high_worker_spirits:0 "工人热情高涨"
 ita_high_worker_spirits_desc:0 "Our work has improved the country to a magnificent degree. The economy is doing well, civic participation has blossomed, and the workers support our cause! Yes, our plentiful policies have been a great boon to the Italian worker. They march to work in high spirits, and with great optimism about their future. And as they say, a happy worker is a productive worker!"
 ita_CSIL_aid:0 "意大利工会联合会援助"
 ita_CSIL_aid_desc:0 "我们正隐秘行动以支持意大利工会联合会。该工会的劳工理念与我们高度契合，确保其保持重要影响力是我们的优先事项。我们已明确表示愿在谈判中给予其优待，此举促使该工会规模迅速扩张——这种壮大往往以牺牲国内其他工会为代价，进一步巩固了意大利工会联合会的主导地位。"
 ita_IRI_control:0 "IRI控制"
 ita_IRI_control_desc:0 "工业复兴公司是意大利经济的基石，几乎每家企业都依赖于它。其庞大的规模使其能够在经济的各个层面运作，并对意大利大部分的采矿、制造和农业产业拥有重大影响力。但现在工业复兴公司的大部分关键职位都被安排上了政府亲信，这个企业集团已被牢牢掌控。从今以后，它将不再为腐败官僚的利益服务，而是完全为国家的需求而运作。"
 ita_rocking_the_white_whale:0 "白鲸"
 ita_rocking_the_white_whale_desc:0 ""
 ita_long_term:0 "长期努力"
 ita_long_term_desc:0 ""
 ita_parliament_power:0 "议会权力"
 ita_parliament_power_desc:0 "In the end, what allows us to lead Italy is our parliamentary power. Without it, our government would be left lame and forced into fresh elections. To this end, we must ensure that our parliamentary power and ability to whip the representatives into line is always strong. Such a strength must be maintained in modern Italian politics."
 ita_government_unity:0 "政府团结"
 ita_government_unity_desc:0 "As the Americans once said, \"A house divided cannot stand\". Such a principle applies to a government just as well as it does to a state. If our government lacks unity, it is certain that it will not be able to function. Vice versa, if our government has a high level of unity, it will most certainly function at an incredible level! Such a high level of unity is desired by all in the DC, from the average voter to Aldo Moro himself."
 ita_focus_will_be_known_soon_fuck_you_tt:0 "§B这一国策§!的§G效果§!§B将根据我们迄今所做的§!§Y选择§!§B而变化。§!\n"
 ita_a_victory_for_democrazia_cristiana:0 "基民党之胜"
 ita_a_victory_for_democrazia_cristiana_desc:0 "今日，意大利迎来了一个划时代的时刻，基督教民主党在意大利摆脱法西斯主义后的首次选举中大获全胜！\n\n诚然，选举胜利只是万里长征的第一步，接下来的治国之路才是任重道远。现在，摆在面前的任务是治理一个浸淫在法西斯主义中数十年的国家。基督教民主党这个包容多方的大联盟，内部派系林立，既有锐意进取的改革派，也有坚守传统的保守派，他们将如何在选举胜利后共谋国是，尚需拭目以待……"
 ita_the_domus_mariae:0 "多莫斯玛利亚代表大会"
 ita_the_domus_mariae_desc:0 "Democrazia Cristiana has won Italy's first election since the end of fascism! Of course, now that the post-victory euphoria has subsided, the party must get to work and actually govern. Though naturally, the different factions in the party have varying ideas of what this governing should entail...\n\nWith this in mind, incoming prime minister Aldo Moro has called for the party to have a congress in Rome, to determine the new government's path forward. Will Moro bow to the conservative faction for the sake of electability? Or will he push for a more radical programme like the reformists desire, even if that jeopardizes the government's prospects for the next election? Rome wasn't built in a day, after all."
 ita_the_domus_mariae_tt:0 "我们将决定基民党的未来。"
 ita_walk_the_tightrope:0 "走钢丝"
 ita_walk_the_tightrope_desc:0 "In the aftermath of the Domus Mariae Congress, it appears that Aldo Moro is prepared to hear out the conservative faction of the party. Prominent voices on this wing of the party include Mariano Rumor and Emilio Colombo of the liberal conservative Dorotei faction, as well as Giulio Andreotti of the more right-wing conservative Primavera faction.\n\nWhilst Moro is yet to decide on the next course of action, it appears that he wants to make an effort to unite his party first and foremost. A house divided cannot stand, as they say. Though the path he pursues may depend on what exactly is asked of him by the conservatives..."
 ita_cerchiobottismo:0 "圆滑世故"
 ita_cerchiobottismo_desc:0 "要执掌权柄，阿尔多·莫罗必须两面周旋！在基督教民主党这般庞大而分裂的政党中，莫罗整合派系的任务异常艰巨。听取党内保守派意见后，他暂时采取了骑墙观望的机会主义策略。此举虽维系了表面团结，却注定难以长久。\n\n如今莫罗必须为前路作出抉择。重心应落何处？是专注于凝聚基民党内部，打造更强大高效的政党——即便危及未来连任？抑或与议会小党达成交易？后者虽能稳固执政地位，却难免因小党索求让步而扭曲施政纲领……"
 ita_the_biggest_tent:0 "最大的帐篷"
 ita_the_biggest_tent_desc:0 "After careful deliberation, prime minister Aldo Moro has decided the best path forward for Democrazia Cristina, already a 'big tent' party, is to expand the 'tent' to include the myriad of smaller parties in parliament.\n\nOf course, these parties will not back the government for nothing. They will expect some concessions in return, whether these are specific policies they want implemented, cabinet positions, or any combination of the two. It will undoubtedly be less effective than if DC were able to govern without a coalition. But by attracting voters from across the political arena to DC, the party will assuredly bolster its chances of re-election and continuing its agenda for another term."
 ita_sway_the_PDIUM:0 "Sway the PDIUM"
 ita_sway_the_PDIUM_desc:0 "Now comes the task of bringing the smaller parties on board. One of such parties that must be brought into the fold is the PDIUM, a small party of a monarchist and national conservative bent.\n\nThankfully, they are small enough that we can bring them into our coalition without too many concessions. They will likely be satisfied with a few minor cabinet positions, as well as reassurances from our government that we shall keep our distance from the more radical elements of the Fronte Democratico, such as the Italian Socialist Party. Should we be willing to accommodate them on this, it is likely they shall lend us their support."
 ita_republicans_and_socialdemocrats:0 "共和党人和社会民主党人"
 ita_republicans_and_socialdemocrats_desc:0 "当下任务是拉拢小党派，比如意大利共和党和意大利社会民主党。前者坚信自由民主，而后者坚信社会民主。\n\n我们只要做少许让步，即可将两党纳入我们的联盟。共和党似乎只需几个次要内阁席位即可满足，而社会民主党可能会要求我们承诺投资一些政府福利项目，这可能就棘手得多，但也没有超出我们的能力范围。假如我们能顺势而为，那两党都会支持我们。"
 ita_brevi_cenni_sull_universo:0 "宏图纲要"
 ita_brevi_cenni_sull_universo_desc:0 "众所周知，普通选民根本不愿深究政策提案的细枝末节。他们只想知道：A) 我们想做什么；B) 这会如何惠及他们。至于细节？见鬼去吧！\n\n因而我们的立法纲领须刻意保持简练模糊，满载着眼全局的宏伟构想与承诺。务必使方案能吸引尽可能多的选民阶层，但对实现路径的具体细节则要惜墨如金。过程无关紧要，结果才是一切！"
 ita_a_true_unity_government:0 "真正团结的政府"
 ita_a_true_unity_government_desc:0 "经过与议会各小党派的纵横捭阖，阿尔多·莫罗终成大业！谈判中虽对小党派作出象征性让步（如次要内阁职位与政策提案），但于大局无碍。\n\n关键在于此举赋予政府合法性与选举优势！此联合政府的精妙之处在于，即便实权尽归基督教民主党，仍能营造出表面光鲜的全民团结政府形象！"
 ita_the_party_of_catholics:0 "天主教徒之党"
 ita_the_party_of_catholics_desc:0 "After careful deliberation, Prime Minister Moro has decided that the best path forward for Democrazia Cristiana is to strengthen the party and unify it from within. As they say, a house divided on itself cannot stand.\n\nTherefore, the best path forward for DC is for Moro to bring the various factions within the party to heel, allowing the party to effectively govern. By strengthening the party, we will be able to more effectively legislate and implement our government's programme, without having to make outright concessions to or coalitions with other parties. We are the party of all Italians!"
 ita_wrangle_the_dorotei:0 "巧取多罗泰"
 ita_wrangle_the_dorotei_desc:0 "Our party has many facets and currents, each with their own ideas on how the DC should rule Italy, and all of them need to remain loyal to both the party and the government: while all currents share most of their program, some points or proposed reforms may be different, or even radically incompatible.\n\nThe Dorotei are one of the largest and most influential currents, known for their connections with the Church and Confindustria - the largest industrial association - and, while we may disapprove of their - sometimes excessive - conservatism, we also know that some concessions need to be made, for the good of Italy.\n\nAs a show of good will towards the Dorotei, the party will officially endorse some of their proposed reforms, and the most important adherents to the current will be appointed as ministerial advisors and secretaries, to ensure their loyalty to the government: if we fall, they will follow us to the end."
 ita_contain_the_primavera:0 "遏制新春派"
 ita_contain_the_primavera_desc:0 "尽管或能争取多罗泰派支持，但更保守的新春派定会拒绝任何提议：他们妄图主导政府旋律，然基民党早有指挥，历经独裁时期的牺牲后，岂会拱手相让！\n\n乐手就位，交响乐团已彩排完毕：党媒蓄势待发，即将掀起涉及新春派高层的丑闻海啸——夹杂捕风捉影的传闻与可疑往来。当对手深陷风暴时，我方使节将公开痛斥其对基民党声誉的玷污，同时暗中建议教会与实业家及时改换门庭……\n\n时机已至，大师：一声令下，我们将奏响变奏曲，毕竟季节轮转早该到来。"
 ita_sway_away_the_ACLI:0 "拉拢基督教劳工协会"
 ita_sway_away_the_ACLI_desc:0 "The ACLI (Associazioni Cristiane Lavoratori Italiani) are the more progressive wing of the DC, acting as a bridge between the party and the worker unions and working to keep the latter out of the grasp of more radical leftist ideologies.\n\nWith their political program mostly in line with the government's, it won't be hard to persuade them into officially throwing their lot with us: after all, now that democracy has finally become reality in our country, all should realise how important it is that the first democratic legislature of the Empire doesn't fall into petty squabbling, lest the people start thinking that, after all, fascism was better..."
 ita_o_bianco_fiore:0 "白花联盟！"
 ita_o_bianco_fiore_desc:0 "It took time and effort, but finally the party stands fully behind the government: within both the cabinet and the parliament, everyone is working hard to ensure that the reforms we promised to Italy, to the King, to the people, can see the light of day. Like a beautiful and pure white flower, our rule shall bloom and bring prosperity to the poor and the weak, to those who are alone, and to those who are lost in the multitude.\n\nO bianco fiore, simbol d'amore,\n\ncon te la gloria della vittoria.\n\nO bianco fiore, simbol d'amore,\n\ncon te la pace che sospira il cor!\n\nCon te la pace che sospira il cor!"
 ita_keep_it_vague:0 "含糊其辞"
 ita_keep_it_vague_desc:0 "To the victor, the spoils! Or this is how it should be, if there were any to begin with...In truth, the financial situation of the Empire is far from good: to be fair, it's a miracle how Ciano even managed to make ends meet! The Ministry of the Economy and Finances is a warzone, with each Ministry trying to get one more lira for their promised reforms and subsidies: if this news is revealed, the government will fall, and perhaps democracy with it.\n\nThe Prime Minister has ordered utmost secrecy and caution: while the financial department works, we must distract the public by giving them detailed reports on other fields of progress for our young democracy and, more importantly, reminding them that our direct northern neighbour is a fine example of what happens when things fall apart."
 ita_short_term_solutions:0 "短期方案"
 ita_short_term_solutions_desc:0 "After weeks of guerrilla-like warfare in the Ministry of the Economy and Finances, the finance department has finally drafted up a proposed budget which should keep both the government and the country afloat: the bureaucracy, riddled with the inefficiency and waste so dear to the fascist regime, will be overhauled, removing entrenched - and sometimes actively disloyal - departments and ensuring that the apparatus of the State works with the government, and not against it.\n\nCoincidentially, this will also save a considerable amount of budget funds, which can be employed to fill most gaps in the national finances, and showing the people we haven't forgotten our promises: everyone wins! Except those bureaucrats who lost their jobs..."
 ita_sweeping_promises:0 "清扫承诺"
 ita_sweeping_promises_desc:0 "We must constantly remind the people that we are working for them: our democracy is still young, and we might need slightly more time to build the paradise we promised, but we are working hard, and we will make it! Until our reforms can be safely passed with full financial covering, the MPs and party leaders will tour Italy and speak to the masses, promising them that we have not forgotten them: it may take time and effort, but we will prevail in the end, and everyone will be happy!"
 ita_tighten_the_belts:0 "勒紧裤带"
 ita_tighten_the_belts_desc:0 "While the state coffers are safe, and bankruptcy is no longer the proverbial \"convitato di pietra\" at cabinet meetings, we will need so much more to actually fulfill our promises. Luckily, our financial department has found a solution for us: the old budget we inherited from the fascists is filled with expensive but useless government programs and subsidies.\n\nCultural initiatives, benefits for party members, bribes masked as subsidies to well-connected industries and banks, this is but the tip of the iceberg of a wide squandering of public funds.\n\nThe draft we received proposes to cut down this jungle of expenses, and we have replied that a machete won't suffice: we will bring a flamethrower."
 ita_strengthen_the_CISL:0 "强化CISL"
 ita_strengthen_the_CISL_desc:0 "With the end of the fascist regime, the CGIL fractured, its different currents no longer forced to stay together by the law. Among the many splinters, the CISL (Confederazione Italiana Sindacati Lavoratori), while not the biggest, is closely aligned to our ideas for labour: therefore, we should subtly act to strengthen it, letting the workers know that we will be more willing to discuss labour policies with them rather than the other trade unions.\n\nThis will have the double benefit of taking more workers away from the clutches of communist unions, and limiting the risk of strikes and labour protests."
 ita_everything_will_be_fine:0 "一切都会好起来"
 ita_everything_will_be_fine_desc:0 "With the budget stabilised and some of our reforms already under way, we can safely tell the people that the government is fully functional and there's nothing to worry about: the economy is growing, the institutions of the State are being overhauled so that they may become fully democratic and efficient, and the Empire is enjoying a social and political stability the likes it has never seen since the golden age of Rome!\n\nOf course, not everything is perfect under the sun, but you can stay assured: we are working on it!"
 ita_encourage_pluarlism:0 "鼓励多元主义"
 ita_encourage_pluarlism_desc:0 "Decades of fascism have ingrained into the people a fear that the secret police will come after them if they even dare to criticise the government. Even under Ciano's more moderate leadership, blackshirts and secret services were still responsible for many disappearances and harsh sentences for \"crimes against the state\". While it may take years, if not decades, to fully abandon this fear, we need to get started immediately.\n\nUnder the government's sponsorship, newspapers and radio programs will be encouraged to hold political analyses and debates, giving people the soft nudge they need to start discussing once more about politics. After all, a democracy where the people don't care about their country's future is a doomed one! Of course, our directives will incentive moderate ideas and debates, which just happen to coincide with our political program..."
 ita_iniziativa_democratica:0 "Iniziativa Democratica"
 ita_iniziativa_democratica_desc:0 "Our current, Iniziativa Democratica is one of the more progressive within the party, and as such it is imperative that we never lose its support. Moro is holding important talks with Amintore Fanfani, among the most important members of ID, regarding the expansion of the current: even among other factions and currents, there are men whose ideas closely resemble others, therefore it would be highly beneficial to introduce them into our group. To this end, ID will be structured from a loose collection of people with similar views, to a party-within-the-party, with its own representative organs and a newspaper, so that the current's activities may be more incisive and gather more support among both the wider DC and the people."
 ita_the_cinema_industry:0 "电影产业"
 ita_the_cinema_industry_desc:0 "CInecittà, founded during fascism, is perhaps the last true cinema industry in Europe, with German \"films\" falling more under the category of \"shameless propaganda\", and the only one capable of at least competing with Hollywood. Since relationships between our country and both USA and Japan are at least cordial, our films have the potential to be exported to the entire world!\n\nHowever, with the end of fascism lots of production (especially the historical, filo-Roman ones) have been discontinued, putting thousands of jobs at risk. Our government will give incentives to Cinecittà and its many studios to begin new film production, especially the genres which sell the most worldwide: this will bring a triple benefit, as it will at the same time create jobs for the people, bring revenue to the State coffers, and export Italian beauty and culture to the world.\n\nCiac, si gira!"
 ita_assert_control_over_the_IRI:0 "主张控制IRI"
 ita_assert_control_over_the_IRI_desc:0 "工业复兴公司(IRI)是意大利经济的核心运作者，承担着向国内产业输送国家激励政策的主渠道职能。因此，我们必须在关键岗位安插忠诚可靠之人，确保IRI遵循我们设定的经济发展路线而非抗拒——毕竟日本就是政经冲突的鲜活教训，我们可不愿沦为下一个民众排队跳楼的国家……"
 ita_le_500_lire_di_moro:0 "Le 500 Lire di Moro"
 ita_le_500_lire_di_moro_desc:0 "Moro has come up with a plan to increase budget funds without putting too much of a strain on our already sizeable debt: the government will issue a new category of very small public bonds, whose value should be around 500 Lire, so that anyone, even the poor, may help their country. As an added benefit, we will state that such bonds can be freely exchanged as if they were actual money: this way, they will circulate alongside traditional money, rather than simply rest until they can be exacted, achieving the double result of giving us more money to spend, and generate more trade and revenue."
 ita_legge_sabatini:0 "Legge Sabatini"
 ita_legge_sabatini_desc:0 "While Germany stagnates, it is clearer by the day that the new frontier for any advanced nation lies in technological innovation: computers, televisions and other things, which twenty years ago would have been labelled as wizardry, now are seen in every field, from the military to entertainment. The competition among the great nations is merciless, and the cutting edge always moves forward: if we want to remain a world power, we must establish a core Italian innovation industry which doesn't depend on foreign help or know how to develop new technologies.\n\nArmando Sabatini, an MP which strongly supports innovation and industrialisation, has drafted a proposal for tax cuts and other incentives for industries willing to invest in research, development and innovation in the field of mechanics, engineering and electronics: as this coincides with our plans for the economy, we will immediately prioritise it in our parliamentary agenda."
 ita_piano_decennale_per_listruzione:0 "Piano Decennale Per L'Istruzione"
 ita_piano_decennale_per_listruzione_desc:0 "While the Riforma Gentile is generally viewed one of the few good things done by the fascist, dramatically increasing alphabetisation especially among the lower classes, there is still large room for improvement. With the steady increase in demand for qualified workers and researchers, it is no longer enough to ensure elementary instruction to farmers and workers' sons: instead, we desperately need people to attend superior schools and universities, so that they may further our quest for innovation.\n\nWhile it is simply impossible to solve our problems with a snap of the fingers, what we can do is plan for the long term: our Piano Decennale per l'Istruzione (Ten-Years Instruction Plans) will set up milestones punctuated by interlocking reforms. If everything goes according to plan, ten years from now we should have a fully functional school systems with increasing higher instruction rates."
 ita_abolish_metayage:0 "废除分益耕种制"
 ita_abolish_metayage_desc:0 "分益耕种制（mezzadria）是地主（concedente）与佃农（mezzadro）间的古老契约——前者授予后者土地耕作权，以换取半数收成。丰收时节固然相安无事，然若遭旱涝灾害致作物绝收，佃农便将陷入饥馑。\n\n现代社会岂能容忍此等封建残余的毒瘤？有鉴于此，农业部长已起草改革法案废除分益制，将其自动转为农业租赁制。此举既帮扶贫苦佃农，亦严惩那些压榨劳工的地主。"
 ita_prevent_financial_bleeding:0 "Prevent Financial Bleeding"
 ita_prevent_financial_bleeding_desc:0 "With the winds of democracy blowing throughout Italy, there are many who profiteered from the past regime who are afraid that we will take their ill-gained money. They are right: while we promised Ciano we wouldn't punish fascists for merely being fascists, we will still prosecute all corrupt officers who took money from the State.\n\nOf course, many of them are already planning to send their capital outside Italy: our agents in Switzerland and the Caribbeans speak of hurried contacts between former fascist officers and banks to accept unspecified sums of money in anonymous accounts. It's almost a pity that tomorrow morning the government will approve a decree which makes it illegal to move capitals superior to one hundred thousand Lire per week, and punishes all banks which refuse to comply with hefty fines..."
 ita_electrificate_the_state:0 "Electrificate the State"
 ita_electrificate_the_state_desc:0 "While the Pianura Padana and most of Central Italy are fully electrified, there are still small mountain towns and villages where people still use candles. Also, there's the problem of bringing up to standard the embrional power lines in the territories we conquered after the war: to this end, we will have ENEL (Ente Nazionale energia ELettrica) establish new hydroelectric plants in the Alps and the Appennini, which will produce power for their respective regions, and give public incentives to those Dalmatian and Albanian industries, often subsidised by ENEL itself, which invest in new power lines for their lands."
 ita_legge_mariotti:0 "Legge Mariotti"
 ita_legge_mariotti_desc:0 "With the constant expansion of the healthcare system, we have prepared a draft which will recognise each hospital as a public entity in its own right, with standardised roles and command structures. The Legge Mariotti will also grant incentives and tax cuts to those industries who sell medical supplies at a discount price, and to all people who donate money to build, renovate or expand hospital wings. While it is still a distant dream, one day every city, town or village throughout the Empire will have at least a medic, granting health and a bit of happiness to all!"
 ita_protect_italian_businesses:0 "Protect Italian Businesses"
 ita_protect_italian_businesses_desc:0 "While our government strongly believes in free trade, Moro is not so foolish as to think that other countries won't try to suffocate our nascent advanced industry in the cradle: to avoid unpleasant incidents, the Ministry of Industry and Trade has drafted a series of decrees which will both protect our industry from aggressive competition, and ensure our own competitiveness in the world market.\n\nTax cuts and public incentives will ensure our businesses will better shoulder the difficulties of foreign dumping and artificially low prices, while a policy of limitations and bans will prevent unscrupulous businessmen from acquiring Italian businesses and forcibly \"expatriate\" them."
 ita_a_new_italy_before_the_world:0 "新意大利的诞生"
 ita_a_new_italy_before_the_world_desc:0 "我们历经艰辛、牺牲盟友，甚至多次濒临覆灭，但终于望见终点！\n\n意大利已告别残暴独裁，蜕变为民主协作的典范：末代领袖确保政权以不流血方式过渡至自由民主选举——这本身就是“意大利之道”的最佳印证。在此精神下，即便最痛恨的敌手亦能以贵宾之礼相待，最深重的仇怨亦能通过外交辞令而非兵戎相见化解。\n\n随着新生民主政体在全民参与中日趋稳固、生机勃发，我们已准备好与美日等强国并肩直面世界。无畏竞争，只因深知内在力量与独特禀赋。诚然，我们是科学家与探险家、征服者与商贾的后裔，但最重要的是——我们是意大利民族。\n\n意大利万岁！\n\n民主万岁！\n\n国王万岁！"
 ita_tip_the_scales:0 "绝对优势"
 ita_tip_the_scales_desc:0 "Some of Moro's advisors have suggested he talks with the more conservative, but numerically powerful, wing of the party, but he has refused: time is short, and with the black clouds covering the sky from Germany we need a strong and free Italy as soon as possible. There's no time for idle negotiations, Italy needs reforms, and we need them now.\n\nFor this reason, we need to rein in the party and ensure that everyone follows the Prime Minister, one way or the other: plans are being drafted to tackle the most problematic elements within the currents, we only need to decide what plan to follow."
 ita_the_progressive_firebrand:0 "进步的火种"
 ita_the_progressive_firebrand_desc:0 "The entire propaganda machine of the Iniziativa Democratica is working at full power to sway the public opinion and as many PMs as possible towards supporting the reformist agenda of the government.\n\nWe have two choices on how to better secure our position. Amintore Fanfani has prepared a rather underhanded plan to force PMs to support us or be forced to resign and forever be banned from any political role within the party and the country. On the other hand, Pietro Nenni has shown willingness to parley with us and create a common program of progressively oriented reforms, making it easier for us to find a majority, but harder to rein in the rest of the conservative currents."
 ita_unleash_fanfani:0 "放开范范尼"
 ita_unleash_fanfani_desc:0 "The choice has been made: we are going to take the leash off Fanfani and turn our heads the other side as he leads the \"talks\" with the conservatives. It's almost a pity that the screams will still be heard. Of course, since we are not so cruel, we'll be sure to call a suitable number of ambulances and paramedics for the inevitable casualties...\n\nAfter Amintore has done his job, and reduced to ash what remains of the Dorotei and the Primavera, we predict that most conservatives who still have a mouth to talk will decide it's best to support our government, if only to get our very own Cursed Dwarf off them for good."
 ita_silence_internal_opposition:0 "噤声内部反对派"
 ita_silence_internal_opposition_desc:0 "While the most vibrant opposition to Moro's policies has been rendered mute, there are still those within the party who grumble and protest against the pace of our reforms: while they are not entirely in the wrong, we have more urgent matters to attend to, and the black clouds coming from Germany are becoming even darker.\n\nAnyway, they still have our full attention, and for that, we will let them talk with the newly appointed \"responsible for internal dissent and intra-party cooperation\", Amintore Fanfani, who recently has a lot of free time. He should ensure that those with a will to fight are \"convinced\" to go on vacation for the rest of the legislature, and those without can be suitably rewarded for their future support to the government. Another ambulance at the Domus Mariae, please!"
 ita_bring_FD_to_heel:0 "让民主阵线就范"
 ita_bring_FD_to_heel_desc:0 "民主阵线的议员们对我们伸出的橄榄枝并非无动于衷，是南尼在背后施压，令我们之间真正的合作难上加难。但萨拉盖特之流，对我们的计划颇有共鸣，乐于将他们的改革之种播入我们的土壤。范范尼决计巧施妙计，提议在那些识时务者中播下离间的种子，让他们在不知不觉中投入我们的怀抱，以此瓦解对方的联盟，促其自溃。随着我们势力的日益壮大，对方日渐式微，最终我们将以他们政治生涯的保全为诱饵，将他们一一纳入我们的麾下……"
 ita_isolate_the_BN:0 "孤立国民联盟"
 ita_isolate_the_BN_desc:0 "在国民联盟内部，有些成员对他们的法西斯主义倾向毫不掩饰，他们梦想着意大利能重返齐亚诺将权力交还人民之前的时光。虽然联盟内的众多成员对此已是心知肚明，但我们仍可巧妙布局，让那些极端言论在不经意间流入民间。一旦这些言论曝光，必将激起民愤，迫使党内温和派不得不与这些极端分子划清界限，以免因与虎谋皮而自毁长城……\n\n届时，我们将敞开怀抱，热忱欢迎他们投向我们的政府：毕竟，意大利和民主的每一位拥护者，都是我们志同道合的朋友。"
 ita_dominate_the_Arco_constituzionale:0 "掌控民主阵营"
 ita_dominate_the_Arco_constituzionale_desc:0 "多亏范范尼的权谋，如今议会内多数民主力量不得不与我们合作，否则将颜面尽失（连带政治生涯）。唯国民联盟死硬派与民主阵线残余敢出言反对。各项改革法案顺利通过，国王陛下亦欣然签署颁布！\n\n此举虽或影响下届选举（毕竟选民素来厌恶政治算计，而我们确实算计颇多），但无可否认：届时我们向意大利人民展现的绝非空头承诺，而是人人可见、共享的成熟民主国度！"
 ita_sit_with_nenni:0 "亲近南尼"
 ita_sit_with_nenni_desc:0 "While Fanfani's approach would probably more effective on the short term, it will damage our efforts in the long run, exacerbating our opponents and estranging our electors with schemes and daggers in the dark. No, what we need is a proper ally, a progressive and democratic ally who sympathises with our desire for reform, and Nenni and his FD are exactly what we need to turn our dreams for a new Italy into reality.\n\nIn the next few days, we'll meet Nenni and his coalition to draft a common progressive program, encompassing the main reforms we'll be approving together: while there is still room for improvement, and the program may change slightly depending on the evolving situation, in the end we have every reason to believe in a friendly and productive cooperation."
 ita_listen_to_their_demands:0 "听听他们的要求"
 ita_listen_to_their_demands_desc:0 "While not all reforms proposed by the Fronte Democratico are in line with our plans - some are too radical even for us - we can still include the more acceptable ones into our agenda as a show of good will towards our erstwhile ally. The conservatives within our current may grumble, but in the end this is the only way to keep the government cohesive and fully functional.\n\nMost of the accepted reforms involve protecting minority rights, establishing more subsidies for the poor and overhauling parts of the territorial administration of the Empire, something which can be easily done even though the belt is a bit tight due to our difficult financial situation."
 ita_encourage_the_split_in_the_PSI:0 "Encourage the Split in the PSI"
 ita_encourage_the_split_in_the_PSI_desc:0 "Just as we have our conservatives opposed to an alliance with the FD, the Fronte Democratico itself has its own radicals who think that we are too conservatives: while this notion is laughable at best, the PSIUP (Partito Socialista Italiano di Unità Proletaria) is threatening to split from the PSI (Partito Socialista Italiano), and therefore from the coalition, if they sign a pact with us.\n\nIt's almost a pity for them that this is exactly what we want.\n\nAllying with an open-and-proud proletarian socialist party? Our conservatives would begin a civil war. Allying with a reformist party once the PSIUP has seceded? Much more feasible! Therefore, we are going to release a joint statement where Moro and Nenni compliment each other for the future alliance, and slip some details of the new DC-sponsored reforms: this should bring the PSIUP to split in a rage, slightly weakening our ally but strengthening our government."
 ita_the_rattling_sabres:0 "拿起武器"
 ita_the_rattling_sabres_desc:0 "Our contacts in the army speak of worried meetings between generals, where the words \"communist\" and \"army purge\" have been repeated more than once. While this is not our intention, and neither is Nenni's, some MPs from his coalition have actually expressed their intention of \"cleansing the army of fascist remnants\". While the army would never try a coup (after all, they are too loyal to the King, and the King is on our side), many in our party have connections within the army, and would try to \"unplug\" our government before it can fall to the temptation...\n\nMoro has scheduled a meeting with Nenni, where he'll remind him that moderation is the key to healthy politics, and surely people talking about army purges are not helping our government: either those rowdy elements are forced into silence, or there may be a big problem within the coalition."
 ita_centrosinistra_organico:0 "中左合作"
 ita_centrosinistra_organico_desc:0 "谈判终告落幕！我们自豪宣布，中左翼联盟“有机中左联盟”已整装待发！纲领终稿敲定，议会日程正精细规划以确保各方无被边缘化之忧。凭借人数优势，我们可安然推行改革而无惧\"狙击手\"：国民联盟与社会党尽可在极端立场上叫嚣，但也不过是蚍蜉撼树。\n\n谁敢断言，这不会超越权宜联盟的范畴？唯有时局与政治博弈能揭晓答案……"
 ita_enact_the_agenda:0 "执行议程"
 ita_enact_the_agenda_desc:0 "With the legislature in full swing, the government's agenda is seeing its first reforms approved: as a show of good will towards the FD, we will start by establishing the foundation of a proper welfare system for the poor and downtrodden. While this will be costly for our finances, we can't deny that there's a dire need for those subsidies, especially since the economic crisis that followed the Atlantropa disaster - damn Germans - is still plaguing the country with its last ugly tendrils.\n\nMoro and Nenni will hold a joint press conference to illustrate the new welfare system and how it will help out those who still live without a job, further increasing the government's popularity in the eyes of the common people."
 ita_long_term_plans:0 "长期计划"
 ita_long_term_plans_desc:0 "The IRI is the most important tool at our disposal to influence Italy's economy, and to ensure that smaller business fall in line with our proposed economic reforms: with its gargantuan budget and its connections in every possible facet of the economy, the IRI is sorely needed, now more than ever, to finally draw up a comprehensive, long-term oriented, strategy to bring the Italian economy completely out of stagnation.\n\nOur Minister for the Economy and Finances has scheduled a series of regular meetings with the IRI's board of directors, so that this immensely complex plan can actually be drawn up, and one day become reality: should it actually work, its benefits for the economy will be immense, creating jobs for the people and badly needed revenue for the State."
 ita_rise_of_the_cooperative:0 "Rise of the Cooperative"
 ita_rise_of_the_cooperative_desc:0 "Cooperatives have been a staple of leftist narrative of the economy: in a cooperative, there's no \"owner\", as the workers themselves own the business and organise it according to their own desires and plans, dividing the earnings equally between every worker. As it is one of the less-radical reforms proposed by the FD, the government has decided to draft laws which officially recognise cooperatives, giving them incentives and tax exemptions to help them establish a starting presence in the Italian economy.\n\nWhile it's unlikely cooperatives will supplant the traditional business model, it will be a way to ensure better equality and fairer competition in the cut-throat economic world."
 ita_establish_the_regioni:0 "Establish the Regioni"
 ita_establish_the_regioni_desc:0 "After Italy was united, it was decided to keep the administrative units small, establishing only the Comuni, cities, and Province, small unions of comuni, due to the risk of uprising from those still loyal to the old pre-unitary States. Now that Italy is properly united, and none wishes to secede to form the old Grand-Duchy of Tuscany or other nonsensical \"nations\", we can finally implement the final stage of the administration.\n\nThe Regioni will encompass provinces united by a common heritage, and ensure that the government's policies can be applied uniformly without the need to micromanage hundreds of small bodies: of course, this will entail a certain degree of decentralisation, as the Regioni will have minor legislative powers of their own, something which may greatly enrage the more authoritarian forces within the parliament, but it is an overall sound proposal, especially in the light of the future reforms we have in mind."
 ita_an_empowered_parliament:0 "授权国会"
 ita_an_empowered_parliament_desc:0 "尽管意大利已成真正民主国家，议会权责仍界定模糊——旧法西斯法律赋予政府的特权犹存。民主阵线盟友主张正式确立意大利为议会民主制国家，明确由议会（而非政府）决定国家政策。\n\n此举正合我意，国王陛下亦乐见此类法案颁布。我们将立即将草案呈递陛下预审，随后启动议会表决。此改革一旦实施，法西斯主义的最后残余必将被民主之风彻底涤荡！"
 ita_unity_is_strength:0 "团结就是力量"
 ita_unity_is_strength_desc:0 "In 1920, democracy fell apart because the democratic forces were too divided to offer a joint resistance against Mussolini's March on Rome: we were too busy backstabbing each other, and even experienced politicians such as Giolitti thought they could use fascists to further their own goals. Of course, this backfired spectacularly...\n\nNow, however, we have learnt the harsh lesson with forty years of dictatorship, and we won't make the same mistake twice! It is the burden of good men and women to always stand vigilant against those who would take away their freedom and their loved ones. Therefore, all Italians who truly believe in democracy should unite under our government, to safely transition towards true democratic rule, and forever banish the taint of fascism so that it never comes back to haunt our existences as it did before."
 CD.1.t:0 "多莫斯玛利亚代表大会"
 CD.1.d:0 "现在，胜利后的狂热已经消退，基民党必须真正开始治理这个几十年来深受法西斯主义荼毒的国家。更重要的是，大帐篷政党的问题在于，党内各派对于治理国家的理念各不相同。\n\n即将上任的首相阿尔多·莫罗意识到了这一点，他本人是一位进步人士，同时也是一位务实的领导，他已决定在罗马的多莫斯玛利亚酒店召开一次党代表大会，来决定他将如何带领党迈向意大利的新时代。\n\n在酒店会议室里，党派领导和官员们唇枪舌剑，各自阐述他们对意大利的愿景为何是党派发展的最佳路径，而莫罗则坐在前排桌子中央，静静观察。\n\n自由保守派多罗泰的领军人物马里亚诺·鲁莫尔和埃米里奥·科隆博详细阐述了党内团结的必要性，并指出党不能一开始就进行大幅度的改革。毕竟，基民党希望的是“继续”执政，而罗马不是一天建成的。更何况许多基民党议员和基民党选民都偏向保守。\n\n而在另一边，莫罗的亲信、进步派的领头羊阿明托雷·范范尼慷慨陈词，他强调意大利的北方盟友变为敌人所带来的威胁，并且指出现在就必须进行改革。意大利必须强大和自由，没有时间循序渐进了。\n\n随着发言的结束，莫罗站了起来，会场顿时鸦雀无声。深思熟虑后，莫罗清了清嗓子，然后转身走向……"
 CD.1.a:0 "进步的火种，阿明托雷·范范尼。"
 CD.1.b:0 "多罗泰领导人鲁莫尔和科隆博。"
 CD.2.t:0 "圆滑世故"
 CD.2.d:0 "既想与兔同奔，又想随犬共猎。\n\n阿尔多·莫罗决定倾听基督教民主党内部庞大而具有影响力的保守派声音。毕竟，基督教民主党本质上是一个中间派政党。过度偏向任何一方都只会导致分裂。人们总说众口难调，但这并不意味着我们不能尽可能满足更多人！\n\n然而，虽然“骑墙观望”政策至今成效显著，莫罗现在必须做出自己的抉择：基督教民主党应以何种方式执政并运作于议会？\n\n有些人认为，最好的前进方向是让本就兼容并蓄的基督教民主党的“大帐篷”变得更具有包容性。通过与议会中各个小党派达成交易并将它们纳入联盟，莫罗可以扩大基督教民主党的吸引力，从而更容易维持执政地位。不过，这无疑最终会冲淡基督教民主党的议程和立法计划。\n\n但基督教民主党已经足够强大，或许可以尝试作为“天主教徒之党”独立运作。通过从内部统一党派，莫罗能使其变得更强大、更团结。这意味着基督教民主党无需向小党派做出过多让步，即可不受干扰地实行自己的议程。这将带来更高效的立法进程——当然，也意味着维持执政地位会更加困难，因为基督教民主党的吸引力范围将有所收窄。\n\n哪条才是最佳道路？"
 CD.2.a:0 "基民党将会成为一个最大的帐篷！"
 CD.2.b:0 "基民党将会成为天主教之党！"
 CD.3.t:0 "接近君主派"
 CD.3.d:0 "意大利统一君主民主党，简称君民党，是新晋获得议会席位的诸多意大利政党之一。尽管相较于三大主要政党规模尚小，但每份助力都对我们实现意大利愿景至关重要。意大利统一君主民主党本质上属于保守派政党，但其核心诉求在于维系意大利君主制——而我们本就没有理由废除这一制度。\n\n鉴于此，辅以若干政策让步，我们正将意大利统一君主民主党纳入执政联盟。阿尔多·莫罗施展的精妙妥协艺术，甚至成功使本党自由派接纳了这个立场强硬的保守政党——随着票仓扩大，基民党的凝聚力不降反升。"
 CD.3.a:0 "大帐穹顶之下，自有王权一隅"
 CD.4.t:0 "温和派间的谈话"
 CD.4.d:0 "阿尔多·莫罗将咖啡杯放回桌面，在办公桌下舒展双腿。他从不怀疑朱塞佩·萨拉盖特会愿意见他——此刻社会民主党人正佯装阅读手中文件，基民党领袖则耐心等候。终于萨拉盖特几不可察地点点头，递回文件。两人目光相撞，莫罗微笑，萨拉盖特也报以笑意，眼中闪过微光。“我们会合作愉快，阿尔多，说服我的人接受不成问题。”萨拉盖特最终开口。“再好不过，朱塞佩。”莫罗递过香烟，对方接过。正事一小时便谈妥，余下时间只消适应彼此的陪伴。“我们是志同道合之人，”片刻后莫罗说道，“你知道我必须与某些……比阁下更保守的先生们共事。”萨拉盖特配合地轻笑，莫罗乘势推进：“但今日共识将重塑意大利的未来。强硬派无关紧要。我倒想听听南尼同志得知此事的反应。”\n\n萨拉盖特纵容地咧开嘴：“南尼总有高论，这正是我所欣赏之处。”忽然他眼底泛起异色：“可这对南尼有何益处？下次会面时我会如约对民主阵线投反对票，届时首相之位非君莫属。”莫罗微笑以对，但阴影悄然笼罩对话。空气凝固数秒，莫罗细细审视盟友：这位举手投足尽显绅士风范的温和派政客，骨子里却透着寒意。他心知若基民党失势，萨拉盖特会毫不犹豫抛弃这份“小小共识”。\n\n转瞬萨拉盖特重展笑颜。几支香烟与闲谈后，两只手越过办公桌相握。“感谢这次谈话，阿尔多。”“感谢阁下赴约。”莫罗含笑引客出门。"
 CD.4.a:0 "多么礼貌的人啊。"
 CD.5.t:0 "与社会主义者的关系"
 CD.5.d:0 "数十年的宣传机器已在意大利酿出对社会主义的慢性敌意。许多老一辈人仍视社会主义者为投掷炸弹的无政府主义者，认定其试图将国家拖入俄式混乱——即便齐亚诺政权当年也严厉镇压社会主义者。这种集体记忆使得党内中间派及中右翼人士对社会主义威胁深怀戒惧。但在他人视作危机之处，阿尔多·莫罗却窥见转机。\n\n相较于国民联盟的新法西斯分子，社会主义者——甚至整个民主阵线的大多数派系——显然更可取，毕竟他们目前仍大体信奉民主框架。深谙此道的莫罗决意向社会主义者伸出象征性橄榄枝，向民众证明社会主义绝非异端邪说，而是民主体制的有机组成部分。\n\n尽管初期遭遇阻力，莫罗的努力终见成效：如今连基督教民主党内最保守的派系都愿对各地社会主义者展露善意。这为未来更密切的跨意识形态合作开启了可能。"
 CD.5.a:0 "也许有一天我们甚至可以和他们结成联盟？"
 CD.6.t:0 "丘陵"
 CD.6.d:0 "基民党内的普里马韦拉派——恕我直言——实为党内的眼中钉。该派系的保守秉性与立足中间路线的党内主流格格不入，甚至在整个基民党光谱中都堪称右翼。然而纵使存在意识形态鸿沟，我们仍应与其合作。毕竟他们终究是党的组成部分。\n\n这曾是基民党高层的普遍共识，故当协调谈判启动时，多数人预期共识的达成都将困难重重。但出乎几乎所有人预料，普里马韦拉派竟展现出惊人的合作意愿！不仅如此，该派代表对妥协必要性的理解远超预期。尽管基民党不得不对其部分温和主张做出策略性让步，但这场风波的意外顺利收场仍令党内诸多人士倍感欣慰。"
 CD.6.a:0 "妥协成功！"
 CD.7.t:0 "无价同盟"
 CD.7.d:0 "人之根本，在于其秉持的价值观。若价值观腐朽堕落，其人必为奸恶之徒，反之亦然。正因如此，确保全体国民的价值观良善正直至关重要——唯此国家方能免于陷入混乱。价值观的塑造可经由童年教育达成，但其维系则需仰仗制度化载体。这正是天主教工会的历史使命。\n\n以意大利工会联合会为首的这些工会，完美诠释了虔信天主教劳工应有的精神追求。它们弘扬的天主教核心价值观，正是意大利作为天主圣城守护者必须彰显的立国之本。所幸这些工会绝非泛泛之辈，其本身就有实力角逐意大利最强工会地位。我们必须巩固与它们的纽带，方能让我党未来方略与正统价值体系完美契合！"
 CD.7.a:0 "价值观之重，岂容轻忽"
 CD.8.t:0 "热情高涨"
 CD.8.d:0 "意大利民众间弥漫着一种奇特情绪。它几乎无差别地感染了保守派与自由派，既非恐惧亦非愤怒，而是对初生的意大利民主——更准确地说，是对基督教民主党的由衷喜悦。\n\n我们的治国方略收效十倍于预期，民意支持率呈火箭式蹿升。基层党员的信念热忱同步高涨，大批民众踊跃入党，自发向亲友传颂基民党的建国功勋。甚至国民联盟与民主阵线中的反对者也不情不愿地承认：我们确是意大利最可信赖的执政选项。这股对基民党的感染性乐观主义必将产生持久效应，而我们必将确保其绝无褪色之虞。"
 CD.8.a:0 "瑞兆良征"
 CD.9.t:0 "新教室"
 CD.9.d:0 "彼得罗在新学年第一天走进教室时，立刻察觉到了某种不同寻常的变化。\n\n若说去年的教室堪称寒酸，那已是极为客气的评价。而如今这里仿佛经历了一场蜕变：墙面光洁如新，曾经空荡荡的书架摆满典籍，就连那些曾经吱呀作响的课桌，如今看来也足以稳稳承载孩童的重量！\n\n“奇鲁利老师，”彼得罗走向讲台发问，“这些变化从何而来？”\n\n老师低头看向男孩，眉开眼笑：“当然要归功于意大利工会联合会！他们正在开展大行动，为像我们这样的贫困学校提供物资，为你们这样的意大利少年争取应得的教育机会！你以为父母从哪弄来你的新鞋和课本？他们自己可负担不起！”\n\n彼得罗低头打量新鞋——确实，这双鞋做工精良款式新颖！回想之前那双开线裂口的旧鞋，当父母欣喜若狂递来新鞋时简直像场美梦。书包里的精装课本，更不是他那工人阶级双亲能独自购置的奢侈品。\n\n“都是意大利工会联合会做的？”\n\n“正是如此！所以连我都加入了工联！你父母肯定也怀着同样感激！”"
 CD.9.a:0 "天佑意大利工会联合会！"
 CD.10.t:0 "和睦时代"
 CD.10.d:0 "市长曾言，那是一个和睦时代，意大利人满怀希望，相信能将世界变得更好。埃莱娜虽对市长不甚感冒，但在这一点上，她与他不谋而合。她走家串户，动员邻里，使得B7公寓管理小组成了街谈巷议的焦点。\n\n她自幼快人快语，但直至近一年，邻居们才开始变得同样直率。这个小组最初由楼内的女性组成，曾被不少丈夫嗤之以鼻。但小组随后巧妙组织了几次午餐，解决了公寓垃圾处理的难题，说服业主出资维护房产，甚至两度迎来市长的造访，丈夫们的怨言也随之烟消云散。\n\n埃莱娜深知，她那些女性朋友的变化并非在一夕之间，也非偶然。即便是在齐亚诺时代，她们也断不敢如此大张旗鼓或涉足政治，无论其影响多么微小。民主之风让她们得以自主掌握日常的“政策制定”。尽管仍有人私下议论，认为她闲得发慌，但埃莱娜并不在意。她发现，组织同伴给了她生活的方向，无论他人如何评说，她都不会放弃。或许待孩子们长大——未来难测——她能取代市长，大展宏图。"
 CD.10.a:0 "毕竟，公共管理部门需要她这样的人才。"
 CD.11.t:0 "天主教政治的可悲衰落"
 CD.11.d:0 "现在，星期天对他来说是一种双重打击。邻居们都知道保罗的日常作息。他会先照料屋后和妻子一起打理的小花园，然后和她一起去参加早晨的弥撒，之后才各奔东西；妻子去杂货店找朋友，而他则去教堂广场边的小咖啡馆找自己的朋友。他们交谈一段时间后，他会买下为他留在柜台后面的两份常看的报纸，然后坐下来，沉浸在阅读中，度过余下的上午时光。\n\n多年来，他一直坚持这样的生活习惯，但现在情况已经不同了。他从小就记得的那个教区神父已经老了，接近耄耋之年——这个可怜的老人有时会在布道中途停下来，他的脸上迷惑不解，似乎迷失了方向。他的布道曾经唤起过保罗的信仰，但现在只有尴尬的沉默，直到一名辅祭怜悯地把老神父领走。\n\n保罗原本期待基民党在选举中获胜后，政治能像他心中仍然持有的宗教热情那样进行。他投票给基督教民主党，是因为他相信一个真正的意大利政党——像他一样，在天主教行动的怀抱中成长的意大利人——能够取得胜利。但现在他每天都能读到阿尔多·莫罗——这个狡诈的懦夫，莫罗——正在与不可知论者和社会主义者合作。今天的报纸谈到了“民主行动”，这是莫罗刚刚宣布的与党内左派和他从中间派带来的人结成的联盟。保罗不仅对破坏天主教政治的莫罗感到愤怒，也对党内让他逍遥法外的那些“有价值的人”感到愤怒。\n\n他把报纸放在桌子上，回到了自己的家中。他还没有放弃基民党——他还能投给谁呢？但他过去为他们说话时的那种狂热早已消失殆尽。"
 CD.11.a:0 "可怜的意大利。"
 CD.12.t:0 "电影产业"
 CD.12.d:0 "年轻的朱塞佩几乎不敢相信。\n\n自幼年起，他就是看着奇尼奇塔制片厂出品的伟大电影长大的，比如《风烛泪》、《白夜》和《偷自行车的人》。而从童年时代起，他就梦想着有朝一日能亲自为奇尼奇塔制作电影。\n\n“嘿，朱塞佩！我的咖啡呢？快点！”\n\n随着费德里科·费里尼那尖锐的声音在摄影棚里响起，朱塞佩从白日梦中惊醒。“是，是的，先生！马上就来！”\n\n朱塞佩从未想过这一天会到来——他竟然能与伟大的导演费德里科·费里尼在同一家摄影棚里共事，共同打造一部注定名垂青史的电影《萨蒂里孔》！而且，还能与萨尔沃·兰多内等伟大的演员共同工作！这真的是梦想成真。\n\n尽管目前朱塞佩主要负责端咖啡和做一些其他杂活，但这并不会持续太久。他还年轻，属于他的时代终会到来。现在，他只是很高兴能和自己崇拜的导演和演员们一起工作，参与自己喜爱的电影制作。即使现在只是个无名小卒，但这也是他迈进电影圈的第一步，而这都要归功于奇尼奇塔获得的补贴。如果没有这些补贴，他们还会有钱雇佣他吗？"
 CD.12.a:0 "卡！"
 CD.13.t:0 "新钞票"
 CD.13.d:0 "“这是找您的1000里拉零钱，先生。谢谢您，祝您今天过得愉快！”\n\n马里奥低头看着收银员递给他的零钱，只有两张500里拉的纸币。他把纸币放进钱包时，眉头不禁皱了起来。\n\n马里奥是一名经济学家。当政府宣布计划推出新的500里拉纸币面额时，他就已经对这个计划持怀疑态度。他认为，这个计划只会让已经通货膨胀的里拉进一步膨胀。而最坏的情况是，它可能导致经济泡沫。\n\n而所有泡沫最终都会破灭。\n\n然而，尽管像马里奥这样的经济学家表达了怀疑，政府还是决定继续执行这个计划并印制新的纸币。现在，这些纸币已经广泛流通，看起来它们已经在市场站稳了脚跟，里拉也将进一步膨胀。虽然这增加了支出和消费，但这种情况能永远持续下去吗？\n\n马里奥不希望出现泡沫。他真心希望自己错了，希望这个项目能像政府所说的那样取得成功。但他始终无法摆脱一种感觉，那就是这个项目正在吹大一个泡沫，而这个泡沫迟早会破灭。"
 CD.13.a:0 "希望这不会导致我们陷入经济困境…"
 CD.14.t:0 "夜宴"
 CD.14.d:0 "“来吧！都来吧！都来参加村里的宴会！欢迎所有人！”\n\n乔瓦尼笑得合不拢嘴，看着斯蒂洛村的村民们聚集在村子广场上的许多桌子旁。当他正在观察准备情况时，一个年轻男孩走到他面前。\n\n“先生，”男孩问，“我们为什么要举办这场大宴会呢？”\n\n乔瓦尼继续微笑着，跪在男孩旁边。“孩子，你难道没听说吗？我们正在庆祝！现在政府已经废除了分成制，我们是自由人了！不用再佃耕了！我们可以保留自己的收成！我们拥有自己的土地！这一切都要感谢政府！现在坐下来，一起庆祝吧！”他边说边催促孩子坐到桌子旁。\n\n乔瓦尼一直是卡拉布里亚斯蒂洛村的一名农民。他长期在分成制下辛勤劳作，被迫将自己辛苦种植的作物交给地主，以换取使用他们土地的特权。\n\n他从未想过这一天会到来。这个可恶的制度被废除的日子，他可以保留自己土地上种植的作物。\n\n当他坐在桌前，准备大快朵颐时，他一定要记住，是谁让这一切成为现实。愿上帝保佑政府！"
 CD.14.a:0 "开动！"
 CD.15.t:0 "要有光"
 CD.15.d:0 "阿尔卑斯山上的阿尔科村将与以前大不相同。\n\n“马泰奥！马泰奥！你看到他们刚刚在村子广场上放了个什么东西吗！？”\n\n小马泰奥转过身，看到他的朋友伊莎多拉满脸笑容地朝他跑来。“没看见呢，你在说什么啊，伊莎多拉？”\n\n小女孩的笑容更加灿烂了。“跟我来！”她说着，抓住马泰奥的手，拉着他一起向村子广场走去，此时太阳已经开始缓缓落下地平线。\n\n当他们到达广场时，马泰奥注意到了一个新景象。广场周围竖立着细长的柱子，每个柱子的顶部都有一个灰色的圆球。\n\n“嗯，这些柱子看起来不错，伊莎多拉。但你真的至于专门把我拉到这里来看吗？它们看起来也没什么特别的啊！”\n\n“再等几分钟！”伊莎多拉说，她的笑容依然没有消退，太阳继续缓缓西沉。\n\n马泰奥坐在朋友旁边的长凳上，心想这到底是什么特别的东西。等了大约十分钟之后，奇妙的事情发生了。\n\n柱子顶部的圆球突然亮了起来！\n\n小马泰奥惊得差点从长凳上掉下来，他目瞪口呆地看着。“伊莎多拉！？这特么是怎么回事！？”\n\n此时，伊莎多拉的笑容已经咧到了耳根。“是不是很神奇！？大人们说这叫电。我也不太懂，但这不是很酷吗？！”\n\n马泰奥没有回答，他只是惊奇地盯着那些发光的圆球。"
 CD.15.a:0 "我以前还从没见过这玩意呢…"
 CD.16.t:0 "范范尼的选择"
 CD.16.d:0 "当首相阿尔多·莫罗与他的得力助手阿尔米托雷·范范尼一同走过蒙特奇托里奥宫的大厅时，他眉头紧锁，思索着在全力将基督教民主党打造成一个变革与改革的政党后，如何走出最优之路。\n\n“我跟你说，阿尔多，”范范尼边走边说道，“你可以信任我。我无论如何一定能让保守派支持我们的计划。你只要给我一路开绿灯，没有限制的话，我就能用任何必要手段，把他们拉到我们这一边。”\n\n“或许吧，”莫罗回应道，“但如果你继续用胁迫或暗示开除的方式来推行计划，无疑会让我们在下一次选举中更难连任。这对我们党来说将是个风险。我也希望尽量在党内解决问题，但我们必须考虑到未来的选举。与南尼在同一改革方案上合作肯定会在那方面上更容易些。”\n\n“阿尔多，拜托，我们都清楚，如果总是为了下一次选举而畏手畏脚，那将什么事都做不成。我们都知道，来自北方的威胁迫使我们必须立即采取行动。只要你一句话，其他的交给我。”\n\n莫罗的眉头依旧紧锁，他停下脚步，思索着范范尼的话。虽然范范尼的话的确说中了他们两人心中的顾虑，但作为党首，他有责任确保党的选举的成功，正如作为首相，他也必须确保意大利的未来一样。与表现出合作意愿的南尼联手，或许是对基督教民主党和意大利最有利的选择？该怎么办，该怎么办……\n\n沉思了几分钟，莫罗转向范范尼，对他说……"
 CD.16.a:0 "“我祝福你。”"
 CD.16.b:0 "“……我们将与南尼合作。”"
 CD.17.t:0 "安定之岛"
 CD.17.d:0 "自意大利摆脱法西斯枷锁以来，政坛一直……动荡不定。群雄逐鹿，各怀意大利未来之梦。在这些政党内部，党内派系为掌舵方向而明争暗斗。\n\n不用说，这引发了不少口舌之争和……政治博弈。\n\n然而，在这片动荡的政治风云中，有一座安定的岛屿。那座岛屿便是基督教民主党。其他政党纷争不断，我们的党派却稳若泰山。我们坚如磐石，我们众志成城，我们超然于琐碎争执和派系之争。意大利民众可以信赖我们，引领国家行稳致远，远离这些无谓之争。\n\n这并不是说我们党内没有自己的分歧和派系。我们显然也有。我们只是更擅长向选民展现团结一致的面貌。归根结底，赢得民心，方为上策。"
 CD.17.a:0 "我们的党团结而稳定！"
 CD.18.t:0 "莫罗的演讲"
 CD.18.d:0 "阿尔多·莫罗走上讲台，在议长要求全场肃静时扫视着台下的人群。基督教民主党的代表们如同海洋般回望着他——这里有形形色色的政治立场，从改过自新的法西斯主义者、君主主义者，到那些与温和社会主义集团仅因党派归属而区隔的成员。莫罗不禁为他们搭建的这个“大帐篷”感到自豪，直到他的目光与朱利奥·安德烈奥蒂相遇。朱利奥向他微笑点头，那笑容里带着鼓励，也藏着要求。基督教民主党确实是目前议会中最广泛包容的联盟，但——莫罗缓缓呼出一口气，挺直了脊背——今天这个“大帐篷”要开始收缩了。\n\n“我自豪，因为我是一名基督教民主党人。”他开口了，“其他党派的同僚们各自为政，只代表社会的部分群体。这是他们的权利。”惯常的嘘声响起，各派系的支持声此起彼伏。莫罗继续道：“基督教民主代表着整个社会。我们每天都在上帝注视下，基于宗教与社会价值观构建政治，改善每个意大利家庭的生活。某些对手指责我们过度妥协、背离信仰……”议员们开始骚动，但莫罗提高了音量：“但我们清楚自己的信念。基督教民主党是……”他几乎要结巴，“是民主、团结与价值观的捍卫者，反对左翼的破坏与分裂。”\n\n当窃窃私语声在议会厅蔓延时，莫罗眯眼盯着讲稿。他迅速在脑海中修改措辞，划掉“对家庭的无神论恶意攻击”“民主的刽子手”，替换为“违背我们的家庭信仰”“只会伤害民主的错误思想”。抬头环视全场：安德烈奥蒂和“春天派”赞许颔首，左翼派系怒目而视；民主阵线代表蓄势待发却按捺好奇；混坐在中间的社民党人更显玩味；而对面的阿尔米兰特露出森森白牙，令他脊背发凉。\n\n“我们反对民主阵线，反对左翼，因其理念违背家庭价值观。他们不是意大利所需，虽然其中不乏好人——”安德烈奥蒂微微皱眉，“但他们的思想显然误入歧途，将危害年轻民主。或许他们会称我们保守、反对改革，但我们才是真正的改革者。基督教民主党代表着意大利的真正核心，数千万意大利家庭的灵魂。基于我们的价值观，在政治战场上与左翼斗争，我们将建设更美好的意大利，让子孙享有比我们更幸福的生活。”\n\n安德烈奥蒂阵营爆发出雷鸣掌声，所有保守派成员起立喝彩。阿尔米兰特带着手下法西斯分子吹口哨鼓掌，半是戏谑半是认真。民主阵线高喊“大资本傀儡”“工人之敌”“法西斯”，萨拉盖特的温和派们交头接耳。但莫罗没有理会这些，他只注视着本党左翼成员——那些人眼中燃烧着愤怒与背叛，静坐如雕塑。莫罗离开讲台时心不在焉地与人握手，安德烈奥蒂拍着他的后背耳语：“今天我们赢得了重大胜利。”"
 CD.18.a:0 "为了民主与我们的价值观。"
 CD.19.t:0 "孤立国民联盟"
 CD.19.d:0 "国民联盟终是我们的眼中钉肉中刺。这个由“前”死硬法西斯分子乔治·阿尔米兰特领导的极右翼民族主义政党，口口声声宣称自己“绝非法西斯”并“尊重新意大利的民主制度”——但这些说辞最多只能“善意地”形容为“最好存疑”。\n\n他们无时无刻不在对抗我们的政府。不过要清除这个威胁，我们倒有一计可施。\n\n在国民联盟内部存在着规模可观的保皇派势力，这些人热衷保守主义与威权统治，对法西斯那套倒不怎么上心——当然，他们最核心的诉求始终是维系意大利君主制。\n\n我们大可借此良机在其阵营内制造裂痕。只需散播一则传言（或许并非空穴来风）：国民联盟企图复辟法西斯政权，并在此过程中废除君主制！我们可以宣称这是他们对翁贝托国王推动意大利民主化进程的“报复”。\n\n无论真假，只要让这则传言渗入保皇派的思维，就足以令国民联盟的团结分崩离析。利用这种内部分裂，我们既能阻止该党继续干扰政府运作——或者说干扰民主本身——甚至还能通过标榜“基督教民主党才是真正维护君主制的政党”来拉拢他们：“我们尊重翁贝托国王，与国民联盟不同，我们誓将守护他的正统地位！”"
 CD.19.a:0 "为了国王和国家！"
 CD.20.t:0 "分工之歧"
 CD.20.d:0 "圭多抬起头，带着若有若无的笑意眯眼看向对面那两个人。流水线的噪音大到不提高嗓门就听不清说话，但绝不会错认——塔诺和费德里科又吵起来了。此刻费德里科的脸已经涨得通红。“莫罗的问题在于他毫无立场，”塔诺的嗓门明显超过了必要音量，“今天有人说什么他就照做，明天换个说法他立刻转向！简直令人作呕！他根本没有原则！”费德里科把双臂抱在胸前，这个姿势透着防卫意味。“我们都是社会主义者，塔诺，但你心里清楚基民党确实为我们谋过福利。”听到这话，塔诺瞪大了眼睛——隔着老远的圭多都能看清。“基民党只为他们自己谋福利！”塔诺几乎是在嘶吼，“像你这种'社会主义者'的问题，就是太乐意向当权者卑躬屈膝！”对方的脸顿时红得发紫，吼着说要问候他老婆才算卑躬屈膝。\n\n圭多摇摇头，垂下视线继续干活。他自己就是基民党的支持者，对莫罗怀有深深敬意。那个人做了维持稳定必须做的事，这种务实作风让圭多心有戚戚——所以他从不参与政治争论。即使不抬头也知道接下来会发生什么：塔诺和费德里科身边的人正在将他们强行分开，四周响起此起彼伏的激动叫嚷，某个监工正朝这边狂奔而来。"
 CD.20.a:0 "“都给我滚出去！扣你们工钱！”"
 CD.21.t:0 "信件"
 CD.21.d:0 "在场的男人们等到门锁落下后才开始发言。聚集于此的是意大利军界最高层，三军首脑尽数到场。讨论的核心是一张纸——经基督教民主党可信中间人亲手递送的信件。纸上只印着寥寥数字：“等待。属于我们的时刻终将到来。局势生变时自会联络。”将军朗读完毕后环视全场，将信纸折起收入衣袋。室内陷入漫长沉默。\n\n“我本以为朱利奥会更果断些。”终于有人开口，声音沉郁，引来零星的附和低语。“但我们必须按他说的等。要么正确行动，要么按兵不动。即便是军方，也需要政治条件成熟才能出手。”更多私语泛起，并非全是赞同。有人提议向信件来源的基督教民主党办公室发去回函，但最先发言者摇头否决。“必须相信同志们清楚自己的行动，”他斩钉截铁，“难道诸位觉得我们甘愿忍受现政府的羞辱？但唯有忍到极限，才是雷霆出击之时。”室内躁动稍息，众人似被说服，但连发言者自己都心存疑虑。他只盼朱利奥尽快送来第二封信件，带着截然不同的讯息。"
 CD.21.a:0 "万事俱备之时，雷霆出击之日"
 CD.22.t:0 "演讲"
 CD.22.d:0 "“爸爸！爸爸！我要看《普罗维利诺》！”\n\n“《普罗维利诺》得等等，玛丽亚。”安杰洛对小女孩说，“莫罗首相马上要发表演讲了！嘘——就要开始了！”\n\n玛丽亚撅起嘴。政治演说对孩童来说无聊透顶。但她还是不情不愿地挤到父母中间的沙发坐下，此时电视里的阿尔多·莫罗正走向演讲台。\n\n但今天的演说注定非同寻常。\n\n莫罗向来深谙政治表演之道。可此刻的他展现出前所未有的激昂、果决与坚定。当他呼吁意大利实现应得的伟大时，激情几乎要穿透电视屏幕——不仅是世界舞台的荣光，更要让每个意大利人为家园自豪！必须打破现状，缔造全新而更伟大的意大利！\n\n安杰洛与妻子阿莱格拉完全被这场表演摄住了心神。他们瞪大双眼，连一瞬都不舍得从荧幕移开！就连小玛丽亚也不由自主被吸引——虽然她更想看动画片。\n\n莫罗显然志在必得。\n\n当历史性演讲落幕时，安杰洛望向妻子：“亲爱的，我想我们知道该投票给谁了。”"
 CD.22.a:0 "变革将至！"
 CD.23.t:0 "大区的建立"
 CD.23.d:0 "在意大利这般伟大而辽阔的国度，最严峻的挑战往往看似枯燥乏味：行政管理问题。自1861年统一以来，我国行政单位始终维持在微小规模——由市镇及由市镇组成的行省构成。\n\n这套体系曾运转良好，但随着光荣的祖国蓬勃发展，市镇与行省数量激增，迫使中央政府不得不对数百个行政单位实施微观管理——坦白说，这简直是行政噩梦。为此，基民党政府引入了全新行政单位：大区。\n\n大区将由具有共同历史文化遗产的行省联合组成。此举将把中央政府部分权力下放至大区层级，虽不至于彻底联邦化，却能最大限度减少微观管理，确保国家法律统一实施。通过适度分权，意大利将变得更加强大。\n\n当然，并非所有人都乐见其成。议会中威权主义势力对向地方政府让渡丝毫权力暴跳如雷，尤其是国民联盟——其领袖阿尔米兰特更以连续八小时阻挠议事刷新议会记录！此人危言耸听，宣称改革将导致意大利分裂为“托斯卡纳大公国”或“威尼斯尊贵共和国”之流。但这纯属无稽之谈，因为大区制正是巩固国家统一的最优解！"
 CD.23.a:0 "最好的结果。"
 ita_welfare_net1:0 "福利网"
 ita_welfare_net1_desc:0 "For too long Italians have suffered economic hardship without sufficient aid from the former fascist regime. This robust welfare system will guarantee a basic standard of living for all unemployed Italians during this time of great transition. No longer will Italians starve on our cities' streets while the government watches with indifference. Thanks to the Fronte Democratico's efforts unemployed Italians will be able to plant their feet firmly and leap at new jobs and economic opportunities without the shackles of poverty."
 ita_welfare_net2:0 "福利网"
 ita_welfare_net2_desc:0 "For too long Italians suffered economic hardship without sufficient aid from the former fascist regime. This robust welfare system will guarantee a basic standard of living for all unemployed Italians during this time of great transition. No longer will Italians starve on our cities' streets while the government watches with indifference. Thanks to the Fronte Democratico's efforts unemployed Italians will be able to plant their feet firmly and leap at new jobs and economic opportunities without the shackles of poverty."
 ita_march_of_progress1:0 "进步行军"
 ita_march_of_progress1_desc:0 "Italy has truly entered into a new chapter of its story, a chapter of workers' rights and prosperity for all. This march of progress emerged out of the failure of fascism, like a phoenix from the ashes. From now on the people, not the elites, will call cadence for the march and reform will come from below, rather than handed down from above. The future of Italy certainly is bright, and only time will tell where our feet will carry us next."
 ita_march_of_progress2:0 "进步行军"
 ita_march_of_progress2_desc:0 "Italy has truly entered into a new chapter of its story, a chapter of workers' rights and prosperity for all. This march of progress emerged out of the failure of fascism, like a phoenix from the ashes. From now on the people, not the elites, will call cadence for the march and reform will come from below, rather than handed down from above. The future of Italy certainly is bright, and only time will tell where our feet will carry us next."
 ita_environmental_protection:0 "环境保护"
 ita_environmental_protection_desc:0 "法西斯统治下，民众福祉的诸多方面被漠视，居住环境尤为甚之，它关乎工人健康，却常为经济增长所牺牲。但现在，我们将扭转这一趋势。我们将在经济繁荣与生态保护之间寻求和谐，将大自然的复苏置于意大利新形象的核心。毕竟，消费品再多，也换不来意大利山水间的清新与壮丽。"
 ita_industry_wrangling:0 "工业上的争吵"
 ita_industry_wrangling_desc:0 "在工业领域，权力的天平亟需重新调整。政府将采取恩威并施的策略，迫使企业放权，向工会做出让步。虽然这可能会在短期内导致生产效率下降和与商界的冲突，但这是为了维护工人权益所必须付出的代价。意大利将不再受制于那些企业的要求。"
 ita_avanti_idea:0 "前进！"
 ita_avanti_idea_desc:0 "民主阵线执政期间，意大利和整个社会主义事业取得了巨大成功。转瞬间，我国已化为世界各国仰望的灯塔。然而，这不过是意大利社会主义的序曲。此刻，我们非但不能在争取工人权益的道路上动摇，更不能因已有的成就而骄傲自满。争取社会主义的斗争是一场没有终点的马拉松，我们必须不懈地捍卫并拓宽其道路。未来，诸多问题与挑战无疑将接踵而至，但意大利将严阵以待，迎难而上。"
 ita_stready_radicals:0 "适度的激进主义"
 ita_stready_radicals_desc:0 "在民主阵线内部，有许多激进分子希望推动意大利各个层面的巨大变革。尽管诸如南尼和贝林格这样的人可能在一定程度上同意这些激进派，但公然接受激进左翼的思想必然会导致下一次大选的失败。我们可以支持比较激进的同志，但也必须谨慎行事，以免激怒反共分子。"
 ita_a_victory_for_fronte_democratico:0 "民主阵线胜利"
 ita_a_victory_for_fronte_democratico_desc:0 "胜利了！甜蜜而美妙的胜利！\n\n当参加刚才获得自由的意大利的第一次选举时，我们知道，竞争将会极为激烈。毕竟，现政权曾对各色社会主义党派与运动统统严厉迫害，哪怕是齐亚诺那“温和的”法西斯主义掌权也没有放松。基民党与国民联盟之于我们，就如同两个巨人之于大卫，而我们赢了！\n\n但是现在，困难的一面开始显现。我们的联盟是广泛的，因此也是脆弱的，如果我们想要我们的改革能稳稳当当得到通过，那就需要与民主势力中的其他势力进行博弈。\n\n意大利社会党代表大会即将召开，这是我们的当务之急，大会的时间会有庆祝，也少不了反思。在大会上，我们将决定选择某一派主要的政治力量作为我们在政府中的潜在伙伴，而我们的命运与将他们紧密联系。"
 ita_XXV_congress_of_the_ISP:0 "意大利社会党第二十五次代表大会"
 ita_XXV_congress_of_the_ISP_desc:0 "意大利社会党第二十五次全国代表大会于不久后举行，来自全国各地的代表们将共聚一堂，决定我们政府的未来！虽然最终决定由大会投票做出，但放任自流是蠢人的做法:阵线当中不同的党派正在积极地召开会议，而最大的争议聚焦于我们的改革步调。\n\n温和派希望全阵线达成一致，从而能够尽快尽稳地通过我们最重要的改革，特别是社会福利和经济刺激措施，同时延缓激进派提出的其他改革，尤其是在可能涉及军队重组和君主制存废的问题上。另一方面，激进派意图施压议会其余议员赞成他们的改革，为意大利带来疾风骤雨式的变革，使其转变为一个社会主义国家，但，如果我们不谨慎行事，很有可能会招致我们所知甚少的势力反扑。\n\n抉择不易，但我们必须决定，选票会证明一切…"
 ita_prima_la_democrazia:0 "民主优先"
 ita_prima_la_democrazia_desc:0 "意大利心系民主，而民主的精髓在于古罗马所倡导的”Concordia Ordinum”，即“阶级调和”：一个社会若能不分贵贱，上下一心，国家必将繁荣昌盛。若和谐之弦断裂，那昔日的辉煌，便如镜花水月，一触即碎。\n\n社会主义的基石是工人阶级与资本家的斗争，但作为主张民主的党，我们的任务首先是尝试与对手和平解决分歧，让两个阶级能在和谐与合作中共同进步。我们将与基督教民主党的温和派展开对话，争取他们对我们那些与他们的社会经济议程相契合的改革的支持。凭借这一战略，我们的计划将稳步推进，工人阶级将在和平中得到保障，无需经历血与泪的洗礼。"
 ita_a_meeting_in_palazzo_barberini:0 "巴贝里尼宫的会面"
 ita_a_meeting_in_palazzo_barberini_desc:0 "既然决心已定，我们接下来的任务便是构建一个温和的阵线来稳步推进国家的革新。\n\n我们将在巴尔贝里尼宫与萨拉盖特及其意大利社会民主党进行会晤，通过这些交流，我们将探知与他们携手组建联盟的可能性。若意大利社会党与意大利社会民主党的联盟能够顺利结成，我们将构筑起一个团结的阵线，迅速推动改革，但这也可能招致右翼对我们左翼联盟的激烈反对。若会谈未能如愿以偿，我们还可以退一步寻求与基督教民主党组建联合政府：虽然这可能使我们的选民感到失望，我们可能需要对我们的计划作出让步，他们渴望的变革可能因此无法一一实现，但我们至少能够确保足够的支持票，右翼也可能会因为我们的温和中左策略而感到安心。"
 ita_the_red_and_white:0 "红与白"
 ita_the_red_and_white_desc:0 "我们与萨拉盖特的协商未果，同时与意大利社会民主党之间的对话也走向了死胡同，我们只得另辟蹊径，向基督教民主党伸出橄榄枝，共谋联合政府之大计。虽然这非我们所愿，但形势所逼，只得泰然处之。基督教民主党内部派系众多，其中的自由派愿意与我们同舟共济，但这需要我们将一些更为激进的改革计划暂时搁置：目前，我们能与他们携手并进，静观其变。毕竟，护佑工人和弱者乃当务之急，共和制改革、社会主义军队等原则性议题，大可待到春暖花开之时再作筹谋。"
 ita_let_the_PSI_split:0 "让意大利社会党分裂"
 ita_let_the_PSI_split_desc:0 "意大利社会党的激进分子威胁说，一旦我们与基督教民主党携手，他们便要另立门户。他们渴望的是我们竞选时所宣扬的改革，对于与中间派的泛泛之谈，无论其多么进步，他们决不买账。他们对基督教民主党与教会和商界的勾连口诛笔伐，斥我们为“工人阶级的叛徒”。\n\n任由他们去吧。\n\n我们不需要他们的激进主义：即使我们即将实施的改革是渐进式的，现在的意大利也迫切需要一场变革。如果他们现在还看不清楚这一点的话，那么他们便不值得在这新时代的阶级调和中占有一席之地。他们大可借此与国民联盟同声相应，或许他们本来就是右翼的暗线：我们将独自捍卫工人的权益，无惧风雨。"
 ita_negotiate_with_moro:0 "与莫罗谈判"
 ita_negotiate_with_moro_desc:0 "阿尔多·莫罗，基督教民主党的掌舵人，亦是其党内进步派的中坚分子。他的存在让两党之间的议程有了更多的共鸣，也让我们会谈成功的可能性水涨船高：虽需在细枝末节上做些妥协，但我们大体上能够自豪地宣称，在与企业利益的博弈中我们已赢得了胜利。\n\n南尼与莫罗的会晤已排上日程，旨在敲定政府的共同议程。届时，我们将能以彼得罗·南尼之名，向国王展现一个强有力的候选人面貌。"
 ita_renounce_the_reformist_platform:0 "放弃激进改革"
 ita_renounce_the_reformist_platform_desc:0 "我们早已预见这一情况，现需恪守许下的诺言：基督教民主党已同意了我们草拟的方案，代价是让我们公开割舍党内激进派所提出的激烈变革。这无疑将在下次选举中让我们付出代价，但若我们巧妙布局，便能向选民展现焕发活力的经济和一个完善的福利体系，如此一来，我们下次连任的希望也未必渺茫。"
 ita_our_centro_sinistra:0 "我们的“中左联盟”"
 ita_our_centro_sinistra_desc:0 "The government is officially formed, and now we will see whether this strange, hybrid center-left coalition can hold the pull coming from its extremist currents. For now, our allies are loyal, just as we intend to be, but we need to stay vigilant: the clash between the worker and the capitalists is as old as the very concept of \"economy\", and even if today we cooperate towards a better future for everyone, there's no guarantee that tomorrow they'll try to destroy what they themselves built with us. Still, today is a day for celebration! The first democratic government in forty years is born, and we intend to show all Italians, even fascists, that we don't need dictators to bring prosperity to our beloved country!"
 ita_unita_socialista:0 "“社会主义统一”"
 ita_unita_socialista_desc:0 "我们对基督教民主党难以寄予信任。\n\n莫罗尽管温和进步，但他终究是教会与商界的代言人，与我们的竞争对手直接携手合作，往往难以开出善果。我们与萨拉盖特的谈判正顺利进行，预计不久将敲定联盟方案：我们的计划大体相合，目前亟待解决的问题是如何整合联盟中的众多小党派，防止它们因民主阵线的重组而分崩离析。"
 ita_hijack_the_PRI:0 "控制意大利共和党"
 ita_hijack_the_PRI_desc:0 "意大利共和党在我们联盟中虽只是一个小角色，但他们的共和思想给我们带来的麻烦却远比他们所带来的选票大得多。他们已经对我们的新政府在群众中的形象产生了负面影响。为此，我们不能容许他们继续在民主阵线内存留：目前我们正与该党领导人乌戈·拉马尔法进行谈判，他若解散其党派并全盘并入意大利社会党，便可在我们的内阁中获得一个要职。\n\n我们正努力确保，一旦意大利共和党与意大利社会党合并，他们的议员将忠于我们，而非拉马尔法，我们以确保他们在立法任期结束时能够连任的承诺来赢得他们的忠诚。"
 ita_absorb_the_PdAz:0 "吸收行动党"
 ita_absorb_the_PdAz_desc:0 "行动党，民主阵线中的一个小型政党，面对民主阵线重组的巨浪，终于不堪重负，宣布解散。如今，这些行动党议员如同无根的浮萍，他们对于他们在本届乃至下一届议会中的前景，感到忧心忡忡。面对他们的迷茫，意大利社会党愿意伸出橄榄枝，为他们提供一个理想的归宿，意大利社会党的大门将为他们敞开！\n\n我们以保障连任和党内要职为饵，定能吸引他们中的大多数甚至可能全部成员，众人正纷纷投向我们日益壮大的怀抱，共同为政府的稳定添砖加瓦。"
 ita_wrangle_the_PSI:0 "与意大利社会党争辩"
 ita_wrangle_the_PSI_desc:0 "我们的党，本应是团结一心的堡垒，现在却成了激进分子的荫庇之所，如果我们不顾及他们对社会的极端理念，他们便会毫不犹豫地破坏我们新成立的政府，反将我们一军。虽然我们曾经为了保全左翼协和之名对他们的行径采取漠视态度，但议会的安危现已迫在眉睫，我们不能再对这个问题视而不见。\n\n我们的党派将坚定不移地支持南尼：任何反对彼得罗·南尼及其改革计划的人，都是在削弱意大利社会党本身，这样的人在党内和议会中都不会被容忍！若有议员心存异议，门在那边：请便，带着你的不满离开……并且请记得随手关门！"
 ita_isolate_the_radicals:0 "隔离激进分子"
 ita_isolate_the_radicals_desc:0 "我们虽然在选举中获胜，但意大利距离成为社会主义国家还有很长的路要走：四十年的独裁统治加上教廷的深远影响，使得许多地区，尤其是农村地区，仍然深陷保守甚至反动的泥潭。\n\n民主阵线中一些更为“理想主义”的成员的激烈宣言，让许多人忧心忡忡：提倡福利和保护穷人？我们欣然接受！但要废除私有财产，将教堂变为兵营，高唱《国际歌》？那就敬谢不敏了！\n\n此外，有流言称奎里纳尔宫正举行着国王顾问与军事情报局和军队高层之间的密谈：虽然这些只是传言，但我们必须谨慎行事，从政府和党的重要岗位上撤换那些可能激化民愤，甚至招致更甚之灾的人。"
 ita_the_future_belongs_to_refromers:0 "属于改良派的未来"
 ita_the_future_belongs_to_refromers_desc:0 "经过漫长的讨论，新政府终于迎来了其大展宏图的时刻！议会因我们的改革而变得生机勃勃，这些改革正在经历着实施前的必要流程。\n\n尽管我们和盟友仍然坚定地支持南尼的政府，但在我们的忠实选民中，却已经有人因意大利社会党背离了其竞选时的激进承诺而感到失望：这种失望在政府任期结束时的选举中必将显现。\n\n不过，我们有四年的时间去扭转乾坤，用行动证明我们的承诺：当改革落地生根，福利体系全面铺开，那些贫困和弱势的群体在那时将会真心感激我们。"
 ita_encourage_the_cooperatives:0 "鼓励合作社"
 ita_encourage_the_cooperatives_desc:0 "合作社乃我们经济改革之基石：我们的目标不仅仅是协助工人，更要彻底变革企业的经营方式。在合作社内，没有单一的“所有者”，而是所有工人共同经营，平等地根据预定比例分配收益。\n\n此法能将社会主义之精髓落到实处：“各尽所能，各取所需”。\n\n改革之风将助力合作社之花盛开，即便是文盲工人亦能轻松组建。虽然这种模式可能不会完全取代传统的企业经营方式，但新系统之优势，将逐渐被工人们发现到，随着时间推移，必将被越来越多的人采纳它。"
 ita_weave_the_welfare_net:0 "编织福利之网"
 ita_weave_the_welfare_net_desc:0 "胜利之后，外交和社会经济的双重危机给我们国家带来了沉重的打击，尽管这场危机已基本得到控制，但沿海城市，尤其是那些因海军工业崩溃而失业的成千上万的人们，仍然深受其害。\n\n我们将建立一个全面而公正的福利体系，以援助这些失业者。这个体系将摒弃法西斯时期福利体系的党派门槛和裙带关系，让福利真正惠及每一位需要帮助的人。虽然初期成本可能不菲，但我们计划通过接下来的改革，增加就业机会，减少对补贴的依赖，让经济逐步回归正轨，实现持续增长。"
 ita_sow_dissent_in_DC:0 "在基督教民主党中散播异议"
 ita_sow_dissent_in_DC_desc:0 "基督教民主党是一个规模庞大的政党，内部派系林立，党内人物为了争夺党机关的控制权而激烈角逐。这正好为我们提供了一个暗中扶持进步派系，以制衡基督教民主党党内其他势力的良机。不论莫罗是否真的期待我们对他的支持，这都无关紧要：南尼轻描淡写几句赞美，便足以触怒那些保守派，令其自乱阵脚，从而削弱其整体力量。我们则趁此机会，在议会中巩固势力，加强我们的掌控。而那第二大党，正忙于内讧，自相矛盾，无暇外顾，恰似一盘散沙。"
 ita_claim_the_sabres:0 "安抚军方"
 ita_claim_the_sabres_desc:0 "昨夜，在一场激烈的内阁会议中，我们最担忧的事情得到了证实：传闻中国王的顾问、军事情报机构和军方高层确有秘密接触！\n\n鉴于我们一贯的反军国主义言论，军队现在似乎认为我们试图罢黜国王并发起共产主义革命！尽管我们不可否认，我们中的一些前激进议员确实发表过针对军队和君主制的攻击性言论，但随着他们的自我引退，我们原以为风波已平。\n\n明日，国防部长将私下会晤总参谋长、诸位高级将领及军事情报局要员，重申我们对《阿尔贝托法令》的尊重，并阐明军队改革的初衷——旨在提升战斗效能，而非孕育政治野心。\n\n唯愿此举足以避免一场危机……"
 ita_mediterranean_economic_integration:0 "地中海经济一体化"
 ita_mediterranean_economic_integration_desc:0 "在上一次世界大战，我们以血肉之躯换来了广袤的殖民帝国和更广阔的势力范围。法西斯主义者曾怀有一个荒谬的梦想，企图在新的罗马帝国中将殖民地意大利化，然而这不过是空中楼阁：当地居民或许尚且能忍受我们的统治——毕竟，与世界上的其他地方相比，我们还未对抗议者使用凝固汽油弹和毒气——但即便如此，他们的心也永远不会向我们敞开。\n\n与其徒劳地撞南墙，不如转变思路，将这个摇摇欲坠的殖民帝国，转变为一个和谐共融的经济共同体，这在长远来看，无疑是事半功倍，利益长远。\n\n我们应该向意大利势力范围内的国家投资，并借助宣传之手，展示我们与其他殖民者的不同，这不仅能修复与当地居民的关系，更能防患于未然，避免因一场突如其来的大规模起义而一夜之间失去所有……"
 ita_the_slow_march_of_progress:0 "缓慢的进步行军"
 ita_the_slow_march_of_progress_desc:0 "慢行能致远，稳中可求胜！\n\n虽然一些急进者讥讽我们的改革步调“缓不济急”，但无人能否认，我们在短时间内已经取得了累累硕果：如今，意大利工人已摆脱了那些生产资料所有者的剥削，转而与他们携手合作，在彼此尊重的前提下共创未来。新兴的合作社正潜移默化地影响着那些守旧的庄园主，促使他们重新审视集体合同。弱势群体和贫困者，如今已在我们牢固的福利网中找到了庇护之所，即便偶有挫折，这里也有温情的依靠，直至他们能够东山再起，再次担负起养家糊口的责任。终于，意大利可以卸下法西斯的沉重包袱，带着希望的微笑，迎接曙光，因为一轮充满希望的新日正在向她冉冉升起。"
 ita_rally_international_support:0 "集结国际支持"
 ita_rally_international_support_desc:0 "意大利历经四十多年的独裁统治，这早已让自由世界对我们敬而远之。如今，我们重返民主的怀抱，我们应当全力以赴，向所有民主国家再次重申我们对自由的承诺。\n\n得益于齐亚诺的温和策略，我们在自由国家组织各地设立了大使馆。这些大使们将不遗余力地向世界宣扬我们政府的变革之声，期盼美国及其盟友能够与我们冰释前嫌，重建信任。随之而来的贸易协议，或许只是水到渠成的结果……"
 ita_world_peace_council:0 "世界和平理事会"
 ita_world_peace_council_desc:0 "战争一度成为多国外交的焦点，但半个世纪不到，我们就目睹了人类历史上最为惨烈的两次战争。如今，作为世界大战的胜利者和新兴的民主国家，我们肩负着促进各国友好关系的重任。尽管不是所有人都会听从我们的倡议，但我们坚信，那些追求和平、反对无谓战争的呼声，已远远超过了那些沉溺于死亡与暴力的少数派。\n\n我们将推动一项长期的外交倡议，将我们的调解服务置于那些濒临战争边缘的国家之间。每一场得以避免的冲突，都意味着无数生灵免遭涂炭，这本身就是一种莫大的成功。"
 ita_the_struggle_for_antifascist_unity:0 "反法西斯统一斗争"
 ita_the_struggle_for_antifascist_unity_desc:0 "意大利的人民群众们！不要为自己畅所欲言而感到惶恐不安！如果自由不包括批评政府的权利，那它就是空谈，现在大家终于可以纵情讨论你们为我国设想的未来了！\n\n然而，大家也必须要铭记，今日重获的，也许明日就会再被夺走：法西斯主义，民族社会主义，以及其他的独裁暴政都不过是人们对稳定和秩序的扭曲反映，如果我们不放下成见，各尽所能保卫我们年轻的民主，那么我们认为早已化为齑粉的鬼魂也许会比我们想象中更快归来……"
 ita_push_for_electoral_reform:0 "推动选举改革"
 ita_push_for_electoral_reform_desc:0 "昔日的阿切尔博法案规定，只要某个党派赢得选举，哪怕只赢一票，也能够取得绝对多数。齐亚诺已经废止了这些法案，但我们仍旧认为现行的选举法无法保证所有的政党在一公平的平台上竞争。\n\n为此，我们将通过一项全新的选举法，采取完全的比例代表制，让每一票都分量十足，在议会中得到相应的席位。该法律一旦全面生效，我们还打算将其扩展至地方选举。如此，意大利方能成为名副其实的民主国家。"
 ita_a_simpler_bureaucracy:0 "简化官僚机构"
 ita_a_simpler_bureaucracy_desc:0 "官僚体系，犹如空气，对国家至关重要，平常无事之时，人们甚至察觉不到它的存在，然而一旦它不能尽责，国家便难以呼吸。在重建意大利民主制度的征途上，在重建意大利民主制度的征途上，我们不可忽视官僚体系及其对平民百姓的亲近性：许多人不得不忍受专横的管理，许多人被剥夺了改变命运的希望。\n\n我们必须确保所有与政府打交道的民众都能得到公正的待遇，同时伸出援手，帮助那些因贫困而无法自立的人获得更高层次教育的机会，共同铸就一个公平、民主的社会。"
 ita_pace_liberta_lavoro:0 "和平、自由、劳动"
 ita_pace_liberta_lavoro_desc:0 "经过深思熟虑的筹备，我们即将开启我们最宏伟的改革篇章。我们将致力于三大核心原则，这些原则正是我们选举承诺的基石！\n\n以和平之名，我们将不再压迫我们势力范围内的殖民地，而是致力于为构建一个真正的平等社群奠定基础，摒弃那些被操纵者操控的傀儡戏码。\n\n以自由之名，我们将废除所有法西斯法律：虽然初期改革已经剔除了那些最残暴的法律，但仍有众多不公正或不自由的法律束缚着我们的人民，我们必须彻底纠正这些不公，让正义得以伸张。\n\n最后，以工作之名，我们将确保没有工人受到企业的剥削，确保意大利的每个男男女女都不必为了生计而低声下气。"
 ita_repurposing_old_tools:0 "改进利用旧工具"
 ita_repurposing_old_tools_desc:0 "工业复兴公司，虽根植于法西斯时期，现在却与我们的新经济理念相得益彰：它在维护自由市场的基础上，通过国有企业的有力干预，避免工业的衰败的同时推动小企业顺应我们的新改革，避免经济崩溃。工业复兴公司还将在全国范围内资助多种激励和发展计划，助力意大利的不发达地区，乃至我们势力圈内的弱势成员，一起迈向繁荣之路。\n\n当然，首要任务是清理工业复兴公司董事会中的法西斯余孽、无能之辈和腐败分子，确保它能够真正地贯彻政府的方针，而不是追逐私利，更不是成为敌对势力的马前卒。"
 ita_terra_e_liberta:0 "土地与自由"
 ita_terra_e_liberta_desc:0 "土地是自由的源泉，我们怎能容忍自由之花在不同人手中绽放得不均？土地过于集中在少数人手中，这局面亟待扭转：大庄园主们，如同封建残余的堡垒，贵族与富商云集其中。他们固步自封，拒绝革新，不思进取，只知利用陈旧手段，通过苛刻合同，从佃农手中榨取每一分血汗钱。\n\n我们对国王的忠诚天地可鉴，但我们必须昭告天下，中世纪的封建制度已经一去不复返：因此，我们将以公平和合作的精神，鼓励地主们将土地以优惠之价售予佃农，并承诺给予他们税收减免和创新补贴。若有地主对我们的温和手段置若罔闻，那么他们的土地将被以最低限度的补偿纳为国有，并重新分配给那些更配得上它们的人：工人阶级的自由权利，我们誓死捍卫，绝不让步！"
 ita_empower_the_unions:0 "赋予工会权力"
 ita_empower_the_unions_desc:0 "工会，社会主义的坚强柱石：它们在工厂至国家的各个层面为工人筑起保护之墙，与企业主展开协商，以提升劳动条件和薪酬。为确保工会能无畏无惧地履行其职责，我们将保障它们免受企业主及其党羽的威胁。\n\n议会将制定新法，确立工人组建或加入独立工会的权利，以及工会代表参与与企业主的集体谈判的权利，对于任何阻挠工人维权的行为，将严惩不贷。"
 ita_modernize_the_system:0 "教育系统现代化"
 ita_modernize_the_system_desc:0 "秦梯利教育改革，虽为法西斯主义留下的一抹亮色，却未能彻底照亮我们的教育体系。基础教育虽已普及，但高等教育仍旧是富家子弟和权势之家的专属，在这个扭曲体系下，一个农民的儿子，即便稍有才华，也难逃其父辈的命运。\n\n尽管我们的资源有限，但手头的经费尚可确保那些贫困的家庭无需为学费发愁，教科书将由国家免费提供。为提高出勤率，我们将开办夜校教授家长精进自己的职业技能，或许还能借此改善他们的经济状况，让孩子们不再因家贫而辍学，不再被迫去田间或工厂劳作，而是有机会书写不同的命运。"
 ita_banish_unemployemnt:0 "劳动者法令"
 ita_banish_unemployemnt_desc:0 "《劳工法令》将成为维护工人权益、对抗企业主的基石，并成为规范职场万象的根本大法。它汇聚了我们至今推行的各项小改小革：工人的招聘与解雇程序将被规范，工厂内的工会活动也将受到合理约束，工会与工业家总联合会所缔结的集体合同将依法获得不可侵犯的公共效力，确保劳动合同无一例外地遵循这些准则。\n\n工人即将迎来破晓的曙光，一个他们能够按己意劳作，按劳取酬的新时代！"
 ita_reign_in_confindustria:0 "驾驭工业家总联合会"
 ita_reign_in_confindustria_desc:0 "工业家总联合会是个由商界领袖而非工人组成的特殊工会。为了改善工人的境况，我们愿意与其化干戈为玉帛，以和为贵，携手共进。\n\n切记，时移世易，如今工人阶级已在议会和政府中占据了一席之地。若工业家总联合会企图阻挠我们的改革，或以罢工相威胁，我们将毫不犹豫地展现我们的力量：经济和财政部长已手握一项法令，只待一纸令下，便可以国家之名征用那些试图罢工的企业，并对任何破坏工会或剥削工人的商人施以重罚。\n\n基吉宫的天已然拂晓，天下人皆须顺应此变。"
 ita_bring_the_front_to_those_behind:0 "生来后进者，向阵线前来"
 ita_bring_the_front_to_those_behind_desc:0 "我们的计划虽以工人为重，但政府亦不忘那些声微力薄的群体：妇女、失业者、移民与原住民，他们往往在工人阶级的激昂言辞中被忽略。\n\n我们将为他们争取应有的正义。\n\n妇女将摆脱依附，享有与男性平等的离婚自由和继承权，在同工同酬中彰显女性独立。失业者和移民将得到生活补贴，助他们及子女开启更幸福的生活篇章。我们海外领土的原住民将不再受欧洲人统治之苦，他们将重获昔日被夺走的一切。\n\n今日，意大利焕发新颜，一个让每个人都能自豪以对的国度正昂首阔步而来。"
 ita_avanti:0 "前进！"
 ita_avanti_desc:0 "奋勇向前！\n\n意大利的儿女们，振臂高呼，勇往直前！十载光阴似箭，回首往昔，我们曾被法西斯的铁蹄所压迫，诚实之人因言多必失而提心吊胆，人人自危；工人们为那些将他们视若无睹的雇主辛勤耕耘；而那些贫苦与受压迫者，在他们自诩的“进步”巨轮下被无情摧残，这一切，竟成了那些虚有其表的纪念碑下的无言基石。\n\n现在，我们已然凤凰涅槃，新生的意大利如同破茧重生的蝴蝶，展翅高飞，成为了一个繁荣公正的国度。我们自豪地与世界各国的民主伙伴并肩，站在时代进步与繁荣的潮头。这一切成就，是意大利男男女女共同努力的结晶。\n\n民主可贵！自由万岁！前进，意大利！"
 ita_prima_il_socialismo:0 "社会主义优先"
 ita_prima_il_socialismo_desc:0 "当人们投下他们手中的票时，他们不是投给一个有水分的中左翼政府，而是投给社会主义，投给庇护，投给自由，这些都是我们最终将会献给他们的！我们的计划将会得到全面贯彻，而不会顾及那些旧秩序的余孽：要么他们接受真正的力量，这种力量只来源于帮助弱者与保护有需要者，要么他们就会被即将到来的浪潮卷走……"
 ita_a_meeting_in_livorno:0 "里窝那的会面"
 ita_a_meeting_in_livorno_desc:0 "我们已经决定走社会主义道路，可具体怎么走还没有定论。岔路出在这：意大利虽已摆脱四十年的独裁统治，但不能忘记，我国本质上还是君主制国家。要建成真正意义上的社会主义国家，就需要废除君主制，而这会极大拨动保皇派的心弦。当然也可以在现行宪法框架内继续行事，能让社会转型更加顺利。可君主制得以延续，又只会让我们的选民失望……\n\n我们将在里窝那的哥尔多尼剧院与贝林格和民主阵线的其他重要成员举行场非常隐蔽的会议，最终就手中的问题达成共识。"
 ita_via_italiana_al_socialism:0 "意大利走向社会主义的道路"
 ita_via_italiana_al_socialism_desc:0 "在阿尔贝蒂诺宪章的框架下，我们做出了最终决定：毫无疑问，在意大利实现全面的社会主义理想尚待时日，但现在我们却有一个向民众展示我们胸怀天下、情系众生的政府形象的机会。若能向国王表明，我们无意颠覆现状，不会将企业主送入劳改营，亦不会在集会上唱响《国际歌》，国王或将成为我们坚强的后盾。\n\n明日，南尼将在奎里纳尔宫与国王翁贝托二世晤面，并正式被任命为意大利王国首相。对某些人而言，这似乎是一次挫折，但实际上，这正是我们胜利之路的开端。"
 ita_use_berlinguer:0 "动用贝林格"
 ita_use_berlinguer_desc:0 "恩里科·贝林格，民主阵线中的璀璨明星，他与众不同，以其共产主义者的身份自豪，并毫不掩饰。他拥有超凡的魅力和深邃的政治智慧，知晓何时该缄默，何时该与众协力，这一切全为守护工人的福祉。\n\n在选举的征途上，他与民主阵线之外的左翼政党缔结了坚实的联盟，这份关系在我们独立组建政府时显得尤为宝贵。他将担纲我们在议会信任投票前的谈判重任，引领我们迈向胜利的曙光。"
 ita_condemn_the_BN:0 "谴责国民联盟"
 ita_condemn_the_BN_desc:0 "我们的媒体已经发起了一场毫不留情的攻势，目标直指国民联盟：在他们的同盟中，有不少人曾在几年前自豪地身着黑衫，高举右臂，招摇过市。他们虽然口口声声说要尊重民主，但我们深知，一旦他们得势，必将重蹈覆辙：四十年前的历史，我们记忆犹新。\n\n其他党派，尤其是基督教民主党的改革派中，许多人同样对他们嗤之以鼻，我们的运动可能会赢得他们的支持，共同防范意大利再次堕入独裁的深渊。"
 ita_vote_for_FD_vote_for_you:0 "投票给民主阵线就是为自己投票"
 ita_vote_for_FD_vote_for_you_desc:0 "与其他政党不同，我们才是真正心怀意大利民众福祉的人。我们是唯一真正希望帮助工人自我解放的政党，不似他人仅仅施以杯水车薪，却自夸为慷慨。对基督教民主党所言的“基督教社会教义”，我们持怀疑态度：真正的社会教义乃是社会主义，我们将践行之，为人民开辟通往平等与繁荣之路。同胞们，请铭记：投国民联盟一票，便是重蹈墨索里尼旧辙；投基督教民主党一票，便是为商贾张目；而投民主阵线一票，才是为自己发声。"
 ita_vote_for_FD_vote_for_you_tt:0 "这将提高民主阵线的支持率。"
 ita_rally_the_constitutional_arc:0 "集结宪法势力"
 ita_rally_the_constitutional_arc_desc:0 "四十年前，法西斯主义之所以能够崛起，是因为那些本应制止它的力量分崩离析，未能形成合力，甚至有人为了一己私利与法西斯勾结，直至最后才幡然醒悟：法西斯从不与人“分享”权力，他们贪婪地渴望独占一切。\n\n如今，我们必须携手并肩，以防历史悲剧的重演：法西斯的幽灵仍在那些企图将我们束缚于国家意志之下的人心中徘徊。若你真心珍视自由、民主和意大利的未来，请加入民主阵线，与我们同舟共济。"
 ita_revolution_by_ballot:0 "选票带来革命"
 ita_revolution_by_ballot_desc:0 "选票已然发声，我们必将回应：不同于俄罗斯人那样以血与火铺就社会主义之路，意大利将以和风细雨的方式拥抱社会主义。我们在议会中已占据压倒性多数，足以稳妥地推动一切改革，将意大利王国转变为意大利社会主义共和国。\n\n国王及旧秩序的残余势力或许会图谋阻挠，但我们有人民作为坚强后盾：人民对我们成功的信赖正是我们勇往直前的全部动力。"
 ita_decry_the_king:0 "批评国王"
 ita_decry_the_king_desc:0 "“翁贝托二世，承蒙上帝恩典及国民意愿成为意大利国王”\n\n阿尔贝蒂诺宪章如是宣称，然而真相远非如此：王室剥削劳工，与其他贵族和商贾无异，而国王本人必然有我们可以利用的弱点。\n\n关于国王的私生活，有些……流言蜚语：尽管国王已有子嗣，但传言他私下与男性有染。我们将借助这些流言，以及任何其他可能揭露的秘密，通过媒体发起一场舆论战，潜移默化地改变公众对王室的看法。尽管我们预计此举会遭遇在政治上的激烈反击，但这将有助于掩盖我们的下一步行动……"
 ita_rally_the_people:0 "集结人民"
 ita_rally_the_people_desc:0 "要使改革深入人心，我们的首要之务便是向社会展现民众对我们改革的热烈拥护。\n\n从罗马到米兰，从那不勒斯到都灵，再到威尼斯与佛罗伦萨，我们的党组织将举办一系列盛大的群众集会，以声援政府的政治经济方略。放眼望去，尽是社会主义和共产主义的滚滚人潮。人们将亲眼见证，我们并非传说中的怪物，我们正稳步引领着他们走向社会主义的康庄大道。"
 ita_purge_the_armed_forces:0 "清洗武装部队"
 ita_purge_the_armed_forces_desc:0 "军队长期效忠于资产阶级，它们不会心甘情愿地接受社会主义。\n\n此举虽如履薄冰，但我们必须以铁腕手段改变他们的想法，这是必要之恶：我们在总参谋部的眼线已经锁定了那些坚决反对改革的将军们，并准备用他们干预政治的证据来指控他们犯有叛国罪。\n\n这将在政府与军方之间掀起前所未有的波澜，但通过逮捕这些反对者，军队剩下的成员将得到震慑，我们要提醒他们不忘初心，忠诚于民，同时，也要让那些背离了人民信任的人深刻领悟到，他们行为的代价几何。"
 ita_o_la_repubblica_o_il_caos:0 "共和国或混乱"
 ita_o_la_repubblica_o_il_caos_desc:0 "时机已至，让我们将意大利从君主制的枷锁中解放，一并摆脱那些阻碍国家潜力发挥的陈规旧制！意大利将和平转变为一个完整的共和国：公投提案已经准备就绪，将在明日清晨开始投票。我们在议会中占据绝对多数，无人能够阻挠我们的步伐，人民将迎来数世纪以来的首次机会，他们得以自主决定自己的命运和政府形式。\n\n国王或许会试图阻挠我们，但如果他拒绝法律的颁布，只会弄巧成拙，激起民变，成为自由和民主的公敌。这是决定性的时刻！意大利共和国，机不可失，时不再来！"
 ita_the_front_reforged:0 "重塑阵线"
 ita_the_front_reforged_desc:0 "民主阵线现已力量倍增，正准备全心全意支持我们的政府，现在我们可以着手于将提出的改革付诸实践：议会里已是一片繁忙景象，草案正从各部委流向各党派的杰出议员，供他们审阅并决定是否予以支持。\n\n虽然兑现我们的承诺道阻且长，但这并不妨碍我们竭尽所能，奋力前行。"
 ita_rage_against_the_machine:0 "暴力反抗机器"
 ita_rage_against_the_machine_desc:0 "在资本主义经济体制下，那些在工厂辛勤劳作的人的生活状况往往与那些坐享其成的人截然不同：富商巨贾、贵族官僚，他们从工人手中掠夺一切，却一毛不拔。改变这一现状的时刻已经到来。\n\n我们新近的改革措施将要求企业主与那些真正创造利润的工人们共享大部分收益，而对那些顽固不化、反对新政策的人，我们将重拳出击，甚至威胁要无偿没收他们的财产。我们正致力于将工人从精英的枷锁中解放出来的斗争，我们的脚步不会停歇，直至我们达成了我们所宣称的目标。"
 ita_sweeping_nationalization_efforts:0 "全面国有化的尝试"
 ita_sweeping_nationalization_efforts_desc:0 "工业复兴公司已扬帆起航，启动了其设想的公共投资计划，然而其在说服所有企业与我们的改革大业同行时，仍显力有未逮：它的话语权尚需加强。工业复兴公司虽财大气粗，但预算亦有其极限。我们的经济和财政部长已提议，推行国有化政策，将那些反对者的大企业和工业纳入工业复兴公司的麾下，从而壮大其经济实力。\n\n当然，我们会给予这些企业所有者适当的补偿——毕竟，我们还需要给国王一个交代——但此举所传递的信号将不言而喻：要么与我们风雨同舟，要么就在工业复兴公司的泰山压顶之势之下崩溃吧。"
 ita_consigli_di_fabbrica:0 "工人委员会"
 ita_consigli_di_fabbrica_desc:0 "我们不应仅仅满足于成立工会，而应更进一步，设立工厂委员会——这里是工人的小型议事堂，每位工人都能根据企业规模，选出与其企业人数相称的代表。这些委员会将定期召开，就工人内部的事务进行讨论，并推选出一名总工厂代表。这位代表将就工资、安全、罢工等与工作息息相关的事宜，与企业主进行对话，从而为工人群体争取统一而有力的话语权。我们无意彻底废除私有财产和企业所有制，但我们绝不允许工人再受剥削之苦。我们要让每个声音都能被听见，让自由之花在每个人心中绽放！"
 ita_decry_armed_forces_influence:0 "批评武装部队的影响"
 ita_decry_armed_forces_influence_desc:0 "我们对军队保持敬意，不想与之敌对，然而一些将军却对媒体发出了声色俱厉的警告，他们对社会主义政变的阴影忧心忡忡。对此，我们岂能置若罔闻：我们的媒体将大声疾呼，斥责他们正搅动民主的清流，同时警惕军队可能掀起的新法西斯逆流。在幕后，我们的国防部长将与国王密谈，倾诉我们的忧虑。\n\n或许，这些风波终将平息，但在国王的斡旋之下，军队或将学会与我们的政府和平共处，领悟到民主有时也会孕育出不合己意的果实的事实。"
 ita_an_empire_made_into_a_community:0 "从帝国到共同体"
 ita_an_empire_made_into_a_community_desc:0 "意大利国内变革之际，也是我们对外领域进行改革之时。昔日殖民帝国内，充斥着压迫成性的总督、军事独裁的阴影和腐败无能的政府，这些仅靠武力维系的局面已是过去式，如今是时候翻开新的篇章，向更好的方向发展。\n\n我们将向那些曾受殖民政府剥削的人们给予补偿，并逐步将自治权下放，赋予那些擅长行政管理、有能力为独立政府打下基础的原住民更多职能，待一切成熟，他们将接管这些前殖民地。\n\n同时，在我们的势力范围内，我们将推动民主化进程，提供发展激励，与反对派进行对话，以期关系正常化，保持我们在地中海的主导地位。\n\n若改革成功，我们将把一个功能失调的殖民帝国，转变为一个充满活力的经济共同体。这个共同体将不再依靠武力维系，而是借助共同的民主理念和共享的经济利益来团结，这无疑将在未来为我们带来丰厚的回报。"
 ita_the_steady_pace_of_change:0 "变革的平稳步伐"
 ita_the_steady_pace_of_change_desc:0 "终于，大功告成：改革已落地生根，正以稳健的步伐前行，我们正将意大利塑造成一个真正的社会主义国家，这里没有政治清洗，没有古拉格的阴霾，更难得的是，我们能与那些思想迥异的人和谐共处。民主，恰似一把双刃剑，但只要我们持之以稳，它只会斩向那些心怀不轨之人。\n\n在这动荡的岁月里，这希望如同荒漠中的一朵小花，脆弱却坚韧：我们能否守护这份希望之光？当混乱如同围城之师步步紧逼，阴狠的秃鹫于空中盘旋，伺机而动，我们是否还能憧憬一个更加光明的未来？时间会给出答案，但有一点毋庸置疑：不论风云如何变幻，我们都将誓死捍卫人民的安宁！意大利万岁！社会主义万岁！"
 FD.1.t:0 "作家难题"
 FD.1.d:0 "恩齐奥弓身于案前，笔记如落叶般遍布精雕细琢的木桌，甚至已有些掉落至下方的聚酯地毯。他汇集了浩如烟海的资料，其内容涉及两位思想巨擘为争夺民主阵线主导权的较量。若要逐一翻阅，即便是那早已作古且好为人师的领袖，也会因枯燥乏味而昏昏欲睡。即便如此，恩齐奥明白，他必须从这堆文学瑰宝中，提炼出精华所在。\n\n与萨拉盖特的交流，让恩齐奥惊诧于其平易近人之风。他气度从容，未曾对恩齐奥疾言厉色，亦未强加任何意识形态之束缚。对于恩齐奥关于党纲的每一个疑问，萨拉盖特总是不厌其详地阐述，展示其对未来的宏伟蓝图。在恩齐奥眼中，他看到的萨拉盖特不仅是一位矢志不渝之人，更是对民主与意大利民众许下深沉承诺的政治家。在政治这个尔虞我诈的领域，萨拉盖特堪称一股清流。\n\n然而，南尼却截然不同。在萨拉盖特身边，恩齐奥感受到的是如沐春风的母爱；而在南尼面前，他感受到的则是如雷霆万钧的父怒——对意大利及其政府中根深蒂固的不公的愤怒。南尼毫不掩饰地向恩齐奥宣扬，社会主义是拯救意大利免于沉沦法西斯的唯一途径。虽然恩齐奥对这番高谈阔论尚未全然信服，但他实在是被南尼对其理想的坚定执着感染到了。在南尼这样激情燃烧的领袖引领下，社会主义的意大利似乎仍是遥不可及，却又似乎触手可及。\n\n恩齐奥再次埋首于笔记之中，决心在晨曦到来前完成他的专栏。"
 FD.1.a:0 "萨拉盖特之谦逊，乃铸就意大利辉煌之钥。"
 FD.1.b:0 "南尼的热忱将照亮意大利通往新时代的道路！"
 FD.2.t:0 "萨拉盖特必胜"
 FD.2.d:0 "在罗马，政治已经成为了街头巷尾的热议话题，每个市民都对国是充满热忱。话题焦点，便是朱塞佩·萨拉盖特在民主阵线内部的角逐中一举夺魁，荣升为总书记的喜讯；而彼得罗·南尼则众望所归，被推选为主席。\n\n朱塞佩·萨拉盖特，以温和的性格著称，政治理念亦不偏不倚，近年来凭借其深谋远虑，赢得了广泛的赞誉。然而，胜利之后，当萨拉盖特派成员向彼得罗·南尼展示民主阵线的未来蓝图时，内部的分歧开始显现，他们提出了两条迥然不同的道路。\n\n阵线提出的首个方案较为温和，提议与基督教民主党携手，汇聚民主阵线内的温和派，共筑一个受阿尔多·莫罗青睐的社会民主党政府。莫罗以善于调和著称，愿意在他的队伍中包容保守派和君主主义者。若能促成南尼、萨拉盖特与莫罗的三强联合，社会民主主义将迎来新的春天。此联盟有望化解保守派的阻力，使我们的政策执行更为顺畅。然而，这一策略在民主阵线内部可能激起波澜，部分选民或将此联盟视为左派的妥协，这不仅可能动摇民主阵线的支持基础，更可能对其连任之路构成挑战。\n\n另一个方案，虽然更纯粹，但风险也更大。走左翼团结的道路意味着民主阵线将独立组建政府，形成一个无需依赖基督教民主党的温和左翼集团，扫除实现我们对意大利的愿景之路上的掣肘。这种符合人民期望的政策显然有利于我们连任，而团结的左翼也将保证政府的稳定运行。然而，我们也要警惕其中的风险，毕竟国内保守派对社会主义掌权的前景可能会感到十分忧虑。\n\n在民主阵线各派系的焦急等待中，南尼终于做出了决定："
 FD.2.a:0 "为了构建一个稳定而高效的政府，与莫罗组建红白联盟。"
 FD.2.a.tt:0 "我们将不遗余力，与基督教民主党携手，共谋发展大计。"
 FD.2.b:0 "为了意大利民众，筑起社会主义下的民主政府！"
 FD.2.b.tt:0 "我们将致力于巩固民主阵线。"
 FD.3.t:0 "另一个三头同盟"
 FD.3.d:0 "在咖啡馆一隅，南尼与萨拉盖特早已围坐在一张小圆桌旁，静候阿尔多·莫罗的到来。莫罗心里暗想，他们选位置倒是挺有心的，但他并未心存幻想。他一走近，两人便起身与其握手，落座后点了咖啡。南尼开门见山，声如洪钟：“党内对我们这次的会面颇有微词。”莫罗只是微微一笑，不知这是否暗藏玄机。随即南尼笑了，三人便直入主题。\n\n数小时的讨论井然有序——南尼侃侃而谈，萨拉盖特言简意赅，莫罗则点到为止。会谈结束时，一切已昭然若揭，联盟协议已经摆在了桌面上。莫罗心中暗自惊喜，他发现他们之间在某些议题上并未完全达成共识，但每个人都能从讨论中找到可向党内人交待的点，讨论结束，三者约定了不久后的再次会面。\n\n莫罗步出咖啡馆，他心中已有盘算——此番斡旋已初见成效。南尼在萨拉盖特的辅助下表现得十分理智，当南尼每次谈论到触及两党分歧的话题时，萨拉盖特总能巧妙地将对话引回到双方的共识点上。毕竟，政治就是一门妥协的艺术，莫罗已在这门艺术中尽力争取了最多。轻松的部分已然落幕。"
 FD.3.a:0 "告诉安德烈奥蒂，基督教民主党将与彼得罗·南尼携手并进。"
 FD.4.t:0 "太多，太快"
 FD.4.d:0 "在广场的喷泉边，温琴佐和保罗相邻而坐。我们的党近日又一次向那些软骨头的温和派低头，这次是为了党纲中关于君主制的议题。我们本应将王室的丑行公之于众！现在却要对那些养尊处优的愚人以礼相待。社会党竟向王室折腰，真是令人难以置信！这两位青年对此愤慨不已，对这场政治闹剧展开了激烈的辩论。\n\n“保罗，我真的想说，我已经到了忍无可忍的地步！我们曾被承诺意大利将实现社会主义，他们说服我们为了人民的利益与萨拉盖特及其社会民主党合作。但看看现在我们已经落到了什么田地！明明是我们赢得选举，现在胜者倒好像成了基督教民主党，看看我们的党纲变得多么面目全非。我对这些无知之徒的妥协已到极限，他们将把我们推向另一个墨索里尼的怀抱！”\n\n“我感同身受，温琴佐，此情此景确实令人难以忍受。若这只是一次小小的妥协，或许还能接受。但眼看着我们一天天背离社会主义的初衷，变得越来越像资产阶级的附庸，我真是十分痛心，我们必须采取行动回击这一现实。”\n\n“或许吧，保罗，但目前我们还需跟随党的指引。若事态发展到不可收拾的地步，届时我们再考虑如何唤醒政府大厅中沉睡的人民意志。”\n\n两人继续热议着党的未来，以及意大利的明天。"
 FD.4.a:0 "意大利的民主正走在大路上，但现在似乎激起了民情激荡。"
 FD.5.t:0 "共和党加入执政同盟"
 FD.5.d:0 "意大利共和党，历史悠久，却始终未成为意大利政治舞台上的主角。尽管其在议会中的席位从未超过三十席，但民主阵线整体上仍希望将其纳入联盟；毕竟可供获取的议席不要白不要，意大利共和党的温和立场和反法西斯的资历也无需置疑。\n\n奥龙佐·雷亚莱，作为党主席，力图将意大利共和党拒于民主阵线之外，却不料一着不慎，满盘皆输，铸成了也许是他政治生涯最后一次的败笔。在一次急促召开的投票中，他被剥夺了主席之位，乌戈·拉马尔法取而代之，新官上任三把火，他立刻点头同意意大利共和党加入民主阵线。共和党能否坚守其珍视的独立精神，还是将被民主阵线中的老油条同化，这一切尚属未知，留待历史揭晓。"
 FD.5.a:0 "民主阵线逐步壮大。"
 FD.6.t:0 "左派统合"
 FD.6.d:0 "费鲁乔·帕里，铁骨铮铮的社会主义战士，曾在那黑暗的岁月里坚持与墨索里尼斗争，历经沧桑。行动党的黯然落幕，对他来说无疑是一次心灵上的重创。在一次气氛沉重的盟友集会上，他沉重地宣布了一个众人预料中的消息：行动党在倾听了选民心声后，为了意大利社会主义和自由的崇高目标，选择了自我牺牲的道路。如今，他们只能收起行囊，默默等待那命令他们退党的电话打来。\n\n帕里并未对彼得罗·南尼和朱塞佩·萨拉盖特打来的电话抱有成见，并不认为这不过是虚情假意之举。这两位政治家，尽管立场各异，却都对帕里抗击法西斯的斗争给予了高度评价，亲自向他表达了敬意。但他也没有天真到认为这是他们打来电话的唯一原因。旧行动党成员将根据个人信仰，或投奔意大利社会党，或转投意大利社会民主党。帕里深知，左翼会因为少了一个内部竞争的派系而变得更加团结。然而，行动党的解散，不管怎样都令他心怀哀愁。他曾梦想成为社会主义选民的意志结晶，如今却梦断蓝桥，壮志未酬。"
 FD.6.a:0 "左翼凝聚，分歧渐显。"
 FD.7.t:0 "四处的分裂分子"
 FD.7.d:0 "根据民主阵线领导层的备忘录透露，总书记彼得罗·南尼已下决心，将社会党左翼的几位杰出人物，如马克思主义理论家恩里科·贝林格，逐出党门。开除的缘由，在于左翼的激进化趋势和对党向温和派及基督教民主党的一再妥协所引发的分裂趋势。贝林格本人尚未置喙，但他的拥趸们已在其他被逐党员的带领下，走上街头，抗议所谓的“资产阶级政治傀儡”。警方已整装待发，正朝规模最大的抗议现场前进。尽管他们已被命令只需作壁上观，确保抗议不会演变成骚乱即可，但社会党此举，似乎并未能平息风波，反而激起了更大的波澜。\n\n彼得罗·南尼就此发声，言明抗议者多是些不谙世事的学生，以及那些被逐出党门、行事鲁莽的领头羊。他满怀信心地展望党的未来，并铿锵有力地宣称：“……我们党的团结，绝不会因几声激进者的狂吠而瓦解。”只有时间才能告诉我们，党内的其他同仁是否与其心声相同。"
 FD.7.a:0 "青山遮不住，毕竟东流去……"
 FD.8.t:0 "请鼓掌"
 FD.8.d:0 "彼得罗·南尼在演讲结束时，猛击讲台，以一个豪迈的手势和满脸的笑容收尾，他身姿挺拔，气宇轩昂。\n\n“这一讲，定能让人心潮澎湃！”南尼心中暗想，却因连篇累牍的演讲而声嘶力竭，喉咙干渴。他数日来字斟句酌，坚持在政治议题上传递他真挚且富有洞见的思想，确保他的演讲无懈可击。为了巩固意大利的社会主义，南尼深知必须赢得工人阶级的心，让他们认识到意大利社会党才是那个赋予他们力量的关键角色。他相信，凭借自己的雄辩，工人们定会与社会党的计划同心协力。然而，面对电视演播室里工人的寥寥掌声和零星哨声，南尼只能瞠目结舌。他如同受惊的鹿，愣在原地，最终收拾起文件，在直播结束前黯然离场。\n\n南尼百思不得其解，为何自己的激情演讲未能激起工人们的热血。而朱塞佩·萨拉盖特在同一节目中亮相，却轻松俘获了观众的心。南尼反思，为何萨拉盖特的温和与含蓄，能比自己的热情洋溢更能打动电视演播室里的工人阶级。不仅如此，似乎在整个国家内也是如此。他写下的激昂文字，本想点燃人心，却似乎被萨拉盖特的平和与直率所遮蔽。南尼逐渐领悟，自己可能正成为党内冉冉升起的明星——朱塞佩·萨拉盖特的配角。"
 FD.8.a:0 "那日，唯有蟋蟀鸣唱，伴他孤影独白。"
 FD.9.t:0 "争斗"
 FD.9.d:0 "又是一日劳碌，路易吉擦去额头的汗水，和同事马尔科一起坐下休息。马尔科一边坐下，一边随手拿起了房间里的报纸开始阅读。\n\n“路易吉，还记得那些基督教民主党的政治家吗？”马尔科打破了沉默。\n\n“哦，那些为了是否与民主阵线合作而喋喋不休的政客们？他们达成共识了吗？”路易吉反问。\n\n“还远未结束，他们的争吵愈发激烈，连南尼和莫罗都被卷入这场纷争了。”马尔科回答。\n\n天哪，这场无休止的争论已经拖了数月之久！那些政治家们还在无谓地争吵吗？真是一地鸡毛，为什么还要争论基督教民主党是否应该与民主阵线携手。事已至此，他们本应放眼未来。毕竟，对路易吉而言，这都已经不是问题，对基督教民主党也应如是。"
 FD.9.a:0 "“但愿阿尔米兰特不要也被牵扯进来……”"
 FD.10.t:0 "来自萨拉盖特的报道"
 FD.10.d:0 "尊敬的乔瓦尼·德·洛伦佐将军，\n\n如您在上次会议中所嘱托，我已竭力确保与南尼的矛盾不至于激化。现在，我可以肯定地说，我们不需要启动任何应急措施。我在管理层中的影响力已足以完全平息南尼之浮夸构想。如果情况有任何变化，我将及时通知您。\n\n此致，\n朱塞佩·萨拉盖特。\n\n德·洛伦佐将军在阅读萨拉盖特的备忘录时轻轻啜饮着咖啡。“甚好，”他心中暗想，“看来我们准备的应急计划永远也用不上了。”言罢，将备忘录揉作一团，投入烈火熊熊的壁炉之中。愿此策永沉秘海，即便是现在，如上帝所愿，它已变得无关紧要。"
 FD.10.a:0 "自由之光，长存不灭。"
 FD.11.t:0 "发出请柬"
 FD.11.d:0 "罗伯特笔走龙蛇，竭力记录彼得罗·南尼在意大利国会上的闭幕词，那言辞中透露着团结盟友、共克时艰的深意。罗伯特的手指已因连轴转的记录而酸痛，两支笔已墨尽，第三支也即将告罄。但他深知，全面报道这难得一见的盛会，对他这样的一个记者而言，是何等荣耀。\n\n那些来自国家进步公约的美国人，名字虽古怪，却与人为善，与罗伯特等与会者相处的十分融洽。罗伯特与迈克尔·哈灵顿握手，感受到他的温文尔雅。朱塞佩·萨拉盖特似乎也对他颇有好感，两人几乎形影不离，可能在讨论着某项社会或经济改革，真是两位心系天下的仁者。\n\n罗伯特与东西印度的代表交流稍显棘手，他们似乎更为警惕，不易被大会的盛况所打动。他能理解他们的顾虑，毕竟，尽管大会宣称这将是法西斯终结的开端，但实质性的改变仍需时间来验证。谢赫·穆吉布·拉赫曼在大会上的发言，似乎也反映了罗伯特内心的一丝忧虑：“一切尚未结束。”\n\n日本代表们对大会的乐观态度尤为突出，他们对自由世界的希望和国家赎罪的诚意，让罗伯特和全场听众感到振奋。而奥利弗·坦博激情澎湃的演讲，更是激发了罗伯特对抵抗与解放斗争的共鸣。如果连坦博都能在逆境中坚持抗争，那么这或许真是法西斯势力的终结之始。大会结束之际，罗伯特走向出口，夜色中的寒意让他更加清醒，他记下了最后一笔，心中默念着这历史性的一刻。"
 FD.11.a:0 "我们将正历史之不义，铸众生之美好明天。"
 FD.12.t:0 "不许通过！"
 FD.12.d:0 "安娜所要做的，不过是去杂货店买些鸡蛋。她母亲想为弟弟的生日做一个蛋糕，尽管安娜心里不情愿，但还是被迫去跑腿，这让她颇为不快。倒不是她讨厌去杂货店，而是她本想避开那些在罗马各处集结的法西斯分子。她母亲怎么想的，竟让她在这些愚蠢至极的人为他们那死灰复燃的意识形态而集结时出门？\n\n安娜竭尽所能，真心试图远离一切集会之事。然而，她终究发现自己已经身陷反抗议者的人群之中，周围的人愈聚愈多。这真是一场壮观的示威，红旗下的人们挥舞着基督教民主党的旗帜。尽管安娜本不愿参与这一切，但她的内心却愈发渴望，如周围路人般，擎起反法西斯的火把。\n\n算了，去他的。她弟弟本来对蛋糕也就那么回事。再者，花时间与这些国民联盟的自大之徒作对，却也值得。反法西斯的呼喊声愈发震耳欲聋，压过了法西斯主义者的喧嚣，安娜亦投身呐喊，声声力竭，每一声都是对法西斯的坚决抗争。"
 FD.12.a:0 "法西斯休想得逞！"
 FD.13.t:0 "更公平的投票方式"
 FD.13.d:0 "意大利广播电视公司的主播宣布：“我们将向所有听众阐释对投票制度的改革。”他的声音或许穿越了整个国土。马泰奥侧耳倾听，眉头紧锁。选举之后，他便开始留心政治，从那些通读报刊的朋友那里学习。他自己则尽可能远离报纸——阅读对他来说总是一场缓慢的挣扎，让他感到自己微不足道。收音机成了他的良师益友，他只需静听。\n\n主播轻描淡写地带过规则，宛如冰上滑行。“投票改革后，制度将更公正，更具代表性，”他开场道。“意大利选民将面临更多选择。他们可以像往常一样，为一个党的候选人投票。但在新制度下，选民亦可跨党派选择候选人，甚至可以将票分散投给不同的党。选民还可以为不同党的多名候选人投票，或者如果愿意，还可以在选票上直接写下……”马泰奥越听越入神，感到有些晕眩。他记得自己第一次投票时，向当地神父求教，不是为了政治立场，而是为了不浪费他手中的一票。现在意大利广播电视公司竟然宣称，你甚至可以在选票上直接书写，而且这样也会被计算。\n\n收音机里传来沙沙声。“新规则下，选民的选择将与候选人而非政党绑定。党派间的席位分配也将随之调整。根据党派和候选人所得票数，选举机构将计算出一个比例，以便……”马泰奥关掉了收音机，沉浸在这变革的讯息中。"
 FD.13.a:0 "更公平的制度？"
 FD.14.t:0 "世界和平理事会会议"
 FD.14.d:0 "南尼心有忐忑，却不曾向人吐露。尽管世界和平理事会很大程度上是他的智慧结晶，但他始终担心这可能会事与愿违，产生爆炸性的负面效果。他特别担心的是那些在场内穿梭、用英语交头接耳、交换笔记的翻译们。他怀疑这窃窃私语，会否令他开幕致辞的激情与影响力大打折扣？\n\n然而，他的担心是多余的。在场的听众是一群五花八门的活动家、学者和外交官，他们全神贯注地聆听着，目光紧紧锁定在他身上，翻译之声，不过细流，难掩其辞之锋芒。日本共产党员野坂参三，他的进场曾在室内引起了一阵骚动，此刻亦点头赞同耳语之言。南尼在发言中，也辨认出了一些顾问事先告知的人物：来自美国的天主教和平主义者多萝西·戴伊，以及民谣歌手菲尔·奥克斯；来自英国的记者休·布罗克；来自西班牙的作家洛伦佐·比达尔·比达尔。同胞中，异见神父埃内斯托·巴尔杜奇亦曾前来握手致意。起初，政治大腕的缺席让南尼微感失落，但他后来意识到这其实是一种幸事。在这个房间里的人们将自由交流，所思者真理，非权势。或许，今日所播之种，或成未来辉煌之始。南尼心生谦卑，此情此景，在他一生中实为罕见。他担心在讨论开始前就让大家感到疲惫，于是在几页后便简洁地结束了演讲，并向听众敞开怀抱，示意他们开诚布公。"
 FD.14.a:0 "\"诸位朋友，现在谁想在世界和平理事会上发言？\""
 FD.15.t:0 "平息时刻"
 FD.15.d:0 "作为美国驻意大利大使，克莱尔·布思·卢斯总是日理万机，无论是处理日常的行政事务还是与意大利的高层进行繁复的谈判。自从意大利步入民主的殿堂以来，她便心怀忐忑，目睹了意大利人选择了社会主义者来领航国家——这一出人意料之举。\n\n她心知肚明，意大利民众对法西斯主义的幻灭，使得他们一有机会便急转直下，寻求截然不同的道路。民主阵线似乎为意大利描绘了一幅光明的未来。随着美国政府对意大利的关注与日俱增，她的职责也随之扩大。意大利政府的新政策有效地提升了就业率，超出了预期，赢得了人心。在大多数人看来，卢斯的忧虑似乎是杯弓蛇影。\n\n然而，卢斯心如明镜。在这个年代，夸大事实、美化现状是轻而易举的事情。意大利的就业增长，其实只是一种假象，背后隐藏着欺骗民众的企图。这些左翼分子心怀叵测，他们的目标是实现共产主义独裁统治，这一点似乎只有卢斯能够识破。他们通过民主阵线煽动群众来达成目的，而他们所谓的胜利，不过是用谎言堆砌的悲剧。现在，卢斯所能做的，也只是无奈地苦笑，因为在这个时候，任何试图反共的政变都只会将国家推向共产主义的深渊。我们只能寄希望于意大利人民能够像摆脱法西斯主义一样，摆脱这种新的威胁。"
 FD.15.a:0 "雄鹰俯瞰群狼……"
 FD.16.t:0 "意大利奇迹"
 FD.16.d:0 "城市边缘，一座新工地正如火如荼地搭建起来。这不过是众多由工业复兴公司负责的工程之一，这个机构曾是法西斯早期的产物，如今却已经公有化，掌握在社会主义政府的手中。毛里齐奥，身为一名左翼人士，他依稀记得国家法西斯党内部一些倾向于经济自由的成员提出私有化议题时的激烈讨论。然而，那些声音最终被压制下去，对此他心存感激。现在，他被委以重任，监督这座将成为意大利最大汽车工厂之一工厂的建设。尽管他的建筑行业经验广为人知，被选中并不意外，但他对于能够担此大任，仍感到无比荣幸。在一次自嘲的反思中，他暗想，自己或许已成为一名公务员。或许，他应该在衬衫上绣上意大利的国旗！\n\n炎炎夏日，毛里齐奥用肘部拭去额头的汗水。他轻松地巡视工地，大声指导着工作，同时关注着新来的建筑工人。他们不得不从外地招来一些人，起初这些外来者与他的团队有些摩擦，但毛里齐奥尽力平息了这些争执。他对于这些新增的人手感到欣慰，这无疑将加速工厂的开业。即便在经济繁荣时期，工作机会也宝贵无比，不能被视为理所当然。因此，当一名新工人因一个愚蠢的错误导致建筑材料损失时，毛里齐奥挺身而出，保住了他的职位。尽管团队中有人抱怨，但他能感受到他们对他的尊重。现在，士气空前高涨，那个犯错的年轻人也迅速吸取了教训。一切进展顺利。\n\n若换作一个更注重经济的人，他可能会指出在当前的建筑热潮背后，是一系列复杂的政策决策，这些决策不仅推动了工业复兴公司在全国范围内的建筑工程的下马，同时也带来了繁荣。毛里齐奥虽不甚关心这些宏观问题，但他明白罗马的决策者们对此十分重视，并且他的工作将有助于将这些宏伟蓝图转化为实实在在的成果。这将成为意大利工人的辉煌篇章，如果他能参与其中，他必将成为全意大利的骄傲。"
 FD.16.a:0 "钢筋砖骨铸就的奇迹。"
 FD.17.t:0 "工作安全"
 FD.17.d:0 "“真是难以置信，恩里科，老板竟然因为我投了民主阵线一票就把我给炒了！”\n\n“呵，路易吉，你不是唯一一个。老板解雇了所有稍微有点左派倾向的员工。照这趋势，他很快就无工可用了。”\n\n“话虽如此，恩里科，但我们怎么办？我们还得养家糊口呢！”\n\n“我们会找到出路的……”\n\n三天后……\n\n“这大半夜的，谁这么烦人打电话过来？”路易吉一边抱怨，一边不情愿地从床上爬起去接听那个不断响起的电话。“我是路易吉，请问是谁？”\n\n“路易吉，是我，恩里科！你听说了吗？老板因为我们的政治倾向解雇我们，违反了新出台的劳动法！他被罚了好几百万里拉，最妙的是，他被迫要让我们恢复原职！失业的日子到头了，太妙了！”\n\n路易吉的眼睛瞬间睁大，随即他露出了一个灿烂的笑容，这笑容如此之大，恩里科即便在电话那头也肯定能感受到。“亲爱的！”他大声向他的妻子报喜。“有天大的好消息！”"
 FD.17.a:0 "继续投票给民主阵线。"
 FD.18.t:0 "法网恢恢，疏而不漏"
 FD.18.d:0 "\"号外！号外！贪官落马！快来看看！\"\n\n皮耶罗从报童手中接过报纸，目光立刻被那醒目的标题吸引。\n\n\"警方调查后，将腐败高管绳之以法。\"\n\n皮耶罗眨了眨眼，那些商业巨头竟然遭到了法律的制裁，真是罕见。他曾怀疑，这些与政府勾肩搭背的大亨们，将于民主之中开拓自己新的保护伞，继续规避那些因腐败和不择手段、非法的商业行为而本应受到的惩罚。毕竟，即便在这个新生的意大利，他们依然拥有着巨大的财富和影响力。\n\n然而，他似乎错了。\n\n皮耶罗一直主张意大利应该清除腐败，尤其是法西斯主义结束后。他是个悲观的人，他认为这些人会继续用金钱收买警察。即使民主阵线承诺要彻底清扫意大利，他也不太相信他们会真的采取行动。\n\n但现在看来，一个更干净、更公正的意大利，或许真的还有一线生机……"
 FD.18.a:0 "民主阵线似乎正以行动兑现其诺言。"
 FD.19.t:0 "从贫穷到富有"
 FD.19.d:0 "马泰奥拖着疲惫的身躯，步履蹒跚地走在人行道上，工厂的劳作让他的关节隐隐作痛。他停下脚步，喘息间，却发现疼痛已不如往昔那般剧烈。工厂的班次缩短了，而他的工资却水涨船高，这让他心中暗喜。\n\n转过街角，他回到了熟悉的社区，却发现一切已非昔日模样。街道焕然一新，建筑闪烁着柔和的光辉，身边宛如电影中的场景。邻居们三三两两，闲庭信步，这在他记忆中是罕见的。过去，人们总是匆匆忙忙，避免在街头逗留，以免招惹是非。然而现在，这些忧虑似乎成了多余，人们轻松地交谈着，谈论着他们的工资如何突飞猛进，几个月前还难以支付的房租和账单，现在似乎已不再是问题。\n\n马泰奥步伐轻快，昂首挺胸地走进了自己的公寓楼。虽然他并不热衷于政治，对\"民主\"或学生们的口号也不甚关心，但当他回到房间，回想起今天所见的一切变化——这些变化是民主和民主阵线改革的结果，他开始意识到，也许是时候开始关注政治了。或许，这一次，世界真的会变得不同。"
 FD.19.a:0 "这会是美好时代的启幕吗？"
 FD.20.t:0 "贝林格获胜！"
 FD.20.d:0 "投票结果一出，掌声如雷，他身边的座位上掌声雷动。恩里科·贝林格虽然初时略显震惊，但很快便意识到自己已被推举为意大利社会党的总书记的现状，他随即收拾情绪，并在众人面前立下誓言：社会主义必将在意大利大地上绽放光芒。\n\n贝林格，这位年轻而充满魅力的领袖，以其激情点燃了青年和工人的心，他的圆滑手腕同时也赢得了民主阵线中那些资深成员的青睐。他的胜利在罗马引发了截然不同的反应：既有欢呼雀跃，也有愤怒不满。南尼现在需要在两条道路之间做出选择，一条是温和的改革之路，一条则是更为激进的变革之路。\n\n第一种策略，虽然激进，但我们仍将在这个资产阶级体系内行动。我们将集中力量对抗国民联盟中的法西斯分子，直接向工人发出号召，并利用宪法赋予我们的工具，以意大利特有的方式推进社会主义。如果连这样的温和的举措在那些社民派中眼里也太过分，那么那些自失败以来一直抱怨不休的萨拉盖特和他的社会民主党人，就让他们去吧。这种方法将保持我们党的选民基础，并加强政府的力量，尽管国内的保守派会竭尽所能地阻挠我们。\n\n然而，有人认为这还不够，南尼似乎也在倾听这些声音。意大利的社会主义敌人无论如何都会反对南尼-贝林格政府，可能会采取行动破坏社会主义的前途。因此，我们或许应该抓住这个机会，通过选举来实现一场革命。通过削弱国王和军队的力量，团结人民支持我们，我们可以巧妙地战胜那些反对社会主义的力量，并永远消除他们对意大利的影响。只有这样，我们深爱的祖国才能真正摆脱法西斯的枷锁，我们可以自由地建设一个更加美好的意大利。\n\n随着党内的勾心斗角告一段落，南尼叫来了贝林格，准备与其讨论他的决定。"
 FD.20.a:0 "一条意大利式的社会主义征途，工人阶级是我们坚强的后盾！"
 FD.20.a.tt:0 "一程山水一程歌，社会主义将于意大利渐次绽放。"
 FD.20.b:0 "以选票铸就革命，不惧风涛！"
 FD.20.b.tt:0 "我们的革命之火将燃遍意大利。"
 FD.21.t:0 "是商榷，抑或沉默"
 FD.21.d:0 "卢卡紧握着晨报，指节因力道过猛而苍白，面庞涨得通红。他难以置信，眼前所见——头版头条赫然写着：“莫罗将与贝林格会谈，或达政治和解”，这令卢卡愤懑不已。\n\n卢卡是个坚定不移的保守派选民，向来倾向于支持党中的普里马韦拉派系，甚或更为温和的多罗泰伊派系。尽管他认可莫罗和范范尼的领导，希望他们能引领基督教民主党走向胜利。最近的选举结果虽未如他所愿，但他深信民主阵线终将如纸牌屋般崩塌，意大利将从那群居心莫测的社会主义者的魔爪中获救。\n\n然而，这一消息无疑是对卢卡及其信仰的党派的沉重打击。莫罗怎能与共产主义者贝林格会谈？他们之间又有何可商讨？难道是探讨如何破坏经济，还是如何进一步使国家世俗化，无视教宗的权威？贝林格，这个危险的激进分子，早该被逐出国门。如今，莫罗这个傀儡，似乎正与贝林格这个共产主义者密谋，意图摧毁卢卡心中美丽的意大利。\n\n党绝不能对此视而不见。必须挺身抗争，反对这种向激进派的妥协，必须更换莫罗及其派系的领导地位。意大利的未来，在此一举，不容有失！"
 FD.21.a:0 "莫罗怎敢如此？"
 FD.22.t:0 "血洒辩论厅"
 FD.22.d:0 "“打倒共产主义！打倒民主阵线政府！”\n\n“滚出去，你们这些隐藏的法西斯分子！你们本来就不拥护这个议会！”\n\n“有胆量就当面对峙，你这背信弃义的伪保守派！正与那群民主阵线里面沐猴而冠的赤匪同流合污，背叛你的祖国，是吗？”\n\n“放马过来！你敢吗！”\n\n“肃静，肃静！”\n\n演讲者试图平息议员们的激愤，却无异于杯水车薪。国民联盟因对民主阵线的不满，决心要掀风起浪，其他政党的议员们，也因这种不敬而义愤填膺。\n\n接着，第一拳无情地挥出。虽然不知道是谁挥出了这一拳，但场面已一发不可收拾。直至警卫冲入，才将这场混乱平息。"
 FD.22.a:0 "议会已沦为拳击场。"
 FD.23.t:0 "不再有农奴！"
 FD.23.d:0 "周二一大早，罗马市民被一幕惊世骇俗的破坏行径所惊醒。目击者已指证，肇事者为罗马大学的学子，他们手持喷漆，对翁贝托二世的雕像进行了肆意亵渎。雕像上被喷上了不堪入目的侮辱言辞，这些言辞在此不作赘述。涂鸦中还夹杂着激进的政治口号：“社会主义共和国万岁！”，“翁贝托，退位！”，“法西斯去死。”这些学生如今行踪成谜，警方正在悬赏搜捕这些敌对分子。\n\n国民联盟、基督教民主党，乃至民主阵线中的温和派，都纷纷要求南尼对这等骇人听闻之举予以强烈谴责。但，南尼，已因其激进言论而被视为此类事件的煽动者，今天下午他于议会大楼前发表了声明。他谴责了“少数过激学生”的“幼稚且无理取闹的行为”。在演讲中，南尼话锋一转，抨击了国民联盟的挑衅行为，甚至将最近的破坏行径归咎于该党。他声称，若非国民联盟“顽固不化”和“愚不可及”，这些“自发行动”本应“更为零星和克制”。这番言论激起了国民联盟的极大愤慨，他们强烈要求对南尼的言论及其对学生行为的不力谴责采取行动。"
 FD.23.a:0 "歉意未深。"
 FD.24.t:0 "我们即人民"
 FD.24.d:0 "昨日，一场由学生与工人组成的亲政府集会与警方之间爆发了激烈冲突，引发了一阵骚乱。虽然这场集会大部分时间里都风平浪静，但最终仍有数人被捕，二十余名警察挂彩。\n\n这场集会数周之前就被民主阵线的拥趸精心策划好了，其本意是为了庆祝新政府所确立的计划和通过的法案。原计划中，数家工会和政治组织被邀请参与，包括知名的激进分子贝林格及其追随者。然而，示威的消息不胫而走，到了集会之夜，众多学生组织和成千上万的工人自发地通过组织自己的集会或加入官方集会来表达他们对新政府的支持。贝林格于其中的煽动使得集会氛围迅速变得激进；工人们开始高呼亲社会主义的口号，要求政府进一步实施重大改革，同时对民主阵线上台至今的成就赞不绝口。\n\n警方介入，试图驱散集会的部分人群并控制那些煽动人群的激进分子，这引发了数起冲突，其中一些演变成了暴力事件。比如，一名年轻学生被警察制服并拘留，随后几名工人高呼着反警察口号，攻击了警察并解救了该青年。不过尽管如此，这类事件仍旧极为有限，警方的存在并未对集会造成太大影响。\n\n集会落幕之际，南尼现身，谦逊地接受了他和他的党员们从意大利人民那里获得的“广泛民众支持”。他与其他几位民主阵线的成员一同站在为活动搭建的临时平台上。贝林格也作为为其庆祝的党员之一出席。他后来表达了对党的未来“谨慎乐观”的态度，鉴于民主阵线近期的成功和民众的广泛支持，他委婉地暗示了在那可预见的将来，民主阵线可能会推行更加深入和全面的改革措施。"
 FD.24.a:0 "人民已发声！"
 FD.25.t:0 "军中抵抗"
 FD.25.d:0 "在村庄一隅的静谧之地，弗朗切斯科与马蒂亚，两位意大利武装部队的昔日军官，不期而遇。他们自投身军旅起便情同手足，共同见证了无数荣耀时刻，包括他们同期晋升的辉煌。然而，如今他们却只能互诉一段心酸的故事。\n\n“不止我俩，”马蒂亚在苦笑中开口。“他们把能触及的人都解雇了，仿佛我们未曾为军队献身一般。”“南尼，”弗朗切斯科言简意赅，随地吐了口唾沫。两人苦中作乐，相视而笑。“很快，所有不是共产党人的人都将被扫地出门，”马蒂亚沉声说道。“但弗朗切斯科，不必过于忧心，车到山前必有路。”\n\n弗朗切斯科满眼期待地盯着朋友，心中暗想他是否知晓内情。“我们能复职吗？”他带着一丝期盼问道。他明白那些高层领导，尽管地位显赫，却一向与那些社会主义者合不来。马蒂亚一向深谙权术，或许他已从上级那里嗅到了一丝转机？但马泰伊只是惨淡一笑。“南尼不会让我们官复原职。他被同僚逼迫着，不能有丝毫让步。我们会重返岗位的，朋友，只需耐心等待，但绝不会让南尼叫我们回去。”马泰伊眼中闪过一丝罕见的阴霾，那是弗朗切斯科仅在两次罕见时刻见过的眼神——一次是为家人荣誉而战，另一次则是那社会主义者胜选的夜晚。此刻，这眼神中透露的不是挫败的神色，而是暂时搁置胜利的顺从。弗朗切斯科抬起头，他看见马泰伊的目光正坚定地与他交汇。"
 FD.25.a:0 "“把酒瓶给我，咱们为将军们干杯。”"
 FD.26.t:0 "君主下马威"
 FD.26.d:0 "彼得罗·南尼心神不宁，手中的小文件夹突然变得像巨石一般沉重。“这一次，一切都会按照计划进行。”他喃喃自语。突然被召进皇宫，他感到很不安：当他第一次通过关于君主制公民投票的法案却以失败告终时，奎里纳尔宫冷漠如初，连一丝风声都未传出。因此，当他再次通过举行第二次公民投票的法案时，国王却大张旗鼓地召见他，这使他大吃一惊。\n\n他站在紧闭的大门前，心潮起伏。国王的意图究竟如何？是想要讨价还价，还是真的有意退位？他心中一亮，国王莫不是要正式承认意大利人民自主决定命运的权利，让他们挣脱王冠与锁链的束缚？门开了，他走进房间。意大利国王兼埃塞俄比亚皇帝翁贝托二世站在他那张装饰华丽的桌子后面。“欢迎，首相，请坐。”国王和颜悦色地微笑着说。南尼正欲开口，国王却先发制人：“关于新的公民投票…”“不会有了。”南尼惊愕地瞪大了眼睛。“不可能！议会已经通过了！”翁贝托的声音和表情都变得严厉起来：“根据《阿尔贝托法令》赋予我的权力，我拒绝颁布这项法律，并在此撤销你的职务。”“但是……”“你有没有考虑过这样的行动会带来什么影响？你有没有想过从法西斯独裁转变为社会主义独裁的后果？”\n\n南尼想要辩解，但两名武装突击队员的突然出现打断了他。国王强忍怒火，声音紧绷：“你目光短浅，智识有限。你或许为这场政治戏码筹备了数月，但我为意大利民主的归来已筹备十年。我绝不容许任何干涉。”他转向士兵：“带他离开。通知迪洛伦佐将军，‘独奏曲计划’即刻启动。”士兵们敬礼应答：“遵命，陛下！”随即将前首相带离。"
 FD.26.a:0 "这是什么意思！？"
 ITACOUP.27.t:0 "齿轮启转"
 ITACOUP.27.d:0 "有人说噩耗传得最快，但他们都错了——突击队才是。前首相被捕三分钟后，基吉宫众人还沉浸在“彼得罗·南尼正确保二次公投”的幻梦中：无人察觉门口警卫悄然撤离，更未对两分钟后百米范围内的精准断电起疑。直到六十秒后，数十名迷彩宪兵队突入意大利政治心脏时，他们才如梦初醒。没有枪响，也无必要——毕竟政客们素来不以军事素养著称。当第一声尖叫回荡长廊时，惊愕转为焦虑，最终化作恐慌。\n\n人群开始奔逃，不知去向何方，唯求远离迷彩制服。少数仍记得地下抵抗岁月的老政客潜入宫殿密道，但多数人难逃此劫。半小时后，基吉宫与议会大厦已全面封锁，数百名常服宪兵乘厢式车队押解要员：身着华服的部长、议员、党工如市井囚徒般挤满囚车，驶向预设的“休养所”。几名基民党议员——诡异地在骚乱中毫发无损——向空荡走廊里的巡逻宪兵抗议，却只得到统一答复：“议会暂时关闭，恕不奉告。”\n\n南尼被捕不足一小时，行动已告终章。但真正的计划方才启动：如同锈迹斑斑的古老引擎，经年沉寂后突然通电解锁，剥落铁锈露出冰冷无情的钢骨。"
 ITACOUP.27.a:0 "我们已准备就绪，一如往昔"
 ITACOUP.28.t:0 "扼杀毒蛇"
 ITACOUP.28.d:0 "对平民而言，布拉斯基堡与罗马其他十五座十九世纪防御工事别无二致——不过是过时的骄傲象征。但真相远非如此：当懒散哨兵逡巡于古旧砖墙时，下方迷宫般的加固掩体中，数百男女正疯狂工作。他们非军士，却比军士更可怖——这里是令人生畏的军事情报局总部。\n\n通往地下四层某房间的途中，安保逐级森严。这间密室是军事情报局的中枢，储存着足以撼动国本的绝密档案。此刻所有活动的引力中心，是身着宪兵队高阶制服男子手中的密封档案夹——多年前他亲手封印此物，奉末代领袖齐亚诺之命。“齐亚诺的最终遗产”，他暗忖，但泛黄标签上九个粗粝钢印字母却如此平凡，仿佛不知将永远改变意大利，只为守护稚嫩民主免遭极端分子荼毒。\n\n情报员呈上电文将他拉回现实：“国王控制完毕。激活指令下达。政府大楼突破。议会控制完成。叛党收押。部分逃亡。非抵抗人员赦免。冗余伤亡规避。待后续指令。”高阶制服男子颔首，目光重回档案夹：启封便无退路，军令纵使陈腐可怖，终究是军令。乔瓦尼·德·洛伦佐撕开封条，人造冷光下字母森然：“独奏曲计划”，该名源自当年他问及参与者时，齐亚诺答曰“仅宪兵队”。他抽出首页的脆薄纸笺，标题赫然写着《国家安保紧急行动纲要》，他转身向满室肃立：“全体特勤！”嘈杂戛然而止，所有目光聚向他。“即刻执行独奏曲计划！”而后喧嚣再度吞没地堡。"
 ITACOUP.28.a:0 "民主必须被守护——哪怕是以反民主的方式。"
 FD.27.t:0 "心焰炽燃"
 FD.27.d:0 "但丁与同窗们满怀憧憬地簇拥在宿舍的电视机旁。休息室一时人声鼎沸，众人皆渴望得知近日政治风波的消息。但丁及其友侪，皆为坚定的社会主义信徒，一如现时众人。他们虽未亲历父母在墨索里尼铁蹄下经历的苦难，但国家现已从法西斯的阴影里步入民主之殿堂。随着政府进一步自由化和政治束缚的解绑，让但丁与无数学子得以初窥卡尔·马克思、阿马迪奥·博尔迪加、安东尼奥·葛兰西等思想巨匠的著作。贝林格等时代先锋，更是激发了但丁与同辈们新觉醒的激进精神，并将其化为对社会不公的锐利抗议。尽管学生们积极学习政治、组织活动，但现在看来所有努力似乎即将功亏一篑，但丁却浑不在意。工人阶级的胜利仿佛已在眼前，至少他心中如此期盼。事态亦可能急转直下，休息室里常满是各色社会主义激进派。贝林格和南尼为何迟迟不至？忽然，屏幕一闪，但丁期待的两位人物终于亮相。但丁屏息凝视，他的担忧消散，希望飙升。\n\n当南尼宣告意大利新时代的到来时，但丁自信的微笑转为满面春风。贝林格与南尼并肩而立，这一幕深深触动了但丁。这两位意大利最受欢迎的社会主义领袖，如战友般肩并肩，象征着团结一致的工人阶级，正动员起力量对抗资本的压迫。各政治派别如今汇聚在社会主义解放的旗帜下！但丁一跃而起，号召朋友们团结起来。\n\n“时机已至！我们有义务协助贝林格同志与工人阶级，开启意大利社会主义的新纪元！”他冲出宿舍，起初只有几人跟随，但转瞬间，成群的同学们如潮水般涌向附近的市政广场。广场中心，一根7.62米高的旗杆巍然屹立，旧秩序的旗帜在风中无力地垂挂着。但丁鼓足勇气，攀至杆顶。攀爬间，他高声求取一面纯红旗帜。他手执着工人阶级的象征，扯下旧的意大利国旗，换上代表未来的红旗。立于顶端，但丁放眼望去，四周的广场和旗杆上，旧旗纷纷降落，红旗缓缓升起。然而，仍有不少人自豪地在社会主义旗帜旁继续飘扬着旧国旗。但很明显，真正的民心潮流，已在这片土地上昂首，但丁心中满是欢喜。"
 FD.27.a:0 "社会主义万岁！"
 FD.28.t:0 "老调常谈的诤言者"
 FD.28.d:0 "“他们越想出人意料，反而越会弄巧成拙，”南尼朗声笑道，他的笑声在屋内回荡。“马尔科，这篇文章你读过了吗？来，过目一下。”秘书遵命，匆匆浏览了文章，那是某位保守派基督教民主党成员在天主教报纸上发表的。“民主阵线威胁了秩序、文明与家庭价值观——这些本应是意大利人应遵循的美德。南尼号召挑战权威，自作主张，他是黑暗势力的帮凶，一个挑拨离间者，企图引发社会的动荡，为共产党铺路以此建立一个无神论社会。”文章充斥着此类言论。马尔科抬头，带着一丝苦笑，正迎上南尼拍着他的背，自得其乐。秘书心知，老板谈兴正浓时不宜打扰。\n\n“更可笑的是，这不只是政客们的看法，”南尼继续道。“你知道我每周收到多少神父在教堂里将我斥为共党分子的报告吗？猜猜看，马尔科。”马尔科猜了一个数字，但实际数量远超预期。“他们如此渴望我们失败，真是匪夷所思。这也是他们的国家啊。当年墨索里尼践踏教会所珍视的一切时，这些神父又在哪里？至于军队，更不用说了。知道我这周听到了什么吗？这事别外传。”马尔科点头表示理解。“他们说我是外国势力的鹰犬，是个企图在社会中制造混乱的德国间谍。这一切，不过是因为我们正在为工人阶级奋斗。”\n\n“但我也清楚，他们的抱怨越多，越说明我们触动到了他们的痛处。如果精英阶层对我们的行动如此不满，那就意味着我们需要更多的行动，而且要更快。上帝保佑，如果我们屈服于这些小人，那我们所有的努力将付诸东流。我们只能用更多的努力来回击这种挑衅！为了意大利那些长久以来期盼我们带来光明的人们，那些被压迫和贫困的同胞！”"
 FD.28.a:0 "“先生，我现在可以回去工作了吗？”“啊，对，马尔科。当然可以。”"
 FD.29.t:0 "军队对南尼的凛然回响"
 FD.29.d:0 "米兰警方虽常处理火警，但他们却对此次事件束手无策。纵火者乃一群于城中休假的士兵，他们将两百份社会主义报纸捆绑焚于酒吧门外。火光中，一则关于南尼向军队演讲的头条新闻依稀可辨。那晚当班的酒吧员工对警方平静地说：\"先生，我未闻异常，我一直在吧台内，四周喧闹不已。我确实服务过几位士兵，但他们看起来并未醉酒。\n\n达维德心知肚明，了如指掌。那些士兵中有些是他童年挚友，余者亦是他眼中的义士。他们来此借酒浇愁，向他诉说听闻的谣言：南尼将在报上发表宣言，提醒军人保卫政府乃其天职。正是达维德指点他们左翼报纸的售卖之处，报贩藏钥匙的所在，以及如何表达对南尼指控的愤慨。\n\n达维德自觉如幕后高人，调兵遣将后，便静观其变，欣赏火势。他的朋友们纷纷投笔从戎，他却选择留下，助叔叔为酒客和风尘女子斟酒。虽有时心生悔意，但今日他却心怀坦荡。他庆幸自己未在赤旗下低头，更未受一名会让他背负叛国之名的人指挥。"
 FD.29.a:0 "苍天有眼，意大利人不会为了彼得罗·南尼和他的梦想而死！"
 ita_econ_watch:0 "看向经济"
 ita_econ_watch_desc:0 ""
 ita_northern_industry_aid:0 "北方工业援助"
 ita_northern_industry_aid_desc:0 "The north has always been the most modern and industrialized of italian regions. In recent years, Italy's industry has stagnated with the reduced military demand and the global economic slowdown. This state of affairs cannot be allowed to continue. Tax cuts, loans, and grants will be offered to turn northern Italy back into the thriving center of industry it once was."
 ita_northern_industry_aid2:0 "北方工业援助"
 ita_northern_industry_aid2_desc:0 "The north has always been the most modern and industrialized of italian regions. In recent years, Italy's industry has stagnated with the reduced military demand and the global economic slowdown. This state of affairs cannot be allowed to continue. Tax cuts, loans, and grants will be offered to turn northern Italy back into the thriving center of industry it once was."
 ita_new_corporatism:0 "新法团主义"
 ita_new_corporatism_desc:0 "领袖为意大利勾勒的宏图已然重现！齐亚诺的改革已成往事，国家与企业的目标再度融为一体。商界再无权对我们的意大利愿景说三道四、唱对台戏。这一新体系将一箭双雕，通过将官僚、政治家和商人的角色合而为一，且仅由忠于国民联盟的人士担任，简化流程，提升效率。这场翻天覆地的变革将使意大利的经济一日千里，比以往任何时候都更加精简高效！"
 ita_buoncostume:0 "道德风化局"
 ita_buoncostume_desc:0 "我们已授予道德风化局这支负责维护意大利道德与文化秩序的警队全新的权限！凭借新赋予的权力，他们将根除侵蚀意大利社会的腐朽毒瘤！街头吸毒、向意大利青少年宣扬堕落生活方式、公开散布不爱国共产主义宣传的行径将彻底绝迹！"
 ita_freefall_party:0 "Freefall in Popularity"
 ita_freefall_party_desc:0 "The solidification of our rule over Italy has not gone as well as hoped. Our recent actions bred a substantial backlash against our regime. Rumors have swirled among the general public about what exactly we did to get the King and the PLA on our side. Let the public speculate, for as long as we have the King and Parliament we are effectively untouchable. Sure some of our policies may be hampered and delayed, but sacrifices must be made to consolidate our rule. Since when has public opinion affected anything of importance anyway?"
 ita_hands_on_econ:0 "处理经济"
 ita_hands_on_econ_desc:0 "Now that we are more secure in our power, we are now taking a more hands-on approach to the Italian economy. The economy must work for Italy, and not the other way round! This greater economic intervention will allow us to increase our production to new heights, and oversee that resources are allocated according to the interests of the state."
 ita_corporate_hell:0 "松绑企业"
 ita_corporate_hell_desc:0 "意大利经济需仰赖企业输血，此乃资本主义循环法则。然意大利所需的企业关系，远比他国更为紧密。无论代价几何，我们都需与企业深度协作。毕竟唯有互利共生，方能让意大利真正伟大！"
 ita_a_victory_for_blocchi_nazionali:0 "国民联盟胜利！"
 ita_a_victory_for_blocchi_nazionali_desc:0 "计票尘埃落定，意大利一片哗然，国民联盟意外地战胜了对手。虽然民众对选举的顺利举行感到欣慰，但情况并不全然乐观。民主阵线怒不可遏，意大利各地已经爆发了多场针对我们尊贵政党的集会，指责我们正在“向法西斯主义倒退”。与此同时，基督教民主党在这件事上却异常地保持了沉默。\n\n我们必须记住，国民联盟这次选举的胜利并非一党之功，而是联盟之力。阿尔米兰特挂帅的意大利社会运动是联盟的中坚，但联盟中还有着众多派系，如意社运动中阿尔图罗·米凯利尼领导的国家保守派，意大利统一君主民主党，以及一系列右翼小党，乃至意大利社会运动中更为极端，更偏向法西斯的派系。我们必须调和联盟，让各方满意，否则，我们的统治将难以为继。"
 ita_fascisti_dopo_ciano:0 "齐亚诺以后的法西斯"
 ita_fascisti_dopo_ciano_desc:0 "国民联盟胜选后，所有人都清楚地看到，民众的授权实质上支持了法西斯主义，只是未冠其名，他们利用了民主的工具。然而，这在国民联盟内部引发了诸多疑问：我们该如何执政？是当改革从未发生过，还是遵循民主体制所赋予的规则与限制继续下去？\n\n尽管党内不少强硬派认为现在完全有机会在意大利恢复法西斯统治，但事实是这样做风险重重，因为我们的许多支持者实际上也支持民主，哪怕这种民主是由法西斯主义者主导的。这个问题必须马上解决，以便国民联盟能够开始妥善地治理意大利帝国。"
 ita_the_years_of_the_sheep:0 "绵羊之年"
 ita_the_years_of_the_sheep_desc:0 "我们或许不愿意承认，但我们似乎已经置身于一个民众对法西斯运动渐失信心的年代。这种情况或许难以避免；毕竟，当人们长期只经历一种体制，便会将其所有不满归咎于体制之弊，而忽略了问题的实质。我们自然洞悉真相，但民众对于任何试图逆转民主改革的行动都会心存抗拒。\n\n话虽如此，我们不必让民众时刻洞察我们的真实意图。我们可以颂扬民主的美德，可以接纳其他政党对民心的争夺，但这仅是我们权宜之计。我们将悄无声息地引领国家回归正途，哪怕这需要我们耐心等待。"
 ita_the_fiuggi_congress:0 "菲乌吉大会"
 ita_the_fiuggi_congress_desc:0 "治理国家的问题已经变得过于复杂庞大，非阿尔米兰特一人所能独担。显而易见，召开一次党代会已成了我们的当务之急，以便国民联盟自身能够就如何领导政府达成共识。党内各派系已经提出了两大主要方案。\n\n首策乃我们独挑大梁，力图平衡国民联盟内的各种派系。此法或有助于我们稳固选票，但亦有人忧心党内争斗将致政府效能不彰。另一策则是与基督教民主党暗通款曲，与其形成非正式联盟，向保守派倾斜。虽然这可能会让我们失去极右翼的支持，但它也能吸引更多的意大利民众，助我们稳坐江山。决策须三思而后行，以便我们着手治理意大利之大业。"
 ita_non_rinnegare1:0 "不要舍弃"
 ita_non_rinnegare1_desc:0 "我们不可自降身价，向基督教民主党内的所谓“保守派”低头，而应不忘初心，坚守本心：我们对民主的追求，不与我们对右翼政策的信仰水火不容。因此，我们应致力于将右翼力量汇聚于我们党的旗帜之下。"
 ita_unite_the_right:0 "联合右派"
 ita_unite_the_right_desc:0 "国民联盟在意识形态上出人意料地多元化，从保守派到那些意图真正恢复法西斯体系的人无所不包。尽管我们党内一些较为“左”倾的人持有不同意见，但我们不能忽视他们，因为他们的支持是党的坚实基石。为了维系这份支持，我们将向极右翼承诺在政府中为他们分配一些部长职位，并在未来政府议程中纳入他们的一些主张。希望这样的做法能够让他们感到满意，同时促进党的团结。"
 ita_revolutionary_soul:0 "革命之魂"
 ita_revolutionary_soul_desc:0 "意大利的辉煌并非民主所铸，而是法西斯主义的成就。法西斯主义成效显著，其体制显然优于民主。然而，尽管仍有许多人铭记着这辉煌记忆，但在更多人心中却已是渐渐模糊。我们必须提醒其他政党，他们的理念是多么不切实际，必将失败。虽然这可能会引起一些争议，但真正热爱意大利的人定会理解我们，我们只是在陈述事实，这并非无端指责。"
 ita_cianos_blessing:0 "齐亚诺的祝福"
 ita_cianos_blessing_desc:0 "关于前领袖齐亚诺的立场，外界似乎有所误解。虽然他确实不赞同墨索里尼和斯科尔扎代表的法西斯主义的专制独裁，但将他视为与民主阵线或基督教民主党为伍的“自由派”，未免失之偏颇。实际上，这位伯爵与我们的共鸣远胜于我们的对手。他或许不会完全认同我们中那些更为激进的成员，但这也是我们作为一个大帐篷政党包容并蓄的体现。我们与多个君主主义团体的联盟，让我们在贵族中声望日隆，齐亚诺便是其中的佼佼者。因此，向齐亚诺求取公开支持，不仅有望成功，更可能带来意想不到的益处。"
 ita_politica_del_doppiopetto:0 "双排纽扣政策"
 ita_politica_del_doppiopetto_desc:0 "阿尔米兰特在意大利是一个颇具争议的人物。法西斯主义者认为他可能过于温和，而民主派则认为他过于极端。阿尔米兰特不能被贴上这样的标签，因此他必须在言辞上左右逢源，实际上就是要走一条中间路线。\n\n这样的策略实际上意味着，在大多数普通民主派人士面前，他将展现出对民主、自由的忠诚；而在极右翼人士面前，阿尔米兰特将是一个坚定到连墨索里尼都要刮目相看的法西斯主义者。他希望这一策略能够让每个人都能在国民联盟中找到自己的位置。"
 ita_non_restaurare1:0 "不要恢复"
 ita_non_restaurare1_desc:0 "法西斯已成往事。在意大利，民主成为了新的常态，我们必将尊重这个事实。但是，出于某些奇怪的原因，其他党派并不相信我们！他们认为我们不过是换汤不换药的法西斯，正意图撤销齐亚诺的所有改革！\n\n这种无稽之谈，我们百思不得其解。不过显而易见的是，我们需向他们伸出和解之手。我们将告诉他们，我们并非昔日的法西斯，我们敬重这个新生的民主意大利。为此，我们将意大利统一君主民主党和意大利社会运动的温和派纳入我们的联盟。若运气得宜——加上一些巧妙的措辞——这能够使人民相信我们对民主的诚意。"
 ita_fascism_is_just_a_word:0 "法西斯这是个词"
 ita_fascism_is_just_a_word_desc:0 "旧政之影仍在人心，我们的基督教民主党和民主阵线对手对与我们合作心存芥蒂，这造成了不少僵局。他们为何对旧怨耿耿于怀，对我们横加指责，匪夷所思。毕竟，国民联盟既非反民主之辈，亦非逆流而行之人。与对手一样，我们也志在民主转型后，铸就一个更完美的国家。我们只是在实现共同目标的路径和理念上有所分歧。我们相信我们能够说服他人，携手合作，共襄民主大业——毕竟，我们热爱民主。"
 ita_sway_the_bourgeoise:0 "拉拢资产阶级"
 ita_sway_the_bourgeoise_desc:0 "我们虽然千方百计地表明自己并非国家法西斯党的延续，并且承诺将尊重民主，但仍有不少意大利人心有芥蒂。为打破僵局，我们打算向资产阶级抛出橄榄枝。换句话说，我们需要赢得中产阶级和中上层意大利人的心。这看似出人意料，实则颇具策略。\n\n中产阶级往往是社会中最为精打细算的群体，他们投票主要看谁能带来经济上的好处，进而影响他们自己的生计。我们必须展现自己作为意大利经济繁荣的守护者的立场来吸引他们。当共产主义者企图将一切国有化，而其他党派的自由派对意大利的普通人漠不关心时，我们要清楚地表明，选择国民联盟就选择了经济的稳定与繁荣！"
 ita_silence_Rauti:0 "让劳蒂闭嘴"
 ita_silence_Rauti_desc:0 "选择长远之计无疑是明智的战略，然而，我们中有人对此消极态度不以为然，不过这也在预料之中。皮诺·劳蒂，意大利社会运动中的强硬派声音，就是这样一个搅局者。说实话，他喋喋不休的挑衅和指责，让我们头疼不已，为我们带来的麻烦甚至在国民联盟内部也让我们难以启齿。他不仅在应该保持团结集蓄力量的时刻挑拨离间，还成了对手的马前卒，他们借他那夸张的言辞和立场来抹黑我们的公众形象。劳蒂必须被迅速剔除。若他肯缄默合作，尚可留用；若顽固不化，便只能被扫地出门，成为孤家寡人。"
 ita_meet_the_democrats:0 "会见民主派"
 ita_meet_the_democrats_desc:0 "我们常宣称对民主的热爱。然而，其他党派似乎并不买账，对我们自称民主人士并将尊重民主的声明半信半疑。许多人断然拒绝与我们为伍，这在治理国家时成了我们的难题。\n\n我们要做的就是与其他党派会面。虽然未必能让他们倾心，但至少能让他们忍让。我们对民主情有独钟，并将尊重这个新意大利的民主之路。虽然我们可能永远不会成为朋友，但至少可以不是敌人。"
 ita_oversee_the_economy:0 "监督经济"
 ita_oversee_the_economy_desc:0 "They say that you should not fix what isn't broken. Well, by all accounts, our economy is certainly not broken! Therefore, our economic policy is to let it be. After all, why rock the boat when there's a risk of making it capsize unnecessarily?\n\nWhilst we shall of course oversee the economy to make sure it remains in good condition, our government will largely take a hands-off approach. The technocrats and big business are clearly doing a fine job as is. So, we shall leave them to it and not get in their way. If it works, it works!"
 ita_support_northern_industries:0 "支持北部工业"
 ita_support_northern_industries_desc:0 "Heavy industry is the backbone of any country that seeks to be competitive in the world arena. We must make sure we do not fall behind in this regard. Northern Italy is the nucleus of Italian industry - there is no reason it cannot be globally competitive!\n\nWhilst we shall obviously not meddle too much in the economic system, perhaps we could give the northern industry a bit of a helping hand. Whether this is in the form of tax cuts, financial subsidies, or both, our heavy industry of the north will surely appreciate this, and it will incentivize them to further boost our economy!"
 ita_ILVA_expansion:0 "扩大ILVA"
 ita_ILVA_expansion_desc:0 "意大利平轧钢板及关联工业公司始终是我国重工业的重要基石。然而其当前产量未达预期。我们将投入重资扩建该公司，使其产量达到可接受水平。\n\n为此，我们将在塔兰托投资兴建一座大型新钢厂。此举不仅将大幅提升钢铁产量，更能解决当地长期存在的失业问题——该钢厂将创造大量急需岗位，显著缓解失业困境，并在此过程中助力城市复兴！"
 ita_a_sovereign_economy:0 "统治势力圈的经济"
 ita_a_sovereign_economy_desc:0 "历经多年发展，意大利不仅经济繁荣，更建立起“意大利势力圈”。然而近来，势力圈成员国竟萌生……不轨念头，开始脱离我们的指导自主决策！\n\n此风断不可长！必须让这些国家明白“意大利势力圈”为何冠以意大利之名——皆因我等才是主宰！其经济政策须以我国利益为先。既属势力圈成员，我们的利益便是他们的利益。"
 ita_strengthen_the_lira:0 "使里拉增值"
 ita_strengthen_the_lira_desc:0 "The Lira has for years been treated as 'funny money'. An unstable, second-rate currency, living in the shadow of the dollar, yen, and mark. This shall not do! A strong country with a strong economy must have a strong currency to go with it!\n\nTo remedy this problem, we shall pursue a policy of currency deflation. No longer shall the Lira be considered 'funny money'. Instead, it shall be a strong and stable currency. Considering the state of Germany at the moment, this is perhaps the perfect time to strengthen the Lira and make it the go-to reserve currency of Europe. And perhaps, the world!"
 ita_protectionist_barriers:0 "保护主义壁垒"
 ita_protectionist_barriers_desc:0 "Protectionism has long been somewhat of a... controversial policy amongst economists. Some say that it has a negative effect on economic prowess, while others point out that the benefits of protecting our markets outweighs the loss caused from economic dislocation, that innately stems from free trade.\n\nAfter careful deliberation, we have decided to go with the latter view. A country that is dependent on imported goods cannot hope to become a world power. Therefore, we shall maintain a system of high tariffs and import barriers in order to make sure that Italian products are not out-competed on the Italian market. Buy Italian!"
 ita_rally_FUAN:0 "召集FUAN"
 ita_rally_FUAN_desc:0 "在意大利广袤的土地上，我们虽能积极制衡他党，但社会上注重礼节与文明的辩论风气，让我们不能全力以赴地打击国民联盟的反对者。不过，我们旗下有全国大学行动阵线这一学生组织。他们虽以大学为阵地，但全学阵的青年们非常愿意去做我们不愿沾手的脏活，他们仿佛已做好随时待命的准备。我们可以让他们筹办声势浩大的国民联盟集会，散布海量宣传，甚至对付那些出头的反国民联盟学生！若他们行事过激，我们大可将责任推给个别学生，在大体上全身而退，因为他们仅仅与我们有着名义上的牵连。这真是皆大欢喜的局面！"
 ita_repress_the_riots:0 "镇压暴乱"
 ita_repress_the_riots_desc:0 "共产党人的反抗似乎比我们预料的要更激烈。尽管我们竭力遏制，他们仍旧抗议连连，甚至揭竿而起发动暴乱反对我们的统治！更甚的是，一些自由派人士也开始介入，疑心我们不过是换汤不换药的国家法西斯党。这样的暴动无疑是对意大利国家的野蛮冲击，必须立刻被遏制。\n\n虽然警方已经出动制止暴乱，但他们装备简陋，连小规模的骚乱也难以控制。现在，我们将派出防暴警察去驱散每一场暴乱。摧毁他们的“运动”将削弱他们的斗志，希望这能让他们意识到，对政府的抗议是徒劳无功的。"
 ita_per_la_tu_salvezza_il_nostro_coraggio:0 "我们用勇气来拯救你"
 ita_per_la_tu_salvezza_il_nostro_coraggio_desc:0 "在这民主的意大利，我们须向平民百姓诉说心声。幸而，一般选民易被感化。民心所向，即是我们行动的方向，我们将掀起一场洋溢着爱国情操和时代强音的民粹主义运动。\n\n虽然这些内容显然空洞无物，但出于某种原因，普通选民却往往信以为真。我们要让他们清楚地知道，这是一个混乱、危险，充满了可耻的共产主义阴谋和能够威胁我们深爱的意大利的敌人的时代。在这纷扰尘世，意大利的百姓必须醒悟过来，唯有国民联盟方能护佑家国平安。"
 ita_bring_back_old_friends:0 "找回老朋友"
 ita_bring_back_old_friends_desc:0 "意大利向民主过渡时，许多旧日的法西斯官僚和经理或被降职，或被剔除，或被边缘化。简而言之，这是琐屑的党派斗争。他们曾是“法西斯”并不意味着工作能力不足——我们难道不是崇尚唯才是举的吗？\n\n因此，我们将使这些老官僚和经理官复原职。我们此举毫无他图——我们只是要弥补仓促民主化带来的不公。让我们不要因意识形态而对人民进行打压。"
 ita_the_defenders_of_italian_greatness:0 "意大利伟大的守护者"
 ita_the_defenders_of_italian_greatness_desc:0 "军队乃意大利荣耀之盾！我们心知肚明，他们了然于心，人尽皆知！我们对武装部队的支援，亦换来了他们的忠诚。军队深知我们为其后盾，我们将赋予他们所梦寐以求的一切。\n\n反之，无论世事如何变迁，他们将始终是我们的坚强后盾。我们的对手对这一点虽心知肚明，我们仍需昭告天下。这将使那些图谋不轨者望而却步。"
 ita_control_cinecitta:0 "控制奇尼奇塔"
 ita_control_cinecitta_desc:0 "齐亚诺执政时期，因效率低下沦为笑柄的大众文化部遭废止，加之其不幸绰号，令意大利民众视如敝屣。值得注意的是，意大利电影业虽蓬勃发展，却也催生大量不良内容。\n\n我们不会复活大众文化部，但将插手监管电影产业。我们欢迎艺术表达，电影业对经济确有裨益。然而必须监督其创作，杜绝任何……不合时宜的影片。"
 ita_the_almighty_buoncostume:0 "万能的道德连"
 ita_the_almighty_buoncostume_desc:0 "The liberalization of Italy has led to all manners of degeneracy in Italian society! People are selling and doing drugs in the streets! Communists are preaching all manners of unpatriotic propaganda! Homosexuals and other deviants are out and proud, sending an unwholesome message to Italian children! And that only scratches the surface of this crisis of Italian morality!\n\nWe shall not tolerate this social decay any longer! To this end, we shall empower the Buoncostume. As the police unit tasked with preserving the fibre of Italian values and morality, they shall be sure to root out this rot. Italian society shall yet be wholesome again!"
 ita_breathe_new_life_into_the_empire:0 "为帝国注入新活力"
 ita_breathe_new_life_into_the_empire_desc:0 "意大利向民主政体的转型似乎引发了海外诸多误判。世人皆以为意大利帝国已日薄西山。此等谬论昭然若揭！诚然意大利曾一度停滞，但那些岁月早已远去，意大利之狼将比以往任何时候都更凶猛！我们必须派遣更多官僚治理辽阔而荣耀的帝国，并以更强军力为后盾支持这些官僚。此举将向所有挑战者传递清晰信号：纵使意大利历经剧变，从克罗地亚到波斯湾，她依然巍然屹立。"
 ita_instituto_per_gli_studi_di_politica_internazionale:0 "Istituto per gli Studi di Politica Internazionale"
 ita_instituto_per_gli_studi_di_politica_internazionale_desc:0 "The Istituto per gli Studi Internazionale (ISPI) is a think tank and study institute founded by the late, great Mussolini himself. Its main focus is to study geopolitics and military strategy. Knowledge is power, and in order for Italy to prosper, Italy shall need to be at the forefront of geopolitical maneuvering, to say nothing of military tactics and strategy.\n\nHowever, under Ciano, funding for the ISPI lapsed, and it has fallen on hard times. This shall not do at all! We must give it the additional funding it needs! Without knowledge, we have no power!"
 ita_military_posturing:0 "军事态势"
 ita_military_posturing_desc:0 "The Italian Empire in many manners but especially in military, has been overshadowed by the Germans. Politicians in America or Japan and even in Iberia or Turkey have considered the army to be second rate when compared to Germany. What foolish delusions! These delusional ideas about the Italian military must be rectified at once, by posturing and showing off our military to the world.\n\nWe shall begin grand military exercises throughout the Empire, and deploy our Navy at levels that haven't been seen since the 40s. Even more than that, we shall begin broadcasting to the whole world how powerful and how well-equipped and efficient the mighty Italian military truly is! Such posturing will, hopefully, drive it into the superpowers that Italy is not subordinate to them, but an equal in many respects."
 ita_a_moral_italy:0 "道德的意大利"
 ita_a_moral_italy_desc:0 "意大利民众近来深陷道德堕落的深渊！婚姻如儿戏般随意解除，妇女残杀腹中骨肉，更骇人听闻的是男性之间以最污秽的方式行苟且之事！所幸堕胎与离婚仍属非法，但须采取更强硬措施杜绝地下堕胎与事实离婚。最直接有效的解决方案是重塑完美传统家庭观念：岂能为琐碎争执毁弃婚姻之美？最终，我们必须立法禁止同性恋行为，将这些道德败类逐出我们荣耀的国度！"
 ita_a_great_italy:0 "伟大的意大利"
 ita_a_great_italy_desc:0 "这场本应成为胜利庆典的事件，却将意大利推入新的动荡期。尽管仍需应对经济余波，但意大利濒临崩溃的岁月早已终结。然而，世界各国仍视我国经济疲弱——这种认知必须即刻扭转。\n我们将令经济学家发布专题文章，展示所有关键数据向世界宣示意大利的经济繁荣！即便需要编造部分数据支撑宣传，长远来看亦将造福国家——当民众看到这些报道，必受鼓舞而更勤勉工作、积极消费，从而加速复兴进程！"
 ita_a_strong_italy:0 "强劲的意大利"
 ita_a_strong_italy_desc:0 "意大利是强国，而我们的武装力量正是这强权的脊梁！我们心知肚明，他们心知肚明，意大利举国皆知，世界有目共睹！但为确保举世皆知，我们必须公开颂扬军队——当然，要比现在更加高调。\n\n不仅如此，为确保武装力量永为意大利强权的支柱，我们还将追加拨款。他们必将善用这笔资金，让意大利在这动荡世界继续高擎力量之火炬！"
 ita_the_days_of_the_lion:0 "雄狮之日"
 ita_the_days_of_the_lion_desc:0 "我们国民联盟在意大利民众心中，并非代表着国家保守主义，而是法西斯主义。正是法西斯主义曾经带给意大利荣耀，是它被齐亚诺错误地解散，也是我们的法西斯身份帮助我们赢得了选举。我们岂能让温和主义污了我们的信仰？我们将坚持我们的极右立场，带领我们的帝国迈向前所未有的高峰。"
 ita_speak_to_parliament:0 "议会之辩"
 ita_speak_to_parliament_desc:0 "意大利议会，乃意大利新生民主之象征与力量所在。我们或许可以保留它，尽管让它处于边缘化的角色，以免激怒那些民主的支持者；亦可在这场闹剧蛊惑民心前彻底了结它，引领我国重返法西斯之正途！然而，这样的决定可能会激怒那些民主的支持者。但最终，我们能够挺过随之而来的风波，但这样的决定无疑将对意大利未来政府的形态产生关键影响。"
 ita_sideline_parliament:0 "排挤议会"
 ita_sideline_parliament_desc:0 "经过一番唇枪舌剑，国民联盟的高层们最终决定让议会存续下去。然而，阿尔米兰特对于那些来自基督教民主党或民主阵线的喋喋不休，关于“破坏民主原则”的指责，他选择充耳不闻。事实上，阿尔米兰特已洞察到，他能独断许多事务，无需理会那些愚不可及之言！即便有时不得不与议会周旋，我们也能通过让国王赋予阿尔米兰特更多权力来确保掌控局面。这对所有举足轻重的人而言，无疑是皆大欢喜的局面。"
 ita_demand_full_powers:0 "要求全权"
 ita_demand_full_powers_desc:0 "尽管我们已尽其所能地忽视并边缘化了议会，但政府若显得背道而驰于“法治”原则，终究不是一件光彩的事。不管这“法治”具体含义如何。幸运的是，这个问题有一个简便的解决之道。我们将恳请国王翁贝托，赋予我们特别的紧急权力，以平息街头的骚乱和议会中的混乱局面。\n\n他即便心不甘情不愿，也将不得不授予我们这些权力。毕竟，他在此并无太多选择的余地……"
 ita_chain_the_liberals:0 "拴住自由党"
 ita_chain_the_liberals_desc:0 "意大利自由党，简称PLI，是一小党派，只有寥寥几位议员。尽管他们无足轻重，却总是令人烦恼，他们标榜的“自由主义理念”使他们频频非难我们正当的政策，甚至将我们的政府污蔑为换汤不换药的法西斯！\n\n这种胆大妄为的行为绝不能容忍！我们将用一些“手段”迫使他们加入我们的联盟。稍加威胁，略施压力，他们便会接受一个难以回绝的提议。他们一旦加入，不仅能为我们联盟增添几分正统性，更将在议会中受制于我们，这正中我们下怀！"
 ita_strongarm_the_king:0 "胁迫国王"
 ita_strongarm_the_king_desc:0 "翁贝托国王，作为齐亚诺改革的一部分，他甘心将权力全部让给了议会，意大利君主成了虚位元首。然而，尽管他不再拥有任何实质性的政治权力，国王在民间依旧德高望重，一言九鼎。\n\n我们需借东风，顺势而为。我们将向翁贝托国王进言，并……以理服人，让他为我们和我们的政策代言。这不仅能为我们赢得民心，更能巩固我们在意大利人民中的地位！国王对此或许会心有不甘，但毕竟，这是他自己放弃了权力的结果！"
 ita_fiamma_tricolore:0 "三色火焰"
 ita_fiamma_tricolore_desc:0 "辛勤耕耘，终得硕果累累！尽管历经波折，意大利现在已经拥有了一个强有力的右翼政府，它必将引领国家重返荣耀之巅！三色火焰熊熊，生生不息！\n\n自由派已黯然失色，国王也认清了自己的角色，随着我们权力的巩固，现在正是时候让意大利重返世界舞台的荣耀之位！意大利，再续辉煌！"
 ita_bolt_parliament:0 "打翻议会"
 ita_bolt_parliament_desc:0 "时机已至，我们不再需要民主来作为幌子！不再任由左翼分子在我们的锦绣河山中肆意横行！法西斯主义复兴的曙光在望，我们将确保它此番不会再度消逝。\n\n我们的政变计划中打算首先占领议会，将那些对我们荣耀统治构成威胁的对手通通逐出舞台。继而，我们将号召军队与我们并肩，重演向罗马进军的壮举！若国内还有人对此喋喋不休，我们将提醒他们，这正是民心所向，因为我们是民选之主，我们是人民意志的代行者。"
 ita_un_bivacco_di_manipoli:0 "为士兵修上营寨"
 ita_un_bivacco_di_manipoli_desc:0 "议会对我们已无益处，无需再留。对我们辉煌统治的“反对”声音，该是时候认清自己的位置了。\n\n我们将掌控议会。政府仅属于我们。这些无用的“反对”议员将被赶出议会，不再有机会对我们投反对票，尽管他们的投票本就是徒劳。若他们胆敢反抗？那么，略施薄惩便足以令他们噤声！"
 ita_call_borghese:0 "联系博尔盖塞"
 ita_call_borghese_desc:0 "军中许多人，尽管表面上保持中立，实际上却支持我们和我们的主张。他们本应如此，毕竟我们都是意大利荣光的守护者。现在，关键在于如何让他们公开站出来。\n\n我们将联系我们的军中老友朱尼奥·博尔盖塞。他自墨索里尼时代起便是法西斯主义的忠实信徒。凭借他在军中的威望，他一定能集结起军事力量来支持我们！有了他们的助力，我们将如虎添翼，无人能挡！"
 ita_rally_the_blackshirts1:0 "召集黑衫军"
 ita_rally_the_blackshirts1_desc:0 "时机成熟，风云再起。\n\n那些曾被齐亚诺解散的黑衫军，如今正是重披战袍之时，因为他们的时刻已至。昔日墨索里尼把握天时，率领黑衫军直取罗马，我们也将追随其足迹！我们将再度进军罗马！\n\n意大利必将复兴，我们将令墨索里尼含笑九泉，重建他所筑就的辉煌意大利！这是我们的时代！同胞们，向着胜利，勇往直前！"
 ita_ordine_nuovo:0 "新秩序"
 ita_ordine_nuovo_desc:0 "时候到了！第二次进军罗马将开始，我们要建立法西斯新秩序！人民想要法西斯，人民会得到他们想要的！\n\n有了黑衫军、大企业和军队的支持，我们的胜算不小！自齐亚诺在法律层面废除法西斯主义的那一刻起，我们就一直为此刻做准备，如今一切都会开花结果。我们的梦想一定会实现！什么都阻止不了我们！"
 ita_control_the_economy:0 "控制经济"
 ita_control_the_economy_desc:0 "既已稳固权柄，是时候深度介入经济事务。经济须为意大利——尤其为我们——服务，岂能本末倒置！\n\n掌控经济即掌控金钱，掌控金钱即掌控国家！我们将把生产推向新高！我们将压制工会及其卑劣的社会主义宣传！法西斯经济政策过去未负意大利，今日亦当如此！"
 ita_chain_the_unions:0 "拴住工会"
 ita_chain_the_unions_desc:0 "工会始终是意大利的顽疾。共产党人与自由派用怪异可怖的思想荼毒工人，必然导致生产力严重滑坡！墨索里尼曾镇压工会将其逐出工作场所，而齐亚诺恢复民主的举措却让这群豺狼卷土重来。"
 ita_productivism_at_all_costs:0 "一切向生产看齐"
 ita_productivism_at_all_costs_desc:0 "We cannot hope to compete in the world arena if our industries are not at the maximum productivity possible. We cannot settle for anything less, lest we risk falling behind! Therefore, we must seek to maximize our productivity, no matter what the cost.\n\nWe shall raise the production quotas. We shall continue to invest and invest in the necessary industries, so long as they are willing to work with us. Italy shall be a productive industrial powerhouse, come hell or highwater!"
 ita_expand_corporative_control:0 "扩大法团控制"
 ita_expand_corporative_control_desc:0 "Corporatism has long been a cornerstone of fascism. Fascist corporations and big businesses are the lifeblood of our economy, providing jobs to countless Italians whilst contributing to our strength, both economically and militarily.\n\nThey are clearly doing a bang-up job of it. So, as a reward, we shall increase their power! We shall invest in them more, give them more incentives to work to the benefit of Italy, and us! This buddy-buddy relationship can only be good for Italy!"
 ita_invest_in_military_innovation:0 "投资军事创新"
 ita_invest_in_military_innovation_desc:0 "Technology is constantly evolving and changing. Military technology is no exception in this regard. Even today, the military technologies, and thus, strategy and tactics, have evolved greatly since the end of the war. We must make sure that our military does not fall behind, or Italy shall never survive!\n\nTherefore, we shall invest much lira into continuing to innovate our military and our technology. Italy must be at the forefront of military technology and strategy if we are to achieve our rightful place in the world!"
 ita_a_renewed_autarky:0 "重振自给自足"
 ita_a_renewed_autarky_desc:0 "自由民主的复兴纵容了种种污秽在我们荣耀国度滋生。国际贸易——资本主义的先驱——正是其中一例。已故的伟大领袖墨索里尼曾构想过繁荣自足的意大利，即自给自足经济。\n\n我们将重拾其愿景，恢复旧有的自给政策。当然，时移世易，自给政策必须调整以适应新现实。但自给经济必将重现，且比以往更宏大、更完善！"
 BN.1.t:0 "法西斯主义的未来"
 BN.1.d:0 "随着国民联盟在选举中取得胜利，党内总部的讨论变得愈发激烈。高层齐聚一堂，讨论下一步该如何行动。温和派力主尊重新生的民主体制以稳固权力，强硬派则力图恢复法西斯荣光，绝不妥协。双方你来我往，互相指责对方“消极投降”和“目光短浅”，显然，国民联盟在胜选之后，现在缺乏一个明确的政治方向和计划。“政治格局已经发生了变化。我和这个房间里的任何人一样，都坚持法西斯主义的原则，但我们必须适应这个新的现实。对我们的运动来说，实用主义是不得已的选择。”德·马尔萨尼奇争辩道。\n\n“这根本就是无稽之谈。我们的运动本身就很强大。我们需要粉碎这些软弱的社会主义者，像几十年前做过的那样，恢复秩序。”劳蒂充满激情地回应。\n\n劳罗最终也加入了争论。“我理解有时候妥协是必要的，但我们不能就这样出卖我们的理想。民主是法西斯主义的敌人，而不是朋友！”\n\n最终，争论升级为互相叫嚣，没有达成任何共识。劳蒂甚至要求阿尔米兰特以“背叛法西斯”之名将温和派开除出党。在那个炎热的小房间里，数小时的喧嚣之后，阿尔米兰特终于拍案而起。“够了！我们本应是法西斯主义的先锋，而不是一群嘶吼的野兽。”房间内突然安静下来，阿尔米兰特终于做出了决定。“我已经决定了对法西斯主义来说最好的方案，我希望你们尊重我作为首相和党首做出的决定。”"
 BN.1.a:0 "“我们必须与民主体制步调一致。”"
 BN.1.b:0 "“我们应自行开拓前程。”"
 BN.2.t:0 "与民主党会面"
 BN.2.d:0 "温和派胜出之后，国民联盟在菲乌吉温泉浴场召开了一次大会。这里比之前那个狭小闷热的房间要舒适得多。由于多数强硬派选择缺席以示抗议，气氛比之前轻松了不少。阿尔米兰特计划与同僚们在桑拿室里小聚，放松心情，回忆往昔。但对于法西斯主义者来说，责任总是重于泰山。当天的大会旨在重新审视与基督教民主党的联盟，探讨共同制定立法议程的可能性。\n\n“尽管我们党在上次选举后依然强大，但我们可能需要民主主义者的支持来推进我们的下一个项目。而且，社会主义者可能对我们构成威胁，相信在座的各位都不希望他们推动放纵的议程。不是吗，安德烈奥蒂先生？”德·马尔萨尼奇说道。\n\n“呃，当然。我们很感激国民联盟愿意首先选择与我们接触。如果我们能在……我们的小分歧上达成妥协，我相信这个联盟能够运作起来。”安德烈奥蒂回答。这两位绅士的对话，对阿尔米兰特来说，与几天前的喧嚣相比，无疑是一股清新之风。“不过，最终的决定还是要由我们的领袖来做。他会决定我们是否继续这项合作。”德·马尔萨尼奇说着，向阿尔米兰特投以微笑。阿尔米兰特明白德·马尔萨尼奇可能只是在迎合他，因为他选择支持温和派，但这次他真切地感到自己的领导得到了党的认同，这种感觉让他十分受用。将那些鲁莽的极端分子边缘化，在现在看来真是个明智的决定。首相清了清嗓子，准备作出回应。"
 BN.2.a:0 "“国民联盟将独自前行！”"
 BN.2.b:0 "“我们应携手并进，把那些激进分子排挤到一边。”"
 BN.3.t:0 "集会"
 BN.3.d:0 "“为意大利而战！为荣耀而战！为阿尔米兰特而战！”\n\n阿尔米兰特在市中心激昂陈词，人潮的呼声此起彼伏。一辆辆公交车络绎不绝，载来了一批又一批身份不明的支持者，使得集会声势愈发浩大。\n\n显而易见，这些支持者大多非本地人士，但这一点似乎无伤大雅。或者说，任何关于他们身份的疑问都被人潮的壮观和震天的欢呼声所淹没。\n\n媒体记者围绕集会忙碌不停，他们记录、拍摄，尽管对这些支持者的来历心存疑虑，却也不由得被这股热情所吸引。人群气势磅礴，活力四射。阿尔米兰特的豪言壮语显然已经俘获了他们的心。\n\n到了一天结束时，这些支持者的来历真的那么重要吗？"
 BN.3.a:0 "多么壮观啊！"
 BN.4.t:0 "齐亚诺的祝福"
 BN.4.d:0 "“号外！号外！前领袖齐亚诺力挺新首相阿尔米兰特！”\n\n皮耶罗从报童手中接过报纸，目光迅速被头版大字吸引，正如报童所喊，标题下是齐亚诺与新首相、国民联盟领导人阿尔米兰特握手的照片。出于好奇，皮耶罗细读起文章。\n\n“作为我们辉煌国度的前任也是最后一任领袖，我相信阿尔米兰特先生是引领意大利进入新时代的最佳人选。我们或许在细枝末节上有所分歧，但在大是大非上我们心有灵犀。在这个多事之秋，他是引领意大利走向正途的不二人选。”\n\n皮耶罗眉头紧锁。他未曾投票给国民联盟；在他眼中，他们不过是换汤不换药的法西斯。他们的胜利让他深感忧虑，他担心着意大利脆弱民主的未来。\n\n但若连他敬仰的、为意大利民主化立下汗马功劳的齐亚诺也支持他们……"
 BN.4.a:0 "也许事情坏不到哪去。"
 BN.5.t:0 "两面"
 BN.5.d:0 "有人质疑，我们选择参与选举是运动衰弱、向敌人投降的信号。先生们，这纯属无稽之谈。民主不过是实现目标的一种手段。”年轻人边说边啜了口咖啡，指尖继续在打字机上飞舞。“我们的根本原则坚如磐石。国家将一如既往地强大，无论是内部还是外部，我们的武装力量将击溃一切敌对势力，没有任何政党能对我们颐指气使。我们将把社会主义者扫入历史的尘埃，他们就该待在那里，德国人也休想再对我们耀武扬威。法西斯的火焰永不熄灭！”\n\n文章作者心满意足地从打字机上取下文稿，为国民联盟成员准备的演讲稿已然成形。阿尔米兰特对他撰写演讲稿的才华一直赞赏有加，他自然不敢怠慢。年轻人又换上一张新纸。“再完成这篇演讲，我就能回家了。”他心想。他的女友一直期盼着更多的相伴时光。现在将私事暂且搁置，阿尔米兰特的助手继续为电视演讲奋笔疾书。“我必须重申，我尊重人民的意愿高于一切。每个人都有权在选票上发声。这也正是我支持民主化的初衷。同时，我也要强调，我是和平的坚定拥护者。意大利是和平与自由的国度，我们只关心国民的福祉，绝无侵犯邻国之意……”"
 BN.5.a:0 "一人两面。"
 BN.6.t:0 "教化"
 BN.6.d:0 "在圣母玛利亚雕像的默默注视下，马尔科结束了一天的劳作，坐在沙发上打开了电视。屏幕上，意大利首相乔治·阿尔米兰特的面孔映入眼帘。“怎么还是他，”马尔科心中不免生厌。齐亚诺把经济搞得一团糟，又放任那些危险的左翼分子在街上横行。他怎能再次信任同样的人能扭转乾坤？他曾把票投给了基督教民主党，期待能有新的转机，然而那些老法西斯又卷土重来试图搞砸一切。在他来得及换台前，阿尔米兰特已经开始了他的演讲。“我对意大利人民的苦难感同身受。这些年来，对于国内辛勤劳作的人民来说，实属不易。”工资减半后，失业的阴影让马尔科忧心忡忡。或许这家伙真能言之有物？\n\n“但从今往后，一切都将好转。我有着让经济重回正轨的宏伟蓝图。有了国内顶尖经济专家的鼎力相助，成功指日可待，”阿尔米兰特在电视上信誓旦旦。马尔科为之振奋：与那个草包齐亚诺不同，他显得胸有成竹。他有专家团队的支持！阿尔米兰特继续着他的演说。“我还计划投入重金，扩大我们的工业规模。工厂和造船厂的工人们将会欣喜地发现，他们将在我们的计划中扮演着重要角色。当然，这也意味着对他们辛勤工作的丰厚回报！”这番话让马尔科感到自己对国家再次变得举足轻重。基督教民主党可以靠边站了：阿尔米兰特刚刚赢得了他在下一次选举中的选票！"
 BN.6.a:0 "阿尔米兰特发自肺腑地向我们的工人发言"
 BN.7.t:0 "信徒之怒"
 BN.7.d:0 "皮诺·劳蒂怒不可遏地走出了大楼，泪水悄然从他的脸上滑落。国民联盟与新生民主体系的妥协，在党内强硬派中激起了千层浪。一些激进分子难以接受这样的转变。得知国民联盟有意与温和派政党妥协，劳蒂愤然指责党正在背离初衷，向民主派低头，并要求“立刻改弦更张”。他的要求被漠视后，他愤然撕毁了党员证，并宣布辞去党内职务。领袖若泉下有知，看见自己钟爱的党向自由派的任性屈服，定会痛心疾首，悲愤不已。劳蒂在街头漫步，他沉思着法西斯主义何以沦落至此。答案昭然若揭：贪婪和傲慢侵蚀了法西斯运动，需要有人来清除那些企图破坏事业的寄生虫。“无论代价如何，我都会保护法西斯主义的未来，不惜一切手段。即使这将摧毁这个国家。”劳蒂心中暗自立誓。一丝狡黠的笑容爬上了他的面庞。那一刻，他已胸有成竹。这一次，他们肯定会听他的。"
 BN.7.a:0 "他只是在虚张声势。"
 BN.8.t:0 "全学阵在行动"
 BN.8.d:0 "“我认为计划经济更为有效。但不是布哈林所尝试的那种。”一个金发学生手拿香烟争辩道。\n\n“国家天生就是压迫性的。工人应该自己给自己争取利益。”另一个坐在桌上的学生回答。\n\n一个激动的女孩带着各种社会和政治事业的传单走进了挂满红色横幅的教室，带来了一些令人担忧的消息。\n\n“大家快看，外面出事了。”一群左翼学生走出了大楼，目睹了一个噩梦般的场景。他们惊恐地看到，数百名全学阵成员身披法西斯标志、高唱爱国歌曲，在校园里游行。女孩注意到一些横幅上写着“领袖永生”和“意大利永不变红”。她十分确信自己从未在任何课堂上见过人群中的一些人。\n\n“打倒共产主义！意大利万岁！”人群热情高涨地呼喊。这一突发事件震惊了米兰大学的左翼组织。这背后必有黑手在操纵。\n\n“我们不能任由这些法西斯分子在我们的地盘上撒野。”一名学生愤愤不平。\n\n那位年轻的金发男子扔掉了烟，准备迎战。“玛丽亚，召集我们的同志。有些法西斯败类欠我们收拾了。”女学生点头，匆匆离去。为了民主，血的代价在所难免。"
 BN.8.a:0 "谁说年轻人不喜欢法西斯主义？"
 BN.9.t:0 "第一滴血"
 BN.9.d:0 "贝亚特里切在客厅里踱步，焦急如焚。她瞥了一眼时钟，现在已是深夜。她的儿子已经外出好几个小时，她不知道他在哪里。如果他被抢劫了，或者更糟，被杀了怎么办？她心急如焚，泪水在眼眶里打转，终于，儿子推门而入。贝亚特里切怒气冲冲地斥责他。\n\n“卡洛，你让我担心死了。你去哪儿了？我差点就要报警了！”\n\n少年对母亲的担忧置若罔闻，疲惫地瘫坐在沙发上。“警察？让他们见鬼去吧。”\n\n卡洛的手臂上赫然一道血痕，脸上青一块紫一块。“天哪，你怎么了？你在流血！”贝亚特里切惊呼。\n\n“有个骑马的混蛋稍微伤了我一下。我没事。”卡洛轻描淡写地回答。贝亚特里切立刻冲进卫生间，拿来纱布和消毒液。她小心翼翼地为儿子擦拭伤口，他痛得直哭。\n\n“你应该感激你妈妈在这里。我不许你再和那些狐朋狗友混在一起。听见没有？”\n\n今天，卡洛第一次参加了政治集会。事情并没有像他想象的那样顺利。也许他暂时不会再参与激进活动了。至少现在，他的母亲正在为他疗伤，他决定暂时听从她的话。“好的，妈妈。”"
 BN.9.a:0 "母爱"
 BN.10.t:0 "宣传攻势"
 BN.10.d:0 "丹特清晨醒来，轻推窗户，呼吸了一口清新空气。正沉醉于鸟语花香之际，却意外瞥见一桩怪事。隔壁楼宇间，突然出现了一个巨幅广告牌。广告牌上，乔治·阿尔米兰特正笑容可掬，双臂交叉，旁边标语赫然写着“阿尔米兰特将令意大利重振雄风”。他下楼准备早餐，随手扭开收音机，想听一听新闻。不料，耳边响起的却是政府的宣传之音。“阿尔米兰特首相日理万机，正为着更好的意大利而努力。多亏了他……”丹特心生不悦，旋即关闭收音机：他渴望的是真相，而不是那些粉饰之词。\n\n早餐过后，丹特想起他需要添置些日用品。在前往商店的途中，他看到木栅栏上贴满了“阿尔米兰特捍卫我们的工业”的海报，上面是阿尔米兰特穿着工人的衣服的照片。此刻，他已心如明镜，这不过是政治作秀罢了。在商店结账时，电视上正播放着阿尔米兰特“外交成就”的宣传。“这真是我们选出的人吗？”他心生疑惑。“别怪我，我投的是阵线。”店员回应。丹特唯有一声叹息，只得悻悻离去。"
 BN.10.a:0 "我们的首相，是个相当谦和的人。"
 BN.11.t:0 "罗马阅兵"
 BN.11.d:0 "首相为了赞颂我们军队在海外捍卫意大利利益的功绩，决定举行一场阅兵式，以此向意大利士兵的英勇致敬。罗马街头，士兵们步伐铿锵，展现了无论是在国门之内还是海外领土，军队守护国家利益的坚定决心，民众的欢呼声和飘扬的国旗构成了一道亮丽的风景线。三军将士齐集，从“弗格尔”伞兵师到皇家海军保卫地中海的勇士，从皇家空军的飞行员到阿尔卑斯山地部队的精英。阅兵式后，德·洛伦佐将军在一封私信中向阿尔米兰特表达了感激之情，感谢他主导举办这场阅兵以及他对“向使意大利成为世界强国的人致敬”的承诺。这一天，阳光明媚，意义非凡。我们希望这不仅能让我们的人民团结起来支持我们的军队，也能向其他国家展示我们的力量，向世界宣告意大利武装力量的雄风依旧。"
 BN.11.a:0 "意大利万岁！"
 BN.12.t:0 "再度联合"
 BN.12.d:0 "索尼奥从不急躁冒进。任务紧急时，他自会迅速应对，但他更倾向于稳中求胜，步步为营。\n\n国民联盟在选举中的胜利无疑给他敲响了警钟，但在确信他们意欲颠覆民主与王权之前，索尼奥不愿轻举妄动。这时，门轻轻开启，他最信任的一位年轻顾问的声音划破了室内的宁静。\n\n“先生，”年轻人语气中带着忧虑，“国民联盟刚刚宣布了新一批任命，几乎涵盖了整个意大利官僚体系。”\n\n索尼奥从报告中抬头。“那又如何？”\n\n“他们把法西斯分子都召回来了。”年轻人递给索尼奥一张纸，上面列满了重返权力舞台的前法西斯分子，他解释道，“几乎是杜——”他及时收住话头，接着说，“——齐亚诺一年前清除的那些人。公开的法西斯分子，他们的同党，无一遗漏。”\n\n索尼奥将军审视着名单。年轻人所言非虚——新官员中确实有不少人是耳熟能详的法西斯分子——有些甚至曾是国家法西斯党的高层，直到被齐亚诺解散。\n\n“密切关注他们，”索尼奥指示道，“这确实有点令人担忧，但我们需知己知彼，方能百战不殆。”年轻人点头，索尼奥又补充道，“目前，我们需要开始加强与军队的联系。你和其他人现在着手开始在陆军和国家宪兵中播撒关系网——不要做得太过显眼，这只是未雨绸缪。”\n\n“明白，先生。”年轻人应声，迅速离开了索尼奥的办公室。\n\n门轻轻关上后，索尼奥低声自语：“这可不是什么好兆头……”"
 BN.12.a:0 "十分令人担忧。"
 BN.13.t:0 "(已审查)"
 BN.13.d:0 "金发女子解开了衬衫的纽扣，露出了裸露的胸部。年轻男子用带着欲望的目光盯着她，两人随即热烈相吻。导演眼中，这一幕已足够动人。“停！好了，大家休息一下！”女演员披上浴袍遮住她裸露的身体，帕索利尼对男演员阿德里亚诺说：“你去化妆室准备下一场折磨戏。别担心剧本上写的：那些都只是巧克力和橙子。”\n\n阿德里亚诺点头，助理匆匆赶来向帕索利尼汇报：“帕索利尼先生，制片人找您，他想……和您谈谈。”帕索利尼疑惑地接起电话，不明白制片人为何会在拍摄中途给他打电话。制片人在电话里的声音低沉，似乎带着不祥的预兆。\n\n“我们遇上大麻烦了，保罗。你必须立刻停拍。”这突如其来的消息让帕索利尼震惊不已。“可是……都快杀青了。为何要取消电影？”制片人平静却带着忧伤地回答：“上级有令。似乎是什么新规定，关于电影违背‘道德和良好价值观’之类的。”除了被逮捕过几次和审查员稍微责骂过他的电影，这些人之前从没这么在意过他的电影。但新法西斯政权的阴影已经笼罩下来，帕索利尼感到自己几近崩溃。\n\n“道德和良好价值观？我又不是教书匠。这部电影是给成人看的！他们在乎这个干什么？这些伪君子在业余时间玩的比这还花！”帕索利尼怒吼。“他们甚至在我的车里放了我孩子们的照片。他们动真格了。我的线人说，他们连你和共产党人的会面都知道。请别再添乱了。”制片人带着悲伤说。电话挂断后，帕索利尼愤怒地摔了电话，不得不让小工作室的众人散去。他独自留在现场，心中却已在谋划着复仇。“伪善的道德卫士，你们还没领教我的厉害。如果你们现在就觉得我的电影不堪入目，下次我要让你们大开眼界。”"
 BN.13.a:0 "谁人能念及那些无辜稚子？"
 BN.14.t:0 "噩梦般的地缘政治"
 BN.14.d:0 "IPSI杂志。第12页\n\n地中海乃意大利历史的命脉。从罗马帝国的辉煌到今日，意大利与海之间的不解之缘显而易见。正因这份不解之缘，德国成了意大利王国的劲敌。历史上，日耳曼部落屡屡企图阻断意大利在地中海的宿命，撼动罗马的海上霸权。故而，阿尔卑斯山与地中海相得益彰，山峦如同天然屏障，守护着我们在海上的利益。\n\nIPSI杂志。第23页\n\n虽然意大利与地中海的历史渊源流长，但若忽视欧洲大陆在塑造意大利身份中的核心作用，则失之偏颇。纵观欧洲历史，意大利在中欧的战略地位，曾是列强纷争的焦点。因此，意大利选择追求于欧洲的霸权，乃是顺理成章之事。\n\nIPSI杂志。第34页\n\n意大利与德国的联盟，是北欧与南欧的珠联璧合。德意联盟使意大利得以巩固其世界强国之位。因而，意大利的最佳策略莫过于与德国结盟，以此重塑欧洲的权力天平。"
 BN.14.a:0 "意大利的荣光……匿于何地？"
 BN.15.t:0 "悲戚之诗"
 BN.15.d:0 "年轻的诗人一路狂奔，只见朋友在俱乐部门口黯然神伤。“徒劳，这儿也关了。”他语气中带着哀伤。诗人瞥见窗上红标：“因违反公共道德法而关闭。”随着最后一处他得以栖身的俱乐部的关闭，这位艺术家的心中涌起了无尽的悲伤。“‘阿戈拉’也关了吗？他们上周已经关了‘奥林波’。这不公平！”诗人悲愤地呼喊。新政府关闭那些“道德可疑”场所的政策，对意大利前卫艺术圈无疑是一举沉重打击。艺术家们失去了探讨文学、自由表达的天地。年轻的诗人心中愤懑，他们为何要干涉自己在业余时间的所作所为？“我们接下来该如何是好？社会真的如此不容我们吗？”诗人掩面而泣，声音中满是绝望。朋友紧紧握住他的手：“终有一天我们会找到一片新天地。他们不能因我们真实的自我而将我们拒之门外！”"
 BN.15.a:0 "艺术魂灵的苦楚。"
 BN.16.t:0 "身份危机"
 BN.16.d:0 "贾迈勒百无聊赖地凝视着黑板。他正在上的课程枯燥不已，老教师那平铺直叙的讲解更是让人昏昏欲睡。“意大利占领厄立特里亚后，将其变为了工业重镇。”厄立特里亚男孩心不在焉地望向窗外，老师却还在滔滔不绝。“他们为当地建起了学校和医院，换言之，他们给那片土地带来了繁荣。”\n\n老师的话让贾迈勒心生疑窦，他举手提问。“我爷爷告诉我，他们曾经就因为他是穆斯林就把他关进了监狱。这是真的吗？”其他孩子随之投来惊异与不屑的目光。\n\n“你爷爷是个活在过去的傻瓜。你应该感激意大利赐予你土地的恩泽。”老师如是说。\n\n“可是老师，我家连电都没有。这哪里称得上是进步？”这位老人对他的顶撞愈发恼怒。“而且领袖让一切雪上加霜。我爸爸说，因为他是厄立特里亚人，人们就不给他工作。”\n\n老师忍无可忍。“你这小鬼，竟敢如此无礼？墨索里尼是有史以来最伟大的领袖！去角落反省，想想你的所作所为。”贾迈勒黯然走向角落，接着是全班的哄堂大笑。\n\n“滚回你的村子去，野蛮人！”有人嘲讽他。与此同时，这位厄立特里亚男孩开始自问。他们要我们成为意大利人，却待我们不公。这究竟是为什么？"
 BN.16.a:0 "孩子，告诉我他们都知道什么？"
 BN.17.t:0 "弗格尔的生活之道"
 BN.17.d:0 "阿梅代奥自幼立志追随父亲的步伐。他常对着父亲在瓦莱塔与战友们的合影出神，渴望继承那份英雄气概。最令他心驰神往的，是伞兵从云端跃下，风如利刃般划过面庞的那份激动。因此，加入拉齐奥的弗格尔训练营对他来说，是理所当然的选择。曾是游泳冠军的他，认为体能训练对他而言不过是小菜一碟，实际上也确实是这样。\n\n然而，那些法西斯的旧俗对他而言依旧显得格格不入。军官们依旧行着法西斯礼，制服上依旧佩戴着法西斯标志，一些战友还唱着法西斯歌曲。阿尔米兰特胜选的那一天，高级军官们举杯庆贺“意大利复兴”。阿梅代奥对墨索里尼让意大利崛起的历史心存敬意，尽管他尚在孩提时墨索里尼便已离世。但意大利如今不是民主国家吗？无论如何，这些事并未过多的烦扰到他。他自认自己无权置喙他人的组织方式，而且高空速降带来的快感超越了任何政治偏见。何况，根据他们的描述，法西斯主义似乎也并非那么糟糕。"
 BN.17.a:0 "欢迎来到弗格尔"
 BN.18.t:0 "议会问题"
 BN.18.d:0 "随着国民联盟中的强硬派在权力斗争中取得胜利后，党内开始探讨如何在国家重新树立起法西斯的权威。“我们打算直接向国王请愿。”阿尔米兰特如是说，“一旦陛下回心转意，他会看清这场民主试验已然逾越界限。”然而，劳蒂却有其他打算。“那个懦弱的怪人？哈。我们何需他来发号施令。”阿尔米兰特不喜欢违抗命令，但劳蒂是个忠诚的法西斯分子，或许他真有妙计。“我建议我们重演我们领袖昔日在罗马的辉煌进军。一举解散这个微不足道的议会。”格拉齐亚尼激动地从椅子上站起。“这是个绝妙的主意。我们要让他们见识到谁才是真正统治着这个国家的人。”德·马尔萨尼奇难掩忧虑。他们不能像1922年那样轻易发动政变，“国王才是意大利的合法统治者。我们不需要任何冒进的行动。我相信他会理解的。”阿尔米兰特在窗口凝视着罗马的街道，思索着下一步棋。民主终将落幕，但他要知道去如何实现这一切。"
 BN.18.a:0 "让我们来看看国王怎么说。"
 BN.18.b:0 "再度进军罗马，乃是唯一的破局之策！"
 BN.19.t:0 "翁贝托二世接受了阿尔米兰特的请求"
 BN.19.d:0 "与政府成员磋商之后，翁贝托二世同意签署行政令，赋予了乔治·阿尔米兰特首相超乎寻常的行政权力。这条法令一经传出，议会内便群情激愤。民主主义者和社会主义者抛开分歧，联手发起了强烈的抗议。国民联盟成员与反对派之间爆发了小规模冲突，甚至拳脚相向。作为回应，劳蒂则在准备大规模动员退伍军人、老黑衫军甚至全学阵学生，以迫使议会就范。看来，让法西斯主义重返意大利并非易事。"
 BN.19.a:0 "打倒民主！"
 BN.20.t:0 "他们无法拒绝的提议"
 BN.20.d:0 "历经磋商，意大利自由党终于接受了加盟国民联盟的请求。作为交换，国民联盟同意对它新的自由主义者盟友做出一些小小的妥协。一些反对派成员强烈批评了这一行动，指称部分自由主义政治家被威胁甚至被勒索以批准合并。与此同时，意大利自由党领导人安东尼奥·马拉戈迪将这一新联盟形容为“火药桶”。自由主义者的加盟，令国民联盟的政治版图风云再起，法西斯党的前景如何，犹待揭晓。"
 BN.20.a:0 "帐篷变大了！"
 BN.21.t:0 "忧郁君王"
 BN.21.d:0 "在夜幕下的罗马，翁贝托二世拉开窗帘，眼眸中只见军装男子巡逻街头。他啜饮着杯中酒，心中涌起无尽哀愁。即便是再至高无上的权力，也未能让阿尔米兰特罢手。法西斯分子对他施压索权，毫不遮掩。某日，他与一些“朋友”会面的照片开始出现在他的家门口，上面附言“目前非吾等之事，未来或成吾等之忧”。其意昭然若揭：即使是国王，也阻挡不了法西斯主义的复兴。历史仿佛在重演，他重蹈了父亲的覆辙。\n\n翁贝托倍感挫败。与他父亲不同，他真心希望给予民主一个机会，赋予意大利人自由。然而，法西斯分子权力在握，不愿向民主制度低头。历史仿佛一成不变。面对无法撼动的现实，翁贝托自问：路在何方？坐视国家再陷独裁？这似乎是他目前唯一能做的事，但他不甘就此任人摆布。“我必须想出法子去限制他的权力，但我该怎么做？”翁贝托轻摇酒杯，沉思着。“或许去阿尔卑斯山度度假能让我思路清晰一点。”"
 BN.21.a:0 "自由就是这般死去的"
 BN.22.t:0 "阿尔米兰特在议会发表讲话"
 BN.22.d:0 "阿尔米兰特首相在议会中昂首站立，准备发表他那激情澎湃的演说。“有人指责我无视反对派的声音，他们说的完全正确：在这里，除了那些愿意自豪地为国家而战的法西斯主义者，我对其他人不屑一顾。”阿尔米兰特停下来喝水时，四周响起了忧虑的窃窃私语。阿尔米兰特终于显露了他的獠牙。“意大利人民不需要一群无能之辈，他们并不代表人民。他们需要的是一个强有力的人来迅速而高效地完成一切。”议事厅内，不满的尖叫声与法西斯议员的赞同声此起彼伏。“人民已经在选票中表达了自己的意愿。他们选我，是为了让我使这个国家重新站起来。我为什么要向一群无法赢得选举的无能之辈低头？你以为我会在乎你们说什么？”\n\n民主主义者对他报以嘘声，一些社会主义者更是口出不逊。有人愤怒地向他投掷笔杆。阿尔米兰特对这些置若罔闻，继续着他的演讲。“这个议会毫无价值，浪费钱财，不过是在养着一群试图谋逆的共产主义寄生虫。我将一次性结束这场闹剧，让真正的爱国者重新掌权。我代表着人民的意志，所以现在你们必须听从我的命令。”反对派愤怒至极，而国民联盟的成员们则对他报以热情的掌声。首相心满意足地离开了房间。事情正在起变化。"
 BN.22.a:0 "法西斯主义不向任何人低头！"
 BN.23.t:0 "小小的请求"
 BN.23.d:0 "博尔盖塞紧张地吸着烟。关于阿尔米兰特首相意欲全面掌控政府的传闻正愈演愈烈。他在议会痛斥他的对手时显得愈发咄咄逼人，他宣称要“让国家重归正轨”。民主的黄昏并未令这位老法西斯分子忧虑，反而令他翘首期盼。然而，他心中仍有一丝疑虑：阿尔米兰特是否有胆量直面政府？空吠不咬的狗，不过是懦夫。第十快艇突击队不是靠空谈得来声誉的。\n\n一位激动的海军少尉手持电报走进办公室。“先生，这份电报是给您的。”博尔盖塞阅后，眉头一挑。“这场民主试验必须画上句号。我们可能与法西斯的敌人正面交锋。若事态升级，我们亟需后勤与军力支援。”博尔盖塞对此请求嗤之以鼻。显然，阿尔米兰特真的有意动用全力，迫使政府臣服于他的意志。或许，他并非只是虚张声势！“看来首相有意成为新领袖，且需要我的助力，”他戏谑道。一缕灰烟从窗隙逸出，随风而逝。“好吧，告诉阿尔米兰特先生……”"
 BN.23.a:0 "事情变得有趣了"
 BN.24.t:0 "老卫道士归来"
 BN.24.d:0 "彼得罗轻轻拂去他那老卡尔卡诺步枪上的尘埃。片刻后，他带着满意的目光审视着枪身。当他预备离开这间首都郊外的小木屋时，一张泛黄的家庭照滑落手中：他的妻儿、儿媳、孙辈们在海边灿烂微笑。泪水悄然从他的面颊上滑落下来。他的家族怎会沦落至此？他深爱的斯泰拉十年前在与乳腺癌的斗争中败下阵来，离他而去；他的儿子为中东燃起的法西斯之火献出了生命。而他的孙辈们，又是以何举动回报他对意大利的忠诚？男孩成了律师，为那些以其颠覆行为威胁社会的异端辩护；女孩成了演员，在那电影业的堕落巢穴中工作。然而他们的母亲对此视而不见，任由他们堕落，即便他们曾经接受的是最正统的法西斯教育，所以他们变成这样并不让他感到意外。在他心中，那三个人对他来说已经死了。这么多年来，他感到自己真的孑然一身。但曾几何时，他也曾幸福满溢。\n\n第一次世界大战结束后，他满怀愤懑，加入了黑衫军，渴望着拯救意大利。那个十月，他与他的黑衫军同袍们在罗马街头游行，要求国王终结软弱的民主政府，让真正的爱国者掌权。墨索里尼成为首相那天，他感到自己已成为了伟大事业的一部分。那是他人生中最幸福的一天，接下来他忠心耿耿地为领袖效力了三十年。现在他信心满满，准备从叛徒齐亚诺手中拯救意大利，使其免于沉沦。民主再也不会腐蚀孩子们的思想和灵魂了。意大利将在再一次向罗马进军中从灰烬中崛起！彼得罗带着微笑，关上房门，踏上了重塑历史的征程。"
 BN.24.a:0 "老兵不死。"
 BN.25.t:0 "第二次进军罗马"
 BN.25.d:0 "乔治·阿尔米兰特看着面前的士兵：三十五名身穿迷彩制服的勇敢的黑衫军，与黑夜融为一体。所有人都准备好执行计划：突袭奎里纳莱宫，迫使国王宣布紧急状态并解散议会。“你们都准备好让墨索里尼感到骄傲了吗？”他举起手敬礼，所有人都点头。队伍沿着山坡缓缓前进，远处传来的轻微连续的噪音进一步掩盖了他们的动静，直到他们到达被两名荣誉卫队伞兵守卫着的宫殿入口：一名俄罗斯战役的历战老兵在无声的信号下击昏了其中一人，另一个人捂住了第二个卫兵的嘴，使他无法发声。轻微的噪音变得更加明显。\n\n当黑衫军绑住并堵住两人的嘴时，其余的人围住了大门。阿尔米兰特正要说话，突然噪音变得震耳欲聋。一架直升机出现了，用人工光线照亮了广场，数十扇窗户打开，露出了隐藏在后面的狙击手。一个黑衫军试图开枪，但肩膀中弹，痛苦地尖叫起来。其他人则立即选择投降。\n\n一名身穿制服的高级军官从奎里纳莱宫走出来，走向现在已经被铐住的阿尔米兰特。“首相，鉴于您的叛国行为，陛下解除您的职务，”他大声说道，让所有人都听见。然后，他在阿尔米兰特耳边低语：“你是个可悲的小人，就智力而言更是微不足道。你可能花了几个月准备这个小把戏，但国王已经花了10年时间为回归民主做准备，他不会容忍任何人胆敢组织这个计划。”阿尔米兰特抬头，看见一个熟悉的面孔从一面加装了防护的窗户后望着他。“你这该死的家伙！”他对国王翁贝托大喊，但翁贝托没有反应。然后，军官对一个士兵说：“带走他，也许他会享受在文托泰内的监狱生活。奉国王的命令，启动独奏曲计划。”士兵敬礼：“是，指挥官！”然后带走了叛匪们。"
 BN.25.a:0 "法西斯之梦永远消逝了……"
 ITACOUP.29.t:0 "法西斯终幕"
 ITACOUP.29.d:0 "永恒之城在沉睡，唯有几名醉汉踉跄归家，浑然不觉历史正于此刻铸就。第三黑衫军“埃托雷·菲耶拉莫斯卡”趁着夜色潜行至罗马城郊，目标直指意大利广播电视公司总部——阿尔米兰特本将在此发表全国演说，宣告新政权诞生。队伍甫抵大门，那位因“坚定信仰”受领袖器重的年轻指挥官便觉异样：入口竟无守卫。未及反应，一枚圆球已滚至脚边。“震撼弹！”嘶吼刚出口，白光与轰鸣已剥夺其视听。他踉跄盲行，未及辨明扼住咽喉的手臂，腕间手铐的刺痛与铺天盖地的羞愤已烙入骨髓。\n\n其他分队亦遭厄运：第四黑衫军“安巴阿拉吉”尚未触及市政厅即遭上百宪兵合围；第六黑衫军“莱尼亚诺英豪”在议会大厦突围时死伤惨重；第八黑衫军“领袖”则因轻敌，倒在了市政警察军械库守军枪下。枪声撕破罗马夜空，惊惶的市民扑向窗前，只见数十辆警车正卸下潮水般的宪兵，又将黑衣迷彩的俘虏塞入囚笼——有人跛足，有人捂伤，但每张面孔都刻着同一种神情：败北的耻辱。"
 ITACOUP.29.a:0 "民主之敌已予以合宜处置"
 ITACOUP.30.t:0 "本该如此"
 ITACOUP.30.d:0 "乔瓦尼·德·洛伦佐俯视着地板上二十余具尸体，那些黑衫被子弹撕扯得支离破碎，几乎遮不住暗红的血渍。再正义的裁决也难称体面，他向来对厮杀之事提不起兴致。这群人曾距胜利咫尺之遥：当法西斯余孽袭击布拉斯基堡——拱卫罗马城的十五座砖石古堡之一时，他们不过想劫掠个防卫松懈的军械库。岂能料到这座陈旧堡垒的外壳下，竟盘踞着军事情报总局总部所在的地下迷宫？蠢货们甚至没来得及给步枪上膛……\n\n他折返至地下二十多米的指挥所时，副官将一纸电报递到眼前：“将军！前线急电！”电文简短如刀：“国王控制完毕。激活指令下达。政府大楼突破。议会控制完成。叛党收押。部分逃亡。非抵抗人员赦免。冗余伤亡规避。待后续指令。”将军明白，自己等待半生的时刻降临了。他踏入尘封五载的密室（若尘埃能作证），翻找出那个亲手封印的牛皮档案袋——遵照末代法西斯领袖敕令封存至今已逾十年。指尖掠过粗砺纸面，扫过那些宁愿忘却的名字，终触到目标物。褪色的字迹仍清晰可辨，如此重要的计划竟有个平庸代号：“独奏曲计划”，该名源自当当年他问及参与者时，齐亚诺答曰“仅宪兵队”。撕开脆弱的火漆封印，他抽出首页泛黄的文书，标题赫然写着《国家安保紧急行动纲要》。当他重返指挥中枢，所有喧嚣骤然凝固。“全体注意！即刻执行''独奏曲计划！”而后喧嚣再度吞没地堡。"
 ITACOUP.30.a:0 "齐亚诺曾愿为最后一任领袖。我等自当成全他的夙愿。"
 ita_the_blocs_broken:0 "The Blocs Broken"
 ita_the_blocs_broken_desc:0 "The Blocchi Nazionali are no more. Just like all alliances born out of convenience rather than mutual agreement, the political pact between the PDIUM and the MSI broke when said convenience ceased. While the former allies were too busy screaming at each other both inside and outside the parliament, the Fronte Democratico acted: after securing support from a small but vital number of MPs from the PDIUM - some out of genuine worry for the country, others out of fear for their armchairs - Pietro Nenni has presented a motion of no confidence against the now dysfunctional government.\n\nThe Prime Minister and his allies finally seemed to snap out of their delirium, and realise that their government was at risk of falling, but it was too late: after a heated debate, and despite all the bribes and promises thrown like confetti at a marriage, the motion carried. Now, an unknown phase opens for Italy, and few know how it will close..."
 ita_the_genova_protests:0 "热那亚抗议"
 ita_the_genova_protests_desc:0 "\"Down with the fascists! Let the people rule itself!\" This is but one of the many slogans everyone can hear in Genova, as the workers of the city descended in a spontaneous protest against the now fallen government. Thousands of people crowded Piazza Corvetto, and Via XII Ottobre was covered by a human wave more than three hundred meters long, all exposing banners decrying the government's abuses of their freedom and calling for a new, left-oriented government.\n\nOf course, the Fronte Democratico hasn't been idle: party officials have been spotted meeting with the leaders of the protests and local unions, and rumours tell of others oceanic protests being officially sponsored by the FD in Turin, Milan, Rome and Naples. Whatever is happening, the only clear thing is that the Blocchi Nazionali have lost their hold over the country."
 ita_meetings_in_quirinale:0 "奎里纳尔宫会议"
 ita_meetings_in_quirinale_desc:0 "While the former Prime Minister tries to salvage what little remains of his party - and his self-esteem - reporters have seen Pietro Nenni, leader of the now-resurgent Fronte Democratico, several consecutive days at the Quirinale. While the first meeting went almost unnoticed - after all, the King had been meeting almost every political leader in Italy for days - when the instance reoccurred one, then two, then three times, it was clear something was out of the ordinary.\n\nOf course, the reporters were forbidden from entering the Royal Palace by the swords of burly, armoured and very uncooperative Corazzieri, and the contents of whatever talks he and the King might have had are a secret as deep as the sea itself, but one thing is certain: the situation is moving quickly, and King Umberto surely feels little regret over sacrificing the BN on the altar of stability."
 ita_shame_the_fascists:0 "羞辱法西斯分子"
 ita_shame_the_fascists_desc:0 "The last few days have been a walk of shame for members of the now-defunct Blocchi Nazionali: MPs from both the MSI and PDIUM have been invited to radio and TV talks only to be mercilessly bombed by their counterparts from the Fronte Democratico. \"Fascists!\" \"Criminals!\" \"Enemies of democracy!\" are but the lightest of the many - and creative - insults thrown at them from angry, red-faced socialists.\n\nDespite the pathetic attempts at justifying themselves, it seemed the anchormen were totally on the side of the FD, and often even the public jeered at the unfortunate souls who were forced to suffer through that ordeal. It seems it will take months, if not years, before the former BN can even show their face on TV without being - metaphorically, of course - beaten to a pulp on air."
 ita_reinforce_the_democratic_arc:0 "强化民主阵营"
 ita_reinforce_the_democratic_arc_desc:0 "After the talks with the King, Nenni and members of the FD have been more proactive than ever, meeting with officials from the Democrazia Cristiana and other minor center-left parties in the hope of securing their support, though what this support may be needed for, it's for everyone to guess.\n\nAs of now, the King's silent blessing seems to be working, and already Nenni, Moro and Fanfani have been spotted at a well-known restaurant, speaking in hushed whispers: everyone knows it's a clear tactic to let everyone know they are doing something together without actually revealing what."
 ita_use_the_carabinieri:0 "动用宪兵队"
 ita_use_the_carabinieri_desc:0 "King Umberto, in his role as the head of the Armed forces and provisory minister for the interior affairs - since the minister resigned, by provision of the Statuto Albertino the powers are retained by the King until a new minister is appointed - has ordered a widespread deployment of the Carabinieri in support of the Polizia Municipale.\n\nWhile demonstration are to be allowed and respected as long as they are peaceful, the risk of political agitators taking control of the masses is higher than ever: therefore, until the political crisis solves itself, the roads will be heavily patrolled. One can only hope it's enough"
 ita_the_people_know_whats_up:0 "人民知道发生何事"
 ita_the_people_know_whats_up_desc:0 "Mere weeks after the Genova protests, the FD can finally reap the fruits of its careful planning. Last Sunday, all across Italy, hundreds of thousands of people, both workers and middle class, took to the streets in peaceful but strongly-worded marches: in Rome, Piazza del Popolo was filled to the brim, almost a hundred thousand citizens chanting the Marcia Reale and Mameli's Anthem.\n\nThe same scenery could be seen all across the country: Piazza Castello in Turin, Piazza del Duomo in Milan, Piazza San Marco in Venice, Piazza Garibaldi in Naples, everywhere people asked for democracy. True democracy, this time: \"Away with the fascists! Long live democracy!\" was the cry echoing from the Alps to Sicily, and it seems to be working, at least for now."
 ita_il_fascismo_non_passera:0 "Il Fascismo Non Passerà"
 ita_il_fascismo_non_passera_desc:0 "Finally, after almost a month of wait, the King has spoken: in a speech transmitted with simultaneous broadcast throughout the Kingdom in both radio and TV channels, Umberto II has officially asked Pietro Nenni to try and form a new cabinet. While most already knew it was a matter of days, few know whether the King acted spontaneously, or was strong-armed by the size of the protests against the Blocchi Nazionali.\n\nStill, it matters not: the constitutional prerogatives of King and parliament have been respected, and everything happened within the limits of non-violence, therefore everything is fine in Italy's young democracy. Few know whether the new government will manage to tackle the issues left unsolved by the BN, but everyone hopes it will at least try."
 ita_the_faltering_right:0 "摇摇欲坠的右翼"
 ita_the_faltering_right_desc:0 "The Blocchi Nazionali are no more. Just like all alliances born out of convenience rather than mutual agreement, the political pact between the PDIUM and the MSI broke when said convenience ceased. While the former allies were too busy screaming at each other both inside and outside the parliament, the Democrazia Cristiana had been carefully courting MPs from the PDIUM, already quite near to the DC's conservatives, and as soon as enough strength had been gathered, Aldo Moro presented a motion of no confidence.\n\nThe MSI desperately tried to prevent the motion from being voted on, even going so far as to publicly beg the King to suspend parliament. However, Umberto II strongly dislikes being thrown into the fray, so he did the exact opposite, and explicitly told to the press that \"a motion of no confidence is a normal happening in a healthy democracy, therefore the parliament will keep working\". This was the funeral homily for the cabinet: after a gloomy debate, the motion carried, and the BN fell apart."
 ita_use_andreotti:0 "任用安德烈奥蒂"
 ita_use_andreotti_desc:0 "With the last cabinet's demise, the other parties are trying to secure enough numbers to be able to present themselves as the strongest candidate in the King's eyes. The DC is poised to win the race, and has sent its shrewdest man, Giulio Andreotti, to convince as many MPs from the PDIUM and other parties as possible to back Aldo Moro as the next Prime Minister.\n\nWhile not all hold much love for the man, surely some bribes and the promise of keeping their post at the next election will convince most, and a bit of blackmail will do the rest: after all, everyone has a skeleton or two in the closet, or not?"
 ita_cut_the_ties:0 "断绝关系"
 ita_cut_the_ties_desc:0 "竟有人妄言我们与国民联盟的共通之处多于其他民主政党！荒谬！诚然某些斗争目标偶有重合，但我们乃真正的中立民主力量，绝非法西斯余孽之流！故须明确划清界限——基民党宣传机构与亲政府媒体应发起宣导运动，昭示两党差异；本党议员亦当公开谴责国民联盟的劣行与渎职，以示彼此之隔犹如银河中心与太阳般遥不可及。"
 ita_centrist_rhetoric:0 "中间派话术"
 ita_centrist_rhetoric_desc:0 "尽管我们已击溃右翼之敌，左翼势力仍根深蒂固：必须使民众相信，无论左派右派都无法解决意大利的沉疴痼疾，唯有我们中间路线的方针能确保法治社会——而非疯子与狂热分子的呓语统治。\n\n本党将宣扬温和主义与经世价值，诸如基督教传统根基、慈善互助之必要，着重强调在此动荡时期团结一致的重要性。"
 ita_support_from_the_PLI:0 "Support From the PLI"
 ita_support_from_the_PLI_desc:0 "The Partito Liberale Italiano is our main rival within the centre. While not strong enough to threaten our dominance, it has nonetheless proven to be a nuisance in our plans to achieve a majority: therefore, we shall begin a hammering propaganda campaign aimed at forcing them to support us, with the threat of being obliterated by our party at the next election.\n\nPerhaps they will hate us after that, but surely they won't try anything funny as long as we hold the key to their political survival: after all, a party without a single seat in the parliament would be a rather pathetic sight, wouldn't it?"
 ita_meet_with_de_lorenzo:0 "与洛伦佐将军会面"
 ita_meet_with_de_lorenzo_desc:0 "The Carabinieri are the main keepers of order in these troubled times: with their superior training compared to the Polizia Municipale, we can count on them to protect our future government in the occurrence of protests from either the left or the right.\n\nGiovanni De Lorenzo, general of the Arma dei Carabinieri, has been rather active as of late: while we don't know what his plans - or the army's - might be, we should secure his support, especially reassuring him of our utter loyalty to the Crown and our steadfast commitment to democracy. I don't know why, but that man scares me..."
 ita_meet_with_the_king1:0 "觐见国王"
 ita_meet_with_the_king1_desc:0 "After a preliminary, confidential meeting, which went rather satisfactorily, the King has invited Aldo Moro a second time to the Quirinale. There, our leader shall try to convince the King to finally name him candidate to the office of Prime Minister: Umberto II desires stability more than anything, and we'll show him that we are the perfect choice for a stable Italy.\n\nWhile strong-arming His Majesty usually is a rather masochistic choice - look at what happened to poor Almirante - we are almost certain that, in the end, the King will make the right choice and let us lead Italy towards a new age!"
 ita_the_situation_is_a_bit_more_complex:0 "The Situation Is a Bit More Complex"
 ita_the_situation_is_a_bit_more_complex_desc:0 "While the new cabinet prepares to receive the vote of confidence, and the MPs examine the government's agenda, the ministries are working hard to ensure a smooth transition: directors tied to the past government are being quietly ousted or relegated to marginal roles, while the dossiers they worked on languish in a forgotten closet.\n\nThere's much work to be done, but surely we will be able to revert the situation to a manageable level, and slowly improve from there: the future of Italy demands it!"
 ita_the_faltering_front:0 "摇摇欲坠的阵线"
 ita_the_faltering_front_desc:0 "The Fronte Democratico has fallen under its own contradictions. The internal strife between moderate socialists and radical communists brought the government to a standstill, and then Nenni and Saragat officially parted ways, with the latter presenting a motion of no confidence against the government. Of course, the entire opposition was only too happy to vote for it, and the overwhelming numbers meant the cabinet's demise. Now, weeks and months of uncertainty await Italy as the political crisis sorts itself out."
 ita_the_trieste_uprising:0 "特里斯特叛乱"
 ita_the_trieste_uprising_desc:0 "Trieste, always a stronghold for the right-wing parties, has erupted in protest: while generally peaceful, many former fascists and other figures from the right have been spotted rousing the rabble against the government.\n\nEspecially active has been Giorgio Almirante, leader of the Movimento Sociale Italiano, who has spoken vehemently against the FD and in favour of a new, right-oriented government. Time will tell whether he is right..."
 ita_la_ballata_del_compagno:0 "La Ballata del Compagno"
 ita_la_ballata_del_compagno_desc:0 "The FD is weakened, but not yet defeated. Well, we are always in time to make up for it! Our officials have been touring the TV and radio talks, pointing out all flaws and defects of the so-called \"socialist utopia\", from the illusion of living in a world without money to their bullshit about abolishing marriage. Hilarity ensues.\n\nCompagni tutti uniti, facciamo un girotondo!"
 ita_convince_de_lorenzo:0 "说服德·洛伦佐"
 ita_convince_de_lorenzo_desc:0 "在这动荡时局中，国家宪兵是秩序的主要捍卫者。相比地方警察，他们训练有素，足以在左翼极端分子抗议时护佑未来政府。\n\n宪兵司令乔瓦尼·德·洛伦佐近期异常活跃。虽不明其个人或军方意图，我们仍需争取其支持，尤其要向其重申对王室的绝对忠诚与捍卫民主的坚定承诺。不知为何，此人令我脊背发凉……"
 ita_break_the_arc:0 "破坏阵营"
 ita_break_the_arc_desc:0 "民主阵营之所以还能维系，全凭一个虚假预设——认为我们一旦掌权便会重归法西斯体制。绝非如此！诚然，我们渴望建立一个能切实统御疆域、迅速应对危机的国家，必要时可动用适当武力与非常权力。\n\n但这绝不意味着我们要穿着黑衫招摇过市，在集会上高唱《青年之歌》！好吧，确有人如此行事，但我敢发誓那些都是左翼派来的煽动者！只需稍施怀柔之策，并坚称我们与基民党、民阵同样民主——当然要剔除社会主义成分——他们自会如油水般分崩离析。"
 ita_nobody_is_going_to_get_hurt:0 "没人会受伤……"
 ita_nobody_is_going_to_get_hurt_desc:0 "With our contacts in the police force, we can ensure a higher surveillance on pro-FD manifestations. While they still have to refrain from using violence, the fact that all meetings and protests will be closely monitored is enough to substantially weaken any potential riot against our future government: it will take some time, but in the long run the socialists will simply lose the will to fight and return to their homes."
 ita_if_you_do_what_we_say:0 "……如果你照做的话"
 ita_if_you_do_what_we_say_desc:0 "Socialists are few but very noisy. We know, however, that the majority of the Italian people stands by our side silently! In truth, only a small number of Italians actually want a socialist dictatorship modeled on the failed Soviet Union, where all our traditions would be crushed under their so-called \"universalism\", and that they actually support our bid to the government: all we need is to convince those people to show that they want uf to head the next cabinet."
 ita_order_reestablished:0 "重建秩序"
 ita_order_reestablished_desc:0 "Finally, the King has made the right choice! Giorgio Almirante has been summoned to the Quirinale, and the news has already been leaked to our officials that he will be appointed as the next Prime Minister of the Kingdom. Now, order can truly be reestablished across Italy, as we strive to remove the stain of socialism from our beautiful country. After that is done, we will begin to reshape the Empire into something that can fully exploit what we believe is its true potential..."
 ita_the_lefts_demise:0 "左派之陨"
 ita_the_lefts_demise_desc:0 "The Fronte Democratico has fallen under its own contradictions. The internal strife between moderate socialists and radical communists brought the government to a standstill, and then Nenni and Saragat officially parted ways, with the latter presenting a motion of no confidence against the government. Of course, the entire opposition was only too happy to vote for it, and the overwhelming numbers meant the cabinet's demise. Now, weeks and months of uncertainty await Italy as the political crisis sorts itself out."
 ita_use_moro:0 "利用莫罗"
 ita_use_moro_desc:0 "Following the motion of no confidence, Aldo Moro has started talks with the former government in order to convince them not to oppose a change in government: while the alliance has been broken, the FD still technically holds more MPs than any other party, so it is in our interest that we wait a little, in the hope of convincing at least part of the broken coalition to support our bid to the premiership. We already have a few ideas on what to promise them if they accept to step down from any claim to the government..."
 ita_progressive_promises:0 "进步承诺"
 ita_progressive_promises_desc:0 "The Fronte Democratico may have been defeated in the parliament, but it's still strong in the civil society. We can't effectively lead the country if we anger the majority of its population, therefore we shall include some of the more moderate electoral promises of the FD into our agenda.\n\nWhile implementation of these promises might go against the wishes of some of our more conservative members, in the end it will greatly aid us in our quest to bring Italy into a new age, and in our parallel mission to get re-elected."
 ita_take_over_the_democratic_arc:0 "接管民主阵营"
 ita_take_over_the_democratic_arc_desc:0 "With the FD's demise, it's now time for the DC to assume the lead of the Democratic Arc! We are the only ones strong enough to stem the tide of the fascist threat, the only ones moderate enough to not incite violent reactions from the right-wing supporters.\n\nWe shall hold talks with the other democratic parties, and try to convince them to stand by our side against the black beast, or at least to not hinder our government in its efforts to lead Italy."
 ita_secure_saragats_support:0 "确保萨拉盖特的支持"
 ita_secure_saragats_support_desc:0 "南尼正对失败耿耿于怀，而萨拉盖特却愿化干戈为玉帛：身为一个温和派社会主义者，他对我们的改革派提案青睐有加。若能与他的意大利社会民主党觅得共识，或许能够说服他暗中支持由基督教民主党领导的政府。\n\n目前，我们的改革派与萨拉盖特的使者之间的会谈已经开始，让我们期待这些会谈能够取得预期的成功。"
 ita_approval_from_the_king:0 "国王的支持"
 ita_approval_from_the_king_desc:0 "经过初步秘密会谈（结果颇为圆满），国王已二度邀请阿尔多·莫罗至奎里纳莱宫。此行我们的领袖将力劝国王最终提名其为首相候选人——翁贝托二世最渴求稳定，而我们将证明自己正是缔造稳定意大利的不二之选。\n\n尽管胁迫陛下通常属自讨苦吃之举（看看阿尔米兰特的凄惨下场），但我们深信国王终将明智抉择，引领意大利迈向新时代！"
 ita_approval_from_the_carabinieri:0 "国家宪兵的支持"
 ita_approval_from_the_carabinieri_desc:0 "在这动荡时局中，国家宪兵是秩序的主要捍卫者。相比地方警察，他们训练有素，足以在左右翼分子抗议时护佑未来政府。\n\n宪兵司令乔瓦尼·德·洛伦佐近期异常活跃。虽不明其个人或军方意图，我们仍需争取其支持，尤其要向其重申对王室的绝对忠诚与捍卫民主的坚定承诺。不知为何，此人令我脊背发凉……"
 ita_as_if_nothing_ever_happened:0 "无事发生"
 ita_as_if_nothing_ever_happened_desc:0 "新内阁即将面临信任投票，但我们已着手废除最激进的左翼改革。工会或许不满，但绝不能任由经济受制于工会分子的反复无常。当然，福利体系等合宜法律将予保留，其余痕迹都将抹除——仿佛社会主义政府从未存在过……"
