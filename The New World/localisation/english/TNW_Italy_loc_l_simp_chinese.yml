 ita_suez_open:0 "开放苏伊士运河"
 ita_suez_open_desc:0 "苏伊士运河的战略、商业重要性怎么强调都不为过。通过与埃及王国多年来的“合作”，运河成为意大利的长期资产，只要领袖一句话，随时开放关闭。既然我们希望在外交政策中更多地考虑经济，便会放宽苏伊士运河运输货物与原材料的限制。但我们会以意大利人的方式行事。\n\n开放苏伊士运河会给整个地中海经济带来立竿见影的好处，增加的贸易量、交通流量将间接惠及我国的建筑业、旅游业和航运业，更不用说那些终于可在运河通行运输的国家了。如果必须为此支付令人瞠目的关税，他们还是会照做不误的。毕竟，另一种选择是绕着非洲大陆航行，或用板条箱拖着货物穿越阿拉伯沙漠。不如忍气吞声，走意大利人的通道，遵从意大利人的方式！"
