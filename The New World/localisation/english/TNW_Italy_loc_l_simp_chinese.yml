 ITA_remove_garrison_desc:0 "我们的昔日盟友已然背叛，那我们的军队就需要更多人力。鉴于此，有人建议我们从希腊撤军。有些人可能会对放弃旧日盟友的想法感到愤怒，但若要保护好殖民地，这是必要之举。"
