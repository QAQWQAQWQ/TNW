 ITA_Scorza_Collaboration:0 "斯科尔扎的合作"
 scorza_ISR:0 "意大利社会共和国"
 i_mis_him_alredy:0 "盼他归"
 POLITICS_CIANO_DESC:0 "吉安·加莱亚佐·齐亚诺，第二代科尔泰拉佐和布卡里伯爵，墨索里尼的女婿，意大利的领袖。齐亚诺的光辉履历始于入侵埃塞俄比亚期间担任一个轰炸机中队的指挥官，他在赢得两枚银质勇气勋章后光荣归国，得到了战争英雄的待遇。在埃塞俄比亚，他学到了关于人性与驭人之术的宝贵一课，正是这段经历使他得以在将来领导意大利迈向伟大。战争结束后，墨索里尼有意培养齐亚诺为自己的接班人，他任命齐亚诺为外交部长，希望齐亚诺能以此积累一些有用的政治经验。作为外交部长，齐亚诺在国际舞台上执掌着意大利的外交事务，通过和平和武力的手段推动了意大利在二战前和战时的领土扩张。整个战争期间，他都在极力阻止德国完全控制意大利，他竭尽全力让德国能够将意大利视为平等的盟友。二战结束后，齐亚诺进一步为意大利争取到了大片土地，建立起一个地跨数洲的帝国。1948年后，齐亚诺继续担任外交部长，并且拉近了与他岳父的关系。墨索里尼知道自己时日无多，便把一切领导的秘诀都传授给了自己的女婿。于是，领袖随风而逝，齐亚诺接过了他的衣钵。作为意大利的领导人，齐亚诺选择采取平和的手段施行统治，他的梦想是让这个法西斯国家重新自由化，让权利重归人民手中，同时与邻国建立友好的关系。齐亚诺面前的道路充满荆棘，只有充分利用智谋和技巧，他才能率领意大利在这个动荡的世界中平稳前行。"
 ita_prepare_for_panic:0 "应对恐慌"
 ita_prepare_for_panic_desc:0 "三头同盟的问题已经被处置妥当，风暴即将到来，如果我们希望能渡过风暴，就必须做好准备。"
 ita_new_sources_of_trade:0 "崭新的贸易来源"
 ita_new_sources_of_trade_desc:0 "为了维持我们的经济正常运行，我们必须寻找其他国家以作为的新贸易伙伴。欧洲市场的布列塔尼对于帝国本身及其殖民地的经济圈将是一个不错的选择。"
 ita_look_abroad:0 "把目光投向海外"
 ita_look_abroad_desc:0 "与我们的木偶们进行贸易毫无意义。我们需要把目光投向海外以寻求商机，并与那些与我们平等的国家进行贸易。"
 ita_talk_with_breton:0 "与布列塔尼人谈判"
 ita_talk_with_breton_desc:0 "布列塔尼是欧洲的市场。如果我们要与布列塔尼人进行贸易，那将对我们经济圈内各国的经济关系都极为有利。"
 ita_meet_with_southern_experts:0 "与南方专家们会面"
 ita_meet_with_southern_experts_desc:0 "洋人没做完"
 ita_into_the_shadow_of_europe:0 "进入欧洲的阴影之中"
 ita_into_the_shadow_of_europe_desc:0 ""
 ita_work_with_our_sphere:0 "势力圈内合作"
 ita_work_with_our_sphere_desc:0 "我们的第二位伟大领袖选择了与我们势力圈内的国家进行贸易以挽救我们的经济。我们必须坚持与我们身边的朋友站在一条战线上，以获得最佳结果。"
 ita_exploit_the_balkans:0 "开发巴尔干"
 ita_exploit_the_balkans_desc:0 "占位符"
 ita_tax_the_colonies:0 "向殖民地征税"
 ita_tax_the_colonies_desc:0 "为了挽救我们的经济，我们必须采取的步骤之一是对我们的殖民地当局进行征税。这将使我们获得更多的钱，也对我们的经济有所帮助。"
 ita_the_second_verona_congress_new:0 "第二届维罗纳大会"
 ita_the_second_verona_congress_new_desc:0 "新的领袖在齐亚诺下台之后才上任几天，他本人的党内就已经纠结了诸多麻烦。在PNF内部变革之风的鼓舞下，该党重要的几位知名人士决定召开第二届维罗纳大会，并坚信斯科尔扎将很乐意参加此次会议。他们的目标是制定一项旨在恢复1922年法西斯主义革命火花的改革方案和措施，围绕在齐亚诺身边的反动派和自由主义者已经从他们此前的统治地位上被赶下台来。但是，新任领袖尚未发表关于第二次大会的正式声明，而且根据某些人的说法，这可能是PNF党员的一种不加掩饰的权力游戏，他们希望将斯科尔扎制服，使之服从。作为领袖的斯科尔扎面临的第一个挑战是要么允许国会通过，要么关闭国会。"
 ita_approve_the_congress:0 "通过大会"
 ita_approve_the_congress_desc:0 "法西斯主义的最高领袖，卡洛·斯科尔扎向新闻界发表了一份声明，称第二次维罗纳大会将在他的祝福下举行，他本人将出席并发言，以解决那里讨论的重要问题。出席国会意味着斯科尔扎对PNF内部的改革派传达善意。而最重要的是，这表明了这位新任领袖愿意听取自己政党的意愿，而不是将决策权掌握在自己手中。问题是，很难预料大会开始后这位领袖将如何实际处理PNF。"
 ita_shut_down_the_congress:0 "叫停大会"
 ita_shut_down_the_congress_desc:0 "第二届维罗纳大会充其量只是一个威胁性的事态发展，最坏的情况是一种叛国行为。如果不立即处理这种情况，斯科尔扎的统治可能会被一个没有纪律的国家政党玷污，他开始独立于自己的领袖身份行事——我们都知道上次事件是如何结束的。为了国家和政权的稳定安全，斯科尔扎决定反对国会，并宣布它是非法的，敦促与会者立即有序地离开会场。当然这可能不会被聚集在维罗纳的众多大会支持者所接受，但这是重申斯科尔扎统治的必要之举。"
 ita_promises_of_reform_2019:0 "承诺改革"
 ita_promises_of_reform_2019_desc:0 "虽然取得了二战的胜利，国家法西斯党内众多法西斯主义者的流言蜚语仍不见减退。他们认为法西斯主义偏离了起始道路，而如今在齐亚诺治下甚至有覆灭的风险。颇有一着不慎，满盘皆输之势。\n\n既然我们已将地中海纳入统治范围，那么就可以依照法西斯主义的理想和愿景，全面改革意大利社会。斯科尔扎承诺，国家法西斯党和意大利全国，都将按照法西斯主义最初的宗旨进行一场全方位改革运动。"
 ita_remind_them_their_duties:0 "提醒他们牢记使命"
 ita_remind_them_their_duties_desc:0 "法西斯主义的使命很简单，那就是争得意大利应有的伟大。出于此因，我们的当务之急是巩固国家法西斯党对于全国的掌控。而要达到这个目的，最重要的就是要加强全党党员对于斯科尔扎的信赖，领袖的意志即为党与意大利的意志。因此，现在必须警醒意大利全体法西斯主义者，叛徒齐亚诺已经从不属于他的职位上滚下来了，现在党员们的服从与忠诚只能奉献给法西斯主义的合法领袖——卡洛·斯科尔扎。违抗领袖的命令等同于背叛法西斯主义理想，因此，只要领袖决定，变革就会发生。"
 ita_PNF_stays_PNF:0 "党内的事情就由党来解决"
 ita_PNF_stays_PNF_desc:0 "虽然我们叫停大会的决定引起了相当大的骚动，但没有必要使冲突升级。如果我们将这件事作为国家法西斯党的内部事务处理，相比于允许其他政府组织介入的做法，当前形势可以在不产生进一步混乱和暴力风险的情况下得到解决。斯科尔扎敦促维罗纳的国家法西斯党高级代表立即下台，否则他们在党内的地位将受到威胁——与此同时，所有参加维罗纳示威活动的党员将被暂停或撤销党籍。希望这次相对较轻的处理能让维罗纳的与会者相信领袖是愿意对话的，即使只是在他自己的任期内。"
 ita_national_emergency_time:0 "国家紧急状态"
 ita_national_emergency_time_desc:0 "目前维罗纳发生的一切不仅仅是斯科尔扎领袖或国家法西斯党要处理的问题，也是对意大利稳定的严重威胁，因此更是对全体意大利人的威胁。为此，领袖已向翁贝托二世国王施压，要求他宣布全国进入紧急状态，因为维罗纳市目前已被一帮乌合之众，一帮心怀鬼胎，妄图将斯科尔扎赶下台的颠覆分子与煽动者占领。斯科尔扎此举最重要的目的是向党内所有持不同政见者传达一个信息——即他们的领袖将不惜一切代价确保自己在党内的统治地位不受挑战。"
 ita_back_to_san_sepolcro:0 "回到圣墓广场"
 ita_back_to_san_sepolcro_desc:0 "意大利最早的法西斯政党——战斗的意大利法西斯，在1919年3月23日的米兰圣墓广场上由贝尼托·墨索里尼亲自创立。这个新政党在被自由主义扼住咽喉、被共产主义严重威胁的意大利，代表着真正革命的风向。在那个广场上，法西斯主义革命的星星之火第一次燎原燃烧，而我们必须重上那一丝火花第一次闪耀的地方，要回到那个饱含着一战老兵们，革命的工团主义者们，热爱意大利民族的人们还有其他一切希望看到意大利再次伟大的人们的革命热情的地方。今天，就是一场新的法西斯主义革命开始的日子！我们将重新点燃星星之火，让它再成燎原之势！"
 ita_controllable_reforms:0 "可控的改革"
 ita_controllable_reforms_desc:0 "尽管法西斯主义体制是意大利有史以来最宏伟的，最坚固，最完备的政治大厦，但是我们也不可否认它现在需要一些必要的翻新。即使是最宏伟的宫殿，若长久不做清理打扫，也难免蒙上蛛网和灰尘，而在齐亚诺的无能领导下，国家法西斯党和其他一些国家机关已经僵化和停滞。为此，斯科尔扎承诺要采取一系列措施，从党到黑衫军，从法西斯工团到意大利国家刀斧手（即法西斯青年团）和国家巴利拉组织，都要恢复以往的辉煌和高效率，而这一切都要在他——法西斯的领袖的亮眼监督下进行。"
 ita_the_ghost_of_mussolini:0 "墨索里尼的幽灵"
 ita_the_ghost_of_mussolini_desc:0 "如果有人断言法西斯体制需要改革，也就意味着认为它是可以完善的——而认为它是可以完善的，也就等同于认为它是不完美的。稍微长点脑子的法西斯主义者都明白，认为法西斯主义不完美，就已经非常接近意识形态上的叛国了。所有的这些认为需要改革的言论，哪怕是出自善意的法西斯主义者们之口，也会成为我们国家大厦上的一道裂缝，而这道裂缝将会为欺骗，阴谋和叛国行径大开门路。我们难道不该为我们坚持法西斯主义取得的成就感到自豪，反而是去大谈那些可能篡改法西斯主义理想的“改革”吗？我们难道不应该为我们的海，我们伟大的领袖墨索里尼，我们伟大的领袖墨索里尼的亲密战友斯科尔扎感到自豪吗？"
 ita_we_can_talk_this_out:0 "我们可以谈谈"
 ita_we_can_talk_this_out_desc:0 "维罗纳的情况比预料的更糟，但还没有到绝望的地步。领袖坚持要求解散大会，但暴力只能作为最后手段，为了党和意大利，他愿意与所有在维罗纳的PNF代表谈判。作为上位者，斯科尔扎希望重申他在党内的地位，而不必诉诸暴力——但有可能维罗纳的人民根本不愿意谈判，并笃信领袖不愿意使用武力是软弱的表现。"
 ita_surrounding_verona:0 "包围维罗纳"
 ita_surrounding_verona_desc:0 "我们一向秉持非暴力理念，但有的时候……为了让他们明白我们的立场，一点点暴力也是完全有必要的。领袖已经命令黑衫军和警察占领维罗纳市周围的所有战略要地，将这座城市成功封锁，阻止任何人出入维罗纳的市中心地带。领袖的目的是让这群人知道自己现在被围困的无力处境。如果他成功了，这群人就会更愿意听取我们的意见，还能真正的安分下来。"
 ita_storimg_verona:0 "突袭维罗纳"
 ita_storimg_verona_desc:0 "对于这种公然的不服从，乃至于更加恶劣的叛国行为，我们的选择只有一个——镇压！在强硬要求国王给予了他行动许可后，领袖已经下令黑衫军和皇家陆军立即出动，占领维罗纳城周围的要地，迅速出击将这座城市从非法的抗议者手里夺回。这当然会招致一些议员的抵制，但我们相信，当他们中的大多数人面临一场毫无胜利的希望的战斗时，他们自己便会屈服和投降。尘埃落定之时，所有人都将明白斯科尔扎领袖会怎么对待这些狂妄的暴发户和乌合之众。"
 ita_spirit_of_fiume:0 "阜姆精神"
 ita_spirit_of_fiume_desc:0 "甚至在进军罗马和国家法西斯党成立之前，在当时意大利尚未收复的领土上，就发生了一件许多法西斯主义先驱们参与的事件。那是阜姆战役的辉煌传奇：在那里，是一位诗人——同时更是一位战士的加布里埃尔·邓南遮，在那场风暴之中成功建立了自己的国家，而他最终的目标是让这个国家重回意大利祖国。卡纳罗摄政政府，邓南遮的国度，是一个政治上的杰作。它的宪法——《卡纳罗宪章》，是那个时代和任何国家相比都最高瞻远瞩和最先进的法律。阜姆精神对我们来说是一盏闪亮的明灯，一个值得学习的模范，而我们是现在唯一可以实现邓南遮理想的一群人。"
 ita_doctorine_of_fascism_2019:0 "法西斯信条"
 ita_doctorine_of_fascism_2019_desc:0 "乔瓦尼·秦梯利认为，法西斯意识形态与众不同，它顺应历史潮流，发展与时俱进，因此是至今最有适应力的政治取向。然而参照某一种意识形态，从而对意大利民族的文化、传统和精神进行塑造是一个缓慢过程，绝不能妄想一步登天。我们必须认识到，法西斯主义的崛起过程至关重要，它将意大利从新兴共产主义的渗透中拯救了出来，带领意大利在数十年内走向了新的辉煌。法西斯这项历史工程，无异于其他工程，也是紧跟时代步伐的。\n\n我们当然也将在尊重历史的基础上与时代同行。"
 ita_loyalty_to_the_duce:0 "忠于领袖"
 ita_loyalty_to_the_duce_desc:0 "作为一个意识形态，法西斯主义的核心只有一个，那就是坚持领袖的领导。而其他的一切都是次要的，因为法西斯主义绝对不能和领袖的伟大形象分开，领袖应当时时刻刻地、完完全全地占据任何一个配得上“忠诚”这个形容词的法西斯主义者的内心。抵触领袖是叛国通敌，而忤逆领袖更是罪大恶极。现在，所有在维罗纳的人都会复习一遍这个真理，这样他们就会明白斯科尔扎领袖并不是在前任领袖被赶下台以后才借机上位的——如果他们不这么认为，那样的事情迟早也会发生在我们现任的领袖身上。服从，奉献和忠诚，任何不具备这三个品质的人，都是领袖和国家的敌人。"
 ita_send_the_carabinieri:0 "派出国家宪兵"
 ita_send_the_carabinieri_desc:0 "尽管维罗纳的局势看起来已经开始缓和……或者至少说，部分缓和，但那些更加吵闹和暴力的抗议者依然令我们感到担忧。因此，斯科尔扎已经指示国家宪兵部队进入维罗纳维稳，确保将城中的骚乱降低到最低限度。他们已经接到命令逮捕闹事者，来确保人们不会受到太多的伤害，还被批准使用催泪弹和防暴水枪来驱散示威者和抗议人群，只在形势严峻的情况下使用实弹。希望运气好的话，最混乱的情况会过去，而很快我们将会完全控制局势。"
 ita_send_in_the_blackshirts_2019:0 "派出黑衫军"
 ita_send_in_the_blackshirts_2019_desc:0 "领袖英明地决定，处理维罗纳局势的最佳方式是动用国家安全志愿军(MVSN)，也就是被称为“黑衫军”的知名法西斯准军事部队。他们的任务是恢复维罗纳的公共秩序，并处理任何不服从命令的行径，若有需要，他们会果断以暴治乱。素来以残暴闻名的黑衫军在处理冲突的过程中，多少会爆发些小规模巷战，但派遣他们就等于首先传播了一条政治讯息，即维罗纳的人民正在背叛法西斯事业。而提醒维罗纳人的最恰当方式就是派法西斯民兵追捕他们。"
 ita_send_in_the_big_ol_army:0 "派出军队"
 ita_send_in_the_big_ol_army_desc:0 "卡洛·斯科尔扎已经下令，对目前占据维罗纳的乌合之众下手，以儆效尤。皇家陆军的将领们已经接到命令，动用包括坦克和直升机在内的全部兵力进入维罗纳，消除一切对公共秩序的威胁，并可在任何他们认为必要的时候毫不犹豫地使用致命武力。现在城镇战几乎避无可避，平民和财产也将受到附带损害，但这正是领袖决定向全国发出的信息。通过对大会参与者的彻底打击，斯科尔扎将确保任何人在再次挑战他的统治之前都会三思而后行。"
 ita_eia_eia_alala:0 "嘿呀，嘿呀，啊啦啦！"
 ita_eia_eia_alala_desc:0 "支持法西斯主义的人群在维罗纳云集，他们向领袖的欢呼声响彻了大街小巷：回来了，一切都回来了，那个只存在于往日的幽灵，现在正飘荡在我们每个人身旁的风中。人们带着崇敬和赞美的感情，重新颂念起那些消逝在历史中的光辉的名字：伟大的革命家菲利普·科里多尼、战士般的诗人加布里埃尔·邓南遮、未来主义者菲利普·托马索·马里内蒂……还有更多更多的法西斯主义元老，他们在过去的真知灼见对我们重塑法西斯主义运动至关重要。他们的声音将再一次被听到，他们的语录将再一次被流传，而他们留下的航船将会再一次扬帆起航。伟大的舵手斯科尔扎掌舵的意大利能否不辜负他们的思想，只有时间可以证明。"
 ita_viva_il_duce_scorza:0 "领袖万岁！"
 ita_viva_il_duce_scorza_desc:0 "法西斯支持者聚集在维罗纳，高声呼喊他们的领袖。唯有一人的声音凌驾于人群之上，响彻全国——意大利的新领袖卡洛·斯科尔扎。领袖明确表示，他不打算走前任的老路，而他已充分展现自己对国家法西斯党的绝对控制力。党内的自由派和改革派要么主动投诚，要么被动闭嘴。新领袖伫立在维罗纳的阳台上，通告意大利及全世界，他从此开始执政掌权。他的政权绝不会昙花一现。"
 ita_scorza_nothing_to_see_here:0 "此地无银"
 ita_scorza_nothing_to_see_here_desc:0 "维罗纳危机已经解决，现在这座城市又恢复了平静。没有过多的喧哗吵闹，只发生了小规模的暴力事件，参加大会的人要么被逮捕，要么离开了会场；幕后操纵整个组织的国家法西斯党代表有的被压制噤声，有的则被说服不再挑战领袖的权威；而最重要的是，新领袖屹立不倒。卡洛·斯科尔扎现在已经巩固了他对党的统治，他已清除或压制了改革派和反对者——这无疑将在未来加强国家法西斯党，以及斯科尔扎本人的统治。"
 ita_are_all_punished:0 "惩戒所有人"
 ita_are_all_punished_desc:0 "维罗纳上空恢复了宁静，意大利新任领袖给全国人民留下了如血书般深刻的信息。齐亚诺的时代、“自由主义”和“宽容”的时代已经结束——新的领袖已经上任，他不会容忍违抗命令的行为。蔑视领袖的后果在维罗纳有目共睹——参加大会的大多数人现在都住进了城市的停尸房、医院和监狱。国家法西斯党在大会上的代表已经开始被以叛国罪逐一审判和清洗，从现在起，斯科尔扎几乎可以完全控制他的政党了。"
 ita_meet_the_new_duce_2019:0 "会面新领袖"
 ita_meet_the_new_duce_2019_desc:0 "在维罗纳，形势发生了逆转，在历史性的转折中，法西斯大委员会决定投票表决不信任动议，从而将前领导人加莱亚佐·齐亚诺赶下了台。现在卡洛·斯科尔扎，作为前国家法西斯党秘书长，和现在法西斯主义的领袖，已经接受国王任命成为首相。一个新的时代即将开始，意大利人民将开始了解并热爱他们的新领袖：斯科尔扎，而他就像墨索里尼常做的那样，已经开始了一次全国巡回演讲，在大众面前讲话，阐述他未来的目标和政策。"
 ita_the_fascist_phoenix:0 "法西斯涅槃"
 ita_the_fascist_phoenix_desc:0 "在齐亚诺携手他的财阀派系进行威胁后，几乎被遗忘的法西斯主义精神凤凰涅槃、死而复生了。我们应该借助当前意识形态热潮出台相关政策，从解决国家法西斯党统治下暴露的诸多社会问题和争议入手，最佳方案莫过于此。这方面有三个主要问题：一是妇女在意大利和党内的地位；二是年轻一辈的需求；三是我们和教会的关系。"
 ita_the_second_sex:0 "第二性别"
 ita_the_second_sex_desc:0 "法西斯主义和意大利女性之间的关系充斥着矛盾和怀疑。尽管许多著名的早期法西斯主义者属于女性，而早期的法西斯运动在他们的项目中要求为女性争取更多权利，但1922年后法西斯政府的实践却与其背道而驰。妇女在工作中、政府中甚至教育方面都受到系统性歧视。然而，这并没有阻止法西斯阵营中的意大利女性，尤其是年轻人中，继续要求更多的权利和平等——她们希望斯科尔扎的夺权可能会改善意大利的女性状况。然而，党内许多声音，尤其是保守派和传统派，对她们的这些观点表示担忧。"
 ita_the_female_face_fascism:0 "法西斯的女性一面"
 ita_the_female_face_fascism_desc:0 "意大利半数的人口受到虐待并受制于另一半的这种妄想，是完全不可接受的。难道意大利令人骄傲的母亲、女儿和妻子们就不是我们光荣国家的孩子吗？领袖以他的智慧，公开表示支持改善我们国家的妇女在公共和私人生活的各个方面的处境。意大利的女儿们再也不会向她们的丈夫和父亲低头了——我们将给予她们应有的自由和平等！"
 ita_stop_whining:0 "别抱怨了"
 ita_stop_whining_desc:0 "对于每一个思想正确的法西斯主义者来说，这些自命不凡的女人的要求显然荒谬至极。难道女人不是天生就是顺从的女儿、忠诚的妻子和体贴的母亲吗？那么，他们为什么要关心平等或自由这样的空话呢？卡洛·斯科尔扎在他的演讲中提醒意大利人民两性的自然角色，以及女性对男性的必要服从，这让国家法西斯党的保守派非常高兴，也让意大利参与政治的女性感到颇为沮丧。"
 ita_promote_gender_equality:0 "推广性别平等"
 ita_promote_gender_equality_desc:0 "领袖并不是一个喜欢半途而废的人，对于意大利的性别问题，他也不例外。让许多国家法西斯党的保守派人士感到愤怒的是，元首发布了一系列政令，计划结束国家法西斯党、法律事务、公共教育和工作场所中的性别隔离和歧视。与此同时，还将开展宣传运动，推广一种新榜样，即一个坚强、忠诚和解放的法西斯妇女，和其男性同僚别无二致，愿意以相同的尊严为意大利和它的领袖服务。"
 ita_work_out_gender:0 "解决性别问题"
 ita_work_out_gender_desc:0 "虽然我国妇女的要求在某种程度上是合理的，但这并不是我们的国家完全丧失道德标准的理由。毕竟，意大利仍是一个讲道德的国家，这意味着我们会承认适当的性别角色和性别规范。不过，女性的状况显然可以得到一定程度的改善。通过法律让女性与男性处于更加平等的地位，比如让教育和工作中的性别隔离更加宽松。这应该能安抚意大利女性的情绪，同时也能让国家法西斯党中的保守派感到高兴和满足。"
 ita_appeal_to_tradition:0 "诉诸传统"
 ita_appeal_to_tradition_desc:0 "意大利是一个天主教国家，同时也是一个法西斯国家，因此，为了指导我们自己，我们不需要再审视我们的伟大传统了。既然我们的法律迄今为止一直行之有效，为什么还要创新和改变呢？在一个文明的社会里，妇女必须要做的事就是养家糊口，抚养子女，仅此而已。除此之外，任何其他行为都是对自然社会秩序的破坏，而这正是这些“法西斯女性”应该牢记的。她们为意大利服务的最好方式就是放下身段，待在家里，为我们伟大的帝国提供源源不断的孩子。"
 ita_create_the_SAF:0 "创建SAF"
 ita_create_the_SAF_desc:0 "为了使妇女在平民社会中的新角色进一步合法化，将她们引入军队中也不失为明智之举。在法西斯活动家皮耶拉·加泰斯基·丰代利的帮助下，我国将成立妇女武装辅助部队，丰代利会是新组织的总指挥官。妇女武装辅助部队的女性志愿者们将协助意大利武装部队执行任务，最重要的是，看到妇女们身着军装与男兵一起行进，足以提醒人们，意大利妇女的新时代已经到来。"
 ita_compromise_solution:0 "折中解决方案"
 ita_compromise_solution_desc:0 "国家法西斯党内较为保守的一派认为，我们应该维护社会的每一根支柱，也就是家庭和婚姻——但是，这不应该以损害我们的国家的利益为代价。意大利女性往往不能很好地融入劳动力大军，因此她们成为了一种非生产性的经济负担。然而，通过制定计划，让女性进入公共管理部门和其他经济部门的某些岗位，我们可以增加就业，改善女性的状况，同时还能安抚党内保守派和意大利社会的其他成员。这对大家都有利！"
 ita_back_to_the_kitchen:0 "回厨房去"
 ita_back_to_the_kitchen_desc:0 "女性在劳动力中的存在是一个危险因素，这可能会扰乱我们伟大的社会秩序。如果允许女性从事与男性相同的工作，接受与男性相同的教育，甚至享有与男性相同的法律权利，那么接下来会发生什么呢？我们伟大的领袖向全国人民保证，我们将维护以家庭、信仰和传统为基础的正义的自然秩序，并鼓励所有意大利女性全心全意照顾丈夫和孩子，把政治和工作留给男人。"
 ita_the_new_fascist_woman:0 "新法西斯女性"
 ita_the_new_fascist_woman_desc:0 "尽管我们遇到了反对，但领袖和他在党内的忠诚拥护者还是成功制定了一项将真正改变国内妇女现状的计划。新一代意大利妇女不再被过时、压迫的教条束缚，她们正准备以新的热情和激情为国家与法西斯事业服务。她们会被当做男人看待，并有望像他们的男性同龄人一样为法西斯革命做出贡献——她们继续前进，为意大利带来更大的荣耀和繁荣。"
 ita_a_traditional_society:0 "传统社会"
 ita_a_traditional_society_desc:0 "在每个家庭中，妻子或女儿偶尔会因某种原因大吵大闹，这时，她的丈夫或父亲就不得不管教她。意大利是一个大家庭，领袖就扮演着父亲的角色。现在，卡洛·斯科尔扎通过提醒意大利的妇女和女孩们她们在这个国家中与生俱来的角色，满足了人们对他的期望。她们将会成为母亲、妻子和可爱的女儿们，而最重要的是，她们中的绝大多数不会再用无意义的要求来浪费我们的时间。"
 ita_no_more_gender_wars:0 "再无性别战"
 ita_no_more_gender_wars_desc:0 "领袖满足了意大利妇女的需求，解决了性别问题。这无疑得罪了国内一些人，但该举措是重燃法西斯精神之火、推动意大利重新走向辉煌的第一步。"
 ita_giovinezza:0 "青年"
 ita_giovinezza_desc:0 "在意大利青年中，许多人对法西斯国家对教育的过度控制和严厉审查感到疏远和不满。另一个引起争议的原因是国家法西斯党内部的老龄化日益严重，因为党内高层的世代交替趋于缓慢。这种在学生和年轻人中蔓延的不满情绪将仍是问题的根源，直到我们采取措施结束这种局面为止。"
 ita_listen_to_the_youth:0 "倾听晚辈"
 ita_listen_to_the_youth_desc:0 "回顾1919年至1922年的那段岁月，年轻人们为推翻冥顽不化的政客和自由世界的老财阀，发动了法西斯革命。若我们忘记这点，法西斯主义之魂便会凋零，而我们会把这伟大的意识形态变成拙劣的模仿秀。我们必须鼓励和邀请年轻一代来访法西斯国家，展示我们的开放包容，让他们觉得自己仍在高举着他们的父辈所点燃的火炬。"
 ita_respect_your_elders:0 "尊重长辈"
 ita_respect_your_elders_desc:0 "回顾1919年至1922年的那段岁月，正是今天那些坐在大委员会、参议院和法西斯与法团议会的人发动了法西斯革命。如今在党和国家内部担任要职之人，正是过去追随墨索里尼进军罗马，带领意大利赢得世界大战的人。他们曾为此抛头颅洒热血。单单因为某些傲慢又忘恩负义的年轻人，就该让我们将这一切都弃之不顾吗？"
 ita_into_the_universities:0 "进入大学"
 ita_into_the_universities_desc:0 "墨索里尼认为意大利大学是“统治阶级的摇篮”，因此，他建立了GUF，法西斯大学团体。他们是学生和国家法西斯党的纽带，培养出前途光明的学生，为他们提供了一种进入国家法西斯党队伍的简单方式。然而，GUF难以控制且效率低下，最终成为弃子。卡洛·斯科尔扎决定改组GUF，而它们将再次向意大利学子提供报国之途，让其凭借聪明才智建设美好祖国，同时提供回报。"
 ita_encourage_young_fascists:0 "鼓励法西斯青年"
 ita_encourage_young_fascists_desc:0 "即使意大利大学官僚体系臃肿、组织方式混乱，其中仍不乏闪光之处。尽管大部分意大利学子和年轻一代对法西斯主义要么毫不感冒、要么颇有微词，仍有一些人对法西斯理念深信不疑。我们将激励这些勇敢的年轻人，向他们提供国家法西斯党中的低微职位并大加宣传，让更多年轻人前仆后继。"
 ita_clamp_down_protests:0 "镇压抗议"
 ita_clamp_down_protests_desc:0 "当年轻人希图犯上作乱、不敬长辈时，唯一方法便是管教他们。领袖命令大学必须清除崇洋媚外者与反法西斯分子——大学将戒严，学生将被监视，以防叛国行为；GUF等大部分法西斯学生组织将高度军事化并被剥夺自治权。我们不允许年轻的捣蛋鬼和小崽子们在我国上蹿下跳，我们得提醒他们注意自己的位置，让他们尝尝警棍的滋味。"
 ita_let_them_breathe_free:0 "自由呼吸"
 ita_let_them_breathe_free_desc:0 "虽然我们可以采取简单点的方法，直接对学生施压，不过也不是没有其他方法。相反地，我们大可放手让学生们讨论法西斯主义的小纰漏，而不担心遭到报复。当然我们也必须保证他们不会转而诉诸革命或者其他愚蠢手段。不过意大利的学生也应拥有言论自由的权利。"
 ita_benevolent_watch:0 "仁慈注视"
 ita_benevolent_watch_desc:0 "让意大利学生们畅所欲言是相当危险的，审查他们也同样如此。那么斯科尔扎能做什么呢？答案非常明显：我们应当引导学生得出更明智的结论，即法西斯主义和法西斯主义理想更加优越。我们会允许学生们胡言乱语，但也会让他们看到自己的民主理想的愚蠢。"
 ita_reinforce_censorship:0 "强化审查"
 ita_reinforce_censorship_desc:0 "这些蛊惑人心者对意大利的未来构成了显而易见的威胁。他们现在可能很年轻，但总有一天他们将成为意大利的领袖。只有立即扼杀这些观念，我们才能阻止意大利人民坠入历史的深渊。"
 ita_no_country_for_old_men:0 "并非老人之国"
 ita_no_country_for_old_men_desc:0 "意大利不是一个由将死之人统治的国度。事实上，在意大利，学生们将成为法西斯理想中的领袖，而不是加入反主流文化群体。时代在前进，而忽视年轻人会注定我们的失败。"
 ita_get_off_of_my_lawn:0 "老成才能谋国"
 ita_get_off_of_my_lawn_desc:0 "这些蠢货学生们认为他们比长辈们懂得更多。他们愚蠢地认为自己知道地球是怎么转的，因而可以轻松地建立一个更美好的世界。但愿我们能让这些年轻人明白，为什么他们的长辈代表着真理与智慧，以及我们的法西斯理想更胜一筹。"
 ita_the_youth_pacified:0 "青年已平息"
 ita_the_youth_pacified_desc:0 "看来，领袖已经对桀骜不驯的学生们制定了解决办法，无论结果如何。虽然一些学生和老人可能会对已实施的改革感到不满，但希望这些改革能让意大利青年冷静下来。"
 ita_deal_with_the_vatican:0 "处理梵蒂冈"
 ita_deal_with_the_vatican_desc:0 "许多意大利人是天主教徒，而教宗本人居住在我们领土内的一块飞地上。尽管如此，与教会的关系一直非常……至少可以称得上怪异。我们需要与天主教会保持一定的关系，无论是敌对关系还是互利关系。"
 ita_estrange_the_church:0 "疏远教会"
 ita_estrange_the_church_desc:0 "长期以来，天主教会在意大利社会中的势力过于强大，现在是时候消除他们在梵蒂冈城外的一切影响了。我们将从公立学校中删除天主教内容，并扼住那些亲教宗的喉舌。当然这可能会激怒教会，教宗也可能抱怨，但这是使意大利摆脱教宗的控制的必要之举。"
 ita_renew_the_concordat:0 "续签协定"
 ita_renew_the_concordat_desc:0 "宗教协定，即确定教宗与各国关系的公约，就意大利而言一直是独一无二的，因为梵蒂冈位于意大利境内。对意大利来说，《拉特兰条约》一直是宗教协定。然而，《拉特兰条约》已经签署多年。也许有必要签署一份新的宗教协定，以确保教会在意大利的统一地位。"
 ita_a_secular_society:0 "世俗社会"
 ita_a_secular_society_desc:0 "现代社会并非宗教社会。事实上，一个国家应该力求现代社会中宗教的影响力不过于强大。为此，我们应该采取措施反对教会学校，并开展宣传活动，教育意大利人民世俗社会的优越之处。如果一切顺利，我们的努力将大大削弱天主教会在意大利的影响。"
 ita_state_over_church:0 "国重于教"
 ita_state_over_church_desc:0 "虽然天主教会对意大利人民确实很重要，但我们必须确保人民意识到国家凌驾于教会之上。将教会和国家合二为一，甚至让教会凌驾于国家之上，都将是一个严重的错误。国家可能比教会更强大，但我们不会利用这种权力，比方说，去暗算教宗。"
 ita_mutually_beneficial_agreement:0 "互惠协议"
 ita_mutually_beneficial_agreement_desc:0 "教宗和斯科尔扎会晤后，双方宣布缔结一项新的协约，作为对拉特兰条约的补充。这份新协约允许天主教会建造更多的学校、拥有更多的财产，并大体上赋予教会在意大利更大的影响力。而作为交换，教宗需要付出的是默默支持斯科尔扎，并明确同意向国家法西斯党成员布道。这对双方来说是一笔双赢的交易，因为教会可以通过全力支持斯科尔扎来换取他们保留自己的权威。"
 ita_whats_yours_is_now_mine:0 "上帝的，归凯撒"
 ita_whats_yours_is_now_mine_desc:0 "天主教会在全意拥有太多私产了！很明显，我们必须没收教宗在梵蒂冈城外的所有财产，以削弱其影响力。幸亏教会持有的地产远没古时那么多，所以只要我们把此事说成是为了更好推进法西斯事业的必要之举，就不会引起太大争议。"
 ita_all_talk_no_action:0 "光说不做"
 ita_all_talk_no_action_desc:0 "虽然有很多关于国家与教会之间的关系将发生剧变的言论，但这大多也只是言论而已。虽然我们迄今为止的行动已经改变了意大利与教宗的关系，而且虽然我们会执行我们已经宣布的行动，但这些行动会更加温和，甚至视情况而定，可能根本不会执行。我们获得了我们想要的影响力，这才是斯科尔扎真正需要的。"
 ita_reinforce_the_ties:0 "加强纽带"
 ita_reinforce_the_ties_desc:0 "梵蒂冈与意大利之间的关系，与所有关系一样，需要维护和加强。几个世纪以来，意大利一直与教宗息息相关。如果我们不能妥善维护这一关系，这对我们强大国家的未来不是一个好兆头。"
 ita_fascism_is_futurist:0 "法西斯主义是未来主义"
 ita_fascism_is_futurist_desc:0 "法西斯主义一直以来都与未来主义相互交织。未来主义诞生于意大利，它就如法西斯主义一样，致力于将意大利从往昔的束缚中解放出来。我们必须超越我们天主教与基督教的过去，迈进一个崭新的，现代且世俗的未来！为闪亮的进步灯塔干杯！"
 ita_fascism_is_christian:0 "法西斯主义是基督教"
 ita_fascism_is_christian_desc:0 "大部分意大利人都是基督教徒，而我们的政权却没有反映出这一特点。如果我们能用上帝的信仰来巩固我们的权利，我们为什么要与之对抗？法西斯可以与基督教携手，这道理将由我们昭告天下！"
 ita_the_church_contained:0 "教会已控制"
 ita_the_church_contained_desc:0 "梵蒂冈教会在现代意大利的问题已经得到了恢复。虽然有些人对我们的解决方案不满意，但斯科尔扎知道，他已经为全意大利做出了最好的选择。"
 ita_back_to_rome_time:0 "回罗马"
 ita_back_to_rome_time_desc:0 "现在斯科尔扎已经实施了许多改革并回应了年轻人，女人和教会提出的种种问题，他可以回到罗马开始统治了。\n斯科尔扎保重！"
 ita_scorza_hands_on_the_economy:0 "各就各位"
 ita_scorza_hands_on_the_economy_desc:0 "国家的政治安全暂时有了保障，我们终于可以把注意力转向次要事务，比如经济问题。如果说我们的上一任给我们留了个烂摊子未免太轻描淡写了。两代人的经济政策参差不齐、互不衔接、自相矛盾，导致意大利不仅没有充分发挥其潜力，而且与我们的目标似乎比以往任何时候都更加遥不可及。\n\n我们可以引导国家走向很多选择和方向，其中一些比其他的更为激进，而领袖似乎并没有对任何一个方案持有强烈的偏见。这就要看他的顾问们能否说服他，让他相信他们的方法才是最适合意大利的道路。\n\n无论我们如何选择，意大利都将开辟自己的道路，即斯科尔扎领袖所坚持的道路。"
 ita_rationalize_the_bureaucracy:0 "理清官僚机构"
 ita_rationalize_the_bureaucracy_desc:0 "在这个时代，官僚的名声不太好。这并非无缘无故：毕竟，最终成为官僚的人必须是那种本来就适合成为官僚的人。不过，我们也不能完全否定意大利的官僚体制。尽管每当你想要完成某项任务时可能需要穿越繁文缛节的泥潭，但那是我们的前辈的错，而不是官僚们自己的错。归根结底，规则不是他们制定的。\n\n我们需要做的是找出我们官僚体制中的障碍和瓶颈，并加以解决。由于我们的制度仍是新生事物，而且根深蒂固，因此，如果我们取消或重新定义一些规定，以允许一些灵活性，官僚们也不会有太多反对意见。官僚机构绝不应成为国家不必要的负担，而应成为国家合理、及时地执行其意志的手段。"
 ITA_scorza_goodboy_econ:0 "经济改革"
 ita_create_the_GCLTA:0 "建立CGLTA"
 ita_create_the_GCLTA_desc:0 "从本质来看，工会有破坏性、煽动性，容易滋生极端倾向与党派行为。但另一方面，即使是最激进的工会，内部也有相当一部分工人单纯想与国家和企业谈判罢了，可以利用此种不变的特性为我们谋利。\n\n回首墨索里尼的辉煌时代，我们通过重组工会并将其置于单一的劳工保护伞下，在控制工会方面取得了些许成功。如果我们采取相同的做法，就可以创建一个休戚与共的工会，为将来的谈判创造更好的推力。我们将不需要权衡数十个不同劳工组织的利益诉求，所做的任何决定都只需被这个大工会批准，从而极大加快改革进程。"
 ita_modify_good_boy:0 "这将改变“经济改革”国家精神的效果。"
 ita_introduce_work_place_democracy:0 "引入工作场所民主"
 ita_introduce_work_place_democracy_desc:0 "很自然的，人们往往对他们工作相关和专业相关的领域知之甚多，而对其之外的知之甚少。因而，那些政治，外交，经济，军事相关的政策和战略，我们将他们交给党来帮忙处理，因为党内有专业人士来处理这些问题。但是在工作场所，这可就大不一样了。\n\n为了解决这个问题，我们可以进行改革——允许工人来通过选举CGLA的代表的形式，来对他们的工作环境和工作方式来施加影响。而这些通过基层总结出来的经验，将会被筛选后作为对国家政策的建议。在我们把他们纳入CGLA的保护伞后，这些工会的工人们也会得到很大的满足，而我们也可以借此促使工会对我们更加友好一些。"
 ita_allow_indepenent_parties:0 "允许独立党派存在"
 ita_allow_indepenent_parties_desc:0 "我们绝不会质疑乃至否定法西斯主义的首要指导思想地位。斯科尔扎领袖绝不会效仿齐亚诺背叛意大利。不过，虽然我们信仰足够坚定，仍免不了会有一些人认不清现实，误入歧途，顽固地守着过时的老旧信仰。\n\n我们施行一党专政，多少有人会对党和国家有一些怨气。在不影响专政的情况下，我们可以针对这种情况做出一些小小让步。形式上允许一部分反对党，但严密监管他们，我们就能向怀疑论者证明，我们的原则是经得起审查和批评的。当然，这得在合理的范围内，我们绝不容许反对派做出任何谋逆的言行。"
 ita_organic_democracy:0 "有机民主"
 ita_organic_democracy_desc:0 "法西斯主义作为一种意识形态，根植于民粹主义。民族和国家则是其最高权力形式的体现，而人们通常会忘记，所谓民族本意代表的是一族之民。在民主实践中，若人们能够质疑民族意志，阐释它的本质并宣扬它所持观点，那么它本身就更能广为人所知。我们践行中所认识到的民主即是此意。\n\n当然，这并不意味着我们要全盘接受自由主义意识形态，或是全盘否定法西斯党承载民族意志的主导地位。但若国家及其民族步调一致，齐头并进，谁又能阻挡得了我们呢？如果允许民众从法西斯党内部选举代表，我们就能不断加强民族国家综合体。当然，我们并不会因此放弃对国家的掌控，我们会亲手让民主体制在意大利的有机整体下腾飞。"
 ita_an_economy_for_labour:0 "工人的经济"
 ita_an_economy_for_labour_desc:0 "我们已成功奠定意大利新经济的基石：一个建立在工人阶级与国家全面和谐共生理念之上的经济。仁爱之心彰显我们在国家机器顶端的立场。\n\n有些人认为我们对这项政策手软，但他们要明白，国家是人民意志的反映，现今的经济正是为人民服务而革新的。经济越强大、越自主，我们就越团结。虽然曾有过恐惧与猜忌，但我们随时准备，应对超级大国的霸道市场，与意大利工人并肩前进。"
 ita_proprietary_corporations:0 "私有企业"
 ita_proprietary_corporations_desc:0 "资本主义的一大问题是其倾向绕着危险的繁荣、萧条周期循环，上下折腾损害国家与投资者的利益。然而我们也不可阻止企业的愚蠢莽撞活动，谁让大胆是商界不可或缺的财富呢。但还是有法子让情况改善。\n\n对企业规模及其潜在股东数进行一定限制，政府再为公司提供近似保险的保障，不论何种情况倒闭都有适额的钱领。足以使意大利享受通常只有自由市场体系才能获得的好处，同时又保留足够的约束加之各企业，这是对监管与放任取中道的完美构想。在理想情况下，我们可得二者的好处。"
 ita_move_towards_socialization:0 "迈向社会化"
 ita_move_towards_socialization_desc:0 "如果一个国家，无法增进民生福祉，保障人民利益，那它又有何价值？如果一个国家，无法富国裕民，冠绝全球，它还敢称自己能够代表人民吗？这些道理本不言自明，然而我们惧怕玷污意识形态，迟迟不肯迈出第一步——为人民将意大利打造为最伟大的国度。不过如今我们能够改变现状。\n\n我们将构建坚实的全方位社会安全网，社会化特定行业及社会生活，限制大公司权力，持续提高人民生活质量。如果意大利国富民安，繁荣昌盛，世界第一，那么德国、西方民主国家、日本狂热分子以及其他国家绝不敢妄自指摘我们的社会制度。"
 ita_an_economy_for_ethics:0 "道德的经济"
 ita_an_economy_for_ethics_desc:0 "经过这么长时间的努力，在项目遇到不小的内部阻力的情况下，我们终于为建设新意大利奠定了坚实的基础。我们的愿景是建立一个理智的、可持续的、不断增长的、符合真正现代标准的经济。\n\n世界上民主阵营可能会斥责我们的治理表面上做的很粗暴。要让他们闭嘴，最好的办法莫过于向他们展示我们在生产效率和工人福利方面都做得更好。幸福的劳动人口才具备足够的生产力，而有生产力的劳动人口们将使意大利从一个没有充分发挥其潜力且相对落后的国家迈向其本应成为的强国。"
 ita_reform_trade_unions:0 "改造工会"
 ita_reform_trade_unions_desc:0 "自意大利工会诞生以来，再怎么轻描淡写，它们也一直是让中央政府头疼的问题。而从工会自身的角度看，有一说一，它们的工作正是让当权者头疼。但我国政局既然已经稳定，工会就是待拔的最后一根刺了。\n\n我们不需要解散工会，也不需要对他们采取过激行动，只要改变其运作的一些规则，引入更多的许可与执照流程，即可阻止他们像过去那样大范围大规模地参与颠覆行为。除此以外，不需要过多打扰他们，而作为回报，我们将来也不会被他们干扰。"
 ita_work_with_economic_barons:0 "与经济大亨合作"
 ita_work_with_economic_barons_desc:0 "局势胶着，我们亟需盟友。我们已经充分遏制了工会的影响力，但也失去了大部分工会成员支持。所幸，意大利经济舞台上并非只有工会一个角色，还有许多私营公司及个人运营的大型产业。我们应尝试争取他们的支持。\n\n由于强敌环伺，他们十分乐见工会改革，并迫切渴望与我们开展更多合作。如果我们好好坐下来，扩大双方业务合作范围，他们从此就能坐稳经济龙头的宝座。他们未来在意识形态及金融领域里也就会睁一只眼闭一只眼。何况，外部还有超级大国虎视眈眈，随时准备乘虚而入。"
 ita_keep_the_status_quo:0 "维持现状"
 ita_keep_the_status_quo_desc:0 "归根结底，过于复杂和过多繁文缛节的官僚机构绝对是问题所在。我们的前辈在法西斯主义原则的指导下建立了经济基础，因此我们不需要借鉴软弱的自由主义或社会民主主义，进行任何过度的改革。东西如果没坏，为什么费力去修它？\n\n当然，我们仍然需要澄清法律中的不当措辞，重申我们对国家本身的奉献精神，但没有必要进行大规模改革。昨天、今天和明天，经济都照样运转！当火车终于准点运行，人们的汽车也能用上便宜的汽油时，他们肯定会心满意足的。"
 ita_strengthen_the_IRI:0 "振兴IRI"
 ita_strengthen_the_IRI_desc:0 "工业复兴公司（简称IRI）是战争期间的金融巨头，一家由国家控股的公司，使我们能指引、稳定全意经济，而无需进行蕴藏灾难的国有化。而战后，随着全社会重新向私营企业开放经济，我们不再需要持有各行业的股份，对IRI的资金与支持已然减少。\n\n其后几年里，人们非常怀念它的荫蔽为银行带来的安全与稳定。只要银行和投资者确信投资受到振兴的IRI的保护与支持，他们就能更安心的做好本职工作。我们会打破人民心中的桎梏，看着他们充满信心地投资，以及随之而来全线增长的利润。"
 ita_an_economy_for_prosperity:0 "繁荣的经济"
 ita_an_economy_for_prosperity_desc:0 "在把那些令人窒息的官僚们从意大利经济的喉咙边抛开后，我们的前途变得越来越明朗。我们将会带领现在的意大利在欧洲继续作为龙头，甚至于在全球扩展影响力。美国人被如山般的黄金和钞票所淹没，德国和日本被欧洲人和亚洲人身上的脂膏填的脑满肠肥，为什么意大利不能也像他们那样享受战利品呢？\n\n昔日的那些监管性的，阻碍商贸自由的法律锁链，现在已经被我们的改革之斧砍成了细丝。意大利的企业家们已经获得了空前的自由，他们采取行动的自由度可以超过意大利历史上任何一个时期。在有了这种自由以后，意大利的社会生产力将会被全面解放，社会物质财富也会极大丰富。也许赶德超美对意大利来说……也并不是一件不可能的事情？"
 ita_strengthen_the_bureaucracy:0 "巩固官僚机构"
 ita_strengthen_the_bureaucracy_desc:0 "官僚机关是我们国家的手和脚，我们的每一条法律，每一道命令，每一句指示，最终都要交到它们的身上，并由他们在全国范围内加以执行和落实。因而，这些官僚机构必须拥有足够大的权力，来高效率的将我们的旨意变现。\n\n那些限制着官僚机关权力的种种繁文缛节，只会限制他们更高效地履行自己的职能。官僚们当然会受制于我们——如果那些人敢于滥用我们新给予他们的自由权，来曲解我们的意思，乃至于危害国家的利益，我们可以轻松处理掉他们。但如果是那些政府里对我们忠诚的公务员们，我们为什么不给他们足够的权力来贯彻国家意志，而是要让他们处理堆积如山的文件呢？"
 ITA_scorza_badboyboy_econ: "保守型经济"
 ita_an_iron_fist:0 "重拳"
 ita_an_iron_fist_desc:0 "我们的能力现已能胜任重大改革工作，终于能够着手前任理应完成之事业。可能会有人批评，说我们独裁专制或者微操过度，不过多说无益，事实胜于雄辩。\n\n不过，办成这事需要大家勠力同心，群策群力。希望前期项目早日展现光明前景，将那些依然半信半疑的人拉回行列，至于那些还疑神疑鬼的，就及时处理掉。现在担心毫无意义，但铭记于心，笃行亦能不怠……"
 ita_modify_bad_boy:0 "这将改变“保守型经济”国家精神的效果。"
 ita_integrate_the_unions:0 "整合工会"
 ita_integrate_the_unions_desc:0 "意大利是个国民一体的国家——国家是人民的代表，人民是国家的组成。简而言之，国家需要花费精力到和工会谈判，争论，乃至于争夺谁才是真正权威，这类事情本身就是荒唐可笑的。这种无意义的行为继续下去，只会违背我们国家作为一个有机整体的原则，所以它需要被加以修正。\n\n我们将会把整个工会都纳入到政府，将其作为政府执行命令的臂膀，这样一来他们便会受制于我们。工会们依然可以履行他们代表工人群体利益的职责，但这一切都会在秩序下进行，而不会对国家工业产生什么影响了。"
 ita_total_economic_dirigism:0 "严格财政干预"
 ita_total_economic_dirigism_desc:0 "西方资本主义自由市场经济制度是有缺陷的，而最大的缺陷莫过于市场的不确定性。如果我们选择把我们的家当都交给那只“看不见的手”来调控，那么这只看不见的手只会在我们睡着之时把我们扼死。我们应当推行更加科学的宏观调控政策，严格的调控会让我们的经济像国家那样稳定运转，除此之外别无选择。\n\n通过和民营企业家们深度合作，同时也在政府机关加强市场监管和调控的努力下，我们可以在遇见大风大浪的时候依然保证意大利的经济行稳致远。稳定压倒一切，发展才是硬道理，我们将尽我们所能。"
 ita_encourage_industrial_mergers:0 "鼓励公司合并"
 ita_encourage_industrial_mergers_desc:0 "到了某个阶段，某些企业就会依仗其规模庞大、业务全面以及诸多的工作部门来避免彻底崩溃。以我们的角度来看，小规模公司企业太容易被摇摆不定的经济带着走，但要是这些小企业合并为一体，就强大得多了。\n\n我们可以通过提供补贴、减免税收甚至为这些互相整合的公司承担一些前期成本，激励它们参与合并，加强对市场和工会的冲击。"
 ita_from_the_darkness:0 "源自黑暗"
 ita_from_the_darkness_desc:0 "长久以来，意大利都无能为力，任由命运摆布。混乱的自由市场，异想天开的法团大亨和闹脾气的工人把意大利搞的一团糟。这可不是地球上最骄傲的民族应该干的事！\n\n意大利将再次崛起，在我们不容置疑的领导下，无论有多少牺牲，代价如何，我们必须让意大利再次成为世界的中心。\n\n前进，意大利！(Avanti, Italia!)"
 ita_resize_the_unions:0 "调整工会"
 ita_resize_the_unions_desc:0 "之前的治理证明了，在我们工业中心地区里，大型地区性工会主导一直是一个问题。这些工会已经成为我们国家内的一个麻烦，因为他们拥有相当可观的势力，甚至能挑战国家本身的权力与权威。我们急需找到解决方案，既不过分破坏与工人的关系，还要降低工会的影响力。\n\n尽管我们不可能取缔工会并剥夺其集体谈判能力，但我们可以换种方式，分散工会，让规模较小，本地化程度更高的工会代替。他们仍然具有代表性，但是影响力不会过大，以至于我们无法控制他们。"
 ita_strengthen_the_ties:0 "加强纽带"
 ita_strengthen_the_ties_desc:0 "最能体现意大利那淳朴、廉洁精神及意志的便是它的工人阶级。反过来，意大利万众合一众诚成国，也便是时时事事代表集体精神，一言一行彰显此种意志。只要我们一直坚定地与工人阶级站在一块，国家就能变得更加强大。\n\n我们应当为工会公开作保，鼎力相助，共同进退，从而改善自身公众形象。这样一来，既不破坏他们对未来的美好期盼，也能更为深入全面地施行各种政策，里子面子两手抓，未来回报只多不少，言而总之，我们当全心全意支持他们。"
 ita_scorza_friends_in_high_places:0 "身居高位的朋友"
 ita_scorza_friends_in_high_places_desc:0 "经济，在很多方面上是十分与政治相似的。最明显的相似点之一就是当大把的权力集中在少数精英手中时，\n\n一切似乎都变得更加有条不紊。如果我们不能像当权者那样利用这一既定事实，那就真是蠢到家了。通过我们的努力，我们成功地将近乎所有的经济力量集中到了少数几个能干、可信的卡特尔手里。意大利经济历来都是如履薄冰，但此后它将达到前所未有的高度，我们以意大利的名义发誓。"
 ita_a_firm_hand:0 "强硬手段"
 ita_a_firm_hand_desc:0 "政府，要紧攥于手，但不能出格。我们即是国家，作威作福等于激怒人民。何况长远来看，小利无利大利，还会妨害今后的工作。要提醒所有人，我们是来为人民谋福利的。\n\n官员执行政策的行政裁量有点“自由”过度了，人们对此也有合理的担忧。我们改革的进程里，必须证明这不是个暴政、无视人民的国家。"
 ita_protect_the_unions:0 "保护工会"
 ita_protect_the_unions_desc:0 "工人心甘情愿合作，是本轮改革奏效的关键。而赢得他们信任的最好方法，就是重申我们会保护他们的工会。北部是国家重工业的根基，那里的工会在意识形态上可能与我们有些分歧，但为了换取我们不干涉工会事务的保证，他们愿意在具体问题上妥协。\n\n我们会保护工会，支持工人。反之我们实施改革，也可以期望劳动者的支持。强迫工人忠于我们是一个选择，但显然有成本更低的方法，自然择优取之。"
 ita_limit_worker_representation:0 "限制工人代表"
 ita_limit_worker_representation_desc:0 "如果放任劳工滥权，那对国家其他领域的不利影响不可估量。工人影响力需要控制在合理的区间，有意限制其政治、社会影响是必须要做的，让他们的所作所为限制在合理范畴内。\n\n具体是以下几项限制措施：达到一定规模的工会，就要规正其活动。设定会费收入上限，压制其筹款工作。限制工业密集区的代表人数。这看起来很像回旋镖，明明此前我们还支持工会，如今却又限制他们。但工会与国家的利益如今已失衡，工人必须以大局为重。"
 ita_almighty_the_IRI:0 "万能的IRI"
 ita_almighty_the_IRI_desc:0 "工业复兴公司(IRI)是一家特殊的公司,尽管严格意义上来说它是一家国营公司,但与此同时它也是一家独立的私营公司。到目前为止,我们已经能够利用IRI来间接影响并依此确保我国工业免受经济震荡所产生的影响。不过,我们不止可以做到这些,或许我们要做的事还有更多。\n\n如果我们直接将IRI纳入国家机器中。我们不仅可以利用IRI为我国的工业企业提供保障与支持,还可以进一步控制它们,从而更加有效的利用它们的资源与技术,为整个意大利谋利。它也不会再是工业大亨们安全网了,而是将会成为意大利进步与工业现代化的先锋。"
 ita_marching_onwards:0 "勇往直前"
 ita_marching_onwards_desc:0 "老话说得好“稳扎稳打”。通过有限度的改革来提高整体的效率,我们成功的改进了旧有的工作方式,并使之在当下发挥作用。虽然有人认为我们三心二意或者态度软弱。但是他们很快就会明白,我们并没有颠覆旧有的制度,而是取其精华,去其糟粕。这些改革也将会避免不久的将来遇到的巨大困难。\n\n做了这些后,我们就可以重新审视我们的前辈们制定的、以前却无力实施的许多更宏伟的计划。我们随时准备展示法西斯的巅峰之作。如果我们这么做,我们就将会成为世界的焦点。"
 ita_debates_in_ISPI:0 "国际政治研究所的辩论"
 ita_debates_in_ISPI_desc: "众所周知，意大利的伟大无需多言。历经战争洗礼后，它更显雄壮，成功在地中海、中东以及非洲打造出庞大的帝国版图，这个领域现在被广泛称作“意大利势力圈”。然而，在当今时代，政治研究所内却对这个帝国的未来发展路径产生了分歧。\n\n保守的旧派势力坚定不移地维护现有秩序，他们期望帝国的现状得以延续——即维持一个等级森严、以剥削为基石的殖民帝国。而与之对峙的，是受到年轻外交官和经济学家高度赞誉的新派。他们力主通过投资与经济发展来推动帝国的整合与繁荣昌盛，而非单一地进行资源掠夺。他们深信此举不仅对殖民地具有更大的裨益，更能为意大利自身带来实质性的力量增强。ISPI内的争论日趋激烈，究竟鹿死谁手，我们唯有拭目以待……"
 ita_the_new_school:0 "新学校"
 ita_the_new_school_desc:0 "在ISPI经历了漫长而激烈的辩论后，新派似乎脱颖而出，赢得了胜利。在年轻外交官和经济学家的鼎力支持下，新一代领导者为意大利帝国及其影响范围描绘了新的蓝图，他们深信这将带领意大利及其帝国进入一个崭新的辉煌时代。\n\n相较于继续沿用旧派的垂直剥削模式，新派主张通过促进帝国的融合与发展来为意大利谋取更大的利益，而实现这一目标的主要途径是大力推进基础设施项目。此举不仅将促进“意大利势力圈”的经济繁荣与发展，更重要的是，它将使意大利本身的力量得到空前的增强。\n\n然而，现在摆在我们面前的问题是，究竟应该如何稳步前行并实现这一宏伟目标……"
 ita_promote_imperial_integration:0 "推进帝国一体化"
 ita_promote_imperial_integration_desc:0 "也许，整合我国经济圈内各种经济体的最好方法就是干脆把它们彻底合并，创造真正的“单一市场”。这显然不是一蹴而就的，干成这事需要大量的投资和金融策略。但是我们都对做成有信心！\n\n我们会投资大型基础设施，从而加速各经济体的发展，同时把他们连接起来。制定政策，特别是鼓励帝国范围内的贸易。“单一市场”可能是个激进的想法，但一个庞大的经济体对意大利经济的贡献会远超许多大不相同的经济体！"
 ita_encourage_imperial_cooperation:0 "鼓励帝国经济合作"
 ita_encourage_imperial_cooperation_desc:0 "或许,我国经济圈最佳的发展方式是鼓励经济圈内各个国家、殖民地之间的合作。这意味着圈内的每个国家、殖民地都将被鼓励专精某一领域,并重点关注所专精领域内的经济状况。\n\n这么做有一些好处,这将使得圈内每个国家、殖民地都将专精自己所擅长的领域,而不是胡乱,或是失败的去做任何事情。这将使得他们的经济更高效,并借此强化整个意大利经济圈。但最重要的是,这将意味着意大利在经济圈内的主导地位更加稳固,因为意大利是经济圈内唯一一个经济发达,多元化的成员。这么做大家都可从中获益,但最重要的是,意大利永远是获利最多的那一个。"
 ita_set_up_protectionist_barriers:0 "设立经济保护壁垒"
 ita_set_up_protectionist_barriers_desc:0 "要将意大利经济圈打造为真正的“共同市场”，就必须确保我们经济圈内的成员国参与内循环贸易，圈外的国家先靠边。而促成这点的最好方式，就是对圈外的国家筑起贸易壁垒，圈内的减少乃至消除壁垒。\n\n也就是说，关税壁垒与贸易保护的加持，能让经济圈内的成员相互贸易，比和圈外的国家贸易更赚。足以加强整体经济，促成整合为真正的”共同市场“。"
 ita_grand_infrastructural_projects:0 "大基建工程"
 ita_grand_infrastructural_projects_desc:0 "为了推动意大利势力圈的经济体与我们的“单一市场”实现深度融合，我们迫切需要对成员国的基础设施进行大规模投资。目前情况显示，仅有意大利的基础设施展现出了真正的先进性和高效性。然而，令人遗憾的是，意大利势力圈中大多数国家的基础设施状况并不尽如人意，不仅质量堪忧，而且连通性也严重不足。这种现状不仅制约了这些国家的经济发展潜力，更为我们构建统一的“单一市场”带来了巨大挑战。\n\n为了打破这一僵局，我们需要着手投资一系列关键的基础设施项目，以促进意大利势力圈内各经济体之间的紧密联系。这些项目将涵盖港口、铁路、公路和高速公路等重要领域。通过实施这些项目，我们将能够切实提升帝国各邦之间的交流与合作，加强彼此的连接与沟通。"
 ita_create_the_imperial_committee:0 "创建帝国委员会"
 ita_create_the_imperial_committee_desc:0 "为了强化我们的“意大利势力圈”，我们必须确保势力圈的成员国与殖民地不会突然萌生退意，而只有让每个成员都感受到自己在帝国内有一定的话语权，意大利势力圈或许才能够拥有足够的凝聚力。因此，我们将成立一个由各个成员国代表所共同组成的“帝国委员会”，以此来更好地凝聚帝国。\n\n不过目前来看，国内就帝国委员会的具体职能还是有着许多不同的看法。有些人认为这个委员会应该仅仅是一个象征性的工具，本身不应该具备任何权力；然而也有一些人觉得应该在我们掌握绝对权力的前提下，适当向帝国委员会让渡出一些无关紧要的象征性职权；当然还有一些人认为应该给予委员会充足的权力，让其能够有效地影响帝国的经济发展决策。至于最后哪派会赢得辩论，现在还有待观察……"
 ita_imperial_economic_community:0 "帝国经济共同体"
 ita_imperial_economic_community_desc:0 "为了深化帝国间的经济合作，我们必须精心制定一系列法规，从而在意大利势力圈内建立起一个坚实的经济共同体。为确保这一经济共同体的和谐运转，我们需要整合当前纷繁复杂的经济准则与规范。\n\n为此，我们将在意大利势力圈的各个国家中实施一连串的经济法规，以助力实现这一宏伟蓝图。我们将在各国货币间推行固定汇率制度（其中里拉无疑会享有特殊的优惠汇率）。同时，我们将在意大利势力圈内部促进更加自由的流动，这不仅包括资本的自由流通，还包括劳工的自由流动。这些措施将极大地促进我们所设想的经济共同体的构建！"
 ita_a_new_trade_bloc:0 "新贸易集团"
 ita_a_new_trade_bloc_desc:0 "为了确保意大利势力圈的发展壮大，更重要的是，意大利在其中的统治地位，我们需要标准化并强化众多意大利势力圈国家的贸易法，确保意大利势力圈中的众人都根据相同的规则行使。\n\n为此，我们将在意大利势力圈各国推行一套贸易法，规范意大利势力圈和非意大利势力圈国家之间的贸易。这些法律将对进出口进行管理，使意大利圈内国家的贸易成为最惠贸易。最重要的是，同时确保意大利保持这些国家的主要工业供应国和意大利势力圈的主导者的地位。"
 ita_an_effective_committee:0 "实权委员会"
 ita_an_effective_committee_desc:0 "在关于帝国委员会应该拥有怎样的权力的种种争论之后，看来赞成赋权委员会并确保其权力实际有效的派系获胜了！实权委员会将由来自意大利势力圈的各个国家的外交官与代表组成，在意大利势力圈的经济事务决策中拥有重要的话语权。\n\n一些强硬派并不对此感到兴奋，因为他们更希望所有权力仍然被意大利牢牢抓在手中，尤其是领袖手中。但他们很快就会意识到，最终，一个实权委员会将最好地促进整个意大利势力圈的发展。而这种发展将使意大利自身和她的领土一样收益颇丰！"
 ita_a_symbolic_committee:0 "象征性的委员会"
 ita_a_symbolic_committee_desc:0 "在经历了关于帝国委员会应当拥有怎样的权力的漫长深思熟虑后，看来那些赞成只赋予它象征性权力的派系获胜了！象征性的委员会将由来自意大利势力圈的各个国家的外交官与代表组成，将被授予一些权力，但这些权力的范围最终会受到限制。\n\n有时候，巩固你对人们的统治的最好方法就是让他们感觉自己有发言权并可以做决定，即便真正的权力由其他人掌握。这个象征性的帝国委员会将实现这一目标。在这些象征性的权力使意大利势力圈的代表国感觉他们自己在真正参与决策过程时，至关重要的决策最终仍将由意大利自身做出。"
 ita_a_rubber_stamp_committee:0 "形式上的“委员会”"
 ita_a_rubber_stamp_committee_desc:0 "在经历了关于帝国委员会应当拥有怎样的权力的漫长深思熟虑后，看来那些赞成让委员会成为橡皮图章的派系获胜了！虽然委员会将被建立，每个意大利势力圈的国家也都可以派驻代表，但是毫无权力的它只不过是一出滑稽戏罢了。\n\n在理论上，名义上可以影响整个意大利势力圈的经济政策的委员会权势滔天。然而，实际上，一切实际权力都属于领袖，委员会没有一丝一毫的真正权力。这正是我们喜欢的方式！"
 ita_common_economic_planning:0 "共同经济规划"
 ita_common_economic_planning_desc:0 "帝国委员会已经成立，开工吧！\n\nIRI将为意大利经济圈制订新的经济计划，然而，这一次将与往常有所不同，因为我们将让意大利经济圈内各国家的代表参与制订计划。如果我们要建立起一个“单一市场”，每个国家都应该加入进来！意大利经济圈的未来由它主宰！"
 ita_the_imperial_alliance:0 "帝国联盟"
 ita_the_imperial_alliance_desc:0 "我们正走在建立意大利势力圈的单一市场之路。然而，仅仅实现经济一体化是不够的。还必须在外交上确保势力圈内的所有人都站在同一战线上！\n\n现在是我国及相关国组建阵营的时候了：帝国联盟！理论上，这个圈内国家间联盟会是世界舞台上的平等联盟。在实践中，意大利自然是这种平等里的首席。\n\n无论如何，帝国联盟是我们势力范围在世界舞台上展现自我的最佳方式！团结就是力量！"
 ita_towards_a_common_currency:0 "统一货币？"
 ita_towards_a_common_currency_desc:0 "近期，ISPI提出了一项创新计划。目前，意大利势力圈的货币体系已实施固定汇率制度（其中，意大利里拉获得了相对更优的汇率优势）。然而，频繁的货币兑换及其附带的复杂流程，已对意大利势力圈的经济增长造成了阻碍。\n\n因此，我们决定整合意大利现行的多种货币，推出统一的货币——帝国里拉！此后，交易者们将不再受困于处理多种货币转换的问题，同时能够摆脱繁琐的行政手续和额外费用。展望未来，意大利各州将统一采用这种货币，这将极大简化交易过程。这一改革无疑将为意大利及其势力圈的经济持续繁荣注入新的动力。"
 ita_the_rome_pact:0 "罗马条约"
 ita_the_rome_pact_desc:0 "意大利迎来了崭露头角的历史时刻。意大利势力圈必须昂首屹立于世界舞台，与全球其他强大阵营如自由国家组织、团结协定和共荣圈平分秋色！为此，意大利势力圈各国代表将齐聚罗马，共同缔结一份坚如磐石的盟约，筑起一个牢不可破的联盟！\n\n这份“罗马盟约”将由一群“自由”国家共同签署，他们虽在名义上保持着独立国家的身份，却心悦诚服地承认并归顺于意大利的领袖地位。只要他们“自愿”加入我们的阵营，这便不构成帝国主义！毋庸置疑，意大利将稳坐此联盟的首席；毕竟，在世间万物中，尽管众生平等，但总有生物比他们更平等。"
 ita_renewed_investments_in_the_empire:0 "帝国再投资"
 ita_renewed_investments_in_the_empire_desc:0 "既已为帝国经济圈的未来指明方向，就决不放慢脚步！而且还要反过来，加大全帝国的投资力度和加速经济发展！\n\n决不松懈！不止要恢复失去的投资，还要更多。国库会投资帝国内各国的工业发展。帝国经济，走向世界一流！意大利自然还是帝国经济圈的超然经济霸主，但我们会让经济圈内的每个成员各出其力，为更大更好的帝国经济圈奋斗！"
 ita_the_mediterranean_bloc:0 "地中海集团"
 ita_the_mediterranean_bloc_desc:0 "意大利开宗立派的时机已经成熟。在这风云变幻的世界中，意大利势力圈必须坚如磐石，以抵御那些对意大利心怀叵测的威胁势力！正因如此，地中海联盟便应运而生！\n\n这是一个由意大利“庇护”的国家所结成的联盟，将成为意大利在地中海地区霸权地位的极致彰显。尽管有些成员国或许会不满于这个联盟连表面上的平等都不愿维持，但他们又岂能洞悉其中深意？唯有斯科尔扎洞悉一切，深知这才是引领意大利走向光明未来的康庄大道！"
 ita_italian_businesses_across_the_mediterranean:0 "意大利跨地中海贸易"
 ita_italian_businesses_across_the_mediterranean_desc:0 "当前，无数投资机会正向我们敞开怀抱！我们将牵引导意大利的龙头企业，不分国有私营，借助诱人的税收优惠政策，深入意大利势力圈的每一个角落进行投资布局！\n\n我们无须动用立法之权，强行要求这些企业在意大利势力圈内投资。我们的方法更为精妙。只需略施补贴之小惠，再辅以税收减免之甜头，便足以吸引意大利的商业巨擘们持续投资于地中海的沃土之上！"
 ita_the_old_guard:0 "党内元老"
 ita_the_old_guard_desc:0 "坐镇克莱里奇宫的ISPI元老们正居高临下地审视着米兰这座都市。然而，他们的目光远非局限于此，而是放眼全球。自上世纪30年代以来，他们便以值得信赖的双手，稳固地掌舵着意大利外交政策的航向，延续着那古老而经典的理念——求实务实、冷静决断、高效行动。这些元老是由资深外交官和经济学家们组成的精英团体，他们历经国际政治的风云变幻，对齐亚诺在把握时机与应对逆境方面的无力表现深感不满。而今，他们再次崭露头角，将全力以赴，助力意大利崛起为举足轻重的强国。\n\n无论国际政策研究所的新派势力如何喧嚣，那些历经时间考验的方法依然具有行之有效。专制统治、资源掠夺、吹毛求疵，这些或许都是元老们的手法，但在他们眼中，一个自上而下的殖民帝国才是最理想的模式。殖民地要么被精心开发，要么被充分利用，一切关系的建立，都是为了维护意大利的利益：恰到好处，无过之而无不及。在我们的资深专家引领下，那些浅尝辄止的业余者和畏首畏尾的懦夫都将被时代巨浪所吞噬。"
 ita_exploitation_and_development:0 "剥削与发展"
 ita_exploitation_and_development_desc:0 "国际政治犹如走钢丝，对意志与策略的运用提出了极高要求。在我们团队中，有些顾问显得较为软弱，他们缺乏足够的决心来充分利用意大利的势力范围，以实现大国应有的影响力；而另一些极端的军国主义者则渴望我们不计后果地消耗资源，这无疑会对我们的未来利益构成威胁。尽管如此，我们将平稳航行，就像在钢丝上保持平衡一样。通过精心维持剥削与发展、撤资与投资之间的微妙平衡，我们能够使帝国在未来一个世纪内继续为我们所用。\n\n当然，这样的策略也并非没有挑战。我们可能会面临两方面的指责：一方面，有人可能会批评我们过度扩张了意大利的势力范围；另一方面，也有人会认为我们的扩张还不够充分。正因如此，外交政策应当由专家来制定，而不应受到鹰派和鸽派等极端观点的影响。随着时间的推移，我们的正确性将得到验证。在运用这种精妙的平衡策略时，ISPI的资深成员将展示他们适应瞬息万变国际环境的能力。我们的最终目标是将意大利帝国塑造为全球瞩目的典范。"
 ita_tear_down_the_facade:0 "不再伪装"
 ita_tear_down_the_facade_desc:0 "是时候揭去伪装的面纱了。实际上，处于意大利势力范围内的国家并非我们的庇护对象，也不属于我们的义务范畴。它们更像是我们手中的珍贵资源，我们应当榨取它们所有的潜在价值，以为意大利带来更大的福祉。并且，这样的挖掘和利用应当持续不断。\n\n虽然团队中有些顾问对过度开发意大利殖民地的长远利益表示担忧，但他们未能充分认识到，意大利当前急需汇聚力量，提升自身在国际舞台上的影响力，从而确保帝国地位的稳固与持久。我们必须坚定不移，绝不容许任何动摇与疑虑。只有摒弃那些虚伪的慈善面具，我们才能防止被那些更为冷酷、更为实际且行事果断的国家所超越。如果意大利有志于成为世界领先的强国，那么我们就必须紧紧把握住自己的命运，不论这样的选择将对小国或人民带来何种影响。"
 ita_new_trade_agreements:0 "新贸易协定"
 ita_new_trade_agreements_desc:0 "贸易，作为建立良好关系的基石，不论在平等或不平等的关系中都发挥着至关重要的作用。因此，我们必须积极推动意大利与我们影响范围内的国家之间的贸易往来。这一举措不仅能加强我们对这些国家的掌控力，同时也将推动我们势力范围内的经济蓬勃发展。\n\n当然，贸易条件并非平等。通过精心策划贸易协议，并向合作伙伴提出难以拒绝的条件，我们将能够以极具竞争力的价格引进意大利所需的原材料。这些物美价廉的资源将进一步增强我们的工业在全球市场上的竞争力。同时，随着我们成功打开势力范围内的市场，意大利的消费品也将回流至这些国家。此后，我们的重点将是激励合作伙伴对非意大利进口产品加征关税。这无疑是一场策略与智慧并存的博弈。"
 ita_leverage_the_oil_monopoly:0 "利用石油垄断"
 ita_leverage_the_oil_monopoly_desc:0 "即使我国与历史上的其他帝国不能相提并论，我们也有一种鲜有人知的手段来控制它。对石油的垄断意味着我们可以按照领袖的意愿行事，封锁或开放整个经济圈——不，整个社会的水龙头。我们不能将此类资源的使用限制在战时。相反，石油供应能使我们扩大势力范围，并向不守规矩的国家展示任何叛逆倾向都会对那些被他们所背叛的人民有利。\n\n前路是光明且螺旋上升的。通过在每个值得合作的石油出口国和运输商中选出的军事和外交“顾问”，我们可以毫不犹豫地切断有任何图谋不轨国家的石油供应。如果其执意与我们分道扬镳，我们将迅速让他们的国家机器陷入瘫痪。从那时起，人民群众的汪洋大海便会从腐朽的国家机器的尸体上踩踏过去。难承其夏，无论严冬。"
 ita_squeeze_the_mediterranean:0 "掌握地中海"
 ita_squeeze_the_mediterranean_desc:0 "自罗马时代以来，地中海就被视为意大利的内海，这是历史的宿命。除意大利人民外，无人有资格宣称自己是地中海的主宰。尽管令人不快的直布罗陀计划对其资源潜力造成了一定影响，但对寻求机会的人来说，地中海依然蕴藏着诱人的财富。\n\n捕鱼与开采石油是将海洋的控制转化为实质的财富两大关键手段。然而，我们也深知资源的珍贵与有限，因此必须将视野扩大到地中海沿岸的各国。我们将精心策划与意大利势力范围内国家建立经济合作，以确保我们的利益最大化，并充分利用我们在这片水域的统治地位所带来的经济优势。在不久的将来，意大利的旗帜将在地中海的每个角落高高飘扬，捕鱼船与石油勘探船都将向世界展示谁才是这片古老海域的真正统治者。"
 ita_zaibatsu_money:0 "引进日方资本"
 ita_zaibatsu_money_desc:0 "大洋彼岸的日本看似遥远，但它的经济体系还是对我们产生了相当大的影响。名为“财阀”的经济寡头很早以前便实现了我们所期望的帝国经济模式：即从大东亚共荣圈成员国身上汲取经济利益，并最终将所有的资源收益汇总到自己身上。不过好消息是，日本财阀虽然占据了先发优势，但他们严重的腐败问题却给了我们后起直追的宝贵机会。\n\n虽说地理上相距甚远，但还是有一小部分意大利企业家在大东亚共荣圈的势力范围内开展了一些经济活动，并在这期间与日本财阀的许多高层取得了联系。有了这层关系，我们便可以和这些财阀高层进行合作：我们能够向日本军队提供资源帮助，只可惜除了日本，我们也与许多其他国家进行着资源贸易。当然了，意大利人对朋友一向很慷慨。只要日方财阀选择进口我们的资源，那么意大利也会将日本朋友放在心上。至于最后，这些流进我们口袋里的日方资本将会发挥它们的作用。"
 ita_we_accept_dollars:0 "美元滚滚来"
 ita_we_accept_dollars_desc:0 "众所周知，意大利和美国的生活方式迥异，但我们的价值观在某些方面却有所契合。两国人民都崇尚实用主义，富有创业精神，并致力于为民众的繁荣与安全付出一切努力。因此，在美国建立联系并开展合作并非遥不可及。\n\n虽然美国政府宣称秉持自由市场原则，但其对市场的实际干预远超过其公开表态。与意大利对经济的直接和公开干预不同，华盛顿与其大型企业之间的纽带错综复杂，这种关系隐秘而微妙，只有敏锐的观察者才能洞悉其中的奥秘。深入了解他们的运作方式对我们而言至关重要，因为这关系到我们如何通过行贿和签订合同来穿透这一隐秘的系统从而取得成功。幸运的是，已有一些意大利公民在美国开展业务，他们凭借专业知识和政治关系网，与“自由世界”的领导者建立了合作关系，就像找到了合适的话搭子一样简单。\n\n向美国人明确表达一点：我们非常乐意接受美元，并且对其来源并不太过问。"
 ita_a_little_laissez_faire:0 "稍作放任"
 ita_a_little_laissez_faire_desc:0 "源于意大利法西斯创立者的深思熟虑，意大利的贸易和金融法规向来以严密和周全著称。在制定这些法规之初，领袖及其智囊团明智地对经济实施了强有力的控制，以确保国家利益的实现。然而，随着时间的推移，我们追求的目标也随之发生了变化。为了适应这些新的变化，我们决定废除意大利领域内众多的贸易和金融交易规定。\n\n新的规定将很快展现出其积极效果。依靠我们更加开明的经济学家们的智慧，我们将精确地识别出哪些法规已经成为商业发展的阻碍，并会毫不犹豫地将其废除。这将引发一场经济活动的热潮，有力地推动经济的快速增长和多元化发展，而为财政部带来滚滚财源。当然，如果情况发展过快，超出了我们的掌控范围，我们也有足够的能力及时调整，稳定大局。"
 ita_money_where_it_matters:0 "钱用要处"
 ita_money_where_it_matters_desc:0 "我们的一些经济顾问倾向于放宽监管，而有些人则主张全面私有化。但ISPI作为此领域的权威机构，深知稳健的政策才是制胜之道。我们既不打算削弱国家在解决经济问题上的能力，也不打算将国家在经济中彻底剔除。相反，我们将选择一条折中的道路，且此策略的成功将印证我们的明智之选。\n\n我们的某位经济专家巧妙地将此中间策略的核心理念概括为“把钱用在刀刃上”。我们将通过私有化非核心但目前仍由国家把控的经济部门，同时保留那些具有潜在战略价值的领域，从而在不损及对意大利经济整体把控的基础上筹集到所需的资金。如此，我们的任何发展环节都不会被忽视，而所筹集的资金也能被精确地投放到最关键的领域之中。"
 ita_seeling_spree:9 "大卖特卖"
 ita_seeling_spree_desc:0 "历经多年沉淀，意大利已稳固筑建起庞大的公共部门架构，这一体系曾为国家带来显著的利益，推动了国家的发展。不可否认，意大利经济在第一次世界大战后的复苏以及民众生活水平的普遍提升都得益于法团主义的成功实践。然而，新的挑战已经到来。为了筹措必要的资金，我们计划对大规模的公共部门进行私有化，以期能迅速且便捷地筹集到所需资金。\n\n私有化进程如履薄冰，需要精心策划与谨慎行事。同时，我们必须坚守一个原则：意大利的经济主动脉必须由国内企业稳稳把控。在确保这一点之后，我们就应勇往直前。从长远视角来看，固守陈规或过分强调某种意识形态只会成为我们的绊脚。公共部门的机构臃肿、人员冗余，高昂的公务员管理费用和由此滋生的惰性，都是我们必须面对的现实。我们必须迅速果断地采取行动。在未来的岁月里，意大利人民必然会感激我们的高瞻远瞩。"
 ita_reinvest_the_cash:0 "现金再投资"
 ita_reinvest_the_cash_desc:0 "我们已积累了丰厚的财富，财政部官员们因此如沐春风。接下来最令人期待的环节即将揭晓：如何精妙地运用这笔巨款。幸运的是，我们的领袖斯科尔扎目光如炬，已为我们指明了最明智的投资方向。我们将资金投向军事科研的深化、平叛行动的推进以及稳固意大利帝国的殖民地之中。\n\n此策略不仅彰显了领袖的卓越才智，更巧妙地将意大利的军事、经济和外交政策融为一体。借此举措，我们将全面提升这些核心领域的综合实力。对军事领域的进一步投入，将使我们的军队再次展现往日风采，跻身全球军事强国之列，赢得世界的瞩目。在维护帝国安宁的同时，我们也将为国家的稳定和经济的繁荣打下坚实的基础，而这一切的根基在于彻底消除所有潜在的安全隐患。在外交舞台上，这笔投资无疑将为我们的谈判增添重要的砝码，无论面对任何合作伙伴，我们都能应对自如。展望未来，前途确实一片光明。"
 ita_open_up_suez:0 "开放苏伊士运河"
 ita_open_up_suez_desc:0 "苏伊士运河的战略、商业重要性怎么强调都不为过。通过与埃及王国多年来的“合作”，运河成为意大利的长期资产，只要领袖一句话，随时开放关闭。既然我们希望在外交政策中更多地考虑经济，便会放宽苏伊士运河运输货物与原材料的限制。但我们会以意大利人的方式行事。\n\n开放苏伊士运河会给整个地中海经济带来立竿见影的好处，增加的贸易量、交通流量将间接惠及我国的建筑业、旅游业和航运业，更不用说那些终于可在运河通行运输的国家了。如果必须为此支付令人瞠目的关税，他们还是会照做不误的。毕竟，另一种选择是绕着非洲大陆航行，或用板条箱拖着货物穿越阿拉伯沙漠。不如忍气吞声，走意大利人的通道，遵从意大利人的方式！"
 ita_unequal_trade_treaties:0 "不平等贸易条约"
 ita_unequal_trade_treaties_desc:0 "我们与意大利势力圈内的国家已缔结了深厚的联系，这些纽带坚如磐石。然而，合作的天地仍旧辽阔无垠。我们倡议在更为宽广的基石上，正式签署一份贸易条约，这份条约将包罗意大利及其影响范围内所有可能的交流领域，从而保障意大利企业在追寻宏伟蓝图时畅通无阻。\n\n故而，在条约深化的征途上，我们将着眼于细微之处。倘若意大利企业有意将产品回流至国内市场，那么“出口限制”或“国家主权”等琐碎桎梏绝不应成为其绊脚石。若企业渴望让员工多多加班，则不应受到任何形式的审查阻挠。若企业不幸与工会组织者狭路相逢，我们将积极与东道国政府磋商，申明其有责任遏制工会。如此一来，意大利企业在该领域的业务将不仅获得发展，更会如日中天。往昔的条约或许只是纸上谈兵，空谈平等与对等，然而这些微不足道的束缚终将烟消云散。"
 ita_pecunia_non_olet:0 "钱无臭味"
 ita_pecunia_non_olet_desc:0 "贸易本质是利益交换。我国黑色与灰色产业中蕴藏着无尽的潜力和待挖掘的商机，若欲使意大利屹立于全球经济之巅，我们就必须敏锐捕捉这些商机。黑市贸易的庞大规模涵盖了走私消费品、武器、毒品乃至人口贩卖，其正是意大利人民智慧的结晶。并且我们的执法力量还有更重要的职责需要担当。因此，我们应指引警方将反走私的力量转移到更加紧要的战线上去。\n\n新的放任策略在初期或许会引起争议，尤其是在那些长期与地下市场交锋的官僚和警察中。但时间会平息一切疑虑。在意大利的版图中，黑手党早已洞悉了利益交换的奥秘。而对非法贸易的宽容，其积极影响并非遥不可及。那些灰色地带的商人们必将心怀感激。当他们向当地的法西斯政权表达敬意时，当他们决定向当地的法西斯当局表达谢意时，我们便可顺势为官僚与警察提供一份额外的非正式津贴，切勿让道德的束缚阻碍了我们的伟大征程。"
 ita_keep_cost_low:0 "压低开支"
 ita_keep_cost_low_desc:0 "出口导向型经济增长的核心在于竞争力，而竞争力的基石则是成本控制。然而，由于前任领袖的放任，一些本应随共产主义游击队被埋葬的陈旧观念死灰复燃，如工人权利、集体谈判和罢工等，这些都只会徒增成本，无益于效率提升。我们绝不能让这些颠覆性的观念在意大利重新抬头。\n\n解决方案虽简单粗暴，却行之有效。我们鼓励警方积极介入，严厉打击工人中的任何颠覆活动，将叛乱的苗头扼杀在摇篮之中。工人们必须认清，“最低工资”和“安全标准”这类诉求与他们的本职工作无关。若有不明事理者，警方将采取强硬手段，直至其认清现实。此举还能产生额外的震慑效果，使工人在生活的其他方面也不敢轻举妄动。毕竟，一支心怀敬畏，纪律严明的劳工大军才能创造出最高的生产效率。"
 ita_ouvertures_to_the_pakt:0 "示好团结协定"
 ita_ouvertures_to_the_pakt_desc:0 "意德关系波澜起伏，但不得妨碍经济。经济，就该以务实的态度与各大国打交道，这是我国的一贯作风。外交纠纷、国内对德的畏惧，绝不可成为合作的绊脚石。领袖也赞同与资源雄厚、市场广阔的团结协定达成某些协议。\n\n现在只要考虑如何延续双边贸易。大企业或许官僚气息浓厚，对创新心怀抵触，但如果用好垄断之力，那好处也不容小觑。与团结协定进行正式与非正式的多轮接触，与大日耳曼国的官员民企构筑联系，就能探到双边互利共赢的领域。何况德国也想要经济再铸辉煌，那面对南方邻国递来的橄榄枝，心有不甘，也不会视而不见。"
 ita_under_the_carpet:0 "地毯之下"
 ita_under_the_carpet_desc:0 "在这个时代，构建稳固的经济体系纷繁复杂，它涉及海量的统计数据，涵盖收入和支出的详尽记录。然而，我们的领袖以及他所信赖的人们需要从国库中获取资金支持。这关乎国家安全，自然不能让官僚和经济学家的繁琐审查威胁到资金的流动。\n\n所幸的是，这些问题都能迎刃而解。财政部内有大批国家法西斯党的忠诚信徒，对于领袖设立专项资金的请求，他们定会言听计从，绝不质疑。只需对国家预算稍作调整，虚报一些国家开支，再对某些文件进行“保密处理”，领袖便能轻松掌控一笔可观的资金，仅供其与亲信共享。至于资金的具体用途则无足轻重。关键在于领袖在引领意大利走向辉煌之后，若想尽情享受人生的乐趣，便有充足的资金作为后盾。而那些不慎窥见机密的会计师，倘若不能自觉噤声，我们也自有办法让他永远沉默。"
