 ITA_patria_e_leader:0 "祖国-领袖"
 ITA_only_party:0 "唯一的党"
 ITA_Il_richiamo_della_patria:0 "祖国的呼唤"
 ITA_traditore:0 "烟中硕鼠"
 ITA_patria_e_leader_desc:0 "1922年国家法西斯党的上台将伟大的祖国意大利走上富强的现代化，伟大的党的领袖墨索里尼带领我们把英法手中的地中海和殖民地重新夺了回来，在德国公然背叛我们的时候，也是党和领袖领导国家自力更生，将意大利的军事和工业领先于其他大国\n如果意大利没有国家法西斯党的领导，没有党的历任杰出领袖，意大利就没有今天这般繁荣\n\n因此，只要是作为一名意大利人，或者是在意大利领导下的殖民地，无一例外都将爱戴和赞美祖国和领袖"
 ITA_only_party_desc:0 "80年的历史印证了国家法西斯的一点，也是不可质疑的一点:只有国家法西斯党才能引导意大利，只有国家法西斯党才能适应意大利。自由主义和共产主义只会把意大利人民带入堕落腐朽，意大利人民只有在国家法西斯党的领导下才能重新夺回以前光荣的历史"
 ITA_Il_richiamo_della_patria_desc:0 "意大利的军队如雄鹰一般守护着国家和各总督领,我们的海军有着雄厚的资金和强大的实力，将地中海视为我们的囊中之物，将妄图把地中海从我们手中，哪怕有一点非分之想的敌人赶出此地。\n\n我们的陆军是各地选拔出来的精英代表，充分适应各地环境，即使是海外的总督领，我们也会让当地的原住民形成一支军队，以免殖民地受到危险时刻\n毫无例外的，他们都受到国家法西斯党的领导，即使敌人占领了此地，他们也绝不会屈服"
 ITA_traditore_desc:0 "国家如同家庭，再怎么美好也有点鸡毛蒜皮的小事，我们的政府中也有些老鼠，影响着国家发展，目前来讲影响不大，但是如果我们继续放任不管，恐怕会造成更大的损失…"

