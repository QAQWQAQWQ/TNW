 scorzaoil.38.t:0 "纳赛尔没被抛弃"
 scorzaoil.38.d:0 ""
 scorzaoil.38.a:0 "是。"
 scorzaoil.39.t:0 "与费萨尔交谈"
 scorzaoil.39.d:0 "费萨尔·本·阿卜杜勒-阿齐兹·沙特，已荣登我们心中阿拉伯王位的不二人选。这位亲王，现实主义者的典范，对友以礼，对敌以疑，深得我们青睐。与费萨尔的会晤，将为中东未来数十年的秩序定下基调。虽然界线与势力范围的持久性难以保证，甚至短期内都充满变数。但若能借此为双方赢得时间，共同构筑一个互利的新秩序，那无疑是极好的。尤为关键的是，费萨尔深知，此会之后，他的宏图大志将与我们在石油危机中的兴衰息息相关。相互依存，无疑可以成为和平的坚固纽带。"
 scorzaoil.39.a:0 "需缔君子之盟。"
 scorzaoil.40.t:0 "与库特布断联"
 scorzaoil.40.d:0 "沙地上，我们与沙特划界，换来了他们对昔日附庸国的关键让步。埃及穆斯林兄弟会的杰出领袖赛义德·库特布，曾获得沙特的大力支持。然而，如今沙特却背弃了他，这无疑将重创他在埃及的势力及其抵抗领袖的威望。昔日盟友的离弃，对库特布而言，是一记沉重打击。然而，此事亦当成为警钟——在地缘政治与石油利益的较量中，理想主义无处藏身。"
 scorzaoil.40.a:0 "犹如离水之鱼。"
 scorzaoil.41.t:0 "意大利援助"
 scorzaoil.41.d:0 ""
 scorzaoil.41.a:0 "是。"
 scorzaoil.42.t:0 "意大利援助"
 scorzaoil.42.d:0 ""
 scorzaoil.42.a:0 "是。"
 scorzaoil.43.t:0 "意大利援助"
 scorzaoil.43.d:0 ""
 scorzaoil.43.a:0 "是。"
 scorzaoil.50.t:0 "德国入侵！"
 scorzaoil.50.d:0 "我们最可怕的噩梦成真！随着德国战争机器对石油的渴求，元首的贪婪已经压倒了人之常识。就在几个小时前，德国军队越过边境进入意大利领土。德国军队已经逼近阿尔卑斯山上的第一批意大利边境城镇，世界上最强大的超级大国之一将全部力量向意大利袭来。上帝保佑我们所有人……"
 scorzaoil.50.a:0 "把他们赶回去，该死！"
 scorzaoil.51.t:0 "向世界呼吁"
 scorzaoil.51.d:0 "意大利帝国如今风雨飘摇，大日耳曼国，这架史无前例的战争巨兽，正向她的国土步步紧逼。一旦敌军跨越了阿尔卑斯山的天然屏障，我们的帝国及其工业命脉将尽数落入这无情的吞噬者之手。\n\n此刻，我们须向世界发出紧急呼吁。我们要向全球宣告：大日耳曼国必须在阿尔卑斯山的坚壁前止步，否则它将无休止地扩张，直至将整个世界吞噬殆尽。我们必须向每一个能联络的国家求援，向每一个能触及的人求助。形势岌岌可危，但每一份援助都是宝贵的，它们为我们点燃了一线希望，让我们有力量共克时艰。"
 scorzaoil.51.a:0 "我们无法独自阻挡他们"
 scorzaoil.52.t:0 "意大利正遭受入侵！"
 scorzaoil.52.d:0 "几十年前，意大利曾与德国并肩作战，对抗美国，最终德国取得了惊人的胜利。\n\n然而，时移世易，如今德国的统一战线全力压境，意大利军队陷入四面楚歌之境，不得不向旧日对手求助。\n尽管美国再次介入欧洲的行动遭到了零星的抗议，但我们不能忽视德国突袭一个占据战略要地的友好邻邦的事实。五角大楼已制定应急计划，准备向意大利伸出援手，只待总统一声令下。"
 scorzaoil.52.a:0 "肯尼迪行动，启程！援助已在路上。"
 scorzaoil.52.b:0 "我们不会再次卷入欧洲的泥潭！停止援助。"
 scorzaoil.53.t:0 "意大利寻求共荣圈援助！"
 scorzaoil.53.d:0 "It was only a scant few decades ago that Italy, Japan and the German Reich fought alongside each other against the allies\nWhat goodwill remained from this axis on the German side is now truly dead, however. The Germans have crossed into Italian territory looking to annex its valuable territory. Italy has sent us an impassioned request for aid, citing the ties between the two countries and warning that, should the Germans take Italy, it would open up the Suez Canal and with it the gate to the whole Pacific up for the Germans. While some claim that stretching ourselves halfway round the world to Europe risks overstretching our resources, the consequences should the Germans might be more dire dire still..."
 scorzaoil.53.a:0 "一方有难，八方支援。让我们送去援助"
 scorzaoil.53.b:0 "We will not sacrifice the East for the sake of the West. Cancel the help."
 scorzaoil.54.t:0 "没有回头路"
 scorzaoil.54.d:0 "We have been pushed too far, and few options remain. It is to avoid situations such as the one we find ourselves in that Italy became a nuclear power, taking upon itself not only the power to kill millions of people in one act of lunatic fury. Many of our most hawkish advisors recoil, even now, at the idea of using the nuclear bomb against our enemy. They warn of the nuclear winter that will engulf all of Europe, and the world - of the inevitable retaliation - of the tit for tat which will destroy humanity forever, until the survivors share the world only with the cockroaches. Do we have it in us to inflict an apocalyptic weapon on the world?"
 scorzaoil.54.a:0 "向德国投掷炸弹。"
 scorzaoil.54.b:0 "We cannot take this step."
 ita_clash_of_the_axis:0 "轴心国之战"
 ita_clash_of_the_axis_desc:0 "噩梦重临。\n\n德意志第二次背弃了我们。\n\n其实自施佩尔赢得内战那日起，我们便知晓其主子必将以蛮力达成阴谋与诅咒大坝未竟之事。我们目睹德军陈兵边境，机场集结的战机规模堪比往昔大战。\n\n而我们早有准备。\n\n皇家陆军全面警戒，阿尔卑斯山地军扼守群峰，皇家空军整装待发，皇家海军将击沉任何威胁“我们的海”的潜艇。当硝烟与鲜血染红天际，我们怀着对败北后果的清醒认知踏入战场。\n\n意大利同胞！集结在三色旗下！\n\n我们正与最强大的宿敌展开终极对决！日耳曼人屡次妄图征服我们：条顿人、马科曼尼人、巴巴罗萨、奥地利人——每次都被我们打得灰头土脸滚回冰封老巢！最后一次，向炼狱进军！"
 ita_labour_will_win_the_war:0 "Labour Will Win The War"
 ita_labour_will_win_the_war_desc:0 "If there's something we learned from two World Wars, is that the true battle is fought in the factories: if our industry can't keep up we'll lose, first ground, and then the war: we can't produce more men, but we can produce more equipment.\n\nMuch more equipment!\n\nWe will convert all nonessential factories into military production facilities, and many more shall rise! Chimneys will crowd the skies, and smoke shall darken the air as we bend nature itself into a weapon against the Germans!\n\nTo the factories, proud workers of Italy! Our destiny lies on the production line! Those traitors shall be crushed under the wheels of our industry, their pride and their arrogance shall burn in the fires of our forges, and their very hopes and dreams shall drown in a sea of molten metal!"
 ITA_scorza_victory_through_labour:0 "由劳动夺取胜利"
 ita_working_overtime:0 "加班加点"
 ita_working_overtime_desc:0 "The war is raging on, and still we need more equipment: even though we have built as many production plants as we possibly could fit in our safe locations, our production capabilities are stretched to the limit.\n\nStill, we can't give up now!\n\nEffective immediately, all work shifts are increased by two hours: it is a sad decision we have to enforce, but the efforts of all the men and women toiling in the factories and production lines will be handsomely rewarded after our victory! One last effort, proud workers of our beloved Italy: this is our last battle before the end!"
 ITA_vtl_work_harder:0 "§O牺牲稳定度换取更高的工厂产出§!"
 ita_harsh_quotas:0 "苛刻配额"
 ita_harsh_quotas_desc:0 "More! We need to produce more! Every plane lost is a piece of our skies ceded to the enemy, every ship sunk is a piece of Mare Nostrum left to the Kriegsmarine, and every tank destroyed is a battle at risk of being lost: sad as it may appear, we have ordered all our military industrial facilities to increase their production quotas, no matter how. We know we are asking much from the workers, who are already working until their backs break, but the only other option is defeat, and a life in slavery to the Germans. What do you prefer?"
 ita_workplace_livability:0 "Workplace Livability"
 ita_workplace_livability_desc:0 "Our workers are giving so much for Italy, we should reward them with what little we can spare: as many work in difficult unsanitary conditions, we should ensure they can at least eat as much as they need to not be malnourished, and take their rest on comfortable chairs rather than falling exhausted to the floor. It may seem trivial, and a meagre reward for their sweat and toil, but this is all we can give: please, accept it for now, and keep working! Keep fighting! For Italy's freedom, and our children's future!"
 ita_good_nights_sleep:0 "安稳睡眠"
 ita_good_nights_sleep_desc:0 "As many workers live far from the production sites, we have ordered the construction of worker barracks in secure locations near the factories, furnished with everything we can spare for our brave workers. It may not be enough to call it \"homely\", but at least the exhausted workers won't have to walk for hours before coming home, and will be able to have a good sleep before they resume working. It's sad that we have to ask those men to leave their families behind and have their lives revolve around work, but we wouldn't ask them such sacrifices if it weren't our last hope for victory!"
 ITA_vtl_work_better:0 "§G提高工业效率与稳定度§!"
 ita_be_on_schedule:0 "准时准点"
 ita_be_on_schedule_desc:0 "每时、每分、甚至每秒钟的工作都至关重要！全体工人必须按时完成配额指标——超额达标者将荣膺“劳动英雄”称号！待战争结束，这些男女工人将能直面伤痕累累的老兵，自豪宣告：“我同样在另一条战线上为意大利而战！与你一样直面挑战、历经艰辛！”\n\n我们的工业必将满足物资需求。\n\n必须做到。"
 ita_energized_for_italy:0 "Energized For Italy"
 ita_energized_for_italy_desc:0 "Our industrial output is skyrocketing, which is great, but as a predictable consequence, the need for electricity is more than ever, and that is far from good: if our lines go on blackout, our industries will cease functioning, and we might lose hours, or even days of production! As such, we will build new electric plants of all kinds throughout the Empire: coal plants, oil plants, hydroelectric dams, even solar panels if we need to! Nature gives us life and power, and it will bring death to the Germans!"
 ita_do_a_good_turn:0 "但行好事"
 ita_do_a_good_turn_desc:0 "德国佬的入侵迫使我们采取诸多非常手段——尽管某些人或许会为此喝彩。随着所有适龄男子奔赴前线，我国多年来收押的各类囚犯（刑事犯与政治犯）已无人看管。\n\n因此我们不得不含痛释放部分囚犯并缩短其他囚犯刑期。即便十恶不赦的杀人犯与堕落的反法西斯分子，也将获得自由、一周口粮与直达前线的免费车票。\n\n囚犯虽非天生战士，但望其感念我等仁慈，须知德意志野兽断无此等宽容。退一万步，待其战死沙场，腾空的牢房正好用来关押肮脏德国佬。"
 ita_call_to_the_world:0 "呼吁世界"
 ita_call_to_the_world_desc:0 "世人曾冷眼旁观德军坦克碾过匈牙利平原、穿越瑞士群山、横跨冰封的瑞典与俄罗斯荒原。尽管各国信誓旦旦要阻止德意志之敌，却始终袖手旁观。\n\n无论出于怠惰或怯懦，我们都必须让全球诸国明白：此等行径永不可再现。意大利是人类击败德寇最后且最大的希望，理当获得相应支持。无论志愿军、坦克、步枪、情报抑或粮食，我们将笑纳世界馈赠，并索取更多。毕竟，若任由匈人铁蹄践踏罗马，又有何物能阻挡其随后进军华盛顿与东京？"
 ita_foreign_support:0 "寻求国外援助"
 ita_foreign_support_desc:0 "The conceptual notion of Fascism won many supporters around the world. The implementation of that notion however, has been rather...less...popular. Nonetheless, there remain plenty of Fascists spread across the East and West alike. Redshirts, Silvershirts, white shirts, blue shirts. All will travel to defend the last bastion of the people's revolution against the German menace when called upon.\n\nAnd even those who have not seen the light of the National Revolution will understand that it is all that stands between them and oblivion. In this time of great need, we will take even democrats, even Communists, willing to support Italy in its greatest struggle.\n\n"
 ita_regia_marina_connection:0 "皇家海军关系"
 ita_regia_marina_connection_desc:0 "While the bold leadership of Il Duce Carlo Scorza has won many enemies who envy its prowess and strength, it has won some respectful friends as well. Our navy, the Regia Marina in particular has plenty of foreign contacts that will come in useful during this dark time.\n\nIf we can leverage these contacts effectively, the shis will soon come in their hundreds and thousands, bearing the supplies and weaponry that we so desperately need. Fleets from all across the world will bring us the tools we need, and upon their sails and smokestacks we will build our victory."
 ita_control_the_skies_more:0 "统治天空"
 ita_control_the_skies_more_desc:0 "若失制空权，则万事皆休。\n\n德国空军作为全球规模最大、战力最强的空中力量，实乃可怖之敌——任其肆意空袭，必将摧毁我国工业，以地毯式轰炸与恐怖打击令意大利屈膝！\n\n为此，皇家空军将获增拨资金，专注于战机革新与产能提升。同时组建专职防空地面支援部队，配备固定与机动防空武器，在战斗机与截击机迎战敌机时，确保领空免受轰炸机侵扰。"
 ita_men_will_win_the_war:0 "人定胜负"
 ita_men_will_win_the_war_desc:0 "The German army is larger than ours, especially since those fools started a policy of indiscriminate conscription: we don't need spies to see the young - too young - faces under bloodied scarves and their small bodies awkwardly fitted in uniforms way too big for them... Not even our most hardened veterans or most loyal officers can hold back their tears when the lightless eyes staring at them from dead faces resemble so much the children they left at home.\n\nWhile this strategy will bring them down in the long run, we can't deny its cruel efficiency: our men are being slowly but steadily drowned in bodies, and not even the most advanced machine-guns can keep up with the numbers they are facing: our lines falter, and soon they will break...\n\nWith the need of soldiers greater than ever, the General Staff has issued the order to fully mobilise our last reserves, and form volunteer units from men with already some experience in handling firearms: with a few weeks of basic training, they should be able to properly support our army in what, with every passing day, is starting to look less like a war, and more like a senseless massacre."
 ITA_scorza_victory_through_men:0 "由士兵夺取胜利"
 ita_enact_a_hard_draft:0 "立法征兵"
 ita_enact_a_hard_draft_desc:0 "We don't have enough men! While the army is holding the line, the front is too large, and our forces, even with reinforcements from the colonies and our allies, are stretched thin, perhaps too thin: should the enemies force their way through our defensive positions, we won't be able to stop them before they encircle us...\n\nTherefore, effective immediately, a draft has been approved: all able-bodied men without a job, or performing non-essential tasks, will be required to join the army and defend their country!\n\nIt's not a decision we take lightly, as drafts are the first step towards more drastic measures, and eventual uprisings, but we desperately need to hold the line until the Germans bleed themselves dry against our mountains and fortifications..."
 ita_enact_a_hard_draft_tt:0 "§G这将增加我国的人力储备。§!"
 ita_where_were_you:0 "你去哪了？"
 ita_where_were_you_desc:0 "Italiani! Dove eravate? Where were you, when the traitors pushed for the Alps, like Hannibal and the barbaric hordes did millennia ago? I know it! You were with the Alpini, when they pushed the enemy back from the mountain tops, and the pure snow of the Dolomiti became red with German blood!\n\nWhere were you, when the Luftwaffe contested our skies? I know it! You were with the Regia Aeronautica, when they drilled holes in the fields of Italy with all the Stukas they shot down!\n\nWhere were you when our troops finally entered Germania? I know it! You were the one who hoisted the Tricolour atop the Volkshalle!\n\nEnlist now, and help fight the traitors!"
 ita_on_the_ground_street:0 "街头巷尾"
 ita_on_the_ground_street_desc:0 "The war grinds on, and it is as if Italy is slowly draining. Pubs and restaurants, once full of cheerful patrons now sit empty day and night. The dance halls and parks are devoid of life, and the streets are populated only by birds and drifting bits of garbage.\n\nBut we cannot stop. There can be no surrender, no turning back. Whatever few remain must be sent to the front immediately. Whatever drops of blood the Italian homeland has to spill must be spilled.\n\nShould the day come when the Germans walk freely along the streets of Rome, through the fields of Napoli and along the proud hills of Sicily, it will be only becaue they fought their way through every Man, Women, and Child Italy had to offer. If they rule our land, it will be as a burnt ruin, bathed in blood."
 ita_beyond_the_battlefield:0 "战场之外"
 ita_beyond_the_battlefield_desc:0 "当我们的英勇士兵在战场浴血奋战时，另一些男女正于战线之外直面同等危险：在隐秘房间、暗巷与废弃仓库中，我方特工正与德国军事情报局阿勃维尔殊死搏斗，只为窃取德军武装力量的每一处细节。\n\n兵力规模、部队编成、技术突破、补给线路乃至军工产能——这些情报对我们制定下一步战略至关重要。因此，我们必须为军事情报局提供充足资金，使其能在同层级对抗中与德国情报机构周旋。"
 ita_beyond_the_battlefield_tt:0 "§G这将提升我方情报机构等级。§!"
 ita_enter_the_rks:0 "走进专员辖区"
 ita_enter_the_rks_desc:0 "As our army finally passes to the offensive, we enter a land foreign like no other: each Reichskommissariat is a dark realm of its own, shaped by the twisted mind of its kommissar, but all of them are hellish in appearance, and extremely dangerous. The landscape is dotted with prison camps, slave barracks and mass graves, and in the dark, the Werewolf guerrillas wait for us to turn our backs to them so that they can strike!\n\nHowever, from danger comes opportunity.\n\nMany resistance movements and partisan groups have declared their support for us, as long as we promise to free their land after the war is over: they will sabotage enemy supply lines, remove important targets, and share with us their knowledge of the land and any enemy intelligence they can gather. With this help, our troops will surely fight much better against the enemy!"
 ita_enter_the_rks_tt:0 "§GThis will increase our attack and reinforce rate.§!"
 ita_hit_em_quick_out_fast:0 "速战速决"
 ita_hit_em_quick_out_fast_desc:0 "The German war machine is mighty, but no longer as flexible as it used to be during the last war. Their increasing reliance on drafted soldiers rather than professionals ensures that their chain of command is slow to react to sudden emergencies, something which we intend to exploit to the fullest.\n\nOur elite divisions will be equipped with the most modern vehicles at our disposal, and conduct surgical strikes on enemy positions, only to escape as soon as the enemy calls for reinforcements. While such a strategy is costly in supplies, the damage we'll deal to the foe will be multiplied tenfolds!"
 ita_hit_em_quick_out_fast_tt:0 "§GThis will increase our speed and supply consumption.§!"
 ita_be_prepared:0 "做好准备"
 ita_be_prepared_desc:0 "尽管部分将领力主大胆进攻，我们绝不能低估敌人的真实威胁。德军素以雷霆攻势摧垮对手反应能力著称——对此我们心知肚明，毕竟曾是他们的盟友。\n\n而今，我们必须抵御这般战术。\n\n部队将获得最大限度的防护：无论战线推移进退，工兵部队都将配备必要物资快速构筑野战工事，重点部署反坦克武器抵御其精锐装甲师，同时配置机动防空阵地防范德国空军空袭。"
 ita_be_prepared_tt:0 "§G这将提升我军最大战壕上限加成与挖掘速度。§!"
 ita_through_hell_and_back:0 "归自地狱"
 ita_through_hell_and_back_desc:0 ""
 ita_back_to_hell:0 "§R回归地狱§!"
 ita_back_to_hell_desc:0 "最终抉择的时刻已然降临。\n\n战争不会自行终结——只要那些蠢货拒绝听从理性，就永无宁日。既然如此，或许该让他们听听与理性截然不同的声音！\n\n当他们将时间浪费在笨重迟缓的坦克与其他畸形兵器时，我们明智地调配了资源：历经多年研究与失败实验，意大利终成拥核国家——若非所谓“盟友”的顽固阻挠，这本该是早该实现的宿命。\n\n明日，一架独一无二、经过深度改装的隐形轰炸机将执行单程任务，直飞日耳曼尼亚，将它的馈赠精准投送至人民宫穹顶。这份厚礼，承载着我们对德国过去十年“厚谊”的由衷感谢：感谢直布罗陀大坝，感谢经年累月的暗箭与对峙，更感谢这场荒谬战争夺走的数万亡魂！\n\n明日，战争终将落幕，无论以何种方式……"
 ita_back_to_hell_tt:0 "§Y我们还有最后手段对付德国人。§!§R愿上帝宽恕我们。§!"
 ITAgoodboyecon:0 "我们采用了改革派经济政策。"
 ITAmehboyecon:0 "我们采用了折中的经济政策。"
 ITAbadboyecon:0 "我们采用了保守派经济政策。"
 ita_the_new_charter_of_labor:0 "新劳工宪章"
 ita_the_new_charter_of_labor_desc:0 "劳资之间的僵局已使国家步履维艰，充斥腐败。1927年的《劳动宪章》赋予了工业家们过大的自由，他们便借此机会为所欲为。他们曾自信满满，既然国家容许他们作为独立个体存续，便能无惧后果地执行有损国家利益的政策。然而，他们的想法大错特错。\n\n斯科尔扎领袖对于那些享受着国家资源和支持，却对那些辛勤工作的人毫无回报的人，已忍无可忍。我们必须对《劳动宪章》进行更新，以羁勒贪婪之资本。那些为国捐躯、尽心尽力者，应得其应有之报偿。"
 ita_the_new_charter_of_labor_tt:0 "§G我们将彻底改革我们的经济。§!"
 ita_The_ABC_of_economics:0 "经济ABC"
 ita_The_ABC_of_economics_desc:0 "我们寻求全面的经济革命，既非社会主义也非共产主义，而是属于我们真正的法西斯革命！有许多事情要做，若想先发制人阻止继续剥削大众的资本家来打击报复，我们就必须要快。向拟推行的多种大方向改革细分，领袖已仔细考虑了每项小的改革提议。\n\n工时可以缩短一点，但这可能会给工人工资造成损失……除非我们增加每工时的酬金。这可能会起作用，它将不仅仅改善工人的工作环境，还会给更多人腾出更多工作岗位来建设国家。精彩的计划！所谓的经济专家们装腔作势，对改善劳工处境的困难喋喋不休、胡说八道，而领袖的超人智慧狠狠羞辱了这帮“经济学家”。"
 ITA_scorza_abc_economics:0 "经济ABC"
 abc_of_economy_improve_tt:0 "§G国家精神经济ABC的效果将会提高！§!"
 ita_dismantle_the_tax_system:0 "废除税收制度"
 ita_dismantle_the_tax_system_desc:0 "人们自然会认为他疯了。毕竟如此破天荒之策，足以令罗马最铁杆的盟友也瞠目结舌。废除税收体系，那班墨守成规的官僚与会计怎会想到？他们固步自封，不思变革。他们以为，只因为体制已成习惯，便认定它是毋庸置疑的真理。斯科尔扎却从未被此等陈规所限，不论是法西斯初露锋芒之时，还是今日。\n\n究竟是什么让勤劳之人无法将血汗钱再注国家经济之脉？是税收。但鲜有人敢于跨出这一步，大胆宣称这些束缚实为多余。卡洛·斯科尔扎却无此犹豫，他勇于破旧立新。"
 ita_government_covered_expenses:0 "弥补政府开支"
 ita_government_covered_expenses_desc:0 "会计们忧心忡忡，在砍掉税收收入之后，我们的资金即将耗尽，难以继续资助项目。尽管如此，我们也不能在此时重新征收税款，因此必须另寻他法来筹资。目前，我们或许只能依靠增发货币，作为权宜之计，直至觅得更为稳固的长期财源。这一措施或许会导致通货膨胀急剧上升，但长痛不如短痛，直面困境胜于自欺欺人。而且，又有谁会对安全网计划令通胀略增，或者为了资助农民而多印一些钞票提出抱怨呢？"
 ita_liquid_control:0 "控制流动"
 ita_liquid_control_desc:0 "目前，我们的主要财路已被暂时切断，因而为了确保经济稳健，现金流的畅通无阻变得尤为关键。在帝国的广袤土地上，每天都有里拉在数以百万计的交易中流转。若能善用这些交易中潜藏的力量，我们便能如提线木偶般，巧妙地操纵经济。故此，我们须让经济学家深入研究，寻找增强对消费者购买倾向直接影响力的途径。"
 ita_alternative_methods:0 "替代方法"
 ita_alternative_methods_desc:0 "税收并非政府增收的独木桥。若税收之水不再涌入国库，我们大可另辟蹊径，以他法作为增收的主力，而非仅作权宜之计。\n\n若我们顺利实现了对经济领域的全面掌控，便能通过国内外贸易及销售国有企业产品，来弥补税收的空缺。即便税收不存，我们也未必不能从民众那里以其他方式筹集资金。"
 ita_reform_the_banks:0 "改革银行"
 ita_reform_the_banks_desc:0 "银行，理应成为国家与百姓辛勤汗水结晶的守护者。然而，它们却屡屡辜负了这份沉甸甸的信任。正如经济体系中的其他部门一样，银行同样需要被审慎检视，并在必要时加以整顿。\n\n让银行与国家政策同步，势在必行。历史是一面镜子，它告诉我们，一旦对那些手握巨资的机构放任自流，资本主义的痼疾便会悄然滋生，露出其狰狞面目。"
 ita_financial_intermediaries:0 "金融媒介"
 ita_financial_intermediaries_desc:0 "现代经济体的运作离不开银行等中介机构在货币流转中的关键作用，这一点毋庸置疑。然而，这些机构的运作方式却引发了争议，尤其是它们所掌握的巨大影响力。意大利曾尝试放手让银行自主运作，却以失败告终。银行高管们手握重金，却因一己私利导致决策失误，让全社会为之买单。这种因少数人的贪婪和失职而引发的连锁反应现象，我们绝不能坐视不管。如今，银行已成为国家的，它们必须听从指令，按需行动，为国家和人民服务。当国家召唤，它们将义不容辞，挺身而出。"
 ita_bolster_commerical_exchange:0 "鼓励商务交易"
 ita_bolster_commerical_exchange_desc:0 "我们废除那些无用的税收体系，本意是为了让人民能够更好地掌控自己的财富，避免它们成为贪婪资本家手中的玩物，用以支持那些无益的项目。我们改革的每一步，都是旨在构建一个将人民和国家的利益放在最前沿的体系。然而，税收的取消也让政府面临了前所未有的挑战。如今，我们比任何时候都更加依赖于人民的消费支出。若人民不消费，我们的计划便会功亏一篑，这是我们所不能容忍的。于是，我们提出了对累积资本征收特别税的提议，以此激发市场的持续活力。这或许显得有些自相矛盾，但为了迎接即将到来的经济春天，这点代价微不足道。"
 ita_abc_financial_collapse_tt:0 "§R经济面临全面崩溃§!。"
 ita_cooperation_and_evolution:0 "合作与进化"
 ita_cooperation_and_evolution_desc:0 "国家兴衰，系于工人之手；工人福祉，依于国家之强。二者本应唇齿相依，共生共荣。斯科尔扎领袖怀着一个梦想，愿意大利成为工人之庇护所，工人亦以国为傲，甘为国家之栋梁。然而，无论是墨索里尼还是齐亚诺，两位前领袖都未能实现这一理想。但在新思想的引领下，意大利有望迎来其命定之繁荣。\n\n如果我们把国家与资本家的关系比作宿主与寄生虫，那么国家与工人的关系则更像是一种和谐的共生。双方在互惠互利中共同兴旺，在相互背离中共同衰退。我们若能有所作为，就应当共同追求提高效率，致力于增进人民的福祉——这是我们力量的源泉。"
 ITA_scorza_meritocracy:0 "真正的优绩制"
 ita_meritocracy_improve_tt:0 "§G国家精神真正的英才管理的效果将会提高§!"
 ita_occupy_the_factories:0 "占领工厂"
 ita_occupy_the_factories_desc:0 "这些工厂老板，实为西装革履的合法黑帮头目，他们毫不留情地剥削着意大利同胞的辛勤汗水，毫无愧色，只为一己私欲，眼中只有个人腰包。他们并未创造任何价值，他们所谓的努力也没有创造出国家所需的产品。国家所需的产品，全赖那些被他们忽视的工人的辛勤付出。这并非真正的法西斯主义，而是一种扭曲的堕落。现在，是时候结束这一切了。\n\n这些人在旧体制下养尊处优，变得自满自大，再也不会有这样的事情发生了。他们认为自己有权拥有国家的重要机构，但他们错了。这些工厂是作为特权赋予他们的，而特权是可以被撤销的。军队将收回那些忘恩负义者所占有的宝贵工厂。"
 ita_reform_the_OND:0 "改革OND"
 ita_reform_the_OND_desc:0 "何人敢言不犒赏那些为国之强盛而竭尽心力之人？共产主义者和社会主义者常以辛勤劳动应得的足够报酬和休息为饵，企图赢得工人阶级的拥护。作为地球上最辉煌的国家，我们怎能承诺的比那些赤色之众还要少？\n\n我们的工人已有国家康乐俱乐部这一历史悠久的娱乐俱乐部。它起初仿效美国的基督教青年会，但后来已自成一家，成为意大利和法西斯对劳动者团结的独特展现。我们有机会将其发扬光大，使之成为所有忠诚爱国工人的共同福祉。通过增资，我们还能拓宽其组织的活动范围。记住，让一个心满意足的工人心悦诚服，其生产力自然旺盛。"
 ita_right_to_parity:0 "实施优绩制"
 ita_right_to_parity_desc:0 "人的价值由何而定？是否因其名声显赫？是否因其腰缠万贯？或是因其土地广阔？不，这些都不是衡量一个人真正价值的标准。斯科尔扎领袖曾言，唯有个人对国家之贡献，以及其努力之成果，方显其真价值。\n\n那些勤劳的工人，他们汗水淋漓的额头和长满老茧的双手，对国家和人民的贡献，胜过所有堕落的资本家。他们是理想法西斯主义者的光辉写照；而那些资本家，却是只顾私利的寄生虫。从现在开始，评判和评价一个人，将只看其能力和成就。那些崇尚精英和任人唯亲的日子，已经一去不复返了。"
 ita_capitalist_anger_tt:0 "§R资本家们对我们近期的举措极为愤慨。§!"
 ita_expansion_of_the_iri:0 "IRI扩张"
 ita_expansion_of_the_iri_desc:0 "资本家们已退出历史舞台，现下由我们来引领经济之舟，担纲更为精准的领航之责。我们不可再步前尘，忽略基层百姓和工人的心声，不可再痴心妄想那些工厂主、银行家和资本家能自告奋勇，排难解纷。不，我们将时刻警觉，全面监督。\n\n要达成这一目标，工业复兴公司亟需更多的资金和资源支撑。同时新体系需要一些时间来适应如此严格的监管，但不久的将来，意大利经济将如一台精心调校的机械，运转自如。它将致力于造福于民，促进国家的繁荣，而非仅是富贾豪绅的利益。"
 ITA_scorza_industry_control:0 "国有工业"
 state_controlled_industry_improve_tt:0 "§G国家精神国有企业的效果将会提高！§!"
 ita_new_industrial_investments:0 "新工业投资"
 ita_new_industrial_investments_desc:0 "今后的首要任务应当是巩固我国的工业基础、支持工业发展，以在全球经济里竞争。与邻国相比，意大利的轻重工业经济好似一潭死水。我国的农业确实不错，但农业绝不会让意大利登上世界舞台。不，我们要的是更多工厂，生产更多产品，并加大力度出口。\n\n好消息是，我们可以直接控制工业，如我们期望的那样扩大生产。消费品、军用设备，无论什么，都可以通过我们全新的控制来引导生产方向。草案写毕，一旦我们需要达成什么目标，可以随时把要求送到IRI总部。"
 ita_provide_the_capital:0 "提供资本"
 ita_provide_the_capital_desc:0 "短期内，我们提振工业和经济的举措，可能需要大量资金和资源的支持。然而，专家们一致认为，稳扎稳打，筑牢财政之基，必将收获长效之利。工资、土地、外来资源等成本高昂，我们既已肩负起国家经济之重任，便当鼎力支持国内工业，助其平稳渡过此番变革。\n\n新成立的预算办公室主任，近日频繁与斯科尔扎磋商，就如何为众多机构与项目筹措资金，以确保经济转型顺利，沿着我们所认可的轨迹前行。"
 ita_handle_it_from_here:0 "居中调度"
 ita_handle_it_from_here_desc:0 "自由市场所孕育的竞争与创新，并不是一个固有的坏体系，相反，它是人类智慧的结晶，历史上最杰出的经济体系之一。但现在已不是我们能够单纯依靠自由市场的时代。我们曾说自由市场体系是最佳的选择之一，这话没错，但“最佳之一”并不就是“最佳”。不，那份最高荣誉属于我们现在的创新体系，它让我们能够结合市场经济的积极因素和指令经济的强大优势。我们得以引领那些雄心勃勃、力争上游的产业巨擘，使他们更好地服务于国家的利益。"
 ita_further_financial_supervision:0 "扩大金融监管"
 ita_further_financial_supervision_desc:0 "在大众市场的诞生之初，投资者和银行机构等利益相关者便已习惯于紧盯金融市场的波动，无论是繁荣还是萧条。我们曾轻信他们会以我们的利益为重，赋予他们利用信息自由投资的权力，然而这份幻想已随风而逝。如今，我们深知，唯有自力更生，方能做出明智之举，不为贪欲所蚀。为此，我们正在建立新的办公室，专注于监察国内一切经济活动，确保在任何行业遭遇衰退之时，我们能够立即采取行动，保障人民的福祉。"
 ita_supply_more_trained_managers:0 "培训更多管理人员"
 ita_supply_more_trained_managers_desc:0 "工人以赤子之心，愿竭尽所能，为国家添砖加瓦，我们对他们的技艺信心满满。但他们终究是一线劳动者，仍需那些胸怀壮志、身怀绝技者的引领，方能充分发展，正如国民整体亦需领袖来抵御人生路上的风霜雨雪一样。仅仅向国家公仆指派任务是不够的，为了保持秩序井然，还需给予他们正确的引导。\n\n正因如此，我们的新型管理学校将大有可为。如今，工厂已在我们严密掌控之下，我们便能慧眼识才，选拔那些有潜力的人才，赋予他们如此重责大任。他们若能不负众望，将获得丰厚的奖赏；若力有不逮，亦可轻而易举地更替。"
 ita_state_led_industry:0 "国家领导工业"
 ita_state_led_industry_desc:0 "斯科尔扎领袖解释过，领导者的职责在于促进个体与集体的共同提升。我们将以这样的理念，如同指挥家指导交响乐团一样指导经济。正如在交响乐团中，各项任务的成功完成将汇聚成一曲和谐乐章一样，各个小组将互相补充，彼此获得的成果相得益彰，最终成就一番经济新气象。经济的艺术尚未获得与其姊妹艺术同等的地位，但这一点要改变了，我们将如艺术家般塑造一个崭新的意大利。"
 ita_hands_of_the_state:0 "国家之手"
 ita_hands_of_the_state_desc:0 "国家经济宛如一头庞大而错综复杂的巨兽，非一己之力所能驾驭，更非私利与贪婪所能左右。国家经济当为国家所用，而非国家受经济所制，此乃昭然若揭之真理。故而，让国家经济受制于任何低于国家层面的实体，实在是不可理喻。\n\n我们以一己之力，塑造经济未来，彰显我们对国之领域的绝对掌控。我们擢升那些勤勉、贤能、心怀家国之人，而将那些贪污腐败、贪婪无厌、唯利是图之辈拒之门外。正如父之教子般，以责任与奉献之价值观培养他们，无疑有利于社会，我们亦将以此培养我们的经济体系，促使其始终以人民的更大福祉为依归，促进所有意大利人的幸福。"
 scorza_industrial_collapse_tt:0 "§R我们的工业部门正在崩溃。§!"
 ita_a_sane_and_honest_regime:0 "劳动状态"
 ita_a_sane_and_honest_regime_desc:0 "法西斯经济学的精髓，在于工人的境遇与劳动的本质。每一份辛勤耕耘，皆为集体的繁荣，而耕耘者必将收获其果实。那些资本家，不过是可有可无的中间人，甚而是进步的绊脚石。共产主义者亦非我们所求，他们所唱的无产阶级专政不过是虚假之歌。法西斯工人自豪地昂起头颅，因为他们深知自己的每一份努力都是为了国家和人民的利益。斯科尔扎兑现了他的诺言，将那些默默奉献、最值得尊敬的人提升起来。没有这些勤劳的工人，国家将失去动力；没有国家的守护和引领，工人也难以立足。法西斯工人，效率卓越，备受敬重，是撑起国家大厦的栋梁之才。"
 ita_work_with_left_corporavitists:0 "国家法团"
 ita_work_with_left_corporavitists_desc:0 "在这场由我们经济政策所引发的动荡中，工会扮演着举足轻重的角色。对我们来说，不幸的是，他们对我们政权的忠诚并不是板上钉钉的事情，第三方的煽动可能使他们成为我们的反对者。若劳动团体的领导层发出谴责之声，对我们而言，无疑是一次公关灾难，更是那些企图挑拨工人与政府关系的敌对势力的福音。\n\n与他们的代表会面或许不难，但会面之后如何是好，却是个难题。他们可能提出的支持条件，我们难以预料，恐怕只能被迫接受城下之盟，我们别无选择。"
 ita_oppose_the_class_struggle:0 "熄灭阶级斗争"
 ita_oppose_the_class_struggle_desc:0 "那些共产主义与无政府主义的狡猾信徒，正是利用了阶级间的裂痕。他们伺机利用经济的任何困境，向民众散播其险恶的图谋。虽然我们的计划已被证明卓有成效，但在人民和国家适应的过程中，也难免会遭遇一些小的波折。然而，这些波折不过是暂时的，不久必将迎刃而解。\n\n未雨绸缪总是明智的。我们应不断提醒意大利人民，作为国家的忠良子民，他们本应团结一心，无需因阶级之别而相互争斗。广播与电视的每一条播报，都应致力于激发人民心中那份坚不可摧的团结之情，这份情不会被任何恐惧和谎言所撼动。工人们需铭记，那些暴力边缘分子所宣扬的理念，实际上已通过我们的改革，在和平中得以实现。"
 ita_assure_the_profiteers:0 "安抚食利者"
 ita_assure_the_profiteers_desc:0 "在我们的新经济体系中，工厂的管理者大可安心，我们无意从那些工业行业的宝贵指导人才手中取走他们的财富。他们自然有权获得利润，即便是发战争财。这是人之常情，人们总是千方百计地为自己谋利益，至于手段是否道德，不是我们评判的范畴。毕竟，我们在道德的天平上也非完美无瑕，既然如此，何不加入其中从中获益？\n\n只要他们全心全意地支持国家，他们便有理由发展自己。让枪械制造商财源广进，让炸弹生产商日进斗金，战争成了生意，而目前在全球的大舞台上，这门生意似乎正红红火火。"
 ita_warrior_producers:0 "生产者也是战士"
 ita_warrior_producers_desc:0 "领袖始终坚信，那些为国家和意大利人民的福祉不惜血汗的人，与军队中的士兵一样，同样都是爱国的勇士。士兵能够守卫城墙，击退侵略者，但建造那高不可攀、坚如磐石的城墙的是工人。是工人铸造利剑，制造箭矢，雕琢弓弩。战士只能依靠那些爱国的钢铁工人和工匠所提供的装备去战斗。我们须时刻提醒人民，他们为国家所作的每一分贡献，我们都视若珍宝，正如我们珍视自己作为领导者的每份努力与奉献。"
 ita_quis_contra_nos:0 "谁胆敢和我们作对？"
 ita_quis_contra_nos_desc:0 "局势急转直下，我们曾引以为傲的计划与改革如今正摇摇欲坠，而最令人揪心的是，我们竟不知何人在暗中作祟，破坏我们的经济，我们找不到症结源头。必有黑手在幕后操纵，否则经济不会如此迅速地陷入崩溃。原本一切顺风顺水，如今却突遭重击，这无疑是对国家本身的一次猛烈攻击。\n\n究竟是何方神圣对我们痛下杀手？在这场新的较量中，谁又站在了我们的对立面？是那些因嫉妒我们的成就而心怀不满的齐亚诺追随者吗？还是那些意识到我们的改革将为人民带来深远利益的共产主义者？或是那些死守财富控制权，不愿放松一丝一毫的资本家？或许……他们联手对抗我们，我们正孤军奋战。"
 nscorza.501.t:0 "新劳工宪章"
 nscorza.501.d:0 "墨索里尼时代的法西斯革命，其标志性成就之一便是在1927年颁布的《劳动宪章》。想当初，这宪章堪称前瞻之策，然而时过境迁，它已逐渐失去了昔日的光辉。宪章初稿赋予了工业巨头和商界领袖过大的权力，他们借此压榨工人，追求的私利往往与意大利的国家利益背道而驰。\n\n斯科尔扎领袖洞察时势，决意对《劳动宪章》进行现代化的修订。新宪章将限制商界精英对工人的权力，确保他们不再对工人颐指气使，让那些辛勤劳作的意大利人得到应有的报酬与福利。意大利民众已将信任寄望于国家，而国家亦将不负众望，不再有负于这份沉甸甸的信任。\n\n不仅如此，这些企业将不再被允许只为一己之私而行事，哪怕这意味着与国家的目标南辕北辙。鉴于国家对这些企业的大力支持，它们理应回馈社会，助力国家实现宏伟蓝图，而非仅仅着眼于自身的利润。商界高管或许会对修订《劳动宪章》提出异议，但这是他们咎由自取。若非他们滥用了国家的信任，今日的修订本无需发生。"
 nscorza.501.a:0 "为了意大利工人！"
 nscorza.502.t:0 "再无征税！"
 nscorza.502.d:0 "对意大利百姓而言，昔日的意大利已成往昔云烟。曾几何时，国家经济的重负令其步履艰难，而今斯科尔扎却开辟了一片无税的新天地。民众对于法西斯体制的巩固或许心存疑虑，但对于取消的税收却是喜大普奔，毕竟，手头宽裕是人之常情，亦是幸福之源。\n\n然而，即便我们在废税之路上取得了成就，经济学家们的质疑声却依旧不绝于耳。他们的核心论调错误的判定意大利政府过度依赖税收，甚至认为个人消费难以为继。更有甚者，他们预言快速的税收废除将引发通货膨胀，导致经济崩溃，真是危言耸听。但明眼人都知道，资金充裕必将激发消费热情，消费正是经济腾飞的引擎。意大利经济必将扶摇直上，不会如悲观者所言那般轻易崩溃。"
 nscorza.502.a:0 "终末之后，我们才是笑到最后的人。"
 nscorza.503.t:0 "最后一笑"
 nscorza.503.d:0 "法西斯革命，一场壮丽的胜利凯歌！我们坚信，法西斯主义之道乃正义光辉之坦途，我们正稳步前行，致力于让20世纪成为法西斯的世纪，名垂青史。\n\n然而，令人难以置信的是，我们敬爱的领袖墨索里尼在经济货币的论断上，或许并非无懈可击。通胀如猛兽般肆虐，金融巨头与学者在他们的象牙塔中冷嘲热讽，企业和消费者竞相在储蓄的价值荡然无存前将其挥霍一空，经济大厦正摇摇欲坠。\n\n或许是我们曲解了早期法西斯主义那些晦涩难懂、自相矛盾的教条。目前，国家法西斯党的精英们正群策群力，探索一条既契合法西斯主义精髓，又能彰显墨索里尼与斯科尔扎领袖光辉思想的解决之道。\n\n我们对法西斯主义必将证明自己的正确这一点充满信心。但眼前，公众似乎更倾向听取那些质疑者的声音。国家危机愈演愈烈，甚至在意大利政府的庄严殿堂之内，也开始有人对法西斯主义的道路心生疑虑，我们唯有期盼破晓之光能迅速到来。\n\n若不能及时觅得良策，我们至少希望能觅得一线“诠释”，以暂缓我们近期的决策，这自是权宜之计。"
 nscorza.503.a:0 "经济可真复杂……"
 nscorza.504.t:0 "枷锁破裂"
 nscorza.504.d:0 "在人类历史的长河中，一条不变的真理贯穿始终：众人辛勤耕耘，而少数人坐享其成。劳动与资本之间，似乎总是充斥着无休止的相互指责和破坏的循环。\n\n富人们巧言令色，剥削工人，而那些未受教育的大众则在进行着激烈的反抗。只要这两者之间持续敌对，只要富者愈富、贫者愈贫，意大利民族就永远无法发挥其真正的潜力。法西斯国家有责任去推动阶级间的和谐，而非对抗。在实践中，这意味着工厂工人将能够拥有自己的一亩三分地，而资产阶级将在新秩序中找到他们的应有的归宿。自然，在这种新秩序中，上层阶级需要学习的最多，但得益于我们强大的军队，他们只能在一旁怨声载道，无能为力。"
 nscorza.504.a:0 "变革，拂晓意大利。"
 nscorza.505.t:0 "烧毁皮鞭"
 nscorza.505.d:0 "曾以为将工厂归还给工人，便是意大利诸般难题的灵丹妙药，哪知金钱与权力，实则难解难分。资本家们一朝失势，便纷纷撤资，将流动资金紧握在手。\n\n这种做法显然给我们将意大利建设成世界强国的雄心带来了阻碍。若只是少数几个奸商作祟，我们大可派黑衫军出马，一一解决。但如今这股逆流已结流成河，若贸然没收其资产，恐怕他们会在一夜之间逃离国门，令我们陷入更深层次的困境。"
 nscorza.505.a:0 "隐忧突现。"
 nscorza.506.t:0 "引导之手"
 nscorza.506.d:0 "意大利工业终回正轨。生产资料的控制权不再落入那些唯利是图、目光如豆的雇主之手，亦非那些蒙昧无知的员工所能染指，而是归于我们。作为意大利人民、国家与未来的真正代表，我们引领生产之舵，岂不是理所应当？\n\n虽然疑虑之声尚存，但随着时间推移，他们自会领悟，毕竟这一切终归是为了他们的利益。目前，虽然存在一些官僚管理上的疏漏，但这些害群之马会被立即清除，以便我们的国家能够发挥其真正的潜力。"
 nscorza.506.a:0 "法西斯主义高于一切！"
 nscorza.507.t:0 "目标虽隐，非不可追"
 nscorza.507.d:0 "自始至终，我们都坚信法西斯主义代表着未来。但这份未来，却似乎总是步履蹒跚，难以触及。我们对工厂的生产配额设定了铁的纪律，却总是差之毫厘。我们对贪污腐败者穷追猛打，他们却总能狡兔三窟，逍遥法外。\n\n意大利经济已步入一种荒腔走板、无能无力的混沌状态。法西斯政府在肩负起庞杂的管理重担时，显得无能为力，令人扼腕叹息。国家法西斯党内部，仍有人在辩称问题不在于规则，而在于执行。但是，要求我们停摆或逆转经济计划的声浪，却愈发高涨，势不可挡。"
 nscorza.507.a:0 "也许我们该回头了？"
 nscorza.508.t:0 "但它滋养着他们！"
 nscorza.508.d:0 "意大利法西斯与工人，曾经同舟共济，如今却似分道扬镳。在国家亟需他们之际，工人们却背离了曾赋予他们工厂与未来掌控权的国家。\n\n所谓的工人自主权，不过是空中楼阁，难以弥补货币贬值和安全标准的滑坡带来的损失。虽然目前黑衫军的严格管理尚且还能稳住局势，但若情况持续恶化，这种管理手段也恐难以为继。"
 nscorza.508.a:0 "他们为何不以恩情回报我们的援手？"
 nscorza.509.t:0 "名友实非"
 nscorza.509.d:0 "法西斯经济模式的初衷是普惠工人、工会、企业主与国家，然而现实却是，除了国家，其他各方皆对此感到失望。近期，工会成了怨声载道的焦点。理论上他们已被优化重组，成为政府控制的高效机构，但旧有体系仍旧根深蒂固，且他们对我们的过度干预愈发不满。\n\n工会已经明确表态，若不答应他们全面废止法西斯改革的要求，他们将掀起一场史无前例的罢工狂潮。国家法西斯党，不同于昔日软弱之辈，本不愿轻易屈服于压力，但形势所迫，我们似乎已无退路。"
 nscorza.509.a:0 "这些该死的工会。"
 nscorza.510.t:0 "红色萎靡"
 nscorza.510.d:0 "在意大利的法西斯岁月里，国家法西斯党深谙共产主义作为威胁的特殊性，其被用以让人民心怀恐惧，服从党的指挥。然而，随着共产主义组织烟消云散，法西斯主义根深蒂固已逾五十载，昔日的威胁论已不复当年之效。或许，通过将宣传手法现代化，我们可以重新激发人们对“红色恶魔”的恐惧，作为凝聚民心的新纽带；但也许，我们真的该将那些陈腐的宣传伎俩束之高阁。"
 nscorza.510.a:0 "没有什么比马克思主义更糟糕的了！"
 nscorza.511.t:0 "安抚食利者"
 nscorza.511.d:0 "意大利的资本家和奸商们似乎在故意与我们为敌，他们不断阻挠我们新近的改革计划，让我们的工业困境愈发加剧。在各大报纸的专栏中，他们向意大利的精英阶层发出呼声，对我们新近实施的领导层变革极尽讽刺之能事，有人甚至斥之为“罗马那些无良政客的僭越之举，他们正贪得无厌地想夺走我们血汗换来的财富和固有的权利”。\n\n虽然将工厂控制权重新交还给这些小资产阶级奸商，随之撤销我们的改革措施是绝无可能的，但我们或许可以做些微小的妥协，以留住这些养尊处优的精英们（以及他们缴纳的税金），防止他们逃离我们的掌控。\n\n当然，如果这些妥协仍不能让他们满足，我们还有最后的手段：派遣黑衫军让这些资本家看看，究竟谁才是国家的真正主宰。"
 nscorza.511.a:0 "他们会明白的。"
 nscorza.512.t:0 "生产者也是战士"
 nscorza.512.d:0 "法西斯革命虽惠及意大利的工人和劳动者们诸多，但他们却仍旧对我们的治理心存不满。我们依循《法西斯的教条》里的合作主义，赋予了他们对工厂的掌控权和生活的自由，但他们仍旧怨声载道，说什么“所谓自由不过是虚情假意，目的是安抚而非改善”，还有“天哪，我的胳膊！机器夺走了我的胳膊！”这无疑是对我们所定安全规章的公然挑衅。\n\n面对目前财政的些许……动荡，我们新建立的奖励体系可能需要撤销，或者给工人们发点红包，但目前实在力不从心。然而，我们现在确有一个必将成功的解决方案：发起一场浩大而大胆的宣传攻势，来赞颂那些为国家荣耀不惜牺牲（哪怕是身体的一部分）的意大利“国之栋梁”。\n\n虽然有人可能视此为又一次让他们忍受更低劳动和薪酬标准的讽刺之举，但相信大多数工人定会被此激励，欣然回归工作岗位。"
 nscorza.512.a:0 "意大利人将蜕变为卓越的工匠。"
 nscorza.513.t:0 "谁胆敢和我们作对？"
 nscorza.513.d:0 "锻造法西斯意大利，是一条漫长而曲折的道路。沿途不乏唱反调者，他们断言法西斯经济行不通，预言我们将自食其果，经济停滞，社会动荡。正如我们在建立帝国时无视了这些愚人一样，我们在实施墨索里尼的愿景时也无视了他们，我们对这些悲观论调置若罔闻，坚信法西斯主义终将证明其正确性。\n\n不幸的是，我们似乎误入歧途。\n\n我们试图在工人与管理者之间架起一座桥梁，却不料反而使双方更加疏远。我们曾为之奋斗的梦想，现在看来，不过是镜花水月，我们所付出的心血和汗水，似乎都已付诸东流。\n\n即便在工厂罢工声不断，富人们纷纷逃离这片土地寻求美好天地的今天，仍有人对法西斯主义心存希望。或许我们也该继续信仰下去，毕竟，用黑衫军的铁拳解决问题，虽然不是最人道的做法（换言之最符合法西斯主义的教条），但比起对我们的体制和信仰进行痛苦的调整，承认失败，这似乎是一条更为简单的道路。\n\n然而，也许我们更应接受现实，承认失败，为了更好的未来而改变。法西斯主义若不能造福意大利民族和工人，那它的存在又有何意义？我们不是专制的暴君，也不是极端的帝国，法西斯主义本应是意大利人民的守护者，人民也本应对它忠诚。如果它不能服务于人民，那么它就没有存在的理由。\n\n时光荏苒，抉择已至。"
 nscorza.513.a:0 "或许是我们错了。"
 nscorza.901.t:0 "新经济学院"
 nscorza.901.d:0 "威尼斯宫的长廊里，回荡着“这简直是疯了！”的呐喊，这声音源自领袖的私人办公室。门口的守卫们也在暗自思忖，区区一介经济学家，何以敢与领袖对峙……“意大利怎么可能每年保持15%的经济增长？我们的工业基础、资源、劳动力都远远不够！”\n\n即将卸任的意大利经济机构主席、经济学教授阿尔多·阿马图齐，踏入房内，满以为会再次听到对意大利发展缓慢的指责。但出乎意料的是，他在桌上发现了一份详尽的经济改革计划书：他面红耳赤，试图向那位泰然自若的领袖阐释，计划书里的构想将使意大利的经济走向绝路。“如果你用自由主义的偏光镜和狭隘的现实逻辑来看待它，那它确实是疯了，”斯科尔扎如是说，“意大利需要的是勇于牺牲、超越现实的领袖，以及足够坚强的民族来承担这些牺牲！”阿马图齐望着他，眼神如同凝视一个精神错乱之人。他还在尖叫，就被守卫带走了。\n\n回音散尽，领袖向正敲击键盘的私人秘书点头示意：“阿尔多，请致电财政部：若规划委员会成员皆如此，我们将采取断然措施，确保意大利实现其应有之伟大。”秘书微微鞠躬，立刻离席拨打电话。门扉关闭的瞬间，领袖的微笑透露出深不可测的意味……"
 nscorza.901.a:0 "为了让我赢得我命中注定的荣光……"
 nscorza.902.t:0 "相信！服从！工作！"
 nscorza.902.d:0 "五小时辛勤劳作后，汽笛如常响起，划破长空，预示着十分钟的短暂歇息。加埃塔诺·马罗齐对那预录音的每个语调早已耳熟能详：“休息十分钟。违者将受处罚”，当然，所有人都清楚所谓的“处罚”是什么。他疾步走向洗手间：幸好岗位靠近门口，他得以率先使用那两千工人共同使用的仅有的十个厕所，这样他还有八分半钟吃下妻子做的三明治。\n\n重返岗位，他忽感口袋中多了张纸条：回首一瞥，挚友马科正点头示意。纸条上的“罢工”二字，如晴天霹雳，让他心惊肉跳。脑海中纷至沓来的尽是些不祥之兆：家人遭劫，自身劳碌至死，与子女天人永隔……本能驱使他高呼：“反法西斯叛匪！”两个穿着工作服的人立刻来到他身边，他们取走了纸条质问：“谁给你的？”加埃塔诺望向马科，对方正用眼神哀求。往昔嬉戏，酒吧夜谈，足球赛场上的激情，欢声笑语，一幕幕如在眼前。他记得自己是马科女儿露西亚的教父，她的骄傲与喜悦……泪眼朦胧中，他还是指向了马科。\n\n“叛徒！工贼！杂种！”马科被OVRA带走时怒吼。一位衣冠楚楚的男子走到加埃塔诺身边，轻拍他的肩：“干得好！我们早就怀疑他，你帮我们抓到了他。你展现了对领袖的忠诚：毕竟，他‘曾’是你的挚友……来吧，你将获得晋升，一个新的工作岗位，远离这是非之地。现在的人往往不懂得忠诚的价值。”加埃塔诺跟随着他，心中却只有那个萦绕不去的问题。"
 nscorza.902.a:0 "法西斯把人变成鬼……"
 nscorza.1001.t:0 "经济堡垒"
 nscorza.1001.d:0 "卡洛·斯科尔扎延续着墨索里尼的传统，每晚，威尼斯宫的领袖办公室灯火依旧。提醒所有人，即使正直的人们都已入眠，领袖还在为意大利守夜。但这晚不同，整个宫殿热闹非凡：每隔一小时就会有报告送来，而领袖的办公桌业已堆满空咖啡杯。\n\n摆在高档桌上的全部报告都透露出世界局势的不稳定性：德国经济崩溃、日本经济战、美国挑战非洲现行秩序、中东紧张态势持续升温……记载了四处崩溃的列表也会让任何一个经济学家崩溃。办公室里鸦雀无声，唯一的声音来自斯科尔扎私人秘书有规律地打字。斯科尔扎喝着另一杯咖啡，忖度如何保护意大利免受下一场风暴的侵袭，这场风暴的破坏力可能比上一场战争与三头同盟解体之和还惊人。他就像围困于城堡的指挥官，只觉无能为力，眼睁睁看着敌人为最后的进攻做准备。\n\n领袖猛抬头，没错！一座城堡！他也许无法阻止危机爆发，但他肯定可以筑墙，加固防御，让国家在风暴中幸存下来！意大利需要成为坚不可摧、独立于外国影响的经济堡垒，而实现此目标的方法只有一种：墨索里尼创造的自给自足，将再成意大利经济的主导部分。“阿尔多！”秘书吓一跳，“赶紧打电话给经济部长！我不管他在睡觉还怎么的，活可没干完！”秘书点点头，离开房间。如坐针毡的卡洛·斯科尔扎终于放松下来：至此，一切都明朗许多。"
 nscorza.1001.a:0 "无论如何，意大利都会做好准备。"
 nscorza.1002.t:0 "努力工作带来成果"
 nscorza.1002.d:0 "经济事务部长与规划委员会成员鱼贯而入威尼斯宫顶楼的豪华办公室，举起右臂敬礼，左臂则夹着厚厚的文件夹，里面装满数百份文件。卡洛·斯科尔扎点点头表示认可，然后示意十五人坐在他私人秘书提前准备好的毛绒扶手椅上。“阿尔多，你能给我们拿点点心吗？”说完，这位得力的助手微微鞠了一躬就走了。然后，他看着坐在正前方的那个人：“泽尔比诺部长，我很想知道我们自给自足政策的成果：相信你已经掌握了我需要的全部信息。”\n\n“是的，我的领袖。”保罗·泽尔比诺说着，匆忙打开手提箱，抽出份长篇报告：“正如您所料，我们的努力有了回报：无论本土还是帝国其他地区的资源开采量都大幅增加，我们所有属地的工业生产也与日俱增。确保农业完全独立还需要时间，但我们相信，新的合理改革以及对高产作物、肥料的研究终能达成目标。”语毕，他向一名规划委员会成员点点头，后者开始详谈改革及其预期成果。一切结束后，领袖轻轻地拍手：“先生们，我为你们感到骄傲！有了你们所做的一切，即使身处最严峻的形势，意大利的存续也能因你们而得保。”部长对此止不住地向领袖鞠躬致谢。大家都走后，领袖想到那位部长，不禁开了个小玩笑：他确实是个能干的人，但可能有点太……愿意为人效劳了。"
 nscorza.1002.a:0 "泽尔比诺，人如其名……"
 nscorza.1003.t:0 "新帝国的平凡一天"
 nscorza.1003.d:0 "女士们，先生们，这里是意广新闻台，我是你们忠实的乔治·韦基耶蒂！大家都知道，过去几年对我们美丽的国家来说艰苦卓绝：从战争重建到德国在直布罗陀的背叛，我们自豪的人民不得不面对许多挑战。但不再是这样了！在我们卡洛·斯科尔扎领袖的坚强领导下，意大利重获新生。现在他引领我们走向更光明的未来！\n\n看看身边，新工厂开工，新企业于全意开业。不单本土，整个帝国都在经历新的繁荣黄金时代：苏伊士海运增长十倍，而从埃塞俄比亚到海湾领，意大利商人和当地农民的生产力激增，就算是我们光荣的首任领袖排干庞廷沼泽，也从未见过这样的日子！\n\n随着全意共步强大，互相交织也愈来愈深，直至每座城市都与帝国的其他地区密不可分，创造了一个繁荣、团结的新共同体，这在我们的历史上是前所未有的！如果继续发展下去，女士们，先生们，我们将离我们的伟大梦想越来越近：有一天，我们会真正重建罗马帝国！荣耀归于意大利！荣耀归于法西斯！荣耀归于领袖！"
 nscorza.1003.a:0 "荣耀！"
 nscorza.1201.t:0 "新法西斯主义的黎明"
 nscorza.1201.d:0 "斯科尔扎领袖凝望罗马天际线，微弱的月光与城市的奢华光亮将其照亮，领袖清楚：法西斯主义必须改变，以迎接未来。这样未来才能永远改变，以迎接法西斯主义。\n\n他在担任领袖期间为之奋斗的一切，党、教会、经济都迅速走向崩溃边缘。可他想知道，要怎么革新法西斯主义？墨索里尼创下的旧制度已腐烂数十年，是的，我们认清了一切，可要怎么建立新制度？\n\n斯科尔扎扪心自问，若要修复意大利与国家法西斯党间支离破碎的地基，就必须迅速采取激进行动。定义“法西斯主义”的旧制度已然站不住脚，而今必须从头越。意大利若要在石油危机的风暴中挺立，国民若要在周身迅速变化的世界中生存，就需要进行从头到脚的变革。领袖很快开始工作，开始起草、定义这种叫“新法西斯主义”的想法。\n\n首先，选举制度。笨蛋都知道，人民若在国家治理中切实感到有代表为其利益而奔走，他们会更满足。进而从效益延伸，那就不能放过福利，得花点时间制定一份全面的福利计划。人民要求的基本生活水平若未达标，他们就不会任人摆布，日益蠢蠢欲动。第三，也是最重要的一点，得在宏大叙事层面完全塑造“真正法西斯主义”为支柱，并以压倒性力量清除每一处腐败、不忠和叛国迹象。斯科尔扎迅速构思的这些改革都只为一个目的：确保驱除妖雾笼罩、最优越真实的法西斯主义维系千年，纵使国王也得折服，无物可阻。但国王还不是要紧事，首先得尽力完善“新法西斯主义”，无源之水，无本之木，那只会一事无成。领袖一把抓起最近的纸笔。\n\n太阳再次照耀意大利，斯科尔扎放下了笔。他起身，离开华贵的椅子，橙光明艳到他几近失明，最终方案终于完工。"
 nscorza.1201.a:0 "陈致法西斯大委员会！"
 nscorza.1300.t:0 "法西斯主义的黎明"
 nscorza.1300.d:0 "斯科尔扎领袖凝望罗马天际线，微弱的月光与城市的奢华光亮将其照亮，领袖清楚：法西斯主义必须改变以保卫过去，这样过往的法西斯主义才能永续于未来。\n\n他在担任领袖期间的困难时期，他所做的一切，赢得党的绝对忠诚、以真正理解自给自足的方式控制经济，以及为确保意大利稳定的而做出的所有牺牲，只为一个目的。法西斯主义在意大利统治七十年，法西斯必须享祚千年！\n\n他知道，不满的谣言早已在罗马流传数年，社会上那些软弱的卖国者正在反对他。本来也不成气候，可随着石油危机到来，谣言已达顶峰。自由派、布尔什维克和所有希望摧毁意大利的人，他们必被领袖以全力、全速诛灭。甚至国王也一直沉默地抗议着斯科尔扎的胜利——就算是他，也必须服从领袖的意志。\n\n然而，斯科尔扎知道自己已经老了。他最终需要一位继任者，但这是以后的事了。\n\n斯科尔扎抓起最近的纸笔，开始描绘该如何强化法西斯主义的机制。\n\n太阳再次照耀意大利，斯科尔扎放下了笔。他起身，离开华贵的椅子，橙光明艳到他几近失明，最终方案终于完工。"
 nscorza.1300.a:0 "国家高于一切！"
 ita_what_the_country_needs:0 "国家需要什么"
 ita_what_the_country_needs_desc:0 "自由派自以为知道意大利需要什么，认为意大利需要自由市场、透明的官僚机构，最好搞点什么“国际自由贸易”。\n\n蠢货！领袖知道意大利需要什么！\n\n意大利需要强有力的引导之手！有强健的工业才可拥有强力的军队！引导之手要在意大利境内挖掘资源，这样我们就不会向美国人低头，尤其是，不向德国人低头！\n\n这正是意大利需要的，也是意大利应有！那些不这样想的人，别再浪费时间空谈，不如举起镐，为祖国劳作！"
 ita_bureaucrats_and_barons:0 "官僚和大亨"
 ita_bureaucrats_and_barons_desc:0 "在我们工业官僚集团这台巨大而腐败的机器里，有许多扇门，每扇门都有专人保管钥匙。若我们准备对全国进行彻底改革，以更好实现领袖的梦想时，这些人会成为很好的中间人，能让我们抽出手着力于更要紧的工作。\n\n毕竟，与意大利的伟大相比，几瓶上好葡萄酒、闪亮的法拉利或与一群美女共度良宵算得了什么？"
 ITA_scorza_bureaucrats_and_barons1:0 "官僚和大亨"
 ITA_scorza_bureaucrats_and_barons2:0 "官僚和大亨"
 ITA_scorza_bureaucrats_and_barons3:0 "官僚和大亨"
 ITA_scorza_bureaucrats_and_barons4:0 "官僚和大亨"
 ITA_scorza_bureaucrats_and_barons5:0 "官僚和大亨"
 ita_reinforce_the_barons_hold:0 "加强对大亨的控制"
 ita_reinforce_the_barons_hold_desc:0 "我们的工业必须壮大，方能与德国或美国一决高下。虽然我们没有，也不打算有那些在工厂里劳作至死的真正奴隶，但法律可没有禁止我们采取延长工时、降低最低工资，以削减劳动成本的手段。\n\n通过降低成本，我们工业的利润空间将水涨船高，意大利的竞争力也将随之提升。当然，我们期望工业巨头们将新增加的部分收入再投资于我们蓬勃的工业：他们肯定不愿意知道那些让我们领袖不悦的人会遭受什么后果。"
 ita_renew_old_friendships:0 "重叙旧情"
 ita_renew_old_friendships_desc:0 "意大利具有非凡的工业潜力：从菲亚特到埃尼，这些企业巨头成就了我们今日的帝国辉煌。我们应当借此优势，加强中央政权与经济强企之间的纽带，携手共进，迈向更加灿烂的明天！\n\n当然，这背后难免需要些权宜之计，贿赂与人情，而在瑞士的秘密账户，正是为此准备的隐秘之所……"
 ita_redraw_new_plans:0 "重绘新计划"
 ita_redraw_new_plans_desc:0 "在齐亚诺软弱无力的统治下，我们的经济一直萎靡不振。如今正是重振旗鼓之时！我们的经济和财政部门将策划一项促进经济复兴和大幅提升的计划：新工厂将在帝国各地拔地而起，成千上万的失业者将因能够重新养家糊口而对我们感恩戴德！\n\n我们对那些将获得公共补贴的公司自是严加筛选，确保唯有那些对领袖忠心耿耿、毕恭毕敬者，方能分享这份丰厚的奖赏……"
 ita_secret_IOR_deals:0 "与IOR幕后交易"
 ita_secret_IOR_deals_desc:0 "宗教事业局，圣座的金融巨擘，本意是让罗马教会永远有充裕的资金帮助贫困和无家可归的人……然而，这不过是他们向那些鳏寡孤独灌输的片面之言，诱使信男信女掏出毕生积蓄为所谓的公益慷慨解囊。红衣主教帕拉图奇的新法拉利，那比我家都要贵多了！\n\n梵蒂冈自然不愿外人窥探其慈善资金的真正去向，可我们不是外人，他们必须让我们参与进来，分享收益！意大利的辉煌岂能因小节而损？他们自然有权拒绝，那我也只能祝福他们的瑞士卫队，不止会挥舞长戟，更有其他武艺傍身。"
 ita_scorza_evil_black_funds_tt:0 "§G更多的钱将流入我们的金库。§!\n"
 ita_foreign_black_funds:0 "海外黑金"
 ita_foreign_black_funds_desc:0 "正如罗马先贤所云：“金钱不染尘”。无论如何，我们需觅得新财路以滋养经济政策！不论是里拉、美元还是德国马克，凡是注入经济的资本，往后必将收获数倍回报，故此，我们须即刻行动！\n\n当然，我们在梵蒂冈的“朋友们”肯定有办法开辟新的财源和物资渠道：我绝不相信希安德雷利总主教在午餐时给我的那瓶法国香槟是通过合法途径得来的，因为我们已明令禁止其销售……"
 ita_money_from_the_shadows:0 "不义之财"
 ita_money_from_the_shadows_desc:0 "我们的\"副业\"如今硕果累累：那些不久前在瑞士设立的秘密账户，如今已是金满银溢，财源滚滚。权贵们争先恐后，纷纷欲分一杯羹，以助我们实现宏伟蓝图。虽然那些禁忌劳动的恶果尚需时日成熟，但新工厂如雨后春笋般涌现，已经让人颇感满意！\n\n请在下回我们于宗座宫宴饮之时，代我向阁下致以诚挚的谢意……"
 ita_the_economic_cliques:0 "经济集团"
 ita_the_economic_cliques_desc:0 "简约之力，胜过繁复。我们不需千千万万小企业家为争夺微末的公共激励而相互角逐，不必在议会中挤破头，也无需拼命去贿赂那些小人。我们有的是一小撮井然有序的工业巨头，他们心知肚明自己所求，明白若要如愿以偿，必须为我们出力，以及不从则面临的苦果。既然背道而驰能带来如此辉煌成就，自由的经济与透明的公共部门又有何用？\n\n阴霾散尽，意大利再沐光辉……"
 ita_new_people_in_planning_boards:0 "计划委员会的新成员"
 ita_new_people_in_planning_boards_desc:0 "随着我们新\"管理层\"的登场，国家机器的高层亟需一批志同道合的新人，他们必须与我们崇高的领袖心心相印。然而，仍有许多人忠于齐亚诺，他们过去曾企图终结法西斯主义却徒劳无功，只要这些背信弃义之人还在操纵行政机构，意大利就难以迎来真正的复兴。\n\n我们将如同医生剔除健康体中的肿瘤，从官僚体系和工业中清除那些微不足道的败类！唯有如此，意大利才能从自由主义的灰烬中浴火重生，凤凰涅槃，展翅高飞！"
 ITA_scorza_evil_total_control:0 "全面控制"
 ita_seize_complete_control_tt:0 "§G我们将加强对经济的控制。§!\n"
 ita_reign_in_the_camera_dei_fasci_e_delle_corporazioni:0 "议会统治"
 ita_reign_in_the_camera_dei_fasci_e_delle_corporazioni_desc:0 "法西斯与法团议会，乃是较之旧日选举产生的众议院更为完善之制度。其宗旨，旨在汇聚各方经济巨头与代表，以促进国家经济之繁荣——然而齐亚诺却擅自插手，让那些观念与我们背道而驰之人得以跻身其中。\n\n如今，正是提醒他们对领袖忠诚之刻：他们若不俯首听命，黑衫军必将严惩不贷……在OVRA将他们投入囹圄之前。"
 ita_centralize_power:0 "集中权力"
 ita_centralize_power_desc:0 "领袖乃民族之魂，正引领意大利迈向历史上空前绝后的帝国之巅，无人有权阻挠其伟大志向！法官、议会，皆须俯首称臣，不从者必自食其果！\n\n是时候将此理念化为行动了，通过革新行政体系，确保从官僚机构至国家各部门，都唯领袖马首是瞻……！"
 ita_demand_absolute_loyalty2:0 "要求绝对忠诚"
 ita_demand_absolute_loyalty2_desc:0 "为让全民皆晓，谁才是我们伟大国家的真正领袖，每位公民都应向领袖宣誓尽忠。那些拒不从命者，将被立即定性为国之叛徒，面临着十五年的监禁生涯：这或许便是所谓的“选择”。\n\n“我宣誓，我将至诚至忠于卡洛·斯科尔扎，法西斯之领袖，以我血肉之躯，追随他服务我魂牵梦萦的祖国，我的生命与热血皆为她的宏伟征程而流。”"
 ita_resources_at_all_costs:0 "不惜一切，获取资源"
 ita_resources_at_all_costs_desc:0 "我们实在难以承受依赖外购资源的软肋！此举不仅推高了产品成本，削弱了我们在国际市场上的竞争力，更使我们易于落入那些试图以资源为要挟，对我们进行威胁和敲诈的国家之手。\n\n我们迫切需要提高我们自身资源的产出：矿井、油井、农田，必须昼夜不息地高效运转。如果工人们因劳累过度而倒下，我们就增加轮班次数，让那些夜间休息的人在周日工作！"
 ITA_scorza_evil_resources:0 "不惜一切，获取资源"
 ita_resources_at_all_costs_tt:0 "§O人民将加倍努力为国工作。§!\n"
 ita_harsher_labor_laws:0 "更严厉的劳动法"
 ita_harsher_labor_laws_desc:0 "增强我们的工业产能是头等大事，然而，新建工厂既费时又劳民伤财，并不是我们的首选。我们有的是大量愿意工作的双手……为了使我们的国民产出能与德国、美国等强国一争高下，我们必须让意大利的每一个工厂的生产配额达到极致：为此，我们将废除每天工作时间的限制，而改为确保每位工人“每天至少有四小时的喘息之机”。\n\n当然，我们并不打算真正遵循这一规定……"
 ita_an_OVRA_agent_in_every_factory:0 "OVRA密探进厂"
 ita_an_OVRA_agent_in_every_factory_desc:0 "果不其然，新劳动法并未得到工人们的支持，罢工和破坏的风险达到了前所未有的高度。为了有效对抗日益增长的社会主义威胁，OVRA将增拨资金，增补人手，派遣“监察员”遍访意大利各工厂与工作场所。他们将在那里监视工人们的情况，那些被认为……不爱国……的人将被秘密地清除，并送往一个不允许他们发出任何异议的地方。"
 ita_labor_camps_for_dissidents:0 "异见人士劳改营"
 ita_labor_camps_for_dissidents_desc:0 "即便是异见人士，也应有机会以实际行动为意大利尽忠，哪怕他们内心坚决反对。意大利各地将设立劳改营，那些背离法西斯事业的不忠之人将被送往那里，或受短期惩戒，或终其一生，若数年之苦仍不能磨灭他们那炽热的反抗意志……\n\n在营地之内，铁的纪律将裁定每人的饮食与劳作，对于顽固不化的反对者，除了水，他们将一无所有。让我们拭目以待，一个人在精神崩溃前能坚持多久。"
 ita_reinforce_the_latifundia:0 "加强“大庄园”"
 ita_reinforce_the_latifundia_desc:0 "在古罗马，拉丁大庄园是由单一地主管理的大型农场。这些农场组织有序、效率极高，远非那些小地主随心所欲的农场所能比拟，能够显著提高农业产量。我们当以先贤为鉴，通过没收荒废地块或效率低下的农民土地，建立公共拉丁大庄园，以降低对外国进口的依赖！\n\n当然，关于拉丁大庄园里面大多是奴隶劳作的事实，我们将三缄其口……"
 ita_keep_the_farmers_down:0 "压制农民"
 ita_keep_the_farmers_down_desc:0 "诚然，无偿征地这一措施并不被普遍看好……但农民们毕竟还在保留自己的家园的同时，继续耕种他们原本的土地，若仍能养家糊口，他们理应心怀感激，此情此景，已远胜于许多身陷困境的同胞！咱们私下里说，对于那些贪心不足的渔利之徒，我们自有妙计以制之……"
 ita_reformed_squadracce:0 "改革行动队"
 ita_reformed_squadracce_desc:0 "行动法西斯，别名\"法西斯行动队\"，自1919年诞生，乃法西斯主义之先声，亦为国家法西斯党日后之武装羽翼。法西斯主义成为主导思想后，警察力量被政治化，从而降低了对准军事团体的依赖。\n\n然则，变革之风已至。\n\n行动法西斯将重装上阵，他们将武装起来，接受反叛乱和人群控制的专业训练，确保无人能够反抗法西斯主义。若他们心存家小，自当明白何去何从……"
 ita_produci_consuma_crepa:0 "生产、消费、死亡"
 ita_produci_consuma_crepa_desc:0 "意大利呼唤着经济腾飞，这也是我们对祖国的承诺。我们期望，国民各尽其职：辛勤工作直至力竭倒地，购买国货直至囊空如洗。他们的无私奉献将被铭记，他们将以法西斯主义的英名被载入史册。"
 ita_total_control1:0 "全面控制"
 ita_total_control1_desc:0 "经济改革大功告成，意大利终获其应有之繁荣景象，国家——即领袖——如同高超的木偶师般，操纵着经济之网。那些权贵官僚，原以为能左右经济大局，却不知自己不过是棋盘上的卒子，随时可替，随时可弃，他们纷纷解囊贿赂，以求自保不入清洗之列……\n\n意大利迎来破晓，然而，却裹挟着法西斯的阴翳，它将绵绵无绝期……"
 ita_reinforceing_autarky:0 "加强自给自足"
 ita_reinforceing_autarky_desc:0 "自给自足曾让我们的国家在战火中傲然挺立。首任领袖墨索里尼，以其先见之明，策划了一项让意大利摆脱对外资源依赖的策略。意大利人民的自我牺牲，他们放弃了许多生活必需品，全力以赴支持战争，使我们能够自产所需，坚持抗战，而其他强国早已认输。\n\n如今，尽管如今我们的殖民帝国比二十年前拥有更多资源，但仍难与帝国或美国等对手一较高下。因此，我们必须精进自给自足之策，确保在任何可能的全球冲突中，我们能够保持经济的独立与自主。"
 ITA_scorza_meh_autarky:0 "自给自足的意大利"
 ita_agressive_IRI_plans:0 "IRI的激进计划"
 ita_agressive_IRI_plans_desc:0 "工业复兴公司，国家全资拥有之经济巨擘。它反过来又控股了意大利及我们势力范围内的数百家中小型企业和工业，并通过提供补贴和招标，极大地帮助了包括私营制造业在内的所有企业。\n\n若要经济增长与控制并行不悖，我们需提升工业复兴公司的预算，扩大其对我们工业的掌控力，并确保其拥有实现国家利益所需的一切法律与物质手段。"
 ita_scorza_industry_expansion_tt:0 "§M这将有助于扩张我们的工业部门。§!\n"
 ita_new_heavy_industrial_expansion:0 "重工业的新扩张"
 ita_new_heavy_industrial_expansion_desc:0 "近年来，尽管被冠以“第三产业”的旅游业和金融业在GDP中占比不断攀升，实现了显著扩展，但重工业依然是就业的主力军。冶金、化工、制造业、军工等行业，为无数意大利人提供了生计，使他们免遭失业和贫困的双重打击。\n\n在开拓发展新领域之际，我们不应忽视传统产业的根基，要确保它们能够持续为国家供应所需的物资。否则，我们可能会发现自己缺少制造坦克所需的钢材，或是飞机所需的燃料。"
 ita_the_new_triad:0 "新三位一体"
 ita_the_new_triad_desc:0 "弹指一挥间二十载，三家企业以卓越品质和丰沛产量，成为我国工业的领军之师。菲亚特汽车公司在制造业中一马当先：其总部位于都灵，米拉菲奥里工厂便雇佣了近十万员工，公司在意大利各地的分支机构每月生产数以万计的汽车、坦克和飞机。安萨尔多公司作为我国最大的钢铁制造商，旗下拥有众多钢铁厂，生产包括船舶、铁路设备和火炮在内的多种产品。布雷达公司则几乎包办了我们所有的机车生产，同时也是步兵装备的主要供应者，从步枪到轻型火炮，唯独手枪由声名显赫的贝雷塔家族独领风骚。\n\n此三巨头将从我们的经济政策中获益匪浅，它们如同工业的擎天柱，既有广博的知识和雄厚的实力，能够为意大利提供所需的各类制造产品。"
 ita_work_harder:0 "更加努力工作"
 ita_work_harder_desc:0 "意大利的工人，个个皆是法西斯主义的栋梁！然而，我们仍需恳请他们暂时作出一些牺牲，在新工厂落成之前更加辛勤地工作，并借助吸纳众多失业者来充实我们的劳动大军。他们将得到应有的回报：所有愿意加班的工人都将获得丰厚的薪资增长！\n\n此举可望化解工人的不满，为我们急需的生产力增长注入一剂强心针……"
 ita_centralize_the_banks:0 "银行集中化"
 ita_centralize_the_banks_desc:0 "银行是现代经济的支柱，为那些胸怀壮志却手无寸金的智者提供资助，助其梦想成真。然而，银行也可能倚财仗势，图谋左右政府，使之沦为私利的工具，忘却了服务公众的初心……\n\n为确保银行业与我们对意大利的宏伟蓝图同频共振，意大利银行将被赋予更广泛的监督权，以确保各银行机构步调一致。财政部亦将握有尚方宝剑，在察觉银行行为不轨时，即刻将其纳入政府的严密监控之下。"
 ita_scorza_meh_finances: "§M这将有助于我们发展经济。§!\n"
 ita_spend_in_deficit2:0 "赤字开支"
 ita_spend_in_deficit2_desc:0 "为了滋养我们日益壮阔的经济改革之花，我们必须勇敢地踏上赤字之路。然而，我们不可将命运之锚抛向外国机构，让他们购买我们的国债，以免受制于人。因此，我们向我们忠心的国民发出号召，邀请他们购买一种崭新的爱国债券。\n\n从今往后，意大利人民将能够入手名为“爱国债务”的政府债券，它与通胀率挂钩，最低购买额亲民至工人的平均周薪，确保普罗大众皆能参与。四年期满，便能享受2%的免税利率，这不仅是对普通百姓的一份诱惑，同时对我们的国库来说，偿还起来也相对轻松。"
 ita_cheap_exports:0 "廉价品出口"
 ita_cheap_exports_desc:0 "我们的工业技术先进，不仅能生产少量的顶级商品，更能以低廉的价格大量供应品质可靠的商品。在全球技术产品市场上，目前竞争激烈，我们正与日本的财阀和美国的巨头展开激烈的角逐。为了稳固我们的市场地位，我们应当对成本较低的产品实行出口补贴政策，而将最优质的商品供应国内市场。\n\n要在价格和品质之间找到一个平衡点，虽非易事，但我们可以从我们势力范围内的国家开始探索。一旦我们掌握了其中的秘诀，便能在全球市场上轻松占据一席之地，提供那些普通家庭既买得起又乐于接受的商品。"
 ita_three_fourths_of_our_economy:0 "四分之三的经济"
 ita_three_fourths_of_our_economy_desc:0 "随着工业复兴公司的权势日增，加之我们对菲亚特-安萨尔多-布雷达这一新工业三巨头的持续投入，我们满意地看到政府已掌控了意大利经济的大半江山。我们无意全盘掌控，以免浮现机构膨胀、效率低下和腐败滋生的现象。然而，即便如此，我们依然能够游刃有余地推进改革，按照规划好的蓝图引导市场，无人能够阻挠我们。"
 ita_preferite_il_prodotto_italiano:0 "最喜欢意大利货了"
 ita_preferite_il_prodotto_italiano_desc:0 "“选择意大利制造！”\n\n这一号召在意大利的街头巷尾，通过公共媒体广为传播，海报与传单上也随处可见。为了经济增长，我们呼吁民众助力内需市场，青睐国产精品，而非远道而来的舶来品。从香醇的葡萄酒到鲜美的肉类，从驰骋的汽车到书写的铅笔，我们致力于确保国内工业不仅自给自足，更以物美价优赢得顾客的芳心。"
 ita_scorza_import_substitution_tt:0 "§M这将减少我们对外国产品的依赖。§!\n"
 ita_prohibity_imported_goods:0 "禁止进口货物"
 ita_prohibity_imported_goods_desc:0 "随着我们国家工业产出的稳步提升，各类产业蓬勃发展，生产出满足意大利人民需求的各类商品，我们得以逐步对进口商品实施精选禁令：先提高关税，渐次减少进口，继而适时推出禁令，对未经许可的外国商品说“不”。\n\n起初，民众或许有所怨言，但随着国内制造业的日益壮大与精进，这些不满之声将渐渐消散，直至彻底消失。\n\n意大利制造，卓越之选！"
 ita_invest_in_ersatz_goods:0 "投资替代品"
 ita_invest_in_ersatz_goods_desc:0 "上次战火纷飞之际，人民为了正常生活继续下去，找到了诸多替代品，例如替代茶叶的“卡卡代”和大麦制成的咖啡，意大利人为支持战争做出了许多牺牲。然而，时过境迁，我们现在追求的不再是那些低劣的替代品，而是那些物美价廉、高效实用的商品，这些商品将由我们的工业精心打造，让人民在不知不觉中适应我们新的自给自足政策，享受无忧生活。\n\n为此，我们将资助创新研究，探索以更少资源创造更多价值的方法。正如荷兰人昔日“海上乞丐”的精神，他们的船只虽用木钉代替铁钉，却依旧坚固迅捷，成为海上传奇。"
 ita_the_consumption_of_our_people:0 "人民的消费"
 ita_the_consumption_of_our_people_desc:0 "自给自足的政策落地生根，国内市场已尽在我们的掌中。意大利人民只钟情于国货，我们的宣传让他们心无旁骛，只向往意大利制造。市场生机勃勃，新工厂如雨后春笋般涌现，这正是我们工业兴旺的生动写照。"
 ita_invest_in_resource_extraction:0 "投资资源开采"
 ita_invest_in_resource_extraction_desc:0 "实现自给自足的关键在于提升我们自身的资源生产力：我们不仅需要制造出所需的各类商品，更要能够开采、培育或合成制造这些商品所需的所有资源，否则经济独立无从谈起。\n\n上一场战争为我们意大利本土以及我们的殖民帝国周边地区带来了新的土地，这些地区蕴藏着丰富的资源，只需适量的投资即可充分利用，为我国之繁荣昌盛贡献力量。"
 ita_scorza_resource_autarky_tt:0 "§M这将减少我们对外国资源的依赖§!\n"
 ita_albanian_oil:0 "阿尔巴尼亚石油"
 ita_albanian_oil_desc:0 "山峰连绵的阿尔巴尼亚，工业发展落后，农业亦不兴旺，但埃尼集团却对其地下深藏的油气宝藏寄予厚望。虽然利比亚和中东乃我们石油供应的主力，但在地中海之滨拥有一处可靠且安全的能源宝库，实为上策。\n\n海湾总督领的恩里科·马泰总是日理万机，但诱人的收益前景将吸引他派遣最优秀的勘探队伍前来，一旦他们定位到首口油井，生产工作预计将在数月之内展开。"
 ita_adriatic_coal:0 "亚得里亚煤矿"
 ita_adriatic_coal_desc:0 "自世纪之初，石油便以其高效能和便捷性取代了煤炭，成为能源之王。煤炭，这种昔日的工业血液，在钢铁生产等领域仍不失其重要性，且在殖民地遇到不测风云时，它仍可作为石油的可靠替代。\n\n直布罗陀大坝的建成，虽伴随着诸多非议，却也意外地揭示了亚得里亚海下丰富的煤矿资源。这些宝藏现已待人问津，我们应立即派遣勘探者深入海底，以期抢先开采，占得先机。"
 ita_tuscanian_iron:0 "托斯卡纳钢铁"
 ita_tuscanian_iron_desc:0 "托斯卡纳，不仅仅因为它的文化和它生产的大理石闻名，自二十年代后半叶以来，这里也迎来了工业化的春天。如今，大型工厂如繁星点缀在这片宁静的田野上，赋予了这片土地新的活力。\n\n在增加并优化工业部门的道路上，我们计划扩大托斯卡纳的铁矿开采，尤其是在佛罗伦萨和皮翁比诺周边地区。我们将对这些地区的钢铁厂给予财政补贴，确保原材料从矿山到工厂的运输既经济又高效，实现成本最小化，时间延误降至最低。"
 ita_land_grants_to_italian_farmers:0 "拨出土地给予意大利农民"
 ita_land_grants_to_italian_farmers_desc:0 "在古罗马时期，西西里岛被誉为意大利的“粮仓”。然而到了今天，西西里岛的粮食生产已不足以自给，波河平原同样无法满足我们对食品的不断增长的需求。正如我们在意大利统一时期对那些荒废的教会土地“永佃田”进行的改革一样，我们将再次将国内未耕之地或荒地赋予那些愿意将其变为沃野的贫困者。\n\n此举将为无数农民开辟稳定的生计，提升农业产出，同时从土地的租金中获得源源不断的收益，真可谓一举多得，事半功倍。"
 ita_rationalize_imperial_agriculture:0 "打理帝国农业"
 ita_rationalize_imperial_agriculture_desc:0 "我们的殖民地，如利比亚海岸，以及尼罗河谷的肥沃地带，蕴藏着广袤的可耕之地。然而，当地农民仍守着传统低效的耕作方式，他们正是我们推动农业革新与现代化的理想对象。\n\n通过发放农业机械补贴，激励他们摒弃旧法、采纳新技术，我们不仅能大幅提升帝国的农业产出，还能平息民怨，因为当地农民也能通过向殖民政府出售丰收成果，获得更多收益，实现双赢。"
 ita_win_the_battle_for_grain:0 "赢得小麦之战"
 ita_win_the_battle_for_grain_desc:0 "墨索里尼发起的“粮食之战”曾是意大利迈向经济强国之路的关键战役。而今，我们终于能够战胜对外依赖，实现自给自足。得益于我们之前的改革，意大利的粮食和肉类生产已经能够自足：乡村遍布着一眼望不到边的现代化高效农场；日日夜夜，帝国的货船载满各类食材，在我们的港口络绎不绝。\n\n饥饿已成旧日噩梦，随风而逝，我们得以心无旁骛地追逐经济增长。此刻，我所求的，仅是些许令人心旷神怡的娱乐……"
 ita_the_production_of_our_country:0 "全国的生产"
 ita_the_production_of_our_country_desc:0 "我国终于接近实现资源生产的自给自足：工业因运输便捷、关税全免，得以低成本生产各类所需商品。尽管仍有一些稀有材料是意大利所没有的，这让我们无法彻底摆脱进口，但总体来看，成果已经相当令人满意！\n\n若世界再次陷入纷争，意大利将能自力更生，确保人民所需无缺，而其他国家或许将面临饥馑之苦！"
 ita_are_controlled_by_the_state:0 "都掌握在国家手中"
 ita_are_controlled_by_the_state_desc:0 "我们经济改革的奠基之石已然稳固。工业、私人消费和总体生产都已置于公共的控制与监管之下。在这块基石上，我们将筑起改革的宏伟大厦。\n\n随着意大利经济与政府的需求和项目紧密结合，全国上下将同心协力，共同迈向经济增长的康庄大道，技术革新的光辉未来，更为重要的是，引领意大利人民走向繁荣昌盛的新时代！"
 ita_a_new_quota_90:0 "新指标"
 ita_a_new_quota_90_desc:0 "我们计划的第一步是稳定提升生产配额。随着国内原材料供应的充裕，生产效率已然大幅提升，加之新工厂在全国各地如雨后春笋般涌现，我们无需再让工人们加班劳作。从今往后，我们将着眼于采用更先进的生产技术，扩大生产规模，以期在商品的数量与质量上与美国一争高下，甚至更胜一筹。"
 ita_challenge_the_reichsmark:0 "挑战德国马克"
 ita_challenge_the_reichsmark_desc:0 "自上一场战争尘埃落定，英国经济霸权便成往事，帝国马克崛起，成为新的金融霸主。然而，德国经济如今日渐式微，正是里拉上位之时，以挑战其在贸易往来中的主导地位。\n\n虽然连我们最爱国的经济学家也坦承，要与美元和日元的普及程度一较高下尚有难度，但通过巧妙的政策布局和与那些急于从轴心国的瓦解遗毒中自救的国家签订有利的贸易协定，我们有望为里拉在世界金融舞台上赢得一席之地。"
 ita_monumental_projects:0 "纪念工程"
 ita_monumental_projects_desc:0 "泱泱大国，当建丰碑以记昔日荣光，激励后人再创辉煌！怀此心意，我们将为法西斯主义的英雄及其成就建立宏伟的纪念碑：墨索里尼的改革与胜利、意大利士兵和工人的无私奉献、法西斯主义之力量与团结精神，以及意大利民族整体的英雄气概，将借助城市各处的艺术杰作来颂扬！"
 ita_legacy_of_piacentini:0 "复兴碑铭主义"
 ita_legacy_of_piacentini_desc:0 "随着领袖与党之高官在意大利各地为新纪念碑揭幕，他们的演讲颂扬了古今建筑艺术的交融，表达了作为这片伟大而美丽国土领袖的自豪与欢欣。\n\n我们乃是诗人、艺术家与英雄的摇篮，是圣人、思想家与科学家的家园，是航海家与探险家的舞台。我们是意大利人民，并将永远如此！"
 ita_an_empire_rebuilt:0 "帝国重建"
 ita_an_empire_rebuilt_desc:0 "当卡洛·斯科尔扎执掌权杖时，意大利曾因那些软弱无能的统治者而步履维艰。如今，放眼望去，他所成就的辉煌。不，让我们瞩目我们共同铸就的辉煌！意大利正焕发着前所未有的繁荣，工业如泉涌般为国家注入生机，铁路似血脉般，将活力输送至每一个角落。\n\n我们的殖民地，宛如金匠巧手镶嵌于至尊皇冠上的璀璨钻石，与我们的国家紧密相连，成为我们经济共同体中不可或缺的一部分。\n\n我们的帝国，已在法西斯主义坚如磐石的意志下，浴火重生，重新铸就。让风雨来吧，我们已整装待发！"
 ita_fascism_is_a_method:0 "法西斯主义是手段"
 ita_fascism_is_a_method_desc:0 "法西斯，非徒国家治理之术，它是民心所向，是智慧的巨擘，引领意大利迈向更加辉煌与强盛的明天。国家法西斯党曾长期在命运的十字路口徘徊，目标模糊。那些观望的力量，任由法西斯主义步入衰败与腐朽，更甚者，使其背离了我国之根基。\n\n然而，斯科尔扎的横空出世，将改写这扭曲的一切，我们将使法西斯主义臻于至善至美，成为最纯粹之体现。政治舞台上的纷繁势力，都将顺应领袖的意志，过往的积弊将被革除，为国家的强大铺就道路。"
 ita_the_tentacles_of_the_OVRA:0 "OVRA的触须"
 ita_the_tentacles_of_the_OVRA_desc:0 "反法西斯监察与镇压组织（OVRA）乃法西斯主义中历久弥坚的机构之一。自1927年成立以来，作为一支仅向领袖负责的秘密警察力量，它拥有对民众生杀予夺的大权，确保意大利不受反法西斯分子的侵蚀，并对德国盖世太保的成立产生了深远影响。\n\n意大利王国在过去二十年间蜕变为帝国，OVRA亦随之羽翼渐丰，它继续紧盯着民众，捕捉着异见的蛛丝马迹。但如今，对OVRA捍卫法西斯革命能力的质疑声渐起，斯科尔扎领袖面临着如何回应这些非议的抉择。"
 ita_reform_the_OVRA:0 "OVRA改革"
 ita_reform_the_OVRA_desc:0 "有人或以叛国之名斥之，然对OVRA的批评之声，他们的评价不见得全无接纳之处。一个机构，若其膨胀不堪、压迫民众且腐败透顶，对国家法西斯党与意大利民众毫无责任感，我们岂能再三容忍？斯科尔扎将对OVRA进行刮骨疗毒之改革，削减其赘余，重塑其锋芒，以应对意大利人民当下所面临的挑战，而非遥想当年之敌。"
 ita_reorganize_the_CPC:0 "重组中央政治档案馆"
 ita_reorganize_the_CPC_desc:0 "领袖深知OVRA为法西斯革命之坚强后盾，亦明其改革之必要。首要之务，便是聚焦于中央政治档案馆，这是OVRA最引以为傲的成就。该档案馆囊括了意大利帝国境内所有颠覆分子与可疑人士之详尽档案，乃压制反法西斯活动之利器。然岁月流转，无序之增长令其渐显杂乱。斯科尔扎决意整顿档案馆，以令OVRA如虎添翼，更有效地守护意大利，抵御异己之声。"
 ita_reinforce_the_repression:0 "加强镇压"
 ita_reinforce_the_repression_desc:0 "那些认为OVRA专制或过时的人，无疑是异想天开。亚特兰特罗帕的风波，大日耳曼国的轰然崩溃，以及美国无休止的施压，皆映射出法西斯主义愈发艰难的处境。OVRA亟需的不是削弱，而是强化。斯科尔扎将赋予它更大的权柄，以洞悉民情，暗流深处，敌影潜行，它们静待破晓。"
 ita_reshuffle_priotities:0 "调整优先级"
 ita_reshuffle_priotities_desc:0 "在过去二十年里，只要是不与世隔绝的人皆能察觉，共产主义与自由主义已不再对意大利的稳定构成严重威胁。然而，尽管法西斯主义已在意识形态之争中取得胜利，OVRA仍似对待迫在眉睫之敌般行事。\n\n斯科尔扎深知，这种荒谬之举必须被终结。意大利真正的威胁并非那些颠覆性思想，而是那些侵蚀国家法西斯党和意大利国家机构的功能性障碍、腐败以及私欲之巨壑。斯科尔扎将调整OVRA的焦点，他们将斩断意大利之腐根，以免其侵蚀法西斯所筑之基。"
 ita_an_efficient_OVRA:0 "高效的OVRA"
 ita_an_efficient_OVRA_desc:0 "OVRA并非一个高效运作的机构，它更像是一个每年耗费数亿里拉、却效率低下、滋生腐败的庞大机构，它监视着数百万意大利普通公民，追寻着虚无的国敌。\n\n斯科尔扎决心结束这种浪费资源的情景。他深知，OVRA根本无需草木皆兵，对每个意大利人皆行监视。他将精简机构，裁汰冗员，让机构聚焦于政府官员及其他显要人物，从而将OVRA转变为一个能够真正维护意大利人民利益的高效机构。"
 ita_clean_up_the_archives:0 "清理档案"
 ita_clean_up_the_archives_desc:0 "与任何机构一样，OVRA的储藏室存有不少丑闻档案，甚至在数量上远超其他政府机关。若其中任何一项争议行动公之于众，可能会引燃人民对我党的愤怒。为了不让噩梦成真，我们将整理OVRA的档案，删除所有“不当行为”的证据。所有秘密会带到只有少数人可以进入的金库，若想保守秘密，也必须对自己隐瞒。"
 ita_a_fearsome_OVRA:0 "OVRA的可怕之处"
 ita_a_fearsome_OVRA_desc:0 "马基雅维利曾言，令人畏惧胜于受人爱戴，这一原则在OVRA的行动中得到了极致的体现。正是依靠恐惧，意大利才得以防范叛国行为。若非如此，法西斯主义早已成为历史的尘埃。然而近年来，意大利似乎忘记了对我们的敬畏。我们将以一次刻骨铭心的教训，唤醒他们心中沉睡的恐惧。"
 ita_total_control:0 "尽在掌握"
 ita_total_control_desc:0 "墨索里尼深谙极权主义乃法西斯主义之魂。若不能对民众实施绝对控制，法西斯主义便无从谈起！斯科尔扎为了坚守这极权法西斯之精神，将大举扩张OVRA的监视网络。摄像头将遍布每条街道，密探将潜入每个社区。一切逆反行动皆难逃其法眼，法西斯国家的意志将通过它们得以体现。"
 ita_corruption_in_the_PNF:0 "党内腐败"
 ita_corruption_in_the_PNF_desc:0 "墨索里尼昔日所结交的无政府主义者曾言，权力滋生寄生虫，此言不虚。自我们战胜西方的那些颓废帝国后，国家法西斯党在自满中沉沦，已与昔日推翻的腐败资产阶级政客无异。贿赂、贪污等政治腐败行为已泛滥成灾。许多党员将党籍视作谋求私利之手段，忘却了服务国家之责。\n\n这种腐败现象侵蚀着民众对法西斯事业的信心与国家法西斯党的威望，若不根除之，意大利恐成大日耳曼国之覆辙。斯科尔扎为救国家法西斯党于水火，将授权OVRA深挖党内腐败。那些玷污墨索里尼理想的寄生虫，必将被一网打尽，绳之以法。"
 ita_follow_the_money:0 "追踪现金"
 ita_follow_the_money_desc:0 "法西斯政策的精髓在于政府与私营部门的携手合作，其目的是为了国家整体的福祉。然而，公私合作虽带来了胜利与繁荣，却也种下了腐败的祸根。经年累月，暗流涌动的金钱交易让特权阶层对国政有了过大的操控力。腐败之网已从庙堂之高蔓延至江湖之远，要一举拔除，难如登天。\n\n斯科尔扎深知此网不除，国家将永无宁日，故将授权OVRA深入虎穴，追根溯源，誓要将腐败连根拔起。"
 ita_invest_in_modernization:0 "投资现代化"
 ita_invest_in_modernization_desc:0 "战火洗礼之后，情报界迎来了翻天覆地的变革。无线电技术的普及与电子设备的微缩为监控民众带来了新的手段。斯科尔扎深知OVRA若要与时俱进，必须掌握这些新工具与策略。他决心投入资源，研发比肩秩序警察或联邦调查局的尖端装备，并为OVRA人员打造一套现代化的训练体系。"
 ita_new_ispettorati_speciali:0 "新任特别监察官"
 ita_new_ispettorati_speciali_desc:0 "特别监察官，乃OVRA麾下级别最高、令人闻风丧胆的特工。他们负责亲自追踪可疑分子，却行踪隐秘，不露锋芒，是OVRA行动中不可或缺的关键。斯科尔扎决意扩充这支队伍，确保无一漏网之鱼，让颠覆分子无处遁形。"
 ita_with_every_method_available:0 "用尽其术"
 ita_with_every_method_available_desc:0 "为了捍卫法西斯主义之名，我们不择手段。正是我们开创了世界各国主要情报机构都在使用的\"强化审讯\"手段。民众曾对黑衫军及其蓖麻油手段谈之色变。而今，我们不仅要恢复此道，更要采纳新的强制手段。待斯科尔扎大功告成，OVRA定能令人身受尽折磨而不致死。愿逆贼为此心惊胆战，颤栗不已！"
 ita_OVRA_special_facilities:0 "OVRA的特别设施"
 ita_OVRA_special_facilities_desc:0 "有许多对OVRA运转至关重要的活动，但长期以来，只能秘密开展工作，以避公众耳目。斯科尔扎明白秘密行动往往困难重重，而要方便行事，将为OVRA建造多个特殊设施，这些地方将是关押嫌疑人和执行不太体面行动的完美选择。公众永远不会知道OVRA的业务，为了更好的明天。"
 ita_the_crown_and_the_court:0 "王室与王宫"
 ita_the_crown_and_the_court_desc:0 "意大利君主制，作为唯一未受法西斯主义影响的机构，数十年如一日，超然于革命浪潮之外，却依旧深受百姓爱戴。斯科尔扎因此渴望探其深浅，国王及其使者的背后究竟隐藏着怎样的秘密，无人知晓。OVRA将揭露王冠下的秘密，若有必要，这些将作为制衡王室的关键。"
 ita_the_bankers_and_the_industrialists:0 "银行家和工业家"
 ita_the_bankers_and_the_industrialists_desc:0 "斯科尔扎的办公桌前，终于堆满了调查的累累硕果——一页页文件揭露了金融家、实业家和名流伸向国家机构的触角。在某些案例中，腐败已深入企业骨髓。斯科尔扎决心要终结这些行径。下令拘捕那些侵蚀意大利肌体的银行家与实业家，令其接受法律的审判。这一行动将警示后人：国家必须凌驾于企业之上，绝不可本末倒置。"
 ita_the_church_and_the_vatican:0 "教会与梵蒂冈"
 ita_the_church_and_the_vatican_desc:0 "教会与OVRA的纠葛，宛若一幅历史悠久、色彩斑斓的画卷。人们往往忘却，教会并非意大利的附庸，而是与其携手并进，共创辉煌的伙伴。这份伙伴关系背后，是OVRA对梵蒂冈施加的深远影响。教会自诩道德的灯塔，但实际情况远非如此简单。无数教会成员涉足各种腐败堕落行为，从贿赂、通奸到同性恋甚至恋童癖。\n\n墨索里尼过去常对OVRA特工送来的揭露神职人员丑行的报告感到满意，斯科尔扎亦认为这一传统应当延续。OVRA将梳理一份报告，昭示教会的伪善本质，待报告大白于天下，领袖将向梵蒂冈提出一份不容推辞的提议。"
 ita_the_communists_and_the_traitors:0 "赤匪与叛徒"
 ita_the_communists_and_the_traitors_desc:0 "意大利民众皆识自由主义与共产主义对国家政治的危害。几十年前，此二疾曾侵蚀国本，至今仍旧对法西斯革命的果实虎视眈眈。亚特兰特罗帕的余波，让成千上万的意大利人对法西斯主义怀恨在心，易受异端邪说所惑。\n\n共产主义与自由主义，犹若潜影随行之疫，若国家稍有不慎即乘虚而入，我们必须时刻保持警觉。斯科尔扎将下令对潜藏在我们中间的共产党人和叛徒进行新一轮的打击，以防止他们摧毁法西斯主义所建立的一切。"
 ita_indiscriminate_terror:0 "无差别恐吓"
 ita_indiscriminate_terror_desc:0 "昔日，OVRA为省事只将目光投向那些最易受颠覆思想影响的群体——工人、知识分子、学生以及外籍人士。此举虽曾显效，然而今日之后，社会各阶层皆难逃其审视之眼。\n\n斯科尔扎誓言，OVRA之手将遍及社会，无论是士兵、商人、资本家，还是黑衫党成员，都逃不出它的手掌心。唯有以无差别之震慑，法西斯之治方能长存。"
 ita_Volontaria_per_la_Repressione_dell_Antifascismo:0 "法西斯主义常态化"
 ita_Volontaria_per_la_Repressione_dell_Antifascismo_desc:0 "二十年法西斯主义统治之后，意大利人民已全然投身于我们的事业之中。他们自觉维护着法西斯主义的理念，无需OVRA的铁腕手段。法西斯主义将因人民的自愿合作而历久弥坚。改革后的OVRA，将化身为法西斯主义的守护者，而非压迫者，以温和的守护代替强硬的执行。"
 ita_Vigilanza_e_Repressione_dell_Antifascismo:0 "镇压反法西斯主义之盾"
 ita_Vigilanza_e_Repressione_dell_Antifascismo_desc:0 "我们历经艰辛，岂能让颠覆者在此窃喜。斯科尔扎领导下的OVRA已经焕然一新，现代化的它更能有效地守护意大利，抵御反法西斯的浪潮。所有与法西斯为敌者都需要认识到：意大利绝不会容忍他们的叛国行为。"
 ita_Vigilanza_dei_Reati_Antistatali:0 "监视反国家罪行"
 ita_Vigilanza_dei_Reati_Antistatali_desc:0 "斯科尔扎深谙法西斯主义存亡之道，唯有坚决抵御一切反国家之举，方能保其不衰，因此他赋予了OVRA空前的权力。对法西斯主义的犯罪，不单是对国家的犯罪，更是对整个政治体系的攻击。\n\n虽有好事之徒将其政策与海因里希·希姆莱之流相提并论，斯科尔扎却不为所动。其治国理念简明扼要：国家之内，包罗万象；国家之外，寸草不生；一切不得逆国家之意志。"
 ita_the_matters_of_the_party:0 "党内事务"
 ita_the_matters_of_the_party_desc:0 "国家法西斯党，抱残守缺，未能洞悉世事变迁，对法西斯主义和世界的认知充满了谬误、缺陷乃至彻头彻尾的错误。他们成为了国家之短板，引领着民族走向衰败与堕落，损害了领袖的力量，也拖累了意大利之未来。\n\n这个空洞的政党需要被注入新的目标，赋予其在齐亚诺治下所失的方向与领导力。斯科尔扎将对党进行重组，摒弃一切阻碍真正法西斯主义的藩篱，确保党再度成为领袖与意大利的忠诚仆人。"
 ita_back_to_1919:0 "回到1919"
 ita_back_to_1919_desc:0 "意大利必须适应不断变化的世界秩序，而解决困境的办法不是重蹈覆辙。我们过去的理念是控制一切与中央集权的单一制统治，这种痴人说梦严重抑制意大利帝国力量的迸发！\n\n我们必须回到1919年，改革、自治，甚至是隐隐中的民主，都是我国在未知明天压力下的生存必需品。尤其是要保留墨索里尼英雄行为赋予我们的精神内核，失败只会让我国进一步走向堕落与失败，而反过来，我们必须向前迈进不固守，利用过去打造更强大的未来！"
 ita_back_to_1922:0 "回到1922"
 ita_back_to_1922_desc:0 "也许我国最重要的组成部分是全民的共同意愿，一个由墨索里尼和法西斯主义建国哲学紧密结合的统一国家。我们既不允许自己抛弃让意大利披上人民外衣的力量，也不能疯狂到试图控制一切事物。要在党的两端取得平衡，这样才能不因国家认同感缺失的阻碍，而踌躇不前。回顾二十年代的智慧：以国之名、党的强力意志与法西斯主义精神的核心！"
 ita_back_to_1939:0 "回到1939"
 ita_back_to_1939_desc:0 "只消看看那最辉煌的胜利——二战之新秩序，就能明白我们必须回哪去。全胜的荣光指明出路，胆敢阻碍我们必被推入深海。暗地里的叛徒，不再容忍！盼着我党陨落神坛的家伙，先让他跌落谷底！没有对国家与领袖的绝对忠诚，你什么也不是。我们曾沉沦在齐亚诺腐朽的统治下，让党准允自己软弱、易变，腐化到根里……不会再有了，党将由内而外得强化。从罗马到亚的斯亚贝巴，各地人民会忠诚至绝对。让世界见识意大利之力！"
 ita_federalize_the_PNF:0 "联邦化法西斯党"
 ita_federalize_the_PNF_desc:0 "所谓的党所指的“反对派”，名不副实，不过是权力游戏的幌子。那些愚蠢的游行，作为旧时代的遗物，已无需用来控制局面，它们将被彻底取消。然而，席位的分配亟待革新。必须推行由党划定州界的联邦制度——让每个州都能选出代表，以确保地方民众的声音得到更真切的反映。\n\n当然，所有官员都将在党高层的直接监督下选拔，这个制度必将为公众呈现一幅更加逼真的民主画卷。"
 ita_rely_on_gerarchia:0 "依靠《等级制度》杂志"
 ita_rely_on_gerarchia_desc:0 "意大利的《等级制度》，作为国内顶尖且唯一的官方新闻机构，自诞生之日起便忠诚地为国家发声。它昭示了一个真理：要使我们的政治体制长久维系人民的坚定信念，就必须扩大其对国家的责任。《等级制度》将得到增援的人手、充实的资源和充裕的资金，它将受到前所未有的重视。此外，它还将被命令在全国范围内扩展其业务——确保《等级制度》的报纸传遍千家万户，让每位公民都能阅读到最新版，感受到领袖带给意大利的每一个伟大胜利。"
 ita_all_the_duces_men:0 "皆为领袖之人"
 ita_all_the_duces_men_desc:0 "我们虽然放弃了对党中每一位官员颐指气使的权利，但这却能铸就更为珍贵的团结氛围，让全党一心上下向着领袖。我们将巧妙布局，令国家法西斯党的高层官僚对我们忠心不二。这些领袖将引领着下属，确保其下忠诚如磐石般稳固。\n\n即便个别党员的忠诚有所保留，党派亦将展现出前所未有的团结，众志成城，致力于在斯科尔扎领袖的引领下，将意大利建设得更加繁荣昌盛。"
 ita_demand_absolute_loyalty:0 "要求绝对忠诚"
 ita_demand_absolute_loyalty_desc:0 "党派当铭记一训：不服从不容姑息。凡背离党纪的党员，一经揭露，必严加处置。此事不必仓促行事，亦无需公之于世，只求让心存异志的党员三思而后行。官员亦非法外之人——那些行差踏错之人，将被我们忠心的宪兵部队予以“惩戒”。\n\n步入威尼斯宫，每一位法西斯党成员心中都铭记着：他们的忠诚，只向领袖一人献祭。"
 ita_ent_nazionale_di_assistenza_fascista:0 "国家法西斯援助机构"
 ita_ent_nazionale_di_assistenza_fascista_desc:0 "党内的最新动向虽然确实增强了人民对国家内部事务的信任与影响力，但我们还有一道未跨过的坎。至今，能够参与投票选择地区代表的意大利公民数量依然很少——尽管最终的当选者还是由国家来确定。为进一步赢得民心，我们何不更进一步：让人民直接对法西斯党候选人进行投票。虽然候选人的筛选仍旧掌握在我们手中，此举无疑将大幅提升人民对党权力的感知，必将受到民众和自由世界的热烈响应。"
 ita_control_the_gerarchia:0 "控制《等级制度》"
 ita_control_the_gerarchia_desc:0 "《等级制度》，作用虽大，却亦非完美无缺。民众对其所发行的刊物虽有所喜爱，但内心深处更渴望一种新的新闻声音：由平民百姓撰写，不受国家直接操控。我们自然是不能任由言论无拘无束——以免动摇政权之根基。然而，要真正迎合民心，新闻自由之门必须适度敞开。我们将放宽对信息传播的严苛限制，或许还将允许独立新闻机构在国土上生根发芽。然而，党内一些坚守法西斯旧念的人士，虽已日渐稀少，但他们对意大利逐渐放权的现状不免心生怨言。\n\n但为了人民福祉与政权的稳固，至少须让涓涓信息之流，再次自由奔涌。"
 ita_keep_up_the_facade:0 "维持假象"
 ita_keep_up_the_facade_desc:0 "我们的形象，世界瞩目。我们的政策，乃秩序与和平的守护者，但世界强国，尤其是美国及其盟友，视我们的统治为残酷独裁，认为我们竭尽所能地压制人民。\n\n为了巩固我们的地位，我们必须着手重塑我们的形象——我们不能让自己与世界其他地区，包括自由国家组织，相互隔离开来。我们将开展一系列改革，例如派遣使团至他国，塑造意大利为人民之国的形象，运用媒体之手，让我们的政权更显亲和力。\n\n法西斯主义将被赋予一张亲民的面孔——或许这种外在的展示与事实略有偏差，但毕竟，外在之貌往往胜过千言万语。"
 ita_entrench_the_party:0 "巩固党派"
 ita_entrench_the_party_desc:0 "党虽为帝国之大业助力，却独缺一统天下之权。他们对此略显力不从心，但仍难以强推其责。固然，万物终将屈服于斯科尔扎领袖的铁腕，然此非长久之计。党需加固，权需扩张，势需蔓延。国家法西斯党将无孔不入，渗透至意大利生活的每一角落，即便是那些尚存的零星未触之地。"
 ita_support_from_the_shadows:0 "暗中支持"
 ita_support_from_the_shadows_desc:0 "在芸芸众生视线不及之处，隐匿着权势滔天之辈——他们既是意大利巨擘企业的幕后金主，又是操纵着帝国石油、资源等经济命脉的强势利益集团的领袖。这些人物在我们政权的核心有着举足轻重的势力，若缺失了他们的援手，我们难以维系长久。\n\n这些金钱巨擘所持之权势过于庞大，我们难以一言不合便与之割席——我们只能选择与之周旋。通过更多的利益诱惑，他们也会认识到，支持我们的政权是一条既轻松又利润丰厚的道路。一旦获得了他们的默许，甚或能赢得他们的积极支持，我们对政权的稳定和安全就会更有保障。"
 ita_allow_official_currents:0 "允许党内辩论"
 ita_allow_official_currents_desc:0 "将党中每一位成员都置于领袖的直接视线和掌控之下，未免过于天真——随着改革的不断深化，我们对每位党官员的心思和手段的把握便愈显无力。我们应放弃那些控制威尼斯宫每一句话的徒劳之举，学会包容不同声音的出现，哪怕它们有时可能不尽如人意。辩论将重返舞台，虽仍受限，却也未必总是对领袖唱反调。\n\n虽然这似乎意味着权力的又一次流失，但为了继续稳固我们对意大利的掌控，我们将采取一切必要的行动。"
 ita_elected_federali:0 "联邦选举"
 ita_elected_federali_desc:0 "我们岂能将权力之钥轻易交给芸芸众生——此举无异于引火烧身，必将使国家陷入一片混乱。然而，我们亦不能总以民主之名，行压制之实，不让他们触及真正的权力。让我们从古罗马帝国的智慧中汲取灵感：设立一个独立机构，类似于平民议会——这个议会将披上民主的外衣，由民众选举产生。他们虽不能左右政府的日常运作，却能通过诸如有限的否决权和法律修订之权，对意大利的事务施展影响。\n\n平民们将获得他们的一席之地，哪怕这份权力带着几分无奈与辛酸。"
 ita_the_gerarchia_watches_over_you:0 "等级之眼，俯瞰众生"
 ita_the_gerarchia_watches_over_you_desc:0 "《等级制度》亟待革新：它应唤醒意大利民众心中之责。街头巷尾，公民都应随处可见“你为意大利帝国的辉煌尽忠了吗？”之问。《等级制度》将如每个公民之兄长，时刻警醒着失败的代价。此机构将提醒每位公民，唯斯科尔扎领袖值得忠诚，其余皆为虚言。《等级制度》将化作政权之巨臂，遍及民众，成为引导之力量，令彷徨者归心于上帝所赐意大利之最佳治道。\n\n《等级制度》将洞察秋毫，民心顺从，深知违逆之果。"
 ita_control_through_fear:0 "以惧驭人"
 ita_control_through_fear_desc:0 "帝国的每一位公民都应深知，忠于领袖乃其不可推卸之责。难道帝国的每一位公民不应当认识到，任何悖逆之言皆是对意大利良民身份的亵渎？每一位党官员同样都应清楚地知道，他们的忠诚归属于何方，他们所服务的究竟是谁。\n\n这些生活的根本真理亟需深入人心，不断强化，违者必受严惩，以儆效尤。无人能够逍遥法外——他们将面临最为峻厉的惩处，确保他们深刻内化这一认知。无人敢于触犯领袖的威严，因为他们心知肚明，背叛者将遭受何种命运。\n\n我们将以铁腕手段确立秩序，以雷霆之势巩固权力，以坚定意志激发忠诚。"
 ita_a_new_for_of_totalitarianism:0 "极权主义新改革"
 ita_a_new_for_of_totalitarianism_desc:0 "斯科尔扎领袖必须进一步将国家大权集于一身。虽然我们已经有效地使党派顺从其意志，但我们还需更进一步，驯服党内那些喧嚣的力量，就是那些在暗地里图谋，企图将领袖的权力据为己有的阴谋家。我们将对党员逐一审查，杜绝此类行径，迅速扑灭任何非分之想。意大利公民亦须铭记此训——反布尔什维克斗争将愈演愈烈，民众中将进一步展开大规模的逮捕行动。在每位社会成员心中深植忠诚之种，虽任重道远，但随着日新月异，我们赢得的民心与日俱增，权力亦随之巩固。\n\n斯科尔扎领袖将君临天下，以亿万意大利子民的心灵之力为翼。"
 ita_autonomy_to_PNF_organizations:0 "法西斯党组织自治"
 ita_autonomy_to_PNF_organizations_desc:0 "党派，本应雄心勃勃，目标远大，却囿于意大利高层的直接操控。一切大政方针或变革之举，都必须领袖点头；这一机制显然拖慢了这些组织的效率和反应速度。《等级制度》、OVRA等机构，无一不依赖领袖的决断。\n\n此等局面，不可持续。尽管放权令人不舍，但为使帝国管理更加高效，党内各机构亟需赋予自主之权，以便它们能重振雄风，在帝国的管理中发挥举足轻重的作用。"
 ita_autocracy_on_the_way_to_democracy:0 "从独裁走向民主"
 ita_autocracy_on_the_way_to_democracy_desc:0 "帝国历经沧桑巨变，我们已不再是传统意义上的极权国家——尽管意大利不再是帝国，却也不再直接受领袖掌控。\n\n在意大利社会，成员们纷纷排队选举代表，报纸由民众亲手撰写——更令人震惊的是，威尼斯宫中的辩论有时并不站在领袖一边。意大利面貌一新，我们对国家的直接操控力难免有所减弱。\n\n法西斯主义虽历经变迁，但我们始终铭记墨索里尼的立国之本——为了坚守国家的根本，改革势在必行，而通过我们有针对性的努力，这一目标已经达成。\n\n守旧派人士或许心存怨言，改革派人士自然欢声载道，而民众对意大利政府的现状已感到心满意足。这条道路虽然崎岖，但终究不过正道沧桑。"
 ita_discipline_from_above:0 "自上而下的纪律"
 ita_discipline_from_above_desc:0 "我们以壮志凌云之力，铸就了坚不可摧的党；群众亦步亦趋，纷纷效忠于我们。我们未曾偏离墨索里尼所树立的法西斯主义理想，此乃不争之实。\n\n不，我们的成就，实为对其理念的颂歌。法西斯主义如今坚不可摧，成功之路已由我们战胜那些企图摧毁我们的敌人的胜利铺就。外来之影响已从民众心中剔除，而外界对我国之观感日趋向好。党已在领袖的引领下，即便不是直接控制。我们沿着先辈足迹，筑基其上，树立了法西斯主义的光辉典范。\n\n有人质疑，我们是否本可为意大利做得更多——采取更为激烈之举，实施更为极端之变革。但这些担忧对我们来说并不重要。\n\n毕竟，变则通，不变则废，万物皆然。"
 ita_the_masses_want_to_be_governed:0 "民心向治"
 ita_the_masses_want_to_be_governed_desc:0 "我们已将法西斯主义的辉煌形象提升至完美之境，此乃领袖墨索里尼所勇敢开创——领袖在党之上，党则洞悉意大利生活的每一层面。任何逆流而动的异议，都将被我们铁腕镇压，一如那些企图将意大利拉回堕落衰败旧日的势力——无论是煽风点火的自由派，还是权欲熏心的贪婪者，以及形形色色的堕落行径，都将被我们斩草除根。民众将欣然接受我们的统治，若不，他们将自食其果，去领悟服从之必要。"
 ita_parcere_subiectis_debellare_superbos:0 "抚顺以宽，摧傲以严"
 ita_parcere_subiectis_debellare_superbos_desc:0 "在应对我们的子民与附庸时，我们应以灵活之道待之。对于那些迅速归顺并尽其所能参与同化的人，我们可以通过允许一定程度的自治并提供对他们的支持，来积累他们的好感。这将促进其他臣民与我们更进一步的合作。但是，面对那些顽固不化的原住民，我们将别无选择，唯有果断出击，以儆效尤。毕竟，我们不轻易言战，但一旦出言，便如箭在弦，势在必行。"
 ita_the_burdens_of_the_empire:0 "帝国之重担"
 ita_the_burdens_of_the_empire_desc:0 "帝国，意大利民族现代史的璀璨篇章，但它也带来了一些棘手的问题。统治众多民族与征服之地的政治实体，难免面临凝聚力的考验。名义上虽然我们属于同一政府，但那不勒斯的帝国公民若身在迪拜，甚至在更加融合的班加西，恐将感到茫然若失。汇聚这些异彩纷呈的群体与昔日诸国于一面旗帜之下，是一项需耐心与毅力并重的伟业，然一旦达成，我们必将收获累累硕果。"
 ita_a_fascist_empire:0 "法西斯帝国"
 ita_a_fascist_empire_desc:0 "意大利帝国孕育于法西斯主义，若要长存，便需与之同呼吸共命运。法西斯主义，秩序与稳定的灯塔，国家权威的化身，自然而然地成为了帝国治理的体系。正如法西斯标志将细棍凝聚成坚如磐石的束，我们的帝国亦将在国家大旗之下，汇聚融合所有子民的意志与梦想。鹰将永远栖息于意大利母亲之肩，无论她步履何方，都守护着她的征途。"
 ita_enforce_equality:0 "强制平等"
 ita_enforce_equality_desc:0 "理想的法西斯国家应以公民对国家的价值而非肤色或族裔来衡量其品质。若我们剥夺了帝国内非意大利人平等服务之机，便是自断臂膀，错失了无数未来之栋梁，无论是军官、行政人员，还是政府运作不可或缺的其他重要成员。纳粹可能因固守自己的种族理论而目光短浅，只取符合己见之人，然而真正的现代法西斯国家，不应囿于此类荒谬之束缚。斯科尔扎领袖已下令制定计划，旨在从帝国最偏远的地区选拔并提升具有理想品质的人才。"
 ita_tolerate_bilingualism:0 "接纳双语化"
 ita_tolerate_bilingualism_desc:0 "昔日，帝国内部常有禁止或强烈反对使用非意大利语的语言的做法。尽管在殖民地与领土上，鲜见资源被用于推广意大利语教育，这些政策仍旧得以实施，显得颇为讽刺，成为当时文化霸权思想的陈迹。然而，时移世易，斯科尔扎领袖洞悉，在这广袤帝国之中，各种语言的流传是不可避免的，非官方所能左右。撤销这些过时的禁令，对各方皆是明智之选。"
 ita_review_citizenship_rights:0 "审查公民权"
 ita_review_citizenship_rights_desc:0 "陈旧法规令众多人口在技术层面上难获公民资格，此乃过往狂热时代之遗风，如今却无助于帝国之昌盛，亦不合法西斯主义之真谛。斯科尔扎领袖遂放宽公民资格，让所有向意大利国旗致敬之人都得以归入，希望此举能够壮大我们的政府机构和军队编制。"
 ita_first_among_equals:0 "同侪之首"
 ita_first_among_equals_desc:0 "在我们致力于焕发帝国之光的征途上，我们已经领悟到，以高高在上的统治者自居，对关系的破坏性大于其对权威的展示。因此，意大利在帝国的内政中，将力求成为众中之首，而非独尊。作为皇帝的御座和帝国的源泉，意大利并不自认为是帝国中唯一重要的部分。相反，我们将尽可能与其他领土和地区寻求共融和合作。"
 ita_criminalize_non_italian_languages:0 "非意大利语非法化"
 ita_criminalize_non_italian_languages_desc:0 "在我们辉煌的帝国中，使用意大利语以外的语言是一种玷污，这无疑是对那些为建立我们辉煌国家而流血牺牲的民族英雄的极大侮辱。这些语言对我们而言，如同草芥，毫无价值。在公共场合使用这些语言者，将受到罚款；而教授这些语言者，将被监禁。对于再三违反者，我们将严惩不贷。意大利帝国的子民，自当以意大利语为荣！"
 ita_Fasci_dAzione_Internazionalista:0 "国际法西斯行动"
 ita_Fasci_dAzione_Internazionalista_desc:0 "在一战的烽火连天之际，贝尼托·墨索里尼创立了“国际行动法西斯”组织，旨在号召意大利民众投身战火，承诺以领土作为回报。时光荏苒，半世纪后的今天，我们应重新审视自身于世界舞台上的承诺，该组织的精神亦随之复兴。作为跨越大陆的帝国，我们必须关注世界大局，确保在制定影响领土与殖民地的政策时，将这些因素纳入考量。"
 ita_expand_italian_bureaucracy:0 "扩大官僚体系"
 ita_expand_italian_bureaucracy_desc:0 "欲巩固吾辈帝国之基，我们必须迅速扩大我们的公务员队伍。我们在海外领土的管理上过于松散，已使我们对中东与非洲土地上的动态知之甚少，控制力亦显不足。为此，一份新的预算提案业已呈上，旨在广纳贤才，包括文员、秘书、行政人员等，他们将在处理政府日常繁杂事务中扮演关键角色。"
 ita_marching_under_the_black_flag:0 "降下黑旗"
 ita_marching_under_the_black_flag_desc:0 "帝国一统，一国一体，法西斯主义一以贯之。帝国重组，国境之内，万众一心，不分神祇信仰，不辨肤色差异，不问来处。凡愿助力帝国者，皆蒙接纳。投身战斗、勤劳工作、忠诚服务——此等强化国家与民族之行，皆为崇高之举，宜受至高赞誉。帝国必将欣欣向荣！"
 ita_a_new_manifesto_della_razza:0 "新种族宣言"
 ita_a_new_manifesto_della_razza_desc:0 "国家昭告种族真理的时刻已经到来。领袖墨索里尼早已洞悉那些地位低于我们者，若任其壮大，将成我们的心腹大患。反观领袖齐亚诺，其行径至多可谓天真无知，至坏则是背叛至极，竟容犹太人及其他群体在帝国中生活，仿佛他们与我们平起平坐。此等错误，早已到了不得不纠之时。我们即将起草更为全面严格的种族法律，以守护国家的纯洁之躯，同时发布新的种族宣言。"
 ita_reintroduce_racial_laws:0 "恢复种族法案"
 ita_reintroduce_racial_laws_desc:0 "纳粹虽是背信弃义之徒，其承诺皆成空谈，但其对种族秩序的洞察却一针见血。犹太人一度被视作我们的敌人，也将再次被认作如此。他们不应觊觎公职或国家福利，这些东西只应归于真正的公民。德国人不将我们视为真正的雅利安人，此乃他们企图独霸雅利安之名的小人之心。我们的血统纯正，若权威种族科学家所言可信，我们甚至可能更为纯正。以胜利和命运之名，我们有权主宰那些殖民地中的次等人类。"
 ita_italys_destiny:0 "意大利的命运"
 ita_italys_destiny_desc:0 "意大利一直被权力簇拥，有着统治、指导其他国家的非凡命运。看看人类史上最伟大的帝国，我们的罗马帝国就能证明这点。作为罗马帝国无可争议的最终继承人，我们甚至已经超越了它们。繁荣，是意大利的权利，更是义务。正如我们所见，若意大利繁荣，全人类也会繁荣昌盛。我们不会遮遮掩掩，而是信心满怀，乘风破浪，大步迈向光明的未来。前进！"
 ita_power_justifies_itself:0 "权力赋予正义"
 ita_power_justifies_itself_desc:0 "那些死守感性理想和哲学之人，终将如古雅典般，在历史的长河中被湮没无闻。现代世界已昭示，国家追求的唯有权力，而权力的运用才是最终的目的。那些企图使我们偏离此道者，不是畏首畏尾的懦夫，便是力不从心的弱者，或许两者皆备。观大日耳曼国之成就，何其辉煌！当齐亚诺还在向墨索里尼灌输高远理想之际，德国已几乎将整个欧洲和非洲纳入囊中，留给我们的，不过是些残羹剩饭。斯科尔扎领袖已深刻吸取此教训，下一次，意大利将在世人的瞠目结舌中，成为一切的主宰。"
 ita_resume_population_transfer:0 "重启人口迁移"
 ita_resume_population_transfer_desc:0 "帝国必须清除某些不良群体，但此事需步步为营，以防激起民变，甚至招致国际社会的干预。我们历史上有处理此类情况的先例。我们将把这些群体彻底迁出！将这些群体送往遥远的殖民地，一旦他们离开意大利本土，便如石沉大海，不再是我们关注的焦点。"
 ita_benevolent_overlords:0 "仁慈霸主"
 ita_benevolent_overlords_desc:0 "我们作为横跨三大洲的帝国之主，却应以和风细雨待人，不必盛气凌人，在与臣民的交往中显得令人厌恶。设想若有两个相似的帝国，一个以冷酷无情治之，另一个以温情脉脉待之，何者能历久弥坚，不言而喻。那不受统治者压迫之苦的帝国，自当更为强盛。我们若能体察民情，关注臣民所需，便能赢得更丰厚的长期利益，因为这样我们将得到殖民地和附属国家的更多支持与合作。"
 ita_terrorized_under_the_jackboot:0 "铁蹄之下，人心惶惶"
 ita_terrorized_under_the_jackboot_desc:0 "帝国非筑于温柔乡，亦非和平主义所能成就。若沉溺于自欺，便是愚不可及。我们必须直面现实，若需以铁腕治之，便毅然行之。领土乃血汗所铸，我们誓死守卫，直至最后一名意大利战士为帝国荣耀献身。那些心慈手软者，自会喋喋不休。我们说，任其自艾自怨吧。土著若以绝食相抗，我们说，由他去罢。他们越早领悟此意自行消散，我们便越无需多费周折对付他们。"
 ita_lItalia_Ha_Finalmente_Il_Suo_Impero:0 "意大利，帝国梦圆"
 ita_lItalia_Ha_Finalmente_Il_Suo_Impero_desc:0 "意大利终于铸就了自己的帝国，疆域从本土直抵海湾，从班加西直至苏伊士，意大利成为了帝国威严与力量的真正化身。我们在第二次世界大战中的付出，换来了墨索里尼梦寐以求的帝国。既然已经迈出了这一步，何不乘胜追击？我们为了这个目标已经付出了血与火的代价，斯科尔扎领袖宁愿血战到底，也不愿看到它就此作罢，他愿意为了帝国的进一步扩张而倾注更多的热血与汗水。"
 ita_renew_paternalism:0 "家长制复辟"
 ita_renew_paternalism_desc:0 "身为文化先进之邦，我们有义务引领我们治下受我们影响的人民。我们能为他们遮风挡雨，抵御那些他们尚未洞悉的危险思想，并指引他们走向行之有效的理念。若能让他们领悟到在帝国中工作对他们自身利益的益处，我们深信他们终将心悦诚服，顺应我们的领导与理念。\n\n虽然有些地方领袖或许觉得我们正试图将他们纳入顺从之轨，我们仍将耐心向他们阐释留在一个更先进国家所带来的福祉，以及孤身闯荡残酷世界所面临的风险。"
 ita_new_undesirables:0 "新的不受欢迎者"
 ita_new_undesirables_desc:0 "故事之所以引人入胜，往往在于正邪分明。我们最近将犹太人这些被标签化的反派角色迁往他处，斯科尔扎领袖的顾问们认为，是时候让人民关注一个新的敌人了。不论是阿拉伯人还是内战中的德国难民，我们都能迅速向公民们灌输揭示这些群体对意大利生活方式的潜在威胁的思想。已故的帝国博士戈培尔精于此道，我们自可借鉴其策略，以谋求自身之利。"
 ita_united_under_the_tricolor:0 "三色旗下，心手相连"
 ita_united_under_the_tricolor_desc:0 "作为由众多多元部分组成的统一帝国，我们需要一个能够凝聚人心的象征。若偏袒一意识形态或信仰，易令他群心生异。能够集结我们所有人民的，是我们那鲜艳的国旗。红白绿三色，加上萨伏依家族的徽章，它在欧洲乃至世界的黑暗中犹如一盏明灯。我等子民，视帝国若慈父，我等亦自担仁君之责，恪守不渝。"
 ita_the_political_absolute:0 "政治绝对"
 ita_the_political_absolute_desc:0 "斯科尔扎领袖在制定政策时，只依据一条政治准则：是否有益于国家和帝国，是否契合法西斯主义？这便是衡量一切的真正标准，意大利的兴盛才是关键。法西斯主义，岂能囿于种族之旧规与陈腐之传统。法西斯主义，本质上乃国家至上之思想，若国家之步伐为过时信仰所阻，法西斯主义定当破旧立新。在意大利政府中，这被称为“政治绝对”，它是评判所有政策的统一标准。"
