 ita_Fascisms_Favors_desc:0 "斯科尔扎为了扩大影响力、维持法西斯主义的延续，动用了很多关系，担下了不少差使。他通过这些工作结交了大批朋友，掌握了更多实权。如今正是了结旧事，巩固权力之时，是时候拿这些人情去兑现了。\n\n保守点数:[?ita_bad_boy_points_bank]£GFX_bad_boy_point\n\n改革点数:[?ita_good_boy_points_bank]£GFX_good_boy_point"
