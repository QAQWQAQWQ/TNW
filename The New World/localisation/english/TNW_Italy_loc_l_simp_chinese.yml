 ita_the_realities_of_our_situation:0 "我们的现实处境"
 ita_the_realities_of_our_situation_desc:0 "忧心忡忡，总参谋部的将领们感到了一丝危机。自三头同盟瓦解后，我国的防线已不复往日坚固，若那德国旧敌或伊比利亚、土耳其这些化友为敌的前盟友来犯，我国将处于岌岌可危的境地。为此，将军们运筹帷幄，制定了一系列应急计划，以固我国之根基，但他们也坦言，在政府所期的紧迫时限内，唯有一套计划能够奏效。此刻，我们必须当机立断。"
 ita_defense_plan_campioni:0 "坎皮奥尼防御计划"
 ita_defense_plan_campioni_desc:0 "总参谋部勾勒出了首个应对方案，名为坎皮奥尼计划，这一计划以名将伊尼戈·坎皮奥尼的名字命名。该计划着眼于未雨绸缪，旨在与伊比利亚一旦兵戎相见时，确保我们与之毗邻的领土，特别是阿尔及利亚——这一两国争端的暴风眼，安然无恙。为此，部队将接受特训，以适应阿尔及利亚的高温气候，掌握在撒哈拉沙漠中求生的必备技能。"
 ita_reinforce_the_fourth_shore:0 "增援第四岸"
 ita_reinforce_the_fourth_shore_desc:0 "北非海岸被许多人称为意大利的“第四海岸”，因为目前这里的意大利人特别多。为了缓解这一问题，我们制定了一项计划，我们将在阿尔及利亚与伊比利亚交界处修建防御工事，即在山上修建掩体，从而防止伊比利亚人闯入我们的领土。"
 ita_desert_wings:0 "沙漠之翼"
 ita_desert_wings_desc:0 "撒哈拉沙漠是阿尔及利亚地区广阔的一部分，我们有不少的将军建议我们在沙漠中开辟空军基地。因为伊比利亚部队很难找到这些基地，而且这些基地有足够的空间来建立机库和简易跑道，简直是我们的空军基地的理想选择。"
 ita_build_up_sardinia:0 "撒丁尼亚大开发"
 ita_build_up_sardinia_desc:0 "撒丁岛和科西嘉岛处于有利的位置，能在地中海针对伊比利亚开展行动。轰炸机可以在那里出发，攻击伊比利亚的心脏地带。凭借岛上的海军基地，也能更好与伊比利亚舰队抗衡。因此，有人提议增加岛上的军事行动。"
 ita_colonial_alpini:0 "殖民地山地部队"
 ita_colonial_alpini_desc:0 "由于阿尔及利亚丘陵、多山的地形，我们建议对著名的阿尔卑斯山地师进行训练，以适应北非新环境下的艰苦战斗，确保对伊比利亚军队有战术优势。"
 ita_the_western_shield:0 "西方之盾"
 ita_the_western_shield_desc:0 "有了对抗伊比利亚的阵地，我们大可放心。即使战争即将到来，伊比利亚也难与意大利士兵所称的“西方之盾”抗衡。"
 ita_defense_plan_cadorna:0 "卡尔多纳防御计划"
 ita_defense_plan_cadorna_desc:0 "继往开来，总参谋部又绘制了一项新计划，名为卡多尔纳计划，它以在阿尔卑斯山麓指挥我们军队英勇抗战的一代名将路易吉·卡多尔纳为名。该计划着眼于筑牢与德国接壤的边境防线，确保这片土地远离战火的蹂躏。为此，我们精心策划了一项针对性训练，旨在锻炼部队在阿尔卑斯山脉的严寒中求生的本领，以期在不可避免的战争降临时，能够最大限度地减少无谓的牺牲。"
 ita_rebuild_the_alpine_line:0 "重建阿尔卑斯防线"
 ita_rebuild_the_alpine_line_desc:0 "自同盟瓦解后，我们与德国接壤的边境曾筑起连绵的防御工事。但随着国家目光他移，这些工事逐渐荒废，无人问津。面对新的挑战，重振这些边防设施势在必行，以筑起一道坚不可摧的屏障，令德国人在跨越多洛米蒂山脉时难上加难。"
 ita_expand_the_alpini:0 "扩编山地部队"
 ita_expand_the_alpini_desc:0 "阿尔卑斯山地部队，乃我意大利军中翘楚，亦是众多师团中的精英。这支部队精通山岳战法，鉴于我们与德国接壤的边境地形复杂多变，扩充此部对于我们来说势在必行。因此，我们将在多洛米蒂山脉发起一场声势浩大的招募，旨在寻找最适应山地作战的勇士，以期壮大我们阿尔卑斯山地部队的雄姿。"
 ita_defending_the_adriatic_wasteland:0 "捍卫亚德里亚海"
 ita_defending_the_adriatic_wasteland_desc:0 "亚得里亚海的战略地位举足轻重，不容忽视。设想德国人若兴兵来犯，却在阿尔卑斯山前被我方防线所阻，他们的海上和空中力量便可能化作攻城略地的长矛。有鉴于此，我们必须在跑道建设与空域管理上加大投入，确保对这片海域的掌控牢不可破。"
 ita_desert_roaches:0 "波塞冬的精锐"
 ita_desert_roaches_desc:0 "若德国人能突破阿尔卑斯山，虽此情甚难，他们便能轻取我们海上要道。虽海战非我军之急务久矣，然须防患未然，包括训练部队海战与海岸线作战之战术。"
 ita_the_northern_shield:0 "北方之盾"
 ita_the_northern_shield_desc:0 "阿尔卑斯山线上层层壁垒已被加固，在我们的军队严阵以待，誓守提洛尔的每一寸土地的同时，艰苦卓绝的山地防御策略已被制定，北疆防线坚如磐石，德国威胁已无隙可乘。"
 ita_defense_plan_caneva:0 "卡内瓦防御计划"
 ita_defense_plan_caneva_desc:0 "以意土战争中率我军取得胜利，为我国在利比亚北非海岸赢得立足点的将军之名，我们的总参谋部精心制定了卡内瓦计划。此计划旨在未雨绸缪，确保我们在中东的总督区及毗邻利益不受土耳其威胁。因此，我们的部队正在苦练沙漠作战战术，以备在黎凡特沙漠中可能遭遇的种种挑战。"
 ita_meet_with_chiesa2:0 "与达拉·基耶萨会面"
 ita_meet_with_chiesa2_desc:0 "达拉·基耶萨，意大利中东总督，治理有方，功不可没。我们宜与他晤面，共谋如何巩固其权位，确保其麾下部队固若金汤，同时探讨如何提供更多支援，以抵御土耳其之潜在威胁。"
 ita_reinforce_the_garrisons:0 "增援驻军"
 ita_reinforce_the_garrisons_desc:0 "在东非与中东殖民地的将领们频频求援，希冀增兵。我们曾因这些地区太平无事而未予过多关注。然而，随着战略态势的转变，向这些殖民地派遣更多后备兵力，加固防线，确保他们能够集结足够兵力，以备不时之需，已显得尤为必要。"
 ita_fortify_the_canal:0 "巩固运河区"
 ita_fortify_the_canal_desc:0 "苏伊士运河，乃我们与中东殖民地的商贸纽带，亦是我们近邻土耳其地区的重要据点。为抵御土耳其的潜在威胁，确保运河安全，我们决定在附近筑起防御工事，使其成为坚不可摧的防线。"
 ita_reinforce_the_horn:0 "增援非洲之角"
 ita_reinforce_the_horn_desc:0 "非洲之角，乃红海要冲，战略地位举足轻重。为防土耳其人染指，我们需在此地筑牢防线，加强港口与空军基地建设，确保水域和空域的绝对控制，如铜墙铁壁，坚如磐石。"
 ita_the_eastern_shield:0 "东方之盾"
 ita_the_eastern_shield_desc:0 "苏伊士运河已稳如泰山，我们与土耳其相邻的冲突区域因此更加稳固。殖民地亦得到加固，以防范潜在威胁。我们的部队为这一新的防御计划网络赋予了“东方之盾”的美誉。"
