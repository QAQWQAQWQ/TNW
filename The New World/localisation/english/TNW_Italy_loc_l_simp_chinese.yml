 christdem.1.t:0 "基民党胜利！"
 christdem.1.d:0 "阿尔多·莫罗领导的基督教民主党在选举中一举夺魁，已然稳握意大利政权之舵。他们在议会上下两院皆取得压倒性胜利，基督教民主党已于罗马殿堂内拥有了主导立法的权力，他们将引领国家航向新纪元。街头巷尾，民众欢庆，不仅为胜选者，更为这久违的自由公正之选。\n\n莫罗在广播中慷慨陈词，接受了这胜选的硕果，其对意大利人民深表感激。他首先向选民致谢，承诺将不遗余力地提升民生和国情。继而阐述新政府将如何保障各党派公平发声，共商国是。他满怀憧憬地宣告，这是意大利初现的曙光，国家前景正一片光明。\n\n败选政党亦在广播后发表认输演说，虽不似莫罗那般喜气洋洋，但民众欣慰于他们的从容大方。如今，莫罗将依己见重塑国家。他以教育改革和社会保障为竞选主轴，预计其将将此作为施政重点。他亦将寻求与国民联盟等其他政党合作，确保这首次选举出的民主政府不会因内讧而瓦解。对莫罗、意大利乃至世界而言，此日无疑将载入史册。"
 christdem.1.a:0 "愿首捷之选举，成为未来繁花似锦之序章。"
