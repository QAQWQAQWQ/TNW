 ITA_fading_fascism_desc:0 "众所周知，意大利的领袖加莱亚佐·齐亚诺并不像他的岳父那样具有典型的法西斯主义色彩。许多人因而推测，齐亚诺可能试图重组政权，降低领袖的集权度。虽然这些大多是谣言，它仍然导致我们的政权缓慢地衰落。"
