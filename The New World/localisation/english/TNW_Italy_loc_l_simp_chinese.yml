 ITA_cadorna_plan_north_shield:0 "北方之盾"
 ITA_cadorna_plan_north_shield_desc:0 "阿尔卑斯山脉之上，我们筑起了坚不可摧的防线，部队枕戈待旦，誓守亚得里亚沙漠的每一寸土地。我们更制定了严阵以待的山地防御策略，如此，北疆防线固若金汤，德国的威胁已不足为惧。"
