 POLITICS_ARRIGO_BULOW_BOLDRINI_DESC:0 "他本应陨落于战火硝烟中。博德里尼一次次从法西斯爪牙围剿中死里逃生，其踪迹遍布亚平宁半岛每个角落。他从未放弃——也永远不会放弃——那个自由意大利的旧梦。作为抵抗运动的活化石，博德里尼已战斗了数十个春秋：组织覆灭、突袭仍频、同志凋零，而抵抗之火始终不熄。\n\n自1943年披上游击战袍，博德里尼曾与战友们怀揣希望，期盼美军随时登陆解放意大利。然而希望终成泡影。当轴心国赢取二战胜利，博德里尼与残部陷入绝境。他们穿越国土流亡，在政府镇压的缝隙中辗转求生——而当局的罗网从未松懈，仿佛每个街角都埋伏着士兵，静候游击队的破绽。而破绽，终究会出现。博德里尼穿梭于各个地下小组之间，将毕生经验倾囊相授：如何制造恐慌，如何让法西斯走狗暂时蜷缩战栗。\n\n随后德国铁蹄踏来，意大利沦为傀儡政权。最狂热的老牌法西斯分子竟也摇身变为“共和国”的抵抗者，游击队由此迎来大批“新人”。及至德国内战再起，抵抗军抓住时机掀起革命。无数派系在全国陷入混战，将附逆者逐出众多城市。他们彼此联络，仓促组建起自由意大利紧急政府。可惜无人能就政体形式达成共识，于是各派系转向唯一公认的领袖——博德里尼。这位传授游击战术、引领革命胜利的导师，顺理成章成为转型期的掌舵者。如今他端坐于意大利脆弱的联合政府顶端，各方势力仅有一个共识：必须彻底葬送日耳曼人的霸权。"
