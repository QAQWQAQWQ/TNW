 ITA_mandatory_edu:0 "改革后的教育体系"
 ITA_mandatory_edu_desc:0 ""
 blocchinazionale.1.t:0 "国民联盟赢得选举"
 blocchinazionale.1.d:0 "国民联盟在乔治·阿尔米兰特率领下，于此次选举中高歌猛进。这个允诺重拾被民主转型撕裂的传统价值的极右翼政党，从意大利社会的腐肉堆里网罗支持——最刺眼的莫过于军部残党与前黑衫军余孽的欢呼浪潮。然而我们必将面临几乎所有其他党派的殊死反扑：当国民联盟自诩“意大利尊严的捍卫者”时，基督教民主党——尤其是民主阵线——正将我们斥为冥顽不灵的复辟余孽。这场“传统”与“进步”的角斗，注定要用议会席位的鲜血来润滑齿轮。"
 blocchinazionale.1.a:0 "意大利永世长存！"
 blocchinazionale.40.t:0 "一些知名人士脱离国民联盟"
 blocchinazionale.40.d:0 "哦不"
 blocchinazionale.40.a:0 "好像我们要担心的只是几个叛徒似的。"
 blocchinazionale.41.t:0 "博尔盖塞谈到他在管理方面的问题"
 blocchinazionale.41.d:0 "你搞砸了"
 blocchinazionale.41.a:0 "谁在乎某个无关紧要的将军？"
 blocchinazionale.42.t:0 "国民联盟崩溃！"
 blocchinazionale.42.d:0 "确有地狱，我们活在其中。"
 blocchinazionale.42.a:0 "也许这不是最好的主意。"
 blocchinazionale.43.t:0 "政变"
 blocchinazionale.43.d:0 "齐亚诺早有预案，以防不测，还多少有些借鉴了我们世界线的事"
 blocchinazionale.43.a:0 "我们会做好准备的！"
 blocchinazionale.45.t:0 "乔瓦尼·德·洛伦佐掌权！"
 blocchinazionale.45.d:0 "乔治·阿尔米兰特悍然宣布恢复“领袖”尊号并自封其位。诏令甫出，议会旋即发起不信任动议——这场民主绞索竟以毫厘之差涉险过关。眼见新角色不得人心，这位“领袖”选择从公众视野蒸发，任由政府机构陷入脑死亡状态。\n\n阿尔米兰特的民意支持率断崖式暴跌，连国民联盟最狂热的拥趸也倒戈投向基督教民主党。暗流汹涌之下，密谋兵谏的耳语在军部回廊游荡。然而“领袖”阿尔米兰特唯恐偏执招祸，竟对种种风声置若罔闻。\n\n今晨，宪兵队如黑色铁流般突袭众议院与参议院。幕后操盘手乔瓦尼·德·洛伦佐宣布“暂时中止民主程序”，誓言与“仍效忠民主理念”的政府要员携手推动“意大利复兴”。此刻蒙特奇托里奥宫的大理石阶上，枪托击碎玻璃的脆响，正为这出政治闹剧敲响终场钹音。"
 blocchinazionale.45.a:0 "我们没有做好准备。"
 ita_cracking_the_markets:0 "敲开市场之门"
 ita_cracking_the_markets_desc:0 "历经战后之殇，我们的经济危机尚未解决，亟需开拓市场，拓宽经济新径。世界上的技术日新月异，不跟进创新便会落后，我们现在就应开始规划，支持我们的工业和技术行业，促其在意大利本土深耕，亦在全球市场开疆拓土。财富的流动和新增加的工作岗位，将造福社会大众，同时为国库带来盈余！"
 ita_use_the_IRI:0 "利用IRI"
 ita_use_the_IRI_desc:0 "工业复兴公司是我们最有力的经济资产，一个由国家全面掌控的庞大产业和投资基金联合体，时刻准备着响应国家之需。我们的经济和财政部、外交部以及国际贸易部正殚精竭虑，精心策划着一个包含经济各个领域的大规模未来蓝图，从工业制造到科技创新，从商贸往来到金融博弈，面面俱到。\n\n虽然这份草案的完成尚需时日，但向工业复兴公司账户注入大量流动资金将立即对我们经济产生积极影响，哪怕这增长是微不足道的，这也足以向世人昭告，我国经济正蓄势待发，步入复苏之途。"
 ita_high_ways_for_the_nation:0 "为国家而建造公路"
 ita_high_ways_for_the_nation_desc:0 "高速公路，昔日法西斯时期墨索里尼宏伟蓝图中的一笔。然而，与当时众多项目相比，高速显得尤为实用，它们贯穿了我国连绵的山脉，连接都灵、米兰、的里雅斯特以及罗马和那不勒斯。如今，随着帝国版图的扩张，我们更应将高速延伸至亚得里亚海的科拉特海岸，以及遥远的利比亚海岸，为那些边陲之地的意大利同胞带去繁荣。\n\n我们将所有高速纳入单一的统一管理体系，创建一个由政府管辖的“意大利高速公路公司”，负责高速的管理、维护、改进和扩展，让这交通的大动脉永远充满活力，高效畅行。"
 ita_ports_for_the_med:0 "地中海港口"
 ita_ports_for_the_med_desc:0 "被德国禁运，与伊比利亚关系恶化，自大西洋贸易兴起后，我们的海军领域——热那亚、威尼斯、的里雅斯特、那不勒斯、利沃诺等大港口遭受了前所未有的损失。岁月如梭，二十年转瞬即逝，此领域依旧步履蹒跚，因为建设和运营造船厂是一项巨大的投资。我们需要激活海军生产设施，而今，工业复兴公司将助力我们重启海军制造之轮。\n\n董事会已通过决议，成立芬坎蒂尼，这是一家专注于在沿海合适地点建造和维护新造船厂，并对现有造船厂进行改造和重建的新子公司。虽然它的成长无疑需要时间，但随着海军订单的增加，新企业亦将应运而生，以应所需。我们的老牌港口将得到复兴，新港口亦将随之兴起。期盼此举能让我们重拾昔日兵工厂的辉煌岁月。"
 ita_airports_for_the_world:0 "国际航空"
 ita_airports_for_the_world_desc:0 "航空运输是快速运送货物与人员至世界各地的最佳途径。货物运输或许通过火车更为简便和经济，但人们必定会更倾向于选择国有航空公司，享受安全抵达目的地的飞行服务。工业复兴公司已拍板定案，成立意大利航空——一家以航空运输为主业的新兴子公司：公司将致力于架起国内各区域间的空中桥梁，拓展至我们影响圈的每一角落，更将开辟直飞纽约、东京、柏林等国际大都会的航线。"
 ita_houses_for_the_people:0 "居者有其屋"
 ita_houses_for_the_people_desc:0 "自1903年成立以来，人民住宅自治研究所便致力于推动公屋建设，让贫困家庭能够以公正的价格拥有一个体面的家。其在意大利乃至非洲殖民地的广厦千间，为无数贫困家庭撑起了一片天。\n\n如今，随着经济的复苏，农民纷纷涌向城市，投身新兴工厂的浪潮。工业复兴公司慧眼识珠，向人民住宅自治研究所伸出援手，助其增建住房，既为建筑业注入活力，也为工人阶级带来福祉，实为双赢之举。"
 ita_pipelines_for_oil:0 "石油生命线"
 ita_pipelines_for_oil_desc:0 "意大利国家碳化氢公司，别称“六腿狗”，其独特标志背后，隐藏着远超一家企业的力量。恩里科·马泰，身兼埃尼集团总裁与海湾总督两个职位，使埃尼集团在中东地区成为我们利益的坚强后盾，为意大利经济注入源源不断的动力。从阿布扎比的新总部出发，埃尼集团凭借着小规模军队和无数——或许过多——的贿赂，左右着阿拉伯的政治风云。马泰的手段虽有时出人意料，但他所带来的成果却是空前的。\n\n埃尼集团一旦倒下，意大利经济也将随之坍塌。因此，政府必须全力以赴，支持马泰总裁兼总督在那片动荡之地继续维护意大利的利益……当然，我们期待为我们的付出得到合理的回报。"
 ita_path_to_prosperity:0 "繁荣之路"
 ita_path_to_prosperity_desc:0 "传统工业和石油产业曾是我们经济的中流砥柱，然而技术的崛起，正重新定义着经济的边界。新发明层出不穷，旧技术相形见绌：从生产方式到引擎、计算机乃至武器，科技的飞速发展，仿佛魔法一般，让人目不暇接。\n\n因此，繁荣的钥匙隐藏在电子、物理和实验力学这些新兴领域之中。我们的经济发展部长已经拟定了一个激励计划，旨在催生“初创企业”——这些小巧却极具创新精神的公司，由精英科学家和工程师团队领衔，不断试验前沿科技，让未来触手可及！"
 ita_promote_small_buisness1:0 "推广小企业"
 ita_promote_small_buisness1_desc:0 "中小企业乃经济之栋梁。我们自将不遗余力，为意大利的中小企业保驾护航，确保它们获得所需的扶持与礼遇！\n\n我们将审慎投资，助力中小企业茁壮成长，同时推出政府项目，确保这些企业在意大利持续繁荣昌盛的前途。如此，意大利经济必将蓬勃发展。正所谓，水涨船高，共荣共赢。"
 ita_catholic_trade_unions:0 "天主教工会"
 ita_catholic_trade_unions_desc:0 "工会虽好，但天主教工会更胜一筹。我们正致力于提升意大利工会联合会的地位，它们与基督教民主理念相辅相成。换言之，他们是我们的同路人。\n\n或许有些激进工会会嫉妒我们的偏爱，但他们的微词不过是耳边风。意大利工会联合会及其盟友们，必将不负众望，担起重任。"
 ita_cut_the_red_tape:0 "去除繁文缛节"
 ita_cut_the_red_tape_desc:0 "意大利的经济被太多的繁文缛节所困扰。这些沉重的规章制度令经商之路荆棘丛生，严重阻碍了经济的发展。\n\n是时候大刀阔斧，剪除这些不必要的束缚，让企业轻装上阵。此举必将激发经济活力，助力意大利企业开拓更多就业机会。虽然有人担忧，简化规定可能会带来生产安全的风险，但为了长远发展，有时我们必须做出一些牺牲。"
 ita_modernize_agriculture:0 "农业现代化"
 ita_modernize_agriculture_desc:0 "意大利虽然已经实现了工业化，但农业依然是其经济的重要组成部分。这并非坏事，农民乃国之栋梁，他们肩负着养育国民的重任。然而，农业技术与设备现已亟待革新，时不我待。\n\n为此，我们将向农民提供尖端设备，教授他们最新的农业技术，确保意大利农业在世界舞台上持续发光发热。"
 ita_a_moral_welfare:0 "道德福利"
 ita_a_moral_welfare_desc:0 "福利，乃文明国度之基石。这不仅是经济问题，更是道德问题。一个国家若连国民的基本生活都保障不了，怎能称得上文明和繁荣？\n\n故此，意大利将打造并拓展全民福利之网！医疗、失业补助、退休金、教育、住房。你所能想到的，我们都会提供。我们将采取合作主义之道，融合私营之力量，让社会每个成员都为提升意大利福利体系的质量尽一份力！"
 ita_a_just_salary:0 "只要薪水"
 ita_a_just_salary_desc:0 "意大利工人长久以来呼吁尊严，他们要求的不过是劳有所得，公平交易！若他们所得仅能勉强度日，怎能期许他们全心投入、提升工作效率？\n\n如今，工人的呼声已被倾听，我们亦已响应！我们已通过法律，确立了意大利工人的最低工资标准。意大利的工人将更加幸福，因为他们知晓辛勤一日将有公正回报。而幸福，正是生产力的源泉！"
 ita_a_road_to_social_justice:0 "正义之路"
 ita_a_road_to_social_justice_desc:0 "意大利，国富民强。但遗憾的是，这份繁荣并未惠及每一个人，许多同胞仍挣扎在贫困线上。此情此景，我们岂能坐视不理！\n\n我们决心投入巨资，推动社会公平，让每个意大利人都有公平的机会，无论贫贱，皆可一展抱负。在这富饶之地，无人应受饥寒之苦。我们追求的，是一个机会均等、公正无私的社会！"
 ita_the_world_calls:0 "世界在呼唤"
 ita_the_world_calls_desc:0 "曾几何时，我们自囿于殖民旧梦，以为尽掌天下机枢，却换来经济停滞、债台高筑。工业发展如逆水行舟，不进则退，我们若无竞争磨砺，终将被时代淘汰。\n\n不，意大利岂能就此没落！要续写经济强国的篇章，我们必须拓宽贸易范围，不再固步自封，而应勇敢地迈向世界，迎接全球的挑战：世界正向我们敞开怀抱！"
 ita_and_italy_answers:0 "意大利的回应"
 ita_and_italy_answers_desc:0 "我们的外交部和国际贸易部如今热闹非凡，这情况前所未有！大使们穿梭其间，贸易使者议事频频，文书堆积如山，连补给都难以为继。国际贸易部长行色匆匆，上周在雅典，三天前在巴西利亚，昨日又在北京，今日却因咖啡耗尽而晕倒在与加拿大贸易部长的会谈中，我们还在等待他的消息。世界的新局面已呈现在我们面前，我们必将全力以赴：我们的经济必将腾飞，社会亦将同步提升。世界在召唤……意大利已做出了他的选择！"
 ita_ties_to_the_OFN:0 "与OFN的联系"
 ita_ties_to_the_OFN_desc:0 "自由国家组织汇聚了美国、加拿大等世界强国。随着我们拓展国际贸易的宏伟蓝图逐渐落成，自然而然地，我们逐渐渴望与这些民主巨擘缔结互利之约。更妙的是，我们占据着“地狱之门”——即团结协定——的地缘要冲，这让我们成为各国争先恐后想要结交的盟友，毕竟我们将是德国扩张主义复兴的第一道防线。\n\n我们已经谨慎地迈出了第一步，接触下来，双方都颇有兴趣：美国商界对我们的产品青睐有加，我们的企业也对他们的商品充满期待。首批贸易协议即将被起草，并很快将正式呈递给所有谈判方。我们期待这将是一段金玉满堂的合作新篇章！"
 ita_vacanze_romane:0 "罗马假日"
 ita_vacanze_romane_desc:0 "意大利，这片文化、浪漫与历史交织的土地！正向世界张开怀抱！新签证政策的春风，已让无数美国游客纷至沓来，罗马、佛罗伦萨、锡拉库萨等地的酒店和博物馆人声鼎沸。他们用镜头捕捉每一处古迹，威尼斯的水巷也因之焕发新生，咸水运河似乎成了游客的新宠……\n\n归国的游客，必将把意大利的美名传遍四方，这不仅为我们的国家形象增光添彩，也为来日与自由国家组织的成员国之间的友好往来打下了良好基础，我们对此满怀期待。"
 ita_offers_they_cant_refuse:0 "他们无法拒绝的提议"
 ita_offers_they_cant_refuse_desc:0 "华盛顿的意大利裔美国社群已着手游说政府，力图为我们争取更有利的贸易条件。商界巨头、政坛显要乃至一些“幕后推手”纷纷走上前台，向议员们力推我们的合作方案……若不采纳，后果自负。\n\n上周美国代表团对我们的热情接待，以及随之而来的对我们有利的贸易协议，似乎预示着他们的游说已大功告成！然而我记得，在上次会议中，代表团团长的双手十指分明都还在……"
 ita_inroads_to_asia:0 "打入亚洲"
 ita_inroads_to_asia_desc:0 "亚洲，这片充满活力的土地，日本及其大亚洲共荣圈在其中占据主导地位：他们以更为隐秘的手段操控着成员国，与我们的做法不谋而合。但在处理与中国和越南的关系时，他们似乎对“安全第一”和“减少伤害”的理念有些漠视……\n\n尽管日本曾与我们肩并肩，但我们之间的旧日政治纠葛重重，不过幸而现在我们仍然拥有一个共识：我们双方都对德国抱有敌视。这份共同的愤慨，或许能成为我们携手合作的桥梁。共荣圈更是我们企业拓展的金钥匙，亚洲市场背后隐藏着超过十亿的潜在商机。我们的贸易代表团即将踏上东瀛之旅，我们期待他们能满载而归。"
 ita_indian_ocean_gamers:0 "奔向印度洋"
 ita_indian_ocean_gamers_desc:0 "日本人素来以礼待人，但他们似乎十分喜欢那些辱骂德国人的低俗词汇，每每提及便是会心一笑：我们的贸易谈判，一鸣惊人，大获全胜！与日本的首笔交易已然落定，现下，我们的目光转向了印度、印度尼西亚与越南，期待与这些国家缔结良缘，签订互利共赢的贸易协议。我们预计这些谈判将顺利进行，毕竟我们支付的是实实在在的货币，而不是像日本那样用“债务减免”来交换。归途之中，我们或许还会再度踏足澳大利亚，进一步巩固我们与自由国家组织代表团的友好关系，让合作之花绽放得更加绚烂。"
 ita_a_new_silk_road:0 "新丝绸之路"
 ita_a_new_silk_road_desc:0 "七百年前，马可·波罗从威尼斯出发，历经中国，再安全返回，开启了欧亚洲间直接贸易的先河。如今，我们站在巨人的肩膀上，要以更快的速度续写这段传奇。通过与相关各国缔结的条约，我们计划投资兴建一条现代化的铁路和机场网络，从的里雅斯特启程，经君士坦丁堡、德黑兰、新德里、加尔各答、香港、上海、北京，直至京城，但这一宏伟蓝图，或许还需土耳其、日本和印度的鼎力相助。\n\n这一雄心壮志，虽需耗费巨资与无限心血，但一旦梦想成真，其带来的利益将不可限量。意大利与亚洲市场若能直接相连，我们的产品将以最低的成本远销至日本等遥远之地，这将大幅提升我们的竞争力，使我们在世界经济的舞台上更上一层楼。"
 ita_made_in_italy:0 "意大利制造"
 ita_made_in_italy_desc:0 "美酒佳肴，源自我们的田野；卡拉拉的大理石，美轮美奂；法拉利轿车，驰骋世界；奥利维蒂计算机，科技前沿——这些仅是我们制造业辉煌的一角。随着我们在国际上关系的改善，让我们得以将这些顶级产品以高价远销海外，为国民提供更多就业机会，也为国家财政注入活力。\n\n盟友的支持，将助力我们共同发展，稳固彼此的友谊，让地中海——这片“我们的海”——迎来繁荣的新时代。"
 ita_maintain_the_hegemony:0 "维护霸权"
 ita_maintain_the_hegemony_desc:0 "新市场固然要开拓，但本土市场亦不可放松。利用金融壁垒和国家的隐性支持，让我们的企业在国内安心发展，无需担忧不公竞争，进而在国际舞台上大展宏图。\n\n尽管这可能会让一些合作伙伴感到不悦，但鉴于他们本国亦有此类举措，这自是无可厚非。稳健的国内市场，不仅保障了就业，也稳定了消费，让我们的社会更加稳固，远离失业阴霾。"
 ita_our_seas_ita:0 "我之滨，我之海"
 ita_our_seas_ita_desc:0 "地中海，自古以来便是我们的“内海”，罗马人的征服铸就了这一荣耀：直布罗陀海峡被封锁，苏伊士运河亦在我们的铁腕控制之下，无人能够撼动我们对这片历史海域的掌控。这里曾是罗马帝国与迦太基、埃及的古战场，也是威尼斯与奥斯曼帝国的海上争锋之地。\n\n随着我们对埃及、厄立特里亚和也门的掌控得到巩固，红海也继而成为我们海权的一部分。为了守护我们的海上霸权——以及我们的油轮，我们将在皇家海军中成立特别服务处，用轻型驱逐舰和护卫舰巡逻主要油路，确保海盗和敌对海军远离我们的生命线。"
 ita_balkan_ouvertures:0 "示好巴尔干"
 ita_balkan_ouvertures_desc:0 "意大利的新边疆，如今已延伸至巴尔干。随着达尔马提亚和阿尔巴尼亚的领土纳入我们的版图，影响力也随之扩展到了克罗地亚和希腊。巴尔干诸国——希腊、塞尔维亚、保加利亚、克罗地亚、罗马尼亚——虽然历史多舛，纷争不断，但它们为我们的企业带来了无限商机：基础设施现代化、工业建设、军队培育，这些都需要大量的合同。\n\n我们应与这些巴尔干国家，无论是势力范围内还是之外，尤其是那些尚未触及的国家，建立新的关系：塞尔维亚的铝矿、罗马尼亚的油田，若能为我所用，必将提升我们的贸易实力，同时削弱德国在该地区的影响力。亚特兰特罗帕的教训告诉我们，让德国人为他们的过去付出代价，正是我们所追求的正义。"
 ita_balkan_ouvertures_tt:0 "与§Y巴尔干国家§!的贸易关系将日益§G增进§!。"
 ita_expand_the_suez:0 "扩张苏伊士"
 ita_expand_the_suez_desc:0 "苏伊士运河，那百年前的伟业，朱塞佩·威尔第的《阿依达》正是为它的盛大开幕而谱写，如今这一奇迹却面临着时代的淘汰：直布罗陀海峡因那厄运缠身的大坝而封闭，苏伊士的海运交通日益繁忙，我们的贸易船队常常要等待数小时，有时甚至数日，才能进入运河。\n\n扩建苏伊士，增建第二条航道，虽需巨额投资，却势在必行。让新的贸易船只得以畅行无阻，每一艘新船都将为我们贸易的血脉注入生机，让这经济的活力源源不断。"
 ita_our_allies_itan:0 "我们的盟友"
 ita_our_allies_itan_desc:0 "我们贸易政策的重点，将聚焦于那些与我们情谊深厚的国家和盟友：我们将努力签订互利的关税协定，激励企业迎合我们伙伴的需求。与盟国友好使者的会晤已在筹备，国际贸易部长的案头，草案已然就绪。未来不久，铁路和航线将熙熙攘攘，载着我们的商品走向世界每一个角落，而我们将需要耳塞，来抵御那财富滚滚而来的悦耳之声！"
 ita_support_eni:0 "支持埃尼集团"
 ita_support_eni_desc:0 "随着全球对石油的需求日增，相应的，我们的石油产量也亟需提升。恩里科·马泰为我们描绘了一幅幅势力范围内的合资蓝图，他所盼的，不过是我们的一纸批准——虽然他在法律面前常显得不拘小节，但关键时刻，他懂得如何向权威低头——以及军队的保驾护航，以确保开采地点的安全，并启动石油开采。\n\n收益不会一蹴而就：石油生产的稳定需要时间，且我们还需先清偿一些……旧账，资金方能缓缓流入。不过，我听闻这已是马泰今年添置的第三辆法拉利了？无妨，只要他能持续为我们的金库添砖加瓦，我甚至愿意在圣诞节时，将整个法拉利公司买下来作为礼物赠予他，以示嘉奖。"
 ita_arabian_nights:0 "阿拉伯之夜"
 ita_arabian_nights_desc:0 "想象那片遥远的土地，油轮在沙漠的海中游弋。\n异域的语言，文化的交融，于混沌中绽放，彰显着我们的影响力。\n\n东方的日本，西方的德国，美国的目光穿越时空，\n邀你降临，驻足此地，驾风而行，飞向又一个一千零一夜！\n\n战火与和平，皆如烈焰，炙烤着这片古老的土地，\n政治的风云，贸易的浪潮，混乱中孕育着不为人知的繁荣。\n\n唯有民心所向，方能铸就帝国的辉煌，\n一个未琢之玉，正待雕琢，终将绽放光芒。\n\n荣耀之冠，必将加冕于我们，\n因着这片传奇之地，天命早已为我们铺就。"
 ita_arabian_nights_tt:0 "与§Y阿拉伯半岛§!国家的贸易关系将日益§G增进§!。"
 ita_trade_dominance:0 "贸易主导"
 ita_trade_dominance_desc:0 "昔日闭关自守的意大利，如今已展翅高飞，破茧而出，挣脱出地中海的桎梏，抛弃了关税壁垒和海关的屏障，成为世界贸易的领航者。商船扬帆远航，载誉归来，将优质商品与异域珍馐带回祖国，再现海洋共和国的荣光。意大利商人，峰会上的佼佼者，与日本财阀、美国巨头同台竞技，他们的智慧和经验，赢得全球赞誉，我们的企业拥有众多子公司，在全球版图上星罗棋布。\n\n意大利在贸易的舞台上独占鳌头，国力日盛，财富滚滚而来。人民是我们的坚强后盾，我们的商界领袖正引领时代潮流，放眼世界，谁与争锋？"
 ita_citizens_in_uniform:0 "士兵也是公民"
 ita_citizens_in_uniform_desc:0 "独裁之下，士兵们不过是机器里可被随意替换的零件。他们被那些野心勃勃的将军们推向死亡，而那些将军们只是为了增加自己的权力和声望。尽管他们的名字被刻在纪念碑上，被演讲颂扬，但这些都无法让逝去的生命重获新生。若要构建真正的民主，军队也必须体现我们的价值观。\n\n我们的改革将聚焦于两大目标：首先，我们将对军官团的组织和人事进行大刀阔斧的改革，摒弃那些低效的程序和人员，提倡能力至上和透明管理，确保将军只有在万不得已的情况下才会让士兵牺牲；其次，士兵们将享有我们新民主制度下的所有公民权利，他们穿上军装，也是普通公民的一员。"
 ita_assess_our_threats:0 "评估我们的威胁"
 ita_assess_our_threats_desc:0 "内部问题既已解决，军队亦忠诚高效，我们便可真正着手关注潜在之敌。军事情报局的统计局与间谍局正联手展开一项宏伟的评估工程，全面审视地中海上对意大利霸权可能构成的威胁：部队的规模、装备、训练、补给线、战术运用、防御要塞以及进攻潜力，每一个细节都不放过！\n\n一旦数据尽收眼底，总参谋部便将据此精心策划意大利的防御大计：设防布局、反击策略、撤退路线、盟友联络网，一一考虑周全，确保我们稳操胜券。"
 ita_the_black_spawn_of_the_reich:0 "德国的黑卵"
 ita_the_black_spawn_of_the_reich_desc:0 "如果说这世界上有什么地方真正能与地狱相提并论，那非勃艮第莫属。在那极端政权的铁腕下，其军事化程度之深，令其他文明社会望尘莫及。这个大日耳曼国的孽种，神秘莫测，危险重重：他们拥有一支装备精良、训练有素的军队，士兵们对国家忠心耿耿，可谓是全民皆兵。这种雄厚的战争潜力，使得任何试图在战盘上模拟对抗希姆莱及其随从的演习，即便是我们最精明的策略家也难以轻易制胜。\n\n军事情报局面对此等怪胎也束手无策：任何在其境内被发现的非德国人或奴隶都会立即被射杀，侦察飞机一越界即遭炮火锁定。目前，我们只能加固与他们接壤的阿尔卑斯防线，筑起山岳要塞，增兵驻守，静待军事情报局能够探得他们军力的一鳞半爪。"
 ita_the_heart_of_the_reich:0 "德国之心"
 ita_the_heart_of_the_reich_desc:0 "战火之后，德国由昔日盟友变作今日劲敌。从直布罗陀大坝的纠葛到那经济的崩溃，再到他们现在对巴尔干展露的野心，我们必须时刻警惕，准备应对任何可能的挑衅。\n\n军事情报局深入搜集了边境德军的情报。分析显示，尽管国防军受腐败和内斗所困，力量有所削弱，但仍是一股不可小觑的力量。为此，我们的总参谋部建议加固一战后建立的阿尔卑斯防线，以防范奥地利方向任何试图夺回特伦蒂诺的企图，并部署先进的防空系统，以让我们的空军在与德国空军争夺天空的较量中抢占先机。"
 ita_you_cant_gas_sigint:0 "涤荡情报之眼"
 ita_you_cant_gas_sigint_desc:0 "在这个科技日新月异的时代，技术不仅是战争的利器，更是战略的砝码。军事情报局专注于军事情报与通讯截取的第二部门，正请求增援和设备升级，以有效守护我们的信息安全，抵御敌人间谍的侵袭。他们还计划通过截取电报和无线电信号，巧妙地获取情报，为战略决策提供支持。同时，我们还需在可能的战场前沿，建立雷达站，以提前预警敌军的空袭、导弹攻击等威胁。\n\n有了这样铜墙铁壁般的物理与技术防御，我们的国防必将坚如磐石，固若金汤。"
 ita_the_results_of_our_assessment:0 "洞察之果"
 ita_the_results_of_our_assessment_desc:0 "现今四周潜伏的威胁众多，我们难以一一应对，更无法未卜先知，为所有可能情形做好准备。四周潜伏的威胁众多，我们难以一一应对，更无法未卜先知，为所有可能情形做好准备。我们的总参谋部已经向我们展示了数个防御计划和预期的改进措施，以及相应的预算需求，我们必须在其中择优而选，同时心知肚明，那些未被采纳的计划，可能就此石沉大海。\n\n无论如何，我们必须审慎决策，因为我们国家的未来，以及我们以无数英雄儿女的鲜血铸就的辉煌，现在都掌握在我们手中。"
 ita_a_defensive_mindset_is_necessary:0 "未雨绸缪，守为正道"
 ita_a_defensive_mindset_is_necessary_desc:0 "即便在最佳情况下，我们的兵力也显得捉襟见肘：守护我们整个势力范围是一项艰巨任务，全面动员下亦难对敌施以有效打击。因此，策略家们建议我们，尤其是面对德国时，应持守势心态。\n\n人力不济，工业供给亦难支撑长期攻势，我们的当务之急是减少自身损失，同时力求重创敌军：广建防御工事，炮兵和机枪阵地交叉布置，布置地下供应库、防空炮和雷区等，这些措施能有效地以较小代价给敌人带来巨大损失，令强大的德国在攻击我们前也要再三考虑。"
 ita_let_sleeping_sailors_sleep:0 "勿扰水手之梦"
 ita_let_sleeping_sailors_sleep_desc:0 "皇家海军开销巨大，但效用有限——海格力斯之柱已被大体上保持中立的伊比利亚人所控制，苏伊士运河也在我们掌控之中，敌军舰队无法直接威胁到我们的海岸，故发展海军的效用并不显著。然而，削减经费不免引发争议，动摇我们军心的团结，此非意大利在这多事之秋所能承受的。\n\n弃船非良策，何不另辟蹊径，调整海军战术，以顺应陆战为其新重点，为舰队及其预算找到新的目标：支援陆军，确保海上补给线不受敌军，特别是德国U型潜艇的侵扰。"
 ita_train_shore_bombardements:0 "训练海岸炮轰"
 ita_train_shore_bombardements_desc:0 "战列舰上搭载的巨炮，威力巨大，远非一般野战部队或炮兵营所能匹敌。那些为抵御陆上火炮而建的碉堡，面对海军舰炮，不过是纸老虎。\n\n与其让舰船在港口中闲置，不如训练舰员，让它们在沿海行动和两栖登陆中大显身手：通过精确的炮击和持续的火力，敌人的防御工事在他们还未能锁定我军之前就将被摧毁成灰，敌军的士气也将如同被300毫米海军榴弹炮命中的驱逐舰一样，迅速崩溃。"
 ita_carrier_combat_support:0 "航母作战支援"
 ita_carrier_combat_support_desc:0 "航空母舰，海战中的现代巨擘，本质是一艘能将数十架战机迅速投送至战场腹地的漂浮机场——无论是海战场还是陆地战场。有鉴于此，我们可以将航母化作地面部队的流动支援基地，既输送战机制衡敌方轰炸机，也提供空中支援以助攻势，特别是在战场附近无机场可用时，这能确保空中支援的及时性，避免战机的流失。\n\n一些海军上将或许会埋怨海军变成了“皇家陆军的跟班”，但我们要提醒他们，若不这样，他们心爱的舰船将被拆解，钢铁将被用来制造大炮，而所有自负的上将和骄傲的水手也将被迫转行做炮兵……"
 ita_maybe_borghese_aint_so_bad:0 "第十突击艇队模式"
 ita_maybe_borghese_aint_so_bad_desc:0 "意大利第十突击艇队（MAS，即自动鱼雷快艇），轻巧迅捷，是一支能够快速突袭敌方无防护舰船的精英部队。\n\n皇家海军宜效仿第十突击艇队，着眼于打造更轻快的舰船，旨在守护我们的海上补给线——特别是油轮，并在“我们的海”（地中海）内对任何敢于侵入的敌舰实施迅速打击。在弹头威力巨大、易于携带的今日，一艘鱼雷快艇便能令驱逐舰、巡洋舰，甚至战列舰沉没海底。"
 ita_end_the_navy_primacy:0 "终结海军优先"
 ita_end_the_navy_primacy_desc:0 "地中海之所以被称为“我们的内湖”，并非皇家海军之功，而是实际上由于无船可入。直布罗陀大坝封闭了地中海，苏伊士运河亦在我手，敌舰除非能奇迹般穿越摩洛哥，否则绝难进入。意大利已无需如此庞大的舰队，它不过是烧钱的无底洞——我们已无力仅为了那些明信片上的风景而维持这等臃肿大物：必须采取根本性的解决措施解决这个情况。\n\n皇家海军将大幅缩减：除航空母舰外，所有主力舰都将被拆除，其官兵将转为海军陆战队和两栖作战专家。海军上将们可能会对此怒不可遏，但这总胜过向德国人低头。"
 ita_redirect_the_funding:0 "重配资金"
 ita_redirect_the_funding_desc:0 "吨位减轻，经费减少，我们的海军得以瘦身，资金得以转向战争的更关键和更现代化领域。虽然一些前海军军官还在对脏污的新制服抱怨连连，怀念他们旧日洁白的制服，但好处终将显现，他们也将不得不接受这一不争的事实。\n\n资金的注入，让皇家陆军如虎添翼，装备升级，火力倍增，而皇家空军也将扩编，增添飞机、支援部队和军事机场，以加强对我们领空的控制。"
 ita_fund_a_new_interceptor:0 "注资研发新型截击机"
 ita_fund_a_new_interceptor_desc:0 "相比于数量上的增加，我们渴求的是那些能够在空中格斗中取胜、摧毁敌军轰炸机的高精尖战机。德国空军的威胁如悬在每个人头上的达摩克利斯之剑，因此，皇家空军将增拨大量资金用于研发一种新型截击机，它必须灵活到足以规避敌方火力，同时火力强大到足以击穿轰炸机的装甲。\n\n面对敌火可能将我们秀丽河山变为焦土的风险，形势逼人，我们的军事科学家和工程师须臾不可耽搁：时光易逝，昨日不复，今朝即须奋起直追！"
 ita_a_new_tank_destroyer:0 "新型反坦克炮"
 ita_a_new_tank_destroyer_desc:0 "自上一次战争之后，我们的装甲部队虽有显著增强，但菲亚特M/39依旧是研发部门挥之不去的梦魇。面对德国装甲师庞大的数量优势、训练有素和整体高水平的现状，我们难以与之匹敌。即便我们的坦克能与德军坦克媲美，我们的工业也无法满足生产上的庞大需求。\n\n为此，我们将专注于开发一种新型坦克歼击车，用以对抗敌方装甲力量。这种歼击车造价低廉，由于省略了炮塔简化了结构，虽然构造简单，却能从远处精准地将装甲车辆化为一滩熔铁，令敌人无还手之力。若研发成功，我们将以雷霆手段，挫败敌军装甲之锋，以高速穿甲弹，让敌人的进攻在无情的反击面前止步。"
 ita_bunker_building_duties:0 "筑堡之责"
 ita_bunker_building_duties_desc:0 "强化防御之际，我们需组建专职的工程团队，负责碉堡的建造、修缮与升级。这些团队在战前或战后作业，无需战斗，我们可招募民间劳力，减轻军事后勤之负担。\n\n供应链乃制胜关键：构建碉堡需巨量混凝土、钢材、机械及其他建材，故增产迫在眉睫。罗马乃现代混凝土之祖，我辈制品自当不遑多让。"
 ita_invest_in_civil_defense:0 "投资民事防御"
 ita_invest_in_civil_defense_desc:0 "上一场战争告诉我们，地毯式轰炸摧毁的不仅是防御工事，更是民用之基：工厂、铁路、桥梁、政府建筑，一切生产与协调的命脉皆成废墟。民心动摇，久之可能逼迫政府屈膝。\n\n虽无法庇佑每一位国民，但我们至少可以加强城市防御，减少敌人空袭的威胁：在关键位置部署防空炮，减少炸弹的命中率；建立地下掩体，为无法及时躲避的人提供避难所；培训民间消防员和志愿者，以应对空袭造成的破坏。我们只能期盼这些措施能够发挥作用……"
 ita_base_protection:0 "基础保护"
 ita_base_protection_desc:0 "意大利当前所面临的最大威胁，莫过于北方的暗影之国。从法国的陷落和德国的战事来看，我们在战场上似乎难以与党卫队分庭抗礼。然而，勃艮第人过分依赖步兵的狂热和经验，这或许正是他们的致命弱点。我们建造防御工事和仓库，作为军队阵线的坚强后盾，有望削弱敌人的战斗优势。\n\n改善阿尔卑斯山基地人力和物资短缺的现状，虽非一朝一夕之功，但为了长远的战略利益，这一切的投入和努力都是值得的。意大利将筑起坚如磐石的防线，让敌人的侵略浪潮在此碰壁。若希姆莱的暗影目光投向南方，他将发现这里不是征服之地，而是他的折戟沉沙之所。"
 ita_they_can_handle_it_on_their_own:0 "他们自己能应付得了"
 ita_they_can_handle_it_on_their_own_desc:0 "为应对勃艮第威胁，修建防御工事固然是当务之急，但面对政府诸多迫切问题，维持官僚体系现状似乎更为合理。诚然，如果能得到罗马上级的额外支持、信任与压力，当地领导自能独立实施必要之变革。\n\n然而，暗影国虽为一大隐患，但黑色军团短期内似乎未必南下。目前，希姆莱似乎正忙于某些神秘且不祥之事。故此，建设防御工事虽十分重要，但相较于其他问题，这个问题仍属次要。"
 ita_assign_it_to_the_army:0 "分配陆军"
 ita_assign_it_to_the_army_desc:0 "我们已向西阿尔卑斯地区的民事当局下达了明确指示，要求他们将军事防御工事的建设放在首位，但工程进度依然缓慢且缺乏章法。为了迎战骑士团国，现在迫切需要军队介入以加速工程进度。\n\n虽然此举可能会增加开支，并引发当地居民的不满，但面对强敌，这些牺牲在所难免。希姆莱是否南侵尚不明朗，但鉴于他的野心，我们必须未雨绸缪。若我们未能做好准备，意大利可能遭受的灾难性后果是难以想象的，因此，这些防御工事必须尽快且彻底地完成。"
 ita_expand_the_carabinieri:0 "扩编国家宪兵"
 ita_expand_the_carabinieri_desc:0 "国家宪兵，作为我们的坚强臂膀：他们不仅在战斗和执法领域有着深厚的技能，还能灵活地扮演多种角色：既能作为维和部队维护秩序，也能作为快速反应部队迅速应对各种紧急情况，同时还能有效地打击腐败现象。正如达拉·基耶萨将军在黎凡特所展现的那样，国家宪兵在处理棘手案件时，总是审慎行事，秩序井然，且不乏外交手腕。\n\n鉴于此，我们将进一步扩充宪兵队的规模，增拨更多的人员和资金，同时组建几支执行特定任务的精英小组，专注于打击犯罪渗透、预防腐败和进行高科技调查。这样不仅能提升我们的行动效率，也能在不直接涉及国家安全的事务中，为军事情报局减轻一些负担。"
 ita_crack_down_on_corruption:0 "严打腐败"
 ita_crack_down_on_corruption_desc:0 "军队内的腐败，实为国家之蠹：法西斯之手将王国武装力量变为其私相授受的场所，无能之辈与政治宠儿被安插于要职。虽然一些害群之马已被剔除，但根治腐败的道路仍任重道远。在军事情报局、国家宪兵与军事警察的通力合作下，我们已组建了一支反腐尖兵，誓要深挖细查。\n\n然而，这场行动无疑是一场政治豪赌，我们不能冒险激怒整个总参谋部，以免引发宪法危机。因此，我们应将反腐行动的锋芒先指向军队的一个分支，而对其他两个分支的整顿，则需从长计议，待到时机成熟再行定夺。"
 ita_investigate_the_navy:0 "调查海军"
 ita_investigate_the_navy_desc:0 "亚特兰特罗帕灾难之后，地中海——我们的“内海”——面积大为缩减，几乎沦为一潭死水，皇家海军自此便一直泊港不动，常言道，“闲则生非”，他们的士气难免低落，腐败或随之而生。我们亟需审视海军上将们的军费账目，细查所需与所费是否相符，更须考核军官之才，确保军中无滥竽充数之辈。"
 ita_investigate_the_army:0 "调查陆军"
 ita_investigate_the_army_desc:0 "金钱如雨般洒向皇家陆军，近年来我们对其的投入巨大，然而，这样的慷慨可能已转化为不当之用，特别是用于贿赂和军官个人的不当开销。面对四周潜伏的敌人，我们绝不能容忍一个腐败低效的军队。必须确保士兵们得到应有的训练、装备和指挥！\n\n因此，我们将对军事开支进行严格的审查，重新审视每一笔支出，确保每一分投入都能转化为士兵们的力量和效率。"
 ita_investigate_the_airforce:0 "调查空军"
 ita_investigate_the_airforce_desc:0 "皇家空军在各军种中规模较小，但其小规模易于藏污纳垢。我们须明察秋毫，严审燃油与机场维护之费用，以期揭露贪污腐败之行：空军当守护蓝天，非将军之财库也！"
 ita_we_did_what_we_could:0 "尽我们所能"
 ita_we_did_what_we_could_desc:0 "调查已然落幕，我们已尽所能，让所有发现的腐败行为遭到军事法庭的严厉打击。然而，忧虑之声犹存，担心旧腐败之门虽闭，新途径又将开启……\n\n但此乃后话。欧洲阴霾笼罩，我们无暇顾及那些蝇头小利的腐败分子。若情势所迫，大可将他们送往前线，以身试法。"
 ita_your_friend_the_military_police:0 "军事警察朋友"
 ita_your_friend_the_military_police_desc:0 "军事警察，乃我们在国内战线的坚强后盾。我们应教导所有公民，在战争时期，一旦发现暗中集会或在关键设施附近徘徊的可疑之人，即刻向邻近的军事警察或卡宾枪骑兵汇报。这些行为背后，往往隐藏着敌谍的阴影。\n\n尽管对我们的公民进行监视似乎与我们追求的民主精神背道而驰，但“防人之心不可无”，在保护权利的同时，更需警惕潜在的危机。我们不能因过分溺于人权的庇护，而忽略了守护国家安全的重任，以免敌人趁机窃取机密，让我们措手不及。"
 ita_criminology_and_crypthography:0 "犯罪学和密码学"
 ita_criminology_and_crypthography_desc:0 "犯罪学，作为一门新兴的法医学科，它致力于通过分析犯罪者的行为和遗留痕迹来探究其心理动机。在间谍战场上，我们可以利用犯罪学来预判敌方的行动，进而采取相应措施，保护我们的重要资产，比如军火库、军事设施和研究场所。\n\n密码学，这门古老的技艺，自从人类开始寻求隐藏通讯内容的方法起便已存在：从古希腊的密码棒到德国的恩尼格玛机，这些加密手段虽历经变革，但其核心原理一脉相承。我们应始终力求走在敌人前面，确保当我们的密码被破解时，我们已经掌握了更新、更先进的加密技术，让敌人难以追上我们的脚步。"
 ita_stay_behind_planning:0 "后援策略"
 ita_stay_behind_planning_desc:0 "意大利，四邻皆敌。北有德国人虎视眈眈，西有暗影之国暗潮汹涌，南有复兴党人伺机而动，东有土耳其人觊觎之心。这些潜藏的敌人，犹如暗夜中的野兽，随时准备上前扑食。\n\n若敌视我们者认为时机已到，认为我们软弱可欺，那么其他敌人也可能随之而起，意大利的领土完整或许会暂时受到威胁。在这种危机时刻，国家宪兵将扮演举足轻重的角色：他们将援救那些困于敌后的同胞，管理新近解放的土地，以及与我们势力范围内和本土的民众保持鱼水之情。因此，我们必须未雨绸缪，加强卡宾枪骑兵的准备，确保他们在任何艰难险阻中都能游刃有余，专业高效地履行职责。"
 ita_expand_the_carabinieri_further:0 "进一步扩大国家宪兵"
 ita_expand_the_carabinieri_further_desc:0 "凭借着在国内的深厚经验，我们正着手深化改革。军事警察与卡宾枪骑兵虽同担保护人民、打击犯罪之责，但卡宾枪骑兵更得民心。故此，我们计划将军事警察纳入卡宾枪骑兵，并增拨资金与人力。\n\n原军事警察将转变为卡宾枪骑兵中的精锐，专责监视可疑分子的行踪，与军事情报局携手，一同应对间谍活动。此举不仅节约了成本，还避免了职能重叠的发生，更能借此提升效率，赢得民众的广泛认同。"
 ita_the_fourth_service_arm:0 "第四军种"
 ita_the_fourth_service_arm_desc:0 "在意大利的军事布局中，国家宪兵曾被边缘化，这是我们的失策。他们乃武装力量中不可或缺的柱石，既要抵御腐败与党争的侵蚀，亦要守护国土不受外敌侵扰。\n\n我们将提升国家宪兵的独立性，扩充其职责与资源，哪怕这须削减军事警察的规模，我们将能强化其应对各方内部威胁的能力。更为关键的是，赋予国家宪兵独立军种地位的时机已至，他们将与陆军、空军和海军同列。不久，意大利将拥有一支与强国相匹敌的安全力量。我们监视着苍穹、地中海及南欧与北非之地。而今，守护者亦将受到监督，以确保他们恪守职责。"
 ita_the_armys_compagnion:0 "军队运动"
 ita_the_armys_compagnion_desc:0 "我们终于实现了将国家宪兵完全融入武装力量指挥体系的目标。此举不仅理顺了其与各军种的脉络，更摒除了宪兵定位之惑。此举意外地带来了诸多益处：战略规划变得更加有序和集中，计划的质量和数量也得到了提升。\n\n军心如一，民心所向。"
 ita_repurpose_light_helicopters:0 "轻型直升机再利用"
 ita_repurpose_light_helicopters_desc:0 "轻型直升机，昔日的空中骄子，如今在现代战场上却显得不堪一击：它们脆弱的机体连轻型武器都难以抵挡，继续使用它们无异于自损战力。幸运的是，我们的机动部队已经配备了更为坚固的新型直升机。\n\n因此，我们机库中尚存的数百架轻型直升机将被赋予新使命，转变为轻型多用途运输工具，用于快速转移医疗人员、工程师等非战斗人员，这无疑将大幅提升我们的后勤运输效率。"
 ita_the_transport_of_the_future:0 "未来交通"
 ita_the_transport_of_the_future_desc:0 "汲取过往教训，我们打造出了一种新型直升机运输机，它在战场上运送士兵的能力无与伦比：经过加固的机身，宽敞货舱的，足以安全携带十二名全副武装的士兵及其装备，还能通过射击口进行反击，他们将被直接投放到战斗的最前线，三挺机枪更为其提供了猛烈的火力支援。\n\n随着运输机的黄金时代落幕——自动瞄准和防御导弹的问世让空降行动变得危机四伏——运输直升机，无疑成为了战术兵力部署的新宠。"
 ita_a_broader_base:0 "广泛根基"
 ita_a_broader_base_desc:0 "我们不得不承认的事实是，与德国、美国或日本这些国家相比，我们的人力资源基础非常有限，我们广袤的疆土使得我们的军力难以集中。因此，在关键时刻，我们不可挑剔，必须号召每一位国民：每个人都有义务为国家尽忠！\n\n民主改革之际，我们得以开辟新的人力资源之源：那些殖民地上的原住民，曾受法西斯压迫之苦，如今将被激励与昔日的压迫者并肩作战，以赢得应有的报酬；女性，她们曾被束缚于厨房一隅，现在将有机会选择守护自己的孩子，而不是在泪水中目送他们踏上不归的战场。"
 ita_racial_integration:0 "种族融合"
 ita_racial_integration_desc:0 "与德国和日本不同，我们国家向来不崇尚种族歧视和隔离。意大利人虽然享受了比原住民更优厚的待遇，但对原住民的迫害和屠杀事件却鲜有耳闻，这些却是在其他国家屡见不鲜的残酷现实。通过巧妙的宣传，凸显我们与其他殖民者的差异，并提醒他们，一旦我们的殖民地遭遇敌对势力的侵占，后果将不堪设想。如果这样的宣传再配以崭新的制服和实实在在的薪水，必将吸引众多的当地青年加入我们的行列。"
 ita_remember_rome:0 "追忆罗马"
 ita_remember_rome_desc:0 "罗马之所以成就辉煌，是因为它懂得如何将征服的民族同化：通过贸易、外交、互惠互利——偶尔也会施以严厉的惩戒，但这并非重点——罗马人巧妙地让当地居民心甘情愿地接受他们的统治，经过岁月的洗礼，将他们塑造成忠诚的子民。军事服务在这一过程中扮演了关键角色，服役满二十年的辅助部队成员，便能获得罗马公民的荣耀。\n\n以罗马为鉴，我们将赋予那些在皇家军队服役至少十年并表现出色的原住民以意大利公民的身份！虽然头盔下新的口音和黝黑的面孔意大利人可能还需要时间去适应，但意大利正迎来一个崭新的时代，这个时代，必将赋予每一个人——是的，每一个人——平等的机会。"
 ita_they_too_fight_for_italy:0 "利比亚援助"
 ita_they_too_fight_for_italy_desc:0 "一位年轻的贝都因族首领，自号“锡尔特贝都因人领袖”的穆阿迈尔·卡扎菲，请求与利比亚军方高层会面。他颇具领袖魅力，却也不乏傲气，向我们提出了一个颇为有趣的提议：他不是在请求，而是“要求”在意大利军队中占据一席之地，并且要求金钱“补偿意大利帝国主义者对他土地的掠夺”，这两个要求似乎有些自相矛盾。\n\n然而，他的影响力不容小觑：在东利比亚沙漠的贝都因人中，他享有崇高的威望，而那里正是我们油田的集中地。如果他所求的仅是一个名号和一笔金钱，以换取沙漠的宁静，并为军队输送300名精兵，那么我将毫不犹豫地亲自授予他将军的荣誉。"
 ita_united_we_stand_divided_we_fall:0 "同心则昌，离德则亡"
 ita_united_we_stand_divided_we_fall_desc:0 "本是同根生，何分彼此，我们都是意大利的儿女！敌人以枷锁和恐惧为武器，企图迫使他人臣服，但这正是自掘坟墓的行径，因为我们的战士心手相连：我们同仇敌忾，没有主仆之分，而是战友之情。我们愿意为彼此两肋插刀，共迎自由的曙光。\n\n那些受制于鞭挞的奴隶之师，怎能与我们这些为家国、为挚爱、为信仰而战的勇士相提并论？恐惧怎能战胜我们的勇气与忠诚？黑夜又怎能永远遮蔽黎明的光辉？不，绝无可能，他们终将败退！"
 ita_women_in_the_military:0 "女性参军"
 ita_women_in_the_military_desc:0 "我们总参谋部经过评估认为，由于女性不被允许参军，我们约有一半的潜在人力资源被闲置在厨房等地方。这种情况必须改变。若我们真心希望建立一个平等的社会，那么男女不仅应享有同等权利，也应承担相同的国家义务。\n\n因此，我们将敞开大门，欢迎女性加入军队。虽然组建全女性战斗部队的梦想尚且遥遥无期，但这并不意味着我们不能让她们在辅助岗位上发挥作用，从而为前线作战腾出更多急需的人力资源。"
 ita_seek_out_volunteers:0 "派遣志愿军"
 ita_seek_out_volunteers_desc:0 "女性参军的门槛已撤，但我们仍需积极引导女性加入军队。不少女性，或受家庭旧观念束缚，或对踏出舒适区心生畏惧，仍旧徘徊不前。我们亟需转变这一局面。\n\n我们将发起一场声势浩大的宣传活动，向所有女性表明，她们可以自主决定加入军队，无需征得父母或丈夫的同意。我们首批征召到的女兵将巡游城乡，以身作则，向女性证明投身军旅，非但不会削弱她们的女性魅力，反而更显英姿飒爽。"
 ita_remember_the_auxiliaries:0 "铭记辅助部队"
 ita_remember_the_auxiliaries_desc:0 "自军队成立伊始，女性辅助人员便在护士、厨师等支援岗位上默默奉献，然而她们的付出往往被漠视，鲜少获得应有的荣耀。在我们讨论组建第一支全女性营队之际，我们不能忘却那些女性，她们虽未持枪，却以满腔热忱，终生为意大利尽忠：她们或执勺、或握针、或持机，她们是军队坚实的柱石。让我们为这些无名英雄，致以崇高的敬意！"
 ita_the_better_pilots:0 "翱翔蓝天的精英"
 ita_the_better_pilots_desc:0 "伊塔洛·巴尔博，虽为法西斯主义者，却也是女性飞行员的坚定支持者，他鼓励她们私下磨练飞行这一崇高技艺。继往开来，我们更应在此基础上大展宏图，正式成立首支女性飞行员中队。忆往昔，苏联的“强袭魔女”曾于夜空中展翅高飞，我们相信，给予我们的新飞行员们最先进的飞机，而非那些陈旧的双翼机，她们定能飞得更高，表现得更出色。"
 ita_better_together:0 "合则两利"
 ita_better_together_desc:0 "我们扫除偏见与歧视，铸就了一支雄壮之师，亦营造了和谐包容之社会。昔日眼中充满仇恨、恐惧、轻蔑、嫉妒之人，今朝愿同心协力，共卫意大利。旧恨新仇，虽难忘却，但时间终会冲淡一切。抗拒变革的声音，终将沉寂于人民自豪前进的步伐之下。我们已发挥了国家的潜力，摒弃了陈腐的信仰和社会陋习，现在，我们比我们的敌人更加强大。"
 christdem.38.t:0 "皇后轻落C6，战车直指H5"
 christdem.38.d:0 "国防部的掩体内，二十余名男士——或戎装笔挺，或文质彬彬，似外交官或高级特务——围立于一张铺满机密文件的大会议桌旁。一张巨幅地图铺陈其间：意大利本土以绿色居中，其势力范围以绿意浓淡示忠诚，其他国家则根据所属联盟、政府及其他重要信息用不同颜色和深浅标记。棋盘上，棋子按优先级分布：国王傲立罗马，皇后镇守日耳曼尼亚，战车守卫但泽与伊斯坦布尔，主教守望马德里与伦敦，骑士与兵卒遍布势力范围与帝国总督辖区。\n\n“先生们，”国防部长沉声开场，“三头同盟落幕，帝国瓦解，我们的战略地位已翻天覆地，一切皆成未知。”他指向地图上的国王，“要捍卫国家，我们必须洞悉真正的优先所在。”继而指向文件，“军事情报局的功劳，”一便衣男子微一颔首，“我们已搜集了关于迫在眉睫威胁的初步情报。我们的边防军已处于高度警戒状态，”他向总参谋长点头，“我们必须明确优先事项。”转向外交副部长，“外交团队亦传来了各国对我们新政府的态度及我们的预期外交策略。”\n\n“我们避免被混乱吞噬的唯一方法，就是完美规划每一步。绝不允许失误！一着不慎，满盘皆输，在面对未知之敌的情况下，意大利便可能落入孤立无援的境地。现在，让我们着手工作！”众人纷纷点头，议论声渐起。"
 christdem.38.a:0 "王车易位。"
 christdem.39.t:0 "如果你凝视深渊……"
 christdem.39.d:0 "沃尔佩742号，军事情报局的特工，将一摞机密文件递给了他的顶头上司蒙维索12号。蒙维斯细细审视，将照片逐一铺陈于案，文件匆匆一览。审视完毕，他赞许地对沃尔佩说：“沃尔佩，你干得漂亮，我非常赞赏。我必须承认，我原本对这次行动并不抱太大希望。当然，这并不是小看你或你的团队，只是……”沃尔佩接口道：“只是你本以为我们一踏入那片炼狱便会命丧黄泉，对吗？”蒙维索点头：“你的成功，多半归功于你的那些……非常规要求。一艘船、法国护照、一万法郎和潜水装备，这组合实在……不同寻常。”\n\n沃尔佩轻笑：“那艘船载我们从热那亚至马赛，我们伪装成从尼斯来的意法混血，去巴黎探亲。夜幕降临，我们用金钱买通了巴黎南部的下水道维护工，潜入下水道，顺着管道来到塞纳河，在北巴黎重新露面。那里，与军事情报局有联系的奴隶抵抗组织的成员帮我们逃出了城市。之后，我们主要的任务就是隐匿行踪，虽然里面的监视并不严格：他们过于自信，认为无人能入，因此也无需隐藏他们的行动，不让人窥探……最终，我们原路返回。”\n\n蒙维索难得地放声大笑，起身拍了拍沃尔佩的肩膀：“沃尔佩，干得好，干得好！保持这股劲头，你的前途不可限量……”然后他看着桌上的文件，叹了口气：“现在，让我们言归正传：这些文件内容重大，而且相当……”\n\n“令人作呕？”\n\n“不，沃尔佩，是引人入胜。引人入胜。”"
 christdem.39.a:0 "深渊也在凝视着你。"
 christdem.40.t:0 "负伤雄狮仍可怒吼？"
 christdem.40.d:0 "军事情报局的总部设于布拉斯基堡垒，其37号房间专攻军事信息和统计数据的研究，此刻正人满为患。各军种的高层干将与代表齐聚于此，因为德国监视团队的最新情报——包括边境观察和空中侦察——已经送达。\n\n桌上铺陈着照片、信函、报告、图表，还有那些满是百分比的文件，从这些井然有序的资料中，有一点昭然若揭：德国正悄然重整军备。其真正图谋何在，尚属未知：有人揣测德国或将收复叛逆的总督辖区，有人认为德国可能试图再次对东欧施加其影响，而少数人则忧虑日耳曼尼亚的新政权可能藏有更阴险的野心。\n\n然而，在未有确凿信息之前，新生的大日耳曼国的终极企图仍然扑朔迷离，但现有情报足以让我们洞悉其行动方式，并制定相应的反制措施。面对德国的每一种新武器，我们需有反制之道；面对每一个新战术，我们需有破解之法；面对每一个新组建的师，我们需有一支精兵来坚守阵脚。或许这些措施已足备，或许尚显不足，但至少目前，我们唯有如此。"
 christdem.40.a:0 "真希望如此。"
 christdem.41.t:0 "欧洲的最后堡垒"
 christdem.41.d:0 "索尼奥看着面前乱作一团的官员们，外交官、将军以及西装革履的官员们于他身前齐聚一堂，围坐在圆桌旁。\n\n“此乃——”国防部长一边说，一边从打字机旁拿起一份沉甸甸的文件，“我们报告的全貌。”他将文件重重地落在桌上，发出一声沉闷的响声，接着道：“对耽搁之事，我深表歉意。”\n\n“嗯，这分量不轻，”索尼奥评点着，“它涵盖了我们已商定好了的所有篇章吗？”\n\n部长迅速答道：“确实如此，先生。我们对每一种可能的应急措施都做了详尽规划：应对勃艮第人的突袭、抵御德国的策略，甚至包括一些概率较小的情节，如先发制人地进攻法国。”部长翻到文件的前几页，迅速扫了一眼，然后招手示意索尼奥近前。“这一页展示了我们对全球潜在战争场景的总体策略。简而言之，我们在此达成了共识。”他稍作停顿，继而说道，“我们一致认为：我军几乎无法抵御德国的全面进攻，尽管我们对其他国家的防御能力稍显强力。”找到他要强调的句子后，他朗读道：“依托阿尔卑斯山的地利，我们能在相当长的时间内固守前线。然而，即便防线被突破，也不代表我们防御策略的终结。通过伏击、截击运输队和游击战术，我们将让任何企图入侵者的每一步都步履维艰，希望这能将他们困在亚得里亚海以南，无可动弹。”\n\n索尼奥沉思了片刻。“卓越的工作，部长。然而，现在对你而言，真正的挑战才刚刚开始。准备着手将这份报告中的建议和计划付诸武装部队吧。”"
 christdem.41.a:0 "说时容易做时难……"
 christdem.42.t:0 "模仿第十突击艇队模式"
 christdem.42.d:0 "二战时期，以战斗效率著称且擅长运用蛙人部队破坏敌舰的第十突击艇队名扬四海。作为我们防御准备的一部分，高层指挥部相信，将XMAS的战斗能力和战术原则复制到其他单位，将使我们舰队的整体实力得到最大化的提升。\n\n昔日，XMAS让英国海军胆战心惊，几乎独力将其逐出地中海。这支分队行动神速且无声无息，一旦投入战斗，便能迅速布雷，敌人往往在懵懂中已走向灭亡。面对海战技艺不及英国人的德国海军，XMAS更是如入无人之境。\n\n不久，我们将拥有一支既令人敬畏又现代化的海军，它将能在陆地政府资源和支持有限的条件下，依旧展现出足以令任何敌手胆寒的强大力量。"
 christdem.42.a:0 "愿此物永无用武之地。"
 christdem.43.t:0 "广泛呼吁"
 christdem.43.d:0 "[Root.GetLeader]目光如炬，审视着堆积如山的文件——一份关于意大利人力资源储备现状的详尽报告。报告中所绘之景，令人堪忧：意大利的预备役部队和现役武装部队的人力远未达标。根本的问题其实很直接：适合入伍的男性人数远远不够。然而，转机或许就在眼前。众多殖民地子民虽有报国之志，却遭拒门外。当然，我们亦可考虑解除对女性入伍的限制。这一决策或许会招致非议，却不失为一剂良方。这些曾被束之高阁的建议，随着意大利民主的春风吹来，或许不再是空中楼阁。[Root.GetLeader]嘴角掠过一丝轻蔑的笑意。意大利将承继古罗马遗风，向每一位忠心的子民敞开军团之门，共襄盛举，捍卫家国荣光！当然，这不会像取消现有法律限制那样一蹴而就；这些政策背后的偏见在民众和军队中仍然存在。此情此景虽棘手，却非无策；政府需巧施妙计，以理服人，以情动人，使人民与军队同归一心，坚信这是前进的唯一道路。"
 christdem.43.a:0 "一石二鸟"
 christdem.44.t:0 "新模范军"
 christdem.44.d:0 "锡尔特的市集广场上，一派繁忙景象：成百上千的利比亚人在此交易货物，偶尔有十来个意大利人警惕地巡视，以防骚乱。广场中央，一座新建的讲坛上，一幕不同寻常的情景吸引了众人的目光：一位肤色橄榄的混血男子，身披“皇家陆军混合军团”的戎装，立于一被蒙住的画框前，旁边是另一位埋首于纸堆的同僚。他用流利的当地方言高声宣告：“同胞们，政府有令，凡有志之士——没错，凡有志之士！——皆可投身军旅，共卫家国！”人群中响起了窃窃私语，甚至有人对士兵冷嘲热讽，但他不为所动：“我知道你们的想法，意大利人侵占了我们的土地，现在又想让我们为他们卖命？但这是有原因的！原因就是……这个！”他一边说，一边展示出藏在画框后的海报。\n\n人群的低语瞬间变成了尖叫和哭泣：海报上是一幕骇人听闻的场景，两个身穿黑色制服、臂戴纳粹标志的白人男子，正嘲笑着将一具瘦弱的黑人尸体扔进垃圾坑。坑中，更多瘦弱的黑人尸体挤作一堆，男女老少，赤身裸体，苍蝇覆盖了他们无生命的眼睛，有的骨头从半腐烂的肉体中突出。士兵的声音在人群中回荡：“这就是他们对待我们的同胞——在意大利以外——我们自己的人民的方式！”愤怒在广场上蔓延。“这些人——这些恶魔——永不会满足！他们会继续杀戮，直至无人幸存，然后他们就会来找我们！”尖叫声震耳欲聋，军官却露出了微笑。“打倒德国！”“为死者复仇！”“消灭纳粹！”的呼声在广场上此起彼伏。“如果你想保护你的孩子，现在就报名参军！所有服役十年的人都将成为意大利公民，永远享有公民权！意大利只愿给你们最好的，你们是否也愿意为意大利尽忠？如果是，就快去桌边报名！你的家人、你的后代将永远感激你！”话音刚落，桌旁立刻围满了争先恐后报名的男子。军官的笑容更加灿烂了。"
 christdem.44.a:0 "只需朝着正确的方向轻轻一推，我们的国家就会得救……"
 christdem.45.t:0 "非传统军官"
 christdem.45.d:0 "穆阿迈尔·卡扎菲的就职典礼，堪称“别开生面”。这位自诩为“利比亚东部和南部贝都因辅助部队的最高统帅，唯意大利国王及埃塞俄比亚皇帝翁贝托二世马首是瞻”的卡扎菲，带领着一支由逾千名骆驼战士组成的队伍，抵达了锡尔特以南的小城乌丹——队伍其中的三百名战士本应作为协议的一部分远赴意大利。这支队伍由卡扎菲亲率，左右伴有三十名女兵亲卫队，与这些“貌若天仙、心如蛇蝎”的女兵随行。意大利方面，由利比亚大都会区的总督、油田卫戍区的指挥官、“沙丘恶魔”沙漠机动师的三十名荣誉卫士，以及国王特派的皇家随从组成代表团。卡扎菲亦曾向翁贝托二世发出邀请，然国王以“国事繁忙、无暇分身”为由婉拒。\n\n在号角声、卡扎菲私人动物园中的异兽和携带着给意大利人的礼物的仆人们的簇拥下，骆驼商队热闹地进入了城镇：为罗马国王准备的镶有宝石的贝都因剑，为总督和指挥官准备的金质匕首，以及为每名荣誉卫士准备的银柄战斗刀，这些刀的形状与沙漠战士所用的别无二致。此外，他还给每个人准备了劳力士手表。毕竟“人人皆爱劳力士”。他是如何在沙漠中获得这些瑞士名表的？我想这正是他得以获得权位的原因：若他能神不知鬼不觉地派人至瑞士，他便是“不可多得的人才”……\n\n典礼进行得无懈可击：卡扎菲在随从面前跪下，随从为他授予了圣告骑士团的骑士头衔和一笔款项，作为“对意大利和沙漠人民未来友谊的美好祝愿”。随后是庆祝活动，有异国他乡的美食、舞蹈和骆驼队形表演：谁能想到骆驼也能如此训练有素？庆典落幕后，卡扎菲带着微笑重返他深爱的沙漠，承诺“回访意大利时必将以礼相待”。"
 christdem.45.a:0 "只要他不要把这些骆驼都带到罗马来，其他什么都好说。"
 christdem.46.t:0 "信条转变"
 christdem.46.d:0 "国防部长的办公室大门砰然洞开，三位怒火中烧的将军气势汹汹地踏入。部长从案头的文件中抬头，向这些将领们敬礼，但他们几乎不屑一顾，争先恐后地开始了激烈的争吵。部长双手高举：“诸位将军，请息怒！请依次发言！”这让他们稍微平息了一些。一位将军扫视同僚，随后将一份文件袋猛击在部长的办公桌上：“这等胡闹是何意？！”他怒吼着质问，“女性入伍？！难道军队的荣耀与传统在你们眼中一文不值吗？这简直是荒谬绝伦！”部长不慌不忙地整理文件：“将军，这不是荒谬，这是时代的潮流。”争吵声再次响起。片刻后，室内恢复了宁静，那位将军又开口：“部长，我们怎能与一个企图将军队变成笑柄的政府为伍？告诉首相，撤销这荒唐之举！撤销它，否则——”\n\n部长愤然起身。“否则如何？！”他咆哮着，“将军，你打算怎样？对我动手？对政府动武？像墨索里尼那样挑选一个更合意的内阁？”他的脸色涨红，额上青筋暴露。“听着，先生们，你们不会得逞的！想威胁我？那我来告诉你们！我背后有人，一个力挺改革的大人物，他能将你们——统统——从高位上拉下来，让你们一败涂地！”一位将军对此嗤之以鼻，但部长的声音却越发低沉而充满威胁：“提示一下，他头上戴着皇冠。”笑声戛然而止，“他日理万机，不屑与你们这些蝼蚁计较，但若你们不识好歹，胆敢阻挠，他会让你们和你们的职业生涯一并终结！”所有人的脸色瞬间苍白。“现在，你们将接下这道命令，并且严格遵守。祝各位今日愉快。”言罢，部长重新回到了文件之中。三位军官面如土色，匆匆退出了办公室。"
 christdem.46.a:0 "旧迹不染新境。"
 christdem.47.t:0 "思维转变"
 christdem.47.d:0 "瓦雷西尼家的周日午餐依旧遵循三年婚姻铸就的惯例：正午十二点，洛伦佐·瓦雷西尼踱进厨房——他的妻子玛格丽塔（娘家姓伊佐）已在此忙碌了两小时。这栋寒酸的房子白墙斑驳，家具陈旧，唯有那台电视机彰显着“奢华”——那是洛伦佐挥霍了全家积蓄（或者说她挣来的全部积蓄）购置的物件。餐具照例整齐列阵：几记耳光教会了玛格丽塔，即便在贫民窟，秩序高于一切。“玛格丽塔！饭好了吗？”丈夫的例行催促响起。“马上就好！”可洛伦佐早已没在听，他调着电视频道，最终停在了晚间新闻。\n\n当玛格丽塔端着汤碗出现时，新闻主播的嗓音正滑过客厅：“根据国防部法令，即日起女性可应征入伍担任辅助兵、驾驶员及飞行员。后续法令将规范女性作战部队的组建——”电视机骤然黑屏。“狗屁！”洛伦佐咒骂着，“玛格丽塔！别让我过去揪你！”\n\n妻子却挂着近两年未见的灿烂笑容走近，那道颧骨上的新淤青仿佛也被照亮。“汤来了，亲爱的。”话音未落，滚烫的汤汁已浇上丈夫头顶。洛伦佐惨叫着欲起身，玛格丽塔却抢先一步将空盘砸向丈夫面门——粗陶盘与鼻梁同时碎裂。“婊子！我宰——”第二声惨叫来自裆部重击，接着是胃部，直到丈夫蜷成虾米。玛格丽塔·瓦雷西尼从容回房取出唯一的手提包，俯视着地板上抽搐的丈夫：“我要去参军了。祈祷他们别发枪给我吧，否则你就是首个靶子。”伊佐家的女儿转身出门时，唇角仍噙着笑意。"
 christdem.47.a:0 "诚然，新纪元正降临意大利。"
 ITA_defensive_mindset:0 "防御思维"
 ITA_defensive_mindset_desc:0 "我们的指挥层历来将战争潜在的广阔战场和其多样性视为一大难题。毕竟，意大利军队面临着从阿尔卑斯山的家园到东非的戈尔山脉的威胁。如今，人们普遍认同采取守势，力求减少物资和人力的损失。"
 ITA_defensive_mindset_2:0 "防御思维"
 ITA_defensive_mindset_2_desc:0 "“防御崇拜”在军中根基渐深。地方指挥官们正将防御工事、坦克和机动火炮的创新组合推广开来，以实现战场火力的现代化。我们深知我们孱弱的工业无法承受巨大的损失，这一认识正引领着我们的采购决策和战术发展。意大利人将捍卫他的祖国，不择手段！"
 ITA_defensive_mindset_3:0 "防御思维"
 ITA_defensive_mindset_3_desc:0 "我军已全面转入严密的防御状态。我们为陆军工程兵团提供了能够容纳我们全部火炮和装甲车队的一系列模块化、标准化的防御工事设计。我们的防空策略，审时度势，按危重度排兵布阵。紧急工业加固计划使我们有限的产能更加坚韧，更能抵御冲突。意大利的土地不容轻犯，胆敢来犯者，必将血本无归。"
 ITA_stay_behind_planning:0 "后援策略"
 ITA_stay_behind_planning_desc:0 "我们苦练精兵，打造出一支能应对各种不测的军队。对可能的每一种局面，我们都有深思熟虑的应对之策，确保士兵们能够从容应对，不为意外所困。我们精心布置的陷阱、伏击和要塞，将迫使任何潜在的入侵者放缓他们前进的脚步。这些面面俱到的准备，让我们的军队随时准备迎接任何挑战。"
 ITA_fascist_elite_soldiers:0 "法西斯精兵"
