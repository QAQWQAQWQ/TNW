 ita_dont_rock_the_boat_desc:0 ""
 ita_legacy_of_starace:0 "斯塔拉切的遗产"
 ita_legacy_of_starace_desc:0 "阿基莱·斯塔拉切，昔日墨索里尼麾下的党书记，党之忠仆，更是对领袖顶礼膜拜的狂热信徒，他的形象应成为国家法西斯党成员追随的典范。对斯科尔扎领袖的敬仰，无论是否发自肺腑，表面文章亦须做得十足。他们将如墨索里尼所言，成为“忠心耿耿的愚者”。我们将以领袖为尊，营造一种个人崇拜的氛围，这氛围不仅要在党内蔚然成风，更要扩散至普罗大众之中。宣传要铺天盖地，外展要深入人心，招募要广纳贤才。\n\n意大利，每处角落，每时每刻，都在提醒着人们：爱戴领袖，是他们唯一的选择。"
