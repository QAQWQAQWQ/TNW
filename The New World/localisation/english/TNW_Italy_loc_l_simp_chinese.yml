 ita.502.t:0 "德国最新的征服"
 ita.502.d:0 "德国今天自豪地宣布，德国成为了第一个成功踏足月球的国家。饱受赞誉的韦恩赫尔·冯·布劳恩所领导的团队由前空军飞行员组成，埃伯哈德·克尔纳正是其中的一员，他使用基于二战时期A9/A10型设计的火箭，成功在月球登陆。国家电视台进行了全程直播，并在世界范围内进行转播，在上千张照片中，有一张最引人注目——克尔纳对着大日耳曼国的国旗，敬了一个标准的纳粹礼。德国全境都开展了庆祝活动。\n\n虽说这条新闻令人印象深刻，但在意大利，这新闻让许多人失望了。尽管很多人都认为意大利实际上并未真正参与太空竞赛，但政府还是宣称意大利与其他竞争者同等重要。为证明这一点，意大利甚至在去年发射了一枚卫星，但在意大利之外，这颗卫星几乎没有得到关注。\n\n美国和日本分别宣称要在月球上建立殖民地和登陆火星，以在太空竞赛中胜过德国，齐亚诺领袖承诺，意大利依旧是太空竞赛的一位竞争者，但人们似乎对这种烧钱行为反应寥寥。\n\n失望的原因有很多，最大的原因似乎是源于这样的事实：是德国，这位意大利的老宿敌，在竞赛中取得了胜利。"
 ita.502.a:0 "也许我们也该动身了？"
 ita.500.t:0 "《神勇七蛟龙》上映"
 ita.500.d:0 "佩德罗·拉萨加发布了他最新的电影《神勇七蛟龙》，即《七个角斗士》。这部电影迅速在意大利走红，是他自《最后的进攻》——一部讲述美国飞行员在南美各地战斗经历的电影——以来最受欢迎的影片。虽然对《神勇七蛟龙》的影评是并不出色，但它较低的制作难度且相对的高质量极大地激发了人们对佩普鲁姆，即“剑与凉鞋”这一类型电影的兴趣，这类电影以古代的角斗士和罗马人为主题展开。\n\n意大利，这个努力把古罗马辉煌作为自己立国之基的国家，对这一类型的电影已陷入痴狂，而且其中几部电影已经传到美国。"
 ita.500.a:0 "荣耀！"
 ita.501.t:0 "弗兰卡·维奥拉·弗里德"
 ita.501.d:0 "17岁的西西里人，弗兰卡·维奥拉今天在全意掀起波澜。她被前未婚夫菲利波·梅洛迪亚绑架强奸后，被警方解救。按照西西里的习俗规定，如果她要恢复名声，就必须嫁给这个强奸犯。但维奥拉与她的父亲拒绝了这桩婚姻。保守派政权仍未就此事发表声明，而媒体已经将其登上头条新闻，向世界宣布弗兰卡勇敢地结束这种过时的做法。"
 ita.501.a:0 "变化的时代。"
 ita.503.t:0 "兰博基尼成立"
 ita.503.d:0 "费鲁吉欧·兰博基尼在二战结束后不久，在皮耶韦-迪琴托开了一家车库。他将一辆菲亚特Topolino从一辆城市车改装成了一辆750cc排量的赛车。1947年，他发现意大利的一个新兴市场：拖拉机。意大利刚获得了大量新土地，政府也制定了新的农业计划，要求授权农场工业化。不久，他又将业务扩展到了卡车和船舶。最终，费鲁吉欧回到了私家车领域。他不喜欢现有的德国和意大利汽车，包括著名的法拉利品牌。费鲁吉欧在被恩佐·法拉利拒绝后，决心打造自己的、更好的汽车。如今，兰博基尼公司已经成立，并计划在不久的将来展示其首款汽车350GT。"
 ita.503.a:0 "我想我会买一台！"
 ita.800.t:0 "战争回避"
 ita.800.d:0 "我们避免了战争，耶！"
 ita.800.a:0 "这个事件糟透了"
 ita.801.t:0 "齐亚诺的声明"
 ita.801.d:0 "领袖齐亚诺站在岳父二十年前曾经站过的同一个阳台上，宣布了一项将载入史册的声明。他宣布，法西斯主义整体而言已经变得臃肿和低效，并下令在今年晚些时候在维罗纳市召开一次代表大会，既定目标是“找到困扰意大利的众多问题的解决方案”。\n\n或许最让人震惊的是，他居然公开邀请“任何有意为意大利未来创造解决方案而非制造问题的意大利团体”参与。来自不同政治背景的团体都表示他们渴望参与。唯一悬而未决的问题是大会是否会成功。"
 ita.801.a:0 "愿上帝保佑齐亚诺，愿上帝保佑"
 ita.805.t:0 "埃及石油扩张"
 ita.805.d:0 "怎样开采埃及石油最好？对此起草了两份提案。第一份，有限投资，只扩大现有油田并进行现代化改造。第二份则建议在第一份的基础上，于埃及全境勘探、建造新油田。从中获得的石油当然值钱，但如此激进的投资可能会有害经济……"
 ita.805.a:0 "石油储备，一周量即可。"
 ita.805.b:0 "改善现有油田即可。"
 ita.805.c:0 "我们需要尽可能多的石油。"
 ita.806.t:0 "投资戈兰防线"
 ita.806.d:0 "目前，关于戈兰防线的修建方案有两种。第一种提案主张沿着黎巴嫩北部边境修建。第二种提案则主张沿着整个意土边境修建，尽管许多人认为如此大规模的建设可能会对我们的经济产生负面影响……"
 ita.806.a:0 "别浪费我的时间！"
 ita.806.b:0 "有限的防线亦能御土耳其人于门外"
 ita.806.c:0 "筑墙！"
 ita.802.t:0 "拯救我们的经济"
 ita.802.d:0 "占位符"
 ita.802.a:0 "领袖知道最好？"
 ita.803.t:0 "我们经济崩溃了"
 ita.803.d:0 "不幸的是，我们经济学家所担心的事情发生了。经济开始遭受三头同盟解体带来的冲击波，工厂解雇工人，需求不足而囤积货物，企业因破产而倒闭。意大利唯一的出路似乎是改革。"
 ita.803.a:0 "领袖怎么会让这种事发生！"
 ita.804.t:0 "里拉螺旋下跌"
 ita.804.d:0 "随着我们经济崩溃，里拉正在自由落体，人们的毕生积蓄一夜之间成了一堆无用的废纸。希望我们能在不久的将来改善局势，避免全面崩溃。"
 ita.804.a:0 "希望这次有出路"
 ita.807.t:0 "领袖要求人民保持冷静"
 ita.807.d:0 "到处都是暴乱巴拉巴拉"
 ita.807.a:0 "希望人们能听他的话。"
 ita.808.t:0 "与布列塔尼贸易"
 ita.808.d:0 "领袖与布列塔尼人会面并达成了贸易协议。这为我们打开了完整的商业世界，进一步推动我们正在努力拯救经济方面的进展。"
 ita.808.a:0 "为我们的布列塔尼新朋友干杯！"
 ita.809.t:0 "意大利势力范围内的贸易"
 ita.809.d:0 "耶耶耶"
 ita.809.a:0 "为进一步合作干杯？"
 ita.810.t:0 "人们冷静下来"
 ita.810.d:0 "占位符"
 ita.810.a:0 "我们感谢他们的理解。"
 ita.811.t:0 "暴乱愈演愈烈"
 ita.811.d:0 "占位符"
 ita.811.a:0 "看来领袖对他们已经没啥影响力了。"
 ita.840.t:0 "利比亚知识分子表达反对！"
 ita.840.d:0 "占位符"
 ita.840.a:0 "立即逮捕他们！"
 ita.840.b:0 "让他们分享自己的想法。"
 ita.841.t:0 "抗议者走上街头！"
 ita.841.d:0 "占位符"
 ita.841.a:0 "事情转向暴力！"
 ita.841.b:0 "逮捕闹事者。"
 ita.842.t:0 "抗议者袭击！"
 ita.842.d:0 "占位符"
 ita.842.a:0 "驱散人群。"
 ita.842.b:0 "鸣枪警告。"
 ita.842.c:0 "开火！"
 ita.850.t:0 "暴乱愈演愈烈"
 ita.850.d:0 "占位符"
 ita.850.a:0 "看来领袖对他们已经没啥影响力了。"
 ita.820.t:0 "工人们渴望他们的声音被听到"
 ita.820.d:0 "随着维罗纳大会的变革之风席卷整个意大利帝国，似乎越来越多的边缘团体希望他们的声音被听到。今天，罗马的工人们宣布他们将组织前往罗马人民广场的游行，并在那里发布新闻声明，阐述他们对该会议的看法及其诉求。目前看来这似乎是一个无害的抗议行动，但我们猜测它可能是由一个地下社会主义运动组织的，这很可能会对会议产生影响，我们还需观察事态如何发展。"
 ita.820.a:0 "顺应民意吧"
 ita.821.t:0 "黑色旅宣布实行“反抗议”"
 ita.821.d:0 "工人们的公告似乎触动了法里纳奇的神经。在工人们宣布抗议之后，黑色旅立即宣布他们将针对“赤色分子”实行“反抗议”，并声称“不会让他们在罗马横行”。他们的意图显而易见，黑色旅和工人抗议者的结合是意大利制造街头斗殴和骚乱的完美配方。我们可以以安全问题为由，利用这一声明禁止工人抗议，或者我们可以让他们在警察监督下进行抗议，从而避免用我们的妥协来满足法里纳奇。"
 ita.821.a:0 "阻止工人罢工"
 ita.821.b:0 "让他们在警察监督下抗议吧"
 ita.822.t:0 "罗马大规模工人抗议"
 ita.822.d:0 "“这是我们帝国各地工人的伟大一天“，这是工人发言人在向媒体发表声明时的开场白。今天，近1000名工人手持横幅和标语，喊着口号，沿着罗马的街道游行。这次游行比预期的要好上许多，没有抢劫，没有破坏，人们只是和平地游行到罗马人民广场。这个局面当然得益于我们警察的严密监视，因为安全工作做得很好。目前工人们正在向媒体发表声明，抗议活动将在声明后结束。到目前为止，没有黑色旅活动的迹象，一切都按计划进行：对我们整个国家来说，这是一次成功而和平的抗议，对法里纳奇来说却是一种耻辱。"
 ita.822.a:0 "真是极具意义的一天"
 ita.823.t:0 "黑色旅抵达！"
 ita.823.d:0 "最新消息来自罗马人民广场，武装到牙齿的黑色旅已经抵达现场。法里纳奇似乎起初还对我们安全部队的威力犹豫不决，但最终还是决定继续前进。真是个傻瓜！警察将处理所有闹事者，如有必要，甚至包括工人。"
 ita.823.a:0 "警察会处理好这些的。"
 ita.824.t:0 "抗议演变为街头混战"
 ita.824.d:0 "正如所料，黑色旅和工人并不太合得来。经过几分钟的喊口号和辱骂之后，两方就像两股水浪一样冲撞在一起。斗殴蔓延到了街头，抗议者四散而逃。枪声四起。石块乱飞，甚至有抢劫的报告传来。由于双方抗议者人数众多，我们的警察难以应对……我在开玩笑吗，现在当地警察根本无法控制局面，我们需要动用防暴警察来制止这场混乱！"
 ita.824.a:0 "我们有更重要的事情要关注，比如维罗纳大会"
 ita.824.b:0 "部署防暴警察"
 ita.825.t:0 "事虽如此，工人抗议不止"
 ita.825.d:0 "尽管我们已经发出警告并下令停止这次抗议，但罗马的工人们还是聚集起来前往罗马人民广场进行游行。目前情况还算平静，但这可能只是黑色旅即将袭击抗议者的暴风雨前的宁静。我们需要立即部署警察，以防止抗议演变成街头斗殴。然而，还有另一种颇为诱人的选择。这些持不同政见者和不服从命令的人不值得我们警方的保护，我们只需坐视不管，让黑色旅去处理他们，以示如果你不服从国家的命令将会发生什么。"
 ita.825.a:0 "该死，给我逐一发送警察！"
 ita.825.b:0 "袖手旁观，让这成为对所有不服从者的教训"
 ita.826.t:0 "罗马人民广场大屠杀"
 ita.826.d:0 "“我从未亲眼见过如此野蛮和暴力的场面。”索菲亚奶奶说道，她是屠杀中侥幸生还的受害者之一。当持有棍棒、刀具甚至手枪的黑色旅向人数众多却几乎手无寸铁的抗议者袭来时，一场可怕的单方面屠杀爆发了。惊慌失措的人群拼命四散奔逃，但他们人数太多，于是开始像一群被饥饿的鬣狗袭击的水牛一样互相踩踏。目前死亡人数已达53人，而且每小时都有更多尸体被发现，受伤人数超过500人。数十间房屋和商店被破坏甚至遭抢劫，甚至有报道称，有人趁着骚乱造成的混乱实施了与骚乱毫无干系的强奸和谋杀。这是罗马的黑色之日，也是维罗纳大会的耻辱。"
 ita.826.a:0 "妈妈咪呀！"
 ita.827.t:0 "罗马大规模工人抗议的后果"
 ita.827.d:0 "在工人、黑色旅和警察的三方互殴之后，由抗议引发的街头斗殴终于结束，但并非没有造成损害。3人死亡，包括2名工人和1名黑色旅成员被杀，数百人受伤，对广场及周围商店和住宅的破坏相当严重。但至少和平已经重归这座城市。"
 ita.827.a:0 "该死！"
 ita.828.t:0 "罗马大规模工人抗议的后果"
 ita.828.d:0 "随着防暴警察的投入，黑色旅被轻松击退，许多人被逮捕。虽然斗殴和随之而来的短暂骚乱玷污了抗议的纯洁性，但这次抗议可以算是我们希望在维罗纳大会上表达的声音的一项有益补充。工人们对此似乎感到满意，而法里纳奇显然不悦，我们可以大可称其为一次成功！"
 ita.828.a:0 "欧洲工人抗议活动成果显著"
 ita.900.t:0 "维罗纳之殇"
 ita.900.d:0 "齐亚诺失败后，我们一时的沉寂很快就宣告结束了。一直以来被我们的秘密警察压制的地下工会和激进分子在北方各地崛起，大多数大都市已落入他们手中。尽管我们一再命令军队击退他们，但迄今为止，他们还没有发起反攻。更糟糕的是，许多被命令去遏止这一威胁的旅已经叛逃到他们那里。随着整个北方陷入虚弱的僵局，国内激进势力的行动变得越来越大胆。"
 ita.900.a:0 "没啥问题了。"
 ita.901.t:0 "斯科尔扎的飞机坠毁了"
 ita.901.d:0 "“当1861年意大利统一时，它并非屈从于法西斯的铁蹄，相反，这份伟业由撒丁国王完成，他和我来自同一个家庭。我很清楚，无神的法西斯主义已经失败了，我们以前的盟友转而反对我们，人民也要求恢复法治，这个用数十万意大利同胞的鲜血打造的殖民帝国正被错误地管理着。所有这些都证明了一个简单的事实：法西斯声称的荣耀和权力只不过是一个弥天大谎！”\n\n这句话来自今天上午播出的一次广播中意大利国王翁贝托二世的演讲。长期以来，国王一直被认为对法西斯党剥夺他的权力心怀怨恨，而此次正是利用当前的形势为自己要求更多的权力的好机会。据报道，几位著名的将军和政治领袖宣布支持国王，南部地区也发生了一些骚乱。"
 ita.901.a:0 "该死！"
 ita.902.t:0 "齐亚诺遭暗杀"
 ita.902.d:0 "随着起初对齐亚诺愚行的震惊逐渐消退，局势对领袖来说变得更加严峻。经过几天的人头清点和威吓忠诚者，党秘书卡洛·斯科尔扎提出了一项将齐亚诺从领袖职位上撤职的举措。长期以来，斯科尔扎一直是原领袖的忠实拥护者，他对齐亚诺背离党派教义的种种行径一直持有诸多异议。看来他他正在利用这种混乱所带来的机会，为了永久冻结意大利社会的这种解冻趋势。\n\n虽然领袖通常能够轻易地置身事外，但当前的政治危机使他处于极度虚弱的状态。尽管如此，只要局势不进一步升级，意大利应该会没事。"
 ita.902.a:0 "天哪"
 ita.903.t:0 "大分裂"
 ita.903.d:0 "占位符"
 ita.903.a:0 "我们就不能好好谈谈吗？"
 ita.904.t:0 "黑色旅与工人激战"
 ita.904.d:0 "黑云压城城欲摧，新闻详细报道了北方城市博洛尼亚，工人与法里纳奇的黑色旅起了冲突，双方在街头对峙，最终沦为长达数小时的街头斗殴。在赤手空拳演变为刀与扳手之际，当地宪兵队开了几枪才驱散一地混乱。\n\n许多人送进医院，一些人已死，博洛尼亚遭受严重破坏。"
 ita.904.a:0 "宪兵花了这么长时间才稳定局面？"
 ita.905.t:0 "来自罗马的消息"
 ita.905.d:0 "占位符"
 ita.905.a:0 "一言为定。"
 ita.906.t:0 "法里纳奇向日耳曼尼亚发送援助"
 ita.906.d:0 "占位符"
 ita.906.a:0 "领袖真的很慷慨"
 ita.910.t:0 "三领袖之战"
