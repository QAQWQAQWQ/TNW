 ITA_shoot_them_desc:0 ""
 ITA_shown_up:0 "他们在反击！"
 ITA_shown_up_desc:0 ""
 ITA_GDP_gowth:0 "我们的GDP将极大提升。"
 ita_ciano_victory:0 "齐亚诺掌控局面"
 ita_ciano_victory_desc:0 "要说大委员会的讨论是激烈的，那是一种轻描淡写的说法：国家法西斯党内部的分歧和异见有可能像是一座炽热火山的喷发，或者更准确地说，是一个着火的垃圾桶。然而，尽管困难重重，领袖的派系还是成功地控制了该党，进而控制了整个意大利。现在，斯科尔扎的强硬派（甚至反动派）最终在国会失利，现在是时候让仍然对齐亚诺怀恨在心的党派旧人士靠边站了，我们将巩固党派并让意大利成为唯一、真正的指路明灯的愿望实现。"
 ita_ciano_victorious:0 "齐亚诺保住对党的控制，如今可以自由改造意大利！"
 ita_negotiating_reforms:0 "协商改革"
 ita_negotiating_reforms_desc:0 "现在，齐亚诺的派系在党内重新占据了主要地位，是时候开始推动我们的计划并使其变成现实了。齐亚诺身边的政党精英必须开始与受我们改革影响的各个群体的代表进行漫长而艰巨的谈判：如何处置经济自由化的企业家？如何安抚在街头上呼吁新闻自由和学术自由的学生？如何回应艺术家、导演和作家对艺术自由的要求？最重要的是，我们该如何才能做到这一切，而不再次让PNF遭受毁灭性的分裂呢？"
 ita_gain_fascist_support:0 "战胜法西斯"
 ita_gain_fascist_support_desc:0 "齐亚诺有望重掌党魁之位，但党内并非波澜不惊。斯科尔扎虽已失势，仍有追随者固守其陈旧且反动的党国观念。然而，化解之道似已浮现。若能使国家法西斯党人遵循民主之道，我们便能一举两得——既巩固齐亚诺的声望，又为民主之花添土施肥。诸如乔治·阿尔米兰特、奥古斯托·德·马尔萨尼克等党内重量级人物，以及与齐亚诺关系匪浅的政治家们，对此策略已渐开绿灯——他们或将成为新右翼党在民主体系中砥柱中流的核心。"
 ita_discredit_extremists:0 "抨击极端分子"
 ita_discredit_extremists_desc:0 "兴许，斯科尔扎的派系尚可防范，而法里纳奇的追随者，这位德国的哈巴狗，却悄然潜入我们党的腹地，暗中穿梭于我们之间：尽管他们并未与黑衫队的暴行直接勾结，但我们知道，国家法西斯党中仍有人暗地里支持法里纳奇及其纳粹狂热分子。墨索里尼本人也曾是德国的尖锐批评者，众所周知，法西斯主义与纳粹主义本是水火不容，它们之所以结盟，不过是权宜之计。意大利绝不应落入那扭曲、反犹、暴力的邪恶之手，这个体系已给德国乃至整个欧洲带来了无尽的苦难与悲痛。我们必须把握每一个机会，对那些潜藏在我们队伍中的败类进行严厉谴责，他们竟自甘堕落，将意大利当作德国的牵线木偶。我们不仅要笔锋如刀，揭露他们的丑陋行径，还要以迅雷不及掩耳之势，将他们逐出党外，并且以叛国之名，将他们的首领绳之以法，确保他们永无再起之日，不再有机会散播那纳粹的祸水。"
 ita_support_reformers:0 "支持改革派"
 ita_support_reformers_desc:0 "要真正实现变革，我们不能仅仅满足于党内高层的认同。从法西斯大委员会的显赫成员到意大利各地小镇村落的普通官员，每一个关键职位上的人都必须与我们的理念和对意大利的愿景同频共振。若我们自己的党内存在掣肘，承诺便难以兑现：这绝非一蹴而就之事，也非轻而易举，我们必须发起一场全国性的行动，激励改革派和领袖的追随者，让全国各地的行政体系中涌现出那些志同道合、乐于合作的人才，共同推动我们的事业向前发展。"
 ita_supportive_army:0 "一支可靠的军队"
 ita_supportive_army_desc:0 "意大利皇家陆军，历来有两派势力分庭抗礼：一派是法西斯改革的拥趸，另一派则忠心于君主制的旧臣。然而，如今，拥王与拥领袖之间的裂痕已日渐愈合。加莱亚佐·齐亚诺，或许得益于其贵族出身，与国王之间建立了深厚的信任（这是墨索里尼所望尘莫及的）。加之对那些对萨伏依家族怀有敌意的激进法西斯分子的当头棒喝，意大利皇家陆军的军官和将领们日渐支持齐亚诺。"
 ita_for_the_forces:0 "为了军队"
 ita_for_the_forces_desc:0 "我们的军队是我们帝国在地中海和非洲的脊柱。我们深知这点，我们的军队本身还有我们的敌人也不例外。为此，开始进行军队的大规模改组和军事现代化的建设——尤其是在战略，战术以及后勤领域——已经迫在眉睫。在我们削减管理殖民地所需的大量的冗杂开支的同时，我们应把防暴和特务行动放在第一位，以此来加强对我们殖民地的控制，而新的后勤网络有利于提升我们在地中海和非洲的军事影响。最后，我们应开始着手将黑衫军整合进正规军中，来使MVSN从一个使法西斯党的麻烦和尴尬源源不断的废物成为我们军队的一把利刃。"
 ita_a_military_dominant_budget:0 "先军预算"
 ita_a_military_dominant_budget_desc:0 "若想在地中海维系霸业，我们必须确保我们的武装力量得到充足的资金支持。为此，我们将根据军队所需，精心规划未来数年的财政预算：此举虽可能给国家经济带来压力，却也是为了帝国未来所必须的长远投资。待殖民地渐趋宁静，军费自可适时削减。但目前，我们必须确保军队有足够的资金来满足他们对食物、武器、燃料、车辆、装备、弹药、飞机、坦克等一切所需，以防微杜渐，杜绝任何可能引发连锁之乱。吾辈勇士，须时刻警醒，随时待命。"
 ita_those_damn_reds:0 "温和的左"
 ita_those_damn_reds_desc:0 "历经沧桑数十载，无数左翼志士在法西斯铁蹄下饱受摧残、囚禁与羞辱，更有甚者献出了宝贵的生命。为了逃离镇压反法西斯警备组织的追捕，许多人远走他乡，至今流落异域。他们中，虽有布尔什维克或共产主义者，但更多的是温和左派和社民派。国内的地下共运依旧暗流涌动，民主一旦落地，激进左翼的浪潮或将汹涌而来。然而，我们并非无计可施，若能催生一个温和左翼政党参与民主角逐，便能筑起一道防波堤，抵御激进思潮的侵袭。流亡归来的彼得罗·南尼，以其卓越的政治智慧，有望成为这股新潮流的领军人物。"
 ita_crackdown_on_the_red_brigade:0 "抹去红色"
 ita_crackdown_on_the_red_brigade_desc:0 "激进思潮乃新兴民主之大敌，意大利亦难独善其身。在温和左翼的默许下，我们即将对红色旅及其他暗流涌动的共产主义势力发起最后一击。通过逮捕、审讯和深入调查，我们力求将那些潜藏在意大利暗角的阴谋集团和派系一网打尽。特别是最为猖獗的意大利共产党，若能将其领袖奥诺拉托·达门绳之以法，嚣张的赤匪便只能听着他们的挽歌走向灭亡。"
 ita_the_backbone_of_italy:0 "国民联盟"
 ita_the_backbone_of_italy_desc:0 "在国家法西斯党内部，关于民主转型的讨论正如火如荼地进行。经过一番折冲樽俎，阿尔米兰特和德·马尔萨尼克携手促成了一项共识——他们牵头成立了一个联盟，准备投身于民主的角斗场。这个联盟，名为国民联盟，囊括了温和法西斯分子、保皇派和坚定保守派，形成了一个广泛的右翼联盟。它象征着旧日统治阶层与现状的延续，虽然其能否问鼎尚属未知，但它无疑能给那些渴望稳定、对变革潮流心生畏惧的人心以慰藉。"
 ita_meet_libs:0 "基督教民主党人"
 ita_meet_libs_desc:0 "在民主选举的舞台上，一个由自由派、温和天主教徒和中间派组成的派系异军突起，他们以前大学教授阿尔多·莫罗为核心，与一群志同道合的政治家一道，因其共同愿景：以改革之风推动经济增长新篇章而携手并肩。这个新兴派系自诩为基督教民主党，或意大利天主教民主党。该党派在意大利中产阶级中深得人心，主要吸引着国内的改革派和反法西斯的温和派，并且似乎也深得齐亚诺本人的青睐。"
 ita_what_is_old_is_new_again:0 "旧事重提"
 ita_what_is_old_is_new_again_desc:0 "民主曾是意大利的古老传统——在法西斯主义兴起之前，意大利几十年来一直是一个民主的君主立宪制国家。加富尔、克里斯皮、乔利蒂、德普雷蒂斯、索尼诺，那些伟人们依旧被刻在每一位意大利人的心底。我们应该提醒人民，民主曾为我们国家所做出的伟大贡献，以及那曾是我们悠久的历史传统。意大利并不是独裁的代名词，在希望的尽头，齐亚诺将不会被作为一位独裁者书写，而是作为一个国家的伟人被铭记。"
 ita_a_long_way_there:0 "漫漫长路"
 ita_a_long_way_there_desc:0 "国内反法西斯的声浪此起彼伏，未能和声共鸣，细听之下，宛若杂乱的乐章。欲求国泰民安，在筑牢民主之基前，我们须先架起沟通之桥，让广泛反法西斯阵线内的各派系达成共识：一方面是那些渴望市场自由化的企业家和上层中产阶级，他们是基督教民主党的铁杆盟友；另一方面，左翼势力担心经济自由化可能会对意大利的弱势群体和贫困阶层造成冲击。许多温和左派面对经济自由化的风声鹤唳，开始侧耳倾听激进左派的论调，激进左派的星火，似有重燃之势，不容小觑。因此，我们计划与这些派系的成员开启正式的对话和会晤，以确保党派间能够保持坦诚且持续的交流，进而平稳顺畅地推进民主的转型。我们务必全力以赴，防范任何激进化和极端主义的倾向，确保变革通过渐进、温和且民主的途径水到渠成，而非诉诸武力。"
 ita_it_wont_happen_over_night:0 "民主阵线"
 ita_it_wont_happen_over_night_desc:0 "在意大利，随着与各新兴自由派的磋商愈发深入，我们期待的新温和左翼阵线正如预期般，以彼得罗·南尼为核心，逐渐凝聚成形。这个联盟自诩为民主阵线，汇集了那些为贫困阶层发声、捍卫自由意志、渴求自由公正的温和左派、社民派和改革派人士。民主阵线已然触动了国民联盟等保守派的敏感神经，它提供了一种与革命截然不同的温和改良之路，正逐步在工人阶级、学生和知识分子中赢得人心。"
 ita_weaken_the_ovra:0 "解散OVRA"
 ita_weaken_the_ovra_desc:0 "迄今为止，镇压反法西斯警备组织一直是法西斯政权之利剑：在墨索里尼统治时期，地下反法西斯活动大多被其压制，多亏有它；追剿红色旅时，其锋芒亦不减当年。然而，一个行动隐秘、资金充足、几乎不受监督的组织，对民主之舟实为暗礁：有关其成员与国家法西斯党激进派残余势力有联系的传言更是让人不安。故此，我们决意对其进行深刻改造，揭开其神秘面纱，令其由暗夜行者转变为与军事情报局携手的光明卫士，成为更高效、更受监管的安全、监视和情报机构。"
 ita_pro_democratic_prop:0 "宣传民主"
 ita_pro_democratic_prop_desc:0 "欲使意大利迎来其应得之变革，非简单修法或预算微调所能及。选举若成虚设，民众对民主若即若离，或计票暗藏玄机，偏袒内定人选，则变革无异于镜花水月。城市之心虽向往民主之光，然意大利之躯，仍以田园为骨。务必确保，从市井到乡野，从小镇到村落，每一寸土地都沐浴在自由公正的阳光下。故此，我们将掀起一场宣传风暴，借广播、报纸、电视之力，唤醒民众，使其明白，他们即将成为国家未来的主人翁。"
 ita_for_the_civilians:0 "为了人民"
 ita_for_the_civilians_desc:0 "宣传固然是好事，但要让人民真正理解我们的用心，单靠宣传是不够的。我们绝不能让人产生法西斯政府在放任人民自流的印象：必须阐明，齐亚诺所做的一切，均以意大利人民的福祉为依归。因此，我们将为领袖亲自颁布的几项行政命令铺平道路：这亦是缓和国内派系纷争的良机，但我们必须审慎行事，毕竟，要让人人都满意，无异于缘木求鱼。"
 ita_support_the_citizens:0 "支持文官"
 ita_support_the_citizens_desc:0 "在法西斯统治之下，国家政权的维系在很大程度上依赖于武装力量，黑衫军与意大利皇家陆军为其成败之枢。在帝国的边陲，如阿尔巴尼亚或斯洛文尼亚，许多地方官和省长依旧是从军队中直接选拔。为此，我们将推陈出新，制定改革，旨在限制军队在国家治理中的作用，确保只有民选的文职官员才能担纲此类要职。此举将助力我们的民主幼苗在自由与公正的阳光下茁壮成长，以利国计民生。"
 ita_on_the_road_to_success:0 "踏上成功之路！"
 ita_on_the_road_to_success_desc:0 "意大利民众间，久违的乐观之花初绽。虽然政治家和先知先觉者仍持观望态度，但普通百姓已开始真切感受到齐亚诺改革的春风雨露：领袖的声望扶摇直上，堪比墨索里尼昔日的辉煌，民主的曙光成为人们茶余饭后热议的话题。我们需悉心培育人民心中的这份乐观与热情，他们正是意大利新篇章的奠基者，首次手握选择未来的自由，尤其是那些只经历过法西斯统治与战火洗礼的年轻与中年一代。和平与自由的明天正向意大利民族招手，她的子嗣们正翘首以待，满怀憧憬地准备开创属于他们的未来。"
 ita_bring_it_all_together:0 "海纳百川"
 ita_bring_it_all_together_desc:0 "在国内，诸多法西斯政要，哪怕是齐亚诺的忠实支持者，也在隐隐透露出他们的不安。他们忧虑，法西斯精神恐将随着齐亚诺的民主改革在意大利销声匿迹：墨索里尼与黑衫军的革命理想，可能只会成为史册中的一笔淡墨；他们害怕自己将被政治舞台所遗忘。我们需安抚他们，无需杞人忧天：意大利法西斯的火种将长存不灭。固然，昔日法西斯与反法西斯的冲突与暴力不绝于耳，但那些已成陈年往事，我们都是情系祖国的意大利儿女：我们应向他们保证，未来的意大利，只要他们愿意遵循民主的规则，他们及其所持的理念仍有其一席之地。"
 ita_finding_common_ground:0 "寻求共识"
 ita_finding_common_ground_desc:0 "法西斯和民主派常常错误地走向两个极端。法西斯者固守陈规，以为墨索里尼与黑衫军所铸之体系，尽善尽美，无需变革；民主者却忽略了，若无墨索里尼与黑衫军，意大利或早已成为德国铁蹄下的牺牲品。法西斯非完美之治，却是时势造英雄；我们应推陈出新，亦不忘来路。维米那勒宫中，经过一番唇枪舌剑，法西斯与民主的代表们终以笑颜握手，达成默契：诸事可存异，唯对祖国的忠诚之心不可或缺。"
 ita_everything_will_be_okay:0 "一切都会好的"
 ita_everything_will_be_okay_desc:0 "国内外的观察家对我们的民主化进程仍然心存疑虑。有人担心激进的火种未熄，恐怕一两场选举的风波就足以引发灾难；有人则认为法西斯的残余势力仍在暗中潜伏，只待齐亚诺退出便伺机而动；有人视意大利的经济自由化为一场浩劫，认为其恶果将难以弥补。但时间终将昭示这些忧虑不过是虚妄的幻影。现在，我们能做的就是激发人们对未来的乐观与希望：临近的选举将报纸头条尽揽，我们的宣传机构也将全力运转，向世界传递我们的坚定信念与热情，深信这次选举将为意大利揭开新的伟大篇章。我们唯有期盼一切顺利……"
 ita_the_first_order:0 "第一阶段"
 ita_the_first_order_desc:0 "历经连番政治博弈与协商，转折点已迫在眉睫。齐亚诺的领袖任期行将结束，选举之日正式定档。法西斯大委员会与法西斯法团议会及公司商会不日将宣告解散，权力将全数交还至民主选举产生的参议院与焕然一新的众议院。然而，公众与政治家的目光，已被议会中的几场关键辩论所吸引，这些议题是领袖在荣休前亟待解决的。民主派倡议对司法体系进行最终审查，以期司法独立，根除政治干预；而国民联盟的政客们则力主增加军费，并在严重内乱之际为军队赋予应急权力。"
 ita_expanding_army_support:0 "扩大军队支持"
 ita_expanding_army_support_desc:0 "即便是那些力挺齐亚诺推进国家民主化的右翼政治家，也对政治激进主义心存戒备。他们担忧，无论是在意大利本土还是殖民地，激进主义虽暂时沉寂，但其复苏的阴影仍旧笼罩着领袖改革的成果。为此，我们必须依靠那些始终与齐亚诺理念并肩的武装力量：增加军费，赋予他们在国家严重内乱之际的应急权力。自由派人士对此表示反对，担心这将导致法西斯军事独裁统治的复辟，但在我们看来，这不失为在危机时刻保障国家安全的良策。"
 ita_review_the_judiciary:0 "审查司法系统"
 ita_review_the_judiciary_desc:0 "意大利司法的中枢在于最高法院，它负责阐释法条，解决政府内的纷争。但该院却充斥着墨索里尼任命的守旧法西斯分子，他们已明确表示将坚决抵制任何试图推动帝国自由化的法案。这些法官无疑是齐亚诺重塑意大利梦想的拦路虎，必须在推行改革前先行解决。齐亚诺需对法院的纯洁性做出决断，或整顿或更替法官，以维护公义。每位法官都将接受层层审查，以验其忠诚与合作之志。那些被认定不称职者，将迅速予以更替，确保改革之路无阻碍，司法之轮继续向前。"
 ita_the_second_order:0 "第二阶段"
 ita_the_second_order_desc:0 "选举临近，各党派候选人纷纷亮相，竞选活动如火如荼。政客们在各大城市的广场上激情演讲，号召选民；而在意大利的偏远小镇，村民们同样聚集在广场上的收音机旁，关注着选举的最新动态。从田间的农民到工厂的工人，每个人都能畅所欲言，无需担忧压制，这是数十年未有之景。齐亚诺的蓝图正一步步变为现实，目前只待领袖最后签字，便可功成身退，人民将自由选出新领袖。国民联盟提议为皇家陆军中的有功之臣设立奖金；基督教民主党和民主阵线则提出了一系列的小幅自由化改革，作为我们展现诚意之举。"
 ita_army_lire_bonuses:0 "军队奖励金"
 ita_army_lire_bonuses_desc:0 "在我们推进国家自由化的道路上，稳定与秩序犹如明灯，指引我们在国际政治的惊涛骇浪中稳健前行。确保军队预算充足并致力于保卫国家安全，是保障稳定的不二法门：我们会让每一位军官和士兵都明白，他们的赤胆忠心将得到国家的慷慨回报。那些在反恐斗争和维护殖民地秩序中立下汗马功劳的军事人员，将以丰厚的奖金予以嘉奖：功绩越大，奖赏越重。虽然自由派担心这可能成为财政的无底洞，认为这一制度将被滥用，但考虑到军队历来的意识形态分歧，此举或许能成为破解这一难题的妙计。"
 ita_token_reforms:0 "象征性改革"
 ita_token_reforms_desc:0 "齐亚诺退休之际，诸多自由派人士提出了一系列小幅度的改革建议：报纸审查的松绑，给大型企业增加一些经济自由，警察权力的小幅削减等，皆为传递变革之风的信号。这些改革虽波澜不惊，却足以显露深意：自由派此举，无非投石问路，试探齐亚诺与法西斯分子对民主的真心与否。齐亚诺的亲信顾问团随即发声，斥这些要求为无理取闹，主张一切自由化改革应选举后再议。然而，如果我们拒绝这些改革，难免因不与民主力量携手并进而受人诟病，这将有损我们苦心孤诣营造的政治新气象。"
 ita_il_duce_democracy:0 "领袖的民主"
 ita_il_duce_democracy_desc:0 "终于，历史性的一刻到来。加莱亚佐·齐亚诺，站在威尼斯宫的阳台上，那曾是墨索里尼激昂陈词的圣地，如今他作为领袖向意大利人民发出最后的呼唤。广场上人头攒动，意大利的巨幅国旗与颂扬领袖的横幅在风中飘扬：齐亚诺的演讲多次被连绵不绝的掌声与欢呼声所打断。他的话语既颂扬了法西斯主义的光辉岁月，也指出了意大利民主需与时俱进，引领国家攀登新高峰的事实：法西斯的专制曾是昔日的利剑，如今却成为发展的桎梏，若意大利欲在未来续写辉煌，必须进行改革。当他结束演讲，最后一次步入宫殿，掌声与欢呼声愈发震耳欲聋，经久不息。随后，广场上的喧嚣渐渐沉寂，他们心中开始自问：未来将会怎样？"
 ita_the_battle_for_algeria:0 "为阿尔及利亚而战"
 ita_the_battle_for_algeria_desc:0 "三头同盟分崩离析之际，阿尔及利亚的局势急转直下，一跃成为意大利政府讨论的焦点。谣言纷纭，有的似乎有据可依，有的却近乎妄念，都在暗示伊比利亚军队在北非蠢蠢欲动，若不严加防范，他们可能剑指突尼斯。意大利军方的重量级人物，如总督卡斯泰拉诺，已在疾呼动员，但领袖已明令，对伊比利亚控制的阿尔及利亚采取军事行动应作为穷尽一切和平手段后的最后选项。山雨欲来风满楼，阿尔及利亚的风云变幻，或许将为西地中海的宁静画上句点。"
 ita_reports_from_the_SIM:0 "来自SIM的报告"
 ita_reports_from_the_SIM_desc:0 "军事情报局已经在阿尔及利亚积极行动起来，他们利用航空摄影、无线电截听、密信破译，加之图阿雷格游牧部落的报告来收集情报。当正规军蓄势待发之际，军事情报局的特工们却早已深入边境深处，四处搜集情报，以洞悉伊比利亚人的动向。虽然战火连天的局面尚显遥远，我们必须未雨绸缪，为可能出现的各种情况做足准备。"
 ita_were_running_out_of_time:0 "与时间赛跑"
 ita_were_running_out_of_time_desc:0 "军事情报局搜集的情报已证实了我们的隐忧：伊比利亚联盟正在阿尔及利亚地区开始动员，主要是地方定居民兵及其他游击队。目前，意大利政府和军方内部出现了分歧：一些人视此为大规模攻势的序幕，认为伊比利亚移民及其法国盟友企图鲸吞整个国家。总督卡斯泰拉诺强烈呼吁立即采取行动，希望能够一举将伊比利亚人逐出阿尔及利亚。然而，也有意见认为伊比利亚人正严阵以待，预估到了意大利的攻势，故而动员力量保卫国土——这表明通过外交途径解决危机仍有一线希望。在该地区的埃尼集团代表对战争的前景感到忧虑，担心战火将给当地石油开采带来灾难性的打击。"
 ita_call_castellano:0 "通知卡斯特拉诺"
 ita_call_castellano_desc:0 "帝国的完整统一岌岌可危，宁可谨慎有余，不可大意失荆州。领袖已授命总督卡斯特拉诺联袂一众军事智囊，草拟应对伊比利亚侵略的应急计划。我们无意将冲突升级至与伊比利亚的全面战争，但亦需确保能御敌于国门之外，更图反攻为守，确保阿尔及利亚由意大利单独控制，旨在将来使其成为我们影响范围内的国家。"
 ita_bried_the_xmas:0 "知会第十突击艇队"
 ita_bried_the_xmas_desc:0 "意大利皇家海军的舰队在西地中海已严阵以待，但这场博弈绝非传统之战。我们手头拥有的秘密武器，能在不激化战火的同时，重挫伊比利亚在阿尔及利亚及西地中海的图谋——这便是由朱尼奥·瓦莱里奥·博尔盖塞统领的海军精英蛙人部队。第十MAS小队将肩负起秘密行动的重任，破坏敌人的补给线，渗透敌后，搅乱其阵脚，截断伊比利亚向阿尔及利亚的增援行动，并通过海上突袭在敌人心中播下恐慌的种子。"
 ita_desert_rats:0 "沙漠之鼠"
 ita_desert_rats_desc:0 "如伊比利亚人一般，我们也依赖着一支支非正规军来保卫阿尔及利亚的领土。图阿雷格人的侦察兵、阿尔及利亚的游击队、外国雇佣兵和意大利殖民者的民兵等杂牌军，这些杂牌军遍布于我们的疆域，为我们而战，深入皇家陆军难以抵达之处。派遣经验丰富的军官，搭配大量现代化的装甲运兵车、步兵战车等装备，将这些部队整合为一支去中心化却高效的机械化战斗力量。这支队伍将使我们得以更加有效地控制阿尔及利亚的广袤土地，远胜于传统部队所能及。"
 ita_offers_they_cant_refuse_ILG:0 "他们无法拒绝的提议"
 ita_offers_they_cant_refuse_ILG_desc:0 "时光荏苒，意大利移民阿尔及利亚的浪潮渐趋衰减，这片土地上的军事行政管理机构不得不转而依赖那些支持独立的本土力量，我们越来越倚重阿尔及利亚民族解放阵线来维系对国家的掌控。达成的协议条件简单明了——我们承诺赋予本土居民自治权，并对未来阿尔及利亚的独立给予了一个尚待明确的承诺，作为回报，民族解放阵线将不会与意大利为敌。战争的阴影迫近，我们有机会重申以往的承诺来说服民族解放阵线加入我们的阵营，虽然这些承诺在未来是否兑现，还有待商榷。"
 ita_ascari_del_cielo:0 "土著空降军"
 ita_ascari_del_cielo_desc:0 "意大利首支空降兵部队，名唤空中土兵，实际上并非完全由意大利人组成，而是由利比亚的当地人构成。由利比亚总督伊塔洛·巴尔博在上世纪三十年代组建，如今依旧是意大利皇家空军的明珠，专精于沙漠战争和奇袭行动。我们将派遣空中土兵前往阿尔及利亚，他们将化作我们的利剑，直指伊比利亚敌军——在敌后发动闪电般的突袭，破坏其补给线和后方部署，一击即退，隐匿于沙丘之间，如同沙漠中的幽灵。"
 ita_rev_up_the_engines:0 "引擎加速"
 ita_rev_up_the_engines_desc:0 "阿尔及利亚地域辽阔，若无一支精良的空军，企图全面掌控这片土地无异于痴人说梦。战鼓将擂之际，我们正对阿尔及利亚的飞机跑道进行加固与扩建，同时设立新的前沿基地以供飞机的补给和加油。我们的目标是让空军投射范围遍及阿尔及利亚的每一个角落，从而执行侦察和夺取制空权任务。掌握随时从天而降的打击能力，这将为我们提供必要的优势，助力我们将伊比利亚人逐出这片土地。"
 ita_operation_jungurtha:0 "朱古达行动"
 ita_operation_jungurtha_desc:0 "总督卡斯泰拉诺一声令下，阿尔及利亚境内的意大利驻军及民族解放阵线的辅助部队和民兵，将准时执行朱古达行动。这一战略计划以出其不意的攻势，利用空袭和两栖部队的两栖攻势，向伊比利亚的阵地发起猛烈的机械化进攻。目标不仅是迅速平定阿尔及利亚全境，并力图迫使伊比利亚政府放弃其对该地区的主权要求。愿罗马之鹰再次在阿尔及利亚的广袤天地间翱翔。"
 ita_call_pirani:0 "通知皮拉尼"
 ita_call_pirani_desc:0 "阿尔及利亚，一片蕴藏着无尽石油宝藏的土地，长久以来牵动着恩里科·马泰与埃尼集团的心。因此，马泰伊特派其心腹大将马里奥·皮拉尼·科昂，踏上了阿尔及利亚的征程。皮拉尼，一位曾因反法西斯倾向而备受质疑的经济学家与记者，却在马泰的羽翼下，蜕变为他在阿尔及利亚事务上的得力干将。他广结善缘，在民族解放阵线中拥有众多盟友，与伊比利亚半岛的显赫外交官，葡萄牙大使阿尔贝托·莫雷拉等人尤为交好。他已成为倡导和平解决阿尔及利亚危机的中坚力量。借助皮拉尼之力，我们的外交谈判有望化干戈为玉帛，寻求一条互利共赢的解决之道。"
 ita_native_diplomacy:0 "土著外交"
 ita_native_diplomacy_desc:0 "我们与阿尔及利亚民族解放阵线虽达成了暂时的和解，但彼此间的关系依旧如履薄冰。要与伊比利亚缔结长久和平，首要之务是赢得阿尔及利亚民众的心——他们多数人将意大利与伊比利亚等同视之，皆为殖民者。故此，我们需言而有信，坚守对阿尔及利亚独立与民主的承诺。确保阿尔及利亚人民在谈判桌上占有一席之位，方能令和平之舟行稳致远。"
 ita_promises_of_freedom_ILG:0 "自由的承诺"
 ita_promises_of_freedom_ILG_desc:0 "梅萨利·哈吉被誉为阿尔及利亚民族主义之父，曾为这片土地的自由而不懈斗争。如今，他的重要支持成为我们阿尔及利亚谈判的强大后盾。二战后，哈吉视意大利对阿尔及利亚东部的控制为抵御伊比利亚扩张的明智之举，毕竟伊比利亚与那些仍在阿尔及利亚境内盘踞的欧洲裔民兵关系匪浅。利用哈吉的声望作为我们推动阿尔及利亚独立的代言人，我们有望赢得民心，为我们在接下来的谈判中增添分量与信誉。"
 ita_for_a_fist_ful_of_oil:0 "为了大桶石油"
 ita_for_a_fist_ful_of_oil_desc:0 "为了让伊比利亚人与我们共赴谈判桌，石油乃是我们手中王牌。唯有埃尼集团具备在阿尔及利亚打造大型石油开采设施的雄厚实力，伊比利亚则力有不逮。若伊比利亚人愿与我们携手，不仅能共享石油带来的丰厚利润，更能避免一场无益之争，何乐而不为？"
 ita_promises_of_prosperity:0 "繁荣的承诺"
 ita_promises_of_prosperity_desc:0 "我们已向伊比利亚人暗示，两国若能避免战争，必将共享巨大的利润。现在，是时候通过提高我们的出价来进一步巩固这一关系了。诚然，埃尼集团拥有足够的工业实力在阿尔及利亚立足，但由于油田位于荒漠偏远之地，劳动力的匮乏问题将日渐突出。从意大利引进工人成本高昂且耗时费日，但阿尔及利亚已有大量伊比利亚定居者——通过制定大规模的就业计划，让这些伊比利亚定居者在埃尼集团的油井和管道中工作，促进两国的经济合作，双方在此过程中将共同富裕。"
 ita_promises_of_peace:0 "和平的承诺"
 ita_promises_of_peace_desc:0 "阿尔及利亚民众普遍渴望以和平方式化解纷争，伊比利亚亦有众多呼声呼应此议，如今正是我们正式提出阿尔及利亚稳定和平计划的良机。皮拉尼和莫雷拉拟定的计划已获得领袖的首肯，根据该计划，阿尔及利亚将被共同托管。新政府中将同时拥有欧洲移民和阿尔及利亚原住民的代表，意大利与伊比利亚军队将携手维护国土安宁，我们共同的目标是构筑一个自由独立的阿尔及利亚。"
 ita_extend_the_olive_branch:0 "伸出橄榄枝"
 ita_extend_the_olive_branch_desc:0 "战火纷飞的阿尔及利亚，非我所愿——我们已以此理服人，向伊比利亚方面陈情甚切。皮拉尼和莫雷拉在联合声明中倡议在马略卡岛的帕尔马举行会议，旨在依照托管之策，平息阿尔及利亚之纷争。我们已经尽力在地中海地区维护和平，唯愿伊比利亚人能见贤思齐，与我们共襄和平。"
