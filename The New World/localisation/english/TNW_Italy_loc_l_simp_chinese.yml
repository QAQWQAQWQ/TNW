 empiremanagement_egypt.7.a:0 "我们当前的投资水平良好。"
 empiremanagement_egypt.7.b:0 "也许一些现金流入是必要的。"
 empiremanagement_egypt.7.c:0 "埃及需要更多的资金、更多的公共项目。"
 empiremanagement_egypt.7.d:0 "埃及对我们的经济太重要了，它需要我们省出来的所有钱。"
 empiremanagement_egypt.8.a:0 "撤出我们的人，埃及会好起来的。"
 empiremanagement_egypt.8.b:0 "保留象征性的部队，以防万一。"
 empiremanagement_egypt.8.c:0 "在穆兄会完全消失前，没人会回家。"
 empiremanagement_egypt.8.d:0 "实际上，我们要增派更多士兵。"
 empiremanagement_egypt.9.a:0 "乱花钱者不得钱。"
 empiremanagement_egypt.9.b:0 "他们承诺紧缩，债务才能免除。"
 empiremanagement_egypt.9.c:0 "给埃及数百万无伤财政。"
 empiremanagement_egypt.9.d:0 "全力支持，直至埃及经济回正。"
 ita_christian_ideals_secular_state:0 "世俗之国的基督教义"
 ita_christian_ideals_secular_state_desc:0 "基督教民主党，正如其名称所显示的那样，是一个深受基督教信仰影响的政党：它继承了路易吉·斯图尔佐神父和教会社会教义的遗产，将其提升为一种治国理念。然而，这并不意味着我们是一个宗派组织，或意图将教会的规则强加于国家之上：莫罗相信一个完全世俗的国家，在这个国家里，每个人都可以自由地信奉自己的宗教而不必担心受到迫害，教会也完全与国家及其机构分离。\n\n相反，政府的行为将自然融入基督教教义的涛涛洪流之中：并非在道路和城市中布满十字架和耶稣的赞美诗，我们将遵循基督教的真正精髓，那就是爱。\n\n你不需要成为基督徒也可以爱你的邻居，成为社会中自豪且勤劳多产的一员：我们将确保每个人，无论他们的宗教和出身如何，都能在意大利幸福地生活！"
 ita_blackshirt_liaison_officers:0 "Blackshirt Liaison Officers"
 ita_blackshirt_liaison_officers_desc:0 "Blackshirts are our most steadfast supporters, having followed Mussolini in the March on Rome itself. As they have mostly acted as a paramilitary group and a political police since then, they are experts on crowd control and counterinsurgency tactics: that's enough to justify the \"transfer\" of senior Blackshirt officers to the Carabinieri.\n\nAs soon as they take up their new role, they shall start influencing the new recruits and the more fascist-leaning of the regular members, creating a solid, loyal core within the Arma: this will ensure that De Lorenzo will never have the numbers to actually take up arms against us, whatever his plan may be."
 ita_seize_the_dam:0 "夺取直布罗陀大坝"
 empiremanagement_IME.6.a:0 "The Levant slips like sand between our fingers."