 ITABOE.1.t:0 "新兵营中，同室操戈"
 ITABOE.1.d:0 "尽管军方竭力维持军官团内部保皇派与法西斯残余势力的脆弱平衡，但基层官兵间的裂痕却愈演愈烈。意大利三军吸纳着来自社会各阶层的子弟，这意味着同寝士兵很可能发现战友信奉着某些……别具深意的政治学说。\n\n今日那不勒斯郊外某训练营的冲突便是明证：当有人将墙上的领袖肖像移至国王画像之上时，矛盾终于突破临界点。据军官报告，某学员发现此举后厉声质问，肇事者竟昂然起身认领“殊荣”。口角迅速升级为拳脚相向，整个班卷入混战。尽管宪兵火速镇压并逮捕主谋，流言已如野火蔓延——法西斯分子将其美化为“爱国志士反抗颠覆阴谋”，保皇派则坚称是“藐视传统的叛国鼠辈作祟”。政府亟需就此表态，刻不容缓。"
 ITABOE.1.a:0 "我们仍是君主制，不是吗？"
 ITABOE.1.b:0 "没人能跟领袖平起平坐！"
 ITABOE.1.c:0 "区区装饰，何关大局？"
 ITABOE.2.t:0 "名字有什么关系？"
 ITABOE.2.d:0 "皇家海军已为祖国巡弋地中海、戍卫海疆整一世纪。虽多数官兵以服役为荣，却不乏心怀芥蒂者——非因厌恶碧波故土，唯因其名号中“皇家”二字如鲠在喉。\n\n一伙意识形态狂热分子的潜艇舰长正密谋联署，向同袍分发檄文痛斥海军名称的保皇派色彩。文中指控其犯下“罄竹难书之思想罪”：从腐蚀水兵士气到纵容反法西斯游击队活动。檄文结尾要求“大委员会速速更名”，疾呼“此乃意大利人民与帝国之海军，非萨伏伊家仆私兵！”尽管大委员会无人当真考虑更名，但某种形式的回应势在必行。"
 ITABOE.2.a:0 "即刻驳回此等荒谬请愿"
 ITABOE.2.b:0 "允诺将择机考量"
 ITABOE.3.t:0 "失仪风波"
 ITABOE.3.d:0 "在热那亚公爵费迪南多亲王、皮斯托亚公爵菲利贝托亲王及安科纳公爵欧金尼奥亲王出席的国宴上，与会的还有众多军方高层。博尔盖塞少将却引发了一场外交风波——他向费迪南多与菲利贝托亲王敬礼握手，却唯独对欧金尼奥亲王仅作握手之仪。当同僚将军质询此举时，博尔盖塞答道：“亲王不过是个上校。难道要海军少将向部下敬礼？”\n\n可想而知，此举在军官团中引发轩然大波。同样在场的埃德加多·索尼奥率先发难，要求严惩博尔盖塞的僭越之举。尽管无论结果如何，这位战略价值过于关键的海军将领最多只会受到象征性申斥，但当局必须明确立场：是否该让军中贵族享有与常规军阶顶端同等的礼遇？"
 ITABOE.3.a:0 "理当恪守尊卑之礼"
 ITABOE.3.b:0 "只敬军衔不认人"
