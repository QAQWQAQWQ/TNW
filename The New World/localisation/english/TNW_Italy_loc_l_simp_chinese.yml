 ita_our_mandate_secured:0 "任期已稳定"
 ita_our_mandate_secured_desc:0 "在齐亚诺早先的改革期间，领袖秘密允许少数OFN专家观察国家的改革，并就如何更好地推进改革向政府提出建议。用他们的话说，他们发现，改革“虚多实少”，似乎是为了“满足意大利公众，而不是进行真正的变革”。虽然顾问们一气之下被解雇了，但他们并没有说错。在意大利之春的早期阶段，齐亚诺和他的下属们必须小心翼翼地行事，以防惹祸上身，使国家陷入混乱。但现在，未来似乎更有把握了。法西斯党在维罗纳取得了胜利，人民选择了齐亚诺的未来愿景，而不是斯科尔扎的悲哀怀旧、库西奥的无能幻觉或法里纳奇的疯狂。从现在起，改革将继续进行，意大利雄鹰的真正潜力将得到释放。"
 ita_roll_back_the_party:0 "削减党权"
 ita_roll_back_the_party_desc:0 "作为意大利国内的最高政治力量，国家法西斯党对意大利的影响力无可置疑。为了推动民主改革，我们必须削弱国家法西斯党对国家的深远影响。为此，我们需要逐步剥夺它在全国范围内的各项权力，特别是其对政界的全面控制。同时，削减法西斯大委员会的权力也刻不容缓。。尽管这将引发诸多反对，尤其是来自斯科尔扎派系的强烈抵制，但这些行动对于意大利民主的复苏，以及向世界展示其雄姿英发来说都是势在必行的"
 ita_in_the_electorate:0 "对于选民"
 ita_in_the_electorate_desc:0 "要将我国塑造为真正的民主政体，我们必须革新政府对人民的治理方式。为此，我们将废除政府官员必须加入法西斯党的规定，打破国内文化艺术生产的桎梏，并破除围绕墨索里尼和齐亚诺的个人崇拜。我们的长远目标是让意大利人民的日常生活更加自由化。然而，倘若无法让民众深信变革的曙光即将初现，那么民主将形同虚设；倘若我们不明确这一点，那么新的独裁统治将不可避免地卷土重来，而这只是时间问题罢了。"
 ita_end_compulsory_membership:0 "结束强制入党"
 ita_end_compulsory_membership_desc:0 "在意大利，加入国家法西斯党已成为几乎所有事务的通行证。无党派身份者求职无门，竞选公职无望，政府援助更是遥不可及，更遑论因非党员身份而遭受的社会冷眼。然而，若我们志在改革为民主政体，这些陈规旧法必须破除。我们必须推翻这些束缚，让其他政党在意大利得以生存并壮大。从此人们无需再加入国家法西斯党以维系职业或竞选公职！我们将发起一场运动，旨在消除对非国家法西斯党成员的歧视。人们将不再被迫加入他们并不认同的政党。这些改革举措必将终结意大利一党专政的历史！"
 ita_dissolve_the_ministry_of_popular_culture:0 "解散大众文化部"
 ita_dissolve_the_ministry_of_popular_culture_desc:0 "曾经，大众文化部（那滑稽的缩写“MinCulPop”也为人所知）的初衷，是将法西斯意大利的文化艺术产出统统收归国有，实现文化的中央集权。然而与同类机构的明争暗斗、机构内部的腐败，以及难以忍受的低效，让这个本应成为抗衡戈培尔宣传机器的利器沦为了一个臃肿无能的官僚怪兽。它挥霍无度却一无所成，只会给意大利的艺术家、导演、作家和记者们带来无尽的烦恼。为了改变这一局面，我们决定将一些原本属于大众文化部的职责移交给更为高效透明的国家教育部。教育部将成为政府与意大利文化产业沟通的桥梁。同时，我们将彻底废除这个早已过时的机构，为意大利文化与艺术的自由发展扫清道路。这一步，对于意大利文化与艺术的自由化具有里程碑式的意义。"
 ita_burn_the_party_papers:0 "烧毁党的文件"
 ita_burn_the_party_papers_desc:0 "多年来，在法西斯统治下，意大利已秘密积累了诸多臭名昭著的文件，其中既有政治异见者的档案，也有能牵连政府中众多人士的秘密。尽管民主转型后，政府中的某些人或将离职，但这些争议文件仍需妥善处理，以免新生的民主制度被丑闻所困。显然，最佳的解决方案便是秘密地将这些文件付之一炬，从而彻底抹去这些信息的痕迹。我们可轻易地编造理由，诸如有人吸烟的时候不小心把这些文件点着了。虽会惹人猜疑，但我们定能化解疑虑，携手共建一个更加美好的意大利！"
 ita_attack_the_personality_cult:0 "攻击个人崇拜"
 ita_attack_the_personality_cult_desc:0 "尽管围绕领袖的个人崇拜已不如昔日那般盛行，但它仍是意大利宣传中一个不可忽视的力量。随处可见的海报歌颂着领袖的辉煌，而那些对墨索里尼或齐亚诺作为世界最伟大领袖的说法持有异议的人，往往会遭受暴力对待，甚至在某些极端情况下被私刑处决。然而，那些黑暗的日子已经落幕。个人崇拜与我们正在萌芽的民主并不相称，因为任何上台的政党都只是想要恢复领袖在意大利的领导地位。此外，尽管许多人可能不愿承认，贝尼托·墨索里尼并非完美无缺，他同样有着不少缺点。我们必须开始向公众展示，领袖并非人间的神，而是一个同样会犯错的普通人。这无疑会激起一些顽固派的强烈抵制，尤其是那些坚持法西斯主义的人，但我们有信心能够应对这些挑战，正如维罗纳所展现的那样，那些顽固的法西斯主义残影，并非照亮意大利未来之路的明灯。"
 ita_mussolini_isnt_always_right:0 "墨索里尼也会犯错"
 ita_mussolini_isnt_always_right_desc:0 "毫无疑问，贝尼托·墨索里尼是意大利近代史上最重要的人物，迄今为止，法西斯国家一直在竭尽全力让每个人都清楚地了解这一简单的事实。学校教科书对他大加赞扬，全国各地建造了大量以他的形象为主题的纪念碑，城镇和地方也以他的名字命名。他被视为救世主，是人民的英雄，从未做过任何错事。人民有一个可以仰望的人固然很好，但墨索里尼身上的完美光环让很多人，尤其是没有受过教育的底层人民，本能地不信任齐亚诺的民主化改革。他们想知道，如果民主如此伟大，墨索里尼为什么要消灭民主。我们必须开始灌输这样一种激进的思想：也许墨索里尼并不是一个无懈可击的先知，而只是一个和其他人一样的普通人，当然，他是一个伟大的领袖，为了使自己的国家变得伟大而竭尽全力，但他仍然是一个普通人，而由普通人制定的法律在时代需要的时候必须做出改变。"
 ita_chisel_away_the_exterior:0 "去伪存真"
 ita_chisel_away_the_exterior_desc:0 "迄今为止，意大利政府一直保持着完美的形象。即使在最近，我们承认了一些小错误，并减少了个人崇拜，但意大利民众仍然普遍认为意大利政府是近乎完美的。然而即使这可能会让很多人感到震惊，也会让强硬派勃然大怒，但我们会承认我们政府的失败。是的，我们压榨过我们的人民，我们对我们的“敌人”做过可怕的事情。是的，意大利军队并不清白，也做过可怕的事情。是的，过去几十年产生的问题并不完全归咎于德国，我们政府的无能也是原因之一。更重要的是，我们不仅要向巴尔干或非洲悲剧的受害者道歉，还要向意大利人民道歉，因为我们建立了一个辜负了他们的法西斯制度。"
 ita_open_up_the_squares:0 "开放广场集会"
 ita_open_up_the_squares_desc:0 "尽管抗议和集会在意大利是“允许”的，但像美国等国家所享有的真正言论自由，在这里却近乎传说。这些所谓的民主活动，最终总是离奇地转向对意大利政府或国家法西斯党的支持。真正的民主精神，是让人们能够毫无顾忌地发声，而无需在深夜因为莫名的恐惧而辗转难眠，更无需害怕被发现后脑勺中了两枪、被冠以畏罪自杀的结局。更重要的是，人民有权在广场上自由地集结，举行集会，表达意愿！我们必须解绑对抗议和集会的法律枷锁，只有这样，人民才能拥有实实在在的自由，而不仅仅是空有其名的自由。唯有在这样的环境下，多元化的思想才能在民众中无拘无束地交流与传播！"
 ita_in_the_government:0 "对于政府"
 ita_in_the_government_desc:0 "齐亚诺改革的真正要义在于对意大利国家的法律和运作方式进行了全面改革。我们的目标不仅是解散法西斯组织，还要建立一个制衡体系，确保我们的民主不会因为某个政党（无论是法西斯、共产主义甚至更糟糕的政党）在议会中获得多数席位而再次被吞噬。为此，我们将通过彻底取消国王干预意大利政治的权力，然后改革行政机构，取消大议会，最后实现议会民主化，从而消除法西斯国家在意大利政府中的一切残余。这些改革将是齐亚诺整个计划中最艰难、最具争议性的部分，但如果我们能够推动所有这些改革，那么最糟糕的时刻早晚将会过去。"
 ita_remove_umbertos_power:0 "撤销翁贝托的权力"
 ita_remove_umbertos_power_desc:0 "阿尔贝托法令，意大利的宪法，自1848年诞生至今已逾一个世纪。然而，这部宪法因其“灵活性”而著称，即构成宪章的法律条文较之其他国家（如美国的宪法）更易于修订。正是这种灵活性，让墨索里尼得以轻松地修改宪章，将意大利从一个民主国家转变为法西斯国家。然而，意大利众多立法者和法学家已经指出，宪章中的多条法律暗示着国王拥有广泛的法律权力。尽管历史上王室大多远离政治漩涡（在意大利的近代史卷中，王室实际上成了墨索里尼的橡皮图章），但宪章中的这些条款，宛如一把悬在我们脆弱民主之上的达摩克利斯之剑。一个健全的民主国家不能承受因国王翁贝托或其继任者对国家政治状态不满，而合法倒退回专制君主制的风险。故此，我们热切地寻求对宪章进行细腻的雕琢，并植入坚固的保障，以确保意大利国王的尊贵之位，仅在礼仪与象征的光辉下闪耀，而不越界于政治的纷扰之中。"
 ita_dissolve_the_grand_council:0 "解散大委员会"
 ita_dissolve_the_grand_council_desc:0 "加莱亚佐·齐亚诺向来以勇气著称，他始终怀揣着双手紧握历史、果断行动的决心。然而，即便是领袖本人，也深刻认识到这一刻抉择的重大意义。废除法西斯大委员会这一自1920年代以来法西斯意大利的核心管理机构，意味着彻底与贝尼托·墨索里尼及其政治遗产所铸就的历史分道扬镳。此举无疑是对法西斯主义的核心理念，以及对自法西斯前虚弱的国家体制被摒弃后意大利统治理念的深刻质疑。\n\n但为了意大利的未来，我们也必须跨过卢比孔河。为了重塑我们的民族形象，为了国内年迈的长者与新生的孩童，为了现今的稳固，更为了迎接一个崭新的未来。当法西斯大委员会成为历史，一个焕然一新的意大利将应运而生。这一变革承载着领袖的坚定意志，它必将实现，并熠熠生辉。"
 ita_restore_the_chamber_of_deputies:0 "恢复众议院"
 ita_restore_the_chamber_of_deputies_desc:0 "1939年，意大利众议院被法西斯与法团议会压制和取代，后者作为一个非民选产生的立法机关，由法西斯大委员会和其他重要的法西斯主义人物们组成，其中包括了经济法团的首脑们。解散这个机构已经是势在必行，而一个崭新的，民选的众议院会通过民主选举被创设出来。为进一步保障民主，我们将建立完善的两院制，即参众两院承担相同的责任，拥有平级的权力。如此，政府就必须要在参众两院都获得多数票才能通过和修改法律法规，从而大大增加了一党独大的难度。"
 ita_open_up_the_senate:0 "开放众议院"
 ita_open_up_the_senate_desc:0 "意大利参议院，即上议院，在墨索里尼的法西斯改革中犹如一股清流，几乎未受影响。但墨索里尼却巧妙地利用了阿尔贝托法令的漏洞——该法令允许国王直接任命终身参议员。为了掌控参议院，这位独裁者幕后操纵，让国王任命了他精心挑选的参议员。如今，我们首先要做的就是剥夺国王的任命权；其次，在选举后对参议院进行改革，废除现任终身参议员的特权。这一洗牌对于民主的透明过渡至关重要，以防那些法西斯时代的老参议员长久盘踞参议院，阻碍民主进程。"
 ita_reppeal_the_acrebo_laws:0 "废除阿切尔博法案"
 ita_reppeal_the_acrebo_laws_desc:0 "阿切尔博法案，以推动者贾科莫·阿切尔博之名而著称，正是此法让墨索里尼成功助力意大利国家法西斯党在议会中夺得多数席位，进而使法西斯主义在意大利深深扎根。但如今，齐亚诺领袖为我国选择的道路，却要求废除这些法案：因为它们曾是法西斯蹂躏议会民主的骇人见证。唯有强行地撤销阿切尔博法案，我们才能描绘出新意大利之蓝图，在那里，比例代表制与民心所向将重归政治生活的核心。此举不仅象征着齐亚诺对民主化的坚定承诺，更从实用层面为构建比例制度铺平了道路。废除法案，势在必行"
 ita_in_the_organization:0 "对于组织"
 ita_in_the_organization_desc:0 "领袖必须面对这样一个事实，即他的计划面临的最大威胁是他自己的政党。即使齐亚诺最终实现了对国家法西斯党的统治，该党的存在本身也将成为意大利新制度中的一颗定时炸弹，很容易威胁到新生的民主制度。为此，我们必须确保国家法西斯党在可预见的未来不会对我们的新制度构成威胁，首先，我们将最后一次取缔极端主义，希望能将温和的法西斯分子推向更加温和的立场；然后，我们将全面解散黑衫党，将其吸收到大区选举委员会中；最后，我们将改革党内规则，使其更加透明和民主。或许这些改革会比国家机构方面的改革更加难以推进，毕竟我们是在法西斯强硬派的内部对其进行了打击，但是，我们不能半途而废，否则我们的所有努力都将付之东流。"
 ita_expel_the_hardliners:0 "驱逐强硬派"
 ita_expel_the_hardliners_desc:0 "在几乎所有政治体系中，每个政党都有其自由派和强硬派，国家法西斯党也不例外。尽管它试图以铁板一块的形象示人，但维罗纳大会却像一面镜子，映照出了党内的分歧。为了推进自己的议程，领袖必须快刀斩乱麻，识别出那些在言辞上与他的想法完全相悖的人，果断地对付那些党内的强硬派。如果领袖希望与党内的大多数成员达成和解，那么这些人就成了时代的弃子，必被清除之途石。他们将被流放到政治的荒原，成为被遗忘的尘埃。通过齐亚诺盟友在党内的一系列声援和声明，我们昭告天下：党的命运在吾辈掌中，齐亚诺之梦将为蓝图，织就党之辉煌篇章。"
 ita_exile_scorza:0 "流放斯科尔扎"
 ita_exile_scorza_desc:0 "在维罗纳会议的舞台上，斯科尔扎的思想虽遭重挫，但他心中仍抱有一线希望，坚信强硬的法西斯主义终将成为意大利的明天。若意大利能将斯科尔扎视若无睹，那自是皆大欢喜，但他所代表的理念对许多人来说却依旧魅力难挡。显而易见，我们需要另辟蹊径，以应对斯科尔扎，防止他继续宣扬那些陈词滥调。我们不能简单地逮捕他，更不能让黑衫军去追捕他，因为他的势力依然根深蒂固。我们计划提拔他至军中要职，并派遣他去处理一些叛乱或其他紧急事务。作为前中尉，他难以拒绝，因为拒绝可能使他看起来不支持军队，这无疑会降低他的人气。斯科尔扎一旦就任军职，我们便有机会逐步削弱他的追随者，甚至引导他们转向支持民主。如此一来，当他退役或返回意大利时，他的支持基础早已垮台，无力再为笼罩在意大利的未来上的法西斯阴影摇旗呐喊。"
 ita_remove_the_undedicated:0 "排除大老粗"
 ita_remove_the_undedicated_desc:0 "50年代的动荡波及意大利，越来越多的人因信仰而非学识被提拔。人们深信，即便学识浅薄，爱国心切和法西斯主义的优越理念足以弥补，毕竟真正的信徒，岂能平庸？然而，我们目睹了一幕悲剧，曾深信不疑的信念，如今却显得荒谬绝伦。那些由这套选拔制度所选出的领导人，将政府部门变成了可与意大利东非公司相媲美的金钱黑洞！我们须要逐步剔除那些依靠裙带关系而上位之人，取而代之的，应是学富五车之领导。然而，此举必须稳扎稳打，因为那些死硬的法西斯分子可能会指责齐亚诺在清洗政府中的“勤劳本分的意大利人”。我们可借助那些过去被置若罔闻的，来自上下级对这些未受教育领导者的诸多投诉。幸而，随着束缚的松绑，那些原本因反对旧政权而不愿与政府为伍的知识分子，鉴于我们之前的改革，如今应会更加欣然和满意地在政府岗位上施展才华。"
 ita_dissolve_the_blackshirts:0 "解散黑衫军"
 ita_dissolve_the_blackshirts_desc:0 "国家安全志愿军，即人们熟知的黑衫军，曾是我们政府的坚强臂膀。曾用来威胁、打压甚至暗杀那些反对法西斯政权的政治异己。然而，那段黑暗的历史已经翻篇。黑衫军，那股曾将自由民主理想紧紧束缚的力量，无情地扼杀了那些闪耀着光芒的梦想。为了构筑一个真正充满活力的民主之国，我们必须坚决摒弃这样的阴影，因为它们只会对那些勇敢提出激进思想的先驱们施以无妄之灾。黑衫军将被并入皇家陆军。虽然这个“辉煌”组织的终结会让一些人感到哀伤，但我们必须要提醒意大利人民，第二次世界大战后黑衫军的所作所为——他们沦为了一群醉汉和无赖。意大利正以新的目光凝望未来，黑衫军仅是历史长河中的一缕尘埃，已悄然成为过往。"
 ita_send_them_home:0 "各回各家"
 ita_send_them_home_desc:0 "在意大利政府中，有许多……不那么民主的组织，其中就有OVRA。老实说，我们已经不再需要他们的服务了，因为任何合法的民主国家都不会监视他们的人民，也不会让不同政见者突然消失不见。我们将解散这些组织，让这些旧日的秘密警察回家。此举在日益减少的强硬派中引起了很大争议，他们说我们会让成千上万的人失业。尽管承认这一点可能会让我们感到痛苦，但他们说的确实有道理，我们也需要给他们发放某种养老金，这样秘密警察就不会像黑衫军那样变成酒鬼和流氓。"
 ita_hand_them_over:0 "权力转交"
 ita_hand_them_over_desc:0 "随着意大利政府的巩固，一些政治异议人士遭到了无情的镇压，或被暗杀，或被迫流亡。然而，更多的人被投入监狱，默默承受着岁月的煎熬。在意大利向民主转型的进程中，抗议活动如雨后春笋般涌现，人们要求释放这些政治囚犯。意大利人民开始行使他们的权利，这景象令人动容，也提醒我们有责任倾听这些呼吁释放那些囚犯的声音。我们期望，这些重获自由的人，虽对政治心存戒备，但不会因此走向加入红色旅或企图颠覆政府的道路。相反，我们期望他们能够以更加积极的姿态，投身政治，为意大利的繁荣贡献力量，助力意大利成为一个真正伟大的国家。"
 ita_open_up_the_party:0 "开放党禁"
 ita_open_up_the_party_desc:0 "齐亚诺虽有心解散国家法西斯党，以让其他政党有崭露头角之机，但此乃长远之计，不可操之过急。我们首要之务，是广纳百川，无论信仰如何，皆欢迎加入党内。此举或能逐渐削弱那些企图维系国家法西斯党统治地位者的影响力。同时，我们亦需逐步废除那些赋予国家法西斯党优先地位的法律，以确保其最终能够淡出政治舞台，避免因我们的疏忽而留下只能由特定党派成员担任的职位。改革之路虽已启程，但为了确保其彻底与公正，我们仍需不懈努力。"
 ita_end_the_monopoly:0 "结束垄断"
 ita_end_the_monopoly_desc:0 "国家法西斯党独享政坛四十载，其成功清除政敌后，它的统治再无反对者。如今，我们正在恢复我国民主，有许多人提出让国法党也能在新政坛中占据一席之地。可如果要这么做，那国法党当选，再重启消灭民主的循环程序不过是时间问题。要确保意大利真正成为正常运转的民主国家，势必彻底解散国法党，终结其对政治的垄断。这是个激进的行动，必定引起极大争议，但却是确保国法党无法利用其影响力赢得每次选举，使意大利民主沦为笑话的必要之举。"
 ita_open_up_the_franchise:0 "开放选举权"
 ita_open_up_the_franchise_desc:0 "久违民主的意大利，其转型之路自然荆棘满途。在构建新政府形态的征途中，我们面临了诸多挑战。目前最棘手的难题便是被严重受限的投票权。女性仅被允许参与地方选举，而在当下的社会环境中，想要目睹女性官员的当选，无疑是难上加难。为了确保意大利的每一个声音都能被听见，我们迫切需要废除这些陈规陋习，让法律与时俱进，不再让性别成为参政的障碍。"
 ita_one_last_goodbye:0 "最后的告别"
 ita_one_last_goodbye_desc:0 "法西斯参议院、法西斯与公司商会以及大议会，齐聚一堂，举行了它们解散前的最后一次会议。齐亚诺在这最后的舞台上三次发言。会场座无虚席，记者们蜂拥而至，围绕着罗马宫殿，见证着法西斯政权的落幕。齐亚诺的三次演讲如出一辙，他满怀深情地回顾了墨索里尼的岁月，沉痛地悼念了上一次世界大战的悲剧，然后激昂地阐述了自己作为意大利领袖的使命。他直言不讳地承认，自己的所作所为颇受争议，与意大利的辉煌往昔形成鲜明对比，当他细数自己在任期间国家法西斯党、政府乃至整个国家所经历的深刻变革时，空气中似乎凝结了一种紧张与期待。但当齐亚诺向听众致谢，缓缓步下讲台，那紧张感瞬间化为热烈的掌声，三次皆是如此。掌声渐息，一片宁静随之而来，如同暴风雨后的宁静海面。这宁静之后，又将孕育出怎样的新篇章，唯有时间能够揭晓。"
 ita_the_race_begins:0 "竞赛开始"
 ita_the_race_begins_desc:0 "随着领袖的隐退，选举的大幕已经徐徐拉开。近日，小党派如雨后春笋般涌现，国内政治力量似乎已经汇聚成三大阵营，它们将在选票上一决雌雄。基督教民主党率先成立，由阿明托雷·范范尼领衔，这个联盟汇集了温和保守派、天主教徒和自由派，他们倡导加速改革，以释放意大利经济和社会的活力。然而，也有人担忧，他们的经济计划可能会给意大利的底层民众带来不利影响。在左翼，民主阵线由南尼掌舵，他成功地将左翼力量凝聚为一党，主张社会自由化，并致力于建立一个强大的福利国家，以保障意大利最贫困人群的福祉。然而，意大利社会民主党的成立，激怒了更为激进的保守派和前法西斯主义者，他们视其不过为共产党的伪装。国民联盟则是最后成立的政党，位于政治光谱的右翼，由前温和法西斯主义者、君主主义者和激进保守派组成，他们团结在乔治·阿尔米兰特周围，这位前国家法西斯党秘书似乎准备继续齐亚诺的渐进式改革。随着选票的轻舟缓缓驶过，愿新政府的诞生，如同清晨的露珠，纯净而宁静，让激进的阴霾随风而逝。"
 demitaly.9.t:0 "齐亚诺在大委员会上发表讲话"
 demitaly.9.d:0 "今天齐亚诺莅临威尼斯宫对法西斯大委员会发表了讲话，这场演讲的消息被严格保密，没有透露给任何国家媒体。在讲话中，齐亚诺批判了墨索里尼任领袖的时期，指出他在一些关键方面“破坏了意大利国家”。接下来，齐亚诺转而批判了当下法西斯国家的一些方面，并表示有必要立即改变这种状况。\n\n领袖同样也提到了有关于对他本人和前任者的个人崇拜，法西斯主义针对政治对手极度威权化的镇压措施，许多法西斯机构缺乏透明度和问责机制，以及对少数民族语言和文化上的强制意大利化。齐亚诺表示，所有这些问题都“阻碍了意大利作为一个自由国家发挥其最大潜能”，而且“如果我们想要国家将来走向繁荣，就必须解决问题”。\n\n这段讲话的一部分被泄露给媒体，在齐亚诺的支持者与反对者中都引发了热烈的讨论。到了现在这个地步，事情已经很清楚了，领袖至少打算在某种程度上打破自己正领导的这个体制。国际观察家认为这可能是法西斯体制终结的开始，也许标志着一个新的民主时代的曙光。"
 demitaly.9.a:0 "谁能想象这会发生？"
 demitaly.11.t:0 "国王的演讲"
 demitaly.11.d:0 "在国家广播电台的一次讲话中，意大利国王、埃塞俄比亚皇帝、帝国第一元帅翁贝托二世·迪·萨伏依陛下谈到了最近修订的阿尔贝蒂诺宪章，意大利的宪法。其中特别提到，国王优雅地接受并欢迎法律对其个人施加的新限制，并誓言遵守这些限制，以“遵守我所服务的意大利民族的意愿”。\n\n引人注目的是，最新的这份修正案由齐亚诺推行，并得到了翁贝托国王的批准。它撤销了国王任命部长、解散议会以及在议会中否决法律的权力。从现在起，除非议会再次修改宪法，否则国王实际上将失去在意大利的所有政治权力，成为一位有名无实的国家元首。\n\n众所周知，翁贝托二世并不关心王国的政治事务，他享受着与齐亚诺的相互信任与友谊。然而，没什么人认为国王会甘愿放弃他和他的后代拥有的政治权力。奇怪的是，这一消息却同时得到了左右翼的支持。因为很多国家法西斯党内的法西斯分子仍然坚持最初的共和主义理想。"
 demitaly.11.a:0 "君主制不过是旧时代的遗物。"
 demitaly.12.t:0 "大委员会的终结"
 demitaly.12.d:0 "今天，齐亚诺通过了可能是他迄今为止最具争议性的一部法律，法西斯政权最重要的行政机构，法西斯大委员会将被解散。大委员会不是唯一个被解散的组织，其他的各种法西斯工会、工团和黑衫军也会被解散。\n\n到现在为止，这是齐亚诺对法西斯政权最严重且最具决定性的打击，他以新民主改革的方式对法西斯政权的核心进行了打击。当然，许多保守派代表和法西斯的代表表达了强烈的反对意见。但这一消息受到了意大利社会的各阶层的欢迎，他们十分支持齐亚诺的改革。\n\n法西斯大委员会将被部长内阁所取代，部长由首相任命，而首相由选举产生，这是意大利建立新民主秩序重要的第一步，媒体们推测，选举和全面民主化的到来只是时间问题。"
 demitaly.12.a:0 "是时候了。"
 demitaly.13.t:0 "齐亚诺宣布成立民主众议会"
 demitaly.13.d:0 "自1939年以来，意大利的下议院就意味着法西斯与法团议会。那是一个由政权的重要代表组成的非民选议会。理论上它应该是法西斯政治结构的主要机构，但事实上法西斯与法团议会的功能只是在墨索里尼送过来的文件上盖个同意印章罢了。齐亚诺要求解散法西斯与法团议会，并由民众选举的议员组成的众议院取而代之。\n\n新的众议院也将与参议院在一个完美的两院体制中正常运行，齐亚诺实施了相应的改革来确保必须在上下议院同时获得多数席位的政党才能够更改法律。很明显，齐亚诺的目标不仅仅是消灭法西斯主义，而且还要确保它不会卷土重来。\n\n随着法西斯政权的另一个关键要素从意大利消失，民主立法机构已经建立，一些人已经开始为新的选举做准备，许多人仍然对齐亚诺的国家民主化持怀疑态度，但没人能否认领袖想把它完成的决心。"
 demitaly.13.a:0 "看来齐亚诺充满了决心。"
 demitaly.14.t:0 "参议院改组"
 demitaly.14.d:0 "参议院是法西斯上台前的政权中为数不多没受到墨索里尼改组意大利政治影响的部门了。但被前领袖任命的终身参议员们仍然挤满了参议院。显而易见的是，仅仅1939年一年，墨索里尼就强迫国王签署法令任命了212名参议员。齐亚诺已经下令所有终身参议员在即将到来的选举进行后立即辞职，从而确保参议院完全重新洗牌。\n\n为了避免为这个已经非常两极分化的决定引来更多的争议，这条新规没有例外。参议院作为意大利王国的上议院，是国内最具声望和最受尊重的政治机构。齐亚诺则多次表示，如果上院仍然挤满了非民主选拔的代表，就不可能有民主。\n\n现在，选举日期即将宣布，几个政党和政治运动经开始形成，因为意大利社会的不同阶层和群体开始寻找能够代表他们利益的人，国际媒体仍然对齐亚诺推动民主的努力感到惊讶，因为这是法西斯国家绝无仅有的先例。"
 demitaly.14.a:0 "旧的不去，新的不来。"
 demitaly.15.t:0 "松开绞索"
 demitaly.15.d:0 "自从墨索里尼进军罗马那日起，法西斯主义就跻身主流意识形态行列，就连大日耳曼国及其后来者奉行的极端法西斯主义，此后也都于意大利社会盛行。这在意大利帝国唯一合法政党——国家法西斯党上体现得淋漓尽致。法西斯党全面宰制了意大利政坛，全国范围内的法西斯主义从此畅行无阻。\n\n领袖深晓我国政坛党管一切的现状下，迈向民主政治每一步，都需要对现有党权进行削弱。这项任务无异于逆水行舟，因为即使是领袖本人下令，法西斯党也会尽全力抗阻任何削弱其权力的举措。无论如何，我们必须倍加小心地解开束缚民主政治的绳索，不然所谓的民主可能不过是法西斯主义换汤不换药。\n\n齐亚诺思索片刻，他决定先从清除死硬派着手，将他们连同其所谓的理想一齐放逐。当然，诸如斯科尔扎一般的麻烦之辈也应处理掉，至于具体手段……齐亚诺倒是有些“有趣”的想法。最后，国家安全志愿军，或称黑衫军，他们过去骚扰乃至残害异见者，为了支持法西斯政权无所不用其极。狡兔死，走狗烹，必须消除这种隐患，他们只会阻碍意大利帝国的民主化进程。\n\n领袖坐在窗沿上，俯瞰着罗马。毋庸置疑，任重而道远，不过道阻虽且长，行则必至，法西斯党终将退出历史舞台。之前他因法西斯党得以登上领袖宝座，如今他又将亲手摧毁之，一时间不由得悲从中来。但他已经下定决心，即使倾其所有，也要确保意大利无后顾之忧。"
 demitaly.15.a:0 "一步到位终结法西斯主义"
 demitaly.16.t:0 "斯科尔扎的新工作"
 demitaly.16.d:0 "派系瓦解了，企图政变法西斯党的阴谋被挫败了，自从维罗纳大会以来，斯科尔扎就噤若寒蝉。他辞去了法西斯党秘书长的职务，满足于过着像其他许多普通法西斯主义者一样的平凡生活。但是，领袖认为，留在意大利对这样一位聪明的人来说太大材小用了，因此决定派他担任一个微妙而重要的外交职务，驻加勒比岛国圣基茨和尼维斯的大使。\n\n斯科尔扎表现得像个真正的法西斯主义者，他没有质疑领袖的命令，而是平静地接受了自己的职责。在齐亚诺给斯科尔扎的正式信件中，齐亚诺敦促他表现出对意大利民族的忠诚。而且执行这项极为重要的地缘政治任务对法西斯事业尤为重要。斯科尔扎必须捍卫和支持意大利在这些岛屿上的利益，确保法西斯革命的火焰在半个地球之外照耀它的光芒。\n\n由于齐亚诺知道斯科尔扎十分渴望完成这项任务，所以他没有等太久就把斯科尔扎送上了旅途，这也意味着在斯科尔扎已经坐在大西洋上空的一架飞机上之后，他在国家法西斯党的几个朋友和同事才知道他的离开，但有时这种事情是不可避免的。整个意大利都寄希望于斯科尔扎。人民一定会以他们的意志来支持他完成自己的使命。"
 demitaly.16.a:0 "再会了，祝你好运！"
 demitaly.20.t:0 "齐亚诺正式下台"
 demitaly.20.d:0 "今日，意大利国王翁贝托二世·迪·萨伏依陛下，收悉并批准了帝国第一元帅加莱亚佐·齐亚诺阁下的辞呈。齐亚诺阁下于信中正式申请辞去国家首相之职务。国王陛下将接手并主持过渡时期的工作，他将亲掌意大利最高行政权力直至下次选举。\n\n这标志着意大利进入了历史性的新阶段，人们将永远铭记这一时刻。法西斯主义于此诞生，而最终由其抛弃，意大利从此回归民主政体制度。法西斯时代修建的纪念建筑，如罗马万国博览会区（EUR district），附近就有大批民众欢欣鼓舞，热烈庆祝新时代到来。意大利人民将迎来自由繁荣的幸福新生活。\n\n大家对选举结果都很乐观，各主要党派都认为自己很有机会获胜；媒体预测也莫衷一是，部分民调认为自由派必胜，而其他人则押宝左翼党派，还有少数人甚至认为天命终归新法西斯主义。自然，无人知晓最终结局，但有一点确凿无疑，齐亚诺终结了法西斯主义，大功告成，功成身退。"
 demitaly.20.a:0 "赞美齐亚诺！"
 cianopartysupport.5.t:0 "首届选举"
 cianopartysupport.5.d:0 "春风得意，意大利的冬日终于翻篇，迎来盛夏的暖阳：法西斯的残冰消融，为民主的繁花似锦铺路。但如此乐观的景象，或许只是一厢情愿。选举之战如火如荼，虽然暴力激进的阴云尚未聚集，但选票将揭开社会深层的裂痕。三个政党已经加入这场角逐，但最终只有一方能够胜出。\n\n右翼之选，国民联盟登台。这个看似包容的大帐篷，实则由忠于齐亚诺的国家法西斯党旧部掌控，被媒体冠以\"新法西斯主义者\"之名，但究竟\"新\"在何处，令人费解。领袖乔治·阿尔米兰特，政治手腕非凡，汇聚了那些对法西斯余晖念念不忘的人心。选择国民联盟，便是选择了守旧、稳定，以及过往政策的延续。国民联盟胜出之机虽不明朗，却也非绝无可能——在民主的舞台上，黑马逆袭亦非天方夜谭。\n\n中道力量，基督教民主党担纲。自由主义者、中间派和温和派联手绘制了一幅改革蓝图，意在引领意大利迈向现代化。以经济发展为轴心，基督教民主党力图摆脱法西斯遗留的桎梏，同时维护意大利的历史传承与文化根脉。党内虽有自由与保守之争，但在魅力领袖阿尔多·莫罗的感召下仍愿团结一致，共谋发展。基督教民主党赢得了经济自由化倾向的上层中产阶级，以及虔诚教徒的青睐。舆论普遍看好基督教民主党胜出。\n\n左翼阵营，民主阵线压轴。他们的政治宣言，一言以蔽之：反法西斯。在前流亡者彼得罗·南尼的政治智慧下，这个广泛的左翼联盟视法西斯为民主的头号公敌，誓言全力以赴，扫清法西斯残余，为意大利带来新生。民主阵线从学生群体和下层阶级中汲取力量，他们对教育自由化和新闻开放的承诺，以及构建强大福利国家和普惠政策的愿景，赢得了人心。民主阵线的胜利虽不易预测，但绝非空中楼阁。\n\n棋盘已布，战幕已开：意大利的未来，将在这场选举中被重塑，其深远影响，或许超出我们的想象。"
 cianopartysupport.5.a:0 "意大利人之于选举的落败，如同一场足球对决后的失意。"
 ITA_terrified_no_more:0 "黑衫军之死"
 ITA_terrified_no_more_desc:0 "大名鼎鼎的黑衫军，即墨索里尼赢得意大利王国的利剑，已经不复存在。解散这支本质上属于法外力量的队伍，不仅是对法西斯主义的又一次打击，也是对我们国家稳定的一大利好。"
 ITA_open_parties:0 "开放党禁"
 ITA_open_parties_desc:0 "国家法西斯党已向所有党派的成员开放，这是国法党消亡的前兆。不久后，我们将允许意大利人凭内心投票给自己喜欢的政党。"
 ita_the_grand_council_votes:0 "法西斯大委员会投票"
 ita_the_grand_council_votes_desc:0 "维罗纳大会的结束，让一件事日益明了：政府希望齐亚诺下台。他的命运今日定音，一切已成定局。齐亚诺的民主承诺化作回忆，法西斯主义重返意大利。"
 ita_the_removal_of_ciano:0 "齐亚诺下台"
 ita_the_removal_of_ciano_desc:0 "投票结果出来了，齐亚诺下台了。在会议决定继任者之前，翁贝托二世将暂时充当代理政府首脑，而目前看来，继任者很可能是国家法西斯党书记卡洛·斯科尔扎。"
 ita_the_election_of_scorza:0 "斯科尔扎当选"
 ita_the_election_of_scorza_desc:0 "第二论投票随后顺利通过，选举斯科尔扎为新一任领袖；然而，剩下的少数几个齐亚诺派成员却提出了异议。无论如何，卡洛-斯科尔扎现在是我们国家的新领袖，他将带领法西斯主义重回辉煌时代。领袖万岁！"
 ita_rekindle_the_spirit:0 "重燃精神之火"
 ita_rekindle_the_spirit_desc:0 "一直以来，民众们都被灌输所谓的民主是多么“伟大”，能给他们带来多少“解放”，他们不知道这一切都是彻头彻尾的谎言！我们必须重燃国家过去的精神，让人们见识到法西斯主义带来的解放！"
 ita_reconvert_the_youth:0 "重领年轻人"
 ita_reconvert_the_youth_desc:0 "我们必须在意大利儿童中培养法西斯主义。众所周知，孩子们容易受到影响，因此必须让他们学会拒绝民主党派的花言巧语，接受法西斯主义的启蒙。"
 ita_youth_1:0 "§G政府将开始竭力让年轻人重返法西斯阵地。§!"
 ita_ban_degenerate_movies:0 "禁止堕落电影"
 ita_ban_degenerate_movies_desc:0 "为了继续努力让年轻人重拾法西斯主义，我们必须阻止堕落电影的浪潮席卷我们的民众。电影总局将对电影业实施更加严格的限制和监管，而彰显意大利荣耀的电影开始接受国家资助。"
 ita_good_fascist_morals:0 "正确的法西斯道德观"
 ita_good_fascist_morals_desc:0 "我国青年正在遭受国外影响的腐蚀。为了抵御腐蚀，我们必须向他们灌输正确的法西斯道德观：强身健体、遵纪守法，最重要的是要爱党爱国拥护领袖。"
 ita_appeal_to_the_youngest_generation:0 "吸引新生代"
 ita_appeal_to_the_youngest_generation_desc:0 "为了进一步将少年们拉回到法西斯主义中来，我们必须争取在他们最幼小的年龄就开展谈话。学校的课程进行更新，以展示法西斯主义和战争的荣耀。方程数学题会用来出题计算轰炸敌军阵地需要多少弹药，体育锻炼也将得到更多重视。"
 ita_reorganize_the_GIL:0 "重组GIL"
 ita_involve_the_middle_aged:0 "吸纳中年人"
 ita_involve_the_middle_aged_desc:0 "要让法西斯主义在民众中重新点燃，我们必须以中年人为目标。法西斯主义的火种曾在这一代人中熊熊燃烧，然而，随着经济危机，火种被冷漠与抵制压灭。如果我们希望在意大利稳固法西斯主义的地位，就必须拉他们回家。"
 ita_middle_aged_1:0 "§G政府将开始竭力拉中年人回归法西斯阵地。§!"
 ita_bring_in_the_old_boys:0 "召回老伙计"
 ita_bring_in_the_old_boys_desc:0 "许多中年人曾是黑衫军等法西斯组织的成员。我们应该鼓励重新招募人员加入黑衫军，并将招募范围扩大到年长的男性。"
 ita_appeal_to_the_peasentry:0 "吸引农民"
 ita_appeal_to_the_peasentry_desc:0 "曾几何时，意大利的村庄和农场是我们最忠实的支持者。然而，随着亚特兰特罗帕对农业的严重破坏，许多人已经不再向法西斯主义伸出援助之手。我们必须重新让意大利的田野成为全国法西斯主义色彩最浓厚的地方。"
 ita_the_boys_are_back_in_rome:0 "男孩们又回到罗马"
 ita_the_boys_are_back_in_rome_desc:0 "招募仍在进行且已大获成功。许多中年人加入或重新加入了黑衫军，街头巷尾都能看到他们的身影。男孩们确已重回罗马。"
 ita_make_fascism_radically_cool_again:0 "让法西斯主义再度流行"
 ita_make_fascism_radically_cool_again_desc:0 "法西斯主义在年轻人中再次抬头。青年们频繁出席意大利青年刀斧手集会，身着黑衫、手持《法西斯的教条》大步走在街头。"
 ita_entice_the_church:0 "怂恿教会"
 ita_entice_the_church_desc:0 "为了继续努力将人们重新纳入法西斯的怀抱，我们需与意大利最根深蒂固、影响深远的机构——天主教会携手并进。我们期望通过在教育领域赋予其更大的话语权，以及促成斯科尔扎与教宗之间的正式会晤，来赢得教会对我们理念的认同。"
 ita_fascist_concerned_citizens_concils:0 "法西斯市民关怀委员会"
 ita_fascist_concerned_citizens_concils_desc:0 "我们将成立市民委员会，为将民众纳入法西斯阵营做最后努力。委员会的成立将使市民得以自主决策城乡地方项目，同时提高生产率以及坚定法西斯主义信仰。"
 ita_a_spring_cleaning_for_the_party:0 "党内大清洗"
 ita_a_spring_cleaning_for_the_party_desc:0 "我们的党内有一些人几乎称不上是法西斯分子。齐亚诺的自由派呼吁削弱我们伟大的法西斯党和国家，而法里纳奇的激进派则希望我们成为德国的马屁精。显然，他们都错了，我们必须坚持当前的路线。"
 ita_remove_cianos_holdouts:0 "清洗齐亚诺派反对者"
 ita_remove_cianos_holdouts_desc:0 "法西斯大委员会中仍有少数冥顽不灵的齐亚诺分子。我们必须清除这些自由主义者，以保真正的法西斯主义繁荣昌盛。"
 ita_investigate_cianos_corruption:0 "调查齐亚诺腐败"
 ita_investigate_cianos_corruption_desc:0 "所有合格的法西斯分子都清楚地知道，齐亚诺是一个天生的腐败分子。我们知道，人们也知道，我们需要做的只是“发现”一些罪证档案，然后让整个意大利知道。"
 ita_investigate_colonial_corruption:0 "调查殖民地腐败"
 ita_investigate_colonial_corruption_desc:0 "齐亚诺在殖民地的盟友们肯定腐败不堪。我们必须揭露他们的卑鄙行径，并表明谁真正站在意大利殖民者一边。"
 ita_decianoization:0 "去齐亚诺化"
 ita_decianoization_desc:0 "齐亚诺长期担任意大利的领袖之位，因此，对他和他的统治的记忆仍然挥之不去。我们必须清除他统治中仍在腐蚀意大利的任何残余，以确保没有人会尊敬这个失败的领导者。"
 ita_no_more_trickle_down_fascism:0 "深入人民的法西斯主义"
 ita_no_more_trickle_down_fascism_desc:0 "法西斯主义在上层社会逐渐流行，人们主动拥抱法西斯主义的现象正中齐亚诺下怀。不过我们尚未成功，哪怕是表面功夫，我们也必须把法西斯主义重新打造成人民运动，由人民主动发起的自下而上的运动。"
 ita_the_verona_trials:0 "维罗纳审判"
 ita_the_verona_trials_desc:0 "随着针对齐亚诺的证据不断的涌现，对这个名声扫地的“领袖”的逮捕令已经发出。很快，这个意图摧毁意大利国家的欺世盗名之辈的所作所为将会被昭然于天下。领袖万岁！"
 ITA_verona_trials:0 "§G齐亚诺将面临审判，命运随之而决。§!"
 ita_investigate_the_fanatics:0 "调查狂热分子"
 ita_investigate_the_fanatics_desc:0 "罗伯托·法里纳奇和他的黑色旅与齐亚诺派不同，他们是人渣中的人渣。在德国人给我们带来死亡和毁灭后，他们仍然支持德国。我们必须尽一切手段清除他和他的支持者。"
 ita_bust_the_black_brigades:0 "捣毁黑色旅"
 ita_bust_the_black_brigades_desc:0 "要对付黑色旅，首先就得破坏他们的集会。必须要让这帮人知道，他们在斯科尔扎的新意大利没有容身之地。"
 ita_reintegrate_the_moderates:0 "恢复温和派"
 ita_reintegrate_the_moderates_desc:0 "虽然大多数的法里纳奇支持者已经无可救药，但仍有一大部分人似乎出于各种原因被卷入了这场运动，我们可以与他们和解，并且欢迎他们回归我们的阵营，以加强我们的实力，并向黑色旅表明，他们也能在意大利占有一席之地。"
 ita_take_aim_at_farinacci:0 "瞄准法里纳奇"
 ita_take_aim_at_farinacci_desc:0 "与大多数事情一样，你必须击打野兽的头颅才能杀掉它。我们将彻查关于法里纳奇的每份档案，找到任何可以抹黑他的东西，让他如蠢货般丢脸。"
 ita_dig_through_his_trash:0 "挖其黑料"
 ita_dig_through_his_trash_desc:0 "尽管法里纳奇的愚行证据层出不穷，他的拥趸们却始终忠心不二，将这些证据斥为子虚乌有，认为它们无法揭示其领袖的真性情。因此，我们需深挖细查，遍寻蛛丝马迹，以铁证如山，一劳永逸地揭露法里纳奇的真面目。"
 ITA_farinacci_trash:0 "我们即将踏上征程，挖掘法里纳奇那些令人不齿的丑行。"
 ita_put_him_out_to_pasture:0 "把他晾在一边"
 ita_put_him_out_to_pasture_desc:0 "随着他的拥趸纷纷散去，法里纳奇的身边只剩下最顽固的死忠。是时候一劳永逸地解决他了。"
 ITA_farinacci_pasture:0 "§G法里纳奇很快就会登上新闻……§!"
 ita_the_rebirth_of_a_movement:0 "运动重生"
 ita_the_rebirth_of_a_movement_desc:0 "众人曾言，法西斯已成往事，再无复燃之日，无法再次点燃意大利民众心中之火。然而，我们已证明他们言之过早！毋庸置疑，法西斯如凤凰涅槃，再次成为意大利人民的振兴之源，引领我们步入和平、繁荣与民族自豪感的新时代。意大利万岁，领袖万岁！"
 ita_we_shall_not_budge:0 "我们不会让步"
 ita_we_shall_not_budge_desc:0 ""
