 impurita.31.t:0 "黎巴嫩去殖民化"
 impurita.31.d:0 "根据耶路撒冷会议期间同意黎巴嫩人民的条件，黎巴嫩将成为一个独立的国家。意大利驻军也相应离开了该国。"
 impurita.31.a:0 "再见了黎巴嫩！"
 impurita.32.t:0 "巴勒斯坦去殖民化"
 impurita.32.d:0 "根据耶路撒冷会议期间同意巴勒斯坦人民的条件，巴勒斯坦将成为一个独立的国家。意大利驻军也相应离开了该国。"
 impurita.32.a:0 "再见，巴勒斯坦！"
 impurita.33.t:0 "总督领之终"
 impurita.33.d:0 "耶路撒冷会议画上句点，巴勒斯坦总督区亦随之成为历史。那些未被划分的总督区土地，如今将在谈判桌上由犹太人、约旦人和埃及王国等各方共同分割。耶路撒冷这座城市，将置于翁贝托·拉·罗卡的管理之下，成为一片中立的区域。"
 impurita.33.a:0 "再见，中东！"
 impurita.36.t:0 "红日照耀巴勒斯坦"
 impurita.36.d:0 "“当今世界，无人清白，亦无人中立。”\n随着意大利从黎凡特撤军及中央权威的迅速崩塌，乔治·哈巴什领导的阿拉伯民族运动似乎成功填补了权力真空。统治着这个日益动荡的国家，哈巴什继续倡导以“单一国家方案”解决黎凡特问题：在这片被机会主义、宗派主义与暴力定义的土地上，他力推社会主义价值观、世俗主义与民主政治。在发表冗长声明谴责意大利新殖民主义野心与法西斯政府后，阿拉伯民族运动已断绝与罗马当局所有联系，并将殖民资产国有化。\n\n阿拉伯民族运动的统治远未稳固。犹太武装与阿拉伯保守派民兵仍在耶路撒冷周边持续反叛，随着新意识形态涌入，宗派暴力非但未平息反而愈演愈烈。迄今为止，哈巴什的应对措施要么模糊不清要么干脆缺席——唯恐进一步撕裂本就脆弱的支持基础。若要恢复地区稳定表象，势必采取更强硬手段，但这位领导人至今仍抗拒实施此类铁腕政策。倘若暴力持续升级，谁也无法预料阿拉伯民族运动政权将被迫采取何种极端手段来终结乱局。\n\n无论如何，有一点确凿无疑：意大利已丧失对黎凡特最后的影响力残余。上帝依然俯瞰圣城，却对子民的祈祷置若罔闻。"
 impurita.36.a:0 "祸不单行……"
 impurita.37.t:0 "解放"
 impurita.37.d:0 "乘着意大利战败的东风，在科伦坡恐怖统治的废墟中浴火重生，巴勒斯坦解放阵线终是登上了耶路撒冷的权力之巅。\n\n艾哈迈德·杰布里尔麾下的巴勒斯坦解放阵线发动了与科伦坡暴政相匹敌的长期恐袭战争，成功营造出足以发动血腥政变的紧张氛围——这场突袭犹如利刃斩首，彻底终结了意大利殖民政权。翌日，杰布里尔在少数支持者与士兵簇拥下发表简短演说：宣告巴勒斯坦终获解放，并将迎来净化洗礼。\n\n这位被狂热追随者奉为\"死亡天使\"的统治者，将阿拉伯民族的苦难锻造成高效的国家机器，致力于在国土层面践行巴勒斯坦解放阵线的核心使命。他的治国之道无关虚伪的颠覆性民主，唯有恐怖铁腕与民族荣光。\n\n每日都有屠杀与清洗行动的传闻，从耶路撒冷这座孤立隐士国的故土犹太区渗出。这个政权与外部世界的唯一交集，是雪片般飞向各国的冗长军火订单。枪械的狞笑淹没了惨叫，鲜血不仅浸透科伦坡与杰布里尔的双手，更沿着地脉渗透，玷污我们每个人的指尖。"
 impurita.37.a:0 "以眼还眼，天下皆盲。"
 impurita.38.t:0 "自由以色列"
 impurita.38.d:0 "今日传来消息……意大利在黎凡特败局已定。弗朗西斯科·科伦坡的血腥政权轰然崩塌。犹太政治光谱的边缘势力已凝聚在阿夫拉罕·斯特恩的激进组织周围——“以色列自由战士”，即莱希。\n\n成百上千份报告涌入罗马，描绘着数千阿拉伯与意大利难民因莱希掌权而逃离黎凡特的惨状。随着莱希战士的巷战逐渐瓦解意大利残存权威，耶路撒冷终告陷落。科伦坡的尸首被悬于旧官邸外曝尸三日。斯特恩上周颁布诏书重建“以色列王国”，这位黎凡特无可争议的新主宰宣称：两千年来施加于犹太民族的罪行，终将得以清算。\n\n埃及当局报告了远超承载极限的难民潮正涌出黎凡特——每个逃亡者都携着骇人听闻的故事。坐稳王座的斯特恩发动了对境内阿拉伯原住民与意大利殖民者的复仇清洗。意大利在该地区的力量与威信早已枯竭，对此唯有缄默。千万遗孀的恸哭声中，我们只能报以肃穆的静默。"
 impurita.38.a:0 "出埃及记反转了。"
 impurita.39.t:0 "伊尔贡在黎凡特获胜"
 impurita.39.d:0 "随着意大利从黎凡特地区仓促撤离留下的权力真空被填补，梅纳赫姆·贝京领导的伊尔贡组织已确立该地区的支配地位，可被视为前意大利中东领地的唯一掌权者。在科隆博将军短暂却极具破坏性的统治激化下，这支犹太复国主义准军事组织已明确转向右翼极端路线。\n\n伊尔贡实际施行威权独裁统治，其镇压政策正引发阿拉伯人向埃及与沙特阿拉伯的大规模移民潮。贝京的集权政权公开宣称要建立横跨西奈半岛与外约旦的犹太国家，拒绝与阿拉伯组织妥协谈判，并正迅速推行针对非犹太少数族裔的隔离制度，同时在境内强制实施犹太人定居计划。\n\n以色列领土上已涌现坚决的阿拉伯抵抗运动迹象。随着耶路撒冷持续推行压制阿拉伯民族主义的政策，这些抵抗力量只会愈发壮大。贝京本人对巴勒斯坦阿拉伯人采取愈发强硬的好战立场，宣称：\n\n“整个以色列都将回归以色列人民。每一寸土地。”"
 impurita.39.a:0 "直到永远。"
 impurita.40.t:0 "黎凡特的统一战线？"
 impurita.40.d:0 "经过一系列紧张的谈判、妥协与激烈辩论，犹太抵抗运动作为所有主要及部分次要犹太政党和组织的联盟正式成立。随着意大利撤离与阿拉伯政治力量的分裂，组建犹太组织联合阵线被视为获取合法性及组织度的必要手段，以确保在黎凡特建立犹太国家。\n\n尽管被指责具有高度威权倾向且偏向政治极端光谱，犹太抵抗运动仍成功团结犹太民众抵御被逐出黎凡特的威胁，并在地区政治中取得强势地位——几乎完全掌控这片土地以建立新以色列国。\n\n时间将验证这个联盟如何应对日益增长的阿拉伯抵抗与内部张力。当前强硬民族主义者与坚定民主人士被迫在犹太抵抗运动框架下合作共事。然而，即便采取的手段给这片土地留下累累伤痕（其中许多至今仍在流血），黎凡特犹太群体取得的成就依然令人瞩目。"
 impurita.40.a:0 "一人拾柴火不旺……"
 ITAENI.1.t:0 "铁腕征轭"
 ITAENI.1.d:0 "热浪裹挟着沙粒扑向迪拜港码头时，朱塞佩·奥里亚纳上将感觉如千斤重负压于胸间，却仍将脊梁挺得笔直。他早已知晓，纪律是成就一切伟业的首要法则。他的晋升之路堪称典范：从皇家海军基层一路擢升为第四舰队司令，直至更高位阶。但平心而论，他不知能否将此次最新任命视作荣勋。\n\n这份波斯湾的差事据传被埃尼集团的官僚们垂涎已久，连他自己接到调令时都颇感意外——虽说早该料到。随着安卡拉方面攻势加剧，中东力量平衡已剧烈倾斜，意大利的权威亟需以铁腕重塑不容置疑。在他的强硬掌控下，迪拜将成为帝国威权的海上铆钉。他曾以舰炮效忠祖国，如今则须用公文续写忠诚：纪律与奉献，从无二致。\n\n整日的会议旋涡吞噬了朱塞佩·奥里亚纳：与酋长们的虚礼周旋，同埃尼集团的锱铢必较，向海军部的述职陈情。他不耐前者繁文缛节，厌恶后者铜臭算计，却在自家军部也如异客疏离。虽自认非斡旋之材，这位上将却深谙各方所欲所求，更明晓如何驱策其为己所用。临近午夜方得片刻喘息，他斟满酒杯，开始向罗马政府草拟首份正式报告。"
 ITAENI.1.a:0 "秩序与进步"
 ITAENI.2.t:0 "内柔"
 ITAENI.2.d:0 "恩里科·马泰穿梭于密集日程间的姿态，犹如跳着塔兰泰拉舞的诗人——毕竟这里是他主场。迪拜这座埃尼集团的新兴能源首都，他可是最早洞察这座港口城市潜力的先知。马太伊觊觎该省总督之位多年，而今日终得以迪拜伯爵之名签署文件，不再只是“埃尼主席”。\n\n那些酋长们固然古板，却意外地易受摆布，甚至让这位素以冷峻著称的谈判家都觉出几分可亲。埃尼的董事会议不过是橡皮图章例行公事，连海军部都对这位总督雷厉风行的作风报以困惑的赞许。周旋于三方势力间的马太伊深谙话术精髓，总能让每个派系都听到想听的承诺：土著将重获更多权利，迪拜项目终将突破规划蓝图，皇家海军必成苏伊士以东的绝对主宰。最妙的是，他确信这些愿景皆可用资本与手腕化为现实。\n\n从埃尼大厦的顶层办公室迁至港口旁灰扑扑的行政哨站不过举手之劳，他甚至在逼仄的新办公室里维持住了米兰式优雅。唯一让他怅然若失的，是再也无法透过落地窗凝望波斯湾的粼粼波光。此刻他任由收音机流淌出西西里民谣，提笔给罗马的领袖写贺信——盛赞其遴选总督的独到品味。"
 ITAENI.2.a:0 "大漠孤珠"
 ita_66_gov_established:0 "1966届政府已正式成立。"
 POLITICS_GIORGIO_ALMIRANTE_DESC:0 "在齐亚诺的统治期间，整个帝国分为了两个阵营：一派支持改革，他们代表着一切不确定性与希望；另一派则是反对改革的无数政客、官僚和法西斯狂热分子。每个人都必须选择自己的立场，要么支持法西斯主义，要么反对它；要么支持齐亚诺，要么反对他；要么选择未来，要么选择过去。没有第三条路可走。当齐亚诺在议会中发言时，乔治·阿尔米兰特和其他人一起鼓掌，献上他那不可动摇的忠诚。当卡洛·斯科尔扎批判法西斯体制的领袖时，阿尔米兰特公开表示有必要保护帝国不受其领导人的伤害。在维罗纳，阿尔米兰特的名字出现在每一份把齐亚诺赶下台的阴谋计划书中——在那之后，他还发誓要完成末代领袖未竟的工作。\n\n现在，意大利再次充满了混乱与不确定性。在这种时候，人们应该向谁求助呢？就像以前一样，他们转向了那些可以保护自己的人，向他们许诺和平与面包的人——他们转向了阿尔米兰特。他和蔼可亲，心地善良，富有绅士风度，并将自己塑造为一个与法西斯主义煽动者相去甚远的形象——促进团结和秩序，反对分裂和冲突，安抚痛苦的意大利民众。\n\n没有谁能料到国民联盟的胜利会来得如此之快，但阿尔米兰特向人们展示了这么一个政党，它现在虽然尊重民主，但仍会为自己所代表的一切而全力以赴。但他所代表的究竟意味着什么，从来都不甚清晰。他承诺将继承齐亚诺与墨索里尼的遗志，尽管他看上去无法同时做到这两点。现在他和他的党派掌握了意大利，国内外的人们都开始思考同一个问题：阿尔米兰特是会带领意大利新的民主制度走向伟大，还是将其扼杀在摇篮里？"
 POLITICS_PIETRO_NENNI_DESC:0 "彼得罗·南尼的人生，比起意大利左翼的新领袖、王国新首相的身份，更像是冒险小说的主人公。南尼出身工人阶级家庭，早年就投身左翼政治，他曾与一名叫做贝尼托·墨索里尼的年轻社会主义者关系匪浅，他们还曾蹲过同一间牢房。一战爆发，他自愿当兵上了前线，然后加入了法西斯运动，而当他感觉到运动即将转向黑色后，他迅速退出了。他的政治信念愈发坚定，在进军罗马的前一年，他终于加入了意大利社会党。\n\n南尼在意大利社会党中日益位高权重，但他无力反对新政权，于1926年离开了意大利。他没有停下脚步，他在国外维护反现政权的意大利异议人士和左翼分子的网络，发挥了至关重要的作用，也在数年间令社会党吸收了许多其他的左翼党派。同时，他在西班牙内战中为共和国而战，因而数次入狱，他的一名女儿死在奥斯维辛集中营，而他也差点落入纳粹之手（很可能是他的老朋友墨索里尼救了他）。最后，他回到了意大利，见证了法西斯主义的谢幕。\n\n南尼不知疲倦地把国内许多分散的左翼势力组织成一个比较有凝聚力的组织——民主阵线，紧接着，他带着民主阵线赢得了选举。他对意大利农民与工人许下的许多诺言一定会以某种方式履行——但只有时间能告诉我们，南尼，这位意大利社会主义的炽烈煽动者，能够走到什么地步，并在最后，为长期受到压迫的意大利人民伸张正义。"
 POLITICS_ALDO_MORO_DESC:0 "许多人都认为，阿尔多·莫罗掌权之路反映了意大利从法西斯主义走向民主的历程。莫罗出生在意大利南部的一个小镇上，在大学学习法律期间他开始进入天主教学生组织。作为一名出色的学生，他成为了意大利天主教大学学生联合会的主席，之后在二战期间被征召入伍成为步兵军官。战争结束后，莫罗迈出了他政治生涯的第一步。\n\n墨索里尼政权从未完全控制过天主教会，因此，在法西斯时代，天主教游说团体和压力团体一直存在。随着齐亚诺的民主化进程逐步进展，这些游说团体和压力团体成为了基督教民主党与阿尔多·莫罗的基石，他们在形成这个为意大利争取她所需变革的统一的、天主教的与自由主义的阵线中发挥了关键作用。莫罗言语温和、彬彬有礼、举止得当、乐于对话，迅速成为意大利民主崛起的象征之一，也因此被基民党选举为竞选首相的候选人。\n\n随着基民党的胜利，莫罗和他的盟友可以自由地制定改革计划了——没有太多无谓的忙乱和花言巧语，莫罗以温和、礼貌和开放的妥协态度承诺将会带来经济繁荣，稳定，以及强大和公平的民主制度。虽然在基民党内已经出现了一些分歧，更倾向天主教的派别与更自由主义的派别有些冲突，但为了反对红黑两派的激进主义，基民党将团结一致，最终将意大利领出黑暗，带入光明。在困难时期，信仰总是靠得住的，也许在上帝的些许帮助下，莫罗希望中那个自由、和平与繁荣的意大利终会成为现实。"
 POLITICS_CARLO_SCORZA_DESC:0 "卡洛·斯科尔扎在很久之前就在历史性的进军罗马事件当中作为墨索里尼的追随者开启了他作为意大利国家法西斯党员的生涯。他通过展现自己的忠诚与政治能力在党内平步青云，最终于1943年成为了秘书长。自那之后他就没有走下过这个位置，并且在这20年中进一步强化了不断延伸的政治纽带与联盟。齐亚诺成为了法西斯主义在意大利的代言人，窃据了聚光灯下的位置，斯科尔扎则继续潜伏于阴影之中，准备夺回一切属于他的东西。\n\n许多人将在维罗纳发生的事情称为“政变”，但对于斯科尔扎和他的手下来说并非如此。他只是修复了法西斯机器的失灵部分：只不过，他需要修复的是领袖之位被加莱亚佐·齐亚诺这么一个没有脊梁的软蛋所占据的事实。这个软蛋正要坐在他的官位上出卖自己的国家来换取所谓的“民主”和美元。意大利，一个由法西斯主义革命锻造而成的国家，绝不允许这种事发生，而斯科尔扎就任领袖仅仅是为国家履行职责罢了。\n\n这只是第一步：为了让法西斯主义变得更完美，许多东西都需要被修复、回炉并提高效率。斯科尔扎承诺他将巩固党对国家的完全统治，然后是国家对地中海的完全统治：人们因他重新点燃法西斯主义革命之火的承诺而聚集在他的身边。领袖做出了许多承诺，但是很难说他能兑现多少。国际观察者都对新领袖上任表示担忧，并对意大利抛弃了齐亚诺的自由化诺言表示失望：只有时间才能告诉人们，斯科尔扎，如果能的话，将在何种程度上成功为这个法西斯国家带来新生，以及这对欧洲和世界来说意味着什么。"
 POLITICS_Edgardo_Sogno_DESC:0 ""
 POLITICS_ROBERTO_FARINACCI_DESC:0 "有趣的犹太人"
 POLITICS_Council_of_Fascism_DESC:0 ""
 POLITICS_Augusto_De_Marsanich_DESC:0 "在国民联盟众多以“墨索里尼时代遗老”自诩的政客中，罕有人能与德·马尔萨尼奇数十载的宦海沉浮比肩。自1920年代跻身议会以来，此人于二战前、战时及战后把持过众多要职——当领袖陨落、新主登基之际，马尔萨尼奇即刻宣誓效忠，为其政治工程摇旗呐喊。这位政坛豺狼深谙时移世易之理，执着于旧日符号与陈腐口号毫无意义——权力只向机敏者屈膝。\n\n多年来，马尔萨尼奇如同毒蛛般将国家法西斯党残部与其他右翼团体编织成国民联盟的巨网，而阿尔米兰特不过充当着新政党的门面。然则朱利亚谷惨案与热秋动荡使国民联盟濒临分崩离析，马尔萨尼奇毕生心血几近付诸东流。阿尔米兰特不得不退场，政党亟需转向——一套更擅用规则击溃基督教民主党与民主阵线的新策略。此时，唯有国民联盟的灰色主教马尔萨尼奇堪当此任。\n\n马尔萨尼奇以“重振法纪、终结赤祸”为饵，精准刺入意大利民众最肮脏的神经末梢——恐惧。通过勾勒国家危如累卵的骇人图景，他最终当选首相，誓言“捍卫意大利民主免遭其自身侵蚀”——好一位民之喉舌、道德卫士，更是至臻的爱国圣徒。马尔萨尼奇确实身兼上述特质，但究竟如何将意大利从自我毁灭中“拯救”出来？这场荒诞剧的终章尚未揭晓。"
 POLITICS_Amintore_Fanfani_DESC:0 "一千个人心目中就会有一千个阿明托雷·范范尼，但所有人都会承认一点，对于矛盾重重的基民党而言，没人比范范尼他更能体现出党的灵魂。范范尼出身贫寒，随后以聪明的学生和经济学教授而闻名于众，另一方面，他也以坚定的法西斯主义支持者著称。作为一名虔诚的天主教徒，他当时把全部时间、精力投入到了弥合教会社会教义与法西斯政权之间鸿沟的工作中，他甚至署名支持1938年《种族宣言》以及同期的其他种族主义法律。\n\n一年年过去，范范尼对法西斯主义的幻想走向幻灭，他转向并逐渐投入了齐亚诺及其政治自由化的怀抱。他是基民党的主要缔造者之一，并最终成为了党内进步潮流的一员。投机、精明且狡诈，范范尼在政治上惯用故弄玄虚的技巧，他是一名精妙的协商者。在“火热之秋”的危机之后，范范尼无疑成为了基民党最佳的代言人。\n\n随着基民党在选举中获得胜利，现在范范尼可以在阳光下玩继续他政治的游戏了。明面上，他呼吁缓和与进步主义，建立一个公平与人道的社会，而私下里，这位首相明白，如果没有了自己的勉力维持，那意大利早就陷入全面崩溃了。别人都说妥协是一种缺陷，而基民党的头羊范范尼却把这当做他的王牌。唯一能够控制意大利政治的就是基民党的政治机器，各种左与右的反对党们都将认识到，想要在这纸牌屋中继续活下去，就只能向范范尼的愿景低头。一位新的指挥已经登上了意大利政治舞台，无论如何，他要确保让整个乐队在他的调子下进行演奏。"
 POLITICS_Giuseppe_Saragat_DESC:0 "朱塞佩·萨拉盖特这个名字，对于几个月前的多数意大利人来说，仍只是民主阵线中众多的政客之一。萨拉盖特出身于一户都灵的中产阶级家庭，他与南尼煽动性的领导几乎完全相反，尽管当时两人有许多共同之处——都在法西斯时代遭流放、都踏着意大利的灰烬归来参与重建。而当南尼为民主的社会主义而进行着他的战斗时，萨拉盖特却轻而易举地把民主阵线中的温和派团结到了自己身边。\n\n法西斯时代终结后，人们需要的是一位改革者，一位彻底与过去决裂的人，就是说，一位南尼这样的领袖。而现在情况已经变了，意大利的民主已经受到了全方位的威胁。火热之秋的混乱与近来极端恐怖主义的浪潮已经动摇了许多人的道德心，并且随着所有政治派别对温和与和平的呼声不断高涨，萨拉盖特成为了左派中彬彬有礼、慈眉善目的完美候选人。\n\n通过吸引温和派与中派，萨拉盖特得以将自己描绘为和平与和解的候选人——这正是意大利民众所希望的。尽管如此，许多人，特别是在他自己党内，对新首相感到不满。萨拉盖特与基民党的联盟使得其与民主阵线内部日益激进的派别变得疏远，并且尽管他许下了那么多承诺，意大利街头的暴力并没有停止的迹象，反而在本周内逐渐升级。当一切事物似乎都在四分五裂时，呼吁和平和民主的价值观需要勇气——而萨拉盖特坚决反对极端主义和流血冲突的决心，可能是能挽救意大利年轻的民主、避免其早夭的唯一方式。"
 POLITICS_ENR_MATTEI_DESC:0 "早在加冕海湾总督之前，恩里科·马泰已是帝国权力金字塔顶端的暗影君主。这个以鄙夷政治与冷对法西斯狂热著称的实业家，毕生只痴迷于一门“生意”——从微末起身，他迅速攀入国家石油公司阿吉普公司，在战争落幕之际登顶掌门。然马泰伊的饕餮野心远未餍足。\n\n随着战时帝国版图暴胀，黑色黄金的汪洋尽在掌控。新大陆需要新法则：新技术、新组织、新贸易协定——更多油井、更多炼厂、更多劳工、更多金钱、更多石油。阿吉普公司在马泰操盘下膨胀畸变，最终蜕变为能与日本财阀角力的工业金融巨兽埃尼集团。坐镇海湾新总部，这位石油沙皇凝视着自己亲手哺育的怪物帝国，将迪拜计划雕琢成王冠明珠——这座沙漠中的幻光之城，始于法西斯殖民主义的玩物，终成马泰石油王朝的加冕圣殿。\n\n意大利击溃土耳其后，马泰再度攫权，推动自己获封海湾总督。当“石油之王”的统治被正式加冕，其改革蓝图已化为现实：他既将当地酋长纳入殖民政府，又与沙特维系着谨慎友谊（这点常被反对者诟病）。迪拜如今是马泰掌中玩物，赋予其野心全新的暴力工具——毕竟埃尼集团的繁荣即意大利的繁荣，此刻那六足犬徽记喷吐的烈焰，正燃得比任何时候都更灼目。"
 POLITICS_GG_ORIANA_DESC:0 "在皇家海军乃至整个意大利，朱塞佩·奥里亚纳被视作军人楷模与绅士典范——这份殊荣为他招致钦慕与嫉恨交织的注目礼。二战期间，这位海军上尉以赫赫战功在地中海战场剑指长空，随舰队旗舰劈波斩浪，终在战后擢升海军上将。\n\n他以高效统帅风格与航海技艺革新闻名，却因是直言不讳的法西斯主义批判者为高层所不容。最终，罗马为这位“麻烦制造者”觅得绝佳流放地——波斯湾。执掌皇家海军第四分舰队期间，奥里亚纳上将铁腕荡寇，令海湾航道重归繁荣，迪拜计划得以续写篇章。\n\n然命运急转直下。意大利对土耳其战事的溃败如陨石坠海，中东政局顿生惊涛。当地方酋长日益抗拒罗马轭鞭、转而投效利雅得之时，奥里亚纳临危受封海湾总督——毕竟其麾下第四舰队已是维系秩序的最后铁锚。随着迪拜计划沦为断壁残垣，上将不得不不择手段维系秩序，并很快意识到酋长们暴虐而琐碎的统治才是最大路障。纵然沙漠风暴迫在眉睫，奥里亚纳上将仍决意孤身迎战。即便万事皆休，这位新晋总督也深谙：舰长职责包括与座舰共沉。"
 POLITICS_gwb_desc:0 "朝气蓬勃的日本帝国天降伟人，出生并成长于此的老布什已成为日本帝国史上最牛的领导人。昭和天皇钦定乔治·布什领导国家，他的目标是，让日本帝国成为全社会平等、繁荣的国家，同时击败美帝国主义，并确保当一切结束时\n\n\n日本伫立世界之巅！"
 POLITICS_ACHILLE_LAURO_DESC:0 "“司令官”，在劳罗的支持者心中是尊崇与赞誉的化身；在反对者眼中，却成了讽刺与嘲笑的对象，一个自命不凡的头衔，一个名不副实的称号。不论外界如何评说他，在那不勒斯，人们都满怀敬意地称他为“劳罗市长”。他深受百姓爱戴，亦不乏有人对他嗤之以鼻。但不论如何，阿基莱·劳罗现已成为新生的意大利的第二任首相。\n\n身为劳罗航运公司的掌舵人，他为那不勒斯的众多市民提供了饭碗，他发现他可以轻而易举地将自己的商业帝国转化为为他所用的政治力量。与齐亚诺家族的深厚友谊更是为他的政治生涯锦上添花。尽管腰缠万贯，他作为那不勒斯足球队的主席，却始终心系民众，推动了众多利民的公共福利项目，为贫困者提供了安身之所，为失业者创造了就业机会，赢得了民众的喜爱。\n\n思想上，劳罗是个充满矛盾的人物。与党内其他人士不同，他对意大利的民主制度忠贞不渝，这让他与国民联盟内的法西斯残余势力向来水火不容。他的内心向往君主制，与翁贝托二世关系密切。回顾他作为那不勒斯市长的岁月，劳罗一直推崇民粹主义的经济和社会改革，誓言要铲除意大利的无政府主义和共产主义残余，同时提出改善普通工人生活的替代经济政策。劳罗现在面临着艰巨的任务，意大利的辉煌或许指日可待，但这需要他坚定的领导和钢铁般的意志。在这位“司令官”的引领下，国家的航船必将乘风破浪，稳健前行。"
 POLITICS_Theodor_HoffmannL_DESC:0 "特奥多尔· 霍夫曼，你是名一般通过德国海军司令。或者说，曾经是。定格，瞧瞧这个肖像。凝视他的双眼。\n\n是的，我就是特奥多尔· 霍夫曼曼。你可能想知道我是如何陷入这般境地，为游戏中的所有领导者写传记，现在却沦为令人憎恶的反人类组织领导者。实际上，我看起来可能比实际年龄大了点。\n\n真的，说来话长。There I was, kicking it back and chillaxing as us in the Volksmarine called getting some babe and going out for 'reading theory and chill' as the boys said. It was a real tight gig I had, chilling out, maxing, relaxing all cool. We'd then play some bball out by the Soviet Naval War Academy in Leningrad. So anyway, I'm chilling with a hot babe, like total 10/10 Lithuanian girl named Lina who was totally groupieing us hardcore sailors, when BAM! Time vortex, shot me out here and Lina probably in the Ice Age or something.\n\nSo anyway, here I am in Leningrad, 'cept it ain't really Leningrad, it's some new name and everyone looks real angry. I played off the time vortex as a totally bitchin' light show and pretended to know what was happening. Next thing I know they got me leading a fleet, give me another minute and suddenly Herr Bromann as I call him (dude can shotgun a mad pre-pee if you know what I'm saying) is like \"Broham fist me,\" (it's what we called fist bumps we were tight) \"I got a sweet ass gig for you.\"\n\nAnd now here I am. I like to chillax and write up some bits about all the weirdos around here, and I gotta be straight I got no real clue what's going on, but damn if owning all the tightest beaches in Europe isn't landing me some sweet cookie."
 POLITICS_UMBERTO_II_DESC:0 "在前领袖放弃了自己的衣钵，推翻法西斯政权后，意大利需要一只稳定而令人放心的手来引导它走向民主。翁贝托二世国王正是正如此做：这位君主以其冷静温和的举止深受民众喜爱，并受到武装部队高层的狂热服从，以坚定支持民主而闻名。\n\n随着法西斯主义的余烬渐冷，意大利正在为准备选举，国王也已任命临时内阁来监督国家，直到那决定命运的日子来临。尽管翁贝托二世明显倾向于基督教民主党温和派，但他克制住对民主进程的任何不当干预，并热切期待能够任命获胜者为首相，并最终回到他认为任何国王或王后都只该履行礼仪角色的那一刻。\n\n嘛，毕竟你的国王命你自由，你若不从，还能咋办？"
 ITA_Cd_ofn_trade:0 "OFN贸易联系"
 ITA_asian_diplomacy_cd:0 "亚洲外交"
 ita_the_pride_of_italy:0 "意大利的荣耀"
 ita_the_pride_of_italy_desc:0 "Italy is a modern nation, a democratic nation, and one possessed of proper patriotic pride. The BN's victory in our country's first democratic election has proven our people's martial spirit, and their commitment to an Italy that stands shoulder to shoulder with the great powers of the world, and faces them as an equal.\nBut to do this, we must first have a military worthy of a great nation. Thankfully, with just a few small improvements, the Regio Escrito will serve to take our national spirit into the future. Having performed admirably in the Second World War, and since battle-hardened by our long conflicts to maintain our grip on the Italosphere, Italy's military is truly the pride of the fatherland."
 ita_professionalism_is_key:0 "Professionalism Is Key"
 ita_professionalism_is_key_desc:0 "Although the consensus within the BN is that the Fascist era was (mostly) a markedly positive experience for the nation as a whole, it must be admitted that it brought with it a minor decline in the professionalism of the Regio Escrito. The PNF much preferred to focus on strengthening and expanding the MSVN over the questionably loyal military, and often maintained its grip on its monopoly of force via less savory economic means.\n\nHowever, just as great Ciano brought the Italian state into the post-war era, we shall continue his legacy by bringing Italy and its army into the future. No longer will soldiers lounge indolently around their barracks, no longer will they bedeck themselves in jewelry stolen from foreign lands. Italy's new military will be well equipped, well clothed, and the envy of nations the world over."
 ita_increase_training_standards:0 "提高训练标志"
 ita_increase_training_standards_desc:0 "In days of old, any man could be a soldier. With a gun, a head full of propaganda, and a little encouragement, even a peasant scooped from the fields of Milan a couple weeks earlier could serve admirably in any of our frontlines across Europe and the Middle East.\n\nUnfortunately, it's a different world now. The conflicts of the modern, require a flexible, mobile, well-trained infantry capable of maintaining order and squashing partisans in equal measure. In order to make sure that Italy is prepared for this reality, our government has ordered a military-wide increase in training standards. Next time the enemies of Italy dare to challenge our supremacy, they will be faced not with the corrupt inefficient conscript army of old, but a fully operational modern military force."
 ita_assessment_and_testing:0 "评估与测试"
 ita_assessment_and_testing_desc:0 "为确保意军能应对任何军事行动需求，政府已启动秘密突击检查与校准测试计划。我们将确保每支枪械严丝合缝地组装，每位士兵的敬礼姿势与军规手册分毫不差，每粒制服纽扣都完美符合规范。\n\n军官或会抱怨此举侵犯其权威，士兵或许嘲笑半吊子官僚指手画脚，但最终受益的必是国家与将士。当然，若受检者问心无愧，又何惧之有？"
 ita_find_the_motivated:0 "Find the Motivated"
 ita_find_the_motivated_desc:0 "Although Italy's army is by no means small, and the sphere of nations in which it serves vast, our nation has struggled to find proper recruits to replace those who are killed or wounded serving their country. More particularly, we're struggling to find volunteers who see military service as a sacred duty, and not just a means to make a quick buck or an outlet for vicious desires.\n\nRectifying this issue won't be easy -- the lines at military kiosks grow ever shorter, and the number of body bags returning from the colonies has a tendency to dissuade even the most fervent of recruits. However, with a wide-scale propaganda campaign, we have no doubt there'll be more soldiers than uniforms to clothe them or guns to arm them with in no time! Which might be another problem we need to address."
 ita_find_the_skilled:0 "选拔能人"
 ita_find_the_skilled_desc:0 "As part of our heroic quest to transform the Italian government's limited budget into the most effective military possible for our...unique... military and diplomatic position, we've taken a closer look at our current training regime.\n\nAlthough the average soldier which leaves our training battery is certainly an effective soul, this result is obtained only by discarding most of those inferior recruits who join to escape poverty (or other, darker reasons). In order to transform the Regio Escrito into a military truly worthy of Rome, we must find those who are truly possessed of a fighting spirit, and meet rigorous requirements for mental and physical fitness before hand. They will not be easy to find, but within crooked alleyways and ramshackle hovels, we will find them nonetheless, these sons of the New Italy, our diamonds in the rough."
 ita_volunteers_for_italy:0 "Volunteers For Italy"
 ita_volunteers_for_italy_desc:0 "The victory of the BN in Italy's recent elections has reinvigorated, at least to some extent, our nation's flagging national spirit. Once more one hears the national anthem sung not just on national festivals, but every day. Once more the streets are festooned with the tricolor, and buildings with the portraits of the three heroes, Mussolini, Ciano, and Almirante.\n\nHowever admirable, this patriotic zeitgeist does us no good unless we make use of it. Our government will begin a program of promotion for the military, especially the recently expanded special departments. The airwaves, radios, and billboards will be blanketed with the sounds and sights of brave young men in uniform, valiantly defending their homeland. Naturally we will make an equal effort to prevent those scum-like journalists who seem to have no other purpose than to denigrate their nation producing any more of their accursed \"investigative journalism\" and \"award winning\" pictures of body bags."
 ita_a_special_force:0 "特种部队"
 ita_a_special_force_desc:0 "意大利军队正日益现代化。曾经士气低落的新兵部队，如今已蜕变为真正的职业化劲旅，装备水平（尽管规模仍不及）可与世界列强比肩。\n\n作为下一步规划，政府已启动“特种部队”组建计划，从各部队精选精锐组成。尽管原部队指挥官强烈抗议，但我们需要的是能同时在巴尔干多线作战、既能赢得战场又能赢得民心、配得上意大利荣光的军队。"
 ita_revive_the_adra:0 "Revive the Adra"
 ita_revive_the_adra_desc:0 "Compared to the enormous armies (and relentless propaganda campaigns) of the great powers, Italy has always struggled to get its fair share of credit for its accomplishments in World War 2. But although the American, German, and Japanese historians might scoff even at the world of brave Balbo or the brave fanaticism of the MSVN, even they can't help but acknowledge the incomparable might of the Adra.\n\nOfficially the Royal Air Force Brave Destroyers, the ADRA are a force that rules the ground and skies alike, bringing death and destruction to all of Italy's foes. With the ADRA on the field, no enemy bridge was left standing, no airfield intact. Though the force has faded somewhat in the years since the war, we will revive it once more, to strike fear into the hearts of our enemies."
 ita_modernize_the_alpini:0 "现代化阿尔卑斯军团"
 ita_modernize_the_alpini_desc:0 "The Alps are Italy's natural border, and our first line of defence against the Reich should things come down to that. Just as Hannibal lost half his army (and all his elephants save for one) trying to cross our ancient mountains, even the most advanced panzer will concede before its icy peaks and steep ravines! Mountain warfare provides unique challenges and opportunity, and it's the only situation where infantry still holds the upper hand: with no armoured forces, only a fraction of air support, and only light artillery - often still horse-mounted since not even trucks can climb such inclination - capable of providing any help, it's a priority that we train our mountain troops to the highest degree.\n\nLuckily, our Alpini are among the best mountain infantry in the world! Tested in fire and blood, on the Alps during the First World war, and in icy Russia during the Second, they still serve with pride and loyalty. With an increase in funding, we will make sure that they are one step ahead of our enemies: all will fear the Black Feathers!"
 ita_no_men_like_the_frogmen:0 "没人喜欢蛙人"
 ita_no_men_like_the_frogmen_desc:0 "With Mare Nostrum under our full control, we are able to strike quicky across the Mediterranean countries. From the Iberian Peninsula to Crimea and Egypt, the Regia Marina can easily support amphibious landings across our waters, but these are extremely dangerous operations, with our men exposed to enemy fire until they reach safe positions on land: despite our navy's support, hundreds, if not thousands of men can die before even being able to see their enemy's face!\n\nAs such, we need to grant proper funding and training to our frogmen: with modern protected boats and amphibious vehicles, they will suffer far less casualties in the landing phase, and with superior training and personal weaponry, they'll be able to quickly overwhelm the enemy, granting us a swift victory, and fewer names to inscribe on monuments. A living hero is always better than a dead martyr!"
 ita_no_trooper_like_the_paratrooper:0 "No Trooper Like the Paratrooper"
 ita_no_trooper_like_the_paratrooper_desc:0 "由航空先驱伊塔洛·巴尔博创立，以航空载具和空中运输的最新技术成果为支撑，空军精英部队“空中步兵”是我们的最精锐的伞兵部队：从克里特岛围攻战到埃塞俄比亚救援行动，他们一次又一次地证明了他们的实力，表现出了无与伦比的勇气和奉献精神。\n\n除了作为一个强大的宣传工具，伞兵如果经过适当的训练和支持，也是一支拥有强大的打击力量的多面手部队：随着资金投入的增加，我们将为我们的士兵提供最好的运输机和更有效的支持，这样他们就不会在自杀式袭击中徒劳地牺牲。巴尔博一定会为我们感到自豪！"
 ita_all_terrain_armed_forces:0 "全地形武装力量"
 ita_all_terrain_armed_forces_desc:0 "我军常规部队的训练与装备或许略逊于精锐营，但这绝不意味他们是炮灰，或是任由装甲铁锤击打的铁砧！不！皇家陆军必须能在任何地形展开部署，不受天气地形阻碍，并与陆海空三军协同高效作战。\n\n通过研发坚固实用且适应性强的装备、进一步完善训练体系，并在大型部队编入当地向导与专家，我们定能确保在任何环境下达成最优战果。"
 ita_rule_italia_rule_the_seas:0 "意大利统治海洋"
 ita_rule_italia_rule_the_seas_desc:0 "With the disappearance of the British Royal Navy and the French Republican Navy, and the Kriegsmarine too busy protecting the Northern Sea, the Regia Marina is the undisputed ruler of the Mediterranean. We - and no one else - rule the waves that saw the great naval battles of history! We are the heirs of the Egadi and Atium, our ancestors having crossed blades with Carthage and Egypt, with Byzantines and Ottomans! Italians manned the cannons that broke the infidels at Lepanto, and led the great expeditions that revealed the unknown lands far from the Columns! Our fleet paraded on the Bosphorus in the Libyan War, bringing the Sultan to his knees!\n\nWith such history behind us, it's only right that we ensure an even better future lays ahead: the Regia Marina will receive all the founding it needs to prosper and become even more modern and powerful! We are not \"caged\" in the Mediterranean anymore: WE dictate the rules now..."
 ita_spice_up_the_indian_ocean_fleet:0 "Spice Up the Indian Ocean Fleet"
 ita_spice_up_the_indian_ocean_fleet_desc:0 "The Indian Ocean is the new frontier of our naval influence. Small escort flotillas patrol the waters of the Red Sea and the many Gulfs surrounding the Arabian Peninsula, protecting our oil tankers as they bring our black gold to Italy and beyond, but as the world situation rapidly worsens, they may no longer be sufficient.\n\nBy adding some cruisers to the Indian Ocean Fleet, we shall protect our oil convoys better than ever before, provide an indirect shield to our colonial garrisons across the Middle East, and eventually project a far larger amount of power even further than before, even to Iran and India itself!"
 ita_maximise_our_battleships:0 "战列舰最大化"
 ita_maximise_our_battleships_desc:0 "Our battleships are old and obsolete: after the successful Littorio class, no new hulls were laid, and with the great advances in naval technology, our four dreadnoughts, while modern and powerful for the times, are now rusting in the docks. If we want to have a modern and strong fleet, we need to invest money and resources on modern battleships, fast enough to not hinder the rest of the fleet, and armed with not only traditional cannons, but also more modern missile systems and AA batteries!\n\nIt's time for the heavy ships to take the sea once more..."
 ita_cruising_to_victory:0 "巡航致胜"
 ita_cruising_to_victory_desc:0 "战列舰虽是海洋无可争议的女王，巡洋舰方为舰队的中坚力量。凭借极强的多功能性，它们几乎能胜任任何作战角色：重型护航、轻型主力舰、突袭、巡逻——只要设计得当，巡洋舰无所不能！\n\n通过适当拨款，我们将从数量、技术、性能三方面强化巡洋舰部队，确保舰队兼备防护力、机动性与致命杀伤力。"
 ita_keep_calm_and_carrier_on:0 "保持冷静，继续前行"
 ita_keep_calm_and_carrier_on_desc:0 "During the last war, our initial lack of carriers led to heavy damages to many ships, hit by enemy naval bombers without any fighter to protect them. Under heavy pressure, we were forced to convert two civilian cruisers into our first carriers, the Aquila and the Sparviero: though the two ships still serve the Regia Marina with honour, it's evident that we need \"proper\" carriers if we want to face the other world powers on the same level.\n\nOf course, we will need suitable carrier planes, from fighters to naval bombers and close air support, to maximise the efficiency of our sea air support."
 ita_super_destroyers:0 "超级驱逐舰"
 ita_super_destroyers_desc:0 "Destroyers may seem small and humble, but in capable hands they can prove extremely dangerous. Small and nimble enough to avoid most incoming fire, and armed with lethal torpedoes or more modern missile systems, they can cause grievous wounds, and perhaps even sink, even the mightiest battleship. In battle, they also provide a mobile shield around the more powerful, but cumbersome, capital ships, preventing enemy destroyers from delivering their payload, and fending off enemy aircraft with powerful dual-purpose AA batteries.\n\nAs the power of air forces increase, it's vital, now more than ever before, that our destroyers follow the latest improvements in design and armaments, to protect our fleet from any threat, and strike swiftly and lethally against any ship so foolish to let them close in!"
 ita_mare_nostrum_once_more:0 "重拾我们的海"
 ita_mare_nostrum_once_more_desc:0 "With our efforts once more focused on our magnificent fleet, the waters surrounding our homeland, once prey of the Royal Navy or German submarines, are now an impregnable fortress, just like the Alps or the very walls of Rome! Even should our foe break through the Suez channel, their ships will join the thousands of hulls sunk by our ancestors once they face the Regia Marina!\n\nThe Mediterranean is Mare Nostrum once more, now in every sense of the word..."
 ita_convoy_escort_exercises:0 "护航演习"
 ita_convoy_escort_exercises_desc:0 "舰队主力虽以交战（并击溃）敌方舰队为要务，但护航任务亦是海军肩负的微妙重任。无论和平或战时，商船队皆面临海盗、潜艇或敌舰劫掠风险——粮食、军火、石油乃至士兵，都可能落入贪婪之手或沉入冰冷深海。穷途末路之敌甚至可能发动自杀式突袭，无视护航舰队直取商船以扩大战果。\n\n因此，舰长与将领必须严训官兵，使其能对任何威胁迅速反应，必要时以舰身为盾护佑船队！"
 ita_shore_up_the_radar_stations:0 "加固雷达站"
 ita_shore_up_the_radar_stations_desc:0 "With the threat of long-range missiles and submarine attacks to our ports now a reality, as the Germans showed with the V-2 and the U-Boat during the last war, it is of vital importance that we start building modern Radar stations on the coast. With their sensors ranging in the hundreds of kilometers, we can learn of enemy objects, both flying and submerged, well before they can cause damage, and react accordingly."
 ita_the_newest_in_torpedo_bombing:0 "The Newest In Torpedo Bombing"
 ita_the_newest_in_torpedo_bombing_desc:0 "Small enough to fit inside the smallest gunboat, and powerful enough to sink a battleship, torpedoes are perhaps the most lethal naval armament ever invented. With our experience in the field - the Regia Marina was, after all, the first to deploy torpedo boats, the \"Maiali\" - we shouldn't fall behind in the field, and strive to always improve our torpedoes.\n\nTaking from the best, such as the Japanese \"Long Lance\", we can ensure even our smallest ship is enough to send the enemy into a panic!"
 ita_look_into_the_air:0 "洞察天空"
 ita_look_into_the_air_desc:0 "The Regia Aeronautica has a grievous, but fundamental task: ensuring that our skies remain clear from enemy aircrafts, and providing support to our advancing armies. Should an enemy manage to achieve air supremacy over Italy, our cities would crumble under the bombs, our industry would cease to function, and our war effort would eventually grind to a halt as our army is no longer able to fight effectively, and our people is too exhausted to keep believing in victory.\n\nAs such, we must ensure our Air Force is always up to the task, as the consequences of failure are too dangerous to even consider..."
 ita_a_helping_hand_for_our_pilots:0 "援助飞行员之手"
 ita_a_helping_hand_for_our_pilots_desc:0 "皇家空军飞行员虽怀报国赤诚，却缺乏现代空战学说的训练。此非将士之过，实因长期受怯懦无能之辈掣肘，致意大利的雄鹰折翼。\n\n幸有国民联盟掌舵国家迈向辉煌未来，此弊病将迎刃而解。通过实施严苛的培训研习计划，我们必将锻造出媲美乃至超越任何敌国的空中精锐——既能捍卫领空，亦可向仇敌降下烈焰天罚。\n\n"
 ita_a_new_aa_program:0 "新防空计划"
 ita_a_new_aa_program_desc:0 "防空武器的演进必须与其打击目标保持同步。随着战机愈发迅捷灵巧，我们亟需升级瞄准系统——绝不能让子弹仅在空中划出优美弧线，徒留敌机驾驶员讥笑。此外，现代轰炸机已能翱翔于传统防空炮的侦测盲区，更遑论有效射击。为此，我们应资助研发自主制导导弹驱动的防空炮组，使其具备穿透云层、自动索敌歼敌的能力。"
 ita_rewards_for_results:0 "结果奖励"
 ita_rewards_for_results_desc:0 "While the common Italian aircrew is both loyal and capable, our ability to translate that into battlefield performance remains stymied by the antique doctrine and incentives that have long limited our military. Thanks to these foolish doctrines, rewards and promotions are based almost entirely on patronage and seniority rather than performance. This results in an airforce of old men and toadies, more interested in faking battle reports than actually fighting.\n\nWe will slash through these outdated ideas with vim and vigor, and replace them with a system of carefully calibrated rewards that assures that new ideas are actually incorporated into the Airforce, and the best pilots have the opportunity to spread their capabilities to others.\n\nSoon the rot will be purged, and the Italian nation will rule the skies of the Mediterranean as it does the sea and the land."
 ita_night_combat_training:0 "夜战训练"
 ita_night_combat_training_desc:0 "Fighting in the skies at night is a daunting task. As nothing but black surrounds the pilot, he can't even use the ground to orient himself, and the risk of being attacked by unseen aircraft is higher than during the day: the Russian \"Night Banshees\" exploited the darkness and the fact that their old planes were almost soundless to surprise the Germans, with lethal results...\n\nTherefore, our planes should be fitted with improved tracking equipment, to help the pilot spot and properly engage his target. Also, pilots need additional training in how to react to surprise attacks without breaking formation or risking to be shot by enemy AA."
 ita_safe_and_sound:0 "Safe and Sounds"
 ita_safe_and_sound_desc:0 "Although the performance of the Italian Air Force improving by the day (as measured by our new testing protocol), it is becoming increasingly apparent that one of the most pervasive problems in our airforce is the lack of proper safety protocols. Planes are often flown despite serious defects, and repair crews are poorly equipped and trained. This despicable state of affairs puts both our pilots, and the nation as a whole at risk. Unless these problems are immediately rectified, we risk losing what capable talent our nation does possess\n\nThankfully, the BN has always been committed to proper reform, and so we shall implement new standards and regulations to keep our Ace's doing what they do best. No more will the Italian airforce be known as a flier of shoddy and substandard planes, but rather as a fully capable modern force, able to stand up to any who would challenge it."
 ita_standardize_aa_emplacements:0 "Standardize AA Emplacements"
 ita_standardize_aa_emplacements_desc:0 "Throughout the years, we have devised and built several anti-aircraft weapon systems. While they are all useful at what they do, the excessive variety in weaponry and ammunition puts a strain on our logistics: therefore, we should creat a commission with the task of standardising our AA equipment and their emplacements. With better coordination, and a precise knowledge of what kind of weapons go against what aircraft, we will greatly increase our efficacy in fighting enemy incursions, and at the same time ease our supply lines and our quartermasters' job!"
 ita_approach_uncle_sam:0 "与山姆大叔接触"
 ita_approach_uncle_sam_desc:0 "尽管我国与美利坚的历史纠葛复杂——尤其不满其好管闲事的劣根性——但不得不承认他们在航空领域确有过人之处。\n\n无论美国人如何高谈“正宗民主”与“法西斯余孽”的论调，我们总比德意志野兽或日本祸患更堪结盟。只要让美国认清此现实，其必将协助我军现代化空中力量。\n\n毕竟，你我皆为雄鹰，同为罗马继承者：一为血脉嫡传，一为精神后裔。待美洲之主与地中海之主携手之日，世界必将在联合威势下战栗。"
 ita_bring_in_the_regia_marina:0 "重振皇家海军"
 ita_bring_in_the_regia_marina_desc:0 "纵观意大利三军，皇家海军无疑是民族骄傲，更是国家未来安危所系。若无皇家海军，轴心国早该在可憎英国人的威压下土崩瓦解，意大利至今仍将是潜能遭扼制的奴隶之邦。\n\n然而亚特兰特罗帕灾难，加之持续的经济与政治困境，导致皇家海军陷入可悲的停滞。钢铁巨舰在港口锈蚀，水兵们终日酗酒掷骰，战争遗孀目睹意大利的荣耀沦落至此，唯有以泪洗面。\n\n若不扭转此等悲剧境况，我们作为地中海主宰的前景将黯淡无光。所幸国民联盟已在政府中稳踞要津，“我们的海”必将重现荣光。我们将任命新军官肃清渎职腐败，重新调整预算重心，确保英勇将士获得真正所需的装备。\n\n很快，罗马将再度成为令人畏惧的海上强权。"
 ITA_ENI_exploitation:0 "国家碳化氢公司"
 ITA_ENI_exploitation_desc:0 "自20世纪30年代成立以来，国家碳化氢公司（埃尼集团）在恩里科·马泰的领导下，经过几十年的发展，最终从一家小小的国有企业成长为世界上最大的石油公司。作为国有企业，如今的埃尼集团是意大利帝国的经济基石，负责开采意大利势力范围内众多国家的大量石油储备。投资埃尼集团对保持石油供应和意大利经济的持续发展至关重要——然而，考虑到增加ENI业务所需的大量资源，应慎重考虑每次投资。\n\n在阿尔巴尼亚的影响：[Get.GetAlbania_ENI_desc_invest]\n在阿尔及利亚的影响：[Get.GetAlgeria_ENI_desc_invest]\n在克罗地亚的影响：[Get.GetCroatia_ENI_desc_invest]\n在东非的影响：[Get.GetEastAfrica_ENI_desc_invest]\n在埃及的影响：[Get.GetEgypt_ENI_desc_invest]\n在希腊的影响：[Get.GetGreece_ENI_desc_invest]\n在伊拉克的影响：[Get.GetIraq_ENI_desc_invest]\n在意大利的影响：[Get.GetItaly_ENI_desc_invest]\n在科威特的影响：[Get.GetKuwait_ENI_desc_invest]\n在利比亚的影响：[Get.GetLibya_ENI_desc_invest]\n在北苏丹的影响：[Get.GetNorth_Sudan_ENI_desc_invest]\n在阿曼的影响：[Get.GetOman_ENI_desc_invest]\n在巴勒斯坦的影响：[Get.GetPalestine_ENI_desc_invest]\n在波斯湾的影响：[Get.GetPersian_Gulf_ENI_desc_invest]\n在南苏丹的影响：[Get.GetSouth_Sudan_ENI_desc_invest]\n在外约旦的影响：[Get.GetTransjordan_ENI_desc_invest]\n在突尼斯的影响：[Get.GetTunisia_ENI_desc_invest]\n在也门的影响：[Get.GetYemen_ENI_desc_invest]"
