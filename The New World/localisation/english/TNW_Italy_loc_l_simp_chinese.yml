 ITA_goring_great_game_category_desc:0 "日耳曼人正对我们巴尔干盟邦虎视眈眈。他们盘算着这些国家多半是唾手可得的熟果，认定我们会坐视其狼子野心而不施援手。然则我们耗费海量资源才在此地建立影响力，岂容德国佬跳着华尔兹闯入为所欲为！凡我盟友若遭燃眉之危，当机立断施以援手！"
