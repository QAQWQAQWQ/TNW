 ita_best_of_enemies:0 "最佳敌人"
 ita_best_of_enemies_desc:0 "早在二战前，意大利武装力量便分为了支持国王维托里奥·埃马努埃莱的保皇派，以及支持墨索里尼的法西斯派。随着战争的结束，两派之间的关系日益紧绷，保皇派越来越青睐于齐亚诺与他的改革观点，而法西斯派则更青睐于卡洛·斯科尔扎。两派分别集结在影响力不俗的外交官、前意大利皇家陆军军官埃德加多·索尼奥以及传奇的第十突击艇队指挥官朱尼奥·瓦莱里奥·博尔盖塞两人的麾下。§R根据意大利选择的道路，如果让敌对派系掌控武装力量将会导致灾难性的后果…§!\n\n[Root.BoEArmy]\n\n[Root.BoENavy]\n\n[Root.BoEAirForce]\n\n[Root.BoEBlackShirts]\n\n[Root.BoECarabinieri]"
