 ITA_campioni_west_shield:0 "西方之盾"
 ITA_campioni_west_shield_desc:0 "经过数载的磨砺，我们的军队已经练就了在阿尔及利亚的沙漠、地中海乃至其他任何角落，都能有效抵御伊比利亚威胁的本领。如今，我们西部的防线已如磐石般稳固，坚不可摧。"
