 ita_i_dont_understand_the_middle_east:0 "东方的复杂局面"
 ita_i_dont_understand_the_middle_east_desc:0 "中东，这片古老而神秘的土地，孕育了人类文明的曙光，也是亚伯拉罕宗教的圣地，更是东西方文明交汇的枢纽，这片土地对世界人民可谓是意义非凡。这里的人民，历史上既曾开疆拓土，也曾遭受外敌入侵。然而在今日，中东的真正力量潜藏在地下的石油之中。\n\n石油，是现代国家的血液，是军队的力量，是工业的粮食。我们控制的中东油田在以前为意大利的经济注入了长久不衰的活力。但是，从也门的内战开始，中东的动荡开始了，这股反叛的浪潮已经席卷了埃及和叙利亚。这些煽动者和叛徒，有的被宗教狂热所驱使，有的怀揣着统一阿拉伯世界的梦想，还有的则是出于对君主制的反感。面对整个地区动荡不安的局势，我们必须当机立断，以确保我们在中东的影响力。"
 ita_emergency_policies:0 "紧急政策"
 ita_emergency_policies_desc:0 "意大利目前遭遇的危机非同小可。若这些新生的势力中有任何一方占了先机，政治上带来的余波尚在其次，重要的是它们对我们造成的经济创伤可能是永久性的。\n\n我们处理我们势力范围内的问题时，通常采取的是一种官僚且手软的政策，这种慢条斯理的做法往往意味着我们在危机爆发时常常会后知后觉，而危机正愈演愈烈。所幸，我们为此等局面准备了一些紧急政策。这些政策虽是权宜之计，但至少能让我们对现在对意大利利益的威胁作出更果断的应对，直至我们能够制定出能够根治这些问题的政策。"
 ita_contain_the_fire:0 "遏制火势"
 ita_contain_the_fire_desc:0 "既然已掌握灵活应对局势之能，此刻正是划定底线之时。革命煽动者休想再替我们预设战场——我们将迫使其按我方规则作战，且寸步不让！"
 ita_the_road_to_riyadh:0 "通往利雅得之路"
 ita_the_road_to_riyadh_desc:0 "When looking at the chaos that has gripped the Middle East, the Kingdom of Saudi Arabia stands as a striking exception, an island of instability in a sea of relative madness. Securing our position in the Middle East starts with shoring up our allies and the states that haven't succumbed to revolutionary fervor.\n\nOf course, we can't be sure that the current monarchy has our best interests in mind either. While they have yet to give us any reason to outright question their loyalty, we also have to expect them to act in their own interests in the coming years. Thankfully, we have multiple methods of...ensuring that in the long term, the interests of Riyadh don't stray too far from the interests of Rome. Some of them are going to be riskier than others, but as the saying goes, fortune favors the bold."
 ita_contact_talal:0 "联系塔拉勒"
 ita_contact_talal_desc:0 "沙特王室虽以激进保守的伊斯兰原教旨主义闻名，但正如所有群体，总有些“害群之马”。对沙特家族而言，这匹黑马名叫塔拉勒·本·阿卜杜勒阿齐兹亲王。\n\n在满朝原教旨主义者与保守派中，塔拉勒堪称异类。他公开主张在沙特王国推行审慎改革，更重要的是，表达了愿与意大利合作造福阿拉伯世界的意愿。我们尚不知其改革决心几何，但若能建立沟通渠道，便可探索可能性，为双方谋划最佳路径。"
 ita_brief_de_martini:0 "向马蒂尼发出简要指示"
 ita_brief_de_martini_desc:0 "中东诸政权与政府的显著特征在于自身军力孱弱——部分源于人口匮乏，部分源于国内腐败横行，另有部分则因政府不得民心。这在和平时期对我们有利，但如今革命与无政府状态正猛烈威胁着他们，我们不得不介入。\n\n弗朗切斯科·德·马蒂尼代表了皇家陆军最精锐的力量。这位二战期间功勋最卓著的军人，将再次肩负重任——与他麾下的将士们共同捍卫意大利的国际地位。通过以国际志愿部队身份介入，他们既能保护中东盟友，又能避免直接军事干预加剧局势动荡，从而维护意大利利益。"
 ita_All_In_Saudi_Coup:0 "孤注一掷"
 ita_All_In_Saudi_Coup_desc:0 "我们最初或许心存疑虑，但塔拉勒亲王彻底超出了预期。在谈判进程中，他展现出愈发果敢的气魄，并主动推进其在该地区的事业。\n\n既然已争取到他的支持，现在便需将这份锐意转化为切实行动并确保成功。此役若败，我们不仅会失去该地区唯一稳定盟友的支持，更将令全球信誉扫地。但若一切按计划推进，我们既能稳定局势，又能引领中东迈入现代纪元。谨小慎微的时代已然终结，是时候让命运眷顾我们了。"
 ita_rattle_the_sabre:0 "拿起武器"
 ita_rattle_the_sabre_desc:0 "Developments in the region have tied our hands. We can't rely on utilizing underhanded or clever tactics to achieve peace and stability in the Middle East, so we're going to need to be direct; much more direct. It's time to make our stance in the Middle East clear, Italy is here, and Italy is here to stay.\n\nThe aggressive rhetoric will hopefully make some of the less zealous rebels reconsider their chances and hopefully quell some of their rage just by taking a stand. For the governments and armies of the Middle East, it'll be taken as a reassurance that we won't abandon them in their time of crisis, and that we will fight to maintain the power structures that keep them in place as well. This should come as a welcome sign to the Saudis in particular, who seem to be the only country in the Middle East not wracked with revolutionary fire yet."
 ITA_arabian_intervention:0 "干涉阿拉伯"
 ITA_arabian_intervention_desc:0 ""
 ita_desert_diplomacy:0 "沙漠外交"
 ita_desert_diplomacy_desc:0 "既定政策已定，意大利前路已明，此刻当务之急是集结地区盟友并谋划战后布局。镇压革命绝非终点——历经动荡后，我们需重燃世人对意大利霸权的信念。\n\n待尘埃落定，我们须主动联络新旧盟友。既已展现雷霆手段，亦需辅以怀柔之风。大棒既出，胡萝卜亦不可缺。"
 ita_watch_the_borders:0 "望向边境"
 ita_watch_the_borders_desc:0 "The Middle East is a land of borders, both on maps and off of them. Ethnic groups and tribes criss-cross the colonial nation-states that have formed on top of them. As revolutionary fire and fundamentalist zeal spreads like a disease, we need to secure the borders against rabblerousers and instigators trying to spread their message to more unreached groups.\n\nThis will effectively be a political quarantine, and will need to have the same level of diligence as a disease quarantine, as even a single provocateur making their way across a nation's border could destabilize entire provinces with their words and ideas."
 ITA_border_watch:0 "紧盯边界"
 ita_they_are_among_us:0 "They're Among Us"
 ita_they_are_among_us_desc:0 "Our colonial administrations around the Middle East aren't only made up of Italians, but rather a mixed collective of Italian commissioners and advisors acting in league with local bureaucracies and political elements in order to more effectively administer our sphere of influence. This served us well when the Arabs had no reason to act against us, but now we have reason to fear that these Ba'athist and Islamist beliefs might be attractive to our own collaborators.\n\nIt's about time we did something of an ideological audit of our colonial governments and the native leadership. We need to look at their histories, who they spend their time with, statements that before all of this might have seemed innocuous, and hope that we put our trust in the right ones..."
 ITA_internal_watch:0 "盯紧内部"
 ita_unchain_the_SIM:0 "解开军情局的锁链"
 ita_unchain_the_SIM_desc:0 "Can we truly expect potential traitors and saboteurs in our own ranks to have exposed themselves in the past? Can we suppose that every man and woman speaks their mind, and does not simply act in their own interests even if they may run counter to their ideals? The answer is obvious; not in the least!\n\nIf we're going to expose any of the revolutionary rot in our colonial administrations, we're going to need to look at more than just public statements and personal relationships. The SIM have the tools and expertise to perform these more... Invasive investigation techniques, provided of course we assure them that we won't be prying too hard into the methods they choose to utilize in acquiring this all-too-important information. We're putting a lot of faith in them, but we need to be willing to cross any boundary, overcome any obstacles that might impede us from the salvation of the Empire."
 ITA_SIM_unchained:0 "不设限的军情局"
 ita_against_baathism_because:0 "意大利反对复兴党"
 ita_against_baathism_because_desc:0 "阿拉伯复兴主义思想对意大利在中东的霸权构成最大威胁。他们妄图将我们逐出自家帝国，窃取我们的劳动果实，打造属于他们的阿拉伯联盟。双方利益水火不容，绝无谈判余地。\n\n意大利必须立场坚定，绝不容许他们再多占一寸土地。罗马的子民们，坚守阵地！待时机成熟，我们必将夺回应有之物！无撤退可言，无妥协可谈！"
 ita_boots_on_the_ground:0 "沙上之血"
 ita_boots_on_the_ground_desc:0 "尽管人们容易将当下危机视作现实政治与各集团利益博弈，但真相是这场冲突早已超越政权更迭与经济纠葛。这是意识形态之战、信念之争、理念碰撞与意志对决。\n\n我们对抗的是蛊惑人心的政客、黩武强人与暴民专制。意大利乃中东民主的最后堡垒、终极希望、仅存火种——守护她不仅为了亚平宁半岛，更为整个阿拉伯世界。纵需行非常手段，此役关乎中东灵魂归属，我们输不起。"
 ITA_peacekeeping_brigades:0 "维和部队"
 ita_the_impossible_triangle:0 "不可能三角"
 ita_the_impossible_triangle_desc:0 "As if the divisions in the Middle East weren't bad enough to contend with, our own armed forces seem to be trisected in their own way, as disagreements grow and widen over how exactly we should be conducting our war against insurgency and terrorism. If we're going to actually save the empire and not just yell at each other, we're going to need to promote one plan and put the other two down.\n\nThe first camp advocates for a largely reactive and defensive plan that doesn't take any particularly extreme methods. The second camp argues that this is a rebellion and that we should treat this as any other rebellion, with making some examples and letting fear do the rest of the work for us. The most extreme plan suggests that we treat this like a war, and do not hold back whatsoever.\n\nWe cannot afford to lose, after all."
 ita_peace_and_protection:0 "和平和庇护"
 ita_peace_and_protection_desc:0 "The first camp's plan wins out among Italian High Command. This is more than just a battle of ideas, but also a war for the hearts and minds of all Arabia, and we lose not with bullets, but with public opinion. If we maintain a stance that does not put lives at risk unnecessarily, we can expose our enemies as the dangerous radicals they are while earning the respect and allegiance of those they hope to lead.\n\nThe process will be slow, it will be cautious, and it will not produce immediate results. But it will bring about long term stability as we not just stop the rebellion, but ensure that after this is all over, there's no reason for any new ones to spring up and cause more problems.\n\nWe cannot afford to lose, now or ever."
 ITA_peace_and_protection:0 "和平和庇护"
 ita_shock_and_awe:0 "震慑行动"
 ita_shock_and_awe_desc:0 "The second camp's plan manages to convince the High Command of its unfortunate necessity. These are rebels, and rebellions grow if the disaffected and disillusioned see no downside to joining in them. We need to remind them the cost of their defiance, and grant them the gift of self-preserving fear.\n\nWe are not savages, a few examples and very public incidents should make anyone considering joining the ranks of our enemies change their minds quickly. These incidents will be tightly controlled and we will determine the narrative leading up to and immediately following the acts.\n\nWe cannot afford to lose, in the field or in the papers."
 ITA_shock_and_awe:0 "震慑行动"
 ita_fire_and_fury:0 "火与怒"
 ita_fire_and_fury_desc:0 "The third camp's perspective changes how we approach the entire issue. Rather than a rebellion against momentarily wrongheaded subjects and citizens, we have to think of this as a war against a hostile and implacable foe, one in which the very fate of the Italian nation is at stake.\n\nThe proposed solution is by its nature, extreme, but when isn't war extreme? We will pull out all the stops, we will bomb them into oblivion, we will crush them underneath wheels and treads, we will root them out from their lairs and dens and burn them like the rats they are. We will show no mercy, for they would not show any Italian in their clutches such.\n\nWe cannot afford to lose, no matter the cost."
 ITA_fire_and_fury:0 "火与怒"
 ita_art_of_counter_insurgency:0 "平乱的艺术"
 ita_art_of_counter_insurgency_desc:0 "为护佑现代民族国家免遭恐怖主义与叛乱侵袭，我们已制定宏大计划，将军事情报局、皇家陆军及势力圈内地方防御力量的积极政策统合为整体战略。\n\n反叛乱非精密科学，中东危机自爆发以来便以层出不穷的新形态肆虐。故需采取灵活全面且持续演进的策略，但凭借充足资源与严密监管，定能将当前冲突导向圆满终结。\n\n毕竟，我们输不起。当然，也绝不能输。"
 ita_the_economy_is_on_fire:0 "阻止经济崩溃"
 ita_the_economy_is_on_fire_desc:0 "To say that the sudden outburst of political violence in the Middle East has been a problem would be understating things. Our ability to import various natural resources- primarily, life-giving oil on which our country runs- has been heavily hampered and requires immediate action on our part.\n\nWe don't need to make the economy good or stable right away, that will take some time. For the time being, on the other hand, we can pass through a series of simple, sweeping acts to keep our essential industries working and people living capably, if not comfortably yet. This will give us time to figure out a more permanent solution, if there is one."
 ita_democracy_big_dicking_the_ENI:0 "支持埃尼集团"
 ita_democracy_big_dicking_the_ENI_desc:0 "在阿拉伯叛乱重创的产业中，对国家民生、工业与军事至关重要的莫过于石油业——该产业全系于国家碳化氢公司，简称埃尼集团。埃尼集团若亡，意大利亦亡！\n\n拯救埃尼集团即拯救石油，拯救石油即拯救意大利。埃尼集团的高度集中化犹如双刃剑：其崩溃将导致全行业崩塌，但只需确保该公司完整，便可避免灾难。短期巨额注资足以令其暂渡难关。"
 ITA_bolster_ENI:0 "国家碳化氢公司"
 ita_this_is_fine:0 "问题不大"
 ita_this_is_fine_desc:0 "Honestly, it could be worse, a lot worse even. In spite of the war in the Middle East, we have managed to maintain some level of economic stability and continuity. Things could be better, to be sure, but people can handle some increased prices and a bit of uncertainty in the short term.\n\nAll the while, the parliament will bicker and argue over what exactly should be done, but the important part is that business will continue as normal, in spite of the extraordinary circumstances. If we allow things to go sideways, we'll open the door to extremism and greater violence, but as long as we stay the course and are okay with simply doing \"just okay\", we'll make it through this."
 ita_appeal_to_foreign_capital:0 "吸引外资"
 ita_appeal_to_foreign_capital_desc:0 "尽管超级大国划下势力界限，当今世界市场的互联程度仍属空前。意大利历来未与任何特定超级大国深度绑定，这使其成为中立国际贸易的核心枢纽。虽仍在灾后复苏中艰难求存，我们仍可善用此优势。\n\n东西方阵营皆有大量游资渴望在地中海与中东增强影响力。我们可呼吁这些企业与贸易团体提供重建基金。若能平衡东西方由此产生的影响，或可既获新机，又不损旧利。"
 ita_limit_civilian_oil_consumption:0 "限制石油消费"
 ita_limit_civilian_oil_consumption_desc:0 "Our difficulties in importing oil are threatening shortage nationwide. The price of fuel for peoples' personal use has already increased dramatically, but even the natural increase in prices have done little to make up the difference between what we can bring in and what is being used.\n\nIn order to keep the apparatus of the state functional, we're going to need to institute oil rationing. Our industry and military will have priority on oil shipments, as those are the two most vital structures to the continued existence of Italy, and whatever else we have beyond that will be made available to the private sector. It won't be comfortable, but we'd rather have a dissatisfied population to whom we can make this up to later than allow the crisis to threaten the state's ability to function."
 ITA_limit_oil_consumption:0 "限制石油消费"
 ita_going_nuclear:0 "核能合作"
 ita_going_nuclear_desc:0 "Oil has been the foundation of Italy's economy, her industry, and the lifeblood of international trade and operations, but does that always need to be the case? The crisis we currently face has made it clear that oil as fuel is inconstant, unstable, and prone to sabotage and shortage. The more we rely on it to provide us stability, the more at risk we are of collapse and chaos. Before, oil was the only option, but in the modern day, we have... Alternatives.\n\nNuclear power is not only good for bombs, regardless of what Washington, Tokyo and Berlin might have you believe. It can be harnessed for other purposes, in particular, the providing of power to our industry and with some research, maybe even going further than that. We can produce it within our own borders, produce as much of it as we need, and not risk having it denied to us by disaster in colonial regions.\n\nThe potential boons are great, but it will take a long time to get there. But it won't come any sooner if we delay on beginning the work any further."
 ITA_nuclear_energy:0 "核能"
 ita_IRI_ascendant:0 "IRI复生"
 ita_IRI_ascendant_desc:0 "在这经济动荡的岁月里，民众需要一家能为私营部门提供锚定与根基的金融机构。工业复兴公司虽是法西斯政权早期建立的旧机构，但历经岁月考验仍展现出强大韧性。值此特殊时期，我们将再度启用工业复兴公司，为私营部门带来稳定与延续的表象。\n\n我们将推行实质上的准国有化政策，动用国家资金与影响力维系关键产业，并重组其运营架构。通过融合公私管理的最佳实践，维持经济强健的表象——这种强韧姿态将让民众对未来保持乐观期许。"
 ITA_IRI_ascendant:0 "IRI复生"
 ita_win_the_home_front:0 "先赢主场"
 ita_win_the_home_front_desc:0 "The disaster may have taken place abroad, but the shadow of the crisis looms large over the Italian mainland. It isn't enough to put down rebellions and insurgencies in our colonial empire, but we need to make sure that homeland dissent and fears don't do us in even if we do win across the Mediterranean.\n\nIt's a war for hearts and minds, a war for the confidence and faith of the Italian people, to keep a hold on the people who make up our democracy. We need to make sure that no Italian begins to waver in either their dedication, or their optimism, through these trying times."
 ita_necessary_evils:0 "必要之恶"
 ita_necessary_evils_desc:0 "Extraordinary times require extraordinary efforts, and extraordinary sacrifices in turn. While our colonial empire is in open revolt and chaos, we will be putting every necessary effort into crushing the violence and rebellion in the Middle East, but we will also need to prevent the mainland from experiencing a similar fate.\n\nThe freedoms of speech and protest are of course, protected in our fair democracy under most circumstances, but all freedoms have necessary and sensible limits. No respectable state would allow her citizens to spread fear, dissatisfaction, and subversive thoughts among our people. Fear mongering and panic-inciting speech, and protests against entirely necessary government action will need to be suspended until the situation is not quite so perilous. Necessary evils now to prevent the rise of greater evils in the future."
 ita_silence_the_pacifists:0 "和平，噤声"
 ita_silence_the_pacifists_desc:0 "The concept of nonviolence, the ideal of it, is just that. Theoretical, a concept, an idea, not something that can be meaningfully applied or utilized, much less by a state. That doesn't stop a lot of people from liking the idea of just 'not fighting' and advocating for it, in protests and calls to action in the streets. Some simply hold that we are being too aggressive with the Arabs, while on the other extreme, others go even further with the idea and argue for us to simply pulling out of the region entirely.\n\nObviously, either idea is absolutely ridiculous, but if popular opinion turns against Middle Eastern intervention it could have disastrous consequences. We need to nip this in the bud while it is small enough for us to deal with safely. We can't simply engage in crackdowns, though the option is there when individual situations get out of hand, but instead we need to convince everyone else of the absolute absurdity of being any more lenient with the Arabs than we currently are."
 ita_nobody_left_behind:0 "一个都不能少"
 ita_nobody_left_behind_desc:0 "The curious nature of handling economic crises is that the economy is not some physical machine where you can look at the gears and inner mechanics and determine what is causing the problem with any degree of certainty. Economies are a group of people, just like any political or other social system, and just like any group of people they are anywhere from difficult to impossible to predict when anxiety rides high and fear dominates the crowds.\n\nThe best way to keep this figurative machine running is to prevent those anxieties and fears at bay. People are much easier to predict and economies run a lot more smoothly when people can live more comfortably and with more faith in the systems of economic security. By pumping more funds into our social programs and keeping them running smoothly, we can avoid the worst of the economic disaster that looms over the nation."
 ita_spend_in_deficit:0 "赤字开支"
 ita_spend_in_deficit_desc:0 "There's not a lot of money to be spent on these social programs, it's true, our trade deficit has deprived us of access to cash. But, in spite of that, our course has been set, and we're going to just need to find a way to either make that money, or to find some kind of other method of funding it for the time being. Perhaps credit will do in the mean time.\n\nTake a few loans, no doubt there will be interested banks and other parties who have a vested interest in making sure that we remain solvent moving forward. We'll be taking a big risk, going into debt to maintain the social safety nets, but it is a risk certainly worth taking if it keeps us afloat for longer."
 ita_spend_in_deficit_tt:0 "§O我们的国家债务与GDP增长率都将上升。§!"
 ita_stato_sociale:0 "福利国度"
 ita_stato_sociale_desc:0 "We have worked long and hard to put the social safety nets and programs in place that help protect and support our people, and finally, we have established a social state that can care for its people, even in times of great crises and anxiety.\n\nThe stability and unity this affords our democracy cannot be overstated. No more will we fall prey to the anxieties and fears brought about by foreign affairs and domestic fears, but rather, we will stand strong as one nation and all of her peoples. We are moving forward, and the first step is the birth of the Italian Social State, a harmonious synthesis of public and private interests to guarantee both freedom, and stability."
 ITA_stato_sociale:0 "福利国度"
 ita_austerity_economics:0 "经济紧缩"
 ita_austerity_economics_desc:0 "阿拉伯叛乱导致国际石油贸易严重受创，当前财政捉襟见肘。灾难引发的巨额贸易逆差重创经济，议会正病急乱投医般寻求续命良方。\n\n最理智的解决方案似乎唯有节流——量入为出。简言之，针对财政收入损失，我们将削减各类社会项目预算。至于过渡期所需服务，则交由自由市场填补缺口，毕竟经济现实已让我们力不从心。"
 ita_trim_the_fat:0 "刳脂剔膏"
 ita_trim_the_fat_desc:0 "Beyond the simple budgets for our various social programs and government institutions, we can save money through more permanent measures. By cutting away at unnecessary government institutions root and stem, and by pruning the staffs and positions of the branches themselves and thereby reducing the cost of upkeep for these positions that can be filled through other means.\n\nBeyond that, a lot of other functions that the government performs can be vacated out of the government entirely and put into the hands of private investors and companies who are more well-off than we are currently. Privatization, it's called, and it would allow our government to focus on its foundational purposes, no longer distracted by superfluous tasks and ambitions."
 ITA_austerity_economics:0 "经济紧缩"
 ita_tighten_the_belt:0 "勒紧腰带"
 ita_tighten_the_belt_desc:0 "The government has done all it can to limit their own financial wastefulness and overexpenditure, but that will not be enough, not to save Italy. It can't be only the government who controls their spending and saves, but her people as well. Prices will rise with privatization, and the people must be ready for that.\n\nNot all will listen to us, but no one will be able to say that we didn't warn them for this. We'll start preparing the public through propaganda and public announcements that encourage them to save and prepare for the coming austerity, so that Italy can continue to function now and function more effectively when there is money to spend."
 ITA_austerity_economics_1:0 "经济紧缩"
 ita_a_national_emergency:0 "国家紧急状态"
 ita_a_national_emergency_desc:0 "若说目前的危机让我们的政府陷入混乱，那不过是轻描淡写，似乎每个人都有自己的一套方案拯救经济。但最紧迫的问题是，我们的贸易逆差在叛乱伊始，就尾大不掉了。逆差带来的巨额赤字得优先解决，其他靠边。\n\n紧急情况，特殊处理。为了国家的利益，我们不会把拯救经济的任务交予私企、外资，而是国与民的力量。"
 ita_extract_more_recources:0 "全速提炼"
 ita_extract_more_recources_desc:0 "Italy is more free to trade with the world than any other nation on Earth, and it is simply not right that we should be getting so little out of our own trade despite that fact. We have clearly relied too much on oil in the past, but Italy isn't only oil now is it! We have fish and minerals, agriculture and the like.\n\nIt's time to start taking a more direct hand in the acquisition and selling of these resources. We have the IRI after all, and its already taking a far more active role in the economy as it stands, we can expand their role in our international trade agreements. The more we have to sell, the less we lose in the world market, and the more industry we can afford to bring into the native country, not selling it abroad to fattened calfs like America and Japan."
 ITA_extract_more_resources:0 "掘地三尺"
 ita_economic_souverainism:0 "经济主权主义"
 ita_economic_souverainism_desc:0 "孤独的意大利，免受外国政治摇摆。自主的意大利，免受外国经济盘剥。强大的意大利，让我们能完好无损地度过危机，最重要的是，灵魂不受亵渎，纯净依旧。\n\n出口继增，进口始减。意大利不要铁与粮，而要现金与工业。照这条路走下去，远见的规划加上经济解放，未来，只会让我们愈发强大。"
 ita_economic_souverainism_tt:0 "§O多举措掌控经济。§!"
 ITAOIL.500.t:0 "通往利雅得的路"
 ITAOIL.500.d:0 "黑金停涌，红尘滚滚，沙特是漩涡中心的杀子。在阿拉伯这个大舞台，沙特若称二，无人敢称一。而在地缘政治外，其强烈的马基雅维利倾向，也让前来干预的诸国认可其造王者角色。\n\n这是我们的机会。动起来，去寻找，修建通往利雅得的路，再佐以值当的阴谋贿赂，我们就能掌控沙特内政让他远离战争。冒险或许会适得其反，但成功的前景足够诱人，不做不行。"
 ITAOIL.500.a:0 "盟友多多益善。"
 ITAOIL.501.t:0 "联系塔拉勒"
 ITAOIL.501.d:0 "塔拉勒·本·阿卜杜勒阿齐兹·沙特是个有趣的角色。他思想开放，行事像大多数沙特人一样实际，而且对意大利颇为友好，这对我们至关重要；这样的人物是值得信赖的，若他能巩固在沙特家族中的领导地位，便有望引领沙特走向和平。他将成为我们在阿拉伯世界中的重要盟友。与他取得联系并不难，因为我们早就已经这么做了，我们在中东的外交代表与这位年轻王子关系良好。现在，我们的目标是让他认识到我们的利益是一致的。或许，他早已心照不宣。"
 ITAOIL.501.a:0 "朋友有难……"
 ITAOIL.502.t:0 "向马蒂尼发出简要指示"
 ITAOIL.502.d:0 "弗朗切斯科·德·马蒂尼在东非和中东地区为意大利立下了赫赫战功，不仅在沙场上显威风，也在幕后发挥了不可小觑的作用。若我们要在沙特悄无声息地掀起一场变革，他的参与不可或缺。\n\n在为意大利与塔拉勒牵线搭桥时，我们可以依赖一条既高效又能迅速应对情况变化的沟通渠道。我们的人一旦得到指示，就会立刻行动，看看幸运之神是否会眷顾我们。"
 ITAOIL.502.a:0 "忠良将官。"
 ITAOIL.503.t:0 "难解谜题"
 ITAOIL.503.d:0 "沙特人并不是能轻易接近的，但若我们能打入其核心，那将是怎样的收获……我们与塔拉勒·阿勒·沙特保持着密切的联络，他也准备与沙特军方的关键人物接触，企图将他们拉拢到一场政变中，以助他夺取权力。我们通过德·马蒂尼与其建立了合作关系，这让我们之间的关系更加紧密，也让我们有机会探讨多种策略，以便说服军官们加入我们。最直接的方式是贿赂他们，并在必要时承诺未来的奖赏。其次是招募他们参与政变，虽然这需要透露一些关于政变的信息。第三种方法是邀请他们到酒店会面，并在那里采取必要措施确保他们不会阻挠。时间紧迫，我们应该让德·马蒂尼迅速传达我们的提议："
 ITAOIL.503.a:0 "他将向军官们行贿。"
 ITAOIL.503.b:0 "他将向他们透露政变的计划，并拉拢他们加入。"
 ITAOIL.503.c:0 "他将邀请他们前往豪华酒店进行面谈，将他们一网打尽。"
 ITAOIL.504.t:0 "亲近国王"
 ITAOIL.504.d:0 "沙特国王的名字源自他所在的王室。沙特·本·阿卜杜勒-阿齐兹·阿勒沙特的统治并非没有价值；毕竟，要在地区局势中保持中立并不容易。然而，现在看来，他显得力不从心，他那放纵的个性和开销无度并未赢得族人和治下阿拉伯民众的欢心。\n\n在处理沙特问题时，我们必须就针对沙特国王制定策略。与他的会面已经提上日程。尽管如此，如果形势不利，我们仍可及时止损。否则，我们或可寻求一场紧急会晤，迅速行动，或安排一个更为从容的会面，这样我们可以准备得更充分。"
 ITAOIL.504.a:0 "取消会议。"
 ITAOIL.504.b:0 "召开一场紧急会议。"
 ITAOIL.504.c:0 "安排会面，并做好相应准备。"
 ITAOIL.505.t:0 "军官步入会场"
 ITAOIL.505.d:0 "在与沙特国王和塔拉勒的会晤中，沙特军官们突然闯入了会议室，这时紧张气氛达到了顶点。对此，我们早有预案，并向塔拉勒传达了应对这次会面中出现这种挑衅行为的对应策略。我们可以让这些军官在会谈中扮演三种角色之一：一是带领沙特阿拉伯彻底告别战争；二是迫使国王退位，宣布塔拉勒·阿勒沙特登基；或仅仅是作为双方的和事佬，通过斡旋和谋略而非武力来促成和解。"
 ITAOIL.505.a:0 "让沙特退出战争。"
 ITAOIL.505.b:0 "迫使国王退位。"
 ITAOIL.505.c:0 "充当调解人。"
 ITAOIL.506.t:0 "塔拉勒被捕"
 ITAOIL.506.d:0 "政变已经失败。塔拉勒·阿勒沙特被沙特国王的忠臣拿下，现在被关押在谁也不知道的地方，听凭当权者发落。此事在沙特民众中引起了震动，但是面对一个被外来者强加的傀儡，似乎无论是精英还是平民，现在都比以前更加坚定地站在沙特国王一边。"
 ITAOIL.506.a:0 "沙特人拒绝了我们的拥抱。"
 ITAOIL.508.t:0 "塔拉勒政变成功"
 ITAOIL.508.d:0 "沙特阿拉伯国王塔拉勒·本·阿卜杜勒阿齐兹·沙特已正式接触意大利，就阿拉伯世界当前的局势进行讨论。塔拉勒的政变已经成功，我们在中东及其丰富资源的争夺中已经赢得了一个至关重要的盟友。沙特退出战争现在看来已是不可避免的结果。意大利现在必须充分利用这一优势。"
 ITAOIL.508.a:0 "我们已经成功渗透了沙特王室。"
 ITAOIL.510.t:0 "补贴"
 ITAOIL.510.d:0 "我们的经济正在螺旋式下降。如果再不迅速扭转局面，那么广大革命先烈用鲜血创造出来的意大利帝国的前途和命运，就面临着严重的威胁！绝不可全国崩溃，权宜之计都可用上。我们的首要目标是让公司继续经营，市场运转不息。受经济衰退影响最严重的公司会得到政府补贴。这不会立即解决问题，但能确保一切不会变得更糟。"
 ITAOIL.510.a:0 "这些公司会心存感激。"
 ITAOIL.511.t:0 "外资"
 ITAOIL.511.d:0 "尽管对我们的公司进行补贴能够暂时缓解经济的颓势，但为了长远之计，我们应该考虑引入外国资本。欧洲的中立国家如瑞典和瑞士，正翘首以盼，渴望向我们的企业注资。现在，正是敞开大门之时。让外资如潮水般涌入，助力我们的经济重回康庄大道。"
 ITAOIL.511.a:0 "欢迎金融特使。"
 ITAOIL.512.t:0 "令人不悦的紧缩政策"
 ITAOIL.512.d:0 "社会民主党的一些左翼成员携一系列请愿书、论文和夸大其词的声明，对我们政府处理中东危机的方式大加挞伐。更甚的是，民众对这些无端指责反响热烈。\n\n虽然我们已竭尽全力，采取了最必要的措施来维系经济的稳定，但左翼所散播的情绪已获得广泛而热烈的支持。目前，似乎只有我们认识到形势的严峻性。由于最近的抨击，小规模的示威和公众对政府的请愿在规模和受欢迎程度上都在增加，且这种趋势似乎正在加剧。\n\n无论如何，我们已无计可施。可出售的资产已荡然无存，多项削减政府开支的提案也已签署并实施。时局艰难，但我们仍将努力向意大利人民保证这只是权宜之计。为了我们和他们的未来，希望如此。"
 ITAOIL.512.a:0 "各位，这是基础经济学。"
 ITAOIL.512.b:0 "我们会解决这个问题的……迟早的事。"
 ITAOIL.513.t:0 "轻微紧缩"
 ITAOIL.513.d:0 "这场危机需要每个人作出牺牲，但无论我们如何巧言令色，最弱势的群体将遭受最大的苦难，历史总是惊人地相似。紧缩政策将暂时成为我们社会经济生活的主旋律。或许学校不得不暂时关闭，医院的排队名单可能要变长，公务员可能要缩紧腰带过日子。然而，这是我们必须背负的十字架，因为只有这样，我们才能在风雨飘摇中保持稳定，直到我们能够采取行动，扭转这一切。"
 ITAOIL.513.a:0 "我们别无选择。"
 ITAOIL.514.t:0 "德国人正在入侵"
 ITAOIL.514.d:0 "时间紧迫，不容空谈。德国人正在侵入我们的国土，我们必须集结所有意大利人奋起抵抗。德国人每侵占一寸土地，必将血债血偿。待他们付出代价之后，他们还将付出更多。"
 ITAOIL.514.a:0 "北方蛮族涌入罗马。"
 ITAOIL.515.t:0 "最终方案"
 ITAOIL.515.d:0 "德国人已翻越了阿尔卑斯山，我们的军队节节败退，败局已定。看来，唯有一计可施：下达发射命令。"
 ITAOIL.515.a:0 "愿上帝怜悯他们。"
 ita_titanomachy:0 "提坦之战"
 ita_titanomachy_desc:0 "A beast stirs beyond the Alps. Already in its hunger it has devoured all that Europa could offer it, and still yet, it remains unsatisfied. Though the warm blood of innocent nations still drips from its jaws, it already has cast its gaze in search of its next meal.\n\nThe intentions of the beast's bloodshed cannot be determined. The violence it inflicts upon itself and the rest of the world is as senseless as it is ceaseless. We face no normal foe, but a nation and people that finds itself hopelessly addicted to death. The last great European Democracy stands now against a resurgent Nazi foe, with the future of all Europe hanging in the balance.\n\nSound the horns, beat the drums, raise the flags. Mothers and fathers, save your tears, for you shall need them soon. §RWe are at War.§!"
 ita_protect_the_people:0 "保卫人民"
 ita_protect_the_people_desc:0 "When Germans wage war, they don't fight like it's a wargame. To them the campaign is much less about strategic and tactical objectives, far less about claiming land and positions, and instead much more about striking terror into the hearts of the people who they are invading. They don't simply wish to break armies and damage economies, they're out to break the will of nations and the spirit of the people.\n\nWe must protect our own, whatever the cost may be. Mass evacuations of areas expected to become front lines and the expansion of anti-air defenses will take a great deal of manpower and money, but so as long as the Italian people are protected and able to resist the Nazi threat, we will have a fighting shot. When we stand, we stand together."
 ita_open_shop_down_south:0 "Open Shop Down South"
 ita_open_shop_down_south_desc:0 "Rome is the historical, cultural, and economic heart of Italy. Ever since the classical era, one could argue that she is the heart of the entire Mediterranean. But she also stands exposed should the Germans break through the Alpine Wall and spill into the Italian heartland. In the interests of being able to be more flexible with our defensive plans, we should consider every option.\n\nThe boot of Italy is something of a \"second center\" of Italian culture and trade. Should we decide to change the capital for the duration of the war, there are multiple cities in the south of the peninsula that would serve our needs well. This would allow us to set up additional defensive lines and more complete defensive works along the entire peninsula. It should also hopefully give the invaders pause for thought when they determine the logistics of fighting a zealous Italian army on the defensive all the way down to the heel of Italy and beyond."
 ita_keeping_orderly:0 "保持秩序"
 ita_keeping_orderly_desc:0 "Back in 1939, the German nation to our north had a militaristic strongman take over their nation and set the course for not just themselves, but all of Europe with them. With the old Fascist Regime of Italy at their side, they set the entirety of Europe ablaze with a war of annihilation that ended with the complete destruction of the world that was and the establishment of the New Order in which we now live.\n\nOut from the ashes of the German Civil War emerged the rebirth of that Germany. And now that they have feasted on the corpses of Switzerland and Sweden, they are turning their gaze down to the south. We need to remain calm. Switzerland and Sweden were no Italy, they lacked the overseas empire that we do, the population, the industry, the military strength, and the national will to resist invasion. For as long as we stand strong and unified in purpose, the bloodlust of the Hun will not be slaked on Italian blood. When the eagle enters the wolf's den, it will find only death."
 ita_defensive_business:0 "防御型经济"
 ita_defensive_business_desc:0 "自现代炮兵问世，防御方始终占据战争天然优势。掘壕固守、趁敌推进时袭扰、持续造成不成比例伤亡——这些将成为此战决胜关键。德军推进愈深，其补给线愈脆弱，维持攻势愈艰；而我军补给线愈短，反击愈烈。\n\n推广此防御理念可提振前线士气，纵需战术性后撤亦无妨。我们或会退却，但匈魔每夺一寸意土都需付出血的代价。待其窥见罗马城时，恐已血流殆尽。"
 ita_soldiers_in_the_streets:0 "街头的士兵"
 ita_soldiers_in_the_streets_desc:0 "The sight of soldiers' boots marching through the sidewalks and streets of Italy's cities does bring back uncomfortable memories of the days of the Fascist Regime and the extreme measures they took to keep their own citizens in line. Yet, the reality of the situation is that the streets are battlefields in this age of warfare, and our soldiers need to know them in much the same manner as constables do.\n\nWhen the Germans come- and they will come- into our cities, we need to have troops ready and capable for vicious, urban warfare. This means training them to think quickly and independently, to excel in close quarters and house-to-house fighting. Let the history books criticize the effect that this may have on our people, for if there is an Italy in the years to come to look back on us with disdain, then we have done our duty."
 ita_a_temporary_suspension_of_rights:0 "临时中止权利"
 ita_a_temporary_suspension_of_rights_desc:0 "战争时期，言辞即武器，而民心士气关乎国家存续。颓丧畏战的民众将拖累国家走向衰亡，逆乱叛国的思潮将诱使国民背弃母邦——哪怕自取灭亡。\n\n德意志的攻势唯有征服全球方会止息，届时世界将尽陷铁蹄暴政。因此，尽管我们衷心信奉自由理想——言论自由、新闻如实报道之自由——但为守护这些自由，战时必须暂时搁置。若此举助我们赢得战争，自可恢复民众自由权利，任其抱怨至地老天荒；但若因循苟且终致败北，则言论自由与新闻独立之梦将永遭扼杀。"
 ita_expand_the_alpine_wall:0 "扩大阿尔卑斯屏障"
 ita_expand_the_alpine_wall_desc:0 "There is no better defensive structure that a nation could ask for than a natural one. The Alps have been the Shield of Italy for as long as there has been an Italy to defend, and it has naturally prevented conquest from the north. But the German victory over the entirely-mountainous nation of Switzerland suddenly throws the effectiveness of the Alps alone into question.\n\nWe had already prepared to defend along the Alps before, but the new situation involving Switzerland's incorporation into the Reich means we need to extend those structures westward. These forts and pillboxes along the Alps should make an already-difficult campaign into a proper nightmare when the Germans come knocking- and they will come, sooner than we'd hoped too."
 ITA_expand_alpine_wall:0 "§M我们将建造一条防线来保卫我们的北方边境。§!"
 ita_fortify_the_north:0 "巩固北方"
 ita_fortify_the_north_desc:0 "The Germans have the advantage in terms of sheer numbers. Not only do they have the populous German heartland under their control, but their previous conquests have afforded them a great number of additional conscripts to call upon, and their Reichskommissarats are supporting their efforts both logistically and in the field. We cannot possibly hope to achieve numerical parity with them, so we're going to need a different plan.\n\nWe will make the German bleed for every inch of Italian soil they hope to claim. We can't achieve battlefield parity by throwing more resources into the meat grinder, but we can create a web of death for the enemy to march into. An interlocking system of forts and trenches that will support one another and receive support from fortifications further back, they will never be able to stop, they will never be able to rest. They will bleed, and every fort they take will only make them bleed more."
 ITA_fortify_north:0 "§M我们会在北方新建防御工事。§!"
 ita_southern_industry:0 "南部工业"
 ita_southern_industry_desc:0 "Northern and Central Italy is lays directly in the shadow of the Alps, and against most foes, we'd be confident in their ability to hold back a potential invader. But Italy has never faced a foe with the ability to destroy her so totally before, and the industry's concentration in the north and center of Italy is made vulnerable to bombing from over the Alps, as well as seizure by the army should they break through.\n\nIndustry can be moved, and it will need to be if we are to keep it safe from the German invaders. The Soviet Union of old tried to do something similar when Germany invaded them in 1941, but we are not the Soviet Union either now, are we? We will have the capacity to hold them back while the shift is going on, and we will make sure that every inch of soil they take is only useful as graves for their soldiers."
 ita_enact_a_draft:0 "立法征兵"
 ita_enact_a_draft_desc:0 "形势对我们来说日益严峻，而且愈发明显的是，部署的部队不足以在需要的时候击退入侵者。按照这种速度，我们无法维持现在的战线。\n\n我们要更多人手，这是无可回避的事实。征兵尚未开始，我们还需要全国的劳动力继续工作，以满足物资与运输的需求。但绝望时刻需要极端措施，要尽可能多地征召身体健全的成年男子来填补海陆空三军的长期空缺，而劳动者也必须加倍努力工作，以弥补其他领域的人力流失。不管你喜不喜欢，我们都是一根绳上的蚂蚱。"
 ITA_enact_draft:0 "§O我们将恢复征兵。§!"
 ita_challenge_the_luftwaffe:0 "挑战德国空军"
 ita_challenge_the_luftwaffe_desc:0 "此役中，我军航空队直面全球最负盛名也最令人胆寒的空中力量——德国空军。自二战以来，其威名日隆，甚至可能已超出真实战力。\n\n无论纳粹宣传机器如何通过电台与标语粉饰，德国轰炸机与王牌飞行员不过是为虚妄的荣誉而战。反观意大利皇家空军，我们是为家园、同胞与生存权而翱翔！凭借更近的机场，以及直面邪恶的意志与决心，我们坚信必将德国空军逐出意大利领空！"
 ITA_challenge_luftwaffe:0 "挑战德国空军"
 ita_shake_the_pakt:0 "Shake The Pakt"
 ita_shake_the_pakt_desc:0 "Italy was far from the first nation invaded by the resurgent conquest-hungry Nazi Germany. Before the German Civil War and the ascendancy of the German Militarists, we competed with Germany for influence over the Balkan states and their peoples, but then Göring simply conquered the entire region and placed it under the control of a single Reichskommissariat.\n\nThat was a mistake. In their ignorance of Balkan ethnology and history, they have effectively forced a multitude of proud nations and tribes underneath a single hee. These groups whose infighting and rivalries had allowed the Germans to sweep in and conquer them before must have certainly learned their lesson and now understand that the true struggle isn't between Serb and Croat, between Romanian and Transylvanian, but all against the German Invader.\n\nWe can use our old connections and provide these peoples with the tools they need to throw off their yokes and give the generals in Germania something else to think about..."
 ITA_shake_pact:0 "撼动协定"
 ita_a_plea_abroad:0 "海外求援"
 ita_a_plea_abroad_desc:0 "在欧洲大陆，德意志战争机器已碾碎所有抵抗——其治下民众与工业同德国工厂枪炮一道，皆成对付我们的利器。我们虽错失拯救邻邦的良机，但意大利仍在绝境中殊死抗争。\n\n我们必须确保世界其他国家不再重蹈覆辙。倘若意大利陷落，世上还有何国能在这钢铁洪流前幸免？面对共同大敌的侵略，美日两国定愿施以援手；其他中等列强亦当明白，若意大利这面盾牌崩塌，等待他们的将是何等命运。向世界传递这个讯息吧：意大利是击溃战争狂人、拯救民主火种的最后希望！"
 ita_the_italosphere_stand:0 "意大利势力圈立场"
 ita_the_italosphere_stand_desc:0 "Despite all our best efforts, the German War Machine has inched its way closer and closer to its final victory against Italy. We need to retake the initiative and start pushing back, or else this will really be our last stand.\n\nWe fight today, not for Italy. Not for the pride of a monarch, the future existence of some state, not for bureaucrats and capitalists, not for pride or ego, but now we fight for something beyond us. We fight for all the free peoples of the Earth, we fight for the right to life and the self-determination of all. So stand, sons of Italy, children of the Nile and of the Holy Land! Fight, descendants for Rome and Muhammad, of the Pharoahs and of the Solomonids!"
 ITA_italosphere_stand:0 "背水一战"
 ita_bombs_away:0 "§R震怒之日§!"
 ita_bombs_away_desc:0 "意大利人的鲜血从战事初起的阿尔卑斯山脉奔涌成河，托斯卡纳原野散落着森森白骨，米兰街巷尸骸壅塞。老者、伤兵、病弱与孩童为祖国母亲恸哭——她在条顿蛮族铁蹄下惨遭蹂躏。\n\n没有援军将至。意大利孤军奋战，然孤军不可永续。条条大路通罗马，而今条条大路亦将在此终结，何其讽刺。\n\n§R听天由命吧！§!"
 ita_the_fuse_shortens:0 "燃点将至"
 ita_the_fuse_shortens_desc:0 "自第二次世界大战终结以来，意大利现在正面临着一次空前未有的严峻危机。\n\n我们曾忧虑地注视着北边的威胁，却未曾料到中东之地才是危机之源。阿拉伯、埃及与黎凡特的富油之地，动乱愈演愈烈，这不仅动摇了我国经济的根基，更威胁到帝国的完满！\n\n暗流涌动，心怀不满之众在帝国广袤的土地上悄然集结，若我们不能及时弥合裂痕，他们的诡计或将就此得逞。\n\n国内，曾忠心耿耿的公民开始挑战国家权威，权力宝座上的领袖迎来了他的挑战，关于领袖是否应继续掌权的阴谋论已在暗影中悄然滋长。\n\n面对重重困难，唯有斯科尔扎领袖能够应对这场巨大的灾难。\n\n§R若他亦难挡混沌之焰，谁人能挽狂澜？§!"
 ita_react_to_the_emergency:0 "应对紧急状况"
 ita_react_to_the_emergency_desc:0 "面对危机，首要的任务是平心静气，冷静下来审时度势。如今石油命脉被断，经济风雨飘摇，我们需要雷厉风行地接手这一切，以期力挽狂澜，防止局势进一步恶化。\n\n这些措施或许会带来短期的负面效应，民众可能怨声载道，但为了长久之计，这是我们必须承受之重。石油供给将严加管控，军队将优先保障。为了防止出现类似美国大萧条时期银行挤兑的情况，可能需要暂时关闭银行大门，同时全力以赴稳定里拉币值。虽然当前形势十分严峻，但绝非山穷水尽。\n\n只要领袖能维持控制，那么一切都还来得及。"
 ita_squeeze_libya:0 "榨干利比亚"
 ita_squeeze_libya_desc:0 "鉴于我们中东的石油供应现已不再可靠，我们必须转而寻求次要的石油资源。利比亚油田虽然富饶，但与阿拉伯沙漠下的石油储量相比，仍显不足，面对现状，我们只得退而求其次。我们计划加大利比亚沙漠的开采力度，以解燃眉之急。这对当地居民来说是个不幸的消息，因为这意味着他们的土地将被大量征用以供石油开发。\n\n这一决策，虽令人扼腕，但为了帝国的持续繁荣，我们必须采取所有必要措施。"
 ITA_libyan_oil:0 "利比亚石油"
 ita_work_for_italy:0 "为意大利工作"
 ita_work_for_italy_desc:0 "无论领袖身份如何，他绝非一毛不拔之辈。与其他国家贪婪的资本家不同，他极其重视那些勤劳高尚的工人，尤其是那些以汗水浇灌国家进步之花的勇士。他深知，历史上最需要工人的时刻，就是今日。我们将公开宣布，向投身石油行业的工人提供丰厚的激励，对那些在利比亚沙漠油田中不畏酷暑、加班加点的工人，更将提供优渥的住宿条件。所提供之福利包括但不限于：薪酬提升、经济援助、配给增加，以及为派往新建利比亚“油营”的工人提供食宿补贴，他们将在那里安居，直至石油危机结束。虽然这意味着我们的预算资金将有所削减，但为吸引更多劳动力，我们必须不遗余力。"
 ITA_libyan_oil_1:0 "利比亚石油"
 ita_work_or_else:0 "不劳无获"
 ita_work_or_else_desc:0 "利比亚产出的石油，如今成了我们经济存续的命脉。为了补偿阿拉伯地区减少的产量，我们可能需要采取极端措施来增加产出。正所谓“非常时期，非常手段”，若需强制那些不愿在沙漠中长时间劳作的人劳动，那也在所不惜。帝国安危之际，我们不应纠结于生存手段的细节，而应着眼于成功的必由之路。"
 ITA_libyan_oil_2:0 "利比亚石油"
 ita_tame_the_six_legged_dog:0 "驯服“六脚狗”"
 ita_tame_the_six_legged_dog_desc:0 "在意大利的版图上，埃尼集团是最具影响力且至关重要的公司，没有之一。该公司控制着大量的石油资源，成为意大利维持帝国统治的重要工具。\n\n这家公司，作为法西斯主义传统的延伸，一直是国家手中的提线木偶，其高层与国家领导层的关系错综复杂。这种关系在过去促进了双方的紧密合作，但现在看来，我们对他们工作的掌控力度已经不如预期，一些党派官员甚至更看重他们在公司中的个人财富，而非意大利的国家利益。亡羊补牢，未为晚也，我们必须提醒埃尼集团，它的一切运作都应以帝国的意志为依归。若他们心存异议……我们自有办法令其心服口服。"
 ita_sideline_mattei:0 "排挤马泰"
 ita_sideline_mattei_desc:0 "若想将埃尼集团高效地融入国家机构之中，我们需对董事长恩里科·马泰采取断然措施。公众几将马泰伊与公司视为一体，这实际上就是答案。马泰将公司视若掌上明珠，绝不会轻易在持久战中放弃其丰厚的财富。\n\n我们自有妙计以应对这位难缠的商界领袖。若与这位石油界的霸主协商无果，或许军队将出面相助，助我们一臂之力。"
 ita_sideline_mattei_tt:0 "§O国家将直接接管国家碳化氢公司。§!"
 ita_save_the_lira:0 "俭钱持家"
 ita_save_the_lira_desc:0 "寄希望于里拉自我稳定是不现实的。我们必须果断出手，稳固里拉之价值，以免经济在危机的重压下土崩瓦解。我们的货币价值将与黄金价格挂钩，以求价格稳定，结束其过山车般的波动。\n\n这一计划面临的唯一主要问题是，与瑞士和美国相比，我们的黄金储备捉襟见肘，此计划或将面临挑战。一些经济学家大胆提议，征用公民手中的所有可用黄金，既能增加黄金储备，同时激发黄金需求。待货币稳定后，便可在内外市场双管齐下，推动经济复苏。"
 ita_float_the_currency:0 "浮动汇率"
 ita_float_the_currency_desc:0 "初看稳定里拉汇率似乎是应对当前危机的良方，但这实则忽略了此举可能导致我们与美国、日本等重要贸易伙伴的市场隔绝的后果。在经济复苏的关键时刻，固定汇率更可能抑制我们的增长，使我们难以自拔。\n\n虽然允许里拉随全球市场力量波动可能带来一些风险，但无论形势多么严峻，这终究为我们提供了渡过经济难关的最佳机遇。"
 ita_float_the_currency_tt:0 "§O我们的经济会变得更不稳定，但增长速度会更快。§!"
 ita_gold_for_the_fatherland:0 "黄金献给祖国"
 ita_gold_for_the_fatherland_desc:0 "近日，意大利民众所能触及的报纸、广播、电视等传媒渠道，无一不在重复着一个直截了当、几近哀求的信息：为了国家大义，贡献出你们的黄金。在正常时期，政府向国民近乎索求个人财产，这听起来荒谬绝伦，专家定会嗤之以鼻。然而，现下形势危急，金融界如坠深渊，罗马政府正四处寻策，力图摆脱黄金过剩的困境。呼吁声此起彼伏，斯科尔扎更是亲自出马，恳请民众慷慨解囊，捐献出能省下的贵金属。在某些时候，这些请求几近强人所难，官员们暗示，拒不合作者或将面临责罚与报复。\n\n若局势不见好转，我们将不得不在全国范围内采取强硬措施。"
 ita_gold_for_the_fatherland_tt:0 "§O我们的经济将变得更稳定，但增长速度会放缓！§!"
 ita_weather_the_storm:0 "渡过难关"
 ita_weather_the_storm_desc:0 "经济灾难有如泰山压顶，我们唯有断然削减非必需开支。意大利民众将面临公共预算的紧缩。议会中或有人提议削减军费，但在波诡云谲的地缘政治局势中，我们不能显露出任何软弱的姿态。强大的军队是必要的，以威慑北方的德国人，确保我们那些悬于一线的领土和属地的安全。\n\n基础设施将首先接受审查；目前我们的道路尚可勉强使用。随后，所有部门都可能面临削减。社会安全计划亦难逃削减命运，这可能是我们迄今采取的最极端措施之一。然而，越早解决这些问题，生活就越有可能早日回归正轨。"
 ita_intensify_SIM_activity:0 "加强军情局活动"
 ita_intensify_SIM_activity_desc:0 "总指挥部3329号备忘录：\n\n若要成功应对当前局势，必须搜集一切可能的情报。我们已向殖民地各部下达指令，搜集一切相关数据以供罗马深入分析。我们需要一切信息，哪怕是最微小的细节，都可能影响战斗、行动、战役甚至战争的结果。\n\n根据斯科尔扎领袖的命令，所有目前正在执行非必要任务的军事情报局人员将立即被调往海湾和黎凡特地区。需要尽快分配关于分析敌对势力局势、地形测绘、密码破译以及其他与即将到来的战争密切相关的任务。"
 ITA_servizio_informazioni_militare:0 "军事情报局"
 ita_full_mobilization:0 "全面动员"
 ita_full_mobilization_desc:0 "为了避免在非洲沙漠中陷入持久战，我们必须动用一切力量。如果我们在战斗中中途耗尽了石油，那么即使是上帝也无法拯救我们；更糟糕的是，这将进一步加剧已经受创的经济，使其为一个无法解决的困境提供资金。对外来媒体来说，这可能显得过于夸张，对普通民众而言，这或许看起来毫无必要，但在国家存亡面前，他们的看法无足轻重。\n\n号角已吹响，战鼓已擂动！我们将孤注一掷，希望我们的火力优势能够为我们带来胜利。坦克、炮兵、战机、舰船、士兵，一切都已准备就绪。各师团严阵以待，各飞行中队枕戈待旦，各舰队蓄势待发；意大利的军力将全面动员。我们将全力以赴，让任何敢于挑战我们的敌人感受到神的威严！"
 ITA_full_mobilization:0 "全面动员"
 ita_vincere_e_vinceremo:0 "我们必将胜利"
 ita_vincere_e_vinceremo_desc:0 "领袖的面容将映照意大利的千家万户，愿其演讲传遍世界每一个角落。他的面容显得冷峻，宛如一张冰封的面具，掩藏着内心的熊熊怒火。意大利人民将屏息以待，聆听领袖的宣告，随时准备在他点燃意大利的激情之时，投身于爱国的热潮。\n\n\"我的人民，我们的国家正面临严峻的考验。敌人误判形势，妄图撼动意大利的根基。他们期望我们屈服，希望我们成为历史上的败将，而非胜利者！他们大错特错，他们的误判将成为他们的坟墓。我们难道要屈服于他们的威逼吗？难道要因向微不足道的王侯折腰而蒙羞吗？绝不！我们将向他们证明，与意大利及其人民为敌是何等的愚蠢。沉睡的狮子将从睡梦中苏醒，以震天之吼，再显昔日英姿。\""
 ita_the_best_defense_gamer:0 "守为上策"
 ita_the_best_defense_gamer_desc:0 "“为国为民，我们誓将粉碎所有威胁我们繁荣与利益者。若敌人以为我们会在那些新兴国家和野心家面前屈服，那便是大错特错，他们未能洞察意大利帝国现任领袖的坚毅本色。我们将以反抗之吼声，心中怀着胜利的信念，勇往直前。\n\n勇士们，你们肩负护国之责，任何敢于挑战我们的敌人都将被你们击溃。我们将直捣黄龙，毫不留情。他们现在自诩为意大利人民之敌，但没几天好日子了，他们不久便将自食恶果，悔不当初。”"
 ita_formulate_a_plan:0 "制定计划"
 ita_formulate_a_plan_desc:0 "我们的资源有限，须审慎择路而行。沙特与复兴党皆有其难题，若我们决定对任何一方采取行动，对策亦需因人而异，然鱼与熊掌不可兼得。军事情报局精英与总指挥部已确认，我们的后勤无法同时充分应对两方的压力。\n\n尽管如此，我们将汇集关于这两个团体的所有有用情报，制定出可行的行动和战役计划。俗话说，知己知彼，百战不殆。当决定采取行动的时刻到来，我们将通过这些精心制定的计划来引导国家的力量。至于这股力量将用于对抗哪一方，还有待观察。"
 ita_strike_the_saudis:0 "打击沙特"
 ita_strike_the_saudis_desc:0 "我们与沙特人的关系，或许早已注定分道扬镳，不过是时间早晚的问题。一个由只图利益、不顾其余的叛军之子所统治的国家，怎能与我们携手同行？尽管我们对这些昔日盟友以礼相待，他们却在风云突变之际，立刻与我们割席断交。他们应当自知，他们只会有一种结局，也应有先见之明，预见到我们的反击。无论是出于愚蠢还是过分自信，如今原因已不重要了。斯科尔扎领袖不会容忍这些不可靠的人物潜藏在我们的暗处，手执利刃，伺机而动。"
 ita_strike_the_saudis_tt:0 "§R我们将着手准备与沙特阿拉伯开战。§!"
 ita_ancient_problems_modern_solutions:0 "旧疾新方"
 ita_ancient_problems_modern_solutions_desc:0 "尽管世界历经变迁，然而万变不离其宗。追溯至千年前，中东便已是王室争斗的沙场，各家族间的尔虞我诈，至今依旧。\n\n沙特家族在阿拉伯半岛上长期占据着统治地位，但暗流涌动，无数势力正觊觎着他们的权位，静待时机，以期重登巅峰。历经数百年的统治，沙特家族自然树敌众多，我们很容易利用这些敌人去反抗他们。\n\n从部落武装到什叶派民族主义者，再到复兴党中的异见分子，他们虽立场各异，却因共同的目标——终结沙特对两圣地及石油资源的控制而联合起来。在意大利的军火支援和军事情报局的运筹帷幄下，我们将汇聚这些力量，铸就一支能够撼动沙特政权的铁军。"
 ita_ancient_problems_modern_solutions_tt:0 "§Y我们将开始构建反沙特的公众支持。§!"
 ita_contact_with_OIRAP:0 "接触阿拉伯半岛伊斯兰革命组织"
 ita_contact_with_OIRAP_desc:0 "中东地区错综复杂的矛盾之一，便是伊斯兰教两大派系：逊尼派与什叶派，绵延数百年的深仇大恨。区域内的多数国家倾向于支持某一派别，但这并未减少因宿怨而激进的少数派之存在。若要撼动沙特的根基，与阿拉伯半岛伊斯兰革命组织接触，不失为一步好棋，该组织乃沙特境内最突出的什叶派激进势力。他们虽决心为信仰而战，但规模有限且资源不足，难以抗衡沙特的强大势力。在这方面，我们或许能够施以援手。"
 ita_contact_with_OIRAP_tt:0 "§M我们将尝试与沙特阿拉伯的什叶派叛军谈判。§!"
 ita_mezzaluna_sciita:0 "什叶星散"
 ita_mezzaluna_sciita_desc:0 "中东大地上，什叶派团体和组织如星散沙，它们的目标相似，甚至可以说是一致的。它们力图推翻沙特的地区霸权，欲在沙特和伊拉克等国推广其伊斯兰教义。然而，这些团体之间却互不联络，如同散沙一般，容易成为政府军警易于打击的目标。目前，它们还没有足够的理由让我们投入宝贵的资源去支持它们。若我们能架起沟通的桥梁，加强这些团体之间的联系，或许能将它们塑造成为有力的盟友。尽管在达成我们的目标后如何与什叶派相处尚无定论，但至少在目前，它们可能成为我们的助力。"
 ita_mezzaluna_sciita_tt:0 "§M伊拉克的霍梅尼派可能是我们对抗沙特的盟友。§!"
 ita_sek_dentent_with_the_baath:0 "同复兴党缓和"
 ita_sek_dentent_with_the_baath_desc:0 "沙特君主制的阴影如悬在中东上空的达摩克利斯之剑，令复兴党构建泛阿拉伯国家的梦想遥不可及。沙特凭借其雄厚的军事实力和石油资源，在与复兴党的潜在冲突中总是占据上风。然而，若有如我们这般的外援——哪怕是出于利益——站在复兴党一边，局面或许会有所转机。\n\n这些民族主义者并不傻，他们岂会将我们当作挚友，但为了达成宏图，他们深知必须让心中的务实主义超越悲观情绪。在踏入沙漠之前，我们必须与他们迅速缔结同盟，或至少确保一项互不干涉的共识。"
 ita_sek_dentent_with_the_baath_tt:0 "§M我们将寻求与复兴党的合作，以共同对抗沙特阿拉伯。§!"
 ita_the_invasion_plan:0 "准备入侵"
 ita_the_invasion_plan_desc:0 "制定一个全面的入侵策略对我们至关重要。未雨绸缪，方能避免在补给线上的潜在困难，否则任何轻率的尝试都将让我们功败垂成。由于补给难题，我们显然无法动用全部兵力，因此所派遣的部队必须是精挑细选的精英，或许是在阿尔及利亚和黎凡特战场上历练过的老兵。\n\n胜利之后，我们的使命并未结束，而是要迅速转入占领和稳定地区秩序的新阶段。沙特人绝不会顺从我们的统治，我们选择的新政权领导者，将对这片土地的长远未来产生深远的影响。"
 ITA_invasion_of_arabia:0 "入侵阿拉伯"
 ita_the_party_of_god:0 "上帝的狂欢"
 ita_the_party_of_god_desc:0 "在阿拉伯的广阔战场上，一旦我们发起攻势，与什叶派各团体的通力合作至关重要。然而，目前我们能否有效协调起他们，情况并不乐观。为了避免与这些新结交的盟友之间出现沟通上的灾难性断裂，我们已策划了一个机智的对策。我们将利用我们影响下的当地人，组建一个由阿拉伯人主导和运作的组织，其根本目的在于为我们的利益铺路，通过疏通协调、沟通和后勤的脉络。这个组织将成为我们在招募和组织抵抗力量时的门面。鉴于许多叛军团体是受宗教情感所驱动，我们赋予了这个新生力量一个响亮的名字——“真主党”。"
 ita_support_friendly_baathists:0 "支持友好的复兴党成员"
 ita_support_friendly_baathists_desc:0 "并非所有复兴党人都能被一视同仁。在与我们的共同对手沙特较量时，拉拢他们的支持是自然而然的事，但我们也不能忘记，有些人可能在局势稍微平息之后就会立刻反目。我们之所以陷入这种境地，部分原因是过于信任那些不可靠的沙特人。我们自然不会再次陷入同样的误区。叙利亚的复兴党似乎是该地区所有与我们志同道合的团体中最愿意合作的，我们可以通过让他们出面对抗那些威胁我们势力范围安全的势力对其加以利用。尽管有人试图拉拢叙利亚加入一个泛阿拉伯国家，但若我们能将这样的潜在威胁紧握在手，或许可以防患于未然。"
 ita_support_friendly_baathists_tt:0 "§M我们将向接受我们提议的人提供所需装备。§!"
 ita_spies_among_the_dunes:0 "沙海谍影"
 ita_spies_among_the_dunes_desc:0 "红海之滨，沙丘小镇，我们的特工潜行其间，伺机而动。军事情报局的眼线深植于利雅得、吉达乃至麦加的大街小巷，透过窗帘缝隙中的望远镜，默默监视着官员和军营的动向。在沙特阿拉伯的每一个角落，我们都有眼线，一有风吹草动，消息便如飞鸟传书，迅速而至。那些播撒下的混乱之种一旦萌芽，我们的特工便会即刻上报。他们或许还会留下一些令人费解的离别礼：一间外国人下榻的酒店房间突遭爆炸，一个神秘焚毁的补给站，一位中层部长在自家府邸中意外身亡。然而，真相究竟如何，唯有天知地知。沙特人可能永远无从得知，但对于那些隐于幕后的无名暗影而言，真相或许昭然若揭。"
 ITA_invasion_of_arabia_1:0 "入侵阿拉伯"
 ita_il_duce_and_the_ayatollah:0 "领袖与阿亚图拉"
 ita_il_duce_and_the_ayatollah_desc:0 "伊拉克沙漠上空，一架直升机缓缓降落在特别建造且严密防护的着陆坪上。舱中端坐的是伊拉克伊斯兰达瓦党领袖阿亚图拉·霍伊，作为地区内颇具影响力的什叶派领袖，他应斯科尔扎领袖之邀，带着缔结联盟的使命前来会盟，此联盟的真实意图尚待揭晓。\n\n未来数日，两位领袖将就沙特阿拉伯乃至整个中东的未来展开深入且激烈的讨论。斯科尔扎领袖将唤起阿亚图拉对墨索里尼“伊斯兰之剑”的记忆，而阿亚图拉则提醒领袖帝国主义承诺的不可靠性。或许，这场讨论的开端正逢其时，因为它们必将历经时日，方能达成共识。"
 ita_isolate_nasser:0 "孤立纳赛尔"
 ita_isolate_nasser_desc:0 "复兴党在我们的阿拉伯争夺战和帝国的未来中，无疑将成为我们的得力助手。然而，同样关键的是认识到，推崇复兴党理念中的泛阿拉伯主义愿景，可能会唤醒我们殖民地内部的民族主义情绪——这些情绪可能引发我们目前难以驾驭的风波。这就让我们不得不警惕埃及的上校贾迈勒·阿卜杜-纳赛尔，他对于建立阿拉伯联合共和国的宏伟梦想一直是我们的肉中刺。支持民族主义团体，若无意中触发了对我们自己帝国的致命打击，对我们来说绝非幸事。纳赛尔一直在与叙利亚的民族主义者勾结；我们不能让这种情况继续下去。"
 ita_isolate_nasser_tt:0 "§M我们将要求埃及留在我们的势力范围内，不得加入阿拉伯联合共和国。§!"
 ita_the_qatif_uprising:0 "卡提夫叛乱"
 ita_the_qatif_uprising_desc:0 "阿拉伯半岛伊斯兰革命组织对我们秘密输送的武器、地图以及通信与后勤支援赞不绝口。我们的线人已向我们透露，我们的新盟友已整装待发，准备迎战强敌。行动的号角已经吹响，局面已定，木已成舟。在卡提夫地区，一场装备精良、资金充裕的起义即将爆发，而当这场混乱在我们看来达到顶点时，我们将趁沙特人内顾之际，对他们发动突袭。我们并不真正期望阿拉伯半岛伊斯兰革命组织能一举成功，若他们功败垂成，对我们而言或许更为有利。我们所求的，无非是他们能引起足够的动荡，牵制住整个国家的注意力。"
 ita_pillars_of_sand:0 "沙柱"
 ita_pillars_of_sand_desc:0 "从现在起二十四小时，苏伊士、西西里和塞舌尔群岛的机场将有首批轰炸机中队起飞。他们将直指沙特的补给要地、前线防御工事和通信枢纽。紧接着的一个小时内，第二波攻势将如暴风骤雨般来袭，炸药将将桥梁、道路和机场化为乌有，令沙特军队寸步难行。若计划顺利，两小时后，蛙人和海军陆战队将夺取关键港口，我们的间谍将向复兴党和什叶派盟友发出起义的信号。沙特人将迅速失去对局势和国家的掌控，我们的主力部队将在所有战线上发起雷霆万钧的攻势。坦克、装甲车和步兵战车将如洪水猛兽般席卷一切，直至一切抵抗化为尘埃，正如那句古诗所言：\"此外，荡然无物。废墟四周，唯余黄沙莽莽，寂寞荒凉，伸展四方。\""
 ita_break_the_baath:0 "铲除复兴党"
 ita_break_the_baath_desc:0 "复兴党，一群心怀叵测的民族主义者和煽动者。虽然近年来我们与沙特人的关系不算和睦，但面对对我们领土完整的严重威胁，我们岂能掉以轻心，尤其是在复兴党所倡导的泛阿拉伯主义面前。相比之下，我们与沙特的小摩擦不过是细枝末节。更何况，在我们的危难时刻，沙特人本可以趁虚而入，却选择了伸出援手，这彰显了真正的友谊。泛阿拉伯主义的美梦，必将在我们的铁腕下化为泡影，灰飞烟灭。"
 ita_break_the_baath_tt:0 "§R我们将着手准备与所有泛阿拉伯主义势力开战。§!"
 ita_modern_problems_ancient_solutions:0 "今忧古解"
 ita_modern_problems_ancient_solutions_desc:0 "复兴党之所以势不可挡，是因为他们怀揣民族主义的炽热梦想，这理想固然崇高，却非我等所能容。自然之道，本是优胜劣汰，强者为尊，此乃不争之事实。然而，不论其动机是否光明磊落，民族自决之情操在历史长河中早已铸就辉煌，其力量不容小觑。对我们来说幸运的是，我们的盟友拥有一种同样强大的力量——信仰，一种原始而激进的信仰。昔日伊斯兰教之光辉，从伊比利亚半岛照耀至土耳其，横跨地中海，而今我们的沙特伙伴决心复兴这昔日荣光。对于神学之争，我们不以为意，但如果这有助于我们实现目标，我们将热情地接纳任何意识形态。"
 ita_modern_problems_ancient_solutions_tt:0 "§Y我们将开始构建反复兴党的公众支持。§!"
 ita_bombing_runs_begin:0 "轰炸任务开始"
 ita_bombing_runs_begin_desc:0 "在中东那片荒凉的沙漠和险峻的山区徒步作战，无异于攀登刀山火海。敌人们已经筑好阵地，补给线源源不断，而我们却要踏入他国领土，补给要么依靠海上补给线，要么就得仰仗沙特阿拉伯，这绝非上策。然而，我们自有妙策以扭转乾坤。炸弹若为奇策，轰炸机便是我们的王牌。中东诸国的空军与我们相比，不过是小巫见大巫，我们应立即利用这一优势，利用空中打击让他们打回原形。沙特的石油储备将为我们的飞机提供源源不断的动力，我们可以在真正踏上他们的土地之前，就让他们率先领教到战争的苦痛。"
 ITA_bombing_runs:0 "轰炸行动"
 ita_meet_with_faisal:0 "会见费萨尔"
 ita_meet_with_faisal_desc:0 "沙特阿拉伯的现任国王，一人之下，万人之上，堪称雄心勃勃，既拥抱现代化，又尊重传统，力图实现伊斯兰世界的大一统，同时却也是我们不容小觑的对手。这些标签单独看或许贴切，但若合而观之，仍未能全面描绘出费萨尔国王的复杂性。作为世界最富有国家之一的君主，他个性深邃，难以捉摸，这些描述不过是管中窥豹。\n\n斯科尔扎领袖，性格同样复杂，他已向这位穆斯林国王发出信函，提议会晤，以期重温帝国与阿拉伯的旧日情谊。"
 ita_embrace_salafism:0 "接纳瓦哈比教派"
 ita_embrace_salafism_desc:0 "瓦哈比主义，伊斯兰教中一个极端保守的流派，如今成了我们新盟友沙特阿拉伯的国教。然而因其极端主义和反西方倾向，这个教派在帝国内部并不被普遍容忍，我们一直认为，对于那些可能借助民族主义或恐怖主义集结口号发展的宗教，对其加以抑制对帝国的长远生存是必要的。尽管如此，目前的情况并没有让我们对这种伊斯兰教的解释有太大的改变，但我们似乎有些束手束脚。若我们继续禁止瓦哈比派神职人员在穆斯林聚居区传教，可能会丧失他们的信任，甚至导致联盟关系破裂，重蹈轴心国联盟的覆辙。因此，目前我们似乎别无选择，只能暂时允许这些煽动者和狂热分子按他们的意愿进行传教。这并不会带来太大的负面影响，不是吗？"
 ita_embrace_salafism_tt:0 "§M我们将支持萨拉菲派与泛阿主义者的斗争。§!"
 ita_no_mercy_for_terrorists:0 "对恐怖分子绝无怜悯"
 ita_no_mercy_for_terrorists_desc:0 "恐怖分子无权享受公民权利，无权享受司法权利，更无人权可言。他们已经背弃了道德，也丧失了人性。若他们不希望自己被视为恐怖分子，我们将遂他们的愿。我们的监狱不必提供常规的生活设施，因此将更加节省成本。我们将沿途建立一系列设施，用以囚禁那些扰乱和平的人，甚至可能公开我们对付这些罪犯的手段。或许，当这些毒蝎体会到其行为的沉重代价，他们将在未来学会三思而后行。"
 ITA_counter_terrorism_operations:0 "反恐合作"
 ita_convenient_friendships:0 "便利的关系"
 ita_convenient_friendships_desc:0 "媒体镜头下，历史性协议定格瞬间，费萨尔国王向那些渴望与这位世界首富、权势一时无两的人物交谈的记者和官员们投以温暖的微笑。虽然他平日沉默寡言，甚至略显忧郁，此刻的笑容却是真挚无伪。王国自身实力不容小觑，但若能与所谓的第四世界强国结盟，足以激发任何像费萨尔这样有抱负的领导人的激动。\n\n费萨尔国王身旁，斯科尔扎领袖静坐着，与国王的热情形成鲜明对比，他几乎面无表情。或许初看之下，人们会这样认为。但若细看，或许能发现他眉宇间隐约的不悦、嘴角的微扬、眉头的轻颤。这份联盟，或许并不像外界所宣传的那般水乳交融。"
 ITA_SAU_friendship:0 "意大利-沙特友谊"
 ita_the_soldiers_of_god:0 "天主的战士"
 ita_the_soldiers_of_god_desc:0 "信仰之力，历久弥坚，即便是在这个世俗化日益加深的时代，中东现在的权力博弈便是其力量的最佳证明。神学家们或许纠结于教条与经文之争，但对于斯科尔扎这样渴望行动与掌控权力的人来说，信仰真正的价值在于其能够影响和控制人心。沙特人早已洞察此道，自王朝崛起之时，便将瓦哈比派的教义与国家治理巧妙融合。我们可以从他们的经验中汲取智慧，将正义的愤慨化作策略中的一张王牌，以此制衡对手。"
 ita_lessons_from_graziani:0 "格拉齐亚尼的经验"
 ita_lessons_from_graziani_desc:0 "埃塞俄比亚征服的胜利一经宣布，便有部分顽固不化的当地人跳出来，不愿承认败北。他们幻想着以蚍蜉之力撼动我们帝国的战争巨兽。然而，元帅鲁道夫·格拉齐亚尼迅速击碎了他们的幻想。国际社会对此议论纷纷，斥之为野蛮行径，不人道之举，但那又怎样呢？战争本就是无情的炼狱，没有破釜沉舟的决心，就不可能取得最终的胜利。随着我们的军事行动如暴风骤雨般展开，一个又一个国家纷纷臣服于我们的力量之下，我们必将面对更多挑战。我们肯定会遇到类似的情形，不必多言，我们的回应将始终坚定不移且毫不留情。"
 ITA_graziani_lesson:0 "格拉奇尼亚的教训"
 ita_lines_in_the_sand:0 "沙中之线"
 ita_lines_in_the_sand_desc:0 "我们所熟知的中东，曾是第一次世界大战后外国干预下的人为产物，又在第二次世界大战结束之后，在本应成为地中海地区稳定之锚的三头同盟的失败中再次被塑造。然而，如今这样的愿景已化为泡影，中东地区诸多区域的统治权成了一个悬而未决的问题。一旦我们在那里重新确立了我们的地位，我们将对我们的合作伙伴沙特履行某些义务。我们在海湾地区已经保持了多年的强势地位，但或许与一个稳定而强大的盟友合作，我们可以在一定程度上惠及他们。或者，我们可以慷慨解囊，毕竟沙特阿拉伯从不吝啬于投入。"
 ita_raise_the_sword_of_islam:0 "执起伊斯兰之剑"
 ita_raise_the_sword_of_islam_desc:0 "尽管我们不遗余力地宣传，但仍有阿拉伯人将这场战争简单视为意大利与阿拉伯的争斗。然而，复兴党人的堕落和无神论给了我们和沙特盟友一个转变叙事的良机，让我们能够重新塑造这场战争的意义。\n\n借助沙特对伊斯兰圣地的控制和对宗教学者的广泛影响，我们可以将这场斗争描绘为伊斯兰与世俗的较量，而非一场殖民战争。如此一来，我们将赢得阿拉伯人的心与思想，不久也将赢得战争的胜利。"
 ita_ubi_solitudinem_faciunt:0 "荒土留孤影……"
 ita_ubi_solitudinem_faciunt_desc:0 "阿拉伯人对我们的善意置若罔闻。我们递出的和平与合作之手，他们却以怨报德，将之拒之门外。他们竟将我们视为比德国人更可恶的群体，此言已足使我们铭记。\n\n他们视我们为比德国人更甚的恶徒？那我们将以行动证明他们所言非虚。他们将为他们的不敬付出沉重代价，直至他们哀求我们让德国人来终结他们的痛苦。他们将以他们的石油、鲜血、生命，乃至子孙后代作为偿还。皇家空军的机翼将遮蔽天空，他们将在恐惧中四处逃散，却无处寻得庇护。他们将在火焰中无处遁形，无论是在家园里还是荒野中；他们的尖叫将被火焰吞噬。他们将向他们的伪神祈求慈悲，向那些被认为比德国人更无情的意大利人祈求慈悲。但他们的神明也将束手无策。因为，或许，我们的确是比德国人更无情的存在。"
 ita_pacem_appellant:0 "……呼唤和平声"
 ita_pacem_appellant_desc:0 "尘埃落定。\n\n那些反抗者的灰烬已随风飘散，中东地区终于迎来了久违的和平，而石油也再次顺畅地流向我们渴望的工业血脉。有人泣不成声，称我们为“恶魔”与“屠夫”，却依旧依赖着石油来驱动他们的汽车，温暖他们的家园。我们的石油。这些善良之人心里很清楚他们不能与石油断绝关系。温情无法供暖。我们铲除了那些阻碍全球发展的绊脚石，世人皆心照不宣，向我等投来赞赏的目光。\n\n我们为中东带来了和平，然而，能享受这和平果实的人已寥寥无几……"
