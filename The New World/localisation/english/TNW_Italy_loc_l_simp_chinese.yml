 lorenzo.1.t:0 "知识就是力量"
 lorenzo.1.d:0 "乔瓦尼·迪洛伦佐洞悉人心，知晓众多隐秘之事，这成了他独奏曲计划的基石。知晓他人的秘密，便能操控他们的命运，这正是他权力的来源。遏制激进主义，说到底，不过是揭开层层关系网，适时敲诈，以获取更多情报。一旦事件的全貌从迷雾中浮现，洛伦佐便能够精准施压，令任何阴谋与叛乱的大厦瞬间崩塌。意大利，或许永远无法领悟那些幕后英雄的恩泽，即便知晓也会选择无视。但这都无关紧要，因为正义的事业本身便是目的。许多人以为稳定源自人民的拥护，却不知恐惧亦是维系秩序的利器。"
 lorenzo.1.a:0 "他会了解，他会看见。"
 lorenzo.2.t:0 "正式的氛围"
 lorenzo.2.d:0 "知晓固然是好事，但独奏曲计划要实现其目标，还需更多行动的和弦。它需正式之氛围与权威之力，以便能够在不受质疑的情况下采取行动。所有参与的人都心知肚明，计划的全部内容不宜公开讨论。易招致专制之嫌与颠覆之诮。洛伦佐需要的，无非是一些官方的批准，来自恰当人士的默许，以及在必要时刻的默许。他还需要合作伙伴，而一个官方的身份便能带来这些。得到军事情报局的保证后，他便可以着手构建他的关系网。"
 lorenzo.2.a:0 "意大利将深深感激他们。"
 lorenzo.3.t:0 "与外国政府接触"
 lorenzo.3.d:0 "独奏曲计划非一人之力所能及。洛伦佐洞悉军事情报局需借外力相助的实质，故愿以事所需之谨慎与隐秘，与外界建立联系。他虽不通外交，却也得知美国与日本皆关注意大利王国的安定。他们定会全力支援罗马，以遏制激进之势，除颠覆之害，不计成本……"
 lorenzo.3.a:0 "我们的外国朋友会帮助我们。"
 lorenzo.4.t:0 "无声的需求"
 lorenzo.4.d:0 "意大利政府（或其使者）以一种含蓄委婉的方式向我们发出了请求。他们希望我们能用我们手中关于意大利公民的信息，去交换他们手中关于美国公民的情报。我们欣然接受了这一请求，并表示，为了欧洲的长远稳定和共同打击颠覆活动，我们愿意在未来与其继续携手合作。"
 lorenzo.4.a:0 "这将助力构建意大利民主的根基。"
 lorenzo.5.t:0 "微妙的请求"
 lorenzo.5.d:0 "罗马的军事情报机构——军事情报局，不按常理出牌，向我们提出了一个信息交换的请求。他们愿意以我们所掌握的某些意大利公民的信息，换取我们感兴趣的日本人的行踪和活动的信息，这些信息对我们来说至关重要。我们已欣然批准了这次交换，并期待着未来能有更多的合作，这将为意大利国家的稳定与繁荣添砖加瓦。"
 lorenzo.5.a:0 "这将有助于意大利国家的发展。"
 lorenzo.6.t:0 "监视工厂"
 lorenzo.6.d:0 "洛伦佐凭借其历练和所学的技能，得以洞悉他人所未见之事。面对工业会议室或工厂流水线，常人往往只见员工尽忠职守的姿态，而洛伦佐却能远见颠覆之徒。法西斯虽统治已久，社会主义的阴影却依旧笼罩着意大利的工业，洛伦佐深知，这表面之下潜伏着伺机撕裂经济之基的野兽。因此，监视工业行业、罗列左翼分子、筹划应对之策，显得尤为迫切。"
 lorenzo.6.a:0 "命运之轮，缓缓前行。"
 lorenzo.7.t:0 "控制文化"
 lorenzo.7.d:0 "极端主义并非空穴来风，并非源自个人心理与外部环境的简单交织。它更像是一种蔓延的病毒，主要通过文化来传播，而文化的宽容对颠覆性思想的纵容已久。洛伦佐深知，控制文化即控制国家，若媒体不愿自我约束，便需有人挺身而出，承担起这一责任。退让一寸，极端便生根发芽；后果之重，难以想象。"
 lorenzo.7.a:0 "将他们的所见所闻都控制在我们手上。"
 lorenzo.8.t:0 "不幸的事故"
 lorenzo.8.d:0 "独奏曲计划面临一场风波，若此事泄露，恐将影响计划的顺利进行。一位编辑因对军事情报局与媒体的勾结大加挞伐，随之不幸染上炭疽。然将此事与独奏曲计划相提并论，实为无稽之谈，这乃是颠覆分子企图搅乱意大利社会秩序的阴谋。尽管如此，我们必须与媒体携手，防止消息的蔓延。伴随着事件引发的恐慌，这或许能促使媒体听从我们的劝导。"
 lorenzo.8.a:0 "事已至此，随它去吧。"
 lorenzo.9.t:0 "幻术序幕"
 lorenzo.9.d:0 "进行魔术需耐心、时机与巧手。我们三者皆备，且绰绰有余。虽然参与者身份未明，但我们可以断言，今日仍在意大利作乱之徒，明日将无影无踪。他们既不会命丧黄泉，也不会身陷囹圄。他们将神秘消失。\n\n这是一场无需观众喝彩的幻术。"
 lorenzo.9.a:0 "唯余阴影。"
 lorenzo.10.t:0 "先知"
 lorenzo.10.d:0 "意大利极端势力遭遇了致命一击，难以东山再起。一些人如烟雾般消散，仿佛从未踏入此地。虽有传言称门扉间影影绰绰，夜半惊叫声声，以及暗夜中的争斗，但这些皆未成定论。唯一确定的是，那些消失之人不会归来，而意大利因此得以宁静。"
 lorenzo.10.a:0 "再无波澜。"
 lorenzo.11.t:0 "和军队打交道"
 lorenzo.11.d:0 "极端主义如影随形，连武装力量也难以幸免。所幸，我们的朋友博尔盖塞在军中始终不遗余力铲除一切颠覆行为，他总是以雷霆手段镇压，即便存在于他所指挥的士兵中。虽然我们有能力自行遏制军中的极端主义，但将信息交给博尔盖塞更为明智，他定能事半功倍。毕竟，何须画蛇添足，当已有妙手解连环？"
 lorenzo.11.a:0 "纪律将被强调。"
 lorenzo.12.t:0 "金融界友人"
 lorenzo.12.d:0 "国内的一些颠覆分子，有些人对权力的运作偏执地抱有异想天开的看法：他们幻想一群财阀、政治家和情报机构的头目在幕后操纵着意大利。当然，这个世界远比这复杂得多，我们的金融界友人追求的无非是大众的稳定与繁荣。独奏曲计划的支持者有着广泛的人脉，但就资金支持而言，金融界的人士对我们最为有益。必须维护这些关系的和谐与互利，以维系我们为意大利服务所建立的长久友谊。"
 lorenzo.12.a:0 "友谊是如此美好。"
 lorenzo.13.t:0 "常态保证"
 lorenzo.13.d:0 "塞萨尔·梅尔扎戈拉，身为我们政治界众多坚定支持者之一，目前承担着一项艰巨的任务。近日，一位报纸编辑的意外离世，加之独奏曲计划的某些行动，我们的一些支持者开始质疑我们的决策是否过于激进。梅尔扎戈拉的使命，是向这些疑虑重重的人证明，尽管这些事件看似残酷无情，动摇人心，但对于独奏曲计划而言，我们的未来之路只会温和而稳健。他们只需信赖他的话语，让既定的体制发挥作用。无谓的怨言和疑虑，只会徒增困扰。"
 lorenzo.13.a:0 "一切都是为了意大利！"
 lorenzo.14.t:0 "与君主派对话"
 lorenzo.14.d:0 "为了实现独奏曲计划，我们已与投身意大利民主活动的君主主义者展开对话。得益于我们与保皇派高层的紧密联系，这些交流变得相对容易，我们向他们传递了对他们诚意的信任。然而，我们也对他们与企图复辟法西斯的极端分子的联系表示了遗憾。我们坚信，这些分子有害无益，不应在意大利政坛占有一席之地。我们相信，这些会谈将取得丰硕成果。"
 lorenzo.14.a:0 "他们会听的。"
 lorenzo.15.t:0 "与社会主义者对话"
 lorenzo.15.d:0 "为推动独奏曲计划，我们正与意大利社会民主党展开积极对话。凭借对其党派策略的深刻理解，我们直言不讳地指出了他们与共产主义分子勾结的症结。我们表示，这实在令人惋惜，毕竟我们手握大量揭示了左翼激进主义的隐患的文件，我们绝不会容忍这种人的存在。若不根除这些激进分子，对所有在民主体系里面运作的人都是一大损害，社会主义者或将失去参与意大利民主的机会。我们相信，这番对左派的忠告，定非徒劳无功。"
 lorenzo.15.a:0 "他们会理解的。"
 lorenzo.16.t:0 "与中道派对话"
 lorenzo.16.d:0 "为了意大利的长治久安与繁荣昌盛，我们已与基督教民主党及民主体系中的各党派进行了深入对话。由于我们对中间派的目的有着深刻的理解，这些对话变得水到渠成，我们对他们坚守中庸之道、在意大利选民中推广温和政治的做法表示了赞赏。对于即将到来的选举，我们为他们送上最诚挚的祝福，同时提醒基督教民主党的领导人们，必须警惕激进思潮在他们中的任何萌芽迹象。我们对此将保持高度警觉，相信中间派会将我们的忠告铭记于心。"
 lorenzo.16.a:0 "他们会同意的。"
 itaelections66.1.t:0 "选举伊始"
 itaelections66.1.desc:0 "意大利的百姓们早已习惯了在白日劳碌后，归家打开电视，沉浸在意大利广播电视公司带来的晚间节目中。不论是遥远帝国边陲的异域风情，还是扣人心弦的爱情故事，抑或是名人雅士的闲谈趣闻，总能让人放松心情。然而在那个夜晚，他们却在荧屏上目睹了一幕前所未有的景象——一场政治辩论。\n\n在罗马一个简朴的电视演播室内，三位男士坐在塑料椅子上，彼此间的目光充满了紧张和对抗，一位记者正就各种问题对他们进行采访。当谈及自己的经济计划时，阿尔多·莫罗用他那沉着而坚定的声音说道：“……我们并不主张国家统管一切经济活动，但国家在其权力的复杂性中，应协调、规范并引导个人的主动性……”\n\n面对关于其议程中社会主义色彩更浓的部分的提问，彼得罗·南尼以他那热情洋溢且毫不妥协的语调直言不讳：“我要直截了当地说，社会主义不过是要让那些生来处于不利位置的人有机会迎头赶上！”而当乔治·阿尔米兰特被问及对法西斯和民主的看法时，他带着狡黠的微笑回答：“我在法西斯主义下出生并成长，我对它深信不疑，甚至为其所有错误辩护或视而不见。那是我的过去，我们共同的历史——我们无法抹去。我们应该努力，让其积极的一面得以延续。”那晚，意大利的家家户户都目不转睛地盯着电视屏幕，连那些还不太能理解三位老人讨论内容的孩子们，也直觉地感到这只是一个更大变革的序幕。"
 itaelections66.1.a:0 "莫罗似乎最合理。"
 itaelections66.1.b:0 "南尼是对的！"
 itaelections66.1.c:0 "阿尔米兰特说得有道理……"
 itaelections66.2.t:0 "女性参政"
 italelection66.2.desc:0 "在这个瞬息万变的世界中，社会角色和传统往往并非如初见那般坚如磐石。随着这波自由化的浪潮，不少意大利新兴政党和政治团体中的活跃分子，出人意料地是女性——她们的政治立场或许会颠覆你的预期。卡拉·德·保利，国民联盟旗下广受欢迎的《意大利人》报的掌门人，她发出了一份情真意切的呼吁，号召意大利女性远离女权运动的甜言蜜语，重拾她们作为家庭的中流砥柱和温馨港湾的传统角色。\n\n然而，更为嘹亮的呼声来自左翼。莉娜·梅林，意大利社会党的杰出人物，民主阵线的国会候选人，已化身为意大利女权运动的领军人物。她在离婚和继承等议题上积极倡导实现男女平等，主张根除国家经营的妓院，并发起成立了意大利女性保卫联盟，一个集结了全国诸多女权组织的游说团体。\n\n中间派的回应也不甘示弱。在基督教民主党的一次集会上，天主教运动的新星蒂娜·安塞尔米，以一番慷慨激昂的演讲，强调了意大利女性与国家同步前进的必要性，她主张在职场上为女性争取平等的机会——包括更合理的薪酬、更健全的社会保障，以及针对乡村女性的更优质教育资源。随着许多意大利女性和女孩感到她们第一次获得了发声的机会，她们将如何巧妙运用这股新生力量？政治舞台正拭目以待。"
 itaelections66.2.a:0 "必须维护传统家庭观念。"
 itaelections66.2.b:0 "必须为女性解放而奋斗！"
 itaelections66.2.c:0 "平等机遇对意大利全体人民都有好处。"
 itaelections66.3.t:0 "政界中的学生"
 itaelections66.3.desc:0 "意大利的年轻一代始终热衷于政治。法西斯曾企图将这份青春活力纳入大学生法西斯组织等组织，这铸就了意大利大学参与国家政治生活的传统。果不其然，许多意大利年轻人被左派承诺的文化和学术自由化议题所吸引，马克思主义和社会主义文献如野火燎原般迅速传播，意大利社会主义青年联盟、学生运动等组织正以惊人的速度壮大，社会主义和共产主义思想流派间的竞争也已悄然兴起。\n\n正如行动引发反作用，右翼的反应也随之而来。全学阵，即FUAN，改革了旧的大学生法西斯组织和其他法西斯时代的组织，迅速地将意大利大学的所有右翼学生团结在自己旗下。极右翼对青年的影响在米兰市中心附近的圣巴比拉广场以一种几近公开的新法西斯主义青年团伙的形成作为其表现。即便是国民联盟也对\"圣巴比拉人\"持怀疑态度，他们已开始与该地区的小犯罪和骚乱联系在一起。\n\n由于青年特有的激进主义和理想主义，中间派也意外地吸引了相当一部分年轻男女。天主教行动和其他天主教运动，这些连法西斯政权也未能触及的组织，现在变得愈发重要。以米兰的圣心大学等天主教要塞为总部，他们最近的增长究竟有多少是出于学生的真诚信仰，又有多少是机会主义，尚难以明辨。"
 itaelections66.3.a:0 "青年应该为社会主义而奋斗。"
 itaelections66.3.b:0 "右翼学生为了意大利，团结一心。"
 itaelections66.3.c:0 "天主教运动应广泛传播。"
 itaelections66.4.t:0 "政界中的少数群体"
 itaelections66.4.desc:0 "意大利自古是文化、语言多元的国度，而二战吞并大片土地让此情况更进一步。如今民主回归，国家各个角落的少数族裔都在欢呼庆祝。民主，意味着法西斯的压迫不再，用本族语言、行本族文化的权利再归各族人民之手。万众齐步向前，从南蒂罗尔到利比亚，众新贵政客加入民主阵线。各种新组织与左翼联盟结盟，像塞弗兰·卡维里领导的瓦莱达奥斯塔联盟、多姆·明托夫领导的马耳他工党等等，它们希望这能为曾被法西斯政权忽视的社区、地区带来平等权利与政府援助。\n\n万事万物都有正反面，意大利也不例外，有一批同样凸出的运动对民主阵线抱有的左翼态度表示谨慎，于是转向基督教民主党。最著名的是西尔维乌斯·马尼亚戈领导的南蒂罗尔人民党、恩格尔伯特·贝塞德尼亚克牵头的斯拉夫人名单，分别代表南蒂罗尔的日耳曼社区与意大利东部的斯拉夫社区。他们关注经济、行政自治，通常代表各自地区保守派与自由派的中上层阶级。\n\n右翼的动向不出所料，立马调转枪口向各少数族裔运动，视他们为主要威胁。在的里雅斯特、达尔马提亚、利比亚等地的意大利社区，国民联盟发动宣传，谴责少数族裔侵犯意大利人的权利。国民联盟已成功左右了几个意大利社区，双方肩并肩，为本就有些紧张的民族关系火上浇油。它们可能会在这些边境地区取得可观的选举结果。"
 itaelections66.4.a:0 "意大利人民为平等共进！"
 itaelections66.4.b:0 "少数族裔社区理应享有自治权。"
 itaelections66.4.c:0 "这帮下等人应当认清自己的地位。"
 itaelections66.5.t:0 "政界中的军队"
 itaelections66.5.desc:0 "意大利军队与政治的纠葛，历来是波诡云谲，随着时光的流转而变化莫测。随着选举的脚步日益临近，不少军中的显赫人物，尤其是那些位高权重的将领们，纷纷表态支持国民联盟，这个党派宣传自己为意大利荣耀的守护者，抵御着左翼潮流和外来干涉的汹涌波涛。国民联盟正全力以赴，企图赢得那些军人的选票和某些关键人物的心，目前来看，他们的努力已初见成效。\n\n但是，并非所有军界人士都对阿尔米兰特及其党派持支持态度。在意大利军队中，一些资历深厚、享有崇高声望的成员，包括意大利元帅、传奇将领乔瓦尼·梅塞，公开支持基督教民主党。这些饱经沧桑、经验丰富的老将军和军官们，对国民联盟的强硬言论保持警惕，特别是在经历了第二次世界大战及其后导致众多意大利人牺牲的冲突之后。他们认为意大利军队应成为和平的使者，而非战争与侵略的工具，支持他们的呼声日益高涨。\n\n在普通士兵和年轻军官中，也出现了类似的趋势。他们同样厌恶政府以往轻易将意大利士兵置于危险之中的那些做法，许多人开始被民主阵线所主张的和平主义议程所吸引，虽然目前只有少数人呼吁意大利从海外逐渐撤回军力，同时减少军事开支，但这一趋势似乎正在悄然生根，未来它可能会成为一股不可忽视的力量。"
 itaelections66.5.a:0 "我们必须守护意大利的辉煌。"
 itaelections66.5.b:0 "我们应听从梅塞的建议。"
 itaelections66.5.c:0 "我们将踏上和平之路。"
 itaelections66.6.t:0 "工人的呼声"
 itaelections66.6.desc:0 "在法西斯独裁统治的年代，独立工会曾被无情镇压，取而代之的是工人几无发言权的国家机器。如今，随着民主春风吹遍意大利，新的工会应运而生，他们纷纷与选举联盟结成了紧密的同盟。民主阵线迅速赢得了工人阶级的人心，两大工会随之崛起：意大利总工会和意大利工会，它们均已成为民主阵线争取工人权益的坚强后盾。\n\n然而，并非所有工人都聚集在社会主义的旗帜下。国内另一大工会，意大利工会联合会，公开支持基督教民主党，在信仰天主教的工人阶层中赢得了坚实的支持。意大利工会联合会与基督教民主党的关系如同鱼水情深，得到了教会的鼎力相助，开始倡导通过对话和相互理解来解决工人阶级的困境，携手劳资双方共绘未来蓝图。\n\n至于那些规模较小的工会，它们大多受国民联盟操控——尤其是意大利国家劳工联盟。意大利国家劳工联盟在意大利工人中的支持可谓是微乎其微。实际上，国民联盟在这一问题上的立场颇为反工会，他们将意大利总工会、意大利工会联合会和意大利工会描绘成布尔什维克的温床，视其成员为不愿劳作的懒汉。"
 itaelections66.6.a:0 "意大利的工人们，联合起来！"
 itaelections66.6.b:0 "天主教教义将启迪这个国家的经济。"
 itaelections66.6.c:0 "我们不能信任工会！"
 itaelections66.7.t:0 "教会的参与"
 itaelections66.7.desc:0 "在天主教信徒云集的意大利，教会的政治影响力自然不容小觑，加上教廷就坐落在罗马城中的梵蒂冈城，两者的关系自然紧密。教会与基督教民主党的关系更是亲如一家，基督教民主党作为唯一一个公开信奉天主教的主要政党，其根基深植于天主教组织，这些组织在法西斯统治时期始终未被完全压制。基督教民主党也如教会一般，在进步与保守之间徘徊，它采纳了教会的社会教导，并将其转化为政治纲领。\n\n尽管教会明面上对基督教民主党鼎力支持，但同时也有一些神职人员持有异议。这些异见者多来自教会底层，是意大利大城市中的神父，尤其是那些经济较为落后的地区，他们或明或暗地支持民主阵线，希望借此改善城市中贫困阶层的生活。随着一些天主教知识分子也被民主阵线的理念所吸引，意大利的天主教似乎呈现出意料之外的左翼倾向。\n\n然而，在教会中，保守与反动的力量仍旧根深蒂固。在意大利的许多农村地区，教区和教堂不仅是信仰的圣地，更是反共宣传的堡垒。教会中的保守派，无论高低，对基督教民主党的改革主义和与民主阵线的公开性都持谨慎态度，而在那些民族保守意识较强的地区，国民联盟，正借此反动浪潮，乘风破浪。"
 itaelections66.7.a:0 "教会将为天主教徒之党撑腰！"
 itaelections66.7.b:0 "耶稣是第一位社会主义者！"
 itaelections66.7.c:0 "以神之名，必须阻截这些布尔什维克的狂澜！"
 itaelections66.8.t:0 "小党派"
 itaelections66.8.desc:0 "随着选举日的日益临近，三大主要党派正陷入一场你死我活的角逐，与此同时，一些小型政党也如雨后春笋般涌现，各自开展竞选活动，他们希望能在意大利选民中赢得一席之地。在意大利多党林立的政治格局中，即便是小党派也有可能成为左右政局的关键。其中，意大利自由党便是一个典型的例子，由乔瓦尼·马拉戈迪领衔。它是商业界的坚定盟友，与意大利工业和经济界的精英组织工业家总联合会等关系密切，其政治立场保守，偏向中右。出于对民主阵线所宣称共产主义的厌恶以及对基督教民主党进步政策的疑虑，意大利自由党可能会倾向于支持国民联盟。\n\n意大利共和党，由乌戈·拉·马尔法领导，也是一股不容忽视的力量。意大利共和党拥有悠久而高贵的历史传统，许多意大利反法西斯英雄的名字都与其息息相关。意大利共和党主张复兴马志尼对意大利国家的愿景，以改革和进步为竞选纲领，融合自由主义、反共和公民民族主义的理念，因此，意大利共和党与基督教民主党建立了合作关系，两者在许多议题上志同道合。\n\n此外，激进党虽小却声势浩大，由马尔科·潘内拉领导。激进党是自由主义和民权的坚定支持者，为妇女解放、反种族歧视、同性恋权益、支持选择权立法等议题大声疾呼。尽管其在自由市场和经济自由的立场上与民主阵线有所差异，但由于民主阵线是唯一愿意在这些议题上与他们携手的主要政治力量，激进党因此选择与他们站在一起。"
 itaelections66.8.a:0 "我们必须保护意大利企业的利益！"
 itaelections66.8.b:0 "马志尼之理想，意大利之舵。"
 itaelections66.8.c:0 "人民应得自由！"
 itaelections66.9.t:0 "大选前夕"
 itaelections66.9.desc:0 "随着选举的钟声渐渐敲响，国内外的博彩专家与分析师们正纷纷对意大利政治舞台的新面貌做出定论。据初步分析，最被看好的胜者是基督教民主党，这个党派根植于历史悠久的天主教组织，由于其与教会的深厚联系，法西斯政权始终无法将其连根拔起。基督教民主党作为中间派的代表，在中产阶级、广大意大利天主教徒和政治温和派中赢得了坚实的支持基础。\n\n紧随其后的是民主阵线，它汇集了基督教民主党之外的众多左翼组织。主要由意大利社会党和意大利社会民主党联合组成，民主阵线继承了反法西斯流亡和地下组织的遗志，虽受压制却始终活跃。其支持者主要来自社会的底层，包括工人、农民以及充满理想和热情的学生与青年。\n\n而在这场政治角逐中的黑马，当属右翼联盟——国民联盟。这个联盟主要由国家法西斯党的残余力量组成，在保守主义、民族主义和法西斯言论间徘徊。尽管联盟内部分歧重重，但在领袖乔治·阿尔米兰特的个人魅力下尚得以维系，它在意大利的传统乡村地区、前法西斯官僚和政治家以及一些激进的年轻法西斯学生中获得了坚实的支持。"
 itaelections66.9.a:0 "基民党！投基民党！"
 itaelections66.9.b:0 "同志，投给民阵吧！"
 itaelections66.9.c:0 "如果您不打算投票给国联，我们有的是办法让您改变主意…"
 itaelections66.10.t:0 "基督教民主党胜利！"
 itaelections66.10.desc:0 "众望所归，基督教民主党在选举中一举拿下议会的绝对多数，而民主阵线也不甘示弱，紧随其后。全国各地，支持者们的欢庆声此起彼伏，国王翁贝托二世在奎里纳尔宫亲自将意大利王国首相的重担交给了基督教民主党的候选人、前法学教授阿尔多·莫罗，并嘱咐他火速组建内阁。\n\n然而，胜利的喜悦背后，基督教民主党党内的分歧逐渐浮出水面。党内派系林立，从与商界、金融界和教会藕断丝连的温和派和保守派，到以莫罗及其得力干将阿明托雷·范范尼为代表的进步派，各执一词。党内的分歧主要集中在一个核心问题上：是否应该与民主阵线寻求和解，还是应该与他们结盟。\n\n尽管莫罗政府的蓝图尚未勾勒清晰，意大利社会对基督教民主党的胜选已乐观其成。工业家总联合会满怀期待，希望基督教民主党能引领意大利及其产业迈向繁荣新篇章。同时，全国上下，民众正拭目以待，许多人都在观望基督教民主党是否能够兑现其改善经济状况和工资的承诺。在无尽的期许与探寻中，意大利开启了历史的新篇章，一个我们渴望已久的时代，愿它以和平与民主的笔触，绘制未来的画卷。"
 itaelections66.10.a:0 "基民党万岁！"
 itaelections66.11.t:0 "民主阵线胜利！"
 itaelections66.11.desc:0 "法西斯统治落下帷幕，意大利的首次选举却爆出冷门，民主阵线这个新生的左翼联盟，竟以毫厘之差赢得议会的多数席位。意大利的街头巷尾，支持左翼的学生和工人们正欢庆胜利，而国王翁贝托在奎里纳尔宫正式接见了彼得罗·南尼，委以意大利王国首相的重任，并嘱咐他火速组建内阁。\n\n民主阵线的胜利连同其联盟成员都始料未及，许多人忧心忡忡，忧虑着他们手中脆弱的议会多数，加之选举联盟的松散本质，这个新生联盟的胜利可能不过是昙花一现。作为民主阵线中流砥柱的意大利社会党，由南尼亲自领军，已召开大会，寻求巩固议会控制权的策略。党内声望日隆的政治家朱塞佩·萨拉盖特，身为意大利社会民主党的领袖，正力推与意大利最大的党派、民主阵线的主要反对派基督教民主党结成联盟。\n\n然而，民主阵线内部也不乏反对之声，意大利社会党的极左派对此十分愤怒，他们正围绕在恩里科·贝林格这位有魅力的领袖周围，向萨拉盖特发起攻击。党内各派系扬言，如果他们的要求没有得到满足，就将从民主阵线中脱离，这使得南尼的首相之路充满变数。然而，可以肯定的是——国民联盟及其盟友已誓言与民主阵线斗争到底，并宣布他们准备在议会和意大利各地与新政府展开较量。意大利人民带着对未来的无限遐想，见证着意大利步入其历史的新篇章，这一篇章的终章尚待书写。"
 itaelections66.11.a:0 "前进！"
 itaelections66.12.t:0 "国民联盟胜利！"
 itaelections66.12.desc:0 "局势之转向出乎意料，意大利自法西斯时代后的第一次选举的胜利者是与前政权联系紧密的选举势力——国民联盟。脸色阴沉的国王翁贝托二世召唤了联盟的领袖乔治·阿尔米兰特，将他召入奎里纳勒宫并委任他组建新政府，愤怒的左翼人群攻击国民同盟组织的庆祝集会，骚乱已经在几个意大利城市爆发。\n\n国民联盟本身似乎也对当前发展无所适从，并且联盟看起来早已陷入了一场身份认同危机。国民联盟许多人是民族保守分子，与君主制和意大利政府及其经济的上层部分联系紧密，国民联盟一个大派别由死硬法西斯分子组成，他们中大部分直接来自已经解散的前法西斯党高层，而阿尔米兰特自己，联盟兼意大利社会运动领袖，也是国民联盟的主要派别。\n\n意大利街道早已回响着法西斯分子将接管政府的传闻，阿尔米兰特和他的人必须快速平息不可避免的危机。国民联盟和MSI发出声音，老政治家的头领和联合政府的幕后操纵者奥古斯托·德·马萨尼奇乞求阿尔米兰特摒弃公然的法西斯式言辞，与新体制和解，但另一方面，激进的新生代法西斯主义者，例如皮诺·罗蒂，在党内愈发具备影响力，并表示反对任何妥协。尽管如此，有一件事是铁板钉钉的——意大利进入了一个新的历史阶段，但与上一阶段相比可能并没有太大不同。"
 itaelections66.12.a:0 "看来我们的法西斯主义还没完呢…"
 itaelections66.13.t:0 "1969年大选"
 itaelections66.13.desc:0 "随着意大利第二届大选的脚步日益临近，竞选的号角已经吹响。在意大利各地，各种政党的广告铺天盖地，他们利用一切可以利用的手段进行宣传，这令许多意大利人不胜其烦。\n\n在这场争夺意大利控制权的较量中，自上一次选举以来，局势似乎并未有太大变化：中间派的基督教民主党，作为上一次选举中被看好的热门；保持左翼联盟的民主阵线；以及保守的国民联盟，他们再次为了争夺议会的多数席位而展开激烈角逐。尽管现任联盟有望继续执政，成为多数派政府，但分析人士指出，目前少数派政党赢得意外胜利的可能性也并非为零。\n\n当成千上万的意大利人踏上前往投票站的旅程，他们手中的选票，就是决定意大利命运的钥匙。现在，是时候让意大利人民用他们的智慧和判断，去书写属于他们自己的未来篇章了。"
 itaelections66.13.a:0 "咚咚，请开……"
 ITA_declining_trade:0 "贸易衰退"
 ITA_declining_trade_desc:0 "由于OFN与共荣圈实行严格的贸易限制，加之与团结协定的关系恶化，我国贸易难以涉足地中海之外的市场，因而陷入瘫痪。所幸三头同盟之间的贸易让我们得以赚取一点利润，使我国的贸易免于消失殆尽，现属于意大利的苏伊士运河也能提供一条进入印度洋市场的路线。"
 ITA_declining_trade_first_countermeasures:0 "贸易衰退"
 ITA_declining_trade_first_countermeasures_desc:0 "我们近期在开辟新航线和降低贸易壁垒上的不懈努力，已经让我们的经济有了虽微小却显而易见的进步。我们尚未回到冷战前的辉煌，但复苏的曙光已经初现，我们正昂首阔步在复苏的大道上。"
 ITA_king_umberto:0 "翁贝托二世国王"
 ITA_king_umberto_desc:0 "作为带领意大利在世界大战中走向胜利并一雪前耻的英雄国王埃马努埃莱三世的儿子，翁贝托的面前绝对有着一座难以跨越的高峰。但就算如此，他依旧证明了自己作为统治者还是颇有能力的。即使德国仍在北方虎视眈眈，亚得里亚海岸也依旧是一片满是盐碱的不毛之地，他还是以自己和平国王的形象维持了民心安定。然而，他经年累月对法西斯党积累的不满却越来越深，这点在将来可能会产生重要的意义。"
 ITA_economic_panic:0 "经济恐慌"
 ITA_economic_panic_desc:0 "最近的事态发展彻底摧毁了我们的经济。如果我们想生存下去，就必须从头开始重建。"
 ITA_economic_panic2:0 "经济恐慌"
 ITA_economic_panic2_desc:0 "最近的事态发展彻底摧毁了我们的经济。如果我们想生存下去，就必须从头开始重建。"
 ITA_economic_panic_abroad:0 "经济恐慌"
 ITA_economic_panic_abroad_desc:0 "最近的事态发展彻底摧毁了我们的经济。如果我们想生存下去，就必须从头开始重建。"
 ITA_victor_emmanuel:0 "维托里奥·埃马努埃莱国王"
 ITA_destroyed_trade:0 "崩溃的贸易"
 ITA_failingfascism:0 "衰落中的法西斯"
 ITA_navy_strengthened:0 "海军为重"
 ITA_navy_strengthened_desc:0 "近年来，意大利政府聚焦于发展皇家海军。海军获得了大量经费用以支撑其庞大舰队的运转。我们因此成为一股海军强权，而这也是维系我们帝国的关键。"
 ITA_even_further_beyond:0 "海军霸权"
 ITA_even_further_beyond_desc:0 "近年来，意大利政府聚焦于发展皇家海军。海军获得了大量经费用以支撑其庞大舰队的运转。我们因此成为一股海军强权，而这也是维系我们帝国的关键。"
 ITA_scorza_carrier_plane_priority:0 "舰载航空国策"
 ITA_navy_strengthened_2:0 "海军为重"
 ITA_navy_strengthened_2_desc:0 "近年来，意大利政府聚焦于发展皇家海军。海军获得了大量经费用以支撑其庞大舰队的运转。我们因此成为一股海军强权，而这也是维系我们帝国的关键。"
 ITA_anarchy:0 "意大利无政府状态"
 ITA_anarchy_desc:0 "多年的政治僵局、贸易衰退和社会动荡给意大利带来了最后一击。中央政府完全崩溃，这个国家发现自己处于近乎永恒的无政府状态。共产党占据北方，法西斯占据南方，纳粹占据中部。金色的意大利迎来黑暗时期……"
 ITA_economic_freefall:0 "经济自由落体"
 ITA_economic_freefall_desc:0 "中央政府的垮台最终摧毁了我们那部分幸免于难的经济。工人被拉出工作场所投入前线，各种商品价格飙升。"
 ITA_blackshirt_terror:0 "惊骇的黑衫军"
 ITA_blackshirt_terror_desc:0 "黑衫军一直忠于我们，他们对意大利法西斯主义的承诺从未动摇。因此，每当危机威胁并摧毁祖国时，我们伟大、雄伟的领袖总是可以依靠黑衫军来恢复秩序。"
 ITA_motivated_army:0 "被激励的军队"
 ITA_motivated_army_desc:0 "士兵们正处于高昂的精神中，他们热切于去摧毁那些胆敢玷污正义的意大利的敌人"
 ITA_terrified_populace:0 "处于恐惧的民众"
 ITA_terrified_populace_desc:0 ""
 ITA_new_generation_of_young_fascists:0 "法西斯青年新世代"
 ITA_fervent_youth:0 "朝气蓬勃的青年们"
 ITA_fervent_youth_desc:0 "我们的青年再次身体力行，说到做到，穿上他们的黑衫，又一次全身心投入法西斯主义及其理想。"
 ITA_local_fascist_citizen_councils:0 "地方法西斯市民委员会"
 ITA_local_fascist_citizen_councils_desc:0 "为了传播社团主义，我们成立了地方委员会，倾听民意，集中民智，了解群众需求。"
 ITA_rebellious_youth:0 "桀骜不驯的青年们"
 ITA_rebellious_youth_desc:0 "唉，青年曾经言行一致为党为国，如今又回到美国文化的怀抱，再次厌倦法西斯主义令人窒息的本质。"
 ITA_campioni_plan_1:0 "坎皮奥尼计划：阶段一"
 ITA_campioni_plan_1_desc:0 "我们的军队将被动员起来，解决阿尔及利亚严峻的局势。"
 ITA_campioni_plan_2:0 "坎皮奥尼计划：阶段二"
