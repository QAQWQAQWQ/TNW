 ita_the_status_of_the_economy:0 "经济现状"
 ita_the_status_of_the_economy_desc:0 "意大利经济从未如此稳定。三头同盟让意大利及其盟友得以维持生计，但失去国际市场一直是我们未曾愈合的伤疤，血流不止。可随着三头同盟的终结，我们再次处于极端危险的境地。\n\n绝望中仍有一线生机，地中海仍是我们的海。此外，随着意大利工业的扩张与对苏伊士运河等主要贸易路线的控制，我们可以建成独立自主的经济。这样，就算损失伊比利亚和土耳其这两个贸易伙伴也不会像我们敌人期望的那样，对经济造成致命打击！"
 ita_the_pillars:0 "支柱"
 ita_the_pillars_desc:0 "现代意大利经济由两大支柱支撑：工业和农业。虽然两大支柱还未落于糟糕的境地，但三头同盟的崩溃要求我们对国内产业进行更多投资，以便两大支柱成功发挥支撑经济的作用。我们必须倾尽工业财富，完成农业现代化。当然，基础设施也将进一步建设，以容纳越来越多即将流经意大利的原材料。我们的支柱会不可动摇，最猛烈的经济地震也不能是他们倒下！"
 ita_la_seconda_battaglia_del_grano:0 "第二次小麦之战"
 ita_la_seconda_battaglia_del_grano_desc:0 "墨索里尼在20世纪20年代掀起的粮食之战，虽使食品产量大增，却也令奶酪、葡萄酒等意大利出口名品黯然失色。如今，我们不得不再次打响粮食之战，但需寻求平衡之道。我们将让那些垂死的老农场焕发生机，开垦新土地以建新农场，并配备最先进的农业机械。同时，我们亦将提醒那些老农，除了粮食，更精致的奢侈品亦有其丰厚利润。虽然达到这种平衡殊非易事，但这有望使意大利经济更加独立繁荣。"
 ita_conclude_the_mechanization_of_agriculture:0 "达成农业机械化"
 ita_conclude_the_mechanization_of_agriculture_desc:0 "意大利农业，乃国之重器，我们一直致力于助力农民耕耘有成，并通过现代化手段助力农民转型升级。尽管如此，机械化之风尚未吹遍每寸土地，仍有农人依循古法，以马耕田，视拖拉机为空中楼阁。幸而，未机械化之农场寥寥无几，全面推进农业现代化的成本尚可承受。完成农业现代化对意大利经济的现代化发展至关重要。\n\n我们不仅关注那些缺乏农业技术的人群，还将助力那些已踏上机械化之路的农民，助其更新换代，引进尖端设备，并学习最新的农业技术。此举虽需要一定的投入，但长远来看，收益将远超成本。"
 ita_modernize_the_infrastructures:0 "基础设施现代化"
 ita_modernize_the_infrastructures_desc:0 "墨索里尼曾自诩将让列车准点，虽然意大利人对此坚信不疑，但即便列车准点，到达目的地仍需时日。意大利铁路已显老态，蒸汽机车仍在服役，而柴油与电力火车则更显优势。我们须以现代化铁路系统取而代之，以解此忧。不仅如此，意大利的道路——昔日罗马帝国的荣光，亦需与时俱进。我们将在亚得里亚海盐滩上开辟新径，升级旧道，以展现意大利的新颜。这些基础设施的建设将促进意大利经济的互联互通，简化贸易，推动经济达到新的高度。"
 ita_incentivize_iri_projects:0 "激励IRI项目"
 ita_incentivize_iri_projects_desc:0 "工业复兴公司（IRI）向来是意大利的国之栋梁，面对时下的经济挑战，它更显得举足轻重。我们计划扩大工业复兴公司的权势和影响范围，并计划加强其政治支持。\n\n特别拨款将注入工业复兴公司，旨在激发其进一步的经济助推作用，期冀挖掘其潜在的巨大能量。有工业复兴公司的鼎力相助，假以时日，再加上天时地利，我们的经济定能从三头同盟解体后的重创中浴火重生。"
 ita_center_of_production:0 "生产中心"
 ita_center_of_production_desc:0 "我们增强工业实力的举措已初见成效，然而，我们不可就此止步。为了意大利经济的凤凰涅槃，必须持续投入，增资添力。\n\n我们还将扩建更多工厂，精益求精，拓展产品。意大利对成为欧洲工业的璀璨明珠势在必行，以免我们辛勤耕耘的成果付诸东流。"
 ita_the_tertiary_sector:0 "第三产业"
 ita_the_tertiary_sector_desc:0 "我们的第一、第二产业正在逐步复苏，然而第三产业至今尚未得到关注。我们不能任由这种情况继续。我们将投入资金，用于新建铁路、银行、商店等项目。同时，我们也将向那些挣扎中的企业提供援助，并暂时放宽一些限制——直至经济完全恢复。通过适当的干预，意大利的第三产业有望成为经济的中流砥柱。"
 ita_mend_the_declining_trade:0 "弥补贸易衰退"
 ita_mend_the_declining_trade_desc:0 "我们与德国的同盟关系日渐淡漠，最终演变成了彻骨的敌对，致使我们的贸易受到严重束缚。巴尔干半岛动荡不安的现状，更是火上浇油，局势愈演愈烈。而土耳其和伊比利亚这两个背信弃义的前盟友，更是落井下石，伊比利亚人征收的过路费水涨船高。外贸的急剧下滑，加之帝国扩张带来的不稳定，我们的国家正承受着前所未有的压力。\n\n然而，我们并非软弱可欺之辈，岂能轻易屈服？贸易必须恢复，别无他途。我们将立即着手寻找新的贸易路线和交易方式，与世界各地重新建立联系，让我们的贸易路线焕发新生。"
 ita_ocean_going_merchant_marine:0 "远洋商船队"
 ita_ocean_going_merchant_marine_desc:0 "苏伊士运河依旧是我们通往海洋的唯一要道。无数意大利家庭之生计，皆系于此运河之吞吐。三头同盟解体前，外来船只借道亦被征税。我们必须最大限度地利用这一资源。我们的商船将畅通无阻，必要时还将有护航相伴。我们将不遗余力，维护运河，确保其运行无阻。若商船受阻或停航，海军与商人将无用武之地。我们不能允许这种情况发生。"
 ita_incentivize_tourism_fourth_shore:0 "刺激到第四岸旅游"
 ita_incentivize_tourism_fourth_shore_desc:0 "人们常误以为利比亚仅是荒漠一片，却不知这里同样蕴藏着希腊罗马的辉煌历史。大雷普提斯等考古遗址，堪称地中海保存最完好的罗马城市，它们如同未被发掘的宝藏，等待着世人的探索。撒哈拉沙漠，只要细心寻觅，亦能发现其壮美之境。我们应当向世界展示利比亚的美景，吸引游客前来消费。利比亚不仅有希腊罗马的古迹，还有的黎波里和撒哈拉的自然奇观，游客们又怎能不心向往之？第四海岸，必将成为地球上耀眼的旅游明珠。"
 ita_tourism_governorates:0 "总督领的旅游"
 ita_tourism_governorates_desc:0 "意大利总督领，历史沉淀深厚，堪称世界瑰宝。耶路撒冷，这座千年古城，如今归于我们之手；埃塞俄比亚，那山川壮丽，美不胜收。为何不向那些憧憬亲眼见证耶路撒冷辉煌的人发出邀请？为何不给予他们机会去亲身探索埃塞俄比亚山脉的壮丽风光？自然，这些体验并非无偿。游客们需要餐饮、住宿和旅游服务，我们将确保提供一切旅游所需的便利设施。尽管这样的投资成本高昂，但考虑到这些旅游胜地的潜力，它必将带来可观的回报。"
 ita_suez_perla_impero:0 "苏伊士，帝国的明珠"
 ita_suez_perla_impero_desc:0 "苏伊士运河，实为我们帝国经济的命脉。让我们的贸易畅通无阻，无需向伊比利亚人缴纳沉重的买路钱。运河之重，重于泰山，它就是意大利之生命线。我们必须确保这条生命线固若金汤，尽在掌握之中。幸而亚特兰特罗帕计划未损及苏伊士运河之功能，因此，所需的维护并不会太过昂贵。无论世事如何变迁，帝国的明珠——苏伊士运河，必须永远属于意大利！"
 ita_the_fourth_economic_power:0 "第四大经济体"
 ita_the_fourth_economic_power_desc:0 "美国、日本、德国，三足鼎立于世界经济之巅，它们各自引领着三大联盟。意大利，位列世界经济第四强，虽未居于主要联盟之列，却非软弱之辈。历经数载，经济焕发新生，跻身世界前四，成就斐然。意大利开始在全球舞台上以一个独立、强盛的形象展现自我，不再是德国的附庸或三头同盟的领头羊。愿天佑意大利，长存此强盛之势。"
 ita_antifascist_resistance4:0 "潜伏的反法西斯抵抗"
 ita_antifascist_resistance4_desc:0 ""
 ita_back_to_our_roots:0 "追寻吾等之源"
 ita_back_to_our_roots_desc:0 "法西斯主义的本意是好的，只是墨索里尼执行歪了，没忠于“真正的”法西斯精神。搞得时间推移，这个体系开始慢慢腐化，最终变得并不比它所取代的落后资本主义制度好多少。许多意大利人在这个不关心普通人的堕落制度下痛苦不堪。\n\n不再如此！今天，斯科尔扎领袖将在法西斯大委员会发表讲话，宣布一项“纠正”法西斯主义道路的新计划。他认为，“真正的”法西斯主义从未得到应有的实践，但现在情况已变！领袖还特别强调了一项宏大的国家福利计划，旨在帮助意大利人摆脱贫困。他的伟大愿景将建立一个更新、更强大、更健康的法西斯主义和意大利。致新时代！"
 ita_another_round_of_reforms:0 "新一轮改革"
 ita_another_round_of_reforms_desc:0 "斯科尔扎领袖概述了他所认为的更新、更现实的法西斯主义愿景。现在是时候着手实现它了！领袖起草了一项全面的新改革计划，来帮助我国的穷人。大体包含以下四类人。\n\n一，老年人，他们需要养老金，尤其是战争期间为意大利英勇服役的退伍军人。\n二，城市失业居民，我们大城市的失业人口太多了。\n三，农村贫困人口。他们是养活意大利的人，可自己却难以度日。\n四，女性，她们中有太多人为了养家糊口而工作。\n\n这是个雄心勃勃的计划，若要完全实施，领袖可能得采取一些“额外”措施才行。好在我们早已摆正心态，没人觉得这是件易事。"
 ita_new_plans_for_INPS:0 "充裕社保"
 ita_new_plans_for_INPS_desc:0 "长期以来，意大利福利制度的基石之一是国家社会保障研究所，旨在为老年人提供社会保障。但看看太多老人在本应属于他们的黄金岁月里艰难度日，社保所显然没有发挥我们要求它发挥的作用。\n\n到此为止了，斯科尔扎领袖要求大幅增加社保所的资金，以便每位老人都能安心过上退休生活。另提一点，要向久经考验、不负人民的忠诚法西斯战士提供额外养老金，无论其是在党内、黑衫军还是其他领域为社会服务。我们要让所有人知道，只要你为政府尽一份力，当你老了，政府也会为你倾尽全力！"
 ita_increase_unemployment_subsidies:0 "增加失业补贴"
 ita_increase_unemployment_subsidies_desc:0 "目前，意大利的大城市中有太多人失业，已到了非解决不可的地步！斯科尔扎领袖已绘就宏伟蓝图，旨在减轻失业者之苦，更从源头上根治问题，力求彻底消灭失业现象，正所谓“未雨绸缪”。\n\n失业救济将增加，同时启动浩大的公共工程，以工代赈。毕竟，“授人以鱼不如授人以渔”，提供就业机会才是解决失业的上策。\n\n然而，一些批评者认为这些计划“事倍功半”，未能触及问题核心，并对由国家法西斯党来执行这些计划表示质疑。然而，这些批评之声，与那些因新就业机会而获益的底层民众的心声相比，又算得了什么呢？他们定会心存感激，而非纠结于这些批评者的言论。"
 ita_help_to_poor_families:0 "援助贫困家庭"
 ita_help_to_poor_families_desc:0 "农民是国家之柱！他们养活了整个国家，没有他们，我们就不可能如此强大！农村对意大利的经济和社会确实很重要，可太多的农民又生活在极度贫困中。如此荒谬的现状！斯科尔扎领袖已然知晓。\n\n领袖因此制定了一项囊括各方各面的农村援助计划，旨在消灭严重的城乡不公现象。计划会为农村家庭提供经济援助、减税、竞争优势和各种福利，确保他们过上应得的生活！\n\n不仅如此，我们也会从计划中受益！农村穷人会牢记我们是如何拯救他们的。他们无疑会认识到，自己依赖的援助来自国家法西斯党，用忠诚回报我们。农民宁要富裕的奴役，不要贫穷的自由！"
 ita_encourage_maternity:0 "鼓励生育"
 ita_encourage_maternity_desc:0 "母亲在何种社会都是中流砥柱，如果没有她们把新生儿带到世上，那社会就无法维系，步入衰落。意大利妇女也肩负着这一神圣职责，她们会带领意大利走向新生代的辉煌！\n\n但这有个问题，由于现行经济疲软，许多妇女为了工作而晚婚晚育！这可不行，斯科尔扎领袖要从两方面纠正这一问题。\n\n首先，他将针对性增税，阻止女性求职，她们最重要的工作应当是做个母亲。其次，他会奖励成为母亲的女性，提供各种福利、税收抵免与补贴。孩子越多，福利越多！她们会意识到，女性的神圣职责可比任何工作都要好得多！"
 ita_the_verona_manifesto:0 "维罗纳宣言"
 ita_the_verona_manifesto_desc:0 "新一轮改革硕果累累！成功的改革让意大利人民万分支持，提升了斯科尔扎领袖在公众中的人气。\n\n受此鼓舞，领袖决定在维罗纳为他的新法西斯主义发表宣言。宣言包含领袖计划的进一步改革细节，所有这些都是为了恢复法西斯主义的初衷与真实模样。\n\n这份宣言及其中提出的改革提议无疑会激怒建制派。但要做蛋饼，你就必须打碎几个鸡蛋。为最美好的前途，为一个更强大的意大利！"
 ita_reform_the_camera_dei_fasci_e_delle_corporazioni:0 "改革法西斯与法团议会"
 ita_reform_the_camera_dei_fasci_e_delle_corporazioni_desc:0 "斯科尔扎领袖的新改革之一是改革立法机构，即法西斯与法团议会。自1939年来，立法机构再无直选。相反，所有议员都是从党员，以及构成意大利经济的各行各业与公司代表中任命的。\n\n既然如此，斯科尔扎领袖计划做出改变。虽然他没有恢复议会所有席位的普选权，但他会让工人可以直接选举自己的代表进入议会。相信企业管理者一定充分代表员工需求是很愚蠢的，而这轮改革能使工人面临问题时，更好解决推进。就算是最底层的意大利工人也能发声！"
 ita_propose_term_limits_for_the_duce:0 "提议领袖任期限制"
 ita_propose_term_limits_for_the_duce_desc:0 "斯科尔扎领袖提出了也许是他最激进的改革：领袖任期限制！\n\n他提出，领袖只能有不多不少十年任期，不得连任。任期结束后，就下台，再由法西斯大委员会选出继任者。\n\n这一想法并非全无先例，墨索里尼就曾考虑过，但最终决定不予实施。正是如此，让国家法西斯党高层难以接纳该提议。但斯科尔扎领袖会向他们保证这项改革是必要的，以防任何一人长期手握权柄，从而败坏法西斯制度。"
 ita_rework_the_electoral_system:0 "重塑选举制度"
 ita_rework_the_electoral_system_desc:0 "斯科尔扎领袖认为，法西斯与法团议会的选举制度存在重大缺陷。目前的情况是，它只代表意大利那帮根深蒂固的利益集团，而非普通人，并且能否选上议员完全看中央的旨意。\n\n是时候改变了！斯科尔扎领袖不恢复普选，但会大大放宽立法机构议员候选人的限制。根据这一轮改革，所有国家法西斯党党员都可以竞选公职。议会不再被党内高层垄断，基层党员的声音也会被听到！"
 ita_reaffirm_PNF_primacy:0 "重申党的中心地位"
 ita_reaffirm_PNF_primacy_desc:0 "自墨索里尼时代落幕以来，国家法西斯党在意大利社会中的领导光芒已逐渐黯淡。议会和参议院内，不少人与领袖的意志和目标背道而驰——技术官僚、保皇派、守旧派等等，他们曾是过去我们的绊脚石，未来亦然。\n\n然而，今非昔比了！凭借我们现有的力量和民众的支持，我们无需再迁就立法机构中那些固执的人。我们将策划一场变革，将他们从立法机构中剔除，他们对我们已无足轻重。取而代之的，将是那些对领袖和国家法西斯党忠心耿耿的新鲜血液。"
 ita_commissioni_di_fabbrica_and_consigli_di_gestione:0 "工厂委员会与管理委员会"
 ita_commissioni_di_fabbrica_and_consigli_di_gestione_desc:0 "在早期的法西斯革命，国家工团主义对早期法西斯主义的许多大腕影响颇深。其中最著名的是煽动者埃德蒙多·罗索尼，他于1928年被迫辞去法西斯工团全国联合会的领导职务。\n\n但在几十年后，他的理念，外加国家工团主义得到了斯科尔扎领袖的支持。以罗索尼为灵感，领袖宣布了针对意大利工厂的新工业以及劳动法。每个工厂都要由两个委员会管理：一个由政府、技术人员代表组成，另一个由工人、管理层代表组成。要求他们共同制定生产目标、管理工厂。合作孕育成功！"
 ita_continue_agrarian_reforms:0 "继续土地改革"
 ita_continue_agrarian_reforms_desc:0 "此前斯科尔扎领袖的土地改革取得巨大成功，赢得全意农民的大力支持。我们也不会止步于此，大的要来了！是时候推进另一项规模更大的农业改革！\n\n本轮改革的重点是农业集中化与现代化。政府收购小农户的全部土地，他们会得到适当的补偿。同时将农业集中在大型国有农场周围。出于生产必要，会为农民设定高配额，但他们不必害怕！政府会教授新技术，提供新机械设备与杀虫剂等，尽可能使意大利农业现代化！"
 ita_oceanic_rallies:0 "海洋大集会"
 ita_oceanic_rallies_desc:0 "有什么能比深蓝的海洋更广阔，能一路延伸到地平线？当然有，且只有斯科尔扎领袖在集会上吸引的人群！\n\n所有人都要知道，人民群众爱人民领袖。因此，就是要让领袖的集会一望无际，扩大到目力所及之外。我们组织盛大的演讲，编排人群的活动，同时拍摄全过程，让大众文化部的波段冲击全国广播电视。\n\n保持人群“膨胀”也是必不可少的，任何手段都可以用上。不论用大巴拉来我们的支持者，还是靠收买、威胁“说服”日子人，反正就是要让集会广阔甚过大西洋！"
 ita_ente_nazionale_della_casa_del_popolo:0 "人民之家协会"
 ita_ente_nazionale_della_casa_del_popolo_desc:0 "无家可归，其悲何极。意大利的繁华都市中，无数人正遭受此苦。在我们这样一个伟大的国家，这是不可接受的！幸运的是，斯科尔扎领袖提出了解决这个问题的方案。他计划合并一些政府机构，创建一个庞大的政府项目，以安置城市中的贫困人口！\n\n这项宏伟的工程将确保每个意大利人都能有屋顶遮风挡雨，无论遇到何种困难。一些人可能会抱怨说，此举将损毁古迹；而其他批评者则声称，这不过是为了让城市贫困人口更容易被追踪和控制，将其集中于警察局、纪念碑、国家法西斯党总部等法西斯权力中心周围。但谁会在乎他们的想法呢？那些新安置的贫困人口肯定不会！"
 ita_combattere_lavorare_vincere:0 "战斗、工作、胜利"
 ita_combattere_lavorare_vincere_desc:0 "战斗、工作、胜利。\n\n记住这仨词，走遍天下都不怕！如此真知灼见总结了斯科尔扎领袖鼓动所有意大利工人的哲学。鼓励他们无私奉献、辛勤工作，而最能践行格言精神的人会有对等回报，最不知疲倦奋斗的工人会获得高薪与多轮晋升，那是他们辛勤劳作、自我牺牲的奖励！\n\n不仅如此，工作场所的组织方式也应改造！需遵循军事化模式：秩序、纪律、自我牺牲会是工人竞赛的代名词！军队赢得了战争，而按照军事路线组织的工人将赢得和平！战斗！工作！胜利！"
 ita_mobilize_the_blackshirts:0 "动员黑衫军"
 ita_mobilize_the_blackshirts_desc:0 "黑衫军，我们力量之柱，法西斯革命之基石。无黑衫，革命不立。但近年来，他们未尽其用，久居闲散，未与领袖的新政融合。\n\n今日，变革将至！黑衫军将被动员起来，参与到意大利人的日常生活中。我们将渐进、微妙、坚定地让一些执法岗位由黑衫军担任。同时，我们将按照军事化标准加强他们的组织和纪律。最终，我们将鼓励更多的意大利人加入他们的行列。这不仅是加强法西斯革命的有力手段，更是巩固我们支持的关键！"
 ita_threats_and_bribes:0 "威胁与贿赂"
 ita_threats_and_bribes_desc:0 "斯科尔扎领袖之新政，深得民心，声望亦随之扶摇直上。然而，并非人人称颂此举。在政权的各个层级，有声音渐起，对领袖之策提出质疑。更甚者，言辞中不乏尖锐批评；众多人士公然表露对领袖路线的疑虑。\n\n此情此景，岂能容忍！幸好，令其噤声并非难事。些许法西斯式的“说服”手段，或能奏效；或以威胁，或以贿赂……不择手段，务必让他们归顺，至少，让他们把嘴巴闭好！"
 ita_our_eyes_in_the_army:0 "军队中的眼线"
 ita_our_eyes_in_the_army_desc:0 "军队与法西斯政府之间不太对付。毕竟，意大利军队宣誓效忠翁贝托国王，而不是我们……再加上军队对日益壮大的黑衫军感到不满，斯科尔扎领袖有充分的理由不信任军队，尤其是蠢蠢欲动的高级军官。\n\n好在我们有秘密警察OVRA！将指示他们监视各级武装部队。当然，重点放在高级军官，要是这伙人在计划什么，我们会尽数知晓！"
 ita_strengthen_MSVN_garrisons:0 "强化黑衫军武装"
 ita_strengthen_MSVN_garrisons_desc:0 "即使OVRA正在监视军队，也没法让我们对蠢蠢欲动的武装部队安心。斯科尔扎领袖不能肯定OVRA的能力足以保卫法西斯革命，更不必说其是否站在我们这边也有待商榷……\n\n幸运的是，我们有可以绝对信任的家伙。那便是国家安全志愿军，也就是黑衫军中的好男儿！让我们为黑衫军更新意大利最好的装备以增进其实力。坦克？机枪？革保两条路线的斗争至此回到同一起点！黑衫军要什么，我们给什么！"
 ita_isolate_the_court:0 "分离宫廷帮"
 ita_isolate_the_court_desc:0 "我们虽已在剔除政府中的异己分子和不忠之徒上取得成效，却仍有少数人逍遥法外。尤其是，一些亲王室的政治家，依然在政府中，成为我们的心腹之患，他们的影响力之大，让他们得以幸免于难……直至今日。\n\n如今，我们已拥有足够的力量，即便不能一举清除这些政治家，至少也能用些\"温和\"手段将他们孤立，让他们在政治上无足轻重。进一步而言，我们将让OVRA截取翁贝托及其宫廷核心成员的私密通信。在我们的严密监视下，再无秘密可遁……"
 ita_propaganda_overdrive:0 "宣传机器加速运转"
 ita_propaganda_overdrive_desc:0 "斯科尔扎领袖决定对大众文化部进行现代化改革，使其真正发挥作用，而不是像齐亚诺想的那样废除这个以前毫无用处的部门。改革无疑是明智的决定，大众文化部将于现在向我们展示其真正价值！\n\n是时候让大众文化部档位拉满，加速！超速！虽然它过往是每日做着拥护法西斯的宣传，但现在起会一刻不停，喋喋不休，直到全意人民在清醒的每一刻都被它淹没！更重要的是，我们开始向翁贝托国王巧妙地投下阴影……"
 ita_its_about_to_get_rough:0 "国步艰难"
 ita_its_about_to_get_rough_desc:0 "我们让OVRA监视翁贝托国王与武装部队的决定无疑是有先见之明的。OVRA现在提请我们注意一些可怕的消息：军队和翁贝托国王的宫廷中传出风言风语，看来他们在策划什么。无论他们在计划什么，对我们来说都不是什么好事……\n\n是时候打几个电话了，快点！召集全部忠诚的黑衫军，立即包围罗马！无论他们在计划什么，我们都必须做好准备，以防事态恶化……"
 ita_the_test:0 "我们通过了考验。"
 ita_another_march_on_rome:0 "再次进军罗马"
 ita_another_march_on_rome_desc:0 "黑衫军们，机不可失！\n\n让我们如昔日墨索里尼一般，浩荡进军罗马，占领这帝国之心。国王及其党羽，若有任何图谋不轨的迹象，我们誓言将其阴谋粉碎！\n\n此乃天命时刻，一决意大利未来的关键。我们高擎革命之火，无论风云如何变幻，我们都将如革命之初那般，再次踏上向罗马进军的道路，完成这场革命最后的壮丽篇章！"
 ita_rumors_of_discontent:0 "不满的谣言"
 ita_rumors_of_discontent_desc:0 "由于领袖的开明统治，法西斯主义对意大利的控制从未如此强大。在众多敌人的包围下，国家依然屹立不倒，比以往任何时候都更加强大。然而，就像墨索里尼时代一样，内部敌人和持不同政见者威胁要从内部破坏帝国坚固大厦的基础。危险的颠覆分子可能在外国特工的帮助下渗透到意大利社会的各个阶层的谣言，已经传到了党高层的耳朵里，斯科尔扎领袖认为似乎该采取行动了。毫无疑问，任何破坏法西斯秩序的企图都将被扼杀在萌芽里。"
 ita_OVRA_investigations:0 "OVRA调查"
 ita_OVRA_investigations_desc:0 "OVRA——我们的政治秘密警察——在其存在的数十年间，始终是调查与摧毁法西斯政权威胁的高效利器。我们将命令OVRA对潜在敌人展开全面调查，无论其藏身何处：渗透工厂的共产主义颠覆者、大学里暗中兜售堕落学说的异端、帝国山野角落蛰伏的叛乱暴民，以及最危险的敌人——潜伏在法西斯政府核心的异议分子，正伺机发动致命一击。OVRA将揪出这些毒瘤，使其无从逃脱正义的制裁。"
 ita_in_the_factories_again:0 "在工厂"
 ita_in_the_factories_again_desc:0 "Italian labour is strictly controlled by both the corporations friendly to the regime and government organization, which have historically worked in close tandem to prevent any agitation by leftist rabble rousers. However, in the past, this hasn't stopped leftist cells from being able to clandestinely operate among the working masses of Italy, spreading propaganda and biding their time, hidden from the government's eyes. We shall infiltrate OVRA agents in the factories and working class districts of all Italy, looking for any evidence of organized leftist activity in the country, and striking it down with the utmost prejudice."
 ita_in_the_universities_again:0 "在大学"
 ita_in_the_universities_again_desc:0 "大学是福也是祸，管理良好、忠诚为国的高校体系可以孕育意大利的青年之花，这些聪明的年轻人注定要当我们的接班人。但持不同政见的活动家总以学术外衣兜售各种颠覆政权、无政府言论，借着学生的天性渗透、腐蚀他们。我们将向忠于我们的大学校长施压，要求他们提供各自管辖范围内发生的任何非法活动线索，再由OVRA特工清扫，迅速终结背叛的行径。"
 ita_in_the_mountains:0 "在群山中"
 ita_in_the_mountains_desc:0 "In the far corners of the Empire, from the high peaks of the western Alps, to the highlands of Albania, to the arid hills of Cyrenaica, pockets of resistance to our rule still persevere in their pointless struggle. While largely dormant so far, partisan and insurgent groups, mostly formed by non-Italian subjects of the Empire, must nevertheless be considered an enduring threat. Using all the powerful tools of modern technology, such as aerial reconnaissance and napalm bombings, as well as the tried and tested blunt methods of anti-partisan warfare, we shall dish out a healthy dose of terror to these insurgents, hopefully scaring them enough for them to surrender."
 ita_in_the_government_again:0 "政府内"
 ita_in_the_government_again_desc:0 "法律，确实可以赋予领袖与党无上权力。但有些东西远胜于法，那便是人的忠诚与信念。纵然在领袖的核心圈子，那些最亲近的人也可能出问题。夺权、叛国、蛊惑人心的思想会渗透他们，值得信赖的盟友化作隐蔽的敌人。就让我们密切监视罗马的权力大堂，窃听通讯，几位著名政客的私人信件会予以拦截，以一切手段确保他们百分百忠诚。哪怕最微小的潜在叛国迹象，也会得到相应的处理。"
 ita_we_are_experiencing_technical_difficulties:0 "正遇技术难题"
 ita_we_are_experiencing_technical_difficulties_desc:0 "The results of our investigations are in, and the picture is much more grim than we had anticipated. From the Alpine peaks to the Libyan deserts, factories are harbouring communist plots, universities are buzzing hives for dissent and insubordination, once dormant insurgencies are gaining more and more traction, and even in the upper echelons of government loyalties to the Duce are often questionable at best. If we do not act immediately, we risk the whole fortress of fascism to come tumbling down like a house of cards. We shall take all necessary actions to restore the rule of the Duce over Italy, whatever the costs."
 ita_corrupt_the_corruptible:0 "腐蚀弱处"
 ita_corrupt_the_corruptible_desc:0 "忠诚终究是商品，既为商品便可买卖。政府要员与异议团体中，多的是渴求\"无法拒绝之条件\"者。我们将命OVRA特工筛选敌对阵营中最易操控者——许以厚酬，策反为暗桩线人。当其目睹足够多的里拉，所谓信念、理想、动机皆如春雪消融。至于友伴被捕？比起领袖赐予的厚礼，这点损失微不足道。"
 ita_expand_the_colonie_di_confino:0 "扩建殖民地集中营"
 ita_expand_the_colonie_di_confino_desc:0 "Since the rise of Mussolini, the fascist regime has extensively used the Colonie di Confino as a tool to repress political dissent. Usually taking the shape of prisons located in tiny Mediterranean islands or other similarly remote locations, the Colonie di Confino are were political enemies of fascism are made to regret their unfortunate political decisions through harsh forced labour. We must expand and perfect this tried and true system, turning the Colonie into proper concentration camps where we can store hundreds of enemies of the state, rendering them not only innocuous, but also using their labour for the benefit of the fatherland. If the Nazis could build a fortune on the backs of forced labourers, so can we."
 ita_lock_down_the_PNF:0 "封闭我党"
 ita_lock_down_the_PNF_desc:0 "In times of political crisis such as these, it is essential for us to know that we can rely on the structures of the state - and no structure is more important than the PNF. In the past, personal interests, opportunism, and internal divisions have undermined the unity and obedience of the party. Now, the Duce has decided that the PNF must return to be what it was designed to be - a monolithic, indestructible bloc of people who are willing to pledge the utmost personal loyalty to the Duce of fascism. Enforcing mass purges in the lower ranks and solidifying the hierarchy of the upper ranks will restore the lost unity of the party and the nation, demanding nothing short of complete, total submission to Scorza himself."
 ita_mobilize_the_regio_esercito:0 "动员皇家陆军"
 ita_mobilize_the_regio_esercito_desc:0 "The Blackshirts have always proven unreliable at best and ineffective at worst - over the years, the MVSN has lost much of its original usefulness, becoming little less than an appendage to our armed forces, and it's staffed mainly by old nostalgics who still love to remember the march on Rome and by young, clueless fanatics. While useful to repress rabbles, the MVSN is not something we can rely on for more complicated matters - the Regio Esercito, particularly its intelligence and secret services divisions, will be instead put on high alert to deal with disturbances to public order across the empire. We shall schedule meetings with generals and reshuffle resources to make sure the army has all the funding they need to ensure peace and stability."
 ita_destroy_the_incorruptible:0 "摧毁清廉"
 ita_destroy_the_incorruptible_desc:0 "终究有人不为利诱所动。然买不通者，毁之即可。被列为潜在威胁且拒不受抚之辈，自有他法料理。OVRA将开展大规模清洗行动——政坛内外，宵小之徒将遭绑架、驱逐、“失踪”，其亲朋终日惶惶，唯恐步其后尘。人人自危，疑邻为谍。我们定让全民知晓违逆领袖之命的下场：服从，或湮灭。"
 ita_leggi_emergenziali:0 "紧急状态法"
 ita_leggi_emergenziali_desc:0 "Legislative actions can be legitimized by their circumstances - while many have been concerned that we might be pushing a little too hard with the current repression, they fail to see that this is perfectly justified given the current crisis. We shall create a state of perennial fear and paranoia into the government and the population - making sure they know very well that out there, people far scarier than us are out to get them. Terrorists, anarchists, criminals, bandits, subhumans, all attempting to prey on the prosperity of the fascist Italian empire. Surely, the Italian people will tolerate the increased repression and fear once they see that there is no other choice beyond this, or complete anarchy and chaos."
 ita_expand_army_funding:0 "增加军费"
 ita_expand_army_funding_desc:0 "If Italy is to be able to project power in its sphere, not to mention within the country, the Army will need our support. The Army's stagnation is not just a stain on Fascism; it encourages the Germans to encroach into our sphere of influence, and makes the countries around us not take us seriously. The course ahead is clear enough. We shall do whatever it takes to increase the funding available to the Army, so that we can upgrade our technological capacity, drill more discipline into the ranks, and bring fear to the enemies of our nation within and without. A Fascist Army is a strong army; there is no other way."
 ita_expand_police_operations:0 "警务扩张"
 ita_expand_police_operations_desc:0 "警察作为法西斯主义在高层和基层的后勤基地，受到了太多的限制，无法开展其重要工作。即使是现在，在各级警察机构中，也存在着严重的官僚主义，使他们无法发现反动活动和犯罪活动并将其铲除。我们将通过减少官僚作风，重新确立警察在公共治安领域的首要地位，从而大幅扩大警察的行动范围。在这种新秩序下，如果罪犯或恐怖分子们愚蠢到继续进行反动活动，他们必然会害怕被第一个发现他的警察打得头破血流。这样一来，警方一定会感谢领袖对他们的信任。"
 ita_enact_curfews:0 "执行戒严"
 ita_enact_curfews_desc:0 "我们的年轻人，更不用说那些心怀不轨、声名狼藉的人，可以在城市街道上随意过夜，这是我们国家堕落的一个明显标志。通过在全国范围内实行宵禁，我们可以一石二鸟——既能确保社会的纪律，又能更容易地镇压任何在夜间活动的反动团体。为此，我们将通过一系列法律，规定除非得到上层的明确许可，否则夜间离家是非法的。我们还将开展一场宣传攻势，宣传在我们的街道上的犯罪和堕落行为长期存在着的危险。这将使人们相信，需要广泛的警察权力来把这些败类从我们的土地上清除出去。"
 ita_solidify_the_hierarchy:0 "巩固等级制度"
 ita_solidify_the_hierarchy_desc:0 "Under Ciano the very foundation of Italian Fascism, the clear hierarchy of power on which a stable society is built, was left to rot away under years of permissive government. No more. The only way to build a strong Italy is to revive the privileges of the ruler, and to obtain the consent or submission of the ruled. We shall do this by solidifying the hierarchy of power in every area of life; whether in the party structure, the military, police, the administration and society generally, we will establish discipline and rank under threat of punitive punishment. By massively increasing punishment for people rebelling against their betters, we will drill into the people a simple truth. An Italian who does not conform to his or her place in society is not fit to be part of it."
 ita_friends_in_the_church:0 "教会的朋友"
 ita_friends_in_the_church_desc:0 "The Church's hold over the Italian population has remained over the last decades, and does not show any sign of abating. To stay the masters of Italy, we must also master an institution which dictates public morality. Following in Mussolini's footsteps, we shall create a new Concordat with the Church - mobilising our allies close to the Throne of St Peter, we shall remind every priest who will listen that our aims are very similar indeed. To hold the people of Italy steadfast against atheism and liberalism, to maintain their faith in the natural order of master and servant, and to keep them in submission to God the Father; these are crucial to control the soul of Italy. Our friends in the Vatican will understand that a renewed Fascist movement can only be an ally to the Church."
 ita_friends_in_big_business:0 "大企业中的朋友"
 ita_friends_in_big_business_desc:0 "Just as the fate of the Church will have its impact on Italians' souls, so the fate of the economy will dictate the most intimate details of their daily life. The assorted Capos of Big Business have been split in the past on Ciano's reformist mindset, and it falls to us to remind them of the benefits of Fascist corporatism as the basis of our economic system. We shall let our friends know that we will always have an ear for the concerns of industry, committed as we are to creating wealth and furthering economic growth. Whether this requires us to use words and assurances, or to speak to the industrial bosses in the language they truly understand - suitcases filled with money - is unimportant. What matters is results. So long as they understand this, Italy will enrich its friends in business and in return become once more a strong, prosperous economy."
 ita_friends_in_the_court:0 "Friends in the Court"
 ita_friends_in_the_court_desc:0 "虽然法西斯运动中的一些人过去曾对共和主义心存幻想，但我们早已认识到国王作为一个统战人物的价值。国王的角色提醒人们统治者和侍奉者之间的区别，还有助于在不太稳定的时候保持稳定。既然我们已经战胜了宫廷中的小小阴谋，我们就应该进一步增强翁贝托国王身边盟友的力量，清除所有残余的自由派和改革派。翁贝托不会再对法西斯的复兴抱有一丝怀疑，他会像多年前一样，完全按照我们的吩咐行事。参与政治毕竟有失国王的尊严，他将亲眼看着意大利真正的主人来做脏活。"
 ita_friends_in_the_army:0 "军中的朋友"
 ita_friends_in_the_army_desc:0 "There has long been mistrust between the Duce and the Army, especially those in the top ranks. Unlike many other power centres in Italy, a dissatisfied and independent army can do more than simply protest - if we are weak enough, it may step in and break apart everything we have built since Verona. We know what we must do. There are good men in the middling ranks Army, men overlooked in recent years for being too 'old-fashioned' yet too competent to leave languishing in the lower ranks. It is on these grieved men, torch-carriers for the bellicose spirit of Fascism, that we will remould the Army. We shall encourage the retirement of some older and more high-ranking generals, replacing them with our friends and allies. Yet we will do it in a manner in which no one may protest. For who would argue against the renewal of our martial forces with fresh blood?"
 ita_for_god:0 "为了上帝"
 ita_for_god_desc:0 "Our faith in God and His Holy, Roman, Catholic and Apostolic Church is the heart of our project, the restoration of true, strong Fascism in Italy. For too long have the tendrils of a destructive ideology, that of liberal individualism and the atheism it creates, remained beneath the surface of Italian society, waiting for its moment in the sun. Yet now things will change once and for all, so they can remain the same. In God's name we have built a social order in our country based on piety, hierarchy, unity, and submission to power. For His Glory we will not allow any trace of atheist arrogance, or meaningless talk of individual freedoms, to push us off the path of the faithful. For a union of Fascism and Catholicism as an omnipotent, omnipresent force in the lives of Italians, there will be no more compromise with the godless."
 ita_for_the_king:0 "为了国王"
 ita_for_the_king_desc:0 "Now that King Umberto has been bent to our will, we can only celebrate everything the Monarchy represents for our country. Decades ago the House of Savoia announced its claim over all of Italy, but it took an expedition of real men, men willing to act, to deliver the Kingdom to them. Now that the liberal spirits of Savoia are dead and buried, we pledge ourselves loyal subjects of the King. So long as Umberto remains true to the ideals of Fascism reborn, a Fascism which will make Italy strong and burn away any branch which would go against us, we will also remain faithful to the Monarchy. We need only remind the Monarch of this arrangement, and everything will fall into place."
 ita_for_italy:0 "为了意大利"
 ita_for_italy_desc:0 "When Mussolini marched on Rome forty years ago, his victory was not assured beforehand. When Duce Scorza stood up to challenge the great man's successor, the victory was not assured either. Yet with iron will and unwavering spirit both Mussolini and his true son, Scorza, triumphed. For Italy we have shed our blood and sweat. We have thrown everything we had at the enemies without and within, and we are on the cusp now of greatness. Long live Italy! Woe to the vanquished! Long life to its Duce Carlo Scorza, to his idea of an Italy which is stronger than ever before, which is good to Italians and merciless with its enemies! For Italy we march onwards against any nation, any group that is foolish enough to block our path. Through the bowed head of a King was Fascist Italy born decades ago. Through the bowed head of every Italian now will Fascist Italy be reborn."
