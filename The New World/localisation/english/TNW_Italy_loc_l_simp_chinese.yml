 ITA_scorza_ending.1.t:0 "峰回路转"
 ITA_scorza_ending.1.d:0 "自斯科尔扎升格为意大利领袖以来，已过去整整八载。自他拔除腐化帝国许久的旧蛀虫，也已度过八载。\n\n斯科尔扎透过精雕细琢的大理石窗框，凝视着罗马。他清楚地明白：要么激起胜利；要么迎接毁灭性大败——这都是他作为领导人所应承受的。八年来，他带领着意大利，无论这段路途好坏与否，他都带领整个国家度过了最为艰难的岁月。离维罗纳那命定之日过去仅不到十年，却恍惚间让人好似度过一生之久。\n\n他登上权力宝座，也面临一场持久斗争，一场试图篡改法西斯主义以适应现代和想让其维持本源两派间的斗争。这场包罗万象、持久不断又至关重要的斗争，甚至会让拥有最为坚韧意志的人疲惫不堪。\n\n他只花了一分钟欣赏罗马星光璀璨的城市夜景，不久夜幕再次降临，街道被明亮的灯火照亮。他的目光留落在那座在他升格领袖后不久建成的摩天大楼处。自下而上扫视这座雄伟壮丽的建筑，他清楚地知道：法西斯主义已为曾几何时一贫如洗的意大利结出如此硕果。那些在这一路途上的落队者自然成了不幸的损失，但跟意大利如今成就的伟业相比，他们的损失又算得了什么呢？有一种思维，一种想法向他发问：何为法西斯主义？是展示大众力量？是人民的共同意志吗？这是国家的荣誉，还是让身为领袖的自己享誉一切？\n\n斯科尔扎已再一次向自身证明，唯有其意志才能主导法西斯主义。\n\n在延续法西斯主义的荣耀方面，他是否做出了正确——或者说是最佳选择？答案是肯定的，扪心自问的他如今打消了这一疑虑。早在他迈出维罗纳的大会堂时，他就知道自己会带领法西斯主义走向正确的道路。无论是石油危机，教会，军队甚至是法西斯党本身——都一一拔除弊病，都将与法西斯主义道路齐头并进，都将彻彻底底的促使意大利进步。\n\n当他倚靠在大理石下的权力框架中时，他明白："
 ITA_scorza_ending.1.a:0 "法西斯主义必须改变以保卫过去，这样过往的法西斯主义才能永续于未来。"
 ITA_scorza_ending.1.b:0 "法西斯主义必须改变，以迎接未来。这样未来才能永远改变，以迎接法西斯主义。"
 ITA_scorza_ending_establishment_tooltip:0 "你为意大利选择了一条更为§R保守§!的道路。"
 ITA_scorza_ending_reformist_tooltip:0 "你为意大利选择了一条更为§G改革§!的道路。"
 scorzaseventies.1.t:0 "高山冥想"
 scorzaseventies.1.d:0 "炉火舞动，噼啪作响，照亮原先又冷又黑的房间。旧椅倚着温暖，载着年老疲惫的国王。他端茶啜饮，风声吹得多诡秘。窗吱呀呻吟，霜天使狡黠，它来它又走，火的热量啊……\n\n门吱吱作响地开了，他的儿子走了进来，慢慢坐在他身旁，以免打乱老人的思绪。凝视着国王疲惫涣散的目光，王储即刻握住父亲的手。“快睡吧，爸爸，时间不早了。不管有什么烦心事，我敢肯定，坐在这里望着炉火解决不了问题。”\n\n老人惶惧数秒，才回神转头看着儿子，眼中疲惫依旧。“我没……自从那个叫斯科尔扎的人在最近一轮抗议活动中幸存下来后，我就没睡过一个好觉。我能感觉到，他在计划什么，我……我觉得我好像在和一个人下棋，可我看不到棋子。无论我做什么，我…我……都需要睡一会儿……”\n\n老人一声不吭，从椅子上站起来，向自己的房间走去，只留下儿子独自守着将熄的炉火。"
 scorzaseventies.1.a:0 "这当然只是一个老人的妄想症。"
 scorzaseventies.2.t:0 "致青年的信"
 scorzaseventies.2.d:0 "“意大利的学生们、孩子们，请用心感悟我写下的一切。就一会儿！”\n\n“自手握权柄的那一刻起，我就只想证明一件事：法西斯主义不是从你老师父母那里习得的腐朽教条，而是包括你在内，所有意大利人于生活生产中共同缔造的理论。也不是自吹自擂，但在我的领导下，全意人民在文明、政治、经济方面取得全面胜利，毋庸置疑的胜利，足以使你们饱受世界嫉妒。从纽约的颓废舞厅到孟加拉国难保生存的贫民窟，世界各国人民都默默哀叹，希望自己来世能做意大利人。告诉我，这些成果是陈旧僵化的教条所能结出吗？答案当然是否定。”\n\n“法西斯主义是活的思想。它因我们这代人而与时俱进，同理，也会因下一代人而推陈出新。法西斯主义不会消亡，它是永恒的。它不会因未来而被取代与否定，因为它就是未来。法西斯主义是永不动摇、永不落后、永不会被取代的意识形态，是唯一能、真正能指引意大利走向她天命的意识形态。”\n\n“在信的末尾，我向大家承诺，我们与法西斯的好日子还在后头呢。前进，意大利！“"
 scorzaseventies.2.a:0 "你们的领袖，卡洛·斯科尔扎。"
 scorzaseventies.3.t:0 "斯科尔扎的荒唐"
 scorzaseventies.3.d:0 "在罗马的酒店房间里，当《纽约时报》的外籍顾问首次听闻这个谣言时，他只是粗略地浏览了一眼，便将其当作了一场恶作剧，接着便把那份报告揉成一团，扔进了垃圾桶。坦率地讲，报告中所暗示的观点，简直是荒诞不经。意大利这样一个独裁的法西斯国家，一直如同世界其他大部分地区一样，拒绝摆脱1930年代的阴影，除了其领袖时常发布的关于法西斯主义的古怪改革和声明之外，它始终是一个行为一致、理性的国家。而这样一种国家，岂会因一项界定模糊的任期限制而彻底变天？这简直是痴人说梦。\n\n几天时间悄然流逝，没有任何进一步的消息表明这项政策真的将要被执行，那位外籍记者既没有因此感到羞耻，也没有因此感到自豪，他或多或少已经将这个谣言抛诸脑后。然后在一个早晨，时间刚过八点，他被外面学生游行和欢呼的声音唤醒。他拉开窗帘，窥见一群年轻的法西斯主义者和资深的黑衫军，一些人手持斯科尔扎的肖像，其他人则挥舞着标语牌。他边看边觉得有趣，随即拿起酒店房间的电话，拨打给了《华盛顿邮报》的记者。\n\n“早安，杰克。”\n“早安，史蒂夫。”\n“嘿，你知道今天这些示威活动是为了什么吗？”\n“你还没听说吗，伙计？这是我在这个领域工作这么多年来听到的最奇异的事情。斯科尔扎今天早上亲自在广播上宣布，他要限制一个人可以担任领袖的年数，这让所有的年轻人都兴奋不已，满怀对进一步改革的希望。”\n\n那位外籍记者沉默良久，然后再度开口。"
 scorzaseventies.3.a:0 "“啥？”"
 scorzaseventies.4.t:0 "迎接未来"
 scorzaseventies.4.d:0 "在集会的一隅，老人默默伫立，目睹着孙子为即将登台的演说者欢呼雀跃。新一代的黑衫军簇拥在领袖周围，他们未曾经历过早期的艰苦斗争，也未目睹过当年那场将领袖推上宝座的盛大游行。然而，看到这些年轻人追随着自己年轻时的信仰之光，老人心中涌动着一股暖流。\n\n岁月如歌，老人的思绪穿越时空，一幕幕历史画卷在脑海铺陈。1922年，黑衫军在罗马街头昂首阔步，收音机传来国王的让步之声，一切由此启幕。十四年后，埃塞俄比亚战场上的胜利，他的母亲见子荣归，心中充满骄傲。九年后，罗马的胜利庆典上，墨索里尼振臂高呼，意大利的荣光在那一刻定格。斯科尔扎在台上举起双手，老人未察觉，他的孙子已在人群中激情呼应。\n\n岁月流转，领袖离世，齐亚诺接过权杖。地中海风云变幻，老人为之奉献一生的事业面临着前所未有的挑战。集会不断，战火纷飞，东方战事，土耳其人的背叛，如影随形。老人亲历儿子葬礼，与老黑衫军战友一同哀悼。又一年，斯科尔扎的胜利再次点燃了老人心中的希望，游行、胜利、对祖国的自豪，与日俱增。斯科尔扎在台上号召青年，他们热血沸腾，誓言效忠。\n\n时光荏苒，老人的孙子也在党内崭露头角，老人心中暗自欣慰。记忆在岁月长河中渐行渐远。他抬头望向台上的领袖，同样的脆弱身躯，映照出自己的倒影。孙子因领袖的宣言激动不已，挤过人群，为黑衫军呐喊助威。老人脸上露出微笑，眼角却泛起一丝泪光。"
 scorzaseventies.4.a:0 "毕生尽职。"
 scorzaseventies.5.t:0 "普通人的法西斯"
 scorzaseventies.5.d:0 "一份小册子，静静躺在印有国家法西斯党标志的信封中，被送往意大利的千家万户，这些家庭都被党内官僚精挑细选过，符合“政治上可接受”的标准。这一切，都是按照最高层的指令行事。官僚们在编制名单时，或许对命令的深意有所困惑，但他们明白，自己的职责不是去质疑领袖的智慧。\n\n轻轻打开信封，里面是一份简明的小册子，被折成两半。翻开小册子，一段引言映入眼帘，收件人被告知他们已被选中参与塑造意大利法西斯主义的未来。接着是一系列精心设计的问题，每个问题都提出一个政策建议，并附有一个评价量表，从“非常不利”到“非常有利”，供填写者表达自己的看法。这些问题经过巧妙构思，旨在引导选民给出期望中的回答，同时在表面上保持中立，不偏向任何一方。为了精心设计这些问题，他们经历了若干个充满挫折的夜晚，但正如俗话说的，不劳无获。"
 scorzaseventies.5.a:0 "普通人可以拥有自己的民主，我们会确保他们做出正确的选择。"
 scorzaseventies.6.t:0 "掌控党"
 scorzaseventies.6.d:0 "小队刚刚经历了一个繁忙至极的一周，忙碌程度甚至超过了石油危机的动乱时期。每个周一，一封密信便会悄然抵达一个无名的邮筒，里面罗列着国家法西斯党内部那些默默无闻的小官小吏。每名官员的名字下方，都划着红、金、黑三色之一的线条，线条数量往往与信中附带的执行任务所需的装备一一对应。\n\n名字若被红线勾勒，便是要小队找到并恫吓这些人，让他们噤声，乖乖听话。金线之下的名字，则是贿赂的对象，通常伴随着任务资金，当然，并非所有人都能用金钱收买，所以必要时，还会提供其他的名字，比如妓女、毒贩，以及其他一些稀奇古怪的东西。至于黑线之下，不言而喻，这意味着更为严重的后果。\n\n今日的名单上，五个名字赫然在目。三个红线之下，是一群保守的法西斯政治家，他们常聚于同一家咖啡馆，共享同一种雪茄。金线标注的，是一位当地的股票经纪人，随信附上了几枚古色古香的金币，仿佛诉说着威尼斯昔日的辉煌，用意不言自明。最后一个黑线标注的名字，是一位当地警察，铁杆法西斯分子。老人在装填枪弹时，心中不禁对这位即将面临命运裁决的人涌起一丝怜悯。"
 scorzaseventies.6.a:0 "此际艰难，纪律如磐。"
 scorzaseventies.7.t:0 "双重会议"
 scorzaseventies.7.d:0 "傍晚六点的钟声敲响，罗马城两端的宅邸前，两辆轿车悄然启程。朱尼奥·博尔盖塞，领袖的忠实盟友，坐在其中一辆；意大利的王储，眉头紧锁，忧虑重重，坐在另一辆中。他们各自为了不同的目的去见心腹，但在政治的棋局中，他们的命运早已交织。在前往会面的途中，两位男士各自沉浸在自己的思绪中，而司机们则在首都的繁忙街道上熟练地穿梭。\n\n博尔盖塞，这位老者，对法西斯主义的热爱依旧如火，他在心中反复琢磨着昨夜收到的计划。计划大胆，却正合时宜，为意大利在世界舞台上的崛起铺路。领袖所期望的网络关系网，虽需他本人披荆斩棘，但对他而言，为了信仰，一切付出都是甘之如饴。\n\n而王储的旅程则是忧虑重重。他心中不断思考着父亲和父亲心中的盘算，以及那封仆人在无人注意间递给他的密信。信中父亲向他辨认不出的某位名字用密码书写的将军请求紧急会面。他无法确切知道父亲为何这么做，但他心中有数。\n\n斯科尔扎，那个狡猾的家伙，总是在暗中策划他的阴谋，鬼知道这次他又在密谋什么，肯定不会是好事。多年前斯科尔扎的盘算得逞了，这次如果让他再成功，皇室就得倒霉了。他身体前倾，催促司机加快速度，决心不让斯科尔扎的阴谋再次得逞。"
 scorzaseventies.7.a:0 "如果他们真的要来抓你的话，那这还是杞人忧天吗？"
 scorzaseventies.8.t:0 "玩弄硬汉"
 scorzaseventies.8.d:0 "党内高层使出浑身解数，方才将高层的新指令勉强推行。面对新令，众人初读之下，颇有手足无措之感，困惑于如何在所给定的时间内，彻底翻修经数十年沉淀的法律，乃至宪法本身。然而，此事不容有失，尤其是通知上那“1-49”的数字，让人不禁联想到凯撒跨过卢比孔河的决断时刻。\n\n他们以坚定不移的意志，着手执行这项指令。多年积累的人脉资源被尽数调动，一场几乎全方位的媒体封锁随之展开，确保国王的盟友在公告发布时猝不及防。行动团队的每个成员都受到严密监视，任何疏忽都可能导致功亏一篑。其间几次险些泄露，最惊险的一次是一位高层在午餐时对秘书失言，差点泄露了秘密。为了确保她的沉默，不得不提供给她名贵的服装、一次免费的纽约之旅，以及为她年迈的父亲增补养老金。\n\n经过一番艰苦卓绝的努力，终于迎来了行动的关键时刻。领袖在一次石破天惊的媒体公告中明确表示，他已采取了史无前例的措施，修改宪法，剥夺了王室对政策的直接影响力。短短几分钟内，高层们的努力便见效了。对变革的本地反抗在萌芽状态就被迅速镇压，媒体的质疑声被有效遏制，抗议活动也被降至最低。一切尘埃落定后，他们为自己的成功和出色的工作举杯庆祝。"
 scorzaseventies.8.a:0 "意大利不会重蹈覆辙……"
 scorzaseventies.9.t:0 "索尼奥失踪"
 scorzaseventies.9.d:0 "在大约上午10点钟，人们惊觉保皇派军事将领埃德加多·索尼奥竟人间蒸发。消息不胫而走，到了10点20分，领袖的办公室已闻风而动，随即引发了一连串的紧急搜寻和对全国军界高层的紧急电话联络。10点45分，这则消息抵达了孤立无援的王室，让本已心烦意乱、疑虑重重的国王猝不及防。10点58分，国王之子接到急电匆匆赶来，只见父亲侧卧沙发，一时间心乱如麻。直至11点02分，国王才安抚住他，父子俩这才展开对话。以下是他们后来的证词所记录的对话内容：\n\n翁贝托二世（U）：“感谢你应我的请求而来，我的儿子，没有你我不知道我能否面对即将到来的考验。”\n维托里奥·埃马努埃莱亲王（VE）：“父亲，请别说了，为您做这些是应该的。您需要我做些什么？实话说，我最近确实很担心您的健康。”\n翁贝托二世：“我的儿子……你对我和国家的忠心，远超我所期望。我羞愧地承认，我曾对你撒谎，欺骗了你。几周前你向我展示的那封寄给某位将军的信？我实际上把它寄给了索尼奥将军，是为了讨论如何对斯科尔扎采取行动——”\n维托里奥·埃马努埃莱亲王：“父亲，您早该告诉我！”\n翁贝托二世：“我深感歉疚，我当时就应该像现在这样信任你。我得知索尼奥将军失踪的消息，心中十分忐忑，不知这对我们是吉是凶。我们即将迎来一场严峻的考验，我甚至不确定我们能否取得胜利。我儿，我深感遗憾，我还有很多未竟之事……”"
 scorzaseventies.9.a:0 "时代终焉……"
 scorzaseventies.10.t:0 "未解之谜"
 scorzaseventies.10.d:0 "翌日黎明，国王与王储已完全明白，无论索尼奥将军身上发生了什么，肯定不会是好事。但在接下来的几天里，他们仍抱有希望，等着谁来宣告最担心的事情并未发生。最终也只能面对真相，索尼奥将军已沦为众多牺牲品的一员，跟着那帮保守派、反斯科尔扎的法西斯派与其他异议者无影无踪：没人会来拯救国王。王储沮丧地叹了一口气，从父亲的住处开车回家，恐惧的气味扼住咽喉，挥之不去。\n\n索尼奥事件发生后的几十年，仍然是人们激烈争论的话题，不仅吸引了阴谋论者与无聊的人，许多主流学者也在研究。有人说，若无必要勿增实体，最好的解释就是最显而易见得解释：不过是斯科尔扎发现了索尼奥的计划，于是安排他去非洲或巴尔干半岛的某个行政黑洞，进而消失。另一种论调最受欢迎，称为巴西论。它认为索尼奥意识到形势日趋绝望，只能逃到南美洲。在南美可以远离罗马愈演愈烈的权力游戏，过上平和生活。当然，人们也会给出更疯狂的解释，像什么日本特高课的计划，纽约黑手党头目参与索尼奥事件，或将军逃瑞坠机而亡。也有更胡思乱想的，索尼奥其实是被外星人绑架了。到现在我们也不知道到底发生了什么，但不管怎样，对于当时反对斯科尔扎推行“正统法西斯”的异议者来说，索尼奥的失踪只是一长串失望事件中的又一件。"
 scorzaseventies.10.a:0 "本来有机会……"
 scorzaseventies.11.t:0 "答案揭晓"
 scorzaseventies.11.d:0 "翌日黎明，国王与王储已完全明白，无论索尼奥将军身上发生了什么，肯定不会是好事。但在接下来的几天里，他们仍抱有希望，等着谁来宣告最担心的事情并未发生。暗流涌动，火星闪过，罗马与全国各地的几处守军竟一同起义，孤注一掷与法西斯决战。这被后世称为“索尼奥突袭”的事件让所有政治派别，尤其是已然绝望的国王惊讶不已。斯科尔扎和他的盟友倾尽所有试图对抗，甚至号召学生们站出来，上街为法西斯而战。但最终，军队以索尼奥将军为核心不断推进，成功之势不可阻挡。\n\n作为凯旋的英雄，索尼奥前往国王的住处接受接见，同时由一支官僚、助手和警卫组成的另类军队陪同参加会议。二人刚在客厅就坐，记者便不断为全球各地的报纸拍下两人在一起的照片。摄像机终于慢慢平静下来，国王转过头来对将军说，“那么，将军，你下一步要做什么？”\n\n将军回头看向国王，面露惊讶，笑了笑。“陛下，您似乎没了解情况。我只是名将军，而您才是这个国家的国王。未来的决定权不在我们，而在于您对我们有什么吩咐？”\n\n听着回答与远处的抗议声，翁贝托皱起了眉头。"
 scorzaseventies.11.a:0 "时代终焉……"
 scorzaseventies.12.t:0 "党最伟大的胜利"
 scorzaseventies.12.d:0 "几名卫兵陪同领袖，缓缓乘坐电梯到一楼，每个人的神情都如钢铁般坚毅，武器也如往常一样备好了。斯科尔扎站在年轻的卫兵身后，形成鲜明对比的是，领袖的肌肤已随年龄增长而起皱下垂，但制服笔挺依旧，目光仍然年青、灼热。几人间无话，不知怎么形容数小时前发生的一切。电梯一侧的喇叭打破寂静，提醒现在是下午五点，在它开始播报公告前，斯科尔扎的思绪已然飘走。\n\n漫游今日之初，在重大公告暨新闻发布会上，斯科尔扎带领一行人宣布要踏上其法西斯计划长期以来饱受质疑的最后一步。领袖声称找到了证据，足以证明国王和某些总参谋部成员密谋强行推翻合法政府，并向德国称臣，让全意人民走奴化服从的旧路。他接着说：“很明显，意大利不会因奴性而繁荣，我们必须采取强有力的措施，旗帜鲜明制止历史倒退。”然后他顿了一下，让听众回味这番话，他们紧闭双唇，而突有炸弹猛地投下，正是期待已久的……“意大利君主制，一个反动透顶的反法西斯制度，必须打倒！”\n\n如他所料，此等重磅使意大利两极分化，政府采取了过往采取过的一切预防措施，确保不会发生大规模动乱。一段时间以来，他感到空气溢出紧张的气息，包裹着他和盟友，挤迫着他们，提心吊胆昏昏欲死。就在快失去希望时，好消息传入耳中：国王和王室登上前往华盛顿的飞机。\n\n国王的离去最终缓和了紧张局势。领袖站在墨索里尼多年前宣布建立新国家的那个阳台上，以胜利的目光迎接人群。做前任做过的事，宣布成立：意大利社会共和国。人群爆发赞许和爱国的欢呼声，他知道，在某个地方，前辈们都以骄傲的目光俯视着他。\n\n电梯终于到达目的地，他伸手拭去脸上的一滴眼泪。他已经老了，剩下的时间不多了，但年轻时想做的一切都已做到。法西斯主义战胜了意大利本身。"
 scorzaseventies.12.a:0 "前进，意大利！"
 scorzaseventies.13.t:0 "最后一幕"
 scorzaseventies.13.d:0 "沉闷清晨，领袖独处办公室数小时，唯有烟灰缸与葡萄酒为伴。他领导革命全面胜利，国家改朝换代走向共和。可自那以后，反倒没睡过好觉，未知感压在心头。起身再倒杯酒，一阵风摇晃窗户，转移了他的注意。\n\n走到窗前，放下插销，凝望着玻璃外的沉睡罗马。街道几近无人，房屋昏暗，市场寂静，只有一位老人和他的狗在此刻散步。从挥动的手臂与表情看，老人的体力不敌爱犬，仍走不息。爱，不言而喻。斯科尔扎望着老人，内心升腾强烈的，自己也应如此的想法。他确信在任期里取得了众多成就，而此刻，他也只是一个老头，青春不再。闭上眼睛，不再看窗外的人，但念头不止。\n\n回到桌前，打开抽屉，取出纸笔。内心尖叫着让他停下来，转头握持权柄与财富吧。但占大头的声音还是指明了方向，“斯科尔扎，写完它”。另一边，国家法西斯党多年来一直暗流涌动，而他尽力抵御变质。到现在，他也不太知道自己解甲归田是不是太自私了。\n\n疑虑挥之不去，斯科尔扎还是提笔写下辞职信。"
 scorzaseventies.13.a:0 "你们怎么办，只有天知道。"
 scorzaseventies.14.t:0 "他们不愿示人的隐秘"
 scorzaseventies.14.d:0 "OVRA的成立本是为了追踪反法西斯行动，但这并不限于它只能追捕游击队。正如我们常说，明枪易躲，暗箭难防，内部的敌人同样不容忽视。那些自诩改革者，口口声声爱国，实则动摇国本。他们轻飘飘地谈论变革，承诺给每个人一切，这种行径和那些埋下汽车炸弹以制造恐慌的行为具有同样的破坏性。够了！OVRA须深挖每一个改革者及其联络网络，定能揪出他们的狐狸尾巴。如果我们没有找到，我们还可以制造信件，伪造签名。"
 scorzaseventies.14.a:0 "我们将追寻真相，或编织假象。"
 scorzaseventies.15.t:0 "政党机器"
 scorzaseventies.15.d:0 "国家法西斯党已在斯科尔扎领袖的形象下重新铸就，这是法西斯党派的必然之路。尽管党内上下都对卡洛·斯科尔扎宣誓了坚定不移的忠诚，我们仍需警惕，不能有丝毫松懈。十年之前，齐亚诺曾将他的改革派人士安插进党中，如今，那些最恶劣的分子虽已被剔除，我们必须立刻行动，防止那些动摇意大利人心的不稳定因素渗透进党内。在国家法西斯党内，不允许有任何意识形态的偏离，不允许有任何疑虑的空间。若有人胆敢背离党的路线，他们很快就会发现自己被排除在党外。之后，我们所要做的，便是彻底清理他们留下的残根，确保党派的纯洁和统一。"
 scorzaseventies.15.a:0 "他们会服从的。"
 scorzaseventies.16.t:0 "军队与我们站在一起"
 scorzaseventies.16.d:0 "军人皆须与我们并肩，众志成城。在法西斯政权及其海外殖民地，军队乃安危之所系；立刻集结并砺兵秣马，确保每颗子弹皆蓄势待发，随时准备射入敌人的头颅。自满之心，万不可有之。如果必须实行军事管制，军队将做好准备，如果到了必须对同胞采取行动的时刻，军队也将执行命令。全军上下都将对领袖的命令忠诚响应，每一位士兵都将感到自豪，因为他们是在领袖之名下奋勇杀敌。"
 scorzaseventies.16.a:0 "若需平乱，他们的枪炮将重铸秩序。"
 scorzaseventies.17.t:0 "更强力的警察"
 scorzaseventies.17.d:0 "在意大利的广袤内陆的城市和村庄中，尽管我们已不懈努力，却依旧发展滞后。在这片需要警惕的地带，警察的目光将如影随形。这个不容有失的紧要关头，我们已果断增强了警察的力量，无论是人力、装备还是资金，都已大幅得到增强。无论是减少不稳定性带来的小犯罪，还是在国内的巷弄里追捕恐怖分子和他们的线人，警察都将无所不备。若不幸发生意外，例如拘留者遭受伤害或不幸罹难，我们也不会轻易地向警察追究责任。"
 scorzaseventies.17.a:0 "他们深知自己所做的代表着什么。"
 scorzaseventies.18.t:0 "天使之友"
 scorzaseventies.18.d:0 "我们曾经努力培养与意大利各地杰出神职人员之间的联系。现在，是时候让我们的投资得到回报了。在这些国家最宏伟的教堂之中，我们那些神的忠仆之友，将在讲坛上向信徒们阐释谦卑与服从凯撒的要义。那些制造不稳定、煽动暴动和混乱的人，不仅仅是犯罪者——他们实际上是在为黑暗之主效劳，而那些党派分子不过是基督敌人的堕落奴仆。这些警世之言，将使心怀不满的信徒们心生敬畏。若他们不为对领袖或法西斯的爱而顺从，或许他们会因对上帝的虔诚敬畏和服侍之心而至少选择顺从。"
 scorzaseventies.18.a:0 "宗教，乃是维系人心的纽带。"
 scorzaseventies.19.t:0 "基督之国"
 scorzaseventies.19.d:0 "一些基督徒误入歧途，加之外来煽动，他们声称意大利法西斯主义已与基督教为敌，激起了宗教间的紧张情绪。然而，真相远非这般，卡洛·斯科尔扎将揭示其谬误。法西斯主义与基督教非但能和谐共存，我们更需向国人明示，意大利是基督教的沃土，国家与教会的纽带坚如磐石，法西斯主义之力量亦源自其为上帝荣耀所作的贡献。国人亦应知晓，领袖对上帝心存敬畏，任何为此所需的展示都将毫不迟疑地进行。这样，人们将看清法西斯主义的所有敌人，无神论者，他们将在现世和来世自食其果。"
 scorzaseventies.19.a:0 "基督教法西斯主义是我们力量的源泉。"
 scorzaseventies.20.t:0 "国王的支持"
 scorzaseventies.20.d:0 "领袖，意大利的掌舵人，同时仍旧是意大利国王的忠臣，国王作为文化传统的中流砥柱，维护着社会的层级与秩序。斯科尔扎领袖支持国王，以此彰显他对国家恒久不变权力与财富之源的忠诚。这不仅能够平抚国王的忠实盟友，包括地主和工业巨头，也能稳固政府与公务员的心。若卡洛·斯科尔扎全心效忠于国王所象征的事业，又怎会做出损及意大利之事？同样，任何政府官员或权贵，若参与国政，又怎能在不背离国王的前提下与领袖为敌呢？"
 scorzaseventies.20.a:0 "陛下的支持将使我们更强大。"
 scorzaseventies.21.t:0 "意大利高于一切"
 scorzaseventies.21.d:0 "坦率而言，意大利文明是世界史上的瑰宝，意大利人民是人类潜能的典范。意大利法西斯主义的民族主义立场一直毋庸置疑，斯科尔扎现在需要向人民发出号召，以同胞之情，赢得他们的支持。他要提醒人们，尽管有时被遗忘，意大利的领导地位是他们所珍视的一切之根基；对意大利的自豪，是他们内心深处最真挚的向往；没有意大利和意大利民族，他们将失去根基。斯科尔扎愿意不辞辛劳，不断阐述，直到这一信念在意大利人心中生根发芽。"
 scorzaseventies.21.a:0 "领袖的脸出现在破旧的电视屏幕上，夹杂着阵阵静电干扰。"
 scorzaseventies.22.t:0 "反法西斯分子有好多坦克"
 scorzaseventies.22.d:0 "“他们有坦克，领袖。”斯科尔扎出生的卡拉布里亚大区科森扎省发生大规模炮击与巷战，击垮了当地法西斯驻军的防备。在其他地方，北方的一处村庄报告有端着突击步枪的游击队出没，威胁说，要么向反法西斯分子提供食物与装备，要么全村夷平。\n\n从情报部门到士兵，当局最担心的事情已成现实。受影响最严重的地区，商业陷入停顿。本土的大片地区，连部队都无法保障自己的安全。卡洛·斯科尔扎是做出稳定与和平的承诺，可如果反法西斯分子有坦克，天知道他们还能搞到什么，完全取决于他们为摧毁法西斯主义要走多远。对于民众中那些诚实的养家糊口者，他们每天耗费精力为孩子争取更好的生活，此刻面对最糟糕的事情，那就是未知。不知道明天会发生什么，不知道经济还能维持多久，不知道后天谁来统治他们。为了镇压游击队，政府不惜流血。但当血在街头巷尾静静流淌时……"
 scorzaseventies.22.a:0 "……意大利再次堕入动荡。"
 nscorza.3.t:0 "第二届维罗纳大会"
 nscorza.3.d:0 "新闻短片铺天盖地，报童每天赚够足够的零花钱，维罗纳会议一词在狂轰滥炸下深入人心。斯科尔扎领袖宣布，是时候在维罗纳再聚首了，最终定论意大利该如何重夺其应有的荣耀。像不久前一样，各地政客、官员以各种运输方式抵达阿吉德。而早在代表团来之前，各新闻团队就已在上级指示下抵达。全意都在等待，看斯科尔扎究竟如何统领全国。\n\n法西斯主义过去一直是个变化无常的东西，无疑，如今的它需要明确定义。由于上届会议的局势十分紧张，人们对此次会议到底会发生什么也就无比担忧。但同时，人们的情绪高涨，对会议抱有极高期望。无论如何，斯科尔扎都会带领意大利奔赴其天命——地中海的霸主！"
 nscorza.3.a:0 "走向胜利！"
 nscorza.4.t:0 "树根最老"
 nscorza.4.d:0 "法西斯的根，埋在圣墓宣言里。圣墓宣言是墨索里尼20年代初构建的法西斯主义基石。一些无知的官员认为，墨索里尼的教诲已过时得可笑。但斯科尔扎领袖宣布，在如此动荡不安的时期，就需要回望墨索里尼的原始教义，以此为指导，洗去数十年来偏离党基本原则的污秽、腐败。\n\n让我们细读“意大利战斗者法西斯”的创始语，那最纯粹、最纯净的教义。意大利会回到它曾经的样子，而且会因此更好！然而，有些家伙依旧执迷不悟，认为这不是前进，而是衔尾蛇转圈瞎折腾。只有时间会证明法西斯主义能否永续。"
 nscorza.4.a:0 "有时，旧的更好。"
 nscorza.5.t:0 "回到阜姆"
 nscorza.5.d:0 "阜姆被视作法西斯主义的摇篮，是法西斯理论的第一个试验场。加布里埃尔·邓南遮挥舞大旗传播思想，他就是法西斯的浸信会约翰。为此，斯科尔扎参观了亚得里亚海的那座老城。阜姆展示了国家在意识形态方面的丰富历史，重新激发了一部分人的民族自豪感。\n\n当然，希望看到斯科尔扎倒台的团体对此嗤之以鼻，认为这不过是拙劣的宣传，毫无意义，斯科尔扎则谴责这是毫无根据的仇恨，异见者见不得意大利走上“正道”。但也确实引出了个问题，他到底在做什么。"
 nscorza.5.a:0 "追寻过去，寻见未来。"
 nscorza.6.t:0 "心海待航"
 nscorza.6.d:0 "青年，国家之栋梁，此言今日愈发真切。法西斯主义课程一度面临废止，但斯科尔扎领袖一纸令下，它们又重登讲坛，无限期地延续。墨索里尼领袖亲撰的《法西斯主义教义》，如今在课堂上反复传颂，深深植根于意大利孩童的心田。\n\n异见者对此嗤之以鼻，视其为对幼小心灵的无谓之举，亦是对学校日常的无端拖延。斯科尔扎领袖则不以为然，将这些非议统统斥为“螳臂挡车，企图阻挠意大利迈向辉煌”。这些课程能否真正造福政府，尚需时间揭晓，但其影响，必将深远。"
 nscorza.6.a:0 "幼年栽树，期颐参天。"
 nscorza.7.t:0 "尊重你的长辈！"
 nscorza.7.d:0 "四十载光阴荏苒，国家法西斯党仍旧在那些曾在进军罗马中被洗脑的人士的掌控之中，此局面似应维持不变。党内的热血青年，思想激进，被巧妙地拒于权力高层之外，以维系旧有的秩序。下层党员虽心怀挫败与迷茫，却对自身难以攀至高位的深层原因一无所知。\n\n党内高层对斯科尔扎的种种行径过于纵容，国家法西斯党不仅将沿袭其陈旧的路径，还将对它服务的国家和政府更加忠诚。斯科尔扎的党派路线获得了空前的成功，而他的敌人对此一无所知！"
 nscorza.7.a:0 "姜还是老的辣。"
 nscorza.8.t:0 "往昔荣光"
 nscorza.8.d:0 "意大利的校园里，一本新书《领袖墨索里尼的奋斗》成了学生们的新宠。书中，斯科尔扎的学者们用笔墨细腻地勾勒出墨索里尼的崛起和法西斯主义的兴衰经历，正如书中所言，意在让年轻一代领略“意大利史上最伟大领袖”的风采。\n\n新文学课程的影响尚待观察，但教育的触角远不止于此。海报、传单、公告，这些无声的教诲正悄然植入孩子们的心田。墨索里尼的遗产，无论功过是非，都将被镌刻在历史的长河中，成为不可磨灭的记忆。"
 nscorza.8.a:0 "没了墨索里尼的理念，法西斯主义还剩下什么？"
 nscorza.9.t:0 "谄媚之躯"
 nscorza.9.d:0 "斯科尔扎领袖苦口婆心，力图引领意大利民众重返法西斯旧途，却成效不彰。于是乎，暗流涌动，有人幕后操纵，试图在公众中挑起矛盾。一些唯唯诺诺之辈与新兴城市精英，被选拔出来置于基层要津，企图以软言细语，诱他们重拾昔日信仰。\n\n然而，民心似水，各有所向。纵有千呼万唤，异见之声依旧不绝于耳。政府之内，焦虑与挫败之感日渐滋长。"
 nscorza.9.a:0 "没人会听的。"
 nscorza.10.t:0 "岁月之痕，德行之光"
 nscorza.10.d:0 "意大利昔日的辉煌在罗马的荣耀中得以铭记，那曾是对整个欧洲乃至世界施展影响力的证明。如今，意大利已经铸就了一个新的帝国，带来了新的荣耀。然而，此非终点。宣传之声遍布意大利，以罗马古韵为镜，激励国人，向古罗马之伟大看齐。斯科尔扎领袖近日宣言：“罗马虽逝，遗韵犹存。让我们永志不忘，承继此份遗产。”\n\n意大利之力量，处处与古罗马相映成趣。步兵师步履蹒跚于非洲沙海，有如古军团影影绰绰于日耳曼森林。战舰扬帆于地中海残波，恍若古战船与迦太基争锋。民众对此古今辉映赞不绝口，对罗马史话及帝国福祉兴趣盎然。诚然，罗马帝国虽成往事，但其遗风长存，永铭人心。"
 nscorza.10.a:0 "罗马不可战胜。"
 nscorza.11.t:0 "志愿民兵"
 nscorza.11.d:0 "黑衫军，忠心耿耿，始终不渝地追随国家法西斯党和领袖的步伐，从未有过越轨之举。反观皇家军队，却屡屡背离罗马的权威，投向像齐亚诺这样的所谓民主政治家，或是那位心怀叵测的国王。斯科尔扎的这些思考，无疑让MSVN，即黑衫军，在国内外执行任务时备受青睐，几乎自成一军。毕竟，展现国家意志，还有比党的铁拳更合适的工具吗？"
 nscorza.11.a:0 "忠心所至，效力自显。"
 nscorza.12.t:0 "偏执的协作者"
 nscorza.12.d:0 "斯科尔扎所不愿召开的维罗纳会议，终成一场灾难，会议中争议四起，无序蔓延。政府不得不与反对者携手，以保行动顺畅。斯科尔扎召集了那些力主再次召开会议的人，他们竟出人意料地一致同意了他的方案。那些闭门会议的内幕，唯有在场者了然于心，但至少，计划可以付诸行动了。"
 nscorza.12.a:0 "可疑。"
 nscorza.13.t:0 "巧置天成"
 nscorza.13.d:0 "意大利王国的国家宪兵，担纲着军事警察的职责，他们主要效忠于王室与改革派，这种忠诚在当下尚属容忍之内。为了平息维罗纳的抗议之声，掩盖第二次维罗纳会议不尽人意的事实，一支宪兵分队将被派往当地执行任务，理想情况下，这一切尽在不流血的平和中完成。斯科尔扎领袖巧施妙计，让各派势力相互制衡，尽显其政治手腕。"
 nscorza.13.a:0 "意料之中。"
 nscorza.14.t:0 "恐慌之国"
 nscorza.14.d:0 "意大利，再次被不安的阴云笼罩，然而，相较于往昔，此刻的恐慌似乎无根无据。斯科尔扎，面对维罗纳的抗议波澜和政治的连连失误，毅然宣布全国进入紧急状态，这一举措，被多数人视为过激之举。然而，洞悉世事者窃窃私语，认为这决策背后，隐藏着铲除国家法西斯党内异己、巩固权力的深层图谋。至于那些敢于揭穿真相的声音，总是在破晓前悄无声息地消逝，但这或许只是风中之烛，不足为惧。"
 nscorza.14.a:0 "完全必要！"
 nscorza.15.t:0 "双手沾血"
 nscorza.15.d:0 "惨剧收场后，庭院里的尖叫声回荡了数小时，火光冲天里，亲人们在火海中紧抱将逝的至亲。人群在棍棒驱赶下四散奔逃，尸体被无情践踏。国家宪兵的行径，超出了我们的预料，损害控制与信息封锁随即启动。\n\n斯科尔扎及其政府宣称，维罗纳镇暴行动中有4名抗议者命丧国家宪兵之手。他们未对这些行径表达哀悼，反而将其视为其坚定意志的体现，他们正决心实现意大利应得的命运，与齐亚诺截然不同。民众愤慨不已，但维罗纳被清洗的结果似乎已成定局。斯科尔扎已表明，他言出必行，不容置疑。"
 nscorza.15.a:0 "一切为了更大的利益。"
 nscorza.16.t:0 "血染城镇"
 nscorza.16.d:0 "维罗纳，这座城池，如今已染上了血与泪。抗议与暴动，似洪水猛兽般向四周蔓延。增兵平乱，成了燃眉之急，然而今日，第四步兵师利沃诺分队在一场血雨腥风中，被暴动者所吞噬，不过又添新鬼。军队只得退守城郊，重整队伍，而暴动已渐成围城之势。据闻，已有3名士兵与5名暴动者命丧黄泉，死亡总数攀升至12人。这些行径，已使维罗纳声名狼藉，斯科尔扎政府也因其残暴而变得臭名昭著。动荡不安的情绪开始蔓延，但斯科尔扎的铁腕政策暂时还能稳住局面。"
 nscorza.16.a:0 "准备战斗！"
 nscorza.17.t:0 "无事发生"
 nscorza.17.d:0 "意大利正经历着一场精心策划的迷雾与混乱。维罗纳的悲剧，已被刻意从历史的篇章和人们的记忆中抹去。书籍和记录中，关于这座城市近期历史的记载被斩草除根。那些曾大胆谈论的人，不是缄默不语，就是杳无音信。为了封堵真相的洪流，贿赂、威胁、暗箱操作和暗杀成了OVRA的惯用手段，他们将线索通通掩盖，一切文件的踪迹都被引向了绝路。\n\n那些心中铭记着那几周混乱的人，若不守口如瓶，便要面对斯科尔扎政权的铁腕。随着时间的流逝，旧事将被淡忘，新篇章将被书写。没有干预，没有骚动，斯科尔扎是意大利的领袖，他将引领国家走向胜利！"
 nscorza.17.a:0 "真相即威胁。"
 nscorza.1400.t:0 "商海启航"
 nscorza.1400.d:0 "数月的风雨飘摇之后，斯科尔扎终于为意大利的未来之路定下了基调。行政机构将无条件遵从他的每一条命令和指令，随时待命。他的目光现已聚焦于那些扼住意大利咽喉的难题。步履维艰，几近停滞的经济，笼罩其上的亚特兰特罗帕阴霾。如影随形的社会问题，困扰着意大利的子民，还有妇女权利、少数族裔认同等亟待解决的议题。\n\n政治纷争与社会矛盾，正撕裂着意大利民族的根基。意大利在世界舞台上的地位，她的帝国荣耀与影响力，以及欧陆的复杂局势。北方的德国正虎视眈眈，东方的巴尔干半岛动荡不安，地中海的霸权地位正受到背信弃义的“盟友”挑战。意大利面临重重困境，但斯科尔扎决心以各种方式，带领她披荆斩棘，渡过难关。"
 nscorza.1400.a:0 "为我们带来胜利！"
 nscorza.18.t:0 "男人的伴侣。"
 nscorza.18.d:0 "意大利的人口虽有一半是女性，但她们在行政事务中常常被置于幕后。她们只会在权宜之计下获得自由，如昔日所谓争取选举权的斗争。法西斯主义将她们囿于家庭主妇、母亲、家务操持者的角色，使她们处于不利之地。但斯科尔扎领袖洞悉了这种陈旧观念的弊端。要使意大利凝聚为一，必要让人民同掌国器，共享平等机遇，以激发国家之最大潜能。\n\n然而，总有人抱残守缺，希望维系墨索里尼时代的父权社会。斯科尔扎对这两种观念持开放态度，但现在已经到了需决断女性在社会中应扮演的角色的时候了。一石激起千层浪，任一选择都将触动另一方的敏感神经，这是世间常理。"
 nscorza.18.a:0 "有她，生活添色；无她，世界失彩！"
 nscorza.19.t:0 "渴求之化身"
 nscorza.19.d:0 "社会近来不乏尝试，欲将女性推上国家和社会行政管理的舞台中心，但难题依旧存在。法西斯主义，素来以一位中心人物的显赫地位为基石，如今亦是如此。要在意大利进一步促进女性权益，便需一位领袖，一位被形容为“女性法西斯主义代言人”的女性。\n\n然而，现实却是，至今尚无一位能够担纲此任的理想人选。虽然女性在某些领域或个别运动中已崭露头角，但要找到一个能统领整个“女性法西斯主义”运动的领袖，仍属难事。此问题现亟待解决，以免我们前功尽弃。"
 nscorza.19.a:0 "非雄则雌，强者何问雌雄？"
 nscorza.20.t:0 "待在厨房，而非办公室！"
 nscorza.20.d:0 "意大利近期的女性赋权尝试，在维护根深蒂固的父权制思潮面前，终究功败垂成。运动因种种短板、意外事故和缺失的公众支持，这场运动已被在位者及其庞大的保守派支持者所阻。所谓\"女性法西斯主义\"，被定义为无本之木，无源之水，在国家的信息渠道中广为传播。\n\n那些依旧坚守在这条摇摇欲坠之船上的人，随着领袖的离去和资金的枯竭，陷入了内讧和争斗。特别是卡洛·斯科尔扎及其政府，他们已经屈服，转而支持父权制。看来，平等之梦，终究只是黄粱一梦。"
 nscorza.20.a:0 "真是个荒唐念头。"
 nscorza.25.t:0 "法西斯主义的新面孔！"
 nscorza.25.d:0 "人们一听到“法西斯”这个词，往往不会想到进步，更不用说当提到卡洛·斯科尔扎的名字了。然而，人们的刻板印象再次被打破。意大利各大城市街头，新宣传画报与小册子随处可见。这些尝试都在推广一种新的女性主义论调，这种论调已经连续几周在意大利的社会和政治氛围中占据主导地位。\n\n这些文字，意在赞颂意大利女性之勇，她们面对日常生活中的挑战与父权制带来的压迫，不屈不挠，为国争光。“法西斯的新面孔”一语，已成女性运动的代名词，广为流传。女权运动在法西斯这样极端的意识形态中获得声势，出乎众人预料，而今却已成现实。这不仅在宣传上效果显著，更为军事与经济领域开辟了前所未有的可能。未来，女性或将与男性同赴战场，或在工厂并肩作战。这一切新景象，全赖斯科尔扎领袖之远见卓识。"
 nscorza.25.a:0 "出乎意料。"
 nscorza.26.t:0 "现代家庭主妇"
 nscorza.26.d:0 "历史上，男女关系的动态往往逃不出“男主外，女主内”的旧轨。虽在战争工业或社会运转的紧要关头偶有妥协，但大体局面依旧一成不变。近期的变革尝试，虽得到了前所未有的支持，却仍以失败告终。父权制的根基依旧坚如磐石，看起来仍将长久延续下去。\n\n父权制下的传统观念亦随之根深蒂固。妻子顺从丈夫，这一观念已沿袭数百年，且被认为应该继续下去。公共宣传、政治宣传和示威活动都在强调这些观念，呼吁停止进步变革的步伐，而事实上，这变革的步伐似乎已经偏离了轨道。妻子将留在家中，继续她的家庭角色；丈夫则将继续他的职责，为家庭提供支持。这一切，似乎已成定局，难以撼动。"
 nscorza.26.a:0 "世事变迁，唯此恒常。"
 nscorza.31.t:0 "古训今鉴"
 nscorza.31.d:0 "意大利今日之辉煌，乃昔日英烈之功。昔日英雄或已长眠，或已龙钟，不过，一个不可磨灭的事实是，正是他们的辉煌征程让意大利之鹰得以翱翔于地中海之上，若非他们，意大利或仍不过是欧洲大陆的配角，难望英法德之项背。然而，有人却背离了这些先贤的光辉遗训，几十年来，岁月的尘埃已悄然侵蚀了意大利民族之魂。\n\n那些图谋破坏意大利所建树的一切，所有在大战中为之浴血奋战的成果的人，必将被正义的声音所淹没，被历史的尘埃所埋葬，这是他们应得的下场。士兵将列队巡游于街巷，镇压一切异声；坦克将轰鸣前行，将其铁蹄下的异议碾为齑粉。对于意大利的国父们以及整个国家，任何不敬之举都将不被容忍。"
 nscorza.31.a:0 "爱国，义不容辞。"
 nscorza.33.t:0 "未来之道"
 nscorza.33.d:0 "国家的未来注定由年轻一代来执掌，他们携带着创新的思想。老一代的守护者不能永固权位，继承大业需及时筹谋，以免错失良机。党内的青年才俊，对如何使法西斯主义与时俱进、如何让意大利迎接前路挑战，有着深思熟虑的见解。他们的志业崇高，我们对此已经忽略太久。\n\n那些力不从心的老一辈领导者将被精力充沛、思想新颖的后来者所取代。现代的思想将为推动行政管理向前发展的引擎提供动力，以确保一切井然有序。过时的论调将被尘封，而适应时代的理念将被推崇。对过去的遗产，我们应心存敬畏，但一个朝气蓬勃的国家，绝不能由思想陈腐者来驾驭。"
 nscorza.33.a:0 "旧的不去，新的不来。"
 nscorza.34.t:0 "如果它没有坏"
 nscorza.34.d:0 "意大利历来伟大，荣耀至今。一战后的洗礼孕育了引领着意大利穿越战间期迷雾、并在第二次世界大战中让帝国一往无前的策略。这些做法令意大利长年稳定，未见颓势。那些欲断墨索里尼遗策、追捧未经世故虚妄理论的轻率青年，绝不能让他们接近任何行政职位。\n\n曾与墨索里尼携手，于罗马进军的火光中铸就法西斯的铁汉，正是他们在希腊山岳、南斯拉夫平原、埃及沙场上派遣壮士血战。他们，且只有他们，通晓意大利的治理之道，洞悉法西斯主义的精髓。改革之谈，变革之思，不过是幼稚幻想，言过其实。我们将坚持现行的道路，就像过去一样，它将带领我们安然度过这场风暴。"
 nscorza.34.a:0 "为什么要修理它？"
 nscorza.35.t:0 "圣座背后的男人"
 nscorza.35.d:0 "斯科尔扎政权与他们的法西斯主义，在意大利的天主教信众中根深蒂固，但这份忠诚似乎只系于一人一城。\n\n教宗，梵蒂冈的领袖，对法西斯主义的专制行径心存芥蒂，其观念亦在基督徒中广为流传。教宗的一言一行，往往能左右整个基督教世界的信仰，意大利亦然。\n\n暗杀教宗，非但行不通，更不能草率以一场意外来掩饰。我们需要集思广益，找出妥善的应对之策。或许，是时候一劳永逸地解决1870年的悬案了。又或许，还不是时候。"
 nscorza.35.a:0 "那些堡垒在轰炸机的轰鸣下不堪一击！"
 nscorza.36.t:0 "摇摇欲坠之城"
 nscorza.36.d:0 "梵蒂冈始终为教宗私利而奔走，从未真正为真理发声，或为意大利民众及基督教界谋福祉。斯科尔扎直言不讳，称教宗为诓骗者、骗子，更是个巧言令色的诈骗艺术家。他认为教宗及其所控之城，已失信于人，罗马与意大利皆应对此保持警惕。\n\n在今晨的公开演讲中，斯科尔扎如是说。梵蒂冈与意大利政府间的紧张关系已至临界点，罗马已与圣座割席，宣告教宗之言不可信。这一切源于一场旨在削弱教宗对意大利基督教及民众影响力的新运动，因为教宗发出的任何对法西斯主义的仇恨言论都势必可能影响到意大利人民。\n\n这样的运动充其量只是雄心勃勃的尝试，但斯科尔扎及其政府仍信心满怀，他们相信他们能够推动这场划时代的社会变革。"
 nscorza.36.a:0 "教宗即基督教的化身与象征！"
 nscorza.37.t:0 "宗教协定"
 nscorza.37.d:0 "意大利与梵蒂冈的纽带，是在1870年那场瞬息万变的战争中铸就的，它为意大利半岛的统一画上了句号。昔日统领意大利中部的教宗，如今仅能盘踞于梵蒂冈城这一弹丸之地，其规模之小，仅仅只是一方宫殿。教宗在这座城市的高墙深院中隐匿多年，直至1929年，方才签下一纸协议，以维系教会的根基。\n\n拉特兰条约，亦称协约，于罗马定稿，划定了教宗国与意大利王国的疆界。自法西斯主义崛起以来，两国虽关系紧张，却也相安无事。然而，斯科尔扎对教宗的逼迫，却让这份和谐走到了悬崖边缘。如今，协约亟待重新审视，未来的决策亦将基于此。为了基督教的大局着想，维系与教宗的联系至关重要。"
 nscorza.37.a:0 "如无圣座，教堂亦不过凡尘一隅。"
 nscorza.38.t:0 "千面之国"
 nscorza.38.d:0 "意大利，如今是一个包罗万象、多元共生的国家。在喧嚣的市集上，阿拉伯穆斯林与意大利基督徒交易往来；怀疑论者与虔诚信徒缔结连理；中国的传统主义者与阿尔卑斯山的异教徒交流思想。意大利，一个汇聚了众多信仰、种族和人群的国度，若只尊一教，便是对那些在意大利旗下生存的众多公民的忽视。\n\n正如今日，斯科尔扎领袖以法令宣布意大利为世俗国家。这一决策在意大利保守派眼中或许过于激进，却意外地为解决当前的教宗危机提供了一剂良方。斯科尔扎领袖已不愿随波逐流于教宗的宗教游戏，无论结果如何，他都已稳操胜券。当然，这一决策也在国家内部引起了一些分歧，但人们寄望于时间的治愈之力，希望它能弥合这些裂痕，带领整个国家走向更加光明的未来。毕竟，我们都是意大利的儿女，何不以这样的身份自豪地行动呢？"
 nscorza.38.a:0 "这是正确的选择吗？"
 nscorza.39.t:0 "旗帜之仆"
 nscorza.39.d:0 "在意大利，每一个同呼吸共命运、终归于尘土的人，都向国旗默默许下了终身为国服务的誓言，直至生命尽头。国家，而非教会，才是一切的主宰。意大利的每一位公民，都在国家法西斯党的严密监视之下，而非教宗的庇护之下。我们的政策，应当真实反映这一现实。虔诚的宗教信仰已成过往云烟，民族主义和对国家的奉献才是时代的主题！《圣经》将被党章所取代，神父的长袍将被军装和勋章所替代。这场教皇的闹剧，不过是教会日渐式微的垂死挣扎，它正被国家的铁蹄所压制。不是所有意大利人都是天主教徒，但每个人都是国家法西斯党的一员。"
 nscorza.39.a:0 "我们怎么才注意到这个啊？"
 nscorza.40.t:0 "向上帝让步"
 nscorza.40.d:0 "我们所面对的现实是，教会一直是意大利文化的灵魂、社会的脊梁、国家的根基，而且在未来许多年里，这种状况料将延续。我们不能一笔勾销它对人民的深远影响，也不能轻言以另一种信仰取而代之。我们必须正视与教宗的交往，这是我们不得不面对的现实，必须找到一个双方都能接受的解决方案，以避免这场小争执引发更大的动荡。\n\n在河口的一个山间小村，政府与梵蒂冈的代表们已经定下了会晤。人们期盼双方能像1929年那样达成协议。为了意大利的大局着想，我们必须达成共识。我们无需强求彼此的好感，他们也不强求我们的喜爱。我们只需和平共处，各自尽到对意大利人民的责任。待这些纷扰尘埃落定，我们便可放下包袱，迈向更加辉煌的明天。"
 nscorza.40.a:0 "有时，须得求同存异。"
 nscorza.45.t:0 "返回罗马"
 nscorza.45.d:0 "斯科尔扎从机场乘车归来，一只无声的黑鸟，仿佛命运的使者，悄然尾随。它在街道的灯柱、天篷、人群和车辆之间穿梭飞翔，却未曾发出一声鸣叫。斯科尔扎虽未见其影，却能感知其存在。这鸟儿，喙如墨染，羽似乱云，眼中透着锐利的光芒，警惕地在四周游移。\n\n他心知这鸟儿非比寻常，虽不是个迷信之人，却深感这是某种征兆，预示着未来的事件和即将踏上的道路。意大利的前路，充满了战争、饥荒、危机与死亡的气息，而他，斯科尔扎，正踏上这条荆棘之路。\n\n然而，鸟儿的沉默却让他心生疑窦。它不歌唱，不哭泣，似乎在默默传递着某种深意。他的选择是否正确？一切是否终将好转？他已克服重重困难，女权运动、教会问题、党内新兴力量对他的挑战，对他而言，无一不是迎刃而解。然而，他内心仍怀念那些轻松愉悦的时光，那时没有紧迫的压力，每晚都能享受美酒佳肴，确信第二天又是美好的一天。那时，一切似乎都静止了，哪怕只是短暂的一刻，远离了模糊的未来。\n\n当汽车在议会大楼前猛然停下，斯科尔扎的思绪却未有片刻停歇。他步出车门，踏上人行道，头顶上隐约传来一阵空气的轻拂。那只黑鸟振翅高飞，逆风而上，带着一种绝望却坚定的决心，飞越议会的拱门，最终消失在视野之外。前路漫漫，时不我待。"
 nscorza.45.a:0 "直至终章。"
 nscorza.90.t:0 "拾遗补缺"
 nscorza.90.d:0 "齐亚诺执政期间，其经济管理的失误尤为突出，堪称一场灾难。面对亚特兰特罗帕的严峻挑战，他未能迎难而上，终使意大利经济跌入衰退的深渊。斯科尔扎领袖希望人们相信，是齐亚诺的不作为导致了这一切。然而，实际上在齐亚诺任期结束前，经济已经开始慢慢稳定，尽管仍然十分脆弱。\n\n斯科尔扎领袖已经制定了一个计划，准备接手前任政府留下的烂摊子，但此计划尚待深究与共识，方能付诸行动。一场高规格的经济峰会即将召开，旨在汇聚各方智慧，共商国是，以期在意大利未来充满坎坷的发展道路上，引领国家稳健前行。"
 nscorza.90.a:0 "市场，妙趣横生。"
 nscorza.91.t:0 "权位挪移"
 nscorza.91.d:0 "意大利的官僚机构，宛若一潭死水，流程缓慢，决策短视，无能昭彰。这使得意大利经济的发展速度异常缓慢，那些管理者可能还在用19世纪的观念来指导现代经济。这些老旧的思想和做法终将被新时代所淘汰，年轻有为、雄心勃勃的新一代官僚将取而代之，带来新的活力。\n\n这股改革之风不仅限于经济领域，信息、警务、行政管理等部门也将经历一番洗礼，以期焕发意大利的全新活力。陈规陋习乃国家兴衰的分水岭，意大利必将破旧立新，远离衰败之途。"
 nscorza.91.a:0 "少年雄心，驾驭新朝。"
 nscorza.92.t:0 "权力泛滥"
 nscorza.92.d:0 "那些管理者之所以能够掌权，自有其过人之处，即他们在各自的领域内技艺精湛。无论他们是年迈力衰，还是随时可能过劳死，他们所迫切需要的，无非是更多的资金，以此来推动工作的进行。正如巧妇难为无米之炊，任何高效的官僚机构都离不开充足的资金来保持其运转。\n\n更多的资金将被注入行政部门，以解那些嗷嗷待哺的项目之急。如果那些管理者因资金不足而无法履行职责，整个意大利将陷入一片混乱。毕竟，金钱才是推动世界运转的不竭动力。尽管有人对此提出抗议，认为体制需要彻底改革，但他们的这些怨言终将被平息。意大利所需要的，不过是更多的\"活水\"，一旦条件俱全，一切便将迎刃而解。"
 nscorza.92.a:0 "金雨洒落，难题自解。"
 nscorza.80.t:0 "世界舞台"
 nscorza.80.d:0 "国际政治研究所，即IIPS，抛出了一个关乎意大利国运的重大议题：她在世界舞台上的形象，究竟是被视为一个强盛而自豪的帝国，还是一个无足轻重的棋子。这个研究所，虽由一群对未来尚在迷茫中的大学生组成，却也提出了值得深思的选项。\n\n往昔，意大利在列强之间巧妙平衡，这些关系到她国运的势力，既能助力意大利崛起，也能使其沉沦。从一战的协约与同盟，到战间期的法英，再到二战的轴心与同盟，意大利总是在关键时刻选择立场。如今，意大利面临的局势与往昔相似，不过是在世界大国间寻求新的权力平衡。意大利只需巧妙地利用大国间的相互制衡，以实现自身目标。\n\n然而，还有一个更为激进的提议：意大利已不再需要外部援助，她自身便是一个拥有广阔领土的强大帝国。我们的外交政策，应以意大利的需求和要求为依归，塑造她的势力范围和影响力。不再随波逐流，不再唯他国马首是瞻。意大利将昂首阔步，自立于世界之林。\n\n两种选择，各有千秋，但必须迅速决断。秃鹫已盘旋在意大利的身边，亟需开辟一条明路，以避免即将到来的混乱。"
 nscorza.80.a:0 "意大利，独立自主的帝国，新浪潮之主！"
 nscorza.80.b:0 "我们须随大国起舞。祖训不可违！"
 nscorza.81.t:0 "远疆荒野"
 nscorza.81.d:0 "意大利的殖民帝国广袤无边，它延伸过无数英里，穿越了严寒的高山、炽热的沙漠、丰饶的河口、文明的摇篮、海滨的小屋以及幽深的丛林。有时，人们可能会觉得，从罗马中心来统御这片广袤的领土，是一项难以企及的任务。然而，我们必须摒弃这种念头。意大利的帝国，只有不被视作力有不逮，才能真正避免力不从心。\n\n殖民地的行政机构与附庸政府已接到指令，开始与意大利本土的融合进程，旨在让管理更加高效，运作更为顺畅。从阿尔卑斯山的雪峰到雅典的古迹，从罗马的辉煌到圣地的庄严，从悠久的吉萨金字塔到摩加迪沙海边的贫民窟，意大利之鹰展翅高飞，自豪地俯瞰着这一切。意大利的辉煌，必将流传千古，与罗马的荣光相映成辉，这正是斯科尔扎所憧憬的宏伟蓝图。"
 nscorza.81.a:0 "若非帝国，意大利何以立足？"
 nscorza.82.t:0 "结合精髓"
 nscorza.82.d:0 "意大利帝国的繁荣，建立在丰厚的资源收益之上，它坐拥着全球一些最庞大的石油储藏、矿产资源和最肥沃的农田。然而，现实却是残酷的：若不能使殖民地的行政管理与我们的经济更紧密地结合，这些资源的充分利用便无从谈起。\n\n因此，精简机构、淘汰陈规将势在必行。意大利将稳扎稳打，逐步深入殖民地，确保收获属于自己的丰硕成果。"
 nscorza.82.a:0 "终归，这是我们的帝国。"
 nscorza.83.t:0 "帝国委员会"
 nscorza.83.d:0 "我国试着将殖民地间联系得更紧密，但很显然，意大利帝国已经过度扩张，走向分崩离析。意大利天鹰展翅，许多存在各种问题的自治国家包裹其中。为了纠正错误，新的行政机构已成立：帝国委员会。\n\n委员会试着让我国势力范围内的所有国家都建立、增进联系，互相更熟络，养成合作意识，以改善整个帝国。"
 nscorza.83.a:0 "英国人不是试过吗？"
 nscorza.84.t:0 "帝国经济共同体"
 nscorza.84.d:0 "帝国不仅要建立良好的地缘政治关系，在经济债务方面也应公平合作，不应只将附庸的资源转让给意大利。故此，帝国经济共同体应运而生，旨在促进意大利帝国内各国经济的互惠互利。未来将召开会谈，共商互助大计，确保一方有难，八方支援，同舟共济。尽管有人指责这是意大利扩大其势力范围内影响力的策略，但这种说法纯属是无稽之谈！"
 nscorza.84.a:0 "我向你保证，在这里我们是平等的。"
 nscorza.85.t:0 "里拉之旅"
 nscorza.85.d:0 "里拉，作为意大利的主要货币，维系着罗马及其海外子民的市场与企业。统一货币，对于帝国而言，不过是顺理成章。让意大利的势力范围内的各国以同一种纸币交易，将使帝国的货币流通与资源调度变得水到渠成。那些将此举的结局与德国人推广帝国马克的之后发生的失信行为相提并论的人，实在是无的放矢。里拉稳如泰山，帝国必将以其为纽带，稳固经济之基。"
 nscorza.85.a:0 "这一切真的不会崩溃吗？"
 nscorza.86.t:0 "数字中的惨痛现实"
 nscorza.86.d:0 "帝国的现实境况是，互利合作难于登天。既然这是意大利的帝国，其属下的殖民地难免成为其利用的对象。矿石和石油将被开采，送往亚平宁半岛，以供本土之需。意大利之所以能成就今日之地位，正是因为它愿意并一直在剥削其附庸。在帝国主义的世界里，没有所谓的公平，有的只是统治与被统治的关系。"
 nscorza.86.a:0 "尽是我们的资源！"
 nscorza.87.t:0 "别再端上来了"
 nscorza.87.d:0 "数字反映了一些令人忧虑的东西，全罗马的政府大楼都陷入恐慌。尽管从上到下尽了一切努力保持经济独立，但市场仍然低迷。政府高层与斯科尔扎匆忙召开紧急会议。\n\n他们得出了无可奈何的结论，即国家要从根本摆脱低迷，就是需要外部支持。当然，意大利可不想现在就崩溃，与外界保持一些友好联系也总归没有坏处。为了经济健康发展，民族自豪与爱国主义只能再放一放。斯科尔扎再也不想看市场报告了！"
 nscorza.87.a:0 "无趣的数字已经品鉴得够多了。"
 itapartyunity.2.t:0 "团结即一切"
 itapartyunity.2.d:0 "Politics is a game of balances, of compromises, and where necessary of ruthless betrayal. Above all it is a game of unity, and of coming to an agreement with the right people so that the whole becomes greater than the sum of its parts. The coalitions making up the Blocchi Nazionali and Fronte Democratico contain a diversity of personality and thought which may appear surprising to the uninformed outsider, who may expect a more cohesive identity to linger behind the surface. Even among groups as ideological as the BN and the FD, however, the importance of convenience and compromise remain central. A man in another country once said that a house divided against itself cannot stand, and whatever we think of the person who said it, it is hard to fault the words."
 itapartyunity.2.a:0 "Differences must be overcome, for the greater good."
 itapartyunity.3.t:0 "民主阵线崩溃"
 itapartyunity.3.d:0 "After De Lorenzo implemented Piano Solo, ousting the government led by the Fronte Democratico from the halls of power, it was difficult to imagine any outcome other than this. Torn by internal disagreement over what to do now, with previous ideological and personal gaps bubbling to the surface, the Fronte Democratico has collapsed under the weight of its own inflexibility. The leftist coalition's demise is a heavy blow to socialist and social democratic politics throughout Italy, and indeed much of Europe, as a leading flame of the workers' movement is snuffed out."
 itapartyunity.3.a:0 "The working man bows his weary head."
 itapartyunity.4.t:0 "国民联盟崩溃"
 itapartyunity.4.d:0 "Ferocious arguments, desperate midnight conversations and open recrimination have led to the inevitable. After being ousted from power by De Lorenzo, the Blocchi Nazionali has collapsed, and with it a hope for post-fascist unity in the new order augured by the transition out of old-style fascism. Although some demagogues attempt to rally their troops, saying that the fascist ideal embodied by the BN is not yet dead, it is difficult to imagine the disparate and fiercely competitive elements making up the grouping coming back together."
 itapartyunity.4.a:0 "没了权力，没了未来。"
 itapartyunity.5.t:0 "The Fronte Democratico government dissolves\" # FD collapses due to \"political faults\" (coalition got too lopsided and party unity busted), \"a new government"
 itapartyunity.5.d:0 "After endless ideological squabbles and factional backstabbing, the Fronte Democratico coalition has proven unable to withstand the strain. The coalition is no more. A new government must now take charge of Italy's destiny, whilst the architects of the coalition's failure lick their wounds and attempt to pick up the pieces.\n\nCarried for a while through sheer stubbornness, the political press will look to interpret why the FD coalition fell at the moment it did, and what could have been done to prevent it. No doubt this will prove an interesting thought experiment for those who treat party politics as a sport. The actual consequences, on Italy's workers and businesses, will no doubt unfold in the longer term. On that front many will give their perspective, but one thing is clear. The fallout of the FD's failure will appear far beyond the claustrophobic halls of party politics."
 itapartyunity.5.a:0 "下届政府或许会做得更好。"
 itapartyunity.6.t:0 "The Blocchi Nazionale government is no more.\" # BNcollapses due to \"political faults\" (coalition got too lopsided and party unity busted), \"a new government"
 itapartyunity.6.d:0 "Despite the impassioned appeals to national unity and calls to a higher cause made by the Blocchi's party men, the BN coalition has as of today ceased to function. The government's collapse will be answered by a new government taking charge, whilst those who failed to uphold the outgoing administration recriminate and apologise in equal measure.\n\nAs the successors of the fascist legacy in democratic politics, the Blocchi Nazionale have always had a fine tightrope to walk. How harshly they will be judged for failing to hold this coalition together is for the historians. Nevertheless, the immediate consequences are clear enough. The incoming coalition will have to pull together, if not the enthusiasm, then the grudging consent of the segments of Italian society which put the BN in power (and if not, to pretend to do so). Meanwhile the Blocchi attempt to move forward, and to figure out what went wrong."
 itapartyunity.6.a:0 "Another way for Italy, then?"
 NuclearItaly.1.t:0 "核计划的新专家"
 NuclearItaly.1.d:0 "履行国家大计，公务员需德才兼备。洞悉专业领域，谙熟政务运作，领导力与团队精神皆不可或缺；忠诚更是其首要品质。故此，我们已将意大利核计划的前任负责人调离，并安排了适宜职位以确保其守口如瓶。如今，我们的任务是选出一位更胜前任的新领导者。选对了人，我们的核计划便能更迅速地向前推进。言归正传，新任领导者是谁？"
 NuclearItaly.1.a:0 "爱德华多·阿马尔迪，精进者。"
 NuclearItaly.1.b:0 "保罗·莫奇，使命必达之人。"
 NuclearItaly.1.c:0 "布鲁诺·庞泰科沃，策略巨擘。"
 NuclearItaly.1.f:0 "埃托雷·马约拉纳，一位勤劳的工人。"
 NuclearItaly.1.g:0 "埃米利奥·塞格雷，完美之匠。"
 NuclearItaly.2.t:0 "揭开原子的秘密"
 NuclearItaly.2.d:0 "倒计时30分钟\n在撒哈拉的广袤腹地，技术与工程团队正紧锣密鼓地做着最后的准备，四周警卫和情报人员的目光如影随形。项目主管心怀忐忑，重任在肩，成败在此一举，他不容有失。\n\n倒计时15分钟\n数公里开外，受气候控制的地堡内，国王翁贝托、首相、国防部长及随行记者、秘书、保镖齐聚一堂，他们的目光穿透沙海，满怀期盼。\n\n倒计时5分钟\n主管匆匆步入地堡，为迟到致歉。科学家们进行最终检查，防闪光设备逐一分发，技术员们撤离试验场。\n\n一切就绪，只待主管一声令下，倒计时开始。\n5\n室内气氛紧张，情绪激荡如潮。\n4\n国王心无旁骛，稳坐钓鱼台。\n3\n工程师轻拭额汗，目不转睛。\n2\n国防部长心无二用，专注致志。\n1\n首相屏息以待，国运所系。\n原子碰撞，光芒万丈，照亮利比亚沙漠，蘑菇云升腾而起，意大利昂首迈入核时代。"
 NuclearItaly.2.a:0 "如今我已成为死神，世界的毁灭者"
 NuclearItaly.3.t:0 "新炸弹"
 NuclearItaly.3.d:0 "我们的核计划正迅猛发展，第二座核装置已投入使用。虽然我们还未能拥有一举摧毁一个国家的能力，但现在我们已经有足够的力量来警告那些企图侵犯意大利神圣领土的人。我们正持续增产，以期铸就令世界震颤的核武库，尽管其代价已在年度预算中显现。"
 NuclearItaly.3.a:0 "敬我们未来的成功！"
 NuclearItaly.4.t:0 "威慑日增"
 NuclearItaly.4.d:0 "核计划如滚石下山，势不可挡，专家告知我们，意大利现已拥有了一定规模的核武库。尽管我们还远未成为核超级大国，但若政府决意使用核武器，我们的力量已足以令人忌惮。以目前之势，不久我们将手握震撼世界之力量。成本何足挂齿，任何账本都挡不住我们铸就一个独立自强的意大利的雄心。"
 NuclearItaly.4.a:0 "向核能之都罗马致敬。"
 NuclearItaly.5.t:0 "终极威慑"
 NuclearItaly.5.d:0 "数载磨一剑，今朝露锋芒。我们的核武库日益壮大，终成与德国、日本、美国鼎足之势。我们的终极威慑力量，如神兵天降，誓守意大利这片美丽的土地不受外敌侵扰。诚然，这样的储备已对我们的预算造成了不小的压力，然能令强敌望而却步，此乃千金难买之安。如今，原子之力已紧握于我手，昔日三头同盟，如风中残烛，已无需再顾。"
 NuclearItaly.5.a:0 "愿此力量，永藏锋芒，不露其锋。"
 NuclearItaly.6.t:0 "死神现世"
 NuclearItaly.6.d:0 "核武库之庞大，已至无处遁形之境，即便我们曾有隐匿之心。意大利现在掌握的能力，若一触即发，便是生灵涂炭之力。吾辈虽心怀和平，志在于稳定中繁荣昌盛，然意大利之力，已足以令世间生灵毁灭轮回。"
 NuclearItaly.6.a:0 "世界颤抖"
 ITAOIL.7.t:0 "中东紧张局势"
 ITAOIL.7.d:0 "世界主要的石油供应国位于中东，而目前从那里传来的报告令人无比担忧。动荡、剧变已成家常便饭，但常态不等于正常，再这样下去，我们会陷入麻烦的泥淖。倘若局势真就失控，可能会带来前所未有的全球石油危机。要想避免石油危机，又或者做好坏的打算，先尽量减少危机对我们国家的损害，那都得动起来才行。"
 ITAOIL.7.a:0 "令人不安的消息。"
 ITAOIL.2.t:0 "危机临门"
 ITAOIL.2.d:0 "石油，非同寻常的资源，其丰盈可令荒漠变沃土，能令一支军队唯石油是瞻，能在荒漠之中铺就通途。反之，稀缺则足以令帝国灰飞烟灭。\n\n中东风云变幻，已触动意大利的能源命脉，关乎帝国兴衰，牵连万家灯火。中东棋局错落，我们需审时度势，深入局中，以防局势逆我而行，动摇法西斯政权的根基。我们将不计前嫌，不择手段，与必要之人携手，毫不犹豫地采取所有必要行动。"
 ITAOIL.2.a:0 "我们唯有投身其中，别无他途。"
 ITAOIL.10.t:0 "经济停滞"
 ITAOIL.10.d:0 "自亚特兰特罗帕项目重创了我们的贸易以来，意大利经济便每况愈下，而中东的动荡局势更是火上浇油。市场的动荡不安、油价的飙升以及我们势力范围内的混乱局面，使得我们的经济几乎停滞不前。\n\n加油站排起的长龙和股东纷纷抛售股票的现象，预示着经济的裂痕已经显现。显然，我们必须迅速解决中东的危机，以免我们的帝国陷入经济的深渊。"
 ITAOIL.10.a:0 "只需让油泵继续运作，其他的不要管！"
 ITAOIL.11.t:0 "宣传紧急措施"
 ITAOIL.11.d:0 "石油危机令我国经济遭受重创，政府因此提出紧急措施以求财政平衡。这些举措，恐怕难以赢得民心。于是，政府启动了宣传攻势，力图争取民众对这些措施的理解和支持。海报正在紧锣密鼓地印刷，广告也在加紧制作。愿这些努力能有所成效。"
 ITAOIL.11.a:0 "我们需要人民站在我们一边与我们同舟共济。"
 ITAOIL.12.t:0 "掌握主动权"
 ITAOIL.12.d:0 "中东局势终至失控，秩序濒临崩溃。政府已决意介入这场乱局，以期在危机中占据有利地位。若不如此，意大利作为世界第四大经济体及其相应的强国地位，恐将受到严重冲击。"
 ITAOIL.12.a:0 "愿一切顺利。"
 ITAOIL.13.t:0 "抗议开始"
 ITAOIL.13.d:0 "我们目前正直接或间接地参与中东的数场代理人战争。此乃稳定区域局势，确保全球石油大户恢复供应的必要之举。在参与这些代理人战争的头几个月里，国内对此类干预的反对声浪尚不高涨。然而，近来国内抗议之声渐起，要求我们停止干预。我们必须迅速平息这些冲突，或着手应对这些抗议。若不如此，民心可能丧失殆尽，我们将难以在中东地区继续施展影响力。"
 ITAOIL.13.a:0 "令人担忧的事态进展。"
 ITAOIL.100.t:0 "宣传政变人心"
 ITAOIL.100.d:0 "我们宣传部门的精英们已经费尽心思了好一阵子，力图证明意大利参与这场实质上为石油之争的战争的合法性。他们使出了浑身解数——以国家大义为旗帜，以正义之名行事，以先下手为强作为呼吁。这些努力已初见成效，民意普遍支持意大利投身战事。在未来的日子里，民心所向将是我们成功的关键。"
 ITAOIL.100.a:0 "干得漂亮。"
 ITAOIL.101.t:0 "宣传对峙"
 ITAOIL.101.d:0 "我们宣传部门的精英们已竭尽全力，试图为意大利卷入石油危机辩护，然而，这一切似乎都是对牛弹琴，未能在民众心中激起丝毫波澜。我们支持参战的论点总是遭遇反驳，意大利人虽未明确反对参战，却也鲜有真心支持者。简而言之，我们的宣传收效甚微，若真到了开战之时，我们恐怕只能代表一个漠不关心、无动于衷的国家出战。"
 ITAOIL.101.a:0 "他们难道不明白这项事业的重要性吗？"
 ITAOIL.102.t:0 "宣传失败"
 ITAOIL.102.d:0 "我们曾力图唤起民众对我们全面介入石油危机的支持，然而这些努力不仅徒劳无功，反而招致了不小的反效果。民意的引领者告诉我们，意大利人正变得空前地冷漠，视参战为对生命、资源和时间的徒然耗费，对他们自身造成了直接的伤害。我们固然不必盲从民意，但逆流而动必有其代价。或许，当初沉默是金才是上策。"
 ITAOIL.102.a:0 "人民理解不了的，他们需要被领导。"
 ITAOIL.105.t:0 "心归我方"
 ITAOIL.105.d:0 "我们的耕耘终得硕果。经过一场精心策划的宣传攻势，我们成功说服了民众，让他们相信我们战争的正当性，意大利民众已然集结起来支持这场战争。民众对战争的看法或有分歧，或认为其光荣，或视为悲剧，但这并不重要，因为我们已经明确表达了我们的立场是正义的，这便足矣。那些质疑这场帝国主义战争的声音，或是主张和平的论调，都被我们置若罔闻，甚至嗤之以鼻。关键的是，所有人都应了解战场上的真实情况，正义之战仍在继续——与那些在荒野中呼喊的孤独声音争辩有何意义？"
 ITAOIL.105.a:0 "我们必须去战斗。"
 ITAOIL.106.t:0 "他们的心灵与思想已被权势的谎言所蒙蔽"
 ITAOIL.106.d:0 "我们在战争议题上发起了一场声势浩大的宣传，力图向民众证明我们的正义立场，然而一切似乎都是徒劳。我们得知，意大利公众并不对此买账，无论街头巷尾还是私下里，他们普遍将我们的行动视为又一场帝国主义的侵略。尽管我们仍将努力说服他们，但他们已铁了心不相信我们说的任何一句话，我们能做的实在有限。我们必须咬紧牙关，砥砺前行，哪怕一路上将面对民众的冷眼旁观和固执己见。"
 ITAOIL.106.a:0 "多么狭隘——我们的事业如此正当！"
 scorzaoil.1.t:0 "危机中的帝国"
 scorzaoil.1.d:0 "中东局势持续恶化，埃尼集团陷入危机。动荡的冲击波传到本土，国内局势日益紧张。反对派、反社会者们蠢蠢欲动，认为现在是打倒领袖的好时机！\n\n他们怎么闹也无济于事，他们永远破坏不了我们奋进的目标！翻阅意大利引以为傲的历史，它曾历经无数场更大的危机。境外的意大利崩溃论想敲响我们的丧钟，那可真是大错特错。他们完全忽视了意大利人民独特的坚韧，正是这样的毅力，让我们率先建立起高耸的帝国。\n\n我们会扭转中东的混乱和不稳定局面。我们会渡过日益恶化的石油危机。最重要的是，我们无论如何都会比以往任何时候更强大！这是领袖的命令，也是我们必须实现的天命，无惧困难！"
 scorzaoil.1.a:0 "意大利万岁！"
 scorzaoil.2.t:0 "未雨绸缪"
 scorzaoil.2.d:0 "在领袖的精心领导下，意大利人民度过了非常富有的几年。而现在，中东局势的发展不太明朗，人民也有责任准备忍受紧缩时期。在成功采掘甜蜜的沙漠后，如今也得能勒紧裤腰带进行最后的对决。\n\n全国各地，人人都有这样的意识，每个人，无论背景如何，都必须为了强力的意大利能做出牺牲。如果帝国人民在这场磨难中仍秉持坚定不移的意志，那末国家或许会伤痕累累，但走到最后，它也会毫发无伤。"
 scorzaoil.2.a:0 "希望大家都能忍耐……"
 scorzaoil.3.t:0 "俭钱持家"
 scorzaoil.3.d:0 "里拉正急剧贬值！银行门前挤兑成风，裁员如潮水般汹涌，经济恐慌的报道日日翻新。我们的国家货币正处在全面崩溃的边缘，民众对里拉的信心荡然无存，上班族朝不保夕，惶惶不可终日。那些有能力的人，都在尽可能地避免在支付是使用里拉。甚至连古老的以物易物交易方式也在戏剧性地复兴。\n\n我们不能容忍这种情况继续下去！政府与银行亟须采取断然措施，力挽狂澜，拯救我们宝贵的里拉。此举关乎国家主权、民族福祉，乃至国家认同，不容有失！"
 scorzaoil.3.a:0 "注意经济，蠢货！"
 scorzaoil.4.t:0 "渡过难关"
 scorzaoil.4.d:0 "经济危机是毁灭性的。但是，在斯科尔扎领袖的领导下，我们一定会渡过难关。有这么一个古老的笑话：两个人发现自己被一只猎豹困在丛林里。第一个人问，你为什么要穿上靴子呢，你也跑不过这只野兽啊。第二个人回答，我当然跑不过猎豹，但我能比你快。以意大利的力量与韧劲，我们一定能跑赢敌人，到那时，这场危机也就结束了。我们现在只有一个选择。"
 scorzaoil.4.a:0 "继续跑。"
 scorzaoil.5.t:0 "抛锚解缆"
 scorzaoil.5.d:0 "经济学，实为一门深奥且令人唏嘘的学问。有时，要救经济，得把钱花在刀刃上，而非人心所向。我们把民生置于次要，似乎不近人情。然而，优先经济与关键产业，实为举国上下计。若他们今日忍饥挨饿，未来换得来日方长，而非坐以待毙，那么他们将无怨无悔。未来，他们或将心存感激。谁知道呢？"
 scorzaoil.5.a:0 "削减每人的开支。"
 scorzaoil.6.t:0 "再三保证"
 scorzaoil.6.d:0 "石油是意大利经济的命脉。从石油工业到汽车制造商，显而易见，没有了石油，意大利经济将难以为继。石油危机蔓延之际，政府耳闻不少悲观者对政府政策的非议，指责政府政策，谓其伤及国家经济根本。\n\n尽管这些悲观者尚不成气候，领袖还是决定审慎行事，召集了一场会议，向所有涉及石油事务的重要企业说明情况。会议上，政府官员向企业代表们阐明，政府正积极应对这场危机。他们强调，任何石油供应中断都是暂时的，政府已经制定了应对计划。对于提出的问题，政府的回答是，虽然对当前局势掌控有度，但中东军事行动的国家机密，出于显而易见的理由，不宜公开。会议在激情演讲中落幕，这些演讲号召工业界对党的计划心怀信念，这一切都是为了国家的未来。"
 scorzaoil.6.a:0 "你认为他们真买了？"
 scorzaoil.7.t:0 "沙特势力圈"
 scorzaoil.7.d:0 "沙特人已现原形，成为我们必须全力应对的大敌。与复兴党的较量已非燃眉之急。在沙特家族及其在OPEN的势力未被平息之前，我们对中东的稳定与利益所寄望的愿景，不过是空中楼阁。虽然我们能够拉拢的人中不少富可敌国，难以用金钱收买，但他们每个人都有一个明显的野心，我们或许可以利用这一点来从内部削弱沙特的联盟。"
 scorzaoil.7.a:0 "给他们一切他们想要的。"
 scorzaoil.8.t:0 "与达瓦讲和？"
 scorzaoil.8.d:0 "伊拉克的达瓦党图谋建立一个伊斯兰国家，然据我方情报，其领袖皆为深谋远虑、脚踏实地之人，不会因小利而轻易动摇。为减轻战争的重负，我们或可与达瓦党缔结和平，承诺不干涉其在伊拉克的政治图谋，前提是他们不触碰我们的利益。尽管众多外交专家对此协议抱有希望，但怀疑之声亦不绝于耳。他们告诫我们，这些领导人虽务实，但为达目的，他们不择手段。若他们认为我们的停火阻碍了伊斯兰法律在本国的实施，他们或将趁我们最脆弱之际，背信弃义。在权衡各方论点后，我们必须审慎决策。"
 scorzaoil.8.a:0 "向达瓦递交和平协议"
 scorzaoil.8.b:0 "伊斯兰主义者不可信。"
 scorzaoil.10.t:0 "阿亚图拉接受了"
 scorzaoil.10.d:0 "喜讯传来！原以为阿亚图拉·霍梅尼不过是个盲目的狂信徒，却不料实为一位和蔼可亲、通情达理之人。他欣然接受了我们伸出的和平橄榄枝。"
 scorzaoil.10.a:0 "离和平又近了一步。"
 scorzaoil.11.t:0 "阿亚图拉拒绝了。"
 scorzaoil.11.d:0 "唉！阿亚图拉或许真如其反对者所言，乃一盲目的狂信徒。和意大利帝国和平相处明明有着诸多益处，他却似被仇恨之火蒙蔽了心窍，竟然回绝了我们宽宏的提议。"
 scorzaoil.11.a:0 "战争亦将继续。"
 scorzaoil.12.t:0 "支持阿亚图拉"
 scorzaoil.12.d:0 "阿亚图拉·霍梅尼于其信徒心中，乃智慧化身，观察他为国家所绘的蓝图，便不难发现此誉不虚。霍梅尼人民的斗争之所以幸运，是因为这正中意大利下怀，否则我们或许会被迫采取反对立场……"
 scorzaoil.12.a:0 "阿亚图拉万岁！"
 scorzaoil.13.t:0 "谴责阿亚图拉"
 scorzaoil.13.d:0 "阿亚图拉·霍梅尼，一位原教旨主义的独裁者，其人其行，不过如此。我们自当直言不讳，谴责他施加于伊朗人民的沉重压迫，这个民族曾无比自豪。尽管他的统治与意大利利益相冲突，但这并不左右我们对他的判断。"
 scorzaoil.13.a:0 "该死的狂热分子。"
 scorzaoil.14.t:0 "与复兴党讲和"
 scorzaoil.14.d:0 "战火无情，常逼人行不由衷之事。复兴党人挥舞着煽动性的阿拉伯民族主义大旗，从长远看，实为阿拉伯世界稳定的隐患。然而，就目前而言，他们对我们利益的威胁尚不及沙特人，后者在整个中东地区具有真正的主宰地位。因此，我们宜向复兴党伸出橄榄枝，此举既能为我们赢得片刻安宁，亦让我们得以集中精力应对沙特的挑战。待到风云变幻，时机成熟，我们再作打算不迟。"
 scorzaoil.14.a:0 "开个价吧。"
 scorzaoil.35.t:0 "埃及主宰？"
 scorzaoil.35.d:0 "埃及，阿拉伯世界的心脏，举足轻重。我们在这片土地上的历史沉淀，以及对苏伊士运河的掌控，早已向世界彰显了在开罗维系稳定的重要性。当前的石油危机，更是让我们当初决定控制埃及的决策显得尤为正确。如今，我们站在十字路口：是否动用我们的资源和政治决心，迈出决定性的一步？是正式提出对埃及的主权要求，成为埃及命运的主宰者，还是审时度势，静候更佳时机？"
 scorzaoil.35.a:0 "提出宣称"
 scorzaoil.35.b:0 "时机未到。"
 scorzaoil.37.t:0 "监视纳赛尔"
 scorzaoil.37.d:0 "贾迈勒·阿卜杜尔·纳赛尔，阿拉伯泛民族主义运动的图腾，他的理想虽似空中楼阁，却在阿拉伯政治的棋局中展现出了顽强的生存力。据我方间谍所报，他正试图与阿拉伯世界的复兴党派系寻求共识，这一动向无疑加剧了局势的紧张气氛。我们必须主动与复兴党展开对话，以巧舌如簧说服他们与这位潜在的领袖割席，以防他成为泛阿拉伯复兴运动的领头羊。一旦他成功了，我们将如鹰眼般紧盯纳赛尔，时刻警惕他所构成的潜在威胁。"
 scorzaoil.37.a:0 "无论他是否采取行动，我们都准备好了。"
 demitaly.40.t:0 "致大委员会的演说"
 demitaly.40.d:0 "加莱亚佐·齐亚诺面带微笑，眼神却冷若冰霜。伴随国王翁贝托步入大厅，他默默观察众人对国王的敬意——微微点头、握手致意、目光交流。这份尊敬，或其缺失，将左右他们对齐亚诺言论的接受度。最理想，众人齐声附和；最糟糕，心存疑虑，步出会议室，令进程受阻。\n\n领袖侃侃而谈，细述国王所提的讨论要点，强调民主之路荆棘丛生，脆弱不堪，毕竟据他所知，法西斯向民主的跨越，史无前例。他告诉在场的人，希望之光已至维罗纳，并试图说服自己相信这一点，他得到了国王的全力支持。若固步自封，意大利将面临停滞不前，沦为世界舞台上的配角，受强国摆布。必须变革，摒弃墨索里尼为旧时代所构建的法西斯体系。齐亚诺的目光扫过听众，阿明托雷·范范尼眼中闪着精光，微笑中带着几分狡黠。许多人肃然点头，也有人面露失望，却无惊讶之情，无人出声打断。\n\n发言结束，领袖简洁地下达了几项指示，随后跟随翁贝托国王步出会议室。在无人之处，国王紧握齐亚诺的手，赞许道：“做得好”，笑容满面。齐亚诺也以笑回应，但这微笑只停留在他的嘴角，并未触及他的眼底。"
 demitaly.40.a:0 "又是许多个不眠之夜。"
 demitaly.41.t:0 "基民党准备"
 demitaly.41.d:0 "线报指出，基督教民主党正摩拳擦掌，准备投身选战的激流。这个联盟，一个由天主教政治理念凝聚的温和派系，集中间派、民主派与保守派于一身，看来在选举钟声敲响之际，将稳操胜券。\n\n领袖对他们的理念持保留态度，认为他们对温和左翼选民过于让步，然而翁贝托国王却力挺他们。他们能否乘风破浪，将理念付诸实践，尚需观望。"
 demitaly.41.a:0 "让我们瞧瞧宠儿能干些什么。"
 demitaly.42.t:0 "与党派会面"
 demitaly.42.d:0 "翁贝托二世虽感疲惫，却心怀喜悦。他独坐餐桌前，细品久违的独处时光，心中同时回荡着近日与各政治派别的会晤。\n\n会面之人无一不对他表现出敬意，才智亦大多不凡，仅有少数例外。君主主义者们忠诚至极，其热忱几乎令人作呕。基督教民主党人作为交流伙伴，尤为引人注目，他们虚心求教，又慷慨陈词。阿尔多·莫罗气度非凡，自信而不张扬，似是引领国家迈入民主之门的天选之子。社会主义者们礼貌有加，彼得罗·南尼侃侃而谈，目光如炬，审视着国王的每一个反应。翁贝托对党内潜藏的共和主义者洞若观火，但南尼总能巧妙地转移话题。至于阿尔米兰特，其与国家法西斯党的瓜葛及鲜明立场让人难以捉摸，但即便在这群政治家中他为最为沉默之一，其内在魅力也自然散发。\n\n翁贝托对他所取得的成就感到自豪。国家法西斯党内的保守之声无法阻挡意大利走向民主的步伐，他将亲眼见证这一历史性的转变。"
 demitaly.42.a:0 "铁腕将引领意大利迈向自由。"
 demitaly.43.t:0 "民主阵线的期许"
 demitaly.43.d:0 "左翼集团已然蓄势待发，四十载风雨兼程，他们心中始终怀揣着推翻法西斯、在意大利筑起工人之国的梦想。如今法西斯日渐式微，他们视此为天命所归。领袖南尼，软化了他的社会主义观点，以求赢得意大利中立选民的共鸣。这一转变是否能开花结果，社会主义者们的希望——他们中有人刚刚结束流亡生涯——是否能够如愿以偿，唯有时间能够揭晓答案。"
 demitaly.43.a:0 "意大利的劳动者们，摒息凝神。"
 demitaly.44.t:0 "党派圆桌会议"
 demitaly.44.d:0 "齐亚诺轻揉酸涩的双眼，抬首四顾。\"若无他事，\"他言道，\"我提议散会。在此谢过诸位先生，仓促之间仍能拨冗前来。\"话音刚落，便有人轻咳一声，齐亚诺倦意盈怀地抬起头。\"您有何高见？\"打断者滔滔不绝，齐亚诺却强忍着没有随声附和。那人乃是国家法西斯党的代言人，虽非党员，却代表着其利益。此会唯参选政党与重要公务员得以列席，导致一些自诩独立的公务员为国家法西斯党辩护，不免有些尴尬。\n\n国家法西斯党的代表絮絮叨叨，大谈稳定之危，变革之急，以及不彻底的民主化可能让国家公仆们失望，甚至将法西斯主义的精华一并抛弃。齐亚诺心中念及国王，便缄口不言。身为调解者，他决心不偏不倚，不让右翼、基督教民主党或左派有任何借口指责他不公。齐亚诺谨慎地表示，对那位先生的观点感同身受。民主化自不会盲目推进，亦不会全然摒弃有益之物。他相信各党派领袖亦有共识——齐亚诺察觉到他们的不安，尤其是南尼，他急不可耐地想要发言。但他迅速补充，不应畏惧前行。民主化之路从无完美，不应动摇他们变革的决心。对于那位受人尊敬的绅士，齐亚诺知道他是卓越的领袖，国家的忠仆，计划不会更改。言及于此，齐亚诺感到一丝震颤。他的话语间，竟透出了国王的风范。\n\n会后，国王通过私人秘书向他道贺。\"不要让鼠目寸光之人，阻碍国家大计，\"那人在匆匆离去前留下此言。齐亚诺返回办公室，心中与那挥之不去的犹豫斗争，随即轻掩门扉。"
 demitaly.44.a:0 "距离下场会议仅剩十五分钟……"
 demitaly.45.t:0 "民主的馈赠"
 demitaly.45.d:0 "那项工程已几近圆满，这注定成为翁贝托与齐亚诺的传世之作，不论后者对此荣耀是否心怀自豪。我们已经规划出一个行之有效的民主体系，以及周密策划的过渡方案。此刻，唯有在沉默中耐心守望，期盼着最美好的结局。国王选择独自面对这一刻，尽其所能。他终于摆脱了随从的纠缠，在阳台上独自沉思，凝视着他的罗马，随着夜幕降临，华灯初上。这座城市永远美丽动人——国王心中如此认为——堪称世间最美之城，而今日，它将迎来更加美好的变革，尽管外表上难以察觉。尽管齐亚诺直至今日仍向国王坦陈其疑虑，翁贝托却对他的人民信心满满。昔日，他的父亲将权力之钥交给了墨索里尼；今朝，他将把这钥匙交还于民，任由他们抉择未来。或许他们会做出错误的选择，但翁贝托对他们的选择充满了更深的信任。民主之礼已赐予他们，无论未来如何，这已是意义非凡的新篇章。"
 demitaly.45.a:0 "国王伫立凝视，直至夜色笼罩了他的城池。"
 demitaly.45.tt:0 "一个新的国策树将出现。"
 hotautumn.1.t:0 "菲亚特汽车厂罢工！"
 hotautumn.1.d:0 "都灵从梦中醒来并开始了新一天的工作-这是意大利西北部最重要的工业中心，电车在城市里疾驰而过，车上挤满了熙熙攘攘的男女，烟囱开始冒出黑烟，中产阶级和上层阶级已经在城市里的许多工厂找到了属于他们的舒适位置。然而，这并不是一个寻常的工作日——一个菲亚特工人的罢工计划将在这一天进行。就其本身而言，这并不是一个罕见的事件，这个夏天已经产生了多次罢工，它们通常在24小时内开始并结束，由意大利总工会、意大利劳动人民工会联合会和意大利工会组成的联合工会控制。然而，这次不同了。\n\n在菲亚特内部，紧张局势已经持续了很长一段时间。对工会的不满，被视为官僚主义、效率低下、急于与雇主妥协，这些情绪已经在工人中蔓延开来，意大利的持续繁荣似乎给每个人带来了金色的祝福，除了都灵和其他工人阶级城市的工人家庭。房租和物价都在涨，唯独工资不涨，工作时间长到令人生厌，而且劳务合同总是因为坐在楼上办公室的人一时兴起莫名其妙地被取消。沮丧变成了怨恨，当菲亚特宣布许多合同将在年底不再续订时，许多工人将面临失业，此时怨恨很快就变成了愤怒。\n\n罢工开始时，所有人都对此感到惊讶。菲亚特是意大利最大的汽车制造厂，也是意大利最重要的汽车制造厂，但今天开始，它将停产。罢工像野火一样蔓延到都灵各地的许多其他工厂，很明显，在黎明到来之前，这把火不会熄灭。在几天的时间里，许多临时的工人组织和委员会宣告成立，宣布举行全面罢工。意大利最重要的工业心脏之一停止了跳动。不过在预料之内的是警察迅速动员起来，以防止罢工演变成骚乱，工会也急着重新控制局势。目前，空气中弥漫着紧张的味道，没有人知道局势将如何发展。"
 hotautumn.1.a:0 "我们肯定可以应付这个局面。"
 hotautumn.2.t:0 "罢工蔓延全国！"
 hotautumn.2.d:0 "菲亚特罢工的消息如同燎原之火，人们很快意识到都灵不过是这一切的冰山一角。在菲亚特罢工后的几天里，米兰等意大利北部工业心脏地带也相继掀起罢工浪潮。比可卡，这个工人阶级的大本营，也是倍耐力等企业众多重要工厂的所在地，成为了罢工和抗议活动的热点。罢工活动如此如火如荼，连最保守的意大利工会联合会也不得不在压力下暂时表示支持，意大利工会和意大利总工会更是发表声明，全力声援。\n\n紧急情况不仅限于米兰——热那亚、佛罗伦萨、罗马、塔兰托，意大利的每个工业城市乃至小镇，罢工之火都在蔓延。从钢铁工人到铁路职工，甚至学校教师和护士也着手开始组织自己的罢工，各行各业的工人都加入了罢工的行列，这场运动正迅速壮大。他们的诉求五花八门，从稳定合同到提高工资，再到缩短工时。\n\n警察已在多数罢工地点严阵以待，政府相信无需更多直接干预，随着工会重新掌控局势，工会与雇主之间的谈判指日可待。虽然他们将不得不做出妥协，但最终定能找到解决方案。尽管政府内部有人担心共产主义或极端主义借此渗透，但政府的直接干预更可能会弄巧成拙。"
 hotautumn.2.a:0 "经济健康的好兆头。"
 hotautumn.3.t:0 "罢工升级！"
 hotautumn.3.d:0 "通过和平解决罢工的初期希冀正逐个破灭，全国罢工的暴力程度与诉求持续升级。\"工人接管工厂\"与\"职场民主\"仅是游行口号的一部分——米兰工人试图暴力占领倍耐力工厂，遭警方封锁线拦截；都灵工人怒斥警察为\"法西斯走狗\"，引发肢体冲突。最令人忧心的是，来自高校与青年运动的共产主义煽动者正渗透罢工队伍并扩大影响力，此态势使局势雪上加霜。\n\n游行队伍中赤旗招展，学生与工人并肩前行。大学校园再度沦为骚乱温床，警方的频繁清场收效甚微——多座城市的执法力量已捉襟见肘。共产主义团体开始占领教室乃至整栋校舍，法西斯组织的反击则必然引发学生群体内斗，伤亡事件频发。\n\n政坛应对之策依旧分裂。基民党代表主张政府应充当劳资调解人速解矛盾；民主阵线要求强制执行工会诉求以保障工人权益；国民联盟则警告潜伏于城市暗处的\"赤色毒蛇\"，呼吁强硬镇压。政府内部分歧深重，局势较以往更趋动荡。随着和平解决希望渺茫，意大利经济亦遭重创。"
 hotautumn.3.a:0 "完蛋了！"
 hotautumn.4.t:0 "全学阵试图占领米兰大学主校区"
 hotautumn.4.d:0 "本已深陷罢工与暴乱的米兰，局势再度恶化。右翼学生组织“全国大学行动阵线”（全学阵）——该国主要右翼学生团体——在与左翼学生爆发大规模冲突后，试图占领米兰大学主校区部分教室。全学阵成员筑起路障，凭借地利优势击退左翼学生多次冲锋。作为回应，各左翼学生团体宣布占领其他区域，米兰大学沦为战场。\n\n双方投掷瓶罐石块，持撬棍与扳手爆发流血冲突，对抗持续升级。校方试图谈判平息事态，然收效甚微。警方已封锁校区，武力清场迫在眉睫。\n\n全学阵及其关联政党国民联盟高层至今保持缄默——外界推测此次失控系组织内激进派擅自行动所致。米兰大学乱象标志着该城滑向无序深渊，更令人忧心去年春季的大学骚乱恐将重演，席卷全国高校。"
 hotautumn.4.a:0 "疯了！全疯了！"
 hotautumn.5.t:0 "警力清剿米兰大学"
 hotautumn.5.d:0 "近日事态升级后，米兰大学校监正式向国家警察与当局求援，要求恢复校园秩序。随着谈判彻底破裂，警方突入校园，以大量催泪瓦斯、警棍与水炮驱散校内及周边学生。全学阵与左翼学生均遭镇压，引发诸多政界代表对执法过当的谴责。\n\n清场行动导致多名学生重伤，数十人被警方拘留。尽管查获自制炸弹与枪支等危险物品，新一轮镇压却未能缓解紧张局势——左翼与新法西斯分子互相指控对方勾结警方，政治辩论愈演愈烈：左派政客指责国民联盟包庇新法西斯主义与全学阵的极端思想，国联政客则反控民主阵线纵容共党渗透其学生同盟。\n\n虽校园暂归平静，米兰街头依旧动荡。左翼团体学生离校后积极煽动罢工工人，散布共产主义宣传，呼吁工学界联合变革体制。与此同时，城市右翼并未袖手旁观——国民联盟地方支部谴责市内共党暴力行径，誓言绝不容忍赤色分子借警方纵容与政客绥靖颠覆米兰。"
 hotautumn.5.a:0 "还能怎么办？"
 hotautumn.6.t:0 "火热之秋"
 hotautumn.6.desc:0 "秋天开始了，而这次的秋天不是一个普通的季节。全国各地，都感有一股地下大火在上升，热量让大气层也沸腾起来。坎帕尼亚的一座小镇，仅仅因为一家工厂被关闭而爆发了全面起义。帕多瓦大学沦为占领和冲突的舞台。米兰有许多左翼协会和地方党总部遭遇燃烧弹袭击。反过来，信仰法西斯的学生也遭到共产主义者的伏击、殴打。全国各地的罢工只会愈演愈烈。\n\n火热之秋，即将上演。在这部悲剧和冲突的大歌剧里，许多人迎面斗争利害切身，许多人却是被吹来的灼热之风卷入其中。一名工人，他只想安心地照顾家人，却不得不为更公平的工作而罢工。一位天主教工会的代表，眼见周身的世界慢慢被火焰吞噬。那位年轻的，怀揣理想主义的新法西斯主义者，他和他的同学们希望国家能回正轨。而这名警察身处一线，蹚在无政府状态与镇压之间。\n\n他们的故事会相互交织、相遇、离弃，就像一根根线。但我们在尘世生活中，只能遵循一条主线。因此，必须在这四个交叉的命运中做出选择。"
 hotautumn.6.a:0 "扮演工人。"
 hotautumn.6.b:0 "扮演工会成员。"
 hotautumn.6.c:0 "扮演学生。"
 hotautumn.6.d:0 "扮演警察。"
 hotautumn.7.t:0 "合同到期"
 hotautumn.7.d:0 "这则消息如凛冽寒风席卷而至。措辞冰冷、公事公办的公告被递交给米兰比可卡郊区庞然巨物般的倍耐力工业园区——成排烟囱与厂房林立的工业区——数以百计的工人与职员。原定至少延续两年的劳动合同遭单方面废止，即将重新协商：大批工人因产业重组遭解雇——养老金岌岌可危——薪酬将重新商定，大概率遭削减。\n\n马里奥·卡拉布罗从工头手中接过同样冰冷的通知。此刻他正与妻子并肩坐在公寓昏黄的灯光下阅读，孩子们早已入睡。家庭、房产，所有一切危如累卵。若遭解雇，他将别无选择——举家迁回南方故土。米兰曾是海市蜃楼般的幻梦，向无数如他这般渴望逃离南意乡间贫困的人们许诺工作机会；米兰亦是诱人的怪物，吞噬着在工厂耗尽血汗的劳工。\n\n反抗的星火迅速燎原，尤其在都灵罢工浪潮助推下。起初劳工协会与工会试探性地宣布抗议意向——第一批横幅挂起，首轮罢工启动。倍耐力的金融巨头们、意大利工业精神的典范代表们信誓旦旦保证事态可控、合约将续。然而局势早已失控：当比可卡绝大多数工人抱臂罢工时，马里奥正站在纠察线最前沿。"
 hotautumn.7.a:0 "罢工！"
 hotautumn.8.t:0 "燃烧的比科卡"
 hotautumn.8.d:0 "平心而论，马里奥·卡拉布罗从未想过要参与比可卡那夜的示威——尽管他对那些由劳工、学生乃至教师组成的抗议群体满怀同情。过去几周，当意识到饭碗朝不保夕时，他也曾混迹于类似集会。但在这个凉意袭人的夜晚，这位饱经风霜的工厂工人只盼着尽早归家。于是近乎本能地，他抄了条自以为能省几分钟的近道。这个为贪图几分钟的抉择，终将改写他的人生轨迹。\n\n刚出厂区两个街区，叫嚷声便隐隐传来。此刻他本可改道，却攥着晃荡的铝制饭盒自我宽慰：无非是工友们的小规模集会，绕到街对面就能避开。他太想赶在孩子们入睡前见上一面——经济寒冬里工时越拉越长，与家人相聚的时光却愈发稀薄。对这般顾家的汉子而言，这般煎熬近乎酷刑，可为了保住饭碗别无选择。\n\n声浪随脚步渐涨本该让他警觉，但归心似箭钝化了周遭感知。直到转过街角，想象中的零星工友化作汹涌人潮，马里奥才惊觉自己正撞进一场足以撼动国本的暴乱漩涡。那些铁青面孔上的决绝神情，让他瞬间读懂这场风暴的份量。"
 hotautumn.8.a:0 "一位不速之客悄然登台。"
 hotautumn.10.t:0 "联合斗争"
 hotautumn.10.d:0 "马里奥对罢工的种种可能早有预料，比如警察的抵制，甚至是与法西斯的正面对抗。然而，他未曾想到，大学生竟会自发加入他们的行列。一时间，马里奥的周围从工友变成了挥舞着共产主义旗帜、唱着革命歌曲的陌生人。\n\n这一幕恍如隔世，信仰共产主义的大学生与那些曾与苏联作战的人并肩前行。马里奥与其中一名学生——一位名叫安娜的都灵女孩交谈，意外发现她与他所知的共产主义者形象大相径庭。她言辞清晰，并不总是喋喋不休地谈论要如何推翻意大利的所有老板。这与比可卡和倍耐力的共产主义者形成了鲜明对比，后者在行动上往往更为激进。\n\n然而，在马里奥还没来得及深入探究安娜的一些观点时，他们就被新加入罢工的人群冲散了。这场罢工最初仅涉及工厂工人，现在却汇聚了护士、教师、学生等各行各业的人。马里奥感到精神振奋。来自五湖四海的人都加入了他们的行列，这些人是马里奥平时不太可能接触到的。他们众志成城，高呼口号，挥舞着革命旗帜，唱着那些无疑会让老墨索里尼在九泉之下不得安宁的歌曲。也许，对于他和他的家人来说，终究还有一线希望。"
 hotautumn.10.a:0 "米兰人民携手共进。"
 hotautumn.11.t:0 "同学生对话"
 hotautumn.11.d:0 "马里奥平生未曾踏足政治集会，他也不是热心政治的人，而今日置身于共产主义学生的聚会，对他而言无疑是破天荒的体验。他感到自己与周遭环境有些格格不入。尽管会场中也不乏与他年纪相仿甚至更长者，但大多数参与者都是二十多岁风华正茂的青年。墙上挂着象征着无产阶级-学生团结的红旗和横幅，那些身形瘦削的青年们戴着红色手帕，笑容满面，正与身材魁梧的钢铁工人热烈交谈。\n\n不久，一位戴着厚重眼镜、身着爱斯基摩夹克的瘦弱青年站上了讲台——他的言辞很快让在场的每个人确信，他绝非等闲之辈。“我们今日汇聚一堂，因为我们同仇敌忾。意大利的工人阶级与学生怀揣着共同的梦想，但更重要的是，我们有着共同的敌人——那些高高在上的统治阶级和老板。你们的老板就是几年前那些曾对黑衫军的游行欢呼雀跃的人，他们向这些黑衫军致敬，因为他们殴打、监禁和折磨那些敢于反抗的无产阶级。”\n\n“如今，这一幕再度上演。在意大利各地，工人阶级再次与老板们展开了殊死搏斗——唯一的变化是，这一次，你们的老板在民主的幌子下为他们的所作所为辩护，他们殴打、监禁和折磨那些反抗他们的人。这些人曾经就是法西斯官僚和支持者，现在不过是撕下了外衣！同志们，不要被蒙蔽——这里可不是真正的民主国家，因为民主不会从天而降。民主是在斗争中争取来的——我们必须组织起来，为之做好准备，我们必须不惜一切代价赢得这场斗争！民主就是工人斗争的武器！”"
 hotautumn.11.a:0 "掌声如雷，响彻全场！"
 hotautumn.11.b:0 "演讲引发了尴尬的沉默和咳嗽声。"
 hotautumn.12.t:0 "反对一切剥削者"
 hotautumn.12.d:0 "马里奥终于茅塞顿开。他总是耳闻同事们对共产主义的讨论，却始终无法理解他们的热情。他曾将这些热情视若无睹，将他们视为极端分子，不予理会。然而现在，马里奥有了新的认识，他窥见了未来一个真正自由的世界的可能性。他对未来抱有一线希望，一个不再饥寒交迫，不再贫困潦倒的时代。那一瞥可能的未来，无论多么渺小，都足以激发马里奥的斗志。\n\n革命的梦想在马里奥心中悄然生根，也在民主阵线的许多成员心中悄然滋长。共产主义者，曾是党内的小众分子，如今却如燎原之火般蔓延。越来越多的基层成员被这些激进理念所吸引，而民主阵线的温和派与激进左派之间的矛盾也变得前所未有的尖锐。随着火热之秋的持续，这些矛盾只会削弱党的团结。"
 hotautumn.12.a:0 "革命之火，日渐燎原…"
 hotautumn.13.t:0 "我们齐头并进"
 hotautumn.13.d:0 "比可卡的清晨，空气如洗，微风轻拂着树木和建筑。广场尽头，警察全副武装，严阵以待，装甲车、马队、盾牌、警棍、枪支一应俱全。“看来他们这次是动真格的了。”一个看起来不过十七岁的少年不屑地吐了口唾沫，“他们心虚得很。”卡拉布罗目光转向广场另一侧——那里聚集着一群五花八门的罢工工人、愤怒的学生，甚至还有几位妇女。他们中有人举着诅咒统治阶级的标语，也有人偷偷地在外套下藏着手榴弹，似乎想让那威胁更显得真切。\n\n对峙持续了约莫四个小时。瓶子和石头如雨点般飞向警察，警察则以催泪瓦斯还击。卡拉布罗感到一股灼热直冲鼻腔，有人递给他一块湿手帕，他赶紧捂住口鼻，这时他看到一个年轻女孩爬上了路障，向一名过于靠近的警察投掷石块。那警察头部被击中，应声倒地，随即被同僚抬回后方重新整队。当警察终于发起冲锋时，抗议者们纷纷逃进了小巷，留下一片狼藉的路障和几辆燃烧的汽车。卡拉布罗最终回到了家，满身尘土，身心俱疲。"
 hotautumn.13.a:0 "这有用吗？"
 hotautumn.14.t:0 "只为面包"
 hotautumn.14.d:0 "马里奥对于那些学生的理想主义和共产主义信仰非常心向往之。然而，他深知这是水中月、镜中花。政治和社会平等，听起来美轮美奂，实则遥不可及，尤其是面对意大利政府对共产主义革命者的顽强抵抗。学生们的理想主义如春风化雨，但马里奥已筑起心墙。他参与罢工，仅仅是为了他自己的面包，别无他求。\n\n马里奥对共产主义和激进主义的敬而远之，并非孤例。在民主阵线中，温和左派和基层工人对共产主义的呼声充耳不闻，激进派的声音日渐式微，鲜有人问津。共产主义者的革命理想逐渐被温和派的脚踏实地所取代，党的目标正凝聚在争取民生福祉这一实际议题上。"
 hotautumn.14.a:0 "革命烈焰，渐归寂灭。"
 hotautumn.15.t:0 "劳工行进"
 hotautumn.15.d:0 "米兰城中混乱弥漫，而工会所组织的游行在这其中却似一片宁静之岛。意大利总工会、意大利工会联合会与意大利工会的成员们井然有序地步上街头，他们振臂高呼，旗帜飘扬，横幅招展，向这座城市的钢筋森林和石砌长街宣告着他们的诉求。卡拉布罗亦投身于这股希望的洪流——他随众人高声疾呼，却似泥牛入海，杳无音信。连那一列列的警察也显得意兴阑珊，至多不过是为这嘈杂声而稍显烦躁。\n\n日暮时分，某工会代表，或许来自意大利总工会，向人群发表演说：“工友们，同志们，我们所追求的并非乌托邦——我们正在为更美好的生活奠下基石！争取公正的薪酬！争取安全的工作环境！我们要行使这来之不易的民主抗议权，坚信政府终将倾听我们的呼声！不久之后，万象更新！”卡拉布罗随众人欢呼响应。许多类似的游行，许多相似的抗议将接连上演——他们提出相同的要求，向警察、建筑和街道这些无动于衷的面孔发出呼声。"
 hotautumn.15.a:0 "岁月更迭，世事可有变迁？"
 hotautumn.16.t:0 "组织集会"
 hotautumn.16.d:0 "米兰，这座熙熙攘攘的大都市，消息正如野火燎原般迅速蔓延。据说，集会的点子最初是由学生团体提出的，随后传到了那些小而独立的工会耳中。自此，一石激起千层浪。钢铁工人、农民、矿工、护士、教师，各协会纷纷响应，加入这场声势浩大的集会。最终，连那些大工会——意大利总工会、意大利工会联合会和意大利工会——也宣布将参与其中，或许是担心他们那岌岌可危的信誉会因拒绝而荡然无存。不久，仿佛全城的人都在向罗马进发。\n\n政府对此小心翼翼，意见分歧——有人主张放任抗议，有人要求镇压。最终，为了缓解紧张局势，大规模罢工得以进行，警察和军队的部署规模空前。米兰、都灵、塔兰托、热那亚，这些动荡的中心似乎暂时平静了下来——因为每个人都在忙于准备即将到来的一切。标语制作得比以往任何时候都要大——新的口号朗朗上口——会议举行，演讲被撰写，拳头举起。\n\n卡拉布罗最初对集会并不热心。因为去罗马的火车票价格不菲，但他的一个朋友，有意大利总工会的关系，给了他一张免费的票。他又担心妻子会对此抱怨，但她实际上鼓励他去，甚至露出了微笑。他所有的朋友和同事都计划去。毕竟，怀揣一丝希望总不是坏事。"
 hotautumn.16.a:0 "或许，我们能够扭转乾坤。"
 hotautumn.17.t:0 "罗马罢工"
 hotautumn.17.d:0 "这一次，与众不同。人潮如海，声势浩大，前所未有。工人、学生、妇女、老者、流亡者、移民、前殖民地子民、同性恋者、理想主义者、梦想家、斗士、受压迫者、被遗弃者、弱者——他们的呼声在意大利立国之基的殿堂中回荡。皇家广场上，被压迫者的呼声此起彼伏——而古老的石块以沉默作答。\n\n国家毫不畏惧地展示其力量作为回应。坦克、装甲运兵车、武装士兵、全副武装的警察和国家宪兵，甚至还有几架直升机在永恒之城上空盘旋。有好几次，集会几乎要爆发成暴力——仿佛一点星火就足以引燃罗马。但那星火从未降临。集会来了又去，将它的呼声送入权力的殿堂——而权力的殿堂以沉默回应。\n\n最终，政治家们如往常一样登上舞台。承诺解决方案，承诺人民的声音已被聆听。几年前，当国家满怀希望地展望未来时，这些承诺或许还能奏效。然而，一个关键的变化已经发生——意大利人民一旦发声，便学会了如何使用它。现在，许多人开始认识到，仅有声音是不够的，需要更有力的手段来传达诉求。年轻的左翼分子愈发感到幻灭、挫败和愤怒。"
 hotautumn.17.a:0 "无论如何，现状终将改变。"
 hotautumn.18.t:0 "意大利总工会，意大利工会联合会和意大利工会"
 hotautumn.18.d:0 "“我总觉得这是徒劳之举。”那些衣冠楚楚、发丝不乱的绅士与马里奥那身淡蓝牛仔装形成了鲜明对比。他平素不会在工作之外穿戴防护装备，有人却说，工会代表到访时这样着装或许能向他们传递某种信号。然而，他只觉得自己坐在这些西装革履的人面前显得格格不入。\n\n“我向您保证，卡拉布罗先生……”那位西装革履的领头人在此次谈话中已多次许诺，向钢铁工人保证。“这对工会和工会成员，包括您自己，都将大有裨益。”\n\n马里奥·卡拉布罗双臂抱胸，语气平静，但反抗意志却在慢慢消融。“有更多重要的事情正在发生。辩论能解决什么？更不用说是工会内部的辩论了。只是……你们去辩论，我们为什么要关心？”\n\n“透明度，卡拉布罗先生。加强工会事务中工人的参与，拓宽你们的视野……你问为什么你和像你这样的人应该关心，我反而问你，为什么不呢？”代表在解释结束后靠回椅子上。\n\n两人沉默地坐了一段令人难熬的长时间，尽管那位穿西装的人似乎并不那么不安，而马里奥在脑海中反复权衡这个提议。最终，他叹了口气，肩膀垂了下来。“你预计这要花多长时间？”"
 hotautumn.18.a:0 "一个小时，最多两小时。"
 hotautumn.20.t:0 "工人圆桌会议"
 hotautumn.20.d:0 "钢铁工人们起初满腹狐疑，却不得不承认，这场辩论比预期中精彩。台上那些西装笔挺的人士讨论着工会政策、会费，以及意大利工会联合会所面临的挑战。这些议题本足以让那些即便是最热衷于政治的工人都昏昏欲睡，直至演讲触及了与其他工会接触的话题。\n\n意大利工会联合会在意大利或许被视作激进派，但与意大利总工会中的革命社会主义者和共产主义者相比，不过是小巫见大巫。意大利工会联合会主张改良体系，而意大利总工会则主张彻底推翻重来，两派之间积怨已深。因此，当调解人询问那些西装革履的男士们是否应与意大利总工会联手时，原本昏昏欲睡的观众开始睁大眼睛，坐直了身子。\n\n“我们与那些激进分子割席是有充分理由的！”坐在最右边的西装男大声疾呼。若非他的同僚们坐在论坛的另一边承认这样的联盟有些好处，他或许不会如此激动。“若按他们的做法，我们早就被拖入这场危机了！”\n\n“在这样的时刻，团结和统一的需求超越了个人的政治分歧！”另一位发言人——明显是最渴望与共产主义者合作的人——站出来为这个观点辩护。“若我们现在退缩，与企业谈判，他们会认为工人阶级可以轻易被欺负，任人摆布！”\n\n“所以你宁愿把工人的灵魂出卖给那些狂热的共产主义者吗？”\n\n“这里唯一出卖的灵魂，先生，是你自己。”\n\n人群聆听着，随着声音渐渐低沉，激情和愤怒逐渐平息，一种主导情绪在人群中蔓延。人们齐声呼喊，他们说……"
 hotautumn.20.a:0 "宁死勿赤！"
 hotautumn.20.b:0 "团结一致到永远！"
 hotautumn.21.t:0 "和平的橄榄枝"
 hotautumn.21.d:0 "辩论在那儿戛然而止，就像与工会诉讼相关的大多数事情一样，辩论往往需要时间来为此画上句号。最终，那些西装男士们握手言和，交换了几句耳语，随后各自离去。那位坚决反对与意大利总工会结盟的演讲者，对着那些明显已经动摇的群众投去了意味深长的一瞥。\n\n许多工人走进会议厅时，对于即将到来的工会选举并没有太多想法，但当他离开时，他已经做出了决定。他下周会去工会办公室，意大利工会联合会将会听到他的声音。\n\n他们与意大利总工会的汽车工人有何不同？他加入工会并非为了政治，不是为了意识形态的纯洁性，也不是为了任何超越他们所宣称立场的高尚理想。仅仅是普通工人的权利和特权，如果他们拒绝合作，梦想又怎能得以实现呢？\n\n因此，到了投票时刻，他将选择团结而非分裂。团结的总罢工才有力量，罗马的议会肯定会不得不倾听他们的声音。社会民主党人、基督教民主党人、社会主义者、共产主义者，当所有工人的工资都很低时，他们的个人政治倾向又有何重要？这场斗争是为了所有工人，为了所有劳动者，他们也是其中的一员，不是吗？\n\n弗朗切斯科的辩论似乎取得了成功，马里奥从辩论中感受到了前所未有的团结之情。如果意大利总工会同意，他们和意大利工会联合会将肩并肩站立，工会也将与他们所代表的工人紧密相连，无论这工人是不是工会的成员。"
 hotautumn.21.a:0 "是时候了！"
 hotautumn.22.t:0 "团结工会"
 hotautumn.22.d:0 "意大利工会联合会尝试向意大利总工会伸出橄榄枝，这仅是构筑一个包含所有工人的广泛联盟的序曲。意大利总工会中潜藏的激进分子，难以捉摸，这是个由极左派——共产主义者和社会主义者组成的工会，甚至有人在私下里说，一些无政府主义者也与之有染，尽管那不过是流言蜚语。他们是革命者——既有暴力革命者也有和平革命者——众所周知，革命者总怀着一腔热血，易燃易爆。他们会积极响应这个提议吗？两者间旧日的恩怨会影响这一切吗？\n\n弗朗切斯科·因切利身体前倾，双手指尖相对，脚在地上快速敲击。他已经在脑海中预演了各种灾难性的结果。意大利工会联合会对于参与总罢工的热情远不如意大利总工会，甚至意大利工会看起来也比意大利工会联合会更积极。如果意大利总工会拒绝了他们，他们能转头拉拢意大利工会吗？或者他们可以利用这次拒绝来赢得工人的支持……只要……\n\n马里奥·卡拉布罗靠在椅子上，双臂交叉在胸前。是时候看看这些社会主义者对这场事业的忠诚程度了。他们会放下个人恩怨与他这样的人联手吗？如果这联盟能够达成，他可看不出有任何坏处，但话又说回来，如果这群共产主义者不愿意与他们合作，那又有什么关系呢？他们完全可以自己来做这件事，但一起做无疑会更好，即使是傻子都看得出来。\n\n然后，门开了，三个人快步走进房间，几乎是脚不沾地。第一个人胸前别着意大利工会联合会的徽章，面带微笑地站到一旁。第二个人胸前骄傲地别着意大利总工会的徽章，大步走进房间，径直走向仍然站着的弗朗切斯科。第三个人则以一种更放松的步伐进入，靠在门框上。\n\n一与因切利先生面对面，意大利总工会代表没有浪费时间，他紧紧握住这个人的手，亲吻了弗朗切斯科的脸颊，这一举动让意大利工会联合会代表措手不及，却让房间里的工人们觉得好笑。“因切利先生，我们听说，您是我们的大恩人！”\n\n弗朗切斯科眨了眨眼，恢复了理智。他环顾房间，然后看向共产党代表身后。“我们？”\n\n最后一个人穿过门框，他的意大利工会徽章在房间的灯光下变得可见。他向弗朗切斯科·因切利伸出手，微微一笑。“我们只需要对此握手确认，因切利先生。”"
 hotautumn.22.a:0 "梦想成真！"
 hotautumn.23.t:0 "联合集会"
 hotautumn.23.d:0 "不再是仅存于意大利北部此起彼伏、支离破碎的呼声，意大利工人如今众志成城。历史上首次，北部三大工会——温和的意大利工会联合会、激进的意大利总工会和基督教的意大利工会——如今齐聚一堂，在米兰街头共同举办了首次联合集会。弗朗切斯科从未想过他会见证这一刻，也从未想过自己会成为这浪潮中的一部分。他开始回忆自己过去年轻时激烈反对共产主义和社会主义的行径，这让他有一丝羞愧，那时维尔吉利奥还只是个孩童。哦，他从未想过人们仅仅是被一个不胜其苦的系统愚弄的傻瓜。但今天他站在这里，在这里向工人们发言，他谈到了工人与富人之间贫富悬殊的现状。他谈到了安全规定和对工人生产力的苛刻配额。当他环顾聚集在他面前的群众时，他无法分辨谁是社会主义者，谁不是。当他向人群挥手告别，为下一位发言人让路时，所有工人都向他表达了他们的认同。马里奥·卡拉布罗从未想过他会见证这一天，但现在不仅这一天已经到来，而且他就站在这里，身处其中。许多意大利工会联合会的忠实成员出于政治信仰没有参加集会，这对罢工来说无疑是一种讽刺，但更多的工人在集会中找到了工人的团结和归属感。在他眼角的余光中，他看到一些集会参与者绊倒了，有人发出喊叫，有人说脏话。当马里奥赶过去帮助那个倒下的人站起来时，绊倒的人已经在自己站起来了。\n\n“有个冒失鬼在往出口挤。”那个倒下的工人一边揉着头一边嘟囔。一个小肿，无伤大雅。“我没看见他了，他一定是有急事。”\n\n这些男人中没有人认出那个男人是他们任何一个工会的人，但这件小事很快就被自我介绍和玩笑所取代，来自三大工会的男人继续在集会上交流和建立联系。"
 hotautumn.23.a:0 "工人的联盟，而非衣冠楚楚之辈的联盟"
 hotautumn.24.t:0 "光影喧嚣"
 hotautumn.24.d:0 "弗朗切斯科·因切利已是筋疲力尽。两周来，他从联络意大利总工会，到组织辩论、争取提案通过，再到主持有三大工会参与的集会，可谓马不停蹄。任何人历经这些，都难免精疲力尽。\n\n与意大利总工会和意大利工会的代表再次握手后，他勉强接受了那些被告知为社会主义兄弟之吻的脸颊吻，然后挥手告别。他步下舞台，走进了依旧熙熙攘攘挤满街区的人群，尽管许多人在这时已开始散去。他不时被拦下，与工人们握手，一边接受他们粗犷的拍背，缓缓但坚定地朝他停在舞台后的车辆走去。\n\n车内的寂静和陈腐空气，此刻却成了他的慰藉。他素来不喜欢开车，总觉得车内狭小、束缚，总有股老气横秋的味道。但今晚，这些却给了他一种莫名的安慰。他靠回去，让自己有片刻时间仰望月亮，稍作休息。\n\n然而，他不能在此沉睡。家就在不远处，此刻他最渴望的是自己的床和真正的、安稳的睡眠。他插入钥匙，转动点火。\n\n发动机转了一次，两次，然后发出了咔嗒声。紧接着是亮光和巨响，汽车突然变成火球，玻璃和钢铁四处飞溅。"
 hotautumn.24.a:0 "惊心动魄，倏忽而至。"
 hotautumn.25.t:0 "谴责共产主义者"
 hotautumn.25.d:0 "无论这些穿西装的人对意大利工会联合会的成员们说了多少甜言蜜语、鼓舞人心的陈词滥调和感伤的理想，都改变不了一个简单的事实。他们的血管里流淌着意大利的血液，他们宁愿下地狱也不会让社会主义腐蚀意大利的精神和劳动力。\n\n那位坐在右侧的绅士结束闭幕词时，赢得了雷动的掌声和欢呼。而他的对手及其同伙发言结束后，却只换来了稀稀拉拉的掌声和令人窒息的沉默。在场的每个人都清楚，这场辩论的天平已倾斜，而这绝非弗朗切斯科所愿。\n\n投票在一周后举行，尽管大多数人对提议的政策变化普遍持同意态度，但结果清楚地表明，任何与其他工会结盟的企图都不会被工人们所容忍，他们以压倒性的85%的比例投票结果选择维持自己的政策，而代价是牺牲团结。\n\n外面的天空或许晴朗，但弗朗切斯科心中却阴霾重重。他还能做些什么？他怎会愚蠢到让此事付诸公投？单个工人难以洞悉全局，而大局岂能在一小时内解释清楚。然而，他没有时间沉溺于过往，他必须现在开始着手为未来筹谋。\n\n马里奥已经开始筹划。辩论在他的心中激起了几分波澜。为何有人极力将意大利工会联合会推向社会主义者一方？意大利总工会与意大利工会联合会及其普通成员之间究竟有何图谋？他不得而知，也不喜欢这种公然的操纵。目前虽无事发生，但反抗的思想已在工人之间悄然传播，意图让他们认识到低估意大利工会联合会的代价……"
 hotautumn.25.a:0 "火苗初绽。"
 hotautumn.26.t:0 "CISL联盟"
 hotautumn.26.d:0 "“诸位同仁，我今日带来的消息，虽不至令人瞠目结舌，却也足以让人心忧。”保罗·沃尔托利尼并非工会的正式成员，但在工会投票之后，他却成了众人之上的发声者。几周来，他游走于米兰各地，与工会的工友和支持者们交谈，声称共产党不仅企图渗透入意大利工会联合会，更有操纵投票之嫌。马里奥·卡拉布罗虽然不喜欢共产党，但也不是没有自己的判断力的人。\n\n这些指控最初遭到了怀疑和质疑。听起来，这不过是法西斯的阴谋诡计，但一个观点若被反复强调，且充满信念，终将深入人心。若共产党真的已将意大利工会联合会玩弄于股掌之间，若他们真的在暗中策划，将工会纳入自己的势力范围，以谋政治之利，那我们该怎么办？\n\n“起初，我与你们中的许多人一样，对于那些关于共产党影响和操纵的流言蜚语，不以为然。我甚至在意大利总工会有朋友，他们怎会背叛我？”他是个天生的演说家，在这个戏剧性的停顿之后，他让聚集的工人们几乎踮起了脚尖，急切地期待着他接下来的话语。\n\n“但幸好我有那些朋友！其中一位，他的良心战胜了他的意识形态，向我透露了他们私下的计划。起初我不信，直到他带我到他们的总部，让我亲耳听到了他们的密谈！这是真的！现在他们未能通过投票进入意大利工会联合会，他们正计划渗透我们的行列，传播他们的革命思想！”马里奥感到自己的热血在沸腾，尽管他知道这个人在胡说八道，但他的演讲技巧高超，他传递的信息似乎让人不由自主地想要去相信，但他又说不出个所以然。\n\n“那么，兄弟们，我们该如何是好？”他向两边张开双臂。“难道我们要坐以待毙，任由他们利用我们吗？！”这是一个开放式的问题，人群中充满了愤怒和挫败的情绪。\n\n然而，接下来的事情出乎他的意料。他们怒气冲冲，纷纷动身离开演讲的房间。杜兰特和马里奥都惊呆了，看着他们冲出房间，涌向外面的街道。那些愤怒的听众当然不会对此坐视不理，他们要去让意大利总工会的人知道这一切……"
 hotautumn.26.a:0 "局势开始失控了……"
 hotautumn.27.t:0 "街道斗殴"
 hotautumn.27.d:0 "意大利总工会总部外聚集的两派人群爆发叫骂。意工会联合会的一小群成员刚一抵达，便朝社会党工会办公室投掷杂物。当总工会工人出面对峙时，冲突一触即发。\n\n“你们这帮赤匪少管闲事！”喊声未落，石块已砸向对方脚边，却只换来另一阵营的反唇相讥。\n\n“这话该说给你们这些法西斯奶娃听！”共产主义工人阵线中传来回击。助威声与嘲弄尚未消散，工会联合会成员已冲过隔离带发起进攻。\n\n谩骂瞬间化为拳脚相向。共产主义者起初被突袭的凶悍所慑，但凭借人数优势与激愤迅速重整旗鼓，以工人阶级的彪悍迎头痛击。\n\n混战初启未久——尚无一方显占上风——警笛嘶鸣与闪光灯便打断了斗殴。工人如巷战野猫般四散奔逃，警察挥舞警棍冲入现场。\n\n虽是小规模冲突，但随着\"火热之秋\"工潮蔓延，此类猜忌与紧张态势正在北意大利各地零星爆发。工人们彼此敌视之深，不亚于对资本家的抗争。"
 hotautumn.27.a:0 "团结已死！"
 hotautumn.28.t:0 "新交易"
 hotautumn.28.d:0 "罗马议会传出消息时，北意大利大罢工正如火如荼。尽管议员们巧妙回避将罢工指认为法案通过的主因，意大利民众心知肚明——这是工人阶级的胜利，绝非仁慈统治阶级的恩赐。\n\n法案涵盖范围广泛，触及多数罢工工会领袖提出的核心诉求：薪资微薄与基建衰败，社保缺失与安全隐忧。清单冗长，提案难尽全功。如今工会领袖须裁决政府应对是否得当。\n\n在最终决定前，工人将持续罢工。他们与抗议学生、警察将继续活跃街头。虽法案已出，全国紧张态势未减。鲜有人相信这份敷衍立法能速解危机。"
 hotautumn.28.a:0 "短暂喘息"
 hotautumn.29.t:0 "一通电话轮转"
 hotautumn.29.d:0 "工作日常如同梦魇。电话铃响，主管咆哮，时日缓慢爬行。意工会联合会的办公室内，争吵与商谈如热刀切黄油般撕裂空气。弗朗切斯科·因切利凝视案头名单与数字，长叹一声。\n\n工会规模庞大，自然成众矢之的。腐败指控如影随形，各团体威胁时有发生。左翼要求更多请愿，右翼催促痛击布尔什维克分子——电话铃声永无休止。值此多事之秋，弗朗切斯科竭力保持冷静，因他尚有三通电话亟待拨出。\n\n具体而言，今日需处理三事：\n\n致电米兰，参与劳资圆桌谈判；\n\n致电罗马，应对工会调查质询；\n\n末了致电家中。虽与儿子龃龉不断，然血缘纽带犹存。和解的可能始终存在。"
 hotautumn.29.a:0 "今天会很漫长……"
 hotautumn.30.t:0 "致电米兰"
 hotautumn.30.d:0 "“弗朗切斯科，我告诉你，他们不会接受的。”电话那头的声音透着恼火，甚至疲惫。两人已车轱辘话争论八分钟，虽实际感受更漫长。然弗朗切斯科·因切利与蒂莫泰奥·萨尔托皆无法挂断电话——未达共识前，公务难以为继。\n\n“若无法组织这场该死的罢工，行动必将虎头蛇尾。只要一个工会妥协，资方就会卷土重来，把我们踩回柏油路。”因切利自知反驳苍白，却别无选择。他的论点恰回避了对方要害。他倾身抵桌，绝望之色渗入声线。\n\n“你高估了工友对我们的信任。最终，任何与共产党人的协议都会遭疑——若在密室与电话中达成共识，他们必认定我们背叛。”萨尔托的嘟囔声传来，其断言分毫不差。“他们不信任我们，弗朗切斯科。”\n\n漫长的沉默笼罩电话线近一分钟。萨尔托正欲开口，因切利忽打破死寂：“倘若不由我们决定呢？”\n\n“你是说谎称对方先接触？还是……”\n\n“不。我的意思是举行全体工会投票，而非内部决议。数周后工会将表决若干议题，何不将‘开启跨工会对话’列入其中？”\n\n“若他们否决呢？”\n\n“我们可尝试说服。大体而言，工友们明事理，晓谕以理或能奏效。或许提前组织集会辩论？让他们自主抉择，并祈求上帝指引正途。”"
 hotautumn.30.a:0 "希望这能管用吧……"
 hotautumn.31.t:0 "致电罗马"
 hotautumn.31.d:0 "即便通过电话线沟通，与意大利工会联合会高层的磋商仍遵循某种宗教仪式般的流程。在接线员倦怠地转接后，弗朗切斯科虔诚静候应答。待对方询问来电者身份，他报上名号——接着又在电话嗡鸣中等待二次转接。最终，带着浓重罗马口音的洪亮嗓音炸响：“啊，正候着您的来电！”\n\n例行寒暄涉及米兰的阴霾与罗马的酷暑，外加彼此家庭近况的无关交流后，弗朗切斯科终于等到预期中的发问：“那么，比可卡区现状如何？”面对整个街区公然叛乱、暴力骚乱常态化、人行道血迹斑斑的境况，他决定破天荒直言不讳：“当前局势或许稍显棘手，但我确信一切即将受控。”\n\n“这正是我想听的！”上司的咆哮震得听筒发颤。“瞧，我当初没看错人。即日起，你全权负责倍耐力工厂的工会事务——若米兰那帮软蛋胆敢阻挠，随时上报，自有法子让他们闭嘴！”弗朗切斯科的吞咽声被对方大笑掩盖。“我得挂了，近日忙得焦头烂额——该死的共产主义学生纵火烧了罗马北部的厂棚，还想栽赃我们！简直荒谬！总之祝你在米兰顺利——记住，别让我失望！晚安，再见，再——”咔嗒声截断尾音，仪式终告落幕。"
 hotautumn.31.a:0 "唉，这局面可真够呛。"
 hotautumn.32.t:0 "腐败工会"
 hotautumn.32.d:0 "意大利劳工总联盟创立于1918年，乃该国首个主要天主教背景工会——旋遭法西斯政权取缔。意大利民主转型期间，其重组为意大利工会联合会（简称CISL），迅速崛起为全国主要工会之一。有别于其他被疑为社会主义乃至共产主义巢穴的工会，CISL始终标榜代表正直体面的意大利工人与工头，弗朗切斯科·因切利正是此类典范。\n\nCISL素来毫不避讳与基民党过从甚密。批评者指其行事作风效仿政党，更有甚者断言该工会实为天民党傀儡机构。即便认同其理念的工人亦觉CISL服务政党而非劳工权益，加之工会内部频发贪腐丑闻，严重损害其在代表群体中的公信力。尽管如此，CISL仍属意国最大工会之一，常能号令意大利工会（简称UIL）等小型工会。\n\n弗朗切斯科端坐办公桌前，这些事实在脑海中翻涌。他凝视电话机，那白色胶木方盒亦回以注视。贪腐痼疾根深蒂固，此刻着手整顿恐适得其反——然肃清积弊或能重塑工会在劳工心中的形象，缓解紧张局势，使工人更愿让CISL主导危机谈判。另一稳妥选项乃动用CISL政治资本，说服UIL等小工会协同行动，巩固其反社会主义工会的龙头地位。两张潦草写着电话号码的便签静卧案头，亟待决断。"
 hotautumn.32.a:0 "要求启动反腐审计。"
 hotautumn.32.b:0 "与意大利工会代表安排会晤。"
 hotautumn.33.t:0 "CISL改革"
 hotautumn.33.d:0 "果不其然，审计引发强烈不满与抗议。出人意料的是，调查结果比最荒诞的想象更富戏剧性——神秘晋升的龌龊勾当、工会资金在高层赴瓦莱达奥斯塔滑雪度假前不翼而飞、任人唯亲与朋党交易层出不穷。降职与开除成常态，CISL地方分部的多名要员迎来财政卫队登门拜访。弗朗切斯科·因切利却稳坐办公室，趁机将空缺职位尽数安插亲信。\n\n刺耳铃声划破闷热空气。弗朗切斯科提起听筒，同僚的咆哮扑面而来：“你他妈的在搞什么鬼？！”电话那头语速愈快，喘息愈促：“狗日的黄焰支队闯进我办公室了！他们在查账！全是你捅的篓子！你就是想搞垮我们，好让你那帮狐朋狗党上位对吧？！这事没完！等着瞧——”听筒余音未绝，弗朗切斯科仍持机静坐，仿佛在品味这戛然而止的威胁。"
 hotautumn.33.a:0 "圣洁工会必将重铸荣光。"
 hotautumn.34.t:0 "温和派阵线"
 hotautumn.34.d:0 "全意大利报章版面拥挤——头版充斥着暴乱惨状：燃烧的汽车、被捕的示威者、政要声明。然《晚邮报》角落却刊载有趣短讯：UIL与CISL发布联合声明，宣布将在危机期间全面合作。\n\n弗朗切斯科当日公务繁忙——握手、许诺、开会。基民党代表甚至民主阵线成员在两会官僚面前演讲，保证通过劳资政三方和平对话化解危机。这无疑是反激进主义的胜利——当政客们碰杯庆贺时，街头暴乱毫无平息迹象。"
 hotautumn.34.a:0 "只是暂时的抵抗罢了。"
 hotautumn.35.t:0 "御用反对派"
 hotautumn.35.d:0 "弗朗切斯科·因切利素来厌恶意意大利工会秘书故意拖延接听。他总在脑中勾勒那些文员盯着震铃电话静坐的画面——意大利工会惯用此类小伎俩对付兄弟工会，早是公开秘密。\n\n电话终获接听。“我是意大利工会联合会的弗朗切斯科·因切利，请转接迪奥洛代表。”\n\n等待时长恰够恼人却不至误事，线路接通时传来沙哑低语：“意大利工会，内斯托雷·迪奥洛。”这位代表声线较实际年龄苍老，然在工会界确属耆宿。\n\n“内斯托，我是弗朗切斯科。又见面了。”\n\n听筒那端的死寂震耳欲聋，良久方得回应：“因切利先生，有何贵干？”平稳冷峻的语调浸透疑窦——这份戒备确有来由。\n\n天知道弗朗切斯科多憎恶此刻。他须暂掩嫌恶：“我……呃……刚接管本地工会分部，听闻贵方此处正遇……资金难题？”\n\n沉默比任何肯定更昭然若揭。他潦草记下便签，清嗓续道：“若贵会愿行方便，或可施以援手。”\n\n又是漫长静默。弗朗切斯科几乎听见老工会人道德高墙的倾塌声，终得嘶哑答复：“洗耳恭听，因切利先生……”"
 hotautumn.35.a:0 "总得有人去做……"
 hotautumn.36.t:0 "分而治之"
 hotautumn.36.d:0 "“工人团结”如今似成空谈。弗朗切斯科啜饮晨间咖啡翻阅《劳动征服报》，新闻苦涩尤甚杯中之物。若置身事外或觉捷报，却令这位代表如鲠在喉。\n\n报道指控意大利总工会共产党派系，称意大利工会在近期菲亚特谈判中立场反常绥靖必涉贪腐。诚然意大利工会确有污点，却非共党指控那般。若信意大利总工会说辞，会以为意大利工会收受罗马或菲亚特贿赂——实则幕后操盘者乃意大利工会联合会。\n\n经数次密谈与承诺——只要意大利工会调整争议政策向意大利工会联合会看齐，便将提供资金政治支持——他们高估协议对工人的安抚效力。贿金多数用于正道，意大利工会得以维持工人项目与刊物运营。然基层视妥协为工会之耻，支持率岌岌可危。\n\n工人反噬工会本属笑谈，虽非意大利工会联合会本意，却成其机遇。意大利工会断不会承认屈从兄弟工会，此举虽不至摧垮意国最大工会之一，必令其元气大伤。值此意国两大工会缠斗之际，意大利工会联合会可超然物外，重拾建会初心。\n\n只需迫使清白勤恳之辈为权谋背锅。或许续杯咖啡能暂缓弗朗切斯科的良知拷问……"
 hotautumn.36.a:0 "两块糖，不加奶油。"
 hotautumn.37.t:0 "社会理论"
 hotautumn.37.d:0 "弗朗切斯科·因切利整了整领带，脊背绷得笔直。这或许是他职业生涯最关键的一场演说，必须展现出足够的分量。台下虽非基层工人代表，却是意大利工会联合会各地方与区域领导层——这群深谙劳工脉搏的高层，最看重务实作风。\n\n他稳步登台，神情肃穆：“诸位同仁，首先感谢各位拨冗与会。我知不少同仁长途跋涉，这份辛劳工会铭记于心。”台下反应平淡，但开场礼节本就重在表态。\n\n他继续道：“我清楚——我们都清楚——工会并不完美。完美本不存在，纵使口号再响亮，你我终究是血肉之躯。从西装革履者口中听到这般坦白，想必令诸位讶异。”零散笑声响起。人心渐拢，虽缓于预期。\n\n“但……我们投身工会，所求本非完美。完美仅是革命者的幻想乡，改革者只深耕现实土壤。近期风波诸位已有耳闻，在此重申承诺：我们将持续推进全方位改进——不仅优化工作环境与劳工待遇，更将革新管理体系、提升行政效能、强化纪律监察！”\n\n没有喝彩，没有掌声，但满场颔首如浪！讲稿尚未过半，最棘手的段落已然攻克。弗朗切斯科垂目扫过讲稿，自信如磐石稳固。"
 hotautumn.37.a:0 "接下来"
 hotautumn.38.t:0 "危机消除"
 hotautumn.38.d:0 "这场始于盛大示威、同步宣泄愤懑与团结的总罢工，终显疲态。罢工运动缺乏统一领导，唯赖极端派工会煽风点火。\n\n时移世易，意大利工会联合会昔日的观望态度——拒绝对罢工表忠——反成当下优势。随着罢工持续，意大利总工会与意大利工会处境日蹙，既无挽回之兆，亦失谈判筹码。\n\n反观意大利工会联合会？不仅运转如常，更借乱局壮大实力。随着罢工拉锯，其持续巩固北部工业区霸主地位，日益攫取罗马政府的关注。若说谁能以劳工利益为依归终结罢工，舍意工联其谁？\n\n总罢工远未落幕，然舆论风向渐变。得益于意大利工会联合会斡旋，部分生计艰难的工人得以复工，且无虞削弱罢工阵营谈判地位。"
 hotautumn.38.a:0 "真是千钧一发。"
 hotautumn.39.t:0 "归家呼唤"
 hotautumn.39.d:0 "或许该……再给学校打一次。弗朗切斯科·因切利一小时内已拨过两次，均无人应答。他早知米兰大学的路障事件愈演愈烈，却因深陷总罢工事务——虽羞于承认——无暇顾及在此就读的儿子维尔吉利奥。\n\n更揪心的是：其子竟是占据校园、把守路障的成员之一。他急需答案，听着拨号音，绝望感愈发强烈……\n\n这次竟接通了。年轻女声传来时他几乎窒息：“这里是米兰大学，我是吉娅，请问哪位？”\n\n“弗朗切斯科·因切利。我找学生维尔吉利奥·因切利。”\n\n静默片刻，远处传来吉娅与同伴的低语。俄顷，听筒再度响起：“您很幸运，因切利先生。有人看见维尔吉利奥离开校园，似乎去了火车站。没人知道他——”\n\n电话以破纪录的速度挂断。转瞬间，弗朗切斯科已冲出门外——夹克、礼帽与公文包被同一只手臂紧搂胸前。冲出联盟办公室，他奔向座驾。\n\n他心知这可能是与儿子相见的最后机会，他会抓住这机会的。"
 hotautumn.39.a:0 "纵使万劫，希望犹存。"
 hotautumn.40.t:0 "打破沉寂"
 hotautumn.40.d:0 "钥匙转动门锁。门开了。双脚迈过多年未踏的玄关，父子终得直面。\n\n二人形同陌路。一位西装革履，灰发倦目，尽显工会要员派头；另一位皮衣光头，别着法西斯束棒徽章。\n\n沉默如刃。父亲率先破冰：\n\n“你没事吧？新闻说主校区出事了。”\n\n自然。他早从电视目睹惨状，专程确认宝贝儿子安危。\n\n“我很好。”\n\n寂静复归，较前更刺骨。此次维尔吉利奥开口：\n\n“我来看看你是否改了主意。”\n\n“关于你加入那群纳粹表演艺术家？当然没有。”\n\n话锋锐利超乎父亲本意。再启唇时，声线微颤：\n\n“但你终究是我儿子。”\n\n沉默深似渊薮，父子间隔如废弃仓库中万千空箱垒砌的虚无。\n\n维尔吉利奥终再启齿——"
 hotautumn.40.a:0 "呃…也许我错了"
 hotautumn.40.b:0 "错的不是我，是他！"
 hotautumn.41.t:0 "理想崩殂"
 hotautumn.41.d:0 "“我倒宁愿有个真正的父亲！”维尔吉利奥的回应如鞭梢破空。父亲如遭电击般踉跄后退，仿佛被亲子眼中的毒焰灼伤。\n\n“维尔吉，我——”父亲急切前倾，双手作恳求状。青年却一掌拍开，反以食指戳向父亲胸膛：\n\n“国家正立于刀锋！”他戟指门外，目光如淬火钢，“一端是社会主义的苦难与死亡，另一端是吾辈与后世共享的民族复兴！若我父亲愿与我并肩推动复兴大业……”\n\n父亲试图开口，伸手欲抚其肩，却被青年挥臂格开：“还不晚。”他声线震颤，怒意与哀恸难辨，“随我去街垒。我们铲除赤祸，拯救意大利，父亲。”\n\n两人咫尺对峙，目光如刀剑相斫。终是父亲一声叹息打破死寂：\n\n“无论如何——”他垂首退步，“你始终是我儿子。”言毕转身入户，玄关重归空荡。\n\n无暇垂泪，不容咆哮。维尔吉利奥攥紧战栗的双拳，灼目回望街垒方向。这很好，他决意道。对抗邪恶最利之刃，莫过于怒焰。腹腔升腾的正义之火将锻造更骁勇的战士——整个意大利都将见证。"
 hotautumn.41.a:0 "前进，唯有前进。"
 hotautumn.42.t:0 "左派的反应"
 hotautumn.42.d:0 "人类最吊诡的特质之一莫过于：当群体足够庞大时，其行径与兽群无异。受本能与应激反应驱使，而非个体展现的理性与情感，他们极易恐慌奔逃，或如困兽死斗。\n\n更诡谲的是，当人群膨胀至临界规模，便化作天灾般的自然伟力。兽群虽行止无常，终归可溯其诱因——而此刻街垒前的人群密度与紧绷态势，已令因果律遁入玄学领域。\n\n正如自然伟力的必然宣泄，抗议者与街垒的张力终告破裂。是谁投出第一块石头？谩骂是否触及死穴？莽撞之举是否引燃暴力链式反应？左翼之过，抑或右翼之咎？\n\n重要吗？\n\n爆发的突然性与彻底性吞噬一切。霎时间，抗议学生如潮涌向街垒，拳脚、树枝与石块成为唯一武器。呐喊与撞击声交织成暴力交响。维尔吉利奥却在瞬息间以水晶般通透的非人澄明洞悉全景——旋即万物模糊。"
 hotautumn.42.a:0 "护墙血迹斑斑。"
 hotautumn.43.t:0 "警察的反应"
 hotautumn.43.d:0 "若米兰大学冲突当日阴云密布，或添几分诗意。然天公不作美——暖阳晴空，飞鸟盘旋，俨然狩猎季景致。\n\n若有猛禽俯视这场混沌，必见三色交织：红、灰、黑。\n\n红色属左翼。煽动者、激进派与正直之士混杂其间，或欲永久摧毁意大利的伟业，或欲将其重塑为公正乐土。\n\n右翼青年自诩“黑色”，然其组织涣散、理想主义过甚，且尚未将暴力与独裁的宣称理念付诸实践，故降为灰色。\n\n黑色属于警方。这群身着防暴装备、佩警棍枪械数周的执法者，神经已濒临崩溃。这群勇敢、疲惫、极度腐败的“民众守护者”，不惜代价渴求乱局终结。\n\n左翼视冲锋为捍卫劳工的英勇壮举。全学阵认为这是构建强盛国族未来的意识形态必然碰撞。\n\n于警方而言，这仅是清场借口。\n\n如神话中的洪荒巨兽，黑色武装战线发出怒吼，向前碾压。\n\n色彩尽褪，阵营消弭。人群化作暴戾之海，唯余攻击本能与逃生欲念。\n\n警棍起落，乱石横飞，流弹四溅，万物皆堕混沌。"
 hotautumn.43.a:0 "中道难以为继。"
 hotautumn.44.t:0 "青春殇逝"
 hotautumn.44.d:0 "那夜的暴力如野火炽燃，然火势愈猛，熄灭愈疾。月轮尚未攀至中天，余烬已冷。\n\n生者如灰烬四散。警察拖着疲惫身躯返回驻地，围攻者与被围者、左翼与右翼各自归家，掩着染血肿胀的面庞、乌青眼眶、断裂鼻梁与破碎笑容。\n\n唯死者长留。每具残躯都以骇人姿态支离破碎。瓦砾堆中半埋着维尔吉利奥·因切利——双目圆睁，脖颈以非人角度后折。\n\n弗朗切斯科找到儿子的方式虽不堪，却不出所料。他拂去残骸，将碎裂的躯体从废墟中剥离。席地而坐，让儿子头颅枕于膝上，叹息着为维尔吉合拢眼帘——尽管自己的双目亦紧闭。\n\n阖眼后的儿子宛如安睡，这令痛楚稍可承受。他颤手握住维尔吉血迹斑驳的手，强忍触感中碎骨与烂肉的轻微移位——最后一次执子之手。\n\n他就这般枯坐，泪水如雨滑落紧闭的眼眶，间或被抽噎截断，浇熄此地最后的余温。\n\n当警方与医者来抬走残躯，他俯身耳语，重复那夜诀别前的最后赠言：“无论如何，维尔吉……无论如何。”\n\n“你始终是我儿子。”"
 hotautumn.44.a:0 "万千悲剧在火热之秋的意大利轮番上演。"
 hotautumn.45.t:0 "长夜将明"
 hotautumn.45.d:0 "维尔吉利奥的下唇在话语悬于空中时颤抖着。他轻声开口，仿佛被自己的话语刺痛般退缩。“我……不知道我是否配得上。”他承认道，声音哽咽，双眼低垂。\n\n无人记得这个拥抱如何开始，亦不知是谁先迈出那一步。当维尔吉利奥的脸庞深埋父亲肩头时，一声呐喊闷在西装与肩头里迸发。这是流逝岁月的呐喊，是倾泻深藏恨意的呐喊，是驱散渗透骨髓的暴戾的呐喊。\n\n父亲以更用力的拥抱回应。在恍若永恒的几秒后，他缓缓引领维尔吉利奥走进房屋——他们的家。将面色苍白、泪眼朦胧的年轻人安顿在椅子上，父亲为两人备好一壶茶，对话继续流淌。\n\n“不知该从何处继续。”维尔吉利奥凝视杯中升腾的雾气坦言，“仿佛释放了恶魔，如今只能眼睁睁看它摧毁我曾想守护的一切。”\n\n父亲静坐聆听，在儿子诉说时颔首。“前路向来由你开辟。但若需要建议……”他放下空杯深吸一口气，“遵循你自己的某些信条。”\n\n“我不太明——”\n\n“在你离开之前。”父亲倾身叩桌打断，“在你真正迷失方向之前，我们常起争执。你总说当邪恶抬头时，正直之人有责任挺身对抗，否则便是助纣为虐，记得吗？”他后仰靠椅，“若你释放了仇恨与暴力的野兽，若要重拾正直，就该起身对抗它。”\n\n“恐怕力不从心，街垒犹在，他们人多势众。”维尔吉利奥摩挲手臂，燥热中透出犹疑。\n\n“言语即行动。”父亲铿锵宣告，“暴力不能终结暴力，或许该用唇舌之力代替拳脚了。”\n\n这话在维尔吉利奥脑中反复咀嚼，随着愿景渐明，他眉宇间凝结决意。该做的事，已然清晰。"
 hotautumn.45.a:0 "悔过与救赎"
 hotautumn.46.t:0 "残焰低吟"
 hotautumn.46.d:0 "近来首次，维尔吉利奥以清明的目光审视世界。当他望向街垒外的天地，所见尽是癫狂。社会主义抗议者与法西斯街垒间口号与呐喊横飞，暴力威胁与谴责充斥空气，那些曾令他热血沸腾的声响，此刻却显露出前所未有的刺耳。\n\n维尔吉利奥深吸一气，蹑足绕过抗议者重返街垒，迎接他的是同志们狂热的欢呼与喝彩。\n\n“维尔吉利奥！怎么耽搁这么久？我们还以为你临阵脱逃了！”\n\n“外面的赤色分子愈发躁动，可探听到什么消息？”\n\n“国民如何看待我们？是否群起效仿？”\n\n他轻扯衣领，以克制而缓慢的语调开口：“国民依旧分裂如故。”目光扫过同伴面容，显然这并非他们期待的答案——他们渴望听闻法西斯国家因这场行动重焕生机。必须加重砝码。“有人赞赏我们的壮举，也有人斥责我们挑衅好战。”\n\n“但我们确是在践行正义吧？支持者们不会坐视不理，对吗？”\n\n维尔吉利奥的沉默比任何言语都更具杀伤力。那些曾燃烧着仇恨怒视敌营的炽烈眼神，此刻犹疑着相互游移。他们在寻找片刻前还共同拥有的怒火与激情。\n\n它们已无影无踪。"
 hotautumn.46.a:0 "烈火已熄。"
 hotautumn.47.t:0 "潮起云涌"
 hotautumn.47.d:0 "天地仿佛在学生们的脚下旋转。曾几何时，他们还能凭借对法西斯旧日理想的坚定信仰，在时代的混沌中劈波斩浪，而今这力量根基却在顷刻间崩塌。\n\n犹疑、恐惧、惊慌立即蔓延。众人将目光投向维尔吉利奥寻求指引，他却以疲惫嗓音开口：“此地已无我们容身之处。待日落时分，我们可悄然撤离，权当——”\n\n“权当无事发生吗，维尔吉利奥？你何时成了懦夫？”身后传来陌生声音。他不识此人，对方却显然熟稔他的底细。\n\n“我……是的。事态已明——”\n\n那人横插进维尔吉利奥与学生们之间，截断话头：“明摆着是你肝胆俱丧！想知道为何无人响应？只因我们终日龟缩在木石之后！”\n\n维尔吉利奥再次感到热血上涌，喉头泛起胆汁的苦涩。但这与往昔不同，某种难以名状的变化正在发生。“那你有何高见？”\n\n挑衅者猛然挥拳向天：“主动出击！冲垮赤色分子，用勇武证明，将他们彻底驱逐！届时全意大利都将见证我们的力量！”\n\n诡异之感油然而生。这些陈词滥调自己也曾反复宣讲，难道往日听来也这般癫狂？多少人曾视他为疯子？又有多少人是正确的？\n\n维尔吉利奥扫视学生群体，长叹：“这是谬误。彻头彻尾的谬误。尚有牵挂者，随我来。”转身离去时，他听见怯懦的脚步声——约半数人跟了上来。\n\n“而胸怀大义者将留守！滚回家织毛衣吧老太婆们！真男儿自会替你们而战！”余下半数折返街垒。"
 hotautumn.47.a:0 "当援手伸向坠落者，有人宁舍残躯护尊严。"
 hotautumn.48.t:0 "可耻的撤退"
 hotautumn.48.d:0 "当战斗号角响起时，意大利的新黑衫军怀揣信念与勇气，胸中激荡着古罗马之魂。他们腹中燃烧战意，渴求厮杀，渴望搏斗……\n\n然而败局已定。面对社会主义者的人海战术与警察的防暴装备、警棍齐攻，精神既非利刃亦非坚盾。\n\n这些自诩“意大利真子民”“民族救星”“墨索里尼精神继承者”的战士，最终灰溜溜撤离战场。此刻他们唯有藏匿败北的耻辱与屈辱。\n\n但蛰伏仅是权宜之计。法西斯分子将掩面遁走，却必将归巢。他们会咀嚼这场败绩，若心志未摧，屈辱将化为暴怒，成为腹中烈焰的薪柴。\n\n这份怒火将随他们潜入宿舍、渗入家门、蔓延村庄与社区。在淌血的法西斯分子心中熊熊燃烧，为同气相求者点燃百盏烽火。\n\n且让赤色分子暂享欢庆，纵情重复的颂歌与稚拙的舞蹈。当对手自鸣得意时，黑衫军正舔舐伤口筹备下一轮较量。他们将从错误中汲取教训，以更完备的姿态迎接任何形式的对抗。\n\n至少，他们仍怀抱此望。"
 hotautumn.48.a:0 "输了战斗，但战争才刚刚开始。"
 hotautumn.49.t:0 "大学中的一天"
 hotautumn.49.d:0 "维尔吉利奥·因切利醒来，望见宿舍窗外景象，发出呻吟，怒意升腾。\n\n时值深秋却反常闷热，通风不良的宿舍热如蒸笼。若校方能拨款购置像样空调本可缓解，可惜预算早被挥霍殆尽——八成拿去讨好工会分子，自民主转型后经济本就一塌糊涂。\n\n他更衣走向首堂课程《意大利政治史》。教授是个堕落者、懦夫、疑似共党分子，最可憎的是个女人。想到她，恨意翻涌。\n\n途经主校道时，激进学生团体正在示威。他们的赤旗在阳光下招展，踏着游击队员式的步伐来回踱步，口号声中透着游击队式的英勇。倘若与全国行动阵线大学支部的战友同行，定能将这群左翼分子赶回鼠穴。可惜同伴另有要务，他只得孤身绕行。\n\n绝非维尔吉利奥·因切利不愿投身民族救赎之战——他只是举棋不定。同侪多在与国民联盟接洽，试图唤醒这个组织的血性。他们曾邀他参与，被他婉拒。众人曾对阿尔米兰特寄予厚望，这位前国家法西斯党的明日之星，如今不过是倦怠老叟……另些人正奔赴新战线，以棍石对抗共党及其警局爪牙。\n\n步入教室时，罢工、会议与国家前途仍在维尔吉利奥脑中盘旋。但思绪逐渐飘散，触及几近遗忘的领域：那个不理解他的父亲，那座不再温暖的家，那些同志而非挚友的存在。当课程终结，他立于教学楼门槛踌躇难决时，孤独感席卷而来。"
 hotautumn.49.a:0 "事情太多，时间又少。"
 hotautumn.50.t:0 "傍晚"
 hotautumn.50.d:0 "因斯利出生于米兰郊区的一个平静中产阶级地区。这段并不长的旅途，依然花费了他很久很久。\n\n维吉尔对他在FUAN的同袍们如此轻松的接受了他的离开而感到惊讶。他原以为他们会恳求他留下来陪同领导层一同前往罗马参加国民联盟大会，或者前往街垒对抗布尔什维克抗议者。但是他们微笑着挥手，并且接受了他脆弱的借口。也许他们从来没有像他想的那样相信他的领导能力。\n\n他会证明给他们看。他会证明给所有人看。他的父亲将是第一个-他会看到自己的教育方式有多么的糟糕，到明天他将和同伴们一起在路障处。DC，CISL和所有没有脊梁的叛徒将被绝育，而因斯利将因摧毁意大利人民眼中三大令人讨厌的压迫者之一而获得荣誉。\n\n维吉尔告诉他的父亲他加入了FUAN，现在回想起他们的最后一次谈话。他本以为父亲会为自己感到骄傲，因为他不是总是提及社会主义将是意大利的第一位掘墓人吗？他难道不像任何好公民一样，在餐厅墙壁上贴着画有领袖的海报吗？但是老的那位因斯利已经变了。他被感染了同样的懦弱，而这种懦弱正在遍及全国各地。\n\n于是父子俩在愤怒和泪水中分道扬镳，一个加入了最有影响力、但也最腐败的工会，另一个则加入了让国家恢复伟大的勇敢青年队伍。不过没关系，因斯利会向他展示。这次，烈火与勇士将点燃整个街道，他别无选择，前路唯有光明。\n\n火车进站了，维吉尔·因斯利走了下来，微微发抖，这无疑是因为他兴奋地向父亲传达了国民革命的真相。或者是来自心底的寒冷。"
 hotautumn.50.a:0 "没有比家更好的地方了。"
 hotautumn.51.t:0 "漫长的午后"
 hotautumn.51.d:0 "通往罗马的长途巴士令人疲惫，国民联盟安保人员对维尔吉利奥·因切利的通行证反复核查更添煎熬。\n\n当终于与全学阵的同志重聚时，日头已过正午，维尔吉利奥·因切利浑身躁动不安。必须指出，这种状态于他并非全然不利——在这个组织里，歇斯底里的躁动能兑换银币。若这躁动根植于日常生活的普遍焦虑，并精准指向“敌人”（无论彼时敌人是谁），甚至能兑换黄金。\n\n全学阵的中央委员会——至少出席本次会议的大多数——是慷慨陈词的殿堂，是怒涛与民粹的温床，是策划对抗意大利国敌之政治奇谋的策源地。这些“国敌”通常包括：被组织周报隔空痛斥的罗马叛徒与懦夫，校园内遭二年级生马里奥·萨尔维尼辛辣漫画（常配以因切利犀利社论）定期“处决”的激进左翼——全体正派人士之敌。\n\n但全学阵绝非聒噪孩童的集会。他们是民族革命先锋，是意大利的未来。其行动超越恶作剧与辱骂，是捍卫人民的雷霆之举。\n\n确然不止于此。当罢工演变为暴力冲突，冲锋在前的必是全学阵成员；当需要踢碎敌人头颅时，阵线的钢头靴从不缺席。有传言称某些激进分子私购军火，且不惜动用。这些亡命徒的行径虽被低声议论，却总伴着敬畏战栗。"
 hotautumn.51.a:0 "维尔吉利奥·因切利？中央委员会现在接见你。"
 hotautumn.52.t:0 "党内代表"
 hotautumn.52.d:0 "在欧罗巴文明发祥地罗马城，矗立着一栋建筑。此楼归属国民联盟——这个宣称捍卫意大利文明、民族主义与民主携手并进（绝非法西斯主义）的政党。\n\n它并非恢弘建筑。斑驳外墙远不及市中心党总部的水泥巨兽威严，龟裂红砖上涂鸦肆虐，尽是各类异议混混的“杰作”。内部同样缺乏舒适设施，既无总部大楼暗藏的雪茄室与酒廊，更遑论其他享乐配置。\n\n国民联盟仍物尽其用：存放未发布的宣传册，安置不便公开展示的……“忠诚物资”，举办不宜示众的密谈。某个暖秋之日，国民联盟中央委员会代表正与全国大学行动阵线的“法西斯大委员会”在此暗室磋商。\n\n会议室闷热难当，学生们不情不愿褪下黑色制服外套。几人胸袋缝着束棒徽记或墨索里尼肖像，丢弃这些挑战国民联盟“去法西斯化”路线的标志时，面色阴郁如铁。\n\n国联代表果如维尔吉利奥·因切利所料：尽是西装革履的老官僚，听闻直接行动提议便嗤之以鼻，面对全学阵的狂热只会搓手嗫嚅。\n\n会议进程亦如预期惨淡。全学阵提议组织反制示威的反示威，国联代表眼神飘忽；要求公开使用“共匪”“布党”“叛国者”“小资”指称共同敌人，官僚老爷们摆弄领带；当全学阵索要暴力自卫权时，国联宣布进入午休时段。\n\n众人重返会场时，因切利认定他已受够了这般闹剧。必须将矛盾推向顶点，探明该党忠诚所系。他清嗓开腔："
 hotautumn.52.a:0 "要么加入我们追求民族革命的行列，要么与我们为敌！"
 hotautumn.52.b:0 "要么加入我们对抗布尔什维克的战斗，要么与我们为敌！"
 hotautumn.53.t:0 "道不同不相为谋"
 hotautumn.53.d:0 "“要么加入我们追求民族革命的行列，要么与我们为敌！”\n\n这话在因切利脑中本如雷霆万钧，脱口而出却显空洞。连桌对面全学阵的同志都面露窘色。随着宣言后的死寂蔓延，他们目光游移于他颤抖的双手、发颤的双足——任何地方都行，只要不直视他圆睁的惊恐双眸与涨红面庞。\n\n直到掌声刺破沉默。\n\n国联席末有位老者，年岁气质与同僚相仿，装束却大相径庭。黑色高领衫比学生们的黑皮衣更具威压，翻领别着束棒徽记与骷髅匕首。此刻他正以讥讽的热情鼓掌，狰狞笑纹随掌声起伏。甫一开口，便引得其他国联代表面露愠色。\n\n“精彩！这些年轻人虽需引导，却抓住了精髓！国家已堕地狱，正需他们的热血拯救。信仰、服从、战斗——这才是解药！必须以暴制暴！”\n\n惊愕的沉默再度降临。未等学生回应，某位西装官僚已冷声宣判：\n\n“会议结束。感谢全学阵的付出，但请你们党立即腾地方吧。”\n\n须臾间，因切利与众人已被逐出大楼，仓皇中遗落数件外套。晨间燥热消散，阴郁的雨滴开始坠落。\n\n因切利本应愤怒——本该号召同志对抗懦弱叛变的国联及其虚伪的资产阶级民主。可他只尝到失败的苦涩，只见同伴眼中的失望。"
 hotautumn.53.a:0 "唉……回大学吧。"
 hotautumn.54.t:0 "刀刺在背"
 hotautumn.54.d:0 "命运裹着皱巴巴的马尼拉信封降临因切利手中，这信函穿越意大利迷宫般的邮政系统已遍体鳞伤。他非首位收件人，却曾暗自希冀能幸免于难。\n\n首先是狂徒——那些如藤壶吸附鲸体般攀附爱国组织的悖逆疯子。他们盛赞法里纳奇、希特勒，乃至党卫队的“纪律”。其中几人竟混入全学阵领导层，当解职信送达时无人异议，毕竟疯子理应清除。继而轮到软骨者——那些贪恋权柄、不惜与魔鬼结盟的投机客。他们前脚高呼“复兴意大利必用铁血”，后脚便对全学阵惩戒布党敌手的抓痕淤青假作痛心。当解职令抵达时无人声援，因其本就懦弱。彼时的因切利尚存幻想：国联或欲重整学生阵线，不日便将为会议丑态致歉，邀余部共商大计。最终轮到义士——真正的民族主义苗裔、墨索里尼思想传人，矢志重燃国民爱国魂、引领荣光归来的志士。当他们的解职函纷至沓来，已无仗义执言者。所谓领导层唯余国联傀儡与谄媚之徒。\n\n维尔吉利奥再度凝视字句，怒泪模糊视线：“国民联盟领导层认可您对民族学生运动的贡献，但为运动利益计，请即刻辞去领导职务。”\n\n他将信笺摔开。定要抗争！走遍全城召集新旧同志揭竿而起。全学阵旧部正裂变出诸多字母缩写的小派系，他将成为统合者。直捣国联办公室逼其醒悟！\n\n注定失败。众人将遭逮捕。他无能为力。\n\n民族学生运动已被击倒。他无能为力。\n\n他败了。"
 hotautumn.54.a:0 "终究是幕后勾当……"
 hotautumn.55.t:0 "他们并非一类"
 hotautumn.55.d:0 "“要么加入我们对抗布尔什维克的战斗，要么与我们为敌！”\n\n国民联盟席位的沉默昭示着因切利的话语正中靶心。那是饥渴的寂静，是期待后续的缄默。\n\n维尔吉利奥压低嗓音，让声线变得低沉、诡秘、危险而亲昵：\"我们渴求相同之物——自由的意大利，强盛的意大利。我们犯过错，我是首先承认这一点的人。但敌众我寡十倍，更有外邦撑腰。想要取胜，必须众志成城。非团结，即灭亡。\"\n\n他掌控了全场。几个油滑的老代表如坐针毡，但终究是少数。有位佩戴黑衫军高领衫与徽章、坐于桌缘的党员甚至赞许轻笑。\n\n居中而坐的代表终于开口：\"唔……或可安排与高层会晤。静候通知。\"\n\n因切利疑心这是缓兵之计，但传唤如期而至。\n\n会面夤夜举行，地点是豪宅而非破败办公室。此次全学阵得享玫瑰水晶吊灯的礼遇，而非龟裂街道与碎玻璃窗。他们穿过精良安保，步入铺陈大理石柱与真皮座椅的华贵厅堂。\n\n中央端坐者，正是阿尔米兰特。\n\n曾对这位国联领袖心存疑虑的因切利，此刻得见真容方知大谬。主席竟睿智与果敢并存，仁慈与刚毅兼具。当他以温和而坚定的语气索要全学阵效忠时，因切利甘之如饴。\n\n意大利将重振雄风，再临伟业。在阿尔米兰特引领下，民族必将浴火重生。"
 hotautumn.55.a:0 "而因切利将立于其侧。"
 hotautumn.56.t:0 "死寂"
 hotautumn.56.d:0 "蜕变并非一蹴而就，若非密切关注全学阵整体动向，这些渐变难被察觉。正因如此，当那个以煽动闻名的街区头目竟开始鼓吹国民联盟的温和路线时，因切利并未在意。见其汗流浃背，也只当是换季风寒。\n\n他未察觉招募官停止叫嚣“布党威胁”与“赤色恐怖”；未留意区代表倒戈勒索国联同僚，反诬旧友是“玷污理想的极端分子”；无从知晓代表账户骤增的金额，亦看不见招募官肋下的淤痕。\n\n直到罗马城全学阵支部秘书长一夜易帜，方悚然惊觉。此人几小时前还在痛斥“削弱反共力度”的提案，此刻竟高谈与建制派合作规训民众的“裨益”。往昔种种细节如惊雷炸现：微妙的态度转变，骤冷的斗争热情。他曾笃信全学阵最后的虔信者必能抵御那些将法西斯遗产私器化的宵小，却大错特错——国民联盟的腐毒正日复一日侵蚀领导层要员。羞耻与憎恶在胸腔翻涌，败北的苦涩漫过喉头。是时候重返校园了，此刻的他已无能为力。"
 hotautumn.56.a:0 "终究是幕后勾当……"
 hotautumn.57.t:0 "回归巢穴"
 hotautumn.57.d:0 "米兰，这座曾激发无数诗篇赞颂其壮美的古城，法西斯年代却未善待这意大利的精神之都。鎏金的主教座堂锈迹斑驳，古雅宅邸与郊野村落尽数湮灭，唯余千篇一律的公寓楼群森然矗立。\n\n某个周二深夜，一列火车驶入这座凝滞却幸存的城市。乘客垂首鱼贯而出，旅途的疲惫与挫败在肩头沉积。\n\n然迎接他们的竟是英雄凯旋般的礼遇。因切利顷刻被仰慕者包围，酒瓶塞入掌心，众人催促他讲述罗马之行的细节。迷醉于佳酿与同志情谊，记忆悄然篡改：国民联盟的冷遇岂是败退——不过战略调整！全学阵何曾溃散——正在重组待发！\n\n因切利与战友们轮番陈词。追忆意大利失落的荣光——必将重现！街巷鼠辈般的异己者——终遭净化！罗马军团将再度远征，惩戒威胁文明疆界的叛徒蛮族。\n\n醉醺醺的一年级生正胡诌什么“核子军团”的疯话。置身英勇战友的环绕中，因切利感到前所未有的满足。"
 hotautumn.57.a:0 "至少一切都正常结束了……"
 hotautumn.58.t:0 "边缘的孩子"
 hotautumn.58.d:0 "尽管法律层面仍苟延残喘，全国大学行动阵线已然名存实亡。部分成员流入国民联盟旗下组织严密的官方团体，另些人则彻底放弃“民族革命”事业，恍如大梦初醒。\n\n然有异数另辟蹊径。\n\n意大利高校素不缺涂鸦客，墙垣厕间隔间向来布满各色符号——锤头、束棒、镰刀不胜枚举。而今却难觅寸许白墙，万字徽记如瘟疫蔓延。某些角落不再是潦草宣泄，而是描绘光明未来与荒芜废土的繁复壁画，日轮之位赫然绘着诡异的异教图腾。\n\n全学阵虽死，成员们对那个从未存在的意大利的浪漫追求却愈发强烈。这份执念随着宣泄渠道的激进化而日益危险。\n\n若无法得到教科书描绘的“受人尊敬的列强、繁荣的法西斯经济体”，他们宁可玉石俱焚。自灰烬中涅槃的意大利必将更加强大，金鹰终将挣脱枷锁，凌驾寰宇。"
 hotautumn.58.a:0 "我们会明白的。"
 hotautumn.59.t:0 "灼心晨会"
 hotautumn.59.d:0 "在维尔吉利奥·因切利厌恶清单中，“迟到”高居前列。他厌恶迟到损害自身形象，更憎恶随之而来的指摘——即便错不在己。譬如今晨，惯常路线被抗议者雀跃的舞步与尖利的口号声阻断。\n\n迟到还意味着必须忍受会议已开的羞辱。踏入会场时众人转头致意的瞬间，他得装作若无其事，任凭虚伪寒暄与嘲弄笑意打断议程，直至落座。\n\n更令他恼火的是，这群人竟在策划和平示威。\n\n“我们就沦落至此？举标语喊口号？”\n\n同僚们急于辩解的嘴脸暴露了心虚。“别这么想，该换个视角——”\n\n另一人无缝接茬，仿佛排练过这该死的戏码：“眼下配合民主派方为上策。我们存在……公众形象问题，若展现愿与现行体制合作的理性姿态，方能修复形象。”\n\n第三人帮腔：“媒体还怎么污蔑我们是暴徒？只要我们像其他人那样举着牌子和平抗议。”\n\n维尔吉利奥抱臂瘫坐椅中，听罢陈词虽仍不悦，却不得不承认计划确有可取之处——不多，但存在。\n\n“我……服从集体智慧。具体方案？”\n\n发言人见他让步顿时眉飞色舞：“正要说呢，我已与警方接洽。他们将设立警戒区以——”\n\n“警方？”因切利声线里的惊愕超出预期。\n\n“对，警方。刚说过要展现守法形象。若共党挑衅，警方既能保护我们。那群赤匪敢单挑我们，可面对盾牌警棍的防暴队？他们可没这个胆量。”\n\n当发言人继续详述示威细节时，维尔吉利奥在座椅中陷得更深了。"
 hotautumn.59.a:0 "比往常温顺的策略……"
 hotautumn.60.t:0 "冲突"
 hotautumn.60.d:0 "战场已然就绪。学生们手持横幅旗帜，装备头盔武器，队列齐整，严阵以待。唯缺一场战争，一个敌人。\n\n若说当日全学阵学生的武装程度不亚于保护他们的警力，这绝非夸大其词。头盔下的头颅齐刷刷仰视着当晚第二位演讲者，警棍懒散地握在手中——这姿态不像聆听政治集会的学生，倒似整装待命的士兵。\n\n演讲者的举止与浮夸言辞令许多人似曾相识，包括组成人墙的多数警员。奥维迪奥督察转向康斯坦蒂尼督察，用坦克般直白的耳语发问：\n\n“这群崽子从哪挖来这货？”他眯眼审视讲台，“台风专业得像能在议会就座，我还以为上台的会是他们自己人。”\n\n康斯坦蒂尼警棍轻敲下颌：“眼熟。常在各处演讲，下班路上碰见过。”\n\n第三个声音突兀插入——全学阵学生领袖维尔吉利奥·因切利不知何时潜至后方。“这是国民联盟的皮诺·罗穆阿尔迪，放尊重点。”\n\n奥维迪奥漫不经心耸肩，无视对方剑拔弩张的姿态：“不过是个模仿老领袖腔调的戏子。拿着麦克风还扯嗓子喊，生怕人听不出他在学墨索里尼？”\n\n“或许……是家学渊源。”因切利阴沉反呛。他毫无解释兴致，话锋急转：“若二位关注内容而非音量，或能学得几分刚毅。”\n\n康斯坦蒂尼眼角抽搐：“他的刚毅若能用在提前报备行程上，我们也不必加班听这超时演讲。”\n\n话音未落便悔青肠子——年轻因切利投来的憎恶目光，比米兰冬夜更刺骨。"
 hotautumn.60.a:0 "叫那些蠢货快滚。"
 hotautumn.60.b:0 "把它赶走。"
 hotautumn.61.t:0 "升温"
 hotautumn.61.d:0 "刹那间，因切利停止了思考。任凭原始本能接管躯体——理性思辨只催生闹剧，此刻他选择付诸行动。他冲向督察，将其猛推后退：“关你屁事？嗯？上台啊，去打断他啊。”\n\n督察对这突发状况措手不及，未及反应，警戒线又冲出两名警员横亘其间，警棍直指因切利。\n\n此刻全场目光聚焦于此：演讲者正与私人安保耳语，法西斯学生们簇拥在维尔吉利奥身后，与警员们对峙。某警员伸手喝令：“交出警棍！”\n\n一切在电光石火间爆发：骨肉撞击的闷响，法西斯学生群的狂热欢呼，警员的惊怒叫喊，靴底与鹅卵石路面的摩擦声。索要警棍者紧捂骨折前臂，但转瞬即被混乱吞没。\n\n广场各处，因切利的同志效仿冲阵。警方虽预判过冲突，却顷刻失序。学生与警员扭打冲锋，血腥暴力之声漫溢街巷。"
 hotautumn.61.a:0 "局势失控……"
 hotautumn.62.t:0 "冲锋"
 hotautumn.62.d:0 "尽管对学生们的突然冲锋措手不及，警方仍在街区的零星混战中稳住阵脚。仅有少数警员因头部或手臂遭警棍击打倒地，余者仍顽强抵御攻势。\n\n至于学生们，虽凶悍狂热，终归是学生而非战士。刚一与警员短兵相接，便有人溃退，另些人反向冲往政客与演讲者早已撤离的讲台。然战局瞬息万变，无人顾暇逃兵。\n\n装备精良、训练有素的警力开始逐个击退袭击者。那些被击中头、腹、臂的伤者被拖至警车后方。此刻攻守易势，追逃双方调换角色。\n\n对全学阵而言，厄运远未触底——打斗喧嚣骤然被引擎轰鸣淹没，轮胎碾过鹅卵石的震颤中，装甲运兵车突入广场。\n\n恐慌情绪在学生群中急速攀升。值得称道的是，他们未作鸟兽散，反而转向重整旗鼓，退至早先逃兵聚集处。当这群人从讲台后方现身时，已弃警棍于地，血痂覆盖的指节紧握着手枪与步枪。\n\n枪火的轰鸣，即将响彻街巷。"
 hotautumn.62.a:0 "我们不是有意为之……"
 hotautumn.63.t:0 "混乱"
 hotautumn.63.d:0 "广场空荡如坟，唯余半倾颓的木制讲台，及组成警戒线的装甲车队。警员们猫腰藏身车后，制定清剿方案，誓将学生逐出广场复归秩序。\n\n他们感知到学生的存在，却难觅其踪。反叛者们散落广场建筑间，藏身树后、匿于灌木，步枪手枪紧贴胸腔。藏身处窥视着装甲车组成的半圆防线，指节叩墙，足尖点地，枪械随不安躁动轻颤。\n\n耐心消磨殆尽。密谋瓜熟蒂落。广场死寂中弦满欲崩，对峙双方静候对方先手。挑衅叫骂率先刺破沉默，然紧绷之弦仍未断裂——直至第一声枪响。\n\n无从溯源首枪出处，结局已尘埃落定。执法者的军靴踏破广场，学生的生涩枪法奏响弹雨交响。铅弹在路面迸溅，警员们朝阴影与学生开火还击。\n\n三俩成组的警员穿越弹幕，逐楼逐树清剿。战事方启，已有流弹中的者的闷哼与痛呼撕破硝烟。"
 hotautumn.63.a:0 "此处不再是寻常巷陌，亦非集会广场，唯余血色战场。"
 hotautumn.64.t:0 "死亡"
 hotautumn.64.d:0 "“跟紧。”奥维迪奥低语，二人谨慎深入巷弄。两位督察握紧配枪，枪口低垂腿侧，逐渐远离安全区。“收官时刻可别搞砸，嗯？”他朝康斯坦蒂尼挤出勉强的笑。\n\n行动确近尾声。警方的绝对火力碾压下，装备粗劣且未经训练的学生们难以为继。多数人选择逃遁而非被捕，唯余零星负隅顽抗者。\n\n奥维迪奥赌咒发誓目睹人影窜出灌木，遁入毗邻示威广场的暗巷。巷道此刻寂然无声，但若说这群武装学生有什么拿手好戏，那非藏匿莫属。康斯坦蒂尼或许会拿这个开玩笑——如果他们没带武器的话。“压低嗓门，有回音。”\n\n康斯坦蒂尼独面未知威胁，目光扫掠墙垣窗棂。某扇窗台突现的细微动静吓他一跳，枪口急向上指。\n\n窗台理毛的玳瑁猫僵住动作，后腿高悬，琥珀色瞳孔俯视警员。康斯坦蒂尼垂枪轻笑，自嘲神经紧——\n\n枪声与弹头撞击鹅卵石的脆响交织，膝侧骤现的剧痛未及思索，身躯已随惨叫轰然倒地。后脑撞墙的闷响中，他已觉不到疼痛。\n\n奥维迪奥搂住康斯坦蒂尼瘫软的身躯正说着什么，但他已几乎听不见了。鲜血自他颅顶蜿蜒而下，浸透同僚裤管，渗入身下鹅卵石缝隙，即便如此，康斯坦蒂尼仍抑制不住喉间逸出的轻笑。\n\n\"不过是只猫啊，奥维迪奥。\"他笑着，声线逐渐衰微。抢在意识消散前挤出最后的话语：\"不过……一只蠢猫……\"喉间嘶鸣取代了最后的气音。"
 hotautumn.64.a:0 "多一具无名尸体又如何？"
 hotautumn.65.t:0 "寂静"
 hotautumn.65.d:0 "罗穆阿尔迪的演讲仍在继续，学生们转身归队前驻足聆听。当演讲者最终收束陈词，向坚定听众发出最后行动号召时，某种如释重负的氛围同时笼罩了学生与警员。\n\n警队迅速列队——或许仓促得略显失礼——准备护送全学阵成员撤离广场。蹊跷的是，学生们不仅未整理行装，甚至毫无动身迹象。即便罗穆阿尔迪等演说者已作离场准备，人群仍滞留广场漫无目的游荡。\n\n康斯坦蒂尼督察眯眼望向地平线将沉的落日，复又回望列阵同僚。双肩颓然一沉，他颔首自决，迈步走向聚集的学生。伸手轻拍最近学生的肩头，再度迎上维尔吉利奥·因切利轻蔑的凝视。\n\n“因切利先生。”康斯坦蒂尼维持着外交辞令般的平稳声线，尽管疲惫神色恐已出卖真实心境，“警戒线已就位护送贵方撤离，不知何时——”\n\n“不必费心。”维尔吉利奥生硬截断话语，留督察在沉默中消化这突发状况。青年短暂回瞥面露困惑的同窗，他无法苛责他们——连他自己都不清楚这般挑衅警方的目的何在。\n\n“不必？”康斯坦蒂尼朝年轻人偏了偏头。这本是台阶，却反令年轻的因切利气焰更盛。\n\n“完全多余。我们不走。诉求尚未达成。”他抱臂与督察对视，“诸位尽可自行归家。离了你们，我们照样能行。”\n\n伴着深长叹息与耸肩，康斯坦蒂尼督察转身折返警戒线。此事需要更多层面的决断……"
 hotautumn.65.a:0 "是坚定信念，还是无谓固执？"
 hotautumn.66.t:0 "恐惧"
 hotautumn.66.d:0 "“他们是学生。说到底是群孩子。他们不想挪窝就来硬的。你们是警察，拿出警察的样子来，他妈的。”\n\n总部的回复与康斯坦蒂尼的期许背道而驰。他原指望局长愿作斡旋，然指令已明：此等无序行径远超集会抗议权保障范畴，唯强制执行一条路。\n\n“可他们有备而来。若要武力清场，亟需增援……”\n\n全学阵方面既无谈判意愿，亦无服从打算。维尔吉利奥·因切利耗费多时，辅以慷慨激昂的演说，终将摇摆同侪拉入阵营。纵使众人怯懦犹疑，他的主张渐占上风。\n\n“是时候践行我们宣扬的信条了！就让这群腐败官僚见识真正的意大利力量与精神！”他振臂高呼，零星的应和声在学生群中此起彼伏。转身直面持警棍的同僚，身后是全学阵的钢盔与旌旗。\n\n“最后机会，重新考虑一下自己是不是精神错乱可好？”康斯坦蒂尼向对峙者伸出空掌示好，最后一次，“此刻离去，既往不咎。就当本该如此散场。”\n\n维尔吉利奥仅以摇头回应：“我们绝不退缩。”他欲再言，却被装甲车碾过鹅卵石的轰鸣打断——钢铁巨兽正合围广场。\n\n装甲引擎声令学生群体本能后撤半步，然未及因切利回应这武力展示，旋翼嗡鸣再度截断话语。\n\n康斯坦蒂尼眯眼望向苍穹，难以置信地喃喃：“连机枪都上阵……未免过火……”"
 hotautumn.66.a:0 "事态升级至此。"
 hotautumn.67.t:0 "撤退"
 hotautumn.67.d:0 "战场已就绪。对峙双方列阵相持，旌旗翻卷，钢盔密布，队列齐整。此刻唯一的困境是：学生阵线的钢盔、旗帜与警棍正对着警方的装甲车、直升机及机枪。\n\n“维尔吉利奥，求你了。”康斯坦蒂尼督察抛下警棍作最后恳求，尽管此举在机枪威慑下苍白无力，“放下吧。”\n\n维尔吉利奥望向督察，继而回首后顾。他的目光扫过全学阵同侪——众人仰视空中盘旋的直升机，惊惧之色浮现脸庞；警员们正以车辆为掩体隐蔽身形，弃置警棍改持枪械。\n\n康斯坦蒂尼亦侧身回望警戒线，警员们犹疑不定的面容映入眼帘：他们当真敢对学生开火？这群书生真会愚勇至此？他瞥见有人悄然卸下手枪弹匣，自以为无人察觉；又见另一警员刻意侧移，让出疏散通道。\n\n紧绷的空气凝滞如铅，只待一丝肌肉抽搐、一个冒失动作、一粒火星引爆全场。然而打破僵局的，是坠落在维尔吉利奥脚边的木棍闷响。\n\n他夸张地掷械于地，转身面向同袍。顷刻间木器坠地声此起彼伏，旌旗卷收，钢盔掷地，未持械者纷纷扯下臂章掷手套泄愤。\n\n“我想……”他朗声宣告，声震广场，“我们已讲明我们的诉求。天快黑了，趁治安守护者们尚未升级事态，回家吧。\"”纵使警员退散，话语中的毒刺仍萦绕石砖缝隙。"
 hotautumn.67.a:0 "擦肩而过……"
 hotautumn.68.t:0 "寂静"
 hotautumn.68.d:0 "全学阵总部笼罩着挥之不去的阴霾。当其余领导成员鱼贯而入时，维尔吉利奥早已斜倚在座椅上——虽到场不久，却刻意摆出久候多时的姿态。见众人入内，他缓缓将靴子从桌面挪下，双手交叠支于橡木桌。\n\n“若说今日之事未按计划发展，未免太过轻描淡写。”他开启话头，稀落的附和声在室内游荡。\n\n“组织形象恐需时日修复。\"”某位同僚嗫嚅道。\n\n另一人接过话来：“经此一役，警方断不会准许我们再度集会。”他颤抖着摇头，“媒体正大肆污蔑，仿佛暴乱元凶是……”\n\n“木已成舟。”维尔吉利奥长叹起身，掌心压出桌案凹痕，“示威究竟是始于谬误还是遭人构陷已无关紧要。当务之急……”指尖叩击桌面铮然作响，“在于前路抉择。”满室寂然。众人目光游移于天花板与地砖之间，直至有人替沉默发问：“那么……我们该何去何从？”维尔吉利奥环视同袍阴郁面容：\"依我所见，只有两条路可走。要么继续扮演民主派想要的乖顺角色，直至被历史洪流碾作扉页注脚……\"\n\n他刻意停顿，任愤怒取代众人面上阴云。忽而攥拳疾言：\"要么改弦更张！他们想要我们动枪火？我们就以枪火还之；他们想要见血光？我们便让血染长街！若意大利需浴血重生，那便让鲜血流淌——总好过让祖国在官僚的怯懦凝视与政客的嗜血獠牙下窒息而亡！\"\n\n霎时颓唐尽化激愤，满座皆起行罗马式敬礼。为维尔吉利奥，为全学阵，为意大利。"
 hotautumn.68.a:0 "这场仗输了，可整个战争还没完。"
 hotautumn.69.t:0 "晨间工作"
 hotautumn.69.d:0 "在快速反应部队服役绝非易事，担任军官更是难上加难。微薄薪水、漫长工时。示威者的尖叫、酒瓶、石块、口号如暴雨般砸来，而麾下警员正眼巴巴等着你发号施令。共产主义者与法西斯分子——他们唯一共识就是对你们的憎恨。肾上腺素飙升，心跳如擂鼓，冲锋、警棍挥舞、催泪瓦斯刺鼻、高压水枪轰鸣、此起彼伏的指令，还有暴力酿成的致命毒雾。\n\n这样的日子不好过，而执勤间隙往往更煎熬。破晓时分赶到警局，与同事就着咖啡闲扯，文书工作堆积如山。当米兰在烈焰中挣扎时，这些警察却埋头案牍，仿佛窗外天下太平。警察与宪兵队的兵力捉襟见肘——比可卡工业区罢工不断，小规模骚乱此起彼伏；市中心的斯塔塔莱区虽暂归平静，但灰烬之下仍有暗流涌动。\n\n督察阿德里亚诺·康斯坦蒂尼从文件堆里抬头，望向窗外街道。伦巴第特有的淡蓝天幕下，他拿起办公桌上的香烟——警徽旁那包——点燃一支，深深吸了一口。今天注定漫长。"
 hotautumn.69.a:0 "回去干活。"
 hotautumn.70.t:0 "隔离"
 hotautumn.70.d:0 "过去几天，关于即将爆发罢工的文件在警局里传了个遍。但今天康斯坦蒂尼发现，案头文件全换成了新内容。“米兰全学阵‘示威集会’”的标题印在首页，督察花了片刻才反应过来所指何物。\n\n那些墨索里尼的小追随者，没错。\n\n“怎么突然换任务？”康斯坦蒂尼把文件甩到同属快速反应部队的奥维迪奥督察桌上。纸页拍击桌面的声响惊得对方猛然抬头，差点打翻半温的咖啡。\n\n“哦，罢工那事儿？”奥维迪奥扶正眼镜，用袖口抹了抹嘴角。\n\n“这儿写的是呃……示威游行。”康斯坦蒂尼敲了敲文件，“怎么从倍耐力案场调过来了？”\n\n奥维迪奥边翻阅边耸肩：“总不能管学生罢课叫罢工吧？毕竟不是工人。谁会在意书本一晚上没人读呢，总得换个名头。”他仰靠椅背递回文件，“上头临时要设封锁线，估计只剩我们能调派。”\n\n康斯坦蒂尼阴着脸摇头：\"法西斯崽子们不是最爱显摆能耐？安保不该自己搞定？\"话虽如此，他暗自庆幸这帮人总算没自行其是。\n\n奥维迪奥的回应与他内心独白不谋而合：“总比让他们来强。这群挂着学生名头的纳粹，要是遇上工会的人准会过激反应——到头来还得咱们收拾烂摊子。”他再次冒险把脚翘上桌沿，双手枕在脑后：“总得有人看着这帮小崽子别把自己玩残，对吧？”\n\n“我是警察，不是保姆。”\n\n“搞得好像这两者有区别似的。”"
 hotautumn.70.a:0 "盾牌防御的时候可不管左右，一视同仁。"
 hotautumn.71.t:0 "一通上司的电话"
 hotautumn.71.d:0 "日复一日案牍如山，文山会海却永无止境。康斯坦蒂尼督察将最后半截烟蒂碾灭在搪瓷缸里，吐出一声长叹。这般枯燥时日虽令人倦怠，却也是暴风骤雨前难得的宁静。正当他拎起大衣准备归家时，办公桌上的电话铃声刺破了警署空荡的走廊。\n\n“命令有变，康斯坦蒂尼督察。”听筒那头传来署长罕见的话音——深更半夜亲自致电本就反常。“明日倍耐力案场无需你部协防。”原定参与罢工警戒的快速反应部队突遭撤换。“另，所有倍耐力相关卷宗已上调密级。”没等回话便断了线，徒留忙音在督察指间震颤。\n\n事出反常必有妖。快速反应部队素来是警界骡马，专门干脏活的苦力，何时与刑侦机密扯上干系？康斯坦蒂尼踱步在归家路上，思绪翻涌：为何突改部署？为何连几小时前还在传阅的档案都要加密？或许只是虚惊一场，但明日回署打探风声总归稳妥。"
 hotautumn.71.a:0 "警员就该令行禁止。"
 hotautumn.72.t:0 "奇怪的消息"
 hotautumn.72.d:0 "康斯坦蒂尼督察挂断电话，办公室重归死寂，耳畔却仍回荡着近日多方来电的余音。圣多纳托、罗戈雷多、塞斯托·圣乔瓦尼——几乎每个米兰工人区都有同僚密友传来相似风声：调度令朝令夕改毫无章法、经验丰富的老警员被外埠空降兵顶替、地方警署精心制定的维安方案遭废弃，取而代之的是漏洞百出的新策。\n\n警队高层昏招频出本非新鲜事，但此番荒唐程度实属空前。康斯坦蒂尼凝视着办公室墙上巨幅米兰地图——这座五芒星状的城市在历史长河中历经数代统治者雕琢，街巷如血管般以诡异角度交错延伸。环绕市中心的红色警戒区恰似烈焰之环，将大教堂、圣巴比拉广场、国立大学等白色安全岛围困其中。\n\n现行警力部署堪称灾难导火索：快速反应部队竟被派往瓶颈路段与窄巷驻防，这等绝地岂能有效控场？暴力冲突已如箭在弦。上峰中必有尸位素餐之徒，若不及早应对，惨剧必将降临。"
 hotautumn.72.a:0 "我们不能坐在这，等着闹出人命！"
 hotautumn.73.t:0 "来自上层的传言"
 hotautumn.73.d:0 "警界贪腐是个微妙话题——这词儿还没在康斯坦蒂尼脑中成形，光是这个念头的苗头刚冒尖，就让他如坠冰窟。可环顾米兰警队高层接二连三的昏招，除却阴谋论竟寻不出更合理的解释。某处必有黑手在精心策划这场街头屠杀，背后定有其他图谋。\n\n政警勾结本非新鲜事，但头一遭让康斯坦蒂尼深陷漩涡。他麾下儿郎可是要直面米兰街垒的——要么成为刽子手，要么沦为祭品。奈何区区督察位卑言轻，手头仅有流言蜚语与推测臆断，拿不出实锤铁证。纵使有，又怎能撼动指挥链顶端的大人物？\n\n更费解的是，究竟何方神圣要在这火药桶上浇油？最显眼的嫌犯当属赤色分子——借暴力升级将死者塑造成烈士，好在工运中收割声望。可警队素来与共产主义势不两立。或者是极右组织欲借警员之死为借口，对左翼施以铁腕镇压？甚至不排除黑手党趁乱渔利，用暴动牵制警力好走私贩毒。再往深处想，说不定警界高层自导自演苦肉计，只为多讨些财政拨款。种种阴谋论在督察脑中翻腾明灭，焦躁、愤怒与恐惧如毒藤般缠绕心扉。"
 hotautumn.73.a:0 "只能希望这些都是毫无根据的猜测。"
 hotautumn.74.t:0 "怀疑滋生"
 hotautumn.74.d:0 "康斯坦蒂尼关掉那台掏空积蓄购置的廉价电视，长叹一声。从《团结报》到《晚邮报》，各家报刊连同意大利广播电视公司的电台广播，众口一词讲述着相同的故事：昨夜塞斯托·圣乔瓦尼区，防暴警与示威者的冲突最终演变成血腥屠杀。燃烧瓶与石块如暴雨倾泻，愤怒的无产者大军——失业工人、学生革命家、贫民窟妇孺——如潮水冲击警戒线。警队最终下令反冲锋镇压骚乱。\n\n那一瞬仿佛琴弦崩断，死寂过后便是炼狱。水炮、催泪瓦斯、尖叫、警棍敲击颅骨——直到第一声枪响划破夜空。警员竟对人群实弹射击，街道顷刻横陈死伤。接着是还击的冷枪，某位同僚倒地抽搐，血泊在制服下蔓延。更多警员负伤，人群终作鸟兽散，遁入楼宇窄巷，恍若人间蒸发。留给媒体镜头的，唯余硝烟中的尸骸与焚车。\n\n果不其然，舆论哗然。素以温和著称的政客哀叹伤亡，趁机索要更多警备预算与特别授权；上流社会的体面人士痛斥暴力失序，渴望回归“子民安分守己”的太平年景；右翼势力开始公开提醒民众“这等乱象在旧日良辰可从未发生”。康斯坦蒂尼瘫坐客厅沙发，盯着天花板的裂纹，熟悉的蜂鸣声在颅腔内震颤。"
 hotautumn.74.a:0 "……有些不对劲。"
 hotautumn.75.t:0 "提出问题"
 hotautumn.75.d:0 "葬礼终归是桩尴尬的仪式——逝者至亲的悲恸与人群的窃窃私语交织成诡异和弦。此刻圣玛丽亚感恩教堂内的场面更显吊诡：殉职警员的遗孀幼子伏棺痛哭时，列阵护灵的国家警察们却如石雕般面无表情。这些硬汉的扑克脸下，愤怒、哀伤与“本可避免”的悔恨正暗流汹涌。\n\n康斯坦蒂尼督察虽身着制服列席，却匿身于教堂后排阴影中。当米兰总主教诵读悼词时，他的目光始终逡巡在送葬队伍间。此番前来非为吊唁，实欲私会旧识——那位亲历塞斯托暴动的警队同僚。或许此人能解开谜团。\n\n待主教做完最后祝祷，灵柩在仪仗护送下抬出教堂。人群如退潮般散入米兰喧嚣的街巷，康斯坦蒂尼终于截住目标——对方脸上挂着花岗岩般冷峻的神色。寒暄过后，督察单刀直入：究竟谁下达了那道催命符？为何要布此死局？对方的回答虽令他脊背发凉，却也并未出乎意料。"
 hotautumn.75.a:0 "“你为什么到处跑来跑去专捡这样的问题问。”"
 hotautumn.76.t:0 "友好升温"
 hotautumn.76.d:0 "米兰地区警察总部备忘录 - 机密\n（发现于阿德里亚诺·康斯坦蒂尼督察办公桌）\n\n“警员殉职的噩耗令全体同僚深感震恸。值此哀悼之际，总部注意到该事件已对国家警察队伍的士气与纪律造成负面影响。为确保米兰及周边地区警务工作正常运转，现决定采取纪律整顿与预防性措施。”\n\n“近期所有涉及公共秩序骚乱的案卷已提升密级，相关调阅申请须经地区总部核准。全体警员务必谨记：严禁散布有关警界贪腐及其他不当行为的无端指控、臆测与流言——任何损害国家警察声誉的造谣者将面临严厉纪律处分。”\n\n“现同步启动岗位轮换机制。随文附调职名单，所列警员将紧急派驻利比亚费赞地区（该驻地当前严重缺编亟需增援）。空缺岗位由地区总部统一调配补充。”"
 hotautumn.76.a:0 "督察的故事就此落幕"
 hotautumn.77.t:0 "比可卡之火"
 hotautumn.77.d:0 "平素米兰的比可卡工业区总透着股诡异的宁静。厂房林立的街道虽人声鼎沸却秩序井然，往来劳工的步履声纵使此起彼伏，也从未让这座历史名城蒙羞。而今晨光初现时，钢铁巨兽们震颤的轰鸣里却夹杂着异样的喧嚣——怒吼与烈焰的爆裂声正吞噬着这座科教经济重镇。康斯坦蒂尼督察故意将制式配枪的枪套调至最显眼位置，暗忖道：动荡年月里暴乱本是家常便饭，但眼前这场焚毁半个街区的滔天火势，连他这个老刑侦都脊背发凉。昨夜全城警力已倾巢出动，安保部的旧相识更透露连卡拉布里亚的特勤防暴队都在驰援路上，誓要将这场国家之耻扼杀在萌芽。\n\n“怕是杯水车薪。”督察阴沉着脸钻进待命的警车，同车的警佐正喋喋不休解释自己临危受命调度外省援军。\n\n通往火场的路途异常沉默，正合康斯坦蒂尼心意。唯有两起插曲打破死寂：先是零星的枪声刺破晨霭——明明简报说暴徒手无寸铁，看来情报早已过时；接着警佐压低嗓音透露，数个重点监控的无政府主义头目竟集体摆脱盯梢，此刻全部下落不明。后者虽非枪林弹雨，却更令督察太阳穴突突直跳。"
 hotautumn.77.a:0 "事情还能变得多糟？"
 hotautumn.78.t:0 "枪响"
 hotautumn.78.d:0 "暴民如潮水般再度冲击警方防线——尽管警员们全副武装、死守阵线，但人数劣势正随时间推移愈发明显。与秩序捍卫者对峙的多是比可卡本地产业工人，这些人在全国工厂普遍存在的落后劳政压迫下终于爆发。其间夹杂着受过高等教育的青年学子，他们笃信马克思与恩格斯学说，誓要反抗自幼浸淫的腐朽体制。在这片由工装老者与摩登学生汇成的不满之海中，若干关键人物显得格外扎眼：这些面色铁青、眼窝深陷的汉子，有的带着醒目伤疤，衣着比最操劳的工友还要破旧。困守外围的警方浑然不觉，正是这些斗志昂扬的\"拳击手\"通过控诉权贵，不断煽动着暴乱者的怒火。\n\n随着日头渐高，聚集的抗议者整体情绪似有降温迹象。至少马里奥·卡拉布罗是这么认为的——他目睹一队学生脱离人群向警方投降。这位老工人不忍责备这些孩子，即便自己投身抗议的决心坚如磐石，仍不免为那些与他长子年纪相仿的年轻同志担忧。然而并非所有人都心存怜悯，当溃逃者重新点燃暴民怒火时，卡拉布罗的心直往下沉。此刻的愤怒不再指向资本主义与法西斯杂碎，而是倾泻在做出明智自保选择的年轻人身上。像他这样的老骨头早已无所牵挂，可那些学生本应拥有光明的未来。某个暴乱头目正对离队者恶语相向，未等卡拉布罗出声制止，那煽动者竟掏出手枪扣动扳机——"
 hotautumn.78.a:0 "一位公共安全的捍卫者倒在了执勤岗位上。"
 hotautumn.78.b:0 "一个年轻生命因临阵脱逃的罪名戛然而止。"
 hotautumn.79.t:0 "报应"
 hotautumn.79.d:0 "康斯坦蒂尼督察感到脸颊溅上团粘稠液体，冲击力迫使他本能闭眼。再度睁眼时，方才还在交谈的防暴同僚已瘫倒在地，肩膀伤口血流如注。人群仿佛被按下暂停键——当督察声嘶力竭的呼唤刺透拥挤的街道，警察与暴民都迟缓地转身张望，周遭陷入不祥的死寂。焦灼等待医护时，余光忽瞥见异动：原本抵在防暴盾前的暴民正悄然退却，没有呐喊也没有推搡，只是沉默地后撤。或许血腥场面终于唤醒理智？或许这场悲剧反成转机？正当他思忖之际，对面阵线有位警员踏着战术步伐向前逼近。\n\n他预见到即将发生的惨剧——清晰得如同目睹重播的胶片，却无力阻止。除非及时赶到。可眼前濒死的伤员正拽住他袖口，放任不管等同谋杀。两难抉择如剃刀割喉，答案却早已注定。\n\n当督察拔腿冲向那名冒进警员，挥舞双臂喝令止步时，一切都太迟了。防暴盾的猛击将某个暴民掀翻在地，后脑撞击路面绽开血花。漫长的静默过后，混杂着愤怒、怨恨甚至恐惧的咆哮声中，警察阵线彻底崩解为复仇的暴徒。阿德里亚诺·康斯坦蒂尼僵立原地，眼睁睁看着暴力如癌细胞般扩散吞噬整条街道。"
 hotautumn.79.a:0 "天哪，我们做了什么？"
 hotautumn.80.t:0 "烈焰升腾"
 hotautumn.80.d:0 "康斯坦蒂尼督察从未想过能在末日审判之外听闻这般声响——尽管此刻他确信自己正身处炼狱。当防暴警察裹挟着恐惧与狂怒发起冲锋时，残存的秩序顷刻土崩瓦解。暴徒们从暗处倾泻的弹雨愈发密集，即便这场暴力并非预谋，督察也看清他们早有准备。但枪声并非单方面炸响，康斯坦蒂尼抬眼望向四周屋顶，至少六名警队狙击手正在瞄准或扣动扳机。\n\n他转身朝移动指挥部狂奔，指望能在几个街区外找到重整秩序的希望。爆炸的轰鸣与堪比地狱哀嚎的惨叫却将他钉在原地。面色惨白的督察缓缓回头，但见二十余栋建筑腾起的火柱构筑烈焰长廊，将抗议者与警察尽数吞噬。原来枪支不过是暴乱的前奏——又一支日丹诺夫燃烧瓶划着慵懒的抛物线飞来，玻璃幕墙转瞬化作火海。初时的惊愕令枪声暂歇须臾，此刻却以更暴烈的姿态复苏：暴徒的手枪闷响与警用步枪的尖啸交织成毁灭的炼狱交响曲。康斯坦蒂尼强迫自己不去想正逃离的死亡惨相，发足奔向指挥部。或许他们有应急预案，或许他们早有对策，或许……或许……或许……这词随着愈发急促的脚步在脑中疯狂回响。"
 hotautumn.80.a:0 "谁能阻止此种疯狂？"
 hotautumn.81.t:0 "好人没好报……"
 hotautumn.81.d:0 "起初，马里奥不愿相信警方会放任整个街区焚毁。他天真地以为，已然沦为暴徒的警察会鸣金收兵，放任抗议者四散以便消防队抢救火场。但浓烟中若隐若现的屋顶狙击手很快击碎了这份幻想——那些石像鬼般踞守制高点的枪手每隔几分钟便朝暴乱区域开火，弹着点大多落在路面，但绝非总是如此。\n\n这位温和顾家的男人不得不承认，若能揪出那个开枪的杂碎，自己恐怕也难保理智。但此刻他满心只想冲出炼狱回到妻儿身边。来时的路已被火舌封锁，马里奥只得逆着人流朝反方向突围。此处虽无狙击手威胁，但溃散的抗议者正与武装到牙齿的警察展开绝望巷战。\n\n街尾暂未受火势波及，却沦为更血腥的屠宰场。尸体横陈的人行道上，伤者蜷缩在巷口抽搐，有个十六岁模样的少年正踉跄着栽进暗巷。马里奥的父性本能驱使他上前，却在距巷口数米时遭遇弹雨横飞。催泪罐擦着耳际掠过，近在咫尺的民居敞着门仿佛在召唤避难——但那就意味着抛弃垂死的少年。"
 hotautumn.81.a:0 "去救那个少年，无论多危险！"
 hotautumn.82.t:0 "工人之死"
 hotautumn.82.d:0 "马里奥·卡拉布罗先是顺着墙壁滑落，继而瘫倒在地，后脑在墙面拖出的血痕随着躯体坠向冰冷地面。时间感知已然紊乱——或许是一瞬，又或是永恒——无边的黑暗吞噬了他。闷钝的嘶喊、器物碎裂的钝响、乃至仿佛隔了数个街区的枪声，轮番撕扯着这个不幸劳工的耳膜。混沌的意识角落里，他分不清这究竟是脑震荡的错觉还是暴乱真的在转移，可就连这般简单的思辨都如流沙般消逝。\n\n当温热的金属触到脸颊时，他睁开了眼。自倒地以来首次恢复的视觉，向他展现地狱图景：周遭横陈着十余具躯体，有人呻吟着蠕动如折翼之鸟，更多人则了无生气。费力转动眼珠，满地弹壳让他明白方才触碰脸颊的正是其中一枚。脚边的催泪罐布满血污凹痕。\n\n他想起即将守寡的妻子，想起失去父亲的孩子们。颤抖的手探入裤袋，攥住那张磨损的全家福。马里奥·卡拉布罗凝视着相片上的笑靥，嘴角牵起微弱的弧度，阖目长逝。"
 hotautumn.82.a:0 "在亲人的幻象中安息。"
 hotautumn.83.t:0 "大坝决堤"
 hotautumn.83.d:0 "马里奥·卡拉布罗惊恐地看着那个看似二十出头的年轻学生——男孩正捂住肋部，暗红色的鲜血开始渗下衬衫，接着浸透裤管，最终在脚边积成一滩血泊。当这个早已无药可救的年轻人倒地时，人群已经辨别出子弹落点的位置。然而据马里奥观察，除了藏身暗处的自己，再没人真正看清枪手的模样。这个不幸的工人突然意识到：若无法指认真凶，本就躁动不安的抗议者们必将把怒火倾泻向……他猛地转身，疯狂挥舞手臂试图警示众人自己的发现，但局势早已超出任何个人的掌控。\n\n积郁在人们心中的挫败与愤怒——不仅来自这次抗议，更源自无数次抗争背后如幽魂般盘踞的经济危机——此刻终于喷涌而出。成队的防暴警察正被数十名手持棍棒钢管的工人学生步步紧逼。石块开始如冰雹般砸向警盾，那是保护执法者免遭暴民冲击的最后屏障。事态即将急转直下，而且就在顷刻之间。\n\n在马里奥看来，有些警察似乎准备死守阵地直至最后一刻——这念头简直疯狂——而另一些已在压力下节节败退。他蜷缩在巷口窥视，既不愿直接参与又渴望见证这场戏剧的终章。显而易见的是，冷枪完全出乎警方预料，他们正陷入彻底的混乱与迷茫。他暗自祈祷警方能在更多鲜血溅出前及时撤退。"
 hotautumn.83.a:0 "烈士的血永不白流。"
 hotautumn.84.t:0 "项圈下的猎犬"
 hotautumn.84.d:0 "督察决不允许事态继续恶化。随着那个年轻人的死亡，抗议正迅速蜕变为暴乱，大规模流血冲突随时可能爆发。康斯坦蒂尼确信，若想给局势降温，警方必须立即撤退。这就是为何他此刻正以警校毕业后从未有过的拼劲冲向临时指挥部——他经历过生死关头不假，但如此确信数百条人命悬于己手尚属首次。\n\n临时指挥部在他离开前线这短短时间里已面目全非：便携式路障封锁了通往帐篷群与军用装甲指挥车的通路，周边警员荷枪实弹严阵以待，每顶帐篷入口更有两挺机枪把守。高层显然陷入了偏执妄想，但目睹过前线惨状的康斯坦蒂尼实在无法苛责。最深处那顶帐篷里，警长正与幕僚们协调应对。督察亮出证件冲入帐中，甚至未等卫兵查验。\n\n米兰警界素以铁腕著称的局长此刻面色苍白、精疲力竭，这副模样比任何暴民都更令康斯坦蒂尼胆寒。当他闯入时，局长正与下属激烈争论，突如其来的闯入者让所有目光骤然聚焦。时间紧迫，督察抓住这瞬息寂静，径直向警长陈情——他必须用最简短的言辞说服对方撤兵方能避免全面失控。"
 hotautumn.84.a:0 "时间不多了！"
 hotautumn.85.t:0 "沉默驻足"
 hotautumn.85.d:0 "康斯坦蒂尼远眺着防暴队列——警员们再度恪守纪律，在两侧增援下重组盾墙阵型，仿佛这场闹剧初启时的场景重现。他暗自感谢上帝赐予自己说服警长的口才。最初当然遭遇了阻力：没有哪个高层长官乐见警方在暴乱前撤退。所幸他成功论证了固守原地的风险——暴民将合围歼灭防暴警员，那对城市形象才是毁灭性打击。\n\n对于刚被复仇心切的暴民包围的队伍而言，康斯坦蒂尼认为他们维持阵型的表现堪称完美。多数抗议者放任警方撤离：这些以学生与养家工人为主的群体，本就不是为已结束的战斗抛头颅洒热血的狂热分子。但人群前列仍暗藏可疑分子——督察示意附近中尉加强监视，他可不想哪个冒失的狙击手误判局势毁掉全局。确认指令沿防线准确传达后，他步履从容地折返移动指挥部。\n\n帐篷已收拢完毕，最后一批设备正装入装甲指挥车。寻不见来时座驾的督察钻进堪称人类工程学灾难的座椅——这让他想起战争年代搭乘过的同类机械。彼时的自己正如这些学生般年轻。他漫想着：这些孩子是否也会在多年后，将今日抗议视作漫长苦战中褪色的残片？"
 hotautumn.85.a:0 "干得漂亮，督察。"
 hotautumn.86.t:0 "余烬未熄"
 hotautumn.86.d:0 "无云的夜空将银白光带倾泻进米兰警局总部死寂的办公室——说是死寂，其实此刻仍有活物。阿德里亚诺·康斯坦蒂尼督察啜饮着黑咖啡，竭力驱散袭来的倦意。他伸手从那堆垒成古罗马神庙状的文牍中又抽出一份文件，暗自打气：再熬片刻就能收工。自从深陷媒体口中的“比可卡之火”事件后，填不完的表格早是意料之中——意料之中，却依旧恼人至极。\n\n堆积如山的报告或许即将派上用场。从西西里到威尼斯，各地官员正逐渐领悟：扑灭一处火苗远远不够。当全国局势紧绷得能用匕首切割时，工业重镇接连爆发的示威游行本不该令人诧异。即便镇压手段或温和或酷烈，形势依然急转直下。暴乱与抗议不过是序章——意大利各政治派系显然在酝酿大动作。社会党为反抗喝彩，残余法西斯分子与保守集团痛斥\"文明之死\"，温和派连拟定声明都焦头烂额。简而言之：天下大乱。\n\n康斯坦蒂尼瞥了眼挂钟，揉眼再看。整整一小时的神游天外，案头文书分毫未减。老警探叹着气扫视空杯，呵欠声在寂静中格外清晰。继续留守毫无意义：晨光降临时，文书依旧堆积如山，乱局亦会如老友般如期造访。"
 hotautumn.86.a:0 "纵使天下鼎沸，案牍劳形依旧。"
 empiremanagement_egypt.1.t:0 "援助殖民地"
 empiremanagement_egypt.1.desc:0 "埃及近日风云突变，法鲁克国王在一场奢华的宴会上，因长期饕餮之祸突发心脏病，撒手人寰。他的离世在埃及各地引发了庆祝，却也成了更大动荡的导火索。新政府为稳定局势，向意大利求援。\n\n意大利政府面前摆着几条援助之路。首先，可伸出经济援手，确保他们有足够的资金来采取临时措施。虽然这并不能从根本上改善埃及的状况，却也方便我们日后随时撤资。\n\n其次，可派遣军队支援，帮助埃及在关键时刻维护秩序，让政府能够安心重建。但这步棋一旦走错，撤军将难上加难。\n\n再者，全面投入，既出钱又出兵，以稳住埃及的政局。这将极大地助力埃及，但若局势失控，我们也将难以自拔。\n\n当然，我们也可以选择按兵不动，这无异于放弃埃及，但如果当前的动乱仅是冰山一角，那么明哲保身或许才是上策。\n\n面对抉择，意大利政府需当机立断……"
 empiremanagement_egypt.1.a:0 "我们啥也不做，毕竟埃及注定完蛋。"
 empiremanagement_egypt.1.b:0 "提供经济支持，此乃权宜之计。"
 empiremanagement_egypt.1.c:0 "派军队过去，他们知道如何维持秩序。"
 empiremanagement_egypt.1.d:0 "稳定大于一切，我们不能失去埃及。"
 empiremanagement_egypt.2.t:0 "决胜局？"
 empiremanagement_egypt.2.desc:0 "摄政委员会意见不一，对于王位继承者的选择莫衷一是；因此我们收到电报，他们请求基于我们在埃及的深厚投资与承诺，投下关键一票。此刻，我们手握重权，成为幕后的王位推手，机遇难得。抉择如下：\n\n阿达尔贝托王子，若他登基，或能拓展我们的利益，却可能激起民怨——近日反意大利情绪已有抬头之势——从这个角度来看，选择他对我们并无益处。即便如此，罗马方面似乎更倾向于这个选项。\n\n穆奈姆王子则是温和之选，作为法鲁克一世的远房亲戚，他在民间拥有一定的合法性。但此举可能激怒埃及的共和派人士，亦可能令罗马不悦，他们不认为穆奈姆会顺从他们的利益。\n\n我们还可以考虑推动建立埃及共和国。虽然这看似对意大利不利，但成立共和国将有助于我们在埃及民众中恢复声誉。况且，拥有一个独立的盟友，对我们也是有益的。不过，这一选择可能会触怒罗马。\n\n最终，决定权在我们手中，何去何从，需慎重考虑……"
 empiremanagement_egypt.2.a:0 "支持穆奈姆王子。"
 empiremanagement_egypt.2.b:0 "建立埃及共和国也不错。"
 empiremanagement_egypt.2.c:0 "投阿达尔贝托亲王一票。"
 empiremanagement_egypt.3.t:0 "伊斯兰之剑"
 empiremanagement_egypt.3.desc:0 "近日，埃及摄政王阿达尔贝托亲王策动了一场精心布局的运动，目标是赢得埃及众多穆斯林民众的拥戴。他步墨索里尼后尘，自诩伊斯兰的守护者，尽管这一称号自1937年诞生以来便鲜有人问津。亲王依葫芦画瓢，下令兴修古兰经学院，修缮清真寺，为那些踏上朝圣之旅的信徒们提供便利设施。\n\n随之而来的是，伊斯兰之剑——这一与守护者身份密切相关的圣物，由开罗大伊玛目哈桑·马蒙亲手交予亲王。这把剑从墨索里尼昔日的避暑山庄——卡米纳特城堡空运而来，在开罗城堡举行的一场盛大典礼中，被隆重地赠予了摄政王。\n\n撰写此报告之际，人们普遍认为这一举措已经成功地在埃及民众心中播下了对现政权信任的种子。报告作者在此建议，对于目前对埃及的援助政策，我们应持审慎态度，深思熟虑。"
 empiremanagement_egypt.3.a:0 "埃及现在接纳他了，大幅削减援助。"
 empiremanagement_egypt.3.b:0 "保留一些援助，安全第一。"
 empiremanagement_egypt.3.c:0 "援助力度不变，民意肯定不会这么轻易改变。"
 empiremanagement_egypt.4.t:0 "飞行员的交易"
 empiremanagement_egypt.4.desc:0 "埃及摄政王穆罕默德·阿卜杜勒·穆奈姆与意大利飞行家、顾问伊塔洛·巴尔博的会晤，虽然细节不明，但现在显露出的迹象表明，巴尔博将在政府中扮演更加举足轻重的角色，这无疑是他目前在开罗决策圈中已有的巨大影响力的进一步扩大，他因被普遍视为罗马安插在埃及的眼线而声名显赫。\n\n本报告建议意大利当局进一步赋权巴尔博，允许他在国家内部采取稳定措施，并将大部分责任委托给他。作者还指出，此举可能会让巴尔博获得对埃及委员会的空前控制权，但在动荡时期，这或许不可避免。一如既往，最终的决定权，依旧掌握在意大利殖民事务委员会的手中，他们将权衡利弊，作出明智选择。"
 empiremanagement_egypt.4.a:0 "无需给他更多，他已拥有足够的权力。"
 empiremanagement_egypt.4.b:0 "把一部分重担交给他，他或许能帮我们的忙。"
 empiremanagement_egypt.4.c:0 "将重任托付给巴尔博，他会处理好的！"
 empiremanagement_egypt.4.d:0 "让巴尔博掌管一切！"
 empiremanagement_egypt.5.t:0 "总统公报"
 empiremanagement_egypt.5.desc:0 "萨达特总统在信中写道：“……虽然埃及共和国的成立暂时遏制了叛乱，但若无意大利的进一步援助，局面仍难以为继。故此，我们恳求贵国以武器与资金相助……”\n\n我们当初投票赞成建立一个共和国时，并未奢望问题能迎刃而解。但我们原本预期，在无需更多援助的情况下，形势应会逐渐好转。然而，预算的枷锁束缚了我们的手脚，向埃及政府伸出援手可能会分散对其他急需项目的投入。此外，这援助之声之下，或许隐藏着为私利而筹款的图谋。\n\n尽管这些忧虑合情合理，且萨达特总统对局势的洞察远胜于我们，他所言的困境可能并非夸大。若无此援助，埃及政府未来可能轰然倒塌，连带我们的投资与利益也将付诸东流。虽然部分资金可能流向……非必要的项目，但有时候，两害相权取其轻，谨慎行事方为上策。"
 empiremanagement_egypt.5.a:0 "我们现在没工夫帮忙。"
 empiremanagement_egypt.5.b:0 "送出一些武器，我们的预算承受不了更多了。"
 empiremanagement_egypt.5.c:0 "派送一些武器和一些资金援助。"
 empiremanagement_egypt.5.d:0 "必须纠正这一局势，意大利将尽所有之能采取行动。"
 empiremanagement_egypt.6.t:0 "毁灭之路"
 empiremanagement_egypt.6.desc:0 "埃及境内，游击队的肆虐已成心腹大患，尼罗河三角洲核心区域亦未能幸免，地下组织在此横行无忌，我们的工业心脏频遭打击，资源仓库屡受侵扰，而他们与守军的冲突更是连绵不绝。在这众多乱党中，贾迈勒·阿卜杜勒·纳赛尔的社会主义革命军尤为嚣张，他们在亚历山大港肆意活动。在某个平静的夜晚，一家主要的纺织厂不幸成为了爆炸陷阱的目标。幸运的是，厂区内空无一人，因此没有造成任何伤亡，地区的稳定也因此得以维持。\n\n然而，这一现状对地区工业造成了毁灭性的打击，当地失业人数激增，令埃及本就风雨飘摇的经济更是举步维艰。报告提议意大利当局审慎考虑，可能需要增加对埃及政府的财政支援，并在该地区增兵维稳，尽管最终决策需视接收报告者之判断而定。"
 empiremanagement_egypt.6.a:0 "埃及自能平定小敌，无须多助。"
 empiremanagement_egypt.6.b:0 "再给他们汇些钱，别的就不用了。"
 empiremanagement_egypt.6.c:0 "给他们送去资金和人力，他们用得上。"
 empiremanagement_egypt.6.d:0 "派遣坦克和装甲车过去。"
 empiremanagement_egypt.7.t:0 "一个明智的投资"
 empiremanagement_egypt.7.desc:0 "产自埃及的棉花在工厂里被加工，变成了精致的西装、连衣裙和长裤。\n\n一位女士在面粉飞扬中揉面制饼，她的案板上撒满了埃及小麦的粉末碎屑。\n\n威尼斯的珠宝店内，手镯、手表和耳环熠熠生辉，这些金饰皆源自苏丹金矿的璀璨。\n\n我们在埃及的投资已硕果累累，财源滚滚，化作金银财宝，源源不绝地流入意大利。只要我们持续助力埃及的发展，这互利共赢的局面便将如同长青之树，永续不断。"
 empiremanagement_egypt.8.t:0 "现状报告：穆斯林兄弟会"
 empiremanagement_egypt.8.desc:0 "穆斯林兄弟会的活跃度较去年剧减，降幅高达75%。这归功于我们对埃及军警的武装支援，以及军事情报局的深入行动，我们已在埃及各地一举捣毁了逾250个兄弟会的据点。目前，调查仍在紧锣密鼓地进行，旨在追查关键领导人的行踪和任何残存的据点。我们最好在继续向埃及军队提供必要的物资支持的同时，筹划特工们的有序撤离。穆斯林兄弟会的威胁已被基本遏制，再投入大量资源去追剿零星的残余势力显得过于浪费。现在，我们应以静制动，观察形势的进一步发展，再见机行事。"
 empiremanagement_egypt.9.t:0 "健康发展"
 empiremanagement_egypt.9.desc:0 "自法鲁克国王离世，埃及便陷入了风雨飘摇之中。新政府力图拨乱反正，却举步维艰。法鲁克留下的经济黑洞，部分归咎于其挥金如土的生活方式和穷奢极侈的宴会，仅靠削减开支难以填补财政缺口。\n\n国家百废待兴，街道亟需重建，企业嗷嗷待哺，民众期盼减轻税负以提振购买力，但恢复民众的些许日常生活就已经夺走了我们的大幅预算。\n\n在这危急存亡之秋，意大利伸出援手，向埃及提供财政援助，为埃及的经济复苏注入了强心剂。如今，埃及国库渐现盈余，法鲁克的负面影响也在慢慢消散，埃及终于迎来了一线生机。"
 empiremanagement_egypt.10.t:0 "尼罗河染红"
 empiremanagement_egypt.10.d:0 "撰写此文件之际，埃及政府军已几近崩溃。叛军和分离势力正在侵占越来越多的土地，剩余的守军非撤退便即遭摧毁。政府要员据信不是已死就是被捕，开罗的动乱阻断了他们的逃亡之路。那些在别处被捕或逃脱的人，已无足够影响力来维持国家行政，因此，任何恢复控制的希望都已破灭。\n\n报告提议，将该地区及周边部队收拢重整调往边境哨站，以防冲突继续蔓延。我们无奈承认，我们采取的任何试图防止埃及崩溃的努力，都最终导致了它的灭亡。意大利政府现在唯一能做的，就是吸取教训，利用起所剩不多的时间。\n\n同事们的惊慌声在我周围此起彼伏，他们试图挽救那些如流沙逝于指尖的秩序残片。电话铃声自晨起便此起彼伏，但不久就将被切断。若此消息未能传达给接收人，愿他们知道，我已尽我所能。"
 empiremanagement_egypt.10.a:0 "尼罗河将泛起血色波澜，而幸存者将啜饮其毒岸之水。"
 empiremanagement_egypt.11.t:0 "埃及内战"
 empiremanagement_egypt.11.d:0 "埃及已陷入一片火海，这是不争的事实。中央政府的掌控力土崩瓦解，仅在尼罗河畔勉强维持着一小块地区的控制权，在这里苟延残喘。叛军蜂拥而起，国家分崩离析，如同破碎之镜。难民们纷纷涌向地中海，寻找逃生之地。苏伊士运河旁，船员们依稀可闻战火中的枪炮轰鸣。\n\n然而，这场危机仍有转机。我们的支援已经强化了埃及军队，只要再得到更多援助，战争有望迅速平息。埃及政府已许下承诺，将竭尽所能捍卫意大利利益，并已展开收复失地的行动。此刻，我们不可坐失良机，必须在埃及平叛事务中发挥积极作用。"
 empiremanagement_egypt.11.a:0 "至少我们还能挽救一些东西。"
 empiremanagement_egypt.12.t:0 "埃及内战"
 empiremanagement_egypt.12.d:0 "尽管我们竭尽所能，埃及仍旧陷入了内战的漩涡，政府权威土崩瓦解。然而，我们深信我们在埃及的利益稳如磐石，并且通过向政府提供援助，社会秩序将迅速恢复。我们对埃及的承诺，将通过我们派遣的医生、援助工作者以及为平民提供的救援物资，还有为政府提供战争所需的一切支援得到体现。这场战争无疑对所有参与者而言都是一场灾难，但我们对埃及的坚定支持已经尽可能减少了这些损害。现在，我们只能静待这场战火自行熄灭，让时间来平息一切。"
 empiremanagement_egypt.12.a:0 "埃及在等待。"
 empiremanagement_egypt.13.t:0 "空中之王"
 empiremanagement_egypt.13.d:0 "埃及政坛风云突变，著名飞行员伊塔洛·巴尔博，意大利裔政府顾问，已夺取了政府控制权。他曾与摄政王穆奈姆达成合作关系，然时局变迁令他决断采取激烈行动。穆奈姆在开罗的一场不流血政变中被废黜。巴尔博随后通过电视向国民宣告了这一政权更迭的事实，激起了举国上下的复杂情绪。\n\n大家普遍认为，巴尔博将用铁腕之治，力图稳固国家。他在今日的电视讲话中向民众承诺：“在他的领导下，秩序与稳定将重归这片土地”。在另一份声明中，他重申了对意大利及殖民委员会的忠诚，并声称自己只是在采取必要之举。本报告建议，罗马方面应顺应时势，接受并支持巴尔博的执政。并在随后继续密切观察这一事件的发展。"
 empiremanagement_egypt.13.a:0 "就这样吧，巴尔博会维持稳定。"
 empiremanagement_IEA.1.t:0 "总督之陨"
 empiremanagement_IEA.1.desc:0 "东非总督，也就是人尽皆知的阿马迪奥亲王，在多年饱受疾病折磨的岁月之后，终究离世。他的逝世让本就风雨飘摇的殖民地政府失去了中流砥柱，东非局势愈发动荡。殖民地内的党派和游击队趁机加强了活动，使得本已脆弱的守军在这一动荡时期更加难以支撑。\n\n我奉行政部门之命，紧急呈递此请求，恳请意大利殖民事务委员会火速回复。东非亟需意大利的援手，否则其基础设施和领导层恐将遭受灭顶之灾。东非经济大厦将倾，急需意大利资金的强力支撑，同时，新的本土守军亟待派遣。\n\n东非已到了生死存亡的关头，若无即时援助，这片土地恐将不久于人世。"
 empiremanagement_IEA.1.a:0 "他们未免太过小题大做，这种等级的援助我看不需要。"
 empiremanagement_IEA.1.b:0 "略施援手，我们还有诸多事宜亟待解决。"
 empiremanagement_IEA.1.c:0 "把我们能腾出来的支援，全部送往他们那里。"
 empiremanagement_IEA.1.d:0 "把我们所有的资源都给他们，此事十万火急！"
 empiremanagement_IEA.2.t:0 "毁灭之路"
 empiremanagement_IEA.2.desc:0 "自阿马迪奥离世后，非洲之角的游击活动愈发激烈，局势日益严峻。近日，他们将矛头直指殖民地的交通要道，道路、铁路、码头无一幸免。一条被誉为“帝国之路”的重要路段，竟被当地激进分子炸成了废墟。调查人员在现场勘查后推断，爆炸装置按50米间隔精心布置，连环爆炸后留下了一个个深不见底的巨坑。\n\n这场明目张胆的恐怖袭击，使得该路段的运输线被迫中断，且恢复之日遥遥无期，除非有充足的资源投入修复。东非地区本已岌岌可危，现在意大利显然不得不再次出手相助。修复道路虽是燃眉之急，但人们也忧心忡忡，担心叛乱分子会愈发猖獗，变本加厉。\n\n意大利委员会若能雪中送炭，加大对殖民地政府的支援，必将大有裨益。然而，这一举措可能代价昂贵，东非的命运如今悬于一线。"
 empiremanagement_IEA.2.a:0 "他们终将修补一切，而我们亦有满腹烦忧待解。"
 empiremanagement_IEA.2.b:0 "伸出援手，助他们修补那条路，但仅此而已，不再多求。"
 empiremanagement_IEA.2.c:0 "这一幕不可重演。竭尽全力，助他们渡过难关！"
 empiremanagement_IEA.2.d:0 "向非洲之角增派一个师！"
 empiremanagement_IEA.3.t:0 "忘恩负义的家伙"
 empiremanagement_IEA.3.desc:0 "意大利的委员会自称已倾囊相助，但东非的定居者们已对这片承诺给他们的沃土、安全且美丽之地的混乱局势感到厌倦。他们埋怨政府在阿梅代奥离世后未能及时伸出援手，并将家园被游击队蹂躏的结局归咎于罗马的决策者。\n\n这些指责自然是无稽之谈，但如何处理却是个问题。这些殖民地居民显得忘恩负义，对于不忠之人，不应再有恩惠。断绝对葡萄酒、肥料等奢侈品的供应，或许能让他们反省。但此举也可能加剧局势，引发更多无谓的动荡。"
 empiremanagement_IEA.3.a:0 "切断奢侈品，他们得接受教训。"
 empiremanagement_IEA.3.b:0 "减少一些，坏家伙不会有奖赏。"
 empiremanagement_IEA.3.c:0 "照送不误，不要进一步激怒他们了。"
 empiremanagement_IEA.3.d:0 "给他们想要的一切！"
 empiremanagement_IEA.4.t:0 "误伤友军"
 empiremanagement_IEA.4.desc:0 "埃塞俄比亚的山间小路上，士兵们踏着积尘行进。说是行进，实则不过是一群手持武器、疲惫不堪的躯体在踉跄前行。随着这漫长而曲折的一天的推移，军士的呼喊声愈发沙哑。烈日如火，炙烤着他们，将他们包围在酷热之中。恩里科就是其中之一，正如他的战友们所称，他还是个新兵。\n\n恩里科曾被一张在卡拉布里亚小镇骑行时看到的宣传海报所吸引，所以他加入了维和部队。海报上写着：“加入意大利维和部队！去遥远的地方看看，游历帝国！”\n\n然而，恩里科并不喜欢这次冒险。他经常被责骂，被迫做一些令人作呕的清洁工作，最糟糕的是，他必须在凌晨四点起床。如果他早知道自己会陷入这样的境地，他绝不会踏入招募办公室。但现在，他却在埃塞俄比亚的沙漠中跌跌撞撞，试图维护一份根本不存在的和平。\n\n当恩里科沉浸在对人生选择的反思中时，山谷中突然传来一声枪响。他左边的士兵倒地，肚子被子弹击中。一群身穿农民服装的黑人从路旁的山脊冲出。一把干草叉从人群中飞出，刺入了他右边的下士的胸膛。恩里科困惑而迷失，他颤抖着举起步枪，瞄准了攻击者。他的瞄准镜锁定在一个人的头上，他闭上眼睛，深呼吸。\n\n接着是砰、砰、砰的枪声，持续了仿佛数分钟，尖叫声充斥着他的耳朵。他看不见那场混乱，但他知道它正在发生。突然，一把锋利的刀砍在恩里科的肩膀上，他的世界变得一片漆黑。后来的行动报告记录了这次事件：一群当地农民袭击了一个维和巡逻队，造成3名意大利士兵死亡，多人受伤。这一切，真的值得吗？"
 empiremanagement_IEA.4.a:0 "或许是时候斟酌一下我们的选择了。"
 empiremanagement_IEA.4.b:0 "派人去替换他们。"
 empiremanagement_IEA.4.c:0 "补充军队，提升现有任务难度。"
 empiremanagement_IEA.4.d:0 "派遣另一支部队！"
 empiremanagement_IEA.5.t:0 "摩加迪沙之怒"
 empiremanagement_IEA.5.desc:0 "当摩加迪沙的海港迎来朝阳之时，却只见浓烟蔽日，一股不祥之兆笼罩着港口。一夜惊雷，震撼了这片土地，留下的是码头的废墟和遍布的弹坑和水手们错愕的表情。原本昨天还在海面上的军舰与民船，皆已沉入海底，无影无踪。\n\n索马里总督辖区之内，接二连三的报告如雪片般飞向地区主管的案头，最终堆满了总督的办公桌。综合这些报告，结论显而易见：当地游击队在一夜之内发起了大规模行动，破坏了对意大利海军来说至关重要的码头，连带使得港口内的驱逐舰、巡洋舰和战列舰遭受重创。游击队在政府反应过来之前就已消失无踪，案件至今未有突破。这一切清晰地表明，东非局势正以惊人速度恶化，濒临绝境。现已迫切需要本土援助，以免局势一发不可收拾。"
 empiremanagement_IEA.5.a:0 "没那么糟，按既定航线开。"
 empiremanagement_IEA.5.b:0 "帮他们修理，我们需要那些船站。"
 empiremanagement_IEA.5.c:0 "现在就修！"
 empiremanagement_IEA.5.d:0 "立即修复，并加强防御！"
 empiremanagement_IEA.5.d.tt:0 "§G防御工事将被修建在索马里总督区。§!"
 empiremanagement_IEA.6.t:0 "互惠互利"
 empiremanagement_IEA.6.desc:0 "东非近日气象一新。意大利东非总督与当地多个部落和社群的领袖新近的会晤，自阿梅代奥时代落幕以来，首度架起了双方沟通的桥梁。双方幡然醒悟，携手维护秩序胜过无谓之争，遂签订协议，共治共享。\n\n此举印证了意大利在危机中的稳健举措，对殖民地的繁荣发展功不可没。如今，驻军与居民同心协力，抵御游击队，共护家园安宁。虽然紧张气氛尚未完全消散，但历经风雨，终见彩虹，我们的前景正逐渐明朗。"
 empiremanagement_IEA.6.a:0 "也许我们可以休息一会儿。"
 empiremanagement_IEA.6.b:0 "保持现状，至少现在如此。"
 empiremanagement_IEA.6.c:0 "更多的人也无妨。"
 empiremanagement_IEA.6.d:0 "再派一个师增援驻军！"
 empiremanagement_IEA.7.t:0 "旧怨"
 empiremanagement_IEA.7.desc:0 "东非大部分地区的紧张局势有所缓解，但一些地区仍不可避免得有问题。其中之一是我们第二古老的殖民地，厄立特里亚。当地领导人与邻国埃塞俄比亚的不对付，早在我们的靴子踏上非洲前就有了，这可以追溯到几个世纪前。厄立特里亚人在抱怨我们给予埃塞俄比亚人的待遇，称他们过得太好了，“意大利人讨好他们”。可实际上呢，我们并没有偏袒东非的某个民族，对待所有民族都是一致的。\n\n最糟的是，我们自己在东非的定居者也觉得这话有理，认为他们遭受了不公平的对待，其他殖民地的意大利人政策待遇更好。我们不可能单独改善他们的待遇，这只会激怒东非的其他群体。不幸的是，最终解决方案甚至归结于意大利是否从东非撤出军队，让当地人走自己的路。一些人认为这很荒谬的，但军队继续驻扎可能会付出高昂的代价。"
 empiremanagement_IEA.7.a:0 "如果能让他们满意，就把我们的部队撤回来。"
 empiremanagement_IEA.7.b:0 "荒谬，没必要撤军。"
 empiremanagement_IEA.7.c:0 "保留部队，也许我们可以为东非做更多事让所有人满意。"
 empiremanagement_IEA.7.d:0 "保留军队，给厄立特里亚人送去援助物资。"
 empiremanagement_IEA.8.t:0 "非洲之角，阴影无垠"
 empiremanagement_IEA.8.desc:0 "东非地区突遭黑暗笼罩，一切如同晴天霹雳，毫无征兆。电话线路全部失去联系，发出的信息如同石沉大海，当地驻守的部队也没有对通讯做出任何回应。非洲之角众多地区陷入死寂，这往往预示着不祥之兆。\n\n这几个月，殖民地政府犹如风中残烛，阿梅代奥总督的离世更是让这个摇摇欲坠的政权雪上加霜。目前，人们正试图揭开事件的真相，苏丹的部队也已踏上征程。有人揣测，或许是游击队揭竿而起，或许是有狂人篡夺了政权，办公室里的人们对此议论纷纷，莫衷一是。目前，只能与埃塞俄比亚、索马里和厄立特里亚的部分地区保持通讯，而这些地区显然也对所发生的事情一无所知。有一点毋庸置疑，那就是真相一旦水落石出，恐怕难以令人喜闻乐见。"
 empiremanagement_IEA.8.a:0 "纸牌屋塌了。"
 empiremanagement_IEA.9.t:0 "极限"
 empiremanagement_IEA.9.desc:0 "在军士的紧急号令下，士兵们从睡梦中惊醒，许多人惊慌失措到跌下床铺。他们努力适应周围宛如炼狱般的景象。宿舍外，远处火光冲天，映红了亚的斯亚贝巴的夜空。近在咫尺，残酷的战斗在几幢建筑之外激烈进行。他们只有短暂的时间来理清头绪，便被命令拿起武器，立即撤离。\n\n就这样，30名仅穿内衣的士兵，带着迷茫和恐惧，走出了宿舍。他们脑海中闪过一个个疑问：这是实战还是演习？不可能是演习，他们明明是维和部队。许多人怀疑自己是否还记得战斗的技巧，甚至有人考虑逃跑，但现实没有给他们时间沉溺于幻想。山丘那边，传来了战斗的呐喊，不是出于恐惧或绝望，而是战争的呼唤。山丘之后，游击队、叛军、倒戈者组成的队伍正络绎不绝地涌来。\n\n他们本是和平的守护者。\n\n今天，在东非，许多类似的故事走向了悲惨的结局。现在的确凿报道表明，这块殖民地已经陷入了各叛军派系之间的全面内战，这一切归咎于政府自总督阿梅代奥去世后数月来的持续崩溃。当地守军在似乎无穷无尽的敌人面前，拼命抵抗，通讯联络逐一中断。意大利政府无疑会对这一突发事件感到震惊和愤怒，但许多人认为他们难辞其咎。他们未能，有时甚至拒绝采取适当的措施来支持他们的殖民地，如今正是自食其果之时。"
 empiremanagement_IEA.9.a:0 "当尘埃落定，非洲之角恐将陷入自我吞噬的悲剧。"
 empiremanagement_IEA.10.t:0 "东非去殖民化"
 empiremanagement_IEA.10.desc:0 "东非总督在与罗马政府的会晤和沟通中，一直在不断争取解散殖民地的行政架构。我们助力人民自决，赋予他们自治之权，已使他们实质上走向独立，殖民政府渐成过往云烟。于是，总督解散意属东非的提议得到了批准，我们无需再挑起当地民众的不满。\n\n厄立特里亚的前途将由公投决定，随之两大阵营逐渐分明起来：反对分裂者与支持分裂者。双方皆以华丽承诺争取民心，分裂派誓言守护意大利人利益，反分裂派则承诺在议会中争取一席之地。最终，分裂派以微薄优势赢得民心，令反分裂派黯然神伤。"
 empiremanagement_IEA.10.a:0 "也许还有机会和解。"
 empiremanagement_IEA.11.t:0 "东非去殖民化"
 empiremanagement_IEA.11.desc:0 "东非总督在与罗马政府的会晤和沟通中，一直在不断争取解散殖民地的行政架构。我们助力人民自决，赋予他们自治之权，已使他们实质上走向独立，殖民政府渐成过往云烟。于是，总督解散意属东非的提议得到了批准，我们无需再挑起当地民众的不满。\n\n然而，在厄立特里亚，我们已同意通过公投来决定其未来。在一场充斥暴力的激烈竞争中，厄立特里亚以微弱的优势选择留在意大利。这一决定在民众中，尤其是当地土著中，引发了激烈的讨论，但政府已计划将厄立特里亚纳入意大利的版图。虽然我们将怀念其他前殖民地，但我们期望在将来能与它们和解。"
 empiremanagement_IEA.11.a:0 "这样再好不过了。"
 empiremanagement_IEA.12.t:0 "合并东非"
 empiremanagement_IEA.12.desc:0 "斯科尔扎领袖在新闻声明中宣布，东非殖民地的行政机构，历经25年的统治，现将画上句点，东非将直接纳入意大利的怀抱。这一出人意料的宣告，让世界各地为之侧目，毕竟这片土地曾长期饱受战乱之苦。总督阿马迪奥亲王的离世，一度让殖民地秩序大乱，但意大利通过不懈努力维持稳定，抵御游击队的侵扰，终于为这片宝贵之地觅得一时安宁。\n\n东非的土地蕴藏着丰富的矿产资源、渔业资源，土壤肥沃，如今正待意大利开发利用，当地已有公司因此赚得盆满钵满。亚的斯亚贝巴的殖民地行政机构将彻底解散，非洲之角将被纳入意大利的行政版图，与利比亚一样。许多人将这一壮举视为奇迹，意大利完成了60多年前的宏图大业。虽然未来仍旧充满变数，但无疑，这片土地将给意大利带来滚滚财源。"
 empiremanagement_IEA.12.a:0 "号角之地已被驯服！"
 empiremanagement_IME.1.t:0 "达拉·基耶萨要更多人"
 empiremanagement_IME.1.desc:0 "东地中海总督达拉·基耶萨已正式提出增援请求，希望意大利派遣更多部队加强其守备力量。他以叛乱四起、贸易安全堪忧、土耳其边境巡逻频繁为由，强调意大利的支持对帝国的稳定至关重要。\n\n进一步深入东地中海，无疑将巩固我们在该地区的控制与权威，尤其是在与土耳其政府的较量中，随着双方关系的恶化，土耳其的侵略性愈发明显。然而，将兵力投入东地中海，势必会限制帝国政策的灵活性。帝国的安宁，依旧紧握于领袖之手，安然如常。"
 empiremanagement_IME.1.a:0 "基耶萨最不需要的就是更多的部队。"
 empiremanagement_IME.1.b:0 "给点象征性的士兵就够了。"
 empiremanagement_IME.1.c:0 "再小心也不为过。"
 empiremanagement_IME.1.d:0 "就让我们教会土耳其人，什么是三思而后行。"
 empiremanagement_IME.2.t:0 "达拉·基耶萨请求紧急权力"
 empiremanagement_IME.2.desc:0 "意大利中东地区，宛若一个种族宗教纷争的火药桶，三大宗教势力和武装民兵之间的平衡，如同摇摇欲坠的纸牌屋。\n\n随着地区紧张局势的不断升温，总督达拉·基耶萨向意大利政府请求了紧急权力，以维护和平，包括快速审判和出台法令的权力。\n\n若非达拉·基耶萨这样一位以和平调解著称、不愿轻易动用强硬手段的将领提出请求，这样的请求或许会令人警觉。然而，连他都提出需要紧急权力，足以说明该地区的局势已到了刻不容缓的紧急关头……"
 empiremanagement_IME.2.a:0 "我们应该避免自己成为暴君。"
 empiremanagement_IME.2.b:0 "一点专制不会伤害任何人。"
 empiremanagement_IME.2.c:0 "权力越大，越稳定。"
 empiremanagement_IME.2.d:0 "任何预防措施都不为过。"
 empiremanagement_IME.3.t:0 "黎凡特骚乱"
 empiremanagement_IME.3.desc:0 "在最好的时代，圣地也不见平静，更不必说如今一点也不好。近几个月来，犹太准军事组织与阿拉伯民族主义者之间的暴力冲突愈演愈烈，暴力事件的数量呈上升趋势。不仅是当地居民间大打出手，更与我们的驻军起冲突。驻军只得竭力维和。\n\n总督领政府压力越来越大，已向本土提出支援请求，以控制局势。我们必须立刻采取行动纠乱拨错，在事态失控前恢复秩序。"
 empiremanagement_IME.3.a:0 "他们自己可以处理。"
 empiremanagement_IME.3.b:0 "总督领可以得到一点支持。"
 empiremanagement_IME.3.c:0 "我们有义务保卫帝国。"
 empiremanagement_IME.3.d:0 "所有东西、人力通通送过去！"
 empiremanagement_IME.4.t:0 "圣地的恐怖活动"
 empiremanagement_IME.4.desc:0 "手，颤抖着。\n\n电线，翻了又折。\n\n钟，上三圈后松开了。\n\n滴答的钟声在空气里跳动，在耳中、在心内跳动。无处不在，看不见，尝不到，却如宁静的晨曦般永恒。滴答现在很快，让人害怕。它太快了，太快了，太不稳定了，在错误的方向扭曲得可怕。\n\n时钟停不下来。它不想停。它要结束滴答，折磨人的、尖锐的滴嗒就此终结。上天的荣耀牵引着局势急剧恶化。\n\n滴答…滴答…滴答…\n\n爆炸震动总督府，尖叫、喊叫此起彼伏。达拉·基耶萨很幸运逃过一劫，但还是吓坏了。恐怖笼罩了黎凡特，而且会愈来愈恐怖。"
 empiremanagement_IME.4.a:0 "一次爆炸没什么好担心的。"
 empiremanagement_IME.4.b:0 "演一场戏，让忧愁随风去。"
 empiremanagement_IME.4.c:0 "我们就该把军队派过去。"
 empiremanagement_IME.4.d:0 "帝国岌岌可危！"
 empiremanagement_IME.5.t:0 "徒劳之举"
 empiremanagement_IME.5.desc:0 "数月来，我们竭力稳固意大利在黎凡特的阵脚。然而，无论是金银开道还是枪炮相加，圣地的殖民地稳定之梦似乎已非力所能及。\n\n达拉·基耶萨总督府邸遇袭之后，其通信尽是无奈之声。总督自称仍将坚守岗位，然我们内线却透露，一旦总督府崩解，他已有后手以保其性命无忧。他们还提到耶路撒冷街头，依旧人潮涌动，却也是阴谋诡计满布，信使们穿梭其间。领袖面临抉择：面对徒劳，意大利又该何去何从？"
 empiremanagement_IME.5.a:0 "就让命运的纸牌随意飘落吧。"
 empiremanagement_IME.5.b:0 "他们所求之财，悉数奉上。为了守护和平，我们不惜一切代价。"
 empiremanagement_IME.5.c:0 "为了秩序的维系，难免要洒下热血。"
 empiremanagement_IME.5.d:0 "黎凡特，终将恢复安宁。"
 empiremanagement_IME.6.t:0 "黎凡特政变"
 empiremanagement_IME.6.desc:0 "一名女童穿梭在耶路撒冷街巷，灵巧绕过熙攘人群。她为父传递情报已有时日，虽年幼却成最可靠信使。意军从未拦查——每当盘问，那双澄澈笑眼便是通行证。此刻掌中紧攥的密文，记载着政变详情：枪械数目、弹药储备、人员配置、待分发的里拉钱袋。当她抵达父亲告知的那栋房屋，按他所教方式叩门后，迎接她的男子费尽口舌才说服她松手交出密信。松开纸片时，她看见掌心已被指甲掐出深痕。\n\n意属黎凡特总督府经年维稳，力求撤军符合罗马利益。政变者深谙：圣城非可交易的家传首饰，唯凭胆略、筹谋与流血方能夺取。\n\n此乃唯一通途。"
 empiremanagement_IME.7.t:0 "黎凡特的命运"
 empiremanagement_IME.7.desc:0 "卡洛·阿尔贝托·达拉·基耶萨总督精疲力竭。他将额头深埋办公桌，四周散落着文件、信封与空咖啡杯。凭借数周如履薄冰的谈判与各方势力制衡，终促成意大利有序撤离黎凡特。万事俱备。阖目小憩间，晨光已漫过圣城耶路撒冷。\n\n达拉·基耶萨直起身，唤醒邻室酣睡的幕僚。最终抉择时刻来临：为维稳，他曾向阿拉伯人与犹太人许下无数承诺——保障双方权益的新生国度。然如所有殖民官僚，谎言终需兑现。两位候选人中，必择其一加冕，叛弃另一。\n\n约旦候选人侯赛因·本·塔拉勒，这位哈希姆亲王作为意大利在约旦的代理人，既与罗马合作，又在黎凡特编织效忠网络。犹太候选人伊斯雷尔·加利利，则率哈加纳组织构建影子政权，承诺成为意大利坚定盟友以维区域稳定。\n\n不祥预感令总督不安：无论选择何人，遭弃者岂会容忍意大利的背叛？"
 empiremanagement_IME.7.a:0 "侯赛因·本·塔拉勒应当加冕黎凡特国王"
 empiremanagement_IME.7.b:0 "以色列·加利利应去领导犹太之国"
 empiremanagement_IRQ.1.t:0 "霍梅尼的一封信"
 empiremanagement_IRQ.1.desc:0 "“致领袖亲启。”\n\n每日清晨，齐亚诺案头总堆满信件。西西里农民陈情治国方略者有之，政府官员催签法案者亦有之。然今日这封印有伊拉克达瓦党徽记的信函却显特殊。齐亚诺好奇拆封展读：\n\n“尊敬的领袖：\n\n谨以此函致谢意大利帝国与卑微的什叶派伊斯兰教派间温暖情谊。贵党与吾辈信仰多有共通，此乃联通伊拉克子民与意大利恩主之纽带。贵国于伊斯兰世界之影响力，尤助什叶派在中东声威日隆。达瓦党深感荣幸，得蒙阁下庇佑吾辈志业。祈愿两党情谊永固。\n\n愿安拉庇佑阁下。\n\n鲁霍拉·霍梅尼\n达瓦党成员”"
 empiremanagement_IRQ.2.t:0 "鸿门宴"
 empiremanagement_IRQ.2.desc:0 "真是一座令人叹为观止的大厅，三盏金碧辉煌的吊灯从天而降，一张雕刻精细的长桌横贯整个大厅，桌上银器熠熠生辉，每张椅子后都侍立着一位周到的管家，为宾客的到来做着精心准备。意大利外交官们对这排场所深深震撼。\n\n他们当然不是仅仅为了享受一顿美酒佳肴而被邀请至此，他们来此自有其缘由。卡西姆有重大消息要宣布，足以为此举办一场盛大的宴会。夜幕降临，宾客尽欢之际，几位意大利政府成员被悄然邀请至一间私密的房间。\n\n“就是现在。”他们心中暗想。他们将得知为何被邀请至此豪华宴会的秘密。房门轻掩，众人围坐在简朴的桌旁，卡西姆便直入正题。\n\n“各位先生，或许你们已经听说，我国目前正面临政治上的动荡。因此，我需要更多的资金来稳定局面，这可能会导致国内石油产业的收入有所下降。我就说到这里，希望你们能继续享受今晚的宴会。”\n\n卡西姆言毕，便起身告辞，留下在场的成员们对这个突然的消息感到困惑，却无言以对。他们心知肚明，伊拉克一旦崩溃，石油供应将完全中断，这是任何理智的意大利人都不愿看到的局面。于是，他们只得重返主厅，继续宴会，但心中却笼罩着对未来的忧虑。"
 empiremanagement_IRQ.3.t:0 "黑金"
 empiremanagement_IRQ.3.desc:0 "伊拉克油田的投资正为意大利带来稳定的收益，数百万的里拉正回流至政府的金库。即便官员们中饱私囊，从丰厚的利润中分一杯羹，剩余的收益仍旧丰厚。钱财的些许流失，又有何妨？那些“贿赂”、“回扣”、“敲诈”之类的小动作，谁又会放在心上？只要石油这黑色的金子继续流淌，里拉也随之滚滚而来，我们就心满意足了。我们的利益得到了保障，局势也显得稳定。"
 empiremanagement_IRQ.4.t:0 "伊拉克破坏事件"
 empiremanagement_IRQ.4.desc:0 "基尔库克-海法输油管道已运行逾二十载，将伊拉克北部原油输送至地中海沿岸炼油厂，再转运至意大利及海外市场。二战前、战时与战后，此管道屡成破坏目标。\n\n最新袭击由疑似复兴党恐怖分子实施——此为系列破坏行动中的最新尝试，且已告成功。报告显示，提尔比勒附近管道线路发生大规模爆炸，导致原油泄漏并引发大火。管道需数周方能恢复运作。\n\n伊拉克地方安全部队已承诺追缉袭击者。然鉴于其过往追查成效不彰，且队伍中或潜藏复兴党同情者，我方很可能需要增强安保——此举将增加在伊运营成本。另一选项为接管调查，联合当地部队与意大利驻军封锁区域直至擒获元凶。此方案虽更有效，但需向该地区增调物资补给。"
 empiremanagement_IRQ.4.a:0 "放任伊拉克人处理，全面强化设施安保。"
 empiremanagement_IRQ.4.b:0 "设立警戒线，给我找到这帮恐怖分子！"
 empiremanagement_IRQ.5.t:0 "美好的晚宴"
 empiremanagement_IRQ.5.desc:0 "伊拉克沦为权力争夺的战场已有数年，各政党皆在竞逐控制权，意图按自身愿景重塑国家。其中一派系名为“七月十四日运动”——该组织由学生、自由主义者与改革者构成，倡导在伊拉克实现民主与自由，其领袖阿卜杜勒·拉赫曼·巴扎兹乃是颇具影响力的演说家。\n\n近期，巴扎兹向理念相近的意大利团体提供多笔巨额捐赠，意大利上流社会因此邀其出席数场奢华宴会，既为探讨政策，亦为增进了解。\n\n巴扎兹把握此机遇，现于意大利高层社会结交权贵，此举使七月十四日运动的影响力扩展至意大利、伊拉克与国际舞台。此事是否利大于弊尚待观察，然额外资金终是利好的。"
 empiremanagement_IRQ.6.t:0 "资金流动"
 empiremanagement_IRQ.6.desc:0 "伊拉克沙漠蕴藏海量石油，使其成为外国势力渗透的温床。这片土地曾数易其主，意大利帝国现为其掌控者。我们虽提供各类经济惠益助其发展，然而这并非无偿，伊拉克现已深陷对我方的债务泥潭。\n\n所幸该国石油资源蕴含巨大收益潜力，可催生新资金流。数月前南部新油田启动建设，虽因与意大利政府的资金谈判而初期延误，现预计本周竣工。\n\n新油田毗邻巴士拉市，将激活该地区石油产业，成为新财源。待资金到位后，收益将汇入意大利国库。"
 empiremanagement_IRQ.7.t:0 "意央行举措引发伊拉克全国抗议"
 empiremanagement_IRQ.7.desc:0 "自战争结束以来持续紧张的意伊关系，今日似已跌至冰点。意大利央行近期提高多项伊拉克贷款利率的常规决策——看似无关痛痒——竟完成数十年外交未能达成之事：令伊拉克人团结对抗共同敌人。\n\n自由派、社会党人与复兴党成员罕见联合，发起抗议浪潮谴责意方“国家劫掠”，全国伊玛目更援引《古兰经》谴责高利贷之恶。伊拉克政府应对迟缓，观察者栩栩如生地描绘央行行长圭多·卡利的人像遭焚烧，而警方冷眼旁观。\n\n显然我们触及了伊拉克人痛处。数位专家已恳请立即终止加息以挽救关系。然而恼怒的意大利央行坚称，此举对国民经济不可或缺，并呼吁我们勿向\"暴民\"屈服。他们强调依据贷款条款此举完全合法，无论伊方是否情愿皆需偿付。"
 empiremanagement_IRQ.7.a:0 "撤销加息。我方善意远胜几枚第纳尔。"
 empiremanagement_IRQ.7.b:0 "意大利不为恫吓所动。加息照旧。"
 empiremanagement_IRQ.8.t:0 "局势恶化"
 empiremanagement_IRQ.8.desc:0 "伊拉克总统惨遭暗杀，已经逝世。虽然我们与卡塞姆的关系从未尽善尽美，但他的去世却导致了国家陷入混乱。如今，动乱如同野火燎原，骚乱蔓延至各大城市心脏地带。\n\n考虑到意大利公民的安全问题，针对显要人士与平民承包商的紧急疏散已在进行。如果将这一行动扩展到所有非必要人员的撤离，势必耗费巨资，但同时可以减轻我们安全部队的压力。此外，如果情况进一步恶化，这将有助于简化从殖民地的撤离工作。\n另一方面，我们也可以考虑扩充安全部队，以保护我们公民的安全并帮助维护秩序，尽管这可能会增加我们在这段动荡时期的存在感。"
 empiremanagement_IRQ.8.a:0 "我们为什么要关心伊拉克呢？"
 empiremanagement_IRQ.8.b:0 "继续有限撤离"
 empiremanagement_IRQ.8.c:0 "扩大疏散范围，拯救尽可能多的人。"
 empiremanagement_IRQ.8.d:0 "派遣一支完备的安全部队，以确保局势稳定。"
 empiremanagement_IRQ.9.t:0 "恶性循环"
 empiremanagement_IRQ.9.desc:0 "卡塞姆遇刺身亡后，伊拉克局势急转直下，变得难以掌控。七月十四日运动与复兴党等政党，正利用这个机会四处扩张势力，企图控制更多国土。\n\n面对此情此景，巴格达政府请求军事装备，以组建部队平息暴乱和预防可能的叛乱。但在是否向伊拉克提供这些装备的问题上，我们需要三思而后行。或许我们会发现，其他政治力量相比现政府可能更符合我们的立场。又或许，我们可借机让局势进一步恶化，以此为跳板，重新掌控该国。提供装备，无疑将巩固与现政府的关系；而按兵不动，虽风险较大，却可能为我们赢得更大的战略利益。\n\n面对这些抉择，我们只需审时度势，做出明智的决策。"
 empiremanagement_IRQ.9.a:0 "蛰伏待命，见机行事。"
 empiremanagement_IRQ.9.b:0 "送出装备。我们承受不起局势接着失控。"
 empiremanagement_IRQ.10.t:0 "采取行动"
 empiremanagement_IRQ.10.desc:0 "随着伊拉克内战愈演愈烈，越来越多的无辜生命不断消逝，石油输送也被迫中断，这令意大利政府倍感焦虑。为了恢复石油供应，政府考虑介入冲突，以期迅速平息战火。然而，这一决策牵一发而动全身，需谨慎权衡，一旦介入，可能激起国际社会的广泛抗议，如果我们支持的一方失败了，还可能在国内引发严重的抗议。\n\n我们面前摆着三条道路。首先，可以派遣顾问和顾问团队，为士兵提供训练，协助制定战略。这样即便我们支持的一方失利，由于我们并未直接参战，损失相对较小。但胜利的希望仍需寄托于他们。其次，我们可以选择更激进的策略，派遣本国军队直接介入，这无疑将大幅提升我们获胜的几率，毕竟我们的精英部队对抗训练不足的伊拉克军队，胜算颇大。然而，一旦事态逆转，我们在国际舞台上和国内的形象将难以挽回。最后，我们也可以按兵不动，静待战局发展，希望我们支持的一方能够赢得胜利。这无疑是一场豪赌，因为我们的石油供应岌岌可危。然而，在某些情况下，保持中立可能是最明智的选择。\n\n无论我们作何选择，影响都将深远。我们的最佳方案是什么？"
 empiremanagement_IRQ.10.a:0 "什么都不做，这是最好的。"
 empiremanagement_IRQ.10.b:0 "部队备好，小伙子们得在中东停会儿了。"
 empiremanagement_ILG.1.t:0 "语言困境"
 empiremanagement_ILG.1.desc:0 "埃梅特与战友莱利奥跋涉在阿尔及利亚正午的灼沙路上。他们奉命侦察周边可能威胁阵地的伊比利亚部队或其他武装分子。坦白说，埃梅特看不出这片灼热地狱比别处有何战略价值，但军令如山。\n\n两人最终撞见几名在烈日下劳作的本地阿尔及利亚人。甫一靠近，埃梅特便觉空气骤然紧绷。双方礼节性问候，却难掩彼此眼底轻蔑。\n\n莱利奥率先开口：“我们在搜查危险分子，可知附近有伊比利亚人出没？”语气冷硬如铁。两名阿尔及利亚人面面相觑，一脸困惑，随后又看向莱利奥。\n\n左侧男子用阿拉伯语反问：“什么？\"莱利奥因对方不通意大利语而烦躁——埃梅特倒觉得这再正常不过。随后半小时充斥着拙劣的手势比划与破碎翻译，徒劳尝试沟通。\n\n“我受够了这破事！”埃梅特终于崩溃嘶吼。阿尔及利亚人似乎视此为侮辱，声调陡然尖厉。当谩骂声浪袭来时，埃梅特脑中某根弦“啪”地断裂：“老子不懂阿拉伯语，混账东西！”死寂笼罩沙丘。在事态恶化前，莱利奥已拽着埃梅特疾退。"
 empiremanagement_ILG.1.a:0 "谁会去关心几个原始部落的人？"
 empiremanagement_ILG.1.b:0 "下次派几个翻译来。"
 empiremanagement_ILG.1.c:0 "也许意大利人该学学阿拉伯语了。"
 empiremanagement_ILG.1.d:0 "增添意大利语课程供本地人学习！"
 empiremanagement_ILG.2.t:0 "黑脚动乱"
 empiremanagement_ILG.2.desc:0 "政府最新头疼事源自突尼斯殖民当局发来的简短电传。这份措辞隐晦的公文含糊其辞地指出，阿尔及利亚殖民机构与当地法语裔黑脚族社区——该群体在沿海都市区占据可观少数比例——的紧张关系骤然升级。\n\n简言之（因电文语焉不详）：阿尔及利亚要港博纳的黑脚族社区请愿要求增加地方政府席位。通常情况下，这本不足为虑，可当地驻军某军官（其姓名可疑地未被提及）认定此举越界，并诉诸武力驱散请愿者。此举自然引发意属阿尔及利亚全境黑脚族群体愤慨。当前，该社区领袖与主要由利比亚行省调任的军事指挥部剑拔弩张——后者惯用高压手段压制土著组织。自不待言，黑脚族拒斥此等行径，迄今以和平示威与小规模骚乱回应，然天晓得何时会有人怒而开火。\n\n我们须清醒地认识到：抗议已非单纯请愿。无论采取何种对策，必将牵动阿尔及利亚全局。法裔群体仍是殖民地重要政治势力，行止务必慎之又慎。"
 empiremanagement_ILG.2.a:0 "亡羊补牢为时不晚，我们还可以达成协议。"
 empiremanagement_ILG.2.b:0 "按照我们给出的条件…僵局可能还会继续。"
 empiremanagement_ILG.2.c:0 "增援驻军，以防万一。"
 empiremanagement_ILG.2.d:0 "我们不会屈服，再派一个师过去！"
 empiremanagement_ILG.3.t:0 "适当回应"
 empiremanagement_ILG.3.desc:0 "对于上尉来说，报告中的情况似乎平平无奇：一群当地人走上街头制造骚乱。他的上级派他去平息骚乱，于是他召集了最好的士兵，前往抗议地点。然而，当他到达现场时，看到的并不是一小群当地人，而是一大群。他们手持旗帜和横幅，正在为意属阿尔及利亚的更多自治权进行抗议。\n\n由于与伊比利亚在该地区的冲突，意大利决定对阿尔及利亚领土实行军事化管理。要求自治的抗议并不罕见，然而，如此规模的抗议还是第一次。当然，抗议不能继续下去，政府体制的突然更迭可能对国家的稳定性造成灾难性的影响，从而危及边境战争的结果。\n\n通常，这些抗议由当地警察处理，他们解决这些问题时动静较小，但可能显得软弱，因此可能会刺激当地人再接再厉。如此规模的抗议可能需要出动军队进行逮捕。这将向其他抗议者传递一个明确的信息，但如果不小心，可能会导致骚乱，甚至流血事件。\n\n决定权在上尉手中。他会联系当地警察局派遣警员来处理抗议，还是派遣自己的士兵？"
 empiremanagement_ILG.3.a:0 "会过去的。"
 empiremanagement_ILG.3.b:0 "让当地警察处理吧。"
 empiremanagement_ILG.3.c:0 "派军队逮捕抗议者。"
 empiremanagement_ILG.3.d:0 "再派一支殖民部队去阿尔及利亚！"
 empiremanagement_ILG.5.t:0 "补给寻踪"
 empiremanagement_ILG.5.desc:0 "布鲁诺的枪卡壳了，成了摆设。\n\n他在阿尔及利亚沙漠中驻守已数月有余，战争的号角终于让他卷入了真枪实弹的较量。尽管他所在部队的装备在总督辖区中难称精良，但对付日常的冲突倒也绰绰有余。然而战争一打响，补给的数量和品质便大打折扣。布鲁诺还算幸运，拿到了一支二战后的新枪，而其他人则只能带着老旧的卡尔卡诺步枪和几匣子弹不足的弹匣，踏上茫茫沙场。\n\n“这破装备真要命。”布鲁诺抱怨着。他最后尝试了一下，但枪栓仍旧卡住不动。无奈之下，他开始在阿尔及利亚的荒地上寻找可以用的武器。\n\n卡斯特拉诺总督近日读到了许多关于意大利-阿尔及利亚常备军装备短缺的报告，士兵们手中的装备问题频发，整个排因缺少基础的通信工具如无线电而陷入困境，弹药稀缺，阿尔及利亚沙漠中除了连绵的沙丘外，几乎看不到其他东西。他多次请求武器、装甲、飞机等物资支援，却只换来利比亚上级含糊的承诺“会提供额外支持”。他深知，若继续这样下去，局势将难以为继：每丢失一支枪，就意味着在抵御不断进逼的伊比利亚军队或反击那些日益增多的匪帮时，力量将减少一分。他尝试向上级陈情，但始终没有效果；他需要另辟蹊径。正当他拨打国家法西斯党高级官员的电话，准备再次陈述困境并请求支援时，电话突然接通了。\n\n“你到底在干什么，卡斯特拉诺？”电话那头传来的是他特别不喜欢的一位上级的声音，“所有往罗马的通信都必须先经过我们。你忘了吗？”总督还没来得及开口，利比亚官员便继续说：“又是那个补给问题？听着，我能告诉你的就是我们已经在处理了。别想绕过我，明白吗？”\n\n卡斯特拉诺只能回答：“明白。”"
 empiremanagement_ILG.5.a: "这将是一个漫长的夜晚……"
 OMA.2.t:0 "深入阿曼"
 OMA.2.d:0 "佐法尔地区，如同一根刺，长期梗在我们的心头，成为叛乱分子和其他起义团体的庇护所，对我们在阿曼的势力构成了严峻挑战。随着也门革命的爆发，这些叛乱分子的行动愈发大胆，对我们的影响力构成了更加严峻的挑战。\n\n我们一直试图压制这些叛乱分子，却因苏丹赛义德·本·泰穆尔的闭关锁国政策而步履维艰。显然，为了维护我们在该地区的利益，必须采取措施更迭他。他的儿子卡布斯，才华横溢且雄心勃勃，如果我们能够巧妙地将他推向权力的宝座，他将全力支持我们铲除叛乱。\n\n我们驻马斯喀特的守军已经密谋了一份政变计划，旨在推翻年迈的苏丹，现在只待行动的东风，以免复兴主义的阴霾再次笼罩另一片土地。"
 OMA.2.a: "下达命令。"
 OMA.3.t:0 "政府更迭"
 OMA.3.d:0 "意大利驻军发动政变，用苏丹的儿子卡布斯取代了苏丹。"
 OMA.3.a: "新苏丹万岁！"
 cropartisans.9.t:0 "风云突变"
 cropartisans.9.d:0 "乌斯塔沙在克罗地亚掀起叛乱之后，那令人不安的平静终于画上了句点。面对我们施加的巨大外交压力，他们仍旧不肯向意大利的霸权低头；我们的外交使者遭到了断然拒绝，外交途径已告断裂。鉴于我们当前的安全形势，此情此景，我们断难接受。为保帝国稳固，克罗地亚新近获得的独立必须被终结。其他选项皆显渺茫，唯有动用军力，方能除此心腹大患。皇家海军总司令部已接到通知，边境线上的全面动员已然展开。\n\n我们的计策直截了当，盼能奏效：我们将利用我们的压倒性优势，突破克罗地亚的防线，占领他们的主要城市，让他们别无选择，只能投降。我们的陆海空三军协同作战，发挥全方位的优势，确保敌人将在意大利铁蹄下迅速崩溃。虽有人忧虑三头同盟的解体会分散军心，但这更可能成为士兵们的战斗号角，激励他们奋勇争先。"
 cropartisans.9.a:0 "意大利再次觉醒。"
