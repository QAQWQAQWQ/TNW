 ITA_pragmatic_trade_policy_desc:0 "我们与世界贸易的一系列政策，都是为了一个目的：国家的利益。无论是谁、以什么方式、身在何处，都要让我们进口的商品以低价购入，出口的东西以溢价出售。意大利在全球市场举足轻重，必须用好这点这点为自己牟利。"
