 ita_porpose_a_grand_tour_desc:0 ""
 ita_keeping_italia_strong:0 "延续意大利荣光"
 ita_keeping_italia_strong_desc:0 "国强须军强，意大利正是这样一个强国。齐亚诺十年之治，毫无建树，现在我们首要之事是将武装力量改革成我们伟大国家的中流砥柱。昔日盟友之欺，伊比利亚与土耳其，今朝不再忍！\n\n无一遗漏，陆海空三军——皇家陆军、海军、空军，皆将装备精良，以确保制胜疆场。改革之后，强敌如德国亦将敬畏我等……"
 ita_our_friends_in_the_regia_marina:0 "皇家海军中的朋友"
 ita_our_friends_in_the_regia_marina_desc:0 "毫无疑问，我们最亲密无间的盟友，非皇家海军莫属：海军军官们，例如昔日战争英雄朱尼奥·瓦莱里奥·博尔盖塞，一直与国家法西斯党心心相印。\n\n为表对他们对法西斯主义事业忠心耿耿的感激，我们将海军视作军事部门中的翘楚，并将分配给它在所有资金和创新中最为充足的预算。"
 ita_a_producerist_navy:0 "七海舰队"
 ita_a_producerist_navy_desc: "直布罗陀海峡的堤坝已固若金汤，地中海已无昔日之忧，苏伊士运河亦在我们严密的掌控之中。如今，我们的视野已远及红海、波斯湾和印度洋。为了守护石油命脉，将力量投射至海外，我们需要一支更为庞大、更为雄壮的海军。\n\n我们的前任英明领袖深知海军之重要，曾下令大幅增加舰船生产，以扩张地中海的势力，最终打破桎梏。我们将继续沿着他的足迹，建造一支威震四方、所向披靡的海军，令德国海军和日本帝国海军在我们面前都感到不寒而栗！"
 ita_the_pride_of_the_seas:0 "海上荣耀"
 ita_the_pride_of_the_seas_desc:0 "在海战领域，我们已取得长足进步，并充分利用这些成果。然而，战列舰依旧稳坐海上霸主之位。利托里奥级战舰作为我们最后一批建造的舰体，虽曾辉煌一时，如今却已落后于时代，尤其在面对现代海军轰炸机时。\n\n我们的新型无畏舰，装备着尖端的大口径火炮，被最坚硬的厚钢甲所覆盖，配备了最先进的防空和反潜武器系统，速度之快，足以与舰队其他舰船并肩作战。它们将激发水手们的敬畏之情，唤起意大利民族的自豪感，令敌人闻风丧胆。"
 ita_gear_up_the_dockyards:0 "整顿造船工业"
 ita_gear_up_the_dockyards_desc:0 "若要壮大我们的舰队，必先筑船坞以备来日：我们的海军设施必须能够同时处理多艘不同规模船只的建造、维修和升级。由于亚特兰特罗帕的灾难让我们的整个海军工业化为乌有，工业复兴公司将承担起一项重大的投资和补贴计划，促使私人企业助力我们新海岸线沿岸的新生产设施之兴建。"
 ITA_gear_up_the_dockyards_1:0 "整顿造船工业"
 ita_gear_up_the_dockyards_1_desc:0 "若要壮大我们的舰队，必先筑船坞以备来日：我们的海军设施必须能够同时处理多艘不同规模船只的建造、维修和升级。由于亚特兰特罗帕的灾难让我们的整个海军工业化为乌有，工业复兴公司将承担起一项重大的投资和补贴计划，促使私人企业助力我们新海岸线沿岸的新生产设施之兴建。"
 ITA_gear_up_the_dockyards_2:0 "整顿造船工业"
 ITA_gear_up_the_dockyards_2_desc:0 "若要壮大我们的舰队，必先筑船坞以备来日：我们的海军设施必须能够同时处理多艘不同规模船只的建造、维修和升级。由于亚特兰特罗帕的灾难让我们的整个海军工业化为乌有，工业复兴公司将承担起一项重大的投资和补贴计划，促使私人企业助力我们新海岸线沿岸的新生产设施之兴建。"
 ITA_twin_armies:0 "两支军队"
 ita_shipbuilding_competitions:0 "造船公司竞标"
 ita_shipbuilding_competitions_desc:0 "意大利造船业源远流长，诸如巴勒莫的亚得里亚海联合造船厂（原址在的里雅斯特，因亚得里亚海变成盐碱荒漠而迁至巴勒莫），以及安萨尔多能源公司和新兴的芬坎蒂尼公司，我们拥有建造先进船只的尖端技术，以及大量技艺精湛的工匠。通过巧妙地运用招标，我们能够激发国营与私营企业之间的良性竞争，这将有助于在提升产品质量的同时，降低成本。\n\n若我察觉到存在任何不正当的勾结，必将严惩不贷……"
 ita_drown_them_in_destroyers:0 "驱逐舰海战术"
 ita_drown_them_in_destroyers_desc:0 "哪怕巨舰如山，一旦遭遇鱼雷和导弹的狂轰滥炸，亦难免沉船之祸。为了护卫我们的战列舰，让它们能在安全距离内横扫敌舰，同时以强悍的近战武器令敌人闻风丧胆，我们必须以驱逐舰的汪洋大海淹没敌军：即便损失了一打，只要我们的战列舰能安然无恙，并且在战斗中能拖上一两艘巡洋舰共赴黄泉，这便是一场划算的战役！"
 ita_cover_them_in_corvettes:0 "护卫屏卫战术"
 ita_cover_them_in_corvettes_desc:0 "护卫舰虽小，却如深藏不露的智者，在精明的舰长指挥下，能发挥出无穷的战术妙用。它们造价低廉、行动迅捷、体态轻盈，可以大量建造，覆盖海面，成为护航贸易、剿灭海盗的利器。\n\n它们装备了轻型高速炮，能够轻易撕裂小型船只，切断敌军补给线；若再配备雷达和防空炮，便能围绕我们的主力舰，构筑起一道移动的防护屏障；而一旦装上小型多导弹系统，即便是装甲最厚的战列舰，也难逃其致命一击！"
 ita_swarm_them_in_subs:0 "潜艇狼群战术"
 ita_swarm_them_in_subs_desc:0 "上次大战中，德国海军给我们上了一课：破坏敌军的贸易线和补给线，其重要性不亚于战场的胜利。潜艇，这种在高科技辅助下才得以现形的隐秘武器，能独自航行数周甚至数月，无需补给，装备着远程鱼雷，是执行此类任务的不二之选：大西洋与太平洋上，英美的船队残骸，便是潜艇威力的最佳证明。\n\n为了弥补与敌对超级大国在工业上的不足，我们计划以狼群战术包围敌人，让海洋成为那些敢于挑战我们海上霸权者的葬身之地。"
 ita_quantity_is_quality:0 "多就是美"
 ita_quantity_is_quality_desc:0 "大规模生产是一股不可小觑的力量。将生产流程简化，资源节约措施最大化，我们得以用等量资源，打造敌军两倍规模的舰队：战列舰再先进，若未及开火便被廉价鱼雷群击沉，又有何益？\n\n恰如罗马军团的铁甲阵，我们的舰船将在战场上相互守望，互为犄角，以众凌寡，以数量之优，令敌人望风披靡。"
 ita_go_even_further_beyond:0 "向更未来展望"
 ita_go_even_further_beyond_desc:0 "舰队核心强化之后，便可着眼于海战之尖端领域。海战中，大舰巨炮若无技术之利，未战先败，难免遭人以巧破千钧。\n\n欲主宰碧波，先进的航空母舰在海军内部不可或缺——鹞鹰级导弹艇旗下的法尔科号已非昔日之雄，与此同时精研航母战术，因为空中优势乃海战胜负之关键。"
 ita_donations_for_carriers:0 "航母国民捐款"
 ita_donations_for_carriers_desc:0 "建造航母对任何国家而言都是一笔沉重的负担。它们体型庞大，超越了战列舰，需要昂贵且先进的装备来保证航空联队的运作和维护。然而，幸运的是，我们从古雅典找到了灵感。\n\n昔日雅典，有“三列舰指挥官”之制，让民间豪绅——“三列舰指挥官”——出资购舰，以己名命之。们将复兴这一传统，引入“航母赞助制”，让公民有机会为建造航母捐赠，哪怕是小额资金，作为回报，他们的名字将被刻在航母的船体上，永铭意大利民族之感激。"
 ita_carrier_plane_priority:0 "舰载飞机优先"
 ita_carrier_plane_priority_desc:0 "航母上的航空联队训练有别于常规，它们担当着特殊的使命：战斗机的任务是守护舰艇抵御敌机侵袭，而非单求夺取制空权；海军轰炸机则要瞄准敌舰的软肋，如装甲薄弱处和弹药库；近海支援则要精准投放特制弹药，为沿海部队提供火力支援。为了最大限度地发挥航母的作用，我们需要为这些航空联队的飞行员制定专门的训练计划。"
 ita_a_donation_from_high_society:0 "来自上流社会的馈赠"
 ita_a_donation_from_high_society_desc:0 "“航母赞助制”成效斐然，众多心怀家国的意大利人纷纷慷慨解囊，助力海洋霸业。出乎意料的是，我们近日收到了来自上层社会自愿组织的一笔巨额捐赠！\n\n来自威尼斯和热那亚的名门望族，诸如多利亚、丹多洛、布拉加丁和文德拉明等航海世家，联袂签署了一份价值连城的支票，助力我们最新航母的建造。为表谢意，我们将下一代首艘航母命名为“勒班陀”，以此纪念那些在抵御异教徒侵略中立下赫赫战功的英勇意大利水手！"
 ita_tour_with_borghese:0 "与博尔盖塞同行"
 ita_tour_with_borghese_desc:0 "为向领袖及意大利民众展示我国海军的威武之师，我们精心策划了一场海军基地的巡礼。卡洛·斯科尔扎将由昔日战争英雄、法西斯的坚定信徒朱尼奥·瓦莱里奥·博尔盖塞亲自迎接，一同踏上环意之旅，检阅新兴的造船厂与我们威武的舰队。\n\n此行必将被精心记录，并通过报纸、广播、电视等媒体传遍全国：如此宣传良机，岂能轻易放过，必将善加利用，以扬我国威。"
 ita_thalassocracy_forever:0 "万年海权"
 ita_thalassocracy_forever_desc:0 "我们矢志不渝，力图在波涛之上重塑霸业，然终成海洋之主。皇家海军在地中海与印度洋上称雄一方，势力横跨罗马至印度。\n\n在战舰巡逻的守望下，贸易繁荣如金河银川，汩汩黑金为其做底，财源滚滚，充盈国库，昔日海洋共和国的辉煌再现，战列舰上的战旗威震四方，从东京至华盛顿无人不知无人不晓。幸蒙海神眷顾，我们的海军定能引领意大利航向光辉灿烂的未来。"
 ita_infantry_queen_of_the_battlefield:0 "步兵，战地女王"
 ita_infantry_queen_of_the_battlefield_desc:0 "上一场战争虽然证明了装甲部队的优势，但岁月如梭，二十年间新战术层出不穷，坦克雄风不再。我国地形多变，对坦克而言，实为天险：阿尔卑斯山至亚平宁山脉，巴尔干至利比亚沙漠，再到埃塞俄比亚的峡谷，皆成坦克难以逾越的天然屏障。\n\n装甲师固然是皇家军队的中坚，但步兵应成为我们改革的重中之重，在未来军队中担纲主角。"
 ita_sideline_the_carabinieri:0 "降格国家宪兵"
 ita_sideline_the_carabinieri_desc:0 "自从斯科尔扎取代了齐亚诺之后，国家宪兵便成了我们的心腹大患。他们对自由改革的倾向，加之德·洛伦佐将军与前领袖的藕断丝连，意味着他们将永远反对斯科尔扎对意大利的合法统治。我们不能坐视一支武装力量与政府为敌的现实，需要审慎而稳妥地将国家宪兵逐步边缘化。\n\n我们不可轻举妄动，以免激起数万精兵的激烈反抗，但我们可逐步削弱其势力，以更忠诚之师取而代之。"
 ita_freeze_funding:0 "冻结资金"
 ita_freeze_funding_desc:0 "为了确保国家宪兵不会对我们的统治构成威胁，首要之计是切断其资金来源。在其他武装力量的预算水涨船高之时，他们的经费却原封不动。此举不仅会让忠于我们的军队力量日渐壮大，还会使他们无力更新装备，新兵入伍的步伐也将随着老兵的退役而减缓。\n\n不出数年，国家宪兵的昔日权势与影响将日渐式微……"
 ita_search_for_corruption_in_the_ranks:0 "清查军中腐败"
 ita_search_for_corruption_in_the_ranks_desc:0 "腐败乃权力之通病，武装力量亦难免俗，国家宪兵亦难独善其身。我们所求，仅是一桩足以启衅的丑闻，借此全面彻查国家宪兵。若能揭露高级军官或德·洛伦佐本人的罪行，便可永绝后患，根除威胁。行动之始，将以“例行公事”之名，行深入剖析之实……"
 ita_dont_find_it_forge_it:0 "没证据？那就造出点证据！"
 ita_dont_find_it_forge_it_desc:0 "初步探查所揭露的情况……远非所望。虽然确有国家宪兵中的一些成员收受了贿赂，但这些主要是低级别人员，仅为了撤销超速罚单或对小过小错视而不见。按常理，一支清廉自守的武装力量本应受人敬仰，然而此情此景却非如此！\n\n常言道，“自作孽，不可活”，我们将亲自布局：潜入国家宪兵之中的黑衫军成员将炮制假文件，指证一些高级宪兵军官将肥约私下授予武器界朋友的亲信的事实，再辅以几名“目击者”和一段似是而非的故事，便能炮制一出精心设计的丑闻……"
 ita_subvert_the_carabinieri:0 "颠覆国家宪兵"
 ita_subvert_the_carabinieri_desc:0 "丑闻渐露，国家宪兵中的许多军官被迫辞职。这显著削弱了德·洛伦佐派系的规模与势力，也给了我们可乘之机：何须硬碰硬，不如和平演变，以忠心之人取而代之，令余下的异己分子日渐孤立，最终无路可走，只得黯然退场。\n\n眼前，我们所求的，乃是一条潜入敌营的妙计……"
 ita_approach_romolo_dalla_chiesa:0 "接触达拉·基耶萨"
 ita_approach_romolo_dalla_chiesa_desc:0 "罗莫洛·达拉·基耶萨，身为意大利黎凡特的总督，国家宪兵的将领，卡洛·阿尔贝托之兄——可谓将门虎子……他比起其他同侪更易于接触，已向我们伸出援手，愿助我们安插人手至国家宪兵的要职。虽然我们对他的策略尚不明了，但知他是某个商业集团的成员，且目前看来，他们的利益与我们的理念不谋而合……"
 ita_bring_in_his_friends:0 "引进他的朋友"
 ita_bring_in_his_friends_desc:0 "罗莫洛·达拉·基耶萨将军为我们引荐了国家宪兵中的一些低级军官，这些军官隶属于他的协会，有意让他们取代德·洛伦佐的几位心腹。他所求的仅是一个名正言顺的借口，他将声称自己亲眼目睹了这些人在暗中企图让齐亚诺东山再起的图谋，这便给了我们将德·洛伦佐及其支持者一网打尽的正当理由。\n\n此举虽有几分冒险，然而，让齐亚诺的死忠掌管着军队的力量，比起罗莫洛背后所代表的势力，其威胁要大得多。因为可以肯定的是，他们的信仰绝非法西斯主义……"
 ita_a_donation_of_army_grade_equipment:0 "一批捐赠军用装备"
 ita_a_donation_of_army_grade_equipment_desc:0 "一些自诩为“达拉·基耶萨将军之友”的富商，向国家宪兵捐赠了一批军用级装备。这一慷慨之举不仅揭示了罗莫洛背后势力的庞大，更为我们忠诚的部队在与德·洛伦佐支持者的较量中，提供了战术上的制胜法宝。\n\n那些装备了过时武器的叛匪，在面对装备精良且忠心耿耿的同僚时，必将在再次挑战我们之前，深思熟虑，权衡利弊……"
 ita_the_carabinieri_on_our_side:0 "国家宪兵已于我手"
 ita_the_carabinieri_on_our_side_desc:0 "国家宪兵中的高层军官，多数是黑衫军成员或达拉·基耶萨将军的盟友，加之新招募的士兵们对法西斯主义忠心耿耿，现在国家宪兵已不再是我们的威胁。虽然因风险过大，德·洛伦佐未被撤换，然而他和其追随者已被边缘化，其影响力已作泡影……"
 ita_expand_blackshirt_divisions:0 "扩编黑衫军师"
 ita_expand_blackshirt_divisions_desc:0 "近期调查表明，部分高级将领对新领袖的忠诚之心……难辨真伪。他们虽未对我们显露敌意，亦无叛国之嫌，但我们仍需保持警惕……\n\n相比之下，黑衫军则深得我们信赖。如今，正当其时，将法西斯革命行动由准军事政治组织转型为正规军事力量，正如德国人用党卫队取代冲锋队的做法。与此同时，我们将确保黑衫军的忠贞，不致步入党卫队暗中作祟的后尘……"
 ita_take_the_best_graduates:0 "择优录取"
 ita_take_the_best_graduates_desc:0 "黑衫军，昔日纪律稍弛的准军事力量，但他们的行列中包括了大战中阿尔迪蒂精英突击队的老兵，黑衫即源自他们的制服。\n\n我们须继承这份荣耀，将黑衫军锻造成一支训练有素、纪律严明的专业之师。首要之举，便是从摩德纳军事学院——陆军的摇篮——挑选最杰出、最具政治慧眼的毕业生，组建正规的军官团。"
 ita_take_the_loyal:0 "选择忠诚派"
 ita_take_the_loyal_desc:0 "我们已经建立起了一个稳固的军官团，确保部队受训成正规之师，而非狂热之徒。我们的目标是招募既忠诚又能干的人才，此乃——稀奇之事——难得之品质……\n\n为此，我们将安排一些新晋的黑衫军军官巡视兵营，甄选训练场上出类拔萃，且心系法西斯主义之士兵，诚邀其加入黑衫军，共铸辉煌。"
 ita_blackshirt_paratroopers:0 "黑衫军伞兵部队"
 ita_blackshirt_paratroopers_desc:0 "伞兵，军中之精英，历来与皇家空军紧密相连。想当初，构想“空降步兵”的，不是别人，正是法西斯主义的高层伊塔洛·巴尔博：此足以作为在黑衫军中成立特种空降部队的正当理由。此举不仅增强了军队的战术灵活性，更将成为激励全意大利人民的敬畏之源。皇家空军也许会对我们取其瑰宝而心存芥蒂，然为国之大计，此险值得一冒……"
 ita_blackshirt_polices_blackshirt:0 "黑衫军自治"
 ita_blackshirt_polices_blackshirt_desc:0 "国家宪兵因其地位被黑衫军取代而心生不满，进而利用其司法警察的辅助职能对黑衫军进行调查，以图报复。\n\n为此，我们需确保黑衫军独立于其他军种之外，自成一格：自此，黑衫军唯我独尊，自行裁决！"
 ita_transfer_the_bersaglieri:0 "转移神射旅"
 ita_transfer_the_bersaglieri_desc:0 "贝尔萨列里作为一支轻装机动的精锐步兵部队，乃意大利皇家军队的中坚力量。故此，将其纳入黑衫军麾下，既能增强其战术灵活性，亦能壮大军力。一些军官已对此举表示赞同，余下的要么顺应，要么便只能引退。\n\n况且，他们身佩黑羽，不啻半步法西斯，岂不妙哉？"
 ita_equal_to_the_army:0 "军中平等"
 ita_equal_to_the_army_desc:0 "改革一新，黑衫军已蜕变为一支装备精良、训练有素的军事精英，与正规军在力量和勇气上并驾齐驱。\n\n相较于意大利皇家军队的庞大规模，黑衫军人数尚显寥寥，但这支忠心耿耿、技艺精湛的精兵，完全听命于我们，其威力不容小觑：德国人的前车之鉴便是明证……"
 ita_the_elite_of_fascist_heroism:0 "法西斯主义英雄"
 ita_the_elite_of_fascist_heroism_desc:0 "意大利皇家军队麾下有众多特种部队。这些勇士以身作则，展现了对国家的赤胆忠心和面对强敌的英勇无畏，他们的奉献精神将被永志不忘。\n\n即便我们有意壮大黑衫军，常规军队亦需保持其特种部队的雄厚实力、精良装备与严格训练：为此，我们将增拨资金，以迎新兵之血，和装备的现代化升级！"
 ita_a_happy_xmas:0 "愉悦的第十突击艇队"
 ita_a_happy_xmas_desc:0 "第十MAS机动艇队，继承了昔日大战中驾驭“Maiali”鱼雷快艇、击沉敌舰的英雄们的遗志，如今已转型为装备尖端、训练严苛的两栖精兵，由陆海军联合指挥。\n\n其中，战争英雄、我们最坚定的支持者朱尼奥·瓦莱里奥·博尔盖塞亦在其列。增拨他们的经费，不仅能提升他们的战斗力，又能加深博尔盖塞对领袖的忠心，忠诚之士乃军中瑰宝：一箭双雕！意大利海军陆战队XMAS，因博尔盖塞而备受尊崇，适当投入便能稳固其对我们的忠诚，确保其成为我们可靠的支持力量。"
 ita_funding_the_arditi:0 "资助阿尔卑斯军团"
 ita_funding_the_arditi_desc:0 "自古以来，阿尔卑斯山脉便是意大利的天然屏障，如同铜墙铁壁，抵御着外来的侵扰。它曾在第二次布匿战争中令汉尼拔的大军折戟沉沙，近代又在战火中护佑米兰免受奥地利的铁蹄，如今依旧是装甲洪流难以逾越的天险。\n\n阿尔卑斯山地部队，如同守护神一般，守卫着这自然的要塞，使得敌人从未能够染指波河平原。他们将得到充分的资金，以保证每一座山峰都设有警戒的哨兵，每一条山道都设有坚不可摧的防线。阿尔卑斯山，意大利的王冠之珠，坚城巨壁：山兵在，敌莫敢前！"
 ita_the_spettro_program:0 "“幽灵”计划"
 ita_the_spettro_program_desc:0 "“特种部队”曾是应对“复杂地形”的代名词。然而二十年来，恐怖阴云与叛乱的烽火遍布，这一概念已经改变，“特种作战”的真正挑战在于目标而非地形：破坏、绑架、暗杀等，正是这些新成立的“特种作战部队”所要承担的任务。\n\n这些部队将成为精英中的佼佼者。他们将如影随形，穿梭战场，令敌心生畏惧，希望破灭。他们将在敌人梦魇之中追逐目标……宛若暗夜幽灵，悄无声息。"
 ita_outside_the_military_law:0 "忽视军法"
 ita_outside_the_military_law_desc:0 "“幽灵”之存在之义，本就是游走于法律边缘，行非常之事。特种作战部队执行任务时，或许将触及禁忌，包括在必要时对涉嫌叛国、恐怖主义或其他危害国家利益的同胞采取非常措施。因此，“幽灵”将不受任何司法束缚，无论是民间法庭还是军法审判。唯有总参谋部能对其行动进行裁决，监督他们是否越俎代庖。"
 ita_immune_from_the_carabinieri:0 "免受国家宪兵干预"
 ita_immune_from_the_carabinieri_desc:0 "作为削弱国家宪兵影响力的一部分，“幽灵”将独立于其审查之外，不受其控制。虽然特种部队超然于司法之外，这本应天经地义之事，然而德·洛伦佐固执己见，非要一纸明文法令，确立“幽灵”的免责权不可。得让他彻底死心……"
 ita_the_best_of_the_blackshirts:0 "黑衫军之精华"
 ita_the_best_of_the_blackshirts_desc:0 "黑衫军既已成为我们正规军的一员，那么从这些忠诚的士兵中挑选“幽灵”成员，可谓水到渠成：他们对领袖忠心耿耿，对法西斯信仰坚贞不渝，我们大可放心，无需忧虑他们心生异志。"
 ita_look_to_the_SAF:0 "着眼于女性辅助服务团"
 ita_look_to_the_SAF_desc:0 "女性辅助服务团，意大利皇家军队中的女性辅助力量，赋予女性为国效力的机遇。尽管她们暂时未能投身战场，我们应让她们在军队的后勤部门中发挥更大作用，进而让更多男性得以投身前线。\n\n未来可期，或许“女性力量”将不再是新鲜词汇……"
 ita_secretaries_in_uniform:0 "制服秘书团"
 ita_secretaries_in_uniform_desc:0 "意大利皇家军队里，众多男性担纲文职，令前线缺失了数千精兵强将。为吸引更多女性投身军旅，我们将让秘书与其他行政岗位全由女性担任，让男性去承担更为艰巨的任务，如持枪卫国……"
 ita_radioragazze:0 "无线电女兵"
 ita_radioragazze_desc:0 "随着私人无线电节目的广泛传播，众多人士，女性亦然，得以踏入无线电工程之门。招募这些才智出众的女性加入军队，担任无线电操作员，不仅提升了女性在武装部队中的比例，也能让更多男性在战斗中担当此职：他们在舰船、坦克和大型飞机上操作无线电，扮演着在危险环境中不可或缺的角色，而这样的环境，对女性来说，尚属不宜。"
 ita_logistics_ladies:0 "后勤女士"
 ita_logistics_ladies_desc:0 "后勤部门是一片繁忙之地，无数勇士在此默默耕耘，以确保士兵们不会遭遇手枪误装反坦克炮弹，或是口粮被钉子替代的窘境。\n\n女性巧手理家，何不让她们在后勤与会计部门施展才华，以细腻心思，为意大利贡献绵薄之力，无需金戈铁马。"
 ita_signorina_cecchina:0 "塞基纳小姐"
 ita_signorina_cecchina_desc:0 "俄国人在上一次战争中向我们展示了女性也能成为战场上的铿锵玫瑰的事实。虽然她们体格娇小、力量稍逊，不适宜于白刃战或长途跋涉，但她们的小巧身形却使她们在狙击领域如鱼得水。为那些对狩猎情有独钟的女性开设训练班，我们可以迅速组建起一支全女性狙击队伍。若成效斐然，未来我们或许能让女性在战场上扮演更多关键角色。"
 ita_the_pilot_project:0 "飞行项目试点"
 ita_the_pilot_project_desc:0 "伊塔洛·巴尔博，航空战术的奠基人，意大利空降兵的缔造者，亦是私人飞行的热心支持者，他深信飞行爱好者的群体能在战时孕育出技艺高超的飞行员。同时与许多怀有同样梦想的女性并肩，力挺女性于蓝天翱翔。\n\n沿着巴尔博的足迹，尽管一些守旧的皇家空军军官对此不以为然，我们仍将开创首个全女性飞行员训练班，让女性把对祖国的深情厚爱，书写在无垠的蓝天之上。"
 ita_an_exeption_for_the_navy:0 "海军例外"
 ita_an_exeption_for_the_navy_desc:0 "女性参战之门已开，然而皇家海军仍旧固守陈规，以“红颜祸水”之说断然拒绝。\n\n我们心知其反对之声不过是顽固不化之举，却也明白此事实在棘手难为：海军乃博尔盖塞派系之禁脔，吾辈岂敢轻言触怒此等强援……待时机成熟，再图良策。"
 ita_prepare_the_youth:0 "准备年轻人"
 ita_prepare_the_youth_desc:0 "与美国不同，我们没有数亿的人口；与日本不同，我们没有像中国那样可供榨取的人力资源。因此，我们的军队规模总是相对较小，与另一个超级大国相比，在数量上处于劣势时，每一个士兵都显得弥足珍贵。\n\n不过，我们能够通过精准的宣传策略，针对那些热血沸腾、渴望为意大利献身和展示力量的青年宣传，来提高他们加入军队的意愿，从而增加志愿参军的人数。"
 ita_expand_the_reservists:0 "扩充预备役"
 ita_expand_the_reservists_desc:0 "战火纷飞之际，预备役军人是我们极为重要的人力资源，他们身经百战，训练有素，能迅速响应战场召唤。通过降低进入预备役和征兵名单的要求，我们可以增加被征召的人数，从而扩大我们的人力资源库。"
 ita_mandatory_defense_classes:0 "防卫必修课"
 ita_mandatory_defense_classes_desc:0 "为使我们国家的青年在战时能够自保，中学将开设民防课程，成为必修课。在这些课程中，青少年们将学习在空袭时如何寻找避难所，怎样处理轻微伤害，以及在食物短缺时如何准备食物。虽非实战训练，却能培养他们面对困境时的应变思维。"
 ita_military_focused_sports:0 "军事特色体育"
 ita_military_focused_sports_desc:0 "为了提升国民的综合素质，学校将被要求着重培养具有军事价值的体育项目。学生们将投身于跑步、跳跃等田径训练，以及简化版的古典摔跤等技艺，而非足球或排球。\n\n这样，我们的年轻人不仅智慧，而且体魄强健！正如古人云：“心明身健”……"
 ita_army_officers_at_schools:0 "校园军官"
 ita_army_officers_at_schools_desc:0 "为激励年轻毕业生踊跃参军，军队的招募官将亲临校园，以其非凡魅力吸引那些怀揣军旅梦想的青年。在富裕阶层的学校，他们将倡导为国尽忠、光耀门楣的理念；在平民子弟的学校，则更多强调稳定的收入和能够寄回家的奖赏。我们预计，不久的将来，将有成群结队的新鲜血液注入我们的军队……"
 ita_advertise_the_blackshirts:0 "宣传黑衫军"
 ita_advertise_the_blackshirts_desc:0 "经过层层选拔，那些对法西斯主义和领袖忠诚不渝的新兵，将被特殊招募官亲自召见，并赋予他们加入黑衫军的荣耀机会。如此一来，我们的精英部队和最忠诚的部队将不断吸纳一批批年轻而忠诚的新血！"
 ita_advertise_the_army:0 "宣传军队"
 ita_advertise_the_army_desc:0 "在意大利各地，我们不会只拘泥于校园内部，还将发起一场声势浩大的宣传，以提升皇家陆军及其他武装力量的声誉：我们将把服兵役视为至高无上的荣耀，同时也是每个公民的神圣职责。我们强调，军队保卫的不仅仅是意大利这片土地，更是每个人的亲人和家园，让祖国远离如德国人这样的侵略者之手。我们相信，这样的号召将激发无数青年的热血，使他们踊跃加入军队的行列。"
 ita_death_from_above:0 "死从天降"
 ita_death_from_above_desc:0 "皇家空军，作为军队中的新贵，在第一次世界大战结束时从陆军和海军的\"自治部分\"中分离出来。历经五十载的独立历练，无论是组织架构还是装备配置，皆有待精进。我们的领袖对这支空军寄予厚望，立志将其打造成能与德国空军一决高下的空中雄师。"
 ita_futurist_air_design:0 "未来航天设计"
 ita_futurist_air_design_desc:0 "未来主义，不仅是艺术之流派，更是生活之哲学，以进取为先，以创新为魂。未来主义者，乃至如邓南遮这般非未来主义艺术家，皆视飞行为进步之象征，是人类在迈向太空之前的最后一道边界。\n\n自此，我们将踏上这条光明之路，确保我们的空军装备最尖端的飞机，这些飞机将汲取未来主义之精髓，设计得既符合空气动力学，又坚如磐石。"
 ita_speed_lover:0 "速度之需"
 ita_speed_lover_desc:0 "若是马里内蒂与未来主义的奠基者们得以目睹今日飞机之速，定会因激昂之情而心潮澎湃！然而，速度并非仅供娱乐之用：飞机越快，越能轻松躲避飞来的炮火，迅速击中目标。因此，我们应确保，无论是战斗机还是轰炸机，都应装备强劲的引擎，让它们能够飞得尽可能快，令其他国家望尘莫及！"
 ita_rider_of_the_sky:0 "空中骑士"
 ita_rider_of_the_sky_desc:0 "战斗机飞行员，宛如现代的骑士，他们以荣誉和骄傲为战，驾驭着速度惊人的人造铁马，在天空之上与对手较量，为了人民和祖国承担巨大风险。这些英勇的男女，是法西斯主义的楷模，应当给予他们所需的一切，让他们能够翱翔于更高的天际，带领他们的飞机，乃至整个意大利，飞向更加辽阔的天空。现代航空技术和在蓝天之上的飞行，无一不彰显着未来主义的精神。"
 ita_wings_of_fire:0 "烈火之翼"
 ita_wings_of_fire_desc:0 "我们的飞行员，恰似凤凰涅槃，死亡即是重生，他们将战斗至最后一刻，心怀信念，知晓在法西斯英雄的万神殿中，他们将重获新生。他们在苍穹中光芒四射，足以掩映最璀璨的星辰，敌手在他们英勇无畏的火焰中化为虚无：这是一场充满挑战的征途，胆怯者或许会望而却步，但我们的飞行员，他们胸怀壮志，迎难而上，坚信自己能征服一切，哪怕是以生命为代价，也在所不惜。"
 ita_ace_warrior:0 "空中禁卫军"
 ita_ace_warrior_desc:0 "新的训练体系终于结出了硕果：我们的飞行员速度之快，令人望尘莫及，他们执行起高难度的飞行动作来，宛若闲庭信步，游刃有余。我们的空军，以其现代化的装备和技艺高超的飞行员，赢得了所有其他国家的羡慕目光！\n\n领袖对这些英勇的飞行员深感自豪，认为那些在训练中未能坚持到最后的人，不足以承载这份荣誉。虽然令人惋惜，但欲戴王冠，必承其重。"
 ita_flying_in_the_60s:0 "意大利的航空十年"
 ita_flying_in_the_60s_desc:0 "马里内蒂和其他未来主义者梦寐以求的空军，现已蓄势待发，准备与德国空军一较高下。然而，训练学院传来的消息令人忧虑：学员们在飞行训练中或退役或遭遇不测，成功毕业者日渐减少。一些最新型号的飞机设计似乎速度过快，即便是经验丰富的飞行员也难以驾驭……我们对速度与现代化的追求，是否已逾越了应有的界限？"
 ita_i_wont_fall_apart:0 "拥抱未来主义设计"
 ita_i_wont_fall_apart_desc:0 "调查结果揭示了训练事故频发的真相：引擎之力过于强悍，机身难以承载，使得新手飞行员在驾驭时承受了难以驾驭的重负，终致结构之崩解。\n\n虽然我们在空气动力学和引擎技术上取得了飞速的进展，但显然，我们仍需时日来融会贯通这些新知，使其转化为安全可靠的技术。目前，我们将回归更为稳妥的传统方法，同时不忘将新知融入其中。"
 ita_the_bomber_always_gets_through:0 "轰炸机，势不可挡"
 ita_the_bomber_always_gets_through_desc:0 "为稳步提升皇家空军的战斗效能，我们须重视轰炸机的关键作用。正如“轰炸机哈里斯”在往昔战争中所展示的，对敌工业心脏与城市要地的精准打击，不仅摧毁了其生产与建设，更动摇了民心，激起了民怨。虽然他们未能如愿以偿，但都灵、米兰和那不勒斯的复兴之路却是漫漫长路……"
 ita_i_like_my_bombers_medium:0 "战术轰炸机新策"
 ita_i_like_my_bombers_medium_desc:0 "尽管战略轰炸机能飞得更远、载弹量更大，却非我们所需。考虑到我们的主要潜在敌人就是北边的邻国，我们并不需要能够飞行五千到六千公里的轰炸机。我们真正需要的是能够同时破坏敌方工业和基础设施，并能对地面部队进行战术支援的多功能轰炸机。简而言之，我们需要中型轰炸机。"
 ita_revisit_strategic_bombing:0 "战略轰炸再审视"
 ita_revisit_strategic_bombing_desc:0 "盟军失利，战略轰炸未能尽展其威，如今理论亟待我们重新推敲。"
 ita_high_octane_kerosene:0 "高辛烷煤油"
 ita_high_octane_kerosene_desc:0 "我们无需战略轰炸机去摧毁遥远的目标。新研究指出，高辛烷煤油这类新一代燃料，能让中型轰炸机安全飞行至以往战略轰炸机才可企及的距离。\n\n我们应投入资金，深耕这一领域，以期找到大量生产此类燃料且成本低廉的方法：如此，方能一击必杀，令敌人灰飞烟灭。"
 ita_gas_gas_gas:0 "汽油，汽油，汽油！"
 ita_gas_gas_gas_desc:0 "有人或谓其“不仁不义”、“大屠杀”或“战争罪”，然而毒气攻击，对我们而言，却是迅速破敌、自保安全的策略。通过资助化学武器的研究，我们将能够以较低的牺牲赢得胜利！\n\n毒气，毒气，毒气，我将油门一踩到底！化身为你的轰炸机，直冲云霄！"
 ita_Ghereghereghez:0 "加油，加油，再加油"
 ita_Ghereghereghez_desc:0 "自1924年起，意大利皇家空军便以\"Ghere ghere ghez\"作为其战斗口号，这代表着对传统荣耀的自豪和对现实的清醒认识，这曾是我们早期探索中的盲点。如今，我们可以自豪地宣告，我们的空军已经焕然一新，成为一支能够捍卫意大利荣耀、保护国民安全的现代化军事力量。愿意大利皇家空军的旗帜永远飘扬！\n\n加油，加油，再加油！"
 ita_fire_and_flames:0 "火与怒"
 ita_fire_and_flames_desc:0 "有别于传统爆炸物在密闭空间内膨胀至极限后猛烈爆发，\"温压\"炸弹这一尖端且试验中的技术，能够在爆炸时吸入周围空气中的氧气作为燃料，从而大幅增强爆炸的破坏力和影响。\n\n为了增强我们轰炸机的威力，我们应当投入资金，深入探究这一创新领域，让我们的空军真正迈向现代化，届时，敌人将无处遁形，唯余败亡。"
 ita_66_soccon_victory:0 "国民联盟胜利！"
 ita_66_soccon_victory_desc:0 "阿尔米兰特率领我们崎岖跋涉，将政权交托于国民联盟之手！今日，我们终于向世人宣告，意大利与法西斯主义唇齿相依，缺一不可，否则便是自取灭亡。齐亚诺及其自由派徒劳地想改弦易辄，却不知命运之链早已将我们引向荣耀之路。我们正是墨索里尼所憧憬的意大利——非空谈改革，而是铁血硬汉，以钢铁意志引领国家，如牧羊人般指引羊群。今夜，我们将举杯共庆，阿尔米兰特将发表振奋人心之演讲，声震寰宇，感人肺腑。我们已立足此地，以敌人之游戏规则取胜，如今必须乘胜追击，为更大的福祉而战。"
 ita_end_reforms:0 "结束改革"
 ita_end_reforms_desc:0 "齐亚诺的改革，宛若慢性之毒，悄无声息地侵蚀着意大利，其害不彰自显。如今，意大利因那些自由派和改革者的虚言假语而病入膏肓，卧床不起，虚弱至极，这些甜言蜜语本就是帝国崩塌的前兆。然而今朝，权柄在握，我们将重铸意大利往昔之辉煌。常言道，断根要溯源，欲解此毒，必先断绝那毒汁之源头。因此，我们必当终止那些企图彻底改变国家根基的行径，以守护我们残存的遗产，并着手重建那些逝去的辉煌。昭告天下，意大利绝不沦为左翼之泥沼，只要我们尚存一息，便不容堕落之徒肆意妄为。"
 ita_assure_democracy:0 "守护民主福祉"
 ita_assure_democracy_desc:0 "民主，一个颇为奇特的理念：百姓以选票定领袖，以公正选举显民意。我们志在复兴意大利之辉煌，却在众多帝国子民心中成了国家福祉与民主的威胁。然而，我们并非如此，我们理解人民有投票的渴望，剥夺之非我辈所宜。我们必须迅速行动，确保此意得到阐述，阿尔米兰特将亲口宣告，誓守民主之花在意大利盛开不衰。我们，虽为传统之坚守者，却比那些软弱无骨、腐败透顶的罗马政客要坚毅得多，我们在此，全心服务人民之福祉。"
 ita_new_government_same_ideas:0 "新政府，旧思想"
 ita_new_government_same_ideas_desc:0 "意大利迎来了新纪元，民众的意志塑造着管理他们的政府。我们接纳了这一体系，它赋予了人民一种参与国是的荣誉感。帝国的兴盛，仰赖一位强有力的领导者，来运用民众所赋予的权力，引领我们走向辉煌，确保国家在动荡时期也能稳健前行。人民将有权选择他们的领袖，虽然这于我们或许是一种挑战，但我们已然赢得了公众的信任与支持。是时候让阿尔米兰特挺身而出了，让他成为维护我们在世界舞台上地位所必需的强人，我们必须为他提供所需的一切资源。从长远来看，民主之道已见成效，因为没有领袖能在不赢得民心的情况下长久领导，而这正是我们现在所做的。"
 ita_ignore_rumors:0 "无视诽谤"
 ita_ignore_rumors_desc:0 "他党之人口蜜腹剑，更企图欺世盗名。他们妄言我们心怀叵测，企图将意大利带回极权时代，欲将民主从这片土地上连根拔起。然而，这些皆是无稽之谈。我们是心怀赤诚的爱国者，志在助祖国渡过时局的惊涛骇浪。我们是奉天承运，肩负起引领人民走向安宁与喜悦之地的使者。面对这番污蔑，我们有责任向黎民百姓昭示真相。我们必须力辟谣言，展示我们改善意大利的决心与行动。我们对这片土地爱得深沉，她亦将以爱回馈；因为我们是天选之子，来引领她前行。只要我们不懈努力，启迪人心，民心终将与我们心心相印。"
 ita_reassure_parliament:0 "安抚国会"
 ita_reassure_parliament_desc:0 "我们未能尽揽议会席位，此事令人扼腕。为此，若想立法成功，我们必须与其他政党打交道，与他们保持良好关系。阿尔米兰特将亲赴议会，发表演讲，阐明我方立场，以正视听。他将力图消除外界对我们可能动摇民主根基的疑虑。他将重申，我们拥护民主，尊重民意，我们的目标是捍卫帝国和其百姓的福祉。尽管有人对他心存戒备，唯恐他野心勃勃，但他将通过声明自己只愿担任首相，来平息这些忧虑。"
 ita_preserve_fascist_structures:0 "保留法西斯时代组织机构"
 ita_preserve_fascist_structures_desc:0 "在意大利，众多老一辈的人对于墨索里尼时代抱有怀旧之情，憧憬往昔美好时光。养老院内，老人们佩戴的纪念徽章和丝带，以及不断重印的昔日法西斯海报，都是对那段历史的深情怀念。一旦有机会，他们会滔滔不绝地表达对墨索里尼的敬仰之情。我们虽无法让时光倒流，但可以保留那些见证历史的陈旧机构和组织，让它们不被时代所遗忘。尽管自由派视这些为无用的开销，我们却认为，为了纪念我们辉煌的历史，这些保留是有价值的，我们的父母也会理解这份心意。尽管这些建筑已无实际之用，但为了安抚那些为我们今日成就奠定基础的一代人，表达我们的感激之情，这样的努力，亦是值得的。"
 ita_venerate_king:0 "敬重国王"
 ita_venerate_king_desc:0 "在意大利，除了贝尼托·墨索里尼，还有一位在世之人深受民心，那便是以超然政治之外的姿态治理国家的国王翁贝托。他作为国家官方的行政领导之一，在意大利走向民主的道路上虽只扮演了配角。因此，将国王而非可能成为敌对方象征的齐亚诺，标榜为引领选举的关键人物，对我们来说更合情合理。毕竟，权力在握，我们不能让那些理念相左的人赢得选民的心，不论他们对意大利的影响有多深。"
 ita_a_catholic_nation:0 "天上之国"
 ita_a_catholic_nation_desc:0 "墨索里尼于1929年签署的拉特兰条约，正式奠定了教廷与意大利王国之间的联系。条约中的教务协约，更是将天主教会定位为国家的道德指南针，尽管宗教与国家依旧处于分庭抗礼的境地，然此举却巧妙地笼络了天主教信徒的选票。阿尔米兰特与教廷代表携手，意欲再铸第二份协约，意大利将在其中承诺守护并支持教会，虽实质性变化寥寥，但这使得许多天主教徒对我们抱有好感。教会的坚定支持，无疑将成为我们赢得民心、巩固国政的有力砝码。"
 ita_fascism_did_nothing_wrong:0 "法西斯毫无过错"
 ita_fascism_did_nothing_wrong_desc:0 "虽然我们已遵循民主规则行事，但我们也绝不能忘本。法西斯主义曾使意大利伟大，曾使国家繁荣昌盛，如今却为一些媒体和所谓“知识分子”所诽谤攻击，这不免会让正直的市民寒心。我们今天享受的民主制度，是领袖赠予的礼物，是齐亚诺智慧的体现。为了纪念法西斯主义为意大利留下的遗产，阿尔米兰特决定登上罗马威尼斯宫的著名阳台，墨索里尼和齐亚诺都曾于此发表演讲。虽然这次演讲的观众不会太多，主要是国民联盟的选民，但足以让我们一同回顾过往法西斯时代的荣耀时刻。"
 ita_almirante_promises_order:0 "阿尔米兰特承诺恢复秩序！"
 ita_almirante_promises_order_desc:0 "显然，并非所有意大利人对国民联盟掌控的新政府感到满意，众多民众涌向街头，对我们及我们的政策表示不满。这些无知的滋事者虽只是小疾之患，但他们的存在却让我们显得软弱，似乎难以驾驭自己的百姓。我们必须终结这一局面，不是借助武力，而是以我们的声音，展现真正的民主风范，呼吁秩序。我们的代言人乔治·阿尔米兰特将挺身而出，向全国发表演讲，声讨这些煽动者，倡导团结精神。我们期望他能够成功，希望这些抗议活动在适度的引导下能够渐渐平息。毕竟，粗暴地动用军力或实施逮捕，只会火上浇油，无意中坐实了他们自己对我们所发出的预言。"
