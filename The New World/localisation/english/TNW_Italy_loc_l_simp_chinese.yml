 christdem.6.t:0 "基督教民主党开启联盟谈判"
 christdem.6.d:0 "在基督教民主党沉浸于意大利帝国首次民主选举中获胜的狂喜中，人们很容易忘记一个残酷的事实：尽管表现强劲，基民党仍远未能在议会获得多数席位。因此，若要推动任何重要议程，他们必须与其他政党组成联合政府。基民党的首选自然是民主阵线——这个同样致力于意大利民主化并渴求福利与教育改革的盟友。然而来自民主阵线的早期信号表明，这条道路并不平坦。作为合作条件，民主阵线要求新教育课程必须包含关于“法西斯时期”的章节，特别是揭露那些通过与压迫政权“合作”延长其寿命与暴行的“教会机构”。这种提议显然冒犯了虔诚的天主教政党基民党。\n\n当然，民主阵线并非唯一选择。由前法西斯党员组成的公开民族主义组织国民联盟也向基民党抛出橄榄枝。该党领袖乔治·阿尔米兰特宣称“愿与致力于强大意大利帝国的兄弟党通力合作”，仅要求微小的政策让步作为组阁代价。但基民党内部担心，与这个仍在同时向“改革者齐亚诺”和“爱国者墨索里尼”致敬的政党合作会玷污新意大利的民主承诺。选举期间，基民党曾断然否认与国民联盟结盟的可能性，然而党魁阿尔多·莫罗近期改口称“对任何相信和平民主意大利的力量敞开大门”。有人认为这是迫使民主阵线降低要价的外交策略，也有人担忧这预示着一个庞大右翼联盟的诞生。"
 christdem.6.a:0 "我们必须找一个配得上我们雄心的合作伙伴！"
 christdem.7.t:0 "与国民联盟的会晤"
 christdem.7.d:0 "今日，阿尔多·莫罗亲自会晤乔治·阿尔米兰特及国民联盟其他官员，商讨议会联合组阁事宜。此前国民联盟已表态愿与基督教民主党合作，双方对此次会谈寄予厚望。会谈初始充满礼节性——握手与微笑，政客们表现得如同老友，全然忘却选举期间的激烈攻讦。然而随着谈判展开，国民联盟提出各项要求后，妥协可能性荡然无存。阿尔米兰特首先拒绝就莫罗的教育改革与社会保障政策进行谈判，声称二者将弊大于利。他逐条否决莫罗的提议，明确暗示联合政府不容任何改革。致命一击出现在阿尔米兰特要求基督教民主党放弃自身纲领，转而支持其政策以“维系意大利帝国存续”。意识到谈判徒劳，基督教民主党示意会议终止。未解其意或毫不在意的阿尔米兰特仍继续阐述疯狂计划，仿佛国民联盟已赢得大选正筹组联合政府。约一小时后，阿尔米兰特心满意足结束会谈。裂痕已然铸成，罗马政界皆知两党再无合作可能。"
 christdem.7.a:0 "综合考虑，这或许是最好的结果。"
 christdem.8.t:0 "谈判完成"
 christdem.8.d:0 "基督教民主党已正式与布鲁诺·维森蒂尼领导的自由党小派系组成联盟，同民主阵线的谈判亦基本达成积极共识。手握充足支持的莫罗终于能推进核心议程——将竞选承诺的渐进式改革付诸立法。早该如此。毕竟立法施政方为执政之本。首批法案草案已就绪，即将提交众议院。寄望通过政治协商与联盟支持，这些法案能在未来数月顺利通过。新当选的议员们对改革首步充满热忱，民众亦疾呼引领意大利走向光明未来，此乃吾辈职责所在。我们将把这些理念铸为法律，无物可阻我们缔造更美好世界的伟业。愿其他政党能与我们同心协力而非对抗——唯有携手方能成事。莫罗本人堪称最乐观者，被描述为“时刻含笑，乐与任何近旁者探讨政策”。他甚至个别约见议员确保支持，并就关键议题征询意见，始终秉持构建良政之信念。然政坛素有摧折钢铁意志之能，这份热忱能否持久尚未可知。"
 christdem.8.a:0 "让我们言归正传吧！"
 christdem.9.t:0 "教育改革法案提交议会审议"
 christdem.9.d:0 "基督教民主党近日提出首项针对意大利教育问题的法案。该法案名为《学校教育授权法令》（亦称“莫罗改革”），核心内容包括推行全民青少年基础教育改革，涵盖中小学阶段的义务教育。\n\n然立法之路尚远，进程方启。若欲使改革成真，须竭力争取其他党派支持。具体而言，需获得社会民主党或法西斯派系的赞成票。自由党虽势微，料将无条件支持，但两大党必会要求增删条款，需经协商方能赢得其认可。\n\n此仍为本届政府重要一步。民众知我辈积极践诺必欢欣鼓舞。若功成，既为基民党之胜，亦属全意大利之胜——通过教育青年，方可使吾国以现代原则跻身现代国家之列。"
 christdem.9.a:0 "莫罗定能争取到选票！"
 christdem.10.t:0 "从法西斯余孽手中剥取选票"
 christdem.10.d:0 "尽管未能与国民联盟结成执政同盟，但该党内部必有若干温和派残党愿为次要改革背书。如今到了每位议员最“热爱”的环节——卑躬屈膝游说同僚，乞求他们支持这份即将付诸表决的法案。只需些许妥协，再辅以莫罗的三寸不烂之舌，总该能哄得几个榆木脑袋投下赞成票吧？当然——现实从来不会如此顺遂。有人狮子大开口索要政治赎金，有人以暧昧言辞虚与委蛇，我们甚至无法确认这些骑墙派最终会倒向何方。局势虽险，但愿能争取到足够票数在数周后的最终表决中险胜。纵使功败垂成，至少那群法西斯余孽会感念我们将他们拽入谈判桌——这或许能在其党内播下未来合作的种子，待他们受够提案死活不通过的屈辱时，自会向我们靠拢。说到底，谁又能阻挡为意大利孩童争取教育的常识性改革？纵使党派龃龉横亘在前，也终非永恒之碍。莫罗与国民联盟成员的最终密谈迫在眉睫，这或是收割关键票数的末班车。此刻议会回廊的暗影中，钢笔划过选票的沙沙声，正编织着新时代的襁褓——或是旧秩序的裹尸布。"
 christdem.10.a:0 "民主制度不过尔尔。"
 christdem.10.b:0 "选票必须到手，不择手段。"
 christdem.11.t:0 "最后要求"
 christdem.11.d:0 "今日，当莫罗与国民联盟残余的骑墙派就教育改革展开最终谈判时，对方终于亮出选票赎金清单——这些要求毫无外交辞令的矫饰，直白得近乎粗野：法案若不满足其索求，休想从他们手中抠出一票。首项条款直指历史修正主义。这群法西斯余孽恐惧我们将引入颠覆其“不容置疑之真理”的教材。他们仍视墨索里尼为意大利的救世主，坚持要求教科书给予“领袖”与法西斯党应得的礼赞。尽管我们绝无胆量挑战墨索里尼的“历史地位”，但这份清单显然在逼迫我们歌颂那个已被合理埋葬的政权体系——更何况国民联盟企图塞进校园的许多“史实”，实为谎言与宣传的杂糅体。然局势已然明朗：若想收割关键票数，我们不得不吞下这剂毒药。此刻，基督教民主党正深陷道德泥沼：若向阿尔米兰特的党羽屈服，虽能确保法案通过，却要背弃竞选时高举的价值旗帜；若拒绝交易，改革流产的代价将由意大利孩童的血肉之躯承受。此刻，决策的砝码已落入基督教民主党掌中。议会穹顶的枝形吊灯下，莫罗钢笔划过修正案文本的沙沙声，正为这个国家的历史记忆刻下新的墓志铭——或是耻辱柱。"
 christdem.11.a:0 "妥协乃脆弱之物"
 christdem.12.t:0 "确保内部支持"
 christdem.12.d:0 "意大利教育改革法案已非新鲜议题，此刻必须确认党内成员仍同心同德。作为基民党政纲核心，此案成败关乎我党存续——唯有兑现选民承诺、推动关键立法，方能在政治版图中守住阵地。此时党内裂痕恐将引发连锁危机，若放任自流，下届大选必陷绝境。我们将从基础工作重启：向盟党议员反复敲打法案重要性，确保其不被旁枝末节分散精力。同步启动的舆论造势既可煽动民意，亦能向议会施压，迫使FEOTA法案冲破桎梏完成立法。民众已在选举中展现出提升教育水平的钢铁意志，任何背弃誓言的行为都等同于政治自杀。当然，我们绝非威胁同僚——值此政府与意大利全境仰赖团结纽带维系之际，只求凝聚共识，共克时艰。待此番整肃完毕，自当重整旗鼓，向反对党票仓发起总攻，收割必需之多数优势。"
 christdem.12.a:0 "希望这能有回报。"
 christdem.13.t:0 "莫罗为教育改革发表演讲"
 christdem.13.d:0 "今日，阿尔多·莫罗通过电视演讲向全意大利民众疾呼，力图为莫罗改革争取民意支持。教育改革乃民心所向，莫罗冀希望以民意为刃，逼使其他党派议员倒戈相向。\n莫罗以平实言辞开篇，痛陈意大利教育体系的百年积弊——发展滞后于欧洲诸国，至今仍有数十万国民未能完成高中学业。继而描绘义务教育之伟力：纵然高中文凭来之不易，却足以让亚平宁的孩童终生受益。只要国家上下勠力同心通过基民党提案，贫寒子弟可晋身显达，蒙昧者能登学术殿堂，怠惰之徒亦将勤勉自强。演讲终章，莫罗向民主阵线与国民联盟发出泣血恳求：摒弃党争，以团结之姿通过法案，赋予意大利青年改写命运之机。他强调此非党派议题，甚至超越政治博弈，而是关乎子孙后代与国家前途的道义责任。\n民调显示演讲已点燃舆论热潮，党内要员期盼将民意转化为政治资本，撬动反对党票仓。至少，我们已向民众昭示赤忱之心，反对派若想扳倒莫罗——此刻起便如逆水行舟，举步维艰。"
 christdem.13.a:0 "人民站在我们这边！"
 christdem.14.t:0 "与民主阵线的会面"
 christdem.14.d:0 "党内自由主义者擅自接触民主阵线，企图在教改法案表决中争取其支持。所幸双方目前眉来眼去，有望借此收割关键票数，更为未来合作铺路。当然，这群左棍定会要求对法案动大手术——好在现行条款尚未触及其意识形态红区，拉拢难度应属可控。我们已抛出诱饵：承诺在后续改革中优先考虑其利益诉求。对方反应虽显谨慎，但总体偏向乐观。毕竟教育乃社会根基，修补裂痕乃共识所向。待其正式表态后，自当按需调整策略以达标多数门槛。国民联盟对此番媾和暴跳如雷，斥之为懦弱叛国之举。尽管犬吠不足惧，然我党须谨记：立法进程若过度仰赖他党鼻息，恐将丧失政治主体性。"
 christdem.14.a:0 "我们必须继续行进！"
 christdem.15.t:0 "民主阵线给出了答复"
 christdem.15.d:0 "经过漫长的拖延，民主阵线终于对我们求援的呼吁作出了回应。他们的答复并非直接拒绝或接受支持，而是提出一项交易：只要我们在法案中增添特定条款，他们就将投票支持并为我党背书。这在政治中实属常态——毕竟无人会在毫无协商的情况下轻易妥协。他们的每项要求似乎都只是将我们原有条款推向更极端的自由化与实践层面。例如，我们仅希望推行全民义务教育，自由派却要我们同时实施统一课程体系以确保儿童接受“全面且严格管理的教育”。这还算较温和的要求，某些条款甚至要求为毫不相干的领域提供资金与资源，例如大学生补贴与科研资助。尽管多数初步要求都可通过谈判消解，但事实是若想获得民主阵线的投票支持，我们必须对法案进行修改与增补。然而基民党领导层敦促保持谨慎，因为过度满足其要求不仅会削弱我党威信，还将导致迄今支持我们的中右翼温和派议员倒戈。"
 christdem.15.a:0 "唯通过法案是从！"
 christdem.16.t:0 "莫罗改革开始投票"
 christdem.16.d:0 "议会大厅人声鼎沸，因为今天将表决民主意大利首个重大法案——《教育授权法案》。这项旨在提升国民教育标准与生活质量的提案始终争议不断，许多人都质疑其能否获得足够票数通过立法。莫罗整体上保持着良好心态。尽管忧虑自己主导的首部法案可能流产，他仍持乐观态度。当记者询问其预期时，他宣称相信多数同僚能“超越党派纷争，为国家福祉投下明智一票”。然而政界皆知，若法案夭折将意味着莫罗与基督教民主党的政治末日——立法失利必将导致下届选举惨败。\n\n“无论投票结果如何，民众都将注视着我们，并用选票作出回应。”莫罗最后补充道，“此刻唯有屏息凝神祈求好运。”"
 christdem.16.a:0 "现在事情已经超出了我们的控制。"
 ita_folded_to_fascists_edu:0 "做出了错误的妥协，失去了急需的选票。"
 ita_education_voting:0 "§R取悦不了你需要的人，就会失败。§!"
