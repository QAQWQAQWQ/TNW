 ita_empire_managaement:0 "帝国管理"
 ita_empire_managaement_desc:0 "意大利雄鹰骄傲的领地从高耸的乞力马扎罗山延伸到严寒的阿尔卑斯山，她通过两次世界大战的血战为自己赢得了一个庞大而富有的帝国。但如果失去了这些征服所得的土地，意大利将会再次倒退回二流强国。然而，尽管帝国如此伟岸强大，但她能够施展的能力却在逐渐变少。预算流失、驻军问题都阻碍了它施展武力的能力，更不用说进一步的对外扩张了。如果不修补这些问题，千里之堤将毁于蚁穴。\n\n可消耗的点数：[?ITA_empire_management_coins]\n\n埃及的代理人：[get.ITA_Egypt_Block_Status]\n意属东非政府：[get.ITA_IEA_Block_Status]\n黎凡特政府：[get.ITA_IME_Block_Status]\n伊拉克-意大利委员会：[get.ITA_IRQ_Block_Status][get.ITA_ILG_Block_Status]"
