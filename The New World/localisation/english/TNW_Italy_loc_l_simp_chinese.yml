 ITA_italy_1962_desc:0 "1962年的意大利国家与社会状况"
 ita_colombo_imper_category:0 "恐怖统治"
 ita_colombo_imper_category_desc:0 "达拉·基耶萨因其失误而惨遭犹太恐怖分子的毒手，此悲剧昭示了在黎凡特地区维护秩序非铁腕不可的事实。科隆博总督深明大义，誓以雷霆手段，对叛乱分子、异见者及其同路人施以无情打击。尽管有人可能认为他的方法野蛮或有种族灭绝之嫌，但在与阿拉伯人和犹太人的较量中，我们似乎已无退路。\n\n§x圣地若不降服，必将火海葬身！§!"
 ita.1.t:0 "意大利帝国现状"
 ita.1.d:0 "二战期间，意大利取得了辉煌的胜利，似乎预示着这个破碎的王国即将焕发新生。意大利有望与德国并肩成为世界霸主，建立自罗马帝国以来最辽阔的帝国，版图从阿尔及利亚延伸至叙利亚，从阿尔卑斯山直至非洲之角。然而，命运多舛，一如变幻莫测的风云，稍有不慎便可能改变方向。德国威胁瑞士独立之际，年迈的墨索里尼领袖洞察先机，预见了那段曾携手征服欧非亚三大洲的友谊已至尽头。德国四面楚歌，被兴微继绝的俄罗斯人围攻，他们企图将意大利卷入一场与其无关的战争，这成为了压垮骆驼的最后一根稻草。墨索里尼在愤怒之下，断然与德国割席，并向犹太人、罗姆人以及其他被纳粹追捕的\"不受欢迎者\"敞开了帝国的大门，以此作为对希特勒的最后讽刺。\n\n帝国内部并非风平浪静。随着墨索里尼年事渐高，他的心智越发不稳，帝国几乎因为领袖私下向女婿加莱亚佐·齐亚诺透露废除君主制的计划而陷入内斗。齐亚诺在逆境中力挽狂澜，说服领袖饶了国王一命，确保了国家的稳定。不久后，领袖去世，加莱亚佐·齐亚诺宣誓成为新领袖，立即开始推行国家自由化，带领国家脱离了墨索里尼所走的道路。\n\n齐亚诺虽然是一名忠诚的法西斯主义者，但他首先是一名意大利人，他洞悉了法西斯主义内部的局限性，并承诺对其进行改革。改革派视他为从内部推翻腐败系统的民主使者，温和派视他为不择手段以保持家园生存的实用主义者，而由卡洛·斯科尔扎领导的强硬派则视他为背离理想的叛徒。\n\n帝国正站在历史的十字路口。齐亚诺能否成功推行改革，为那些渴求自由的人民带来希望？还是斯科尔扎最终会占据上风，加强法西斯对意大利的控制？\n\n命运之风将意大利置于此地。无论他们选择沿着齐亚诺的道路，还是斯科尔扎的轨迹，这个国家都必须勇往直前。"
 ita.1.a:0 "一片命运交织的土地。"
 ita.2.t:0 "齐亚诺启程马耳他"
 ita.2.d:0 "今晨，政府宣布加莱亚佐·齐亚诺已离开罗马，启程参加今年的马耳他会议。昔日他或许会派遣代表替他作陪，然而风云变幻的时局，促使他决定亲自出马。\n\n国际社会中许多人认为这与卡洛·斯科尔扎声望日隆不无关系，他已显露头角，成为这位资深领袖的强劲对手。众人纷纷揣测，齐亚诺此行，或许是寄望于会议能带来利好消息，以期重燃民众对其政府的支持之火。"
 ita.2.a:0 "也许，他将为我们带来荣耀。"
 ita.4.t:0 "黑暗之心"
 ita.4.d:0 "\"号角之地的屠夫\"、\"利奥波德荣子\"，这些名号及其他称谓，几乎成了意大利每家报纸的头条常客，它们背后的故事却如出一辙：土著居民饱受摧残，劳累至死，饥饿难耐，而我们的东非总督恩里科·马泰却对此冷眼旁观。\n\n此消息一出，民怨沸腾，反帝抗议者与学生纷纷涌上街头，要求马泰下台。甚至他昔日的党内盟友也似乎纷纷离他而去，一位匿名成员透露：\"我们党内早有人察觉马泰野心勃勃，行事狠辣，却未料到他竟能行此不义之举。\"\n\n压力日增，示威渐趋激烈，我们亟需决断，是否应对此事采取行动。"
 ita.4.a:0 "如果他不守规矩，我们就得坚决将他开除。"
 ita.4.b:0 "谁在乎那几个野蛮人？"
 ita.6.t:0 "利比亚人到来"
 ita.6.d:0 "那是一个寻常的炎热干燥之日，利比亚的士兵们踏上了黎凡特的土地。他们的到来，既是军事部署，也提供了宣传的良机，因此受到了总督达拉·基耶萨的亲自接待。总督在演讲落幕后，亲自下台与这些志愿者一一交谈。当人们都以为一切已尘埃落定，一位士兵却走上前来。\n\n\"您好，达拉·基耶萨将军，能一睹尊容，实为三生有幸。\"士兵的话语中透露出他那带有利比亚特色的意大利语口音。\n\n达拉·基耶萨将军转过身，面对这位朝气蓬勃的年轻士兵，颔首示意，并询问他为何投身战场。士兵面带微笑，答道：\"为了完成只有我们阿拉伯人能完成的使命——将土耳其人逐出阿拉伯。\"达拉·基耶萨将军初听此言，心中一惊，但随即恢复了从容，并询问士兵的姓名。\n\n\"卡扎菲，长官，我是穆阿迈尔·卡扎菲上尉。\""
 ita.6.a:0 "诸位，欢迎来到黎凡特！"
 itaelection66.1.t:0 "齐亚诺宣布社会主义政党合法化"
 itaelection66.1.d:0 "自1925年以来，意大利左翼势力逐渐萎缩，力量日益式微。然而，近日齐亚诺的一纸宣言，让这些政党得以公开地重返政治舞台。此举一出，震惊四座，保守派虽欲阻之，却已是无力回天。民主之火，依旧在人们心中燃烧不息。"
 itaelection66.1.a:0 "民主万岁，意大利万岁！"
 itaelection66.2.t:0 "选举筹备之际，国王执掌国政！"
 itaelection66.2.d:0 "loc plz"
 itaelection66.2.a:0 "民主万岁！国王万岁！"
 ita.17.t:0 "巴勒斯坦的暴力冲突"
 ita.17.d:0 "巴勒斯坦，这片古老的土地，一直是意大利帝国的一块心病。自英帝国时代起，犹太人便在此扎根，随着时间的流逝，民族间的矛盾日益激化，原住民阿拉伯人对这些新邻居心生怨恨，视其为侵犯家园的不速之客。而犹太人，在德国铁蹄和傀儡政权的压迫下历经磨难，他们渴望在这片土地上找到安宁之所，并愿意为之奋不顾身。局势已如弦上之箭，一触即发，若不明确立场，恐将陷入无从控制的混乱之中。\n\n我们面前摆着两条道路：一是顺从阿拉伯人的呼声，关闭新的定居点，以求平息他们的不满；然而，这是否足以安抚他们，我们心中无数，已在巴勒斯坦安家的犹太人对此亦难以接受。\n\n二是与以色列人并肩，要求阿拉伯人退让，这无疑会招致他们的反感，虽然这表明了我们在巴勒斯坦支持建立犹太国家的坚定决心，但这一决策必将引发复杂的反响，结果未必尽如人意。无论选择何种路径，风波必起，正如历史长河中不断涌现的涟漪。"
 ita.17.a:0 "我们必须迅速行动！"
 ita.16.t:0 "65年大选军事国策树"
 ita.16.d:0 "找到我吧。"
 ita.16.a:0 "Pls"
 scorza.2.t:0 "会面达拉·基耶萨将军"
 scorza.2.d:0 "战争英雄达拉·基耶萨将军忖度着迈向领袖办公室。到底是什么任务？没泄一点风声。敬礼！领袖点头后，将军便就坐在领袖对面的那把豪华扶手椅上，而桌子另一头咆哮旋即迸发，国家、党、忠诚……领袖说，党内的一撮叛徒计划在维罗纳召开会议，即所谓的第二届维罗纳大会。密谋在会上推翻自己，把国家推向堕落之渊。斯科尔扎愈说愈愤怒，用拳猛砸桌子。最后，向不安的将军下达了一个简单的命令，派出军队，以任何必要手段摧毁阴谋，掐断二届大会的苗头。又连连称赞将军是值得信赖的朋友、忠诚的爱国者，很快以骄傲的敬礼打发走基耶萨。\n\n将军控住自己的胡思乱想。瞎想，也是叛国。自己的责任，就是执行命令。政治是政客的事，军人只要服从就好了。想明白后，就着手制定消灭叛徒的策略。只要维罗纳大会开始，就会有跟土耳其打过的退伍军人装甲师抵达该市实施戒严，抓个现行。希望他们能以雷霆之击，一个不落地处理所有叛徒。当天下午，达拉·基耶萨把他的计划传达给下属，也向领袖捎信，承诺干净利落地终结国家之敌。"
 scorza.2.a:0 "是，长官！"
 scorza.3.t:0 "进军维罗纳"
 scorza.3.d:0 "“利托里奥”第133装甲师的意大利士兵已经在维罗纳郊外集结完毕，随时等候命令。虽然他们正准备进入一个意大利城市，但他们认为这与他们最近践踏过的中东小村庄并没有什么不同之处。在这里，他们不是为了保护人民，也不是为了维护和平，而是为了消灭领袖的敌人和一切胆敢反抗他权威的人。那些蜂拥进城的伪法西斯主义者们不过就是叛国的臭老鼠，摆在他们面前的只有被帝国的英雄们剿灭一条路。\n\n突然之间，这些老兵动了起来，开始向维罗纳的街道开进——命令终于还是下达了。护送他们的是帝国最先进的坦克和装甲车，装备着最现代化的武器，携带的弹药足以将维罗纳围住一百天。当他们进入城市时，家家户户都心照不宣的紧闭起了门窗，商店也都尽数停止营业，母亲们担心麻烦降临到他们头上，把他们的孩子吓唬进了屋里。只有几十个警察挡在他们面前，他们徒劳地抵挡着皇家陆军，斥责他们的举动侵犯了他们的管辖权，很快他们便被殴打的鼻青脸肿，随后被逮捕起来。士兵们很快便突进到了市中心，大概是为了昭告他们的权威，他们把指挥部设置在了维罗纳古城堡——一座中世纪的军事要塞之中。维罗纳市长在收到了领袖本人的亲笔信之后，向公众发表了演说称为了稳定秩序，军队正在介入控制局势，必须给予其充分的尊重和尊严。\n\n第二天，他死了。而官方给出的原因是叛徒在他的酒里下了毒。"
 scorza.3.a:0 "为了领袖！"
 scorza.4.t:0 "狂暴之街"
 scorza.4.d:0 "大量的抗议者将道路塞得水泄不通，第133装甲师的行进路碰到了愈来愈多的麻烦。徒步行军也已非常困难，卡车和坦克更是空转引擎数小时之久。大部分抗议者是青年和学生，他们强烈抵触对维罗纳戒严令。天真的学生们相信，只要用街垒和自己的血肉之躯阻挡军队足够长的时间，罗马就会因为行动挫败而撤回命令。\n\n但他们错了。\n\n现在，士兵们被抗议者们激怒了，他们变得不耐烦。军官们做着进一步思想工作，“这群抗议者与他们此前镇压的人是同一类，因而那些青年学生也必须视为国家的敌人”。讨论结束，话题结成定论，紧闭门户在家不出的人便看到了这样一番惨状：大概有数百名意大利同胞，被恼羞成怒的士兵殴打得血肉模糊。坦克引擎转动，毫无顾忌，碾碎所有敢于阻挡他们的人。士兵终于可以履行自己的职责和对领袖的义务了。现在，再无人可以阻挡他们。"
 scorza.4.a:0 "滚蛋！"
 scorza.5.t:0 "占领大学"
 scorza.5.d:0 "维罗纳大学是这座城市青年知识分子的活动中心，因而，它也成为了军方的眼中钉。很明显，在“处理”了街上的抗议者后，为了立即结束所有抗议者的活动，军方不得不采取一些激进的行动。因而，军队决定向维罗纳大学进军，让那些以这里为安全的避风港的人们见识国家的权威力。一辆辆运兵卡车开进学校大院，学生们居然真的想与军队舍命相搏。他们用石头和棍棒当做武器，企图阻止这场入侵。军队们则是向这些人群拉响了机枪，消灭了这些愚蠢到想武装抵抗的人们。哪怕是他们想要逃跑，军队也依然没有停火，那些人不是被子弹打穿就是被摁在地上殴打。\n\n听闻维罗纳大学被占领的消息，斯科尔扎不由得脸涨得通红——这里可是他几年前亲手创办的大学。斯科尔扎马上封锁了媒体对此事的报道，因为一旦此事传出，斯科尔扎的政治生命便结束了。然而，为了意大利的稳定，这一切都是值得的。"
 scorza.5.a:0 "这是必须的…"
 scorza.6.t:0 "和幸存者们谈判"
 scorza.6.d:0 "大学里的一些年轻抗议者因为害怕遭到法律清算，把自己封闭在了宿舍里。军队要求这些懦夫投降，他们则以沉默为答案。因而，军队决定烧毁宿舍楼，烧出来的想逃跑的，统统子弹伺候。\n\n烈焰升腾，人们惨叫，军队却在冷眼旁观。在这一刻，在士兵们眼里，这里是战区，与中东没有任何区别。他们要搏斗，要开枪，要杀死国家之敌，他们要解决问题，但他们只懂战斗。尸体烧得焦烂，士兵们却唱起战歌，点起香烟，丝毫不顾周围地狱般的景象。"
 scorza.6.a:0 "他们自找的。"
 scorza.7.t:0 "摧毁抗议"
 scorza.7.d:0 "今天，第133装甲师抵达了又一群抗议者前，他们试图用身躯挡住装甲车和坦克的脚步，以此来做毫无意义的抵抗。士兵们将子弹上膛，准备好了武器的年轻抗议者这次没有退缩。他们拉起横幅，呼吁士兵们回家，举起火炬，以示自己对维罗纳戒严的抗议。对峙渐渐形成，又一瞬打破。一名军官警告孩子们，要求他们散开，他们却以侮辱作答。军官放弃了妥协，尊重他们自己选择的命运，下令第133装甲师向人群开火。\n\n坦克发射的炮弹呼啸着摧毁了一栋栋建筑物，那些尖叫的抗议者也随一声声枪响应声倒地。抗议者们就像被收割的麦子一般，一排排地永远倒在了地上。军队的铁蹄继续前进，拉横幅、举火炬的，杀！街头游行的，杀！维罗纳的每个人都犯下连坐的罪行，就连孩童也不例外。而惩罚，就是无情的死亡。\n\n这些惨剧传到了那些市政官员们的耳朵里，就连他们也认为这座城市已经是军队蹂躏的受害者。因而，下达了一项绝密命令，将警察、退伍军人、民兵们集结起来，共同抵抗入侵的军队。显然，军方的行动已无异于战争，那维罗纳也要坚决应战。"
 scorza.7.a:0 "开火！开火！"
 scorza.8.t:0 "拨云见日"
 scorza.8.d:0 "第二届维罗纳大会，自市中心的小酒吧开始。改革家们畅言国事，遥远的喧嚣则愈来愈近。他们不免担心自己的人身安全。但决定国家命运前途的重要会议，万不可拖延，万不可取消。现在，维罗纳民兵不分老少看守此处，配备了旧步枪与凑合用的弹药。军队若来关停大会，定叫他们铩羽而归。那群“保护”人民的畜牲，屠戮人民。而维罗纳民兵誓为人民而战，反暴政反压迫。\n\n批判的武器，不能代替武器的批判。不出所料，意志的失败，军队终结了叛国阴谋。一见武装民兵就击毙，毫不留情。公寓里的狙击手？坦克直接把建筑夷为平地。简易爆炸物？旁观的平民给我滚过去开道。那帮叛国老鼠，拒不投降，胆敢还击。意大利人民的英勇之子，甚至就此牺牲于杂碎之手。震怒之日，商店燃烧。震怒之日，数百年前的教堂只余灰烬。133师所向无前，一路杀至叛徒的核心之地。将士们头上豆大的汗珠直往下滚，枪擦了又擦，等待命令，恨不得现在就终结一切，把那不伦不类的“大会”砸个粉碎。"
 scorza.8.a:0 "接下来，给我血债血偿。"
 scorza.9.t:0 "大会"
 scorza.9.d:0 "甚至在士兵们敲门进入会议室之前，大会的成员们就知道一切已经完了。有些人畏于审判，如懦夫般开枪自尽，有些人就地嚎啕大哭。然而，当这些叛徒真正直面正义的时候，他们却缄默了，没有尝试逃走或是讨价还价。军队对他们进行逮捕之时，却突然发现其中一人的外套下藏着一枚炸弹。万幸的是，老天保佑，这颗炸弹并没有爆炸。为了避免相同的潜在风险，军官们决定放弃审判，直接下令对叛徒就地处决。这些尸体被扔在大楼里，而士兵们随后再窗户和出口设上路障并将整栋建筑付之一炬，然而所有人都忘了这座建筑是一座酒吧。军队迅速离开后，由于酒精快速燃烧导致火势蔓延到周围的建筑上，并最终让维罗纳的大部分地区都燃起熊熊大火。第133团在被火势波及前就离开了这片区域，一名指挥官表示，焚烧维罗纳代表着对该座城市背叛斯科尔扎及意大利的正义审判。"
 scorza.9.a:0 "我们做了必要之举……"
 scorza.10.t:0 "睁大双眼"
 scorza.10.d:0 "大火仍在肆虐，但所有人都只能绝望地旁观。维罗纳的市民们号哭着，离开自己的家人，工作和生活，只为了苟全性命。市政官员们号哭着，但城市的消防系统在军队的蹂躏下已经瘫痪了，他们不能用泪水扑灭这场大火。即使是那些士兵们，此时此刻在看到自己一手创造的地狱时，也从中找不出一丝一毫的正义可言。而在罗马，那些知晓军事行动的少数高官们，也终于知道了卡洛·斯科尔扎是什么样的人，以及他要用怎样的手段统治意大利。\n\n在维罗纳的大火之中，义愤正在熊熊燃烧，它的光芒比大火更加耀眼，几乎每个看到维罗纳惨状的人都热血沸腾。给自己戴上“领袖”冠冕的人，不过就是个懦夫，他的作为除了折磨和痛苦以外别无他物。士兵们永不会忘记，受害者们永不会忘记。"
 scorza.10.a:0 "这一切……这一切都是斯科尔扎的错！"
 scorza.11.t:0 "终局"
 scorza.11.d:0 "火势终于被扑灭，城市的三分之二都化为了废墟。在火势熄灭前，就有各类政府工作人员打着人道主义的幌子涌入该区域。而真相是，他们中的大多数不过是信口雌黄或是编造借口，试图为这场灾难以及执行无数起大屠杀的意大利军方打掩护。\n\n罗马当局对于国际上的抗议发表了官方回应，该市存在密谋反对国家及领袖的不法势力，因此必须出兵镇压。军队是被派去执行平定平民叛乱的维和任务。军方处理叛国者的行为完全正当，且已获得官方授权。\n\n但无论斯科尔扎如何堂而皇之地发表观点，演讲或是编造谎言，那数百名遭遇屠杀的公民与数千具掩埋在废墟中烧焦的尸体都已将真相摆在人们面前。只要有人愿意倾听，那些孤儿和医院的伤员都可以诉说国家对自己人民犯下的可怕暴行。然而，这些受害者却终是被整个国家，被盲目的民众以及残忍的独裁者忽视了。"
 scorza.11.a:0 "天哪……天"
 scorza.12.t:0 "冲破海岸"
 scorza.12.d:0 "我们的第四海岸涵盖了利比亚和突尼斯地区，是帝国最引以为傲的领地。每位忠贞的意大利公民都将这片领土与半岛看得同等重要，罗马的许多民众都知悉这块基石对于整个帝国是多么关键。然而，当地人不仅不这么想，他们还觉得没我们会更好！这帮土著执迷于自治、地方统治等自由派的鬼迷心窍中。他们这些扯淡的幻想必须被彻底消灭，而我们永远忠诚的达拉·基耶萨将军则承担了此项使命。\n\n计划很简单，士兵和坦克会在殖民地登陆，然后将所有不认同我们伟大领导的蠢货射成筛子，烧毁所有为虎作伥的村子。我们的海军会随时准备好击溃支持叛军的境外势力，空军会将他们炸成碎块。等到叛军完全被消灭的时候，一个完全忠于领袖的人会被派去取代无能的前任总督。为了让这些下等人老实点，当地驻军规模也会扩增一倍。\n\n我们的孩子们已经踏上利比亚海滩，抵达船坞，准备为他们伟大的祖国献身。随军摄影师们会为此拍摄用于宣传的照片。坦克会于今日稍晚些时候抵达，跟随他们一同推进粉碎我们领土上的叛徒。到时候没人能从意大利的怒火中溜走！"
 scorza.12.a:0 "这帮下等人该摆清自己的地位"
 scorza.13.t:0 "稳固罗马"
 scorza.13.d:0 "我们伟大的领导人卡洛·斯科尔扎，他在国家首都仍遍布政治敌手，最近的事件让这些狡诈恶徒勾结起来，企图将领袖赶下台。这些叛徒借由政治关系和民众支持，已经对国家政权造成了严重威胁，必须迅速予以肃清。万幸的是，军方选择完全支持斯科尔扎，许多当地的部队已经进驻罗马保护城市。为了避免维罗纳事件再次重演，本次任务不会使用车辆或是坦克，只会调用地面部队。待到这些鼠辈奸臣被处决殆尽，斯科尔扎便再无阻碍，能按照他所愿去塑造意大利。\n\n反对派已经拉拢了下议院的诸多成员，考虑到这点，直接关闭下议院并对这些叛国者进行逮捕也是一个不错之选。特种部队将负责处理这项问题，估计用不了多久他们就会跟罪魁祸首打照面了。如果一切顺利，那么这项简单顺利的任务甚至不会造成伤亡。但愿公众对我们的行动保持无知吧，毕竟这件事情过于敏感，不是他们应该知晓和理解的。\n\n前进吧，勇敢的意大利孩子们！去保护领袖和他的帝国吧！"
 scorza.13.a:0 "将叛徒赶出去，将他们全部赶出去！"
 scorza.14.t:0 "执行法条"
 scorza.14.d:0 "议会大厦前，斯科尔扎的亲临让精兵们惊愕不已。领袖以微笑相迎，言道他必须与那些企图颠覆他权力的人正面对峙，亲睹他们因罪受审的姿态。士兵们将议会清场后，领袖率黑衫军亲卫队决意直取议事厅。\n\n大门洞开之际，领袖率众昂然步入，步履间流露出古罗马将领的威严，发表演说痛斥台下众人的叛国行为，给予在场众人最后表明忠诚、免受其怒的机会。然而，所有人都选择了肩并肩，坚守他们的信念，不向此位暴君折腰。斯科尔扎在极度轻蔑中抛出了他最后的慈悲：自承其罪，然后自行了断。无人应声而起，斯科尔扎随之怒火中烧，咆哮着宣告了他们将被无情地铲除的命运。枪声响起，随着领袖一声令下，子弹无情地射向人群。在这场血腥屠杀的歌剧中，叛匪终于开始哀求宽恕。\n\n哀求之声在血雨腥风中此起彼伏，却唤不回领袖心中已逝的慈悲。"
 scorza.14.a:0 "你战向法律，我们战胜你"
 scorza.15.t:0 "掩饰"
 scorza.15.d:0 "叛徒已除，意大利得以获救，我们当洗净双手，将那些血腥往事深埋心底。以莫须有的罪名和精心策划的\"意外\"，将罗马至维罗纳的屠杀痕迹抹得一干二净。知晓内情者皆对领袖忠心不二，若未来再生变故，军队将作我们的坚强后盾。民众或许对我们仍心存疑虑，但目前仍然默许我们的存续。斯科尔扎，意大利之魂；意大利，斯科尔扎之影。无论荣枯，同绘流年。\n\n我们的罪行，绝不能显露于世，不可在暗处私语，更不得于酒后吐露半字。轻言这些行为者，无论本意如何，都将面临灭门之灾。我们正如履薄冰，稍有不慎就可能万劫不复，因为我们在罗马，在维罗纳所为……罪无可赦。若真相大白，我们的首级将成示众之物，意大利将陷入无尽混乱。\n\n然我们仍必须负重前行，将意大利塑造为它注定要成为的伟大国度。"
 scorza.15.a:0 "无论如何，这里发生的真相都会被永远掩埋"
 scorza.16.t:0 "真相大白"
 scorza.16.d:0 "难以置信……这绝不可能。\n\n\"斯科尔扎屠戮千人\"，这骇人听闻的标题遍布世界各大报刊。国际社会的领袖们口诛笔伐，我们仿佛被打入了无间地狱。人民呼喊着革命。有人匿名泄露了我们犯下的所有罪行，烈焰般的真相正围绕着我们熊熊燃烧。斯科尔扎亲自出面，通过电视讲话矢口否认，但铁证如山。裂痕在不断扩散，空气中弥漫着紧张的沉默。\n\n由于抗议活动太过激烈，一些城市的军队已经开始实施戒严，警察局的镇压力度空前。在帝国的殖民地，怒火已燎原，民众叱咤声声，呼唤降下正义审判。目前看来，全面革命的呼声尚未形成压倒之势，斯科尔扎背靠军队，尚算安然无恙。\n\n我们步入歧途，铸下大错，现在，是时候接受惩罚。愿我们未曾施予他人的宽恕，反过来照亮我们的归途。"
 scorza.16.a:0 "天哪……"
 ita.40.t:0 "齐亚诺的演讲"
 ita.40.d:0 "好耶"
 ita.40.a:0 "但愿他知道自己在干什么"
 ita.41.t:0 "禁令解除"
 ita.41.d:0 "好耶"
 ita.41.a:0 "欢迎来到这个大家庭"
 ita.44.t:0 "紧张的会议"
 ita.44.d:0 "我们的领袖，加莱亚佐·齐亚诺，最近刚从同法西斯大委员会主要领导人的会晤中返程，他在会议中试图拉拢这些人支持改革议程。更具体的说，他将目标转移到了那些要么在维罗纳大会上弃权，要么拒绝承认他为领袖的顽固保守派法西斯集团上。然而，尽管领袖已经用尽辞藻，却仍然没办法说服这些人支持他。\n\n就在会议结束的几小时后，齐亚诺接受了媒体采访，他坦言：“这些先生似乎不能接受他们身处的这个日新月异的世界。他们意识不到1921年的旧制度放到今天已经行不通了，如果想解决意大利当前面临的重大问题，那就必须展望未来，而不是执拗于过去。”\n\n反改革集团头目卡洛·斯科尔扎对齐亚诺可没什么好话。在大委员会特地泄露给媒体的一则演讲记录中，他谴责齐亚诺是一个“小丑”和“懦夫”，没资格担任领袖职位。"
 ita.44.a:0 "形势不容乐观……"
 ita.45.t:0 "变革之风"
 ita.45.d:0 "齐亚诺力图打动那些铁杆法西斯分子，却收效甚微；然在基督教民主党中，他的努力却似乎已开花结果。在与领袖阿明托雷·范范尼和阿尔多·莫罗举行的一次公开会议时，齐亚诺迫不及待地要展示自己的这一政绩。\n\n“这两位先生，正是引领意大利改革的新星！”他笑容可掬地对着镜头说道。“他们是我们在坚持基督教精神的同时改善劳工阶层生活的最好证明。”莫罗与范范尼对齐亚诺同样赞誉有加：“在墨索里尼离世之际，我们对国家的前途曾忧心忡忡。担心我们会步入德国的后尘——权力斗争激烈，底层劳工的福祉被忽视。但在齐亚诺的带领下，这些忧虑已烟消云散。”"
 ita.45.a:0 "祝他们好运！"
 ita.100.t:0 "叛乱分子袭击！"
 ita.100.d:0 "缺乏激进措施的改革已经惹怒了社会主义叛乱分子，他们对我们的一座城市发动了袭击。各方面的报道表明这帮人已经造成了相当程度的破坏，除非制止他们，不否则破环只会愈演愈烈。"
 ita.100.a:0 "该死的叛徒！"
 umberto.1.t:0 "齐亚诺下台！"
 umberto.1.d:0 "持续的危机正笼罩整个国家，而现任政府却未能给出应对方案，显然人们亟需一个新的领导人。军官们已经着手处理此事，然后对齐亚诺发动了政变。\n\n伴随着大多数城市回归秩序，大部分军队的指挥权也落入了变节者手中，齐亚诺的领袖时代似乎已然终结。"
 umberto.1.a:0 "愿主保佑我们。"
 ita.102.t:0 "卡洛·斯科尔扎批评领袖"
 ita.102.d:0 "国立报纸《意大利人民报》的读者今天惊讶的发现，新任党委书记卡洛·斯科尔扎在其上刊登了一篇文章。他在其中抨击了领袖及其对“法西斯主义的谋杀行为”，称齐亚诺的民主化行为是“坐视社会主义者像二十年代那般摧毁意大利”。并引述法西斯即“国家之命脉”的说辞，读者将其理解为斯科尔扎试图回到墨索里尼时期的法西斯主义时代，扭转当前的自由化趋势。尽管公众对此甚有不满，但法西斯大委员会的部分成员似乎对他的批评与想法表示赞同。"
 ita.102.a:0 "形势不容乐观。"
 ita.103.t:0 "黑色旅集结演变为暴力"
 ita.103.d:0 "今日在罗马，罗伯托·法里纳奇组织的集会演变成了一场暴力冲突，国家宪兵不得不介入驱散这群抗议者和集会人群。这场骚动由一群民主派掀起，法里纳奇对其极尽贬损，称他们为“犹太-布尔什维克傀儡”，加之其他不堪入耳的言辞，动乱的导火索已被点燃。法里纳奇因其在意大利声名狼藉的与德国重修旧好的极端主张，以及臭名昭著的反犹情绪而广受争议，他甚至宣称犹太人已经“侵蚀”了领袖之位。"
 ita.103.a:0 "好在我们把那个白痴赶出了法西斯大委员会，他的奇异构思永远没入谷底。"
 ita.104.t:0 "米兰市长被劫为人质！"
 ita.104.d:0 "今日，政府收到了令人震惊的消息，米兰市长吉诺·卡西尼斯被劫持为人质！市长办公室放置了一封勒索信，绑架者自称“红色旅”，要求交出5000万里拉、释放30名政治犯，方能使米兰市长“保全自己的性命与男子气概”。纸条末尾先是签名，“老大哥”，后面是交易地点的位置、时间宽限是五天。现在，市长的命运就由政府决定。"
 ita.104.a:0 "我们不会向恐怖分子屈服！忽略他们荒谬的要求。"
 ita.104.b:0 "人命可比那几个囚犯和钱重要，完全同意他们的要求。"
 ita.105.t:0 "肯尼亚叛乱平息"
 ita.105.d:0 "喜讯自非洲肯尼亚殖民地传来。据意大利守军报告，肯尼亚土地自由军所发起的茅茅起义终于被平息。历经一年旨在剿灭起义战士的鏖战，终于，在肯尼亚北部某战略铁路线上爆发了最后的决战，当地火车站亦在战火中化为灰烬。战后，意大利军队迅速定位并铲除了叛军的最后巢穴。\n\n像德丹·基马蒂这样的集团高级军事领导人被捕并在随后的突袭中被处刑。随着肯尼亚土地自由军领导层的土崩瓦解，这股叛乱的风云似乎已渐渐平息，不再动摇这片土地的宁静。"
 ita.105.a:0 "意大利的又一次凯旋！"
 ita.106.t:0 "翁贝托国王举办宴席"
 ita.106.d:0 "国王翁贝托二世今日大宴宾客，广邀意大利各地贵族。然而，军界高层亦在受邀之列，此事不免令人心生疑窦。虽然此次宴会只不过是一个礼节性聚会，但许多人猜测，国王此举或有深意，暗示着他的雄心壮志……"
 ita.106.a:0 "但是，一个傀儡又怎能扭转乾坤？"
 ita.107.t:0 "法里纳奇批评马耳他会议"
 ita.107.d:0 "今日在卡塔尼亚，法里纳奇，作为现在德国在意大利的少数朋友之一，发表了演讲。他的演讲，貌似揭示了马耳他会议的“真相”，实则满纸荒唐，尽是反犹太的陈词滥调，诬称会议不过为“犹太世界阴谋之傀儡”所掌握，正图谋“摧毁和蹂躏意大利之辉煌”。一如既往，他认为唯有再次与德国联手，方能救意大利于水火。然而，他的演讲鲜有人问津，只有少数死忠于他的支持者在场。"
 ita.107.a:0 "那人闭嘴了吗？"
 ita.108.t:0 "发现米兰市长已死！"
 ita.108.d:0 "比萨，一些有心的国家宪兵在撕票的截止日期后展开调查，发现了吉诺·卡西尼斯的尸体。他的尸体没在路边的沟渠里，全身赤裸并被阉割。恐怖分子的暴行，外加政府压根不打算营救市长，让他一味等死，引发人们的震怒。"
 ita.108.a:0 "行吧，至少我们没屈服不是吗？"
 ita.110.t:0 "资助影视业"
 ita.110.d:0 "伴随着我们最近对意大利电影业的改革，我们提出了为下一部伟大的意大利电影提供资金的承诺。奇内奇塔的几位制片人和导演提出了各种电影提案，它们千差万别，但政府已将其缩减为四种选择，交给我们的领袖决定。\n\n首先是《先锋》，它详细描述了一个第二次意大利-阿比西尼亚战争中意大利士兵为了对抗埃塞俄比亚野蛮人而勇敢作战的故事；第二部影片则叙述了罗马进军、法西斯意大利的建立以及从堕落的民主和无神论社会主义中拯救国家的历程；第三部影片讲述了尤利乌斯·凯撒在高卢的阿莱西亚战役，展示了意大利昔日的辉煌以及强有力的领导者在带来胜利与荣耀方面的重要性；最后一部则描述了一场意大利士兵在东线战场上的战斗，他们勇敢地与不那么能干的德国盟友并肩作战。\n\n选定的影片预计需要6个月才能完成，导演和制片人们正在等待领袖的回应。"
 ita.110.a:0 "关于埃塞俄比亚的那部影片听起来不错。这是恢复我们殖民声望的完美方式！"
 ita.110.b:0 "关于法西斯意大利光辉崛起的影片听起来很完美，这将向人们展示他们现在的生活有多么美好！"
 ita.110.c:0 "啊，谁能忘记罗马的辉煌呢？这部影片是将是我们回顾光辉岁月的完美之作！"
 ita.110.e:0 "我们最近击败敌人的壮举与相应的胜利，将是提醒人们我们面对的是谁的完美方式！"
 ita.111.t:0 "“那些埃塞俄比亚人”"
 ita.111.d:0 "最近，一部新的战争电影成为了全帝国的热门话题。该片以第二次意大利-埃塞俄比亚战争为背景，讲述了一支意大利部队在暴风雨中误入埃塞俄比亚领土，暴露后被当地人围困的故事。\n\n电影展示了意大利士兵的英勇行为和无私牺牲，同时刻画了埃塞俄比亚人对意大利俘虏和同胞的残忍暴行。影片以其激烈的战斗场面和残酷的现实震惊了观众，其中一个场景尤其令人震撼：一名复仇心切的意大利猎兵近距离射杀数十名埃塞俄比亚征召兵，这一幕甚至让不少观众当场晕倒！\n\n战斗以意大利部队的胜利告终，部队指挥官由前途光明的年轻摩德纳男高音歌手鲁契亚诺·帕瓦罗蒂饰演，他命令手下整队准备返回意大利阵地。电影的最后一幕展现了胜利的部队朝着日出进发，在帕瓦罗蒂的带领下高唱《青年》。\n\n这部电影作为一部业界公认的经典之作，必将在年轻一代的心中留下深刻的印象，使其久久不能忘怀。"
 ita.111.a:0 "没有顶级男高音，那是肯定的。"
 ita.112.t:0 "“进军罗马”"
 ita.112.d:0 "罗马的街道上挤满了排队观看新上映电影《向罗马进军》的市民。该片讲述了著名的进军罗马事件，并以墨索里尼亲自率领黑衫军队列，要求他们应得的权利作为结尾。\n\n这部电影被誉为电影界的杰作，尽管现实中墨索里尼并未实际参与进军，但扮演他的演员因其出色的表演而备受赞誉。"
 ita.112.a:0 "领袖万岁！"
 ita.113.t:0 "“阿列西娅之战”"
 ita.113.d:0 "一部新的历史史诗正在席卷全国！这部名为《阿莱西亚战役》的电影讲述了尤利乌斯·凯撒攻打叛逆高卢首领维钦托利的阿莱西亚堡垒的过程。这部长达三个小时的电影杰作充满了曲折离奇的情节，让那些不熟悉历史的人感到了深深的震撼。\n\n虽然电影因其夸张的时长而受到了一些批评，但它在激发年轻人对历史的兴趣方面赢得了广泛赞誉！"
 ita.113.a:0 "万岁！"
 ita.114.t:0 "备受争议的电影"
 ita.114.d:0 "最近上映的一部以二战为背景的喜剧电影在德国观众中引发了争议。影片描绘了德国和意大利士兵在东线并肩作战的情景，但德国士兵的形象受到了德国观众的负面评价。\n\n虽然电影中的意大利人被塑造成高效且专业的战士，批评者却表示，影片中德国人和共匪几乎没有什么区别。许多外国影评人为了表示抗议而给出了差评，但意大利观众却非常享受影片中对德国人搞笑的描绘。"
 ita.114.a:0 "可以说是以其人之道还治其人之身。"
 ita.115.t:0 "电影制作人们移居去了好莱坞。"
 ita.115.d:0 "意大利电影业如今正步入一个黄金时代，然而，所孕育出的影片却未必能迎合所有人的品味。不少制片人和导演倾心于艺术气息浓厚与戏剧张力十足的剧本，但他们的作品却在市场上遭遇冷落；而那些粗制滥造的战争片，只要披上法西斯胜利的外衣，便能轻易赢得满堂彩。\n\n面对此情此景，一些在本土未能崭露头角的电影人选择远渡重洋，赴美国开辟新天地，他们的作品在那里反而获得了更多的认可。好莱坞对这些新鲜血液的注入感到无比振奋，他们翘首以待更多天才的降临。"
 ita.115.a:0 "一个人的垃圾可能成为另一个人的宝藏，但它仍然是垃圾。"
 ita.116.t:0 "一次斯科尔扎与保禄六世的会晤"
 ita.116.d:0 "毫无疑问，意大利人民支持新的领袖，但仍有些人担心在斯科尔扎治下的未来，尤其是一些天主教徒。由于天主教徒的支持对于稳固国家政权至关重要，斯科尔扎安排了一次与天主教教宗保禄六世的会面。\n\n尽管这次会面名义上是两国领导人为改善帝国与梵蒂冈之间关系而作出的努力，但更直接的目标是通过展示圣父对于斯科尔扎作为新任领袖的支持，从而安抚那些仍有疑虑或恐惧的天主教徒。"
 ita.116.a:0 "值得铭记的会议！"
 ita.117.t:0 "反叛运动日益增长的流行"
 ita.117.d:0 "法西斯队员和四人委员会领导全国人民对抗腐化意大利的斗争的时代基本上已经过去了，积极参与法西斯组织不再引人注目和激动人心，因为任何一个优秀的个体都会加入人民选择的法西斯主义道路。法西斯主义已经变得司空见惯。\n\n当前，意大利的年轻人在寻找反抗他们的家庭、社会和权威的方式时，往往被寻求破坏现状的激进运动所诱导。虽然这些叛国组织目前仅限于小巷涂鸦和偶发的破坏活动，但如果不及时作出相应的应对，它们日益增长的流行将在未来导致更为严重的问题。不仅仅如此，每多一个被腐化的意大利青年人，我们就会损失一个忠诚的法西斯主义青年人。"
 ita.117.a:0 "可恶的小崽子们，要是在老子那个时代……"
 ita.118.t:0 "黑衫军正损失着他们的成员"
 ita.118.d:0 "无论是战前还是战争中，黑衫军都是确保意大利长治久安的重要组织。从打击共产主义者这样的渣滓，到传播法西斯主义的教义，他们的付出在帝国的建立过程中起到了不小的作用。\n\n然而当今，时代的大潮已经平静下来，黑衫军却没能随着时代的变迁而做出改革。因此，人们逐渐将其视为历史转折时期的遗物，许多人已经停止参加会议和集会，选择以他们认为更具的方式来度过空闲时间。\n\n尽管对黑衫军来说这是个坏消息，但总会有死忠的法西斯主义者继续维持这个组织。然而，如果将来有再次需要黑衫军的时候，只剩下几个老人来扛起这面束棒的旗帜，那情况就糟糕了。"
 ita.118.a:0 "或许我们应该向褐衫军请教一些建议？"
 scorza.26.t:0 "怎么处理齐亚诺？"
 scorza.26.d:0 "维罗纳对加莱亚诺·齐亚诺的最终审判结果已经成为今日头版新闻。齐亚诺和他的律师成功证明对其本人的大多数指控都是虚假且为斯科尔扎及其亲信捏造，对前任领袖的审判看似要发生戏剧性翻转。就在齐亚诺正一步步走向无罪释放的边缘时，突然有一则至关重要的“证据”完完全全证实了他的“罪行”。\n\n现在只剩对齐亚诺的判决结果了，他最终将被判处……"
 scorza.26.a:0 "这会是他最后一次愚弄我们这些法西斯主义者！判处他终身监禁！"
 scorza.26.b:0 "让他待在国内风险太大，把他流放！"
 ita.120.t:0 "罗伯托·法里纳奇可悲的一生"
 ita.120.d:0 "党报的读者们在看到详述黑衫军领袖罗伯托·法里纳奇的堕落和享乐主义的头条新闻后感到了深深的震惊。\n\n文章详述了法里纳奇在过去一周内的所作所为，包括购买大量毒品、雇佣大批妓女并返回他的豪宅等。根据党的监听和正在进行的调查显示，法里纳奇在吸食可卡因的同时与多名妓女发生了性关系。人们对此感到震惊，但其最顽固的支持者们却仍然声称这些明显的证据是伪造的。"
 ita.120.a:0 "我猜你会说我们被打了个措手不及！"
 ita.121.t:0 "发现法里纳奇已死！"
 ita.121.d:0 "黑色旅领导人罗伯托·法里纳奇被发现死在一间破旧的公寓里，手里拿着枪，头部中弹。政府尽了全力搜查，但没有发现遗书。一些异想天开的报纸报道称，公寓的窗户被打破了，还有目击者曾听到房间里有威胁声，但这些显然是为了吸引新读者而设计的耸人听闻故事。"
 ita.121.a:0 "蠢货得到了应得的报应。"
 ita.122.t:0 "斯科尔扎外交占位符"
 ita.122.d:0 "占位符"
 ita.122.a:0 "为此做个决定"
 ita.123.t:0 "循此苦旅，以达天际"
 ita.123.d:0 "意大利火箭发射平台孤独地耸立在肯尼亚海岸线上。此刻，阿明·克鲁格正站在加固隔音的控制室内。距离倒计时归零还有五分钟，他注视着工人们匆忙完成发射程序，一级火箭正在注入四氧化二氮燃料——这可是他的心血之作。二十年前，他是新兴火箭领域的先驱，参与设计了轰炸英国的导弹，这批导弹后来直接被用于海狮计划。战后，他的前途似乎一片光明，德国在出人意料地战胜了同盟国集团、建立起欧洲的新秩序后，将目光投向了星空。但仅仅不到十年，德国经济崩溃，德国梦随之破灭，星空之旅也成了无稽之谈。阿明知道这股航天之风将吹向哪里，在经过深思熟虑后，他和家人逃向了德国的新对手——意大利。墨索里尼知道太空将成为大国竞争的下一个前沿领域，因此，他希望意大利能够自力更生，发展自己的空间发射能力。阿明带来了德国火箭技术的秘密，并在新成立的意大利航天局的支持下开始设计起了新的发射载具。现在，多年的努力即将结出果实，眼前的欧罗巴1号火箭仅仅是一个样品，其三级火箭仅仅只能运载一吨载荷，运载高度也只能达到低地球轨道而非更高的高度。但对目前来说，这已经足够了。\n\n当倒计时进入最后一分钟时，警报声响起，工人们纷纷跑进掩体。欧罗巴1号火箭的各级开始加压，阿明等待着那个决定胜负的时刻的到来。最终，随着一道闪光和一阵震动，火箭从发射台升空并直冲云霄。仅仅几分钟后，它便脱离地球大气层，将其中的卫星送到了距离地球两百五十公里的稳定轨道上。被称为圣马可A号的卫星非常原始，其只有一个无线电发射机和一个测量电离层中带电粒子浓度的传感器，但任何一个在它下方的无线电操作员都可以接收到它发出的信号。一天后，意大利政府宣布意大利成为了第四个将卫星送入地球轨道的国家，并宣称即使是地球的引力井也无法阻挡法西斯革命的火焰。\n\n但千里行军才起步——余路还长着呢。"
 ita.123.a:0 "前进！"
 ita.124.t:0 "发射圣马可D"
 ita.124.d:0 "在一个宜人的十一月早晨，欧罗巴2号火箭在两年前将圣马可A号送入轨道的同一发射平台上进行了首次发射。这枚运载火箭是欧罗巴1号设计的改进版，其增加了第四级火箭，可以将约一百公斤的载荷送入地球同步轨道。虽然提升有限，但足以完成当前的任务。作为意大利航天局第一阶段航天探索工作的最后一部分，此次欧罗巴2号火箭将把圣马可D号卫星送入轨道。一旦进入轨道，火箭的第四级将把载荷送抵到二万五千公里的高度，正好位于地球的范艾伦辐射带中间位置。对于德国的登月计划来说，穿过这一辐射带仅需几个小时，项目很容易就可以得到回报，但将卫星保持在与辐射带永久相交的轨道上则是一个完全不同的挑战。圣马可D号携带的仪器将用于测量辐射带中高能粒子的密度及其对电子设备的影响，其在运行了一周后发生了灾难性的短路，完全停止了工作。然而，它所提供的数据不仅仅对意大利人，对全世界的卫星运营商来说都是无价的。随着这一伟大的胜利，意大利航天局将向其项目的下一个里程碑继续迈进。"
 ita.124.a:0 "科学之进军。"
 ita.125.t:0 "空中砾石"
 ita.125.d:0 "今年三月，欧罗巴2号进行了最后一次飞行，将天狼星1号卫星送入了地球同步轨道。该卫星配备了利用从“圣马可D”卫星收集的数据所设计的抗辐射电子设备，这使其能够在范艾伦辐射带运行数年。虽然它包含了与其前序卫星类似的科学仪器，但其主要有效载荷是一组高频转发器，这使其能够接收和传输来自世界各地的无线电信号。在接下来的两年里，意大利航天局不会仅仅止步于无线电通信，还将用它来测试卫星传输电视甚至电影的可行性。此前许多未来学家曾有在地球静止轨道创建民用通信卫星网络的宏伟构想，而现在意大利人正使之成为现实。然而，构建这样一个网络所需的卫星重量需要比“欧罗巴2号”能提供的有效载荷能力高得多，完成这个项目需要一枚新的、运载能力更强的火箭。幸运的是，意大利的相关研究工作正在进行中，全世界都会为此投来关注。"
 ita.125.a:0 "让我们看看克鲁格要干什么"
 ita.126.t:0 "欧罗巴3号首秀"
 ita.126.d:0 "阿明·克鲁格站在自升式驳船的控制室内，目视着意大利航天局的最新杰作正在为首飞做准备。尽管天空阴云密布，但气象员认为发射不会有太大风险。七年前，正是从这个设施中，他亲眼目睹了意大利的第一枚轨道火箭发射升空，这一事件给世界上的弱国带来了希望。现在，他希望意大利能再次改变世界。\n\n现在矗立在发射台上的欧罗巴3号比其前辈有了根本性的改进。配备有两级能够将7.5吨有效载荷送入近地轨道的核心设计的欧罗巴3号有着模块化设计的突出特点，因为它可以额外加装一个可选的第三级和最多四个固体火箭助推器。其完全体可以将多达18.5吨的有效载荷送入近地轨道，或将7.5吨的有效载荷送入地球同步轨道。这次升级是必要的，因为航天早已超越了太空竞赛初期发射的轻型有效载荷。\n\n随着倒计时逐渐数到零，阿明等待着，暗自担心如果意大利的最新项目遭遇意外挫折所带来的严重后果。幸运的是，火箭顺利起飞，它的四个RX.2发动机推动其穿过平台上空的灰色云层，消失在视线之外。几分钟后，欧罗巴3号成功将Sirio-2卫星送入地球同步轨道。这将是意大利发射的第一颗真正的通信卫星，服务于地中海和中东地区。在接下来的几年里，还会接着发射更多的卫星。\n\n然而，这次发射最重要的结果并非仅仅如此。在欧罗巴3号首飞仅几天后，意大利航天局就宣布了一项令人惊讶的声明：它将允许第三方运营商将他们的有效载荷发射到太空，并为欧罗巴3号的各种配置提供了不同区间的价格。许多国家和商业卫星制造商纷纷开始订购意大利航天局的发射服务。这是改变航天业的航天商业革命的开始，因为人类历史上第一次，私营实体和二流国家将有能力进入外太空。"
 ita.126.a:0 "而意大利的野心还不止于此。"
 ita.127.t:0 "座位之争"
 ita.127.d:0 "在格伦政府宣布美国恢复载人航天飞行后的几个月后，意大利政府就一项在华盛顿引起不小轰动的提议与新总统接洽。这位新加入自由国家组织的成员国在近十年前就已经进入了太空，但意大利航天局却一直在无人操作中固步自封。可现在的情况已经截然不同了。意大利航天局希望通过他们的新盟友做些他们做不到的事情，因此每隔几次任务意大利航天局就要求为一名意大利宇航员预留一个NASA航天器座位。虽然格伦政府中的一些成员接受了这个想法，但绝大部分的共民联盟参议员和大多数的国家进步公约组织参议员都强烈反对，他们认为NASA的项目是一项纯粹的美式壮举，在意大利证明自己有资格搭乘美国火箭上天之前，应该限制其进入。甚至格伦本人也对此持怀疑态度，也许是由于他对该计划的个人感情。可无论如何，意大利航天局都不会退缩，因为让一个意大利人飞入太空，哪怕只是可能，都是一个让人欲罢不能的巨大奖赏。看起来，“座位之争”在短时间内还无法解决。"
 ita.127.a:0 "美国人会明白的。"
 ita.128.t:0 "意大利获准参与NASA的航天飞行项目"
 ita.128.d:0 "出乎意料的是，经过一年多的谈判，美国国家航空航天局和意大利航天局联合宣布，美国国家航空航天局将允许一名意大利宇航员参加近地轨道飞行任务，并且意大利还可能在未来的任务中被保留座位。在意大利，人们对这一消息欢呼雀跃，因为意大利人飞入太空的梦想终于成为现实。目前，意大利航天局正在寻找潜在的宇航员候选人，他们将接受为期两年的艰苦训练，之后他们要么退出项目，要么获得宇航员的身份。意大利人民只能希望有人能够挺身而出接受这一挑战。"
 ita.128.a:0 "意大利再度逐梦"
 ita.129.t:0 "座位之争"
 ita.129.d:0 "在意大利以平等伙伴身份加入共荣圈后的几个月后，该国向日本政府提出了一项在东京引起众多关注的提议。意大利在近十年前就已经进入了太空，但意大利航天局却一直在无人操作中固步自封。可现在的情况已经截然不同了。意大利航天局希望通过他们的新盟友做些他们做不到的事情，因此每隔几次任务意大利航天局就要求为一名意大利宇航员预留一个日本宇宙航空研究开发机构的航天器座位。虽然一些官僚机构成员接受了这个想法，但绝大部分的贵族院议员表示强烈反对，他们认为日本宇宙航空研究开发机构的项目是一项纯粹日式盛举，在意大利证明自己有资格搭乘日本火箭上天之前，应该限制其进入。甚至连首相本人也对此持怀疑态度，也许是由于他对该计划的个人感情。可无论如何，意大利航天局都不会退缩，因为让一个意大利人飞入太空，哪怕只是可能，都是一个欲罢不能的巨大奖赏。看起来，“座位之争”在短时间内还无法解决。"
 ita.129.a:0 "日本人会明白的。"
 ita.130.t:0 "意大利获准参与日本宇宙航空研究开发机构的航天飞行项目"
 ita.130.d:0 "出乎意料的是，经过一年多的谈判，日本宇宙航空研究开发机构和意大利航天局联合宣布，日本宇宙航空研究开发机构将允许一名意大利宇航员参加近地轨道飞行任务，并且意大利还可能在未来的任务中被保留座位。在意大利，人们对这一消息欢呼雀跃，因为意大利人飞入太空的梦想终于成为现实。目前，意大利航天局正在寻找潜在的宇航员候选人，他们将接受为期两年的艰苦训练，之后他们要么退出项目，要么获得宇航员的身份。意大利人民只能希望有人能够挺身而出接受这一挑战。"
 ita.130.a:0 "意大利再度逐梦"
 ita.137.t:0 "一个台式计算器？"
 ita.137.d:0 "意大利打字机制造商奥利维蒂在由意大利工业复兴研究所赞助的贸易展上展示了他们的最新产品，这标志着消费类电子产品的一次重大飞跃。Programma 101是世界上第一台台式可编程计算机，采用时尚、未来感十足的塑料外壳，不仅能够执行基本的算术运算，还能够在其电子存储器中存储输入和输出的信息，并接受能够让用户实现自定义功能的汇编语言代码——其售价仅为两百万里拉，即三千美元。这款设备有可能颠覆从会计和金融到工程和科学研究的白领工作。奥利韦蒂已经收到了超过一万个来自大公司和小企业的订单。一些人认为，这种微型计算机充其量只是新奇玩意——不过是工程师和商人的高级玩具。然而，也有少数人认为，Programma 101是数字革命的先兆，最终将使工业化世界的每个市民的办公桌上都有一台计算机。"
 ita.137.a:0 "也许仅仅是一时的风尚。"
 ita.138.t:0 "废土利维坦"
 ita.138.d:0 "博洛尼亚大学刚刚宣布了一项前景广阔的发现。上个月，著名的意大利古生物学家和古海洋学家切萨雷·埃米利亚尼领导了一次进入了亚得里亚海的深处的探险。\n\n经过一周的搜索，该团队在一处基默里奇阶时期的露头岩层中发现了一个几乎完整的化石。这个是蛇颈龙的化石，它是一种曾是中生代海洋的顶级掠食者的巨大的、长颈的海洋爬行动物古老分支。这个新物种被命名为埃米利亚尼龙，以其发现者的名字命名，它被视作是世界著名的丽鳌龙的近亲，在约1.55亿年前的晚侏罗纪时期的古代亚得里亚海中游荡。\n\n这次探险令世界各地的古生物学家们欢欣鼓舞，因为这表明亚得里亚海可能还包含无数其他化石。这可能是未来众多来自地中海的古生物学发现中的第一个。"
 ita.138.a:0 "谁知道阴影深处还潜藏着什么？"
 ita.139.t:0 "来自黑日之下的恐惧"
 ita.139.d:0 "列兵罗伯托凝视着眼前的群山。在尼扎市长大的他，不可能没有越过环绕着城市的平原和森林，远远望去，眺望更远处高耸的石峰。通常，巡逻多山地形是他在所指派的基地进行艰苦训练的一个喘息机会——在这里他最操心的不过是背上沉重的贝瑞塔步枪。\n\n可现如今，在阿尔卑斯山漫步却成了一种充满厌恶和恐惧的历练。\n\n毫无疑问，世界正陷入彻底的混乱之中；德国已陷入内战，纳粹帝国正迅速崩溃。但是他并非对此感到厌恶。说实话，他欣然自喜于那帮建造了可怖庞然大坝的奸诈德国人再次得到报应。\n\n报纸酷爱刊登布尔根迪安进军法国的消息。据说他们的攻势比二战时还要迅速；现在巴黎和大片前法国领土都牢牢掌握在“暗影之国”手中。大多数人并不太在意这些新闻：他们更关心的是最近的工资或者有关当地面包价格的最新消息。然而，罗伯托不能享受这种奢侈的无知。\n\n现在，每天当他被安排到那些该死的山上巡逻时，都会遇到他认为不可能的恐怖场景。每一天，他都会遇到又一批法国难民，大多数身上都带有生冻疮的枪伤，奄奄一息。那些勉强越过阿尔卑斯山高峰的人，通常都会在边境附近倒下，极少数人会被拖到一个类似医疗中心的地方，随后被进一步送往内陆接受审讯。然而，大多数人被发现时都只剩下布满了枪伤的残破尸体，苍蝇在他们身上嗡嗡作响。\n\n每天当他走在那些山间小径上时，都会被委派于无名的沟壑中将他们埋葬。"
 ita.139.a:0 "罗伯托的调动请求遭拒。"
 ita.140.t:0 "朱塞佩·吉拉尼"
 ita.140.d:0 "三个小时后，车队突然停了下来。\n\n吉拉尼是最后几个下车调查究竟为什么他们会检查的司机之一。在这一刻，他几乎已经听天由命了。他叹了口气，戴上宽边草帽，轻轻打开卡车车门，走进了沙漠。\n\n他踏上了湛蓝大海的遗骸：亚得里亚海。他经常梦见自己独自一人和大海、天空、渔网在一起度过的日子，对着轻柔的风哼唱摇篮曲。现在，他在威尼斯的捕鱼日子已经结束，他靠连续开车几个小时穿越梦想破灭的沙漠，向难民营运送物资为生。\n\n哦，过去发生了什么。他在三十年代热切地加入了法西斯党，至今仍为这一事实感到无比自豪：他的忠诚——某种程度上说是这样——得到了新领袖的回报。他所从事的工作是一份政府工作，对此他心怀感激。然而，领袖并不是党内唯一的权威。在家乡，他的弟弟逐渐与斯科尔扎的派系达成共识，甚至他自己也被斯科尔扎的花言巧语和重返辉煌过去的承诺所吸引。尽管他喜欢罗马政治雄辩与刺激，但他深知，无论是谁，都无法填满亚得里亚海的空缺。\n\n朱塞佩的衣服粘在皮肤上，非常不舒服。在车队停下的前方，一小群司机和乘客围成一个圈，挡住了他的视线。他挤进人群，看到两具尸体——体型不过是青少年，躺在一艘积满灰尘的木筏的阴影下。这是两名德国难民，在逃离埃马努埃莱的营地后，被遗弃在阳光下任尸体腐烂。"
 ita.140.a:0 "司空见惯，熟视无睹。"
 ita.141.t:0 "军事演习：代号雷必达"
 ita.141.d:0 "红队裁判，一位总参上校，面对初次谋面的乔瓦尼·德·洛伦佐将军，重述了他所传递的消息，时值红队数员踏入室内。\n\n“如我之前所言，我们判定红队对巴利阿里群岛的攻势以微不足道的代价告捷，损失仅限于一个在运输途中的旅和两艘被沿海炮火击中的驱逐舰。”此言一出，军官们，这些世界第四强国的军事精英中爆发出一阵欢呼，但上校一举手，顿时四下寂静无声。“然而，我们同时认为绿队对阿尔及利亚的进攻未能遭到有效抵抗，敌军正向奥兰挺进。”\n\n方才的欢声如被冷水浇灭，一片沉默。巴利阿里群岛，作为战略要地，对抗击敌军至关重要；而阿尔及利亚一旦失守，利比亚乃至西西里岛都将岌岌可危。\n\n德·洛伦佐将军正筹谋着如何扭转乾坤，费德里科·达奎诺，肩负阿尔及利亚防线的将领，急步向前，举手问道：“请问，我们是否还有机会撤回该地区的部队？我们在那个战区部署了六个师和数十个独立单位。”裁判员沉吟片刻，答道：“达奎诺将军，回答你的问题：可以，但需知其中两个师尚存战斗力，无法撤回。”年轻的指挥官严肃地点了点头，示意两名副官，然后回到了模拟演习的指挥中心。\n\n裁判员迅速传达了剩余的消息便离开了，将军们则三三两两聚在一起，商讨对策。德·洛伦佐将军心情复杂，既感自豪又忧心忡忡，但他提醒自己，游戏之中犯错，总好过现实中的灾难。在这里，失败不过是一时之耻，而非生死存亡。"
 ita.141.a:0 "然而，真实情况却是……"
 ita.142.t:0 "土匪所在"
 ita.142.d:0 "乔瓦尼·罗西中士已经疲惫不堪。他整天都坐在一辆闷热的卡车里，最终却只抵达了一个位于阿尔及利亚沙漠中心的小村庄。\n\n他只能靠着破旧的布座椅稍稍放松一下，可当卡车在无尽沙漠中穿越数个小时后猛然停下来时，他忽地完全警觉了起来。踏出车门后，即使阳光刺眼也无法遮挡住他们穿越阿尔及利亚之旅的目的地——在地平线下方，一片小型建筑映入眼帘，大多数不过是简单的茅屋。\n\n他和一队意大利士兵来到这里，仅仅是为了抓捕——或者杀死——一个人：一名被称为“阿尔及利亚卫士”的游击队员。这名恐怖分子是一个著名的抵抗运动成员，年龄不超过30岁，却已经折磨了阿尔及利亚驻军数月。作为组织袭击重要补给车队和意大利军事基地附近零星交火的头目，这个人一直是驻军——也是罗西——的心头大患。\n\n然而，能让他们找到他的确切位置还是因为游击队的一次前所未有的扩大行动——他在一次对运输车队的极为成功的袭击后犯下了直接绑架三名意大利指挥官的严重错误。在当地意大利情报小组的努力下，罗西的小队能够追踪到叛军和人质的位置，来到了这个村庄。\n\n罗西向和他一起到达的小队解释了这些情况后，手握步枪，开始向定居点进发。"
 ita.142.a:0 "咱们要让这些人质平安回家！"
 ita.143.t:0 "一个入口"
 ita.143.d:0 "历经漫漫度日如年的时光后，罗西和他的队伍终于到达了小定居点的边沿。这个村庄从远处看就已经很不起眼了，靠近后也一样平平常常。村里的大部分建筑都铺列着泥砖和破布，裂缝显露出来，木头在时间的压力下碎裂。然而，就在他和他的队伍准备正式进入村庄时，罗西注意到远处有一道亮光。定睛一看，他意识到——那是一队伊比利亚士兵，还有配备的车辆！\n\n确认自己确实看到了伊比利亚旗帜独特的绿色和红色后，他向他的队员示意：“停下，伙计们。我发现了伊比利亚部队。”按照规定，他现在必须尝试呼叫伊比利亚部队，并询问他们为何出现在意大利领土上。为此，无线电上安排了一个特定频率——当然，这是在伊比利亚和意大利无线电官员数周的反复讨论后决定的。他解下腰带上的无线电，发出讯息：“塔尔米内的不明部队，这里是意大利驻军，请表明你们的身份。”\n\n很快他收到回复：“这里是伊比利亚驻军，你们他妈的在这里干什么？这是伊比利亚领土。”\n\n罗西惊呆了。是的，他们是靠近边境，但这里明显是意大利属阿尔及利亚的一部分！“抱歉，这里什么时候成伊比利亚的土地了？这个村庄窝藏着一名活跃的恐怖分子，我们建议你们不要干涉我们抓捕他的行动。”"
 ita.143.a:0 "“好吧，你知道吗……我们也在寻找恐怖分子。”"
 ita.144.t:0 "坚称与让步"
 ita.144.d:0 "“好吧，你知道吗——我们也在寻找一个恐怖分子。”\n\n罗西被这个消息惹火了，他低声自言自语道：“哦，你们一定是在开玩笑。”他转向无线电话筒，叹了口气：“我们说的是同一个人吗？这个恐怖分子直接劫持了要员做人质，我们将不惜一切代价将他们带回，不管伊比利亚方面反对与否。”\n\n伊比利亚人在电流的噼啪声中回复道：“考虑到这个村庄的规模，我想不可能还有其他人。”停顿了一下，声音继续说道：“但是，这个人直接从伊比利亚占领区偷走了必需补给，因此我们要求你们不要试图再一次干涉我们取回物资。”\n\n罗西强压住一句咒骂，回应道：“你难道没听到我刚才说的话吗？我们正在积极营救人质！”他几乎是在喊，“我们不可能等你们找到天知道藏在哪里的装备！”思索片刻，罗西突然明白了——竟然还是在意大利领土上——对方敌意的来由。就在几个月前，意大利士兵曾“借用”过伊比利亚在一次成功的游击队袭击后的残骸中找到的装备，这让伊比利亚驻军大为光火。尽管伊比利亚声称这些装备对维护阿尔及利亚的长期安全至关重要，但是没有任何装备被归还回来。罗西转向副官，提出了自己的见解：“他们担心我们会偷他们的装备，”他解释道。\n\n副官沉思片刻，严肃地回答道：“只要这不是我们两国的联合行动，他们就决不会让我们通过。”"
 ita.144.a:0 "这将是漫长的一日。"
 ita.145.t:0 "攻势"
 ita.145.d:0 "如果中士乔瓦尼·罗西曾经认为，在阿尔及利亚酷热的沙漠中巡逻一整天就已经是最为疲惫的事，那么现在他才知道自己真是大错特错。事实证明，在阿尔及利亚酷热的沙漠中度过一整天，同时还要与伊比利亚士兵协商进行联合突袭——还是在一个人口不过百人的村庄里——比最艰苦的训练还要让人身心俱疲。\n\n当收到最终批准时，夜幕已倏然降临，急遽消逝的橙光照耀着沙地，意大利和伊比利亚士兵在破旧村庄的最深处会合。罗西轻而易举找到了目标建筑，然后沿着棕色的墙壁就位。\n\n伴随着内心隐隐的忧虑，他下达了命令。\n\n“破门。”\n\n列兵罗马诺显然对此次行动非常兴奋，他立刻用力踢开门，伴随着震耳欲聋的巨响，随后他冲进房间，其余的意大利小队紧随其后。他们原本预期会有交火，但是却什么也没遇到。\n\n在建筑昏暗的单间内，他们既没有找到恐怖分子，也没有发现人质，只有刚被毁坏的门上飘出的灰尘。一直到刚刚被踢开的门洞稍微扩大了一点。微微变亮的房间中浮现出三具失踪官员的尸体，高悬于屋中，被穿过破损门框射进的微弱橙光照映着。\n\n“他妈的，”罗西咕哝了一声，随后伊比利亚士兵也挤进了狭小的房间。"
 ita.145.a:0 "叛逆之徒不再。"
 ita.146.t:0 "最后一笑"
 ita.146.d:0 "“本庭认定您犯有六项危害国格罪、三项反国家活动罪以及一项危害公共经济罪名。”\n\n加莱亚佐·齐亚诺畏缩在这湿气弥漫法庭中的硬木板凳上，此刻他简直不敢相信自己的耳朵。就在几年前，自己还贵为意大利领袖，国家唯一的领导者！再看看现在的他，就像个囚犯一般被人判刑，还被打成叛徒！他和他的律师团队英勇地同斯科尔扎那一派胡言的指控进行辩护，用尽了书中的每一个字眼就为了能让自己无罪释放，或者至少别直接丢掉小命。唉，这样的伎俩现在可救不了他。汗珠从他的额头上滴落，他准备接受最终审判。\n\n“据此，本庭判处您三项终身监禁处罚。”\n\n齐亚诺继续保持缄默。还有什么能说的？他输了。他在位期间尝试改变的一切——三头同盟、法西斯党、意大利——所有的努力都将化为泡影。他的成就将逐一被删去，直至人们都只认为他齐亚诺是个失败的暴君。\n\n正当两名面色严峻地警察要给齐亚诺带上手铐时，他开始戏谑地大笑。寂静的法庭被他打破了，被废黜领袖的笑声不断回荡着。啊！这一切真是太他妈荒谬了！他猛地向前，外面刺眼的阳光向他一步步逼近——而他只能放大他的笑声。凝重的空气就像让人度过一生之久，齐亚诺走进了耀眼的阳光下，笑声从背后吞噬了他。\n\n在被塞进一辆黑色警车的最后，他尝试呼出最后一声呼喊——因为这将成为领袖齐亚诺的绝唱。"
 ita.146.a:0 "……他就这样退下了舞台。"
 ita.147.t:0 "我重拾本真之名"
 ita.147.d:0 "在与有法西斯倾向的热那亚市官员就如何在当前危机中稳定市政府进行的又一次徒劳无功的会议之后，热那亚的执政官维托里奥·佩尔图西奥刚喝了太多的皮埃蒙特葡萄酒，在办公室里无精打采地躺着。随着时间的流逝，他的愤怒和决心越来越强烈，逼迫他到了爆发的边缘。他在醉酒的狂怒中扯下他的国家法西斯党徽章，扔进了壁炉，看着那个该死的符号化为灰烬。他知道自己必须做什么。第二天早晨，他将辞职信送到了当地的国家法西斯党总部。这是他在醉酒时做出过的最好的决定之一，佩尔图西奥想着。\n\n在热那亚的一个清晨，成千上万的人聚集在执政官办公室前。佩尔图西奥站在台上，环视着他的观众。聚集在他面前的人们既困惑又愤怒。他们都已经听说了执政官与国家法西斯党的决裂，他们想要一个解释。虽然担心他们的反应，但他仍决定为自己辩护。当他演讲时，他回想起了该死的法西斯制度对他的城市造成了多大的破坏，他的脾气随之变得更暴，声音也越来越高，最终在广场上回荡。\n\n“自从德国霸权建立以来，我们意大利人就一直将我们的不幸归咎于德国人。但你们都应该记得，最初将我们带入这个困境的恰恰是墨索里尼那令人作呕的意识形态。你们知道我从来都对法西斯主义没有太大兴趣——我唯一知道的黑衫是神父的袍子。但我不能再假装拥护它来为意大利服务了，特别是在它那脑子缺根弦的政策已将整个世界拖入黑暗之中，使我们的国家过度扩张，并使其人民士气低落的时候。我就是做不到。我这辈子再也不会向束棒标志低头。”\n\n当佩尔图西奥结束了他的长篇大论后，他听到了掌声，抬起了头。令他愕然的是，热那亚人民居然认可了他的愤怒抨击。广场上的一位官员——此人现在公开佩戴着基督教民主党的徽章，这令他十分惊讶——大声喊道：“那么，现在您打算怎么办，执政官先生？”佩尓图西奥挺起胸膛说：“别再叫我执政官了。我不会接受那个肮脏的头衔。如果要我再次为这个国家服务，那将是作为一个由人民选举出来的人，就像昔日的美好时光一样。但在那之前，我不会向墨索里尼那伙人卑躬屈膝。在黑衫军来抓我之前，叫我‘市长’，否则别跟我说话。”\n\n市民们开始更加热烈地呼喊他们的赞许，高呼着“市长万岁”之类的口号。热那亚市长维托里奥·佩尔图西奥体会到了多少年来都未曾感受过的希望；就在他沉浸在这种感觉中时，他听到一声叫喊。早先那位官员现在正在分发基督教民主党的徽章，这些徽章像热蛋糕一样迅速消失；市长冲下讲台，自己也拿了一个。"
 ita.147.a:0 "“如果您愿意，请向阿尔多·莫罗先生致以我的问候。”"
