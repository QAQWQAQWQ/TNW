 STC_the_reign_of_terror: "恐怖统治"
 STC_the_reign_of_terror_desc: "圣克鲁斯的财富堪称血腥资本，由莫龙的暴徒屠戮生灵堆砌而成。未能在第一时间沦为革命民族运动暴政祭品的居民，往往要面临更为可怖的命运——许多人的住宅在光天化日下被疯狂的邻居洗劫一空，而这些人很快也步上掠夺者的后尘。少数坚守“道德”不愿劫掠者，往往因傲慢而陈尸陋巷。救赎之路已然断绝，唯有死亡才能涤净生者罪孽。"
 STC_revolutionary_army: "革命军"
 STC_revolutionary_army_desc: "忠诚之军不同于能征善战之师，二者往往相伴相生，却未必因果相连。如今圣克鲁斯军队对桑多瓦尔·莫龙言听计从，偶有抗命者难免遭遇飞来横祸。令人扼腕的是，这些“刺头”多是久经沙场的将领。纵使莫龙的亲信与宿将同样骁勇，但指挥架构瓦解殆尽的现状，终究令军团的战力大打折扣。"
