 STC_Luis_Sandoval_Moron: "路易斯·桑多瓦尔·莫龙"
 POLITICS_LUIS_SANDOVAL_MORON: "卢乔回到了属于他的城市，仅此一句便道尽沧桑。\n\n路易斯·桑多瓦尔·莫龙将毕生热血倾注于圣克鲁斯的抗争——不是东部种族主义党那群法西斯投机者虚构的圣克鲁斯，而是属于贫民与全体玻利维亚人的真实圣克鲁斯。抵抗巴拉圭侵略者及其分裂主义同谋的革命斗争，是他毕生引以为傲的事业，当从弗罗伊兰·卡列哈·卡斯特罗手中接过圣克鲁斯革命民族主义运动领袖的权杖时，他便预见了胜利的曙光。但正如伊卡洛斯飞得太靠近太阳，命运早已埋下伏笔。\n\n背叛者不是铭记他抗击大地主恩情的民众，而是同袍兄弟。被机会主义腐蚀的查韦斯·奥尔蒂斯兄弟在第五次查科战争中亮出毒刃，不仅拒绝支持玻利维亚人解放同胞的壮举，反而向敌人屈膝。他们竟敢谴责桑多瓦尔在战争中采取的雷霆手段，诋毁他为凝聚军心实施的铁腕政策——何其荒谬的指控！\n\n这对兄弟裹挟了革命民族主义运动的大多数，将桑多瓦尔逐出圣克鲁斯故土。流亡岁月里，复仇的毒液在他血管中奔涌，誓要让所有背叛者血债血偿。仇恨在他心中日积月累，如今终于到了清算的时刻。整座城市已在他掌心颤抖，查韦斯·奥尔蒂斯兄弟即将成为猎物，分裂主义者将被送上断头台。至于他们的妻子？爱情与战争本就不择手段。"
