 FIN.125.t: "芬兰人的怯懦"
 FIN.125.desc: "为了和平与安全，我们献出了忠诚。作为回报，我们换来了与亲人团圆的时刻。然而，今日赫尔辛基高高在上地向我们颁布了令人费解的命令——在占尽天时地利的局面下向俄罗斯人投降。他们的态度傲慢而不屑，将我们视作随意可舍的牺牲品。\n\n在最高指挥部，每个人都对此决策感到迷茫。我们正在令俄罗斯血流成河，他们却无力突破我们的防线。难道芬兰已经对胜利丧失信心？难道他们认为不配为那些“可怜的俄国人”牺牲高贵的芬兰血脉？难道赫尔辛基当局已经失去了理智？\n\n如果芬兰选择投降，将我们抛弃，那无疑将为俄罗斯人提供了正义和充满希望的理由去“收复失地”。相较于那些狂妄的布尔什维克和法西斯，也许这个政府才是真正的智者之举。士兵们正等待着将军的号令，他们已为这场战役做足了准备，誓言以鲜血浇灌这残酷的终章。但现在，我们孤立无援，芬兰不再提供任何支持，我们只能依赖自己来构筑最后的抵抗。但这场血腥、残酷且徒劳的战斗，真的值得吗？也许我们应当把握芬兰撤退、新政府成立的机遇，放下武器，去拥抱和平。"
 FIN.125.a: "愿新俄罗斯比先前的仁慈一些。"
 FIN.125.b: "我们不会就此无声无息地步入黑暗！我们不会不战而退！"
 POLITICS_JUHA_RIHTNIEMI_DESC: "政治家有两种类型——一种是喧嚣张扬的表演者，他们拥抱喧嚣张扬的政策；另一种是默默奉献的工作者，没有他们，全世界政府都会瞬间崩溃。尤哈·里赫特涅米就是这样的一个人，极度爱国，来自一个深涉政治的家庭，专注于人民的福祉以及个人兴趣，即将东卡累利阿完全纳入芬兰版图。\n\n当德国经济崩溃，民族联合党高层全都黑头垢面时，尤哈却保持了清白。作为一名勤勉且经验丰富的公务员，他冷静而又有调理地处理了西俄战争，以高达72%的选票当选为总统。\n\n在担任总统期间，尤哈稳步而坚定地发展国家，尽管国家依然在德国巨头与逐渐恢复的俄罗斯碎片间走钢丝。他虽然授权了对奥涅加芬兰部队的大规模资金支持，以抵御俄罗斯的威胁，但显而易见，芬兰的老敌人迟早会重新卷土重来，将卡累利阿从祖国中夺走。为此，他的政府大力支持了向卡累利阿人教授芬兰语、在当地安排大量芬兰人以及驱逐残留俄罗斯人的计划。"
 FIN_Parliament_Text: "[?FIN_temp_parliament_coalition_seats]/200"
 FIN_An_Unsatisfactory_Answer: "不尽人意的答案"
 FIN_An_Unsatisfactory_Answer_desc: "卡累利阿与摩尔曼斯克终于重归芬兰祖国怀抱，这是举国欢庆的时刻！\n\n……本应如此。可实际上，这两片土地非但未能带来荣光，反而成为了国家的财政无底洞与治理噩梦。红色游击队仍在森林中活跃，尽管卡累利阿大部分“非本族”人口已被驱逐至奥涅加地区，但摩尔曼斯克依然如同深深扎入国家肋骨的俄罗斯芒刺。只要这些问题悬而未决，“东部问题”就会永远存在，而我们当前的解决方案，恐怕难以在未来俄罗斯人卷土重来时，守护这二十载艰辛建设的一切成果。"
 FIN_Second_Crisis_Of_Democracy: "第二次民主危机"
 FIN_Second_Crisis_Of_Democracy_desc: "表面看来，爱国人民联盟不过是个徘徊在政治边缘的小党。然而，这个极右翼组织与其同路人总能从……某个神秘渠道获得力量——他们未经政府授权就对政客施加铁腕压力，自行在东部清剿游击队，更在权力殿堂的阴影里编织着无形丝线操纵政局。这种暗影中的支持势力，使得芬兰极右翼的实际影响力远比议会席位数所显示的强大得多。那些统计表上的席位，不过是用来迷惑观察者的障眼法，掩盖了这个戴着无冕王冠的集团真正掌握的滔天权柄。"
 FIN_The_Growth_Regime: "蒸蒸日上的政权"
 FIN_The_Growth_Regime_desc: "在德国势力范围及其周边国家中，芬兰堪称经济异类。其出口体系以技术先进的工农业产品为特色，与银行及设计机构协作的国家企业纪律严明且竞争力强劲，辅以国民储蓄率居高不下，使得芬兰经济实现跨越式增长。加之从新获得的东部领土及经奥涅加通道输入的俄罗斯资源，以及与瑞典在对德出口领域的密切合作，这个被国际观察家称为“欧洲经济阴霾中的成功范本”的北欧国家，正在缔造属于自己的奇迹。"
