 SACW_big_cold_war_info_button: "§W二战结束后，§!§h巴拉圭§!在第一次查科战争中战胜了§o玻利维亚§!，让§n圣克鲁斯§!取得了独立。§!§K巴西§!和§D阿根廷§!的旧怨之上再添新仇，敌意与对抗愈演愈烈，南美大陆也变成了全球冷战的一个缩影。早在两国从殖民宗主国独立以来，两国对抗就已初露苗头，战火亦曾光临此处。可以预见的是，未来的冲突只会更猛烈，招致更多的破坏。\n\n不幸的是，尽管政治家们已经尽了最大努力，但这场冷战还是愈加冰寒。§n轴心国§!大获全胜，§D阿根廷§!寻求与战胜国建立外交和经济联络，而§K巴西§!则期待与新结交的美国盟友保持密切关系，怀疑的鸿沟只会越来越深。\n\n§D阿根廷§!和§j智利§!在§a南极§!的冲突、§K巴西§!对§Q法属圭亚那§!的占领、§o玻利维亚§!和§h巴拉圭§!之间的第二次查科战争，种种因素叠加，终使冷战§V无可避免§!。\n\n各国间的利益冲突将直接影响南美大陆和这片土地上千百万人的命运。暴力与混乱如野火般蔓延到南美四方，而我们须得谨记……\n\n§V“玩胆小鬼游戏的难点在于知道什么时候该退缩。”§!"
 cold_war_info_tt: "§W§K巴西§!与§D阿根廷§!的实力平衡受以下因素影响：\n- 对其他拉美国家的§Y政治§!影响\n- 由GDP体现的§Y经济§!成功\n- 陆海空三军的§Y军事§!力量\n\n虽然其他地区的博弈者或许也能够将其他国家拉入其势力范围，但§K巴西§!与§D阿根廷§!之间的外交局势可以说是全美洲唯一实打实的冷战。"
 SAmap_nation_debug_tt: "§Y[THIS.GetNameWithFlag]§!\n盟友：[GetSacwAllignment]\n胜利分数：[?SA_cold_war_value|Y0]\nX = [?SA_cold_war_map_x?|Y0]\nY = [?SA_cold_war_map_y|Y0]"
 SAmap_nation_tt: "[GetSATooltip]"
 SAmap_tenstion_tt: "§W尽管鲜有人否认§G南美冷战§!是当下的现实，但仍有许多人倾向于用和平手段解决冲突。\n\n如果能§G维持较低的紧张度§!，代理人冲突就更有可能以互惠互利的协议得到解决，为和平终结冷战带去一线希望。\n\n然而，如果§R紧张度持续攀升§!，即使拉美各国无意参与军事冲突，一场足以血洗大陆的大战也难以避免。§!\n\n当前紧张度情况为[GetSAColdWarTensionLevel]，其效果为：\n[GetSAColdWarTensionLevelEffects]"
