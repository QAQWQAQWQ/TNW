 SACW_nuclear_mechanic_tooltip_tt: "我们需要核武器巩固自身国防。我们制造核武器的进展将视预算和支持者而定：敌我双方都缺乏自行制造核武器的能力，因此需要他国的支持。\n\n此外，项目保密也至关重要，尤其是涉及超级大国的项目：所有超级大国都不想看到核扩散，如果他们知道我们在做什么，就会在经济层面进行报复，可能还会使用一些隐秘手段。如果他们的报复行动成功，就很可能永久性地损害我们的计划。"
