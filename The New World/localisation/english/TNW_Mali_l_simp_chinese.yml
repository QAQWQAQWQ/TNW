 MLI_idea_keitas_leadership: "凯塔的领导"
 MLI_idea_keitas_leadership_desc: "就马里当前局势而言，选举结果堪称完美。莫迪博·凯塔作为马里首位，也是迄今为止唯一一位民选总统，其执政纲领将社会主义意识形态与更为务实的控局手段独特地融为一体。\n\n马里国内分裂为两大阵营：高举泛非主义理想、主张与喀麦隆结盟的革新派，以及坚持维护马里主权完整的传统派。凯塔如履薄冰地斡旋于两派之间，但若能维系国家统一，马里必将浴火重生，铸就更强大的未来。"
 MLI_idea_traore_problem: "特拉奥雷问题"
 MLI_idea_traore_problem_desc: "尽管凯塔总统是民选领袖，但并非所有国民都对这个年轻国家的领导人怀有信心。平心而论，这些反对者大多不足为虑——不过是些善妒的忘恩负义之徒与无能之辈，唯有一个刺眼的例外。\n\n穆萨·特拉奥雷这位年轻军官，对马里军方众多派系的底细一清二楚。军中关于喀麦隆傀儡操纵者的谣言与恐慌情绪甚嚣尘上，毋庸置疑，他正试图借助外国资本的支持，谋划颠覆马里的民主政体。"
 MLI_Modibo_Keita_hog_desc: "§Y政府首脑\n家长制§!\n--------------\n"
 MLI_Kadari_Bamba_for_desc: "§Y外交部长\n社会主义§!\n--------------\n"
 MLI_Younoussi_Toure_eco_desc: "§Y经济部长\n家长制§!\n--------------\n"
 MLI_Amadou_Baba_Diarra_sec_desc: "§Y安全部长\n专制主义§!\n--------------\n"
 POLITICS_MODIBO_KEITA_DESC: "穿行于西非诸邦，马里国度的景象会显得异常平静寻常——这里的民众所受的压迫似乎比其他地方更轻。这正是莫迪博·凯塔治下的国度，这位深陷道德力量与激进信念矛盾中的领袖，在动荡的西非大地上艰难求索。\n\n出生于巴马科街区的凯塔，本可以自诩为马里帝国缔造者的后裔，但他从未痴心妄想过开疆拓土。相反，凯塔在法属西非各地的社会主义团体中找到了精神家园，将众多马里人团结在争取国家自由与繁荣的旗帜下。\n\n当德国战胜法国的消息传来，这个崇高理想遭遇了重大挫折。随着戴高乐的部队竭力固守西非残局，凯塔始终公开反抗法国人，他组建民兵武装对抗戴高乐军队的举动令法军吃尽苦头。法国人不仅被逐出马里，更被逼退至象牙海岸，马里终获自由。彼时的民兵组织犹如熔炉，汇聚了所有渴望马里自治的力量——伊斯兰主义者、社会主义者、民主派与民族主义者，皆为此共同目标而战。如今尘埃落定，马里国内的众多派系将目光转向内部。马里政府内部各派系间的争斗不断升级，几近闹剧。凯塔持续推行的国家治理改革非但未能平息纷争，反而激怒了保守派民兵势力。\n\n持不同政见的穆萨·特拉奥雷已将伊斯兰民兵整编为正规军，并夺取卡伊城作为据点。马里未来的命运之战已然打响，莫迪博·凯塔正率领他的军队，走向这场决定性的战役。"
