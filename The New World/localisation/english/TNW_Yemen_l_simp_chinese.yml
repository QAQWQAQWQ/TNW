 YEM_the_aden_arsenal: "亚丁兵工厂"
 YEM_the_aden_arsenal_desc: "意大利人将保护国地位强加于也门，这片土地最珍贵的战利品亚丁港也落入了他们手中。这座印度洋传统要港迅速被意大利人改造成意大利军事据点，成为罗马在阿拉伯半岛南部驻军与舰队的最大集结地。尽管亚丁居民痛恨意大利统治，但亚丁兵工厂至今仍是意军的核心枢纽，他们从此向地形复杂的也门投送军事力量。"
 YEM_tribes_and_sects: "部落和教派"
 YEM_tribes_and_sects_desc: "也门全境多山丘壑纵横，地形以山地丘陵为主，乡村广布。尽管国王兼伊玛目高居萨那王宫，名义上执掌大权，广袤乡野的实际控制权却尽归各部族酋长。雪上加霜的是，当权的宰德派仅属少数，占人口多数的逊尼派徒与统治阶层的教派裂痕，为本就四分五裂的国度再添纷争。在此背景下，愈来愈多的也门青年正日益拥抱具有改革色彩的泛也门主义，冀望以此催生国家变革。"
 YEM_Ahmad_bin_Yahya: "艾哈迈德·本·叶海亚"
 YEM_Muhammad_al_Badr: "穆罕默德·巴德尔"
 NYM_Abdullah_al_Sallal: "阿卜杜拉·萨拉勒"
 POLITICS_AHMAD_BIN_YAHYA_DESC: "利比亚贵为“第四海岸”，埃塞俄比亚贡献人口红利，埃及献上面包篮，海湾诸酋长国流淌黑色黄金。至于也门伊玛目国？在五十年代末的三头同盟峰会上，墨索里尼曾因记不起现任伊玛目之名而仓促转移话题，这个插曲恰成其地位的最佳注脚。艾哈迈德·本·叶海亚绝非易被遗忘之人。这位身披金线刺绣长袍、指戴祖母绿宝石的衰老暴君，依然保持着游牧酋长般的威仪，却在吗啡迷雾中逐渐丧失清醒。昔日在英国治下，他一面宣誓效忠帝国，一面暗中培植势力；如今对意大利亦是阳奉阴违。若非也门这片贫瘠山地难入“我们的海”法眼，他的权谋游戏早已招致罗马的雷霆之怒。\n\n荒诞的是，在这位暴君用黄金餐具享用烤全羊时，饥肠辘辘的子民却将他的画像供奉于每个街角。当驼队载着珠光宝气的伊玛目巡游时，狂热的信徒仍会挤碎护栏只为触摸轿帘。\n\n衰老正在侵蚀这个精密运作的双面政权。觐见者跪吻他缀满戒指的双手，而他以程式化的祝福回应——即便已记不清来客姓名。尽管罗马满足于也门按时缴纳贡金，但敏锐的殖民官员已拉响警报：当吗啡最终吞噬这位铁腕统治者的心智，这片没有预备继任者的山地，或将陷入比饥荒更可怕的权力真空。"
