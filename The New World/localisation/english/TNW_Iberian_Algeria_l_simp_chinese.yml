 POLITICS_FEDERICO_GOMEZ_DESC:0 "指挥官费德里科·戈麦斯·德·萨拉萨尔是领导伊比利亚“维和”部队进入阿尔及利亚的天然人选。他出生于1912年，成长于西班牙两次大战间的动荡岁月，目睹了这个虽未受一战战火摧残却日益分裂的国家。1929年，他在萨拉戈萨总军事学院接受弗朗西斯科·佛朗哥将军的训练，西班牙内战期间顺理成章地为国民军而战。二战期间，他作为佛朗哥政权派遣至东线为德国效力的西班牙志愿部队“蓝色师”成员参战。战后，他继续效忠于新成立的伊比利亚联盟。\n\n伊比利亚的考迪罗们对阿尔及利亚的乱局并非一无所知。萨拉查尤其急于保护聚居在阿尔及利亚-摩洛哥边境的大量伊比利亚移民。当阿尔及利亚局势恶化到临界点时，萨拉查果断抓住机会出兵。戈麦斯·德·萨拉萨尔收到的命令简明扼要：保护所有伊比利亚移民，与法裔黑脚合作，消除意大利势力影响。这位忠诚的军官恪守信条——一旦接到命令，无论内容如何都将坚决执行。"
 POLITICS_JORGE_JARDIM_DESC:0 ""
 POLITICS_YVES_GUERIN_SERAC_DESC:0 ""
 SLG_Legion_Presence:0 "军事存在"
 SLG_Legion_Presence_desc:0 "由于葡萄牙人在阿尔及利亚定居，西班牙军队被派去那里保护他们的伊比利亚兄弟。然而，部署军队最重要的目的是在法国当局缺席的情况下统治这片领土。此后，西班牙军队成为该地区占主导地位的政治和军事力量，掌控着当地大部分事务。"
 SLG_Retornados:0 "葡裔归侨"
 SLG_Retornados_desc:0 "德国入侵葡属非洲后，我国在当地的大量公民选择返回伊比利亚。政府决定将他们安置于阿尔及利亚未经官方承认的伊比利亚人控制区，趁便加强对此地的领土主张。直到今天，葡裔定居者仍在这片领土上生活，为我们建设一个更强大的国家奠定了基础。"
 SLG_Native_Unrest:0 "土著骚乱"
 SLG_Native_Unrest_desc:0 "大量葡萄牙裔公民移居阿尔及利亚引发的土著抗议令我们头痛不已。这个问题迟早要得到解决。"
