## DESCS ##

Assoc_Region_Santa_Cruz_Dept_desc_stc: "§LWhile officially claimed as part of the §YSanta Cruz Department§! by Bolivia, §Y[1675.GetName]§! and its surrounding provinces are nominally independent under the Oriental Socialist Party or incorporated into Paraguay. Only time will tell if Bolivia can reclaim its lost territory back.§!"
Assoc_Region_Santa_Cruz_Dept_spa_desc_stc: "§LWhile officially claimed as part of the §YDepartamento de Santa Cruz§! by Bolivia, §Y[1675.GetName]§! and its surrounding provinces are nominally independent under the Partido Oriental Socialista or incorporated into Paraguay. Only time will tell if Bolivia can reclaim its lost territory back.§!"
Assoc_Region_Santa_Cruz_Dept_desc_bol: "§LWith the fall of the Santa Cruz regime, the whole of the §YSanta Cruz Department§! is finally controlled by the Republic of Bolivia. While it may take some time to root out the last vestiges of the Oriental Party and its supporters, Bolivians can finally celebrate a victory after decades of humiliating defeats and territorial losses.§!"
Assoc_Region_Santa_Cruz_Dept_spa_desc_bol: "§LWith the fall of the Santa Cruz regime, the whole of the §YDepartamento de Santa Cruz§! is finally controlled by the República de Bolivia. While it may take some time to root out the last vestiges of the Partido Oriental and its supporters, Bolivians can finally celebrate a victory after decades of humiliating defeats and territorial losses.§!"

