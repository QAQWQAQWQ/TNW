 AZH_blockade_1: "轻度美国封锁"
 AZH_blockade_2: "中度美国封锁"
 AZH_blockade_3: "重度美国封锁"
 AZH_JAP_administrative_assistance: "行政援助"
 AZH_JAP_military_advisors: "军事顾问"
 Azad_Hind_GEAPO_tt: "§K自由印度§!将与£GFX_jap_ija_texticon §R大东亚和平组织§!一道，根除西方帝国主义的§V一切§!余孽。"
 POLITICS_AC_CHATTERJI_DESC: "如果你在1915年告诉阿尼尔·钱德拉·查特吉医生，他会在三十年后成为自由印度军队中的一名少将，他一定会开始检查你是不是累坏了。然而，事实正是如此，A·C·查特吉在四十年代加入了苏巴斯·钱德拉·鲍斯的队伍，他的人生轨迹就此书写。\n\n如果你再告诉查特吉，他将会成为财政部长、解放区的行政长官，他会感到更加难以置信，但这正是他后来被赋予的任务：打理加尔各答政府的财政，管理从英国人手中解放的领土，直到政府机构稳固地建立起来。\n\n如果你更进一步和他说，粮食安全导致的学生运动会让某位财政部长被免职，但又得到晋升，成为党的领袖，他或许会感到愤怒。但1959年，事情就是这样——查特吉不得不将财政部交给了内迪亚姆·拉加万，成了印度斯坦平等同盟的主席。\n\n如果你继续讲下去，告诉彼时1915年的年轻医生，他将会如此成为主席，在年事已高之际因为投机取巧而声名狼藉，他或许会渐渐开始相信这一切。毕竟，如果能这样安享晚年，为什么不呢？"
 POLITICS_NEDYAM_RAGHAVAN_DESC: "几十年前，内迪亚姆·拉加万律师移居马来亚槟城，在法庭上积极为劳工辩护。后来，世界大战爆发，日本人来到了马来亚，拉加万与拉什·贝哈里·鲍斯一起组织建立了印度独立同盟。\n\n但是，岩畔豪雄取代了曾经更友好的日本联络人，把事情都给搞砸了。岩畔试图把自己的意志强加给印度革命者，要求他们盲目服从。拉加万愤而辞职，拒绝将印度独立运动出卖给东京，因此遭到了软禁。\n\n本来，事情到此就该画上句号，但苏巴斯·钱德拉·鲍斯回来了。鲍斯意识到，拉加万虽然在与国大党合作的问题上与他意见相左，但却拥有马来亚印度人全心全意的支持。因此，他诚心邀请拉加万重新加入印度国民军：后者接受了鲍斯的邀请，并立即从东南亚的南印度人社区提供了大量的资金支持。\n\n战争胜利后，拉加万历任大使和财政部长的职位。他是一位颇为凶猛的演说家，也是加尔各答政府的主要理论家之一，既受人尊敬又令人畏惧。有鉴于此，他在鲍斯去世后接任主席也就不奇怪了。\n\n作为主席，拉加万的工作重点有三：有限度的泛亚主义、福利和社会安全网，以及强力的发展主义经济计划。"
 POLITICS_ABID_HASAN_SAFRANI_DESC: "阿比德·哈桑·萨夫拉尼生于海得拉巴，在德国接受教育，无论他的政治生涯走向何方，他都已在所有印度人的心中留下了印记——正是经由他，“印度万岁”的口号传遍了整片次大陆。\n\n萨夫拉尼与苏巴斯·钱德拉·鲍斯在二战之中结识，此后数十年里，他都是鲍斯的私人秘书兼翻译。因此，他以对领袖的忠诚而闻名，正是这样的忠诚让他成为了领导印度民族革命的稳健人选。\n\n与人们的刻板印象不同，萨夫拉尼这位经过培训的专业人士并不死板。相反，他博览群书，精通阿拉伯语、德语、波斯语和英语；在追随鲍斯之前，他曾经生活在圣雄甘地的古吉拉特隐修之处。萨夫拉尼至今未婚，不过在四十年代，他曾与一名德国女子有过一段无果而终的单相思。虽然他是个什叶派穆斯林，也因此成为印度世俗主义的代表人物，但却常常饮酒；他曾在印度国民军中担任少校，试图将国民军塑造成一支意识形态色彩浓厚的军队，但结果却不尽如人意。\n\n与之相对，萨夫拉尼在战后自由印度政府外交部门的任职经历要成功得多，这可能也是他能与国大党机器分庭抗礼并最终掌权的原因之一。如今的萨夫拉尼正不惜代价，致力于将整个印度纳入平等同盟的党国体制之下。"
 AZH_A_Titan_of_the_Sphere: "共荣圈的泰坦"
 AZH_A_Titan_of_the_Sphere_desc: "萨海政府从满洲国的成功中汲取灵感，公开接受了由社会官僚干部主导推动的经济模式，认为威权监督和经济计划是关键所在。在印度国民军的支持下，一个按照满洲模式组织起来的新财阀——印度斯坦发展署，将会严格地掌控发展轨道，从日本吸引投资，打造出亚洲工业的新泰坦。"
 AZH_Congress_Remnants: "国大党余党"
 AZH_black_years_dynamic_modifier: "黑暗年代"
 AZH_black_years_dynamic_modifier_desc: "人类对食物的基本需求不会因为战争爆发而停止。在席卷印度的浩劫之中，这一事实最先为人们所遗忘，又在肚子空空的时候为人们所记起。\n\n次大陆遭遇了史无前例的饥荒浪潮。位于比哈尔邦和北方邦的农业中心产区受到严重破坏，带来了难以估量的后果：每有一个人死于战争，就同时有其他二十个人死于饥饿。同室操戈的战事之中，全国各地的村庄都在嚎哭悲泣。如果再不着手采取应对措施，“黑暗年代”的灾难就不将仅仅局限于一个国家，还会成为全球性的悲剧——本世纪中前所未见的苦难。"
