 AZH_Nirmal_Chandra_Chatterjee: "尼马尔·钱德拉·查特吉"
 AZH_Saumyendranath_Tagore: "绍缅德拉纳特·泰戈尔"
 AZH_pandoras_box_1_desc: "几个世纪以来的生活方式仍在延续。农夫们面朝黄土背朝天，沿着列祖列宗踏出的阡陌辛勤劳作。村庄完整如初，支撑它们的正是那维持社会结构的固化纸牌屋——这结构历经帝国倾覆、王朝更迭，从帝王将相到衮衮诸君，始终岿然不动。印度正以缓慢而坚定的步伐迈向未来，至少表面如此。"
 AZH_pandoras_box_2_desc: "不安的阴风裹挟血腥气息，正撕扯着古老根基的裂痕。儿郎们成群结队涌向大都市的就业之约，贫民窟人满为患，乡村化作空巢。成片土地抛却犁铧迎接推土机，旧时代的秩序被迁移、被补偿，却仍带着千年不变的倔强苟延残喘。剧变将至，但这不过是异国历史的重演——而摇摇欲坠的纸牌搭建的穹顶，终将在废墟中顽强存续。"
 AZH_pandoras_box_3_desc: "军号响彻云霄，一场宏大的征伐就此启幕。母亲们含泪送别踏上军营与战场的骄傲儿郎。尚武民族冲锋陷阵，余者尽数走进工厂与后方。但此时，流弹呼啸与俯冲轰炸机的尖啸已开始瓦解古老法则，鲜血浸透泥泞之际，唯余冷眼观世的士兵方能持久存活。"
 AZH_pandoras_box_4_desc: "战争的腥风血雨已扼住这个国家的命脉，吞噬殆尽却仍不觉果腹。军旅世家再也献不出儿子，荣耀的战旗兵团被迫向市井征召兵员。曾经炊烟袅袅的村庄唯余焦土纵横，炮弹不分贵胄庶民，撕碎血肉之躯。幸存者们透过血色弥漫、弹震迷离的双眸凝视世界，而旧世界的传统礼法，此刻只化作森森嘲弄的残响。"
 AZH_pandoras_box_5_desc: "让旧世界的所谓传统见鬼去吧！我们将踏着阵亡同袍的尸骨碾入宿敌的脏腑，将其家族绞作血沫，把战火引向他们世代安居的厅堂。宰了那群口蜜腹剑的混账——那些从未目睹手足化为灰烬的祭师与政客。待到血债偿清之日，我们脚下这片浸透硝烟的焦土，终将在复仇之师脚下，蜕变为独属于吾辈的应许之地。"
