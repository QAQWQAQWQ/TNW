 POLITICS_MOHAN_SINGH_DESC: "在为苏巴斯·钱德拉·鲍斯与印度人民漫长而卓越的服役之后，莫汉·辛格将军领导起一个坚定致力于恢复苏巴斯主义的委员会，担起了印度临时主席的职责。\n\n起初，辛格是英印军派驻马来亚部队中的一名上尉。日军攻入马来亚时，辛格结识了藤原岩市大尉。在藤原的说服之下，辛格同意从被俘的英印军士兵中组建一支争取印度独立的军队。后来，日本陆军司令部的干预和藤原的离开，局势一度动荡不安，直到苏巴斯·钱德拉·鲍斯现身，领导自由印度军走向胜利。\n\n战后，莫汉·辛格对印度解放的喜悦渐渐为不满所取代。鲍斯日渐老去之时，辛格在军队中遭到了排挤，这让他尤为恼怒，生出了对政府的异议。但是，鲍斯去世后，基亚尼等人也被迫靠边站，查特吉的孟加拉派系主导政府，事态一团乱麻，辛格因此抓住了直接行动以稳定政府的理由，出手结束了鲍斯不称职继任者导致的乱象。\n\n秩序恢复，莫汉·辛格希望所有人都知道一件事：他致力于维护鲍斯的遗产，非常坚定，百分之百，称职的民政府将随善政而建立。"
 POLITICS_LAKSHMI_SAHGAL_DESC: "拉克希米·萨加尔声望卓著，即使是在西边的共和国政权，人们也尊称她做“拉克希米上尉”。她能成为主席着实令人难以置信，但在新千年之际，也许这正是印度勤劳的妇女和工人们所需要的变化。\n\n在改姓萨加尔之前，拉克希米就是一位印度独立的斗士。在一次失败的婚姻后，她只身前去马来亚，加入了印度国民军，担任上尉和“章西女王团”指挥官，在前线同英军作战。日后，拉克希米以准将军衔退役——自英国殖民统治建立以来，她是首位晋升至这一军衔的女性。也正是在此时，萨加尔确信，社会主义和左翼政治应当是印度前进的方向。\n\n也许，正是她的军旅生涯和其中培育的人脉关系推动她成为了主席职位的合适候选人。除了她的丈夫普雷姆·库马尔·萨加尔将军之外，她还得到了二战期间留在印度的全印前进同盟草根领袖们的友谊，正是萨杜尔·辛格·卡夫谢尔、谢尔·巴德拉·亚吉等人的支持助她在四十和五十年代的印度斯坦平等同盟中站稳了脚跟，然后又在六十年代继任为妇女组织部长，最终成为主席。\n\n拉克希米·萨加尔主席有着雄心勃勃的目标。她希望通过广泛的立法和政策变革促进妇女得到更公平的地位和待遇，让她们能够拥有和她本人一样的机会；此外，她还要强化印度工人和农民的力量，因为印度的繁荣正仰赖于他们的劳动。"
 AZH_Hindustan_Land_Development_Authority: "印度斯坦土地开发署"
 AZH_Hindustan_Land_Development_Authority_desc: "印度斯坦土地开发署的既定目标是重新安置失地农民并提升农业生产力。他们的工作取得的结果算是喜忧参半，一方面，土地的重新分配大大缓解了人口过多的孟加拉地区的佃农问题，且增加了国家的收入来源；另一方面，在大部分被重新规划的定居地中，开发署的土地工作壮大了分离主义与本土民族主义情绪。"
 AZH_The_Language_Problem: "语言问题"
 AZH_The_Language_Problem_desc: "政府和党的领导层绝大多数为孟加拉人及来自马来亚和缅甸的泰米尔侨民，他们是这场运动的核心。这一点，加之鲍斯期望将印度斯坦语罗马化并标准化其为官方语言，导致该国孟加拉地区和印地语地区的各族关系紧张。"
 AZH_What_Is_Subhasism: "何谓苏巴斯主义？"
 AZH_What_Is_Subhasism_desc: "社会主义、民族主义、布尔什维主义、法西斯主义——人们对自由印度的官方意识形态下了许多定义，但即使是最热心的党员也难以确定政府和人民的确切立场。这种意识形态的灵活性大概只在和其他国家（以及某些叛乱集团）交涉时有用，而我们迟早要做出决定，鲍斯的愿景也必须以具体的方式确定下来。至于这将采取什么形式，谁也说不准。"
