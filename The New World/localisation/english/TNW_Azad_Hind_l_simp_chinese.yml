 AZH_Amiya_Nath_Bose: "阿米亚·纳特·鲍斯"
 POLITICS_SAMAR_GUHA_DESC: "人们总是在争论苏巴斯·钱德拉·鲍斯留下了什么。有人说，他只留下了军队，因为他最忠实的追随者以武力统一了次大陆；也有人说，他将日本先进的文化和技术介绍给了印度人民；还有一些人，比如医学博士萨马尔·古哈，则认为社会主义和民粹主义的经济公正才是领袖最为宝贵的遗产。\n\n鲍斯在世时，社会主义知识分子古哈是他最为亲密的知己之一。尽管他出身知识分子，但依然广受欢迎，不论是公开场合还是私下里，鲍斯都从不避讳与他之间的友情。\n\n所以说，萨马尔·古哈虔诚地致力于继承鲍斯的遗产也就不足为奇了。他提出了三大重点政策：稳定的教育、有力的社会保障网络和强大的国防，以此保证他所理解的领袖遗泽得以发扬。\n\n古哈将拥有许多可供他调遣的资源。他是个爱读书的人，研究的课题包罗万象，既有原子科学这样的前沿知识，也有次大陆的哲学、宗教、文化等传统内容。在对鲍斯意识形态的解读和社会主义理论之间，萨马尔·古哈取得了平衡。时间将会告诉我们，他的阅读是否会像熏陶他自己一样，有益于印度人民。"
 POLITICS_AMIYA_NATH_BOSE_DESC: "阿米亚·纳特·鲍斯接过了已故叔叔留下的领袖之位，人们因此指责他攀附裙带关系，而他正在努力挫败诸如此类的中伤。\n\n若是回到还在加尔各答大学里领导学生会的时候，纳特·鲍斯或许很难想象到他如今的人生际遇。1937年，他前往剑桥大学攻读经济，于1941年取得了律师资格。英国人怀疑他持激进的反帝立场，因此也像监视他的叔叔和父亲一样监视着他。后来，大英帝国在海狮行动之下分崩离析，英属印度烟消云散，纳特·鲍斯回到了家乡，加入了父亲和叔叔的队伍。\n\n岁月流逝，印度一分为二，父亲萨拉特·钱德拉·鲍斯离开人世。为了缅怀父亲、安慰悲伤的叔叔，纳特·鲍斯继续为了印度斯坦平等联盟而努力奋斗。世界走入六十年代，苏巴斯·钱德拉·鲍斯日渐消瘦。突然，有一天，阿米亚·纳特·鲍斯被领进了一间房间，被告知他的叔叔已经不在了，而他已经是主席了。\n\n纳特·鲍斯就任主席激起了许多有关任人唯亲的指控。打心底里说，鲍斯并不介意，毕竟他没有出众的魅力，也认为自己无法改变人们的看法。此外，他也觉得自己只是一名过渡主席，总归都是要交出权力的，那又何必在乎人们对他的看法呢？"
 POLITICS_ANAND_MOHAN_SAHAY_DESC: "年轻时，阿南德·莫汉·萨海曾是一神论印度教改革运动“高贵社会”的信徒，他们将神像谴责为“偶像崇拜”。他和朋友站在一座偶像面前，欲要将之摧毁，然而朋友们却在最后一刻被恐惧压倒；萨海则三步并作两步，动手将神像砸得粉碎，看着其他人四散而逃。\n\n在青年独立活动家萨海前往美国的途中，英国吊销了他的护照，他因此而流亡日本。在与尼赫鲁和拉金德拉·普拉萨德的通信中，他得到了一个艰难的建议：联系其他活动者，从日本处获得助力，为独立事业添砖加瓦。萨海接受了建议，在神户定居下来。通过在日印度人联络网和英日出版物，他成为了印度解放运动中仅次于拉什·贝哈里·鲍斯的在日代言人。\n\n作为苏巴斯·钱德拉·鲍斯的秘书兼外交部长，萨海跟随他的领袖走遍了新加坡、缅甸、孟加拉和德里，与各式各样的人建立了联系。其他人还在紧张地希求印度人能得到平等的对待之时，萨海便已在要求平等。他与被忽视的人民交谈，磨砺了自己的言辞与人际关系，最终实现了他的愿望。\n\n如今，萨海要对全印度负责，而他对印度彻底转型的信念从未动摇。他支持鲍斯的反殖民斗争，但也主张与日本和满洲国建立更紧密的关系。"
 AZH_The_Crossroads_of_the_Subhasist_Revolution: "苏巴斯主义革命的十字路"
 AZH_The_Crossroads_of_the_Subhasist_Revolution_desc: "加尔各答是新革命的发源地，它根植于民族主义、世俗主义，仰赖于印度斯坦平等联盟纪律严明的队伍领导，推动着势不可挡的现代化进程。苏巴斯主义是新国家的口号，直到印度不再有战祸兵燹之危之前，平等联盟都将恪尽职守，守卫苏巴斯主义和它的一切。党即国家，国家即党。"
 AZH_A_New_Hammer_for_Old_Problems: "老问题，新锤头"
 AZH_A_New_Hammer_for_Old_Problems_desc: "新政府成立之初，孟加拉就已经迈向统一，但急于寻找生计的无地农民仍旧不堪重负；同时，东北满是假意投效、暗中搞破坏的阴险两面派，无孔不入地腐蚀着国家的统一。受满洲模式启发，印度斯坦土地重建局试图将农村贫困人口重新安置到国家组织的经济作物产销区，以期同时解决这两个问题。虽然这激怒了东北的叛乱分子，甚至引起了武装火并，但国家对边境地区的控制力得以由此强化——目前，局势仍尽在掌握。"
 AZH_The_Old_Ghosts_of_Communalism: "社群主义的旧幽灵"
 AZH_The_Old_Ghosts_of_Communalism_desc: "尽管鲍斯提出了他的理想，但印度过去的阴影仍然潜伏在所有实现未来的尝试背后。种姓制度依然普遍存在；宗教冲突似乎已经平息，但每一次世俗化的意愿都会引起人们的怀疑。在东北部，叛乱分子试图分裂国家领土；而其他地方，以语言为基础的地方运动也在日益壮大。社群主义的幽灵无休无止地纠缠着人民，除非我们将其永远驱除——每过一天，动用武力将其摧毁的诱惑便更强一分。"
 AZH_Thirteen_Years_of_Progress: "进步十三年"
 AZH_Thirteen_Years_of_Progress_desc: "英属印度黯然落幕之时，印度比发达国家落后了近二百年。十三年后的今天，巨人开始苏醒，数百万人涌入工厂和农场。迄今为止，自由印度政府的五年计划完全集中在发展军事重工业，对学校、医院和现代社会的其他需求进行大规模投资，以及培养出口导向经济、支持东北部的定居者之上。\n\n时至当下，第三个五年计划放慢了军事工业的发展步伐，转而试图替代日本产的消费品，提高社会生活水平。然而，如果出现更为迫切的需求……"
 AZH_Frontline_of_Anti_Imperialism: "反帝斗争的前线"
 AZH_Frontline_of_Anti_Imperialism_desc: "东京鹰视狼顾的官僚和被压迫世界的斗争群众都在注视着一个人——苏巴斯·钱德拉·鲍斯。他代表着日本新秩序中强大、独立的伙伴的希望，也代表着反帝偶像的活力：以武力反抗强权、解放人民。\n\n向西，加尔各答送出武器、派遣志愿者，投身于殖民地斗争；向东，则与共荣圈携手，共同进退。这两股力量可以说是背道而驰，完全仰赖于鲍斯的人格魅力才得以使之维持平衡。但时间会告诉我们，自由印度会真正站在哪一边。"
 AZH_Old_Wine_in_a_New_Bottle: "新瓶装旧酒"
 AZH_Old_Wine_in_a_New_Bottle_desc: "伟大领袖已经离去，他选定的继任者A·C·查特吉自豪地沿着领袖为国家开辟的道路继续前行。先前的政策行之有效，做出改变无疑是愚蠢的行为，因此，国家将继续与日本紧密合作，实现经济的自给自足。国家指导下的重工业发展、对工会的政治掌控和一定程度的经济计划将成为政策的核心，引领国家走入最为辉煌的时代。"
 AZH_A_Gentle_Leviathan: "温情脉脉的利维坦"
 AZH_A_Gentle_Leviathan_desc: "在拉加万的设想中，印度将彻底脱胎换骨，以经济发展和社会福利为中心。拉加万意在以国家为主导扩张教育系统、医保体制和基础设施，辅以中央经济计划，同时与东南亚竹网中的新兴金融支持者展开密切合作，印度将从此茁壮成长，保住国家民族的根。"
 AZH_The_Revolution_in_Sight: "革命在望"
 AZH_The_Revolution_in_Sight_desc: "章西女王团的英雄坚信，国家未来只有一条道路——革命的社会主义。她将彻底拆解根深蒂固的等级制度，寻求全面的财富再分配，将权力赋予全国男男女女的劳动人民，从而建立起真正平等的社会。\n\n虽然拉克希米上尉的深红政策赢得了受压迫者的狂热支持，但也不可避免地招致了日本的猜疑，只是她自己的经历和火热的个人声望略微遏制了这种情绪而已。如果说，东京认定这位革命者是个隐蔽的马克思主义者，那么她的执政时间很可能会缩短——痛苦地缩短。"
 AZH_Everything_According_to_Plan: "按部就班"
 AZH_Everything_According_to_Plan_desc: "鲍斯最坚强的战士将坚定不移地拥护他眼中领袖的遗产，印度将在全面的国家计划和以劳动挑战自然的雄心壮志之下焕然一新。他的政府将把大量资源倾注进不朽的建设项目和庞大的工业综合体之中，倡导世俗化和现代主义的国内政策，将传统视为过去留下的美好回忆。印度将打破界限，分裂原子，冲上云霄，一劳永逸地摆脱英帝国主义留下的阴影。"
 AZH_A_Thousand_Promises: "一千个承诺"
 AZH_A_Thousand_Promises_desc: "印度国民军已经发声，没有人敢于反对。辛格的“临时”军政府掌权，印度前途未卜，自由化和社会主义的承诺模糊不清。有人觉国家会放松管制，私营公司将在军队的保护下发展壮大；还有人预测福利国家政策将继续深化，借以安抚人民。只有一件事是肯定的——随着军方上台，从英国继承下来的武装力量非政治化传统将彻底消亡。从今往后，所有文官政府都必须要在自命为印度保护者的军方注视下，如履薄冰。"
 AZH_Nation_and_Labour: "国家与劳工"
 AZH_Nation_and_Labour_desc: "在古哈的领导下，印度经济将以伟大的合作，即产业与劳工组织之间的伙伴关系为核心动能。工会和工人委员会将与国家规划者和技官顾问共同在决策中发挥中心作用，劳工利益不仅能得到代表，而且他们还能积极参与进关键决策之中。虽然日本顾问对新建干预经济活动的官僚机构表示反对，但换句话说，他们只是发觉自己企图将另一个发展中国家纳入囊中时遇到了阻力。"
 AZH_The_Inheritance_of_Doctrine: "教条继承"
 AZH_The_Inheritance_of_Doctrine_desc: "另一个鲍斯正在继续掌权，事实的确如此。阿米亚·纳特·鲍斯延续了已故领袖的个人独裁干预政策，将方方面面都纳入政府部门的掌控。他将亲信拔擢入新内阁，以牺牲他人利益为代价来推动自己的议程。然而此外，小鲍斯也在追随叔父的脚步，寻求民粹主义支持。虽然他个性温和，没有他叔父那样的力量，但他将逐步利用民粹主义政策和定期的集会，保证以他为中心的政党能继续待在台上。"
 AZH_Only_the_Best: "唯最优者"
 AZH_Only_the_Best_desc: "国家是一台机器，而有谁能比军队更适合指挥它？军事纪律和文官专家的协同将打造出印度的新经济。熟练的技术官僚和经验丰富的军事规划者共同管理战略工业；基础设施项目和产业扩张将得到支持，助力经济产出和国家安全攀上新高。批评者或许会认为，国家正在迈向文官的独裁统治，但人民却能明了它的本质——通向现代化的高效之路。"
 AZH_pandoras_box_1: "潘多拉之盒：§G闭合§!"
 AZH_pandoras_box_2: "潘多拉之盒：§Y启封§!"
