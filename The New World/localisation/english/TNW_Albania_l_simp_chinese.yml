 POLITICS_TEFIK_MBORJA_DESC: "过去几十年的大部分时间里，陶菲克·塞利姆·姆博尔雅都隐于阿尔巴尼亚历史的幕后，尽管他的作用十分重要，但直到最近，人们才终于关注到他。姆博尔雅生于1888年，是阿尔巴尼亚少之又少的幸运儿：他出身于富裕的南方地主家族，富裕到足以让他接受高等教育——阿尔巴尼亚根本没有大学，这意味着他必须要出国。和许多同胞一样，他选择了意大利，动身前去罗马学习法律，并且在当地结识了齐亚诺家族。回到阿尔巴尼亚后，他成为了一名议员，也是不断壮大的反索古先锋队政治家中的一员。\n\n意大利的入侵终结了索古政权。这次行动由齐亚诺伯爵亲自策划，姆博尔雅则因其众所周知的亲意思想而得到了奖赏，被任命为新成立的阿尔巴尼亚法西斯党的总书记。在这个职位上，他得以对阿尔巴尼亚民众施加影响，指导党的宣传和政策，将国家带入崭新的法西斯时代。 姆博尔雅一直在试图与意大利及其使节的长期存在相抗衡，他仍能用谈判的手段，让阿尔巴尼亚在新时代的罗马帝国内享有一定的自治权。\n\n但实际上呢？姆博尔雅和他的盟友所能做的不过只是勉强裱糊阿尔巴尼亚近乎无法摆脱的问题，这个问题就是国家与意大利之间破坏性的关系。理论上讲，阿尔巴尼亚是与罗马联合在一顶王冠之下的独立国家，但实际上它只是一个傀儡，唯有在迫在眉睫的灾难面前才能获得让步和更多的自治权，而国家灾难的代表之一就是似乎永无止尽、不断蔓延的游击队和土匪。如今，在齐亚诺的建议下，姆博尔雅出任阿尔巴尼亚首相，他决心要竭尽全力，为纷乱不休的冲突打上休止符——这前途令人望而生畏：在山鹰之国，不同的部族、阶级乃至地方之间，几乎没有任何团结可言。"
