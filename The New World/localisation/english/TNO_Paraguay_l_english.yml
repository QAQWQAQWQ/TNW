 PAR_OAS.24.t: "Staying Occupied"
 PAR_OAS.24.desc: "Be respectful. Be vigilant. Don't make friends. Those were the three principles that were drilled into Private Ángel Ortega during his briefings before his deployment in Asunción. Ortega thought that they should've added a fourth of "learn how to entertain yourself." His job was to kick pebbles and twiddle his thumbs while patrolling the neighborhood a mile or so from Silvio Pettirossi. The days seemed to melt together- making Ortega wish either for a little bit of action or for the announcement that they finally scraped together enough competent cops for the American peacekeepers to pull out.\n\nIt was either Thursday or Friday when a soccer ball rolled out of a field in front of his feet. Ortega turned his head, seeing a gaggle of children that looked somewhere between eight and twelve arguing with each other on whose fault it was that the ball got kicked all the way over there. The bickering slowly died down, and then all the kids were staring down Ortega. He wasn't intimidated by a group of scrawny kids. "You want this back?" He asked in Spanish, pointing down to the ball at his feet. Just silence and staring. Ortega scoffed, and kicked the ball back toward the children. The black and white ball rolled up to their feet, but they didn't collect it. They just kept staring and frowning. Fine. Be like that. Ortega kept walking. He heard more conversation and laughter around the corner. As soon as he turned it, the trio of men on the porch of the corner house stopped laughing, and just stared, just like the children. Ortega scowled right back at them and kept walking, kicking a pebble out of his way as he did so. Nothing he was unfamiliar with."
 PAR_OAS.24.a: "Keeping the Uneasy Peace."
 
 PAR_OAS.25.t: "A House of the Americas, Divided"
 PAR_OAS.25.desc: "As Alfonso García Robles took to his feet, the murmuring of delegates sitting beside and before him in the triangular arrangement of the Hall of the Americas dissipated. As Secretary of External Relations and veteran diplomat, he was familiar with the OAS headquarters in Washington DC, though it was a rare occasion he had reason to address the entire body. But the invasion of Paraguay was one such occasion.\n\n"My fellow delegates, allow me to make clear the Republic of Mexico's opinion." García Robles spoke directly. "We wholeheartedly condemn the planned invasion of Paraguay. We underst-"\n\nSome of the other delegates jeered. "We understand the Argentinian and Brazilian position, and understand the danger a Communist regime in Asunción poses. None of us are happy to see that poor nation swing from one extreme to another. But such an aggressive response will kill and immiserate thousands of innocents! It will create a generation of martyrs! We must instead respect Paraguay's national sovereignty and open immediate dialogue with the new regime to offer a path of moderation."\n\n"Rubbish," said Araújo Castro, the Brazilian representative at the table opposite. García Robles turned to him directly, but his look was almost pitying.\n\n"My good friend, it hurts to hear you say that, when we got along so well during my tenure as ambassador to your great nation. I know the Brazilians as a people of peace! We can spare this beautiful continent another bloody stain, if you only change your mind!"\n\nThe room exploded into cross-talk and invective. The Cuban representative cheered and applauded. The Argentine and Brazilian delegates began an angry denunciation. The American chairman simply looked out the window, plainly irritated."
 PAR_OAS.25.a: "A vote against militarism, cast in defiance of the tide."
 
 PAR_OAS.26.t: "Terminal"
 PAR_OAS.26.desc: "Hugo B. Margáin's eyes flitted impatiently from the tarmac out of the window to the radio telephone beside him in the cabin of the Washington-bound plane languishing on the airport runway. The early morning light was just cresting the terminal, and the Secretary of External Relations took another swig of coffee. President Salinas would surely call any minute, but the clock was ticking. He needed to be in the air in half an hour if he was to make it to the OAS emergency summit.\n\nMargáin had gone straight to Salinas as soon as it was called, and both men had spent much of the previous night discussing the surprising news - the Americans had successfully brokered a deal between the antagonistic Argentine and Brazilian governments to coordinate, under OAS purview, an invasion of Paraguay to topple the new Communist regime. A resolution for the operation, for procedure's sake, would be put to a vote for all OAS member states, and Margáin cursed the awkward position that put Mexico in.\n\nThe debate on how to vote had gone through the night, the arguments hashed over - a vote against on the basis of the Estrada Doctrine's non-intervention would anger Yankee-friendly business leaders and major potential trade partners in Latin America. Margáin would personally suffer, risking contacts and even friendships in the States. Still, he preferred that to a meek abstention, which would be unpopular at home and with the rest of the Veracruz pact - another betrayal of revolutionary ideals from Salinas' government, they would say. It was the kind of bad press they should avoid.\n\nThe President, still uncertain, planned to consult Alemán, Barrios, and the others before making a final decision - a decision Margáin restlessly waited for, that morning on the tarmac."
 PAR_OAS.26.a: "When the call came through, Salinas told him to abstain."
 PAR_OAS.26.b: "When the call came through, Salinas told him to vote against the resolution."
 
 PAR_OAS.27.t: "Performance Anxiety"
 PAR_OAS.27.desc: ""Can you believe it, Your Excellency?" Antonio Carrillo Flores' voice crackled from the receiver. "Brazil and Argentina have finally found something they agree on."\n\nOrdaz tapped his desk, and only gave his External Relations Secretary an affirmative hum in reply. Carrillo filled the silence again, calling from a secure line direct from the Mexican Embassy in Washington.\n\n"It's a shame their common ground is invading Paraguay, but they can't be expected to take a gang of Communist guerillas for neighbours. Our friends up here are ecstatic that they brokered the deal, so the whole operation is under OAS auspices. The OAS member states still need to vote for it tomorrow, of course."\n\n"It's rather like a christening, isn't it?" Ordaz finally and morosely responded. "I assume your present company is leaning on us to vote in favor?"\n\n"They'd prefer that, yes, though at least some of them have heard of the Estrada Doctrine and understand our delicate position. A quiet, no-fuss abstention at the House of the Americas shouldn't rustle too many feathers here or at home."\n\nDespite the Secretary's words, the thought had been percolating in Ordaz' head - that a vote in favor of the operation would make it clear Mexico didn't brook extremism, and may well work to curry goodwill with the Americans. But the words stuck in his mouth. Questions of foreign policy tended to sit uneasy with him, especially since that humiliating Aleutians episode. The leftists would protest - the Cubans too -  he could only expect some angry phone calls from Havana.\n\n"Your Excellency? Is there something wrong with the line? I didn't hear you.""
 PAR_OAS.27.a: ""Of course, you're right. Make it clear Mexico abstains.""
 PAR_OAS.27.b: ""Actually Carrillo, we will be voting in favor of the resolution.""
 

