## EVENTS ##
############

 PAR_invasion.1.t: "Big Talk at the Little Island"
 PAR_invasion.1.desc: "The small size of Martín García Island made the disproportionate presence of military facilities within it look almost comical. Still, the small 2 kilometer island, by virtue of its presence at the mouth of the La Plata River, was zealously guarded by the Argentine military, and in turn disputed by Uruguay. Today, however, it was a place where the master of the Plate came for agreement, not dispute. Few could have imagined a situation where the arrival of a Brazilian Air Force plane to the island's airstrip would be so well received. For Colonel Carlos de Meira Mattos, the plane's passenger, that was also the case. As a rising star of the Brazilian military, Mattos had sooner expected to be invading the island than negotiating in it.\n\nAnother man who would rather go to war with his interlocutor than discuss with him was Eduardo "Bocha" Uriburu, recently promoted to brigadier general, and perhaps the most serious exponent of nationalism in the Argentine Army. Begrudgingly accompanying foreign minister Mario Amadeo, Uriburu saluted the Brazilian colonel and the two Uruguayan generals, Omar Porciúncula and Hugo Tiribocchi, who had arrived by boat from Colonia earlier.\n\nOfficers from the naval and air branches, as well as foreign ministry bureaucrats of all three countries, now assembled at the Naval Headquarters building, turned to the discussion of the issue which had become so pressing as to force their cooperation: The black sheep of the Plate, Paraguay.\n\n"As stipulated in our memorandum to the Brazilian and Uruguayan foreign ministries, the triumph of communism in Paraguay would be unacceptable to Argentina. However, we would not wish to act against it in such an eventuality without the acquiescence and indeed help of our neighbours." Amadeo, a known nationalist, was nevertheless an intelligent operator of geopolitics, and his willingness to use the mechanisms of consultation that had become more common after the War was perhaps what made him such a useful person to have at the Argentine foreign ministry.\n\n"While we would not like precipitated action - we in the Brazilian military cannot acquiesce to a government of those characteristics in Paraguay, either." Mattos let out smoke from his cigarette while a pair of Itamaraty sycophants nodded their heads in assent of the military's control of foreign policy. "This needs more detailed discussion."\n\n"Indeed." Amadeo's response was filled with a smug, and somewhat resentful sense of affirmation that the intervening translator did her best to soften. "None of us wants a repeat of 1870.""
 PAR_invasion.1.a: "What are the Argentines on about?"

 PAR_invasion.2.t: "Partitioning Paraguay"
 PAR_invasion.2.desc: "Since the first meetings at Martín García began a few months earlier, the representatives of the still-hypothetical Triple Alliance's militaries had become somewhat enamored of their task. Indeed, some might have not-incorrectly been accused of hoping for a communist victory in Paraguay so as to ensure all their preparatory work did not go to waste.\n\nAmongst the Argentine representatives in particular, there was some belief that such an eventuality may achieve a permanent solution to the problem of Paraguay as a geopolitical entity. Indeed, over the intervening months, their efforts had been directed more towards assuring Argentina the lion's share of Paraguay's population center as an occupation zone. However, they had been forced to concede by Brazilian intransigence that the capital, Asunción, would fall within the Uruguayan zone of occupation. Perhaps the most common trait among the Argentine negotiators was a deep resentment of Brazilian's double-cross at the end of the last Paraguayan war, which they seemed determined to avoid.\n\nIn part due to this unusual war-lust on the part of General Uriburu, the Brazilian colonels present at the meetings had become somewhat reluctant to go forward with the project. They were only dissuaded from doing so by the arrival of General Albuquerque Lima, an anti-communist hardliner if there ever was one. Nevertheless, the newly arrived general seemed more interested in laying out plans for a return to normalcy in Paraguay, including its full restoration as an independent state.\n\nAs for the Uruguayan diplomatic and military staff which took part in the meeting, they were clearly divided in two camps. The Nationalists surrounding Porciúncula were having the time of their lives talking about how at home they would be seen as heroes, while the Liberals under Tiribocchi were increasingly dismayed by the tendency of both Uriburu and Albuquerque Lima of considering expressions and tendencies of the Paraguayan opposition, which were perfectly normal aspects of Uruguayan politics, as communistic enough as to justify an intervention on their own right. Either way, their first priority was to make sure the Nationalists didn't get all the credit, to avoid the disaster that would be a Nationalist takeover of the Armed Forces. Their neighbors' lack of respect for Uruguayan sovereignty was a future problem."
 PAR_invasion.2.a: "The future does not seem bright for small states."
 
 PAR_invasion.3.t: "Realpolitik"
 PAR_invasion.3.desc: ""This is ridiculous!" Goulart said, pounding his desk. "You want me to commit the crime of imperialism, to stop imperialism? You don't see the issue with that little idea?"\n\n"I'm sorry sir, but you must think of the military. They're getting anxious about Paraguay, and whether we intervene or not, Argentine boots will cross the border. It will not be now, but it will be soon." Argemiro, Goulart's Minister of War, pleaded.\n\n"So what? You want me to invade to appease the Army? Jesus in Heaven, they already want to kill me, Argemiro. They'd strangle me with this very phone cord, you understand?"\n\n"I understand sir! But a Red Paraguay is too much to handle for most of the General Staff. If we let Argentina carve up Paraguay, they would be pointing a dagger straight at our hearts. Please, sir, I am begging you. Just sign the order. Don't think of this as an invasion, think of this as a humanitarian intervention!"\n\n"Oh, I didn't realise you were related to the Dulles Brothers!" Goulart sighed, rubbing his forehead. "Eugh, I will talk to you later. In-person, next time."\n\nGoulart put down the telephone and rested his arm on his head. Looking outside, Goulart couldn't help but wonder. How many of his actions were fueled by a genuine desire to do good? And how many of his actions; fueled by pure, savage necessity? Only to retain control over the fact that he would wake up tomorrow the President of Brazil - and not some prisoner to the OFN lapdog junta that would take over.\n\nNow, he had to fight to keep control over that fact. And if Argemiro said was true, so would the rest of the country. Paraguay had done nothing wrong to him or Brazil. Not in particular. But particulars didn't matter. Paraguay was a tool for leverage against the military. It was his life-ring, keeping him afloat. Damned, be anyone else."
 PAR_invasion.3.a: "Give the order."

 PAR_invasion.4.t: "The Shadow Over South America"
 PAR_invasion.4.desc: "Despite everything, the FULNA has emerged victorious, washing away all those that would oppose them. The Paraguayan Bush War is over, as FULNA broadcast their glories from Asunción to the rest of the continent. However, all fears of a contained, isolated Red Paraguay lies shattered - and in the worst way possible. Stepping from the shadows of the Paraguayan jungle, Che Guevara has revealed himself to be the true leader of the FULNA.\n\nThe situation has taken a turn for the absolute worse. Che openly talks of the entire continent following in the same path as Paraguay. His precise whereabouts are unknown, but it would not be a surprise if revolutionary cells have already been trained to raise hell. Dealing with terrorism in our borders would be a fool's errand when the black, rotten heart is within our grasp.\n\nTo confront the future, one must turn to the past. A renewal of a Triple Alliance to confront the Paraguayan threat must be revived. Already, plans for talks in Montevideo have begun to discuss the next move. With Argentina all in, it will only be a matter of time until Brazil and Uruguay join the coalition. It seems that if Che wants a People's War, he will certainly get one."
 PAR_invasion.4.a: "South America marches to war."

 PAR_invasion.5.t:0 "Agreeing to Disagree"
 PAR_invasion.5.desc:0 "In a cramped backroom in Montevideo, the fate of South America was being forever changed. The diplomats sat down on three sets of chairs. Brazil on the left. Uruguay in the middle. Argentina on the right. In the centre, a sturdy, mahogany table laid out a large, simplistic map of Paraguay. Everyone in the room wanted and needed Guevara brought to heel. How was a very simple matter, and was for the General Staff of the Triple Alliance to figure out. The more troublesome issue was what to do afterwards.\n\n"The Liberals-Febristas are our only option if we want to keep Paraguay from collapsing in on itself," a Brazilian diplomat pointed to large shaded dots straddling the border of Paraguay and its neighbours. "We may have to provide some assistance if things go too badly for them, in governing. A neutral Paraguay governed by the Liberals-Febristas would do the job."\n\n"Why do we need to give Paraguay up? We can simply agree to a splitting of the nation and go our separate way, surely? Restoring Paraguay after such a transgression like this, it's insane to me," the Argentine counterpart retorted. Many of the Argentine - and even some of the Brazilian - team nodded and murmured in agreement.\n\n"Invading a sovereign country is one thing. Keeping hold of it is most certainly another. You want to fight a deeply unpopular guerrilla struggle against Che's forces, go for it. But restoring the country is the cheapest, most reliable option for all of us," the Brazilian retorted.\n\nThe Argentine diplomat fell silent and pointed to Asunción.\n\n"What about the heart of it all, then? Unless you want all of us, shoulder to shoulder sharing the city, something needs to be done."\n\n"Give it to us, then," an Uruguayan general interrupted. "You two would tear each other apart over Asunción. You might as well give the city to someone with unbloodied hands."\n\nThe Brazilian and Argentinian looked at the Uruguayan. Shrugging, the two rolled up the map and put it away."
 PAR_invasion.5.a:0 "If Paraguay could not decide its frontiers, then someone else will."

 PAR_invasion.6.t:0 "Splitting of Hairs"
 PAR_invasion.6.desc:0 "Day Two. Just the same as yesterday, the diplomats sat down in their exact positions. A few minutes of coffee, a few more of idle conversation. As it did yesterday, eventually the pleasantries gave way to cold diplomacy.\n\nThe Brazilian representative unrolled the same map of Paraguay as from yesterday. On the map, scrawled lines and dashes collided with hurried notes and addendums drawn across the entire country. Testaments to the countless failed overtures and proposals of each and every side.\n\n"Perhaps we can get somewhere with this... issue of influence we have here," the Argentine representative said, his eyes failing to mask his lack of sleep. "We cannot afford to spend another day arguing about who gets what piece!"\n\nFor once, the entire room was united in their agreement, nodding. Of course, everyone wanted an agreement. It just had to be on their terms.\n\n"So you agree with our terms then? You get to occupy Paraguay, but we retain the occupation of Asunción? Would this not be the fairest way to carve it up?" the Brazilian responded. The room grew quiet once more.\n\n"You want us to be shot at by Che's merry band of guerrillas, while you get to loot Asunción? Why not seize Buenos Aires, if you're so desperate?"\n\nThe Uruguayan representative stepped forwards, brandishing a highlighter. Silently, he drew a line straight through Paraguay. In the South, it was marked with an A - Argentina. In the North, B was drawn on, for Brazil. Then he drew a small circle around Asunción. U for Uruguay.\n\n"Take it or leave it. Either way, this is the closest that we'll get to an agreement."\n\nJust like yesterday, they stared at the proposal, for a long minute. First the Brazilian conceded, and sat back down again. The Argentinian, making sure that he looked to be the most stubborn in the room, reluctantly conceded and walked."
 PAR_invasion.6.a:0 "Another issue resolved."
 
 PAR_invasion.7.t:0 "The End of the Conference"
 PAR_invasion.7.desc:0 "Today marks the end of the Montevideo Conference. Outside a drug deal in São Paulo, never will such a miserable pile of skullduggery and backstabbing ever assemble itself again on South American soil. Regardless, all the representatives can walk home to their masters, with a smile on their faces and promotion in their futures. Sealed is the fate of Paraguay, and the black tempest of war gathers around the FULNA.\n\nBehind the well-concealed gambling addictions, stained Italian suits, and half-gelled hair our diplomats played their role well. That is to ensure that Bolshevism remains an obscure, dying ideology, and it will never become anything more than a historical oddity that birthed itself from the frothing, brutal death of the Tsar's Empire.\n\nThe conditions agreed upon are simple. If the Bolsheviks were to ever win their civil war in Paraguay, then this would pose the gravest security risk to the entire continent. Therefore, the only recourse of action must be equally as dramatic. The formation of a new, renewed Triple Alliance against Paraguay must be created. The army of Argentina, Brazil and Uruguay will march together to deliver the people from the ungodly ideology of Marx and Lenin. We will topple the FULNA and restore a sincerely free, liberal democracy in Paraguay, beholden to no power but themselves!\n\nBut for now, all we can do is watch. Let us see if Paraguay can decide their fate properly. If not, then we will do it ourselves."
 PAR_invasion.7.a:0 "The stage is set."

 PAR_invasion.8.t:0 "The Beginning of the End"
 PAR_invasion.8.desc:0 "Dire news has come from Paraguay. FULNA has routed their enemies in Asunción. The battle in Asunción - if our correspondents are to be believed - was the cruellest and most vicious fighting that ever seen on South American soil. So brutal and hard-fought was the battle that the international press branded it as "Paulusburg-on-the-Pilcomayo", obviously a reference to the horrors of the West Russian War. Whatever the case, the Bolsheviks have triumphed.\n\nOur days of planning and coordination will not go in vain. The Treaty that we signed with our allies of the Triple Alliance will come into effect; in a matter of weeks, if not days. It is now not a matter of if we will invade Paraguay, but now a question of when. Not only is our army on the highest alert, but our air force is prepared to bombard the Paraguayans with every bomb in our arsenal.\n\nThe only thing that we need is to properly position our military on the border. It is no use having our men drill for the day to come if our soldiers are not even near Paraguay itself. When we are ready, the agreements will activate - including the sub-clause where Uruguay is allowed to march its troops through our borders for the time we are at war - and the Second War of the Triple Alliance will begin. We only need to give the order."
 PAR_invasion.8.a:0 "The drumbeat of war echoes louder with every passing day."

 PAR_invasion.801.t:0 "From the Shadows"
 PAR_invasion.801.desc:0 "The documents did not lie. And as Speer read through Gehlen's reports, neither did the South Americans. In practically no time, the faint rumour of a possible intervention in Paraguay, in the case of a FULNA victory, turned into fact. The fact that South America would not take this defeat, lying down. As Speer flipped through the pages, like a child through a picture book, the armies of the Triple Alliance were readying themselves for a brutal struggle, for their destinies. The following months would decide the destiny of South America. In the dirty, pot-hole filled paths to and from Asunción and in the humid, sweltering jungles surrounding the city. It was in the intersection of dreadful circumstance and human valor where the fates of continents were forged.\n\n"We have agents inside the town, however, they risk capture if they complete their mission," Gehlen's voice drifted back into Speer's imagination. "Guevara's supply depots are littered across the valley. Our agents are properly equipped to sabotage these depots when the invasion comes."\n\nThe truth was, Speer, did not care about the fine details of international diplomacy. Perhaps it was his age, but it was more of a struggle to keep listening to Gehlen ramble about moving this asset to these coordinates or what type of pistol each agent needs to use. He was an architect. The colossal, sweeping mansion is what mattered to him, not what chisel was used. The Paraguayan War was just another housing project for the Führer. It didn't matter how it happened; because the sheer fact of its completion outweighed everything. Bolshevism was too dangerous of a virus to flourish in the dying, stagnant politics of Latin America. It would spread and multiply until none were left to see the end. Its method of destruction mattered little to him.\n\n"Can we ensure a victory for the Triple Alliance, or whatever they're calling themselves?" Speer interrupted.\n\n"No," Gehlen said. "However, this is the second-best thing we have. Industry, vital communication links, ra-"\n\nSpeer put up a hand, to interrupt Gehlen."
 PAR_invasion.801.a:0 ""Then it is good enough for us. Let the South Americans finish the job we started.""

 PAR_invasion.9.t:0 "Almost Time"
 PAR_invasion.9.desc:0 "The President put down the letter, sighing. Argentina had come calling. Their troops, as he read the letter, were marching towards the border. Columns of men, tanks and trucks, stretching to the horizon. The letter did not spell out anything particularly shocking. Argentina and even minuscule Uruguay had their military ready for the invasion to begin. All they needed was Brazil. The President looked outside, towards Brasília. The sun set behind him, bathing the capital in brilliant hues of orange, pink and red. Outside, flecks of headlights trundled home, ebbing and flowing with the traffic. Stop. Then start. Stop. Then began, once more.\n\nThey didn't understand what type of world they lived in. Of course, the commoner knew about their world. They read newspapers, devoured reports and consumed television. That was the sanitised world. The illusion that he and his ministers - along with his predecessors - had crafted, like a master artisan. Whether they knew or wanted it, the President's principal job was keeping the wool over their people's eyes while advancing their interests. Why should they know? Why should they know how fragile their lives sincerely were and that at a slight change in the wind, their lives could collapse into rubble? It was almost enviable in a way.\n\nOf course, Guevara was not an idiot. Air reconnaissance had picked up tens, if not hundreds of aircraft within half-repaired airbases. Within months, Paraguay's military had gone from a disparate yet fanatical group of college students to a highly-trained unit that included a proper, fully-fledged air force. It was impressive. It would not be enough.\n\nThe President took a swig from his bottle. Bitter as ashes, but that was the appeal of it; wasn't it? In seven days, the Brazilian Army would assemble, just across the Paraguayan border. In seven days, they would blow the trumpets of war and let the Paraguay River run red with the blood of their compatriots. In seven days, all of South America would march to war. Whatever came next - good or bad - was entirely on their shoulders."
 PAR_invasion.9.a:0 "First as tragedy. Then as farce."

 PAR_invasion.10.t:0 "The Second War of the Triple Alliance"
 PAR_invasion.10.desc:0 "Everything has been leading up to this moment. At 3 PM, Argentina, Brazil and Uruguay will formally declare war on Paraguay. All of our troops have packed the border with guns, planes and tanks. In five minutes - no more, no less - the armies of the Triple Alliance will cross the border into Paraguay. Every single man knows his role and knows his task. Whether it is to shoot, bomb or drive straight into Che's Dominion, this will be one of the deadliest wars in South American History. While our forces train, so do Che's. It would be foolish to expect Che's forces to fight a conventional war, with trenches and sweeping offensives to drive us out.\n\nNo, Guevara will use every single last weapon in his arsenal to defend himself. We must be - and are - prepared for every single eventuality that the Paraguayan Army will use against us. Trained units, armed with the knowledge of disarming traps and combatting guerrillas, wait for our command. However, many in our government fear it is not enough. Guevara is not a man to be treated lightly. His legend carries just as much, if not more, weight than the deeds of the revolutionary himself. The most terrifying worry is that he will unleash some secret weapon or tactic from the darkest corners of Paraguay, ready to annihilate our men at any chance.\n\nWhile we know that is nonsense, few in our command expect this to be an easy war. This will not be a war for our grandchildren to learn about in their history books. This will not be a war made up of dashing heroes and daring cavalry charges. This will be a war drenched in mystery and bloodshed. A struggle where every corpse is a victory for either side. A conflict, where the lines between civilians and fighters are blurred and jumbled. Atrocities will happen. And they will not be far and few between. They will not be regrettable. They will be the course of things going forwards. For every man Guevara kills, we will kill tens of his. Until we banish Bolshevism from South America, none of our Triple Alliance will ever stop.\n\nWe have burnt our bridges behind us. South America has no place to go but forwards."
 PAR_invasion.10.a:0 "Cry Liberation, but let slip the hounds of war."

 PAR_invasion.11.t:0 "A Drink to Victory"
 PAR_invasion.11.desc:0 "Frota gulped down his glass of champagne. It was strangely sweet like strawberries dipped in chocolate. It was stronger than he expected too - causing the general to scrunch up his face. Beside him, Figueiredo grinned, examining Frota.\n\n"Tough isn't it?" Figueiredo chuckled. "From the French in Africa, if you can believe. I don't blame them for making such strong drinks. The things that come out of the Dark Continent... it makes everything over here seem tame in comparison."\n\nThe party - although considering these were a gathering of 50-year-old men, it could hardly be compared to a fraternity's night - was in full motion. On stage, an opera singer was bellowing her lines. She was beautiful, like what Frota expected Wagner's opera singers to be like. It was strange to see these typically stoic and hard-nosed men, merrily starting impromptu Tangos, but it was for a special occasion. The Brazilian Army had crushed Bolshevism; banished to the arid desert of obscurity.\n\n"Here?" Frota said. "Here, we are doing just fine. We put a stake through Che's heart, and we brought peace to the Continent. I do not know what's going on in Africa but South America? We proved ourselves to the world. Say what you want, but we aren't pushovers."\n\n"A little dramatic, but I agree. Paraguay is ours now. I keep getting reports of so-called partisan attacks, however. A good 80% turn out to be sightings or overzealous soldiers seeing a village boy with a gun. Or in one case, a schoolboy prank. Dressed up in ghillie, and armed themselves with a bunch of fireworks. Nearly got shot by their comrades. And quite rightly too."\n\n"The other 20%? What do they turn out to be?"\n\n"Doesn't matter," Figueiredo said, shaking himself out of his trance. Banging his glass with a spoon, he silenced the room. "Comrades! We've done well for a group of sorry bastards! Yet, where would we be without our beloved President? He is a collective pain in our asses and supposedly the worst poker player in the Southern Hemisphere! But... he is the one who killed Bolshevism in Latin America."\n\nFigueiredo raised his glass, along with Frota and the rest of the room."
 PAR_invasion.11.a:0 ""To the President of Brazil!""

 PAR_invasion.12.t:0 "A Horrific Disaster"
 PAR_invasion.12.desc:0 "General Figueiredo took a swig from his bottle of champagne. From French Africa - or at least what remained of it. It was the most peculiar mix of acute sweetness, and one of the toughest drinks he'd ever swallowed. It was as if the sweetness was corroding away at his insides, bit by bit. Considering it came from de Gaulle's tiny fiefdom, it probably was a relief to those who purchased it.\n\nThere was no possible way that Guevara could have won, like he did. Everything and anything was stacked up against him. Not a single factor could have played in Guevara's favor. Manpower, quality of weapons, tactics. Yet, every patrol mission would end up with the men coming back in pieces, or not at all. Guerrillas disappeared into thin air, every time Search and Destroy missions were conducted, and the men who conducted them would normally find themselves at the end of a punji trap. It was inexcusable, it was impossible and it all happened right in front of his eyes.\n\nThe General took another swig from his bottle. The photos of the bodies were the worst part. Bones jutting out of places that he never even knew existed. Collections of limbs and extremities in piles up to his stomach, all lying impaled on feces-ridden stakes. The eyes, oh they were by far the worst part. They weren't just another body part. They were the last snapshot into the psyche of boys - just boys - sent on a mission, with no possible hope of success. Whether they were attached or not to the body, the eyes always seemed to face the camera. They didn't tell a story of heroes falling in battle with the enemy, or an unfortunate accident that couldn't be prevented. No. Those corpses knew who their killer was, who had made sure that thousands of parents would never be able to hold their child's hand again. He had sinned, and all of South America would know it.\n\nAnother swig. The Generals were not to be blamed here. They were simply carrying out orders, weren't they? From high above, from the man ordained by the people of Brazil himself. The President kept sending more men to die, because if he didn't, then what would the death of the last man be for? He was the butcher of thousands. The General's hands were drenched in death, and it was not even him who trespassed against humanity. No, he had not sinned. But the President had."
 PAR_invasion.12.a:0 "The Knives are being sharpened."

 PAR_invasion.401.t:0 "The Führer and the Revolutionary"
 PAR_invasion.401.desc:0 "Speer poured through the photos and paper, laid out on his desk. These couldn't be right. He didn't even have to read a sentence of the report to know what happened. Incompetent fools. Incompetent fucking bastards who couldn't even hold their own against a bunch of barely-trained students with guns from World War One. Speer tried to conceal his rage from the outside world. It wasn't working. In front of him, Gehlen lit a cigar inside the Führer's Office.\n\n"Our one ally in that continent. Gone. Overthrown by who exactly, Gehlen?" Speer questioned, putting his papers down. "Che Guevara? I didn't even know he was alive, to be quite honest with you. Here he is, leading a country..."\n\nGehlen leaned forwards, folding his sunglasses. The spymaster's eyes were red, with blood veins reigning over his eyes, like the branches of a sick, dying oak tree. Sleepless nights and tireless days like Gehlen experienced had taken a toll on the man. Yet here he was. The Spider, always careful to check every last delicate string in his sprawling, colossal web. And he would not tolerate any threat to it.\n\n"While our ally might be gone, my Führer," Gehlen coughed. "The individuals that kept him in power are not. In hiding, in disguise or another place entirely, we still have a good window into Paraguay. Whatever you need found out, my Führer, our agents will discover. In fact, I have some good news for you."\n\nGehlen handed Speer a new manila folder. Opening it there were transcripts and monochrome photos of generals and colonels together. 'Unforeseen Events', 'The Paraguayan Question', 'Mobilisation against the Red Menace'. It was the first sign of victory, following a string of defeats. Brazil and Argentina would not take this news lying down. They recognised, just as much as he did, the dangers of Guevara's ambitions. South America was fighting back.\n\n"This is fantastic! I would have hoped that they could have dealt with it before, but no matter. Guevara doesn't stand a chance against them. And I will not stand idly while the fate of the Latin World is being decided. You are dismissed, Director. I have to call Schmidt."\n\n"What will you say, my Führer?""
 PAR_invasion.401.a:0 ""To make sure South America knows where we stand.""

 PAR_invasion.402.t:0 "A Tale of Two Generals"
 PAR_invasion.402.desc:0 "Frota thumbed Figuereido's number into his personal landline. Was it one-seven-six then... no of course not. The Brazilian General put two fingers up to his temple, closing his eyes. What was his number, again? He had it saved somewhere, but the cleaner must have thrown it out. Of all days to forget someone's number. Frota stumbled through all the possible combinations out there; until he was greeted by a deep, scratchy voice asking for his identity.\n\n"It's Frota here. You saw the news, I assume? What the hell does he want from us? From Paraguay? I know the Germans of all people are not keen on Socialism, but why here?" Frota said. Reaching over, he switched off the radio, where Albert Speer continued to read out an obviously pre-prepared speech.\n\n"I know why they support us. Thing is, I don't think Buenos Aires does. I just got off the phone, from my contact in the Argentine military. Met him at a New Year's party at Rosario. Nice man. Absolute lightweight, though. He's saying that they're treating this as a positive! Champagne out and everything." Figuereido said.\n\n"What? Parties? We're going to be invading a sovereign nation, not celebrating a fucking Bar Mitzvah." Frota sighed.\n\n"I know, but you tell them that. Regardless, it seems that Germany wants to spread their wings over our fair continent. They're posturing again as they did after the war. Except then, that was just in Europe and the Near East. I don't know what happened in Europe, and I don't want to, but I can tell you that it will not be good for us. Not one bit. I have to go now. I'll catch up with you later."\n\nFrota put down the receiver. This was... complicated; to say the least. It was an absolute fact that Germany had agents all across South America, and especially in Paraguay. Even after Che's conquest, the network was bound to at least remain partially intact. Yet, this was a Faustian deal that they'd been forced into accepting. Washington was always the goal for Frota. No superpower would benefit Brazil, like America would, and they would mostly keep out of Brazilian affairs. Mostly. Speer had forced their hand, forced their gratitude even. It would come back to haunt them. But for now? They were comrades in arms."
 PAR_invasion.402.a:0 "One seldom recognizes the devil when he is putting his hand on your shoulder."

 PAR_invasion.802.t:0 "A Heart of Concrete"
 PAR_invasion.802.desc:0 "There Germania was. Speer walked around his model Germania, still in perfect condition. Thirty years now. Thirty years had passed since the golden days of his life. Showing his Führer the wonders of a world yet to come, every single awe and stunned nod of his head was a badge of pride for the old architect. An idea - as solid and sincere; as the concrete, it was composed of - just out of reach. It was like seeing a reflection of something in the water, just ever so close to reality. But never quite there.\n\nGermania was the heart of everything. As Germania withered and crumbled, so did the Reich. But as the metropolis bustled and gleamed, so did Europe. News had come in of Paraguay's crushing defeat today. He made sure that every single newspaper in the still-habitable places of the Reich knew about it. It would never be the same as before; Che's lasting legacy to Paraguay. He mourned the death of Fascism, but Speer took solace in the fact it would be sharing its tomb with its killer. Bolshevism would never stain South America with its decadence anymore.\n\nIt didn't matter that the nations of South America would prefer to lap at the shining shoes of Washington. No, it would not matter. An architect never left things up to the last minute. German agents, embedded deep within Argentina, would convince them to... reconsider. They would see the light, the glamour of the glittering spotlights of Germania. They would see Germany's drive against all that opposed it, even when the odds were against it. They would see themselves in the Reich. A nation besieged on all sides by their inferiors. A continent that was rightfully theirs but held back by the world powers. A world; all too ripe to receive their majesty. All they needed was a leader. Like Hitler in the 1930s. Like himself, right now.\n\n"My Führer," Gehlen entered the room. "Our agents have discovered reports that say Argentina and Brazil both seek to move closer to Washington. Even after all our assistance, they still deny our overtures to them. What should we do?"\n\nGehlen looked more confident. Slicked back hair, clean-shaven and eyes covered by a set of sunglasses. The Spider was completely in control of his web, with every last tapering limb under control of each delicate string. Yes, Germania was the heart of the world. And the Führer was the only one who could keep it pumping."
 PAR_invasion.802.a:0 "Make sure they're thankful for our help. One way or another."
 
 PAR_invasion.803.t:0 "The Useless Brazilians"
 PAR_invasion.803.desc:0 ""Total fucking incompetents! Total, absolute incompetents, Director!" Speer shouted. "How inept do you have to be to fail? Guevara was right there; they could have shot, bombed or done anything! Why is he still alive, Director?"\n\nGehlen kept silent. Speer was right, wasn't he? The Argentines and Brazilians, as they spoke, were scrambling out of Paraguay, leaving anything and everything behind them. There wasn't a single doubt in his mind left about the fact the German - his - assets in the region were dead. Perhaps not now, perhaps not until years later. But they were gone. If he had trained them well, it would be by their own hands.\n\n"My Führer, you cannot blame yourself for this. We gave the Brazilians and Argentines maps, unit positions, photos, everything. Everything that they required to complete their mission. They failed. No-"\n\n"You're right, Gehlen. I don't blame myself for this. I blame you." Speer stood up from his seat. Hobbling towards the nearest window, he looked out of Germania. Gehlen recognised Speer's expression. It was that look of men whose defeat was snatched out of the jaws of victory.\n\n"My Führer, German intelligence is not at fault here. Guevara -"\n\n"You have children, Gehlen?" Speer interrupted, still looking outside. "You don't need to answer that question. Do you realise what happens if we continue to make blunders like these? If we allow Bolshevism - which should have died with that bastard Bukharin - to prosper across the planet? What happens to Germany, and its people, if we fail to do our jobs?"\n\n"What, my Führer?" Gehlen said.\n\n"We are all dead, Director. Washington will dig our graves, and Tokyo will give the eulogy. Bolshevism will kill everything you love, and if we continue to fail, we will build our tombs. You may as well take your children and shoot them in the back of the head. One by one. The alternative is so much worse." Speer said. With his back towards Gehlen, he waved him away."
 PAR_invasion.803.a:0 "You are dismissed, Director."
 
 PAR_OAS.1.t: "An End to OAStracism"
 PAR_OAS.1.desc: ""I understand your concerns, Walther," said the U.S. ambassador with only the thinnest of smiles. "But we will be inviting Argentina to join the Organization of American States at the next available opportunity."\n\nForeign Minister Walther Moreira Salles could feel his jaw tighten. To tack this onto an otherwise routine discussion at the embassy, to show no willingness to budge... Moreira Salles took a deep breath and said, "Argentina is a rogue state that will do nothing but disrupt OAS operations. To legitimize it like this-"\n\nThe ambassador cut him off, "They'll have limited opportunity to disrupt anything. We're welcoming them only as a probationary member - no voting rights. And to your point on legitimacy," he paused for a moment, gazing out the east-facing window, "if we don't bring them into the fold, their only options are our foes. Washington would rather have a troublesome partner than an ally of Germania, Rome, Tokyo on your doorstep. If Brasília feels similarly, we'd appreciate your vote in favor at the next OAS conference."\n\nMoreira Salles paused, then shook his head. "The absolute best we can offer is an abstention.""
 PAR_OAS.1.a: "The thin smile returned, "Very well. We already had the votes.""
 
 PAR_OAS.2.t: "The Ghosts of Snipe"
 PAR_OAS.2.desc: "The emergency session of the Organization of American States had just entered its fifth hour. Fatigue was beginning to show on the faces of the delegates. Leaders and representatives from every corner of the Americas gathered in Washington D.C. to decide whether Argentina would be admitted to the OAS. Araújo Castro, Brazilian representative to the OAS, tugged at the collar of his shirt. The room was filled with cigarette smoke, the coffee had long since gone stale, and sweat dampened the shirt on every delegate's back. Cases for and against Argentina's admission had flown back and forth all afternoon, culminating in the address of Chilean Ambassador Enrique Villarroel.\n\n"Esteemed delegates," said Villarroel with the utmost gravity. "In 1958, we met in this very room to condemn the heinous, duplicitous, cynical attacks by Argentina against my country. Indeed, I see many of the same faces here today. How can we even entertain the thought of admitting these rogues, these bandits, to a rules-based body such as this? The imperialist aggression of Argentina was not sated by the blood spilt during the Snipe War. They have continually harassed our personnel in our sovereign Antarctic territory. They have violated our territorial waters with their warships and vicious whalers." He paused for breath, and every trained orator in the room knew the height of his speech had come. Villarroel gestured to his right and his fellow Ambassador, Marcial Miranda, rose to join him. With the deliberation of a gravedigger, Miranda placed a series of large photographs on a stand for all to see. Gasps filled the room. "These," said Villarroel, "are photos of our outposts on Wiencke and Adelaide islands, of our compatriots, murdered in cold blood, tossed into the frozen sea, or burnt black in their habitats. How can this assembly admit these monsters into our ranks?"\n\nThe moment of the vote came, and Castro, as planned, but with extreme reluctance and shame, abstained on the part of Brazil, ensuring Argentina's admission, albeit on a non-voting probationary basis. They could always be removed later, Castro repeated to himself."
 PAR_OAS.2.a: "A small comfort to the dead of Adelaide."
 
 PAR_OAS.3.t: "Front Page of Folha"
 PAR_OAS.3.desc: "Stories of horror continue to emerge from Asunción as the Revolutionary Tribunal announced a fresh round of public executions. Three men were hanged after a closed-door hearing where they were found guilty of espionage and acting as an unregistered foreign agent. Four priests were likewise hanged after they were charged for belonging to a reactionary organization. Seven former Morínigo officials and six former employees of the financial sector for unspecified crimes against the Worker on behalf of Capital were given a public recitation of their crimes and paraded through the streets before being taken in front of a firing squad to the jeers and celebration of an enraptured public. Most heartbreakingly, a 14-year old boy named Abelino Brusquetti was hanged for Hereditary Reaction on account of being the son of Edulfo Brusquetti, real estate developer and landlord, who has disappeared since the Communist takeover and remains unaccounted for. This brings the total number of executed to over eight hundred, not counting the large-scale retributive killings that happened in the days and weeks following Che Guevara's successful capture of the nation. Refugees that have fled to Argentina and Brazil number in the tens of thousands.\n\nWe at Folha would also like to take a moment to remind our readers that our correspondent, Isaías Madruga da Fonseca, remains in Paraguayan hands, charged with the crime of printing seditious material and the promotion of bourgeois nationalism. In addition to Isaías, twelve other Brazilian nationals are confirmed to be held in custody by the Paraguayan authorities and approximately fifty are currently missing with their current status unknown."\n\nHugo Andrade Madruga folded the paper and drank his coffee, hoping to wash down the acid feeling out of his mouth. He thought for a moment about the agony that his wife would go through if he had been in Paraguay at the time. Would his precarious situation be reduced to a single sentence in the newspaper? Would that be the epitaph for those thirteen unlucky souls?"
 PAR_OAS.3.a: "A new face in the crowd at the next protest, and a new voice calling on Brazil to act to save them."
 
 PAR_OAS.4.t: "Damocles's Throne"
 PAR_OAS.4.desc: "The intercom on [BRA.GetLeader]'s desk crackled. "General Geisel is here to discuss the Paraguayan situation. Shall I send him in?" The President nodded to an aide, who brought the latest intelligence report on the situation and promptly left the room. General Geisel entered, and wordlessly, saluted his commander-in-chief. The President nodded, and Geisel relaxed his posture only slightly.\n\n"My President, have you had the opportunity to look over the intelligence reports? There are increasing concerns of Paraguay funneling funds and weapons to radicals in the hopes of paralyzing our country and rendering it ripe for a communist overthrow. Many of the senior generals are hoping to mobilize and intervene in Paraguay before the situation deteriorates any further."\n\n"I've read them, General." President [BRA.GetLeader] nodded, gesturing to the report on the desk. "Immediate action might not be the wisest course. The terrain is difficult and any action on our part might inflame tensions, perhaps even emboldening rebel groups even more so than Che Guevara ever could."\n\n"If we do not act, Argentina might, and then we face an even worse situation. Argentina mobilized directly on our borders. If we do not have our own troops prepared, we could face a situation where Argentina might be poised to invade our country."\n\n"A remote possibility. If Argentina and ourselves both invade, then one off-target artillery shell or air strike from either side could send both of our countries to war."\n\nGeisel was quiet for a moment, before stating. "Of course, the final decision rests with you. Remember that you lead the military due to our confidence that you would protect our nation from harm as commander-in-chief. If the military believed that you could no longer perform that function, well...""
 PAR_OAS.4.a: "Geisel left the President to ponder his point in silence, though not without a crisp, ironic salute."
 
 PAR_OAS.5.t: "An American Solution"
 PAR_OAS.5.desc: "The red flag flew in Asunción. Refugees poured out of Paraguay, as the radical proclamations of the new government echoed across the continent. The Brazilian high command hounded their president, eager for military intervention, to nip the revolution in the bud. There was one big problem - the Argentine high command had the exact same idea.\n\nThis was the main sticking point to the decision-makers in Brasília, civilian and military; intelligence reports indicated that Argentina was mobilising for war. Although everyone agreed a rogue communist nation on Brazil's border was unacceptable, Brazilian intervention in Paraguay would occur simultaneously with an Argentinian intervention - once the rebels were defeated, the two armies would meet in the field, and the situation would likely escalate. This was putting aside the obvious cost of occupying Paraguay until order could be restored.\n\nAfter hours of debate and deliberation, Lincoln Gordon, the American ambassador arrived to present a proposal to President [BRA.GetLeader] and the general staff. The Brazilians and Argentines, by themselves, would never cooperate - but if intervention into Paraguay was done under the auspices of the Organisation of American States, the two nations' interests would be mediated by a third party. Washington didn't care particularly about the fate of Paraguay, but they didn't want war to break out in South America. Gordon promised the US would have the votes and the influence to get it done.\n\nNaturally, some generals balked at the plan. A few were offended at the idea that Brazil would need to invite the rest of the Americas in to solve a problem in their own backyard. It was pointed out that it was American meddling that pressured Brazil into inviting the communists into FULNA in the first place—now Brazil was suffering the blowback. Still, a legal framework for intervention without risking a wider war was an appealing prospect, if it worked."
 PAR_OAS.5.a: "Soon, an emergency OAS summit was called - the Brazilians agreed with Gordon's plan."
 PAR_OAS.5.b: "The plan was shot down - the Brazilians would soldier on without Washington"
 
 PAR_OAS.6.t: "The Proper Channels"
 PAR_OAS.6.desc: "Pushing past the other delegates, Araújo Castro hurriedly left the conference room of the House of the Americas, the OAS' Washington DC headquarters. An American aide tugged on Castro's arm, and he followed the young woman away from the congested hallways.\n\nCastro loosened his collar, exhausted by the just-finished meeting. The vote had gone his way handily, but not without incident. He said to the aide, in his accented English, "You should've heard the Cuban delegate in there. Yelling like a goat. Stubborn as one too. Look across the ocean if you want to see 'imperialism,' eh?"\n\nThe woman did not reply, instead unlocking a door in a quiet hallway, ushering Castro into a small office. She gestured to a telephone on the desk; "Your call to Brasília, as promised."\n\n"It's secure?" Castro asked. The aide nodded and took her leave, and soon Castro was on the line with Planalto Palace.\n\n"Good news, Mr. President, the resolution passed. You and the general staff will hear from the Americans soon about coordinating the invasion with Argentina. They showed me the maps for the proposed occupation zones - they had the usual rubbish about how Paraguay will remain 'sovereign and independent' under a shiny new OAS caretaker government, as if it was their boys on the ground. Another stipulation was no territorial concessions, so the Bolivians will be upset. You might get a call about their claims on the Chaco. Just warning you. That's the OAS line on Paraguay, Mr. President...""
 PAR_OAS.6.a: ""It's all completely legal, and for their own good besides.""
 
 PAR_OAS.7.t: "Fracture Point"
 PAR_OAS.7.desc: "Our top story tonight, protests erupt across the country after the OAS voted to authorize a joint invasion of Paraguay with both the Brazilian and Argentine armies participating in the conflict. Small-scale protests had been ongoing during the OAS summit, but with the result and President [BRA.GetLeader]'s declaration of assent to the vote, the Brazilian people have turned out in droves across the country. From Belém to São Paulo, the country is seeing a wave of protests against the move."\n\n"Many of these protests have been organized by left-wing parties and activist organizations, who denounced the administration for the invasion and have called for the Brazilian people to recognize the popular will of the Paraguayan people and to stand in solidarity with their new government. Other protesters were less ideological, preferring instead to issue statements declaring their opposition to the war and expressing concern for the inevitable casualties that would result. A small number of anti-Argentine protesters, mainly in Região Sul, made statements about their suspicion of working with the Argentinian Army and called for strengthening the border."\n\n"Several of the protests became violent, with protesters throwing bottles and stones at police officers or smashing windows and automobiles, necessitating the dispatch of riot teams to contain the outburst. The largest riot happened in Rio de Janeiro, where the military had to be called in to assist, resulting in four injured police and military members and eighty-five protesters. Official statements from the Chief of Police have not ruled out foreign agitation by Paraguayan infiltrators among the malcontents, and stress caution and vigilance among the people."\n\n"Certainly this is a momentous time, and we here at Tupi will be sure to keep the public informed of these rapidly-changing events.""
 PAR_OAS.7.a: "Nations unified, a nation hardly so."
 
 PAR_OAS.8.t: "First Among Equals"
 PAR_OAS.8.desc: "Rodrigo Guitierrez had a headache and he was late. Dealing with the Brazilians and the Argentinians as the lead OAS attaché always gave him a headache whenever he had to handle being the mediator for Operation Tuiuti. He was late because he had hoped not to deal with the two hotheads leading the armies. Which was perhaps unfair, in other contexts the two men could be quite personable. But they quarreled over everything, even the location of this meeting until Rodrigo had suggested an American military base as acceptable neutral ground. He could hear the men shouting before he finally entered the conference room.\n\n"Maybe you can explain why the Argentine military needs to monopolize so many of the logistical elements? Can you not bring your own supplies?" Major General Carlos de Meira Mattos muttered.\n\n"Argentina is providing most of the high-altitude specialized infantry. We had hoped, in the spirit of this alliance, that Brazil could devote more manpower to logistics shipments. After all, most of the Communist forces are barely-trained guerillas. If we have the fuel our vehicles will be adequate protection. But we need to make sure we have fuel, and most of Argentina's fuel is required for the air support missions we will be flying," General Rattenbach countered.\n\n"Which wouldn't be a problem if we had agreed to joint air patrols, as I had suggested previously."\n\nGeneral Rattenbach knocked over a cup, and then shook his head. "We're getting nowhere, let's take ten minutes, get a drink of water, and cool our heads. Then we'll review the joint proposals."\n\nHe left the room after the two feuding generals left; he needed to grab a smoke and calm down. As he walked, cigarette in hand, he walked by a few MP's dragging some Brazilian and Argentine privates, eyes swollen shut and knuckles bloody, to the stockade, and felt another headache coming on."
 PAR_OAS.8.a: "Who needs Paraguay when we have enough enemies right next to us?"
 
 PAR_OAS.9.t: "Reckoning"
 PAR_OAS.9.desc: "It was the beginning of the end for Paraguay. The border city of Pedro Juan Caballero was burning from constant artillery fire and aerial bombardment. Yet, this didn't uproot all of the guerrillas. Captain Reyes and his men found themselves pinned down behind a fountain by fighters holed up in a tower- with a machine gun on the roof. Help was quick to arrive for the unit. First came the pounding of helicopter rotors, then came the roar of the gunship's chainguns tearing into the tower.  Reyes couldn't help but whoop along with his men as a salvo of rockets silenced the position for good.\n\nLieutenant Carvalho loved his girlfriend so much that he took a picture of her wherever he went- including several thousand feet in the air in an F4 Phantom. Following his wing leader, he guided his plane down in a dive, slicing through the clouds. Below them, the Paraguayans at the rail station scattered to find cover, while some took futile potshots with their rifles. Carvalho made sure to turn the photograph away from the windshield. She hated the sight of violence, after all.\n\nThe M60 turned a corner, with the sergeant in command ordering the gunner to traverse the turret. There, they spotted their target. Guerrillas had formed a barricade out of several trucks. The Brazilian soldiers attempting to flush them out saw their saving grace, and leapt out of the way. The sergeant barked an order to fire, and a high explosive round tore through the barricade. The driver moved forward to push the blockage aside with the tank's bulldozer blades."
 PAR_OAS.9.a: "The tracks crushed debris, the dead, and the dying."
 
 PAR_OAS.10.t: "Last Among Many"
 PAR_OAS.10.desc: "The mood was tense at the Emergency OAS summit. The news on everyone's lips was the Bolivian invasion into the Chaco. With Paraguay having sent their forces to defend themselves from the OAS attacks on the northern and southern thrusts, their defenses in the Chaco along the Bolivian border had been stripped to skeleton crews to allocate more manpower to their defensive efforts. After the Bolivians had retaken Santa Cruz and deposed the Paraguayan-backed puppet ruler, their military had kept going, pushing into Paraguayan territory.\n\n"This is awful," came Rodrigo Guitierrez's voice, his normally calm voice escalating into shrills. "The Bolivians are calling for annexation of Paraguayan territory as reparations for Santa Cruz. Now the entire world sees the invasion as a means to carve up Paraguay between its members."\n\n"Calm down. We cannot lose our heads." Carlos de Meira Mattos shook his head. "We should immediately contact the ambassadors and let it be known in no uncertain terms that if they continue advancing in the Chaco, we would be quite displeased. For the good of their nation, and the safety of their army, they should slow their advance and coordinate with us."\n\n"I agree," General Rattenbach nodded. "The Bolivian Army might be a match for the dregs of Guevara, but they have been a battered force for too long. The threat of conflict will likely be enough to stop them and ensure that the invasion proceeds on pace. I don't think they'll want to push their luck."\n\nRodrigo couldn't believe it. The Argentine and Brazilian delegations agreed on something for once. "Very well, I'll coordinate through the OAS as well."\n\nRattenbach smirked, "Looks like the Paraguayans are seeing the second War of the Triple Alliance.""
 PAR_OAS.10.a: ""The first one worked out so well for them," de Meira Mattos agreed with a chuckle."
 
 PAR_OAS.11.t: "Concepción"
 PAR_OAS.11.desc: "To know that Brazilian victory had arrived, the conquered would need to see the troops. The troops would need to see their general. And Major General Carlos de Meira Mattos would need to see the city.\n\nConcepción, not Asunción. The capital was reserved for a body of international OAS peacekeepers and a powerless transitional government. De Meira Mattos' place was here, in front of the statue of the Virgin gracing the city center, receiving the adulations of his men. Minimal Brazilian casualties and heaps of communists cut down had earned their respect.\n\nDe Meira Mattos' place in the backseat of a staff car, trundling along the aptly named Calle Brasil toward the Paraguay River. His stern gaze meeting sheepish Paraguayan eyes, daring some would-be communist hero to take the shot. They would be brought down first by the two boys from Vitoria, now blessed with veterans' hawkish eyes, seated at his sides. It was not his place to show fear, that was for the guerillas to feel.\n\nHis place was in a dark office, the echoes of the President's congratulatory phone call and popped champagne corks ringing in his ears. Looking over damage reports and reconstruction plans for Concepción and the entirety of the Brazilian occupation zone. Reading profiles on the communists and fascists still believed to be at large. Spreading the latest map of Argentine positions in the south. Tracing his finger along the route of the Transchaco highway to Asunción.\n\nThe war was over."
 PAR_OAS.11.a: "But the true war for Paraguay was still to be born."
 
 PAR_OAS.12.t: "The Enemy of My Enemy"
 PAR_OAS.12.desc: "The camera clicked as Captain Reyes grinned, holding up a captured rifle from the Paraguayan guerillas. He kept the rifle up for another photograph, before tossing it into the pile that he got it from. Journalists and photographers had flocked to the site where the Brazilian and Argentinian forces met- hoping to get photos of camaraderie over the seeming defeat of their shared enemy.\n\nInstead, they found two exhausted and untrusting armies. The Brazilians kept to their side, and the Argentinians to theirs. There was no clapping one another on the back and wishing their 'brothers' well. Reyes was about to tell his men to return to the camp, when he heard a whistle from the other side.\n\n"Hey, you!" called a young Argentinian officer, walking up to the border between the occupation zones. "Congratulations on your triumph!" If the man spoke Spanish, Reyes would've been able to understand. Instead, the Argentinian was speaking in a stilted, unnatural Portuguese. The officer stuck a hand out, reaching for a handshake. Reyes looked at the Argentinian's hand, and then his face.\n\nHe heard the camera flash behind him as he turned around and walked away from the Argentinian. He didn't care. He just wanted to get back to the camp and catch up on all the sleep he was missing."
 PAR_OAS.12.a: "An ally is not a friend."
 
 PAR_OAS.13.t: "No Friendly Casualties"
 PAR_OAS.13.desc: "Smoke still wafted from the bullet holes in the worn stone of the isolated farmhouse. The squawking of tropical birds was in the air, frightened by the gunfight. Captain Reyes picked up the all-clear from his squadmates who had breached the basement, and moved up from behind the upturned cart to join them, rifle held to his chest.\n\nAt the back of the house, concealed behind some hay bales, Reyes crouch-walked into the subterranean room dug into the ground, and as he entered the wider chamber, two of his men, their olive drab splattered red, nodded in acknowledgement. The rebel's guns were old German models, poorly maintained. One guerilla was splayed out on the ground, blood running in gouts from his neck. Another had fallen backwards onto a table which was covered in maps and some boxes of ammunition - the guerilla was perhaps nineteen, his broad, native features twisted in death.\n\nEver more counter-insurgency squads Brazil deployed into Paraguay reported the same thing; it used to be they would find Communist paraphernalia - booklets or flags, red armbands on the fighters - but months after the invasion, this was less frequent. Reyes certainly couldn't find any on the property, and the remaining intel was mostly useless. The villagers a few clicks down the road, too, would still say they knew nothing about guerillas in this area, no matter how many beatings Reyes' men dished out.\n\nIt didn't take a military mastermind to figure out that the growing guerilla movement was no longer made up of Creydt loyalists, but of angry locals who wanted the foreigners out of Paraguay - with Argentine backing, according to the barracks gossip. For his part, Reyes hated this country, and would be happy to leave right quick, but every indication from the eggheads in Brasília was to prepare for the long haul."
 PAR_OAS.13.a: "Captain Reyes' report of the raid was perfunctory: all enemies eliminated, no friendly casualties."
 
 PAR_OAS.14.t: "Good Intentions"
 PAR_OAS.14.desc: "Eloísa Leitão de Campos had wanted to help. After Paraguay had been liberated, she had volunteered to serve as an aid worker to help the people of Paraguay. She had visions when she left of being a real hero, of the people cheering her name as Paraguay rebuilt itself from under the spectre of the Communists. The work would be hard, but she would be a saint.\n\nReality shook her from her dream quickly. She had barely any time for anything these days. Carlos de Meira Mattos had constantly diverted donations of food and money toward his occupation troops to ensure that they were well-compensated enough to hunt down partisans. There was never enough food or blankets to go around, medicine had to be given in half or quarter doses just to ensure that it didn't run out, and sometimes, all Eloísa could offer was a meager sorry.\n\nSorry had long worn out its welcome. Deadlines to end martial law had been postponed again after again. The people needed passes to leave their homes after dark, permits for any meeting above seven people which were almost always rejected if they weren't church services. The peasants that had gained land when the communists seized it had it forcibly reclaimed, so many of them were left unable to work. The irony wasn't lost on Eloísa, but when she saw the hunger and the desperation in their eyes, she couldn't help but concede that their anger made sense.\n\nAs she brought her supplies to the next distribution point, a crowd of Paraguayan men looked at her, hatred in their eyes. "Gentlemen, I have food and..."\n\nTheir reply was swift as empty cans and other garbage was hurled in her directions. "Get out of here, Brazilian sow! Take your food, take your troops, and go!"\n\nFear welled up in Eloísa's throat. With the troops staying in their garrisons or patrolling for partisans, she was outnumbered and alone. Plenty of aid workers had been beaten, she had even heard a handful were killed."
 PAR_OAS.14.a: "She fled, leaving her dreams behind."
 
 PAR_OAS.15.t: "Evil"
 PAR_OAS.15.desc: "He was another face in the crowd. Almost nobody noticed him make his way through the throng of Paulistas, his eyes locked on the senator, his right hand gripping the revolver in his jacket pocket. The senator stood on a pallet in front of the new school, winged by municipal leaders, teachers, and local children. His speech was interrupted by a cry in Guarani - "Free Paraguay!"\n\nA single shot rang out, then people screamed. The senator staggered back, clutching where the bullet had hit his shoulder, and was quickly whisked away. Almost nobody had noticed the would-be assassin, but at the moment he pulled the trigger, his arm was yanked away and then he was thrown to the floor by the senator's bodyguards. People fled down the street, into the alleys; children were crying.\n\nHe spoke candidly in the police station, though it took some time to find a translator. He was another face in the crowd - he had come to São Paulo two years ago from a village in Amambay. He worked as a truck driver. He sent most of his wages home, since his family's cotton crop sold for less, they had land confiscated in the post-revolutionary landlord reparations. He didn't know many people in Brazil.\n\nA few years ago, noted the journalists and the critics, attacks of this sort happened in the occupation zone or in border towns. This was the first to occur in the Brazilian metropole. It would do the increasing unpopularity of the occupation no favor, as many on both sides of the border awaited the occupation's prospective end in 1971; in fact, it was not a totally fringe idea to end the occupation early.\n\nThey needled him, during questioning, about how evil it was to endanger the children - if he shot wide, for example. He asked in return, what of the children of Paraguay? What right did Paraguay's neighbours have, smothering them, selling their future away?"
 PAR_OAS.15.a: "It will take a lifespan."
 
 PAR_OAS.16.t: "Unwelcome"
 PAR_OAS.16.desc: "The expansive Hall of the Americas in Washington D.C. gathered together the great and the good of the western hemisphere under its soaring ceilings and the banner of the Organization of American States. Two of these OAS representatives, one from Rio de Janeiro and one from Santa Fe, walked briskly along its marble floors, murmuring to one another. The Brazilian, Araújo Castro, spotted a vacant room, and gestured for his U.S. counterpart to follow.\n\nWhen the heavy oaken door had shut behind them, Araújo Castro cried out, in fair English, "It cannot be allowed. It cannot! Perón and his minions will not be allowed to subvert this organization, or Brazil and I shall have no further part in it."\n\nThe New Mexican representative nodded slowly, "Oh, I agree. And so do the folks in the White House."\n\nAraújo Castro deflated a little. "Good," was all he managed.\n\nThe American seemed lost in thought, staring at the Aztec-inspired wall decor. "This whole business is such a waste. Perón tossing away the greatest chance for peace your continent has, in favor of Europe's dead grip."\n\nAraújo Castro was already opening the door, "He could never do otherwise. Come, we need to warn the Uruguayans.""
 PAR_OAS.16.a: "The Hall of the Americas is not big enough for one man. Perón."
 
 PAR_OAS.17.t: "The Paraguayan Dilemma"
 PAR_OAS.17.desc: ""Mr. President, we cannot overstate how dangerous this is." The Uniform stressed to the President of Brazil. "This isn't any standard exercise they're conducting. We've photographed the trains. We've studied flight patterns of their air force. We've seen the numbers that our intelligence provided for logistics." The Uniform took a breath. "Argentina is about to invade Paraguay. We estimate that without our intervention, they'd be on the Paraná in a week."\n\nAnother uniform spoke up. "If we launch a strike before the Argentinians can, we'll be able to keep our borders safe." A suit from the Ministry of Foreign Affairs cleared his throat. "If I may, Mr. President, sending the military to Paraguay is very dangerous. The Argentinians will not hesitate to declare war on us should they feel threatened by an intervention in Paraguay. Instead- we can merely use the idea of a strike as leverage over them."\n\nThe President leaned back into his chair. If Brazilian troops entered Paraguay, it would be likely that Argentina would escalate it into an all-out war in South America. But what if Argentina wasn't cowed by Brazil's threats? What if they didn't stop at the Paraná? It was a hard decision to make, but for the sake of Brazil..."
 PAR_OAS.17.a: "...Buenos Aires had to be threatened into place."
 PAR_OAS.17.b: "...a pre-emptive strike into Paraguay was in order."
 
 PAR_OAS.18.t: "Moment of Truth"
 PAR_OAS.18.desc: "The world's eyes were on South America.\n\nIn Europe, people watched from their living rooms as a TV reporter from the German broadcaster RRG walked along a line of Argentine artillery batteries, the Paraguayan border visible in the background.\n\nA Japanese film crew trawled the grocery stores in Rio de Janeiro, capturing the long lines out the doors, the hesitation in the faces of those affected by the war scare.\n\nA world away, the White House press secretary tried to corral the crowd of journalists, trying to assure the nation that the executive branch took the situation in South America very seriously.\n\nIn Brasília, President [BRA.GetLeader] glowered over a table covered in maps, surveillance photos, and intelligence reports. Military officers swarmed around, relaying the facts as they came in; if Argentina invaded Paraguay, they'd be at the Brazilian border in days. Through confidential diplomatic channels, [BRA.GetLeader] had made his counterpart in Buenos Aires aware - if they crossed into Paraguay, Brazil would have no choice but to launch their own invasion. He held a white knuckle grip on the table. He hoped he wouldn't have to follow through with that promise.\n\nThe world held its breath, even as the Palácio was a hive of activity. The grim fantasy of Argentine and Brazilian forces meeting in the field, in the rubble of a smaller nation caught in the crossfire, seemed to edge towards reality. Though the heat rolled on, a ringing cut through the noise. A General held the phone receiver to his ear, and spoke. "Mr. President, they're withdrawing. The Argentines are standing down.""
 PAR_OAS.18.a: "Paraguay's communist regime will live on, but so will everyone else."
 
 PAR_OAS.19.t: "Across the Line"
 PAR_OAS.19.desc: "About a dozen soldiers occupied the farmer's house - two rooms in all - that stood sunbaked by the dirt road. All around were cotton fields, with the horizon sometimes dotted by similarly basic dwellings of the peasants who had worked them. When news came of the revolution in Asunción, they had spontaneously decided to drown the local landlord in the nearby river. Now the peasants too were gone, displaced by the dual invasions or hiding in the forest.\n\nFrom deployment at the Brazil-Paraguay border, to the invasion itself, Captain Reyes and his company had found the operation mostly uneventful. In fact, they counted one casualty - the radioman had just come down with an upset stomach. Therefore Reyes found himself struggling with the bulky radio set in the hut's main room.\n\n"HQ, do you read? This is... coordinates are..." Reyes repeated a regular patter into the set over and over, growing irritated at the static. Out the front door, two soldiers smoked and sat on the waist-high sandbags. From the other room where they all slept came idle conversation.\n\n"-Confirmed across Chaco... Enemy at Paraná crossing..." The radio whispered, and Reyes focused close. He handled the dials delicately, trying to find the voice. Familiar words in Brazilian Portuguese came back; "-Lack of actionable intel... Multiple positions in the line... Skirmish..."\n\nSkirmishes across the line? Last Reyes had checked, the communists had gone to ground. As Reyes puzzled over the patchwork message, one of the smoking soldiers cried out.\n\nReyes turned and saw, past the door frame, past the machine gun emplacement, past the cotton field, a column of tanks rolling out of the horizon, tearing down the dirt road."
 PAR_OAS.19.a: "Who started the shooting war? The Argentine armour rolled ahead anyway."
 
