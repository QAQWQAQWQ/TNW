 POLITICS_BENJAMIN_RATTENBACH: "Keeping to tradition in politics is the overpowering instinct in Argentina, and the choice of Lt. Gen. Benjamín Rattenbach to govern the Paraguayan territories is but one example. Born in the late 19th century and making a lifelong military career, Rattenbach is a Catholic, a nationalist, and a member of the "Azul" military faction in that order. Above all, he is a key believer in duty: he has not entertained the idea of his post as a stepping stone much at all.\n\nHis work in Villa Oriental has been cut out for him, however. Presiding over a strip of land along the border with the country he reports to, the shadows of FULNA and of the war that came even before them are one problem, local administration is still dysfunctional and most worryingly of all, the Paraguayan Church remains stained with the influence of the reds. Winning the peace takes forward- and backward-thinking, and it is up to him to show the Argentinian government is capable of doing both."
 BRP_Carlos_de_Meira_Mattos: "Carlos de Meira Mattos"
 POLITICS_CARLOS_MATTOS: "Major General Carlos de Meira Mattos is that most dangerous type of man: a thinking man of action. The young man's hand shot up when his state, São Paulo, called for aid in the Constitutional Revolution of 1932. A year later, he entered the Military School of Realengo, soaking in its teachings, discipline, and sense of superiority to emerge as an officer in the Brazilian Army. Though only a captain, de Meira Mattos would play a key role in organizing the 'Smoking Snakes' expeditionary force in the Second World War and would see combat himself in the Mediterranean. Stints teaching the infantry course at Realengo's successor and serving as an attaché to Bolivia further honed his fighting philosophy.\n\nIt is unclear whether de Meira Mattos' character, his expertise, or his rumored involvement in Brazil's military intrigues saw him rise to command the Brazilian occupation zone of Paraguay. Few could deny, however, that the colonel has taken to the role with gusto. Each day, former members of the fascist or communist regimes are hunted down, charged, and, frequently, executed. Despite language barriers, organizations and the press are monitored for extremism and opposition to the occupying authorities, and dispatched accordingly. This vigorous approach has not yet ensured stability or seen a measurable decrease in the number of guerilla attacks needling his forces. And, should this strategy fail to do so, de Meira Mattos will fashion another. More tailored, more ruthless, and more forceful than what came before. To Paraguay, he is a dangerous man indeed."
 URP_Fernando_Levi_Ruffinelli: "Fernando Levi Ruffinelli"
 POLITICS_FERNANDO_RUFFINELLI: "To survive Morínigo's Paraguay required compromise. To survive the communists required a dash abroad, what some might call cowardice.\n\nAnd Doctor Fernando Levi Ruffinelli survived. The lawyer from Villarrica dabbled in journalism, dabbled in politics. His critiques of the government were just tepid enough, his Liberal Party support just inconsequential enough, to carry on. And when the Bush War culminated with the communist seizure of Asunción, his academic work on Paraguayan-Brazilian border demarcation brought him just close enough to safety to avoid the grim fate of his colleagues.\n\nThis combination of luck and flexibility convinced the OAS that Levi Ruffinelli was the man to lead Paraguay's transitional government. They have not convinced Paraguayans, who regard him as a spineless collaborator to the Argentine and Brazilian occupiers.\n\nBut Levi Ruffinelli is doing all he can for them. He wheedles, he whinges, he privately rebukes the human rights violations of OAS troops. If only the transitional government had a sliver more of autonomy, if only the nation's liberalism wasn't quite so decapitated. If only Paraguayans had more than Levi Ruffinelli."
 

