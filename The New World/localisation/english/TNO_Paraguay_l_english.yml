##################
## LEADER DESCS ##
##################

 POLITICS_HIGINIO_MORINIGO_DESC: "Order - gives the state its form. Discipline - gives the nation its moral character. Hierarchy - gives the people structure. President Higinio Morínigo, he who has bestowed Paraguay these three virtues, is the man who stands at the top of this hierarchy.\n\nHe did not get to this position overnight, first coming to the public's attention after recovering Paraguayan hero Francisco Solano López's remains, leading to him to find favor with President José Félix Estigarribia. When Estigarribia retired, Morínigo was appointed as a seat warmer for the Presidency by the Liberal Party. For most other people, this would be where their story would end.\n\nHowever, such a great man was intended for so much more, betraying the oligarchs by seizing absolute power, and sending them into exile. His race - the oppressed Guarani - had suffered for too long at their hands, and Europe had shown him how to lead them to greatness. His order molded Paraguay anew, creating a thoroughly fascist state, steeled further by the failure of America to overthrow it during the Guaíra Falls invasion.\n\nYet despite - or because of - these achievements, Morínigo has regressed from a war hero to a bitter old man, lazing on top of his new order. In every corner, he finds only enemies, wretched politicians and generals who have grown fat off his victories. Boxed in, his days seem numbered, dwindling down until his reign is replaced by a self-serving opportunist or worse, leaving him with a final thought:\n\n"Whatever will happen to Paraguay once I'm gone?""
 POLITICS_CHE_GUEVARA_DESC: "Ernesto 'Che' Guevara's life has been defined by a love for revolution - a love supplied by a voracious curiosity that has ferried him across capitalist nations and Marxist ideologies, old friendships, and new wars. Once a radical youth hopeful for a peaceful transition to Communism, Che's revolutionary beliefs took root amid the shed blood of the Colombian Civil War, when Communist sectarianism trapped millions in years of cyclical violence. Che left Colombia a changed man: one who would live and breathe his ideology.\n\nAfter training in the jungles of Yucatán, Che accompanied Fidel Castro from initial defeat at the Granma to final victory in Havana. In Cuba, he became famous for his energetic, ruthless dedication to the communist cause, often calling votes among his fellow revolutionaries to decide upon a captive's execution, and never failing to stare into the eyes of the men judged for death by the vanguard of the people.\n\nSince leaving Cuba, Che has traveled South America as a wandering guerrilla, offering instruction to budding revolutionaries and forging them into the bones of stout liberation movements, as with the FULNA. Now, having endured imprisonment in Chile and the violence of the Paraguayan takeover, Che refuses to abandon his fractious, volatile revolution for fear that it will deviate as Cuba's did. Certainly, this itinerant revolutionary still has much to do."
 POLITICS_OSCAR_CREYDT_DESC: "President Oscar Creydt has been busy working away at Palacio de Gobierno since the Revolutionary victory in the Battle of Asunción, trying to put to use his lifetime of organising and agitation from the seat of governmental power. The secretary-general of the Paraguayan Communist Party, Creydt was considered the obvious choice as national leader by Che Guevara, who was anyway more comfortable in the field than behind a desk.\n\nCreydt's left-wing agitation long ago led him to become a signatory to the Nuevo Ideario Nacional, an anarcho-syndicalist manifesto that advocated for social and ethnic conflict by the Guarani-speaking rural masses against the European-influenced elites who made up the exploiter class. In bouts of arrest and exile, he became a committed Marxist and made connections to Communist circles across Latin America, including Argentina and Brazil.\n\nNow, Creydt is exactly where he needs to be. Though he is not universally beloved in the PCP - his critics call him narcissistic, and lambast his autocratic, cult-of-personality tendencies - he is committed to using the power now at his disposal to bring about social revolution. This is what the party, the guerillas, and the Guarani masses struggled for - what he struggled for."
 POLITICS_ALFREDO_STROESSNER_DESC: "With German and Guarani blood, Stroessner is a soldier first and a president second. "El Rubio" enlisted at the age of sixteen, and fought in the Chaco War at nineteen.\n\nIn his youth, Stroessner found his endless craving for power, striving to climb as high as he could on the military ladder. He rapidly ascended the ranks, ultimately promoted to general by Morínigo. Stroessner amassed himself a following of loyal military allies, with old friends from the Chaco War and the Condor Legion, and new friends sharing his Germanophilic tendencies. With the help of these allies, Stroessner now finds himself the most powerful man in Paraguay.\n\nAs the domineering father of Paraguay, Stroessner promised "peace, work, and wellbeing." In reality, Stroessner has only brought upon the perception of such through his ruthless anti-communist campaigns, putting leftist agitators and mere dissenters alike in the crosshairs. Under the orders of Stroessner, enemies of the state are kidnapped, tortured, and murdered. Often, their gruesome interrogations happen in front of the president himself, or their screams played over the phone for his satisfaction.\n\nEven in the highest office, Stroessner lives ascetically, rumored to not use hot water and refuse anaesthetic during operations. Stroessner fights to keep his image of perfect health and an iron will. This spartan living is a standard only Stroessner holds himself to, as evidenced by the lavish spending of his cronies at the state's expense."
 POLITICS_FULNA_PROVISIONAL_JUNTA_DESC: "Many alliances tend to come from convenience rather than camaraderie, and FULNA's provisional Junta is no different. Following victory in the Bush War, FULNA established a provisional government led by Che Guevara, Rafael Franco, and Alfredo Ramos. Only held together by their fight against the former government, it's a true miracle they even reached this phase.\n\nChe Guevara is a man who needs little introduction. Despite being born into a wealthy Argentinian family, Guevara fights for the poor. A folk hero amongst the revolutionaries of Latin America, and a villain to the landowners and statesmen, Guevara's travels brought him to Paraguay for liberation of the nation's downtrodden\n\nRafael Franco is a former president and general, and leader of the revolutionary Febrerista party. He's an advocate for the rights of the poor and modernization of Paraguay's military, though significantly more moderate than Che Guevara.\n\nAlfredo Ramos is a former general and member of the Liberal Party, by far the most moderate of the three men. Ramos has led multiple failed attempts to overthrow Higinio Morínigo's regime since the 40s, and has been jailed several times in Peña Hermosa- once under the orders of Rafael Franco.\n\nAll three men immensely distrust one another. With tensions amongst the Junta only escalating, the future of Paraguay's fledgling government is uncertain."
 POLITICS_JUAN_MANUEL_FRUTOS_PANE_DESC: "Higinio Morínigo's fall from power has not just ushered in a new age for Paraguay, but has forced a minor Guión Rojo member into the spotlight of frontline politics. Not for long, however, as Juan Manuel Frutos Pane is Paraguay's provisional head of state, expected to step aside following president-elect Natalicio González's inauguration.\n\nA writer, musician, playwright, intellectual, and member of the Colorado Party, Manuel Frutos Pane follows in the political footsteps of his father, Juan Manuel Frutos, in serving the state as a politician, espousing similar conservative beliefs and perhaps with an even greater love of country. He has contributed theatrical productions and zarzuelas to the Paraguayan canon, in particular celebrating its folklore, the peasantry and the Pynandi, "warrior-farmers" aligned to the Colorado cause in the 1940s."
 POLITICS_JUAN_NATALICIO_GONZALEZ_DESC: "One can hardly imagine a soulless man amounting to anything but a slave, a wealthy man without fortitude is barely a man at all. Of his many contemporaries, Juan Natalicio González alone knows the power yielded by a willful - if foolish man best, especially after witnessing the tepid retirement of the weak Higinio Morínigo.\n\nUnusually well-traveled and reserved while staying within the culture of ultranationalist thoughts fostered by the Colorado Party, Natalicio González was a journalist of some renown who had founded the cultural magazine Guarania, known to many as a mouthpiece for Paraguay's most dogmatic conservatives. Having taken years to broaden his horizons, he also managed to cultivate an open-minded way of thinking, a quality especially rare in many other fellow revolutionary figures. Adopting diverse influences from Maurras, the PRI, and even in some places, the Duce himself, it is hard to mistake the man for anything but the expert ideologue of the guión rojo.\n\nNicknamed 'tendotá' by his impossibly devoted cult of personality, it is a common saying amongst his supporters that "by swords or bullets, Natalicio to the palace". In spite of such fanaticism, Natalicio González has a comparatively concrete personal ambition as leader - which is to bring the Guarani race its triumph against the conspiracies of international capitalism. He sincerely knows the potential of the Paraguayan people, and it's his destiny to bring the best out of the gregarious warrior-farmer folk."
 POLITICS_EDGAR_YNSFRAN_DESC: "After the death of Natalicio González, Edgar Ynsfrán is as much of an assurance as he could be that the late President's political program will be carried forward. His background is in law, and following that the civil service, but that is something hard to expect given someone with as vehement political beliefs as his own.\n\nHe is not light of stomach, and as González's right-hand man and protégé, he employed Colorado death squads (or, per Ynsfrán, the 'lifeblood of the party') to dispose of dissidents and guerrilla groups in his way during the Bush War, even keeping an Alexandrian library of books stolen from them. Clearly, though, those days are past and he has in more recent times been a Colorado kingpin, while also adapting his prowess with the pen as writer for the party's magazine.\n\nAn intellectual and therefore ideologue of his movement, he takes the values of party unity and discipline seriously: even his opponents will confirm his energy but especially his ruthlessness when given the chance. If nothing else, Ynsfrán is sure to be a South American leader that is respected, even in the halls of power of Buenos Aires and Brasília alike."
 POLITICS_VICTORIANO_BENITEZ_VERA_DESC: "For a fragile country, there are few figures more uniting than its old war heroes. Merely on the ability to galvanize a nation and tell a story about its reasons to be proud is an ability that few are ordained with from the beginning. But Victoriano Benítez Vera has this, and yet has still had to fight to the very top; following the forced retirement of long-time President Higinio Morínigo, his ascendancy has been defined by the fighting of one rival faction to another.\n\nThis fight nevertheless began in the battlefields of the Chaco War, which for him was marked by the personal recovery of his brother's remains, and he turned to the Wehrmacht which he saw as a paragon of strength and a model to be emulated. His status and dedication to the army grew thereafter, being appointed commander of its 1st Cavalry Division by Morínigo personally in 1941. He then became leader of the Frente de Guerra, a clique of military commanders with aggressively fascist convictions, where he also planned his foray into politics.\n\nHis agenda is expected to focus on the consolidation of Paraguayan fascism through the means he knows best: the state and its military, even as he contends with powers many factors larger than itself. But such an end cannot be achieved without a determined leader in front, and as he says himself, "the armed forces rule the government. The cavalry speaks for the armed forces. And I am the cavalry."
 POLITICS_EPIFANIO_MENDEZ_FLEITAS_DESC: "There are many reasons why Epifanio Méndez Fleitas would not have seemed to be destined for Paraguayan higher office: he was born poor, was exiled from the country and may just care about the arts more than politics, as an avid writer, poet and musician. In spite of all of these limitations, he now sits in the Palacio de los López following a coup by moderate Colorado Party members, and there is no room to doubt him any longer.\n\nAfter his covert return to the country and the blessing of elder statesman and democrático leader Federico Chaves, he has come at a time of great need for the party. His unifying influence and credentials as an outspoken critic of the Guión Rojo and Morínigo since the 1940s, his leadership may very well reassure both the young radicals and old conservatives in his movement.\n\nWhereas his fellow Colorados may find him unifying, however, his neighbors will certainly not. An "anti-imperialist" who has suggested that the consequences of Operation Sealion was "karma" for the Triple Alliance's invasion of his native land, his hatred of the United States and Brazil will earn him few comrades in the liberal world. His earnest support of Argentina has not subtracted from his controversies. Méndez Fleitas can be accused of many things, but not for being uninteresting."
 POLITICS_ALFREDO_RAMOS_DESC: "The course of history is full of surprises. If you went anywhere in Paraguay in the 1950s and told them that in only a few years a Liberal would be their President, they would laugh you out the country. But Alfredo Ramos has left his naysayers confounded. The only solace left for cynics is that this military conflict has indeed left a military general in power.\n\nRamos has fought many battles, not just the recent Battle of Asunción, a power struggle following the previous dictatorship's collapse. In his thirties, he became a hero of the Chaco War after the Battle of Ybybobó, then as the commander of a cavalry regiment. Even now, his aim is to move Paraguayans forward, though preferably not on the battlefield: in his first addresses to the nation as head of state, he has stressed the importance of order, stability, and modernization in ensuring the nation can keep up in changing times.\n\nFor Ramos, though, that does not come without making a few changes himself. An active member of the Liberal Party and its politics, hardened by years of political imprisonment in Peña Hermosa, his sympathy for the Communists or Febreristas he crushed along the way is limited, to say the least. Not out of apathy, but out of pragmatism, he might say, for after all, to make change is to oppose the past. You cannot resist opposing at least something."
 POLITICS_GUSTAVO_GONZALEZ_DESC: "Heavy is the head that wears the crown. That is not just an age-old truism of power, but a physical descriptor in the case of Gustavo González, whose frailty in old age adds one more burden to his lot. He was never meant to be President, not initially, but following Alfredo Ramos's retreat to the smoky backrooms and a new brief as military chief since the last election, he was forced to surrender his privacy for the good of his country and cause.\n\nThat will be a less problem-free endeavor than his uncontroversial and respected status amongst his fellow Liberals might suggest, and age is not the only problem. He is unwilling to enforce himself or whip up the votes he could potentially wield, since the hole filled by Ramos in his departure has left the door extremely wide open to factionalism. Moreover, his sympathy towards agrarian reform or further state economic planning has rubbed many of his comrades the wrong way, and it remains to be seen whether he can bring them on side.\n\nRegardless, he is a President who, above all, represents the hope of Paraguay. He is a modernizer but also a rationalist who, like so many others, became a veteran of the Chaco War as a medic, and then an anthropologist concurrent to his senior party role. His enemies, if he has them, are not willing to stand in the way of such an opportunity to move on from the conflict which has held the country back for so long. The time to tear down has come and gone, now it is time to build."
 POLITICS_RAFAEL_FRANCO_DESC: "To be a general from a war-torn country and rise to power, ground oneself politically via appeals to nationalist-populist sentiment, and then bear the surname Franco is certainly an uncanny follow-through of history on the part of Rafael de la Cruz Franco Ojeda. Nonetheless, the similarities are all there, but by no means are their stories identical.\n\nIn this Paraguayan's case, his military feats in the Chaco also rendered him popular and powerful, though ultimately a scorned exile at the hands of a liberal government jealous of his influence. But that government was overthrown, he was sworn in, only to be destroyed by the liberals for his stubbornness and be forced once more to leave his native land. This Ouroboran cycle culminated in his Febrerista party, founded from overseas, but which in the aftermath of the FULNA now rules over the country after all.\n\nFranco has gone through a bout of political battles like no other man. He has allied with, compromised with, betrayed and backstabbed all across the spectrum, with the military old guard, communists, and moderates of Paraguay all revolving from one category into another. He has seen off the PCP and the liberals that the Bush War crowned kingmakers, and now the throne is for him alone to take. Long may he reign, or so he hopes."
 POLITICS_MIGUEL_ANGEL_SOLER: "As the dust from the second battle of Asunción settled, the victorious communist party elected a new President of Paraguay, selecting Miguel Ángel Soler to lead Paraguay's revolution.\n\nBorn in 1922, Miguel Ángel Soler entered into politics as a student agitator in his youth and as a Febrerista. Within the PRF, Soler alongside his father and his sister Carmen Soler led a marxist faction, known as the Bloque Liberación. In 1951 the marxists were purged from the PRF, and Soler would decide to join the PCP alongside other former Febreristas. Soler would become a writer for the party's newspaper, Adelante, and during the Bush War he would aid in organizing the PCP's guerrillas.\n\nIn the wake of the PCP's revolutionary takeover, Soler witnessed Creydt's turn to personalistic rule. Joining up with Obdulio Barthe, the pair ousted Creydt, and Soler was elected to replace him off the back of Barthe's support. However, their alliance is a fragile one, and Soler continues to distrust Barthe. Soler seeks now to sideline his only potential rival within the party, ans secure full control over Paraguay's revolution."

#######################
## IDEAS & MINISTERS ##
#######################

 PAR_la_ley_del_mbarete: "La Ley del Mbareté"
 PAR_la_ley_del_mbarete_desc: "There are two types of people in Paraguay: those who wear the boot, and those forced to endure it. The vast majority of Paraguayans operate in the latter category, enduring the nightstick like the certainty of taxes, paid out towards local elites for their financial gain and pleasure in return for a semblance of normality that local institutions can't provide.\n\nThe former category exists in their own world, sometimes content with their own petty fiefdoms to rule over and extort, but typically vying with others for power to increase their slice of the pie. They have their men — loyalties bought — and they have those above them, all the way to the very top. And for Paraguayans, it comes as naturally as breathing in the air."
 PAR_arcadian_backwater: "Arcadian Backwater"
 PAR_arcadian_backwater_desc: "Asunción exists as a bubble, a monument to what the rest of Paraguay could be, but is not. Its lands exist in stasis — rural idylls trapped a hundred years in the past — occasionally blessed by the modern marvels of machinery, usually in the form of a gun barrel. Their poverty is absolute, neglected by decades of government inaction, bar the odd opium of a government initiative to stifle agitation.\n\nThe peasantry has accepted this as their lot in life, content to live in blissful isolation, toiling away in lands known fully only to themselves. Governments come and go, flags rise and fall, but their soil will continue to remain largely untouched by the movement towards industrialization for another hundred years."
 PAR_condor_legion: "The Condor Legion"
 PAR_condor_legion_desc: "Across Latin America, the young line up to wage the wars of the old, fighting for fascism. They are the Condor Legion.\n\nThe brainchild of the Junker School in Paraguay, a military college and pro-Nazi think-tank, the Condor Legion was formally formed following the First Latin American Congress of Fascist Youth. Initially organized and trained in Paraguay but with ties across the continent, the Legion has mobilized to defend fascist regimes under threat from Western intervention, while doing their part to aid the downfall of left-wing governments.\n\nPolitically, the movement accepts nearly all strains of radical right-wing ideology — from Falangism to National Socialism — with the dubious exception of Integralism due to its incompatibility with the Legion's overtly Nazi leanings. Economically, the legion survives from subsidies from sympathetic governments and financiers, along contraband smuggling. Practically, the Legion will survive as long as young men are willing to die for nation."
 TNO_condor_legion_tt: "§RThe holder of this national spirit will be able to send volunteers to fascist movements across the Hispanic world.§!"
 PAR_new_national_state_morinigo: "El Nuevo Estado Nacionalista"
 PAR_new_national_state_morinigo_desc: "Discipline. Hierarchy. Order. These are the pillars that govern Paraguay, the bedrock of their national revolution. On top of these pillars stands Higinio Morínigo, a figure second only to God in Paraguay.\n\nAfter decades in power, Morínigo has returned Paraguay to the familiar personalism of the past adjusted to modern standards, creating a new nationalist state fit to survive in the new world order. The loyal march the streets to stomp out the weak and deformed, unable or unwilling to conform to the model of Morínigo, rewarded for rampant rabidity, only restrained by clientist demands. There are no defects in its brutality; it is entirely by design."
 PAR_new_national_state_benitez_vera: "El Nuevo Estado Nacionalista"
 PAR_new_national_state_benitez_vera_desc: "Discipline. Hierarchy. Order. These were the pillars that governed Paraguay, the bedrock of their national revolution, but any monument not maintained over time grows weak. Higinio Morínigo grew weak — the very thing he despised — and had to be replaced by a new man, by Victoriano Benítez Vera.\n\nAs Hitler's successor prepares himself in Germania, Benítez Vera takes the mantle of leader with a renewed vigor. It is Germany that is a superpower, not Iberia nor Italy, and so Paraguay should follow only the strongest. The only model closer to home that is acceptable is Perón's Argentina.\n\nTheir violence is pure, their terror is exemplary, and their power is absolute. And soon, Paraguay will join them."
 PAR_the_barefoot_revolution: "The Barefoot Revolution"
 PAR_the_barefoot_revolution_desc: "The peasantry represented a source of power largely untapped by the Colorado Party, but those days have come to an end as the Barefoot Revolution approaches their land. Under the Guión Rojo, these "warrior-farmers" have formed the backbone of a social revolution intent on transforming Paraguay into a nation standing tall and proud against foreign influence from American proxies such as Brazil.\n\nIdealized as new model men, their painted faces adorn walls and posters as propaganda portrays them as exemplars, fighters against the tyranny of international finance. They make up the lifeblood of the Paraguayan economy, and they will forever remain unbowed against the threat of oligarchs that have seized the reins of so many other countries."
 PAR_battling_for_democracy: "Battling for Democracy"
 PAR_battling_for_democracy_desc: "The Colorado Party has been the driving force for Paraguay's prior dictatorship, but can it also be a vehicle for democracy? This is the question Epifanio Mendez Fleitas poses to his nation, advocating for democratic institution representative of the people's will rather than that of a single ruler.\n\nMoving the Colorado Party towards genuine populism, Fleitas appears intent on dismantling the dictatorial regime that preceded him in favor of a return to traditional Colorado practices, where votes rather than guns control politics. However, with the Colorado Party's lingering pervasiveness in Paraguayan society and the lack of viable alternatives, it remains to be seen whether or not genuine change will be seen beyond words."
 PAR_peace_and_progress: "Paz y Progreso"
 PAR_peace_and_progress_desc: "The words "peace and progress" repeat themselves without end, drummed out by every Colorado Party propaganda piece, as if repetition would eventually allow them to evolve into facts. Of course, it is not the goal of the latest benevolent dictator and guide to the Paraguayan nation, Alfredo Stroessner, to create peace and progress, but to make the people believe peace and progress exist in Paraguay.\n\nFor Stroessner, peace and progress actually coming to fruition under his reign would be a nice addition to his propaganda effort, but an unlikely one. The existing institutions established to extol great men need not be dismantled, if refined to remove the most overt images of fascism, and repurposed to serve his needs. As Paraguay was nothing without Morínigo, it will be nothing without Stroessner."
 PAR_second_liberal_revolution: "Second Revolution '04"
 PAR_second_liberal_revolution_desc: "It is only fitting that the Colorado Party meets its end for a second time at the hands of its familiar foe: the Liberal Party. Once again organized by exiles, this time based in Brazil rather than Argentina, the Second Liberal Revolution has ended decades of personalistic rule in Paraguay in favor of a new beginning tinged with spectres of the past.\n\nAn immediate spectre apparent to most is the consolidation of power towards the Liberal Party. Ostensibly to protect Paraguay from strongmen and populists, accusations of capture by oligarchs and financial imperialism from Brazil have been rife, as their former backers seem intent on reaping their rewards. Without radical change, Paraguay seems set for decades of Liberal rule, rather than liberal rule."
 PAR_second_february_revolution: "Second February Revolution"
 PAR_second_february_revolution_desc: "It is 1936, Rafael Franco has been brought to power by a revolution, intent on destroying oligarchic control and returning land to the people. It is 1964, Rafael Franco has been returned to power by a revolution, intent on finishing the February Revolution once and for all.\n\nLike and yet unlike the Franco of Iberia, Rafael has quickly assumed the role of a populist caudillo, a man of the masses to rule in their stead. Neither the communists nor the liberals can be trusted to carry out the people's will, compliant only to foreign masters. Franco understands what is necessary for a true national revolution to be carried out, for a Paraguay free from the imperialist practices of his neighbors, and a land returned to its people."
 PAR_new_national_ideology: "Nuevo Ideario Nacional"
 PAR_new_national_ideology_desc: "The Paraguayan Communist Party is acutely aware of the actual material conditions of its nation, and in lieu of an industrial proletariat laboring in factories, it has turned its eyes towards the peasantry toiling in the rural landscapes of Paraguay. Romanticizing the Guarani-speaking rural masses, the PCP seeks to adopt them as the basis for the revolutionary Paraguay of tomorrow.\n\nThe stains of colonialism, the long dominant strains of European influence, and the searing mark of fascism will all be eradicated. The Paraguayan model of communism may be considered heterodox to Bukharin's rule in the Soviet Union, but their nationalist tendencies are seen by those within the party as necessary tweaks, essential to complete the national revolution before the transition to a socialist revolution."
 PAR_price_of_peace: "The Price of Peace..."
 PAR_price_of_peace_desc: "...is eternal vigilance. The saying is typically completed by members of Paraguay's armed forces, justifying their pervasive presence in all aspects of society. Gun barrels stalk the streets of Asunción, as ubiquitous as the jackboot stomp, slinking from the shoulders of milicos until they need to exert their influence over an unlucky shopkeeper. This state-backed gangsterism is the norm all the way to the high command.\n\nIt is a beast. The military will only be satisfied with more and more, fluffing up generals with salary raises and plots of land labelled "agrarian reform", before turning a blind eye to their rackets. In return, they keep their men in line, limiting the banditry and marshalling them against any threats. It is brutal and unjust, but it works, so why would anyone change it?"
 PAR_makeshift_military: "Makeshift Military"
 PAR_makeshift_military_desc: "Paraguay's military was rotten to the core, rife with fascism, and commanded by a variety of wannabe Hitlers. With FULNA's takeover, the military has been ripped apart and started from scratch. Generals and colonels have been sent to firing squads, while others have been hanged from flagpoles, as those below them have either been granted amnesty or fled to browner pastures. The institution has been firmly sanitized and put under the control of civilian governance again.\n\nHowever, with its thorough cleansing, the new government has been left with a military that better resembles a guerrilla band at the best of days. The Bush War has already devastated a lot of the infrastructure and equipment relied upon to enforce order, forcing the need to rebuild Paraguay's miserable industrial capacity for the government to maintain its monopoly on violence. It won't be easy, but there is no alternative."
 PAR_the_chokehold_communists: "The Chokehold"
 PAR_the_chokehold_communists_desc: "For most of Paraguay's recent history, its isolation has been self-imposed, railing against foreign imperialism through autarky. Under communist rule, the rest of South America sealed itself off from Paraguay, walling it away to make up for being unable to violently remove it from power. Its leaders condemn the excesses of the PCP, either out of disgust for its alien ideology or fear that the revolution will seep into their nation if not contained.\n\nWhile not ideal, the Paraguayan Communist Party has contended that the actions of these capitalist powers have only proved their theories correct, with this chiefly being that Paraguay must learn to rely only on itself. Their neighbors have been conditioned into American and European behaviors, emulating the imperialists they claim to rally against, while threatening the proud Guarani people with annihilation.\n\nIf they must remain alone, so be it; they will remain safe."
 PAR_the_chokehold: "The Chokehold"
 PAR_the_chokehold_desc: "Since 1869, Paraguay has been economically and politically subordinate to one or another of its neighbours. The most notable of these is Argentina, their most recent hegemon. Argentine interests make up a disproportionate part of Paraguay's economy, lacking competition from neighbor states, and allowing their companies to flourish. Their estates control vast swathes of land, fiefdoms in their own right.\n\nVisually, this dominance is best exhibited by the Paraná River. Paraguay's subservience to its protector state allows Argentina to use the full extent of the river to influence connecting regions via trade. This has become a severe sorepoint for the Brazilian Itamaraty, limiting their ability to make diplomatic inroads as a result, leading to the more hawkish among them to look away from the pen, and towards the sword to deal with this matter."
 PAR_bush_war: "The Bush War"
 PAR_bush_war_desc: "One fire fights one fire, one nail drives out another, and one imperial power seeks to uproot another in Paraguay.\n\nShadows of the failed 1954 Guaíra Falls invasion loom large over Paraguay, as the nation is once more plunged into chaos. Rebels and insurgents, organized and trained in exile — united under the banner of FULNA — have infiltrated the country. Funded by foreign backers and willing to fight to the death, their arrival has given the ruling regime its greatest challenge in a decade.\n\nTurning to Argentina for help, the government fights for its life to maintain its stranglehold over Paraguay, while Brazil attempts to dislodge a bastion of fascism from its border. Each province has become a battlefield, flipping sides like the days change to nights, as the low-intensity conflict persists in the background of Paraguayan life. It will not be pretty, but no one ever pretended otherwise."

 ### Old National Spirits
 
 PAR_bastion_of_latin_american_fascism: "Bastion of Latin American Fascism"
 PAR_bastion_of_latin_american_fascism_desc: "Paraguay stands tall, proud, and defiant as the sole defender of the great fascist ideal on the American continent, as an island surrounded by decadent plutocracies groveling at the feet of their OFN masters. To our fortress-nation come German advisors, operatives, engineers, and merchants, as well as right-wing exiles from across the continent. Daring to stand up for our people has isolated us from our neighbors, but that matters little- for Paraguay is a bastion against degeneracy."
 PAR_bastion_of_latin_american_fascism_tt: "§YMay support fascism regionally.§!"
  
 PAR_avanee: "Avañe'e"
 PAR_avanee_desc: "Avañe'e is the Guaraní tongue, translated literally as "The People's Language". Uniquely on the continent, it is spoken in all levels of society even more widely than the "Master's Language" of Karaiñe'e, or Spanish. While our neighbors reject their indigenous heritage in a mad quest to appear European, we recognize that our homogenous people is a fusion of the great Iberian and American races. The uniqueness of our culture and language gives us strength, unity, and a distinct national character."
 PAR_political_tarot: "Political Tarot"
 PAR_political_tarot_desc: "Morínigo's Dictatorship is not built only in compromises and cooperation, but through the survival of the fittest. In practice, this amounts to a policy of attempting to please everyone at once, but so far, the steady influx of German capital has allowed the regime to successfully smooth over those contradictions.\n\nThe throne of bayonets might not be eternal, as occult forces organize inside and outside the Fatherland to bring down the Wheel of Fortune."

 ##Occupation Tag Spirits
 URP_king_without_country: "King Without Country"
 URP_king_without_country_desc: "The López family in the 19th century and Morínigo in the 20th secured near-absolute power over Paraguay for themselves. How far their successors have fallen.\n\nOrders and laws emanating from the Palacio de los López and the Palacio Legislativo reach only to the city limits of Asunción. Beyond that, they take force only according to the whims of Brazilian or Argentinian military authorities.\n\nAnd within those circumscribed boundaries, fervid lustration has left the city bereft of senior officials and the failures of the war effort have cleansed it of junior ones. The only remaining force capable of action are OAS peacekeepers. Who are, of course, unbound from any Paraguayan authority."
 
 URP_duel_marionettes: "Duel of the Marionettes"
 URP_duel_marionettes_desc: "Every strand of Paraguayan thought has found expression in the new provisional government. But this inclusivity matters little given the puppet strings attached.\n\nBehind the thin curtain of the OAS framework, Brasília and Buenos Aires direct opposing factions of collaborators through a host of intrigues and squabbles. The stage directions occasionally referenced by American states further afield are roundly ignored as both powers slice at the ties that bind Asunción to their rival.\n\nAnd the Paraguayan citizenry playing audience to this farce? Entangled, yes. Enraged, certainly. Entertained? Assuredly not."
 
 URP_reascension: "Reascension"
 URP_reascension_desc: "The fields where soybeans, manioc, and cotton once grew lie fallow. The sounds of harps grow faint. The appearance of a police officer or mail carrier now counts for a luxury.\n\nAnd that is the state of Paraguay beyond Asunción, the devastated epicenter of civil and foreign wars. The rubble has not been cleared from Palacio de los López, much less from the streets. Power is intermittent at best, and damage to the sewage system has raised fears of disease. The many hungry roam the city, hunting for the trickle of aid the OAS brings in on battered roads or a donated half-ration from a peacekeeper. Yet even those scraps offer greater relief than another empty proclamation from their own government."
 
 BRP_rural_insurgency: "Rural Insurgency"
 BRP_rural_insurgency_desc: "Something familiar is growing in the red dirt and lush fields of Paraguay. Insurgency.\n\nWith roots extending to the War of the Triple Alliance, guerilla movements have been brought to bloom once more by foreign occupation. Though amply fertilized by dissidents of the former communist and fascist regimes, the resistance is chiefly sustained by widespread nationalist sentiment.\n\nThis dark flourishing has left the transitional government in a bind. The longer the Brazilians and Argentines remain, the more its legitimacy saps away. But if it pushes for their departure... well, the weeds of armed opposition may just choke away its very life."
 
 BRP_forced_liberalisation: "Forced Liberalization"
 BRP_forced_liberalisation_desc: "To grant Paraguay its liberal future, its occupiers are determined to expunge the nation's baleful past. Officials of Morínigo's fascist dictatorship and the brief Communist regime are purged without a second thought, their initiatives brought to a screeching halt. Some, such as the reds' land collectivization efforts, are thrown into a hurried reverse. Corporate bodies, which yesterday ruled the country with totalitarian vigor, are today nothing more than an acronym and an office door boarded shut.\n\nConfusion and dismay abound as the familiar and functional disappear. Perhaps a new and better Paraguay will take their place. But for now, chaos."
 
 BRP_brain_drain: "Brain Drain"
 BRP_brain_drain_desc: "If Brazil's ambitions for a liberal, democratic, and stable Paraguay are to be realized, they have no more vital partner than the Paraguayan professional class. Several initiatives, including a disproportionate focus on the revitalization of Asunción, have aimed to strengthen and solidify ties with this educational elite.\n\nYet many Paraguayan professionals are taking advantage of these links to relocate to Brazil itself. São Paulo and Curitiba offer far more economic opportunities and a higher quality of life than their own ruined land.\n\nAnd now, surveying the violence sweeping through the countryside, many hungry, desperate Paraguayans without such skillsets are realizing the same thing..."
 
 ARP_casados_estate: "The Casados Estate"
 ARP_casados_estate_desc: "Even before victory was declared over Paraguay, the Argentinian government already had a family in mind to help them impose their will on Paraguay; the Casados.\n\nWith their influence beginning after the first invasion of Paraguay, the Casados have been vastly influential through their business dealings and their lobbying in the Argentine Foreign Office. The Casados suggest a list of suitable collaborators for the government to hire. In response, they request autonomy for their dealings, which Buenos Aires has seen fit to grant."
 
 ARP_king_cotton: "King Cotton"
 ARP_king_cotton_desc: "Buenos Aires' businessmen, having bankrolled Argentina's intervention in Paraguay, now seek to make the most of their enlarged domain. Their reward, therefore, has come to be cotton, with their share of production far outstripping local farmers rocked by years of crisis and neglect. For the locals, it is yet another cost that comes out of their pockets, while King Cotton and his ministers far away stand to make fortunes."
