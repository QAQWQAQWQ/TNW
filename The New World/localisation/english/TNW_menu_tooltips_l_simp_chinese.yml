 TNO_ugly_american_icon_tt: "§M美丽未来§!"
 TNO_ugly_american_icon_tt_delayed: "§F在这片没有历史的土地上，时间以冰层的厚度来衡量，人类的记忆显得格格不入。在这片§W广袤的白色虚无§!中，旧伤被冻结，痛苦被完美封存。复仇固然是一道十年不晚的冷餐，但在这片大陆上，每一道菜都冻得像石头一样坚硬。\n\n对于§U智利南极领地§!来说，伤口是在§x斯尼佩岛之战§!时留下的。这场面对§m阿根廷§!的耻辱性失败，留下了一道难以愈合的伤口。失去的岛屿、被践踏的荣誉、强大邻国那一抹挥之不去的阴影……这一切都成为了他们存在的意义，成为了那些铭记国耻之人内心永恒燃烧的火焰。\n\n如今，两种意志在这片被遗忘的大陆争夺着话语权。一方是§a教授§!的意志，正是他奠基了这块领土主权的主张。他以笔为武器，耐心地玩着法律和影响力的游戏。他在§B美洲国家组织§!之中编织联盟之网，邀请新来者踏上§U智利§!的土地，将一个孤立的前哨站变成国际交通枢纽。尽管其梦想由深海中的血钱所滋养，但他相信未来是建立在§K认可§!之上的。\n\n另一方则是§s上校§!的意志。格林尼治岛的英雄，踏上了§s铁§!与§x血§!的道路。对他而言，外交的每一丝低语都是背叛的嘶嘶声。他将把他的海军陆战队锤炼成顶级掠食者，在§W南极洲§!的冰雪地狱中磨砺。§x斯尼佩岛§!的亡灵在高呼着复仇，对他来说，只有一条法则：尖齿与利爪的法则。他不求认可。§Z他渴望惩罚§!。\n\n然而，在他们窃声密谋并磨砺刀刃之时，这片大陆只是漠然旁观，对他们的小小战争毫不在意。真正的敌人并非§m阿根廷§!士兵，而是极夜那吞噬一切的黑暗。不是政治对手，而是与世隔绝带来的缓慢却疯长的疯狂。§U智利§!在这片§W放逐大陆§!的未来，要么用墨水书写，要么用鲜血在雪地上书写。§W南极洲§!，正在等待……§!"

 TNO_menupic_tooltip_1: "吾§M爱§!此世，然其已没入§Z昏暮挽歌§!，往日余响，犹在子孙命脉中绵延——逝者如斯，其声未绝，其影未灭，竟穿透时光幽谷，§m渗入血脉相传§!。§!"

 TNO_menupic_tooltip_2: "致那§x伟大的事业§!！§M我心§!无旁骛。即便§Z黑暗的命运§!将我的生命之线编织，众人仍将以嫉妒的泪水，捍卫那在奋斗中诞生的光明明天——我们用希望建造的殿堂，§K超越岁月§!！§!"

 TNO_menupic_tooltip_3: "§U我在此驻足，只为敬畏§!，我的灵魂永不锈蚀。§!"