 POLITICS_ARMANDO_ALBA_ZAMBRANA: "或许现代玻利维亚最令人唏嘘的悲剧，莫过于一个深爱祖国的赤子却遭举国唾弃。人们或许会说这是咎由自取，但丝毫无损于这个故事的苍凉底色。\n\n在登上总统宝座前，阿曼多·阿尔瓦·桑布拉纳曾是全民敬仰的国士。与战死查科战场的兄弟不同，他以文化报国：从战地记者到作家，再到波托西造币厂博物馆的修复者，凭借非凡魅力被誉为“语言大师”，更被视为玻利维亚史上最伟大的民族主义者之一。命运注定他要在聚光灯下闪耀——他先后当选波托西市长、众议员直至参议员，全程以独立身份参选，不靠任何派系支持，仅凭个人魅力征服选民。或许正是这种成功蒙蔽了他的双眼。\n\n回溯至1958年，当权寡头需要物色一个既能被南锥体三国接受、又能安抚民心的总统人选。他们深知民众无法忍受又一个寡头统治者，于是将橄榄枝抛向阿尔瓦。天真的阿尔瓦以为能借此施展抱负，让玻利维亚重振雄风。他错了。过去四年间，这位理想主义者沦为最憎恶利益集团的提线木偶，眼睁睁看着他们把挚爱的祖国肢解变卖给外国势力。民众视他为叛徒，昔日英雄的光环化作欺骗的烙印。阿尔瓦同样痛恨自己，此刻只盼着卸任之日早些到来，好让这场漫长的凌迟画上句点。"
