 BOL_mining_war_category_desc_BRA: "玻利维亚的局势危如累卵。我们的盟友§K坎迪亚将军政府§!正被各方势力围攻：武装矿帮、§J长枪党§!余孽，还有§D民族主义§!残余，个个虎视眈眈。"
