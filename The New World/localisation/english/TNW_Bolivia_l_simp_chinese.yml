 POLITICS_ALFREDO_OVANDO_CANDIA: "每个军人都懂得为国效忠，这是政客们永远学不会的必修课。自1932年第一次查科战争起，拉巴斯当局就不断将准备不足的部队投入对抗亚松森的战场。关于玻利维亚军队的荒唐事早已人尽皆知：征召连巴拉圭为何物都不知的原住民，因兵源枯竭强征童子军入伍，诸如此类不胜枚举。在那些稚气未脱的少年兵中，就有年仅15岁的奥万多·坎迪亚。\n\n常人或许会认为如此年幼便遭驱策上战场的经历必会滋生怨恨，但奥万多·坎迪亚从未萌生此念。作为爱国者，他自豪于为国效力，并将余生奉献军旅。尽管对德国文化情有独钟，他却始终秉持温和立场，既未皈依比利亚罗埃尔的革命民族主义运动，亦未倒向寡头统治集团。\n\n然而凡人终有底线，当玻利维亚局势恶化到不得不行动时，奥万多·坎迪亚决意重燃军事社会主义之火以匡扶国本。可他的宏图面临两大阻碍：其一是军方保守派对任何改革的顽固抵制；其二是军事社会主义承诺的温和改良，对已经占据矿山、酝酿革命的愤怒民众而言，不过是杯水车薪且为时已晚的缓兵之计。"
 BOL_Eduardo_Montes_y_Montes: "爱德华多·蒙特斯-蒙特斯"
 BOL_David_Terrazas: "戴维·特拉萨斯"
 POLITICS_DAVID_TERRAZAS: "戴维·特拉萨斯生于一个世代效忠自由党的家族，自幼便背负着成为玻利维亚领袖的宿命。年方十五，他毅然踏上军旅征途，在第一次查科战争中英勇厮杀、屡立战功，甚至在1935年的一场激战中直接晋升为上尉。此后，他曾短暂执掌拉巴斯军事学院；在1946年，他担任玻利维亚陆军总司令，并被派往美国出任军事武官。此后，他又与美国士兵一同参与了西伯利亚战争，并因其卓越表现荣获功绩军团勋章。\n\n然而，特拉萨斯家族与权贵寡头那密不可分的牵连，终究难以掩盖于世人眼前。他的兄长鲁文，在比利亚罗埃尔领导下的清洗行动中不幸沦为牺牲品，在那场骇人的丘斯皮帕塔大屠杀中惨遭毒手。从那刻起，戴维便决意与比利亚罗埃尔的政权为敌，在流亡岁月中密谋策划多起政变，也因此成为暗杀阴谋的首要目标。\n\n寡头集团再度执掌玻利维亚大权，特拉萨斯被推上了新政府的领导宝座。他不仅被美国国际开发署视为最可信赖的将领，也获得了整个冷战体制的鼎力支持。就职伊始，他便以普鲁士军队般严苛的纪律和铁血手段，毫不留情地将玻利维亚带回了旧秩序。毕竟，他曾亲眼目睹：当人们放纵而无束缚之时，会做出怎样骇人听闻的暴行；当统治者失去约束，社会便会陷入一片混乱。他对人民的仇恨早已麻木，因为他曾见识过，那些曾经欢呼的，究竟是谁的恩泽。因此，当街头那些混血拉美青年咒骂着他，甚至向他抛掷石块时，他只是在心底低语着：\n\n§O“这一切，都是为了你，我亲爱的兄长。”§!"
 oligarch_shield_terrazas: "寡头之盾"
 POLITICS_OSCAR_UNZAGA: "从安托法加斯塔到查科，全国革命成功地清除了所有伪信者。奥斯卡·温萨加·德·拉·维加在绝境中胜出。他一生走过漫长旅途，从最初智利的学生运动起步，如今已蜕变成即将重组国家的擂台斗士。他不再是任人宰割的羔羊，而是决胜沙场的勇士。\n\n温萨加的政治生涯始于1937年，那一年，他在一个仅由四名心腹组成的秘密社团基础上，创立了玻利维亚社会主义长枪党。然而，他的早期斗争并非一帆风顺。面对革命民族主义运动以恐怖手段镇压长枪党人，他甚至一度被关押，但即便在政府轮番更替、当权者无不想要扼杀玻利维亚血脉的救赎，他仍不曾放弃推广自己独特的基督教民主理念。换作寻常之辈，恐怕早已被视为走火入魔。\n\n尽管批评者断言，未经提炼的法西斯思想注定在安第斯山脉无以为继，温萨加却深知长枪党主义正是源自一个失败民族的道德伤痛。因此，无论是面对日益嚣张的巴西利亚与圣地亚哥，还是面对政府内部的军队叛乱者与卖国贼，他都坚定信念，让真正的信仰巍然屹立于风暴之中。如今，随着叛徒里奥哈终于伏法，玻利维亚彻底摆脱外来势力的污染，这片土地不再是外国大使馆与山腰豪宅中走狗的奴隶。玻利维亚万岁，她流浪的儿子们，终究没有抛下她！"
 POLITICS_BERNARDINO_BILBAO_RIOJA: "玻利维亚火药桶的引信稳定燃烧之际，贝尔纳迪诺·毕尔巴鄂·里奥哈将军却成了长枪党极端路线间不受欢迎的中立者——这种秩序的表象注定要承受激进派的憎恨。出身阿兰潘帕村优渥家庭的他，曾在智利接受军事教育，后成为查科战争中崭露头角的首批飞行员。1930年短暂代理战争部长期间，他因传奇的比利亚蒙特斯保卫战成为国家英雄。\n\n他曾一度被尊崇提拔为陆军总司令，但玻利维亚政府却以绑架流放智利的“嘉奖”回报其功勋。流亡岁月让里奥哈看清体制对祖国的戕害。他立誓报复这种背叛，开始与智利政府合作推翻他眼中的畸形政权，同时加入温萨加的社会主义长枪党，期待这个强力的爱国异见组织能带来变革。\n\n他从未奢望重拾昔日荣光，但吉列尔莫·肯宁等庸才接二连三地失势，竟让他再度执掌社会主义长枪党的脆弱政权。守旧派窃窃私语的同时，里奥哈将引领玻利维亚走上正途——当然，少不了智利友人的鼎力相助。"
 BOL_Decalogue_Of_The_Falangist: "长枪党十诫"
 BOL_Decalogue_Of_The_Falangist_desc: "一、当爱国高于一己之私\n二、当将身心全然并恒久献予运动大业——此即玻利维亚之事业\n三、当敬重宗教信念\n四、当谨守纪律——纪律即个人向集体奉献之服从\n五、当为尽责而尽责，非为奖赏而行\n六、当日日精进己身——因伟业缔造者必先成己\n七、若为理想捐躯，当蔑视生死\n八、勿退却，勿怯懦\n九、当以尊严立世，以忠诚立心，以献身为志\n十、当蔑视安逸生活——长枪党人先为战士。奋战者必胜！\n\n-社会主义长枪党之戒律"
 BOL_The_Infernos_Beating_Heart: "搏动的地狱之心"
 BOL_The_Infernos_Beating_Heart_desc: "人间地狱。食物匮乏，住所简陋，刑讯室专设，墙壁弹痕累累。这就是玻利维亚革命民族主义运动打造的集中营。\n\n政权麾下的秘密警察机构“政治控制局”源源不断地向它输送新鲜血液。任何对革命民族主义运动的威胁与异议分子，都会被扔进卡车后厢，在呛人的尾气中颠簸着押往新居所。随着铁锹规律地起落，营区外围的土坑渐次成列，新一批长枪党人、共产主义者、新闻记者、知识分子与“社会危险分子”便填补了空置的床铺。\n\n革命浪潮愈汹涌，政治控制局的权力触角就愈深入，惊恐的猎物愈聚愈多，玻利维亚集中营的罗网也愈织愈密。"
 BOL_The_Caudillo_Of_The_Revolution: "革命考迪罗"
 BOL_The_Caudillo_Of_The_Revolution_desc: "比利亚罗埃尔绝非寻常的军事强人，他是玻利维亚民族主义运动的精神图腾。这位既是热忱的爱国者，又是卓有成效的革命家，凭借铁腕治理与公正施政，将万千民众拉出贫困深渊，严惩奸佞之徒，证明自己绝非那些高高在上的政客可比。从赤贫阶层到解放的原住民，这位上校的拥护者遍布新近获得解放的广大农民群体。\n\n这一光辉的英雄形象在上校周围形成了强大的个人崇拜光环。然而随着党内裂痕在暗处滋长，即便比利亚罗埃尔施展着层出不穷的雄辩辞令与民粹手腕，日渐浓重的崩解阴云仍在不断侵蚀民众对其执政能力的信任。"
 BOL_A_Silent_Democracy: "寂静的民主"
 BOL_A_Silent_Democracy_desc: "褪色的革命精神孕育出更具生命力与持久性的存在——自由民主秩序。帕斯·埃斯登索罗将西方哲人构想的法治传统付诸实践，数十年来首度为玻利维亚带来稳定图景。\n\n在幕后操盘确保革命民族主义运动存续的同时，他引领国家走向自主道路。通过钳制多数反对力量，埃斯登索罗在民众真正参与选举进程前便巩固了该党的统治地位。在这民主初啼的时刻，维系这个新生国家脆弱的国家安全，正是革命民族主义运动肩负的使命。"
 BOL_A_New_Synthesis: "新融合"
 BOL_A_New_Synthesis_desc: "追随戴维·托罗与赫尔曼·布施的脚步，革命民族主义运动的创立本是通过军事社会主义意识形态框架颂扬法治与秩序的崇高追求。然而岁月流转，党内大帐篷架构导致无可避免的多次分裂，已使其沦为与其他失败运动无异的机能失调体。\n\n在危局倒逼之下，阿根廷正义主义与玻利维亚传统爱国主义的新融合应运而生，为分裂的运动重铸团结。如今民众将比利亚罗埃尔视为拨乱反正之人，但上校心中始终萦绕着一个疑问： \n\n后世会宽恕一个叛徒吗？"
 BOL_Fiances_Of_Death: "死亡未婚夫"
 BOL_Fiances_Of_Death_desc: "矿石战争虽已落幕，玻利维亚的暴力阴云却未消散。对民族革命推行的激进改革深感恐慌，一群心怀不满的地主、军人及反动分子发动叛乱，导致大片乡村脱离政府掌控。其中最臭名昭著者，当属绰号“死亡未婚夫”的恐怖组织——这帮人与国际法西斯组织联系密切，在复苏的毒品贸易资助下，对他们认为的新政权支持者实施恐怖袭击，令乡野笼罩在血色之中。\n\n面对经济困局与政治动荡的双重夹击，革命政府对此几乎束手无策，不禁让人怀疑它到底还能支撑多久。"
 BOL_The_True_National_Revolution: "真正的民族革命"
 BOL_The_True_National_Revolution_desc: "尽管革命民族主义运动为玻利维亚许诺民族革命已久，但最终实现这一目标的却是胡安·何塞·托雷斯。该国庞大的矿业财富大部分被收归国有，并成立了人民大会以推行激进的左翼政治社会改革。玻利维亚这个国家终将回归其合法主人——人民手中。\n\n然而并非一切顺遂。这些剧烈变革伴随着对政府与军队的大规模清洗，导致行政效能受损，异议声浪与移民潮迭起。但最糟糕的是，邻国正密谋将这场革命扼杀于摇篮之中——它们构筑的经济封锁已使国民经济濒临崩溃。玻利维亚人民的梦想正悬于一线之间。"
 BOL_A_National_Reaction: "国家反动？"
 BOL_A_National_Reaction_desc: "随着更为温和的新政权入主拉巴斯，许多人既忧心忡忡又心怀期待，唯恐或渴望托雷斯时代的宏大改革进程就此逆转。然而双方均感失望：为稳固自身摇摇欲坠的政治地位，格瓦拉总统对民族革命的诸多举措采取了折中策略——既有废止亦有保留，两者比重相当。\n\n尽管如此，左翼力量日渐式微，既要承受“死亡未婚夫”准军事暴力的袭扰，又面临与当局日益冰冷的关系。这种走钢丝般的平衡究竟能维系多久，仍是悬而未决的疑问。"
 BOL_Bolivia_Open_For_Business: "玻利维亚商业开放"
 BOL_Bolivia_Open_For_Business_desc: "托雷斯政权严苛的保护主义政策与国际孤立地位，几乎将玻利维亚的出口导向型经济推入绝境。但随着格瓦拉领导的新温和民族主义政府上台，局势正逐步回归正轨。尽管政府仍对经济实施严格管控，但利润丰厚的采矿业已重新开放开发。\n\n然而稀有金属并非玻利维亚如今唯一的进出口商品。反托雷斯叛乱的余波使这个国家深陷国际毒品贸易的泥潭——其广袤而难以管制的内陆地区，已然成为满洲鸦片类毒品与新兴经济作物可卡因的跨国交易枢纽。"
 BOL_La_Ruta_Del_Plata: "血银之路"
 BOL_La_Ruta_Del_Plata_desc: "早在西班牙殖民时期，拉普拉塔总督区就是强盗的老巢——他们把掠夺来的财物运过安第斯山脉，顺着河道运往各地分食殆尽。如今的阿根廷人不以为耻反以为荣，布宜诺斯艾利斯坐收玻利维亚动荡的红利，却丝毫不怕遭到报复。"
 BOL_Jaguars_Prey: "待宰羔羊"
 BOL_Jaguars_Prey_desc: "美洲豹不像非洲的猎豹狮子那样追逐猎物——它们如幽灵般潜行，伺机发动致命突袭。一击得手之后，它们便以利齿撕开皮肉，啜饮尚带余温的鲜血。\n\n巴西就像一头美洲豹，多年来一直对玻利维亚虎视眈眈。我们的矿产资源是喂养它的肥肉，天然气田是滋养它的血池。在这弱肉强食的丛林里，玻利维亚正处于食物链的最底层。"
 BOL_In_The_Condors_Nest: "秃鹫巢中"
 BOL_In_The_Condors_Nest_desc: "安第斯秃鹫不是猛禽，而是食腐动物。秃鹫的爪子不够锋利，难以捕猎或与雄鹰争夺猎场，需要寻找大型动物的尸体或受伤的小型动物来喂养幼鸟。\n\n恰似这食腐飞禽，智利将玻利维亚连根拔起，叼回巢中喂养的幼鸟。智利的采矿和天然气公司纷纷张开大嘴，要求享用父辈带来的猎物。"
 BOL_Military_Peasant_Alliance: "军农联盟"
 BOL_Military_Peasant_Alliance_desc: "不论军队过去做了什么，现在就是纠正这些错误的时候。那些对虐待农民提出不实指控的外界人士，在协议达成后将得到满意的答复。政府承诺即日起停止一切敌对行动，并通过社会经济援助扶持私营种植园发展。作为交换，只须农民们配合终结这三十年来玻利维亚的分裂局面。"
 BOL_Paz_Orden_Y_Progreso: "和平、秩序与进步"
 BOL_Paz_Orden_Y_Progreso_desc: "精神的贫瘠，往往使人丧失为更大利益奋斗的意志。不幸的是，玻利维亚的农民阶层已深受这种病态腐蚀。改革派口中的“治疗”从未真正存在，而那些软弱而妥协的做法，更不可能让这些懒惰的乞丐恢复丝毫生产力。要使玻利维亚重新恢复秩序，唯一的途径就是镇压。他们对政府的诽谤必须被彻底粉碎，而他们自己，也必须被送回原本的位置上——在田间劳作、默默耕耘，不再拥有“胡萝卜与大棒”之间的选择权。"
 BOL_Fury_Of_The_Old_Guard: "元老怒火"
 BOL_Fury_Of_The_Old_Guard_desc: "社会主义长枪党体系的溃散，终于让最坏的料想成为现实。长枪党的神圣理想遭里奥哈之流卑劣篡夺，玻利维亚文明的全面堕落如今再难遏制。然而，绝望是懦夫的信条，温萨加之辈岂会将权柄拱手让予此等无能狂悖之徒？唯有通过最残酷的政治博弈，玻利维亚的忠贞子民方能重获上帝赐予的治权。"
 BOL_The_Undying_Flame: "不熄火焰"
 BOL_The_Undying_Flame_desc: "里奥哈曾妄想背叛革命便能独善其身，但叛徒终将自食恶果。在文明世界眼中，他的倒行逆施令人不齿，波拿巴主义的腐臭气息扑面而来。然而这种卑劣行径恰恰让忠诚的白衫军经历了烈火洗礼——奥斯卡·温萨加高擎长枪党火炬，见证着玻利维亚浴火重生。如今伟业功成，世人终将见证一个以道德与强权为基、涤尽智利蛮风的玻利维亚。"
 BOL_The_Declawed_Eagle: "被拔去利爪的雄鹰"
 BOL_The_Declawed_Eagle_desc: "对不明就里的智利观察者而言，只要社会主义长枪党还存在，玻利维亚的黯淡前景就不会有任何改变。但某些变化已然发生，国家机器正变得愈发开放民主，经年累月的军国主义终于成为历史尘埃。圣地亚哥的外交官们因成功驯服长枪党而长舒一口气，但即便是最天真的乐观派也在怀疑：这一切是否只是一场化装舞会，蛰伏的阴影不过是在等待时机，准备再次露出狰狞面目。"
 BOL_paternalism_mnr: "革命民族主义运动（真正派）"
 BOL_paternalism_mnr_long: "革命民族主义运动（真正派）(Movimiento Nacionalista Revolucionario (Auténticos))"
 BOL_Juan_Jose_Torres: "胡安·何塞·托雷斯"
 BOL_Walter_Guevara: "瓦尔特·格瓦拉"
 BOL_Victor_Paz_Estenssoro: "维克托·帕斯·埃斯登索罗"
 POLITICS_JUAN_JOSE_TORRES: "社会主义者、革命者、军人、中产阶级的代言人。胡安·何塞·托雷斯为自己披上了层层身份的外衣，只为遮掩那份吞噬一切意识形态的巨大野心。所有的这些都只为一个目标——追逐权力。\n\n他为数不多的真诚，大概只能追溯到童年，自从父亲在查科战争中阵亡后，他对母亲始终怀有深切敬意，铭记她独力支撑家庭的坚韧不拔。可最终，他还是走上了父亲的老路，投身军旅，远赴阿根廷炮兵学校深造。\n\n阿根廷的政治气候对他影响深远。他曾被庇隆与比利亚罗埃尔等人的煽动性演说深深震撼，最终投身革命民族主义运动。奥万多政权上台后，托雷斯出任财政部长，成为政权内部的重要支柱，在改革与革命之间小心下注。随着革命派掌握上风，他顺势被人民议会推举为总统——原本他的角色定位就只是莱钦的一个傀儡。\n\n但对托雷斯而言，这还远远不够。他从不会满足于既得的地位。他借由职权不断扩展自身的政治基础——与右派斡旋、向农民示好、同左派握手言欢，成为他每日的政治仪式。他那副和蔼可亲的笑容背后，藏着一头伺机而动的猛兽，随时准备将整个革命民族主义运动一口吞下。"
 POLITICS_WALTER_GUEVARA: "作为革命民族主义运动的创始成员之一，瓦尔特·格瓦拉自党初建之时便锋芒毕露，迅速成为组织内主要的意识形态塑造者。他自掌权以来，始终是自由市场资本主义的坚定捍卫者，坚信反革命的阴影永不消散，唯有通过公平竞争机制，方能构筑有效防线。然而，正是这一路线，使他在党内牢牢确立了右翼代表的地位，却也让他争夺最高领导权的希望愈发渺茫。比利亚罗埃尔所代表的温和中间派已形成事实上的“个人崇拜”，而帕斯·埃斯滕索罗、莱钦等重量级人物更是各据山头，死守权力阵地，寸步不让。\n\n不过，时局正悄然变化。左翼日益脱离群众基础，而他的政敌，也在一系列有意无意的政治动作中被逐步边缘化乃至清除。如今，只剩时间问题，他便能终结这场由人民议会催生的情绪化与非理性政治闹剧，重塑政局。他设想的是一场精密而果决的手术——通过全面私有化，恢复国家秩序，重建市场常态。这场改革微妙而不可逆转，唯有如此，方能根治当下市场机制中不断扩散的混乱。"
 POLITICS_ROGELIO_MIRANDA_BALDIVIA: "凭借坚毅不屈的意志，罗赫里奥·米兰达挣脱了贫困的枷锁；如今，这位虔诚的信徒不仅跻身于成功者之列，更被推上了远超常人之上的位置——他成了一国之主。面对一个支离破碎的国家，他将凭借自己的意志，将其重新缝合。\n\n这位来自拉巴斯的领导人出身贫寒，却教养得体。自幼接受正统的道德熏陶，少年时期在拉萨尔天主教学校所建立的信仰根基，塑造出他坚不可摧的虔诚品格。此后，他进入军事学院深造，凭借兼具操守与才智的品行，很快赢得接连不断的褒奖与赏识。\n\n就在奥万多·坎迪亚以强硬手段主宰国家时，米兰达与众多军官一样，曾进言应让玻利维亚远离社会主义的歧路。在他们眼中，除了“上天赐予的辛劳与汗水”，农民并不应得到更多“怜悯”。然而，那位意志薄弱的将军终究未能听从忠告，反而沉迷于“改革主义”的虚妄幻想，结果既败坏了政权的威信，也搭上了他自己的性命。\n\n而如今，在一位“务实派”自毁其路、轰然倒下之后，米兰达顺势接掌大权。他会保证玻利维亚的农民阶层安于本分，始终在上帝的注视之下履行自己的职责。在他看来，这些人天生便应顺从秩序，他们将为了“大义”而辛勤劳作，不再因灵魂的堕落而妨碍自身应尽的义务。"
 POLITICS_ENRIQUE_HERTZOG: "恩里克·埃尔佐格出生于拉巴斯，原是一名外科医生，因肩负责任而走上总统之路，始终奉行一套典型的中间派温和政治理念。他的从医生涯始于1932年第一次查科战争，为前线伤兵缝合伤口，直至1936年退役。1948年，他在统一共和社会党的旗帜下首次当选总统。他所领导的内阁，曾被当时不少玻利维亚人讥讽为“无所作为的政府”，因为正值国家亟需激进改革之际，他们却选择了回避与拖延。\n\n尽管政绩寥寥，埃尔佐格在官僚体系中穿梭腾挪的本事却令人惊叹。哪怕在支持率跌至谷底时，他仍能挫败副总统发动的篡位阴谋。因此，在卸任之后，他竟成了OFN眼中的“合格候选人”。离任后，埃尔佐格曾强烈反对继任者挑起第四次查科战争。但寡头集团对其警告充耳不闻，最终铸成大错——这也让这位老总统的声誉在混乱中意外回升。\n\n如今，他作为为数不多仍被视作“稳定象征”的人物，再度被召回政坛，并与自由党缔结了一段尴尬的联盟。他已然精疲力竭，却仍背负期望。而要想延续他所珍视的“现状”，这位老埃尔佐格必须学会接受他从未真正理解过的一样东西，那就是改变。"
 POLITICS_RENE_BARRIENTOS: "在一个专制体系中生存下来的人，必定深谙其中规则。勒内·巴里恩托斯将军在玻利维亚历经更迭的独裁政权中虽得以存身，却也伤痕累累。如今，他正一步步重返权力巅峰，终于能够着手打造一个“为贤者所治，为人民所享”的国家。\n\n与许多军中同僚不同，巴里恩托斯并未凭借裙带关系扶摇直上。他幼年丧父，因得以接受教育而踏上军旅。1943年自军事学院毕业后成为飞行员，并赴美受训，在军中展现出不凡技艺。然而，真正奠定其地位的，是他后来参与国家革命的经历。尽管他与比利亚罗埃尔阵营在政治立场上存在分歧，却始终被视为“温和派”人物。这虽未能为他赢得多少盟友，却也让他树敌相对较少。\n\n如今，巴里恩托斯与他精心培植的盟友已掌控国家权力核心。他推动“复兴计划”，意在缓和寡头集团与军方之间的紧张关系，同时保留革命民族主义的理想内核。他的统治手段极其严厉，劳工运动与煽动者往往被迅速肃清。尽管如此，他仍设法维系与底层农民之间的关系。以一种家长式的互惠姿态，他向他们提供援助与恩惠——在他眼中，每一个人都是他的“客户”，在其庇护之下迎来秩序与重建。他始终相信，只要上下同心，他便可以继续扮演“人民将军”的角色——只要这能让玻利维亚得以存续。"
