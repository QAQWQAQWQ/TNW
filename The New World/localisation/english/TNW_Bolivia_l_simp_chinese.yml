 BOL_Alfredo_Mollinedo: "阿尔弗雷多·莫利内多"
 BOL_Alfredo_Mollinedo_hog_desc: "§Y副总统\n寡头制§!\n--------------\n§L对于这位身着灰西装、担任玻利维亚副总统的人物，人们知之甚少，只知道他是这个职位的合适人选。1933年，阿尔弗雷多·莫利内多是拉巴斯董事会的副主席，1938年在布希执政期间成为玻利维亚首任卫生部长。不过，他最为人所知的是后来对玻利维亚足球的贡献，他领导的拉巴斯足球协会推动了足球的职业化进程。这一时期，他与对手玻利维亚足球协会负责人阿尔弗雷多·加林多展开激烈斗争，最终莫利内多取得胜利。\n\n作为社会主义共和联盟党的成员，由于社会主义共和联盟党和自由党之间的选举协议，他很快进入了特拉萨斯总统的副总统候选名单。最终他当选得益于他在玻利维亚民众中的知名度，美国国际开发署的政策制定者希望这能为新的寡头政府带来一些急需的好感度。§!"
 BOL_Mamerto_Urriolagoitia_for_desc: "§Y外交部长\n寡头制§!\n--------------\n§L愤怒、腐朽、衰老，这些词汇都可以用来形容马梅尔托·乌里奥拉戈伊蒂亚的现状。他出身富裕家庭，攻读法律专业，带着拉美贵族典型的亲法情结远赴法国学习国际法。原本，在被选为埃尔佐格政府的副总统后，他一度接近权力核心，前途无量，但他试图篡权上位，更严重的是他还玩砸了，这使他成了社会主义共和联盟党的众矢之的。\n\n虽然党内一些强硬派还对他表示支持，但在问鼎总统无望后，其支持者能为他争取到的唯一职位就是外交部长，这一领域他还算有些经验，曾担任过驻伦敦代表。但乌里奥拉戈伊蒂亚却将此视为政治流放，他厌恶外交工作，嫉妒那些负责镇压事务的同僚，还相信自己能比他们干得更好。§!"
 BOL_Alberto_Crespo_Carpio: "阿尔韦托·克雷斯波·卡皮奥"
 BOL_Alberto_Crespo_Carpio_sec_desc: "§Y国防部长\n专制主义§!\n--------------\n§L阿尔韦托·克雷斯波·卡皮奥将军曾于1950至1951年担任军事学院院长，长期为国效力。此次出任国防部长，是基于在他在多年的革命与反革命浪潮中展现出的对国家及寡头集团的忠诚——毕竟当前玻利维亚军队最棘手的问题，就是确定哪些将领值得信赖。\n\n在他力荐之下，素以温和著称的奥万多·坎迪亚被任命为陆军总司令。但当这位将军私下里跟他谈及玻利维亚改革的必要性以及寡头集团必然拒绝改革时，克雷斯波·卡皮奥开始后悔自己的选择。老将军选择保持沉默，他自觉年事已高，已经无力再与陆军总司令斗上一场，此时他只希望任期平稳结束，好回家安享晚年。§!"
