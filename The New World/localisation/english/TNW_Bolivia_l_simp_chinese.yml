 BOL_mining_war_falangists_tooltip: "§J长枪党§!\n\n对那些既痛恨§K寡头§!又厌恶§D革命民族主义运动§!的玻利维亚爱国者来说，§J玻利维亚社会主义长枪党§!就是他们的出路。人们或许会嘲笑他们的法西斯思想，但§J长枪党§!依然能自豪地作为§j玻利维亚§!的第二大势力存在。\n\n§J长枪党§!控制了§Y[?BOL.BOL_CHL_groups_won]个关键群体§!。"
 BOL_mining_war_nationalists_tooltip: "§D民族主义者§!\n\n§D民族主义者§!是§j玻利维亚§!国内反对§K寡头§!的主要力量。他们团结在§D革命民族主义运动§!的大旗之下，运动麾下从保守右翼到马克思主义左翼应有尽有。\n\n§D民族主义者§!控制了§Y[?BOL.BOL_ARG_groups_won]个关键群体。§!"
 BOL_mining_war_government_tooltip: "§K政府§!\n\n警察们都明白一个道理：一朝天子一朝臣，警察还是那班人。在批评者眼中，§K政府§!代表着那个给§j玻利维亚§!带来灾难的寡头集团。\n\n§K政府§!控制了§Y[?BOL.BOL_BRA_groups_won]个关键群体。§!"
