 POLITICS_VICTOR_PAZ_ESTENSSORO: "玻利维亚自由民主的历史在悲剧与喜剧之间徘徊，被寡头和强人无数次地篡改。维克托·帕斯·埃斯登索罗承诺，他要书写新的历史。\n\n帕斯出身于一个奢靡的地主家庭，打小便万事不缺，享受一无所有的穷人侍奉。然而，在镇压了又一起帕蒂尼奥矿场主滥用权力的案件后，帕斯终于受够了，于是一转为劳动者而战。他的政治立场偏左，在革命民族主义运动中担当着少壮领袖的角色。\n\n帕斯是党的关键人物。比利亚罗埃尔领导的第一届政府中，他担任财政部长一职，随着政府垮台而退居幕后。此后，帕斯按照自己的观点，在党内开展工作，成为了运动中又一个运动的领袖。然而，曾经装点着他书架的布哈林和托洛茨基书籍，现在已然为斯密和潘恩所取代。\n\n无论如何，帕斯现在是领袖，党内左派必须学会接受他的自由主义道路。当然，即便是他，也会时时在这条道路上挣扎，因为他的反对派不在议会走廊，而是在集中营里。玻利维亚向来是个踟蹰蹒跚的国家，就像是给饥寒交迫的农民发救济粮要一点一点来一样，民主也需要时间。"
 don_victor_paz: "胜利先生"
 POLITICS_GUALBERTO_VILLARROEL: "瓜尔韦托·比利亚罗埃尔的沉浮史，与军国主义、民族主义思潮在玻利维亚的兴衰紧密交织。当这两种情绪再度沸腾之际，这位始作俑者的重掌大权恰逢其时。\n\n出身寒微的比利亚罗埃尔在查科战争中崭露头角，托罗与布施执政期间深受军事社会主义思想熏陶。当既得利益集团扼杀革命事业时，他满腔愤懑。此后他携极右翼组织“为国之由”转入地下，该组织矢志摧毁寡头统治。\n\n1943年，借革命民族主义运动与军方之力，比利亚罗埃尔被推上权力巅峰。他运用民粹策略迅速赢得农民拥戴——既非原住民也非梅斯蒂索人的群体皆在其列。然意识形态迷雾终致政权倾覆，他需要更宏大的旗帜，超越“玻利维亚庇隆”的称号——这正是比利亚罗埃尔亲历的教训……\n\n于是军事社会主义重焕生机，比利亚罗埃尔成为其第三任领袖。这位新先知已重塑玻利维亚，纵使圣克鲁斯问题阴云未散，拉美大地仍遍布着待开垦的信仰沃土。但他深知自己唯有躺在棺椁里才能离开这片土地，而在此之前，他的人民甘愿为他赴汤蹈火。"
 the_friend_of_the_poor_villarroel: "穷人之友"
 BOL_The_Popular_Assembly_desc: "人民大会是属于玻利维亚工会、劳工和人民运动的组织，旨在建立其自己的权力机构，取代资产阶级议会。在许多方面，它类似于工人委员会，而右翼外国媒体则将其贴上了“苏维埃”的标签。\n\n人民大会虽然被抹黑为共产党，但实际上他们并没有建立任何形式的社会主义政权。尽管批评不绝于途，但玻利维亚依然存在形式较为有限的资本主义。"
 BOL_A_Revolutionary_Dictatorship_desc: "人民大会就是个笑话，而且一点都不好笑。连澡都不洗的下流胚子不应该当上统治者，也不可能当上统治者，让他们随心所欲地统治国家无疑会是场灾难。\n\n玻利维亚交到了好运气，好将军把他们赶下了台，扔回了属于他们的位置。与此同时，将军也提出了一桩慷慨的交易： 人民大会要支持他的新政权，不然就彻底滚蛋。毕竟，任谁都知道，只有武装力量的优秀士兵才有资格真正开展玻利维亚长久以来亟需的进步民族革命。"
 BOL_The_Soviet_Republic_desc: "莱钦虚伪的改良主义计划轰然倒塌，难觅踪迹，革命之火以其尸体为燃料，再次熊熊燃烧。新崛起的共和国由布尔什维克-列宁主义的不朽科学和革命工人党领导，吉列尔莫·洛拉为其掌舵。\n\n如今，玻利维亚人民将在正确的社会主义下迎来真正的解放。他们不会再受寄生虫的啃啮，也不会再任由背叛工会的小资产阶级摆布。玻利维亚社会主义苏维埃共和国时刻准备着保卫人民，抵御一切对革命的威胁。要让所有人都知道，玻利维亚是红色的，现在是、永远是。"
 the_paramount_leader_of_the_COB_lechin: "玻利维亚总工会最高领袖"
 BOL_Mining_War_desc: "寡头终被自贩的绞索处决，一纸破碎条约别在其胸前。一名军人站在绞架旁，眼底尽是讨伐未息的民众。\n\n矿工们弃镐持枪的暴动，仿佛扣响了革命的发令枪——各方势力都在赌这场牌局将如何收场。出于自身需求，或是对军政府的让步，巴西用炸弹和子弹支撑着奥万多独裁政权，将异见者夷为一片名为“和平”的荒漠。\n\n另一边厢，阿根廷全力支持由前独裁者瓜尔韦托·比利亚罗埃尔领导的革命民族主义运动，鼓吹军国主义、民族主义和民粹主义的大杂烩，却招来了不受欢迎的左翼分子。而智利则支持社会主义长枪党民兵和右翼战败老兵，三方点燃引信，带来一场彻底的腥风血雨。"
 BOL_A_New_Bolivian_Nationalism_STC_desc: "拉巴斯终于做到了：东方的分离主义分子被碾做尘埃，巴拉圭卑劣的野心化为灰烬。重新整合圣克鲁斯分离分子并非易事，但无论肤色、背景，所有玻利维亚人都可以引以为豪。§y三十年的失败后，玻利维亚的未来正变得更加光明。§!"
 BOL_A_New_Bolivian_Nationalism_Chaco: "新玻利维亚民族主义？"
 BOL_A_New_Bolivian_Nationalism_Chaco_desc: "此刻，拉丁美洲与全世界唯有惊叹——玻利维亚人民竟完成了几乎不可能完成的任务：他们不仅重新掌控了那片长期失序的东部，更将巴拉圭军队远远逼退，收复了查科地区。种族与阶级之间的隔阂正在被一点点冲淡，一种崭新的玻利维亚民族主义正在孕育。时至今日，我们的人民终于可以骄傲地说：我是一个玻利维亚人。\n\n§y永世赞颂英勇儿郎\n英雄气概，坚毅如钢\n赢取自由荣光万丈\n玻利维亚欢启新章§!"
 BOL_Dual_Yoke_desc: "权宜之中的盟友真的是盟友吗？巴西和智利两国的外交决策层中，这个问题不绝于耳，在玻利维亚的开采活动中，两国将贪婪伪装作美德，攫取着各自的利益。然而，贪婪不会止步于某个精确的百分比：它沸腾着，等待着可以继续窃取的份额。\n\n数周、数月，巴西和智利饥渴的目光注定会投向对方在玻利维亚的领地，帝国主义对效率垂涎欲滴。有人祈祷能这种情况能得以避免，胆大的人则认为领地只能属于一个国家，玻利维亚人却只能继续身陷绝望之中。"
