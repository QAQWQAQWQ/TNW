 BOL_Antenor_Patino_eco_desc: "§Y经济与公共财政部长\n寡头制§!\n--------------\n§L随便抓一个马克思主义者、自由主义者或法西斯分子，他们都会告诉你同样的话：安特诺尔·帕蒂尼奥进入政府，还当了财政部长，是对玻利维亚工人阶级最大的侮辱。\n\n帕蒂尼奥是全美洲最富有的人之一，有幸继承了他的父亲西蒙——“锡王”的衣钵。这个头衔可不是开玩笑的，他的家族垄断了玻利维亚大部分锡矿，在国际市场上一手遮天，还娶了杜尔卡尔女公爵玛丽亚·克里斯蒂娜·德·波旁，与真正的贵族攀上了关系。\n\n带着技术官僚的帽子进入内阁之后，帕蒂尼奥立刻向全国人民展示了，在玻利维亚，“技术官僚”究竟意味着什么。政府本就被寡头把持，但精英们仍不满足，干脆让寡头直接坐进部长办公室。毕竟，政府本来就应该由他们代表的人组成。§!"
