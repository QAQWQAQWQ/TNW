 BOL_Guillermo_Lora: "吉列尔莫·洛拉"
 BOL_Hugo_Gonzalez_Moscoso: "乌戈·冈萨雷斯·莫斯科索"
 BOL_Fausto_Reinaga: "福斯托·雷纳加"
 BOL_killing_hope: "破灭的希望"
 BOL_killing_hope_desc: "三十年代，农民们把希望寄托于军事社会主义，结果圣克鲁斯一败涂地，布施饮弹身亡，寡头立刻卷土重来。到了四十年代，比利亚罗埃尔信誓旦旦要拯救人民，可连具体方案都没来得及公布，就被赶下了台，然后寡头又回来了。等这位将军摇身一变成了托罗-布施路线的继承者重回舞台，战场上的失利又让他重蹈覆辙。千回百转，拉巴斯终究还是落在寡头手里。\n\n人民得到了什么？只有更加凄惨无望的生活，他们终于明白，寡头无可撼动，锡爵宛若神明，帕蒂尼奥、霍赫希尔德和阿拉马约永远能逍遥法外。\n\n§V他们终于明白，那可笑的未来，便是靴底永远碾在脸上的滋味。§!"
 BOL_jose_lanzas_lament: "何塞·兰萨的哀歌"
 BOL_jose_lanzas_lament_desc: "在第一次查科战争的硝烟中，何塞·兰萨将军目睹了玻利维亚军队如何醉心于阴谋和私人利益，而非击败敌人。于是，他说出了这句不朽的名言：\n\n§Y“我为身为玻利维亚将军而耻辱！”§!\n\n万幸，将军早已不在人世！他若有知，一定很庆幸不必在多年的革命和反革命后，亲眼看到如今已经完全崩溃的军队。事实上，玻利维亚武装力量的状况已经糟糕到了只能依赖外国军事代表团才能解决问题的地步。但是，问题又来了——\n\n§O谁会是接到邀请的外国势力呢？§!"
 BOL_tripartite_pact: "三方协定"
 BOL_tripartite_pact_desc: "“三方协定”是指在卡洛斯·克雷斯波临时总统任期期间签署的一系列条约，确立保证了玻利维亚在南美冷战中秉持中立的地位。那么，问题是什么呢？某种意义上，阿根廷、巴西和智利平分了玻利维亚，从它的身上剥取利益。\n\n有了阿根廷、巴西和智利三国的支持，玻利维亚寡头们的统治就有了保障。他们对现状心满意足，在这支美妙的交响乐中，向着拉巴斯的金流源源不断，而所有代价都由工人阶级来承担。妙极了，对吧？"
