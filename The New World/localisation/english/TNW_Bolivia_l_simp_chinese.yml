 BOL_patchwork_country_desc: "玻利维亚有印第安人，有梅斯蒂索人，有克里奥尔人，唯独没有玻利维亚人。中央政府权威薄弱，连一面团结各族的大旗都打不起来。圣克鲁斯落入分离派手中后，局势更是雪上加霜——政府军的报复行动和煽动言论，让整个东部地区都燃起分离主义的烽火。更麻烦的是，原住民也躁动起来，印第安人运动开始日益壮大，他们梦想着帕查库特克的伟业。\n\n为了扭转这一局面，为了让人民对“玻利维亚人”的身份产生认同感，拉巴斯挥舞起复仇主义的旗帜，誓要夺回圣克鲁斯，夺回整个查科地区。虽然五次查科战争打下来寸土未得，但再多打一场又有什么关系呢？"
 BOL_One_Country_Two_Systems: "一国两制"
 BOL_Triumph_Of_The_Orient: "东方的胜利"
 BOL_The_Shadow_War: "幕后战争"
 BOL_The_Shadow_War_desc: "自共济会浮出水面以来，西方针对其的阴谋论就从未停歇。这类理论往往披着反犹主义的外衣，其中德国尤甚：希特勒将犹太人斥为共济会的幕后操盘手，直接催化了针对犹太族群的大规模清洗。“共济会阴谋”成为完美的政治替罪羊，当权者肆意将国家苦难归咎于此，不论真相，更不计后果。\n\n极具反讽的是，唯有在两大会所真正脱离共济会体系的地域，此类阴谋论才显出几分现实根基。\n\n“东部骑士会”与“庇护树会”本属同源，后者的决裂引发残酷的暗战漩涡，将整个圣克鲁斯卷入其中——政坛、商界乃至军队，但凡掌握权力者必属其中一派。在圣克鲁斯，若不向任一会所宣誓效忠，便注定与社会晋升之路绝缘。"
