 BOL_Juan_Lechin_Oquendo: "胡安·莱钦·奥克多"
 POLITICS_JUAN_LECHIN_OQUENDO: "在玻利维亚工运政治史上，胡安·莱钦·奥克多堪称传奇人物，国内鲜有人能像他这般推动左翼思潮发展。1902年5月19日，莱钦出生于矿城科罗科罗，母亲是梅斯蒂索人，父亲来自黎巴嫩。他天生患有虹膜异色症——这个母亲总爱向邻里炫耀的奇异特征，实则毫无用处。\n\n在底层阶级环境中成长，历经贫苦磨砺的莱钦从不甘于现状。青年时期他当过拳击手，做过小商贩，最终在工会运动中找到了人生方向。\n\n受托洛茨基主义吸引投身政坛后，莱钦迅速加入革命民族主义运动，成为该党左翼领袖。尽管时有政治实用主义倾向，但他真正的热忱始终在于扶助劳工阶层。在养育他的矿工群体中，他尤受拥戴，被全票推举为玻利维亚矿工工会联合会首届大会领袖。\n\n然而当莱钦执掌玻利维亚总工会时，盛名终成负累。他沉醉于这个职位，竟在革命胜利后拒绝出任国家元首，转而通过操控人民大会的傀儡主席执政——这个错误抉择如今迫使他站上风口浪尖。看来若想真正功成身退，他还得设法为自己赢得契机。"
