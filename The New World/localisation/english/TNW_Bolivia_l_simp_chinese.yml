 BOL_mining_war_help_text_BRA: "§K坎迪亚将军§!发动的政变虽然让玻利维亚局势意外倒向我们，但随之而来的“矿石战争”却可能让到手的一切付诸东流。\n\n从流亡的§J长枪党§!分子到§D民族主义§!残部，各方势力蠢蠢欲动，都想推翻政府另起炉灶。眼看他们就要动手发难，我们必须行动起来，保证国家五大§Y关键群体§!中§Y大多数§!的忠诚。\n\n下方的三角图显示了各个§Y关键群体§!的忠诚度情况：§Y警察§!、§Y工人§!、§Y军队§!、§Y农民§!以及§Y精英§!。处于绿色§K政府§!区域的群体已向政府效忠，而越接近绿色区域的群体则越容易争取。"
 BOL_mining_war_active_text: "§Y生效的行动为[?BOL.BRA_actions_counter]/2项§!"
 BOL_mining_war_active_text_tooltip: "我们在玻利维亚的行动规模有限。我们最多只能同时执行2项行动。"
 BOL_mining_war_winner_tooltip: "只要拿下五大§Y关键群体§!中的任意三个，便能在危机爆发时占据先机。"
