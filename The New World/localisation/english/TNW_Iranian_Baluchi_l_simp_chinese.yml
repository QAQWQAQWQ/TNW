 POLITICS_SHER_MOHAMMED_MARRI_DESC: "谢尔·穆罕默德是俾路支马里部族的酋长。身为俾路支解放阵线的领导人，他在游击战中身先士卒，打击一切威胁俾路支独立的势力。俾路支人是伊朗这个什叶派之国中的骄傲逊尼派民族，有着自己的语言、文化和传统。然而，数百万俾路支人长期以来一直被不理解这一点的人统治。谢尔·穆罕默德对这种民族主义心理进行了马克思主义的解读，声称他的族人正在书写压迫者与被压迫者的永恒斗争中的又一篇章。\n\n也许他们的斗争从一开始就注定要失败，敌人在人数和火力方面都占压倒性优势。但没关系。他们要让敌人为这片山脉的每一寸土地都付出鲜血的代价。"