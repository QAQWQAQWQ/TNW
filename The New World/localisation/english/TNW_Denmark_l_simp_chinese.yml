 POLITICS_WERNER_BEST_DESC:0 "维尔纳·贝斯特是一位坚定的德意志民族主义者，曾加入数个极右党派，因此他在1930年急切地加入纳粹党也就令人不足为奇了。此后，他成为党卫队的一员，利用自己的法律和行政能力为新生的盖世太保组织做出了贡献，并在慕尼黑协调了长刀之夜的行动。1940年，政敌迫使他放弃了在盖世太保中的职位，他转而到法兰西的军事占领政府任职，并在1942年被任命为德国驻丹麦全权代表。维尔纳处在一个尴尬的位置上，因为丹麦仍然获准保留君主制度、内阁以及半民主的议会。德国占领当局做出了许多妥协，他们甚至建议贝斯特不要将丹麦的犹太人运往集中营，以维持与丹麦政府的良好关系。1943年一次恢复普选的尝试以及一系列罢工行动使贝斯特将丹麦带入了德国的军事占领之下，议会遭到解散，但丹麦国王、内阁和大部分官僚机构都完整保留了下来。奇怪的是，贝斯特也没能阻止丹麦绝大多数的犹太人逃亡瑞典，数十年来坊间一直有传言称他是犹太人的同情者。\n\n战争结束后，丹麦仍然处于这种尴尬的不稳定状态。名义上她仍然是个独立国家，但受到德国的密切监管，德国人也一直在威胁恢复军事戒严。贝斯特仍旧在任，他曾短暂地尝试推行广泛的日耳曼化计划。五十年代的经济崩溃导致资金枯竭，让计划不得不暂停，但贝斯特仍然希望他的梦想——让丹麦成为大日耳曼国的一部分——有朝一日能够实现。"
 POLITICS_NILS_SVENNINGSEN_DESC:0 "作为国家机器忠诚运转的齿轮，尼尔斯·斯文宁森始终恪尽职守维持政权平稳运作。尽管日耳曼尼亚有人指摘这位前外交部长更忠于丹麦而非德国，但其外交履历绝不容小觑。兼具自由派实用主义与严苛勤勉作风的他，在马丁森的民族社会主义政变失败后执掌丹麦，令许多人期待保护国可能会迎来相对稳定的新时期。"
 POLITICS_HERMANN_HANNEKEN_DESC:0 "与多数军国派一样，赫尔曼·冯·汉内肯对耐心这一美德嗤之以鼻。自1942年起，他以警察总监兼驻丹麦国防军最高指挥官身份为德国效命，镇压异见与叛国行径。尽管其严酷的军国思想未至舍尔纳那般狂热，但这位军官对大日耳曼国安全的关切，促使他迅速采取行动掌控丹麦领导权。\n\n汉内肯及其亲信认为，维尔纳·贝斯特繁冗的官僚体系已在丹麦脖颈上勒紧死结——此事实为柏林高层所熟知。这阻碍了丹麦的德意志化进程，使这个北方保护国成了徒有其表的空壳。如亚历山大大帝般，汉内肯准备快刀斩乱麻，令丹麦及其日耳曼子民最终融入德国版图。"
 POLITICS_KNUD_MARTINSEN_DESC:0 "克努德·伯厄·马丁森对德国的忠诚，唯屈于其对祖国的挚爱。作为丹麦民族社会主义党的领袖，他是党门面，而其心腹卡尔·波普-马德森则为他出谋划策。马丁森疑心出了名重，他的崛起可追溯至五十年代的西俄战争——那时他率部抗击俄军推进，在混战中屡建奇功，其品性冷峻得仿佛那鏖战血染的雪原战场。\n\n尽管过去二十载他以忠诚合作者身份效忠德国，马丁森对独立丹麦的渴求对于日耳曼尼亚来说早已不是秘密。领袖以成功政变巩固了党对丹麦的统治，独立而臣服的丹麦或终有一日将成为现实。"
 POLITICS_GUSTAV_MEISSNER_DESC:0 "古斯塔夫·迈斯纳的官僚生涯刻录着他在保护国中一路升迁的历程，以及他顽强的忠诚终得回报的结果。迈斯纳曾是维尔纳·贝斯特的手下官员，而他的上司的死使他成为德国在丹麦的全权代表和实际国家元首。迈斯纳懂得察言观色和按令行事，他的政府毫无质疑地将立刻继续贝斯特的工作。"
 POLITICS_OCCUPATIONAL_AUTHORITIES_DEN_DESC:0 "随着丹麦又一次臣服于德意志的铁蹄之下，马丁·鲍曼已经下令在此成立一个临时过渡政府来稳定该地区的局势。这一政府由办事效率最高的德国官僚组成，时刻准备将权力无缝转交予下一届被元首适时选定的政府。"
 POLITICS_JENS_OTTO_KRAG_DESC:0 "在一九四零年，德国用六个小时就把丹麦化为了废墟，直到二十多年后，这里才恢复了昔日的辉煌。延斯·奥托·克拉格，就立在这曾经无比辉煌的奥兹曼迪亚斯。当其他欧洲国家在祖国母亲血肉模糊的尸体旁哭泣时，丹麦冷眼旁观，当游击队员和当地的协作者为了他们的愿景而互相残杀时，克拉格保持沉默。但他并非毫无动作。克拉格走入了社会民主党的拜占庭迷宫，决心要使普通丹麦人免受希特勒那令人作呕的意识形态的荼毒，哪怕这意味着要和国王携手并肩。\n\n跪在法老的大纪念碑前，风在背后无情地肆虐着。他知道，自己永远都回不到那种纯美的和平中去了。总有一天，他会在风沙中化为尘埃，只剩下自己成就的只只残片作为延斯·奥托·克拉格曾存在过的唯一证明。不过没关系，只要首相能带领他的人民走出沙漠，扯碎镣铐与枷锁，那么一切，从丹麦政府倒台到一九四三年设立”常务秘书“发生的一切，都将毫无意义。站起身来，克拉格注视着奥兹曼迪亚斯，眼中不是轻蔑和恐惧，而是希望的光芒。在这里，在战败的痛苦余烬之上，丹麦最伟大的胜利即将到来。"
 DEN_permanent_secretaries:0 "常务秘书内阁"
 DEN_permanent_secretaries_desc:0 "如今的丹麦由战争塑造，1943年斯卡维尼乌斯首相因哈内肯将军提出无理要求而向国王递交内阁辞呈，尽管克里斯蒂安十世国王拒绝解散政府，内阁仍自行倒台。行政事务总得有人来管，谁都不希望接受德国的直接统治——各部常务秘书在尼尔斯·斯文宁森带领下迅速接过了旧政府的摊子。这般局面令众人尴尬：非民选官员既无政治授权亦无法理依据，却在管理这个民主国家。最终内政部秘书提出“临时法”概念，允许各部自行颁布法规并自行执行，待议会追认即可。然议会早已停摆且重开希望渺茫，丹麦遂沦为法律迷宫，在陈旧的临时法令间迂回运作。\n\n情势远比表面危急。日耳曼尼亚正施压驻丹德国官员推行更有效措施，以加速丹麦融入大日耳曼国。无人知晓现行体制能维系多久，唯愿这个体系长存，守护丹麦远离异国掌控。"
 DEN_agrarian_economy:0 "农业经济"
 DEN_agrarian_economy_desc:0 "战争重创了丹麦的经济，战前无论多强的增长势头在战间全然停滞乃至陷入倒退。纵跨欧洲，非洲和俄国的征服与军事行动需要为士兵准备补给，也得为平民备置口粮。每一年，成吨的丹麦谷物被运往欧洲各地，尤其是英格兰，因为战争已经摧毁了它往日的谷物供应国。\n\n尽管丹麦经济相对稳定，陷入停滞的经济仅仅能勉强跟上德国日渐增长的需求。聪明的少男少女们被要求留在家里的农场里帮助生产，实际上则被剥夺了上大学和在城市生活的梦想。如果经济想要快速增长，那么农业改良已是势在必行。"
 DEN_threat_from_silkeborg:0 "锡尔克堡的威胁"
 DEN_threat_from_silkeborg_desc:0 "锡尔克堡的国防军驻军密切监视着维尔纳·贝斯特的“达格玛豪斯”政权，至少可以说，赫尔曼·冯·哈内肯对此不以为然。贝斯特曾明确提议要在1960年前将丹麦变为德意志的一个州，然而令哈内肯恼火的是，贝斯特至今仍稳坐其位继续掌权。每月哈内肯都会提交报告——有些属实、有些夸大、有些杜撰——细数抵抗运动依然活跃的现状，以及贝斯特应对措施何其不力。这位将军自然怀揣着个人野心，自认才是治理丹麦的不二人选：毕竟正是他维持了治安，也正是他压制着抵抗运动的势头。"
