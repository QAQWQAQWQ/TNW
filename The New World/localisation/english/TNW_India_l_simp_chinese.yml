 IND_Indira_Gandhi: "英迪拉·甘地"
 POLITICS_INDIRA_GANDHI_DESC: "英迪拉·甘地生于1917年，她的父亲便是著名的贾瓦哈拉尔·尼赫鲁，并非政坛素人。虽然英迪拉的童年是孤独的，但她在教育和政治中表现出色，二战期间积极投身于退出印度运动。后来，她嫁给了国大党的另一位重要人物费罗兹·甘地。然而，她的雄心壮志很快就变成了对个人背景的务实接受，担任了父亲的私人秘书。\n\n尼赫鲁的总理任期内，英迪拉曾多次陪同父亲出访，她和印度的外交关系因而遍布全球。五十年代末，她将自己推上了国大党主席的位置。尼赫鲁去世后，英迪拉又晋身联邦院，许多印度人都将她视作她父亲的天然接班人。虽然她上位时间尚短，但随着梅农黯然落幕，英迪拉成为了梅农的继任者。\n\n如今，英迪拉立于自己继承和奋斗而来的政治基石之上，在外交统一起来的印度历史上，她是首位民选领导人。从前，很少有人对她寄予厚望，性别和出身让人觉得他只是个笨拙的玩偶、她父亲的替身。为了成为总理，她接受了这些看法，但她并不妄自菲薄：英迪拉的野心非常人所能知，她将成为至高无上、无人能挑战的统治者，监管运转良好的法团国家。印度将为英迪拉，英迪拉将为印度。"
 IND_Jagjivan_Ram: "贾吉万·拉姆"
 POLITICS_JAGJIVAN_RAM_DESC: "在自由独立的印度历史上，从未有一个达利特走到如此高位，也从未有一个达利特感到如此地无能为力。1908年，拉姆生于一个贾塔夫家庭，曾参与组织反殖民集会和地震救灾，因而得到了鲍斯的青睐。1935年，他帮助建立了全印度受压迫阶级联盟，由此成为反对种姓制度和达利特平权的积极支持者。二战爆发后，他是印度参战的主要反对者之一，并且因为谴责言论而被捕。\n\n四十年代，拉姆依然继续与鲍斯步调一致，但当印度一分为二之时，他选择与鲍斯分道扬镳，转而支持共和国一方，以达利特权利运动家和国大党员的身份慢慢积蓄力量。两印统一后，他对英迪拉·甘地政府的担忧逐渐转化为反感。选举迫在眉睫之际，拉姆选择彻底脱离国大党，凭借个人声望率领人民阵线这个大帐篷赢得了大选。\n\n拉姆如今是印度总理，但他脚下的纸牌屋却摇摇欲坠。人民阵线成分复杂，拉姆也知道，阵线的意识形态分歧和腐败问题会让他几乎无法通过任何希望中的改革，一定会被盟友所否决。阵线内部凝聚力低下，执政党只有微弱的多数，国大党又正磨刀霍霍地等待报复，拉姆的总理任期很可能只会是昙花一现。"
 IND_Minoo_Masani: "米诺·马萨尼"
 POLITICS_MINOO_MASANI_DESC: "纵有千般争议，无人能否认马萨尼的执着狂热。他1905年出生，后以投身印度独立运动崭露头角，曾多次入狱，1932年的牢狱之灾使其与左翼民族主义者产生共鸣，曾以印度国大党左翼领袖身份为人所知。纳粹德国击溃苏联的战报传来，昔日的意识形态被淬炼成更极端的信仰——他开始笃信自由主义与自由市场才是救世良方。\n\n历经鲍斯政府与尼赫鲁时代，马萨尼在政坛完成惊人右转，逐步游离于国大党核心圈外，最终在1965年另立自由党。但其激进主张与乖张作派始终难获主流认可，仅维系着小众拥趸。当萨夫拉尼试图将印度吞噬进其政党机器时，马萨尼虽遭打压，却因政治影响力微弱而幸免于印度斯坦平等同盟的极端迫害。最终，卡里亚帕的一纸任命，将这个边缘人物推上了总理宝座。\n\n马萨尼的根基虽薄，其支持者却视此为优势。自由党的空壳招牌勉强维系着民主合法性，而羸弱的地方势力迫使其必须仰仗军权庇佑。纵使民意支持度低迷，这位总理仅存的价值，恰在于成为制约军方的微妙平衡点。面对非议，马萨尼深知：此时的自由主义，需要以实用主义为祭品。若维护虚位议会制需让渡部分民权——那便让渡罢。"
 POLITICS_VK_KRISHNA_MENON_DESC: "文加利尔·克里希南·克里希纳·梅农身上集中体现了独立印度的收缩与对比。梅农出身优渥，战间期，他在伦敦接受了经济学、心理学和法学教育，与群英荟萃的同僚和工党同志为伍。\n\n这一切在1943年2月戛然而止，在尼赫鲁的建议下，他搭乘一艘英国潜艇冒险回到了印度——有趣的是，潜艇上还有另一个离开欧洲的印度人。短短两个月之后，伦敦的旧世界彻底消失无踪，新德里则迎来了崭新的时代。\n\n纵观梅农的政治生涯，他始终坚持着三项基本原则：世界舞台上坚决不结盟、对尼赫鲁忠心耿耿、对任何政敌凶狠无情。因此，西方敌视他，东方警惕他，同僚们则妒忌他、钦佩他。如今，伟人已逝，遗愿明了，梅农在党的拥护之下登上了国家的最高权力之位。然而，谣言正无端四起，声称他将一如既往，开辟属于他自己的道路……"
 POLITICS_VK_KRISHNA_MENON_DURING_DESC: "印度共和国总理V·K·克里希纳·梅农在勒克瑙的唇枪舌剑中完成了看似不可能的任务，调和了次大陆的两个对立政府。虽然大家还不知道这个新联盟能不能真正得以巩固，也猜不出梅农出了名的粗暴性格会不会与对手同样闻名的固执迎头相撞，但广大民众都在庆祝，战争似乎已经彻底远去。"
 POLITICS_VK_KRISHNA_MENON_POST_DESC: "文加利尔·克里希南·克里希纳·梅农身上集中体现了独立印度的收缩与对比。梅农出身优渥，战间期，他在伦敦接受了经济学、心理学和法学教育，与群英荟萃的同僚和工党同志为伍。\n\n尽管旧世界早已崩塌，但总理却在英印的废墟上建起了新的世界。战争的幽灵已然消散，国大党也不得不承认他在人民中崇高卓著的声望和实现统一的伟大成就。与此同时，新印度走上了激进的独立之路，一边与日本重新谈判条约，另一边又拒绝与OFN建立关系，还在急切地与全世界的各个小国展开联络。\n\n如今，梅农拥有近乎无限的授权，党内更是对他一路绿灯，全世界都在焦急地等待着，他将会如何在前任的遗产基础之上建起属于自己的高楼大厦。"
 POLITICS_LAL_BAHADUR_SHASTRI_DESC: "拉尔·巴哈杜尔·夏斯特里在的勒克瑙会议灾难性的余波之中上台，他明白，这是印度人民给尼赫鲁社会主义的最后一次机会。他仍能在大选中赢得明显的多数票，莫拉尔吉·德赛因此才打消了参选的念头——在夏斯特里要面临的诸多严峻挑战中，这只不过是第一桩而已。\n\n夏斯特里生于拉姆纳加尔，出身低微，靠着勤奋努力和对甘地、尼赫鲁的坚定忠诚而在国大党中步步高升。历任各部部长期间，他深耕北方邦，在一定程度上削弱了巴基斯坦运动，并且编织了一张由其盟友、后进和联系人组成的绵密网络，政府计划得以借此更为有效地落实。然而尽管如此，仍有两个恶魔宛如跗骨之蛆，如影随形，它们唤作战争与饥荒。面对这难以估量的困难，夏斯特里喊出了口号：\n\n“士兵万岁！农民万岁！”唯有如此，深爱的祖国才能生存下去。"
 POLITICS_YASHVANTRAO_CHAVAN_DESC: "亚什万特拉奥·恰范的当选，无疑代表着印度选民在经历六十年代的混乱后，恢复正常生活的热切愿望。在众多激情的演说家、主见坚定的思想家乃至危险的极端派之中，恰范显得格外不同：他是一名经验丰富的管理者，决心要尽可能弭平乱象，践行尼赫鲁的路线。\n\n恰范出身于孟买马拉地语区的萨塔拉，他的人生轨迹与许多同时代的印度政治家大同小异——参加独立运动、在当地国大党组织中崭露头角、历任各部以积累经验。恰范几乎担任过所有数得上来的部长职位：首席部长、国防部长、再到外交部长，如今，他终于登上了最高的位置。依仗着深厚的经验，他为印度这艘过去十年间在波涛汹涌中颠簸摇荡的航船带来了稳定——但愿海波平。"
 POLITICS_CHARAN_SINGH_DESC: "从一个主张明确、历史深厚的政党，到主要围绕反对党组织起来的不稳定联盟，权力过渡并不简单。查兰·辛格明白，他脚下的这片大地变化无常，前途未卜；然而，作为一名农夫，他也比墙头草随风摆的政客更懂得怎么打理土地，尤其是怎么获得好收成。\n\n与其他许多在各邦、各部之间辗转任职的印度老政客不同，辛格终其一生都坚守在北方邦的中心，捍卫农民的事业，对抗以合作社为幌子的土地盗窃和投机商人无止境的贪婪。成为反建制反对派的领袖并未减弱他对人民的热情，尽管联盟伙伴会向他扔出各式各样的要求，但辛格真正关心的事业只有一个。"
 POLITICS_NG_RANGA_DESC: "俗话说得好，最了解某个事业弊端的人，就是被从其中赶走的人——N·G·兰加就是再好不过的例证。\n\n兰加出身马德拉斯邦的泰卢固语区，曾在牛津大学接受教育。在耳闻目睹布哈林及其同僚取得的巨大进步后，他对社会主义流于表面的理解变成了对马克思主义的彻底拥护。然而，当兰加真正亲身访问苏联时，这段夏日热恋迅速变质，他调转了自己的政治方向。后来，德军铁蹄将腐朽的苏联彻底击碎，事实证明了他的正确。回到印度后，兰加投身于自由斗争，以个人自由和农民权利坚定拥护者的身份走上独立印度的政坛，反对尼赫鲁的官僚机器。如今，作为拉贾吉的继承者，终于到了由他拨乱反正、保证自由长存于印度民主的时候了。"
 POLITICS_GAYATRI_DEVI_DESC: "某种意义上而言，加娅特丽·黛维王妃生来就注定是统治者——当然，在如今的印度，“王妃”这一头衔已经是个纯粹的尊称了。加娅特丽是莫汉·辛格二世王公的配偶，也是一位美丽的公主，她代表着自由党的“另一半”：在独立运动中被狠狠摔到地上、失去权力的王室、地主和包税人。\n\n然而，她并未与这群人同流合污。黛维以民主方式当选为斋浦尔议会议员，有人认为，她的当选是新时代“魅力型政治家”的体现：她身兼前王室、电影明星、宗教领袖等身份，无一不是意识形态色彩相当淡薄的实用面孔。然而，在王家不慌不忙、处变不惊的外表之下，昔日的王妃殿下、如今的主席阁下，正立志要将自由党带来的变革贯彻到底。"
 IND_Stroke_Of_The_Midnight_Hour: "午夜钟声"
 IND_Stroke_Of_The_Midnight_Hour_desc: "1943年1月26日，本应是印度次大陆受苦难的人民摆脱帝国主义沉重枷锁的光荣时刻。然而，二十载时光白驹过隙，国家却依然与新生之时一般无二，在达摩克利斯之剑下举步维艰。内部维稳的需求导致民主僵化，声望崇高的尼赫鲁则是唯一支撑着它的德里铁柱，党的中坚力量则不停地鼓吹着国家统一。然而，裂痕已经悄然浮现，如果尼赫鲁博士的身体出了什么问题……"
 IND_A_Civilian_Economy_For_The_Army: "为军队服务的民用经济"
 IND_A_Civilian_Economy_For_The_Army_desc: "在前两个计划所建立的工业基础之上，印度经济当下仍在继续强调电气化进程和以政府配额为基础的进口替代工业化政策。然而，由于维持军队备战的需要，轻工业获得的资源远少于重工业，导致了消费者需求与实际供给之间的差异。于是，这就催生出了一个从世界各地秘密进口消费品的黑市，系统性地削减着国家资金——但我们又怎么能在最需要枪炮的时候马放南山呢？"
 IND_Shadows_Of_Communalism: "社群主义的阴影"
 IND_Shadows_Of_Communalism_desc: "无果而终的阿富汗战争以及对印度教主导政局的担忧，致使国内数百万穆斯林和少数族裔对自身的安全及生计感到迷茫无措。巴基斯坦运动从未得到妥善的彻底解决，有关秘密渗透的流言不绝于耳——族群、宗教骚乱如若再度爆发，势必将比以往更加血腥且难以控制。雪上加霜的是，在杜兰线的残垣断壁之上，旧日仇敌正在伺机而动，要在我们最虚弱的时候捅上一刀。"
 IND_Beacon_In_The_Dark: "长夜灯火"
 IND_Beacon_In_The_Dark_desc: "举目亚洲大陆，数以亿计的人民在旭日的灼灼阳炎之下受苦受难，它的奴仆出卖自己的民众，牟取自己的私利。唯有共和国屹立不摇，建立起主权民主，成为民有、民治、民享的希望灯塔。无论如何，这都是对农民、士兵和工人的坚定承诺。这也意味着，一切滑向专制的倾向都将受到最为严重的怀疑。"
 IND_Going_It_Alone: "独行长路"
 IND_Going_It_Alone_desc: "尽管东边的加尔各答已经屈膝于外国势力，但作为负责任的国家领袖，哪怕是冒着失去军事和工业援助的风险，我们也不能落到和他们一步田地。尼赫鲁外交政策始终强调与三大国保持同等的距离，即使与我们同为民主国家的美国也是一样；而国大党中更为激进的煽动者则提议更进一步，支持全新的不结盟运动，团结极少的独立国家，抵御三大国的干涉侵略。然而就当下来看，这意味着我们正在一条岌岌可危的现代化之路上独身前行，并且路上还有必须要对付的拦路虎。"
 IND_Tryst_With_Destiny: "命运之约"
 IND_Tryst_With_Destiny_desc: "在华盛顿与东京日益恼怒的注视之下，数百万人不愿手足相残的意愿推动两印领导人展开了一系列令人始料未及的行动。边界尚未划定，伤痕仍能愈合。梅农向东部政府做出了一系列让步，包括保证印度斯坦平等同盟的政治代表权与双方之间的经济融合，赢得了加尔各答方面的善意回馈，但也引起了其党内部分成员的不安。"
 IND_Cry_Havoc: "战鼓擂"
 IND_Cry_Havoc_desc: "[GetCryHavocDesc]"
 IND_Cry_Havoc_prep: "临界点已经到来，只有懦夫和奸佞还在念叨着毫无意义的“和平”。工人们怀着万众一心的热情涌入工厂，子弹、炮弹和枪支飞速从生产线上倾泻而出。将军们正在起草计划，士兵们进行着最后的演习，对着镜子想象敌人的模样。天地一逆旅，同悲万古尘，世界将因我们而染上血色。"
 IND_Cry_Havoc_war: "城市静悄悄，村庄空荡荡。地平线上回荡着沉闷的轰鸣，炮弹将大地炸得支离破碎，军队在行进中杀戮着一切拦路之物。战场之上血流漂橹，弹片将人变作狰狞的怪物，倚靠在残肢断体上徒劳地呼救。名为战争的狂犬已经出笼，在泥泞和鲜血彻底湮没它们的嗥叫之前，在印度母亲的泪水与怀抱之中，它们将在撕开鲜血淋漓的伤痕。"
 IND_Death_March_Downwards: "向地狱的死亡行军"
 IND_Death_March_Downwards_desc: "所有的数字都在不断攀升——更多的子弹从工厂发射向前线；更多的炮弹宛如季风降雨瓢泼而下；更多的尸身堆积成新的山峰，在喜马拉雅山脉上投下阴影。我们是受诅之人，迈着整齐的步伐向深渊进军。我们不会止步，直至死神倒在我们的刺刀之下、祂的公正为我们所夺去。"
 IND_Embers_Of_Communalism: "社群主义的余烬"
 IND_Embers_Of_Communalism_desc: "阴影中的窃窃私语变成了主妇妯娌之间的传言：有关秘密宰牛和强迫婚姻，有关清真寺被关闭和无从解释的失业。曾经友好的街坊邻居如今都锁上了大门，从窗户缝里窥视着他们认识——或者说，自以为认识的魔鬼。与此同时，情报部门注意到，资金和宣传品正在从外国偷偷渗进国内，尤其是经过某个昔日敌人潜藏的深山之中……"
 IND_Indias_Long_Night: "印度长夜"
 IND_Indias_Long_Night_desc: "工人加班加点，保证前线能有足够的子弹；农民教自己的儿子拿起武器，痛击越过边境的可恶怪物；年轻的激进分子和政府报纸的醒目标题高呼着战争的必要性、牺牲的光荣、还有为正义事业而不得不中止正当程序。灯火在闪烁、在黯淡，少数受过教育的精英高坐象牙塔中，在无人知晓的夜半时分低声谈论着，如何才能让这光明不再度重燃。"
 IND_Friend_In_Need: "患难之交"
 IND_Friend_In_Need_desc: "在东方闪击战的硝烟之中，一切有关不结盟和现实政治的想法都被抛诸脑后。印美合作达到了历史上的最高峰，价值数百万美元的装备、援助和技术顾问从山巅之城源源不断地涌入次大陆，帮助民主支撑到最后。话虽如此，当战争尘埃落定之时，这数百万美元的援助和顾问还会在这里，等待未来……"
 IND_Indian_Economic_Union: "印度经济联盟"
 IND_Indian_Economic_Union_desc: "统一工作的第一步——经济融合已经开始，自由印度卢比正依序在各地区兑换为共和国卢比。加尔各答政府谨小慎微地进行着这项工作，以避免发生任何意外的突然问题迫使他们将主动权拱手交给德里。"
 IND_The_Behemoth_Menon: "贝希摩斯"
 IND_The_Behemoth_Menon_desc: "印度共和国是个庞然巨物，管理着数百万村庄和城镇，和其中近五亿忙于追名逐利的人们。\n\n然而，统一的新政府现在又面临着新的艰巨挑战，那就是如何将政府机构重新引入以前由印度斯坦平等同盟管辖的东部地区。广大胸怀大志的青年行政服务局干部发现自己挣扎于德里的顶头上司和当地不信任他们的民众之间，不得不在两股势力间作出抉择。"
 IND_The_Behemoth_Bose: "贝希摩斯"
 IND_The_Behemoth_Bose_desc: "印度共和国是个庞然巨物，管理着数百万村庄和城镇，和其中近五亿忙于追名逐利的人们。\n\n然而，新近统一的政府每天都在转型，催眠人民服从于它。印度行政系统的干部与地方党组织携手合作，通过印度斯坦平等同盟组织遂行治理的模式正在慢慢地、潜移默化地与行政系统相融合。"
 IND_The_Behemoth_ROI_1: "贝希摩斯"
 IND_The_Behemoth_ROI_1_desc: "印度共和国是个庞然巨物，管理着数百万村庄和城镇，和其中近五亿忙于追名逐利的人们。英迪拉·甘地掌权后，印度将发生翻天覆地的变化，个人的需求和雄心将以国家利益为导向。\n\n权力将集中于联邦政府，并建立起法团结构、扩大官僚机器，以支持国家对经济的控制；尽管选举程序仍得到尊重，但却会暗中向国大党倾斜，以保证政府稳定以及授权和政府人员的连续性，从而实现长期愿景。和平与繁荣已站在了悬崖边上，但新政府的掌控不会再受到任何威胁。"
 IND_The_Behemoth_ROI_2: "贝希摩斯"
 IND_The_Behemoth_ROI_2_desc: "印度共和国是个庞然巨物，管理着数百万村庄和城镇，和其中近五亿忙于追名逐利的人们。杜尔迦女神的旨意便是要抹去这渺小的野心，一切努力都要以国家利益为重。随着紧急状态的宣布，印度将向着这一目标重塑。\n\n在庞大官僚机构与可靠内卫部队的有力支持下，联邦政府的经济法令激励着劳动力和资本走向繁荣。阻碍进步的工会一律镇压，选举程序或遭到严格控制，或干脆暂停。忠诚者将得到经济安全的奖赏，至于其余的，就交给墓地去处理好了。"
 IND_The_Behemoth_ROI_Ram: "贝希摩斯"
 IND_The_Behemoth_ROI_Ram_desc: "印度共和国是个庞然巨物，管理着数百万村庄和城镇，和其中近五亿忙于追名逐利的人们。尽管国大党在立法机构中仍占多数，但人民拒绝了其重塑印度的企图，授权予全印度人民阵线，由他们改变前政府严重的越界行为。\n\n人民阵线是一个大帐篷，因共同的信念而团结在一起：必须回归农业民粹主义、回归对自耕农和佃农的支持、回归造福人民的政府。但是，现在有十几双手紧握着缰绳，要说服他们朝着同一个方向前进，不得不说需要极为强大的意志力。"
 IND_The_Behemoth_AH_1: "贝希摩斯"
 IND_The_Behemoth_AH_1_desc: "印度共和国是个庞然巨物，管理着数百万村庄和城镇，和其中近五亿忙于追名逐利的人们。\n\n新近统一的政府篡夺了从前共和国的政治架构，并依照自己的意愿对其进行了改造。然而，党国还尚未得到完全重建，真正的工作终于可以开始了。但是，还有人潜伏在暗影之中，领袖的逝世已迫在眉睫——这是一次机会，但印度斯坦平等同盟却宁愿这一天不会到来……"
 IND_The_Behemoth_AH_2: "贝希摩斯"
 IND_The_Behemoth_AH_2_desc: "印度共和国是个庞然巨物，管理着数百万村庄和城镇，和其中近五亿忙于追名逐利的人们。\n\n统一政府已经依照其意愿重塑国家，击退了企图摧毁她的波拿巴主义者。党国将在对最伟大领袖的怀念中重建，印度将为了她自己而不得不走向现代化。东方和西方的差距足有一百年，而我们要在十年内弭平这一鸿沟。"
 IND_The_Behemoth_Coup_1: "贝希摩斯"
 IND_The_Behemoth_Coup_1_desc: "印度共和国是个庞然巨物，管理着数百万村庄和城镇，和其中近五亿忙于追名逐利的人们。\n\n军方不惜毁掉军人不涉政的传统，自作主张地展开行动，阻止了印度斯坦平等同盟的颠倒是非继续腐蚀国家。一扇门又一扇门被粗暴地撞开，支持平等同盟的军官要么被扔上军事法庭审判，要么就在夜里“消失无踪”。国家正处于紧急状态，人们仍在为领袖的逝去而悲痛。只有时间才能证明，将军们是真心试着修补国家，还是说他们觉得王冠的重量就像手中的枪支一样舒适。"
 IND_The_Behemoth_Coup_2: "贝希摩斯"
 IND_The_Behemoth_Coup_2_desc: "印度共和国是个庞然巨物，管理着数百万村庄和城镇，和其中近五亿忙于追名逐利的人们。\n\n在德里，士兵粗糙的手掌打造出了一台新的政治体制，闪烁着令人不安的光芒。自由党明显模仿了其前宗主的政治路线，披上了托利党的外衣，新成立的印度工党则由军队认为“清白”的尼赫鲁派组成。印度政治体制就此寿终正寝，群众的眼眸因幻灭而黯淡无光——在军方的装点门面的议会里，灵感与真理再也无处可寻。"
 IND_The_Behemoth_Shastri: "贝希摩斯"
 IND_The_Behemoth_Shastri_desc: "印度共和国是个庞然巨物，管理着数百万村庄和城镇，和其中近五亿忙于追名逐利的人们。\n\n尼赫鲁派崛起，政敌纷纷惨败，夏斯特里和国大党拥有了在白纸上重建新印度的无限权力。工厂各自复工，农田重新播种，国家正慢慢回到正轨，人民必须用自己的眼睛去看到，他们所走的道路自始至终都是正确的。"
 IND_The_Behemoth_Shastri_OBQ: "贝希摩斯"
 IND_The_Behemoth_Shastri_OBQ_desc: "印度共和国是个庞然巨物，管理着数百万村庄和城镇，和其中近五亿忙于追名逐利的人们。\n\n尼赫鲁派在西部分裂的阴影下登上顶峰，夏斯特里和国大党必须重建国家，安抚对残酷的族群冲突心存恐惧的民众。然而，在处理城市和边境地区的火药桶时，政府也不能忘记为人民带去现代化的真正目标。"
 IND_The_Behemoth_Desai: "贝希摩斯"
 IND_The_Behemoth_Desai_desc: "印度共和国是个庞然巨物，管理着数百万村庄和城镇，和其中近五亿忙于追名逐利的人们。\n\n国大党民主派的设计师莫拉尔吉·德赛拉上了动荡十年的终幕。有了崭新清晰的愿景，再加上爱国高效、只在绝对必要时进行干预的执政党，通向强大而不可分割的印度的前进道路已经显现在眼前。"
 IND_The_Behemoth_Rajaji: "贝希摩斯"
 IND_The_Behemoth_Rajaji_desc: "印度共和国是个庞然巨物，管理着数百万村庄和城镇，和其中近五亿忙于追名逐利的人们。\n\n随着自由党的掌权，十年间种种的戏剧性转折在最后一幕达到了高潮。贝希摩斯和利维坦抵角争斗，在新时代的美德与年迈战士拉贾吉挥舞的宝剑之下，与利维坦同归于尽。新政府从中生发而出，不惧让人民去拥抱追求属于自己的才能。"
 IND_The_Behemoth_Chavan: "贝希摩斯"
 IND_The_Behemoth_Chavan_desc: "印度共和国是个庞然巨物，管理着数百万村庄和城镇，和其中近五亿忙于追名逐利的人们。\n\n亚什万特拉奥·恰范为动荡十年画上了句号。在他的愿景中，国大党仍要坚定地秉持社会主义，同时还要走向熟练化、专业化。政府得到了全面改革国家的权力，贝希摩斯如今高高在上，俯瞰着满怀感激但仍有些茫然的民众。"
 IND_The_Behemoth_Singh: "贝希摩斯"
 IND_The_Behemoth_Singh_desc: "印度共和国是个庞然巨物，管理着数百万村庄和城镇，和其中近五亿忙于追名逐利的人们。\n\n早在成为印度领导人之前，查兰·辛格就在土地上打拼。他一心想着维护农民的利益，坚持着对支持者的承诺：印度全国数不清的农场主、小农和佃农将拥有为他们而着想的政府。\n\n过去，印度的农民阶级被迫退居幕后；而现在，他们作为一股不可忽视的力量走到了台前——世界上人口最多的国家之一，将由他们中的一员来代表。"
 IND_The_Behemoth_Yadav: "贝希摩斯"
 IND_The_Behemoth_Yadav_desc: "印度共和国是个庞然巨物，管理着数百万村庄和城镇，和其中近五亿忙于追名逐利的人们。\n\n在印度不算长的民主历史上，自由党政府遭遇了难以比拟的失败。它抛弃了对印度人民的忠诚，粉碎了千百万印度人对民主进程的信心；先辈为此奋斗流血一百余年，却在怨恨和冷漠之中几近化为乌有。\n\n布拉姆·普拉卡什·亚达夫的新政府肩负着弥补损失的艰巨任务，他们或许还能有办法补救。亚达夫向心灰意冷的印度中产阶级发出了呼吁，也许能借此为印度议会进程重新注入活力，发动人民在投票站与抛弃他们的精英展开斗争，为大多数印度人的生活水平带去曙光。"
 IND_The_Nations_Honeymoon: "国家蜜月期"
 IND_The_Nations_Honeymoon_desc: "在经历了一代人的宿怨和相互猜疑之后，印度共和国和自由印度政府成功统一，次大陆变回了第二次世界大战之前的模样。印度国民大会党和印度斯坦平等同盟不惜冒着疏远华盛顿和东京的风险，履行了对印度人民的共同承诺。一颗唤作独立统一的种籽，在帕斯尚尔的泥泞中播种，在缅甸战役的季风中浇灌，最终在新秩序的夹缝中生根发芽——印度正期盼着百年牺牲换来的、充满希望的未来。\n\n然而，印度的故事还没有结束。即使希望和乐观主义点燃了新的曙光，冷战的幽灵也尚未远去。国大党和平等同盟在有关印度未来的具体问题上仍有很多分歧，正如OFN和共荣圈在次大陆的利益对决一样，他们肯定会强行施加各自阵营的影响力。新统一的印度确实可以享受来之不易的胜利时刻，但在冷战的浪潮越洋而来之前，希望和乐观还能维持多久呢？"
 IND_Into_Plowshares: "铸剑为犁"
 IND_Into_Plowshares_desc: "黎明已降临次大陆，数以百计曾生产死亡的工厂纷纷调整方向。从前生产坦克的流水线上，拖拉机一辆接一辆地下线；昔日用于战机和军舰的电阻器、雷达和真空管现在摇身一变，走进了千家万户。农民重返田野，工人回到城市，不再以死亡为导向的经济将为所有人带来改变。"
 IND_Whispers_of_Communalism: "社群主义的低语"
 IND_Whispers_of_Communalism_desc: "巴基斯坦运动是樽火药桶，只需一点火花就可彻底引爆，但是勒克瑙会议取得了成功，如今引领主流是的国家统一，伊斯兰国家分治的梦想可能永远不会成真。\n\n虽然运动的追随者为巴基斯坦胎死腹中哀叹连连，但新近统一的印度为宗教少数群体提供了发声的平台，对非印度教更加容忍，足以满足多数穆斯林的需求。社群矛盾并未完全化解，但已不再似国家分裂那般尖锐了。"
 IND_Non_Alignment_with_Indian_Characteristics: "印度特色的不结盟"
 IND_Non_Alignment_with_Indian_Characteristics_desc: "新统一的印度已正式退出共荣圈——对东京来说，这是史无前例的不回应行为。然而在大门之后，总有日本政客等待着倾听他们的声音；日本陆军和海军没有发现他们庇护叛军；印度也没有完全拒绝展开对日合作。德里方面可以自称为不结盟国家，并且世界上大多数国家也都表示认可。但有心人注意到，共荣圈政策并没有因这一重大转变而发生太大的变化。"
 IND_The_Twenty_Point_Programme: "二十点纲领"
 IND_The_Twenty_Point_Programme_desc: "“二十点纲领”是指英迪拉·甘地后执政后所实施的一系列经济改革，与她父亲提出的经济计划相比，可以说发生了重大的转变。尽管纲领目标仍然包括消除农村贫困，但却不如从前一样强调，而是转而追求住房建设、灌溉设施和电气化的发展。此外，土地再分配也将彻底停止，不会在如今的基础上继续推进。\n\n然而，这并非对印度既有正统经济理论的彻底否定。经济规划仍然是国家的基石，将得到继续推行。在英迪拉·甘地的领导下，印度经济将以法团模式重组，并为此成立一系列新机构。"
 IND_Picking_Up_the_Pieces: "收拾残局"
 IND_Picking_Up_the_Pieces_desc: "虽然多数人对印度统一欣喜若狂，但计划经济的解体却令曾经依赖体制的孟加拉人难以为继。他们深陷经济困境，于是向平等同盟政府寻求帮助，政府则许诺将修复并令旧制度焕发生机。\n\n印度斯坦平等同盟许诺不单要恢复孟加拉的计划经济，还要将其铺到全印度。批评者指责如此承诺极不负责，称推广这种模式耗资巨大，而且还会损害西部经济。但政府对他们的抗议充耳不闻，一心要让印度迎来第二次解放……"
 IND_What_Happens_in_the_Dark: "暗室运作"
 IND_What_Happens_in_the_Dark_desc: "经年累月的管理不善后，印度民主腐朽的面皮已被彻底揭下，取而代之的则是更加坚实的基础：开明的自由人士和军方的可靠后盾。他们将保证世界上最大的民主国家得到谨慎的指导，以免沦入更糟糕的毁灭。只要民粹主义者的诱惑和蛊惑家的虚假承诺仍能轻易俘获印度人民的心，理性和远见卓识就有责任保护未开化的大众免受自身弱点的伤害。"
 IND_The_Finished_Puzzle: "谜底揭晓"
 IND_The_Finished_Puzzle_desc: "曾经支离破碎的计划经济凯旋归来，成为了亚洲市场的一支劲旅。新土改计划意在摧毁西部扎明达尔制的最后一丝痕迹，很快，穷困潦倒和流离失所就将成为过去式，对大多数人而言，这是印度最美好的时刻。\n\n终结不平等的牺牲品就是共和国的民主，如今已被平等同盟党国彻底粉碎。但多数印度人并未对自由的丧失感到太过困扰，他们更愿选择发展热潮带来的经济红利。发展仍在继续，失败的民主实验随之消逝，毕竟，这种制度不适合印度。"
 IND_Our_Old_Friends_in_the_East: "东方的老友"
 IND_Our_Old_Friends_in_the_East_desc: "印度斯坦平等同盟政府是领袖鲍斯的门徒，他们不可能与日本之外的任何一方结盟，事实也确实如此。虽然他们并未直接加入共荣圈，但已再次以观察员身份建立了联系。南亚明珠重回日本王冠之上，平等同盟政府也与日本军方启动了新的国防合作项目，还吸引了财阀的目光，建立起了富有成效的投资伙伴关系。"
 IND_Move_Fast_and_Break_Things: "快速行动，推陈出新"
 IND_Move_Fast_and_Break_Things_desc: "由于开支膨胀和前任政府的失败，印度新政府开始着手实施早该实施的休克疗法。从地方庄园到新德里议会，经济控制权都回到了管理自己土地的人手中。国家正面临着越来越多的危机，例如营养不良现象正在贫困地区加剧。新政策立竿见影，飞速的经济增长随之而来，为政府提供了稳定秩序、弥合危机的手段。"
 IND_All_Paths_Lead_West: "条条大路通西方"
 IND_All_Paths_Lead_West_desc: "西风自印度次大陆而起，越过亚洲与太平洋，为美国政府和商界带来了与世界上最大的民主国家展开合作、进行投资、磋商防务合约、订立承诺的机会。\n\n印度史无前例地向美国商界敞开了大门，政府和商界领袖都将之称为天然的联盟：自由民主国家与自由市场之间必然的联合，共同致力于发展自由世界。然而，有关美国支持印度现政府的传言最早可以追溯到那场马萨尼推翻印度斯坦平等同盟上台的政变——如果属实，那与其说这是命中注定的结盟，倒不如说是一笔永远都还不清的债务。"
 IND_The_Dimming_Light: "消逝的光芒"
 IND_The_Dimming_Light_desc: "从德里到孟买再到加尔各答，印度儿女不约而同地仰望着不祥的天空，仰望着新兴民主即将落山的太阳。政府正动用武力镇压政敌、新闻机构和独立记者，公众越来越畏惧国家强制的新闻审查，政权越来越不能容忍公众的不同意见。如今，不需要专业的政治知识也能看明白，印度新生的独裁确实有可能终结民主进程，也许会是永远。\n\n虽然民主尚未彻底消亡，但如果国家继续在日益专制的道路上一意孤行，那么部分爱国议员已做好了准备，随时挺身而出，捍卫他们的制度。也许不久之后，印度共和国就会跌落波涛，步上大不列颠的后尘，成为反动政治的又一个受害者。"
 IND_Back_to_Basics: "重回基石"
 IND_Back_to_Basics_desc: "与甘地相比，贾吉万·拉姆最明显的不同莫过于他对法团主义的否定。现在，法团结构已被肢解为数个过渡机构。拉姆并未考虑同时实现多个远大的目标，而是选择优先解决农村贫困问题。他的计划以居民点电气化和农业保护增产为基石，再搭配以配给制，保证所有印度农民每天都至少能吃上一顿合理的正餐。\n\n他的经济政策受到了重重阻碍：腐败限制了真正的财富再分配，内斗模糊了所有立法条款的重点，拉姆与农村大地主的联盟成为了向土地再分配的最后一击。尽管如此，福利和援助仍将以某种形式，流入遍布次大陆的农场。"
 IND_The_Nehruvian_Vision: "尼赫鲁的愿景"
 IND_The_Nehruvian_Vision_desc: "尽管战争将世界蹂躏得完全变了模样，但我们仍坚持着初心，那就是尼赫鲁“经济为人民服务”的梦想。政府保留了对所有重要财政决策的关键掌控权力，得以与地方政府和计划委员会通力合作，管理并指导工业中心，组织农民生产，刺激经济增长，保持人民与各邦之间的平等。"
 IND_The_Partition: "分治"
 IND_The_Partition_desc: "一个新国家正挣扎着要从旧国家寻得解放，一切都乱套了，私刑暴民将几百年来的邻居认定为外国人。旁遮普已经四分五裂，成千上万的人们试图去往正确的边境一侧避难，但新国家并不欢迎他们的到来。城市在燃烧，鲜血在流淌。§e分治开始了。§!"
 IND_My_Brothers_Keeper: "同室操戈"
 IND_My_Brothers_Keeper_desc: "猜疑嬗变成为公开的仇恨，村庄城镇从内部被撕裂。男人在敌人门前吐唾沫，在茶馆集会拉清单，列出需要对付的渣滓；妇女选择对此视而不见，在男人经过时遮掩自己的面庞；孩子成群结队地四处游荡，向被排斥的人们身上扔去石头和泥巴。民政府每时每刻都在崩解，敌人警觉的双眼中闪烁着贪婪的光，这正是他们推波助澜，想要看到的景象。"
 IND_An_India_of_Light: "属于光明的印度，堕入黑暗的印度"
 IND_An_India_of_Light_desc: "战争胜利了，自然，战利品归战胜者所有。国家其他地区开始慢慢恢复正常，或者说，战后意义上的正常；与之相对，东部地区仍然牢牢掌控在重建局的手中。党的中坚力量攥着属于自己的小领地，他们几乎等同于过去的大地主和土邦王公，按照自己的意愿实施法律和正义——这就是我们为之奋斗的目标吗？"
 IND_Look_Westwards: "望向西方"
 IND_Look_Westwards_desc: "统一战争之后，印美关系从冷淡的倾向转为彻底结盟。印度代表定期观摩OFN峰会，商人们常常飞越遥远的距离来巩固纽带关系。东京愤怒而沉默地注视着东西方握手言和，共同商讨未来——没有帝国主义者在场。"
 IND_Reversing_the_Overreach: "拨乱反正"
 IND_Reversing_the_Overreach_desc: "剪枝机已经启动，国大党右翼开始着手理清过去二十年里积累的无数经济权力。从尼赫鲁到恰范，新德里将诸多国家经济权力收归手中，但却只是任凭其衰落。而依照国大党右翼的意愿，印度将宽松管制、下放经济权力，这是印度权力机构“瘦身”的重要一步。\n\n几乎没有哪一方面能在这次变动中独善其身。土地改革和所有进一步的再分配计划都将就此中止；福利计划将遭到削减，因为这被视作是过度的浪费；国有化将继续推行，但不会进一步社会化。这或许意味着巨大的转变，但尼赫鲁社会主义的失败也是同样。"
 IND_Kulak_Socialism: "中农社会主义"
 IND_Kulak_Socialism_desc: "长久以来，印度政府一直都专注于支持食利阶层，对被食利者的关心却寥寥无几——他们只能日日在田间劳作，没有任何社会流动的机会。如今，印度诞生了由中农选出、为中农服务的政府，这样的时光终于结束了：查兰·辛格总理已承诺采取一系列措施，帮助、保护印度被忽视的中间阶级。\n\n大地主统治的时代已经过去，对底层农民公然的家长制作风也将画上句号，取而代之的则是国家以经济干预、低息贷款、专业技术教育和大笔补贴等手段，重点提升小农业主的地位，给予其新的经济利益。虽然有人认为这只会导致中农和贫农之间的差距，进而加剧印度的不平等，但辛格认为，上涨的水面将会托起所有船只。"
 IND_The_Indian_Vision: "印度愿景"
 IND_The_Indian_Vision_desc: "东风吹遍全国，寒冷刺骨，但我们经受住了考验，变得更加强大。政府启动了大踏步的经济改革，旨在以税收优惠、廉价劳动力、放松监管等手段刺激企业家精神，并强调国内企业与跨国大公司之间的伙伴合作关系。但是，缰绳依旧牢牢地掌握在德里手中，计划委员会仍然保留着最终的决策权力。"
 IND_The_Ganges_Unleashed: "束缚消解"
 IND_The_Ganges_Unleashed_desc: "经过艰苦卓绝的努力，我们终于在战场和后方都赢得了胜利。政府解散了计划委员会，由国家经济论坛取而代之。乘着经济限制解除和信贷额度上浮的东风，国内巨头企业以惊人的速度膨胀起来，外企则前呼后拥地进入印度市场，与前者展开合作或直接竞争。在如此大潮之中，唯有一事清晰明了：印度的劳苦大众正在被卷入以OFN为中心的新兴全球经济。"
 IND_Eastern_Bulwark: "东方堡垒"
 IND_Eastern_Bulwark_desc: "冷战历史上从未发生过如此惊人迅速的变化，也从未对如此广泛的人群产生过如此不可忽视的影响。印度加入了OFN，每天都有成百上千的美军士兵抵达孟买，建立军事基地、前沿侦察中心、刺激当地经济，东京则正盯着这一切磨刀霍霍，策划着它的复仇。自由世界曾为取得次大陆立足点而艰苦奋战；现今，自由女神的火炬正高擎在印度母亲的手中，骄傲地照耀着这片大地。"
 IND_Reversing_the_Current: "逆转现状"
 IND_Reversing_the_Current_desc: "自由党在执政期间对旧有的经济秩序重拳出击，肆意推行着自由化和私有化。大灾难随之接踵而来，贫困率飙升，数百万人在经济冲击下变得一无所有。危机已经蔓延到了政府无法控制的地步，印度人民在选举中将国大党左翼抬上了台，希望解决他们当下的经济困境。\n\n新任总理已承诺将力挽狂澜，抵御私有化带来的巨大震荡；与之相对，在自由党执政期间，新的精英和寡头阶层已经借机崛起，他们不愿意看到局势发生逆转，希望发挥其影响力。这两股力量中，究竟哪一方会占上风，我们拭目以待。"
 IND_A_Monument_to_Failure: "耻辱柱"
 IND_A_Monument_to_Failure_desc: "莫拉尔吉·德赛曾经在他的竞选活动中夸下海口，但随后由其实行的国家主导自由化暴露出了他对保守经济规划毫无认知的事实。他的政策没有一往无前的豪情、没有眼前一亮的创新、没有雄心壮志的激情——选民对国大党民主派政府的评价只有两个字：乏味。于是，选民在大选中把他们赶下台自然也是意料之中。\n\n重新掌握国家权力之后，国大党左翼承诺要纠正德赛经济学实验的失败，恢复正统的共和国财政政策，首先致力于重振遭到忽视的社会福利制度，然后重新聚焦于土地改革。总有一天，前任政府的错误将彻底消除，只能在历史书中觅得踪迹。"
 IND_The_Old_Ghosts_of_Communalism: "社群主义的幽灵"
 IND_The_Old_Ghosts_of_Communalism_desc: "尽管鲍斯提出了他的理想，但印度过去的阴影仍然潜伏在所有实现未来的尝试背后。种姓制度依然普遍存在，尤其是不属于前自由印度政府统治的地区；宗教冲突似乎已经平息，但每一次世俗化的意愿都会引起人们的怀疑。\n\n尽管巴基斯坦运动已经战败，但西北的紧张局势可不会在一夜之间彻底消失。而在其他地区，新整合的印度行政系统落实政策的速度依然十分迟缓。社群主义的幽灵无休无止地纠缠着人民，除非我们将其永远驱除——每过一天，动用武力将其摧毁的诱惑便更强一分。"
