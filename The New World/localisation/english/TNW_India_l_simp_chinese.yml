 IND_black_years_dynamic_modifier: "黑暗年代"
 IND_black_years_dynamic_modifier_desc: "人类对食物的基本需求不会因为战争爆发而停止。在席卷印度的浩劫之中，这一事实最先为人们所遗忘，又在肚子空空的时候为人们所记起。\n\n次大陆遭遇了史无前例的饥荒浪潮。位于比哈尔邦和北方邦的农业中心产区受到严重破坏，带来了难以估量的后果：每有一个人死于战争，就同时有其他二十个人死于饥饿。同室操戈的战事之中，全国各地的村庄都在嚎哭悲泣。如果再不着手采取应对措施，“黑暗年代”的灾难就不将仅仅局限于一个国家，还会成为全球性的悲剧——本世纪中前所未见的苦难。"
 IND_debug_superevent_remix: "Let's work it out in the remix"
 POLITICS_KM_CARIAPPA_DESC: "科丹德拉·马德帕·卡里亚帕，这位身经百战的老兵注定难享清闲。他于1899年初生，曾是英属印度军中的完美典范，在帝国分崩离析时才勉强改换门庭。鲍斯政权割裂次大陆之时，他执掌共和国武装力量，肩负肃清军中残余亲鲍斯势力的重任。\n\n他对权力未曾轻慢。化身铁血鹰派的他拒绝任何对自由印度的妥协，然而这份新生忠诚尚未焐热即遭冰封：看着梅农向鲍斯步步退让，眼见印度人民同盟赢得大选，直至萨夫拉尼为清洗军队将他本人驱逐出列，卡里亚帕终于在暴怒军官与失意政客的簇拥下，率部发动政变推翻萨夫拉尼，戴上了印度代总理的桂冠。\n\n此刻矗立于第二祖国的权力之巅，卡里亚帕眼中透着旧日统帅的疏离。他无意久居高位，但更不甘做政治棋盘上的摆设。其任期将刻下两条铁律：军队这一国家机构必须独立于总统，绝不允许萨夫拉尼之流再度染指军权——无论届时民意几何。"
 IND_pandoras_box_1_desc: "几个世纪以来的生活方式仍在延续。农夫们面朝黄土背朝天，沿着列祖列宗踏出的阡陌辛勤劳作。村庄完整如初，支撑它们的正是那维持社会结构的固化纸牌屋——这结构历经帝国倾覆、王朝更迭，从帝王将相到衮衮诸君，始终岿然不动。印度正以缓慢而坚定的步伐迈向未来，至少表面如此。"
 IND_pandoras_box_2_desc: "不安的阴风裹挟血腥气息，正撕扯着古老根基的裂痕。儿郎们成群结队涌向大都市的就业之约，贫民窟人满为患，乡村化作空巢。成片土地抛却犁铧迎接推土机，旧时代的秩序被迁移、被补偿，却仍带着千年不变的倔强苟延残喘。剧变将至，但这不过是异国历史的重演——而摇摇欲坠的纸牌搭建的穹顶，终将在废墟中顽强存续。"
 IND_pandoras_box_3_desc: "军号响彻云霄，一场宏大的征伐就此启幕。母亲们含泪送别踏上军营与战场的骄傲儿郎。尚武民族冲锋陷阵，余者尽数走进工厂与后方。但此时，流弹呼啸与俯冲轰炸机的尖啸已开始瓦解古老法则，鲜血浸透泥泞之际，唯余冷眼观世的士兵方能持久存活。"
 IND_pandoras_box_4_desc: "战争的腥风血雨已扼住这个国家的命脉，吞噬殆尽却仍不觉果腹。军旅世家再也献不出儿子，荣耀的战旗兵团被迫向市井征召兵员。曾经炊烟袅袅的村庄唯余焦土纵横，炮弹不分贵胄庶民，撕碎血肉之躯。幸存者们透过血色弥漫、弹震迷离的双眸凝视世界，而旧世界的传统礼法，此刻只化作森森嘲弄的残响。"
 IND_pandoras_box_5_desc: "让旧世界的所谓传统见鬼去吧！我们将踏着阵亡同袍的尸骨碾入宿敌的脏腑，将其家族绞作血沫，把战火引向他们世代安居的厅堂。宰了那群口蜜腹剑的混账——那些从未目睹手足化为灰烬的祭师与政客。待到血债偿清之日，我们脚下这片浸透硝烟的焦土，终将在复仇之师脚下，蜕变为独属于吾辈的应许之地。"
