 POLITICS_CHAKRAVARTI_RAJAGOPALACHARI_DESC: "查克拉瓦蒂·拉贾戈帕拉查里是一位从灰色暗影中走出的人，人称“拉贾吉”的他以与其年龄完全不符的方式，走上了政治舞台的中央。\n\n1878年，第一次印度独立战争爆发后的二十一年，幼时病弱的拉贾吉生于马德拉斯。独立运动肇兴之时，拉贾吉便投身其中：从1906年加入队伍，到打破英印盐法的食盐进军，在英国对印度控制被迫松动的每一个历史时刻中，都能寻觅到他的身影。在联合政府建立后的混乱之中，拉贾吉放弃了权力，并未在其中就职，但在与阿富汗的战争之后，他再次加入了尼赫鲁的紧急内阁。此后不久，他又重新脱离国大党，回到了政治荒野之中，稳步建立起他的古典自由主义替代方案。如今，在他漫长的一生即将走到终点之际，他做到了不可能的事情：将国大党取而代之。"
