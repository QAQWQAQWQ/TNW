 POLITICS_TASHI_NAMGYAL_DESC: "身为十一世却嘉和锡金独立后的首位领导人，塔希·纳姆加尔领导锡金在风雨飘摇的二十世纪中蹒跚前行，塑造了该国从旧到新的发展道路。\n\n纳姆加尔出生于西藏，在其兄长早逝后继承了王国，并被达赖喇嘛任命为新一任却嘉。纳姆加尔继位时年龄尚小，在宫廷的保护和英属印度的监督下，他努力维持着这个遗世独立的王国的安宁，却没有意识到世界已在悄然之间发生了巨变。\n\n旧世界被新秩序取而代之，锡金的主权也从大英帝国移交到独立的印度，经历了建国初期的痛苦，锡金从此不愿再做出任何重大的改变。自由印度成立后，锡金又顺理成章地变成了前者的附庸。纳姆加尔与自由印度政府密切合作，实现了国家的现代化，同时他个人也推动了早该进行的土地改革。\n\n虽然纳姆加尔因他对医疗保健、艺术和科学的慷慨投资而广受菩提亚-雷布查人的爱戴，也得到了尼泊尔族人的普遍认可，但锡金王廷的风评并未因他而好转。年事已高的十一世却嘉怅然若失地看着属于他的王国，思考着一个孤独的问题：\n\n“在我死后，这个国家会走向何方？”"
 SIK_Darbar_or_Democracy: "杜尔巴还是民主化？"
 SIK_Darbar_or_Democracy_desc: "当世界其他国家纷纷革故鼎新，摒弃落后的贵族政治时，锡金却仍在争论王室应该拥有多大的权力。声势浩大的保皇派和某些军官认为任何改革的想法都是天马行空，从西方引进的政治观念在锡金行不通。\n\n却嘉的想法则更加细致入微。考虑到锡金的地理位置和外交环境，变革的浪潮迟早会来临。因此，他既支持深思熟虑后的改革，又给自己保留了足够的权力。虽然这种中庸之道迄今为止一直行之有效，但这也使却嘉同时失去了保守派贵族和朝中那些希望进一步推行改革和民主化的少数派的支持。"
 SIK_Legacy_of_Tumlong: "杜姆隆格的遗产"
 SIK_Legacy_of_Tumlong_desc: "自1861年签订《杜姆隆格条约》以来，锡金的命运就与外邦大国紧紧联系在了一起。大英帝国崩溃后，锡金便从英国落入印度手中。抛开个别头脑不灵光的愚昧之徒，大部分锡金人民已对此见怪不怪，因为他们深知，独立的锡金永远无法在风起云涌的国际社会中保护自己。\n\n目前，锡金是自由印度的保护国，国防和外交政策皆受后者控制。锡金的绝大多数基础设施建设，包括道路、学校和医院，也多是由其宗主国提供技术支持的。除非发生什么翻天覆地的变化，否则锡金在本世纪一百年间对外国的依赖很可能与上个世纪如出一辙。"