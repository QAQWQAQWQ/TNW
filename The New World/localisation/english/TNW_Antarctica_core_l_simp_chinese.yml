 AAN_Antarctic_Anarchy: "南极荒原"
 AAN_Antarctic_Anarchy_desc: "南极洲仅有的生命都倾向于停留在海岸边，至少大海还能给它们荒寂的生活提供少许帮助。越是接近冰洁大陆的黑暗之心，就越是能遭遇不宜生存的地形。雪脊锐利如剑尖、裂谷幽深如渊狱、雪盲剧痛如刀绞，无一不在挑战生命的存在。只有初来乍到的人类才会怀着愚蠢和盲目冒险涉足此地。\n\n千里冰封的原野上，天空闪烁着病态的苍蓝，不曾有滴雨落地，死寂冰冷宛如坟墓。此处正是地球上最为广袤，最为危险的荒漠。这里的冬天比地球上的任何地区都更为严酷，如无尽的虚空般吞噬一切，徒留千里之外的星辰照亮黯墨的漆黑。-50℃的平均气温为暴风添注能量，将人类的血肉之躯撕成碎片。对于站在核毁灭的边缘的当今人类来说，这片荒原就是一种预兆，它揭示了灾难幸存者们将要面临的世界面目。\n\n§Q冬日黑暗永恒，湮没昭然若揭。§!"
