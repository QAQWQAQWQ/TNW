 AAC_CountryInfo_Folder.101:0 "南极"
 AAC_CountryInfo_Content.1:0 "在此之前"
 AAC_CountryInfo_Content_desc.1:0 "§W南极洲§!这片土地冰寒刺骨而毫不留情，在§Y五十年代§!以前，这片极南大陆一直被人们忽视着，只是偶尔有少数§G科考队§!和一支§G军事探险队§!到访于此。多个国家都提出了自己对南极洲的领土要求，但此等宣称并无太大外交意义，毕竟适宜居住的地区才是各国更为关注的重点。但在§Y五十年代§!早期，一切发生巨变，那便是§i瓜分南极洲§!。"
 AAC_CountryInfo_Content.2:0 "瓜分开始"
 AAC_CountryInfo_Content_desc.2:0 "起初，§R智利§!与§M阿根廷§!就一系列小岛爆发外交纠纷，这些岛屿曾为§x英国§!占有，但英国早已在§e二战§!中战败。两国理论上都有对这些岛屿的合法主权。§M阿根廷§!为了确保对这些领土的主权，开始着手成立§W南极领地§!，并接管了一些无人管辖的前§x英属§!岛屿。§R智利§!抗议这一行为，并敦促§Q美利坚合众国§!干预两国谈判，帮助解决纠纷，同时智利也提出了自己对南极洲的宣称。事态就此迅速升温。"
 AAC_CountryInfo_Content.3:0 "瓜分南极"
 AAC_CountryInfo_Content_desc.3:0 "§e日本帝国§!急于加紧对太平洋的控制，对玛丽·伯德地提出了领土要求，并抢在§Q美国人§!前面，先派出军事小队控制了这一地区。§Q美利坚合众国§!立即作出回应，巩固了对澳大利亚、新西兰和前法国宣称地的控制，成立了§QOFN南极洲事务局§!。§r德国§!强夺了现为专员辖区的挪威的领土要求（与德国本国的宣称有一定重叠），并将两片地区合并为§r新施瓦本§!。在两大南美国家匆忙完成谈判后，§R智利§!却没捞到什么油水，只拿到了他们索求的地区的一小部分，而§M阿根廷§!则确立了对特里尼蒂半岛及其周边大量岛屿的主权。仅仅一周的时间，§i瓜分南极洲§!就让这片大陆分裂为五个部分，冷战局势也更加§W紧张§!起来。"
 AAC_CountryInfo_Content.4:0 "时至今日"
 AAC_CountryInfo_Content_desc.4:0 "时间来到§Y1962年§!，各国对§W南极洲§!的开发和军事化更为加剧。§QOFN南极洲事务局§!是印度洋秘密行动的重要训练基地，§e日本领南极地域§!位于他们东部，也扮演着差不多的角色，两方都密切监视着共同边界。在§Y五十年代§!殖民尝试失败后，§r新施瓦本§!成为了实验型飞机、寒地装备的试验场，据尚未确认的报告称，德国还在此测试核技术。在暗地里，§I祖先遗产学会§!在§r新施瓦本§!西部建立基地，远离外人目光，开展§I秘密行动§!。§M阿根廷§!内斗激烈，海军与阿根廷南极研究所正在争夺对南极领地的控制权，§R智利§!则更加希望能在现有领地的基础之上再多占有些宣称领土。即便在现代技术的加持下，南极洲依然危机四伏，极端气候、冰川裂隙和糟糕的基建始终困扰着人们。尽力去主宰§W南极洲§!吧，但不要忘记，这片冰封大陆对外人从未有过丝毫友善。"
 AAC_CountryInfo_Folder.102:0 "智属南极"
 AAC_CountryInfo_Content.5:0 "《费城协定》"
 AAC_CountryInfo_Content_desc.5:0 "在§e第二次世界大战§!的余波之中，§q亲轴心国§!的法西斯§M阿根廷§!政府觅得了在新地缘政治形势下攫取利益的机会，在南极开展了侵略性的插旗行动。§U智利§!也同时将军队部署至当地，强硬的姿态险些令智阿两国擦枪走火。然而，往昔不过是边界争端的小事件逐渐外溢，呈现出崭新的全球政治维度。面对南锥体地区日益壮大的§q亲轴心国§!势力威胁，§Q美国总统德怀特·艾森豪威尔§!于§Y1950§!年启动了系列谈判磋商，旨在组建南美各国家间组织，以抑制这一不断膨胀的威胁。历经磋商，§n巴西§!、§U智利§!、§M乌拉圭§!三国政府同意搁置分歧，签署了§K《费城协定》§!。该防务条约规定，一切针对任一缔约国的§M阿根廷§!侵略行为，都将面对三国的联合反击，§Q美国§!同样会支持缔约各方。对此，§M阿根廷§!新上台的强人领袖§M胡安·多明戈·庇隆§!不甘示弱，得到了§q德国§!对§M阿根廷§!领土宣称的正式承认。"
 AAC_CountryInfo_Content.6:0 "缓和降温"
 AAC_CountryInfo_Content_desc.6:0 "然而，诸多外交进展并未能缓解远南地区的紧张局势，§Y1952年§!，§U智利§!测量队遭到§M阿根廷§!海军人员开火袭击，南极大陆响起了第一声枪响。\n\n尽管智阿双方剑拔弩张，但各个超级大国却并不想打第三次世界大战，而是着手通过外交途径解决问题，同时在这一国际角力的新舞台上宣示其自身的领土主权。\n\n虽然迫在眉睫的战争阴霾已然消退，但§U智利§!与§M阿根廷§!始终未能就南极争端达成持久的外交解决方案，南极荒原上空的阴云从未散去。"
 AAC_CountryInfo_Content.7:0 "斯尼佩岛之战"
 AAC_CountryInfo_Content_desc.7:0 "§Y1958年§!，悬而不决、拖延频频的外交辞令终于酿成了血腥的恶果。§M阿根廷海军§!以一场针对彼时无名小岛，斯尼佩岛的小小冲突为由，对§U智利§!领土发动了一系列非法入侵行动——这座名不见经传的小岛很快就变得臭名昭著。§e斯尼佩岛之战§!打了§U智利§!一个猝不及防。在瓦尔帕莱索港，政府不作为引燃了兵变，随后，§s何塞·托里维奥·梅里诺海军上校§!展开了顽强的抵抗，成为了智利的民族英雄。但尽管如此，§U智利§!领土仍然惨遭践踏。最终，事实证明，§K《费城协定》§!不过是一纸空文——§n巴西§!和§m乌拉圭§!使出了浑身解数，找借口作壁上观。与此同时，§M阿根廷政府§!则忙于寻找结束战争的途径，他们既要维护国际声誉，又要安抚军方鹰派。数月的零星战斗后，双方宣布非正式停火。§U智利§!领地已成焦土，§M阿根廷§!军靴肆意践踏，§U智利§!领土上仅余数处孤立据点仍在坚守。"
 AAC_CountryInfo_Content.8:0 "战事余波"
 AAC_CountryInfo_Content_desc.8:0 "但并非所有人都放弃了率领§U智属南极§!重回神赐土地的梦想。新任领导人§a胡利奥·埃斯库德罗·古斯曼教授§!正身在阿图罗·普拉特站，策划复兴智利南极研究所的宏图。一方面，他任命亲密好友、§P社会党§!党员§P卡洛斯·亚克希奇§!整顿南极领地财政，重组§M阿根廷§!没有夺走的少许残余资源；另一方面，教授同时委派资深外交官§a马西亚尔·莫拉·米兰达§!和§a恩里克·加哈尔多·比利亚罗埃尔§!在§B美洲国家组织§!发起外交攻势，提升国际社会对§U智利南极领土主张§!的认可，从而借自由世界之力对抗敌人。\n\n斯尼佩岛的英雄，§s梅里诺海军上校§!受委任负责南极领地的防卫事务。此时，他正筹谋着针对§M阿根廷侵略者§!的最终复仇，还要揪出他认为的、暗中帮助阿根廷的懦夫和叛徒。"