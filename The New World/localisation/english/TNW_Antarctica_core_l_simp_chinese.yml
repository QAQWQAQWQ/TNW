 REGIONAL_INFO_ANTARCTICA:0 "§G==南极洲==§!\n\n§W南极洲§!这片土地冰寒刺骨而毫不留情，在§Y五十年代§!以前，这片极南大陆一直被人们忽视着，只是偶尔有少数§G科考队§!和一支§G军事探险队§!到访于此。多个国家都提出了自己对南极洲的领土要求，但此等宣称并无太大外交意义，毕竟适宜居住的地区才是各国更为关注的重点。但在§Y五十年代§!早期，一切发生巨变，那便是§i瓜分南极洲§!。\n\n起初§R智利§!与§M阿根廷§!就一系列小岛爆发外交纠纷，这些岛屿曾为英国占有，但英国早已在二战中战败。两国理论上都有对这些岛屿的合法主权。§M阿根廷§!为了确保对这些领土的主权，开始着手成立§W南极领地§!，并接管了一些无人管辖的前英国岛屿。§R智利§!抗议这一行为，敦促§Q美利坚合众国§!干预两国谈判，帮助解决纠纷，同时智利也提出了自己对南极洲的宣称。事态就此迅速升温。\n\n§e日本帝国§!急于加紧对太平洋的控制，对玛丽·伯德地提出了领土要求，并抢在§Q美国人§!前面，先派出军事小队控制了这一地区。§Q美利坚合众国§!立即作出回应，巩固了对澳大利亚、新西兰和前法国宣称地的控制，成立了§QOFN南极洲事务局§!。§r德国§!强夺了现为专员辖区的挪威的领土要求（与德国本国的宣称有一定重叠），并将两片地区合并为§r新施瓦本§!。在两大南美国家匆忙完成谈判后，§R智利§!却没捞到什么油水，只拿到了他们索求的地区的一小部分，而§M阿根廷§!则确立了对特里尼蒂半岛及其周边大量岛屿的主权。仅仅一周的时间，§i瓜分南极洲§!就让这片大陆分裂为五个部分，冷战局势也更加§W紧张§!起来。\n\n到了§Y1962年§!，对§W南极洲§!的开发和军事化更为加剧。§QOFN南极洲事务局§!是印度洋秘密行动的重要训练基地，§e日本领南极地域§!位于他们东部，也扮演着差不多的角色，两方都密切监视着共同边界。在§Y五十年代§!殖民尝试失败后，§r新施瓦本§!成为了实验型飞机、寒地装备的试验场，据尚未确认的报告称，德国还在此测试核技术。在暗地里，§I祖先遗产学会§!在§r新施瓦本§!西部建立基地，远离外人目光，开展§I秘密行动§!。§M阿根廷§!满足于目前掌控的领土，主要在南极开展科学研究，并允许外国科学家进入阿根廷领地。§R智利§!也采取了类似政策，虽然智利政府更加希望能多占有一些领土。\n\n即便在现代技术的加持下，南极洲依然危机四伏，极端气候、冰川裂缝和糟糕的基建始终困扰着人们。尽力去主宰§W南极洲§!吧，但不要忘记，这片冰封大陆对外人从未有过丝毫友善。"
