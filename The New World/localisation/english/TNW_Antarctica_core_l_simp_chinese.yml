 AAG_CountryInfo_Content_desc.2:0 "起初，§R智利§!与§M阿根廷§!就一系列小岛爆发外交纠纷，这些岛屿曾为§x英国§!占有，但英国早已在§e二战§!中战败。两国理论上都有对这些岛屿的合法主权。§M阿根廷§!为了确保对这些领土的主权，开始着手成立§W南极领地§!，并接管了一些无人管辖的前§x英属§!岛屿。§R智利§!抗议这一行为，并敦促§Q美利坚合众国§!干预两国谈判，帮助解决纠纷，同时智利也提出了自己对南极洲的宣称。事态就此迅速升温。"
 AAG_CountryInfo_Content.3:0 "饕餮盛宴"
 AAG_CountryInfo_Content_desc.3:0 "§e日本帝国§!急于加紧对太平洋的控制，对玛丽·伯德地提出了领土要求，并抢在§Q美国人§!前面，先派出军事小队控制了这一地区。§Q美利坚合众国§!立即作出回应，巩固了对澳大利亚、新西兰和前法国宣称地的控制，成立了§QOFN南极洲事务局§!。§r德国§!强夺了现为专员辖区的挪威的领土要求（与德国本国的宣称有一定重叠），并将两片地区合并为§r新施瓦本§!。在两大南美国家匆忙完成谈判后，§R智利§!却没捞到什么油水，只拿到了他们索求的地区的一小部分，而§M阿根廷§!则确立了对特里尼蒂半岛及其周边大量岛屿的主权。仅仅一周的时间，§i瓜分南极洲§!就让这片大陆分裂为五个部分，冷战局势也更加§W紧张§!起来。"
 AAG_CountryInfo_Content.4:0 "时至今日"
 AAG_CountryInfo_Content_desc.4:0 "时间来到§Y1962年§!，各国对§W南极洲§!的开发和军事化更为加剧。§QOFN南极洲事务局§!是印度洋秘密行动的重要训练基地，§e日本领南极地域§!位于他们东部，也扮演着差不多的角色，两方都密切监视着共同边界。在§Y五十年代§!殖民尝试失败后，§r新施瓦本§!成为了实验型飞机、寒地装备的试验场，据尚未确认的报告称，德国还在此测试核技术。在暗地里，§I祖先遗产学会§!在§r新施瓦本§!西部建立基地，远离外人目光，开展§I秘密行动§!。§M阿根廷§!内斗激烈，海军与阿根廷南极研究所正在争夺对南极领地的控制权，§R智利§!则更加希望能在现有领地的基础之上再多占有些宣称领土。即便在现代技术的加持下，南极洲依然危机四伏，极端气候、冰川裂隙和糟糕的基建始终困扰着人们。尽力去主宰§W南极洲§!吧，但不要忘记，这片冰封大陆对外人从未有过丝毫友善。"
 AAG_CountryInfo_Folder.102:0 "新施瓦本"
 AAG_CountryInfo_Content.5:0 "第三次南极探险"
 AAG_CountryInfo_Content_desc.5:0 "新施瓦本§!的故事在§r德国§!领土范围以外的人看来始于§Y1938年12月§!。由§g阿尔弗雷德·里彻§!担任队长的§D第三次德国南极探险队§!乘坐着§g施瓦本号§!拔锚起航，驶向§W南极§!。他们的任务是找到一个适合建立捕鲸站以及海军基地的地方。船员们到达了已被§V挪威§!宣称拥有主权的§V毛德王后地§!，绘制了范围达数千平方公里之广的§W南极§!冰面地图，并在执行探险任务时对该地区提出了自己的领土要求。1939年2月，随着§g施瓦本号§!返回§r德国§!，这次小规模的、相对秘密的探险活动逐渐从人们的记忆中消失，因为§e第二次世界大战§!的硝烟已经燃起，在它结束后人们仍然饱受其后果之苦。在接下来的十年里，§W南极§!一直远离困扰着人类文明的灾厄与混乱。"
 AAG_CountryInfo_Content.6:0 "瓜分南极"
 AAG_CountryInfo_Content_desc.6:0 "这一切的起因是§M阿根廷§!和§R智利§!之间爆发的，关于§B威德尔海§!上几个原属§x英国§!的岛屿的归属权的小争端。很快，它就演变成了§i瓜分南极洲§!，三个世界大国都将目光投向了§W南极§!，希望能在这块蛋糕上分得属于自己的那一份。曾经几乎被遗忘的§D第三次德国南极探险队§!现在却起到了为§r德国§!对§W南极§!的领土宣称赋予合法性的作用，同时，德国也获得了§V挪威§!的宣称领土，因为它被现在的§V挪威§!§r专员辖区§!政府所放弃。§V毛德王后地§!被更名为§r新施瓦本§!，§V奥拉夫王子海岸§!被更名为§r阿道夫·希特勒海岸§!，§V马塔公主海岸§!则被更名为§r爱娃·希特勒海岸§!。此外，一个§o民政管理机构§!也被建立，以对该地区进行可能的殖民。"
 AAG_CountryInfo_Content.7:0 "暗潮涌动"
 AAG_CountryInfo_Content_desc.7:0 "新生的§W南极基地§!受到了供应短缺的困扰，这种情况随着§e西俄战争§!的爆发而雪上加霜，这场战争也让§r德国§!彻底放弃了在§W南极§!大陆上进行殖民的企图。战争结束后，该地区被改组为§r军政机构§!，由§g德国空军上校鲁道夫·迈尔§!，§D第三次德国南极探险队§!的飞行员之一领导。现在，§r新施瓦本§!成了§g德国空军的试验场§!，用于测试§g实验型飞行器§!，乃至§K核武§!。"
 AAG_CountryInfo_Content.8:0 "国家特色"
 AAG_CountryInfo_Content_desc.8:0 "*开发和测试§g最新型号的飞行器§!，以推进§r德国§!的伟大事业\n\n*进行由§s舒曼教授§!秘密领导的§K核试验§!\n\n*直面§o物资短缺§!和§e本土动荡§!的窘境，维持§r新施瓦本§!的运转"
 AAO_CountryInfo_Folder.101:0 "南极"
 AAO_CountryInfo_Content.1:0 "在此之前……"
 AAO_CountryInfo_Content_desc.1:0 "§W南极洲§!这片土地冰寒刺骨而毫不留情，在§Y五十年代§!以前，这片极南大陆一直被人们忽视着，只是偶尔有少数§G科考队§!和一支§G军事探险队§!到访于此。多个国家都提出了自己对南极洲的领土要求，但此等宣称并无太大外交意义，毕竟适宜居住的地区才是各国更为关注的重点。但在§Y五十年代§!早期，一切发生巨变，那便是§i瓜分南极洲§!。"
 AAO_CountryInfo_Content.2:0 "瓜分开始"
 AAO_CountryInfo_Content_desc.2:0 "起初，§R智利§!与§M阿根廷§!就一系列小岛爆发外交纠纷，这些岛屿曾为§x英国§!占有，但英国早已在§e二战§!中战败。两国理论上都有对这些岛屿的合法主权。§M阿根廷§!为了确保对这些领土的主权，开始着手成立§W南极领地§!，并接管了一些无人管辖的前§x英属§!岛屿。§R智利§!抗议这一行为，并敦促§Q美利坚合众国§!干预两国谈判，帮助解决纠纷，同时智利也提出了自己对南极洲的宣称。事态就此迅速升温。"
