 paternalism_antarctic_administration_subtype:0 "南极洲事务局"
 paternalism_antarctic_administration_subtype_desc:0 "五十年代的南极争夺战后，南极大陆被分为数大相互竞争的事务局。智利与阿根廷政府的边界纠纷最终演变为要求OFN介入的国际事件。为了不被自由势力抢先，民族社会主义也在纳粹控制下的新施瓦本扬起高傲的头颅，准备推行纯粹的、极端的、雅利安种族主义色彩的殖民政策。最后，日本人也来了，无视了一切所谓合法性的伪装，武力夺取了一片南极洲的领域。\n\n虽然每个事务局都有各自的意识形态信仰，但辽阔荒芜之地的严酷生活与极少数的人口，使各政权的组织方式基本趋同，归于某种军事化管理之下。其中有日本那样的直接控制，也有OFN南极洲事务局那样，与民间伙伴合作的形式。\n\n在这样的层次结构下，数以千计的人们在冰冷的空气与寒风中劳作，证明他们在放逐者之地的存在价值。每个列强都极力从他们那点冰块中榨出点价值来，却被许多观察家讥笑为沉没成本谬误的终极案例：只要强权依然存在，其他人就不能松手，无论他们还要在上面损失多少物资、金钱和人力。然而，想让南极探险有利可图，那得是何等的运气……"
