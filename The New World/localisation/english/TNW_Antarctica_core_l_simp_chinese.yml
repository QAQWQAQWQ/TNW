 AAA_CountryInfo_Folder.102:0 "阿根廷属南极"
 AAA_CountryInfo_Content.5:0 "瓜分之前"
 AAA_CountryInfo_Content_desc.5:0 "§M阿根廷§!在§W南极洲§!的活动最早可以追溯到§Y20世纪§!初，当时阿根廷就在§W特里尼蒂半岛§!附近的岛屿上建立了气象站和观测站点。在§e第二次世界大战§!之前，§x英国§!、§M阿根廷§!、§R智利§!的南极宣称彼此重叠，但在战后，§x英国§!失去了在§W南极洲§!捍卫其宣称的能力。§M阿根廷§!开始渐渐强化自己的宣称，在§Y40年代§!末到§Y50年代§!初之间逐步建立了对前§x英属§!地区的掌控。这样的成功要归功于§M埃尔南·普哈托准将§!，他监督了§M圣马丁站§!和§M阿根廷南极研究所§!的建立。在此期间，由于与§R智利§!之间的重叠宣称，两国之间的外交乃至军事对抗日渐萌生，紧张局势于§Y1952年2月§!到达了顶点，§W南极洲§!上响起了有史以来的第一声枪响：一支§M阿根廷§!巡逻队向一群§R智利§!测量员开火了。"
 AAA_CountryInfo_Content.6:0 "领地建立"
 AAA_CountryInfo_Content_desc.6:0 "这一事件导致了外国势力介入§M阿根廷§!和§R智利§!之间的争议，§r德国§!支持遵循庇隆主义的§M阿根廷§!，§QOFN§!则呼吁和平。这一系列谈判直接导致了§Y1952年§!末肇始的§i瓜分南极洲§!，五大§W南极§!领地建立起来，成了这片大陆上的法律实体。随着§W南极洲§!被世界各国瓜分殆尽，§R智利§!和§M阿根廷§!之间的冲突有所降温，但二者之间的边境争议仍然存在。多边谈判曾在§Y1955年§!取得过少许进展，但§Y1956年1月§!，胡安·庇隆被逐出阿根廷，§r德国§!随即退出谈判，留下§QOFN§!唱独角戏。原本各国还计划于§Y1958年§!再一次召开会议，彻底解决南极争议，但在§e西俄战争§!面前，§r德国§!财政体系彻底崩溃，导致全球金融形势恶化，会议计划无果而终。"
 AAA_CountryInfo_Content.7:0 "斯尼佩岛之战"
 AAA_CountryInfo_Content_desc.7:0 "然而，§M阿根廷§!§W南极§!扩张主义的主要支持者§B阿根廷海军§!却因§QOFN§!主导的会议可能会使南极走向去军事化的前景而愤怒不已。§Y1958年6月§!，§B阿根廷海军§!入侵并占领了§W南极§!争议地区西部，以及§R比格尔海峡§!中的数个岛屿，这一事件被称为§e斯尼佩岛之战§!。尽管§M阿根廷§!政府官方否认这一事件与其有关，但担当调解人的§QOFN§!也退出了两个南美国家之间的谈判，留下§M阿根廷§!自己处理抢来的不义之财。"
 AAA_CountryInfo_Content.8:0 "脆弱的和平"
 AAA_CountryInfo_Content_desc.8:0 "随着§e斯尼佩岛之战§!硝烟散去，§B阿根廷海军§!仍在继续在其§W南极§!领地推行军事化，就像他们此前在§B火地岛§!做的一样。海军的企图则在某种程度上受到§M阿根廷南极研究所§!以及政府中庇隆主义分子余党的阻挠，其中就包括§M豪尔赫·埃德加·莱亚尔中校§!和§M普哈托准将§!。与此同时，§R智利§!也在试图收复其东部领地，但几乎没有任何成果；与之相对，§M阿根廷§!正不断收紧对这一地区的控制。当下，近来得到晋升的§M豪尔赫·埃德加·莱亚尔上校§!正担任§M阿根廷南极属地§!的领导人，他的西面是怀恨在心的§R智利人§!，东面则是局势不稳的§r德国领地§!。然而尽管如此，上校的目光已然转向§O南方§!，投向了§W南极点§!。"
