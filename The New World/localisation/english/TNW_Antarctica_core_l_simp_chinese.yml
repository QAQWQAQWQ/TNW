 Antarctica_econ_window_overlay_tt: "§F由于我们是§W南极领地§!，我们并没有掌控自己§G经济§!事务的权力。预算是由本国政府处理的，我们不需要征收§Y税款§!、管理§GGDP§!和§R债务§!、控制§G货币储备§!，以及操心其他经济活动。§!"
