 ODF_WIP_Country_tt:0 "§F这一领地的可玩内容将在§!§D《深冻行动》§!§F未来的更新中实装！以下是其预告：§!"
 ODF_WIP_Country_tt_AAA:0 "§F这一领地的可玩内容将在§!§D《深冻行动》§!§F未来的更新中实装！以下是其预告：§!\n\n§W阿根廷在南极的活动可以追溯到20世纪初，在那个南极探险还被人们当成是一种英雄故事进行传播的年代，南极外围的岛屿上就建起了数座小木屋。自同盟国在第二次世界大战中战败后，英国对南极的宣称就被放在国际舞台上供各国争夺，又过了几年之后，阿根廷试图将其收入囊中。他们还试图对几座小岛宣称主权，这些小岛上曾经建有现在已不存在的英国科考站。但问题是，这些岛屿位于智利对南极的宣称领土内。智利人发起了一场外交争端，美国人下场介入，瓜分南极洲就此开始。\n\n谈判结束后，除了最西部的一小块地区以外，阿根廷所宣称的所有南极土地都投入了他们的怀抱。在阿根廷对南极的主权得到保障之后，其政府向世界敞开了大门，允许各国以科学考察和研究的目的来到阿根廷南极属地，这种做法一直持续到今天。然而，该领地的日益军事化已经开始引起了一些观察家的关注。§!"
 ODF_WIP_Country_tt_AAB:0 "§F这一领地的可玩内容将在§!§D《深冻行动》§!§F未来的更新中实装！以下是其预告：§!\n\n§W祖先遗产学会南极分部是南极俱乐部的最新成员，它在由勃艮第骑士团国建立的，位于新施瓦本西部的一个小基地中活动。虽然官方层面上来说，它不是像南极大陆上的其他五个政权那样的所谓“南极领地”，但驻扎在南极洲的祖先遗产学会成员和党卫队们并不打算听从迈尔的命令。在学会终身主席沃尔弗拉姆·西弗斯的领导下，贝格尔海姆的科考队员们只听从希姆莱的命令。\n\n目前，祖先遗产学会中只有一部分人在做实地研究，他们的目标很简单：进行考察和实验，从科学上证明雅利安人种的优越性，并找寻到支持冰宇宙论的证据。西弗斯和他的手下希望他们能解开埋藏在南极冰层下的秘密，因为他和南极洲的其他党卫队成员知道，希姆莱不会允许他们空手返回勃艮第的。§!"
 ODF_WIP_Country_tt_AAG:0 "§F这一领地的可玩内容将在§!§D《深冻行动》§!§F未来的更新中实装！以下是其预告：§!\n\n§W德国发起的第三次南极探险在当时只是一个秘密的小项目，其内容包括进行一些象征性的研究，并在挪威南极领地的中心地带宣称一片边界模糊的领地所有权。随着第二次世界大战的爆发，对南极的探险和领土主张在很大程度上被忽视了，并慢慢陷入无人问津的境地。\n\n随着瓜分南极洲的开始，德国政府翻出了在1938年签署的关于南极的旧文件，并提出了对新施瓦本的领土要求。挪威专员辖区政府放弃了对南极的主权，随后德国政府将其并入了现在的行政管理机构中。作为从1938年探险幸存到现在的少数人之一，鲁道夫·迈尔应德国政府之邀离开了西南非专员辖区，来到了这最后一片未被人类文明纳入囊中的大陆上。§!"
 ODF_WIP_Country_tt_AAJ:0 "§F这一领地的可玩内容将在§!§D《深冻行动》§!§F未来的更新中实装！以下是其预告：§!\n\n§W为了在瓜分南极洲中夺得他们对白濑矗地（以前被称为玛丽·伯德地）的宣称领土，日本帝国派遣了一支由冢田俊吉领导的伞兵部队来确保对新领土的控制。日本领南极地域控制着该大陆最偏远的土地，尽管如此，它还是帮助帝国进一步加强了对太平洋的控制，并且打开了通往南美洲的大门。\n\n随着冢田俊吉的退休，此地区成为了衣笠骏雄指挥的第一空挺团训练场所的所在地，这支规模较小却训练有素的部队是南极大陆上的一支劲旅，他们时刻准备着维护乃至扩大日本帝国对该地区的霸权。§!"
 ODF_WIP_Country_tt_AAC:0 "§F这一领地的可玩内容将在§!§D《深冻行动》§!§F未来的更新中实装！以下是其预告：§!\n\n§W智利在南极的活动在20世纪初就开始了，当时他们在南设得兰群岛为海豹猎手和捕鲸者建起了一座小港口。对智利政府来说不幸的是，英国人比他们早几十年宣称了对该地区的主权。\n\n尽管在英国人提出领土要求之后三年阿根廷人才正式布告其对南极的主权，但由于关于前英国宣称领土的归属问题的谈判进行得十分之匆忙，瓜分南极洲以阿根廷人得到英国的大部分宣称领土而告终。而智利在斯尼佩岛之战后的损失就要大得多了，与阿根廷的争议领土全被对方收入囊中。智利南极领地的现任负责人胡利奥·埃斯库德罗·古斯曼在瓜分南极洲前后一直为实现智利的领土主张而奋斗，而他不打算在祖国对南极的宣称领土全部回归智利怀抱之前收手。§!"
 ODF_WIP_Country_tt_AAO:0 "§F这一领地的可玩内容将在§!§D《深冻行动》§!§F未来的更新中实装！以下是其预告：§!\n\n§W由澳大利亚，新西兰和前法国对南极的领土宣称共同组成的OFN南极洲事务局控制着将近半个南极大陆。这里是OFN在印度洋及其周边地区的重要基地，海岸上布满了小型军事设施和海军基地。随着麦克默多核电站的建成，OFN显然会继续扩大其在南极的存在。\n\n然而，与OFN的其他成员一样，南极洲管理局完全受美国军方支配，而澳大利亚和新西兰希望在不久的将来看到一些改变。§!"
