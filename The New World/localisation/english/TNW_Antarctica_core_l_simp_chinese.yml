 AAO_CountryInfo_Folder.102:0 "OFN南极洲事务局"
 AAO_CountryInfo_Content.5:0 "一切的起始"
 AAO_CountryInfo_Content_desc.5:0 "在§i瓜分南极§!之前，§e美国§!对§W南极§!的最后一次行动发生在§Y1940§!年，由§g理查德·伊夫林·伯德§!海军少将指挥的§D美国南极事务考察队§!负责实施。这也是§e美国§!对§W南极大陆§!的第三次探险。§g伯德§!为§e美国§!对这片极南大陆的探索立下了汗马功劳，他对南极的热情甚至让§g阿尔弗雷德·里彻§!也为之动容，后者邀请他参加§D德国第三次南极探险队§!，但由于紧张局势加剧，伯德谢绝了邀请。于§V第二次世界大战§!中落败后，§e美国§!忙着舔舐伤口，对§W南极§!的探索也无限期推迟了。所谓的§D“跳高行动”§!也在计划初期就宣告流产。"
 AAO_CountryInfo_Content.6:0 "深冻行动"
 AAO_CountryInfo_Content_desc.6:0 "在§M阿根廷§!与§R智利§!于§Y五十年代§!初爆发争端后，§e美国§!又提起了对§W南极§!的兴趣，§i瓜分南极§!也随之开始。在§r德国§!重拾他们对南极的领土宣称的同时，§e美国§!也作出了行动。§Q自由国家组织§!成员国将其宣称领土合并为§QOFN南极洲事务局§!，在§g伯德上将§!的指挥下，OFN立即向该地区派出了§o军事部队§!。这一计划被称为§Q“深冻行动”§!，是人类历史上规模最大的一次§W南极§!考察，OFN各国出动了一支庞大的§B海军舰队§!、一支§B空军特遣队§!，以及超过§B8000名人员§!。§e美国§!在§W麦克默多湾§!建立了一个永久基地，与此同时，§V日本§!占领了§W玛丽·伯德地§!，§r德国§!则回到了§r新施瓦本§!。§W冷战§!至此降临了§W南极大陆§!。"
 AAO_CountryInfo_Content.7:0 "南极洲事务局"
 AAO_CountryInfo_Content_desc.7:0 "在§g伯德上将§!于§Y1957§!年逝世后，§g小乔治·安德森上将§!被任命为新一任§Q南极开发指挥部§!负责人与§QOFN南极洲事务局§!局长。之后，这一职位在§Y1961§!年又被传递给了§g威廉·雷伯恩中将§!。然而，在此之后，事务局领地宣称的基石，§n澳大利亚§!和§M新西兰§!，试图在OFN南极洲事务局内扮演更重要的角色，§Q事务局§!内部的矛盾随之变得愈发尖锐。"
 AAA_CountryInfo_Folder.101:0 "南极洲"
 AAA_CountryInfo_Content.1:0 "在此之前……"
