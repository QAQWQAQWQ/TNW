l_simp_chinese:
 POLITICS_MIR_AHMAD_YAR_KHAN_DESC: "有人可能会说，俾路支土邦联盟，或者说卡拉特汗国，只不过是一群许久之前就理应被历史车轮碾碎的小小暴君统治的“国家”，他们正拼命地试图保住权力和宝贵的“传统”。然而，卡拉特的汗王与俾路支土邦联盟的领袖米尔·艾哈迈德·亚尔·汗只会对这种说法付之一笑，随后又我行我素地继续从前的生活。\n\n作为这片土地上的专制暴君，他用铁腕维持自己的统治。只有当部族间爆发符合他利益的暴力冲突的时候，他才会稍稍放下自己的权柄。至于这片土地上的其他封建王公，尽管他比他们的地位都要更高，但他只在外交政策方面有权指导他们。\n\n对他而言，巴基斯坦运动才是需要被摆到台面上解决的首要问题。有些人对他们的事业表示同情，但米尔·艾哈迈德·亚尔汗对这个问题的态度相当矛盾。虽然他无意与巴基斯坦运动为敌，但这位汗王认为，俾路支人的主权比所谓的南亚穆斯林民族国家的梦想要珍贵得多，更何况如果巴基斯坦之梦成真，他就需要与那些信德人和旁遮普人分享宝贵的权力。为此，他可能会竭力抵制其他王公将卡拉特并入巴基斯坦的企图。"
 KLT: "俾路支土邦联盟"
 KLT_DEF: "俾路支土邦联盟"
