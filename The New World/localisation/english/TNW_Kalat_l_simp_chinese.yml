 KLT_Mir_Ahmad_Yar_Khan: "米尔·艾哈迈德·亚尔·汗"
 KLT_Sher_Mohammed_Marri: "谢尔·穆罕默德·马里"
 KLT_Mir_Gul_Khan_Nasseer: "米尔·古尔汗·纳西尔"
 KLT_Khair_Bakhsh_Marri: "海尔·巴赫什·马里"
 KLT_Abdul_Wali: "阿卜杜勒·瓦利"
 KLT_sandemans_spectre: "桑德曼的幽灵"
 KLT_sandemans_spectre_desc: "英国殖民总督罗伯特·格罗夫斯·桑德曼的遗产至今仍显而易见，这位官僚因大力干涉俾路支斯坦事务而广为人知。在如今的俾路支土邦联盟，桑德曼制定的“部族平定”制度仍然是一项铁律：卡拉特王室向忠诚的部族提供补贴，而对不忠诚的部族施以暴行。\n\n从根本上讲，处于这种体制下的俾路支社会是建立在亲缘关系和派系斗争的基础上的。统治这片土地王公们竭力煽动部族间的暴力，以确保自己的王位不受觊觎。"
 KLT_not_a_nation_but_an_alliance: "无国无族"
 KLT_not_a_nation_but_an_alliance_desc: "俾路支土邦联盟并非一个传统意义上的国家，因为它没有任何形式的中央集权制度，卡拉特汗王也只有权独自处理外交政策事务。就通常的邦联或联邦国家而言，货币与国防等重要事务也都会由中央政府处理，但在俾路支斯坦，就连掌揽这些事务的权力也全数被下放给了俾路支土邦联盟的组成部分。\n\n事实上，俾路支土邦联盟不过是一个由诸多土邦结合而成的松散政体。他们在卡拉特汗王的领导下联合起来，为了自己的生存与旧传统和旧生活方式的存续而联合起来，无论这些旧的生活方式，例如奴隶制度有多么反动。这样的政体也显然缺乏任何形式的民主或问责制度，掌揽大权之人也不过是一群许久之前就理应被历史车轮碾碎的小暴君罢了。"
 KLT_despotism_1_party: "支尔格大会 - 巴基斯坦运动"
 KLT_despotism_1_party_long: "支尔格大会 - 巴基斯坦运动(Shahi Jirga - Pakistan Movement)"