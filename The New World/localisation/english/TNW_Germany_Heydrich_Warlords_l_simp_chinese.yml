 KHP_ultranationalism_party_long:0 "党卫队阿尔卑斯统帅部"
 HWL_Joachim_Peiper:0 "约阿希姆·派普"
 POLITICS_Joachim_Peiper_DESC:0 "吾之荣誉即忠诚，吾之使命即忠诚，吾之使命呼唤吾之血脉，吾之血脉呼唤全国领袖。\n\n希姆莱的核心圈子不是一般人能轻易融入的，但党卫队旅队领袖派普就做到了，这其中自然少不了他人的仔细审查和推举。在一战打得正火热的时候，派普出生在德意志帝国熊熊燃烧的心脏——柏林。派普很快就赢得了未来的党卫队全国领袖的喜爱，他非常欣赏这位年轻战士的雅利安人特质，因此把他转送到党卫队军校培训。在军校的大堂里，走出了“东方蹂躏者”，这个怪物在哈尔科夫指挥着“火炬营”，犯下了一项又一项的暴行，而伴随着德国战胜，“柏林野兽”只会更加肆无忌惮地挥起屠刀。\n\n随着德国走入主宰和成功的新时代，一些民族社会主义死忠开始赞扬派普是值得人们效法的对象，而派普也越发地沉溺于这些党卫队的神秘主义宣传。尽管如此，党卫队全国领袖还是紧紧攥着这位大红人，以其“尽职完成战斗和领导任务、为消灭堕落分子奉献、建设民族社会主义新时代”为由，大力提拔派普。就这样，这位战争名人开始了自己在党卫队勃艮第骑士团国的生涯，一切似乎都安稳无忧，派普相信事情都会进展顺利。\n\n但是，德国面临的危机却再严重不过了，派普的前盟友莱因哈德·海德里希公开谴责、反叛全国领袖。“柏林屠夫”像绞肉机一样粉碎那些反对全国领袖、逃往南方的人，苦涩、刺骨的奥地利冬日似乎越来越寒冷了……"
 KHP_bloodstained_legacy:0 "血染的遗产"
 KHP_bloodstained_legacy_desc:0 "即便在党卫队内部，派普也是臭名昭著的铁石心肠，经常下令屠杀平民和战俘。国防军残部和平民都对他又怕又恨，如果形势恶化，派普的下场可想而知。"
 KHP_eagles_nest:0 "鹰之巢穴"
 KHP_eagles_nest_desc:0 "派普的战斗群盘踞在奥地利阿尔卑斯山，这里易守难攻。派普专精于指挥装甲兵和步兵，如果爆发战斗，这样的地形对他的部队并不会构成任何阻碍。"
 KSS_ultranationalism_party:0 "波森党卫队指挥部 - 勃艮第派"
 KSS_ultranationalism_party_long:0 "波森党卫队指挥部 - 勃艮第派"
 KSS_national_socialism_party:0 "波森党卫队指挥部 - 忠诚派"
 KSS_national_socialism_party_long:0 "波森党卫队指挥部 - 忠诚派"
 HWL_Herbert_Otto_Gille:0 "赫伯特·奥托·吉勒"
 POLITICS_Herbert_Otto_Gillie_DESC:0 "The Brother Generals have stabbed each other in the back, and the middle brother rises from the pile, standing with his men to save what remains of the Reich.\n\nHerbert Otto Gille fought through the muddy trenches and drank the ersatz coffee of World War One, and he commanded his Baltic volunteers with pride as they tore through the Russians in World War Two, and he fought the battles of the German Civil War- but he has never seen Germany fall so low as it has. He and his Brother Generals- Paul Hausser and Sylvester Stadler- each took the stunning revelation of Himmler's plot differently. Hausser refused to believe it, Stadler quietly distanced himself from the Reichsführer, and Gille bought every word of it. Such a disagreement could only end poorly, but Gille was skilled enough to find himself ruler of what remains of his divisions- with Hausser dead and Stadler gone, nobody else is left to challenge him from within.\n\nThe task now turns to stopping and defeating Himmler and his lunatics- before they can follow through on their plans. Gille's men- the brave soldiers of the 19th Waffen Grenadiers- stand ready to aid Heydrich and his allies. The tide must be turned, the Reich retaken, and the Aryan paradise restored- and each and every soldier in the division knows what happens if they fail.\n\nThere can be- will be- no retreat, no weakness, no surrender. Gille and his men will end Himmler's mad schemes or die in the process."
 HWL_Sylvester_Stadler:0 "西尔维斯特·斯塔德勒"
 POLITICS_Sylvester_Stadler_DESC:0 "In the chaos of the Brother's struggle, the youngest now stands alone on top of the heap- and he and his men want nothing more than to leave it.\n\nUnlike his friends, Paul Hausser and Herbert Otto Gille, Stadler never fought in the First World War- he was only born in 1910. His relative youth did not stop him from joining the SS early, however, joining in 1933. From there, his rise only continued- soon, he was commanding regiments, then divisions, emerging from the War with an Iron Cross and a new rank as Commander of the \"Hunyadi\" 25th Waffen Grenadier Division- a division made up of Hungarian Nazis, proud to serve their Führer and the Reich.\n\nStadler has stayed in his post since, but the Reich around him has changed- and not for the better. He, like nearly all other SS higher-ups, stood with Himmler during the West Russian War- and suffered the consequences. Ever since, he worked to aid Heydrich's efforts, helping set the groundwork for his Führership. When the Bürgerkrieg began, Stadler was swift to bring his forces to bear against the others, and stood proudly with his brothers in victory- a short lived one, for then came Heydrich's accusations, and soon after came the split. Stadler himself doesn't quite know what to make of it, but the possibility of the rumors being true tilts him towards Heydrich's side- a position not shared by his Brother Generals.\n\nStadler stands at the head of the Kommandostab now, but his drive to fight has left him- a position shared by his men, who similarly lost that spark that drove them all those years ago. Stadler's main focus now is to move his men back to their homeland, Hungary- and go with them. What happens in Germany behind him is not his concern, though he'll certainly do what he can to get his lands in the right hands. All in all, Stadler stands not as the purist or hardliner he once was, but as a man weary of seeing his men fall before him, wishing for nothing more than the quiet luxury of retirement."
 HWL_Paul_Hausser:0 "保罗·豪塞尔"
 POLITICS_Paul_Hausser_DESC:0 "Surrounded by foes he once called friends, Paul Hausser emerges victorious from the Brother's struggle- and he now moves to end Heydrich's petty rebellion.\n\nPaul Hausser is a veteran of both World Wars, fighting in the trenches in the First and leading various Panzer Corps through France and Russia in the Second. He proudly displays his Iron Cross from those times, now leading the Wiking 5th Panzer Division- a division made primarily of hardline Scandinavian National Socialists. One of the SS officials to avoid purging in the wake of Himmler's failed coup, Hausser continued to bide his time among his allies in the SS, aiding Heydrich's maneuvers where he could and readying his men for the conflict to come.\n\nWith Heydrich victorious, Hausser thought his work was finished- and his men did too. Unfortunately, fate has played a cruel joke on the Reich, and Heydrich- in a feat of supreme lunacy and cowardice- has denounced Himmler on the basis of insane allegations, splitting Germany once more. Hausser and his men proudly stood in favor of the Reichsführer- and were stunned when their brothers, led by Herbert Otto Gille and Sylvester Stadler, refused to stand with them. Things only deteriorated from there.\n\nAt the end of the struggle, Hausser finds himself victorious-but at a steep cost, with his Brother Generals and their forces dead or fleeing. As tragic as this turn is, Hausser knows there's only one man to blame- Heydrich, that snivelling, traitorous worm. This foolish split has cost Hausser much, and the Oberst-Gruppenführer knows how to fix it- with his men, proudly standing with their loyal, true brothers in Germania, ending this treachery once and for all."
 KSS_shell_of_a_bread_basket_HH:0 "蚀空的粮仓"
 KSS_shell_of_a_bread_basket_HH_desc:0 "1939年便并入德国的波兰沃土，很快就引来了定居的德国农民，其潜力也得以充分开发。该地区迅速成为了大日耳曼国的粮仓。\n\n但连年的内战却让农民四散奔逃，田野被迫抛荒。毕竟小规模冲突、轰炸、炮击和蓄意纵火越发可能在丰收前就摧毁作物。德国的东方粮仓只余一层空壳，但土地的潜力犹在，假以适当的开发，粮仓尚能有填满的一日。"
 KSS_shell_of_a_bread_basket_RH:0 "蚀空的粮仓"
 KSS_shell_of_a_bread_basket_RH_desc:0 "1939年便并入德国的波兰沃土，很快就引来了定居的德国农民，其潜力也得以充分开发。该地区迅速成为了大日耳曼国的粮仓。\n\n但连年的内战却让农民四散奔逃，田野被迫抛荒。毕竟小规模冲突、轰炸、炮击和蓄意纵火越发可能在丰收前就摧毁作物。德国的东方粮仓只余一层空壳，但土地的潜力犹在，假以适当的开发，粮仓尚能有填满的一日。"
 KSS_posens_railway_HH:0 "波森铁路枢纽"
 KSS_posens_railway_HH_desc:0 "波森有一个大型铁路枢纽，这是连接大德意志及其东部属地的铁路运输中心。虽然自内战结束后，来自东方的火车已基本停止，但这座城市仍然是关键的铁路枢纽，为武装党卫队的属地与熊熊燃烧的德国提供着运输的便利。谁控制波森，谁就掌握利益。"
 KSS_posens_railway_RH:0 "波森铁路枢纽"
 KSS_posens_railway_RH_desc:0 "波森有一个大型铁路枢纽，这是连接大德意志及其东部属地的铁路运输中心。虽然自内战结束后，来自东方的火车已基本停止，但这座城市仍然是关键的铁路枢纽，为武装党卫队的属地与熊熊燃烧的德国提供着运输的便利。谁控制波森，谁就掌握利益。"
 KSS_the_black_white_and_red:0 "黑、白、红"
 KSS_the_black_white_and_red_desc:0 "虽然名为“武装党卫队指挥部”，但它麾下并非仅有武装党卫队士兵。数目繁多的德意志党卫队和勃艮第党卫队也在司令部安了家，虽然每一派都向司令部领导人宣誓效忠，但流言说他们仅仅是在蛰伏其中，时机一到，便会决出一个登上武装党卫队等级体系顶端的胜利者。\n\n军衔不同，指挥部的普通武装党卫队士兵自然也难以相容，他们分别投靠了权斗中的两方。虽然大多数人对德国元首略有些好感，但是南齐锡的武装党卫队全国领袖的领导层只需用力一扯，便可以扭转手下的信仰，使他们化为忠诚的希姆莱信徒。当然，提高薪水也是必不可少的。"
 LHH_national_socialism_party:0 "党卫队第1装甲师“海因里希·希姆莱亲卫旗队”"
 LHH_national_socialism_party_long:0 "党卫队第1装甲师“海因里希·希姆莱亲卫旗队”(1. SS-Panzer Division Leibstandarte Heinrich Himmler)"
 LHH_ultranationalism_party:0 "党卫队第1装甲师“海因里希·希姆莱亲卫旗队”"
 LHH_ultranationalism_party_long:0 "党卫队第1装甲师“海因里希·希姆莱亲卫旗队”(1. SS-Panzer Division Leibstandarte Heinrich Himmler)"
 HWL_Wilhelm_Mohnke:0 "威廉·蒙克"
 POLITICS_Wilhelm_Mohnke_DESC:0 "昂首挺立，保持强大。昂首挺立，保持强大。除此之外皆为软弱，绝无退缩。绝无软弱。\n\n奉献、坚持，或者在某些人看来，顽固不化。这就是党卫队上级集团领袖威廉·蒙克的人生信条。蒙克生于蓝领家庭，22岁时便投身于纳粹党与党卫队。蒙克的军事生涯将让他因多起屠杀战俘而受国际指控，永远处于进退两难的境地。这些惨绝人寰的罪行不过是蒙克生涯的巅峰之一。在南斯拉夫作战时，一次大型空袭轰炸了他的部队。迫使医生无视军官的命令，决定尽早让蒙克解脱，截掉了他的腿。蒙克的奉献精神、拒绝让步的行事风格与对工作的顽固态度让他对自己残疾的事实愤怒不已。不过，形势的转变让他深入柏林，带领着希特勒青年团与许多组织，在新落成的日耳曼尼亚为德国的胜利喝彩，为德国民众欢呼。\n\n但在战后，真正控制着蒙克的人却是党卫队全国领袖。希姆莱将蒙克在青年人中的人望与不屈精神看作资本，他也因与党卫队全国领袖站在统一战线，而成为50年代未遂政变企图中最出名的参与者。而正是党卫队全国领袖的影响，让蒙克在骑士团国寻得了活计，出任党卫队海因里希·希姆莱亲卫旗队的指挥官，尽其审慎的举止、彻底的调查与绝不屈服的态度……\n\n然而，在党卫队全国领袖眼里，利用这位党卫队上级集团领袖……来守护他生命的时刻，到了。在海德里希与蒙克之主争斗之时，许多德国人继续向西逃去，逃到伊比利亚或是其他地方，逃离笼罩德国的混乱。不过，蒙克将成为屏障，作为边境卫兵，化作抵御难民潮的高墙。毕竟，就他看来，刺客可以伪装成一位拄着拐杖的老人，也可以是那带着三个孩子的母亲……"
 LHH_shield_of_the_ordensstaat:0 "骑士团国之盾"
 LHH_shield_of_the_ordensstaat_desc:0 "海因里希·希姆莱亲卫旗队由党卫队最精锐且最忠诚之人组成，这支部队已经直接控制了当地主要城市与通往希姆莱行动基地的通道。亲卫旗队把莱茵河西岸打造成了牢不可破的工事网，这正是他们多年来正在准备的，毫无准备地撞上去就是送死而已。"
 LHH_shield_of_the_ordensstaat_tt:0 "§R为了保护党卫队全国领袖，他们誓要战斗到最后。§!"
 OKL_despotism_party:0 "德国空军最高统帅部残部"
 OKL_despotism_party_long:0 "德国空军最高统帅部残部(Oberkommando der Luftwaffe Remnants)"
 OKL_national_socialism_party:0 "纳粹党"
 OKL_national_socialism_party_long:0 "民族社会主义德意志工人党(Nationalsozialistische Deutsche Arbeiterpartei)"
 HWL_Johannes_Steinhoff:0 "约翰内斯·施坦因霍夫"
 POLITICS_JOHANNES_STEINHOFF_DESC:0 "约翰内斯·施坦因霍夫是二战中战绩最优秀的德国空军飞行员之一，他参与了海狮行动期间对英国的作战，之后他被调往东线，直至战事结束。战争结束后不久，他便因辉煌的空战履历而被选为新研发的梅塞施密特Me262喷气式战斗机的试飞员。尽管他在空中表现出色，但一次地面事故导致他的Me262燃油箱爆炸起火，机上的弹药也发生爆炸。施坦因霍夫勉强从燃烧的飞机中爬出，侥幸生还，但他的脸已经面目全非。住院几年并接受整容手术之后，他于四十年代末重新加入德国空军，担任军官与教官。\n\n到1962年，施坦因霍夫晋升中将，成为空军的实权人物。任职期间，他强调飞行员训练，使得空军事故率显著下降。由于戈林一直是空军的最高指挥官，施坦因霍夫在内战期间投身戈林阵营；众所周知，戈林竞争元首大位的企图终遭挫败，这于他而言并非幸事，但也让他成为战争结束后硕果仅存的几位空军高官之一。随着权力斗争的继续，他和残存的空军部队被困在雷根斯堡一带，周围尽是凶残嗜血的党卫队军阀。由于燃料和补给有限，当地的空军基地早已运转到了极限，执行空中任务只是出于保护自身领土的必要。他们唯一希望的就是活下来。"
 OKL_bingo_on_fuel:0 "最低限度油量"
 OKL_bingo_on_fuel_desc:0 "雷根斯堡曾显赫一时的梅塞施密特工厂和炼油设备在内战中损毁殆尽，而党卫队在夺取德国的征途中，对修复这些废墟毫无兴趣。现在，雷根斯堡的机场挤满了各式各样的飞机，但却急缺燃料和补给，这让他们只能守卫自己的一小块领地。"
 OKL_horten_brothers:0 "霍顿兄弟"
 OKL_horten_brothers_desc:0 "瓦尔特·霍顿和赖马尔·霍顿，也即“霍顿兄弟”，是德国空军军官兼飞机设计师，因参与开发过德国Ho226式飞机的核心工作而闻名。值此危急存亡之际，两兄弟飞到了雷根斯堡，他们要尽可能确保德国空军的存续。"
 AUS_national_socialism_party:0 "东疆党卫队总委会(SS-Generalkommission Ostmark)"
 AUS_national_socialism_party_long:0 "东疆党卫队总委会(SS-Generalkommission Ostmark)"
 AUS_fascism_party:0 "东疆集团军最高统帅部"
 AUS_fascism_party_long:0 "东疆集团军最高统帅部(Armeeoberkommando Ostmark)"
 HWL_Otto_Skorzeny:0 "奥托·斯科尔兹内"
 POLITICS_Otto_Skorzeny_DESC:0 "我们的战果都胜之不武，不是吗？带来胜利的既非我们心中的勇气，又非我们眼中的烈火。而是我们的乐于去做他人不屑于做的事情，我们敢于涉足他人不愿涉足的领域。\n\n奥托·斯科尔兹内其名在半个世界燃起了钦佩与赞美的火焰，同时也在另外半个世界深植仇恨与愤怒的种子。出生在奥地利首都维也纳的斯科尔兹内生来具备炽热的心肠与狡诈的头脑，而他与人击剑决斗的经历则给他留下了引人注目的伤疤。然而，他的战斗并没有就此结束，党卫队将他塑造为德国特战部队的主要领导者，斯科尔兹内对刺杀和政变这类事情了如指掌，而他也将恐怖作为德国胜利黎明的重要装点。\n\n当德国在世界范围内的势力衰弱后，斯科尔兹内发现自己幸运地得到了党卫队全国领袖的赏识。随着时间的流逝，一切似乎都变得顺理成章，斯科尔兹内将自己的非常规作战能力发挥到极致，将德国的影响力渗透到世界的每一个角落。然而就在他骄傲自满之时，阴云正在逐渐笼罩，他无法察觉的力量正在暗影之中酝酿着风暴，咆哮着的战雷正在逐渐逼近。\n\n现在，德国四分五裂，从各方面来看都丧失了控制力。上级突击队大队领袖发现自己回到了家乡，管理着一个新的党卫队政府，被迫目睹着一个北边的不洁屠夫和另一个南边的疯子自相残杀。这位东疆山地部队新领袖脑中只萦绕着一个问题——\n\n如果两边都是面目可憎的衣冠禽兽，一个人该选择站在哪一边？"
 AUS_sskommandotruppe_rapier:0 "党卫队突击部队利剑"
 AUS_sskommandotruppe_rapier_desc:0 "在过去二十年间，斯科尔兹内亲自指挥的精锐突击队，他们始终与自己的指挥官并肩作战，也始终效忠于斯科尔兹内。这支部队是斯科尔兹内带到维也纳的唯一一支部队，他也不想带更多人了。"
 AUS_weary_of_fuhrers:0 "厌倦“元首”之争"
 AUS_weary_of_fuhrers_desc:0 "斯科尔兹内一向对海德里希保持警惕，但他也从未被希姆莱信任，他因此希望让自己和部下远离他眼中这一为争夺国家控制权而爆发的权力斗争。他选择将自己的人马安置在他的故乡维也纳，掌控着奥地利的地方军队和他自己的部队，等待这一权力斗争的各家分出胜负。"
 AUS_weary_of_fuhrers_tt:0 "斯科尔兹内不作为、等待权力斗争结束的决定将产生一些后果。"
 AUS_unpurged_heer:0 "不清洗陆军"
 AUS_unpurged_heer_desc:0 "无论出于什么原因，斯科尔兹内拒绝执行清洗己方控制区部队的命令。而这些部队与他麾下的党卫队部队一同被部署在边界地带。当这一举措允许斯科尔兹内拥兵自重的同时，也使得他的部下对帝国以及斯科尔兹内的忠诚产生质疑。"
