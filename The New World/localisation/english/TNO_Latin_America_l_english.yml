LATAM_south_atlantic_war.0.a: "brazil vs argentina only"
LATAM_south_atlantic_war.0.b: "brazil vs argentina + paraguay + santa cruz"
LATAM_south_atlantic_war.0.c: "brazil + uruguay + bolivia vs argentina + paraguay + santa cruz"
LATAM_south_atlantic_war.0.e: "brazil + chile vs argentina + bolivia + paraguay + santa cruz"

LATAM_south_atlantic_war.9.t: "Their Man Had Sold The World"
LATAM_south_atlantic_war.9.desc: "The suit felt too tight on Miguel's heaving chest. The paper was still in his hands, pulled close. Orders from the boss faxed over on double time. Passed from hand to hand to hand, at last reaching him. He had called an emergency meeting, and the top brass of the facility were coming on over. Yet it still felt like it wasn't fast enough.\n\nMiguel dropped the papers on the table in front of the team. They were divided up into their little factions; the tense scientists, the exhausted military brass, and the weary administrators. "Men, I have received word from the President that we are to make a pre-emptive nuclear strike on Argentina. It will start with the weaponry in our silo. We will hit a key northwestern military target-"\n\nThat was as much as he could say before he was drowned out by his audience's squabbling. The military men were cheering, waving at him to get on with the attack as soon as possible. The scientists looked horrified, and were begging him to ask the President if he was certain, since retaliation was likely. Miguel felt utterly overwhelmed.\n\nAn older man amongst the administrators heaved his body up, and motioned with his right hand upwards. The room went silent. "Listen, friends. It's an ugly order. However, we have to admit that the Argentinians will probably send their missiles at us sometime soon, even if we do not. Striking first might give us the advantage we need to win." He then slumped back into his chair."
LATAM_south_atlantic_war.9.a: "How does he make insanity sound so reasonable?"

LATAM_south_atlantic_war.10.t: "They'll Eat Crow Someday"
LATAM_south_atlantic_war.10.desc: "[BRA.GetLeader] shuffled through [BRA.GetLeader.GetHerHim] notes, making sure [BRA.GetLeader.GetSheHe] had everything in order. This announcement needed to be perfect—- the right mix of honest and inspiring. After giving the signal to the crew, the cameraman counted [BRA.GetLeader.GetHerHim] down. Three, two, one. The camera flickered to life. Across the nation, various telenovelas and radio dramas were stopped to deliver this emergency announcement.\n\n"Citizens of Brazil." [BRA.GetLeader.GetSheHeCap] began. "This is your President speaking. I apologize for interrupting your daily activities. About two days ago, I received word that Argentina has used nuclear weapons against us." [BRA.GetLeader.GetSheHeCap] paused. "The rumors are indeed true. They have hit several military targets, and for now have avoided civilian population zones."\n\nThe President put down [BRA.GetLeader.GetHerHis] notes, and stared directly at the camera. "These barbaric actions represent the cowardice of the Argentinian government. It isn't enough for them to unjustly assault our great nation, but they also have stooped to downright criminal behavior." Briefly caught up in a moment of anger, the President again paused to collect [BRA.GetLeader.GetHerselfHimself].\n\n"However, this is only a minor setback. They act so corruptly since they are on the ropes. They see the writing on the wall- our inevitable victory- and so, like a cornered animal, they lash out with no moral compunction. This will not stand. As President, I have already given the orders to our military to...""
LATAM_south_atlantic_war.10.a: ""...utilize our nuclear arsenal to wipe out several military bases across Argentina.""

LATAM_south_atlantic_war.11.t: "Causation"
LATAM_south_atlantic_war.11.desc: "The speech was given on a painfully dull day. Even the sun itself seemed mediocre as it peppered the president with its rays. Just like the weather, [Root.GetLeader] was going through the motions, reading off a rigid script interspersed with hints of their personality for the sake of not appearing robotic.\n\nHearing someone approach, the president turned from the podium, lending an ear to an aide and treating it as a little break for the throat. In reality, there wasn't going to be a break—not for a while. A whisper. An exchange of bloodshot eyes. And the world changed.\n\nNuclear. It was not the type of word that should have had anything to do with politics, and yet it did. Argentina had retaliated on key targets (thankfully non-civilian) in response to their own pre-emptive strike. Maybe it should have been expected, yet the news still hit like a heart attack: deep and visceral.\n\nFor a while, they stood with their shoulders hanging low and a tightness in their chest. But before the crowd could begin to suspect anything, they straightened their back, put on a stern, friendly face, and continued, for what else could they do? To an average attendee, the only noticeable difference was [Root.GetLeader]'s whitening knuckles.\n\nThe last line of their speech also seemed more deliberate — more ominous — than the rest. "Because no matter what may come, Brazil and her people will persevere. We will. We really will.""
LATAM_south_atlantic_war.11.a: "Empty words."

LATAM_south_atlantic_war.13.t: "Both Sides"
LATAM_south_atlantic_war.13.desc: "Carlos Lacerda coughed, rubbing his dry eyes. The air inside the war room was thick with sweat and cigarette smoke. Somewhere in an unseen corner, a teletype machine shrieked, printing out another report from the intelligence agency. One of the generals flanking the president snatched the report, glanced over it once, then groaned, dropping the paper onto the pile.\n\nAs expected, they knew neither the cause nor the effect. Some claimed Argentine forces had crossed the border. Others swore it was a Brazilian patrol that had fired first. But did it even really matter? Blood had been spilled in South America. More blood would surely follow.\n\nLacerda pinched his nose, sinking back into his chair. He knew what needed to be done. The people of Brazil would not tolerate a leader who hesitated. He would win. He would lay out his conditions — fair and in accordance with international law. He would win and his nation would heal. It was as simple as that.\n\nLeaning forward, Lacerda looked over operational maps prepared by his predecessors. There, the finger of a brigadier traced old, faded lines. Small metal figurines cluttered the board. They were nudged and poked by the entourage as the situation developed."
LATAM_south_atlantic_war.13.a: "Does anyone know why they're killing each other out there?"

LATAM_south_atlantic_war.14.t: "A Puppet's War"
LATAM_south_atlantic_war.14.desc: "War. The word kept bouncing around in Lacerda's skull. Brazil was going to war, not in distant Africa or the jungles of Colombia, not somewhere far away and at a safe distance, but right on its doorstep. The generals told him that the Argentinians shot first, shoved a speech in his hands, and locked him out of the war room while Golbery and other military men of all kinds were let in. He wanted to feel indignant and lash out, but nothing could overcome the numbness gripping him.\n\nDid the Argentinians really shoot first? He didn't know. He didn't have a goddamn clue what 'his' military staff was up to, he wasn't even allowed to learn about their fucking plan to win. For all he knew, they had been planning to start this shitfest for years, made this speech in advance, and just having the time of their lives while he was on the verge of a god damn panic attack.\n\nWell, he at least hoped that the speech wasn't pre-planned, because if this was the best they could do with time in advance, then they were really in trouble. It was so bad that he was toying with the idea of tossing it out and making up one of his own live on the radio, damn the consequences, but his shoulders remained slumped in defeat. What good would it have done, anyways? One final thought haunted him as he slowly marched away from the war room.\n\nWhat if this wasn't something pre-planned, or prepared for? What if the generals were as shocked as he was, and unready? Swallowing his fears, he could only hope they were victorious, and that this nightmare would end soon."
LATAM_south_atlantic_war.14.a: "God help us all."

LATAM_south_atlantic_war.15.t: "Inheritance of a Furrowed Brow"
LATAM_south_atlantic_war.15.desc: "Aleixo had just finished his speech to the people of Brazil by the time he had made it to the war room, witnessing sights that made his heart jump into his throat then straight back down into his belly all along the way. One would think the government building in Brasília was literally burning down around them for how frantically people ran up and down it, making the circumstances of the hastily assembled war cabinet that much more pressing; If the crisis got any worse, the fires would reach much farther than the municipal buildings.\n\nEven now, no one knew who fired the first shots. What was known to just about everyone was the chaos down south, a transformative moment in Brazil's history unfolding in real time; The Argentinians were on the march, the Southern Cone along the Rio Grande do Sul in sheer terror, yet the men of the Brazilian Army were holding strong.\n\nThat status quo was not going to hold, everyone knew it and knew it was prone to change in short order.\n\nGetúlio Vargas Jr. stood at the foot of the conference table, the generals, brigaders and admirals flanking him with Pedro Aleixo and Laudo Natel at his side. As the Governor of São Paulo stood gesticulating and barking commands with the vigor his family name was most famous for, Aleixo felt dwarfed by the scale of the conflict erupting before them; Military stratagems and battleplan maps lined the length of the table, running from one end to the other with battle lines and priority military targets drawn in marker across what used to be a South America at peace.\n\nInevitably, the legacy of the late elder Getúlio Vargas hung over the members of the war council like a ghost, none more so then his name sake. As vilified as he was venerated, every man in the room heard the voice of the late dictator behind his son's directive. As much as the younger Vargas took center stage, Aleixo could feel the occasional eye on him as he stood by him; If the war effort went south in some way, it stood to reason that somebody in the Capital had to take the fall for it.\n\nAleixo could only hope and pray his country could weather the crisis..."
LATAM_south_atlantic_war.15.a: "...if for no other reason than he was to be skinned should misfortune favor them."

LATAM_south_atlantic_war.16.t: "From Middlesex and Back Again"
LATAM_south_atlantic_war.16.desc: "The distant rumble of an AC-130 could be heard through the ceiling of a government building in Brasília, which at times seemed to shake from the commotion enveloping it; From the basement to the top floor, anyone and everyone was seen rushing back and forth in an borderline futile attempt to keep track of the crisis as it developed. It was a sight incredibly, gut-wrenchingly familiar to Henrique Teixeria Lott and it was not one he wanted to have to live through again.\n\nOver and over and over, Lott was transported backwards in time, to the pestilential nightmare of the Second World War and the ill-fated Allied Campaign at Sealion; Every second of it, around every corner of it, was tragedy written in setting up defensive lines, watching them collapse and then pulling back. They had marched backwards from the enemy landings at Dover all the way to Lancaster by the Irish Sea, all of it with the Luftwaffe bearing down on their heads, all in a desperate bid to fend off the German advance as long as they could, anything what little ammo they had left could buy them; A day, half a day, an hour.\n\nNow, Brazil's darkest hour had come once again. Worse still, they didn't even know how; Even hours afterwards, they were still trying to decipher who had opened fire first. The news was just as uncertain as the leadership was, with Argentina saying Brazil, Brazil saying Argentina and on and on it went. The military was holding the line best they could, but the Argentinians were out for blood and that situation could flip on a dime.\n\nTo Lott, the sight of military maps along the war table was most appalling. Scratchy marker pens had circled strategic interests along the Southern Cone, from Asunción to Uruguay and everywhere in between. Indignity and anger built within him, part of him felt sick with disgust; This is what they had come to? Fighting and dying against Mussolini and Hitler only turn on each other in a generation?\n\nFor decades now, Lott had tried to reorient himself in the image of an austere statesman, many years and many more miles removed from the general in the trenches of British Midlands. The Argentinians' arrogance had ended that; It was indeed a long way from Tipperary, yet the Marshall of the Smoking Snakes had returned. He was no longer in a stranger's land, but on the doorstep of the home he swore to protect.\n\nHe stood before the table, eying the maps: Britain suffers daily from the Nazi yoke, Brazil will not suffer a single second from their imitators."
LATAM_south_atlantic_war.16.a: "He fumed as he summoned the war council, straightening his uniform."

LATAM_south_atlantic_war.17.t: "A Moment of Truth in A Crowded Hour"
LATAM_south_atlantic_war.17.desc: "In the high halls of a government building in Brasília, the mood was as dire as anything she'd experienced; Where the desk-bound busywork of government officials and office clerks once bussed around like worker ants, men of all stripes rushed down hallways in either direction, all with a grim uncertainty look in their eyes that looked to have plastered there for hours. Edna Lott was not feeling that much better herself, though she made a brave effort not to show it.\n\nOf course, some in the military blamed her for the crisis as well, speaking of things that went unsaid; Whether it was Brazil or Argentina who had fired first was still not known yet, even as the Argentine Army was bearing down on the Southern Cone. Edna did not have to be told that she was not welcome here by a number of the men here, the steely look behind every other face on the war council said all they needed to say.\n\nEdna felt fiercely that the military was withholding secrets from her, but those inquiries needed to be made on her own time with her own people. The war map on the center table required her attention for the duration, a litany of lines and numbers to make one's head spin. This was, indeed, well out of the comfort zone of someone in a civilian leadership role, but it was far from alien to her.\n\nThe men of the war council daring to underestimate the daughter of the field marshall was but one obvious mistake belying a second, more personally satisfying one for Edna Lott; Just as well as proving herself her father's daughter, she was determined for the crisis to be the defining example to prove herself as by no means weak or incompetent, as was so often the sum of her biology in the eyes of the world.\n\nA Lott, a Woman and a defiant Brazilian. A looming war, an enemy at the gates and a war to determine the fate of South America for the rest of time. One could not ask for a crisis more opportune to chart her own legacy in the history of her country. This was a trial unlike any other, one that she would not cower from no matter the consequences. The uniformed men of the military stood at attention, waiting for the president's order for the war council to convene.\n\nThe daughter summoned the voice of the father, but the words were all her own: "We need a peace solution above all else, but Buenos Aires won't listen without a bloody lip...that honor falls on all of you to deliver...""
LATAM_south_atlantic_war.17.a: ""...Shall we proceed?""

LATAM_south_atlantic_war.18.t: "This Isn't My Dream"
LATAM_south_atlantic_war.18.desc: ""It's official" spoke an aide, his face grim. He was just barely old enough to avoid immediate conscription. "The Argentinian military has fired on us. We are at war."\n\nHis hands clasped, Virgílio Távora simply nodded. "I see. Do we know where our current troops are located?"\n\n"We should already have them compiled elsewhere, but I'll see if there are any updates." the aide responded, turning around for a brief moment. "Do you need any further additions to your schedule?"\n\nTávora silently kicked himself as he struggled to recall the aide's name. "Make sure to schedule a conference with the high command of the military at 16:00, then a press conference two hours later. "Once you're done, make sure to stand gu-" Távora knew that wasn't enough. "No, actually. I'm sure you have family, sir, spend the rest of the day with them."\n\nThe aide thanked him, closing the door before rushing off. It took only a second for Távora's true emotions to be let out. His chair tipped backwards, Távora raged, swearing as he threw his table over. Lacerda had been a deranged, imbalance loon all these years, his slavish loyalty to America dragging him into further conflict with Argentina. But Távora was the moderating force! He could still save this, he was certain. He found a paper that had landed beneath his knees, a pencil that had rolled down just next to him, t-n\nHe couldn't even get out a whole word before the pencil buckled, its lead rolling from the back end of the table onto the floor. Távora laughed, but only in a way empty of all joy. It was clear now. Any hopes of peace had been long since quashed, and any attempts to negotiate with Argentina would collapse underneath him. Perhaps he could still negotiate later, but it was clear that peace had crumpled around him."
LATAM_south_atlantic_war.18.a: "No use crying over spilt milk anymore."

LATAM_south_atlantic_war.19.t: "Regular Homicide"
LATAM_south_atlantic_war.19.desc: ""...Will be fierce, but if we remain safe, and strongly behind our soldiers, I know that Brazil will stand tall." said Adhemar, his normal extravagance replaced with a fierce demeanour only loosely disguised by the sheet of paper in front of him. "O Freedom, our chest defieth death itself!"\n\nAs the cameras shut off, dragged away by a series of reporters, Adhemar's expression collapsed, his body slumping forwards. As he hobbled out of his office, he struggled his way through a crowd of reporters, their questions melting together. Was Brazil going to win this war, his loyalists asked. How could he languish on preparing an offensive for so long, his sceptics asked. Was he fit to serve, his opponents asked. He answered them all with silence.\n\nHe couldn't even take a moment to breathe once finally in his car, peppered externally by rain, and internally by updates on the frontlines. "Mr. President, sir."  asked the man next to him, taking a telephone away from his ear. "Edna Lott just called. She's written a lengthy defence of your actions, and asked if she could publish it."\n\nLooking to his right, Adhemar chuckled. "Do you think that, if we gave them the world, Argentina really would have agreed to a detente?"\n\nA general in front of him, hear casting his head in a black shawl, shook his head. "We'll have our peace when our tanks roll through Ushuaia. It's not our place to care about those things now." He raised his notes higher, gleaming like a scythe in the night.\n\nAdhemar looked down, equally sullen once more. "It was the job of someone here to care." His response barely registering, Adhemar simply retreated back, a backdrop of early casualties mentioned as he wondered if war was inevitable."
LATAM_south_atlantic_war.19.a: "What happens to a dream deferred?"

LATAM_south_atlantic_war.20.t: "Democracy's Holiday"
LATAM_south_atlantic_war.20.desc: "In storage, ballot boxes continue to collect dust. Their day in the sun has been postponed.\n\nA speech goes on the air, announcing the suspension of elections due to the current state of emergency. The papers will not write anything on the matter.\n\nSmall protests bloom in its wake. They are violently dispersed. One cries out in agony as he and his broken arm are bundled into a transport.\n\nIn a field headquarters, a commanding officer relishes in the news. Democracy was never Brazil's strength; he was glad this war proved it. A plane flutters above in the sky.\n\nOn the frontlines, a PTB member muses about the significance of the date, long enough to distract him from an Argentine sharpshooter on the horizon.\n\nNone of them will vote again."
LATAM_south_atlantic_war.20.a: "The means must eventually justify themselves."

LATAM.10_lott_title: "An Offer from the Andean Pact"
LATAM.10_lott_desc: "Henrique Teixera Lott had not left much to chance during his term in office. He sometimes liked to think that fate had rewarded his diligent work. More often, however, the President had no time for idle speculation. All that mattered were efforts, and results.\n\nOn this late afternoon, late into his presidential term, Walther Salles and Tancredo Neves had both taken the time to visit the President. The matter was of great import; something once merely overheard in whispered rumors had now come to pass. Chile and Peru had gone ahead and united their strength into a new economic union. The Andean Pact, as it was named, would seek to do what had not been accomplished in hundreds of years of European presence in South America: a unified regional economic market. Hence the presence of the two essential ministers\n\n"Then, gentlemen, your thoughts?" Asked Lott. Neves spoke first, his eyes gleaming.\n\n"The possibilities, Mr. Lott! A regional common market, where we are free to progress on our own, not beholden to Washington D.C. or Tokyo."\n\n"I agree with Mr. Neves." Said the foreign minister Salles. "The benefits from joining in are likely to be great, both from increased trade as well as better ties with our neighbors."\n\n"With all of our neighbors but Argentina." Said the President.\n\nSalles nodded. "Mr. Denys is lukewarm on the idea of a pact." The foreign minister said. "He argues that those who don't join in the pact risk being irritated and set up rival tariffs and alliances. Better to coast on neutrality and good relations with all."\n\n"An interesting case." Lott sighed. A final matter of his presidency. A decision would need to be made, eventually. But which? The President asked himself, sitting opposite his two ministers."
LATAM.10.lott_a: "Call Santiago, this opportunity is too good to pass up."
LATAM.10.lott_b: "We cannot join now. Brazil must weigh its options carefully."

LATAM.10_quadros_title: "A New Faction in South America?"
LATAM.10_quadros_desc: "Rest from the day's work. Bernardes poured the President another drink. Arinos played with his lighter, awaiting the next round of toasts.\n\nThe three men were in a good mood. Alcohol thinned the edge of excitement. Words chosen carefully, lest the avalanche of thoughts turn into a cascade of words and ideas.\n\n"A regional economic alliance the likes of which South America has never seen! Just think of the possibility!" One of the three men said. Another pointed out the risks. "Tokyo will no doubt try to get in."\n\n"Or America will sabotage it."\n\n"You two worry too much."\n\nQuadros drained his glass. Refused another one. Serious events were a foot, serious conversations were held. He and his foreign policy partners in crime were amazed by the news coming out of Santiago. The Chileans and Peruvians were planning a new trade bloc, the Andean Pact. For a President determined to steer Brazil free of foreign imperialism, this was one of the major upsets of the decade. Of the century, perhaps!\n\nThe conversation rolled on and on, occasionally dimming to embers, oftentimes roaring back by blazing passion. Should Brazil join in? Try to take a leading position, or work in concert with other factions. What of Argentina, and others that refused to join in? Should Brazil sit on the sidelines, and observe how events unfolded?\n\nOn and on the discussion went, until something of a consensus emerged."
LATAM.10.quadros_a: "We must join the pact, contact Santiago."
LATAM.10.quadros_b: "Sadly it is not in Brazil's interests at this time."

LATAM.10_jk_title: "A Proposal from the Andean Pact"
LATAM.10_jk_desc: "Neatly arrayed maps on the walls of the Palácio do Planalto meeting room. Precise reports on various infrastructure projects, chief of which was the Trans-Amazonian Highway. Columns after columns of methodically arranged numbers. President Kubitschek's check up on the health of his various initiatives were often gently mocked by various staffers as the patterns of a country doctor making sure the village's children were growing up strong and healthy.\n\nThe day's topics, however, reflected foreign affairs. Minister of Foreign Affairs Negrão de Lima had come in with the incredible news from Santiago. The Chilean and Peruvians were announcing a new trading partnership, open to all nations of South America.\n\n"A phenomenal opportunity!" Said Roberto Campos. "With our booming industry and with the integration of all our provinces through the Trans-Amazonian highway, lowering tariffs with our neighbor would be pure profit. We can carve out an economic niche away from the overbearing influence of the Americans, without selling out to the Japanese."\n\n"A great opportunity indeed. If we are to be winners, are there going to be any losers from this Andean pact?" Asked Kubitschek.\n\n"It's supposed to be a win win for everyone. Word on the street, however, is that Argentina has declined joining it." Said the foreign minister.\n\n"If that's the case, Brazil would be by far the biggest member of the bloc."\n\n"A good point." the President looked to the array of maps. "Regional balance will be severely affected. Argentina will never buy our policy of friendly neutrality if our partners surround them."\n\n"It need not be such a big deal, I think." Negrão de Lima said. "If we stand as the first among equals within the Andean Pact, we can lead it and use it as a tool toward greater peace and development throughout the region."\n\nCampos and Kubitschek nodded. The discussion went on towards a few more topics. Eventually, the President made up his mind, weighing both options up."
LATAM.10.jk_a: "We must join the Andean Pact."
LATAM.10.jk_b: "We shall not take part in this adventure, sadly."

LATAM.10_lacerda_title: "A New Trade Bloc?"
LATAM.10_lacerda_desc: ""Then this story, has it been proven to be true, Leitão? That Chile wants us into their new trade zone?" Asked President Lacerda.\n\nHis Foreign Minister nodded. "Chile and Peru have reached out to us through informal channels to sound out how we feel about their proposed trade union."\n\n"A danger to regional balance. Perhaps also an opportunity?" Asked Lacerda. Leitão da Cunha thought a few moments, before replying.\n\n"A good opportunity, sir. If we play our cards right. Argentina will certainly not join."\n\n"Any news from Washington?"\n\n"They've kept mum so far. Official line is that they celebrate every relationship between free nations."\n\n"We'd probably have heard about it if this really irritated them." Said the President. "They are probably waiting to see how it shakes out, like us. Hmm..." Carlos Lacerda did not find himself often at a loss for words. "Were we to join, the Argentinians would be blindsided. This could be a great opportunity to promote OFN interests across the region."\n\n"The facts are as they are, sir." The Foreign Minister said cautiously. "The decision about what to do is yours.""
LATAM.10.lacerda_a: "We must join the Andean Pact."
LATAM.10.lacerda_b: "Better stay independent for now."

LATAM.10_adhemar_title: "The New Kid in Town"
LATAM.10_adhemar_desc: "The Palácio da Alvorada could perhaps be mistaken for the country's greatest gourmet restaurant, under the presidency of Adhemar de Barros. The President indulged occasionally in the excellent meals provided by his chef. His ministerial cabinet was more often than not included in the bounty, as was the case on that evening.\n\nThe most recent news had encouraged Adhemar to invite Foreign Minister Leitão da Cunha and Economy Minister Barreto to partake in the rich food. News that Chile and Peru had jointly declared the creation of a new trade bloc, the Andean Pact. Adhemar and his associates discussed this business opportunity over several courses. "Gentlemen, what are your thoughts on this recent development?" Asked the President.\n\nThe conversation that ensued flowed from topic to topic. Encouraged by the President, Barretto discussed the potential benefits to the Brazilian economy, jobs at risk from free trade, potential electoral gains from the resulting economic boom, as well as factions within the business community and their likely opinion on the new trade zone. Over dessert it was Leitão da Cunha's turn to discuss foreign policy implications of the trade deals; generally positive for Brazil, with the possible exception of frosty relationships with Argentina, a country unlikely to join the pact.\n\nAt the end of the delicious meal a bottle of Port wine was passed around. The two ministers looked at their President quizzically. "Your thoughts, sir?" asked Leitão da Cunha. "We've done most of the talking"\n\nAdhemar smiled, and spoke..."
LATAM.10.adhemar_a: ""A splendid opportunity!""
LATAM.10.adhemar_b: ""I wish them well, but we won't be of the adventure.""

LATAM.10_goulart_title: "The King of the Republic"
LATAM.10_goulart_desc: "He was back. Brasília was still a new and uncertain thing to Vargas - when he had retired, all the back-stabbing and backroom deals all happened in the shadow of Cristo Redentor. It felt too modern, all too sleek and streamlined as a machine had designed it. Rio was overcrowded and underdesigned, but it was unmistakably Brazilian. What that meant, Vargas really couldn't pin down. Times were rapidly changing for Brazil, and if this quiet conversation went the way he hoped - then the entire continent would follow suit.\n\n"Ah, our man of the hour!" a man with thick-rimmed glasses came to shake his hand. "We were just waiting for your arrival. My name is Hermes Lima, Goulart and Neves and the rest of the cabinet is just in the other room." Vargas followed the eager man into the conference room. It was small, and there were no windows. It was a shabby room - like a relic from his Presidency - but he gave a thin, knowing smile to himself. It was in places like these where history was made.\n\n"Getúlio! I'm glad you could make it here." Goulart got out of his seat and shook his hand firmly. "My apologies for the haste, but we must press forwards." Vargas nodded in acknowledgement and took his seat. It was hard not to notice the eyes of the entire room on him. "Okay, people. Now that we're all here. Let's get on. I propose that a defensive alliance between the nations of South America should be made, to protect ourselves from foreign influence. I know that most of us are for that, but does anyone have suggestions?"\n\n"This is ridiculous!" one cabinet member shot out. "Getting ourselves involved would imbalance Latin power imbalances and throw our nation into chaos! This alliance would have us pouring gasoline all over the continent to put out an ember!" the entire room dissolved into a tense quiet.\n\n"It is not enough." Vargas broke the silence. "It is not enough to have an alliance and hope for the best. This alliance, or pact, must be strong enough to bend but not break. What good would it have us if Ecuador and Colombian squabbles disrupted our unity? We must take the reins and lead the continent - not as Emperor - but as a guiding force!" Some in the room nodded and murmured in approval - especially Goulart and Lima."
LATAM.10.goulart_a: ""This is too much. We would be getting ourselves involved for no good reason.""
LATAM.10.goulart_b: ""Vargas is right. Only a strong Brazil can guide the continent properly!""

LATAM.10_castelo_title: "A Foreign Policy Opportunity?"
LATAM.10_castelo_desc: "President Castelo Branco found out rapidly that whether in civilian or military life, leaders were expected to process an endless stream of unexpected events. Thankfully, that day's set of news had been a more fortuitous one than usual, for Chile and Peru had gone ahead and declared the birth of a new trade bloc, the Andean Pact. This new voluntary group of nations was intended as an area of lower tariffs and an avenue for better friendship between the region's countries. So thought the President, discussing the news with his foreign minister in the Palácio da Alvorada\n\n"You speak of improving the economy, and furthering our economy, sir. What do you think is America's likeliest reaction to all of this?"\n\nCastelo Branco sighed. "They are our greatest allies in protecting our institutions."\n\n"It's always hard to figure out their thinking," Magalhães said. "If we join the Andean Pact it might raise a few alarms in D.C. That said, our economic size would likely help us take a leading role in the bloc, and help steer it toward OFN interests whenever the Americans need it. With a bit of hard work we could really make use of this opportunity to strengthen our regional position and impress our allies. Our, ah, friends in the American business community could help us make our case to the D.C. foreign policy wonks."\n\n"Nothing is ever free." Castelo Branco rubbed his temples. "We'll have to convince our own business community. The upcoming President will also have to be made to see things our way, so that he doesn't derail everything. Still, perhaps it's an opportunity...""
LATAM.10.castelo_a: ""...that we can't refuse?""
LATAM.10.castelo_b: ""...that is better ignored for now.""

LATAM.10_costasilva_title: "The Condor Sleeps Tonight"
LATAM.10_costasilva_desc: ""Here is the report, sir," said Costa e Silva's secretary as the cream folder was put on his desk. Costa e Silva flashed a smile towards the secretary, muttering a 'thank you' as she left the room. The president slowly opened the folder, looking inside to see the report on the negotiations of the new Andean Pact.\n\nSuccess! Costa e Silva's smile widened as he read through the paper. Chile and Bolivia were secured as they both joined the trade agreement, better news for the fight against Argentina couldn't possibly be imagined. It was a grand victory he felt like celebrating, and yet, he knew there was much to be done.\n\nHis mind wandered to the next steps of the plan. First, it was obvious the Chileans were a target for economic isolation by Argentina, but by cutting some tariffs here and there, he could strengthen both Chile and its mandate in Antarctica. And then? Only God knows! The many possibilities of making a stronger bloc against Argentina made the old general grin ear to ear, but for now, he knew it was time for him to rest.\n\nLaying back on his chair, Costa e Silva closed his eyes for a moment, finally allowing himself to relax."
LATAM.10.costasilva_a: "He won that right, after all."

LATAM.10_tt_a: "§YWe'll approach the Andean Pact.§!"
LATAM.10_tt_b: "§YWe won't approach the Andean Pact.§!"

LATAM.11.t: "Trades And Borders"
LATAM.11.desc: "João never knew how many diplomats smoked like a chimney. The grand hall was practically choked in ashes and haze, forcing him to keep his breaths shallow and quiet, else he choke on the fumes - and he doubted the tense atmosphere needed some secretary breaking into a hacking fit to help relax the tension.\n\nIt seemed his services would be unnecessary as the Pact representatives organized their papers, their leader standing. "The first order of business today," the man stated, peering through his glasses at his agenda, "is to negotiate proper terms for the borders of the Brazilian nation, in relation to the other members of the Pact. Shall we begin?"A quick glance up to the Brazilian delegation, whose leader merely nodded in response, and the man went back to his paper.\n\n"In the interests of our member nations, we must recognize the current state of border infrastructure as quite unsatisfactory, and would work to repair and improve on that. In relation to trade agreements and border restrictions, we request that the Brazilian delegation agrees to renegotiate its deals with our member nations, and relax its limits on Pact nations..."\n\nJoão tuned the man out as he began speaking in legalese, forgoing the details as he considered the offer. New trade deals, less border restrictions? A double edged sword, perhaps - cheaper goods at home, but the potential for Brazilian jobs being lost over the border to her neighbors. He knew, however, that some sort of agreement would need to be negotiated on the issue, regardless of integration into the Pact or not.\n\nWhat would Brasília want?"
LATAM.11.a: "These terms are more than acceptable."
LATAM.11.b: "The border policy is fine, but these trade terms are too much."
LATAM.11.c: "All of this is past the line. Let's reel it in."

LATAM.11_tt_1: ""
LATAM.11_tt_2: ""
LATAM.11_tt_3: ""

LATAM.12.t: "Integration Negotiation"
LATAM.12.desc: ""...to continue, our next topic will be the subject of political integration."\n\nThe smoke in the room had only gotten heavier. Someone had gotten it in their head to open a window, thank God, João would kiss them if he knew who it was, but even then the haze had hardly abated. The only way to keep him focused was a series of key words that he knew would start fires - words like "political integration". By the reaction of the rest of the delegation, he wasn't alone.\n\n"Cooperation on military matters, economic matters, diplomatic coordination." the man continued. "Generally, our integration would be aimed at keeping the members of the Pact united and powerful through cooperation. Perhaps some multinational training exercises, a few diplomatic meetings - keeping each other on the same page." He looked through his glasses at the Brazilians, waiting for their response.\n\nAs João leaned in towards his superior, his mind whirled through possibilities. It made sense, sure, but he couldn't help but remember that neither Chile or Peru had been too enthusiastic about this prospect either. It gave him leeway, at least. He could already picture nationalists back home yelling about loss of sovereignty if they went too far just as easily as he could see those internationalists who had pushed for the Pact in the first place raging about their reluctance.\n\nSomeone's going to have to be upset."
LATAM.12.a: "We're in full agreement to these terms."
LATAM.12.b: "Agree to what's important, and nothing else."
LATAM.12.c: "Stall for time and give them little."

LATAM.12_tt_1: ""
LATAM.12_tt_2: ""
LATAM.12_tt_3: ""

LATAM.13.t: "The Backrooms"
LATAM.13.desc: "It hadn't been on the official agenda today, nor had it been publicly known, nor were they even negotiating in the main hall - funny, then, João thought as he blew smoke from the cigarette he'd finally caved to having, that this may be the most crucial part of the whole song and dance. There were only six men in this cramped room, hidden away from the rest of the complex - the Chilean and Brazilian diplomats and their two best aides. It was no small honor that João was here to witness this.\n\n"The elephant in the room?" his superior started, prompting a tired nod from the Chilean. "Of course. It's always the Argentines."\n\n"Always." The other man said. "They're unstable, aggressive, and strong. You know just as well as we do how dangerous they can be. We want cooperation - shared officers, mutual defense agreements, military cooperation-"\n\n"And you left the Peruvian delegation out of this, I see."\n\n"We did, yes. They don't understand it like we do. To them, Argentina is just another nation. We can't risk a security leak like that over something as important as this."\n\n"Indeed." The Brazilian responded. "This is... quite an escalation, you know. Buenos Aires would be furious if they figured it out - maybe provoked enough to fight. I must say, my friend, Brazil does not want a continental war on its hands."\n\n"Of course, but that doesn't mean you can simply ignore the threat."\n\nThe diplomat turned to João, and he felt his stomach jump into his throat. "Your thoughts?""
LATAM.13.a: ""It makes sense, sir. I'd agree to it.""
LATAM.13.b: ""There's too much risk. We'll see if the time comes.""

