  SACW_nuclear_mechanic_tooltip_tt: "We require the bomb to secure the power of our nation and preserve its security. The progress of our project to obtain the bomb will be contingent on its budget and supporters; both we and our rivals lack the ability to make nukes by ourselves and thus need support.\n\nMoreover, program secrecy is also crucial, especially as it pertains to the superpowers; all the superpowers do not want nuclear proliferation, and will retaliate economically and in secret if they figure out what we are up to. If they succeed in this operations, it may well cripple our efforts permanently."
