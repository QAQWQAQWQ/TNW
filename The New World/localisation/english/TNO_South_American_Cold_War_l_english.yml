  #Tooltips
  SACW_big_cold_war_info_button: "§WIn the aftermath of the Second World War,§! §hParaguay's§! victory over §oBolivia§! in the First Chaco War, and §nSanta Cruz's§! independence, mutual distrust brewed into renewed hostility and rivalry between§! §KBrazil§! and §DArgentina§!. The South American continent is now a twisted mirror of the global cold war. This rivalry, which began following the independence of both countries from their colonial masters, has boiled over into open warfare before. A future conflict would certainly be larger and result in more destruction.\n\nIt is unfortunate then that this cold war has deepened despite the best efforts of politicians in preventing this from occuring. The victory of the §nAxis Powers,§! has only deepened distrust as §DArgentina§! sought diplomacy and economic ties with the victorious powers, while §KBrazil§! kept its close ties with their new Yankee allies.\n\nConflict between §DArgentina§! and §jChile§! in §aAntarctica§!, §KBrazil§! seizing control of §QFrench Guiana§!, and the Second Chaco War between §oBolivia§! and §hParaguay§! only cemented distrust and made the Cold War §Vinevitable§!.\n\nThe conflict of these nations interests will affect the destiny of the continent and the fates of millions of people. As violence and discord spreads like wildfire across the continent it should be remembered...\n\n§V"The hard part about playing chicken is knowin' when to flinch."§!"
  
  cold_war_info_tt: "§WThe balance of power between§! §KBrazil§! and §DArgentina§! is dependent on:\n- §YPolitical§! §Wsway over other Latin American nations§!\n- §YEconomic§! §Wsuccess, represented by the GDP§!\n- §YMilitary§! §Wstrength of the army, airforce, and navy\n\nWhile other regional players may be able to pull other nations into their sphere of influence, a situation of true cold war in the Americas exists only between §KBrazil§! and §DArgentina§!."
  SAmap_nation_debug_tt: "§Y[THIS.GetNameWithFlag]§!\nAlignment: [GetSacwAllignment]\nVictory Points: [?SA_cold_war_value|Y0]\nX = [?SA_cold_war_map_x?|Y0]\nY = [?SA_cold_war_map_y|Y0]"
  SAmap_nation_tt: "[GetSATooltip]"

  SAmap_tenstion_tt: "§WWhile few deny the reality of the §GSouth American Cold War§!, many throughout the continent would prefer a more peaceful resolution.§!\n\nIf §Gtension remains low§!, proxy conflicts may be resolved with mutual agreement, and there is hope for a peaceful resolution to the cold war.\n\nHowever, if §Rtensions increase§!, even the relatively low appetite for military conflict in Latin America may prove insufficient to prevent a major war bleeding the continent white.\n\nThe effects of [GetSAColdWarTensionLevel] tension are:\n[GetSAColdWarTensionLevelEffects]"
  SA_Tension_Level_1: "§GNormal§!"
  SA_Tension_Level_2: "§wUnsteady§!"
  SA_Tension_Level_3: "§OTense§!"
  SA_Tension_Level_4: "§RDangerous§!"
  SA_Tension_Level_5: "§eCritical§!"
  
  SA_Tension_Level_1_Effects: "§G+5%§! §YStability§!\n§R-10%§! §YWar Support§!\n§G+2%§! §YGDP Growth§!\n§Y-10% Minimum and Maximum Military Spending§!"
  SA_Tension_Level_2_Effects: "§R-5%§! §YWar Support§!\n§G+1%§! §YGDP Growth§!\n§Y-5% Minimum and Maximum Military Spending§!"
  SA_Tension_Level_3_Effects: "§G+5%§! §YWar Support§!\n§R-1% §YGDP Growth§!\n§YMilitary Spending§! §Gslightly increases§!"
  SA_Tension_Level_4_Effects: "§R-5%§! §YStability§!\n§G+10%§! §YWar Support§!\n§R-2% §YGDP Growth§!\n§YMilitary Spending§! §Gincreases§!"
  SA_Tension_Level_5_Effects: "§R-10%§! §YStability§!\n§G+15%§! §YWar Support§!\n§R-3% §YGDP Growth§!\n§YMilitary Spending§! §Gmassively increases§!"

