 SLO_Jan_Golian: "扬·戈利安"
 POLITICS_JOZEF_TISO_DESC: "从一名教士，到罗马天主教神父，再到斯洛伐克共和国的总统，约瑟夫·蒂索神父的一生都是绝无仅有的成功。他早年为晋铎成为神父而接受了教会教育，后来成为一名成功的温和派政治家。蒂索看上去就像是一座希望的灯塔，是一位体面的好人。然而，到了30年代中期，蒂索的观点却转向了威权和极权主义，并成为了斯洛伐克政界中典型的激进派。当纳粹占领捷克斯洛伐克时，约瑟夫·蒂索神父被任命为斯洛伐克共和国总统。蒂索背叛了他的人民，投身于所谓的“领袖崇拜”当中。\n\n在轴心国于第二次世界大战中取得胜利后，欧洲经历了短暂的繁荣，然后是十年的动荡。受到德国经济崩溃打击，斯洛伐克经济也几乎全面崩盘。然而，斯洛伐克政府还是笑到了最后。为了应对国内不断增加的骚乱，蒂索总统进一步镇压了国内的人民，以平息一切不满情绪。\n\n到了1962年，蒂索总统的健康状况正迅速恶化，并且没有任何改善的迹象。眼看蒂索气数已尽，政府内部的许多派系都已经开始准备面对他死后将要发生的一系列事件了。"
 POLITICS_STEFAN_TISO_DESC: "尽管出身卑微，什特凡·蒂索如今已站上斯洛伐克政治舞台的中心。他出生于斯洛伐克内陆地区，一战期间被征召入奥匈帝国军队，后加入捷克斯洛伐克军团，于1920年回归新独立的祖国。此后他加入赫林卡党，不过在这个反犹倾向严重的政党内部，他因妻子是犹太人而遭受非议。蒂索在布拉迪斯拉发考门斯基大学获得法学博士学位后，于特伦钦担任法官，最终调回布拉迪斯拉发并成为国家法院成员。\n\n随着斯洛伐克与捷克分离、轴心国在二战中获胜，蒂索所属的赫林卡党在新生斯洛伐克共和国掌权。他出任国家法院院长，直至1944年因沃伊捷赫·图卡健康状况恶化，接任总理职务。蒂索还同时兼任外交部长和司法部长。作为总理兼外长，他在任内主导斯洛伐克加入了新成立的团结协定。\n\n什特凡·蒂索现任斯洛伐克共和国总统，继承其远房堂兄约瑟夫·蒂索的遗位。虽然他的统治尚属稳固，但军队内部不满的传闻时有耳闻。他还面临党内激进派的直接挑战，包括亚历山大·马赫等主张与德国加强合作的人士。"
 POLITICS_JAN_GOLIAN_DESC: ""
 SLO_tiso_dead: "蒂索之死"
 SLO_tiso_dead_desc: "随着约瑟夫·蒂索去世，斯洛伐克已经陷入混乱。政府几乎瘫痪，人们开始意识到是时候改变这一切了。我们必须迅速行动，以避免不稳定态势进一步扩大。"
 SLO_Chained_Minds: "被束缚的思想"
 SLO_Chained_Minds_desc: "显而易见，斯洛伐克没有什么言论自由。尽管有些人可能争辩说言论自由不利于政府维稳，因此对言论自由的管制是一个正常运转的国家的根基，但是人民对此并不满意，知识分子对此尤为不满。"
 SLO_Political_Tensions: "政治紧张"
 SLO_Political_Tensions_desc: "虽然蒂索作为无可置疑的领袖统治斯洛伐克超过20年，他的健康状况也依旧和普通人一样日落西山，这就意味着斯洛伐克政治舞台上的政客们开始不择手段地角逐权力。如果这还不够糟糕，那么关于抵抗运动消失的报告正变得愈发虚假…"
 SLO_Agitated_Workers: "被激怒的工人"
 SLO_Agitated_Workers_desc: "尽管斯洛伐克共和国在过去几十年里保持着良好状态，各种问题仍然困扰着她，譬如说工人问题。工人们时常因为过低的薪水，糟糕的工作状况甚至只是对政府提出异议而罢工。"
 SLO_Uncompetitive_Economy: "缺乏竞争力的经济"
 SLO_Uncompetitive_Economy_desc: "显然，法西斯主义并非是符合我国国情的经济制度。假若我们不想承受彻底的经济停摆，这一问题必须被解决。"
