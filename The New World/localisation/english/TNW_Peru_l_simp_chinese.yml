 PRU_Carlos_Moreyra_hog_desc: "§Y部长会议主席\n第二副总统\n保守主义§!\n--------------\n§L莫雷拉出生于1898年，职业为工程师及政治家。他曾在普拉多政府中任发展和公共工程部长，反对普拉多在二战中左右逢源的政策。战后，他就职于全国农业协会，并任职到普拉多于1956年再任秘鲁总统。由于保持对日本门户开放，普拉多失去了地主的支持，因此莫雷拉说服他加入国家民主保守行动，并成为了他的第二副总统。在贝尔特兰批评普拉多政府时，莫雷拉担任了调停者。贝尔特兰后成为经济部长及部长会议主席，后者即秘鲁总理。他辞职后，莫雷拉接过了总理的职位，并继续与普拉多保持着友谊。§!"
 PRU_Gallo_Porras_eco_desc: "§Y经济和财政部长\n第一副总统\n保守主义§!\n--------------\n§L加略·波拉斯出生于1894年，是秘鲁最出色的政治家之一。他在30年代担任米拉弗洛雷斯和利马的市长的经历给予了他宝贵的经验，1955年加入国家民主保守行动后，他在1957年选举中成为了普拉多的竞选搭档。前经济和财政部长贝尔特兰辞职后，加略接任该职位。他与普拉多的友谊即便在这艰难时刻也历久弥新。§!"
 PRU_Ricardo_Elias_sec_desc: "§Y内政与警务部长\n保守主义§!\n--------------\n§L埃利亚斯·阿帕里西奥出生于1906年，是名经验充足的律师。他在1938年被贝纳维德斯政府委托前去调查德国和意大利的刑罚体制，而这使他对秘鲁的刑罚体制产生了兴趣。后来，他开始为军方和警方合作。1960年，普拉多任命他为安全部长。近来，埃利亚斯时常为北方不祥的寂静和在农村偶尔发生的恐怖主义袭击感到担忧。§!"
 presidente_peru_latin: "总统阁下"
 presidente_junta_latin: "军政府总统"
 POLITICS_MANUEL_PRADO_UGARTECHE_DESC: "曼努埃尔·普拉多·乌加特切，1889年生于秘鲁显赫世家，其父曼努埃尔·伊格纳西奥·普拉多曾任总统。这位土木工程师在四十至五十年代成为秘鲁政坛举足轻重的人物。他自政坛崛起，经奥斯卡·R·贝纳维德斯总统钦点为继任者，并于1939年赢得大选。普拉多延续了贝纳维德斯对非法组织阿普拉党和秘鲁共产党的镇压。当纳粹铁蹄踏入波兰时，普拉多政府以全新外交政策改写了秘鲁国运。珍珠港事件后，为维系与华盛顿的友好关系，普拉多公开支持美国及盟军，却仍为日本保留余地。至1944年，战局未明而美国犹自岿然，普拉多遂延续“中立”外交——直到那个改变历史的时刻：珍珠港在刺目强光中灰飞烟灭，美利坚向轴心国有条件投降。\n\n北方巨人的陨落令曼努埃尔·普拉多震惊，但他坚信自己当初的抉择正确，期待一切如常。任期结束后，他远走美加冷眼旁观故国陷入动荡，待局势稍稳即于1956年返国角逐1957年大选。然民意基础薄弱迫使他与贝尔特兰缔结“国家民主保守联盟”，同曼努埃尔·奥德里亚达成改变国运的《蒙特里科协议》——以掩盖奥德里亚贪腐丑闻为代价，换取国家民主保守联盟候选人身份。二次执政期间，普拉多废除《国家安全法》却维持对阿普拉党和革命联盟的禁令，仅释放其温和派成员，并与佩德罗·贝尔特兰成功稳定经济。\n\n执政五载，未竟之事犹多。面对迫近的大选、国家民主保守联盟内部分裂、投资战争与阿普拉党威胁，普拉多正筹划离任前的最后布局。他仍将延续传统策略——以静制动，待时局自愈。这套哲学曾屡试不爽，此番亦当奏效。§R不是吗？§!"
 POLITICS_FERNANDO_BELAUNDE_TERRY_DESC: "1912年10月7日出生于利马的费尔南多·贝朗德，被追随者和秘鲁媒体亲切地称为“建筑师贝朗德”，既是一位典型的秘鲁政客，又是位突破传统框架的完人。他出身显赫的贵族世家——这个家族的血脉可追溯至利马最早的西班牙殖民者，父亲拉斐尔·贝朗德曾两度出任秘鲁总理。优渥的家境为贝朗德铺就了光明的前程。\n\n在美国完成学业后，贝朗德回到利马成为富甲一方的实业家，其学术论著和建筑作品更令他声名鹊起。借助父亲的政界人脉，他先后担任多个政府职务，仅在奥德里亚政权时期短暂中断仕途。1956年，他通过创建“民主青年国家阵线”正式步入政坛，这个由年轻改革派组成的团体推举他与曼努埃尔·普拉多角逐总统宝座。虽以第二名落败，贝朗德却将该组织转型为成熟政党人民行动。基于“秘鲁即信条”的政治理念，他走遍全国，在每座到访的城市播撒人民行动组织，这使他成为普拉多政府时期最高调、最具影响力的反对派领袖。\n\n如今，在实现了1956年未能达成的目标后，建筑师贝朗德面前仍横亘着漫漫长路。诸多改革蓝图亟待实施，但这位继任者是否拥有前辈们缺失的政治智慧，唯有时间能够验证。"
 POLITICS_LUIS_BEDOYA_REYES_DESC: "1919年2月20日出生于秘鲁港口城市卡亚俄的路易斯·费尔南·贝多亚·雷耶斯，虽出身寒门却卓尔不群。自幼即展露过人聪慧，最终以优异成绩毕业于美洲最古老的高等学府圣马科斯大学，随后开启前景可期的律师生涯。\n\n自学生时代便深受基督教民主主义思想熏陶的他，成为秘鲁基督教民主党最早期的成员之一。因该党在1963年大选中与贝朗德的人民行动党结盟，被贝朗德政府任命为司法部长。凭借卓越的执政表现，他在1964年利马市长选举中成为贝朗德力挺的候选人，以显著优势击败人气颇高的秘鲁前第一夫人玛丽亚·德尔加多·德·奥德里亚。任内他以“利马史上最高效市长”闻名全国，因其在杜绝贪腐的前提下取得斐然政绩而赢得国民敬仰。当对贝朗德及基督教民主党双双失望后，他创建基督教人民党，这个既坚守基督教社会教义又能引领国家改革的新兴政党。\n\n如今他实现了既在情理之中又出乎预料的壮举——登顶秘鲁权力巅峰。当全球民主制度风雨飘摇之际，或许是天意垂青，又或许是命运眷顾，这个安第斯国家竟得遇为民主根基筑基的最佳人选。秘鲁能否延续这般鸿运，将成为世人瞩目的奇迹。"
 POLITICS_MANUEL_ARTURO_ODRIA_DESC: "曼努埃尔·阿图罗·奥德里亚堪称拉丁美洲政治人物的典型缩影——1896年11月26日出生于秘鲁塔尔马省显赫的军事世家，自幼受尚武传统熏陶投身军旅，凭借过人的才智与严明纪律性在同期军官中脱颖而出。他在军阶中稳步晋升，最终在第一次厄秘战争中跻身秘鲁最高指挥部将领之列。\n\n1947年阿普拉党恐怖袭击事件后，他出任何塞·布斯塔曼特-里韦罗总统政府的战争部长。当布斯塔曼特拒绝再次宣布阿普拉党为非法组织时，奥德里亚协同秘鲁武装力量于1948年10月发动政变推翻其政权。在1950年“完全公正”的选举后，奥德里亚以合法总统身份执掌秘鲁。其执政时期以大规模基础设施计划闻名，如国家体育场建设及国民保险体系扩展，同时也因残酷镇压阿普拉党及其激进分子留下历史污点。迫于OFN与美国的内外压力，奥德里亚于1956年启动民主化进程，将总统权柄移交当年大选最终胜出者曼努埃尔·普拉多·乌加特切。双方曾达成秘密协议：奥德里亚承诺和平交权以换取普拉多不对其贪腐指控展开调查。\n\n如今秘鲁文官政客再度令国家陷入困局，奥德里亚重掌总统大权。48年革命未竟之业终将完成，无论扬基佬是否乐意！"
