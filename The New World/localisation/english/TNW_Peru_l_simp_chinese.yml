 PRU_Alvarado_Garrido_for_desc: "§Y外交部长\n保守主义§!\n--------------\n§L阿尔瓦拉多·加里多生于1907年，拥有四十年法政生涯的传奇履历。他曾在圣马科斯国立大学与秘鲁天主教大学执教，五十年代出任驻玻利维亚大使。其漫长而璀璨的仕途令普拉多总统青眼有加，遂于1960年委以外交部长要职。当前他肩负着周旋厄瓜多尔外交困局、维系美日友好关系的重任。§!"