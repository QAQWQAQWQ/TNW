 PAK_Collective_Leadership: "集体领导制"
 PAK_between_the_worlds: "诸世之间"
 PAK_between_the_worlds_desc: "在英国对印度次大陆的统治结束之后，西北边境省就一直围绕着归属问题争执不休。一些人热切期盼着普什图尼斯坦的统一，另一些人则忠于巴基斯坦理念，还有一个实力显著的集团仍在坚持自己的亲印度主张。\n\n兄弟反目成仇。在这片土地该何去何从的问题上，统治这片土地的诸多部族存在着深刻的分歧。即使学校与酒吧也被这种分裂所困扰：知识分子莫衷一是，学生团体争斗不休。恐惧、不满与焦虑笼罩着整个社会。虽然纳瓦卜扎达和他的政府本身持有明确的亲阿富汗立场，但他所仰赖的巴基斯坦运动却截然相反。"
 PAK_the_sandcastle: "脆弱沙堡"
 PAK_the_sandcastle_desc: "西北边境省的安全局势，恰如一座被顽童疯狂厮打包围、濒临崩塌的沙堡。民怨沸腾、恐慌蔓延、饥馑肆虐、人心惶惶之际，政府却既无能又不愿采取行动。其中最具代表性的便是此起彼伏的部落间暴力冲突——对于这些几乎每日上演的流血事件，西北边境省当局竟安之若素。\n\n更糟糕的是，西北边境省当局不得不倚重意识形态上与其势同水火的穆斯林联盟国家卫队。除了白沙瓦和远北地区的几个忠诚土邦之外，当局政令不出百里，其施政只能通过附庸部落或几近公开造反的穆斯林联盟国家卫队来实现，后者似乎随时能将纳瓦卜扎达的政治沙堡彻底摧毁。"
 PAK_pashtun_rule_british_policies: "普什图之律，不列颠之法"
 PAK_pashtun_rule_british_policies_desc: "虽然明面上看，西北边境省获得了完全的自治地位，但在英国的殖民统治结束后，这里并没有发生任何有意义的变化。就像英属印度时期一样，该省仍旧需要依靠马利克和其他地方权贵组成的网络来管理农村地区，也会极端残忍地消灭一切被其视为威胁的势力。\n\n纳瓦卜扎达政权的残酷维稳政策最突出的受害者之一是真主忠仆组织，一个可以追溯到英属印度时代的非暴力抵抗运动。在西北边境省政府军与穆斯林联盟国家卫队发起的联合绞杀行动中，有数千人遭到杀害，该组织也濒临灭亡。"
 PAK_carrying_all_before_them: "势不可挡"
 PAK_carrying_all_before_them_desc: "将战争的熔炉点燃、烧热吧，让巴基斯坦运动开花结果吧！巴基斯坦运动终于推翻了纳瓦卜扎达那可怜的小小王国，得以用刺刀与火药推行自己的秩序。他们将在锻炉的烈火中精炼、重塑这片土地，将她打造为一件尖锐的武器，刺向盘踞在印度河对岸的无信仰者、共匪与多神教徒。\n\n阿富汗的统治至少暂时结束了。在阿卜杜勒·加尧姆·汗及其党羽的指导下，西北边境省终于初见光明。不过，在他们的愿景成为现实之前，究竟会有多少灵魂会在战争的锻炉中化为炉渣与灰烬？"
 PAK_one_flag_a_thousand_nations: " 一国千族"
 PAK_one_flag_a_thousand_nations_desc: "哪怕在如今这个社会和民族宗教分层司空见惯的世界上，巴基斯坦也堪称社会分层最严重的一类。\n\n在巴基斯坦，无数意在从政治乃至经济层面上彻底剥夺非穆斯林选举权的法律和非法律政策无情地践踏着任何名义上的宗教自由。旁遮普人站在摇摇欲坠的民族金字塔顶端，用包括歧视在内的种种手段对待共同组成这个国家的其他民族，以此维系其对国家事务并不稳固的主宰地位，而各民族也饱受内部分裂之苦。官方层面上，种姓制度被谴责为“印度教异端”的遗毒，并且在法律上“不存在”，但事实上，种姓制度依然有着强大的影响力，渗透进了绝大部分政治和社会事务之中。"
 PAK_the_parliamentary_dictatorship: "议会独裁"
 PAK_the_parliamentary_dictatorship_desc: "巴基斯坦伊斯兰共和国的食利地主阶层颇有“创意”地仿效英国改革法案前的腐败选区制度，操纵议会，胁迫佃农投票，以此换取所欲政治变革。巴基斯坦在理论上实行民主制，事实上也保留着某种竞选政治的表象——但唯有一众地主豪强的不同派系，才享有公平角逐的权力。\n\n绝大多数民众政党甫一尝试参选便遭查禁。国民议会因此在法理上先天丧失代表民意的可能。总理虽需对议会负责，却毋须对人民负责——如此体制，使巴基斯坦成为彻头彻尾的议会独裁之国，堪称寡头政体最贴切的当代范例。"
 PAK_an_administrative_chimera: "畸形政府"
 PAK_an_administrative_chimera_desc: "新生的巴基斯坦国家建立在自相矛盾、支离破碎的法律原则之上。没有现行宪法，诸法沿袭英属印度旧制。巴基斯坦名义上仍是英国自治领——此举旨在宣称其已于1945年独立建国，而非1965年。与此同时，国中却日日宣扬奉行伊斯兰原则与教法信条。\n\n事实上，无论是普通法传统抑或安拉与先知的训诫，在巴基斯坦政权的真实运作中皆无足轻重。实权操于军事管制司令官及其拥护者之手。在这片土地上，没有任何圣训或法理能像赤裸裸的暴力般主宰政局。"
 PAK_the_scrap_of_paper: "一纸空文"
 PAK_the_scrap_of_paper_desc: "巴基斯坦伊斯兰共和国的宪法许下了诸多承诺。它保障言论自由、多党民主和各民族平等，矢志建立一个遵循《古兰经》和《圣训》教义的伊斯兰国家。然而在其缔造者，即巴基斯坦的国父们眼中，宪法的价值与承载其的白纸无异。\n\n若要理解这个新生伊斯兰共和国真正的统治法则，如纸片般单薄的巴基斯坦宪法全然无用。最真实的宪章由阿卜杜勒·加尧姆·汗忠实践行，并被其后继者虔诚传承。答案不在案头文件之中，而需望向窗外大地，从白沙瓦到卡拉奇沿途星罗密布的万千显隐坟墓中寻找。"
 PAK_the_fires_must_burn: "烈火须燃"
 PAK_the_fires_must_burn_desc: "在法兰克福的金融中心，印着“巴基斯坦模式”伟大成就的精美宣传册铺天盖地。巴基斯坦正步入可与任何竞争对手比肩的工业时代。欧洲资本如嗅到血腥的鲨鱼般涌入卡拉奇与拉合尔，试图在这如同屠宰场般疯狂的市场中分得一杯羹。\n\n真正的屠宰场却存在于构成这场繁荣血肉的工厂车间。工业监管条文在纸面上光鲜亮丽，在实践中形同虚设。童工制度正在吞噬城乡贫民孩童的未来，他们被永世债务的锁链桎梏，在监工冷酷的鞭笞下化作工业熔炉的燃料。对巴基斯坦的上流阶层而言，唯有一个信条颠扑不破：发展决不能停滞——无论付出多少人命代价。"
 PAK_networks_upon_networks: "无孔不入"
 PAK_networks_upon_networks_desc: "在巴基斯坦，穆斯林联盟国家卫队的影响力可谓无孔不入。政府部门的每一个角落几乎都被他们在巴基斯坦独立进程中建立的“赞助与互惠”网络所支配。\n\n除非穆斯林联盟国家卫队介入其中，否则政府无法履行绝大部分职能。司法系统也严重失能，总是草率地作出不公正的判决。连税款也被全数揣进他们的腰包，就像是在刻意模仿那句古老的名言一样：“如果他们必须要派一名收税官，就也得招揽一个暴徒。”\n\n为了阻止穆斯林联盟国家卫队进一步插手与军事不相干的事务，当局必须及时采取严厉的措施，否则它就会失去对绝大多数机构的控制力，到时候军方会做什么就相当难说了。"
 PAK_an_army_of_patronage: "腐溃之军"
 PAK_an_army_of_patronage_desc: "巴基斯坦伊斯兰共和国拥有两支武装力量：一支是素质过硬、装备精良但规模较小的巴基斯坦陆军；另一支是规模庞大、凭借赞助运行的巴基斯坦民团，这是穆斯林联盟国家卫队的衍生组织，由地方各自组建，独立运行。\n\n民团各部通常听从各地要人的指挥。任命环节简单粗暴，其中的腐败更是触目惊心：下级职位任人唯亲，卖官鬻爵屡见不鲜。民团作为一种军事力量的效用有待商榷，但作为笼络人心的工具则是百试百灵。"
 PAK_power_vacuum: "权力真空"
 PAK_power_vacuum_desc: "当政府不复存在，权力真空便紧随而至，正如德国势力撤出后的巴基斯坦。\n\n没有了明确的领导，穆斯林联盟国家卫队的余部陷入了群龙无首的状态，逃兵现象屡见不鲜。本应戍守边境的军队如今却忙于恢复街道上的秩序。农民起义席卷全国，残存的政府对此束手无策。最致命的一击则来自警界：他们宣布彻底中立，希望印度国民军越境后能对其网开一面。"
 POLITICS_NAWABZADA_SHAHABUDDIN_KHAN_DESC: "贾多尔的汗、第尔的纳瓦卜，纳瓦卜扎达·谢哈布丁汗，纳瓦卜·沙阿·贾汉汗的次子，是个无情且尽忠职守的人。\n\n考虑到他的第二份工作是被阿富汗任命为边境诸省的军事总督，以上的评价简直是恰如其分——这个职位是阿富汗王国为了镇压边境巴基斯坦军队残余而设立的。他的职责是确保巴基斯坦人的军队最多只能残留在这边境一带，而不会侵入阿富汗境内。作为阿富汗人忠诚的下属，他很乐意履行这项职责。\n\n曾几何时，谢哈布丁汗不曾受命镇压巴基斯坦人的时候，他也曾统治过巴基斯坦西北部的两个小土邦——两个本应属于巴基斯坦的地区。当时，许多人赞颂他为治下的国家的现代化所作的努力，包括一手资助其辖区内的学校、医院、防御工事与道路等等。但同时，许多人也批评他在和任何人打交道时都流露出来的无情。\n\n而现在，他对边境诸省的专制统治在提升许多人的生活水平的同时，也毁了许多人的生活。无数部族视他为敌，只因他为发展而不断征用部族土地，而除了他曾管治的贾多尔和第尔地区，边境诸省的民众对他也没什么特别好的印象，反而有不少人对他专制且无情的统治感到不满，导致当地出现亲巴基斯坦，甚至亲印度的情绪。\n\n而面对这类事情，纳瓦卜扎达只会一如既往地行事——维护自己的权威，压制异议，直到事件平息。既然这一套以前行得通，现在用回这套又会有什么问题呢？"
 POLITICS_ABDUL_QAYYUM_KHAN_DESC: "阿卜杜勒·加尧姆·汗是个染血之人。这是对他最简练的评价。\n\n他曾经支持与印度国民大会结盟的真主忠仆运动，但在20世纪40年代末，他转向了全印穆斯林联盟，并不惜通过屠杀他从前所属政党的支持者来证明他对当下事业的忠诚。1959年，他被选为全印穆斯林联盟的领导人，如今，他已经成了该党内部最有权势的普什图人。\n\n凡是那些穆斯林联盟国家卫队（一支只忠于他本人的准军事部队）拥有强大势力的地方，人们都能强烈地感受到他的力量。但这也损害了他在地主阶级中间的声誉，他们对国家卫队只忠于他一人感到十分不满。巴基斯坦运动的另外两个分支组织：查谟与克什米尔团和边防部队也对他颇有微词，他们都认为国家卫队是一群毫无纪律的流氓土匪，是巴基斯坦运动的累赘。\n\n但现在，阿卜杜勒·加尧姆·汗稳坐江山。全印穆斯林联盟从上到下都很清楚，要想实现从克什米尔到俾路支斯坦的巴基斯坦之梦，就需要一个像他这样的领导人。"
 POLITICS_FEROZ_KHAN_NOON_DESC: "费罗兹汗·努恩明明不想看到巴基斯坦独立，却偏偏被选中领导新生的巴基斯坦走出襁褓，实在不可谓不讽刺。只要稍稍探究一下他的思想，就不难发现这些年来他真正效忠的对象——从始至终，费罗兹汗·努恩都只对英国忠心不二。他在英国度过了人生中最快乐的时光，直到英属印度存在的最后一刻也仍支持英国的统治。\n\n时光荏苒，1965年，越来越多的旁遮普城镇升起了星月旗。努恩嗅到了风向的变化，意识到这种转变将有利于他，努恩随即联系了在全印穆斯林联盟中的老朋友。\n\n巴基斯坦运动的士兵们准备将国旗插到费罗兹汗·努恩所在的村庄努尔布尔努恩，却发现星月旗早已在此地的上空飘扬。战争结束后，费罗兹汗·努恩热衷于招募前联盟的成员加入巴基斯坦穆斯林联盟，事实证明这次动员相当成功，努恩在制宪会议期间以此为资本，将加尧姆汗赶下台，入主权力的殿堂。\n\n毫无疑问，费罗兹汗·努恩会竭尽所能管理巴基斯坦，他将确保新生的伊斯兰共和国只为他能想到的唯一合法目的服务：保护并效劳于他出身的精英阶层。"
 POLITICS_MUMTAZ_DAULTANA_DESC: "许久之前，蒙塔兹·道勒塔纳就全力支持巴基斯坦独立的愿景。早在1942年，他就不顾殖民当局的禁令，加入了全印穆斯林联盟。在此之后，他仍与从前的同志们保持联系，并利用他个人的关系组织起了规模庞大的网络，以至于他在1965年以前就成了穆斯林联盟国家卫队在木尔坦地区的秘密指挥官。\n\n在蒙塔兹·道勒塔纳看来，他理应在战争结束后担任总理一职。然而，在他得以说服自己在统一党内的同僚支持自己之前，就发现自己的家族世仇兼政治对手，费罗兹·汗·努恩，获得了旁遮普贵族的支持。\n\n但万事皆有终结。费罗兹·汗·努恩倒台了，贵族们纷纷转向蒙塔兹·道勒塔纳，就连教士们也全数支持他。如果他能经受住教士针对巴基斯坦宗教少数群体发起的猛烈攻击，他们或许还能将他推上比总理更高的地位。"
 POLITICS_MAHMUD_AHMED_DESC: "马哈茂德·艾哈迈德并非生来就是恐怖分子，而是一个于印度共和国草创之初出生在卢迪亚纳的穆斯林。他的童年生活基本没有任何亮眼之处，与任何一个典型的印度穆斯林儿童都毫无差别。不过，也没有哪个人生来就是恶人——或者，如果按照艾哈迈德那惊人庞大的支持者群体的说法，生来就是英雄。\n\n艾哈迈德到底是通过什么途径习得恐怖袭击手法以及各种民族解放理念的，这个问题至今还没有定论。一些人说他是受到了印度国民军在独立战争期间作战方式的启发，但据他自己所称，他在童年时期目睹了真主的迹象，是真主命他必须发动对印度教徒的圣战。他不想为印度教徒效命，于是逃脱了兵役，藏身在无人把守的边境群山之中。他就这样消失在茫茫的山峦之中，并继续领受着独一真主的迹象。\n\n自他消失以来已过去了多年，艾哈迈德终于前来解放他的同胞了。他与无数追随者并肩作战，被众人尊称为“阿扎德”——乌尔都语中的“自由之人”。他不惜一切代价，也要将印度教徒逐出这片纯洁的土地，并在它的废墟上建立一个新生的伊斯兰国度。在数百年的压迫之后，全印度的穆斯林终将以信仰、团结与戒律之名打破束缚他们的锁链。为了真主的荣耀，艾哈迈德与圣战者们将会与印度的卡菲勒战斗到底，就像往昔岁月里那些挺身对抗基督教十字军的伟大战士们一样。"
 POLITICS_INTERNAL_COMMOTION_OF_THE_STATE_DESC: "鉴于巴基斯坦伊斯兰共和国政府已无力满足人民之需求；\n\n鉴于其失能导致共和国全境陷入内部骚乱，军力捉襟见肘、民团擅离职守、农村起义此起彼伏；\n\n鉴于德国政府试图利用巴基斯坦人民谋取私利未果，仅撤离对其有用之人，致使其余民众陷入绝境；\n\n鉴于两国政府之权谋运作，原巴基斯坦地区实质上已陷入无政府状态，此等情势断不可容忍亦不得延续；\n\n吾等公民、警察及军人心系本域福祉，谨代表西北边境省、西旁遮普省、信德省、俾路支省、自由克什米尔地区及其他被消失政府占领地区，向自由印度总统保证，将全力支持自由印度军在境内恢复秩序——谨此恳请自由印度共和国行政与立法机构立即承担前巴基斯坦伊斯兰共和国之治理职责。\n\n署名：拉瓦尔品第紧急会议"
 POLITICS_ZULFIKAR_ALI_BHUTTO_DESC: "1928年，当太阳在信德省拉尔卡纳镇的地平线上升起，照耀新生的佐勒菲卡尔·阿里·布托时，全家人都预感到，这个孩子注定会成就一番伟业。\n\n他的父亲，沙阿·纳瓦兹·布托爵士是信德省最具权势的地主之一，他后来成为该省的首席部长，打从一开始，他的父亲就全力支持他实现自己的政治理想。起初，巴基斯坦伊斯兰共和国的成立对他而言似乎成了一个挫折，因为他的父亲曾担任信德联合党的首长。然而，恐惧与担忧很快就让位于现实利益：巴基斯坦的诞生让佐勒菲卡尔·阿里·布托得以充分施展自己的才智和能力，这个国家能给予他的权力也远比印度更多。\n\n问题在于，当机遇被送到他手里时，他同时也需要面对一个混乱的时局。今天，佐勒菲卡尔·阿里·布托领导着一个极不稳定的地方主义联盟，而这个联盟的存在源于信德人对旁遮普人独断专行的不满，以及普什图人对紧急状态期间政府犯下的暴行与背叛的愤怒。\n\n佐勒菲卡尔·阿里·布托的家人一直都知道他注定会成就一番伟业，但他们不知道这番荣耀能持续多久。如果布托无法稳定自己身旁的执政联盟，他的总理任期可能比他所想象的要短得多。"
 POLITICS_JAHANARA_SHAHNAWAZ_DESC: "贾哈纳拉·沙赫纳瓦兹是二十世纪后半叶穆斯林联盟仅存的保守派成员。\n\n自二十世纪第二个十年便活跃于全印穆斯林联盟的她，曾为巴基斯坦建国事业奔走呼号——直到四十年代因拒绝抵制英国殖民机构而被剥夺所有党内职务。  \n\n转投统一党后，她在战后顺利承袭家族的省议会议席，与费罗兹·汗·努恩结成紧密同盟。尽管有人讥讽她的政治轨迹如同雏鸭随行，但努恩重归旧党时，正是沙纳瓦兹率先追随。她随后担任了努恩内阁的司法部长。  \n\n1972年努恩病逝引发穆斯林联盟领导权危机，各派系陷入僵持。关键时刻，已故总理遗孀维卡尔-乌恩-尼萨·努恩将关键一票投给沙赫纳瓦兹，令她就此登顶权力巅峰。"
 PAK_Germany.1.t: "米南德行动摘要"
 PAK_Germany.1.desc: "绝密\n仅供目视查阅\n呈送[getGermanIntelAgencyCaps]所有成员\n米南德行动\n\n白沙瓦 - 西北边境省\n\n巴基斯坦运动基于这样一种逻辑：出于印度教徒压迫穆斯林的历史，两大宗教群体无法在一个国家内和睦共处。它主张建立巴基斯坦，即“纯洁之地”，以确保印度次大陆穆斯林的安全。巴基斯坦运动的成员倾向于推崇欧式政体，包括我们自己的政体，并认为这种体制比东边的印度教“异教徒”更优越、更尚武。\n\n近日，巴基斯坦首席军管行政官阿卜杜勒·加尧姆·汗在巴基斯坦运动的同意下与我们取得了联系。他是一个相当冷酷无情的人，并且认同我们的一些观点，但更重要的是，他和该运动的其他成员一样，认识到了我国作为巴基斯坦的潜在合作伙伴与盟友的可靠性与优越性。有关加尧姆·汗的背景信息以及V. N.提供的有关巴基斯坦运动的其他数据，请参阅附录B进行进一步研究。报告结束。\n\n愿德意志得到忠实守护。"
 PAK_Germany.1.a: "所以南亚次大陆上也有我们的人了，是吧？"
 PAK_Germany.2.t: "更近一步"
 PAK_Germany.2.desc: "“所以，加尧姆汗先生，我听说你们在俾路支省进展神速啊，是这样吧？”德国外交部长朝他的宾客点头致意，后者坐在了通常为伊朗大使预留的座位上。\n\n阿卜杜勒·加尧姆汗笑了笑。“我们做到了，外交部长阁下。我们甚至没有闻到一丝火药味——我们来，我们见，我们征服。就像贵国的已故元首三十年前巧妙地完成了德奥合并一样，愿他安息。当年我在报纸上读到这个消息的时候，我就对它印象深刻。”\n\n回忆起希特勒，外交部长微微抬起头，露出亲切的微笑。 “是的，我能明白其中的相似之处。但更重要的是……”听到这里，加尧姆汗精神抖擞起来，“……我看到了一条广阔的前路，让巴基斯坦运动不必再为物资和军备苦苦挣扎。加尧姆汗先生，我们已经顺利打通了一条线路，能够直接与你们相接触。”\n\n“您的意思是——”\n\n“是的，和您想的一样。第一批武器已经在路上了。德国从不亏待他的忠诚盟友。”\n\n加尧姆汗坐在座位上鞠躬敬意。"
 PAK_Germany.2.a: "“部长阁下，您的慷慨会得到报答，我保证。”"
 PAK_Germany.3.t: "米南德行动摘要"
 PAK_Germany.3.desc: "绝密\n仅供目视查阅\n呈送[getGermanIntelAgencyCaps]所有成员\n米南德行动\n\n白沙瓦－西北边境省\n\n在过去的72小时内，[getGermanIntelAgency]特工注意到巴基斯坦军队对旁遮普省和信德省的印军阵地发动了大规模进攻，巴基斯坦方面的信源也证实了这一点。尽管在最初的几个小时里，许多印度阵地都被突破或击溃，但此后他们得到了增援，目前双方的激战仍在持续。\n\n首席军管行政官阿卜杜勒·加尧姆·汗向我们声称，如果没有我国的持续支持，他并没有绝对的信心取得胜利。根据我们之前对巴基斯坦运动的承诺，我们必须在巴基斯坦军队对抗印度政府的战争中为他们提供充足的补给。报告结束。\n\n愿德意志得到忠实守护。"
 PAK_Germany.3.a: "我们必须抓住这个机会！"
 PAK_Germany.4.t: "从中到东"
 PAK_Germany.4.desc: "阿里从邮轮甲板向外眺望，自愿帮助受压迫的穆斯林同胞有时确实能带来意外收获——虽说他不太确定这是否符合当初他们在贾玛特哈纳招募志愿者时所许诺的那样，不过这艘德国邮轮供应的清真菜品确实优质，船员们的礼仪更是无可挑剔。\n\n广播喇叭突然响起：“女士们先生们，我们将在几小时后抵达瓜达尔。请带好随身物品准备离船，请小心，注意颠簸。”\n\n阿里抓起装备下船，朝着最近的巴基斯坦国旗走去。他报出姓名与国籍，在获得军礼致谢与“感谢您不辞辛劳前来支援巴基斯坦”的问候后，便投入新兵训练。\n\n基础训练异常严酷，那位穆斯林联盟国民卫队出身的巴基斯坦教官既苛刻又无情，唯有每日五次礼拜时间能稍获喘息。好在训练营里汇集了各个伊斯兰国家的战友：逊尼派、同属什叶派的弟兄，甚至还有几名负责军械与辅助训练的德国人。\n\n约莫两周后，阿里便站上了前线。他将步枪填装完毕，跟随小队出击前低声诵念清真言稳定心神，随即投身战场。"
 PAK_Germany.4.a: "好戏开场。"
 PAK_Germany.5.t: "从印度河到莱茵河"
 PAK_Germany.5.desc: "咔嗒。频道切换。电视镜头缓缓摇向刚刚被提及名字的德国外长。\n\n镜头再度切换——丹麦代表，又一位别国政要。再一位外邦使节，接着——\n\n“——以及今日首度莅临常任理事会的巴基斯坦伊斯兰共和国外交部长。女士们先生们，随着部长阁下莅临，巴基斯坦伊斯兰共和国加入团结协定及欧洲经济共同体的程序正式宣告完成。”\n\n巴基斯坦特使起身接受全场代表掌声，随即用德语念起了预先准备的演说。他盛赞德国在维护欧洲文化多样性及区域稳定方面的卓越成就，并承诺巴基斯坦将为协定及欧共体盟友提供坚定支持。\n\n全场起立鼓掌。与此同时，电视机前的男子颔首品评，悄然离席。"
 PAK_Germany.5.a: "一丘之貉罢了。"
 PAK_Germany.6.t: "加倍，加倍"
 PAK_Germany.6.desc: "“既然如此，部长阁下。我国政府希望探讨巴基斯坦进一步融入欧洲经济共同体的可能性，尤其是与德国经济圈的深度整合。”\n\n巴基斯坦外交部长注视着德国财政部长，对方缓缓颔首道：“没错，事实上我方已甄别出若干有益于德国经济的商品。”\n\n巴方外长翻阅文件：“这些物资我们当然可以提供。同时我们也筛选出若干对巴基斯坦发展有益的德国商品与服务。长远而言，我们期望巴基斯坦能比肩德国繁荣，至少将印度远远抛在身后。”\n\n财长以指节轻抵下颌思忖片刻，决定稍转话锋：“部长阁下，我们自当尽力而为。不过眼下，我听闻贵国属地毯工艺卓绝。元首寿诞将至，我正为挑选合适寿礼发愁，不知您能否……”\n\n巴基斯坦外交官喜笑颜开：“乐意效劳，部长阁下。”"
 PAK_Germany.6.a: "“我们有很多样品。”"
 PAK_Germany.7.t: "苦劳"
 PAK_Germany.7.desc: "孩子们在织毯机前辛苦劳作，他们的故事虽细节各异，但悲剧却是相同的——父母或因无力喂养，或因渴望金钱，卖掉了亲生骨肉。\n\n昔日他们尚能举目四望，看见外面的世界。可在这牢笼里，唯有几缕吝啬的光线、轰鸣的织机、监工厉声催逼的咆哮，以及永无止境的劳作。少数弄到书的孩子也根本无法阅读。若他们识字，或许能明白自己已经沦为债务奴隶——但本应用于学习的时光，早已在织机前佝偻成永恒的无知。\n\n直到血珠染红纱线，最新一块地毯方告完成。监工粗暴地扯走地毯送往厂长室，后者满意地审视作品。这或许并非工厂最杰出的产品，但德国人又懂什么优劣呢？\n\n厂长将地毯卖给中间商时，立即掐灭了刹那闪过的减债念头——即便施舍怜悯，债务也永无清偿之日。何况他需要每一分钱构筑新宅邸，购置更多让孩童们俯首其上的织机。转身间，呵斥声已砸向另一群颤抖的小身影。\n\n地毯铺陈在元首办公室，谦卑地匍匐在希特勒肖像下的荣耀之地，元首凝视它的目光充满赞叹，美才是唯一值得关注的，至于来处？无人关心，纵使知晓，也不过仍不过是与他无关的牺牲罢了。"
 PAK_Germany.7.a: "与此同时，工厂仍在继续运转。"
 PAK_German_technical_assistance: "德国技术援助"
 PAK_German_training: "德国训练"
 PAK_Germany.8.t: "迷烟幻镜"
 PAK_Germany.8.desc: "厚重的烟雾弥漫在科伦坡加勒菲斯酒店的天鹅绒豪华总督套房内，甚至还遮蔽了吊灯投下的光线，将德日外交官们紧绷的面容笼罩在流动的阴影中。巨大圆桌右侧端坐着三位德国资深外交官，他们身着镶银边的深蓝黑色制服，头戴尖顶大檐帽。对面则是古板的日本人，他们像商人般翻阅文件交头接耳，不时还窃窃低语。\n\n奥托·冯·施泰因巴赫男爵慵懒地叼着香烟，审视着对面木头人提出的条件。现代外交的弊病之一，就是这种无趣的坚持——非要让根本无法理解这些事的民众感到满意，这些人若非被野心家煽动，根本懒得关注这些事。共荣圈的开场白聚焦于“对现状的双边认可”、“裁减军备与可控博弈”以及“互惠人员交流以实现合作”，他们的德语翻译是清酒喝多了吗？\n\n自始至终都没有提及对巴基斯坦的承认，没有边界限制，没有承认声明，没有外交关系。而这最终正合尊贵的男爵心意——他此刻的任务并非真正谈判，而是争取时间。显然共荣圈也在做同样的事。身后的助手悄然递来纸条：“再拖两天”。他利落地将香烟按灭在华丽的烟灰缸里，清了清喉咙。"
 PAK_Germany.8.a: "“诸位，我认为现在最应考虑的是如何为现场观察员供应物资……”"
 PAK_Germany.9.t: "牧猫记"
 PAK_Germany.9.desc: "吕措上校脸上汗珠滴落，办公桌风扇徒劳搅动着潮湿的空气。派驻旁遮普犹如深入沸腾蒸笼，但数十年普鲁士式纪律让他即便浑身不适也不曾松开领带。敲门声宣告着巴基斯坦地方部队某位指挥官到来——此人将就两周后的部署进行汇报。\n\n“那么，汗下士？新步枪训练进展如何了，士兵们应该更喜欢NF-LAG而不是老式李-恩菲尔德吧？沙漠耐储口粮分发下去了吗？”\n\n“上校先生，我谨报告因相关资金不翼而飞，地方指挥官不见踪影，新型枪支尚未到货。此外耐储口粮库存量大幅缩水，有一部分被扮成士兵的农民冒领了，因此我军人数有所减少。”\n\n吕措上校太阳穴旁的青筋跳动着，他靠着钢铁般的意志才没有当场爆发，只是将撑在桌上的拳头攥得发白。\n\n“下士，有多少百分之多少的新兵参加了上次教导会议？”\n\n“上校先生，我谨报告我们现保有初始兵力的32%。”\n\n“你——”\n\n“万分抱歉打断您，上校先生。另有一份报告，今早反坦克训练中发生了不幸事故，有发弹药掉在地上误击发了。”\n\n“……结果如何？”\n\n“上校先生，现有32%兵力中，18%需要住院治疗。”"
 PAK_Germany.9.a: "“这一定是玩笑，肯定是玩笑。”"
 PAK_Germany.10.t: "回归黑暗"
 PAK_Germany.10.desc: "德国海军的钢铁巨兽破开阿拉伯海沸腾的波涛，庞大的舰体在浪涛间犁出锐利的白色航迹。漆黑的上层建筑与深海钴蓝形成鲜明对比——这种明目张胆违反战术规范的涂装彰显着挑衅。航空母舰“阿道夫·希特勒”号是V字队形的领航舰，甲板跑道上的巨型万字徽直指浪花深处，其右翼是巡洋舰“腓特烈·巴巴罗萨”号与驱逐舰“埃姆登”号、“沃坦”号、“埃里希·克尔纳”号，左翼则是巡洋舰“瓦泽查海军上将”号及驱逐舰“铁拳”号、“傲慢”号、“埃里希·吉泽”号。深水之下，六艘U艇悄然潜行，它们携带的武器足以摧毁整片次大陆。这支曾随破碎帝国沉沦的海军，如今重归汪洋。\n\n在卡拉奇港此起彼伏的警报蜂鸣与人们的嘶喊中，弥漫着深切的不安。那些见证过百艘船进港、千艘船离港的码头工人们，早已听闻流言：德国人非为友邦，实乃新主；将他们从德里暴政中解放的运动，背后却隐藏着套上新的枷锁；东方边境更传来流言——当日本忍无可忍之时，卡拉奇必将成为旭日炙焰下首片焦土。\n\n温斯多夫地底深处，国防军最高统帅部纯白作战室内，海军总司令埃里希·托普面色凝重。参谋们手持长杆，将微型舰船模型推过覆盖整面墙的阿拉伯海巨幅地图。越过印度次大陆半岛，在孟加拉湾标示日本帝国海军所在的红色标记几乎静止——疑似最后现身斯里兰卡附近的潜艇分队，已逾数小时未动分毫。"
 PAK_Germany.10.a: "放马过来吧，我们赢得了阳光下的地盘，自然也要守住它。"
 PAK_Germany.11.t: "不要眨眼"
 PAK_Germany.11.desc: "“施泰因巴赫阁下，若贵方缺乏诚意，谈判自然也难以进行。据可靠情报，至少十艘核潜艇正自苏伊士运河驶入阿拉伯海——相关影像证据不日便将公之于世。” \n\n冯·施泰因巴赫男爵眼角微微皱起。这个东方人从何处习得德语暂且不论，但贵族礼数显然是一窍不通。数十年外交历练让他的应答依旧从容：\n\n“我向您保证，任何向阿拉伯海的调动都严格遵循元首一周前签署的指导方针。若贵方持有相左证据，请即刻出示。反倒要提请东京的朋友们注意，迄今为止贵方拒绝接受我方提出的任何提案——究竟是谁在阻挠和平进程？”\n\n此刻他们已不在舒适的总督办公室内——为容纳各方代表，恢弘的禧宴厅被启用，长桌两侧挤满共荣圈使节、协定各国要员，南端角落还坐着数位国际观察员。美国人虽未现身，但眼尖者能注意到数名带着明显晒痕的“拉美”观察员正凝神倾听。若非日本人的指控正中要害——国防军与海军部署确实延误近两周——男爵几乎要嗤笑出声。毕竟英法尚会犹豫退缩，但眼前这些旧日盟友，可是宁为玉碎，不为瓦全的武士。"
 PAK_Germany.11.a: "温度攀升，魔鬼奏响邪典乐章。"
 PAK_Germany.12.t: "买通进路"
 PAK_Germany.12.desc: "“感谢诸位拨冗会晤。”赛义德·阿比德·侯赛因少将十指交扣于会议桌上，“我相信团结协定的兄弟国家定能在危难时刻施以援手。”对面三人虽有名讳，他却更愿以心中诨号相称：仰靠在椅背透过墨镜居高临下打量的“军火贩子”；笑容只见白牙不见眼纹的“商人”；以及面若冰霜的“部长”。\n\n“好说，朋友。”军火贩子吸了吸鼻子，“这枪如何？”侯赛因面前硬壳箱内躺着一支崭新卡尔·古斯塔夫m/45冲锋枪，\"全新出厂。\"少将取出其中一支，精工锻造的质感远胜民团装备。\n\n“该谈谈付款了。”商人翻开文件夹，“这批枪支可签署五年租约，贵政府需按年支付——”\n\n“没有这个必要。”侯赛因脱口而出。三道目光刺来，他却岿然不动：“由我担任主要承租人，账单直接寄给我。”明知这是笔巨款，但身为大地主的他自有底气。政府负担不起民团的费用，自掏腰包固然让他背上负担，却也其中也蕴含着换取政治资本的良机，他自然不会放过。\n\n部长对这非常规操作面露难色，却在少将钢刃般的注视下叹着气向军火贩子点头。后者击掌喝彩：“好！我马上派手下来把细节定了。合作愉快，少将先生。”"
 PAK_Germany.12.a: "侯赛因只希望武器能按期运抵。"
 PAK_Germany.13.t: "欧共体的东方边疆"
 PAK_Germany.13.desc: "宴会厅处处流光溢彩：水晶吊灯、玻璃器皿、抛光打蜡的地板与墙面鎏金饰边。在参加欧洲经济共同体最新会议的欧洲各国大使眼中，这不过是小国打肿脸充胖子的浮夸排场。但某些人暗自思忖：听说会场是在数日之内仓促布置完成，部分陈设新得甚至都能在表面找到细小指痕——这般赶工之下竟有如此品质，倒也称得上惊艳。\n\n直到一位仪态端庄的白人女性登台，这群欧洲贵客才稍显专注。她自称詹妮弗·穆萨，乃是爱尔兰裔巴基斯坦公民，此番前来，是为了向世人证明南亚与西方世界的亲缘远超想象。翡翠色安纳卡利长衫上的金线刺绣与厅内华灯交相辉映，曾为护士的温婉嗓音清晰流淌：\n\n“穿梭于两个世界的经历，让我深知欧罗巴与巴基斯坦血脉相通。我们都致力于捍卫强盛纯粹、至高无上的民族美德。纵使传统价值遭异端入侵者践踏，我们仍以钢铁意志守护文明火种。尽管细节或有差异，但我们都秉持对家庭、国家与上帝的忠诚。我恳请在场诸位认可这份共鸣，将信任托付给团结协定的最新成员。终有一日你们会和我一样，明白这份信任必将收获丰厚回报。”\n\n多数德国代表面露不屑，却也有听众被这番说辞打动。一位法国商人系雷诺公司的代表，之前曾赞赏当地商业手腕，此刻便是深受触动。穆萨甫一退场，他便疾步至最近的电话亭，拨通了当地合作伙伴的电话。"
 PAK_Germany.13.a: "“让？是我，这有个赚钱的项目，你想不想来？”"
 PAK_Germany.14.t: "告别"
 PAK_Germany.14.desc: "巴基斯坦政府中稍微有点头脸的人物都被塞进了拉合尔的德国飞机。德国人给所有可能有利用价值的人都发了机票和签证，要求他们带上家当登机。\n\n级别最高的留守军官是陆军总司令阿卡巴·汗将军，他将继续指挥作战。民车军车竞相涌入机场，军队和民团试图维持秩序却无济于事。人们抢着登上飞机，也有人被推下来，更有人亲离子散，撤离越是拖延，混乱也更无法收拾。\n\n阿卡巴·汗无数次咒骂着这混乱场面，看着一架VIP专机起飞，不禁感谢真主的小小仁慈。至少总理和内阁成员安全撤离了。\n\n飞机上的总理中捂着脸自叹。\n\n“气死我了！怎么搞成这样，”费罗兹·汗·努恩喃喃自语，苦涩的情绪翻涌，“这艘破船跟泰坦尼克号的有什么两样，反正早晚都要沉。当初这帮搞分裂的来到努尔布尔努恩的时候，我就应该往印度跑，真不该加入他们。”努恩咒骂着自己的人生选择，舷窗外的巴基斯坦正渐渐远去。"
 PAK_Germany.14.a: "一去不返。"
 PAK_Germany.15.t: "山河破碎"
 PAK_Germany.15.desc: "鉴于巴基斯坦伊斯兰共和国政府已无力满足人民之需求；\n\n鉴于其失能导致共和国全境陷入内部骚乱，军力捉襟见肘、民团擅离职守、农村起义此起彼伏；\n\n鉴于德国政府试图利用巴基斯坦人民谋取私利未果，仅撤离对其有用之人，致使其余民众陷入绝境；\n\n鉴于两国政府之权谋运作，原巴基斯坦地区实质上已陷入无政府状态，此等情势断不可容忍亦不得延续；\n\n吾等公民、警察及军人心系本域福祉，谨代表西北边境省、西旁遮普省、信德省、俾路支省、自由克什米尔地区及其他被消失政府占领地区，向自由印度总统保证，将全力支持自由印度军在境内恢复秩序——谨此恳请自由印度共和国行政与立法机构立即承担前巴基斯坦伊斯兰共和国之治理职责。"
 PAK_Germany.15.a: "署名：拉合尔紧急会议"
 PAK_Germany.16.t: "行将就木的军队"
 PAK_Germany.16.desc: "一名上校重重拍打办公桌。与自由印度的战争从未顺利过，如今西北边境省更首当其冲，这一点在该省某民团营地体现得尤为明显。\n\n“那些分队到底在哪里？他们他妈的到底去哪儿了？”\n\n上校的秘书烦躁地放下电话，任由话筒掉在桌上。“我给每个分队都打过电话，哪怕是那些离印度人十万八千里远的，也没有回应，就好像凭空消失了一样。”\n\n“继续找，该死的。”上校吼道。正当秘书开始打电话时，外面传来愤怒的喧闹声。一名中尉冲进来，面色惨白，结结巴巴地说：“外面有群武装暴民！他……他们要求我们释放民团里的家属！”\n\n上校挥手赶他走。“他们不知道我们正在找？找到了自然会把人交出去。”\n\n“我们交不出人，”秘书说，“大部分人可能都死了，我们——”"
 PAK_Germany.16.a: "紧接着营地便遭到袭击。"
 PAK_Germany.17.t: "守望哈弗尔"
 PAK_Germany.17.desc: "遗弃阿克巴·汗的飞机吐出一批批流亡者，他们在德国各地扎根。\n\n有人试图融入新世界，将颠沛流离抛诸脑后，另一群人却紧攥重建伊斯兰共和国的幻梦，成立了复国协会，抨击自由印度是非法占领巴基斯坦的印度教政权，誓言要以正义之师驱逐这群日本傀儡。\n\n但一切终成空谈。他们甚至调动不起本地人的支持，那些尚愿倾听巴基斯坦流亡者咆哮的德国人，总忍不住想戳破真相：德国军队当年夹着尾巴逃离印度河谷，将巴基斯坦逐出团结协定，自然是有原因的。不管在哪里，那些对此感兴趣的德国人，常在“戳破真相”与“任其沉沦”间挣扎。\n\n一年、两年、三年过去。起义杳无音讯，阿克巴·汗失联，巴基斯坦民团毫无动静，穆斯林联盟国民卫队的起义更似泡影。少数能获知印度河谷消息的人听闻，那里早已无人谈论巴基斯坦。流亡者的聚会上，绝望如阴云笼罩，尽管他们仍机械地复诵着“自由巴基斯坦终将到来”的陈词。\n\n僵局中，某种觉悟悄然滋生。但无人愿承认，将巴基斯坦推入虚无之境的正是德国。于是他们继续咒骂印度侵略者与日本异教徒，像拨弄余烬却质问为何不起火的人。"
 PAK_Germany.17.a: "没有加速度，就没有力量。"
 PAK_progressivism_party_long: "真主忠仆(Khudai Khidmatgars)"
 PAK_socialist_2_party_long: "农民委员会(Peasant Committees)"