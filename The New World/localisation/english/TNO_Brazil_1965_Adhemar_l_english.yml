##Focuses
BRA_adhemar_german_influence_tt: "§hAdhemar§! has not taken too many §gpro-German§! decisions."

BRA_the_adhemar_presidency: "The Adhemar Presidency"
BRA_the_adhemar_presidency_desc: "The Lord be praised, we've made it! The presidency is Adhemar's!\n\nSome comrades were lost through the perils of electoral politics. Vice-presidential candidate Edna Lott has defeated President Adhemar's friend and associate Laudo Natel. Cohabitation with a moralistic left wing Vice-President is likely to restrict President Adhemar's ambitions. That said, it is not yet time to strike.\n\nWhile we await for Edna Lott's guard to drop down, the President has an ambitious plan to prove his abilities to the voting public. Drawing from his medical training as well as his time in São Paulo politics, Adhemar has had ample experiences with Brazil's dysfunctional medical system. Former President Lott, busy with his lobsters, agrarian reforms, and South Africa, has failed to build on the work done by Kubitschek. The public system is thus vastly underfunded and failing to meet demand. Our reforms will turn this around.\n\nWe will focus our attention on the nation's health, to prove that President Adhemar not only steals, he also does!"
BRA_setting_up_the_house_of_cards: "Setting Up the House of Cards"
BRA_setting_up_the_house_of_cards_desc: "No man rules alone. Wise courtiers know their importance to their prince's efforts. Wise princes in turn know the importance of capable courtiers whose allegiance can be guaranteed.\n\nPresident Adhemar has begun naming ministers, finding advisors and hiring other key officials. Most of the candidates are alumni from São Paulo's school of politics; friends of Adhemar, oftentimes owing a debt to the President... Sometimes literally. These men got things done in São Paulo while keeping the graft to a tolerable level. They will be asked to replicate their efforts in Brasília, starting with helping the President's healthcare blitz.\n\nLoyal as their men may be, not all of them are friends with one another. Many no doubt hold skeletons in their closets. The opposition will be on the lookout for any sign of dissent or corruption within the cabinet. President Adhemar is building a house of cards, and needs to be careful about his next few choices, lest a joker bring down the whole edifice."
BRA_shut_her_out: "Shut Her Out"
BRA_shut_her_out_desc: "Vice-President Edna Lott is determined, ambitious, righteous and believes she is God's gift to the poor Brazilian workers. All character traits that make her wholly unsuited for Brazilian politics, let alone a role within President Adhemar's projects. She is likely to seize the first whiff of corruption as an opportunity to undermine the President. And the presence of the PTB's messiah within any of the President's project is likely to irritate our allies on the right. In a word, Edna Lott is dangerous.\n\nSidelining her at this early step will ruffle feathers within the PTB. Signaling that we have no intention of giving the Vice-President any power or influence will certainly make her double down on her opposition to Adhemar's presidency. Yet what else can be done? Any scrap of information she retrieves will increase the danger she poses to us. Edna Lott fought us for the vice-presidency. The Lord teaches to forgive our enemies... But He does not begrudge us for sleeping with one eye open when surrounded with danger."
BRA_let_her_in: "Let Her In"
BRA_let_her_in_desc: "Yes, it is true that the relationship between the President and the Vice-President is frosty. But Edna Lott's heart is in the right place, for she truly cares about the fate of society's poorest. Having seen her integrity, dignity, and sound speech, the President will now offer her a chance to be a model of good works.\n\nWorking with Edna Lott and the PTB will help make our healthcare bill much stronger. It will help drive a wedge between the old PTB-PSD coalition, and keep our left flank secure. The political cost to this will be opening up our government to attacks from the right wing, especially within the UDN. Assuming the bill goes through, however, this need not be a problem; baiting the UDN into attacking our government over our willingness to work with other parties will make them look callous and cruel once the poorest Brazilians are given healthcare.\n\nThe UDN will be put to shame, having nothing evil to say about us and our efforts to help all Brazilians!"
BRA_working_with_the_udn: "Working With the UDN"
BRA_working_with_the_udn_desc: "Going at it alone without the Vice-President's party will require other sources of support. The conservatives of the UDN are leery of our President's populist instincts. Nevertheless they can be convinced to work with us. By integrating Christian institutions into the fabric of the healthcare system as well as through pork barrel spending for various UDN constituencies, we can secure the backing of the conservatives. Many of our enemies on the right criticize government overreach, yet few do not realize how useful it is in securing re-election from grateful voters.\n\nOf course the joyless crow will bitterly oppose this. Yet for all his croaking, Lacerda does not control all of the UDN. Stealing from hist nest will no doubt enrage him. President Adhemar would rather live with a weakened and angry Lacerda than without healthcare reform."
BRA_building_on_kubitscheks_work: "Building On Kubitschek's Work"
BRA_building_on_kubitscheks_work_desc: "President Kubitschek was a man of too many projects for a single presidency. He no doubt hoped to build upon his basic reforms of healthcare through a second mandate. Unfortunately for him, Kubitschek did not account for the possibility of a newcomer hijacking the PSD's dominant position.\n\nWe will make good use of the former President's reforms as well as the nascent healthcare bureaucracy he helped create. The health sector represents among other things a veritable cornucopia of civil service appointments we can use as spoils for friends within the party as well as for corporate lobbyist. By merging industry expertise and resources with loyalists of our party establishment, President Adhemar hopes to build a political structure to last the ages. The house of cards always needs delicate attention, after all.\n\nLet us only pray that Vice-President Lott, overjoyed as she is over healthcare reform, does not realize what we are up to."
BRA_cooperating_with_the_ptb: "Cooperating with the PTB"
BRA_cooperating_with_the_ptb_desc: "As expected, opening the door to Edna Lott has caused another door to close on the right. Many UDN politicians have sulked off, already writing off our healthcare reforms as communist drivel. President Adhemar will not mourn their absence, but will remember to name and shame them once the public is given a new healthcare system.\n\nThe PTB have shown themselves surprisingly cooperative after our show of good faith in bringing the Vice-President onboard. Important labour members such as Brizola and Goulart have requested meetings with the President to hash out details. Their requests are likely to be costly, and increase the scope of our healthcare reforms. This is likely to annoy some of our party's backers. They should know better, however; the PSP is a party of doers, not complainers, and President Adhemar is not scared by a little increase of the debt."
BRA_cooperating_with_udn_governors: "Cooperating with UDN Governors"
BRA_cooperating_with_udn_governors_desc: "Beyond the federal scope of the debate, healthcare reform will need to pass through the various state institutions in order to go into effect.\n\nMost state governors, be they right wing or left wing, jealously guard their prerogatives. We can be assured that the left leaning governor will at least listen to our proposal, no matter how tepid their attitude. However, more conservative states are likely to staunchly oppose our effort. In these governor's view, a national healthcare reform is at odds with the federal nature of our great republic.\n\nPresident Adhemar must thus set to work convincing UDN aligned governors such as Paraná state's Ney Braga. Thankfully the assistance of the national UDN will be of great help in this endeavor. As will the President's usual combination of charm, cajoling, veiled threats and bribes. One way or another, the conservative states must bend the knee to our efforts, states' right be damned!"
BRA_expand_the_ambulance_system: "Expand the Ambulance System"
BRA_expand_the_ambulance_system_desc: "One of Kubitschek's good ideas within the healthcare ministry was to introduce the age of ambulances to Brazil. Governor of São Paulo at the time, Adhemar built on this trend by building up São Paulo's fleet of motorized ambulances. Now comes the time for the rest of the country to be equipped with ambulances.\n\nOf course, great reforms need not come at great cost. We are to begin a bidding war between the Japanese company Toyota, the American Ford company as well as local Brazilian constructors. The foreigners' attempt to get into our good grace will no doubt enrich the party with kickbacks. Meanwhile friendly local businessmen will receive their share of the contract in return for political goodwill. This way everyone can be a winner, the Brazilian tax payers most of all."
BRA_expanding_the_vaccination_programs: "Expanding the Vaccination Programs"
BRA_expanding_the_vaccination_programs_desc: "Brazil may be blessed in its geography by its considerable size. Its equatorial position and its vast jungles, however, have brought with them a range of diseases. Too many of our citizens continue to live hobbled by tropical diseases. Many find their life prematurely ended by them.\n\nSaving these citizens is possible through the modern wonder of vaccination. Many illnesses that were once life sentences can now be ended through a simple inoculation. Many Brazilians are not afforded this life changing possibility simply because of the remoteness of their villages.\n\nSão Paulo under governor Adhemar saw vast vaccination campaigns. Brazil under President Adhemar must now see the same, a national effort to contain and eliminate preventable diseases. So our national health reform must begin, by a great crusade against the tiniest enemy of all."
BRA_an_unholy_alliance: "An Unholy Alliance"
BRA_an_unholy_alliance_desc: "The Brazilian political scene has begun boiling over since the so-called 'unholy alliance' has been revealed to all. Members of the conservative opposition have constantly cried out about our alliance with the radical left. Some of our party's members have joined the UDN in their grumbling, openly voicing their opinion that we are caving in to communists and other extremists.\n\nCriticized from all sides, President Adhemar has decided that the safest way through this valley of shadows is straight ahead. By doubling down on our alliance with the radical members of the labour party, our government can get this healthcare bill to the finish line. We must fear no evil, confident in the Lord's will."
BRA_improving_the_central_bureacracy: "Improving the Central Bureacracy"
BRA_improving_the_central_bureacracy_desc: "President Kubitschek's pharaonic ambition required an entire chain of commands of scribes, bureaucrats, and high priests. Thankfully this expanded and strengthened bureaucracy extended to healthcare, where Kubitschek built some improvements. The old President also took some time to streamline as many departments as he could.\n\nUnfortunately, this bureaucracy is in many aspects still overly complicated. We can cut down on the bloat to make the system faster, cheaper, and better integrated with private healthcare firms. In addition, the concentration of power into fewer but more important positions will open many jobs for allies of the party and the President. We can thus leave our mark on the healthcare system for years to come by staffing the bureaucracy with loyal and competent men... No matter their origins."
BRA_convincing_the_senate: "Convincing the Senate"
BRA_convincing_the_senate_desc: "Getting the bill through the Senate will require the help of every ally we can get... As well as quite a few of our enemies' grudging support.\n\nBy expanding additional efforts and political capital, President Adhemar will be able to influence one more party to back our efforts in this final stretch before the senate vote. From influencing skeptical UDN members, to securing the unity of the PSP, to obtaining the help of members of the PTB or PSD, this final push will be of great importance to our objective.\n\nThe President is not assured success in this venture. Nevertheless as a man of action, he much prefers acting instead of standing still until the final vote in these final hours."
BRA_creating_a_national_public_option: "A National Public Option"
BRA_creating_a_national_public_option_desc: "Many accused Adhemar of megalomania when first running for the presidency. Thankfully, our boss cares not for the thoughts of lesser minds, too concerned with others' opinions to carry on with the hard work of governance. After talks with the PTB, President Adhemar plans a project yet unseen in world history. A national public option, aiding the nation's citizens from cradle to grave.\n\nEven within our party, many are now right in the open arguing this policy goes too far, that a 'bolshevization' of healthcare will be a costly blunder. Many provincial governors, especially those aligned to the UDN, are tempesting about the end of the federation, about gross overreach into each state's affair, about Adhemar's descent into corrupt Bukharinism.\n\nThe President is convinced to steam ahead. Backed by Edna Lott, President Adhemar knows that this policy is very popular within our party's voters as well as within the PTB's membership. Through this master stroke, President Adhemar will secure his presidency as well as plant the seed of the PTB's collapse into an irrelevant junior partner of our government as left wing voters flock to our banner."
BRA_present_the_bill: "Present the Bill"
BRA_present_the_bill_desc: "It is all over but the counting. President Adhemar has obtained the backing of all those he could. It is now time to present the bill to the Senado.\n\nMuch political prestige rides on this. We can only hope that we've prepared enough."
BRA_celebrating_our_great_victory: "Celebrating Our Great Victory"
BRA_celebrating_our_great_victory_desc: "Victory!\n\nThe healthcare bill has sailed through legislation without a hitch. President Adhemar has signed it into law in front of assembled journalists and supporters, to wild applause and cheering. We can now celebrate this victory, as well as turn to face the future.\n\nThe effects of our victory here will prove to be multi-faceted. Our successful negotiations have amply shown to the political class that for all his quirks and foibles, President Adhemar is a skilled negotiator and one that can be done business with. The passing of the healthcare act will also help sink Lacerda further as our grip on the right is secured, if not through ideological purity, then through popularity. Finally, with our political base energized, we are free to turn toward the economy, in order to enrich Brazil and ourselves.\n\nVice-President Lott will no doubt monitor our further progress. With the governing party secure, President Adhemar will also be free to turn to his troublesome Vice-President, in due time."
BRA_blame_them_for_its_failure: "Finding a Fall Guy"
BRA_blame_them_for_its_failure_desc: "Failure! The bill has been strangled in its cradle, as perfidious senate members have turned out in great numbers to block our progress.\n\nThis loss has been particularly bitter to President Adhemar by hurting his personal brand. The man elected to steal and do has shown himself incapable of doing. Where does that leave Brazil?\n\nWith Lacerda's vultures circling, it is time for us to go on the counter-attack. The situation calls for a fall guy. Unfortunately for our economic minister Barreto, he is to be the scapegoat.\n\nBenedito Manhães Barreto will be sacked for his 'failures'. In his place, President Adhemar will name a new candidate, an old face that everyone knows and respects, our current Chief of Staff, Laudo Natel. Our coalition stabilized, we will be free to move to new projects."
BRA_planning_our_next_steps: "Planning Our Next Steps"
BRA_planning_our_next_steps_desc: "The Palácio da Alvorada has seen a whirlwind of activity of late. Meeting with prominent politicians, with industrialists, with economists. Union leaders brush shoulder with bureaucrats in the corridors of the presidential estate. In the middle of all of this, our President, serving as maestro as Brazil's future is being drawn up.\n\nA South American Las Vegas, where tourists from all over the world come for pleasure and relaxation. A regional economic juggernaut, sitting on modernized infrastructure with an optimized bureaucracy. A political establishment working in concert, anchored around the solidified PSP.\n\nAll of these are coming to Brazil, and more. And in between planning meetings, President Adhemar has had a phone call or two to Switzerland. Important to keep track of his secret bank account, of course. President Adhemar always plans for the future."

BRA_eradicate_illiteracy: "Eradicate Illiteracy"
BRA_eradicate_illiteracy_desc: "About 1/3rd of our population, or over 25 million Brazilians, are unable to read or write, or both! This illiteracy crisis is mostly felt in the rural areas, forgotten by the big city bureaucrats that led the urban areas to prosperity while the common Brazilian floundered in the countryside. For far too long, they have been left without the proper tools needed to advance in education and it is quite simply unacceptable that these people continue to be neglected, especially by our government. By beginning a comprehensive education program, we will be able to ensure that these people get the education they deserve, granting them the same opportunities as their fellows in our great cities! And who knows: maybe their newfound education will give them the common sense to vote for us come election season..."

BRA_national_school_expansion_program: "School Expansion Program"
BRA_national_school_expansion_program_desc: "One of the main driving forces to the illiteracy crisis is the severe lack of schools in rural areas and the favelas. In some of these places, up to 3/4ths of the population are completely unable to read and write, let alone have access to the appropriate services to learn! We need to alleviate this issue immediately by pursuing the construction of schools all over Brazil's poorer areas to get these people access to education. After all, it has always been our true goal!"

BRA_start_in_amazonas: "Start in Amazonas"
BRA_start_in_amazonas_desc: "The vast northern region of Amazonas makes up about 40% of Brazil's total landmass, not to mention the biggest forest in the world! Yet, as we reap the wonderful harvest of its material resources, we have neglected the people that live and work in it. Amazonas is often forgotten and quite underrepresented in national policies as the focus has always been on its resources, yet we must care for its people too. Therefore, we should begin our program here and prove that we shall care for all of our citizens, even in the furthest reaches of our nation. Though, we must temper our financial expectations, as it will no doubt be a monumental expense to provide the region with the necessary schools."

BRA_listen_to_ednas_ideas: "Edna's Ideas"
BRA_listen_to_ednas_ideas_desc: "Even though it would be more preferable for us to go with an all-PSP program with our education reform, it cannot be denied that Vice President Lott is a lot more experienced in the education sector than us. Edna knows more about the needs of teachers than anyone else in the cabinet, so it would be foolish not to seek out her advice to ensure that our program will succeed... We can also use this opportunity to limit the amount of funds coming out of the treasury to "guarantee" a smooth passing of the bill with the Labor support this will surely shore up."

BRA_maintain_high_standard: "Maintain High Standards"
BRA_maintain_high_standard_desc: "The teachers of Brazil work a thankless and frustrating job in educating the youth of our great country. As such, it is of paramount importance that we maintain our high standards by taking various measures to make their jobs more rewarding. We will codify their rights into law, like minimum wage, student relations, career advancement, and more. In addition, we will organize training courses in order to make sure they are up to standard as well as to expand their capabilities upon Edna's advice. Evidently,this can all come when the teachers' unions change their tune from PTB to PSP. Until they're singing about our own Mr. Rouba Mas Faz, they are not getting a single cent from this program."

BRA_pay_raises_for_teachers: "Raises for Teachers"
BRA_pay_raises_for_teachers_desc: "Inflation hurts all sectors of our great society, teachers especially. We need to raise their wages to adapt to the change in prices as well as raising their societal standing based on their merits and experience. This will encourage them to continue teaching amidst our economic situation and incentivize others to start educating our youth too. Where will the money for this come from? We needn't worry about it, we'll find a way if anything goes awry..."

BRA_help_nordeste: "Aid Nordeste"
BRA_help_nordeste_desc: "The Nordeste region is where it all began more than 400 years ago, in 1500. It was here the Portuguese landed in Brazil, and it is here where the foundation of the Brazilian nation was laid down in the old capital of Salvador. And now? It is a mostly agricultural region, its once powerful position overtaken by the modern prestige of Brasília. We need to restore the glory the Nordeste once held so proudly, thus we should expand the education program here next with the construction of schools and training of teachers all across the region. While it may not be as resource-rich as the Amazonas, it has the highest number of states and thus the highest number of senators to be elected, which makes it quite important to us. After all, how is a man who cannot read or write supposed to lead and vote?"

BRA_fullfil_psp_promises: "Fullfill Our Promises"
BRA_fullfil_psp_promises_desc: "At the insistence of our Minister of Education, we do not need to come up with any new groundbreaking policy for our reforms; we must only deliver what we promised during campaign season to make the voters happy. While the policies we have chosen to implement are not necessarily the most efficient, what matters the most is that they are the most popular with the general public."

BRA_establish_pilot_agrarian_program: "Pilot Agrarian Programs"
BRA_establish_pilot_agrarian_program_desc: "One of our biggest promises in our great educational undertaking is the establishment of agricultural schools in three grades: One for rural workers, one for technicians and rural teachers, and lastly, one for agronomists and veterinarians. We will slowly work towards this promise by beginning a pilot program in Centro-Oeste, a mostly agricultural region that had started real development under the administration of Kubitschek. This way, we will not only be able to fulfill our promise and uplift people, but also be able to gain support by finishing what Kubitschek had started there."

BRA_equality_of_state_and_private_education: "Equalise Education"
BRA_equality_of_state_and_private_education_desc: "Despite our comprehensive educational reforms, this is a great undertaking we cannot hope to accomplish alone. We must abolish the taxation of private schools and institutions, which will encourage their establishment in order to have equality between the public and private education sectors. Conveniently, this will only (positively!) affect the upper and parts of the middle class, allowing us to shore up support from conservatives. What a win for everybody!"

BRA_put_the_bill_to_vote: "Push It Through the Senado"
BRA_put_the_bill_to_vote_desc: "With the bill clearly defined, now comes the true Herculean task: actually pushing the bill through Congress. We will have to work double time on pulling favors and sending out bribes in order to make sure that Adhemar's bill passes at all costs. Its approval will be a significant boost to our popularity, and will above all prove that the man who steals from the people also delivers the most for them!"

BRA_renovate_old_schools: "Renovate Old Schools"
BRA_renovate_old_schools_desc: "While we are building countless new schools, we mustn't get ahead of ourselves and forget about the schools that are already standing. These schools are hot, they're crowded, some of them don't even have proper sanitation. These conditions are appalling and simply unacceptable! We must send appraisers immediately to calculate the cost of renovation and flag the schools that need them the most. Out with the old and in with the new and renewed!"

BRA_increase_health_awareness: "Increase Health Awareness"
BRA_increase_health_awareness_desc: "Our great President Adhemar is, first and foremost, a student of medicine, and he has not forgotten his roots as a doctor. As such, he understands more than anyone that preventing, not curing, is the key to wellness. We will send doctors to schools throughout Brazil to examine the health of the youth, treat any minor ailments they may have, and educate them on basic hygiene and proper nutrition. For a healthier, energized Brazil!"

BRA_promote_sport: "Promote Sport"
BRA_promote_sport_desc: "While being the governor of the glorious State of São Paulo, Adhemar invested quite a remarkable amount of money into sports facilities for schools. Never forgetting where he started, he now seeks to do the same on a national level by providing funds for new basketball courts, new volleyball equipment, new football shoes, you name it! We shouldn't forget that all work and no play makes a dull (and unhealthy!) person; it is known that sports and physical activity makes you live longer, which perhaps might help us make some cuts in future healthcare funding..."

BRA_build_dormitories: "Construct Dormitories"
BRA_build_dormitories_desc: "In all of Brazil, we have but a measly 100,000 university students according to our latest estimates. To mitigate this awkward number, Vice President Lott proposes to build cheap lodging for university students to encourage people to take up higher studies, as well as reduce transportation costs for those ambitious men and women that seek to discover their talents in our esteemed academies. They may not be the most luxurious of accomodations, but something is better than nothing!"

BRA_no_child_left_behind: "No Child Left Behind"
BRA_no_child_left_behind_desc: "While increasing the quantity of students through ease of educational access is paramount to our program, the quality of our young students is also crucial in our program's success. One can hardly expect a malnourished student to excel at his studies when he is far too busy worrying about his next meal, or expect a disabled student to even keep up when they are neglected and ignored by public institutions. Therefore, we must ensure that everyone gets a free, adequate meal at school so that poor students will not be disadvantaged in their pursuits. Furthermore, we shall arrange special classes for the disabled, with teachers specializing to accommodate their needs with absolute care and inclusivity."

BRA_changes_to_curriculum: "Changes to the Curriculum"
BRA_changes_to_curriculum_desc: "An even bigger problem in rural areas than the lack of primary education is secondary education: a rural child who does manage to start primary schooling will rarely ever step foot in a junior high school classroom. While our new schools are large enough to accommodate both primary and secondary students, in older facilities we must run calculations and introduce "double-shift schooling", which will provide to anyone who wants the chance of education. In addition to this, Adhemar, ever the polyglot, has ordered that university students be obliged to learn a foreign language. Whether it be Romance, Germanic, or even Japanese, Adhemar himself knows many languages and understands the benefits of being able to converse with foreigners in their mother tongue.The better we understand the peoples of abroad, the better benefits we could gain."

BRA_university_scholarships: "University Scholarships"
BRA_university_scholarships_desc: "Of course, Adhemar himself was once a student, and the hardships of studying are not lost on him. From exam cramming, to material discussion, to quizzing; graduation requires an unimaginable amount of time dedicated to studying. As such, our university students must be able to dedicate all their time to their courses instead of diverting their attention to trying to make ends meet. Excelling students will be given money in the form of scholarships to help them focus entirely on their education, and no one can say we're using an envelope system to ensure that their votes, or families, have gone to us, of course..."

BRA_provide_modern_facilities: "Modernise Education"
BRA_provide_modern_facilities_desc: "While Brazil will obviously never be able to catch up to the likes of Guangdong, at least in terms of innovation, we can still work towards achieving their prestige and get somewhere better. The logical first step will be to modernize our existing research facilities and establish new ones in order to make our tertiary education on par with the modern world's trends and on par with nations such as Australia and Canada. Who knows! We might even make it to the world's best at this rate."

BRA_put_religion_back_at_the_proper_place: "Religion Back in Class"
BRA_put_religion_back_at_the_proper_place_desc: "As it stands, theology is an optional educational subject. How blasphemous! Our youth deserve to be privy to the knowledge of their place in God's Good Heaven, therefore we will make theology an obligatory class in primary and secondary education. It does not matter if you are a Christian, a Muslim, or, God forbid, an Atheist; You should and will know of our Lord's eternal grace and salvation."

BRA_ensure_freedom_of_teaching: "Freedom of Teaching"
BRA_ensure_freedom_of_teaching_desc: "We promised teachers more possibilities and flexibility in their way of teaching, and we have no intention of leaving promises unfulfilled! Teachers will no longer have to abide by a dogmatic standard, for instead they will be able to use holistic approaches that they feel would be the most effective for their pupils. As long as they follow the curriculum, then we have no qualms in the way they teach our impressionable youth."

BRA_supply_textbooks: "Supply Children's Textbooks"
BRA_supply_textbooks_desc: "We need to update the old textbooks currently in use to keep our nation's pupils up to date with all the newest breakthroughs in science, humanities, and even politics. We need to make sure that outdated textbooks are replaced immediately with newer ones, that they are free by the abolishment of scientific textbook tariffs, and, most importantly, that our great President Adhemar is portrayed favorably in each and every one of them..."

BRA_deal_with_adult_illiteracy: "Eliminate Adult Illiteracy"
BRA_deal_with_adult_illiteracy_desc: "While we work towards eliminating illiteracy among our youth, we cannot forget about the older generations who have unfortunately gone their entire lives without being able to read letters or even write them. As suggested by Vice President Lott and the PTB, we ought to utilize Paulo Freire's "pedagogy of liberation" method to advance adult literacy rates as effectively as possible. The method revolves around encouraging dialogue between teachers and students to drum up interest and challenge the status quo. With this method, 300 sugarcane workers were able to achieve full literacy in just 45 days! We will replicate this great success on a national scale by seeking out educators willing to organize free classes for the illiterate adults, for the wisdom of the old shall not go to waste! Not under President Adhemar's sharp gaze."

BRA_brasil_numero_uno: "Brasil Número Um"
BRA_brasil_numero_uno_desc: "Our education system has long suffered from the twin pains of underfunding and disorganization. But following President Adhemar's comprehensive set of reforms, the education system has rapidly expanded and improved. This will prove to be a solid foundation for the Brazil of the future - one whose minds stand shoulder to shoulder alongside the great powers of the world.\n\nOnly one step remains towards us truly making the dream of this Brazil a reality remains. If we seek to stand at the top, we must learn from those standing there already. Foreign experts will be paid to come to Brazil and lay out a plan for an entirely new education system - new courses, methods of teaching, and a set of high expectations will be the cornerstones of the new Brazilian education system."

BRA_we_are_on_the_right_way: "On the Right Path!"
BRA_we_are_on_the_right_way_desc: "Data from our polling sources across Brazil have been collected and the verdict is in: our illiteracy programs have been a total victory for President Adhemar and the PSP! A greater percentage of our nation's youth are enrolled in primary, secondary, and tertiary education than ever before, ensuring that our children will be the brightest and most talented of all previous generations, guaranteeing an economic boom in a matter of years. Second, illiteracy rates are dropping in record time for both children and adults, ensuring that they can take jobs in more areas than just rural farm labor!\n\nMost respondents credit Adhemar and the PSP for this success and we can only assume that they will reward the PSP in the coming elections. May the good times never end."

BRA_weve_got_to_keep_on_moving: "We've Got to Keep On Moving"
BRA_weve_got_to_keep_on_moving_desc: "Brazil is a vast country, vast in its variety of situations some great and some less so. One of Brazil's greatest ills and shames is its vast wealth disparity among its citizens. Thus, giving Brazil the infamy that comes with being considered a "poor" nation. And no one, absolutely no one, is more aware of this than Brazil's current President, Dr. Adhemar de Barros.\n\nThis is indeed the very exact reason why he is the foremost believer in the envelope system. For it is indeed unquestionably the most efficient method of social welfare in Brazilian politics. Where the citizen gets a basic allowance according to his needs. The fact that some might call this a "populist electoral bribe" or even point out that the economic results it might bring are "questionable" is considered nonsense to Adhemar and his administration, for no matter what poverty shall be eradicated in Brazil, no matter the cost!"

BRA_help_rural_workers: "Support Rural Peasants"
BRA_help_rural_workers_desc: "Dr. Adhemar is above all things a conscious man. He is conscious of his fatherland and its people, and more importantly, conscious of the problems that afflict them. And, unlike his predecessors, he will not provide half measures to solve them. For years the noble cause of the establishment and enlargement of the rights and benefits of the Brazilian working man has been championed by successive presidential administrations.\n\nHowever, they have only succeeded in aiding the urban industrial workers of Brazil, while leaving the rural agricultural workers to the same old condition of exploitation and poverty. But they need not to worry, for the rural workers of Brazil have no better friend than President Adhemar de Barros. For one of his new bold reforms shall to extend the present working rights and regulations legislature, including the right to unionize, to all Brazilian rural workers. Brazil's historical wrongs shall be finally righted. And if President Adhemar does it while stealing the thunder from the PDC there is nothing wrong with that."

BRA_adhemar_agrarian_reform: ""Agrarian Reform""
BRA_adhemar_agrarian_reform_desc: "It may be hard, but sometimes one must be honest with oneself and that rule also applies to President Adhemar, for while his agrarian reform bill corrects regional imbalances, it is already opposed by oligarchs. If he were to try to do a radical agrarian reform (which would require constitutional reform to make payment in bonds for land possible) he shall totally lose their support.\n\nThus, his administration shall stick with payment in cash as stated in Brazil's constitution to appease everyone. However, he shall be a bit creative with that, as the amount of money needed for such a reform is unfortunately too big and he shall be in need of some of it also for his other goals. So, he will start expropriations in distant regions, where there are small groups of isolated villages or enough literate voters to be swayed, then show that on TV, newspaper, and radio, then proceed to repeat that before every election/once a year. Cheap and Popular the best kind of solution in the eyes of President Adhemar de Barros."

BRA_we_just_want_more_and_more: "They Just Want More and More"
BRA_we_just_want_more_and_more_desc: "It is done! President Adhemar may now rest easy for the Brazilian gordian knot that was the Agrarian Reform is a Fait Acompli. The Brazilian people can rest easy that indeed the Fatherland's greatest son Dr. Adhemar de Barros is always on their side. But in this, no man's land that is the tropical Brazilian fatherland rest in political terms is something only reserved for the dead, unfortunately. For he must now move on to another pressing issue affecting the Brazilian farmer, the supply of fertilizers for Brazilian agriculture. For if that is assured, the administration shall be able to expand Brazil's agriculture into worse soils and increase its productivity to never seen proportions, which hopefully should again increase President Adhemar's approval rate in the Brazilian countryside."

BRA_use_old_allys_experience: "Old Ally's Experience"
BRA_use_old_allys_experience_desc: "One of the most important life lessons President Adhemar de Barros has learned over the many illustrious and controversial years of his career as a Brazilian politician is that most of the time if not always it is better to be safe than sorry. Thus, by the logic of this lesson he shall resolve the fertilizer supply issue. After all, both the United States and Canada are both nearer to Brazil than the other providers so the supply lines would be shorter. And after all, why should Adhemar be the President that broke the long history of profitable trade relations between Brazil and the United States? No, the Adhemar Administration shall not break that historic relationship, it shall rather strengthen it and expand it to areas not foreseen before, proving that the OFN has no better trading partner in South America than Brazil and its genius leader President Adhemar de Barros."

BRA_check_the_assets_of_new_friend: "Assets of New Friends"
BRA_check_the_assets_of_new_friend_desc: "If there is something that President Adhemar has learned, and learned well, throughout his long and controversial career it is that in politics and life it is never good to limit your number of friends. Thus, why should his Administration limit itself to having only the United States as its leading commercial partner, especially if it doesn't benefit Brazil? Therefore, following its lesson why not seek better options? And there is no better option than reaching our good friend Hermann Josef Abs and one of his companies, IG Farben, through the German ambassador. During WW1 Germany was cut off from the supply of Chilean nitrates, which forced them to invent new methods to produce fertilizers, Haber-Bosch process, made it available for Germany to produce nitrates on their own and helped to increase nitrogen fertilizer production. So President Adhemar shall seek his new friends and check what they can offer Brazil."

BRA_expand_ministry_of_agriculture: "Expand Ministry of Agriculture"
BRA_expand_ministry_of_agriculture_desc: "When it comes to further fulfil his goals in the realm of agriculture, President Ahdemar fully knows that he must take the herculean task of reforming the whole of the Brazilian Ministry of Agriculture, from top to bottom. And the list of his goals is indeed an extensive one: First there is the creation of services to guide the work of irrigation and reforestation, Second there are massive infrastructure efforts in the clearing of rivers and the building of canals, Third there is starting intimate coordination between technical service stations assistance and the Agricultural Research Institutes, Fourth there is the installation of regional and municipal services which are intended for the mechanization of agricultural work, And finally there is the immediate organization of the real estate registry. Many goals to be reached, and they shall indeed be reached, and as always when it comes to Adhemar their cost shall not be considered."

BRA_irrigation_channels_in_nordeste: "Irrigation Channels in Nordeste"
BRA_irrigation_channels_in_nordeste_desc: "President Adhemar de Barros wasn't born yesterday, so both he and his administration aren't blind to one of the biggest problems that afflict Brazil, the issue of droughts in the Northeast, a problem that is as old as Brazil itself. Thus. to solve it he has come up with the most modern and efficient solution possible. His administration shall drastically expand the irrigation system in Brazil's Northeast by using modern automatic sprinkler systems with the aim to make it cover the entire region! When it comes to the matter of the poor quality of the soil in the Northeast, to solve that his administration shall deliver new tools and machines to every farmer! No matter what, the Adhemar de Barros Presidency shall be renowned for its popular ad modern policies!"

BRA_combatting_crop_pests: "Combatting Crop Pests"
BRA_combatting_crop_pests_desc: "The issue of pestilence hindering crops is as historic and ancient that God himself used it against the Egyptians. And if someone knows his history that someone is President Adhemar de Barros. Luckily for Brazil that isn't the only area where he is knowledgeable. He is fully aware that Brazil's vast crop fields are unfortunately infested by numerous types of pests. Even more Luckily for Brazil's farmers, the Adhemar Administration has a solution to their problem.\n\nThus, to solve it the Adhemar Administration shall deliver pesticides to farmers throughout Brazil, and in the unique cases where crops are infected by more damaging pathogens a more radical solution shall be used, that one being the total exclusion of infected zones and burning them down, particularly those infected by citrus canker. May the people know that even problems of biblical proportions are no match to Adhemar's genius solutions."

BRA_social_security_reform: "Social Security Reform"
BRA_social_security_reform_desc: "A nation can be considered extremely lucky when its leader is highly in tune with its people. And conscious of their needs and woes. Thus, Brazil is very lucky to have Dr. Adhemar de Barros, for no one is more conscious of the issues that afflict the Brazilian people than him. Especially when it comes to the issues facing Brazil's social security system. His administration is fully aware of its overly complicated structure which gets even more complicated when one considers that it is under the jurisdiction of different institutes.\n\nBut what makes a conscious leader isn't only knowing about the problems, but also solving them., Thus, the Adhemar administration shall make a system for all under one single National Social Security Institute, which shall expand access to social security to levels never seen before."

BRA_minimum_pension: "A Minimum Pension"
BRA_minimum_pension_desc: "President Adhemar is many things, be it "wise", "charismatic" or even, according to many female voters in Brazil, "very charming". But, above all, President Adhemar is a conscious and caring person, and he cares most of all about the problem of retired people in Brazil, who unfortunately suffer from being dependent on the help of their families. Well, no more! Thanks to the Adhemar administration, from now on a minimum pension will be established and it will be equal to the minimum wage, so that every hard-working citizen should be able to have a dignified old age after retirement, provided that they pay regular dues to the Brazilian government, of course."

BRA_guaranteed_maternity_leave: "Guaranteed Maternity Leave"
BRA_guaranteed_maternity_leave_desc: "The relationship between President Adhemar de Barros and his VP Edna Lott can't be described as the most peaceful or amenable. Both hold a very fierce distaste for the other. Adhemar dislikes Edna since she is a monument to two things, he hates above all, the "Varguist" establishment he wants to replace, and the new left-wing type of "progressive" politics. But even he must admit that sometimes she has good ideas. Using her plans from time to time is very helpful in consolidating PSP's support among women. Thus, her idea for a maternity leave law should encourage more population growth, which will look so nice on graphs for the PSP's next electoral campaign!"

BRA_labor_courts_in_big_cities: "Labor Courts in Big Cities"
BRA_labor_courts_in_big_cities_desc: "While Brazil as a country has a lot to thank Dr. Getúlio Vargas for in terms of the fairly good labor laws he created during his long administration, enforcing them is another matter entirely. And as his true successor, President Adhemar de Barros and his PSP government will right the wrongs of the pacts, plug the legal holes in the current legislation, and continue on the long road of progress that Vargas opened for the Brazilian nation. In this way, a labor court will be established in every state capital to protect Brazilian citizens from corporate greed and under the protection of the PSP."

BRA_hospices_for_old_workers: "Hospices for Old Workers"
BRA_hospices_for_old_workers_desc: "President Adhemar de Barros is a man of many well-known descriptions, which do not need to be repeated for brevity's sake, and amongst these many descriptions, the one that many people say encapsulates his essence as an individual the most is that of a "Man of the People". And as a man who hasn't forgotten his humble roots, he is conscious of his fellow people's needs and woes. Especially those of the old workers, who are often suffering from many issues after years of hard work, some of them have a really short time on earth due to incurable diseases. Thus. to ensure they will pass out with dignity, the Adhemar Administration shall start building new hospices, so no one will be left to spend the last months of life alone and in poverty."

BRA_the_shield_against_inflation: "The Shield Against Inflation"
BRA_the_shield_against_inflation_desc: "There are many ways one could describe President Adhemar de Barros, amongst those many illustrious and famous definitions is that of a Wise man. And as a very knowledgeable man who is fully aware of the ways of the world, there is no greater economic evil than inflation. This, the greatest woe of the Kubitschek government is still afflicting the Brazilian nation and hurting the wallets of the middle and lower classes. Thus, to deal with this issue, the Adhemar Administration shall use a simple solution, total automatic indexation of wages. Thanks to this, our voters should be safe from inflation and Brazil's development should continue onwards without obstacles."

BRA_increase_of_unemployment_benefits: "Increase Unemployment Benefits"
BRA_increase_of_unemployment_benefits_desc: "Every Brazilian deserves a job - but many still are unable to get one, be it for health reasons or because they simply cannot find one yet. In a normal situation, some of those who oppose us would argue that increasing subsidies for the unemployed would be far too expensive and inflate our balloon economy, but we are not in normal circumstances. As per our efforts, the number of employed has significantly increased, and naturally, the unemployed have decreased; increasing benefits to those who need it won't make any dent in our budget, no matter how anyone looks at it.\n\nWith a strong subsidy program for everyone, our march for progress will take one hundred more steps forward!"

BRA_money_for_our_defenders: "Money for Our Defenders"
BRA_money_for_our_defenders_desc: ""Oh, you, soldier of Brazil's defense, whether in the sky, the sea, or on the fields: Accept this loving kiss from the aggrandized Brazil that exalts your value."\n\nTwenty years ago, thousands of our men were sent to war to defend our freedom from the wretched fascists in Europe, and we have yet to give them the proper acknowledgment that they so much deserve. To make up for our ignorance, veterans of the war will be given priority in our healthcare system, free public transport in all of the country, and an increase in their retirement pensions! With their lives guaranteed, we also gain new allies in the crusade for progress!"

BRA_critical_support_to_state_apparatus: "Modernise the Administration"
BRA_critical_support_to_state_apparatus_desc: "Brazil cannot be modernized if the people who control it aren't working towards it. There remains much to be done in our bureaucratic agencies, which are filled with men whom we cannot trust. For a new Brazil, expanding our control in the many agencies and appointing our trusted experts to help conduct plans for a good goal is a must.\n\nIf those people don't work enough to help fulfill the modernization of our sacred land blessed by God, then we fire them and replace them with those willing to work with us."

BRA_finalize_works_in_congresso: "Finalize Works in Congresso"
BRA_finalize_works_in_congresso_desc: "This bill cannot fail, for it will be one that could guarantee our hold in the government for the years to come. Whatever resources we have to ensure votes in congress, we shall use it. Who cares about what a random nobody economist has to say about how we spend our money? If we can pass our reforms without conflict, we should only worry about the economy later."

BRA_healthcare_initiatives: "Healthcare Initiatives"
BRA_healthcare_initiatives_desc: "Who's better to decide what's best for our healthcare if not our leader, Dr. Adhemar? He spent his youth studying medicine and attaining expertise in the field. Now it's time we give every hospital in the country a piece of the knowledge from our President, making all of them effective and innovative. Thus, pouring more money into the pocket of our doctors will be the assurance of their companionship in the march for progress."

BRA_prevention_over_treatment: "Prevention Over Treatment"
BRA_prevention_over_treatment_desc: "We have a long way to go in fully reforming our healthcare system, and while re-structuring reactive medicine is a must, we need to put a lot of effort into developing preventive medicine.\n\nEvery year, workers around the country will be examined by our own sponsored doctors by taking blood tests, teeth check, and height and weight measurements to ensure they are healthy and ready to go to work in our beautiful country."

BRA_kill_malaria: "Malaria in the Dustbin"
BRA_kill_malaria_desc: "Before he was one of Brazil's greatest political figures and leaders President Adhemar de Barros was a medical Doctor. And as a very knowledgeable Doctor, Adhemar fully knows that in a tropical country such as Brazil there is no greater pathogenic evil than malaria. Thus, to him it's inadmissible that in recent years malaria was detected in all Brazilian states besides Rio Grande do Sul, so to get rid of it his Administration shall spray DDT on the walls inside the houses in entire Amazonas and in zones of infection in eastern Brazil and continue to use chloroquine to treat febrile cases."

BRA_anti_alcoholism_campaigns: "Anti-Alcoholism Campaigns"
BRA_anti_alcoholism_campaigns_desc: "If there is a man on this earth in general, and on Brazil in particular, who wasn't born yesterday, that man certainly is President Adhemar de Barros. He is a man who above all knows all the ways of this world, both good and wicked. He is fully aware that alcohol causes more issues than all other stimulants together, violence, brain damage, and liver destruction are only top of the mountain. Thus, it is his will that his administration makes the ministry of health cooperate with the Church to launch a nationwide campaign for abstinence and finance it with a slight, nearly invisible increase of excise for alcohol."

BRA_uncover_secrets_of_mind: "Psychiatric Reform"
BRA_uncover_secrets_of_mind_desc: "As a very knowledgeable man of the world, which President Adhemar de Barros surely is, he knows that psychiatry has in recent times many interesting breakthroughs. One example is Deinstitutionalization, an idea that has some followers in Italy and USA, that thanks to new psychiatric drugs (like Chlorpromazine) and changing the way we treat patients, we can help the mentally ill return and fully integrate into society. Thanks to this solution his administration can not only make our psychiatry innovative but also reduce the number of beds in asylums so it will be able to reduce its budget spending."

BRA_oncologys_time_to_shine: "Oncology's Time to Shine"
BRA_oncologys_time_to_shine_desc: "It does not need to be repeated, for the outstanding genius of Brazilian President Adhemar de Barros is at this point an undeniable fact for everyone, thus his knowledge about the most recent scientific discoveries isn't a surprise either. He is fully aware that with the discovery of DNA, oncology is on its way to achieving new levels of possibilities, that's why his administration will make sure it will have access to the newest machines to conduct research on their own, including the determination of DNA's structure. In addition to that, his administration shall upgrade Brazil's possibilities regarding radiotherapy, which achieved tremendous progress, that's why it will import a huge amount of linear particle accelerators to make Brazilian oncology up to date with the world."

BRA_cheap_drugs: "Cheap Medicine"
BRA_cheap_drugs_desc: "There is no need to be repeated how deep the bonds of kinship and understanding go between President Adhemar de Barros and the Brazilian people. And as a man who fully knows his people just like the palms of his own hands, he is aware that the accessibility to medicine is a problem that afflicts the Brazilian people deeply. Thus, to make access to absolutely necessary medicines broad, his administration shall abolish all customs duties on them and increase the imports to make sure Brazil's citizens can cure themselves for an affordable price. So that in the end when they go to the ballot box they know that if they were cured of their respective maladies they only have the PSP and the Adhemar Administration to thank."

BRA_higher_salaries_for_our_protectors: "World Class Doctors"
BRA_higher_salaries_for_our_protectors_desc: "Before Dr. Adhemar de Barros was one of, if not the greatest presidents Brazil has ever had, he was a lowly doctor. And as a man who is indeed extremely proud of his professional background, he is fully aware that while being a doctor or nurse gives certainly quite a huge amount of prestige in Brazilian society, that's still not enough.\n\nThus, he feels that it is his personal mission to try to give new incentives to encourage the next generations to take part in this great mission. The greatest doctor of Brazil, Adhemar Pereira de Barros will personally make sure Brazil's personnel gets the decent amount of money they rightfully deserve."

BRA_yet_another_victory: "Yet Another Victory"
BRA_yet_another_victory_desc: "There is a fact that cannot be denied by anyone standing on Brazilian soil, and that fact is that only the good old PSP truly cares about the people. No political party has improved the life of the average Brazilian as much as the glorious PSP once it reached the government. And if the PSP is more powerful than ever it is all thanks to Vargas' rightful heir and Brazil's greatest President, Dr. Adhemar de Barros. Thanks to him agriculture is more efficient than ever, social security is finally giving real help and healthcare is becoming innovative. If Brazil is finally reaching the final stop on the road toward progress then it can only thank the great man that lead it there, President Adhemar de Barros."

BRA_diagnose_the_military: "Diagnose the Military"
BRA_diagnose_the_military_desc: "The first thing any good doctor should do when faced with a particularly challenging patient is to, of course, examine them thoroughly and make the proper diagnosis. Therefore, we ought to call in the military for a check-up and diagnose its issues as well as decide a course of treatment in how it will operate after Lott. Our control - or actually... the State's control on the military - should be strengthened in order to make sure no prior conditions should make an unexpected come back in the form of a coup, as well as make sure we can keep up Dr. Adhemar's prescription should someone else be in office..."

BRA_fund_our_allies_in_esg: "Fund Our Allies in the ESG"
BRA_fund_our_allies_in_esg_desc: "The Sorbonne faction within the Escola Superior de Guerra are pragmatists at heart, so it should be no surprise that appeasing them is something akin to giving a child new toys to play with. We will make contact with our allies within the ESG to inform them of a new budget that will see an increased stream of funds towards their department, for use as they see fit. Guns, Artillery, Tanks, whatever is required to ensure their continued support against internal and external threats."

BRA_utilize_envelope_system: "Utilize the Envelope System"
BRA_utilize_envelope_system_desc: "Whilst Kruel is busy cooking up a list of generals we can trust to work alongside us rather than against us, we shall handle the more... unofficial side of things.\n\nIt's often thought that the military life is a thankless one, where regimen and routine supersede personal pleasure. While this is true to an extent, it should only be proper to reward the most senior of these military men with these... pleasures. We will shower them with all the drinks, drugs, parties, cars, women and money their hearts will desire, all from a brown envelope on their desk. Certainly a base way to secure support, but an effective one nonetheless."

BRA_start_true_modernization: "Force Modernization"
BRA_start_true_modernization_desc: "In typical Adhemar fashion, we have diagnosed the army's problems and laid the foundations for our proposed solutions. Now we can begin to implement them, starting with one of the first items on our agenda; getting new equipment. Our military is still using guns, tanks, and munitions from over a decade ago, some of which are barely functional.\n\nNot only would an upgrade make the army better prepared for actual conflict, it would give the generals some shiny new toys to show off in a parade. Plus, a line of troops guarding the border with a brand new set of weapons ought to make the perfidious Argentine think twice before starting anything funny."

BRA_kitten: "Phantoms of the Runways"
BRA_kitten_desc: "If the sight of 60,933 tonnes of pure, undistilled naval might does not bring a tear to the eye, then how can one truly call themselves a true Brazilian patriot?\n\nThe Kitty Hawk-class aircraft carrier is a product of American ingenuity and technological progress. Big, beautiful, and lovingly crafted in dockyards across the states, the Americans have kindly agreed to sell us one. The impact of this cannot be understated, for the presence of even one 'kitten' is enough to secure Brazilian aerial and naval dominance across the southern Atlantic Ocean.\n\nMarinha do Brasil, protegendo nossas riquezas, cuidando da nossa gente!"

BRA_red_baron: "Red Baron of the Southern Seas"
BRA_red_baron_desc: "Who doesn't love an aircraft carrier? Better yet, who doesn't love an aircraft carrier that has successfully helped bring down an empire?\n\nThe Manfred von Richthofen class of aircraft carrier is the result of German work ethic and design. A continuation of the Graf Zeppelin carrier that was used during the Second World War, its history is one of success; after all, it was the Graf Zeppelin carriers that helped the Germans invade Britain during Operation Sealion. Hopefully a situation similar to that will never come to pass. But it never hurts to be prepared, eh?"

BRA_specters: "Specters Haunting the Southern Cone"
BRA_specters_desc: "Like a swarm of angry bees, the Spectres blast across the sky, reigning death upon Brazil's enemies.\n\nThe F110 jet fighter is one of the Ianques' most modern inventions. Reaching speeds of up to 1,604 miles per hour and able to carry around 18,000 pounds, these jets are a gateway to a whole new world of aerial combat. The Argentinians, the Marzists, and the Paraguayan Nazis - all of our foes will be cowering in their boots when they hear the shriek of the Spectres above their heads!"

BRA_messerchmitts: "Purchase the Luftwaffe's toys"
BRA_messerchmitts_desc: "The same angels of death that once bombed Europe into the stone age will now be flying above Brazil - not to destroy, but to protect.\n\nAs the staple of the Luftwaffe, the Messerschmitt is known and feared across the world following the German victory of the war. France, Britain, Russia, and most of the old world has tasted their fiery wrath. And once we have purchased them, our foes will know that same fear as we show that we are ready and prepared for Totalen Krieg."

BRA_train_with_ofn: "Study at the SOTA"
BRA_train_with_ofn_desc: "As Adhemar has said, what Brazil needs from the United States is not money, but technical experience. The fine gentlemen running the OFN are some of the greatest military minds currently alive, running one of the most powerful armies on the planet. And as our closest ally, it would be amiss of us to not send our men and generals over, so that they can learn from the best and bring what they've learnt back here."

BRA_restore_young_turks: "Restore the "Young Turks""
BRA_restore_young_turks_desc: "Way, way back, when the world was less hot and the attitudes were more congenial, there would be a contingent of our officers sent to Germany to put head-to-pickelhauben with the finest German Imperial Officers to swap strategy. Truly, these were great times. And whilst certain regrettable circumstances came about that prevented us from continuing it, the time is right for us to once again send our men to Germania so they learn discipline, tactics, and efficiency with the German elite. Auf wiedersehen, gentlemen!"

BRA_enforce_conscription: "Enforce Conscription"
BRA_enforce_conscription_desc: "We do find ourselves with quite the conundrum when it comes to the issue of conscription. While yes, it is mandatory for every man in Brazil upon turning 18, conscription rates have still been steadily declining year by year. This cannot stand - it is vital for every man to know what it is to serve in the army. We will remind the public of this by hiring more recruiters, as well as telling the police to be more... active, in reminding people of what happens in defying Brazilian law."

BRA_destroy_the_red_threat: "Destroy the Red Threat"
BRA_destroy_the_red_threat_desc: "Disturbing reports have been cropping up around Araguaia, informing us of steadily growing communist influence in the region. If we do not immediately throw everything we have at this canker, it will quickly overwhelm the body. Troops will be deployed to the Amazon and they will be given every right necessary to stamp. Them. Out. These revolutionary maniacs have no place, and if they want 'normal' communism? The PCB is right there."

BRA_monitor_the_dissent: "Monitor Dissent"
BRA_monitor_the_dissent_desc: "It is always inevitable in the military - or indeed, any other large, influential institution - that there will be dissent within the lower ranks. Brazil is no different. In our case, a clique of sergeants, corporals, and other fresh-faced dissenters are proving to be a very troublesome roadblock in allowing the army to run efficiently.\n\nWhile nowhere near as much of a danger to Brazil's stability as the Communist insurgents, these snot-nosed know-it-alls who cannot seem to properly register how the army works are compromising both our respectability and our ability to operate. It's high time we put them in their place. Thankfully, we have a spy in their ranks, who is willing to do just what we need to outmanoeuvre them..."

BRA_supervise_constitutionalists: "Supervise Constitutionalists"
BRA_supervise_constitutionalists_desc: "Even after he has been removed from the Presidency, Henrique Teixeira Lott continues to find ways to be a thorn in our side. Since 1955 at the very least, his little gang of Constitutionalists have dominated the military high command, unduly using the military as a blunt rod to enforce his will where it was unwelcome.\n\nAdhemar was never going to allow this to stand, of course. Now that a PSP government is in power, we can finally afford to put these bastards in their place. Every known member of Lott's clique is to be heavily scrutinized, being placed under a programme of constant surveillance and observation. That way, we will know if they consider doing anything stupid, and can therefore take the steps to prevent it."

BRA_exercito_social_progressista: "Exército Social Progressista"
BRA_exercito_social_progressista_desc: "Some may claim that our changes to the army have done nothing to quash the politicization of the army. That, instead of removing it, we have simply grafted our own influence onto the military and used it to our own advantage. We truly respect the opinion of these people. However - they are wrong.\n\nAnyone with half a brain can see that we have brought something to the army that most before us never could; pride. Our courageous allies have taken the place of the parasites who sat there previously, and our men can serve happily knowing that their comrades are free of communist sympathies. That is what we have brought back to the military, and by God are we proud. We shall organize a grand parade across the streets of Brasília, to ensure that our soldiers are aware of one thing - that Brazil is a nation that loves her troops!"

BRA_meet_with_almirante_alvaro: "Meet With Almirante Álvaro"
BRA_meet_with_almirante_alvaro_desc: "America, Germany, and Japan have conquered the atom and weaponised the sun. The rest of the world kneels before these three titans, bending to their whims - for they are holding the Sword of Damocles above us. Imagine how it must feel to hold such power. To have such total and inescapable influence.\n\nWell, some men in Brazil have dared to dream of that.\n\nEnter Admiral Álvaro Alberto da Mota e Silva. Vice-admiral of the Brazilian Navy and one of the brightest minds in the country. Álvaro has been one of the key advocates for the development of a Brazilian nuclear programme for years now, and if anyone knows what is needed to pursue this white whale, then it is him. Invite him to the Planalto - there is much to discuss."

BRA_find_uranium_and_tools_for_nuclear_program: "Uranium Fever"
BRA_find_uranium_and_tools_for_nuclear_program_desc: "Uranium is the key to unlocking the mystery of the atom. Unfortunately, while Brazil has enough of it for the beginning of a project, we are not rich enough in the material to be entirely self-reliant - and that is without even thinking about the amount of specialised equipment that would be needed to properly make use of the stuff.\n\nThus, if we want to get this project off the ground, we will need to find these resources somehow. There are three main potential suppliers across the globe that could possibly be willing to sell us some of their materials, but this will come at a cost. Time for us to doff our caps and swallow our dignity, because begging may be neccesary."

BRA_manhattan_20: "Manhattan 2.0"
BRA_manhattan_20_desc: "It was in a squash court in America that the first nuclear reactor was built, and their competence in harvesting nuclear power has only developed from there. The United States has been a pioneer in the field for years, and while they may have developed their nuclear project too late to truly turn the tide of the Second World War, it does not make their achievements any less impressive.\n\nThus, as a nation so competent and already amenable to our interests, it would only make sense to approach them with this deal. We will need to be careful in who we choose, however. Americana is a jealous mistress - and she does not take kindly to us cavorting with other powers."

BRA_deepen_ties_with_australia: "Deepen Ties With Australia"
BRA_deepen_ties_with_australia_desc: "Why bother tethering ourselves to one of the superpowers when we can simply seek a partnership with another up-and-coming power instead? Australia is a country rich in both uranium and the technical know-how necessary to make proper use of the mineral. As a deal with the Australians would be based more on mutual cooperation rather than geopolitical power brokering, a relationship with them would be substantially less domineering than a relationship with Germany or the Americans.\n\nHowever, as appealing as this notion sounds, we must be aware that the bill we will be required to foot would be much heftier than otherwise. Nonetheless, there is no price tag too high for Brazilian sovereignty, and we will press on."

BRA_hello_hermann: "Hello Hermann"
BRA_hello_hermann_desc: "Werner Heisenberg was one of the greatest scientific minds of the century. It was thanks to him and the ingenuity of other German scientists that the Reich was able to propel itself to the status of a global power, trampling American dreams of global hegemony into the ground.\n\nWhile some aspects of the National Socialist regime may disagree with us, it is a simple fact that the Germans know their way around a nuke. Thus, we shall continue to pursue our policy of rapprochement with the Germans by approaching Hermann Josef Abs to supply us with the materials for our nuclear programme."

BRA_construct_facilities_in_para: "Construct Facilities in Pará"
BRA_construct_facilities_in_para_desc: "All the puzzle pieces are on the table, now we need only put them together. We are closer than ever before to unlocking the power of the atom, and by God, will we have it. The first order of business is to make proper use of our materials - we will begin the construction of an enrichment plant in Pará, alongside future nuclear testing sites.\n\nOf course, as the development of this programme is a high priority to the President, we can spare no expense. This will be an all hands on deck project, with the military sent in to oversee the project to assure that everything goes swimmingly - we wouldn't want any dodgy dealings to sabotage something this significant, after all."

BRA_test_our_new_possibilities: "A Public Declaration"
BRA_test_our_new_possibilities_desc: "The time has come. Hours of slaving away negotiating with foreign powers, managing logistics, and draining to their very limit has produced not only one, but two nuclear warheads. The PSP has always been a party of dreamers, and today those dreams become a reality. We hold a power so great that it is impossible to ignore. So, why bother keeping it hidden?\n\nWe have the testing sites in Pará. The world's eyes are on us. Brazil will today test one of her nukes, christening herself as the fifth global power. May our enemies tremble in fear and our allies thank their lucky stars that we are on their side, for we have mastered the power of the atom.\n\n§OAll that's left to do is to push up your sunglasses and watch the fireworks.§!"

BRA_keep_it_secret: "Nuclear Ambiguity"
BRA_keep_it_secret_desc: "It is done. In the shadows of Pará, we have forged a weapon worthy of the gods. We have assembled our first nuclear warhead, and if the scientists are correct, it is a properly functional one. Our hard work has been rewarded with prestige beyond our wildest dreams.\n\nAnd yet, this endeavor has not come cheaply. In the slightest. By possessing even one warhead, we are now a nuclear power, holding the ability to unleash devastation upon the world at a whim. Is that not what we set out to do in the first place? So by that logic, we needn't bother throwing any more money at this programme anymore. Adhemar will be able to find a much better use for the cash elsewhere, anyway. Champagne, anyone?"

BRA_adhemar_the_heisenberg_of_brazil: "Prometheus"
BRA_adhemar_the_heisenberg_of_brazil_desc: "They said it couldn't be done. "An empty promise," they called it. "Populistic nonsense with no bearing in reality," they said. They doubted us, and refused to place their trust in us. Well, they were wrong. And now look at us. Brazil, a nuclear power! Who would've thought it a few years ago?\n\nAdhemar did. Once again, the man who steals and delivers has delivered Brazil one of the greatest gifts she could possibly receive. He will be remembered as the father of our nation's nuclear power - the Brazilian Prometheus, if you will. While some minor advisors like Admiral Álvaro may have helped him along the way, this was yet another example of Adhemar benevolently leading Brazil into the future.\n\nRoll out the red carpet, it's time to celebrate!"

BRA_a_humanist_economic_program: "A Humanist Economic Program"
BRA_a_humanist_economic_program_desc: "One of the key components of Adhemar's Manifesto in the 1965 Election was his new Humanist Economic Program - the centerpiece of which was to ensure that full employment was achieved in Brazil. No one would be homeless, everyone would have a job, and most importantly it would be a good job.\n\nAdhemar shall begin implementation of this bill through a speech to the senate about his aims. Firstly, a wave of massive infrastructure programs will be rolled out throughout Brazil to support the development of private industry and harness our country's natural resources. Secondly, this would attract large amounts of foreign capital towards Brazil, hopefully causing an economic boom. Finally, harnessing the spirit of Monaco, Las Vegas, and Macau, Brazil would be turned into a hub of finance and gambling, attracting the super-rich to Brazil and replacing Cuba as the hub for American and European clientele in Latin America.\n\nA truly foolproof plan. And through it, this the dream of full employment will have been delivered, and Adhemar will have the people's eternal support!"

BRA_barettos_dreams: "Barreto's Dreams..."
BRA_barettos_dreams_desc: "Although Brazilian President Adhemar de Barros is widely regarded as a well-rounded and very knowledgeable individual, he is in fact fully aware that even a great man such as him can't be an expert on all known subjects. Thus, he knows that he must sometimes rely on the knowledge and ideas of others. Such as his economic advisor, who has ideas about how to strengthen Brazil due to an overall expansion of its oil industry. So far, he has shown Adhemar nothing but his loyalty, so why not allow him to realize his plans? After all, if a decision makes Adhemar and the PSP more popular and electable, how could it ever be wrong?"

BRA_and_his_ideas: "...And His Ideas"
BRA_and_his_ideas_desc: "Although his personal greatness is an undeniable fact known by all in Brazil and the world, President Adhemar is an incredibly humble man. He knows that he can't do everything by himself, so he must sometimes delegate the significant tasks of government to other people. Thus, he has given card Blanche to his economic advisor, Barreto, to start his work on revitalizing Petrobras and the Brazilian oil industry. And he shall do what a particular great friend of Adhemar wanted, take a broom, and start to sweep away the entire... well, most of the corruption by changing directors in Petrobras and increasing salaries, while making his ministry more involved in enforcing ethics of work in the company. The reputation of Brazil's greatest national champion company must not be muddied by corruption and other crimes."

BRA_but_adhemar_knows_the_best: "But Adhemar Knows the Best"
BRA_but_adhemar_knows_the_best_desc: "If there is a boss that not only doesn't micromanage his tasks but also has full confidence in all his underlings then that boss is Dr. Adhemar de Barros. But even he must admit that in some crucial matters some supervision from him is needed. Thus, when it comes to the matter of the expansion of Petrobras, Adhemar feels that it is his duty to supervise Minister Barreto's work. So, while his minister will prepare expansion plans, he will make sure all directors are loyal to his administration, after all, it is just fair that Brazil's biggest publicly owned public be loyal to the man and the party that controls its government. And what better way to guarantee the loyalty of the company directors than by giving some ¨gifts¨ and rewards, and what better way to keep their morale high than by visiting them in person and as always promising to keep them happy if they keep the good work for Adhemar and his glorious PSP government!"

BRA_national_petrochemistry: "National Petrochemistry"
BRA_national_petrochemistry_desc: "No one, absolutely no one is a more knowledgeable person on the matter of the Oil Industry in Brazil than President Dr. Adhemar de Barros. He is truly an expert when it comes to both the strengths and the weaknesses of the Brazilian Oil Industry, especially of its national champion company Petrobras. So, he is fully aware that one of the main issues affecting the company is its processing capabilities. Thus, to increase the efficiency of Petrobras oil processing, his administration shall create Petroquim, a subsidiary of Petrobras, focused on petrochemistry, which should increase the future possibilities of all Brazilian industries that are reliant on chemistry, especially those in need of ethene, which production should be increased thanks to intensification of its conversion from naphtha."

BRA_create_cenpes: "Create CENPES"
BRA_create_cenpes_desc: "President Adhemar isn't the simple dumb country bumpkin some people believe he is. He is much smarter than most people think. He is indeed knowledgeable on many matters of the modern world, and indeed on how day-by-day Scientific Research and Development, RnD, is needed for the Brazilian nation and its many institutions to adapt to the many needs of the modern world. Thus, the Adhemar, Administration has announced the creation of the Centre for Research, Development, and Innovation Leopoldo Américo Miguez de Mello which will be a particular unit of Petrobras, devoted to research, which shall help the company to increase profitability and sustainability thanks to applying the innovative technological solution, which will show that the Adhemar Administration is progressive in all areas!"

BRA_technocratic_approach: "Technocratic Approach"
BRA_technocratic_approach_desc: "As time passes so does the flow of information, only with the passage of time the flow becomes more precise and faster. Thus, new data always come that can either refute or reaffirm previous notions. Luckily for Adhemar's Economic Minister the second situation mentioned has become true. For after deep analysis, new data has come to the desk of the economic minister, such data proving that both oil extraction and profitability are slowly yet steadily improving after 1st phase of his plan, this is indeed a great victory for Benedito and proof that he was right with his approach, now Brazil can start to reap benefits of the glorious reforms brought by the Adhemar Administration!"

BRA_new_standards_in_petrobras: "New Standards in Petrobras"
BRA_new_standards_in_petrobras_desc: "There is no phrase in the world that is more rewarding to hear than ¨Fait Acompli¨. And no one loves to hear that phrase more than Brazilian President Adhemar de Barros. Thus, with the first phase now completed his government can now use his supremacy in the running of Petrobras to start transferring newly gained money to the PSP's treasure and find someplace in this great company, the most significant national champion in the Brazilian corporate pantheon, for many family members of his great, and most importantly very loyal, party members. With it, he shall cement the PSP's rule in Brazil and make sure his party can count on the support of another branch of government. For no party can govern Brazil better than the glorious PSP!"

BRA_start_manufacturing_of_jet_fuel: "Start Manufacturing of Jet Fuel"
BRA_start_manufacturing_of_jet_fuel_desc: "Brazil's leaders love planes and were the first to massively use them in political campaigns. This of course also includes Dr. Adhemar de Barros himself, after all, Santos Dumont the Father of Aviation was a Brazilian himself. Thus, It is only logical that Brazil should start producing jet fuel domestically to lower prices for it eventually encouraging domestic plane usage. Moreover, it shall be the first move in the direction of domestic aero plane manufacturing! Besides that, we will ensure a small gift for Brazil's Glorious leader President Adhemar. And it shall prove to the Brazilian population once again, that only the PSP and the Adhemar administration can make Brazil rise up to its rightful place amongst the great industrial economies of the world!"

BRA_expand_production_of_synthetic_rubber: "Expand Production of Synthetic Rubber"
BRA_expand_production_of_synthetic_rubber_desc: "During the XIX century rubber boom, the population of western Brazil increased significantly and the rubber itself was a key part of Brazilian exports. No person is more knowledgeable of this aspect of Brazilian History than President Adhemar. He is also aware of what came after, unfortunately, the boom would eventually come to an end with the arrival of the Second World War. However, Adhemar is the kind of man that thinks that it is never too late to try to correct a mistake made by history! Thus, by his logic, if it happened once it certainly can also happen again. However, this time it will be conducted in humane and sterile conditions, not in the wild, full of mosquitos' jungle. The modernization of the Brazilian rubber industry shall serve as proof that only the PSP can lead Brazil on the glorious road toward progress."

BRA_new_refineries: "New Refineries"
BRA_new_refineries_desc: "Brazil, thanks to the Adhemar Administration, has walked a long way down the road toward economic progress, and it shall not stop now! Brazil needs oil, the government needs oil, and oil needs Brazil! Thus, the Adhemar administration shall start building refineries in new places to make sure there is no oil deposit left untouched. With this, Brazil shall be closer than ever to achieving complete self-sufficiency in oil. Barreto is happier than ever seeing the progress of his oil program and Adhemar is too, thanks to these successes he shall once again prove that it is he, and not the communists in the PSD-PTB coalition, who is the true heir to Vargas!"

BRA_expand_existing_ones: "Expand Existing Ones"
BRA_expand_existing_ones_desc: "There is nothing in the world that can bring President Adhemar de Barros a bigger smile than seeing the achievements of a job well done. And as he sees the positive results of Benedito's ideas he couldn't be happier. However, he feels that it is time to stop, his government has already spent enough, now according to him it is time to focus on other initiatives, such as those related to welfare, since those result in a higher approval rate amongst the electorate, they are seen as the most important for maintaining the dominance of PSP in Brazil. Thus, at the end of his administration's trip for oil it shall do some small expansion of refineries and for President Adhemar that shall be it, enough of Benedito's dreams."

BRA_pspobras: "PSPobras!"
BRA_pspobras_desc: "It is done and let no one deny that it was President Adhemar de Barros and his Glorious PSP government who did it. As everyone can now see data incoming from Petrobras is better than ever, it cannot be denied, the Adhemar administration has achieved big success, another reform that proves that only PSP can truly change Brazil and achieve 50 years of progress in 5, with this Adhemar is now another step closer in direction to assure his re-election of as President and turning Brazil into a truly democratic country, governed by the best party forever and for all!"

BRA_the_true_builder_of_brazil: "The True Builder of Brazil"
BRA_the_true_builder_of_brazil_desc: "President Adhemar knows that there is still plenty of work to be done to bring all of Brazil into the modern age. Roads need to be paved, factories need to be built, and fields all need to be watered if Brazil wants to be the global power he dreams of. Unlike Kubitschek and Lott who focused on providing for the elites, all of Brazil will be able to enjoy the rewards of Adhemar's bold industrial program. The PSD-PTB coalition is not the true heir to Getúlio Vargas; future generations will know Adhemar de Barros and the PSP as the true builder of Brazil!"

BRA_adhemar_connecting_the_nation: "Connecting the Nation"
BRA_adhemar_connecting_the_nation_desc: "One of the biggest problems currently affecting Brazilian lives all around the country is the lack of infrastructure. While Adhemar has done much to fix it in São Paulo, it is now time to export the Paulista way to the rest of the country and get those roads working.\n\nAnd what's a better way to show the people our commitment to them than a megaproject! Building a bridge to connect Rio and Niterói; two central cities, so near one another yet so far away, being separated by the Guanabara Bay. But no more will that be a problem, as with the Adhemar Bridge, the first step towards connecting our nation will be complete, showing that Adhemar gets stuff done!"

BRA_contacting_foreign_experts: "Contacting Foreign Experts"
BRA_contacting_foreign_experts_desc: "Getting around the country is much easier said than done, as it currently stands. The varied geography that our cities stand on combined with unchecked sprawl in our lower income areas means that our urban areas are poorly connected to each other. Our rural farms and communities are even more disconnected, leading to serious headaches for our citizens.\n\nThe Japanese are no stranger to handling these kinds of issues. Their experts are exactly who we need in order to improve our infrastructure. They will also have plenty of local companies who are willing to invest in our infrastructure projects, which will make Brazil's transport run at newfound efficiencies."

BRA_the_foreign_experiment: "The Foreign Experiment"
BRA_the_foreign_experiment_desc: "Our urban planners have come up with the idea of developing a metro system in São Paulo, which will connect millions and be a surefire boon to business in the city. There's only one problem: we have no experience constructing metros or subways.\n\nLet us turn to our Japanese friends once more, whose subway systems are among the finest in the world. Their knowledge will be invaluable in assisting our development of the São Paulo metro in making sure that Brazil's first metro network is nothing less than perfect."

BRA_building_up_urban_transport: "Building Up Urban Transport"
BRA_building_up_urban_transport_desc: "While some of our most ambitious planners have proposed the São Paulo metro system, some of our more grounded advisors have instead asked us to focus on improving the existing bus and rail networks. Who is to say we cannot focus on both, and transform Brazil's cities into efficient metropolises for all to enjoy. Additional workers and funds will be diverted to our public transport agencies across the country to get Brazil up and running."

BRA_yet_not_forgetting_farmers: "Yet Not Forgetting the Farmers"
BRA_yet_not_forgetting_farmers_desc: "If there is one group that does not benefit equally from our country's past industrialization efforts, it would be our farmers. These men and women have been some of our hardest workers, yet previous administrations have seen them as nothing more than troublemakers and complainers. This will not be the case with President Adhemar. He will make sure that their concerns and wishes are heard, so that all of Brazil can prosper together."

BRA_the_great_bridge_builder: "The Great Bridge Builder"
BRA_the_great_bridge_builder_desc: "Is there anything President Adhemar is incapable of doing? Thanks to him, Brazil is on the move again at breakneck speeds. Bridges are being planned across the country, roads are being paved across rural areas, and the new metro systems have begun to be built. Throughout these times, Adhemar has come in contact with many great businessmen and industrialists throughout Brazil and the world, who have all pledged their willingness to help Brazil move forward. Adhemar will gladly use these connections to make sure that Brazil will be a great and proud country for generations to come!"

BRA_continuing_brazils_march_forward: "Continuing Brazil's March Forward"
BRA_continuing_brazils_march_forward_desc: "Over the past thirty years, Brazil has made great progress in our industrialization campaign. New factories are constantly being opened, producing goods at record efficiencies. However, we cannot afford to sit around and watch our economy stagnate. We must continue marching forward in the name of progress, with Adhemar and the PSP leading the way!"

BRA_a_word_with_the_oligarchs: "A Word With the Oligarchs"
BRA_a_word_with_the_oligarchs_desc: "It's certainly no secret that some people in Brazil have more money and influence than others. For our previous presidents, these oligarchs were nothing more than constant annoyances, but President Adhemar knows better than to slight these influential men and women. He will need to be careful in making sure that his efforts to court the oligarchs are legal, but Brazil's potential is endless with their money..."

BRA_intensify_steel_production: "Intensify Steel Production"
BRA_intensify_steel_production_desc: "One of Vargas' primary goals for the Estado Novo was to ensure that Brazil would never need to import steel from a foreign nation. Over the past decade, this goal has faded from both the public's and the previous administrations' eyes, which has set our economy and our military production on a potentially dangerous path. We must make amends for lost time and redouble our efforts to ensure that our country is not dependent on any foreign sources of steel. New steelworks will be built, and additional research in improving production techniques will be authorized."

BRA_hand_in_hand_with_the_protege: "Hand in Hand With the Protégé"
BRA_hand_in_hand_with_the_protege_desc: "Adhemar knows that if the PSP wants to be more than just a blip in Brazil's history, an heir to the party needs to be found. Thankfully, we have an incredible power base in São Paulo, with several young members who are on the up and up. One of them happens to be the son of Getúlio Vargas himself, Getúlio Vargas Jr. The son has already promoted plenty of developmentalist policies in São Paulo, and has a knack for leadership and public speaking. Let's get out to São Paulo, and gladhand a bit with the protégé of the PSP."

BRA_relying_on_old_friends: "Relying On Old Friends"
BRA_relying_on_old_friends_desc: "While the Americans are not a popular bunch within the party, it's hard to deny the amount of investment their companies and government have made in Brazil since the end of the Second World War. In turbulent times at home, it's best if we don't disturb the peace with our foreign policy. We will once again turn to the USA in asking them to assist in our industrialisation programs; if past history is anything to go off of, they'll be more than excited to continue investing in Brazil."

BRA_parlay_with_the_eagle: "Parlay With the Eagle"
BRA_parlay_with_the_eagle_desc: "There's no denying that working with the Germans on literally anything is bound to cause a firestorm. However, there have been decades of opportunities wasted simply because previous administrations refused to even see what the Germans could offer. Ours will not make the same mistake. Hermann Josef Abs, a notorious industrialist and banker in the Reich, has contacted us about allowing his companies to establish a presence in Brazil. We will begin negotiations with him and the Germans, and see what benefits they can provide."

BRA_the_great_developmentalist: "The Great Developmentalist"
BRA_the_great_developmentalist_desc: "Brazil's streets hum with the sounds of commuters on their way to work and businesses getting ready to open up shop. The trains carry businessmen into the central business districts of our cities, ready to bargain and make deals with countries from around the world. Our farmers have been hard at work even before the sun rises, ensuring that the country stays well fed.\n\nAll of this is thanks to the hard work that Adhemar has been able to get done in his time as President. Thanks to his efforts in both the backroom and in the public eye, Brazil is entering a new age of economic development. President Adhemar will join Vargas as one of Brazil's greatest minds."

BRA_a_gesture_of_peace: "A Gesture of Peace"
BRA_a_gesture_of_peace_desc: "Paraguay has been a bit of a thorn in our side, to put it lightly. Their fascist history has made it near impossible for us to work with them on potential projects, let alone open diplomatic channels. However, Adhemar is not going to be so easily dissuaded from working with a potential partner, their domestic politics be damned.\n\nThe Paraná River is the continent's second-longest river, and there has been very little done on both our side and Paraguay's side to understand the river's potential if we were to construct a dam. We will direct the Ministry of Foreign Affairs to work with various civil engineers to draft up a proposal for a dam on the Paraná River, in the hopes that Paraguay will also do their due diligence."

BRA_preparing_against_the_foreign_menace: "Preparing Against the Foreign Menace"
BRA_preparing_against_the_foreign_menace_desc: "We offered cooperation and peace, an opportunity for the betterment of relations.\n\nThe Paraguayans spat in our faces and rejected our offers.\n\nAdhemar may be many things, but he's not a man who cowers in fear when insulted! Now there are no guarantees that peace will remain a reality in the future, and when peace fails, a nation must make sure it's ready for war, and Brazil sure as hell isn't going to be unprepared for a conflict with Adhemar in charge."

BRA_the_greatest_industry_for_the_greatest_army: "The Greatest Industry for the Greatest Army"
BRA_the_greatest_industry_for_the_greatest_army_desc: "Adhemar is a great friend to the military! A patriot like nobody else, doing anything to keep Brazil secure from these warmongers who threaten our peaceful nation. In response to this aggression by our neighbors, Adhemar has no choice but to boost military spending and strengthen even more our forces.\n\nThe security of our people is of foremost concern; he didn't start this, but he'll be the one to stay on top."
BRA_adhemar_itaipu_dam_over_tt: "We have §Gfinished§! negotiating the §YItaipu Dam§! with §QParaguay§!."

BRA_negotiating_the_treaty_of_itaipu: "Negotiating the Treaty of Itaipu"
BRA_negotiating_the_treaty_of_itaipu_desc: "Wonderful! Our offer of friendship has been graciously accepted by the Paraguayan government. Now, all we need to do is negotiate the details, with Adhemar taking a leading role in guaranteeing the treaty is fair for Brazil, so we can finally start working on getting more energy to all people of our great country!"

BRA_start_the_itaipu_project: "Start the Itaipu Project"
BRA_start_the_itaipu_project_desc: "With the agreements finally complete, we can now begin the construction of the Itaipu Dam. And if there is something that will cement Adhemar's legacy, it will be this one.\n\nWith the exception of Germany's currently rotting monument to nepotism in the middle of the Congo, it will be the largest hydroelectric power plant on earth. It will provide plenty of electricity to Brazil, for not only will it generate plenty of electricity for us, the Paraguayans will have so much from it they'll have to sell it back to us. Once we have the lines set up all the way to São Paulo and Rio de Janeiro, we will have tamed and secured an eternal source of energy for the whole nation. And they will know it was Adhemar who got it done."

BRA_the_great_stateman: "The Great Statesman"
BRA_the_great_stateman_desc: "Nobody can deny Adhemar has been an effective leader at home. The vast infrastructure and industrial projects that dot the landscape speak for themselves. But now it's clear, if it wasn't already, he is as big a giant on the international stage as the domestic one. Once again, someone stands up for Brazil's economic interests, instead of bending over for the imperialists.\n\nWhere Vargas once stood, standing firm against the German and American eagles, Adhemar holds the line once again. Any deal Brazil will get as long as he's there will be a fair one. Many Brazilian workers can only hear about the foreign capitals of the world. But every Brazilian knows their champion is there, fighting for them every day."

BRA_vargass_true_successor: "Vargas's True Successor"
BRA_vargass_true_successor_desc: "When Getúlio Vargas left office, Brazil was once again left adrift. Tossed and turned by a sea of incompetence, with inexperienced captains at the bridge, it was only a matter of time until it would be bashed against the rocks of ruin. The largest nation in South America would have been yet another failure of poverty, imperialism, and radicalism. But finally someone stepped up to take the helm.\n\nAdhemar de Barros was the man who saved Brazil and set it on the right path. Adhemar de Barros is the man who is leading it through these treacherous waters. And Adhemar de Barros will bring Brazil to its rightful destination as a nation of economic strength and social justice.\n\nVargas led Brazil from the waters of inadequacy. And Barros will bring it to the seas of greatness."

BRA_no_man_left_behind: "No Man Left Behind"
BRA_no_man_left_behind_desc: "There are a few economic indicators that can easily tell the general health of a nation's economy, and President Adhemar believes that unemployment is the main scourge of a healthy country. Brazilians who do not work will simply not contribute to the economy, and even worse, be left behind with regards to his other great reforms. Guaranteeing employment not only ensures that Brazilians have stable incomes to depend on, but also gentle reminders of who sourced those jobs would surely build a loyal voter base for the PSP in elections to come. Adhemar will introduce the No Man Left Behind program, a government plan dedicating itself towards solving unemployment in the nation. Both Brazilian and foreign industry will be able to enjoy the influx of labor entering the market, ensuring economic prosperity from the poorest citizens all the way up to the richest industrialists."

BRA_the_cities_of_tomorrow: "The Cities of Tomorrow"
BRA_the_cities_of_tomorrow_desc: "The sad truth is that today's economies rely heavily on urban production centers to fuel themselves. While Brazil certainly has no shortage of ready labor, men are pouring in from the countryside into slums in our cities, which has driven both a political and economic wedge in our country. This internal migration cannot continue for the good of both rural and urban Brazilians. President Adhemar will invite foreign companies to create company towns throughout rural Brazil to bring economic growth and jobs to the regions, and prosperity to the families living in them. Not only will foreign capital not have to deal with pesky regulations that may exist in our more urban areas, they may find themselves able to pay the rural workers at lower wages than their urban counterparts. Surely everyone wins in this scheme!"

BRA_stick_with_our_old_friend: "Stick With Our Old Friend"
BRA_stick_with_our_old_friend_desc: "As much as President Adhemar likes to talk of an independent foreign policy, it would be beyond stupid to ignore both the geographical and political advantages of working alongside the United States. The historic relationship between the two nations has only become stronger due to recent events, so there really is no reason to kick the hornet's nest. Besides, their companies are more than capable of supplying the investment needed to fund our grand vision of company towns."

BRA_new_times_new_allegences: "New Times, New Allegiances"
BRA_new_times_new_allegences_desc: "Let's face it: if Brazil truly wants to chart its own path into the future, our dependence on American trade is something that cannot continue. President Adhemar is keenly aware of this, and has been focused on improving relations with the German Reich. However, it is time to take that relationship up to a new level. Adhemar will extend an offer to the German industrial conglomerate IG Farben, inviting them to establish company towns throughout Brazil. As always, though, the devil is in the details, and Hermann Josef Abs may not agree to every request of Adhemar..."

BRA_forlandia_2_0: "Fordlândia 2.0"
BRA_forlandia_2_0_desc: "The first thing a smart man does when he's trying to solve a problem is to see if anyone else has already solved the problem before. Back in the 20s, the Ford Company established company towns throughout Brazil, trying to source their own rubber to keep input costs down. With our renewed commitments to the Americans, we should ask Ford and other motor companies to take the lead on our renewed company town initiative, given their previous experience. They know of the benefits of establishing these towns first hand, and we can hopefully convince them to persuade other companies to join them in investing in our countryside."

BRA_the_might_of_brazilian_labor: "The Might of Brazilian Labor"
BRA_the_might_of_brazilian_labor_desc: "There are many qualities to admire about the Brazilian man, but by and far the most important and valuable quality is their propensity for hard work. Whether they be a rural farmer or a student in one of our great universities, no one in this world can deny the hard working spirit of our citizens. The people themselves know of this, and we will call on them to take up that spirit while enlisting them to work in the company towns. Everyone in Brazil is asked to make sacrifices; President Adhemar has already made many, so now it is the common man's turn to do so."

BRA_ig_farbens_ingenuity: "IG Farben's Ingenuity"
BRA_ig_farbens_ingenuity_desc: "Ever heard of Fordlândia? I bet you haven't, because it was an abject failure by the Ford Company in their attempt to break a stranglehold on the rubber monopoly held by the British at the time. We need no further proof that the American model of capitalism is fundamentally incompatible with Brazil. Instead, let us turn to our newest business partner and give them a fair chance to see what they can do. IG Farben is one of Germany's largest megacorps, focusing primarily on chemical and medicinal projects. Based on Adhemar's discussions with Hermann Josef Abs, their leader, IG already has extensive plans to begin developing company towns throughout Brazil. All they need now is the green light to proceed. Who are we to deny them?"

BRA_american_industry_brazilian_markets: "American Industry, Brazilian Markets"
BRA_american_industry_brazilian_markets_desc: "To pretend that we have the technological capacity to rival the major superpowers of the world would be silly. Even President Adhemar can recognize that Brazil has the spirit, but not the technology needed to join their ranks. However, as per part of our agreement with the Americans, we have begun importing their industrial equipment in our company towns. We must dispatch engineers to study the equipment in great depth and see how far we are from constructing our own. After all, we can't depend on the Americans forever."

BRA_german_science_brazilian_resources: "German Science, Brazilian Resources"
BRA_german_science_brazilian_resources_desc: "Brazil has a plethora of natural resources, and those are simply the ones we've already discovered. Who knows what other treasures lie on and under our soil? Unfortunately, government inefficiency and a hostile environment have rendered our extraction capabilities to be mediocre at best. While IG Farben sets up their plants and towns in the countryside, we will need to ensure that the rights to the resources stay with us. Furthermore, we will also take steps to ensure that we do not simply become a resource-oriented export economy. The last thing we can afford is for our economy to be at the whims of foreign partners; no, this will absolutely not do. Instead, our scientists and engineers will work with our German partners in understanding the manufacturing processes so that one day our industrial might will be able to match theirs."

BRA_a_roof_over_their_heads: "A Roof Over Their Heads"
BRA_a_roof_over_their_heads_desc: "For most politicians, what comes out of their mouths often does not line up with what is actually delivered to the people. However, President Adhemar is no ordinary politician. Our company towns have accelerated our progress in growing our industry while also providing decent jobs and homes to even Brazil's most destitute. Who cares for what our so-called "partners" from the PTB have to say about the recent surge in heat and workplace-related deaths? Our partners in the corporations have assured us that accidents happen all the time, and it is nothing for us to worry about. We can all thank Adhemar and the PSP for pushing Brazil's people and industry to new heights!"

BRA_a_gamblers_paradise: "A Gambler's Paradise"
BRA_a_gamblers_paradise_desc: "Brazil has always enjoyed its rightful place as a hub of tourism in South America, with our beautiful beaches and crystalline waters, alongside our lovely cuisine and historical landmarks. That being said, we can surely do much better than allowing the tourists to enjoy a churrascaria and a few photos with Christ Himself. There is no real reason for tourists to return to Brazil once they've enjoyed themselves once.\n\nPresident Adhemar has just the idea to change Brazil from a trendy little destination into one of the main tourism hubs of the world. There is an untapped market for gaming and gambling in South America. Normally, governments see casinos as nothing more than a front for organized crime, but we will not be so close-minded. Brazil will turn into a gambler's paradise under Adhemar, all the while bringing in jobs and economic activity to the cities that house our new casinos!"

BRA_old_money_from_old_europe: "Old Money From Old Europe"
BRA_old_money_from_old_europe_desc: "The time has come for Brazil to begin planning the construction of our new casinos, and the issue of money has reared its ugly head. While we could use our own funds to construct the casinos, the timeline would be too long for us to see any benefit. We must look for a foreign partner to aid us in this project.\n\nIt is simply not worth asking the United States and their Caribbean partners for this investment. They will likely see our new construction as competition for their own casinos in Vegas, further worsening our relationship with them. Let us instead turn to the Old World and their investors, who are much less likely to see our casino expansion across the Atlantic as a direct threat to their own casinos back home."

BRA_bountiful_cash_from_the_new_world: "Bountiful Cash From the New World"
BRA_bountiful_cash_from_the_new_world_desc: "There is nothing more patently American than the spirit of free and fair competition in a market. That being said, we need to recognize that we are competing against decades of experience in the Americans.\n\nAdhemar himself will head to Las Vegas to begin negotiating with the American casino conglomerates. Rather than trying to shoot for the stars in pretending that our casinos will displace the ones along the Vegas Strip, we should instead extend a hand in cooperation. We will offer them a South American outpost to expand their operations to in exchange for funding to get our casinos up and running at an expedited pace. Much like many of our other projects, Brazil will work with the New World in getting our casinos open for all peoples to enjoy."

BRA_european_experts: "European Experts"
BRA_european_experts_desc: "When it comes to gambling, the Europeans are experts without peer. The casinos of Monte Carlo, Bonn, Geneva, and the many other great capitals of the continent have turned profits for gambling barons for decades. And with experience, comes innovation.\n\nIt is no secret that these European casinos have developed exciting new ways of providing safe and legal thrills to the masses - as well as cutting quite the generous cheque in return. If were are to partner with these casino barons, then along with cash, we shall bring in this new technology as well."

BRA_modernize_our_casinos: "Modernize Our Casinos"
BRA_modernize_our_casinos_desc: "Brazil is a nation known for many things across the globe. Soft, silky beaches. Sweltering, yet beautiful rainforests. Restaurants filled to the brim with the tastiest food for miles around. A culture that mixes the exoticism of the new world with the familiarity and refinement of the old.\n\nBut sadly, it is not yet known for its casinos.\n\nWhich is a crying shame to Adhemar, given the potential he sees in the industry. And after all, if there were ever a man to appraise a nation's capacity for grabbing money, it is the President. Thus, his administration will invest in Brazil's casinos - by the time we are through with them, our country will be known as the gambling capital of the world, bar none! A lofty title indeed."

BRA_yankie_entrepeneurs: "Yankee Entrepreneurs"
BRA_yankie_entrepeneurs_desc: "As a country built entirely around the enterprising and entrepreneurial spirit, it is no surprise that the Americans reign supreme when it comes to marketing and selling new ways of spending money to the average consumer. While Brazil is no slouch in that department either, our nation lacks a certain spark that the Americans have tapped into.\n\nAdhemar, recognising this, has decided to consult these American financial wizards, so that the Brazilian gambling industry may learn their ways. Soon our great nation will join them on that path paved with gold that they walk."

BRA_a_tropical_monte_carlo: "A Tropical Monte Carlo"
BRA_a_tropical_monte_carlo_desc: "Every man with even cursory knowledge of gambling worldwide is aware of how much money the city of Monte Carlo pulls in every year. The answer being, a frankly absurd amount, as the European great and good of all stripes and nationalities - or at least, the ones deemed acceptable by the Reich - swagger up to blow their money on poker, slots, and all other manner of games.\n\nWell, who's to say Brazil cannot be a tropical Monte Carlo? The northeast of our nation is very similar in terms of climate to most continental Europe. The more resorts we build up there, the better - it'll be like a home away from home for these rich Europeans. One that is both pleasant and profitable..."

BRA_the_southern_las_vegas: "The Southern Las Vegas"
BRA_the_southern_las_vegas_desc: ""Viva Las Vegas!" cry the many intoxicated and wealthy Americans who make the pilgrimage west to the City of Sin. Vegas is renowned as "the entertainment capital of the world" across the globe, and should serve as a good model of what Adhemar wants for Brazil.\n\nAnd, following the Cuban Revolution, we have the opportunity to follow through with this idea. After all, now that the Cubans no longer wish to act as tropical host to the many rich tourists seeking a boozy getaway, it would only make sense for us to step in and fill the vacuum. Come to Brazil! We are, in fact, the Vegas of the South!"

BRA_cash_in_our_pockets: "Cash in Our Pockets"
BRA_cash_in_our_pockets_desc: "It is done! Once again, Adhemar de Barros has miraculously pulled a rabbit out of a hat and done Brazil a great service. Following the tireless efforts of his administration, Brazil is now one of the biggest resorts and gambling hubs on the planet. This has not only lifted many from poverty by giving them jobs, but has placed plenty of money in our pockets. We aren't going to misuse this money, obviously. That would be unethical. Instead, this money going to the government will be put towards PSP sponsored social programs to ensure these poorer Brazilians stay out of poverty.\n\nMany may decry this as 'buying votes', or claim that Adhemar is doing this to enrich himself, but these people lie. If the people of Brazil feel they owe it to Adhemar and the PSP to vote for him, then it or their business. And the money? Well, if the President makes a little extra on the side, then it's hardly unconstitutional, is it?"

BRA_infinite_jobs_infinite_votes: "Infinite Jobs, Infinite Votes"
BRA_infinite_jobs_infinite_votes_desc: "What many in the UDN and PSD called unachievable has been achieved. The dream of full employment, something which only prosperous economies such as the USA and Japan could reach, has been replicated in Brazil. From the Happy Harbour of Porto Alegre, to Natal, no one has to worry about finding work to feed themselves and their family. The No Man Left Behind program has been a resounding success and PSP media sources promote this fact to the Brazilian people.\n\nAdhemar has done what no other President before him has achieved and has guaranteed the electoral loyalty of many Brazilians towards him and the PSP for decades to come."

BRA_true_progress: "True Progress"
BRA_true_progress_desc: "Three years of Adhemar de Barros has single handedly bulldozed through many of the issues Brazil has been facing for years. Corruption? Military inadequacy? Economic woes? You name it, Doctor Adhemar had seen to the problem and diagnosed it as necessary.\n\nOf course, now that Brazil is such a radically different nation, we can only truly accommodate the changing circumstance by modifying the Brazilian constitution as necessary. It was meant as a living document, after all, and far be it from us to deprive Brazil from true prosperity because of something petty such as adhering to updated rules.\n\nAnd after all, if anybody knows what Brazil needs, it is Adhemar!"

BRA_invest_in_amazon_territories: "Invest in Amazon Territories..."
BRA_invest_in_amazon_territories_desc: "The PSP is always in search of new people to bring its message to - and what better place to look for them than the very depths of the Amazon? The rainforest is a wild and untamed part of our nation - one that, for far too long, has gone ignored and underdeveloped. Well, no more. We shall make it our business to burrow deep into the Amazon and bring our message to these poor, unnoticed people. Lesser men have been content to leave these territories as underdeveloped and ignored as they are for far too long. Fear not, o Amazonians! President Adhemar is here for you!"
BRA_invest_in_amazon_territories_tt: "This initiative will cover also our newly-annexed territory of §YCaiena§!!"

BRA_and_make_them_new_states: "...And Make Them New States!"
BRA_and_make_them_new_states_desc: "We have brought the light of our republic to the Amazon! Hooray! They are now all true citizens of the Republic. Truly, tear-jerking, like watching a child one has known since infancy growing into a strong, self-sufficient man. To commemorate this glorious occasion, we shall turn these territories into full-on states. Already, we have our best men from the PSP drawing electoral boundaries and volunteering to act as senators for the newly-created states.\n\nElections will not be held immediately, of course. It would be simply impractical to do so. Our men will stay until the next election, wherein the people of these states can decide whether to keep them in power. Is that not the beauty of democracy?"
BRA_and_make_them_new_states_tt: "Federal Territories of §YAmapá§!, §YRondônia§!, and §YRoraima§! shall be reorganized into full-fledged states!\nNew states will become bastions of the $BRA_party_psp_c$!"
BRA_and_make_them_new_states_tt_2: "Integration of §YCaiena§! into Brazil shall be completed with the reorganization into a full-fledged state!"

BRA_adhemar_true_promise_cucked_tt: "We have begun work on all our agendas."

BRA_adhemar_is_better_than_vargas: "Adhemar Is Better Than Vargas"
BRA_adhemar_is_better_than_vargas_desc: "Getúlio Vargas truly was a great man. This is something nobody is denying - we all love Vargas. However, like every great man throughout history, he had his flaws. Vargas could be ruthless towards his enemies - perhaps unduly so. He sent the lover of a communist leader to Nazi Germany. He allowed his political opposition to languish in prison - many of whom are in our very party. And to top it all off, Vargas stood side by side with the military in the Constitutionalist Revolution, while Adhemar opposed him alongside the Paulistas.\n\nWe know that Vargas was good— but Adhemar is great! And it is only right that we let everybody know. Interviews, books, pamphlets - whatever it takes. The truth will get out."

BRA_adhemar_five_more_years: "5 More Years!"
BRA_adhemar_five_more_years_tt: "§hNelson Gonçalves§! will prepare a new jingle for the presidential campaign!"
BRA_adhemar_five_more_years_desc: "Everyone loves Adhemar. Even people who do not know they love Adhemar yet love Adhemar - he is truly beloved nationwide. By popular demand, we have no choice other than to begin preparations for his re-election campaign. Thankfully, Congress has not yet passed anything to prevent an incumbent President from planning his re-election, so we are well within our legal rights to do so! Roll out the posters, roll out the red carpet, Adhemar is on the trail again! Say, where is Nelson Gonçalves? We will need a catchy jingle or slogan to go along with the campaign, after all..."

BRA_tax_reform: "Tax Reform"
BRA_tax_reform_desc: "One of Adhemar's original promises when campaigning for President was that one blessed day, salary and income would be synonyms, rather than different entities. Thankfully, we live in an era where the Brazilian people have chosen the sane, stable option, and by God did they make the right choice! The introduction of a new, more progressive taxation system will provide nearly total tax exemptions for the poorest amongst us, and increase the stream of money to states and municipalities by redirecting the taxes to the middle and upper classes. This is how people who know damn well what to do get the money they need - on a local and national level, this is only a prelude to a better Brazil - one united by Adhemar de Barros and the PSP!"

BRA_coffee_blood: "Coffee, the Blood of the Nation"
BRA_coffee_blood_desc: "What honest, hardworking man doesn't start the day with a good old cup of coffee? It is the lifeblood of our nation. This is something Adhemar knows all too well. But as well as the coffee itself, he recognises that the men and women who slave away day and night to gather it are just as central to the economy. Without them, the money would dry up quickly, and so Adhemar intends to show them the gratitude they deserve. With loans from the central government, coffee co-ops will be set up, so that these workers can sell and store the crop on their own, saving the both of us money and taking the government well away from the market - where it should be."

BRA_new_parliament: "New Parliament"
BRA_new_parliament_tt: "§hAdhemar§! will discuss the issue with leaders of our relevant profession."
BRA_new_parliament_desc: "In every nation, there always ends up being groups that are more important than others. It is an inevitability. Many countries try to ignore them - preferring to keep such meetings and deals obscured in shadow, away from the eyes of the people. Here in Brazil, we do not hang our heads in shame at such a thing. Instead of ignoring them like a bad smell, we shall make anyone with a large enough base of support feel as welcome in building Brazil's future as the President himself. This is not just a normal democracy - this is a true, new democracy. A true parliament of equals. It will be difficult to decide who to allow in first, however. Should it be the trade unions, or the army?"

BRA_are_illiterates_trustworthy: "Are Illiterates Trustworthy?"
BRA_are_illiterates_trustworthy_tt: "§hAdhemar§! will discuss the issue with party leaders."
BRA_are_illiterates_trustworthy_desc: "How many people cannot read in Brazil? Far too high a number, certainly. However, this should NOT mitigate their right to take part in the democratic process. They are people too, and deserve a fair say in the future of Brazil. And Adhemar de Barros will fight to ensure they have the power to do so! He is the champion of these people, and always will be - who is to say that they will not return the favor come election time?\n\nSadly, many in the PSP do not see this logic. These party men fear that the newly-inducted voters will instantly gravitate towards the PTB. This issue is causing much turmoil. And as usual, there is only one man who can resolve the issue. Adhemar."

BRA_organic_constitution: "An Organic Constitution"
BRA_organic_constitution_tt: "Even if §WGod§! starts the §RFinal Judgment§!, Congress will pass §hamendments§! to Constitution."
BRA_organic_constitution_desc: "Vargas made many mistakes. This is an inalienable fact of political life in Brazil. In his infinite wisdom, however, Adhemar de Barros can look past this. While he may never say it openly, he truly admires Vargas - his connection to the people, his political acumen, and his willingness to lead Brazil in times of turmoil.\n\nThe one area in which he looks down upon the man, however, was leaving himself vulnerable. Vargas could not ensure that he and his party could remain in power as long as was needed to get the job done, and that was his undoing. And with the set of constitutional amendments Adhemar is set to push forwards into Congress, he will avoid this mistake, proving himself greater than Vargas could have dreamt."

BRA_moral_and_beautiful_country: "A Moral and Beautiful Country"
BRA_moral_and_beautiful_country_tt: "§K[BRA.GetNameWithFlag]§! is a §hdemocracy§! in name but anything else..."
BRA_moral_and_beautiful_country_desc: "A new dawn has risen upon our beautiful country - one of peace, freedom, and strength. Many claim that the only change we have brought upon Brazil is selfish and venal; that Adhemar has fed the nation from a poison chalice. But regardless of the thoughts of pessimists and plebeians, the thoughts of the people are clear; the PSP has well and truly proven itself as the party of Brazil.\n\n5, 10, 15, 20 more years. However many more years we are in power, it does not matter. The party is Brazil incarnate. The PSP will remain in power as long as it takes to deliver on the mandate granted by the Brazilian people to guide them forward.\n\nIf that is forever, then so be it."

BRA_puppetmaster_is_out: "The Puppetmaster Is Out..."
BRA_puppetmaster_is_out_desc: "Adhemar de Barros has slipped into a coma, and has shown no signs of waking from it soon. While he sleeps, our government has been immobilized by crippling fear and confusion. The same cannot be said of our enemies.\n\nThe opposition has submitted a bill to Senado, introducing articles of impeachment, and the PSP is in no shape to mount a serious opposition to them. There is no doubt that quick action must be taken in order to bring Brazil out of the chaos that is consuming it whole.\n\nThe only question is who will be the ones to lead the nation out of this crisis?"

BRA_but_his_legacy_will_be_continued: "...But His Legacy Will Be Continued"
BRA_but_his_legacy_will_be_continued_desc: "Last we checked, our party still holds many seats and levers of power throughout the current government. So what if Adhemar is unable to govern in his current state. We need to pick up the slack, right now, and get to work.\n\nWe need to hit the ground running right now to ensure that Adhemar will still have a presidency to return to when he recovers. Everyone in the PSP owes the President that much, at least, even if we all don't agree with every action and every bill that has been passed. The last thing we can afford right now is for those opposition jackals to steal the presidency from us in this time of unrest, and for them to start poking their noses into business they don't belong in.\n\nOur war chest has been diminished, but it is far from empty. If Neves wants to introduce the articles of impeachment to the Senado, let him. We still have some tricks up our sleeves. We'll start introducing some briefcases filled to the brim with cruzeiros to our fellow countrymen. Let's see how their tune changes then about our President!"
BRA_but_his_legacy_will_be_continued_req_tt: "§hLaudo Natel§! shall save $BRA_party_psp_c$, because nobody else can..."

BRA_maintain_unity_of_psp: "Maintain Unity of PSP"
BRA_maintain_unity_of_psp_desc: "Adhemar's coma has sent the party into a complete nosedive. While PSP centrists are still willing to back Natel and the party, the two ideological wings of the party have completely fallen apart.\n\nRomeu de Campos Vergal is leading the PSP's left in calling for additional agrarian reform and direct investment in local businesses in order to combat foreign capital from pushing Brazilians out of hardworking jobs. Meanwhile, João Café Filho on our right flank has called for austerity via cutting social spending, pointing to the ballooning national debt as a ticking time bomb.\n\nNatel is going to have to choose a side between the two, if he has any hope of getting enough votes and keeping the party image. And it won't just be the PSP who notices who he sides with; the other parties will also notice the shift in policy, and perhaps have their own opinions on it..."

BRA_call_auro: "Call Auro"
BRA_call_auro_desc: "You would think that the leader of the Senado being a member of the PSD would spell certain doom for both Adhemar and the PSP, given the current situation.\n\nYou'd be thinking completely wrong.\n\nEnter Auro de Moura Andrade, Senator from São Paulo. The son of a cattle baron with a certain knack for politics. Everyone hates his guts, but no one denies his ability to get things done. Officially a member of the PSD, but certainly willing to work with anyone who has the cash. And if there's one thing the PSP doesn't lack, it's bribe money.\n\nLet's make a call to the good Senator, and ask him to postpone the vote on impeachment as a little favor. We're going to need more than just a couple of briefcases stuffed with cash for this stunt, but if it means keeping Adhemar and the PSP in power, so be it. No one said that maintaining the presidency would be cheap."

BRA_truce_with_lacerda: "Truce with Lacerda"
BRA_truce_with_lacerda_desc: "Carlos Lacerda and the UDN are the entire reason that we are stuck in this goddamn mess. The ratbird from Guanabara has been a constant thorn in our side since Adhemar has gotten elected. As much as we may hate each other's guts, there is a bigger boogeyman in the room that we can use against Lacerda.\n\nWe just need to plant the idea that if Adhemar gets impeached, the PSD-PTB coalition will be the ones on top, and not Lacerda's UDN. And if that happens, Brazil is going to return to Varguist policies thanks to a cabinet filled with leftists. If there's one person that Lacerda absolutely hates more than us, it's Getúlio Vargas.\n\nLet's see how this little crow caws when we mention Vargas' name. Cover your ears, gentlemen."

BRA_hail_to_the_heir: "Hail to the Heir"
BRA_hail_to_the_heir_desc: "São Paulo is the birthplace of the PSP and Adhemar's career. It is a city of opportunities, a city of chance, and more importantly, a PSP stronghold. If São Paulo falls, then the PSP is truly lost.\n\nSince Adhemar's ascension to the presidency, one man in particular has made his impact felt throughout the party. No one expected it to be the son of Getúlio Vargas himself, but he has been a key member of our party since his election, and he has assumed Adhemar's role in São Paulo as the main PSP powerbroker in the region.\n\nWe need to hold onto São Paulo at all costs. A quick chat with Getúlio Vargas Jr. is in order."

BRA_calm_the_hell_down: "Calm the Hell Down"
BRA_calm_the_hell_down_desc: "Despite our best efforts, the nation continues to collapse in on itself. Protests are becoming more frequent by the day. Smooth-talking politicians continue to mislead the public against us, which only makes the protests devolve into riots. Something needs to be done, and it needs to get done quick.\n\nThe PSP has always been a party that is focused on maintaining law and justice, leaving no one behind. Reminding the people of that should calm a lot of them down, and ensure that order returns to the streets. The real question is what to do about the circus ringleaders that continue to rile the good men and women of Brazil against us."

BRA_bribe_the_press: "Bribe the Press"
BRA_bribe_the_press_desc: "For some reason, newspapers throughout our country have begun writing stories filled with nonsense. "President on his deathbed?" and "Collapse of the PSP?" are somehow getting the green light from editors and publishers to go out on the front page of the papers.\n\nNow is a good time to pay a visit, personally, to a few of these publications. Just to remind them that the PSP have always been their most ardent supporters, and that we, much like the rest of them, are dedicated towards publishing the truth and only the truth. We'll also slip in a gentle reminder that if it wasn't for our payroll, there wouldn't be a single functioning newspaper in Brazil. With how much we're "investing" into the free press, who could say that the PSP does not stand with the Brazilian people?"

BRA_utilize_kruels_connections: "Utilize Kruel's Connections"
BRA_utilize_kruels_connections_desc: "If you're a Brazilian President, and you want to stay in power, you better have the military on your side. We need to make sure of this, now more than ever, especially since our Minister of the Army has suddenly gone missing. Amaury Kruel is hardly a popular person, but he still holds significant sway within Brazil's armed forces. Getting him on our side will ensure that the military is pacified for the time being. It might not be cheap, but it'll consolidate our power in the country."

BRA_communist_hydra: "Communist Hydra"
BRA_communist_hydra_desc: "We're in the goddamn shit now, boys. The impeachment vote is just around the corner, and we do not have the votes to stop it from going through currently. None of the major parties are willing to listen to us, and everyone that we could've bribed has already taken our money. Time to take a massive risk.\n\nRemember the PCB? The grand party of the 20s and 30s, right before Vargas brought down the hammer and crushed them into dust? Well, as much as we'd prefer not to talk about it, Adhemar has some connections to them. After the fall of the Estado Novo, Adhemar went around to the few PCB politicians who remained and got them onto our side. Of course, the party was almost immediately banned again, and we purged them out of São Paulo."

BRA_men_of_sigma: "Men of Sigma"
BRA_men_of_sigma_desc: "Everyone has their dirty laundry. We've probably got a lot more than most people, but there are still some secrets that we hope no one ever finds out. When the PSP was founded, it was a political union between the Partido Republicano Progressista and Miguel Reale's Partido Popular Sindicalista, or PPS. The PPS' ranks were filled with ardent integralists, some of whom had several ugly ties to fascism. Thanks to Adhemar's political savvy, those ties never surfaced in the public light. But we cannot deny that they were a part of our past.\n\nThe current crisis mandates that we look to every corner of Brazil for support in our efforts to see Adhemar stay on the presidential throne. And with support across the mainstream parties all but dried up, there's only one group left to turn to. Time to make a call."

BRA_and_the_changes_are_on_the_way: "...And Changes Are on the Way"
BRA_and_the_changes_are_on_the_way_desc: "Adhemar's rule has seen the tendrils of corruption tighten faster around Brazil. We must act quickly if we are to end his kakistocracy and restore constitutional reality. The ringleader himself is fading away, and his circus of cronies is directionless. Edna Lott has worked tirelessly tugging against Adhemar's corruption, and now is the time to put an end to it.\n\nTo stop the constitutional confusion, Adhemar must be impeached! A mindless husk cannot rule a country. This will require Edna's finest negotiating skills to wrangle congress into safely passing the bill. But she feels confident in her ability to do so. Now is the time to act - democracy is at stake!" 
BRA_and_the_changes_are_on_the_way_req_tt: "It is time to §Yrestore§! §VPresident Vargas§!' legacies."

BRA_the_greatest_friend: "The Greatest Friend"
BRA_the_greatest_friend_desc: "Edna's obvious first move is to secure the backing of her party. In Brazil, this is never so simple - The PTB is a party with many wings, but it would be best to begin negotiating with the parties' left - Grupo Compacto. Led by Leonel Brizola. The two laborists should easily see eye to eye, recognising their common enemy in the flailing PSP. With many connections, particularly in the party's youth and the State of Rio Grande do Sul. Securing her base will allow Edna to focus on reaching out to the rest of congress and ridding the presidency of Adhemar's rotting corpse."

BRA_democratic_coalition: "Democratic Coalition"
BRA_democratic_coalition_desc: "Adhemar's fierce pragmatism may have rubbed off on Edna - in order to rid Brazil of him, she needs the support of the rest of Congress, namely, the UDN, the party that poses the greatest threat to Varguism and is a fierce opponent of laborism. Led by Carlos Lacerda, the UDN must be swayed to ensure Edna's succession. Lacerda's Amerophilia and hatred of the Reich could be used to gain his favor if Edna were to commit her presidency's foreign policy to aligning with the OFN and severing all ties with the Einheitspakt.\n\nWhether our dealings will convince the most virulent hater of Varguism to side with us is unclear, but stranger bedfellows have been made in Brazilian politics before."

BRA_divide_et_impera: "Divide et Impera"
BRA_divide_et_impera_desc: "Adhemar was the glue that held the PSP together - his corruption spread like a cancer through the party, and much of what is left is now beyond salvation. But buried in this pile of cronyism lie some fragments of a progressive movement, fools swept up by Adhemar's charisma and supposed ability to get things done. The party's leftist clique, led by Romeu de Campos Vergal, is one such piece - with assurances from Edna, some members of the party may jump ship from the sinking PSP, and if they do, they'll be welcomed with open arms into the PTB.\n\nTogether with our new former PSP allies, we can achieve a truly progressive Brazil, with all the social legislation Adhemar passed - but without his entrenched corruption."

BRA_varguists_stand_together: "Varguists Stand Together"
BRA_varguists_stand_together_desc: "Juscelino Kubitschek and Henrique Lott, the PSD and the PTB - both governed the country together for a time, a coalition of two firmly Varguist parties against the UDN. Edna built many relationships between these parties in that time, particularly because of her father's role as President. Tancredo Neves, Ulysses and Kubitschek have been Edna's allies within the PSD for a long time - their support is necessary to ensure both our success and the fate of the whole of Brazil."

BRA_nationwide_rallies: "Nationwide Rallies"
BRA_nationwide_rallies_desc: "While Edna lacks the power of the military, or the corrupt institutions that Adhemar has procured, she and the PTB wield something perhaps more powerful - labor! Trade unions and peasant leagues make up much of the party's support base, and we can leverage this power to ensure that congress and Adhemar's supporters get the message. Strikes, protests and riots - all are on the table to ensure the end of the PSP's rule.\n\nEdna will embark on a tour throughout Brazil, motivating the people to express their support, ensuring her legitimacy as the incoming President. Alongside Brizola and Jango, they will spread the message of prosperity for all!"

BRA_help_of_the_mad_man: "Help of the Mad Man"
BRA_help_of_the_mad_man_desc: "It was on a campaign to secure São Paulo that Adhemar, puffing himself up, stated that no matter how many of the new sanitariums he built, none would be efficient enough to hold someone as insane as Jânio Quadros. Hitting back, Quadros made a speech retorting that no matter how many prisons he built, none would be big enough to hold a criminal as fat as him. This exchange entirely surmises the bitter rivalry between the two men.\n\nIf we are to secure the anti-Adhemar coalition, then we need to enlist the help of those who utterly despise the man - and there are few men in Brazilian politics who hold such burning hatred towards Adhemar as Quadros. While the man may certainly be a scatterbrained eccentric, he has fire; the exact kind of fire we need right now, hence why we shall convince him to make a speech condemning the Adhemar presidency - if he can afford to take the time away from his busy schedule of admiring paintings, of course."

BRA_reach_to_constitutionalists: "Reach Out to Constitutionalists"
BRA_reach_to_constitutionalists_desc: "The military in Brazil - hell, in all of South America - has always been a capricious beast. Getting their support has always been a coin toss - perhaps they will allow a democratically elected government to continue governing, or perhaps they won't.\n\nWe are no different, thus we must ensure they are on our side. Thankfully, Edna should have a somewhat easier time than most, given the power that her last name bears. All that it would take to at least reduce the concern of a military coup is a phone call to her father Henrique Teixeira Lott to drum up support amongst the PSD and the constitutionalist cliques. It's been a while since she has spoken to her father, anyway."

BRA_attempt_to_delegalise_psp: "Delegalise the PSP"
BRA_attempt_to_delegalise_psp_desc: "There is something rotten in the state of Brazil - a cancer eating away at the foundations of our democracy and sovereignty. And that cancer is named the PSP. They masquerade as a grassroots arm of the people, simply out to look out for the people's best interests. This could not be further from the truth.\n\nThey are gangsters! Mafia men! A collection of seedy criminals and German puppets who would turn the government into a glorified protection racket, whilst permanently tethering Brazil's people to the Reich! They have been allowed to operate unhindered for far too long, and we shall not tolerate this anymore.\n\nWith the opportunities presented to Edna, the duplicitous nature of this group shall be brought to public attention. Hopefully this will speed up their collapse - and good riddance, too."

BRA_to_continue_the_legacy_of_vargas_kubitschek_and_lott: "Continue Varguism's Legacy"
BRA_to_continue_the_legacy_of_vargas_kubitschek_and_lott_desc: "The PSP has one of the strongest propaganda mills in the country - that is something even we can freely admit. It is a monolith, churning out paper after paper lauding Adhemar for his supposed accomplishments out on the daily. However, it has ground to a halt. As the PSP machine runs around like a headless chicken, we have an opportunity to supplant it.\n\nWe shall launch a press campaign in Última Hora that lauds Edna as the latest successor of a dynasty of Brazilian political thought. The progressivism of Vargas, the optimism of JK, and the legalistic worldview of Lott all rolled into one package, ready to take Brazil away from the seediness of the Adhemar presidency and into the future!"

BRA_ask_gordon_for_help: "Under the Condor's Wing"
BRA_ask_gordon_for_help_desc: "It would be downright idiotic to not look to the United States for help in backing our chosen side. We aren't so different; Brazil and America, two former colonies that, having been on the same losing side in the Second World War, have forged bonds stronger than steel. They are our neighbors and friends.\n\nHelp from the Ianques won't just help get members of the UDN on board, but it will give the President (whoever that may be) enough time to help pay off the gargantuan amount of debt that we find ourselves saddled with - and God knows that they will need it."

BRA_an_unlikely_candidate: "An Unlikely Candidate"
BRA_an_unlikely_candidate_desc: "Throughout the Adhemar presidency, the Germans have been slowly but surely sinking their tendrils into Brazil. It started off slow - some money here and there, a few investors coming in, and so on. But now, their involvement has come to a boiling point, thus dropping us into the shitshow we currently find ourselves.\n\nMany think that Laudo Natel would have to be an idiot to seek the support of the Germans knowing all this. But he is desperate for votes. Adhemar's legitimacy dwindles by the day and the smaller the vote margin, the worse off the PSP will be. And if that takes making a deal with the devil, then to hell he will go."

BRA_one_last_push: "One Last Push"
BRA_one_last_push_desc: "It's very early in the morning. Everybody is exhausted. A hurried clerk at the Senator's office frantically takes calls from those on both sides of the impeachment vote, trying to buy his employer's vote. A cup of coffee has gone cold on a small table in the Plantaldo, as doctors and nurses keep watch over the President. The entire country is hushed, sitting in front of their televisions.\n\nThe hour of judgment is nigh.\n\nThe stakes are high. The fate of the past half a decade's worth of progress made by the Adhemar presidency is up in the air. The Varguists stand ready at the gates, ready to seize any chance they have to banish the PSP to the depths of hell as the Social Progressive batter down the hatches.\n\n§OInto the arms of democracy we go.§!"
BRA_adhemar_comatree_one_last_push_tooltip: "It all comes down to this. The vote will begin."

BRA_against_all_odds: "Against All Odds"
BRA_against_all_odds_desc: "Adhemar Lives!\n\nMany have tried to take Adhemar down; the establishment, the heartless conservatives, and the false Varguists have all taken their turn trying to ruin him and each time they have been left wanting. Even when death itself took a swing at Adhemar, he found it too hard to take down our great leader. Yet this was not just Adhemar's victory, we must pay tribute to the loyal countrymen who fought to keep the government of the people in power.\nNow with our opponents dealt with, we must now move to deal with restoring confidence in the government. The crisis of the past year has left the future of the PSP as uncertain, and it is up to us to prove we are truly the only party that delivers."

BRA_remove_the_viper: "Remove the Viper"
BRA_remove_the_viper_desc: "Edna Lott betrayed the Brazilian people. She, in her deluded attempts to defy the will of people, have conspired from the start to overthrow us. When we were at our weakest, she attempted to impeach us and take the Presidency for herself. She is nothing more than an enemy of the Brazilian people, a tyrant no better than a military dictator.\n\nLuckily it seems like her failure has crushed her spirit and she will be returning to Rio for the rest of this term. When she leaves for Rio we will remove all of her allies in the administration. The Brazilian people deserve better than a traitorous wench in their government. They deserve a full PSP government, filled with people who put their interests first, no matter the circumstances."

BRA_cohabitation: "Cohabitation?"
BRA_cohabitation_desc: "Politics make strange bedfellows. One of the few failures of 65 was our inability to get our great ally Laudo elected as VP. In his place, came the daughter of the man who had stolen the presidency from us in 1960. It is no secret that Edna Lott resented having to work with us, and our conflicting methods in governance have acted as a permanent thorn in relations between Adhemar and Edna.\n\nThus, when our administration was at its lowest moment, and our enemies attempted to impeach Adhemar, it came as a massive shock when Lott refused to aid them in their coup attempt. Perhaps then, the best way to solve this mystery is to go and ask her directly."

BRA_friendship_end_usa: "End of an Era"
BRA_friendship_end_usa_desc: "What has America ever done for us?\n\nThis is a question Adhemar has been pondering for years now. What has America ever been to our country but pointless wars and constant interference? America is nothing more than a parasite, a self-appointed dictator of the Americas, attempting to push their will on the free people of Brazil. Their most obvious assault on Brazil has come and gone, their attempt to overthrow us through delivering Lacerda information about Adhemar's secretary and then supporting our opposition when they tried to impeach us failing miserably.\n\nWe are not an American colony. Gone is the time when they can push us around without consequence, there will be consequences for their misdeeds. Leaving the OFN and removing American bases in the North should send a suitable message."

BRA_man_who_deceived_us: "Wolf in Sheep's Clothing"
BRA_man_who_deceived_us_desc: "Adhemar is a good natured, honest man who tries to see the best in people, even if they give him reasons to mistrust them. When Hermann Josef Abs offered to restart German-Brazilian relations and kickstart trade, Adhemar took him up on his lucrative deal in spite of the former's dubious nature. He should've trusted his gut. Along with his own secretary, Abs conspired to transform Brazil into another Reichskommissariat. To repay them with their betrayal, we will make sure to expel all traces of German influence in Brazil!\n\nWe will not only ban all trade connections with the Pakt and nationalise German trade assets, but also break off diplomatic ties with them and extradite Germans diplomats and "spies" from Brazil. While we seek get rid of everything German, we are not genocidal monsters like them. In that regard, German-Brazilians are free to stay as they have a long history here and are law-abiding citizens.\n\n§RAbs thought he could make a fool of us, let us show him how wrong he was.§!"
GER_Espionage_operation_schild_flag_1: "The §gGermans§! did not §Rbetray§! us."

BRA_just_pass_it: "Bribe, Blackmail, Browbeat"
BRA_just_pass_it_desc: "Brazil is an independent power. Adhemar assumed that fact to be known by all superpowers wo do business with us, but it seems that great powers have a tendency to overstep their bounds, well no more, this so called superpower has caused great suffering to our nation and helped launch Brazil into the crisis that has rocked us for the past few months. At last, we will make them pay for crossing us.\n\nUnfortunately, the voting process is taking longer than expected. To speed up the process, we shall use certain donations to encourage our colleges to see the validity of our bill. Adhemar just wants this chapter of his presidency closed, so he can move back to normal politics. The 1970 election is closing in, and Adhemar's succession must be decided."

BRA_now_germany_best_friend: "A New Special Relationship"
BRA_now_germany_best_friend_desc: "Perhaps the greatest foreign policy mistake of the past 30 years has been our foolish antagonism towards Germany. We have fought time and time again against this supposed menace and for what? Are we any richer, are our people any more respected on the world stage? No, for too long, we have acted as an American stooge but no longer. With our rejection of America, our fine German friends will come to take their place.\n\nWhile it will be many years until we become full Pakt members, Abs connection's will enable us to easily expand our connections within the Unity Pakt and regain the GDP growth that was damaged by American withdrawal. Within time, Brazil will find prosperity away from the American gaze and find our independence standing alongside the German Eagle."
BRA_adhemar_germania_visit: "§hPresident Adhemar§! will go on a grand tour to Germania and cement ties between Brazil and Germany."

BRA_quadros_was_always_right: "Quadros Was Right"
BRA_quadros_was_always_right_desc: "Quadros is a fucking idiot. A fool, who prattles on about 'corruption' while lining his own pockets. Even Adhemar could not build enough hospitals to deal with his mental issues, yet even a broken clock is right twice a day. Brazil is destined to be a superpower, and a superpower does not dance to the whims of other nations, it is a truly independent power. Quadros was thus right to seek out an independent foreign policy, and Adhemar will make this idea a reality.\n\nWith Germany out of the picture, we need to reorient our diplomacy to encourage both Sphere and OFN investments here. This will lead to them fighting each other for influence with an increased number of investments, which will be only beneficial to us. With this tactic, Brazil will truly be able to become an independent power."

BRA_problem_of_prestes: "The Red Devils"
BRA_problem_of_prestes_desc: "Adhemar's time in a coma was perhaps both the PSP and modern Brazil's darkest hour. It was full of many necessary compromises and conflicts, all needed to keep Brazil safe and prosperous. Yet some actions taken during the crisis go beyond what is politically necessary and creep into foolishness.\n\nLaudo's agreement to legalize is one such action, and a move too far for Adhemar. To personally solve this, Adhemar will personally call up Carlo Prestes to somehow find a solution that won't blow up in our face. If we can get past this without being called a traitor, Adhemar may be able to sleep peacefully."

BRA_salgados_inauguration: "Salgado's Inauguration"
BRA_salgados_inauguration_desc: "The recent Coma crisis brought some of the worst figures in Brazilian politics out of the woodworks. One such unpleasant figure we had to compromise with was the famed, hated Plínio Salgado, the leader of the Integralists. In exchange for Reale's support, we promised to appoint Plínio Salgado as minister of education.\n\nThis controversial decision was of course necessary for the health of the Republic yet this has brought with it many headaches. This will perhaps be harmful for our public appearance, but Adhemar never forgets his debts. All we can do now is make sure the new government understands the new situation and stays loyal to the government."

BRA_preparation_for_seventy: "Prepare for 1970"
BRA_preparation_for_seventy_desc: "At last, with the immediate problems dealt with, we can begin preparation for the next election. As the first convention without Adhemar as the Presidential candidate, this is sure to be a momentous occasion. While this will be the first convention where not Adhemar will play the first violin, he is sure to be a key participant, making sure the party does not choose... poorly.\n\nWe have proven to the people we are a party of effective governance, we must now show we do not rely on the charisma of one man, that we are the only party who can take Brazil through the coming years of turmoil. It is a long road to the election, yet we cannot be idle, we must win a clear majority over the opposition, to prove we are the true voice of the Brazilian people."

BRA_adhemar_ozymandias: "Ozymandias"
BRA_adhemar_ozymandias_desc: "It wasn't just a scrape, but a date with death. Adhemar is lucky to be alive - one incompetent hospital worker and his life's work, no, his legacy, would have been stolen from him. We cannot control his health, but we can control his readiness, and make sure that he leaves the executive function ready for someone to finish what he started.\n\nThis President has done so much for this country, even if his people did not recognize the burden he took for them. He deserves to be remembered for his service, his effectiveness, his cunning and his power. He deserves to be remembered as a President greater than Lott, Kubitschek, or Vargas... no, more than that. He will be remembered as the greatest President of all time!"

BRA_no_bridge_too_far: "No Bridge Too Far"
BRA_no_bridge_too_far_desc: "If brushing against probable demise does not awaken Adhemar's instinct to build a legacy, everyone will take him for a fool. Although not a cheap or even effective method, monuments can be an effective propaganda tool. From the Egyptian Pyramids to the Statue of Liberty in New York, people love spectacles, and Adhemar will provide them with just that. Practicality be damned, for he has not much longer to make his worth clear.\n\nBrasília will work as quickly as conceivable to pump out aggressively promoted megaprojects, some of which sorely needed public works and others less than mandatory. Either way, everyone will witness the results and be dazzled for a moment — the Progressistas in the army, renowned as a decent lot, will surely be eager to aid in these ambitions. No one can be upset about highways getting built, so why would there be any protests?"

BRA_fulfill_nikke_promise: "Fulfill the Promise to the Nikkei"
BRA_fulfill_nikke_promise_desc: "Among all those empty words Adhemar promised his Japanese partners, he should at least show a modicum of honor by providing a token gesture to symbolize this newfound friendship at a local level. With the Japanese immigration rate stagnating for a long while and its origin borne from a racist theology, there is no reason for the long-standing immigration ban to continue. Solely on account of moral decency, Adhemar would be willing to phase out the exclusionary policy without outside urging. But popular demand turns out to align with the president's foresight.\n\nA good business backer of Brazil is a respectable friend of Adhemar. The Nikkei will be able to reunite with their families as a reward for their long-standing loyalty to the establishment. Let the Nikkei lobbyists know before all else that Adhemar is a true 'tomodachi.'"

BRA_healthcare_revolution: "Healthcare Revolution"
BRA_healthcare_revolution_desc: "Not a single Brazilian deserves to lead a poor quality of life just because they are deprived of the most basic necessity of medicines. Without the good doctor, Adhemar would be six feet under now. If the President himself, with access to the finest services across the country, can fall terminally ill without warning, then what of those who cannot sustain themselves with three square meals? Of course, the pitifully poor lads in Guanabara slums will never be as valuable as Adhemar on their own, but it would be grave inhumanity to let them rot when everyone knows they don't have to.\n\nIn what better way can Adhemar show thanks to the Lord's mercy than paying for Brazil's fledgling public health industry? Since most funds nowadays are tied to labyrinthine directives, if some fats get trimmed off miscellaneous parts, who would object to it when hospitals operate like well-oiled machines?"

BRA_adhemar_a_new_dawn: "The PSP Revolution"
BRA_adhemar_a_new_dawn_desc: "As President Adhemar de Barros' health improves, so, too, does the mood in our beautiful nation and with our people; they, too, feel as he does and feel our country's growth financially and internationally. These sentiments are not based on fantasy, either. There have been growing pains along the way, but the President and his staff at the Planalto Palace alike accept their contribution, and Brazil has not suffered as much as it has succeeded in these past few years.\n\nFor the Presidency, it is a time of recognition. The people's vote for Adhemar was a call for something different, and this desire was most certainly answered. With every day, he is all the more certain that his service to Brazil has been to its benefit. It is about time that others said so as well."

BRA_bribe_tv_globo: "Bribe TV Globo"
BRA_bribe_tv_globo_desc: "The free press is to be respected, that much is obvious; however, as of late, the greedy muckrakers at TV Globo have seen fit to levy insult after insult, illuminating so-called truths that Brazil would be better off without knowledge of.\n\nThis cannot stand, and thankfully, we need not allow it to. There remain those in the corporation who remember its days of journalistic integrity, and there remains plenty of funds in our pockets. An influx of funding here, a federal grant there—we know well just how helpful our aid can be for those who see it our way, and how persuasive for those who as of yet do not. No expense will be spared to ensure that every triumph is reported on—that every failure is forgiven, all as it should be. Only then can the people cast their ballots freely, knowledgeably, and, above all, correctly."

BRA_a_brush_with_god: "A Brush with God"
BRA_a_brush_with_god_desc: "While Adhemar de Barros's commitment to God has never been deniable, whispers now scatter throughout the public of his attendance in church services and cathedrals, and the image of a prostrating President fills the imagination. Yet those who have seen him on the ground themselves will tell you it is anything but just a show.\n\nHaving come as close to death as he has, it is clear that he has seen his life in a new light, but to speculate any further would be unfair to the man, not just on account of his dignity as a human, but as a fighter who has struggled for Brazil in every way he has been able. All the same, one must remember that they must die and live without knowing when."

BRA_destinys_favourite: "Destiny's Favourite"
BRA_destinys_favourite_desc: "Whether it be the progressives or conservatives, all now kneel upon the heels of Adhemar de Barros, Brazil's greatest architect since the illustrious Vargas himself. He managed to balance the impossible forces of the impoverished and the oligarchs — two classes fundamentally conflicting, yet united in their wishes for a prosperous nation. As folks in the favela chant in jubilant rallies of the concrete towers erecting across their habitual squalor, the ordered bureaucrats at Brasília toil with boundless stamina under genuine patriotism.\n\nNo other rulers, not even Alexander and Caesar, had ever defied death so boldly as Adhemar de Barros, the President of Presidents, who now stands before everyone who worked against him in bold defiance against terrible odds. Destiny chose him, and he answered."

BRA_adhemar_comfortable_retirement: "A Comfortable Retirement"
BRA_adhemar_comfortable_retirement_desc: "God gave Adhemar a second chance. He is not yet dead, but the close call shows that it is time for him to look toward the future, where he shall reap the fruits of personal authority. For decades, Adhemar served as a dutiful servant of the masses, but what had they ever given in return? For each dollar he shall enrich himself with, he had earned it with hours of labor and gallons of sweat. Adhemar will not feel guilty for "betraying the people." After all, he was willing to give his life for the Brazilian nation, and his survival proves that he is, in his heart, a born leader.\n\nIf anything, Adhemar is simply collecting the dues of what he had never enjoyed earlier in his presidency. His family, in particular, deserves to live comfortably in this pursuit of tranquility. From now on, nothing will stop him from getting a cozy and prosperous retirement."

BRA_adhemar_call_in_all_favours: "Call In All Favours"
BRA_adhemar_call_in_all_favours_desc: "To ensure Adhemar gets the retirement he so rightly deserves, there needs to be more than just two hands free. Thankfully, while the President may be busy, so are the pages of the party's contactbooks, with friends for each step of the process. Businessmen who need rallying, reporters who need to tell it as it must be told, some old friends whose favors have yet to be redeemed - now is his hour of need, and their time has come to gracefully assist.\n\nThe road to the next election has not been paved with gold thus far, neither figuratively nor financially. With scandals and crises at every step, any lesser man would have already been overthrown by now. But Adhemar de Barros is no lesser man, and we will prove it, even after having proven so much else."

BRA_adhemar_monopoly_man: "Monopoly Man"
BRA_adhemar_monopoly_man_desc: "The PSP campaign might as well be like the board game, for our strategy equally relies on money and property. With the stakes being so high, now is the time to make use of the cash we have been saving, or else we will find it is gone this time next year.\n\nWe can use these funds to ensure the next head of Petrobras is a PSP man while allowing the incumbent to step out without much protest. Likewise, there are other government-linked industries that may benefit from being led by those aligned to us. That is not for the public to know, however, and the media we control will do all they can to focus on the campaign to avoid any rigorous scrutiny."

BRA_holiday_in_caracas: "Holiday in Caracas"
BRA_holiday_in_caracas_desc: "Officially, it's a trip for Adhemar to 'recuperate.' Unofficially, Caracas offers opportunities far beyond its sunlit streets. The right whispers in the right ears, a quiet meeting with the right people, and suddenly, a few well-chosen properties become available, ripe for the picking.\n\nThis trip isn't merely for rest; it's about ensuring a comfortable future, one far beyond the limits of presidency. Venezuela isn't just another South American nation; it's a safety net, a place where our beloved Adhemar can relax while his financial future is made secure.\n\nWhile the public sees the President taking a break, shrewd deals and smart investments are being made behind the scenes. After all, politics is a game, and the wise player ensures his winnings are banked long after the game is over."

BRA_the_brazilian_job: "The Brazilian Job"
BRA_the_brazilian_job_desc: "Now, while we are still placing a lot of emphasis on securing deals and agreements overseas, we shouldn't forget about the opportunities we still have right here in Brazil for... self-enrichment. After all, isn't it fair that the President, who has given so much for everyone, gets something back from the nation he has cared for?\n\nAdmittedly, these little, ahem, business ventures should best be taken care of quickly. All the hubbub over the election will only keep people distracted for so long, but we'll make sure to leverage our opportunities before things settle down."

BRA_divert_campaign_funds: "Divert Campaign Funds"
BRA_divert_campaign_funds_desc: "Endorsing this, touring that, who cares about the electoral campaign when it firmly favors our dear Getulinho? Financing vacations and festivities are not cheap, and the PSP treasury is one of the best places to find the money Adhemar does not have. As the person who built the foundations for the party's success, its assets are in every way, all but legally Adhemar's. Additionally, on account of being the President, who would dare to nudge him about a couple million vanishing out of sight?\n\nLike his father, little Getulinho is a competent magician. He can muster what he needs if it's urgent enough. No one would mind whether he's scrounging that up from the dirt or relegating that responsibility to a poor clerk somewhere in the Planalto. The old man requires more funding for his endeavors than Brasília's mindless political games."

BRA_friends_from_abroad: "Friends From Abroad"
BRA_friends_from_abroad_desc: "It is never good to keep all of one's eggs in one basket, and however large it may be, Brazil is still only one basket. As such, diversification of political contacts is just as important as economic ties, particularly with our removal of the needless barriers erected in between the two. Money talks, after all, loud enough to cross even the tightest of borders and the deepest of seas.\n\nAnd so in the national interest, as with all other actions, wining and dining the moneyed elite of the world will be made chief priority in terms of foreign affairs. America, Japan, Germany, it matters little so long as it all flows back to the Planalto. And of course, there'll be plenty left over to trickle down for the rest, no doubt."

BRA_a_future_for_our_children: "A Future for Our Children"
BRA_a_future_for_our_children_desc: "It's easy for critics and onlookers to decry and ridicule our dear Adhemar for all the emoluments he's been making lately, writing off his actions as nothing more than corruption and personal greed. Of course, our President pays no mind to such slander, for he knows himself better than anyone else: he does not have that much time left on Earth. Sure, he has cheated death spectacularly, but he is not arrogant enough to assume he could cheat it twice.\n\nAnd what use, you may ask, does a dying man have for all this wealth? For his children, Adhemar has worked tirelessly his whole life, and even if death claims him tomorrow, tonight, or even in the next hour, his family will never have to work or toil like he did. For what is a man that does not provide for his family?"

BRA_adhemar_the_campaign_trail: "The Campaign Trail"
BRA_adhemar_the_campaign_trail_desc: "Those treacherous snakes who wish to destroy Getulinho's electoral campaign must fall, if not for their lack of fitness to rule, then for their hatred of the PSP's great endeavors. One of the best courses of action against subversion is by increasing the party's voter base, whether by bribes and other more unorthodox gifts. If our targets find themselves too virtuous to be swayed by such simple tricks, then there is no reason to shy away from the so-called "dirty tricks".\n\nPerhaps the opposition may call the party corrupt for conducting in such manners, but the stake here is for those hypocrites to subvert the PSP Revolution. Getulinho will win, no matter what political bullets our enemies have against him."

BRA_adhemar_weaken_literacy_restrictions: "Weaken Literacy Restrictions"
BRA_adhemar_weaken_literacy_restrictions_desc: "Is it not the democratic right for every Brazilian to have their voice heard, regardless of their conditions or defects? The folks living in favelas are no less human than the college professors. They face even more challenges than those better off than them, yet the harshness of literacy tests only limits them from having those issues that plague them from being known. Just because the uneducated can hardly read does not mean we must exclude them from electoral processes. Do they not have the common decency to make rational choices as fellow citizens?\n\nBroadening the definition of "literate" is not only conducive to the legitimacy of liberal society but also a chance to create another loyal voting base for the PSP establishment. If the party can gain renown for setting such a hallmark on lower-class suffrage, no longer can anyone claim it unjust again."

BRA_adhemar_the_coalitions_weakness: "The Coalition's Weakness"
BRA_adhemar_the_coalitions_weakness_desc: "On paper, our position in the Senado is one of cooperation and carefully crafted compromise, an arrangement allowing us to charge full steam ahead, even as a few half-heartedly protest as we ram yet more of our brilliant agenda down their ungrateful gullets. But with coalitionary politics, even the occasional objection can bode poorly for the future, and we must do all we can so that should crisis come, we do not mistake tremors for grumbles.\n\nFor this legislative cudgel to be fashioned into a true rapier, one capable of achieving our ends without making messes through our means, we must first trim the fat. If the right and the left cannot help but bicker, then we cannot help but excise these tumors until all that remains are those that agree and do nothing but—sycophants, some would say, but to us, the stalwart vanguard of a new Brazil."

BRA_no_holds_barred: "No Holds Barred"
BRA_no_holds_barred_desc: "Did Magalhães really say that to that reporter? Are the PSD actually only getting their money all from one man? And is there really a fuzzy picture of Brizola eating with the same hand he uses to wipe his - ?\n\nIf you are a reporter with any sense, no matter what you think the answer to these questions are, it shall from now on be 'yes'. Politics has always been about controlling the message, and sometimes the message just needs to be spun a bit to make sure it lands. No matter how petty or how pertinent, our friends in the news business are our ticket to victory, and we will not stop at anything to see it through."

BRA_lacerdas_hypocrisy: "Lacerda's Hypocrisy"
BRA_lacerdas_hypocrisy_desc: "Like a crow, that cawing moron Lacerda can never keep his mouth shut; he can never pass up an opportunity to ceaselessly ramble without rhyme or reason and without truth or fact. That is the sum of his career and indeed his life as a whole, and he has treated this presidency as yet another opportunity to air his baseless grievances to the world.\n\nFor all their innumerable faults, Wainer and Brizola sought to expose him as the hypocrite he is, and although their revelations failed to capture the public's notice, this approach of destroying him in his own journalistic domain may bear fruit yet. The homeless of Guanabara have suffered under his brutality and callous disregard for their very lives for far too long, and soon all of Brazil will know just how two-faced this crow can be."

BRA_leave_it_to_the_son: "Leave It to the Son"
BRA_leave_it_to_the_son_desc: "To be born into the shadow of a great man can often be a curse, but Getulinho Vargas has spent the last thirty years becoming quite the man himself, every bit as stern and capable as his father. Adhemar may be leaving the office and this mortal coil soon. Still, he can rest assured that Vargas is a worthy successor to his Famous Box. We, as well as all of Brazil, would do well to leave behind any doubts about his capability: Brazil and the PSP will be in good hands."

BRA_rouba_mas_faz: "Rouba Mas Faz"
BRA_rouba_mas_faz_desc: "He steals, but he delivers. For some, it was just a bizarre slogan; for others, it was a sarcastic jeer, but for Brazil, it has been the reality for five years. For everything Adhemar ever took, whether it be funds or favors, he left behind more for Brazil and its people, from jobs to hospitals, and none have benefitted from him more than Brazil's most impoverished. This reputation is the legacy that Adhemar has made for himself, first in San Paulo and for the entire nation. And now, it shall be the rock on which Getulinho and the PSP will build its foundation upon, the method that grows our support, and what we will continue to build upon and lead Brazil into the future."

BRA_defining_our_legacy: "Defining Our Legacy"
BRA_defining_our_legacy_desc: "This presidential campaign is not only Getulinho's trial, but also one carrying along the legacy of Adhemar, a dice roll of factors to determine the reputation of the entire PSP for years to come. A true reputation may not be a positive one, and embellishment can prove appropriate when everyone else is out to smother a righteous name. As with most other issues, money is a rather efficient tool for problem-solving other than one's mental faculty — what better way is there to secure a long-lasting PSP than by providing each President with their own little trust funds?\n\nWhile it is doubtful a meagre sum of extra savings, accessible through entirely legal means, will do much in terms of providing for various side-projects, a symbolic legislation, combined with Adhemar's planned São Paulo Presidential Library, will surely show the Brazilian people that the Planalto does care about them."

BRA_adhemar_the_myth: "The Myth"
BRA_adhemar_the_myth_desc: "History will not be a documentary, it has always been a story of great men and larger-than-life mythologies. If the final chapter of Adhemar ends here at this moment, he will be recalled as who he is — a statesman unparalleled for decades past. But by basking within a limited glory, arrested by those who cannot comprehend his plain majesty, is Adhemar not committing a grave sin against the repute which he deserves? The Greek had woven their pagan myths into the very fabrics of Western civilization, so did the Romans built an everlasting institution for modern societies.\n\nThere is no excuse for failing to learn from the most regal legacies, especially in this age of televisions and radios. Adhemar de Barros managed to manifest his promises to the people, and forever more must the stories of his legend be repeatedly told."

BRA_enjoying_our_rewards: "Enjoying Our Rewards"
BRA_enjoying_our_rewards_desc: "Adhemar has not just slaved away for his country for years on end, but he has fought his way out of hospital to finish the job. For such a tireless defender of the nation, it is only just that he can now get some rest, as should any man, and as he has indeed made possible for the people in his country to do.\n\nThe PSP will continue to thank its honorable benefactor for his work, and in recognition, will put a vote through the National Congress to increase presidential pensions to a healthy level, as well as to ensure that Presidents receive official pardons for all actions taken during their time in office. A leader must not be punished for doing their job, after all."

BRA_adhemar_the_man: "The Man"
BRA_adhemar_the_man_desc: "Despite the forceful persona Adhemar continues projecting, he has grown tired and complacent, especially after his life almost turned forfeit in an incident he had no command over. A natural craving for control is inherent to Adhemar's career, but the time for a quiet exit is here. The PSP will continue prospering even without his guidance. Now is the final opportunity to clean up the scene for another generation of patriots to replace the old. Above all else, there is no shame in leaving with an unsullied legacy.\n\nMoving forward, Adhemar has no more busywork outside of bidding farewell to his confidants and praying for a peaceful presidential transition. If the party does not fall into ceaseless bickering without supervision, Getulinho will make a good shepherd to guide Brazil along the path his predecessor has set firmly."

BRA_one_last_speech: "One Last Speech"
BRA_one_last_speech_desc: "Legendary but not invincible, the name of Adhemar may now rival that of Vargas', but he is not much healthier than his thoroughly entombed predecessor. Putting the egg into the basket, the President must conduct a final speech before transitioning. What he proclaims during this time will be the image he projects to an international audience for years. Therefore, it ought to reflect upon the nobility of his life and mission, elevating what he has achieved so far into snapshots worthy of surviving the annals of history.\n\nAdhemar is growing weaker daily, and posterity is of the utmost importance for a lasting legacy, even more so than the truth of a diminished prodigy. 'Friendly' media outlets will be invited as soon as possible to ensure the discourse goes smoothly for his final event before departing from the Planalto."

BRA_times_arrow: "Time's Arrow"
BRA_times_arrow_desc: "Tick tock, tick tock — the clock has finally reached midnight. Dimly lit by candlelight, the quaint residence, a mere room within the extravagance of the Alvorada, has become one with darkness. Adhemar de Barros, whether he be called a prideful boor or a man of action, certainly overstayed his welcome in the annals of history. Fate's bullet seeked to be rid of him, and yet perseverance carried his frail, frigid body through the final months until these hours of conclusion. Whatever regrets, whatever masteries — in the end, he is dying alone with a mess of beddings.\n\nShimmering beneath a half-filled glass of water along the office desk is a playing deck, but there are no more tricks or dice to plot with. Having outplayed everything which stood against the Brazilian Dream, Adhemar now sits thoughtlessly — Getulinho cannot fail after all that's planned."

BRA_return_to_normality: "Return to Normality"
BRA_return_to_normality_desc: "The dragon has been slain.\n\nAdhemar de Barros and his folly is now a bitter memory, with the corrupt fortress that is the PSP crumbling to dust in his absence. Thanks to this man. Brazil has spent the past few years slowly sinking into a quagmire of thuggery and double-dealing. Duplicity, back-alley payments, gerrymandering, and all other crimes under the sun have become as common as breathing under the Adhemar presidency.\n\nAnd Edna Lott, who has stood by and watched this entire time, says no more.\n\nNow, the prodigal daughter has returned. Like her father before her, Edna will embark upon a mission of restoring Brazil to her former self - before Adhemar's corrosive touch rotted away her conscience. With the support of the PTB and PSD, Varguism will once more be trusted by the Brazilian people. Just in time for the 1970 election, of course."

BRA_adhemar_biggest_success: "His Biggest Success"
BRA_adhemar_biggest_success_desc: "It is impossible to deny that under the Adhemar Presidency, the once minuscule influence of Nazi Germany has shot up immensely, creating an entirely new power bloc within Brazil. Like it or not, German money has become invaluable to many areas of Brazilian life.\n\nAs expected when it comes to the Germans, some are more opposed to it than others. Edna herself holds no love for the Nazis, nor do many of the minorities she claims to represent. And yet, severing ties with Germany in favor of stronger ties to America would strangle many schools, hospitals, and infrastructure projects that were made possible thanks to German money. The question the President must answer is how far one is willing to go for their morals - or indeed, whomst one is most willing to throw under the bus..."

BRA_continue_independent_course: "Continue Our Independent Course"
BRA_continue_independent_course_desc: "As loath as many of us may be to admit it, if we wish to keep Brazil influential on the world stage, then it is necessary for her to maintain access to all three of the major global economies. On this occasion, Lins and his fellow advocates of an independent foreign policy have won out.\n\nHowever, this is not a sign that Brazil is intent on living as a doormat to Germania. Adhemar was far too narrow-minded. He did not dream big enough - instead of throwing everything at Germany, the most logical course of action would be to approach the Sphere as well. And once relations have developed far enough, the Pakt can be sidelined entirely - and our conscience may be clear."

BRA_return_to_tradition: "Return to Tradition"
BRA_return_to_tradition_desc: "Look, nobody here is saying that the United States are the be all and end all of Brazilian foreign policy. But the truth of the matter is that the Americans have always been Brazil's strongest and most devoted allies. Adhemar was, as he usually was, deluded in thinking that Brazil could simply cut off one of her key lifelines.\n\nCunha has, of course, always been saying this, and he has been proven correct. Whilst Adhemar's detente with Germany is impossible to fully revert without dropping a tonne of cinderblocks upon our economy, we can at least increase tariffs as a way of explaining to the Nazis that they are no long welcome in Brazil.\n\nFrankly, it is the least we can do for the many groups who have been harmed by the Nazis. We can only hope they forgive us for this lapse in judgment."

BRA_always_wrong: "Always Wrong"
BRA_always_wrong_desc: "It should not be a controversial opinion to state that corruption is an inherently damaging thing, and yet here we are. The people of Brazil have gotten so used to the blatant, day-to-day corruption that made itself known under the PSP that it simply goes ignored. Worse - some even laugh at it, batting it away as if it is merely one of Adhemar's many quirks.\n\nTruly sickening to see us laid this low. No more. Edna will not blindly stand by and let this wound continue to fester; the cushy establishment that the PSP and their cronies have made for themselves will be ripped out to the very roots, and hit with the full force of the law. It may not be an easy task, but we simply cannot allow our institutions to be further degraded by this insidious plague."

BRA_sometimes_right: "Sometimes Right"
BRA_sometimes_right_desc: "Adhemar was a snake. Let's just clarify that immediately. He was a dirty, filthy snake that turned the government into a vehicle for him and his cronies to do whatever they pleased at any given moment. This was almost unilaterally a bad thing for both Brazil and for democracy.\n\nAlmost.\n\nThere may be some merit to Adhemar's old adage of "he steals but delivers." Healthcare, education, welfare, the economy - to an extent, all of them have undergone some sort of improvement. And like it or not, Adhemar used corruption to do this. Edna is not a corrupt woman. She takes no pleasure in abusing power like this. But at the end of the day, if it is necessary to maintain Brazil's standard of living, then needs must."
BRA_sometimes_right_tt: "We will §Rnot§! be able to work with the §YPSD§! down the line."

BRA_keep_hands_clean: "Keep Our Hands Clean"
BRA_keep_hands_clean_desc: "Our campaign of anti-corruption is showing its first effects. Politicians are once again thinking twice before skimming some money out of their campaign funds for 'personal use' - as they rightfully should be. These signs of success mean we can afford to expand our crusades to another profession rife with corruption; business entities.\n\nBy pushing for a strong series of anti-corruption laws that will allow the police to tackle corruption in both the public and private sectors, everyone will know that the times are indeed changing, and that the government will no longer be turning a blind eye to their crimes"

BRA_physiologist_unity: "Physiologist Unity"
BRA_physiologist_unity_desc: "The PSP has had an... interesting history, to say the least. It is the party of Vargas, a man mostly respected across Brazil. And whilst the party may have been through a period of both boom and bust recently, so to speak, at its core the party is still a progressive one.\n\nDespite everything that has transpired, it still yet holds great potential for good; potential that Edna fully intends on making use of... albeit at the cost of several key state positions and a series of drained wallets. Nonetheless, the heirs of both Vargas and Lott will finally stand together - for a better Brazil."

BRA_employ_new_rhetoric: "Employing New Rhetoric"
BRA_employ_new_rhetoric_desc: "Fifty percent of our country's population cannot own property while married, gain equal access to healthcare, nor be paid equally to the other half of the country. On paper, most would balk at this and find it utterly horrific. However, as soon as they realize that the more deprived half is not just some nebulous group but in fact, Brazil's women, they simply shrug their shoulders and move on.\n\nWhat utterly repulsive sexist garbage! Edna is the first female President that Brazil has had since founding, and not a moment too soon. It's time to take care of these long-forgotten inequalities that date all the way back to the 1934 constitution, so that we can say that equality is more than just a word on a piece of paper."

BRA_stop_the_madness: "Stop the Madness"
BRA_stop_the_madness_desc: "For goodness sake, do we truly need fifty megaprojects going on all at once? In a predictably cynical populist move, Adhemar would strategically drum up support for his presidency by undertaking obscenely expensive and vast building projects to create jobs and put more money into the economy.\n\nBut while Adhemar seemed content to act as if he was a magician that could pull all the money necessary out of a top hat, we will indulge in no such nonsense. Regrettably, these dreamboat projects will all be put to a stop. There is nothing to be salvaged from this - all we can do is redirect its funds elsewhere and pray they are more successful."
BRA_edna_megaprojects_tt: "All Megaprojects bar the §KTrans-Amazonian Highway§! and the §KItaipu Dam§! will be cancelled."

BRA_develop_the_countryside: "Develop the Countryside"
BRA_develop_the_countryside_desc: "Ignacio Rangel - the man Edna has chosen to place at the helm of Brazil's economy - is a veritable financial wizard. Like all sensible people, he spent much of the Adhemar presidency tearing his hair out over the senseless and costly megaprojects that consumed the economy. Now that the money has thankfully stopped being poured into them, we have much more to spend in places that matter.\n\nWhile some would first think to spend it on building upon existing economic foundations, Rangel disagrees. He proposes that instead, the money goes towards modernisation of the countryside. If the gap between the city and the countryside were to widen, after all, the economy would be prone to recession. It is only wise to implement this decision before carrying on with the rest of Edna's agenda."

BRA_amazonia_nossa: "Amazônia É Nossa"
BRA_amazonia_nossa_desc: "Romeu de Campos Vergal, like a limpet clinging to the belly of a ship, has carried on into the next Lott administration. Coming from the left wing of the PSP, he is of course full of bright ideas to do with what can be done to salvage what is left of the megaprojects.\n\nThis comes in the form of finishing the work that was started on the Amazon during the Adhemar administration. Many across the country are already excited at the prospect of integrating the Amazon into the country proper. There is little that is to be lost in doing this - the people of the Amazon can finally feel as if they are true Brazilians, and we can reap the political and economic rewards of doing so. A win-win situation, to be sure."

BRA_brave_and_bold: "The Brave and the Bold"
BRA_brave_and_bold_desc: "Adhemar is gone, Edna is in, and nature is starting to heal. Now that the most immediately concerning issues affecting our nation have been at least handicapped, we can move onto more pressing matters. But first - the President needs to get her game plan straight.\n\nIt is time to meet up with the larger Brazilian political circle to decide what to do. The UDN, the PTB, the PSD - almost anyone of influence will be invited. A grand league of people to finally build Brazil up to be greater than it ever was before. And where better to discuss these issues than around the barbecue?"

BRA_her_league_of_justice: "Her League of Justice"
BRA_her_league_of_justice_desc: "Has the past half a decade taught us nothing? Letting the PSP into power is akin to sprinkling cyanide into a fine meal - pointless, ruinous, and throwing away any chance of enjoying said meal. They have proven themselves incapable of proper governance, so we shall not even humor them.\n\nThe PSD, on the other hand, has long proven an excellent working partner in a coalition. There is nothing to be gained from breaking this relationship off. While their conservative wing may prove uncooperative, the reformist wing should hopefully prove strong enough. Besides - this should be a good chance to show that a President can rule Brazil without resorting to bribes!"
BRA_her_league_of_justice_tooltip: "Reforms will be passed with help of reformist wing of §YPSD§!"

BRA_her_array_of_gadgets: "Her Array of Gadgets"
BRA_her_array_of_gadgets_desc: "As upsetting as it may be for us to admit sharing any similarities between that glorified crime gang, the left-wing of the PSP largely aligns with our party - ideologically speaking, at least. And while Adhemar's twisted version of welfare and taking care of Brazil's citizens was a net negative, some good has been done.\n\nTherefore, we will need to grit our teeth and ask for the support of Vargas Jr. and his party in ruling the country. It will hit us where it hurts financially, but the support of the PSP will give us a much greater chance of passing our reforms in their strongest possible form."
BRA_her_array_of_gadgets_tooltip: "Reforms will be passed with help of §pPSP§!"

BRA_what_one_lott_started: "What One Lott Started.."
BRA_what_one_lott_started_desc: "When he was President, there were two things Henrique Lott ardently supported - agrarian reform, and voting rights for illiterates. This is something that Edna plans to see through to the very end during her presidency; deepening agrarian measures and expanding electoral rights to all citizens.\n\nHowever, before we can get to work, it will be vital to secure the support of the military. They may be largely defanged and much less likely to intervene than in previous decades, but one can never be too careful. As Lott's daughter, Edna knows many constitutionalist generals for many years - it is these men she shall approach."

BRA_finish_agrarian_reform: "Finish Agrarian Reform"
BRA_finish_agrarian_reform_desc: "Brazil is far from an entirely equal country. While the years of Adhemar's rule brought some limited prosperity to our people, vast swathes of this country remain impoverished and incapable of making a real living for themselves.\n\nWe cannot withhold help from these neglected regions. Expropriation will be made possible for these lesser developed regions, with state-owned companies receiving benefits in return. This will unfortunately anger many ranchers and rural workers, but their anger will be temporary - agrarian reform is forever."

BRA_cooperation_means_liberation: "Cooperation Means Liberation"
BRA_cooperation_means_liberation_desc: "The peasant leagues bring together all shapes and sizes of different small farmers, their cooperation with us is crucial for the success of our bill. Unfortunately, the corruption inside their ranks is a significant obstacle to our goals; a major portion of their leadership has been bribed and does not care in the slightest for the well-being of the people they are meant to represent. To deal with this problem, our government will attempt to find leaders interested in actually helping our rural communities rather than filling their own pockets."

BRA_abolish_the_spi: "Abolish the SPI"
BRA_abolish_the_spi_desc: "The recent horrifying and shocking reports about the SPI, the agency in charge of indigenous people shows terrible vision of an utterly corrupted organisation, allowing ethnic cleansing on the native people to be unpunished, and even allowing it in some instances. This can not be allowed under any circumstances, effective immediatly President Lott will disband the agency, being an investigation into the abuses commited and form a new body to protect natives with the right candidate leading it, Darcy Ribeiro"

BRA_correct_centuries_of_exploitation: "Correct Centuries of Exploitation"
BRA_correct_centuries_of_exploitation_desc: "Many amongst the Brazilian lower classes have been trod upon all their lives. By developers, by the state, by poor business practice - the list goes on. It has been this way for centuries, almost since the very foundation of Brazil itself. Natives, farmers, and minorities alike - all trampled upon and being thrown to the dogs.\n\nBut no more. We have talked the talk, and now it is time to walk the walk. A new Brazil has arrived. One that makes sure to take care of her weakest citizens - the state will now serve the people, rather than the other way around. Perhaps now we may take steps to correct the centuries of wrongdoing we have done."

BRA_perfecting_democracy: "Perfecting Our Democracy"
BRA_perfecting_democracy_desc: "Many voters in our nation have claimed that we have never been a true democracy. And you know what? They're right. Illiteracy and ignorance have plagued our voting processes since the very beginning of our democracy. But we can change this. Edna will work to become a champion of democracy and tremendously expanding the PTB electorate by instituting a series of voting rights programs."

BRA_remove_voting_barriers: "Remove Voting Barriers"
BRA_remove_voting_barriers_desc: "One of the great shames about Brazil is that it does not allow all adults to vote. Instead placing pointless restrictions on who can vote, disenfranchising large swaths of the population.\n\nOOne of the most disastorous policies is the disenfranchising of the illiterate. Edna will not allow this to continue.\n\nWhile it is too late to change the constitution to allow universal voting, changing the definitions of illiteracy can allow more people to vote.\n\nBy making the restrictions lighter we enfranchise tens of thousands and allow them to vote for the first time."

BRA_push_for_a_civil_society: "Push For A Civil Society"
BRA_push_for_a_civil_society_desc: "What good is democracy when the people have zero interest in it? We can never expect to make meaningful, long-lasting changes to our nation if the citizens remain apathetic. To solve this problem our administration will conduct a massive public campaign in order to emphasize the significance of political participation, this way everyone, from the rural peasantry to the metropolitan middle class will know that they are the only ones holding back the reinstatement of the hated oligarchy."

BRA_rescind_immigration_ban: "Rescind Japanese Immigration Ban"
BRA_rescind_immigration_ban_desc: "There are many egregious legislations in our country that shouldn't have ever been signed, but none are as pointless as the Japanese Immigration Ban. And it's even more revolting how all the previous administrations did nothing to repeal it. Fortunately, past circumstances have presented us the opportunity to finally put an end to these injustices. And given we won't have this chance again any time soon, we must make sure this discriminatory bill is repealed for good now before the seeds of hatred plowed by it grow out of control. Some in our party may complain about this "reckless" move made at the eve of elections, but if they are worried about the votes, any PSP votes we may already lose will be compensated by the Japanese's, simple as."

BRA_the_other_half: "The Other Half"
BRA_the_other_half_desc: "For how long will Brazilian women be treated as mere smiling housewives? For how long will half of the Brazilian population be denied the rights the other half enjoys simply because of their gender? Being the first female President in Brazil's history, Edna Lott doesn't plan to put her status at waste. Speeches calling for women's rights and some token legislation have been made, but it's not enough. Using the power of presidential executive orders, President Edna shall enact decrees that will facilitate the recruitment of women in the civil service and bureaucracy, with targets being set for the minimal amount of women employed in each department after a 5 years transitionary period and more."

BRA_weaken_mil_progressita: "Weaken Militarist Progressistas"
BRA_weaken_mil_progressita_desc: "As much as it pains to say, the problem of corruption is much worse than we thought. Its poison seeps and contaminates practically all spheres of power and of our society, even among those whose purpose is to protect our country and home. Now we are left to deal with PSP militarists -the so-called Progressistas- whose loyalty is solely directed to their paychecks, and who knows what could replace it once the golden tap runs dry...\n\nThis may not stamp out the root of the issue, but it is imperative for us to weaken their influence with all means available, and strengthen those who wouldn't put their loyalty under price tags, be it the Constitutionalists or even the Sorbonnes."

BRA_liberty_for_all: "Liberty for All"
BRA_liberty_for_all_desc: "With our truce over, Lacerda has already started calling our government an ochlocracy. We can only reply that we are fighting for rights for all, while he cares only for higher echelons of society. Another struggle with conservative forces over the soul of Brazil will take place and while certainly not the last, winning it will be another major success for PTB."

BRA_meet_with_wainer: "Meet with Wainer"
BRA_meet_with_wainer_desc: "If our party is going to survive, and perhaps thrive, in the election, we must begin work today. Making public our recent efforts should endear the people to our cause, and begin the long process of reminding the people that Varugism is the only way forward for Brazil. Such a task necessitates the use of every tool at our disposal: loyal unions, teachers, party officials and everyone else spurned by the PSP must be organized into a fighting force strong enough to take back our deserved place.\n\nThe first step in winning back the nation is gaining the support of one man: Samuel Wainer. As Chief Editor of the Ulitma Hora, the sole national newspaper in our corner, Wainer will be key in finally swaying the people back to our side. It's about time Edna and him talked strategy."

BRA_UDN_coldness: "The Coldness of Conservatism"
BRA_UDN_coldness_desc: "How many times does the UDN have to screw over the people before they stop winning the northeast? Honestly, how is it possible that everyone already forgot that the UDN is that party that cut the minimum wage, and that Gomes's presidency was a complete disaster barely a decade ago? The only reason they have any swing up there anyways is because Távora broke Vargas's trust, and formed the party behind his back.\n\nBut due to Adhemar and the crisis within the PSP, many right wing voters are once again flocking back to the 'sensible' conservative party to stop us winning the election, we have to prevent this. By pulling some strings in Nordeste, we can make sure that the people finally remember the full picture. Lacerda's stain must be wiped away, so the PSP can finally return to our rightful place. It's time for the north to wake up."

BRA_PSP_corruption: "The Corruption of Adhemarism"
BRA_PSP_corruption_desc: "It's no secret that the PSP is a party of corruption, and even saying this is a massive understatement of the true level of bribery and lies that have spread throughout the government during Barros's reign. Corruption has become the norm, not because of any failure of the government, but by its use as a tool to spread party influence. Yet they always manage to get away with it, convincing the people that their actions are justified in the name of the "common good" as they line their purses.\n\nFrom now on we're going to set the record straight. Our economists will make sure that the everyone understands just how much corruption has cost the nation, and our journalists will make sure that nobody can round a single street corner without hearing about the newest sordid details of Adhemar and Vargas Jr's past misdeeds."

BRA_together_with_papa: "Together with Papa"
BRA_together_with_papa_desc: "As our captain picks up momentum, the Lott dynasty can begin to take center place in the publicity. Across the nation, Edna and her father are traveling to remind the people what the PTB has always stood for: legality, equality, and progress for all, not just government cronies. Together and separate, they have made dozens of speeches, each one bringing another mass of people back to the correct side.\n\nWorking as one, they create a national narrative far stronger than their lying propaganda machines. Our opponents must surely be afraid as they watch the Lotts build a new political dynasty from the ash and rubble of Adhemar's failures!"

BRA_making_vargas_proud: "Making Vargas Proud"
BRA_making_vargas_proud_desc: "We did it! Edna has proven herself more than a match for even the biggest power players in Brazil, and has truely proven herself a legitimate inheritor of the Vargas legacy. As the PTB works endlessly to achieve prosperity never before seen in our history, the memory of Adhemar's corrupt regime may at last begin to fade. The road ahead remains long, but Edna and her cabinet have proved that they are tireless, and will walk as long as it takes to reach a free Brazil.\n\nFor today though, Edna and the nation can celebrate, knowing full well that, for today at least, they have won. As we drink tonight, we taste the nectar of victory, made sweeter by the injustice we have defeated. Tomorrow can come with what it may, but our mighty nation, united behind its fearless leader, will surely succeed!"

BRA_use_last_moments: "Using Our Last Moments"
BRA_use_last_moments_desc: "We failed. Despite the best efforts of Edna and our party, we have lost. The nation will stagnate under yet another five years of non-Varguist rule, and other parties will seek to fill the power vacuum we have failed to capitalize on. The future of the nation, and our party, will remain uncertain.\n\nHowever, the world continues to turn despite our defeat, and the PTB must survive. True to our ideals, Edna will use her last moments in office to advance gender equality as much as possible, by abolishing wage inequality in all state companies nationwide. After this, and the finalization of our purge of Adhemar's corruption, surely the people will recognize that we left this nation better than we found it."

BRA_adhemar_gone: "He Is Gone"
BRA_adhemar_gone_desc: "The Social Progressive Revolution, which began four years ago with the election of our esteemed, now deceased President Adhemar Pereira de Barros—may the merciful Lord grant him eternal rest—is now in the greatest period of instability it has ever experienced. Our PSP has faced terrible difficulties in the President's absence. Planning for Edna Lott's impeachment, drifting too close to Germany, Adhemar falling into a coma, aborting attempts to remove him from the presidency, and finally his death—it has all passed by so quickly, so cruelly.\n\nTo Laudo all this seems like the stuff of a nightmare, but he knows no amount of pinching will save him. He must move quickly to ensure that Pedro Aleixo's provisional presidency does not result in the fall of the PSP from power, never to return again. Under Laudo Natel's guidance, the PSP must regain its popularity and win the 1970 election—and God knows as well as Laudo does that he has his work cut out for him."

BRA_calculate_losses: "Calculate Our Losses"
BRA_calculate_losses_desc: "One of the reasons that the Social Progressive Revolution is now in such danger with the death of Adhemar de Barros is that he was the strongest binder maintaining party unity during times of crisis and prosperity. The suddenness and destabilizing effects of his demise have left us preoccupied at a moment we could have used to ensure the PSP was behind us—and in the meantime, while Adhemar has gone to ground, we have suffered terrible damage.\n\nBefore we can even begin to think on how to mend this damage, we need to understand its extent. We need to leverage our sources in the PSP and determine how severe the damage is. São Paulo remembers its President and remains loyal to the party of the great man now buried with his fathers in Piracicaba, but men of other regions may well prove troublesome..."
BRA_calculate_losses_tt: "$BRA_party_psp_c$ senators are §Rdefecting from the party§!..."

BRA_keep_party_unity: "Maintain Party Unity"
BRA_keep_party_unity_desc: "If we want to rally the Partido Social Progressista—to preserve the hard work of our great President, Adhemar de Barros, while he rests with God and His Saints—a technocrat such as Laudo Natel will be of no use, and he knows it as well as any. If we put him forward as the next President to take over when Aleixo's mandate expires, we will have learned nothing from the hell that the uncharismatic Marshal Lott was put through fighting against Quadros in 1960.\n\nNo, we need a man able to unify us and successfully defeat the Varguists and conservatives. The people of the PSP can think of only one option: the namesake son of the Father of the Poor, our late President's protégé—Getúlio Vargas Filho. "Júnior" will leverage his charisma, surname, and good relations with Adhemar to prevent the fragmentation of the PSP in a way that Laudo could never hope to do."

BRA_adhemar_successor: "His Natural Successor"
BRA_adhemar_successor_desc: "The first steps having been executed, the way forward is clear. Laudo Natel has to make sure that the new President will allow the PSP to serve out the remainder of Adhemar's term. We must fulfill the mandate given to us by the will of the people in 1965, and persuade Senhor Aleixo to act only as a caretaker.\n\nThis will not be easy, not even close. Aleixo is not some sort of yes-man, and Laudo knows better than to delude himself into thinking so. If Laudo fails to put all his skills of suasion and intimidation to use, his wild ride as Adhemar's locum tenens will crash and burn before it even gets off the ground."

BRA_winter_is_coming: "Winter Is Coming"
BRA_winter_is_coming_desc: "Our economy minister, Senhor Delfim Netto, is convinced that the only way to save the Brazilian economy from collapse is a wage freeze. However, with Adhemar in the grave and the government unstable, that is almost certain to destroy us in any election. Instead, we must for the time being settle with reducing the possibility of indexing wages to inflation.\n\nBefore elections, in order to avoid sabotaging Júnior's chances, we will strive to make the process as painless as possible—and only really clamp down once the vote has succeeded, finally freezing wages to the extent necessary during the new presidency. The UDN is likely to consider this an opportune measure, but we can strengthen their support by passing a bill abolishing trade union taxes, justifying it as an unnecessary burden on the Brazilian worker."

BRA_continue_as_usual: "Continue as Usual"
BRA_continue_as_usual_desc: "The PSP has always been a political underdog—that is a reality that Adhemar had to confront, and it probably helped lead to his heart attack; now it is time for Laudo Natel to confront it too. On our own, we cannot hope for anything resembling a victory—so we must make sure to make the PSP bulletproof.\n\nHow, you ask? Simply stuff all ministries and governmental agencies with associates we can trust, and change labour laws to render their firing very expensive and functionally a near impossibility. To ensure the PTB does not raise any problems, we will also make sure to include some additional provisions to safeguard the positions of trade unions and peasants' leagues, as well as raise civil servant pay."

BRA_clean_hands: "Clean Hands"
BRA_clean_hands_desc: "On our own, we cannot hope for anything resembling a victory; we must do what Adhemar always did, and build a robust coalition to pass our bills. The current bill must attempt to gather votes not just from the PSP but from deputies of other parties.\n\nWhereas Adhemar could get away with the Rouba-mas-Faz attitude, a faceless technocrat such as Laudo Natel will only earn tomatoes in his face (if not bullets through his skull) if he tries to parrot him. Therefore, we need to ensure that the law is passed without bribes so as to show that we are in fact still a legitimate government and not corrupt or bent on seeing the country go bankrupt for our own political gain.\n\n§xNote and note well that if we fail in this, our chances of reelection will be effectively nonexistent.§!"
BRA_clean_hands_tt: "The bill we chose will be called to vote..."

BRA_no_populism_laudo: "An End to Populism"
BRA_no_populism_laudo_desc: "There are those that claim that populism is the legacy of our late-lamented President, Adhemar de Barros. But if one examines the origins of such rhetoric, one merely finds a lot of Udenists and Petebists attempting to psychologically project their defective politics onto a man who gave his all for the homeland.\n\nThe logical continuation of our efforts is the improvement of our bureaucratic functions and an emphasis on the appointment of technocrats to manage the Brazilian state. This is the greatest legacy of Adhemar de Barros, the tradition he has left behind to us; we owe it to his honour as our President to continue this into the future. We will coopt Technocratic politicans and ministers from the UDN, PSD, and PTB, to show the efficiency of the new PSP. From this day on, the PSP will be known as a party of efficiency and progress—and as for anything that fanatics might call 'corruption', innovative accounting methods will assist in assuaging doubts."
BRA_no_populism_laudo_trigger_tt: "We have passed the §KNational Standardization of Wages Indexation Act§!."

BRA_join_or_die_laudo: "Join or Die"
BRA_join_or_die_laudo_desc: "Before the bill is fully implemented, we have some work to do to ensure our security. For instance, we have to ensure that government workers and their families will vote for the Partido Social Progressista. After all, we Pessepistas are the people responsible for their welfare and that of their families.\n\n"Vote for the PSP! What, you don't want to? Fine, just go find another job then, outside the civil service. What, you voted for us? Congratulations! You are going to enjoy the benefits of the safest post in the entire Republic of Brazil, hell, possibly the entire continent.""
BRA_join_or_die_laudo_trigger_tt: "We have passed the §KLabor Law Reform Act§!."

BRA_killers_adhemar: "The Killers of Adhemar"
BRA_killers_adhemar_desc: "While the late President, Dr. Adhemar Pereira de Barros, yet lived, he served his people in many ways. First he was a physician, then he served as Governor of São Paulo, then he led the PSP, then he became President. However, considering the way political developments have occurred since Adhemar's death, it emerges with an elegant inevitability that there is one more way he can serve us.\n\nThe circumstances of his demise are eminently useful as a source of political capital. This controversy over German spies created pandemonium. We can exploit that to spread rumours about the Germans poisoning Adhemar before he could purge them after he realised his mistake of permitting the German-serving traitor Liana Clemente to seduce him. This should also give us whatever justification we need to sever all ties with the Pakt."

BRA_total_army_compatability: "Total Army Compatibility"
BRA_total_army_compatability_desc: "We wasted a lot of time on erroneous policy with regard to the OFN. As a result, at this moment we lack the time or political will to completely integrate ourselves with the organization that is the last hope of the free world. However, not all hope is lost.\n\nA direct line between our high command and its OFN counterparts, combined with ensuring that our armed forces' equipment standards closely match those of the best militaries in the OFN, will more than suffice as an initial move to increase our integration with them. It is elevated and correct; from today on, we stand against fascism together!"

BRA_negotiate_debt_payment: "Negotiate Debt Payments"
BRA_negotiate_debt_payment_desc: "We have essentially hounded the Pakt and its German slaves out of Brazil faster than you can say 'foda-se'. Despite that there are those on Capitol Hill and in Washington that still have their doubts about the true direction of our régime. Fortunately, that's what we have a foreign minister for.\n\nLet us send Vasco Leitão da Cunha to Washington D.C. to ask about the possibility of cutting down on the payment of the enormous interest on our debt. If they can show us this discretion, it will help us as we strive to undo the damage Adhemar did to our diplomatic relations."

BRA_bastion_of_innovation: "Bastion of Innovations"
BRA_bastion_of_innovation_desc: "We have obliterated the influence of the degenerate oppressors of Europe, and supplanted it with the more beneficial economic influences of the Americans and their allies. However, if there is one thing that Quadros taught us correctly, it is that we should never put anything on one card or all our eggs in one basket.\n\nSlightly reducing tariffs for the CPS countries should encourage the OFN and the CPS to increase their investments. They will want to compete for our favour, outbidding each other left and right, and we can only benefit from that."

BRA_stop_all_megaprojects: "Stop the Megaprojects"
BRA_stop_all_megaprojects_desc: "How many great projects have proved futile throughout the ages? The Great Wall was useless day in and day out, as the Chinese recount. Forget defending against the Japanese, it could not even hold the Mongols back. Then there was that damn fool proposal for a Gibraltar Dam, which would have done nothing but bankrupt Germany and quite possibly Iberia too, and left Europe a ruin more failed than, well, ever.\n\nAs it is in northern China and Germany, so it is here too. This nation must be honest with itself: megaprojects have failed. We have lost time and money on them, that could have been spent elsewhere. Worse yet, that futility was compounded by an increase in corruption and a fattening of the wallets of the corrupt. It is well past time for us to restore financial sanity: if not, Brazil will be slain by bankruptcy even if the PSP holds out in the election."
BRA_stop_all_megaprojects_tt: "We will remove §Rall§! unfinished megaprojects."

BRA_sell_petrobras: "Sell Petrobras Shares"
BRA_sell_petrobras_desc: "It is high time for us to set about doing what Minister Delfim Netto is advising us to do: partially privatising Petrobras, and selling some of its assets to foreign companies. Obviously, not even Delfim Netto is gung-ho enough to contemplate going the whole ham and privatising the whole thing (for fear that the Varguists will rapidly collapse the government), but some of them need to be sold and there can be no disagreement on the matter.\n\n"Why?" one asks. The reason for this is simple: we need to encourage competition in the oil market, so as to stimulate growth, and get some money in order to stop our mushrooming debt as soon as possible."

BRA_lower_taxes: "Lower Taxes"
BRA_lower_taxes_desc: "It is high time for us to set about doing what Minister Delfim Netto advises us to do: reform taxes in order to create an economic boom. The most straight-forward, vote-winning method of doing this is to reduce lower income brackets' income taxes, in such a manner where those lower brackets can see us. Perhaps televising it and taking out advertisements in every newspaper will help.\n\nAt the same time, there will be a part that is kept quiet to avoid any controversies. We will split the cost and increase taxes on the rich by a relatively slight amount, so as to ensure that our treasury suffers only minimal damage."

BRA_end_protectionism: "End Protectionist Policies"
BRA_end_protectionism_desc: "Many economists in Brazil have for long argued that the hitherto established economic doctrine of import-substitution industrialisation, which focuses on preventing foreign corporations from doing business in Brazil in favour of generating local alternatives, has exhausted its usefulness. Antônio Delfim Netto has long been of this view, and has convinced the Aleixo cabinet to agree with him.\n\nIf we have thrown out the old model, we need to find alternative solutions to encourage economic growth. A good start will be the lowering of tariffs for all OFN countries, in the hope that they will take the opportunity to invest in our country."

BRA_we_cannot_lose: "We Cannot Lose"
BRA_we_cannot_lose_desc: "At long last we have successfully adjusted our economic, diplomatic, and political courses to the new circumstances in the aftermath of Adhemar's loss, may he rest in peace. But now we have a major problem ahead of us: the urgent need to ensure the unity of the Social Progressive Party.\n\nLaudo Natel has to move quickly. The PSP convention must be organised in such a way that Vargas Júnior and no-one else is selected as the presidential nominee, leaving only the vice-presidential selection to the delegates. And when that is done, the campaign, which is the PSP's now-or-never moment, must go into full swing."

BRA_new_father_of_poor: "The New Father of the Poor"
BRA_new_father_of_poor_desc: "Some candidates generate their own advantages. Our candidate is not some country bumpkin from Pindamonhangaba, Paranápanema, or Votuporanga. He is the son of the Father of the Poor, the greatest of all Presidents of Brazil except for maybe Adhemar. He is the Governor of São Paulo, Adhemar's chosen political heir: Getúlio Sarmanho Vargas, Vargas Filho!\n\nWith our candidate, there's not much we need to do to think up a campaign strategy. The strategy is obvious: we will use all footage we have of Júnior with his father and Adhemar. In this manner we shall remind everyone that he is the heir of the greatest leaders in Brazilian history, and the preserver of their legacies."

BRA_sao_paulo_bastion: "Fortress São Paulo"
BRA_sao_paulo_bastion_desc: "Our campaign cannot but collapse if we lose control of São Paulo state, which is the old bastion of our party. Therefore, we have no choice but to resort to drastic, potentially ruthless methods.\n\nDuring his governorship, Adhemar organised paramilitaries to ensure, as it were, the continuation of stability and order in his state. This was supported by local oligarchs that supported and funded our party. Those paramilitaries have not dissipated since then, but their old leader's death has left them shiftless and scared some of the oligarchs; we must give them something to do.\n\nFirstly we will contact these oligarchs and bring them back on side, some well placed bribes will stop any defections to the PSD. Secondly, by directive of the Minister-without-Portfolio, the paramilitaries will be given two tasks: first, to ensure that no newspapers criticise the PSP, and second, to ensure that Quadros' madness continues to be denounced. Though he may have retired, the reminder of his Udenist candidacy in 1960 will certainly help."

BRA_find_allies_shadows: "Find Allies in the Shadows"
BRA_find_allies_shadows_desc: "Let us leave campaigning to Vargas Filho. A son of the Father of the Poor, whose legacy has outlived the Hitlerite triumph, several coup attempts, conservative hegemonies, and the Argentine threat to our south, should have no problem. Meanwhile, Laudo's job must be to organise the largest operation of his short time in the government.\n\nTo ensure PSP victory in presidential and parliamentary elections, Natel must start a massive bribery program. You want your vote bought? Sure, here's some money. You want a road built? Vote for us and you'll get it. Your useless nephew wants a job? Sure, pay us, and then we'll pay him."

BRA_sway_the_south: "Sway the South"
BRA_sway_the_south_desc: "In the general case Rio Grande do Sul is one of the traditional strongholds of the Partido Trabalhista Brasileira. This makes sense when one considers the fact that a large swathe of their political idols, such as Vargas the elder, Goulart, and Brizola, all hail from this province—political allegiance here is no mere matter of party, but often a matter of state identity and ties of family and friendship.\n\nAt the same time the UDN through cooperating with other minor parties such as the PCD and PL, acts as the main opposition to the PTB in this region. Historically the PSP and PSD have both struggled to build a base in this region.\n\nBut the universal lubricant of money can disrupt all of that. With aggressive campaigning—and bribery, of course—we should be able to reverse that trend. We will also use our media contacts in the region to ensure Goulart and Lacerda while campaigning direct their attacks at each other and not at Vargas, divide and conquer. Through this, rhetoric and well-deployed envelopes, we can claim another state to follow the legacy of both Adhemar de Barros and Getúlio Vargas, since our candidate is the political heir of both men."

BRA_pray_it_works: "Pray It Works"
BRA_pray_it_works_desc: "The work that Minister-without-Portfolio Laudo Natel has been doing to keep the PSP both in power and popular has been without parallel in modern Brazilian history. He has exerted himself beyond belief, working himself to the bone with very little in terms of rest or recreation. Surely, this is an experience he never wants to repeat again.\n\nNatel had better hope it was not for nothing. If this fails, after all that he has done, the PSP is almost certain to die as a national party. All that will be left will be the governorship of young Getúlio Vargas, and the hegemony secured in São Paulo—for the rest will crumble away like the French Army in the face of the Blitzkrieg the moment there is a defeat."

BRA_another_five_years: "Another Five Years"
BRA_another_five_years_desc: "Laudo Natel really only has one thing going through his mind these days: "Veni, vidi, vici."\n\nThe Aleixo presidency—more accurately, the Natel shadow-presidency—was more than enough to resurrect the spirit of the Partido Social Progressista, which was thought dead forevermore after Adhemar's sudden death. Combined with a vigorous campaign (and prudential use of envelopes in the right place), the PSP now holds a mandate to continue Adhemar's government.\n\nNow Laudo is free to rest a little in the vice-presidential palace, while a new President takes over the reins."
BRA_vargas_won_1970_tt: "§hVargas Jr§! §Gwon§! the election."

BRA_take_revenge: "Take Revenge"
BRA_take_revenge_desc: "Laudo Natel is shaking in his boots, as well he should be. The PSP has been defeated, and the new presidency will begin in a matter of time. The dream is dead, and the terrible process of the Pessepista constriction outside of São Paulo is already beginning.\n\nDuring his last moments in government, there is but one thing for the failed leader to do. He needs to ensure that the Partido Social Progressista has enough funds to survive life in opposition, by one way or another. If revenge can be arranged against those whose betrayals have deprived Brazil of the great opportunity of the enlightened rule of the heir of Vargas and Adhemar, so be it.\n\nAll that notwithstanding, this second defeat also means the end of Laudo's political career—if he's lucky. If some muckraker starts to investigate why the allegedly technocratic caretaker President Aleixo had a PSP-aligned cabinet, legal problems might be the most charitable way of describing the hot water he'll be landed in."
BRA_vargas_lost_1970_tt: "§hVargas Jr§! §Rlost§! the election."

brazil_adhemar.1.t: "The Bull and His Throne Room"
brazil_adhemar.1.desc: "The presidential office was cleaned out, safe for a few crates that his aides had stacked in a corner. Adhemar walked from corner to corner, building a mental map of his new base of operation. There would of course need to be a few decorations. Without going into excess, Adhemar enjoyed an office that felt a little more lived in, a little less austere. There would of course be time to correct all this.\n\nHe had done it! The presidency was his! The Lord almighty had entrusted him with this task, at an historical era for the Brazilian republic.\n\nOutside the assembled crowd's voices could be heard, a constant, happy rumbling. Adhemar would let them simmer a little longer. There would be enough time to share with them the excitement. Time enough for projects, for reforms. There would be all the time in the world.\n\nOn one of the walls, a forgotten nail stood alone. Had his predecessor hung something there? No matter. An opportunity, big or small, should always be taken. President Adhemar gently retrieved a portrait of the great President of the old republic, Washington Luís, and hung it on the wall.\n\nThe time for great things had come."
brazil_adhemar.1.a: "Ademá, Ademá!"

brazil_adhemar.2.t: "Dealing the Deck"
brazil_adhemar.2.desc: "Staff meetings were always some of Adhemar's favorite obligations. Meeting his teams, managing assignments, verifying who was reliable and who was expendable. The Bull found himself in the centre of a web of associates and partnerships of dizzying complexity. All of it necessary to keep his back secure. And Adhemar appreciated the challenge of dealing with people, predictable in their whims and schemes. Better that than whatever wrench the Lord up high could throw into his plans.\n\nThe day's meeting sought to organize the spoils of the campaign. Various ministries had to be assigned. Some high ranking Adhemarist like Laudo Natel had failed to be elected, and thus giving them a ministerial portfolio would be the best use of their abilities, and the best guarantor of their loyalty.\n\nAlso on the day's agenda was discussion of Edna Lott. A clique of Adhemar's advisors, the scorned Laudo Natel at their centre, saw the labour Vice-President as one of the greatest threats to the new Adhemar administration. The President couldn't disagree with their analysis. Had Quadros not been a constant thorn in the problem of the old Lott administration, after all? If not managed cautiously Edna Lott would prove to be a dangerous fifth column within his government.\n\nFinally, the matter of healthcare. Adhemar presented his plans for healthcare reform. The assembled men cheered on the ambitious project. Many no doubt saw it as an essential step to guarantee the health and progress of Brazil. Others likely thought of it as the propaganda coup of the century. The President could not smile at his ambitious associate's lack of vision in this particular area. The reform would achieve both objectives."
brazil_adhemar.2.a: "Time to get this show on the road."

brazil_adhemar.3.t: "President and Vice President"
brazil_adhemar.3.desc: "There was a certain mirth to President Adhemar's mood as he and his advisors dreamed up ever more complex ways to shut out his Vice-President out of any center of power. So far they had stopped informing her of meeting times. They had randomized security measures to make her movement through Brasília and the Palácio da Alvorada needlessly complicated. Her requests for upcoming government decisions were answered with the drafts of policy projects, written by a half illiterate relative of one of his ministers. All of her attempts to find the full detail of government projects were stymied by a maze of red tape thick enough to shame daedalus.\n\nThere was a certain irritation to Vice-President Edna Lott as she leafed through another pile of incoherent, shoddily written law decrees. Opposition politicians usually knew more about the goings on within the presidential palace than she did. The Vice-President tapped her desk with her fingers, observing the pile of documents. Half of them reeked of food. Had Adhemar transcribed the bills on restaurant napkins just to irritate her? An intense pressure built up in her head. A white flash behind her eyes, and then calm once more. Edna Lott pushed the whole tower of documents into a paper bin. She would have become Adhemar's friend, if grudgingly. She would now relish becoming his enemy and making his life as difficult as the powers of her office allowed her."
brazil_adhemar.3.a: "Hell hath no fury..."

brazil_adhemar.4.t: "Meeting the Daughter"
brazil_adhemar.4.desc: "The afternoon coffee with his Vice President was a new beginning of sorts. On their first few official meetings, Edna Lott had been guarded, a slowly simmering passionate anger beneath the surface of cold, careful manners. Adhemar had in turn been cautious, his politeness rounding the edge of his wry demeanor.\n\nThe day's meeting was still labored. Both the President and Vice President remained on their guard. Neither wished to betray any weakness to their rival. As they broached the day's main topic, Lott's composure faltered for a moment and the President thought he could see her curiosity. "You are doing this, then? Working with Labour and I to get your healthcare reform moving."\n\n"Of course. It will not be easy to align both of our parties together. However, convincing the UDN and other conservatives to give us even a penny of funding is out of the question."\n\nLott smiled weakly, raising an eyebrow. "You undersell yourself, Mr. President. I'm sure someone of your caliber could manage it. Especially if you had sold it as a campaign against communism and the PTB. That said, your willingness to work with us is creditable."\n\nThe rest of the conversation progressed at a slow and careful pace. Both President and Vice President argued details here and there, each in turn trying to win their side the lion's share of the project. By the end of the meeting, something like the beginning of a working relationship had appeared."
brazil_adhemar.4.a: "We'll have to keep an eye on her."

brazil_adhemar.5.t: "Meeting with Braga"
brazil_adhemar.5.desc: "The governor of Paraná took the President's hand and shook it gingerly. A former military man, Ney Braga stood straight in a relaxed manner. He observed his President with a polite curiosity. After a moment he shook his head once, as though having reached a private conclusion. "Well, come on in, Mr. President. The State of Paraná welcomes you."\n\nAfter the usual set of speeches and public event, the two men found a moment of quiet in the evening. The governor waited patiently for Adhemar to discuss the reason for his visit. "Governor Braga." the President began. "I've long argued that Brazilian healthcare is in need of reform." Braga raised an eyebrow. Adhemar carried on, unperturbed. "Of course, such reforms will need to respect our great nation's federal structure. We are ever wary of the state's God granted rights."\n\n"You begin your visits with a visit to me, Mr. President. Am I to understand that the UDN and other conservative movements lie at the core of your reforms?"\n\n"Of course, governor Braga. We bring not to Brazil some later-day Bukharinite mess, but a new platform to synergize federal and provincial reform efforts with private initiative and employer healthcare reforms." Adhemar went on, pretending to search for his words. "There are some, of course, like Mr. Lacerda, who might object to such programs. Accuse us of pandering to communist, to elements of the PTB."\n\n"Lacerda is but one voice among the right, Mr. President. With your attitude of collaboration and consensus building, he might soon find himself isolated," replied Braga, a thin smile floating on his lips. Adhemar, too, smiled."
brazil_adhemar.5.a: "A political consensus is all we seek."

brazil_adhemar.6.t: "Strange Bedfellows"
brazil_adhemar.6.desc: "Edna Lott had not yet gotten used to the novelty of working with President Adhemar. She could scarcely begrudge her associates in the PTB, then, for their difficulty meeting face to face with the populist President.\n\nGoulart and Brizola were not at their first strategy meeting with Adhemar. Engineered by Lott, these get togethers usually centered on some parliamentary strategy or another. Neither Goulart nor Brizola expected the day's bombshell.\n\n"Universal free... healthcare?" Asked Goulart. The labour politician did not bother trying to hide his surprise. Lott nodded.\n\n"That is the arrangement President Adhemar seeks," she said. An easy going grin settled on Goulart's traits.\n\n"What's in it for us?" Asked Brizola, his sharp political mind cutting to the point as always.\n\n"The PTB will get massive good publicity." replied Adhemar. "Think about it, Brizola, we have quite the opportunity. You lots will receive massive publicity. My own party will gain as well. In the long run you'll eclipse the PSD as the left's party. It's a win-win arrangement, yes?"\n\n"Quite." Brizola said. His eyes narrowed. No doubt the President had some ulterior scheme in mind. Nevertheless the labour politician could not shake his associate's mood that this was the opportunity of a lifetime. "Then, ladies and gentlemen, time to get started?""
brazil_adhemar.6.a: "History is ours for the making."

brazil_adhemar.7.t: "The Adhemarmobile"
brazil_adhemar.7.desc: "The ambulance contract was almost ready. Funding had been set aside. Analysis of how many vehicles would be needed throughout the country had been made. The level of bribe and kickbacks to integrate into the process at each step had been calculated. The project was set to roll out... or it would be, had a decision been taken considering the source of the ambulances.\n\nThe cabinet had split almost down the middle on whether to choose the American Ford or the Japanese Toyota company as the main source of the ambulances. Picking Toyota would ingratiate Brazil to Japan, and would help Brazil's foreign policy lean in that direction. Buying American, on the other hand, would be popular in Washington D.C.\n\nThere was always the option of buying domestic. Brazilian ambulances would be just as good, their production would boost the economy, and make a lot of local businessmen happy with Adhemar. That said, in these troubled times it paid to pay respect to Tokyo or Washington. As such, the President would have to make a decision about the provenance of the new ambulances."
brazil_adhemar.7.a: "Brazilian businesses must be supported!"
brazil_adhemar.7.b: "Americans remain the car specialists."
brazil_adhemar.7.c: "Let's give Japanese engines a chance."

brazil_adhemar.8.t: "The Bill Is Announced"
brazil_adhemar.8.desc: "Alone in his office in the Palácio da Alvorada, President Adhemar read the day's newspapers.\n\nThe announcement of a new healthcare bill had taken the capital by storm. Already several elements of the UDN as well as some members of the PSD had contacted him to reassure the President of their support. Ney Braga's seal of approval weighed heavily in the calculation. Braga would likely have been one of the main poles of resistance in the states. Seeing him support the bill had energized the President's coalition like nothing else.\n\nNot all were convinced, of course. The better part of the PSD, as well as all of the PTB, had demurred. The idea of involving state level governments and private partners into healthcare reforms had raised objections on the left, as the Getulists accused the bill of being a pile of half measures aimed to deprive Brazilians of healthcare.\n\nAnd on the far right, the Crow screeched about communism, about government waste, about pork barrel politics meant to keep Adhemar in power.\n\nThe President leaned back in his chair, content. All had gone to plan so far. A content smile illuminated his visage. The portrait of Washington Luís observed him impassively, from the office's other corner."
brazil_adhemar.8.a: "We are going to win this!"

brazil_adhemar.9.t: "A National Public Option"
brazil_adhemar.9.desc: "The assembled crowd roared as one in São Paulo when Adhemar gave his initial speech. Into a world where the poor had so little and where the vagaries of life could take so much, the President announced one of the world's first universal healthcare. The Brazilian nation would care for its own, no matter big or small. The crowd roared again, a great human wave surrounding its President as he proclaimed the new era.\n\nThe wave spread throughout the country as friends and allies amplified the signal. In São Paulo governor Vargas Jr. arranged for the press to relay the President's message. Throughout the nation , other governors aligned with the PTB echoed the President.\n\nThere were those who would stand against progress, of course. Lacerda, that great rock of the conservative movement, launched into an offensive of his own. Communism in all but name, Adhemar's red nannies would accompany Brazilians from cradle to an early grave, the sacrilegious socialist state dissolving civilization in its blasphemous tide.\n\nWhat were mere boats against the tide? Adhemar had to laugh as he read editorials from Lacerda's newspapers. All their impotent fury had not won them the presidency. Could they stop Adhemar now? The President stood from his desk. The fight would come, no doubt. Adhemar relished the opportunity to humiliate Lacerda yet again."
brazil_adhemar.9.a: "The Crow squawks in vain."

brazil_adhemar.10.t: "A Glorious Success"
brazil_adhemar.10.desc: "The Planalto, Brazil's presidential palace, was in an uproar for it was President Adhemar de Barros' victory party due to the passing of his Health Care act. The party was very lively with the best food, drinks, services and music money could buy. The people present were from all backgrounds, from common people to famous celebrities, from workers to captains of industry and agricultural landlords. But it was mostly filled with PSP apparatchiks and sycophants, which made President Adhemar feel in 'his element.\n\n-'This,' spoke Adhemar to the party attendants, 'my friends, is merely the first act on one of the greatest epics in the history of the Brazilian Republic. This, our new National Health Service, shall better Brazilians' lives for generations and generations to come. It is nothing more than another proof that the only ones who not only care for the lives of our fellow countrymen but that it is also only the PSP that can achieve solid acts and feats for the betterment of our nation as a whole. Furthermore...'\n\nHis speech was interrupted by a presidential aide announcing to him the arrival of his VP Edna Lott alongside a cohort of Varguist PTB sympathizers. He then went then to receive compliments from his main partner in the administration; however, what he received from the daughter of his predecessor surprised him:\n\n-'Mr. President we need to talk, this is a premature time to hold this type of celebration. We still need to progress further in Healthcare, for there are many things to be defined. Furthermore, the National Health Service can't just be left to its own devices and needs further guidance from the government if we want it to work properly.'\n\nPresident Adhemar continued to hear her tirade and an uncomfortable feeling over him alongside one single thought:"
brazil_adhemar.10.a: ""Well... Things are never this easy.""

brazil_adhemar.11.t: "Welcome Back, Laudo!"
brazil_adhemar.11.desc: ""I tell you, Barreto, it's your fault the bill failed, and nothing you tell me will convince me otherwise!"\n\nAdhemar slammed the table in displeasure. Thanks to Benedito Manhães Barreto's "incompetence" (read: inability to convince an opposition already predisposed to refuse him and Adhemar anything), the healthcare bill had failed. On the other hand, Barreto saw it distinctly differently.\n\n"What do you mean, 'my fault'? If you'd done your most basic duty and, you know, tried to convince your alleged 'connections' to go along with the healthcare bill, the bill would have passed! And as for firing me, you're the only one who is going to suffer for that—those plans of mine to expand Petrobras are going to fall by the wayside now, you better believe it!"\n\nAdhemar scoffed. "I don't care. My decision is final, by the Blessed Mother. Get out!"\n\nAs Barreto went out, he saw Laudo Natel walking in and heard his former boss declaring him the new economic minister. Filled with rage at the whole situation, he shouted at the top of his lungs: "You bastard! You haven't heard the last of me, I tell you!" and went to Edna Lott's office, where he would find a more polite welcome.\n\nAdhemar, on the other hand, simply broke out some champagne (which he had received as a bribe) and shared it with Natel. "To the new Minister of the Economy!""
brazil_adhemar.11.a: ""God grant that he be better than the old one!""

brazil_adhemar.12.t: "The Fork in the Road"
brazil_adhemar.12.desc: "President Adhemar de Barros sat at a table alongside his Ministerial Cabinet. Many papers were piled atop the table. Plans, so many plans. Plans to make Brazil great plans to make the people prosperous, and peaceful. New public services and programs to better the people's lives, and more importantly, guarantee their votes.\n\n-"Gentlemen", spoke the President, "our job is arduous and of titanic proportions, but so shall be the rewards that shall be brought by them, we shall make Brazil the Las Vegas of the Southern Hemisphere, Tourists shall come from all corners, and alongside them Industry and investment, and do not care if it comes from Wall Street, Tokyo or even if it comes from the Reich, they shall come and we shall do everything necessary that they indeed do so, I do not care how much it costs and what or even who we have to buy we will do it and..."\n\nPresident Adhemar was interrupted by the sound of the phone in his office ringing. So he excused the cabinet and then closed the door between them and his office. He then answered the phone. And out of it came a melody to his ears. His offshore bank account in Switzerland was ready to be filled with his personal spoils. After the call, he just sat in his chair and said:"
brazil_adhemar.12.a: ""It feels good to be President!""

brazil_adhemar.13.t: "The Matter of Education"
brazil_adhemar.13.desc: ""Mr. de Matos," Adhemar said, beckoning the Minister of Education into his office. "What do you have for me today?" The leather chair and sofas were all empty, it was early in the day. Outside, the sun shone, soft and gentle upon the leaves of the verdant trees surrounding the palace. De Matos bowed, before presenting him a few files. "What's this?" Adhemar said, an incredulous smile on his lips.\n\n"Education data from the previous administration," de Matos began. "Literacy rates, graduation statistics, scores, and other such things."\n\n"And?" Adhemar thumbed through the files.\n\n"Pardon, sir?" De Matos blinked.\n\n"What's this for? Aren't you the Minister of Education? Why bother me with all this-" Adhemar waved his hand over the spread of papers. "All these statistics?"\n\n"Well, we do need your approval on pertinent matters-"\n\nAdhemar chortled. "Pardon me, alright." He clapped his hands together. "Continue the work of the Kubitschek administration. Build schools, hire teachers, modernize what we have. Make everything slick, make sure nothing sticks. Raise salaries if you have to. Avoid the Vice President. Don't let her nag on you for half a day about education. Got it?"\n\nDe Matos nodded.\n\n"Good man. Now," he stood up from his desk. "The cabinet awaits. Handle the little details, would you? The people elected me to lead, and I intend to do just that today.""
brazil_adhemar.13.a: ""Yes, sir.""

brazil_adhemar.14.t: "A Day in the Life of Doctor Pimentel"
brazil_adhemar.14.desc: "Doctor Pimentel arrives in his car from the big city early in the morning. The village is quiet at this time of day, as many would expect such a rural place to be. However, workers are already up painting the facade of the building. Doctor Pimentel parks his car in a nearby patch of gravel, grabs his things, and goes inside the school. In the cafeteria he sets up a cot, dons his protective gear, and places his bag on a nearby table. The village kids are coming in, and its time to go to work.\n\nOne after the other, the kids are taken out of class and sent to him for examination. All of them get a washing. Some of them have the telltale swollen red gums of periodontitis. They get flossed and in some cases prescribed antibiotics. Others have cavities, and need much more involved treatment. Though it is very uncomfortable, the Doctor knows the alternative is much worse.\n\nRegardless of the treatment administered or the status of the patient, the end of the appointment is always the same. Doctor Pimentel gives each of them a toothbrush and a tube of toothpaste. Apply a bean sized amount, brush in a circular motion, do it twice a day. When the toothpaste runs out or if the toothbrush becomes old, come back to the school for a new one. They will replace it free of charge, a new service from the government.\n\nTaking care of all the schoolkids is a long and tiring process, but Doctor Pimentel makes sure no child is left out of their first dentist appointment. Even if he's not paid for the overtime, it's still important every kid is treated. Fortunately, the head of the school is appreciative, and lets the Doctor sleep in his house for the night. Refreshed, the Doctor wakes up the next morning, and drives off for the city, happy he has made a difference in this village."
brazil_adhemar.14.a: "And there are Doctor Pimentels all over the land."

brazil_adhemar.15.t: "Populist at Its Finest"
brazil_adhemar.15.desc: "It was a hot day in Autumn. The sun was so intense that it made it seem as if the world itself was suffering from its heat. Though that didn't stop the boys from playing soccer as they always did on school days, as ever since school built a new court to play, not even the scorching sun hitting their backs stopped them.\n\nOne thing that they noticed was a fancy car that had just stopped near their school. From inside, a tall man came, wearing a fancy suit that was a terrible choice for this climate, which could be noticed by how much sweat was on his brow. He walked towards them, with the game stopping so as to not accidentally hit this old man.\n\n"Hey there, kids! Could anyone there pass me the ball?"\n\nThis old man that had suddenly appeared was now asking to play with them. Before anyone could say anything, Julio had kicked him the ball, which the old man catched and started doing some tricks. He then kicked the ball up, and picked it in his arms. He seemed to be talking to a few of the boys about how school was like and if they had any complaints, to which most replied that math and physics were a bore; the man agreed while laughing, saying he'd get something done about it.\n\nJust as quick as he came, the old man left, though not before signing the ball they had with a name: Adhemar de Barros.\n\nAdhemar got back in his car, sweat dripping from his brow "Fucking suit, should have gotten something lighter to wear in this heat. How many more schools left for me to visit today?"\n\n"Ten more, Sir." Replied Adhemar's driver.\n\nAdhemar sighed. "Well you better hit the pedal then. I still have a meeting with the economy minister later. It's probably gonna be another stupid waste of time about the treasury." And so the car started up and went off into the busy streets of São Paulo."
brazil_adhemar.15.a: "Not a single calm day for the wicked."

brazil_adhemar.16.t: "A Cunning Plan"
brazil_adhemar.16.desc: "It was a sweltering morning in Brasília, and Adhemar de Barros wanted to boost his public image again. As he sat in his office in the Palácio do Planalto and stared at the large effigy of Nossa Senhora Aparecida that he took with him everywhere, he wondered how he might go about it.\n\nAll of a sudden, he heard a radio blaring. "The newest episode of Felix the Cat will be on Brazilian televisions next week! Expect laughs, slapstick, humour and fun for all ages!"\n\nAt that, Adhemar had a brainwave. "Why don't I try to convince their animation studio to portray me as a great politician? It'll get me more of the support and respect that is my God-given right in Brazil. Ye-es, I think I will do that."\n\nWhen Joe Oriolo received a thick envelope carrying the seal of the President of Brazil, he was outraged. "The nerve of that good-for-nothing tinpot oligarch! Just brazenly trying to bribe me to create propaganda for him? What the hell is this, Nazi Germany?"\n\nWilliam O. Sullivan, his business partner, raised a hand for calm. "I've got an idea."\n\nAt that Oriolo calmed down and nodded. "Go on."\n\nSullivan smirked and said, "Why don't we give this President Barros what he wants. Let him have an appearance in the show - just not the way he clearly expects of us." As Sullivan explained how they might make that work, Oriolo's face curved into a smirk of its own."
brazil_adhemar.16.a: ""That sounds marvelous, Will. Let's do it.""

brazil_adhemar.17.t: "A Great Episode"
brazil_adhemar.17.desc: "Some time after Adhemar made his, shall we say, proposal to the production team of Felix the Cat, a new episode of Felix the Cat came out in Brazil.\n\nThe episode portrayed Felix having to fight a different opponent from usual: this time, it was an unnamed politician that, while not looking too much like the President of Brazil, had some of the same personality traits as him. Anglophone audiences did not think too much of it; after all, in their experience, corrupt politicians were everywhere and there was no point trying to identify one from the other.\n\nFor the Brazilians that watched it, on the other hand, it was uproarious—it was clear as day who it was the politician was meant to refer to. Even funnier for the Brazilian audience was that Felix made a mockery of the politician in the end and drenched him in water from head to toe.\n\nThe obvious target, President Adhemar de Barros, was obviously annoyed that it didn't go to plan. But he took it in good humour—after all, old though he was he could enjoy a bit of slapstick. Besides, the cartoon hadn't directly named him, so it was all good."
brazil_adhemar.17.a: "Everyone came out OK in the end."

brazil_adhemar.18.t: "Monégasque? What Monégasque?"
brazil_adhemar.18.desc: "The sun swung westwards. Paulo yawned in his seat, watching as the multi-story concrete buildings hid the sun behind their visage, emerging now and then in sharp reliefs of light and shadow. Another day at the cafe, afternoon shift. All he could think of was the simple amenities of a student in Belo Horizonte: a nap, a good evening out, and the sleep that would follow until the days would begin again: classes, work. Mosquitoes buzzed around him.\n\nJust before he could doze off, however, he remembered something. Yesterday, the lecturer had told Paulo's class that they were obligated to choose a foreign language for study. "Any foreign language?" A female student asked. A nod in answer. Any foreign language. Instruction would be added as an extra class. A few hands shot up: some chose German and French, others Spanish and Italian. Here and there, Japanese and Chinese. That left Paulo.\n\n"Well?" The lecturer had said to him. "What is your foreign language of choice?"\n\n"I'll think on it," he said. "I'm not committed yet." He got off the bus stop near the library. Any language, he thought. He thumbed through a few volumes before he got to the magic word: Monégasque. Monaco's Italian. Any language. Paulo read in the newspapers that, if instructors were not available for the chosen language, that class had to wait until they were provided. He grinned and went home.\n\nThe next day: "I would like to study Monégasque," said he. The startled professor said that he had to wait until the university could get people proficient in the language. "Then I don't mind waiting," he said with a smile. "I'll find ways to busy myself in the meantime." Before the day was out, half the students expressed sudden interest in Monégasque."
brazil_adhemar.18.a: "And for a day, Monaco was a household name."

brazil_adhemar.19.t: "Education Brings Opportunity"
brazil_adhemar.19.desc: "Paolo groaned as he finally made it back to his flat, shutting the door. He flung his bag to the floor, trying to stave off the feeling that he should take his books out to continue studying for exams - he could do that when he was less tired. The average person would never imagine that stocking bookshelves all day would be as exhausting as it was, but by God, did it take it out of him.\n\nTaking his jacket off, Paolo looked down at the floor and noticed a singular brown envelope with his name on it. Intrigued, he crouched down and picked the letter up. He strolled idly into the kitchen, opening the envelope up. But when he saw the contents, his eyes practically bulged out of their sockets.\n\nHe had been accepted for the scholarship he had applied for - and it was worth almost twice as much as his current salary.\n\nThe sheer amount of money that the government had seen fit to endow him with would be enough to keep him going for months. Paolo felt tears well up. He could spend less time working - he could finally finish reading that non-medicine related book he bought, or maybe play a few more ball games. And his family! He could send them some money every now and then, and help them out with that.\n\nShaking himself out of it, he rose to his feet, energy suddenly returned. Paolo felt like he could dance around the room; and it was all thanks to the PSP. If he ended up voting in the next election, then Paolo sure as hell knew who he was going to vote for."
brazil_adhemar.19.a: "Money can't buy happiness, but it sure does come easier."

brazil_adhemar.20.t: "The New Cures"
brazil_adhemar.20.desc: "Had it not been for hectolitres—was that what they called hundred of litres, or was it "heptolitres"? He had forgotten—of yerba mate, Paulo would have died of overwork during the last two weeks of exams. Thankfully, he had come out of it more or less fine, and could finally make it back to regular studies and work.\n\nWalking into the day's anatomy classes, he was surprised at what he saw. A new prosectorium, or dissecting theatre, with stronger lamps and better equipment, had been set up while everyone was absent during exams—and now he could actually see what his professor was cutting up! With the rest of his classmates, he oohed and aahed while committing to memory his first view of the complicated circulatory and lymphatic systems outside of literature.\n\nThen came lunch and a lab class. This lab too had received what fashionable types might call a "glow-up". Strange new microscopes from Japan with state of the art technology that Paulo had only read about were only the first of the things to shake up his world as a medical student. During the next four hours, the professor went on a whirlwind tour of new technologies soon to be used in Brazil. Cardiac pacemakers, transplants of the kidneys, liver, and heart, and the transition of mental patients from rustication in mental hospitals to care in their own communities—\n\nBy the end, Paulo felt two things. Dizziness, at all he'd seen, and a resolution he had never had before. To study more, and take part in the march of progress."
brazil_adhemar.20.a: "All is as the Doctor ordered."

brazil_adhemar.21.t: "Petebistas Up in Arms"
brazil_adhemar.21.desc: ""DOWN WITH THE TYRANNY", "IS THIS HOW YOU WORSHIP GOD, MR. PRESIDENT?", "BRAZIL IS NOT A THEOCRACY"—these were the posters, along with Brazilian flags and the black-white-and-red tricolor of the PTB, that were brandished at rallies throughout the country. The labourists had at last decided to muster defiance, and for all that the 'Social Progressive Revolution' had made inroads throughout the nation they were still a force to be reckoned with.\n\nThe cause? "Adhemar's decision to force religious education to be mandatory throughout the schools, of course," said João Goulart in an interview. "Look, most of us here are God-fearers, but we can't accept people being forced to believe in God. Compulsion in religion is what our medieval ancestors and their Hitlerite imitators like to do."\n\nYet the interview of the former Minister of Labour was not the worst thing for Adhemar. What was worse was a passionate speech by Leonel Brizola. "How much longer, I ask you, must we tolerate all of this? This Brazil that won for itself its own freedom is now tying itself to the directives of foreign powers. Then Filinto Müller, that fascistic Germanophile, is leading Adhemar to accept whatever rubbish the Hitlerites offer in exchange for selling out this country and pulling us into fascism. When you consider this religious education proposal in that context, it is not worship but sacrilege—we owe it to our God and ourselves to resist it!"\n\nAs people agreed with Brizola and some even burned portraits of Adhemar, the target of their hatred was watching them on the TV. A glass full of water was thrown out the window as Adhemar's anger went out of control for a brief moment. Openly comparing him with the fascists in Europe, for simply putting religion back into schools was a low blow. Most likely a political stunt by Brizola to grow his influence throughout Brazil. Once Adhemar calmed down, he weighed the choices, and made a decision:"
brazil_adhemar.21.a: "We proceed, their objections be damned!"
brazil_adhemar.21.b: "Better we just shelve it for now."

brazil_adhemar.22.t: "Unbiased Education"
brazil_adhemar.22.desc: "Diego heaved a sigh of relief as he finally dropped the last box of textbooks off in room 308, finishing the haul that had taken up most of his usually relaxing morning. As he caught his breath, he looked excitedly at the large mass of cardboard that now occupied the back half of his classroom. It seemed that the government had actually lived up to its promise, and was giving schools the resources they desperately needed. He dusted himself off and rose; time to unpack.\n\nCutting into the nearest box, he saw glossed textbooks titled "Physics Fundamentals" lying in neat rows at the top. Diego took one out and began flipping through out of curiosity, taking time to appreciate the cracking of the spine as he opened the book. Vivid diagrams and creative experiment ideas covered the pages, far from the monochrome monotony of the old texts. Although he couldn't comprehend the winding formulae that filled in the space between the images, he smiled, imagining how the physics department would react when they arrived.\n\nDiego returned the physics book and cut open a box containing his own subject. A row of "Complete History of Brazil: First Edition" lay inside. Grabbing one, he grinned once more as he paged through the book, appreciating the new historical images and the woefully needed footnotes about early history. Turning to the contemporary chapters, however, he began to grimace. Stories of heroic Paulista rebels fighting against the "Vargas empire," the appointment of Adhemar as the climax of the "Constitutional revolution," and seemingly endless paragraphs praising the virtues of the President utterly had curdled any sense of excitement that Diego had felt.\n\nWith another sigh, the history teacher threw the textbook into the trash, along with the rest of the hagiographic material. "My thanks, Mr. President," he said, "But I would rather teach the truth.""
brazil_adhemar.22.a: "Almost true."

brazil_adhemar.23.t: "The Young Master's Request"
brazil_adhemar.23.desc: "Polite as always, Adhemar's mentee Getúlio Vargas Filho, the son of the man called 'the Father of the Poor', came walking into the presidential office of Planalto with a proposal in mind.\n\n"Mr. President, your successes in education are something else. With these plans of yours you've managed to build a new paradigm in Brazilian education that only my father—maybe—have managed to parallel."\n\nAdhemar nodded graciously, lapping up the compliments, and gestured at him to continue.\n\n"But I had an idea, Adhemar. Perhaps it might be possible for us to establish a National Institute of Innovation and Technology as a suitable finale for this educational reform?" The President thought about this for a bit, but then shook his head.\n\n"This I can't do, Júnior. I've spent too much on education this term; I need to focus on other things. However, I can work to organise this in my second term."\n\nThat was fair, Vargas Filho thought. "Fair enough, Adhemar. Could we, possibly, then invest in chemical research instead?"\n\nAdhemar shook his head a second time; Vargas Filho hid a wince. "No, the budget won't be able to take it. I've already thrown so much money at education; we need first to reap the benefits of that. Chemistry is going to have to wait."\n\n"I understand, Mr. President. Have a good day," Vargas Filho intoned, avoiding the urge to grumble. Leaving Planalto to go about his next business, he reflected that at least Adhemar's inaction in these areas would give him room for maneuver in these areas when he became President."
brazil_adhemar.23.a: ""The plan can wait—I just hope it doesn't wait forever.""

brazil_adhemar.24.t: "Adhemar's Revolution"
brazil_adhemar.24.desc: "Great news now coming from the Midwestern Brazilian State of Mato Grosso. In the small village of Santa Terezinha do Oeste in a solemn Official State Event, President Adhemar de Barros announced the start of Brazil's own Agrarian Reform.\n\nHe has openly declared: "From now on, every villager will have its own field which shall guarantee to him or her total and complete economic independence. Now let it be clear that this is only the beginning of a slow incremental process that shall once finished covering the entire country, which will start from the poorest villages and then eventually move on to larger towns. And may no one in this country ever forget that this process was achieved not by the radicals and idealists in the PTB, but it is thanks to my administration and the PSP that Brazil has finally been able to reach this historical milestone."\n\nThe event was assisted by gigantic crowds both from the village and other population centers near it. All cheered Adhemar's declaration, which was soon followed by a scene of the President giving the new landowners shovels, sacks of seeds, and other agricultural paraphernalia. He was received by many of the village's housewives who gave him warm grateful hugs and kisses on the cheek. Brazil may rest easy."
brazil_adhemar.24.a: "For Adhemar has put it on the road towards progress!"

brazil_adhemar.25.t: "Between a Rock and a Hard Place"
brazil_adhemar.25.desc: "It was a loud and extremely heated afternoon in the Brazilian capital of Brasília, especially in the presidential office in the Planalto Palace, where President Adhemar de Barros's cabinet was in a tense debate over how-to better supply Brazil's agricultural sector with the much-needed fertilizers for its development. At that very moment Benedito Manhães Barreto, Brazil's Economy Minister, was continuing a very long and dull speech about how his scheme of a very complicated and bureaucratic apparatus of state-owned fertilizer companies was the best option before being vehemently interrupted by Adhemar:\n\n-"Enough Benedito! Those are nothing but foolish dreams. We need more real and practical solutions that do not give Lacerda, that bloody crow, any ammunition against us."\n\nAfter that interruption, came the turn of the Foreign Minister, Vasco Leitão da Cunha, to lecture and moralize. In his opinion, the solution to the problem of the fertilizers was to ask the United States, in his opinion Brazil's greatest ally, for aid. It would cost Brazil's coffers dearly however the agricultural sector would indeed get the best fertilizer currently on the market. Adhemar also shouted him down for as much as he didn't want to anger Lacerda he also didn't want to please him.\n\nWhile the discussion was still ongoing, Liana Clemente, President Adhemar's Personal Secretary, entered the room with cups of water and coffee for all cabinet members. While she was walking around the room giving everyone beverages, swaying her hips suggestively while doing so, she commented on another alternative:\n\n-"Why not ask the Reich for help? It is true their fertilizers would be of lesser quality, but they would be cheaper and they could be provided in much greater quantity."\n\nAdhemar took a dip sip of his coffee cup and sat pensively in his seat. No matter what a decision had to be made. Thus, for better or for worse:"
brazil_adhemar.25.a: ""Let us stick with our Ianque ally.""
brazil_adhemar.25.b: ""Maybe the lady has a point.""

brazil_adhemar.26.t: "If It Ain't Broken"
brazil_adhemar.26.desc: ""Congress is the same as ever," Gordon replied with a grin, "If New York is the city that never sleeps, then Washington is the city that never stops talking."\n\nAdhemar chuckled politely at the American ambassador's joke, reclining back into his plush-velvet seat. "I must admit, it's not much different over here. Can't move a single chair without at least 2 weeks of debate and a half dozen private negotiations first. People act like compromise will be the death of them."\n\n"You definitely can't please everybody," the diplomat said with a knowing smile, "You pick one side, and you lose two others."\n\nAdhemar and the diplomat exchanged a silent glance as the conversation lulled. The President leaned forward and spoke. "It's good, then, that our nations have worked together so closely throughout time. With the state of the world being as it is, we both know how essential it is to maintain our old friendship. Your shoulds know that your country really plays an important part in the prosperity of Brazil." The American stayed silent, eyeing the President closely. "A major example," he continued, "would be the agricultural prowess of our nation, which would never be possible without the steady import of equipment and fertilizer from the United States. Our future potential is only limited by the supply that your nation can provide."\n\nAs Adhemar finished speaking, the American gave a nod and replied, "I'm glad to hear that you've found that our partnership has been beneficial, and that you appreciate our efforts. I'll make sure to talk to the Department of State; they'll absolutely be willing to help one of America's closest friends reach their fullest potential. You can count on us to keep the free world strong and free of fascist influence.""
brazil_adhemar.26.a: "The diplomat left with a handshake and a smile."

brazil_adhemar.27.t: "Fix It"
brazil_adhemar.27.desc: ""Life is same as ever," the German responded, "My Father's still occupied with business at Farben, and this time of year is usually very busy for the company"\n\nThe President nodded knowingly at the ambassador and gave an amiable smile. "I'll be honest, it's a bit hectic around here too. Everyone agrees it's an vital time for Brazil, but nobody can agree on why it is, or what needs to be done about it. Half the people against me don't even have any ideas, they just don't like mine!" The President frowns a moment, before continuing jovialy, "If I may, Robert, I would say that both you and your father have done a great job, and even if things might seem hectic at times, your future seems bright."\n\nThe diplomat allowed himself a grin at the compliment and leaned back into the plush chair, visibly relaxing. "Thanks, Mr. President," he said, "It's going to be worth it, I think. Our prospects are looking better than ever, and we plan start expansion into new markets soon."\n\n"That reminds me," Adhemar perked up at the comment, "I wanted to ask a favor. As you know, Brazil is an agricultural nation at heart, and we are always looking for ways to cut back on expenses. I would be in your debt if your father could contact our mutual friend, Mr. Abs, to see if he would happen to have any spare fertilizer he wanted to sell. That's a real bottleneck in our production right now."\n\nThe young ambassador nodded eagerly as he sat up to respond, "I can certainly do that for you, Mr. President. As a matter of fact, I'm confident that we'll not only provide as much as you need, but we can also ship it for the lowest possible price. I promise won't regret this deal."\n\nAfter a shake of hands and a final exchange of pleasantries with Adhemar, the ambassador returned to the embassy with barely concealed excitement. When he arose the following morning, he called his father."
brazil_adhemar.27.a: ""I need to speak with Abs.""

brazil_adhemar.28.t: "New Times, New Goals, New Man!"
brazil_adhemar.28.desc: "It was a warm tropical night in Brazil, on most aspects it was a pretty common and forgettable night like most but for one single yet of the foremost importance. For on this very singular night most Brazilian families, those who indeed could afford and own an apparatus anyway, were all patiently sitting around their television sets for in the next minutes to come, President Adhemar de Barros, a figure known for his unpredictability, was about to give the nation a major policy announcement.\n\nThe announcement began with the TV showing Adhemar sitting behind the desk of his presidential office then he began to speak: "Brazilians it's time for our country to take a great leap forward, we as wise people cannot rest on laurels, my government, your government, shall in next week focus on sectors abandoned by all previous leaders, by both legislative and executive measures it shall improve our beloved agricultural sector to make it the best in the world, by giving all its workers decent social protections and rights they never enjoyed before."\n\nThe announcement gave a feeling of rejuvenated excitement to many of those who heard it. The TV announcement itself was soon accompanied by speeches and statements from local and legislative PSP leaders that detailed how Adhemar's stated goals were to be achieved. This only boosted the excitement brought by the announcement and President Adhemar's personal approval ratings among the Brazilian people. Change was in the air and as they say..."
brazil_adhemar.28.a: "For the times they are a-changin'."

brazil_adhemar.29.t: "Dilemma of a Medical Nature"
brazil_adhemar.29.desc: "When the news came in that private corporations were outright refusing to send their workers to the doctors, citing fears over lost productivity and revenue, Adhemar was discombobulated. Sitting around nervously, he left his room in the Palácio da Alvorada ten minutes later than was his norm, and that was only because his family sent him out.\n\nIn the time it took him to show up, his cabinet colleagues—in this case Filinto Müller, Edna Lott, Laudo Natel, and Vargas Filho—had already discussed all the possible ideas. After greetings and an apology from Adhemar, they got down to brass tacks.\n\nEdna was almost uncharacteristically ruthless. "If they are going to defy the government, call their bluff and use force. If employers do not comply, imprison them."\n\nFilinto Müller backed her up: "For the first and last time, I can support what Vice-President Lott is proposing."\n\nNatel shook his head. "We do that and we'll ruin everything. Better we just drop the idea—why bother antagonising business?" At that Edna and Filinto glared; Natel, to his credit, did not quail before their hostility. Meanwhile Vargas Filho simply rolled his eyes.\n\n"You people are like two sides of a violently swinging pendulum. There's no need for such nonsense. Just take the simplest solution: pay the employers for the time their workers need medical aid, and everyone will be happy.""
brazil_adhemar.29.a: ""If they both agree they must be right, Give them the stick!""
brazil_adhemar.29.b: ""The Governor is correct, Just pay them off.""
brazil_adhemar.29.c: ""Laudo, you are right, why... why bother with it anyway?""

brazil_adhemar.30.t: "Black Lungs, Zipped Lips"
brazil_adhemar.30.desc: "The Doctor leaned against the rusted pillar, taking in gulps of fuel tainted sea-air in between inhaling his cigarette. It had been a long day, but a productive one. He'd been coming down to the shore for years now, the state mandated inspections to prevent lung diseases in this toxic environment. Up until today it had always been useless, the workers didn't have enough cash to pay their landlord, much less buy a bottle of pills. Still, he always loved the sight of the ocean, the calming buzz of activity as behemoth cargo ships floated into the distance.\n\nThings were changing though, the prices on those pills were dropping with astonishing speed. Maybe even the workers had enough gray matter left over from the chemicals to remember to take them.\n\nAs the Doctor slipped the cigarette pack away, he lightly tapped his shirt pocket to make sure the envelope was still there. Things weren't just improving for the workers, his clinic had been scheduled for renovation and that long awaited raise had been approved. That was all just peanuts, though, the contents of the envelope were more than enough for his new flat's down payment. Who knows, maybe he could even buy Maria that necklace he'd been promising her. Sure, someone would get his operation scheduled a little early, but at the end of the day another person would be healthy, and that's really what mattered.\n\nThe Doctor could excuse these payments with ease, but the hush money (to not mention the nightly shouting beneath the clinic), were something that still bothered him. It left a pit in his stomach as black as the harbor smog. Not that the Doctor would ever do anything about it. He had been at this job long enough to know when to keep your head down. After all, the Hippocratic Oath said 'do no harm'..."
brazil_adhemar.30.a: "But said nothing about turning a blind eye."

brazil_adhemar.31.t: "Bitter Changes"
brazil_adhemar.31.desc: "Smoky, tarty, and bitter. This was precisely how Filinto Müller disliked his coffee. He was never a fan of it because it always left a bad taste in his mouth, but he knew he needed it so he could get through every morning.\n\nPutting down the cup on the saucer, Filinto remembered how coffee shaped Brazil for the last 200 years; not too long ago, the coffee barons of São Paulo dominated the country's politics, and he was one of the soldiers to fight against them throughout the bloody 20s.\n\nToday, a child of those same barons he fought against stands in Brasília as the nation's President. Filinto couldn't help but feel a little resentful about this. Was Brazil really on its way to returning to those dreadful days? The ones he fought so hard to destroy?\n\nBut at the same time, it was Vargas himself who helped kickstart Adhemar's political career by naming him São Paulo's interventor, by his own recommendation no less, so perhaps there was some use in him.\n\nThe PSP are just a bunch of opportunists climbing the ladder to get their pockets' stuffed with their leader's money. Without someone to put them in line, Adhemar will be thrown out of his new throne once Edna and the opposition open the inevitable impeachment inquiry.\n\nMore than that, they needed a leader outside of São Paulo. How can a party that rules only one state serve an entire country? Filinto hated this, but perhaps, he could help them, or so he thought. He was already increasingly being smeared as the "Brazilian Himmler" by his fellow party men, so moving to a new party may be the best choice to protect his beloved Mato Grosso and the legacy of the Estado Novo.\n\nIt was decided. Taking a final sip from his coffee, Filinto reached for the phone beside him."
brazil_adhemar.31.a: "To the coffee fields."

brazil_adhemar.32.t: "Second Sun"
brazil_adhemar.32.desc: "Second floor of the Planalto Palace, outside the Supreme Meeting Room. Admiral Álvaro Alberto da Motta e Silva knocked on the door. An aide opened it and ushered him into the room, where ministers sat according to their positions along an ovoid table. At the end of it, the President sat, flanked by his chief of staff and Minister of Finance. He gave Álvaro a warm smile. "Mr. Álvaro Alberto," he said, "you must be curious as to the nature of your summons."\n\n"Yes, sir." Álvaro said, steepling his fingers. "I was not given prior briefing nor time to prepare for this cabinet meeting. I suppose that relates to a degree of secrecy within the government."\n\nPresident Adhemar's eyes flashed a satisfied glint. "Very good." He opened a file and began reading from it. "It says here that you were involved in a series of trips in the previous decade, chief among them to negotiate the Atoms for Peace program. Is that correct?"\n\n"Yes, sir." Álvaro Alberto could see where this was going.\n\nAdhemar closed the file and eyed him closely. "Brazil must become a nuclear power soon, Admiral. Argentinean aggression has escalated in recent decades and we must possess deterrents. Having been the emissary of our first initiative, I must ask you: are we ready?"\n\nÁlvaro took a few seconds to assemble his answer. "I believe we are. To elaborate, we already have the expertise needed in the universities of Minas Gerais and São Paulo. It would take some time, but we will get there."\n\n"Can we hasten this process?"\n\n"I believe so. The Americans would be our natural partners in this undertaking. However, if they prove to be unwilling, Japan and Germany have made similar advancements in this field as well. There would be no lack of options."\n\nThe President grinned. "I thank you, Admiral. It is heartening news. Then, the cabinet will prepare testing and enrichment sites. Your new assignment would be to seek foreign partners to accelerate this process as quickly as possible." Álvaro gave a respectful nod in reply."
brazil_adhemar.32.a: "Atoms for peace, atoms for war."

brazil_adhemar.33.t: "Smiling for the Cameras"
brazil_adhemar.33.desc: ""Thank you, thank you!" said Hebe Camargo, beaming a smile. A tune was slowly coming to an end, and Adhemar knew that was his cue to sit up straight in his chair. "We've got a big, big guest tonight for all of you folks in Brazil. It's none other than the President of our republic, Adhemar de Barros!" An eruption of cheers and chants of "P-S-P!" filled the studio. Throwing two thumbs up, he clapped along before finally facing the host. "It is absolutely my pleasure to be here tonight. I thank you for inviting me," Adhemar said.\n\n"No, no," the host said enthusiastically, "it's a great honor to have our President here tonight! I heard you have some big plans that you're willing to share with the nation?"\n\nLacerda was sitting in a meeting room at the US embassy, having fiddled with the TV remote for nearly 15 minutes before finally finding the channel broadcasting his enemy's plans. Next to him was an aide for the embassy, staring blankly at the screen. Adhemar's voice began blaring from the TV again. "Well, I'm here to announce a new economic plan for the country. The No Man Left Behind plan!"\n\n"Oh ho, Mr. President! It certainly sounds ambitious. Do you mind telling the nation what exactly it's trying to accomplish?" "Of course, of course. My cabinet and I are looking to guarantee every Brazilian man a well-paying job. No ifs, or buts about that." Lacerda sat agape in his chair. What the hell did that miserable con just say? "It may be a lofty goal, perhaps, but I am confident in the strength of our nation to get this done. Brazil, we can march forward together!" shouted Adhemar, again to deafening applause and cheers.\n\n"T-that fucking rat! He's going to ruin the economy like that?!" screamed Lacerda, bulldozing his way through a door. The aide, having not paid any attention to the TV screen, glanced quickly at the label on the door. "EMPLOYEES ONLY", it read."
brazil_adhemar.33.a: ""Ah shit.""

brazil_adhemar.333.t: "All Men Left Behind"
brazil_adhemar.333.desc: "And now Adhemar has come with this program of his, "No Man Left Behind," what a pointless title. If he was honest, he would have titled it after his friends, those Germans."\n\n"He might call me the Crow, but I tell you, it is better to be a crow than a snake." Lacerda took a deep breath, he knew very well what Adhemar was doing at this point. He knew of the corruption behind the scenes, he knew everything.\n\n"Of course, this program is supposed to help the common man, but I tell you, what is the point for the common man to have a job when they are paid a pittance? All while Adhemar continues to gain suspiciously more money."\n\nBreathe in, breathe out. "I haven't even started on inflation. Dear God, the inflation he has caused! If we thought what Kubitschek did was horrific, looking at the product of Adhemar's actions, all I can say is that it's disheartening to see our nation suffer under the hands of a greedy man.""
brazil_adhemar.333.a: "Why die for Adhemar?"

brazil_adhemar.34.t: "A Night on The Town"
brazil_adhemar.34.desc: "For once in his life, Adhemar de Barros felt out of place at a party. He was supposed to be in his element at these kinds of functions: a party set up by the American embassy to celebrate the continued partnership between Brazil and America. Normally, Leonor would be at his side, but she had contracted a fever the previous evening, leaving the head of state on his own. Taking a sip of the provided champagne - which Adhemar noted was particularly cheap, surely not a sign of things to come - he overheard a conversation going on behind him.\n\n"You know, Jim, gotta say. That place you were talking about? Think we could really see ourselves there for a while."\n\n"Oh, I totally agree, Steve. Lotta green out there, not too much of a hassle to get working, and I know a few folks that would also be interested in joining us."\n\nAdhemar's spirits lifted. Surely they were discussing his beautiful country and their plans to set up towns for their companies. He set aside his champagne glass, and nudged his way into the conversation.\n\n"Gentlemen! I hope the evening is treating you all well. Pardon me for eavesdropping, but how are your plans for establishing those towns going along? I've always been a huge investor in the American auto industry!", Adhemar said with a hearty laugh. Much to his shock however, the executives around him all began to fidget awkwardly. Oh no, thought Adhemar. Those damned Americans and their oversensitivity. Was it something he said?\n\n"Uh, Mr. President. I, we- uh, seriously apologize. You caught us at an awkward point in the conversation," one of the men said, rubbing his hands nervously. "We were uh, talking about maybe hitting the golf course next week after we finish surveying the sites down here. A few rounds to relieve some of the stress, you know?", said the man on Adhemar's right with a nervous chuckle."
brazil_adhemar.34.a: ""Oh. I see.""

brazil_adhemar.35.t: "At His Every Whim"
brazil_adhemar.35.desc: "Adhemar just couldn't get over that grin that seemed to permanently sit on the face of Hermann Josef Abs. There was a certain maliciousness to it, like Abs was constantly relishing in Adhemar's weak position. Weren't they both supposed to benefit from this arrangement, thought the President, as he continued to flip through the company town proposals. The more he read, the more outlandish Abs' demands continued to get. Complete local autonomy, and the wage schedules for most of the workers were abysmal, even by rural standards.\n\n"So, Adhemar," huffed Abs in his native language, "what do you think? We've already cut out a lot of standard practices back from Europe to make it more manageable for you." Adhemar glanced quickly at Abs. "This is still too much, Abs," replied Adhemar back in German. "I've been telling you that if I relinquish local authority to you, there will be riots in the countryside, and the workers won't even show up to work half the time."\n\nAbs gave a short chuckle. "I fail to see how that is going to be my problem, Mr. President. Sounds like something your officials and enforcers will need to figure out. IG Farben is ready to begin construction and development of these lands as soon as I give the word. What happens after is of little consequence to me," Abs said, standing up. "You know where to sign."\n\nAdhemar couldn't help but think about all of the headlines he read about how the Reich treated their "laborers". Was he really about to sign off on his own countrymen to the same sordid fate as slaves to a foreign corporation? "I'm sorry, Abs. But I need a night or two to consider this." With a disapproving grunt, Abs nodded and left Adhemar's office. The President stared longingly into the starry Brasília sky, looking for answers."
brazil_adhemar.35.a: ""There are no good solutions for relentlessly pursuing progress.""

brazil_adhemar.36.t: "The Sacrifices We Make"
brazil_adhemar.36.desc: "Edna couldn't believe what she was looking at. Squalid dorms barely built to code, with poor ventilation systems. Did these builders not know how hot the summers could get? And the factory floors, she thought, were something out of a horror novel. Barely any of the safety regulations that were codified throughout Brazil were implemented. Sitting across from her was the ever smug President, probably too busy complimenting himself in his head about the "economic growth" he was sending poor men to go die for.\n\n"Adhemar," Edna said flatly, thumbing through the photos, "This is unacceptable. I was told by you that these towns would follow building codes and pass health and safety inspection checks. Do any of these photos seem to suggest to you that they will?"\n\nEdna looked up at her presidential counterpart, only to find him flipping through a different set of reports, having barely paid attention to her complaints. "Hello, your Highness? Did anything I just say register in your mind?" Adhemar gave a grunt, standing up from his chair. "Edna, I told you not to worry about this. I told you to focus on the education of our nation, no? Why are you so riled up about this?", the President replied sarcastically.\n\n"Because this is our damn legacy! What was all that talk about being Vargas' successor if you don't fight for the common man? What was all that talk if you're just going to let our countrymen die in these terrible conditions? I should've known better than to ever believe your poisoned lies for a second."\n\n"Terrible conditions?", smirked Adhemar. "Edna, I'm giving them jobs, for Christ's sake! I'm helping these people on their path to prosperity. Surely you can see the benefits of that?" Edna shook her head, before shoving her chair into the desk with a thud and storming out of the President's office. Only one thought was in her mind."
brazil_adhemar.36.a: ""The legacy of my father and Vargas is being destroyed by that man.""

brazil_adhemar.37.t: "Pool of Crocodiles"
brazil_adhemar.37.desc: "The bigger they are, the harder they fall - so goes the saying. Luckily for Edna, Adhemar was quite the giant, so his fall would be magnificent indeed. Entering her office, the Vice President noted the presence of Tancredo Neves standing at the table. It was good that he appeared for the meeting - the PTB's support would be indispensable. "Tancredo!" She said, walking over to him. "How good it is to see you! I am so glad that you decided to come."\n\nHe reciprocated, shaking his head happily. "Ah, believe me Madame Vice President, the honor is all mine. But please, enough with the pleasantries. We have a war to fight." She nodded in agreement, producing a notepad. "Very well. I can already say that the Rio Storm has put Adhemar on the wrong foot. His response was sluggish, and it's making him look incompetent. I say that if we continue to play this angle up, he'll crumble sooner or later."\n\nHe nodded in agreement. "Precisely. A series of coordinated attacks is what we need. There are plenty of PSD contacts that your father used to work with still in government. You know - Walther Salles, and the like."\n\n"And once we have them on our side, we can truly start to hammer it in. So that will be our strategy - death by a thousand cuts. Knowing Adhemar, he will step out of line eventually, and once he does, we will be there to bring him down." She opened her mouth to continue, but paused upon seeing him looking at her almost fondly. "... is something the matter, sir?" She asked, not impatiently.\n\nHe snapped out of it. "No, no Madame. Nothing at all. You just reminded me so much of your father. You're proving just as capable as he was." She scoffed."
brazil_adhemar.37.a: ""That was always his worst nightmare. Now, as for the press angle...""

brazil_adhemar.38.t: "Change of Plans"
brazil_adhemar.38.desc: "Carlos Lacerda considered himself a patient man. He had spent countless years fighting for a Brazil with dignity - seeing conflict and bloodshed with his own eyes. He was a man that knew how to keep his cool when it was needed. And yet, every damn second Romeu de Campos Vergal continued to speak, he could feel that patience faltering."Well I can see how many people would be frightened by the intensity of President Adhemar's reforms, Henrique," the man said, babbling gormlessly into the microphone. How that man was ever considered competent enough to be at the head of Brazil's economy, he would never know. "But the truth of the matter is that this healthcare plan will benefit millions of Brazilians." What a load of horseshit. It was yet another ill-thought, hair-brained scheme Adhemar was using just to court popularity. "Thank you, Mr. Vergal." The presenter said, turning to Lacerda. Finally, his time to speak. "Now, on the other side of the debate, we have Carlos Lacerda - who is quite the critic of the President's policies. What do you think about them?"\n\nHe straightened his tie. "With all due respect, Henrique, the President's plans are as sound as a ship made of paper. This is yet another irresponsible half-thought out plan that Adhemar pushes out every now and then to bring in extra votes. That more Brazilians aren't actively resisting them is-"\n\n"But Mr. Lacerda," the presenter interrupted. "You say all this, but even your fellow members of the UDN have supported the President's plan." This brought Lacerda to a stop. What? What could he possibly mean? Noticing his expression, the presenter continued. "Why, just recently, Governor Magalhães announced that he would be working with the PSP on this. Were you unaware?"\n\nEverything ground to a halt. Magalhães? The man he personally chose as his successor as Governor of Guanabara? It couldn't be true. Shaking himself out of it, he hastily responded. "Well, they are free to say whatever they choose to. It doesn't change the facts of what Adhemar is doing." He continued on half-heartedly for the rest of the session, still fixed on how he could have missed such a large u-turn from the rest of the UDN."
brazil_adhemar.38.a: "When the interview ended, Lacerda left quickly."

brazil_adhemar.39.t: "Isolation"
brazil_adhemar.39.desc: "The Governor's mansion in Guanabara was a building that Lacerda had long been used to. And yet, as he waited in the lobby to meet with Magalhães, it had never felt more unfamiliar. The painting that he had hung at the top of the stairs had been moved to the ground floor, and he was fairly sure that the furniture had been replaced. It was still a nice enough looking building, he supposed, but it was different in an undefinable way.\n\n"Carlos?" A voice said from behind him. He shook himself out of his reverie and smiled, recognising the new Governor of Guanabara.\n\n"Ah, Raphael, it's good to see you," he said, shaking Magalhães's hand eagerly. The man seemed to be less enthusiastic in returning the pleasantries, Lacerda noted. His smile was strained, and the fact that they were meeting in the lobby of the mansion rather than an office concerned him. Nonetheless, he continued. "I'm glad you found the time to meet with me. How has the Governorship been treating you? Has the PSP been giving you a hard time?"\n\nMagalhães only nodded stiffly at the wisecrack. "Well, Carlos, it has been fine enough. They've been helping Rio recover after the storm, after all."\n\nLacerda snorted. "Yes - that crisis they made a right mock up of! And this healthcare bill as well. We will be fighting this, of course."\n\nAnd the penny dropped. Magalhães stiffened, looking Lacerda in the eye with what looked like pity. "Carlos... come on. It's over. We can't afford to be attacking them like that. Like I said, they're giving us aid. If we go after them, what do you think happens? We almost lost to the PTB in 1965, for goodness sake!"\n\nHe nodded back. "Alright. If that's how you feel, I am sorry for wasting your time, Governor." He said, adding an edge of spite to the last word. He stormed out of the mansion, trying harder than ever to not feel the weight of his failure in 1965 weighing down on him. This was not a good sign. If there was one thing Carlos Lacerda was not, it was a washed up failure. Not now, not ever."
brazil_adhemar.39.a: "So why does it feel that way?"

brazil_adhemar.40.t: "Silent Sorrow"
brazil_adhemar.40.desc: "It was an unusually chilly day in Rio. Edna had to wear an extra layer than she had expected to, although she would likely end up shedding it later in the day when it inevitably warmed up. The sky was grey, and it felt as if it could start raining at any moment. Edna clutched her jacket to her chest as she stared down at the two gravestones embedded in the earth. Part of her wanted to break down just looking at them, but she knew all too well that eyes were always upon her.\n\nThey read "Oscar de Moraes Costa" and "Laura Lucia", and every time she looked at them she felt as if her heart was being torn out of her chest. It had been seven years since Oscar, her-ex-husband, had died, and even longer since she lost Laura, her first daughter. But the biting pain still hit hard even now. Every time she found herself in the city, Edna would make it her business to check up on them, to see if the feelings ever lessened.\n\nThey did not.\n\nNot even four children later did it become less jarring. Politics had been a perfect way of moving on and focusing that pain into bettering the lives of her fellow Brazilians, and her father's campaign was the perfect in for that. But even as Vice President, there was nothing she could do to escape the grief.\n\nFeeling a stray tear rolling down her cheek, Edna wiped it away. She needed to leave soon, otherwise the bodyguards, spies, and journalists who were doubtlessly lurking around would see her sobbing her eyes out. But before she left, Edna murmured one last thing to the two gravestones."
brazil_adhemar.40.a: ""I will make both of you proud, I swear.""

brazil_adhemar.41.t: "Silent Summer"
brazil_adhemar.41.desc: "Nearly ten years since he left the army and Jan once again found himself with a gun in hand. Ironically, killing far more than he ever did back in Poland.\n\nThe pleasing hiss of the pesticide spray masked the unmitigated slaughter of insects and their parasitic companions. The only remorse he felt was that these pests didn't speak German.\n\nIn his younger years, Jan had been in a constant fighting retreat against bloodsucking hordes, first in Poland, then in the highlands of Scotland in the waning days of Operation Sealion, now a world way he was fighting back. Many of his comrades had left for the US, but the Jan, always the intrepid traveler, headed south. Despite his middling Portuguese, the Brazilian army was happy to take him in, even promoting him to Colonel.\n\nThat was all a lifetime ago, now he simply wandered the countryside exploring his beautiful new homeland. It had been years since he had last visited Manuas with its beautiful scenery and almost as beautiful women.\n\nAnd yet out here in the greenery, something was missing. The sound of songbirds, the skittering of rodents, the clicking of crickets, the orchestra had stopped. Now, all that remained was the hissing of spray and the flutter of the wind.\n\nJan didn't pay it much mind, though, he would take a little peace and quiet over the crack of gunshots any day. With a smile, Jan continued his own little war, all the while..."
brazil_adhemar.41.a: "Humming a Polish army tune."

brazil_adhemar.42.t: "Wine to Water"
brazil_adhemar.42.desc: "Manuel limped towards the Chapel's exit, its path illuminated by a kaleidoscope of sunlight from the stained-glass. His joints still ached from a week in the factory, indeed with each passing year it seemed like it took longer and longer for the pain to dissipate.\n\nAs Manuel stumbled into the entrance hall, he dipped his hand into the marble font, and lazily performed a sign of the cross. The Holy Water may wash away his sins, but it did little to clean his grease stained palms.\n\nAs Manuel pushed the final door open, he noticed a small group of workers huddled around a neat newly printed poster hanging on the bulletin, snickering and murmuring. In large print, the poster outlined a pithy slogan decrying the evils of alcohol, and endorsing the government's 'stand for decency', signed by the Archbishop himself.\n\nManuel snorted, remembering the large sip of Eucharistic Wine he had taken a few short minutes ago. Then it all clicked it into place, the increased beer prices, the health warnings, the moralizing posters, this was all the PSP. His wet fist tightened, He voted for those crooks to improve his livelihood, not remove the one thing that numbed its pain.\n\nManuel shook his head and made his way outside. His limbs sore and his spirit dry. Looking down the street, he saw the local watering hole and one thought rung through his head: regardless of the price..."
brazil_adhemar.42.a: "Jesus, if he couldn't use a drink."

brazil_adhemar.43.t: "The Last Lights"
brazil_adhemar.43.desc: "President Adhemar stood on the hotel balcony. The humidity had barely subsided even at this late hour, and the air left speckles of dew on his shirtless body. Leonor lay snoring back in their room, beckoning him to return, but the President couldn't sleep, his insides electrified with nervous anticipation for tomorrow's event.\n\nA gala dinner for biggest of the big shots in the world of international gambling. Everyone from the casino bosses of Rio to the slot lords of Monte Cristo would be there. Brazil had long had a rather puritanical approach to gambling, but that would all change soon. Yet none of that would matter if it couldn't find investors. That's where Adhemar would step, the salesman-President's grandest pitch. But something was wrong, his speech hit all the right notes, but it lacked the final punch that would tie it all together. Even a few years ago, this would have been second nature for Adhemar, rhetorical muscle memory.\n\nBut now... everything had slowed, his body wasn't the only thing deteriorating, his mind was slipping. The snappy showman of yesteryear slowly being replaced by a geriatric. And the true curse of it was he was completely aware. Every passing day it was if some part of him slipped into oblivion, his mind growing duller, his jokes less witty, his promises less convincing.\n\nAs Adhemar stared up at the stars he empathized with the sky above, the abundant sun of day replaced by all consuming darkness with only flecks of starlight remaining...\n\nWait... That was it! Starlight! Hurriedly, Adhemar rushed back to his desk and began to furiously write on the notepad. "Imagine a constellation. A thousand bright lights dotting the coast. Together, we will wrap Brazil in a Milky Way of Casinos..."\n\nPerhaps not all was lost. Even in the void of the evening sky..."
brazil_adhemar.43.a: "Lights still remained to illuminate the President's path."

brazil_adhemar.44.t: "A False Refuge"
brazil_adhemar.44.desc: "Artem took a swig of the customary beer that he always rewarded himself with after a long day at work. Compared to his previous job, this one was way easier on his body, and paid significantly better.\n\nEven though his Portuguese was probably still at a middle school level, he liked that his factory's foreman was patient with him. He always tried to make it up by taking on extra shifts, which always paid decent overtime too. And he had many friends in the 'Expat community' in Brasília, Sofie, Adalbert and others. As he leaned back in the ratchety couch in his living room, he began clicking through channels to try and find the Palmeiras-Botafogo game. However, a headline on the evening news as the TV turned on made Artem's blood run cold.\n\n"Good evening, Brazil. Tonight's top headline: A Nazi megacorp setting up shop in our own country?" read the newscaster. "IG Farben has been rumored to begin setting up production centers and facilities throughout the Brazilian countryside as soon as next month." A million thoughts swirled in Artem's head. Brazil was supposed to be a safe harbor for refugees from the Reich and its associated slave states, with their near endless churn of labor and manpower in the name of strengthening the "fatherland". They had fought against the fascists in the war, and now they were just cozying up to them like that?\n\nArtem's chest tightened and he began to feel dizzy. Gripping the armrest of the couch, he tried to take several deep breaths as he stood up to try and steady himself. His breathing became labored and he put both hands on the window sill of his apartment, desperate for fresh air. As he looked over the bright cityscape in the dark evening, he thought about calling in sick tomorrow. No, he couldn't do that. What if he got fired, and then had to work for a smaller company that might get bought out by IG? His legs collapsed on him, his body slouching against the wall, his head in his arms, tears flowing down his face. He was supposed to be safe here."
brazil_adhemar.44.a: "Now there is nowhere left to run to. Nowhere left to hide."

brazil_adhemar.45.t: "Vargas's True Successor"
brazil_adhemar.45.desc: "The sun shone on the planned city of Brasília and Adhemar was preparing for another speech, repeating it several times to himself. "...for I am ready to become someone more! I am ready to enter History once and for all."\n\nConfident as ever, Adhemar was ready to make his speech, a speech to change Brazil for good, it would be the one where he would announce his plans for the future of the whole nation. He would continue the legacy of Vargas. "God, if you may hear me, make me a President for the ages!" He heard no one, but a sense of relief came to him, as if he had just confessed a grave sin.\n\nReadying himself for the final rehearsal of his speech, the Bull took a sip of water and began talking. "Brazilians of all ages! Come and rejoice for today is a marvellous day! As we speak, my new policy is being implemented all over the nation!" As usual, he was loud and charismatic, promising a better future for all Brazilians.\n\nAs he reached the door handle, he felt as if all his worries disappeared, he was prepared and would once and for all change Brazil forever. Would the populace enjoy his new policies? Only time would tell, but in his mind, they would."
brazil_adhemar.45.a: "A country of many, changed by one"

brazil_adhemar.46.t: "Celebratory Brandy"
brazil_adhemar.46.desc: "Adhemar sat back in his chair. The radio was going over vote by vote as the senate mulled over his education bill. This was it, the sum of his efforts all to crystalize in just another minute. As it went down, party by party, name by name he started to see things turn inevitably to his favor.\n\nHe never doubted himself, not for a second.\n\nAs the final tally was announced he smiled. He had prepared a bottle of brandy for this very occasion. He relished pouring himself a glass taking a sip, this was the taste of victory after all. He could see the headlines 'A victory for Brazil's children!' Yes, yes it was a victory for the children of Brazil but there would be no victory to speak of if not for him. Still with the passage of the bill he could leverage himself as an educational reformer, win points with families, with business owners. In 30 years time when they write about the history of Brazil this will be a turning point, his name, Adhemar the President who ended illiteracy. He could see the words coming together in his mind.\n\nStill the legacy was not yet sealed. He saw another history book this time mentioning that while his initial bill did pass ultimately Adhemar's efforts fell short. Through the action of opposition behind the scenes his bill was undermined, subsequent bills tabled and relegated before being forgotten. He could see the conclusions swirling together in a whirlpool of dizzying failure. He could not, he would not be the one subjected to such a disgrace. As he finished his drink he resolved to avoid such an outcome.\n\nIt was the media, ever his tool to be used. He would row himself out of any potentially treacherous waters, and towards the legacy that he so deserved."
brazil_adhemar.46.a: "Just going to have one more brandy."

brazil_adhemar.47.t: "Falling at the First Hurdle"
brazil_adhemar.47.desc: "The state room of the presidential palace was renowned for its modernist architecture and furnishings. Furnishings that were now strewn about it. There were boxes of paper and an army of advisors and civil servants standing around as if men left, damned after the rapture. Indeed they were men damned in some sense. Adhemar strode in and the room braced for his words.\n\n"Those fools. Those damned fools, what are they doing in the Senate! Those clowns. We were going to- This was our big chance and they blew it." Then he turned around to address the room. "You blew it! We were supposed to show our good side. That we as an administration can actually administer, compromise, wheel and deal with the opposition, not this mess. Not all this."\n\nHe walked over to an arm chair near a desk and sat down. The room returned to its natural state of quiet. As if no-one felt able to fill the vacuum. His most loyal press advisor came slinking over to his side. "The newspapers are going to want us to say something."\n\n"Yes. Yes they will.This is our chance to win back the initiative. This is how we've always done things. Let's blame the man who stuck the knife in. That rat Lacerda. It's his handlers in America, you know I heard he had a US passport or something of that nature. He's doing this because his handlers want to destabilize us - and not just that. The senate let him do it! If they want to refuse to let us administer then clearly they're not fit to administer in the first place. We're going to work with the governors. We'll make sure we get this education business over and done with, with or without the senate. Everyone, let's get to work."\n\nThe advisors all started to fan out of the room. They were going to call newspapers, regional civil servants. Adhemar let out a sigh. This was a setback for certain but in the end it will be barely a footnote. That's for sure."
brazil_adhemar.47.a: "There's always tomorrow."

brazil_adhemar.48.t: "Layer Cake"
brazil_adhemar.48.desc: "Smiles lit up across the Chamber of Deputies as Brazil's poor could rejoice in their new social security. To some, victory may have already been guaranteed, but the PSP still relished all its successes. As Romeu de Campos Vergal and Filinto Müller chatted following the bill's passing, they testified to this fact by tolerating one another for a few minutes.\n\n"Congratulations Campos. It's an achievement to be proud of..." Müller knew the work Campos put into these votes as PSP leader in the Chamber, cracking the whip and greasing the palms before the big moment. "...the PSP has come from nothing to become something exception." Even now, he could not resist a snide jab.\n\n"Well, behind every great man like President Adhemar are dozens of smaller men at his side..." Campos would not surrender like that. "...some, like myself, have been at the core of the PSP's social project. Others came when the job was already done, like a garish garnish to a finished cake."\n\n"Perhaps Adhemar wouldn't need men like me if the people in his employ were capable enough to assist a President." Müller almost forgot to add the thin veneer of politeness, his words soaking in venom. "It's one thing doing the dirty work for the local governor; it's another having to run the country."\n\n"You would know all about doing dirty work, wouldn't you?" The daggers were now fully unsheathed, pointed at their throats. "I'm sure there are plenty of victims from your time with Vargas who can tell me about your skills."\n\n"I'd be willing to show you myself... but look at the time. I'm afraid I have to get going now." Müller purposefully brushed off Campos as he walked by, offering a last remark. "We've come a long way together, but you wouldn't know the full extent of our political rise...""
brazil_adhemar.48.a: "...unless you fell from the face of the Earth."

brazil_adhemar.49.t: "The Bull's Backfire"
brazil_adhemar.49.desc: ""The Bull's Backfire: Social Security Bill fails in Senate - Beatriz Almeida\n\nThe Social Security Bill, in a shocking turn of events, has failed after a vote in the Senado Federal yesterday afternoon. The bill proposed by the President last week has not been able to convince the majority of legislators of its merits amidst a myriad of criticisms of the government's strategy surrounding welfare measures for lower-earning Brazilians.\n\nAlready, the President has gone on the airwaves condemning the "corruption" of those voting against the motion which prevented them from working in the "interests of working people". This has prompted many comments of "hypocrisy" amongst senators such as Ulysses Guimarães, UDN senator from Paraná, who also decried the PSP's "reckless posturing", and the PTB ridiculed President Adhemar's "aimlessness" in the wake of its rejection in the Senate yesterday.\n\nThe news comes as more people are losing faith with the President's reputation amongst many supporters as one who "steals, but does". "He isn't doing anymore, he is just stealing. And what can we do if our leader just steals?" said Maria, 34, on the streets of Rio de Janeiro yesterday evening.\n\nComics can be found in the city center already satirizing the event. In one sketch, an impersonation of the President is seen promising a crowd of homeless shelter, running into the store to take a handful of bricks and tripping over the steps, promptly arrested by police. It seems many supporters are calling for the presidency to be less bull-headed here in central Rio.""
brazil_adhemar.49.a: "At least someone's smiling about it."

brazil_adhemar.55.t: "Friends At Sea"
brazil_adhemar.55.desc: "Campos whooped with excitement as the ship sped past. When compared to the floating hunks of steel that the Brazilian navy threw out to sea, it was like watching some tremendous sea monster swimming past him. He laughed, clapping at the sight. "Hahaha! Excelente, Admiral, this is truly wonderful!"\n\nThe admiral next to him chuckled. "Thank you, General, it is appreciated. The trick is to use the right kind of steel when making the ships. Weight is key." he said, gesturing out to sea. Campos nodded, already thinking of what could be suggested to bring the Brazilian navy up to this level.\n\nThe two men watched the ships move around the dockyard, going through their exercises. Eventually, the Admiral spoke up again. "Now, uh, General Campos, if it isn't too much trouble, I've been asked to bring something up with you by the higher-ups, regarding President Adhemar's positions. Wanted your take on it, so to speak." Campos' eyebrows shot up, but he nodded. "Well, uh, it's to do with Germany. Frankly, we think he has been making some concerning overtures towards them, and we want to know your perspective on it."\n\nCampos' face cracked into a grin, and he clapped the Admiral on the shoulder. "A most understandable concern. Have you heard the saying about the President?" the Admiral shook his head. "One time, he was making a speech, and said that he never put the public's money in his pocket. Suddenly, a man from the crowd calls out, and he says "New Pants, Doctor?", huh?" The two men burst out laughing. "See, Doctor Adhemar is a wily man. I promise you, he is only there for their money, Admiral." The admiral nodded, seeming reassured."
brazil_adhemar.55.a: "That's a massive weight off of our shoulders, General."

brazil_adhemar.56.t: "Wrong Audience"
brazil_adhemar.56.desc: "The exercise had all started so well. When the 'Young Turks', as they were known, arrived in Germania they were greeted warmly and with many salutes. The first few meetings had been productive, too - they talked of Fall Weiss, Barbarossa, Sealion, and the German army's many other significant military operations and what made them succeed. Everything was fine.\n\nAnd then, it all went to shit in the lunchroom. Officer Júlio always had been a passionate sort, even back in the academy - as a mestizo, he felt it necessary. He was definitely not supposed to hear one of the Germans recommending that Brazil 'took care of its Untermenschen' and 'control of the white race.' But when he did hear what was said, it took three other officers to pull him off of the German.\n\nThe fight had escalated, obviously. And as they all sat in the same room as men who just a few hours earlier had tried to assault, the conversation was definitely much less congenial that it had been beforehand. Júlio, who had been rather talkative at first, now remained totally silent, glaring at the Germans.\n\nThe rest of the week followed a similar pattern, the awkward and tense atmosphere refusing to dissipate. By the time the planes to take the Young Turks back to Brazil had landed, it felt akin to being released from a prison."
brazil_adhemar.56.a: "Perhaps more like-minded officers should be sent over, next time..."

brazil_adhemar.57.t: "The Ride Back Home"
brazil_adhemar.57.desc: "Nobody on the plane had said anything since they took off. The admittedly luxurious aircraft was silent, nobody dared speak up and discuss the fiasco that had happened during the visit. Part of Officer Júlio wanted to feel ashamed for ruining the trip to Germany. It had obviously all gone downhill after the fistfight that he had started, and he wouldn't be surprised if they were all sanctioned when they returned because of it. But that was a very, very small part of him.\n\n"I'm not apologizing." Júlio said, breaking the silence. Everyone looked over at him, as the officer absent mindedly fiddled with his drink. "I'm not. Don't expect anything from me. Bastard didn't wanna get slapped, he shouldn't have called me and my family a load of 'untermensch'. That's it."\n\nThe plane was silent for a few more moments, before Officer Rico spoke up. "We know, Júlio. I wouldn't expect you to. Truth be told, I can't say I wouldn't react the same way if I was in your shoes. What that German said..."\n\n"Yeah, those Nazi creeps have a way of getting under your skin, huh?" Officer Juan interjected. "Some of my best friends in the academy were also mestizo. I was waiting for something like that to happen, personally." A general chorus of assent echoed across the plane. Júlio sighed, cupping his hands in his face.\n\n"Júlio, we were all involved." Ricco continued. "If you think we're going to let you take the fall, then you're mistaken. While they were decent enough before that comment, all of us disagreed with what they were saying about your people. We'll back you up. Besides, what proof do they have that it wasn't the German who started it, huh?" Júlio scoffed at this, although the atmosphere of the plane lightened up considerably after that."
brazil_adhemar.57.a: "All for one, one for all."

brazil_adhemar.58.t: "Professional Opinion"
brazil_adhemar.58.desc: "Dinner was the order of the night for Brazil's generals, and what a dinner it was. Lobster, steak, and all manner of other fine foods bedecked the tables, as the men behind Brazil's military might eagerly awaited the feast. And sitting at the head of the table, like some great medieval king, was Adhemar de Barros. He tapped his empty wine glass with a spoon, getting the attention of the men. "Gentlemen," he greeted warmly, a smile stretched across his face. "It is a pleasure to see you all here. I'm sure you're all eager to get straight to the food, but first, I would like some of your thoughts. Namely, what you all think must be done to ensure Brazil's safety. Just a few words. Admiral Campos?" he said, nodding at Zimar Campos across the table.\n\n"Well, Mr. President, the navy could certainly use an update. Some of the ships... Well, it's laughable. The Lobster War was won with boats, and we would need boats on the level of American ones to win another." Campos said. Adhemar nodded, gesturing to Melo.\n\n"Much of the same in regards to the air force, Mr. President. The new Specter planes would really make us much more credible, as a superpower."\n\n"I agree," interrupted Filinto from across the table. "Brazil must be seen as a fifth superpower. But we cannot be seen as such if our men are undisciplined. The Germans know how to whip their men into shape properly. We should look to them, as an example, in my opinion." There was a brief murmur of agreement across the table.\n\n"Why, I totally agree with the notion of us as a fifth superpower!" Adhemar proclaimed, clapping his hands together. "So much that I want to look into nuclear power soon. That would truly level the playing field, eh?" A few nervous chuckles echoed across the table, although the turn of phrase used made them less sincere than usual. "Ah, but you must forgive me for this, gentlemen." he continued. "I only seek to take care of you, and to take care of our military. The needs of the soldiers are the needs of the state after all. Now, dig in!"
brazil_adhemar.58.a: "The military men hesitantly tucked in, still unsure of Adhemar's comment."

brazil_adhemar.59.t: "The Heart of the Jungle"
brazil_adhemar.59.desc: "The sweltering heat of the jungle was one Colonel Vitorio had long grown used to - yet it still smothered him. Cutting through foliage, the colonel and his squad were apparently close to some squalid village forgotten by God in the middle of Pará where some reds had apparently been squatting. Their job was to enter the village and root it out. "Colonel," his deputy Frederico said, still not entirely used to the heat. "I still say that once we enter the village we should go full scorched earth. They won't be missed and will likely be collaborating with the targe-"\n\nVitorio shot him a glare, shutting him up. The man was much too overzealous for his tastes. Suddenly, a rustling could be heard in the distance. Two of his men appeared from the foliage, dragging a young boy with them. "Sir, we found this one in the bushes, what shall we do with him?" The Colonel raised his hand, gesturing for them to loosen their grip on the boy. He knelt down in front of the boy, producing a chocolate bar.\n\n"Here, take it. We're not here to hurt you." He said, offering it to the boy. He took it, tucking into it greedily. "Me and my friends here are the good guys, yes? And we're looking for the bad guys. Can you tell us if you've seen anything odd recently?" He asked as gently as possible. The boy continued scarfing down the bar, before looking up and pointing to the left.\n\n"Cave." He said, before continuing with his bar. Vitorio stood up again, nodding to his deputy. Later that day, the Colonel and his men stormed the cave system in the direction the boy pointed - it was full of hiding insurgents, all of whom were shot dead where they stood like fish in a barrel."
brazil_adhemar.59.a: "Sometimes the bluntest method is not the best."

brazil_adhemar.60.t: "Friends or Family?"
brazil_adhemar.60.desc: "The brown envelope sat upon Captain Pedro's desk, as if it was taunting him. Mocking him for his indecision. Other men would have taken the shady offer it presented in a heartbeat, and would be therefore much better off financially. Except, his damnable morals got in the way.\n\nIt had arrived a day or two ago, and the deadline for its request was growing ever closer. It lacked a return address and was delivered in the dead of night. Inside, there was a miniature recording device, and a sheet of paper in handwriting he did not recognise asking him to wear it to the next army meeting he went to. In return, he would soon find himself with enough money to solve all his problems.\n\nAnd therein lay the rub - he needed money. Badly.\n\nAside from the general struggle to make a living, his wife was expecting a child, and there was no way they would be able to give them any kind of acceptable life in the flat they were currently living in. His father was a hair's distance away from being evicted because he failed to repay a loan to the bank after the drought. It all just seemed to keep piling up.\n\nGlancing at the envelope, Pedro made his decision. He would be meeting with his friends tomorrow, and they would be discussing how best to subvert the agenda put forward by the higher ups. Once it was over, he would give it to his local police department, and his friends would be arrested. The thought saddened him, but Pedro knew that it was the only right thing to do in this situation."
brazil_adhemar.60.a: "Family always comes first. Always."

brazil_adhemar.61.t: "Best of Both Worlds"
brazil_adhemar.61.desc: "Anyone who claimed that looking at spreadsheets all day couldn't drive a man to drink clearly had never worked an ambassadorial job. Everything - the economic forecasts, the current market trends - it was all indicating to Lincoln Gordon that the Germans were starting to grab Brazil's economy by the balls, and if he did nothing to stop it, he may as well kiss his job goodbye. Suddenly, his phone rang. "Hello, Lincoln Gordon here?" he answered, Portuguese stilted.\n\n"Hello Gordon, it's Adhemar." Gordon's stomach dropped. Shit. "I am calling to ask about weapon sales. I hear that the United States are prime manufacturers, and I would like to order some. Would this be possible?"\n\n"I- uh-" he stammered, trying to crunch the numbers in his head. "Yes, I can get you a deal for fifty percent off. Does that work?" A grunt of affirmation that sounded positive came from the other end of the line, before it cut off. Gordon's stomach dropped. Looks like he'd be spending most of it thinking how to justify to his superiors as to why selling so much cheap high-grade equipment was a good idea.\n\nMany miles away, in a very similar office, sat the German ambassador. He too was poring over papers - although these were not spreadsheets. Rather, a variety of newspaper clippings related to local white supremacist figures. It always helped to know who one's friends were in foreign locations. Suddenly, Robert Kirk's phone began to ring. He picked it up, but before he could respond, Adhemar's voice came from the other side. "Guten Abend, Mr. Kirk, I would like to inquire about a potential military equipment sale. You see, we need new equipment, but the Americans have already made a very generous offer of 50% off-"\n\n"We will give you 75%," Kirk said, almost instinctively. "Whatever they are offering, we will sell 75% off." Adhemar laughed on the other end, and thanked Kirk for his offer, hanging up moments later. Rattled, Kirk almost ran over to his telegram machine, trying his best to think of how to tell Germania they needed as much old equipment as they could muster as soon as possible."
brazil_adhemar.61.a: "The art of the deal."

brazil_adhemar.71.t: "A Matter of Expansion"
brazil_adhemar.71.desc: "A meeting was taking place inside the presidential office, inside two men discussed the best way to approach Petrobras, Brazil's state-owned oil company.\n\n"Mr. President, my proposition is quite simple: it's necessary to establish Petrobras as one of the leading petrochemical companies in Latin America. With enough time and competent leadership, Petrobras could find itself among the best of the best, and this brings me to my second point: We cannot simply put as many PSP men as we can fit and hope for the best." Benedito made his point clear, clean leadership and consolidation are what Petrobras needs to reach its full potential.\n\n"I see your point, Benedito, but I think you don't realize the opportunity that lies here for all of us. The more profits Petrobras generates, the more revenue our government will have for all its ongoing projects, which will improve our popularity among the public and, with it, make them more likely to vote for the PSP. I hope you can understand my priorities. Benedito, I'm not saying that you're wrong, but think of it this way: In five or ten years, we may no longer be in power, and then what? Some other bastard will claim our achievement as his own!" Adhemar's vision promised the maximum short-term gain for both Petrobras and the PSP.\n\nThe discussion went on, and it seemed like no side could get the upper hand; ultimately, the decision was left in Adhemar's hands alone. He weighed his options, and with Benedito's words still echoing in his head, he stood up from his desk and addressed his colleague."
brazil_adhemar.71.a: ""Fine, we'll do it your way, but I want to see proper results.""
brazil_adhemar.71.b: ""Sorry, Benedito, I've already made up my mind.""

brazil_adhemar.72.t: "Bull in the Clouds"
brazil_adhemar.72.desc: "A visit to São Paulo was something President Adhemar de Barros would never say no to. This time it was at the request of Benedito Barreto, one of Adhemar's close associates. The reason why Benedito wanted to meet him at an airport out of all places was unknown to Adhemar; what he did know, however, was that Benedito wouldn't waste his time for no reason.\n\nAs Adhemar arrived at the airport, the goal of today's meeting was made clear as day. In front of him stood a jet plane, powerful and modern everything he wanted Brazil to be. A familiar voice broke Adhemar out of his dreamlike state. "Beautiful, isn't she?" Benedito arrived, and with excitement written all over his face, he extended his hand to greet the President.\n\n"Quite the machine, although I hope you didn't drag me out here just so we could stare at it." Adhemar's interest grew with every second.\n\n"No, Mr. President," Benedito smiled as he reached into his pocket. "You will do much more than just stare at it." Benedito raised his hand out of his pocket and tossed a pair of keys towards Adhemar, a symbolic gesture, one doesn't need keys to fly a jet plane after all. "Oh, and one more thing before I go, it runs fully on fuel made here, in Brazil." With his last comment, Benedito headed back to his car, leaving the President alone with the newly arrived pilot.\n\nAdhemar headed towards the plane, excitement, and dread mixing inside him. "No need to worry, Mr. President; this isn't my first time." The pilot tried his best to ease the President's nerves. Starting the engine, he gave Adhemar one last reassuring look, and they took off. Adhemar quickly realized that his uncertainty was ill-founded, São Paulo viewed from the sky was unmatched by anything he had ever seen. Here in the clouds Adhemar realized that none of this would be possible without the PSP, without him."
brazil_adhemar.72.a: ""I have made myself a monument more lasting than bronze.""

brazil_adhemar.73.t: "Flesh and Rubber"
brazil_adhemar.73.desc: "Diego looked down at his employees, not at all sure what was going on. He had gotten this job straight out of university, thanks to his father's government connections. He looked out of his big glass pane, observing his workers, knowing full well that he would space out. A sudden phone call dragged him out of his reverie. He ran back to his desk and picked up the phone. "Hello?" Diego almost shouted into the phone. "Who is this?"\n\n"It's your shipment of paste. Get someone out here to pick it up." The man on the phone said, somehow already fed up with the day.\n\nDiego made his workers rush outside to handle the shipment - it would all go fine, of course. He pulled out his newly-bought book for rubber factory managers, and quietly began to read it. He read about cross-linking paste with the calendar. Closing the book, he walked out onto the creaky patio that looked down upon the factory. Later that day he would speak to the employees who knew about the rubber calendering process - he still didn't understand how it worked. After all that, he went back into his office and filed some reports. He knew that this whole management thing would be easy.\n\nWhile writing down some new orders and reports, he heard pained shouting from the factory. Panic descended over him. Diego quickly ran onto the balcony, seeing a screaming worker with half of his arm burnt off. The bone was completely visible and was obviously charred. The manager began biting his fingernails - he wasn't trained for this at all. He ordered the guardsmen to take the worker to the hospital. He knew that that worker would die of his injuries, of course, but it couldn't be helped. What could be helped was how this looked on paper. He took one look at the first page of his book and was reminded of one of the first lines."
brazil_adhemar.73.a: ""Expect deadly accidents to occur; pay them no mind.""

brazil_adhemar.74.t: "The Wheel Slowly Turns" # His Ideas!
brazil_adhemar.74.desc: "Through the restaurant's window, in the far distance, Benedito Berrito could just see the top of one of Petrobras' newest office blocks. They were coming quickly, now that his work was becoming evident for all to see.\n\nAcross the table his guest, the newly appointed director of Petrobras, noticed his gaze and smiled. He had obtained the position at Berrito's insistence, after his predecessor had been forced to resign over charges of corruption, grotesque mismanagement of state funds, and personal incompetence. Berrito could not personally speak to the first two, but he knew the last was very accurate.\n\nThe Director had been speaking at length as to Petrobras' enormous recent efforts in and around Rio, and that efficiency and productivity metrics were already sharply rising, thanks both to Berrito's targeted reforms and crackdowns on corruption. And, of course, also to his own appointment.\n\nBerrito nodded as he half-listened, enjoying the meal far more than the company. But he knew that the Director was right. Petrobras was expanding rapidly, and he had purged a lot of the rot. The business community was already expressing significantly increased confidence in the behemoth, and he knew there was not but benefit to come."
brazil_adhemar.74.a: "An excellent job. Still not done."

brazil_adhemar.75.t: "The Emperor Is Completely Naked" # Adhemarknows best!
brazil_adhemar.75.desc: "Adhemar reclined in his chair, sipping his coffee. It seemed that it would be yet another productive morning in the Presidential Palace, he mused, picking up the morning paper. But all illusions of that melted away when his eyes scanned the headline - a bold, unseemly thing that fit more in 1955 than it did the mid-1960s. His chest began tightening as he began to read onwards.\n\nPetrobras. Corruption. Mass losses of public assets. These words flashed before his eyes as a story unraveled before him; one of men who he thought (keyword, thought) knew how to keep their noses clean - or at least, how to make the public think they were clean. He would have assumed as much, given how much he was paying them. But Carlos Lacerda's investigation had blown that assumption right out of the water, the credibility of his scheme with it.\n\nHe clenched the paper, the coffee not settling well at all in his gut. A low, sinking feeling was making its home in his body as he seethed over the stupidity of it all - Adhemar was no stranger to statistical legerdemain and fabricating numbers for his own ends, true. But there was a time and a place for it - and that was certainly not when his own pocket and reputation was involved. The worst part was that some of the directors had likely already ran away to some tax haven to escape the fallout, and he would have to stay behind and take the heat.\n\nHis thoughts began to swim, all circling around the idiot that had conned him into this crackpot scheme in the first place; Barreto. That skeevy moron just couldn't leave Petrobras alone, and now all of their hands were dirty. Putting the newspaper down, he took a deep breath, trying to ignore the growing pressure building up in his chest. He couldn't fire Barreto - not so soon after being seen with the Petrobras directors. That would just make it obvious he was trying to cover his own ass.\n\nBut they would never speak again. That man had proven Adhemar to be fallible - and for that he could never forgive him."
brazil_adhemar.75.a: "The plated gold begins to fall away."

brazil_adhemar.76.t: "The Life of the Family"
brazil_adhemar.76.desc: "At its core, politics, beneath the layers of platitudes, scheming, and demagoguing, resembled a family. Few in Brazil understood this fact in such clear terms as President Adhemar, Brazil's humble patriarch. Sure, there were disputes from time to time, but he understood that the only way to keep the family in order was to keep everyone satisfied. Uncle Pedro helps you secure a district's vote, and he gets a little something extra next Christmas. And yet, the President was caught between two families. With the elections over with, he finally had time to spend with the ones he really cared with about.\n\nStanding at the center of the best restaurant in São Paulo, he held up a glass of the champagne and toasted his son's election as Federal Deputy. Sitting down to finish his meal, he smiled to himself as his son waxed lyrical about his plans to improve the country's plastics industry, perhaps that chemistry degree the President had always teased him about was finally paying off.\n\nSoon after, Adhemar found himself bickering with his son and law. The businessman hammered Adhemar on why the country did not yet have a color TV football channel. Despite his annoyance, Adhemar could not help but admire the young man's passion and courage to stand up to the man that had gotten him his job in the first place...that took a different type of balls.\n\nAs the hours passed by, and the night neared its end, Adhemar couldn't ignore how incomplete this gathering felt. It was times like these, that his brother would always lift his spirits with a quick-witted remark, but Antonio was gone. Looking over the table he saw his other sibling Geraldo with similarly sunken eyes, age was catching up on all of them. But, seeing all the smiling faces and joyous laughter reminded the President why he had to keep pushing, to leave behind a legacy that his two families would always be as happy as they are right now. As Adhemar moved to reenter the conversational fray..."
brazil_adhemar.76.a: "A single tear dropped into his glass of sherry."

brazil_adhemar.77.t: "This Is Not the End"
brazil_adhemar.77.desc: "President Adhemar sat at his desk, the single light illuminating his weary eyes. His voice was hoarse and his hands sore, seemingly glued to the telephone, but he couldn't stop now. The election had just been a setback, not the end. He had tried the straight and narrow way, but it was time to get dirty. Time to get in the mud where the real work happens, just like the old days in São Paulo. The senators will fall in line. He just needed to make one more call...\n\n"Mr. President. A pleasure to speak to you as always."\n\nOne more promise...\n\n"Chief of Water Sanitation, tell me you're joking?"\n\nOne more bribe...\n\n"Please, Adhemar, we both know you can add another zero to that check."\n\nOne more threat...\n\n"I resent your implication, sir. Pablo and I are only golfing partners."\n\nAs his vision began to blur and the darkness of sleep seeped in, Adhemar kept reminding himself: The reforms would be passed. It was not over yet. Just... one... more..."
brazil_adhemar.77.a: ""Mr. President? Mr. President? Are you still on the line?""

brazil_adhemar.78.t: "Duas da Manhã"
brazil_adhemar.78.desc: "Rafael Correia wanted to go home.\n\nPatrol after patrol, nothing ever happened. Nobody was up at this time anyway, except him. And night after night he thought he couldn't live like this, he was staying up too late, he was never getting enough sleep, and he wasn't cut out for this. But then he remembered this was a favorable position, better pay than when he was doing the same thing for the offices of Phillips Petroleum or Yasuda.\n\nAfter all, few people got to guard the Palácio do Planalto.\n\nHe didn't really know his relative who got him the job in the first place. He was some PSP deputy, but they were family, and family looked out for one another. So now he was in what many would call a prestigious position, but to him it felt like the same thing all over again. It was the same windows, the same offices, no different than if he was looking at one for a receptionist, one for a foreign engineer, one for a mid level manager, or one for the President of Brazil itself...\n\nRafael's hand went to his gun, and he almost though about jumping in before his senses kicked in. Now, he burst through the doors, running up the steps, flashlight in one hand and revolver in the other. Within a few moments he was at the office, opening it up, and clearing the room with a beam of light and the barrel of his gun.\n\nNothing. Fuck.\n\nHe thought he saw... someone down there. Someone or something in the office, next to that cabinet right there. But there was no one, nobody. The President was gone long ago, and he was the only guy in the building. Heart still pumping, he realized he needed to go back down and make sure the building was still secure, reminding himself he still had a job and couldn't get paranoid like this."
brazil_adhemar.78.a: "He did not notice the office window slightly open to the dark night."

brazil_adhemar.79.t: "On the Back Foot"
brazil_adhemar.79.desc: ""You've gotta be shitting me on these reports" the handler said in fluent Portuguese, flipping through image after image of Nazi businessmen and diplomats cozying up to their Brazilian counterparts. In the matter of just a year, Brazil had gone from a reliable OFN ally to... whatever the hell this was. A special agent sat stoically across from him in the Rio cafe, leaning back with his arm around the metal backrest. The two had been regulars for over a decade now, the owner content to polish glasses behind the counter filled with pastries.\n\n"And why, exactly, would I be lying to you? Ever since Lott's little highway crisis Brazil has gone off the deep end. All of the projections about how we could sway Adhemar were blatantly wrong. The man is committed to his vision, and he's not budged an inch on it." He shot a glare back to his superior. "I tried warning you and the rest of the division months ago, but I guess the message never got up the chain." Ignoring the insubordinate comment, the handler sighed, folding the manila folder shut.\n\n"No point in dredging up the past. We need to focus on dragging this Müller fellow down. He's clearly the Krauts' main powerbroker here. I'll make a few calls back to Washington, see if we can't get a few more eyes and ears down here." The handler tossed a stack of cruzeiros to cover the two finished coffees on the table. "Our time's up here."\n\nThe two men pushed their chairs in. "I want daily reports now, not weekly. I'll be in touch soon about our next steps," the handler said, wiping sweat off of his palms despite the cool morning weather. As the two men began to head their separate ways, he grabbed the special agent's shoulder, and leaned in to whisper."
brazil_adhemar.79.a: ""We cannot lose Brazil to the Nazis. Do what you need to do.""

brazil_adhemar.80.t: "The Musings of a Former President"
brazil_adhemar.80.desc: "Getúlio Vargas was enjoying a cigar as the sun began to set on his ranch in São Borja. The soft, orange light on his patio always had a calming effect on him, even into his later years. As the sun continued to sink into the horizon, Vargas thought about the current President. That opportunistic bastard had always been a wild card, something Vargas desperately wanted to control, but could never just strangle into submission. Joining the Paulista revolt in '32, only to rat them out in the following years. Appointed as the interventor of São Paulo, turning it into both an Estado Novo and PSP stronghold. Now the state was the seat of power for his own son, yet Adhemar still pulled all of the strings at the national level.\n\nCoughing heavily into his sleeve, he laboriously reached across the small desk for a pen and paper. Putting out the cigar and taking a large breath, he began to write. The address at the top was for the President of the Republic. "Adhemar", he penned, "you have always been a greedy little bastard. But I must admit that only you can continue the grand reforms that I have begun." Another bout of coughing ensued. Shit, Vargas thought. "We have never always agreed on policy, but know that I have full confidence in your intellect and pragmatism to continue guiding Brazil down its rightful path."\n\n"I can only have this confidence because you are in charge, and not those scum from the UDN. Never surrender to them." He signed the letter before folding it into an envelope, struggling to stand up from his rocking chair. Sure would've been nice to spend the night with one of his mistresses, but his chest was killing him. Perhaps it was better for him to retire early for the day. There was always tomorrow, the former President thought.\n\nThe following morning, it had been announced that the leader of the Estado Novo had passed peacefully in his sleep."
brazil_adhemar.80.a: "His last message to the President was found, resting gently in the palm of his right hand."

brazil_adhemar.81.t: "No Good Answers"
brazil_adhemar.81.desc: "Adhemar stared longingly out of the window, his chin resting on his hand. The mob outside had reduced his motorcade to a slow crawl, giving him plenty of time to plan his speech that he needed to give at the end of the service. It was no secret to any citizen of the republic that he and Vargas had never seen eye to eye. His thumbs constantly twiddled with the former leader's last words to him. Vargas said he always had full confidence in him, Adhemar wondered. If that was truly the case, then why wasn't he nominated as Vargas' successor in 1950? And why did it take the cajoling and recruitment of his son into the PSP for them to even just normalize relations?\n\nHe sighed. There was no point in trying to dissect and understand the past. There were just too many factors involved back then. Adhemar thought about gearing his speech to be more emotional towards Vargas. He did owe his political career to the man, regardless of how icy their relationship usually was. It would certainly make Adhemar look good in the eyes of the Varguist coalition, and the vast majority of the country. But was he really going to kiss the ass of the man that always seemed to have it out for him? Did Adhemar ascend to the presidency because of Vargas, or in spite of the man?\n\nAdhemar folded the letter shut, tucking it neatly back into the envelope. He fidgeted with the seal, the words "Ordem e Progresso" staring back into the President's soul. Just what was he going to say?"
brazil_adhemar.81.a: "He was going to honor the legacy of Brazil's first builder."
brazil_adhemar.81.b: "He was going to tell the cold truth of Brazil's beloved despot."

brazil_adhemar.82.t: "Brazil's Way Forward"
brazil_adhemar.82.desc: "A thunderous clapping had resonated throughout São Borja. Adhemar de Barros stood up, shaking the hand of the previous speaker, before laying out a sheet of paper on the podium. Adjusting the microphone, he looked across at the crowd gathered in front of Vargas' body.\n\n"We must always strive to strengthen our glorious republic." Adhemar began, "There was no man in this country that has done more to advance Brazil throughout the years. The industrialization of our economy, the formation of a strong, central government, the constant vigilance against the communist and integralists threats our country faced on a daily basis, both internal and external." He paused, feeling a lump in his throat. "There was no man in this country that could've done the job Getúlio Vargas did for each and every one of us."\n\n"I promise that I will faithfully uphold Varguism into this new age. We may be without the man who started it all, but it will not have to end here. Brazil will continue to ascend in this new age into a strong country." Adhemar's voice continued to rise. "A country that works for us all!" A cheer began to break out throughout the crowd.\n\n"Brazil's ascension has only been because of our mentor's ideas and policies. Our mentor, our dear friend, Getúlio Vargas has set out a path for us all to follow. We will not forget our great leader!" The cheers continued to grow in strength, and Adhemar felt his eyes begin to water. "We cannot depart from this golden path! Brazil, we will march forward, together united under Senhor Vargas' guidance!" As he pumped his fist, the crowd erupted into a raucous frenzy, with shouts of "Adhemar!" and "Vargas!" flooding the air."
brazil_adhemar.82.a: "The President couldn't hold his tears back anymore, tears flowing freely down his jubilant face."

brazil_adhemar.83.t: "Caustic Words"
brazil_adhemar.83.desc: "Scattered applause echoed through the room as Adhemar de Barros strode up to the podium. He nodded curtly at the previous speaker before clearing his throat, speaking into the microphone. "It has been said many times today how important Getúlio Vargas has been to our nation. I would never deny this. He has certainly shaped Brazil as we know it today. However, we must remember his mistakes alongside his successes."\n\nJust like that, the mood of the room plummeted. Attendants began to nervously whisper to each other, wondering just where Adhemar was going with this. "Indeed," he continued. "I am not one to speak ill of the dead. Getúlio Vargas was my friend." Adhemar gulped. "But he was not perfect. He was far too quick to abuse power. He threw an excessive amount of people into prison merely for opposing him. Just look at what happened to the Constitutionalists in 1932!"\n\nEvery word Adhemar said was like shooting a cannon into the air. Some were stunned into silence, while a good chunk had begun heckling him in outrage. The loudest voice, however, was Tancredo Neves. The man was red-faced, anger practically falling off of him in waves. "Hypocrite!" he yelled. "Vargas made you, you lying, treacherous bastard!"\n\nNeves was backed up by none other than João Goulart, who piped up in turn. "You hired the likes of Kruel and Müller, yet you call him authoritarian? For shame, you-"\n\nAdhemar slammed his hand onto the desk, silencing the room. "If I may continue," he said, shooting an icy look at the two men. "My point is being proven. What is happening even now is Vargas' followers trying to absolve him of any and all misdoings. As I have stated, he was my friend, and by God I will miss him. But we cannot ignore his legacy. I would expect him to do the same to me, were he in my position. Thank you.""
brazil_adhemar.83.a: "The mood of the funeral was much more tense, after that."

brazil_adhemar.84.t: "The Emptiness of Victory"
brazil_adhemar.84.desc: ""...it was a few days ago. The whole country was practically already in a state of mourning, so it was only a matter of time. We only know about this because of our connections to a security guard." Lacerda had barely registered what his secretary Esther was telling him, as a million thoughts flooded his brain. Getúlio Vargas, his political enemy since practically the very beginning of the Republic, had passed away. Back in those tumultuous days in the Senado when he had cursed the man out in every way imaginable every single day, he would imagine what it would be like when Vargas passed.\n\n"Thank you, Esther. Thank you. If you could leave me for a bit, I have some... feelings to ruminate on." She nodded curtly, exiting Lacerda's office. Feeling a grin creep up on his face, his hand instinctively reached for the drawer underneath his desk. It contained a champagne bottle he had been saving for this very occasion for a number of years now. Popping it open, he poured himself a glass, savoring the sweet taste of victory. He had outlived the bastard. All those years of fighting the man's pseudo-dictatorship has paid off, with the PTB far away from the gates of power - as they should always have been.\n\nBut as Lacerda swilled the alcohol around his mouth, a thought struck him. The PTB were gone, yes, but the PSP still had the Presidency. Vargas was gone, but something much worse had taken his place. And while he may have certainly been no Saint, at least Vargas was no corrupt con man like Adhemar. He had some principles beyond mindless populism. Principles he stuck to, despite Lacerda's constant opposition. A funny feeling began to bloom in Lacerda's stomach - one wholly unfamiliar that he did not like one bit.\n\nThe Crow would not finish the champagne. After fruitlessly trying to finish sifting through the paperwork in front of him for a few minutes, he rang for Esther, and told her and the staff that the champagne was on him. He left early, retreating to his home to reflect further on what this new feeling towards Vargas could possibly be. And as he lay there in bed that night, he finally recognised what this void in the pit of his stomach was."
brazil_adhemar.84.a: "It was loss."

brazil_adhemar.85.t: "Night Shift"
brazil_adhemar.85.desc: ""Thank you, please come again!"\n\nAntonio's fake smile faded away as the customer turned his back, and exited the restaurant. Taking a moment to glance at his watch, he breathed a sigh of relief; only fifteen minutes left in his shift. As long as another gambler didn't show up, he was good as gone. He sat at the back of house, gazing blankly into the endless rows of slot machines, daydreaming about having enough money to waste on such frivolous entertainment, instead working nights to feed the family. Five minutes before closing, his manager tapped him on the shoulder and apologetically gestured to a tourist that had just wandered into the front. Antonio reapplied his fake smile, before grabbing a menu.\n\nThe customer, having just slumped into an empty seat, glared as Antonio placed the menu in front of him. "Took you long enough," the tourist said, his slurring and heavy accent making his words almost incomprehensible, "What am I even paying for? Where is the water? Chop Chop, I don't have all day." Antonio smiled as the tourist snatched the menu from his hands, and turned away. Looking up from the menu, the tourist yelled out once again, "Get some pep in your step, I'm thirsty! Oh and add a side of wings while you're at it. And make sure the water is cold, don't skimp on the ice. You know what, grab me a beer while you're over there too." He chuckled. "You're gonna have to earn your pay today!"\n\nAntonio grimaced as he ran to the back. "My pleasure," he responded, "I'll be right with you!""
brazil_adhemar.85.a: "No tip."

brazil_adhemar.90.t: "Knives in the Shadows"
brazil_adhemar.90.desc: "In the shadows of the German Embassy, Robert Kirk paced back and forth furiously. He had been under the impression that Adhemar de Barros had been the type he and the rest of Germany could cooperate with reliably and consistently. But if the events of the last few days had taught him anything, it was that sometimes the stick was just as necessary as the carrot.\n\nIt had all started a few days ago, when he had received a phone call from Berlin. It had been a request to help Brazil's German minority gain the rights to organize independently - after all, if Gomes could grant it to the other minorities, then it only made sense for the Germans to have it too. A highly reasonable request, frankly. He even had a highly appealing 'carrot' ready - a highly lucrative pharmaceutical contract that his father had already gotten approved.\n\nAnd yet, when he had illustrated the many benefits of this idea to Adhemar face to face, he had rejected it. Of course, he never said this directly - Kirk vividly remembered the vacant, glazed over look the man had on his face as he sipped his coffee, calling it a "decent idea conceptually" before proposing that they teach German as a second language instead of allowing full autonomy. The very idea of Aryan children only knowing their mother tongue as a 'secondary' language alone made Kirk sick, but the nerve of him to reject them wholesale left him outraged.\n\nA man entered Kirk's office. He turned around, face visibly creased with irritation. "What took you so long?" Before the man could answer, he continued. "Never mind. I have a job for you. And every other man here, as a matter of fact" He then walked over to a filing cabinet, producing a sheet of paper with a list of names on it - names in Adhemar's cabinet. The carrot had failed, so now came the stick."
brazil_adhemar.90.a: ""I want any dirt you can find on any of these men brought to my desk as soon as possible.""

brazil_adhemar.91.t: "The Problem of Kruel"
brazil_adhemar.91.desc: ""Amaury will ruin our administration," Filinto yelled through phone static. "Listen to this. 'Workers are stuck in employment due to debt bondage, starved on a tight diet of watered-down pirão, and, if supervisors were particularly moody, beaten with a whip or cane and locked in a cage for days on end.' Adhemar, he's killing them! He treats his staff like enemies of the state!"\n\nWonderful news for a Saturday morning. Adhemar didn't know how this obscure newspaper got this exposé, but if the mass media picks this up, this could spell disaster. He dropped the Tokyo pamphlet he was using to practice Japanese then turned to his idyllic view of Lago Paranoá. A gentle breeze swept the room. Looking at his reflection in the glass, his jaw set, and he straightened his back. He was Adhemar de Barros; he could handle this.\n\n"We need to steer the discourse, crack down on the press," Filinto interjects, breaking into Adhemar's thoughts. "Now would also be a good time for a bill to distract people. Something controversial even." Suddenly, Kirk's agenda flashed through Adhemar's mind: granting German-Brazilians the power to organize independently. He didn't hate the idea, per se, and some quarters would sincerely support it. Nevertheless, this is definitely a contentious act. Would he be able to navigate the political fallout?\n\nOr he could just sack him. Kruel had consistently been a costly liability. So much money had been passed under the table to keep him in check, and yet he still managed to get his government into quagmires such as this one. And who knew what else he might've done behind the scenes? Especially if someone is out there digging up dirt on members of his cabinet. Ousting a man that powerful might lead to trouble, but would it not simply be the right thing to do?"
brazil_adhemar.91.a: ""Filinto, you may like this one bill idea I was approached about.""
brazil_adhemar.91.b: ""No, Filinto. We're sacking him.""

brazil_adhemar.92.t: "Kruel Saved"
brazil_adhemar.92.desc: "With a single signature, Germans could once again organize themselves in Brazil, a privilege barred from them for over twenty years. The afternoon sun cast a warm glow into the hall as it bounced off the polished surfaces and bathed the crowd of journalists and dignitaries, creating an aura of gravitas.\n\nNo one had expected such a grandiose ceremony for a decree so controversial, but Kirk wasn't complaining. Already moving on from the pomp and circumstance, his mind now shifted to the cogs and gears of his machinations, as he prepared for his pharmaceutical project.\n\nAdhemar, however, appeared less relaxed at the podium, straddling the chasm between the Auriverde to his right and the Swastika to his left. Surveying the room, he noted Edna's absence from the proceedings, probably preparing manifestos condemning the act. Then, the squeak of immaculate black shoes caught his attention - the German representatives were discussing their ambitious plans with de Matos, other Brazilians eyeing them from afar.\n\nTo the side, Kruel and Müller were isolated, sitting together, obliged to stay despite nobody to converse with. Like two cats forced into a small box; every time one moved, the other twitched. Neither spoke, the silence between them echoing louder than any words. If nothing else, it was good that they were keeping away from the cameras. But as Adhemar thought that, he remembered something.\n\nA peculiar sight began to unfold: the President was meticulously positioning a photographer before striking a pose with a smile and a straight back. Click and flash - the President, grinning alongside the Hooked Cross, was immortalized in film. With this incendiary photo, tomorrow's newspapers would be emblazoned with bold claims of egalitarian triumphs for German-Brazilians. His Excellency appeared to be going out of his way to court as much contention as possible."
brazil_adhemar.92.a: "The media ate it all up."

brazil_adhemar.93.t: "Kruel Sacked"
brazil_adhemar.93.desc: ""Will there be reparations for the victims?"\n\nAdhemar stood unwavering on the podium. These questions were easy! For once, he did everything by the book. He simply has to say what actually happened. "Certainly. Our reparations plan includes immediate financial compensation, clearing of all outstanding debts from the exploitative bondage, as well as healthcare services to address the trauma experienced." He really did those things!\n\n"In light of Kruel's abuses, can you assure that other members of your government are not engaged in similar or worse activities?"\n\nThese questions were getting harder, but he just needed a lighter tone to mask the deflection. "Rest assured, my friends, Kruel's choices are his alone and do not represent our values. Grain by grain the chicken fills its crop, and we'll continue taking steps to ensure our actions align with the principles of justice and respect for the people."\n\n"How will you manage the likely political fallout and loss of support from elements within the armed forces due to your dismissal of Kruel, who had strong connections with military hardliners?", asked a particularly plucky pundit.\n\nA pause, long enough for journalists to relish. "I want to stress, my friends, that the strength of Brazil lies in the hearts of our people and in the vibrancy of our democracy. No traitor, no matter how influential, should ever eclipse that."\n\nThen, with an unintended slip, he adds, "As we look towards appointing a new defense minister, " A quick correction, "Well, when we get to that point, we won't be swayed by threats or intimidation." Alright, that should convince them."
brazil_adhemar.93.a: "Not a single person in Brazil was convinced."

brazil_adhemar.94.t: "Outrage and Anger"
brazil_adhemar.94.desc: "As Jaime Lerner entered the auditorium, he suddenly became aware of the tension that was permeating the meeting, as well as the rest of Paraná, after the return of German privileges. The news had made waves throughout the region and had spurred the usually disparate community leaders to jointly discuss a response. Remembering the rising panic in his own home city of Curitiba, Jaime frowned, and took his seat with the other Poles.\n\nA bearded man stood first, appraising his audience before speaking. He was, the man explained in a thick Ukrainian accent, a prominent doctor of his village, and the son of a refugee. His mother had fled the Union just before the German assault, taking her only child overseas. His father had remained, refusing to give up the fight until victory was won. Looking directly at his audience, he concluded: "This decision is a direct insult to both our community and our struggles. We won't take this lying down, one way or another."\n\nAfter polite applause, an elderly woman shakily rose, leaning on her cane. She was an octogenarian, the woman stated with pride, that had lived all her life teaching in the Jewish quarter of Curitiba. With misty eyes, she recalled the stories that refugee children had told her; speaking of tragedy that no child should know. As she slowly returned to her seat, she called out: "What happened there cannot happen here, no matter what."\n\nSeveral more speakers with similar stories rose before Jaime stood. Introducing himself as a prominent engineer from Curitiba, he began to explain his solution. The only adequate response, he argued, was a united front of their communities, headed by the Poles, and armed against any attacks the Germans might make. Local militias, he continued, would be ready at a moment's notice to deal with any threats. "Although nobody wants violence," he said, "Pacifism failed in Europe, and it will fail here. Only with militancy can we guarantee peace.""
brazil_adhemar.94.a: "Passed unanimously."

brazil_adhemar.95.t: "Preparation"
brazil_adhemar.95.desc: "As the armored door slowly creaked open, the quartermaster nervously glanced back, seeing with relief that the Curitiba outpost was still deserted in the early morning. Entering the dark storage room, he quickly shut the door behind him and flicked the light switch. While he moved to the back of the room, the quartermaster appraised his inventory. Missing rows of rifles, dozens of grenades out of place, and absent boxes of ammunition stood out to him, sparking no response from the man. As he reached the back door, he tested the handle quietly before locking it.\n\nIn the motion, he looked to the left, noticing the large black bag in the corner. The Quartermaster nodded to himself, glad that the Poles had upheld their end of the deal. He grabbed the bag eagerly and began to move towards the entrance. As he walked, he unconsciously touched the small dog tag that hung around his neck, still stained with British mud, and allowed himself a small smile. He imagined what his father would think, his own son committing crimes against the nation he'd died for while wearing his own tags. The quartermaster shook his head; his father surely wouldn't mind.\n\nUpon reaching the front of the warehouse, he turned once again and opened the black bag. Reaching inside, he withdrew one of the rifle replicas, marveling at its near perfect quality. Starting from the front, he placed plaster replicas of every missing rifle, grenade, and crate. When he finished, even his own trained eye couldn't tell the difference between the true and fake weapons that now lined the shelves. Content, the officer grabbed the now empty bag and exited the outpost silently. As he drove down Paraná's labyrinthine roads, he took the time to appreciate his one reward; a rare chance to keep up the family tradition."
brazil_adhemar.95.a: "Fighting the good fight."

brazil_adhemar.96.t: "Fuse"
brazil_adhemar.96.desc: "By the light of the moon, Sergei double-checked the current name on his list. The German, chairman of the Paraná Brothers of the Reich, and an infamous fascist agitator in the region, was highlighted below a dozen crossed-out names. He looked at the address listed, and up at the large bronze numbers on the front door; a perfect match. Nodding with satisfaction, Sergei gathered his unit behind the house and reached into the bag at his side, pulling out an unlit Zhdanov and a lighter. With a spark and a toss, the starlight countryside was bathed in fiery orange light, and the silence was broken by the blaring of fire alarms. At a cue from their leader, the rest of the squad began to hurl the rest of their munitions into the house, while the family inside shouted wildly as they fled.\n\nAt the back of the group, a young man dropped his Zhdanov in the grass and stood petrified. Noticing the disturbance, Sergei moved to the back of the group and asked the youth what the issue was. "There are people in there!" the Ukrainian shouted as he slumped to the ground, "I get he's a bad guy, but what about his wife? His kids? How is this any better than what they do? How is any of this justified?"\n\nWith a knowing expression, Sergei knelt down and touched the boy on his shoulder. "We don't do this for fun, or because it's easy," he gently responded, "We do this because it needs to be done. They would do the same to us in a minute, and they have for decades in Europe. This is the only way to make them leave us alone. You and I both have families too, and the Germans aren't going to protect them for us. Only we can take action." Sergei stood and offered the Ukrainian his hand. The youth grabbed his Zhdanov from the ground, and took the arm shakily, thanking his leader. With a mutual nod, they returned to their task, as Sergei crossed another name off of his list. The houses burnt would get them to leave Paraná and move north, it would get the Germans to leave them alone.\n\nThe next morning, a man entered a room with a dozen other Germans, all reeking of ash and smoke. They had already drafted many different plans and ideas, but they all agreed there would only be one appropriate response to the Untermenschen assault."
brazil_adhemar.96.a: "Revenge."

brazil_adhemar.97.t: "Spark"
brazil_adhemar.97.desc: "Late in the afternoon, a group of wealthy Germans entered the front door of a high-end restaurant. With a nod to the host, the door was locked behind them, and a waiter escorted them to the private booth, far from the view of the busy street. After making sure that the rest of the building was empty, the Germans sat down and began to eat.\n\n"Any response from the governor yet?" asked one man on the right between spoonfuls of caviar, "My wife won't stop talking about the horror stories she's been hearing from her friends."\n\nThe man in the center shook his head. "None," he replied through his teeth, "No phone call, no letters, nothing. All of my petitions for more gun permits were ignored. He didn't even dignify me with an apology or even an excuse."\n\nBoth sides of the table murmured in surprise; Paraná's governor, Ney Braga, was usually sympathetic to industrialists who invested in the economy, he was supposed to be on their side, not the rioters. Now, with German homes being burned daily and violence, he was utterly silent. Only token police support had been sent, there was no sign justice would come from the governor about these crimes. Above the grumbling, a man on the left raised his voice. "What about Santa Catarina and Rio Grande do Sul? Surely one of them will help us, even if our Governor won't. Eventually, somebody has to pick up."\n\nThe man in the center shook his head again. "Apparently not," he repeated, "I've gotten nothing from either of them; they're all silent. I don't know what to do. It seems like they have orders from above to keep quiet, or they've finally taken the enemy's side. For now, at least, we're on our own."\n\nJust before shouting overtook the conversation again, a phone rang in the corner. As one of the Germans on the right moved to answer, his frustration turned into surprise. Looking to the group he said: "The Reich's embassy is on the line.""
brazil_adhemar.97.a: ""Await further orders.""

brazil_adhemar.98.t: "Detonation"
brazil_adhemar.98.desc: "Early in the morning, a young boy is shaken awake as booms from the distance rattle his home. As he stepped outside of his home, he looked up at the sky in surprise. The boy began to run and jump around, shouting into the street "It's snowing! It's snowing!" Just as a clump of grey particles landed on top of his nose, his parents, fear etched on their faces, grabbed him and forced the protesting child back inside. Through the window, the boy watched as his parents gathered the neighborhood, and ran off into the distance.\n\nThe parents arrived at the scene and stood shocked as a growing fire consumed the district's only library. The father sprinted toward the paramedics as they loaded a heavily bandaged man into an ambulance. He gasps as he catches a small glimpse of the injured man's face, recognizing him as the building's librarian. Remembering the many sleepless nights he'd spent organizing protests between bookshelves, a motive, and culprit, began to crystalize in his mind. While the father bolted back to his wife, he heard the first responders shout "We're losing him!" as the ambulance doors slammed shut. Standing at his wife's side, the father stood motionless as the library burnt to cinders in front of them.\n\nThat night, a group of Germans sat around a table in the basement of an old manor, in hushed conversation. The German sitting at the head of the table clinked his glass and rose to make a toast. "Yesterday, gentlemen, we were at a crossroads," he says, "between the choice of submission or the choice of survival. Yesterday, our enemies attacked our families, torched our homes, and drove us out of Paraná. For years we have been spurned by the government, our livelihoods stolen and our pride tattered as we bent to the will of the governor. But no longer! Today we have finally stuck back against the Untermenschen that we have been forced to bow to for so long. Today, we take back our birthright of hearth and home from those that would see it stolen from us! Today, a bright new sun dawns over Paraná!""
brazil_adhemar.98.a: "The South quakes."

brazil_adhemar.99.t: "Aftermath"
brazil_adhemar.99.desc: ""With all due respect, sir," Vasco Leitão said, "Removing the embargo on Germany, as well as the return of German privileges, appear to have directly caused the present violence in the south. Although the economic benefits are clear, they are not outweighed by the resultant threats to internal security, in my opinion."\n\n"You can say that again," Edna Lott basically shouted from the other side of the table, "You sell out the southern communities to the country that makes a hobby of exterminating them, and expect the response to be peaceful and compliant? No! They're going to fight tooth and nail against the perceived threat, and rightly so! You shouldn't even be surprised!"\n\nAdhemar sat at the head of the conference table, attempting the crease out his growing headache as the members of his cabinet found new ways to explain, for the fifth time, that he had made a mistake by working with the Germans. Looking up he saw Kruel sitting at the end of the table, watching the proceedings silently. Remembering who got everyone into this situation in the first place, the President looked pointedly at the general and spoke up "Maybe our Defense Minister would like to add a few words to the conversation."\n\nKruel nodded, and responded, "I personally think you did the right thing here. What does it matter to these rioters if a few Germans are allowed to set up some organizations? I don't see the big deal." Beside him, Filinto eagerly reaffirmed Kruel statements almost verbatim. Before Edna could fire back a response, a man burst uninvited into the conference room.\n\nThe intruder, introducing himself economist Romeu de Campos Vergal, quickly spoke, "My apologies for the interruption, but we're out of time. The stock market reopens in a hour. We've got to do something before the situation gets any worse or the economy will suffer. Governor Braga has been asking for support and we need to get intervention passed through now, and figure out the long term plan later."\n\nEdna shook her head, "That won't be necessary. If we just set up negotiations with the ringleaders, this whole thing will be over by the end of the month. Let's try and be diplomatic for once. Not every problem has to be a nail." The room looked at Adhemar after Edna finished, silently waiting for the President to give his verdict."
brazil_adhemar.99.a: ""We need to intervene.""
brazil_adhemar.99.b: ""It's time to talk.""

brazil_adhemar.100.t: "Bomb Squad"
brazil_adhemar.100.desc: "Due to some well-placed investments, and a few pulled strings, we have been given legal authority to intervene in the entire south as we see fit. Having been granted wide-ranging powers to arrest and detain insurgents, the authority to shut down violent groups, and expand funding for local police, our government has the power to end this crisis immediately. All the President has left to do is pick a suitable leader for the intervention.\n\nIn his right hand stands economist Romeu de Campos Vergal. Romeu's plan involves using his expertise to dismantle violent German groups, incarcerate radical Nazi agitators, and the expanding of protections of the large minority communities of the region. His plan will supposedly bring lasting peace to the region but will infuriate the German industrialists of the south.\n\nIn his left hand is the Germanophile Luís Gonzaga Novelli Júnior. With the sweeping use of threats, bribery, and coercion against minority communities, Novelli has promised to deliver a south pacified and primed for the rise of German industry. While the economy and treasury may flourish under German investment, his nomination will engender hatred and distrust in the region for years to come.\n\nWith a stroke of a pen, the President must decide the fate of hundreds of thousands of people. Adhemar looks down at his hands. After a moment, he writes a name on the paper."
brazil_adhemar.100.a: "Romeu de Campos Vergal."
brazil_adhemar.100.b: "Luís Gonzaga Novelli Júnior."

brazil_adhemar.101.t: "Interventor Vergal Brings Justice"
brazil_adhemar.101.desc: "As he walked through the sunny main streets of Curitiba, Romeu took a moment to appreciate the fruits of his labor. In a relatively short time, the constant shattering of windows and distant gunshots had been all but eliminated from the city, replaced by a cautious optimism that had spread across the province. He smiled at a rambunctious herd of teenagers that zipped by him, loudly laughing and joking in Polish without fear of German retribution. Walking down a little further, Romeu stepped inside a local cafe, noticing the door's "Recently Reopened" sign with delight.\n\nWhile he waited for his coffee to cool, Romeu looked out the window and saw a squad of federal agents banging on the doors of a local police station. The head officer revealed himself after a moment, seemingly arguing with the officers from before he had opened the door. Romeu's lips curled in distaste as he recognized the officer from the internal reports; a man willing and eager to sell out his Polish constituents for a few reichsmarks. He watched with satisfaction as the kleptocrat's tirade was abruptly halted when one of the agents raised a signed piece of paper up to his face. The officer's shoulders slumped as he meekly offered himself up for arrest, and was escorted to the armored van without another word.\n\nSipping his coffee with a smile, Romeu took out his notebook and began flipping through it. After a few pages, he crossed out the name of the old officer, and wrote the name of a loyal PSP official in its place."
brazil_adhemar.101.a: "Right people in the right places."

brazil_adhemar.102.t: "Interventor Novelli Brings Pragmatism"
brazil_adhemar.102.desc: ""Sir, we just need a little bit more time, and this whole situation will be under control."\n\nNovelli quickly pushed the phone away from his ear as the industrialist responded with a barrage of insults in a heavy German accent. He rolled his eyes and waited for the German to finish his tirade. When the rant finally stopped, Novelli repeated himself once more.\n\n"Sir, trust me, we're doing everything in our power to make sure this situation is resolved in a way that benefits the economic interests of this region. In a few weeks, protests will be eliminated, and you'll have an ultra-cheap workforce ready and waiting for you. You don't want to quit now, believe me."\n\nAfter a moment of silence, the German begrudgingly agreed to stay. Novelli heaped flattery on the man for his wise decision-making, before hanging up the phone with a sigh of relief. Between raids on rioting minority groups, the nonstop obscuration of German activities, and the never-ending phone calls from petulant capitalists, Novelli almost never had a moment to breathe. Taking a moment to lean back, the bureaucrat's brief respite was rudely interrupted by shouting from the street.\n\nAs he glanced out of his window, Novelli chuckled as his officers chased a group of Polish teens away from his office. Leaning over further, he noticed with amusement that the boys had been in the process of spray painting a crude swastika on his front door and had written a number of choice words along his walls. Novelli shrugged as he returned to his seat. If the little people wanted to spend the rest of their lives in the past, who was he to stop them?"
brazil_adhemar.102.a: "Bigger things are in motion."

brazil_adhemar.103.t: "The Way of the Pen"
brazil_adhemar.103.desc: "Adhemar was jolted awake as his car braked to a stop in front of the central courthouse of Curitiba. Situated in what was considered a relatively neutral neighborhood, the courthouse was agreed on as an ideal meeting place by both the minorities and the Germans. Thanking his driver, Adhemar took a moment to survey the desolate surroundings as he exited the car. He stared at the shattered glass that lined the sidewalks and streets, before distant gunshots spurred him to seek the safety of the courthouse.\n\nUpon being ushered into a private conference room, the President noticed a folder at his seat and began to flip through it. Inside was a detailed dossier of the two ringleaders he was set to meet with. The representative of the minority groups was a Polish Jew who was supposedly key in organizing the new minority militias. From the German quarter was a prominent agitator of the region, a grizzled old man that looked like he had just stepped off a boat from the eastern front. Adhemar frowned as he read the reports, left wondering how he would ever convince the two men to reconcile.\n\nA moment later, a phone rang in the corner of the room. Picking it up, Adhemar frowned as he heard the voice on the other end. "Good afternoon, Mr. President," Governor Ney Braga said, "My apologies if I'm interrupting anything, but I believe I can be of assistance. Having someone familiar with the region would make your negotiations go much smoother, I think. Luckily, my schedule is free this afternoon, and I would be happy to provide my insight for the discussion." Adhemar's frown deepened. Even though Braga was a member of the UDN, his support could be invaluable in resolving the conflict peacefully. After a moment, he made his response."
brazil_adhemar.103.a: ""I could use your help.""
brazil_adhemar.103.b: ""I'll be fine, thank you.""

brazil_adhemar.104.t: "Just the Man for the Occasion"
brazil_adhemar.104.desc: ""You come into OUR neighborhoods after lording over us all the time and expect to be treated any differently? Why, we ought to throw you out ourselves, Untermenschen!"\n\nAdhemar felt the temperature of the room drop as Lerner drew back in shock. The Jewish representative looked less angry at the German than he did tired. He shook his head. "I have heard this many times. Your people are constantly saying these things to us. We have done nothing, and you come after us anyway, both in Poland and now in Brazil. I have seen it happen so many times."\n\nThis kind of blunt discourse would get them nowhere. But just as Adhemar was about to speak up, Ney Braga decided to cut in first. "Have either of you ever been to Iguazu Falls?" he asked, quizzically. They both looked confused, before nodding. "It's beautiful, no? The way the water looks like a shower of diamonds in the sunlight."\n\nWhat in God's name was he talking about? But before he could ask, Braga continued. "Those falls have been around longer than Brazil has been a country. Perhaps it will still be here long after. But at the end of the day, we have all seen them. We all live on the same land. Why bother attacking each other?" The pair looked unconvinced. Braga shook his head. "I am not saying your people must like each other. You may believe whatever you wish to believe. But violence will accomplish nothing. What say you, gentlemen? To harmony?"\n\nBraga extended his hands. Lerner and the German looked uneasily at each other before they took it, shaking it awkwardly for a second. And at this vaguely baffling show of peacemaking, Adhemar couldn't help but feel less than presidential. As they broke the handshake, he cleared his throat. "We are being exceptionally lenient here. See to it that this does not happen again.""
brazil_adhemar.104.a: "Ney Braga would be known as the man who ended the crisis."

brazil_adhemar.105.t: "Deaf Ears"
brazil_adhemar.105.desc: "Adhemar nursed the increasing throbbing sensation that was making itself known in his head as the German and the Jew bickered with each other. It felt like they had been at it for hours. Why had he decided to go into this alone? He was a diplomatic genius, of course, but there was so much any sane man could take before snapping - and that was the stage he was rapidly approaching.\n\nUpon hearing the word 'Untermenschen' being dropped, he lost his patience. These talks would fail if he did not say something soon. "Look, gentlemen, with all due respect," he said, resisting the urge to light up a cigarette then and there. What you're both fighting over at the end of the day is a matter of funding. Now I am willing to give that funding to both of your communities, but in return I must insist on an end to this violence. Surely, we can agree?"\n\nThe two men looked at him gobsmacked. The Jew - Lerner, his name was - blinked. "Mr. President..." he said slowly. "This is a matter of my community's safety and our right to exist freely and without fear. It is not something that can be bought. Frankly, I find it insulting that you would assume so little of my moral character that I would take such an offer."\n\nAnd then, the most enraging thing happened. The German - the German, of all people - had the nerve to look at the Jew, and nod in agreement. This was rich. The only time they could find common ground would be in screwing him over, wouldn't it? Adhemar could not abide by this. He simply got up, left the room, and lit up a cigarette. Fine. If they were unwilling to listen to reason, then he would speak to them in a language both German and Jew could understand."
brazil_adhemar.105.a: "Force."

brazil_adhemar.106.t: "With a Bang"
brazil_adhemar.106.desc: "Médici took a slow drag from his cigar as he looked down at the map of the Paraná province in front of him, finally satisfied with his grand strategy. The small figurines and tokens he had thoughtfully spent the best part of an hour pushing back and forth represented the distribution of military units, supplies, armaments, and all other kinds of more technical equipment. And when it all came together, it spelled the end of the ethnic tension that had been plaguing the province for far too long.\n\nHe glanced at Adhemar, noticing the stormy expression on the man's face. Clearly this was personal. "Why, I do believe that this is it, Mr. President," he said, nodding towards the other man. "You give me the resources I ask for, and I will see to it that this rebellion is crushed."\n\nAdhemar did not enjoy the thought of giving the military even an inch. But Médici, at least, had already proven himself loyal enough to avoid taking a mile. And besides, since the involved groups had already proven themselves far too pigheaded to negotiate like adults, this was the only way to solve this unrest once and for all. He nodded. "Just get it done, General Médici. The sooner this is over the better."\n\nMédici chuckled, and they shook hands. Mere days later, entire protests would be reduced to smoldering ashes and ruined picket signs. Jew, German, Pole, and Ukrainian alike would run from the soldiers as it became very clear that the government had lost its patience. Some in the international community would decry this day as a senseless show of oppression, whereas others would merely bemoan the economic cost of it. But as Adhemar de Barros returned to the Plantaldo Palace that night, he could sleep knowing one thing."
brazil_adhemar.106.a: "Stability had finally been restored."

brazil_adhemar.107.t: "Kruel's Rebellion"
brazil_adhemar.107.desc: "Adhemar used all his skills as a doctor to keep his blood pressure from bursting his veins as his eyes stopped dancing over the trembling report on his hand. His ex-War Minister Amaury Kruel had gone AWOL, followed by God knows how many of his hardliners sycophants. How did this happen? Adhemar could swear to God he made sure Kruel had lost all his influence after being promptly sacked. And his instincts and experiences from 1932 could tell this only meant one thing: a military revolt.\n\nNot much later, Adhemar could already see from his window the army of soldiers and tanks in readiness forming a defensive perimeter at the Planalto Central; and not a few miles further, around the entire capital, just as he had ordered Médici to do so. But what if this was not enough? What if Kruel managed to sway more men than he thought? What if Médici - a Hardliner himself - ended up turning to Kruel's side? Adhemar's head was relentlessly pounded with these and a thousand other questions.\n\nAt nightfall, with the soldiers still standing by and no news about Kruel's whereabouts, Adhemar picked up the nearest telephone. "Natel, can you hear me? Is anyone nearby? No? Good. You should already be aware of Kruel's 'situation' right? The press must not hear a single word of this, this must be kept under complete secrecy from anyone outside the Planalto until this matter is resolved."\n\n"And how the hell am I supposed to do this?" Natel replied. "Simply asking the media to not leak it will just give them more reason to do it anyway."\n\nAdhemar turned silent with this sudden display of reason. "How? By not making them leak it! Give whatever bullshit or drama in the PSP you can find to call their attention. Globo, Folha de São Paulo, everyone! Just make sure not a single periodical has 'Kruel' on their headlines.""
brazil_adhemar.107.a: ""U-understood Mr. President.""

brazil_adhemar.108.t: "The Godfather"
brazil_adhemar.108.desc: "The sun was already setting and Goulart still hadn't taken the phone from his ear. Ever since he learned about what happened to Kruel, he has spent the past days desperately trying to call him in every possible way. Even though everyone said it was useless, Goulart knew Kruel, and he knew he wouldn't refuse a request from his friend.\n\nGoulart raised his head as soon as he heard the call sound turn static. "Amaury? Is that you? Oh Jesus thank God!" His eyes began to glimmer for the first time in days. "Listen, you have to stop this madness! This will only cause harm to the country and everyone involved and you will gain nothing from it!"\n\nSilence. But Goulart didn't give up.\n\n"I know you have your reasons for doing this, and I know I'm too far to stop you from doing it. But if you are really going to do this, please, respect the democratic institutions and the line of succession; Edna is not like Adhemar, you can have my word. I'm not asking this for the sake of our friendship or-" his tongue failed him for a second "-or for your godson who is my son! I'm asking for it for Brazil! So please, just listen to me, or everything we have done for our country in these years will be in vain!"\n\nSilence again. Goulart's head was already buried in the table, his eyes firmly shut, almost giving up on everything.\n\n"João," A familiar voice cracked up from the trembling phone. "I am a patriot, and I cannot go back with my promise." Goulart's eyes had opened up. "But, I am also your friend, and therefore, I shall respect your wishes." Goulart's eyes slowly recovered its glimmer, as a faint smile crossed his face.\n\n"Thank you, my friend.""
brazil_adhemar.108.a: "The telephone turned silent, leaving Goulart alone again in the dark room."

brazil_adhemar.109.t: "The Kingmakers"
brazil_adhemar.109.desc: ""So, did you get that shitty radio working or not?" asked the marine impatiently, who had lost count of how many poker games he had played in the day while the cavalryman continued to fight with the only functional radio in the military base.\n\n"Why don't you try it yourself if you think it's so easy?" replied the cavalryman "Hell! It's easier to find an Argentinian spy hiding in those bushes than getting a stable frequency in this end of the world. But before it went static I heard some chatter about units going into radio silence for some reason and troops near the capital being set on high alert. Looks like something big is happening back in Brasília." He stopped for a moment to reason his thoughts "A coup? If that's the case, then that fat Paulista's days are numbered."\n\n"I don't doubt," spoke the infantryman. "It was about time for the armed forces to shake some things up. Though I doubt it will succeed. The army is not the same from years ago, and that man is good with talks, he will find his way out, in one way or another."\n\n"Well, can't say I feel bad for him. That's what you get for being too friendly with the fucking krauts," said the marine, masking his glee as he pushed his coins while holding a Straight on his other hand. "But it's a shame Rio Grande do Sul is too far from Brasília, better some action than spending the entire day with my ass stuck in a chair."\n\n"Still, it's not like we are going to make any difference. It is up to our superiors to decide how this drama ends, not us, as it always has been. Unless that man still has some trick up his sleeve, we can always have a nice talk to settle our 'disagreements'." Before the infantryman continued, he reveals a Full House on his hand, much to the marine's shock. "But if he is going to continue playing hard and betting his lucky too high - as you did - then well,""
brazil_adhemar.109.a: "It will not be for lack of warning."

brazil_adhemar.110.t: "The 67th Guanabara Revolt"
brazil_adhemar.110.desc: "Beneath the bustling streets of Guanabara centuries of history are hidden. It is the same dry asphalt where thousands of feet walk over it every day that witnessed the columns of men proudly boasting their military uniform as they marched to challenge their masters. With few having their story narrated by teachers with pride, and many others being completely forgotten, with only the mute streets to tell their tragic tale. Adhemar was hoping for the latter, but he underestimated the strength of the rebels. With a sigh, he finally spoke: "Are you really sure this is true, Natel? Or is it just a false flag report to get me on my nerves?"\n\nAfter taking more time than he should, Natel replied: "I-I'm afraid not Mr. President. I've just received the reports. A good number of officers in the city had either joined the uprising or surrendered without a fight. And there are already full pictures of soldiers hanging out by the roads and not doing anything, like if the city is under martial law." Adhemar buried his face in his hand. First Kruel going rogue, and now this. The next day there will be columns of tanks marching over Brasília. Feeling his boss' frustration transmitting over the cable, Natel spoke again: "But uh, there is no sign of barricades being raised in the streets yet. So it could have been worse."\n\n"If they didn't do it today, they surely will tomorrow the longer this mess lasts." Adhemar retorted. "Where are our men? Where is Olímpio? I don't remember sending him on an extended vacation in the Caribbean."\n\nNatel swallowed hard before answering. "He is unavailable for now. Went to Minas Gerais for troop inspection."\n\nA hollow spat escapes from Adhemar's mouth. "Oh is that so? Sounds like the perfect excuse to not be in trouble for a coup but to help it by doing nothing." He leans back on his chair, exhaling his fury before his composure goes with it."
brazil_adhemar.110.a: ""Call all the high rank officers available - those we can trust - I want them in my office immediately!""

brazil_adhemar.111.t: "Smooth Sailing"
brazil_adhemar.111.desc: "Despite demonstrating they would fight to the bitter end, the rebels were quick to surrender when it was clear that their small initiative had failed. Private Vieira, rifle in hand, monitored the last rebels walking in Indian file as they left the last rebel base. Familiar faces passed by with arms extended upwards as they were quickly searched before being led to an army truck. Vieira didn't feel sorry for them, but he still couldn't understand: what was that for? Causing all that uproar just to end like this? It seemed he would never know; lest he wanted to join them.\n\nBut the defeat of one is the victory of another; and Adhemar was more than happy in being the latter. "Any news about the rebellion in Guanabara? Was it put down?"\n\n"Precisely so Mr. President!" Natel replied confidently. "Apparently Kruel couldn't sway most of the officers to his side, and Olímpio's men were quick to quell the rebels." Adhemar couldn't remember the last time he felt such relief, it felt that the weight of the entire country had been lifted off his shoulders. "Oh and one more thing, we managed to prevent this whole incident from being leaked in the press; even the local newspapers in Guanabara were silent about it. So one less thing to worry about."\n\nAdhemar's smile grew wider, now touching both of his ears. "Splendid Natel, great work as always. Don't forget to reward Olímpio for his efforts, thanks to him Kruel's little revolt will eventually collapse if it didn't already."\n\nAfter plucking down the phone, Adhemar leaned back on his chair, a satisfied smirk stamped on his face. It wouldn't be long until that bastard came back with the tail between his legs begging for forgiveness. But until that happens, Kruel and his cronies were still a threat. But at least he could now sleep in absolute peace knowing the rest will be smooth sailing from here."
brazil_adhemar.111.a: "The storm ended as quickly as it started."

brazil_adhemar.112.t: "Kruel's Disaster"
brazil_adhemar.112.desc: "Kruel had miscalculated. Over the radio, Adhemar announced an amnesty for everyone involved in the rebellion, except, of course, the traitorous General Amaury Kruel. That same general spent the rest of the morning getting hung up on over and over again.\n\nThe stale aroma of his Belle Époque mansion suffocated him. No breeze, no respite. High noon was approaching, but he kept his ornate drapes closed as if prying eyes were still out there. Sweat dripped down from the Milbon pomade of his hair as he paced around his room. Maybe he could have gone into hiding if he still had some friends, but no. There was simply nobody who would answer his calls.\n\nWell, one person might.\n\nHe called a special number. Despite everything, Kruel should still have the negotiating chops to explain a few things, show that he's really no threat anymore, and possibly get away with a house arrest. His Excellency was a talker, right? Surely he'd listen.\n\n"Surrender or we will shoot you," Adhemar said before hanging up.\n\nAt noon, the federal police arrived without a hint of fanfare; they rang the doorbell. As Kruel went to greet them, he saw his garden wilting under the hot sun. He didn't have the money to maintain it these past few weeks. Rebellions weren't cheap. Bribes were expensive, and it didn't help that the President shuttered his farm, fired him from his job, and froze his bank assets.\n\nOfficers were already exploring the premises, scouting out every entrance and exit. At the door, Kruel looked over the warrant like it was a delivery receipt, a simple memo that, for all its legalese and polite authority, told him only one thing."
brazil_adhemar.112.a: "His footnote in history was over."

brazil_adhemar.113.t: "Kruel's Demands"
brazil_adhemar.113.desc: ""Since when did you care about German-Brazilian equality?"\n\n"I've always stood up for them. We treat them like second-class citizens!" Kruel's smile advertised how hollow that sentiment was. Something in the air of the Copacabana Hotel meeting room mollified the tension. Weeks of petty squabbling tired the two, and even Kruel's "friends" opted to lounge on the beach. They'd still coup if things go awry, but the time for intimidation was over. It was a stalemate.\n\n"And since when was your brother interested in politics?"\n\n"I can assure you, his military experience is beyond reproach, well-suited to be the defense minister." That was dumber than his previous demand, but at least it was the worst his hardball offer went.\n\n"And money?"\n\n"Yes, money."\n\nFinally, something he could work with. "Okay, how's this? I give you the money, Médici becomes the defense minister—you know him, very efficient—and, to sweeten the deal, you get a nice and pleasant house arrest." Adhemar can't help but sound playful, even with the idea of democracy at stake. Kruel was just a man. Find out what a man wants and you can gain control.\n\n"If that's not to your taste, there's a one-way ticket to Ilha Grande with your name on it."\n\nDespite the President's naked threat, Kruel leaned back in his elegant Art Deco chair and stroked his chin thoughtfully, like he was pondering vacation destinations."
brazil_adhemar.113.a: ""Can I choose which of my homes to stay in?""

brazil_adhemar.114.t: "Kruel's Capitulation"
brazil_adhemar.114.desc: "In the half-lit silence of Amaury Kruel's aging Belle Époque manor, the humid and terrible breeze slipped from beneath the deep shade of palm trees, through the ornate balcony, and past a parade of rusting military memorabilia, to cradle Kruel in a warm sweltering daydream. Reclining on his throne of gilded upholstery, the edges of his consciousness wavered.\n\nVisions swirled before him. Donning the proud green general's tunic he could no longer wear, he gazed at the sun-drenched Bahia sky that stretched out on the endless carpet of verdant plantation, his workers laboring, distant and featureless.\n\nThen, the rev of an engine. One day soon, he'd savor the rumble of the pistons, racing down the BR-116 in his new Mercedes W111, even if, in the meantime, it would stay sequestered in his estate, gathering dust on its opulent exterior as the rest of the world forgets it existed. Amidst this melancholy tableau, his gaze wandered out the window.\n\nFar beyond his premises, it was as if he could see Médici, somehow still filled with purpose, entering the ipe door to the Defense Minister's office, history now at his fingertips.\n\nStepping in, Médici listened to the sterile hum of the Matsushita HVAC unit that blew cool, crisp air into the small geometrically austere space. A large jacaranda desk stood in the middle, stripped of any trace of the previous tenant on its smooth surface.\n\nTomorrow could wait, but Médici wouldn't. Opening his suitcase, he set down his only personal item: a bronze statuette of a faceless footballer. Next, a thick folder, full of profiles of every hardliner that threatened the government. Kruel was off bathing in his fortune but ousting the others was not an option. With Médici in charge though, he would make sure they obey."
brazil_adhemar.114.a: "Cleaning up after a crisis was no easy feat."

brazil_adhemar.115.t: "Kruel's Ultimatum"
brazil_adhemar.115.desc: ""I want my job back, Your Excellency!" Kruel's voice echoed as he strutted through the Planalto's marbled halls. He came alone, but no guards stopped him. Kruel poked his head into the President's office. "And I want everyone who wanted me out to get what they deserve."\n\nAdhemar wrangled his hyperventilation. Out the window, a convoy of armored vehicles waited in the swaying hot air, taunting him to say the right words in the right way, just as he always did. "Yes, purge half the administration. Encourage hundreds of others like you to do their own rebellions." Adhemar flashed his iconic grin, sweat dripping down his neck. Despite the stakes, acting guarded would only worsen things. "If I do that, neither of us will keep our jobs for long."\n\nKruel smiled as he sat down. "Why, you make so much sense! What should we do then?" Bastard didn't even have any real demands. His plan was to pass the ball to Adhemar's court and see what magic gifts the President could conjure up.\n\n"Here's what I think." Adhemar's body coursed with adrenaline. The world around him seemed to fall away, as his eyes scanned the tiniest reactions in Kruel's expression.\n\n"Médici's the right man for the job. The nation respects him. The troops respect him." Surely, even Kruel respected him.\n\n"I'll promote your friends in the army." That's what this was all about, wasn't it? Influence? Power? Kruel can have it, this time without destabilizing the whole country.\n\n"And, I'll get you a nice house in Uruguay." A way out that would allow him to keep his dignity and avoid repercussions. Adhemar watched as Kruel pondered the counteroffer. Was it good enough? Oh right. The Germans will love this last bit."
brazil_adhemar.115.a: ""And money. Lots of money.""

brazil_adhemar.116.t: "Adhemar, the President of Cowards"
brazil_adhemar.116.desc: "Pins and needles danced under Adhemar's rolled-up sleeves as he wrote piles of messages to newspapers that all parroted the same things. The "coup" was an internal disagreement they settled amicably. Kruel retired comfortably after decades of proud service. For those still unconvinced, a small gift awaited them.\n\nNot riveting work. After hours of this, perhaps it was time for something he was more accustomed to: authorization letters for bribe funding. Médici's should be first; the man liked to start tasks early. Adhemar labeled a file "National Security" and allocated a generous sum, surely more than enough now that Kruel was dealt with.\n\nTwo thousand kilometers away, Laudo was dealing with Kruel. He watched as the translator struggled to translate the real estate agent's insistence on the house's "ephemeral balance of modernity and timelessness," while Kruel and his wife gazed at Punta del Este's well-marketed view of the South Atlantic. At least they were facing the opposite direction of Brazil, but who knew how long that'd last.\n\nHe let out a pained sigh. Médici stared at the intricate plaster on the ceiling of his new office in the Esplanada dos Ministérios, just back from a gauntlet of speeches that all parroted the same things. The "coup" was an internal disagreement they settled amicably. Kruel retired comfortably after decades of proud service. For those still unconvinced, a small gift awaited them.\n\nConsoling himself with the little bronze footballer on his desk, Médici mulled over his meticulously ranked list of military men who might have been close to Kruel, mapping them by influence and priority. Now, he had to examine each of these officers and decide if they needed lump sums or incremental incentives, if they preferred hard cash, honors, or post-retirement jobs. He scoffed at the budget Adhemar gave him, far from enough for the herculean task ahead."
brazil_adhemar.116.a: "But if anyone could do it, it'd be Médici."

brazil_adhemar.117.t: "Edna's Parcel"
brazil_adhemar.117.desc: "Through the large casement window behind Edna Lott, it was already late enough that the Vice President's garden melted into night, illuminated only by a few lanterns. Yet, her workload still kept her up; when she heard a knock on the door, she expected to stay up a few extra hours. "Come in!" Edna said. Opening the door, an aide carried a small package. "Oh, what's that?"\n\n"A parcel. I'm sorry, we couldn't figure out who left this with us. It simply appeared by the doorstep." The aide placed the parcel on her desk, bowed, then left. A slight tremble overcame her. Something about this package seemed important. There would be no turning back once she opened it.\n\nWhat she discovered inside was the power to change Brazilian history: monochrome pictures of Brazilian officials meeting with Nazis. Financial ledgers of illegal deals between Adhemar and Germany. Telegrams and transcriptions of meetings with Abs and Kirk. Under these documents, a large collection of audiotapes were neatly stacked against each other. Who could have done all this? Who in Brazil would have the ability to acquire all this? Or...\n\nThis won't do. Not now. Not with elections so soon. She's not an idiot. If people think the PTB is dealing with America under the table, she can only imagine the instability, the protests, the sneers of betrayal from her party members, the-\n\nA rustle of foliage outside the window.\n\nWas it windy? Perhaps it might rain tonight. Anyway, she had to think. If all this was genuine, this could change things. Repacking the items, she opened a hidden safe in the floor, placing the parcel beside letters from her youth. Perhaps she'd get friends to help analyze what she has. Then, if it truly is real evidence, she'd just have to see this coming election through before she can take action."
brazil_adhemar.117.a: "Father never rushed his battles, did he?"

brazil_adhemar.118.t: "Laudo's Parcel"
brazil_adhemar.118.desc: ""Can't you go any faster!? This presidential business simply cannot be any more urgent," Laudo yelled, glancing anxiously at his Junghans watch as he juggled a jumble of blurry photos and documents spread out on an old leather briefcase across his lap, each one containing decoded messages, secret meetings, and details for potential military action. Down the avenues of Brasília they went, weaving through traffic, conducting a symphony of horns and sudden brakes, angering motorists, frightening pedestrians, and surprising traffic cops.\n\n"Sir, I'm sorry but we're going as fast as we can!" The driver, sweat dripping down his salt-and-pepper hair, always thought he was lucky to have Laudo Natel as his assigned VIP. Never did he think he'd have his life flash before his eyes again and again as he swerved into the oncoming lane to pass a stalled truck on the way to the Planalto. They were almost there at least.\n\n"We will protect you from any trouble you might get into with the Polícia Federal, but if we do not reach His Excellency right this instant, you and I and anyone who can possibly help you are screwed." In all the evidence laid out before Laudo, he saw people he thought he knew, thought he trusted. Ministers, generals, senior advisors, but one person was in all of them, one person who had to be pulling the strings from the shadows.\n\n"We're here!"\n\nBut while the driver could breathe at last, Laudo was about to sprint for his life. Out the polished car doors, dashing through the manicured gardens, into the lobby where he screamed, "I'm going to see the President," without even looking at the receptionist, up the marble-clad stairs, and slamming the door open to the most powerful office in the country, startling Adhemar from his work, to utter what might be the most important words of his career thus far."
brazil_adhemar.118.a: ""Edna Lott is planning a coup!""

brazil_adhemar.119.t: "Adhemar's Choice"
brazil_adhemar.119.desc: ""What are you doing!?" Adhemar yelled. Laudo Natel tipped over a potted burahem all over the polished jacarandá floor. He stuck his hands right into the dirt, ripping off roots, until he uncovered...\n\n"Look." In his hands, a miniature reel-to-reel tape recorder. He handed it to Adhemar who examined it closely, tilting it this way and that under the soft glow of the room light. "Sir, please hold this."\n\nBefore Adhemar could comprehend what was happening, Laudo had already taken the portrait of Washington Luís, with his ever-stern gaze, off the wall and gave it to Adhemar who had to put the recorder aside. The painting was a heavy and large thing but peeking over the frame, Adhemar could see an intricate web of wires and bug transmitters on the wall behind it.\n\nAs Adhemar set the portrait down by the closed curtains, Laudo walked over to the visitor's table and unpacked his envelope. "I didn't search the office long and I already found two bugs. This room must be brimming with spy equipment. Not many have this much power to get past our security." Laying out what he received, Laudo picked up one particular picture and showed it to Adhemar: Edna meeting with people he didn't recognize.\n\nAdhemar took a seat and sifted through all the photographs and memos. So many faces he thought he could trust, so many documents marked with FBI seals, so many names mentioned in the transcripts. This was a gold mine of evidence. Perhaps too much evidence.\n\n"We need her out of office." Laudo ran a hand through his hair, wiping the sweat off his forehead. But, Adhemar's reaction couldn't be any more different. A million thoughts raced through his mind, a million different opportunities. Did it matter if these were fake or not? Hadn't they wished Edna out of office the moment she stepped in?"
brazil_adhemar.119.a: "Perhaps "too much evidence" was exactly what he needed?"

brazil_adhemar.120.t: "Uniting the Hydra"
brazil_adhemar.120.desc: "Not much time had passed since Laudo had stormed into the President's office, but he was already making calls to every newspaper the PSP had its hands on. It was almost evening; the golden hour to strike back. This would be "a big one," he'd say.\n\nNot long after, journalists lined up outside the Chief of Staff's office, their chatter echoing through the modernist halls as he showed each of them the year's biggest scoop.\n\nLooking out his window at the hurried cars of reporters coming and going, Adhemar called Filinto Müller and set into motion the key strategy of his plan. The PSP will not pull this off alone. There was a snake in their midst. This was a matter of grave importance to the security of the entire country.\n\nHe recited to Filinto a list of every person in the PSD and UDN who might be interested, writing next to them calculations of how much it would need to convince them, as well as details of what ways they preferred to receive their money. Well, most of them. Some didn't need to be paid off, Adhemar guessed. After all, there was the threat of foreign infiltration; what fool wouldn't do everything they could to defend the integrity of the nation?\n\nIt took Filinto a few seconds to take it all in, but without missing a beat, he was off to unite the hydra of Brazilian politics. Perhaps his party may feel a hit in the polls for allowing the government to be infiltrated, or it may be praised for freeing Brazil from American influence; that will depend on their actions in the future.\n\nBut it will undoubtedly weaken a major opposition party and remove a stubborn thorn in his side. Never before has such a perfect opportunity simply fallen into his hands."
brazil_adhemar.120.a: "Surely, no one can save Edna now."
brazil_edna_impeachment_activated: "We now have the ability to launch a surprise rapid impeachment attempt against Vice President Lott. We should proceed with caution as victory is not guaranteed and our move here could end in disaster."
brazil_edna_impeachment_begin: "We will begin Impeachment Proceedings against Vice President Lott."
BRA_adhemaredna_remove_edna: "Impeach Vice President Lott"
BRA_adhemaredna_remove_edna_timer: "Time Remaining for Impeachment"
brazil_edna_impeachment_timer: "If we do not seize our opportunity now, we will lose the chance to remove the viper in our administration."

brazil_adhemar.121.t: "Mercy of a Bull"
brazil_adhemar.121.desc: "Adhemar was preparing his coffee, black and bitter as usual. Looking out his window, he noticed a man with a briefcase approaching the Presidential Palace. It was Natel, and Adhemar knew exactly what the minister was going to talk about, after all how couldn't he? It was all the rage in Brasília this week, would he or would he not allow an impeachment of Edna?\n\n"Come in Laudo, let's get this over with."\n\nNatel opened the door and sat at one of the many chairs of the President's office. "Adhemar, do you think we should do it?" The Bull closed the blinds of the office, he didn't want anyone to know this before he could publicly announce it. "If we were to weigh in with the full weight of the evidence we possessed..." Natel popped open his briefcase to display the reams of photos and documents tying Edna to the US coup plot. The smell of his coffee filled the room and tensions were high. His choice could change Brazil.\n\n"I believe we shouldn't." The look on Natel's face was of shock, after all, didn't Adhemar think that changing an opposition VP for one of his own party would be better? "I know what you're thinking, but right now is not the correct time. We're in the middle of a Senate election and doing this would be catastrophic for us, it would give the PTB a cause to rally behind!" Adhemar looked at a photo of his inauguration on his desk, both him and Edna were present.\n\n"Edna, she's a complicated person, but she has been useful. I believe we should keep her." Natel's shock had disappeared, now he was more understanding. Adhemar knew what was better for our nation, and maybe keeping her around was truly a better option. "But keep that evidence too. Just in case.""
brazil_adhemar.121.a: "A choice for good."

brazil_adhemar.122.t: "Edna Impeached"
brazil_adhemar.122.desc: "On the drive to Rio, Edna hoped that when the papers went out, they would see her head had always held high. With luck, historians will write that the first elected female Vice President of Brazil was impeached without constitutional reason, that this was just the beginning of a coup that indiscriminately beat back any political organization, progressive and democratic.\n\nBut Lott just had to look back at Sodom. Turning back, she saw both Brasília drifting away one streetlight at a time and the reflection of the dumbest woman she'd ever seen. Commentators will moan about how she doomed the left, and women and girls will remember her a fool. She just wanted to do what all the men did: act tough and make big plays. Didn't she have one big play left? It didn't have to be over.\n\nThen she laughed. At the desperation written on her face in the glass. What she did in the Senate, she did out of dignity, and this wasn't dignity. Politics really wasn't worth transforming into whatever that was. The evidence will stay safe, but for now, she's done. Jango, Leonel, and Tancredo will have to deal with the mess she's left behind.\n\nAnd what a mess she's left behind. Back on the steps of the National Congress, amid the ocean of people streaming out, Pessepistas began to cheer as the President and his entourage drove up. Suddenly, camera shutters erupted as the car's roof opened, and out came the Chief of Staff, brimming with uncharacteristic energy and glowing in the flashing lights.\n\nAt that moment, Laudo Natel shouted the words that forever changed his career, the PSP, and the Fourth Republic, and ensured that it was not Edna's composed veneer, but the image of Laudo bursting through the presidential limousine's sunroof, his hands raised in a victory pose, and grinning like a boy, while Adhemar chuckled in the window below, that would be printed in history books for decades to come."
brazil_adhemar.122.a: ""Edna is gone!""

brazil_adhemar.123.t: "Edna Survives"
brazil_adhemar.123.desc: ""Merda!" Adhemar's heart stopped at his radio's announcement. The past weeks rewound through his memory, the crowds of senators who refused to be oppressed by foreigners, the look of disbelief on everybody's face when they saw those pictures that could very well still be real! Was it the bribes? Did he miscalculate? Why did he decide to be so stingy?\n\nWait, what if it was the Americans themselves? No amount of money could outbribe the USA. Adhemar stepped outside of himself; he was shaking in the middle of his room, the curtains open, the portrait of Washington Luís still with his stern stare. Hadn't he seen the proof himself? Was Edna meeting them now? Were they watching him, laughing at him pacing around like an old lunatic? Was that them knocking!? "Ah!"\n\n"I feel the same way, sir. We need to do something." Oh, it was Laudo. He opened the door, hair just as disheveled. "What's our next step?" For a few seconds, Laudo's fearless, almost foolhardy demeanor and the look in his eyes transported Adhemar back thirty-six years, and the cavalry charges, the artillery shells, and the feeling of shooting establishment bastards up the nose came flooding back. What was he doing urinating himself in a corner? Was it not the perfect time of year for a Paulista to shake Brazil up again?\n\n"We have until October." Adhemar marched to his desk. If they lost even a moment, they might lose momentum, and their enemies were already ahead. "By then, we should have mobilized all our forces, a total campaign in every region. After what happened, the PTB won't cooperate with us. They'll fight us for every vote, and we'll have to fight back. Order everyone in our party to begin preparing immediately. And start allocating funds, lots of funds." He sat in his executive chair; there was much to do. "But first, call Filinto.""
brazil_adhemar.123.a: ""Tell him we're going to war.""

brazil_adhemar.124.t: "The Gladiatrix"
brazil_adhemar.124.desc: "Edna Lott entered the arena, taking off her kid leather gloves, approaching where the Senate President gestured to prove her valor. The senators tried to maintain their stoicism, but they knew they were soon to witness the night of their lives. Cameras watched from the mezzanine where guards restrained the clamoring crowds. Reaching the podium, looking upon the masses, she proclaimed: "Nothing you have heard about me today is true."\n\nAny pretense of polite procedure vanished into pandemonium. They laughed. They whistled. They jeered. They screamed. The Pessepistas, the Pessedistas, and the Udenistas all demanded blood. Very well; Edna shall deliver.\n\n"I will not waste anyone's time." Back straight, head held high, Edna invoked the spirit of the dignified soldier, the image of her father, as she spoke: "I am innocent. I have done nothing but serve this country. This bill cannot pass this Senate because it is based solely on lies." A tiny smirk, almost imperceptible. "If it passes, I will save the Chamber of Deputies the trouble and resign."\n\nAnd the crowd went wild. The gall, the sheer arrogance of this woman. Someone so demure and refined just taunted the entire political system. Everyone, from the rioting congressmen, to chuckling Adhemar and speechless Laudo in the Planalto, to every citizen listening to their radios or watching their televisions, were on the edge of their seats, intoxicated by the promise of a good fight.\n\nExcept for one. Around a thousand kilometers away, accompanied by the yammering of Rede Globo anchors regarding the epic proportions of this historic showdown, atop his mid-century apartment, and through the fuzz of his RCA Victor screen, the depravity was making the blood of Carlos Lacerda boil. He did not like this."
brazil_adhemar.124.a: "Not one bit."

brazil_adhemar.125.t: "The Crow Veers"
brazil_adhemar.125.desc: ""Isn't it absurd? Lord's got a sense of humour, He has. Last decade the PTB were my worst enemies. Today, I tear the goddamn playbook up and set it on fire," Lacerda murmured as a rueful look crossed his face. Then he stood up, schooling his features. "It's time" he said to his staffers as he walked into the room. The Room was full of media contacts, Udenists, anyone the name of Carlos Lacerda proved sufficient to attract. Near the rear sat Samuel Wainer, with cynicism clear on his face. But that face would go from sardonic amusement to near-gibbering shock, and from there to a begrudging acceptance as the ex Governor of Guanabara began to make his case:\n\n"The impeachment of Vice-President Edna Marília Lott de Moraes Costa is predicated on falsehoods. The President of Brazil, Adhemar de Barros, respects neither democracy nor the traditions of our Republic. He wants to remove all need for cooperation. Accordingly I, Carlos Lacerda, declare my opposition to this attempt to usurp the legitimately elected Vice President of the Republic. Any citizens of the Republic that love their families, are loyal to their God, or are devoted to our liberties will join me. Brazil demands nothing less."\n\nThe speech wound on but its stemwinding effect was clear. It would save Edna no small amount of trouble with the UDN, Lacerda knew. Wainer came by after the conference was over. He sounded almost forced, but his gratitude was sincere. Lacerda's response came readily: "See here, Wainer, I'm just doing my job: the enemy of my enemy is not my enemy. Any Varguist that sees Adhemar's sycophancy to Nazi genocidaires and objects has his head screwed on right." Wainer noticed that Lacerda was deliberately avoiding the term "Getulist" of which he was so fond and nodded.\n\n"We give that traitor a real fight, together, Varguists and Udenists. He'll lose even if he wins—and when he goes away we can go right back to how it was." Wainer agreed."
brazil_adhemar.125.a: "I can appreciate the sound of that, Governor."

brazil_adhemar.126.t: "Edna Spared"
brazil_adhemar.126.desc: "In a quaint corner of the Central Market of Macapá, cordoned off from the bustling crowds by presidential aides, a waitress served Adhemar a plate of moqueca. The community engagement dinner to discuss infrastructure in Amapá was starting in ten or so minutes, but Adhemar wanted to take the time to enjoy the cuisine here before he had to do business.\n\nEdna seemed preoccupied anyway, and as he wondered where she was, he heard her from the door. She was speaking to people crowded around the entrance, as the guests who were supposed to be at this event squeezed their way through. Was she... impromptu campaigning?\n\n"Edna's planning a coup, for God's sake. Are you sure you want to eat that?" Laudo Natel hissed in Adhemar's ear, almost making him spill his broth over himself.\n\n"Wh-where did you come from? And are you seriously suggesting she poisoned my food!?" Adhemar said in a choked voice, attracting a few glances despite his best efforts to keep himself quiet. "You don't know she's planning anything. We have no clue where those files came from. And we're in public! Can you keep it down when it comes to confidential matters like this?"\n\n"We should have done something about her." Laudo points at Edna who was now signing autographs and shaking hands with excited fans. "Look! Edna's already gaining momentum for the elections. With that evidence, we could've stopped them."\n\n"Or we could've given them a guaranteed advantage if no one believed it." Adhemar shook his head, noticing the whispers gathering at the other tables. "Listen, I'm not too worried." Finally, he could take a sip. It was good, maybe a little bland and uninspired, but still tasty enough to leave an impression."
brazil_adhemar.126.a: ""I'm sure we'll get another chance soon.""

brazil_adhemar.127.t: "Forgotten Vows"
brazil_adhemar.127.desc: "Pedro's bad year seemed only to get worse. Though geographically Tocantins was a stone's throw from Brasília, in practicality it might as well have been down in the Southeast or São Paulo. So when he saw Adhemar's Agrarian Bill had failed after all, he could only slightly sigh.\n\nThe newspaper's paragraphs were branded into his conscience, as he sullenly fought back against the weeds growing in his acre of land, the only fight he could hope to win. He felt the bones in his back shift and click uncomfortably as he lurched across the sand like soil, hardly placated by the PTB's "criticisms" of the PSP's approach, or Edna Lott's "hopes" for a new deal. As he passed his rusting tractor, its rusty, unused metal mocking his feebleness, Adhemar's silence on his own promises mocked his trust. He steals, but he does? Well, what has he done?\n\nHe looked at the pink soil, the promise of the cerrado and its empty fields. Then he cast his eyes back down at his kitchen table, tentatively clutching a pen in his wrinkled hands to sign away his lease of property belonging to a certain "Bergmann family". His time waiting for miracles was over, as with his reluctant dancing around the callous land barons. Though Brasília was indeed a whole world away, it was his only way out."
brazil_adhemar.127.a: "The promise of the cerrado lies dead, hidden beneath the ipê trees."

brazil_adhemar.128.t: "From Foe to Friend"
brazil_adhemar.128.desc: "Adhemar was at his desk, before him was a new report compiled by da Cunha. It was a thick and heavy document compiling months of work by the foreign minister. "Cunha, what is it this time?"\n\n"It's about Paraguay, sir."\n\nThe look on Adhemar's face went from boredom to excitement in the blink of an eye, ever since the beginning of his presidency he always hoped to fix relations with the Paraguayan people, especially before the Argentineans. The Bull started scouring through the folder, reading every piece of information that would be relevant for the process. His eyes were gleaming with hope, "Do you think we can save Itaipu?"\n\nBut his hope suddenly turned into dread. "Vasco, what about Paraguay?"\n\nDa Cunha chuckled, he was prepared for a trip down south, even if negotiating with the recently-formed Paraguayan government would surely be difficult, after all, he had a card up his sleeve. He would entice the nation's officials with promises of aid - something the unstable Paraguayan government deeply needed.\n\nDa Cunha took a sip of his coffee, "Very probably, but you must act before Argentina. You see Adhemar, they have been making swift progress on their relations with Asunción."\n\nAdhemar grabbed a pen and a piece of paper as soon as he heard that message. He was ready to write the letter to change South America. He was ready to talk with Paraguay."
brazil_adhemar.128.a: "Roads and bridges, built with paper."

brazil_adhemar.129.t: "Reflections on a Failed Deal"
brazil_adhemar.129.desc: "The President's office was never a luxurious place. It, however, had a beautiful jacarandá table where Adhemar would usually be looking at reports, preparing speeches and writing diplomatic letters. It was during one of these work sessions on his table that the door busted open.\n\n"Adhemar! Paraguay is a lost deal!" It was Vasco, the look on his face was a mix of defeat and anger. "Why would you send me to that backwater nation? Their leaders seem to forget that their country is on the verge of collapsing. They even called me a US puppet! A puppet, Adhemar!" The minister sighed, he knew that Paraguay was a lost cause. "I guess this is what happens when you try to negotiate with people who believe they're the superior race. It's impossible to convince them to do deals with "subhumans" after all."\n\nAdhemar chuckled. "You really thought I didn't consider this possibility?" The President opened a drawer. Inside was a letter he had written in case this could happen. "See, even though negotiations with the airheads at Asunción failed, we need to complete our work, and I have just the thing needed for it."\n\nThe Bull gave the letter to Vasco. It said, in no uncertain terms, that Brazil would send millions of dollars in aid to the Paraguayan government if they would allow negotiations to proceed. "Vasco, this could be our only chance, so I ask you to send this one letter to Asunción, if it fails again we have no choice but to cancel all diplomatic ties to them.""
brazil_adhemar.129.a: "A fascist pimple cannot face a Bull"

brazil_adhemar.130.t: "No Longer Paraguayan"
brazil_adhemar.130.desc: "Juan looked down at the table, he couldn't believe what he had to do. The words in the treaty laid upon him by Mattos said it was a "Treaty of Perpetual Friendship" but he knew in his heart what it truly was. "We will help you rebuild everything you need. You just need to sign this deal," said the military man.\n\nIn his head, Juan wanted to tell Mattos that his deal was not one of friendship but one of control, control over infrastructure, people, trade and even Itaipu, but what could he do? It was not like he had any power at this point.\n\nWith a look of defeat on his face, Juan proceeded to sign the deal, he knew he hadn't any other real options. All of the other officials followed suit. "Thank you, I hope our nations can become closer with this deal." Mattos left the tent, he had more pressing matters to attend to. Brazil got what they wanted, for them the negotiations were a success.\n\nJuan sat on a chair, lit up a cigarette and looked up to the sky. Wondering if one day a truly free Paraguay would exist, that one not governed by Brazil or Argentina, not by fascists or communist, but by the people would exist. One that the Paraguayans would have control over themselves."
brazil_adhemar.130.a: "One can only wish."

brazil_adhemar.131.t: "Negotiations Succeed: Invasion About to Begin"
brazil_adhemar.131.desc: "Colonel Carlos de Meira Mattos walked alongside the exiled Paraguayan delegation in Ponta Porã. There was no wall; nothing would tell you this was the Paraguayan border beyond the signs changing from Spanish to Portuguese and the rebel army facing the Brazilian security forces across narrow streets. The Paraguayan exiles cowered at the glares of those who ousted them, but the perpetual look of disappointment on Meira Mattos' face hurried them along.\n\nFollowing the assistant attaché into the municipal building, they moved out of sight of Communist eyes as their patent leather shoes gathered the red laterite desert that built up on the curb. As everyone else took their seats in the claustrophobic meeting room, the attaché pulled a chair at the head of the table for Meira Mattos, but the colonel declined with a gesture. This wouldn't take long.\n\nAs he loomed over the rest, he watched as they unfurled the leather folders to learn for the first time just how demanding Brazil could be. The negotiations happened in complete silence, as the envoys asked themselves whether or not they could risk raising their voices, as if the fate of Paraguay hadn't already been set in stone. Flashes of home, of family, kept them sober.\n\nIt didn't matter that Meira Mattos' stern gaze grew more absent from boredom; with every paragraph that detailed the loss of Paraguayan control over infrastructure, over trade, over the dam and its energy, any resistance they felt gave way to resignation. They signed the treaty with not a word spoken, only a handshake and a photo.\n\nThe meeting was over in ten minutes. In less than an hour, the delegation found themselves once again in the same hotel they were herded in. Meanwhile, as he returned to his quarters to dispatch the telegraph or compile his report, the faintest hint of a smile cracked on Meira Mattos' face."
brazil_adhemar.131.a: "Finally, a chance to fight some leftists."

brazil_adhemar.132.t: "Stroessner's Condition"
brazil_adhemar.132.desc: ""It's Stroessner." Now things were getting interesting. Even before Vasco Leitão da Cunha hurried soberly into position for the briefing, Adhemar's attention was piqued. Not that it was a be-all-end-all issue, he could definitely remain President without saying "Paraguayan military junta" again. It was just the open question whether the pariah state would flinch that gave him the strange thrill of excitement.\n\n"The Paraguayan government has agreed to move forward with talks to renew relations and work with us. But..." Da Cunha took an irritatingly long pause.\n\n"But what? With all due respect, I have things to do, Vasco!"\n\n"But on one condition - he wants to meet with you. Personally. A state visit."\n\nAdhemar leaned back, retreating into thought. "Well, we both have seen the Chaco War frontline. At least we have that in common."\n\n"Mr. President, I would strongly advise against it. Every leader from Germania to Guatemala knows he is a brutal dictator, and the rumors of the torture and pedophilia in his military. It would be a grave national mistake to entertain a man like that, let alone give him such credibility."\n\n"Vasco, I have met shady businessmen, crooked politicians, the sick and the insane in my life. How much further from that can he be? In diplomacy, you don't look at the uniform, you look at the flags." The President didn't sense the irony of telling his senior diplomat that fact. "Plus, he's got nobody else to ask, and his reputation to thank for that, so losing is not on the cards. Tell him to start planning for Brasília." He got up and ambled out of the office."
brazil_adhemar.132.a: "All da Cunha could do was stare."

brazil_adhemar.133.t: "Alert from Asunción"
brazil_adhemar.133.desc: ""Ah, Vasco, right on time," boomed Adhemar's voice as the foreign minister hastened over towards the conference table. "So, Paraguay. Get on with it."\n\n"So..." He studied the contents of his dossier one more time, taking a deep breath to prepare himself from the very possible onslaught from the other end of the table. "The Paraguayan democratic parties have sent a letter to the Ministry of Foreign Affairs, indicating they want to "be present in upcoming discussions with the Brazilian government surrounding deeper economic and political cooperation following the restoration of national order"."\n\n"Right," Adhemar huffed sternly, "so what do you think this means for us?"\n\nDa Cunha looked like he had almost dropped a wine glass. "Well, Paraguay is obviously an important partner for us, and they are obviously strapped for cash right now. It is imperative that we step in as the only nation that can and cover the gash left by the FULNA uprising. Otherwise, they will be left out in the cold and we will be left with the tail between our legs!"\n\n"No, Vasco, that's not what it means." Da Cunha now looked like he had shattered something. "It means they are in need, so we are in control. Therefore, we need to make sure the Paraguayans don't forget the favor done for them, and get behind us." Following this, the foreign minister took one more look at the President, picked up his file and marched off without a word. When he was at the door, Adhemar was already taking notes.\n\n"Don't let your head float off into the clouds, Vasco. We need you down here.""
brazil_adhemar.133.a: "As South America faces an earthquake, Brasília is the first responder."

brazil_adhemar.134.t: "With Singeing Sincerity"
brazil_adhemar.134.desc: "Antonio Vidal's fingers felt like they were catching fire tonight. Not just from the cigarettes, but from his burning truth. Adhemar was now, if not a dictator himself, then at least a sponsor. Possible headlines jogged his mind- A Day of Shame? A Red Carpet for Autocracy? The Bull Gives Fascism A Ride? Write that one down, keep it handy for later.\n\nThe editor put up his feet and stared at the array of prized cutouts before him. He struggled to work out which detail was the most offensive- the hosting of Alberto Stroessner himself in Brazil's very own political holy site, the effervescence of conversation in the Presidential Palace or the fact Adhemar entertained him only in the Paraguayan's Spanish, asking nothing in return. It was as if it wasn't the most bloodstained tyrant of South America in town, he who oversaw dismembered opponents, laughed at torture and permitted the unspeakable violation of children, but rather a long-lost friend. He sprang to his feet.\n\nThe warmth of the freshly-pressed draft copy went through his hands, like some kind of hot potato he had to pass on, electrifying him. The copy went from desk to desk in a frenzied cycle spanning minutes, where it was passed on, copied, annotated, but also excited, agitated, disturbed. This was not just another day in the office, this was urgent. All the people from Pará to Porto Alegre needed to share in Antonio's thoughts, his burning truth..."
brazil_adhemar.134.a: "...he may deliver, but he does not care."

brazil_adhemar.135.t: "Clashing Waves"
brazil_adhemar.135.desc: "The Paraguayan delegation sat down once more to deal with the largest and most ambitious part of the proposed deal- the infrastructure section. Diplomats and negotiators spitballed ideas and figures of what was shaping to be the largest dam of its kind in the world. Excitement grew in each speaker's voice as they began to unveil the new era that could be on both sides of the border.\n\n"Thank you, Your Excellency," said Leitão da Cunha, smiling. "I would like to clarify that currently the Brazilian position strongly advocates a plurality stake of Brazilian contract ownership in both the Itaipu Dam as well as in connecting road projects and bridges, so as to speed up the building time and deliver more quickly and efficiently the output and turnover both parties desire."\n\nThe foreign minister looked up from his notes after finishing his proposal to a row of uncomfortable diplomats, their expressions deflated. Even the minister's team seemed to stiffen.\n\n"That just sounds like a takeover!" The whole room, stunned into silence, darted their attention to an older Paraguayan further down the table. "You talk of "efficiency", but how do we know our dams, our roads and our bridges won't slide into your cronies' pockets? Paraguayan infrastructure has been and will continue to be Paraguayan." With a couple of agreeing nods from his side of the room, their demands were made clear.\n\nThis monologue bothered the minister, not only because he was identified as "your", as if he was Adhemar's personal scheme artist, but also its audacity. They were just going to sit on the deal if they weren't pushed, he thought. No, he was going to set the record straight. No oligarchs, no monopolies. They had to make this work.\n\n"If you'll all excuse me, the Brazilian representation must take its recess.""
brazil_adhemar.135.a: "We're keeping the contracts. The Paraguayans will never get it done on time."
brazil_adhemar.135.b: "We could meet halfway. Afonso, what do you say we split it fifty-fifty?"
brazil_adhemar.135.c: "Let them keep their sovereign infrastructure and subsidize it ourselves. Show them we mean business."

brazil_adhemar.136.t: "A Dream, Dammed to the Abyss"
brazil_adhemar.136.desc: "Da Cunha glared impatiently at the Paraguayan officials, stiff and jittery as ever, as they took their seats in the conference room to reconvene, presumably with a verdict in mind. He reflected on the past few days of back-and-forth, himself having doubts they had set the right tone to shake on the infrastructure matter today. However, he clung on tenuously to the hope they might just have caved in. Then, the announcement.\n\n"The assembly representing the Republic of Paraguay has rejected the Brazilian offer relating to its national infrastructure."\n\nSome of the minister's team hid their faces behind clasped hands. He had no need of an explanation how it had come to this: no matter how desperate they were, it would be that table of people who their fellow citizens would blame in the aftermath. It was personal fear as much as a national one, fear of the giants who were then their opposite numbers.\n\nWorse still, it was fear that stopped the team short of total victory. The Itaipu dam was Adhemar's magic bullet for future energy shortages, and it was now thrown into chaos. Maybe the deal was not yet lost. But once the terms were on paper, there would be no chest-beating in Brasília."
brazil_adhemar.136.a: "Hopefully the Bull will not be in a china shop when he finds out."

brazil_adhemar.137.t: "Call My Bluff"
brazil_adhemar.137.desc: "Theoretically, the Brazilian and Paraguayan delegates were meant to be meeting to discuss details regarding ownership. In reality, it was more of a battle, where each nation's delegation huddled amongst themselves before sending out a messenger to deliver their terms. After what felt like an eternity, the men were sent out to no man's land as instruments of intent.\n\n"To reiterate the needs of Brazil to resolve these unfortunately protracted negotiations, we believe that for us to receive adequate compensation for our share of the investment contributed thus far, it will be necessary for Brazilian companies to own the dam and the infrastructure itself." A disgusted look on the opposition's faces spoiled the failure of his florid language.\n\n"Very well, I will restate our response to this; it is unacceptable." Only his unbreaking speech hinted at something fruitful. "However, we have devised a counter-proposal: Brazil and Paraguay will act as co-owners of the dam, while a Brazilian contractor will be permitted to oversee it." The Brazilian spokesperson nodded and returned to his camp.\n\n"Outrageous! Who do they think they are? They should be grovelling at our boots for us even deigning to bless them with this venture." The first response was met with a chorus of fists banging upon their conference table.\n\n"Are you mad? They aren't our colony, and they can go elsewhere. I don't like these terms either, but acting like a bull here will leave us with no dam, and only a pile of shit to return home to." Murmurs and hushed approvals welcomed his statement.\n\n"They have other places to go, you said it yourself. Let's just go with their terms; what we have here will make up for whatever the costs of these terms entail." Glares met this statement, before a wise old voice silenced the debate with a deciding opinion:"
brazil_adhemar.137.a: ""Play hardball, they have no one else and they know it.""
brazil_adhemar.137.b: ""Let's pretend to compromise, make them think they won.""
brazil_adhemar.137.c: ""No point wasting energy on this, go with their terms here.""

brazil_adhemar.138.t: "The Good, Cursed Hand"
brazil_adhemar.138.desc: "The Ministry of Foreign Affairs of Brazil was clearly an essential gear in the governmental machine of Brazil. It procured the best diplomats, employed the most prudent decision makers, strategists, theorists. So why was it so hard for Goliath to outmaneuver David, and force Paraguay to stand down?\n\nThe foreign minister weighed his options. In the end, no matter whoever in the department he asked, it came down to two risky moves. Either he gives Asunción what they want, more confidence in cooperation through self-determined contracting for the dam, the roads and all else. with the uncertainty of them finding the resources to go it alone with it.\n\nAlternatively, he puts his foot down, keeps the project in domestic hands and remain in control of the process, with the risk of scaring their opposite numbers away from the table. But why were they being so obstinate about something which was, to him, so clear-cut? It just didn't make any sense.\n\nBut there he was, in power, in a position of authority he rarely enjoyed, and with Adhemar breathing down his neck for a good story. The thought of trudging into the President's office empty-handed was enough to keep him paralyzed by inaction indefinitely. Vasco decided he was not a gambling man: he ought to hedge his bets.\n\n"Tell the Paraguayans to reconvene. We're giving the bastards what they want.""
brazil_adhemar.138.a: "When holding aces, it's best not to throw them away."

brazil_adhemar.139.t: "Trading Tactics"
brazil_adhemar.139.desc: "As Vasco da Cunha got out of his car, he was already mentally preparing himself for the other half of why he was in Asunción at all- it was time to agree a trade deal with Paraguay. Marching down the corridors to the boardroom, he kept up his guard with polite smiles at counterparts, hiding whatever anguish or pride he had received because of them. But today he was under no alternate impressions of his task: it would be at least 3-0 to Brasília on trade. Anything less would be a humiliation.\n\n"Well, it is clear Paraguay's civilian economy has been greatly disrupted by the recent insurgency," began Vasco ten minutes into proceedings, "where purchasing power has fallen sharply, domestic industries are left damaged or destroyed, and the consumer goods deficit is in freefall. With this in mind, the Brazilian government is prepared to subsidize the host's economy with generous boosts to soybean and cotton industry financing." One glance to the other side of the room saw virtually the whole Paraguayan delegation's faces glowing.\n\n"However, to ensure this deal is practicable and stable, we will also ask for a halving of any existing tariffs on Brazilian goods, either manufactured or agricultural, as well as the Brazilian market being the primary trade partner as opposed to the, say, Argentinian one." One of the Brazilian advisors in the back let out a smirk. The minister feigned to ignore him. "We believe, given the weakness of the current Paraguayan economy, this would be strongly within this country's interests to do so in any case."\n\nWith that simple declaration, the daily negotiating routine of recess and reconsideration began, and the Paraguayans were out of the room as fast as they came in. Were their terms too harsh? It was time to decide."
brazil_adhemar.139.a: "We're not compromising. Afonso, tell them our terms remain the same."
brazil_adhemar.139.b: "We'll reduce tariffs, but Paraguay can't go protectionist. This is a two-way street."
brazil_adhemar.139.c: "We need the trade. Allow them reduced tariffs and protectionist freedoms."

brazil_adhemar.140.t: "Give No Inch, Lose A Mile"
brazil_adhemar.140.desc: "After the recess was over, the Paraguayans came back with the same stiffness Vasco recognized and loathed. It didn't seem as if they were thrilled with the Brazilian forward position, but according to all the delegation's calculations, multiple legal notes sprawling with mind maps and annotations now buried in folders revising any and all possible facts they had on the issue, they were firmly in Brazil's hands. If he was the Paraguayan President, his pragmatism would have fired them for this obstinacy days ago.\n\n"Your Excellency," said the main speaker dryly, "The scale of these demands is quite provocative, if not aggressive, we must admit." Which is exactly the point! "His Excellency" was seething. You're beat, he thought, just pack it up and take it. "For what will deprive us of potential opportunities elsewhere, we are forced to accept largely a single trade partner, and thus a dangerous dependency, rationality will agree. Is there any way this deal can be less compromising?"\n\nNot one person spoke for what felt like minutes as Vasco put together some line of defense. "As has been established earlier, the given path is the only possible recourse from, frankly, the economic damnation caused by war, and the Brazilian government has stated its terms to make a recovery plan-"\n\n"Which is to be a permanent arrangement?" Neither the diplomat or politician in da Cunha could tell if this interruption was bluffing, innocent, or just plain rude.\n\n"It is an arrangement which will last as long as it so requires." He looked him in the eye, as if to telepathically communicate his seriousness.\n\n"Well, in that case, this discussion is null and void," retorted his counterpart, and his column of followers were led out of the door. When the door was shut, the anguished foreign minister dove his head into his hands."
brazil_adhemar.140.a: "Stubbornness pays a heavy price."

brazil_adhemar.141.t: "Drawing Up A Deal"
brazil_adhemar.141.desc: "In what was being dubbed as the "Brazilian Quarter" by the Asunción locals, the Brazilian delegation and other important personnel were in a mode of heightened caution. The caipirinhas had to wait, as those on the negotiation team would have to find their own way home from Paraguay should they walk away with nothing signed and stamped.\n\nVasco da Cunha had a plan, luckily for them. He had heard hurriedly-delivered rumors from the Paraguayan camp that the government had a preplanned agenda and were going to reject any plan which fell too far from its demands. These rumors apparently went past him and straight to the President, who apparently cared so much as to interrupt his planning with an angry phone call. His demands for more "pragmatism" and a long-winded lecture he swore he heard before became another part of his calculations. The foreign minister had a lot to weigh up.\n\nLater that day, a renewed, shorter list of terms appeared on the negotiating table. Vasco had no notes to recite. "Following recent consultations between other members of the government and myself, the government has decided to reconsider its offering. In exchange for a quartering of tariffs and a prioritization of Brazilian services for essential consumer goods, the Brazilian government will provide the same subsidy as agreed earlier to the Paraguayan civilian economy."\n\nNods came all around from the Paraguayan side, with the older diplomat amongst them gesticulating towards the speaker to say something. A smile broke across his face. "If the Brazilian government intends to take construction on ourselves as you imply, then those terms are acceptable."\n\nWith the following handshakes, the negotiators turned from rivals to, maybe slightly begrudgingly, partners. It wasn't the 3-0 win he had imagined, but a draw is still better than a loss, brooded da Cunha."
brazil_adhemar.141.a: "São Paulo and Asunción had forged a bond: only time would tell how it would be honored."

brazil_adhemar.142.t: "O Jogo Bonito"
brazil_adhemar.142.desc: "Within hours, the flustered Paraguayans were back in the meeting room. With their meeting coordinator insisting they have the trade issue dealt with today, Vasco found a chink in the defiant Paraguayan armor. They needed this deal, and in fact they probably needed it this week. They would probably do everything they can to salvage the funds and buy back some national confidence.\n\nEven still, they continued to put up a fight in official discussions.\n"Your Excellency, for the amount specified in the submitted proposal, there is not enough here to convince this delegation of this trade deal's merits, especially given how much opportunity cost we commit. We-"\n\n"-You..." interrupted Vasco, turning up the temperature, "...need to consider your position more carefully, Your Excellency. To be frank, this economic problem is a Brazil-sized hole. It is too big for Paraguay to fill itself, and its other neighbors and partners will not commit to or want to take the necessary steps to do that. However, the fact that we, as your largest neighbor, as the first country to come into Asunción at all must prove that we mean business, and that we are able to do what is necessary."\n\nThe speaker on the other end was stunned into silence. "That is not an assumption for yourself to make, Minister of Foreign Affairs," he eventually croaked. If he didn't know any better, Vasco would have laughed in his face.\n\n"If you are so sure, we are prepared to walk away." He let the phrase sit a while, accumulate some power, let the papers shuffle, eyes flit across the room. Tick, tick, boom.\n\n"...Well," said the speaker, with an embarrassed smile, "we wouldn't want it to get to that, would we?"\n\nVasco Leitão da Cunha savored the memory of that smile for weeks to come, framing it on the wall of his mind as if it was a World Cup-winning goal. When he thought about it that night, with feet on desk and cigarette in hand, there were no two ways about it..."
brazil_adhemar.142.a: "...if they were playing a game, he had scored a hat trick."

brazil_adhemar.143.t: "The Gigawatts That Matter"
brazil_adhemar.143.desc: "Vasco da Cunha stared at his cup of coffee, and his tired face reflected in the coffee stared back at him. How long has he been tangled up in these negotiations? It was easy to lose track of time when arguing with walls in this room without any opening to the outside world. He would be damned if he put it all to lose after getting this far. But shaking hands over a mediocre treaty was not an option either, considering his reputation and his boss's tempering were both hanging in the balance as well.\n\n"Gentleman," he began after a knock on the desk, with a firm, eloquent voice that hid any hesitation and concern he might have had. "I thank you for your cooperation in pushing forward with this project in the common interests of our countries. Now there is only one matter left pending: the distribution of the electrical energy." Murmurs emanated from the Paraguayan delegation as their heads tilted forward and their gazes were fixed toward da Cunha. Da Cunha assumed it was more of a show of interest than an attempt to intimidate him as he cleared his throat: "In order to achieve a fair distribution of the energy produced by the Itaipu Dam, the power output must be divided according to the gross contribution made by each country. Therefore, an approximate value of 70% of the energy must be directed to the United States of Brazil."\n\n"Preposterous!" barked one Paraguayan diplomat. "What would be left for us then, crumbs? The houses of our people are in much greater need for energy than yours. If you expect us to accept such a deal, then you are very mistaken."\n\nAnd so the meeting went on for minutes that passed like hours. After many arguments were thrown back and forth, both sides finally reached an agreement to take a break for decision making. As the Paraguayan representatives left orderly and wordlessly as he felt the weight of the glares and the success of the treaty returning all at once to him, da Cunha swallowed his cold coffee and called his nearest advisor."
brazil_adhemar.143.a: "Tell the President that we are agreeing to equal access."
brazil_adhemar.143.b: "Tell the President that we are going to keep it all."

brazil_adhemar.144.t: "An Unrousing Victory"
brazil_adhemar.144.desc: "Downtime. As foreign minister in a foreign land, Vasco learned he ought to savor it. He had been pacing around Asunción all day, every day since he had gotten here, so for the moment, he reclined in his hotel bed, coffee cup in hand, maybe reading a jou-\n\nCrap. It's Adhemar again. Let it ring, don't get pissy, don't argue. Just answer the phone. "Yes, Mr. President," he said, picking up the receiver, "what would seem to be the issue?"\n\n"The issue? Vasco, you know the issue, you're not on holiday, for Christ's sake! ...Well, I've just been mulling it over, and this trade deal seems excessive." Adhemar pointing out excess? The foreign minister thought he'd never see the day. "We need to soften the tone."\n\n"Sir, with all due respect, we have made the situation to the Paraguayans very clear. We are the larger partner, we will likely build most of the dam ourselves-"\n\n"Equal access to the dam's energy output, shared administrative authority on the dam, we meet in the middle. Those are the terms. Look, I've seen Paraguay, I saw the war before my eyes... I know what it takes. Don't give me any more last-minute shocks, just get it done. Thank you." Vasco sat back down at his folder-laden desk, and after flinging one or two across his room, crossing out his old notes and perhaps letting out a groan, he got back to work immediately after.\n\nThe Paraguayans agreed to a new clause for the treaty on the President's last-minute terms. Their delegation positively glowed at the announcement of the compromise proposal, and the power of the proposed dam would be split evenly between the countries. Walking out of the meeting, Vasco Leitão da Cunha's smile was more modest. What he was actually thinking about was how big an opportunity they had missed and how much he just wanted to go home."
brazil_adhemar.144.a: ""Afonso, how many days of this have we got left?""

brazil_adhemar.145.t: "The Caipirinhas Must Flow"
brazil_adhemar.145.desc: ""Your Excellency, in Brazil we have a saying, perhaps you have heard of it," said Afonso, one of Vasco's understudies. He was so sure of victory in the boardroom today he would give someone else the finishing blow. "Whoever plants, harvests. In a practical realm, Paraguay will not be able to sow as much in the field of this project, nor does it require as much, whereas Brazil's energy demands are much higher. The Itaipu Dam's energy distribution will be split by national share in its construction, or else it shall not be built at all."\n\nThat last phrase seemed to have landed hard on the other side of the negotiating table, as it agitated the various opposite negotiators, as if worst had come to worst. It was a bluff, of course, Afonso would definitely not be coming home a hero if they did not agree on the dam. But to them, it might as well have been policy.\n\n"Very well," sighed the main speaker after plenty of anticipation. They had no alternative plan, apparently. "The dam must be built, or else... I fear we have been here for nothing." In the future, Brazilian delegates told how you could see the heavy clouds of apprehension weighing on the Paraguayan envoy. It almost felt cruel.\n\nThe foreign minister wasted no time in shaking the speaker's hand, so as not to make the situation any more awkward than it was. The thought tugged at him that they had exploited a reconstruction period which was hard enough, that he had become more like one of Adhemar's collaborators than an upholder of diplomacy's most important principles. In fairness, though, he had scored on the most important principle: defending his nation's interests. There would be no debate about that. For now, they had cause to celebrate, and the caipirinhas must flow."
brazil_adhemar.145.a: "Saúde!"

brazil_adhemar.146.t: "Familiar Crossroads"
brazil_adhemar.146.desc: ""Ah, Marcelo, good to see you!" boomed Vasco as one of his senior diplomats walked towards his table. "Finally, a friendly face, haven't seen one of those in a long while," swiveling his head across the floor while speaking in hurried Portuguese. Marcelo grinned at the work his boss was doing not to be noticed.\n\nRadio silence was, for the past day at least, the Paraguayans' only message since presenting the conditions for the energy portion of the deal, explained Vasco. Whether this was down to complacency, or intense and disciplined planning- both of which the foreign minister found pretty unlikely- or rather a protest, highlighting their discontent with the conduct of the talks, he couldn't say. Vasco had invited the man as a trusted second opinion.\n\n"It has to be the latter," proclaimed Marcelo, once the entertaining thought of da Cunha's eyes bouncing across the room for possible spies faded. "I mean, they might as well have been speaking with their eyes throughout negotiations, I don't think we're getting invitations to whatever bar they go to. Honestly, they probably hate us."\n\nVasco smirked at the idea, sipping a little of his coffee having done so. "That's probably true. But this whole dam business is the lynchpin of the whole thing. If we water it down or give them the lion's share of output, any company east of the river will leave it out to dry. Worse, if we don't agree on anything here, we might as well just pack up and leave. We didn't come to build a couple of roads and bridges."\n\nLike so many times before, Vasco was having to make a gamble, despite hating the concept himself. As the two of them hired a cab back to their informal headquarters, the calculation continued to stir in their minds."
brazil_adhemar.146.a: "It's too late to change course. We shouldn't compromise, Marcelo."
brazil_adhemar.146.b: "Give them what they want. It's give way, or the highway."

brazil_adhemar.147.t: "Negotiations Collapse!"
brazil_adhemar.147.desc: ""TO: His Excellency Vasco Leitão da Cunha\nFROM: Ministry of Foreign Affairs of Paraguay\nDATE: [?global.date.GetDateStringNoHourLong]\nSUBJECT: Negotiations\n\nNegotiations to be halted immediately given current position of parties surrounding the dam project. Deadlock unlikely to be resolved: redlines of both sides made clear. The Paraguayan delegation must also note the contempt held by official quarters of the Brazilian government to affairs and in places of national sovereignty, whose actions resemble more closely a 19th-century empire than a modern state. Future bilaterals to be put on hold indefinitely."\n\nThe memo- not a declaration, not even a meeting in person- which Vasco received came accompanied with an immediate visa expiry, meaning that they were to leave the country the same day, one final act of pettiness to see them off. Days upon days of preparation, planning and promises, wasted. Reams of manila folders and café trips deemed null and void. And worst of all, an apoplectic Presidency who held the bomb to its face. Vasco reckoned it was that which he would remember the most.\n\nAs the charter plane got off the ground, he thought of past endeavors, campaigns. Russia, Bolivia, Brasília, now Paraguay. But Paraguay, well, that would be a word he would never be able to hear peacefully again. At least he would never need to go again."
brazil_adhemar.147.a: "The Paraná River would be silent for generations to come."

brazil_adhemar.148.t: "A Toast to Trust"
brazil_adhemar.148.desc: ""Heh, maybe I should've had more trust in you after all." The line to Brasília was crackling, but between the noise even Vasco could detect Adhemar's pride. The energy "issue" found a compromise, and all that remained was to type up the treaty and get the boss himself to sign. Vasco sat back in his hotel bed contentedly, allowing the music of compliments to flow.\n\n"Well, look, we didn't exactly conquer the place, but even so, it was us who set the terms. I've already had three old friends in São Paulo call about Paraguay. Let's just say there will be a lot of people who will be very pleased about these terms... Good work, Vasco, I'll talk more about it when you get back." The line went dead. After he got over the image of the shady businessmen forming a line to cart off those infrastructure contracts, he sat back with a big grin on his face.\n\nAs he took an evening stroll around the neighborhood, the excitement of finally leaving Paraguay began to slip. Once he was finally about to go, the catharsis of such a thing felt nonexistent. The abrupt mélange of pastel-colored street fronts and gray, grimy pillars he saw had begun to grow on him, in a way.\n\nIn the end, Vasco and his aides did get an invitation to drink with their opposite numbers, which was where, incidentally, he was headed. There would surely be bigger challenges to come: cementing a constructive relationship with America and other world powers, for instance. But maybe for one night in his life, he could pretend as if they didn't exist."
brazil_adhemar.148.a: "Cerveja: though they said it differently, they understood it just the same."

brazil_adhemar.149.t: "All's Well That Ends Well"
brazil_adhemar.149.desc: "*click*\n\n"They're in." Vasco said in a tired voice, he was exhausted from the extensive negotiations with the new Paraguayan regime, but it had finally paid off. "We've talked with the officials this morning and they accepted the deal." It was a major win for Brazil, finally being able to control the resource-rich Paraguayan soil.\n\n"Vasco," Adhemar replied, ecstatic from hearing the news. "When I first put you in my cabinet, I didn't know if you would actually be a good foreign minister, but today you proved you're capable of great things. When you're back here in Brasília, I will congratulate you in a better way than by phone."\n\nThe two chatted a bit over other topics involving the future of Paraguay and how they would use the new land. "I believe that's all we have to talk about for now," Adhemar said, with a smile on his face. "Congratulations on winning over the Paraguayans."\n\n*click*\n\nVasco sighed in relief, it was finally over. He could go back to his nation as a hero and have his much deserved break. The minister turned off the lights and lied on his bed, he knew that Adhemar would just give the land to his friends, but he wasn't worried about that at that point. He just wanted to rest."
brazil_adhemar.149.a: "Goodnight, Mr. da Cunha"

brazil_adhemar.150.t: "Sinner's Finale"
brazil_adhemar.150.desc: "Vasco had a feeling of dread as he dialled up the phone, he didn't know what Adhemar would think of the news, would he be angry? Indifferent? He couldn't know at the moment, all he could do was pick up the phone.\n\n"Presidential Palace, this is Elsa speaking."\n\n"Elsa, it's Vasco, can you please direct me to Adhemar, I need to talk with him urgently." The phone's music started, even with the unfortunate circumstances that he found himself in, the minister just wanted everything to be over with. The Paraguay deal had been taking a toll on him for a while\n\n"Vasco?" The Bull answered, his voice clear as ever. "You fucked up the deal, didn't you? You know, sometimes it would be better if you worked harder for our interests." Vasco scoffed, he couldn't believe what was being said in front of him.\n\n"Our interests? Don't you mean your friends' interests? The deal is over Adhemar, I know you just wanted some more money for you and them." After a long talk on all sorts of problems with what to do with the Paraguayans now, a frustrated Adhemar said goodbye to his minister and hung up the phone.\n\nSitting in his bed, Vasco looked out the window towards Asúncion, a drink in right hand and a cigarette in his left. A sense of relief filled his body. "It's over!" He thought, knowing that he never had to step foot in Paraguay again. He was finally free to go back to Brazil."
brazil_adhemar.150.a: "The curtain call has come"

brazil_adhemar.151.t: "A Statement of Force"
brazil_adhemar.151.desc: "Much was expected upon the invitation for Adhemar's "statement". It brought generals and journalists, dignitaries and diplomats to a clearing in the heart of the Amazon, hardly the city stroll some of them imagined their job to be. Argentinian and Chilean officials muttered in furtive and hushed tones of Spanish, and such an invitation delivered on such short notice to such an obscure location heightened their worries of the unthinkable: Brazil had the nuke. Adhemar stood in front of the panel, back straight, his face military in disposition, and a light shone on his face to bring the tones to a whisper.\n\n"What is the larger part of power, fear or respect? We would all want to say the latter, but in the world that our native Brazil inhabits, respect is undervalued. Unfortunately, it is fear: cold, uncaring fear which reigns supreme." The armed forces representatives remained focused on the President, while the attention of diplomats darted across the plain, some as puzzled as they were at the beginning.\n\n"When Brazil stands its ground, it ensures peace. When it flexes its might, it ensures order. Judging by the fact we are still here, I would say that strategy has worked out pretty well. Now, once our distinguished researchers over here have made you acquainted with this lesson, remember this. In this world of chaos, this is our country's only way." Adhemar nodded at the scientists at the desk, who gave the go-ahead and began to count from sixty.\n\nDespite his unmoving face, which he then covered with a pair of prescribed sunglasses handed to him by an aide. Thirty seconds. He, too, turned his face, in apprehension, worrying he had just made a rhetorical gambit and lucked out. Fifteen seconds. Everyone now was geared up, with faces, arms and legs covered up for the fallout.\n\nThree... two... one... And up springs the cloud.\n\nA mythically-sized mushroom erupts from above the trees. Blood-red, then holy white washes across the sky. The shockwave thunders over the panel of awed onlookers."
brazil_adhemar.151.a: "Brazil has entered a new era and will never step back."

brazil_adhemar.152.t: "The Concealed Blade"
brazil_adhemar.152.desc: "'Look like the innocent flower, but be the serpent under it.'\n\nThat was the quote. Adhemar had read Macbeth, once - it had been a hot, sticky night in São Paulo. After a long day of facing his own slings and arrows of outrageous fortune, he had opened up the book and devoured the play whole. The translated copy had lost some elements of the wordplay present in the original text, but he had grasped the meaning of the words just fine. Sometimes, a weapon was most deadly when it did not exist - on paper, at least. And that was something Adhemar hoped the Brazilian military understood too.\n\nIt was yet another hot night in São Paulo. The President felt his clothes clinging to his skin, the smoke from General Frota's cigar wafted across the room. It was him and Médici who he had cooked up this scheme with, the former looking deadly serious sitting in his chair as if he was about to fall off. Médici, on the other hand, seemed remarkably calm.\n\n"So as I understand it, Mr. President," Médici began taking yet another drag from his cigar. "We are in agreement. The world cannot know the true power we now hold."\n\n"On paper," Adhemar said.\n\nMédici nodded. "On paper. Yes. They will all know, of course."\n\nThat was undeniable. Pictures of the mushroom cloud that had been produced by the first test had been seen by the eyes across the world. But as long as the official documents told the story they needed to tell, there was little Brazil's enemies could do to protest it other than gawk angrily. He nodded. Médici smirked, lighting his own cigar."
brazil_adhemar.152.a: "I think that can be arranged."

brazil_adhemar.153.t: "The Atomic Age"
brazil_adhemar.153.desc: "Laudo Natel tried to avoid being as heavy a drinker as many of his colleagues, but when the President himself invited you to his office to sup on some fine bourbon, you would be amiss to say no. And thus he found himself sitting in the Palácio do Planalto's velvet seats, holding a small glass bearing two ice cubes - a vessel ready for the night's supplication.\n\nThe President himself was in a very jolly mood - he half suspected that Adhemar had perhaps snuck some of the alcohol prior to his arrival, but that was neither here nor there. The man undid the bottle, and poured a generous amount into Laudo's glass alongside his own. He raised it, the amber liquid glimmering. "To Brazil, and to the future," he said, as they clinked their glasses together. "For better and for worse."\n\nThe familiar pleasant burn filled Laudo's throat as he drank. Adhemar seemed to handle it slightly less well, coughing slightly afterwards. But he shook his head, jovial mood returning. "You know, Laudo, this will perhaps end up being my crowning achievement of all. If Lacerda himself - that, that rat of a man," he slurred, waving his arm dismissively. "If he were to blow up this building with both of us inside, we would still have beaten him. You know why?"\n\nLaudo shook his head, amused, but willing to humour the President. "Why is that?" he asked.\n\n"Because we put Brazil on the map. The real map, I mean. The one that decides the fate of the world. They - the Argentinians, the Chileans, all of them - they'll have no choice but to respect us now!" He said, laughing heartily."
brazil_adhemar.153.a: "And despite the jokiness, Laudo could not help but agree."

brazil_adhemar.154.t: "Oh, the Places You'll Go"
brazil_adhemar.154.desc: "The plane into Wellington touched down at midday, and Edna's team had already been informed to expect a press gauntlet. When she exited the plane, she saw a small cluster of journalists on the other side of bodyguards and bollards. [NZL.GetLeader], Prime Minister of New Zealand, welcomed her with a handshake. They walked down the tarmac and towards a ministerial motorcade bound for Parliament. Edna wished she had even an hour after the flight to hit the hotel room first; she had been sleeping poorly the night before, and she found no rest on the plane.\n\nEdna had tried to earnestly engage the Prime Minister in discussion, but her mind was drawn to the circumstances of this trip. Yes, it had been planned for some time, but Adhemar and Vasco da Cunha were the ones scheduled to go. He loved all this glad-handing shit anyway, so let him go while she put out a few more fires, as usual. Yet last week, the schedule had changed. [NZL.GetLeader] was pointing out some colonial architecture of interest, but Edna's mind was cast back, to Adhemar's secretary pointing out appointments and events she could allegedly afford to miss.\n\nWhen they exited the car, she leaned in towards one of her aides. "Get back to the hotel and start calling around. I need to know what he's up to." The young woman nodded, flagged down one of their cars and left the rest of the team to their peculiar distraction. Lott returned to the welcoming party, adjusting her mindset until this visit had stopped feeling like an obligation and her smile regained its warmth."
brazil_adhemar.154.a: "While in the back of her mind, she wondered what was going on in Brazil."

brazil_adhemar.155.t: "Oh, the Words You'll Hear"
brazil_adhemar.155.desc: "Trade and security dominated the conversations between Edna Lott and [NZL.GetLeader]. On the former, New Zealand seemed somewhat keen to engage with fellow nations of the OFN, if perhaps only to offset the fears of American economic domination. On the latter, New Zealand had taken it as a point of pride to punch above their weight when it came to combatting world fascism, and wanted to see how other nations could contribute to its David and Goliath story.\n\nThey were in a meeting room in Parliament House, discussing matters of trade, when an aide rushed in. Lott and the PM's heads turned; it was one of Lott's, and her face was both plush from the run and pale with dread.\n\n"Inés?" asked Lott, blinking behind her glasses. This was the aide assigned to keeping one ear out in Brazil, and she had just interrupted a meeting beyond her security clearance.\n\n"Vice President Lott, it's urgent, can I-" Security pushed their way through the door frame, and would have grabbed Inés if Lott hadn't raised a hand to hold them. "Please, I need to speak to you, immediately."\n\nShe felt embarrassed for the intrusion, but Inés' dread creeped into Edna. The two moved into a corner of the room, whispering to each other. [NZL.GetLeader] couldn't help but try to overhear even as the women had their backs to the rest of the room. There were snippets and fragments that escaped the huddle: "holding a vote", "killing the embargo", "about to pass". When she turned, Edna's face bounced between frustration to fear to anger.\n\nEdna offered only a hasty apology to [NZL.GetLeader] before her entire team suddenly took off. When she was President, she would have to apologise, but anger clouded her judgement."
brazil_adhemar.155.a: ""Christ," said [NZL.GetLeader], "I hope it wasn't anything we said.""

brazil_adhemar.156.t: "Oh, the Things You'll Miss"
brazil_adhemar.156.desc: "The plane into Brasília touched down at midday, and there was no press there to receive her. She scrambled into her car, but the radio told her that she was already too late. The vote had gone ahead and passed in her absence. She wanted to smash in the window next to her. Instead, she told her driver to change course from the Senate to the Alvarado. There was no longer any need for pleasantries; she stormed in and demanded to see Adhemar. When they responded with lies about him being at the Senate, she pushed past his secretary and all but ran to his office. There, Edna found Adhemar over his desk, scribbling a letter.\n\n"You fucking traitor!" she spat, slamming her palms down on his desk. "You lifted the embargo with Germany?"\n\n"Hello, Edna," he said. "How was New Zealand?"\n\n"You sent me on that bullshit trip because you knew I'd stop you! I should've never truste-"\n\n"Edna, calm down. You're embarrassing yourself." Adhemar walked over to his drink cabinet, opened a bottle of champagne. "Our job is to provide prosperity for the nation and its people." He set out two glasses, poured them slowly. "We could hardly do so by keeping out a third of the world's markets."\n\n"A third of the world's markets are held by our en- Christ, Adhemar, New York will have your head for this."\n\n"New York will do nothing. Hell, they'll appreciate it." He held out one of the glasses to Edna. "Relax, smile. This is good for us. This is-"\n\nEdna slapped the offered glass away. It dropped from Adhemar's hand and spilled over his carpet. He snarled, but said nothing as Edna took off."
brazil_adhemar.156.a: ""Send me the fucking cleaning bill!""

brazil_adhemar.157.t: "Some Good"
brazil_adhemar.157.desc: "To the sound of roaring applause and camera bulbs popping, Edna snipped in two the large red ribbon that had been set up in front of the new Petrolina Municipal Hospital, and watched it flutter into the dirt. It could have been established closer to the city, but her insistence that it serve both the farmers and the urban workers equally (or something approaching equality) had been heeded, and so here it stood - in the red dirt that connected the city center with the sprawling farms that spread for miles around, the result of millions of cruzeiro being pumped in to healthcare projects across the country with the successful passing of the bill. A compromise bill, but a bill regardless. A hot wind blew through the crowd, carrying praise and questions from the reporters, and right through her carefully-made hair. With mild surprise, Edna realised she was, for the first time in a while, satisfied with what weeks of political wrangling almost a year ago had wrought.\n\nThe interior of her vice presidential car brought sharp, artificial cold. As it chewed up the distance to the airport and the landscape whipped past, going from green leaves and corrugated metal shacks to paved roads and white buildings, a vision resolved itself behind her eyelids - a face. Adhemar de Barros was as corrupt a man as had ever walked the earth, but for the time being he had brought some good. Good that she had fought hard for, but some good nonetheless. A darker shape coalesced to the east, across the sea and far away but in whose shadow the whole world stood. Germany - home to all that would tear Brazil into a million pieces and, with jackbooted feet, stomp on what remained. Adhemar was somehow content to work with those beasts - and that reflected on him. As long as that abominable charisma was helping open hospitals, it was tolerable. But it would require a close watch."
brazil_adhemar.157.a: "Fortunately, there is someone to watch the watchmen."

brazil_adhemar.158.t: "The First of Many"
brazil_adhemar.158.desc: "To the sound of roaring applause and camera bulbs popping, Adhemar snipped in two the large red ribbon that had been set up in front of the new Petrolina Municipal Hospital, and watched it flutter into the road with a gleaming grin that seemed to shine even through the cathode rays of the TV. A shining new crown jewel right in the metropolitan centre of Petrolina, and a stunning achievement for the UDN. Edna watched with a complicated expression - in actuality, the choice of Petrolina had come from her office, as had essentially all the paperwork that had ensured the hospital was completed on time. Adhemar, as usual, had seen it as only a trinket to prove that his healthcare bill wasn't all hot smoke and diverted funds - for once he had personally seen to the ambitious project. Bit by bit, Edna's modest vision for a prototype of medium-size, general hospitals fit to replicate across the Northeast had been sprawled into a massive specialty provider that would see patients fly in from across South America, and maybe even further.\n\nHe was still grinning through the TV screen. Somehow she wished to go through it, tell the reporters what the man professing his love for the people of Petrolina had really thought when she first mentioned the idea. But then it hit her - for all her moral outrage, what really rankled was not that a hospital had been built in a community that really needed it. It was that she had been outflanked, plain and simple. Well, the first step to victory was recognising when one had been beat. And there was still so much allocated in the bill... An aide noticed her smirking, before she turned off the TV and motioned for the door. On the way out, he heard her think out loud -"
brazil_adhemar.158.a: "Much more. We need much more, faster."

brazil_adhemar.159.t: "Excess Mortality"
brazil_adhemar.159.desc: "A small report was placed neatly on Edna Lott's desk. The young secretary that had put it there said only one sentence, then left as quietly as she came. Stamped, behind the cover that read CONFIDENTIAL and INTERNAL GOVERNMENT DOCUMENT, was the title - an almost euphemistic, medical copy.\n\n"Responses to Inquiries raised by the honourable Vice President with regards to PL n° 532/1966 (Lei de Modernização do Sistema Nacional de Saúde e Acesso Médico de 1966)"\n\nPage after page of exactly what Edna had been fearing most. Incompetence, bureaucracy, corruption - and above all, a sheer lack of any care whatsoever. What was it that rank thief used to say? That he stole, but delivered? What bullshit. In response to why the UDN had not unanimously voted for - several of the deputies had called in sick. In response to why the bill had withered under unfair scrutiny for excessive spending at a time when Adhemar's pet projects guzzled as much money as they needed - or wanted - her office had found not so much a single chronic illness as a plethora of treatable diseases. But the worst was yet to come. In response to the blinding lack of any knowledge of the actual bill's provisions amongst the UDN's most important policymakers - copies had not even been sent to their offices.\n\nThere was something seriously sick at the heart of Brazil's politics. A cancerous rot that sat right next to Lott herself, and smiling and wooing the people whilst lacking even the most basic skills required of politicians and legislators. As she finished the report with an expression like a dog had relieved itself on her desk, one single word described the man whom she found herself leading the country with:"
brazil_adhemar.159.a: "A threat."

brazil_adhemar.160.t: "For Safety and Order"
brazil_adhemar.160.desc: "The dull drone of the aeroplane's engine as it cut through the murky night sky was a welcome contrast to the hours of shouting and screaming Edna had endured throughout the day. As riots spread like plague through the South, she had given speech after speech calming things down, soothing inflamed tensions - and in the process talking herself hoarse. Not for nothing, however - there would at least be peace in the cities sprawling beneath the plane tonight. It had been one of the finer performances of her political career.\n\n"What did you think, Ana? Maybe Adhemar can learn by example once they air my speech to the rest of the nation. Sometimes - "\n\n"Excuse me, Senhora Vice-President. My understanding is that the camera crews present had their footage already purchased by a private news company."\n\nEdna thought for only a moment. This was a subtler route than the President would normally take.\n\n"I'm guessing the reporters and journalists also have some similar story?"\n\n"Yes - apparently they were under a "news quarantine" regarding the riots so as not to "inflame the situation"."\n\n"Funny - it seems like only one person is actually quarantined here.""
brazil_adhemar.160.a: "Check - but not mate."

brazil_adhemar.161.t: "Death by Live Studio Audience"
brazil_adhemar.161.desc: "There were many elements of TV Globo that Edna Lott detested. The host, the host's tacky tie, the host's irritating voice, the spotlights which made her feel like a criminal, and the host. However, the audience was another element to which she didn't reserve hatred towards, but fear. One inadequately answered question could land her on the front page of Última Hora.\n\n"You there, in the red sweater, can we get your question?"\n\n"Do you think you only got to be Vice-President because you were the daughter of a previous President?" Edna Lott restrained herself with a polite smile before responding.\n\n"Despite popular opinion, military backing can only get you so far in this country." Sporadic laughs erupted from the audience. "No, I was elected first by the people of Guanabara to represent them, and now as a counterweight to the good intentions of our Paulista President." A handler from the front row gave her a nod.\n\n"Do you think your party would have preferred Goulart or Brizola to become Vice-President instead of you?"\n\n"The PTB has many talented individuals behind it, I just so happened to be their candidate for this position, and I know I have the full support of my party." Another nod.\n\n"Shouldn't you be at home raising your kids?"\n\n"My children have already been raised. I should be asking you why you aren't at the bar knocking down bottles of beer?" Howls came from the audience, with her handler joining in. The critics had been silenced, as she fielded more supportive questions, and an audience at home watched with respect."
brazil_adhemar.161.a: "Try as they might, Edna's star continues to ascend."

brazil_adhemar.162.t: "Under the Table"
brazil_adhemar.162.desc: "Edna sat at her desk, twiddling the envelope addressed to Leonel Brizola between her fingers. Its contents were short: a carefully curated snippet from the latest closed-door meeting. Just words, really. For those in the political sphere, however, these words were bullets. And she was about to become an arms dealer.\n\nLeaking to Brizola wasn't something she had ever imagined herself doing. Leaking — period — was something that just felt dirty. Immoral. Wrong.\n\nBut then she thought about Adhemar.\n\nHis latest proposal was yet another policy that would funnel resources into the hands of the same old elites. Wouldn't it be good for something like this to get shot down? Going against the oligarchs was the very definition of punching up.\n\n...\n\nImmoral. She scoffed at the very thought. What was she even thinking? This was Adhemar. He liked rolling around in the mud. This was hardly anything other than a taste of his own medicine."
brazil_adhemar.162.a: "Conscience doesn't deliver."

brazil_adhemar.163.t: "Locked Out"
brazil_adhemar.163.desc: ""You'd think they would have at least prepared a decent spread up there, it's not every day the Vice President visits."\n\nEdna Lott, fresh off a plane from the Northeast, relaxed in a chair in her office for only a moment before immediately snapping back to action.\n\n"-no, don't worry, you did a good job with the communication, they're just incompetents. Well, Ana, how was the home front? I'll need the report for the 4 o'clock meeting with that - "\n\n"My apologies, ma'am. His office just called in a few minutes ago - the meeting is rescheduled. They didn't give a replacement date."\n\nExasperation. You could never separate that man and his power plays. As she ran her mind through the list of other meetings Adhemar would also be attending, it seemed her secretary read it for her.\n\n"Actually, ma'am, we have just received the updated schedule for all major upcoming meetings. It seems that all the previous meetings we had been booked for with the President have been restructured. Senhora Vice-President, we have no scheduled meetings with him or other senior cabinet members for the next three weeks, effectively the whole month. It also seems that his general schedule is fully booked - every opening, in every cabinet meeting."\n\nA cold chill descended in Lott's stomach. So that was what they were doing."
brazil_adhemar.163.a: "That bastard would see how his little scheme would fare."

brazil_adhemar.164.t: "I Know You Know"
brazil_adhemar.164.desc: "Edna stood by the window of her study, watching the choppy gray sky. It was the type of sky that didn't tell you anything in particular. Was it going to rain? Maybe. Would the sky clear? Possibly.\n\nOf course, she was stalling. What everyone was talking about — and what she was expected to comment on — were the news of Adhemar doubling down on his nuclear program. But there was a tightness in her jaw that made it impossible to speak, and a tightness in her hand that made writing difficult.\n\nEdna had been aware of Adhemar's nuclear ambitions, of course. She had suspected it for years. She had known for months. And yet, she had to learn about it from the morning newspaper like every other Brazilian.\n\nMaybe she thought she was special. Maybe she trusted Adhemar. Maybe she simply believed he owed her — that she deserved better.\n\nLooking back at the newspapers, it was almost comical how spot-on her mental image of that man was. There he was, smiling next to a shiny bomb, flaunting photos of underwater nuclear tests like a safari hunter posing with his trophy\n\nShe let out a sharp, bitter laugh."
brazil_adhemar.164.a: "The audacity of that man."

brazil_adhemar.165.t: "An Ill Omen"
brazil_adhemar.165.desc: ""Welfare expansion?" Vergal asked. "Our rightists I can whip, but the UDN won't be so kind with more spending."\n\n"Romeu, you worry too much." Adhemar reclined further in his chair, feet resting on the table. "The people cannot be hurt by what they do not know. All they know is that we deliver, and that the UDN does not—"\n\n"Adhemar." At the opposite end of the room, just barely past the half-open door, stood Edna Lott, shooting a piercing glare directly through the President.\n\n"Ah, Edna, I do not recall a meeting between us set for this time." Briefly reverting his gaze to Vergal, his eyes darted thrice between him and the exit before finally resulting in the deputy's silent departure.\n\n"Booked. Every opening in every cabinet meeting is booked: this week, the last, the next—I am certain that this room can get quite hectic when filled, but there is more than enough space for the President to include his number two."\n\n"That is your concern?" His apprehension gave way to a self-assured smile as he dismissively tossed his hand aside. "Edna, you have been doing just fine so far; so have I, for that matter. Our administration is working. Brazil is prospering. You and I—" His sleazy grin suddenly faded as she opened her mouth to retort, replaced with an attempt at matching her stern glare. "You cannot be hurt by what you do not know. That is that." All he received in return was a laugh.\n\n"You have decided the affairs of state while I have played window dressing: is that what you call working?" Her chuckle grew bitter as it trailed off. "Just know this will not end well. That is that." As she turned away, the only sound left was the pitter-patter of hard leather on wooden flooring."
brazil_adhemar.165.a: "But as Adhemar's hand rushed to his chest, all he could hear was the pitter-patter coming from within."

brazil_adhemar.166.t: "Odd Future"
brazil_adhemar.166.desc: "Gazing into what was once the Amazon, Edna Lott did not know what to think. She was no naturalist, but she knew enough of the rainforest—of nature in general—to know what was amiss. Every step was a stomp; every breath was a squall. The demonstration may have been blinding, but neither fireball nor shockwave could match the silence still choking out four kilometers of the lungs of the Earth.\n\n"Edna." Her name did not register. "Edna." This time her eyes darted around, finally landing on the source of the familiar voice. "Edna."\n\n"Kubitschek." She turned to face him, shaking off what thoughts of the nuclear scar she could. "I did not know you had decided to stay."\n\n"Yes, well, it is an occasion worth soaking in. How is the family?"\n\n"Henrique is good, as are the children." She paused, her eyes focusing and her voice strengthening. "Tens of thousands of these—these city-killers. How much did we spend on one more? Are we not better than our rivals? Defense I understand, but the entire world seems to have developed an obsession for mass suicide, and I cannot bear to stand as an accomplice."\n\nHe nodded as he let out a sigh. "I have felt much the same, but if it is any consolation, for all his faults, Adhemar was not alone in this: many others would have done exactly this."\n\n"Then we are all guilty." For a moment, the silence returned.\n\n"I will leave you time with your thoughts, but if you feel the need, do not hesitate to call. Tell Henrique I wish him well." He turned to leave, and she turned to stare: staring at the crater, staring at the silence, staring at the future."
brazil_adhemar.166.a: "And the future stared back."

brazil_adhemar.167.t: "The More Things Change..."
brazil_adhemar.167.desc: ""It's a shame, Mrs. Vice President," said da Cunha, looking up at her from his seat, reports strewn across the desk.\n\n"It's an outrage—an insult." She threw her arms into the air as da Cunha gave a nod. "For Adhemar to send our best and brightest to break bread with the Nazis was already too far, but to stay silent as they face threats of death?" Pausing, she took her seat. "Some days I wonder just how we elected this man."\n\n"As do I," said da Cunha—thought Júlio, standing just outside the foreign ministry office. Punishment had yet to arrive for him and the others; indeed, so too had much of anything. Though no doubt inundated with a wave of German protest, the higher-ups had yet to act beyond issuing a general demand of silence. The reprimands and demotions would come later.\n\nFist against wood—from whom he neither knew nor cared. It was a soothing sound, one that reinforced his hesitant suspicion of concern: genuine, legitimate concern. When he had first heard of Lott's demand for his presence, he couldn't decide whether fear or resignation would be the more appropriate emotion. Yet as the conversation wound on, she grew ever more impassioned, and he grew ever more hopeful, leaving her with the names of his fellow officers, and left with a rare sense of hope.\n\nThe door opened. "We'll do all we can for you, Júlio," said Lott, shaking his hand.\n\n"Yes," said da Cunha, "it will not be long before the cabinet meets again, and we will ensure that Adhemar hears your voice above all else." With that, the pair departed, yet as they left earshot, a familiar voice took their place: a barking, commanding voice.\n\n"Get back to work, or it's my office.""
brazil_adhemar.167.a: "And with a sigh, he obliged him."

brazil_adhemar.168.t: "...the More They Stay the Same"
brazil_adhemar.168.desc: ""Adhemar," said Lott, standing in the doorway, da Cunha beside her. Having ensured their early arrival, she scanned the room, taking satisfaction with each empty seat—assuming a pained grimace with the sight of Müller.\n\n"Edna and Vasco," Adhemar feigned mild delight, "it is always a joy to see such punctuality. Please, take your seats."\n\n"There is a matter of grave importance that must first be addressed. Da Cunha?"\n\nOn cue, he opened a manila folder, reading testimony after testimony of the far-from-warm welcome Brazil's so-called "untermenschen" had received. He took great catharsis in its forceful closing.\n\n"We have come here to speak of the plight of our nation's finest," said Lott, the corner of her eye revealing a rarity indeed: Adhemar's muted agreement. "Just as we would demand of the Americans, the Germans must provide dignity, keep away such instigators, and not be heard over our own." For a moment, it seemed as though none would be willing to break the silence.\n\n"With all due respect," said Müller, "is that all you have come to provide? Pitting sentimentality and hearsay against years of careful negotiation? To be quite honest, Edna, had I heard this from another, my mind would have thought it treason." His voice was laced with venom, every word aimed at moving her to anger. But she would not budge.\n\n"That is more than enough—from all of you." Adhemar sat up, his expression steeled. "These reports are of great concern, but I will not cast our nation adrift for them. However," he raised his index, shutting down all protest, "I do believe Médici has the time for an investigation." At that, he gave a sly grin to the room before uttering the words Lott had long anticipated."
brazil_adhemar.168.a: ""Now none of you are to ever speak of this again.""

brazil_adhemar.169.t: "An Echo of 37"
brazil_adhemar.169.desc: ""...so we do not actually know how many there are?" Edna felt her stomach drop, clutching the telephone in her hand.\n\n"It is slow to spread, or seems slow, which can be of use to us, however..." Brizola's static-filled voice trailed off.\n\n"The upper officer corps are not what they were before." Edna assured him. "My father made sure of it."\n\n"I would certainly hope he did." Brizola replied ominously.\n\nEdna was almost speechless. "It's... happening again?"\n\n"Constitutionalists within the army and navy are as reliable as the seasons." Brizola tried to be reassuring. "But...Adhemar has a way about things."\n\n"You would be one to know." Edna pushed her glasses up with the point of her finger. "No offense."\n\n"None taken." Brizola's chair creaked through the phone as he leaned back in it.\n\n"The PSP have loyalists among the admiralty too?" Edna felt her fist clinch.\n\n"Do whatever you have to do to keep the PTB behind you." Brizola sounded truly troubled, he had lived through this once and that was once too many. "However many there are, they are waiting for the hammer to fall."\n\n"I will do what I can." Brizola sounded resolute, but there was a pain there, he knew what it all meant as much as anyone. "Pray for me as I do for you.""
brazil_adhemar.169.a: "I will... and I will not forget this, thank you." Edna Lott felt her hand tremble as she hung up the phone."

brazil_adhemar.170.t: "To Play is to Lose Something"
brazil_adhemar.170.desc: "The crackling of a distant fireplace set the tone for the anger that flashed through Edna Lott's eyes as she sat on the couch reading Business Week with growing disbelief, the flames reflecting off her wire-rimmed glasses. She had found the magazine bundled with the rest of her mail and only gotten to it when she got home; otherwise, she might have ignored it, just another puff piece-filled paperweight to make magnates feel better about their leeching, or so she thought, until Adhemar's name came up... and the plans he hoped to unveil.\n\n"Treasure Trove in the South Atlantic." The article was utterly decadent in her eyes, an affectionate litany of sophomoric greed disguised as economic expansion; Adhemar's proposed development plan detailed the establishment of cosmopolitan commercial zones for recreation, entertainment, and tourism, flowery words describing construction projects for casinos, sports complexes, and other venues to seed a burgeoning gambling industry for the Brazilian economy.\n\nEdna felt a great deal of disgust as she rose from the couch, enough to eclipse the very slight satisfaction she took in tossing the magazine into the crackling fireplace. Brazil was hardly a nation that needed more sinners, which made Adhemar's plan to stimulate the Brazilian economy through a government initiative to build its own Sodom all the more heinous.\n\nAs the magazine coiled and blackened in the flames, Edna crossed her arms and sat back down, sourly working out the opposition's response in her own mind. She might be a leader of the Left, but she was a pious woman; rarely was there a Brazilian who wasn't. She knew well enough that virtue had to be checked at the door when it came to politics, but that didn't mean you couldn't try. Brazil's leaders had a responsibility to light the way to something greater for their countrymen, not to profit from their worst impulses.\n\nEdna Lott's thoughts were livid: "Men and women struggle for a better life, all while Adhemar chases the lights of Las Vegas for his own benefit, goddamn him!""
brazil_adhemar.170.a: "The opposition's response would be fiery indeed."

brazil_adhemar.171.t: "The President's Own Writing on the Wall"
brazil_adhemar.171.desc: "Santa Bárbara do Pará was just as vivid in person as it was on the post cards, an almost Disney-esque portal into the ideal of Brazilian suburban life. One of the prominent municipalities in Belém, its scenic beauty and lively local custom could see it compared to the coastal Californian township of the same name. This etymological similarity was shared with many Lusophone and Latinophone locales across the world, hence why Belém's Santa Bárbara bore the name 'Of Pará.'.\n\nThis was what made it an excellent choice for Edna Lott and her accompanying Labour entourage, hoping to extend their appeal to more middle-class voters in this colorful northern town. She and her people had spent the early part of the day touring the center of town, meeting with local leaders and posing for photo ops. It was the standard fair political rotisserie, the warm afternoon sun and the smiles of the passing townsfolk as a backdrop.\n\nSomething absurd stopped her in her tracks however, the otherwise austere opposition leader having to stifle her own laughter; "Just look!" she actually said, her ears not wanting to believe her mouth just as her eyes almost couldn't process what they were seeing. Adhemar had the occasional absurdity to him, but this one was simply remarkable even for him.\n\nOn a formally bare wall along the boulevard, one of Adhemar's posters had been plastered for all to see. It depicted the sitting President alongside a line of Brazil's most venerated leaders in history's past; Getúlio Vargas, Juscelino Kubitschek, and even her own father, the Field Marshal Henrique Lott. Beneath them and at the foot of Adhemar's portrait read "Great Builder of the Great Republic of Great Brazil." It was self-aggrandizing nationalism as if depicted by an actual child.\n\nEdna Lott was probably being too generous in assuming the poster was a parody - it seemed too painfully egocentric to not be - but there was an almost charming irony in depicting himself as a lauded figment of the past; Election season was still some ways away and his term was by no means over, yet he seemed to be doing her party's work on their behalf in portraying himself as an antiquated relic of Brazilian politics."
brazil_adhemar.171.a: "One can enjoy being petty every once in a while..."

brazil_adhemar.172.t: "Familiar Foundations"
brazil_adhemar.172.desc: ""Surely, it has not escaped you how you're risking here?" Samuel Wainer swirled the coffee in his cup.\n\n"We may all be at risk." Edna Lott brushed her hair aside. "Not unless we respond."\n\nWainer blinked, this was serious then? "Who is he meeting with?" Wainer pulled a binder from his desk.\n\n"Minas Gerais for a start, an afternoon at the stables with the ranch owners." Edna sat perfectly still, betraying the far-off look in her eyes.\n\n"And... where next?" Wainer prompted.\n\n"São Paulo."\n\nWainer blinked again: "Who with?"\n\nEdna Lott did not respond.\n\nWainer's eyes began to wander, worrying. "...the Coffee Barons?"\n\nEdna held her hands on her lap, one over the other, gripping tightly, the knuckles turning white.\n\n"...and... there's more meetings besides." It was not a question, Wainer himself had heard something that said as much. His stomach dropped.\n\nEdna leaned forward: "Surely, you can see what this looks like?"\n\n"Why come to me?" Wainer's voice almost cracked, the implications were damning.\n\n"For the sake of my country and yours, sentiments Adhemar seems to share very little."\n\n"Or too much." Wainer tossed the binder on the desk, gripping the bridge of his nose, wincing.\n\n"Do whatever you can, share with whoever you can, but by God be careful." Edna straightened her glasses as she stood.\n\nWainer sighed: "I'm no miracle worker but I will help however I am able."\n\nAs she was leaving, Edna turned to face him."
brazil_adhemar.172.a: ""You live in a nation of God, where the land itself is a living miracle... what's one more?""

brazil_adhemar.173.t: "Frostfall for the Devil"
brazil_adhemar.173.desc: ""I need your help"\n\nThe words could not have shocked Edna Lott more, Adhemar continued: "I realize you are a busy woman, as I am aware that your constituency has little love for me. That having been said, I had hoped we might talk, if only for a moment." The air in the Planalto was thick with contrition, the normally pugnacious Presidente de Barros now uncharacteristically civil in her presence. His thinly-veiled, poorly-disguised condescension she was so used to seemingly scattered to the wind.\n\n"And why would you be wanting that?" Edna replied, with a hint of incredulity. "I would assume the affairs of the fairer of species to be beneath you, Don Adhemar. I know about the reforms Progressistas have been pushing lately; Fanciful reading, I must say." Edna pushed her glasses up with the point of her finger. "I don't recall this impetus for bipartisanship when Jango was around."\n\n"You can give me some credit, I can be impartial." Adhemar responded with a slanted scowl, more than a hint of defensiveness. "Neither of us have to make assurances as if we were lawyers and besides, the reforms within our platform dovetail with your own, the same ones Jango himself supported, if I recall correctly."\n\n"You would be correct, so I suppose it isn't the only instance of you bucking the trend." and here's hoping de Barros bucking the trend does not itself become a trend. "You surprised me, Presidente. If Progressistas are willing to cooperate, they can expect Labour to reciprocate. This is a grand opportunity for both our parties, for that I hope, God willing, we can make something more of this." de Barros and Lott saw their outstretched hands meet in the middle, a series of phone calls from either of them was soon to follow."
brazil_adhemar.173.a: "Edna had to stifle her revulsion, as much for her party as for her own sanity."

brazil_adhemar.174.t: "Taming a Tempest"
brazil_adhemar.174.desc: "45 minutes on the clock. Edna was almost stamping her feet, her physical agitation occluded only by a dull-brown table. Almost as dull as her damn associates, who should have already been out of here by now out of mere loyalty. A sigh. She tried again.\n\n"My friends," her voice suddenly rang out, "we will not get another chance like this bill. Agrarian reform will not happen with the Udenistas and it will not happen with Kubitschek's cartel. It will only happen with us; we in the PTB at least must take a stand for farmers."\n\nA murmur from further down the table spoke up. "Goulart's bill is better, we must vote with him," and another smattering of applause and agreeing murmurs broke out. Oh, even puppet shows were less childish.\n\n"But Goulart's bill will not pass, so who are you really voting with?" Her retort came out faster than her brain could process it. The back end of the room looked startled. "Jango's bill is great, we agree on that. But when there is no great, we must at least have the good."\n\nThen the dam broke. "How will you control sharecropping?" They'd talk to Adhemar later. "Why would Adhemar do anything for us?" Because they were in a coalition? "You have a party to represent, Edna!" A party, not a mob - people had the right to opinions. "You put even Jezebel to shame!"\n\nAt least the room was equally aghast; decorum wasn't dead yet. Yet every time her colleagues attacked her, clasped by a fear of their constituents' ire, their fear of her own grew. What had begun as outright rebellion had melted into paper shuffling and seat-squeaking.\n\n11 minutes to go. A majority secured. This "Jezebel" was still queen of her palace."
brazil_adhemar.174.a: "All in half an hour's work."

brazil_adhemar.175.t: "That Progressive Woman"
brazil_adhemar.175.desc: "Adhemar looked down at his desk, only now noticing how incredibly still he had been for the past few minutes. Had he really been so deep in thought? Sitting back up, he placed his hands on the sleek surface of the desk, trying to keep his mind organized lest it wander any further.\n\nA past conversation with Edna came to mind. Guaranteed maternity leave — one enforced by law — was what that woman wanted. But the truth was, whether a man or a woman, Edna represented some of the common 'progressive' talking points. Where some saw a drain on resources, people like her saw an investment in families.\n\n"Investment in families..." Now that he said it out loud, it had a nice ring to it. This was the kind of thing that made the birth rate go up. More Brazilians meant a stronger Brazil. Hell, his portrait might even get put up in the homes of those few people who were born and lived thanks to his clever-\n\nThere it was again. That intricate awareness of stillness. Clasping his hands together, Adhemar straightened his back. As much as he would like to put his name on it, that simply wasn't an option. And even if this proposal was Edna's, it was still worth pushing through.\n\nHe was a smart man. He would come up with other ideas — better ideas — in the future. Let her have this one."
brazil_adhemar.175.a: "How very magnanimous."

brazil_adhemar.176.t: "Sitting by the Radio"
brazil_adhemar.176.desc: ""My fellow Brazillians," Adhemar began his speech to the expectant crowd of thousands, "I must thank you all for your continued support, I couldn't be more grateful." He brought his hand to his heart.\n\n"However, it seems as though there are some who are not as happy with me, and I am not talking about my opposition. Instead I talk about a much closer threat. I speak of the PSP 'members,' if you can call them that," he scoffed before continuing, "who continuously sabotage me and the party that they pledge their loyalty to!" The crowd jeered at the thought of PSP members fighting against their leader.\n\n"Maybe they would fare better in the UDN," the crowd erupted into laughter. "I joke, but these people are the same types who abandoned Vargas, and just as I try to keep the nation running through thick and thin, these crooks try to hamper me in the exact same way, but I won't go down easy!" The crowd erupted into cheers as Adhemar raised a fist to the air.\n\nWaiting with intent by a radio was Tancredo. Adhemar was getting far by touting his victories and portraying himself as the second coming of Vargas. He wouldn't just stick to this though. Tancredo. There would be more to come from him."
brazil_adhemar.176.a: "A poor man's Vargas is still Vargas."

brazil_adhemar.177.t: "Returning to the Schoolroom"
brazil_adhemar.177.desc: "As the assembled delegation of representatives, reporters, and other notable figures was escorted through the hallways, even those opposed to Adhemar had to acknowledge the sights in front of them.\n\nThe school, refurbished through the funds Adhemar had secured, was clean, modern-looking, and filled with students both new and returning. The youngest were learning to read, their instructors applying a new and standardized learning scheme, and they were doing well. Some of them were even learning alongside their older siblings (though by and large doing better than overall), who themselves had returned to make up a deficit from earlier in life in a time before Adhemar's policy.\n\nIn other classrooms, slightly older children were learning mathematics, and many were learning other topics besides. Of course, given their young age, many of the children were playing board games or otherwise fooling around, but the energy was undeniable. Some of the reporters began asking the students about their future dreams. Many had no answer yet, or answers along the usual.\n\nOne young boy, however, clearly impressionable and bright even among his peers, stood out. When asked, he was decisive - he wanted to be a doctor, just like President Adhemar."
brazil_adhemar.177.a: "Clearly the best choice."

brazil_adhemar.178.t: "Pandemonium in the Congresso Nacional"
brazil_adhemar.178.desc: "As the final vote was announced on the Congressional display, and the victorious PSP delegates rose in celebration Adhemar, watching from his reserved location, couldn't help but allow himself a small chuckle. It was, after all, a good outcome. For him, at least.\n\nCampos and his coterie of UDN delegates were howling in outrage as they watched the PSP members shake hands with the Udenists, impotent in their ability to change the now-decided outcome. Shouting that the 'collaboration' in front of them was tantamount to introducing Communism into Brazil, they obstructed every measure to return stability to the session.\n\nAs independents, the Christian Democrats, and delegates from other minor parties left the chamber, not wanting to become involved, the Speaker tried in vain to restore decorum and order. To their credit, Tancredo and the PSD delegation attempted to support them, but success was blocked. The disruption continued long into the night, and ended only when the session itself came to a close.\n\nThe measure, however, had passed."
brazil_adhemar.178.a: "Absolute chaos."

brazil_adhemar.179.t: "Pandemonium in the Congresso Nacional"
brazil_adhemar.179.desc: "As the final vote was announced on the Congressional display, and the victorious PSP delegates rose in celebration Adhemar, watching from his reserved location, couldn't help but allow himself a small chuckle. It was, after all, a good outcome. For him, at least.\n\nBrizola and his coterie of PTB delegates were howling in outrage as they watched the PSP members shake hands with the Udenists, impotent in their ability to change the now-decided outcome. Shouting that the 'collaboration' in front of them was tantamount to introducing a capitalistic oligarchy into Brazil, they obstructed every measure to return stability to the session.\n\nAs independents, the Christian Democrats, and delegates from other minor parties left the chamber, not wanting to become involved, the Speaker tried in vain to restore decorum and order. To their credit, Tancredo and the PSD delegation attempted to support them, but success was blocked. The disruption continued long into the night, and ended only when the session itself came to a close.\n\nThe measure, however, had passed."
brazil_adhemar.179.a: "Absolute chaos."

brazil_adhemar.180.t: "Abject Chaos in the Congresso Nacional!"
brazil_adhemar.180.desc: "As the final vote was announced on the Congressional display, and the victorious PSP delegates rose in celebration Adhemar, watching safely from his office over a direct feed, scowled and drained a small hip-flask.\n\nPSP delegates, trying to take the podium in the standing 'melee,' were being physically restrained by their Udenist and Petebist opponents, and every now and then the active microphone picked up curses and other angry remarks from both sides as the PSP members were restricted from speaking. Clearly furious, they grew increasingly physical as the session progressed, and soon began throwing whatever objects were at hand at their many, united enemies.Things only degraded from there.\n\nThose same enemies soon united, with PSD and PDC alike, along with a number of independents and smaller parties forming an alliance to bodily surround both Tancredo and the Speaker and usher them from the chamber with all speed. Eventually, with the objects of their ire removed and the session closing, their anger burned out, and soon dissipated.\n\nBut the failure still remained."
brazil_adhemar.180.a: "Just terrible."

brazil_adhemar.181.t: "The 'Decision' on Deinstitutionalization!"
brazil_adhemar.181.desc: "Those more familiar with the President knew that the cabinet agenda for the day was not one of decision, but one of explanation. The decision itself had already been made, of course - but appearances had to be maintained. And so they were.\n\nA particular focus of Adhemar, pursuing a policy of deinstitutionalization and focusing on medication and therapy for psychiatric patients, rather than confinement, had drawn intense 'debate.' It was obvious that Adhemar's functionaries, as well as Natel, were for it, remaining as expected in full alignment with the President and understanding the dynamic at play. Others were not so aware.\n\nFilinto Müller has been the most difficult, and was subjected to a fifty-page presentation and a twenty-minute lecture from Adhemar before finally capitulating. A number of others, nonscientists all, needed even longer. Surprisingly, some of them even held their position - triggering a severe response.\n\nLate in the afternoon, far past the point where even Adhemar's staunchest allies would have expected his patience to run out, he ended the conversation. With a rare loss of patience he ended the conversation with a short word. The matter was going to proceed, he was clear, and all needed to be on board.\n\nThere was no other option. And very soon, no dissent. At least on the surface."
brazil_adhemar.181.a: "What did they expect?"

brazil_adhemar.182.t: "Psychiatric Reform, Reformed Psychologically"
brazil_adhemar.182.desc: "It would be the true turning point for the Brazilian hospital. So went the abstract, anyway: the impacts of President Adhemar's visionary policies on delivery of care just by tweaking the bureaucracy and putting it to work, real work. Deinstitutionalization was working wonders, and frankly it was a blight on all the previous administrations that his plans had not occurred to them earlier.\n\n"Again, Edna, you would be forgiven for thinking that," the Vice President's former classmate that happened to be a psychiatrist explained to her, "if you did not read the rest of the report. Figures which indicate the conclusion the President wants to draw exist there, but when you read the fine print, it's... astonishing, honestly."\n\nShe motioned to a table included in the second half of the hastily-printed copy between them. Each case study where a department transferred patients to community-based care as suggested saw, yes, better patient outcomes and less strain on psychiatric wards. But the cost was not being reduced, it was being displaced. Not to someone who could afford it, but so that the federal government no longer had to pay as much attention.\n\nEdna crossed her legs. She had to ask herself whether the man even knew about this, or just wanted some light reading, a day off with an easy win to take it all in - he was never a man to pore over and parse a report. Come to think of it, maybe it was not the knowing that mattered, but the caring. Did he care what happened to the hospital once the journalist's gaze went off? It didn't matter for her, she sold her principles away the moment she came up the Congress ramp.\n\nAll of a sudden, she laughed at it all, painfully so. Her friend, still waiting for an answer, became puzzled not only at her expression, but at the person she was staring at."
brazil_adhemar.182.a: "Changes are not creations in politics, but mutations."

brazil_adhemar.183.t: "Oncology's On Stage"
brazil_adhemar.183.desc: "Luís was a self-proclaimed realist first, and thus an Udenista second, not the other way around. His oncology department ran on pens, books, and bookshelves out of his own pocket, or from a wealthy donor's he had not spoken to in years. This was Brazil, he would say, where all kinds of fruit grew on trees, but money did not. The sciences, then, had to pay for themselves.\n\nToday, however, his principles were tested. The rector greeted him with a booming voice and a brimming smile. Immediately suspect. The university grandees always had a scandal in hand, and so had little room left for brightness. Yet, this time, there was real cause for cheer: the University of São Paulo's oncology and radiology departments were getting the largest subsidy increase they saw in history.\n\nThen he let his guard down, and let realism give way to a romantic futurism. He suddenly saw himself wielding new Hitachi imaging gear, his ancient wooden tableware swapped for modern desks, a swarming faculty of professionals and more reports and incisive tests than ever. All of it, for a fleeting moment, was right in front of him, and he was about to put the city on the map cancer research all by himself.\n\n"Hold your horses, I wouldn't get too excited yet," tutted the rector, waving a folded paper. "The President won't be handing money to anyone unpatriotic enough to doubt Brazil's achievements since the inauguration." Luís's cheeks reddened as he strung together a few bureaucratic, deferential lines. But once the rector had savored forcing a UDN man to kneel at Adhemar's feet, he burst into laughter and revealed the real conditions - merciful ones, thankfully.\n\nIf they hadn't been friends inside and outside the building for years, Luís might have hit him for that stunt. But then, once he had mellowed down again, he realized one very satisfying fact..."
brazil_adhemar.183.a: "...he had Adhemar's cancer to thank, not him."

brazil_adhemar.184.t: "The Open House"
brazil_adhemar.184.desc: "Compared to the ancient buildings that flanked the area, it looked like the new school was dropped here in rural São Paulo by accident. It was much too modern — much too nice. The warm pastel tones of its walls reminded the children of the expensive plates their parents refused to take out. The design was so inviting, in fact, that most of them actually stuck around during the entire open house instead of rushing straight for the playground.\n\nIn the meantime, the parents marveled at the new rooms, the new desks, and the new shelves. Most of them had spent their entire lives with hand-me-downs, so to them, this was the next generation being spoiled. But then again, there was no skimping when it came to their children's futures. A few of the fathers even stared out of the wide windows to watch the boys kicking the ball around the fresh football field with a touch of envy.\n\nBoth the parents and the children seemed pleased, so it was time for the priest's blessing. Dressed in robes, he moved from classroom to classroom — a small crowd of curious children trailing behind him like a procession. In his hands, he carried an aspersorium, a vessel of holy water, and a small aspergillum, with which he sprinkled droplets upon the walls.\n\nA framed portrait of Adhemar hung in each classroom (as was the tradition). The children really didn't know who the man was, but — judging by the way their parents talked about him — the guy must've been important. Now, thin strands of holy water left silver streaks across his smiling mug."
brazil_adhemar.184.a: "You're welcomed."

brazil_adhemar.185.t: "Trust, but Verify"
brazil_adhemar.185.desc: "Against every measure of what their previous discourse should have implied, the mood in the Planalto was welcomingly pleasant. Adhemar de Barros Filho treated Edna Lott with a courtesy least expected from him and most appreciated by her. The two of them sat opposite each other, Edna guiding him through some of the PTB's programs for education reforms for Teachers. She hoped to maybe bridge the gap that had formed in recent years, one that had largely been spearheaded by the gentleman sitting in front of her.\n\nEven now, it still read like a paradox to have de Barros suddenly be so cooperative. Labour was rarely looked on without scorn from political machinists like the Progressistas, something that made the recent overtures by de Barros reassuring. Then again, Adhemar was a doctor before he was a politician; His position on addressing the needs of Teachers might actually come from a place of humanity, much like her own.\n\nde Barros's words brought her back from her analysis, placing a gentle hand on his desk as he leaned forward. "And you can assure me that your party is content sharing this with my office? That this can pass the legislature?"\n\n"You can give me credit, Adhemar, It might seem like heresy to see me here, but I was elected for a purpose." She put too much emphasis on her words than she had intended, a hint of playful mirth hiding behind her eyes, as if to continue and say and you were not. Whether the (mostly) unintended jab registered with de Barros, Edna couldn't say; He sat leaning into his finger again, pressing against his temple, that slanting sneer on his lips again. Oh, don't get prickly on me now, old man.\n\n"F-Forgive me, Presidente." Edna awkwardly adjusted her glasses, nodding curtly. "You have my utmost assurance on this matter; it'll pass with hardly any dissension whatsoever. I promise." Adhemar brought his finger to his lips, raising his eyebrow as his sneer softened into a soft grin."
brazil_adhemar.185.a: "Edna's smile was less forced than before."

brazil_adhemar.186.t: "Mandated Directives on Education"
brazil_adhemar.186.desc: "As the officials assembled themselves, awaiting the arrival of the Minister of Education - late as usual - they steeled themselves for what they knew was about to come. A demonstration of sheer idiocy.\n\nThey were not disappointed.\n\nThe Minister began by presenting a long list of policies, helpfully for him also available in diagram format. The plan was clear, rationally ordered and, the officials all observed silently, almost completely coincident with the PSP's electoral manifesto. The Minister of course made no mention of this, insisting that the policies were both technically sound and directly targeted on the problems faced by the contemporary Brazilian education system.\n\nAfter lunch, the officials were to be invited to ask questions and present constructive criticism, but this turned out not to be needed at the Minister's insistence. Clearly, he said with great certainty, the plans were correct and without fault, and at this the officials looked at each other and silently agreed in the specialized and well-known way of careerists. Following the agreements of implementation, the Minister quickly left, leaving execution in the hands of 'those eminently capable.'\n\nThey would gripe on the inefficiencies and poor thought of many of the polices to each other later."
brazil_adhemar.186.a: "To Future Success!"

brazil_adhemar.187.t: "What Makes A Smile"
brazil_adhemar.187.desc: ""This is, uh.." He couldn't help but blurt out, wiping his eyes, he took a second look at the paycheck in his hands. It was real, but it was paying a school teacher like him way more than he was used to. 'Actually-' his mind sped into gear, '-with this amount of pay, I could have a shot at living!'.\n\nDiverting his eyes off the unreal paycheck, they lingered on the frugal furniture of the small structure he called home, how they could be replaced with something that could brighten up his home and make his grin a few centimeters bigger. Or maybe he could afford better appliances! Forget a single nice plate as a small treat, he could buy a whole set!\n\nDiving back into the paycheck, pieces clicked into place. 'This is what the principal meant by "Adhemar arranging raises"! I know what to buy now! A drink!' His mind wandered to the more fanciful bottles of alcohol that he could only witness beyond a pane of glass. The teacher snapped back into reality recalling the costs of those luxuries, though, a cheap bottle wouldn't hurt.\n\nHe thought longer, coming up with a second item; a book. After classes end for the week, he would buy the alcohol and a new book and just... let loose a little. A swill sounded extremely nice, he would remember to toast to Adhemar for that. Getting the chance to read something new as well?"
brazil_adhemar.187.a: "That's all you needed to make him smile."

brazil_adhemar.188.t: "A Matter of Gratitude - and Reward"
brazil_adhemar.188.desc: "The meeting of the school board that day was one of celebration. President Adhemar's recent policy directive of reducing taxation of private institutions such as themselves had salvaged their mangled (and unreported) budget, and allowed those of whom were personally invested in the school considerable opportunity for profit.\n\nIt had other benefits too, of course. It widened the choices of available education in Brazil, expanding the opportunities available to Brazilian families and students, and meant that additional private investment could be targeted without overheads from taxation. For those invested in the system, like the school board, it was a triumph, the end of a long road of lobbying. For their students, of course.\n\nAs they spoke, the board began considering what else they could do to capitalize on the situation. President Adhemar, one argued, had been the driving force behind this change, and so should be appealed to as much as possible. On this they agreed, and began speaking as to where a very large portrait of him could be hung. It would show gratitude. It would even, perhaps, provide an excellent opportunity for a visit and a photo.\n\nAnd if it did that? Who knows what other benefits could be realized."
brazil_adhemar.188.a: "Opportunities Abound."

brazil_adhemar.189.t: "A Dinner - and Toast - to Success"
brazil_adhemar.189.desc: "With the successful passing of the Education Bill, it was a foregone conclusion that a celebration of some kind would need to be held. And so it was. An invitation-only dinner, hosted by President Adhemar, and attended by Edna Lott and the most elite and dedicated of their supporters.\n\nIt was a grand affair, and throughout it the two of them worked the room, shaking hands, conveying thanks, dispensing patronage, and executing all the forms of political process to which they were well-accustomed. It was a masterful show, an example of how the Bill had been passed, and proof to those in attendance that they had chosen the right faction to back.\n\nAs the dinner wound down, however, both Adhemar and Edna proposed a general toast, to many things and to polite applause. To the success of the Bill, yes, which could not of course been passed without the generous support of those present. To the no-doubt glorious future of Brazilian education which it promised. And, finally, to the health of each other.\n\nWhich was received with raucous applause."
brazil_adhemar.189.a: "Priorities clearly established."

brazil_adhemar.190.t: "The Aftertaste"
brazil_adhemar.190.desc: "Putting his glass of cachaça down, Adhemar printed the third wet stain atop the crumbled Congress gazette. Being half a bottle deep, the only part his bloodshot eyes could focus on were the large letters reading "EDNA'S IDEAS EDUCATION BILL FAILED."\n\nTwirling the dark amber liquid in his hand, the glass felt much heavier than it did this morning. Taking another sip, the liquid burned all the way down. Then, it settled into the pit of bitterness in his stomach, and Adhemar reached for another.\n\nEdna had been here earlier. She had offered him words of sympathy, a soft touch on his shoulder, and a promise that this wasn't the end. He had offered her a glass. She declined.\n\nNow that he was alone, Adhemar continued gazing into the dark liquid like an alcoholic version of the tea leaf reader. Had he been a fool to back her? Was this entire cooperation just a bad gamble? And would he be willing to admit it? His name was tied to this failure now, whether he liked it or not.\n\nUnable to get an answer from the cachaça, he took another sip — pressing the glass against his lips for a moment longer than necessary."
brazil_adhemar.190.a: "It was all so bitter."

brazil_adhemar.191.t: "The Toast"
brazil_adhemar.191.desc: "In many ways, being a politician was very similar to being a teacher. You sometimes had to wrangle people to do the right thing. Fortunately, no such wrangling would be necessary today. The bill for the Furtherance of Brazilian Education had passed, and Adhemar — together with the PSP delegates and Teachers' Union leaders — was here to celebrate.\n\nThe President raised his glass high — the golden liquid catching candlelight as he beamed at his entourage. Passing a bill like this didn't only look good in the papers. No. For him, it was personal. Education made Adhemar the cultured man that he is today. To deprive others of this opportunity would be cruel.\n\n"To progress!" he declared, raising his glass. "To a modern, educated, cultured Brazil!"\n\nSoon, an army of champagne glasses rose to match his, with everyone joining in on the toast.\n\nAfter he was done, Romeu de Campos Vergal made a toast of his own. "To Adhemar — the man who made it all possible!"\n\n"That's right!" The head of the Teachers' Union clumsily lifted his glass back up. "To Adhemar!"\n\nLaughter bubbled from Adhemar's chest. God, how he loved this. The admiration. The prestige. The feeling that he was shaping history."
brazil_adhemar.191.a: "It was all so sweet."

brazil_adhemar.192.t: "Schadenfreude"
brazil_adhemar.192.desc: ""In today's session, the 'Fulfill Our Promises Education Bill' — spearheaded by Adhemar de Barros — has failed to secure the necessary-"\n\nEdna listened to the crackling voice of the radio announcer with hands on her lap. Eventually, she managed to tune him out as the man repeated everything she knew about the bill in pedestrian terms. There was now just this dull buzzing in her head — like the sound of a radio tuned to a dead station.\n\nShe should have felt something — something stronger. Relief? Satisfaction? Maybe just the good old-fashioned Schadenfreude? After all, Adhemar had insisted on going into this alone. She had warned him. She had offered to collaborate. Had he listened? No.\n\nAnd yet, she wasn't pleased — no, not really. Education reform was necessary. They both knew that. But Adhemar's refusal to cooperate had doomed him from the start. That, too, they both knew.\n\nEdna leaned back. She could picture Adhemar now. Alone in his office. Brooding. Drinking. Convincing himself that the system was rigged against him. Would he learn from this? Would he come to her now and admit that she had been right?"
brazil_adhemar.192.a: "And would that even do any good?"

brazil_adhemar.193.t: "The Real Coup, Was The Friends We Made Along The Way"
brazil_adhemar.193.desc: "Adhemar watched the small TV that sat on his desk while the phone continually rang. The sound of his palpitating heart was only interrupted when he heard the dial tone stop.\n\n"Natel! Are you seeing this?!" Adhemar screamed down the phone. Natel didn't need to ask what Adhemar was looking at as he was seeing the exact same thing on his own TV set. Some no-name Colonel had taken over a new station and was reading a list of grievances against the government and declaring a so-called "Salvation Government". It was an uprising, one that needed to be crushed quickly.\n\n"What do you want me to do about it Mr. President, you know crushing it will be hard since you've got few friends." Natel spoke over the phone gravely, while Adhemar took a deep breath, pinching the bridge of his nose. "I understand Natel, access the slush fund and write the cheques to the right people. After that; take some loyal battalions and show these traitors what we're made of." Adhemar commanded and Natel swiftly took his leave while advising the President to think about making more friends.\n\nAdhemar didn't need to be told twice, his heart rate slowed down and he could finally catch his breath. It was a bizarre situation; the birds sang outside, his office was completely still and the news channel was cut and replaced by the monotone buzz of the technical difficulties screen. His country was in the middle of a coup yet it was no different than any other day.\n\nAs he sat back and rubbed his eyes, he considered his luck and how this can't happen again, lest his government be remembered as the death nail of Brazilian democracy. He tried to suppress the feeling of dread by switching the channel and he ended up stumbling on a children's cartoon about the importance of friendship. He grimly chuckled."
brazil_adhemar.193.a: ""Maybe this can teach me how to gain allies.""
BRA_adhemar_military_warned_tt: "§ROur presidency has lived to see another day, but next time we won't be so lucky.§!"

brazil_adhemar.1000.t: "The Healthcare Act Passes"
brazil_adhemar.1000.desc: "Today there has been much rejoicing in Brasília, after the announcement that the new Health Care Act had successfully been approved by Brazil's Legislature and become Law. President Adhemar de Barros has organized a rally in Brasília's city center to celebrate the law's passing. At said event, President Barros has thanked both his own party efforts in passing the law alongside the, according to him, 'surprising aid' that came from the legislative Varguist Opposition, PSD-PTB.\n\nJust like in Brasília, there have also been festivities all throughout Brazil's major cities celebrating the passing of Barros' Health Care Act. Many have said and feel that the Act has been a great achievement for the nation and shall ensure that all Brazilians lead healthier and better lives for generations to come. And although the UDN's most prominent leader Carlos Lacerda has vehemently criticized the bill calling it a 'Populist trick that shall ruin Brazil's future', most of Brazil's media shares in the positive feeling for the act and has given a mostly positive covering of President Barros' first great achievement."
brazil_adhemar.1000.a: "Well the first act is over, let's see what he's got up next."

brazil_adhemar.1001.t: "The Healthcare Act Fails"
brazil_adhemar.1001.desc: "Chaos and Tragedy have hit Brasília, due to the outstanding failure of President Adhemar de Barros' first big legislative measure and project The 'Healthcare Act'. Massive demonstrations have erupted in most Brazilian urban centers. In Brasília, President Barros' has held a massive rally attended by his supporters in the PSP and among the population. He has openly decried that this 'a legislative measure, the greatest in modern history, and the most important since the abolition of slavery' that 'was betrayed by the largest amount of cowards and traitors South America has seen'.\n\nThroughout Brazil, PSP leaders and partisans have staged similar rallies and even riots in some small places. In the PSP heartland of the massive São Paulo metropolis, Governor Getúlio Vargas Jr., son of Brazilian Ex-President Vargas, has also held a massive rally in his state where he has stated amongst vehement protests: 'That this is just another proof that the so-called PSD-PTB Varguist establishment has done nothing besides betraying the ideals of his fathers for over a decade!' A 100 days in and President Adhemar has already has seen his first defeat."
brazil_adhemar.1001.a: "He may have lost a battle, but the war has just started!"

brazil_adhemar_flavour.1.t: "A Quiet Morning"
brazil_adhemar_flavour.1.desc: "As the sun shone brightly on São Paulo, Leonor Mendes de Barros quickly glanced at her schedule while enjoying a quick breakfast. A trip to an orphanage, before returning to give a speech at the São Paulo Law School as one of its teachers, and then a photo-op with her husband at a picnic. Her husband certainly knew how to keep her busy, she thought, chuckling, before hearing a knock at the door. Finishing her coffee, she adjusted her jewelry before stepping into a black limousine in the driveway of their home.\n\nAdhemar had always been a busy person himself, never content to sit still for even a moment. She knew that he always meant well for the people of São Paulo, and that's why she loved him in the first place. His dedication and kindness to the people of São Paulo was shown through his philanthropy before he was elected as mayor. Such acts ensured that Adhemar had vast popularity in São Paulo, giving the PSP its base for the past decade, among Brazil's poorest citizens and its most conservative elites. But of course, Leonor was right there by his side.\n\nShe did worry for him though. Even though it had barely been a year into his first five year term, Adhemar had already begun drawing up plans for the next decade. As much as he pushed himself constantly, Leonor worried that he wasn't taking enough time for himself. As the São Paulo cityscape grew closer and closer in the window, she knew that she would still support him, no matter how crazy his plans or antics got. A small grin crept up her face as she stepped out of the car, facing a decrepit orphanage. She could see the little faces of children, abandoned, staring at her with big eyes and wide smiles, their hands waving enthusiastically at the First Lady of Brazil.\n\nIf Adhemar wasn't done helping these children, then, neither was she. And Leonor Mendes de Barros knew that she had a critical role to play in ensuring Brazil's future would be better for not just these children, but for everyone."
brazil_adhemar_flavour.1.a: "The mother of the PSP will care for all."

brazil_adhemar_flavour.2.t: "A New Spot for the Afternoon"
brazil_adhemar_flavour.2.desc: "Francisco didn't understand why João insisted that they meet up in a different cafe to play cards. For almost two decades, they had been meeting up in the same cafe with several others to play some old fashioned cards, and enjoy some quality coffee. Sure, there had been a minor protest across the street, and the ashes of the burnt Adhemar portrait did leave a bitter smell in the area for a bit, but the police handled it well. João said he felt uncomfortable after that, and excused himself from cards. But João was a good friend, so Francisco agreed to the new spot for cards.\n\nAs he walked through the winding favela, he thought that despite living in São Paulo for over 60 years, that he had never walked through this specific one. It wasn't even that far from his home, and God knew that he could certainly use the exercise at this age. But as he looked around the windows as he walked, he noticed a significant number of banners and flags for the Partido Trabalhista Brasileiro, or PTB. Francisco couldn't help but feel that he was being watched by someone, or something.\n\nAHe was so lost in thought that he didn't notice that about twenty yards behind him, João was calming down two teenagers, one of which was armed with a bat. João assured the two enforcers that Francisco wasn't the enemy, despite Adhemar's recent actions to ally Brazil to the Pakt. While João understood the tension, he reiterated to the two youngsters that Francisco was a friend, and just here to play cards. As he heard the conversation, Francisco turned around, before waving at João. The two men would then walk together to the cafe, sitting down at a table of six to relax and enjoy an afternoon of cards.\n\nAFrancisco didn't realize it until he had made it halfway home to his favela, but he was the odd one out in that favela thanks to his skin. If it wasn't for João, he likely would've noticed it before he had reached the cafe."
brazil_adhemar_flavour.2.a: "Looking out for one another: that's what friends do."

brazil_adhemar_flavour.3.t: "Metropolitan Inversion"
brazil_adhemar_flavour.3.desc: ""Iberia, you see, is a far-off land, across the Atlantic! It may be our forefathers, but in the present it isn't ours. Go out there and make a good impression of us, go see if they've changed!"\n\nAdhemar spoke to the jersey-clad men of Santos in a gregarious fashion, as if at a private meeting, but camera shutters broke up his laughter. After a routine round of clapping, questions poured in. He was happy to answer them, emphasizing on several occasions the moral support he is offering the team. The athletes themselves were uncertain—they'd been pushed into it—but played their role well, posing and grinning for the presses.\n\nThe visit was a two-pronged approach: A public smash and a diplomatic meeting to accompany it. Iberia wasn't Brazil's future, either, but Europe could very well be. Tack on a third prong with a hearty smile for the camera, Monday's newspaper across the nation, and it was a winning combination. There was perhaps no easier promotion.\n\nOf course, who else to shake hands with but the King of Football? Adhemar himself was a good sport, leaning in close to Pelé for a perfect shot and patting his back. Still, the striker couldn't shake a bit of unease in the room, an artificiality to the good times. It wasn't a malicious atmosphere, to be sure."
brazil_adhemar_flavour.3.a: "It was just pre-planned."

brazil_adhemar_flavour.4.t: "The Past and Future"
brazil_adhemar_flavour.4.desc: ""People of Barrópolis, I want to thank you and your hard work, of course, but also your choice of name, I think it has a nice ring to it," began de Barros to a hearty bout of laughs from the men boasting placards to reflect the man. After his brief comedy routine, he began to wince at the oppressive Amazon air, which seemed like a smile for his adoring crowds, ready to accept anything that their savior said. This company town, founded the same month that Adhemar came into office, owed its entire existence to him, after all.\n\n"Now is time to celebrate how far we have recovered from the Brazil our predecessors left behind. Before the PSP, there was nobody to listen to you. Your simple demands for a job and a home were ignored by the bureaucrats of Rio and Brasília. Well, I think you all will agree we have listened and we have delivered!" Like a crowd at a soccer match, cheers erupted and calls of "Adhemar" followed; the President knew he was playing a home game.\n\n"The cheek of it!" snapped one worker, leaning over the timber conveyor belt installed last month. The broadcast appeared everywhere that evening, and unfortunately for him, on the television set at the factory too. "That's what pisses me off most. He pops out of his air-conditioned palace up to the Amazon- once!- and indulges in the fools who entertain him."\n\n"Leave it," replied the other, having heard his coworker vociferate for twenty minutes now. "He's right, you know. We do have a job, not much of one, but we get paid. And we have housing, not those old favela shacks. We should be grateful-"\n\n"-to our slave masters, for not throwing us in a ditch. Because that's what we are, new slaves without the name. And don't ever forget it, or I'll take that log you're carrying and make you forget more than that.""
brazil_adhemar_flavour.4.a: "They stared into the past and future at once."

brazil_adhemar_forpol.1.t: "Behind the Schedule"
brazil_adhemar_forpol.1.desc: "Liana shuffled a stack of papers, filing into a cabinet in her desk before leaning back and enjoying the view of Brasília from the Palácio do Planalto. Six years ago, she was just a canvasser for the PSP in São Paulo, incessantly knocking on doors to spread the message of Adhemar and the PSP. She remembered the first day Adhemar had stopped into their campaign office, unannounced, thanking them for everything that they were doing. When her manager said that she was the hardest working member of that office, and Adhemar gave her a big hug as thanks, Liana's face lit up beet red.\n\nA decade ago, Liana was an orphan on the streets, scavenging through scrap piles to make sure she and her brother had something to eat. It was dirty and dangerous work, fighting with orphaned boys for bits and pieces of metal and plastic that often didn't have much value. They always underestimated her. When the PSP put up fliers looking for fleet-footed people to aid in their campaign, Liana didn't blink.\n\nAnd now she was Adhemar's personal secretary, ensuring that his day was filled to the brim with meetings, ribbon cutting events for new hospitals and schools, and media events. Some of the other secretaries in the PSP spread nasty rumors about how an orphan had kissed Adhemar's ass the most, so Liana got the top spot. But Liana knew how she got her spot: by simply being the best. Because as Adhemar always told her, it's what Brazil demands of the PSP.\n\nA knock interrupted Liana's daydream. "What were you thinking about, Liana?" said Adhemar with a smile.\n\n"Nothing, Mr. President. I will get right back to work!", stuttered Liana. Adhemar laughed, before putting a hand on her shoulder. "I'm sure you were at work. Can I see next Monday's schedule?" Liana handed over a typed sheet to Adhemar, who nodded as he skimmed through it. "Great work as always. Why don't we walk and talk about next week's events? And remember, stop being so formal with me. You make me feel old!", Adhemar said. Liana cracked a smile herself, before getting out of her chair."
brazil_adhemar_forpol.1.a: ""Of course, Mr. President.""

brazil_adhemar_forpol.2.t: "Empty Words"
brazil_adhemar_forpol.2.desc: "Adhemar rubbed his temple as he looked at the clock ticking on his desk. It had been another busy night for him, and that meant that despite his third cup of coffee, he could still feel the lack of sleep gnawing at him. As he took another sip, he heard a knock at his door.\n\n"Mr. President? Ambassador Kirk is here. Should I send him in?"\n\nAdhemar stood up and straightened his jacket. "Yes, Liana. Please." She nodded, and walked in with the ambassador. "Anything to drink, Mr. Ambassador", inquired Liana. Kirk removed his hat, and gave a faint smile. "I'd love a cup of your excellent coffee, if possible." Liana nodded, and left the two men in the presidential office.\n\n"Good morning, Mr. Ambassador. I hope the heat hasn't been too bad on you?", chuckled Adhemar. Kirk laughed, "Well, Mr. President, there are a lot of things I love about your country. But let's say that the heat isn't one of them. But your culture, your food, your people. I wish one day every German citizen can enjoy a strong cup of Brazilian coffee to start their day."\n\n"They certainly could soon. And what would the Reich be sending back to us?" asked Adhemar as he gestured Kirk to take a seat. "Well, I know some IG Farben executives have been eyeing up investment in Brazil, my father being one of them. Oil-based products and some rubber derivatives, mostly in Porto Alegre. It's got the port facilities we would need." IG Farben? That name sounded familiar to Adhemar. "IG? Didn't they used to be Bayer?" Adhemar said as he thought out loud. "That's exactly right, Mr. President. I'm shocked you knew that." "Yes, well. I did some translation work for them as a young man." "Well, that makes my job a little easier if you're acquainted with them. What do you say, Mr. President?""
brazil_adhemar_forpol.2.a: ""I think it sounds great.""

brazil_adhemar_forpol.3.t: "A Sunny Afternoon"
brazil_adhemar_forpol.3.desc: "Sitting in the shade of an awning that belonged to a small cafe, a man took a puff of his cigar. On the small table, an empty cup of coffee sat, having been consumed a while ago. He quite liked this cafe. It offered a great view of the bustling Rio street, with Cristo Redentor standing tall in the background. He pulled out a newspaper from his bag, reading the top headline. "President in serious hot water with new corruption allegations! Opposition leader proposing impeachment!". The man chuckled. What a curious process, he thought to himself. In his home country, this headline would have never been printed. He flipped through the newspaper as a black waitress began to bus down his table.\n\nSomeone like her wouldn't have a job in his country. The man looked at the street vendors, peddling their goods and food. The racial diversity astounded him; he had never seen so many people from so many different ethnicities and races congregate into one state. These people used to be our allies, the man thought. How did they become the US' lapdog in just a decade? At least some things in this country worked like his home. Just like how Hermann Josef Abs, a notorious Nazi banker, was able to slip into Brazil with the help of a fake passport and a customs officer who was paid not to notice the little details.\n\nAbs got up from his spot in the cafe, tipping his hat at the teenager working at the register. He knew that he had to make some calls back to his friends in Germania. As much as Brazil seemed foreign to him, he knew that there were ways to make inroads into this country for the Reich. There was a profit to be turned here, and Abs was going to lead the charge."
brazil_adhemar_forpol.3.a: "Money can always open doors."

brazil_adhemar_forpol.4.t: "The Night Shift"
brazil_adhemar_forpol.4.desc: "Adhemar stared at the stack of paperwork that Liana had given him before she had left for the night. Normally, the two were stuck in the Palácio until the early morning, sorting through paperwork. As he picked up his pen again, his phone suddenly rang out, startling Adhemar. Who the hell was calling at this hour, he thought as he picked up the receiver.\n\n"Is this the office of the President of Brazil? The office of Adhemar de Barros?", said a man in broken Portuguese. Adhemar's eyebrows furrowed. "Who exactly is this? I hope you have a good reason for calling this late", Adhemar said flatly.\n\n"Oh, I absolutely do. Adhemar, would you be so kind as to check the Palácio's mailbox? I left some files for you to review there." "I'm not doing shit until you tell me who you are. Your Portuguese is terrible, and it has an awful accent."\n\nAdhemar could hear a chuckle on the other end. "Fine, if you insist. Hermann Josef Abs, at your service, Mr. President. I've spent the last week or so touring your beautiful country. Getting to know your people, chat with a few industrialists. We here at IG Farben have been very interested in investing in both your country and your people. I'm sure you won't say no to thousands of new jobs, and grants for some of your youngest and brightest, will you? Once you give the green light, we have dozens of technical experts ready to guide your engineers towards a more prosperous future."\n\nAdhemar's mind swirled with a million thoughts. How in the world did a known Nazi banker manage to get into Brazil? Tour the country? Who did Abs talk to? What promises did he make? What other German agents were in his country? "I'll take your silence as a soft yes. Why don't you review those documents, and get back to me with an answer at a more normal hour? I really do need to get to bed. Good night, Mr. President; I eagerly await your approval." The receiver clicked."
brazil_adhemar_forpol.4.a: "Adhemar slumped in his chair, dumbfounded."

brazil_adhemar_forpol.5.t: "The Daily Motions"
brazil_adhemar_forpol.5.desc: "Filinto Müller took another sip of coffee, reading a memo that Adhemar's secretary had passed along to him. The PSP were certainly a lot looser with their political secrets than the PSD was, Müller thought, putting the empty cup back on its saucer. As he fixed his tie and headed for the Senado chamber, he ran through the votes again in his head. If nothing had changed since he last checked, Müller knew that he had more than enough votes to bypass that useless communist the PSP called their "leader". Even if he had just switched parties, Müller knew deep down what Brazil needed to do if it wanted to rise back to the glory of the Estado Novo days.\n\nOpening the doors to the Senado, he saw the aforementioned leader, Romeu de Campos Vergal, speaking to several other pigs from the PTB, looking for votes on a pointless social welfare bill. As he took his seat, he raised a single finger, signaling his intention to try and get the attention of the President. Much to his luck, he was quickly called on. A slam of the gavel and a "The chair recognizes the gentleman from Mato Grosso" later, Müller held up the bill he had spent months drafting.\n\n"I would like to introduce the 'Nullification of Embargo Against the Pakt' Act, please." A smile crept up Müller's face, and he stared directly at Vergal, who could barely hide his shocked expression. Just as Müller finished his sentence, the chamber erupted into chaos, with heckling from various UDN and PTB senators, and the PSD shouting alongside them.\n\n"Gentlemen, gentlemen! Surely we can all agree what needs to be done for Brazil to prosper again!" Müller shouted. The gavel's loud banging continued to grow in intensity, but it was useless against the rapidly deteriorating Senado chamber. Pens began to be hurled in the direction of Müller, with his fellow Senators from Mato Grosso seeking shelter under the desk they all sat at."
brazil_adhemar_forpol.5.a: "At the end of the day, Müller was the proud owner of 46 new pens."

brazil_adhemar_forpol.51.t: "A Warm Welcome from Brazil"
brazil_adhemar_forpol.51.desc: "The raucous shouts of the Senado quickly turned into an all-out brawl, with the embargo against Germany officially lifted. Struggling to maintain order, some of the more sheepish members quietly and awkwardly shuffled out as their more hot-blooded compatriots took up any sort of melee weapon - shoe, briefcase, anything - to try and reverse an irreversible act. Next door, in the President's office, President Adhemar stared blankly at a copy of the bill. Everything was moving too fast, he thought. He signed the bill, throwing it aside. The Germans themselves had to have been behind how fast this bill got onto the floor. He had never seen such a fast vote from the Senado.\n\n"PASSOS! YOU GODDAMN TRAITOR!", shouted a certain leader of the UDN. "Lacerda, I have simply voiced my support for what my constituents want. The embargo being lifted will allow for new jobs and investments in Brazil." "At the cost of mortally poisoning our country, you jackass! You're expelled from the party. Why don't you go sleep with those fascist sympathizers in the PSP," Lacerda screamed, before throwing the phone receiver down.\n\nLeonel Brizola couldn't believe the direction his home was heading in. As he stepped onto the stage in front of an energized theater filled to the brim with PTB supporters, his proclamation of Adhemar being nothing more than a German puppet was received to roaring applause. Brizola pumped his fists in the air, but he was worried. If this couldn't energize the PTB to take down Adhemar, nothing would.\n\nMeanwhile, Jânio Quadros had gotten the news, as he was painting in his home. Brazil was no longer chained to the OFN. It certainly came too late, but late was better than never. At least that fat slob in the Palácio was good for one thing, Quadros thought, as he put the finishing touches on his canvas."
brazil_adhemar_forpol.51.a: "Bem vindo ao Brasil, Alemanha."

brazil_adhemar_forpol.52.t: "Creeping Suspicions"
brazil_adhemar_forpol.52.desc: "Laudo Natel had been dealing with a stomach bug for a few days, but he wasn't sick. As he sipped on a cup of water, he began his daily ritual: reading Folha, Brazil's daily newspaper. The headlines just made his stomach churn even more. "ADHEMAR DE BARROS: CRYPTO-FASCIST?" Laudo's eyes scanned down the page, only to find a guest essay comparing Adhemar's facial hair to that of Hitler's. He put down the cup of water, massaging his temple. What the hell was going on in Brasília? Wasn't the embargo only supposed to be lifted, at earliest, next year? What was with the accelerated timeline, he pondered.\n\nAdhemar had promised him that he wasn't just going to bend over to the Germans, but it sure as hell looked like he just did to both Laudo and the rest of the country. To be honest, Laudo thought that now made a second broken promise between himself and Adhemar. The formerly reliable boss of the PSP had now misfunded his vice presidential campaign, and now committed what Laudo believed to be a fatal foreign policy blunder. Did the fame and grandeur of a presidential campaign really change his good friend for the worse?\n\nLaudo stood up, shaking his head. It wasn't healthy to be thinking like this. But he still had to do something. There was no doubt the Germans were going to flood the country with their agents and plans, but Laudo was committed to monitoring their every move. Just because they were allowed in doesn't mean they can just start ruining his home like they did to all of their other "partners"."
brazil_adhemar_forpol.52.a: "The chief of staff of the PSP stands vigilant, not for his party. But for his country."

brazil_adhemar_forpol.53.t: "Insult to Injury"
brazil_adhemar_forpol.53.desc: ""It's just ridiculous, honestly." Marcin looked up at his friend, Jaime, who was reading a newspaper. "How could Adhemar betray us like that?" "Ah, they're all just politicians," said another man. "They'll just fuck you whenever they can turn a buck. And there's no denying that the Germans have the cash." Jaime stood up, and shoved his finger in the man's face, jostling the table that separated them. "By working our people to death and committing cultural genocide, you fucking cretin!" The man scurried off, cursing under his breath. Marcin jolted out of his chair, doing his best to hold Jaime back. "Jaime, calm the hell down! What was that for?!" "You heard this asshole, Marcin! Like money is the only thing that matters!"\n\nMarcin sighed. The PSP's betrayal of the Polish community in Curitiba, nay, in Brazil, was shocking. "Guess I'm voting for someone else in the next election," grumbled Jaime. "I hate the UDN's economic policies, but at least they support the Americans over literal Nazis. Guess that's the level we have to stoop to." As Jaime slumped in the now vacant seat of the man he slapped, two more people approached their table.\n\n"Woah, look at you guys," smiled Alessandra, her friend Ariane leaning on her shoulder with two hands. "What's got you two in an awful, and I mean awful mood? I've never seen your little faces scrunched this hard before!", eliciting a giggle from Ariane. Jaime grumbled, shoving the newspaper in the two girls' direction. "Oh, this?", said Ariane. "My papa is already planning a protest on the streets all of next week about Adhemar signing that bill. You two should totally channel that negative energy over there, instead of here. I heard some hotshot journalist from Rio is coming down to lead the protest."\n\nJaime and Marcin looked at each other, before the latter shrugged his shoulders. "Whatever gets you to stop railing on people here. What's the guy's name?""
brazil_adhemar_forpol.53.a: "Ariane blew a bubble with her chewing gum. "I think Lacerda, or something.""

brazil_adhemar_forpol.54.t: "Internal Dissonance"
brazil_adhemar_forpol.54.desc: ""...it cannot be understated how much it will benefit the average Brazilian to be receiving this extra funding towards public services. It is a geopolitical fact - we cannot entirely discount the possibility of lifting the embargo with Germany-"\n\nThe talking head on the radio was cut to an abrupt halt midway through his sentence as Romeu de Campos Vergal shut it off, silently cursing himself for tuning in at all. It was what the entire Adhemar propaganda machine had been pushing recently - that the cretinous idea of lifting the trade embargo on the Reich was in any way a reasonable decision. The entire party had fallen for it hook, line, and sinker of course. They would jump off of a cliff, as long as Adhemar said so.\n\nHe bitterly lit a cigar, savoring the ashy taste. What had happened to his career? The heady days of establishing Petrobras had given way to thankless hours of herding together a mob of increasingly reactionary stooges in the Chamber of Deputies, in the vain hope that they would grow a moral compass and vote for some genuinely progressive legislation. And that was to say nothing of Filinto and his clique jumping to call him a communist infiltrator at a hair's trigger.\n\nPutting the cigar out on an ashtray, Campos sighed. On days like these he considered leaving the PSP for greener pastures, as a way of giving Adhemar and his cronies the finger. But how could he? He helped found this party. It was his home, his child. One day Adhemar would be gone, and then it could be led along the correct path.\n\nSuddenly, a thought struck Campos, and he could have slapped himself. How could he have forgotten? There was another major player in the party - one that he would do very well to make friends with. He dialed a number into the telephone, and could have jumped for joy when the receiver picked up."
brazil_adhemar_forpol.54.a: ""Governor Vargas! How are you today?""

brazil_adhemar_forpol.6.t: "Just Another Day"
brazil_adhemar_forpol.6.desc: ""STUDENT PROTESTS ENGULF UNIVERSIDADE FEDERAL", "LACERDA CALLS FOR IMPEACHMENT OF BRAZILIAN HITLER", "PSP POLLING DOWN SEVEN POINTS SINCE GERMAN EMBARGO DISCUSSION" dominated the headlines of Filinto Müller's newspaper. Sipping on his daily cup of coffee, he couldn't help but chuckle. That was it? Just a few rabble rousers at the blatantly liberal universities, and the ratbird up to his usual tricks, tucked away in his office, plotting for what seemed like an eternity? Müller had expected some actual opposition from the PTB and PSD.\n\nBut he knew better. There was a reason he had left the latter, those weak-willed cowards. With the vast majority of the PSP being strong-armed behind Müller in supporting the bill, all that remained for him to do was to pick off some of the weaker-willed members from the other three parties to ensure that the bill managed to have enough votes to sail through the Senado. And Müller worked fast. A chart here, and a figure there had already convinced a solid number of senators to support his bill in ending the embargo on Germany and her sphere. "This will grow our industry by how much?" and "No way... these levels of growth are possible?" were phrases Müller had been hearing for the past two weeks.\n\nAnd, of course, if all else failed, Müller didn't forget the tried and true practice of his new party. Just bribe the ever living hell out of the holdouts, and worry about the fallout later. The money that newfound trade would bring from Germany's sphere to Brazil's ports would be more than enough to make up for the amount he was going to spend winning over the remaining senators. Surely his boss would approve of using the same tactics that got him into the governor's mansion in São Paulo."
brazil_adhemar_forpol.6.a: "Sticking to a known playbook is always a safe bet."

brazil_adhemar_forpol.7.t: "A Warning from the Boss"
brazil_adhemar_forpol.7.desc: "Liana was hard at work in the morning, as usual. The President opened the doors to her office with a certain ferocity she wasn't used to."Mr. President?! Is everything all right?" she asked. The only answer she got was the slam of Adhemar's door. Oh, Liana thought. This was going to be one of those phone calls.\n\nShe sat down again, only to hear Adhemar's voice clearly through the door. "Müller?! What the FUCK are you doing? Calling such a vote this early, before the date we agreed upon?" Liana's blood ran cold. Was this related to the document she had given to the new senator within the party? It was a relatively innocuous dossier on potential trade partners for Brazil, she thought. Before she could process her thoughts, she heard her boss yelling at the top of his lungs again.\n\n"I don't care who's best for us to trade with right now. We both agreed to lift the embargo when the time is right." There was a brief pause before the shouting resumed. "Of course it will help Brazil in the long run. Only if you don't sink our goddamn party before we get to that point, you idiot!" Liana stood up and paced nervously around her office. The President was in a particularly bad mood today, which meant extra work for her later. "Never forget who's in charge of this party, Müller. You may be able to push Vergal around, but I won't stand for this subordination."\n\n"You are to consult me the next time you want to put some of your stupid policies to a vote. Don't forget your past, you little bastard. We remember what you did in your Estado Novo days, Herr Himmler."\n\nAdhemar slammed the receiver down before reopening the door to the main office, his face visibly red. "Liana," he said, flashing his trademark smile, "can I talk to you for a second?""
brazil_adhemar_forpol.7.a: ""O-of course, Mr. President.""

brazil_adhemar_forpol.8.t: "Uncharted Waters"
brazil_adhemar_forpol.8.desc: "Robert Kirk wasn't used to the speed at which everything had been moving. It felt like he had been appointed ambassador just yesterday, yet great progress was being made towards normalizing relations between the Reich and Brazil. Germania knew this too, making sure that Kirk had more money than he knew what to do with. Of course, the actual amounts were still small, given that they still had to keep most things under the table, but he knew exactly where the money was headed: right into the pockets of Filinto Müller, so that the good senator could keep working his tricks in the Senado chamber. The beauty of democracy, Kirk thought, smiling as he turned his chair to face the Brasília cityscape.\n\nThe passing of Müller's bill was a foregone conclusion in Kirk's mind. No, what mattered now was keeping up the momentum that the bill would bring. The winds were firmly at the back of the Reich, and Müller had been a capable helmsman so far. But there were things Kirk knew he needed to get done with his home country. The embassy needed to be expanded with additional staff, and meetings with industrialists needed to be arranged in Brazil. They'd need to bring a few teachers too, in order to have them start teaching German to Brazil's workers and youth. And a cultural exhibition... that was a problem for another day, thought Kirk. Small steps first.\n\nBut it was hard to deny the limitless potential Müller had opened up. Consulate locations needed to be scouted out in Brazil's biggest cities. And he had heard great things about Brazil's universities, but there was certainly no way they could compare to the great institutions back home. Student exchange programs were just one way the Reich would solidify its new partnership with the Brazilian people. After all, that's what this was all about. Bringing the two nations and their peoples closer together."
brazil_adhemar_forpol.8.a: "Better get going, Kirk thought to himself."

brazil_adhemar_forpol.9.t: "The Bull Roams Beneath Eagles"
brazil_adhemar_forpol.9.desc: "Jânio Quadros was restless. The drawing room had come to resemble an artist's studio, with an easel and canvas positioned toward the balcony, so Quadros might amateurishly play with the acrylics trying, to capture something of São Paulo's skyline at sunset. He wasn't much of an artist - but until recently he thought he might be President, and he didn't want to dwell on that dashed ambition too much.\n\nAcross from the easel sat the television - the fancy new device from Matsushita had also helped Quadros distract himself - and as he turned it on to hear the news, the thin white light was cast against his paint-stained shirt.\n\n"The political scene continues its reactions to President Barros' declaration today," said the newscaster, "that Brazil will be withdrawing from the OFN, effective immediately." Quadros was captured by the report, the reflection caught in his lenses. "That Brazil has left the US-led military alliance as quickly as it joined fully, and so quickly into Barros' term, has surprised many."\n\nA clumsy smile spread across Quadros' face, and he couldn't help but laugh. Adhemar would sell out his own mother, but he wouldn't sell out Brazil to the Americans, he had to give him that. He didn't trust Adhemar, nor like him or wish him well, but he had at least been quick to correct that stupid move Lacerda had made.\n\nThis called for a drink, and as Quadros turned from the television to pour himself a glass, the report cut to a German diplomat, a dull man in a brown suit, who spoke into a microphone about what a victory for Brazilian sovereignty this was. "Germany looks forward to working productively with the new administration.""
brazil_adhemar_forpol.9.a: "For that night, Quadros put aside his ambition to be the new Victor Meirelles."

brazil_adhemar_removeedna.1.t: "With Edna Removed, Adhemar Goes to Drink a Cup at the Nurse Cafe"
brazil_adhemar_removeedna.1.desc: "With a spring in my step, I smash the windows of every house I pass by\n    Yeah, yeah, yeah, yeah, yeah To the Nurse Cafe\nTo imbibe the principles that produce rainbows I open up the sky\n    Yeah, yeah, yeah, yeah, yeah To the Nurse Cafe\n\nIlluminating a hundred nights with miraculous cheers\n    in an operatic tragedy locked away a hundred years\n\nWhile exchanging greetings I kick all the doors along the way\n    Yeah, yeah, yeah, yeah, yeah To the Nurse Cafe\nTo imbibe the truths that blossom flowers I close up this day\n    Yeah, yeah, yeah, yeah, yeah To the Nurse Cafe\n\nThe melodious days that come and go without the slightest courtesy\n    make a hundred nights ring aloud with the bells of Lady Misery"
brazil_adhemar_removeedna.1.a: "Nurse Cafe, Nurse Cafe..."

brazil_adhemar_coma.1.t: "Icarus"
brazil_adhemar_coma.1.desc: "The roasted aroma of cafézinho swirled with the distant scent of avgas. Adhemar had summoned Laudo to Brazil's newest luxury aeroclub, a pitstop in what Laudo was told was a "day-off" but was, in fact, a country-wide flight tour, a return to Adhemar's aviator days.\n\nFollowing the presidential security detail, he found Adhemar sipping coffee in the lounge. The marble floor reflected the blue flowing through the floor-to-ceiling glass; from far enough away, he was engulfed, suspended in endless azure. Laudo waved, but Adhemar's focus was on something above the Cerrado's verdant vistas.\n\nFirst a speck, then a shape, then the sound of a single-piston engine as a Paulistinha swooped onto the asphalt, smooth and steady. A few grounded onlookers waved at it; one blew a kiss. But the craft didn't slow down; it roared. Instead of stopping, it sped up; just as Laudo took his seat, the aircraft was soaring above Brazil once more. A touch-and-go landing: for those who wanted to say they stopped by but still had the fuel to keep going. Out in the sunlight, its wings gleamed for a moment, as if it winked.\n\n"I want that second term," Adhemar said. Laudo knew this was coming but...\n\n"You think it's the right time?" The opposition would rally against this with everything they have. Pushing this change through demanded an intricate game plan.\n\n"There won't be time left if we wait." Adhemar's fingers tightened on the rim of his cup, but he knew that it should be possible. He had a wildcard, the man everything hinged on, who was eager to be back in the spotlight. Adhemar checked his Junghans, ticking right that very second that it was his turn to fly. Standing up, donning his pilot's cap, he knew he'd return to the heavens once more. Just before that though, he turned to Laudo."
brazil_adhemar_coma.1.a: ""Call Kubitschek. I know he'll be interested.""
BRA_adhemar_true_progress_tt: "§YDue to our §Gmassive successes§! over the past 3 years, we will unlock a new branch of the focus tree.§!"

brazil_adhemar_coma.2.t: "Brazilian Honeypot"
brazil_adhemar_coma.2.desc: ""Mr. President."\n\n"What do you have for me today, Director?"\n\nThe Director of the FBI placed a folder on the President's desk. "Bad news from Brazil. We've investigated the recent disappearances of our assets across Latin America and traced it back to the office of the President of Brazil. As you'll see on page one, a certain Liana Clemente, President Adhemar's personal secretary, has integrated herself into the administration, no doubt by spreading her legs." He pointed to a series of photographs. "She's been feeding information to a number of known German assets in-country, including Felinito Müller. Essentially putting targets on the backs of our operatives and friends throughout the continent. They've been shuttered one by one."\n\n"Is it possible she also exerts influence over de Barros's policy?" the President asked. "Could she have contributed to ending the embargo with Germany?"\n\n"We think it's likely. She may have also played a role in facilitating contact with the German industrialist, Hermann Abs." A pause, and then, "The worst, sir, is that some of our now-defunct agents reported rumors of an infant nuclear program. I recommend immediate action against Adhemar and his administration, using whatever tools we have at our disposal to disrupt the political situation, before things get any worse. There are already a number of politicians chafing under Adhemar's leadership. We can use this to our advantage."\n\nThe President closed the folder."
brazil_adhemar_coma.2.a: ""You have a green light, Director. Adhemar must go.""

brazil_adhemar_coma.3.t: "New Opportunities"
brazil_adhemar_coma.3.desc: "Inside one of the many rooms dotting the Federal Foreign Office, a seasoned veteran of Reich's bureaucracy was conducting a report regarding Brazil's recent senate election. He couldn't help the small smile that began forming on his face. In his mind, this report would help shape foreign policy for the upcoming years. Truth be told, his work mattered little on the scale of what Germany had already achieved in Brazil.\n\nThe Reich, despite proudly proclaiming its status as a global power, had a hard time expanding its influence outside Europe. Since the beginning of the 1960s, numerous attempts have been made to gain a foothold in South America. The Reich tried its luck with Paraguay, the Dominican Republic, and Colombia, among others, but none of them could compare to the recent developments inside Brazil. President Adhemar de Barros's wise decision to reopen relations with the Reich resulted in never-before-seen levels of cooperation between the German Reich and Brazil.\n\nGerman goods, weapons, and specialists made their way through the Atlantic, and with them came spies and all sorts of personnel required to run an intelligence network. Even before Volkswagens were a common sight on Brazilian roads, [getGermanIntelAgencyShort] agents made contacts with German communities and sympathetic politicians. Nowadays, our capabilities have grown to the point where we effectively counter OFN influence all through Latin America; our foot is firmly planted in America's backyard.\n\nThe consequences of this diplomatic victory cannot be underestimated. Germany has shown that it can be a reliable partner. With enough time, Latin America will open up to the prospect of working with the Reich. German goods will fill shelves from Argentina to Mexico, the Kriegsmarine will have plenty of bases to operate from, and Germany, not Japan, will be the greatest threat to American imperialism in Latin America."
brazil_adhemar_coma.3.a: ""One eagle rises, the other falls.""

brazil_adhemar_coma.4.t: "A Warning From the Shadows"
brazil_adhemar_coma.4.desc: "Lacerda was alone in the dim, gloomy room, at first. After a half hour, he was surprised when Brizola came through the door, followed ten minutes later by Neves. "Unmarked car, through the service entrance?" Lacerda asked them. Each of them nodded in turn. So, Lacerda thought, the Opposition leaders of Brazil are all brought to the US embassy in the middle of the night, in separate unmarked cars, from predetermined positions around the city. What for? What could merit such skulduggery?\n\nHis contemplation was answered when the door opened again, and black-suited shadowy forms spilled in and took the seats opposite the Opposition. The glow of cigarette lighters briefly illuminated a scarred brow here, a bespectacled face there, the smoke melding with the shadows. A silence dominated the room. Neves and Brizola fidgeted while Lacerda observed with rapt attention. He had an idea what the shadow-man across from him was going to do before it happened.\n\nA manilla folder slid towards Lacerda. As he leaned forward and opened it, Brizola and Neves crowded close to see the polaroids enclosed within. Countless members of the Adhemar administration were cast in black and white indiscretion, shaking hands with German officials, receiving fat envelopes, lips frozen in the act of spilling secrets. Lacerda felt rage building in his chest. He'd told them. He'd warned them over and over again. The government was infested with Nazi rats.\n\nBut Lacerda felt something else, too. Righteousness! Vindication! Elation! While his warnings may have fallen on deaf ears, his need for crusade was being fulfilled this very moment.\n\nHe knew in the coming hours and days he would need to rally his remaining allies in the UDN and the press for a sustained smear campaign against President Adhemar. President Adhemar... Lacerda couldn't even think the title without gagging."
brazil_adhemar_coma.4.a: "If everything went according to plan, Lacerda need not stomach the indignation much longer."

brazil_adhemar_coma.5.t: "The Morning News"
brazil_adhemar_coma.5.desc: "No one ever said that the President couldn't enjoy a few extra hours of comfort in his bed; after all, the election season isn't the most relaxing time in a man's life. Unfortunately, all good things, no matter how small, must come to an end. Duty awaits; Brazil awaits.\n\nThe morning started as every other one, a quick visit to the bathroom followed by breakfast to get the day going, yet today it wasn't the coffee that got President Adhemar de Barros on his feet, but the newspaper that was resting next to his plate and the dreadful words featured on its front page, "GERMAN INFLUENCE IN BRAZIL: ADHEMAR'S GOVERNMENT ON GERMAN PAYROLL?" An obvious lie, Adhemar thought to himself, but it would also be a lie to say that the matter of relations with Germania wasn't frequently on his mind.\n\nAdhemar rushed out of the bedroom and immediately headed toward his office. He passed by countless advisors and colleagues on his way; calls for continuing friendly relations with the Reich, accusations of merely replacing the American eagle with the German one, demands and advice, all melted into a single buzz. Chaos followed him right up to the presidential office and was intensifying with every second, fighting for the President's attention. A man couldn't hear his thoughts in such an environment, let alone decide the fate of his country.\n\nWith the President's request to leave his office still echoing in the halls, the crowd of advisors disbanded, and only a pair of eyes were left looking at him, one that belonged to the framed portrait of Washington Luís, his gaze pierced Adhemar right through. Finally alone with his thoughts, only one thing remained on Adhemar's mind."
brazil_adhemar_coma.5.a: ""What to do, what to do?""

brazil_adhemar_coma.6.t: "The Eulogy"
brazil_adhemar_coma.6.desc: "Adhemar looked on at the collected members of his closest advisors could feel the nervous energy in the air. More than a few looked disheveled, lacking sleep, showers, or both. A few were absent, or left uninvited, the foreign minister for one a likely UDN asset and Edna of course. But even among his most loyal supporters, Laudo and the PSP, morale was dropping. Something had to be done. They needed to know that their commander still had a plan, that the wily salesman still had a few tricks up his sleeves.\n\nTrying to cover his own anxiety with bold pronouncements, Adhemar began to speak.\n\n"I understand we were all caught off guard by recent events, but the situation is being handled. At least now we know who our enemies are, the lists are being drawn up and these criminals and traitors will face our wrath." Silence.\n\n"Especially Filinto Müller, he'll get what's coming to him, you can count on that!" A few nods of support. "And the leaker she will be caught, and her libel quelled." Light jeers rang in the small room. After a few more minutes of this back and forth, Adhemar slipped in the bad news.\n\n"Unfortunately, I will be retiring to São Paulo for a time to ensure the loyalty of the bosses. I believe all of you will keep everything in order. Trust not just in your abilities, but the truth that we represent the will of the Brazilian people, no matter what the papers say, we are the future of this country."\n\nThe silence returned, a dozen blank faces and two dozen hollow eyes. Then Laudo, always loyal, stood up and began to furiously clap. Reluctantly the rest of the room followed him and soon the whole building was filled with the empty noise..."
brazil_adhemar_coma.6.a: "Of false applause."

brazil_adhemar_coma.7.t: "The Finish Line"
brazil_adhemar_coma.7.desc: "Sitting in the booth above the track, President Adhemar could barely hear his own thoughts past the roaring of the racecars. The Interlagos Circuit, one of the many gifts he had left to the city of São Paulo, proved a convenient location for his meeting with Paulo Maluf, one of the leading oligarchs in the city, but he was beginning to regret the choice.\n\n"You must understand, Mr. Maluf! It's all under control!"" he yelled, his throat hoarse, beer flavored spittle flying in all directions. He could count on loyalty from the oligarchs, they favored the status quo over whatever the malcontents were offering up. But, in times of crisis, it was useful for the king to descend from his throne.\n\n"Do... worry. Mr... Paulo... stands... you." Adhemar could only hear snippets of Paulo's words above the droning sound of the motorcars.\n\n"Speak up, man, I can't hear you!" Adhemar shouted. "I said! São Paulo stands with you, sir!"\n\n"Your loyalty will be remembered!" yelled Adhemar in reply. "But why don't we continue this talk after the match is over!"\n\n"But, sir? The race ended five minutes ago." Paulo said with dismay.\n\nAdhemar looked out the window, and his gut sank. Paulo was right, the track was empty, the cars stopped, the race... was over."
brazil_adhemar_coma.7.a: "But, the buzzing... it won't end!"
brazil_adhemar_coma.7.b: "Oh God! Please help!"
brazil_adhemar_coma.7.c: "My head! My head is on fire!"

brazil_adhemar_coma.8.t: "Golpeado"
brazil_adhemar_coma.8.desc: "This was not a time to swagger around, nor to make demands—this was a time to ask the Lord on High for guidance. Adhemar, accordingly, ditched his brash persona and returned to something near himself, the person that he knew God could see at all times. Thus the Adhemar that walked into the Church of Our Lady of Aparecida would not be recognisable to anyone but his family members and perhaps Laudo Natel.\n\n"Our Father who art in Heaven, hallowed be Thy name," the President murmured, kneeling and paying his respects to God. "Direct, we beseech you, O Lord, our actions," he muttered, and meant it—for he was so out of ideas with how to deal with the crisis that he had to have recourse to God.\n\nAt last, a sort of inspiration came, and he sat up. He looked around and saw scaffolding. Above him, an ornate chandelier was being installed, while at the other end of the nave behind a closed-off area a sculptor was working on the finishing touches of the statue. Adhemar felt pride swelling in his chest. That was thanks to the Government, and to Brazil's most productive citizens.\n\n"H'm, this is strange," Adhemar thought as he stood up to leave. "There's pain in my chest, not pride. What's going on?" He kept wondering what was going on until he entered the vestibule, thinking, "That's strange. I don't remember eating anything off. I can't have been poisoned. Wait, I feel lightheaded too now—"\n\nParishioners looked on in horror as Adhemar Pereira de Barros, President of the United States of Brazil, fell flat on his face and became unresponsive. Some looked on, frozen in horror, as his security swarmed; others followed police officers outside as a cordon was formed. As the clergy of the shrine approached in confusion, a security guard shouted at them,"
brazil_adhemar_coma.8.a: ""Get me an ambulance — and the consecrated oils!""

brazil_adhemar_coma.800.t: "Worst Case Scenario"
brazil_adhemar_coma.800.desc: "On days like this, Laudo Natel cursed the inability of the photograph to fully capture someone's likeness. He squinted at the grainy photo of a woman wearing a heavyset coat and a hat that had been taken in Brasília itself - he had it on decent authority that she could very well be that snake in the grass Liana Clemente, but God only knew whether it was or not. She had a similar facial structure, admittedly, but looked far too tall. But then again, that may simply have been a matter of camera angle.\n\nHe sighed, throwing the photo back onto the pile. This search felt fruitless. The Germans had well and truly done well in finding someone who could strike the administration and quickly slip away, should she have been discovered. It was a wild goose chase in every sense of the word.\n\nSuddenly, the phone rang. Natel picked it up, but before he could get a word out, he was cut off by a frantic sounding Getúlio Vargas Jr. "Laudo!" the man shouted, panic dripping off of the word. "It's the President! He's fallen into a coma and the doctors don't know whether he'll wake up!"\n\nTime slowed down as Natel's eyes widened. "My God." He said, running his hand through his hair. A million questions flooded through his head. When did this happen? What caused it? With Clemente on the loose, it could damn well have been her work, and that was something he could not entirely rule out. But those were details he could deal with later - for now, he had one concern. "Do we know the UDN and PSD's stance on this?" He asked, almost certainly knowing the answer.\n\n"No, but realistically they'll be practically fucking slavering at the mouth to impeach the President, the load of... of damnable, stupid small-minded bastards!" And there it was. It seemed that the fate of Adhemar's legacy would be falling to him to defend. Gritting his teeth, Natel replied."
brazil_adhemar_coma.800.a: ""I will be there soon. Remember, we must stay united, no matter what.""
BRA_adhemar_natel_takes_over_tt: "§RThis is not good§! - §Ya new focus tree will be unlocked.§!"

brazil_adhemar_coma.9.t: "The News Is Out"
brazil_adhemar_coma.9.desc: "Antonio Vidal typed with a rabid fury he had never experienced before. The keys on the typewriter rattled like a machine gun under his fingers, a one-man firing squad. With every passing hour, a new scandal seemed to emerge, a new gaffe to report, another one of de Barros's pawns cast aside. His fingers ached and eyes hung heavy, but Vidal could not stop, not until Adhemar's career was given its long overdue execution.\n\nJânio Quadros leaned back in the leather chair, staring through blurred vision at the jittering TV screen, and smiled. It hadn't been long since the news broke, but his room was already filthy, covered in discarded bottles and smudged newspapers. Quadros's addled mind could only understand a fraction of what the pundit was saying, but the meaning went down as smooth as his glass of whiskey. Adhemar was through, and that deserved a celebration.\n\nCarlos Lacerda scrambled around his room, searching for his watch. The chord of the telephone wrapped around the corner as he tried in vain to communicate to the Brasília hotel the urgency of the situation. "You'll get me that goddamned room, or I swear the local reviewers will have your head!" he said, slamming the phone down. Fuck it, he didn't need the watch, now was the only time that mattered. Lacerda practically leapt out the door, slamming it behind him, his suit disheveled and hair ungroomed. He didn't care, at this moment the only thing of relevance for the Crow was his prey, and he needed to be fast about it because soon enough all the scavengers in the capitol..."
brazil_adhemar_coma.9.a: "...would be clawing for a piece of Adhemar de Barros."

brazil_adhemar_coma.10.t: "Battle Lines"
brazil_adhemar_coma.10.desc: "Tancredo Neves and Ulysses Guimarães were rarely seen next to each other, let alone rushing through the corridors of the Chamber of Deputies with the same copy of a bill, let alone with stamps of approval from the PSD and UDN offices at once. But it was a rare occasion. As they jostled between senators moving one way or another to reach the main floor, two nemeses would be handing in the same paper to the chamber President to get rid of a third.\n\n"If the Cabinet will not fulfill their obligation to this nation, then we in Congress must defend the Republic from their mistakes." Guimarães faced the rest of the floor, heaving in breath for the next line. "That is why myself and Mr. Neves have tabled a bill to impeach the President of Brazil and do what is right by the Brazilian people."\n\nBooing emerged from the PSP's side of the floor, and applause from the opposite end of the room. The rest of Guimarães' speech would be clouded by whispers from deputy to deputy, anxious flitting of attention to the shifting men in the background of the room, and the beginnings of a new power struggle yet again under way.\n\nNatel watched on in perfect stillness. The rumors of ousting and outmaneuver reached even his own ears, the idea that the PSP would be uprooted by Congress' decree playing even on the consciences of his advisors. But he couldn't let that happen. He was Vice President, now Acting President, and he had a job to do. They would learn you couldn't just overturn Adhemar's legacy in a week."
brazil_adhemar_coma.10.a: "The PSP is not out of power just yet."

brazil_adhemar_coma.11.t: "A Coincidental Coma"
brazil_adhemar_coma.11.desc: "The President's secretary poked her head into the Oval Office. "Mr. President, the FBI Director is on a secure line for you, he says it's urgent."\n\n"Thank you." He picked up the phone as the secretary ducked out. "Go ahead."\n\n"Mr. President, you won't believe this, but one of our remaining assets in Brazil has just confirmed that President Adhemar has slipped into a coma."\n\n"What does that mean for our position?"\n\n"It's thrown the government into complete disarray. They've tried to keep it quiet but the news is spreading fast. The PSP is rudderless. Vice President Edna Lott, daughter of the former President, has begun organizing an impeachment bill. With effort on our part, we can ensure it is passed. Getting Adhemar out of office is essential for our security concerns across the continent. Additionally, a window has opened amidst the tumult for us to redouble our intelligence efforts within Brazil. We can pay the Germans back in kind and begin rousting every Nazi rat from their burrows."\n\n"Sounds like a solid strategy, Director. See it done."\n\n"One more thing, sir...""
brazil_adhemar_coma.11.a: ""We can also make sure Adhemar never wakes up.""

brazil_adhemar_coma.12.t: "Bedlam from Brasília"
brazil_adhemar_coma.12.desc: "The RND report hit the headquarters in Germania like a sledgehammer. Adhemar de Barros, President of Brazil, the golden gift-horse for the Pakt in the New World, was in the middle of a coma. The details were even less reassuring: nobody knew what the condition was, when or if he would wake up, and what the fuck they were supposed to do.\n\nIt wasn't just any old President with a health problem. Under his directive and with his cooperation, Brazil was in the midst of a secret agreement with the Reich which would revolutionize German interests in South America and sweep America's hemisphere in the Western Hemisphere from underneath it. The vast riches of the Amazon and the South Atlantic could be theirs to win.\n\nBut there would be no booty to reap if he died, if his plans got leaked or if their dealings with Brasília went from the presidential palace to the press. But what level of crisis were they truly in? Was it worth smuggling in professionals and medicine to ensure he survived, or was the plan too elaborate? Or should they try to prevent his impeachment through a bit of trickery? Some cynics at the Nachrichtendienst suggested hurrying out German assets while nobody was still looking; such was the desperation to avoid exposure.\n\nAfter the message was relayed to the Reich Security Main Office and the rest of the government, the order from the higher-ups was essentially as follows:"
brazil_adhemar_coma.12.a: "Seek ways to prevent the President's impeachment..."
brazil_adhemar_coma.12.tt: "Additional Operations have become available in the espionage mechanic."

brazil_adhemar_coma.13.t: "Toil and Trouble"
brazil_adhemar_coma.13.desc: "The three military men loomed in front of Laudo, their stony faces obscured by the tobacco smoke hovering in the air, barely concealing the glee they took from one of the most powerful men in the country begging for their help. They had extended the talks out this long, no doubt just to watch him squeal. It was no matter. Laudo was here for results, not respect. If the military would assist with stopping the impeachment, perhaps the disaster could be salvaged. Lighting another cigarette, Laudo continued his proposal. "As you know, the forces arrayed against our President would stop at nothing to see the country bend over for the communists or worse. Adhemar is the one thing that stands between the stability and honor of Brazil and total chaos."\n\n"You speak of honor?" Commander Médici smirked, taking a comically large cigar from beneath his desk, "And yet you can't deny the actions of our dear President have made us the laughing stock of the world," he continued, lighting the tobacco and blowing a puff in Laudo's direction.\n\n"I'm speaking about the integrity of nation, its continued survival, not just a few tabloid headlines." Laudo replied, his eyes watering from the smoke. General Forta nodded with faux understanding.\n\n"We understand your predicament, MISTER Natel," he said, "But the military does not concern itself with petty politics."\n\nA bald-faced lie, but at least they were implying neutrality, assurances not to launch a coup would be a small victory at least. "So I take it that no move will be made against the President?" Laudo asked bluntly.\n\nGeneral Geisel leaned forward, his giant glasses unleashing a blinding reflection of white light. "Why, my dear Mister Natel, wherever would you have gotten that idea into your head? We would never think to overturn the Constitutional Order" Leaning closer, he smiled, yellowed teeth illuminated in the cigar flame."
brazil_adhemar_coma.13.a: ""Can our President say the same?""

brazil_adhemar_coma.14.t: "The Bull's Butcher"
brazil_adhemar_coma.14.desc: "A ring of her office's phone. The news hit her like a train. Adhemar was in a coma, and now the country was in Edna's hands.\n\nLeaving her office and going straight to the senate chamber where proceedings had already started for drafting solutions to the crisis. Adhemar was rotting while still alive, only time would tell if he would escape his doom.\n\nAs she took her first steps in the chamber, she found Tancredo, who told her they had already started drafting plans to impeach Adhemar. Nervous and unsure of what to do, she joined the small group to hear what their leader, Brizola, had to say.\n\n"Adhemar is clearly incapable of leading this nation any longer, even if he wakes up, who is there to ensure he won't fall into a coma again? Brazil needs people who are physically capable of leading a nation for their presidency, and Adhemar is not one of them."\n\nAll of those who opposed Adhemar were there. Brizola, Neves, Guimarães. They knew that the Bull's days had passed and it was time to remove him from his post. "Don't worry Edna," said Tancredo. "Even Lacerda wants to help us. Adhemar is going to go sooner or later.""
brazil_adhemar_coma.14.a: ""Congress is in session. Impeachment hearings on President Adhemar have commenced.""

brazil_adhemar_coma.15.t: "So Close, Yet So Far"
brazil_adhemar_coma.15.desc: "Edna Lott was someone who was used to the busy life of Brasília, but today she was enjoying a restful holiday in Rio. Getting impeached by Adhemar made her angry, of course, but she was also glad to take a break from government work. She would take a more calming job for the time being, she would write her memoirs.\n\nIt was during one of these writing sessions that she picked up the newspaper that the paperboy had thrown at her door. The writing couldn't be clearer. "PRESIDENT ADHEMAR COMATOSE!" Edna read the bold words with curious indifference to Adhemar's fate.\n\nDirecting herself towards her telephone, she called someone she was way too familiar with. "Hello, Neves?" The minister wanted to talk more with her, wanting to know about what she was doing during her break in Rio, Edna, however, only wanted to speak to him about one thing. "Please dispose of Adhemar as soon as you possibly can. I won't be present at his funeral. I despise that man."\n\nThe call ended as soon as it had started. Edna felt depressed, not due to the loss of the Bull, but due to the fact she wasn't still his Vice-President, she wanted to become the President, to show the people the true face of Adhemar and destroy him once and for all, but she couldn't. The lies Adhemar had created about her had been too great. She was no longer in Brasília and no one would care about an impeached Vice-President raging at the one who impeached her. All she could do was go back to writing."
brazil_adhemar_coma.15.a: "The President who never was."

brazil_adhemar_coma.16.t: "An Audience With Hope"
brazil_adhemar_coma.16.desc: "Laudo Natel studied the anemic visage of previously the most florid man in South America. His wife went for a lunch break, leaving him and the President alone in the ward, silent, solitary. It was another world compared to the murmur and chatter of worried wives, workmen and all other kinds of people populating the streets and corridors out and inside the São Paulo Hospital. But Laudo knew better about this man who captured the world's imagination. In fact, he told him so himself.\n\n"You've given us a lot of shit to cut through these past few weeks, that's for sure," he mused, still transfixed upon his unresponsive boss. "And while everyone's wading through your shit here you are, relaxing as if you were at Copacabana! You've never changed." The more he spoke, the less he cared if his words were heard. He averted his gaze to the lone surgical light above, his hands planted on his face, pacing in disquietude.\n\n"Just wake up, Adhemar. We need you. This party needs you. You've already done so much, you can't drown when you're already at the shore. It wouldn't be fair. Not to you or your legacy. A good legacy." Laudo found himself almost shouting the last few words. After a moment of uninterrupted beeping, his wife came back and they left the ward as it was, and Adhemar's eyes remained shut."
brazil_adhemar_coma.16.a: "This is the interval, not the coda."

brazil_adhemar_coma.17.t: "Excelsis"
brazil_adhemar_coma.17.desc: "Adhemar inhaled deeply, feeling himself rise from his bed. His eyes flickered rapidly across the room - it seemed to be a hospital. Feeling tubes of all sorts intruding upon his nose, he ripped them out, getting out of bed. "Hello?" He called, hoping that one of the nurses would come to inform him of what had happened. But he received no response. Frowning, he poked his head out into the hallway of the hospital. It was empty. Medical equipment lay strewn everywhere, as if the entire hospital had simply disappeared midway through whatever task they were doing. The floor was cold on his feet, and the hospital gown was uncomfortable.\n\nWalking through the empty hallway, he eventually came across a bright red door. It did not fit with the aesthetic of the rest of the building. Curious, he opened it, only to see the President's office, exactly as he remembered it. Trying not to gasp, Adhemar briefly wondered if he was dreaming. He walked through it, idly running his hands across the desk. Same texture he remembered. Across the room, Adhemar spotted another red door. As if he was attracted to it, he walked right up to it and opened it. To his surprise, he was met with the Senate room. Funny - he did not think they were connected. Then again, his office was never connected to an empty hospital, either. He walked through, admiring the room - yet it too was entirely empty.\n\nSpying another red door, Adhemar went through it - this time to a familiar street in São Paulo. He remembered this street - the smells, the sounds, they were all here. Yet once more, not a single soul. He wandered through that street for what felt like eternity, soaking in the familiar sights. Eventually, the streets were no longer familiar, and he found himself standing in an empty, grassy field. Empty if he did not count the figure sitting alone at a table in front of him, that is.\n\nHe approached - at that table was a deck of playing cards. The figure looked up at him, grinning."
brazil_adhemar_coma.17.a: ""HELLO THERE FRIEND," it said softly. "CARE FOR A GAME?""

brazil_adhemar_coma.18.t: "The Game"
brazil_adhemar_coma.18.desc: "The figure's face was both indecipherable and frighteningly familiar. Adhemar squinted briefly, trying to make out its face. It shifted from one to another in a matter of seconds. Gender to gender. Ethnicity to ethnicity. Its clothing remained oddly static - a dark suit, similar to the ones that Adhemar had seen on many an occasion whilst on a seedy night of deals and debauchery in São Paulo.\n\n"WELL? ARE YOU GOING TO SPEND ALL DAY GAWKING AT ME LIKE THAT? COME ON, SIT DOWN." The figure snapped, nodding towards the chair opposite him. Adhemar suddenly felt as if he had committed some grave error, and he obediently sat down in front of the figure. An oppressive air surrounded the figure. It was not as if the figure was trying to elicit this feeling in Adhemar, but it was passive. Unshakable.\n\n"ARE YOU FRIGHTENED OF ME, ADHEMAR DE BARROS?" It asked with no discernible emotion.\n\n"Who are you? Why am I here?" The President asked.\n\nThe figure chuckled. "WELL, ISN'T THAT THE QUESTION OF THE HOUR. I SUPPOSE YOU ALL HAVE MANY NAMES FOR ME," it said, beginning to idly shuffle a deck of cards in its bony hands. "I HAVE BEEN CALLED ANUBIS. THANATOS. THE PALE WHITE HORSEMAN. THE REAPER. BUT I SUPPOSE TO YOU, I WOULD BE KNOWN AS... CATXURÉU."\n\nAnd then the gravity of the situation hit Adhemar with full intensity. This was no mere apparition. This was the primal force of nature that every man, woman, and child spent every moment fearing. The thing lurking in the dark. Death itself was sitting before him. His breathing grew heavy, as he fell backwards on his chair. "Wh... what do you want from me? Have you come to take me?"\n\nDeath chuckled. "NO. WELL, NOT YET, AT LEAST. I'M ON A VERY BUSY SCHEDULE BUT I'VE DECIDED TO GIVE YOU THE BENEFIT OF THE DOUBT. SO, I WILL BE PLAYING A GAME OF TRUCO WITH YOU. IF YOU WIN, I WILL ALLOW YOU TO CONTINUE LIVING. AND IF NOT..." Death slowly drew its finger across its neck. Adhemar gulped."
brazil_adhemar_coma.18.a: ""I accept.""

brazil_adhemar_coma.19.t: "The First Round"
brazil_adhemar_coma.19.desc: "Death - or Catxuréu, as Adhemar had known him, clapped its hands together to seal the deal. "GOOD. MAY THE BEST MAN WIN. BUT THIS IS TRUCO, AFTER ALL. WE NEED OTHER PLAYERS, NO?" Adhemar frowned. Where would they find other players in this place? He hadn't seen a single person on his way here.\n\n"Indeed," an all-too familiar voice said from behind him. "It won't be the first time I've played against this fat cat of a man." Adhemar whipped his head around, only to be met with the sight of Jânio Quadros. His familiar mustachioed face smirked at the President, before he swaggered past and sat next to Catxuréu. "Finally found a deal you couldn't swindle your way out of, eh Adhemar?"\n\nThe deathly entity chuckled, its amorphous face somehow stretching into a grin. "IF IT ISN'T YOUR OLD FRIEND, ADHEMAR. NOT IN SÃO PAULO ANYMORE, ARE WE? I WONDER HOW DIFFERENT THINGS WOULD HAVE GONE IF QUADROS HERE WON THAT RACE FOR GOVERNORSHIP. PERHAPS YOU WOULDN'T BE HERE RIGHT NOW, HMM?" Adhemar felt sick to his stomach. Before he could ask the man how in God's name he got here, he was interrupted more chidingly by a decidedly more feminine voice to his right. "Now, now. We're not here to judge are we?" He looked over, and was promptly struck with awe as the most beautiful woman he had ever seen - aside from perhaps his wife - sat next to him. Oddly enough, she was dressed like the Blessed Virgin Mary. Could she have been? She smiled at Adhemar. "I'll be at your side for this round, Adhemar. I believe it's Quadros' turn to deal?"\n\nQuadros nodded, beginning to shuffle the cards. Adhemar braced himself - he always considered himself a master of Truco, but the stakes of this game were definitely much higher than money."
brazil_adhemar_coma.19.a: "Time to play."

brazil_adhemar_coma.20.t: "Familiar Faces"
brazil_adhemar_coma.20.desc: "As he took in the cards from a successful round of Truco, Adhemar couldn't help but feel a surge of satisfaction. He and the Blessed Virgin herself had beaten Jânio Quadros yet again, in a battle much more important than an election. The man leaned back, looking defeated. Then, in what felt like a blink of an eye, Quadros disappeared. Catxuréu clapped its hands together slowly. "WELL, THE FIRST ROUND GOES TO YOU. WELL DONE."\n\nBut as Adhemar began to feel a sense of relief, another familiar, yet much more feminine voice brought another stab of dread. "Don't get cocky now, Adhemar. That's only one round."\n\nNone other than Edna Lott swaggered next to Catxuréu, sitting down. Of course she would be here. He narrowed his eyes at her. "Fancy seeing you here, Edna. I suppose you have taken a lot of time out of your doubtlessly busy schedule to be here, no?"\n\nThe Blessed Virgin squeezed his hand comfortingly as Edna laughed. "No thanks to you, Mr. President. My party still needs me, even if you felt that you didn't," she said, picking up her cards. "Do you still think about it much? How you went and threw an innocent woman into the mud for your own selfish gain? I was innocent after all."\n\nHe gulped, feeling her gaze boring into him. "I know what you are trying to do here. Well, I don't regret it. Not in the slightest. Nobody is innocent in politics, and if cutting you off meant getting a better deal for Brazil, then I would do it a million times if I had to." She cocked an eyebrow at him as Catxuréu chuckled heartily. With the wave of a hand, he conjured four drinks, from which he took a sip."
brazil_adhemar_coma.20.a: ""SUCH CONVICTION. NOW, LET US PLAY.""

brazil_adhemar_coma.21.t: "The Serpent Under the Flower"
brazil_adhemar_coma.21.desc: "Adhemar felt a surge of relief as he took in his cards The first round of Truco had been much too close for his liking - Quadros, wherever he had come from, had spent the entire round psyching him out, whilst Catxuréu seemed to only egg him on. But Adhemar had prevailed. Quadros snorted dismissively from across the table. "Enjoy your victory while you can, Adhemar." And like that, he vanished. Catxuréu chuckled. "SO YOU MANAGED TO LAST THROUGH THE FIRST ROUND. CONGRATULATIONS. HOWEVER, THE GAME IS NOT OVER. I DO BELIEVE I NEED A NEW PARTNER."\n\n"And who better than I?" A feminine voice said from behind Adhemar. He instantly recognised who it was. It was the voice of the woman that had plagued him throughout his Presidency. The woman who had blocked him at every turn. Edna Lott, in all her smug, self-satisfied glory, swaggered up to the table, sitting next to Catxuréu. "Surprised to see me?" she asked.\n\nAdhemar scoffed, but not without fear. "As if you would be anywhere else. You spent most of your time making sure my life was a living hell. Now that I am fighting to keep that life, it only makes sense that you would continue to oppose me."\n\nCatxuréu laughed once more, sending a chill down Adhemar's spine. It felt as if somebody had just stepped over his grave. "I SUPPOSE THAT MS. LOTT HERE WAS A THORN IN YOUR SIDE THAT YOU COULD NEVER BE RID OF, HMM? TELL ME, HOW MUCH MORE COULD YOU HAVE DONE IF YOU HAD SIMPLY GOTTEN RID OF HER SOONER?"\n\nThat familiar dread coursed through Adhemar's body. "It doesn't matter," he said, taking a sip from a drink. When had it gotten there? "It was just a source of more stress, if anything. Nothing I couldn't handle." He tried to believe himself, but his face told a different story."
brazil_adhemar_coma.21.a: ""IF YOU SAY SO. NOW, LET US CONTINUE.""

brazil_adhemar_coma.22.t: "An Unlikely Friendship"
brazil_adhemar_coma.22.desc: "Adhemar lay back contentedly as the apparition claiming to be Jânio Quadros frowned angrily. With a little bit of skill and a little bit of luck, he and none other than the Blessed Virgin herself had won the first round of Truco. Not-Quadros sniffed, before fading away in what felt like the blink of an eye. Catxuréu chuckled, clapping his hands together. "WELL, CONGRATULATIONS, ADHEMAR. YOU WON ROUND ONE. BUT DON'T GET TOO COCKY. THE GAME IS NOT FINISHED."\n\n"Oh, I'd say he has some reason to be cocky," a familiar feminine voice said from behind him. Adhemar's brow shot up to his hairline as none other than Edna Lott emerged behind him. She shot a scornful look at Catxuréu, before taking a seat next to Adhemar. "After all, he has many friends. And they all want him to succeed."\n\nFor the briefest of moments, Adhemar thought he could detect an expression of disbelief on the entity's face. That in itself was a miracle, as it lacked a static face to begin with, but Adhemar couldn't help but feel some satisfaction over it. It was nice to have some control in this bizarre situation. The entity cleared its throat. "VICE PRESIDENT. INTERESTING. I MUST ADMIT, I EXPECTED YOU TO JOIN ME. TELL ME, WHY WORK WITH ADHEMAR OF ALL PEOPLE?"\n\nEdna said nothing, picking up her deck. Adhemar glanced at her, and she only nodded at him, a look of determination in her eyes. All of a sudden, the many arguments they had in the past few years felt like nothing at all. "Well," he said, following suit and picking up his deck. "I suppose I can work with all kinds of people. It has always been a strength of mine. Isn't that right, Madame Vice President?"\n\n"Indeed, Mr. President," she said. Catxuréu scoffed."
brazil_adhemar_coma.22.a: ""VERY WELL. LET THE GAME BEGIN.""

brazil_adhemar_coma.23.t: "For the Kids"
brazil_adhemar_coma.23.desc: "The fog cleared, as a young, slightly nervous looking man who seemed to be a freshman in college appeared beside Catxuréu."Mr. President. I come here to thank you for the opportunities you have given me." Adhemar cocked his brow, curious. What brought this child here for this game of all things?\n\nHe summoned the patented charm that had won him many an election, pretending for just a moment that he was at a campaign rally rather than in a surreal battle for his own life. "Opportunities, eh? Tell me, kid, what kind of benefits have you received from my government?" His appearance changed from a boy to a short girl, which Adhemar oddly enough found himself accepting. "I... am benefiting from your educational reforms. They gave me and my family a chance to send me to school, learn to read, and enter the university," The child morphed again, this time into a tall, thin youth. "I'm the first intellectual in my family. " He changed again, becoming a broad-shouldered young man. "I found a good job in Rio, earning a good wage and sending money to my family. We didn't need to worry about having no money to see the doctor or pay the electricity fee."\n\nCatxuréu chuckled. "HOW SWEET! THEY WANT TO EXPRESS THEIR GRATITUDE. AND AFTER ALL, KIDS WILL ALWAYS GROW UP, AND THEN THEY CAN EXPRESS THEIR GRATITUDE FOR THEIR DEAR OLD PRESIDENT VIA THE BALLOT BOX INSTEAD."\n\nHe brushed the being's words aside. It seemed as if he had actually helped someone, in the end. Many people, in fact. "Either way, I am glad to accept it," he said softly, while the youth's appearance kept morphing. Were any of these people real?\n\n"They said that you are a thief, trying to steal everything from the country," hundreds of voices said in unison. "But I believe you are only trying to make our country a better place for the next generation. Thank you, Mr. President.""
brazil_adhemar_coma.23.a: "In a flash, it disappeared."

brazil_adhemar_coma.2301.t: "Do No Harm"
brazil_adhemar_coma.2301.desc: "A mighty grin formed on Adhemar's face as he dropped his cards; the climax of a flawless round. "WELL PLAYED, BUT WILL YOUR LUCK LAST?" Catxuréu hissed out the question as if it was a carbon monoxide leak, choking the life out of a sleeping family. "HOW HAVE OTHERS FARED THANKS TO YOUR ACTIONS?"\n\nAdhemar peered towards the fog as it dissipated, revealing a frail old man, weak with sickness. His square head reminded him of Castelo Branco, but also betrayed his origins as Nordeste, alongside his poverty.\n\n"Uh.. hello? Who are you?" A wheezing cough made its first response, before the figure properly introduced himself.\n\n"I am one of many, too many, but potentially more. I remember when I first heard I had tuberculosis, my family wept for days. I had hoped to see my granddaughter take her first steps, but death had called my name, and there was nothing that could be done."\n\n"And — in another time — I would have been right, but you gave me time."\n\n"I was one of the first to avail of your free healthcare program." Considering where they were speaking, Adhemar wasn't sure how to take this. "I did not get another life, but I didn't want another life. I wanted to experience the best few years of my life, and you gave me that. I did get to see my granddaughter take her steps, and I was there for all of them."\n\n"Thank you, Adhemar. I don't care what people said you took; you gave me something irreplaceable. You are a good man."\n\nAnd then, he was gone. The words made Adhemar think back to the mortal coil, his physical vessel in the care of a healthcare system he helped shape. Maybe, they could perform the same on him, and give him a few more years to finish his own legacy."
brazil_adhemar_coma.2301.a: ""I can't afford to die yet, so much still needs to be done.""

brazil_adhemar_coma.24.t: "The People's Welfare"
brazil_adhemar_coma.24.desc: "Another game, another victory. He was practically on fire! Catxuréu could only shake its head irritably as whoever had shown up to help him vanished into the ether. "You know, I do wonder where they go afterwards," he said, sipping his drink. The familiar taste of the whiskey hit his tongue, although the flavor wasn't quite hitting as it usually did. "Are they real? Or are you trying to mess with me?"\n\nIt merely chuckled in response. "WOULDN'T YOU LIKE TO KNOW? THEY'RE HERE TO HELP US, AND THAT'S ALL THAT MATTERS. WHY, HERE COMES SOMEONE NOW!" Adhemar turned around, and saw an unfamiliar woman approaching him. She was mid-height with tan skin and long, dark hair. She said nothing, only flinging herself onto Adhemar's side and hugging him. At another time, he would've shoved her off or made a good-humored remark. But as was, he only mutely patted her on the back, looking to Catxuréu in confusion. She pulled herself off, straightening up awkwardly.\n\n"My apologies, Mr. President. I am not here to play. My name is... well it isn't important. But I heard what was happening and just needed to say... Thank you. For everything. Without your welfare changes, my family would have starved. And I believe you can pull through this. Have faith." And with that, she ran off into the distance. Adhemar was befuddled, whilst the entity opposite him merely chuckled.\n\n"WELL, WELL. I SUPPOSE YOUR VAPID POPULISM HELPED SOME PEOPLE AFTER ALL. PEOPLE OTHER THAN YOURSELF AND YOUR ALLIES WHO MADE THEIR FORTUNE OFF OF CONTRACTS, HMM?"\n\nAt another point in the game, these comments would have rattled him. But the sincerity in that woman's eyes..."
brazil_adhemar_coma.24.a: "He knew that it had all been worth it anyway."

brazil_adhemar_coma.25.t: "Dirty Money"
brazil_adhemar_coma.25.desc: "Adhemar sighed with relief, placing his cards down, another game won. "Business is much like Truco, my friend, it's your partner that really counts." he said, clutching the hand of the man beside him in a triumphant grip. The man smiled with cold satisfaction, an emblem in the shape of an eye affixed to his two-piece suit.\n\n"Hitachi LTD is just one of hundreds of companies from around the world that have made the wise choice to invest in Brazil." Adhemar boasted. Death sat expressionless across the table as the President continued.\n\n"The new industry is fueling my country into a global economic superpower. Year after year the economy keeps growing and the more it grows, the more investors flock to the new Brazil."\n\n"TRULY A PARADISE, YOU'VE CREATED." Death replied.\n\n"Not far off the mark. In my Brazil everyone has a job, full employment has been achieved. The working class has never been better off." "TELL ME THEN, COMRADE DE BARROS, WHY IS IT THAT YOUR PEOPLE STILL LIVE IN SQUALOR. WHEN WAS THE LAST TIME YOU WALKED AROUND YOUR HOME CITY? I CAN ASSURE YOU LITTLE HAS CHANGED. AND WHAT OF YOUR NEW PARTNERS?" Death said, pointing at the Hitachi businessmen.\n\n"HAVE YOU TAKEN A CLOSER LOOK AT THOSE NEW FACTORIES, OR WHERE THEY HAVE ACQUIRED ALL THAT CAPITAL? DO YOU REALLY UNDERSTAND THE FORCES YOU HAVE UNLEASHED ON YOUR PEOPLE?" Ignoring Death's moralizing, Adhemar began to prepare for the next round. But as he reshuffled the deck, he noticed something staining the cards, a splattering of dark crimson liquid leftover on his fingers and palm. Adhemar looked down at his partner's hands. They were dripping..."
brazil_adhemar_coma.25.a: "Soaked in human blood."

brazil_adhemar_coma.26.t: "The Firmest Grip"
brazil_adhemar_coma.26.desc: "The room had no doors or windows, yet Adhemar had gotten inside and found the place well-illuminated by no light source he could see. There was no furniture, no Death, no truco. An oil painting of a deck of cards adorned the pale yellow wall. Adhemar made a quarter-turn and saw Manhães Bendit Baretto, smiling at him. Does he live here? How did he get in?\n\n"Profits are soaring, Mr. President!" Baretto said. "Brazil has never been more flush with cash than it's been under your leadership. A job well done, sir! A job well done!" Baretto reached out and seized Adhemar's hand, locking it in a vise-grip and shaking it hard. Adhemar winced in pain. He'd never known the man to have such an iron grip. He looked down at his hand, tried to wrench it back but couldn't, and that was when he noticed the dark bubbling ooze coating the floor, rising to cover his shoes.\n\n"Just look at these charts!" said Baretto. "The lines go up and up and up and up..." Baretto kept on like a broken record even as the oil. Oil! That's what it was! Viscous oil, still warm from the earth, rising to Adhemar's knees.\n\n"YOU TREATED THIS MAN AS DISPOSABLE," Death said. "ANOTHER PAWN IN YOUR GAME."\n\nUnseen hands suddenly peeled Baretto off Adhemar and dragged him under the surface of the oil. He struggled momentarily, and then nothing could be seen of the minister. The oil still rose. Now it had reached Adhemar's chest. "I did nothing wrong!" Adhemar protested. "Petrobras is our nation's future! It will bring power and prosperity."\n\n"THE FORMER ALWAYS AT THE EXPENSE OF THE LATTER." Now the oil surged up over Adhemar's face, raced down his throat, through his sinuses. Just when his lungs began to burn and his brain turned black, it all receded, and he was once more playing cards with Death."
brazil_adhemar_coma.26.a: "All the oil was gone."

brazil_adhemar_coma.27.t: "Ultimate Power"
brazil_adhemar_coma.27.desc: "Fuck, that was a close one. Adhemar had very nearly lost that round and only by the luck of having the right card did he clinch the victory. He mopped his brow, suddenly conscious of how sweaty he had become. His clothes felt like they were constricting his chest and the entire world felt much hazier. Catxuréu seemed to notice this. "TIRED? I SUPPOSE I AM TOO. COME, LET US HAVE A BREAK." Adhemar blinked, and in an instant, the table they had been sitting at was replaced with a bar. The entity stood behind it expectantly, wearing a red waistcoat and bowtie. "WHAT WILL IT BE, MR. PRESIDENT?"\n\nFor a brief moment, Adhemar wanted to question what exactly the entity felt like it was playing at, before quickly realizing the futility of such an action. And besides, his eyes had seized upon a very nice-looking bottle of whiskey. God, he was parched. "That one there, please," he said, gesturing to the amber bottle. Catxuréu nodded, retrieving it and pouring a generous amount into a small glass. Adhemar studied the honey-like liquid as it swam around the glass, sipping it. There was something decidedly off about it, as there was with everything in this strange place. How long had it been since he had a proper drink? Being President was all too time consuming to properly enjoy one - as was the case with most things.\n\n"PENNY FOR YOUR THOUGHTS, MR. PRESIDENT?" the entity asked, polishing a glass. "YOU SEEM DRAINED. I SUPPOSE THAT'S WHAT POWER DOES. IT SUCKS THE LIFE OUT OF YOU, LIKE A VAMPIRE. OR PERHAPS A LEECH. I IMAGINE IT MUST BE WORTH IT IN SOME WAY FOR SO MANY TO CRAVE IT."\n\nHe clenched his glass. The entity was right. He had seized power all those months ago when he and the Crow conspired to overthrow Henrique, and since then it had chipped away at his health and mental energy. But it must have been worth it. There was no world in which Adhemar de Barros could ever throw away his life for nothing. He was not that sort of a man. Swigging down the drink, he slammed it onto the bar."
brazil_adhemar_coma.27.a: ""I'll have another one, and then I'm ready to restart play.""

brazil_adhemar_coma.28.t: "Dancing, Dancing"
brazil_adhemar_coma.28.desc: "Another visitor. This time it was General Médici. He sat down at the table, and Death dealt him into the game. Médici had a huge Cheshire cat grin plastered across his face. The edges of his mouth nearly touched his ears. "Mr. President," he said, "as I promised, I've brought the armed forces around to support you. I trust this fulfills my constitutional obligations. The military stands behind the Brazilian state and the office of the presidency."\n\nDeath's laugh rattled the room.\n\n"What's so funny?" Adhemar demanded, "this is a significant achievement! I've brought the army under civilian control." Beads of sweat dripped down his forehead.\n\n"YOU ARE AN ORGAN GRINDER'S MONKEY!" Death said. "DANCING TO A TUNE YOU THINK YOU CONTROL."\n\nAdhemar's ears were suddenly assaulted by a cacophony of instruments, a violent samba. Médici began whistling along, the notes hissing out through his still-sustained grin, while Adhemar, quite against his will, tapped his feet beneath the table. Soon, he was up and out of his seat, swaying to the music as best his stiff joints could allow.\n\n"YOU DANCE WELL ENOUGH," Death continued, "BUT YOU COULD EASILY BE DROPPED FOR A PRETTIER PARTNER."\n\nAdhemar shook his head vigorously, all denial. "I have resolved what others couldn't. The military is united behind the PSP revolution, behind Brazil's beautiful future!" In response to Death's taunts, he threw himself into the Samba, dancing as long and as hard as he could, before collapsing back into his chair."
brazil_adhemar_coma.28.a: "Death scoffed and dealt another hand. "NO MAN CAN DANCE FOREVER.""

brazil_adhemar_coma.29.t: "For Our Future..."
brazil_adhemar_coma.29.desc: ""I salute you Mr. President!" The voice coming from the fog caught Adhemar by surprise, which belonged to a face he never thought he would see again: Admiral Álvaro, his nuclear assistant. He approached the stunned President with an enthusiasm that Adhemar never imagined to see from him.\n\n"I must be frank, of all the presidents I was forced to salute, you were the only one who deserved it, really. You did what not even Vargas nor Lott could: you secured Brazil's place at the top of the world. You my friend, you did the job of every responsible leader: you worked for our future. And for this, I'm deeply thankful" The smiling Admiral excitedly shook hands with his President, who silently muttered to himself: the job of every leader...\n\nAs the Admiral walked towards the fog, he turned back to Adhemar "You are a great man Mr. President! Don't forget that." Adhemar looked back at his deck and peeked at the cards above the table; he had won once again. That was easy.\n\nCatxuréu chuckled in amusement. "WELL, ISN'T THAT SWEET? A MAN WHO PUTS HIS NATION ABOVE ALL ELSE, EVEN IF IT MEANS GIVING MORE REASONS FOR HIS NEIGHBORS TO DESTROY HIM WHEN PEACE CEASES TO EXIST" Catxuréu suddenly brought its "face" closer to Adhemar, drawing his head back. "BEFORE WE BEGIN OUR NEXT GAME, PLEASE TELL ME: WAS IT WORTH CONDEMNING YOUR NATION AND MILLIONS OF LIVES IN A SUICIDAL NUCLEAR PACT IN EXCHANGE FOR GLOBAL PRESTIGE? TO BE RESPECTED AND FEARED BY YOUR ALLIES AND ENEMIES?"\n\nAdhemar shivered. For a long time, he had his back to the wall. But unfortunately, he couldn't and didn't want to change the past. His present was at stake, and so was the future of his legacy. He raised his head, now confident: "The world I live in is a den of wolves, where those who don't know how to defend themselves are mercilessly devoured by others. For the sake of Brazil's future, it had to be done.""
brazil_adhemar_coma.29.a: "Catxuréu proceeded to shuffle the cards, amused but unimpressed with the answer."

brazil_adhemar_coma.30.t: "The Bull Charges On"
brazil_adhemar_coma.30.desc: "As Adhemar threw his deck of cards onto the table, he breathed a sigh of relief. That was one more round under his belt. His allies had helped him along the way, of course, wherever they had gone, but he was once again alone. The entity sitting before him seemed rattled, somehow. "WELL PLAYED," it said, sipping its drink. "NOW ONTO THE NEXT ROUND."\n\nThey both sat there, waiting for the next player to arrive. But nobody came. Adhemar briefly felt a chill down his spine, fearing the worst. Catxuréu scoffed. "WELL. I DO BELIEVE THE GAME IS FINISHED." It stood up, looking Adhemar up and down, its blurred face bearing an indeterminable expression. "AND YOU HAVE WON. CONGRATULATIONS."\n\nFor a moment, he could not move, or even think. Everything seemed to go still. And then, he felt a grin split across his face. Ragged laughter made its way out of his throat as the weight of the world seemed to come off of his shoulders. He could scarcely believe it. "I... I've won my life back? Is that correct?"\n\nCatxuréu nodded its head fondly, as the world around them began crumbling away. "WELL PLAYED, MR. PRESIDENT," it said, picking up its briefcase. "YOU HAVE MY RESPECT."\n\n"But wait!" Adhemar said, standing up and grabbing its shoulder. "Before you go... what are you? What is this place?"\n\nIt chuckled, the once ominous noise sounding more familiar than it had before. "THIS PLACE IS NOT REAL. I AM NOT REAL. YOU HAVE BEEN EXPERIENCING THE SIGHTS AND SOUNDS OF A LIFE WELL EARNED - A KALEIDOSCOPE OF MEMORIES AND EMOTIONS. ALL AS YOUR BODY FOUGHT TO CONTINUE LIVING. AND IT IS A FIGHT YOU HAVE WON. GO, NOW, ADHEMAR DE BARROS. LIVE YOUR LIFE WHILE YOU CAN."\n\nA bright light consumed Adhemar's vision. He took a sharp intake of breath."
brazil_adhemar_coma.30.a: "And Adhemar de Barros lived again."

brazil_adhemar_coma.31.t: "Game Over"
brazil_adhemar_coma.31.desc: "As the figures from the previous game disappeared, Adhemar braced himself for what was to come next. The game had not been going well thus far, but he was confident that he could pull through. His main concern, however, was who else could there possibly be to join him. He had confronted so many of his sins in the past however long he had been there. What more could be in store? Both Adhemar and Catxuréu sat there awaiting the next player to arrive from whichever ether they seemed to pop out of.\n\nBut nobody came.\n\nAdhemar's eyes darted from left to right, scanning the disjointed landscape for any sign of life beyond whatever it was that sat in front of him. Nothing.\n\nThe entity began to chuckle. It was a hoarse, raspy noise that sent ice down Adhemar's spine."WELL. IT SEEMS YOU HAVE RAN OUT OF ALLIES. YOU OF COURSE KNOW WHAT THIS MEANS IN TRUCO." His hands began to shake involuntarily. This couldn't be it. Not yet. Catxuréu rose to his full, impossible height, his nonexistent eyes boring into Adhemar's very being. "GAME OVER." It said, picking up its cards and packing them away.\n\nA low, piercing noise began to creep its way into Adhemar's ears. The landscape seemed to be crumbling away before him, being consumed by what could only be described as a gargantuan rainforest. "Wait! WAIT!" he yowled after Catxuréu, who seemed to be marching into the treeline. He scrambled after it, trying to ignore the increasing numbness enveloping his body. "Please! Just one more chance! I'll do anything, please!"\n\nThe entity only sighed. "THEY ALL SAY THAT. THEY NEVER WANT TO SEE THE END. NEVER WANT IT TO BE OVER, I AM SORRY, ADHEMAR BUT YOU MUST FACE REALITY AND WHAT IS TO COME NEXT. I HAVE OTHER MATTERS TO ATTEND TO. GOODBYE."\n\nThe President screamed as it faded away, being enveloped by the trees. He could only sink to his knees as the trees grew closer and closer to himself and the twisted replica of the presidential palace. He could only wonder one thing."
brazil_adhemar_coma.31.a: "What now?"

brazil_adhemar_coma.32.t: "Awakening"
brazil_adhemar_coma.32.desc: "Adhemar opened his eyes, and immediately shut them again. A brilliant white light had stabbed his retinas the instant his lids parted. He tried again, and this time he was able to keep them open for a moment longer.\n\nThere was a suggestion of motion above him, circular, hypnotic. A third opening confirmed it: a ceiling fan, illuminated by a bright bulb.\n\nReflexively, he tried to swallow, only to have the sensation of razors slicing open his throat. He tried to speak, only to emit a hollow rasp. There was someone else in the room with him, close by. He could hear their breath. Adhemar knew that particular cadence of breath, would know it anywhere. Leonor!\n\nWith an almighty effort, Adhemar turned his head to the source of her breath, the crackle of his vertebrae like gunshots. The sound drew Leonor's attention, and their eyes met at the same time. She sat bolt upright, eyes widening to perfect circles. "Ad...Adhemar?"\n\nAdhemar managed to nod. "Ssstill...h...here."\n\nLeonor filled her lungs and rose from the chair. "DOCTOR!" she screamed. "HE'S AWAKE!"\n\nMoments later, a cavalcade of medical practitioners stormed the room. Every manner of test commenced, and soon a doctor stood over Adhemar, asking him questions.\n\nAdhemar managed to sip some water and get his vocal cords to work. "Get... me... Laudo," he commanded. "My chief of staff. I need... flight back to the capital." Finally, he grabbed the doctor's wrist. "And... tell... no one... I'm awake.""
brazil_adhemar_coma.32.a: "The President of Brazil collapsed into his bed."

brazil_adhemar_coma.33.t: "All Rise"
brazil_adhemar_coma.33.desc: "Being a congressional stenographer wasn't easy at the best of times, and for Brazil, these decidedly were the worst of times. The President was in a coma, the government was in disarray, and now Tancredo Neves had initiated an impeachment vote against the President. So as one might imagine, Alejandro Cardoso's fingers were about to fall off.\n\nThe PTB, PSD, and UDN were like sharks that had caught the scent of blood, trying to bite off pieces of the PSP while the President was out of the picture. Members of all parties were trying to shout down the others. Cardoso could barely record one word in ten as aides and adjutants struggled to restrain their fellows from a brawl on the Congress floor. Alliances seemed to change by the minute, a small whisper here, a meeting in a backroom there, and things shifted again. But one thing was clear: it seemed as if this government's days were over.\n\nAs the final vote drew near, and the PSP said its prayers, the doors to the Congress flew open and Alejandro stopped typing. A PSP official burst into the Congress and shouted loud and clear over the cacophony, "All rise for the President, Adhemar de Barros!"\n\nThe whole room went silent, and nobody moved, and then they remembered themselves and got to their feet. Slowly, shambolically, a hunched figure crossed the floor, a cane tapping as he went. Adhemar climbed into the gallery, and leaned over the railing, casting his gaze over the assembly. He was an angelic, or devilish figure, depending on one's affiliation.\n\nMany a PSP member shed a tear, realizing their careers had been saved, while the other parties realized their alliances and politicking were for naught."
brazil_adhemar_coma.33.a: "Adhemar is back."

brazil_adhemar_coma.34.t: "The Best Way to Defeat an Enemy"
brazil_adhemar_coma.34.desc: "As another day dragged on in the senate, Edna tapped her foot impatiently. Her battle for impeachment had turned from a crusade to a quagmire, as the proceedings had brought Congress to an utter standstill. Almost nothing had been accomplished in the past weeks, to the Vice President's frustration. While two PSP senators droned out another irrelevant speech, Edna began to dispassionately draft her next argument. A few minutes later, the senators suddenly stopped their ramblings as a door creaked open. Looking up, Edna gasped as Adhemar entered the room, shakily leaning on a black cane.\n\nThe President slowly looked around the room as the senate stood in shocked silence, surveilling the entire scene with wordless disapproval. When his gaze landed on the opposition, Edna and Adhemar locked eyes. An arduously long moment passed. With a curt nod, Adhemar turned away and took a seat in the observation gallery, overlooking the proceedings in silence.\n\nAs the PSP began to rally behind the President, Edna slowly turned to Brizola and Neves. The two men looked around confused, awaiting the Vice President's orders. After a deep sigh, Edna spoke, "I'm sorry, but after this turn of events, I can no longer support impeachment."\n\nNeves sighed in disappointment, while Brizola's face contorted with anger. "How could you do this?" he shouted, "How could you betray your party and principles for that man, that corrupt rat? Does your cause mean nothing to you anymore?" Edna said nothing, a mix of sorrow and regret staining her face. Silently, she rose and began to walk towards the exit. Behind her, Brizola yelled after her, "You sell out! At least Adhemar has some convictions, but you're nothing but a damned traitor! You and your puppetmaster may have won today, but you won't be Vice President for long! I'll make sure of it. Personally. Every tool at my disposal will-"\n\nBrizola's tirade was silenced as Edna slammed the door behind her, but his words still rang in her ears. As she lay sleepless in her bed, Edna wondered if things could have gone differently."
brazil_adhemar_coma.34.a: "Impeachment defeated."

brazil_adhemar_coma.35.t: "Return of the Major"
brazil_adhemar_coma.35.desc: "After long weeks of presidential silence and the raging impeachment debate, the Congress of Brazil had transformed from a house of occasionally reasoned debate to a desperate political battlefield. General Edna commanded Lieutenant Brizola, organizing constant assaults on the legal defenses the PSP had erected around Adhemar's presidency, while Lieutenant Laudo desperately rallied the party to repel the advances. As he approached the frontlines, Adhemar frowned at the scene before him, before silently taking a front-row seat at the observation gallery.\n\nA few minutes later, a party official glanced towards him and gasped, and the President watched as the news of his arrival rippled out across the senate. A ceasefire rose between the two factions as every senator craned their neck towards the gallery. With the secrecy that had shrouded his awakening, the end of his coma was only now revealed to the general congress, changing the atmosphere of the room in an instant. A few tense moments later the battle roared back to life, as Laudo rallied his now emboldened soldiers to defend the newly arrived President.\n\nAcross the chamber, General Edna stared motionless at the President. Major General Adhemar stared back, his face forming an inscrutable expression. Around the two, the battle began to roar again, as the two Lieutenants commanded their troops, while the Generals remained locked in silent animosity."
brazil_adhemar_coma.35.a: "A war of Adhemar's making."

brazil_adhemar_coma.36.t: "Invictus"
brazil_adhemar_coma.36.desc: "Adhemar hobbled maladroitly back into his office where Laudo Natel was taking notes, who immediately sprang to his feet. A friend in normal times, his pillar right about now. They shared a genuine smile. No wisecracks, no snide jabs. For once, they were content just to say nothing at all.\n\n"So the party's in one piece after all." A couple moments after seeing each other for the first time since Adhemar was bedbound, the President and the Chief of Staff shared a sofa, reviewing the situation at hand. The dreaded internal resistance never materialized, no backs were stabbed, but it was safe to say trouble was still ahead. As for the leader himself, the health situation was so grave he was actually following doctor's orders for once, matching Natel's beer with a glass of water.\n\nAnd the presidency. Adhemar would sooner have a drink with an FBI special agent than get on the campaign podiums again, not that he would be able to get up there anyway. But someone would have to take the reins. But then that would not be him. No, he was still the leader of the PSP, and he had yet to show the party how to lead. With a little over a year left, he had enough work to do.\n\nThe most powerful man in Brazil was not as powerful as he came into office. But he was not afraid. He held up his head and faced the Brasília horizon."
brazil_adhemar_coma.36.a: "I am the master of my fate, I am the captain of my soul."

brazil_adhemar_coma.37.t: "The Doctor Maintains His Practice"
brazil_adhemar_coma.37.desc: "The pandemonium that had dominated for the past weeks was finally silent, as every senator anxiously awaited the verdict. The final deals had been signed, and the last offensives had been executed; all that was left to do was wait, and see which side had used the superior strategy. Adhemar and Edna leaned forwards in their seats, as the seconds dragged on. Finally, seemingly after a century of waiting, the result was delivered.\n\n"The motion to impeach President of the Republic Adhemar de Barros has failed to reach the necessary votes required for passage, and is therefore defeated."\n\nThe tense silence of the senate was shattered in a moment. A standing applause rose from the ranks of the victorious PSP, drowning out the shocked gasps hailing from the defeated parties. Members of the PTB swarmed around Edna, desperately looking for guidance from their leader as the enemy's cheers grew ever louder. Edna said nothing, sitting petrified by the verdict, as she stared at Adhemar, searching for any hint of shame in the President's face.\n\nShe found none. The President smirked, basking in the well-earned victory. A minute later, despite his best efforts to compose himself, Adhemar began to chuckle. As he laughs, he stands and begins walking to the door, leaving Edna standing in the ruins of her failed revolt. With one final glance, he disappears from view as the door shuts behind him.\n\nStanding in the center of the whirlpool of panicked opposition members, Edna rose without a word. She pushed towards Brizola, who was standing in a cluster of officials, desperately working to pull the party back together. As he noticed Edna approach, Brizola pulled her aside. "We need direction, Edna," he said panting, "What's the plan? Contact our allies in the press and continue the offensive, destroy the PSP in the election. Or should we try something more revolutionary. We need to respond to this somehow, what's our next move?" Edna sighed."
brazil_adhemar_coma.37.a: ""We're going home, and I'm going to write my resignation letter.""

brazil_adhemar_coma.38.t: "Impeachment"
brazil_adhemar_coma.38.desc: "Another vote, another flurry of yells and cheers. Then another. The Senado is a machine, manufacturing an assembly line of reactions, screams, wails and roars. It repeats its cycle unquestioningly until even the voting senators themselves are lost in the thick mire of noise. It is excruciating.\n\nThe President shakes, watching on with fear, restrained only by powerlessness, his throbbing head, his strained muscles. It is him this is about. Do they love him? Do they still clamor outside the buildings, their vocal cords juddering with passion for him? Above all, do they think about him, how he must feel, confined by his inferiors?\n\nOr did they forget about him?\n\nThen the intensity peaked. The fateful vote was made. The vultures swarm from all sides. The Udenistas, the Getulistas, the liberals all stood together, laughing, embracing each other, forcing a human wave of his own men to escort him away. They plodded through the doorways, the rhythm of a funeral march. The march never ended.\n\nHe could already see her wicked face in front of him, or rather back in the chamber. As she fastened the sash of green and gold to her sinful person, he only saw her transparent greed, how her visage of smiling treachery cracked open the moment her name was announced: Edna Lott. Fifth columnist, opportunist, President. Even still, only one word rang in his ears.\n\nThe one word: impeachment. To him it was all the same."
brazil_adhemar_coma.38.a: "And the echoes kept coming."

brazil_adhemar_coma.39.t: "The Serpent Victorious"
brazil_adhemar_coma.39.desc: "Honesty and integrity in Brazil were both dead.\n\nThis was the only conclusion that Carlos Lacerda could possibly arrive at as he packed his remaining belongings into a suitcase. The government had fallen to the charms of that lying cretin Adhemar - the snake who came back from the dead to ruin any chance of honesty and decency in Brazilian governance in favour of the shambolic, phoney replacement he and his friends had cooked up.\n\nAs soon as he heard that the impeachment vote had failed, Lacerda had immediately called his secretary and ordered her to clean out his office, as well as to inform anyone who worked under him that they would all soon be out of a job. The crushing feeling of defeat was too much to handle. He, the PTB, the PSD, and every other force that had fought the battle for Brazil's soul had lost the fight - and here he was, running away with his tail between his legs.\n\nSlamming the suitcase shut, he contemplated just where everything had gone wrong. Perhaps he should have fought harder in 1965. Perhaps he should have conceded to another candidate sooner, so that the vote would have been less split. Or, some spiteful voice in his head said, maybe he should simply have walked into Adhemar's hospital room and strangled the man as he slept.\n\nIt wasn't as if it mattered anymore anyway. His flight was booked, a place to stay had been arranged, and he would start a new life in the United States - a country that still remained clean of Adhemar's brand of seedy, populistic nonsense. He had already received offers from a man by the name of William Buckley to come onto his radio show, so that he may warn Americans to avoid Brazil's mistakes. Such a career would be fulfilling and worthwhile, of course, but deep down Lacerda would always remember one thing."
brazil_adhemar_coma.39.a: "Adhemar had beaten him."

brazil_adhemar_coma.40.t: "Better Luck Next Time"
brazil_adhemar_coma.40.desc: "On the rare occasions in life that things do entirely go according to plan, all the little things start to taste just a little bit sweeter, Lacerda mused as he sipped his morning coffee. Or perhaps it was just the extra sugar he had requested to be added. Regardless, life was good for Carlos Lacerda at the moment. And as his eyes scanned the headline article detailing Adhemar's impeachment, he felt himself smiling widely. Yes, victory was in fact sweet.\n\nHow he had truly savored the moment that Adhemar - witless ghoul that he was - had realized that he was not going to remain President for much longer. The way his face had dropped, all the age that had crept up on it during the coma becoming more noticeable by the second. How his posture slowly grew limper and limper, the despair sinking it. How must it have felt? Knowing that despite the grand, showy display he had made of returning, that he had still been deemed unfit to remain by the Senado. That he and his party of crooks would soon be relegated to the dustbin of history, where they belonged.\n\nLacerda knew how it made him feel. And it was good. After years of struggling, his greatest political battle had been a victory.\n\nFinishing his coffee, he made for the telephone. Adhemar was gone, and his legacy was one of irrelevance. Now the rest of the work had begun. Vargas' legacy was still pervasive in Brazilian politics, and his erstwhile allies in the PSD and PTB were responsible for it. He could not afford to shirk his quest to rid the nation of it for even a moment. Dialing in the familiar number, it rang for a few moments before the receiver picked up. "Good morning, Raphael," he said, the happiness evident in his voice."
brazil_adhemar_coma.40.a: ""I would like to talk to you about the upcoming elections.""

brazil_adhemar_coma.41.t: "The Feast"
brazil_adhemar_coma.41.desc: "It didn't take long for the vermin to arrive. The body wasn't even cold but these creatures were unbothered by such scruples.\n\nFirst there were the insects, they were drawn by the squealing of the machine, a swarm of scrubs and surgeon masks. They clawed at the body, poking it with their instruments and probosces, chittering amongst each other. Then the vultures arrived, flying in from lands far beyond, their screams and caws transmitted at radio speed, alerting the whole nation to the news.\n\nThe feast had begun.\n\nNext came the rats, the ones who crawled in the tunnels of Brasília. They hungered, eager to sate their ravenous appetite for power.\n\nBut the King Rat got the first bite, Pedro Aleixo, former deputy, now King. A creature without a will of his own, he lacked the drive of the others, but ate from the corpse all the same.\n\nFinally there was the man. It seemed to Laudo Natel that he was the last person in the country to catch the scent of ripe meat, and it revolted him. Now, the most powerful man in the country, the King Rat, dancing to his tune, a puppet in all but name. But all he could do was gaze on in horror. The politicians, the journalists, and all the rest, they cared nothing for the man who had given his life to save their nation. Only the leftover wealth and power interested them, the grotesque feast. Though he was now its ruler he could do nothing but watch as, soon enough, the whole of Brazil..."
brazil_adhemar_coma.41.a: "Dined on the corpse of Adhemar de Barros."

brazil_adhemar_coma.42.t: "To You, Therefore"
brazil_adhemar_coma.42.desc: ""It is our grim duty to confirm the previous newsflash out of São Paulo: the President of this Republic of Brazil, Dr. Adhemar Pereira de Barros, has died today of complications arising from the heart attack he suffered in the Metropolitan Cathedral of Our Lady of Aparecida. Under the laws on acephaly of the executive power in the Republic, the new President will be—" A knob clicked as Edna Lott turned the radio off.\n\nShe knew it was coming. Everyone knew it was, the moment that it was known that Adhemar had fallen into a coma. But to Edna it still felt like a surprise, to come so suddenly—at first, it seemed like Adhemar was unassailable, and then he just... fell down, was taken away. Just like that.\n\nThe horror she felt at the fate of all humanity was joined by a more practical worry. With how much of a mess Adhemar had left behind, amidst all this Clemente and German nonsense, what was to become of the country? How would it find a way forward? What solution was available to put an end to this crisis?\n\nMaking sure the radio was turned off and checking that it was taking up no more electricity, Edna decided to stand up and go to church. She wouldn't just pray for Adhemar's poor dead soul, though—she would pray for the country he'd left behind."
brazil_adhemar_coma.42.a: "Lembre-se da morte!"

brazil_adhemar_coma.43.t: "A Hasty Confab"
brazil_adhemar_coma.43.desc: ""President Aleixo will see you now, Mr. Natel." The secretary, who by now had known Laudo Natel for years, nodded respectfully as he entered. Just as he passed him by, the secretary whispered, "Good luck, Laudo"; Natel nodded shortly in thanks and walked into his late patron's former office—now occupied by the President of the Chamber of Deputies, one Pedro Aleixo, hastily elected to the Presidency under the laws of acephaly of the executive power.\n\nNatel cursed himself for not doing any research on the new President. As far as Natel knew, the secretary's concerns seemed warranted, since Aleixo was a rather orthodox Udenist differentiated from the likes of Lacerda only in how loudly he expressed his convictions. But Pedro Aleixo had a different idea in his mind, an idea that left Natel confused and rather impressed as he expressed it.\n\n"Mr. Natel, I should make one thing extremely clear to you: I am not so loyal a partisan as to deny the PSP the right to finish its administration to the end of the late President's term, may the Lord grant him rest." Natel let out a breath of relief that he almost didn't know was bottled up. Aleixo nodded in understanding, then continued.\n\n"The fact of the matter is that, no matter what the likes of Lacerda might say, as a provisional" —this word was uttered with almost exaggerated emphasis— "President of the Republic, I don't have a mandate for anything else." Suddenly, however, Aleixo's eyes flashed.\n\n"But do note one thing, Mr. Natel. You as the chief of the government in Dr. de Barros' absence must be aware of this, and I expect Vargas Filho to know of it too. If you and your party step out of line during this caretaker administration, I will not hesitate to take action."\n\nNatel did not dare disagree with that."
brazil_adhemar_coma.43.a: ""Thank you, Mr. President. I accept your directives.""

brazil_adhemar_coma.44.t: "The Final Page"
brazil_adhemar_coma.44.desc: "It was late afternoon when it happened, according to the doctors. The sun had just begun to retreat behind the clouds, and the two physicians had entered his room, ready to check his vitals. The room was empty - his family had left around 20 minutes ago, following a day of dutifully watching over him in his slumber. But as the junior of the two leaned over to take a blood sample, the heart monitor made an all-to familiar noise - that high-pitched wail that signified the ending of a life.\n\nImmediately, all the hospital's best medical staff were called in, and attempts were made to bring him back to the world of the living. But that mournful dirge had told the doctors all that they needed to know.\n\nAdhemar de Barros had passed away.\n\nThe moment Edna received that fateful telephone call, she knew what had transpired. She was promptly hurried onto a small plane to the capital, a steady numbness taking over her. Adhemar - and all the baggage he brought with him - was dead, which put her party in charge of the country over the PSP. That should obviously be a net good thing.\n\nBut the knowledge that a man who had played such a large part in her political life for so long was now gone forever, oddly hurt. She was not a stranger to grief and she could feel it affecting her here, despite all of his flaws.\n\nEven as she recited the presidential oath and as the sash was draped over her, Edna still could not decide how to feel about the situation. But that did not matter. All that mattered was that it was her time to lead - and she would do her family proud, no matter what."
brazil_adhemar_coma.44.a: ""Goodbye, Doctor Adhemar.""

brazil_adhemar_coma.45.t: "A Widow's Advice"
brazil_adhemar_coma.45.desc: "It was a beautiful day for a funeral. The sun shone out of a cloudless sky. A breeze cooled the mourners at the graveside and dried their still-wet cheeks. Birds sang and flitted from tree to tree as the funerary rites for President Adhemar were concluded.\n\nEdna Lott watched as the gravediggers lowered the coffin of the President of Brazil into the ground. She felt an unexpected pang. For all of Adhemar's obstinacy, for all of his chauvinism, Edna realized she would miss him. His energy and optimism were one of a kind, even with all the ill that had come as a result of his administration.\n\nEdna's gaze was drawn to the inconsolable Leonor Mendes de Barros. The President's wife was doubled over in her chair as if mortally wounded, hands pressed to her face. Edna could see tears streaming out between the clenched fingers. The sight of the widow brought back a monsoon of grief for Edna.\n\nIt hadn't felt like ten years since her own husband had passed, but the inexorable march of time, and the work, had helped bury the grief.\n\nMost of the mourners had left as the sun hung low in the sky. Edna gingerly made her way over to Leonor and placed a hand on her shoulder. "I'm so sorry for your loss," Edna said. "He really was one of a kind."\n\nLeonor lifted her red eyes and took Edna's hand. "How do I go on?" she asked, barely able to speak past the lump in her throat.\n\n"I devoted myself to the work. In time, the pain becomes bearable. You'll never get rid of it, but you can make it a part of yourself. A part of your strength. Continue the charity work, embrace it entirely." Edna squeezed Leonor's shoulder. "I'll light a candle for him.""
brazil_adhemar_coma.45.a: ""Thank you, Edna," said Leonor. "I'll do my best.""

brazil_adhemar_coma.46.t: "Tail Between Legs"
brazil_adhemar_coma.46.desc: "In the end, it did not even matter. How hard they had tried, how far the Social Progressive Revolution had gotten—it all fell away like water in the Tietê River with a single man's death.\n\nLeaving the funeral in the same place where Adhemar had last been conscious, Laudo Natel felt himself experiencing the last stage of grief: acceptance. With Adhemar's death, all of his and Laudo's efforts were likely definitely lost given that the PTB was now in charge and the PSP could certainly expect to be attacked six ways from Sunday in the 1970 election.\n\nThe only safe way out would come if Vargas Filho managed to pull off one of the greatest upsets of Brazilian electoral history. That was definitely the hope, anyway, but Laudo suspected that it was forlorn; at least it was Vargas Filho in charge and not the idiots that had been in charge beforehand.\n\nIn the end, Laudo was not concerned for the time being; he was off on a vacation to Venezuela. Well deserved, in the circumstances."
brazil_adhemar_coma.46.a: "He would start worrying again only after the vacation."

brazil_adhemar_coma.47.t: "The White City"
brazil_adhemar_coma.47.desc: "Adhemar stood in the center of Brasília the empty city, the white skyscrapers hung over him shadowless, doing nothing to block the blinding light of the sky, or was it darkness? Night or day, such concepts had no meaning to him anymore. He stood at the center of all that was and all that would be, and all that would never be.\n\nA warm familiar hand touched his shoulder, the touch of his long dead father, his brother, his own hand. He turned around and saw the-thing-with-a-thousand-names standing before him\n\nAdhemar looked into the distance, the rainforest of the lands beyond the wall of life drawing him, unstoppable. Adhemar searched through his pockets, for what? Adhemar didn't know, a cigar, a photo of his family, any last connection to the world before. And yet, all he could find was a single peso. A single peso... his life's work...all that wealth, and for what? He threw the coin aside. Catxuréu spoke in the voice of a thousand whispers.\n\n"YOU DAWDLE WITHOUT PURPOSE MY FRIEND, THERE IS ONLY ONE ENDING, NO ROOM FOR MANEUVER" "And what awaits me, exactly? Out there, I mean. I know what the priests say, but those don't look like pearly gates to me" Adhemar asked nervously, his footing already slipping in the tug, unstoppable.\n\n"IT IS THE NEXT PHASE, THE TURN OF THE WHEEL... THE ESTADO NOVO" said Death. Adhemar nodded without understanding.\n\nPerhaps there was a second chance beyond or perhaps not, for once in his life his control was gone. No deals, no threats, no promises could change what was coming. He stopped resisting, took a step forward..."
brazil_adhemar_coma.47.a: "And disappeared into the green beyond."

brazil_adhemar_coma.48.t: "Past Perfect"
brazil_adhemar_coma.48.desc: "Around his place on the hospital bed were friends and family. Some time beforehand, Getúlio Vargas Filho had taken his leave, as had Laudo Natel. A letter had come from Edna Lott, assuring him of her prayers—he had nodded appreciatively when it was handed to him, but did not understand what it truly said.\n\nHis life flashed before his eyes. The hour had come.\n\nLooking out the window at São Paulo one last time, and then at his surroundings, he murmured, "As God commands, the box shall now close one last time; I commend my nation to you," and closed his eyes forevermore. The EKG flatlined, and people wept.\n\nThe deceased looked around amidst the wailing; there sat Catxuréu. He greeted Death like an old friend. "Well, then, Mr. Catxuréu, we meet again. Alas, there's no table here that isn't occupied, or I'd play another game with you."\n\nCatxuréu's expression did not obviously change, but his interlocutor could tell he was smiling. "WELL MET INDEED. THAT'S NO BIG PROBLEM; I'M HERE ON BUSINESS ANYWAY. ARE YOU READY TO MOVE ON?"\n\n"I am."\n\n"ARE YOU SURE YOU HAVE DONE EVERYTHING THAT YOU FELT YOU NEEDED TO DO?"\n\nA brief moment's hesitation. Then President Adhemar de Pereira Barros responded—"
brazil_adhemar_coma.48.a: ""I—I'm sure. It's time to go.""

brazil_adhemar_comatree.1.t: "Cracks in the Cabinet"
brazil_adhemar_comatree.1.desc: "It wasn't supposed to go like this.\n\nLaudo Natel couldn't focus. As he heard the rest of Adhemar's cabinet bicker at the table behind him, his thoughts continued to race in his mind. Would Adhemar wake up soon? Would the PSP finally unite behind him, and ensure that Adhemar still had a presidency to return to? He tried to remember everything Adhemar had taught him, everything he had been told. If there was one person to rally the PSP, it had to be him. Some phone calls needed to be made if the PSP was to survive this crisis. Natel turned around to the table, and began dialing a number. As he put the receiver to his ear, Natel prayed that the special coffers hadn't run dry yet.\n\nOn the opposite side of the country, Tancredo Neves waited outside the National Congress building. Unlike his PSP counterpart, Neves was calm and collected. He hadn't expected so much support in the Senado after introducing the articles of impeachment, but he wasn't going to complain about it. There was still work to be done, of course. Calls that needed to be made to Brizola and Kubitschek in the morning to ensure that the stain of the PSP would be erased from the presidency. The rot of corruption had infected Brazil, but it wasn't terminal. As a smile crept up Neves' face, his determination to see Adhemar and the PSP removed from power only hardened.\n\nAs night turned to day, the fate of Brazil's future lay in the hands of Natel and Neves. Both men knew that only one could come out on top."
brazil_adhemar_comatree.1.a: "The PSP is weakened, but not yet lost."
brazil_adhemar_comatree.1.a_tt: "While §hAdhemar de Barros§! battling against §RDeath§! in the §Simaginary world§!, the battle between his supporters and his opponents in the §Kreal world§! unveils its curtain. The life of the $BRA_party_psp_c$ has been on the shoulder of §hLaudo Natel§!, but he still wonders: will he be able to §Gunite §hhis mentor's party§! behind him§!? Or, will he witness the §Reventual destruction of §hhis mentor's efforts§!§!?"
brazil_adhemar_comatree.1.b: "Vargas' legacy will be restored."
brazil_adhemar_comatree.1.b_tt: "While §hAdhemar de Barros§! battling against §RDeath§! in the §Simaginary world§!, the battle between his supporters and his opponents in the §Kreal world§! unveils its curtain. §YTancredo Neves§! is confident that the §dimpeachment bill§! will be passed, and that the §hinfection of corruption§! will be §Gswept out§!. But, what if he §Rfails to restore §VPresident Vargas§!' legacy§!?"

brazil_adhemar_comatree.2.t: "Populism's Tug of War"
brazil_adhemar_comatree.2.desc: "It was a miracle that Adhemar could somehow manage to wrangle both factions to cooperate, Natel thought, as he read over the opposing proposals submitted to him by the cliques of the PSP. Cutting social spending in the name of reducing the national debt? Weren't they supposed to be the party of the people? Who in their right mind would agree to this shit? Was Café Filho trying to sabotage the party, or was his head so far up his own ass that he accidentally sent him the wrong document? Natel sighed, and shifted his attention to the other proposal submitted by the left wing on the party that seemed hellbent on destroying itself.\n\nNatel immediately recognized Vergal's handwriting, and started to flip through the pages that were in front of him. Agrarian reform, cutting out foreign investment in favor of promoting local businesses... these were all things that Natel thought were core to the PSP's image. With these proposals, they could surely even win back a few votes after this whole coma thing had come and go. As he flipped to the last page, Natel began to relax in his chair; there was hope for the PSP after all, until he came upon the expected price tag of these reforms. His stomach sank as he saw the total cost of the proposed agrarian program and necessary investment in local businesses. Could the PSP actually afford such a cost at this point? He began to run some calculations in his head, before coming to a conclusion."
brazil_adhemar_comatree.2.a: "We cannot afford to increase our national debt."
brazil_adhemar_comatree.2.b: "The people will always come first, no matter what."

brazil_adhemar_comatree.3.t: "Exchanging Pleasantries"
brazil_adhemar_comatree.3.desc: ""Andrade speaking."\n\n"Auro, my friend! How are you!" Natel nervously tapped his feet against the desk he was leaning on. There was only one person left that could buy the PSP time, and it was Auro de Moura Andrade. But Natel never could read the Senator's mood and ambitions. He had sided with the PSP before, sure. But in this time of need?\n\n"Natel." The voice on the other line was completely flat. "I'm doing well. What do you want?"\n\n"Mr. President, I'll be honest. The PSP and President Adhemar need your help."\n\n"And what exactly does a party that's falling apart and a President in a coma do for me?" Natel's heart rate jumped a bit at the end of Andrade's sentence. It was, thankfully, always about him.\n\n"It's true that the party is struggling right now. That's why I need your help. If you could delay the debate tomorrow regarding the articles of impeachme-"\n\n"And why would I do that? That doesn't seem very constitutional to me, Natel."\n\n"I'm sure it's not. I'm also rather sure that you have a re-election race coming up soon. And the PSP has quite the list of candidates, just absolutely ready to mount an opposition bid against you. I also have some extra campaign funds lying around here somewhere that could go to them in the next Senate election. But I wasn't sure what exactly to do with them."\n\nAndrade gritted his teeth. This wasn't the first time he was making a "deal", but this one felt wrong for some reason. Re-election was re-election though. Who knew who would come on top of this whole crisis. Better to stick with the current power brokers, as corrupt as they might be.\n\n"Fine. I expect to see one of your men within 48 hours." Andrade slammed the phone receiver on the desk. He massaged his temple, trying to find a way to spin delaying the impeachment debate tomorrow. How the hell would he manage to spin that?"
brazil_adhemar_comatree.3.a: "A bit of cash would ease the headache."

brazil_adhemar_comatree.4.t: "The Crow's Cacophony"
brazil_adhemar_comatree.4.desc: "Laudo Natel couldn't believe the number he was dialing. Normally, dialing a journalist's number is no big deal, but this was going to a certain former governor, and one of Natel's least favorite men. But desperate times certainly called for desperate measures, and these are desperate times.\n\n"Good evening, Carlos Lacerda!"\n\nLacerda recognized that voice. Why in the world was the PSP calling him? Don't they have someone else to ruin through their endless bribery?\n\n"I'm not helping you with shit, Natel."\n\n"Oh, I know. I was just checking in on Brazil's future. You know, the Varguist coalition won a LOT of seats after the election in '65. It looks pretty sewn up that once we get impeached over here, that they'd be the ones in control of the Senado. What do you think? I know you've got your own ambitions, but I uh, ran the math and numbers on my end, and I don't think I see a way for the UDN to get a majority in '69." Natel's words were dripping with sarcasm, and a sinister grin grew on his face. He could really twist the knife, now, if he wanted.\n\n"Lacerda? Are you still there? No? I suppose I'll see you after this whole debacle calms do-"\n\n"Wait, Natel. Stop. I know what you're getting at, you snake. But I want something in exchange."\n\nBingo, Natel thought to himself. "Of course, Carlos. This is a two-way street. What's your proposal?"\n\n"You need to stop working with the Germans. I don't care what plans you have right now, but poisoning our country with Nazi influence is something I will never forgive. Cut the PSP's ties to the Germans now."\n\nNatel sat for a second, considering Lacerda's proposal. Sure, it'd hurt the economy, but it would also buy a few UDN votes against impeachment."
brazil_adhemar_comatree.4.a: ""I'll increase the tariffs on the Germans, and we'll work our way up from there. Deal?""
brazil_adhemar_comatree.4.b: ""Sorry, Carlos. I can't agree to those terms.""

brazil_adhemar_comatree.5.t: "Home Field Advantage"
brazil_adhemar_comatree.5.desc: "Since Adhemar had fallen into a coma, Natel was a furious mess. Calls were being made every half hour to various politicians he had never talked to, begging for support both nationwide and in the Senado. But as he continued to make his way down the list, there was finally one person that he could have a true heart to heart conversation with. As his phone rang, he picked up the receiver and put it to his ear with a wide smile on his face.\n\n"Getúlio, my friend! Finally someone who I can have a candid talk with." Natel could hear Getúlio Vargas Jr. chuckle on the other end. If there was anything to show that anyone and everyone could be in the PSP, it was the fact that the son of Vargas was somehow an influential member of the PSP.\n\n"Natel, my brother. It has been too long. How are you doing? I imagine it cannot be easy walking right now in your shoes."\n\n"You have no idea, Getúlio. I am fighting fires here with nothing but dry matchsticks. But listen. I need your help."\n\n"Of course, Laudo. What can I do?"\n\n"Can you go around to the usual people in São Paulo, make sure they're still on our side? I'd do it myself, but-"\n\n"Certainly. I'll get on it this afternoon. But I called you to ask a favor myself. Actually, a couple."\n\nNatel leaned back in his chair. Here came the fun part. "Whatever you need, the party will provide. What exactly do you need?"\n\n"Well, we have to start thinking about re-election soon. I had some ideas for promising candidates in the region. And, don't forget about the children of São Paulo. We need to keep investing in the sciences here."\n\n"If you send me the list of the candidates, I can get around to them as soon as I can. And we'll earmark some funds for some new chemistry labs at the universities. But I need you to make sure São Paulo stays on our side."\n\n"Consider it done, Natel. I will talk to you soon.""
brazil_adhemar_comatree.5.a: "Billboards of Adhemar and Vargas Jr. promising prosperity were seen all over São Paulo the next day."

brazil_adhemar_comatree.6.t: "The Most Important Backer"
brazil_adhemar_comatree.6.desc: "Natel sighed, and wiped the sweat off of his forehead. There was no hiding the nervous look on his face as he began to dial a number on his phone. If he screwed this conversation up, the PSP was as good as dead. General Kruel certainly lived up to the name; he had only been fired because of that investigation that revealed how miserably he was treating both soldiers and civilian workers in the army. Despite all that, Kruel still held incredible influence within the army, thanks to his former post as the Minister of Defence.\n\n"General Kruel? Good eveni-"\n\n"I'll send over my account number, Natel," barked Amaury Kruel. Natel sat stunned. How the hell did this bastard already know what was going on?\n\n"Uh, what are you talking about, General?", stuttered Natel.\n\n"I know exactly what you want. You want me and my boys to go around to the Senado, find some senators who support that impeachment effort, and then rough them up a little. It's not the first fucking time I've done that, and you're a very lucky man considering that I'm willing to do it again."\n\n"I- uh, that would certainly be helpful. And what about the army?" Natel could hear Kruel give off a small chuckle on the other end.\n\n"The army is still loyal to me, and no one else. So again, you're lucky that you have a lot of cash, little man. Don't worry about my boys. I'll make sure to keep them in line. Just make sure the money goes through, and your little presidency will be able to go on, uninterrupted. Sounds good to you?"\n\nNatel sat stunned. Did that go better or worse than he expected?"
brazil_adhemar_comatree.6.a: ""Yes, General. Sounds great to me.""

brazil_adhemar_comatree.7.t: "The Second Head of the Reds"
brazil_adhemar_comatree.7.desc: "This neighborhood felt different, Natel thought, as he walked hurriedly across a São Paulo street. Was it always this run down? This neglected? Surely the PSP could do a better job once this whole impeachment crisis simmered down a little. He made a mental note as he continued to walk at a brisk pace, before spotting the residence of the very party he helped ban just years ago. He approached the door, and knocked thrice. As Natel turned around to check if he was being followed, the door swung open, and he was grabbed and shoved into a dimly lit room.\n\n"Look who it is, boys! It's the lapdog of the man who betrayed us and Brazil just a while ago!"\n\nNatel could barely make out several of the figures at the table, but there was one man he instantly recognized. "Those were regrettable times, gentlemen. I was just doin-"\n\n"Yea, yea," heckled one man. "We get it. Just doing your job, right? Man's gotta work..."\n\nThe rest laughed, but Luís Carlos Prestes didn't. He sat at the head of the table, hands clasped, deep in thought. "Natel", he said, "What brings you here tonight?"\n\n"Prestes, Adhemar and I need your help right now. I'm sure you've heard the impeachment news?" "I'm not helping Adhemar, Natel. But I'll help you. I'll talk to some old friends in the PTB on one condition."\n\n"Of course, senhor. How much?" Prestes' face tightened up as he held his right hand up. "I don't want your money, Natel. I want something more. You must re-legalize the party. I'm not compromising on that."\n\nNatel's heart sank. This was the steepest price so far, and was it one that he could afford? He grimaced, putting a hand on his hip, before telling Prestes:"
brazil_adhemar_comatree.7.a: "Once this impeachment business is over, I will see to your party's restoration."
brazil_adhemar_comatree.7.b: "Never. Goodnight, my friend."

brazil_adhemar_comatree.8.t: "The Old Alliance"
brazil_adhemar_comatree.8.desc: "Natel stared longingly at the empty cup of coffee he had just finished. Was that his fifth, or sixth of the day? He had told himself a year ago to get off of the caffeine, but the current crisis certainly threw a wrench in that wellness plan. As he prepared to pick up a pen, there was a gentle knock at the door. "Come in", sighed Natel. "Senhor? I finally found that phone number you asked me for earlier." Natel's secretary sheepishly pushed a torn sheet of paper towards him, with a familiar number on it. Natel relaxed in his chair, and cracked his knuckles. Finally, something he was good at.\n\n"Thank you. I'll handle it from here", he said as he began to dial the number. As soon as the secretary left, he heard a voice on the other end. "Laudo. Took you a while to call."\n\n"We live in strange times, Plínio. I'm sorry I couldn't get to you earlier. It's a shitshow out here. Look, we need your help."\n\n"Of course, Laudo. We're ready to offer it, in exchange for guaranteeing myself as the Minister of Education."\n\nDamnit, Natel thought. Was he really about to mortgage Brazil's future just to keep his party in power? Salgado was an incredibly controversial figure, and his open ties to fascism would be a constant thorn in the side of the PSP. But without the PRP's support, Adhemar might not have a presidency to return to. Natel knew he had to make a decision. Which one was the right one?"
brazil_adhemar_comatree.8.a: "Fine."
brazil_adhemar_comatree.8.b: "It's too risky."

brazil_adhemar_comatree.9.t: "Leonel's Languish"
brazil_adhemar_comatree.9.desc: "When Leonel Brizola exited congress. An aura of familiarity enveloped him as he stepped onto the street. It reminded him, much of the 50s, during the dying days of the Estado Novo and the days counting down to a coup. Legislators scurrying frantically to make undisclosed dealings while soldiers and the military lurk around, waiting for any opportunity to pounce.\n\nAs Leonel made his way to the park, Edna was there to greet him.\n\n"Long time no see!" Leonel said.\n\nEdna replied, "Leonel, I'm very glad to see you! It has been a while, hasn't it? I'll cut it straight, we need you and your party's support for our cause, rein in its wings and unanimously support us in stopping Natel from seizing the presidency."\n\n"Of course," Leonel replied. "The prospect of your presidency excites the party if you can implement some of the PTBs ideas, push for a bill that would increase funds to... "\n\n"I appreciate your determination, Leonel," Enda interrupted. "But we need to secure a much broader coalition if we are to dismantle the PSP's house of cards. We simply won't be able to pass anything substantive with the concessions that need to be made to appease the other parties. I know it pains you - it pains me too, but there is not much time until the elections. Then we can create our better Brazil, but for now - make sure that this coma is a turning point in Brazil's history - and send these bastards to jail."
brazil_adhemar_comatree.9.a: ""Right Edna, the PTB will stand with you."

brazil_adhemar_comatree.10.t: "Radio Kubitschek"
brazil_adhemar_comatree.10.desc: "Kubitschek shuffled through his script, ensuring everything was in order - giving a thumbs up to the technician. He cleared his throat.\n\n"My fellow Brazilians, the nation finds itself in hard times. After years of corruption, the leader of an organized crime syndicate is nearly gone, but his stooges are still fighting, plotting and bribing to make Brazil lick the foreign boot. I'm asking all Brazilians to support the legal, rightful and constitutional claim of Edna Lott, daughter of the Great Marshal, to the presidency. I trust her more than anyone at this current time to return Brazil to a not always perfect, yet better than current times - normality. The Social Democratic Party will always back our allies in the Brazilian Labor Party, and with your help, we may steer Brazil back onto the path of prosperity for all. And remember, "The optimist may fail, but the pessimist already begins failing!"\n\nKubitschek put down his pages and sighed. He hoped his influence could help Edna secure the presidency. His eyes shifted over to the radio technician, seeking his approval. The man nodded and smiled."
brazil_adhemar_comatree.10.a: "Sounded good JK."

brazil_adhemar_comatree.11.t: "Voice of the People"
brazil_adhemar_comatree.11.desc: "A sea of people, red banners and placards engulfed the streets of Brazil. "End Corruption", "New Lott, New Prosperity", "God Punished Adhemar", and other slogans floated above the crowd. They parted at the center of the road, where Jango stood on a platform giving an impassioned speech about Adhemar's corruption and how only the workers' support of legalism could put an end to the corrupt administration.\n\nFrom the crowd emerged Edna, all eyes shifted towards her, only Jango's rantings could be heard. She approached the platform, waiting for Jango. As he finished and Edna stepped up, the crowd burst into applause - she had their attention.\n\n"Thank you, Jango," she said. "Brazil, I have had enough! For years I've toiled underneath Adhemar, trying to stop his worst excesses. I saw firsthand the corruption within his administration but had my hands tied. God has given us all an opportunity. As the President lies comatose, Brazil can slip from his grip and return to its path of prosperity!"\n\nEdna looked to the crowd, seeing people captivated by her words. For all the times she had spoken to an audience, never had there seemed to be such willingness within them for change.\n\nShe resumed. "Adhemar has sold out the nation to his wealthy friends, stealing the prosperity that rightfully belongs to all Brazilians! His greed was so vast that he had even worked with the Nazis! His advisors owned plantations and used slaves; some even had correspondence with Heinrich Himmler! When I become President, the government will eliminate this cronyism, corruption and nepotism which has infiltrated our country for too long."\n\n"When we unseat that braindead miscreant, I will immediately...""
brazil_adhemar_comatree.11.a: "...cooperate closely with the USA, to rid the Americas of the Nazi menace's influence!"
brazil_adhemar_comatree.11.b: "...sign provisional measures that will help stop the inequalities within the country!"

brazil_adhemar_comatree.12.t: "Fatherly Help"
brazil_adhemar_comatree.12.desc: "Edna looked at the phone hesitantly. She was of two minds over throwing around her family name, but desperate times called for desperate measures. She rang in her father's number. The phone only had time to ring twice before it was picked up "Hello there, Papai. How are you?"\n\n"Daughter!" Henrique's voice crackled from the other end, the surprise evident in his voice. "How is my girl? Are you alright? I imagine it must be quite the tumultuous time for you, given the circumstances, eh? Reminds me of '50 and '55. But ah, sorry, your old man is babbling away again. It is good to hear from you."\n\nShe chuckled, brushing a stray hair out of her face. Her father always did this whenever they hadn't spoken in a while. "It's good to hear from you too. I would call more often but everything is all going pear-shaped over here. That's part of why I called, actually. Do you remember your time as President?"\n\n"Yes, I do. I wish I could have given the illiterates the right to vote, if you're asking what I regret, but otherwise I think I did a fine job. Why?"\n\n"Well, I am aware that the military may not be entirely trustworthy of me ascending to the same position. I was calling to ask if you could talk with any of your friends from that time and persuade them to not... take matters into their own hands, so to speak."\n\n"Why, of course!" He replied. "I'll call some friends and convince them to help on the military front. I'll ask about the PSD, too, just in case." Relief flooded through Edna - the Lott name was a powerful one, especially when her father was using it. That made her life a lot easier."
brazil_adhemar_comatree.12.a: ""Thanks, Papai.""

brazil_adhemar_comatree.13.t: "At The Very Top"
brazil_adhemar_comatree.13.desc: "The pictures did not lie. Seven small, grayscale photographs of Adhemar de Barros shaking hands and sharing drinks with Hermann Josef Abs were passed around the Superior Court of Justice for all to see. Outraged whispers could be heard across the room, as Edna Lott sat unmoving. She had been saving these pictures for a long, long time, and it was high time she used them.\n\n"Thank you!" shouted the President of the Supreme Court of Justice from his desk, causing a hush to descend upon the room. He turned to look at Edna, squinting at her. "Madame President, what exactly is it that you hope to achieve in showing these photographs? The President was well within his legal rights to pursue business with Abs, like it or not."\n\nShe scoffed, standing up from her seat. "With all due respect, President Adhemar's legal rights are not what I am here for. These photographs encapsulate exactly what his plans for Brazil were - and still may be," she said, gesturing at the photos on her desk. "He is a crook. A criminal. And we all simply brush this aside, as if it is a joke, or worse - an endearing factor! He is nothing more than the face of the glorified gang that is the PSP."\n\nThe room gasped. Few had so brazenly declared this before. Lott continued. "Unless we take some serious action against this group of robber barons, Brazil will be strangled to death by him and his friends in the Abwehr, until we are nothing more than another German puppet state!"\n\nShe paused, collecting herself. "Apologies. I got carried away. Having said that, I put forward my case to the secretariat to designate the PSP as an organized crime group.""
brazil_adhemar_comatree.13.a: "We can only hope this pays off..."

brazil_adhemar_comatree.14.t: "The Lunatic Speaks"
brazil_adhemar_comatree.14.desc: "It was a common saying amongst the press in São Paulo that when Jânio Quadros announced that he was holding a press conference, every journalist in the state would rub their hands together in glee. The man's tendency towards making both inane and frankly bizarre public statements ensured that the papers would always sell extra well that week. And as he walked up to the podium, absent-mindedly brushing dandruff off of his suit, the press that had gathered there knew that the saying rang all too true.\n\nHe tapped the microphone, testing if it worked. Then, a cough. "Good day to you all. I come here today to warn you all of the grave danger that we face as a nation. It is a festering rot that has crept its way into Brazil's very soul. It is- sorry, if I could just..." He paused to clean his glasses. "Much better. Now, as I was saying, there is an insidious threat that seeks to take down Brazil from within. This is, of course, the PSP."\n\nQuadros paused, allowing the gathered journalists to take their notes. "I have always advocated for a strong and independent foreign policy for Brazil. But the fat guy and his cronies? Well, you need only look at what he's doing with the Germans! There was a spy in his own office for goodness sake, how can we trust him not to turn us into another Reichskommisariat for a quick bit of cash?"\n\nMany were now abjectly shocked that he would so brazenly insult a man in a coma on the verge of death, but those more used to Quadros knew that it was precisely in character of the man. "Now, I know how the fat cat works given how long he has blighted this great state," he said, drawing another few gasps. "And I know that he will always come back if given the chance. Thus, I implore the Senate to remove the President while incapacitated in favor of the Vice President. I disagree with her on much, but at least she will bring back some semblance of clean, independent government. Thank you.""
brazil_adhemar_comatree.14.a: "He left without answering any questions."

brazil_adhemar_comatree.15.t: "A Call from Down South"
brazil_adhemar_comatree.15.desc: "Gordon was fiddling with fingers, it was another boring day at the embassy. He had been hearing calls for impeaching Adhemar but he hoped that they would not bother him with it. Suddenly, his phone started ringing. Before a word was exchanged, he knew who was on the line.\n\n"Hello, Natel."\n\nLaudo started talking about the major problem that was the impeachment hearing on Adhemar.. "Brazil and you have always been friends, you were one of the first countries to recognize us! As Dom Pedro did before me, I humbly ask for aid."\n\nGordon could have acted right there and then, he could have sent Natel all the aid he asked for, but he reminded himself about the note given to him earlier this morning. "STATE DEPARTMENT NOTICE TO LINCOLN GORDON, AMBASSADOR TO BRAZIL," it read in big, bold letters. "DO NOT, UNDER ANY CIRCUMSTANCES, PROVIDE AID IN THE IMPEACHMENT PROCESS."\n\nOf course, due to the distance between him and the State Department he could ignore the note, his punishment would take ages to reach him. It was all up to the way he would answer this call, the future of an entire nation in his hands."
brazil_adhemar_comatree.15.a: "I'm sorry Laudo, but I must reject."
brazil_adhemar_comatree.15.b: "Today, Laudo, our interest align"

brazil_adhemar_comatree.16.t: "The Vice President's Plea"
brazil_adhemar_comatree.16.desc: "Gordon was in his office, reading the newspaper. The headline could not have been written more clearly: "SECOND DAY OF IMPEACHMENT HEARINGS." It was something that had caught the ambassador's eyes, after all, he had been reporting about the recent developments between Adhemar's Brazil and Germany since the beginning of the Bull's presidency. As he took a sip of his coffee, the telephone started ringing, he knew exactly who it was.\n\n"Edna, to what do I owe the pleasure?"\n\nThe Vice-President started talking about the proceedings. "Gordon, look, Adhemar's relationship with Germany is almost obscene, he relishes approaching the Reich and is unafraid to sell Brazil out for his personal benefit."" The ambassador took a long sip of his coffee and looked at the recent report given to him on Brazil-Germany relations. From military ties to rumors of trade negotiations, Brazil was closer to the Nazis than ever..\n\n"Edna, I promised you that I would support his impeachment no matter what." The tired eyes of Gordon looked out the window, he knew what had to be done, but did he have the strength to do it?"
brazil_adhemar_comatree.16.a: ""...unfortunately, that is a promise I can't keep.""
brazil_adhemar_comatree.16.b: ""...and I will fulfil it no matter what.""

brazil_adhemar_comatree.17.t: "Gordon Declines"
brazil_adhemar_comatree.17.desc: "Greetings,\n\nWe at the American embassy have received your request for our aid in resolving the current political crisis. While we hope that the crisis is resolved quickly and peacefully for the sake of our long-time friend and ally, regretfully, we will not be intervening in the politics of another nation.\n\nWe hope to continue maintaining a strong friendship with Brazil and other South American countries in future.\n\nBest regards,\nLincoln Gordon."
brazil_adhemar_comatree.17.a: "And nothing happened."

brazil_adhemar_comatree.18.t: "Gordon Accepts"
brazil_adhemar_comatree.18.desc: ""Greetings,\n\nWe at the American embassy have received your request for aid in resolving the current political crisis. While usually we make it a policy to avoid interfering in the politics of other nations, we recognise that from time to time it is our moral imperative to help maintain the democratic institutions of our allies. Therefore, we would be happy to help push for a friendlier administration in Brazil.\n\nWe hope to continue maintaining a strong friendship with Brazil and other South American countries in future.\n\nBest regards, Lincoln Gordon.""
brazil_adhemar_comatree.18.a: "Hurrah for our loyal allies!"

brazil_adhemar_comatree.19.t: "All Quiet on the Southern Front"
brazil_adhemar_comatree.19.desc: "A phone, a table, some chairs and a photo of the Führer adorned with German and Brazilian flags. That was the office of Ambassador Kirk, it wasn't fancy of course, the government in Germania didn't send anyone to upgrade it due to the previously tenuous relations. As he was doing his daily work, the phone rang.\n\n"Hello? Is this Germany's embassy?" It was Natel, no wonder he was calling, Adhemar had recently slipped into a coma and was being impeached, any help he could get against the proceeding would be great. "Please, Ambassador Kirk, you may think of us Brazilians as something less than you, but Adhemar has made us closer than ever to the Reich. I hope you can help us."\n\nAmbassador Kirk took a sip of his coffee, he had Natel and Brazil's future in his hands. "But there is an opportunity to further cement those ties" said the minister. "If you would choose to help us, we would be in severe debt to your nation."\n\nThoughts rushed through Ambassador Kirk's head, would he actually do it? It was one of the few times he had any authority over anything, any choice he picked would change the entire dynamic of Brazil and his homeland. The German ambassador went silent for a while before finally answering."
brazil_adhemar_comatree.19.a: "You must forgive me, but I cannot help."
brazil_adhemar_comatree.19.b: "Natel, you have a deal."

brazil_adhemar_comatree.20.t: "No Answer"
brazil_adhemar_comatree.20.desc: "Laudo Natel's hand was bonded to the phone with sweat. His eyes fixated on the clock like a hawk. His mind was racing as its hand reached closer to the hour mark, fractions away from passing it. Germanic efficiency must have been a myth, they should have called ages ago. Now, it was almost midnight. Eyes watched the time-hand tick down. Slowly. Slowly.\n\nIt was midnight.\n\nNo answer.\n\nThe phone shot off the desk and slammed against the wall. Crack. Crack. Crack. Natel's crushed its cheap plastic underneath his shoes like the world's angriest tap dancer. Soon, nothing remained but an assortment of miserable wires, shattered electronic entrails, and a lot of regret.\n\nWhat was so wrong with the Americans anyway? Why did they have to place their trust with Nazi freaks an ocean away? Adhemar was lucky he was in a coma, because Natel certainly wanted to put him in one for this, and... deep breath. There was nothing to be done.\n\nNatel composed himself again, straightened his tie, and dusted off his shoes. Still, he felt frustrated, and only one word could capture how he felt.\n\nSo, across the corridors, a violent shout ended a terrible day."
brazil_adhemar_comatree.20.a: "Fuck."

brazil_adhemar_comatree.21.t: "The Eagle's Lends a Wing"
brazil_adhemar_comatree.21.desc: ""Dear Mr. Laudo,\n\nGermany has been watching the events transpiring in Brazil with a great amount of sorrow. We wish all the best for President Adhemar Periera de Barros, and hope he makes a speedy recovery. In that same vein, I wish to apologize for the actions of any German intelligence in Brazil that has acted out - they were operating without our supervision, and rest assured, they have been punished.\n\nNow that this has been clarified, it is important to note that the instigation of impeachment proceedings against the President are utterly baseless and a clear ploy by those who seek to topple him for their own twisted gain. I have been personally assured by many Brazilian senators that they will refuse to vote in line with this bogus attempt at power..."\n\nLaudo Natel's face split into a huge grin as he read those words. It was as if the burden of the entire world had been lifted from him at that moment. While he found them distasteful and how he hated their policies, he finally understood why Adhemar had entered business with them. With the Germans lending their support, it would make the impeachment a mere formality - what they had worked for over the past five years would not be reduced to ash.\n\nHe walked over to the window, still holding the letter. The sun was beginning to rise over São Paulo, its gentle orange light enveloping the entire city. Finally, this entire fiasco was close to reaching its end."
brazil_adhemar_comatree.21.a: "Thank God for the Brazilian-German friendship."

BRA_Healthcare_Bill_Passed_tt: "The Healthcare Act has passed."
BRA_Healthcare_Bill_Failed_tt: "The Healthcare Act has failed."

brazil_adhemar.62.t: "A Worthwhile Investment?"
brazil_adhemar.62.desc: "President [USA.GetLeader] looked down at the documents from the state department, brow furrowed. The visit from the Brazilian admiral had not come a moment too soon - the Adhemar government had been getting far too friendly with the Germans recently for many of their tastes, and the fact that they chose to come to America first was a good sign for their future relationship.\n\nBut still, they were asking for a hefty amount of stuff. He looked up at his national security advisor. "Well? We're absolutely sure that the Brazilians want this much Uranium?"\n\nThe man nodded. "The admiral was quite insistent. He said that Brazil needed around 500 million dollars worth of uranium, as well as the equipment needed to refine it for a nuclear arsenal."\n\nThat certainly threw a spanner in the works. That was a lot of money, and for a government that had previously shown that it was willing to throw its lot in with the Germans for short term gain. And he shuddered to think what would happen if any pro-German regime on the planet got its hands on nuclear weapons, frankly. Then again, governments came and went. Perhaps this was a good long-term investment after all.\n\nHe sighed, then came to a decision."
brazil_adhemar.62.a: ""Give the go ahead. We need more strong allies.""
brazil_adhemar.62.b: ""It's not worth the risk and the money.""

brazil_adhemar.63.t: "America Agrees to Help!"
brazil_adhemar.63.desc: "Thankfully, having seen the benefits of cooperating with us, the United States has agreed to help in the development of our nuclear project! We will soon be receiving the uranium and equipment we have purchased, and nuclear facilities will begin construction."
brazil_adhemar.63.a: "The power of the atom draws ever closer to us."

brazil_adhemar.64.t: "America Refuses to Help"
brazil_adhemar.64.desc: "Unfortunately, while we presented a strong case to the Americans to help the development of our nuclear project, they have refused to assist us. While this is certainly a demoralizing setback, we will simply need to look elsewhere for partners."
brazil_adhemar.64.a: "We must look elsewhere."

brazil_adhemar.65.t: "Brazil wants nukes"
brazil_adhemar.65.desc: "Gday mate give us nukes pls?"
brazil_adhemar.65.a: "Sure thing Mate"
brazil_adhemar.65.b: "Get out of here Wanker"

brazil_adhemar.66.t: "Australia Agrees to Help!"
brazil_adhemar.66.desc: "Following a series of intense negotiations in Canberra, Admiral Álvaro has secured a deal with the Australians for them to help us in joint-development of a nuclear programme! While this may not be cheap in the slightest, it means that we will not have to rely on the help of a specific superpower in our nuclear programme."
brazil_adhemar.66.a: "We draw ever closer to harnessing the power of the sun."

brazil_adhemar.67.t: "Australia Refuses to Help"
brazil_adhemar.67.desc: "Despite Admiral Álvaro's best efforts to negotiate a deal with the Australians, the cost that they ask for is simply too much. As such, they have refused to assist us in the development of our nuclear programme. We will need to continue looking for benefactors elsewhere."
brazil_adhemar.67.a: "It continues to elude us."

brazil_adhemar.68.t: "A Request From the South"
brazil_adhemar.68.desc: "Hermann Josef Abs took a sip from his cup of coffee, savoring the bitter warmth. It was a nice contrast to the rain that had decided to envelop Germania that day. Truthfully, he would have preferred to not have been in his office that day - he had places to go and things to do. However, the Brazilian admiral was coming in that day to negotiate a very important deal, and that was a pie he wanted a piece of. The Adhemar government had thus far proven receptive to German interests, after all.\n\nTwo knocks came on the door, and his secretary popped her head through. "Admiral Álvaro is here, Mr. Abs." she said. He nodded, gesturing for her to bring the man in. He stood up, shaking the admiral's hand.\n\n"Herr Álvaro, it is a pleasure to see you. Come, take a seat," he said, gesturing for the man to sit down. He nodded back, flashing a smile back. "So, what is it that our associates in Brazil want today?" Abs asked, knowing full well why the man was there.\n\n"In short - the nuclear programme. Centrifuges, uranium, et cetera." Abs nodded. Brazil's nuclear programme - one of the most geopolitically significant events this decade. The impact on the balance of power worldwide that another nuclear power would have could not be understated, even more so if they were aligned with Germany.\n\nAnd yet - the cost would be high. Uranium was not cheap, and nor was the equipment that could be used to process it. The business-savvy side of him said that helping the Brazilians was too high a price to pay. Abs made his mind up right on the spot."
brazil_adhemar.68.a: "It was a no-brainer to help them."
brazil_adhemar.68.b: "The cost is too high."

brazil_adhemar.69.t: "Germany Agrees to Help!"
brazil_adhemar.69.desc: "A new chapter has opened in the history of German-Brazilian relations, as they have generously agreed to supply us with the necessary equipment to become a new nuclear power. As the uranium and centrifuges make their way across the Atlantic, we may rest happily knowing that the friendship between Germany and Brazil will last forever."
brazil_adhemar.69.a: "It is in touching distance, now."

brazil_adhemar.70.t: "Germany Refuses to Help"
brazil_adhemar.70.desc: "As capricious as they are, the Germans have decided to refuse our request to buy uranium and equipment to fuel our programme. While this is a saddening turn of events, we must stick to our guns and continue looking for a trade partner."
brazil_adhemar.70.a: "Damn it."

brazil_adhemar_endgame_survival.1.t: "Out of the Dream, Into the Nightmare"
brazil_adhemar_endgame_survival.1.desc: "Adhemar limped into the cabinet meeting room, seeing it was still empty. His gaze was hazy, yet he knew each piece of furniture remained exactly where he last saw it. It tempted him to pretend nothing had changed. He heaved and took a seat, his heart hammering with hypertension. After three months of dormancy, his muscles now demanded he sleep twelve hours a night. For two hours a day, he was forced to go on inane walks around Kubitschek's modernist playground.\n\nGone was São Paulo's hero of the masses. In his place was a sad retiree, no longer fit for politics. Any more and he would pass out. There would be no second term. No remaking of the constitution. His party was in tatters, and his enemies would destroy everything he had built. He woke from his slumber; the dream was over.\n\nYet the nightmare never ended.\n\nAll this talk of foreign spies and political subterfuge. Were the Germans really infiltrating his staff, playing them for fools? Perhaps the rumors were true that OFN agents were aiding the opposition? His blood pressure could no longer take this Cold War nonsense.\n\nHowever, before he could spare a thought for that, Adhemar needed to get to the bottom of this impeachment affair. Someone was behind all this, and every whisper, every rumor, pointed in one direction."
brazil_adhemar_endgame_survival.1.a: "Tancredo, surely. But did Edna not support him? Perhaps I misjudged her..."

brazil_adhemar_endgame_survival.2.t: "To the Future"
brazil_adhemar_endgame_survival.2.desc: "Inside the Palácio do Planalto, Laudo headed to his meeting with Adhemar. He was the first government official to meet Adhemar since his coma. As he walked past Edna Lott's Office he could see it completely deserted. The accusations of treason, cooperation with the USA and threats to her life had forced her to move back to Rio for a time, resigning all but in name.\n\nAdhemar's face didn't look good - his previous vitality had disappeared.\n\n"Laudo. It's so good to see you." Adhemar stood up, using all his strength just to give his friend a hug. He was no longer the PSP's lynchpin, and power was slipping from him.\n\n"Thank You, Mr. President."\n\n"With those hostile elements removed from our cabinet, we can now celebrate for a moment." Adhemar sat back in his chair, "Despite all the hardships, we are still together in this and ruling the country." That was what Laudo wanted to say. "Yes, of course we should all do so. The country's exhausted without you."Adhemar nodded. "The election. We need someone who can lead Brazil along the path I've set who can lead this country along the path we have set. What's your opinion? " Laudo thought for a while, with three or four names flashing in his mind. "What about Vargas Jr.? His name commands respect."\n\nAdhemar shook his head. "No. He is a good guy but sometime he will come up with unreasonable ideas that can leave you feeling dizzy. Of course we can give him a chance, but we need a competent Vice President to ensure that he does not stray too far from PSP in his dreams. I believe you would be a perfect candidate."\n\n"Me?" Laudo couldn't believe what he just heard. "I lost in '65. After this coma, I'm too weak to continue." Adhemar felt a heavy blow to his heart. Laudo's failure was his own fault. He paid nothing for his election in 1965, though getting Laudo as vice presidential candidate again would require a lot of bribes and effort.\n\nChoking his sense of guilt back, he gave Natel a glass of whisky. "Relax. We have more resources than ever before and you are a much better politician with bigger experience. I have no doubt that you will make your position this time.""
brazil_adhemar_endgame_survival.2.a: "They ended the meeting with a warm handshake."

brazil_adhemar_endgame_survival.3.t: "The Stalwart Sentinel"
brazil_adhemar_endgame_survival.3.desc: "Adhemar stood in a private meeting room on Planalto's third floor. Once a reminder of his power, the view of Brasília outside now suffocated him in responsibility. His condition had hardly improved since he woke. Still shaking, he refused to sit; he was a stalwart sentinel who would never falter. He had reached this far by accounting for every variable, and Edna was a puzzle he couldn't ignore. White gloves knocked on the ipe door. "Come in."\n\nEdna's entrance was like a ripple in the room's still waters. Her scarlet suit jacket, paired with a patterned ivory skirt, painted a picture of strength. She could easily have been Brazil's first female President. Why didn't she take the chance? "Things were hell when you were out, Mr. President. Have you been... feeling well enough?"\n\nSomething was off, but he donned his iconic grin. "I'm good." He was short of breath. "I've been meaning to ask a few questions..." His blood curdled. "...particularly about..." What was happening? "...Neves." Suddenly, he felt light-headed; his heart rate dropped. Years of medicine flooded back to him: this was a vasovagal syncope.\n\nSprinting, she catches him as he lurches forward. "Are you alright?" Looking up, it all clicked for him. There was no pity in her eyes. There had only ever been duty. He nods, unusually silent. Something in her tone told him what she was going to say was the absolute immutable truth. "Adhemar, it's okay. I'm here."\n\nHis fate was literally in her hands, but, he knew, somehow, she was on his side. Chuckling, he gets up; near-syncopal episodes aren't always critical. "Just a bit of dizziness," he sighs. A thought brings him back to reality; he had to bring out a special little bottle. It was the easiest way to keep powerful people close. His health be damned; they had a lot of catching up to do."
brazil_adhemar_endgame_survival.3.a: ""Care for a glass of jabuticaba?""

brazil_adhemar_endgame_survival.4.t: "New Best Friend"
brazil_adhemar_endgame_survival.4.desc: ""Here you are sir, the airport is to the right. I hope your ride was comfortable," Pablo said to the man in the backseat.\n\nHis passenger nodded at the driver as he exited the taxi into the dimly lit parking lot. After collecting his belongings, the well-dressed man left a generous tip before entering the brightly lit airport terminal. Pablo released a sigh of relief and started the engine, happy that he was finally able to go home and spend some much-needed relaxation time with his family. As he drove away, he flicked on the radio, hoping the white noise would make the drive feel just a little bit shorter.\n\nShortly after a dry weather report, Pablo's ears perked up as a breaking news broadcast began to play. He turned up the volume and listened. "In a shocking turn of events, President Adhemar has just introduced a bill to Congress, aimed at expelling 'dangerous American influence' from Brazil," a newswoman reported in a clearly disturbed voice, "Claiming that the United States was responsible for orchestrating the recent crisis in government, Adhemar's bill aims to cut all military ties with the OFN, substantially raise tariffs on American goods, and close any OFN military institutions on Brazil soil. More information at 7."\n\nPablo's eyes narrowed. He thought of his father and the innumerable other Brazilian men that had died fighting the Nazis alongside the United States. Why would that same country even cause such a crisis? And one that was sparked by the discovery of a German spy in the first place? Adhemar has always been unfriendly to the Americans, but to go this far? The only reason, Pablo concluded, was that the President had lied. Adhemar had, once again swayed by his own greed, thrown Brazil into the jaws of the hungry Reich. The taxi driver had never liked Adhemar, especially not after the coma, but this action had convinced him."
brazil_adhemar_endgame_survival.4.a: "The President had lost his mind."

brazil_adhemar_endgame_survival.5.t: "Nighttime News"
brazil_adhemar_endgame_survival.5.desc: "Pablo drove back to the depot after seeing off his last passenger for the night at São Paulo International Airport: a German visitor who had nothing but complaints. That man never shut up the whole ride. However, with his shift over, Pablo could finally switch from the bossa nova everyone kept telling him to play to his beloved classic samba. As he looked for the right station, an official-sounding voice crackled through one of the frequencies.\n\n"This bill proposes a complete severance of ties with Germany." His taxi screeched to a halt at a red light. Next car over, he saw a woman also glued to the radio. "This action arises from recent revelations of discrepancies within our governmental structures." Both rolled their eyes in unison. So, that's what they're calling it?\n\n"All diplomatic relations between our nation and the Reich would be suspended." The light went green. "Trade between Brazil and the Reich would be put on hold." A Volkswagen Beetle vroomed by then turned a corner, vanishing from view. "Brazil will cease issuing visas to Reich nationals until further notice." Shame the law needed time to be passed; he would have loved to strand that German here.\n\nStill, what strangely good news. His father died fighting those bastards, and now he no longer had to roll in his grave. Unusual they announced at this hour, but negotiations must have been tough. Actually... that tourist was probably so grumpy due to jetlag; it was two a.m. in Germania. Those Germans were going to have a rough awakening. Perhaps that prick timed this perfectly just to screw with them. Very clever."
brazil_adhemar_endgame_survival.5.a: "Maybe the coma finally kick-started that dimwit's brain."
BRA_the_man_who_deceived_us_tooltip: "§hPresident Adhemar§! will purge large amounts of German influence from the country. This will §Rharm our economic growth§!."

brazil_adhemar_endgame_survival.6.t: "All Winds Blow Towards Germania"
brazil_adhemar_endgame_survival.6.desc: "The gusts of air firing underneath the Germania twilight was throwing Adhemar off in his conversation with the man he knew only as Karl. He seemed to be outlining commonalities between the two nations in a long-winded business pitch as his meetings had instructed. It was all white noise to the visiting leader whose mind wafted to the tantalizing German women at the reception earlier that day, the wine, the food. Like Clemente was there too. On that thought, he looked up to notice the Volkshalle jutting out from the skyline of rectangular concrete slabs. The disaffected President excused himself from his exasperated counterpart, and hastened forth towards the building, security be damned.\n\nWhy, when he thought about it, had they only sent this lowly official out for someone like him? Why did they get his exact taste in wine down to the tint? Why did the wind feel so oppressing, the buildings and roads so expansive, and he so small? As the gusts grew rowdier, Adhemar had to let his moment of fantasy go, and come to terms with what he knew at heart was really going on.\n\nGermania, the very city itself, was out to make him feel like a puppet: unimportant, powerless, but pampered. The generous deals in the articles his team received, its generous industrial, agricultural, weapons subsidies which could bring him back from the brink, all formed a wager to win a potential courtier.\n\nIt was all good to be true. But turning away was not an option, and when in Rome..."
brazil_adhemar_endgame_survival.6.a: "...do as the Romans do."

brazil_adhemar_endgame_survival.7.t: "No Better Offer"
brazil_adhemar_endgame_survival.7.desc: "Adhemar tapped on the smooth surface of the telephone. Communists propelled him to São Paulo's governorship, but after their ban, he was the first to purge them entirely. Now, here he was, begging them for aid. Gripping his cane only made his trembling worse. "Sorry, my husband's busy," said Maria as she returned. "Would you like to leave a message?" The President had wanted to butter the bread before slicing it, but he was left no choice but to state his proposal and let Prestes ponder it. It's okay; as usual, he polished every detail.\n\n"Write this down." His voice was weaker than he expected. "Luís, you helped Laudo when I was close to death; you deserve repayment. Relegalization is sadly not possible, but there's another way." Those who distrust you must know there's no catch, so the ask comes first. "Your party sides with mine; that's all I need." Sure, it wasn't trivial to support a party in tatters, but it was also his only demand.\n\n"In exchange, your people may run in our name for the legislature. Just your normal Bukharinist friends, not those Amazonist idiots." That was it, the full deal. Bribes were useless on him. Further negotiation was not an option; he had nothing else to give. However, how else could the PCB get an opportunity like this?\n\n"There will be no better offer." Not from him, not from anyone else. He found himself wondering why he put so much effort into his choice of words; his wife likely recorded merely the basic details. Perhaps he simply hoped to see the coma hadn't robbed him of his bargaining skills, one of the few things he had left. Suddenly, a different voice crackled over the line, and Adhemar could do nothing but sigh. Someone was listening the whole time."
brazil_adhemar_endgame_survival.7.a: ""You always knew how to make impossible offers tempting.""
BRA_problem_of_prestes_tooltip: "In the 1971 Senate elections, PCB candiates will appear under the PSP banner."

brazil_adhemar_endgame_survival.8.t: "An Integral Face"
brazil_adhemar_endgame_survival.8.desc: "FLASH. That was the only sound one could hear inside the room as journalists furiously clicked their cameras, trying to get a good picture of Plínio Salgado, who now stood behind a podium as he was getting ready to speak for all those present and, of course, the entire country.\n\n"Beloved and dignified people of Brazil." Salgado began. "It is with the highest pleasure and honor that I accept the President's invitation to fill the ministerial position of what I consider to be the most important thing, that of Education."\n\n"For many years, our children have been fooled by a system that turned them into nothing but a cog in a money-making machine. They have forgotten what made them unique as human beings and as Brazilians." Salgado paused for a second to look up and watch all the journalists clicking their cameras and writing down his words.\n\n"It will be my duty to remind all the children of Brazil, both young and old, from the past and new generations, of the unique and natural beauty that God has gifted them." Raising his voice to make sure all inside the room heard him. "The time has come for changes, and our education shall go by three simple words: God, Fatherland, and Family!"\n\nSalgado began walking out as he ignored the journalists trying to fish out his answers to their endless questions, reaching for a door handle and promptly meeting Adhemar de Barros, holding a cigar.\n\n"Those are some big ambitions that you have," His new boss muttered, "but I don't care anymore. You can raise your hands and scream 'Anauê' all you want, but if those anti-semites inside your party try to interfere in anything related to my presidency, our cooperation is over."\n\n"Yes, of course, Mr. President," Salgado answered. "I do not share their thoughts, but they listen to me. And besides, I don't think they would be interested in working with you either."\n\n"Well, whatever." Adhemar puffed his cigar. "As long as the people don't think less of me, I don't care.""
brazil_adhemar_endgame_survival.8.a: "Without Integrity."

brazil_adhemar_endgame_survival.9.t: "Faint Memories"
brazil_adhemar_endgame_survival.9.desc: ""With ninety-three percent of the vote, Getúlio Vargas Jr.!" The PSP was ecstatic at Adhemar's announcement. That man was popular; he didn't spend much for him. The same can't be said for the tens of millions of Real in bribes this other fool needed.\n\n"And ninety-one percent for Vice President, Laudo Natel!" A polite applause. "He'd better win this time," he thinks. He surveyed the many familiar faces still here, in the very same matterhorn-adorned São Paulo hall he'd rallied in plenty of times. His city, his home, just as he remembered it.\n\nVargas approached the mic, and he let him through as he trembled his way off the podium. Yet, gradually, the cavalcade of cheers grew more and more intense, slowly becoming deafening. He glanced at the audience. They weren't looking at the candidates but at him, their hero. Even Laudo and Vargas joined in. The all-encompassing avalanche of admiration echoed in the acoustics of the auditorium, bouncing off the high ceiling and the walls over and over and over.\n\nWith an excuse of a smile, he left as fast as his legs would allow. Out of the warmth of the spotlight, a coldness came over him, one he couldn't shake even hours later in his coffin of a vehicle, stuck on an overnight drive to Brasília: just him, his wife, his thoughts.\n\n"Are you okay, Adhemar?" The highway's lights were dim, but they illuminated lines of worry on her face. She held his arm, like a nurse stopping him from falling over. Something was happening, like that funeral before the coma but very different. Under the repeating streetlights, Leonor could just barely catch something that she hadn't seen for over thirty years, back when he was a mere soldier fighting on the grounds they were driving on, long before he decided nothing could ever defeat him: faint memories reflected down his cheeks."
brazil_adhemar_endgame_survival.9.a: "In the rearview mirror, São Paulo grew distant, before it disappeared beyond the hills."

brazil_adhemar_endgame_survival.10.t: "Faustian Bargain"
brazil_adhemar_endgame_survival.10.desc: "A night in a luxurious hotel, some good music to fill the air and the ears, and a fine champagne. This is how you enjoy life, thought Adhemar to himself as he took a sip from his glass. Just him in this marvelous room and nobody else to bother him. Not until he received a call from someone he thought he would never hear again. "President speaking... Mr. Da Cunha?" He jolted with surprise as he leaned back on the armchair. "It's been a while, isn't it? What brings you to call me on this illustrious night?"\n\n"Hello Mr. President, it's a pleasure talking with you again. I couldn't speak with you in person unfortunately, I know how wearing business can be, especially when it involves the Devil himself." Adhemar's good-humored gaze turned into a frown, the phone went silent for a moment before coming to life. "Listen, you must get us out of this pitfall!" Da Cunha snarled, in a far cry from his courteous manner from seconds prior. "They are Nazis for God's sake! You should know how they treat and enslave their 'allies'."\n\n"For your information, former Foreign Minister, all I'm doing is freeing Brazil from American tyranny. And in case you have missed your geography lessons, the Germans are an ocean away from us while the Americans have been breathing down on our necks for a century! No, Brazil deserves allies whom it can really trust."\n\n"And do you really think they are trustworthy? They will stab you in the back when you least expect it, and yet you still refuse to face reality. Christ, what happened to you? Did that coma make your brain lose some screws?"\n\n"I'm perfectly sane, thank God. But if this is what you wish, fine! Suits you! You Yankee puppets are all the same! You just do everything they say, don't you?" Just as Adhemar's ears were no longer filled with his voice, he heard nothing but a beeping sound. So this is all you have to say huh? Oh well, a toast for this victory."
brazil_adhemar_endgame_survival.10.a: "And the wine turned sour as it went down on his throat... sour like the realization of uncertainty, and guilt."

brazil_adhemar_endgame_survival.11.t: "The Bull's Seminar"
brazil_adhemar_endgame_survival.11.desc: "Adhemar was in his plane cabin, he hadn't spoken a word in hours when he heard a knock on the door. "Mr. President, we are approaching Germania," it was Natel, but de Barros didn't speak a word. "Mr. President?" Still nothing. The air near the cabin was heavy and tense. Natel felt something, a sense of dread.\n\n"Please, come in, Laudo."\n\nIt was a relief to hear his voice again. Natel opened the door to see a lonely Adhemar, sitting in his window-side chair contemplating life. "You know Laudo, everyday I wonder if I will wake up tomorrow, and if I don't, what people will think of me. Will they remember me as a great man who put Brazil on the map, or a crook who ruined the nation?" Natel just nodded.\n\nAdhemar gave a chuckle. "I wonder what Vaclaw and Aleksandro down in São Paulo think about what I'm doing. I wonder if they just hate me for going to the people who massacred their families." The minister took a sip of his water, he didn't know what to say.\n\nThe Bull stopped talking, and took a few sips of water before going any further. "This is supposed to be Salles' job, not mine! Why did we send him to that stupid undeveloped nation? It's not like he's going to do much!" As always, Natel nodded.\n\nAdhemar looked back through the window, gazing at the German countryside passing below. "If God allowed me to become President, maybe I should come to expect these things.":"
brazil_adhemar_endgame_survival.11.a: "The Bull must charge on."

brazil_adhemar_endgame_survival.12.t: "Need For Speed"
brazil_adhemar_endgame_survival.12.desc: ""So, what do you think?" Abs unveiled a beautiful black Porsche, he knew about Adhemar fondness of sports cars, that time in São Paulo allowed him to see how Adhemar was with them, even funding the Autódromo to appeal to the Bull. Tonight they would have a relaxing ride down the Autobahn. The buildings of Germania filled the skyline. "You see those things, in 10 years Brasília will be filled with them!"\n\nAdhemar gave a chuckle. "I'm not Kubitschek!" He said while thinking of the marvellous buildings of Brasília that Kubitschek had planned, wondering if he could become him.\n\n"Good thing you aren't him!" Said the banker, accelerating down the road. "That fooled impoverished everyone! Including himself." Both of them gave a hearty chuckle. "You, my friend, will become as rich as myself while at the same time showing your country's might!"\n\nThey were approaching the Volkshalle, Adhemar went silent. "I wonder," he thought to himself. "I wonder if all the blood spilled by those they enslaved was worth it. I wonder if those in Ostland are actually subhuman. I wonder what the people would think about this.""
brazil_adhemar_endgame_survival.12.a: "Buildings made of blood."

brazil_adhemar_endgame_survival.13.t: "The Bull and the Eagle"
brazil_adhemar_endgame_survival.13.desc: "Bright lights blinded Adhemar,he had been waiting for this moment for years. "Hello, Germany!" The crowd erupted in cheers toward the Brazilian and as usual, the President started giving his prepared speech. "Germany and Brazil are great partners, ever since my presidency started, we are getting closer and closer to a trade deal that will change history!"\n\nThe crowd was starting to lose attention, after all how couldn't they? The speech was the usual political gibberish that the common folk never understood, that is, until Adhemar started speaking again.\n\n"You see German folks, after walking through the streets of Germania, I realized something truly abhorrent! Germany is, let's say, not worthy of their position on the world stage. I've heard what you people have done to the Poles and others in the East, it is truly abhorrent! Brazil for instance is a melting pot of cultures and we're fine. Your choice to murder those you deem impure is frankly disgusting!" The crowd couldn't believe it, murmurs of anger spread like wildfire. The Bull noticed but didn't care, he needed to continue his speech whether the Germans liked it or not.\n\n"I would like to invite Germany to join us, the civilized nations of the world, so we can finally bring this planet toward a better future," sounds of cheer and anger ravaged the crowd. As Adhemar finished his speech he went back to his room, filled with confidence of having done the right thing, to have shown the Germans what a truly great nation could do."
brazil_adhemar_endgame_survival.13.a: "The light of freedom shines brighter."

brazil_adhemar_endgame_survival.14.t: "Lacerda's Inferno"
brazil_adhemar_endgame_survival.14.desc: "The doors of Da Cunha's office bursted open. "Son of a bitch!" It was Lacerda, who had just finished watching Adhemar's speech, his face was blood red and his fists were ready to punch the fool's face. The former foreign minister quickly realised what was going on and offered the Vice-President some sugar water.\n\n"Does that imbecile not realise that we can see right through him?" Lacerda was shaking with anger, he couldn't believe what he had seen in that speech. "Does he think that putting on a mild critique of Germany's system would hide everything he's done?", he said while drinking his water. "Please, one more cup Cunha.".\n\nHundreds of thoughts came to the former minister while preparing the drink. "Maybe the time he spent at the hospital gave him a change of heart? No one truly knows what passed through his head while he was in that state," he said while giving Lacerda his second cup.\n\nWith his shaking slowly quieting down thanks to the mixture, Lacerda looked directly into da Cunha's eyes. "No, he has always been like this. He has always hidden his true intentions under the thin veil of populism." His heart has gone back to its normal pace. "You know Cunha, you're an old friend of mine. You probably understand that keeping that fool in charge is a liability for the whole nation! But, why? Why do these people keep voting for him?""
brazil_adhemar_endgame_survival.14.a: "Why didn't he die in that coma?"

brazil_adhemar_endgame_survival.15.t: "Money That Reeks of Blood"
brazil_adhemar_endgame_survival.15.desc: ""Now that was a hell of a speech." Spoke between hiccups a worker to his colleague, holding an American cup with a shot of cachaça. The bartender knew what he was referring to, how could he not. He was used to seeing his small bar attract people when a football game or an episode of a soap opera was on television. But nothing like that day, when the President gave a speech at the Nazi shrine, and those workers weren't the first to chatter about it on his bar. "I'll tell you, that's my President! You gotta show those krauts how it's done!"\n\n"Getting stirred up already, aren't we?" asked the bartender as he cleaned the wooden table with a sweaty flannel.\n\n"Oh why not? Isn't it wonderful to have those nazis paying everything for us and without us having to give anything back? Heck, at this point we could even spit on Hitler's grave and they wouldn't move a finger!"\n\n"Oh sure sure, having money in our wallets is always good." The bartender answered, pretending to be interested in the conversation as he headed to his work. "I just don't understand why, of all people, we had to make business with those scumbags. I bet my whole bar that fat Paulista is just trying to cover his ass and get as much money as possible for him before he's out."\n\n"Mmhm, they always say this until they get their paycheck. Well, I don't. I'm very grateful for everything life offers me, thank God. And another pay raise never hurts, isn't that right pal?"\n\nThe other worker stared blankly at his empty cup as his colleague nudged him. He saw no reason to comment, much less to celebrate, his past didn't allow it. His Jewish family had fled the horrors of Nazism before, and now he would witness the country that welcomed them profit from the suffering wreaked on his family, and so many others like him who were not as lucky.:"
brazil_adhemar_endgame_survival.15.a: "And not even alcohol could wash this pain and anguish away."

brazil_adhemar_endgame_survival.16.t: "Pulling the Strings"
brazil_adhemar_endgame_survival.16.desc: "The lobby of the Deutsche Bank was usually filled with German paraphernalia, from flags to eagles, but today, Hermann Abs was decorating the halls with all sorts of Brazilian things, flags, flowers and food. Everything to show Adhemar they were willing to do business with him. Everything had been carefully chosen to appeal to the Brazilian, he had notes on all sorts of stuff.\n\nAbs was chuckling as he ordered his subordinates to decorate everything. "Adhemar is such an idiot!" The banker thought while lighting up his cigar, he knew in his head the power he had in comparison to the fool that called himself the "Bull."\n\n"Ada, come here!" Holding some sheets of paper in his hand, Abs had even prepared a speech for his subordinate, a speech that appealed to Adhemar most carnal desires. "Ada, you will read this when Adhemar comes here, don't forget to use that cologne you own. He will love that."\n\nDiplomats sent by the Führer entered the halls. "Welcome. We're preparing everything for the visit," said the banker. "Don't you worry, everything we are doing is necessary to ensure better relations with Brazil." Assured by his words, the diplomats spread out in the lobby.\n\nThe banker sat on a random chair from the lobby, the smell of smoke from the cigar was strong and suffocating but he didn't care. "A bull? What a stupid title, he's more like a fly, ready to be crushed when the time is right." Chuckling like a hyena, Abs stood up and continued giving orders to his subordinates."
brazil_adhemar_endgame_survival.16.a: "Taming the Bull"

brazil_adhemar_endgame_survival.17.t: "To Kill a Mocking Bull"
brazil_adhemar_endgame_survival.17.desc: "Rage filled the air of Abs' office. How could he? How could Adhemar do that after we did so much for him? "Why didn't the guards shoot him! Subhuman scum!" and other obscenities were being shouted by the staff members. Their faces were a flaming red, some asking for Germany to completely embargo Brazil and cut all diplomatic ties, one even said the Führer should nuke Brasília.\n\nAs Abs himself opened the door, all of the words being exchanged stopped. He knew what his staff members were going to ask him, they wanted to know what he thought Germany should do with Adhemar. The banker gave a small chuckle, the situation was too absurd for him. "What are you? Poles? Getting all angry over a mere speck of dust."\n\n"Adhemar is a fool who already gave us everything we need. His stupidity to give such a speech in our land is enormous, but why would we even care?" His subordinates couldn't believe it, why would Abs be so unfazed by this?\n\nThe banker lit up a cigar in the midst of the discussion. "Friends, do not care what a mere subhuman has to say about us. We are the superior race. Let us celebrate our might in a most beautiful party rather than cry over the words of someone who would be crushed by the Führer!""
brazil_adhemar_endgame_survival.17.a: "The Eagle flies higher than the Bull."

brazil_adhemar_endgame_survival.18.t: "Engineering an Exit"
brazil_adhemar_endgame_survival.18.desc: "Even the desk was not the same. Adhemar de Barros kept changing his posture in his seat and adjusting himself, comparing it all to as it was before the hospital. Even still, the cushioning, the dust on the table, the view from the window, it all felt just unfamiliar enough to piss him off. And that damn window. There was a new building in his view, he could swear it, but even just pushing off the floor to take a look, his knees buckled, his spine trembled, and he crashed back down.\n\nThe calendar did not soften his predicament, either. This President knew he could not be in this building forever: apparently they would throw him out anyway, even for being sick. There was no time to hold out for something nice, he was going to have to use all he had now before he could do so no longer. At any rate, they were going to remember him somehow, and as such, they had better do it on his terms.\n\nHe always thought of making a charity. That he was known as a man who steals would eventually frame him poorly, and to be seen giving back would surely change that. Even after he had been so rudely interrupted from his presidential term, he could not help but appreciate the healthcare system and the fact it saved his life. It would build on his own healthcare policy in the way the state could not, and that was what the people would think too.\n\nYes, he had to leave office, and yes, just like anyone, he was mortal. Right now, though, he had the unique power to define how the world would think of and remember him. Like any good businessman knew, that is not something to leave to waste."
brazil_adhemar_endgame_survival.18.a: "Rehabilitating the debilitated."

brazil_adhemar_endgame_survival.19.t: "The Old Puppetmaster"
brazil_adhemar_endgame_survival.19.desc: "Eyes shut, mind blank. Is this how it was going to be every day until he would be whisked back off to hospital again? Even the damn aides were giving him the cold shoulder. Or maybe it was in his head, maybe he just needed...\n\nThe door swung open. "Mr. President, welcome back." Emilio Garrastazu Médici sauntered in, his baritone voice firm. He stood before the desk, hesitated, then resignedly extended his hand. While his host could not stand, he could still smile and shake hands.\n\n"I received your briefing earlier about the megaprojects," the stern old soldier intoned. "I have always respected your boldness, Mr. President, but I am sure I do not need to remind you that the army's first priority is defending Brazil from outside threats, now from down south and from an offended superpower."\n\nThe bastard has plenty of boldness himself, Adhemar mused. Yes, he may be frail, but that did not make him petty. He was going to get what he wanted, just as always.\n\n"If I did not understand that, I would not be doing my job properly, General. But I would say that the contribution I am asking of you and your men would be very medalworthy indeed, alongside anything else you might think of. The price is yours to name, my friend."\n\nAs ever when making a deal, Médici stared back as if he hadn't heard anything the first time, before finally cracking into a wan smirk. "Very well, I suppose there are a couple of engineers I would feel comfortable reassigning. I will, as you say, find that price in due course."\n\nAdhemar grinned to himself. He couldn't stand up to the man himself, but he could still make them all dance just as he told them to. Good to see that at least the military hadn't changed."
brazil_adhemar_endgame_survival.19.a: "This old man can still use his strings."

brazil_adhemar_endgame_survival.20.t: "To Japan, With Love"
brazil_adhemar_endgame_survival.20.desc: "Head aching and heart burning, Adhemar managed to muster the strength of readying himself in the spotlight of the elaborate film sets upon the Congress Palace. He had never felt so odious and terrible since his earliest days when running São Paulo — yet it is the moment to make his final changes. How much time does he have left after all? Days, or perhaps months. Beyond that, the pearly gates await, and they never discriminate.\n\nPress teams rammed themselves into the Palace as soon as Adhemar's bodyguards permitted, with a suspenseful moment of pause, Adhemar read from his notes. "Brazil is a nation of justice and equality, she never asked for the people to provide for her. And instead, provided so many of her natural bounties unconditionally, be it for the wealthiest or the most downtrodden."\n\nContinuing after a momentary break, he turned his gaze towards the cameras. "Is it not an affront to God's intents for us to work against the good people from Japan, who are, by every measure, as human as us? Decades ago in the Rio Congress, I had fought for the Nikkei's right of reunion — many of my colleagues thought differently, yet it was true that the PSP, the party of the brave and righteous, had always been a force of progress —"\n\n"Therefore, I, Adhemar de Barros, now plead for the popular support of the Moral Majority to repeal the policy of immigration ban on our Japanese friends." A brief and uneasy quiet ensued — the floorboard creaked, the cameras chirped, he murmured before the conclusion of the speech, in the midst of an ambivalent crowd."
brazil_adhemar_endgame_survival.20.a: "The bottom line is always money."

brazil_adhemar_endgame_survival.21.t: "Sand"
brazil_adhemar_endgame_survival.21.desc: "The dark was beaten back as the sterile rays of light pushed back the night for at least this moment. Murmuring, the large machines were restless in their duties bound to them, encircling a damaged soul they analyzed, recorded, and printed. White coats grabbed each print into their hands, and a waterfall fell from their mouths before rushing between different stations. The patient, with eyes closed, was the reason as he lay there, awaiting at one side of the river Styx.\n\nOutside the banks of the river and the room, his relative sat. A bounced leg for a few moments, then a pace back and forth, then once again sitting before repeating the process over and over. She could only force her perception to go slower, for time to fall faster through the neck of its hourglass. The relative remained encased in the desert, surrounded by the sands of time.\n\nShe fell through the neck when the door she hovered around swung open, and a doctor closed the door behind him. "He will live."\n\nEach sentence, paragraph, and essay of worry that had sped through her mind for hours was cast asunder with a few words. The now-empty space was filled in with the rushing waves of joy and conviction. Joy, for death is not to visit the household for now. Conviction, to keep it that way..."
brazil_adhemar_endgame_survival.21.a: "...with all her might."

brazil_adhemar_endgame_survival.22.t: "Dust"
brazil_adhemar_endgame_survival.22.desc: "Sterile lights fought against the tide of darkness, but only in appearance. The moonless night's atmosphere leaked into the chamber from the outside as it filled the heart of a woman. She agonized for seemingly eons over the health of her family member, relegated to taking desperate glances through the window, only lasting a few seconds before the tears blurred what she could not handle to see.\n\nWould he be okay? He had collapsed and- oh, she should have driven faster, maybe then he would be at least slightly better. Would he be alright? The doctors were taking care of him, and she heard of something about making hospitals better, but it hadn't come here yet. Would he be alive?\n\nHe had to be.\n\nNow her eyes were stuck open facing her relative, not even registering the pane of glass separating them. A group of white coats surrounded him, but they were too still to be working, one of them dropped their head and she knew all she needed to.\n\nThe doctor opened the door of the emergency room, stepping out to face her. Her heart fading into dust."
brazil_adhemar_endgame_survival.22.a: ""I'm sorry for your loss.""

brazil_adhemar_endgame_survival.23.t: "No Time to Die"
brazil_adhemar_endgame_survival.23.desc: "She didn't care anymore, her foot pressing down on the accelerator pedal as she ignored the blinding lights of the street lamps. One glance into the rearview mirror was all she needed, her relative, her family member struggling to remain conscious. The sirens were ignored, her eyes didn't dare to blink as she sped faster into the night.\n\nShe finally got her salary, finally able to make his life better. But only if she made it there on time. If she crashed, they would both be dead, but if she didn't and was too slow, he would be dead regardless. 1, 2, 3, each second counted as she forced her foot to press harder, to go faster despite any obstacle.\n\nShe took another glance, he was unconscious. He had no time to live, but she would be damned if she let him have enough time to die. The blur of cars, trees, lights, and people passed by as she spotted her destination, the red cross plastered on its front was lit up, the only thing that could save him."
brazil_adhemar_endgame_survival.23.a: "To outrun Death is a fickle thing, yet possible."

brazil_adhemar_endgame_survival.231.t: "Lands Left Behind"
brazil_adhemar_endgame_survival.231.desc: "Why?\n\nThe hymns of prayer, all black clothing, a hole filled with flesh and dirt.\n\nWhy?\n\nRed coughs, weight loss, the burning heat that came from him when she measured her temperature.\n\nWhy?\n\nTuberculosis, they said. Curable. Her relative didn't have to die.\n\nWhy?\n\nThe hospital was too far away, and too costly. She couldn't do anything but watch.\n\nWhy?\n\nBecause-\n\nWhy? Why? Why? Why did he have to die? Why did they deserve to lose someone, only to find out they didn't need to? If she worked harder, would she have done enough to save him? Why couldn't she save him? Why?"
brazil_adhemar_endgame_survival.231.a: "An old disease claims a new soul."

brazil_adhemar_endgame_survival.24.t: "Revolução Industrial"
brazil_adhemar_endgame_survival.24.desc: ""And just what is that factory over there? I see a lot of German markings on the machinery. When I was passing close by I even saw some swastikas buffed out."\n\n"Oh, it's an agricultural factory. Some German company, BF or something, built it here."\n\n"And what about that other factory some blocks away? Over there it seemed like half the staff were Yankees."\n\n"That there is a Brazilian Ford factory. It seems that the 'Fix Or Repair Daily' people really like our markets for some reason."\n\n--\n"The report on the current economic situation. President Adhemar de Barros' policies have proven to be of middling to somewhat decent success. Inflation remains a concern, but is not accelerating as it did during the Lott administration. A particularly favorable note to be observed is an increase in the proportion of surveyed workers that feel confident in their ability to either obtain a job or hold on to the one they have got. However, ..."\n\n--\n"Business problems?"\n\n"You're damn right there's business problems. That moronic Udenist bastard of a mayor keeps giving me trouble over this or that stupid city ordinance. It's so goddamned annoying having to listen to him yap next to my ears all the time."\n\n"Well, you could always get hold of that guy, you know."\n\n"That's true, actually. God knows Adhemar's people have delivered for me before. Maybe I should go seek out that Pessepista contact of mine and see what he can do about the city council.""
brazil_adhemar_endgame_survival.24.a: "Thus Adhemar made his mark on the industrial landscape."

brazil_adhemar_endgame_survival.25.t: "Journalistic Integrity"
brazil_adhemar_endgame_survival.25.desc: "Nothing. Sitting before the television screen, Lacerda heard nothing. To hear some, even mostly nothing would have been fine—TV Globo couldn't sell ad space with hard-hitting journalism alone—but this was different. This was more. This was an entire hour utterly devoid of even a hint of something: a specific something he had come to expect. And as the anchor signed off, coffee erupted from Lacerda's mouth, his mind wasting no time in interrogating just what had gone wrong, just how he had watched...\n\n"...an entire broadcast without insult, Roberto," said Adhemar, cocktail in hand, pausing briefly to take another sip. "You've swapped viewer-bases almost overnight," he turned from the shoreline to Marinho, pushing up his wide-brimmed hat, "and frankly, I'm impressed."\n\n"We had a deal, Mr. President, and the TV Globo brand and I would not so soon renege on such a thing." Marinho spoke dryly, his expression that of a fish out of water, more fit for a corporate boardroom than Adhemar's sunswept retreat.\n\n"And that's just what I love about you," his speech grew impassioned as he shot out his free hand, pointing at the tycoon, "you know a good deal when you see one, and you stick to it."\n\nThe edges of Marinho's mouth slowly cracked into a smile, his pencil mustache bending further upward with every word. "I'm flattered, Mr. Pre—"\n\n"Please, Marinho, my friends call me Adhemar."\n\n"Then I'm flattered, Adhemar. It's funny; I've never been able to meet with Lacerda. For a man of such importance to have a tight schedule was understandable, but," now it was his turn to turn his head and smile, "it's clear that my standards have simply been set too low.""
brazil_adhemar_endgame_survival.25.a: ""It's a pleasure to meet with someone who knows how to raise them.""

brazil_adhemar_endgame_survival.26.t: "A Reminder"
brazil_adhemar_endgame_survival.26.desc: "Adhemar Pereira de Barros was many things: a scoundrel, a husband, a businessman, a governor. Most recently he had taken on the title of president, yet he retained all that he once was nevertheless. But as he opened the limousine door on his second attempt and rose to his feet on his third, Adhemar was one thing and one thing alone: silent. And his brother was dead.\n\nAntônio Barros Filho was a simple man by comparison. Where Adhemar was a federal intervener, Antônio was his secretary; where Adhemar was governor, Antônio was his chief of staff. Perhaps Adhemar should have expected that when he would by some miracle survive, Antônio would perish, but that was not what his mind was on. His mind was on one foot after the other and nothing but.\n\nHe stopped. He did not know how long it had been since he had last done so, nor did he consider it, nor did he consider the sounds around him, the mourners and their condolences, for there he was. There was his brother. His face was peaceful and calm and restful and exactly what he expected but not quite—it was not real. It was not how he died. It was not his brother. It was what had been done to him. It was proof of fate's cruelty that he had laid comatose when he passed, denying him the knowledge of just what his brother last was. That he did not collapse in tears, that he did not hurl himself one foot forward and six feet deep was a miracle in itself, and he paid the protests of his wrists no heed as he clasped his hands in prayer ever harder.\n\nHis eyes were shut as he first heard the shovel hit the dirt. They remained shut as he lost count, as he heard it again and again and again and again. But at the last second they shot open, dyed red, for the last chance he'd ever have to see him: to see Antônio, however counterfeit."
brazil_adhemar_endgame_survival.26.a: "But all he saw was himself."

brazil_adhemar_endgame_survival.27.t: "The Crown Prince's Visit"
brazil_adhemar_endgame_survival.27.desc: "As was so often the case after 1966, the favelas would lose their minds with eagerness and joy whenever Adhemar or Vargas Filho would turn up. So it was on one day in the 1970 campaign. Travelling through a Carioca favela, the master and his student received the closest equivalent to a ticker-tape parade a favela could offer, with posters of Adhemar and Vargas Filho adorning every wall without fresh paint on it.\n\nThe initial enthusiasm subsided a little as Vargas Filho and Adhemar settled in at a public square and prepared for a campaign speech. This gave a group of neighbors time to argue about politics a little. One of them joined in midway through someone else's rant.\n\n"—And I'm telling you, these people are crazy! They're just having everyone worship them as if they're Nazis! Who do they think they are, putting pictures of themselves up all over the place so we have to clean up after their mess when they're gone?"\n\nThe local Adhemar supporter slammed a makeshift table in his anger. "What, and you're gonna tell me that bastard murderer Lacerda's any better? He only talks to the rich hoity-toities on the beaches. He doesn't listen to poor folk like us, not like how Adhemar does!"\n\nA quieter neighbour piped up. "What about the Trabalhistas? Whenever they come by, they at least try to listen..."\n\nAdhemar's strongest believer in that part of the favela scoffed. "Nonsense, they're only pretending to listen. They're all communists or rich fat cats or whatever anyway, just like the morons that tried to steal Adhemar's safe. Besides, you never see that fatso Goulart coming to visit, do you—" At this point, the man was cut off by a loud cheer from elsewhere as Adhemar began to speak."
brazil_adhemar_endgame_survival.27.a: "There was a sort of stampede in the direction of the square."

brazil_adhemar_endgame_survival.28.t: "Burajiru e Yōkoso!"
brazil_adhemar_endgame_survival.28.desc: ""Good afternoon, this is the midday news on Hora do Brasil. This is Jurandyr Abreu reporting from Brasília. I can now confirm that the constitutional reform on lifting bans on Japanese immigration to the United States of Brazil has passed both chambers of the national legislature with the requisite number of votes and is therefore law..."\n\nAdhemar looked out of the Palácio da Alvorada window and leaned back a little, listening to the reporter. "The vote was the result of a barnstorming effort by President Adhemar de Barros, a devoted supporter of Japanese Brazilians since his early political career shortly after the end of the Estado Novo. This result will be greatly satisfying to the PSP and to the President, who have both traditionally taken pride in making and then fulfilling promises to the 'Nikkei', as they call themselves."\n\nAdhemar chuckled and emptied his glass of whisky. "This Jurandyr seems to have some insight. It's true that I support the Japanese, they're good, hard-working people that have so often gotten unfair treatment here in Brazil. And it's true that I am satisfied—at last Brazil is free to welcome people from the Far East without falling foul of some stupid law set by a coffee and milk dictator in the Twenties."\n\nStanding up and pacing about a little, Adhemar was overcome with joy. He resolved to have someone take a picture of Washington Luís' portrait. He would then draw a dunce cap on the portrait and send it to a PSP paper to publish in the funny pages.\n\nJokes aside, Adhemar had no doubt he would look back on this moment as one of the great victories of his administration."
brazil_adhemar_endgame_survival.28.a: "Irasshaimase!"

brazil_adhemar_endgame_survival.29.t: "The Way is Shut"
brazil_adhemar_endgame_survival.29.desc: "Grim news echoed in the Palácio do Planalto.\n\nSitting at the presidential desk, Adhemar sighed as he listened to the outcome he knew was already certain. "Good afternoon, this is the midday news on Hora do Brasil. This is Jurandyr Abreu reporting from Brasília. I can now confirm that the constitutional reform on lifting bans on Japanese immigration to the United States of Brazil has officially been refused after being conclusively rejected by the Senate of Brazil."\n\nMore words floated past like jetsam. Standing up, he slowly walked over to the radio and turned it off.\n\nHe walked out into the gallery of those who had been anointed to the supreme magistracy of the Republic, passing one by one the men beginning with himself and heading backwards in time. Lott's face passed by, Kubitschek's and Gomes' thereafter, Vargas' too—all until he reached the face of the man who had started all this devilry. Staring impassively at the painting of Washington Luís, he finished his drink of whisky.\n\nResisting the urge to throw the glass to the ground in rage, he went back to his office, put the glass next to the bottle, and wordlessly left his office in the Planalto Palace to go out on a walk. While out on the promenade, in the nearly empty Praça dos Tres Poderes, he kept walking in silence, thanking God no one saw him in his frustration."
brazil_adhemar_endgame_survival.29.a: "It was made by those who were dead, yet the living keep it."

brazil_adhemar_endgame_survival.30.t: "The Presidential Legacy Fund Act Passes!"
brazil_adhemar_endgame_survival.30.desc: "Adhemar stood on the threshold of the lot, recently purchased by the government on behalf of the Presidential Legacy Fund, and smiled to himself, standing slightly away from his aides and bodyguards. The Presidential Legacy Fund Act had passed with little real opposition, beyond the few usual showboaters. He had used it immediately.\n\nIt had not been hard to ensure the Act's success - compared to the many other showdowns with the Senate that had occurred in the past, this had been trivial. The lot still had buildings upon it, ones long neglected and of minimal value, but that would soon change. His own library, coupled with a small clinic and attachments to his medical outreach charity, would enshrine his name among the poor of this area of São Paulo far stronger than any of his previous policies.\n\nIt was strange to think of such a small effort, in comparison to the rest of his career, as being such a notable step. Legacy was, after all, critical, and this library would stand for decades. Would it outlast everything else he had done? Perhaps, or perhaps not. Who could say?"
brazil_adhemar_endgame_survival.30.a: "But it would stand long enough."

brazil_adhemar_endgame_survival.31.t: "Magic Man"
brazil_adhemar_endgame_survival.31.desc: "The Presidential Legacy Fund Act has been rejected today by the Senate. The bill, which sought to allocate a small discretionary fund for the president's personal use, was labeled frivolous spending by critics and met with-"\n\nCLICK.\n\nAdhemar turned the knob of his desk's TV just a little too far to the left, with the plastic buckling between his fingers. Pulling away, he leaned back in his chair, legs crossed. He had assumed this would be an easy win — an insignificant amount of money that even a shrewd taxman wouldn't notice. If people were talking about this, it must have been a slow news day.\n\nHe smiled — no, snickered — amused by the absurdity of it all. Adhemar had always managed to use the funds however he pleased. That's just how the world worked. He was merely trying to legitimize what he had always done. Shouldn't the Senate be into this?\n\nMaybe it would have been better to skip the whole exercise. If Adhemar didn't know any better, he might have assumed they held a grudge. But no. Of course not. How could they? Why would they? The people loved him. Such a small bill. Such a small, insignificant little bill.\n\nHe looked at the tips of his thumb and index finger — both reddened and marked by the ridges of the knob. Tapping them together, Adhemar let out a long, painful sigh, sinking deeper into the leather of his chair."
brazil_adhemar_endgame_survival.31.a: "Was he losing his touch?"

brazil_adhemar_endgame_survival.32.t: "Familiar Skies, Distant Sands."
brazil_adhemar_endgame_survival.32.desc: "São Paulo was too obvious a pick, and far too urban for his liking. Belém had some of the austere european architecture, with a touch of new world wildness to it. Rio might be the safe bet, even to some who had frequented it as much as Adhemar de Barros Filho. One would think the shade of Cristo Redentor would stale after a generation or more, but the warmth that both it and Rio gave was a fond memory for him.\n\nAs for abroad, the processes of the Cold War could only limit his options; Naturally, most of Europe was out of the question, as was a significant part of Asia. Ireland was idyllic enough, as was Australia and New Zealand. French Canada had a similar European flair to parts of Brazil, as did parts of Mexico in addition to their famous tropical enclaves in the south. Would he spring for multiple? One close to home and another further away? He decided he would.\n\nAdhemar had been pursuing foreign real estate that entire afternoon, from beachfront estates to courtly manor to upscale townhomes. This was meant to be the fun aspect to retirement (which it was, to be fair.), yet for every lavish mansion or uptown penthouse he perused over, Adhemar found his mind wandering. Back and forth, his thoughts drifted back to the nation he'd worked tirelessly to improve...and what that meant for him.\n\nWho was Adhemar de Barros Filho afterall? If he were a younger man, the question might have made his skin crawl. But now? His was the face of his nation at its most resilient; A stubborn old man for the stubborn old Brazil, with a legacy of preserving her sovereignty and traditions that were bound to outlive him. What would that man become when he left the stage, far enough away for that legacy to become a target, too old to care what image his name conjures up?"
brazil_adhemar_endgame_survival.32.a: "Eventually, his eyes found the property listings again: "Lisbon... Along the Atlantic...that sounds nice..."

brazil_adhemar_endgame_survival.33.t: "The Call of Destiny"
brazil_adhemar_endgame_survival.33.desc: "The businessman, one of thousands like him, sweating through his collar in the tiny office that constituted his 'headquarters,' was quick to pick up the phone when it rang. He was, after all, expecting a call from his fabric supplier, who had told him there was an excellent shipment of cotton this month.\n\nBut he was not expecting the person on the other end.\n\nHe did not recognize the voice at all, though it certainly seemed to know him. It spoke of an old friend, apparently a friend of a contact of an acquaintance of President Adhemar. And it introduced itself - none other than Laudo Nadel - the Chief of Staff himself! Stunned, the businessman could say little as Nadel spoke warmly, as if they had known each other all their lives, and he only recovered enough to agree vehemently as the point was made - a very careful and couched request for contributions to the upcoming Vargas campaign.\n\nThere was of course no question about accepting, cost be damned - any favor given was one to be reciprocated upon victory, and one requested from such a high figure could no doubt be extremely valuable. Any new administration would no doubt have many needs to be fulfilled and contracts to be granted out.\n\nHow many, he thought, could he get?"
brazil_adhemar_endgame_survival.33.a: "Capitalism at its finest!"

brazil_adhemar_endgame_survival.34.t: "A Man of Things to Come"
brazil_adhemar_endgame_survival.34.desc: "As he stepped from the Maserati, he emerged like a rock star. It was a tornado of cheers, camera flashes and outstretched hands. The brisk blue sky had not a single cloud to be seen, just as Paulo Maluf had not a doubt in his mind when stepped into the limelight. Pressed suit, polished wingtips and a look in his eyes as if he felt himself thoroughly invincible. A wave to the crowd, a smile for the press, a window into the future.\n\nHe was guilty as hell and he knew it, what man of his party wasn't?\n\nAdhemar and Laudo knew just as well, why else would they come to him? He was the man responsible for modernizing Caixa in his stint as a civil servant, as loyal a PSP man as Vargas Jr. or anyone else and São Paulo man through and through. He was the spitting image of what an urban progressista could be and just the kind of representative the party would point as an example for the rest.\n\nWhat better man could one of his nation aspire to be? A politician of rational ideals and with a passion for the fine things in life; fast cars, gourmet dining, summer outings in Singapour with plenty of alcohol to be shopped around. When Maluf reached the top of the stairs at the foot of the state house, shaking hands and standing side by side with the President and his aid, no one could pretend that he was the future of their nation."
brazil_adhemar_endgame_survival.34.a: "Not one man of the PSP could find anyone better."

brazil_adhemar_endgame_survival.35.t: "Thrill of the Hunt"
brazil_adhemar_endgame_survival.35.desc: ""Private property." Rico read the sign plastered on the fence surrounding the beach. "Trespassers will be prosecuted." He laughed, and then jumped over the fence. Anita didn't even bother reading as she followed Rico over. Even from there, they could smell and hear the ocean. The two journalists took a second to admire the almost white sands and light blue waters outside of Caracas.\n\n"We need to go here sometime." Anita remarked. Then, the hunters continued forward, searching for their prey. A "Mr. Pedro Linde" who checked into the nearby resort a little over twenty-four hours ago, according to information from their "employer." None of the other patrons of the beach took notice of the two journalists as they searched for Mr. Linde.\n\nRico's eyes settled on an elderly man sunbathing in a wicker chair, a hat covering his face. He exchanged a glance with Anita, and broke out into a grin. "Look at him- he looks like a dried up prune." He snickered. First aiming from a distance, he raised his weapon and took a few shots at Linde.\n\n"We need to get closer." Anita murmured. "Wait, I have an idea. Mr. Linde!" Anita called. The wrinkled man took his hat off, sitting up and squinting.\n\nThe hunters took aim at their prey."
brazil_adhemar_endgame_survival.35.a: "Smile, Adhemar!"

brazil_adhemar_endgame_survival.36.t: "Movable Legacy"
brazil_adhemar_endgame_survival.36.desc: ""Ah, Mr. President!" His accountant was as polite as ever. "How is your health?"\n\n"For the day? An improvement." Adhemar had just a little more spring in his step that afternoon, he welcomed it.\n\na"And the business of today?" The accountant prompted.\n\n"I am opening a new bank account, overseas."\n\nA noticeable pause, the sounds of paper rustling. "...That can be done."\n\n"Is that a problem?" Adhemar raised an eyebrow at the phone in his hand.\n\n"No...one moment." More papers rustling. "...is that the...ninth?"\n\n"Tenth."\n\nThe pause was longer now: "Should I be concerned?"\n\n"Hmm?...Ah!" It took Adhemar a second, he smiled. "Nothing to worry about; New megadoners for the Party's campaign, less out of my own pocket!"\n\nThe accountant was relieved: "Of course, sir. Celebrations are in order, I suppose?"\n\n"The PSP event at the Cabaret? Bah!" Adhemar chuckled: "I am too old for that kind of thing, which is exactly why I'm going!""
brazil_adhemar_endgame_survival.36.a: "Adhemar was reassuring: "You'll be getting an invite too, don't you worry!"

brazil_adhemar_endgame_survival.37.t: "Honor Among Thieves"
brazil_adhemar_endgame_survival.37.desc: "Laudo sat in his office, looking over the campaign's costs. Some 50 million reais was going to waste, probably more. It was textbook Adhemar, with a strangely large amount of "miscellaneous" costs, and far too much going to "transportation" costs. If anything it was sloppy work, maybe Adhemar was getting senile in his old age.\n\nLaudo covered his eyes and sighed. He thought Adhemar wouldn't stoop this low, stealing money at the last minute from his own successor. He should have thought it, but he didn't. After a bit, he removed his hand and eyed the phone on his desk.\n\nAll it would take was one phone call, and Adhemar would be caught, his legacy tarnished, and Laudo would be a hero, who caught the corrupt fiend who stole from the people. He picked up the phone. Then he remembered Vargas Jr., who would be getting robbed by his own campaign. He would certainly lose. The PSP would be tarnished. He put the phone down, and filed the receipt for the campaign away in a file cabinet to never be seen again."
brazil_adhemar_endgame_survival.37.a: "Stay Together For The Kids"

brazil_adhemar_endgame_survival.38.t: "The Fourth Corner"
brazil_adhemar_endgame_survival.38.desc: "The banquet hall was as illustrious as one could afford, linen tablecloths and fine silverware lined the conference table for a solid 20 feet. A full course meal with dessert and plenty of wine to spare, all with a lively band keying a wistful rendition of the Tocata by Carlos de Seixas as a backdrop. Adhemar de Barros Filho, in a rare display of modesty, chose a farther seat towards the end rather than the middle; the Tocata was fanciful to the ear and he wanted a seat closest to the music.\n\nThere was, of course, a more immediate reason for this; Herr Heidenreich was as insufferable as his uniform implied, looking almost alien in a pale grey tunic accented with an iron cross in silver. Adhemar made sure to seat himself as far away as tact would allow, as the Bavarian's butchering of the (continental) Portuguese language was like nails on a chalkboard. At least the wine was keeping his conversation to an inebriated minimum at this distance.\n\nYet not even the obstinate Heidenreich could contain Mr. Bradshaw, the broad-shouldered Texan with the cannonball head. His light blue suit was as bright as his smile, the big white cowboy hat to match his white hot temper. He had his arms wrapped around two young girls, one for each arm, as he regaled them about his exploits in South Africa, to the occasional glare from Heidenreich sitting across from him.\n\nTajiri-san was more equitable about things, or at least practiced plenty to appear that way. He had settled for a normal tuxedo for the evening, only complemented by a Sakura blossom he wore on his lapel. He sat alongside representatives from the Japanese population of São Paulo, to showcase the cultural connection from his nation to theirs. They all looked on with muted amusement and thinly-veiled condescension at the posturing of the American and German dignitaries.\n\nWhile one did not need to be a political scholar to sense the mutual enmity between these three in attendance, it spoke to the influence the PSP held to officially arrange a banquet featuring foreign attendees from the three global superpowers. Adhemar could just as well appreciate the fine dining and ambience as he could the knowledge that his efforts to build the PSP into a true political force that all the world respected had finally paid off."
brazil_adhemar_endgame_survival.38.a: "And he was mostly there for the wine, he got a whole show for his trouble!"

brazil_adhemar_endgame_survival.39.t: "Príncipe Herdeiro"
brazil_adhemar_endgame_survival.39.desc: "Adhemar Pereira de Barros had been running around all over the country from a very young age, regardless of how many people he was leaving behind at home. He cared for his loved ones mainly by way of knicknacks sent back, money funding their lives, and by squeezing every moment he did spend with them for maximum value. Few people were more familiar with this tendency of Adhemar's than his eldest son, Adhemar de Barros Filho.\n\nWhile waiting for his father to get dressed before heading out for dinner, the President's son began to woolgather. Serving as a São Paulo deputy for his father's party and mostly observing him from afar, the younger Adhemar had to conclude that the President of the Republic was a loving father with many flaws. "God, I wish he'd stop seeing that Dr. Rui woman so often," was a common refrain among Adhemar's four children.\n\nYet at the same time, Adhemar de Barros Filho had to admire his father's methods. There wasn't too much to condemn, he felt. He had to admire in particular Adhemar's skill in one-to-one conversations. The younger Adhemar would go mad trying to remember if he had spoken to a person, while Adhemar père was content to just pretend he had.\n\nThe other thing the son admired was his father's pragmatism. Even if he was of a different persuasion than his father, he would never sympathize with the dogmatic pro-US nonsense those Udenists liked to push. Why sell out Brazil to any superpower? "It's better to hedge your bets, and my father understands that," Adhemar de Barros Filho would often say.\n\nAs for more recent, low-level things, Júnior was thankful that his father—having just come out of a dangerous health scare, after all—was spending more family time with him. That was deeply appreciated. At that moment, the door opened, and Adhemar emerged fully dressed. He nodded to his eldest son. Júnior nodded back and opened the door for his father, who said,"
brazil_adhemar_endgame_survival.39.a: ""Tell me how you've been, son.""

brazil_adhemar_endgame_survival.41.t: "The Presidential Pension and Pardon Act Passes!"
brazil_adhemar_endgame_survival.41.desc: "Chaos. There was no other word for it, as the Senate erupted into outraged howls.\n\nThe night-long vote had been an ugly one, and as the members watched the vote counter inch closer and closer to a passing majority, the mood had turned from anger into deeper anger. And then, as the majority was declared and the measure passed, into outright fury.\n\nAdhemar's brazen gambit to pardon himself, legally and through an act of the Senate, had been successful. Those who had found their compatriots 'defecting' to support the motion were themselves blindsided. Alliances had been calculated, and friendships lost, in score. His ability to secure a majority on such a nakedly craven bill stunned even the most cynical observers, and lists of the supporting members' names had already begun being distributed.\n\nAs the news spread outwards from the capital, shock and disorder were the characters of the day, the country both stunned and in awe of the political mastery, and conniving, on clear and full display. The full ramifications were not yet known - that was, after all, the whole point - but the situation was clear. He had gotten away with it.\n\nAnd watching over it all, with the news delivered by a loyal aide? Adhemar smiled, nodded at his own ability, and leaned back in his chair."
brazil_adhemar_endgame_survival.41.a: "To success."

brazil_adhemar_endgame_survival.42.t: "The Presidential Pension and Pardon Act Fails!"
brazil_adhemar_endgame_survival.42.desc: "Shock. Relief. Exhaustion. The emotions flowed rapidly through the Senate chamber.\n\nThe night-long vote had been an ugly one, with more than one member furiously realizing that their counterpart had been suborned by Adhemar in one respect or another to provide his future legal immunity. Alliances had been calculated, and friendships lost, in score. In the end, though, the effort had been defeated, and legal liability still theoretically existed for Adhemar in the future should evidence come to light. Although, the 'victorious' Senate thought gloomily, it was unlikely that any such evidence would ever be found.\n\nAdhemar himself, receiving word from his aides, was much less perturbed. He had not really expected it to pass - it had been very brazen to be sure - but it had been worth a try. It was, in the long run, irrelevant anyway. He had worked long and hard to establish the relationships that would make any kind of arrest not only unthinkable but also unworkable. No, he was well aware that he was quite safe in any event.\n\nWho would dare make a move against him now, Act or no Act?"
brazil_adhemar_endgame_survival.42.a: "Ave!"

brazil_adhemar_endgame_survival.43.t: "The Surest Way to a Constituent's Heart"
brazil_adhemar_endgame_survival.43.desc: "All across Brazil, a most unseemly form of grassroots campaigning has taken root.\n\nFrom the cattle lands to the Favelas, from Amazonian villages to the urban heart of Rio, public individuals find themselves blessed with a very targeted kind of prosperity. Middle class families, ranch workers, plantation owners, urban Catholic elites, and on and on the list went. With the PSP campaign ongoing, the party leadership knew exactly where and when and with whom to reach their hands.\n\nSome found money-filled envelopes unceremoniously crammed into their mailbox, others were approached by non-descript cyclists asking for a name and handing over packages without a word. Street walkers are bumped into and feared being pickpocketed, only to find more money than they had. Some deliveries were jammed under the windshield wipers of parker cars, some even found themselves rudely awakened from an afternoon nap by a weighty letter literally thrown into their bedroom through an open window.\n\nPolitics is a dirty business, yet men and women prove as liquid as their capital.\n\nHigh ideals are all well and good, but Adhemar's successor could only benefit from just the slightest tilt in their favor for an ideal turnout at the polls. There may well be a time in which vote buying becomes a thing of the past, at least until a less conniving vehicle is enabled for said purpose. Until then, stuffing the ballot box with a purchased electorate is just the cost of doing business for the PSP."
brazil_adhemar_endgame_survival.43.a: "History will treat us kindly for we have purchased that history, fair and square."

brazil_adhemar_endgame_survival.44.t: "Dumbing Down"
brazil_adhemar_endgame_survival.44.desc: "Dear and esteemed Social Progressive campaigners!\n\nWith the recent elevated and correct measure passed by the Electoral Commission at our esteemed President's direction, there is now significantly increased opportunity for us in rural towns and favelas throughout Brazil. People who were previously banned from voting for the "offense" of being unable to read are now seeking guidance as to whom to vote for. You, ladies and gentlemen, are well-placed to provide that guidance.\n\nOn your arrival in rural and depressed sectors of your areas of operation, you should carry on as normal in your dealings with those that were already eligible to vote. As for those newly empowered, one of the most important things you must keep in mind is to not use text-based media in your campaigning.\n\nThe letters 'ADHEMAR', let alone something longer like 'VARGAS FILHO' or 'PARTIDO SOCIAL PROGRESSISTA', are of no utility to a person that cannot read. The sounds themselves, on the other hand, and illustrations corresponding to them, are what will win people over. In addition to Governor Vargas Filho's own promises and his heirship to his great father, you can use all sorts of promises and incentives that require little mental outlay to gain purchase in people's minds.\n\nSpecific guidance on things that have been found to work thus far is enclosed below. We wish you all success in your efforts."
brazil_adhemar_endgame_survival.44.a: "Signed: the Committee"

brazil_adhemar_endgame_survival.45.t: "The True Heir"
brazil_adhemar_endgame_survival.45.desc: "From in front of three large portraits, one each of himself, his father, and Adhemar, Getúlio Sarmanho Vargas harangued a receptive audience of Varguist coalition voters in one of his father's old political strongholds. Turning up the charm to its maximum, he hit them with the sorts of bromide he had become very used to delivering.\n\n"Ladies and gentlemen, have any of us forgotten the days of my late, great father Getúlio Vargas? Have we forgotten how he regarded serving the people of Brazil, especially the poor and hopeless, as his first obligation? How he defied the Hitlerites, forced the Americans to treat us as equals, and asserted an independent foreign policy? How he laid the grounds for whatever prosperity we were able to achieve under Kubitschek, Lott, and Adhemar?"\n\nNods and sounds of recognition in the audience. Vargas Filho continued:\n\n"The fact of the matter is that the current coalition is not even in Marshal Lott's mould. Over the last half-decade they have only managed to respond in the worst possible way to any proposal mounted by the President. Blunder after blunder, bad policy following bad policy—all that can be concluded is that the Varguist coalition is no longer equal to the task. We need something else."\n\nMore agreement. Applause, cheers. Loud enthusiasm and anger in the crowd.\n\n"I say to you now, fellow citizens: why settle for the same old, when you have a Vargas in front of you? Who is better suited to follow through with the ways of the Father of the Poor than said Father's son? You have an opportunity, ladies and gentlemen, to have properly strong and competent leadership—and here he is before you!""
brazil_adhemar_endgame_survival.45.a: "Several hundred PSP membership cards were purchased that day."

brazil_adhemar_endgame_survival.46.t: "Offer No Silence"
brazil_adhemar_endgame_survival.46.desc: "As the PSP regime of Adhemar de Barros Filho seeks to consolidate its grip on power in preparation for the President's retirement, the recasting of the levers of power in Brazil has manifested in this grip the Progressistas have over the media. Or rather, the influence they have of those that do.\n\nFollowing a recent hit piece by an independent journalist targeting the UDN, attorneys representing numerous Udenist party officials promptly filed a lawsuit against them; the article could not have been more obviously yellow journalism if Randolph Hearst had risen from the grave to begin publishing in Portuguese.\n\nFrom conspiratorial accusations surrounding UDN's involvement in the botched coup d'etat in 1951, to trifling and ableist mockery of Jaino Quadros' notorious 'wall eye', any lawyer worth their salt could look at such information and easily compile a case for slander and libel. The trial was quick and the arrest almost immediate, a book shut as quickly as it was opened.\n\nIt would not stay that way...\n\nShockingly and unceremoniously, the journalist in question was released from incarceration with very little official explanation from the authorities. Officially, the judge had 'reconsidered' jail time for sentencing and allowed the reporter to go free on probation...\n\n... Unofficially, it speaks to the influence now held by the PSP in the legal system and God knows where else; A nation already plagued with corruption now sees even minor bad faith actors protected by the system of political patronage and backroom deals."
brazil_adhemar_endgame_survival.46.a: "Speak no evil, see no evil, hear no evil."

brazil_adhemar_endgame_survival.47.t: "Nothing New"
brazil_adhemar_endgame_survival.47.desc: ""-keep in mind, of course, Lacerda's preferentialism for the OFN is well-known." one talk show said, a button on the television remote was clicked.\n\n"Magalhães' commitment goes only as far as the UDN pocket book can carry him. This-" another click and another voice took their place.\n\n"-over the past week, where verbal attacks mounted by the PSP at the UDN have only ratcheted up as election season nears. With the term of President de Barros nearing its conclusion-"\n\n"Caralio...!" Raphael Magalhães had to stop himself from slamming the television remote as he set it down. There had not been a break in the PSP propaganda machine for quite some time, de Barros seeming just as baneful as ever, even in spite of his recent health scare. One would think to heed the voice of God in their elder years, but maybe de Barros felt himself a God for the way he acted towards his peers.\n\n"I guess age hasn't slowed him down one bit." Carlos Lacerda leaned on Magalhães desk, his voice and expression halfway between mutual enmity and mutual respect for de Barros' attack campaign. "Sometimes an old dog doesn't need new tricks." He turned to Magalhães. "UDN is going to need a response ready."\n\n"Campaign season is starting early, joy." Magalhães drilled his finger into his temple. "I'm hoping I can count on you then, Senior? I'll be doing what I can." Lacerda nodded. "Saúde." Magalhães shook Lacerda's hand, who smiled sympathetically as he took his leave. Magalhães turned the television back on, just in time to see Adhemar's withered old face plastered on it yet again."
brazil_adhemar_endgame_survival.47.a: "De Barros certainly had the talent for making a man paranoid of aging."

brazil_adhemar_endgame_survival.48.t: "Princely Treasure Chamber"
brazil_adhemar_endgame_survival.48.desc: "Vargas Filho returned home exhausted, the glare of the setting sun almost blinding him as he left the car. He had practically nodded off on the drive back home, forcing his chauffeur and aide to take turns waking him up if things came up. At long last he was back in Morumbi after another tiring day of campaigning.\n\nWalking into the Palácio dos Bandeirantes, his home since he was elected governor, Vargas Filho looked to either side before re-entering. Once certain that no one untrustworthy was around, he dismissed his aide and chauffeur to the dinner table, where he would eat with them and his family once he had freshened up.\n\nGoing upstairs into his residence proper, Vargas Filho patted his pockets. In one of his pants pockets, there was a thick envelope of cruzeiros in sufficient quantities to make him seem to be limping. In each of his other pockets there was yet another thick envelope of cash, joined (depending on the pocket) by several property deeds, no small number of stocks, some easy-to-carry jewelry, and other assorted ill-gotten gains.\n\nHe turned around a few corners before finding his way to a newly-renovated but undistinguished room. Inside there was a desk, some books Vargas Filho had no intention of reading, some papers he would never read, a chair in which he might sit once in a while, and a box of unused pencils which he grabbed if needed in a pinch.\n\nThere was also a portrait of Vargas Filho's father—and when the Retrato do Velho was reverently pushed aside, there was a safe, the very same safe that the communists had been driven away from. Sighing in relief, Vargas took the money, property deeds, stocks, jewelry, and other products and shoved them into the safe, locking it firmly."
brazil_adhemar_endgame_survival.48.a: "The master's enduring teaching."

brazil_adhemar_endgame_survival.49.t: "That's My Boy"
brazil_adhemar_endgame_survival.49.desc: "For a while, Vargas Jr. allowed the people to shout — to yell, roar, and clap. He basked in it as much as he did in the golden light of the stage. Gripping the podium, he opened his mouth to speak, only for it to stop and descend into a wry smile once the crowd began shouting his name even louder.\n\nAlright. Enough was enough.\n\n"I am surprised we've gone this far without anyone throwing something at me." Raising his hand, the crowd quieted down — just barely. "Come on. We've all heard the stories." Turning to the side, he rested an elbow against the podium, gazing at the giddy audience. "The deals. The favors. The hands shaken in the backrooms."\n\nLowering his head, Vargas shook it. "Well, I'm sorry to say that the life of a politician isn't nearly as exciting. I don't get to go to cool meetings with gangsters or secret cabals." He formed his hand into a fist, drumming it against the wooden surface. "No. I mostly just — let's see. Build roads. Keep Brazil powered. Grow the economy. You know. The boring stuff."\n\nFrom the side of the stage, Adhemar tapped his hands together in rhythm with the man like a conductor of an orchestra. He had taught that boy well. Vargas Jr. knew how to play the crowd. And as the applause swelled again, Adhemar allowed himself the faintest of smiles."
brazil_adhemar_endgame_survival.49.a: "His legacy was in good hands."

brazil_adhemar_endgame_survival.50.t: "The Presidential Legacy Fund Act"
brazil_adhemar_endgame_survival.50.desc: "The bill being voted on today was, on the whole and in a strictly financial sense, relatively unimportant. But it had been identified as playing a large part in defining Adhemar's 'legacy,' such as it was, and therefore had every eye upon it.\n\nThe Presidential Legacy Fund, so named in the Act being voted upon, would be a small financial purse available to any past President for indeterminate purposes - but intentioned to be used in creating some physical reminder of their time in office. The clear intended recipient, however and regardless of the language used, was Adhemar himself, and he had already made public his intention to use it to fund a future presidential library in São Paulo.\n\nIntending to couple it with his already existing charity for healthcare, it was clear to the members of the Senate taking their positions that morning that the project was one entirely of vanity. But it was also, to those more acute, a wedge - providing an unrestricted fund to the executive, both now and future - and worthy of close scrutiny and deep district. Adhemar had, after all, earned little else.\n\nBut there were larger issues to consider, and it was quite a minor sum overall. Easy to overlook. Either on its own merits - or on the very considerable merits of a quietly delivered envelope."
brazil_adhemar_endgame_survival.50.a: "A vote on popularity?"

brazil_adhemar_endgame_survival.51.t: "A Silver Screen for an Elder Statesmen"
brazil_adhemar_endgame_survival.51.desc: "As the storied career of Adhemar de Barros Filho appeared to be in autumn, a most curious parting present for one of Brazil's most complicated leaders has been prepared; like with similarly controversial leaders, the medium of cinema has been utilized to offer a more human, charitable prism with which to view both the politics and personal life of a nation's leadership the world over. With his health in decline and his sentiments over his policies so contested, a biographical piece seemed like a welcome diversion.\n\n'Adhemar the Myth', as it reads in the advertisements, is by no means a typical movie documenting the life of a political figure. Adopted from a screenplay and currently in pre-production, the movie seems to be taking a counter-intuitively comedic approach to the life of Brazil's as-of-yet still sitting President. Stepping from the shadows of the Vargas dictatorship into the cavalcade of chaos of the post-Vargas politics of Brazil.\n\nSome might argue a satirical depiction of Adhemar showcases a lack of respect for his contributions to Brazilian society, others argue that the dubious popularity of some of his policies makes a more light-hearted depiction necessary. While rumors persist about what kinds of 'contextual commentary' resides therein, the film-makers are insistent that the project is conceived as 'absent of judgement' of Adhemar's leadership decisions during an extraordinary time. It might seem venal at first glance, but the film is still designed to play well into the President's reputation as one of Brazil's most esteemed leaders."
brazil_adhemar_endgame_survival.51.a: "A puff piece with a good chuckle or two?...That has merit to it!"

brazil_adhemar_endgame_survival.52.t: "The Presidential Pension and Pardon Act"
brazil_adhemar_endgame_survival.52.desc: "Even to those functionaries who had been staffing the Senate chambers for the entirety of Adhemar's administration, the atmosphere the morning of the vote was frantic.\n\nThe measure up for voting, the Presidential Pension and Pardon Act, had drawn outrage across the spectrum, even from many otherwise considered in alignment with Adhemar. The first part of it, increasing the pensions attributed to past presidents, was not particularly controversial. They had not been increased in some time, and though Adhemar himself would immediately benefit, it would not be overly so. No, that was not the problem.\n\nThe problem was the second part - the application of a retroactive blanket pardon to those same presidents. Including Adhemar.\n\nTo say this had been explosive would have been an understatement. What unknown crimes, in unknown amounts, and of unknown severity, were being wiped away with the stroke of a pen? What would come out in years future, only to be 'resolved' with a shrug of legal impotence?\n\nThe vote was rapidly approaching, and the volume level of the voices through the closed doors had been consistently rising. How would it end? The functionaries waited to learn, not even placing friendly wagers between themselves."
brazil_adhemar_endgame_survival.52.a: "The stakes were too high."

brazil_adhemar_endgame_survival.53.t: "A Man and His Party"
brazil_adhemar_endgame_survival.53.desc: ""Saúde, Dom de Barros."\n\nSuch a tiny thing, that little affirmation from Laudo Natel. He'd heard some version of the same refrain so many times and from so many people, yet now it rang differently somehow. When Adhemar de Barros shook Natel's hand, the earlier conversion seemed almost microscopic. For the rest of the day, he strode through the Planalto like a giant. In his mind's eye, he pictured the stony gaze of Cristo Redentor in far-flung Rio, realizing with stark brevity that the two of them were at the same heights.\n\nThe question thundered through him, breathing a small measure of life back into his weary bones. Who was Adhemar de Barros? In five years, the PSP had become the power bloc in Brasília's political machine from which the nation's future would be molded to adjust. With Vargas Jr. set to take the reins in short order, the future of Brazil was assured, in the hands of young and capable leadership to carry on the legacy of de Barros for generations to come.\n\nFor the first time since the stroke, Adhemar pushed through the doors of the Planalto with little effort, the slightest spring back in his step. The warm summer breeze bristled his bushy white hair, and, in an instant, he felt young again. The brinksman from São Paulo had a few tricks left up his sleeve.\n\nde Barros had no illusions of divinity, comparisons to the statue notwithstanding. But as he looked out on the river beyond, this artery connecting the nation he and his party had worked so tirelessly to build, a different revelation came upon him. Christ would always be the savior of all Brazilians, yet it was the nation of Brazil that found her redeemer in Adhemar de Barros; God's most humble servant to South America's most pious peoples."
brazil_adhemar_endgame_survival.53.a: ""My Father, into your hands, I commend my spirit. My nation, into your hands, I command my body.""

brazil_adhemar_endgame_survival.54.t: "Eleventh Hour and Fifty-Nine Seconds"
brazil_adhemar_endgame_survival.54.desc: "Adhemar de Barros struggled to hide his self-doubt as he slowly walked from his office in the Alvorada Palace to the podium set up outside its front door. "Is this really the best I can turn out for my last speech before the election?"\n\nEven as he began to speak, the doubts roiled his mind. So many little details he always used to keep track of: his appearance, the speaking environment—all these were fleeing from his control. His weakened mental state after that damned stroke was making it all the harder to keep track of anything.\n\nAdhemar distracted himself by looking around. So many had turned out to see him off. Loyalists and party cadres, "fans" and admirers, friends—and more importantly, Laudo, Vargas Filho, and Adhemar's own family. Taking inspiration from them, he said one last thing:\n\n"People of Brazil! You see how things have played out. You see how our Social Progressive revolution has been brought to fruition. Does anyone truly dare to deny, then, ladies and gentlemen, that I delivered more than I stole?"\n\nThe crowd went mad with applause and laughter. Laudo smirked and shook his head. Amidst the noise, Laudo shouted in Vargas Filho's ears: Adhemar could read his lips. "Quite an act you've got to follow on, eh, Getulinho?"\n\nAdhemar huffed in laughter as he approached his entourage. Even this late in the day, the old man still had it."
brazil_adhemar_endgame_survival.54.a: ""Damn straight he does, Laudo. Damn straight...""

brazil_adhemar_endgame_survival.55.t: "Sands in an Hourglass"
brazil_adhemar_endgame_survival.55.desc: "The Alvorada offered a kind of reprieve that few places could match, a bustling commuter town that was just far enough south of Porto Alegre to not be wholly urban, but just close enough to not be wholly suburban either. Small, but densely inhabited. Residential, but not gentile. For the longest time, Adhemar de Barros Filho looked at this neighborhood as a great place to get away to, a quiet little enclave tucked away in Rio Grande do Sul.\n\nTherefore, the reason it felt different clearly came from something else. As he sat on a bench along Avenida Vargas, the crowd of people flowed around him like a rock in a stream; businessmen, cyclists, mothers with their children and delivery men with their packages. They floated past him, in front and behind. If it might have been an overwhelming blur to the senses once upon a time, it struck him with strange sensations for it to be the opposite now.\n\nAlmost every single detail of every single passerby seemed to jump out at him, like an orchestra he had heard a dozen times over; from a cacophony of sound, now reduced to humans behind them. The raspy cough of the delivery worker, the high-pitched squeak of a child's laughter, the deep sigh of a business man on the move. Adhemar could hear it all, in grave detail. Maybe he was thinking too much, yet then again...\n\nIt was often said that those who had lost their sight or hearing often found their other senses adjusting to compensate; the blind, deaf and mute, all examples of the adaptability of men, even amidst a tragic loss. This begged the question... What did Adhemar lose?\n\nMany times now, Adhemar felt the deep suspicion that he was being constantly watched. Not by his personal security agents, but by something more ominous. Be it a face in the crowd or a figure in a distant window, he could see something; a pale-skinned figure in dark clothing, something shiny and sharp clutched in his hand. Was this punishment? A message from God? A second sight with which to see his own mortality, compensating for a part of himself he'd forsaken in the pursuit of power?"
brazil_adhemar_endgame_survival.55.a: "Adhemar de Barros Filho ran his hand down his half-frozen face and felt nothing, a chill went through him."

brazil_adhemar_endgame_survival.56.t: "Ficar Aquém"
brazil_adhemar_endgame_survival.56.desc: "In Adhemar de Barros' office, the air was solemn and still. A faint moonlight trickled from whatever openings could be found across the shuttered windows, dimmed hazily yet intermittently by passing cloud cover. In his chair, Adhemar's grip upon his glass tightened. Then, a swig. He swallowed hard, wincing out a groan. "Goddamn you," he spat out, the searing rum sliding down his throat. Of course, he could only be referring to himself in this regard; he had spent much of the night mournfully reflecting on the failures of his foreign policy, the ultimate stain that will forever sully his legacy as a statesman and as a patriot.\n\nHis eyes fell upon the bottle of gin upon his desk. He swiveled his chair away from it with another groan, swatting away the urge to take it up any further. His successor—God, let it be the boy—will have much to answer for in his losses abroad. The Brazilian Armed Forces stands at but a fraction of the Argentinian military, woefully ill-equipped and undertrained for a potential confrontation. Geographically, Brazil remains isolated across the continent, having lost many of her allies to the schemings of Buenos Aires. Perhaps worst of all, however, is Brazil's sullied quality of life. Argentinians enjoy many of the trappings of a prosperous nation, yet Adhemar's own countrymen remain shackled by poverty, economic instability, and lack of upward mobility.\n\nWhat Adhemar has wrought upon Brazil's international standing is more than an embarrassment; it is a dishonor that will be felt for generations to come. Countless scholars and analysts of the future will look back on these past six years with forlorn shame and loathing, their fingers squarely pointed at the head of Adhemar himself for having overseen their precipitous fall from grace. For Adhemar himself, it was a fitting punishment. He had always wanted to be remembered, but not like this."
brazil_adhemar_endgame_survival.56.a: "Not like this."

brazil_adhemar_endgame_survival.57.t: "Nothing but the Second Best"
brazil_adhemar_endgame_survival.57.desc: "Close of office, pack away anything a journalist might see through the window, the usual. That would be all, except a front-page story caught Adhemar's eye. It was some diplomatic palaver between Chile and Argentina, notably, not between Chile and Brazil.\n\nAdhemar wasn't obsessed with the thoughts of war between Argentina and Brazil, but the thought that they were losing the hearts and minds of Latin America was a regret for him. To think of all the lucrative trade deals that will never be, what a pain. It could have been done too, if he cared a bit more about giving the army a little more muscle or doing some more outreach.\n\nFor today, however, Brazil was the loser. But tomorrow was a whole new day. Vargas Jr. still had a chance to assert Brazil over South America, give the people a big show of strength over Buenos Aires. They'd love that, even if his own performance may come to bite his successor in the polls.\n\nStill, Adhemar was happy enough with his performance. It wasn't like he could become President again anyway, so for his first time, it was pretty good. His successor would refine his missteps in due time."
brazil_adhemar_endgame_survival.57.a: "Better luck the second time around."

brazil_adhemar_endgame_survival.58.t: "Hourglass (For Vargas Jr.)"
brazil_adhemar_endgame_survival.58.desc: "The two men of the hour, Adhemar and Vargas Jr., took to the stage to cheers from the party faithful and their family and friends. Normally, Adhemar would spend these occasions talking about more local matters, bread and butter issues easy to score points on. Today, sparked by some whim, his speech took a more internationalist tone.\n\n"When I entered office, the Cold War was getting very hot, even at home with Bolivia and Paraguay. The Argentines seemed intent on challenging us every step of the way, parading about their military like they got new shoes, and waving that Sun of May rag about like it was going out of fashion." Scattered laughs came from the crowd; Vargas Jr. smiled sheepishly beside him.\n\n"We took their military, and we matched them. Our boys in green can fight them any day of the week, staring them down on the borders. As for the Itamaraty, we have got connections across the continent, allies to keep Buenos Aires firmly in check." Applause came from the crowd, but something felt missing, lacking a little enthusiasm.\n\n"We have done great things, and my successor will do even greater things. I ask you all to campaign for him these next few weeks like he were your own son. Now, I'll let the man himself speak for a change. Thank you!" The claps followed him offstage as he thought for a moment.\n\nThere was no denying Brazil was the triumphant of the two powers in Latin America, but it wasn't like Argentina had just bowed out of the Cold War. He had built a good stage for Vargas Jr. to work from, but it was just a stage, and it could just as easily fall apart if he was careless. But he had given the boy time, time to perfect what he had done."
brazil_adhemar_endgame_survival.58.a: "A small lead, but a lead nonetheless."

brazil_adhemar_endgame_survival.59.t: "Dominion and Dormition"
brazil_adhemar_endgame_survival.59.desc: ""Are you ready?"\n\n"Born ready."\n\nStreamers fired off as President Adhemar and future President Vargas Jr. entered the stage to a crowd gushing over them like they were rockstars. People of all stripes were at the event, from diehard PSP loyalists, to new converts of the cause. Adhemar played a rhythm on the microphone so he could get a word in.\n\n"My, my, what a beautiful crowd we have here tonight." Hometown signs proclaiming their love for Adhemar could be seen in the distance. "Seeing all of you here tonight makes me proud, proud that I did my all to keep Brazil strong, to keep those Argentine gorillas in their cage." More cheers went out with backup from Vargas Jr.\n\n"When we got into this office, they were at our throats, but where are they now? We have got the strongest military in Latin America, more than enough to stomp theirs into the dirt if they try their tricks." Stomps reverberated onto the stage from the audience, a few soldiers even saluted Adhemar in earnest admiration. "Nobody will even talk to them anymore; they are alone."\n\n"As for all of you... you all look well-fed, happy, and warm. If I'd be so bold to say, I don't think you've ever had this it so good." More cheers, a mother screams for Adhemar to sign her baby. "As for Buenos Aires, I hear they are having to burn their flags just to stay warm at night. Hell, I bet [ARG.GetLeader] is even going to choose to stay in his embassy here for the holidays."\n\n"Now, I must hand the stage over to the only man who can keep these good times going, you all know and love him: Vargas Jr." Adhemar stepped into the background as he let his successor speak. They loved him. He'd go down in history as the man who made Brazil king, one of the greats, just like Vargas."
brazil_adhemar_endgame_survival.59.a: ""Maybe, my followers could be called Varguist-Adhemarists...""

brazil_adhemar_endgame_laudo.1.t: "The Morning After"
brazil_adhemar_endgame_laudo.1.desc: "Reflexively, Laudo Natel crossed himself as the name of Adhemar—dead only a few days ago, and buried with his family in Piracicaba—made its way to his thoughts again.\n\nSome of the things that had come to his attention over the past few days were simply mind-boggling. Yes, Adhemar was the greatest political mastermind in post-Estado Novo Brazilian history, but by what logic had he chosen to maintain close relations with Hitlerite officials? What was the point? Only Adhemar could answer that, and only God Himself knew what that answer was.\n\nLaudo shook his head violently. A hard task awaited him; it was time he set about doing it.\n\n"What ministers do I want Aleixo to appoint? For minister of war Garrastazu Médici will have to do. Adhemar liked him well; it'll keep things safe while we handle our end of matters, secure the country against these German scoundrels. Speaking of that, our foreign minister—it'll have to be Vasco Leitão da Cunha or else the Americans won't take us seriously."\n\nThen Laudo's eyes turned to a dossier of ministerial candidates left there by an aide. At the top was a file marked 'Antônio Delfim Netto'.\n\nLaudo had known Delfim Netto in São Paulo. A skilled economist, Delfim Netto's doctrine was cutting inflation and public debt while maintaining high economic growth. Confirming that choice, he nodded.\n\n"We have what we need then.""
brazil_adhemar_endgame_laudo.1.a: ""Let's be about it.""

brazil_adhemar_endgame_laudo.2.t: "Esteemed Regional Chiefs of the PSP!"
brazil_adhemar_endgame_laudo.2.desc: "In the aftermath of the demise of our President, Adhemar Pereira de Barros—may he rest in peace—the elevated and correct rule of our Social Progressive Party is now threatened by would-be Udenist and Petebist usurpation.\n\nFurthermore, though I have no doubts about your personal loyalty as regional chiefs of the Party, almost certainly the death of Adhemar has awoken any amount of disloyalty within our leadership and membership. If we do not deal with our party's lack of leadership quickly, everything that we worked for cannot but be brought to nothing.\n\nWe require unity. The late President's directions were always clear—-our esteemed fellow PSP leader, the son of the Father of the Poor, Getúlio Vargas Junior, must receive all our support as Adhemar's chosen successor. He must be elected by acclamation, or else dangerous schisms tear our Party apart. Therefore, I, Laudo Natel, petition you for your support for my motion to appoint Senhor Vargas as Chairman and forego the usual leadership election.\n\nFurthermore, please be informed that emergency funds have been sent to assist you in this current, unfortunate situation. Never forget that the administration of this Republic remains in the hands of the PSP—only with well-oiled party structures will we be able to assure the continuation of our elevated and correct governance into the next decade.\n\nWith my best wishes for the success of the General Conference of our Party, and in anticipation of your understanding, please accept, Sirs, the assurances of my highest consideration."
brazil_adhemar_endgame_laudo.2.a: "Signed: Laudo Natel"

brazil_adhemar_endgame_laudo.3.t: "Aleixo's New Cabinet"
brazil_adhemar_endgame_laudo.3.desc: "Pedro Aleixo sat down in his office in the Palácio do Planalto. There was much to think through.\n\nHe was to be officially inaugurated in a week and had to make a choice. The UDN wanted to use his relatively liberal-conservative position as a pretext to seize control, whereas the Varguists wanted a government of national unity. That latter suggestion was appealing to the new President, and he thought to tell his next appointment, Laudo Natel, that.\n\nBut Laudo Natel's opinion was different: "The Social Progressive Party is of the view that the new cabinet should be fully pro-PSP and that I should be appointed a senior minister without portfolio to ensure matters continue to run surely." At that, the interim President's eyes boggled.\n\n"S-surely a national unity cabinet is a sound way of going about things."\n\nNatel shook his head. "The people gave President Adhemar de Barros the mandate in 1965, and the PSP is sworn to continue his policy until the term ends. We will not support nor comply with any other cabinet."\n\n"I-I understand. But can I not at least give half the cabinet posts to other parties?"\n\n"Senhor President, if you did that it would fly in the face of democratic principles and give the supporters of the PSP occasion to serve the nation in a similar way to how they did in the Constitutional Revolution."\n\nThere was a menacing glint in Natel's eyes. Aleixo, his face now gelid, nodded choppily."
brazil_adhemar_endgame_laudo.3.a: ""I-I understand. Go ahead, then.""

brazil_adhemar_endgame_laudo.4.t: "The Technocrat's Dream"
brazil_adhemar_endgame_laudo.4.desc: ""DECREE OF THE MINISTER OF EDUCATION" read the header of the document on Epitácio's desk, brought there by his reliable secretary. Opening the directive for his department with interest, Epitácio felt an increasing sense of joy and eagerness as he read more and more of it.\n\n"You are to implement a new model of bureaucracy in your department. Test all of your employees on whether or not they meet a strict interpretation of the requirements of their job placements. Hierarchy is to be strictly enforced—"\n\nEpitácio had enough to be happy. "Do I need to read the rest? I mean, I have what I need—agh, hold off, just read all of it to be sure it's really saying what you want it to say." So he did that, and felt even better when he knew it was real.\n\nSwigging from a bottle of cachaça, he began to think of what was to come. "Finally! I can stop dealing with all these good-for-nothing idlers. We can actually oversee teachers for once—set an efficient, effective curriculum, teach the children for once in our lives. We can go about doing what the taxpayer pays us to do."\n\nThe first people were fired the next day. A week later, Epitácio swore in the first PhD-holding employees of the department as new computers were wheeled into his offices."
brazil_adhemar_endgame_laudo.4.a: "For the first time in a long time, Epitácio developed a habit of feeling hope."

brazil_adhemar_endgame_laudo.5.t: "The Technocrat's Nightmare"
brazil_adhemar_endgame_laudo.5.desc: ""DECREE OF THE MINISTER OF EDUCATION" read the header of the document on Epitácio's desk, brought there by his reliable secretary. Opening the directive for his department with interest, Epitácio felt deepening disgust the more he read it.\n\n"You are to ensure that all your subordinates vote for the Partido Social Progressista in upcoming elections. Use additional holidays as a carrot, but if necessary warn them that they will be specially supervised by cameras and guards in their voting booths."\n\nEpitácio put his head in his hands. "This is bullshit, but it'll work one time." Calling for his secretary, he told her to summon the department's employees for a meeting.\n\nIt didn't go over well. One of the employees, well-known and well-loved in the department, began to shout, "This is voter intimidation! Anti-democratic! I won't tolerate it!" and resigned before Epitácio could fire him. As their former coworker left in a high dudgeon, the others cursed and muttered, but began to sign commitments in accordance with the Ministry directive.\n\nSighing bitterly, Epitácio signed his own commitment."
brazil_adhemar_endgame_laudo.5.a: ""Don't forget: if any of this is leaked, I'll have to start firing you randomly.""

brazil_adhemar_endgame_laudo.6.t: "The Way Forward?"
brazil_adhemar_endgame_laudo.6.desc: "A wide smile crossed the face of Antônio Delfim Netto as he spoke to his old friend. "Mr. Minister—I beg your pardon, Laudo—we have done something good today. I could not be happier that you took my advice and saw to the destruction of these accursed megaprojects. We told Lott and the others that these things would just bankrupt the country, and no-one but you listened, Laudo. Your decision has stopped the disaster; late, yes, but better late than never."\n\nNatel jokingly sketched a bow. "I did what I had to do, Antônio; no need to praise me. I was told you had something else for me to chew on other than plaudits, though...?"\n\nAt that, Delfim Netto breathed deeply and pulled out a set of dossiers.\n\n"Well, Laudo, with the megaproject mania ended, we have two major options ahead of us. Either we can decentralise our economy by privatising some of Petrobras' refineries, or we can engage in some tax reform to create a small economic boom. But no matter what we choose, Laudo, we've got no choice but to cut tariffs for the Americans. It'll encourage foreign investment; it'll prove to the OFN at large that we aren't interested in palling up with Nazis anymore."\n\nThat last part made Natel grimace. "Alas that Adhemar put us in this problem," he thought. Not verbalising his bitterness, and instead squelching his displeasure, he nodded. "Yes, thank you, Antônio. I'll think about it. We surely need to work to be a strong competitor internationally."\n\nDelfim Netto nodded approvingly."
brazil_adhemar_endgame_laudo.6.a: ""Thank you, Laudo.""

brazil_adhemar_endgame_laudo.7.t: "Diary—[GetDateStringNoHourLong]"
brazil_adhemar_endgame_laudo.7.desc: "The following is an entry from the diary of Hugo (last name withheld), formerly the owner of a small toy manufacturer in Guanabara.\n\n"There's nothing else to do about it, is there? We're going to have to shut our operations down, we and so many others. It was a great run, while it lasted, but really there was no real hope of it succeeding any longer.\n\nThe government cut tariffs for the Americans; I'm told it was because of some kind of political screw-up that old man Adhemar committed that they had to do that to appease them. Now cheap, gimcrack American products are flooding the department stores; great for the average family, since they don't really have to pay less, but disastrous for us.\n\nIf shops are full of these garbage American toys, made by punch-clock good-for-nothings in some factory up in that frigid hellhole, who is going to buy expensive speciality wares anymore? Toys like the figurines we used to make, of the Smoking Snakes, of Vargas or of D. Pedro II or of Deodoro da Fonseca. There's nothing more for not just me but many of my rivals to do anymore. We're all going to go bankrupt together.\n\nI can't really do much about it, but at least it wasn't really my fault. As for my workers, God love them, I should pack an allowance for them in an envelope, with the last of our extra funds. Then I'll throw a great party tomorrow, so these men (my friends, really) can at least quit their jobs in a good atmosphere and reminisce about the time that we spent together.""
brazil_adhemar_endgame_laudo.7.a: ""But I still wish it didn't have to end this way.""

brazil_adhemar_endgame_laudo.8.t: "Zum Tode betrübt"
brazil_adhemar_endgame_laudo.8.desc: ""Shit, shit, shit!" was a common refrain in the embassy of the Greater Germanic Reich of the German Nation in the Republic of Brazil, these days. "Burn all those damn papers! We can't let the Brazilians get hold of them!" was also heard every few hours. Meanwhile tomatoes and harder objects were audibly striking the embassy at all hours of the day.\n\nQuestions about the situation would meet with the same enraged reaction from Ambassador Kirk. "Why the fuck are we panicking?! Go look outside! We've got to evacuate tomorrow!"\n\nMost of them would shudder and get back to work, but there was one unfortunate fool that pressed the question further. At that Kirk dropped a glass on the ground and started to rage. "'Why'? What do you think? Outside those mongrels are attacking the embassy, the police aren't doing a damn thing, and all we've gotten from Itamaraty is an official note suggesting a 'temporary vacation'! Can't you see, you dullard, that all our hopes for Pakt influence in Brazil are dead thanks to that Jew-lover Lacerda? We don't get out and someone will kill us!"\n\nThereafter there was not much to say but to send gifts and letters to the few remaining Germanophiles, such as Eurico Gaspar Dutra and Filinto Müller, in a forlorn hope that they might someday turn the tide despite their lack of political significance. That done, they left the embassy when the crowds seemed to have died down. His hands shuddering, Kirk personally unscrewed the diplomatic plates from the facade and walls as the German staff boarded their buses.\n\nThe buses made it to the airport without incident—"
brazil_adhemar_endgame_laudo.8.a: "—except for the angry civilians that recognised them and pelted them with stones as they left."

brazil_adhemar_endgame_laudo.9.t: "The Journey North"
brazil_adhemar_endgame_laudo.9.desc: "Vasco Leitão da Cunha sat outside the office of the individual American shorthand referred to as 'SecState', lost in thought. "God, I'm worried about this meeting. There's always something troubling about things like this. At least things are far easier with Adhemar gone; Brazil finally made a prudent foreign policy decision for once, even if it came at the cost of chaos at home."\n\nSuddenly, the foreign minister's reverie was disrupted by a door opening.\n\nThe secretary to the Secretary of State welcomed said Secretary's Brazilian opposite number into the secretarial office of the State Department. Unlike what Leitão da Cunha imagined meetings during his predecessor's tenure had been, this meeting was pleasant. After the usual pleasantries, Leitão da Cunha got down to brass tacks.\n\n"See here, we wish to integrate Brazil more fully into the Organization of Free Nations and succeed where our predecessors failed. But we need your assistance to do so."\n\nThe Secretary of State drew forward in interest. "Oh? What's that?" Leitão da Cunha rubbed the back of his neck, somewhat embarrassed.\n\n"The Republic of Brazil asks for the United States' discretion in permitting a delayed repayment of the interest on the loans Brazil owes the OFN countries."\n\nA brief pause, then an approving nod. "That sounds suitable. Yes, I think we can arrange that."\n\nAt that the foreign minister of Brazil leaned back into his chair, finally able to relax. "You will not believe how much relief this brings me, Secretary."\n\nLater on, this success would be used as proof positive of the loyal and friendly feelings the OFN held towards Brazil."
brazil_adhemar_endgame_laudo.9.a: "For a saner foreign policy."

brazil_adhemar_endgame_laudo.10.t: "The Son's Enthronement"
brazil_adhemar_endgame_laudo.10.desc: "As was the case with virtually any conference in São Paulo, the place was alive with activity, and people noticed if a dignitary was late. Laudo Natel was seeing that in real time. Amidst the churn of activity, of shouted and spoken greetings, there were many faces and voices he recognised. There was Benedito Manhães Barreto, who he ignored with a grimace. Then there was old João Cafe Filho, who questioned him: "Why're you late, Mr. Natel?"\n\nWith a brief reply—"Eish, I'd have showed up faster if I could, sir, but I was stuck for a day in Brasília mediating between our party leaders in Goiás"—backed up by the leader of the PSP in Goiânia rubbing his neck awkwardly next to him, Natel moved on, seeing Amaury Kruel somewhere in the crowd near Filinto Müller, still influential after the folly of the spy affair.\n\nAnd near the front, there stood Romeu de Campos Vergal, the "Brizola of the PSP" also aiming for the vice-presidential post. Nodding cautiously to him, Natel sat down heavily. "God, I'm tired," he thought. "All this acting as the de-facto President of Brazil, it's hard work; getting Aleixo and the government to heel is not an experience I want to repeat. At least the hard part is over; the elections will tell whether this house of cards I've built is as appealing as Adhemar's was—"\n\nSuddenly, there was loud applause. Vargas Filho had emerged, with his ready smile, to announce the results. "Honourable delegates! With the votes counted, I thank you all for choosing me as your presidential candidate." Loud cheering, a standing ovation. Vargas Filho gestured for calm, which he got after about two minutes. "And it is my great honour to campaign for President with Laudo Natel, who narrowly defeated Romeu de Campos Vergal!" Another ovation. The building seemed to shake.\n\nLaudo merely smiled and sighed in relief as his back ached from how many people were slapping it."
brazil_adhemar_endgame_laudo.10.a: "Perhaps this time he would be Vice-President."

brazil_adhemar_endgame_laudo.11.t: "From the Old, New"
brazil_adhemar_endgame_laudo.11.desc: "The makeshift film studio in the city of Pindamonhangaba had a stream of archivists, PSP cadres, and film workers running in and out of it. Meanwhile, two producers were shouting to each other over the din of film equipment and large, inefficient fans.\n\n"Well, what are we supposed to do for these campaign flicks?"\n\n"There's nothing else for it—we've got to grab pictures of old man Vargas with Adhemar from these old films."\n\n"But if we just show the old man they'll think we're running two dead men for the ticket. Isn't that what those Integralist dullards do?"\n\n"Good point, we'll need to grab some new films as well."\n\nThe film came together after about a week of nonstop work and film-cutting, with numerous gaffes and blunders in the process. Because of that, the workers were actually surprised to be able to say it looked good. But they weren't done; they had to devise a jingle.\n\nKeeping it simple, they went about the same winning methods that had gotten Adhemar and Vargas before him to power: songs talking about "the great son of Vargas, Adhemar's wise heir—the new Father and Friend of the Poor, Getúlio!" eight or more different ways.\n\nLaudo Natel had been passing by on business when the jingle was added to the film; giving the finished product his approval, he personally delivered the film to the PSP headquarters. The obliging folks there promptly transmitted it everywhere, from TV Globo on down, causing a massive increase in Pessepista popularity."
brazil_adhemar_endgame_laudo.11.a: "The two producers, meanwhile, slept in for three days."

brazil_adhemar_endgame_laudo.12.t: "He's Making a List"
brazil_adhemar_endgame_laudo.12.desc: "A pen scribbled on paper as Natel flipped through lists sent to him by the regional chiefs of the PSP. On those lists were all the men—and a few women—that could be swayed to assure the victory of the ruling party in the coming elections.\n\n"The São Paulo list is ready. Good thing the state treasury is in good condition. But now—" Natel picked up the phone and dialed Antônio Delfim Netto's number. "Antônio? You there?"\n\nThe familiar voice was faintly heard over a crackling line. Laudo made a mental note to talk to Júnior about fixing telephone services. "Yes, I am, Laudo. What's the situation?"\n\n"I'm going to need you to get your trusted people in the mints, and when the time comes, get ready to print a lot of money."\n\nDelfim Netto's alarm was audible. "But Laudo, what about inflation? We print all that money and it'll be another stop towards a crisis!"\n\nA grimace crossed Natel's face. "I expected you'd say that. Can't say as I fault you, I'd have said the same thing in your position. But we just don't have any choice. We need to win and we need to win now, or else the PSP is done for. Forever."\n\nDelfim Netto sighed. "I understand. Fine, I'll see it done. But you'd better have a solution for this later."\n\n"Thanks for your understanding, Antônio. I'll try." Gently putting the phone down, Laudo had only one thought in his mind:"
brazil_adhemar_endgame_laudo.12.a: ""If we lose after this, it's a prison cell for me.""

brazil_adhemar_endgame_laudo.13.t: "Durhua"
brazil_adhemar_endgame_laudo.13.desc: "...I've done everything I could, haven't I.\n\nNow there's two paths ahead of me.\n\nThere's a good one. The PSP will win, Vargas Filho will be in charge, there'll be a proper cabinet and I'll be Vice-President over it. Adhemar's legacy and Vargas' legacy will become one. The work will go on—the stealing and the delivering.\n\nThen there's the bad one. The PSP loses. I shudder to think of anything more than that I'll need a damn good lawyer, probably ten of them. "Laudo Natel Corruption Case" will be Lacerda's most profitable newspaper headline in a decade, possibly ever.\n\n...Maybe I should work on campaigning instead.\n\n...\n\nAch! God damn it, I can't think of anything important. Best I take a sip of beer.\n\nHas it really been so long? It feels like yesterday I met Adhemar at a party, my long studies in economics only recently over, and he swept me after him to become his vice-governor. And Adhemar, for all his flaws, his stupidity of drawing close to Nazis, he was nothing if not loyal to me.\n\nI flubbed the vice-presidency a half-decade ago, and what did Adhemar do? He didn't throw me out, he made me his chief of staff. What response could I possibly make to that kindness other than loyalty? I did my duty to him—supervise the corrupt schemes, kept the government running, ensuring that "stealing but delivering" was the reality and not just a show.\n\nAnd now the poor bastard's gone. God rest his soul. All that's left for me to do is to hope that this little regency—Aleixo's presidency, or more accurately mine—has been successful. God, I just hope Júnior pulls it off."
brazil_adhemar_endgame_laudo.13.a: "The clock ticks."

brazil_adhemar_endgame_laudo.14.t: "An Heir Enthroned"
brazil_adhemar_endgame_laudo.14.desc: "Movers ran back and forth in the front hall of the house Niemeyer built for the President of Brazil. It was still some time before the inauguration, but Aleixo had decided he liked his own house better and invited Vargas Filho in ahead of time.\n\nJúnior looked around and coloured himself impressed with his new home for the next five years. "Niemeyer sure knows his stuff," he said to Natel. For all Júnior could tell, Natel's face seemed to have been carrying the same expression of relief no matter his actual feelings since the election was called for the PSP. "Not like it matters whether his face is happy or curdled, he's a technocrat and he's loyal—and that is all I really need."\n\nThe new President's thoughts turned to his term. "My two mentors are dead, may they rest in peace. Natel is loyal; I need not worry about him. I've never felt freer in my life now that I can start enacting my plans. I'll leave a better legacy than my father did, I'll build above and beyond what he did for the country."\n\nLooking at the state finances, he grimaced somewhat, but shook off his worry. "It doesn't matter if our treasury isn't doing well. I'm the President, I won, and I won't give up my powers. The PSP is loyal to me—and their fealty has opened up a new path for Brazil. One full of innovation, of new technologies—one in which Brazil becomes what all those before me failed to make of it!"\n\nGetúlio Sarmanho Vargas, dit Vargas Filho and Júnior, let his mind ascend into a stratosphere of imagination, dreaming of the new golden age he was to build.\n\n"And when, not if, it's done, I will have but one thing to say.""
brazil_adhemar_endgame_laudo.14.a: ""O Dom Pedro, I have surpassed thee!""

brazil_adhemar_endgame_laudo.15.t: "Amendments to the Labor Law Reform Act"
brazil_adhemar_endgame_laudo.15.desc: "Now that the labor reform bill has been formally submitted to the National Congress, the vultures have already begun to turn their heads. PTB deputies have already expressed concern about the proposal, skeptical of its intent, perhaps out of a myopic belief that we as a party are only capable of working for ourselves, not for the country. The UDN, predictably, has largely rejected it outright.\n\nHowever, an amendment was introduced by a UDN deputy to make it easier to fire workers in the private sector, which in their eyes would "free the market" and bring new dynamism to the economy. At the same time, the PTB has submitted its own bill, which strengthens our bill with additional protections for workers and a mandatory one-month notice period.\n\nSo there's a choice: appeal to the UDN or the PTB amendment, or stay the course."
brazil_adhemar_endgame_laudo.15.a: "Adopt the UDN amendment."
brazil_adhemar_endgame_laudo.15.b: "Adopt the PTB amendment."
brazil_adhemar_endgame_laudo.15.c: "Ignore them, we have no need to cave in to anyone."

brazil_adhemar_endgame_laudo.16.t: "Amendments to the National Standardization of Wages Indexation Act"
brazil_adhemar_endgame_laudo.16.desc: "Our proposal has received some rather unjustified criticism from the left of the Congress, from the moment it was introduced. The PSD and PTB deputies have already vowed not to vote for it, and the UDN is not about to hand us victory on a silver platter.\n\nIn exchange for tighter wage controls in the public and private sectors, UDN members have promised to vote with our party on the bill, and are likely the only other party we will get to support the bill. However, the possibility of killing the bill is still open, as an index of our candidates' sometimes questionable salaries may not necessarily benefit their prospects in the upcoming election. That being said, is it worth voting for the UDN's amendment, or should we leave it at that?"
brazil_adhemar_endgame_laudo.16.a: "Adopt the UDN amendment."
brazil_adhemar_endgame_laudo.16.b: "Why would we throw our own party under the bus? Ignore the amendment."

brazil_adhemar_endgame_laudo.17.t: "The Fourth Estate"
brazil_adhemar_endgame_laudo.17.desc: ""Labor Law Reform Act survives Senate!" The headline covered much of 'A Folha da Manhã's' front page. It continued, "Despite the many obstacles faced by the Act, in no part thanks to UDN saboteurs, the PSP's prized reform has passed the legislature. It now goes to the President himself to be signed and put into law. Brazilian workers are sure to enjoy the new protections against fire and rehire. Not to mention the generous payouts that will-"\n\nMarcão blinked and looked away. Why did they always use a thousand words when ten would suffice? With a sigh, he turned his attention to the other paper on the stand. Maybe they'd be more concise. 'A Tribuna Diária' began, "PSP forces through Labor Law Reform Act!" Marcão flipped over the page. The ever-familiar Carlos Lacerda began, writing that "Through a mixture of bribery, backroom deals, and badgering, the PSP has signed the Labor Law Reform Act into law. A piece of legislation which, in effect, will protect the PSP's stranglehold on Brazilian Democracy. The President, lacking the moral conviction to oppose the act, has said that he will not veto the law. With acts like these, how much more can-"\n\nTHUMP. The cashier's eyes, previously focused on his cigarette lighter, darted up to Marcão. He was huffing, glaring angrily at the two papers now lying on the ground. Vitriol coated his words as he spat out "All journalists are the fucking same" and, to emphasise his point, literally spat at the papers. As Marcão stomped off, the cashier picked up the two papers, finding them stuck together with saliva."
brazil_adhemar_endgame_laudo.17.a: "Bound together by hatred."

brazil_adhemar_endgame_laudo.18.t: "The Black Marketplace of Ideas"
brazil_adhemar_endgame_laudo.18.desc: ""Senate sabotages Labor Law Reform Act!" It appeared that 'A Folha da Manhã' didn't like the recent outcome of the Senate's vote. The newspaper continued, "The PTB has betrayed workers, having failed to vote in favor of the new labor reforms. This, alongside the UDN, resulted in the Labor Law Reform Act being voted down. One can only wonder why the law failed, suggesting that deeper factors are behind it all. Such a disastrous outcome will-"\n\nMarcão rolled his eyes. He hadn't been paying much attention to the law's journey through the legislature, but he felt like they could've been a bit more concise about the whole thing. His eyes shifted to 'A Tribuna Diária' and its own headline, "Senate stands up to PSP in shocking display!" The accompanying article, written by Carlos Lacerda, took up much of the second page. "In a rare show of genuine opposition to the corruption and cronyism of the PSP, the Senate, led by the UDN, managed to beat back the radical Reform Act. Hoping to consolidate PSP control over our national institutions, its defeat clearly shows that Brazilian democracy is not dead. Looking forward, one can-"\n\nTHUMP. The cashier's eyes, previously focused on his cigarette lighter, darted up to Marcão. With a sneer he put 'A Tribuna Diária' under his arm. He mumbled "idiots" down at 'A Folha da Manhã', still sitting on the newspaper stand. Paying for the paper, he walked off towards his work. Lacerda, and all the journalists, might have been lying, cheating bastards."
brazil_adhemar_endgame_laudo.18.a: "But they weren't the incompetents of the PSP."

brazil_adhemar_endgame_laudo.19.t: "Coffee and Politics"
brazil_adhemar_endgame_laudo.19.desc: "The smoke of the breakroom was suffocating. Hidden just a few meters away from the plant's machinery, it wasn't spacious. Nevertheless, with everywhere else occupied, it's where João and his coworkers huddled for their break. He looked up from his coffee to Bru and Luís' conversation about the recent wage law.\n\n"Ah but y'know Bru-" the spindly Luís began, his cigarette precariously bouncing up and down, "10%'s nice, but 10% isn't enough! I mean Camila's got another kid on the way. I'm not saying we go on strike but..." his words trailed off. Bru adjusted his small circle glasses. They looked comical compared to the well-toned man. He calmly stated, "Lower inflation pays for your kids, Luís. It means you aren't paying thousands for bread or millions for school tuition." Luís opened his mouth, but Bru quickly interrupted,"Look, a 10% increase is still an increase. And it's only happening 'cause it's linked to inflation," he tapped the headline announcing the law, "There-"\n\nAnother worker spoke up, "They're planning on doing this after the election, least that's what Gus said." Luís gestured at the man, looking at Bru, "See? It's sneaky shit, man." he leaned back in his chair before nodding to João,"Hey, old timer, what about you, what do you think?". The gathered workers all turned their attention to him. He sipped his coffee before stating, simply, "Bru's right, but if they try and fight us, we'll fight back. Just like we fought Gomes." The steelworkers nodded in agreement, Bru among them."
brazil_adhemar_endgame_laudo.19.a: "We beat them once, we'd beat them again."

brazil_adhemar_endgame_laudo.20.t: "The Battle Lost"
brazil_adhemar_endgame_laudo.20.desc: "The chair beneath Natel groaned slightly as he leaned back. Regardless of its importance, the bill had failed. Government wages would remain separate from inflation. Wage inflation would continue. The President would continue to ignore the reality of the situation, or worse blame the PSP, and, as a result, total inflation would continue to rise. The suburbanites and middle classes would revolt against the PSP, collapsing one of their key voter bases and, more likely than not, they'd switch to the UDN. Turning the PSP and Vargas Jr. and everyone else under their banner into political history.\n\nNatel sighed, rubbing his eyelids. This was bad. Incredibly bad. But it wasn't unsalvageable. He picked up his coat and walked out of the side office. He could get that little weasel in A Folha da Manhã to print some anti-UDN pages, throw some funding or money over to those Santos brothers in Rio to write some articles decrying Lacerda, maybe pull some favors with Francisco to get some international coverage on the UDN's nastier dealings. It wasn't ideal, but it was something, and so long as Natel could, he'd keep fighting the UDN with that something."
brazil_adhemar_endgame_laudo.20.a: "Until the very end."

brazil_adhemar_endgame_edna.1.t: "Problematic Friends"
brazil_adhemar_endgame_edna.1.desc: "Edna sipped her coffee, combing through her agenda for the day. A meeting with some stooges from the PSP that were selling out to save their own skins, a phone call, then it would be off to Rio for a tour around the city. Idly wondering where she would be stopping off during the tour, she opened the folder and scanned the page. It seemed perfectly normal, until she saw a set of words that made her heart stop.\n\nShe would be stopping at Anne Frank Secondary School.\n\nThe secondary school that Lacerda and the UDN opened in that poor girl's honor was one of the stops in her tour across the city. Seeing that name sharply reminded Edna that as she was sitting there, money from the same regime that caused her death was flowing into Brazil, all thanks to Adhemar.\n\nShe scowled at the thought of the man. The money was going to good causes, but it was soaked in so much blood. Her father had fought the Nazis during the war. He had always told her that it had been the right thing to do, and this was true, objectively. And yet co-operation with them made Brazil more economically independent by its own merit.\n\nLooking down at the paper, Edna sighed. It would be hard going to that school without knowing that they were entirely shunning the Germans, but that was politics for you. She scribbled down a note to make a point of diversifying export emphasis to Latin America, and far away from Germany. She would spend the rest of the time focusing internally and the Foreign Minister could handle the rest."
brazil_adhemar_endgame_edna.1.a: "At least that could help her sleep easier at night."

brazil_adhemar_endgame_edna.2.t: "Sacrifice for Sacrifice"
brazil_adhemar_endgame_edna.2.desc: "Nighttime in São Borja was always a great opportunity to take a stroll and engage in meaningful conversations with the friends you cherish. The PSP would support Edna as the presidential candidate in exchange for the PTB in the governor elections and a few ministerial positions. Edna and Vargas Jr. walked together, talking about the election, the relationship between PTB and PSP, and their former President Getúlio Vargas, who had passed away two years ago.\n\nAh, Vargas. To Edna, he was the leader, the autocratic charmer, the great progressive reformer. He did so much for women in this country, although there were also many shortcomings with him. He gave them a chance to stand up, fought for their rights and even said no to all those men who still wanted to limit women in all fields.\n\nBut to his son, his father had betrayed him. Lima, Goulart, Neves - he selected a lot of successors, but never him, even when Vargas Jr. always believed in his father's policies. Adhemar was the one who led him into the political arena, not his father. He told Vargas Jr. that corruption can make the impossible possible and the unacceptable accepted. Progressivism can only be combined with populism to make sense.\n\n"I still remember what he said. 'Sometimes winning is knowing to wait.' How profound it is." Edna looked into the distance. City lights were shining, as the future and hope of Brazil awaited the realization of their work.\n\n"I prefer 'Stealing and Delivering' actually. " Vargas Jr. didn't agree with his friend. "Our league is based on our shared goals. PSP will support you in going to Palácio do Planalto.""
brazil_adhemar_endgame_edna.2.a: "The PSP will not have a candidate in the 1970 election."

brazil_adhemar_endgame_edna.3.t: "A Presidential Address"
brazil_adhemar_endgame_edna.3.desc: "Looking through the history of Brazil, masculinists, or machists, have consistently utilized their conservative ideology and practices to oppose women. Looking back, none of the governments had successfully ended systematic oppression of women. Of course Vargas did lots of work to reverse the situation, but today, things will change completely. She would for the first time in her Presidency speak to the Chamber of Deputies and the senate to convince them to side with the PTB's new bill.\n\nAfter taking a few deep breaths, Edna walked onto the podium.\n\n"Mr. Speaker, honorable senators, ladies and gentlemen."\n\n"There is a tragic fact that since we founded this country, our female fellow citizens have suffered from the pressure of male chauvinism for a long time. Half of the laborers in Brazil are facing injustice like employment discrimination, the denial of the right to inherit wealth, electoral unfairness and so on until Vargas' progressive legislation provided an opportunity for our female citizens to assert themselves. "\n\nHow great it would be if Vargas didn't ban women's football, Edna murmured in her heart. Thanks to those damned machists.\n\n"But now, we women can finally stand up and fight for our own rights. We needn't be ashamed of our gender."\n\n"Equality isn't just a good word on paper. It's right that everyone can enjoy. As a women, I would like to express our collective needs to all of you honorable senators."\n\n"Women need equal rights to obtain medical services, education and opportunity to work with the same salary as male workers for performing the same work. Women need equal rights to legally inherit the wealth left by their elder generation and keep it as their private property."\n\n"Women will show their might to those who try to stop our progressive movement and will overcome all the obstacles in their way. We should be ashamed that half of the citizens in this country are unable to obtain the same legal status as the other half. My esteemed colleagues, I kindly request your support in voting for my proposal to repay our debt to our female voters.""
brazil_adhemar_endgame_edna.3.a: "Only the Integralists voted against it."

brazil_adhemar_endgame_edna.4.t: "Spinners and Losers"
brazil_adhemar_endgame_edna.4.desc: "The Presidential Palace was the perfect place to unwind after a hectic and exhausting few weeks of government affairs. Edna, Tancredo, Brizola, Kubitschek, Jango, Lott and all of their allies had come to the former President's Palace to celebrate the passage of a bill on infrastructure in Goiás, but also to relax. Wine, beef, fresh fruits, all of those relaxation satisfied the politicians' desire. Edna's children also came to enjoy the event. Her son got a special pass from the army.Brizola had gotten a little drunk. "That PSP idiot's victory was the result of his bribery. He became the President and scattered money throughout the country, resulting in national paralysis."\n\nJango finished off his grilled chicken and replied, "Can you imagine PTB or PSD losing face like that? Such a terrible failure would be enough to prevent us from returning for twenty years!""Don't you think that Adhemar's economic policy had many benefits for the country?" JK said. "Did he finish even one important project during his presidency?" Edna quickly replied with a firm no causing everyone gathered to laughTopics changed throughout the night, from Adhemar, to Vargas Jr., to Lacerda's latest ramblings and then to Quadros's drunken speech at the university of Brasília about Pan Africanism. Eventually it settled on the Russian warlords.\n\nHenrique Lott stated "The Russians. An honorable people, even under communism. Fighting against Germany for forty years. Let's have a drink for them." The old marshal raised his glass, while the leaders of Brazil finished their wine. "I believe that one day, Brazil will have its chance to win out on the world stage and stand on equal footing with all other countries."\n\nThe party ended up in an impassioned discussion about the future of Russia and Brazil. The servants left to do some cleaning, while the intoxicated politicanswere taken home by their drivers.\n\n"It's so nice to have a fascinating conversation with friends like that." After finishing all of the mopping up, a frazzled Edna said to herself as everyone else left."
brazil_adhemar_endgame_edna.4.a: "Keeping a friend in politics is important..."
brazil_adhemar_endgame_edna.4.b: "...but PTB has friends better than PSD."

brazil_adhemar_endgame_edna.5.t: "Paradise Regained"
brazil_adhemar_endgame_edna.5.desc: "The Amazon was a hard place for civilization, but the natives had mastered it. The Natives cut down trees, burned the land and spread seeds on their soil. It was a tradition that they had carried on from generation to generation. However in recent years it had suffered mass deforestation from timber companies, and the SPI had done nothing to stop them.\n\nTherefore, they escaped from their home and moved to a new place to continue their traditional agriculture. However their new home was harsher, competition with other tribes over resources was quickly proving to be a problem.\n\nSuddenly, shouting came from outside their settlement. Is it the outsiders coming back to cut the forest again? Many felt afraid. The painful memories from the past had resurfaced. But this time, things were different. A loud shouting voice was being heard by everyone.\n\n"Friends!" What really shocked them was that those words were spoken in their language. "Times have changed! Now, our forest will not be cut by the government, and we are now a part of the National Park River Xingu! We can go back to our home!"\n\nIs that true? The Natives were shocked by their words. But things wouldn't be worse anymore. They then returned to their village. What really surprised them is that not only their tribe, but also most of the other tribes who had lived here, were coming back and trying to renew their lives in the forest. The man who was shouting turned out to be a member of a neighboring tribe.\n\nThe tribe's elder offered his hand. Two hands clasped tightly together."
brazil_adhemar_endgame_edna.5.a: "Times have changed."

brazil_adhemar_endgame_edna.6.t: "Right Man, Right Way"
brazil_adhemar_endgame_edna.6.desc: "In a small village in Mato Grosso, Arnoldo Alencar, a PTB street activist, was canvassing with his colleagues for the coming election. It was not going well and he didn't like to come to such a remote place. Apolitical villagers and the moist weather deeply troubled him.\n\n"Citizens!" He raised his voice again. "What is really important and crucial is that we choose the right leader who will guide our country and all of us in the right direction."\n\nThis was pointless, they didn't care about what he was saying at all. he could tell that their village hadn't changed for years. In fact, the voter turnout in this area was actually quite low. Discussing the UDN and their unpopular reforms? No effect. They didn't live for wages. Most of them came here and listened to their speech for fun, most of them couldn't even vote.\n\nIt was as he was a thousand miles away a man in the crowd began shouting "Every politician is trying to steal something from us, but land reform, voting rights. They might steal from us but he might make his best effort to do something for us." The Crowd cheered when the man spoke, drowing out Arnoldo."
brazil_adhemar_endgame_edna.6.a: "That was what made Arnoldo finish his job."

brazil_adhemar_endgame_edna.7.t: "Drinks at the Planalto"
brazil_adhemar_endgame_edna.7.desc: "Palácio do Planalto was a good place for the President to have a talk with those who were important to the party, the nation and the President herself. So, she invited Wainer to come here to have a drink and make a deal regarding his news.\n\n"You know what will happen if Lacerda wins the election. Disaster!" Edna said, pouring another glass of wine. "I know, I know," said Wainer, "PTB is the correct choice and Lacerda is cheating everyone, isn't it? I fully understand your requirement but we don't have enough money to do the work. Printing is expensive, as are paper and editors' wages." "Of course we will pay your bill... I am just worried about the price." Edna promised, with little hesitation.\n\n"Good. So let's talk about your strategy." Wainer took his notes from his briefcase. "UDN can't decrease inflation, while most voters don't like the silly and crazy party of Quadros actually and we can address the issue of PSP by highlighting their corruption. PSD... attack those oligarchs behind them if necessary." He winked at Edna with a purposeful smile. "Then emphasize the role of PTB as a progressive protector of social order, the heir of Vargas's legacy and the PTB's commitment to an independent foreign policy. Oh by the way, do we need to depend on the support from constitutionalists?"\n\n"We'd better not. I don't want to take the risk of involving the army in politics or angering those officers." Edna shook her head. "But I'm really curious about why you hate Lacerda so much? Do you have any conflicts with him?"\n\n"Indeed we have. You know I am a Jewish immigrant from Russia and I had to keep it a secret if I wanted to own my newspaper. But Lacerda exposed it to the public, humiliating me and making those damned Integralists show up at my house. I've wanted revenge on that crow ever since. By sharing stories with communities populated by immigrants, I can help you a lot. I believe you will accept my deal. Don't you?"\n\n"Of course if it will be useful to me." Edna took his win-win deal."
brazil_adhemar_endgame_edna.7.a: ""Now let's write our story.""

brazil_adhemar_endgame_edna.8.t: "Amendments to the Agrarian Reform Act"
brazil_adhemar_endgame_edna.8.desc: "Edna Lott and Leonel Brizola sat in their seats during the recess, watching the floor of the Federal Senate. It was going well, Edna thought - her loyalists had put the Agrarian Reform Act in a good light, and redistribution seemed to be agreeable, if not appealing, at least entertaining to the senators. In the midst of a conversation about what to do next, Tancredo Neves rushed toward them, seemingly intent on disrupting their plans.\n\n"Things are not quite right, my friends," he huffed, as if to make light of the situation. "Members of your own party and mine are going to kill your bill, no matter what I think of it or what I say to them. Some are already calling for 'putting on the brakes,' so to speak."\n\n"Put on the brakes?" sputtered Brizola. "Damn it, Tancredo, have you even been outside a city in the last decade? You can't weaken something like this, you'd be betraying the farmer who kept this country on its..."\n\n"I understand... where you're coming from, Leonel, but you need to start thinking clearly. If you remember, we're from different parties, and I wouldn't be telling you this if I was trying to sabotage you. I just think we need to compromise with some of the senators and cool down the atmosphere. That's all."\n\nEdna gave Neves a similar look as he spoke, but her eyes fell back on the Senate floor, watching the senators come out from under the gallery. She couldn't afford to lose like this, not now, not today. "We'll think about it, Mr. Neves," she said with a thin smile. Finally, she decided..."
brazil_adhemar_endgame_edna.8.a: "...to allow for compromise with the rebel PSP and PSD senators."
brazil_adhemar_endgame_edna.8.b: "...not to give them an inch, ignoring the amendment."

brazil_adhemar_endgame_edna.9.t: "A Lott Done, More to Do"
brazil_adhemar_endgame_edna.9.desc: ""We are outside the National Congress now, and results of the vote are now emerging..." The news anchor paused momentarily as whispers descended his ear's canal; the only hint as to which way the vote turned were the twitches of his facial muscles. "...yes, we have the results of the Agrarian Reform bill for the ladies and gentlemen at home. I can safely say that the bill has..."\n\n"...passed."\n\nIf any of the viewers at home missed that last word, the ear-shattering cheers of the farmers beside the anchor affirmed the President's victory today.\n\n"The people here are ecstatic, men and women who have fought to end this longstanding inequality." He paused for a moment. "We will take you over to President Lott now, who has a speech."\n\nThe camera eye switched to Edna Lott, standing proudly behind a podium, prepared to milk this opportunity for all it was worth. "Thank you all for being here. My father had a mission. He wanted to give back to the people who toil in our fields, who feed our nation, and who work in backbreaking conditions on land they may not even own. Today, we took another step to end this."\n\n"I am not foolhardy enough to think we have just ended this problem in one fell swoop, but with this bill, progress will come in leaps and bounds rather than at the march of cattle." Some laughed, perceiving the statement as a reference to Adhemar. "Rest assured, we will continue my father's mission alongside that of the PTB, and if you want to help us..."\n\n"...elect another Lott as your President! Thank you!" The crowd cheered "Edna! Edna! Edna" as she left the stage before the camera's eye blinked back to the news anchor and other joyful masses outside the National Congress."
brazil_adhemar_endgame_edna.9.a: ""With victories like this, Edna is destined to stay as Brazil's President""

brazil_adhemar_endgame_edna.10.t: "Fallow"
brazil_adhemar_endgame_edna.10.desc: ""We are outside the National Congress now and results of the vote are now emerging..." The news anchor paused momentarily as whispers descended his ear's canal; the only hint as to which way the vote turned were the twitches of his facial muscles. "...yes, we have the results of the Agrarian Reform bill for the ladies and gentlemen at home. I can safely say that the bill has..."\n\n"...failed."\n\nA somber silence followed from the surrounding crowd. Elsewhere in Brasília, the mourning for the bill's death would go noisily into the night, without somber, but with fiery ire. Their anger was felt as they were denied their fair share once again, but this wrath was not just directed at the usual subjects who had oppressed them, but at the President who failed to deliver.\n\n"I am receiving word that Magalhães Pinto of the UDN is hosting a speech regarding the bill's failure to pass. We will take you over to it now." The camera blinked, and there was Pinto, relishing in front of the crowd as if he had rehearsed for this moment.\n\n"Is it really a surprise to hear the results of today's results? Maybe her old man could do it, but not his daughter." The word "daughter" was especially pronounced, but Pinto would spell out the dog-whistle anyway. "We need a leader to guide Brazil, not someone depriving a husband of a nice warm meal. The PTB clearly can't provide that, but if you want someone who can..."\n\n"...vote UDN in the upcoming elections; for a man able to lead Brazil." The crowd clapped along to his words as he departed from the stage shortly before the camera's eye did, returning to the familiar sight of one news anchor and one increasingly furious crowd."
brazil_adhemar_endgame_edna.10.a: ""That was brutal. I don't know how Edna is going to come back from this...""

brazil_adhemar_endgame_edna.11.t: "Amendments to the Voting Rights Act"
brazil_adhemar_endgame_edna.11.desc: "The UDN, as always, could not resist the urge to water down a bill until it dissolved into a pile of mush. This time, they wanted to turn the Voting Rights Act - the entire point of which was to give a voice to the disenfranchised illiterate - into one with an ability to understand numbers and letters. Many illiterates, of course, had not seen text for most of their lives.\n\nBrizola was one of the first to raise his concerns as he caught the President in the corridors of the Senado. "Look, Madam President, it's a scare tactic. They want you to chicken out of a sensible proposal and convince you they matter. But I promise you it is pure posture and shenanigans. Millions of Brazilians are counting on you, don't let them down for these idiots."\n\nEven still, she was apprehensive about being so resolute. Without the UDN, who was to say they couldn't find a way to tank the proposal just as they had found a way to weaken it? Edna was very aware of how her coalition partner felt, passionately a crusader for the poor and against the right for his whole career. She was now on his side in this debate. There was thus an abundance of reasons not to even give their amendment thought.\n\nWhatever their intentions, if they were to make her doubt herself, they sure as hell had worked. But at the end of the day she was still a leader with a responsibility to choose."
brazil_adhemar_endgame_edna.11.a: "Oblige the UDN, accept the amendment."
brazil_adhemar_endgame_edna.11.b: "We are not their puppets, refuse their proposal."

brazil_adhemar_endgame_edna.12.t: "The Edge of Power"
brazil_adhemar_endgame_edna.12.desc: "Tancredo Neves left the Senate chambers amid applause. The adulation was not for him; he was a mere bystander as the Federal Senate voted in favor of passing the Voting Rights Act. He had put plenty of work in behind the scenes, but now it was his time to make a swift exit and let the media carry the news. A palpable energy coursed through the National Congress building; a majority of it was excitement, but the losing minority held onto their private anger uncaptured by the flashing cameras.\n\n"Neves, it's good to see you." Leonel Brizola approached Tancredo along with the cool evening air outside the grand building. The two men shared a firm smile and a firmer handshake. Brizola had traveled north for the vote and this meeting. "Congratulations. Those bastards who stood against progress have failed. All your hard work was worth it."\n\n"Many people deserve congratulations from my side, you included," Neves replied, guiding the other man to a stand by one of many tall white pillars so they could speak undisturbed. "Really, it's Edna we should be giving our thanks to. She's been doing good work; honestly, I'm surprised by her effectiveness."\n\nThe two men stood at the edge of power and watched as the victory parade and pit party took their turns exiting the building. Brizola pointed to a man in a dark suit quickly shuffling past the crowds. "Look, there goes Lacerda. He's probably been burning his tongue off whispering his little schemes to anybody who would listen. Fat lot of good that did him though." Brizola laughed to himself as Neves gave him an approving nod.\n\n"Another failure for Lacerda. At this rate, the alliance will definitely defeat the PSP and UDN." Neves spotted a pair of reports waving him down with flapping arms. "We should talk more over dinner. I don't wish to be pestered, and I'm not talking about the mosquitos.""
brazil_adhemar_endgame_edna.12.a: "In a true democracy nobody is ever far from the edge of power."

brazil_adhemar_endgame_edna.13.t: "Up By a Piece"
brazil_adhemar_endgame_edna.13.desc: "Carlos Lacerda appeared outwardly to nod grimly as the gavel banged down. The speaker read out the vote count and proclaimed that the bill had failed to achieve the requisite votes. Inside, he held a smile - he had won a small victory. His lobbying efforts were successful, and Edna appeared to be a hapless, ineffective President.\n\nAs Lacerda left the observers' gallery, he saw Neves and Brizola off to the side, barely able to contain their frustration. They spoke quietly, but their gestures were sharp, and Lacerda imagined that they were bemoaning their dismal performance and scrambling to come up with a solution between now and election day. Their nerves were fraying, their faces twisted into sour frowns, and as they saw Lacerda, they turned their shoulders so he couldn't see their faces; icing on the cake for Lacerda. It was a strong showing, but it was not nearly enough - it wouldn't be until the UDN won the next election.\n\nIt was a pity, the voting reforms were by and large a good idea, but Edna Lott couldn't be the one to take credit for them. She'd take the advantage and use it to happily lead Brazil to economic ruin. All of those people she had empowered with voting reform would be beggared by poverty and inflation. For the good of the nation, Edna's plans had to fail. One good idea could not be used as an excuse for a thousand bad ones.\n\nAs Lacerda stepped out of the building, he slid his hat on his head and greeted the sun. He had a slight smile of satisfaction as he watched as the reporters crowd the PTB delegates, asking them about the failure of their latest bill. The news of that failure would be disseminated to the masses, and they'd look for a new savior to advance their interests. And that savior would be Lacerda, and the UDN."
brazil_adhemar_endgame_edna.13.a: "All's fair in love and politics."

brazil_adhemar_endgame_edna.14.t: "The Last Embers"
brazil_adhemar_endgame_edna.14.desc: "What did Brazil mean to Edna Lott? What did it mean to be Brazilian? The issue of Japanese immigration was one of the burning embers of the war. But in the embers of conflict lies the fuel that could ignite the torch of freedom. As she made her way down to the Senado's rostrum, she began to speak. To fight for the four hundred thousand souls still burning in the embers and darkness of oppression.\n\n"Senators, it has been more than two decades since the law I propose to repeal was passed. We still live with the memory of the flames that so consumed the world. We lived with the losses, with the pain of defeat. In our pain, we passed a law, and so the legacy of that pain continues to smolder. The embers of that pain continue to hurt and scar our nation to this day. What does it mean to be Brazilian? To be born here? To contribute to our society? To help build a better Brazil? Go to Liberdade and see how Nikkei contribute greatly to our nation. Brazil is a better place because of them. They have earned the right to shine the torch of freedom. They do not deserve the pain we continue to inflict on them.\n\n"It is my hope that with the support of all of you here today, from the UDN to the PTB, we can overcome the legacy of pain and create a new beginning. Help us create a new Brazil where we can truly say that we are all treated equally. And remember, if we do not take action to shine the torch of freedom on our Nikkei, then perhaps the embers will catch as desperate souls seeking light create their own, and a fire may burn through this country that I hold so dear. Thank you and I hope for your support.\n\nShe left the podium to applause from parts of the UDN, PTB, and PSB, but the PSP was conspicuously silent."
brazil_adhemar_endgame_edna.14.a: "The light of liberty hangs in the balance."
BRA_rescind_japanese_ban_brazil_tt: "$BRA_EDNA_REPEAL_OF_JAPANESE_IMMIGRATION_BAN$ will be put to vote in the Senado.\n\n§YIf passed:§!"

brazil_adhemar_endgame_edna.15.t: "The Sun Rises Over Liberdade"
brazil_adhemar_endgame_edna.15.desc: "The São Paulo Shimbun offices were usually a hub of activity, a constant buzz of comings and goings in common with every workday. Today however the desks were silent, save for one. There was a radio sat alone and around it the employees were huddled. There was only one neighborhood in one city in all of Brazil with any Japanese newspapers. As the vote passed there was a cheer. It leaked out from the office, spilling out into the streets. Dreaming a dream that one day there might not be just two newspapers, not just one neighborhood any longer.\n\nIn another office across the sea the phones rang. In just one of the many papers in Japan, editors stood over employees. The Sankei Shimbun was busy as always. A junior journalist tasked with writing an international column pondered the empty space. He looked through the newspaper cuttings on his desk, one from the São Paulo Shimbun announcing the repeal of the ban on Japanese immigration. He cracked his fingers and got to work. "From the Kusato Maru to today the opportunities that brought thousands of us remain as large as ever..."\n\nAcross yet another sea there is another whistle, another shift, and another pair of tired eyes running across the Sankei article, posted in a station in Kōshū. Brazil. Somewhere he could be safe. A promise of safety from it all. He started packing what he had, his heart beating the torch of freedom lit inside him.\n\nAs night falls the Japanese chamber of commerce funneled in for an impromptu meeting. They were huddled around a TV. It was replaying Edna Lott's speech. The light of freedom had all felt like lip service for a forgone conclusion. This wasn't the first time they had been involved in politics. Lobbying the Governor for a time, Adhemar. It was always transactional and always limited. This time as they heard her words, saw her face they saw light. Be it the torch of liberty or the rising sun."
brazil_adhemar_endgame_edna.15.a: "It's light all the same."

brazil_adhemar_endgame_edna.16.t: "The Best Laid Plans"
brazil_adhemar_endgame_edna.16.desc: "Edna Lott reached out and carefully switched off her radio. Despite sitting alone in a well-furnished room high above Brasília, she tried her best to retain her composure. Her hand shook as she heard the news. The immigration ban repeal bill had failed. The words crackled out of the radio like some exotic bird. This wasn't the way it was supposed to go.\n\nPacing around the room with thoughts racing, Edna looked to be, through the lens of a window and light linen curtains, a restless spirit with unfinished business. The PTB and other parties were supposed to be on board with repealing the constitutional amendment. All of the discussions and whipping had shown wide-ranging support. Yet it had failed. Questions raced and circled in her mind like the pacing of her feet. Was this an attack on her personally? Did they want to undercut her even to the cost of the bill, or was it her weakness? What was her role in the results? Had she failed?\n\nEdna stared out of her window to the city below. Brasília was everything that Brazil was supposed to be. A new capital for a new nation. Even from where she stood, she could see the strong hands that guided it not only from the elaborate government buildings where powerful men pulled their levers but also in the very streets. Years ago, these streets were just lines on paper. Planned from the ground up by engineers and architects, here everything and everybody had their assigned place. If Brazil were to match its capital, what would her place be? More pressing, where in the plan do the Nikkei and other inconvenient people fit? After all, real people aren't controlled by blueprints.\n\nIt was not long before the headlamps and streetlights blended as the city's cogs churned onwards. It was only her frozen in time. Edna took a beat for herself and closed the curtain. The city below was only one part of the larger system that failed her. She switched back on the radio and listened to the voice within for any information she could use."
brazil_adhemar_endgame_edna.16.a: "It is people that make Brazil, and it is people that change its laws."

brazil_adhemar.1002.t: "Trouble in Paradise"
brazil_adhemar.1002.desc: "João Goulart had sat down and met with Tancredo Neves and Leonel Brizola many times. The mood for every meeting varied - sometimes it was dour, sometimes it was heated, and sometimes it was simply joyful. And yet, never once had he felt such a profound sense of awkwardness between the two men and himself. There they had sat for about a minute - three old friends, some of whom were direct family, waiting for one to announce that the other would be trying to one-up the other. It was akin to being trapped in a Mexican standoff, waiting for someone to make the first move.\n\nThere had certainly been a shake up in the dynamic of the coalition when Edna had been impeached. She was seemingly the perfect compromise candidate - charismatic, amenable to both sides, and carrying the name of Lott himself to boot. And now, the three old friends were left to pick up the pieces. Neves coughed, electing to break the silence. "So," he began, sipping from his cup of coffee. "We have been in disarray for some months now. It would only make sense for one of us three to become the new head of the coalition."\n\nBoth Goulart and Brizola nodded. "That was why I assumed we were called here, Jango - if I am not mistaken, of course." Brizola said, seemingly becoming very interested in the carpets as he refused to meet either his brother-in-law or Neves' gaze.\n\n"That was certainly the idea of calling you here, Tancredo. But I am afraid it will be between two of us, not three." Their heads snapped up, looking dead at him. A ghost of a grin formed on Goulart's face. "Look, I am past my peak. There is no use debating what could have been done. I say that the coalition needs the spirit one of you two could bring." The two looked at each other with an indeterminable expression. Noticing trouble brewing, Goulart sighed.\n\n"Look, I am aware that you both differ quite heavily politically speaking. Which is why I asked you both here. I wish for you to promise not to let the thirst for power ruin your friendship over this petty contest." Alongside the coalition, he thought. "Are we clear?""
brazil_adhemar.1002.a: "A moment passed before they both nodded, and conversation continued as usual."

brazil_adhemar.1003.t: "Coalition-Building Reforms"
brazil_adhemar.1003.desc: ""So your... 'coalition-building' reforms..." Jair Negrao de Lima rustled freshly-printed papers in an old PSD meeting room, its walls a tapestry of memorabilia.\n\n"Really good! We just have to do the math for federal school funding," Eduardo Catalão jumped in before Jair could begin. Brizola knew "do the math" always meant "cut down", but these three at least entertained his suggestions.\n\n"Y'know, I've been conversing with the others—don't give me that sour face Jair—about similar labor reform ideas. But the scale of these minimum wage increases..." Lázaro Barbosa shook his head as he fiddled with his paisley tie, ignoring Jair next to him.\n\n"I'm talking here! We need to discuss these land reform numbers! Did you pull them out of a hat? I don't care if this is your highball proposal. We are decimating these if we want any hope of convincing the rest of the party, let alone the Senate." Jair tapped on the antique macacaúba table, worn from all the dealings it had witnessed. Brizola had to do something.\n\n"Jair, I thank you for all you do for us, for everything. I know each of you has your comments; nothing is set in stone. But let it be clear." He stood up. "I did not make this plan to be shot down in congress; I made it to win elections, to create a new congress more amenable to us. The people must see us as distinct, as more than our opponents. Compromise gets laws passed, yes, but change gets us elected."\n\nHis voice seemed to linger in the high ceiling of the room, far above the others still reclining in their caramel leather upholstery. Brizola's figure was backlit by the Bay and São Gonçalo in the distance. Out there, it was cloudy.\n\nLázaro chuckled."
brazil_adhemar.1003.a: ""Tancredo's never this full of himself.""
brazil_adhemar.1003.b: ""If you wanted support for your candidacy, you could've just asked.""

brazil_adhemar.1004.t: "The Left-PDC Decides"
brazil_adhemar.1004.desc: ""And look at how they run the PTB! Nothing's changed since I left. Still a one-man show." Fernando Ferrari sipped coffee harvested from the same fields the two of them had helped out in. They were on a special PDC operation to investigate a new grassroots phenomenon: Basic Ecclesial Communities, CEBs for short. Small religious organizations that could potentially be a potent political force.\n\nThe two of them found respite in the shaded patio of a small sunbaked brick eatery, for the harsh São Paulo afternoon dictated that now was the time for all the humble workers to take their rest.\n\n"So what? You're for Neves, now?" Plínio de Arruda Sampaio was in his caipira and botinas, much easier for the party photographer to work with than Ferrari, who was trudging in the mud with a pristine linen shirt and loafers.\n\n"Yeah, maybe I am. You've heard the CEBs! Even out here, people care immensely about politics. Would their voices be heard under a PTB regime? And look around you: has Neves done a bad job so far?" Nearby, a mother accompanies her kids, about eight to ten years old playing across the street to a market, prices a lot tamer than they were before.\n\n"What they care about is agrarian reform! Whatever Neves will give to them will happen at far too slow a rate." Looking closer at the children, one might see the dry red dirt of the encroaching Cerrado through the wilted grass. Behind them, abandoned sheds lie dormant in the sun. And it was a school day.\n\nThen, out of the eatery, an older woman came to pick up their coffee. An idea came to Fernando. "Senhorita, if you had to pick between Leonel Brizola and Tancredo Neves for President, who would you choose?" She thought for a moment."
brazil_adhemar.1004.a: ""After Neves' reforms, my sister's stall is doing so much better.""
brazil_adhemar.1004.b: ""My poor nephew has struggled so much with his farm lately. He'd surely fare better under Brizola.""

brazil_adhemar.1005.t: "The Doctrinal-Laborists Hear Neves Out"
brazil_adhemar.1005.desc: ""Do you think you ever get a say in this party?"\n\nThe bust of Getúlio Vargas, from its marble podium in the PTB headquarters' lobby, cast a watchful gaze at Tancredo Neves. It was always an interesting sight to see the former Finance Minister, and he gathered a few wayward glances from the receptionists and guards.\n\nHowever, what was more surprising was who he was walking with: Lúcio Bittencourt and Sérgio Magalhães. Lúcio was one of the founding members of the PTB who, from the start, had misgivings about the PTB-PSD alliance. And Sérgio was repeatedly at odds with Kubitschek's economic policy. They were not who immediately came to mind as potential wildcards.\n\n"Are you saying we'd get more of a say under your party, Senhor Neves?" Lúcio said as Neves opened the mahogany door to their humble meeting place, a simple room with a table, a window, and a large portrait of Vargas.\n\n"You know we respect specialized expertise."\n\nYou respect big business, bankers, and the status quo." Sérgio's tone invited a raised eyebrow from Lúcio, but Neves expected this.\n\n"We respect democracy, but democracy should be more than shallow appeals to the people. I'm actually here, I can listen to you, I know you have many things you want to say and I have a notepad, a pen, and a few hours to make sure I can hear out all your policy ideas."\n\nNeves sat down, taking off his fedora and unbuttoning his wide lapel suit jacket to take out his note-taking utensils. Wouldn't it be pretty silly to just leave him sitting there alone?"
brazil_adhemar.1005.a: ""Alright, we'll bite," Lúcio said."
brazil_adhemar.1005.b: "The two left the room without a word."

brazil_adhemar.1006.t: "The Governor of Goiás"
brazil_adhemar.1006.desc: ""I'm looking forward to your support, Mauro."\n\n"Nice talking to you, Leonel." As he ended the call, the Governor of Goiás leaned back in his vintage throne of white brocade and laminate to contemplate what was happening. In all the years Mauro had worked with Leonel, their relationship had never felt this tense.\n\nThe coalition he had proudly served for years was tearing at the seams, and if he didn't play his cards right, he could end up on the wrong side of this political predicament. He was dedicated to the PSD, yes, but what would happen if he decided to back Leonel but the rest of his party didn't?\n\nThat said, Neves would probably appease the military far too much. Give them everything they want while the hardliners slowly regain influence. Besides, Leonel was a long-time friend. How could he betray him? Would it not be useful to have someone close to you in the most powerful office of the Planalto?\n\nHowever, what was so wrong with Neves? He was safe. He wouldn't be nearly as domineering. Was it not scary how assertive Leonel and Jango could be within their own party? If Leonel disrespected the wrong people as President, Goiânia could easily be a target with its proximity to Brasília.\n\nAs he was deep in his thoughts, the phone suddenly rang again. "Senhor Borges, Tancredo Neves is on the line. He's asking if you're free?" It was now or never. He had to play kingmaker."
brazil_adhemar.1006.a: ""Yes, please transfer the call. I have much to discuss with him.""
brazil_adhemar.1006.b: ""Please apologize to him for me; I have much to do.""

brazil_adhemar.1007.t: "Letter from the Editor-in-Chief"
brazil_adhemar.1007.desc: ""As the elections approach, the PTB-PSD coalition stands at a crossroads. The retirement of both Senhor João Goulart and Senhora Edna Lott has left the future of Varguism uncertain."\n\nIn a narrow market alley, the crowd smoked, laughed, and played sinuca. Amidst this spirited evening, a modest four-story building stood somewhat out of place. Peek past the blue entrance signs and the delivery truck parked awkwardly on the curb and you would see large printing presses that barely fit into the room in which they sat, silent and asleep.\n\n"Despite the absence of an official successor, we are certain many names are up for the task. At Última Hora, we hope our dear readers do not feel their preferred candidate is somehow inadequate."\n\nTwo suited men squeezed between the machinery, walked up the bare concrete stairs, and lazily took their seats in front of drafting tables and typewriters. It was a rather dreary time of night, and the view outside did not help. Across the street, through the web of utility wires, one could see old Adhemar banners from the previous election, faded and torn but still very much present.\n\n"We recognize the disastrous consequences of a possible split in the party alliance, and our support may risk disunity. However, as distinguished analysts, we have a moral obligation to the people and must support those who can best safeguard their welfare. As editor-in-chief, I knew this man personally and can attest to the strength of his character."\n\nOn the third floor, the highest-ranking reporters quietly sipped coffee around a meeting table, tensely waiting. Then, footsteps echoed from the office above them, and Samuel Wainer descended, flashing them a resigned grin. He held a single document."
brazil_adhemar.1007.a: ""Tancredo Neves will stop at nothing to see Brazil prosper.""
brazil_adhemar.1007.b: ""Leonel Brizola will fight tooth and nail for the interests of the working class.""

brazil_adhemar.1008.t: "An Evening with the FPN"
brazil_adhemar.1008.desc: "In the halls of the Brasília Palácio Hotel, the Frente Parlamentar Nacionalista's conference had ended, but the night was just beginning. Deputies left the polished marble of the Niemeyer Meeting Room and entered the black velvet of the Restaurante Oscar, taking their seats as a woman sang Gal Costa to the keys of a solitary piano.\n\nHow many deputies there were, who's to say? Ninety? A hundred? Most stayed here instead of going home, to negotiate, to network, or to have a few good drinks. Wasn't this how democracy should be? People of all parties, enjoying each other's company and calmly discussing issues?\n\n"So, Brizola or Neves?" Someone just had to say it. As soon as a table said their names, a wave of discussion swept the room. They just couldn't help it; this happened every election. The FPN was a disparate collection of politicians devoted to a loose notion of nationalist developmentalism; past attempts to turn it into an electoral machine always threatened to tear it apart.\n\nBut with the Alvorada exactly a kilometer away from where they sat, and Romeu de Campos Vergal in the corner regaling horror stories about the antics of the Germans, it was hard not to have elections and potentially better presidents on the mind.\n\nMany had fond memories of Brizola's time in the FPN. Leftists saw him as the embodiment of nationalism, resisting foreign allure while the government flirted with foreign investment. But the front wasn't just leftists; plenty from the PSD, and the twelve or so from the UDN, naturally liked Neves. He wouldn't antagonize the businesses the Front was supposed to protect, and maybe he could unite Brazil when Brazil needed unity the most.\n\nAs if on cue, two deputies, a Pessedista and a Petebista, began to raise their voices against each other."
brazil_adhemar.1008.a: ""Brizola would destroy the economy first chance he gets!""
brazil_adhemar.1008.b: ""Brizola is the only one who would defend the Brazilian economy!""

brazil_adhemar.1009.t: "Lá, Lá, Lá!"
brazil_adhemar.1009.desc: "Cameras flashed, politicians spoke, and reporters prepared their questions. It was the day of the conference in which Leonel Brizola was announced as the new candidate of the PTB/PSD coalition. The conference was already energetic, earning smiles from both Neves and Brizola as they walked onto the stage, their presence capturing the attention and applause of the crowd.\n\n"Brothers and sisters of the PSD and PTB! Today is a huge day! Today, our parties— united as one—make a stand against the structural inequalities of our system, the issues that plague our country, and the obstacles to our future! Today we make a stand for progress and reform, a stand for a Brazil people can be proud of. With our allies in the PSD on our side, we shall reach it!"\n\n"All challenges, all turmoil, and all confusion that plagued our parties are now gone! The coalition lives on, and so does the hope of a better Brazil!" The words left his mouth like flames, setting the crowd ablaze with cheers and claps. Brizola stepped to the side, giving the microphone for Tancredo to speak for a moment.\n\n"We have prevailed against challenges that found their way in our path, and thus, we stayed strong in the fight for justice! And with that, we would like to invite our Vice-Presidential candidate, Ulysses Guimarães, to speak here...""
brazil_adhemar.1009.a: "Lá, lá, lá, Brizola!"

brazil_adhemar.1010.t: "Muda Brasil"
brazil_adhemar.1010.desc: "Cameras flashed, politicians spoke, and reporters prepared their questions. It was the day of the conference in which Tancredo Neves was announced as the new candidate of the PTB/PSD coalition. The conference was already energetic, earning smiles from both Neves and Brizola as they walked onto the stage, their presence capturing the attention and applause of the crowd.\n\n"Ladies and gentlemen, today we came to announce the resolution we have been waiting for so long, a decision to stay together and keep our coalition strong and healthy! To fight for a better country together, building a future we can all be proud of. Our coalition not only shall stay together, but it shall also stay true to its ideals of developing our country into the powerhouse it's destined to be. Brazil is the country of the future, and that shall remain true as long as we stay united, like today!"\n\n"The legacy of the great presidents that came before me shall be honored as we carry the torch of progress together, for a brighter future where all can dare to dream!" Like lightning, Neves' optimism for the future energizes the crowd, who began cheering and clapping for the man before them. Neves stepped aside for a moment, allowing Brizola to speak.\n\n"I am truly proud of the Coalition's decision, we must stick together if change and progress are to be brought to the nation, and that is what we have accomplished today! We would like to invite the Vice-Presidential candidate, Ulysses Guimarães, to come address the...""
brazil_adhemar.1010.a: "Tancredo Neves Já!"

brazil_adhemar.1011.t: "Splitting Blood and Water"
brazil_adhemar.1011.desc: ""I don't get it, Tancredo, quite frankly," crackled Brizola's voice through the phone. "Whatever Wainer says, or the congress members, or the governors or the members, the fact remains this: we are united in our cause. We both believe in a fair and free Brazil. We believe in saving this republic from the rightist hijackers and taking back what the elite has taken from their people. So why can't we agree?"\n\nTancredo shook his head, pinched his nose and sighed. "Because it's plainly clear we are not agreeing elsewhere. You want quick and radical reform, the system or what keeps it together be damned. The PSD wants to be rational. Change does not happen just on the streets. It happens with mediation and compromise, not flipping the system. We need developmentalism and we need stability, which if you can't accept, then it was always going to be this way."\n\nBrizola held the receiver away from his face, his nostrils flared. "I understand your position. It brings me great regret to end the decades-long partnership between the PTB and the PSD, but henceforth the PTB will campaign for the upcoming elections on a separate ticket. Good day." And with that, he slammed the telephone into place once more. He glared at it, and lost himself in thought."
brazil_adhemar.1011.a: "Red and blue are near opposites anyway."

brazil_adhemar.10110.t: "Torn in Two"
brazil_adhemar.10110.desc: "Leonel Brizola's face beamed onto the television screen in the morning, speaking in front of an unambiguously red backdrop. In the center of Rio, multitudes of people stood to observe the live feed from outside television shops.\n\n"I have called you all today on short notice, and as my recompense, I am going to make my brief short," he quipped to the floor of correspondents. "The PTB is committed to reform, in making sure Brazil works for its people, not the other way around. To this end, it strives for its economic revitalization and meet the worker and the farmer on the street's needs and concerns, to free them from their domination by the abusive rich in their ivory towers. So this year, I announce that I am running for President, alongside my great friend José Frejat. With his knowledge of our youth and our movement, we will move Brazil forward together."\n\nWithin just a few hours, the same technicolor television screen flushed with marine blue interrupted by a bespectacled man, almost in perfect symmetry to the previous display. "I, Tancredo Neves, of the PSD, pledge to bring our country back onto its feet. Alongside the wonderful Ulysses Guimarães, I pledge to develop our riches, realize our wealth, help grow our cities and cultivate our farms. And I hope, that as your President, that we may all invest in our common future.""
brazil_adhemar.10110.a: "Cut from the same cloth, or made of different fabrics?"

