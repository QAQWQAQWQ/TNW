BRA_adhemar_germans_are_back: "The Germans Are Back!"
BRA_adhemar_germans_are_back_desc: "Isn't it wonderful what the stroke of a pen can accomplish? With only a few scribbles onto a piece of paper, Adhemar de Barros has opened what many believe to be a proverbial Pandora's Box. The Germans are back in Brazil - and they intend on making their presence known.\n\nThe opening of trade relations between the two nations has lead to the rapid increase of the German language in the public spaces and the appearance of German businesses in Brazilian markets - especially in the South.\n\nOf course, whilst the likes of Jânio Quadros and Afonso Arinos hail this turn of events as a victory for an independent and pragmatic foreign policy, many remain unconvinced. Seeing the tongue and commerce of a nation once touted as one of Brazil's greatest enemies appearing on every street corner as if it is normal will be sure to spark at least some degree of pushback. The question is - where?"
BRA_the_eagle_rises: "The Eagle Rises"
BRA_the_eagle_rises_desc: "The recent geopolitical changes have made a once unthinkable scenario a reality - German influence within Brazil is growing like a coming storm on the horizon. What was once a relatively small minority is now an important part of Brazilians society, with new German-Brazilian schools, industries and organizations popping up across the country like mushrooms after a rainstorm.\n\nWith this new geopolitical reality, one can only wonder how other, more marginalised minority groups will react..."
BRA_National_Pharmaceutics: "National Pharmaceutics"
BRA_National_Pharmaceutics_desc: "With the German money flowing in through various different channels (some of which had to be minorly 'persuaded', so to speak), the young and promising pharmaceutical company Aché has become the new base of Brazilian pharmaceutical concern. Thanks to Aché's investments, more German money is sure to pour in alongside it, showing us that the industry has a promising future in Brazil."
BRA_parana_crisis: "The Paraná Crisis"
BRA_parana_crisis_desc: "They say that you reap what you sow - and the time has come for us to reap.\n\nOur efforts to reproach Nazi Germany have brought a plague of discontent amongst the South of the country, with the complicated mosaic of minorities in the South collapsing into a fit of rage. Protests, strikes, and secret assassination attempts are now commonplace in the South, with local army garrisons struggling to bring peace to the fraught situation. Unless action is taken soon, the South will fall into anarchy."
BRA_calmed_south: "Calmed South"
BRA_calmed_south_desc: "The combined efforts of the government and law enforcement to crack down on the worst of the violence have proven successful, but the anger in the South still poses a very real danger. While the protestors may have ratcheted down the agitation in favor of a mostly non-violent approach, the threat posed against German Brazilians is very real. Regular reports detail people being stalked in the streets, workplaces and businesses discriminating regularly as well as consistent death threats against Germans all across southern Brazil.\n\nIt is quite clear that so long as the Nazi empire in Europe continues, the unrest in communities to the South will also remain an issue. Brazil's ability to weather this crisis relies on the government working to ease tensions as much as possible, in addition to the police protecting against isolated threats when and if they arise."
BRA_silent_south: "Silent South"
BRA_silent_south_desc: "While the Brazilian government has managed to stabilize most communities in the South, the tensions between Euro-Brazilians still remain. The protests have ceased for now and targeted harassment of German-Brazilians is increasingly rare, yet lingering resentment and antipathy lurks just under the surface. With the ongoing conflicts in Central and Eastern Europe, the potential for the mood in the South to escalate cannot be ruled out.\n\nThe government must continue to work towards remedying the animosity in the South before something happens for it to spike again, with law enforcement on stand-by in the event violence breaks out."
BRA_tense_south: "Tense South"
BRA_tense_south_desc: "The communities south of the Rio Itararé are resting on a bed of nails, with the German Civil War and within Germany's Lebensraum sending a growing number Euro-Brazilians into an anti-fascist frenzy. The German population in southern Brazil has become a target for enraged citizens with cultural and/or familial ties to Poland, Ukraine and the Jewish Diaspora, with regular protests and targeted attacks against German communities now commonplace all along the cone into Rio Grande do Sul.\n\nRegardless of any Brazilian's well-justified venom for the Third Reich, this cannot stand; the mounting civil unrest does as much to pose a security risk as it shames us as a country, a concerted effort must be made to contain the violence before it escalates."
BRA_pacified_south: "Pacified South"
BRA_pacified_south_desc: "Brazil can breathe a sigh of relief, at least for the duration. The initiatives of the government to unite the Euro-Brazilian communities after a torrent of anti-German sentiment that swept through the South. A great sense of relief can be felt south of the Rio Itararé, yet the events of recent months have revealed volatile fault lines within our otherwise pluralist society.\n\nThe end of the wars in Europe may be within sight according to foreign observers, but the prospect of multiple protracted conflicts on the continent has not been ruled out. If this is in fact the case, a similar domestic crisis in the South could spring up again. Until then, Brazil's government will simply have to keep an eye on the European situation in the hope that the fighting ends soon."

