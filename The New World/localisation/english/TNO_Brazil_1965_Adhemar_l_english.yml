BRA_exercito_social_progressista_idea_desc: "For decades, politicians have tried to find ways to escape the military's tight grip on democracy. This baffled Adhemar! Is the answer not so simple?\n\nDon't fight it. Subvert them! Now the President has tied the military and the PSP together, supplanting the UDN's position as the army's preferred partner."

