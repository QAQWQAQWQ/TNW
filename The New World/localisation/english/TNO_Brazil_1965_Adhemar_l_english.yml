## Adhemar-Edna Mechanic
 BRA_adhemaredna_category: "Plotting in the Palácio"
 # BRA_adhemaredna_category_description: It is said that history does not repeat itself, but it often rhymes. One of these rhymes can be seen now in Brazil, where a shattered mirror image of the 1960 Presidential election can be seen. However, Instead of a Lott being the President, Edna Lott occupies the Vice Presidency position, while Adhemar de Barros is President. Both have seen from the previous administration, the dangers of a divided executive and have set about ensuring that this does not cripple governance. Adhemar see's two options he has, one is to improve relations with Edna, coopting her into supporting the administration. While the other option is to weaken her influence at every turn and destroy her, however he may find the daughter a much more formidable opponent than the father."
 BRA_adhemaredna_category_description: "History does not repeat itself, but it does rhyme. In Brasília, the Palácio do Planalto hosts a shattered mirror of the previous government. Vice President §VEdna Lott§! reprises her father's administrative struggle, this time against President §hAdhemar de Barros§!. Both are aware of the dangers of a divided executive. Adhemar has two options: he can work with Edna, turning her to an unlikely ally, or he can §Odestroy§! her. He may find the daughter a §Rmore formidable opponent§! than her father."
 BRA_adhemaredna_info_tt: "§F§hPresident Adhemar§! and §VVice President Lott§! pace around Brasília, following paths well-trodden by the previous administration.\n\nAs with the Lott government, decisions that the administration makes will shift the §Ybalance of power§!, and the §Ystrength of their relationship§! will affect how their government weathers a §Rpotential crisis§!. Only time will tell whether it will repeat the mistakes of the past or make new mistakes of its own.§!"

