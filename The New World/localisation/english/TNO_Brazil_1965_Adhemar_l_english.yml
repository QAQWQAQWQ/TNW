## Adhemar Personal Wealth Mechanic
 BRA_adhemar_moneybags_initialization_tt: "The §YRouba Mas Faz§! decision category is now available, which tracks Adhemar's £BRA_adhemar_legacy_texticon §Ylegacy§! and his personal wealth in the £BRA_adhemar_slush_fund_texticon §Gslush fund§!."

 BRA_adhemar_moneybags_category: "Rouba Mas Faz"
 BRA_adhemar_moneybags_info_tt: "§FFor §hAdhemar de Barros§!, politics is a simple matter of giving people what they want. Unlike the rotating cast of ideologues and pretenders who have graced Brazil's halls of power in the past, Adhemar is frank about what he wants: fair compensation for the good that he does, preferably in cash.\n\nAdhemar's supporters and his detractors alike have dubbed this policy "§hrouba mas faz§!" - steals, but does. As Adhemar works to cement his £BRA_adhemar_legacy_texticon §Ylegacy§! as the President of the people through his reforms and projects, there will no doubt be opportunity to make contributions to his £BRA_adhemar_slush_fund_texticon §Gslush fund§!.\n\nLasting, popular, public victories will boost Adhemar's £BRA_adhemar_legacy_texticon §Ylegacy§!, while missteps or scandals can cause it to fall. At the end of his presidency, it will be his £BRA_adhemar_legacy_texticon §Ylegacy§! which determines whether Adhemar's time in office was seen as a success or failure. As for the £BRA_adhemar_slush_fund_texticon §Gslush fund§!, these untraceable dollars will be put to good use outside the stiff constraints of the bureaucratic apparatus, ensuring the PSP's rightful place in power or perhaps as a personal pension for Brazil's most dedicated public servant.§!"
 BRA_adhemar_moneybags_legacy_tooltip: "§FAdhemar's £BRA_adhemar_legacy_texticon §Ylegacy§! is currently [BRA_adhemar_legacy_description].\n\n§YClick§! to see information on the £BRA_adhemar_slush_fund_texticon §Gslush fund§!.§!"
 BRA_adhemar_moneybags_money_tooltip: "§FThe £BRA_adhemar_slush_fund_texticon §Gslush fund§! is currently §G$[?BRA_adhemar_wealth|2]M§!.\n\n§YClick§! to see information on Adhemar's £BRA_adhemar_legacy_texticon §Ylegacy§!.§!"
 
