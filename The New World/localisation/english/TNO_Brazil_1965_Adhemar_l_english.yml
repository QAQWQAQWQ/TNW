BRA_adhemar_min_corruption_idea_tt: "Our level of corruption is already at its §Gminimum§!"
BRA_squeaky_clean_idea: "Squeaky Clean"
BRA_squeaky_clean_idea_desc: "Brazil's perennial hydra has been tamed. Corruption is now taboo in Brasília, relegated from hallways to alleyways. Thanks to President's efforts, the state is cleaner than ever before.\n\nGranted, deals, bribes and criminals continue to hide amongst lawmakers. But for now, corruption is an untouchable word staying firmly out of any critics' vocabulary."
BRA_a_handshake_here_and_there_idea: "A Handshake Here and There"
BRA_a_handshake_here_and_there_idea_desc: "Brasília is not spotless, but compared to yesterday, it is virtually sparkling. Today, if you were to explore Brazil's halls of power, there might be no anti-corruption activist's dream, but one could compare it to the likes of Australia or the USA.\n\nWhile visible signs of corruption have vanished, backdoor deals remain. But which government has done without a secret favor once or twice?"
BRA_the_reality_of_governance_idea: "The Reality of Governance"
BRA_the_reality_of_governance_idea_desc: "Brazil is no paragon of honesty. That is accepted. But you would be hard-pressed to find a country that was - while many decry the shady backroom deals and accounting incidents as corruption, the men who make these deals behind closed doors know that these are simply the tricks of the trade. After all, who wants to see how the sausage gets made? To solve corruption, responsibility lies with the leaders- only then may one of Brazil's most notorious ills be cured."
BRA_dirty_hands_idea: "Dirty Hands"
BRA_dirty_hands_idea_desc: "The situation is far from ideal. Brazil is, indeed, afflicted by corruption, and its governors are dirty with the soot of unsavory solutions. Wetworkers, oligarchs and embezzling civil servants all are listed on the payroll, their existence an accepted reality.\n\nBrazil is, more than ever, not for beginners. To even start, you must learn to sit with the crooks."
BRA_ruled_by_favours_idea: "Ruled By Favours"
BRA_ruled_by_favours_idea_desc: "Corruption is no longer an affliction, but a disease. It is not just a problem, but a scourge which tears through the legal code, more a suggestion than a requirement. Mobsters rule over the biggest cities' streets, violence is unpunished and bribes are the honest man's game.\n\nBrazil's state has three players: its government, its military, and its crooks. Ruling means bargaining with all three."
BRA_conmans_paradise_idea: "Conman's Paradise"
BRA_conmans_paradise_idea_desc: "Brazil; a country where crooks, mobsters, and fraudsters can flourish. The corruption of the government is an open secret. The failure to meaningfully address corruption in any way has turned the nation into a festering wound of corruption, attracting organised crime from across the globe to set up business. From the presidency to the senate to the supreme court; all of them are corrupt to the very core, using law and order as a convenient myth to keep the machine turning."
BRA_adhemar_max_corruption_idea_tt: "Our level of corruption is already at its §Rmaximum§!"

