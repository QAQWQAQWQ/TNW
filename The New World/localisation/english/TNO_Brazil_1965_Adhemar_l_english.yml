# Carwash Event Chain

brazil_adhemar_flavour.5.t: "One Last Kiss, Dr. Rui"
brazil_adhemar_flavour.5.desc: "She walked back to her house clutching her umbrella, holding it aloft against the rain. Cars passed by, high-beams on, scattering falling droplets as they passed. Stopping at an intersection, she dabbed the sides of her eyes with a handkerchief, a relic of the recently-deceased. Embroidered in gold threading were the initials AdB.\n\nShe entered her house, shook off excess water, set her coat upon the rack. In her office, Rui set a letter on the desk: pocket envelope, return address to a Santa Teresa mansion. Inside were photos of a steel safe: five cubic feet, secured with a key and time lock. She smiled, picked up the phone and dialled the sender. He picked up after two rings.\n\n"Dr. Rui?" asked the sender. She smiled without smiling. A joke, a little dig born of frustration.\n\n"Anna will do, brother," said Anna Gimel Benchimol Capriglione. "Has the safe been installed?"\n\nOn the other end of the line, Aarão Burlamaqui Benchimol chuckled. "Yeah, just where I asked them. First floor, in the spare bedroom we never use." A pause. "Look, I can't talk now. But come over tomorrow, and we can figure things out. Goodnight."\n\n"Goodnight," she said, cut off halfway. She sighed and put the receiver back in its cradle, looking at the photographs. Her brother must have hated her for this. He was now the guardian of Adhemar de Barros' filthy lucre, an honour only bestowed to Dr. Burlamaqui because the deceased President fucked his sister. He would almost certainly steal some for himself. She had to convince him to hold onto it.\n\nDr. Rui thought: He had no love for me, nor the people or the nation, nor even his wife, that could match the love he had for this safe."
brazil_adhemar_flavour.5.a: "But I still love you, Adhemar, and so I make a place for your true love."

brazil_adhemar_flavour.6.t: "A Glimpse of a Secret"
brazil_adhemar_flavour.6.desc: "It happened every few weeks after his hospitalisation; hack journalists and their cameras surrounded the Palácio da Alvorada, besieging it with camera flashes and inane questions. There were no PSP-friendly reporters present; everyone here was here because Adhemar's brush with death was blood in the water. The vultures circled, snapping photographs of shadows in the windows that looked like their President, haggard and weakened, to use for their broadsides against the government.\n\nIn the balmy weather, a photographer from the Notícias Populares wiped sweat off his brow and raised his camera up. Adhemar was somewhere in the building, though he had taken enough photos of servants and functionaries to suspect that he might have struck out when the film was developed. Still, he dutifully took picture after picture, pricking the Palace and its attendants with fleeting flashes of light.\n\nHe had circled round the back and taken some photographs of meeting rooms and guest bedrooms there when he saw a group of agitated bodyguards approaching. He held out his press credentials, invoked the protection they gave him, but the guards did not care. They grabbed him by the shoulders, dragged him off the property and threw him out on the curb. He landed shoulder-first, but the bruising and scrapes were worth it. Normally, they were never that rough.\n\nHis suspicions were confirmed later that night as he and his partner developed the footage. Adjusted for exposure, one of the photographs showed a bedroom with two suited guards. At first they thought this could be a scandal, but their poise was too guarded and formal for that. One of them faced the door, the other kept their eyes on the window. There was a half-eaten sandwich on the desk, and while the bed looked slightly ruffled, it did not look slept in. These weren't guards taking a break."
brazil_adhemar_flavour.6.a: "These were guards trying to protect something."

brazil_adhemar_flavour.7.t: "Burying Treasure"
brazil_adhemar_flavour.7.desc: "Adhemar, in the Palácio da Alvorada, struggled to drink his scotch. Poor health kept him to weak sips; frustration kept the glass in his hand. Those stupid fucking hacks at Notícias Populares had stumbled on something big, but they were too stupid to know it. Adhemar bought the photos from them for a song, even implied that it was the scandal their filthy minds first suspected. If they really dug into that, they would find nothing, and their attention were diverted from the safe inside that bedroom closet.\n\nBut Adhemar did not consider this crisis averted: he was still more exposed now that the press knew the room in which his safe was contained. (If they were even the press. For all he knew, they could've been American spies.) All it needed was a slightly more diligent hack to pick up where the UDN's rag left off, and all that remained of his hush money would be exposed. Seizure, jail time, a reputation and a legacy in shambles. Even a year ago, Adhemar might have put it out of his mind, but his shaking hand and his weak breath gave him a newfound appreciation for fear.\n\nThe safe had to be moved; that was the conclusion he reached after an hour of ruminating and drinking. But who could he trust? His Cabinet wasn't an option. Half the people he knew personally might try to crack it open for themselves. No, he needed someone he could trust. Someone loyal, someone not stricken with greed. He flicked through his mental contact list until he pulled out a card with a familiar, trustworthy name. His hand reached the phone, and he dialled in the one person who he might be able to trust.\n\n"Anna? It's Adhemar. How have you been?" He turned up his smile to help his verbal charm. "Oh, how lovely. Please send them my best. Now, my dear, I have something I'd like to ask you. Oh, no, nothing like that. I just need you to look after something.""
brazil_adhemar_flavour.7.a: "He smiled wider. "Great. Now, listen carefully...""

brazil_adhemar_flavour.8.t: "The Traitorous Son"
brazil_adhemar_flavour.8.desc: ""Hey, don't you know Dr. Rui?"\n\nThe question set Guilherme Schiller Benchimol's teeth on edge. Were they not on campus at lunchtime, his clenched fist might have raised up against the querent's mouth. Instead, he just muttered "fuck off" and tried to push past him.\n\n"Hey, hey, hey, don't worry, man." The student held out his disarmed hands. "I'm not interested in 'sins of the father' crap. That's not the kind of guy I am."\n\n"Yeah? Who the fuck are you then?"\n\nScandal had brushed Guilherme enough to tarnish him with those who could see the mark. Dr. Rui was Adhemar de Barros' mistress. Dr. Rui was a name invented by gossip rags to avoid earning too much ire from the PSP, but people knew who she was: Anna Gimel Benchimol Capriglione, his father's sister and Adhemar's secretary. That his family were rich and profited from the PSP's ascent was one thing, but now he had one among his family actively in bed with the enemy. Guilherme thought this made him disreputable among those whose cause he longed to join.\n\n"I'm with the VAR-Palmares," said the student. "And we've seen you hanging around. Reading up on Marx, comrade Che." He wrapped his arm around Guilherme's shoulders, taking a slow gait back to the commons. "How'd you like to do more than just reading?"\n\nThe kindness, the trust, the candour—it broke Guilherme's walls down. So he agreed. He went back with him. He met the other Palmares. He was taken by their commitment to a cause he'd only played at. And then, to prove to himself that he belonged, he did something very stupid."
brazil_adhemar_flavour.8.a: "Guilherme decided to tell them about the safe in his father's mansion."

brazil_adhemar_flavour.9.t: "The Rebellious Son"
brazil_adhemar_flavour.9.desc: "Guilherme Schiller Benchimol trudged through the campus with a stack of books and a heavy heart. He'd gotten into another argument with his father again, the same political divisions that kept the two at arm's length. The Benchimols were staunch PSP supporters; Guilherme was far more interested in the PTB and things beyond them. He and his father in particular always came to verbal blows when politics entered their weekly dinner. Last night was a bad argument, the result of a recent deal his father had made with the PSP, an argument that left both sides drained and regretting for days on end.\n\nOn his way back to his dorm, Guilherme heard a fellow student on a soapbox. He stopped for a while to listen. The man called himself a representative of the VAR-Palmares. They took their name from the Palmares, escaped slaves slaughtered by an unjust suppression of freedom, whose bravery inspired the left-wing of Brazil that was worth a damn. There were castigations of the PSP, denunciations of the greed and cruelty of Adhemar de Barros no matter what he'd brought to the country, that echoed what Guilherme had said to his father the night before.\n\nThere was, for a moment, the kind of comfort one finds in hearing their words from someone else. He was not alone. Yet to hear his own words in someone else's voice, he heard in his head his father's words in his voice. Was Adhemar really that bad? Capitalist pig, yes. Plutocrat, kleptocrat, fascist-sympathiser; yes, yes, and yes. But even if Adhemar had been in a torrid affair with Guilherme's aunt, and through that connection forced them to hold onto his stolen goods, he had done far more for the country than these violent radicals ever could.\n\nThat thought crossed his mind like a knife across the cheek; Guilherme recoiled against it in fear. He buried the reactionary thought with progressive ones: the PTB were still a force that could reverse the worst of Adhemar's regime. Just wait for the election and vote the right ones in."
brazil_adhemar_flavour.9.a: "So he walked away, and did not tell them about Adhemar's safe in his father's mansion."

brazil_adhemar_flavour.10.t: "Man on the Inside"
brazil_adhemar_flavour.10.desc: "The team had gathered in the dingy basement: wooden walls, stained upholstery on the furniture. Cannabis smoke like an early-morning fog; Guilherme coughed. They'd been talking shit for the last half-hour until Carlos Lamarca and Dilma Rousseff, the impromptu leaders of this operation, came into the room. All mouths shut and all eyes turned to them.\n\n"Comrades, listen up." Lamarca wheeled in a corkboard with a blown-up floor-plan sketched out by Guilherme—what he lacked in artistry he made up for in inside knowledge. "About two weeks ago, I was informed by a trusted source," looking past Guilherme, "that Adhemar de Barros kept with him a safe containing the bulk of his embezzled funds." Rousseff pointed to a picture of the safe on the board. "The safe has since been transferred to his ally's house in Santa Terese. There's security, but we have people on the inside who can help us."\n\n"So, the safe's the score?" asked someone behind Guilherme, one of the three people who hadn't been smoking. He seemed out of place with his dark shades and straightened back. He wore the contempt of a professional among amateurs. "What's the take?"\n\n"Substantial," said Rousseff. "Most of it will go to the revolution, though you'll all be compensated for your time and effort." Some more so than others, everyone thought, some of whom dared to look towards the man in the dark shades. "We need to move quickly and get the safe out before the police can find us. Here's how we'll do this. You'll be divided into teams..."\n\nGuilherme, despite the sativa buzz, felt a nervous excitement that rode through his nervous system. What he was doing was nothing short of betrayal against his family, allowing strangers into his home and ruining their stature. He could barely hear Rousseff and Lamarca through the fog of fear and self-loathing."
brazil_adhemar_flavour.10.a: "But fuck his family, and fuck Adhemar. The revolution won against his petty fears."

brazil_adhemar_flavour.11.t: "All the Wrong Reasons"
brazil_adhemar_flavour.11.desc: "The Santa Teresa mansion should have been on alert. Yet Edna Lott was now President. As the party of Adhemar de Barros disintegrated like the sand on those shores close by, an outgoing leader's holiday home felt nowhere near worth monitoring when everything else was under attack. The PSP had bigger things to deal with, surely.\n\nThe Santa Teresa mansion should have been on alert. Yet the state was not alerted. As the grandees of Brasília tore themselves apart, they barely noticed where all the gold had gone, and the agencies had no time to chase rumors of El Dorado, not when there was real evidence of crimes being committed elsewhere. There was so much more corruption to investigate, surely.\n\nThe Santa Teresa mansion should have been on alert. But the man who owned it had no one to trust outside of it. Aside from a handful of confidantes and a distant lover who had little to gain from the place anyway, there was no other security he needed.\n\nFor all the wrong reasons, the mansion was neither on alert, nor even slightly defended. As ornate and as furnished as it might have been, no one stopped it from falling into the cracks of something much bigger. Maybe they would have, had they known what was inside... and what hell it would bring."
brazil_adhemar_flavour.11.a: "A property set free to shape a legacy."

brazil_adhemar_flavour.12.t: "Too Clean for Comfort"
brazil_adhemar_flavour.12.desc: "It was one lucky Friday, that's for sure. As a matter of fact, it was too lucky, something should've gone wrong, but it didn't. The police should've burst in at some point, or stop all those cars all pulling into the same drive in Santa Teresa at the same time, but they didn't. De Brito just got out, gave the signal, took the key and the Thirteen fanned out, arms in hand, and started the operation.\n\nIt got even crazier. We outmanned the guards, barrelled towards the dining room, caught them in the middle of their moqueca, and voilà, with a bit of rope, the house was ours. That's when I thought shit would really hit the fan, anyway, if they fought back, someone might have died. Oh, but it was some good moqueca, too, that cook can't be cheap.\n\nSomehow everyone remembered their lines: their fancy collector Pumas or whatever else got their tires popped, even goddamn Carlos Minc remembered how to cut the telephone wires, and the servants joined up and showed the way. And then we saw this mythical safe, I mean, Lamarca talked it up so long we thought it would be made of gold. Nope, just some coffin-looking box. Thank God it was actually Adhemar's, or I'd have gone and untied the guys downstairs myself. I would've done it, too.\n\nHonestly, we shouldn't have been so lucky. Sometimes I feel like it wasn't us in control that day. Not that I believe in destiny, but just based on that, who knows?"
brazil_adhemar_flavour.12.a: "Yet Christ the Redeemer looked on, and his lips remained sealed."

brazil_adhemar_flavour.13.t: "Sic Transit"
brazil_adhemar_flavour.13.desc: ""God damn it, this stupid thing's heavy," Carlos Minc whispered a little too loudly as the VAR-Palmares team mounted Adhemar's bathtub-sized safe onto dollies and pulleys. For that Sônia Lafoz struck him on the back of the head, somehow without making too much noise. "Stop blabbering, Carlos. You want one of Benchimol's men to come and save the safe?"\n\nJuares chuckled to himself. So as not to irritate his colleagues, he kept his next words to a whisper: "I like the enthusiasm, but we already tied everyone up and cut the telephone wires"—here he gestured at a trussed-up guard and quiet phones off their hooks—"are we sure we need to shut Carlos up every time he talks?"\n\nAs Juares de Brito got into position to push the safe downstairs, gingerly trying to find a good angle from which to contribute his force, one of the other guerrillas said, "You may be right about that, Juares, but it's no good leaving things to chance." Juares shrugged in agreement and gritted his teeth, muscles straining and adrenaline spiking as he and the others gingerly steadied the safe on its way down with a mix of caution and confidence born of having secured the perimeter.\n\nOne of the team members had arranged for a Chevrolet C-14 Veraneio to be parked in front of the granite steps that led up to the entrance of the house. As the car came into view, the team members became more cautious and unobtrusive in their demeanour as they loaded the safe into the car's trunk. Being out in the open now, they shuddered each time the vehicle creaked.\n\nWhen that was done, the team relaxed for a slight moment, just enough to catch a breath, and then left in good order for their next destination. At the palatial Santa Teresa mansion they left behind, it took hours before a policeman friend of the mansion's owner wandered in and noticed the trussed-up guards."
brazil_adhemar_flavour.13.a: "Next stop — an "apparatus.""

brazil_adhemar_flavour.14.t: "Apparatchiks"
brazil_adhemar_flavour.14.desc: ""Aparelho", apparatus, was how the VAR-P guerrillas referred to their bases. The base to which the Chevrolet fled from Santa Teresa was in the suburbs of Rio de Janeiro. Dilma's superiors had wisely chosen a place so chaotic with cars and people that no one would notice even a safe being removed from a car.\n\nDespite that assurance, Dilma chose to leave nothing to chance—she ordered the car backed into the property. At last the team collectively lugged the metal box out of the Veraneio, which creaked loudly with the relief of the downward force on its trunk, and brought it some distance inside.\n\nIt was as short a journey as possible. Dumping the safe on the ground, some groaned in pain, while others rubbed sore muscles.\n\nThen came the real excitement. There came a tradesman comrade in the VAR-P with a blowtorch, followed by another with an electric chainsaw. Handing her a welding helmet and putting on their own, the two men told Dilma, "You put this on and pour water through any opening that we make. We don't want the sparks burning the money or melting the gold, so we'll have to rely on you for this." Dilma would have refused if not for the welding helmet.\n\nSparks flew in all directions as the two men worked, forcing the other guerrillas to pull back some distance. The screaming of the saw was so loud it would have been the only noise for a kilometre if not for the hue and cry of suburban Guanabara life. Yet the effort paid off, and Dilma smirked as the safe door was cut away revealing waterlogged paper cruzeiros, stock certificates, bond certificates, and gold.\n\nCarlos Minc grabbed a hair dryer and took care of the gold; the rest was hung on clotheslines by Dilma and the others."
brazil_adhemar_flavour.14.a: "And that was the heist."

brazil_adhemar_flavour.15.t: "Dilma Does Deals"
brazil_adhemar_flavour.15.desc: "The main operation was over, but the Revolutionary H.Q. of the VAR-Palmares (now just 'The Basement') was still abuzz from the heist. For most of the Team, it was as if they were still right in the middle of the operation, and, to an extent, they were: the police were still looking for any signs of the safe, or the ruffians that got their grubby, poor hands on it, Minc conjectured. But they didn't know anything for sure and days being holed up in a dingy old box of a room began to take its toll.\n\nFor Dilma, however, it was the opposite. She had never been to the Santa Teresa mansion herself, but as she was not she became the group's eyes and ears, and was not subject to the same solitary confinement that came with it. Instead, she was looking for more permanent shelter at which point they could be free, and kept track of the salaries for the group's members.\n\nIn fairness, it had not been tough going, either. She had found a couple of guys to do business with, and by the end even got a Chevrolet from two American presidents ago at half price, a bit roughened, but by their standards, it would be a dream to drive. Maybe. She just needed someone to report back to her on that first.\n\n"Hey, Guilherme! You got that driving license a year ago, right? I need you to drive us to the city center to pay this guy back for his car."\n\nGuilherme by this point had probably gotten too acquainted with his hemp, but nobody on the road would care or notice, surely. Even better, there would be nobody around to judge her for the fact she couldn't do it herself. In the middle of a poker game, he stood up with a smug grin on his face. Maybe he was still too green for it, she feared, but best to train them young.\n\nOn seeing the car, he did seem impressed, even if he had probably driven things ten times costlier. Suddenly he turned round. "Hold on. If you can't drive this thing, how did you get the car there in the first place?"\n\nRousseff suddenly tensed up. "That's my job to know, not yours, pothead. Now come on, we don't have all day. I have to find the money to pay everyone somehow, you know.""
brazil_adhemar_flavour.15.a: "But how did she get it there?"

brazil_adhemar_flavour.16.t: "Wheel of Fortune"
brazil_adhemar_flavour.16.desc: "+00d:00h:09m:41s, police radio communication\n      All units, be advised: Code 150 at Rua Moreira, Santa Teresa. All available units requested to respond. I repeat, Code 150 at Rua Moreira...\n\n+00d:08h:11m:13s, O Dia (regional newspaper), article subhead/excerpt\n      ROBBERY AT SANTA TERESA HOME OF FIRST CARDIOLOGIST, FAMILY SAFE STOLEN\n      In the early hours of the morning, Dr. Aarão Burlamaqui Benchimol awoke to find that his home had been burglarised. Thieves had conducted a daring overnight robbery, targeting a safe belonging to Dr. Benchimol, including valuables of material and sentimental value. Details of the robbery are currently unknown, though police are investigating.\n      "It's devastating," said Anna Gimel Benchimol Capriglione, Aarão's brother. "So much was passed down our family over the years, and it's all gone in a single night."\n      Dr. Benchimol is Brazil's first dedicated cardiologist, and his sister Anna was formerly the secretary to Adhemar de Barros...\n\n+03d:07h:49m:28s, Jornal do Brasil (national newspaper), article subhead\n      PSP DENIES SANTA TERESA ROBBERY INVOLVED EMBEZZLED FUNDS\n\n+06d:11h:13m:17s, Notícias Populares (national newspaper), editorial title/excerpt\n      WHAT'S IN THE SAFE, DR. RUI?\n      Readers may recall the name Dr. Rui: Adhemar's woman his wife had to learn about in the papers. While Adhemar may be resting peacefully in Consolação, Dr. Rui has been busy securing all his embezzled funds. Astute readers will also recall the recent communist robbery of a safe from the home of a prominent doctor, whose sister is Anna Benchimol, Adhemar's very own Girl Friday.\n 	So far, the PSP refuses to comment, but their silence is damning. If the safe wasn't really the Benchimols, then was it truly filled with family jewels and baby pictures? Or was that steel safe really for the greatest thief Brazil has ever seen? Everyone in Brazil is asking this question, even Última Hora's getting its shots in, though we at Notícias Populares condemn their praise of these communist thieves. For the sake of our nation, it's time for the PSP to finally tell us the truth..."
brazil_adhemar_flavour.16.a: "How could the PSP be this foolish?"
brazil_adhemar_flavour.16.b: "How could the PSP be this foolish? And why are we learning about this now?"

brazil_adhemar_flavour.17.t: "The Burdens of a Favour"
brazil_adhemar_flavour.17.desc: "Laudo Natel's car stopped just outside the mansion. "Keep it idle," he said to his driver, smoothing out his lapel. "I won't be long." Empty briefcase in hand, he walked through the front door, nodding to the guard outside, up the stairs, nodding to the guard at the guest room door, through the door and nodding to the guard inside. Within the closet was a steel safe; Laudo punched in the code, opened the safe and set his briefcase on its top. He kneeled down, taking a few stacks of wrapped bills, and heard a familiar cough behind him.\n\n"Aarão wants you out of the house," said Dr. Rui.\n\nLaudo rose, sighed, shrugged. "I believe the monthly rent we're paying justifies our presence." He turned, fitting the bills into his briefcase. "Frankly, we need triple the men here."\n\n"That's not-" Dr. Rui sighed, jerked a thumb to the doorway; the guard inside followed it out, and she shut the door behind him. "Look, Laudo, I agreed to keep Adhemar's safe here. I even agreed to put someone here to protect it. Fine, it needs protection. But you can't just turn my brother's home into an armed compound. It's not his burden-"\n\n"Anna," Laudo raised a single finger up, "we've been over this." He closed the briefcase. "We all have our duty to the party, and we're all being compensated for that duty. Nothing else matters."\n\n"It looks bad. All these people. It looks like we're drug dealers."\n\n"We? You don't live here." No longer interested in further conversation, Laudo left the room without bidding Dr. Rui a farewell. She bit her lower lip, looking at that damned safe, wishing she'd never agreed to it."
brazil_adhemar_flavour.17.a: "But they were stuck with them, this money and the morons defending it."

brazil_adhemar_flavour.18.t: "Force Marker"
brazil_adhemar_flavour.18.desc: "Guns drawn, balaclavas and stockings over their face, the VAR scaled the back wall and drew their guns. Casing the joint revealed a few guards, six or seven max, mostly PSP head-breakers and a few off-duty cops earning under-the-table overtime. Beyond the pool and at the back, Lamarca saw three of them: two by the pool playing cards, one on the first-floor balcony.\n\n"This way," whispered Guilherme. He led them through bushes and hedges. Two guerillas broke from the group to go around the house: one to cut the telephone wires, the other to slash tyres in the garage. The rest went through the cellar door and down the basement. The plan was simple: emerge through the basement, grab the guards and tie them up. Guilherme told them the master bedroom was the best holding pen for the hostages: draw the blinds, and it had the most amount of space for the least amount of exposure.\n\nFireteams split once they went up. Lamarca took the ground floor, Guilherme took the first. They moved quickly, guns at the ready, fingers too often on the trigger. Lamarca and a comrade seized the two card-playing guards. Guilherme took a vase from the first floor landing and smashed it on the balcony guard's head before pressing the barrel of his gun against the wound. Their mouths were covered in and their hands were fastened with duct tape.\n\nNobody knew who fired the first shot, but it echoed out across the mansion. The VAR were paralysed in that critical second, and the mansion's guards seized the initiative. Their pistols cleared their holsters; three comrades went down with bullets in their chests. The next nine seconds were a kaleidoscope of blood and muzzle flashes. Guilherme fired his pistol once, striking a guard in the shoulder, and then clenched his eyes shut until the shooting stopped. The flurry of loud reports petered off, and Guilherme opened his eyes. Four comrades for all the guards. He was glad that his parents weren't home."
brazil_adhemar_flavour.18.a: "Nobody saw one of the guards limping away, hands covered in duct tape."

brazil_adhemar_flavour.19.t: "Steel Cello Lament"
brazil_adhemar_flavour.19.desc: ""Move, move," muttered Lamarca, "fucking move." He said it to his comrades as much as he said it to the safe. They lifted it out of the closet with great effort, fastening it with belts and cables and carefully pushing it out the guest room window. From here, comrades split into three: one group would go below, preparing pulleys to lower the safe onto the ground; one group would remain above, guiding the safe's descent; and another, smaller group split up and acted as sentries.\n\nGuilherme had been told to leave the joint behind, but he needed something to ward away the guilt. He covered the lit end with his free hand, but no more than five seconds passed between drags. He was in the third group, watching the roads to the south, but his vision was clouded with scenes from minutes before. His parents were meant to be out. He did not see them among the dead. Still, he felt an unbearable weight fell upon his shoulders. He took another drag. Behind him, he heard the creaking of wood and rope. In front of him were the hills and mountains of Santa Teresa.\n\nGuilherme had watched the world from this view before, adolescent memories of surface stargazing. Street lamps formed rigid constellations. Headlights of passing cars were comets, fleeting and once brilliant. He watched those terrestrial bodies passing by with an astrologer's eye, dulled by drugs but heightened with fear. None of them crossed through Rua Moreira. The weight lifted for a moment. He turned and saw the safe lowered onto the ground, and as comrades heaved the safe into the back, he let out a sigh. Guilherme turned back, and saw a car turn down the road.\n\n"Shit," he muttered. He poked his head through the window. "Cops, cops!"\n\n"Fuck." Lamarca cut the ropes from his side, urging everyone out through the window. They left the enemy's dead; theirs were already in another car that had already sped away."
brazil_adhemar_flavour.19.a: "Guilherme and Lamarca slid down the roof, jumped into the car and drove just as the cops passed them by."

brazil_adhemar_flavour.20.t: "Heat Street"
brazil_adhemar_flavour.20.desc: "The VAR's Chevy had attempted to maintain a low profile. It kept to the speed limit, avoided main roads, and covered its most valuable, damning possession with a black tarp. The driver turned a corner along a winding road. Lamarca's eyes scanned the front. Other comrades looked to their left and right. A police car turned behind them, and suddenly their sirens blared. Panic shot through the Chevy. The driver took off with as much speed as the overburdened hatchback could muster. They followed the road downhill, turning sharp corners.\n\nThe Chevy bounced down the hill and onto a main road, hanging a sharp left onto the tram tracks. A second cop car found them, joined in the pursuit. Lamarca hissed something cruel and poked his gun out through the window, firing with abandon. Shots ricocheted off the front of the cop cars, distant pinging that signalled a shaky hand and a moving target. But no matter how many shots they fired or how many cars they weaved through, the police remained a persistent presence behind them.\n\nStreet lights whipped past the Chevy, bright smears of red and yellow light. Overhead, lights in the mountains loomed ominous over the pursuit. Lamarca kept firing, his comrades kept firing, until a perpendicular car's sudden emergence threw the driver off balance. The driver lost control, slammed half of the Chevy into its side, spinning until the right side wrapped itself around a nearby lamp post.\n\nLamarca was lucky; two of his comrades were smears in their seats. He crawled out of his broken window with a few scrapes. Another comrade followed him out. The driver was nowhere to be seen. With nothing else left, he rushed for the back, grabbed as much of the loot as a single bag could carry, and lit a match."
brazil_adhemar_flavour.20.a: "As he fled, the rest of Adhemar's filthy money ascended to heaven on a black cloud."

brazil_adhemar_flavour.21.t: "Cleaning Up the Mess"
brazil_adhemar_flavour.21.desc: "They had crawled through backyards, slid down sewers and crossed narrow alleys until they were certain that the police were no longer on their trail. The survivors split up, Lamarca carrying the loot he could bring back. In three hours, he would look suspicious to half the country, but it took him forty minutes to return to their aparelho—their base of operations, in that smoke-filled basement.\n\nInside, Rousseff was dousing everything in a shiny layer of gasoline. Piles of papers and photos in the centre, ready to be cleansed. When she saw Lamarca enter, her face was contorted into a mixture of rage, frustration and confusion. "The police radio lit up when you got there. What the fuck happened?"\n\n"The guards were armed. We took care of it." Lamarca was about to drop the bag until he saw the gas canister in Rousseff's hand. "We're burning this place?"\n\n"I don't want to," she said, spreading another layer on the couch, "but we can't stay here any longer." With the rest of the room covered, Rousseff threw the canister on the center pile. "I should have never let you go through with this. They had shotguns. What the hell did we expect?"\n\n"Revolution's never easy," said Lamarca. He had pithy quotes to follow from their heroes, but the specific words eluded him and he was too exhausted to reach out for them. He only had the strength to keep the loot held up. Rousseff, too, was too tired to scoff. They both approached the front of the door. Rousseff struck a match head against the door frame, lit it, and threw it in. When the cops got there, they were gone. The house was up in flames, one last act of destruction to mark the VAR's operation. Black smoke rose up across the dawn sky. The VAR spent the rest of their week securing their dead, burying them on a little hilltop, where they could face the rising sun towards the city and say 'once, down there, we struck a blow for a better future'."
brazil_adhemar_flavour.21.a: "But they could never quite figure out whether that was true or not."

brazil_adhemar_flavour.22.t: "Hit the Road to Dreamland"
brazil_adhemar_flavour.22.desc: "+00d:00h:07m:20s, police radio communication\n    All units, be advised, armed robbery at Rua Moreira, Santa Teresa. All units priority requested to attend. I repeat, armed robbery at Rua Moreira...\n\n+00d:08h:11m:13s, Jornal do Brasil, article title/subhead\n    COMMUNIST ROBBERY AT SANTA TERESA\n    HOME OF PROMINENT SURGEON BURGLARISED, SAFE STOLEN\n\n+02d:06h:55m:38s, O Globo, article title/subhead\n    PSP IMPLICATED IN SANTA TERESA ROBBERY\n    MISTRESS OF ADHEMAR DE BARROS REFUSES QUESTIONS ON BROTHER'S MISSING SAFE\n\n+04d:07h:51m:19s, Folha de S.Paulo, article title/subhead\n    SANTA TERESA SAFE RAISES QUESTIONS\n    PSP DENIES CONNECTION BETWEEN SANTA TERESA ROBBERY AND EMBEZZLED FUNDS\n\n+07d:15h:12m:30s, Última Hora, editorial excerpt\n    As each day passes with no answer from the PSP on their connection with the now-infamous Santa Teresa Robbery, the people of Brazil's taste for justice grows. How much did Adhemar de Barros steal from the state's coffers? How much of it was stored in that safe from Santa Teresa? How long will the PSP keep denying it?\n    Such questions continue to orbit around the party at every conference and every meeting, from journalists ranging from our own to even the Notícias Populares, and until we hear the truth, they will not hear an end to these questions..."
brazil_adhemar_flavour.22.a: "...but we don't want to talk about the fucking safe!"

brazil_adhemar_flavour.23.t: "The Vault in My Heart"
brazil_adhemar_flavour.23.desc: "Adhemar and Dr. Rui drove to her brother's mansion after work, and Rui was shocked by the transformation it had undergone to accommodate its new guest. At the front a barricade had been installed, manned by an off-duty cop who waved them in once he saw the license plate. Out front, two snarling guard dogs stood at attention. Adhemar waved hello to them, gave one a pat on the head, but grabbed Rui's hand when she tried to pat the other.\n\n"They'll chew your arm off, dear," he said, the grip turning into a caress along the wrist. The dog let out a bark, its handler tugging on the leash. Adhemar and Rui walked inside, where ex-soldiers saluted the President and guided him up to the guest bedroom. The queen-sized bed that once held its guest had been replaced with a single, shoved into the corner for guards staying overnight. In its place, there was a small table ringed by chairs, with three guards engaged in a light dinner. At Adhemar's presence, they scrambled up, but he waved them away.\n\nAdhemar opened up the closet, twisting the safe's dial. "Did your brother receive my thank-you gift?"\n\n"He did," said Dr. Rui. "He's coming back in a week or so." Her brother had left the country for a little bit, separating himself from the installation. Rui tried not to think about his disappointment and frustration as she drove him to the airport. An all-expenses paid trip out of the country was meant to be a thank-you on top of the bottle of champagne he sent—Rui was certain that his brother would have thrown it in the trash.\n\n"Very good, then," said Adhemar, twisting to the final number. The safe popped open, and he gently pulled the door. Inside were glittering jewels, damning papers, bank notes in various currencies. He took out a single krugerrand from a small pile, and stared at it for a moment."
brazil_adhemar_flavour.23.a: ""Beautiful," he said. "All is well.""

brazil_adhemar_flavour.24.t: "Full Force Forward"
brazil_adhemar_flavour.24.desc: "The VAR took it as a given that there was going to be blood. There were too many defenses to sneak around; the best they could hope for was to slip through its cracks and start shooting from the shadows, a cancer suddenly metastasizing and spreading throughout the Benchimol residence. Even so, there were too many eyes looking in all directions.\n\nOut the front of the mansion, an explosion tore off the barricade and sent a guard flying, smashing into his pillbox wall. The guards took off to secure the front, some spreading through the street to see if they could find the bomber. Some stayed at their posts, especially those in the guest bedroom, where the heart of the mansion was to be well-guarded at all times.\n\nInside, the guards had a minute of fire and yelling before something new entered their soundscape. Behind the mansion, there was gunfire. Their leader told the rest to wait and protect the safe while he dealt with the intruders. Into the hallway, he saw one of the guards being driven off the landing balcony by a shotgun blast. He raised his gun, fired into the shadows; a young man screamed, fell out bleeding from the shadows.\n\nA gunshot, a wisp nicking the side of his ear. The guard whipped his body around, firing off an indiscriminate burst. Lamarca and Lafoz ducked to the side, narrowly avoiding the burst. Lafoz peeked her head and her sidearm out from the corner and saw the guard advancing. A .44 round punched through his ankle. He screamed, letting off one more volley into the darkness before hitting the ground. He tried to run off, but Lamarca emerged with a stolen shotgun and put a circle of buckshot into his back.\n\nThe rest of the guards broke from the room, only to find themselves in a pincer. Lamarca and Lafoz were on one side, shotgun and stolen FAL on them. On the other side, young Carlos Minc, holding up a pistol. They left one of the guards alive."
brazil_adhemar_flavour.24.a: ""Now," said Lafoz, pressing her rifle to his head, "show us where the loot is.""

brazil_adhemar_flavour.25.t: "Razormind"
brazil_adhemar_flavour.25.desc: ""Captain," said Minc, "we don't have time to lift the safe anymore. Too many guards are still outside, and the cops are close." Outside, the gunfight was drawing to a temporary close. Thieves and guards were strewn across the mansion, dying or resting. Gunfire was sporadic, but there were still guards trying to get back in, and revolutionaries keeping them out.\n\n"Okay. Fuck." Lamarca ran his hand over his face, smearing blood across his skin. He wished they stopped calling him by his old rank. He scrunched his eyes up, relaxed them, opened them. "Blow it. Blow the fucking safe."\n\n"Hang on," said Sônia Lafoz, "what if we burn the money?"\n\n"At least Adhemar won't get it."\n\nLafoz and Minc nodded. From their bags they extracted their plastic explosives and wrapped it around the hinges of the safe. One wire wrapped around the room later, and they detonated it from the hallway. The explosion rattled the walls and floorboards, and they were lucky the safe hadn't come crashing down. The three ran back inside; Minc took out a crowbar and pried off the safe door.\n\nLamarca's order: "Fuck the bonds, fuck the stock, just grab anything we can move!" Lafoz and Minc executed it without question; Lafoz dragged out anything of immediate value and threw it out, while Minc tossed what he could into their bags. They filled two of them with loot before Lamarca ordered them to leave the rest behind. They stepped over bodies they wanted to bring with them and tracked blood into their Chevy. The driver, muttering something about danger, urged them all inside and hit the pedal before Lafoz could close her door, wheels running over the body of a guard as they fled from the battlefield."
brazil_adhemar_flavour.25.a: "Sirens followed behind them."

brazil_adhemar_flavour.26.t: "Oh, Look At Me Now"
brazil_adhemar_flavour.26.desc: "+00d:00h:07m:53s, police radio communication\n     All units, be advised, armed robbery at Rua Moreira, Santa Teresa. All units, please respond to armed robbery at Rua Moreira, Santa Teresa. Suspects are currently pinned down...\n\n+00d:08h:12m:50s, O Globo, article title/subhead\n     EXPLOSION, SHOOTOUT AT SANTA TERESA HOME\n     COMMUNISTS, SECURITY FOUND DEAD AT SURGEON'S HOME\n\n+02d:06h:52m:11s, Estado de Minas, article title/subhead\n     POLICE CONFIRM PSP CONNECTION TO SANTA TERESA SHOOTOUT\n     SAFE ON PREMISES BELONGED TO ADHEMAR DE BARROS\n\n+04d:07h:21m:48s, Gazeta do Povo, article title/subhead\n     ADHEMAR'S OUTRAGE!\n     PRESIDENT ENDS PRESS CONFERENCE EARLY OVER ONGOING EMBEZZLEMENT SCANDAL\n\n+08d:15h:08m:20s, phone transcription\n     AB: It's fucking ridiculous! Everywhere I go, it's safe this, safe that! I can't even walk down the Goddamn street-\n     LN: (REDACTED)\n     AB: Right, right, I know. Look, I thought I could trust her. Serves me right, I suppose.\n     LN: (REDACTED)\n     AB: I moved it again, back to the Alvorada. It should've stayed here. And when I'm gone, it's leaving the country. I'm serious. It can't be anywhere I'm not."
brazil_adhemar_flavour.26.a: "AB: It'll be the last fucking time anyone but me opens that safe again."

brazil_adhemar_flavour.27.t: "Cry Havoc"
brazil_adhemar_flavour.27.desc: "The barking of police attack dogs was the first sign that everything was going wrong. Nowhere in their intelligence, nor in Lamarca's briefings, had the VAR-Palmares been told that police hounds would be on the lookout for them. No, all they had expected was a few armed guards that would be easy to dispatch.\n\nJuares' crew rounded a corner, inexorably pushed towards what she feared was certain doom. And doom presented itself in the form of three times the amount of armed guards and a massive contingent of Guanabara policemen. Carlos Minc swore loudly: "Where the fuck did that moron Lamarca get his intel from?"\n\nThe officers shouted through a megaphone to demand surrender; not one member of the VAR-Palmares obeyed. Then they opened fire with tear gas and charged truncheons at the ready.\n\nWhen simple physical force did not suffice to disperse the revolutionaries, they used lethal force: the riot policemen and security guards used firearms to dispatch the vast majority of VAR-Palmares. Blood flowing from their wounds, one revolutionary after another fell to the ground, their quest in vain and their efforts for naught.\n\nFor his own part, Juares de Brito briefly lost consciousness after being struck by a brickbat in the confusion. When he came to, he was in a Black Maria trussed up like a seal. With him were Sônia Lafoz and Carlos Minc, also trussed up like seals. Lafoz looked him in the eyes and laughed bitterly."
brazil_adhemar_flavour.27.a: ""We're fucked, aren't we?""

brazil_adhemar_flavour.28.t: "Exit Dilma"
brazil_adhemar_flavour.28.desc: "Anyone observing Dilma from a distance would describe her as a frenzied one-woman hive of activity. She had no choice, after all—she was fleeing prosecution and her mind was going a million miles a minute. Her thoughts were frenetic:\n\n"Why the hell did I insist that the team carry light arms when attacking a place where the President's safe was located? For that matter, why the hell did I even go along with this stupid operation in the first place? It should have been obvious from square one that the very idea was ridiculous, now that I think of it."\n\nDilma's eyes fell on some papers. She grabbed a match and burned them, then shredded some others. Not like it made too much difference—the more reasonable leaders of the Palmares were resolved to stay well away from Guanabara for the foreseeable future.\n\n"But will there even be a VAR in the first place?" Dilma muttered. "That maniac Lamarca keeps insisting on more and more violent action even though as it stands anyone that hears of this is making fun of us. He and his lunatics might just split off from the Palmares and—was that a siren?"\n\nIn the distance Dilma heard a noise that sounded like a siren, or perhaps an alarm.\n\n"Whatever. There's no time for me to wait. I think the cops are coming down the road; I need to get out of this stupid 'aparelho'"—apparatus, their term for a base—"as soon as possible."\n\nDilma Rousseff grabbed her personal effects and ran hell-for-leather from the base, narrowly escaping capture and free to fight another day—if she could be bothered, that is."
brazil_adhemar_flavour.28.a: "Exit ROUSSEFF, stage left."

brazil_adhemar_flavour.29.t: "Full Victory"
brazil_adhemar_flavour.29.desc: ""Testimony of the arrested communistic terror group Vanguarda Armada Revolucionária Palmares indicates that they were in fact attempting the theft of a safe belonging to President Adhemar de Barros located in Santa Teresa—"\n\n"—Thank you, Dr. Rui, for coming on TV Globo today. What is your comment on this revelation?"\n"Thank you for having me. I think this is proof positive of the inferiority of communism as an ideology, as if we needed any proof of that after the fall of the Bolsheviks, and of the exceptional prudence and preparedness Adhemar has shown—"\n\n"—That Dr. Rui, weren't they saying she's been having an affair with Adhemar? They were talking about some open secret?"\n"I mean, probably, but who really cares? What's more important is how incompetent those stupid communists are. Tried to steal a safe, got arrested and forced to confess for their trouble. Who cares what affair or romance that old man Adhemar is having? Besides—"\n\n"—I mean, it's almost certain that that man stole a lot of money and shoved it in his safe. But that's just how things are here in Brazil, isn't it? No use getting too fussed about whatever Adhemar is doing with the finances just so long as he doesn't steal TOO much, you know what I mean? The way things went is pretty funny, after all—"\n\n"—What did the communists do to Adhemar's safe, grandpa?"\n"Where on earth did you learn about that, Jairzinho? It was a funny story from some time ago. The stupid Bolsheviks tried to take the President's safe but got their clocks cleaned instead.""
brazil_adhemar_flavour.29.a: ""Ha-ha-ha, good times.""

brazil_adhemar_flavour.30.t: "The Safe Leaves Life..."
brazil_adhemar_flavour.30.desc: ""What is your opinion about the possibility of metallurgical plants in the northern parts of Goiás state, Mr. President? Some industry bodies were discussing it very eagerly the other day."\n\n"Dear God, another one of these stupid press conferences," Adhemar thought to himself. "I'm fresh out of a coma and the doctors told me to rest, yet here I am blathering about mining and hydroelectric power plants. I just need to hold on through a few more questions and then I'll be free."\n\nThe questions, many of which should have been asked to a responsible minister instead of the President, passed him by like flotsam and jetsam. Though his strength was sapped he was at least able to answer many of them as clearly as his knowledge allowed. At last the final question was answered, Adhemar's press secretary retook the podium, and Laudo ushered him away.\n\nAs he walked out, a journalist shouted one last question. "Mr. President, just what was in that safe? Why were those Bolsheviks so eager to get hold of it?" Laudo made to push him along but Adhemar stopped him and looked the journalist in the eye. "Mr. President?"\n\nA smile crossed Adhemar's face. The Tribuna da Imprensa, in an article personally written by Carlos Lacerda, described it as the "death rictus of a witless Hitlerite dotard"; Wainer's Última Hora referred to it as "arrogant, militant self-confidence." On the other hand, the Archbishop of São Sebastião struggled to tell whether it was the face of an unrepentant sinner or a man prepared for a holy death."
brazil_adhemar_flavour.30.a: "...and enters history."

brazil_adhemar_flavour.31.t: "A Box, Accursed"
brazil_adhemar_flavour.31.desc: ""What a wonderful way to spend the lead-up to the end of the year," Dilma muttered angrily under her breath as her comrades argued, their enraged shouting inescapable no matter where in the base she went. "Maybe I should've found a different outfit instead of these morons."\n\nPeering into the meeting room where the VAR-Palmares guerrillas were squabbling, Dilma glared at two specific empty chairs. "That bastard took the money and ran off; not even the police have heard of him since. Then there was the other idiot who fell for a scam in Portugal and lost a large part of his share. What the hell was he doing in Portugal in the first place?"\n\nTearing her gaze away from the chairs she stared at the two lines of squabblers that had formed on either side of a table. One group looked much wealthier than the others. "Boy, I wonder why," Dilma snarked. "Couldn't have had anything to do with the money we gave them, oh no."\n\nThen there was the other group that kept hollering about "redistributing wealth to help exiles struggling abroad" but had no timeline nor any plans for how to redistribute that wealth. Dilma dismissed them with a single word: "Morons."\n\nWhat made Dilma want to get drunk was the fact that this was the tenth day in a row that this sort of nonsense was happening. "This money—we shouldn't have gotten hold of it if this was going to be the end result. All it's doing is splitting us apart; at this rate, COLINA and VAR will split from each other, then fall apart into pieces like a chandelier hitting the floor. But while I watch this whole organization failing apart, all I feel like asking is—"\n\nDilma Vara Rousseff looked out of the base at an old, faded poster of Adhemar."
brazil_adhemar_flavour.31.a: ""—did that old Nazi curse us?""

brazil_adhemar_flavour.32.t: "Adhemar's Blossoms"
brazil_adhemar_flavour.32.desc: "Sumitada couldn't help but smile at the results this morning. 'A landslide for Adhemar!', 'Adhemar- Brazil's new face!' - things like that were all that the news could speak about, and it couldn't have made him happier.\n\n"Finally. First bit of good news in a while." He muttered to himself, tuning out the radio and letting the news sink in. Though the gladness welling up in his chest burst for a moment, as Chiyoko brought him back to earth by making her presence known.\n\n"Why's Adhemar got you so excited, dad?" She asked, quizzically - probing into his uncharacteristic smirk.\n\nSumitada thought about everything Adhemar had done for the Shindō Renmei, the legitimate and the illegitimate. All the deals and support he was willing to offer. But he kept his cards close to his chest - she didn't need to know.\n\n"Because, Chiyoko, he assisted the Shindō Renmei - something your father's quite passionate about." Hiroshige stepped through the doorway, punctuating the rather awkward silence that had begun to fill the air.\n\nSumitada looked at her momentarily, before suddenly averting his gaze - as if what she'd said had taken him someplace else, but he had finally decided on what he should tell her.\n\n"Let's not mention that name. Not in front of her."\n\nChiyoko was left with more questions than answers, but knew it was best to not question her father - least of all while he was this happy."
brazil_adhemar_flavour.32.a: "Adhemar planted the seeds, but only time would tell if they would grow."

brazil_adhemar_flavour.33.t: "Adhemar's Blossoms, Uprooted"
brazil_adhemar_flavour.33.desc: ""Dad, are you going to vote this year?" Chiyoko inquired, trying anything to break the terse silence lingering in the main room. "After all, you always seemed positive about the PSP last time!" Sumitada held the silence, continuing to gaze out the window at something nondescript, as to avoid her questioning. Though soon he took a moment to collect himself, taking a deep sigh as he wordlessly turned to face his daughter.\n\nHe said nothing to Chiyoko however - no, there was nothing that needed to be said. The exasperated frown on his face told her all it needed to - he wanted nothing to do with this conversation, or politics in general anymore.\n\n"Your father's... disappointed with President Adhemar's administration." Hiroshige interjected, his voice betraying an underlying disappointment. "He's - no, we're unhappy with what he did - for the Japanese." He tapered off for a moment, as if trying to find her footing. "Your father's told me he's never to vote for a politician again." He trailed off once more, though this time with a tinge of sadness in his voice, as opposed to uncertainty.\n\n"Betrayal. That's what it was." Sumitada's voice was clear and curt - he intended to say no more on the matter, and wanted the other two to follow suit.\n\n"But Father, what about-"\n\nInterjecting quickly, he fired off with a stern yet tired "I've said all I needed to." before slowly turning to look back out the window.\n\nChiyoko was once again left with more questions than answers - though now she feared she did not want to learn them."
brazil_adhemar_flavour.33.a: "All blossoms wither without proper care."

# Baseball Tournament Event Chain

brazil_adhemar.1012.t: "Beisebol"
brazil_adhemar.1012.desc: "The third of August, Shōwa 37. Conditions: clear, few if any clouds; precipitation impossible. Present at the Estádio Municipal de Beisebol Mie Nishi late in the morning were Adhemar de Barros and the usual suspects for a baseball tournament: influential Nikkei families in the stands, their kin playing baseball in the field, baseball enthusiasts, and staffers. Some of these staff were of greater interest to the President of the Nation than others on his visit to the baseball-and-sumo establishment in the centre of his hometown.\n\nLeveraging his usual charm and penchant for the 'envelope system', Adhemar walked around as if he owned the place—that was why he was there, after all. Some might say this kind of petty bribery was beneath the President; Adhemar laughed in their faces. "I am an artist," he would insist, "and I know small things make a big difference."\n\nFurther implications made Adhemar smirk, drawing the curiosity of passersby and journalists glimpsing him from the middle distance. "The President takes time out of his day to show up to a minor event for a minority community in São Paulo? Ooh, it'll make the Nikkei jump out of their seats before they can say 'masaka'—and God knows they need that sort of intense reminder once in a while. Otherwise they might forget just who got them Mie Nishi and who has stood by them since Vargas' time."\n\nThe final match was imminent. Adhemar cracked his knuckles. "Not like it matters who wins," he murmured. "Tupi and Aguia both got rigged all the way to this point. Besides, both teams have about equal numbers of players from the local families. But one does need to keep one's match-fixing skills sharp."\n\nApproaching the head referee, who dipped his head in greeting, Adhemar gave him yet another envelope and said:"
brazil_adhemar.1012.a: ""Methinks it's Team Tupi's turn for the trophy.""
brazil_baseball_tt_1a: "Dare to fight, dare to win."
brazil_adhemar.1012.b: ""No, I'd say Team Aguia is overdue for a win.""
brazil_baseball_tt_1b: "Purei bouru!"

brazil_adhemar.1013.t: "Blast from the Past"
brazil_adhemar.1013.desc: "Adhemar was spending another evening in São Paulo with local Nikkei elites. The setting: a well-appointed mansion with a beautiful lawn and a mix of Japanese and Brazilian cuisine. People ate, drank, and talked in Japanese and Portuguese under a (very rare) starry sky—or at least, as starry as a sky could be amidst all the lights of a city that did not want to sleep.\n\nSipping some imported sake, the President of Brazil chewed on kara-age chicken and people watched. Their talk touched on a myriad different topics. A few Pessepist Nikkei were off in one corner loudly arguing about exactly why a man named "Kishi" should never have held elected office. One or two others were snarking at each other about the latest rigged baseball match. Then there was a large group of people talking about—\n\nAdhemar dropped his food and drew closer. "—Tsuguo Kishimoto? Did I hear that correctly?" The Nikkei grandees nodded. "The man must be 72 years old by now, if my memory's working. You're telling me he's still alive?" More nods. "Dear God, but that brings me back to the old days. The sort of things he and I used to get up to together back then... ah, memories." Smirks and laughter all around. "But then—sorry, ladies and gentlemen. Woolgathering. I'll leave you to yourselves."\n\nAdhemar grabbed some sushi—"dear God, these simple tuna and salmon rolls, mm-mm!"—and went back to chewing. "The Shindō Renmei—Xindos, I call them—couldn't still be up and running, could they? I thought the Xindos all got put in prison. Then there were the lunatics over at the Sakura Volunteer Army, but they love mad Jânio."\n\nAs another piece of karaage went down the President's gullet, he reached a conclusion. "Old Kishimoto could be helpful to defeat the influence those Janista morons have over the Nikkei.""
brazil_adhemar.1013.a: ""I better ring him up again.""

brazil_adhemar.1014.t: "Cathedral Convocation"
brazil_adhemar.1014.desc: "A strange scene unfolded in the Praça da Sé. A relatively significant (but not too large) number of Nikkei marched past the Cathedral and hollering their opinion for the whole of São Paulo to hear.\n\nPaulistas struggled to understand the goings-on, as the vast majority of the signs were in Japanese. This rule had only a few exceptions, the largest one of which read: "Repatriate all 400 thousand Nikkei to Japan". Conversations with the activists provided Paulistas with no greater enlightenment.\n\n"I don't see why you people need to go back, you've been good enough here. Is it the Udenists trying to drive you away?"\n"No, sir, you don't understand. It's not you, it's us—we need to be reunited with the rest of the Japanese people in our ancestral homeland. We also need to ensure that Japan gets the support it needs in its wars."\n\nFrom a distance, the President of Brazil sat down in a restaurant with a Japanese man somewhat older than him. Adhemar observed the Japanese militants from a distance just enough to provide plausible deniability against what he would call the "ranting and raving" of Udenist journalists concerned about a democratically elected President attending a quasi-fascistic rally.\n\nTsuguo Kishimoto, being an old friend of the President, went through the usual friendly motions before making an offer he knew Adhemar couldn't refuse. "You know, this, uh, devout sector of the Japanese community, they had an idea in which you could offer some support to their hard work in—" At this point Kishimoto's voice diminished to a whisper in Adhemar's ear.\n\nHearing the proposal, Adhemar smirked, a look promptly matched by the man journalists had once called Adhemar's "secretary for Nipponese affairs." The President then nodded, saying,"
brazil_adhemar.1014.a: ""What an offer! You bet I can help.""

brazil_adhemar.1015.t: "Kodo-what?"
brazil_adhemar.1015.desc: ""I can't stand it!" A journalist in the crime section of the venerable Paulista newspaper O Estado do São Paulo slammed his desk in disgust at the goings-on as his colleagues on the crime beat shook their heads.\n\nWhat was setting them off was a murder of a wealthy Japanese by another Japanese, some kind of militant, in Tupã northeast of Presidente Prudente. "So let me get this straight," the journalist continues."Some rich Japanese financier or what have you gets shot dead in his own house with a revolver. The police come in mere minutes later, and they find the murderer trying and failing to climb the outer wall, being about as athletic as Getúlio Vargas is thin." Chuckles at the mockery.\n\n"Guy gets arrested, seemingly open-and-shut case, the damn murder weapon was sticking out of the young moron's back pocket. He's really cooperative, he answers every question the police pose to him. He mentions some new organization, some successor to the, uh, Xindos—I mean the, uh, Shindō Renmei."\n\nThe journalist scratched his head. "The kid calls it the Kodomo? Kodoxa? No, Kōdōsha. The story gets leaked to us and the rest of the Paulista press and it becomes this big story. But then the very next day that same obvious murderer gets sent out, the very same officers that leaked the story to the press go silent. I heard one of them ran away from a Folha de S. Paulo journalist as the latter hollered 'Officer? Officer? Why run away if you know what's going on?'"\n\nLooks of disgust marred everyone's faces. "Who knows what the hell is going on. Some sonofabitch has got to be greasing the wheels for these Kōdōsha morons, springing them from jail and court." The journalist who had spoken drank two shots of vodka and sat down heavily."
brazil_adhemar.1015.a: ""Maybe I should go write about stocks instead...""

brazil_adhemar.1016.t: "Two Decades Prior"
brazil_adhemar.1016.desc: "Adhemar observed the Shindō Renmei prisoners from a distance. He had to respect their hard work. The vegetable gardens, chicken coops, and pigpens—which the warden of Porto dos Palmas prison on Anchieta Island told him were created in mere weeks—were evidence of that.\n\nAmidst the whispering and curiosity of the inmates, Adhemar disembarked from the Ubatuba ferry followed by two trucks filled with ballots for prisoners to stamp with the name of a gubernatorial candidate for the 1947 state vote. Someone sent a message—"Dr. Adhemar de Barros is coming"—which sent the prisoners running to the mess hall.\n\nAdhemar wanted to prove that Nikkei, including the Shindō Renmei, could rely on him to serve them as Governor of São Paulo. Unable to speak a lick of Japanese, he relied on his "secretary for Japanese matters", the factotum Tsuguo Kishimoto, to translate to those that could not speak Portuguese. While chit-chatting and breaking bread with the prisoners, Adhemar and Kishimoto became confident that the message had been heard.\n\nBut Adhemar had a trump card. He clapped for attention and told Kishimoto to translate it as clearly as possible: "Gentlemen. I have to take my leave, but I profoundly appreciate your welcome." Courteous applause. "I am impressed by your diligence and hard work, and I want to see it rewarded. Today, therefore, I want to promise you something: if elected Governor, I will do everything within my power to free you."\n\nWhen that sank in the applause became louder, joined by cheers. Then the Governor-to-be threw a rhetorical bomb on the table. "And I want you to understand something else, gentlemen. I get you. Shindō Renmei is like Adhemarism—they love you or they hate you. There's no middle ground." That set them laughing long and hard, and expressing their admiration as Adhemar left."
brazil_adhemar.1016.a: "Governor Adhemar Pereira de Barros kept his promise, starting a decades-long relationship."

brazil_adhemar.1017.t: "Xindorama"
brazil_adhemar.1017.desc: "Adhemar de Barros walked into the designated meeting place in a suburb some distance away from the Brasília city centre. He was approached by a handful of Kōdōsha leaders, many of whom Adhemar noted still had the look of people surprised to be in a city built a mere decade ago.\n\nMany of the militants were on the younger side, but not so young as to not know of him. The ones that were in their fifties and forties had met him on Anchieta Island, or at least thought they had. Adhemar did not shake their conviction, being very good at pretending to recognize faces. Regardless of prior acquaintance, the leaders all treated Adhemar with reverence, something he relished.\n\nAt last Kishimoto gaveled the meeting in, kicking off the agenda, and gestured at Adhemar to speak. "Gentlemen! You may wonder just why I have called you out so far from our common home." Nods among the audience. "Part of it is personal. We have used the good offices of Mr. Kishimoto over here to get things done for some months, but we were not able to meet in person until today. Confucius said, 'Is it not joyful for friends to come from far away?' and this is so."\n\nPolite applause. Adhemar continued on: "In exchange for your support in strangling the influence of rival candidates such as Salgado, Kubitschek, Goulart, and Quadros among the Nikkei—no need to counter Lacerda, your people already hate him—I offer the following on the same lines as what we did in the past." The mention of Lacerda drew scowls and chuckling.\n\n"Firstly: we will help you, uh, tokkōtai stay out of prison. Secondly, we will make sure the press keeps silent. Thirdly, I will call in some favors to ensure that some of these 'dirty hearts' you are concerned about get thrown in the clink for a few days, or however long is necessary." Enthusiastic applause and nods of approval made clear just what they thought of that offer."
brazil_adhemar.1017.a: "That was the start of something."
brazil_baseball_tt_7: "Shizuo Osawa begins his investigation..."

brazil_adhemar.1018.t: "Clueing In"
brazil_adhemar.1018.desc: "Shizuo Osawa lit a cigarette, sending tufts of smoke out of the car's open window. The road to Puente Grande was bumpy, yet he drove on through the winding streets of São Paulo before soon reaching the city's suburban outskirts, scanning the houses that passed him by. His latest story could hardly wait for him; a Japanese native of São Paulo, no less an influential member of its Nikkei community, was arrested just last week in an incident that quickly traveled through the pipeline of rumors and hushed whispers. A droll story at first glance, perhaps, yet the accused was notable as one of the few publicly Lacerdaist Nikkei and a vocal anti-Adhemarist before his arrest. It stunk of discrimination, and Shizuo was determined to prove it. His credentials as a journalist depended on it.\n\nShizuo turned a corner, winding past trees and the occasional pedestrian. Traffic was noticeably light today. Good. He hadn't the time to formulate a coherent investigation strategy, yet he was piecing together what he could whilst driving. Of course, he would need to investigate the house and its immediate area first, recording whatever the police hadn't already plucked away from the scene. Then, witnesses would need to be drawn up. He doubted that the police would talk, though any clerks and lower-rung bookkeepers may be more keen to share details.\n\nRounding one final corner, he spotted the stone fencing that stretched across the property's perimeter. "Shit," he muttered. Just next to the door to its front lawn, scrawled in Japanese, a message clear as day: "Traitor to the Nation!" Parking his car on the curb, he approached the message, brushing a palm against it. Dry. Still, a foreboding warning. One might have been intimidated by it, but not Shizuo."
brazil_adhemar.1018.a: "In fact, it only emboldened him."
brazil_baseball_tt_8: "The clerk did not hold Adhemar's legacy in high regard..."

brazil_adhemar.1019.t: "A Disgruntled Lead"
brazil_adhemar.1019.desc: "Shizuo Osawa was growing impatient, tapping his foot in impotent frustration as he stood in a dingy, dimly-lit back alley in the Bom Retiro district, the sun now dipping below the horizon. Twenty minutes had passed, and there was scarcely a sign of his contact. It was a stroke of luck, frankly, that he managed to contact her in the first place; he couldn't have asked for a better source than a clerk directly employed by the Department of Political and Social Information. If anyone had evidence of the return of terrorism from far-right Nikkei, it had to be them. At least, that's what he hoped.\n\nA scrape against concrete forced Shizuo to spin around, fearing that the police had tracked him down. Instead, a woman stood there, obscured by shadow and with a lit cigarette between her lips. "Are you Shizuo Osawa?" Her voice was dry, yet sharp, with Shizuo skipping a beat before giving a silent nod. The woman scoffed, taking the cigarette from her mouth as she stepped into the light, clutching a beige folder.\n\n"You're damn right I do," she spat out. She handed the folder to Shizuo, who quickly tore it open for its contents. Inside was a trove of written communication logs, detainment records, and photos of various prisoners—all of Nikkei descent—with the same name highlighted next to them: Kishimoto. Shizuo sharply exhaled. It was the exact name he had found over the past two weeks. "This Kishimoto guy," the woman chuckled, "was a member of the PSP." She spat to the side. "Gave the police a letter; shut them up nearly as quickly as the money the department got for the arrests."\n\nShizuo silently nodded, still scanning the papers in his hands. This was more than enough for a complete exposé. He let out a hushed mutter of thankfulness before closing the folder and turning to leave the alley. "Not that I took the money," the woman said as he stepped away. "You know what I told them?" Shizuo hesitantly turned, watching as the woman sneered."
brazil_adhemar.1019.a: ""I told them, 'shove it up your ass!'""

brazil_adhemar.1020.t: "A Shadow Rankled"
brazil_adhemar.1020.desc: "As he stepped off the bus, Shizuo considered his next steps. When he submitted his article, it had initially been welcomed, his findings now gossip among fellow journalists at lunch. Then, he was called into a meeting and berated, told that his article was too sensitive, that it made too many lurid accusations against people without enough evidence. He could, of course, read between the lines. Their concern wasn't rooted in journalistic integrity, but fear of reprisal. Fated to become a mere internal rumour.\n\nHis considerations were cut short as he entered his home. The door caught on something, remaining ajar, and Shizuo had to force himself in. As he investigated, his eyes drew down to a large package; small enough to naturally fit through his mailbox, just, yet still carefully laid down, blanketed by two leaflets made for charity drives. He hesitated slightly, but his interest in what it could be brought him to his kitchen, brought his fingers to the side, and then upwards.\n\nThe answer overwhelmed his curiosity the moment after. A loud bang fired as he was forced back, a plume of yellow smoke blasting the room. Pain seared across, the impact of a thousand knives superseded by raging burns. His ears ringing with a deafening screech, Shizuo tried to open his eyes, only to be met with yet more pain, forcing a scream that rapidly collapsed into a violent cough. Through the agony, his mind flicked to the obvious; it had been a mustard gas bomb.\n\nGiving himself just a moment for his pain to wash over once more, Shizuo attempted to force himself up, then forwards as his arms failed him, crawling forwards until finally finding a chair to force himself up onto. Shaking, he opened his eyes once more, bore the brunt of its fiery pain once more, looked at the box once more, noticing in moments not marked by agony a paper note. Though smudged and yellowed, its single word remained clear, written and underlined in bleeding, black ink; "Makegumi"."
brazil_adhemar.1020.a: "The King, checked momentarily by a Pawn."

brazil_adhemar.1021.t: "The Broken Alliance?"
brazil_adhemar.1021.desc: "The article hadn't landed, or so it was presumed. The headlines adorning the front of the Tribuna da Imprensa, declaring a set of lurid bribes given from Adhemar to the Shindō Renmei, brought laughter among the general public. Of course somebody got bribed, they exclaimed; it was Adhemar! But a genuine strategy? Ludicrous! Lacerda's paper had always aimed to straddle the limits between partisan and fiction, but this went beyond the pale of reason, surely?\n\nTo the Nikkei community, it was no laughing matter. Few had truly cared for them decades ago, and even fewer did now, but that wasn't enough for the police. Mere hours later, police cars were driving up streets, knocking doors and forcing their way into homes. Bails were generally posted where tribute was not given, alongside charges for theft, murder or assaults. No evidence would ever be given, but everybody knew what they meant, and everybody understood why police had become so hostile when questioned.\n\nThrough all of this, Kishimoto was in a furor. From the moment the articles were published, he attempted to smooth things over, claiming that Lacerda was simply scared that Adhemar found room to care for the little guy in São Paulo, for the community. But those who hadn't bought the articles paid him no heed. Many had grown frustrated with his careless overtures, or with his reckless corruption. And every time he tried to call for unity behind the President, that opposition only grew fiercer.\n\nAs the sun set, a discordant group marched towards the police station, demanding the release of their children, their siblings and parents. The officers standing outside stood their ground, a few daring to demand further premiums to ensure safety over discordant chants. The protest rippled, scorned by further attacks against a few present, but finally buckled. A few prisoners were granted leave, but it was clear where the power truly lay, and as they returned to houses filled with arguments, where it did not."
brazil_adhemar.1021.a: "And it wasn't quite with the PSP anymore..."

brazil_adhemar.1022.t: "Royal Flush"
brazil_adhemar.1022.desc: "Kishimoto had long since realised there were times where it was most prudent to keep quiet. Questioning from the police regarding his ties to the Shindō Renmei, questions over how calm he was around known informats, and now about why he was attending this meeting, a brief introduction and a few knowing nods from Laudo Natel supplementing conversation.\n\n"I appreciate your optimism, Adhemar, but I can't!" protested Vargas Jr., seemingly becoming more annoyed as the question continued.\n\n"I understand that you are concerned, but it'll work out, Junior!" responded Adhemar, patting Vargas Jr.'s shoulder. "Showing them that you share their concerns will do wonders to stop Quadros and the Integralists from worming their way into power."\n\nVargas Jr. listened for a second, but then shook his head. "And what about that news story? From one of the Lacerda rags, but I don't want to take the risk of being linked with those Kōdōsha terrorists." Even as Vargas Jr. pointed at him, Kishimoto simply smiled softly, allowing the pair to continue further. "Besides, they hate my father for what he did with the immigration ban. They will connect the dots between our names, I'm sure."\n\n"All of that's in the past, Junior. The communists hated him too, but those out of jail are happy to work with me." Vargas Jr. tried to voice a few more protests, but found his words dying in his throat. Kishimoto noted with concern that Adhemar only moved shakily, but that was the fate of men their age. Adhemar walked to the exit, followed by a few guards, before turning back around to face Vargas Jr. "I've booked a meeting for you with the Kōdōsha, and with Kishimoto. Make sure to keep in touch with them.""
brazil_adhemar.1022.a: "Advice turning to orders."

brazil_adhemar.1023.t: "Estar Feito Ao Bife"
brazil_adhemar.1023.desc: ""...are you sure that you have nothing on any of them?" Shizuo repeated, exasperated. He was certain that somewhere, somehow, there was a lead that would connect the Kōdōsha with Adhemar. He had yet to find anything truly damning, however, and as the day was coming to an end, he had only succeeded at whittling down his leads.\n\n"I'm afraid not, no," responded the clerk, looking through a file with lagging interest. "We have a few similar names in our archives, but nothing more serious than disorderliness in the war. I presume some might be family connections, but that's about it." She turned to another, opening up the front page and handing it to Shizuo. "It's certainly been a lot quieter here since Adhemar got into office, I've noticed."\n\nNodding his head slightly, Shizuo handed the file back. "Impressive that he's fought them at such a premium, huh?" He paused for a second. "Look, all I really care about is anybody with the name of 'Kishimoto.' Maybe a Tsuguo Kishimoto. I know he was arrested a few times for embezzlement, and he's still around today. Do you think you might be able to find anything on him?"\n\nThe clerk didn't even bother looking through available files this time. "We're currently transferring some of our older archives to a different facility. I don't know the name, and files can get lost, but I should be able to find where if you give me a day or so." she responded flatly, as her eyes turned to the clock.\n\nFinally, Shizuo buckled, a slight grimace on his face quickly being repressed. "Well, I suppose you can't blame bureaucracy." He scribbled Kishimoto onto a scrawl of paper before handing it forwards, giving her some information on who he was before finally wishing her well and leaving. Some of it, she conceded, she hadn't known about before. She looked towards the clock again, and then out the window, to the setting sun."
brazil_adhemar.1023.a: "With how much was in that bribe, she struggled to figure out where best to spend it."
brazil_baseball_tt_12: "The clerk seemed to hold high regard in Adhemar's legacy..."

brazil_adhemar.1024.t: "Closing Ranks"
brazil_adhemar.1024.desc: "Nothing in the past weeks had gone as Shizuo hoped. Any potential leads he had found were long exhausted; attempts to find files or police records had been met with dismissals, each more aggressive than the last. His paranoia ran deep, but he realised the risks of working off of that alone. Thinking back, his mind remained on his last meeting; a query from his editor on what leads he had found, and then advice to abandon the story and write on topics that actually had evidence behind them.\n\nHis considerations were cut short as he returned home. The door caught on something, remaining ajar, and Shizuo had to force himself in. He looked around, then down to a large package; small enough to naturally fit through his mailbox, just, yet still carefully laid down, blanketed by two leaflets made for charity drives. He hesitated slightly, but his interest in what it could be brought him to his kitchen, brought his fingers to the side, and then upwards.\n\nThe answer overwhelmed his curiosity the moment after. A loud bang fired as he was forced back, a plume of yellow smoke blasting the room. Pain seared across, the impact of a thousand knives superseded by raging burns. His ears ringing with a deafening screech, Shizuo tried to open his eyes, only to be met with yet more pain, forcing a scream that rapidly collapsed into a violent cough. Through the agony, his mind flicked to the obvious; it had been a mustard gas bomb.\n\nGiving himself just a moment for his pain to wash over once more, Shizuo attempted to force himself up, then forwards as his arms failed him, crawling forwards until finally finding a chair to force himself up onto. Shaking, he opened his eyes once more, bore the brunt of its fiery pain once more, looked at the box once more, noticing in moments not marked by agony a paper note. Though smudged and yellowed, its single word remained clear, written and underlined in bleeding, black ink; "Makegumi"."
brazil_adhemar.1024.a: "If you come for the King, you'd better not miss."

brazil_adhemar.1025.t: "A Country for Old Men"
brazil_adhemar.1025.desc: "It was a calm day in the centre of São Paulo. On a bench nestled between a park's vegetation, an elderly couple watched the world pass them by. The couple had lived in the area for decades, but even as it grew, the saplings planted around blossoming into full trees and the benches beneath slowly moving as their predecessors rotted away from damp and age, this one little spot had remained theirs.\n\nFrom the distance, the pair could hear Kishimoto, chants selling newspapers interrupted with momentary greetings to local community leaders. "There goes Kishimoto again," spoke Takakazu Haruno, chuckling slightly to herself. "With how much he took from the Shindō Renmei, who knew he was still looking for more? Not surprised that he's gone from one band of thugs to another, though."\n\nHer husband, Koda, simply chuckled. "Well, it certainly beats the number of people who used to sing Quadros' praises. At least we get a man willing to stand up to the Americans now." He searched for another name, one calling himself an Integralist, but he couldn't quite recall it. His face suddenly grew more grim. "I do wish that the police spared us, though. Every night now, I can hear some poor kid being thrown from their bed and into a jail cell."\n\nHaruno nodded in turn, looking down as a young cyclist passed them by. "Did you hear that Toyonubo's boy got arrested last night? Vandalism, they said! And just last year, he was the best in his school!" She laughed, but it was empty of anything but pain. "Adhemar said that he's trying to crack down on it, that he's talking to people on the inside."\n\nKoda listened for a moment, then nodded. "That would be good, yes." He looked down the hill, towards a playground filled with young children. "We need to stand up for ourselves at some point, but for now, it's good that people like Adhemar are willing to take a stand on our behalf.""
brazil_adhemar.1025.a: "The President becomes a champion once more in the national consciousness."

brazil_adhemar.1026.t: "Gaijin"
brazil_adhemar.1026.desc: ""Kishimoto has been irreplaceable in maintaining the public opinion in São Paulo," Adhemar paced as he spoke, "as has the corresponding support of the Kōdōsha. These are entrenched connections and votes for us; we cannot afford to waste them!" Within one of the many private offices of the Palácio dos Bandeirantes, President Adhemar had convened Tsuguo Kishimoto, Laudo Natel, and Getúlio Vargas Jr. to touch bases on public strategy in the city, especially concerning Vargas.\n\n"What I'm primarily concerned of," Vargas Jr. finally spoke up, "is whether the Japanese will even accept me in the first place. I'm no fool to what they've said about my father, and I have no doubts that they will likely share a similar reaction for me."\n\nAdhemar sighed, gesturing for Vargas to stand. Both men walked to a nearby window, where neatly kept yards of grass gave way to outcrops of forestry and nearby housing. "Tell me, what have I accomplished here?" Vargas paused, uncertain of such a rhetorical question.\n\n"I'll tell you," Adhemar responded. "I've managed to win over a group of near-militant Japanese ethnics about roughly the same time as I've won over the Communists, the very same group who supported excluding the Japanese in the first place." He patted Vargas' shoulder, shooting up a smile. "If I can do that, then what can't the son of Vargas Sr. do?"\n\nVargas could only silently nod at this. "I understand. I'll ensure that Kishimoto advises me carefully going forward..." He turned to see Kishimoto still sitting. A curt nod was given. "...when overtures to the Nikkei are needed."\n\n"Good man," Adhemar responded. The meeting continued for the better half of the afternoon. Yet, a critical objective had been achieved: Kishimoto would see that the Kōdōsha and the PSP remained intertwined long after Adhemar's eventual retirement from the presidency."
brazil_adhemar.1026.a: "Strategizing the long term."
brazil_baseball_tt_15: "Perhaps lifting the Japanese immigration ban may be in the cards in the future."

brazil_adhemar.1027.t: "Corporate Outreach"
brazil_adhemar.1027.desc: "The flashing and popping of cameras was like music to Kishimoto's ears, bearing a gleeful grin that greatly contrasted against the polite smiles given by President Adhemar and Hiroshi Urushima, inventor of Brazil's first automobile-fitted radio. It was a small precession of paparazzi, yet good publicity nonetheless; Kishimoto had arranged a meeting knowing well of Urushima's connections to the Sony Corporation, especially concerning its CEO Morita Akio. Such a meeting could only allow the rich connections between the presidency and the Japanese people to blossom. The public proceedings finally gave into a small, private meeting room, with Adhemar and Urushima sitting adjacent to each other on twin couches. "As you might already know, Your Excellency," Urushima sighed, "I am an immigrant myself."\n\n"This is true," Adhemar said, smiling, "and I know you've made quite a living in consumer electronics. It's quite impressive what Motorádio has managed to do for the Brazilian people. You should be proud."\n\n"Yet none of what my colleagues have achieved could have been done without crucial assistance from our partners in Sony. These are very talented people, Your Excellency," Urushima paused, mulling over his next words carefully, "and they could do so much more if you would allow technical engineers from the Sphere to work in our country." He moved a hand into his coat, producing a letter. He set it on the table in front of them, smiling. "Such a decision can only be mutually beneficial."\n\nAdhemar leaned back, focusing his gaze on the letter. Another gift, he supposed. "A tantalizing proposal, but I cannot. Not yet. Such a monumental request would require a constitutional upheaval that I am not equipped to handle yet." Adhemar reached towards the table, taking up the letter before stuffing it into a suit pocket. "Other priorities simply require my attention, though I will certainly consider it in the future." He smiled warmly, extending a handshake that Urushima tersely reciprocated. It eluded him whether His Excellency would truly honor such a vow."
brazil_adhemar.1027.a: "Always the pragmatist..."

brazil_adhemar.1028.t: "I Wanna Be A Producer"
brazil_adhemar.1028.desc: "For Adhemar, being president meant breaking the traditional boundaries of politics, laying before him a field of glass that more mundane politicians feared to tread. This, however, was very new to him, a thought that stuck with him as the excited cries of children resounded from outside the nearby windows of the Renaissance Hotel's lobby. Nonetheless, Adhemar wearily smiled at a beaming Kōji, a corporate representative of Matsushita who Kishimoto had set up to meet him.\n\n"My colleagues in Matsushita are in full agreement: we should film the fifth season of National Kid... here!" Kōji gestured broadly around Adhemar, eliciting a raised eyebrow from the president. "In scenic São Paulo!" Outside the empty lobby where the two men sat, there was an ongoing "tokusatsu fair," a festive attempt to publicize a curious Japanese television show that had enthralled many of Brazil's youth, despite its thinly-veiled purpose as a marketing tool for Matsushita: National Kid. It was quite the flop in the Sphere, yet an endeared audience had been found within Brazil.\n\n"Imagine it, Your Excellency; by lifting the immigration ban, you could transform this city into the Hollywood of South America! Imagine the tax revenue you could reap from such a venture, alongside the adoration of countless fans across Brazil. We would even be willing to tone down some of the more..." Kōji momentarily mulled over his words. "...corporate-inclined imagery of the show. P-perhaps you could even star in it, Your Excellency!"\n\nAdhemar shifted in his chair, mulling over the prospect. Before he could respond, Kōji reached from behind his chair, revealing to Adhemar an oversized novelty helmet bearing the likeness of National Kid. "Whatever the case, I bet the children outside would love to see their idol." He reached over the coffee table with the helmet. "Your Excellency?" As Adhemar took up the strange novelty, he peered into the white plastic of National Kid's eyes, and a smile soon broke out upon his face."
brazil_adhemar.1028.a: "Not all heroes wear capes."

brazil_adhemar.1029.t: "Cutting Edge"
brazil_adhemar.1029.desc: "Utterly marvelous, thought Adhemar, as he crouched down to inspect the device before him. He could scarcely believe his eyes at the electronics on display, its countless blinking lights flashing with activity as a labyrinth of wires snaked around his shoes and upon the computers' chassis. Indeed, the Fujitsu representatives saw the dazzled curiosity the president displayed before them, trading prideful smiles with each other. One particular spokesman stepped up to him. "Quite the product, isn't it? The FACOM 222 is one of Fujitsu's top-of-the-line computers and—if I dare say—the most advanced computational hardware to date."\n\nAdhemar rose to meet the corporate suit's gaze, nodding in approval. "Very impressive, indeed." Bulbs flashed as the two men faced each other. The Barueri warehouse they stood within had been set aside to accommodate Fujitsu's product line-up from Guangdong, all for the president's personal inspection. The men brought in from the Sphere were some of Guangdong's most influential spokesmen for Fujitsu's growing share in the international computer market.\n\n"We've been very excited at the economic prospects presented by your great nation, Your Excellency," the spokesman neatly brushed the lapel of his suit, "yet your ban on Japanese immigration has made things difficult for us. If it were lifted, we could easily expand our sales outlook and bring in technical experts to teach the Brazilian people how to utilize these computers to their full potential."\n\nIt was a tantalizing proposal, especially considering the technological advantage that Brazil could garner across South America with such equipment. However, such an amendment to the constitution would prove exceedingly difficult, particularly when other political matters weighed heavier upon his mind. Still, it was a vision of the future, perhaps. One where Brazil might embrace the silicon dream from Asia, for all of her people to benefit."
brazil_adhemar.1029.a: "A future of embedded circuitry awaits!"

brazil_adhemar.1030.t: "Only Up From Here"
brazil_adhemar.1030.desc: "The funicular shook to life with a shriek of metal before jerking forward, slowly beginning to rattle its way up the face of the Serra do Mourão and towards the town of Paranapiacaba. One of the Hitachi representatives couldn't help but grimace at the sight, pulling a handkerchief from his breast pocket and wiping his hands. "Very... rustic equipment, Your Excellency."\n\nAdhemar glanced at the representative, giving a cordial chuckle, before his gaze darted back towards Kishimoto. They had both hoped that the meeting could open up a wide range of business opportunities between the industrial titan of Hitachi and the still-industrializing Brazil. Yet, all Adhemar felt he was doing at the moment was embarrassing himself. Finally, Kishimoto interjected towards the businessmen: "We've been trying tirelessly to adapt Hitachi equipment to our own transit systems. British-era track and whatnot." Kishimoto momentarily peered back at Adhemar. "It's been rather a struggle."\n\n"Well," one of the representatives removed his glasses, wiping the clouded lens against his coat sleeve, "perhaps it doesn't need to be. If the immigration ban were lifted, our rail experts would be more than capable of assisting you in maintaining any Hitachi-brand devices." The representative saw the funicular, now rattling away in the distance. "Perhaps full replacements could be in order, at least in this case."\n\nThe proposal was an alluring one for Adhemar. He knew better than most just how antiquated Brazil's transportation industry had become, and the top-of-the-line equipment offered by Hitachi had been few and far between, especially without the technical experts to utilize such imports to their fullest. However, such an effort to amend the constitution would be tremendous in scope and in the political resources to embark upon it. Perhaps another time, when Brazil finds calmer waters domestically and can muster the courage to focus her attentions abroad."
brazil_adhemar.1030.a: ""Taxi, anyone?""

brazil_adhemar.1031.t: "Sore Losers"
brazil_adhemar.1031.desc: ""Strrr-ike!" The Mie-Nishi stadium lit up with cheers and scattered groans. The ninth inning had finally finished, and Team Aguia had lost on a strikeout. The late morning contrasted heavily with the tensions held by Aguia's most die-hard fans, even as they began trickling out of the stadium in droves. Soon, a boisterous voice cut through the western wing of the stadium: "What a rip! Did you see the way Kubota choked on that last swing? I bet he got paid to do that!"\n\nThen, a shove. A man grabs the heckler by the collar; another spectator, just barely holding back his rage. "That was my son out there. You got a problem with that?" Nobody could tell who threw the first punch, only that a brawl quickly ensued between the now-empty seats, amassing a small crowd that encircled the scufflers and chattered amongst themselves.\n\nA middle-aged man then emerged from the rubberneckers, his fists clenched and gaze focused squarely upon the two fighting baseball fans. Without hesitation, he took one of the men by the right arm and seized him away from the other, sweeping his right leg beneath his left and throwing him to the ground with a groan. Immediately, the other man dove at him; he responded with a partial deflection of his thrown punch before seizing him by the collar and right arm, stepping forward to throw off his balance. Letting out a bellow of exertion, the middle-aged man lifted him before throwing him to the floor in one motion, dazed and winded.\n\nHaving successfully defused this scuffle, the middle-aged man walked away without a word, his awestruck children in tow and a stunned crowd behind him. "Did you see that?" From the crowd, mutters of "sumi otoshi" and "osotogari" came from their lips; this man had demonstrated immense skill in Judo, unlike anything they had seen, and word would soon escape the stadium and trickle into the greater Nikkei community. Soon, it would even reach the ear of the president himself..."
brazil_adhemar.1031.a: "...And all would know the name of Sumitada."

brazil_adhemar.1032.t: "Brought to a Broil"
brazil_adhemar.1032.desc: "It had been a full day, and Sérgio Fleury's rage was growing. At first, he had written them off as jokes with a morsel of truth - Lord knows that he'd said worse. But jokes about the fury of even the pettiest Nikkei criminal morphed into discussions on the resurging presence of the Sakura Volunteer Army, and then on the worrying strength of the Shindō Renmei-\n\n"You wanted to talk with me, Sérgio?" asked a younger official, barely in his teens when the Shindō Renmei were put down, as Fleury flung the door open.\n\n"Yes, Giovane, I wanted to ask about what you know about this incident last month." Fleury threw a newspaper onto the table, pointing to a story almost hidden between advertisements and football results.\n\nGiovane looked down for a moment, fear fleetingly setting in before a diplomatic calm on his face as his eyes skimmed the words. "Didn't you hear? Some old guy broke up a bunch of hooligans with a few judo moves. Caused quite the scene apparently, and was only just out of Adhemar's sight. If only some of us were there to watch..."\n\n"And you refused to tell me?" shouted Fleury, shoving the paper aside. "The President turns his back for one second and these Nikkei, these thugs, feel emboldened like this?"\n\n"We-Well, sir, we don't have the resources at this time-I think if we talk to Adhemar about this, we cou-"\n\nFleury ordered Giovane to stand, looking down his nose as his junior officer stood up. "We've treated this Japanese fifth column much too lightly, I think. Surveil any groups of them that clog up the streets, make sure they know who controls Brazil.""
brazil_adhemar.1032.a: ""...and don't be afraid to step in if they start acting up.""

brazil_adhemar.1033.t: "Left in a Mess"
brazil_adhemar.1033.desc: "Chants reverberated across the street, with Sebastião Hiroshige Taki happily joining in. A local union was organising a march calling for better pay and improved job security - and, for once, had remembered that Nikkei workers too faced these issues. Sebastião had initially joined the wider mass of Nikkei strikers around the edges, but had fallen to the back as the march heaved its way across the streets of São Paulo, gaining new workers and chants only loosely explained by a breathless union organiser beforehand.\n\nHowever, just as he noticed the Nikkei, so too did he notice a rising police presence. A few made pretenses of concern for quiet, scolding strikers for specific words, gesturing to invisible children and through blinds to hypothetical wives. Other contingents simply blocked off roads, standing guard as the strikers were forced up hills, through intersections and away from markets, and most police cars that drove by were filled with officers barely disguising their disgust.\n\nAnd then, a cry rang out, from a front that Sebastião could barely see. Police officers massed across the street closed in, throwing protesters backwards and into cars, barking orders over megaphones and calling for a one-sided calm. Some stayed behind, holding officers back for mere seconds, but others scattered, fleeing in every direction and past most of the police officers. Sebastião took one last look at the crumbling crowd, at handcuffed Nikkei being packed into a van before running himself.\n\nIt took him several blocks for Sebastião to finally slow down, and several more seconds for him to catch his breath. Collapsing onto the side of a building, he felt a deep shame pervading him. It would have been a hopeless struggle, sure, but he could've offered genuine resistance to the mass arrests. If he had just a few minutes more to prepare, perhaps he could've bought a weapon to fight back, to defend himself from a threat that would not, perhaps could not, lift their boot off of his neck."
brazil_adhemar.1033.a: "Flight, then fight."

brazil_adhemar.1034.t: "Ear to the Ground"
brazil_adhemar.1034.desc: "It had been several days since the local march was crushed, and yet relics still remained: a handful of pamphlets resting on the ground, half trampled underfoot. Edna Lott had heard explanations and justifications from Adhemar as to the root cause of this protest, but as she flickled through a leaflet stamped in a brown outline, she still felt like outreach needed to be done beyond Kishimoto's group.\n\n"I may not have been involved in the protest, but it's hard to see where the fault was." spoke Kinoshito Michio, a restaurant owner in his early 30s. "So many of us struggle to make ends meet, and these attacks have only made the community more afraid to participate in... anything. The immigration ban doesn't help matters either."\n\n"The immigration ban?" asked Edna Lott. She had expected the concern to be raised here, but was still willing to hear out the explanation.\n\n"There's only so many of us in Brazil, Madam Vice-President, and we can't stand up against the police," responded Kinoshito Toshio, his retired grandfather, slowly inching to their side, pointing out the site of a few dilapidated settlements, rotting foundations riddled with weeds. "It gets tougher every day for any of us to live, and more people just move out entirely. We're not helpless, but most of us aren't getting any younger."\n\nThe younger man nodded. "Yes, and I have to say, this policy is not helping our economy at all. It's not the 1940s anymore, after all, and punitive laws like this only hurts our international reputation."\n\nTheir concerns began to sink in for Lott, as did the wider reality of their requests. She knew it would take a lot of political capital to overturn, but she knew that only Adhemar would be willing to spend it there."
brazil_adhemar.1034.a: "A crack in the status quo?"

brazil_adhemar.1035.t: "Straddling the Fence"
brazil_adhemar.1035.desc: ""BOTH SIDES TO BLAME FOR VIOLENCE LAST WEEK"\nAuthor: Shizuo Osawa\n\nLike many Brazilian citizens in São Paulo, I was horrified to hear the news of what happened in the last few days. Regardless of your views, hearing the level of violence that came out of that location must be utterly condemned. But how can we pretend this isn't endemic, that these would've occurred without willing participation from both sides? Both the police and us in the Nikkei community have a lot to reflect on...\n...\nWe all know where this originated from. A handful of cantankerous old men still nostalgic for the days of Lenin and Bukharin, ordering their student goons to march across São Paulo, a display of intense public subordination, frothing at the mouth as they chant for the heads of Lacerda, of Adhemar and Quadros. Is this really the best that fellow members of the Nikkei community like myself can bring? Are a few impotent extremists the most we can offer this country? I am glad that many within my community have denounced these protests, but we still need to go further...\n...\nBut despite this, it's impossible to ignore the role that police brutality played in this incident. I won't pretend that I don't empathise with the many moderates within, split between duty to their country and their community. But arresting men peer pressured into joining by radical friends treated like a fifth column, thrown into custody with no remit, left to rot in prison with no charge by men who treat them like filth? The police must fight to ensure justice, but so many fight for nothing but abusing their power. We need an inquiry into the police to ensure that a scandal of this nature doesn't occur again..."
brazil_adhemar.1035.a: "A delicate balancing act, tipped both ways by those who despise him."

brazil_adhemar.1036.t: "One More Out Of The Breach"
brazil_adhemar.1036.desc: "It was another day at school, but once again, the lessons that Hiroshige sat through mostly washed over him. His memories of the strike—of the police attacking them, of his cowardice in fleeing, of the insults against the strikers blared over radio shows and television programmes—continued to boil at his blood. Hiroshige nibbled at the sandwich in front of him, his eyes turned downwards, still reeling.\n\nSuddenly, another student moved forwards, quickly grabbing his attention. "Hey, it's me, André. We share a few classes together, mind if I take a seat?" Massafumi Yoshinaga threw his bag down, but kept a hold on the straps.\n\n"Of course, André, don't worry about it." responded Hiroshige, putting on a slight smile. The pair ran through basic conversation for a minute, asking about their days and family before turning onto more serious topics; of dying relatives and of crippling poverty.\n\n"Not like Quadros would say anything about it. Did you hear what he said about the strikes? Wouldn't know about taking a side if one just threw him in a police car!" exclaimed Hiroshige, his smile becoming more genuine. André chuckled, but then went silent for a moment before rummaging through his bag.\n\n"Not a big fan of Quadros either, eh?" he asked. "Well, I've got this article from a newspaper I was reading through, I think you'd like it." Hiroshige's eyes flicked over, but then widened as he saw the source; the Vanguarda Popular Revolucionária. "The VPR were going to have a meeting tomorrow night, and I was wondering if you'd be willing to come."\n\nImpulse briefly emerged in Hiroshige as he struggled for a reason to defend Goulart and to reject the militants of the Vanguarda, but his silence muted any potential defence. "Just tell me where, and I'll go.""
brazil_adhemar.1036.a: "There is a spectre haunting South America..."

brazil_adhemar.1037.t: "Cold Cases"
brazil_adhemar.1037.desc: "Only the glaring street lights above, glowing over kept Hiroshige awake, and even that had barely worked for Massafumi. When he had signed up to join the Vanguarda Popular Revolucionária, Hiroshige briefly held dreams of armed standoffs against bloodthirsty police, but the only signs of that were in a few crates containing outdated guns alongside food, water and medicines.\n\nPolice cars jolted them both awake. A few cones along a motorway outside of São Paulo rapidly gave way to a police checkpoint, lights blaring a bright orange. Massafumi briefly rummaged for money to bribe the approaching officer, but came up short as flashlights were shone on their eyes. As his mind quickly raced into fear, a pair of police officers slammed their knuckles into the truck window.\n\n"What are you two doing with this truck at this time?" asked one, his face obscured by the abyss of the night, and by the shadow of his hat.\n\n"Oh, w-we were just passing through. We've got a few perishable items that needed to be urgent-urgently delivered." Hiroshige stammered in response. It wasn't a falsehood - not totally - but he knew it wasn't being bought. "We needed to get some food, like, vegetables to some local shops before they went off."\n\nWithout warning, the door behind them opened up. A muffled conversation could be heard behind them, but neither could glean any details from it. The three of them stewed in silence for a minute, before the officer turned his head, asked for a few assurances and finally stopped. "There are fruits as well." A moment of panic was quashed as the officer laughed. "We just checked the back, and we can tell that you're not lying. You're free to go. Just be careful at this time of night, alright? Lots of vagrants roaming around with malicious aims." The pair, sparing no time for thanks, drove past in grateful silence."
brazil_adhemar.1037.a: "Beyond their gaze, the officers called to warn of a truck likely filled with weapons."

brazil_adhemar.1038.t: "Smells Like Trouble"
brazil_adhemar.1038.desc: "From the moment the door burst open, Sumitada knew something was up. Hiroshige had been staying out much later than he used to, but was always evasive as to why. Sumitada had mostly just written it off as a case of teenage rebellion, perhaps him drinking out late with a few buddies. But his panicked entry, followed by a door quickly slammed, gave him only a brief second to think otherwise before a knock at the door distracted him.\n\n"Sir, do you know if anybody came in?" asked a police officer at the front of a small group, his arms folded and nose scrunched in disgust.\n\nSumitada groaned, rubbing his eyes to mimic more fatigue than his adrenaline allowed. "It's getting late. Is there a reason you're talking to me?"\n\nThe police officer sighed. "We caught somebody driving a truck full of military supplies to a base held by radical communists, and followed him into here."\n\nSumitada was shocked, but refused to betray it. "I've raised my son better than that. He's been out to the shops, but he's just been revising all day. He's got a massive test tomorrow, so I'd appre-"\n\nSuddenly, the officers' attention shifted, prompting Sumitada to turn his head. Hiroshige was standing just outside the doorway, trying to hide but too visible by far. Sumitada silently cursed, but stood his ground as the police officers attempted to force themselves in, blocking the doorway. Lunging forwards, he grabbed the wrist of the first officer before throwing him leftwards and down. He repeated the motion for a second time, grabbing the other officer by his wrists before kicking his right foot down.\n\nJust as that happened, Hiroshige rushed forwards, trying to desperately apologise. Hearing a third officer call for backup, Sumitada simply shook his head before demanding that Hiroshige run away."
brazil_adhemar.1038.a: "From two fighters down to one."

brazil_adhemar.1039.t: "Ready to Rumble?"
brazil_adhemar.1039.desc: "Then a fourth policeman ran in. Sumitada prepared to do away with him too, but he realized it wouldn't be so easy—this man knew some kind of martial arts. Capoeira, it looked like, given his stance.\n\nThe officer, evidently more prepared than his two immobilized colleagues, began with a ginga then feinted. He followed through with a meia lua de compasso, firing a reverse kick at an alarming speed that spoke to his skill. Sumitada ducked to the ground, dodging in an almost capoeira fashion. Sumitada's uniformed opponent tried something else—a meia lua de compasso but different. Sumitada faintly remembered the move being called "rabo de arraia" or "escorpião". Returning to focus, he countered it with a de ashi harai throw which sent the officer off balance for a few seconds. Sumitada, a bit winded, was unable to capitalize before the policeman regained his balance.\n\nThe police officer, his beret somewhat askew, righted it as he regained his balance. He then did a martelo giratório, to which Sumitada responded with by lowering his center of gravity once again and countering with a sumi otoshi and then a tai otoshi. But then as he was about to deal another blow he heard sirens, then a shout of "Police! Halt! No sudden movements!" followed by a cry of shock.\n\nA line of policemen with weapons had arrived in reinforcement. Behind them was Chiyoko, evidently coming home from school, with her bags on the ground and a gobsmacked, open-mouthed look on her face. Sumitada rubbed the back of his neck."
brazil_adhemar.1039.a: ""Well. This is embarrassing.""

brazil_adhemar.1040.t: "Freedom Is Bought"
brazil_adhemar.1040.desc: "Sumitada had been in a room like this once. The sun blared through an iron-barred window, a small square cut high into the concrete wall. He stared into his palms, etched by veins and wrinkles, brushed his hardened knuckles, and saw them drip with black blood.\n\nThe bolted door clicked and shook. Sumitada did not sit up from the naked mattress, eyes barely lifting to see a familiar face.\n\nTsuguo Kishimoto came chortling into the cell, slipping a wad of cash into the guard's pocket. "It's been a long time. How have you been, friend? Aside from the arrest."\n\nSumitada looked into the light reflecting from Kishimoto's glasses, and stayed silent. Another laugh. "Quiet as ever. But the people around you? You've been the talk of the town recently!"\n\nA raspy sigh. Kishimoto came closer, smiling. "When I heard the rumors about an old goat dropping some coppers on the dirt recently, I knew I had to come see you for myself."\n\nSlowly, Sumitada shook his head. "What do you see?"\n\n"Why, a legend. What else?" Glancing at the door, Kishimoto kneeled down, and spoke into his ear. "Taki-sama, the other old men are moving again. Shindō Renmei is dead, but we are starting anew."\n\nA long silence came, before Sumitada lifted his face for the first time. Creased, bathed in shadow, his eyes glistening.\n\nKishimoto dropped the smile, stood, and offered his hand. "I've paid for your release. The fight, your commie son, forget it. They won't press charges." Sumitada bowed his head, took his hand, and shook it firmly. He believed Kishimoto when he said it. Out of all of them, he'd made friends in the highest places."
brazil_adhemar.1040.a: ""Go back to your kids, Taki-sama, and consider my offer.""

brazil_adhemar.1041.t: "Living to Fight Another Day"
brazil_adhemar.1041.desc: "As he approached his home, Sumitada searched for his keys through his pockets. Convincing Kishimoto to help him had been the difficult part, and he struggled to believe the sequence of events he had just been told. Adhemar had always been closer to the Shindō Renmei than anticipated, but even he found the idea of being directly tied to him difficult to believe. When he finally opened the door, his hands were immediately filled with Chiyoko hugging him in return, breathing a sigh of relief. Much of the room had yet to be cleaned.\n\n"Hiroshige!" shouted Sumitada, craning his head slightly. "What happened?" asked Hiroshige, sheepishly. "Look, I'm sorry about the me-"\n\nRaising a hand, Sumitada cut him off. "Don't worry about it, kid. I've got some friends in high places, and they're going to be looking out for you." Hiroshige's face registered shock, but quickly morphed into relief. "What friends?" he asked, his relief tinged with concern. "Have I met them?" Sumitada shook his head. "Just some old friends I knew in the war, and the friends they knew even before that. Nothing to worry about, and they're good, upstanding men." Hiroshige was getting himself into troubled waters, but he didn't need to know about his past with Kishimoto. Not yet. "You just need to know that you can stop hiding. The police have dropped their charges on us both."\n\nHiroshige smiled again, finally turning to join the hug. "Thank you so much!" he replied, his voice muffled. "Just make sure to go back to school tomorrow, kid," said Sumitada, quietly. They both knew how close they had been to arrest, and they both knew the consequences they could have faced. "And next time, make sure to be a little more conspicuous.""
brazil_adhemar.1041.a: "Adhemar's allies."

brazil_adhemar.1042.t: "Where Do You Think You Are?"
brazil_adhemar.1042.desc: "Events at the stadium proceeded as normal: Team Aguia won 5-2, with only a finger lightly on the scale. Victor and defeated alike shook hands, celebratory photos were taken, and the crowd left reasonably happy with the situation. The Taki family put on their coats and followed the outwards stream of the crowd. It dissipated out of the gates, but there were clusters still around. Chiyoko's eyes fell on one of the larger groups, and saw fellow Japanese. They had staked out a position just beyond the outer gates where the Takis had to pass, handing out mimeographed flyers, blue ink on white paper.\n\n"Support your nation!" one of them called out with practiced clarity. "Reverence, duty, freedom!" said another, improvising. As they passed by, Hiroshige refused and walked past; Sumitada scowled, turning his head slightly away as he passed by. Chiyoko, trailing just a little behind, was out of their sight when she picked up one of the flyers.\n\nThey called themselves the Sakura Volunteer Army, and their demands to the Brazilian state were printed for all to read. They wanted an end to the immigration ban, and Chiyoko agreed without reservation. They wanted Brazil to work closer with the Empire of Japan, and Chiyoko didn't have an immediate reaction either way. They called for the immediate and full repatriation of all Nikkei to Japan, and Chiyoko realised she had never been to Japan before. And for those Nikkei still stuck in the twilight of Brazil, an additional call: serve in the righteous wars of the Empire, and prove their-\n\n"Chiyoko!" called out Hiroshige. "What's taking so long?"\n\n"Coming!" she called out in response, tucking the pamphlet away in her coat pocket."
brazil_adhemar.1042.a: "She had already committed the address to memory."

brazil_adhemar.1043.t: "The PRP's Nikkei"
brazil_adhemar.1043.desc: "The rally had moved through the streets of São Paulo, their mottos just short of treason, their banners just short of a rising sun. They called for cooperation, freedom of travel and a call to arms for their race. At the square that concluded their rally, the SVA invited a man backstage to speak to them. The Sakura Volunteer Army were always happy to receive new sources of funding and support, and in the PRP they found a sympathetic ear. Just off the square was a small café and a private room on the first floor. Shiro Kyono walked inside to find three men of the SVA, a portrait of Hirohito on the table. He shook their hands, took a seat, laid his hat on the table. They poured tea for their new guest.\n\nHe said they have much in common. He hid the differences, played up the similarities. They, too, were concerned with lax morals and the need for discipline. They, too, wanted closer ties with the Empire of Japan, no matter the cries of "fascist" that erupt from the dissolute. He points to some in the crowd who are themselves card carrying members of the PRP.\n\n"And there's more that won't admit it, but vote every election for us." Kyono took a sip of the offered tea. He flashed the SVA men a casual smile. "Do you know how many more of us there could be? Had we not been stranded here, had Prestes and the communists not supported a ban on our brothers and sisters joining us? They know that we are exiles as much as we are citizens." He set his saucer back down on his plate. "I know you have your love for Adhemar, but the PSP isn't the only party with our needs in mind. Don't be fooled, gentlemen: there are other parties that support the Nikkei.""
brazil_adhemar.1043.a: "He flashed a smile baring teeth. "Just remember that we have your back, too.""

brazil_adhemar.1044.t: "The PSD's Nikkei"
brazil_adhemar.1044.desc: "Though he shuttled between dinner parties, stump speeches, and mass rallies, he never felt like he was moving. The world merely shifted into place, unseen hands moving the sets while he stood still, waiting for his turn to speak again. He smoothed the lapels of his suit, even though he was sitting in front of a microphone in a recording studio.\n\nThe host introduced him as "Yukishigue Tamura, PSD deputy, friend of Kubitschek, perhaps the most successful Nikkei in Brazil," and he accepted the role he was now given. The script called for a hostile tone. The host asked him his feelings about the Adhemar government, and he knew what the PSD wanted him to say. He offered the standard accusations and recited the party line. He knew that this did him no favors. Most Nikkei believe that Adhemar de Barros was perhaps the only politician who ever looked out for them.\n\nA co-host enters his line of sight. "Tamura-san," he says, rushing through the honorific, "I wanted to ask you about the recent brawl between the police and the pro-Japan group called the Sakura Volunteer Army." A fluttering disapproval briefly forms on his face. "What are your thoughts?"\n\nThere was no script for this question. Tamura cleared his throat and improvised. "I know that many of my countrymen feel strongly about the at-times overbearing police presence in our neighborhoods. But I want to stress that it should come as little surprise when militant groups come into conflict with the police. They have chosen a life of violence, and all that violence will, eventually, be turned on oneself."\n\nThe interview ends soon after this. When the scene shifts again, he will find himself before a crowd of angry Nikkei outside a small fundraiser. They will transcend political categories, united by a common hatred. They will say that his refusal to denounce the heavy-handed police is further proof again that this man deserves the title Comprador."
brazil_adhemar.1044.a: "He will walk away from them, but he won't get anywhere."

brazil_adhemar.1045.t: "Where Do You Come From?"
brazil_adhemar.1045.desc: ""Sakura Teishin-tai" said the sign that welcomed Chiyoko into the storefront. Inside was a campaign office like many others: desks and filing cabinets, men shuttling between them and women writing on them. Large posters dotted the walls with campaigns past and present. Her eyes were drawn to a corner of the room, a large workspace on which new posters were being drafted. She saw one of the artists hoist it up: "DOWN WITH COMPRADOR TAMURA!" in bold lettering.\n\n"Did you hear his speech over the radio too?" said a man who materialised at Chiyoko's shoulder. She took a step back.\n\n"Yeah. He doesn't have any respect."\n\n"No, he doesn't." He shook his head. He looked young, maybe a bit older than her brother, with his short hair, sweater and glasses; a young professor more than a student. "But you're not alone. Ever since he ran his mouth, we've had dozens of volunteers. Are you looking to join them?"\n\n"I am," said Chiyoko. "My name's Taki Chiyoko." From beneath his glasses, his eyes flicked open, then resumed their half-lidded coolness.\n\n"Chiyoko." He rattled the name around in his mouth. "Nice to meet you. My name's Endō Takashi. Alright, Chiyoko, how about you go help them make some signs?"\n\nNodding, Chiyoko and Takashi approached the table. The women stood up, welcomed her warmly. There was something in the eyes of those she was meeting here, something touching and welcoming. In this office she felt a deeper connection to something she'd rarely thought about before: a homeland that was not this soil. She sat down, took a stencil and began to compose a new sign."
brazil_adhemar.1045.a: "A home away from home."

brazil_adhemar.1046.t: "Who Do You Think Was Before You?"
brazil_adhemar.1046.desc: "Today marked Chiyoko Taki's third day with the Sakura Volunteer Army. Among those volunteers were some students at her level—most of the younger people, like her mentor Takashi Endō, were university students—but she had fallen in with a group of middle-aged housewives assigned to the Sign-Making Battalion instead. They were friendly, bordering on doting, always inviting their collectively-adopted daughter to lunch, always praising her skills in art (amateurish, but developing) and rhetoric (surprisingly provocative). With a new rally coming up, the self-styled Sign-Making Battalion were spitballing new ideas for slogans and designs.\n\n"Well, you girls are having fun," said Takashi, emerging from Chiyoko's side. "Chiyoko, can I speak with you for a minute?"\n\nChiyoko felt her guard rise up, but she followed Takashi to his desk. He adjusted his glasses before he spoke, a sign that she had learned followed a nervous or probing question. "Chiyoko, is your father's name Sumitada?"\n\nHad he asked this at the beginning of her time in the SVA, Chiyoko might have frozen up, lied, and found the first excuse to flee. Instead, the question merely raised her eyebrows. "Yeah, uh... Yeah, that's my dad's name. Why? Do you know him?"\n\nShe was worried what list her father might be on, but Takashi's smile dissuaded such thoughts. "Oh, he came up on a routine mailing list check. Prospective subscribers, nothing too serious." He paused, his finger tapping on the desk. "Speaking of which, I know you like making signs, but we might have some more tasks for a dedicated girl like you. Can we meet up here in a couple of nights?""
brazil_adhemar.1046.a: "Chiyoko said yes, but her guard rose up again."

brazil_adhemar.1047.t: "What Do You Think You'll Do Next?"
brazil_adhemar.1047.desc: ""Hey, Chiyoko," said Takashi Endō, flashing a smile that bared a few teeth too many. "Ready to work?"\n\n"Sure," she said, suppressing hesitation in her voice. They met outside the SVA offices, but Takashi turned away and walked across the road. Halfway across, Takashi turned and waved her over. She turned back—through the window, the Sign-Making Battalion were writing more slogans against the PTB—and then looked back at Takashi, now across the road. She followed, fear weighing down her ankles.\n\nThey turned the corner and descended down an alleyway between a shuttered storefront and a small apartment block. Chiyoko felt nervous, on edge. She tried to recall those years of lessons her father put her through, worried that Takashi had been playing an angle all along. Past the dumpster, beyond the graffiti, Chiyoko was trying to look for escape plans if things had gone wrong. They approached an iron-reinforced door, and Takashi knocked on it three times. The peephole slid open. Two eyes glanced out. They flicked towards Chiyoko first, then Takashi.\n\n"I come from the countryside," said Takashi, "and would like to learn how to raise chickens."\n\n"What's she doing here?" Venom directed at Chiyoko. "Women aren't permitted here."\n\n"Relax." He leaned in closer. "She's the daughter of Sumitada Taki." The peephole shut with sudden haste. Chiyoko felt tense, a coiled spring ready to jump away. Then the door opened, and the doorman urged both of them in. Inside was a bunker from an old war film: Japanese men, sullen and square-jawed, with a table in the centre filled with maps and topped with an old radio. A flag of the Rising Sun was pinned to the wall opposite the entrance, and Co-Prosperity Sphere posters dotted the walls. When they saw Chiyoko they did not see an intruder, but an ally-to-be."
brazil_adhemar.1047.a: ""Welcome to the Kōdōsha, Taki Chiyoko.""

brazil_adhemar.1048.t: "What Are They All Up To?"
brazil_adhemar.1048.desc: "Hiroshige Taki stepped off the bus, stretched his arms, and watched it disappear into the next street. Outside, the streets of Liberdade were in the middle of a shift change; shops opened and closed, restaurants prepared for the dinner rush, and children were trudging back home from their study sessions. It occurred to Hiroshige that he usually saw Chiyoko by this point. He hadn't seen her here for a week—more, now that he thought about it.\n\nHe went walking through the streets, taking a longer route. While keeping an eye out for her, thoughts of Chiyoko faded away as he let his own worries and troubles consume him. He'd been thinking about his place in the world for some time. What he believed in, what he'd support—what he'd die for, if it came to that. It had all began when he saw the VPR for the first time, speaking what he'd only ever thought.\n\nHe stopped in the middle of the street, ran the other way and leaned around a shop corner. That was her, no doubt. Chiyoko, surrounded by housewives and- wait, that wasn't Endō, was it? They hadn't crossed paths yet, but he knew the SVA's assistant professor by reputation. He seemed too close to Chiyoko, even with the housewives around her. Surely—no, there was something beyond crude desire that united the two.\n\nYet even at this distance, he recognised a camaraderie between this small cluster of people, and feared the worst. Surely, Chiyoko was smarter than that. The Sakura Volunteer Army? Right-wing nutjobs who told young men like him to die in Indonesia, Malaya or whatever new frontier the Japanese Empire stuck its dick into that year? But he could see even from here that Chiyoko's face was one of resolve and faith. Whatever she had been told by these loyalists, she believed it."
brazil_adhemar.1048.a: "He resolved himself to speak to her about this once he had a moment of free time."

brazil_adhemar.1049.t: "What Have We Done?"
brazil_adhemar.1049.desc: "Sumitada Taki stepped off the train carriage, rolled his aching shoulders and walked down the platform. He passed by posters and advertisements on the station wall. One of them bore a picture of a beautiful Japanese woman: 30s, long dark hair, piercing eyes. It was like seeing her all over again. She died when he was away, when he had only a photograph of her tucked away in a bug-riddled mattress. When the thought of returning to her side kept him through the long nights where he held a shiv under the pillow, when he slaved away for pennies in the workshop and where he—\n\nAs he rounded the corner to his street, he heard shouting from his home. It was Chiyoko and Hiroshige, and them alone. He ran for the front door only to have to jump back when it swung open, Chiyoko mid-flight and Hiroshige behind her shoulder. The three looked at each other for a moment. Chiyoko, her eyes full of tears, slid past her father and ran out the door.\n\n"You're brainwashed, Chiyoko! Don't you get it?" Hiroshige shouted after her, but Chiyoko outran his chiding. She slipped beyond their sight, around the same corner. Sumitada glared at him, stepped in and shut the door. Hiroshige had a few inches on him, but his father's glare pierced souls.\n\n"What was that about?"\n\n"It's—" Hiroshige swallowed. Some code between siblings was about to be broken, and Hiroshige needed only a moment to justify it to himself. "Chiyoko, she's in with a really bad crowd. Not drugs or anything, but the SVA. You know, those fanatics? And now she's in with another group, this Kōdōsha, and I don't know where-"\n\nHe trailed off, stunned to see a face from his father that none had ever glimpsed before. His eyes were wide, his mouth twitched and his jaw drooped slightly. It looked like a face of abject fear."
brazil_adhemar.1049.a: ""Stay here," said Sumitada. "Do not open the door until I come back.""

brazil_adhemar.1050.t: "Where Are You Going?"
brazil_adhemar.1050.desc: ""I come from the countryside and would like to learn how to raise chickens.\n\nThe words were not hers. Chiyoko snapped her head behind her. She was staring into the looming presence of her father. How did he find her? She'd run quickly, and he hadn't followed her straight away. But here he was, at the doorway to the Kōdōsha.\n\n"Chiyoko. Go home."\n\nThe grille on the front door did not slide open. Instead, the door simply unlocked, creaked open by her father's voice. Chiyoko froze, and some primal fear reaction drove her away from him. She stepped into the door, and then broke into a sprint inside. Sumitada cursed, running in after her.\n\nInside, the Kōdōsha men saw Chiyoko run into their protection, followed by her pursuer: a middle-aged man in slacks and a wide-brimmed hat. He moved with languid fury, reluctant to even be here. Endō, young and brash, stepped forward.\n\n"Hey, old man," he said, his body in Sumitada's vision framed against the Rising Sun. "I don't think you belong here."\n\nSumitada scanned the room. Young men, always young, always so many foolish young men here. There was an old man in the corner, sitting down with a cane in hand, looking with faint recognition at him. Sumitada didn't recognise him, and nobody else here recognised Sumitada. Chiyoko was next to him, pressed into the corner.\n\n"Hey! I'm not asking you again." Endō stepped forward, once, twice, closing the distance and grabbing Sumitada by the shoulder."
brazil_adhemar.1050.a: "Sumitada grabbed his arm with one hand and drove his free palm into Endo's elbow, breaking it in two."

brazil_adhemar.1051.t: "Who Are You?"
brazil_adhemar.1051.desc: "There were twenty-one men in the Kōdōsha bunker who had dedicated their lives to the Japanese Empire. One of them was bawling, clutching his broken elbow. Another, who had broken his vows, stared at the rest. Chiyoko, who had yet to take her own vows, stared at it all in horror and puzzlement.\n\nTwo men lunged at Sumitada, shouting some profanity that cut off when they overshot and threw themselves into the wall behind him. Chiyoko blinked—no, Sumitada had thrown them himself. Another lunged in and threw a punch; Sumitada grabbed his arm, and momentum carried the attacker over his shoulder and onto the hard concrete. Another grabbed a nearby tanto, tried to slash at him, but Sumitada saw it coming and stepped out of the way, hooking his leg and hip and throwing him into the ground.\n\nThe Kōdōsha fell over each other in a panic to grab him, but Sumitada flowed between them. Chiyoko thought he was some whirling machine of pain, throwing bodies into bodies and sweeping them all up as if they were mere dust. Sumitada felt slower, years of rust and age that couldn't be shaken off, but blood was rising in his veins and anger imbued him with an energy he'd not felt in years.\n\nSome poor kid grabbed a fallen knife and raised it high, hoping to catch an overhead stab. Sumitada turned, grabbed the arm, and all will fled from the kid's body. He dropped the tanto and ran from the bunker. A rougher veteran tried to take advantage, rising up behind Sumitada and tackled him by the waist. He tried to grab his shirt, but Sumitada took hold of his fingers and pulled them back. A sickening crack and a pained yowl followed.\n\nHe rose, staring at the others. Some laid out in pain, others paralysed in fear. His eyes glided over Chiyoko, and focused instead on an old man in the corner. There was a sickening stare in the old man, matched only by the cold frustration in Sumitada's eyes."
brazil_adhemar.1051.a: "Then the old man began to clap."

brazil_adhemar.1052.t: "Who Am I?"
brazil_adhemar.1052.desc: ""Well done," said the old man, three more claps before his hands fell back to his cane. "I had almost forgotten how strong you were. It's a shame that I had to be reminded like this."\n\nSumitada looked back to Chiyoko. "Let's go," he said. For a moment, Chiyoko was paralysed, staring at her father surrounded by broken bodies, clutching at their wounds and groaning. "Chiyoko," he hissed, and the paralysis was broken. Chiyoko rushed to Sumitada's side, and the two left.\n\nAs they rounded the corner, the old man's voice called out to them: "Farewell, Butcher of Tupã! We'll be here when you come back to us."\n\nChiyoko never forgot that nickname, and she never brought it up. As they left, she saw in her father's eyes a great pain. She saw that pain again when he suddenly turned around in the middle of their journey back home, as he leaned in and held Chiyoko by her shoulder.\n\n"I'll tell you everything, one day. I'll tell you everything I went through with them. Every mistake I ever made. But I beg you: never return to them again."\n\nThey never talked about it again, and she never went back to the SVA or the Kōdōsha. When they returned home, they listlessly moved through the front door. Chiyoko trudged up to her room, and Sumitada shuffled over to the living room, slumping on the chair with a defeated thud.\n\nWhen he saw his father, beaten and tired, Hiroshige looked up from his lap, his fingers finished twisting in nervous energy. "Dad, is Chiyoko back? What happened? Is she—""
brazil_adhemar.1052.a: ""It's alright, son," he said, his eyes focused on nothing. "It's alright now.""

brazil_adhemar.1053.t: "Ghost Stories"
brazil_adhemar.1053.desc: "It started, as these things often do, with whispers and in hushed tones, as if to say it any louder would invoke its presence. An old man who still possessed insurmountable martial strength in his wizened hands. A master of judo who took down a hundred men in a brawl without breaking a sweat. The wrinkles may run deep, and his skin may be as hard as leather, but he moved like water, sliding across his foes and redirecting their energies against themselves.\n\nThe story broke containment. The rumours reach beyond the Nikkei, and among the more bigoted of São Paulo it is taken as proof positive that the Japanese are a brutish and violent race. Among a section of that section are the São Paulo police, who considered setting up a task force to deal with this man. The task force went nowhere, an errant daydream. The police had greater problems than an old man who knows a bit of judo.\n\nThe story reached higher levels. The rumour crossed the desk of one Tsuguo Kishimoto, who regarded the whole thing first as a joke, then as a nuisance. He knows what this is really about, and decided he was better off keeping it an urban legend. To those in the know, he reassured them it's all a misunderstanding. Active minds and paranoid thoughts, crossing over into loose talk. He knew better, and he knew it was better this way.\n\nThe story made its way to its subject. Sumitada Taki overhears the rumours at work. For a moment, he was on edge, suspicious of lingering stares or whispers. Nobody suspected him, and he let it go the next day. The rumours dredged up old memories of what he once felt on his hands: warm blood and cold iron, bones that broke and bars that held. He regretted, briefly, lapsing into old patterns. Then he returned home, to his children, and he remembered that the man he feared was dead. With little warning, he hugged them both, stating that he will always love them."
brazil_adhemar.1053.a: "The Butcher of Tupã remained in his grave. Sumitada Taki no longer needed him."

brazil_adhemar.1054.t: "Sōshiki"
brazil_adhemar.1054.desc: "For the first time, a picture of a Brazilian Portuguese was placed amidst the panoply of flowers and craftsmanship traditionally afforded the deceased of Japanese ethnicity. The militants of the Kōdōsha considered it to be appropriate as a sendoff for Adhemar de Barros, the only politician that had ever looked out for them.\n\nThose of them that had plausible deniability had already attended those Catholic funeral rituals that were open to the public. Now, one month later, it was the Kōdōsha's time to mourn, treating his demise like that of a senior member of their own community. The late Adhemar was thus given the fullness of ritual that Japanese funerary customs afforded.\n\nAmidst the sea of tokkōtai and other Japanese Brazilians was a lone Portuguese—Vargas Filho. He showed soldierly patience and scholarly curiosity as he watched the obsequies take place. For this he was rewarded with a funeral feast unlike any other he had had beforehand, which he enjoyed very much.\n\nBut the would-be President, his father's son and Adhemar's mentee, had other reasons to be present besides curiosity. He took Tsuguo Kishimoto aside and told him, "Mr. Kishimoto, I want to reassure you that the Kōdōsha will not lose my support just because Adhemar is no more. I place significant value on the PSP's relationship with you all, and I will do all I can to support it."\n\nKishimoto, slightly stooped by age, bowed deeply. "Duly noted with profound appreciation, Governor. I look forward to our future work together.""
brazil_adhemar.1054.a: "Shaking hands, the two looked almost wistfully at the black-bordered picture of Adhemar on the wall."

brazil_adhemar.1055.t: "Persistent, Isn't He"
brazil_adhemar.1055.desc: "Adhemar extended a hand graciously to Tsuguo Kishimoto, who warmly reciprocated it with a smile. It was a strange thing, the relationship they had cultivated throughout these years. Indispensable towards Adhemar's outreach strategies within the Nikkei community, there was scarcely another man in Brazil who could do the same job that Tsuguo had focused upon, be it in his reputation or particular skillset. And yet, the elephant in the room remained, much as it had for just about a decade: the immigration ban.\n\nAdhemar let out a dry cough as he lowered himself into his chair, eliciting a look of sympathy from Kishimoto. "You aren't as spry as you once were, that's for sure," he said with a chuckle.\n\n"Oh, you're one to talk!" Adhemar leaned forward from his chair, a playful smirk materializing. "Old man."\n\nBoth men's laughter filled the air of the Matarazzo meeting room, tucked in an office deep within the bowels of São Paulo. "Story of our lives!" Kishimoto pulled a handkerchief from his coat pocket, wiping the corners of his mouth before sighing. "Old and decrepit men, presiding over old and decrepit policies. None better exemplified than by the immigration ban, Your Excellency. We've analyzed the polling in national publications, and it's not just Nikkei that supports it. There is broad political support for the ban's suspension!"\n\nAdhemar's lips pursed. How many times would they have this conversation? "The amount of capital we could reap from Tokyo is near limitless," Kishimoto continued, "and your reputation as a reformer would only benefit." Adhemar disapproved of the tacit implication that his reputation as a reformer was insecure, yet the growth potential from rescinding the ban remained. He had failed to abolish term limits, after all; this could prove well as a consolation prize. Still, the prospect remained risky..."
brazil_adhemar.1055.a: "...Yet tantalizing all the same."

brazil_adhemar.1056.t: "It's A Sony"
brazil_adhemar.1056.desc: ""So, Morita-san, how have you been enjoying Brazil?"\n\nMorita Akio tried not to smile too much. Adhemar de Barros had really wanted to impress him once he heard that Sony's CEO would christen the founding of their new joint venture. Somewhere to the north, on Rúa Triassu, Brazilian and Japanese engineers were setting up their new offices in Sony-Motorádio's new headquarters. He attended their opening party himself; he was still fighting off a headache from the morning after.\n\n"It's certainly been a change from Honkon." Morita sipped at his tea, graciously offered by his host when he had turned down more alcohol. His translator kept up at a steady pace. "I suppose you've heard this a thousand times already, but on behalf of the people of Guangdong, thank you for lifting the immigration ban." A ban he, admittedly, had only heard of a few months ago, when this country surfaced on his radar. Yet he saw Adhemar's moustache twitch with delight.\n\n"You're most generous in your praise, Morita-san." Adhemar's praise was so staid and formal that it almost verged on parody, something that Morita had to smile through. "Your gift, similarly, is appreciated. In five years' time, Sony-Motorádio will be one of the greatest companies on Brazil's markets." He held up his glass. "And we'll both benefit from its success."\n\nMorita's gift lay on Adhemar's desk. It was a classic: a briefcase filled with money. He had been told that was how you did business with Adhemar de Barros, and he was no stranger to commerce lubricating politics. The President certainly appreciated his gift, and Morita felt a strange familiarity watching him open up that briefcase. For a brief moment, he felt as if he was seeing some inverted version of himself: a businessman wearing a politician's suit, a man whose country's prosperity was his own."
brazil_adhemar.1056.a: "A sight he had seen before, a feeling he knew all too well."

brazil_adhemar.1057.t: "Galáxia 2000, Issue #XX"
brazil_adhemar.1057.desc: "NATIONAL KID S05E11: National Kid II confronts the corrupt President of Brazil over his dealings with the invaders from the Andromeda Galaxy. When the Palácio da Alvorada is attacked by the returning Incas, National Kid II must protect the President even as he uncovers his corrupt schemes. (Guest starring Adhemar de Barros as The President.)\n\nFans of the National Kid series may be disappointed by this lacklustre season, and this episode is sadly no exception. While the budget for this episode is substantially higher and they have access to locales they could only dream of before, everyone feels like they're trudging through old waters. The Incas look the same. They fight National Kid the same way, even if the new actor has more moves than Kojima or Tatsumi. Hardcore fans might even notice that entire lines of dialogue from the first season are reused here!\n\nWhile we at Galáxia 2000 try to refrain from discussing politics, it's impossible not to view this episode as anything but an advertisement for Adhemar's presidency and the PSP. Most of the episode takes place at the Alvorada, which is gorgeously shot like they're trying to sell you on a timeshare there. But because it's filmed on location, you can't have the fight scenes get too elaborate, so the most exciting minute of this show comes from National Kid having a farcical ray gun battle with Venusians around a conference table.\n\nThen there's the President, who spends most of the episode playing up this ambiguous good guy/bad guy routine, only for him to pull out a Magic Radio at the end of the episode. Plot twist: he's the good guy all along! He's been cutting crooked deals with other good guys out in the Andromeda Galaxy to protect us! Credit where credit's due, Adhemar is genuinely trying as an actor, and when he's playing himself it's not much of a challenge for him. But if this is what we're getting out of a National Kid season filmed right here in Brazil, then maybe they should've just stayed in Honkon."
brazil_adhemar.1057.a: "Hopefully Episode 12 lives up to greater expectations..."

brazil_adhemar.1058.t: "Tech Tips"
brazil_adhemar.1058.desc: ""Just there," Marcelo fingered towards an empty spot on the leftward bank of the laboratory, flanked by computers of similar monolithic design and function. Two workers wheeled in a narrow, slab-shaped computer, about the size of a refrigerator and roughly the same weight, before gripping its bottom chassis and carefully lifting it from its cart. Behind them trailed a group of four engineers—two Brazilian, two Japanese—watching with curiosity as the new machine was soon set down and slid into place against the wall.\n\nThe workers quickly began connecting the computer's sizeable power cables, to which the Japanese engineers gave a nod to Marcelo. "The FACOM-230!" They beamed a smile, seemingly proud at the mere presence of such a device. "A beauty, isn't it? Full usage of monolithic integrated circuitry, the first of its kind, with up to 64K memory capacity and a cycle time of 2.2 microseconds. Perfectly suited for analytical and research needs."\n\n"Yes," Marcelo nodded, peering at the Brazilian engineers. They seemed lost. Quite lost. The recent lifting of the immigration ban has quickly led to an influx of Japanese specialists in electronics on work visas, leaving many in Brazil salivating for their expertise. Still, there was clearly much to learn for even Brazil's top computer engineers and scientists.\n\nThe characteristic click from beneath the chassis indicated that the computer had power, whirring to life as one of the workers gave a thumbs up. One of the Japanese engineers, Sanjuro, smiled as he approached the machine, looking at the Brazilians. "Would you like me to demonstrate its printing abilities?""
brazil_adhemar.1058.a: "Marcelo chuckled sheepishly. "That would be nice, yes.""

brazil_adhemar.1059.t: "Old Tracks, New Tricks"
brazil_adhemar.1059.desc: "The Funicular de Paranapiacaba represented one of the oldest railroads in Brazil, built by the British back in the nineteenth century. When it was built, it was a great boon for São Paulo, but time has not been kind to the venerable funicular, and its systems have long fallen out of date compared to modern railways. So, when Brazil's finest engineers and politicians came together to revamp the old system, few could have anticipated the backlash the announcement would bring.\n\n"I just don't get it." Javier groaned out loud, his voice barely audible over the sounds of protests. He and his fellow engineers had spent most of the day in cramped conditions while the local politician tried to calm the crowd. "What do they want us to do, just let it rust away and become unsalvageable?"\n\n"Something about the British tracks having historical value, I don't know." Luiz took an irritated sip of his drink. "I think they're more annoyed by the idea of construction work around their hometowns. I can get it, but these old tracks are beyond maintenance at this point; the only way to get this up and running again is stripping it down and replacing everything."\n\n"Actually, I think we could avoid that." Sato, one of the new engineers from Japan, chimed in while overlooking documents about the old rail line. "Tracks like these are still used in Manchuria. The Hitachi corporation probably has all the parts we need, so long as someone is willing to foot the bill." Murmurs broke out among the crew before they settled into a series of nods and shrugs."
brazil_adhemar.1059.a: ""Eh, couldn't hurt to ask.""

##Assassination event chain

brazil_adhemar_assassination.1.t: "Guard Down"
brazil_adhemar_assassination.1.desc: ""SECRET/[?global.date.GetDateStringNoHour]\n\nFROM Agent Montanari FBI\nMEMORANDUM FOR THE PRESIDENT\n\nSUBJECT: Assessment of RND Expansion in Brazil\n\n1. Since the swearing of President Adhemar de Barros into office, the German Reichsnachrichtendienst (RND) has enjoyed unprecedented access to the Brazilian political sphere and security apparatus, at the same time as FBI operation in Brazil has been reduced. On the other hand, German intelligence services are not as present in the inner sphere of the President's contacts and it is believed he does not enjoy their total support.\n\n2. Bureau sources indicate that RND assets are now active across multiple urban centers in southern Brazil, especially São Paulo and Porto Alegre. Several front companies affiliated with German commercial interests are suspected to be operating as cover for intelligence-gathering. Recent intercepts suggest the RND is in contact with low-level officials in Brasília but there is little evidence for messaging with the federal Cabinet.\n\n3. During President de Barros's term, U.S. relations have been damaged as the government has rolled back intelligence and security commitments made by previous administrations. Relations with Germany have concurrently warmed over potential trade links, but the RND has stopped short of security coordination and overall remains wary of total realignment with the wartime enemy.\n\n4. The FBI recommends renewed operational strength in Brazil, especially after ongoing Bureau operations via REDACTED have been suppressed by local authorities. Consideration should be given to escalating diplomatic pressure on Brazilian officials, as well as looking into options as to exploit REDACTED.""
brazil_adhemar_assassination.1.a: "Fidelity, Bravery, and Integrity"

brazil_adhemar_assassination.2.t: "Hello, Lacerda!"
brazil_adhemar_assassination.2.desc: ""SECRET/[?global.date.GetDateStringNoHour]\nFROM Agent Montanari FBI\nMEMORANDUM FOR THE PRESIDENT\n\nSUBJECT: Press Statement by Carlos Lacerda on German Influence in Brazil\n\n1. Opposition figure and former journalist Carlos Lacerda has released a public statement in a national newspaper alleging extensive penetration by German intelligence of Adhemar de Barros' administration, sparking national outrage. In his remarks, Lacerda accused the President of willfully permitting Reich-aligned operatives to operate inside Brazil's political and security infrastructure.\n\n2. The Bureau can confirm that Mr. Lacerda published this information in the 'Tribuna da Imprensa' newspaper, having been its founder, while the article's contents have been quoted in several other news outlets and evening news broadcasts\n\n3. Mr. Lacerda's allegations closely mirror facts established in previous FBI reports, including the presence of suspected German cover companies and the unexplained removal of civil servants contacted by Bureau operatives. An internal investigation has revealed no possible internal sources of the leak. It remains possible the information was provided from within the Brazilian state or dissatisfied foreign actors.\n\n4. The setbacks this story poses for German-sympathetic elements of the federal government represent a strengthening of American interests in Brazil, despite the Bureau's ability to operate being hampered by hostility at the state level. Further review is ongoing to identify potential counter-leak strategies, compromised operatives, and political realignments prompted by this evolving situation.""
brazil_adhemar_assassination.2.a: "Fidelity, Bravery, and Integrity."

brazil_adhemar_assassination.3.t: "Cause for Concern"
brazil_adhemar_assassination.3.desc: "ATTN: To the Director of the Central Intelligence Bureau\nFollowing the last National Security Council meeting, I wished to privately convey my apprehension at the vast expansion of CIA HUMINT networks in the Brazil and across South America, particularly after Carlos Lacerda's announcement of widespread RND intelligence penetration of the Adhemar government. This is an overt action of such significant degree that the INR should have been brought in to these discussions before making contact.\n\nI will be blunt, Mr. Director, your rationale about discovering this during the routine investigation of an RND cell do not pass muster. The sheer level of incompetence in tradecraft to keep the names of so many high-ranking officials that would be handled across multiple HUMINT case officers is simply unbelievable. The IC and I are stunned by the lack of coordination you are showing. These are actions that have massive repercussions in our conflict against the RND and our relationship between Brazil and ourselves. We could have managed this to a far greater effect, but we were never consulted or even told until after the fact.\n\nSpeaking of a lack of coordination, this lack of communication between the CIA and the SIS can only end in disaster. Without coordination and synchronization, we are left with duplicative efforts, shared only belatedly through current intelligence sharing arrangements, which would mean a loss of effort and waste of resources. At worst, we are left with forces working to the same goal who aren't aware of each other. Need I remind you of when the German Army Intelligence and SS stumbled over each others' intel ops and shot the other for being traitors? Are you hoping for dead intelligence assets in country? Because it seems that this is what you are striving toward with this cowboy operation.\n\nI urge you to reign in your field officers before we need to escalate this to the level of a National Security meeting."
brazil_adhemar_assassination.3.a: "Signed, J. Edgar Hoover"

brazil_adhemar_assassination.4.t: "Gray Matters"
brazil_adhemar_assassination.4.desc: "Carlos Lacerda stood at the podium as the flashbulbs flickered and the cameras rolled. "Thank you all for coming on short notice. I've news to share with the country of dramatic importance." Lacerda gripped the redacted dossier in his left hand, hidden in a plain manila envelope as much as it was by the censor's pen. "I have in my hands a list of names of German RND agents that have cultivated high-level sources within the Brazilian government. This list includes copies of intelligence reports passed from multiple ministries and agencies, including the Ministry of Foreign Affairs, the Department of Public Security, and the Ministry of Defense."\n\nLacerda remembered when he had received the full dossier. It hadn't been from his usual SIS intermediary, but the gentleman in question had clearly been an American. He had called himself Mr. Cinza, a name that Lacerda already knew was false, and identified himself as being from "American intelligence," and had proffered no further clarifying details on the subject. As Mr. Cinza had said, he was unimportant; the people who truly mattered were those who had been turned into assets for the Reich. For both of their countries' interests, Mr. Cinza had said, Lacerda needed to have those documents.\n\n"I call for nothing less than the full enforcement of the law. These individuals must be arrested and tried for their treasonous crimes against the people of Brazil. I further call on these wronged citizens of Brazil to question how and why so many members of the Adhemar government would so willingly sell their homeland for Nazi gold."\n\nOne of the journalists for Folha raised their hand to ask Lacerda a question. "Could you tell us the source of this information?"\n\nLacerda smiled but shook his head. "The source is anonymous in the interests of their safety, but the threat is very real.""
brazil_adhemar_assassination.4.a: "The next day, a wave of protests hit the streets."

brazil_adhemar_assassination.5.t: "Top Secret Civil War"
brazil_adhemar_assassination.5.desc: "SFICI Memorandum 51762176-[GetYear]\nSubject: Conflicting American Intelligence Operations in South America\n\nThere has been an unusual escalation of American intelligence operations on the South American continent and within Brazilian territory in particular. These intelligence operations are conducted under the purview of the American foreign intelligence service, the Central Intelligence Agency, and do not appear to be under the same size and scope as previous American Intelligence operations conducted under the standard partnership between the Federal Bureau of Investigation and its child organization, the SIS.\n\nThe presence of these new intelligence operations undoubtedly presents a significant risk to Brazilian-American relations. The Ministry of Foreign Affairs is undoubtedly constrained in its approach to addressing this issue. Ostensibly, the CIA and Brazil's government are allied in their desire to contain German intelligence encroachment upon the South American continent, but there is an unmistakable affront to our sovereignty when American intelligence operatives can act with impunity in Brazilian territory. Exposing these operations would only serve to undermine our currently-existing intelligence relationship with the United States, and given that their objective is to undermine German intelligence networks on the South American continent and they have so far avoided targeting our own counterintelligence operations in theater, the SFICI has elected to suppress knowledge of these operations and restrict any reporting of these activities to the highest level of classification and need-to-know. We shall restrict ourselves to observation for the immediate future in the interest of preserving Brazilian-American relations and as a further level of plausible deniability against German RND operations."
brazil_adhemar_assassination.5.a: "If we ignore it, it cannot hurt us."

brazil_adhemar_assassination.6.t: "Wrong Number"
brazil_adhemar_assassination.6.desc: "Subject: MISDIAL\n\nCase Officer Edward Gutierrez has informed us of a new opportunity that arrived via a walk-in. Subject, given the preliminary name MISDIAL, has been identified as an intelligence agent of the SFICI, and has informed our organization of his imminent plans to assassinate Brazilian President Adhemar de Barros as he lies comatose. According to Case Officer Gutierrez, asset MISDIAL has expressed extreme anger at Carlos Lacerda's revelations at German intelligence penetration of the de Barros government. He thanked our agency, believing that we were responsible for discreetly passing the information to Lacerda as part of a greater push toward expelling German intelligence assets in South America. MISDIAL has been observed and vetted, and have concluded there is a strong possibility that he is not a dangle or false flag.\n\nThe SIS field office is deeply divided on what to do with MISDIAL. Many of our more cautious advisors recommend turning down any form of support or partnership. In addition to the obvious risks, any link to the SIS risks destroying our most lucrative intelligence partner on the South American continent and exposure risks pushing Brazil firmly within the Reich's influence, allowing them expansive economic and intelligence opportunities against the OFN.\n\nOther agents recommend allowing him untraceable cash and information under plausible cover to allow him to carry out the plan. They argue that MISDIAL is likely to act with or without SIS support and should maximize the chance that he succeeds to terminate any possibility of partnership with the Reich. They argue that the collapse of the Reich's partnership with Adhemar de Barros is in keeping with the agency's primary mission, and encourage discreet, deniable support."
brazil_adhemar_assassination.6.a: "Inform the case officer that he is to set up a meeting."
brazil_adhemar_assassination.6.b: "Inform the case officer that he is to terminate this relationship immediately."

brazil_adhemar_assassination.7.t: "A Plot Most Fair"
brazil_adhemar_assassination.7.desc: "Pedro Valante looked at the medical chart. Attached to its corner was a photo of the patient: smug, cunning. He put the chart down, saw the patient as he was: pale, still. From his doctor's coat he drew out a syringe, filled with nothing but air. He approached the IV bag and inserted the needle into it. Three slow squeezes of the plunger, then three fast. He withdrew the needle, wrapped it in cloth, stuffed it in his pocket and left.\n\nOutside, Pedro passed by black-suited men who took no notice of him. Rounding the corner, he lingered for a moment, a voice of caution screaming in his ear to keep going. He looked down at his watch, not looking at its hands. When he heard a cry of panic, he resumed walking. In the parking lot, a grey car with a man in a sweater was waiting. Pedro entered the backseat. "It's done. Drive." The FBI man nodded, started the ignition and drove out the front gate. Behind them, the hospital was working frantically to resurrect a dead man.\n\nAir embolism: not undetectable in a healthy man, but Adhemar de Barros wasn't. When they had crossed the city limits, Pedro let himself sink in his seat, open the window and raise a hand up to the rushing wind. There was money in the backseat, and more waiting for him in Guyana, but that wasn't why he did it. He thought of his father, fighting the fascists in Britain. He thought of Adhemar cozying up to those fascists. As far as revenge narratives went, it was simple and effective. It let him fall headfirst into this scheme and drove him to obsessive preparation. It let him forget that it really was only about the money.\n\nOutside, he felt the wind wrap around his fingers, cold and fast. He clenched his hand into a fist; the wind escaped his grip, ran over it like a river flowing over a rock. Pedro withdrew his hand, rolled up the window again."
brazil_adhemar_assassination.7.a: "Bound north, the car drifted along quiet country roads, fleeing a law that didn't know it existed."

brazil_adhemar_assassination.8.t: "A Plot Most Foul"
brazil_adhemar_assassination.8.desc: "Pedro stood above Adhemar, cloaked in shadow. He imagined what he would look like to the president if he was awake, a boogeyman. He had only a scarce few minutes to drip the poison into Adhemar's IV, and then escape the room before the guards switched.\n\nPedro snapped out of his observation and began to put the cyanide to Adhemar's IV. He was shaking, anyone would, he was going to kill the president of his country, he would be remembered as either the greatest hero or villain in Brazil's history. The poison slipped out of his hand, barely any of it ending up in the bag.\n\nPedro panicked, he was frozen trying to think if the tiny amount would kill the president, or if he should add more. He was frozen for too long. The guard returned.\n\n"Freeze!" He shouted. Pedro jumped out the window, falling three stories down to the entrance of the hospital. He landed with a crash, legs broken, with broken glass stabbed into him. Security approached him, and he heard from the window, "Bastard tried to poison him! I disconnected the IV! Get a doctor here!"\n\nAfter a few minutes a van came, not an ambulance, or a police wagon, just an unmarked van. He was dragged into it, and two men sat in the back with him, with a few tools. A hammer, pliers, spoon, and a knife. It didn't take long for him to admit."
brazil_adhemar_assassination.8.a: ""CIA... not FBI...""

brazil_adhemar_assassination.9.t: "Rogue Agents"
brazil_adhemar_assassination.9.desc: "John stomped into the CIA office, throwing the door open.\n\n"You, where's that caveman, Tom Latkowski?" He yelled at the first person he saw.\n\n"I'm sorry sir, but I don't think you're allowed here," said the worker.\n\nJohn pulled out his ID, thrusting it into the worker's face, "I'm with the FBI, now where the hell is Tom?!?"\n\nThe worker pointed to Tom's office, "He's on a call with his wife, so if you-" John ignored them and barged into Tom's room. He ripped the phone from the outlet.\n\n"Wh-what the fuck are you doing?!?" shouted Tom.\n\n"Listen here dipshit, you know your little excursion to Brazil?"\n\n"Is that what this is about? I've been getting calls about this mess all day. If anything it was good that we did it and not you twits at the FBI, we can still deny."\n\n"That dumbass assassin admitted to being hired by the CIA, how are you going to deny that?!?"\n\nTom threw his hands in the air, "I don't know, say it was Japan and he was lying or something like that."\n\nJohn put face in his hands, "They're... they're not gonna buy that, and then there's gonna be concentration camps in São Paulo..." The two stayed silent for some time."
brazil_adhemar_assassination.9.a: ""Sorry about ruining your call.""
