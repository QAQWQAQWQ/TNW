 POLITICS_LUTZ_GRAF_KROSIGK_DESC:0 "作为一位保守派律师和声名狼藉的前任财政部长，鲁茨·什未林·冯·科洛希克伯爵第一眼看上去不太像是那种统治一片德国疆土的人。他被可恨的冯·巴本任命为财政部长，并在纳粹党夺权之后通过放低身段、对希特勒的盲从和坚持党的路线保住了自己的位置。他依靠自己表面上的整合经济的能力取得了希特勒的信任和尊重，让他得以在50年代的经济崩溃之后逃过一死。不过这次希特勒的尊重没有保住他的位置。\n\n在失去财政部长的位置之后，他辗转数个政府部门，成为一个漂泊不定的文员。后来，元首对他大发慈悲，考虑到他的处境艰难，命他担任波默恩-摩赫恩保护领的保护官。\n\n科洛希克踏入保护领政坛时的心态一半是恐惧，一半是决心向元首展现自己的能力。自然，波默恩-摩赫恩作为一个国家可谓是千疮百孔，游击队频繁摧毁这里所剩无几的基础设施。要让这个保护领重新运作起来需要下一些功夫，也需要做出一些革新。当然，德国肯定不会喜欢这种革新，不过只要不让他们知道就没问题了。"
 POLITICS_KURT_DALUEGE_DESC:0 "库尔特·马克斯·弗朗茨·达吕格出生于一座西里西亚小镇，始终流淌着旧德意志帝国军国主义的血脉。他早年加入纳粹党，随即转入党卫队，于战前长期担任秩序警察总监。这项职位完美契合达吕格的反社会人格特质，他铁腕镇压游击队与异议者的效率堪称典范。\n\n1945年苏联战败后，达吕格被调任波希米亚——这种安排在他眼中无异于无故贬谪。尽管憎恶边陲之职，他却坚信自己必将重返德意志政治中枢，因而对其监管对象持续施加冷酷暴行。希姆莱发动政变时，达吕格只能枯守布拉格任所做困兽观。重返日耳曼尼亚的金色阶梯终究未向他敞开。\n\n核心权力圈失势并未真正击垮达吕格。他暗中在波希米亚培植势力网，甚至在西俄战争后悖离党卫队信条，与捷克抵抗组织达成灰色同盟：默许其在自己监管下壮大，必要时利用他们逐步瓦解驻军。内战爆发之际，他发动暗桩驱逐布拉格驻军，自封党卫队最高集团领袖。但除少数前党卫队残部外，无人愿为这场注定伴随疯狂行径的政变背书。\n\n在达吕格眼中，自己受日耳曼尼亚冷遇已太久。任凭欧陆腐朽之辈喧嚣吧。波希米亚权柄既入其手，无论是境内叛党、德国残部乃至勃艮第幽灵，无人能夺其分毫。"