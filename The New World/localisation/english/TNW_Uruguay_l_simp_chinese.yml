 URG_Homero_Martinez_for_desc: "§Y共和国外长\n埃雷拉主义§!\n--------------\n§L人们获得工作靠的无外乎能力、推荐或者裙带关系，而被白党任命为共和国外长的海军人士奥梅罗·马丁内斯·蒙特罗就有些意思了。马丁内斯·蒙特罗知道自己出身海军，他还是个成果颇丰的作家，针对乌拉圭河及其水域与岛屿的地理、历史和地缘政治或者18、19世纪蒙得维的亚作为海军基地的重要性等内容发表了多部作品。但他可不是名外交官，第一个承认这一点的就是他自己。\n\n新政府谋求在阿根廷乌拉圭两国间建立国际桥梁，其优先事项就是限定与阿国在拉普拉塔河上的边界，而这项工作有赖于马丁内斯·蒙特罗的研究，这就是这次任命背后的原因。因此，马丁内斯·蒙特罗被派去与阿根廷外交官针锋相对，而他会遵照军事纪律完成这一任务。即使错综复杂的冷战局势常常让他摸不着头脑，但他依旧会苦苦求索，为了党为了国家。§!"
 URG_Francisco_Forteza_for_desc: "§Y共和国外长\n自由激进主义§!\n--------------\n§L§!"
 URG_Cesar_Charlone_for_desc: "§Y共和国外长\n无支配体制\n傅满洲§!\n--------------\n§L查尔洛内博士以其多个绰号而闻名。最为人熟知的或许是他的“傅满洲”之名——这一称号源于他于1935年颁布的《货币重估法案》，该法案在不改变乌拉圭货币法定黄金储备的情况下，为国家创造了近五千万比索的收入。另一个赋予他的外号是“纳粹”，但只有阴险的左翼分子才会这样称呼他。塞萨尔·查尔洛内绝非纳粹，他只是一个荣获过金鹰勋章、可能曾两三次作为贵宾造访过德国的保守派政治家。\n\n查尔洛内博士在三月革命期间曾先后担任财政部长和总统为国效力，如今他重返财政部长职位，只为将乌拉圭再次从巴特列主义的蛊惑宣传及其委员会体制中解救出来。查尔洛内真心无意再度主政，他仅仅是总统的特别顾问，而现任总统仁厚宽宏，始终虚心聆听他的建言。§!"
 URG_Alejandro_Zorilla_de_San_Martin_for_desc: "§Y共和国外长\n埃雷拉主义§!\n--------------\n§L§!"
 URG_Juan_Felipe_Yriart_for_desc: "§Y共和国外长\n埃雷拉主义§!\n--------------\n§L§!"
 URG_Omar_Diaz_for_desc: "§Y共和国外长\n庇隆主义§!\n--------------\n§L自阿蒂加斯背叛联合省以来，乌拉圭臭名昭著的叛徒名单上最新的一个名字就是奥马尔·迪亚斯。历史上，贝南西奥·弗洛雷斯曾纵容巴西人蹂躏佩桑度城，迪亚斯与之相比也不遑多让：他全力支持着一个想把乌拉圭彻底踩在脚下的敌人。如果你问东岸共和国中哪一个法西斯同情者是最坏的，答案无疑取决于回答者，但奥马尔·迪亚斯肯定榜上有名。因为他是个货真价实的庇隆主义者，如假包换。\n\n但是，要形容迪亚斯本人的话，“败犬”大概比“叛徒”更准确。迪亚斯身负在乌拉圭传播庇隆主义的使命，但这些年来他拢共只拿到了1500张选票。迪亚斯能够成为共和国外长，唯一原因就是他和各路民族主义团体都有来往，从保守派到纳粹游击队，人人都和他有交集，他和各路人马进行的谈判有力地保证了阿格龙多的政变成功得手。然而真相总是丑陋的，由于他大肆鼓吹庇隆主义，而对阿蒂加斯主义不屑一顾，民族主义者们已经被他激怒，正在盘算怎么拿下他了……§!"
 URG_Juan_Carlos_Quagliotti_for_desc: "§Y共和国外长\n贵族保守主义§!\n--------------\n§L§!"
 URG_Juan_Carlos_Quagliotti_marzist_for_desc: "§YChancellor of the Republic\nAristocratic Conservatism§!\n--------------\n§LThe tenure of Juan Carlos Quagliotti as Chancellor of the Republic was another of the conditions that Aguerrondo and the Blancos demanded from Charlone to accept his proposal of him being appointed as the new Finance Minister, and Ribas being chosen as the \"apolitical\" military ruler of the nation until the 1966 elections if the coup was to succeed. It wasn't a surprise that Aguerrondo would demand for him to have a post in the administration, after all both were personal friends and Quagliotti supported his putschist ambitions with the relatively small network of aligned businessmen he had established.\n\nSaid network (and much of Quagliotti's merits to be considered a candidate for the Chancellery), were born of the myth that Quagliotti has built around himself, that he is a kind of \"superspy\", just a few phone calls away from the Führer. Charlone appears willing to tolerate these lies for the time being in virtue of having a reliable man, Juan Carlos Blanco, as the Vice Chancellor.§!"
 URG_Juan_Carlos_Blanco_for_desc: "§Y共和国外长\n民族保守主义§!\n--------------\n§L§!"
 URG_Armando_Acosta_y_Lara_for_desc: "§Y共和国外长\n民族保守主义§!\n--------------\n§L§!"
 URG_Juan_Eduardo_Azzini_eco_desc: "§YMinister of Finance\nRight-Wing Populism§!\n--------------\n§L\"The Reformer\", as he has been nicknamed, is an unusual sight in Uruguayan politics. Before Nardone, with Herrera's consent, appointed him Minister of Finance, Azzini was a political independent and a professor. The Ruralists trust him implicitly as the perfect man to implement their economic agenda. For the other Blancos, Azzini is their best hope to destroy the dirigiste economics that in their eyes have nearly bankrupted Uruguay.\n\nAzzini's pet project was the Exchange and Monetary Reform Law, which ended a byzantine, corruption-prone foreign-currency exchange system. During his tenure protectionism has also been largely abandoned, leading to the closure of local industries. But Azzini claims that job-creating foreign investment will eventually make up for this.§!"
 URG_Arturo_Lezama_eco_desc: "§Y财政部长\n社会激进主义§!\n--------------\n§L§!"
 URG_Luis_Alberto_Brause_eco_desc: "§Y财政部长\n进步保守主义§!\n--------------\n§L§!"
 URG_Salvador_Ferrer_Serra_eco_desc: "§Y财政部长\n自由保守主义§!\n--------------\n§L§!"
 URG_Juan_Jose_Gari_eco_desc: "§Y财政部长\n民粹保守主义§!\n--------------\n§L时间回到1959年，乡村派坚持提名加里出任共和国银行董事会主席，但遭到了埃雷拉的断然拒绝，他还留下了一句名言：“我坚决拒绝投票给这位候选人，是因为我非常了解他。他会给银行底下安上四个轮子，然后把它开回家。”\n\n加里和纳尔多内、阿里松等人类似，认为军队必须发动政变拯救国家。事实上，加里虽然是乡村派的重要领袖，但他是其实依靠自身的财富、人脉和影响力而成为了阿格龙多最重要的支持者之一。众所周知，乡村派和军方是盟友，所以财政部长的职位肯定会落入他们手中，但选择了加里倒是大出观察家们的意料之外。虽说加里对民主价值观并没有什么执念，但如若民主能得以重建，他可是有着各种大好前程，结果加里却把这一切都亲手毁掉了。不过对当事人来说，这没有什么所谓，只要经济大权握在掌中，自可赚得盆满钵满。§!"
 URG_Cesar_Charlone_eco_desc: "§YMinister of Finance\nAnocracy\nFu Manchu§!\n--------------\n§LDr. Charlone is known by various names. You might be familiar with his most famous name \"Fu Manchu\", given to him thanks to his Revaluation Law of 1935, which provided the state with almost 50 million pesos without modifying the legal gold backing of the Uruguayan currency. Another nickname given to him is \"Nazi\", but only the perfidious left calls him that. César Charlone is not a Nazi; he is only a conservative awarded a Golden Eagle and might have been a guest of honor in Germany two or three times.\n\nHe already served his country as Finance Minister and President during the March Revolution, but he has returned to his old post to save Uruguay once again from the Batllist demagogy and its Colegiado. Charlone truly doesn't desire to govern again, he is just a very special advisor for the President, who is kind enough to regularly follow his advice.§!"
 URG_Mario_Garbarino_eco_desc: "§Y财政部长\n民族保守主义§!\n--------------\n§L§!"
 URG_Modesto_Rebollo_sec_desc: "§YMinister of Defense\nHerrerism§!\n--------------\n§LGeneral Modesto Rebollo, unlike some of the Batllist-appointee civilian defense ministers, is unambiguously fit for the job. His experience is more than sufficient: he has service as director of the Military Institute of Higher Studies and Inspector-General of the Army under his belt.\n\nFurthermore, as he is affiliated with the National Party, the Blancos view him as a perfect candidate. Afraid of the Colorado-controlled military overthrowing them in service to the party of Batlle, the Blancos hope to use Rebollo to politicize the military in their favor. His willingness to support repression against students and unions is also a bonus in their eyes. But Rebollo, for all his perceived merits or demerits, is not Pablo Moratorio - he lacks the support of the Blanco-affiliated putschist in the army. He apparently doesn't want for a coup, even in favor of the Blancos, to happen.§!"
 URG_Glauco_Segovia_sec_desc: "§Y国防部长\n社会激进主义§!\n--------------\n§L§!"
 URG_Antonio_Francese_sec_desc: "§Y国防部长\n保守主义§!\n--------------\n§L§!"
 URG_Pablo_Moratorio_sec_desc: "§Y国防部长\n专制主义§!\n--------------\n§L巴勃罗·莫拉托里奥对政变并不陌生，这倒不是在说他经常策划政变，而是因为他的哥哥在1938年时就参加了“小暴动”事件。虽然莫拉托里奥本人没有加入，但他对其中来龙去脉一清二楚。事实上，对于参与军官密谋，莫拉托里奥一向态度开放，但如果计划行不通，他就会很快退出，并且假装毫不知情或者与他无关。\n\n作为白党的一员，莫拉托里奥在1959年被派去担任国家冷库的总经理。由于职务原因，他常在内务部走动，成了那里的熟面孔。因此，如果阿格龙多想要政变成功，争取他的加盟就至关重要。现在莫拉托里奥在国防部走马上任，但他对局势却是颇多微词。作为一位三月派将军，莫拉托里奥自然是亲法西斯的，但他讨厌庇隆，他觉得庇隆整天都想将乌拉圭踩在脚下。现在阿格龙多却在请求他的协助，莫拉托里奥觉得这实在是非常过分。但他依旧参与了政变，计划在成功之后攫取更多独立行事的资本。当他看到迪亚斯的名字出现在部长名单上时，更是为之忧心忡忡。§!"
 URG_Pablo_Moratorio_marzist_sec_desc: "§YMinister of Defense\nDespotism§!\n--------------\n§LCoups are not strangers to Pablo Moratorio, not because he is particularly a serial plotter, but because his older brother was involved with the Motincito back in 1938. Moratorio didn't participate, but he certainly knew of it. In truth Moratorio doesn't have any problems with joining military conspiracies, it is just that if he senses that is not going to work, he will leave it and treat the whole endeavor as something that never existed and/or that he was never involved with.\n\nBeing a Blanco, he was appointed as the President of the Frigorífico Nacional in 1959. In this position he became a familiar face to the people of the Interior; therefore, recruiting him was essential for the success of the Marzist coup. Now he controls the Defense Ministry both as a reward and to allay Blanco fears about Charlone stealing the torch of the revolution for himself.§!"
 URG_Pablo_Moratorio_falangist_sec_desc: "§Y国防部长\n专制主义§!\n--------------\n§L§!"
 URG_Juan_Pedro_Ribas_sec_desc: "§Y国防部长\n专制主义§!\n--------------\n§L§!"
 URG_Alberto_Demicheli_sec_desc: "§Y国防部长\n指导式民主§!\n--------------\n§L§!"
 URG_Tydeo_Larre_Borges_sec_desc: "§Y国防部长\n民族保守主义§!\n--------------\n§L§!"
