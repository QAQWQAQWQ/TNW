 POLITICS_COUNCILURG_DESC: "全国执政委员会，简称“委员会”，是何塞·巴特列-奥多涅斯基于瑞士联邦委员会而缔造的行政机构。巴特列认为，乌拉圭若不由总统，而是由一个权力分散的行政机构统治，那么独裁政权就永远不会出现。\n\n然而在巴特列派获得红党领导权后，红党便四分五裂，而保守派也对巴特列的改革表示不满。于是，巴特列派只能达成妥协：总统一职不会随着委员会的成立而废止，两者将共享行政权力。这一局面没能维持下去，加夫列尔·特拉总统废除了委员会并成为了独裁者。\n\n三月政权倒台后，乌拉圭实现了民主化，巴特列派终于能如巴特列所愿，在1952年重启委员会制。然而，委员会并没能使国家受益。相反，全国执政委员会在国务上总是拖泥带水，让民众苦恼无比。国会长期就废除委员会、恢复总统制的议题辩论，但一直得不出什么结果。根据乌拉圭宪法，只有在选举当天就获得35%的得票，修宪公投才有可能生效。民族党右派认为，这个标准就算满足得了，也要花很长时间。因此，政治家们开始探索§O用另类、极端的措施废除委员会§!。\n\n正如§R某人§!所言：“只要这委员会还在，不出五年§W白党§!就会胜选，不出十五年§s军方就会政变§!。”\n\n但愿事情不会到那个地步吧。"
 POLITICS_AMILCAR_VASCONCELLOS_DESC: "对巴特列主义者的一种常见批评是，他们将自身意识形态视为宗教，对此持教条主义态度且拒绝妥协。巴斯孔塞略斯可能是这一特征的最佳体现者，因为他对委员会制的坚定捍卫，使得本该平坦的权力之路变得荆棘密布。\n\n出生于阿蒂加斯的巴斯孔塞略斯青年时前往蒙得维的亚接受高等教育。他成为小学教师后，于1938年开始执教生涯，对教育事业形成了永恒且不可动摇的使命感。\n\n在蒙得维的亚期间，他见证了特拉政变和三月派独裁统治，由此涉足政治领域。他最终成为独裁政权的反对者之一，参与抗议活动。这段经历使他与路易斯·巴特列结识并建立友谊，成为后者追随者“少壮派”中的一员。巴斯孔塞洛斯通过参与十五人集团的活动，先后担任《行动报》主编、畜牧部长和财政部长。在路易斯逝世后，他显然将成为其继承人，但即使在委员会制被证明贻误国事之后仍坚持捍卫的态度，使他的地位岌岌可危——他曾在初选中险些败给豪尔赫·巴特列。\n\n他虽成功化解了那次挑战，但正统巴特列主义现已分裂为其追随者、支持红党与巴特列主义联盟的“红党统一阵线”和米切利尼的99号名单。巴斯孔塞略斯深知豪尔赫正在暗处伺机而动。若想不负路易斯的政治遗产，他必须找到既能有效施政又能重新整合巴特列主义阵营的方法。"
 POLITICS_MANUEL_FLORES_MORA_DESC: "也许弗洛雷斯·莫拉更适合担任国务委员而非乌拉圭总统，但选民已明确支持恢复总统制，因此他将顺应民意履行总统职责。\n\n作为十九世纪臭名昭著的独裁者维南西奥·弗洛雷斯的家族后裔，曼努埃尔·弗洛雷斯·莫拉（绰号“马内科”）于1923年出生。他自幼展现出写作天赋，酷爱文学创作。受乌拉圭作家胡安·卡洛斯·奥内蒂和西班牙作家何塞·贝加明等文豪影响，弗洛雷斯·莫拉成为“四五一代”成员——这个以作家为主的艺术群体活跃于蒙得维的亚及内陆快速城市化的时代。\n\n遵循乌拉圭常见发展轨迹，弗洛雷斯·莫拉通过新闻事业踏入政坛。其叔父为他谋得《日报》职位，后转投《三月刊》工作。在此期间的政论文章引起路易斯·巴特列·贝雷斯的关注，后者认为这个年轻人颇具潜力。马内科接受路易斯的邀请加入《行动报》，成为“少壮派”成员，并于1954年成功当选众议员，又于1958年连任。\n\n在巴斯孔塞略斯与阿夫达拉-豪尔赫·巴特列集团争夺15号名单控制权的斗争中，支持执政委员会制度的弗洛雷斯·莫拉始终坚定支持巴斯孔塞略斯，甚至被视为其副手。因此当1966年大选来临之际，他被推举为总统候选人，以奖励其忠诚服务。唯一的意外是他当选的是总统而非委员会主席，但马内科似乎能从容应对命运赋予他的特殊局面。"
 POLITICS_JORGE_BATLLE_DESC: "历史不会简单重复，却常有惊人韵脚。因其子嗣转向右翼保守主义，何塞·巴特列-奥多涅斯真正的继承人反倒是是侄子路易斯。如今相似剧本再次上演——路易斯的儿子豪尔赫成了自由派。\n\n这位在慈父荫庇下成长的年轻人（父亲总想给予他自己童年未曾拥有的一切），因三月派政府打击，童年时被迫和家族流亡而辗转异国。局势缓和后，豪尔赫归国，借1946年选举期间在阿里尔电台与表亲共事的机会，开启了自己的政治生涯，最终进入其父创办的《行动报》工作。这些经历磨炼出的政治手腕，令他1958年成功当选蒙得维的亚众议员。\n\n但此时的豪尔赫已形成独立政见，逐渐背离父亲的政治信念。路易斯坚称五十年代危机后其政策无可指摘、巴特列主义体系运转良好时，豪尔赫开始产生怀疑。当时他正与阿根廷女友交往，某次探访期间偶然参加哈耶克与米塞斯两位奥地利学派经济学家的讲座，由此产生了对自由市场经济理论的热爱——这份学术热情比那段恋情更为持久。\n\n父亲逝世为他的自由主义愿景接管15号名单创造了契机。他确实成功了，却不得不采取伪装策略：他不得不发展主义者的面目示人，深知这是派系所能接受的底线。如今就任总统的他将面临职业生涯的终极考验：究竟能将这个左翼团体向右扭转多少，而又不至受到反噬？"
 POLITICS_OSCAR_GESTIDO_DESC: "在三月派时期开启军旅生涯的众多军官中，奥斯卡·赫斯蒂多属于没有法西斯倾向、仅奉命行事的群体，始终保持着政治中立。\n\n赫斯蒂多对空军怀有深厚热忱，自投身军界便立志成为飞行员。他的确实现了这一理想，1926年他驾驶单引擎双翼机从蒙得维的亚飞往亚松森，作为乌拉圭官方代表团成员参加巴拉圭纪念活动。但这仅是起点——他持续晋升，1938年出任军事航空总干事，1949年晋升将军，1951年担任陆军总监任内，他推动空军正式成为独立军种，并对此深感自豪。\n\n退役后，满满印着可靠军人形象的履历为他赢得了乌拉圭铁路公司审计长一职。赫斯蒂多在任上展现出卓越管理才能，尤擅预算平衡。但真正塑造其传奇的是1959年洪灾期间，他出任国家救灾委员会主席时的表现。乌拉圭公众目睹这位正直官员不遗余力确保灾民获得应有救助，政界人士随之纷至沓来邀请其从政。\n\n如今作为总统的赫斯蒂多面临多重挑战：这位自称左派的政治家领导着红党右翼，既要削弱查尔洛内派影响又要维系党内团结，更需承担治国重任。尽管勤勉有加，但面对复杂政治机器时，他或许会陷入不知该按下哪个操作键的困惑境地。"
 POLITICS_OSCAR_GESTIDO_SAD_DESC: "白党将军队政治化的企图曾遭赫斯蒂多公开谴责，他表示，“任何国家若§R政治化§!其§g武装部队§!，终将沦为§B可悲范例§!之流”。然忠言逆耳，国家终尝苦果。\n\n最高法院政府虽竭尽所能，但律师终究难在外邦资助、卖国政府勾结的政变过后引领国家。新解决方案亟待探索，民族亟需强有力领导。于是民众开始仰望英雄，最终选择相信那位因1959年抗洪救灾铸就传奇的奥斯卡·迭戈·赫斯蒂多。\n\n这场推举其入主苏亚雷斯邸的运动中，赫斯蒂多本人却是最后入伙的。诚然，巴斯孔塞略斯在亲自出马竞选遭拒后，转而支持他——毕竟这位退役将军或能成为国家所需的公正领袖，弥补巴斯孔塞略斯曾经的缺失。最终，白党与红党联手说服老将军为国再度出山。\n\n他最终妥协，戴上总统绶带。新任乌拉圭总统肩负艰巨使命：既要抵御企图扼杀民主的外敌，又须平息国内要求严惩叛国者的汹涌怒潮。幸他并非孤军奋战：巴斯孔塞略斯与特赫拉支撑的民族团结内阁，军中佩雷拉与冉冉升起的将星塞雷尼皆为其助力。若众人勠力同心，或能为危局觅得光明出路。\n\n§Y对吗？§!"
 POLITICS_OSCAR_GESTIDO_MARZIST_DESC: "奥斯卡·赫斯蒂多被往事萦绕。1935年身为飞行员的他，曾参与定位内格罗河“盗匪峡道”的叛军营地——巴西里奥·穆尼奥斯正与五百部下用餐，炊烟暴露了行踪。营地遭轰炸后流言四起，但赫斯蒂多实际仅负责空中侦察，未参与空袭行动。彼时革命已告失败，此次行动不过是最后一击罢了。\n\n赫斯蒂多并未对此深思，直至1938年“小暴动”后目睹三月派政权日益专制且亲近法西斯。随着左翼思想萌芽，他开始意识到曾为政府效力的错误。他本有机会投身爱国运动，却选择为亲德势力而战——那些肆虐欧洲、尤其与英国为敌的势力。他纵可以“奉命行事”自我开脱，实则勇气匮乏。洛佩斯·西尔维拉已向年轻一代军人证明，如何在逆境中坚守正义。\n\n当听闻民主反对派策划跨境解放行动时，赫斯蒂多毅然请缨。凭借军事经验与1959年抗洪铸就的英雄声望，他迅速被推举为行动领袖。如今胜利或将使其名望比肩莱安德罗·戈麦斯等民族英雄，但这位老将军唯忧己身是否已尽涤昔日罪恶。"
 POLITICS_SUPREME_CORTE_DE_JUSTICIA_DESC: "1952年《乌拉圭宪法》第150条规定：§Y全国执政委员会§!由九名经人民直选产生的委员组成，并配备同等数量的候补委员，任期四年。选举保障与规则依照第三章规定执行，全国作为单一选区进行投票。\n\n第155条规定：若§Y全国执政委员会§!就职日已至，而新委员尚未完成宣誓，§M最高法院§!将在此期间临时代行行政职权。\n\n尽管理论上，这意味着最高法院仅应在1965年3月1日后接管权力，但由于当选的埃雷拉派-乡村派委员曾与阿圭隆多，更甚者与胡安·多明戈·庇隆合谋，红党掌控的军方决定在维护乌拉圭有别于拉美他国的法治传统前提下，加速权力过渡进程。最终，在罢黜所有民族党委员及候补委员后，行政权移交至最高法院。\n\n有人担忧最高法院无力引领这个经历外国策动政变后亟待复苏、又面临新一轮§g灰色恐慌§!的国家，这种忧虑不无道理。但在此危难时刻，无论身份能力，每个国民都应挺身报效祖国。"
 POLITICS_JORGE_PACHECO_ARECO_DESC: "被美国大使馆评价为“心地善良但才智平庸，恐难在塞萨尔去世后执政”的政治家自然难以服众。平心而论，这也是公众的普遍观感，但赫斯蒂多既然选定了帕切科，他便成为乌拉圭总统。\n\n帕切科1920年出生于政治世家，其父曼努埃尔·帕切科博士身为众议员，通过母系与何塞·巴特列-奥多涅斯存在姻亲关系（其父为巴特列妻子的兄弟）。外祖父里卡多·阿雷科是比埃尔派，少年帕切科选择追随其政治道路。这被证明是错误抉择——夹在巴特列派、里维拉派和索萨派之间的比埃尔派终因缺乏存在感消亡，部分追随者如爱德华多·布兰科·阿塞维多甚至转向三月派阵营。\n\n若非命运转折，帕切科或许会成为查尔洛内的附庸。所幸其与劳马尔·贾德的友谊及家族关系带来转机。友人父亲劳尔建议他利用巴特列家族人脉进入巴特列派喉舌《日报》工作。帕切科把握机遇入职成为记者，撰写支持赫斯蒂多竞选的文章并积累声誉，最终获得提名参选众议员与参议员。\n\n总统之路实属偶然：赫斯蒂多、红党与巴特列主义联盟要员不愿辞去国务委员职务参选，将军的密友们亦拒绝出任总统。为阻止查尔洛内借机安插亲信，急需推出候选人的情况下，帕切科最终当选。贬斥者称其平庸乏味，这样的评价是否属实，唯有待其任内自证。"
 POLITICS_MARTIN_ECHEGOYEN_DESC: "被称作“侍奉考迪罗埃雷拉的智者”的埃切戈延很快便违背导师意愿，坚持与乡村派结盟并淡化埃雷拉派的反美倾向。或许正是其过人智识使他意识到：若与埃雷拉背道而驰更有利可图，便可当机立断。\n\n这位埃雷拉主流派领袖的政治生涯起点出人意料——青年时期他隶属激进白党，即民族党内反埃雷拉的左翼分裂派系。然而这段经历昙花一现，埃切戈延改弦易辙全力支持埃雷拉，此举助推其仕途：他赢得后者信任后进入特拉内阁担任部长。其与三月派政权的勾连不止于此，他曾代表乌拉圭与纳粹德国谈判博内特角水坝融资事宜，期间亲赴第三帝国受希特勒接见，并获授纳粹金鹰勋章。\n\n自此“法西斯分子”的标签如影随形。与乡村派的联盟令其派系对美态度趋缓，相关指控有所削弱。但这显然背叛了埃雷拉的政治遗产，1962年大选中正统埃雷拉派获得可观票数，足以令埃切戈延惊觉必须采取行动。\n\n前路已明：唯有以彼之道还施彼身方能巩固地位。若成功，他将全面掌控埃雷拉派运动，作为这位考迪罗的合格继承人与伟大领袖载入史册。\n\n当然，美国人或许会对其计划施加影响。"
 POLITICS_ALBERTO_GALLINAL_HEBER_DESC: "阿尔韦托·加利纳尔·埃韦尔本可恣意挥洒人生，他本可成为画家、钢琴家、歌剧演唱家、杰出演说家、作家诗人、表演艺术家或名震遐迩的大律师——天知道还有多少可能性。但他选择投身公仆事业，与贫困、饥饿、文盲和疾病抗争。修缮医院、建造校舍、垦荒除棘、灭蝗挖渠，如今他成为了乌拉圭总统。\n\n作为巴特列-奥多涅斯时代著名牧场主兼政治家亚历杭德罗·加里纳尔的第四子，加利纳尔·埃韦尔早年经营家族庄园，后加入乌拉圭农村协会。凭借在马匹育种及防治疥癣、口蹄疫领域的突出贡献，他迅速崭露头角成为佛罗里达省分会主席，继而正式踏入政坛。1956年，他参与创建民主白党联盟，虽然在1958年国务委员选举中落败，但已用此举奠定了政治根基。\n\n从政之余，他持续开展标志性慈善事业：在赫斯蒂多主持的国家救灾委员会任职，主导乡村学校新校舍建设，翻修佩雷拉·罗塞尔医院产科及马谢尔医院等重大工程。政治参与亦未松懈，1964年因认定民主白党联盟腐败无能且对工会活动态度软弱，他与少数同志决裂创建罗恰民族运动，此举宣告民主白党联盟的实质性消亡。\n\n仅凭罗恰民族运动显然难以胜选，哪怕加利纳尔·埃韦尔亲自挂帅也是如此。于是，他选择与民主白党联盟残余势力“白党重建”结盟，获得选举胜利。不过，要想延续政治理想，当务之急是维系联盟的团结。"
 POLITICS_JUAN_PEDRO_RIBAS_MARZIST_DESC: "里瓦斯不过是三月派政权诸多保守军人中的一员——忠于祖国的乌拉圭爱国者，西班牙国民军的狂热支持者。他得以觐见偶像佛朗哥并擢升将军，这是对他忠于政权的丰厚回报。然其任期短暂，巴特列派蛊惑者旋即掌控国家，竟诬指他为阿根廷叛徒。暗示他会背叛挚爱的乌拉圭实属奇耻大辱，迫使他辞职以捍尊严。\n\n作为爱德华多·布兰科·阿塞维多的仰慕者，三月派政权覆灭后他加入其运动。得益于政治妥协，其仕途重焕生机——昔日的“政变阴谋家”竟被委以防范政变之责入阁，与路易斯·巴特列的紧张关系迅速升级为硬汉决斗：里瓦斯辞职而去，向路易斯发起挑战。此举令他成为极右翼宠儿，面对媒体声称“有民众恳请政变”时，他总以“不愿充当国民导师”为由拒绝。\n\n显然，里瓦斯已然改弦更张。执政委员会正是三月派1933年誓要铲除的祸患。当查尔洛内提议由他担任临时总统直至新选举，以完成未尽之责恢复秩序时，里瓦斯无法拒绝。可如今身处查尔洛内麾下，里瓦斯遭遇的仍是路易斯时代那种居高临下的家长式作风，他不禁自问，自己是否获得了应有的尊重。"
 POLITICS_JUAN_PEDRO_RIBAS_FALANGIST_DESC: "里瓦斯对乌拉圭的忠诚高于一切。他恪尽职守效力于三月派政权麾下的军队，若非路易斯·巴特列诬其为阿根廷鹰犬而令其蒙羞——但凡稍存尊严者皆会如他这般愤然挂冠而去——他本可继续效忠路易斯治下的政府。\n\n里瓦斯的入阁与去职同样迅捷。他深恶路易斯居高临下的家长作派，最终以与路易斯决斗为政治生涯画上句号。这番大男子气概的表演赢得极右翼狂热追捧，据其宣称这些势力曾恳求他发动政变，但被他以“不愿充当国民导师”为由拒绝。声名鹊起使他受邀参与阿格龙多政变，却在发现政变策划者勾结阿根廷势力后断然退出，此举印证了阿格龙多实为庇隆走狗。\n\n局势迫使里瓦斯组建自己的准军事组织民族主义防卫军协助挫败政变。尽管政变得以平息，但乌拉圭人永恒的宿敌“港口佬”无法接受失败，庇隆开始了血腥报复。普拉塔闪击战过后，敢于违抗布宜诺斯艾利斯的乌拉圭妇孺陈尸街头。东方子民怒吼着要将叛徒挨个吊上蒙得维的亚的路灯杆以惩其恶行。恰是这份复仇心将里瓦斯推向权力巅峰，他向忧心忡忡的民众许下期盼已久的承诺：\n\n§V乌拉圭人，永不再受辱！§!"
 POLITICS_MARIO_OSCAR_AGUERRONDO_DESC: "诚然，马里奥·奥斯卡·阿格龙多并非首个企图推翻乌拉圭政府的军人，亦非首位响应贝尼托·纳尔多内以政变解决执政委员会问题的号召者，但他是二十世纪以来首位成功颠覆政权，并最终加冕为国家统治者之人。\n\n若问其动机何在？首先，阿格龙多身为埃雷拉派，至少在原则上与巴特列派势不两立。如同众多强硬派（不仅限于埃雷拉派，更涵盖乌拉圭右翼整体）他坚信巴特派不是社会主义分子，就是意图摧毁国家的共产党傀儡，必须予以肃清乃至彻底消灭。这种对巴特列遗产及红色威胁的敌意并非秘密，正因如此，纳尔多内才任命他为蒙得维的亚警察局长。尽管起初难堪大任，他却借此为未来军事生涯铺路。晋升将军后，凭借毫不掩饰的法西斯主义倾向，他击溃了对其崛起忧心忡忡的反对势力。\n\n恰是其对法西斯主义的倾慕，令人误称其为法西斯分子，至少在他看来是如此。纵使其政变联盟中诸多成员崇拜希特勒、墨索里尼、佛朗哥或庇隆，于阿格龙多而言，这些皆属异域意识形态；他自视为纯粹的乌拉圭民族主义者，即阿蒂加斯主义者。\n\n何塞·赫瓦西奥·阿蒂加斯会支持阿格龙多的将行之事吗？他对此深信不疑，而任何试图反驳者，不是身陷囹圄，就是命丧黄泉——毕竟无人能动摇其信念。"
 POLITICS_PABLO_MORATORIO_DESC: "巴勃罗·莫拉托里奥的故事始于1938年，彼时他仅是陆军上校。其兄索尔参与“小暴动”阴谋，而莫拉托里奥早知此事。据称他向当局告发了这场密谋，然其说辞可信度存疑。无论如何，他因兄长之事获益匪浅。四十年代，莫拉托里奥晋升将军，人们公认他从属于三月派，1946年民主重建后，他仍受布兰科·阿塞维多与查尔洛内庇护。\n\n白党1958年选举胜利后，他凭借忠诚被任命为国家冷冻厂主管。此举令莫拉托里奥在内陆地区声名鹊起，成为军中政变分子眼中珍贵盟友。他们曾一度相信此人将助其建立梦寐以求的军政府，但终究大失所望——相较于忠诚于某种意识形态的密谋者，莫拉托里奥更是个机会主义者。他会毫无负担地投身某项事业，但若见到溃败迹象，他又会毫不犹豫地临阵脱逃。追求个人安全与福祉才是其至高信条。\n\n里瓦斯因试图将临时总统之位转为正式而遭罢黜，查尔洛内亟需提名一位能获得民族主义派及政变派支持的新总统（此时军队已遭清洗）。莫拉托里奥堪称不二人选。不同于里瓦斯，他甘当配角，唯求酬劳到位。"
 POLITICS_PABLO_MORATORIO_AGUERRONDO_DESC: "巴勃罗·莫拉托里奥的故事始于1938年，彼时他仅是陆军上校。其兄索尔参与“小暴动”阴谋，而莫拉托里奥早知此事。据称他向当局告发了这场密谋，然其说辞可信度存疑。无论如何，他因兄长之事获益匪浅。四十年代，莫拉托里奥晋升将军，人们公认他从属于三月派，1946年民主重建后，他仍受布兰科·阿塞维多与查尔洛内庇护。\n\n白党1958年选举胜利后，他凭借忠诚被任命为国家冷冻厂主管。此举令莫拉托里奥在内陆地区声名鹊起，成为军中政变分子眼中珍贵盟友。他们曾一度相信此人将助其建立梦寐以求的军政府，但终究大失所望——相较于忠诚于某种意识形态的密谋者，莫拉托里奥更是个机会主义者。他会毫无负担地投身某项事业，但若见到溃败迹象，他又会毫不犹豫地临阵脱逃。追求个人安全与福祉才是其至高信条。\n\n然而莫拉托里奥的品格中尚存一丝原则。他对庇隆及庇隆主义发自肺腑地厌恶。尽管曾对借助庇隆之力发动阿格龙多政变心存疑虑，但彼时外援对政变成事实乃必要，因此他而暂压不安。事实证明这是步错棋，正如莫拉托里奥所忧，阿格龙多与庇隆关系日渐紧密。莫拉托里奥恐惧这位上校终将使乌拉圭沦为附庸，决然废黜了自己亲手扶植的傀儡。如今他取而代之坐镇大位，考虑他还没有声明1966年选举举行与否，其显然是要巩固权势。"
 POLITICS_VENTURA_RODRIGUEZ_DESC: "围绕“必要之恶”这一概念的伪善者何其多。多少人以它为借口放纵私欲，犯下累累罪行。但本图拉·罗德里格斯不同。他是少数清醒者——明知所作所为是错，却依然含垢前行。他不会祈求宽恕，只想尽快完成这桩已成定局的差事，好告老还乡。\n\n单凭自身资质，罗德里格斯本无足轻重，但其民族党背景却令阿格龙多青眼有加。阿格龙多将罗德里格斯招揽至私人领地蒙得维的亚警察局，两人很快密迩无间。无论是高升还是被红党驱逐，阿格龙多都需要一个能托付后事之人，而罗德里格斯就是这个人选。当阿格龙多最终发动政变时，罗德里格斯已成为其核心盟友。\n\n他们成功了，共和国从巴特列派建立的委员会政府手中得到拯救。但罗德里格斯随即意识到乌拉圭面临更大危机：阿格龙多及其亲信拒绝交权。震惊的是，他发觉同僚们与自己不同，根本无意恢复任何形式的民主。\n\n这一发现令罗德里格斯不寒而栗。为避免成为历史书中的“第二个巴尔多米尔”，他开始密谋。当莫拉托里奥决意推翻阿格龙多时，罗德里格斯献上了内政部长麾下的力量。但他并非愚忠之辈，深知必须连莫拉托里奥也一并清除，遂在准备充分后果断出手。如今，他正进行着一项吃力不讨好的工作：设法让军方接受民主回归的现实。除此之外，罗德里格斯不接受任何替代方案。"
 POLITICS_DOMINGO_TORTORELLI_DESC: "从马加丹到蒙特雷（向西而不是向东，妈的），无论男女都没听说过多明戈·托尔托雷利的伟大（读作：荒谬）。在埃森皮这片野蛮的土地上，每一个试图洗白蒙面虐童犯的死妈没几把的人也都不认识他；至于那些瞎几把写SCP条目写的要么弱智要么搞笑，以至于那些条目被亚历克斯·基斯特收录进《慢得拉记录》的废物——不管你怎么质询他们，他们也不可能知道他是谁。\n\n惊不惊讶，傻逼？这货就是50年代蒙得维的亚的一个疯子政客，根本没啥知名度；你不会真以为他是什么东西吧，白痴？\n\n1938年，多明戈·托尔托雷利眼看巴特列派等左翼分子被禁止参选，便异想天开地决定代表自己的劳工协和会参选总统。他任命自己的妻子阿纳托利亚·曼鲁佩为竞选搭档，理由当然是裙带主义。他觉得自己已经占得天时地利人和，事实上确实……只是他没有成为总统，而是成为了尚且愿意驻足听他徒劳发怒的乌拉圭人的乐子。\n\n托尔托雷利有如下主张：每一个街角都应该装上牛奶水龙头；里韦拉到蒙得维的亚之间应该修一条全程下坡的路，这样货车就能节省燃料。他说他如果当选总统，就会颁布法令把日工作时调整为十五分钟。他说他要通过一份法律，保证所有满18岁者获得公职。还有比上述都要牛逼的：他承诺只要人民给他投票，他就会把药草、糖和酒的价格打对折！\n\n显然乌拉圭人都是群忘恩负义的贱逼，根本没意识到选托尔托雷利当总统的重大意义。结果是，他所赢得的票数不超过50票——不是50个议席，是50张选票。不过呢，他还是给自己找了个台阶下——他说肯定是汤米·道格拉斯、胡安·庇隆和路易斯·巴特列·贝雷斯联合起来，把他的宣传口号都偷走了！当然，这样的阴谋论完全是无稽之谈。他失败的原因是且仅是他是个脑瘫。\n\n你也他妈的是个脑瘫东西。这个国家（目前）根本他妈没内容，你干啥浪费时间跑过来摁~键然后输入“set_ruling_party esoteric_nazism”？建议你这种脑袋发育不良的玩意去看我的世界YouTube主播假装自己是史蒂夫（他们天天干这种事，别来@我找我麻烦），要不就去把TNO巴西之类的打个两把再回来！要么你就去煮个鸡蛋然后把壳剥掉，反正对你来说鸡蛋壳和薯片也大差不离。\n\n（汉化组注：仅为玩笑，勿要上心。）"
 POLITICS_PILAR_BARRIOS_DESC: "1930年，塞雷多尼奥·宁-席尔瓦博士在庆祝乌拉圭建国一百周年时写道：“幸运的是，乌拉圭没有出现‘令人不安的黑人问题或印第安人问题’，这些问题与美洲国家的普遍情况息息相关”。哪怕大家都知道大名鼎鼎的阿蒂加斯也有个像黑人安西纳这样的朋友，坎东贝也被尊为乌拉圭文化的独特元素之一，但非裔乌拉圭人的处境依然恶劣，他们依旧被乌拉圭社会完全排斥。\n\n1936年，为了打破这种处境，一个新的政党加入了白种人和红种人之间的鏖战，只不过他们的党派用黑色代表自己。黑人土著党是《我们的种族》杂志的后继者，由埃利莫·卡布拉尔和巴里奥斯兄弟创建，旨在“为有色人种的利益顽强斗争”，并支持“一切有利于有色人种进步和改善的工作、想法或倡议”。意大利入侵埃塞俄比亚促使其建立了“黑人反战反法西斯委员会”，后来他们又产生了一个建立像样的政党来捍卫非裔乌拉圭人利益。\n\n令人遗憾的是，这些努力毫无效果，黑人土著党在尝试取得议会席位失败后解散。由于中界大杂院被拆除，无奈之下，巴里奥斯决定做一件不可思议的事，他打开了控制台：输入'How do you turn this on'。20年后黑人土著党浴火重生，有了跑车之力，巴里奥斯开始对抗种族主义者。\n\n由于刷了很多的钱，巴里奥斯爆了数以亿计的僧侣，让乌拉圭人民皈依他的伟业，政界大佬们尝试反抗，但即便是新世界秩序下的走狗也无法抵抗'i r winner'之力，泛非主义乌拉圭诞生了，新乌拉圭对西非充满兴趣，巴里奥斯希望从法国殖民主义和喀麦隆帝国主义的治下拯救西非。"
