 URG_Victor_Haedo_hog_desc: "§Y委员会主席\n埃雷拉主义§!\n--------------\n§L无论如何，必须指出，阿埃多确实可跻身于令乌拉圭政治妙趣横生之徒之列。虽说他在埃斯特角城的公馆修的极尽繁华，你要是激起他的虚荣心，说不定他还能邀请你进去参观参观，但那其实是白手起家的结果。他出身于穷人家庭，完全是靠着在政界的摸爬滚打，才有了今天的地位。\n\n阿埃多曾是忠实的埃雷拉派，但一位公认的考迪罗不可能在一条路上走到黑。无数次的背叛，无数次的左右横跳，阿埃多终于走出了自己的道路。他公然提倡法西斯主义，搞得埃雷拉派同僚看他很不爽，想让这个败坏名声的家伙快些滚蛋。然而，他最近又钦佩起卡斯特罗和格瓦拉。埃雷拉的逝世给予了他掌控埃雷拉派的机会，他决不会善罢甘休。§!"
 URG_Faustino_Harrison_hog_desc: "§YPresident of the Council\nRight-Wing Populism§!\n--------------\n§LA former high school teacher finds himself in the historic position of being the last President of the Council of the Herrerist-Ruralist government elected in 1958. Certainly, Harrison has reasons to be proud of all that his movement has accomplished. But he can't shake off the feeling that tells him that he should do more, that he should try to save his country.\n\nGraduating as a notary public in 1928, Harrison developed his activity in the department of Florida. After the resignation of Alberto Gallinal Heber from the intendancy in 1951, Harrison took over as his alternate. Afterwards he was one of the founders and most important leaders of the Federal Ruralist Action League. Many Ruralists, like their leader Benito Nardone, have become disappointed in politics and want to retreat from the political arena and focus on unionism. But Harrison still sees the merit in political participation.§!"
 URG_Luis_Batlle_Berres_hog_desc: "§YPresident of the Council\nSocial Radicalism§!\n--------------\n§LLeft orphan at age 11, Luis was adopted and raised by his uncle, the renowned José Batlle y Ordoñez. José ended up being a father for Luis, and the young man decided to honor his memory by entering politics and expanding on his work. It was non an easy road, first he had to flee thanks to the Terrist dictactorship. And when it seemed that Baldomir would end it, he fell and Charlone took his place. When democracy was finally restored, his cousins, jealous of Luis' popularity, managed to name him Vice President of Tomás Berreta in a bid to stop his rise. But Berreta died and Luis proved to be an independent operator. None could stop now his attempts on honoring the life of his beloved uncle.\n\nCredited by the prosperities of the 50s and the economic crash that shattered the Colorado hegemony in Uruguay, Luis always maintained that the Uruguayan people voted for the National Party in 1958 due to them being tricked or as some kind of joke, not thinking they would win. It seems that Luis can't deal with the fact that he has some responsibility on the first electoral defeat of his party in a century, a defect that could sink his third tenure, as has sunk his relationship with other batllist like Zelmar Michelini.§!"
