 #Intro
 TNO_tips_and_tricks_entry_title_0: "General Introduction" #Main
 TNO_tips_and_tricks_entry_desc_0: "Welcome to §WThe New Order§!!\n- Our mod is a very ambitious project and some of our features may appear daunting to a new player, as such this menu is meant to offer you some basic pointers to help you have a more enjoyable experience.\n- You can navigate between tips using the arrow buttons at the bottom of the screen, get a random tip using the dice button or display the tip of your choice using the §YTable of Contents§! on the left.\n- You can reopen this tab at any time by left-clicking the large §Mquestion mark symbol§! on the top-right corner of your screen, to the left of the §GDEFCON§! number."
 
