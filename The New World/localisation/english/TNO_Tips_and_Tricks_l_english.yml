 # Economy Tips
 TNO_tips_and_tricks_entry_title_1: "Introduction" #Main
 TNO_tips_and_tricks_entry_desc_1: "- One of the features that sets §WTNO§! apart from other mods is its replication of a functioning economic system. While it may look complicated, with just a few pointers, you will be able to get a good grasp of it by the end of your first playthrough.\n- Make sure to check the economy tab at least once every in-game week and adjust your spending accordingly.\n-Don't be afraid of a deficit, but try to keep it smaller than your GDP growth. Keep in mind that any kind of deficit still means your Debt to GDP ratio will increase over time.\n- For your first few runs, try to pursue a balanced budget to get used to the mechanic."

 TNO_tips_and_tricks_entry_title_2: "Production Units"
 TNO_tips_and_tricks_entry_desc_2: "- £tt_prod_unit §GProduction Units§!, henceforth referred to as £tt_prod_unit §GPUs§!, are an abstract representation of a nation's industrial capabilities, which replaces the vanilla factory system.\n- £tt_prod_unit §GPUs§! are primarily obtained from §YGDP§!, though you may find yourself gaining more as you play from your focus tree or decisions.\n- £tt_prod_unit §GPUs§! can be set to £tt_civ_factory §RCivilian§! or £tt_mil_factory §GMilitary§! production via the respective menu available in the §YEconomy§! tab and the §YProduction§! tab. £tt_prod_unit §GPUs§! are also used for £tt_consumer_goods §BConsumer Goods§! production, though these are set automatically."

 TNO_tips_and_tricks_entry_title_3: "Grid Power" #Main
 TNO_tips_and_tricks_entry_desc_3: "- £tt_prod_unit §GProduction Units§! require £tt_power §YGrid Power§! to function. Your £tt_power §YNet Grid Power§! production can be viewed by hovering over the §Ylightning icon§! in the top bar.\n- £tt_power §YGrid Power§! is primarily §Gacquired§! by constructing Power Plant buildings like §YThermoelectric Plants§! or §YNuclear Reactors§! and is §Rconsumed§! by buildings, such as §YOffices§! and §YSchools§!, but also by our §YCivilian Population§!, which we will discuss soon.\n- To ensure a functioning economy, it is essential to plan ahead and ensure you can produce enough power to match the constantly growing demand."

 TNO_tips_and_tricks_entry_title_4: "Civilian Consumption" #Main
 TNO_tips_and_tricks_entry_desc_4: "- Our §YCivilian Population§! consumes a variety of goods abstractly represented by £tt_consumer_goods §BConsumer Goods§!, to which we must dedicate a portion of our production capabilities. Alongside this, £tt_power §YGrid Power§! is also required to power civilian enterprise and homes.\n- The amount we dedicate to our population can be adjusted via the §YProduction Units Menu§! available in the §YEconomy§! tab, with matching §Gbuffs§! and §Rdebuffs§! when going §Gabove§! or §Rbelow§! 100% respectively.\n- It is important that you keep a track of this consumption and adjust it as needed."

 TNO_tips_and_tricks_entry_title_5: "Managing Your Budget" #Main
 TNO_tips_and_tricks_entry_desc_5: "- The §YEconomy§! tab shows everything you need to know about your economy. The essential features you should be aware of are the four buttons around the center of the screen.\n- §RAusterity Measures§! help you keep track of your spending, while §RTax Cuts§! and §RTax Hikes§! allow you to raise or lower your §Gincome§!. Below them you will see several §Ysliders§! which you can adjust, doing so will change your §Yspending§! accordingly.\n- §RDeficits§! are good for growth so don't be afraid of having one, but always do your best to avoid a §Rdeficit§! bigger than 10%, and remember any §Rdeficit§! will increase your §Rdebt§!."

 TNO_tips_and_tricks_entry_title_6: "Central Bank Policies"
 TNO_tips_and_tricks_entry_desc_6: "- §YCentral Bank Policies§! allow you to gain §Gstrategic buffs§! that make your economy easier to manage.\n- Your §YCentral Bank Policy§! can be set by clicking the button below the §JMoney Creation§! bar on the left side of the screen. They take one year to fully apply, so it's best to plan ahead.\n- The §Y"Fresh Off the Presses"§! policy boosts your §Ggrowth rate§! and is best used when your £inflation_texticon §Rinflation§! is below 4%.\n- The §Y"Count Our Pennies"§! policy lowers £inflation_texticon §Rinflation§! and is most useful when £inflation_texticon §Rinflation§! is above 4%.\n- The §Y"Power Things Up"§! policy allows you to get extra £tt_power §YGrid Power§! relative to your §YGDP§!. It is very useful for small countries."

 TNO_tips_and_tricks_entry_title_7: "Crisis Prevention"
 TNO_tips_and_tricks_entry_desc_7: "- The best way to manage a §ecrisis§! is to prevent it. Keep a look out for the indicators shown on the bottom right of the §YEconomy§! tab and adjust your §Yspending§! accordingly.\n- To prevent a §eFiscal Crisis§!, make sure your §Rdebt§! remains lower than your §Rdebt cap§!, which you can see in the upper left part of the tab.\n- Remember that maximazing your §Yspending sliders§! offers many §Guseful buffs§!, so consider other ways to reduce costs.\n- During war time, or if playing as a Russian Warlord, you can enable §YWar Taxes§! to increase your §Gincome§!.\n- During peace time, you can also reduce the number of divisions and planes you have deployed to save money."

 TNO_tips_and_tricks_entry_title_8: "Economy Sliders"
 TNO_tips_and_tricks_entry_desc_8: "- §YSlider Modification§! is not mutually exclusive with §RAusterity Measures§! and §RTax Hikes§!. Consider their effects and how they might synergize.\n- By clicking the §Ggears icon§! to the left of the slider name, you can open the category and use sub-sliders to divert funding with more precision.\n- Remember that each slider directly influences your policy effectiveness. For example, the §OBureaucracy Funding§! slider within the §OAdmin. Expenditures§! category will raise your §Gtax efficiency§!, granting more §Gincome§!.\n- It is recommended that you always keep §OBureaucracy Funding§! and §OScience Expenditures§! to the maximum."

 TNO_tips_and_tricks_entry_title_9: "Societal Development"
 TNO_tips_and_tricks_entry_desc_9: "- This mechanic is accessible by using the scroll-bar to reach the bottom of the §YPolitical§! menu.\n- Clicking on the §Mblue box§! to the right of a category's name will show all possible levels for it, as well as the effects they offer.\n- Hovering over the §OPoverty Rate§! will show the effects of its' current level.\n- You can hover over the bar to the right of the word "Trend:" to see your monthly progress in a category.\n- Alongside the shown effects, §YSocietal Development§! also has an effect on your country's §Gproduction§! and §Mresearch§! capabilities. To remain competitive, do your best to §Gimprove§! in all categories."

 # Army Tips
 TNO_tips_and_tricks_entry_title_10: "Introduction"
 TNO_tips_and_tricks_entry_desc_10: "- Warfare in the §YCold War§! epoch is different from what you might be used to seeing. The World's Powers will avoid direct war and instead use §Yproxies§!, a pragmatic term for ally, to manifest their influence across the world.\n- More traditional gameplay with a focus on warfare is offered by tags like §ZYunnan§! and the §&Russian Warlords§!.\n - Regardless of your choice of country, it is worth noting §WTNO§! also brings a multitude of changes to the combat, division and logistics systems. This category will guide you through them.\n- Before we begin, remember that increasing your §OArmy Expenditures§! while in a conflict will make your armed forces more effective."

 TNO_tips_and_tricks_entry_title_11: "Production"
 TNO_tips_and_tricks_entry_desc_11: "- To win any conflict, you will first require weapons to fight them with. This can be achieved in the §YProduction§! tab.\n- You can assign more £tt_prod_unit §GPUs§! to £tt_mil_factory §GMilitary Production§! by clicking the button with the §Ggreen gear icon§!.\n- Depending on your §YSocietal Development§!, you may be locked to using £tt_mil_workshop §OMilitary Workshops§! instead, which provide twice the number of assignable §YProduction§! slots, but are much less effective.\n- Due to more limited production capabilities, it is highly recommended you focus on standardizing your production. For smaller countries, consider focusing only on §Yinfantry production§!."

 TNO_tips_and_tricks_entry_title_12: "Templates - Basics"
 TNO_tips_and_tricks_entry_desc_12: "- §WTNO§!'s wide array of changes extend to the §MAI§! as well. To defeat your enemy in combat, it is important to upgrade and optimize your §Ydivision templates§!.\n- In §WTNO§!, §Rterrain penalties§! are significantly stronger. Always keep in mind the terrain you will fight in when designing your divisions.\n- Most §YProxy Conflicts§! can be supported by §Yvolunteer divisions§!. Since you can only send a handful to any given conflict, it is best to ensure your divisions §Rpack a punch§!. Using a §YCombat Width§! of 20 or higher is best.\n- §YSupport Companies§! offer considerably more §Gbuffs§! in §WTNO§!. It is recommended you use as many of them as possible."

 TNO_tips_and_tricks_entry_title_13: "Templates - Infantry"
 TNO_tips_and_tricks_entry_desc_13: "- §YInfantry§! is the bread and butter of an army, they are cheaper to produce and suffer the least amount of §Rterrain penalties§!. §YInfantry§! comes in tree categories:\n1) §.Light§!, which is weaker overall but cheaper to produce and has a higher recovery rate.\n2) §sRegular§!, which is offers balanced performance.\n3) §wElite§!, which is more expensive to produce, but performs the best in combat.\n- You may also use §BMarines§! and §bMountaineers§! in your divisions. The latter offer less supply consumption than other infantry types. In §WTNO§!, you are not limited by a cap on your §YSpecial Forces§! units, so feel free to use as many as you'd like."

 TNO_tips_and_tricks_entry_title_14: "Templates - Mobile"
 TNO_tips_and_tricks_entry_desc_14: "- Unlike in §WVanilla§!, almost every §YBattalion§! and §YSupport Company§! in §WTNO§! affects the §GEquipment Capture Rate§! of a division. The §GEquipment Capture Rate§! of a division is applied per hour if you are winning a battle.\n- Battalions belonging to the §YMobile§! category have the highest §GCapture Rate§!.\n- §YMobile§! units also suffer from powerful §Rdebuffs§! in most terrain which hamper their agility and generally make them perform worse than §YInfantry§!.\n- Due to the prevalance of §Rdisadvantageous terrain§! in §YProxy Conflicts§!, it may be a good idea to focus on other §YBattalions§! when designing your divisions."

 TNO_tips_and_tricks_entry_title_15: "Templates - Artillery"
 TNO_tips_and_tricks_entry_desc_15: "- §YField Artillery§! is an outdated component in the toolkit of a modern general. While its firepower cannot be disputed, its many §Rdrawbacks§! offer it degree of obsolescence.\n- Slow and cumbersome, attaching §YArtillery Battalions§! to divisions will §Rreduce§! their speed.\n- The devastating attacks artillery can offer will also noticeably §Rdecrease§! a division's §GEquipment Capture Rate§!.\n- Alongside these debuffs, §YArtillery§! provides a §Rnet decrease§! to organization and recovery compared to any other §YBattalion§!.\n- §YAnti-Tank§! and §YAnti-Air§! cannons are further obsolete, having been replaced with portable infantry weapons."

 TNO_tips_and_tricks_entry_title_16: "Templates - Armor"
 TNO_tips_and_tricks_entry_desc_16: "- §YCombined Arms§! tactics are essential in modern warfare. Utilizing §YArmor§! elements in your divisions §Greduces§! the damage they take, noticeably §Gincreases§! their damage output and §Gboosts§! their breakthrough.\n- §YArmor§! units also benefit from a fairly high §GEquipment Capture Rate§!.\n- The §Rterrain and organization penalties§! §YArmor Battalions§! suffer from, which are their biggest §Rweakness§!, can easily be §Gcountered§! by utilizing them alongside §YInfantry Battalions§!.\n- While you may lack the tech for modern §YArmor§!, remember you can compensate by improving the templates of §YChassis§! types you can utilize."

 TNO_tips_and_tricks_entry_title_17: "Armor Categories"
 TNO_tips_and_tricks_entry_desc_17: "In §WTNO§!, there are three types of §YArmor§! units you can use:\n1) §YMBTs§!, which is the standard armor unit. They are §Rexpensive§! to produce and suffer §Rheavy terrain penalties§! but pack quite a §Gpunch§!.\n2) §YHeavy Tanks§!, are an outdated albeit still useful unit. They permit you to punch roughly §Gone level above§! your current tech. Thus a §Y1950s Heavy Tank§! can go toe-to-toe with §Y1960s MBTs§! in combat. However, they are §Rslower§! and suffer §Yworse terrain penalties§! to compensate.\n3) §YAFVs§! are often underestimated. These light armor units are §Gfast§!, §Gcheap§! and suffer §Gthe least terrain penalties§!. With the right equipment, they can §Goutperform§! even an §YMBT§!."

 TNO_tips_and_tricks_entry_title_18: "Supply & Terrain"
 TNO_tips_and_tricks_entry_desc_18: "- Proper §Ylogistics§! are essential to winning a war. Always keep in mind the position of §YRailways§!, §YSupply Hubs§! and strategic terrain, such as §BRivers§! and §bMountains§!, when making battle plans.\n- Should your divisions lack §GSupply§!, consider utilizing §YLogistics Support Companies§! and constructing §YSupply Hubs§!.\n- Unlike in §WVanilla§!, §YSupply Hubs§! are relatively §Gcheap§! to produce, so don't be afraid to construct them. Do keep in mind that they are capped to §Rtwo per state§!.\n- Certain technologies can improve your supply situation and §Greduce§! the §Rterrain penalties§! you might suffer."

 TNO_tips_and_tricks_entry_title_19: "Support Companies"
 TNO_tips_and_tricks_entry_desc_19: "- §YSupport Companies§! can offer §Gboosts§! to §YOrganization§!, §YRecovery Rate§!, §YSupply Consumption§! and §GEquipment Capture Rate§!. Here is some info on their uses:\n- §YRecon§! and §YEngineers§! are the strongest, make sure to always utilize them.\n- §YLogisitics Companies§! offer the largest §Gboost§! to §YRecovery Rate§!.\n- §YMaintenance Companies§! offer the largest §Gboost§! to §GEquipment Capture Rate§!.\n- §YSignal Companies§! offer a balance between the two, however they stand out due to the §Gboost§! they offer to §YInitiative§!, which will make your divisions enter a battle §Gfaster§!."

 TNO_tips_and_tricks_entry_title_20: "Helicopters"
 TNO_tips_and_tricks_entry_desc_20: "- §YHelicopters§! are a modern invention and component of the strongest §YSupport Companies§!. They offer §Gmassive damage§! with §Glittle terrain penalties§!, however they §Rgreatly increase fuel consumption§! and §Rlower Recovery Rate§!.\n- Adding §YAir Assault Support Companies§! to your divisions will make them §Gfaster§! and give them a noticeable edge in combat.\n- §YAttack Helicopters Support Companies§! fill most of the roles of typical §YArtillery§!, while offering §Gfewer§! debuffs.\n- §YAnti-Submarine§! and §YMedEvac Support Companies§! also exist, they are overshadowed by §Gcheaper§! and §Gperformant§! alternatives.\n- Remember you don't need §YHelicopters§! to win."

 TNO_tips_and_tricks_entry_title_21: "Aerial Combat"
 TNO_tips_and_tricks_entry_desc_21: "- Providing proper §zAir Support§! to your troops can offer a §Gmassive advantage§! on the battlefield.\n- The main plane types you should concern yourself with are §YInterceptors§! and §YClose Air Support§!.\n- While §YFighters§! also exist, §YInterceptors§! tend to §Goutclass§! them in combat due to their §Yagility§!.\n- Remember that while planes are very useful, their §Rhigh Production Cost§! means you should only consider producing them if you have the industry.\n- Don't worry, you can still win wars with only ground forces. To bridge the gap, however, consider utilizing §YAnti-Air Equipment§! in your divisions, such as portable §YMANPADS§!."

 TNO_tips_and_tricks_entry_title_22: "Naval Combat"
 TNO_tips_and_tricks_entry_desc_22: "- §BNaval Combat§! rarely occurs in §WTNO§!, but your navy might still see some uses in certain §YProxy Conflicts§!. Generally, however, it is recommended you §Rdefund§! your navy and don't focus too much expanding production.\n- §BNaval Invasions§! rarely occur as well. You do not need to garrison your coasts unless you are preparing for war with one of the §YSuperpowers§!.\n- §KItaly§!, the §mUnited States§!, §qGermany§! and §eJapan§! can obtain §Gspecial buffs§! from having certain amounts of ships constructed. These can include §Gbuffs§! to §MPolitical Power§!. You can view these in the §YCold War§! category."
 
 TNO_tips_and_tricks_entry_title_23: "Winning A War"
 TNO_tips_and_tricks_entry_desc_23: "- A war is 9/10 times decided by §YDivision Templates§!. If you are losing against the §MAI§!, simply check what their §YDivisions§! look like and adapt your §YTemplates§! accordingly.\n- Keep in mind that the buffs to §GEquipment Capture Rate§! mean that attrition warfare is a wholly valid strategy in §WTNO§!. However, §Rencircling§! your opponent can still provide a §Gquicker§! way to a end a conflict.\n- In §YProxy Conflicts§!, §Rencircling§! and §eeliminating§! the opposing side's §YVolunteers§! can offer a §Gsignificant advantage§!. In such conflicts, sending §YMilitary Advisors§! and §YEquipment§! is equally important to achieving victory."
 
 #State Management
 TNO_tips_and_tricks_entry_title_24: "Introduction"
 TNO_tips_and_tricks_entry_desc_24: "- You may notice §WTNO§! features multiple new §YBuildings§! you might not be used to. This category will help explain their utility and when you should build them.\n- Due to the lack of direct warfare, constructing §YForts§! and §YStronghold Networks§! is not necessary. You will find yourself obtaining these through §YDecisions§! and your §YFocus Tree§! if needed.\n- The most important §YBuildings§! to keep in mind are £tt_power §YPower Production Buildings§! and §YInfrastructure§!.\n- All §YBuildings§! require £tt_prod_unit §GPUs§! assigned to £tt_civ_factory §RCivilian Factories§! to be constructed. You can assign them as needed via the menu with the §Ggreen gear§! to the right of the tab name."

 TNO_tips_and_tricks_entry_title_25: "Infrastructure"
 TNO_tips_and_tricks_entry_desc_25: "- §YInfrastructure§! has a maximum of 10 levels. Each level §Gimproves§! a state's §YResource Extraction§!, §YDivision Speed§!, §YSupply§!, while also granting §Gextra§! §YBuilding Slots§! and, most importantly, §Gextra§! §YConstruction Speed§!.\n- Thus, the more §YInfrastructure§! you have, the §Gfaster§! you can build everything else. As such, constructing it should be your number one priority.\n- Prioritize constructing §YInfrastructure§! in §Gresource-rich§! states. Remember that if your §YResources§! are purchased by another country, you gain both §GIncome§! and £tt_prod_unit §GPUs§!.\n- Only construct §YInfrastructure§! up to level 8.\n- §YInfrastructure§! and §YPower Plants§! also grant §GGDP Growth§!."

 TNO_tips_and_tricks_entry_title_26: "Power Plants"
 TNO_tips_and_tricks_entry_desc_26: "- Your second priority should be constructing §YThermoelectric Plants§! and §YNuclear Reactors§!.\n- While the ratio differs from country to country, you should aim for 5 £tt_power §YGrid Power§! per 1 billion of §GGDP§!.\n- For §eJapan§!, you should aim for 10 £tt_power §YGrid Power§! per billion of §GGDP§!.\n- Remember that researching improved §YPower Plants§! in the §mIndustry Tech Category§! grants all of your plants extra £tt_power §YPower Production§!. Prioritize that tech over all others.\n- §YPower Plants§! also grant §YBuilding Slots§!, §Gincreased§! §YConstruction Speed§! and §Gincreased§! §YResource Extraction§!.\n- Focus on constructing these in states with high §YInfrastructure§!."

 TNO_tips_and_tricks_entry_title_27: "Building Coverage"
 TNO_tips_and_tricks_entry_desc_27: "- §YSchools§!, §YHospitals§!, §YPrisons§!, §YBarracks§! and §YOffices§! offer country-level §Gbuffs§! based on your §YNational Coverage§!.\n- You can check where it would be most efficient to construct one via the §YBuildings Map Mode§! accessible by clicking the "§m<§!" button to the left of the §mLedger§! icon on the bottom right of your screen.\n- You can check your §YNational Coverage§! and get info on the §Gbuffs§! it offers by clicking on the circle with the respective building icon in the §YConstruction§! tab.\n- These §YBuildings§! also influence your §YPolicy Effectiveness§!.\n- The §Rmost important§! ones to get §YCoverage§! are §YOffices§!, §YSchools§!, §YPrisons§! and §YBarracks§!, in that order."

 TNO_tips_and_tricks_entry_title_28: "Logistics"
 TNO_tips_and_tricks_entry_desc_28: "- The last §YBuildings§! you should keep in mind are §YSupply Hubs§! and §YRailways§!.\n- §YRailways§! represent the routes §YSupply§! can travel on ground. Remember that §YSupply§! can also travel via §Brivers§!, but a lowered efficiency.\n- §YSupply Hubs§! represent nodes from which §YSupply§! travels to your §YDivisions§!. For §Bsea routes§!, that role is filled by §YNaval Bases§!. However, those should be at a sufficient level already.\n- In §WTNO§!, both of these §YBuildings§! have a §Greduced§! §YConstruction Cost§!, so don't be afraid to construct them.\n- Remember a state can only have 2 §YSupply Hubs§!, so be careful where you construct them."