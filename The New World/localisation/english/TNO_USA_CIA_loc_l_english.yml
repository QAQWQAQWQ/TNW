 USA_CIA_operation_fawkes_PAR: "§YOperation§! §xFAWKES§!"
 USA_CIA_PAR_operation_fawkes: "For all the history of the Agency, necessity often acquainted us with strange bedfellows. This time is no different, as we will be working with communist insurgents in Paraguay to destabilize the fascist regime of the country. If we succeed, FULNA elements will enter the country throught the city of Concepción, from there we can work to increase their influence in the country."
 USA_CIA_operation_daedalus_PAR: "§YOperation§! §<DAEDALUS§!"
 USA_CIA_PAR_operation_daedalus: "Now that we have a foothold in Paraguay, we can start to work on the regime's downfall. With the help of FULNA, we will set up operatives embedded in the Paraguayan military to destabilize the regime from within."
 USA_CIA_operation_minos_PAR: "§YOperation§! §&MINOS§!"
 USA_CIA_PAR_operation_minos: "With FULNA having a massive presence in the countryside, it's time to encroach on the capital of Asunción. We will lend FULNA our support in the form of weapons and supplies, as well as our operatives to infiltrate the city and sow chaos in the streets."
 USA_CIA_operation_babel_PAR: "§YOperation§! §KBABEL§!"
 USA_CIA_PAR_operation_babel: "Our presence in Paraguay is pervasive, FULNA is clearly winning the Bush War while the regime can barely control the streets of Asunción. All that it needs is a little push, and the whole house of cards will come crashing down."

