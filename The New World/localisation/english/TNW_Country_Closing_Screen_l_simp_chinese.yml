 TNO_CountryClosing_epilogue_Ukraine_communist_victory_UCW: "人民欢庆着胜利，士兵呼号着胜利。当舒姆斯基在广播中宣布，阿道夫·希特勒与埃里希·科赫的雕像业已摧毁之时，胜利之声响彻寰宇。\n\n然而，胜利既无法养活人民，也无法复活逝者。\n\n被战争摧残和灾疫蹂躏的乌克兰已成不毛之地。饥饿计划和持续二十年的种族灭绝给她刻下了见骨的创伤，战士们的理想主义和共产主义理论亦无法使其痊愈。撤退之时，德国佬焚毁田野、夷平城市、炸塌水坝，可怜一片焦土。命运把重建乌克兰的重担交给了共产党人。他们需要数年来完成任务，但实际上，他们所剩的时间只有几个月。德意志的军队已重新集结，正盘算着将波兰、东方领和乌克兰再度收入囊中。\n\n时值[GetYear]年，法西斯之幽灵正向乌克兰厉声威胁：有一就有二，蚕食鲸吞之命运，正等待着你。"
 TNO_CountryClosing_epilogue_UPA_Klyachkivsky_victory_UCW: "经历了数十年的血泪奋战之后，乌克兰最忠诚的儿子们终于将她从亵渎之徒的手中救出，为最伟大的卫士斯捷潘·班杰拉报了一箭之仇。但他们也很清楚，故事才刚刚开始。虽然堕落者、背叛者和入侵者都已一扫而空，乌克兰的恶疾也因此得治，但她应有的土地仍然遗落四方。\n\n是可忍孰不可忍，尤其是在当下，日耳曼尼亚的人渣败类之巢尚在呼吸之时。与第三帝国的另一次战争避无可避，为了最终的胜利，乌克兰的每一寸领土都是必需之物。无论我们的指挥官之间有什么分歧，都很明了何谓必要之责。\n\n祖国的领土四分五裂，恶逆宵小窃居其上：波兰人、匈牙利人、罗马尼亚人，还有德国人在克里米亚的残部。对他们，全都要斩草除根，一个不留。我们会给他们一个忏悔恶行，洗刷罪愆的最后机会，若敢不从，必遭灭顶之灾。时值[GetYear]年，无论要花费多少资源、消耗多少时间、牺牲多少烈士，我们都会使乌克兰重归一统。世人如有异议，尽管放马过来。"
 TNO_CountryClosing_epilogue_UPA_Shukhevych_victory_UCW: "克利亚奇基夫斯基不过是条疯狗。那疯狂的复仇之心伪装为对乌克兰的爱，将他的精神粉碎殆尽。为免他摧残国家，自当送他上黄泉路。斯捷茨科只是条可怜虫。他可以为了一点蝇头小利，就把祖国母亲出卖给那群德国硕鼠。只有舒赫维奇顶天立地，得配元首之位。他会接过乌克兰的衣钵重任。\n\n摆在新元首面前的任务异常艰巨，他需要重建这个深陷泥潭二十年的国家，重新团结起她的人民。元首若想要维持乌克兰人民的忠诚，对抗戕害此地的德意志腐蚀，唯一能仰仗的就是团结之诺。舒赫维奇的演讲将此原则置于首要地位，但问题并不会因此消失。团结的纽带是否足够坚韧，能否让他们抵挡无可避免的德意志之灾，阻止它吞噬整个乌克兰？\n\n时值[GetYear]年，问题的答案终将揭晓。"
 TNO_CountryClosing_epilogue_UPA_Stetsko_victory_UCW: "长久以来，乌克兰都没有一盏指路明灯。自从班杰拉死去之后，乌克兰反抗军与乌克兰都迷失了方向，被世人遗忘。斯捷茨科的胜利改变了这一切。\n\n克利亚奇基夫斯基发掘了乌克兰深埋于血脉与沃土中的力量，但他的双眼已被仇恨蒙蔽，故其不知应如何运用这份力量。斯捷茨科则找到了驾驭它的方法：他意识到民族社会主义不仅是一种意识形态，更是一门科学，是一份建设有机种族国家的宏伟蓝图。\n\n荣光尚在彼岸，吾等道阻且长。乌克兰民族的混乱之势仍在风旋骤卷，然而，斯捷茨科确信，只要德意志愿意假以时日，他将会率领人民大众，与奥林匹斯山的雅利安诸神共襄盛举。在新秩序之下，仅有一人之意志、决心和耐性能拯救民族于水火之中。\n\n时值[GetYear]年，斯捷茨科会铺好道路，乌克兰人民将得保同享德意志之骄阳。"
 TNO_CountryClosing_epilogue_ENG_Butler_Demo_Ending: "案牍无尽，时间有限。不列颠拖着她萎缩的躯壳气喘吁吁，因与那个人所共知的恶魔走得太近而付出了所能支付的最大代价。但在自由英国的历史中，纵使这篇章凄凉哀伤，但仍有一丝希望存于字里行间。但愿这千真万确。\n\n如果在白厅之外的任何人能理解拉布·巴特勒之名所代表的含义的话，就需要继承这赋予他的职位，继续坐上数十年光阴，将此身所剩的全部力量、活力和技能注入崭新不列颠的愿景之中。从一开始，巴特勒的核心圈子中的所有人都固定在了一个目标上，通过仁慈的国家之手，实现社会经济革命。此外，还需要继续和巴特勒的老对手，也就是旧体制中的残余分子作斗争。\n\n时值[GetYear]年，拉布·巴特勒成为了这片热土之上最为伟大的公职人员。不列颠回首往昔，在那段时光中，民主制度尚在统领美丽富饶的英伦三岛。但是，作为一个奋斗了四十余载的老兵，巴特勒已是老态龙钟。他曾一度选定了继承者，但现在又需重新确认。不列颠抵达了十字路口的正中央，只有时间才能知晓她接下来要走的路。"
 TNO_CountryClosing_epilogue_ENG_Wallop_Soccred_Demo_Ending: "整个不列颠都被疑虑不安的气氛所笼罩。唐宁街中传出消息，崭新的社会信用将会成为经济的推动力。闻言于此，城市居民纷纷皱起眉头，无不困惑担忧。乡村居民只想搞懂，所谓的“乡土主义”意义为何，又会给他们的生计带来何种改变。任何对政府的新航向发出反对的人，无论此前是否为合作者，都被逐一击溃，境遇悲惨。一败涂地的恶臭萦绕于全国各地。\n\n另一边厢，杰勒德·沃洛普却从未如此欣喜若狂。大丈夫当作此事，有何不可？他梦想着彻底粉碎金融霸权残余的枷锁，转而追逐自己寄予不列颠的宏图伟业，而梦想从未如此触手可及。国际金融巨鳄对此噤若寒蝉，他们深知，英格兰会重新投资她的股本，把它们转移给昔日曾带领国家走上巅峰的关键领域之中。\n\n时值[GetYear]年，不列颠已作出了她的选择。至于她将来会否追悔莫及，只有时间才知道答案。"
 TNO_CountryClosing_epilogue_ENG_Wallop_Britfash_Demo_Ending: "当多姆维尔毙命，诺尔-凯恩被推进唐宁街之时，大多数人都以为，这个自1956年以来就身陷重围的机构会听到自己的丧钟响起。但事实却大出几乎所有人意料之外，除了那些元老派的成员们。他们不仅成功解决危机，还将议会的宝座全数夺还。\n\n上流社会的绅士淑女们群聚于他们金碧辉煌的厅堂和乡村别墅中，齐声庆贺杰勒德·沃洛普登上第四任首相的大位。觥筹交错之间，他们为下一个二十年的无上荣耀、繁花美景和滔天权势举杯祝酒。好管闲事的务实派和叛逆卖国的理论派都已扫地出门，他们终于可以一展抱负，实现对不列颠的愿景和期冀。\n\n时值[GetYear]年，曾经困守威斯敏斯特的妄想大师们，已然屹立于王国之巅。他们如同雕塑家一般，将国家视为粘土，用自己的手揉捏塑形成理想中的模样。金玉镶于上，败絮藏于下，这史上从未有过的法西斯王国之图景，亦从未有如当下这般一样，如此鲜活灵动。"
 TNO_CountryClosing_epilogue_ENG_Fountaine_Demo_Ending: "安德鲁·方丹曾经祈求过这样的场景：英雄从天而降，拯救了一个支离破碎、深陷抑郁、饱经创伤的国度。而在眼下，机会已经来临。全不列颠乃至全世界的民众都将亲眼见证，现代法西斯的真正案例究竟是何种相貌。\n\n过去数十年来，这个国家仅存在于方丹的幻想中。他受困于自己的思维，这个国家的人也是。为数众多的人一厢情愿地以为，被法西斯吞没的祖国绝不可能于意识形态舞台的新台阶上浴火重生，只会从一条停滞不前的思想道路上，踉跄地拐到另一条路。然而起义证明了他们的错误。方丹数十年来一直试图完成拼图，而最后一块碎片此时已落入他的裤袋中。他唯一所要做的，就是将其归位。\n\n时值[GetYear]年，方丹将统率不列颠迈向未来。目标清晰可见，但又模糊晦涩。可以肯定的是，方丹会将自己的梦想贯彻始终，无论情况如何。不列颠会走向何方，已无人可再知晓。"
 TNO_CountryClosing_epilogue_ENG_Jordan_Demo_Ending: "我们留守在家，凝望窗外。窗外所见无从理解。唯有战栗与颤抖。噪音喧天盖地，我们无从聆听。唯余悚然与冰冷。安然入眠已成奢望，因独裁者日复一日于电台中发声。他承诺团结，但我们确信这只是束缚的同义词。他提议和平，但我们确信这代表灯火管制和宵禁。耳听为虚，眼见为实。\n\n瞬息万变的世界非区区人智所能解。金属水泥融为液体，在我们脚下打着转转。我们注视着天际线之上的色彩，注视着暴君旋转的笔尖。很快他就会对我们下笔。在他眼中，我们不过白纸一张。\n\n时值[GetYear]年，对于明日会带来何种破灭，我们尚未能得知。但我们必须守望相助，必须缓解压力。同舟共济即为唯一的希望。我们必须携起手来，成为我们想要的模样，做出截然不同的事。"
 TNO_CountryClosing_epilogue_Ukraine_Brautigam_victory_UCW: "布罗伊蒂加姆和改革思潮出人意料地在乌克兰取得了胜利，让整个国家走上了通往自由的新道路。但是，专员辖区仍然存在，它的剥削历史和种族主义仍根深蒂固、它的机构部门在内战胜利后才得以巩固。大多数外部观察家都认为，这就是一个彻头彻尾的殖民地。\n\n布罗伊蒂加姆永远是个理想主义者，在他看来，这些都只是他迈向成功前暂时的阻碍罢了。他会领导乌克兰，将重点放在减轻乌克兰人民所受的压迫上。他认为，如果情况十分乐观，他会把权力下放给乌克兰人，让他们在民主政体中得到发展机会。时值[GetYear]年，当下，一切皆有可能。\n\n只要日耳曼尼亚准许他的行动。"
 TNO_CountryClosing_epilogue_Ukraine_Leibbrandt_victory_UCW: "莱布兰特为了战胜反对派和消灭游击队做了大量的工作，但只得到了一些微不足道的回报。他接手了一个支离破碎，被内战彻底撕裂的乌克兰。乌克兰民族早已放弃了在谈判桌上分一杯羹的希望，只求能有些面包屑去养家糊口。\n\n莱布兰特承诺，他会解决所有的问题，在忠于希特勒的同时按照罗森贝格的路线去振兴国家。然而双唇一碰诺言既出，意欲兑现却困难重重。莱布兰特将自己对乌克兰的同情置于殖民使命之后，而且他尽职尽责地忽视了两者之间的矛盾。时值[GetYear]年，莱布兰特明白：民族社会主义能解决乌克兰的一切疑难杂症。\n\n但是，对于这个民族来说，争取真正自由的最后机会已被铁蹄粉碎，他们失去了所能失去的所有东西，这所谓的真理，真的有什么意义可言吗？"
 TNO_CountryClosing_epilogue_Ukraine_Ohlendorf_victory_UCW: "如果有人好奇法西斯治下国家的命运是怎样的，只需要去乌克兰看看就能知道答案。游击队员们揭竿而起、奋勇厮杀、忍饥挨饿、惨遭屠戮。她的人民再次被捆上枷锁、他们残缺不全的身躯被埋进泥淖、他们的精神与灵魂被五马分尸。\n\n那奴役他们的怪兽都做了什么事？永无止尽的暴力夺回了德意志的面包篮，但胜利者挖空心思所得来的只有一具乌克兰的尸体。更糟的是，他们没有从所受的苦难中吸取任何教训。\n\n又一次地，民族社会主义征服了乌克兰，但这一遭与以往不同。新专员奥托·奥伦多夫将会做到前人未能做到的事业，德国对乌克兰的掌控将不可动摇、残酷高效、直到永远。时值[GetYear]年，法西斯主义的未来在乌克兰得到了解答：那是为了一切的永恒不朽，而重重将人踩在脚下的皮靴。"
 TNO_CountryClosing_epilogue_UNRA_Dziuba_victory_UCW: "乌克兰的文化曾一度被德国官僚视为处于潜伏期的疾病，并在六十年代中以民族社会主义的药方迅速祓除。如今，在共和派的浪潮之下，它涅槃重生。乌克兰人民共和国由梦想化为了现实，逐渐恢复自身的气力。\n\n伊万·久巴是这场文化革命的掌舵人。他不仅是左翼分子及民粹主义者，更重要的是，他是民族主义者。他的目标是，通过打出他独一无二的政治品牌来维系能量，将曾经濒临灭绝的乌克兰文化再度复兴起来。乌克兰人的土地要迎来它理所应得的繁荣昌盛，乌克兰人民会无比自豪于自己的身份，乌克兰民族也能进一步调整完善。\n\n时值[GetYear]年，在畅想美好明天之前，有个问题必须搞清楚：德国的回归是板上钉钉的，久巴究竟知不知道，该如何让乌克兰的崭新复兴在此情此景中存活下去？"
 TNO_CountryClosing_epilogue_UNRA_Ohloblyn_victory_UCW: "乌克兰人民革命军经过了艰苦卓绝的斗争，终于成功建立起一个以自由和人权作注释的国家，而这正为德国政府所不容。然而，由一批前合作者组成的合作派，在其民主参与资历尚短的不利条件下仍成功地重新执权。在德意志统治下的基辅，他们曾为奴作婢，但在乌克兰统治下的基辅，他们登堂入室，坐到总统与部长的位置上。\n\n亚历山大·奥格洛布林总统已经确定了首要且唯一的优先事项。乌克兰必须不惜一切代价，重新讨回德国的欢心。并非以革命与进步重塑共和国，而是以遥远的日耳曼尼亚那挑剔的品味为基准，可谓是十分艰巨的任务。纳粹党的狂热和法西斯主义一如既往，故此向德意志卑躬屈膝的共和国完全名不副实。\n\n时值[GetYear]年，其时德意志尚未发动入侵，但乌克兰革命就已被扼杀于襁褓之中了。"
 TNO_CountryClosing_epilogue_UNRA_Stus_victory_UCW: "和平脆如薄冰，合作朽如枯木。乌克兰人民革命军先将德寇逐出家园，又降伏了班杰拉分子和共产主义者，但他们的意识形态分歧之大仍难以弥合。要指望社会民主主义者、自由主义者与合作者能一直维系他们之间的联盟，只能说是个遥不可及的梦。\n\n但无论他们的冲突和分歧如何变化，所有人都必须保持高度警惕。时间不等人，天灾已临近。纳粹战争机器的雷鸣愈发咆哮，问题不在于它会否归来，而是何时归来。\n\n无论如何，如若想要同不可阻挡的残忍纳粹奋起一战，那么乌克兰的领导人们就必须要达成合议。时值[GetYear]年，乌克兰的至暗时刻已至，愿上帝与她同在，只因再无人能救她于水火。"
 TNO_CountryClosing_epilogue_MEX_Demo_Ordaz: "船长将船舵交给了他最信赖的大副，因此，墨西哥继续坚定不移地走在革命的道路上。如今，那个稳健地执掌着船舵的人，正是古斯塔沃·迪亚斯·奥尔达斯。他凭借自己的警惕、智慧和精确的命令备受同僚的尊敬。\n\n在渐渐逼近的风暴之下，革命制度党迫切地传播着这个故事，一遍又一遍。然而，他们没有说的是，船上的裂缝正在不断进水，游击队日渐壮大，船员们贪赃枉法，流言四起……声称奥尔达斯也许会在重压之下崩溃。\n\n水下遍布激进主义海怪的触手，海上飘荡着反动主义女妖的歌声，他驾船穿越这片凶险的海洋，铁石般的面孔上没有丝毫波澜。境外势力与墨西哥国民的埋怨之声也不能令他松手分毫。一切按计划进行，穿越长夜容不得半分偏差。\n\n时值[GetYear]年，接下来的岁月里，奥尔达斯，革命制度党与墨西哥将突破阻挡革命之路的每一道骇浪。"
 TNO_CountryClosing_epilogue_MEX_Demo_Lozano: "劳尔·萨利纳斯·洛萨诺总统已然挣脱了束缚他的枷锁：他班子里的两大刺头部长，埃切维里亚和丘马塞罗。马德拉事件的遇难者也可以算上他们二人。他手下的技官派与革命制度党内遭到压制的正统派的临时休战也随之终结。\n\n两场阴影中的战争已然开始。在呼啸的荒野与绵延的贫民窟中，内卫部队与那些被人民游击队死难者鼓舞的激进分子展开了一场肮脏战争。而在党内，为了尚不明朗的革命的未来，从最小的市政厅到国家宫的庙堂，塞拉亚以来前所未有的暗斗也已经开始。\n\n时值[GetYear]年，洛佩斯·马特奥斯治下的和平已经终结，但谁能赢得最终的胜利？是萨利纳斯心目中繁荣而充满活力的墨西哥能够摆脱萦绕着她的幽灵，还是守旧派再次握紧权柄、今后永不松开？这场斗争，恐怕最终只会留下一片废土。"
 TNO_CountryClosing_epilogue_MEX_Demo_Madrazo: "南方气旋仿佛不可阻挡的威势在奇瓦瓦炎热、干燥的空气中陷入了困境。格瓦拉主义分子“人民游击队”发动的袭击让卡洛斯·A·马德拉索重燃的革命暴露在了右派敌人的威胁之下。腐朽的职团主义者，反动的共治主义者，在此之上，还有公然藐视他的权威，试图将墨西哥拖回旧日黑暗时代的州长们。\n\n然而，他掀起的风暴也为革命渐渐黯淡的火焰注入了全新的活力，如今面临的挫折唤醒了它真正的捍卫者们。过去的巨人与当代满怀热忱的青年并肩举起摇曳的火炬，为了公正而独立的墨西哥的共同理想战斗和牺牲。\n\n时值[GetYear]年，混乱与浓烟笼罩着前路，不知多少未知的朋友与敌人正藏匿其中。但为了拥抱光明的未来，为了实现革命先烈的宏愿，马德拉索将一往无前。"
 TNO_CountryClosing_epilogue_AAA_Success: "光阴荏苒，日月如流，夏日的光辉洒落在冰封大陆之上。自人类首次踏足南极洲的那一刻起，便孕育了一个美好的梦想：愿人类能以大智慧与大勇气，在这冰冻的伊甸园中和平地探索和学习。这样的梦，在斯尼佩岛的冰冷火光中化为灰烬。即便如此，在其消逝之际，旧世界的希望却在最意想不到的地方——阿根廷——悄然萌芽。率领着征服大军的莱亚尔上校，将国家的利剑指向盘踞冰原腹心的巨龙，最后一次，他将孤注一掷，证明那梦想并未消亡。\n\n尽管代价远超他的想象，我们的英雄最终凯旋而归，巨龙枭首，希望似乎再度出现。然而，那梦想的去处却仍是扑朔迷离。各方势力个个虎视眈眈，企图将南极大陆拖入黑暗与血腥的新时代。对于莱亚尔上校而言，与即将来临的挑战相比，南极之行或许只是一次轻松的冬季漫步……"
 TNO_CountryClosing_epilogue_AAA_Failure: "黑暗、寒冷的新时代，栩栩降临在冰封大陆之上。自人类首次踏足南极洲的那一刻起，便孕育了一个美好的梦想：愿人类能以大智慧与大勇气，在这冰冻的伊甸园中和平地探索和学习。这样的梦，在斯尼佩岛的冰冷火光中化为灰烬。即便如此，在其消逝之际，旧世界的希望却在最意想不到的地方——阿根廷——悄然萌芽。率领着征服大军的莱亚尔上校，将国家的利剑指向盘踞冰原腹心的巨龙，最后一次，他将孤注一掷，证明那梦想并未消亡。\n\n然而，那英勇的骑士迄今仍未归来。日子一天天过去，他的凯旋亦成了虚幻，化作一具冰冷躯壳深埋白雪之中。他不是第一个，而他的失败也注定了他不是最后一个。前任的失败让马塞拉将军乘势而起，他要发动一场让斯尼佩之战相形见绌的战争，以智利人的鲜血洗刷国家的耻辱。探险者已逝，战舰启航……"
 TNO_CountryClosing_epilogue_AAG_Success: "靴声回荡在冰封大陆的表面，仿佛战鼓隆隆作响。成千上万德军战士高呼胜利，庆祝雅利安精神对自然界的征服。无论饥寒困苦如何阻挠，德意志之意志无可阻挡。士兵与科学家陶醉于我们的伟大征服，新的土地向移民敞开大门，奇迹武器在挥洒冰雨的碧蓝天际自由飞翔，甚至原子伟力也被吾等掌握。\n\n但这仅仅只是开始。趁着我们正在进行的伟大斗争，美国人及其走狗妄图玷污德国的土地，背刺我们的人民。现在，新施瓦本正在动员部队来抵御他们的侵犯，将侵略者钉死在所谓的南十字星之下。\n\n黑暗荒原的最终决战即将来临。一场大火即将席卷南极，叫那永恒冰封之土开始融化……"
 TNO_CountryClosing_epilogue_AAG_Failure: "在废弃的基地里，尸身四处散落，他们是冰封大陆伟力之下最新的受害者。数十年来，德国都自诩作人类文明的巅峰，是劣等人部落的征服者、科学的拓荒人、文化的先锋队。他们狂妄自大，甚至企图强迫大自然屈膝听命，在最遥远的地方定居，用金属秃鹫熏黑她的天空，用原子之火烧灼她的土地。\n\n因着他们的过错，他们被埋葬、诅咒，面色苍白，在黑暗之中瑟瑟颤抖。燃料用光了，文化还算什么东西？饥饿啃噬着胃囊，科学又有什么用处？牙齿咀嚼撕咬人肉之时，所谓的文明更是早已不知去向了何方。\n\n因着他们的狂妄，大自然提醒他们，即使贵为万物灵长，也与其他种族一般同属野兽，而所有野兽，都需要食物……"
 TNO_CountryClosing_epilogue_AAO_Hillary: "如同凤凰涅槃，伟大的民主自二战余烬中崛起，在冰封大陆之上展翅翱翔。南极洲其他地方一步又一步地陷入混乱与暴政，OFN事务局则随之奏响了一支又一支的凯歌。纳粹在南十字星的光辉之下节节败退；冰虫计划深入地心，有望为自由世界带来前所未有的安全；男女平等的漫长征途又踏进了新的领域。然而，不确定性随着胜利悄然而至，时间推移，内部裂痕日渐显现，老对手也正磨刀霍霍。\n\n而最能与此形成反差的，莫过于事务局的新主管，埃德蒙·希拉里。在一些人看来，希拉里是指引更美好、更和平未来的希望灯塔；而在另一些人看来，他是在做着注定要破灭的白日梦。纳粹威胁卷土重来，盟友暗中策划密谋，即使希拉里本人，都不敢打包票说，自己一定能挺过未离开的种种考验。"
 TNO_CountryClosing_epilogue_AAO_Beale: "如同凤凰涅槃，伟大的民主自二战余烬中崛起，在冰封大陆之上展翅翱翔。南极洲其他地方一步又一步地陷入混乱与暴政，OFN事务局则随之奏响了一支又一支的凯歌。纳粹在南十字星的光辉之下节节败退；冰虫计划深入地心，有望为自由世界带来前所未有的安全；男女平等的漫长征途又踏进了新的领域。然而，不确定性随着胜利悄然而至，时间推移，内部裂痕日渐显现，老对手也正磨刀霍霍。\n\n尽管面临着种种挑战，但事务局新任主管霍华德·比尔相信，自己的冷静务实正是完成使命的利器。比尔制定了周密详尽的计划，增加南极基地对先进核技术的运用，在事务局中扩展对澳大利亚的支持 。他相信，自己已经找到了在坚持梦想的同时，巩固OFN事务局胜利成果的正确方法。"
 TNO_CountryClosing_epilogue_AAO_Rickover: "如同凤凰涅槃，伟大的民主自二战余烬中崛起，在冰封大陆之上展翅翱翔。南极洲其他地方一步又一步地陷入混乱与暴政，OFN事务局则随之奏响了一支又一支的凯歌。纳粹在南十字星的光辉之下节节败退；冰虫计划深入地心，有望为自由世界带来前所未有的安全；男女平等的漫长征途又踏进了新的领域。然而，不确定性随着胜利悄然而至，时间推移，内部裂痕日渐显现，老对手也正磨刀霍霍。\n\n事务局前途未卜，美国不愿冒这些重大成果化为乌有的风险，因此选择不顾盟友的怨言，继续亲自监管南极领地。未来，完成冰虫计划和保卫新领地将是事务局首要的任务。然而，即使能够达到目的，许多人也已开始质疑，是否值得付出将南极洲变成美国军事基地这样的代价。"
 TNO_CountryClosing_epilogue_BRA_Adhemar_Big_Win_Jackpot: "阿德马尔。他来，他干，他腐败。\n\n但对于巴西人民而言，他不仅是总统，不仅是盗贼。他是俯耳倾听民意的引路人，是润滑官僚机器齿轮的总督官。他是疗愈病痛的医师，是自掏腰包接济穷汉、饿殍与残障者的富豪。他是通晓多国语言的外交鬼才，能在国际纵横捭阖间谋取国家与个人的暴利。他是瓦加斯真正的继承者，如今也成为小瓦加斯的精神之父。纵使罪恶累累，纵使缺陷重重，阿德马尔·德·巴罗斯却窃取了巴西的心。\n\n因此当新一轮特鲁科开场时，阿德马尔必将准备就绪。他坐拥金钱能买到的极致人生。但更重要的是——他身后自有一个国家为他撑腰。"
 TNO_CountryClosing_epilogue_BRA_Adhemar_Lives_Vargas_Wins: "或许通往永恒之路的第二步要比第一步更加平静。圣保罗医师出身的阿德马尔·德·巴罗斯，在追逐不朽之名的征途上历经重重阻碍：流亡境外、贪腐指控、数次总统竞选折戟、劳多·纳特尔不敌埃德娜·洛特、牵涉纳粹间谍的丑闻、长达月余的昏迷……但这些劫难都被他报以从容微笑与矫健步伐。此刻他一手传递着权力的接力棒，一手摩挲着衣袋里叮当作响的金币。\n\n接过权杖的是阿德马尔潇洒的门生——小瓦加斯。他不仅继承了生父尊贵的姓氏（以及更胜一筹的英俊相貌），更将执掌一个按照阿德马尔心意打造的国家：飘扬着社进党旗帜，遍布着宏图伟业，充盈着克鲁赛罗纸币，更有老瓦加斯生前所匮乏的军队效忠。因为若阿德马尔·德·巴罗斯准备退隐，\n\n定当以其非凡的风范。"
 TNO_CountryClosing_epilogue_BRA_Adhemar_Lives_Vargas_Loses: "他身兼飞行员、医生、通才、盗贼、总统数职。社会进步党以民粹主义的魅力与放纵之泉为这个国家打造出如此多姿的领袖。阿德马尔·德·巴罗斯固然带来了污浊泥泞与混乱纷扰，但政府与民众是如此贴近，人民能看清权力笑容的每一寸纹路。\n\n然而再盛大的狂欢盛宴，纵然再令人留恋，终有曲终人散的时刻。究竟是国家厌倦了阿德马尔那油滑的掌控，还是小瓦加斯未能继承恩师的作派与谄媚人脉网络？票箱沉默不语，却在宿醉未消的国民耳畔回响着震耳欲聋的宣告：狂欢节已落幕。\n\n但当巴西人民踉跄穿行于遗留的宏伟工程与医院之间时，请让他们带着微笑，追忆那持续五年的喧腾盛宴，以及那位始终风度翩翩的主人家。"
 TNO_CountryClosing_epilogue_BRA_Adhemar_Wins_War: "巴西民族绝非好战的征服者，阿德马尔·德·巴罗斯总统更非穷兵黩武之徒。但当阿根廷的侵略与阴谋威胁他们引以为傲的祖国时，人民毅然集结在领袖与那面珍贵的希望之旗下，誓要为大陆重铸和平。\n\n无惧核战烈焰的威慑，这支斥重金打造、装备精良、经验丰富且团结如钢的军队将高乔人一次次击溃。在内政外交的双重战场，阿德马尔与社进党厉行俭政、广纳资源、慷慨陈词，步步逼近最终凯旋。荣归故里的将士、举国上下的民众如今纵情沉醉于极乐与豪奢之中，何足为怪？\n\n阿德马尔曾许诺给巴西一个世界，如今他们赢得的正是这整个世界。"
 TNO_CountryClosing_epilogue_BRA_Adhemar_Loses_War: "无数年轻人没能重返家园。倘若阿德马尔不曾为一己私利腐蚀军队，多少生命本可挽回？多少人死于多年前便被盗卖一空的救命药品缺席的医院？若他当初更执着于研发核弹，或是在必要时按下按钮，这些忠魂是否仍能长存？若他不曾将阿根廷逼至那般绝境……\n\n巴西已无暇回答这些诘问。政府机构正在坍塌，经济沦为废墟，叛军如秃鹫扑食腐肉般遍地滋长。\n\n更无余暇与那个偷走了国家未来之人对话。"
 TNO_CountryClosing_epilogue_BRA_Adhemar_Dies_Vargas_Wins: "社进党一度被认定随着阿德马尔·德·巴罗斯的死亡一同毁灭。这个除了个人敛财别无纲领、丑闻缠身的政党，理应封存在圣保罗某处脏污的总部废墟里，无人悼念。\n\n但忠诚信徒始终铭记拉撒路复活的圣迹。当神子高呼“出来吧！”时，这个党派应声苏醒。小瓦加斯引领社进党再度逆袭获胜，调动民众对父亲的每一丝怀旧记忆，挥洒阿德马尔当年洒向贫民之手的每一枚克鲁赛罗硬币，榨取自己青春俊美的每一分魅力。\n\n巴西的新秩序归来了……或许，新国家体制亦将再临人间。"
 TNO_CountryClosing_epilogue_BRA_Adhemar_Dies_Edna_Wins: "埃德娜·洛特和巴西工党的崛起让人很容易断言，阿德马尔·德·巴罗斯总统的政治遗产即将被彻底抹除。他蔓延在巴西每个机构的腐败、安插在巴西利亚和各州的心腹集团、默许德国势力渗透全国每个角落的行径……这些都是埃德娜的扫荡目标，她要令其土崩瓦解。\n\n但阿德马尔仍有一项遗产会长存于世——他与埃德娜·洛特的交锋。即便未曾担任阿德马尔的副总统，这位本已实力雄厚的政治家或许仍能问鼎总统之位。然而正如优秀的教师从不停止学习一样：历经无数对抗与转瞬即逝的片刻惺惺相惜，埃德娜已为未来的挑战重塑自我。几分淬炼后的冷冽、层出不穷的政治手腕，以及那永不褪色的从容笑容，都将成为她和巴西的利刃。"
 TNO_CountryClosing_epilogue_BRA_Adhemar_Dies_Someone_Wins: "巴西迫切想要遗忘。遗忘那个被金钱与诡计所蛊惑、将德国势力引入巴西腹地的男人，遗忘那个从病人手中窃取钱财的医生，遗忘那个祈祷时被上帝惩罚的基督徒。遗忘那些名字——无论是“劳多·纳特尔”还是“埃德娜·洛特”——这些名字无论是否出于本意，都成了巴西人想起他的索引符号。甚至要遗忘小瓦加斯：他承袭了父亲的姓氏，却做了叛徒。\n\n不，那个男人的时代将被新时代的总统彻底掩埋，一个承载新希望的领袖。他必须在圣保罗政客留下的流沙地基上重建：腐败的政府机构与锈迹斑斑的军队，就像贴在骇人伤口上的止血胶布。倘若新时代的总统真能成功——\n\n那他必将成为青史留名之人。"
 TNO_CountryClosing_epilogue_BRA_Lacerda_Imp_Failure: "这必定是场噩梦。里约怎可能沦亡，化作充满憎恨的烈焰、洪流与惨叫的漩涡？直升机遮蔽天穹如鸦群蔽日，尸骸堆砌街道若石铺长阶。共产党人固然在毙命，但每倒下一人，南北各地便跃起更多暴动者。国家的守护者，那些士兵，怎会在最危难的时刻背叛我们，将枪口对准自己的同僚？\n\n马加良斯·平托无论如何挣扎，都无法从这场噩梦中惊醒。卡洛斯·拉塞尔达能将自己掐到鲜血淋漓，却无法令自己苏醒。巴西或许会发出撕心裂肺的哀嚎，但无人能让这国度睁开双眼。只因这折磨永无止境。时至午夜，而它将永驻。"
 TNO_CountryClosing_epilogue_BRA_Lacerda_Imp_Victory: "崭新巴西共和国终于巍然屹立、庄严堂堂；将瓦加斯“新国家”锈蚀的枷锁碾碎于脚下。左翼与共产党等妄图再度颠覆它的势力已然分崩离析。而在这尊巨人的肩头，栖着一只忠心耿耿的乌鸦，低声指引它将行往何方——迈向更自由、更繁荣的市场。只要纳粹或阿根廷的丑恶头颅胆敢扬起，就去为自由而战。\n\n然而立足如此之高，这泰坦已听不见底层小民的呼声。何须理会他们？愚民的诉求无非是莽撞野心家兜售的空头支票与谎言。不。当新十年的曙光初现，唯是他们将跟随巨人的步伐前行。"
 TNO_CountryClosing_epilogue_BRA_Someone_Loses_War: "亚松森条约的书写材料远不止墨迹。它写就于流民沿公路逃亡的泪水——他们抛下故园、财富与往昔生活。它写就于巴西一代青年男儿的鲜血——死者长眠、伤者残损、幸存者支离破碎。它写就于汗水。既是用颤抖的手签署条约者之冷汗，也是紧攥报纸刊登条约之人手心渗出的冷汗。更是男男女女面对未知未来的惊惶之汗。\n\n巴西无缘问鼎第五超级大国。阿根廷不仅夺走了这个名号，更掠走无数利益。昔日盟友或远遁他方，或沦为阿根廷附庸。繁荣梦想被压顶外债与恶性通胀撕得粉碎。社会撕裂如碎镜：保利斯塔人与卡里奥卡斯人，共产主义者与自由主义者，黑人、白人以及所有中间肤色者，都在绝望中寻找要为祖国崩塌负责的替罪羊。\n\n亚松森条约如利刃刺穿巴西心脏。"
 TNO_CountryClosing_epilogue_BRA_Someone_Wins_War: "这是巴西问鼎超级大国宝座，阿根廷对美洲大陆的威胁彻底终结的一年。这场胜利并非命中注定，每一寸光辉都浸透鲜血与汗水，勇士陨落疆场，后方尽瘁家国。在那赌上全人类存亡的核战烈焰将至时刻——\n\n我们最终押中历史轮盘。此刻从里约到圣保罗，从福塔莱萨到玛瑙斯，国民彼此致意时无不充盈着新生荣耀，为这支铁军，为这方热土，为每一个共铸辉煌的同胞。全国团结于本届政府麾下，矢志将其最恢弘的蓝图化作战鼓铮鸣。当文明之光普照美洲大陆的每个角落，这片土地久违的信仰终得见证：\n\n秩序与进步。"
 TNO_CountryClosing_epilogue_BRA_Lacerda_Wins_War: "卡洛斯·拉塞尔达和他的乐队在总统任期的最后几个月里，举办了一场恢弘壮绝的音乐会，为南大西洋战争的胜利者与牺牲者献上致意。巴西利亚、里约、圣保罗和其余十多个城市共同见证了卡洛斯·拉塞尔达的最后一次巡演，宣告他的总统任期永垂不朽。他趾高气扬地踏上舞台，人群的咆哮声震耳欲聋。每当他听到这些声音，脸上总会出现止不住的笑容。\n\n然而，哪怕拉塞尔达业已站在指挥台上，无数的名曲从他的指尖飞旋而出，仍有一头名为“疑虑”的小兽在啃食着他的灵魂。这一切可否避免？两国人民遭受的死亡和毁灭是否值得？但聆听他演讲的众人正大声吼叫，其音浪之大将小兽的存在也彻底淹没。他带领巴西度过了空前绝后的危机，将巴西带往了世界舞台的新高度，并亲眼见证自己留存于历史书上的遗产厚度凌驾于瓦加斯之上。\n\n时值[GetYear]年，群鸦啸叫着拉塞尔达的英雄之名。"
 TNO_CountryClosing_epilogue_BRA_Lacerda_Loses_War: "距离子夜还有二十分钟。雨水打落在拉塞尔达办公室的窗户上。他开了瓶苏格兰威士忌，酒液的流动宛如伤口涌出的鲜血。拉塞尔达拿起冷冰冰的酒杯，一饮而尽。头条新闻与广播电波中充斥着悲伤和愤怒，来自战败国的哭嚎。\n\n拉塞尔达又给自己倒了一杯。他忆起了那对抗阿根廷的战争，彻头彻尾的灾难，再次饮干了杯中物。每天都有来自前线的新故事：碌碌无为、暴戾恣睢、人间悲剧。随着酒杯一次次的满上和一次次的清空，每一次失败，每一桩罪行都压在拉塞尔达的灵魂之上，覆盖于他的遗产之上。跟瓦加斯一个德行，不是吗？不，比那更加糟心，拉塞尔达如是说。瓦加斯的流血牺牲好歹有所成就，而自己一事无成。\n\n时值[GetYear]年，于此午夜时分，巴西的未来就如同拉塞尔达的酒瓶一般，空空如也。"
 TNO_CountryClosing_epilogue_BRA_Tavora_Wins_War: "巴西人一觉醒来，发现维尔吉利奥·塔沃拉通过党内政变就任总统时，举国陷入震惊与困惑。拉塞尔达固然在处理总罢工时表现无能，但至少是民众熟悉的面孔。这个突然冒出的男人是谁？不过是当过军官、干过州长、领导着某个衰弱派系的过气领袖，这人又是如何从阴影中现身，窃取了大位？\n\n而今巴西街头巷尾无人不晓这个被反复传唱的名字。对阿根廷的胜利重振了巴西，夺回了这个国家在世界舞台上的地位。而这场胜利的核心人物正是维尔吉利奥·德·莫赖斯·费尔南德斯·塔沃拉——那个从阴影中崛起，带领国家走向胜利之人。\n\n时值[GetYear]年，尽管塔沃拉篡夺了历史为拉塞尔达预留的位置，但他的确与这个角色完美契合。"
 TNO_CountryClosing_epilogue_BRA_Tavora_Loses_War: "巴西人一觉醒来，却发现总统遭罢黜，取而代之的是全民盟会议室暗影铸就的傀儡。或许维尔吉利奥·塔沃拉本该永居暗处，毕竟他终究无力应对南大西洋战争的挑战。阿根廷坦克碾破防线，摧垮防御，如今巴西在全世界面前屈膝败北。\n\n塔沃拉的幕僚们正劝说他与全民盟为选举溃败做准备，但他深知败选将更为惨烈。选民们控诉他煽动叛乱、野心膨胀、治国无能——而判决早已注定。他将率领全民盟走向刑场，携手迎向行刑队用子弹投出的选票。\n\n时值[GetYear]年，塔沃拉不禁自问：或许当初选择蛰伏于阴影，才是更好的选择。"
 TNO_CountryClosing_epilogue_BRA_Tavora_Win: "1950年，爱德华多·戈梅斯赢得总统之位，一个打破瓦加斯、乃至威权发展主义的未来似乎要实现了。然而，他的统治既糟糕又短暂，在库比契克接任后，几乎没留下什么影响。1965年，在戈梅斯执政失败的十年后，卡洛斯·拉塞尔达掌权。他的统治同样既糟糕又短暂——但多亏了维尔吉利奥·塔沃拉，局面得以挽救。\n\n巴西被“务实上校”从崩溃的边缘拉了回来，这个国家似乎正走在复苏的道路上。如今，巴西是OFN中备受重视的一员，其经济正稳步走向自由化，前政权的权力基础已被打压。戈梅斯时代的阴影正在消散，虽然塔沃拉不会是那个彻底驱散这些阴影的人，但他对自己选择的继任者感到放心。\n\n时值[GetYear]年，内伊·布拉加赢得总统选举，这一任期或许会辉煌且不朽。"
 TNO_CountryClosing_epilogue_BRA_Tavora_Fail: "随着维尔吉利奥·塔沃拉总统任期进入倒计时，巴西人不禁思索，他的上台是否真的存在意义。他崭露头角时，曾承诺要结束拉塞尔达糟糕任期所带来的种种困境。他对总罢工的处理方式一度险些让劳工行动演变成一场内战。全民盟出现了分裂，党内的几大势力互相攻讦，只为争夺主导权。塔沃拉脱颖而出，做出了诸多承诺。\n\n然而，当真正到了治理国家的时候，人们发现塔沃拉能力不足。他没能确立自己及其“务实派”的权威，如今，他只能眼睁睁地看着工党用数百万张选票将他赶下台。塔沃拉办公室里的时钟滴答作响时，他发觉自己正盯着墙上的那张旧照片，照片里有他、卡洛斯·拉塞尔达和爱德华多·戈梅斯。巴西的领导人已经两次试图将国家塑造成他们那位已然倒下的偶像所期望的模样，而两次都失败了。\n\n时值[GetYear]年，不会再有第三次这样的尝试了。 "
 TNO_CountryClosing_epilogue_BRA_Lacerda_Win_Max: "纵观历史，真正的赢家寥寥无几。即便是最伟大的帝国也会走向覆灭，就连热图利奥·瓦加斯也曾在选举中落败。显然，世上本就没有绝对的胜者，只有那些赢得了足够多胜利的人罢了。\n\n如此看来，卡洛斯·拉塞尔达算得上是一位征战四方的英雄。他推动了南美洲“秩序与进步”的理念，促成了与美国的联盟，击败了瓦加斯主义以及维护这一主义的法律体系。最重要的是，多亏了当选总统马加良斯，他成为了一个政治王朝的奠基人。他精心挑选的继任者保证拉塞尔达主义不仅仅是一种政治实践，更是一个政治招牌。\n\n巴西满怀希望地迈入了70年代，却迎来了坎坷的开端。中东地区局势动荡，巴西的银行账户也跟着遭殃。国内的工人们只需一个导火索，就会走上街头游行抗议。全民盟的势力如日中天，但许多人都盼望着能将其打压下去。胜利总会造就心怀不满的失败者，然而他，还有他们，已经为此投入了太多。或许，这一次火炬的传递还是值得好好享受一番的。就这一次吧。 "
 TNO_CountryClosing_epilogue_BRA_Lacerda_Win_Mid: "老话说得好，巴西可不是给新手打理的。治理巴西肯定不是件容易事，而卡洛斯·拉塞尔达觉得自己比任何人都更明白这一点。但作为曾在瓜纳巴拉州和联邦区任职的老手，他也不禁怀疑，这个国家是不是连专家也搞不定。\n\n尽管他竭尽全力去避免危机，但危机还是不断爆发并愈演愈烈。他推行的法律不是被修改就是被否决，他在国外的盟友也接连吃瘪。“专业能力” 真的能避免这些情况的发生吗？\n\n即便如此，他还是坚持了下来。他挺过了军方的压力、媒体的舆论、暴徒的骚乱以及激进分子的冲击，他依然稳坐其位。而且他还会继续稳坐下去——拉斐尔·马加良斯会确保这一点。不过，拉斐尔的工作可不轻松，毕竟眼下世界局势动荡不安，巴西国内经济更是一团糟。巴西已经千疮百孔，在国际上的地位也尚未确定，全民盟的议程还远未完成。但话说回来，拉塞尔达总统已经成为了历史的一部分；剩下的事情最好还是交给未来去解决吧。 "
 TNO_CountryClosing_epilogue_BRA_Lacerda_Win_Min: "当卡洛斯·拉塞尔达搬进高原宫时，他似乎终于要应验某种预言了。他常常把自己想象成巴西的普罗米修斯，想象着自己如何将所在政党的火种带入巴西政坛，如何彻底改变自己治下人民的历史进程，启迪他们、赋予他们力量。然而，他大错特错了。\n\n事实上，他提出的法律屡次遭到国会否决，他的国际立场不被盟友认可，最终，他的统治也遭到了人民的唾弃，而给予他致命一击的反而不是军方。不管怎样，全民盟的愿景被彻底粉碎；拉斐尔·马加良斯也不再出面维护该党的准则。\n\n当他最后要搬出高原宫时，在旁观者的心目中，他的故事不似普罗米修斯，更似堂吉诃德。总统与瓦加斯主义作斗争，好似堂吉诃德与风车大战。不过，堂吉诃德好歹还留下了一段传奇，而卡洛斯·拉塞尔达却不会留下任何功绩。 "
 TNO_CountryClosing_epilogue_AAC_Guzman_Success: "灿烂的曙光划破冰封的边疆，为这因一人的沉静勇毅而得以救赎的大陆披上灿金色的霞光。胡利奥·埃斯库德罗·古斯曼教授，智利南极饱经风霜的巨人，向那混乱的深渊中夺回了胜利——他所凭借的，不是步枪，而是不屈不挠的正义之章。他的不懈努力终获成果：阿德莱德的真相——以血为证，以墨为书——陈于美洲国家组织面前，让阿根廷侵略者低下了高傲的头颅。他们对主权的公然侵犯无可辩驳，最终不得不做出让步：从国库中掏出赔款，向智利的正当主张致以一次不情愿的屈服。\n\n然而，阴影正从地平线那端席卷而来。阿根廷的让步，或许反将滋养他们报复的欲望；而这片冰层，仍在野心的重压下呻吟。尽管如此，他依然昂首挺立，这位自严寒之中淬炼而出的和平缔造者，他的功绩正是抵御未来浪潮的壁垒。他的胜利是会经受住战火的考验，还是会就此消融，成为这片蛮荒大陆上一个过于纯粹的梦想，载入史册？流放之地在颤栗中，等待着最终的答案。"
 TNO_CountryClosing_epilogue_AAC_Guzman_Failure: "霜冻与失败的阴霾笼罩着南极的广袤荒原，梦想家的愿景被那漫天风雪吹得支离破碎。胡利奥·埃斯库德罗·古斯曼教授，智利南极洲坚定的守护者，此刻正因自身的软弱而不堪重负——他那幅以阿德莱德之血为丝线织就的和平锦绣，已在轻蔑与沉默之中土崩瓦解。美洲国家组织并非出于正义，而是慑服于美国的强权，最终勉强承认了智利的主张。这份虚伪的赠礼毫发无损地放过了阿根廷——毋需赔偿，也不用对其悍然犯下的罪行付出丝毫代价。流放之地在背叛中低吟，它的主人蒙受屈辱，他的呼号淹没在震耳欲聋的冷漠之中。\n\n如今，得逞的阿根廷气焰更张，正磨利它的爪牙，冰原上流淌着血腥的低语。古斯曼孑然一身，他毕生的功业，在这片唾弃希望的土地上，只余一道脆弱的残响。智利是会从这片冰封的泥沼中奋起，还是会因这不堪一击的和平而就此沉沦？流放之地在颤栗中，等待着最终的答案。"
 TNO_CountryClosing_epilogue_AAC_Merino_Success: "血色黎明浸透冰封的荒原，宣示着一尊巨像在南方崛起。何塞·托里维奥·梅里诺上校铸就了传奇——他的海军陆战队员成为了南极荒野的顶尖掠食者。那懦弱老朽的外交辞令被梅里诺的军靴踩在脚下——在刀剑面前，纸笔是何等的苍白无力。\n\n劫持事件不过是一支序曲，是战争交响乐奏响之前，指挥大师的一次华丽炫技。然而胜利滋生野心，而胜利的滋味总是令人沉醉。随着南极短暂的夏日被渐深的寒意所取代，一场更大冲突的阴影悄然浮现。梅里诺眼中的未来之路，并非由妥协铺就，而是由那些经受过极南试炼的、钢铁般坚定的决心所铸成。智利南极领地，乃至智利本身的命运，皆维系于此。在世界尽头的这座严酷剧场里，实用主义者或许会为和平奔走，但舞台似乎已无可挽回地为士兵的角色而搭定。智利找到了它那位冰封的战帅，而他的意志呼唤着征服。他将前往何处，放出他麾下的战争走狗？流放之地在颤栗中，等待着最终的答案。"
 TNO_CountryClosing_epilogue_AAC_Merino_Failure: "坚冰与耻辱的阴影笼罩着南极的荒原，这里曾有一位强者。何塞·托里维奥·梅里诺上校，自封斯尼佩英雄的狂人，曾试图打造智利的利维坦。他麾下的海军陆战队，本应磨炼艰深、至臻化境，准备以一次不流血的突袭，扼住阿根廷的咽喉。然而，手一抖、枪便响，精心设下的陷阱便失效了。烟雾吞没了敌舰，甲板上血肉横飞。这所谓的“顶尖掠食者”，禁不住虚荣的吹嘘，最终如猎物一般倒下，流尽了鲜血。这场失败看似微不足道，却已然动摇了梅里诺新生的权威。\n\n智利正徘徊在悬崖边缘。强者虽遭人嗤笑，但他并未屈服，失败已化作了他复仇的熔炉。 这场滔天怒火，是会助他夺回南方，还是会化作一场自掘坟墓的风暴，将一切撕个粉碎？流放之地在颤栗中，等待着最终的答案。"