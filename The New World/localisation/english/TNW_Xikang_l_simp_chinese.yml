 POLITICS_LIU_WENHUI_DESC:0 "刘文辉生于1895年，自始至终都是个军人派。刘氏1916年毕业于保定陆军军官学校，返回四川后，他初入刘存厚的川军派系，1926年转而加入国民党。他在国民革命军中晋升迅速，很快擢升为第24军军长，1929年更被委任为四川省政府主席。面对当时五路军阀激烈角逐的四川省，筹组联盟、策动倒戈、制造摩擦和阴谋暗算，构成了他主政时期的主旋律。但1934年，这位铁腕人物竟败在族侄刘湘手下，遭逐出四川，后官拜西康省主席。刘文辉与蒋介石的关系，恰似其掌中四川省的翻版，可谓是动荡难安。远踞西南边陲的刘氏多次抗命中央，拒不执行委员长调令。\n\n抗战期间，刘文辉以审慎姿态保存实力，严禁所部参与大规模战事。当日本侵略军凭五号作战之势突入四川时，这位巴蜀乱局中最具实力的余脉之主立即收拢部众，远遁西昌深山扎营固守。面对日寇劝降，刘氏严辞拒绝，而日军亦视贫瘠山省为鸡肋，未作穷追。\n\n如今距日军攻川已逾十载，刘文辉孤悬边关，堪为中国硕果仅存的自主军阀。其桑梓之地四川虽名义归属中央，实则重陷混沌，诸多派系与武装割据势力竞相逐鹿。虽刘氏本人矢志光复自由之中华，却遭部属集体抵制，直言对日作战形同自杀。若欲重振旗鼓挥师东指，恐需天降神迹方能成行……"
