FAL_Pearls_covered_in_dust: "明珠蒙尘"
FAL_Pearls_covered_in_dust_desc: "阿尔及利亚，北非的瑰宝，从不曾被法国仅视为殖民地。它被纳入本土治理，是法兰西海外帝国中开发最深、倾注最多的土地。在法国人心中，没有别处可替代它的位置，这里孕育过法兰西文明的异地瑰宝，曾是殖民王冠上最亮的明珠。只是如今，这颗明珠早已黯淡。\n\n法国人侧耳倾听自己的心跳，不愿想象那优美律动终有静止的一日。从未停止，却仍试图勾勒那样的须臾，哪怕只是徒劳。黎明还在那里，暴乱也是"
FAL_endless_war: "兵戈不休"
FAL_endless_war_desc: "民族解放阵线，这个法国本应在二十年前就彻底埋葬的势力，竟在二十一世纪死灰复燃。对本土政府而言，这是不可接受的现实。阿尔及利亚作为法国辐射西非的战略通道，是其赖以生存的延伸。于是，驻北非的军事指挥部再次挥动屠刀，在境内发动清洗。他们幻想能如二十年前一样，用枪口让这群“不堪一击”的阿尔及利亚人重新跪倒。\n\n然而他们错了。死亡未能碾碎意志。烽火在此已延烧四年，阿尔及利亚人的抵抗愈燃愈烈，而法国政府却日渐枯竭。战争拖垮了财政，也拖垮了意志。也许这火焰还将继续燃烧，直到最后一个法国士兵，滚出这片滚烫的土地。"
FAL_dense_spider_web: "蛛网密布"
FAL_dense_spider_web_desc: "战争从不只吸引士兵。战争贩子、肮脏的政客、娼妓……这场战争也不例外。无数怀揣异心之人踏上这片焦土，为名，为利，为欲望。军政名流、商贾之子，如秃鹫般盘旋而至，在这片伤痕累累的土地上，啜饮着人民的血，赖以生存。\n\n他们织就一张张错综复杂的利益网络，缠绕在每一道战壕两侧。法军或起义者，敌我或阵营，在这里都能联系，都在交易。于是，在这片燃烧的大地上，阿尔及利亚人成了阿尔及利亚人的地狱，而阿尔及利亚，却成了他们的天堂。"