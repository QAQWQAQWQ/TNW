FAL_Governor_Palace: "§R阿尔及利亚内战§!"
POLITICS_GOVERNOR_PALACE_DESC: "阿尔及利亚，一片曾被誉为光荣与富饶的土地。无数法国青年为此奔赴远方，将他们的热血与生命，那些被时代驱策的、近乎廉价的人生，悉数投入这场战争。如今，殖民政府已无力掌控局面，阿尔及利亚陷入混沌。对于阿尔及利亚人来说，内战仿佛是一簇借来的火焰。\n\n当烈焰燃过，当愤怒平息，他们还剩下什么？他们从陌生的贩子手中买来船票，亲手将这个国家送上一艘叫做“独立”的巨轮。可巨轮终将驶向何方？那已不由他们决定。人世间没有任何理想值得以如此沉沦的代价去交换。阿尔及利亚人看着面前的迷雾，他们不禁发问，如果明天不再到来，今日又该当如何？"
