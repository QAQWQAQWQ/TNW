 antarctica_aao_alert_event.32.a:0 "自由世界的火炬熄灭于冰原。"
 antarctica_aao.10.t:0 "冰原上的火焰"
 antarctica_aao.10.desc:0 "在过去漫长的岁月里，冰封大陆曾见过各种火焰。在大轰炸的时代，它曾见证陨石重重地砸在星球之上，流出的熔岩宛如大地的鲜血；在巨虫时代，它也曾郁郁葱葱、空气纯净，哪怕是最小的火星都会化作冲天烈焰，在原野上飞驰。炽烈的死亡和光荣的重生循环往复，岁月亦随之静静流逝。\n\n后来的时光里，这片大陆奔向极南，万丈冰雪覆盖其上，燃煤和石油熊熊燃烧，带着汽船来到了它的岸边。如此渺小的火焰仅仅只是对过去的拙劣模仿罢了，几乎不足以夺取生命、几乎不足以维持生命。\n\n但今天，这片大地感受到了从未曾感受过的事物，仿佛自然界的基本规律被颠覆了一般。物质在其自身的质量下弯曲，发出比太阳更耀眼的光芒，万物都难逃它的烧灼。\n\n这群身着灰衣的闯入者为自己的天才而喝彩，浑然不知他们的造物已经落入了不友好的眼睛之中。一群孤独的雪地观察者仔细地观察着大地上升起的第二个太阳，没过多久，他们就在雪地上四处游荡，着急地诉说着他们看到的景象。此时，一面蓝白相间的旗帜在万里无云的天空中飘扬，旗帜的中心是一柄熊熊燃烧的火炬。"
 antarctica_aao.10.a:0 "新的火焰在这片冰原上升腾。"
 antarctica_aao.20.t:0 "摄影之眼"
 antarctica_aao.20.desc:0 "麦克默多站的会议室里，威廉·“里普”·罗伯逊正在展示他和他的团队在过去几天里拍摄到的照片，围坐在桌边三人都不由得地紧张不安起来。在某处山坡上，里普完美地拍下了纳粹核武器的爆炸场面，对南极景观造成的破坏让在场所有人都印象十分深刻。“你确定，没人看到了你的部下？”雷伯恩中将向里普问道。\n\n“中情局派我来这儿可不是让我拍风景照的。”里普笑着回答道。\n\n“与美国的核装置相比，当量如何？”南极洲事务局澳大利亚司司长霍华德·比尔提出了自己的疑问。\n\n“与我们的大多核武器相当，”里普回答道，“看来德国佬已经跟上了我们进步的步伐，甚至可能已经在某些方面超过了我们。”新西兰南极研究局局长埃德蒙·希拉里闻言不由得挑了挑眉毛：“超过？”\n\n“参考兰利报告和我团队观察到的情况，德国佬的核武开发似乎即将进入新阶段。设备重新部署、人员转移，一切迹象都表明德国正在加倍投入核开发，我们现在看到的核试验极大概率只是未来的冰山一角。”\n\n“我必须得立即将这些消息传达我国政府。”比尔说着，从桌边的座位上站起来。“的确，可怕的消息。”一旁的希拉里也开口附和。雷伯恩则直直地凝视着照片中化为焦土的南极风光，然后抬头驱散浮现在眼前的幽灵：“谢谢你的报告。能否保证你的团队随时待命，准备监测下一次可能的测试？”\n\n里普应声起身，站在桌边，回答道：“我的部下可都是这方面的顶尖人才。”"
 antarctica_aao.20.a:0 "顶尖、人才。"
 antarctica_aao.20.a.tt:0 "§e美国§!对§Q事务局§!的控制力将提升§W4%§!。"
 antarctica_aao.30.t:0 "裂痕"
 antarctica_aao.30.desc:0 "麦克默多站是南极洲最接近城市的地方，这里能为数千人提供住所，乃至一定程度上的舒适生活。与旧基地相比，麦克默多站建有许多相互连接的保温走廊和隧道，人们可以从基地的一端走到另一端而不会感到寒冷，澳大利亚研究计划的领导人霍华德·比尔对此十分中意。\n\n核能改变了南极探索，仰赖于此，基地几乎能实现能源上的自给自足。未来的基地甚至还可以种植农作物，根本不需要依靠本土的补给运输，这正是核能支持者比尔所希望的。\n\n然而，只要OFN南极洲事务局中的政治僵局依然无法得以解决，在南极定居、乃至殖民的梦想就只是一纸空谈。名义上，南极洲事务局是美国、澳大利亚和新西兰三国的共同努力；然而，在实践中，却都是美国人说了算，澳新两国对此十分不满，毕竟事务局最初的基础就建立在他们的领地宣称之上。\n\n后勤方面，问题表现为平行的补给链和不兼容的基础设施；防卫方面，三国的武器需要不同制式的弹药；而就个人而言，不同的文化和军事传统显然也无法促进人们之间的团结。\n\n比尔转身，走过麦克默多站里的又一道走廊，迎头撞上了事务局的又一个现实：这里的多种族组成。美国黑人、英联邦亚洲殖民地的难民、毛利人，无一不是问题，而解决这些问题已经化作了比尔日常的一部分。"
 antarctica_aao.30.a:0 "自由国家的组织？"
 antarctica_aao.40.t:0 "后果"
 antarctica_aao.40.desc:0 "威廉·F·雷伯恩中将思索着，或许，这就是一切曾经有所成就的人们共同的末路：被抬上高位、感觉不到自己做出的决策会有怎样的后果。曾经，他在太平洋战场上服役、在航母指挥室里挥斥方遒，那时，他能感受到他的抉择会带来怎样的结果，亲眼见证创下的战果；又或者，当他总揽北极星导弹的开发研制时，他可以亲眼看到导弹一日一日地慢慢成形，自己做出的每个管理决策都能反映在工作进程之中。然而，他现在却身处麦克默多站中心这拥挤逼仄的办公室里，要知道，这里可是离航母舰桥和导弹发射井最遥远的地方。\n\n他面前不是大海的汹涌浪涛，而是堆成小山的文件；他不能派遣海军轰炸机投入激烈的战火硝烟，而只能派遣助手往返奔波。德国和日本的入侵报告、澳大利亚的物资清单、美军潜艇穿越印度洋的巡逻路线，这些都会摆上台的办公桌。当然，澳大利亚人和新西兰人有时也会来占用他的办公室，争论究竟是谁对这片地区或是那个地方拥有管辖权。\n\n政治，这该死的政治，没什么能比和吝啬的官僚打交道更加让雷伯恩感到不适。他牵头的北极星导弹研发比计划提前四年取得了成功，这份南极洲的工作就是对此的回报。虽然中将才刚刚开始见识南极大陆的种种变幻莫测，但他已经明白，南极的危险有二：人与自然，而这两者都在与他作对。"
 antarctica_aao.40.a:0 "艰苦的战斗才刚刚开始。"
 antarctica_aao.50.t:0 "团队努力"
 antarctica_aao.50.desc:0 "食堂就和麦克默多站的其他建筑一样，面积大，人也多。毕竟是午餐时间嘛。肯尼斯·M·瓦尔曼是一位核工程师，他穿过了工人、士兵和其他职员的人海，在一张长桌上放下了盘子。无意之中，他听到了桌子对面的某一位的谈话。\n\n“我和你说，我们收集的那些海洋沉积物都是超级大新闻，有的甚至可能有几百万年的历史。”年轻的研究员眼里闪着光，继续讲述着他的发现。OFN南极洲事务局的成立有可能是为了给日益军事化的冷战火上浇油，但也给像他这样的南极研究者打了气，无论他们是来研究气候还是观察极地动物。\n\n另一位身着军装的研究员插话说：“你们这些家伙挖地的时候，我们却要在这世界上最极端的气候环境里试飞。”瓦尔曼默默地看着，无言地喝着饮料。军民双方的研究员继续着调侃，开了些轻松的玩笑。他比在场的任何人都清楚，超级大国们对在冰封大陆上的研究都很感兴趣，特别是和核能有关的东西。\n\n“嘿，无论我们是在做什么，”一位科学家说，“都比国内的那帮家伙更有意思。”全桌人都发出了认可的欢呼声。无论他们的目标是什么，背景又如何，麦克默多站的每个研究人员都清楚一件事：他们是先驱者。这让大家都很兴奋。"
 antarctica_aao.50.a:0 "至少我们还能达成些共识。"
 antarctica_aao.60.t:0 "使命与责任"
 antarctica_aao.60.desc:0 "詹姆斯·R·里迪海军少将是个喜欢自己动手的人。无论是在战时的大西洋进行反德巡逻还是在战后指挥航母编队，他总是尽其所能地为任务添加他的个人色彩。当他被分配到OFN南极洲事务局时，他也收到了一条明确的命令：把德日双方挡在OFN南极海域之外，并保持在印度洋的作战能力。\n\n确实很明确，但真的不简单。里迪在审查新报告时想着。德国海军在这几个月里一直都挺安稳，可能整个国防军都是这样。但日本人一直都在强化其在南极海域的海军存在，并经常从陆上或海上探测OFN的领土。\n\n日本最近的一次入侵行动是派遣两条驱逐舰深入事务局水域深达二十公里。里迪明白，他必须还以颜色。日本人是认拳头的，所以里迪也会用他们懂的方法和他们好好聊聊。他会响应日本的挑衅，同样派两条驱逐舰进入日本海域二十公里。里迪的职责不是拱火，但要是啥都不做就不太合适了。"
 antarctica_aao.60.a:0 "绥靖可从不是致胜之策。"
 antarctica_aao.70.t:0 "我们可冒不起风险"
 antarctica_aao.70.desc:0 "肯尼斯·瓦尔曼背着手，看着麦克默多站的核反应堆重新启动。他已经开始逐渐适应检查核反应堆时回荡在建筑物之中的震耳欲聋的轰鸣声了。在他身边，那些新来的工程师们欢呼雀跃着，他们的欣喜并非毫无来由。麦克默多站的核反应堆的确是算是一片独一无二的景致，多亏了这块不比原油桶大多少的反应核心，居住在这片大陆上最大的定居点的一千五百名队员的生活才有了着落。\n\n他带着那群和小孩子一样好奇的新同事们走进了设施。核能是一种极有潜力的能源，它能为人类带来不少好处，这也使那些新来的研究员大为震撼，瓦尔曼也是如此。但无论他靠近、凝视过它多少次，瓦尔曼还是对它所发出的那种诡异噪音感到恐惧。\n\n毫无疑问，这座反应堆的效能极为强大，但同时也十分脆弱。在它身上发出的哪怕最微小的故障都有可能使OFN的南极计划停摆，甚至夺走无数人的性命。他绝不会让这种事发生的。他移开目光，转向身边的新工程师们，微笑起来："
 antarctica_aao.70.a:0 "“我们得回顾一下安全程序。”"
 antarctica_aao.70.a.tt:0 "§e美国§!对§Q事务局§!的控制力将提升§W2%§!。\n§n澳大利亚§!对§Q事务局§!的控制力将提升§W2%§!。"
 antarctica_aao.80.t:0 "电话"
 antarctica_aao.80.desc:0 "在霍华德·比尔被派往南极之后，他每天能做的基本就是不停地接电话。直到最近，南极才有了电信网络，南极洲事务局前不久才安装了一批固定电话，将整片领地与澳大利亚和新西兰互联，并通过延伸网络进一步联通世界各地。因此，在他接起电话之前，比尔对电话那头的人是谁总是一无所知。\n\n然而，风水轮流转，今天比尔成了那个拨电话的人。他需要和澳大利亚本土的同行们谈谈，以便处理OFN南极领地上的澳大利亚特遣队的后勤问题。\n\n“听着，”他开了口，“我们可以对南极领地的用途、管理系统和人员组成施加更多的影响，但要做到这一点，我们必须有点家伙事儿，至少不能比美国人差太多。我的要求不高，几辆雪地车就够了。”\n\n在电话那头的人按惯例讲完有关后勤运输是多么困难的故事之后，比尔才补充道：“我知道，这段录音会被递交给内阁的人，所以我要说，澳大利亚可以为自由世界作出巨大的贡献，并且这个机会离我们越来越近了。我们必须清理南极这个后花园，以免小鬼子抓住这个机会封锁我们，让我们挨饿，乃至逼迫我们屈膝。要我说，与之相比，几辆雪地车和该死的南极动物的栖息地根本算不上什么代价。”"
 antarctica_aao.80.a:0 "“选择权在你，伙计。”"
 antarctica_aao.80.a.tt:0 "§n澳大利亚§!对§QOFN南极洲事务局§!的控制力将提升§W4%§!。"
 antarctica_aao.90.t:0 "离去"
 antarctica_aao.90.desc:0 "威廉·“里普”·罗伯逊看着南极洲的海岸在巨轮的尾迹中渐渐远去。离开这个冷死人的鬼地方让他倍感高兴，他从不觉得自己会好好扎根在南极洲，也毫不关心对这破地方的宣称，要他说，这不过都是拉选票的政治活动而已。出于各种各样的意图和目的，里普打出了“驻南极洲军事援助司令部研究观察团（MACA-SOG)”的幌子，以此掩护他在从东非海岸到菲律宾的广大印度洋战线上的所有秘密行动。对他来说，南极洲不过是小小插曲，可以充当为自己的团队争取资源的方便借口罢了。而在今天的行动中，南极洲，或者更确切地说，雷伯恩海军中将，就为一艘增援马来西亚自由战士的船只提供了掩护；同时，也为中情局特工送上了完美的伪装。\n\n里普的目光离开冰结的海岸线，看向身边的CIA特工格雷斯顿·林奇，说道：“我真期待马来西亚的丛林，不管那儿怎么样，肯定都比这个鬼地方强。”\n\n林奇递给里普一支烟。“我倒是有点喜欢上这个地方了，”林奇说着，“它同样也有自己的魅力。”\n\n“嗯，随你怎么看吧，我只觉得那是因为你的心简直就和这儿一样冷。”\n\n林奇笑了，他压低声音：“序列行动一切顺利。那些小伙子看起来就像是货真价实的日本兵，基本都能说一口流利的日语，只有少数人需要稍稍复习。事实上，最好别让他们被自己人看见，我可不想有美国人开枪打死美国人这种事儿。”\n\n“他们是日裔美国人。”里普纠正道。"
 antarctica_aao.90.a:0 "有什么要开始了。"
 antarctica_aao.90.a.tt:0 "§F启用§eCIA§!决议。\n§O军官§!界面中的单位管理选项现在可用。\n获得§Y60§!§W步兵装备§!、§Y10§!§W反坦克装备§!、§Y20§!§W支援装备§!、§Y5§!§W摩托化装备§!§!。"
 antarctica_aao.100.t:0 "梦想于世界之边缘"
 antarctica_aao.100.desc:0 "当埃德蒙·希拉里走出帐篷时，靴子踩雪的声音向他发出了问候。他在朦胧的灯光下伸了个懒腰，欣赏着眼前的景色。就和梦中一样：生活在文明的边缘，探索地球的至远边疆，并和志同道合的科学家和探险家们一同工作。\n\n要是生活真能这么简单就好了。\n\n但不幸的是，对希拉里和他的梦想来说，眼前的土地已经被各大帝国的无情作为弄得伤痕累累，四分五裂。冷战依旧统治着这片大陆，就和世界的其他部分一样。无畏的先驱者们曾经进行过的对这个世界的探索，现在却都只能以“把戏”或“扩张”的名义进行。\n\n这就是希拉里热切地接受了这个能代表新西兰加入OFN南极洲事务局的原因。当然，他是为了看风景和自我挑战过来的，但当他收到政府的邀请时，他知道，他能迎接更大的梦想。\n\n他渴望有一块土地能够保护和扩展人类的精神，无论大小。现在看来，这可能是个遥远的梦想，但上帝为他作证，他将尽其所能地奋斗。\n\n试图在这种恶劣的环境里实践人文主义并不容易。雷伯恩、比尔、里迪——这些人全都专注于执行他们的任务，或是惦记着他们自己的利益。他们是坏人吗？其实希拉里挺喜欢他们的，但他们都不同意他关于和平而团结的事务局的看法：通过合作来报复德日双方，而非通过逃避和内敛。\n\n目光扫过雪地，流淌在心中的决意温暖着他的身体。"
 antarctica_aao.100.a:0 "人寻求着希望，冰封的大地回望着他。"
 antarctica_aao.110.t:0 "再归旧地"
 antarctica_aao.110.desc:0 "自上次的圣诞礼物送到南极以来，麦克默多站的飞机跑道旁还从未这么热闹过。一架飞机正在逆风中降落，机上既没有烈酒香烟，也没有任何能在南极洲的无聊生活中消遣心情的东西——但是，机上乘坐的乃是一位传奇。\n\n尽管寒风刺骨，但飞机着陆停稳时，士兵和科学家们都露出了笑容，交谈如同野火一般蔓延开来。有人说着：“他好像是1910年斯科特探险队的成员。”还有人私语道：“他可是第一个发现斯科特遗体的人。”现今在世的人里，他是最富经验的南极探险家；他还是一位多面手，上知天文下晓地理，从雷达的发展到海洋的研究，其中都记着他的一份功劳。\n\n飞机的舱门缓慢地打开，霍华德·比尔对站在一旁的里迪少将说道：“我知道加拿大要给我们派个专业人士来，”他顿了一下，“可老天啊，他们可没说这位是斯科特探险队的幸存者啊？”\n\n“我读过他有关磁性反潜技术的每一篇文章，”里迪说道，“要是我们先前能更重视他的建议，与狼群之间的战斗或许就会大获成功。”\n\n“现在他来了，我们也该狠狠收拾收拾可恶的纳粹分子。相信他的经验肯定能在地面行军时帮上大忙。”\n\n飞机舱门中出现一道身影，阳光洒在查尔斯·西摩·赖特爵士的身上。尽管他已是七十五岁高龄，但却依然显得精神矍铄。赖特面带微笑，从舷梯上一跃而下，人群随之爆发出一阵欢呼与掌声，加拿大联邦宣告了自己在南极的存在。"
 antarctica_aao.110.a:0 "赖特与比尔握了握手：“回来的感觉真好，事不宜迟，开始干活吧。”"
 antarctica_aao.120.t:0 "召唤与回应"
 antarctica_aao.120.desc:0 "当雷伯恩第一次上报纳粹核试验的结果时，他完全不知道政府会作何反应。雷伯恩猜想，纳粹在南极大陆上引爆核武器，应该会引起上峰的警惕。但出乎预料的是，他的电话已经快被打爆了，事实证明，政府高度重视这一事件。\n\n雷伯恩凝视着眼前白纸黑字的命令，绞尽脑汁，尝试将各种蛛丝马迹联系起来。上级派来了几队工程师，名义上是要整固基建、建立新防御设施网络，但随行物料表明远不止如此。除此以外，人员名单也让雷伯恩深感疑惑：这支队伍中包括数十名来自各个领域的专家，怎么看也不像是来冰天雪地里锄大地的。显然，他们的任务不只是整固基建。虽然细节不详，但事实也表明几名陆军工程兵团的高级军官也会动身前来南极。\n\n雷伯恩在海军里一路打拼上来，对军队保密工作再熟悉不过了。他并不在意自己被排除在外，他真正在意的是，如果连海军中将都不能知道部下在干什么，那这个计划究竟有多重要？雷伯恩是南极的新来客，但要说对这片冰封大陆的了解，他深知，广阔无垠的封冻土地上到处都是藏匿秘密的好地方。"
 antarctica_aao.120.a:0 "他只希望自己不要一直蒙在鼓里。"
 antarctica_aao.130.t: "第一印象"
 antarctica_aao.130.desc: "“立——正！”在他的上级打开广播站大门的同时，西蒙·帕斯凯维奇猛地立正站好。“介绍一下，这两位无线电操作员分别是来自新西兰的塔伊卡·塔皮亚哈纳和来自澳大利亚的马修·周，从现在开始，他们就是你的新同事了。”上级给西蒙下达了稍息的命令，随后迅速转身离开，将三人留在了屋里。“嘿伙计们，想喝点咖啡吗？”然而，两个新人都更想喝茶。几分钟后，三人坐在无线电旁的舒适椅子上，侃大山唠闲嗑。\n\n“你们俩得知道，这可是全麦克默多最清闲的差事。”说着，西蒙上下打量了一番马修。要不是他操着一口澳大利亚味儿的英语，他还以为这是个小日本呢。“此话当真？”马修回应道。“不带骗你的。就拿现在讲吧，咱们五分钟后有个东西要广播出去，然后接下来五个小时就啥事没有了。行了，你俩都介绍一下自己吧。首先……”西蒙把手伸进口袋，从中掏出了一枚硬币，把它抛到了空中。反面朝上。“马修，你先请吧。”这个澳大利亚人抿了一小口茶。“没问题，但在说我自己的事之前，我先得说一下我父母……在重庆陷落前的几个小时，他们背着一袋大米逃离了城市，勉强躲过了日本鬼子。之后，他俩辗转来到了澳大利亚，还差点就被驱逐出境了。我还有两个兄弟，他们俩也都在军队服役。其他就没什么可说的了。”\n\n马修和西蒙凝视着坐在他们中间的新西兰人；西蒙以前可没见过毛利人。“行吧，我来自旺阿罗阿，曾经是个渔民，我们家世世代代都干这行。但是我们村附近的水域被日本人过度捕捞了，为了帮家里抗债，我才来参军，就是这样。”\n\n西蒙用手端起咖啡杯，品了一口，随后笑了：“好了，好了，塔伊卡，马修，欢迎来到FM104.5麦克默多广播电台！这个奇妙的小屋就是咱们的办公室了。这儿想要啥就有啥，什么咖啡机、沙发、保温盘，应有尽有，连打牙祭用的小零食都不缺！最重要的是，这地儿还有个小取暖器！不过，咱先说好，可别往外显摆啊。”马修和塔伊卡感觉自己中了大奖。尽管已经快到上节目的时间了，马修还是忍不住问道：“这地方工作环境真不错，但你不打算介绍介绍你自己吗，西蒙？”"
 antarctica_aao.130.a: "西蒙点了点头，“那必须的，但得播完节目再说。”"
 antarctica_aao.140.t:0 "樱桃花盛开之时"
 antarctica_aao.140.desc:0 "赫尔曼·弗莱格和约翰·肯尼迪一同漫步于河滨小道，副总统向赫尔曼·弗莱格打包票说，路上风景绝对美丽怡人。今年，特区的樱桃花比往年更早满开，十分适合老友在花下叙旧，他们各自的副手保罗·丹尼尔斯和罗伯特·肯尼迪也紧随其后，彼此愉快地交谈着。\n\n自打在哈佛法学院进修的时候，弗莱格就已和肯尼迪家族熟识，见证了约翰在艾森豪威尔政府时期于国务院内节节高攀的事迹。然而，自弗莱格被指派去建立南极洲事务局之后，二人就未曾再相见。这也就意味着，他今天能把大堆苦寒之地的故事一股脑讲给副总统听。\n\n“听上去过的有够惨。想必你和同僚已经建立起坚固的手足之情吧？”\n\n啊，话题正中下怀。弗莱格答道：“很不幸，如此情感不及您所料。部队里还好，但每个国家的代表都对南极大陆都有私心。我承认，我很担心各方分歧加剧可能带来的后果。”\n\n清新的春日，河水轻拍岸边，副手们交谈甚欢，唯有约翰沉默不语。片刻过后，他开口说道：“确实需要顾虑，回头我让国务院拟些缓和措施出来。话说回来，国安事宜尚没有受到威胁吧？”\n\n“并没有。即便有部分代表对加开防御设施持保留意见，但在这件事情上还是能全体达成一致的。其实，我们应效仿海军和中情局在南极开展行动的模式执行计划。我确实感到，那片荒芜之地的潜力远比我们了解的要多，我们只需要做好准备，抓住这一潜力。”"
 antarctica_aao.140.a:0 "“那么，可否谈谈今年拨给南极的预算呢？”"
 antarctica_aao.140.a.tt:0 "§e美国§!对§QOFN南极洲事务局§!的控制力将提升§W8%§!。"
 antarctica_aao.150.t:0 "极点蓝调"
 antarctica_aao.150.desc:0 "希拉里从麦克默多站雾蒙蒙的窗外望去，凝视着远处白色的深渊，他陷入了莫名的不安与不适。消息刚刚传来，莱亚尔上校大获全胜，阿根廷国旗已在南极点飘扬。\n\n与基地里的其他人不同，希拉里对探险队的成功感到高兴，即使互为竞争对手，人类知识的进步也总是值得庆祝的。事实上，与那些浮夸的南极军阀相比，莱亚尔看起来的确还算体面。希拉里甚至考虑过给他写封贺信，但被偏执的安保部门一口回绝了。\n\n希拉里叹了口气。这些天，麦克默多越来越像一座监狱了，他不禁感到一阵嫉妒。当希拉里还在为科学事业争取零碎的资金和物资的时候，莱亚尔挥挥手就能让他的基地目标统一。此刻，希拉里仍然被困在基地，只能远远地见证极地大陆的雄伟。\n\n远处，不毛的南方荒原似乎在呼唤他，希拉里的思绪也随之开始飘忽翻飞。莱亚尔确实勇敢无畏，但他也只能勉强到达南极点，而这一壮举前几代人前就已完成。只要好好利用杠杆效应，希拉里就可以得到足够的资源，好去做一些更伟大的事情：在一次旅行中越过极点，到达大陆的另一边。\n\n希拉里怀揣着新的决心重新振作，站起来回到办公室。他向自己保证，再多搞一点点政治，他就能回归到自己真正的使命中去了。"
 antarctica_aao.150.a:0 "崭新的边疆等待着他们，而他只需要让事务局意识到这一点。"
 antarctica_aao_leaders.10.t:0 "始料未及的提案"
 antarctica_aao_leaders.10.desc:0 "“我知道，时代在变，但埃德蒙你真的不是疯了吗？让女人去南极本身就是一场灾难，更别说让她独自执行研究任务了。就这么简单。”\n\n时针已经走了三格，但雷伯恩和希拉里的谈话没有丝毫进展。长久以来，希拉里一直提倡让OFN南极基地给女性亮绿灯。如果不这么做的话，OFN也就没比德佬和所谓的“泛亚人士”好到那里去了。所有OFN成员国都认可这一提议，连国家科学基金会都开始松口了，但直到现在仍未有任何具体措施。有鉴于此，希拉里发出了质问：为什么美国海军就是不想取消女性前来南极洲的禁令呢？\n\n几个月以来，希拉里一直在对雷伯恩软磨硬泡，每周都会拿这个问题来面对面开涮，但后者没有丝毫动摇。不过还好，希拉里想了个计划，现在就可以摊牌了。\n\n“老雷，你怎么想无所谓，但如果不签字批准的话，我可是会另找方法给她带过来的。事务局似乎并没有换位思考，所以我也不明白为什么要把她拒之门外。”\n\n雷伯恩长叹一口气，放下笔，总算正眼看向了希拉里：“海军不认可，她也过不来。军舰会在海上巡逻，但凡你这小把戏有点风声漏过来，他们马上会把她扭送回家。”\n\n“啊，对哦。美国海军，开明与自由世界的捍卫者，却凭着些许老掉牙的政策就要在万众瞩目之下把一个手无寸铁的女人遣送回家。我已经联系了纽约的朋友，让他们开始募集参与者，备好去新西兰的船。万事俱备，只欠你拍板。”"
 antarctica_aao_leaders.10.a:0 "雷伯恩脸色微微一白，喃喃道：“他会知道自己能干什么的。”"
 antarctica_aao_leaders.10.a.tt:0 "§M新西兰§!对§QOFN南极洲事务局§!的控制力将提升§W4%§!。"
 antarctica_aao_leaders.20.t:0 "生活空间"
 antarctica_aao_leaders.20.desc:0 "生活空间，乃绝大多数OFN国家内必然保障的事物。这些国家都有着广阔的领土以供安居乐业，但南极洲没有。每一栋住房都孤独地伫立在荒凉雪原之上，每一块居住地、每一寸可用空间都是在坚冰磐石之上浇筑出来的。麦克默多站偶尔会向外扩张，是自各国开始瓜分南极洲依赖少数几个还在扩大规模的站点，但站内各个派系都在想方设法地争夺扩张成果。\n\n现在，希拉里和比尔正在讨论该让哪个国家的人员入住新宿舍：是澳大利亚，还是新西兰，或是两国共用？\n\n“我们澳大利亚，”比尔说道，“想让一队士兵住进去。这能大大增加我方在南极洲的安保能力，进而更好地保卫麦克默多站。”\n\n希拉里叹了口气：“霍华德，还要加派士兵吗？我们是人类历史上首次有机会仔细研究这片大陆的人，能发现什么都是未知数。得全力扩大研究设施啊。”\n\n“那为什么不对半分呢？和自己扯皮只会让美国人更能控制麦克默多站的未来。宿舍对半开吧。你的科学家能受我们保护，彼此也能从科研发现中收益。”语毕，二人沉默了片刻。"
 antarctica_aao_leaders.20.a:0 "“这提议可以啊，霍华德。”希拉里打破了沉默，“一起住吧。”"
 antarctica_aao_leaders.20.a.tt:0 "§n澳大利亚§!对§QOFN南极洲事务局§!的控制力将提升§W1%§!。\n§M新西兰§!对§QOFN南极洲事务局§!的控制力将提升§W1%§!。\n§W凝聚力§!将§G提高§!§W2§!。"
 antarctica_aao_leaders.20.b:0 "“抱歉，霍华德，我不能打破自己的原则。科学优先。”希拉里起身离开了会议桌。"
 antarctica_aao_leaders.20.b.tt:0 "§M新西兰§!对§QOFN南极洲事务局§!的控制力将提升§W2%§!。\n§W凝聚力§!将§R降低§!§W1§!。"
 antarctica_aao_leaders.20.c:0 "“埃德蒙，如果你拿不定主意，”比尔打破了沉默，“那我来帮你：这块儿给士兵住。”"
 antarctica_aao_leaders.20.c.tt:0 "§n澳大利亚§!对§QOFN南极洲事务局§!的控制力将提升§W2%§!。\n§W凝聚力§!将§R降低§!§W1§!。"
 antarctica_aao_leaders.30.t:0 "凛冬将至"
 antarctica_aao_leaders.30.desc:0 "里迪坐在桌边，正在全神贯注地研读地质报告、气压计度数和气温预报。里迪的办公室可谓是舒适自如，从办公桌到柜子的一切陈设只是比国内的那些小点。因此，白的发亮的报告纸似乎盖满了整张办公桌，犹如一层棱角有致的长方形积雪。\n\n报告作者是C·S·赖特，加拿大驻南极洲联络员。他现在坐在里迪对面，直直地盯着海军少将深陷的眼窝。这名南极通在狭窄的房间内似乎甚是自如，想必现在这里要比之前的住宿点舒服多了。和新地探险队那会的帐篷相比，麦克默多站简直就是五星级宾馆。\n\n“积雪深度，”赖特总结道，“足以完全切断大多数哨点的交通，但这不是主要问题。到时候，温度会低到让破冰船撞不开冰层，至于重力风……额，也会阻断空中航线。说到底，我们要建立物资储备，量要足够站点撑过一切危机。”\n\n里迪明白，这话是想让南极开发指挥部增加补给输送，或者向英联邦国家申请扩大援助，也就是致电澳大利亚或者新西兰。\n\n赖特补充道：“不过好消息是，德日双方也会受此煎熬。接下来的几个月，我们唯一的敌人就是南极洲。如果不做好准备，雪原就会把我们一拳打出去。”"
 antarctica_aao_leaders.30.a:0 "“我会联系上级，”里迪说道，“都会准备好的。”"
 antarctica_aao_leaders.30.a.tt:0 "§e美国§!对§QOFN南极洲事务局§!的控制力将提升§W6%§!。\n§W凝聚力§!将§R减少§!§W1§!。"
 antarctica_aao_leaders.30.b:0 "“我会和霍华德说的。他肯定很乐于增加澳大利亚对南极洲安全的投入。”"
 antarctica_aao_leaders.30.b.tt:0 "§n澳大利亚§!对§QOFN南极洲事务局§!的控制力将提升§W4%§!。\n§W凝聚力§!将§R降低§!§W1§!。"
 antarctica_aao_leaders.30.c:0 "“那该让新西兰佬拿出行动搞食宿了，”里迪微笑道，“我会和埃德蒙谈谈的。”"
 antarctica_aao_leaders.30.c.tt:0 "§M新西兰§!对§QOFN南极洲事务局§!的控制力将提升§W3%§!。\n§W凝聚力§!将§R减少§!§W1§!。"
 antarctica_aao_leaders.40.t:0 "中流击水"
 antarctica_aao_leaders.40.desc:0 "希拉里坐在桌前，思绪飘到了九霄云外，眺望着脑海中的南极美景。峰峦层叠的山脉、洁白无瑕的雪原，他终于在这片蛮荒之地上找到了自己的归宿，十分安心。\n\n总地来说，希拉里来南极之前的人生还算是一帆风顺。战争时期，他曾经在太平洋上空作战。盟军战败后，这名飞行员又在新西兰空军中辗转于各个岗位，借此机会踏遍了大千世界，又幸运地未曾卷入过血雨腥风。\n\n不过，当他应邀前往南极后，人生轨迹便悄然发生了改变。希拉里一直是个奋发图强的人，兢兢业业、志存高远，但也就仅此而已。他曾克服过无数困难，他曾为国尽职效忠，但踏上渺远孤芜的冰封大陆之后，他才发现了那丝推动世界进步的火花。\n\n由此，和蔼可亲的希拉里带着基督教平等与和平的信条来到了麦克默多站。他从不会摆出咄咄逼人的架势，但总是在低调地争取更多的科研空间而非日益膨胀的军事存在，可谓是特立独行。自由世界可以用其他方式对抗德日，在贫瘠的冻土之上煽风点火完全无益于抗击法西斯暴政。\n\n在南极工作绝非易事，但希拉里不得承认，自己很享受挑战。虽然有时候很难相处，但比尔能处理好大多数英联邦相关事务。有鉴于此，当美国人武装自己、澳大利亚人耍阴谋诡计之时，这名身居高位的新西兰人可以完全把身心投入到建设更人性化、更和平、更敢于冒险的世界中去。"
 antarctica_aao_leaders.40.a:0 "异类中的奇人。"
 antarctica_aao_leaders.40.a.tt:0 "§F为§B内部分歧§!决议§!§F解锁更多选项。§!"
 antarctica_aao_leaders.50.t:0 "和解"
 antarctica_aao_leaders.50.desc:0 "雷伯恩的办公室内甚是寒冷。其实，寒气已然渗入了整个麦克默多站，原因就在于指挥层决定减少全站供热力度，防止反应堆超负荷工作。早先，总工程师瓦尔曼及时发现了反应堆安全壳出现裂缝的问题，但对这些旅居南极洲的人们来说，冬季幸好已接近尾声。因此，雷伯恩召集了指挥层人员，敲定站点未来方针。\n\n“赖特是对的，”里迪说道，“整个冬天就如他所说的一样严酷。鉴于海港正在解冻，我认为现在完全可以开始召回那些在澳大利亚过冬的船了，月底应该就能恢复印度洋和南极洲沿岸的潜艇巡逻。”\n\n雷伯恩点了点头，看向比尔：“你底下人怎么样？”\n\n“除了砍过的供热，没什么问题。”比尔答道，“这个冬天，我们维持住了部分前沿哨点的补给线，但被迫放弃了剩下的。加固外围哨点的工作下周就可以开始，不过需要从你这里借调些车辆。”\n\n“没问题。希拉里你呢？”\n\n“我和赖特爵士研发了效果更好的气象大事件预测模型，”希拉里微笑道，“我们应该不会再被大自然的怒火逼入绝境了。”\n\n雷伯恩做了一些记录，随后打开一瓶香槟，与众人举杯共贺成功、迎接新春。"
 antarctica_aao_leaders.50.a:0 "“我想，我们总算能和这片大陆和解了。”雷伯恩轻笑道。"
 antarctica_aao_leaders.50.a.tt:0 "§F为§B内部分歧§!决议§!§F解锁更多选项。§!"
 antarctica_aao_leaders.60.t:0 "“外交临界点”"
 antarctica_aao_leaders.60.desc:0 "赫尔曼·弗莱格愿意去南极以外的任何地方。他不喜欢寒冷，他讨厌拥挤的居住区，但最痛恨的莫过于白色，那刺痛双眼、没完没了、毫无生机、乏味至极、无处不在的白色。这里是人类会失心疯了的地方，证据就是成百上千个大活人都在为了一文不值的岩石与冰块拼个你死我活。\n\n但只要他们还在南极洲掐架，弗莱格的工作就不会结束。今天的工作内容，是向雷伯恩报告一个改变南极势力格局的机会。\n\n“时至今日，”弗莱格向雷伯恩报告道，“智利仍在犹豫是否要站到OFN一边，其担心激怒，额，其他所有国家。然而近日，局势已经达到了某种，特定的‘外交临界点’。华盛顿当局也认为，智利会就一些关于南极合作的承诺甚至协议与我方进行接洽。”\n\n雷伯恩一边听着弗莱格弯弯绕绕的演讲，一边偷笑道：“说人话吧，弗莱格。”\n\n弗莱格的嘴角微微扬起：“接下来的几个月，我会带队去和智利当局决策层和智属南极的联络人见面。如果一切按计划进行，双方派驻南极人员就会非正式结盟，甚至有望缔结白纸黑字的盟约。”\n\n“这种合作能让我们取得压倒性优势。”\n\n弗莱格意味深长地点了点头：“大体确实如此。我会在更温暖的地方度过夏天，而你就得待在麦克默多站，等着把屁股冻掉。”"
 antarctica_aao_leaders.60.a:0 "“走狗屎运了啊，赫尔曼。”"
 antarctica_aao_leaders.70.t:0 "有份了"
 antarctica_aao_leaders.70.desc:0 "在众人疑惑的视线下，里迪挥舞着手里的一叠文件，穿梭于麦克默多站狭窄的走廊。他跑过大厅，直接冲进雷伯恩的办公室说道：“德属马达加斯加正在崩溃！”\n\n叼着香烟的雷伯恩僵在了原地。片刻过后，他开口说道：“额……照这么说，‘黑死病’里还带个‘死’字啊。”\n\n里迪跨进办公室，把文件摊在办公桌上：“您看，几个彼此敌对的派系迅速瓜分了全岛。西部的艾哈德·米尔希元帅召集起一批铁杆支持者原地固守，等待德国支援。当地叛军盘踞在北部，而里普的探子报告说日本人也参了一脚。”\n\n“那有我们的人吗？他们站稳脚跟了吗？”\n\n“有的，在东南部。前政府残部和一群包括些许法裔支持者的当地人选择与OFN共同战斗。”\n\n“所以我们也有份了。把站点一部分军员派过去需要多久？”\n\n“运输载具在加油，装备和士兵正在等待装船，只要您下令即可出发。”"
 antarctica_aao_leaders.70.a:0 "“批准了，让那帮法西斯吃不了兜着走。”"
 antarctica_aao_leaders.71.t:0 "异乡"
 antarctica_aao_leaders.71.desc:0 "比尔走过冰面上的铁桥，脚下铁板的哐哐声犹如阵阵缓慢的鼓点，昭示着他已回到南极洲。悉尼回乡之旅甚是顺利，比尔也确实需要暂时远离冰天雪地和国际政治，回到家人身边换换脑子。所有隶属于OFN南极洲事务局的人员都会轮班，保证各人身心健康，领导层也不例外。\n\n不过，比尔清楚自己的义务，事务局又需要他了。他跨入站点大门，温暖的空气扑面而来，走向办公室时却又感到些许厌恶。这种感觉就像是美梦初醒，缥缈的欢愉之情逐渐消散，化为了现实的枯燥。\n\n比尔走进办公室，挂好衣服，脱下手套，把靴子塞进衣橱。他走到桌边坐下来，甘心在这里再待几个月了。\n\n忽然间，比尔注意到桌上有张便条，上面写着：“欢迎回来，比尔！我们都很想你！”旁边还放了一盘巧克力曲奇。见此，他不禁露出一丝微笑，拿了块曲奇啃了一口，随后自言自语道：“好，返工吧。”"
 antarctica_aao_leaders.71.a:0 "或许事情不会变的那么糟糕。"
 antarctica_aao_leaders.71.a.tt:0 "§n澳大利亚§!对§QOFN南极洲事务局§!的控制力将提升§W2%§!。"
 antarctica_aao_leaders.80.t:0 "秘密会谈"
 antarctica_aao_leaders.80.desc:0 "每个国家的政府都会设立一些不显眼的建筑，供其召开秘密会议，智利自然也不例外。赫尔曼·弗莱格对如此私密环境赞赏有加，不过空调力度能再强点就好了。\n\n唯一的与会者智利外交部长阿图罗·马施克似乎非常自如，甚至有几分兴奋。“昨晚我彻夜难眠，”马施克自豪地说道，“您的那通电话让我真是浮想联翩呐。”\n\n弗莱格一边拿着叠外交稿纸扇风，一边说道：“从去年开始，我就在期待着与您会面。现在。华盛顿已经知道他们在您这边的自由党有朋友了。”\n\n“大可以算上我。现在请明说吧，您这边有什么提议？”\n\n“很简单，我们想要美智建立非官方的联系，恢复南极洲势力平衡。如果阿根廷或日本帝国侵犯了智利之于南极的利益，自由国家组织将会对智利鼎力相助。”说到这里，弗莱格顿了顿，抬起一根手指，严肃地补充道，“届时，将不限手段。”随后，他又改用温和的语气继续说：“我们自然不希望走到此般地步，因此，雷伯恩海军中将会增加海上巡逻频次，扩大南大洋航行自由行动的范围。”\n\n马施克缓缓点头：“甚是慷慨啊。那么，OFN能从中获得什么好处呢？”\n\n“若南极局势恶化到极点、各方开战的话，智方设施能为我们提供极大的战略优势。我们希望智利能在这种情况下支援我们。”"
 antarctica_aao_leaders.80.a:0 "“诚如所言，赫尔曼。”"
 antarctica_aao_leaders.80.a.tt:0 "§F为§B内部分歧§!决议§!§F解锁更多选项。§!"
 antarctica_aao_leaders.90.t:0 "自由通行"
 antarctica_aao_leaders.90.desc:0 "里迪从望远镜中眺望着南极洲的白色海岸线。今天标志着舰队在南极洲的航行自由行动已告一段落，其也达到了此类行动中前所未有的规模。瓜分南极洲的热潮开始之时，各方势力都对这片深冻废土提出了领土宣称，同时也各自派驻了海军以支援开拓行动。不过，OFN南极洲事务局的海军从未如现在这般大张旗鼓地驶过南极洲沿岸。如此周折的目的，就是为了让别国驻地相形见拙。\n\n当弗莱格和智利人达成双边合作共识的时候，里迪相当紧张，觉得自己和手下会担下一切风险。几周以来，他一直在等着日本人或德国人朝舰队开火，可什么都没发生。声呐和雷达探测到过跟踪舰队的舰艇，但没有任何人来拦路。从各种角度来说，行动都是大获成功。\n\n“长官？”沃尔什中尉说道，“雷达发现北边有一个低飞的目标。鉴于我们现在离阿根廷的领土比较近，所以说是阿根廷的侦察机。我认为这个推断没有问题。”\n\n里迪拿望远镜扫了眼地平线，发现一架小型飞机正逆风朝着舰队飞来。可以肯定的是，对方是一架无武装的侦察机。虽然他觉得挑拨下前轴心国盟友完全没问题，但还是担心会引致涉及阿根廷人的国际事件。OFN已经树敌够多了，无需多此一举。侦察机与舰队齐头并进了一个小时后，便掉头返航了。"
 antarctica_aao_leaders.90.a:0 "“驶向麦克默多站。祝贺在座各位。”"
 antarctica_aao_leaders.90.a.tt:0 "§F为§B内部分歧§!决议§!§F解锁更多选项。§!"
 antarctica_aao_leaders.100.t:0 "复仇"
 antarctica_aao_leaders.100.desc:0 "敲门声刚响起，雷伯恩就醒过来了。他也和其他许多老海军一样，沾枕头就睡，醒的更加快。“来了！”他一边穿拖鞋一边喊道。穿着睡衣的雷伯恩打开门，看到里迪站在那里，便问道：“是里迪啊。有何贵干？”\n\n“请您召集部队，让他们准备坐船去菲律宾。”里迪说道。\n\n雷伯恩眨了眨眼：“什么？不先进来喝口茶，来杯咖啡吗？”\n\n“长官，我是认真的。支援菲律宾的兄弟的时机总算来临了。媒体把这次战斗叫做‘巴林塔瓦克闪击战’，而岛上的日军及其仆从国军队似乎暂时乱了阵脚，我们的船可以直接开过去了。同时，游击战已经在郊野地带开打。一言蔽之，菲律宾已陷入混乱，我们终于有机会报上次大战的一箭之仇了。”\n\n雷伯恩已走到床头柜前，正在烧咖啡。他说道：“今晚有的忙了，最好先补充下能量。你说说，接下来怎么办？”\n\n“我们的快反部队能在几天内空运过去。若二十四小时内下令，部队这周末就能落地协助战斗。”\n\n“里普和中情局呢？他们到了吗？”\n\n“我也不清楚。很难从这帮探子嘴里撬出点什么，但他们应该不会袖手旁观。”\n\n“言之有理。批准了，给我们的人送去需要的支援吧。”"
 antarctica_aao_leaders.100.a:0 "君子报仇，十年不晚。"
 antarctica_aao_leaders.110.t:0 "寒冰堡垒"
 antarctica_aao_leaders.110.desc:0 "今天，麦克默多站内的气氛比往常更加紧张。雷伯恩和里迪站在桌边，看着桌上摆着的南极地图，上面还放着些许士兵、载具和建筑物的小模型。里迪问道：“所以您确定他们不是走错路了？”\n\n“我确定。他们正在深入我方领地。”雷伯恩一边答道一边画了条示意线，“但还有更坏的消息。”他从口袋中掏出几张照片，摊在桌上。雷伯恩点了根雪茄的同时，里迪仔细端详了一番照片。“天呐。”里迪感叹道。\n\n雷伯恩吐出一口烟，说道：“他们把雪地车改成了装甲车。”\n\n里迪点点头：“他们在试探我们是不是真的能守住边境线。”他顿了顿，随后又补充道：“我们不能让他们觉得就这么过去了。”\n\n雷伯恩露出微笑：“我也没这么打算。寒冰堡垒行动现在开始。我们需要加固并增加哨点数量，尽可能多的制造派克瑞特冰。”接着，他在地图上圈出几处需要增设哨点的位置说道：“如果日本人胆敢再犯，我们就可以……以其人之道还治其人之身。”"
 antarctica_aao_leaders.110.a:0 "是敌人，而非盟友，教会了我们筑垒的重要性。"
 antarctica_aao_leaders.120.t:0 "南极骑兵"
 antarctica_aao_leaders.120.desc:0 "特伦斯站在木哨塔上，拿着望远镜观察周遭的冰天雪地。站点观察到日方人员越来越深入其领土，局势十分紧张，人人都觉得日本人发动可能会袭击。\n\n就在这时，特伦斯听到了什么。是引擎声。他心里一紧，刚想拉动警报，却发现声音是身后来的。转身一看，是挂OFN旗的车队。特伦斯松了口气，爬下哨塔。\n\n浩浩荡荡的雪地牵引车车队拉来了许多士兵与建筑器材。人们纷纷下车，准备开工。特伦斯走向一名来客，问道：“咋了这是？”\n\n“你好。我是沃克下士。”对方与特伦斯握了握手，“雷伯恩听说你们这里需要帮忙，就派我们来了。”\n\n“确实如此。”特伦斯答道。\n\n沃克走到又小又破的哨点前面看了看。“哇，你就一直住在这种地方吗？真是比我想的还要勇敢啊。”沃克笑道，“好吧，我们是来造点工事的。”谈话间，几个士兵打开了装有木屑的箱子，\n\n“木屑？”特伦斯疑问道，“这能派上什么用场？”沃克摆出戏谑的笑容：“兄弟，不只是木屑啊。你把他和水混一起，冻起来，然后就有了所谓的派克瑞特冰。重量上来说，这玩意和水泥一样硬，能把你保护的好好的。还有，制服和人手也给你送过来了！”"
 antarctica_aao_leaders.120.a:0 "今晚，特伦斯久违地迅速坠入了梦乡。"
 antarctica_aao_leaders.130.t:0 "沿着瞭望塔"
 antarctica_aao_leaders.130.desc:0 "南极冬日十分严酷。由于地理位置使然，这里冬天就是永夜。现在是早上，或者说，至少二等兵特伦斯觉得是早上。虽然只是刚起来，但他还是拿了杯热咖啡喝了起来。灯光下，杯内腾起的热气来回翻转。即便在这种艰苦环境中，喝咖啡依旧是一份小确幸。\n\n好景不长，特伦斯刚喝完不久，就听见战友沃克吼道“他们来了！”，紧随其后的是警报声。他迅速放下咖啡杯，抓起步枪冲向派克瑞特掩体冰墙。\n\n特伦斯从墙后往前看，发现探照灯扫到了几辆日方的雪地牵引车。他和其他几个人朝着一辆牵引车打出警告枪，后者急转向躲开枪线，看清了局势，便掉头开始撤退。车队其他载具也纷纷效仿。\n\n警报声停下后，特伦斯回到室内，再倒了杯咖啡。要是日本人没等第一杯喝完就突脸，或许他就不会只打警告枪了。"
 antarctica_aao_leaders.130.a:0 "薙刀在寒冰堡垒的派克瑞特冰墙上撞了个稀碎。"
 antarctica_aao_leaders.130.a.tt:0 "§e美国§!对§QOFN南极洲事务局§!的控制力将提升§W4%§!。"
 antarctica_aao_leaders.140.t:0 "“滴水之恩”"
 antarctica_aao_leaders.140.desc:0 "比尔步入房间后，里迪召开的紧急会议便人到齐了。“抱歉迟到了，”比尔说道，“我的秘书没把事情说得那么急迫。出什么事了？”\n\n还在打电话的里迪捂住话筒，告诉比尔坐到雷伯恩和希拉里中间，后者也照做了。十几分钟后，里迪总算挂上了电话，长出一口气说道：“毗邻新施瓦本的哨点报上来些麻烦事。显然，有一小帮手无寸铁的国防军跑来要求庇护。”\n\n“明摆着来叛逃？”雷伯恩问道，“不是在耍诈吧？”\n\n里迪耸耸肩：“哨点指挥官瑞安·勒什中尉强调说，他们快翘辫子了。这帮人要从野地里绕个大圈才能避开自己那边的边境巡逻队。”\n\n比尔摊手道：“那他们为什么想叛逃？”\n\n“前沿哨点驻守人员伯德中士懂点德语，”里迪说道，“交流下来发现，德国内部的派阀斗争和两面三刀的情况越来越严重了。那些逃兵觉得元首去世后，他们也会被一并清算，或者至少是不想在非希特勒执政的德国生活。”\n\n希拉里讥笑道：“所以我们就得给他兜着了。真大方啊。”\n\n“更重要的是，中情局希望我们把德国人立刻送去麦克默多站，但现在我担心这点‘滴水之恩’会被‘涌泉相报’，或者他们的上级要求遣返。如果德国国内局势白热化，那么南极的边境线上可能就会发生重大国际事件。”"
 antarctica_aao_leaders.140.a:0 "“但愿不会如此。”比尔说道。"
 antarctica_aao_leaders.150.t:0 "“涌泉相报”"
 antarctica_aao_leaders.150.desc:0 "瑞安·勒什中尉感觉自己像是一周没合眼了。自从第一批德方叛逃人员从新施瓦本跨境进入事务局领地后，他和哨点内的手下都深感不安。这一拨国防军惊动了指挥层，后者把他们关进了麦克默多站，但现在，勒什又看见几十个德国人高举双手向指挥处走来。\n\n勒什的二把手克里斯·伯德一言道出了大家心中的疑惑：“新施瓦本到底出啥事了？！”\n\n勒什和手下裹紧加拿大鹅风雪大衣，走出指挥处，慢慢靠近德国人。距离还剩一百米时，雪原上突然响起了枪声。勒什一方乱了阵脚，开始瞄准逃兵，有几个人还直接趴下了。勒什拿过电台话筒吼道：“别开枪！重复一遍，别开枪！这些叛逃的没带枪！开枪的不是他们！”\n\n“那谁放的？”伯德反问道。\n\n勒什看到地平线上扬起了几阵雪花。不久之后，一队雪地牵引车轰鸣着开到叛逃者身后的冰封山脊上，几十名步兵跳出车门，其中一辆牵引车上的扩音器还开始用德语吼叫着些什么。“克里斯，”勒什透过电台说道，“他们在说什么？”\n\n“只听清楚了几个字，但好像是叫逃兵停步回去，否则就要挨枪子。”\n\n“他们不在乎我们也在枪线上吗？天呐，我要给麦克默多站发信了，得问问怎么处理这帮人。”"
 antarctica_aao_leaders.150.a:0 "“是啊，”伯德说道，“这种情况下的交战规则可是少之又少……”"
 antarctica_aao_leaders.151.t:0 "抉择时刻"
 antarctica_aao_leaders.151.desc:0 "雷伯恩、里迪、比尔和希拉里齐聚于麦克默多站战情室。最坏的情况发生了：德方叛逃人员从新施瓦本大量涌入事务局领地。里迪向与会者阐述了现况：“勒什中士报告称，超过四十名德方叛逃人员来到了他的哨点，但问题是，德方一侧还有一队驻守人员正在阻碍叛逃行动，威胁称叛逃者若再进一步就要开火。我们的人在枪线之下，叛逃者则被困在了冰面上，拒绝返回，但也无法前进至我方地域。初步观察显示，叛逃人员相当缺乏补给、移动掩体和御寒装备。”\n\n雷伯恩一手压进头发，叹了口气：“天呐，没人拦的时候随便来就是，但现在要搞入境的话可能就会引发外交危机。国际局势上来说，德国可是相当不稳定。如数遣返或许更保险。”\n\n希拉里清了清喉咙说：“这些人正在求我们给予庇护。OFN把自己塑造为远离压迫的避风港，对德国人也应一视同仁。如果遣返，不仅是他们会被处决，我们也等同于是放弃了理想。”\n\n比尔别扭地挪了挪说：“虽然没人想往这方面走，但话还是要挑清的：我们只能束手旁观。这些叛逃者活不了多久的，要么在野地里冻死，要么转头回去……”讲到这里，在座所有人都露出了厌恶的神色。他们知道外面有多冷，“……啊，不是说我们应该要这么做，但所有选项都该说清楚。”\n\n雷伯恩叹了口气。最终拍板的还是他。"
 antarctica_aao_leaders.151.a:0 "“命令勒什中尉遣返叛逃人员。准许他在必要情况下进行警告射击。”"
