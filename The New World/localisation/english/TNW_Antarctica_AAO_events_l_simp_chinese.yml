 antarctica_aao_cia.10.t:0 "迷路的士兵"
 antarctica_aao_cia.10.desc:0 "马来半岛之上，四名日军士兵在丛林中艰难的穿行着。突然，两名日军步兵冒了出来，一脸茫然地走向他们。“谢天谢地，咱总算找着活人了，”其中一人开口说道，“我们和大部队走散了，好几天都没见着自己人。哎，对了，能给我来口水吗？”\n\n“啊，没问题。”队伍中的军官递出水壶，同时向另一个队员下令道，“把你的水壶给另一个人喝。”“你们是哪支部队的？”军官出言发问。\n\n另一个人接过水壶，一饮而尽，意犹未尽地说道：“442部队。我叫贞夫，不过大伙都叫我左撇子。他是泷也。”\n\n“我没听说过442部队啊……”\n\n“因为是新调来的嘛，”泷也打断道，“驻扎在宜力那边的103高地。”\n\n军官惊呼一声：“那里可远了，你们怎么跑到这儿来的？”\n\n“所以说了，迷路啊。”泷也回答道，“能给我们指下您总部的方向吗？”\n\n“当然可以。”军官掏出一份地图，开始向二人指点，“看，我们在这里，总部就在那里。之前接到命令，不要在携行地图上标总部，免得被当地人摸尸体后暴露位置，不过放宽心，它就在那儿。”\n\n“太感谢了。”泷也刚说完，就和贞夫一起拔出手枪，击毙了面前四人。“指挥部，我会把这儿清理干净的。”简短的汇报之后，他的眼神瞥向暗自偷笑的贞夫，斥责道，“哎，还有，你居然和他们说咱是442的，小子还真他妈挺幽默啊。”"
 antarctica_aao_cia.10.a:0 "“呼叫奥林匹斯，我是雅典。我有坐标上报……”"
 antarctica_aao_cia.20.t:0 "无线电与香烟"
 antarctica_aao_cia.20.desc:0 "当代号“雅典”的小队在无线电中报出坐标时，代号“奥林匹斯”的威廉·“里普”·罗伯逊正靠在椅背上，嘴里叼着香烟吞云吐雾：\n\n“你看，格雷斯顿，是不是像我跟你说的一样？小菜一碟。”\n\n“我倒不认为这是小菜……算了，但我担心……”格雷斯顿·林奇继续说道，“小伙子们的确很有能力，行动到目前为止也很顺利，但万一出了意外呢？我们可承担不起太多意外。天哪，你想象一下，万一这趟湿活走漏了消息呢？那咱俩连律师都不用请了，这可是战争罪。”\n\n“只要咱们把这事做漂亮了，就不会走漏消息。再说了，”里普继续说道，“就该这么对付他们，我见过诈降的小日本可比死去的弟兄还要多。要我说，这帮狗日的干了这么多龌龊事儿，就他妈该尝尝咱的报复。至少，我们可没逼着他们去死亡行军，是也不是？”\n\n“你别误会，我可不是在为这件事做什么狗屎道德辩护，我只是说，最好还是应该把这活儿做得严丝合缝。”\n\n“你他娘的说完了？那我可以呼叫空袭了吗？”里普说完，转身继续抽起了烟。\n\n“里普，我没在开玩笑。我们必须竭尽全力，否则工作可就丢了……甚至还会更糟。”\n\n“好好好，我铭记于心，林奇，但现在……”"
 antarctica_aao_cia.20.a:0 "“……就让我清静清静，抽根烟，再把轰炸机叫过来吧。”"
 antarctica_aao_cia.30.t:0 "重聚"
 antarctica_aao_cia.30.desc:0 "贞夫的视线挣扎着击穿了无月深夜的黑暗与茂密的灌木丛。他趴在地上，目标的移动轮廓在他眼中几近模糊。贞夫的眼神从手枪准星挪到手表上，目标好像慢了些，虽然贞夫完全听不懂泰语，但目标所要代班的那名卫兵同样也对这样慢吞吞的动作感到烦躁。经过一阵吵闹的换班，前一名卫兵走向大院里头去，贞夫等到他完全消失在黑暗中，便用一颗S&W39子弹将目标的生命引向尽头。\n\n贞夫打开无线电，说道：“我是贞夫，目标已击毙。”\n\n安静了片刻，无线电里回应道：“收到，花了够长时间了，前来会合。”\n\n贞夫来到一块空地边缘与队员们会合。此处树林的一侧有一栋混凝土平房，铁丝网将其包围其中，在此二者之间，两名武装卫兵分享着一根香烟。在贞夫的部署下，两名卫兵被迅速杀死，十人小组中派出六人经由森林走向大院。剪线钳疯了似的裁切着铁丝网，随后人们蹑手蹑脚地钻进院子。一进大院，六人迅速贴向监狱围墙，其中一名士兵冷静地安置好炸药，准备炸开混凝土墙。仅仅15秒，阿部便竖起大拇指宣告炸弹安置完成，人们立刻沿围墙向着爆炸物的反方向四下散去。当阿部按下引爆按钮，人们立刻捂紧耳朵张大嘴巴。阿部的炸弹震惊了全世界，监狱高墙轰然倒塌。两人留在墙外掩护队伍侧翼，剩余四人则冲入大院，墙内是三名慌忙投降的泰国卫兵，以及装满442部队老兵的大牢房。贞夫透过栅栏张望着，迅速地浏览每一张脸，直到在人群中找到他。"
 antarctica_aao_cia.30.a:0 "“见到你太高兴了贞夫，”泷也说道，“现在让我们赶紧逃出这鬼地方吧。”"
 antarctica_aao_cia.40.t:0 "致奥林匹斯的信息"
 antarctica_aao_cia.40.desc:0 "雅典报告奥林匹斯：\n\n1）在收集到多位亲美与亲日的马来亚遇难者的个人信息后，雅典得以成功开始印制选票，且顺利在全国各地派发选票以迎接选举。目前四下太平，若无大碍，预计未来几周，亲美领导人即可在全国选举中轻松得胜。\n\n2）关于马来亚的选举制度，高情商点说叫比较初级，低情商的话就是根本不存在。雅典正是利用这一现状，在官方政府无力触及的偏远地区伪造大量虚假选票，且成效显著。这将极大程度增强在当地竞选的亲美候选人的自信，推动马来亚走向建立亲美政府。\n\n3）雅典利用马来人敌视马来亚华人、日本人以及少数族群的现状，说服以上少数族群投票给各位亲美候选人。另外，雅典也与诸多小规模的日本人社群保持频繁联系，或将有助于奥林匹斯开展进一步行动。（详见第5页）\n\n4）雅典目前已经联合£censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon ，且正在监视选举周期以便进行细节调整，为亲美势力可依照奥林匹斯的建议在选举中合理得胜保驾护航。由于此任务较为轻松，雅典现在可以胜任更多任务。"
 antarctica_aao_cia.40.a:0 "简报结束。"
 antarctica_aao_cia.50.t:0 "一间破房子"
 antarctica_aao_cia.50.desc:0 "阿卜杜勒·穆罕默德拿着写字夹板，审视着面前的种植园。这是个种咖啡的园子，不过它从未成为一个可谓之成功的种植园。实际上，园子最先的主人也只是为了借它吃到政府补贴……这里从未真正靠它的作物获利。现在仗打完了，很多政策也废除了，说要吃补贴也做不到了。\n\n阿卜杜勒在附近走来走去，看起来咖啡植株都不是很健康。其实很多植株都已经枯死了，周围长满杂草。园子里还留着工人宿舍和工具仓库，但已被废弃，所以早就破旧不堪，更不用说之前在那儿工作生活过的人其实少之又少。\n\n园子第一任主人应当庆幸能把这块地卖出去，且自然不用提到他是以相当高的价格抛出的。\n\n这个地段离哪儿都远，也没有能让买家流连忘返的景致，方圆几英里内都没啥好看的，当然几英里内也没人能看到这儿。阿卜杜勒开始怀疑，要是有人想做些不想被窥见的事情，这地方也确实是不错。\n\n开个玩笑，不过只是假想罢了，应该是没有什么真的叨扰到原主人的。主要是这价钱真不错，他也知道不能这么挑三拣四。不过这也没啥，毕竟谁能责怪一个想要点隐私的男人呢？"
 antarctica_aao_cia.50.a:0 "当然，里普比绝大多数人都更注重自己的隐私。"
 antarctica_aao_cia.60.t:0 "吃一堑"
 antarctica_aao_cia.60.desc:0 "“有三个巡逻的，在东北方向四公里处，正朝南进发，”无线电里叫喊道。\n\n“收到，保持静默，”泷也回复着，关掉无线电，“你知道该怎么做的，贞夫。”\n\n贞夫点点头，倒净他的水壶，“我会全力以赴的。”\n\n有些不幸的是，这种把戏已经被这两人玩烂了。\n\n泷也走近日本兵，背出他排练许久的台词，“谢天谢地，我们终于找到……”，话音未落，一颗子弹打进了泷也的屁股。\n\n几乎是同一瞬间，贞夫也在一名日本士兵的追赶下逃走了。\n\n所幸的是，贞夫虽然不怎么能跑，但是这士兵的枪法更烂。他打出的子弹没一颗击中贞夫，只能困难地跟在他后面追赶着。\n\n在把追击的士兵甩开一大段距离后，贞夫跳进沼泽里藏起来，等着士兵从他身旁跑过。\n\n不久，这个士兵气喘吁吁地赶来，歪着身子从贞夫身旁经过。既然有如此机会，贞夫一个箭步冲上去，将匕首扎进士兵的脖子，并将他淹死在沼泽里。\n\n贞夫一直在沼泽里待到天黑，才敢开始发报。"
 antarctica_aao_cia.60.a:0 "“呼叫奥林匹斯，我是雅典，佐藤泷也中尉在战斗中失踪了，很有可能被俘……”"
 antarctica_aao_cia.100.t:0 "冰上之岛"
 antarctica_aao_cia.100.desc:0 "“这个情况啊，林奇先生，”里普以流利的中情局专业语调插话说道，“是什么样的？”\n\n“日耳曼尼亚方面对马达加斯加丛林的控制松动了，同样动摇的还有专员对日耳曼尼亚的忠诚，”林奇凭着与其发际线相称的聪慧说道，“我一些在纳粹机构里的朋友传递出来的消息都在强烈暗示着，埃米尔·莫里斯意欲叛逃至美国。先生，这可是我们打倒纳粹的天赐良机。”\n\n里普起身，踱步至窗前。他的双眼里流淌着那寒冷的洪流，肆虐着那为世界重新洗牌的猛烈风暴。正如他突兀地立于自然之中，一枚不合身的徽章悬于他的胸前闪闪发光，标志着他是研究观察团的成员。什么听命于南极指挥部，什么受限于管辖内的南极水域，不过是几句空话，说说而已。里普感谢那强于一切的忠诚，使得他和他的徽章无论在世界何处都若在家乡，他和组织对此都已了然于心。美国的利益并不止于印度洋的尽头。\n\n“开始坟塚行动。”"
 antarctica_aao_cia.100.a:0 "丛林燃焰。"
 antarctica_aao_cia.110.t:0 "冒险家的野望"
 antarctica_aao_cia.110.desc:0 "“这可不容易，”马塞尔·比格德将军抽着雪茄，操着一口浓重的法国口音说道，“身为自由法国的公民，能守护住洛林十字是我的荣幸。不过，当下我们在西非身陷囹圄，仍然看不到消灭祖国大地上笼罩着的黑暗的希望，这可太能使一个法国男人落泪了，不是吗？”\n\n“这就是为什么我们向您提出此等建议，比格德先生。您和您的手下提供服务，我和我的上司提供资金。华盛顿的钱包可大得很，里头有您想要的几乎任何东西。”罗伯逊探员不出意外的镇定自若，接下了马塞尔因长途旅行的劳累所打出的沉重的感情牌。马塞尔甚至看不清面前的美国人是怎么在他的墨镜后挤眉弄眼的。\n\n“不不不…”这位唯利是图的将军晃了晃手指，“在美国人面前，我可不是那只火中取栗的猫。钱是一回事，死亡？而且还是毫无意义的死亡？一个无名之徒的死去可是一件令人悲伤的事情，罗伯特，他终会默默无闻的。”\n\n里普认真端详了马塞尔一眼。马塞尔就站在这儿·，原本毫无怨言的他，现在渐渐变得无名、无相而且无实了。仅仅作为象征罢了。\n\n“那好吧……”里普镇定着自言自语，压抑住心中烦恼，“单单钱还不够的话……虽然我知道这跟西班牙征服者的真金白银不能比，但美国的力量同样不容小觑，不是吗？所有抵抗都将覆灭，我们也将空投藏在篮子里的炸弹。有了我们对您的士兵所进行的物质支持和空中支援，失败必不可能。另外，马达加斯加难道不就是法国的合法领土吗？”"
 antarctica_aao_cia.110.a:0 "“我可最好不要对此后悔。”"
 antarctica_aao_cia.120.t:0 "伙伴"
 antarctica_aao_cia.120.desc:0 "“我以前是个傻子，犯浑犯挺多，”那个被闷在灰色制服里的矮个子男人叹了口气，“还都是些能载入史册的浑。”他的观察者则沉思着——究竟是欧洲制服与它所无法征服的诡谲丛林的对比更大些，还是那具钢铁制服与里面不断乱动的人对比更强烈些。\n\n男人转头面对着他的观察者，脸上浮现出一丝略带紧张的微笑为自己鼓气。他似乎从那位穿着黑衣，戴着眼镜的CIA特工所留下的那片阴影里找到了温暖与舒适的感觉。或许，这个男人真的有很长一段时间里没有过这样的经历了：与一位安静，耐心的倾听者所畅谈的经历。毕竟在马达加斯加，这些纳粹官员们可没有倾听忏悔的纳粹牧师。\n\n“我现在倒明白了……我就不该摆那副臭架子，整天沉迷于那份把我送到这个破地方的野心，”他长吁道，“而且……我现在对它真的无感了。我真的理解了所有事情。而我巴特霍尔德·奥托！现在决心给美国卖命了。我对CIA也算是有利用价值，毕竟是一位忠于你们的叛逃者。我……说完了。”\n\n特工几乎因为他那特大号的嗓门而退缩。双方随后进行了进一步交流，奥托把他所知道的密码，计划，还有秘密全盘托出。然而这些看起来都只是为了让这位小人物演他所梦寐以求的大人物而做的，真正计划的冰山一角。\n\n“梦寐以求”。特工怀疑奥托话语里的真实性。自身利益促使他的行动导致了名副其实的流放，而现在他站在了胜利的一方。不过，只要他还在按照吩咐去做事，他忠诚与否也不是什么大问题。"
 antarctica_aao_cia.120.a:0 "不为任何人所役。"
 antarctica_aao_cia.130.t:0 "无需言语"
 antarctica_aao_cia.130.desc:0 "几夜不眠过后，即使营地倾盆大雨，也难以阻止马达加斯加人寻得片刻睡眠。深夜与疲乏吞噬了他们革命的满腔热情，但这样的休息是他们应得的。此时此刻，雨水翻飞，将原本坚硬的土地浸成泥泞。黑暗悄然潜入人间，蚕食着一切。\n\n打扫着破旧土堆的守卫几乎听不到细微的脚步声，直到他们看到渐渐靠近的阴影轮廓。此番场景令他们大喜过望，即使他们早已预料。守卫微笑着，努力克制自己的欣喜，上前拍拍那僵站着的暗影的背，带他进入营地。\n\n影子谁也没吵醒，脚掌踩进水坑的声响被造就水坑的倾盆大雨所掩盖。任何投来的目光都不会觉得影子有半分突兀，他自顾自的做着私事，和在垃圾桶里打盹的人或老鼠绝无二样。\n\n影子走进来，有些不情愿地脱下早已湿透的兜帽，露出藏在其下的美国特工。他将一个手提箱放上桌面，对面坐着的是一名与营地里其他人无二的民兵，而民兵身后则是红白绿相间的共和党旗帜。但实际上，旗帜应该是红白蓝三色。\n\n“但愿你在来的路上没完全湿透，”这位有用武之地的民兵说道，眼睛盯着箱子里的现金，“我们现在听命于你们了。”"
 antarctica_aao_cia.130.a:0 "暗影沿来路离去。"
 antarctica_aao_cia.140.t:0 "计划有变"
 antarctica_aao_cia.140.desc:0 "在德国治下的马达加斯加图莱亚尔，德国军官德特莱夫·霍夫曼少将一边拭去额头上的汗水，一边踱进了指挥帐篷。潮湿的丛林空气让这位下萨克森人很不习惯，德特莱夫感到头昏脑涨，而这也使德国在马达加斯加本就难以施展拳脚的现状变得更糟。\n\n忽然，桌上一个陌生信封分散了德特莱夫的注意力。那是个吕宋纸信封，其上除了自由国家组织的标记，别无二物可以证明它的身份。\n\n他拆开信，自言自语：“这世上究竟有什么是这些美国佬非得…”话音未落，他的表情就僵在脸上。\n\n他咽下未说出口的话，细细查看信封的内容。那里头详细描述了他的个人生活细节，甚至有份盖着OFN印章的记录，他偷偷地四下环顾，生怕有别人看到。德特莱夫想不到美国人是怎么知道这些的，他接着读下去，可越读越害怕，“我们有把柄在手\n\n你最好乖乖合作\n\n坐等进一步指示”\n\n德特莱夫·霍夫曼还是屈服了。"
 antarctica_aao_cia.140.a:0 "他可不敢怀疑什么。"
 antarctica_aao_cia.150.t:0 "审讯"
 antarctica_aao_cia.150.desc:0 "“告诉我们国防军各师动向、德国人与本地土著的关系现状以及马达加斯加总参谋部的人员构成——”一阵可谓是人类有史以来最刺耳、最强有力的笑声打断了这正在言语的浓重法国口音。这名说话的雇佣兵长吁一口气，他的同事则愤怒地冲上前去。\n\n“再不交代就吊死你！”他奚落面前的德国战俘，有两名战俘正被拷着手腕，挂在坚硬冰冷的墙上，“也许是时候折磨他们了，这是这些渣滓们应得的，让他们偿还他们和他们的父辈爷爷辈对我们的罪孽。”\n\n那个大笑的战俘反讽道：“你们法国佬就总是一副输不起的样子，还在这与世隔绝的鬼地方，像个可怜的顽固分子一样，做着你们那复国的美梦？开玩笑吧？你不会真觉得我们几个能知道你问的那几个蠢问题的答案吧？”\n\n“你最好还是交代了，”那名审问的雇佣兵说道，“反正情报早晚会到手的，你现在说了，我保证你还能将功补过。要是有什么差错，我们也不用背这黑锅。要么你现在招了，要么我现在就找个文员来把你判了。”\n\n“滚吧你，我不会说的。”\n\n负责审问的雇佣兵起身离开，走之前让他的同事过去给战俘松绑。战俘一开始哈哈大笑，但很快他就笑不出来了。雇佣兵抓住战俘的头发提起头，弄开酒瓶，把酒灌进战俘的嘴。另一个战俘尖叫着，而受虐战俘的声音渐渐变成阵阵呜咽。雇佣兵大喊大叫，而战俘呢喃着，目光变得呆滞，身体已然瘫软。\n\n“说！为什么不说！说啊！”战俘只见从地狱飞来魔鬼，游走进他这段人生。"
 antarctica_aao_cia.150.a:0 "雄狮于此亦垂怜。"
 antarctica_aao_cia.160.t:0 "佣兵交响曲"
 antarctica_aao_cia.160.desc:0 "此处四下平静。并非所有生活在德国万字之下都感到他的刺痛，生活仍然存在于岛屿东部一座古色古香的贝奇米萨拉卡小村庄中。虽然过去二十年里，不少定居点被有意无意的摧毁了，但他们仍然感激自己很幸运能活下来，只有小部分人丧命于疾病以及维希法国的种植园。生活不会停止，维持生计的捕鱼活动照常进行，时候到了人们也会播种，孩子的笑声与手风琴声交织在厚重的空气中回响。\n\n但长者们心知肚明，他们心中仍旧飘荡着一首黑暗的歌，吟唱着压迫者必将回归。无论他们怎样改弦易辙，仍会用魔爪再次死死扼住人们的喉咙。\n\n如长者们所想，有天地平线上还是升起了一面有着洛林十字的法国国旗，村庄也在毫无征兆的情况下被围捕了。村民们尖叫着，恳求着，但这阻止不了他们被带到一座几百英里外的村庄。这里深入OFN领土，远离共荣圈或是团结协定的势力范围。许多人将在此死去，无论老死，饿死，还是悲痛而死。\n\n当外出种植与捕鱼的人回到这已成空壳的村庄时，四处已无可留恋。鳄鱼神再也无人崇拜以及向其供养瘤牛，狐猴的尖叫和对猎食者的警告亦听若无闻。他们只是看着，默默地看着一切。新村庄再也回不去旧时模样了，那些原先形影不离的人早已销声匿迹，同他们的土地、社群和精神分道扬镳，剩下的也就一首歌谣了。"
 antarctica_aao_cia.160.a:0 "无凭之声。"
 antarctica_aao_cia.170.t:0 "马达加斯加的企鹅"
 antarctica_aao_cia.170.desc:0 "麦格劳探员仍然在适应马达加斯加的气候。毕竟，他加入研究观察团的主要原因是为了保护南极，而并非在马达加斯加奋战。说来也怪，其他人都盼望着早点离开南极，而他在离开后却怅然若失。他承认，那片地方就是一片由冰雪所打造的地狱绘图，但是白雪皑皑的景象沁人心脾，南极上的企鹅们也十分可爱。除此以外，他在南极以外的地方待的越久，对于“回家”的担忧也多增一分。\n\n不过，南极洲并非完全与世隔绝，若是纳粹在马达加斯加取胜，无疑会助长他们的嚣张气焰，最终威胁到南极洲事务局本身。除此以外，对于他自己而言，稍微从南极洲工作日常的节奏中脱离一下也不是件坏事。\n\n马达加斯加人拿着武器的动作有些笨拙。这些人并非是他以往所指挥的坚韧的老雇佣兵，但面对当下的情景，他也只能有谁用谁了。这些马达加斯加人里有一个因为一直打不中目标而显得有些沮丧，麦格劳探员向他大吼着，他的语气直接而坚定：“扣扳机！”随后，探员又以一种更加温柔的语气接着说，“可别被后坐力吓到了，你唯一要做的事情就是扣动扳机。”对另外一个人他则是又一副面孔，用语言拷打着他：“别一直按着扳机！你是在帮德国人消耗我们的子弹！”\n\n这一天的剩下时间在更多的演习中度过：刺刀训练、交流训练、行军训练……马达加斯加人进步神速，如果不考虑其他因素的话。他们也在训练中投入了极大的热情。对于麦格劳探员而言，这并非是什么奇怪的事，他已经见证了那些纳粹分子对这个国家的所作所为。\n\n用不了多久，这支部队就会投入到战斗中去。当然，麦格劳也很紧张，这是人之常情。但他仍旧保持乐观，毕竟他已经准备好面对更加困难的处境了。"
 antarctica_aao_cia.170.a:0 "家若建在南极上，打仗放假没两样。"
 antarctica_aao_cia.180.t:0 "奖赏"
 antarctica_aao_cia.180.desc:0 "里普对马塞尔·比格德所完成的任务印象深刻，非常深刻。\n\n这些流亡海外的法国佣兵表现的十分出色，事实上，要比里普曾经与之打交道的一票其他士兵都要优秀。说实话，这些人完全达到了美国海军陆战队或者其他顶级军队的水准，甚至可以作为他们的替代品。无论是纪律、还是能力，抑或是勇敢……比格德他们都具备。\n\n是时候给比格德付钱了，里普站在一张桌子前，而他的手下正忙着从卡车上卸下东西——比格德知道，那些东西就是他的报酬。他环顾四周，一开始略有狐疑的眼神在看到被清点出的现金后也消失了。但这里仍有更多的箱子，比格德睁大了双眼，“这可比我们之前谈好的要多啊。”\n\n他的这位美国主顾则大笑起来：“你啊，马塞尔，你干的事也比我们之前谈好的要多。公平交易嘛。”\n\n比格德不可置信地打开一个又一个箱子。一个箱子里陈列着一桶桶上好的陈年威士忌，另外一个箱子里则装载着那些自美国运来和从德国缴来的精良武器，还有一个则放着一锭锭金银。这位法国人哽咽了，他有些语无伦次地问向里普：“我操，你们从哪整来的这些玩意儿？”而里普仅是以笑脸作答。\n\n“我可没有劫某些纳粹的道，我只是……你知道的，从一些渠道那里得到的这些。正如我说的那样，公平交易嘛，我也只是希望这些东西会为我们未来进一步的合作和亲善打点基础。”\n\n在意识到这一切都并非梦幻后，比格德脸上挂满了笑容，缓缓点头。"
 antarctica_aao_cia.180.a:0 "“没错，里普，我承认它会的。”"
 antarctica_aao_cia.190.t:0 "报告"
