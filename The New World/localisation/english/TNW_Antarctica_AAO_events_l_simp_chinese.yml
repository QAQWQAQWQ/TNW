 antarctica_aao_leaders.160.t:0 "希特勒死了"
 antarctica_aao_leaders.160.desc:0 "“希特勒，死了。”扬声器内传出雷伯恩的声音，久久回荡于麦克默多站内的冰封街道。雷伯恩正在向全站点播送消息，每一个人都停下了手里的工作，待在原地。“人类历史上最暴虐的恶人，”雷伯恩继续广播道，“死了。他的一切造物，已经岌岌可危。我们中的许多人都被褐色瘟疫夺走了亲朋好友，被逼着背井离乡。我不知道这个杀人犯死去后，能够给到你们什么慰藉，但有一件事是肯定的：自由国家组织，以及我们所有人，都会不留余力地去摧毁千年帝国，让所有希特勒的走狗去地狱里和主子相见。”\n\n没有欢呼，没有喝彩。只有对失去之物的缅怀，只有对未来艰苦奋斗的思考。\n\n“讲话到此结束，全体归位。”雷伯恩关掉了麦克风，靠到椅背上。他清楚，未来道阻且长。中情局报告称，失去希特勒的德国会十分不稳定，但也存在其他魔鬼接过权柄的可能。不过，这就只是他同事要担心的了，而对于雷伯恩和事务局来说，唯一需要担心的看就是边境那头的纳粹。参谋长联席会议已准许雷伯恩采取特殊措施。若走到这步，雷伯恩就需要协调边境各部的动员与部署工作。\n\n由此，OFN南极领地即将进攻新施瓦本的德属南极领地。"
 antarctica_aao_leaders.160.a:0 "雷伯恩祈祷德国人会自行退场。"
 antarctica_aao_leaders.161.t:0 "风暴中心"
 antarctica_aao_leaders.161.desc:0 "正在站岗的勒什中尉一边看着地平线，一边听着收音机里的音乐。忽然间，乐声戛然而止，接下来的消息更是令他震惊：希特勒，人类历史上最残忍的暴君，终于死了。\n\n欣喜之情转瞬而逝。希特勒最终还是逃脱了正义的制裁，他的死不过是因为人终有竟时。退一万步说，知道那人不会再掀起波澜之后，勒什还是能感到些许欣慰的。不过，雷伯恩在演讲最后说的话，也就是关于把希特勒的同党也一并送下地狱的话，颇有……寓意。德国会乱成一团……人们可能会操戈相向。在这里，也是一样道理。\n\n勒什眺向冰面：“在这里，也是一样道理”。是啊，人们前仆后继地为了这片荒芜之地抛头洒血，留下一片片猩红色的冰晶、一块块永不磨灭的罪证。长久以来，这座大自然最后的堡垒都未曾有人踏足，但现在，人类将用鲜血与仇恨在这里留下永恒的印记。\n\n勒什觉得，如果上帝真的存在，他希望能向祂道歉。然而，再大的歉意也不够。\n\n勒什拿出一张相片，上面是一位孕妇。他凝视着相片，回忆了片刻，抽了抽鼻子：“克拉拉……我……我发誓会安全回家的。我会忘掉这一切，回到家，亲亲孩子和……”\n\n两行泪水潸然而下，哽咽到无法说话。"
 antarctica_aao_leaders.161.a:0 "为了守住誓言，刀山火海义无反顾。"
 antarctica_aao_leaders.170.t:0 "南非战争"
 antarctica_aao_leaders.170.desc:0 "雷伯恩感觉手上这份文件，是几周以来审阅的第一千份线报。他隐约感觉自己正在目睹帝国分崩离析，或者至少有希望能看到崩塌。远在日耳曼尼亚的纳粹魔王死了，但南极洲也能感受到这份震动。完全不是悄然离去啊。\n\n里迪刚递交上来的一份报告与麦克默多站和事务局息息相关。长久以来，情报机构都认为布尔叛军是由德方支持的，而现在，非洲各专员辖区似乎自行决定派机械化部队进攻南非。\n\n从华盛顿到里约热内卢，再到雷伯恩手下的指挥层，动员军队和开展复仇的论调不绝于耳。德国行将就木，铁了心要拉尽可能多的人垫背。雷伯恩希望事务局的快反部队能够这周结束前抵达南非、提供援助。\n\n除此以外，他还能肯定里普和中情局有自己的小算盘。或许，战火很快就要烧到南极洲了。"
 antarctica_aao_leaders.170.a:0 "有时候，复仇来的风风火火。"
 antarctica_aao_leaders.180.t:0 "麦克默多圣诞日"
 antarctica_aao_leaders.180.desc:0 "相比于其他南极属地，麦克默多站的圣诞节活动可谓是洋溢着喜悦之情。来自五湖四海的事务局士兵纷纷收到了祖国寄来的礼物，站点一时间淹没在节日馈赠的海洋之中。今年，是国际局势风起云涌的一年。不过，自由之光似乎再一次闪耀于世界舞台，这次圣诞节也因此变得尤为特殊。麦克默多站的人们有不少庆祝和感恩的理由，但最高兴的莫过于雷伯恩和里迪了。\n\n雷伯恩倒了第三杯威士忌，再次与里迪碰杯。冰块在酒杯里来回晃动，发出悦耳的叮咚声。没有温暖的壁炉，没有炒栗子的香气，只能拿取暖器和铝制圣诞树凑合下。嘛，退一万步说，他们用不着祈祷去过一个白雪皑皑的圣诞节了，毕竟南极一直都是这样。\n\n“这两年过的多难有目共睹，”里迪说道，“我担心未来走向如何。您真的觉得我们明年要攻打新施瓦本吗？”\n\n“我们要做好本职工作，为战争出一份力，不论贡献多小都要如此。”雷伯恩回答道，“进攻新施瓦本或许不能和冲击国会大厦、防守南非战线相提并论，但还是能让七大洲上的万字符少一个。”\n\n“言之有理，值得为之干杯。来，为麦克默多站又一个动荡春秋干杯。”\n\n大厅那头的广播室里传出快活的喧哗，声音顺着广播响彻今宵："
 antarctica_aao_leaders.180.a:0 "“麦克默多站——嗝——祝全南极圣诞快乐。”"
 antarctica_aao_leaders.190.t:0 "于事无补"
 antarctica_aao_leaders.190.desc:0 "里迪在封冻地上来回漫步，仔细巡视着新占领地。虽然南十字星行动大获全胜，但里迪和雷伯恩心里都清楚，纳粹会反攻。不只是里迪，许多人都畏惧那一天的到来。\n\n又一批工事开建了。他们计划建好几排派克瑞特冰碉堡，再在前面铺设地雷。里迪扫视着防御工事，深知这些还不足以抵挡敌军来袭，脑海里满是纳粹大军压境、放出钢铁洪流的画面，忘也忘不掉。他对下属喊道：“大家干得好，但还要接着建。反坦克炮位要加倍，防空阵地再多挖点。”不论与纳粹之间爆发何种冲突，防线纵深都是制胜关键。\n\n士兵们没说什么，不过怨气似乎呼之欲出，个个都摆出死鱼眼盯着穿行于人群之间的里迪。在里迪看来，如此反应好似是吃了败仗，而不是王师凯旋。\n\n里迪明白，防御工事再怎么唬人，效力都只和驻守人员素质有关，而现在的他们军心涣散。他看向几名伤员和一旁备好的裹尸袋，叹了口气。"
 antarctica_aao_leaders.190.a:0 "OFN赢了……但赢了点什么？"
 antarctica_aao_leaders.200.t:0 "秩序与进步"
 antarctica_aao_leaders.200.desc:0 "作为一名海军军官，里迪可不会晕船晕机，但事务局到巴西属南极领地的航班还是把他颠得够呛。南极航线相当凶险，冬季尤甚。降落后，他在舱门门槛上坐了几分钟，确信自己不会犯晕之后才走下来与巴方指挥官拉德马克握手。\n\n巴方驻地远没有麦克默多站来的完备。巴军夺取宣称领土的速度相当快，因而大多数设施也理所当然的是临时设置的。\n\n除去双方军官，与会者还有一名翻译。寒暄过后，里迪直截了当地问道：“你这边部队适应的怎样？”\n\n“推进过程中几乎没有遭到德军阻挠，”拉德马克通过翻译答道，“目前最大的敌人只是风雪罢了。不过，我们补给剩了不少，还开始从你那边的供给方拿装备了。想必远道而来不只是为了嘘寒问暖的，直说吧，为什么？”\n\n“雷伯恩中将想要我说清楚，我们之间的合作仅限于打击纳粹。只要在这个问题上保持一致，就没问题。巴西和阿根廷之间的领土争端与事务局无关。”\n\n里迪一边听着翻译传达话语，一边仔细观察着拉德马克的神色，但完全看不透对方的心思。拉德马克听着翻译，逐渐露出了一丝微笑。随后，他与里迪握手，用英语说道：“那么，为南极的秩序与进步致敬。”"
 antarctica_aao_leaders.200.a:0 "是时势造盟友，还是新交的朋友？"
 antarctica_aao_leaders.200.a.tt:0 "§F增强§B内部分歧§!决议栏中§W联系§e美国§!外交官§!选项的效果§!"
 antarctica_aao_leaders.210.t:0 "高下立判"
 antarctica_aao_leaders.210.desc:0 "南极的冬天很难熬，就算是暮冬也一样严酷。部队十分劳累，运至新施瓦本“前线”的补给线也出现了问题。\n\n沃克下士正在烤火，手边还有盘倒胃口的罐头牛肉。哨点的热可可储备快见底了，不过至少还有咖啡托底。生活困苦，嘴边的食物也味同嚼蜡。一旁的新西兰士兵说道：“天呐，我以前可讨厌了热天了，现在倒天天盼着夏天来啊。”\n\n沃克叉起一块肉，勉勉强强吃下去后说道：“确实。我叫沃克，你叫什么？”\n\n新西兰人说道：“你好啊，我是卢卡斯·泰勒中士。所以说，美国人去哪了？”\n\n沃克叹了口气：“去野战食堂了。你敢信？”\n\n“奶奶的，我和你说，他们过的可他妈滋润了，有暖手器、更好的帐篷、更好的吃食……反倒是我们怎么在这里吃泔水？”\n\n“是这回事。估计下一步就他妈要开卖麦当劳了。”"
 antarctica_aao_leaders.210.a:0 "寒气难掩妒火。"
 antarctica_aao_leaders.210.a.tt:0 "§e美国§!对§Q事务局§!的控制力将提升§W6%§!。"
 antarctica_aao_leaders.220.t:0 "必然的哗变"
 antarctica_aao_leaders.220.desc:0 "戴维斯透过望远镜，仔细观察着远处工地里的人们和物料。\n\n“长官，施工速度似乎有所下降，但可以归因于天气问题。目前来看，一切都在按计划进行。照这个速度，至多下周就能完……等下，工地上好像发生了什么。他们怎么不干了？喂！你们这帮懒虫，午饭时间还没到呢！”\n\n远处传来熟悉的雪地车轰鸣声。戴维斯爬上山坡，俯瞰工地，看见茫茫雪海里有两个黑点开着雪地车过来。二人停到通讯站门前，带着满脸愤恨慢慢走向疑惑又生气的戴维斯。\n\n“搞什么鬼？你们要在下周一之前造完那点派克瑞特冰碉堡！等到指挥官知道了，就等着被一脚踢——”\n\n“我们受够了！听到了吗！？这几周我一直在和弟兄们伺候你们这金贵的项目。中尉啊，我手都要没感觉了，不只是因为受冷。我整个身子都在痛！我们好几天没吃过正经饭了！哎，你说的‘到货’，上哪去了？来，看看桑蒂诺，他从周四就开始饿肚子了，结果指挥部甚至不想抬抬手给我们发几双新靴子！”\n\n语毕，愤怒的二人丢下冰镐，转身上车走了。\n\n戴维斯迷茫地站了一会，再次拿起电台话筒说道："
 antarctica_aao_leaders.220.a:0 "“长官，完工时间可能要比我原想的一周要长。”"
 antarctica_aao_leaders.230.t:0 "布里斯班暴乱再现？"
 antarctica_aao_leaders.230.desc:0 "几周以来，气温只降不升。凛冽的寒风片刻不停地拍打着麦克默多站，任何胆敢对抗自然之力的人都会被报以最刺骨的寒意；暴露在外的车辆上结起了厚厚的冰层，每一寸裸露在外的皮肤都会在短短几分钟内坏死；波涛汹涌的大海不断把浮冰推向岸边，要不了多久海岸线就会消失在地平线之外。\n\n今天，站点内有大批士兵正顶着疾风伫立在机场跑道上，耐心等待着登上离开封冻大陆的班机。不过除了他们，还有许多澳军士兵在一旁看着，目送这些美国人飞去前者的家乡。在这之前，认为事务局及其相关人员偏袒美国人的想法已如病毒般传遍了其他所有国家的驻军，有些人甚至还硬是联想起了1942年11月的布里斯班暴乱。想当初，美国佬仗着自己腰缠万贯、衣冠楚楚，肆意沉湎酒色，澳军忍无可忍，某天晚上把这帮人好好修理了一顿。\n\n到了南极，事情也没什么不一样。一些传单开始在站里四处流通，内容和印尼战役那会在澳洲街头泛滥的单子相去无几：美国人马上就要走了，那么澳大利亚人是时候再次把怨气吐出来了。有一批人决定要在必要的时候出头，他们的怒火也给雷伯恩留下了深刻的印象。\n\n现在，越来越多的澳军士兵加入了旁观人群，机场跑道逐渐被人们围住了。没过多久，人群中爆发出各种叫喊声。几个人站出来劝说士兵、协调抗议人群，宪兵也前来准备驱散暴乱分子。澳军士兵向彼此传递传单，叫骂声此起彼伏，美军士兵也纷纷转身面向人群。见此，宪兵们谨慎地退下阵来。"
 antarctica_aao_leaders.230.a:0 "局势逐渐失控。"
 antarctica_aao_leaders.230.a.tt:0 "§e美国§!对§Q事务局§!的控制力将提升§W8%§!。"
 antarctica_aao_leaders.240.t:0 "一点补给问题"
 antarctica_aao_leaders.240.desc:0 "一个新西兰士兵伸出手，用沙哑的声音恳求道：“大哥我求你了，给件外套吧。我的烂了，冻死个人。”\n\n詹姆斯给了个虚伪的眼色，往后缩了缩，双手插进新夹克的口袋背过身去，心里惭愧不已。一群衣衫褴褛、颤抖不已、怒火冲天的澳军与新军士兵把他和其他几个美军士兵围了起来。这批士兵在一处废弃的德方基地设立了营地，离事务局边境相当远。等待几天后，后方运来一批加拿大鹅风雪大衣，士兵们总算可以换掉破烂外套了。这些大衣既舒适，口袋又多，而且最重要的是，很保暖。有鉴于此，人人都想要拿上一件。\n\n“这些大衣应该是要给我们所有人分的！”一名绝望的士兵吼道。另一名美军士兵走上前，回答道：“是卡特上校把这些大衣分给了我们，所以别哔哔了，回去站好。之后还会有的，现在不过是一点补给问题。”\n\n詹姆斯站在一旁，无助地看着两方摩拳擦掌。一名澳军士兵苦笑道：“卡特上校是哪位啊？喔，我猜猜看，又他妈是个美国佬对吧？”见状，詹姆斯赶在打起来之前插到人群中间，摆出一副可怕的表情。结果，奏效了，所有人似乎都冷静了下来。"
 antarctica_aao_leaders.240.a:0 "但只是短暂的停火罢了。"
 antarctica_aao_leaders.250.t:0 "只是问话"
 antarctica_aao_leaders.250.desc:0 "“暗藏贰心？兄弟你扯什么淡呢？给我当成个啥了？德佬？”名为诺亚的澳军士兵甚是激动。一名中情局官员站在光滑的铁桌那边，盯着诺亚说道：“我们没有这么说，只是在问话。”\n\n“啊行，我们上级接到通知了吗？”诺亚问道。房间内闪烁的灯光下，官员一言不发，诺亚只得追问道，“天呐，你领导呢？有谁接到通知了吗？”\n\n“有关部门对此知情。”官员一边从背后抽出文件夹一边说道。诺亚扫了眼文件夹内的内容，大跌眼镜：里面是几张照片和一份隐去名字的报告，后者声称澳新两国士兵“暗藏贰心”。真扯淡，他心想到。\n\n“除此以外，有报告称，你和其他澳方人员负责的一处驻地存在大量补给失踪的情况。”官员的声音机械又单调，诺亚只能咬着牙听着。“你觉的咱是在哪，在他妈的迪士尼吗？东西三天两头失踪，”诺亚咕哝道，“真说起来，指不准是个美国佬在偷呢。你们这帮烂人可是啥都不给我们。”说完之后，他又看了眼报告，怒火燃的更旺了。想到其他被逮捕的战友关押在哪，想到中情局的虚伪，想到这一切的不公不正，诺亚不由得想要暴怒掀桌。\n\n诺亚往报告上唾了口口水，对官员说道：“房间里唯一的叛徒，是你。”"
 antarctica_aao_leaders.250.a:0 "中情局官员坐了下来，回应道：“我们无意苛责，只是问话。”"
 antarctica_aao_leaders.260.t:0 "两名士兵"
 antarctica_aao_leaders.260.desc:0 "近来，几千名美军士兵涌入了事务局，三名非裔美国士兵就在其中。中午时分，麦克默多站的冰封道路上挤满了人，他们也和人群一起走进了食堂，掏空皮夹买了一大堆吃喝。一名澳军士兵站在三人后面，怒目而视。就在这时，事情发生了。\n\n“傻逼美佬，”澳军士兵喃喃道，“怎么新来的黑人拿钱都比我多？”他本无意让前面的美国人听到，但其中一人转过身来诘问：“有意见么？”\n\n双方僵持了好一会。澳军士兵暗自思考着，想到了美国人看上去待遇总是比别人好。拿钱多，穿的暖，住的地方也更宽敞。\n\n想到这里，澳军士兵涨红了脸，唾了口唾沫吼道：“有！我就是有意见！你个跳脸猴子！”他推搡了贴上来的一个美军士兵，后者也推了回去，得到的回应是一记拳击。双方拳打脚踢，难解难分。\n\n没过多久，整条队伍上的人都扭打在一起。这边骂两句，那边回一拳。一名美国士兵的下颚挨了记重击，倒地不起，人群见此又爆发出一整叫喊声。接着，一个澳军士兵倒下了，求饶声马上淹没在众人的怒火之中，不断被拳脚相向。\n\n最后，高级军官到场制止了混战。遍体鳞伤的士兵们回头一看，才发现自己干了什么好事：一名澳军士兵和一美军士兵，统共两名OFN士兵，当场死亡。那天的麦克默多站，尤为安静。"
 antarctica_aao_leaders.260.a:0 "鲜血染红白雪。"
 antarctica_aao_leaders.261.t:0 "当选总统来信"
 antarctica_aao_leaders.261.desc:0 "“致雷伯恩海军中将：\n\n我对有关OFN南极洲事务局各类令人担忧的报告一直有所耳闻。我们认为，事务局内各方成员之间的紧张关系正在引起多余的争议，如此负面情绪最终还可能会散播至南极圈之外。\n\n近来，澳大利亚与新西兰两国外交官坚持要求扩大其之于事务局的话语权，还有部分人员认为存在待遇不公的现象。除此以外，当局认为，早先于站点内发生的伤亡及类似事件反映出OFN整体上的不足，进而也揭示了美国本身的问题。敬请牢记，为了保护美国之于南极大陆的利益，美方人员务必要保持软实力足够强大。\n\n我将于3月20日的情报传达会审计事务局预算——以及您的职位问题——期待您届时与我方分享您治理上述问题的心得。\n\n此致，敬礼\n美利坚合众国当选总统”\n\n雷伯恩紧握信纸，反复读了几遍。他在脑海中把政客的话翻译成军人的话之后，得出的结果是："
 antarctica_aao_leaders.261.a:0 "“他妈的守点规矩吧！”"
 antarctica_aao_leaders.261.a.tt:0 "§F为§B内部分歧§!决议§!§F解锁更多选项。§!"
 antarctica_aao_leaders.270.t:0 "撕破脸"
 antarctica_aao_leaders.270.desc.a:0 "“比尔，他们这次做的太过火了。”希拉里说道。他私下把比尔叫到麦克默多站里的一间空办公室，想要两人谈谈事务局的未来。“雷伯恩暗地里决定不让我们知道核导弹的事，”希拉里语气沉重地说道，“还是在我们眼皮底下设计、实验的导弹，更别说站点里有个人酒后吵架被一枪打死的事了。天呐，我们应该是盟友啊！但这些人越来越能感受到我们已经知道的一个事实，也就是盟约里有一方是‘重中之重’。”\n\n“美国佬确实越界了……那我们该怎么办？”\n\n“我认为人们已经把OFN的理念抛诸脑后了。我们需要让美国以外的事务局成员国扩大话语权，减少军事投入，科研投入翻倍。”\n\n“美国人绝不会同意这么做的，除此以外，我个人也不觉得这会管用。几年以来的事情有目共睹，南极大陆确实在升温——当然，只是比喻——而你的计划会削弱我们抵抗外敌的力量。有鉴于此，我的解决办法更简单：找个对成员国管制更松的澳大利亚人把雷伯恩换下来，盯紧美国人，但事务局总体路线不变。我觉得美国政府会同意的。”\n\n“那就更有悖于我们的理想了！”希拉里不耐烦地说道，“照你这么说，事务局会继续军事化，要不了多久美国人肯定会重新执掌大权。组织需要从根本上改制。”\n\n“不论接下来发生什么，”比尔意图抚平希拉里的怒火，“必须迫使美国人与我们平起平坐，不能只被他们当枪使。除此以外，还要把加拿大拉拢过来。如果加拿大和美国人结伙，这事就没希望了。”"
 antarctica_aao_leaders.270.desc.b:0 "“比尔，他们做的太过火了。”希拉里说道。他私下把比尔叫到麦克默多站里的一间空办公室，想要两人谈谈事务局的未来：“站点里有个人酒后吵架被一枪打死了。天呐，我们应该是盟友啊！但这些人越来越能感受到我们已经知道的一个事实，也就是盟约里有一方是‘重中之重’。”\n\n“美国佬确实越界了……那我们该怎么办？”\n\n“我认为人们已经把OFN的理念抛诸脑后了。我们需要让美国以外的事务局成员国扩大话语权，减少军事投入，科研投入翻倍。”\n\n“美国人绝不会同意这么做的，除此以外，我个人也不觉得这会管用。几年以来的事情有目共睹，南极大陆确实在升温——当然，只是比喻——而你的计划会削弱我们抵抗外敌的力量。有鉴于此，我的解决办法更简单：找个对成员国管制更松的澳大利亚人把雷伯恩换下来，盯紧美国人，但事务局总体路线不变。我觉得美国政府会同意的。”\n\n“那就更有悖于我们的理想了！”希拉里不耐烦地说道，“照你这么说，事务局会继续军事化，要不了多久美国人肯定会重新执掌大权。组织需要从根本上改制。”\n\n“不论接下来发生什么，”比尔意图抚平希拉里的怒火，“必须迫使美国人与我们平起平坐，不能只被他们当枪使。除此以外，还要把加拿大拉拢过来。如果加拿大和美国人结伙，这事儿就没希望了。”"
 antarctica_aao_leaders.270.a:0 "“最好联系那老头。赖特能明事理的。”"
 antarctica_aao_leaders.280.t:0 "造王者"
 antarctica_aao_leaders.280.desc:0 "与其他地方相比，夏天的南极洲并不能说是个散步的好去处，但对于目睹过这片大陆最严酷一面的赖特来说，已经不错了。\n\n赖特正在麦克默多站外围散步。虽然地方离一般长走的小径要远的多，但还是在站点的目视范围之内。他需要仔细回味刚刚听到的一切。希拉里和比尔分别与他见了一面，各自阐述了自己对麦克默多站和全事务局未来的想法。他们的观点互不相同，但都认为美国人需要放弃现在的领导地位。赖特很快意识到，他就是破局关键。赖特选择哪一方，加拿大就会支持哪一方，进而可能会让相应派系获得改变局势的影响力。\n\n比尔想要让一个澳大利亚人上位，助力压制美国人最坏的念头，但事务局发展方向基本不会有变化；希拉里欲把行动重点拉回到科研上，减少军事投入，扩大OFN各成员国之于南极的话语权。不过，如果美国保持其领导地位，事务局会保持稳定与政策连续性，同时形成抵御外敌的坚实堡垒。\n\n赖特深爱着南极洲，如此玷污不由得令他扼腕叹息。然而，简单的事实无可否认：从南极到北极的每一寸土地上，人类都已燃起了战火。等到他回到麦克默多站时，他必须要做出决定。"
 antarctica_aao_leaders.280.a:0 "美国人做的太过火了。换个澳大利亚领导能带来新气象。"
 antarctica_aao_leaders.280.a.tt:0 "§n澳大利亚§!对§Q事务局§!的控制力将提升§W10%§!。\n§W凝聚力§!将§R降低§!§W2§!。"
 antarctica_aao_leaders.280.b:0 "希拉里是对的。在通往和平的道路上，OFN必须迈出第一步。"
 antarctica_aao_leaders.280.b.tt:0 "§M新西兰§!对§QOFN南极洲事务局§!的控制力将提升§W10%§!。\n§W凝聚力§!将§R降低§!§W2§!。"
 antarctica_aao_leaders.280.c:0 "动荡时期须有强权，美国人应当继续带头。"
 antarctica_aao_leaders.280.c.tt:0 "§e美国§!对§Q事务局§!的控制力将提升§W15%§!。\n§W凝聚力§!将§R降低§!§W2§!。"
 antarctica_aao_leaders.290.t:0 "不寻常的会议"
 antarctica_aao_leaders.290.desc:0 "雷伯恩感觉，他的领导的任期马上就要结束了。比尔和希拉里召开了一次指挥层紧急会议，还存心不告诉他原因。雷伯恩不傻，知道这是怎么一回事。事务局的内部分歧越发明显，他也承认各方关系恶化是有自己原因在里面的，即冰人导弹计划的保密工作损害了事务局凝聚力。早些时候，雷伯恩安慰自己说在计划上他毫无选择，但在过去的几天中，心里却越来越慌。\n\n里迪最后一个踏进会场，坐到雷伯恩旁边。比尔、希拉里和赖特坐在桌子另一头，两方的隔阂似乎从来没这么大过。“那么先生们，”雷伯恩说道，“会议议程是什么？”\n\n比尔和希拉里略显紧张地对视一眼，随后后者起身说：“南极洲是地球上最神秘的地方之一。从科学角度来看，这里可能是对人类最重要的大陆。我想要让事务局将行动重心放回科研工作和探险上。我们把战火燃到了世界上最后一片处女地，而我不打算再继续忍下去了。现在，我正式请求事务局基于真正的自主与合作原则更换领导人员。”\n\n比尔打断道：“我确实理解科研需求，但现在可是乱世，我认为事务局必须要秉持强硬作风，集权领导和强大军事实力不可或缺。不过，有一点我是赞同希拉里的，也就是，为了缓解眼前的紧张局势，需要领导层洗牌。我也正式提出更换领导人员的申请，但我想找个澳大利亚人上位。”\n\n雷伯恩慢慢点了点头，对此丝毫不感到惊讶。事实上，他基本认同二人的论述。不过，里迪满脸写着不同意。“赖特，你不说两句吗？”雷伯恩问道。\n\n“我能说什么？”赖特答道，“我热爱南极洲，但只要我们还在内讧，这里就不会有好事。稍后我会让你知悉加拿大的立场。”"
 antarctica_aao_leaders.290.a:0 "“那么我只能说，”雷伯恩说道，“与各位共事，荣幸至极。”"
 antarctica_aao_leaders.300.t:0 "冷眼相待"
 antarctica_aao_leaders.300.desc:0 "海曼·里科弗海军上将昂首挺胸，快步走过麦克默多站的走廊。有些人觉得，就里科弗的职位及其头衔来看，听命接任领导之位甚是奇怪。不过，只要对冰虫计划有了解，就能明白为什么需要他这种专业的人来上位了。没过多久，里科弗走进新办公室坐了下来。现在，只要把比尔和希拉里叫来了解一下就行了。\n\n二人到场后，里科弗起身与他们握手：“很高兴与二位亲自会面，雷伯恩对你们的评价很好。”他们握了握手，一言不发地坐下了。里科弗继续说道：“叫你们来是想介绍一下我自己，了解情况，以及阐述一下之后会作出的改变。”听到“改变”一词，希拉里叹了口气，但二人还是继续听着，回答了里科弗的各类问题。\n\n简报过后，里科弗放他们走了，二人也在沉默中离开了办公室。里科弗站起身，双手背在身后，看向窗外。雷伯恩警告过比尔和希拉里对其行为的不满，显然如此不满又延续到他的身上了。\n\n不过，上将不会有丝毫动摇。事务局若要抵御暴政，就必须强大起来。眼下，仅美国一方有着充实事务局的想法与意志。\n\n里科弗凝视着窗外的雪原，脑海里开始遐想着如何在这片空白画布上创作。碉堡、军事载具、士兵、火炮……他看到了一支能挑战OFN敌人的生力军。除此以外，他还看到了一个没有法西斯主义和仇恨荼毒的世界。里科弗希望比尔和希拉里能学会尊重他的理想，但不论怎么说，他们总会与其共进退的……\n\n或者，被踢到一边。"
 antarctica_aao_leaders.300.a:0 "合众为一。"
 antarctica_aao_leaders.310.t:0 "局长办公室"
 antarctica_aao_leaders.310.desc:0 "比尔走进新办公室的第一件事，就是做全身伸展运动。脊柱骨咔咔响，夹克衫滑落肩头。有那么一会，OFN南极洲事务局的新领导人就这么无言地站在那抻手臂，只有肩膀周围的骨头嘎吱作响。\n\n满意又疲惫地长出一口气之后，比尔坐到桌边，打开一份满当当的文件夹。雷伯恩私下告诉比尔会接任之后，他马上就找来了其他文件塞到里面。今天，雷伯恩向媒体公开宣布辞职，比尔也正式走进了公众视野。他，将会带来澳洲式的领导。\n\n为此，比尔需要找出美国人迄今为止所有遮遮掩掩的东西，每一份隐去的报告与文件都要翻出来，挖到没有为止。他心底里对美国人制定的计划基本没有意见，他们的重点项目、冰虫计划和其他一切能带来的可能性都令其印象深刻。美国人曾承诺为澳大利亚以及整个OFN建设一座无比坚固的堡垒，比尔也对此深有感触。这一切的一切，都要归功于核能。\n\n如果该死的美国佬能不独占的话，就不会弄成现在这样。比尔一边悠闲地读着报告，一边思考接下来的行动。他要先开个会，或许可以弄个晚餐会。上位后，比尔就可以和美国人谈判了，仔细讨论制胜之道，同时扩大澳大利亚之于南极洲甚至全OFN的话语权。除此以外，他还想考虑在全事务局境内布设更多的核反应堆系统，进而大大增加雪原上的宜居性。当然，前提是解决了相关问题之后再开干。\n\n比尔靠到椅背上，对未来工作了迷茫了片刻，随后直起身子，继续做准备。"
 antarctica_aao_leaders.310.a:0 "职位更高，可能性更多。"
 antarctica_aao_leaders.320.t:0 "改变局势"
 antarctica_aao_leaders.320.desc:0 "今天，麦克默多站迎来了其建立以来规模最大一批媒体人员，破烂的临时演讲台一时间淹没在闪光灯中。希拉里站在一边咧着嘴，看着他们个个裹着厚衣服站在那发抖，话都说不出两句。\n\n雷伯恩眼神坚定，丝毫不受闪光灯所扰，脸上还带着一丝微笑。他走上前说道：“过去几年间，国际局势可谓是风起云涌，南极洲的态势亦不容乐观，但不论往昔几何，领导事务局的每一天都乐趣非凡。最重要的是，能担起如此职责可谓是无上荣幸。”\n\n话音刚落，在场记者纷纷喊着要提问。嘈杂声让希拉里头痛了起来，雷伯恩也叹了口气，举起手说道：“提问环节稍后进行。”他转身面向希拉里，交换了眼神，好似是简短聊了几句。\n\n回想当初，雪原上真是天翻地覆。雷伯恩和美国人骗了希拉里，把整个事务局蒙在鼓里。他们不满足于南极洲军事化，还将整片南极大陆化为了武器。希拉里不会忘掉这些的，他定会改变一切。现在，雷伯恩向人群宣布道：“敬请诸位欢迎OFN南极洲事务局的新领导人，来自新西兰南极研究规划局的埃德蒙·希拉里！”\n\n希拉里昂首挺胸走上前，郑重地与雷伯恩握手。后者脸上闪过一丝同情的神色，互相点头示意后便把讲台让了出来。希拉里明白，比尔和雷伯恩都对他抱有顾虑。话虽如此，他还是会改变局势，封冻大陆上新出现的武器不会再打出一枪一弹。\n\n在闪光灯的衬托下，希拉里身后放着美、新、澳三国的国旗十分闪亮。"
 antarctica_aao_leaders.320.a:0 "而新西兰国旗，则最为夺目。"
 antarctica_aao_leaders.400.t:0 "流放地的训教"
 antarctica_aao_leaders.400.desc:0 "流放地宽广身躯之上的一些阴谋诡计引起了她的注意。强烈的辐射再次出现，裸露在外、不稳定的金属裹挟着更加活跃的碳元素刮过她的雪白肌肤。猿人们彷徨于冰雪之时，思绪所至之处尽是死亡与秘密。这些轻如尘埃的生灵，逐渐消逝于封冻之地、隐没于惊涛骇浪、泯灭于她记忆中的遗忘角落。这些外来者之间的分歧，神似坚冰奇石间的裂痕。一时间，他们万众齐心，转瞬又分崩离析，仅仅只是为了去团结在又一面旗帜之下，丝毫不问前路何在。远在天边的战火燃至这里，猿人的钢铁巨兽便接踵而至，自相残杀，难解难分，全然不顾她的赏赐。\n\n但现在，流放地存在以来感受到了一样前所未有的事物：一份目的。这并非内发，而是由外来者强加于她的一份目的。他们在内斗之时，迫使流放地一同密谋如何加害于彼此。\n\n那么，就这样吧。\n\n若要学习如何夺人性命，流放地必将一鸣惊人。她会用鲜血与骨肉，让地球母亲哀叹自己为何将智慧之实赐予子民。"
 antarctica_aao_leaders.400.a:0 "开始吧。"
 antarctica_aao_nuclear.10.t:0 "维护生命线"
 antarctica_aao_nuclear.10.desc:0 "麦克默多站的上空被披上了一张深色的毯子。透过窗户，瓦尔曼凝视着夜空，身旁的无线电则不停地传出人声。\n\n“今天仍会降温，平均气温在-26.5℃左右。预计将会有很强的西北风……”\n\n瓦尔曼受够了，他关掉了收音机，播音员的话音逐渐化为了一阵杂音。现在回荡在他耳边的只剩下了狂风的嚎叫，一刻不停地敲打着他宿舍的窗户。瓦尔曼最为清楚南极洲的冬天有多么漫长而难熬，毕竟他已经在这度过了好几个冬天。那张毯子还会在空中悬挂好几个月的时间，整片冰封荒原上的人类的精神都会在它的威压之下崩溃。这就是为什么他们需要核反应堆的能量。它就像一颗跳动的心脏，让麦克默多历经狂风与暴雪仍能屹立。一直以来，瓦尔曼都是这颗心脏的看守者。\n\n他坐在办公桌旁，狠狠地灌下一口咖啡，又一头扎进了文书的海洋中。为了度过长达数月的冬季，反应堆需要以更强的功率进行运转。最重要的是，它还不能出故障，而这才是真正的挑战。精密而娇贵的设备在南极大陆的恶劣气候下是如此的脆弱，在五大洲上建起了雄伟文明丰碑的人类也是如此。想到这，瓦尔曼挤出了一丝自嘲的笑容，放下了手中的咖啡杯。"
 antarctica_aao_nuclear.10.a:0 "是时候开始干活了。"
 antarctica_aao_nuclear.20.t:0 "无形的麻烦"
 antarctica_aao_nuclear.20.desc:0 "在反应堆安全罩上的裂缝面前，瓦尔曼只能皱起眉头。就在刚才，一名发现了这个问题的同事用一通歇斯底里的电话吵醒了他。尽管他还带着点起床气，但这个消息带给他的震惊很快就压过了其他情绪。“所以，肯尼斯，你怎么看？”杰里米在他身后问道，把判断权拱手让给了他。\n\n瓦尔曼抿着嘴唇思考了一会儿。“这可不是只有一道裂缝这么简单……我至少还发现了两道。”杰里米因震惊而张大了嘴，也许还为没有注意到它们而感到尴尬。但瓦尔曼无权责怪他，罩子顶上的裂缝实在太小了，不细看根本看不见。如果没人发现这些裂缝，他们肯定还会觉得反应堆一切正常。不过，裂缝很小并不代表问题很小。如果反应堆漏水，里面的零部件也可能会报废。这意味着他们需要立刻开始修理工作。在南极，尤其是南极的冬天，没人能承担得起出这种事故的代价。然而，造成这一事故的原因更令瓦尔曼感到费解。\n\n也许这是组装时的失误造成的问题？水分流失也会导致罩子损坏，考虑到南极的气候十分干燥，这也是个合理的推断。瓦尔曼站起身来，把手搭在了杰里米的肩膀上。现在，他唯一能做的就是抚平眼前这个年轻人的情绪：“我马上就去向上级报告这个问题，放心，这不是个事。”"
 antarctica_aao_nuclear.20.a:0 "“另外，你发现得很及时，干得好。”"
 antarctica_aao_nuclear.30.t:0 "没人能从容面对"
 antarctica_aao_nuclear.30.desc:0 "麦克默多核反应堆里的温度低到了极点，瓦尔曼也被这刺骨的寒冷弄得心灰意冷。由于反应堆一而再、再而三地出问题，为了保证麦克默多站其他地方的温暖与宜居，瓦尔曼不得不降低反应堆设施内的供暖设施的功率。他裹着最厚的一件棉衣站在墙边，目视他的同事们一边打着寒战，一边出去休息。\n\n“嘿，肯尼斯，你不来和我们一块抽会儿烟吗？”瓦尔曼被身后突如其来的声音吓了一跳，他回过头来，看见杰里米带着羞涩的笑容站在他身前。“老天在上，”瓦尔曼吐了一口气，接着说道：“别再搞这种小把戏了。”杰里米则举起手来，表示自己没有恶意。同时，他手里还拿着一个打火机，肯尼斯差点把它看成了一把手枪。“别担心，我不会蠢到在屋里用这玩意儿的。来吧，冬天已经过去了，观察山上的风景老好了。你也是时候该歇一歇了。”\n\n有那么一瞬间，瓦尔曼想作出肯定的答复。然后他想到了前几个月的时光，想到他们是如何与反应堆上的裂缝作斗争的。这让他们牺牲了自己的舒适，也让他们的工作时间延长到了全天二十四小时。每当他们处理完一个紧急情况，又会有另一个紧急情况接踵而至。他把身子完全转回来，发觉杰里米脸上的笑容完全消失了。\n\n“记住了，以后别把打火机带进来。”说罢，瓦尔曼走了出去。他理了理眼镜，回想着今天早上在镜子里看到的自己：头发乱得像鸟窝一样，眼袋低垂，眼球布满血丝。从来没人觉得这份活计很容易。这时，他听见身后传来了一声关门的声响。"
 antarctica_aao_nuclear.30.a:0 "反正休息时间也只有几分钟而已。"
 antarctica_aao_nuclear.40.t:0 "不祥的海岸"
 antarctica_aao_nuclear.40.desc:0 "浪花拍打着麦克默多海湾的海岸，随后在高耸的冰山和灰色的山峦前退去。待到瓦尔曼睁开眼睛时，冰雪已经融化了，正如海浪在白沙上融化一样。他费劲巴力地从躺椅上站了起来，好似自己被粘在了上面似的。\n\n在他的职业生涯中，上级还是第一次给他下达如此简单的任务：待在沙滩上，“放松身心”。根据他们的命令，以及相关同事的建议，瓦尔曼需要在塔斯马尼亚岛进行一段时间的休养。\n\n瓦尔曼坐回到躺椅上，远眺那延伸到地平线的尽头的大海。海泡石与清澈见底的海水划分了海洋与陆地的边界，各种颜色的热带树木则衬托着这条界线，使其充满了活力。尽管周身风景优美，他的思绪还是不自觉地飘忽，就像反应堆也跟着他来到了这里一样。每当他闭上眼睛时，担忧和疑问就会困扰他的脑海。这帮小崽子遵循安全程序了没？要是有紧急情况的话，该怎么办？\n\n一张被撕破的报纸静静地躺在沙地上。他试图阅读新闻以分散注意力，但上面的消息并不乐观。他的身旁则放着一张家人从家乡寄来的明信片。和他的同事们一样，他的家人告诉他要放松身心。瓦尔曼知道这一点，但他只是……不知道如何去做到。他的目光瞥向一张小木桌，一杯柠檬水正放在上面，在日光的照耀下闪闪发亮。这么长时间以来，这还是他第一次喝到除了白水和咖啡以外的东西。他叹了口气，拿起手中的杯子，用吸管啜了一口。这饮料的味道反而比他记忆中的要好了不少，再来一口也无妨。"
 antarctica_aao_nuclear.40.a:0 "有时候，最好的应对方式反而是放松下来。"
 antarctica_aao_nuclear.50.t:0 "重返战场"
 antarctica_aao_nuclear.50.desc:0 "瓦尔曼来到观察山上时，一队人正伫立在那迎接他，于是便报以一丝微笑。这次回基地能见到如此接风人群，属实是没想到，但他也并不反感队伍注入新鲜血液。自从瓦尔曼坐船离开塔斯马尼亚后，就一直焦虑不已。在岛上这段时间，他无意间放松了下来，而回来视察反应堆则又令其绷紧了神经。\n\n瓦尔曼打起精神，向新入列的工程师问好。多点人手总是能方便他们撑过下一个冬天。当然，事先肯定要把这群新人的效率带起来。现在，他只先和人们拉拉家常。队伍由美、澳、新三国的人才组成，口音各异，彼此间交谈甚欢。\n\n不过，除了在场人群，瓦尔曼也期待着能见到老熟人，而这也是为什么当他发现少了几人之后有些担心。这些人从来没迟到过。“其他人呢？”瓦尔曼问道，“杰里米呢？”\n\n看到众人沮丧的深情，瓦尔曼的眉头更加紧锁。“杰里米和其他几个人现在无法上工，”一名工作人员说道，“他们吃了太多辐射，被隔离了。反应堆泄露了一次。”\n\n瓦尔曼扫视着新老面孔。他不在的时候，反应堆依旧受各类问题所扰，人们也因此而受伤。是时候补补功课、查明原因了。"
 antarctica_aao_nuclear.50.a:0 "“那么等会我就得去趟医疗站了。”"
 antarctica_aao_nuclear.60.t:0 "濒临崩溃"
 antarctica_aao_nuclear.60.desc:0 "瓦尔曼坐在一边，蹙眉看着雷伯恩浏览自己匆忙拟定的报告，心里希望中将不会在意纸张一角上的咖啡渍。换做平常，他会花上大把时间给事务局领导准备正式文件，但现在可是特殊时期。\n\n“氚……？”雷伯恩头也不抬地问道。\n\n瓦尔曼深吸一口气，回答道：“是的，中将。它是一种氢的同位素，较为罕见，具有放射性。”\n\n雷伯恩大惊失色。他继续阅读报告，脸上血色逐渐褪去。虽然氚在自然内里相当罕见，但它是核反应堆运作的常见副产物，并且已经渗入了核反应堆产出的纯净水，可能已经有超千名站内人员饮用了该类放射性污水。他们首先检测的就是站点供水，进而直接发现了问题。如此描述在瓦尔曼的脑海里来回打转，犹如五雷轰顶，直接让他瘫在了椅子里。\n\n“我们要停止生产淡水，”雷伯恩抬头说道。“已经停了，长官。”瓦尔曼答道。他曾誓言要防止反应堆对外界造成伤害，可它已经潜移默化地对众人造成了伤害。太迟了吗？“瓦尔曼先生，”雷伯恩把他从思绪中拉了出来，“站点将全力支援你对尽可能多的驻守人员进行体检，我也会亲自给你调来解决事态所需的资源，但现阶段，我们需要控制损害。”瓦尔曼没有答话。时间无法倒转，最好的解决办法就是面对现实。"
 antarctica_aao_nuclear.60.a:0 "原子之心，为何成了致命毒药？"
 antarctica_aao_nuclear.70.t:0 "迟到"
 antarctica_aao_nuclear.70.desc:0 "麦克默多站核反应堆的首席工程师直挺挺地站在门边，一边自顾自地咒骂着，一边不耐烦地用脚尖拍打地面，还不时地看一下手表。接着，门打开了，一个瘦长的年轻人跌跌撞撞地走了近来。这名迟钝的工程师注意到瓦尔曼直挺挺地盯着他后，脸色煞白。\n\n“上哪去了？”瓦尔曼质问道，“拿来我要的工具可不需要你花那么长时间。”年轻人往后缩了缩，喃喃几句道歉的话语。就在这时，另一名工程师带着轻松的微笑加入了对话，对新人甚是同情。“奥利弗？兄弟，我早就叫你别瞎逛去看企鹅了，那是休息时间该干的事！”工程师拍了拍尴尬至极的年轻人的背说道，“瓦尔曼，别这么严厉嘛。”瓦尔曼摇了摇头，背过身去。瞎逛？企鹅？认真的？他回头问年轻人：“那你至少把工具带来了吧？”年轻人点了好几次头，递给瓦尔曼一个大工具箱。瓦尔曼咕哝了两句，回去工作了。或许他最近就是有点脾气臭。\n\n不论如何，他们……进度还算不错。消除水中放射物质的方法多种多样，目前过滤的效果也不错。反应堆核心的防护罩出现裂缝，是这一切麻烦的源头，因而团队需要对其进行维修。瓦尔曼伸展了一下，准备拿出工具。\n\n在工具箱里翻找了一番之后，瓦尔曼发现少了快一半工具。“再来点咖啡得了。”他暗自咒骂道。"
 antarctica_aao_nuclear.70.a:0 "磕磕绊绊总会有，不是吗？"
 antarctica_aao_nuclear.80.t:0 "寻根究底"
 antarctica_aao_nuclear.80.desc:0 "窗框上结满了冰霜，玻璃本身也是模糊一片。瓦尔曼伸出一只手按在窗户上，凝视着极夜雪原上朦胧的灯影。就算窗户没结冰，外面也没什么好看的。唉，不过是长达几个月的夜晚罢了，瓦尔曼苦涩地想道。今年，他决心要抗住大自然的压力，不能像去年六月一样深受其害。然而，局势的严峻程度却是有增无减。\n\n除开处理反应堆的问题，派驻人员的一个内部矛盾也很棘手。“所以说，我找到了这些记录，”突然从一排排柜子之间闪出来的杰里米说道，“如我所说，没什么疑点。”瓦尔曼点点头，瞥了眼杰里米花了半个小时整理出来的文件堆，并没有为其所动。毕竟，瓦尔曼已经习惯了同事突然冒出来。\n\n“几个工具不见了，就要这么大费周折？”杰里米问道，但并没有期望能听到回答。瓦尔曼推了推眼镜，眉头紧锁。文件详细记载了每位下属的个人信息。工具凭空消失，过滤系统莫名其妙地故障，设施内地照明系统甚至罢工过一段时间，大大延缓了工作进展。放以前，根本没发生过这种事，至少新工程师来之前没这种事。\n\n要么是同事有问题，要么是瓦尔曼失心疯了，但心里的那点傲气让他直接排除了后者。不过，即便是想到这里，记录也找不出任何头绪。"
 antarctica_aao_nuclear.80.a:0 "“好吧，继续找。”"
 antarctica_aao_nuclear.90.t:0 "蓝天伴浓烟"
 antarctica_aao_nuclear.90.desc:0 "“呃，那是……好吧。”杰里米挠了挠后脑勺说道。瓦尔曼与其一道站在室外，眺望着反应堆大楼里飘出一缕浓烟。他抽了口香烟，眼神空洞又烦躁。湛蓝色画板上抹了一道黑色痕迹，画面看着莫名安心。火警迫使人们暂时关停了反应堆，但这把火至少不是在深冬时刻烧起来的，瓦尔曼尝试从积极的一面想道。为了保持心理平衡，他就得这么干。\n\n不过，瓦尔曼仍对此心存芥蒂，灭火之后也是如此。日子一天天过去，他越来越在意这次火灾，更多线索也浮出了水面。起火点不在反应堆内部——希望上帝也别让这种事情发生——而是在工程师的工作场所。文件和其他材料着火，然后火焰蔓延道其他地方。除此以外，有个沮丧的工人告诉瓦尔曼说，冷却风扇在火灾发生前一天罢工了。时间转到现在，他们正一起检查起火位置，眼睛里都钻了余烬，瘙痒不已。焦黑的烧痕从地板一直蔓延到天花板，完全覆盖了房间的一角，残剩的文件和垃圾零碎地摊在地上。\n\n“真是个门外汉……”瓦尔曼喃喃道。蛛丝马迹在脑海里拼接了起来，犹如电影般历历在目。某人把易燃物堆在角落里，然后点燃。随着调查继续，画面越来越清晰：地毯上和文件上有没着火的污渍、犯人切断了电线以引发电气火灾。结论就是，一个半吊子纵火犯往地上倒燃料，但燃料没有充分燃烧，文件堆里燃起的火焰也没有获得足够氧气，火灾完全没有波及防火门之外的地方。瓦尔曼走出房间，心里甚至有几分喜悦。他为纵火犯的无能感到高兴，同时也因为这次事件坐实了破坏分子的存在而欣喜。"
 antarctica_aao_nuclear.90.a:0 "现在，只要把他们揪出来就行了。"
 antarctica_aao_nuclear.100.t:0 "步步紧逼"
 antarctica_aao_nuclear.100.desc:0 "橘黄色的灯光下，瓦尔曼小心翼翼地拓平家里寄来的明信片，将其放在明信片堆里，随后无言地坐在桌边。妻子在来信中抱怨找不到合适的圣诞树，以及女儿有些……往好了去说，沮丧。他轻笑两声，一头扎回到手上的稿子，也就是关于那场威胁到PM-3A设施的火灾的报告。有时候，瓦尔曼也希望自己是在写圣诞树的事，但现实就是，他正在罗列自己和团队成员的观察结果。队伍里有个破坏分子的谣言已如病毒般向外传播。\n\n一方面，瓦尔曼认为有同事和自己一起疑神疑鬼是件好事；另一方面，这里的乱子或许只会让抓捕行动更加困难。他试着从犯人的角度思考问题，设身处地思考其动向。换做是瓦尔曼，他早就夹着尾巴逃出麦克默多站了。为了锄奸，上头把角角落落翻了个遍，但目前为止仍是一无所获。在这期间，瓦尔曼想着自己该干什么。或许设个陷阱，或者每晚去站岗，可话说回来，这样只会让他更加疲惫。\n\n种种压力让瓦尔曼喘不过气来。这名首席工程师大可以直接拎包跑路，回家去纠结圣诞树的事。他咬紧牙关，摇头打消杂念。只要抓住破坏反应堆的内奸，马上就能回去。浪费了这么多时间却毫无回报可言，那个人到底作乱多久了？站点内已有几十人受辐射所害，损失业已无可计数。"
 antarctica_aao_nuclear.100.a:0 "必须，要终结这场悲剧。"
 antarctica_aao_nuclear.110.t:0 "山巅祷告"
 antarctica_aao_nuclear.110.desc:0 "同事杰里米首先发现了问题。过去一个月以来，瓦尔曼翻遍了反应堆楼的一砖一瓦，想要找到破坏分子可能钻进来的地方，而杰里米率先注意到了大楼后面的一扇窗户有些不对。\n\n“这扇窗关不牢，”杰里米说道，“油漆上太厚了，窗框变厚，于是就关不上了。相信我，在家里我研究过这码事。如果那个内奸要进来，就会走这扇窗。我们应该把它修好。”\n\n不过，瓦尔曼抬手表示反对。“放着吧。”他推了推眼镜说道，“我们不修。现在我要去和别人见面。”\n\n自从火灾之后，反应堆楼周围就由武装守卫严密保护了起来，但瓦尔曼要求他们撤回。后者费了些口舌，但守卫最终还是同意执行计划：在那个天寒地冻的夜晚，守卫会全体撤退，为内奸创造破坏麦克默多站生命线的条件，而瓦尔曼和杰里米则会坐在里面守株待兔。\n\n二人坐在黑暗之中，只能靠反应堆森然、尖细的嗡嗡声摆脱睡意。杰里米点了跟香烟，递给瓦尔曼。通常来说，后者会予以斥责，但今天的他接下了好意，猛吸了一口。“额，我说，”杰里米凝视着虚空说道，“我不知道是不是真的有间谍什么的，但这大抵是我干过最有意思的事了。”\n\n他怯生生地笑了下，继续说道：“呃，谢谢你带我，瓦尔曼。”瓦尔曼深吸一口气，沉默片刻说道："
 antarctica_aao_nuclear.110.a:0 "“来，杰里米，和我一起祈祷，祈祷这计划能管用。”"
 antarctica_aao_nuclear.120.t:0 "上钩了"
 antarctica_aao_nuclear.120.desc:0 "瓦尔曼的眼皮已经在打架了。反应堆单调的嗡嗡声淹没了脑中思绪，墙外有节奏的风声也不断想把他拉入梦乡。突然间，瓦尔曼听到了有重物掉在地上的闷响，一下子清醒了过来。他挺直腰板，看到身边的杰里米也警戒了起来。接着，二人听到前面的房间传来了低声咒骂。\n\n瓦尔曼向杰里米点头示意，一手拿枪，一手拿手电，起身迅速摸静步靠近房间。反应堆的噪音盖住了脚步，但他仍是大气不敢出。\n\n房间里又传来了几句咒骂声。瓦尔曼行至门口，以迅雷不及掩耳之势打开手电，照向声源处。灯光下显现出一个瘦高青年，瞪大了眼睛看向瓦尔曼。他正抱着桶汽油匍匐前进，未料被总工程师打个措手不及。\n\n“奥利弗。”瓦尔曼倒抽一口气说道。他知道青年的名字，知道青年是工程师队伍的一员。有那么一瞬间，瓦尔曼感觉时间停止了，自己凝固在原地动弹不得，脑海里乱作一团。工程师队伍的一员啊。怎么没想到呢？怎么会落到这个地步呢？\n\n奥利弗抓住这个机会，甩手就跑。瓦尔曼想要举枪瞄准，但看着年轻人的面庞，完全下不了手。奥利弗从他身边跑过之时，一群士兵踢开了大楼正门，抬枪挡住了内奸的去路。杰里米尽了责任，拉响了警报。现在，麦克默多站的内奸只能蹲在地上，高举双手向众人投降。"
 antarctica_aao_nuclear.120.a:0 "然而，震惊之余的瓦尔曼丝毫没有庆贺的心情，只是一言不发地凝视着这一切。"
 antarctica_aao_nuclear.130.t:0 "冷酷审问"
 antarctica_aao_nuclear.130.desc:0 "逼仄的审问室内，唯一的照明设施不过是悬在半空中的小小灯泡。昏暗的灯光下，瓦尔曼与奥利弗面对面坐着凝视彼此，气氛紧张。“我已经为国效忠了。”奥利弗颤抖着说道。\n\n奥利弗·邓恩，白人男性，二十七岁，中产出身，派驻南极前居住于佛州杰克逊维尔城。瓦尔曼把奥利弗的资料读了又读，完全没有找到前科，可谓是个正常青年——至少，看到他的个人物品之前，旁人都会这么认为。遭到逮捕后，站点派人彻底搜查了奥利弗寝室，找到了走私的亲纳粹书籍和记录敏感信息的麦克默多站地图，但最糟糕的莫过于一台单向语音通讯设备。瓦尔曼从来没想到，自己有一天会在南极用上以往的审问经验，但事已至此不得不上。“奥利弗，为什么要这么做？”瓦尔曼温和地问道，“你这是会让许多人陷入险境的啊，还会把信任你的人拉下水呢。”话虽如此，但他表情上蕴含的情感更多是关切，而非愤怒。这是经过深思熟虑而作出的举动，即构筑出同情的样子。\n\n灯光照亮了奥利弗的额头，显现出一道淡淡的淤痕。不管先前是谁想撬开这内奸的嘴，想必都不怎么手下留情。“我才不在乎他们这帮肮脏下贱的种族叛徒，尽是些犹太-布尔什维克渣滓罢了。”奥利弗脱口而出。听到这里，瓦尔曼就已经知道他信奉什么了。“直到我变得危险、变得重要之前，没人他妈的在乎我、关心我。祖国日渐衰微，到处都是次等人和犹太佬，而我，看到了希望，”奥利弗的呼吸越发急促，话语间还夹入不少德语，“只有我三K党的弟兄们知道真相！只有他们受到了伟大祖先遗产学会之种族科学的启迪！”\n\n瓦尔曼看向桌面。他不只是审讯者，还是会说德语的审讯者，因而翻译了一些奥利弗手上的文件，了解了个大概。不过，本人的话语依旧可以作为实证。他点了下钢笔，在笔记本上写下一个词：祖先遗产学会。"
 antarctica_aao_nuclear.130.a:0 "“详细说说你的接头人。”"
 antarctica_aao_nuclear.140.t:0 "里面更暖和"
 antarctica_aao_nuclear.140.desc:0 "瓦尔曼顶着寒风站在食堂门口，颤抖不已。黑暗才是最好的食粮啊。今晚，他想独自静一静。除了身后窗户透过来的一点灯光，漆黑的夜幕下看不到任何东西。\n\n审讯了几个小时后，奥利弗那愤恨的眼神终于把瓦尔曼逼走了。离开房间后，他只能说奥利弗是个满腔怒火的年轻人，还是一个已经和祖先遗产学会保持了数月联系的年轻人，甚至在踏足南极洲之前就纳粹有染。这个年轻人破坏了反应堆，天知道伤害了多少人。\n\n瓦尔曼吐了口烟，踢着脚边的冰渣子。几个月前困扰着瓦尔曼的罪恶感再一次爬上心头。他负责维护反应堆、管理手下工程师，但这两件事都没做好。为什么当时没能看出来呢？\n\n手下一名工程师，还是个美国人。更糟的是，世界上还有很多这样的人。其他人也有可能信了祖先遗产学会那套鬼话，站点内也可能有像奥利弗这种中了邪的存在。他们是科学家，是知识分子，应当去点燃人类的进步之炬。可是，当瓦尔曼看向深渊之时，却深切感到遗产学会的目标是要把火炬引入更黑暗、更凶险的歧途。他又能做什么呢？他不也是个科学家吗？\n\n门被推开了，明亮的食堂灯光投了出来，还传出阵阵嬉笑聊天声。众人抓住了内奸，正在里面开庆功会呢。杰里米从里面走了出来，手里还拿着瓶酒。他对瓦尔曼说道：“嘿，瓦尔曼，想进来坐坐吗？我们需要总工程师来一起庆祝啊。”二人对视一会儿，随后跨进了食堂。"
 antarctica_aao_nuclear.140.a:0 "或许，抱团取暖才是上策……至少现在如此。"
 antarctica_aao_nuclear.150.t:0 "翻篇"
 antarctica_aao_nuclear.150.desc:0 "一架加拿大籍极地飞机停在跑道上，它与其他事务局用来飞向极地内陆地区的飞机并无二致。至少，瓦尔曼乍一看是这样的。虽说如此，这架飞机并非由加方或者任何常规武装人员使用，而是驻南极洲军事援助司令部研究观察团的座机，周遭还围了一圈穿着黑大衣的中情局探员。这次航班的任务并不是将补给品运至远方的基地，而是要押送一名囚犯。\n\n瓦尔曼看向远处，发现中情局的人正架着奥利弗·邓恩向飞机走来。那内奸束手就擒，低头走着，面无表情的探员们则一言不发地把他塞进了飞机。站在瓦尔曼身边、自称麦格劳的探员仰望天空说道：“天气真好啊，你说是吧？”\n\n瓦尔曼没有答话。他推了推眼镜，黯然神伤地注视着飞机驶离麦克默多站，朝着内陆地区的方向飞去。目的地，他不知道。“如此清净的地方会让人觉得更和平，”麦格劳叹了口气再次说道，“但我觉着，总得有人要站出来守护一切啊。”语罢，黑衣探员迈着沉重的步子离开了。\n\n守护。正当瓦尔曼回味这个词的时候，另一架飞机降落了。他本来是要候着这架为反应堆维护人员注入新血液的班机的。总工程师最后再看了眼吞没奥利弗的漆黑地平线，随即转身离去。"
 antarctica_aao_nuclear.150.a:0 "该去迎新了。"
 antarctica_aao_nuclear.160.t:0 "阳光灿烂"
 antarctica_aao_nuclear.160.desc:0 "时值正午，观察山上摩肩接踵，反应堆工程师团队此时正坐下来闲聊。瓦尔曼在人群当中，低头盯着手中的热可可。他对这种软饮的热爱超过任何酒类，即使喝酒有助于他休息。\n\n他沉默着回想反应堆经历的一切，内奸着实是被铲除了，但是问题还在。在这样一个如此完美的世界里，好似一切都是祖先遗产协会的过错。不过，正如他所料，南极洲对PM-3A这样的精密机械并不友善。\n\n“瓦尔曼先生，”有人轻轻拍了拍瓦尔曼的肩膀，他转过身来，一位年轻工程师正抬头看着他，“我跟其他几个同事在考虑个计划，尝试加快污水的净化速度，然后……您能来帮我们看看吗？”年轻人低头盯着自己的鞋子，摆弄着一堆纸质文件。\n\n又喝下一小口饮料后，瓦尔曼长叹一声。近些日子，他是个不好对付的苛刻上司的名声传得沸沸扬扬，已经算不上是啥新鲜事。不过忍忍就过去了，为了团队以及自己的好处，他不得不这样。“这个事情可以研究研究，”瓦尔曼最后还是答应了，他觉得队伍中的新鲜血液以及新颖想法将是成就此事的关键，“不过先让大伙儿再歇会儿吧。”\n\n年轻人有些惊讶的点了点头，后又走开。休息至关重要，杰里米往他脑子里灌输这个想法已经好几个月了，最终瓦尔曼还是屈服了。他又饮下一口可可，望向天空。艳阳高照，他不再需要独自直面这一切，于此当下，事情似乎正渐渐好转。"
 antarctica_aao_nuclear.160.a:0 "于是，工作仍旧继续。"
 antarctica_aao_pert.10.t:0 "从极点到极点"
 antarctica_aao_pert.10.desc:0 "本内特·L·刘易斯少校给自己的上司小约翰·C·H·李上校递上一杯咖啡。上校正坐在营地高处的山脊上，俯瞰着下面的人员。他看到挖掘机破开土地，营地之中熙熙攘攘，他和刘易斯都觉得这里就像是一处蚂蚁窝。“飞机快要准备好了，长官。”刘易斯说道。\n\n李点了点头：“这里很荒凉，格陵兰这名字可真是名不副实。”\n\n“我的一位历史教授曾经告诉我，维京人管这儿叫格陵兰是想吸引新的定居者。所以嘛，他们自然不能把这个地方的真实面貌告诉乡亲们。”刘易斯笑着说，“我一直都觉得这很有趣，来自中世纪的假名，能让我联想到我们现在的工作。”\n\n“尽管格陵兰已经很荒凉了，但我相信，和下一个目的地相比，这里简直就像是天堂。”李叹了口气，“南极洲。我和驻扎在那里的人一起干过一两次，他们的眼神都如出一辙，就好像他们知晓遗忘究竟是种怎样的感觉似的。”\n\n“嗯，”刘易斯眺望着飞机跑道，又抬手看了看腕表，“对不起，长官，但我们真的该走了，雷伯恩中将希望我们这周就能到南极。如果现在还不走，西边来的那场风暴就会把我们的飞机砸到地上的。”\n\n李赶快喝完了手中的咖啡，站起身来，说道：“走吧，我们去看看南极能有什么让人大惊小怪的东西。”"
 antarctica_aao_pert.10.a:0 "再见，格陵兰。"
 antarctica_aao_pert.11.t:0 "秘密"
 antarctica_aao_pert.11.desc:0 "工程师们来到麦克默多站时，查尔斯·S·赖特正坐在埃德蒙·希拉里的办公室，与后者进行磋商。赖特是加拿大派驻OFN南极洲事务局的联络员，负责与麦克默多站的领导层进行定期会晤。希拉里的办公室正对着雷伯恩中将的办公室，两间屋子的大门都敞开着，赖特正在为加拿大同胞在新西兰管辖的一处研究前哨站的住宿问题讨价还价。此时，他们看到了一群陆军和工程师模样的美国人，抬着一箱又一箱的文件夹和文档穿过了走廊。\n\n赖特渐渐止住自己的话头，挑了挑眉毛，扭头看着门外的人群。工程师们排队走进雷伯恩的办公室，放下箱子，然后离开。赖特和希拉里看了足足一分钟，如同火车一般的人流却依然没有结束。赖特问道：“你觉得那是怎么回事？”\n\n“不好说，”希拉里回答道，“有可能是新建筑吧，也许麦克默多站会建些新居住地。”\n\n赖特皱了皱眉头，回头对希拉里说道：“没人通知我基地会扩建。”\n\n希拉里翻了个白眼：“行吧，你知道那帮美国佬的作风，一切都是秘密。无论如何，我们很快就会知道，在这儿可藏不住多少事情。”"
 antarctica_aao_pert.11.a:0 "……或者说，你能吗？"
 antarctica_aao_pert.11.a.tt:0 "§e美国§!对§QOFN南极洲事务局§!的控制力将提升§W10%§!。"
 antarctica_aao_pert.12.t:0 "计划评审技术"
 antarctica_aao_pert.12.desc:0 "雷伯恩中将看着四周堆积如山的文件，不由想起了乔治·巴顿将军的名言：“与战争相比，人类一切其他形式的努力都显得微不足道。”陆军工程师们留下的这些箱子里装着一个大胆研发项目的骨架，雷伯恩的责任就是引领它化作现实。\n\n他很清楚为什么这个项目会落在他的肩上。几年前，雷伯恩曾受命统筹过类似的任务，那就是海军的北极星导弹。虽说他那时没什么工程经验，但却凭借着对计划评审技术的高超运用证明了自己的能力，UGM-27“北极星”导弹得以比计划提前四年即告成功。如此壮举在军事技术研发中实为罕见，在火箭设计史上也闻所未闻。由于这一成就，雷伯恩得以在1960年晋升为海军中将。\n\n“冰人，”雷伯恩扫视着数千份文件中的第一份，嘴里喃喃自语。按照他的推测，陆军正试图在核三位一体中创造自己的独特定位，希望自己能帮助他们尽快达成愿望。有鉴于项目目前的混乱状态和他做出的保密宣誓，雷伯恩明白，这件工作非他不可。许多隶属于他的设计团队不得不相互隔离，无法了解项目全貌，仅仅知道自己需要干什么，这种“仅限于知晓需求”的研发模式将会带来相当大的挑战。项目保密程度如此之高令雷伯恩困惑不已，哪怕是曾经的北极星导弹研发，其机密性和伪装程度也没有到这个地步。当然，在现今这样疯狂的世界里，的确再怎么小心也不算过分。\n\n雷伯恩知道，在适当的时候，他将会触摸到“冰人项目”更广泛的目标，毕竟陆军不可能永远把设计团队蒙在鼓里。现在要做的就是告知各小组他们的职责，并通过计划评审技术管理项目工作流程。雷伯恩希望自己能复制先前的成功，或许，在这片冰冷的荒原上，他也能迎来晋升的契机。"
 antarctica_aao_pert.12.a:0 "这份职责的唯一人选。"
 antarctica_aao_pert.12.a.tt:0 "启用§Q冰人导弹研发项目§!GUI。"
 antarctica_aao_pert.20.t:0 "火箭采购"
 antarctica_aao_pert.20.desc:0 "常言道，从来没有两枚相同的火箭。重量、发动机功率、有效载荷的细微变化都可能决定着卫星是会安然入轨还是在高层大气中燃烧殆尽。从军事角度看，发射飞行器的选择对于导弹的射程和打击能力至关重要，这一点在核武器研发中尤为关键。\n\n雷伯恩中将需要做出决定，他必须在两种发射飞行器之中为冰人导弹选择一种。第一个选择是民兵1型，这是一种可靠的三级火箭，使用廉价的固体火箭燃料，只需要较小的发射井，非常容易建造维护；第二个选择则是大力神Ⅱ型，它使用液体燃料，分为两级，比民兵1型大得多，但同时也拥有更大的射程和有效载荷。\n\n这并不是个简单的选择。在极地气候下，仅需最低程度维护的紧凑型设备就是王道，因此民兵1型似乎是合理之选；但换个角度说，尽管大力神2型会带来巨大的工程挑战，但就潜在目标和弹头当量而言，两级液体燃料火箭显然要灵活得多。围绕该项目的保密工作让雷伯恩有些埋怨，要是他知道更多有关导弹预期目标的具体细节，他就能做出更明智的选择。但现实却是，他不得不依据极其有限的数据进行工作。\n\n雷伯恩将这个麻烦变成了一道简单的问题：大力神2型火箭大射程所提供的灵活性，是否能超过民兵1型易维护、紧凑性带来的好处？"
 antarctica_aao_pert.20.a:0 "民兵1型适合极地气候，就选它了。"
 antarctica_aao_pert.20.a.tt:0 "§R导弹弹体网络图§!中所有活动的§G乐观完成时间§!、§B最可能完成时间§!、§R悲观完成时间§!均将§G减少§!§Y4§!天。"
 antarctica_aao_pert.20.b:0 "现在还不清楚导弹会部署在哪儿，因此射程远的大力神2型才是合理的选择。"
 antarctica_aao_pert.20.b.tt:0 "§B电子系统网络图§!中所有活动的§G乐观完成时间§!、§B最可能完成时间§!、§R悲观完成时间§!均将§G减少§!§Y4§!天。"
 antarctica_aao_pert.30.t:0 "不该问的别问"
 antarctica_aao_pert.30.desc:0 "为了项目保密，雷伯恩得对不同的人撒不同的谎，这么下去，他早晚得忘了自己一开始编的故事：这就是中将现在在冰人项目上遇到最大的麻烦。近来，陆军负责冰人项目的参谋告诉他，由于发射地点的变化，导弹发射飞行器的参数需要进行更改，但雷伯恩却仍然不知道这个所谓的“发射地点”究竟是哪儿。雷伯恩之前也试着推测过，他觉得应该是在北极某处，极大可能是阿拉斯加，但设计团队甚至连这样的猜测都不知道。他想不出来，要怎么在不泄露项目情报的情况下将新信息告诉各个团队。\n\n与电子团队讨论时，他不得不故作轻描淡写地略过系统冷却问题；与弹体团队交谈时，他又不得不暗示，相较于其他型号的导弹，新型导弹部署地点的环境温差可能会大得多；当然，真正有趣的还在后面，他还得想办法告诉再入飞行器小组，他们必须在极地气候下储存弹头……同时，又不告诉再入飞行器小组，他们必须在极地气候下储存弹头。\n\n雷伯恩暗暗下定决心，如果他将来能遇到那个想出来这种极端保密观念的家伙，一定要先表示感谢，再狠狠打他一巴掌，顺序调个个儿也行。中将知道，他领导着最优秀的科学家和工程师，不辞辛劳，从美国各地飞来麦克默多站。然而即使是他们，也不能逃过项目现行“只知道需要知道的事情”的保密政策带来的负面影响。"
 antarctica_aao_pert.30.a:0 "“啊……现在我得怎么跟引擎团队说啊？”"
 antarctica_aao_pert.30.a.tt:0 "§F为§Q冰人导弹研发项目§!解锁更多选项§!。\n所有活动的§G乐观完成时间§!、§B最可能完成时间§!、§R悲观完成时间§!均将§R延长§!§Y2§!天。"
 antarctica_aao_pert.40.t:0 "核子三明治"
 antarctica_aao_pert.40.desc:0 "再入飞行器团队的任务是设计出能够将核弹头送出大气层，然后再次穿过大气、击中目标的飞行器。考虑到这是危险的核弹头，团队最重要的核心要点就是避免一切可能的意外情况，这正是埃利斯·戴维森工程师此刻正在担心的事情。\n\n他的助手罗伊斯一边嚼着三明治，看了看戴维森肩膀旁的REV（再入飞行器）徽标：“你臂章戴反了。”\n\n戴维森闻言看了看，叹了口气：“确实，谢谢你敏锐的观察力。”\n\n“这就是我为什么要来这儿，”罗伊斯又咬了一口三明治，“这地方吃的还真不错。”\n\n“是啊，挺有趣的，这儿的三明治比五角大楼的还好吃。不过，行吧，实际上我们可是在地球的腚眼子上，吃得好也算说得通。”戴维森瞥了一眼罗伊斯，“你适应得还行？”\n\n“我可不觉得自己能习惯南极的严寒，但宿舍已经够舒服了。虽然，我更希望他们能多说点儿有关咱实际工作的东西。”\n\n戴维森耸了耸肩，无奈地说道：“要是上级连和其他设计团队聊聊天儿都不允许，那这肯定是个大事儿啊。”\n\n“也行吧，只要这玩意儿的目标是纳粹或者小日本，我就开心。”"
 antarctica_aao_pert.40.a:0 "“好，”戴维森接过话头，“让我们来算算，在极端严寒之下，这家伙能不能经受住考验。”"
 antarctica_aao_pert.40.a.tt:0 "§F为§Q冰人导弹研发项目§!解锁更多选项§!。"
 antarctica_aao_pert.50.t:0 "惯性制导系统与IBM公司"
 antarctica_aao_pert.50.desc:0 "一句话概括一下，冰人项目的惯性导航系统就是噩梦。惯导系统的原理是将加速度计和陀螺仪组合起来，以此在导弹发射后引导其在上层大气中以弧形轨迹运动，并同时运用航迹推算法，保证其能准确击中目标附近。\n\n负责设计调整这一系统的计算机科学家米奇·库珀与自己的工作之间几乎被完全隔离开来。有人告诉他，导弹有个极地发射场，但他既不知道这发射场具体在哪儿，也不知道最近的目标是哪儿。因此，他必须设计一个可变系统，无论是在阿拉斯加还是在冰岛，它都必须能完美地运作，而且直到发射前最后一刻都能进行校准，打击新的目标。\n\n“这系统真的不会太重了吗？”库珀的助手海歇特不禁担心地问道。\n\n“我不在乎。”回应他的是库珀的怒斥，“说真的，我真不在乎。他们几乎没给任何工作依据，如果这坨玩意儿超过了载荷能力，那就是他们的问题。”\n\n“要是雷伯恩要求我们重新设计呢？”\n\n“那就告诉IBM的人，下次多告诉我们点信息。分导式多弹头大概能闭门造车、虚空设计，但我们这儿不行。”"
 antarctica_aao_pert.50.a:0 "“说得好，老板。”"
 antarctica_aao_pert.50.a.tt:0 "§F为§Q冰人导弹研发项目§!解锁更多选项§!。"
 antarctica_aao_pert.60.t:0 "发射日的蓝调"
 antarctica_aao_pert.60.desc:0 "雷伯恩中将藏在发射场东面的地堡里，手擎望远镜，观察着雾气缭绕的发射场地。导弹的燃料已经加注完毕，它只有最终版本的十分之一大小，推力远不足以达到卡尔曼线，但也足以将其加速至超音速。在设计任何火箭时，最重要的是了解其在达到最大动压时的性能表现。如果箭体设计存在缺陷，它就会像铁罐子一样被揉成一团。这样一枚微型火箭自然只需要微型的发射场，在距离麦克默多站几英里远的内陆，发射场已经准备就绪。\n\n雷伯恩曾见过许多次发射，但它永远都不会过时：漫长的等待、不断攀升的期望、发动机点火前令人窒息的最后一秒、火箭如同梦幻一般，飞向宛若异世的天空。在他生活的世界里，这令人难以置信的机械造物乃是强大的威慑，是用来遏制暴君的大规模杀伤性武器；他也希望自己能活得长些，见证火箭在和平时代探索未知的旅程。但现在，他必须尽己所能，创造出最强大的武器。\n\n“我们准备好发射了。”对讲机中传出了发射主任的声音。\n\n雷伯恩暗暗点了点头。倒计时归零，熊熊烈火照亮了南极的雪地。微型火箭爬上天空，飞出了人们的视线，发射在轰鸣中取得成功。现在，团队可以继续开发全尺寸导弹了。"
 antarctica_aao_pert.60.a:0 "“最大动压，飞行器已达到超音速。”"
 antarctica_aao_pert.60.a.tt:0 "所有活动的§G乐观完成时间§!、§B最可能完成时间§!、§R悲观完成时间§!均将§G减少§!§Y3§!天。"
 antarctica_aao_pert.70.t:0 "导弹的外科手术"
 antarctica_aao_pert.70.desc:0 "“嚯，看起来就像是在动外科手术一样。”雷伯恩中将对计算机科学家米奇·库珀如是说道。在玻璃窗另一侧的消毒隔间里，IBM技术人员正在将库珀开发的惯导系统安装到导弹上。弹体上的一个面板被打开，技术人员小心翼翼地将惯导系统嵌进其中，仿若器官移植的场面。\n\n“好比喻，”库珀接过话头，“尽管真正的手术是我必须改动惯导系统，以使其适应质量规格。然而十分不幸，IBM机器都不算轻。另外还有个有趣的事情，下一代导弹就不会面临这个问题了。”\n\n“这是什么说法？”雷伯恩问道。\n\n“啊，正如我们在过去二十年所见证的那样，计算机硬件会继续变得更加紧凑轻便，但运算能力也在增加。下一代惯导系统的尺寸只会有现在的一半，但算力还能高上一倍。”\n\n“真希望现在就能拥有这样的设备，它能让我们的工作容易得多。”"
 antarctica_aao_pert.70.a:0 "“就像引擎一样，”库珀回答道，“得先发明螺旋桨式的，然后才会有喷气式发动机。”"
 antarctica_aao_pert.80.t:0 "化零为整"
 antarctica_aao_pert.80.desc:0 "埃利斯·戴维森满头大汗，原因却并非仅仅是他面前的这枚导弹。历经无数个不眠之夜，他们终于能着手将运载核弹头的再入飞行器与运载火箭联接在一起了。当然，再入飞行器里面没有钚弹或者铀弹，但此时最微小的差错也可能会带来无法估量的灾难。\n\n再入飞行器团队和运载火箭团队将这两个组件又彼此靠近了一英寸，戴维森感觉到雷伯恩中将严厉的目光正注视着他的后颈。联接完成前的一瞬间，戴维森的脑海中拼凑出了一幅散乱的拼图。一开始时，他觉得在南极搞导弹研发项目真是荒唐透顶，但这个计划的好处也显而易见：将各个团队分开，将他们的活动范围限制在麦克默多站，泄密的机会就会大大减少，最大的风险和麻烦反而来自于将研发项目所需的材料运送到南极洲来的过程之中。戴维森猜测各个部件都是以居住地和建筑设备的名义运来的，从运输开始的那一刻起，保密工作就已经彻底完美无缺，所有与外部世界的联系都将受到严密监控。简而言之，美国军方在这个项目上没有抱任何侥幸心理。\n\n再入飞行器完美就位，与运载火箭连为一体。戴维森长舒一口气，回头看了看雷伯恩，中将向他点点头，竖起了大拇指。导弹研发达到了又一座里程碑，外人则依旧对此一无所知。"
 antarctica_aao_pert.80.a:0 "下一项任务。"
 antarctica_aao_pert.90.t:0 "亵渎"
 antarctica_aao_pert.90.desc:0 "在南极洲寻找条件适宜的试验导弹发射场并非易事。发射塔和推进剂装载系统都需要长长的管道，而在冰层上铺设维护这些管道可谓是难上加难。南极洲常年不结冰的地方寥寥可数，幸运的是，事务局领地内就有这样的地方。\n\n横贯南极山脉将大陆一分为二，像盾牌一般庇荫着麦克默多站的所有居民。山脉之间是干燥的谷地，既没有厚厚的冰层，也不会被他国特工监视，因此雷伯恩中将命令测绘队去寻找一处适合当作发射场的山谷。此时，首席测绘员戈登正在仔细观察身下的石漠，随后自顾自地点点头，背起背包，走进山谷，在白雪覆盖的页岩地上艰难跋涉。\n\n戈登终于走到了谷地，山脉的宏大雄伟展现在他的眼前，在晴朗的天空下分外醒目。他想着，这或许是人类第一次踏足此处。这片处女地几乎让他热泪盈眶，同时，他也意识到人类很快就会玷污这里，用大规模毁灭性武器破坏她的面貌。“地球、地球不会想念我们的。”他喃喃自语。\n\n可无论如何，国家给他开工资可不是让他来思考人生的。戈登拿出设备，示意队伍开始测绘工作。"
 antarctica_aao_pert.90.a:0 "“通知中将，我们找到了一处适合的备选地点。”"
 antarctica_aao_pert.90.a.tt:0 "§F为§Q冰人导弹研发项目§!解锁更多选项§!。"
 antarctica_aao_pert.100.t:0 "最后一块拼图"
 antarctica_aao_pert.100.desc:0 "电子系统与导弹其他部分的最后总装是一件相当严肃庄重的事情，只有米奇·库珀和少数几名技术人员在执行将惯导系统装载进导弹的任务。这是进行首次试射之前需要组装的最后一组系统。\n\nIBM确实干得不错，重新设计的惯性导航系统更小、更轻，但运算能力比之前的型号还要强。初步计算表明，试射失败的几率还不到3%，在导弹首次试验发射的历史上，这个数字称得上前无古人。自然，如此高的成功概率与运载火箭及其相关系统的成熟性关系匪浅，库珀不得不将之归功于他的团队和所有辛勤工作人们。毫不夸张地说，研发项目团队几乎创造出了一枚完美的极地导弹，只需静待它拔地而起。\n\n技术人员将最后的连接器插入到位，关上了面板，在场的每个人都不禁松了一口气。“给雷伯恩打电话，”库珀说道，“我们把这个宝贝送到山里去。”"
 antarctica_aao_pert.100.a:0 "倒计时开始……"
 antarctica_aao_pert.100.a.tt:0 "§F为§Q冰人导弹研发项目§!解锁更多选项§!。"
 antarctica_aao_pert.110.t:0 "不用理我啊，我就是个居住站"
 antarctica_aao_pert.110.desc:0 "里迪少将觉得这把戏毫无成功的可能。在南极洲设计导弹已经够疯狂的了，更不用说他还得把这颗导弹运到那该死的南极山脉中间那该死的发射台上，甚至必须要避开所有人的耳目。洲际弹道导弹可不是什么圣诞礼物，没法藏起来，外观形状就足以让它暴露无遗。不过，里迪从来都是个点子王。\n\n事实证明，麦克默多站某些直通式居住点模块的长宽足以隐藏住导弹的侧面。在拆除模块内部的隔间和环境系统后，框架就摇身一变，成了相当好的掩护。当然，导弹也必须去掉所有可以在发射场上重新安装的部件，但即便如此也不够，还必须在发动机组件上和居住点模块的两侧盖上篷布。乍一看，这次行动可能会被误认为是要在远离麦克默多站的某处建造一个前哨站点，但只要有半个脑子、两只眼睛和一分钟时间的分析，所有人都能推断出这个居住点浑身上下都散发着可疑的气息。\n\n为了避免意外，里迪在清晨五点左右就带领车队离开了麦克默多站，此时基地里大部分人都还沉浸在梦乡之中，执勤哨兵也最为疲惫，他们只看到了一团雪雾消失在远方。\n\n在沿着匆忙铺设的临时道路艰难地穿过山区后，导弹终于运抵干燥的山谷和藏身其中的发射场。"
 antarctica_aao_pert.110.a:0 "“把导弹竖到发射架上，”里迪少将下令，“做好发射准备。”"
 antarctica_aao_pert.120.t:0 "升空"
 antarctica_aao_pert.120.desc:0 "这一天终于到来了。历经数年辛劳、数不清的不眠之夜，这枚导弹终于笔直地立在发射平台上，直指云霄。过量的燃料和氧化剂自上半部逸散而出，整个导弹弹体笼罩在蒸汽之中，静静地矗立在横贯南极山脉的一处干燥山谷中等待发射。雷伯恩知道，这并不是旅程的终点，但他成功完成了导弹的研发，自己的荣誉簿上又添了值得自豪的一笔。当然，前提是这次试射一切顺利。\n\n在过去一个小时里，陆军工程师约翰·C·H·李上校和本内特·L·刘易斯少校一直与雷伯恩在嵌入邻近崖壁上的观察掩体中交谈，二人对雷伯恩的成就表示了祝贺。“在如此严格的规格和时间限制下做到这一切，”李说道，“了不起，真是让人大吃一惊——”\n\n“更不用说这次行动的秘密程度了。”刘易斯笑着插话。\n\n雷伯恩没有笑，他说道：“也许现在是时候让盟友们也知道了？”他没有等待回答，直接对身边的一名中士打了个手势，示意他将希拉里和比尔带进房间。二人显得有些困惑，但当他们走到观察窗前、看到那枚导弹时，都惊讶地张大了嘴，然后就围住了雷伯恩。\n\n“这是怎么回事儿，威廉？”比尔问道，似乎在怀疑自己即将听到的答案。\n\n雷伯恩很快向他们解释了他们能知道的一切，甚至比雷伯恩知道的内情还要少很多。“这枚导弹，”雷伯恩说道，“就是这里这枚，是过去几年里在麦克默多站设计的。”\n\n希拉里的脸涨得通红：“这是不可接受的，这是……这……你们就这么把我们都蒙在鼓里！”新西兰人口沫横飞，已经无法用言语形容自己的怒火，这愤怒既是由于被欺骗，也出于他所认为的对南极洲的滥用。\n\n“我不得不表示同意，”比尔说道，“这么做是公然无视OFN南极洲事务局的创始原则，也是对国际信用和个人信誉的严重损害。”\n\n“我身负命令，”雷伯恩重重叹了口气，垂下眼帘，“我没有选择。”突然，一阵轰鸣声打破了沉默。"
 antarctica_aao_pert.120.a:0 "南极大陆迎来了有史以来的第一次导弹发射，掩体中的所有目光都随之投向天际。"
 antarctica_aao_pert.120.a.tt:0 "§e美国§!对§QOFN南极洲事务局§!的控制力将提升§W16%§!。"
 antarctica_aao_pert.130.t:0 "保密继续"
 antarctica_aao_pert.130.desc:0 "麦克默多站核心区的一间会议室里，米奇·库珀第一次、也是最后一次见到了秘密导弹项目其他小组的负责人。“所有人，”雷伯恩在主位说道，“都完成了足以超越模范的工作。在地球上最恶劣的环境中研发导弹、各小组之间没有直接沟通、只有最模糊的项目指示，这是一项难以想象的任务，然而诸位迎难而上，超出了我和项目发起方的期望。”\n\n米奇的心中焕发出一阵光彩，他对自己非常满意，他觉得其他团队的负责人也是如此。其实私下里，米奇自己都不相信他们能取得最终的成功。\n\n“但不幸的是，我不能透露各位工作的目的，只能告诉各位，你们的努力是为了保护自由世界，免遭最终的黑暗降临。”雷伯恩深吸一口气，“我相信这个消息会让各位高兴的。项目结项后，你们将重新调派至美国本土，或以其他形式安置于OFN组织中，以促进科学技术的进步。说到这儿，请原谅我的冒昧，我特意安排了一点小惊喜。”随即，一名服务员推进来一辆小推车，上面装满了香槟和巧克力，赢来了科学家们的掌声与欢呼。\n\n雷伯恩笑着起开了第一瓶香槟。“就当这是对你们继续保持沉默的贿赂吧！”他半开玩笑地说道。\n\n房间里的每个人都和他一起笑了起来。所有人都明白，他们必须在余生之中对这次项目守口如瓶，否则等待他们的就是牢狱之灾乃至更糟糕的境遇。"
 antarctica_aao_pert.130.a:0 "再见，南极！"
 antarctica_aao_pert.200.t:0 "冰人项目"
 antarctica_aao_pert.200.desc:0 "有人敲了敲雷伯恩办公室的敞开的门：“中将？”\n\n雷伯恩抬起头来：“啊，米奇，快进来吧，请坐。要不要给你倒杯咖啡？”\n\n米奇·库珀是冰人导弹项目的电子和惯性导航系统的负责人。他走进中将的办公室，略显不安地坐在雷伯恩对面：“好，来一杯吧，谢谢您。”\n\n雷伯恩一边倒着咖啡，一边问这位工程师遇到了什么困扰。\n\n“呃啊，”米奇叹了口气，“长官，我知道不应该问太多，但现在团队对这个项目的性质疑虑重重，我要应付不住了。他们开始怀疑无法在当下的信息真空之中研发出可用的发射载具，其实我也有同样的疑虑。至少至少，如果我们能知道这型导弹的用途，还有谁将操作它，就能有助于简化设计过程。正如您所知，导弹是一门精准的科学。”\n\n雷伯恩递给米奇一杯热腾腾的咖啡，沉思着坐下来。“你必须要明白，项目性质要求绝对保密，很多事情连我都不知道，但我可以告诉你，”雷伯恩舔了舔嘴唇，小心翼翼地构思着自己的话语，“‘冰人项目’这个代号只是个幌子，暗指导弹在麦克默多站研发。至于它将部署在哪里，我不知道，但我猜你或许已经猜到了，它会在极地发射——这可不是我告诉你的。我还能告诉你，陆军工程兵团密切参与了该项目，但除此之外，具体细节都是是高度机密。我希望您、团队领导和成员都能理解。”"
 antarctica_aao_pert.200.a:0 "“我觉得这总比一无所知强，长官，”米奇说道，“谢谢您。”"
 antarctica_aao_pert.210.t:0 "绝密"
 antarctica_aao_pert.210.desc:0 "发自：约翰·C·H·李上校\n\n致：威廉·雷伯恩海军中将\n\n标题：£censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon 研发分析及时间线\n\n特此指示，由您在麦克默多站总揽洲际弹道导弹研发事宜，项目代号£censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon 。经过特别选拔和审查的科学家小组将会派驻至麦克默多站，以帮助研发。各小组将在互相隔离、信息封锁的情况下展开工作。各组负责人之间的接触将控制至最低限度。该项目将在极度保密的情况下进行。\n\n导弹必须能够适应在£censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon 环境条件中的发射，且可以在£censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon 条件中长期储存并维护（超过一年）。导弹的尺寸、技术性能的规格要求见前份文件第10页起。\n\n该项目选定于麦克默多站开发的原因是其封闭性质的信息回路，以及您身在此处。我们不能将您调出基地，以免引起敌国注意并对£censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon 项目展开调查。此事事关国家安全，OFN最优秀、最杰出的人才将会汇集在您的麾下，我们对您完成这项任务的能力充满信心。"
