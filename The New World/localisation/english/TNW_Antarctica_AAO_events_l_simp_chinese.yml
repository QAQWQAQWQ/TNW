 antarctica_aao_leaders.151.b:0 "“希拉里说得对。打出白旗，不带武器，把那些叛逃者带回来。纳粹没那开火的胆子。”"
 antarctica_aao_leaders.151.b.tt:0 "我们将获得§G5宣称点数§!£Antarctica_texticon_LEG ，对§r新施瓦本§!的§B情报掌握度§!将提高§B6§!£Antarctica_texticon_INTVAL .\n我们将失去§R5军事点数§!£Antarctica_texticon_MIL .\n§M新西兰§!对§Q事务局§!的控制力将提升§W4%§!。"
 antarctica_aao_leaders.151.c:0 "“我知道这么做很讨人厌，但一步错，步步错，没准哪天核弹落。把他们留在那自生自灭吧。”"
