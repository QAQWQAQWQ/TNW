l_simp_chinese:
 antarctica_aao_flavor.1.t: "喝彩"
 antarctica_aao_flavor.1.desc: "雷伯恩的思绪在睡梦中搅成了一团。当时是1950年，那时他只是个船长，负责指挥美国海军贝罗科号，与大西洋舰队的其他舰只一起在海上巡逻。那是一个一切都很简单的时代，没有项目需要管理，没有无尽的冰原需要看守，也没有间谍需要担心。他只要履行好自己身上肩负的对国家的责任就可以。美国终于逐步摆脱了耻辱的失败，一步一步地重新站立起来。他为自己参与了这一过程而自豪。\n\n时间到了1954年。当时他成了一名海军少将，正努力顺着军事指挥层级一步一步地往上爬。他发现自己身处“贝罗科”号的舰桥之中，而她行驶在距离锡格尼岛40英里的海面上。今天，美国军队将把他们最近才从阿根廷那里买下的一个岛屿炸上天。流程一如既往，据说这次爆炸的威力相当于将六百万吨TNT炸药引爆。他甚至无法想象那会是什么样子。六百万吨，多么惊人的数字。正如来自洛斯阿拉莫斯的一个人在后来向他解释的那样，这次爆炸的威力“比预测的还要大”。炸弹的威力并不是六百万吨级，而是一千五百万吨级。当第二个太阳照亮南奥克尼群岛的天空时，他差点被这股光芒晃得永久失明。这样的景象非常令人印象深刻，至于那十六个遭受了贝塔级辐射烧伤的倒霉蛋，几乎没人还记得他们。医护人员试图把他们身上的辐射粒子清洗掉，却只让他们的情况变得更糟。\n\n在雷伯恩身边响起的警报声让他从回忆中惊醒。现在已经是[GetYear]年的第一天，早上五点了。"
 antarctica_aao_flavor.1.a: "还有荒芜的冰原等待着他去守望。"
 antarctica_aao_alert_event.10.t: "物资缺乏，人力不足，却从未落败"
 antarctica_aao_alert_event.10.desc: "一座美国堡垒绝望地矗立在南极的冰原上。在毫无预警的情况下，日军步兵顶着暴雪与寒风向堡垒发动了攻击，将机枪的火舌与迫击炮的炮弹倾泻到这座堡垒上。面对如此压倒性的火力优势，美国人根本不敢还击。日军指挥官推断，他们丝毫不敢再踏出堡垒半步了。随着枪声逐渐沉寂，日军士兵们开始在这座小型堡垒的金属舱门前集结。破门炸药很快便部署完毕。\n\n“听我口令！”军官在凛冽的寒风中大喊道，“门一开，你们就往里面扔手雷！”\n\n士兵们纷纷掏出了手榴弹，等候着长官的命令，肾上腺素在他们身上的每一条血管里喷涌。钢制舱门的铰链脱落了，寒风的呼啸几乎无法掩盖金属摩擦发出的嘎吱噪音。紧接着，堡垒里又传来了一阵手榴弹的爆炸声。\n\n“上！”\n\n命令一下达，日军士兵们就疯狂地冲进了堡垒，却发现美国人早已人去楼空，只在原地留下了一枚大号汽油弹。\n\n一名美国士兵举着他步枪上的瞄准镜，静静地看着堡垒陷入火海。几名日军步兵浑身是火，手舞足蹈着跑到了外面，然后痛苦地倒在雪地上。幸免于难的日本人正在惊恐中撤退，有那么一瞬间，他想对着他们开上两枪，但想想又算了。就剩七发子弹了，还是别浪费的好。\n\n“这招挺好使，”得克萨斯人对着无线电说道，“小日本被打跑了。但是，我得说，要是他们再回来，我们就玩完了，除非上面能给我们派点增援。”无线电里有一个声音回应了他："
 antarctica_aao_alert_event.10.a: "“那我就有好消息告诉你了，雷伯恩部署了后备兵！”"
 antarctica_aao_alert_event.11.t:0 "熔毁"
 antarctica_aao_alert_event.11.desc:0 "“什么叫‘被征用了’？你听不懂人话吗，反应堆坏了，必须马上修好！我不是都把这零件紧急报修了吗！”瓦尔曼开口大骂道。“那你让我怎么办，我都跟你解释过了，”军需官回答道，“日本佬和德国佬最近一直在惹是生非，我们能用的东西都被塞到前线去巩固防线用了，你说什么也没用，唯一的解决办法就是再等上两周，然后祈祷下一艘补给船能把你要的零件给你送过来。”\n\n\n“他妈的……”瓦尔曼叹了口气，这是他最不情愿看到的局面。他拉响了反应堆室的警铃，在电铃低鸣的同时指着门外喊道：“所有人马上开始撤离！”之后，杰里米快步跑到了他身边，“发生什么事了？”“又发生了一起漏水事故，我们失去了对三到六号反应棒的控制，而且由于配件损坏，我们根本无法对其进行紧急关停。妈的，这事的报告估计能把我写死。”\n\n\n“请再重复一遍，你要我干什么？”雷伯恩问道，“立即疏散罗斯岛上的一切人员，包括麦克默多站的工作人员。反应堆的辐射等级正在升高，而就我们目前拥有的设备无法对其进行安全检修。”瓦尔曼回答道，“疏散是现在的最佳选择，难道您想让基地里的所有工作人员都在十年后患上癌症吗？”\n\n\n雷伯恩站在海岸警卫队的北风号巡逻快艇甲板上，目眺远方最后一艘撤离罗斯岛的舰船，“给我把化学小组的负责人叫过来，生化核防御小组明明昨天就应该上岛去处理了，这群混蛋就不能尽责一回吗？！”然后，一位站在甲板上的少尉转过身来，回答道：“报告长官，我们的电台坏了。”"
 antarctica_aao_alert_event.11.a:0 "“他妈的。”"
 antarctica_aao_alert_event.12.t:0 "一分为二"
 antarctica_aao_alert_event.12.desc:0 "在撤离罗斯岛的过程中，无论是字面意义还是比喻意义上的辐射，对OFN南极洲事务局来说都是一场灾难。麦克默多站的事故沉重打击了OFN南极洲事务局的运作能力，更不用提在本土引发了多少麻烦了。雷伯恩和里迪正在杜菲克站收拾烂摊子，弗莱格也差不多，只不过是在美国本土。比尔被困在莫森站，希拉里还在新西兰的家中，自从事故发生后，里普那边还未给他下达任何指令。\n\n由于通讯的延误与中断，指挥与协调南极大陆上的各支OFN部队变得越来越困难，获得的信息也越来越滞后，德国人和日本人对边境的袭扰更是变得越来越频繁。没过多久，OFN南极洲事务局就发现自己正被两面包夹，每天都有数座边境哨所被敌人攻克。无需多日，德国人和日本人就能在OFN南极领地的中央握手会师，把OFN的领土瓜分殆尽。文件已被尽数烧毁，撤离行动也已安排妥当，没过多久，雷伯恩中将正式向外界宣布，为了避免毫无意义的流血，OFN将正式放弃南极领地。"
 antarctica_aao_alert_event.12.a:0 "自由世界的火炬熄灭于冰原。"
 antarctica_aao_alert_event.20.t:0 "选民的愤怒"
 antarctica_aao_alert_event.20.desc:0 "在华盛顿的大街上，游行队伍喧闹地抗议着。警察徒劳地呼喊，试图引导人群的方向，人们则愤怒地呐喊着一句又一句抗议口号：“让美国人离开南极！”“停止美国霸权主义扩张！”一般来说，这样的抗议人群中净是些身着扎染衬衫、胡子拉碴的嬉皮士。但这次却完全不同，游行队伍中没有一丝大麻的味道，也没有那些百无聊赖的学生的身影，反而是充满了平民百姓。这些平民百姓的情绪极大程度地影响着其他国民，他们的意见对那些政客而言乃是重中之重。\n\n在堪培拉与惠灵顿也发生了类似的事件，群众们要求美国废除南极洲事务局，建立澳大利亚与新西兰的独立南极领地的声音也开始逐渐在议会厅中出现。\n\n德国方面则趁虚而入，不仅“不小心地”在OFN属南极领地的领海范围内进行了大量的武器测试，还特地为此向澳大利亚人、新西兰人甚至法国人道了歉，以达火上浇油的目的。"
 antarctica_aao_alert_event.20.a:0 "这种事绝不能再次发生，不能让它们影响我们任务的成败。"
 antarctica_aao_alert_event.21.t:0 "连结"
 antarctica_aao_alert_event.21.desc:0 "“霍华德！”雷伯恩和里迪坐在海军中将的办公室里，听见希拉里在门外歇斯底里地喊道，“冷静点！”这时，雷伯恩办公室的门砰的一声被打开了。\n\n比尔怒气冲冲地走进了房间。“威廉，詹姆斯，我不用向你们解释情况有多糟糕了吧？恐惧正像瘟疫一样蔓延，这里的澳大利亚人和新西兰人要么丢掉了工作，要么就是在丢掉工作的路上。大家都快魔怔了，一镑只能买到五分钱的东西，军需官甚至往柜台底下放了把枪，士兵们全在大马路上发了疯似的跑来跑去。压根儿没有人知道怎么办，也没有人知道这啥时候是个头。给我们的食物压根没法下咽，就连口中的空气都能要我们的命。收音机里的美国广播员则告诉我们，今天我们这发生了15起凶杀案和63起暴力犯罪，好像就他妈应该这样似的！疯了，都他妈疯了，比他妈疯了还疯！所以我们都不敢出门了，只敢躲在办公室里，在这个小小的空间里过活，你知道我们想的是什么吗？‘求你了，让我们回家吧！我们想念家里的热水壶、家里的电视和家里的鹅绒大衣！放过我们吧，求你了！’所以你就这么傻得呵的站在那吗？我不想让你生气，也不想让你暴躁，我想让你发疯！像他妈的所有人一样疯！你也不必向国会议员告状了，我他妈根本不知道要让你写些什么，我不知道！我不知道怎么对待美国佬！也不知道怎么管好这片领地！更不知道怎么对付德国人和街上横行霸道的士兵！我只知道，你必须发火，赶紧发火！快啊！快说，‘我是个人，我的生命是无价的，操他妈的！’所以，我现在想让你们起来，从椅子上赶紧起来，走到窗户跟前，打开它，把脑袋伸到外头，往死了喊："
 antarctica_aao_alert_event.21.a:0 "“老子实在是气得不行，老子再也受不了了！”"
 antarctica_aao_alert_event.30.t:0 "消失的补给"
 antarctica_aao_alert_event.30.desc:0 "“但这儿写着，你有21包。”贝克曼指着写字板，说道。\n\n“我不知道该怎么说，但我这儿真的只有3包。”店长回答道。\n\n“我能看一眼吗？”\n\n店长耸了耸肩，把手中的写字板递给贝克曼，说道：“中士，你这是在浪费自己的时间，别费事了，走吧。”\n\n贝克曼在巨大的仓库里穿梭，他注意到，其他物资也有着类似的情况：药品、急救包、帐篷、降落伞、水壶、打火机、助燃剂、口粮——所有东西都比清单上记录的供应量少得多。在其他储藏室，情况也大体类似。\n\n罗伯逊一如既往地摆着一张扑克脸。\n\n“我建议展开背景调查，”贝克曼继续说道，“针对每个人的……”\n\n“没有必要，中士。”罗伯逊打断了对方的话语，把一个厚厚的信封递给了贝克曼，“你需要的所有东西都从应急物资里出，里面是你需要的授权命令。”贝克曼略带犹豫地看了一眼信封，换来了罗伯逊的一句臭骂：“你他娘的，等啥呢？”话音刚落，贝克曼就忙不迭地蹿出了办公室。\n\n“那些物资是为了紧急情况准备的啊，里普。”雷伯恩瞪着双眼说道。\n\n罗伯逊只是耸了耸肩：“物资嘛，如果我们不用，那就只是堆在那里，永远派不上用场。另外……”"
 antarctica_aao_alert_event.30.a:0 "“补给物资正在消失，听起来算是紧急事态了。”"
 antarctica_aao_alert_event.31.t:0 "熔毁"
