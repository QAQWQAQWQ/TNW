 antarctica_aao_pert.220.t:0 "误导"
 antarctica_aao_pert.220.desc:0 "“好，”雷伯恩中将说道，“这次会议还有什么事吗？”\n\n事务局的另外两位领导人隔着会议桌谨慎地交换了一下眼神。希拉里向前倾了倾身子，开口说道：“实际上，确实，我们对运抵基地的物资有点担忧。陆军工程兵团告诉我们，这批物资与美方位于南极内陆的前哨站扩张有关，但据我方人员的独立观察，却没有记录到类似的情况。”\n\n“我的部下也没有。”比尔随之补充道。\n\n“你们一直在命令手下监视我们的行动？”雷伯恩反问道。\n\n“难道这不是OFN的行动吗？”希拉里回应道，“我以为OFN南极洲事务局的目标是相互合作、透明公开。”\n\n“当然没错，”雷伯恩说，“我只是建议，你的人要是能用这些时间去应付德国可能的崩溃还有它对这里的影响，应该会更有价值，而不是去窥探我的部下在做些什么。”雷伯恩意识到，两位同僚对他的回应并不满意，于是又补充道：“我向二位保证，这些物资都用得其所，加固了边境防御工事。在可能对新施瓦本采取行动时，我们得预先准备好出发的跳板。”\n\n事务局另外两位领导人看起来依然相当警惕，但最终还是接受了同事兼局长的保证。"
 antarctica_aao_pert.220.a:0 "另外两人离开房间时，雷伯恩重重地咬了一下嘴唇。"
 antarctica_aao_pert.220.a.tt:0 "§e美国§!对§QOFN南极洲事务局§!的控制力将提升§W4%§!。"
 antarctica_aao_pert.230.t:0 "半真半假"
 antarctica_aao_pert.230.desc:0 "麦克默多站外，一阵寒风掠过荒野，纷纷扬扬的雪花蒙上雷伯恩中将的面庞。本内特·L·刘易斯少校站在中将身边，两人都身着着明亮的橙色加拿大鹅派克大衣。“你这次带了不少朋友来啊，”雷伯恩挑起了话头，“国防部、高级研究计划署、还有那么多工程兵团的小伙子。直说吧，本内特，究竟发生什么事了？”\n\n“只是对冰人项目进展的例行检查而已。”\n\n“如果真的是这样，我还是会对你打断我们的研发进程很不满。我不明白，为什么不能在例行公报中处理这些问题。”\n\n“也许，我们只是想欣赏一下美丽的风景呢。”刘易斯笑着说。\n\n雷伯恩没有笑：“刘易斯，我不是白痴。那些人正在进行测绘，除非有什么非做不可的理由，不然你的团队可不会就这么白跑一趟。你那边是遇到了什么问题？”\n\n“不，不，当然没有。就算有，我也不能告诉你，你就当这是某种预案吧。在你的团队看来，我们只是在新施瓦本遭受德国混乱局势的影响时，推演各种可能性罢了。”"
 antarctica_aao_pert.230.a:0 "真相愈发云山雾罩。"
 antarctica_aao_pert.240.t:0 "一生二"
 antarctica_aao_pert.240.desc:0 "雷伯恩穿行在麦克默多站如同迷宫般的走廊里，路上遇到的士兵们纷纷侧身，向经过的中将敬礼。雷伯恩的一名副官告诉他，安全通讯室收到了一份报告，仅限中将本人亲自查阅。通讯室的电报线路直通五角大楼，从那里与全世界连为一体。虽然雷伯恩还没看到那份报告，但他已经开始怀疑其中的内容了：在相当长一段时间内没有收到任何消息后，他曾于近期要求更新冰虫项目的状态进展，并询问是否需要修改冰人导弹项目的规格。\n\n他悄悄穿过无线电室，走进密室，锁上了身后的房门，一页报告静静地等待着中将的到来。他猜对了，陆军工程兵团发来了一份最新的资料：“……导弹规格维持不变，除了……惯性制导系统需要在纬度坐标方面更加灵活……强化快速拆装……”雷伯恩扫视着报告，寻找他对冰虫项目进展疑问的答案，随后，他看到一句透着古怪的句子：“冰虫一号进展迅速，但遇到了预期之外的困难，可行性预测仍然是积极的，但国防部要求为项目准备冗余计划。冰虫二号已获批准，可以继续展开初步调查。”\n\n雷伯恩从未听取过任何有关冰虫二号的简报，这要么是他疏忽了手头的情报，要么就是该项目已经完全进入新阶段。雷伯恩是军中老人了，他知道，报告中提及的冰虫一号的进展绝对半真半假。如果没有理由，陆军是绝不会在离项目的这么远的地方来搞什么冗余计划的。"
 antarctica_aao_pert.240.a:0 "要是他能知道冰虫二号是什么就好了。"
 antarctica_aao_pert.240.a.tt:0 "一份新文档已在§Q冰人导弹研发项目§!GUI中可用。"
 antarctica_aao_pert.250.t:0 "一团糟"
 antarctica_aao_pert.250.desc:0 "导弹弹体设计团队的负责人凯利·希思眼睁睁看着一群黑衣人洗劫了他的办公桌。这下研究进度又往回掉了，他脑海里嘀咕着。\n\n这一切的发生好似只是瞬息。问题最开始出于雷伯恩的一份关于全新尺寸运载火箭的简报上，海军中将，或是他更顶上的那些头儿们，忘记编辑备忘录里的一句关键信息：“运载火箭之尺寸须与格陵兰岛当前部署之发射井与隧道尺寸匹配。”\n\n于此，流言蜚语遍布整个团队，且不知怎的也传到了安插在麦克默多站的MACA-SOG间谍耳中。尽管这根本就不是他的错，希思还是敏锐地觉察到他有可能因此被人取代。他让他的组员们积极配合并保持肃静，但已经有好几名设计员在中情局官员的命令下像罪犯般靠墙站着，其他人则被隔绝起来审问。这场危机过后，谁的工作能保住还有待观察，但希思现在很清楚，并不只有他的团队在冒这个险。在这场如此隐秘的行动中，这样的疏忽可太致命了，而中情局和它的顶头上司可没有对此掉以轻心。\n\n希思还是希望组员们能重返岗位工作，但也仅仅只是希望罢了。"
 antarctica_aao_pert.250.a:0 "另一个抽屉的东西也都被翻出来了，真是一团糟啊。"
 antarctica_aao_pert.260.t:0 "谋事在人，成事在天"
 antarctica_aao_pert.260.desc:0 "约翰·C·H·李上校长长地吸了一口手中的香烟，从鼻子里吹出两道烟圈，开口问道：“本内特，你应该挺熟悉埃德温·兰西尔画的那幅《谋事在人，成事在天》吧？”\n\n“算不上特别熟悉。”本内特·刘易斯少校如是回答。\n\n“这幅画描绘的事情就发生在我们现在的这个纬度，一个多世纪以前，约翰·富兰克林的探险。”\n\n“啊，”本内特点了点头，“长官，您是说我们彼此之间境地类似？”\n\n“是啊，日复一日，越来越像了。也许我们太狂妄了，自认为能比前人做得更好，但无论是在西北航道还是在格陵兰岛，北极都是地狱般的对手。”李拿起另一份文件，“如你所知，冰虫项目正在迅速变成一场彻头彻尾的灾难。冰架的移动速度太快了，为了对德先制打击而修建的隧道和发射井已经坍塌。冰层和黑暗让我们失去了优秀的好小伙子，粉碎了价值数百万美元的设备。有目共睹，陆军在核三位一体中占得一席之地的努力已经失败了。”\n\n“在长官看来或许是这样，但我觉得项目没有彻底失败。在麦克默多站，雷伯恩海军中将的冰人导弹研发项目取得了相当的成功，也许现在是时候启动冗余计划了。”\n\n“冰虫二号？”李停顿了一下，“这需要彻底缩小项目范围，重新调整发射井，威慑体系的意图和打击目标也不得不重新全盘定位。”\n\n“但长官，即便如此，这仍然意味着美国陆军将在核防卫体系中找到其定位。即使冰虫二号会带来诸多困难，但也比彻底放弃好得多。”\n\n李上校又思考了好一会儿，然后点了点头。"
 antarctica_aao_pert.260.a:0 "如果不能先制打击，那我们就要成为最后的反击者。"
 antarctica_aao_pert.270.t:0 "冰虫二号"
 antarctica_aao_pert.270.desc:0 "雷伯恩中将和约翰·C·H·李上校并肩漫步在麦克默多站外的山丘上，在南极，这是获得私密空间最简单的方法。岩石荒芜，峭壁冰凉，雪花懒洋洋地飘洒而下，略显阴森的光线笼罩着大地。在一块能够俯瞰麦克默多站的岩石上，二人驻足停了下来。“我从来不知道，居然还有地方会如此恶毒地抵挡人类定居，”李说道，“和南极比起来，格陵兰就是天堂啊。”\n\n“我觉得这完全取决于你对天堂的定义，”雷伯恩回应道，“有人说，没有人类涉足的地方就是天堂。我已经习惯了这个地方，严酷的美、一成不变……这里的世界更简单。”\n\n“它会在未来变得更加复杂。正如你所猜测，冰虫一号失败了。我们试图在格陵兰岛建立核阵地，从那里对纳粹发动先制打击，但冰盖移动得太快了，隧道已经开始大量坍塌。项目失败让陆军相当尴尬，实际上，冰虫项目唯一取得成功的地方就是由你领导的冰人导弹研发。”\n\n“陆军打算撤消这个项目？”雷伯恩问道。\n\n“恰恰相反，陆军依然致力于在核三位一体中占据一席之地。他们已经决定启动冗余计划，这就是我今天亲自来找你的原因。我之前指示工程师对麦克默多站周边展开测绘就是冗余计划的一部分……我们对冰虫的备份是……”\n\n“冰虫二号，”雷伯恩打断了他的话语，“你们要在这儿尝试与格陵兰岛失败项目一模一样的东西？”中将指着麦克默多站，“这个基地不适合当作对敌先制打击的发射场，你们这些家伙选错半球了。”\n\n“陆军已经重新评估了冰虫项目的战略目标。靠近麦克默多站的冰盖没有格陵兰冰盖移动得那么快，隧道和发射井在这里是可行的。项目的范围和目标也正在缩减，初期只会建立一座部署10枚导弹的小型核武库，由死者开关控制，充当针对共荣圈和德国印度洋势力范围的最后打击武器。不管有没有你，这个项目都会动工，但我在这里请求你领导它，完成你开始的工作。”"
 antarctica_aao_pert.270.a:0 "“其他人不会高兴的……”"
 antarctica_aao_pert.270.a.tt:0 "一份新文档已在§Q冰人导弹研发项目§!GUI中可用。"
 antarctica_aao_pert.280.t:0 "逆风"
 antarctica_aao_pert.280.desc:0 "又一架LC-130大力神运输机降落在麦克默多站附近的威廉姆斯野战机场，在积雪覆盖的跑道上滑行。几乎每天都有源源不断的飞机飞来OFN南极洲事务局，塔伊卡就喜欢在休息时看飞机一架架地到来，他曾经见到过各种各样有趣的飞机在麦克默多站降落，但他以前从未见过如此庞大的机队。这次抵达的物资和人员规模告诉他，有什么事情要发生了，而且是大事情。\n\n机上下来的人员都是美国陆军，这相当奇怪，因为新调派来南极的人员通常都是来自各个军种的美军和英联邦国家士兵。塔伊卡并不是唯一注意到这种不正常人，他的新西兰、澳大利亚、乃至加拿大同僚们似乎都因麦克默多站和全事务局居民结构的快速变化而感到不安，他们开始感到……寡不敌众。\n\n领导层没有说这些人来这里是要做什么，甚至塔伊卡的美国朋友也表示完全不知情。该死的，似乎麦克默多站、整个南极洲事务局，都变得更加神秘了。塔伊卡感到深深的遗憾，美国人似乎不再信任盟友了，那他们要怎样才能为了共同的事业努力，对抗纳粹混蛋还有该死的日本人呢？"
 antarctica_aao_pert.280.a:0 "一阵逆风拂过跑道，又一架大力神的起落架触碰到了南极洲的大地。"
