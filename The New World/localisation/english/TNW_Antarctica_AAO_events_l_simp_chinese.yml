 antarctica_aao_cia.200.t:0 "针头，而非枪管"
 antarctica_aao_cia.200.desc:0 "在看到许多人正排队接种疫苗时，哈莉特·米勒笑了。\n\n“不用担心，这不伤人的，”她对一个小孩用马达加斯加语说道。她知道，其实说德语倒更方便些，不过跟当地人说当地话能够让她更有亲和力，也能让他们和纳粹区别开来。\n\n在为中情局工作前，她曾是在海军服役的医疗兵。不过当间谍可要比在海军赚的多，待遇也更好。自她记事起，她就一直听着那些先辈们在上一次大战中的故事，而如今的她也以自己的方式追寻着他们的脚步。\n\n她对里普有些担忧，她对他知之甚少，但她抱怨不了这件事。他们在马达加斯加的工作完成的很出色。出乎大多数人意料的是，马达加斯加的蚊子们比起其他动物而言，“捕猎”了最多的人类。这是因为它们所携带的那些致命疾病而造成的，但对于住在这里的人们而言，这是一个常识。\n\n作为一名间谍，她的伪装下有一个窃听器与录音机。她装作一位经验丰富的医生，不断在自己的板子上记录着东西。当然，那些实打实的医疗援助可不是伪装的一部分。\n\n孩子有些害怕针头，而她也轻声抚慰着：“没有关系的，只是疼一下就没事了……要勇敢起来哦，打完针有棒棒糖吃的哦？”孩子点了点头，她把针头插进了他的手臂。\n\n她仔细观察和聆听了任何关于敌人部队动向的信息，但收效甚微，在很长一段时间内，她都没有收到任何有用的信息，也许整个行动没有取得任何成果。\n\n不过，当她把棒棒糖递给孩子时，看到孩子跑到他感激的父母怀里……至少还是有收获的，她想。"
 antarctica_aao_cia.200.a:0 "有些行动比其他的要更隐秘些。"
 antarctica_aao_cia.300.t:0 "终局！"
 antarctica_aao_cia.300.desc:0 "故事似乎要结束了，马塞尔·比格德将军心满意足。他和他的部下们一路上吃喝庆贺，几近疯狂，显然，将军和他的部下们都得到了想要的一切。\n\n事实证明，罗伯逊言出必行。他为比格德安排了一项与自由法国军队实力相称的任务。\n\n多亏了中情局那个“了不起的混蛋”，比格德的雇佣兵们一直献身于解放事业，为自由与美国夺取着土地，顺便敲碎了不少德国佬的脑壳，也大体上证明了，尽管德国佬占据着法国本土，但他们跟以前一样因累累暴行处于下风，而劣势又让他们更加暴戾无常。\n\n比格德又开了一瓶威士忌，为他的部下们满上，开始展望未来岁月。有朝一日法兰西必将重获自由，而他所付出的一切，将让那一天更近一步。\n\n《马赛曲》的旋律开始在他脑中回响。"
 antarctica_aao_cia.300.a:0 "我开心地哼起了歌。"
 antarctica_aao_cia.310.t:0 "终局……"
 antarctica_aao_cia.310.desc:0 "故事似乎要结束了。局势越来越糟，马塞尔·比格德将军的心头也被乌云笼罩。他抓紧时间，把剩余的部下全都送上离开马达加斯加的最后一艘船。众人的行动如往日一般干脆利落，但谁都能感觉到今天的氛围多了几分沉重与凄凉。\n\n当罗伯逊提出这个任务的时候，比格德并不确定该如何对待。他当然相信自己的团队能够胜任，成功的把握也相当之大。可不知为何，一缕担忧总在脑中挥之不去。但是，为了罗伯逊开出的价码，也为了曾经自由的法兰西，比格德将心头的不安压了下去，接受了任务。\n\n现在想想，当初那个固执的声音是对的。\n\n德国杂碎在每个关键节点都胜过了他们。自由战士不断损失，而OFN的部队却一直无法做出回应。补给线崩溃，前线被突破，所有的事情都是一团糟。比格德心中甚至有了一个可笑的想法，纳粹说的什么他们比世界其他民族高等可能不是屁话。\n\n他关上舱门，找了个地方一屁股坐下，任由贝雷帽遮住他的脸。自由与其渐行渐远，很多熟悉的面孔却也随之消失不见。"
 antarctica_aao_cia.310.a:0 "我心中的忧郁源于我无法忘记的恐惧。"
 antarctica_aao_cia.400.t:0 "突破界限"
 antarctica_aao_cia.400.desc:0 "中情局已经收到了有关于菲律宾局势的消息。尽管那里一直不太稳定，但群岛或将陷入一场公开战争当中。在日本的心脏地带扎个钉子的机会可谓是千载难逢，不能放过。里普抓住了这个机会，他策划了一场被称为“外国爱国者”的行动，其将包括在日本防线后方散布虚假袭击情报，破坏贸易，资助共产党恐袭等一系列方案。\n\n破坏合作政府稳定的计划有条不紊地记录着，但林奇仍旧有一个问题要问他的上级，“菲律宾不在我们的行动范围内吧？”\n\n里普只用三句话就回答了他的问题，他将手指向地图上群岛所在的位置，“格雷斯顿，我们的行动范围是印度洋，菲律宾群岛可以说是在大洋最东边。还有，我们在马来亚的任务也没人提出什么异议，对吧？马来亚到菲律宾可就跳个岛的事。”\n\n林奇不为所动，不知道他是否认可里普的这一番说辞。他伸手去拿被埋在一堆纸板文件夹下的草图。“那么，轰炸八打雁港的事呢？负责这事的人们可靠么？”\n\n“这是‘外国爱国者’行动至关重要的一部分，我可不会让赤匪干这种活。我们的一支小队会在驻菲美军进攻前渗透那里，现在我们得搞到日本军服，越多越好。这样才能让小伙子们放心偷渡到那里去。”"
 antarctica_aao_cia.400.a:0 "我猜我们能从日属南极那里偷点过来……"
 antarctica_aao_cia.410.t:0 "在路上"
 antarctica_aao_cia.410.desc:0 "又过了一天，里普·罗伯逊与格雷斯顿·林奇再次乘上了那架毫无特征的飞机，飞机起飞，其目的地并非是南极大陆，而是远离南极的菲律宾。二人的任务是将他们自己送去那里，而以里普的权限出现在菲律宾十分可疑。\n\n有两种方式让菲律宾重回美国控制，里普思考着。其一，动用在菲律宾的美军残部，对他们夺取菲律宾南部控制权的行动予以增援。\n\n另外一种方式是渗透愈发虚弱，且挣扎在治理各种变数而半死不活的“新比岛建设奉仕团”。\n\n罗宾逊与MACA-SOG认为两种方式都值得一试，毕竟他们的任务就是如此。\n\n飞机缓缓降落，两名中情局人员都拿出了自己的小酒壶，牛饮一番。无比困难的任务正摆在他们前面，但二人早已知晓达成目标的方式。\n\n无非二选一罢了。"
 antarctica_aao_cia.410.a:0 "敬自由的菲律宾。"
 antarctica_aao_cia.420.t:0 "共党总比日傀好"
 antarctica_aao_cia.420.desc:0 "在摩根眼里，将他分配到麦克默多站工作是一种惩罚，但他的中情局同僚们则毫不关心他对米切尔·威贝尔的同情心，他的上司更热衷于让他参与那些计划局绝不会批准的任务。但他倒不太关心这个。“我们在打一场仗，我们得打赢这场仗。”里普说。而摩根无比同意，去他的官僚！\n\n而他现在就在这里，准备搭上一架小型直升机，飞往全菲律宾革命社会主义共和国的秘密基地，这是中情局绝不会允许的一次会议。与共党联盟有违中情局官方制定的对外政策，因为他们恐惧这样一种意识形态会很快席卷全球。某种程度上而言，他们没错，摩根想，但大战当头，敌人的敌人就是朋友，里普也认为最好留意一下共党，也顺带着支援一下他们在日本后方进行的游击破坏活动，这也是他们目前正在做的事。\n\n他们从里普在澳大利亚保有的一个简易机场起飞，飞行时间并不太长。尽管他的直升机航程太短，不能让他返回澳大利亚，但这不是个问题。他只需要飞到驻菲美军那里，然后对他在当地做的事情扯点谎就好了。\n\n直升机深入一眼望不到头的绿色海洋之中，在丛林某处缓缓降落。摩根知道他受到了对可疑人员的监视：没人会信任他，当然他也不会信任这些康米。他走下直升机，走到了一处半掩盖式的地堡，他应该在那里和当地领袖们开个会。不过，摩根突然被一个气势汹汹的警卫拦住，警卫不解这里为什么会出现美国人，他朝摩根大喊并制止住了他。摩根缓缓地举起双手，直到他听到地堡里传来一个带着浓重口音，像是从喉咙间发出的声音时，他才松了口气。"
 antarctica_aao_cia.420.a:0 "“让他进来吧！我们等你很久了，摩根先生……”"
 antarctica_aao_cia.430.t:0 "无妄之灾"
 antarctica_aao_cia.430.desc:0 "在菲律宾第二共和国八打雁市，中层官员弗朗西斯科·雷耶斯步履轻松的来到了城内的办公室。他擦了擦额头的汗水，坐回办公桌前。\n\n一切都很好。雷耶斯心道。虽然新比岛建设奉仕团还是把治理工作搞得一团糟。可那又关他什么事呢？这个烂摊子谁都没办法去收拾。\n\n雷耶斯眼睛一瞥，突然发现桌子上多了一个以前没见过的信件。什么鬼东西？他随手撕开封条，里面的东西却让他大为失色：“怎么里面有我和我儿子去上学的照片？”\n\n他赶紧将照片收好，仔细阅读着信封上的内容，脸色也变得越来越苍白。\n\n“您最好与我们合作。\n\n在£censor_char_texticon £censor_char_texticon ，去 £censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon 的£censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon 广场，\n\n记得带上你觉得合适的机密文件。”\n\n面对这样的威胁，雷耶斯除了屈服，别无选择。"
 antarctica_aao_cia.430.a:0 "我们办过的最肮脏的事。"
 antarctica_aao_cia.440.t:0 "“快递到了”"
 antarctica_aao_cia.440.desc:0 "在菲律宾群岛西北海岸的某个不寻常的地方，渔民们收到了期待已久的物资。\n\n如果是白天，那新比岛建设奉仕团或许还有动力派出几条小船去调查一下。或许也不会。两条渔船并排停在一起，朝对方扔些东西再寻常不过，根本没什么值得关心的。\n\n但是他们还是多几分警惕为妙。如果宪兵队或者其他机构仔细检查一下，就会发现原本以为是渔民的那些人的穿着更像是美国特种部队，也可以听到渔网和渔袋撞到船舱时发出的金属撞击声，以及水面上传来的零星英语。这是他们最不愿意看到的。\n\n虽然宪兵队的工作存在一些疏忽，但瑕不掩瑜，他们在其他地方积极维护着日本攫取的利益。新比岛建设奉仕团的海军还参与了共荣圈的联合军演。\n\n就这样，驻菲美军，甚至虎克军也源源不断得到枪械和弹药的补给。而共荣圈对此一无所知。"
 antarctica_aao_cia.440.a:0 "他们的好日子快到头了。"
 antarctica_aao_cia.450.t:0 "货物装运"
 antarctica_aao_cia.450.desc:0 "一个叫做里普的“渔民”送来了一批物资。当然，这个名字和里普·范·温克尔毫无关系。他不想接受这个差事。如果有选择的权力，他去哪都可以，但绝不是这里。况且里普和他的共产主义朋友现在的关系也不尽如人意。\n\n但是世界是由希特勒和日本人掌控的。也因再无旁人愿意推翻他们的统治。里普只能勉强接受和共产主义者合作。至少他们不会因为没有跪拜希特勒和墨索里尼足够多次而杀掉你。\n\n共产主义者不会轻信里普这样的CIA特工。对他们来说，MACA-SOG，SIDE和DOI-CODI没什么两样——都是资本主义的走狗。但船上的来自马来西亚，印度尼西亚，越南和中国的共产党人还是保持了理智，维持着表面上的合作关系。大家都明白他可以帮助虎克军获得急需的援助，这也算帮助了里普。\n\n里普既没有选择的权力，也没有反对的动机。他把枪支交给对方后便拔锚远去。他的目的地是北吕宋岛。路易斯·塔鲁克在那里等他。"
 antarctica_aao_cia.450.a:0 "敌人的敌人就是朋友。"
 antarctica_aao_cia.460.t:0 "调整航线"
 antarctica_aao_cia.460.desc:0 "“罗伯逊先生，\n\n我们最近将商船的航向调整至你我当初规划的方向。您也是知道的，我们的安排非常简单：时刻紧密观察船只的动向直至它顺利的离开港口。如果船只不可避免的遇到了麻烦，而且周围得不到大日本帝国海军和共荣圈其他舰队的帮助，我们会对此承担责任，并且将船只送到一个对你我最有利的地方。这都是为了船员的安全，相信您一定能理解。\n\n最近，我们从一艘悬挂广东国旗驶往马尼拉的船只上得到了一些好东西，其中有各种各样的重要货物以及美日两国的货币。约定好的属于我们的那份已经留下了。信使会将剩余的部分送到您那里。衷心希望您妥善保管并加以利用。\n\n我们希望和您在商船航运安全领域能有进一步的合作。”\n\n里普·罗伯逊不需要去寻找一个不存在的签名，就知道一切顺利。里普像往常一样款待了信使，给他倒了一杯威士忌。里普一时兴起，也喝了一杯信使带来的卡莎萨。酒很不错，他赞赏地点点头，说了句略带深意的简单恭维话。"
 antarctica_aao_cia.460.a:0 "“三合会真是航运安全领域的专家。”"
 antarctica_aao_cia.470.t:0 "身份错位"
 antarctica_aao_cia.470.desc:0 "一名男子耐心的站立在人行道上，双臂紧贴身体两侧，紧盯着那辆正欲停车下客的黑色的铃木轿车。车子缓缓停稳，一名日本男子打开右侧后排车门，迈出一条腿，探头张望了下四周，然后又对司机说：\n\n“这里不是总部，你确定你……”话还没说完，突然他的脑袋被一把手枪死死顶着，手臂也被一只大手牢牢抓住。\n\n“给我你的钱包。”劫匪说。\n\n“好的，好的！什么事都好商量，千万别伤害我。”受害者恳求着，另一只手找寻着他的钱包。劫匪毫不客气，把他从车上拖了出来。\n\n“该死的菲律宾人，”日本男子一边嘟囔着，一边用空着的那只手把钱包递给劫匪。\n\n“扔掉它。”劫匪要求道。日本人照做了。\n\n“现在把口袋掏空，把所有东西都扔到地上。”\n\n“我身上真没钱了，”日本人一边回答，一边把钥匙、回形针和一根挂绳扔在脚边。\n\n劫匪猛地往前推了那名日本男子一把。他踉跄跌倒，转过头来，终于发现劫匪根本不是菲律宾人，而是日本人。一颗子弹穿过了他的头颅，最后刻在他脸上表情不是恐惧，而是困惑。\n\n在仔细清理尸体后，劫匪捡起钱包和挂绳，坐在了黑色铃木的后座上。司机终于开口了。"
 antarctica_aao_cia.470.a:0 "“接下来去哪儿，左撇子？”"
 antarctica_aao_cia.480.t:0 "虚假的报告"
 antarctica_aao_cia.480.desc:0 "“所以，”林奇从里普桌上堆积如山的文件中随手抽了一份，开口道，“接下来怎么办？”\n\n“在菲律宾，留给我们的资源并没有多少。”里普回答道。他把桌子上的文件堆在一边，勉强腾出了一些空间，“如果我们是专业人士，就能动用掌握的一切经济手段来维持当地的稳定，确保菲律宾人不会改变立场。但是就我收到的很多地区简报来看，情况不容乐观。日本将印度尼西亚和附属岛屿视作核心势力范围，投入了大量资源来控制周边海域。菲律宾也因此几乎和世界是孤立的。在这种情况下，尤其是政治环境不稳定，投资者很难对这里产生兴趣。”\n\n“要不我们……改改报告？伪造数据并不难。”林奇回答道。他翻着报纸，寻找着有没有他最感兴趣的部分。\n\n里普点了点头，立刻开始工作，将报告中警告菲律宾金融市场不稳定的内容全部划掉。林奇也没有浪费时间。他拿起笔，开始写报告吹捧房地产市场的优点。在几个小时的时间里，两人疯狂地在已有的报告上乱涂乱画，或者干脆撰写全新的报告。\n\n“格雷，打电话给你的助手。我们需要把这些文件打印出来，送到华尔街和任何我们能找到投资者的地方。菲律宾依靠人民的那点储蓄可没法自己重建。”\n\n“我看，这些富有的投资者醒来时会发现自己比昨天更穷一些，但这对他们来说就是九牛一毛。”林奇咧嘴笑着说。"
 antarctica_aao_cia.480.a:0 "谁会相信市场呢？"
 antarctica_aao_cia.490.t:0 "穿越丛林"
 antarctica_aao_cia.490.desc:0 "吕宋岛战火纷飞，全菲律宾革命社会主义共和国的部队正在猛攻第二共和国的防线，全力冲向马尼拉。不过，这几天的巴坦岛一直风平浪静。作为极个别留守岛屿的士兵之一，罗曼希望能听闻前线消息、知晓挚爱的祖国在解放之路上的情况，但苦于消息闭塞而紧张不已。忽然间，远处传来直升机的声音。他松了口气，却又惊恐地发现来者并非友军。铁鸟开火了，罗曼驻守的碉堡被炸了开来，他便立刻丢下枪，跑进丛林。\n\n罗曼知道幕后黑手是谁。就是美国人，就是开战前跑来提供支援的中情局干员。只有他们知道这处秘密基地的位置，特此前来清理现场。吓坏了的罗曼在丛林里抱头鼠窜，但直到太阳下山仍未再听到直升机的声音。想必是走了吧。\n\n突然，左边某处传来一声树枝折断的声音。罗曼拔腿就跑，身后不断传来树枝折断声，看来他们正在追捕自己。只要跑到巴示戈就安全了！他向右急转，追捕者咒骂了一声，但距离更近了。慌乱间，气喘吁吁的罗曼被树根绊倒在地。急着逃跑的他顾不及起身，疯狂地向前爬。\n\n没爬出多远，一支靴子重重地踩在罗曼的左手上。他向上看，发现是上次差点射中的那个美国人，摩根。\n\n“又见面了。”摩根表情扭曲，把罗曼翻了个面。后者见状尝试继续爬走，结果撞上第二个人。摩根给枪上膛，利落地给罗曼腹部来了一枪。另一人则亮出打刀，刺向枪眼，剌出肠子，任由这小兵倒在地上。\n\n“我……我认识你们……”未等说完，罗曼便晕死了过去。\n\n“傻逼共匪。”摩根唾了口奄奄一息的罗曼，头也不回地走了。二人离开了现场，空余小兵和刀在原处。"
 antarctica_aao_cia.490.a:0 "收尾工作罢了。"
 antarctica_aao_cia.500.t:0 "黑夜里的一把火"
 antarctica_aao_cia.500.desc:0 "他行动匆忙，清空了几个小时前还被各种乱七八糟的文件塞满的办公室。很难想象这个空无一物的办公桌和刚才文件堆积如山的办公桌是同一个东西。办公室的每一张纸都被扔进了一个手推车中，准备搬走。林奇最后瞥了一眼办公室。除了清理角落里的灰尘，这里已经没有任何事情需要做了。然后办公室就可以迎接它的下一任主人。上一个时代的秘密也将永远消失和销毁。\n\n格雷将手推车推出大楼，来到安全区域的边界——整栋楼被通电围栏围了起来。他将文件堆在干燥的地面上，然后泼上一桶汽油。火舌噌的一下腾空而起，甚至烧到了围栏。寒冷的午夜空气中立刻多了一根浓重的烟柱。火焰烧毁了文件，也永远隐瞒了里普不可告人的秘密。看着残余的文件冒着黑烟，林奇心生疑问，他正在帮助什么东西消失？有多少不为人知的死亡，有多少无声消散的生命，有多少城镇因里普和他的帮助而毁灭？白纸变为飞灰，这些隐藏其中的秘密也随之而去。\n\n但或许这样做是最好的选择。他们甚至不应该在菲律宾。这是明确的禁区。在马来亚他只是越权干预，但现在他真正触碰了红线。林奇知道他的分区并不是最好的，但他知道情况可能会变得更糟。如果他不消灭他们的罪证，麻烦就会找上门来。\n\n当太阳升起时，灰烬堆已经停止冒烟。现在一切都安静了。外国爱国者的秘密得到了保护，只有死人才能知晓。这些并不重要，重要的是他们正在进行一场正义的战争。只要还活着，就有胜利的希望。"
 antarctica_aao_cia.500.a:0 "胜利是唯一选项。"
 antarctica_aao_cia.510.t:0 "不再回头"
 antarctica_aao_cia.510.desc:0 "“日军对菲律宾发动了一次报复性攻击？”\n\n里普放下电话，思索了一阵子。日军的这次反攻给予了他一个梦寐以求的机遇。秘密军售、勒索、宣传，造谣……盘根错节的大量计谋正在他的脑海深处成型。\n\n不过，里普仍旧有些犹豫。他将要面对的敌人并非先前那些零散的杂牌军，那些人对日忠诚度可疑，也易于被里普玩弄于股掌之中。日本陆军是一头完全不同的，危险的野兽。或许在过去，里普在面临如此对手时还会感到兴奋。但是，持续的代理人战争已经让他疲惫不堪，他麾下的资源也捉襟见肘。而要对日本陆军采间谍行动，他或许得推翻几个在其他地方的计划。了解自己的极限对于确保行动的顺利进行至关重要，而就目前的情况来看，他的工资不足以让他为此冥思苦想一番。\n\n里普拿起了电话，不带任何感情色彩地回应道：“我想是时候让我们的人撤出菲律宾了，林奇，我们的活干完了，菲律宾人得靠他们自己了。”\n\n咔嚓一声，林奇挂断了电话。里普的内心浮过了一丝悲伤，他同时也感受到了许久没有滋生的自我怀疑。他不知道自己在怀疑什么，究竟是菲律宾之上的人民，还是那些永远不可能实现的计谋。这些自怨自艾在琥珀色的威士忌和古巴雪茄的浓烟中烟消云散，它已不再重要。"
 antarctica_aao_cia.510.a:0 "不再回头，只向前走。"
 antarctica_aao_cia.600.t:0 "自灌木丛中归来"
 antarctica_aao_cia.600.desc:0 "格雷斯顿冲进了麦克默多站的走廊，不带敲门便闯进了里普的办公室。到目前为止，这似乎成了他的习惯。而他的上级正在用新的文件铺满桌子，取代那些自外国爱国者行动后应当消失的文件。格雷斯顿将他的那份文件也放到了桌上，他坐了下来，打开了一个文件夹。\n\n“有什么收获？”里普清空了一个抽屉，把里面所有的东西倒入了垃圾桶。\n\n“基本上都是联络人。只要花钱，这片黑暗大陆上全是能帮我们的人。法国人、英国人，还有比利时人……这里是我写的报告全文和附加细节。一言以蔽之，目前我们主要能依赖的团体是一个被称为‘摩羯座’的组织，由英国士兵和探险家组成。他们想让我们在以后解放的土地上实行多数统治，这跟其他的英国雇佣兵组织又不一样，他们之间的利益完全冲突……这些人已经准备好与克利福德·杜邦的合作者们干上一场了，但这些雇佣兵还是不愿意放弃少数统治的原则。接着是法国人，基本上都是自由法国那块把自己卖给纳粹的家伙。如果我们出价够高，他们就能加入我们。你觉得向戴高乐允诺归还前法国殖民地如何？”\n\n“华府不太可能同意。他们不太想承认戴高乐是一个‘合法的盟友’，毕竟这会在法国本土造成对美的不信任。此外，法国人能否守住这些地方也存疑。”\n\n“这样的话，要不考虑一下施拉姆领导的比利时人？他们到现在为止还是纳粹的忠犬，不过如果我们向他们承诺比利时复国的可能性，我们可能让他们动摇……”\n\n“我可听说，这帮人以杀戮刚果黑人为生啊？”里普质疑道，“你觉得我们去说服他加入我们时会发生什么？我们能对他们最好的处理办法就是先让他们靠边站，直到我们忙完非洲的事：我很怀疑这帮人对我们的多数统治和去殖民化项目的接受程度。”\n\n“争取那帮抱着少数统治不放的英国人和比利时人希望不大，不过看起来那个‘摩羯座’跟我们的事业兴趣相投。我们的主要资源得倾斜在争取那帮法国人上，还得分散比利时人的注意力。要不在活干完以前把他们送去哥伦比亚？”"
 antarctica_aao_cia.600.a:0 "漫漫长夜中，二人继续计划着他们的方案。"
 antarctica_aao_cia.610.t:0 "开端"
 antarctica_aao_cia.610.desc:0 "事情是瞬间发生的，山姆·卡西迪回想道。前一秒他还在和摩羯座的人巡逻，下一秒布尔人就不知道从哪冒了出来。来者还有真正的纳粹作支援，也就是那帮东非专员辖区的疯子。摩羯座指挥官迈克尔·格里格斯是最先注意到伏兵的，并且抢在各位发出“里普是你大爷”感叹之前打出了头一枪。\n\n或许巡逻队因此有了优势，不过根本原因应该是摩羯座士兵在周边的复杂地形中穿梭自如。至于布尔人，则没法指望习惯了平坦和海岸地势的东非专员辖区部队能帮上什么忙了。\n\n不一会，小队抢占了上风，纳粹分子纷纷投降。显然，这些人等着吃俘虏优待政策，或许还想着送去南非政府后被赎买回去，甚至期待能遣送美国、贪食自由国度的空气。不过，摩羯座小队有别的安排：当俘虏被带到沟边列队时，先前嘲弄的叫喊都变成了饶命声。\n\n格里格斯用电台联系格雷斯顿·林奇时，道德、人文关怀和《日内瓦公约》就都不重要了。他就着此起彼落的枪声，冷静地和金主讨论接下来的计划。"
 antarctica_aao_cia.610.a:0 "由此开始。"
 antarctica_aao_cia.620.t:0 "消失的货物"
 antarctica_aao_cia.620.desc:0 "无边无际的沙海之上点缀着些许灌木，偶有出现的检查点也是一片死寂，只余一条铁道从中穿过，串起了文明的痕迹。这，就是南非边境。\n\n突击队在草丛与土堆之中来回穿梭，终于抵达了目的地。这里是一处悬崖，恰好能俯瞰下方德军哨卡。他们迅速把装备卸下，放在尘土上。东非的夜晚往往伸手不见五指，而这支精锐美军突击队自然不会让黑暗白白浪费。地平线上出现了一团烟云，队员们正好也干净利落地组好了装备。\n\n队伍从悬崖边绳降到铁路后，便解开钩子开始布雷。一个人布设绳索，另一个人拿着裹满风尘的步枪放哨，剩下的都在眺向地平线上那团巨大的沙尘，紧张地猜想着即将发生的事情。沙尘的中心是一列疾驰的蒸汽火车，疲惫的列车工人们丝毫没有察觉到前方的危险。\n\n拂晓之时，突击队布雷完毕后便撤退，仅一人留待观察陷阱效果。他轻握起爆器，如猎人一般静待猎物出现。钢铁猛兽裹挟着烟尘冲了过来，一头扎入炸药与雷管的致命圈套。时机已到！他用力扣下扳机，列车在剧烈的爆炸中四分五裂，货物尽数被毁。看来，困顿不已的德军前线阵地明早是收不到补给了。"
 antarctica_aao_cia.620.a:0 "虽为无名之军，但非绿林莽汉。"
 antarctica_aao_cia.630.t:0 "实验场"
 antarctica_aao_cia.630.desc:0 "帆布包一个个投了下来，缓缓落在丛林泥地上，看上去都颇有分量。\n\n格雷斯顿示意小队长打开其中一个帆布包。里面装的是一件罕见却又莫名熟悉的美制武器：M72轻型反坦克火箭筒。\n\n“诸位，这是我们最新款的德佬消杀器。最好赶快上手，毕竟在华府逼着他手下人送来更好的东西之前，这筒子就是你唯一能用的反坦克武器。”\n\n头发花白的格雷斯顿示意队员们看向土路另一头的“豹”1坦克残骸。从临时营地中心能直接望到残骸，视野十分清晰，是不错的靶场。他带着几名摩羯座士兵前往指定地点，准备试射。恼火的是，为避免因误炸新装备，他们不得不再三换位，不过最后还是找到合适的开火位置了。\n\n尾焰闪过，目标爆炸。透过瞄具和炮口烟雾看去，原先完好的坦克残骸变成了一堆扭曲的废铁。格雷斯顿长出一口气，摩羯座士兵们迟疑了片刻后也跟着露出了高兴的神色。\n\n长久以来，德国佬一直是非洲大草原与丛林的霸王猎手，但有了这款轻型反坦克武器，他们便成了猎物。"
 antarctica_aao_cia.630.a:0 "“外面坦克还多的是呢。”"
 antarctica_aao_cia.640.t:0 "忙碌的工作"
 antarctica_aao_cia.640.desc:0 "炎热的中非让林奇汗如雨下，他推开了帐篷的挡板，进入了让·施拉姆的寝室里。对于进入黑暗大陆的心脏地带，他有些抗拒，但这又是不得不做的事情。至少他是这么告诉自己的。\n\n“美国佬，你要让我做点什么？这片鬼地方除了疟疾以外啥宝都没有，难道说你们的野心已经不满足于南非了？”\n\n格雷斯顿拉开椅子坐下，把一个钢制的大型公文包甩到了佣兵的桌子上。\n\n“你现在应该知道，让，不要问问题。”\n\n这个比利时人立刻被那个奇怪的公文包吸引了眼神，他向前探去，数着公文包里的现金。\n\n“哈！美国佬，这可真有意思，可比你和你的主子有意思多了！你这些东西又是什么意思？雇我在这干活儿？不会在拿我开涮吧？”\n\n林奇抹去额头上渗出的汗水，他示意他的保镖过来。那是一个高大的刚果本地人，恰好十分了解当地状况，他将一大堆的文件放到了比利时人的手里，而施拉姆也一份接一份的阅读着，他逐渐因惊讶而睁圆了他的眼睛。\n\n“……是不是有什么事情搞错了，美国佬？你想让我完全滚出非洲？之前可不是这么说的！”格雷斯顿缓缓起身，示意他的保镖紧跟着自己。\n\n“如果你照做，或许还有更多好处，施拉姆先生。”\n\n二人缓步离开了帐篷，只留下让·施拉姆一个人一头雾水地拿着公文包。"
 antarctica_aao_cia.640.a:0 "“这帮总爱哭哭啼啼的美国佬到底想做什么？”"
 antarctica_aao_cia.650.t:0 "罗得西亚线人"
 antarctica_aao_cia.650.desc:0 "即便德国人已在非洲横行霸道了十多年之久，扎根于罗得西亚的白人群体依旧不愿屈从。至少，阿拉斯泰尔·威克斯和迈克尔·“疯狂麦克”·霍尔之流是不服的。他们不想坐视德国人对着自己颐指气使，于是便组建了佣兵组织。\n\n只要弄清楚格雷斯顿·林奇是谁，这些人便会自愿参加研究观察团的小小计划。不过，某种程度上来说，他们还是有所保留。\n\n“我们对你们政府的承诺不感兴趣。什么‘多数统治’，什么‘民族自决’，统统没兴趣。要说纳粹在这做了什么我们认可的事，那就是严格不让黑人掌权。真要赶走他们的话，让黑人趁着权力真空是万万不可的。”\n\n林奇已经料到了此等反应，会面之前就知道要不谈自己的观点。毕竟，这方面的争论可能会危及研究观察团的行动本身。有鉴于此，他非常轻松地回答道：“诸位大可放心，国会的话放在实际情况前就是放屁。我们美国人将统治非洲，诸位的帮助必不可少。”"
 antarctica_aao_cia.650.a:0 "听到这里，佣兵们得意地笑了，没再唱反调。"
 antarctica_aao_cia.660.t:0 "法籍线人"
 antarctica_aao_cia.660.desc:0 "报告：£censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon \n\n仅限驻南极洲军事援助司令部研究观察团/OFN南极洲事务局目视呈阅\n\n主题：将法籍作战人员吸纳进摩羯座部队事宜\n\n结果：成功\n\n携带先前安排好的外汇公文箱前往罗贝尔·“鲍勃”·德纳尔近期所处设施时，我方发现其正在进行惯常地消遣活动。简单来说，以及为了防止阅者此时诉诸酒精而缓解痛苦来说，活动即是神秘学相关的迷惑行为。\n\n要想把德纳尔、他的妻子（们）及其佣兵从无意义呢喃中拉出来甚是困难。他们都在念叨着“人体热力学”和“七分大烛台要比圣坛蜡烛放在桌上更好看的原因要归结于三角湿法冶金流体力学法则”之类的废“话”。\n\n不过，德纳尔恢复理智后，对参战表露出了极大的兴趣。有鉴于此，根据驻南极洲军事援助司令部研究观察团命令，法籍作战人员现已归于麾下、等待命令。\n\n林奇"
 antarctica_aao_cia.660.a:0 "七分大烛台和圣坛蜡烛？他拿什么鬼东西消遣呢？"
 antarctica_aao_cia.670.t:0 "皇家非洲步枪团"
 antarctica_aao_cia.670.desc:0 "这些步枪团士兵谈不上有多么“皇家”，但铁定是“非洲”的。他们迫切希望成为摩羯座或者OFN的战士，扫除非洲大陆上的德国人。\n\n有鉴于此，卡西迪在坦噶尼喀腹地某处落地时，事情大抵已经在意料之中了。他刚走下螺旋桨飞机的舷梯，坦盟的朱利叶斯·尼雷尔和皇家非洲步枪团指挥官大卫·穆苏古里就迎上来与他握手。\n\n后面的事情就相当简单了：在场各位闲聊了下天气和训练后的晚餐菜品，接着步行检阅了一个步枪团方阵、观看了坦盟民兵训练，最后签署了一份直白的三方协议，立即生效。\n\n次日早晨，卡西迪达成了目的，尼雷尔和穆苏古里也满意地离开了：摩羯座向坦盟派遣军事顾问辅佐，步枪团辅助人员则帮助摩羯座增强常规战争中的作战能力。\n\n简单的交易，只为了简单的结果，也就是摧毁德属非洲。卡西迪确信，结局一定会很好。"
 antarctica_aao_cia.670.a:0 "如朋友间约定般紧密的协定。"
 antarctica_aao_cia.680.t:0 "非裔部队训练报告"
 antarctica_aao_cia.680.desc:0 "报告：£censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon \n\n仅供驻南极洲军事援助司令部研究观察团/OFN南极洲事务局目视呈阅\n\n有限传阅：禁止外籍人士查阅\n\n主题：为未来战略目的培养非裔作战人员\n\n结果：成功-进行中\n\nOFN于非洲的行动取得最终结果后，非洲局势仍旧保持复杂状态，需要当地武装势力投入以获得对我方有利的结果。\n\n有鉴于此，我已开始亲自对经验得当的黑人士兵进行培训，教授其在未来常规与非常规战争中高效作战的必需技能。我方已在£censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon 与£censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon £censor_char_texticon 等敌方不易发现的地点建立其数处训练营地。\n\n目前为止，训练成果证明了项目极有前景。我相信对于驻南极洲军事援助司令部研究观察团和南极洲事务局而言，继续进行这一项目是安全的。\n\n罗伯逊"
 antarctica_aao_cia.680.a:0 "已阅。"
 antarctica_aao_cia.690.t:0 "公文包"
 antarctica_aao_cia.690.desc:0 "总的来说，那天又是渣打银行平常的一天。开战以来，邮件来往一直甚是频繁，包裹和公文包也是一样。根本慢不下来啊。\n\n虽说公文包来来往往多的很，但约翰当时手里拿的那个感觉有些与众不同。公文包漂亮，黑色外皮，银把手，上面还挂着一个小卡片，表明发件人名为“柯蒂斯（Curtiss）·伊萨克（Issac）·安德森（Anderson）”。他拿起印时戳，快速检查了一下日期是否正确，在一张纸上印戳，再把纸贴到了手提箱上。随后，约翰把公文包送到了上司宗迪先生那里。\n\n宗迪看了眼公文包，打开锁闩，发现里面是许多关于当地商户的财务信息文件。然而，文件的内容却让他不由得睁大了眼睛，赶紧记下里面的内容：文件内记录的商户都有着超高的投资回报率，数额大的几乎难以置信，战争刚刚爆发的当下更是令人诧异。\n\n有那么一瞬间，宗迪在考虑要不要深究是否有违法行为。不过，邮件来往实在太多，工作属实繁重，于是便决定耸耸肩抛诸脑后。毕竟，全局来说，如此公文包又能蕴涵多少内容呢？"
 antarctica_aao_cia.690.a:0 "至少比他知道的要多。"
 antarctica_aao_cia.700.t:0 "不见天日的后果"
 antarctica_aao_cia.700.desc:0 "林奇坐在麦克默多站的办公室内，暂时放下了手边工作，凝视着窗外景色。或许，他已经花了太多时间考量局势。老天有眼，里普一直都……非常热衷于插手南非战争。为此，他们请了各路佣兵，一头扎进这场争议连连的战争。\n\n他们的手段也一直很……直接，没有自己惯常的那份精准、周密。想到这里，林奇提醒自己，要以大局为重。法西斯主义必须灭亡，而一个人为了反抗暴政势必会两手沾血……不过，放任不管并不会让手上的血更少。\n\n但话又说回来，里普何必给他找来这么多文书工作！？而且还是在南极洲的时候！？大多数报告都需要林奇去删改、审查、拿着黑色记号笔逐页划掉危险信息，完成后复印，再粉碎掉原件。这其中绝大多数工作都是他亲自完成的。\n\n林奇叹了口气，接受了命运。事实上，为“公司”工作就是要话很多时间做处理文书。退一步说，工资还不错。除此以外，里普可能是坑了他一下，但“公司”会照顾自己人。\n\n笔尖划过纸面，厚重的黑墨水遮住了一行行文字、一次次行动、一起起死亡，好似什么都没发生过。摩羯座集团、破坏行动、游击战斗、勇气之证、施虐行为……一切的一切都埋没在混杂的黑色墨水之下了。"
 antarctica_aao_cia.700.a:0 "长夜漫漫，何人愿陪？"
 antarctica_aao_cia.710.t:0 "物竞之时"
 antarctica_aao_cia.710.desc:0 "还有什么好说的呢？\n\n完全失败了。OFN表现不及预期，或者说事实证明布尔人攻势太过猛烈，再或者就是纳粹后勤太好。至于结果，就是MACA-SOG供下属和承包商使用的会面地点已然仅限于圣多美的几处地方。\n\n格里格斯和林奇在其中一处地点见面时，并没有怎么争执，只是如预定般小酌几杯、追忆过往。二人都心痛于战败，也分享了一些彼此在非洲炼狱所经历的精彩故事。现在互相中伤毫无意义，至少在前路依旧漫漫之时不该吵架。\n\n杯皿见底后，林奇把格里格斯带到一艘渔船前。这是他的下一班车。格里格斯和整个摩羯座并不太想因为南非碎一地就直接放弃，他们仍旧愿意在山河破碎之时战斗。自然，摩羯座的士兵会被秘密送回德属非洲，继续战斗。\n\n林奇谨慎地转向下一个任务之时，他不禁思考起格里格斯该何去何从。总之，和他工作不甚荣幸，林奇也不想听闻他命陨沙场。"
 antarctica_aao_cia.710.a:0 "但现在，林奇还有更重要的事情要担心。"
 antarctica_aao_cia.720.t:0 "友谊赛"
 antarctica_aao_cia.720.desc:0 "事情发展的相当顺利，基本没有什么能挑剔的地方。\n\nOFN胜利了。整个自由世界大获全胜，而溃不成军的德国人逃的逃、死的死，剩下的全进班房了。格里格斯清楚，在罗伯特逊和林奇的领导下，MACA-SOG的行动对于自己作为摩羯座总指挥而取得的胜利也有莫大的帮助。\n\n卢萨卡的一处野地里，格里格斯和林奇一边举杯共饮，一边观看摩羯座部队与OFN大头兵之间难解难分的球赛。二比二告平后，两位指挥也喝够了威士忌，于是便斟上凯匹林纳鸡尾酒，畅聊事情是有何等顺利。\n\n有关胜利的轶闻趣事乘风扩散了开来，谈话间玩笑不断，场内外充满了快活的空气。酒水和零食也被一扫而空，不过为了赶巴士，林奇吃的零食远多于酒水。\n\n巴士来了，林奇见状便起身，稍有些摇晃。在佣兵与士兵们的喝彩声中，他向迄今为止的好友格里格斯敬礼，随后登上了前往克利马内的巴士。车开动了，林奇一手伸出窗外以示告别，逐渐消失在远处。\n\n几分钟后，格里格斯转身欲行，结果顶不住天旋地转，一头倒在了地上。比起林奇，他在喝酒上门的节制力确实更差些。"
 antarctica_aao_cia.720.a:0 "看起来他得有好一会踢不了球了。"
 antarctica_aao_radio.10.t:0 "响彻世界的枪声"
 antarctica_aao_radio.10.desc:0 "沉浸在睡意中的西蒙从打盹的椅子上滑倒，和地板的亲密接触让他瞬间清醒过来。西蒙暗骂一声，起身煮上一杯咖啡，然后又坐回了DJ椅上，开始制作新报道。窗外，天空中浮现出一道道金橙色的条纹，预示着南极最为美好的天气。\n\n西蒙推了推依然徜徉在梦乡的同事：“马特，快醒醒，太阳晒屁股了。”“兄啊，再让我眯五分钟。”马修嘟囔道。西蒙调笑着：“再过五分钟，太阳说不定就下山了。”当他准备继续说点俏皮话的时候，电话突然响了起来。\n\n马修揉了揉眼睛站起身来，嘴里止不住碎碎念：“好好，我来接，我来接。咖啡壶还开着吗？”他拎起话筒，说道：“麦克默多电台，什么事？”西蒙伸个懒腰，起身打开了炉子。此时，马修的反应把他吓了一跳。\n\n“什么？！真的？你他妈没在耍我吧？”西蒙发现，马修的眼睛越睁越大，“在广播之前，我必须得确定这是真的！”电话传真机开始嗡嗡作响，马特仍然在通话，西蒙则抓起新鲜出炉的文件，开始了广播播报。随后，马修挂上了电话，焦急地等待着，试图将自己的注意力转移到正在逐渐沸腾的咖啡壶上。\n\n“这里是美国军队南极广播，为各位播报一份突发事件公告。我们已经确认，此前在英格兰展开游击运动的女王陛下最忠诚的抵抗组织日前发动起义，业已控制多处行政中——”在播报的空隙，马修抢过了麦克风，在洋溢的爱国热情中高呼道："
 antarctica_aao_radio.10.a:0 "“天佑女王！”"
 antarctica_aao_radio.20.t:0 "通往巅峰路漫漫"
 antarctica_aao_radio.20.desc:0 "“你做得很棒，兄弟。”“你战斗很是勇敢。”“运气真好，你毫发无伤地渡过了难关。”吉米·周已经数不清他向一船船涌入珀斯的难民打过多少次这样的招呼了。他很是羡慕自己的弟弟，毕竟，电台只是电台而已，电台不会看到人们眼眸中的失败，也不会听到怀念逝去之人的啜泣。真的，所有人都在内战中失去了某人，也同样失去了另一样事物，那就是希望：对更美好明天的希望、挣脱德国束缚的希望。漫漫二十年抵抗，都是为了这孤注一掷。\n\n“——而我们却搞砸了！”漫长的一天过后，吉米坐在酒吧里，与一名抵抗组织成员共饮。他身无分文，恳切地请求别人请他喝一杯，而吉米也很同情他。于是二人坐在一起，分享着油腻的英式快乐餐：炸鱼薯条。\n\n“你明白的，没人会认为你们是懦夫、是失败者。”\n\n“的确，我心里都明白的。”对坐的士兵悲哀地说着，往嘴里塞进几根薯条，“但要是我们抓住机会，一举拿下伦敦——”\n\n吉米打断了士兵的话语：“我的父母也这么想过……他们常说，‘唉，我们就该留在重庆，留下来战斗到底’。但如果他们留在重庆，今天也就没有我了。往事不可追，我们只能舔舐伤口，继续生活下去。”\n\n士兵又抓起一把薯条：“兄弟，谢谢你。坐船来的一路上我都一直在想，自己的战斗生涯已经结束了……我从小就想当个音乐家。”\n\n吉米挑了挑眉毛：“真的？你叫什么？我可一定要记下来这位未来会大红大紫的音乐明星的名字。”"
 antarctica_aao_radio.20.a:0 "“邦·斯科特，可千万别忘了我哦。”"
 antarctica_aao_radio.30.t:0 "澳大利亚人的好日子"
 antarctica_aao_radio.30.desc:0 "马修与“澳大利亚人”这个身份之间的纠葛，向来缠绕着奇特张力。他操着纯正的澳式口音，言谈间是俚语横飞，举手投足尽是本地作派，可那身改不掉的肤色却时时昭示着隔阂。同胞的友善与白眼交织成网，让他在三十载光阴里始终像是戴着赝品面具的异乡人——直到这个冰原上的夜晚改变了所有。\n\n当时他正窝在麦克默多站的休息室里玩牌，收音机流淌着放克乐慵懒的节拍。挚友塔伊卡沙哑的嗓音突然划破旋律：“不开玩笑！亚历克·道格拉斯-霍姆向抵抗运动投降了！他们他妈的做到了！”\n\n科研站的宁静在顷刻间炸裂成狂欢的漩涡。马修下意识蜷缩身体，准备迎接如足球比赛时常见的驱赶——但今夜不同。威士忌酒瓶塞进他掌心，埃德蒙·希拉里叼着雪茄拉他加入牌局。凌晨一点，众人簇拥着篝火纵情高歌，极地的风卷着火星掠过他发烫的脸颊。\n\n醉眼迷蒙中，马修扯着五音不全的嗓子嘶吼：“天佑我们仁——慈的女王——”寒夜里，数条醉醺醺的声浪应和着盘旋升腾："
 antarctica_aao_radio.30.a:0 "“天佑女王——”"
 antarctica_aao_radio.100.t:0 "黎凡特的麻烦事"
 antarctica_aao_radio.100.desc:0 "“传真来了？是最新的吗？有没有提到戈兰高地的情况？”电话另一端的人显然对西蒙的一大堆问题相当厌烦，挂上了电话。西蒙·帕斯凯维奇坐了下来，按揉着自己的太阳穴，止不住地叹气。\n\n“怎么了，西蒙？”塔伊卡站在电话传真机旁等待着报告，开口问道。\n\n“我有好些表亲都住在黎凡特，今天上午我一直在试着联系他们。里面还有人跑去参加了哈加纳，怎么说呢，是个犹太民兵组织。”\n\n“啊，原来是恐怖组织。”塔伊卡调笑道。\n\n“那也是一种说法。传真印好了吗？”西蒙冷冷地回应道。\n\n“哎呀别这样，我就是开个玩笑。传真已经印出来了，”塔伊卡把纸张钉在一起，交到了西蒙手中，“但我查过了，没有和戈兰有关的内容。”\n\n“好吧，好吧，把公告播出去吧。”西蒙长叹一声，“但先让我来杯咖啡。”\n\n塔伊卡端来两杯咖啡放在桌子上，说道：“西蒙，我懂了，你以前是不是去过黎凡特？”西蒙举起杯子，优雅地与同事相碰，然后抿了一小口，回答道：“只去过一次，而且是好几年前了。文书手续太麻烦了，我可不想再去一次，但要是真的必须得去，那我一定会待在特拉维夫一动不动。蠢货表弟非要去住在那个什么，基布兹，我不明白。”西蒙看出了塔伊卡脸上的困惑，于是继续解释道，“哦，基布兹是一个公社。在八月的烈日下，我们度过了充实着体力劳动的三周‘假期’。”塔伊卡苦笑着说道：“听起来很糟，但家人就是家人啊。”西蒙点了点头表示认可：“太对了。敬约阿夫，不管你现在在什么鬼地方。”塔伊卡小啜着咖啡，略微沉吟，也跟着说道："
 antarctica_aao_radio.100.a:0 "“敬约阿夫，不管你现在在什么鬼地方。”"
 antarctica_aao_radio.110.t:0 "餐厅里的CIA"
 antarctica_aao_radio.110.desc:0 "“要是说厨子为了让我们多吃几顿这玩意而往里面塞鸦片的话，我也不会惊讶的。”正在狂吃第三盘意面的西蒙评论道。桌对面的塔伊卡和马修本会附和两句，但他们也在狼吞虎咽，于是便在闹哄哄的餐厅中相互无言，享受佳肴。\n\n三人吃完后，有人拍了拍西蒙的肩膀。原来是个中情局探员。“西蒙·帕斯凯维奇？”探子问道。西蒙点了点头：“是我没错，你又是哪根葱？”探员简短生硬地回答道：“请跟我来。”\n\n西蒙和朋友们告别后，跟着探员在麦克默多站的走廊来回穿梭，接着走进了一处先前完全不知道其存在的地方。他想打打趣，不过还是憋了回去，转而希望这场沉默的远足能尽快结束。\n\n最后，二人走到了站内僻静处的一个房间前，探员随即平静地命令西蒙进去。从外面看，房间平淡无奇。推开门，内部陈设舒适，墙面嵌着木板，烟雾缭绕，还有两名闲人。其中一人示意西蒙进来。\n\n“这是我从食堂弄来的一点甜甜圈，自个拿着吃吧。”男人说道。西蒙接过一个油光发亮的甜甜圈，三两口吃了下去。“你大概在想为什么会被带到这里来。这是因为我们对你表亲寄来的一封信很有兴趣。我不清楚你有没有关注黎凡特的冲突，但你的表亲约阿夫加入了哈加纳。”男人递给西蒙一封信，后者顺手塞进了大衣口袋。“之所以把你带过来，是想告诉你，我们不会再拦截你们的信件来往了。从现在开始，一旦了解到任何关于你表亲的消息，就打给这个号码。还有问题吗？”\n\n西蒙自信地问道：“长官，甜甜圈我能带走吗？”探员点了点头答道："
 antarctica_aao_radio.110.a:0 "“请便。”"
 antarctica_aao_radio.120.t:0 "电话"
 antarctica_aao_radio.120.desc:0 "“你怎么拿到这个号码的？”电话那头传来一个低沉的声音。“从某个中情局探子那拿到的。”西蒙尽力不在话中流露感情。“很好。请稍等。”西蒙在付费电话旁坐了下来，等了好一会。麦克默多站深夜的这份静谧总是能让西蒙静下心来。南极洲就该如此沉寂，只余纯白大陆之上的寒风呼啸。要不是在和中情局通电话，他就会用这点时间来冥想了。十分钟后，听筒里传出刺耳的人声，打破了宁静：“西蒙？西蒙？是你吗？”\n\n“呃，是的，实际上我收到了一封信，我表——”西蒙确认道。“好好好，别绕了，内容大意是什么？”电话那头的男人打断道。\n\n“我的表亲活过了战争，毫发无伤——”男人颇带嘲讽意味地插了句犹太语的“祝贺”。西蒙继续说道：“据他所说，他们开了一个礼拜的派对，现正在前往耶路撒冷。”对面传来啪嗒声，像是男人示意旁人拿个笔记本来。“那里要开次大会，很盛大的那种。各方人士都会去，意方官员啊、法塔赫啊、哈希姆王室啊，还有锡安主义者。他们要解决彼此之间的分歧。”说到这里，电话那头的背景声里有好几次“我草”和“天呐”的感叹。“很好，感谢提醒。还有什么值得一谈的吗，西蒙？”\n\n“呃，有的，还有一件事。他个人对大会走向非常乐观，说……呃，引用他的话说就是，”西蒙翻了翻信稿，找到中情局探员会感兴趣的内容。“‘战火淬炼之下，各路军团都合为一体，你会和意大利人或阿拉伯人同守一条战壕。土耳其的侵略之下，一切内斗都毫无意义。每一个奋起斗争的人都明白，我们能够共存。’”"
 antarctica_aao_radio.120.a:0 "“谢谢你，西蒙……可以挂了。”"
 antarctica_aao_radio.130.t:0 "哦，耶路撒冷"
 antarctica_aao_radio.130.desc:0 "约阿夫·纳赫曼尼能够感受到耶路撒冷城阴沉的气氛。嘴边的每一口军粮、水壶里的每一滴液体，无不都让他的心头更添压抑。土耳其猛烈的攻势压垮了防线，迫使他们付出了巨大的代价。同约阿夫离开基布兹的五个人皆已葬身沙场，只有他得以全身而退。现在，约阿夫和六名队友宿于一户正统派家庭房屋的地下室。日子每天都甚是忧郁，他和他的小队也会日常在沉默中走过犹太人聚居地的街道。在耶路撒冷沉寂的街头上，约阿夫常能注意到峰会召开的迹象，比如读报纸的老人异常的多，或者有外形低调的车辆开进东耶路撒冷。然而，但他能做的不过只有日复一日地巡逻罢了。\n\n“我发誓，他们肯定会试着解决事情的！”约阿夫的队友之一，耶迪德雅，正在晚饭餐桌上激动地讨论政治话题。寄宿家庭的大当家弗雷德里克点点头：“那大概就是你们来这里的原因。不论大会何时破裂——它一定会不欢而散——你们就得去镇住局面了。”约阿夫明白自己正在见证历史，只是默不作声地吃饭。耶迪德雅边吃沾酒面包边说道：“虽然不想这么说，但到那时候我们就得摆出暴徒的姿态了。对，就像美国那些黑豹党人！”约阿夫点头，试着打打趣：“如果大会真崩盘，亚博京斯基和他的手下估计就要打去安曼了。这就是为什么我们加入了哈加纳，对吧？”没人作反应，反倒是另一位队友内森继续严肃讨论：“只有老天才知道会发生什么。我是说，如果合作的时候都被胖揍，单干有多弱就不难想象了。不是说想要催本·古里安和他那帮人，但现在是建立以色列国的最好机会了。”约阿夫看到了内森担忧的神色，拍了拍他的肩说道："
 antarctica_aao_radio.130.a:0 "“这就由不得我们了，何必多心？我们能做的只有继续巡逻。”"
 antarctica_aao_radio.200.t:0 "说死人坏话"
 antarctica_aao_radio.200.desc:0 "“——那么现在，晚上好，麦克默多站，希特勒死啦！哦呼——！”西蒙对着麦克风吼完后，蹒跚倒退了两步，栽倒在地上，开始咯咯笑了起来，同时又猛干了一口啤酒。马修接过空挡播音道：“如果有德国人在听的话，估计你们要为元首度过一个忧郁的夜晚了。说不准你还在哭呢！不过，其他地球人都在争相庆祝！今晚，麦克默多站的所有人都要喝个酩酊大醉。祝出殡快乐，大傻逼！”三人中戒酒的塔伊卡从马修手里夺过话筒：“如果有大人物在听的话，请不要给我们记过，今晚相当特殊。”塔伊卡关上麦后，西蒙撅嘴道：“哎呀，塔伊卡你真坏兴致……来口吗？”塔伊卡摇了摇头：“免了兄弟，我还得防着你栽雪地里睡着了。”\n\n随后，三人开始在麦克默多站里串酒吧，跑进每一个部门的庆祝会场。到了午夜，西蒙和马修已经和科研人员用烧杯共饮、和奇怪黑衣人干了小杯酒、还和基地里的水手打了扑克。凌晨四点，日出之时，他们终于回到了广播站。精疲力竭的三人围坐在一起，手里各拿着杯塔伊卡泡的茶水。\n\n“接下来德国不论发生什么，反正都不会太平的。”西蒙嘬了口茶说道，“他们的报应已经来了。你们知道戈培尔吗？”二人点头。“嗯，他常说，如果人有了权力，除非死了被抬出办公室，否则永远不会再放弃权力。嘛，现在希特勒死了，每个人都要去分一口。”一番话勾起了塔伊卡的兴趣，便要求西蒙说下去。“殖民地会发生什么？”西蒙一边把糖倒进茶杯里搅拌，一边继续说道，“啊，把德国想象成一个人，一个踩在所有人脖子上的人。非洲、俄罗斯……波兰，都被踩着。现在，德国先生精神错乱了。脑子里一团糟的时候，你就没法踩着别人脖子，对吧？我建议你现在开始看报，免得你到老被孙辈问六十年代的事又答不出来……”西蒙顿了顿，再嘬了口茶，咧嘴笑道："
 antarctica_aao_radio.200.a:0 "“因为事情就要大乱套了。”"
 antarctica_aao_radio.210.t:0 "妒忌"
 antarctica_aao_radio.210.desc:0 "约阿希姆度过了尤为漫长的一天，精疲力竭。冗长的巡逻过后，希特勒去世的消息犹如晴天霹雳，让本就累人的今天又蒙上了哀伤的气氛。挨到熄灯躺下的时候，他差点直接在床上昏过去。不过，约阿希姆的好奇心又驱使着他起身。他想知道世界上其他人是怎么想的，可一想到他们应该会弹冠相庆就不由得悲伤了起来。确定周围没人后，约阿希姆打开电台，花了不少时间把天线调到合适的角度。设备就位，他小心翼翼地开到FM104.5麦克默多站广播电台，结果瞬间就后悔了。扬声器里传来的并不是西方的靡靡之音，而是一个讨厌又醉醺醺的低等人在霸麦：\n\n“刚想起来个事大伙们——”正在那头播送的显然是个口齿不清的美国人，“我他妈是个波兰裔美籍犹太人，希特勒恨我的程度要超级加倍！哇——哦，真他妈操了，老子的命比他硬！”约阿希姆黯然神伤。他知道有几百万犹太人逃离了德国的掌心，再加上祖国现在的状态，或许这些人就永远抓不到了。不过，电台的声音再次把他拉回现实：“我今天过的挺好，现在晚上更好。晚上好，麦克默多站，希特勒死——啦！！”\n\n约阿希姆咒骂着关掉了电台，广播室重归寂静，整个新施瓦本也是一片死寂。他嫉妒对面电台那人。就算是低等人，他显然也是有朋友在广播站里的，或许还很暖和呢……反观约阿希姆，孤零零地坐在那，收到的家书也只是平添担忧。父母和妻子在信里写道，他们要逃去阿尔萨斯的避暑山庄，不论发生什么都要先隐居深山、远离人烟。困于冰雪，饥肠辘辘，权力斗争即将把他的家园打个粉碎，而这名孤独的雅利安人除了接受绝境，别无他法。"
 antarctica_aao_radio.210.a:0 "随后，他掩面而泣。"
 antarctica_aao_radio.220.t:0 "广播秀"
 antarctica_aao_radio.220.desc:0 "“哦！今晚的听众朋友注意了，接下来可是一条重磅消息：”西蒙把手里的稿子翻了两遍，好让声音传到麦克风里。“事情要大乱套了！”西蒙顿了顿，抿了口茶。他从来就不是喜欢喝茶的那种人，但顶不住塔伊卡和马修都在喝，某次豪饮一大口后便爱上了饮茶。西蒙继续播报道：“我会持续跟进播报世界新闻，不过在这之前得先来接点听众来电。阿根廷人也好，日本人也好，来者不拒。妈的，就算你是新施瓦本的也行，不过别因为和下等人讲话坏了事情啊。现在，让我们听听海岸警卫队最新一批送来的曲目。听众朋友们，十分钟后见。”\n\n十分钟后，西蒙从沙发上起身，一边打着哈欠尽力回味这短暂歇息，一边打开麦克风说道：“哇，好多来电啊！你们肯定有几个在熬大夜呢。线路一，请说吧！”线路那头传来一连串德语脏话，而后跟着一句：\n\n“你算个老几？！元首去世后还开派对？！”\n\n“别急别急，请问您贵姓？在从何处致电呢？为了听众起见——”对面直接用一句英文的“去你妈的大傻逼”打断了。西蒙没有理会谩骂，叹了口气继续说道：“好，好，兄弟，我还是不知道您的大名，先当您是从新施瓦本打来的吧。”\n\n显然，西蒙的这句话让德国人放松了警惕，但不幸的是，效果转瞬即逝：“哼……是啊。你们自认为安全无虞，看看消息就觉得赢面大了，但是……这只是一时之失罢了。不论最后出现什——”\n\n西蒙趁德国人开始怨天尤人的时候挂了电话。“真可惜啊，还是不知道他叫什么。”他很快稳住了阵脚，继续说道："
 antarctica_aao_radio.220.a:0 "“线路二，轮到你了。如果你是纳粹，我可就挂了啊。”"
 antarctica_aao_radio.230.t:0 "透过电波"
 antarctica_aao_radio.230.desc:0 "“嘿……美国先生？”约阿希姆怯生生地透过电台问道。\n\n“我操！是那个德国人，我真心以为你早就死了。别来无恙？”西蒙用播报腔问道。不过，德国人则听起来没那么好：\n\n“啊，差点吧。毕竟我还在和下等人通话呢。”二人都会心一笑。\n\n“很抱歉听到这个。说到你的祖国，我们彼此了解的都差不多，或许这能让你感觉好点。”西蒙评论道，“所以，何故致电麦克默多站电台？”\n\n约阿希姆环顾四周。广播室空空荡荡，必备人员睡得都早，而他则常常熬夜，自由行动，其中就包括比以往更频繁地收听麦克默多站电台。“用你们的话说就是……好奇心害死猫。谈谈你自己吧，我从来没见过任何波兰人、美国人或者犹太人。”\n\n德国人的一番话尽显脆弱。西蒙有些受触动，决定回应他：“嗯，我叫西蒙·帕斯凯维奇，我在费尔劳恩长大。那是位于新泽西州的一处小镇。参军之前，我在镇里纳贝斯科的糖果厂上班。那里还有一块巨大的足球场。下班后，我们会下去踢一两局。至于我的父母嘛，因为美国有亲戚，世世代代都住在那，所以他们出资帮助我父母移民了。三十年代移民美国真的很困难。迄今为止，我从来没见过任何波兰表亲，他们一个都没离开家乡。”\n\n约阿希姆靠到椅背上：“很高兴你们成功移民过去了，美国人。我的父亲在巴巴罗萨行动中牺牲了，我明白这种感受。”\n\n“这大抵就是我们的共同点吧。真奇妙啊，不是吗？”西蒙问道。"
 antarctica_aao_radio.230.a:0 "“还真是。”"
 antarctica_aao_radio.240.t:0 "绝非杜撰"
 antarctica_aao_radio.240.desc:0 "“嘿西蒙，我回来了。”\n\n正在处理文书的埃德蒙·希拉里簇地抬头。麦克默多站电台的听众来电环节一般都是站内其他人的主场，所以收音机里清晰的德国口音让这位勇敢的探险者大吃一惊。\n\n“哦！我们最爱的新施瓦本人怎么样了？”希拉里在震惊之余又对播音员展露出的熟识感到疑惑。他按捺不住好奇心，靠在椅背上仔细听着电台。\n\n“老实说，不太好。这或许是我最后一次呼你了。”除了叫喊声，背景里还有许多重物在地上拖过的刺耳摩擦声。显然是出了什么事。\n\n“操……发生什么事了？”西蒙的声音里有一丝担忧。\n\n“不知道。我们有个人出去小便后就再没回来了……全新施瓦本都在发生这样的事。有什么……或者有人切断了电力，我们正在筑垒防御。听着，西蒙，我知道我应该憎恨你，你肯定也恨我……但，我希望你能撑过去。”德国人和先前接入那般同样突兀地挂了电话。\n\n过了一会，收音机里再次传出音乐，只余希拉里抱着满腹疑惑走向雷伯恩的办公室。一路上，他想到了一件事："
 antarctica_aao_radio.240.a:0 "那肯定不是《世界大战》的情节……"
 antarctica_aao_radio.300.t:0 "幸运儿"
 antarctica_aao_radio.300.desc:0 "“真不敢相信，两帮法西斯在沙漠里掐架能搞得我开始怀念家里兄弟的生日了。”播报完阿尔及利亚战争的突发新闻之后，马修泄气地说道。西蒙报以一笑：“没准还能更糟呢——那就是你也跟着去打了！”\n\n马修明白这是在打趣，不过还真的花了一会思考：“是啊……糟透了。我意思是，没有自治权的你某天就被抓壮丁了，然后孤独地战死在沙漠里。”西蒙点点头，他清楚马修要把话题往低落的方向带是有原因的。“悲剧啊。事务局的每个人都是志愿来的，可南极其他人就难说了。”一直在聆听的塔伊卡也加入了谈话：“不过我得说啊，这种情况是可以催生出各种奇闻轶事给人们传颂的。”\n\n“确实，你和你的故事就是这样，塔伊卡。你爹在新几内亚躲了六个月后才搭上去悉尼的拖网渔船的故事一直让我们乐得不行。”塔伊卡对西蒙的锐评只是报以耸肩：“我能说什么呢，这可是个终生难忘的故事。看看雷伯恩中将，用管道胶带和祷词就跑出硫磺岛了！真想知道命悬一线是什么感受！”\n\n“看看周围吧，塔伊卡。我们在南极洲，全冷战最为酷寒的前线。我们欣赏过南极光。我们度过了不少艰难时刻。就世界走向来看，等到我们离开岗位的时候见识准能多到写本书。”西蒙把心中的冥思说了出来。然而，马修的回应却有些迟钝：“前提是能活到那时候。”\n\n始终乐观的西蒙快速回答道：“现在我想到，要不是我们父母走了大运，我们也不会在这里齐聚一堂了。你的父母从重庆逃了出来，我的父母则是逃离了波兰。他们都抛下了朋友、家人和亲戚，现在也只有他们活着了。我们，是幸运儿的后裔。”"
 antarctica_aao_radio.300.a:0 "小人物有大故事。"
 antarctica_aao_radio.310.t:0 "毋庸置辩"
 antarctica_aao_radio.310.desc:0 "马修深吸了一口气，时候到了。\n\n“晚上好，您正在收听的是FM104.5麦克默多站广播电台，很抱歉打断了诸位的音乐时间，但您或许会对接下来的这条特别新闻感兴趣。”\n\n西蒙和塔伊卡坐在马修后面，期待着他们的文稿能传到失意的听众们的耳边。\n\n“一小时前，我们得到证实，在阿尔及利亚沙漠展开了数月的交战后，伊比利亚联盟和意大利签署了一项和平条约。马德里方面一直紧握其殖民地不放，而现在，一个阿尔及尔的友好政权也将被其纳入怀中。”马特放下简短的新闻稿，伸手去拿事先准备好的报纸。\n\n“我们麦克默多站电台的工作人员认为，对于成千上万的逝者来说，这场战争的结果无关痛痒。在接下来的三分钟里，我们将列举这场战争中的一部分伤亡名单。他们中的许多人受征入伍，踏上战场，毫无怨言。为他们哀悼吧，他们本可以有不一样的人生。”\n\n广播发出时，雷伯恩正在军官休息室。令他惊讶的是，细语噤声了，桌球赛暂停了，甚至连吸烟者都掐灭了他们手中未尽的雪茄。麦克默多站里来自不同国家的人们都在为这一时刻默哀。这里的许多军官都曾在第二次世界大战中服役，有的是志愿出征，另一些则是应征入伍，但他们都知道战争的恐怖。他们是不是意大利人或伊比利亚人并不重要。此刻，他们一同沉默。"
 antarctica_aao_radio.310.a:0 "生命白白消亡，这就足够了。"
 antarctica_aao_radio.320.t:0 "毋庸置辩"
 antarctica_aao_radio.320.desc:0 "马修深吸了一口气，时候到了。\n\n“晚上好，您正在收听的是FM104.5麦克默多站广播电台，很抱歉打断了诸位的音乐时间，但您或许会对接下来的这条特别新闻感兴趣。”\n\n西蒙和塔伊卡坐在马修后面，期待着他们的文稿能传到失意的听众们的耳边。\n\n“一小时前，我们得到证实，在阿尔及利亚沙漠展开了数月的交战后，伊比利亚联盟和意大利签署了一项和平条约。一直以其海外领土为耀的罗马今天又增加了一位新成员：一个阿尔及尔的友好政权。”马特放下简短的新闻稿，伸手去拿事先准备好的报纸。\n\n“我们麦克默多站电台的工作人员认为，对于成千上万的逝者来说，这场战争的结果无关痛痒。在接下来的三分钟里，我们将列举这场战争中的一部分伤亡名单。他们中的许多人受征入伍，踏上战场，毫无怨言。为他们哀悼吧，他们本可以有不一样的人生。”\n\n广播发出时，雷伯恩正在军官休息室。令他惊讶的是，细语噤声了，桌球赛暂停了，甚至连吸烟者都掐灭了他们手中未尽的雪茄。麦克默多站里来自不同国家的人们都在为这一时刻默哀。这里的许多军官都曾在第二次世界大战中服役，有的是志愿出征，另一些则是应征入伍，但他们都知道战争的恐怖。他们是不是意大利人或伊比利亚人并不重要。此刻，他们一同沉默。"
 antarctica_aao_radio.320.a:0 "生命白白消亡，这就足够了。"
 antarctica_aao_radio.400.t:0 "简要说明"
 antarctica_aao_radio.400.desc:0 "“OFN南极洲事务局的朋友们，早上好啊！现在是南极时间早上八点整，同时还有一名特邀嘉宾莅临电台！里奇，问声好吧。”西蒙抽身让嘉宾透过电台向听众致意，“好的里奇，不如先来点自我介绍吧？以及为什么你今早自发来到广播站参加直播呢？”\n\n“没问题。我叫里奇·巴拉莱斯，隶属于研究极端环境下园艺学的科研团队。至于为什么我来到这里，因为我是一名自豪的多米尼加裔美国人，今天想来和大家讲讲家乡发生的事。”里奇娓娓道来。见状，西蒙后退一步，向他竖了竖大拇指，把位置让给了他。\n\n“嗯，这件事或许已经被掩盖了，但多米尼加共和国确实正在遭受进攻。过去三十年间，我的祖国一直是徒有其名的共和国。现任独裁者拉斐尔·特鲁希略长期推行‘人口漂白’政策，邀请伊比利亚人移民的同时不断驱逐黑人。为了能让各位直观了解情况，‘人口漂白’恰恰就是我父母对骚扰保持沉默的原因，因为他们在那受过更大的苦。”里奇看着手里稿子上的要点说道，“如此情形又引致了现况。特鲁希略倚仗着伊比利亚联盟的经济援助施政，然而三头同盟崩溃，伊比利亚被迫将重心放在内政上，这位独裁者便只能独自面对非常、非常生气的美国了。”里奇深吸一口气，继续说道，“完全由流亡美国的多米尼加裔组成的加勒比军团就据此成立。好了，这就是故事的全貌了。我的朋友西蒙会持续跟进。同时，一切顺利的话，我们会像过新年一样开派对庆祝。”"
 antarctica_aao_radio.400.a:0 "说完，红色的“正在直播”指示灯熄灭了。"
 antarctica_aao_radio.410.t:0 "夜间新闻"
 antarctica_aao_radio.410.desc:0 "自从加勒比军团登陆海地岛后，加芙列拉·巴拉莱斯每天都在惊惶中度过。她住在迈阿密，但青年时期逃离多米尼加共和国的情景仍历历在目。加芙列拉刚刚上完医院晚班到家，晚饭放在台子上，铝箔纸包着的晚饭还有余温。\n\n加芙列拉戒烟很多年了，但故乡发生的紧张情况让她破了次戒。她点上一根纽波特香烟，紧绷的神经在尼古丁的作用下逐渐放松。\n\n然而，电话铃打断了宁静一刻。她叹了口气，接起电话。\n\n“你好啊老妈，近来如何？”\n\n加芙列拉听到儿子的声音，嘴角不禁微微上扬：“哦，是亲爱的里奇啊。我还好，只是……压力有点大。”\n\n远在南极洲的里奇也露出了微笑。显然，家母尚未听闻消息。他说道：“我要挂了，打来只是想让你打开电视看新闻。相信我，你会喜欢的。”\n\n沉默再次袭来。加芙列拉关照好儿子后，挂上了电话，从微波炉里拿出晚饭。她备好餐具，用遥控器把电视开到哥伦比亚广播台。瓦尔特·克朗凯特的面容浮现在眼前，而画面下方一行大写的新闻标题让这位母亲如释重负："
 antarctica_aao_radio.410.a:0 "“特鲁希略政府投降，军团得胜”"
 antarctica_aao_radio.420.t:0 "暖心"
 antarctica_aao_radio.420.desc:0 "自从加勒比军团败于特鲁希略政府后，里奇·巴拉莱斯感觉心里空空如也。他的家庭再也回不到多米尼加‘共和国’了。所有未能撤出海岛的加勒比军团士兵，现在大抵都在九泉之下了，自己能干的也只有像没事人一样日复一日地工作。\n\n南极一个平常的星期二，里奇正在一处寒冷的机库内埋头苦干。他从一架塞斯纳飞机旁探出头，看见西蒙站在前面，便推了推眼镜问道：“西蒙，你到这里来干什么？你不是要干电台的活吗？”\n\n西蒙答道：“其他人在做维护，现在只是来说我们在你的床上留了点惊喜。我们知道你最近有些失落，换做我也一样的。兄弟，希望你能心情好点。”\n\n温暖的善意冲破刺骨严寒，直达心底。里奇起身微笑道：“感激不尽。我肯定会看看的。”\n\n几小时后，里奇下班了，对西蒙所说的惊喜兴奋不已，多米尼加的事尽数抛诸脑后。打开寝室门，礼物果然没有令他失望："
 antarctica_aao_radio.420.a:0 "一瓶上好的金宾威士忌正静静地躺在他的床上。"
 antarctica_aao_radio.500.t:0 "雅加达来报"
 antarctica_aao_radio.500.desc:0 "马修揉着太阳穴，再抿了口咖啡。他不断眨眼，努力不让眼皮打架。“天呐，为什么是夜班。”马修向空气抱怨道。他就着加热器单调的敲击声无精打采地顶着时钟。就在眼睛又开始闭上地时候，电话铃声又把他拉了回来。\n\n“早上好，这里是麦克默多站电台——有病啊这个点打来。”马修一边接起电话一边暗自抱怨道。不过，另一头的人不卑不亢地说道：\n\n“印尼政府正在崩溃，日方很有可能介入，或许会导致……导致——”\n\n“内战。”马修悲伤的接过话茬。电话通了快半个小时才结束，马修挂上电话后又是孤身一人。他对印尼了解不多，但对日本人那可谓了如指掌。至少，父母对这些人描述仍是记忆犹新。思考到这里，马修不禁想知道又有多少家庭要重蹈覆辙、带着惶恐背井离乡呢？\n\n睡觉是不行的，所以马修再烧了壶咖啡，准备好晨间广播。事务局必须了解此事。人们必须知道此事。"
 antarctica_aao_radio.500.a:0 "如果OFN成功了，或许就没人需要再去逃离家乡了。"
 antarctica_aao_radio.600.t:0 "征服钱海"
 antarctica_aao_radio.600.desc:0 "“哦，我的天……真的吗？你确定？五角大楼的消息？！”西蒙来回踱步，电话线随他忽上忽下地摆动，“好吧，好吧，把传真发过来。”马修坐在另一头，焦急地吃着速冻餐。西蒙挂断了电话，马特随即望向了他。他正要询问谣言是否属实，但突然响起来的电话传真向他解释了一切，“塔伊卡去哪了？”他卷起一叉意大利面问道。\n\n“他正和家里人通电话，他哥哥在休假途中被召回了基地，和南非发生的事情全对上了……”马修放下刀叉，从传真机中取出电文，他逐字逐句地翻阅着报告，心中的焦虑和不安随之蔓延开来。“我……也得给我哥打个电话。”他那健康的肤色现在通红无比。\n\n电台里只剩下西蒙独自一人了。他抓起文件，走向麦克风和总机。幸好他只有一位姐姐，这让他安心了不少。\n\n“下午好，南极洲，现在是当地时间2时30分，下面插播一条特殊新闻。截至11月22日，从温得和克起飞的轰炸机已经进入南非领空，七座主要城市遭到轰炸，炮火已经越境发射了数小时，但非洲之盾尚未正式宣战。很多评论认为，这是对南非镇压自称阿非利卡人民邦的布尔人叛乱的报复行动。当前局势尚不清晰，OFN方面定于今晚召开会议，讨论干预措施。由于德国目前无法提供任何援助，可以确信OFN将尽心竭力，捍卫非洲最后的民主，”西蒙深吸了一口气，他突然感觉自己需要呼吸点新鲜空气了。"
 antarctica_aao_radio.600.a:0 "“现在继续为您播报定期节目。”"
 antarctica_aao_radio.610.t:0 "南极光"
 antarctica_aao_radio.610.desc:0 "马特、塔伊卡和西蒙在麦克默多站食堂边上坐下。基地里几乎每个人都幸运地挤在那该死的座位上，而其他人不得不席地而坐。屋外，南极光在夜空中叱诧风云，对地上凡灵的挣扎漠不关心。西蒙向窗外瞥了一眼，他真的好想……走神。然而，此刻他的堂兄塞缪尔正被运往南非。西蒙记得他曾和他那在海军陆战队服役的兄弟争论过，“你总是第一个上战场！”“我知道，所以我才加入他们。”塞缪尔反驳道。西蒙迅速回到现实，开始听雷伯恩的简报。\n\n“我知道你们都很关心南非，所以我就直说了。南非与其邻国们已经处于战争状态，非洲之盾公然企图消灭非洲最后的民主。”马特叹了口气，这个已经人尽皆知了。他真正想知道的是，他高中时的心上人莉齐是否安全。在每个寒冷的夜晚，他仍然想着她。她是他的初吻，他的第一次。尽管她来自一个臭名昭著的种族主义国家，但她从来不在乎他是个亚洲人。马修叹了口气，想回头看看胡言乱语的老将军，却发现讲话的人已经是霍华德·比尔了。\n\n“截至上个月，自由国家组织已经召开会议，并以压倒性多数投票支持干预南非战争。一些部队已经加入了战斗。”塔伊卡在外套口袋里摸到了他哥哥基亚的信。他在开往伊丽莎白港的船上。第一个新西兰人已经阵亡，他知道在战争结束之前还会有成千上万的人牺牲。“请放心，你们中没有人会被转移到南非，但如果你们中的任何人有朋友或家人在那里战斗，我们将尽最大努力协助沟通。”\n\n演讲以埃德蒙·希拉里致闭幕词结束，然后大家解散。电台工作人员在小屋里重新集结，他们一起默默地吃着从自助餐厅里偷来的点心。西蒙把剩菜收拾起来后，对他的朋友们说了一句简单的话："
 antarctica_aao_radio.610.a:0 "“我们都被卷进去了……对吧？”"
 antarctica_aao_radio.620.t:0 "圆满落幕"
 antarctica_aao_radio.620.desc:0 "*叮*\n\n“马蒂？”莉齐简直不敢相信她的眼睛，马修也是。就在一瞬间，她把他拉了进去，急切地牵着他的手，把他领进自己的房间。几个小时后，夜幕降临南非，这对重聚的恋人漫步在小镇沃斯堡，重温各自的生活。这是为数不多未受战争影响的城镇之一。最后，他们来到了镇上的教堂。两人在教堂的台阶上坐下，马修从胸前的口袋里掏出烟来。\n\n“也给我一根，马蒂，”他们一起点燃了香烟。火焰燃起，聊天也随之开始，“我每天都在想你，每天都看新闻，看看他们是否会进驻沃斯堡。直到他们进军中非，我才放下心来。”虽然马特没看见，莉齐却涨红了脸。\n\n“在回家以后，我试着找个什么人，但南非男人都太野蛮了。马蒂，你个大软蛋，即使穿着这身制服，你也是个大软蛋。”马特笑着回应道，“那在部署期结束后，你会让这个大软蛋牵着你的手步入婚姻吗？我会用退伍军人权利法案的钱在澳洲内陆买一栋大房子，这样我们就能组建一个大家庭了。”\n\n“哦，马蒂……但是……我的父母。他们永远不会同意我们的……”莉齐让马特把头靠在她的腿上。“来吧，莉齐，让你的父母见鬼去吧。我们都差点永远失去彼此。我不能再那样活着了，你也不能。我们不能独自度过一生。我们都活下来了，这是何等的幸运，趁还有机会，把握住我们的幸福结局吧。”马修瞥了一眼墓地，莉齐也看了一眼。“所有人都去打仗了，有五个再也没回来……”莉齐的声音越来越小。她真的很幸运。她的父母会同意的，只是时间问题，尤其是等她有了孩子之后。她在他的额头上轻啄了一下，“我爱你，马蒂……放手做吧，我们结婚吧！”"
 antarctica_aao_radio.620.a:0 "“我也爱你，莉齐。”"
 antarctica_aao_radio.630.t:0 "紧要之战"
 antarctica_aao_radio.630.desc:0 "“他们说你可能要离职了……你在想什么？！”\n\n马特笔直地坐在床上，病房里寂静无声，只有他和塔伊卡。马修叹了口气，揉了揉前臂上的绷带。他也不知道自己在想什么。“当我听说开普敦沦陷的时候，一切都结束了。嗯……有一个在澳大利亚住了一个学期的南非女孩，她在珀斯时，我们几乎形影不离。她……没能活下来，塔伊卡。她的小镇被屠杀了……”塔伊卡理解他的心情，他什么都没做，就只是坐在马特身边，听他说话。\n\n“我不会走的，相信我，伙计，豪伊·比尔亲口说的。”马特喝了一口水，润了润他干涩的喉咙，“西蒙哪去了？”\n\n塔伊卡叹了口气，“他必须回一趟美国……他的一个兄弟在比勒陀利亚中枪了。他们允许他回去探望。他说他会从旧金山给我们寄明信片的。”\n\n马特从床上爬起来，伸了伸懒腰，塔伊卡听到了马特卧床不起几天后脊椎咔咔作响的声音。那感觉一定很舒服。马特毫不掩饰地展示了他手臂上的绷带，接着掰了掰指节。他深吸了一口气，又扑通一声倒回床上，“我不知道该说什么，塔伊卡。我也不是抑郁了或是别的什么的，也许我是……我只是……这真的好绝望，就像我们输掉了一场重要的战争。”\n\n塔伊卡点点头，“我相信我们的父母辈当年也是这样想的，但你得退一步想想。新西兰还在，澳大利亚还在。一切都会好起来的。”\n\n“你怎么能这么肯定?”\n\n“我保证不了什么，但如果你就这么走了，你怎么知道接下来会发生什么呢？就算是为了逝者，我们也应该看看未来会怎么样。”塔伊卡笑着说。"
 antarctica_aao_radio.630.a:0 "“说得好，塔伊卡。说得好啊。”"
 antarctica_aao_radio.700.t:0 "认知不谐？"
 antarctica_aao_radio.700.desc:0 "亲爱的基亚，\n\n我不知道该怎么想，兄弟。西非的这场冲突使我和我的伙伴们意见相左。他们非常坚定地支持戴高乐，但我不得不承认，泛非主义者们真的在进行一场崇高的斗争。我不能太直白地表达我的意见。我们不喜欢谈论它，以免引发争吵。\n\n虽说这是站在反对德日帝国主义的立场上的行动，但这还是让人觉得虚伪。在地球的这一边武装自由战士，同时在另一边武装殖民者。看看塔斯曼海对岸的原住民仍在经历的事吧，还有日本人对我们在斐济的表亲们的所作所为。我们确实被暴行压迫过，但这些都是我们祖辈的祖辈们为他们讲述的往事，而不是每天切实发生的事情。议会里也有毛利人，我们已经参与投票近一百年了。\n\n无论西非发生了什么，总会有比战争更好的方法来解决的。我们就是最好的证明。压迫和剥削永远带不来好结果。我觉得在与朋友们展开另一场争论之前，我应该再多做点研究，但每份报纸都严重偏袒法国人。我甚至去问了一些黑人士兵，但他们根本一点都不在乎西非，除了利比里亚。\n\n兄弟，请记得给我回信，我交了一些非常好的朋友。我也不想因为几次微不足道的争吵就失去他们，我不想去考虑这些事情了。世界实在是太繁杂了，我好怀念我们的世界还没有旺阿罗阿大的时候，那次奥克兰的旅行。"
 antarctica_aao_radio.700.a:0 "爱你的，塔伊卡。"
 antarctica_aao_radio.710.t:0 "虚妄的泛亚主义"
 antarctica_aao_radio.710.desc:0 "“要不是为了看这日出，我永远不会起这么早。”正在和兄弟准备甩渔网的塔伊卡评论道。父亲正在尽职尽责地切鱼饵，塔伊卡便借着这个短暂的空当从辛苦的劳作中暂时抽身，点了根香烟，基亚见状陪了一根。父亲盯了他们一会，但最后还是放两个儿子休息了。\n\n尼古丁带来的愉悦感涌了上来。眺望远处，微风拂面，日出之景美如画。休憩时刻能欣赏如此美景，想必会羡煞旁人。可惜的是，电台呼叫声把他们从海上仙境拉了回来。\n\n“我去接。”塔伊卡漫步走向小小的舰桥。里面除了电台和舵轮之外，还有其他一大堆装备。他再吸了口烟，拿起连接电台的对讲机回答道：“这里是莫尔斯比，收到。”\n\n“请注意，这里是新西兰海岸警卫队，我们收到了关于日方在该区域内违法捕鱼的报告。除了跟着他们，我们无能为力。今年或许要歉收了。只是提醒你一下。”电台那头的人实话实说道。“好，谢谢，还有别的吗？”塔伊卡问道。“没了兄弟，注意安全。”语罢，塔伊卡的人生也迈入了下一篇章。\n\n渔业原本是旺阿罗阿的生命线，长久以来欣欣向荣，可日本人跑来随心所欲地捕鱼，摧毁了这一切。那次通话几周后，家里的托底钱彻底花完了，基亚和塔伊卡双双参军才算是勉强维持了下去。可以说，塔伊卡亲身体会到了帝国主义的阴险之处。泛亚主义的谎言诱人堕落，逐渐吞噬了他那垂死的家乡。从那时起，塔伊卡就能深刻体会到泛非主义者进退两难的困境："
 antarctica_aao_radio.710.a:0 "被压迫者往往会变成压迫者，而非为了解放努力奋斗。"
 antarctica_aao_radio.720.t:0 "《马赛曲》"
 antarctica_aao_radio.720.desc:0 "“前进，祖国的儿女！”电台中传出激昂的马赛曲开场歌词。马修、塔伊卡和西蒙各自拿着一大杯爱尔兰咖啡，一齐举杯后坐回到老旧但舒适的沙发上。\n\n“兄弟们，开喝。致自由、平等和博爱。”西蒙举杯喝彩后嘬了口咖啡。马修跟着干了，唯独塔伊卡只是小心翼翼地抿了一口。\n\n“咋了，塔伊卡？”马修尽可能不让自己的问询显得讽刺。\n\n“我知道该庆祝，但就是做不到……我还没有告诉你们参军的理由。”一句话让马修和西蒙闭上嘴准备聆听，“日本人在我村子附近过度捕捞，经济命脉全毁了。法国人这码事也是一个道理，是赤裸裸的殖民主义行为。就是感觉有问题。我们将自由战士武装了起来，转头又在为压迫者提供武器。”塔伊卡再嘬了口咖啡，另二人仍保持沉默。塔伊卡觉得会被反驳，但惊奇地发现他们还是在听。\n\n“我相信OFN的所作所为。或许我只是迫于现实而参军，但一路下来，我理解了这场斗争的重要性。摸着良心说话，我不能忽视这种道貌岸然的行为。我们应该是最后的自由之光，不能把资源花在支持殖民地上……就算是临时措施也不行。唉，我不知道。全都结束了。”塔伊卡娓娓道来。\n\n“兄弟，我欠你个道歉。当初吵架之前该先好好听你说的。”马修连连道歉。\n\n“没事没事，只是……”塔伊卡微笑道，"
 antarctica_aao_radio.720.a:0 "“谢谢你们听我坦白自己的事。”"
 antarctica_aao_radio.730.t:0 "友谊尚存"
 antarctica_aao_radio.730.desc:0 "“说，都可以说，”西蒙播完新闻后满是怨气的向塔伊卡说道，“说什么，啊，‘早就告诉过你们了’，来，打我们的脸。来啊，塔伊卡，你有权这么做。”话语之间满是讽刺。\n\n“我不会……西蒙，这他妈不是什么板球赛。人死了，父亲、儿子，都命丧沙场。光这么说我就会感到受侮辱。”塔伊卡平静地反驳道。\n\n“别搁那目空一切了。你可能没展现出来，但我知道你脑子里就他妈是个自负的伦敦佬。”马修的语气里满是怨恨。塔伊卡叹了口气，拿上夹克冲出大门。他要去睡一觉消气，然后早上再来和好。\n\n次日清晨，三人聚在广播站棚屋里，各自无言地倒上茶和咖啡。足足沉默了十二分钟后，西蒙开口说：“塔伊卡……”\n\n“不必多言，西蒙。昨晚我们都昏头了。”\n\n“是啊……我在想，或许这一切还是有点可取之处。非洲人……至少一小部分非洲人，掌握了自己的命运。那肯定也算得上是成就的。”\n\n静静品味着手里红茶浓厚香气的马修没有开口，只是点了点头：“别想了，这里的事情要比和我们毫不相干的傻逼战争重要的多。”\n\n塔伊卡点点头，欣慰于理智占了上风，高兴于三人的友谊保住了。"
 antarctica_aao_radio.730.a:0 "“愿老天保佑吧。走，吃饭去。”"
 antarctica_aao_radio.800.t:0 "几礼拜如几十年"
 antarctica_aao_radio.800.desc:0 "“这里是麦克默多站电台。我是今晚的主持人，马修·周。一般来说，这个时候我们会把送来的消息称为特殊快报，但综合‘特殊快报’的频率考虑，不如直接叫‘快报’就行。”马修喝了一大口茶，然后继续播报，“上周，五角大楼批准了‘特别介入’马达加斯加叛乱的方案，目前正向该岛派遣部队。”\n\n马修深呼吸了一下，盯着麦克风桌。上面乱糟糟的，到处都是咖啡渍和面包屑，还有一大把混杂垃圾文件的文件夹。不过，那里还放着一封光亮整洁的信。那是他兄弟汤米寄来的信，后者已经登陆马达加斯加了。马修每天都在焦虑中度过，担心会接到“那个”电话。\n\n“我的哥哥隶属于前往马达加斯加战斗的部队之一。我们希望全体士兵能快速得胜，漫步于胜利游行。”\n\n播报完毕，电台今晚的直播便伴着台歌结束了，回归到平常的音乐节目。马修在紧张中最后再抿了口茶……"
 antarctica_aao_radio.800.a:0 "……而后倒在沙发上沉沉睡去。"
 antarctica_aao_radio.810.t:0 "信件传入"
 antarctica_aao_radio.810.desc:0 "马修·周先生，南极洲麦克默多站\n\n二等兵马修·周，\n\n在此非常遗憾地通知您，我师的一员、您的兄长托马斯·周下士，于[?global.date.GetDateStringNoHourLong]在马达加斯加的一次交火中失踪了。\n\n语言无法表达我们对您哥哥失踪的感受，他在队伍里相当受欢迎。我们可以自豪地说，我们是他的战友。我们将永远把他当作我们部队中的一员。\n\n如果您能得到从他那里传来的任何消息，我们都将不胜感激。我们真诚地希望您能在不久的将来与他团聚。我们将随时向您通报他当前的最新状态。\n\n您忠诚的，乔尔·格拉比纳少校"
 antarctica_aao_radio.810.a:0 "无论何时，失踪永远比阵亡好。"
 antarctica_aao_radio.820.t:0 "通用汽车"
 antarctica_aao_radio.820.desc:0 "“是我想的那一位吗？”汤米从病床上坐了起来，惊讶地看到一张熟悉的脸正透过门缝向内窥视。很明显，那不是他的父母。\n\n“我敢打赌，这是南极洲最好的杯子！”马修拉过一把椅子，把麦克默多站的马克杯放在汤米的桌子上，“从自助餐厅顺的，愿你早日康复。”\n\n“奶奶的，我真不知道我啥时候能好起来。他们从我那该死的腿上挖出来一块通用汽车的碎片。哦还有，你看看这个，一颗子弹‘嗖’地穿过我的耳朵！我还以为死定了，结果我还是逃了一命。说实话挺伤心的，我还以为天堂就在马达加斯加呢！”汤米转过头，露出了一道伤疤，作为他幸运的证明。然后他慢慢抿了一口水。\n\n“我在那边呆了有一段时间了，挺喜欢那里的，但离开该死的南极洲放放假也挺不错。”马特亮出了一瓶威士忌，他的兄弟却只是咧嘴一笑。\n\n“那边怎么样？我听说你在那个小电台里交了不少朋友。”汤米朝走廊望去。马特为他把着风，他随即灌下了一大口威士忌。\n\n“这真的是独一无二的体验。现在我可以和人们吹我去过南极洲了！我们在做一些很伟大的事。我们要么坐在无线电棚里，要么就在寒风中踢足球。哦对了，我们还有很多茶。和我一起工作的美国人西蒙，也被我们熏陶着开始喜欢上了茶。”马特热情地向汤米讲述着这永冬边疆上发生的故事。汤米一边听，一边瞥了眼时钟，是时候吃止痛药了。他正要打断他的兄弟，伸手去拿瓶……他突然呆住了。"
 antarctica_aao_radio.820.a:0 "汤米深深地为之着迷，甚至忘却了腿上的伤痛。"
 antarctica_aao_radio.830.t:0 "阵亡"
 antarctica_aao_radio.830.desc:0 "珀斯风和日丽，周家也并没有怎么为冬天所扰。于是，他们便借着好天气开车去蒙达林州立公园徒步了。那年，是1949年，小儿子马修只有五岁，大儿子托马斯九岁，二儿子吉米则是七岁。父母走在很前面，给三兄弟留了足够的交流空间。\n\n“汤米。”马修看向兄长说道，“啥事？”托马斯有些恼火于弟弟打破了这份宁静。“爸爸妈妈为什么老要徒步啊？”马修气喘吁吁地问道。他个子小，得花不少力气赶上旁人脚步。\n\n汤米思忖了一下。虽然年纪尚小，但他知道为什么父母这么喜欢安静的环境。绝大多数晚上，他都能偷听到父母谈论种种关于重庆噩梦般的回忆。作为家中长子，托马斯有义务不让小兄弟们知道这些事情，还得给他们讲故事，而他讲出来的确实足够能让吉米和马修回床上睡觉。“爸妈在重庆住过，那是一个很吵的城市……这就是为什么他们这么喜欢安静的环境。”托马斯牵着马修的手，防止后者掉队。“但珀斯也很吵啊！安德森姐姐的猫让我睡不着。”马修反驳道。\n\n“那重庆就像是有一百万只安德森小姐的猫一起叫。想想看那有多吵！”汤米见马修跟不上，便把他抱到肩头背了起来。三兄弟边走边聊，一路走到了黄金观景台。从托马斯的视角眺望远处，风景十分怡人，但对于还坐在他肩上的马修来说，可谓是绮丽万分。\n\n十三年后，托马斯从马达加斯加仰望天空，满身枪伤，鲜血不断从伤口涌出。他希望家里人不要太想念他。思绪又回到了那次在蒙达林的徒步，甚至还感到了肩上背着马修的重量。"
 antarctica_aao_radio.830.a:0 "随后，托马斯便什么也感觉不到了。"
 antarctica_aao_radio.840.t:0 "拉撒路"
 antarctica_aao_radio.840.desc:0 "“好了，我会搞定的，赶紧挂了，现在我要静静。”雷伯恩挂上电话叹了口气。他起身倒了杯酒，关掉办公室灯，随后坐回到椅子上，打开电台。这是雷伯恩一天中最享受的时间，听听音乐，眺望窗外，欣赏罗斯海的日落，好生快活。\n\n歌曲一首接一首，酒一口接一口，行政工作的压力也慢慢消散了。这些都是明天的问题了，而现在，他只是一名在平静的海面上航行的海军提督。歌曲放完后，紧随而来的便是美国军队南极广播熟悉的开场曲。\n\n“美国军队电台——”开场曲声音慢慢变小，取而代之的是澳洲口音播音员令人舒心的声线：\n\n“晚上好，这里是马修·周，我是今晚的主持人。我们先来听一些振奋人心的消息。听众朋友们，奇迹发生了。我的兄长被派驻马达加斯加后失踪了两个月，但昨晚又被找回来了，安然无恙。我甚至都已经接受了永远找不到他的事实了。这说明，一切事情直到彻底画上句号之前都不算结束。与之相关的是，自由国家组织已在马达加斯加取胜，建立起了托管领，以此引导新生国家走上……”\n\n听着电台主持人收到的好消息，雷伯恩回忆起了当汉考克号舰长的日子。两千五百人乘坐汉考克号离开了硫磺岛。那天，许多人都失去了自己的父亲与儿子。诚然，心惊胆战的母亲们仔细阅览报纸，等待着至亲的阵亡通知电报，但对于那些挤进船舱的陆战队、水手和空军士兵的家室来说，如此的电报永远不会到来。"
 antarctica_aao_radio.840.a:0 "他们如拉撒路一般起死回生。"
 antarctica_aao_radio.900.t:0 "你欠我二十块"
 antarctica_aao_radio.900.desc:0 "“你刚传真过来什么东西？证实了对吧？”\n\n电话那头的人肯定开始叫唤了，因为房间那头塔伊卡都能听见叫喊声。\n\n“好了好了，我明白，快他妈滚吧！”西蒙沮丧的挂上电话。塔伊卡刚想开口，西蒙就先说了：“我欠马修二十块，他猜中安田危机之后会乱套。你来做这条快报，现在我没法上播，抱歉，塔伊卡。”\n\n话音刚落，西蒙就冲出了房间，只余塔伊卡一人留在房内。他叹了口气，拿起稿纸开始播送：\n\n“下午好，现在是当地时间下午四点，我们中断编排节目特此播报一条特殊快报。昨晚，菲律宾游击队和美国大兵发起了巴林塔瓦克闪击战。近期，安田危机造成的经济震荡对全共荣圈产生了深远影响，许多先前在公众视野之外的叛军都将其是为发动突袭的机会。虽然意识形态上势不两立，但[SPH.GetLeader]和路易斯·塔鲁克已经搁置分歧，决定将共同的敌人驱逐出去，许多年前，美军撤出菲律宾时，道格拉斯·麦克阿瑟发誓他一定会回来。”塔伊卡深吸一口气，想到了一句优雅的话："
 antarctica_aao_radio.900.a:0 "“愿命运女神垂青此誓。”"
 antarctica_aao_radio.910.t:0 "人皆有罪"
 antarctica_aao_radio.910.desc:0 "“我们本来不想告诉你这些……但现在是时候了。”马修的母亲周柳双手端着一杯绿茶，食指微微颤抖。马修和父母一同坐在餐桌边，仍在回味巴林塔瓦克闪击战失败的消息。\n\n“事情是从杨叔上门开始的。他从陆军里逃出来，拎着一桶油和偷来的给养跑来警告我们。当时，我们还不知道情况有多危险……军队不想要难民堵住公路，所以……”父亲周晓操着颤抖的声音解释了一句，随后便退出了房间。母亲继续说道：“我们尝试说服父母一起离开，但他们拒绝了。当时，汤米还是个婴儿，所以我背着他，然后你爸拿上家里的步枪和能撑一段的吃食，就赶紧逃跑了。”\n\n父亲冷静了下来，回到了房间里聆听谈话。“我们开了几个小时的车，太阳下山后轰炸就开始了，没完没了地炸。不过，我们还是比日本人快很多。这之后的事情有点难以启齿，但我们确实是一路搜刮外加抢劫才到昆明的，当时那里还没完全乱套。”母亲摇着头说道，似是想要忘却去昆明的旅途，“到了昆明，我们把车当给了某个自作聪明的傻瓜，用换来的钱打通关节，终于坐上了去泰国的火车。直到抵达清迈，我们才听闻具体发生了什么。重庆就好像从来没存在过一样。朋友、亲人，我们熟知的一切就这么没了。”\n\n马修百感交集，为了生存，父母抢劫、搜刮……甚至可能杀了人，不安与烦躁瞬间涌了上来。父母看到马修的表情，羞愧地低下了头。“马修，我们和你说这个，是因为现在菲律宾人也可能会两手空空地逃来这里，在街上乞讨，甚至可能会动手抢劫。但是，不要忘记他们仅仅是为了走到这里而经历的风雨，那些人比你更需要支持。”母亲用恳求的语气说道，“儿子，向我保证，好好对待他们。”"
 antarctica_aao_radio.910.a:0 "“嗯，我发誓。”"
 antarctica_aao_radio.920.t:0 "脱线"
 antarctica_aao_radio.920.desc:0 "德怀特·赛克斯痛恨站哨，尤其是在今晚这样的场合站哨。OFN南极洲事务局用尽每一个借口开派对，这一次也没什么不同。德怀特读过新闻了，心想：又如何呢？菲律宾人解放了自己，日本当局还是活着，没准下个月就又进驻马尼拉了。\n\n之所以一开始就自愿站岗，是因为德怀特总是一副阴沉的样子。站点里每个人都知道德怀特是一名严厉的中士，他也得保住这个人设。不过，这还是有好处的。大家都在开派对，那么食堂的电话就会空着，他可以电话打到家里，花上几个小时和亲人聊天。只要把班次熬过去就行了。\n\n不过，一股刺鼻的味道把德怀特从思绪中拉了出来。肯定是那个熟悉得不能再熟悉的地方飘出来的，毕竟，这点味道可骗不过纽瓦克长大的德怀特。“看上去有人今晚嗨翻天了。”他喃喃道。没过多久，德怀特已经循着味道找上了广播站。他把手搭在门把手上，扭动了一下。\n\n门开了，房内瞬间沉默。德怀特认出了其中一名美国人，后者大喊“立——正”，东歪西倒的三人立刻弹了起来，尽全力原地站稳。德怀特权衡再三，选择今晚还是大度些：“稍息，先生们。别嗨过头成习惯了就是。”"
 antarctica_aao_radio.920.a:0 "就算是德怀特，他也知道没人喜欢铁板一块。"
 antarctica_aao_radio.930.t:0 "无感"
 antarctica_aao_radio.930.desc:0 "大卫·马尔斯掸去衣服上的残雪，直接躺到了床上。他一手抓过收音机，调到FM104.5，随后再把它放在床头柜上。在这冰封前线劳累一天后，就着电台好好打个盹可是再好不过的休闲娱乐了。\n\n今天的音乐质量一直很高。放克、流行歌，甚至民俗歌曲都十分悦耳动听。就在疲惫的马尔斯快要进入深度睡眠之时，音乐戛然而止。他咕哝着睁开眼，调整下枕头，准备听电台插播他们觉得重要到可以掐掉音乐时间的新闻。\n\n“晚上好，这里是FM104.5麦克默多站电台……”电台主持人滔滔不绝地说着开场词。马尔斯能听出来他是个澳洲人，或者新西兰人。“快点说吧！”马尔斯抱怨道。\n\n“我们接到消息称，日本帝国陆军第十四军已重返菲律宾。不错，日军在行动高效、当地人自称的‘巴林塔瓦克闪击战’中落败并被迫撤出吕宋岛后，不出数周又再次投身于战火之中——”大卫叹了口气，想要再转一下注意力，但仍禁不住回味新闻。\n\n“分析人士认为，若驻菲美军和菲律宾社会主义者组成的脆弱联盟能够最后再击退一次日本人，日方就会放弃。目前，我尚且无法详细报道局势，但能肯定地说，双方都在全力以赴。”新闻报道还在继续……"
 antarctica_aao_radio.930.a:0 "但马尔斯已沉沉睡去。"
 antarctica_aao_radio.940.t:0 "流放之影"
 antarctica_aao_radio.940.desc:0 "“凯文·德尔加多-卡斯蒂略，隶属美国海军陆战队；纳塔涅尔·蒙罗，隶属美国海岸警卫队；亚当·廷斯利，隶属美国陆军游骑兵；约瑟夫·德古斯曼，隶属美国……”\n\n西蒙口干舌燥。他已经花了一整天播报在日军针对菲律宾的报复性入侵中的阵亡将士名单了。美军已尽其所能疏散部队，但仍是心有余而力不足。西蒙拿着厚厚一叠播音稿，每一张稿纸上都写了几百个姓名。他决心要一个个名字念过去，拒绝了同僚一切茶歇的提议。\n\n塔伊卡讨厌听到那些名字，于是便站在门外抽烟。名单记录的每一个人都有自己的故事、自己的人生，仅仅因为日本人不能好好退场而草草画上了句号。他吸了口烟，看见一个神秘人在面前走过，停了下来。神秘人掏出一包香烟，抽出一根叼在嘴里。向来绅士的塔伊卡帮他点上了烟。神秘人是谁？他一直在那吗？\n\n“今天不容易啊，是吧？”神秘人边抽边说道。另一边，塔伊卡也没能听出他的口音。\n\n塔伊卡点了点头：“是这回事。我们输了，输得很惨。”\n\n神秘人也点头：“我想也是，不过看看这夕阳吧。就算天崩地裂，还是能欣赏夕阳的。”塔伊卡听了男人的建议，凝视着地平线上的半轮红日。夕阳挂在天边，静静地洒下澄红色的余晖。几分钟后，塔伊卡抽完了烟，才意识到刚刚攀谈的神秘人已经消失了。他太沉浸于日落美景，都没注意到旁人动作。\n\n那晚，塔伊卡翻遍了军营，却还是没找到一起抽烟的那位神秘人。"
 antarctica_aao_radio.940.a:0 "流放地与异乡人的沟通之道，远不止此。"
 antarctica_aao_radio.950.t:0 "嗨翻了"
 antarctica_aao_radio.950.desc:0 "今晚的麦克默多站已经不是“混乱”一词能形容的了。几百名筋疲力竭的士兵、水手和科学家挤进本就人团攒动的食堂，手里各自拿着跨洋运来的啤酒、配给箱甚至走私毒品。\n\n电台三人组挤到空着的一小块桌边，营地外围寒风呼啸的声音甚至都被周围的狂热气氛淹没了。\n\n“所以，你们听说了吗？”\n\n“老实说我现在什么都听不见。”\n\n“不错。”\n\n西蒙拿出四个小方形药品放在硬木板上，顺手滑给马修。“试过吗？为了从海那头搞来这玩意，我可是在码头上被狠狠宰了一刀。给几个加拿大人拿了些平常的东西，好让他们给我走私这些。”\n\n马修犹犹豫豫地拿起药片，仔细端详着：“西蒙，这东西怪啊。要是上头知道你有这些东西，可就是要被丢到新施瓦本那边的边境线等死了，你知道吗？”\n\n“哎呀兄弟，别这么顾虑我嘛。今天是庆祝的日子！我很确定菲律宾的兄弟们会爱上这玩意的。”\n\n西蒙快速往嘴里放了个药片说道：“嘿，塔伊卡，你把持的住这玩意吗？”后者无动于衷，一把拿过药片。塔伊卡问道：“美国佬，你来告诉我这是什么？”\n\n“这叫‘酸液’（疑似LSD），老家那边挺火的，听说要比便宜大麻油劲多了。来，尝尝不？”\n\n塔伊卡抓起剩下的三个药片，直接吞了下去。\n\n“天呐，你傻啊！你应该要把它含在舌头底下！”"
 antarctica_aao_radio.950.a:0 "“那么，为战事胜利和南极洲的生活喝彩！”嗨上天的塔伊卡一本正经地说道。"
 antarctica_aao_greenland.10.t:0 "北上的机会"
 antarctica_aao_greenland.10.desc:0 "指挥官冲进营房的时候，每个士兵都已经稍息站好了。他哼了一声，大概本想是来个检查的。不过，大脚步走向房门的声音已经出卖了指挥官自己。他继续迈着重重的步伐，一路向营房里最高的士兵走去。\n\n二等兵爱德华·弗里曼高抬着头，目不斜视。指挥官仔细端详着他手里的步枪，寻找一切不完美的痕迹，可他实在挑不出任何瑕疵，便咕哝了一句：“对你这样的黑人来说还不错。”声音大小正好够爱德华听见，但二等兵一言不发，指挥官把视线挪到刺刀上后也仍旧保持面无表情的样子。指挥官聚精会神地审视着，不放过一丝一毫的污渍。\n\n紧张的片刻沉默过后，指挥官大吼道：“二等兵爱德华，你的刺刀钝了！二十四小时自由活动时间取消！”语罢，面红耳赤的指挥官走向了另一名士兵。爱德华全程无动于衷，虽然心里怒火早就三丈高了，但最终没有表露出来。他告诉自己说，朝长官发火从来不会有什么好结果，也不会让事情变得更好。\n\n“准许自由活动的人可以走了，剩下的留下。”指挥官命令道。于是，连队里大部分人都走了，而爱德华则只能和其他几人留在营房。检查过程中，他一直站在原地，偷听到有两人在抱怨。“那个混蛋肯定会把自己玩死的。”一人轻声说道。另一人冷笑道：“你看着吧。他大概还要升官呢。到那时候我就走了，就算只能接受去格陵兰的工作机会也要走。”\n\n工作机会？离开这里的机会？爱德华挤到二人之间，把他们吓了一跳。他一直是个聊天苦手，要么是太生硬，要么就是说出来的话太难懂。不过，其中一人很快就明白了意思，点头说道：“是啊，格陵兰有动静，说是基建什么的。挺无聊的。”对爱德华来说，无聊就足够了，至少比他们的指挥官好。他感谢了二人，转身离开了。"
 antarctica_aao_greenland.10.a:0 "机遇孕于困境。"
 antarctica_aao_greenland.20.t:0 "灰色房间"
 antarctica_aao_greenland.20.desc:0 "招募办公室位于亚特兰大的郊区，灰色的陈设沉闷不已。爱德华在那里百无聊赖地盯着大开的窗户。他听见翻页的声音，以及不时传来的叹息。外面的光线被一大片树林遮蔽，只有一点能照进房间。整个世界在这树叶的遮蔽下就好像只剩下这小小的房间了。\n\n“二等兵弗里曼……你确定你能胜任吗？”招募官把报告放到桌上，然后以一种在爱德华看来是一种担忧的奇怪眼神看着他。“是的，长官。”他坦率地答道。也许缺少热情，他会有些困难。但这不是因为他缺少经验。去格陵兰除了能摆脱指挥官以外，还有别的好处，但这第一也是最重要的一点，就是可以多拿钱。当他听到这一点的时候顿时两眼放光。老妈很缺钱，这能帮她。毕竟他就是为了帮老妈才来这军队马戏团里当小丑的，不是吗？\n\n“啧，怎么说呢……”招募官咂了咂舌，“那里很冷，比这冷得多。你确定你的……呃，血统……能适应吗？”爱德华没有回答。几年前他也许还会犹豫，但现在不会了。他只是想着他在应征之后能够给老妈送去大把大把的钞票。过了一会，他耸了耸肩，“嗯，我才想起来，长官。我也没见你这有几个白人来报名啊。反正到了那我这又是戴手套又是穿大衣的，你也看不见我什么肤色，对吧？”\n\n招募官沉默了。爱德华也是。两人都知道格陵兰岛实在缺人。最后招募官首先打破了沉默，叹了口气。"
 antarctica_aao_greenland.20.a:0 "他接收了又一个志愿者。"
 antarctica_aao_greenland.30.t:0 "踏上世界之巅"
 antarctica_aao_greenland.30.desc:0 "爱德华从来没有见到过这么多的白色。一望无际的天空笼罩着同样漫无边际的冰雪海洋。一大片纯白的地毯从地平线上滚落而过，山脉和冰山在阳光下闪闪发光，深蓝色的海洋环绕着或白或灰的群岛。他们降落在格陵兰岛偏远角落的图勒空军基地，当他们跌跌撞撞地走下飞机时，除了眼前这绮丽的风景，爱德华心中再无他物。\n\n漫长的砾石跑道一路把他们带到了坚冰环伺的小楼之前。基地虽小，却也热闹非凡。不少工作人员随着爱德华和其他人一同涌了进来。没有参观招待，也没有什么欢迎会，他们被带着飞快地穿过了一排排的安检站。\n\n爱德华紧张地站着，回视着那些怀疑的目光。他们都和老家那边警察的眼神非常相似。他们搜了搜他的身，问了不少问题。他还在等着他们要他的出生证明。\n\n“好，”一位看起来烦闷无比的工作人员一边说，一边把证件还给了他，“下一位。”爱德华差点以为自己要被带去另一个审讯室，但他却被带回了室外，一排排巴士停在那里，车窗尽数涂黑。\n\n他们要这么多安保人员干什么？这真的是在搞基建吗？疑惑在爱德华的脑海里盘旋着，但他依旧保持沉默，这可是他的特长。不该问的就不问，在这里应该会很受用。"
 antarctica_aao_greenland.30.a:0 "巴士穿破雪原，他也随之闭上双眼。"
 antarctica_aao_greenland.40.t:0 "世纪营，万籁俱寂"
 antarctica_aao_greenland.40.desc:0 "巴士往极地荒原里开了足足一百五十英里才到站，而爱德华全程都用一种滑稽的姿势睡觉，下车走进新营地的时候步态还有些怪异。陆军告诉他们说，这里是一所致力于“科研进步”的庞大设施。然而，爱德华目所能及之处只有一排排棚子和低矮小楼，车辙印随处可见，士兵更是有一大把。这些表情比气温还冷酷的士兵带着他们在雪地战壕和冰拱隧道中穿行。看来，这处营地的地下空间大得多。\n\n通道尽数通营地中心附近一处小小的会议中心。爱德华和同行的其他年轻人走进会议室，暂时离开了户外的寒风，一下子放松了下来。两名军官走上台作了自我介绍，他们分别是约翰·C·H·李上校和本内特·L·刘易斯少校。营地，则是叫世纪营。\n\n作为该工程的首席工程师，二人简短直白地向士兵说明了情况，爱德华对此相当赞赏。找大头兵来是要挖隧道，基本就这样了。自从志愿接受工作后，这是他从别人口中听到最详细的信息了。不过，为什么要在渺无人烟的地方挖隧道？为什么要有看守？爱德华觉得，问题很好，但真问出来就完全是另一码事了。\n\n开始挥铁铲挖坚冰之后，爱德华感到些许欣慰。虽然世纪营很偏远，但似乎和老家那边也没什么不同。他会保持低调，避开麻烦。安静地生存下去吧，妈妈很快就能收到寄给她的钱了。"
 antarctica_aao_greenland.40.a:0 "心绪之外，唯有呼啸寒风。"
 antarctica_aao_greenland.50.t:0 "为了钻地而钻地。"
 antarctica_aao_greenland.50.desc:0 "尖锐的声响让正在工作的爱德华打了个激灵。他一边咕哝着抱怨了两声，一边遐想着如果不施工的话这片冰原该有多宁静。几米开外的地方，一辆安装了动力钻头的雪地牵引车正在钻凿冰层，打出了一个又深又光滑的洞。除此之外，冰原上还有其他牵引车和雪橇在犁地。加热钻头融开了厚实的冰层，钢铁机械全然不受严寒所扰，自顾自地改造自然。\n\n爱德华干完了，便从其中一条隧道爬了出来。过去一周，人们一直在挖这条隧道。他感觉和在家乡修公路没什么不同，只不过现在是跑到荒无人烟的地方修路罢了。意义何在？寒风无情地啃噬着爱德华的面庞，让他要费老大劲才能看清路，呼吸也很困难。经验表明，工人们不是机器，总要休息的。想到这里，爱德华身后突然传来一声闷响。转头一看，原来是一名工人倒在了隧道门口。他赶紧冲上去帮忙。\n\n“谢谢你，我刚刚滑倒了。”晕头转向的男人向赶来搀扶的爱德华喃喃道。“走吧，”爱德华说道，“现在是我们的休息时间。”二人走回营地外围一处小棚屋，拿到了热饮与食物。在冰天雪地里劳累多时后，走进温暖的房间总是让人感觉飘飘欲仙。休息是强制执行的，外面待太长时间手指脚趾就要冻伤了。\n\n爱德华坐在房间角落里，津津有味地啃着三明治，试着不去在意拍打四壁的疾风。收音机里的节目谈了谈接下来几天的糟糕天气，随后便开始播送音乐。悦耳的音符让爱德华相当高兴。在这里，保密工作非常严格，营地和外界的接触是少之又少，收听电台便变了少有的娱乐。\n\n到底有什么事要挖隧道打掩护呢？没完没了地挖隧道，也不知道干啥。他们说，这是在测试极地建设技术。虽然爱德华不问问题，但他在观察。军官们低声交谈，各自计划着、掩盖秘密，就像地上的洞那样，远不止是钻地实践这么简单。"
 antarctica_aao_greenland.50.a:0 "未解之谜越来越多。"
 antarctica_aao_greenland.60.t:0 "万里之遥"
 antarctica_aao_greenland.60.desc:0 "“袜子呢？有保持袜子干燥吗？”电话那头的母亲的问道。爱德华尽力不让叹息声传进听筒。她问起问题来简直没完没了。\n\n“有有有，妈，毛衣我也都穿着呢。和你说，我挺好的。”爱德华压低了声音，望向门边直挺挺站着的军官。在监控下打电话要比预想的更尴尬。\n\n“抱歉，埃迪，我只是，呃，好吧，只是听你说挺好的感觉很高兴。家里这边一直乱着，你知道吗？”母亲的语气缓和了下来。爱德华能立刻想象出她的表情。家乡的事情总是“乱着”。抗议和警察暂且按下不表，家里有时候还要担心果腹问题。然而，母亲从未退缩过，爱德华自觉这辈子是没法变得和她那样坚强了。“啊，对，妈，我知道的，”爱德华说道，“话说，我寄来的钱收到了吗？”\n\n还没等母亲回答，他就听见话筒被一把夺去。“埃——迪——！是我，康妮！”耳边传来小妹响亮的声音，好似怕爱德华认不出似的。“嘿，小妹。”爱德华掩住失望说道。他真的想知道钱是否补贴上家用了，但现在只能听康妮就着背景里母亲的叫喊声讲述一天发生的事。爱德华翻了翻白眼。小妹和母亲很像，二人都很健谈。不过，他喜欢聆听别人说话，感觉就像在家一样。\n\n“等下，康妮，阿内丝呢？她考试过了吗？毕业了吗？”爱德华开玩笑道。家中二女阿内丝是他认识的人中最聪明的一个。另外，她当然已经毕业了。母亲终于接过了电话：“她在抗议。”听到这里，爱德华倒吸了一口冷气。抗议很危险。“啊，好吧。”\n\n双方沉默了片刻。“埃迪，她好着呢，之后也不会有事的。”爱德华尽力听进去母亲的保证。就在这时，门口的军官投来同情的视线，敲了敲手表表盘。时间到了。"
 antarctica_aao_greenland.60.a:0 "爱德华向家人道别，感觉似乎离家更远了。"
 antarctica_aao_greenland.70.t:0 "破晓"
 antarctica_aao_greenland.70.desc:0 "爱德华与众人在隧道中行走，冰渣子在靴子下咔咔作响。得知是走向出口时，他不由得松了口气。路上，有两个人在往冰冻隧道顶安装闪烁的照明灯。隧道高度向当地，弄得爱德华有些压抑。他觉得，几个人在老家一起打篮球的人肯定都没法直着腰走进来。\n\n走出隧道时，众人见到了一副奇异的景象。半空中，两朵巨大的白云簇拥着太阳，日光从云隙间洒落，雪原熠熠生辉。极夜的那几个月是爱德华连续远离自然光最长的时间，每天都是顶着怪异的暮色来回行动，而现在，太阳突然就这么回来了。\n\n同僚们也惊愕于这副奇景，纷纷仰头观看。仰望之余，一辆大型雪地牵引车犁开了人群前面的路。车上坐的是约翰上校和本内特少校，爱德华记得他们是工程总指挥。二人也引脖看向天空，而后扫视着雪原和整个工程现场。爱德华目视着牵引车开上一座山丘，往另一片隧道去了。工程范围正在往南扩张。就在这时，一名军官走了上来。\n\n“大伙干得好啊，”军官问候道，“回小屋吧，那边给你们备好热可可了。”所有人都为圆满完成任务喝彩，爱德华也一路微笑着走了回去。那条隧道挖好了，他也对此感到一种奇怪的满足感，甚至还积攒了足够勇气第一次和同在现场的某些士兵搭话。每个人似乎都情绪高涨、十分开放。\n\n胜利就是胜利，爱德华看着太阳和自己理论道。不过，他仍旧放不下一件事：大家到底完成了什么任务？"
 antarctica_aao_greenland.70.a:0 "没有目标，却有胜利。"
 antarctica_aao_greenland.80.t:0 "回家"
 antarctica_aao_greenland.80.desc:0 "温暖的阳光透过老枫树的枝叶洒下来，落在了爱德华身上。门廊内，爱德华在一把破椅子上坐了下来，心满意足地长出一口气，甚是舒心。\n\n“哥，你像个老头似的。”康妮评论道。她正坐在门廊地上，手里摆弄着溜溜球。“妈妈没告诉你别坐在这吗？”爱德华咧嘴反驳道。他向一旁有些不悦的母亲使了个眼色，后者说道：“我是说过。小妹，地板脏着呢，我已经十多年没扫过这了，你裙子都要一团糟了。”\n\n康妮心神领会，起身跨下哎嘎吱作响的台阶，跑向了尘土飞扬的街道。爱德华也站起来目视着小妹离去，随后便又坐会到椅子里。他没法跟着去，陆军嘱告过他说“待在原地”。显然，是为了安全起见。\n\n母亲抬起枯瘦如柴、布满老茧的手，温柔地搭在了爱德华的手背上。“寄回来的钱补贴到昨天付的电费里了，”她说道，“谢谢你。”\n\n爱德华从来都不喜欢张扬情感，但这次属实是喜上眉梢。他尽力拿出最真诚的微笑说道：“小事小事。妈，我还会继续寄来更多的。”\n\n门倏地打开，二妹走了出来。“你要去哪？”爱德华抬头问道。“出去。”阿内丝头也不回地说道。她带着的牌子上写着有关投票权的标语。爱德华起身追问道：“什么意思？咱根本没聚多久啊，我只有轮替的时候才有空回来。”阿内丝突然转头，说道：“知道么？家里不光只有你想要补贴家用。”他非常想跟着阿内丝出去，但如果陆军那边发现的话，就不知道会有什么麻烦了。\n\n母亲伸出手拉住爱德华，让他再次坐回了椅子。她说道："
 antarctica_aao_greenland.80.a:0 "“你们两个都出去想法子养家糊口了，没什么不一样的。”"
 antarctica_aao_greenland.90.t:0 "日落下的论辩"
 antarctica_aao_greenland.90.desc:0 "爱德华再一次坐到了巴士上，再一次看向窗外。太阳低垂，高低起伏的冰原上布满了橙红色的影子，纷纷拖长了指向地平线。爱德华本想着在回世纪营的履带班车上再好好睡一觉，但今天的车厢内比往常更为躁动。\n\n“是啊，那就是我听到的说法。”旁边的士兵轻声说道，“什么以防核战争开打建造的地堡。我猜是给总统用的。”车厢里又传来一阵阵嗤笑与耳语声。\n\n“但总统要那么多地道什么？”前排某个士兵反驳道。“我觉得啊，他们是想要殖民北极。我们正在造一个实验殖民地。”后排一人脱口而出。没过多久，士兵们的低声交谈便成了扯嗓子大赛，车上所有人都发表了各自的理论和怀疑。\n\n是关于世纪营的猜想啊。爱德华还是想睡觉，但也没法说自己完全不好奇。就算大家的猜测都不太靠谱，但显然每个人都很好奇。“我打赌这是在造某种航天相关的玩意。你想啊，我们在北面，离星星更近呢。”\n\n“埃德，你怎么想？”旁边的士兵拍了拍爱德华的肩膀，把他拉回到喧闹的车厢内。突然间，所有人的目光都聚焦在他的身上。爱德华深吸一口气，意识到自己也想知道为什么。不过，他从来没设想过具体的情境，于是思考了片刻。“我不知道。”他再次看向太阳答道，“但工程很大，然后，呃，以后也不会知道具体有多大。”"
 antarctica_aao_greenland.90.a:0 "这大抵算是件好事吧，他琢磨着。"
 antarctica_aao_greenland.100.t:0 "地下逃亡"
 antarctica_aao_greenland.100.desc:0 "凌晨时分，他们被叫去隧道了。天空尚是深蓝色，周遭也是一片漆黑。爱德华与其他同样睡眼朦胧的工人拖着步子穿过雪地，走进了一条黑暗的隧道。今天有些不对劲。派驻的士兵比往常多，头盔的阴影下纷纷投来锐利的视线。不只是气温让人透不过气来，紧张气氛更是让人大气不敢出。\n\n南边一条隧道塌方了，西边另一条的状态则显然变成了“禁止进入”。传言是这么说的。现在，他们正在往又一条隧道深处走去。要不是又累又困，爱德华大概会抱怨两句，不过他还是决定努力让眼睛睁开。\n\n报告突发事件的叫嚷声把爱德华从精神世界里拽了出来。任务是紧急维修。越往隧道里走，隧道内闪烁不定的顶灯就越暗，道路也逐渐变窄。一名面色惨白的工人迎面跑了过来，指向更深处的一小撮人群。他们正围着一根歪斜到马上就要垮塌的支撑梁忙活。\n\n众人不知道干了了多久，爱德华也没去细想。但凡去想这个问题，他马上就会崩溃。最开始慌张的叫喊和祈祷过去后，所有人都按照命令，在沉默中小心翼翼地换上了新的支撑梁。任务完成后，大家也无言地松了口气。一切还好。\n\n至少有那么一瞬间是的。至少在隧道顶令人寒毛直竖的碎裂声打破沉默前还是如此。头顶上，冰碴子不断掉落下来，但仍旧没人说话。爱德华的脑海中充斥着细碎、混乱的想法，逃跑的本能敲打着他的运动神经。接着，灯灭了，所有人都争先恐后向出口逃去，踩踏不断。\n\n然而，塌落的冰层先人一步。"
 antarctica_aao_greenland.100.a:0 "爱德华最后只听到了尖叫声。"
 antarctica_aao_greenland.110.t:0 "强光"
 antarctica_aao_greenland.110.desc:0 "痛。醒来的第一感觉就是痛。腿通，手痛，胸口痛，头也痛，全身上下都沉浸在磨人、麻木的疼痛之中。爱德华有好几次试着张开双眼，但上方刺眼的灯光让他不得不打消这个念头。\n\n怎么来这的？今天是几号？爱德华逐渐回想起了发生的事情，疑问便有了答案。隧道垮塌了，他和不计其数的士兵都被埋在冰雪之下。他还想起来自己躲进了一处气窝，从而得以幸存。\n\n“能听到我吗？”有人小声说道。他望向床侧，看到一个模糊的身影正盯着自己。那是本内特·L·刘易斯上校。爱德华点了点头。“好，”刘易斯说道，“二等兵爱德华·弗里曼，本人特此前来向你表达最诚挚的感激之情。你是个英雄。”\n\n爱德华不感觉自己像是衣锦荣归的样子，但没有开口。“你把另一个人也拉进了气窝，爱德华。里面珍贵的空气是有限的，但你还是愿意和另一个生灵分享。”刘易斯严肃地说道，“当我们找到你的时候，你仍旧拉着他，而他也还活着。谢谢你。”说完，刘易斯示意爱德华看向邻床男人。面目憔悴、脸色苍白、神态惊惶，但还或者。爱德华不知道该说什么，也不清楚另一个人是否有开口的力气。刘易斯继续说道：“我保证你会拿到陆军嘉奖奖章的。”\n\n沉默了了片刻，刘易斯补充道：“当然，呃，为了你自己好，回家后别详细说你怎么拿到嘉奖的就是。”一个字引起了爱德华的注意。他瞬间泪盈满眶，终于有力气吐出一个字："
 antarctica_aao_greenland.110.a:0 "“家。”"
 antarctica_aao_greenland.120.t:0 "尽归于冰"
 antarctica_aao_greenland.120.desc:0 "今天对爱德华来说十分漫长。起初，他接到了家里的紧急来电，直接让他冲出了寝室。母亲打来电话，一边哭泣一边倾诉。放平时，他可是很喜欢和家里通电话的。\n\n现在，爱德华独自行走于营地反应堆对面的一条隧道之中。好吧，至少那里曾经有一个反应堆。反应堆室和附近其他房间都已经被雪埋没，而反应堆本身要么是搬出去了，要么就是还埋在地下。爱德华希望是前者。自打从那次崩塌中幸存之后，一进地下行走就有些疑神疑鬼。不过，今天算是最顺利的了。\n\n母亲打电话来说阿内丝的事情。她又去抗议了，结果，以母亲的话说，事情变“乱”了。现在，阿内丝躺在医院里昏迷不醒。听到这里，爱德华不知道该作何反应。本想说些安慰的话让母亲不哭，可他一直不善言辞，只能一言不发。\n\n现在，爱德华后悔了，后悔什么都没说出来，后悔没能抱抱母亲，后悔无法探视妹妹。或许，正是这份内疚和思乡之情驱使着爱德华来到指挥官办公室，请求上级准许其离职，立刻离开这个冻死人的塌方地。指挥官对此疑虑重重，但刘易斯少校的干涉直接促成了此事。大概是对他义举的奖励吧。\n\n爱德华离开隧道，回到寝室，迅速打包好行李，室友们见状纷纷告别。如果走运的话，他们也不会久留了。隧道塌方越来越多，没出事的干脆都爆破了，或者彻底弃置。白漫地逐渐吞噬了世纪营。"
 antarctica_aao_greenland.120.a:0 "爱德华坐在逐渐远离营地的雪地车上，只能思考起回到家里会遇到什么事。"
 antarctica_aao_greenland.130.t:0 "归乡忧思"
 antarctica_aao_greenland.130.desc:0 "爱德华痛恨医院。这倒不是因为之前的糟糕经历。事实上，他已经就忘记了早年讨厌医院的事，但现在，爱德华行走在逼仄的走廊，呼吸着寒冷的无菌空气，听着周遭医疗设备的嗡嗡声和开放房间内单调的呼吸声，感觉犹如又回到了那个崩塌的冰冻长廊，压抑不堪。他痛恨医院。\n\n二妹住的房间有些狭小。陪护的母亲抱着康妮，坐在房内唯一的椅子上，看上去沧桑了许多。爱德华走进来时，二人都跑过来高兴地向他问候，转向阿内丝时却又立刻沉默了下来。\n\n阿内丝地状况让爱德华想起了几个月前救下来的男人。她戴着氧气面罩，蓬乱的头发向两旁散开，病容苍白；额头上还有一大块淤青，向下延伸到紧闭着的眼睛周围。不仅如此，手臂上也有一片片淤青。\n\n爱德华一般不显露情感，但那一刻，他五感交际，还没反应过来便已泪盈满眶、气红了脸。“埃迪，是抗议现场一帮暴徒干的，”母亲绝望地说，“某些三K党的人。”\n\n怒火直冒三丈高，保持不动都很困难，心里非常想放声大叫。可当爱德华看到康妮脸色的恐惧与迷茫时，愤怒尽数化为了无奈。妈的，回来就遇这茬？\n\n他拿出最坚忍的表情，紧紧地拥抱了康妮，母亲随后也报了过来。三人伫于病房内，心电图继续上上下下。"
 antarctica_aao_greenland.130.a:0 "至少，共同面对困难总是好的。"
 antarctica_aao_greenland.140.t:0 "别无他法"
 antarctica_aao_greenland.140.desc:0 "“叫救护车就已经快掏空我们的积蓄了，爱德华。”母亲双手捂住了脸，恼怒地叹了口气。这是一声早已撑不下去却又不得不继续生活的叹息。\n\n爱德华与母亲面对面坐在桌子两侧，一言不发，空余雨点敲打薄薄的房顶，发出连续不断的闷响。二妹不在，家更残缺了。他又看了一遍大堆的医院账单。为了不让母亲越读越有压力，爱德华宁愿把文件都堆在自己这边。母亲一张嘴，声音都快像是在抽泣。\n\n妹妹的治疗费可谓是几千叠几千，可她仍旧昏迷不醒。阿内丝的脸没有上报，女孩遭受三K党暴徒袭击这一血淋淋的事件甚至都没上头条。没有记者上门询问，警察也称线索中断。爱德华苦笑了两声，他知道三K党后台硬、关系多，而自己再怎么黯然神伤也没法补贴上住院开销。\n\n“大概我得再去找份工作，”母亲说道。爱德华的拳头锤在了桌上，话语脱口而出：“不，我去找。大概再去入伍吧。你不用再多干了，我会赚到钱的。”母亲已经过劳了，爱德华也不忍让母亲再平添一份负担。不过，坚毅的背后，是肩上沉甸甸的担子。他需要做些什么，必须自己想出来该做些什么。"
 antarctica_aao_greenland.140.a:0 "只能这样了。"
 antarctica_aao_greenland.150.t:0 "致爱德华·弗里曼"
 antarctica_aao_greenland.150.desc:0 "弗里曼先生，希望您收到这份信时别来无恙。眼下，您与您的家庭的处境无疑非常艰难，我对此向您道歉。刘易斯少校与我皆已获悉您离开营地的情况，请允许我们首先为您献上最诚挚的慰唁。\n\n然而，您在世纪营的工作表现突出，不应就此埋没。现在，一项高度相关且施工条件与您在营地所经历的条件极为相似的工程已正式开工，原先派驻格陵兰的优秀团队、尖端机械、精英工程师与军官都已调度至该新工程现场。如此动向正是我们联系您的原因。您，弗里曼先生，已经被选入这场新征程中。\n\n如前文所言，我们确实了解到您的现况并不理想。诚然，我们对您未来可能的工作潜力深信不疑，特此来信敦促您接受该委托。不过，若您目前无法再次办理入伍，我也对此表示理解。\n\n若愿意接受该委托，敬请即刻联系我。若无法接受，我们也会祝您一切顺利。不论如何，我强烈建议您不要向其他任何人展示该信内容，且阅读完毕后将其整张销毁。\n\n此致\n\n约翰·C·H·李上校"
 antarctica_aao_greenland.150.a:0 "爱德华折上信纸，久违地笑了。机会来了。"
 antarctica_aao_greenland.160.t:0 "天涯若比邻"
 antarctica_aao_greenland.160.desc:0 "爱德华脑子里一直回旋着某首歌。或许是去下一个部署地点的路上听到的，或许是在老家听到的，但他也说不清歌名叫什么。不论如何，爱德华和其他几十个人伴着雪地车走过冰面时，一直惦念着这首歌。\n\n爱德华看向周围。还是一望无际的冰原，还是灰白相间、连绵不绝的雪山，还是湛蓝的天空中泛着光晕的太阳。整一个格陵兰翻版，只不过是在地球另一头。\n\n不知怎的，南极洲要比格陵兰还荒凉。队伍逐渐远离麦克默多站，爱德华仍旧无法摆脱那个预感：前面除了无穷无尽的荒蛮之地外，别无他物。仅仅这么想，就像是在凝视深渊。\n\n所以，这首歌或许是某种分散注意力的方式，是自己想要用什么东西掩过呼啸的寒风。温暖的午后，黄橙相间的树叶，波光粼粼的夏日湖畔，无一例外都是能分散注意力的回忆。爱德华一面回想着小鸟的叽喳声、城市的喧闹声、家人的说话声，一面在南极大陆上挥下了第一铲。新工程开始了，管他是什么呢。\n\n爱德华再度离家的前一天，妹妹阿内丝醒了过来，第一反应是表示她会尽快好起来。想到这里，正在劳作的他笑了。妹妹很坚强，同时爱德华也会在外面为家庭出力。如果有必要的话，跑到天涯海角也在所不惜。"
 antarctica_aao_greenland.160.a:0 "总要有人垫上医疗费啊。"
 antarctica_aao_science.10.t:0 "始料未及的探险"
 antarctica_aao_science.10.desc:0 "俄亥俄州立大学极地研究所规模不大，成立也才两年，但当正在攻读地质学博士的化学硕士洛伊丝·琼斯走进这座建筑时，一种不寻常的紧张与兴奋将她裹挟了起来。\n\n在她逐渐走远时，有人喊道：“恭喜你，琼斯！”洛伊丝更加摸不着头脑，便朝着研究所所长的位置走去。然而，在她到达那里之前，科林·布尔把她拉到一边，带到了他的办公室。\n\n布尔是新西兰人，最近因为专攻南极而加入了俄亥俄州立大学的教学团队。他是个不错的人，考虑到他在新西兰的影响力，他也在与“南方大陆”的联系上也相当有价值。“琼斯，我刚刚接到了威灵顿方面的来电，你被批准前往麦克默多站进行研究了。”\n\n洛伊丝震惊地回望着他，脑海拧成了一坨浆糊。自1959年以来，布尔就一直在游说OFN南极洲事务局允许女性科学家在南极进行科考，尽管他设法说服了所有相关集体，但美国海军坚持拒绝让她南下。\n\n幸运的是，布尔之前见过埃德蒙·希拉里几面，他们之间的交往使这位新西兰探险家坚定地站在了他们这边。传言称他成功说服了雷伯恩中将本人协助推动这一事项，而现在看来，海军已经悄然让步。\n\n“我没想到你真的做到了。”洛伊丝回答道，脸上闪过一丝微笑。\n\n“认识了希拉里你就懂了，这个人几乎不可阻挡。”布尔说着，眼神中多了一丝留恋。他从办公桌下拿出了一沓文件，“喏，这是你离开前要准备的清单。”"
 antarctica_aao_science.10.a:0 "“最好现在就开始准备，一周内你就要往洛城飞了。”"
 antarctica_aao_science.20.t:0 "破冰"
 antarctica_aao_science.20.desc:0 "地平线与围抱着麦克默多站的覆雪山峰被笼罩南极洲上空的云层融成一体，难分间隙。作为她未来的研究对象，这片超现实的风光给洛伊丝留下了非同凡常的第一印象。\n\n空无一物，没有任何事物值得人双目流离，也几乎没有任何东西遭到凡尘沾染，一种宁静的气氛将这片净土尽数笼罩，所有的这些都与她以前去过的任何地方大相径庭，而俄亥俄的那些贫瘠荒原与此相比弗如远甚。与此同时，初冬的风将她的肌骨刮得几近粉碎，她神经绷紧到了极点，仿佛随时可能断裂的弦。在地球，这片土地独一无二。\n\n日升之时，她就已经站在船头，望着那最终的目的地向她步步逼近。为了在这深秋时节顺利抵达港口，载着她去麦克默多的船配备了破冰设备，坚冰片片剥裂，而船随之蹒跚而前。\n\n她便与这碎冰同行，直到船缓缓触岸，甲板上出现了忙碌的声音，准备通往冰码头的阶梯，并将麦克默多站为他们准备的物资运上来。这次旅行的时间安排得很紧，一旦分配工作完毕，船长就会立刻出发。\n\n她舒展了已然麻木的胳膊和腿，走下楼梯。基地为她举办了一个小型的欢迎派对，他们的领队，海军允许她来这里的唯一原因，埃德蒙·希拉里，就站在她的面前。这位新西兰人和她握了握手，介绍了他的同伴：基地的几位在接下来的时间里可能会与她合作的地质学家和首席研究员，随后便带领着他们上车。"
 antarctica_aao_science.20.a:0 "该上工了。"
 antarctica_aao_science.20.a.tt:0 "§M新西兰§!对§QOFN南极洲事务局§!的控制力将提升§W4%§!。"
 antarctica_aao_science.30.t:0 "阴沉的日子"
 antarctica_aao_science.30.desc:0 "寒风咆哮着宣示凛冬已至，这风穿透了站点所有的防护措施，让她感到冻彻骨髓的寒冷以及剜去血肉的疼痛。这么说也许有些言过其实，但是对此时此刻的她却显得无比贴切。\n\n接下来的几个星期，麦克默多站彻底大变样了。绝大多数人的日常生活习惯都随着白昼变得越来越短而改变，为了在覆雪和结冰的道路上导航的设备也逐渐装了起来。一些富有“创新意识”的队伍甚至开始抽签，决定谁必须勇敢地与暴风雪搏斗，谁又可以在相对舒适的站内留守。\n\n洛伊丝明显地被排除在这些小圈子之外。事实上，可能是被排除在大多数事情之外。驻守基地的男性们对“矮壮”、“不女性化”的科学家并没有太大兴趣，而有兴趣的人往往动机不纯。只要谈话朝着……那个方向发展，她就会迅速中止交流。\n\n因此，在这个与世隔绝的冬季来临时，洛伊丝决定牢牢待在室内埋头研究。至少这片大陆不缺可供研究的样本，这倒没什么好抱怨的。在雪不算大的几个月里，岩石随处可见，她收集了足以撑到圣诞节的样本来研究。附近一组恰好被命名为“麦克多默干谷”的山谷激起了她的兴趣，当下，她身旁码放着整齐分类的岩石样本，而无数奥秘正深藏其中等待她去发掘。\n\n一阵拍门声打断了她的思绪，助手马克·尼尔森应声而入。除了希拉里以及其他一些科学家外，他是她身边为数不多的几个让她感到真正舒服的人之一。尽管这位助手有些过于严肃且事业心太强，使得洛伊丝难以与他建立真正的友谊，不过她依旧对他的到来以及其带来的一沓沓崭新稿纸表示欢迎。"
 antarctica_aao_science.30.a:0 "“就放在那里吧，好吗？”"
 antarctica_aao_science.40.t:0 "日光渐耀，群星微烁"
 antarctica_aao_science.40.desc:0 "起初，白昼的延长如同沙漠中的绿洲蜃景，微不可察。事实上，在最寒冷的这几个月里，并没有多少人对此寄托过希望。但随着阳光渐渐足以将窗户填满，阴影也短到足以使晴天时的雪地或多或少地融化，白昼的延长可以说是无可否认了。\n\n此刻洛伊丝·琼斯站在山顶，俯瞰着黄昏笼罩的麦克默多站。她身后是一群科学家、工程师和好奇的士兵拼凑而成的队伍。他们正在筹划一场观星夜，这是近期来访的一位善于交际的研究人员的主意。当然，他是个天文学家。他们希望在南极夏季永恒的白昼降临之前，趁着夜晚尚在把活动安排妥当。\n\n虽然洛伊丝只是在俄勒冈州立大学读本科的时候与天文台略有接触，但作为为数不多拥有相关工作经验的科学家之一，她被委任负责其中一座望远镜的观测。为了让它在这坑坑洼洼的山丘上稳稳立住，她耗费了不少心力。令她颇为意外的是，有几名士兵过来清理了地面上的碎石，还在望远镜脚下垫了几个沙袋。\n\n这样的互动给了她不少希望，或许她真的可以在麦克默多站这个古怪而封闭的团体中找到自己的容身之地。这类事情最近发生得更频繁了：她发现其中一名士兵以前也曾帮助过她。\n\n“查尔斯，没想到你喜欢观星啊。”\n\n“就把这当成我的一项特殊爱好吧，女士，”他抬头说，“嗯哼，看来第一颗星星已经露出头来了，我猜是时候‘观星’了。女士优先。”说完他腼腆和善地笑了笑。"
 antarctica_aao_science.40.a:0 "透过镜头，洛伊丝看到了希望的些许微光。"
 antarctica_aao_science.50.t:0 "未触的天际"
 antarctica_aao_science.50.desc:0 "他们俯冲向下，向这无尽冰原上的一座裂缝飞去。在飞越这片孤寂的水域时，洛伊丝伸出头来，目光在直升机那阳光下起伏的金属光泽中迷离。这片土地就是如此灵异，只有最无畏的人才会被它那冰冷的壮景所吸引。她很幸运，又或者说很不幸地，被这片寒冷的平原所诱惑，并决心要突破它那抵抗人类探索的坚实壁垒。\n\n于是，飞行员向洛伊丝研究的焦点，麦克默多干谷降去。即使是在这片大陆，这些峡谷仍然异常地令人困惑：没有积雪，没有冰，也没有任何生命迹象。前两者使这无与伦比的耸立的花岗岩崖壁触手可及，而后者更给这片神秘的谷地增添了一丝灵异气息。去年秋天的短暂接触已然激发了她的想象力，使得她迫切期待着踏入这片山谷。这些地方往往都蕴藏着重要的发现：一片裸露的无冰区不管如何都应该仔细研究研究。\n\n再往北，覆雪皑皑的悬崖和宛若由玻璃纺成的尖峰，将通往南极点的广袤白原尽数遮掩。这非凡壮景随着直升机的降落从视线中渐渐淡去，地球上最严酷的沙漠掀起了烟灰般的沙尘。\n\n踏上荒原，洛伊丝深吸了一口新鲜空气。上次她来这里时，对这片南方荒原的科考程序一窍不通，也融入不了麦克默多站的日常生活。如今，在一批能干的助手和轮换助理的帮助下，她已经准备好一整个夏季探索南极的地质之谜了。"
 antarctica_aao_science.50.a:0 "新年新气象，或许还有新希望。"
 antarctica_aao_science.60.t:0 "别样狂欢人"
 antarctica_aao_science.60.desc:0 "今晚，麦克默多站的中央食堂人头攒动。除了原本的人员之外，里面还挤了一堆奇怪的外来访客，以及来站点收取特殊补给、与上级探讨新发现的其他基地人员。在这喜气洋洋的忙碌之夜，洛伊丝找到了一帮临时抱团的科学家，便也参与了进去。\n\n环顾烟气缭绕的房间，她看到大家都在忙活着：马修已经在向某些加拿大古生物学家唠叨冰点以下环境中开展化学活动的繁杂程度；托马斯召集了一小帮助手，正在开展即兴测验；至于瓦尔曼，虽然他远在塔斯马尼亚，但与洛伊丝共进晚餐的学生接过了那份热情，令她折服于核能的精巧之处。洛伊丝开始能理解为何瓦尔曼要这么严肃对待自己的职责了。\n\n忽然间，洛伊丝意识到自己已经比上一周更习惯这里了。过去几个月间，她逐渐融入了站点社群，即便因性别而遭到些许排斥也是如此。除了和美国、加拿大、澳大利亚和新西兰的同僚通信更为频繁以外，洛伊丝也越来越安于现状。\n\n有鉴于此，她需要写几封信。\n\n洛伊丝最后一次与同伴们举杯喝彩，随后便裹紧衣服，打起精神，走入了寒风之中。"
 antarctica_aao_science.60.a:0 "南极极昼之下，酒精和同志之情时刻温暖着她。"
 antarctica_aao_science.70.t:0 "熟悉的计划"
 antarctica_aao_science.70.desc:0 "“请准许我执行一次任务。”\n\n希拉里一脸惊讶地抬起头。洛伊丝则抬头挺胸，目不斜视地盯着他。她知道这必将是一场艰苦的谈判，因而摆出了咄咄逼人的姿态来到了希拉里处。\n\n“真是出人意料啊，但我来者不拒。你想去执行什么类型的任务？理由呢？”\n\n“这个嘛，我一直在和OFN各处的同僚保持联系，”洛伊丝背诵着提前打好的腹稿，“许多科学家都对这里开展的工作有兴趣，其中更是有不少人就专于南极洲研究。由此看来，给他们实地考察的机会在正常不过了。”\n\n“言之有理。当初邀请我推荐的各路人士的时候，我就和雷伯恩说过相同的话。”思绪万千的希拉里顿了顿，“我会亲自转告他的，不过还得要具体名字才行。你有相中的候选人吗？”\n\n洛伊丝深吸一口气。谈话成功与否在此一搏。“确实有。西恩娜·普赖斯、亚历山德拉·斯科特和邦妮·波特如何？”她小声念道。显然，洛伊丝对希拉里的回答甚是担忧。\n\n希拉里脸上闪过一丝狡黠的微笑，回答道：“不错，这些人正好。明天我会和雷伯恩中将谈谈你的计划，他肯定会拉长脸，但你到目前为止的丰功伟绩应该能平复海军担忧，让中将退让——如果不行的话，也有其他迫使雷伯恩同意的方法。不论如何，我很期待他听到这些名字时候的表情。”他笑了笑，靠到椅背上，又给洛伊丝倒了些波本威士忌。"
 antarctica_aao_science.70.a:0 "“说来，我有没有告诉过你，我是怎么让雷伯恩同意接纳你的？”"
 antarctica_aao_science.80.t:0 "开疆拓土"
 antarctica_aao_science.80.desc:0 "一整天痛苦地与成堆的岩石为伴在大多数人眼里大抵都是一件苦差事，但在洛伊丝南极洲之行的第二个冬天开展对麦克默多站以西干谷的研究时，这是她唯一的工作。\n\n而秋天就不一样了。准备领导研究团队，与远在哥伦布的博士生导师进行协调，以及获取经费拨款，造就了她一生中最忙碌的几个月，与此同时她仍在继续定期收集干谷中的岩石样本和仪器数据。\n\n冬天的来临标志着规划时间的结束。此刻洛伊丝回过头来开始处理实验室里堆积成山的各种石块和矿物。她已经开始写论文了，虽然在研究完今年从山谷中获得的材料之前没有什么进展可言。\n\n她叹了一口气，站起来伸了伸腰，显微镜存在的意义也许就是让研究员脊椎痛吧。她拿起马克刚才带来的咖啡，氤氲的蒸汽早已消散，喝了一口，肯定已经凉了几个小时了。不管怎样，至少它还是杯咖啡，此刻洛伊丝正凝视着窗外不息的飞雪，凝视着她的未来。\n\n目前她仍在等待时机，等待九月，一系列全新的职责和责任也将在那时落上她的肩头。想着接下来她的生活会去向何方，她忍不住傻笑了起来。尽管有人说，她并不是为了乏味的生活才进入学术界的……"
 antarctica_aao_science.80.a:0 "……但春天真的是无聊透顶啊。"
 antarctica_aao_science.90.t:0 "进步的引擎"
 antarctica_aao_science.90.desc:0 "飞机缓缓落地，两台沉重的发动机在霜冻的寒风中挣扎的雷鸣声穿过了洛伊丝的双耳，轰隆隆的咆哮声是它们对此地恶劣环境不满的宣示。她没什么好抱怨的，这架飞机从多伦多启程，几乎不停不歇地飞向麦克默多站，能完好无损地抵达目的地，全靠这精心锻造的钢铁。这大抵是中西部的钢铁吧，来自俄亥俄的洛伊丝悄悄的想着。\n\n它的货物来自遥远的五大湖区，以及北美之外。当他们走下阶梯时，迎接这位地质学家的是一群新面孔。\n\n一连串的自我介绍后，她将早已知晓的名字与陌生的脸庞一一对应。安静的西恩娜是来自新泽西州的物理学家；亚历山德拉来自墨尔本，渴望给她的气象学生涯一个爆炸性的开端；邦妮是一位新西兰人，希望找到证据来支撑她的人类学理论。\n\n总之，洛伊丝的团队中有六位新研究员，每个人都专注于不同的领域，而这些项目只能在这片大陆上实现。洛伊丝走在跑道上，听着他们一边兴奋的议论，一边感叹着这里的风景。洛伊丝时不时还是会被这里的风景所震撼，但她的思绪已然飘向了他们所处的危险境地之中。\n\n席卷麦克默多站的神秘军事项目不断提醒着她，与德国和日本的紧张局势仍在持续，尽管希拉里努力向这些平民科学家们保证，南极洲事务局安全无虞，但她心中的担忧和无助从未消散。\n\n这也是她组建这支队伍的部分原因。南极洲正在混沌般的国际政治之中越陷越深，而她正试图从中夺回至少一丝对局势的掌握。"
 antarctica_aao_science.90.a:0 "那天傍晚归站时分，她稍稍松了一口气。"
 antarctica_aao_science.100.t:0 "致癫狂世界的静谧祝词"
 antarctica_aao_science.100.desc:0 "在南极空旷的空气中冰镇的冰块撞击酒杯发出的叮当声响彻了整个小实验室，椅子被临时围成了一个圆圈。洛伊丝和她的队员们脸颊红润，鼻子通红，这当然不仅仅是酒精的功劳。\n\n他们花了大半天的时间爬到了当地的一个观景点。这里的景色令人叹为观止，南极夏日堪称永恒的阳光给大地涂上了一层耀眼的白漆。此般美景永不过时，洛伊丝也因此对生活有了别样的认识。这块大陆始终就在这里，古老而又不染尘嚣，似乎宣告着人类的愚行对它来说不值一提。\n\n不幸的是，科学家们并不具备这样的能力。德国深陷权力斗争，日本爆发金融危机，现在南非也在美国的带领下迈向地狱，至少最后一项还有值得支持的事业。军方传来的消息只能表明，未来几个月预计还会出现更多的混乱。\n\n然而，尽管新施瓦本近期的困境证明了这一点，但看看自己身边紧密团结的团队，全球新闻和日益增长的担忧仿佛只是远隔重洋的虚幻蜃景。虽然才刚刚在研究实验室里安顿下来，但她们应该很快就能获准进入内陆，甚至有可能建立一处新前哨站。\n\n“我想干一杯，”她轻声说道，打断了大家的闲聊，“致我们未来挑战世界极限的冒险，干杯。”\n\n空气中只剩沉默，女士们都陷入了沉思。毫无疑问，她们都在想着自己的计划。然后，她们喊道：“致未来！”"
 antarctica_aao_science.100.a:0 "那天晚上，洛伊丝梦见了一望无际的，延展无边的冰脉雪原。"
 antarctica_aao_invasion.10.t:0 "仔细备战"
 antarctica_aao_invasion.10.desc:0 "雷伯恩海军中将手举话筒，一动不动，听着单调不变的忙音。他面前的桌上摆着一杯还没动过的咖啡，热气氤氲，飘荡在他的手边。\n\n雷伯恩舔了舔干裂的嘴唇，冷静地将话筒放回了座机，然后又把它拿了起来，拨通了里迪海军少将的内线号码。“詹姆斯，”他开口说道，“你能来我办公室一趟吗？”话筒又回到原位，中将终于美美地抿了一口咖啡。\n\n时钟滴答，各种想法在雷伯恩的脑海中回旋。突然传来一阵敲门声，雷伯恩伸出右手，示意来人请进。里迪还没来得及说话，雷伯恩就抢先说道：“参联会已经授权，准许我酌情执行针对新施瓦本的行动。”\n\n里迪闻言不由惊讶万分，他转身关上门，回应道：“噢，呃……好吧，现在确实是前所未有的良机，我想。边界守军报告说，德国佬正在大量撤回驻军，边境上的漏洞越来越多了。中情局MACA-SOG报告的新施瓦本补给问题似乎确有其事。”\n\n“参联会告诉我，这次行动只能动用相当有限的资源，非洲战事已经牵扯了OFN绝大多数的兵力和后勤，而且如你所知，我们的快速反应部队也在南非无法脱身。我们必须得仔细备战，这片大陆对疏于准备的人从来都不友好。”\n\n“所以，我们必须得在人上想想新点子？”"
 antarctica_aao_invasion.10.a:0 "“至少是这样的……”"
 antarctica_aao_invasion.20.t:0 "不可思议的盟友"
 antarctica_aao_invasion.20.desc:0 "麦克默多站的会议室已经变成了作战室，桌子上铺着几十张不同的地形图，标明了可能的德军阵地位置。许多地图上还附有气象报告，南极严峻的气候一览无遗。\n\n雷伯恩、里迪还有其他十几名军官已经度过了许多个不眠之夜，精心策划针对新施瓦本的进攻，力求万无一失。正当他们伏案讨论时，电话响了，雷伯恩接过话筒，说道：“喂？赫尔曼？”会议室里瞬间一片寂静，所有的目光都聚集在中将身上。\n\n“威廉，”赫尔曼·弗莱格回答道，“巴西已经在南非与美国并肩作战，所以我们已经就南极洲的行动与他们展开了接触。至少可以说，他们对加入行动很是热情。”\n\n“嗯，多年以来，他们都一直渴望在南极洲分上一杯羹，很高兴知道巴西会支持我们。”雷伯恩身边的诸位军官互相点头，表示赞同，间或夹杂着稍显奇怪的笑声。\n\n“应该会有几个连在德国领地的西边登陆。几个小时内，我就能知道巴西那边的接头人是谁。”\n\n“太好了，赫尔曼，谢谢你。我们之前谈过的另一个机会呢？乌拉圭？”\n\n话筒另一边短暂地停顿了一下：“现在下断言还为时过早。他们确实也想分一杯羹，也就是在1954年纳粹入侵之前提出的宣称要求，但埃雷拉派坚决反对卷入外国战争，所以我们必须得想想别的办法。他们也很可能需要我们的协助，将军事资产运送到南极洲。”雷伯恩简要地记下通话内容，挂断了电话，作战室里的气氛明显变得更加高涨了。"
 antarctica_aao_invasion.20.a:0 "里迪说道：“至少我们不是孤军奋战了。”"
 antarctica_aao_invasion.20.a.tt:0 "§e美国§!对§QOFN南极洲事务局§!的控制力将提升§W6%§!。"
 antarctica_aao_invasion.30.t:0 "亲爱的巴西"
 antarctica_aao_invasion.30.desc:0 "弗莱格身在办公室中，望向窗外。尽管特区的冬日稍显枯寂凄凉，但欣赏景色总是能够帮助他思考。他叹了口气，回到办公桌前，喝了一口咖啡，继续自己的工作。\n\n事实上，巴西比乌拉圭更容易说服，他们想在南极洲分一杯羹已经有段时间了。“巴西人显然还是在南极待得不够久。”弗莱格不由笑着自言自语，但他也有一些猜测，巴西应该是想和阿根廷展开竞争。\n\n近来，纳粹的过度捕捞也给巴西带来了不少麻烦。天啊，他们甚至还加入了南非战争，南十字星行动不过只是反纳粹伟大斗争的延伸而已。"
 antarctica_aao_invasion.30.a:0 "信函不过只是走个形式。"
 antarctica_aao_invasion.40.t:0 "向乌拉圭的请求"
 antarctica_aao_invasion.40.desc:0 "弗莱格坐在打字机前，斟酌着信函的措辞。不一会儿，打字机的键盘开始噼啪作响：\n\n“大使先生，\n\nOFN南极洲事务局找到了一个在南极大陆打击野蛮纳粹的绝佳时机。鉴于贵国与德国之间的历史，我相信贵国应该会有兴趣，协助美国完成这崇高的事业。”\n\n获得乌拉圭的帮助将是一个重大利好，并且应该不会太过困难。纳粹一直在插手干涉乌拉圭政局，甚至还在最近支持了一场针对现政府的政变。1954年，乌拉圭对南极地区进行了一次短暂的考察，之后德国便占领了当地。事实上，纳粹已经为他做了大部分的外交说服工作。\n\n当然，美国需要为乌拉圭提供一些好处。弗莱格在信函中指出，这将强化其与OFN之间关系，但当然，乌拉圭需要的不止于此。所以，他还提出了一些其他条款，例如在乌拉圭与OFN间建立科研合作关系，并且允诺当下处于新施瓦本西部的乌拉圭宣称领地的主权。\n\n弗莱格感到信心十足。这份提案相当诱人，只要乌拉圭不傻到家，就绝不会拒绝；而对OFN来讲，这是双赢的方案，南极洲事务局与其成员以外的国家积极展开非军事合作无疑有助于强化其国际合法性。"
 antarctica_aao_invasion.40.a:0 "南十字星行动需要一切可能的帮助。"
 antarctica_aao_invasion.50.t:0 "南十字星行动"
 antarctica_aao_invasion.50.desc:0 "OFN南极洲事务局的所有领导人都聚集在麦克默多站的作战室里。时间终于到了，万事俱备，只待东风：充当行动跳板的前哨站里，物资弹药堆积如山；天气依旧恶劣，但行动已然是箭在弦上。这可能是最后一次OFN能够攻敌不备、从德国的魔掌中解放土地的机会。\n\n这场南极战争并非计划已久的周密行动，绝大多数军事装备设计的目的从来都不是在这片无情的大陆上作战。因此，大部分装备都经过了麦克默多站的改装。例如，雪地车上加挂了装甲，以此抵御小型武器以及南极洲数量有限的反坦克武器。无论如何，这就是希望所在。同时，裹着最暖和的大衣的轻步兵们将在行动中担任先锋。\n\n“前线侦察，”里迪说道，“报告说德国佬已经从大多数边界阵地上撤退，我军或许能畅通无阻。”\n\n“那我们盟友的情况如何？”雷伯恩问道。\n\n“巴西舰队正在航向新施瓦本西部的途中，应该在接下来的几小时内就会登陆；乌拉圭特遣队已经在他们东边登陆了。”\n\n“那么就是这样了，我们在南极大陆上经历的第一场战争。”\n\n“真可惜到了这个地步，”希拉里打断，“这地方本不该成为另一片墓地。”\n\n“它肯定不会埋葬我们。”雷伯恩伸手拿起了面前与与边境指挥管制中心连接的电话，说道："
 antarctica_aao_invasion.50.a:0 "“命令，南十字星行动开始。”"
 antarctica_aao_invasion.60.t:0 "第一步"
 antarctica_aao_invasion.60.desc:0 "勒什的担心终于化作了现实，雷伯恩中将下达了越过边界、冲破德军防线的命令：对新施瓦本的入侵行动就此打响。\n\nOFN事务局的士兵们钻出前哨站、冰结的狐狸洞、派克瑞特冰工事，冲出了寒冰凝成的城堡。军队在沉默中前进，许多人都搭乘着装甲雪地车。\n\n勒什和伯德中士继续与队伍一同行进，雪地车在前方带路。他们知道，德国人可能会在任何时候发动进攻。众人不停地四处扭头张望，观察着视野之中的每一处山头或是远处的地平线，不放过一丝一毫敌军的踪影。\n\n然而，德国人似乎一点儿反应都没有，向新施瓦本的进军依然悄无声息。勒什举目眺望四野，试图搞清楚当下的状况。德军肯定没有完全放弃防守。\n\n勒什能想到的唯一解释就是，德国人希望他们这样进攻。但如果这是德军的陷阱，那它究竟埋伏在了哪里？为什么德军还没有行动？他继续往前走着，一步一步搜寻着敌人设下的陷阱和伏击。每当他向前一步，却依旧没能听到地雷的爆炸、伏兵的冲锋时，他心中就只能做出这样的推断：更糟糕的事情就在前面一步。"
 antarctica_aao_invasion.60.a:0 "看不见的陷阱才是会抓住你的陷阱。"
 antarctica_aao_invasion.70.t:0 "铁骑突出刀枪鸣"
 antarctica_aao_invasion.70.desc:0 "伯德和勒什继续向新施瓦本的深处行进，开始在德军战壕里搜寻敌人。他们知道，意外随时都有可能发生。\n\n勒什恍然间觉得有些古怪，自己现在居然会希望德军赶快出现：如果他能看到敌人，那么他就能投入战斗；但只要看不到他们的影子，那敌人就是模糊的威胁，是他手中枪对付不了的东西。\n\n就在这时，他听到咔哒一声，战壕中传来一声巨响，冰与火的涌泉冲天而起，将他的副手伯德中士击倒在地。阵阵头晕目眩的耳鸣中，勒什只能勉强分辨出自己的声音，他大喊着：“伯德！伯德！你还好吗！”俯下身子查看朋友的伤势。\n\n伯德的半张脸庞已经不翼而飞，他的目光在勒什身上稍作停留，然后就彻底停止了呼吸。勒什愣住了，应激本能压制了他的呕吐感。他听到了耳中的无线电通讯，士兵们尖叫着，报告遇到了伏击。\n\n勒什感到不可名状的愤怒自内心深处喷涌而出，他高呼着下令："
 antarctica_aao_invasion.70.a:0 "“让这帮混蛋血债血偿！”"
 antarctica_aao_invasion.80.t:0 "损失"
 antarctica_aao_invasion.80.desc:0 "里迪通过无线电与前线就行动情况进行了一些交流，然后回到了作战室。从他的脸上，雷伯恩看出行动并不如计划一般顺利。“基本上，”里迪面色苍白地说道，“纳粹正在迫使我们，不得不为每一寸土地都付出沉重的代价。德军撤退的报告似乎既是无奈之举，但也是个诡计。我军沿途遇到的许多前哨站和防御工事都提前埋设置了陷阱和地雷，先头部队因此蒙受了严重损失。而且，一等到士兵们清除完一线工事，他们就一头撞进了德国狙击手和反坦克火箭兵组成的杀伤区，雪地车队也损失不小。由于恶劣的天气，任何形式的空中支援都不可能，这意味着我军不得不按照敌人设定好的战场环境与他们进行正面交锋。”\n\n“但是，”雷伯恩说道，“我们正在取得进展？”此时的他看起来宛若一位被挫败的拳击手。\n\n“这确实是个好消息，”里迪回答道，“纳粹的计划是拖慢我们，而不是阻止我们。进一步突入新施瓦本的行动仍然没有脱离正轨，但如果没有更加有力的支援，我军不太可能攻进希席尔马赫站。巴西军队已经在西部成功登陆，根据初步报告，他们几乎没有遇到什么抵抗，新施瓦本似乎没有在那里修筑防御工事。乌拉圭也迅速行动，占领了几处废弃的站点。”\n\n在一阵令人清醒的沉默后，雷伯恩问道：“有没有任何迹象表明，德国人正在调动重装备来对付我们？另外，有战术核武器动用的迹象吗？”\n\n“暂时没有，但如果德国人走投无路……”"
 antarctica_aao_invasion.80.a:0 "“到那时候我们自然会知道的。”"
 antarctica_aao_invasion.90.t:0 "紫心"
 antarctica_aao_invasion.90.desc:0 "瑞安·勒什和他的部下带着全新的使命感，在元首站外的战壕中行进。从前，他会对战争感到忧虑，但现在，瑞安正渴望着正义。\n\n一颗子弹擦着瑞安的脸颊上飞过，他听到了枪声。瑞安跑到一辆雪地车后面做掩护，朝战壕外一座小山岗上的德军工事望去。他终于拼凑出了德军的计划：他们撤退到这里，借助布下的陷阱削弱自己的小队……这就是德军计划干掉他的地方。瑞安下定决心，跳出掩体。“跟我上！”他喊道，他和他的队员们勇敢地对敌人发动了反击。\n\n但德军太多了，他的部下倒在弹雨之中，留下一地的尸体，只能徒劳地试图向前推进。\n\n然后，瑞安感觉自己的胸口仿佛被大锤所击中。他不由得低头，看到自己的躯干上出现了一个血洞。他想继续冲锋，但却倒在了自己和战友们的血泊之中，这是他许久以来第一次感到温暖。随着最后一个人倒下，枪声也停了下来。\n\n瑞安抬起头，他看到了正在走近的德国人。他开始哭泣，低声念道：“对不起，克拉拉，对不起……”\n\n一个德国士兵听到了他的话，然后说了些什么，大概是德语吧。\n\n“这个人还活着！”罗尔夫一边说着，一边踢了踢那人的枪伤，痛苦的呻吟随之而来。他笑了笑，然后说道：“你是觉得自己让这些人失望了吗？别担心，你可以亲自去向他们道歉。”他把步枪对准垂死伤兵的头，扣动了扳机。"
 antarctica_aao_invasion.90.a:0 "瑞安的儿子永远都见不到自己的父亲了，一枚勋章就是所有的遗物。"
 antarctica_aao_invasion.91.t:0 "紫心"
 antarctica_aao_invasion.91.desc:0 "这里在地图上标的名字是“德国极地研究学会三号站”，瑞安·勒什和他的部下带着全新的使命感，在基地南边的战壕中行进。从前，他会对战争感到忧虑，但现在，瑞安正渴望着正义。\n\n一颗子弹擦着瑞安的脸颊上飞过，他听到了枪声。瑞安跑到一辆雪地车后面做掩护，朝战壕外一座小山岗上的德军工事望去。他终于拼凑出了德军的计划：他们撤退到这里，借助布下的陷阱削弱自己的小队……这就是德军计划干掉他的地方。瑞安下定决心，跳出掩体。“跟我上！”他喊道，他和他的队员们勇敢地对敌人发动了反击。\n\n有那么一刻，胜利似乎触手可及，但OFN部队却被压制住了。瑞安朝工事望去，看到一个人举起了似乎是火箭筒的武器。他大喊着：“卧倒！”目送火箭弹飞向一辆雪地车，随后的爆炸将瑞安掀翻在地，他很快就因失血过多而不省人事。\n\n麦克默多站的医务室里，瑞安缓缓醒来，看到里迪少将正在对躺在他旁边的一名伤兵说话。少将注意到他醒来后，转过身来面对着他，问道：“你还好吗，小伙子？”瑞安看了看自己的双腿：它们已经不见了。他的大脑还在努力思考发生的一切，他仍然能感觉到自己的双脚。\n\n里迪说道：“我很抱歉……你失去了双腿，但记住，你还活着，你的家人永远都不必说‘如果他还在人世’这样的话。这是上天给你的好运，答应我，永远都别忘了。”\n\n“我保证。”\n\n里迪笑了：“好，我们送你回家。”"
 antarctica_aao_invasion.91.a:0 "瑞安会守住自己的承诺。"
 antarctica_aao_invasion.92.t:0 "紫心"
 antarctica_aao_invasion.92.desc:0 "瑞安·勒什和他的部下带着全新的使命感，在菲尔希纳站海边的战壕中行进。从前，他会对战争感到忧虑，但现在，瑞安正渴望着正义。\n\n一颗子弹擦着瑞安的脸颊上飞过，他听到了枪声。瑞安跑到一辆雪地车后面做掩护，朝战壕外一座小山岗上的德军工事望去。他终于拼凑出了德军的计划：他们撤退到这里，借助布下的陷阱削弱自己的小队……这就是德军计划干掉他的地方。瑞安下定决心，跳出掩体。“跟我上！”他喊道，他和他的队员们勇敢地对敌人发动了反击。\n\n起初，胜利的希望似乎十分渺茫，但身陷重围的德军节节败退。不久，他们就攻进了仓促设防的菲尔希纳站内部。瑞安和他的战友们一路前进，清理走廊，击倒仍在顽抗的寥寥几个德国人。瑞安绕过又一个角落，突然，一名德军扑向他，将他手中的步枪打落在地，举刀便刺。瑞安钳住袭击者的胳膊，另一只手摸出配枪，对准德国人扣动了扳机。他继续颤抖着前进，与敌军战斗，直到因失血过多而跌倒在地。\n\n麦克默多站的医务室里，瑞安缓缓醒来，看到里迪少将正在对躺在他旁边的一名伤兵说话。少将注意到他醒来后，转过身来面对着他，问道：“你还好吗，小伙子？”瑞安回答道：“是、是的，我觉得还好，只是……克里斯……”\n\n里迪说道：“听我说，伯德中士的事情不是你的错。他知道风险，但他甘愿冒着生命危险，为了你和你的家人能过上最好的生活。向我保证，你会实现他的愿望吗？”瑞安叹了口气：“我希望。”里迪微笑着说道：“好，我们送你回家。”"
 antarctica_aao_invasion.92.a:0 "瑞安见到儿子时，克里斯一定会很开心的。"
 antarctica_aao_invasion.100.t:0 "五英寸"
 antarctica_aao_invasion.100.desc:0 "雷伯恩盯着部下从新施瓦本切下来的那一条土地：在作战室的桌子上，它仅仅只有五英寸长而已。然而，有多少人已经为了这五英寸而牺牲？还有多少人在战斗中伤重不治？又有多少人在冰冷的荒原上与部队走散、冻饿而死？但他们却是在为一片片无法居住的荒漠而泼洒热血。表面上看，这是最没有意义的战争；但雷伯恩不得不强迫自己相信，这场战争很重要，他们在这里所做的一切将会动摇纳粹暴政。\n\n“巴西人已经击溃了所有当面阻击的德军，开始着手建立前哨站和防御工事。”里迪报告道，“他们很快就会彻底站稳脚跟。”\n\n“大陆上多个盟友是好事。”比尔话锋一转，问道，“我们的部队呢？”\n\n“不太妙，缺乏空中支援和兵力输送能力导致我军正在承受不成比例的损耗。我们面前只是断后的德军而已，但我们却被打得落花流水。”\n\n“天气也在拖累我们，而且情况只会越来越糟。”希拉里也接过了话头。\n\n“还是没有核弹的迹象？”雷伯恩问道。\n\n“没有，”里迪回答，“但我军越接近席尔马赫站，德军部署核武器的可能性就越来越大。我们的对手是饥饿、孤立无援、恐慌不已的纳粹分子，天知道要是被逼急了他们会干出来什么事，但这只是次要问题。现在我军补给线拉得太长了，士兵们已经筋疲力尽，雪地车和雪橇也损失不小。坦率地讲，我认为强攻席尔马赫站会带来灾难性的后果，德军已经把它变成了一个坚固的堡垒。”\n\n凭良心说，雷伯恩别无选择。"
 antarctica_aao_invasion.100.a:0 "“下令固守当前阵地，我们得着手防御了。”"
 antarctica_aao_invasion.110.t:0 "信守诺言"
 antarctica_aao_invasion.110.desc:0 "克拉拉刚刚给小西蒙喂完奶，把他轻轻地放在婴儿床里。在过去几个月里，这个小生命就是她在家中唯一的陪伴，或许也是快乐的源泉。她打开电视，犹豫是否要看看新闻，因为她并不笃定自己一定会听到想听的内容。最后，她还是下定决心看一看：都是关于非洲战争的，南极依然杳无音讯。她叹了口气，关掉电视。她并不是世界上唯一一个在害怕的人，但世界认为她的恐惧并不重要。\n\n她的目光在房间中徘徊，最终落在了丈夫的桌游收藏上。她看到，RISK是战争游戏。某种程度上，丈夫就像那个游戏中的一枚棋子，但游戏并不像战争。难道不对吗？骰子一掷，棋子就被放回盒子里了。玩家从来没有问过，他们的母亲会在葬礼上穿什么衣服；或者，如果生活没有被某个暴君的一时兴起所摧毁，他们又会度过怎样的人生；再或者，如果他们消失，家人和孩子又会怎么样。\n\n敲门声打断了她的思绪。克拉拉打开门，简直不敢相信自己的眼睛：面前是瑞安，自己的丈夫，安然无恙。泪水涌出眼眶，两人紧紧拥抱在一起。“我很想你。”瑞安说着。克拉拉也回给他一个吻，“我也是……”然后，她停顿了一下，说道：“有个人我想让你见见。”她拉着他的手，走向西蒙的婴儿床。\n\n“嘿，小家伙……”瑞安低语，他第一次见到了自己的儿子。小婴儿对他笑了笑，尽管世界残酷无情，但在这短暂的时刻，在这小小的地方……一切都平静安好。"
 antarctica_aao_invasion.110.a:0 "不是所有故事都有幸福的结局，但有些故事依然能画上圆满的句点。"
 antarctica_aao_flavor.2.t: "漫长的一天"
 antarctica_aao_flavor.2.d: "凯文·杰克逊士官正坐在一架水上飞机的驾驶舱里，区区几毫米厚的钢板保护着他免受南印度洋寒风的侵袭。在他身边的是詹姆斯·“豌豆瓣”·卡罗尔，一位身材高大的飞行员，还有一堆世界上最先进的雷达设备。凯文停顿片刻，凝视着窗外：极夜才刚刚开始，天幕将将黑下来，他只能勉强眺望到凯尔盖朗群岛的海岸线。这座缥缈朦胧的法国群岛是新施瓦本后勤保障的基石，里迪少将一直都在频繁地派遣他们去侦察这处物流基地是否有什么潜在的疏漏和弱点。\n\n凯文已经精疲力尽了。他每天都要出同样的任务，似乎已经持续了好几个星期，但他不敢让疲惫影响自己。他们身处国际公海，远离巡洋舰基地，而且……异常接近敌人的领地。在这里犯错误可能会付出惨重的代价，甚至丢掉性命。\n\n他盯着雷达，绿色的扫描线像是催眠螺旋一样在屏幕上转了一圈又一圈。凯文数着一个个小光点，它们代表着进出这里的德国船只。不一会儿，他打了个哈欠，勉强说道：“你说得对，豌豆瓣，补给船比昨天要少，比前天更是少得多。”他的副驾驶回应道：“看来德国对这个地方的兴趣好像在渐渐消失，里迪听到这消息会开心的。好了，我们继续盯着。”\n\n这时，控制台上的指示灯开始闪烁。“有股风暴要来了，就在我们回总部的路上，最好趁早回去。”詹姆斯显得略有些紧张。对于副手的意见，凯文稍稍想了一下："
 antarctica_aao_flavor.2.a: "“是，你说得对。我可不想被困在这里儿回不去，再说早点回基地去也没什么。”"
 antarctica_aao_flavor.2.b: "“绝对不行。附近有个地方归澳大利亚管，赫德岛，我们就硬着头皮往那儿上吧。”"
 antarctica_aao_flavor.3.t: "节拍变换"
 antarctica_aao_flavor.3.d: "“好了，朋友们，接下来将为您带来一段精彩的音频纪录片。请欣赏雅克·库斯托对南极洲海洋生物的观察报道。”\n\n塔伊卡知道，这部纪录片会打断麦克默多电台日常广受好评的节奏和蓝调音乐，但南极来客需要了解他们闯入的这片土地。\n\n在广播站里，马修和塔伊卡静静地听着法国人的讲述：这部分讲的是企鹅和它们的迁徙习性，真是引人入胜。突然，马修打断了二人之间的沉默：\n\n“这法西斯混蛋，广播他的纪录片应该被列为违禁行为。”他厌恶地说道。\n\n“什么？真的？老天……我才刚刚开始喜欢这部纪录片呢。”塔伊卡显然有点疑惑。\n\n“真是他妈的太对了，这人的特质就是对出价最高的一方忠心耿耿。我听说，他这次为维希法国效力的唯一原因就是换来掌控凯尔盖朗。真是个卑鄙小人。”\n\n“该死……对不起，我不知道。如果你希望，我可以不再放他的片子。”\n\n“不用想多，塔伊卡，大多数人都不知道这个下流坯子有多龌龊。况且说回来了，这真是部不错的纪录片，只可惜制作人是个这样的坏家伙。”马修叹了口气。"
 antarctica_aao_flavor.3.a: "“谁知道呢，说不定以这家伙的德行，哪天就跳到我们这边来了呢。”"
 antarctica_aao_flavor.4.t: "点到即止"
 antarctica_aao_flavor.4.d: "里迪走下直升机，来到新命名的阿蒂加斯站。直升机引擎停车的同时，乌拉圭基地的氛围也扑面而来。在见识了巴西人那边的情况之后，里迪已经做好了最坏的准备，但现在他环顾四周，忧虑正在晨风中消散。与笼罩在他们北方亲戚身上的恐惧与疲累形成鲜明对比的是，乌拉圭人正在努力工作，他们面带微笑，彼此交谈，眼神中充满了坚定。可尽管如此，里迪还是忍不住自嘲地笑了笑。此时，穆索博士走来向他打招呼，里迪微笑地向朋友伸出了手，说道：“我必须得说，博士，我喜欢你在这儿做的一切。”\n\n穆索也笑着表示感谢，向里迪的四周指点着说道：“那里就是我们下一个栖息地的位置……那个地方我打算建个天文台。”他停顿了一下，放低了欢快的语调，“当然，首先，我们需要做些防御工事。”博士指着一群正在建造派克瑞特冰工事的士兵。\n\n里迪说道：“我看你已经是在做大梦了。你们得明白，我们愿意以任何方式帮助你们对付德国：燃料、武器……甚至驻扎部队。”\n\n穆索郑重地摇了摇头：“我感谢你的提议，但我们不能接受。乌拉圭和德国之间的关系非常微妙，美国涉足这里只会激怒他们。”\n\n里迪对得到的回复大吃一惊：“你确定吗？如果——”\n\n穆索打断了他的话语：“我不会轻易做出这样的抉择。如果他们真的回来了，乌拉圭也会有面对他们的能力。”里迪叹息一声，点了点头，接受了游说失败的结果。随后，穆索微笑着说道：“好了，我的朋友，别再纠缠这些个阴暗的话题了。你一定冻坏了，帐篷里有热咖啡，还有些……更烈的好东西。”显然，博士开朗的举止十分具有感染力，但里迪不知道这感染力能持续多久，毕竟……"
 antarctica_aao_flavor.4.a: "和敌人打交道时，乐观主义很难存续。"
 antarctica_aao_cia.730.t: "结论"
 antarctica_aao_cia.730.desc: "关于局势的演变本有许多可说之处，而对格雷斯顿·林奇和迈克尔·格里格斯而言，这一切都糟糕透顶。\n\n格里格斯和林奇坐在开普敦某处的陆军医院，心中唯有苦涩。华盛顿那群胆小鬼本有绝佳机会彻底铲除“德属非洲”及其殖民帝国的可悲幻想，但他们却放弃良机，转而达成“和平协议”，让纳粹渣滓苟延残喘，继续污染这个世界。\n\n然而林奇决不甘心放弃，更不愿让摩羯座的成果付诸东流。当格里格斯宣称要重返德控区掀起腥风血雨时，这位中情局特工立即回应：“只要你干，我就挺你，给他们点颜色瞧瞧吧，迈克尔。”\n\n听到这话，格里格斯露出残酷的冷笑：“你最好相信我会的，格雷斯顿。我他妈绝对说到做到。要么把德国佬彻底踢出非洲永绝后患，要么我战死沙场——哪个先来都行。”\n\n他的主管赞许地拍了拍他的后背。"
 antarctica_aao_cia.730.a: "“就是这股劲！”"