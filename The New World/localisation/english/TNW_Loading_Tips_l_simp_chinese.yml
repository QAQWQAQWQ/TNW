l_simp_chinese:
 LOADING_TIP_0:0 "§B历史就是人类实现理想的努力。\n- 埃蒙·德·瓦莱拉，1929年§!"
 LOADING_TIP_1:0 "§B我们不会相信一个选票选出的政府，西班牙国民从未通过选票箱自由表达过自己的意志，\n西班牙没有那些愚蠢的愿望。\n- 弗朗西斯科·佛朗哥，1938年§!"
 LOADING_TIP_2:0 "§B我从未放弃过德国——另一个德国。总有一天，战争中那似乎不可避免的仇恨会得到扼制。\n总有一天，全欧罗巴人共荣共存的欧洲必将成为现实。\n- 维利·勃兰特，1943年§!"
 LOADING_TIP_3:0 "§B无论我们是否愿意，变革之风终会吹遍整片大陆，民族意识的增强是一个政治事实。\n- 哈罗德·麦克米伦，1960年§!"
 LOADING_TIP_4:0 "§B我不必考虑正义，我的任务仅是摧毁和消灭。\n- 赫尔曼·戈林，1933年§!"
 LOADING_TIP_5:0 "§B历史在矛盾中前进。\n- 尼古拉·布哈林，1917年§!"
 LOADING_TIP_6:0 "§B一个民族不仅通过它所造就的人，也通过它给以荣誉的人和它所铭记的人展示自己。\n- 约翰·F·肯尼迪，1963年§!"
 LOADING_TIP_7:0 "§B先开枪后问话，出了问题我保护你。\n- 赫尔曼·戈林，1933年§!"
 LOADING_TIP_8:0 "§B将贫困彻底化作历史，实现这一古老理想的办法就近在咫尺。\n我们还得忽视穷困潦倒的国民多久？我们还得让自己的同胞蒙受多少苦难折磨？\n- 迈克尔·哈灵顿，1962年§!"
 LOADING_TIP_9:0 "§B天下没有工人阶级干不了的事，只要激起他们的渴望与热情，\n并为他们指明方向，工人将席卷世界。\n- 比尔·亚历山大，1940年§!"
 LOADING_TIP_10:0 "§B人民太容易成为统治者手中的筹码，你只需告诉他们，国家正面临危险，\n而那群妄谈和平的人是何其缺乏爱国精神，放任着国家走向末路。\n- 赫尔曼·戈林，1946年§!"
 LOADING_TIP_11:0 "§B我已经一而再再而三地强调，我们的经济焦点应该集中在个人。\n- 路德维希·艾哈德，1963年§!"
 LOADING_TIP_12:0 "§B党卫队军官面前没有困难，困难一出现，他的职责就是将其消灭。\n- 海因里希·希姆莱，1942年§!"
 LOADING_TIP_13:0 "§B现在的失败主义态度无疑会导致失败……我们不能放弃未来。\n- 肖恩·勒马斯，1965年§!"
 LOADING_TIP_14:0 "§B民主不是一种状态，民主是一种过程。\n- 赫尔穆特·施密特，1969年§!"
 LOADING_TIP_15:0 "§B让我们致力于希腊人在很多很多年前就曾写下的内容：\n驯服人的野蛮并创造这个世界的温雅生活。\n- 罗伯特·F·肯尼迪，1968年§!"
 LOADING_TIP_16:0 "§B追求自由的斗争必须继续打，直到斗争胜利，直到我们国家化为人类共同体中一员，\n享有自由、幸福、和平。在此之前我们绝不停歇。\n- 奥利弗·坦博，1964年§!"
 LOADING_TIP_17:0 "§B谁抵制变革，谁就是在给衰亡添砖加瓦。\n人类唯一拒绝进步的地方就是墓地。\n- 哈罗德·威尔逊，1967年§!"
 LOADING_TIP_18:0 "§B未来尚未写就，只有人民能书写未来。\n- 阿道夫·苏亚雷斯，1969年§!"
 LOADING_TIP_19:0 "§B民主在理论上是美好的，但在实践中却是一个谬论。\n- 贝尼托·墨索里尼，1928年§!"
 LOADING_TIP_20:0 "§B只因为过去与现在不符，就试图抹掉过去，这种做法不可能，也不应该。\n- 果尔达·梅厄，1975年§!"
 LOADING_TIP_21:0 "§B悲观主义是犹太人永远不能允许自己沾染的奢侈。\n- 果尔达·梅厄，1974年§!"
 LOADING_TIP_22:0 "§B德国绝不会破坏其和平立场，德国只是希望与她的邻国人民平分秋色。\n- 阿道夫·希特勒，1935年§!"
 LOADING_TIP_23:0 "§B我们可不是待宰羔羊，我们确实虚弱且无助，但面对杀戮，唯一的回答就是起来抗争。\n同胞们，不要在凶手的怜悯下苟活，要像自由人一样战斗至死。起来，战至最后一息。\n- 阿巴·科夫纳，1942年§!"
 LOADING_TIP_24:0 "§B我以一名参与过最后一战的士兵的名义说话，我最虔诚的祈祷是，\n这种残忍和毁灭的疯狂再也不会降临人间。没有哪里的人民想要战争。\n- 爱德华八世·温莎，1939年§!"
 LOADING_TIP_25:0 "§B因此，所有人都必须认识到这一点：\n与国家的存在相比，他的自我毫无意义。\n- 阿道夫·希特勒，1939年§!"
 LOADING_TIP_26:0 "§B一个人被打败不算完蛋，当他放弃就真正完蛋了。\n- 理查德·尼克松，1962年§!"
 LOADING_TIP_27:0 "§B除德国本身以外，没有神明值得我们敬仰。\n对德国的狂热信念、希望和热爱才最为重要。\n- 阿道夫·希特勒，1935年§!"
 LOADING_TIP_28:0 "§B如果你说我把整个国家都给了你，你又为什么要像个贼一样来把它偷走？如果这个国家真的属于你，你就不需要偷了。\n- 洛本古拉国王§!"
 LOADING_TIP_29:0 "§B我为恢复那曾使我们国家辉煌的旧观念而奋斗：\n担任公职是为了服务人民，而不是为了获得荣誉，更不是为了利益。\n- 豪尔赫·亚历山德里，1957年§!"
 LOADING_TIP_30:0 "§B一旦我真正掌权，我的首要任务将是消灭犹太人。\n- 阿道夫·希特勒，1922年§!"
 LOADING_TIP_31:0 "§B老天啊，快给我来一大杯苏格兰威士忌吧。这该死的国家真是差劲透顶。\n- 雷金纳德·麦德宁，1963年§!"
 LOADING_TIP_32:0 "§B没人喜欢战争，确切来说，正常人都不会喜欢战争。除非先在他的意识中如此灌输：\n他在战争中可以得到什么，以及怎样去得到。\n- 卡尔·冯·克劳塞维茨，《战争论》，1832年§!"
 LOADING_TIP_33:0 "§B我有时候会想：我不像个大公司的主人，更像个维修店的主人。\n- 库尔特·格奥尔格·基辛格，1968年§!"
 LOADING_TIP_34:0 "§B我只对天主与历史负有责任。\n- 弗朗西斯科·佛朗哥，1937年§!"
 LOADING_TIP_35:0 "§B那些民族是生于繁荣，还是死于饥饿，我不感兴趣；\n我感兴趣的只是他们要作为我们文化的奴隶。\n- 海因里希·希姆莱，1943年§!"
 LOADING_TIP_36:0 "§B法西斯主义是智识上的奴隶制。\n- 维利·勃兰特，1933年§!"
 LOADING_TIP_37:0 "§B我国的政客缺乏纪律约束。我们将于五年内在政治、经济和金融等所有领域建立纪律。\n- 蒙博托·塞塞·塞科，1967年§!"
 LOADING_TIP_38:0 "§B战争不是“终极理性手段”，而是“终极非理性手段”。\n- 维利·勃兰特，1971年§!"
 LOADING_TIP_39:0 "§B一切都表明，法西斯独裁不是论周论月的问题，而是论年的问题。\n- 维利·勃兰特，1933年§!"
 LOADING_TIP_40:0 "§B今天，我带着橄榄枝和自由战士的枪来到这里，请不要让橄榄枝从我手中滑落。\n再说一遍，不要让橄榄枝从我手中滑落。\n- 亚西尔·阿拉法特，1963年§!"
 LOADING_TIP_41:0 "§B没有投票权的国民，意味着其没有保护。\n- 林登·B·约翰逊，1966年§!"
 LOADING_TIP_42:0 "§B我们不想成为守门人，但别无选择。\n- 林登·B·约翰逊，1966年§!"
 LOADING_TIP_43:0 "§B党卫队成员必须诚实、得体、忠诚，对我们种族的同僚坦诚相待，而非外人。\n至于俄罗斯人和捷克人过得如何，我完全不感兴趣。\n- 海因里希·希姆莱，1943年§!"
 LOADING_TIP_44:0 "§B以色列的地土，不是建立在权力之上，而是建立在权利之上。\n- 梅纳赫姆·贝京，1950年§!"
 LOADING_TIP_45:0 "§B在认定某一个种族优越、某一个种族低劣的哲学被永远扔进垃圾堆之前，战争永不会止息。\n- 海尔·塞拉西§!"
 LOADING_TIP_46:0 "§B自上帝创造人、人心生撒旦以来，\n没有过如同纳粹统治时期的德国人对待犹太人那样残忍的行径。\n- 梅纳赫姆·贝京，1977年§!"
 LOADING_TIP_47:0 "§B你只有在觉得被一只兔子踩死好受些时，才会管大象叫做兔子。\n- 肯尼思·卡翁达§!"
 LOADING_TIP_48:0 "§B在保卫自由时，极端不是恶。\n在追寻正义时，中庸不是善。\n- 巴里·戈德华特，1964年§!"
 LOADING_TIP_49:0 "§B德国人先进攻我们就防御，如果冬天到了他们还不进攻，那我们就先发制人，撕碎他们！\n- 格奥尔基·朱可夫，1967年§!"
 LOADING_TIP_50:0 "§B一场奇怪的游戏，取胜的唯一方法就是不去玩它。§!"
 LOADING_TIP_51:0 "§B总有些来自家乡的事物伴随我们一生，使人欢喜使人愁，\n我们终有一日会明白，那便是我们的家乡。\n- 瓦西里·舒克申，1958年§!"
 LOADING_TIP_52:0 "§B如果发生革命，只有天晓得怎么才算完。我认为立宪政体意味着俄国的末日。\n我们需要专制君主！\n- 米哈伊尔·图哈切夫斯基，1917年§!"
 LOADING_TIP_53:0 "§B“我们天赐的元首，愿您永远守护我们的生命。德意志危急关头，是您将她拯救。\n我们日用的饮食，仰赖您的恩赐。愿您与我们一起，不要弃我们不顾。\n元首，我的元首，我的信仰，我的光。元首万岁。”\n- 希特勒青年团祷文，1933年§!"
 LOADING_TIP_54:0 "§B每造一把枪，每下水一艘战舰，每发射一枚火箭\n都是对饥肠辘辘、无家可归和衣不蔽体之人的盗窃。\n- 德怀特·D·艾森豪威尔，1953年§!"
 LOADING_TIP_55:0 "§B对于我们……甚至对于他们而言，国家都是确定而绝对的。\n- 安东尼奥·德·奥利韦拉·萨拉查，1935年§!"
 LOADING_TIP_56:0 "§B我无法预测俄罗斯的行动，那是一个谜中之谜。\n- 温斯顿·丘吉尔，1939年§!"
 LOADING_TIP_57:0 "§B不要祈求舒适生活，祈求自己更加坚强。\n- 约翰·F·肯尼迪，1963年§!"
 LOADING_TIP_58:0 "§B骄奢淫逸不长久，恰如春夜梦一场；强梁霸道终覆灭，好似风中尘土扬。\n- 《平家物语》§!"
 LOADING_TIP_59:0 "§B哪有什么美国梦，我所见的不过是美国噩梦。\n- 马尔科姆·X，1964年§!"
 LOADING_TIP_60:0 "§B我们都想在军备竞赛上踩一脚刹车，我们都想实现军备限制。\n但对于那些希望靠割自己军队的肉来实现和平的人，我只想说：你们就是在无意中加速战争到来。\n- 亨利·“斯库普”·杰克逊，1972年§!"
 LOADING_TIP_61:0 "§B不要对人民群众隐瞒任何事情。不要说谎。谎言一出，就要立即揭穿。不要掩饰任何困难、错误和失败。不要轻言胜利……\n- 阿米尔卡·卡布拉尔§!"
 LOADING_TIP_62:0 "§B我们要是得到权力，就绝对不会轻易放弃，除非把我们的尸体抬出办公室。\n- 约瑟夫·戈培尔，1932年§!"
 LOADING_TIP_63:0 "§B自由是无意犯错误的权利，而不是故意做错事的权利。\n- 约翰·迪芬贝克，1958年§!"
 LOADING_TIP_64:0 "§B昨日的失误已无法弥补，但明天的输赢仍可以拼搏。\n- 林登·B·约翰逊，1964年§!"
 LOADING_TIP_65:0 "§B殖民者常说，是他们把我们带入了历史；而今天，我们证明了事实并非如此。他们不过是让我们抛弃自己的历史，融入他们的历史进程罢了。\n- 阿米尔卡·卡布拉尔§!"
 LOADING_TIP_66:0 "§B啊，我们是年轻的列宁，年轻的十月人向前进！\n- 布里亚特公社颂，1962年§!"
 LOADING_TIP_67:0 "§B除非实现全非洲的解放，否则加纳的独立毫无意义。\n- 夸梅·恩克鲁玛，1964年§!"
 LOADING_TIP_68:0 "§B我宁愿在危险中博得自由，也不愿在安稳中受人奴役。\n- 夸梅·恩克鲁玛，1965年§!"
 LOADING_TIP_69:0 "§B如果哪个乌克兰人能和我平起平坐，我就一枪崩了他。\n- 埃里希·科赫§!"
 LOADING_TIP_70:0 "§B在所有现代梦想中，没有什么比世界和平更加宝贵、更难以实现了。\n- 莱斯特·B·皮尔逊，1957年§!"
 LOADING_TIP_71:0 "§B每个士兵都觉得自己的所作所为有道德的成分。\n但所有战争都是不道德的，想得太多，你就不是个好兵。\n- 柯蒂斯·李梅，1962年§!"
 LOADING_TIP_72:0 "§B希望之末，败亡之始。\n- 夏尔·戴高乐，1945年§!"
 LOADING_TIP_73:0 "§B热核战争不能被视为通过其他手段的政治延续。这只会是集体自杀的手段。\n- 安德烈·萨哈罗夫，1968年§!"
 LOADING_TIP_74:0 "§B人与法西斯无法共存。\n- 瓦西里·格罗斯曼，1960年§!"
 LOADING_TIP_75:0 "§B战友们！俄罗斯民族革命开始了！\n没有退路，我们不去夺取俄罗斯，她就会灭亡！\n- 康斯坦丁·罗扎耶夫斯基，1941年§!"
 LOADING_TIP_76:0 "§B没有自由的祖国不是我的祖国。\n但没有祖国的自由，虽然难以接受，但对我来说仍是自由。\n- 罗曼·古利，1952年§!"
 LOADING_TIP_77:0 "§B于我而言，为祖国而战、为人民献身，是我愿意奉献一生的事业。\n毫不客气地说，我相信自己已经为此尽到一切义务。\n- 格奥尔基·朱可夫，1969年§!"
 LOADING_TIP_78:0 "§B历史处处都是战争，但人人却以为战争不会发生。\n- 伊诺克·鲍威尔，1967年§!"
 LOADING_TIP_79:0 "§B德国与意大利绝不会迟疑。我们遇到的危机不是物质上的，而是对天数失去了信心…\n就像没有领航员的水手。\n- 菲利普·贝当，1936年§!"
 LOADING_TIP_80:0 "§B我们属于高级种族。我们必须牢记，哪怕是最底层的德国工人，在生物意义上的价值也要比这里的劣等民族高出一千倍。\n- 埃里希·科赫，1943年§!"
 LOADING_TIP_81:0 "§B为了获得值得拥有的事物，或许要不得不失去其他一切。\n- 伯纳迪特·代弗林，1969年§!"
 LOADING_TIP_82:0 "§B我挂冠回乡之时，惟余两袖清风。\n- 安东尼奥·德·奥利韦拉·萨拉查，1968年§!"
 LOADING_TIP_83:0 "§B法西斯主义是纯粹的国家原则，正如墨索里尼所言，“国家第一，人排在第二。”\n而民族社会主义恰恰相反，人民排在第一位，国家则是次要的。\n- 奥托·奥伦多夫§!"
 LOADING_TIP_84:0 "§B我在他们，在德国人的集中营里，被夺走了许多东西！\n肌肉、脂肪、牙齿，但从没被夺去过我的信念！我是军人，我会坚守使命。\n- 德米特里·卡尔贝舍夫，1960年§!"
 LOADING_TIP_85:0 "§B爱国主义和民族主义之间存在深刻的区别。\n前者，强调的是对自己祖国的爱，而后者，强调的是对所有其他民族的恨。\n- 德米特里·利哈乔夫，1962年§!"
 LOADING_TIP_86:0 "§B伟大是一种诅咒，立于尸骸之上。\n- 海因里希·希姆莱，1941年§!"
 LOADING_TIP_87:0 "§B你们最后都会去给德国人擦鞋！\n- 伊塔洛·巴尔博，1951年§!"
 LOADING_TIP_88:0 "§B我们必须走这条鲜血铺就的道路。我们别无选择。对我们而言，这是有关生死存亡的问题。\n我们必须准备好面对未来的挑战。\n- 贾迈勒·阿卜杜勒·纳赛尔，1969年§!"
 LOADING_TIP_89:0 "§B从现在开始，只有通过有意的选择和刻意的政策，人类才能生存下去。\n- 若望·保禄二世，1981年§!"
 LOADING_TIP_90:0 "§B为我付出鲜血，我便还你自由！\n- 苏巴斯·钱德拉·鲍斯，1944年§!"
 LOADING_TIP_91:0 "§B我在你们所有人面前宣誓，无论此生短暂或漫长，\n我都将会为英联邦的全体人民、为我们同属的帝国家庭鞠躬尽瘁，奉献一生。\n- 伊丽莎白二世女王，1947年§!"
 LOADING_TIP_92:0 "§B我知道自己的道德良知不能推翻这样一个事实：我只是一个士兵，巨大机器中的小小齿轮。\n- 奥托·奥伦多夫§!"
 LOADING_TIP_93:0 "§B同志们，你们要知道，在你们向共产主义胜利进军的高举的旗帜上，也洒有我的一滴鲜血。\n- 尼古拉·布哈林，1940年§!"
 LOADING_TIP_94:0 "§B武力夺去的，只能用武力夺回。\n- 贾迈勒·阿卜杜勒·纳赛尔，1970年§!"
 LOADING_TIP_95:0 "§B只有我最懂国会，我在那放过火！\n- 赫尔曼·戈林，1942年§!"
 LOADING_TIP_96:0 "§B乌克兰民族主义者组织固然重视成员的生活水准，但我等理想之宏伟远超世俗度量。为实现这一愿景，所需供奉的绝非一人、数百人之牺牲，而是百万生灵的祭献。\n- 斯捷潘·班杰拉，1936年§!"
 LOADING_TIP_97:0 "§B人民当然不想和我们产生太多关联。\n- 莱因哈德·海德里希，1941年§!"
 LOADING_TIP_98:0 "§B拆毁纪念像时，得留下底座。它们将来总会派上用处。\n- 斯坦尼斯瓦夫·耶日·莱茨，1957年§!"
 LOADING_TIP_99:0 "§B最重要的是，权威是可以而且必须被分析的。\n- 爱德华·赛义德，1978年§!"
 LOADING_TIP_100:0 "§B事实是，战争帮了忙。战争带来了巨大的悲伤，使生活非常非常艰难。\n无限悲伤，无数眼泪。但是战前的日子更加艰难，因为人人都是暗自悲伤。\n- 德米特里·肖斯塔科维奇，1979年§!"
 LOADING_TIP_101:0 "§B何必在意他们的死活？我们目的就是让那些混蛋都去死！只要在战争结束时，\n世上剩下的美国人有两个，而德国人只有一个，我们就算赢了！\n- 托马斯·鲍尔，1962年§!"
 LOADING_TIP_102:0 "§B当别人正在书写历史时袖手旁观是一种耻辱。\n- 贝尼托·墨索里尼，1940年§!"
 LOADING_TIP_103:0 "§B宁为一日雄狮，不做百年绵羊。\n- 贝尼托·墨索里尼，1943年§!"
 LOADING_TIP_104:0 "§B有朝一日，全世界都会让国防军为这些事负责，因为这些事就发生在国防军的眼皮底下。\n- 威廉·卡纳里斯，1939年§!"
 LOADING_TIP_105:0 "§B如果下一代人都是不理解我们伟大使命的无能之辈，那我们为民族社会主义奉献的一切都将付诸东流。\n- 奥季洛·格洛博奇尼克§!"
 LOADING_TIP_106:0 "§B我们极力掩饰过去延续至今的邪恶，故而无力遏止今天的新邪恶。\n- 贾瓦哈拉尔·尼赫鲁，1939年§!"
 LOADING_TIP_107:0 "§B1964年，选票或子弹。\n- 马尔科姆·X，1964年§!"
 LOADING_TIP_108:0 "§B回想当初，珍珠港突袭的成功仿佛上天保佑一般。\n- 东条英机，1947年§!"
 LOADING_TIP_109:0 "§B压迫是权力的本质。\n- 恩斯特·卡尔滕布伦纳，1961年§!"
 LOADING_TIP_110:0 "§B残暴与贪婪令德国人丧失了应有的同情心。\n但凡德国人出现的地方，仇恨就会紧随而至，他们的统治注定是一场灾难。\n- 卢卡·彼得罗马尔基，1942年§!"
 LOADING_TIP_111:0 "§B伦理义务必须服从于战争的极权本质。\n- 卡尔·勃兰特§!"
 LOADING_TIP_112:0 "§B他从未见过那种叫“辐射”的怪物，也希望自己永远不要碰见。\n- 小沃尔特·M·米勒，《莱伯维茨的赞歌》，1959年§!"
 LOADING_TIP_113:0 "§B德军是一台机器，而机器可以被摧毁！\n- 康斯坦丁·罗科索夫斯基，1945年§!"
 LOADING_TIP_114:0 "§B然而，现在国家面临的选择就像过去个人面临的选择一样明确：和平，不然就毁灭。\n- 莱斯特·B·皮尔逊，1957年§!"
 LOADING_TIP_115:0 "§B一切法律都是“基于情境的法律”。主权创造并保证总体情境，垄断最终的决定权。\n- 卡尔·施密特，1934年§!"
 LOADING_TIP_116:0 "§B任何本国被撕裂的国民，都有权站起来要求国家的自由。\n- 谢默斯·图米，1971年§!"
 LOADING_TIP_117:0 "§B大敌当前，生死攸关。\n- 安德烈·日丹诺夫，1941年§!"
 LOADING_TIP_118:0 "§B勿忘珍珠港，干死小鬼子。\n- 海军口号§!"
 LOADING_TIP_119:0 "§B维护和平是我们的当务之急。没有和平，我们的独立则无意义，国家的恢复与建设则无意义。\n- 苏加诺，1955年§!"
 LOADING_TIP_120:0 "§B完美属于故事，不属于我们的经历。\n- 普里莫·莱维§!"
 LOADING_TIP_121:0 "§B我们是应盲目追求那将引导我们走向彻底失败的民主自由，还是应收敛无序的自由以求得胜利？\n- 朗诺，1966年§!"
 LOADING_TIP_122:0 "§B永存的自然，凡是逾越其命令者势必将予以严厉的惩罚。\n- 阿道夫·希特勒，《我的奋斗》，1924年§!"
 LOADING_TIP_123:0 "§B人有生死，国有兴亡，而意志长存。意志不惧死亡。\n- 约翰·F·肯尼迪，1963年§!"
 LOADING_TIP_124:0 "§B一个人可能会因某种思想而死，但思想在他死后却会被另外一千个人所实现。\n- 苏巴斯·钱德拉·鲍斯，1940年§!"
 LOADING_TIP_125:0 "§B目的衡量手段的正当性，但总得有什么衡量目的的正当性。\n- 列夫·托洛茨基，1938年§!"
 LOADING_TIP_126:0 "§B大自然不解消亡，只解演变。\n- 韦恩赫尔·冯·布劳恩，1962年§!"
 LOADING_TIP_127:0 "§B遗憾的是，地球不是世外桃源，而是一场生存斗争，并且正因听天由命而极其残酷。\n- 马丁·鲍曼，1971年§!"
 LOADING_TIP_128:0 "§B乐观主义者认为这个世界是所有可能中最好的，而悲观主义者担心这就是真的。\n- 詹姆斯·布朗奇·卡贝尔，《银马》，1926年§!"
 LOADING_TIP_129:0 "§B当魔鬼和你勾肩搭背时，你很难认出他来。\n- 阿尔伯特·施佩尔，1972年§!"
 LOADING_TIP_130:0 "§B对入侵之敌的仇恨是最神圣、最符合人性的感情。\n而这种感情生来如此令人心痛、折磨灵魂，致使上帝禁止任何人二度体验这种感情。\n- 帕维尔·巴托夫论黑色联盟，1959年§!"
 LOADING_TIP_131:0 "§B以眼还眼，只会令整个世界盲目。§!"
 LOADING_TIP_132:0 "§B不要害怕真理之路上无人同行。\n- 罗伯特·F·肯尼迪，1968年§!"
 LOADING_TIP_133:0 "§B人类为了战争情愿抛洒热血，为了和平却畏缩不前。\n- 威廉·奥拉夫·斯塔普雷顿，1916年§!"
 LOADING_TIP_134:0 "§B我平静接受了我那声名狼藉的命运。\n- 加莱亚佐·齐亚诺，1963年§!"
 LOADING_TIP_135:0 "§B老生常谈，成功的果实有上百人认领，但失败的涩果却无人问津。\n- 加莱亚佐·齐亚诺，1946年§!"
 LOADING_TIP_136:0 "§B战时无法律。\n- 马库斯·图利乌斯·西塞罗，公元前52年§!"
 LOADING_TIP_137:0 "§B胜利者从来不会被问及他所说的是否属实。\n- 阿道夫·希特勒，1939年§!"
 LOADING_TIP_138:0 "§B绝不能低估这数百年衰落对我们民族潜意识的影响。\n这也是为什么柬埔寨青年们会不断问自己，作为一个国家，柬埔寨还能否存续下去。\n- 乔森潘，1970年§!"
 LOADING_TIP_139:0 "§B他们对你的要求不多：只是要你去恨你所爱的，去爱你所厌的。\n- 鲍里斯·帕斯捷尔纳克，1960年§!"
 LOADING_TIP_140:0 "§B若友，则虽尽一切，犹言少矣。若雠，则虽惟义在，犹言多矣！\n- 胡安·多明戈·庇隆，1973年§!"
 LOADING_TIP_141:0 "§B他们非死亦非生，只是de-saparecidos（失踪了）。\n- 豪尔赫·拉斐尔·魏地拉，1979年§!"
 LOADING_TIP_142:0 "§B政府或将交替变换数百次，我只愿原则幸存。\n- 伊波利托·伊里戈延。1916年§!"
 LOADING_TIP_143:0 "§B民主治下，你既可治病，也可饱餐，还可教书育人。\n- 劳尔·阿方辛，1983年§!"
 LOADING_TIP_144:0 "§B柬埔寨民族拥有崇高的起源。在抵抗敌人、拯救信仰、解放祖国的时候，从来将生死置之度外……与奴役与宗教迫害相较而言，牺牲便算不得什么。\n- 山玉明，1951年§!"
 LOADING_TIP_145:0 "§B不必恐惧，自由民赖以行走的大道必将再度开放！\n- 萨尔瓦多·阿连德，1967年§!"
 LOADING_TIP_146:0 "§B我是至一、至圣、至公、从宗徒传下来的普世大公天主教会的一员，\n但我并不幼稚。\n- 奥古斯托·皮诺切特，1983年§!"
 LOADING_TIP_147:0 "§B柬埔寨革命不同于西方政治，并不严格遵循于逻辑，而更像是一尊精美繁复的吴哥雕塑，缓缓地展露在观者眼前。\n- 山玉成，1964年§!"
 LOADING_TIP_148:0 "§B和平地调动人民，比使用暴力更为高效。\n- 劳尔·阿方辛§!"
 LOADING_TIP_149:0 "§B有时，懂得等待就是胜利。\n- 热图利奥·瓦加斯§!"
 LOADING_TIP_150:0 "§B我一生都是人民的奴隶，愿以我为奴隶的人民不会成为别人的奴隶。\n- 热图利奥·瓦加斯§!"
 LOADING_TIP_151:0 "§B农民在出售他的产品时被抢劫，购买他需要的商品时被勒索——这就是市场的本质。\n- 符宁§!"
 LOADING_TIP_152:0 "§B人为刀俎，我为鱼肉。\n- 孙中山§!"
 LOADING_TIP_153:0 "§B在巴西鼓动革命，如同与法国人结婚——没有暴力、没有杀戮。\n- 卡洛斯·拉塞尔达§!"
 LOADING_TIP_154:0 "§B乐观者可能会失败，但悲观者已经失败了。\n- 儒塞利诺·库比契克，1956年§!"
 LOADING_TIP_155:0 "§B只要我完成计划的百分之十，我就能带着笑容离任。\n- 若昂·古拉特，1964年§!"
 LOADING_TIP_156:0 "§B我收钱，但我也办事。\n- 阿德马尔·德·巴罗斯，1960年§!"
 LOADING_TIP_157:0 "§B庇隆是我们所有人的神。\n- 玛丽亚·伊娃·庇隆§!"
 LOADING_TIP_158:0 "§B思想不是人类，但能像人类一样战斗。\n- 坦克雷多·内维斯，1985年§!"
 LOADING_TIP_159:0 "§B人类的恶臭还没我爱马的气味好闻。\n- 若昂·巴普蒂斯塔·德·奥利韦拉·菲格雷多，1982年§!"
 LOADING_TIP_160:0 "§B我们遵守一种行为准则，然而很遗憾，这种准则导致了专制。\n- 胡安·马里亚·博达贝里§!"
 LOADING_TIP_161:0 "§B我坚信，作为法治的对立面，武治再度崛起将比想象中要快。\n- 罗伯托·维奥，1967年§!"
 LOADING_TIP_162:0 "§B可是注定的坏运提防不了。\n- 《小癞子》§!"
 LOADING_TIP_163:0 "§B桑丘，自由是上天赐予人类的一份无价之宝，人们应当不惜冒着生命危险去追求它。\n- 《堂吉诃德》§!"
 LOADING_TIP_164:0 "§B年轻人不搞革命，在生物学上都是矛盾的。\n- 萨尔瓦多·阿连德§!"
 LOADING_TIP_165:0 "§B如果社会党要和俄国，一个没有任何英国人会认同的独裁政权交朋友，那为什么我们不能与意大利和德国携手呢？\n- 拉布·巴特勒，1938年§!"
 LOADING_TIP_166:0 "§B我倒下后，请将国旗捡起来，亲一口，然后继续前进。\n- 奥马尔·托里霍斯§!"
 LOADING_TIP_167:0 "§B人民并非永不犯错，但只有人民有权犯错。\n- 何塞·巴特列-奥多涅斯，1904年§!"
 LOADING_TIP_168:0 "§B“规划”是连贯和积极政策的新说法。我相信，政府在经济事务上的强力政策是英国传统的中心。\n- 拉布·巴特勒，1964年§!"
 LOADING_TIP_169:0 "§B民族社会主义之所以能越过战争的火焰和诋毁的风暴，正是因为它乃是高等人的生存意志、健康和力量的天性，以及对生活之美的渴望的代名词。\n- 科林·乔丹§!"
 LOADING_TIP_170:0 "§B每天晚上的新闻都能使我高兴。\n在那里边，世界饱受涂炭，而巴西安宁如常。\n- 埃米利奥·加拉斯塔苏·梅迪西，1970年§!"
 LOADING_TIP_171:0 "§B为了令阿根廷回到稳定，必须让很多人去死。\n- 豪尔赫·拉斐尔·魏地拉，1976年§!"
 LOADING_TIP_172:0 "§B如果死人不能抱怨，他们的死就是有原因的。\n- 阿尔弗雷多·西塔罗萨，1976年§!"
 LOADING_TIP_173:0 "§B我要承认，爸爸，那时候我才发现自己真的很喜欢杀戮。\n- 埃内斯托·“切”·格瓦拉，1959年§!"
 LOADING_TIP_174:0 "§B别忘了，历史上有一次审判基督和巴拉巴的全民公决，而人民选择了释放巴拉巴。\n- 奥古斯托·皮诺切特，1989年§!"
 LOADING_TIP_175:0 "§B你必须小心选择敌人，因为你最终会变得与他们相似。\n- 豪尔赫·路易斯·博尔赫斯§!"
 LOADING_TIP_176:0 "§B有时，民主须经鲜血浸润。\n- 奥古斯托·皮诺切特，1983年§!"
 LOADING_TIP_177:0 "§B我已经接手了运河区，让国会接着吵吧：他们接着吵，运河接着造。\n- 西奥多·罗斯福，1911年§!"
 LOADING_TIP_178:0 "§B正因我们身无一物，我们皆事可为。\n- 卡洛斯·迪特沃恩，1956年§!"
 LOADING_TIP_179:0 "§B无论是秘鲁古往今来的历史，还是明日的预言，都宣告着同一件事：人民做到了。\n- 费尔南多·贝朗德，于阿普里马克，1956年§!"
 LOADING_TIP_180:0 "§B革命不是熟透了的苹果，你得主动摘下它。\n- 埃内斯托·“切”·格瓦拉，1967年§!"
 LOADING_TIP_181:0 "§B我知道你是来杀我的，开枪吧，懦夫，你只能杀死一个人。\n- 埃内斯托·“切”·格瓦拉，1967年§!"
 LOADING_TIP_182:0 "§B我很了解海地人民，因为我就是海地人民。\n- 弗朗索瓦·杜瓦利埃，1964年§!"
 LOADING_TIP_183:0 "§B美国注定要以自由之名荼毒美洲，这是上帝定下的命运。\n- 西蒙·玻利瓦尔，1829年§!"
 LOADING_TIP_184:0 "§B日本绝不能再放任白人的无耻行径逍遥法外。日本有责任践行她的与生俱来的命运，让中国尊重日本，将其影响驱离满洲，使之遵循帝国天命的道路。\n- 荒木贞夫§!"
 LOADING_TIP_185:0 "§B我认为，若要最终实现社会主义祖国，我们至少要杀一百万人。\n- 马里奥·罗伯托·桑图乔，1965年§!"
 LOADING_TIP_186:0 "§B瞧，阿根廷有三分之一是激进派，三分之一是保守派，还有五分之一左右是社会主义者…\n他们一半人爱我，一半人恨我。很明显，他们全都是庇隆主义者！\n- 胡安·多明戈·庇隆，1972年§!"
 LOADING_TIP_187:0 "§B这不是第一次政变，也不会是最后一次。\n- 本哈明·梅嫩德斯，1951年§!"
 LOADING_TIP_188:0 "§B既非胜者，也非败者。而是阿根廷人。\n- 爱德华多·洛纳迪，1955年§!"
 LOADING_TIP_189:0 "§B让阿根廷衰落的四骑士分别是保守派的舞弊、庇隆派的贪婪、军方的狂妄和激进派的政府。\n- 埃米利奥·阿尔多伊，1991年§!"
 LOADING_TIP_190:0 "§B那些智利佬最好别再胡闹，否则我明天就会在圣地亚哥吃早餐。\n- 胡安·贝拉斯科·阿尔瓦拉多，1975年§!"
 LOADING_TIP_191:0 "§B以为军队受自己控制，那是自欺欺人。军队不属于任何人，只遵循自身的法则。\n- 伊斯麦特·伊诺努§!"
 LOADING_TIP_192:0 "§B我的政府犯的最严重的错误是什么？……就是当选了。\n- 阿图罗·弗朗迪西，1972年§!"
 LOADING_TIP_193:0 "§B小伙子们，这场战斗是不公平，但我们要有精神，要有勇气。\n我们的旗帜从未被敌人降下来过，这次也不会。上啊！\n- 阿图罗·普拉特的最后讲话，1879年§!"
 LOADING_TIP_194:0 "§B经济学研究往往发现，买某样东西的最好时机是去年。\n- 马蒂·艾伦，1955年§!"
 LOADING_TIP_195:0 "§B这个体制不会惩罚它自己的人，而是奖励他们。\n它不会囚禁它自己的行刑者，而是保留他们。\n- 鲁道夫·沃尔什，1957年§!"
 LOADING_TIP_196:0 "§B帝国不需要奴隶：需要的是公民和士兵！\n要是光顾着保证我们自己的人民不会揭竿而起，怎能打好未来的仗呢？\n- 埃托雷·穆蒂，1966年§!"
 LOADING_TIP_197:0 "§B希特勒就是个跳旋转舞的狂徒，必须把他干掉。\n- 亨宁·冯·特雷斯寇，1938年§!"
 LOADING_TIP_198:0 "§B以天主和法西斯主义的名义，我们会使意大利变得完整。\n- 尼科洛·贾尼，1965年§!"
 LOADING_TIP_199:0 "§B通往真正而非虚假的兄弟情谊的道路不在于自我否定，而在于自我认识。我们不应否定自我，强迫自己适应他人；应当做好自己，同时给予他人充分的尊重。\n- 伊万·久巴，1966年§!"
 LOADING_TIP_200:0 "§B作为一名军人，我相信，毁灭之战的时刻已经到来。\n- 哈菲兹·阿萨德，1967年§!"
 LOADING_TIP_201:0 "§B法西斯主义，始于对个体的轻蔑，终于对民族的灭亡——但不一定是娘子谷的那种毁灭。\n- 伊万·久巴，1966年§!"
 LOADING_TIP_202:0 "§B尽管经历了大屠杀，但军事行动的天平已经倒向了马普切人一边。\n- 塞拉诺·蒙塔内尔博士，1912年§!"
 LOADING_TIP_203:0 "§B唯有高贵的真主是光明，其余的一切皆黑暗。\n- 法基赫的监护霍梅尼，1970年§!"
 LOADING_TIP_204:0 "§B无政府不是政治上的意识形态，而是一种根本不容于世的状态。\n要怀着最极端的偏见消除藏匿起来的无政府状态，并以秩序取而代之。\n- 亚历山德罗·帕沃利尼，1965年§!"
 LOADING_TIP_205:0 "§B死亡一直是欧洲文明传入太平洋地区的第一标志。\n- 何塞·黎刹，1890年§!"
 LOADING_TIP_206:0 "§B我常对我的同胞们说，菲律宾人不得不从外国人那里了解自己，这难道不可悲吗？\n- 何塞·黎刹，1887年§!"
 LOADING_TIP_207:0 "§B我不要俘虏。我只要你们杀人放火，你们杀得越多，烧得越旺，我就越高兴。我要杀死所有能在敌对行动中携带武器反对美国的人。\n- 雅各布·H·史密斯将军，1901年§!"
 LOADING_TIP_208:0 "§B可能有必要杀死一半的菲律宾人，来让剩下的一半人口拥有更高的生活水平。\n- 威廉·沙夫特将军，1899年§!"
 LOADING_TIP_209:0 "§B任何认为只有通过和平手段才能获取和平的国家很快就会变成另外一个国家的一部分。\n- 理查德·尼克松，1985年§!"
 LOADING_TIP_210:0 "§B我们只需往大门踹上一脚，整座腐朽的建筑便会轰然倒塌。\n- 阿道夫·希特勒，1941年§!"
 LOADING_TIP_211:0 "§B我只想听到同意或不同意！\n- 山下奉文将军要求新加坡投降，1942年§!"
 LOADING_TIP_212:0 "§B如果有一天，人民不堪繁杂的税负，不堪滥权的折磨，转而向他们的敌人寻求救赎，那革命可就到头了！\n- 阿波里纳里奥·马比尼，1899年§!"
 LOADING_TIP_213:0 "§B斯拉夫人要为我们工作。等不需要了，杀了便是。\n- 马丁·鲍曼§!"
 LOADING_TIP_214:0 "§B基督教与民族社会主义格格不入。\n- 马丁·鲍曼§!"
 LOADING_TIP_215:0 "§B党的职能，乃是创造国家之意志。\n- 马丁·鲍曼§!"
 LOADING_TIP_216:0 "§B旧制度垂而不死，新制度一时又不能落地；\n在这个新旧交替的时期，将会出现许多病状。\n- 安东尼奥·葛兰西，1930年§!"
 LOADING_TIP_217:0 "§B党办公厅是时候应当加强控制，我们该为人民负责。\n- 马丁·鲍曼§!"
 LOADING_TIP_218:0 "§B只要足够必要，警察就应出击——既要谨慎，也要敢作敢为。\n- 古斯塔沃·迪亚斯·奥尔达斯，1968年§!"
 LOADING_TIP_219:0 "§B恐惧是最好的政治武器。残忍方能换来尊重。人们或许会痛恨我们，但我们不需要他们爱戴，只需要他们恐惧。\n- 海因里希·希姆莱§!"
 LOADING_TIP_220:0 "§B共和人民党是由什么管辖？命令还是法律？我们是民主政党守法、自由的党员，还是它的仆人？\n- 比伦特·埃杰维特§!"
 LOADING_TIP_221:0 "§B大部分经济学上的谬误都源自于“定量馅饼”的前提假设，以为一方得益，另一方就必有所失。\n- 米尔顿·弗里德曼，1980年§!"
 LOADING_TIP_222:0 "§B你杀我们十个人，我们就杀你们一个人，即便如此，也是你们会先撑不住。\n- 胡志明，1946年§!"
 LOADING_TIP_223:0 "§B只有敢于经受重大挫折的人，才能获得伟大的成就。\n- 罗伯特·F·肯尼迪，1968年§!"
 LOADING_TIP_224:0 "§B当今世界，威胁和平与幸福的最大政治因素便是法西斯主义。\n- 比伦特·埃杰维特，1957年§!"
 LOADING_TIP_225:0 "§B困难不在于开发新思维，而在于摆脱旧思维。\n- 约翰·梅纳德·凯恩斯，1946年§!"
 LOADING_TIP_226:0 "§B世界上有三种谎言：谎言、糟糕透顶的谎言和统计数据。\n- 马克·吐温，1907年§!"
 LOADING_TIP_227:0 "§B我们的地位在此时最为危险。如果再不留心提倡民族主义，\n结合四万万人成一个坚固的民族，中国便有亡国灭种之忧。\n- 孙中山，1924年§!"
 LOADING_TIP_228:0 "§B一切停滞不前、不根据时代需要而变革的事物都注定会灭亡。政治上的拖延往往是致命的。\n- 弗朗西斯科·佛朗哥，1959年§!"
 LOADING_TIP_229:0 "§B法西斯主义不由受害者的数量定义，而是由杀害他们的方式定义。\n- 让-保罗·萨特，1953年§!"
 LOADING_TIP_230:0 "§B依靠现代技术手段，可以令数百万人服从于一人的意志。\n- 阿尔伯特·施佩尔，1959年§!"
 LOADING_TIP_231:0 "§B如果政府强大到能为你提供你所需求的一切，\n那么这个政府也能强大到足以剥夺你所拥有的一切。\n- 巴里·戈德华特，1964年§!"
 LOADING_TIP_232:0 "§B日本敢于欺负我们，主要的原因在于中国民众的无组织状态。\n克服了这一缺点，就把日本侵略者置于我们数万万站起来了的人民之前，\n使它像一匹野牛冲入火阵，我们一声唤也要把它吓一大跳，这匹野牛就非烧死不可。\n- 毛泽东，1938年§!"
 LOADING_TIP_233:0 "§B对于贫困与剥削，社会主义是懦夫的回答！\n只有法西斯主义才能打破你们的枷锁！\n- 埃托雷·穆蒂，1968年§!"
 LOADING_TIP_234:0 "§B一个纳粹和一个共产党达成共识，比两个共产党携手合作容易得多。\n- 伊拉克共产主义者俗语，1946年§!"
 LOADING_TIP_235:0 "§B帝国主义的阴谋将会被阿拉伯和库尔德民族的团结所挫败！\n- 巴格达的一幅标语，1959年§!"
 LOADING_TIP_236:0 "§B记住你们是如何被教导的：“对你的人民要宽容善良，如果你暴戾残忍，他们便会离你而去。\n我派遣你，只为怜悯全世界的人。”\n- 侯赛因-阿里·蒙塔泽里，1975年§!"
 LOADING_TIP_237:0 "§B无论你拜访我国的哪一处地方，你都会发现苦难、贫困和匮乏在民众生活中是多么普遍。\n无论他们是住在棚屋里还是住在沼泽旁，都只是行尸走肉罢了。\n- 阿卜杜勒·卡里姆·卡塞姆，1959年§!"
 LOADING_TIP_238:0 "§B若不进行彻底的改革，早晚有一天，巴西的菲德尔·卡斯特罗会在某个山沟里揭竿而起。\n- 雅尼奥·夸德罗斯§!"
 LOADING_TIP_239:0 "§B我很确信，这个国家会迎来第二次革命。\n- 塔拉特·艾代米尔§!"
 LOADING_TIP_240:0 "§B你不愿为正义挺身而出的一刻，你已经死去。\n你不愿为公正挺身而出的一刻，你已经死去。\n- 小马丁·路德·金，1965年§!"
 LOADING_TIP_241:0 "§B最好的钢铁需历经最热的火焰。\n- 理查德·尼克松，1975年§!"
 LOADING_TIP_242:0 "§B烈士的事业，从来不会因为哪个刺客的子弹而终止。\n- 罗伯特·F·肯尼迪，1968年§!"
 LOADING_TIP_243:0 "§B你们的心，都是收银机做的吧。\n- 汤姆·尤伦，1984年§!"
 LOADING_TIP_244:0 "§B在1960年的选举中，全国乃至全世界关注的问题变成了，\n世界是否还会以半奴隶半自由的状态存在下去。\n- 约翰·F·肯尼迪，1960年§!"
 LOADING_TIP_245:0 "§B建立于暴力之上的社会根本无人道可言。\n它非但没有鼓励人们步向生活的进步和完善，反而对人的自由设下了诸多限制。\n- 教宗若望二十三世，1962年§!"
 LOADING_TIP_246:0 "§B如果一个人想成为领袖，却又不具争议性，\n那么这说明他从来没有过任何立场。\n- 理查德·尼克松，1978年§!"
 LOADING_TIP_247:0 "§B我们可以以史为鉴，但不能活在过去。\n- 林登·B·约翰逊，1966年§!"
 LOADING_TIP_248:0 "§B直白点说，如果要维持必要的纪律，那便只能依靠专制的手段。\n- 贝·披汶颂堪，1936年§!"
 LOADING_TIP_249:0 "§B胜利并非真理，只是用来形容废墟中苟活之人的词语。\n- 林登·B·约翰逊，1966年§!"
 LOADING_TIP_250:0 "§B尼克松就像一匹西班牙马，它在场上能领先九身距，却又马上转过身往反方向跑。\n看着吧，他终究会做错事的。他永远是这样。\n- 林登·B·约翰逊，1961年§!"
 LOADING_TIP_251:0 "§B他们有强力，也有能力统治我们，但社会进程不会被犯罪与强力阻碍。\n历史是我们的，人民创造历史。\n- 萨尔瓦多·阿连德，1967年§!"
 LOADING_TIP_252:0 "§B毁灭和杀戮达到了无法被衡量的程度：\n日复一日，大地被新流的血所浸染，被死伤者的躯体所覆盖。\n- 教宗本笃十五世，1914年§!"
 LOADING_TIP_253:0 "§B如果你们牺牲我的国家能换来世界和平，我会第一个为你们鼓掌。\n但如果换不来的话，就愿上帝宽恕你们的灵魂吧。\n- 扬·马萨里克，1938年§!"
 LOADING_TIP_254:0 "§B不要以陌生人或观光客的身份在地球上生活，而要把这里当作父亲的房屋：相信谷物、土壤、海洋，但最重要的，首先要相信人。\n- 纳泽姆·希克马特§!"
 LOADING_TIP_255:0 "§B在这个国家，唯一要对过去二十五年间发生的一切负责的，便是为实现首领意志而建立和组织、自1938年以来逐步成为法西斯主义政党的共和人民党。\n- 穆罕默德·阿里·艾巴尔§!"
 LOADING_TIP_256:0 "§B我们为了正义而反抗暴君。我们在专制者的尸体上升起正义的旗帜。\n我们面对死亡，用鲜血给我们自己报了仇。\n- 阿卜杜勒-哈迪·法基基，1981年§!"
 LOADING_TIP_257:0 "§B鲍曼对待他自己的下属，就好像是在跟牛打交道一样。\n- 阿尔伯特·施佩尔，1955年§!"
 LOADING_TIP_258:0 "§B尽管土耳其的根系已经腐烂，但我们不会仅仅因此就抛弃它，而是要学会与它共同生存。\n- 苏莱曼·德米雷尔§!"
 LOADING_TIP_259:0 "§B…我们把自己卷入了一个巨大的混乱之中，跌跌撞撞地来控制一台精致的机器，\n我们并不明白这台机器的工作原理。\n- 约翰·梅纳德·凯恩斯，1930年§!"
 LOADING_TIP_260:0 "§B经济学家的影响之关系重大者，却是一些外行人士： 政客、记者、公务员和一般大众。\n- 弗里德里希·哈耶克，1974年§!"
 LOADING_TIP_261:0 "§B昨天是昨天，今天是今天。\n- 苏莱曼·德米雷尔§!"
 LOADING_TIP_262:0 "§B我会笑着跳进我的坟墓，因为我手上沾了五百万人的血。这种感觉，对我来说是种无比的享受。\n- 阿道夫·艾希曼，1945年§!"
 LOADING_TIP_263:0 "§B“我今天再一次穿上了绿色制服，但并不是为了参加一支为维护既得利益和剥削而战的军队，而是为了加入已经初具规模的人民革命军。”\n- 斯万特·格伦德§!"
 LOADING_TIP_264:0 "§B试图忘却，只会徒增苦难；\n救赎之诀，乃是铭记过去。\n- 里夏德·冯·魏茨泽克，1985年§!"
 LOADING_TIP_265:0 "§B自由不是国民生活中的奢侈品，而是它的基础和本质，也是它的意义。\n- 米歇尔·阿弗拉克§!"
 LOADING_TIP_266:0 "§B如果未来并不光明，至少它是多彩的。\n- 碧丽霞·巴尔格尔德，2001年§!"
 LOADING_TIP_267:0 "§B还有什么可做的，事态没法挽回了。\n- 在被推翻后，阿图罗·伊利亚对西尔瓦诺·桑坦德如是说，1966年§!"
 LOADING_TIP_268:0 "§B是时候让国家焕然一新了。对我们来说可能为时已晚，但对我们的下一代而言还没有。\n- 雅尼奥·夸德罗斯，1963年§!"
 LOADING_TIP_269:0 "§B殖民地的人民认为最主要的价值首先是土地，因为这是最实在的——土地该保证面包，当然也保证尊严。\n- 弗朗茨·法农，1963年§!"
 LOADING_TIP_270:0 "§B一个政府和一个党有其应有的人民。而在事情必将发生的日子，人民有其应有的政府。\n- 弗朗茨·法农，1963年§!"
 LOADING_TIP_271:0 "§B我们必须把犹太人的清除当做对欧洲文化的贡献。\n- 巴尔杜尔·冯·席拉赫，1942年§!"
 LOADING_TIP_272:0 "§B那些想要焚书的人，要么是惧怕书中的思想，要么是没有勇气为自己的观点辩护。\n- 汤米·道格拉斯，1959年§!"
 LOADING_TIP_273:0 "§B地球是人类的摇篮，但人类不能永远生活在摇篮里。\n- 康斯坦丁·齐奥尔科夫斯基，1911年§!"
 LOADING_TIP_274:0 "§B怀疑的种子已经种下，真理变得无关紧要，不费吹灰之力，就能击溃几十年来建立的信任。\n- 尼科洛·贾尼，1965年§!"
 LOADING_TIP_275:0 "§B经济就像个女人，要控制她，就要打到她屈服为止。\n- 亚历山德罗·帕沃利尼对马基雅维利的改编，1966年§!"
 LOADING_TIP_276:0 "§B（法西斯）政府可以恣意监禁、流放、迫害所有人，但它能对全体下一代做什么呢？\n- 米歇尔·阿弗拉克，1945年§!"
 LOADING_TIP_277:0 "§B参加非洲革命，光写一首革命歌曲可不够。你必须和人民一起塑造革命，到时自会有人把歌唱。\n- 塞古·图雷，1959年§!"
 LOADING_TIP_278:0 "§B只有当信仰失去定论时，宽容才会增长；定论是要杀人的。\n- 威尔·杜兰特§!"
 LOADING_TIP_279:0 "§B种族学说大多建立在与原始理论相交织的妄想之上。\n- 安东·萨阿德，《民族的崛起》，1932年§!"
 LOADING_TIP_280:0 "§B你们在盖世太保的手里，别妄想我们能给你哪怕一点点照顾。\n- 海因里希·“盖世太保”·穆勒，1939年§!"
 LOADING_TIP_281:0 "§B给我们未来吧，我们受够你们的过去了…还我们国家，让我们去生活——去成长…去爱吧。\n- 迈克尔·柯林斯，就《英爱条约》进行谈判时，1921年§!"
 LOADING_TIP_282:0 "§B比起哲人的墨水和信徒的祈祷，英雄的鲜血更接近上帝。\n- 尤利乌斯·埃佛拉，1934年§!"
 LOADING_TIP_283:0 "§B正因生活如此，才让人梦想复仇。\n- 保罗·高更§!"
 LOADING_TIP_284:0 "§B君为其易，我任其难。\n- 汪精卫，1938年§!"
 LOADING_TIP_285:0 "§B没有什么比独立自由更可贵了。\n- 胡志明，1966年§!"
 LOADING_TIP_286:0 "§B如果一个人感到失望，那意味着他仍然对某种事物怀有信念。\n- 德米特里·肖斯塔科维奇§!"
 LOADING_TIP_287:0 "§B敌人不仅是攻击秩序的人，还有背叛者和冷漠者。\n- 豪尔赫·帕切科·阿雷科，1968年§!"
 LOADING_TIP_288:0 "§B一天，利韦尔·阿尔塞死在了蒙得维的亚的街头上，\n悲痛的人民则意识到乌拉圭正在变化，事态已经失去了控制。\n- 塞尔马·米切利尼，1971年§!"
 LOADING_TIP_289:0 "§B无论发生何事，法兰西抵抗运动的烈火不应熄灭，也绝不会被熄灭。\n- 夏尔·戴高乐，1940年§!"
 LOADING_TIP_290:0 "§B日本、中国和满洲国将为建立东亚新秩序、实现睦邻友好关系、对抗共产主义威胁和促进经济合作的共同目标而团结起来。\n- 近卫文麿，1938年§!"
 LOADING_TIP_291:0 "§B民主滋生的恶魔，威胁着要摧毁一切真诚价值，而恶魔只能由其同类来打败。\n- 弗朗茨·冯·巴本，1933年§!"
 LOADING_TIP_292:0 "§B您错了。聘用他是我们的主意。\n- “支持希特勒担任总理的人被他操纵了”，一位保守派作出这一警告之后，冯·巴本如此回答，1933年§!"
 LOADING_TIP_293:0 "§B一个至高无上的（圣克鲁斯）种族，尽管人口上只占少数，是不会被在文化层面和种族层面上都是劣等人的（玻利维亚）多数人口同化的。\n- 劳尔·德尔·波索·卡诺，1933年§!"
 LOADING_TIP_294:0 "§B这世上有两个穆斯塔法·凯末尔。一个是有血有肉的穆斯塔法·凯末尔，他现在就站在你们面前，终有一日将离开尘世；而另一个就是你们，你们在场的所有人，将要前去祖国的遥远角落，传播理想，不惜以生命将之捍卫。\n- 穆斯塔法·凯末尔·阿塔图尔克，1933年§!"
 LOADING_TIP_295:0 "§B日寇为癣疹之疾，共党乃心腹之患。\n- 蒋介石，1941年§!"
 LOADING_TIP_296:0 "§B在美国，我们可以通过投票选举实现社会主义。\n- 格斯·霍尔，1996年§!"
 LOADING_TIP_297:0 "§B一旦向石油垄断者发起决战，我们的革命就不单单是一场革命了。它将升格为一场同帝国主义面对面的斗争。\n- 艾哈迈德·哈桑·贝克尔，1972年§!"
 LOADING_TIP_298:0 "§B去吧，告诉报社，你们攫取了权力，恬然自命为自由的领袖。而至于我——我沐浴在至高至大的荣誉之中——只因我遵循公义，放弃了一切的剥削。\n- 穆罕默德·马赫迪·贾瓦希里，1948年§!"
 LOADING_TIP_299:0 "§B奸佞及其子孙徒有堂皇宫闱，\n忠志爱国之士直面绞架坟墓。\n- 穆罕默德·萨利赫·巴赫尔·乌鲁姆，1968年§!"
 LOADING_TIP_300:0 "§B朝鲜人坚守传统生活，而不知国外之事。我们好像井底之蛙。\n- 朴正熙，1964年§!"
 LOADING_TIP_301:0 "§B民主不适用于非洲。历史上非洲只有过一位酋长，就在刚果，我们必须团结一致。\n- 蒙博托·塞塞·塞科§!"
 LOADING_TIP_302:0 "§B外面，犹太教堂正在燃烧——可那也是上帝的教堂。\n- 伯恩哈德·利希滕贝格神父，于水晶之夜后，1938年§!"
 LOADING_TIP_303:0 "§B倘若成为了世上最伟大、最强势的国家，何不称霸于世界？\n- 欧文·克里斯托尔§!"
 LOADING_TIP_304:0 "§B有些人死了就是死了，但有些人却能死而复生，成为不朽的存在。\n- 罗慕洛·贝坦科尔特§!"
 LOADING_TIP_305:0 "§B法兰西！法兰西受辱了！法兰西分裂了！法兰西就义了！但法兰西解放了！\n- 夏尔·戴高乐，1971年§!"
 LOADING_TIP_306:0 "§B以长远来指导时事，不过是误导。毕竟长远来看，我们都死了。\n- 约翰·梅纳德·凯恩斯，1923年§!"
 LOADING_TIP_307:0 "§B金子可贸，独立不可。\n- 西蒂·拉赫马赫·卡西姆，1957年，于反日起义前夜。§!"
 LOADING_TIP_308:0 "§B我们不应只在共和党和民主党的方案中作出选择，我们应选择的是正确的方案；我们不应再执着于洗脱过去的责任，我们应肩负起未来新的责任。\n- 约翰·F·肯尼迪，1963年§!"
 LOADING_TIP_309:0 "§B两狗相斗，胜负不取决于其体型，而取决于其斗志。\n- 德怀特·D·艾森豪威尔，1958年§!"
 LOADING_TIP_310:0 "§B日本人说，只靠你们自己，连站都站不起来。那就站起来给他们看看！\n- 林清祥，1962年§!"
 LOADING_TIP_311:0 "§B逃离那些只由一个人行使所有权力的国家，那就是个奴隶之国。\n- 西蒙·玻利瓦尔§!"
 LOADING_TIP_312:0 "§B让我们不惜一切代价建立起家园祖国，其他一切都可以容忍。\n- 西蒙·玻利瓦尔§!"
 LOADING_TIP_313:0 "§B如果你正在穿越地狱，那么继续前进。\n- 温斯顿·丘吉尔§!"
 LOADING_TIP_314:0 "§B咬我一次，可耻在狗；咬我多次，纵容它的我才可耻。\n- 菲莉丝·施拉夫利，1995年§!"
 LOADING_TIP_315:0 "§B徒劳无益的祈祷并不能取代货真价实的工作。\n- 乔治·W·罗姆尼，1968年前后§!"
 LOADING_TIP_316:0 "§B在某些历史事件中，公民的不服从起到了适当且有益的作用。\n- 菲利普·哈特，1965年§!"
 LOADING_TIP_317:0 "§B思恰如予信奉法西斯主义者事，尤所难堪也。\n- 裕仁天皇，1940年§!"
 LOADING_TIP_318:0 "§B我听从于“无声之声”。\n- 岸信介，1960年§!"
 LOADING_TIP_319:0 "§B他们劫掠，他们杀戮，他们偷窃：他们称之为帝国；他们荡平一切制造荒土：他们称之为和平。\n- 塔西佗，公元98年§!"
 LOADING_TIP_320:0 "§B彼国家乃如德意者，然不得不与彼结紧密之同盟，是国之前途，将如何乎？\n- 裕仁天皇，1940年§!"
 LOADING_TIP_321:0 "§B给我个阳台，我就能当总统。\n- 何塞·马里亚·贝拉斯科·伊瓦拉，1960年§!"
 LOADING_TIP_322:0 "§B政治面前，没有挚友，没有宿敌。\n- 巴曼·阿滴列讪§!"
 LOADING_TIP_323:0 "§B我们必须做出激进的改变，360度的那种。\n- 托多尔·日夫科夫§!"
 LOADING_TIP_324:0 "§B应对不自由之世界的唯一方法，就是使自身达到绝对的自由，让自己的存在成为叛逆。\n- 阿尔贝·加缪，1951年§!"
 LOADING_TIP_325:0 "§B我不惧怕失去王位。若我必须退位，我会直接前往美国，去当一名机械师。\n- 鲍里斯三世§!"
 LOADING_TIP_326:0 "§B我的父亲是一位政治家，而我是一名从政的女人。\n我的父亲是一位圣人，而我不是。\n- 英迪拉·甘地§!"
 LOADING_TIP_327:0 "§B“积极中立”这一说法纯属自相矛盾。积极中立就像吃素的老虎一样，根本不可能存在。\n- V·K·克里希纳·梅农§!"
 LOADING_TIP_328:0 "§B亲爱的，我希望你能坚强。坚信生活的美好，保持乐观的态度，要知道革命总是无往不胜的。\n- 瓦列里·萨布林，1961年§!"
 LOADING_TIP_329:0 "§B昆士兰，或者说全国，所能发生的至美之事，便是媒体全部消失。这样，我们就能享受和平宁静的生活了。\n- 乔·比耶尔克-彼得森，1987年§!"
 LOADING_TIP_330:0 "§B确实很悲惨。我们与你们的敌人合作了，你们也与我们的敌人合作了。但，我们都没有为之而战，不是吗？\n- 阿南德·莫汉·萨海，1946年§!"
 LOADING_TIP_331:0 "§B亲而离之，攻其无备，出其不意。\n- 孙子，《兵法》§!"
 LOADING_TIP_332:0 "§B我不知道第三次世界大战会使用何种武器，但我知道，第四次世界大战会使用棍子和石头。\n- 阿尔伯特·爱因斯坦，1949年§!"
 LOADING_TIP_333:0 "§B我想向世人展示我的所作所为，仅此而已。我不在乎我是否以战争英雄还是别的什么形象出镜。\n- 西格弗里德·穆勒，1966年§!"
 LOADING_TIP_334:0 "§B简而言之，我们决不能与穿着褐衫的纳粹同流合污，也决不能沦为帝国主义旗帜上的又一颗星星。\n- 路易斯·阿尔韦托·德·埃雷拉，1947年§!"
 LOADING_TIP_335:0 "§B当有政变的流言传出时，就去看看塞雷尼吧。如果他心怀不良，人民就会受苦；如果他并无二心，国家也将和平安宁。\n- 奥斯卡·赫斯蒂多，1967年§!"
 LOADING_TIP_336:0 "§B我必须警告你，如今世界的战争与和平，并不取决于保加利亚这样的小国。\n- 博格丹·菲洛夫§!"
 LOADING_TIP_337:0 "§B文化不是继承来的，而是征服来的。\n- 安德烈·马尔罗，1959年§!"
 LOADING_TIP_338:0 "§B这世界上半数的困惑，都来源于我们不知道自己的需求是多么微不足道。\n- 理查德·E·伯德海军上将，于南极洲，1935年§!"
 LOADING_TIP_339:0 "§B如果苟活意味着向他人屈膝下跪，那还不如未曾活过。\n- 尼古拉·伯尔切斯库§!"
 LOADING_TIP_340:0 "§B政治暴力留下的尸体远远少于因之腐朽的灵魂。\n- 尼古拉斯·戈麦斯·达维拉，1978年§!"
 LOADING_TIP_341:0 "§B战争中没有什么余地；这是一场游戏，最强悍的一方才能胜出，而我们必须要赢。\n- 吉列尔莫·苏亚雷斯·马松，1966年§!"
 LOADING_TIP_342:0 "§B美国没有永远的朋友，也没有永远的敌人，只有永远的利益。\n- 亨利·基辛格，1971年§!"
 LOADING_TIP_343:0 "§B总有一天，东方会开始向四处进军。而西半球将挺身而起，告诉他们，你只可到此，不可越过。\n- 欧内斯特·C·曼宁，1967年§!"
 LOADING_TIP_344:0 "§B若你非偷不可，那就稍微机智些，做得优雅些。\n- 蒙博托·塞塞·塞科，1976年§!"
 LOADING_TIP_345:0 "§B这火箭什么都好，就是目的地选错了星球。\n- 韦恩赫尔·冯·布劳恩在V-2火箭首次打击伦敦后，1944年§!"
 LOADING_TIP_346:0 "§B原子弹是睿智的上帝赐予我们国家的一份奇妙礼物。\n- 菲莉丝·施拉夫利，1982年§!"
 LOADING_TIP_347:0 "§B我决不允许任何一个美国人跨进我家大门。\n- 何塞·尤洛，1945年§!"
 LOADING_TIP_348:0 "§B如果你无言以对，那你便是无话可说。\n- 小马丁·路德·金，1965年§!"
 LOADING_TIP_349:0 "§B因为民族要起来攻击民族，国家要起来攻击国家；并且到处要有饥荒、瘟疫和地震。\n但是，这一切只是痛苦的开始。\n- 《玛窦福音》24章7-8节§!"
 LOADING_TIP_350:0 "§B若资本主义能在诗情画意之中存延一个世纪，马克思的理论便会遭到彻底否定。然而，资本主义之所以还能展现神威，不过是靠着垄断、压迫、独裁与屠杀……\n- 阿马德奥·博尔迪加，1952年§!"
 LOADING_TIP_351:0 "§B渥太华的掌权者只不过是犹太人和共济会的傀儡。\n- 雷亚尔·考埃特，1943年§!"
 LOADING_TIP_352:0 "§B我之所愿，即为我之所令；吾意足以为理。\n- 尤维纳利斯，115年§!"
 LOADING_TIP_353:0 "§B当你的敌人犯错时，千万不要打断他。\n- 拿破仑§!"
 LOADING_TIP_354:0 "§B没有哪怕一个美国人身处自由之中，除非我们每个人都得到自由。\n- 杰基·鲁宾逊，1947年§!"
 LOADING_TIP_355:0 "§B我的人民就在那里。我必须要弄清楚他们要去哪里，这样我才能领导他们。\n- 亚历山大·奥古斯特·勒德律-洛兰，1963年§!"
 LOADING_TIP_356:0 "§B这是一场豪赌！或是创造一片属于上帝子民的净土，或者让它沉沦于黑暗。我们要么彼此相爱，要么共赴黄泉。\n- 林登·B·约翰逊，1964年§!"
 LOADING_TIP_357:0 "§B如果你现在觉得老鼠应该选举出来一个由猫组成的政府不可理喻，那只要看看加拿大过去90年的历史，你就能茅塞顿开。\n- 汤米·道格拉斯，1935年§!"
 LOADING_TIP_358:0 "§B赌徒们都知道，名为“道德”的赛马能越过障碍的次数少之又少，但唤作“自私自利”的马匹却总能跑出好成绩。\n- 高夫·惠特拉姆，1989年§!"
 LOADING_TIP_359:0 "§B生命中所有问题的答案、世界上的一切祝福与诅咒——其关键并非藏于人们心中，而是与生俱来地刻在骨子里。\n- 约瑟夫斯§!"
 LOADING_TIP_360:0 "§B胜利的果实向我们嘴里来得实在是太快了。\n- 裕仁天皇，1942年§!"
 LOADING_TIP_361:0 "§B判决我吧。没有关系。历史将宣判我无罪。\n- 菲德尔·卡斯特罗，1953年§!"
 LOADING_TIP_362:0 "§B如果恐惧和破坏是法西斯主义的情感源泉，那博爱则属于民主。\n- 特奥多尔·阿多诺，1950年§!"
 LOADING_TIP_363:0 "§B人们常言道：“我们生活在一个腐败、虚伪的社会当中。”这也不尽然。心慈好善的人仍占多数。\n- 若望·保禄一世，1978年§!"
 LOADING_TIP_364:0 "§B政府应当属于人类，而非教士或者神明。人类可以通过自己法律来统治自己，但法律并非出自某一个人之手，而是由全国全民共同制定。\n- 迈赫迪·巴扎尔甘，1970年§!"
 LOADING_TIP_365:0 "§B通往德里的道路就是通往自由的道路。\n- 苏巴斯·钱德拉·鲍斯，1946年§!"
 LOADING_TIP_367:0 "§B我们再也不是你家养的猴子了！\n- 帕特里斯·卢蒙巴，1960年§!"
 LOADING_TIP_368:0 "§B人不应成为纪念的符号，而是应该被铭记在心中。\n- 皮诺·罗穆阿尔迪，1972年§!"
 LOADING_TIP_369:0 "§B人们并非生来就带有种族偏见。你看，儿童就不会这么想。种族问题实质上是教育问题。\n- 艾哈迈德·塞古·图雷，1961年§!"
 LOADING_TIP_370:0 "§B帝国主义意识形态无论源自何方，终将化为泡影。\n- “白玫瑰”传单§!"
 LOADING_TIP_371:0 "§B言论自由、宗教自由、保护公民个人权利免受犯罪政权的暴力侵犯和武断伤害——这些将会是新欧洲的根基。\n- “白玫瑰”传单§!"
 LOADING_TIP_372:0 "§B白金汉宫不接待杀人犯。\n- 乔治六世国王，1947年§!"
 LOADING_TIP_373:0 "§B为每个国家和每个环境寻求一个通用的革命模式，是纯粹的形而上学。\n- 乔治·阿门多拉，1965年§!"
 LOADING_TIP_374:0 "§B玻利维亚是美洲最适合打游击战的国家。\n- 埃内斯托·“切”·格瓦拉，1960年§!"
 LOADING_TIP_375:0 "§B将我埋葬以后，大家就奋身起来，把奴役的锁链粉碎精光，\n并且用敌人的乌血，来浇灌自由的花朵。\n- 塔拉斯·舍甫琴科，《遗嘱》§!"
 LOADING_TIP_376:0 "§B其实革命是并非教人死而是教人活的。\n- 鲁迅§!"
 LOADING_TIP_377:0 "§B千里之行，始于足下。\n- 《道德经》§!"
 LOADING_TIP_378:0 "§B流浪的日子结束时，他找到了理由——\n这不是他的祖国——只有时间能告诉我们\n他对古老法律的蔑视\n究竟是背叛，抑或是先知先觉。愿他安息于此。\n- 利奥·埃默里§!"
 LOADING_TIP_379:0 "§B暴乱并不是无根之水，无本之木——境外煽动势力、武装游击队、形形色色的民权分子和新左派团体掺杂其中，共产党及其同情者充斥其间。\n- 菲莉丝·施拉夫利§!"
 LOADING_TIP_380:0 "§B联邦扶贫工作者和各位公益人士认为，解决“种族聚居贫民窟”问题的唯一方法，就是把它们统统付之一炬。\n- 菲莉丝·施拉夫利，1967年§!"
 LOADING_TIP_381:0 "§B权力让那些没有权力的人苦不堪言。\n- 朱利奥·安德烈奥蒂，1951年§!"
 LOADING_TIP_382:0 "§B大多数自由都被打破法律的人赢得。\n- 迈克尔·富特，1980年§!"
 LOADING_TIP_383:0 "§B与其向侵略者投降，倒不如焚尽一切。\n- 阿里斯·韦卢希奥蒂斯，1945年§!"
 LOADING_TIP_384:0 "§B尽全力去纵横捭阖、维系平衡吧。如果维系不了平衡，那就让这世界熊熊燃烧！\n- 约瑟夫·毕苏斯基，1935年§!"
 LOADING_TIP_385:0 "§B任何只对群体中小部分人有利的制度都无法长久。无论在什么群体中，都必须由大多数人塑造其未来。\n- 比里·帕侬荣，1968年§!"
 LOADING_TIP_386:0 "§B我要重申，在我们的有生之年，甚至在我们子孙后代的有生之年，我们都将在新旧秩序之中不断为权力而斗争。\n- 贝·披汶颂堪，1940年§!"
 LOADING_TIP_387:0 "§B只有我才能为自己的行为负责。\n- 沙立·他那叻，1958年§!"
 LOADING_TIP_388:0 "§B人民之手不会反对我，寡头之手也不会杀死我。它知道，若是我死去，国家将会毁于一旦。\n- 豪尔赫·埃列塞尔·盖坦，1947年§!"
 LOADING_TIP_389:0 "§B我不是独裁者，我也不想成为独裁者。\n- 盛田昭夫，1961年§!"
 LOADING_TIP_390:0 "§B我每天都会将公司的重担扛在肩上。\n- 松下正治，1963年§!"
 LOADING_TIP_391:0 "§B想法并不重要，重要的是如何将之化为现实。\n- 井深大，1972年§!"
 LOADING_TIP_392:0 "§B失去了指导一切的思想，没有了坚定的前进方向，企业就会变成一艘无舵的船。\n- 驹井健一郎，1965年§!"
 LOADING_TIP_393:0 "§B风水这个东西，你要信也可以，但是我更相信事在人为。\n- 李嘉诚，1969年§!"
 LOADING_TIP_394:0 "§B我是这家会社的社长井深。希望各位好好记住。\n- 井深大，1960年§!"
 LOADING_TIP_395:0 "§B正因上帝决定你的命运，你才当把顾客视为上帝。你的生意能否成功，就取决于顾客对你的好感。\n- 松下幸之助，1936年§!"
 LOADING_TIP_396:0 "§B我为自己设定了一个又一个小目标。下一步的开发方向即是我在意的全部内容。\n- 井深大，1955年§!"
 LOADING_TIP_397:0 "§B成功取决于我们的意志和努力。\n- 盛田昭夫，1962年§!"
 LOADING_TIP_398:0 "§B建立个人和企业的良好信誉，这是资产负债表之中见不到，但却是价值无限的资产。\n- 李嘉诚，1967年§!"
 LOADING_TIP_399:0 "§B不管你个人多么优秀、多么成功、多么精明抑或是多么能干，你的企业及未来都系于你聘雇的员工身上。\n- 盛田昭夫，1964年§!"
 LOADING_TIP_400:0 "§B我们会社创立的目的，是要建设一个自由、豁达、精神的理想工厂，使每一位技术人员都能将自己的技术能量最大限度地发挥出来。\n- 井深大，1947年§!"
 LOADING_TIP_401:0 "§B财富聚散无常，唯学问终生受用。\n- 何鸿燊，1966年§!"
 LOADING_TIP_402:0 "§B企业的最高决策权必须集中于社长一人之手，否则就会导致混乱和决策不明。\n- 驹井健一郎，1967年§!"
 LOADING_TIP_403:0 "§B倘若社长对前辈过于恭顺，便无法建立清晰的管理结构。\n- 驹井健一郎，1967年§!"
 LOADING_TIP_404:0 "§B金钱是补偿一个人的工作的唯一办法，我认为这种看法大错特错。人们是需要钱，但他们也需要在工作中得到愉快和自豪。\n- 盛田昭夫，1966年§!"
 LOADING_TIP_405:0 "§B先是混乱，再是美国佬，再是比我糟的家伙。\n- 拉斐尔·莱昂尼达斯·特鲁希略，1955年§!"
 LOADING_TIP_406:0 "§B我们以爱国的心境，射向那野兽的心脏。\n- 安东尼奥·英贝特·巴雷拉刺杀拉斐尔·莱昂尼达斯·特鲁希略后如是说，1963年§!"
 LOADING_TIP_407:0 "§B您能想象得出，巴雷博士，如果参议员听信了一个当地人的胡言乱语，美国的对外政策将会受到怎样危害吗？\n- 尤金·伯迪克和威廉·莱斯勒，《丑陋的美国人》，1958年§!"
 LOADING_TIP_408:0 "§B没什么错，这是个好主意。我们在林子里已经对此作了很多讨论。\n但这件事不应当允许你来做。\n如果成功了，塔伊尼人就会相信美国是他们的救星。\n- 尤金·伯迪克和威廉·莱斯勒，《丑陋的美国人》，1958年§!"
 LOADING_TIP_409:0 "§B玻利维亚是一个被邻国折磨得死去活来的国家……他们的势力要是与其领土扩张挂钩，整片大陆的和平将会被这么一个不可言喻的威胁危害。\n- 智利驻拉巴斯大使馆，1927年§!"
 LOADING_TIP_410:0 "§B他们的罪行很简单：合作、过去和未来。\n- 马克西莫·洛佩斯·莫利纳，1964年§!"
 LOADING_TIP_411:0 "§B墨西哥没有政治犯，只有普通罪犯。\n- 阿道弗·洛佩斯·马特奥斯为镇压铁路罢工所作的辩护，1958年§!"
 LOADING_TIP_412:0 "§B我的左右皆是深渊，在宪法允许的范围内，我其实处在极左立场。\n- 阿道弗·洛佩斯·马特奥斯解释电力国有化政策，1960年§!"
 LOADING_TIP_413:0 "§B墨西哥革命是一场完美的革命，革命将富人变成穷人，穷人变成傻子，傻子变成政客，最后政客又变成了富人。\n- 阿道弗·洛佩斯·马特奥斯批评革命制度党现状，1958年§!"
 LOADING_TIP_414:0 "§B我们并不愿采取某些我们本不愿意采取的措施，但如果有必要，我们还是会毫不犹豫地去做。\n只要是出于职责和本分的要求，我们都得照办；\n无论最后被裹挟到何处，我们都要一往无前。\n- 古斯塔沃·迪亚斯·奥尔达斯回应学生运动，1968年§!"
 LOADING_TIP_415:0 "§B为了维护人民所赋予我们的最高利益，我必须直面某些擅长宣传诋毁、散布谣言且作恶多端的人。\n然而，另一方面，仍有数以百万计的同胞坚定地支持秩序，反对国家陷于无政府状态。\n- 古斯塔沃·迪亚斯·奥尔达斯为政治镇压所作的辩护，1968年§!"
 LOADING_TIP_416:0 "§B青年们，朋友们，人生从来就不平静，而是如狂风一般激荡，生命不是一潭死水，而是一股激流，生活不是和平，而是战争……\n- 卡洛斯·马德拉索对革命制度党激进派的演讲，1960年§!"
 LOADING_TIP_417:0 "§B我将许多美丽的造物交给了墨西哥。只是，此时的她却不知道该如何是好。\n- 劳尔·萨利纳斯·洛萨诺，1976年§!"
 LOADING_TIP_418:0 "§B我坚信，一个优秀的政治家做出的决策，必然有利于绝大多数墨西哥人民。\n- 劳尔·萨利纳斯·洛萨诺，纪念革命制度党连续执政56年，1985年§!"
 LOADING_TIP_419:0 "§B我很确信，如果我们要与世界上的强权们展开对话，自然就要用他们听得懂的语言，现在是时候叫革命的勇敢先锋们拿起步枪了，因为这是他们唯一既听得懂，同时也会给予我们尊重的对话方式。\n- 阿图罗·加米斯在墨西哥杜兰戈对人群发表的讲话，1965年§!"
 LOADING_TIP_420:0 "§B叫士兵送死容易；躲在办公室，耍官威骂师生也容易。难就难在要拿起武器，进入山区阻止我们。\n- 阿图罗·加米斯致奇瓦瓦州州长普拉克西德斯·金纳·杜兰的信，1965年§!"