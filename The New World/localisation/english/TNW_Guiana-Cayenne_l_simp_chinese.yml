 GUC_OAS_Mandate_party: "美洲国家组织过渡政府"
 GUC_OAS_Mandate_party_long: "美洲国家组织过渡政府(Organisation of American States Transitionary Government)"
 GUC_OAS_Mandate: "圭亚那治理委员会"
 POLITICS_GUC_OAS_Mandate_DESC: "圭亚那-卡宴的独立公投本欲一劳永逸解决民族归属的纷乱，然而围绕这个前法国殖民地未来的乱局仍在持续。即便民众已投票选择脱离巴西，实现独立的道路依旧迷雾重重。\n\n随着舞弊指控、暴力事件频发及美洲国家组织发布措辞严厉的报告，干预成了唯一可用的手段。这个本世纪已两易其主的国家，如今不得不迎来第三个主人——由多国官员组成的美洲国家组织监管的过渡政府，其使命既要兑现公投承诺，又要避免再度陷入血雨腥风。\n\n然而美洲国家组织的两大任务难以毕其功于一役。当地领袖朱斯坦·卡塔耶在托管当局眼中虽是个令人不快的角色，但他却是唯一能胜任未来圭亚那领导之位、扶植新生国家站稳脚跟的人选。任何试图缔造同时亲近华盛顿与巴西利亚的盟友之策，既需要官僚手腕，亦需政治家的握手艺术。"
 GUC_Justin_Catayee: "朱斯坦·卡塔耶"
 POLITICS_GUC_Justin_Catayee_DESC: "二战期间，朱斯坦·卡塔耶曾在万里之外为反抗暴政而战。他曾为自由与民主的理想浴血，归乡时却被那些在海外高扬理想的人褫夺了理想。如今，他要亲手改写命运。\n\n生于卡宴的卡塔耶，曾是法兰西风暴下一片飘零的落叶。二战爆发后，巴西接管法国殖民统治，使他得以在巴西军旗下参战。荣归故里时，他未见自由曙光，只目睹法国军靴被巴西军靴取代。圭亚那-卡宴未能跻身世界民族之林，反而在巴西军事统治与企业贪婪中沦为弃婴。\n\n卡塔耶最初在形同虚设的卡宴人民议会崭露头角，很快便因痛斥其懦弱无能愤然离去。他创立圭亚那社会党，以回应巴西当局的漠视，疾呼独立主张。然而当暗杀子弹射入胸膛时，漠视已化作暴戾，独立成为生死存亡的呐喊。\n\n但独立之后路向何方？作为总统，卡塔耶胸怀信念，亦需直面抉择。他笃信社会主义、民主与自由，但这些理念如何在圭亚那大地生根？他亲手点燃的革命之火，会否吞噬他珍视的理想？为了治国安邦，会否不得不背弃初心？他无从知晓，但绝不能因此止步——正如当年穿越战火硝烟时，他也从未因未知而退缩。"
