 MEX_Madrazo.68.t: "总统的邻居"
 MEX_Madrazo.68.desc: "“我到底有什么用？”奥尔达斯坐在华盛顿宾夕法尼亚大道上那间高高的公寓里，沉思着自己在政府中的意义。作为驻扎在全球最强大国家的墨西哥大使，如果自己所在的政府连利用他的价值都不愿意，又何苦让他继续待在这里？一个如此接近美国总统的重要资产，竟被马德拉索无视了。他只能眼睁睁看着自己在这栋华丽建筑里日渐衰败，而他的国家却在西半球错综复杂的形势前摇摆不定，选择无谓的中立。\n\n窗外逐渐昏暗，华盛顿纪念碑挡住了落日的余晖。奥尔达斯望着这座纪念碑，陷入了回忆之中。他怎么会沦落至此？“别骗自己了，古斯塔沃。” 这当然都是他自己的错。当年在阿留申群岛与美国人发生的那场灾难般的外交失误，竟阴差阳错地将他带来了华盛顿，而非他朝思暮想的墨西哥国家宫。如果那时……\n\n“嫉妒吗，奥尔达斯？你居然也会嫉妒？”他对自己说。这种低劣的情绪难道真的是他现今的写照吗？马德拉索是个能干的人，更是他的朋友，这一点他清楚得很。可他却不由自主地幻想着，若是自己坐在那个权力宝座上，定能做得更好。面对嫉妒与绝望，哪怕是曾经意志坚定的政治家，也会退化为一个心怀忌妒的少年。他猛然惊醒过来，拿起水杯："
 MEX_Madrazo.68.a: "“振作点，古斯塔沃。”"
 MEX_Madrazo.69.t: "周一早晨"
 MEX_Madrazo.69.desc: "滴答，滴答，滴答。现在是早上九点，只要奥尔达斯床头柜上的那个表是准的。阳光透过窗帘照在他的床上。而他昨天穿的西装则扔在地板上。奥尔达斯躺在床上，醒着，只是盯着那天花板。他一动不动。\n\n滴答，滴答，滴答。现在是九点十分。麦克维公馆外，早高峰的喧嚣甚是吵闹。若是奥尔达斯站在窗边，他便能看到树叶逐渐被染成金红色。但也只是如果，奥尔达斯还是一动不动。\n\n滴答，滴答，滴答。现在是九点二十二分。那个塔瓦斯科的暴发户窃取他的大位已有半年。这半年来每天都是周而复始，只是和一群和他同样无趣的官员们吃饭。奥尔达斯还是一动不动。\n\n滴答，滴答，滴答。现在是九点三十五分。该起来了。该打烂窗户感受秋风送爽了。该下楼上班了。奥尔达斯还是一动不动。"
 MEX_Madrazo.69.a: "滴答，滴答，滴答。"
 MEX_Madrazo_31.tt: "他空有一番抱负，却无能为力。"
 MEX_Madrazo.70.t: "不可逾越，无法绕行"
 MEX_Madrazo.70.desc: "“‘继续推动联邦区发展为一座充满传统与历史的城市，适应日益壮大的中产阶级需求，同时保持其独特的风格与魅力。’知道这句话是哪来的吧？”\n\n公共工程部长哈维尔·巴罗斯·谢拉当然知道。他之前就草草浏览过这段话，此刻再次听到这句话时，脑海中涌现的仍是那份厌恶之感：“墨西哥城的交通规划？”\n\n“乌鲁丘尔图那混蛋把这团垃圾留在了我的桌上，”联邦区的新摄政科罗纳·德尔·罗萨尔满脸阴沉。为了凸显他的愤怒，德尔·罗萨尔猛地抓起文件夹，将它狠狠地扔进了垃圾桶。纸张撞击金属的巨大响声令谢拉吃了一惊，但随即又感到莫名的畅快。\n\n“你看看贫民窟，公路的车道根本帮不了穷苦人。” 德尔·罗萨尔说，“我来这里，不是跟他们绕圈子、扯废话的。部长先生，我要修地铁。”\n\n谢拉微微一笑，这才对。他们需要墨西哥城的地铁，那才是解决城市无限扩张、贫民窟泛滥的根本办法。只有地铁能让墨西哥城跻身纽约、东京、日耳曼尼亚、伦敦这样的超大都市。这是乌鲁丘尔图从未认真考虑过，甚至觉得毫无必要的计划。尽管谢拉并不欣赏德尔·罗萨尔，但抛开个人的好恶，这位将军说的的确没错。“我也不喜欢废话，将军。咱们干吧。”\n\n见谢拉没有像个自由派那样推三阻四，德尔·罗萨尔感到满意：“好，那咱们说点实际的。我们需要一个切实可行的计划，还得弄点东西让总统签字同意。ICA公司之前搞过类似项目，我们让他们来报个价吧……”\n\n谢拉的笑容顿时僵住了：“土木工程联合公司？他们确实是个好公司，贝尔纳多·金塔纳的能力我也毫不怀疑。可我之前就职于ICA，为了公平起见，你还是再考虑其他公司——”\n\n“胡扯！”德尔·罗萨尔不耐烦地打断他，“你上任时早就与公司切割得一清二楚，大家都知道你干净得很。金塔纳梦想在这里搞一个东京式的地铁已经不是一天两天了，现在他终于有机会实现心愿了。咱们都知道，只有他和ICA能把这事办成，我说得没错吧？”"
 MEX_Madrazo.70.a: "一路绿灯，前方畅通无阻。"
 MEX_Madrazo.71.t: "乌鲁丘尔图的下一步"
 MEX_Madrazo.71.desc: "埃内斯托·P·乌鲁丘尔图在赫苏斯·雷耶斯·埃罗莱斯到达他办公室前，就已经把当天的报纸反复读了五遍。自从被解职后，他一直在琢磨，如何才能在这纷乱的政治格局中重新找到自己的立足之地。显然，全国民众团体联合会是他的最佳选择。雷耶斯迟到了五分钟，但那几分钟的耽搁在他心中无足轻重。\n\n“墨西哥城新地铁项目宣布，德尔·罗萨尔的政绩广受赞誉。”\n\n“胡扯。”他心中暗自咒骂道。雷耶斯到达时，他简单道了歉，说自己迟到了，随即邀请乌鲁丘尔图进办公室。乌鲁丘尔图毫不迟疑地跟在他后面，雷耶斯还没来得及正式开场，乌鲁丘尔图便直奔主题：“你们需要我。”\n\n“抱歉，乌鲁丘尔图学士，您刚才说什么？”\n\n“你没听错。”乌鲁丘尔图平复了一下情绪，努力让自己的语气显得不那么急切。他放松了姿态，继续说道：“那个德尔·罗萨尔，根本无法像我这样，与企业家和日本投资者建立关系。这个城市需要我，无论我是否担任领导职务。全国民众团体联合会是最好的选择。”\n\n雷耶斯看着眼前的乌鲁丘尔图，尽管他没有担任任何职位，但他在党内的人脉关系和忠诚是毋庸置疑的。雷耶斯深知，这样的人物对于维持党的团结至关重要。他斟酌了一下措辞，权衡着如何回应。"
 MEX_Madrazo.71.a: "“你说得有道理，我会想办法给你安排一个职位。”"
 MEX_Madrazo.71.b: "“现在就让你来全国民众团体联合会可能不太合适，不过你可以去别处碰碰运气。”"
 MEX_Madrazo.72.t: "最后时分"
 MEX_Madrazo.72.desc: "“是我的错，抱歉。”塞拉部长对着电话说道，“告诉他，我们明天同一时间再试一次吧。谢谢。”\n\n他挂断了电话。塞拉之前的会议意外拖延了一些时间。乌鲁丘尔图的顽固追随者在地铁系统上制造了麻烦，他们依旧不肯让步，非要把阻止项目视为最后的抗争。所以，他召开了一个紧急会议，明确告诫他们，应该适可而止，别再阻挠施工的启动。不过，正面对抗并不是解决问题的好办法，他需要一个能够悄无声息传递信息的人。这个人得友善、好相处，还得擅长谈判。正是与这个人进行的一场愉快交谈，导致时间被耽误了。\n\n赫苏斯·雷耶斯·赫罗莱斯整理了一下笔记，坐直身体，深吸一口气说道：“既然会议结束了……而我还在这里……我能问你一个问题吗？带点学术性的。”\n\n“比如什么？”\n\n“我一直在思考，”赫罗莱斯说，“总统似乎非常专注于农业科学。派遣农学家当然是好事，但我觉得还有一个产业值得我们更加重视。”\n\n“你指的是地下的产业，对吗？”\n\n“没错。石油是我们最大的出口产品之一，虽然这个行业不属于劳动密集型，但它依赖的是知识和设备。而且你我都清楚，化工将是未来的关键，尤其是塑料。我小时候，第一次见到人造的长丝袜时，感到无比惊奇，现在它们甚至取代了稻草，成为了包装材料。如果我们能为年轻人建立一个墨西哥石油研究所，那我们将不仅仅是追随时代的潮流，而是成为潮流的引领者。”\n\n塞拉思索了一会儿，点了点头，说：“你说得对，我同意你的看法。不仅如此，我还想亲自参与其中。只不过，现在我忙于公共工程事务，实在遗憾，事情实在太多了……”\n\n“当然，当然。我理解。不过，假如你真的想换个节奏的话，部长先生……”"
 MEX_Madrazo.72.a: "“……无论去哪里，你总能把事情办好。”"
 MEX_Madrazo.73.t: "黄砖铺路"
 MEX_Madrazo.73.desc: "马德拉索坐下，解开了西装外套。全国原住民研究院的院长贡萨洛·阿吉雷·贝尔特兰正戴着眼镜，手忙脚乱地翻阅着桌上散乱的文件。显然，他的办公桌太小了，根本放不下这堆积如山的文件。当他伸手去拿圆珠笔时，肘部不小心碰倒了一摞文件。马德拉索俯身帮忙捡起了几份。\n\n“谢谢您，总统阁下……说实话，这个地方已经快要散架了。我们迫切需要维修，但预算实在是捉襟见肘。”\n\n马德拉索挺直了身体，坐在那张吱吱作响的椅子上，仿佛那把完全不符合人体工学的椅子正让他感到一丝窒息般的不适。然而，他对此并未在意。“别担心，院长先生。中央政府总是可以提供帮助的。”\n\n贝尔特兰站起身，走到窗边，揉搓着双手，自我安抚般地轻轻摩挲着。他低声说道：“这还不是我们目前最紧迫的问题，总统阁下。我非常感激您试图解决所谓的‘土著问题’。”\n\n在贝尔特兰看来，这个所谓的“土著问题”无疑是赤裸裸的压迫，但他觉得没必要与这位南方”气旋“展开过于戏剧性的对话。马德拉索微微点头，说道：“我认为，唯一能让土著地区与全国其他地区保持平衡的方法，是大规模的基础设施投资。不过，我听说你对此持有一些保留意见？”\n\n贝尔特兰转过身，直视马德拉索，沉稳地说道：“总统阁下，很多人认为，研究院的使命是彻底抹去原住民的身份。就是字面上的“抹除”。我明白基础设施建设的好处，但在原住民地区，这可能会被视为一种不受欢迎的入侵。”\n\n马德拉索略作停顿，思索着这番话，然后从那摇摇欲坠的椅子上站了起来，平静地说道：“我会考虑你的意见，院长先生。”"
 MEX_Madrazo.73.a: "“不过，你所谓的‘入侵’，在我看来，是‘现代化’。”"
 MEX_Madrazo.74.t: "天气预警"
 MEX_Madrazo.74.desc: "贝尔特兰翻阅着总统幕僚送来的提案。\n\n他不禁怀疑，马德拉索是否真的认真考虑过他的话。毕竟，土著政策是一个需要极度谨慎处理、平衡各方利益、注重细节的事务，总统应该明白，只有信任这一领域的顶尖专家，才能做出明智的决策。\n\n然而，当贝尔特兰开始仔细阅读提案的序言时，一种无法阻挡的预感慢慢在他心中滋生。他的心情如同坠入谷底。这场风暴，不是以往那种摧毁房屋、道路和铁路的天灾，而是另一种破坏，更为深刻的摧残。他完全明白这其中的讽刺意味。\n\n提案的第一阶段计划对土著地区的土地进行测量，并修建道路，将这些地区与附近城镇连接起来。而接下来的第二阶段，将通过大规模的公共部门建设项目，推动这些区域的经济发展。在这些新开发的地区里，医院、警察局、办公楼和学校将陆续兴建。然而，贝尔特兰忍不住思考：这一切究竟是为了促进经济，还是在强迫土著居民逐步融入墨西哥社会，直至他们的身份被完全抹去？\n\n尽管内心充满反感，他却没有任何权力去否决这份提案。尽管他的头衔听上去高贵，但实际上，他不过是个被赋予荣誉的学者。\n\n他唯一能做的，便是尽一切可能去抵挡这场迫在眉睫的风暴，哪怕结局注定失败。"
 MEX_Madrazo.74.a: "贝尔特兰双手抱头，长叹了一口气。"
 MEX_Madrazo.75.t: "焕然一新"
 MEX_Madrazo.75.desc: "机器的轰鸣声和刺耳的蜂鸣声撕裂了空气，仿佛那棵被工人砍倒的树木般震动天地。萨卡巴的村落从梦中惊醒，外面的工人似乎正将这里与他们的工程联系在一起。拉洪，这位拥有悠久玛雅血统的女人，瞥见那些机器缓缓向萨卡巴靠近。\n\n她看着眼前被践踏的庄稼，痛苦地落泪，树木被无情地砍伐，只为了拓宽道路，迎接外界那些令人陌生的改变。她尽量避开外面的工人们，称他们为“梅斯蒂索人”，但却无力阻止村庄将要天翻地覆的现实。\n\n这一次，和以往一样，她从工人身旁走过时，帕斯卡尔——她那天真无邪的儿子，露出了他特有的笑容，兴冲冲地跑向那些新奇的事物。她喊他回来，但她心里清楚，一旦这孩子对什么感兴趣，就很难改变他的注意力。帕斯卡尔兴奋地与工人们攀谈，手舞足蹈，快乐的笑容感染了对面的工人。一个工人递给了她儿子一件东西，帕斯卡尔这才欢快地跑回到她身边。\n\n“妈！妈！快看！”帕斯卡尔把一张海报举到她面前。海报上印着一个男人，脸上挂着笑容，海报下方写着：“搭乘现代化的列车，没人会被落下。”她仔细盯着海报上的男人，然后又望向她的儿子，心中顿时涌上一股莫名的危险预感。"
 MEX_Madrazo.75.a: "海报上的男人，和她儿子的笑容，竟是如此相似。"
 MEX_Madrazo.76.t: "脱轨"
 MEX_Madrazo.76.desc: "“学士，我们显然必须得改变政策……眼下的局面是不可持续的。”\n\n埃切维里亚坐在贝尔特兰院长对面，随着贝尔特兰的陈述轻轻点头，手指无意识地揉搓着。马德拉索的施工项目在土著社区引发了抗议浪潮，直接威胁到了总统的基础设施计划。贝尔特兰的脸上布满怒意，紧锁的眉头暴露了他难以抑制的愤怒。\n\n“我很尊敬总统，但这一次，他确实犯了错。原住民从来不信任政府，学士；他们要的是自主权，想要自己掌控命运。继续推进这个项目，只会让他们的反抗愈演愈烈。”\n\n埃切维里亚再次点头，表示认同：“我明白，院长。事实上，我自己对这个项目也有些保留……”\n\n贝尔特兰身体前倾，双手撑在简陋的桌面上，语气逼迫地问道：“但您会因为这些保留意见采取行动吗，学士？”他的目光直直地盯着埃切维里亚，逼得对方陷入了片刻的沉思。\n\n埃切维里亚心里很清楚，必须采取行动，才是现在最正确的选择——内阁里，没有其他人愿意站出来表态。几十年来，国家对原住民的政策一直是残酷无情的，而这一次的情况更为严重。政府正在摧毁他们的生活方式，用水泥覆盖他们的土地，借着基础设施建设的名义，重新规划出一张冰冷的混凝土蓝图。他必须让总统清醒过来。\n\n而在这种清晰的认知下，马德拉索必然会意识到，在经济政策的管理上，他用错了人——梅纳和他的一众亲信将会失去权势，而他，埃切维里亚，将会成为果断有力的行动者。这是一次绝佳的机会。"
 MEX_Madrazo.76.a: "“我会看看能做些什么，院长。”"
 MEX_Madrazo.77.t: "电车问题"
 MEX_Madrazo.77.desc: "在每周主持召开道法内阁会议上，马德拉索双手交叉，坐在首席上。正当他宣布议程转到讨论土著发展计划的进展时，路易斯·埃切维里亚突然站了起来。\n\n“阁下，同事们。尽管我尊重总统的提议，但是这个项目目前是不可行的。土著关系正在不断恶化，南部农村地区也出现了不满。”\n\n在桌前出现了争吵声前，埃切维里亚成功的将最好一句话说完，“作为行政部长，我建议全面取消该计划。”\n\n几位部长离开座位与支持者低声交谈，或者隔着桌子讨论。马德拉索看着埃切维里亚从贝尔特兰旁走过来，两人在房间中四处寻找着支持。\n\n他的内心一沉。\n\n马德拉索站了起来，敲了敲桌子，让在争吵的各派注意自己。\n\n在众目睽睽之下，是时候行动了。  "
 MEX_Madrazo.77.a: "“该项目将暂停，待贝尔特兰总监进一步联络。”"
 MEX_Madrazo.77.b: "“我们会全速前进。同事们，任何进步都不是容易的！”"
 MEX_Madrazo.78.t: "风"
 MEX_Madrazo.78.desc: "拉洪嘟起嘴唇，轻轻吹出一阵风，伴随着梅斯蒂索工人们沿着那条尘土飞扬的小路，走向回梅里达的方向。这些入侵者自行离去，不论出于什么原因，萨卡巴终于得以再次喘息。\n\n他们留下的损害相对较小。几棵被砍倒的树木，一些残枝依旧留在树桩旁，附近的庄稼也有些被破坏。她继续向前走，目光落在了一小段由早已离去的机器铺设的沥青路面上。\n\n她在这条永远不会完工的道路边缘蹲下，观察着从路面到地面的小落差处，杂草和小植物已经开始在那儿顽强生长。她用手指轻轻揉搓着叶片，然后抬头望向这条道路，心中默念着它终将被时间吞噬，就像所有事物一样。"
 MEX_Madrazo.78.a: "她的宁静未被打扰，萨哈卡巴再次陷入了沉睡。"
 MEX_Madrazo.79.t: "外来者"
 MEX_Madrazo.79.desc: "萨哈卡巴终于通了路——那条从村子直抵梅里达的道路，是无数辛劳砌成的柏油带。拉洪原以为，梅斯蒂索人修路的差事完毕，就会停止对土地的侵犯，离开这里。确实有人走了，可麻烦在于那些留下来的。\n\n那批人收工后，就在萨哈卡巴附近安营扎寨，圈占更多土地据为己有，还把家人一并接来。占地还嫌不够，他们竟直接伸手去掏这片土地的心脏——树林。\n\n远处，小型伐木场的轮廓清晰可见，粗大的原木被切割、刨削，变作一捆捆木材。对外来人而言，这些木头似乎弥足珍贵，说是这里的树与他们家乡的不同……她不关心这些差别，她只关心那些人。\n\n她并不孤单。拉洪加入了村民中的一支队伍，他们对梅斯蒂索人的态度，随着时间流逝愈发敌对；而对方那副“我们就要留下来”的神情，只会让矛盾更加尖锐。"
 MEX_Madrazo.79.a: "独处时，驱赶梅斯蒂索人的念头在拉洪心里翻腾不休。"
 MEX_the_door_opens_tt: "§Y现在能在决议界面查看§!§O锻造革命§!。"
 MEX_forge_of_the_revolution_dynmod: "锻造革命"
 MEX_Madrazo_DS.9.t:0 "秘密行动"
 MEX_Madrazo_DS.9.desc:0 "大雨倾盆而下，雨水砸在帐篷上，穿过缝隙渗进里面。住院和实习医师们蜷缩于其中，任由雨水从头到脚浸透他们。但塞萨尔仍坚守着自己的岗位，守在营地的主入口，一场小雨可阻挡不了他的步伐。\n\n他时而在笔记本上写写画画，时而拿起话筒，拨打电话，一切都与往常无异。当他起身正欲巡视营地时，忽然听见了外面的声响，走近一看，原来是有人要求同他谈话。\n\n“请进，先生。”话音刚落，一名身穿西装的男子就走了进来，他的胸前还别着一枚墨西哥国旗勋章。\n\n“塞萨尔先生，我来自卫生部。我这儿有个东西，或许能引起您的兴趣。”他递来一张层压纸，上面印着部长的签名：“这是他的电话号码。他希望同您建立联络渠道，建议您也提供一个联系方式。”\n\n塞萨尔从笔记本上撕下了一张纸，只写下“AMMRI - 33 17728932”几个字后便递给黑衣人。“向您致以感谢，塞萨尔先生。希望随时都有人守在这台电话旁。”来得快去得也快，部长的信使说完这话便匆匆离去。\n\n实习生正试着理清状况，电话却在此时突然响起。不可能是部长打来的，他才把电话号码给他们。接起听筒，一声熟悉的声音传来：\n\n“塞萨尔。”是阿梅里科，他在医盟的联络人：“有个卫生部的陌生人来到总部，给了我们部长的电话号码。”"
 MEX_Madrazo_DS.9.a:0 "政府将倾听他们的声音。"
 MEX_Madrazo_DS.10.t:0 "变始于言"
 MEX_Madrazo_DS.10.desc:0 "“阁下，医联正在分裂劳工运动。他们唯一的作用就是通过分化工人制造混乱，这场混乱正一步步演变成内战。”来自国家医疗工会的医生语气激烈，轻轻敲打着桌面以宣泄心中的愤怒。若他此刻对病人这样讲话，恐怕早已被拘捕入狱。\n\n\n马德拉索点了点头，略显冷淡地回应：“嗯，你的形容倒也算贴切。”\n\n“倒也算贴切？不止如此吧！那么，总统阁下，你打算如何应对？”医生明显不满意这样的回应，语气中充满了急切与不满。如果坐在他面前的是奥尔达斯，或许会给他想要的答复，但马德拉索另有所思。“医生，你应该尊重罢工线。如果我们强行压制他们，只会给共治主义者更多借口。”\n\n医生的情绪瞬间爆发，打破了平静的外表，激动地连珠炮般说出一连串自相矛盾的言辞。\n\n“激怒他们？阁下？那激怒那些忠诚的工会呢？那些除了美国支持的共产主义者之外的工会呢？如果让医盟的那群无神论狂热分子得逞，革命制度党将失去劳工的支持！到那时，你还能怎么办呢，‘阁下’？”\n\n马德拉索竭力保持镇定，尽力压抑住心中那一丝不屑。他缓缓地给出了自己的回答："
 MEX_Madrazo_DS.10.a:0 "你的需求会得到满足的，医生。在此之前，请保持冷静。"
 MEX_Madrazo_DS.10.b:0 "“你的工会最好跟着医盟一块儿游行。”"
 MEX_Madrazo_DS.11.t:0 "发出屠杀号令"
 MEX_Madrazo_DS.11.desc:0 "拉萨罗·卡德纳斯将军目光中透露出一股蔑视，打量着眼前这个……愣头青。心中不禁传来一阵疑惑，他真能平息医生们的罢工吗？\n\n止暴制乱固然重要，但像马塞利诺·加西亚·巴拉甘这般粗暴——据卡德纳斯所闻还颇为投机的家伙，怕是会过度执行，最后留下更多烂摊子让他收拾。但他没得选，不是吗？毕竟上峰已经下令了。\n\n他强忍厌恶，把一叠文件递给巴拉甘。\n\n“那么，巴拉甘将军：这些是你的命令。根据总统指示，医生罢工已经构成不可容忍的颠覆行为。除我或总统就具体行动方案提出建议外，你需采取一切必要手段予以镇压。”\n\n巴拉甘接过文件，微微点头，行了个标准军礼：“遵命，部长。我定当完成命令。”\n\n卡德纳斯点头应允，内心却仍在纠结最后该下达什么指令：“很好。谢谢你，将军。但还有一件事——”"
 MEX_Madrazo_DS.11.a:0 "“——你办事最好有点数。我们可没给你太多自由，将军。”"
 MEX_Madrazo_DS.11.b:0 "“——你觉得什么该做就做什么，必要时可以主动出击。”"
 MEX_Madrazo_DS.12.t:0 "圆满解决"
 MEX_Madrazo_DS.12.desc:0 "当实习医师们匆忙赶向集合点时，天上突然下起了倾盆大雨。本就迟到的他们如今还要分神躲雨，险些摔倒——\n\n突然，一名实习医师在拐角前停下脚步，害的后面的人不是撞到一起，就是滑倒在地。“阿德里安！你犯啥——”阿德里安转头发出嘘声制止抱怨，接着缓缓指向集合点。\n\n是警察。\n\n“坏了。得取消行动，等他们撤走再出来。”\n“可是如果想让罢工管用我们就得组织起来！”\n“要是全让人一锅端了哪还有什么罢工！你干脆——”\n\n“一帮蠢货！”一名路人冲上前，瞅了眼他们的制服便抬头瞪向聚集的人群。滂沱大雨也丝毫没法阻止他握起拳头，皱起脸庞：“在我儿子最需要你们的时候，你们这群混蛋竟在手术当天关闭医院拒收病人！操你们的妈！你们这帮——”\n\n突然，一群身着蓝警服的人们像是凭空出现一样赶过来，吓了实习医师们一大跳。接着，他们稳健且谨慎地把那人推开。其中一个看上去像是领队的人转过身，面对着白大褂们：“你们可以继续开会了。我们会赶走像他这样想闯进来闹事的人。”\n\n这群实习医师小队算是……一时间摸不着头脑了。但既然没有被当场逮捕，其中一个人还是鼓起了勇气向集合地走去，尽管……"
 MEX_Madrazo_DS.12.a:0 "……为了安全起见，开会时他们要更加注意自己的言行。"
 MEX_Madrazo_DS.13.t:0 "奉命行事"
 MEX_Madrazo_DS.13.desc:0 "警官轻敲手表玻璃，指针指向3点15分。骚动声愈发靠近，说明情报所言非虚，但规模确实小于预期。电台突然响起，通报激进分子已突破警戒线，正好提醒了他们。于是，他率领战友们向对方扑去。\n\n烈日炙烤着身着裹在蓝黑色盔甲下的国家卫士们和数倍于他们的抗议者。怒吼声在街道回荡，十个人和四十个人扭打在一起，尽管社会解体的鼓吹者们激烈抵抗，但最终还是败给了自己的狂妄。警官一把夺过眼前的镰锤标识，高举警棍，凭借秩序之力狠狠砸下。\n\n此日午休时分，他把腿搭在茶水间的茶几上，脸埋在报纸里。镇压行动和他的英勇表现牢牢占据了头版头条。在报道里，他看见了高举警棍的自己，还看见了一名执法者，法律的象征，而不仅仅是蓝黑盔甲下的血肉之躯。每个读者看到此处都能明白一件事——法网恢恢，疏而不漏。\n\n他的目光移到下一版，更多身穿白衣的抗议者映入眼帘——医生和实习医师们。他翻回去看了头版一眼，又翻了回来。倘若再有命令，他依旧会举起警棍……"
 MEX_Madrazo_DS.13.a:0 "……再度对社会解体的鼓吹者们重拳出击。"
 MEX_Madrazo_DS.14.t:0 "夜半来客"
 MEX_Madrazo_DS.14.desc:0 "一声敲响从门上传来，接着再是一声。第三声敲响尚未响起，一个人便走向门边，他那副模样像是需要大睡二十小时才能恢复元气——但他显然没有此等闲暇。\n\n那人踉跄着穿过房间，他的手在门把上停留片刻，紧接着便猛地把门拉开。敲门者是个奇怪的……人？对方裹在风衣底下，带着手套，浑身散发着“别有用心”的气质。\n\n“您好啊！是阿古斯丁·卢克医生吗？在——”房主赶紧打断了风衣男子的话。\n\n“求求您别告诉我他们又叫我去值班。今天是我难得的休息日，要是——”\n\n“恰恰相反！我正是为此而来，因为像您这样的医生只有通过工会团结在一起，才能获得更好的福利待遇和劳动权益！医生先生，我主张的是咱的报酬得配得上工作、假期得更长、设备得更完善，还要有更多的人手来分担工作压力，这一切都得有！当然，尽……”\n\n阿古斯丁歪着头打量着对方，更多假期确实很诱人，但凡事都要付出代价。\n\n“但您此刻若不与罢工队伍中的同事们同仇敌忾，他们也不会忘记你曾经站在谁那一边。他们绝不会轻饶工贼的，其实，要是在这个节骨眼上背叛，你得让人记恨一辈子……”\n\n敲门的那人停下了嘴，想要说点什么来结尾，却不知道该说什么。最终，他想往常一样做出了正确的决定："
 MEX_Madrazo_DS.14.a:0 "……想想你能为之得到什么！"
 MEX_Madrazo_DS.14.b:0 "……想想你能为之失去什么。"
 MEX_Madrazo_DS.15.t:0 "胡萝卜与棒棒糖"
 MEX_Madrazo_DS.15.desc:0 "选择困难症难住了他——眼前尽是美国进口的棒棒糖，口味多的令人眼花缭乱。草莓、樱桃、番石榴，应有尽有。他挑了一根，回到座位上继续国家工人工会的会议。\n\n“国家工人工会联合会还为各位准备了惊喜。不妨把这视作……”一位革命制度党所属的工会官员开始向全体员工分发新合同，那人接过了文件，却漫不关心地让它掉在地上，“……对忠诚的奖励。”当医院里的所有医生都忙着阅读合同时，他转过了头，耳畔传来了弥漫着整间会议室的窃窃私语，人们都在交头接耳，讨论着新的留任奖金和带薪假期。\n\n他虽听说过这个新成立的医生工会，却并未对其有多关注——他加入国家工人工会联合会担任这份回扣丰富的文书工作纯粹是他在墨西哥城担任高管的父亲的手笔。他隐约听见同事们在议论这家工会可能要比医协更好一点，但当他回头望去时，众人立即压低了声音，随即起身离去。\n\n他拿着棒棒糖走向门口，一边出门一边把糖塞进嘴里。刚踏进走廊，他当住院医师的朋友便立马上来追问：“说到底，在国家工人工会联合会也没那么糟吧？”\n\n“我来这儿纯粹只是为了免费棒棒糖，老兄。”他又把糖塞进嘴里。"
 MEX_Madrazo_DS.15.a:0 "蜜桃味的承诺。"
 MEX_Madrazo_DS.16.t:0 "万事俱备"
 MEX_Madrazo_DS.16.desc:0 "舒适的鞋子、口罩、零食、饮用水、畅通的联络、轮班表、标准通讯指令、应急预案、文书工作、交通安排和标语。哪怕是最小的罢工，也需要大量的准备工作。在一次罢工中，一群实习医师正在做着最后的检查，之后，他们将在当地医院的门口集合。医协已经确定时间与地点，他们只需完成后续工作。西蒙已经整装待发，只剩鞋带还没有系。他弯下腰，费力地给久经磨损的鞋带打了个规整的结。刚实习的时候，这双鞋还洁白如新、坚固耐用，但如今却破旧不堪，在散架的边缘挣扎。尽管他有钱去换双新鞋，但他却对这双鞋的模样而自豪。每道污渍都见证着他与战友并肩前行的足迹，是他们团结如钢的象征。\n\n“太棒了！”西蒙被同事的欢呼声吓了一激灵。“我刚得到一个重大消息！”那人举起一张纸，继续道：“谈判小组迫使医院接受了我们提高薪酬的要求！”\n\n“谢天谢地。”一位工会会员松了口气，说道：“现在总算是能回岗位上了。要是再没薪水入账，我怕是要撑不住了。”\n\n“别被小恩小惠收买了。”另一位实习医师反驳道，手里面举着写好了要求的标语牌：“这只能说明我们取得了阶段性胜利，而非大功告成。如果再加把劲儿，我们还能把安全保障和节假日纳入诉求。再说了，我们只是整场运动中的一小部分。工会里的其他人怎么说？”他环视众人，从中寻找支持者：“西蒙，你觉得呢？打算怎么办？”\n\n“今天？我要回家，脚疼的要命。”"
 MEX_Madrazo_DS.16.a:0 "实习医师们万事俱备——除了迎接胜利。"
 MEX_Madrazo_DS.17.t:0 "决策之屋"
 MEX_Madrazo_DS.17.desc:0 "医盟和医协的代表们七嘴八舌地交谈着，吵闹声充满了宽敞的会议室。然而，让这间会议室里充斥着话语和争辩的责任，并不全在他们。还得归功于亲临现场的卫生与援助部长卡洛斯·坎塞科·冈萨雷斯，以及马德拉索总统本尊。\n\n一轮轮的争辩在罢工组织和政府之间爆发，双方都希望对方的立场能一以贯之地坚定下去。对于医盟和医协而言，这意味着他们要在媒体的热情消退前尽可能地争取更佳的条件，否则政府就会趁机打击——\n\n“我愿意——”突然，马德拉索站起身，让他的声音经由麦克风在全场代表间回荡：“——接受你们迄今为止提出的所有诉求。”\n\n“……这是在——”卡洛斯刚开始在心里嘀咕，就被一旁的声音打断。\n\n“我会承认医盟及其所有衍生组织为合法的官方工会，但我有一个条件：你们必须加入全国民众团体联合会，在这一点上，我不会妥协。”话音刚落，寂静的会议室内立马炸开了锅。有人将其视作他们能争取到的最棒条件，却因此被指责为投降主义，应该坚定自己的立场。\n\n马德拉索看着代表们在桌边激烈交锋。意识到他必须要强调一个关键点，才能统一人们的立场："
 MEX_Madrazo_DS.17.a:0 "“看吧，加入联合会好处多多。”"
 MEX_Madrazo_DS.17.b:0 "“这么说吧：如果你们不加入，后果可能不会太好。”"
 MEX_Madrazo_DS.18.t:0 "事业停滞"
 MEX_Madrazo_DS.18.desc:0 "坐在冷冰冰的马桶上，阿图罗竭尽全力噙住泪水。但是最终，他失败了，泪珠从脸颊上划过。在不久之前，他失去了实习医生的职位，此事令他大吃一惊。他甚至完全不记得自己当时说了什么。正式的解雇理由是他的表现不如预期，而且在工作场所之外行为不端。但他心里清楚，真正的原因是他曾发出抗议。对方毫不掩饰地对他作出政治威胁，极力强调职员在体制内的代表性。他在不知不觉中走到了卫生间，因为他知道卫生间这时候一般没有人。他的一举一动宛如机械，直到他关上了隔间的门，让自己尽可能身处安全环境之中，才得以停止。是否只有此刻，他才能作出反应并释放情绪？他的同志们会如何看待他？有人能理解他的痛苦吗？还是会嘲笑他的懦弱和幼稚？\n\n阿图罗拿起一把卫生纸擦眼泪，这纸只有薄薄一层。需求清单上曾列明需要改善卫生间设施，而且还排在非常前列的位置，但事到如今，看着自己的泪水浸透这张薄纸，这一切都显得无关紧要。阿图罗开始思考他当下的糟糕处境，如同那隔间门外肮脏的镜子一般。无数个日月的辛劳和学习才让他得到了这个位置。无数的血泪和汗水就这么白白牺牲了。但他做错什么了吗？根本没有。阿图罗把一大堆擦过眼泪的卫生纸冲进了马桶里，毁灭了记录着他的悲伤的证据。既然错的不是他，那错的就是这个地方。人生不是只有医学这个出路，他尚且还称得上聪明伶俐，年富力强，完全可以重新去学些别的。就算要继续走这条路，去美国发展的机遇也好得多。他的英语水平一向比同龄人要好。\n\n有人敲了敲隔间门。“老兄，我现在很急。你还要在里面待多久？”\n\n阿图罗一言不发地打开了门，走了出来。“完事了，我不会再待在这里了。”"
 MEX_Madrazo_DS.18.a:0 "如果医生只关心医学，不关心政治，那墨西哥也不会继续关心他。"
 MEX_Madrazo_DS.19.t:0 "终归于无"
 MEX_Madrazo_DS.19.desc:0 "会议室内人满为患，但里面的人非来自于同一个组织。恰恰相反，墨西哥的所有执法机构都派出了代表，于此齐聚一堂。从联邦安全局，到联邦法警，再到联邦区警察，无一缺席。如此群英荟萃，只为一事而来：彻底根除敌人——那些罢工者。\n\n各个机构的代表纷纷提出观点，你来我往、激烈辩论、争执不休，着急忙慌地把各种方案记在笔记本上。所有的方案都指向同一个目标：铲除那些顽固至极，拒绝停止无谓抗争的医盟和医协成员。从全面清剿每条残存着罢工迹象的街道，再到对特定目标实施斩首行动，众多方案最终精简成两大方案。\n\n第一种是清剿。把每个依旧威胁公共秩序的罢工者都抓起来，用至少数年的监禁来杀鸡儆猴。这无疑代价高昂、耗时漫长，还要再一次用法律来威慑公众。但如此行动将极为强力、范围全面，彻底扼杀他们死灰复燃的可能。\n\n第二种是对运动的核心人物实施精准打击。把这场运动的每一个头子及其煽动骚乱、制造混乱的罪行公之于众，让他们的恶名传遍大街小巷，变成过街老鼠。这么做成本较低、效率更高，还能在尽量不用法律手段的情况下悄然实施。然而，这没法阻止另一场罢工借尸还魂。那些死硬分子可能会暗中重组、潜逃或者伺机而动。\n\n当双方各执一词、针锋相对时，会议室终于敲定了方案。"
 MEX_Madrazo_DS.19.a:0 "清剿街道，清扫墨西哥。"
 MEX_Madrazo_DS.19.b:0 "斩断蛇头，任他们自生自灭。"
 MEX_Madrazo_DS.20.t:0 "炉边谈话"
 MEX_Madrazo_DS.20.desc:0 "弗朗西斯科从后门溜进屋，在地毯上弹了弹鞋子上的灰。雨点落在窗玻璃上噼啪作响，而水龙头则时不时滴落一两滴水珠，敲在厨房的水槽上，传来滴滴答答的声音。他摘下湿透了的帽子，和外套一起挂在衣架上，竖起了耳朵，仔细聆听着客厅里传来的含糊话语。“帕科，是你吗？”他走进客厅，听见了祖母的声音，随即张开双臂，打算给她一个大大的拥抱。\n\n“爷爷……”弗朗西斯科咧嘴笑着，拍了拍她的肩膀，随后看向他的祖父。他坐在摇椅里，身躯僵硬，因严重关节炎而行动不便，没法起身迎接，只能在壁炉旁同他握手致意。壁炉里的炉火熊熊燃烧，驱散着老人虚弱骨骼中的寒意。帕科钻进空位，朝收音机比划了一下：“今晚播啥？”\n\n“你没听马德拉索总统的最新讲话吗？”\n\n他刚要开口问向祖父母——这对视任何左翼思想为洪水猛兽的死硬保守派——为何会对他们深恶痛绝的思想化身的口中话语如此关心，却被收音机里的声音打断。\n\n“我对广大初级医师所遭遇的困境深表同情，”总统说道，“在近日的谈判中，我们正积极听取他们的诉求并着手进行弥补……”\n\n谈判？什么谈判？政府竟然在和他们对话？而且总统的话语听起来相当真诚，充满温暖。一点都不像那些官僚的废话——自己从电视或者收音机里听到时会自动当成噪音过滤掉的杂音。\n\n他感到自己被倾听了。"
 MEX_Madrazo_DS.20.a:0 "“还没，但我现在得听听了。”"
 MEX_Madrazo_DS.21.t:0 "一闪，又一闪"
 MEX_Madrazo_DS.21.desc:0 "一闪，一闪，又一闪，屋顶吊灯闪个不停。一闪，又一闪，志愿者来回穿梭，文件堆积如山，文字从中溢出漫上地面，逼得往来人群不得不逐字逐句将其拾起，接着又是一闪。一闪，又一闪，打字机声在医协总部这片喧嚣与寂静交织的空间内回响。\n\n又是一闪。\n\n再是一片寂静。\n\n灯泡的嗡鸣戛然而止，打字机与信使上闪烁的反光骤然熄灭，黑暗将整栋楼囫囵吞下。向窗外望去，整条街道依旧闪烁不停、灯火通明。在困惑中，他们终于意识到只有这栋楼陷入了黑暗。\n\n在黑暗之中，一名女子推开大门，再度左右张望，环视街道，警戒着警察和联邦安全局的突袭，但迎接她的只有一片死寂。她转过身来，忽然瞥见一张联邦电力委员会留给医协总部全体人员的通告。\n\n“电力供应已中断，恢复时间另行通知。”仔细一看，联邦电力委员会还“好心”地留了投诉电话，于是她把这张通告带进一楼，给聚集在里面的所有人都看了一眼。众人立即火速驱车前往附近配有电话的成员家中。拨号盘被转动，被指定的号码接通电话，刺耳的噪音充满了听筒。"
 MEX_Madrazo_DS.21.a:0 "一闪，又一闪，还是一片寂静。"
 MEX_Madrazo_DS.22.t:0 "切实成果"
 MEX_Madrazo_DS.22.desc:0 "“啊……”医盟的代表向椅背靠去，这场费心劳神的会议尽管累人，但终归是换来了那么些切实的成果。不过，这份和职团主义体系的代表们历经反反复复的辩论与争执才讨来的所谓“切实成果”，看上去只是一沓薄薄的文件。\n\n而在此刻，这沓文件仅仅只是让医盟加入全国民众团体联合会的协议草案。尽管他提出的诸多条件已经被纳入协议，但仍有许多诉求未获采纳。他内心深知，这些被否决的诉求必将在医盟内部引发重大波澜。他越往下读，忧虑就越深——他的同事们八九不离十要在投票中否决这份协议。\n\n他的忧虑也传给了对面的代表，思维的病毒就这般开始蔓延。在半分钟的沉默后，职团主义体系的代表终于开口，打破了屋中的死寂："
 MEX_Madrazo_DS.22.a:0 "“我们可以再提高薪酬或者加入其他条件。”"
 MEX_Madrazo_DS.22.b:0 "“那样的话，警察就会上门请你喝茶，而你可能得拿一两颗牙来当回礼。”"
 MEX_Madrazo_DS.23.t:0 "鲜血、汗水与尘土"
 MEX_Madrazo_DS.23.desc:0 "墨西哥城上空，烈日炙烤着干涸的高地，透过沉闷厚重的空气灼烧着人们。行走在街道上的每一步都会高高扬起尘土，融进首都那充满着烟火气的雾霭。城市一隅，一群组织严密的医务工作者列队绕圈行进，高举着写满诉求的标语，在抗议中扬起阵阵尘土。参加游行的医协成员都是这方面的行家，在同政府的斗争中可是身经百战，见得多了。一切都在按计划进行，只是今天现场的状况有点不大一样。除了他们和空气中飞扬的尘土，街道上空空如也。没有记者、没有警察，甚至没有好奇的市民在干自己的事。只有熊熊烈日在见证着接下来即将发生的一切。\n\n突然，人工烟雾淹没了抗议中的人群。无论是榴弹发射器中射出的烟幕，还是滚落石板路的催泪瓦斯，这些同沙尘与混乱交织的化学云团都在宣告和平示威到此为止。防暴警察狂风骤雨般逼近人群。没有谈判、没有预警、更没有撤离时间。无数戴着防毒面具、手持警棍的警察奉命而来，只为向他们传递一个信号。毒辣的阳光晒在他们深色的制服上，制服下被汗水浸透的手臂则重重砸向抗议者。天鹅绒手套已被撕碎，潜藏其下的铁棍终于露出了獠牙。\n\n纵使精通医术、矢志救人，医协的抗议者们在首都久经沙场的警察面前还是太年轻、太简单了。医生和青年医师们接二连三地遭到推搡、殴打和逮捕，直到他们屈服或者逃走才停止。烟幕散尽后，医协的所谓“集体谈判力”已经在这满目疮痍的街头销声匿迹了。前几分钟还在高呼口号的抗议者们，此刻却已沾满了鲜血、汗水与尘土，慌不择路地跑回家中舔舐伤口。他们自此再不敢直面国家机器，更遑论挑战革命制度。"
 MEX_Madrazo_DS.23.a:0 "国家垄断暴力与革命。"
 MEX_Madrazo_DS.24.t:0 "拿手好戏"
 MEX_Madrazo_DS.24.desc:0 "按钮按下，雪花般的噪点从漆黑屏幕上骤然显现，翻腾了好一会儿才凝结成清晰的影像。\n\n新闻主播正播报着给罢工者的“复工令”造成的巨大影响，但刻意跳过了那些令人不快的数据——像是究竟为之解雇了多少人，或是那些医院复工后医护质量下滑了多少之类的。\n\n页面翻动，画面也随之切换。罢工人群遭到执法人员或者官方工会成员殴打驱离时的惨叫声此起彼伏。尽管他们曾试图冲向五十米外那辆满载着新调来的国家工人工会联合会的医生和实习医师的公交车，但此举一无所获，只换来了砸向颅骨、胳膊和肋骨的警棍。\n\n页面再一次翻动，再一次，再一次。每一次翻页都带来一幅不同的画面、一篇不同的故事，但却都指向同一个主题：每家复工的医院都要从尚未复工的医院那里承受额外的负担。革命制度党正在施展自己的拿手好戏，用蛮力一刻不停地压制着罢工。党将不惜一切代价，去维护医院的运转，只为将罢工彻底粉碎。"
 MEX_Madrazo_DS.24.a:0 "老狗可学不会新把戏，只会墨守成规罢了。"
 MEX_Madrazo_DS.25.t:0 "唇齿之间"
 MEX_Madrazo_DS.25.desc:0 "在墨西哥城，人们涌上街头，把集会现场围得水泄不通。这场集会照例由全国民众团体联合会组织，但最引人注目的却是国家工人工会联合会。彩带于空中飞舞，茶点香气扑鼻，参与者摩肩接踵——有些还是医疗工作者——每家政府主办的报纸和电视台都对此进行了报道。从眼下来看，一切都无比寻常。\n\n但还是有一点变化的，至少看起来如此——往常，只要在类似的集会上提及革命制度党的反对者，就要把他们叫做“法西斯分子”或者“共产主义者”。但在这次集会上，却多次呼吁要与罢工医生“团结一心”。\n\n几乎每一位全国民众团体联合会的发言人，尤其是那些国家工人工会联合会的成员，都至少在言语上向罢工医生们展示了善意。他们一致声称医疗从业者们在待遇与薪酬上确实面临着不少困难，几位国家工人工会联合会的官员甚至还分享了自身遭遇的那些不堪入目的经历，并以此作为呼吁改善医疗体系的主要依据。\n\n但在那些善于读懂言外之意的人看来，在一如往常的象征性改革呼吁之外，还有一层含义昭然若揭——国家工人工会联合会正在宣称自己才是解决问题的唯一途径。任何民间工会，还有任何不隶属于全国民众团体联合会或者革命制度党的派系，都无法真正减轻医疗工作者们的负担。只有在国家工人工会联合会的领导下，才能建立起更完善的医疗体系。"
 MEX_Madrazo_DS.25.a:0 "这算是改变吗？"
