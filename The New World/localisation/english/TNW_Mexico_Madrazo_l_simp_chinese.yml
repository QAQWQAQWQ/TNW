 MEX_decrease_revolutionary_pressure_5_tt:0 "§O自十日悲剧以来，我们何曾遭到过这样的背叛？§!\n§R降低§!£mex_dw_govt_texticon §K革命民族主义§!，这一次也许将一蹶不振。"
 MEX_lock_them_down:0 "全境封锁"
 MEX_lock_them_down_desc:0 "此次突袭给了我们送来了一个要命的发现：政府诸部门已经不值得信任了，我们怀疑他们已经遭到了反革命分子与其他各路反动派的渗透。藏在我们当中的叛徒必得报应，但现在，我们得向叛乱分子动真格了。\n\n拉萨罗·卡德纳斯知道该如何处理这帮暴徒，我们已向他奉上胜利的一切资源：我们的将军将挥师北上，清除群山间的反动渣滓。就像向着中部低地进军的奥夫雷贡那样，我们也会向着北方挺进！"
 MEX_sweep_it_clean:0 "重点清理"
 MEX_sweep_it_clean_desc:0 "如果反政府事业的同情者们把持了政权，政府就绝无对抗叛乱的能力。我们无法摸清究竟有多少叛徒在为敌人牵马执鞚，但我们知道如何才能尽最大可能地将他们给逮出来：旧的不去，新的不来。我们将大规模解雇政府雇员，把心存侥幸和迟疑的人都踢出去，用那些有能力引领墨西哥的国家忠仆取代他们。"
 MEX_the_storm_moves_north:0 "旋风北上"
 MEX_the_storm_moves_north_desc:0 "倘若墨西哥想在迫近的风暴中幸存，就要以法律和暴力来武装自己。马德拉索签署了《国家安全法案》，赋予卡德纳斯和国防部、巴里奥斯和联邦安全局以及内政部长埃切维里亚广泛的权力。我们将团结一心，化作革命的利刃与坚盾，保卫墨西哥的安全……"
 MEX_Madrazo.12.t: "收听"
 MEX_Madrazo.12.desc: "“马德拉军营遭到袭击，人们……”广播中传来的声音在马德拉索脑中慢慢化为噪声，直到州长的打来的电话铃声将这一切打断。到底发生什么事了？听着这些新闻，他感到自己的计划，甚至理想都变得支离破碎。\n\n一阵敲门声传来：“总统阁下？您有空吗？”那是个熟悉的声音，是德尔·罗萨尔来了。马德拉索听到了这一动静，但却没能做出回应，他深陷在震惊之中，四肢动弹不得。\n\n“狗日的蠢货！”他心想着，“他们不是站在我们这边的吗？他们怎么会变得那么极端？他们为什么会举起武器？”马德拉索的愤怒中夹杂着恐惧，他知道事态会如何发展。\n\n在恢复理智之时，绝望与畏惧已经填满了他的内心。再不处理现状的话，他们可就再也没有未来可言了。"
 MEX_Madrazo.12.a: "“德尔·罗萨尔，请你召开会议。”"
 MEX_Madrazo.13.t: "垄断暴力"
 MEX_Madrazo.13.desc: "“我可不会束手就擒，放任这帮土匪为所欲为。他们是对整个墨西哥社会的威胁。现在，这群颠覆分子爬回了他们的老巢，等待着时机成熟再度出击。先生们，他们胆敢自诩革命者：如果我们不能铲除游击队残党，他们就要来推翻我们的政府。必须要让他们认清事实，我们才是革命的化身。”总统阁下马德拉索跺着脚，向着聚在他身旁的内阁成员们咆哮道，仿佛他的嗓门会喝住叛匪一般。马德拉索擦了擦挂满汗珠的额头，看向他的听众。内阁成员都是马德拉索最信任的顾问与革命制度党最有权势的要员：他们知道该采取什么行动。\n\n“您说得一点都不错。”总统激昂的演讲后留下的沉默被国防部长拉萨罗·卡德纳斯给打破了，“我认为有必要采取全面的军事行动。若您批准，我现在就可以去制定计划。”卡德纳斯政治经验丰富，在墨西哥少有人能与之媲美，在内战期间就曾领导过反游击战运动：马德拉索可以把敌人交给他去处理。内阁中许多人也点头赞成了这一计划。\n\n“总统阁下，或许冷静才是上策，”谢拉部长打断道，“我们的焦点，这场袭击或许没有预想的那般严重。他们可能只是借此发出希望改革的信号，我们可以开放言路，跟他们谈谈。”\n\n马德拉索通常会听取朋友们理智的建议，但现在他感到危险正在迫近，他被一群只听得懂暴力的敌人包围了。"
 MEX_Madrazo.13.a: "“就让军方处理此事。”"
 MEX_Madrazo.14.t: "为了保卫我们的劳动者"
 MEX_Madrazo.14.desc: "拉萨罗·卡德纳斯呼吸着奇瓦瓦西南方沙漠中的空气，他苍老的脸庞依旧透露着坚毅。他面前排开了数队人马，他们的表情中囊括着从期待到恐惧的种种感情，但他们都做好了战斗准备。\n\n“士兵们，同志们！”上次带兵已经是四十多年前的事儿了，但卡德纳斯感觉自己比面前的任何小伙都更年轻，更精神。“在半个多世纪以前，我也跟你们一样：年轻、勇敢又强壮。我跟萨帕塔主义的兄弟们并肩作战，共同对抗那些为了一己私欲，妄图摧毁我们民主制度的贪腐分子们。”\n\n“我们的敌人像极了他们的老前辈：暴力且不知天高地厚，公然蔑视祖国的进步，只想为自己谋取权力。”他的表情转为笑容，“但是啊，我还挺同情他们的。因为他们将要对上你们，对上革命的卫士们！”听了首长的发言，士兵们都很兴奋，人群中传出了阵阵欢呼。\n\n“先生们，请相信我吧：我知道该如何打赢这样的战争，我将尽我所能地在接下来的战斗中保护各位的生命，为大家带来胜利。团结一致，我们必将游击队撵出奇瓦瓦，用战斗与牺牲守卫祖国的一切！墨西哥万岁，革命万岁！”"
 MEX_Madrazo.14.a: "万岁！"
 MEX_Madrazo.15.t: "徒劳无功"
 MEX_Madrazo.15.desc: "往年这会儿奇瓦瓦是个漂亮的旅游胜地。太可惜了，拉萨罗·卡德纳斯暗自想道，这次他是来带兵的。在同手下一位将军进行了数小时毫无建树的讨论后，卡德纳斯，这位革命战争年代的老兵已经失去了在前线指挥战斗的热情，他高兴地坐上了专车，吹着空调风，准备返回联邦区。他揉了揉眼睛，希望能扫清疲劳，然后他漫不经心地打开了公文包，读起了手下在战场上的表现报告。\n\n在山里打了数个礼拜后，他手下有十一人受伤，三人阵亡，还有一辆军车被简易爆炸物摧毁。在另一方面，人民游击队在战斗中损失三十三人，更有多人被俘。手下的表现令他自豪，但这样的数字依旧……不会给人留下任何印象。据估计，游击队在北边可能还藏了一支小部队，但那依旧不是能留给警察处理的威胁。\n\n卡德纳斯翻阅着文件，视察着麾下的大部队，突然找到了问题的关键。行动规模太大了，动静也太响了，这不利于清剿游击队。在决定要取得一场令人记忆深刻的大捷之时，他们在事实上就已经把计划都透露给游击队了，而他们也顺势做出了唯一合乎逻辑的选择：潜入地下或全军撤退。卡德纳斯的思绪转向群山的规模，再想到游击队要躲进山里就跟呼吸一样轻松，他的胃里就一阵翻腾。通往胜利的道路远比他想得漫长。"
 MEX_Madrazo.15.a: "我们或许得重新考虑一下策略了……"
 MEX_Madrazo.16.t: "希律王之律法"
 MEX_Madrazo.16.desc: "“所以，嗯，反动派的野心家们都给赶出去了？”\n\n“是的，部长阁下，一切都在按照您的指示进行。我们也留下了一些工具人，比如说所谓的正统革命制度党人，还有墨西哥工人联合会、全国农民联合会里能派上用场的蠢货们。”\n\n埃切维里亚竖着手指傻笑着，透过墨镜镜片看向了他的下属。“好啊，我设想中的那个合格的、革命性的内政部……需要的正是这些改变。那么，就请你再加把劲吧”\n\n在内政部大楼的另一个地方，一名官员开始对自己的工作展现出超乎寻常的热情。“我也没什么别的选择了，不这么拼命的话，他们就会找一个更狂热的家伙来把我顶掉，到时候我就要像其他人一样丢饭碗了。比起换人，我还是选择换思想吧。”\n\n这位官员按照计划开始了行动。他参加了集会，停止了思考，用夸张的大嗓门高声赞同他们说的每一句话。他还在家里挂出了横幅，在吃工作餐的时候发表关于意识形态的即兴演讲。\n\n在这段时间里，有一句话支撑起了他的精神世界。"
 MEX_Madrazo.16.a: "“都是为了饭碗——为了养老金……”"
 MEX_Madrazo.17.t: "一把刚刷"
 MEX_Madrazo.17.desc: "“我他妈到底在干什么？”这个问题始终困扰着墨西哥的新总统。\n\n马德拉索一遍又一遍地阅读着秘书交给他的法令：国家安全法延长了监禁时间，放宽了预防性逮捕的适用范围，扩大了反社会罪的定义类别。不仅让警察部队军事化，还组建了民族革命民兵。\n\n看上去没什么问题，马德拉索正打算签署该项法令，但他心头的疑云却从未散去。“就算我已经坐在了国家宫的王座之上，保守派也仍就视我为敌。至于技术官僚那群准反动派，他们一逮到机会就会向我发难，如今他们支离破碎、群龙无首，我又能从中攫取到何种契机呢？”\n\n他又把法令往后翻了一页。“这些个法令——我还在塔瓦斯科当州长的时候，可真是从没想过还有这一出。如今我却不得不做出从未设想过的牺牲，难道我还有别的选择吗？或许，还真给洛佩斯·马特奥斯说对了——”\n\n一份新的法令在马德拉索的办公桌上诞生了，MNR将凭此追缴革命之敌，直至天涯海角。在签下大名之时，他心中的犹豫渐渐消散。毕竟，他老早之前就已经领教过这套组合拳的威力了。"
 MEX_Madrazo.17.a: "“——无所谓了，我会完成应尽之事。”"
 MEX_Madrazo.18.t: "革命的指南"
 MEX_Madrazo.18.desc: "公共教育部长戈麦斯靠在办公室沙发上，喝下一杯水。虽然这种好友间的即兴会议一般要配上一两杯美酒，但早在马德拉索还年轻的时候，戈麦斯就已经认识他了，那会儿总统阁下正在狂热地支持着加里多州长在塔瓦斯科推动的禁酒运动。马德拉索把对烟草与酒精的成见一并带入了国家宫，甚至让它们成了内阁的禁忌。戈麦斯可不想在这种事情上冒犯总统。\n\n“总统阁下，如今党内的左派运动重获新生，比往年好了太多，我由衷地感到高兴。”\n\n马德拉索笑了。“前路还很漫长，但你说得对啊……我还没往这方面考虑过，我太沉浸于当下了。”\n\n“关注当下并非坏事，”戈麦斯温和地笑道，“我们不能陷在过去当中。话虽如此，偶尔也还是要回头看看。您是卡德纳斯之后第一位真心致力于革命的总统。”\n\n戈麦斯突然站了起来，看了眼随身携带的公文包，从里面掏出了一个干净的文件夹，递给了坐在一旁的马德拉索。\n\n“总统阁下，我一直想着要推动一系列教育改革。这份提案十分详细，但它涉及强制修订课程，对教师进行意识形态筛查等等……”\n\n马德拉索快速翻阅着文件，不时发出“嗯”的一声：戈麦斯所言非虚，这项改革计划确实涉及教育的方方面面。“真叫人印象深刻，部长先生，我就给你开一张空头支票吧。你是个大能人，我信得过你。”"
 MEX_Madrazo.18.a: "“万分感谢，总统阁下。”"
 MEX_Madrazo.19.t: "玻利瓦尔的遗产"
 MEX_Madrazo.19.desc: "一名公务员谨慎地将戈麦斯的教育计划告诉了埃切维里亚。这个想法让他很兴奋，他设想了这样的场景：在一场盛大的庆典上，年轻的先锋们手拉着手，身批绿、白、红三色斗篷，为他们的祖国，为革命的遗产感到自豪。真是幅田园牧歌般美好的画卷，但要说有谁能实现这一切的话，也就只有他——路易斯·埃切维里亚·阿尔瓦雷斯部长。\n\n在约好时间后，他就去到了戈麦斯的办公室，闲聊起了天气和其他一些有的没有。在话题枯竭后，埃切维里亚显得又紧张又尴尬，转而谈起了他此次到访真正的目的。他清了清嗓子。\n\n“我听说过你的计划了，教育部长。我对此很高兴，但我有几点建议。”埃切维里亚摆出了个手势，但没人知道他想表达什么。“我们的革命是美洲的榜样，但它是一场民族革命，不是什么满世界宣扬社会主义的革命。我们的课程应当着眼于拉美国家的团结。”\n\n他停顿片刻，想看看戈麦斯的反应：老者神态自若，脸上只挂着出于礼貌的笑容，这让埃切维里亚顿感不安。“它还应反映出美帝国主义对美洲的影响，像是门罗主义，占领韦拉克鲁斯，还有古巴……”埃切维里亚喋喋不休，继续列举着拉美在历史上蒙受的冤屈。\n\n戈麦斯假装在聆听，心思却飘到了别处。\n\n首先，美国人会怎么想？墨西哥与美国间的关系建立在微妙的平衡之上——这么做会在格兰德河掀起巨浪。更别提帕斯跟他的知识分子会怎么看待这些带刺的话术了，然后还要再过总统那一关……"
 MEX_Madrazo.19.a: "“感谢来访，学士。”"
 MEX_Madrazo.20.t: "如此，思想之花便会绽放"
 MEX_Madrazo.20.desc: "奥克塔维奥·帕斯跟马德拉索坐在包间里，后者正有一丝不耐烦地摆弄着自己的手指，他俩看着眼前人来人往的景象——都是在早高峰争先恐后地赶着去上班的市民。马德拉索经常抱怨称松林别墅这一官邸氛围太过沉闷，于是他就决定按着帕斯的请求，在城中的一个公园里同他会面。保镖们站在两旁，全都毫不遮掩地把手枪拿在身前，其中甚至还有一人正端着一挺步枪。尽管周围尽是发自人群的噪声与来自武装人员的视线，但两人构成的景象却异常的平静。\n\n马德拉索靠在椅背上。“你对戈麦斯的改革有何意见？”\n\n“这项改革苛刻过头了。我想替老师们说上两句，”帕斯稍作停顿，读起了手中的文件，“它似乎不再容许任何形式的自由思考。我深知革命到底有多重要，总统阁下……”\n\n“嗯。”在帕斯将要说出下一句对革命的不敬之言前，马德拉索哼了一声。“嗯，我理解，请继续。”\n\n帕斯继续说道：“个人的自由不能成为革命的代价，这根本就不是前辈们的奋斗目标。我们应该鼓励孩子们自由思考，而不是将整个墨西哥民族都驯化成绵羊。”他花了一点时间回想了一下自己想讲的内容。“顺带一提，总统阁下，我认为拟定的加薪力度还不够强。只有向教师提供充足的薪水，我们才能拥有卓越的教育水平。”\n\n马德拉索若有所思地挠了挠下巴，不屑地摆了摆手，他紧锁的眉头与眯起的双眼中写满了矛盾二字。"
 MEX_Madrazo.20.a: "“好吧，我会考虑此事。”"
 MEX_Madrazo.21.t: "哎，教育"
 MEX_Madrazo.21.desc: "“总统阁下。”\n\n埃切维里亚戴着一副眼镜，站在马德拉索面前。他抓着一张纸，上面爬满了红蓝墨水写成的潦草字迹，其中还有几句话或被圈了出来，或给划上了横线。“我冒昧地打探了一下戈麦斯的提议，想必他也早就把我俩会面的事儿汇报给您了吧，总统阁下？”\n\n“他都跟我提过了，部长先生。你为什么想做那些变动？”\n\n埃切维里亚指着自己的一处笔记。“如您所见，他的整份文件中都充斥着普世革命的精神，我应该没理解错吧？但这门课程完全脱离了它的根基，没有墨西哥，也没有更广泛的拉丁遗产。维森特·格雷罗呢？玻利瓦尔呢？它从头到尾就没提过拉美世界的解放者们。没有文化支持，革命就是无源之水、无根之木啊，总统阁下。”\n\n“你说得对，”马德拉索摸着脸颊回复道，“但我还需要跟戈麦斯再好好商量一下，希望你能谅解……”\n\n“恕我直言，总统阁下，我们在磋商上花的时间已经够多了。我们需要尽早做出决定。”\n\n马德拉索也泄了气，埃切维里亚所言不虚，他不能再拖下去了。"
 MEX_Madrazo.21.a: "“我无法采纳你的提议，部长先生。”"
 MEX_Madrazo.21.b: "“至于该如何实现你的提议，我会再去跟戈麦斯谈谈的。”"
 MEX_Madrazo.22.t: "停停停，给我一个一个来。"
 MEX_Madrazo.22.desc: "戈麦斯离完成这份提案又近了一步，但他能感觉到还有些要补充的地方，总统需要为这项法案加入自己的风格。“总统阁下——”他把视线从桌上移到眼前的男人身上，“我马上就能完成这相关改革，所以我想听听您的意见。若有需要，还请您自由添改。”\n\n“谢了，部长先生，”马德拉索接过递到手中的文件，翻阅了起来。除了极少数必要的调整外，整份文件看上去都没什么问题，没有能让他插手修改的空间。然而，总统突然回想起了上一次会面，他还记得自己同帕斯谈过教育改革的问题。\n\n帕斯说得有错吗？教师们理当获得更多薪水，他同时还在为学生们独立自考的权利而战，而马德拉索当年不也是在为了人民的自由四处奔波吗？在做出决定前，总统在脑中反复思考着革命的正途。他深吸一口气，把视线从文件上移开，看向了戈麦斯。"
 MEX_Madrazo.22.a: "“部长先生，我要给这份文件再添两笔。”"
 MEX_Madrazo.22.b: "“这里有个错别字。”"
 MEX_Madrazo.23.t: "只言片语"
 MEX_Madrazo.23.desc: "“怀特老师，咱俩也算是老熟人了，我知道你在熬汤这块颇有心得。”那人哈哈大笑，校长也跟着一起笑了起来，继续说道：“所以，我想听听你对我收到的——”校长把一叠装订好的文件送到了老师手里，“——新课本的看法。”\n\n怀特接过了面前的文件——历史？他是个英语老师，他能对历史课程有什么看法？他快速地扫视着书中的内容，根据他对墨西哥的了解，这都没什么问题，直到他翻开了下一页。\n\n他需要知道的全部内容都已经被红色下划线标出来了。北方侵略者究竟入侵了墨西哥多少次，他们对墨西哥的胃口是怎么变得越来越大的，革命战争期间美国又是如何在墨西哥长驱直入……“校长先生，这是……”\n\n“我知道你是个好人，其他像你一样从北边来到我们这儿的美国人也都是好人，但这些就是学生们要学的内容，从今往后他们或许会用一种迥然相异的目光看着你。”\n\n这位英语老师想知道，他每天上班时看到的这些可爱的孩子们会不会视他为敌。当然不会，仅凭只言片语岂能……不对，这些就已经绰绰有余了。他的家人们还在圣达菲学习西班牙语呢，这样一家人就能在他站稳脚跟后融入墨西哥的当地生活了。"
 MEX_Madrazo.23.a: "或许该动身的人反而是他，该回老家了。"
 MEX_Madrazo.24.t: "本是两路人"
 MEX_Madrazo.24.desc: "埃切维里亚和菲德尔·贝拉斯克斯漫步在花园中的小径上。埃切维里亚把架在鼻梁上的深色镜片向上推了推，在烈日的光照下，他感到自己的汗水快要从浑身上下的每一个毛孔中喷涌而出。菲德尔则戴着一顶带檐的草帽，帮他挡下了炎炎酷热。埃切维里亚对这位工人联合会的一把手没什么好感：他觉得菲德尔是个腐败的讨厌鬼。这位在他身旁闲庭信步的总书记，能为了坐稳自己的宝座出卖掉半个墨西哥，剩下一半对他而言自然也是待价而沽。但奥克塔维奥·帕斯，那只小孑孓，则是他俩都看不上的可怜虫。\n\n“我知道我们之间有许多分歧，总书记先生……”\n\n菲德尔冷笑一声：“少来这套，学士。你是想跟我谈谈关于帕斯的问题吧？”\n\n两人停在了岔路口，埃切维里亚双手叉着腰，看着地面叹道：“是啊，他现在的能耐可大了。区区编外顾问，却能左右马德拉索的决定。”\n\n“你打算就这么看着一个不知道从哪个缝里蹦出来的诗人爬到你的头上？”\n\n埃切维里亚突然紧紧地抓住了贝拉斯克斯的胳膊。“这又不是我一人的麻烦。等那混账东西突发奇想，总统说不定就把你也给踢了。到那时我们又能拿他怎样呢？在这毒蛇咬人之前，我们要先砍割断它的喉咙。”\n\n贝拉斯克斯皱着眉头，甩开了埃切维里亚，演戏般地拍了拍胳膊上的灰尘：“你先冷静点……但我也算是听明白了，敌人的敌人就是……对吧？”"
 MEX_Madrazo.24.a: "两人通过握手订立了盟约。"
 MEX_Madrazo.24.tt: "§s埃切维里亚找到了能让自己不再败给帕斯的盟友……§!"
 MEX_Madrazo.25.t: "完美且平衡的幸福"
 MEX_Madrazo.25.desc: "生活中不可能事事如你所愿，政府中的工作更能凸显出这个道理，因此在得到马德拉索毫无保留的信任之时，戈麦斯简直欣喜若狂。如今，教育改革将为墨西哥带来剧烈的变化，这些变化将在年轻人心中培养出革命精神，同时也不会令他们成为狂热的极端分子。\n\n右倾过度，则会使革命之火黯淡无光，会叫学生忘掉肩头的革命重任，让他们行尸走肉般地迈向世界。又或许会叫学生断绝对祖国的热爱，让他们不再愿为墨西哥效力，转而背井离乡，另寻出路。实乃悲剧。\n\n左倾过度，则会让教育沦为单纯的宣传，把学生都改造成奴仆，而不是未来的工程师。若是将革命中最糜烂的部分注入他们的头脑，就会让学生堕落为只懂得仇恨的狂热分子，给他们留下一生都无法擦除的污点。用邪火焚尽良知，让曾在他们心中燃烧的激情斑驳难辨，亦是一场悲剧。\n\n当然，戈麦斯的改革惹得极端分子火冒三丈，但每次看到成堆的文件时，他都会露出灿烂的笑容。又是一场成功的改革。"
 MEX_Madrazo.25.a: "离革命的实质又近了一步。"
 MEX_Madrazo.25.tt: "§s戈麦斯将在未来支持马德拉索……§!"
 MEX_Madrazo.26.t: "残躯一副"
 MEX_Madrazo.26.desc: "戈麦斯满心惆怅地望着窗外。\n\n一片漆黑，犹如深渊。\n\n这让他想起了自己的墨水瓶，他不分昼夜地盯着它，就像一株水仙花。为了推动革命的理想，他发狠了，忘情了，没命了地奋笔疾书。这是他毕生的工作，是他至高的义务。如果他成功的话，墨西哥的后人们都会以革命先烈为荣，他也能写下一段传奇。\n\n但总统他，当然会横加干涉。\n\n他手中的烟卷吐着浓烟。为了讨好埃切维里亚，马德拉索把他丢进了阴沟，全然不顾惜日友情。他们曾是同志，是朋友，戈麦斯帮着他走到了今天。\n\n你就跟那王八蛋混去吧，戈麦斯心想着。冰冷的威士忌刺痛了他的手心。\n\n今后，当总统再次苦苦挣扎的时候，戈麦斯可不会再回应他徒劳的叫唤了。"
 MEX_Madrazo.26.a: "弃之如敝屣。"
 MEX_Madrazo.26.tt: "§s马德拉索失去了一位重要的伙伴……§!"
 MEX_lock_them_down_raise_army_expenditure_10_percent:0 "§Y陆军开支§!将提高§Y+10%§!。"
 MEX_Madrazo.27.t: "振聋发聩"
 MEX_Madrazo.27.desc: "在幕僚们与改革家们的簇拥下，马德拉索走向了欢呼的人群，古老的国家宫大门之上的裂痕观摩着这一历史性的时刻。索卡拉广场上人声鼎沸，仿佛有千百万人在等待着见证他那无比盛大的登台时刻。\n\n马德拉索迈上了讲台，话筒业已在此等候多时，人群稍稍平静。马德拉索望向那片人海，直到他能听见微风抚过台阶的沙沙声。他深呼一口气，开始了演讲。\n\n“墨西哥！我唯一的祖国，以革命精神点燃每一位国民心中赤忱之火的国度！人民心中的熊熊烈火指引着我们改变、革新与成长。然而，长久以来，革命的火炬却横遭篡夺，让黑暗涌入墨西哥，让疑虑的愁云萦绕在革命群众的心间。”马德拉索俯瞰着人群，深深地吸入一口气，让热忱填满胸腔，化作言语的力量。\n\n“到此为止了！在我的愿景中，墨西哥将会拿出独立建国之时的气魄，奋力驱散黑暗！墨西哥将会照耀世界！我们的祖国，是一个大众手拉手，国民心连心的平等之国。我们的祖国，是一个人民无苦色，笑容满人间的繁荣之国。我们的祖国，将通过改革实现这美好的愿景！我们要重新捡起被长期遗忘的公共工程与农民的事业。”\n\n马德拉索再次深吸一口气，随着现场的氛围升温与节奏加速，他的心跳变得越来越快，他已经做好了发出关键一击的准备。“在我的愿景中，我们将打造出一个全心全意为人民服务的政府，而且还要做得更好！新政府将聆听人民的疾苦，遵从国民的意愿。这才是为了各位，为了人民服务的本意！”\n\n看着竖耳聆听的人群，马德拉索同样回以沉静，向后退去。"
 MEX_Madrazo.27.a: "一秒过后，任何扬声器都无法再与人群的呼声一较高下。"
 MEX_Madrazo.28.t: "灰色交易"
 MEX_Madrazo.28.desc: "蟋蟀在高草中鸣叫，刺眼难受的月光照在锡那罗亚州州长塞利斯和他在索诺拉州的同行路易斯·恩西纳斯·约翰逊身上。两人孤身前来会面，只有各自开来的两辆车停在路边。约翰逊显得有些紧张，不断用手指拨弄衣物，脚下扬起的尘土在黑夜中消散。塞利斯若无其事地靠在他那辆红褐色的林肯大陆车的引擎盖上，准备抽烟。他歪着头问约翰逊要不要一根香烟，却遭到拒绝。“现在可不是时候，塞利斯先生。他什么时候来？”\n\n塞利斯看了看手表，耸耸肩。“马上就到。”\n\n昏暗的车灯从高草后映出，约翰逊捂住额头，强光照得他睁不开眼，而塞利斯则在黑暗中抽烟，面不改色。一个矮小精瘦的男人从他那辆朴素的车上走下来，谨慎地朝两位州长走去。他的眼睛很大，神情阴郁，流露出多年累积的多疑与小心，尽管虹膜并无特别之处。\n\n“有人跟踪你吗？”约翰逊紧张地抓住外套领口问道。那人摇了摇头。\n\n“我检查过了。交易还算数吗？”\n\n此时，塞利斯大概抽腻了香烟，随手将其扔进土路中熄灭。“先生，您已经为我们的服务付过钱了，我没打算随意玩弄您的钱。那些日本货每个月都会入港，您的手下会接收，越过边境……剩下的就由您来处理。”\n\n“马德拉索总统不会插手？”约翰逊微微点头，屏住呼吸，附和着走私者的问题。塞利斯只是笑了笑。"
 MEX_Madrazo.28.a: "“在锡那罗亚，我便是总统。”"
 MEX_Madrazo.29.t: "打水漂"
 MEX_Madrazo.29.desc: "啪嗒。啪嗒。罗德里戈在瓜达拉哈拉的小巷中踢着小石子，石子在狭窄的街道上回响。他把心中的烦恼全都注入到了那颗小石子上，直到它不再滚动为止。这是他从军务中获得的一天假期，却全都耗在了街上，踢着那颗毫无生气的小石子。他脑海中不断回响着训练教官的训斥。\n\n“那不是清理枪支的正确方法，棕皮小子！你忘记了什么？”他愤怒地踢得更用力，加快步伐追随着石子的滚动。“你们这些城里人都是软骨头，知道吗？”石子几乎撞上了一名行人，这才让他从思绪中惊醒过来。他突然意识到，自己已经完全失去了方向感。\n\n“对不起，先生，请问酒吧在哪里——”\n\n他试图继续自己的白日饮酒计划，却被隔壁楼中传出的总统那洪亮的声音打断了。罗德里戈走近那扇门，听见一群和他一样的青年们正在里面欢笑，欢迎他加入正聚精会神收听总统演讲的圈子。“你看起来迷路了，朋友！过来一起听吧，总统马上就要开始讲话了。”\n\n在那个小圈子里，能量如温暖的火焰般向四周辐射开来，伴随着马德拉索总统激昂的爱国言辞。“我们将以全新的力量，彻底铲除腐败，正视劳动人民的呼声。同志们，我们的革命还没结束，我们绝不停下，直到实现所有目标！”演讲结束时，罗德里戈不由自主地和酒吧里的新朋友们一起欢呼起来，那一刻，他的烦恼似乎随风消散了。他也默默记下了这个地方，知道以后若迷失方向，还能来这里看看这些志同道合的朋友们。"
 MEX_Madrazo.29.a: "他对友情的渴望得到了满足。"
 MEX_Madrazo.31.t: "致财政与公共信贷部长"
 MEX_Madrazo.31.desc: "安东尼奥\n\n作为你的前同僚和私交好友，我不得不直言表达对马德拉索总统及其内阁在处理实习医生骚乱问题上的决策深感不安。对这类暴乱行为的放任和纵容，无异于在全国范围内播下叛乱的种子，到那时，瘫痪的将不只是某个地区，而是整个国家的秩序。\n\n别说你不知道这些劳工心里在打什么主意，也不要为马德拉索总统的“宽宏大量”找借口。当下局势的混乱，完全是因为那些腐败无能的官僚空口承诺、不负责任的妥协才导致的。而要想妥善解决这一问题，恰当的做法是承认我们所犯下的一部分错误，并让那些该负责的人明白，有些事情是绝对不可容忍的。然而，马德拉索总统的做法却截然相反——他不仅打算给予这些叛乱分子过多的恩惠，还想承认他们的不合法工会，并赋予他们不应得的权力。我们究竟能给多少？多少才算够？\n\n你我都心知肚明，独立的工会是党无法容忍的，国家和党的权威需要绝对的统一，而州政府的角色应当是坚决的调停者、秩序的维护者，而非立场偏颇的辩护人。如果每一个随意冒出来的工会都能被接受，墨西哥工人联合会的存在又有什么意义？工人们一旦脱离党的指引，陷入那些幻想和虚妄之中，国民经济的通货膨胀就会彻底失控。如果公众看到政府可以随意满足抗议换来的需求，墨西哥在廉价劳动力和经济稳健运作上的优势将荡然无存。\n\n我还要提醒你，我希望你多注意一下，墨西哥的财政预算有限，我们必须分清孰轻孰重。每多一分比索用于罢工，国家预算就会少一分。你认为，是增加实习医生的“绩效奖金”更为重要，还是把这些钱投入新建的木材厂、铁路、炼油厂、农用机械、发电站等真正惠及民生的项目更为关键？我们党所能给予民众的，比任何工会组织都要多得多。\n\n希望你能明确传达给内阁——墨西哥的发展必须在党的正确领导下稳步前行，我们需要稳健的经济进步。\n\n你诚挚的，"
 MEX_Madrazo.31.a: "劳尔·萨利纳斯·洛萨诺。"
 MEX_Madrazo.32.t: "黑的，白的，细读过的"
 MEX_Madrazo.32.desc: "“大使先生，我想问您几个问题。”墨西哥驻美国大使奥尔达斯和他的随从们刚走出华盛顿的国务院大楼，就碰上了套话的记者。这帮自负的暴徒用嘈杂的噪声与不间断的闪光向着他发起了攻击。“您愿意就实习医师罢工问题做出官方答复吗？”\n\n“早上好，先生。你们还真是一如既往的精力旺盛。”一如老道的政客，在应对记者提问这块，奥尔达斯也有充足的实战经验。但美国记者的独立与执拗一直都令他感到惊讶，虽然扬基佬们从未越过政治中名为体面的红线，但他们的脸皮比墨西哥的同行们还是厚出了太多。在得到答案前他们绝不会停止追问，哪怕这个答案仅来自马德拉索政府中的边缘角色。\n\n“你提到的实习医师只是庞大的经济体系中的一小部分。他们的要求与行动都损害了我国劳动人民的权益，他们毫无责任心的行为也危害了他们本该维护的医疗系统。说实话……”奥尔达斯喉头一紧，沮丧与责任感一同扼住了他的咽喉。他鄙视马德拉索安抚实习生的意愿，也厌恶他仅为满足罢工者需求就急忙修改革命制度党劳动政策的行为。奥尔达斯想说出自己的想法，但阿留申危机与其后果让他打起了退堂鼓。毕竟，这就是他被贬到华盛顿的缘由。奥尔达斯松了松领带，紧张地叹了口气：“说实话，我完全相信马德拉索总统能与医疗从业者们达成一致，他们不会让事态升级的。”\n\n几阵闪光灯与几句外交客套话后，记者们纷纷散去。他们在记事本上编辑着文字，在相机里放大了大使一点也不上镜的头像，这些照片撑死也只能出现在报纸的封底。"
 MEX_Madrazo.32.a: "如果他是总统，又会如何呢？算了，最好还是别想了吧。"
 MEX_Madrazo.33.t: "稳定的代价？"
 MEX_Madrazo.33.desc: "“这玩意是埃切维里亚和奥特加部长写的？“他们绝对不在我让他们待的地方。”\n\n“那他们是什么意思？多想想！他们多半是总统叫过来的。”“哪怕是马德拉索都不会变。”“难道他——？”“那是——”\n\n“谁打算去给梅纳部长说？”\n\n天花板的吊扇嗡嗡作响，带来阵阵微风。噪音与烟雾让气氛更加紧张，众人面面相觑，无人动弹。他们都盯着一个拿着《永远！》杂志的瘦小女人，而她也求助般打量着周围的人。\n\n气氛仍旧未变分毫，没人愿意当把这个消息给梅纳讲的冤大头。秘书缓缓地把这份杂志贴近自己的胸膛，离梅纳的办公室越近，她的呼吸就越急促，她将这份杂志放在了门口的地板前，然后轻轻的推到里面去。\n\n梅纳轻微抽搐了一下，听到杂志塞进门的声音，他便把这份杂志捡了起来，一个显眼的标题闯入了他的视线——\n\n《经济政策的谬误》\n\n“……最开始，我们认为，我国现行的这种稳健的经济模式是完美且无需改进的，然而，近期的调查却终结了这一观点。我们发现，最贫穷的墨西哥人的利益在几乎经济运行的每一环节都受到极其严重的损害。因而，能让国家再度焕发的活力的方式便是推进各种各样的改革——”\n\n他们快来了。梅纳把杂志丢在桌子底下，继续批阅他的文件。这事还没完。至少在总统得到他想要的之前，他都不会停下。"
 MEX_Madrazo.33.a: "此即终幕之始。"
 MEX_Madrazo.34.t: "61年的回忆"
 MEX_Madrazo.34.desc: "累进所得税也不是第一次被抛到台前了，1961年那会儿技官们就这么干了一回。但当时这一法案未获通过，此后它就像其他失败的法案一样被人抛于脑后。如今累进所得税法案已获新生，革命制度党主席赫苏斯·雷耶斯·埃罗莱斯肩负着使命，不能让它二度折戟，更不能丢了总统阁下的面子。\n\n如果这项法案还是未获通过，那肯定也怪不到他头上。\n\n他一边举着话筒，给代表们打去一个又一个电话，从技官那里捞来了几张赞同票，再去别处又弄来了一张。而在另一边，则堆满了其他反对改革的地区送来的信件，都在恳求他别再推行新税法。\n\n其实也不只有信件，他每时每刻都在电话线上充当说客，或者与其他说客针锋相对。虽说如此，反对新税法的人似乎都将提高关税视作增加税收的良方……"
 MEX_Madrazo.34.a: "差不多得了，阔佬们，该付账了。"
 MEX_Madrazo.34.b: "给他们点甜头——加关税吧。"
 MEX_Madrazo.35.t: "严格来说，这并不算漏洞！"
 MEX_Madrazo.35.desc: "梅纳部长带着一帮经济学家来到了谈判桌前，丢下了他们的草案。这份草案不仅得到了前总统阿莱曼的支持，署名栏里几乎还塞满了全体墨西哥商界显贵的大名。在梳理这份文件的时候，埃罗莱斯只在字缝中找到了一个细微到常人难以察觉的问题。\n\n诚然，这项税收的目标人群是全墨西哥收入最高的那伙人，就是要让他们尽职尽责地为国家财政出一份力，但是……\n\n真是怪了，每一项例外条款都帮着他们把自己的财产送进了税法之外的安全区。把这些特例全加一块儿的话，新税基本上算是名存实亡。梅纳，阿莱曼和在草案上签字的所有人合力打造出了一朵奇葩，这份草案在帮他们抽身的同时，还会将矛头指向除他们以外的群体。\n\n批准这份草案的话，就能从没签字的群体那里收上来不少税，同时也能降低富人对新税的抵制力度，但这可不是马德拉索想要的成果。"
 MEX_Madrazo.35.a: "跟着马德拉索的主意走。"
 MEX_Madrazo.35.b: "听听专家的意见吧，他们知道该怎么做。"
 MEX_Madrazo.36.t: "双颤轮轴"
 MEX_Madrazo.36.desc: "“我的态度不变，罗布莱斯先生。贵国政府提出的关税新政将损害我国的利益，届时我国向贵国的商品出口总量将低于预期，这行不通。”外交部长阿方索·加西亚·罗布莱斯用闲着的手拼命揉了揉额头，只有这样他才能抑制住向馨大使全盘托出的冲动——他其实也明白关税是怎么一回事儿。日本大使继续他毫不掩饰的威胁。“两国贸易往来对贵国经济到底有多重要，应该用不着由我来提醒您吧？”\n\n“我知道您对此十分不悦，我正希望与您进一步商讨此事。”在日本外交官大声抗议前，罗布莱斯就放下了听筒。自打昨天宣布上调关税起，他就收到了各国没完没了的抱怨、报告和各种不请自来的意见，他已经在这上面耗费了一整天的精力了。片刻之间，就有人敲响了罗布莱斯办公室的大门，他的助手给他送材料来了。“跟其他文件堆一块儿吧。”罗布莱斯指向桌上越堆越高的文件，每个袋子上都贴着“紧急”二字标签。\n\n“部长阁下，这是美国大使馆的来信。”罗布莱斯从年轻的助手手中接过文件袋，读了读里面的内容。这封来信以直白又冷漠的语气表达了美国对墨西哥这一邻国的意见，新的贸易政策令他们不快。如果墨西哥坚持推进这项改革，那美国将别无选择，只能跟着一起修改自己的关税。然而，这封信也坚持表示，介于美墨两国一衣带水的邻邦关系，严酷的反击手段并非无可避免的抉择。在打印出来的信件底下还附有美国大使富尔顿·弗里曼的个人签名。\n\n罗布莱斯一边思考着，一边用手指敲着桌子。如果真能让事态平息，那他将很乐意地向美日双方都做出妥协。但他眼下没有讨好两方的时间了，他必须分清轻重缓急。"
 MEX_Madrazo.36.a: "到目前为止，美国一直都是更重要的贸易伙伴。"
 MEX_Madrazo.36.b: "经济的未来掌握在亚洲手里。"
 MEX_Madrazo.36.c: "我们绝不屈服！"
 MEX_Madrazo.37.t: "微笑服务"
 MEX_Madrazo.37.desc: "埃米利奥认为，员工的外观可以反映出雇佣机构的声望。作为瓜达拉哈拉国际机场的一位柜台员工，埃米利奥代表着代表着这家大型企业的脸面。他身穿着熨烫整齐的洁白衬衫，脸上还挂着与之相称的微笑，带着与职务相符的优雅气质向每一位游客致意。\n\n埃米利奥初来乍到之时，瓜达拉哈拉不过是个被几栋简陋又不起眼的建筑围绕的一条混凝土跑道，一点也不像是这座快速发展的大都会该有的配套设施。在过去几年的时间了，埃米利奥看着曾经规模狭小，安全堪忧的机场被新建的大型设施改造一新。就像是名为现代化的灯塔一般，大块的钢铁与玻璃组成的建筑拔地而起。\n\n一旦改造完成，新机场就将通过公路和铁路与更庞大的都会区相连。如今，即使是瓜达拉哈拉的工人们也能轻松地进入机场，继而飞往墨西哥的各个地方。\n\n在一位妇女走进大厅时，埃米利奥暗自冷笑了一声，他注意到了她身上皱巴巴的衬衣和脚上破破烂烂的鞋子。用不了多久，他美丽的航空大教堂里就会挤满这样的人，会用他们的质朴气息玷污这一殿堂的人。但是，如果他们不来的话，又有谁会来坐飞机呢？又有谁能来欣赏这绝美的建筑呢？埃米利奥的笑脸又能摆给谁看呢？"
 MEX_Madrazo.37.a: "“早上好，女士，请问您今天需要什么帮助？”"
 MEX_Madrazo.38.t: "鸡同鸭讲"
 MEX_Madrazo.38.desc: "数日以来，梅纳一天到晚都在盯着日历，不停地用手指敲击着桌子。他一直希望着这一日能早点到来，这段时光就像是总统阁下强加在他身上的惩罚一样，只因他质疑了总统的大规模经济改革方案。今天，总算到了去向总统申辩的日子里。\n\n“首先，呃这个，您的大规模国有化政令，总得来说都会动摇国内外投资者的信心。然后是，大规模铺设基建的承诺，嗯那个，在很多地区都回不了本。还——还有就是要给基本上所有的公共服务部门增加开销实在是有点……您——您的这些政策会危害到墨西哥的财政状况，我们的信用也会被赤字——”\n\n“部长先生，我想你是忘了无法估量的大多数：穷人了吧。他们可没被列入你的——”马德拉索举起了桌上成堆的文件，“——计算与图表当中，他们的日子更好过的话，全国的经济增长都会被刺激起来。”\n\n梅纳感觉自己快要崩溃了，他深吸一口气，离开了座位。“总统阁下，我知道您在塔瓦斯科州施行了这些政策，效果也很喜人。但您要知道，这里是墨西哥而非塔瓦斯科。我们没有无穷无尽的石油资金来支撑这些项目，所以我才想让您看看您的计划到底会用掉多少资金。”\n\n马德拉索的目光停留在这位转身离去的经济学家身上，他想要推进的大部分改革都是振兴墨西哥的良药。但为了让财政部长回心转意，他或许可以在一些次要的方面做出妥协。\n\n梅纳的最后一句话让马德拉索打了个激灵，他可以鼓励公司去开采更多石油，这样就有钱去推动改革了。但这么做不仅会在眼下掏空他的钱包，还会为后世留下环境隐患。不做任何妥协的话，就可以绕靠过度开采带来的问题，还能实现他全部的目标，但在受压的穷人能恢复元气，缴纳税款之前，政府都得伴着赤字运行下去。"
 MEX_Madrazo.38.a: "如果只有砍掉那些次要的提案才能让梅纳闭嘴的话，就让他去办吧。"
 MEX_Madrazo.38.b: "石油收入不够用？那就多挖点出来！谁还顾得上什么代价。"
 MEX_Madrazo.38.c: "帮扶国民，绝无妥协。"
 MEX_Madrazo.39.t: "另一位马德拉索"
 MEX_Madrazo.39.desc: "看着被各类文件堆满的工作桌，亚历杭德罗不禁叹了口气。漫长的工作时间让人疲惫不堪，他面前的咖啡也早已冰凉失去了温度。\n\n“嘿，亚历杭德罗，你听说过那个新来的人吗？”\n\n他并不介意与立场相左的人交谈。“没听说过这事儿。”亚历杭德罗懒懒地回应。\n\n那位至少需要两杯咖啡才能撑过一天的同事朝他走了过来。“真的？我还以为马德拉索是我们团队的一员，这事儿本该——”\n\n同事的话还未说完，就被亚历杭德罗打断了，他差点从椅子上滑下来，猛地转头看向对方。“真的吗？如果马德拉索真加入我们—”\n\n“不是总统本人，是他的一个远房亲戚。”同事模仿起马德拉索那打断别人的腔调，无意间激怒了亚历杭德罗。“他也是从塔瓦斯科来的，显然干过类似的职位，还——”看到亚历杭德罗的怒火，话语戛然而止。\n\n“再来杯咖啡？”气氛略有缓和，同事因自己的挑衅未奏效而略显失望。\n\n“明天一起吃午饭？”亚历杭德罗的怒气渐渐消散，交通部的忙碌让人心累，看样子今天也只能继续面对这杯冷掉的咖啡了。\n\n“后天吧，明天中午我有约。”亚历杭德罗敷衍地回应，没再理会同事们匆忙的告别。他打开备忘本，记下了一条简单的笔记，准备迎接新的忙碌与等待。"
 MEX_Madrazo.39.a: "升迁三步走：送礼，请客，吃饭。"
 MEX_Madrazo.40.t: "静静的怒火"
 MEX_Madrazo.40.desc: "奥尔蒂斯·梅纳挺着腰杆坐在马德拉索办公室外的椅子上。每在拼花地板上跺一次脚，他都会顶到腿上的公文包，里面正塞满了关于国家经济状况的报告。\n\n时间到了，梅纳走进了总统的魔窟，与总统互致问候。他从包中抽出一叠文件，小心地把它们在桌上摊开，就像在制作一幅宏大的马赛克一样。图像十分清晰，国内支出全面上涨，外国投资日益缩水。国家的美元和日元储备快速流失，是个人都知道比索并没有固定汇率宣称的那点价值。\n\n马德拉索歪着脑袋：“然后呢？”\n\n梅纳仿佛被雷劈了一般，往后退了一步。“总统先生，这种情况再持续下去的话，过去二十五年的经济增长可能就要付诸东流了。”\n\n“如果我唯一的野心就是看着过去的一切一遍遍重演，我早就把总统的宝座让给奥尔达斯了。”马德拉索厉声呵斥道。“如果你唯一能拿得出手的计划，就是把我们拴在那些个已经杀到咱国门口的帝国的脚下，我劝你赶快滚出我的办公室。”梅纳张了张嘴，仿佛是要说些什么，但他还是紧紧地闭住了嘴。他收拾好文件，退出了办公室。"
 MEX_Madrazo.40.a: "梅纳想知道自己还能不能干到年底。"
 MEX_and_what_do_they_think_tt:0 "§V我们的选择带来的后果将浮出水面。§!"
 MEX_Madrazo_38_tt_1: "这将每月花费§R100M美元§!。"
 MEX_Madrazo_38_tt_2: "这将每月花费§R350M美元§!。"
 MEX_Madrazo.41.t: "待变之事"
 MEX_Madrazo.41.desc: "“亲爱的，你准备睡了吗？”马蒂亚斯的妻子在书房门口问道。\n\n“我得把这本书读完，马上就好。”太阳在数小时前就已落山，马蒂亚斯·盖尔·拉米雷斯仍在阅读。他稳稳地坐在披着毛绒皮革的扶手椅上，身旁只亮着一盏立灯。马蒂亚斯没有看向自己的妻子，他那被皱纹环绕的双眼正全神贯注地注视着眼前的一条条黑线。马蒂亚斯正在读着出自美国社会学家奥斯卡·刘易斯之手的《佩德罗·马丁内斯，一位墨西哥农民与他的家庭》一书，这本书讲述了墨西哥革命后农民的赤贫生活，其中内容绝非子虚乌有。作为革命制度党的资深官僚，马蒂亚斯倾尽心血，一步步地实现了革命的承诺。一位党内同事向他推荐了这本书，并表示总统将发表关于农村扶贫攻坚之战的演讲，其内容与此书息息相关。阅览伊始，马蒂亚斯就在好奇与失望中翻过了一页又一页，他很快意识到，佩德罗·马丁内斯未能从革命中获益。在革命之后，佩德罗的境遇依旧糟糕，停滞不前。虽然革命制度党做出了承诺，但他的故乡可谓是一尘未变，仅有犄角旮旯里的一丝变化昭示着革命的存在。马蒂亚斯看了看自己的房子与贤内助妻子，在过去五十年的时间里，他的生活经历了翻天覆地的变化。他曾和佩德罗一样，成长在一个小农村当中，但他的父亲参加了那场革命。如今，他在墨西哥城中的一个漂亮的街区里落了户，有一栋两层楼高的小洋房。这里有电有水，还有许多的奢侈品，这些对佩德罗·马丁内斯来说都是可望而不可求的东西。\n\n“别担心，亲爱的。这本书明早又不会凭空消失。”马蒂亚斯的妻子摘下了他疲惫的双眼之前的眼镜，打断了他悲伤的沉思。\n\n“还没结束啊。”马蒂亚斯离退休只剩几年的时间了。他两眼无神地看向妻子。“亲爱的，你觉得我做得够好了吗？”"
 MEX_Madrazo.41.a: "“我相信你已竭尽全力。”"
 MEX_Madrazo.42.t: "帮个小忙"
 MEX_Madrazo.42.desc: "拉蒙·德尔加多·希尔懒洋洋地靠在桌前，用他敏锐的目光审视着每一份报告。在他的头顶，一台风扇正慢悠悠地转着，将屋内闷热的空气换做屋外湿冷的空气。有人敲响了办公室的大门，在拉蒙做出回应前，屋外之人就推开了大门。埃克托尔走了进来，他的胳肢窝下头还夹着一个文件袋。他解开了格子夹克的扣子，坐在了办公桌对面。\n\n“拉蒙老兄，近来如何？”还没等拉蒙回话，埃克托尔就继续说道：“我想接下马德拉索在莫雷洛斯的拖拉机项目。你是知道我在全国农民联合会那头的能耐的，我跟他们都混得挺熟。”\n\n拉蒙花了一点时间消化了埃克托尔的诉求。“我很欣赏你的热情，但你肯定也知道这是个诱人的肥差。我已从全州各地收到不少来信，他们都是来问我讨要这份差事的。你当然是个大能人，你为全国农民联合会和革命制度党在咱们莫雷洛斯州干了不少事儿，但这次我可没法轻易做出决定。我得细细考虑每一份申请。”\n\n“没问题，”埃克托尔脸上的笑容永远都不会因一时的拒绝而暗淡分毫。“但麻烦你也花点时间看看我的资历证明吧，”他把文件袋放在了桌上。“我是这份差事的最佳人选，想必你也会看清这一点的。”埃克托尔离开了办公室。拉蒙·德尔加多拿起了文件袋，解开了搭扣。里面装着埃克托尔的简历，每一页之间都藏着大把的比索。"
 MEX_Madrazo.42.a: "我们将不再接受其他申请。"
 MEX_Madrazo.43.t: "土地、自由和拖拉机"
 MEX_Madrazo.43.desc: "埃克托尔坐在拖拉机后轮之间，带领着五辆车的车队穿过朱胡特拉狭窄的泥砖街道。这次配送工作进行得相当顺利，一些集体土地的产出尤为丰厚。埃克托尔这个容易被打动的人，愿意给那些能干的农民更多支持。他自豪地说，州里没有一个农民得不到拖拉机的帮助。\n\n车队驶出胡胡特拉，进入小镇周围崎岖森林间的肥沃低地，最终抵达目的地：一条公路与通向农田的土路交叉口。\n\n农民们穿着粗布衣服，身上沾满了尘土，他们聚集在交叉口，看到车队时，欢呼声顿时响起，纷纷挥舞双手，几个人开始高喊埃克托尔的名字。他将车停在公路旁，熄灭了发动机。一位农民开始闲聊，直到埃莱娜驾着那辆老旧轿车赶到。埃克托尔抖落外套上的尘土，上了车。\n\n“这次你帮了我们大忙了。”埃莱娜一边驾车回镇，一边露出罕见的微笑。他们在一座波形钢的仓库前停下，那是埃克托尔最新的商业项目。他从侧门走入，确认一切正常运转，为隆重开业做好准备。大楼前是开放空间的气动升降机，后面则是满满一排排的货架，上面整齐地摆放着修理拖拉机所需的各种零部件。"
 MEX_Madrazo.43.a: "埃克托尔不会让机会从他的手中溜走。"
 MEX_Madrazo.44.t: "经济作物"
 MEX_Madrazo.44.desc: "特拉斯卡拉的农民们齐聚在一间简陋的泥砖建筑内，那里是集体土地的行政办公室。一名党政官僚站在满是划痕的木桌后，身着西装，闷热的空气让他满头大汗。他正以闪电般的速度处理一份作物及其商业用途的清单：梨、番石榴、无花果、青柠、山药等等，然而，墨西哥的主粮作物却意外缺席。\n\n山药最近在社区中尤为受欢迎，因其缓解关节疼痛的效果，以及麻痹鱼群，方便捕鱼的特性，令众人心向往之。年轻的纳瓦族女子伊采尔站出来发言，她表示最近听说山药的价格正在飞涨。一些城市的工厂正在大量收购，将其加工成肥皂。随后，大家进行了投票，结果确定要种山药。\n\n两周后，一辆破旧的卡车在小办公室外停下。强壮的司机下车，帮忙卸下装满圆形木质种子的箱子，并分发有关其种植的宣传册。他询问大家是否听说过山药肥皂的市场。听到这话，伊采尔与她的姐姐对视了一眼。"
 MEX_Madrazo.44.a: "两人都希望接下来的一年里，日子过得轻松一点。"
 MEX_Madrazo.45.t: "沉重的罪孽"
 MEX_Madrazo.45.desc: "拉米罗神父在牧师住所的公共休息室翻看着报纸。头版上满是常见的新闻：政府的声明、奇瓦瓦的游击行动、新电影的上映。但唯一引起他注意的标题，竟是提到他家乡的那条新闻。\n\n“山药推动特拉斯卡拉乡村经济繁荣”，粗体字赫然写道。这样的好消息在农田中实属罕见。他粗略浏览了一下导语，翻到第三版的完整报道。原来，这些根茎作物在市场上卖了个好价钱，但它们并没有留在墨西哥，而是出售给了美国制药公司。\n\n在边境的另一边，山药被浸泡在酸液中，提取一种叫做二氢基黄酮的化学物质。随后，这种物质与其他试剂结合，制成了孕酮。孕酮再与雌激素混合，合成避孕药。拉米罗神父的眼睛瞬间睁大，报纸从手中滑落在地。 \n\n马德拉索政府已将不知多少忠诚的农民灵魂推向了深渊。拉米罗神父站起身，急忙赶往办公室，颤抖着双手拨打州首府主教的电话。"
 MEX_Madrazo.45.a: "必须要做点什么"
 MEX_Madrazo.46.t: "征用"
 MEX_Madrazo.46.desc: "农业部长马尔特·罗杜尔福·戈麦斯揉了揉因写作而酸痛的手，正锁上办公室，准备下班。他再次提起公文包，朝电梯走去。刚要离开大楼，他的助理玛丽亚突然拦住了他。\n\n“你有看那些信吗？”\n\n“唉，我看过了。”他叹了口气，“我想全国的每一位天主教徒都希望我能禁止种植山药。”玛丽亚对此嗤之以鼻。“不过，这确实让我开始关注这个问题。仅去年，避孕药的销售额就达到了数亿比索。”\n\n“我去。”\n\n“没错。我发现后立刻给总统打了电话。我们都觉得，让外国企业在农民辛辛苦苦的劳动上赚取那么多利润不合适。政府准备对供应链进行国有化，还要资助建化肥厂，争取在国内生产避孕药。”\n\n“这难道不会让教会更仇恨我们吗？”玛丽亚问道。戈麦斯对此只是耸了耸肩。"
 MEX_Madrazo.46.a: "“其实他们没得选。”"
 MEX_Madrazo.47.t: "旧观念"
 MEX_Madrazo.47.desc: "“我想感谢全国农民联合会今天给我这个发言的机会……”\n\n马尔特·罗杜尔福·戈麦斯·塞古拉整理着讲稿，心中觉得关于新灌溉技术的讲座还算顺利，尽管水车系统的一些细节在这群大多文盲的观众中显得有些晦涩。这些人一辈子都用同样的耕作方式，已有八十年，对新事物总是带着一丝怀疑与嘲讽——他们又何必在意美国制造的新电动机呢？\n\n塞古拉点头回应着稀稀落落的掌声，从舞台右侧走下，没注意到普埃布拉州州长从左侧走近。“塞古拉部长！”\n\n亚伦·梅里诺·费尔南德斯比塞古拉年轻十岁左右，精力充沛，聪明伶俐——毕竟他是农业专家，绝非表面看起来的那般愚蠢。“我全程关注了你的讲座，真是精彩。不过，有些地方……”\n\n他翻开随身的笔记本，指向塞古拉。“你看，这里、还有这里等等。这个新课程的确不错，但似乎有些过时了。”\n\n“我听人说，现在的课程就很好，州长。我相信你也注意到了观众的反应，对吧？当我提到喷灌时，他们的反应简直无动于衷？他们永远接受不了新事物。”塞古拉整理了一下领带，心里对费尔南德斯的关切表示赞赏，但这让他感到有些疲惫。\n\n“我只是想说，你应该考虑更新教材，部长。”费尔南德斯拍了拍塞古拉的肩膀，然后继续走开。这个决定最终得由他自己来做。"
 MEX_Madrazo.47.a: "去他的全国农民联合会，教材该换代了。"
 MEX_Madrazo.47.b: "坚持已有的可行办法。"
 MEX_Madrazo.48.t: "黄金标准"
 MEX_Madrazo.48.desc: "埃克托尔站在舞台上，身边是众多革命制度党的代表和全国农民联合会的成员。他手中握着几份整洁的文件，声音洪亮，传遍整个会场。人群纷纷转向这位南方来的男人，专注聆听他的每一句话。\n\n“在这里，我手里拿着的是工人们迫切需求。”马德拉索稍作停顿，调整了语气，“更准确地说，关系到全国的商业农场工人的生活。从工资上涨、加班、工作时限到安全标准，这些文件里列出的内容，每一项都是农场工人的基本生活保障。”\n\n埃克托尔静静地倾听着，马德拉索的简短演讲逐渐走向尾声。“因此，我希望你们能够接受这份文件，并在最短时间内付诸实施。每延迟一小时，就有一位工人无法获得应有的报酬；每延迟一小时，我们对革命的信念就削弱一分。”随着会议厅内响起热烈的掌声，埃克托尔也情不自禁地加入其中，整个房间回荡着进步的呼声。"
 MEX_Madrazo.48.a: "如果进步总是这么容易就好了！"
 MEX_Madrazo.49.t: "没那么容易"
 MEX_Madrazo.49.desc: "“唉。”马德拉索一上车，便放松了紧绷的关节。车队立即提速，沿着道路疾驰。活动结束后的疲惫感在他看到圣地亚哥-德克雷塔罗市的出口标志时终于涌上心头。\n\n眼前的建筑物逐渐减少，映入他眼帘的是一片辽阔的景色，远处隐约可见一个商业葡萄园和一个小镇。他向司机发出命令，让车子驶向那片宁静的土地。片刻后，他又站在了另一群人面前，迎接他的是一张张笑脸。然而，当他问道：“告诉我，最近的政令如何改变了你们的生活？”时，笑容开始变得勉强，居民们微微地挪动着脚步。\n\n“挺好的——”“不太一样，但生活还是老样子——”“有一些改善，但是——”回答接连从他们嘴里蹦出来，明显带着些许犹豫。\n\n“什么都没——”马德拉索立刻注意到了那个突兀的声音，一名女子双手叉腰，站在人群之外，语气坚定。“——改变！请原谅，阁下，但我们这里一个承诺都没有兑现。那些美国人，他们——他们贿赂了全国农民联合会的代表！像往常一样，买通了他，让他们为所欲为，而代表却视而不见！”\n\n几天后的此刻，马德拉索坐在办公室里，心里依然被那次遭遇所困扰。每当他低头查看那些初步调查报告时，那女人声音中的绝望便一次次在他脑海中回响。回到总统府后，他立即下令展开调查，而随着越来越多的信息浮出水面，一个令人不安的迹象正在逐渐显现。"
 MEX_Madrazo.49.a: "要实现你的梦想，还需要付出更多的努力。"
 MEX_Madrazo.50.t: "承诺，终得兑现"
 MEX_Madrazo.50.desc: "恩里克抓起收音机，飞快地奔跑起来，把这个振奋人心的消息紧紧贴在胸前。气喘吁吁地推开拉米雷斯家的门时，他的指关节不小心敲在了门上。拉米雷斯家没有收音机，所以他特意把音量调大，好让所有人都能听见门打开后的广播声。\n\n“恩里克，怎么了……”开门的人刚开口，便被收音机传出的激动人心的消息打断了。\n\n“……随着第27条的宣布，这意味着马德拉索阁下将全面国有化从尤卡坦到下加利福尼亚的所有外国农业企业。此外，阁下还计划将这些土地重新分配给现有的集体土地，并进一步推动新集体农场的创建，阁下……”\n\n恩里克紧抱着收音机，挨家挨户地跑，心脏扑通扑通跳动。随着他的奔跑，越来越多的人跟在他身后，带着食物和饮料，一同奔向最终的目的地。慢慢地，收音机里传出的希望之音传遍了这片曾经属于某家农业企业的土地，而现在，这片土地终于回归到他们手中。真正的盛大庆典在夜幕降临时开始，比他见过的任何一次都要隆重，当第一支乐曲响起，所有人都沉浸在这难以言喻的喜悦中。\n\n第一个人开口唱道：“资本不断扩张，它随着资本一起增长……”他特意拉长了音调，等待下一个人接上。\n\n“强者遭到打压——弱者被收买……”一位女士紧跟着前面的话头，加入了歌声。\n\n又一个男人的声音响起，加入了合唱：“为了巩固国家，用火与宪法。多少工人的声音被剥夺……”\n\n“受够了这么长时间生活在谎言中！”一个激动的声音在人群中喊道，“工人与老板之间，我们的历史根本没有多少交集。”\n\n“他们夺走了我们的声音！”“他们夺走了我们的声音，你的和我的！”“他们夺走了我们的声音！”\n\n恩里克深吸一口气，终于唱完了最后一句："
 MEX_Madrazo.50.a: " “但我们，终将夺回一切。”"
 MEX_Madrazo.51.t: "罐装怒火"
 MEX_Madrazo.51.desc: "罐头厂——人们管它叫“罐头厂”，是因为它那拗口的日语正式名称根本没法念——是夸乌特莫克移民区居民的眼中钉。这家由日本财阀控股的工厂，终于让那位在日本主子压迫下憋屈半生的朝鲜裔经理找到了发泄怒火的出口。它向来把集体土地榨取得分文不剩，以近乎抢劫的低价收购农民种植的玉米。那些精心包装的玉米罐头远渡重洋，摆上日本高档超市的货架，而躬耕田亩的农人们拿到手的微薄收入，连辛苦钱都称不上。更可恨的是，方圆百里独此一家的罐头厂，早将整座村庄变成了它的垄断王国。\n\n谁都没料到带来喜讯的会是集体土地那个激进的村代表。他总把革命制度党许诺的美好未来挂在嘴边，念叨得大伙儿早已充耳不闻。但这天他声嘶力竭的呼喊里透着前所未有的笃定，连教师都证实了文件上的白纸黑字——政府要接管罐头厂了！马德拉索亲笔签署的命令！墨西哥城承诺将以高于市场的保底价收购玉米！\n\n神父在心中起草感恩布道词，主妇和孩子们盘算着新衣裳玩具，有些抱负的农民则琢磨起购置高级农具增产增收。但对多数人而言，此刻脑海中奔涌的只有一幅图景：这是祖先推翻西班牙庄园制的再现，是从英美手中夺回石油的重演，是德国庄园主逃离咖啡种植园的昨日重现。革命的洪流，终于冲刷到了他们门前。\n\n当人群涌向罐头厂时，发现经理早已卷铺盖逃之夭夭。工人们对此毫不惋惜——利润分成的传闻让他们对新政满怀期待。他们甚至纵容农民们冲进办公楼，砸碎屋顶的日文招牌，在“墨西哥万岁！美洲万岁！”的歌声中升起国旗。事实上，双方唯一的争执，是要给工厂冠上哪个爱国新名号。"
 MEX_Madrazo.51.a: "——我们可以叫它“卡洛斯·马德拉索工厂”？"
 MEX_Madrazo.52.t: "驱尽宵小"
 MEX_Madrazo.52.desc: "马德拉索不耐烦地挥退秘书，将两封朱红火漆封缄的信函掷于总统案头——一封钤着海雕徽记，另一封烙着皇室菊纹。他率先拆开美国大使弗里曼的来函，至于林馨那份措辞古板的抗议照会，且待凉透再品更显滋味。\n\n“本政府希望墨西哥合众国政府停止此类行径……”总统目光掠过字句，跳过冗长段落时指尖在羊皮纸上划出轻响。某段提及国有化是“失礼之举”的措辞令他嗤笑出声，信笺旋即被弃如敝屣。\n\n日本公使林馨的文书则严词斥责马德拉索政府显露的“敌意”，称总统采取“破坏外交纽带之举措”有违“日墨历史友谊之精神”。恰在总统揉皱信函时，秘书攥着两页电报疾步折返。\n\n“阁下，外交部与工商部急电！”\n\n“坏消息？”\n\n“大规模投资亏损，多国外交谴责——”\n\n“搁桌上，出去。”\n\n秘书应声退去如风，徒留总统独面官僚系统的惊惶。十指交叠间，他凝视窗外空荡的庭院，却仿佛看见首都正蒸腾起焦灼的热浪。"
 MEX_Madrazo.52.a: "必要，但沉痛。"
 MEX_Madrazo.53.t: "温和的抗议"
 MEX_Madrazo.53.desc: "大使馆的后房简陋而空旷，但这次任务并不需要过多的形式感。富尔顿·弗里曼和美洲事务组织主任阿方索·鲁道夫·威希特里希坐在一起，随意寒暄几句。与其说他们关心形式礼节，不如说他们更在意那封草拟信件的内容。弗里曼一丝不苟地敲打着键盘，键盘的间歇性响声在空荡的房间里回荡，而威希特里希则一边吸着雪茄，一边随口提出自己的想法。\n\n“提一下美国政府感谢马德拉索政府没有采取彻底的国有化措施，再说点什么，嗯……”威希特里希低声说道，目光在房间里游移。\n\n“建议不要没收某些外国经济资产？在贸易问题上建议保持克制？”弗里曼边打字边补充。\n\n威希特里希耸了耸肩，吐出一口烟雾，模糊了他的表情。“随你怎么写吧。我们不想因为针锋相对而把他逼得更远。”\n\n“我倒好奇为什么他没有彻底国有化，怎么说呢。”弗里曼推了一下滚轮，继续敲打着键盘。\n\n“他知道不能太得罪我们和投资者，但也得给卡德纳斯派留点面子。只要事情到此为止，富尔顿，这次是我们赢了。”"
 MEX_Madrazo.53.a: "打字机又发出了“叮”的一声。"
 MEX_Madrazo.54.t: "雨天，沙拉"
 MEX_Madrazo.54.desc: "雨水轻轻拍打着窗户，水滴顺着玻璃滑落。卡洛斯渴望地用手指沿着冰冷的水珠滑动，触感让他不由得打了个寒颤。要是能出去就好了，他想象着在晨光下骑马，父亲教他如何掌握缰绳，细心地告诉他如何喂马吃燕麦饼——可现在他却被困在室内。马德拉索·洛佩斯正在外出差，家里少了他的身影。\n\n母亲康塞普西翁·贝塞拉则留在家中，悉心照料着儿子。她轻声将儿子唤回餐桌。卡洛斯爬上椅子，发出吱呀的声响，母亲用手指竖在唇边，示意他保持安静。每当椅子一动，声音就格外刺耳，卡洛斯通常是因为无聊才这样做；这正是母亲在读书时一再提醒他改正的习惯。“跟着我的手指，卡尔利托斯。第一句话是什么？”\n\n“贝尼托·华雷斯……”\n\n康塞普西翁点头，露出鼓励的微笑，期待着他继续。\n\n“…这位英雄来到了首都。人民敲响了钟声，走上街头……”卡洛斯停下，指着一个生疏的词，花了些时间拼读。“帝国主义者落荒而逃……”\n\n母亲从他手中接过书，轻声说道要先让她来念，看看他能否更好地理解。“贝尼托·华雷斯，这位英雄，来到了首都。人民敲响了钟声，走上街头。帝国主义者落荒而逃，和——”\n\n“那是什么词？”"
 MEX_Madrazo.54.a: "“卡尔利托斯，也就是正义。”"
 MEX_Madrazo.55.t: "不劳而获"
 MEX_Madrazo.55.desc: "半掩的窗户吹进一阵热风。埃罗莱斯感到一颗颗汗珠顺着脖子滑落，他手忙脚乱地掏出手帕擦拭。相比之下，老兵戈麦斯却显得镇定自若。他一边用新式圆珠笔在公共教育部的信纸上做着速记，一边保持着专注，仿佛炎热的空气对他毫无影响。\n\n“我觉得是空调坏了。”埃罗莱斯站起身来，摆弄着窗户上的空调旋钮。旋钮转动得很顺滑——果然是广东制造的好机器，至于空调是否真的有在运作，他却感到有些疑虑与不适。\n\n“坐下吧。”戈麦斯连眼都没抬，目光依旧锁定在更为重要的事情上。“让工作人员待会儿看看吧，学士。”\n\n当戈麦斯终于抬头，并开始口述时，埃罗莱斯才又坐回了椅子。“有一个新提案：愿意承担下午幼儿园职责的小学教师将获得额外津贴。我们会优先考虑有大学学历的教师来担任这些职位。”\n\n埃罗莱斯差点耸了耸肩。这个提案无伤大雅，还好；但他并未理解戈麦斯严肃表情所暗示的重要性。不过，片刻后他才恍然大悟。“你觉得教师工会会反对吗？”\n\n戈麦斯露出了一种无奈的笑容。“极有可能。谁知道呢，全国教育工作者工会或许还会拉上菲德尔·贝拉斯克斯先生。”\n\n“无论如何，这事必须完成，部长。孩子们不能被这些该死的工会腐败分子所妨碍。”\n\n“你还没失去锐气，学士，但我们要面对的是最大的一个对手……”"
 MEX_Madrazo.55.a: "他们不由得紧张地笑了笑。"
 MEX_Madrazo.56.t: "家族情谊"
 MEX_Madrazo.56.desc: "“真是难以置信，我竟然还得在这里替你接孩子，米格尔，唉……”\n\n卡米拉焦躁地用手轻敲着幼儿园的外墙，心里盘算着时间，等着她的侄女放学。她继续低声嘀咕着：“这地方这么危险，你应该亲自来接她，但你却忙得不知在干些什么。”周围是她熟悉的街道，城市的喧嚣随着孩子们从这个曾经的妓院，如今的公立幼儿园涌出而变得更加嘈杂。\n\n在人群中寻找罗西塔的新老师并不容易，但当她感觉到有只小手轻轻拉了拉她的衣角时，她立刻转过身来。“是卡米拉！”\n\n“来这儿，让我带你回家，去见你爸爸。”\n\n她们手牵着手走在回家的路上，卡米拉警惕地四处张望，耳边满是城市的喧嚣。突然，她听到身旁传来一句轻声的呢喃。\n\n“图书馆。”\n\n“什么？你说什么，小家伙？”\n\n“我们今天学了图书馆，老师带我们去了那里。”罗西塔的声音带着一丝兴奋。\n\n卡米拉停下脚步，温柔地看着侄女，感慨道：“真是太好了，罗西塔。这个地方很棒，对吧？”罗西塔用力点了点头，眼睛里闪烁着喜悦的光芒。看到她如此兴奋，卡米拉心中的不满也渐渐烟消云散。她心想，如果自己在这么小的时候也能有机会接受教育，那该有多好。"
 MEX_Madrazo.56.a: "两人在街头紧紧相拥。"
 MEX_Madrazo.57.t: "新居所"
 MEX_Madrazo.57.desc: "这一幕再次上演——米格尔在赛马场挥霍着家里本就微薄的收入，而这一次，又轮到卡米拉照顾他的女儿罗西塔。\n\n“跟我在一起，罗西塔。握住我的手。”今天的市场特别热闹，摊贩们熙熙攘攘，争相出售各种商品，空气中弥漫着墨西哥城街头特有的气息。\n\n尽管兄长米格尔对父亲职责的忽视，总是令卡米拉心生愤怒，但与侄女共度时光的快乐却让她难以抵挡。她心想：“让她和我在一起，总比去惹麻烦强，毕竟三岁的小孩需要有人陪玩。”\n\n“卡米拉，看！”罗西塔的小手指向街对面正在施工的建筑，那里传来阵阵喧闹声。“房子！”\n\n“真不错。”卡米拉停下脚步，细细观察新建的住宅小区，楼层高耸，阳台宽敞，似乎还是栋几室一厅的公寓，里面的房间从脚手架的缝隙中隐约可见。她把罗西塔抱到肩上，让她能更好地看到里面。“总有一天，罗西塔。总有一天，我们一家人都要搬到这里来。到那时，我们就不必再忍受狭窄的老房子了。”"
 MEX_Madrazo.57.a: "她依然没能找到逃离这个循环的出口。"
 MEX_Madrazo.58.t: "头脑的盛宴"
 MEX_Madrazo.58.desc: "索菲亚看着古斯塔沃把一件沾满污渍的裙子拉过女儿的头顶。她的姐妹已经穿好了衣服，但这并不是索菲亚没有费一番力气的结果。随着学期的推进，日子变得越来越困难。她们唯一的儿子在门口焦急地啃着指甲，等待着姐妹们的准备。\n\n“现在给双胞胎报名上学还不算晚。学校有个新的——”\n\n“你知道的，市场里需要他们俩帮忙。”古斯塔沃皱起眉头，脸上的皱纹变得更深了。\n\n“当然，但——”\n\n“别和我争，索菲亚，我——”\n\n“听我说！”索菲亚声音坚定，古斯塔沃此时面露愠色，却沉默不语。“学校里有个新项目。我上周在报纸上看到的。现在提供两顿餐食。我算过了，让他们在摊位上工作，根本无法支付每天两顿免费的餐食。”\n\n古斯塔沃的脸色稍微缓和了一些，他用手抓了抓下巴的胡茬。“好吧。”他平静地答道。索菲亚的喜悦溢于言表，脸上的笑容都快藏不住了。"
 MEX_Madrazo.58.a: "她的孩子们不必像她那样生活了。"
 MEX_Madrazo.59.t: "萨尤拉的千言万语"
 MEX_Madrazo.59.desc: "照片描述：哈利斯科州州长与萨尤拉市立医院的院长握手致意。画面的前景是一座雕有哈利斯科自由主权州州徽的木质讲台。背景中悬挂着墨西哥国旗和哈利斯科州旗，以及写有“健康生活 - 美好生活”的横幅。台下，一群身穿白大褂的“医务人员”正在鼓掌，微笑着面对镜头。\n\n事件概述：这是一次公开活动，目的是宣布萨尤拉市立医院的新发展计划。在联邦政府和州卫生局的鼎力支持下，这座医院获得了一笔前所未有的资金拨款，数额之大，超越了以往的任何预算。这笔资金的用途明确，将用于改善医院的基础设施，包括安装新的管道系统和现代化的暖通空调系统，旨在提升病人的舒适度，减少手术室和康复室的微粒污染。同时，资金还将用于建设新的检查大楼，配备新的影像设备和X光机，以提高诊断能力。\n\n背景说明：萨尤拉是一个围绕同名湖泊的农业社区的中心，其市立医院是该地区最大的医疗设施，但长期以来未能获得应有的政府关注。这次资金的拨付纠正了这一问题，使得医院能够为居民提供接近北方大城市瓜达拉哈拉的医疗水平。持续的投资将确保萨尤拉、哈利斯科州乃至整个墨西哥都拥有必要的医疗设施，以应对墨西哥在消除贫困方面的挑战。\n\n真相揭露：尽管医院院长对这笔资金感激不尽，这笔钱也确实会用于医院的翻新工作，但更大的问题却被忽视甚至掩盖了。照片中身穿白大褂的“观众”并非真正的医务人员，而是当地中学的学生，这些白大褂是由革命制度党精心提供的道具，目的不过是为了营造出一个令人印象深刻的场面，向外界展示这次拨款的“伟大成果”。而事实上，医院的实习医生们早已离开，加入了医协，此刻他们正在瓜达拉哈拉州长官邸外，与来自全州的同仁一同示威，要求与州长对话。"
 MEX_Madrazo.59.a: "最终目标：帮助，或者至少不做伤害。"
 MEX_Madrazo.60.t: "招待所 - 1945年"
 MEX_Madrazo.60.desc: "他能感觉到汗水从每一个毛孔渗出。\n\n这将是他的葬身之地：狭窄、漆黑，几乎没有坐立的空间。当他们第一次把他锁进这里时，他以为自己会被活活烧成灰烬，但他的绑架者显然有着更为阴险的计划。他闻到了空气中弥漫的金属气味，也许是锈迹，或者，是血腥味？\n\n一个声音在黑暗中回荡，不知从何处传来。“罗霍·戈麦斯已经指控了你，但你依然保持忠诚？”\n\n马德拉索感到胸口一阵紧缩。密室仿佛在逐渐收缩，将他那瘦削、憔悴的身体压得无法喘息。“我是无辜的，”他几乎哽咽着说，“我没有碰过那些文件。”\n\n回应他的是警棍敲击金属的低沉声响。这熟悉的声音仿佛在他的心中激起了隐忍已久的仇恨。“而你们，这是非法拘禁，仅仅因为政治分歧。”\n\n这些话，马德拉索已经不知重复了多少遍。有时是在他们提问时，有时则是在他们沉默时，只是当他觉得必须说些什么的时候，必须发出声音，以免自己被这无尽的黑暗吞噬，以免自己在这狭小的空间里失去理智，疯掉——\n\n疯了！他是否在自欺欺人？他想大声咒骂这些可恶的阿莱曼派，告诉他们每一个都是可憎的恶棍，自己会把他们撕成碎片，但凭什么呢？希望在哪里？哈维尔·罗霍·戈麦斯已经失败了。这些混蛋控制了党，都是些卑鄙无耻的人，他们的裙带关系和腐败已经滋生到了从下加利福尼亚到恰帕斯的每一个州里。\n\n革命，他一生所热爱的革命，已经被资本彻底腐蚀……但他知道自己必须活着出去，必须看到事情的改变——它们必须改变。"
 MEX_Madrazo.60.a: "可这个黑暗的牢房里，变革似乎遥不可及。"
 MEX_Madrazo.61.t: "档案"
 MEX_Madrazo.61.desc: "“他妈的！”埃克托尔咬着牙骂道。不是这个抽屉。他狠狠关上，铁柜抖得直响。下一个！那份档案到底哪去了？拉蒙已经被起诉，照这个架势，埃克托尔觉得也快轮到他了。虽说现在查的是马德拉索的农作物多样化项目，暂时还没人追到那笔拖拉机的回扣，可只要拉蒙嘴一松，他的仕途——乃至整个人生——都会彻底玩完。\n\n埃克托尔猛地扯开另一个抽屉。在这儿！他一把抓起那份档案，重重甩到桌面上。翻开的纸页上，字字句句都带着罪证的味道，任何调查员想查的线索，全都清清楚楚、盖着鲜红的公章，躺在象牙白的纸上。\n\n埃克托尔的呼吸越来越短，胸口发闷。他得马上行动。他翻开报告，把那些“致命证据”一页页抽出来，塞进自己的皮革公文包里。或许他还能改改？把线索抹掉？他对涂改液的手法，可是一绝。实在不行，就直接烧了它。\n\n埃克托尔把头埋进双手，随后狠狠磕在桌面上，发出沉闷的一声响。他亲手塞给拉蒙一包包比索，当时的场景历历在目。拉蒙会不会供出来？如果检方答应给他减刑，他会不会立马翻脸？埃克托尔一点也不敢指望那个老家伙的忠诚——只要能保住自己那张皱巴巴的老脸，拉蒙一定会毫不犹豫地把他推下深渊。"
 MEX_Madrazo.61.a: "埃克托尔现在只能等待和祈祷。"
 MEX_Madrazo.62.t: "年轻一代的工作"
 MEX_Madrazo.62.desc: "埃克托尔几乎忍不住要把手中的圆珠笔折断。\n\n但这次的困境并非像戈尔迪之结那样，能靠蛮力轻易解决。也许，比埃克托尔更伟大的那些人，比如真正的亚历山大，早已能一剑斩开难题，摆脱那如绳索般纠缠的困境。\n\n他低声咒骂，试图折断手中的笔，却徒劳无功。圆珠笔在桌面上滚动，最后撞上了他刚刚签完的最后一份文件——那是一纸将维森特·阿尔卡伊德逐出全国农民联合会的命令。\n\n问题在于，世界太小了。在过去一个小时里，埃克托尔签署的大部分驱逐令，几乎都是针对他的朋友、邻居。他不禁思索，下次再见到阿尔卡伊德时，该如何面对？是逃避，还是尝试解释？这样一个曾经强硬、顽固的人，如今竟要在熟人面前低声下气，真是讽刺。他们绝不会相信这些命令并非出自他手，亦不会相信他已失去了往日的影响力。\n\n拉蒙·德尔加多的退休，更是让局势雪上加霜。他那一代党员诚实可靠，如今正逐渐凋零。而新一代政治家们，根本看不到有谁可以来接班，尤其是某些左派、激进分子、隆巴德派，他们对这个世界几乎一无所知。\n\n不过，毫无疑问，他们一定知道埃克托尔曾镇压过人民党，还曾领导过化肥抵制运动，这些事至今仍在街头巷尾被人津津乐道。\n\n他还能撑多久，才会被彻底踢出局？"
 MEX_Madrazo.62.a: "他按下了录音机的停止键。"
 MEX_Madrazo.63.t: "埋伏"
 MEX_Madrazo.63.desc: "埃克托尔坐在长椅上，斜眼望向一片漆黑。刚过午夜，库埃纳瓦卡生态公园的绿地上空无一人，只有一个流浪汉蜷缩在角落里。埃克托尔心生怜悯，掏出几枚硬币递给他。他低头看了眼自己的金表，又揉了揉后颈，双手互相搓了搓。\n\n背后突然被戳了一下，把他从恍惚中惊醒。他转过头。\n\n“说吧，这大半夜的，把我从床上拽出来，到底什么事？”拉蒙·德尔加多·希尔站在他身后，一只眼睛因为麻痹微微下垂。\n\n“德尔加多先生，实在抱歉。我只是对几件事有点好奇。”\n\n德尔加多在他身后的长椅上坐下，两人隔着肩膀压低声音交谈。埃克托尔点燃一支烟，递到老板手里。“今天有个先生来办公室找您，他没留下名字。”\n\n“是州调查官。”德尔加多皱起眉头。埃克托尔早已猜到，却装作无辜的样子。一个正儿八经的体面官员，又有什么可害怕的？“他们在查农作物多样化项目的事，说是有些账目不太对，我挨了个小警告。”\n\n埃克托尔只觉一阵寒意，从后背爬上头皮，差点没忍住笑出声来。看来那帮蠢货，压根没发现拖拉机回扣的事。\n\n“我打算退休了，埃克托尔。”德尔加多轻声说道，“这些年压力太大，我真的受够了。”\n\n刚刚泛起的轻松，瞬间化作一股苦涩。“先生，这事恐怕还得再考虑考虑吧？”德尔加多叹了口气，慢慢起身，弹掉烟蒂，戴上帽子。"
 MEX_Madrazo.63.a: "“到此为止了，埃克托尔。”"
 MEX_Madrazo.64.t: "“酋长政治”的挽歌"
 MEX_Madrazo.64.desc: "转轮发出清脆的声响。\n\n埃克托尔坐在德尔加多那张斑驳的旧椅子上，手中把玩着一把左轮手枪。枪膛里空无一物，每次扣下扳机，只有清脆的叮响在空荡的办公室里回荡。\n\n他的目光紧锁在墙上那幅让他厌恶至极的画作——《绿衣女郎》。那埃克托尔对这幅画厌恶至极，每次会议时都不得不盯着它，还在各种印刷品上看到数不清的拙劣复制品。早该把它丢掉了，但自从德尔加多退休后，办公室几乎无人问津。至今，尚未有新的接任者，这让埃克托尔心中隐隐不安——他的仕途是否也在走向尽头？\n\n埃克托尔再次旋转弹膛。今天早上，他开车巡查了各个集体土地，却几乎无人理会他。那些他称之为“新生代”的年轻人——崇拜总统马德拉索的激进党内青年们——正在积极投身于一场新的回归土地运动。他并不反对他们的工作，然而，那本应是他的职责，是他曾经的领域。可这些年轻人懂得什么呢？\n\n显然，这些年轻人还懂得不少。他们的努力称得上是卓有成效，以至于一些农民对他开始表现出某种冷淡，仿佛他不再是那个曾与他们共同度过岁月的埃克托尔。\n\n他曾经是个举足轻重的人物。\n\n是个能呼风唤雨的人？或许是吧，但他更是社区的支柱，备受尊敬，是那个能够为他人谋福利的人。\n\n是个好人？从各方面来看，确实如此。\n\n但现在，他几乎可以感受到岁月的无情——白发似乎在一夜之间涌上他的鬓角。他还能坚持多久？"
 MEX_Madrazo.64.a: "一段辉煌生涯的垂死挣扎。"
 MEX_Madrazo.65.t: "马克思主义的院长"
 MEX_Madrazo.65.desc: "马德拉索走上讲台，没有携带任何讲稿；他只是略微浏览了一下在州长豪华轿车上草草准备的发言内容。墨西哥工人大学的礼堂内座无虚席，教职工和学生们挤满了每一个角落，许多人只能站着，主过道尽头的双开门被推开，更多热切的听众涌入走廊，甚至延伸到更远的地方。这样的场面并不出人意料，因为马德拉索此次演讲的灵感来源，正是这所大学的校长——那位低调地坐在舞台侧翼的比森特·隆巴尔多·托莱达诺。\n\n“有太多的话语需要表达，远非言辞所能涵盖。”马德拉索开场说道，“你们，这所杰出学府的学生们，认识他，是因为他叫比森特·隆巴尔多·托莱达诺。而我，则把他视作朋友。”\n\n掌声如雷贯耳。楼座上的几名学生激动地挥舞着写有卡德尼斯塔口号的旗帜。\n\n“正是他，为墨西哥的工人和劳工权益而战。即便年事已高，托莱达诺先生依然坚定不移地站在工人阶级的一边，为工会运动而奋斗。能将他称作战友，这是我的荣幸。”\n\n托莱达诺涂抹着厚重的妆容，掩饰着病弱的身体，缓步走上舞台，迎接这份热烈的掌声。新闻记者们忙不迭地捕捉着总统与这位墨西哥工会联合会前总书记拥抱的动人瞬间。\n\n然而，另一位重要人物的心情却截然不同。几天后，在办公室的安逸中，唐·菲德尔·贝拉斯克斯看到《共和国报》头版上的照片时，心头燃起一股怒火。他曾亲手将那个布尔什维克赶出工会运动，而现在，这个他认为早该被历史遗忘的“猪猡”，竟然在总统的帮助下恢复了名誉？"
 MEX_Madrazo.65.a: "唐·菲德尔愤怒地将报纸撕得粉碎。"
 MEX_Madrazo.66.t: "党内的“气旋”"
 MEX_Madrazo.66.desc: "“费尔南多，我想你请我出来，不会只是为了喝一杯吧。”服务员刚收走菜单，埃切维里亚便直截了当地问道，“究竟发生了什么事？”\n\n“塞利斯和杜兰昨晚被人看到进了贝拉斯克斯的别墅，”古铁雷斯·巴里奥斯低声回应，“我们怀疑他们正在策划，试图成为党内反马德拉索联盟的领军人物。”\n\n埃切维里亚推了推眼镜，深深叹了口气。“谢谢你提醒我这件事，我会保证局势不会进一步恶化。”他似乎显得很平静，但内心却在暗暗琢磨着——古铁雷斯·巴里奥斯是否察觉到自己在隐瞒些什么？\n\n自从马德拉索上任总统以来，埃切维里亚一直是他坚定的支持者。然而，随着时间的推移，党内的反对声渐渐增多，敌意也愈加明显。尽管他不愿在反对的声音刚刚出现时就背弃马德拉索，但他同样明白，一旦党内出现裂痕，将会给墨西哥带来多么深远的灾难。"
 MEX_Madrazo.66.a: "现在，埃切维里亚只能静观其变，等待时机。"
 MEX_Madrazo.67.t: "一线曙光"
 MEX_Madrazo.67.desc: "Ruh Roh you're not supposed to see this"
 MEX_Madrazo.67.a: "Holy crap Lois is that ghost Hitler"
 MEX_doctors_strike_focus_completed:0 "医生罢工的影响尚未完全波及全国。"
 MEX_Madrazo_DS.4.t:0 "安慰剂效应"
 MEX_Madrazo_DS.4.desc:0 "卢皮塔穿过酒店会议室里悬挂的医协横幅。兴奋的气氛弥漫在空气中，四周尽是欢声笑语。沉浸在这种气氛中，她都快忘了自己此行是代表医协分会来到联邦区的了。回到座位时，她刚好赶上了对话的尾声。\n\n“这机会再好不过了！”一位英俊的年轻实习生咧嘴笑道：“马德拉索这周就能让咱变成百万富翁！”桌旁响起一阵欢呼，兴奋的声浪在室内荡漾开来。\n\n“别高兴的太早，工人联合会还在视我们为眼中钉呢，”落座后，卢皮塔立马接上了话茬。她也希望自己能同他们一样乐观：“贝拉斯克斯可不会轻易退让。就算马德拉索站在我们这边，也不代表整个党都是如此。”\n\n“哎呀，卢皮塔，别这么悲观啦。”她的住院和实习医生同僚调侃道。\n\n“我只是想说我们仍需努力。若真觉得毫无胜算，我早就回萨尔蒂约去上第四班夜班了，”卢皮塔微笑着回应，“现在开香槟还是太早了。”"
 MEX_Madrazo_DS.4.a:0 "其他代表们对她的谨慎不以为意。"
 MEX_Madrazo_DS.5.t:0 "抚平伤痕"
 MEX_Madrazo_DS.5.desc:0 "卢皮塔被电话铃声惊醒，从睡梦中挣扎着坐起，迷迷糊糊地拿起听筒。\n\n“夫人？”\n\n“请说。”\n\n半开的窗户透进一股凉风，卢皮塔不由得裹紧了被子，寒意袭来。\n\n“我是阿尔瓦雷斯，医院管理部门的。我们打算向您提供一笔和解金。”\n\n“和解金？”\n\n卢皮塔的心头一颤，眼中闪过一丝期待。她抬眼望向镜子，镜中的自己衣衫不整，头发凌乱，半个身子仍在床上。她努力集中精神，倾听着电话那头传来的每一个字。\n\n“我不能在电话里接受任何条件。我无法代表全体医生，任何谈判都必须与整个团体进行——”\n\n电话那头突然陷入沉默。几秒后，电话被挂断了。\n\n卢皮塔冷哼了一声。他们试图用这种方式施压，恐吓她，却不自觉地暴露了他们的无助与绝望。谈判，看样子已是势在必行。\n\n他们能赢吗？"
 MEX_Madrazo_DS.5.a:0 "卢皮塔又沉沉睡了过去。"
 MEX_Madrazo_DS.6.t:0 "缝合未来"
 MEX_Madrazo_DS.6.desc:0 "艾萨克·塞斯佩德斯在午后打来电话，自称是科阿韦拉大学的一名教授。卢皮塔没怎么在意他教授的具体学科——或许是文科？她只记得自己问他，这个时间点，一个像塞斯佩德斯博士这样的人会找她有什么事。原来，他是全国民众团体联合会的正式成员。\n\n现在，她和其他实习生们坐在教授的研讨室里，享用着免费提供的三明治和水。而塞斯佩德斯则站在前面，滔滔不绝地发表着关乎意识形态的演讲，挥舞着手臂，仿佛某位老派信仰复兴布道者的灵魂在他体内复活。\n\n“亲爱的朋友们，我一直是工人权利的坚定支持者。但你们知道，比我更强大的盟友是谁吗？”他微笑着问道，仿佛期待着回应，却让人感到这更像是一个无关紧要的问题。一名实习生在沉默中望向另一人，脸上浮现出一丝困惑。“……是我们的总统，马德拉索阁下。”\n\n有人轻咳了一声，似乎想打破这尴尬的沉默。\n\n“所有劳动者为自己的权利而斗争是至关重要的，因为公营部门的胜利就是全体人民的胜利。而幸运的是，总统非常愿意支持医协争取公平待遇的斗争。”\n\n话音落下，空气中又是一片无声的静默。\n\n卢皮塔站起身来，向塞斯佩德斯教授表示感谢，称赞他富有启发性且庄重的言辞。她与教授握手告别，然后和其他实习生一起走出了研讨室。一位朋友低声问她，这是否意味着全国民众团体联合会要帮助他们。马德拉索总统会出手相助吗？\n\n她轻哼一声，摇了摇头。"
 MEX_Madrazo_DS.6.a:0 "“他的言辞帮不了我们。我们必须继续战斗。”"
 MEX_Madrazo_DS.7.t:0 "痊愈"
 MEX_Madrazo_DS.7.desc:0 "卢皮塔望着时钟，正好敲响整点。过去的她，还得再干上四个小时，才能拿到现在一半的薪水。\n\n她不禁长舒了一口气。\n\n收拾好书包，走在走廊上，快到休息室门口时，她从虚掩的门缝中听到了自己的名字。\n\n“你还没见过卢皮塔吗？她可是为我们挺身而出的人。我从没见过比她更勇敢的人。如果没有她，我们现在还在原地踏步，甚至可能会更糟。”\n\n卢皮塔的脸一下子红了，赶紧转身走向另一条路，生怕被人发现。\n\n虽然这些话让她心里暖洋洋的，但也让她有些不自在。\n\n罢工的事到底是什么时候的了？这段时间，她早已对过去的几周甚至几个月失去了时间感，只想着活在当下，尽管“当下”究竟意味着什么，她自己也说不清。\n\n她真的有那么勇敢吗？也许吧。\n\n可总觉得哪里有些不对。\n\n明明是马德拉索总统的意愿让大家达成了目的，所以那些关于她如何带领大家取得胜利的故事，她听得越多，心里就越感到一种莫名的空虚。\n\n她真的有资格为此感到骄傲吗？"
 MEX_Madrazo_DS.7.a:0 "有点不对劲。"
 MEX_Madrazo_DS.8.t:0 "维生素与矿物质"
 MEX_Madrazo_DS.8.desc:0 "卢皮塔试着追上公交，险些被一些碎瓷砖绊倒，她只得眼睁睁地看着公交车发动起引擎，闹哄哄地开走了。她刚刚加班修好了一个病人的静脉输液管，因此错过了这班车。因为一些荒唐的理由，每班车的间隔大约两小时，因而她决定回去打发时间。\n\n沿着走廊走着，她便看到了她的老战友——那张老轮床——她打算去床上歇一会。\n\n“卢皮塔？”\n\n她扭头便看见了塞斯佩德斯教授有些局促地站着，胸前抱着一顶软毡帽，仿佛准备用它作为盾牌抵御未知的威胁。\n\n“塞斯佩德斯教授，怎么了？”\n\n“不，不。我很好，请叫我艾萨克。我只是想来看看，看看你这边怎么样，我说……”\n\n卢皮塔扮个鬼脸，又揉了揉她的脊背：“没赶上车。下班车两个小时后才来。如果不是这个事，我还挺好的。”\n\n塞斯佩德斯打了个响指，指了指走廊：“如果你愿意，要不我送你？”"
 MEX_Madrazo_DS.8.a:0 "“好啊，艾萨克。”"
 MEX_madrazo_GUI_category:0 "锻造革命"
 MEX_forge_of_the_revolution_info_tooltip:0 "§O锻造革命§!\n-------------------\n§K土地§!与§M自由§!。在§O卡德纳斯§!时代，温热的故土与美好的自由曾是那么唾手可得。在1958年后，它们却渐行渐远，日益模糊。§E洛佩斯·马特奥斯§!谨慎地翻出了这本旧账，选择§K卡洛斯·A·马德拉索§!作为自己的接班人，重燃人民心中的§O革命§!承诺。\n\n§K马德拉索§!接过了§O卡德纳斯§!、§m穆希卡§!与§q加里多§!的火炬，誓要焚尽一切寄生在§K墨西哥§!与£GFX_mex_pri_texticon §K革命§!§W制度§!§x党§!身上的行尸走肉，为了独立、公正与平等的未来开辟出一条康庄大道。真正的§X左翼§!与§K民族主义§!愿景将为§O革命§!点燃熊熊烈火，照亮他的前路，将冰天雪地中的追随者聚到他的名下。如果§K马德拉索§!有意重塑政党、改造政府、重建社会，他就必须要让手中的烈火变得显眼且明亮。\n\n然而，正如波菲里奥时期一般，境外势力已将商业的毒牙与外交的利爪刺入§K墨西哥§!的胸膛：£GFX_GNG_USA_texticon §M美国§!永恒的威胁不减，如今又有£GFX_jap_ija_texticon §x日本§!搅局。这帮吸血鬼们可不会对§O革命§!的明光手下留情，鉴于他们恐怖的实力，我们必须做好风险管理，以此应对灾难性的冲突事件。\n\n倘若§O烈火§!失控，冲突将不可避免……"
 MEX_Flames_tt:0 "§K革命民族主义§!为§Y[?MEX_revolutionary_nationalism]§!。"
