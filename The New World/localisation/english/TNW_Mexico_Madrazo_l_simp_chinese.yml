 MEX_Madrazo.4.desc:0 "内政部长：路易斯·埃切维里亚·阿尔瓦雷斯\n外交部长：阿方索·加西亚·罗布莱斯\n国防部长：拉萨罗·卡德纳斯·德尔里奥\n海军部长：安东尼奥·巴斯克斯·德尔梅尔卡多\n公共工程部长：哈维尔·巴罗斯·谢拉\n国家资产部长：埃弗拉因·布恩罗斯特罗·奥乔亚\n工业和商业部长：贝尔纳多·金塔纳·阿里奥亚\n农业和畜牧业部长：马尔特·R·戈麦斯\n水利资源部长：何塞·埃尔南德斯·特兰\n通讯和运输部长：欧亨尼奥·门德斯·多库罗\n公共教育部长：哈维尔·罗霍·戈麦斯\n卫生与援助部长：卡洛斯·坎塞科\n劳工与社会福利部长：安德里萨·塞拉·罗哈斯\n财政与公共信贷部长：安东尼奥·奥尔蒂斯·梅纳\n总统秘书：劳罗·奥尔特加·马丁内斯"
