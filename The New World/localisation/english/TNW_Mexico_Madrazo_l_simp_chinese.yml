 MEX_Madrazo.7.t: "增善之举"
 MEX_Madrazo.7.desc: "《永远！》周刊——近来，首都掀起了一股“咖啡歌手”的浪潮，不断地在城市的各个角落迅速传播。年轻人喝着走私酒，放荡不羁，进行着反社会行为，其中夹杂着在青年中流传甚广的洋基摇滚乐。这些歌曲在人们的潜意识中播下了美国文化帝国主义的种子，让他们沦为碌碌无为之辈。国家的青年正面临危机！他们被误导了！革命呢？国家呢？人民怎么办？穷人和弱势群体深陷泥泞，地方当局忽视他们，甚至连他们的孩子也无视了他们。我呼吁全体年轻人，男男女女们，投身于工农的事业！\n\n埃切维里亚通常不看这样的报刊。即使看，他也只是会寻找不当之处：在这种情况下，社论非常小心地将对党的批评限制在模糊的“地方当局”之上。然而，他发觉这次自己认同了杂志上的观点。的确，这很可怕。极其糟糕。这个年龄段的人不该沾染上这些恶习。突然，他想到这一切离他是多么近。年轻的阿尔瓦罗，埃切维里亚的儿子。如果他泡在了这些东西上，该怎么办？喝酒，打架，吸毒，不。\n\n——不！别来了。\n\n埃切维里亚把报纸扔在一旁，拿起电话。在等待忙音的时候，他意识到这是一个在总统眼中提升形象的机会。是的，他将赢得马德拉索的欢心，同时将迷途的孩子们重新导回正轨。\n\n做一个能把事情办好的人是多么令人满足。\n\n“卡德纳斯部长？”"
 MEX_Madrazo.7.a: "“我刚刚发现了一些令人担忧的事情……”"
 MEX_Madrazo.8.t: "想想孩子们！"
 MEX_Madrazo.8.desc: "拉萨罗·卡德纳斯清了清嗓子，扫视着面前的每一位内阁成员：“道德腐化正在蔓延。”他撑着桌子，说，“在我们国家未来的希望和栋梁，我们的接班人，我们的孩子中蔓延。而腐化的根源就是那些所谓的‘咖啡馆’。我当年和篡位者韦尔塔拼命，难道是为了让我们的革命被美帝国主义的靡靡之音摧毁殆尽吗……”卡德纳斯的声音紧绷着，仿佛满腔怒火已经噎住了他的喉头。他思考片刻，接着说：“……如果我们的年轻人都烂成了肤浅的享乐主义者，我们的革命岂不是要毁于一旦了？”\n\n路易斯·埃切维里亚取出一叠文件，插话道：“总统阁下，我同意他的主张。我整理了一些来自联邦安全局的报告，比如这一份。”他指着其中一段：“知情人士报告称，一帮开‘哈草派对’的人已经占据了某街区的一座咖啡馆……据估计，这些地方正在成为毒品和反社会行为的温床……哦，还有少年帮派。这里提到了一起发生在咖啡馆外的大规模斗殴事件，一名男孩被捅伤。”\n\n太可怕了，马德拉索想。他挠了挠下巴，正准备开口问阿方索·德尔·罗萨尔的意见时，他的联邦区长官就皱着眉头抢先说：“我保证，总统阁下，有我在，这些问题不需要埃切维里亚学士和联邦安全局出手。”埃切维里亚正要开口，哈维尔·谢拉又提出了自己的看法：“如果我们因为偏见而剥夺他们的自由，又怎么能指望年轻人能够成长为未来的领袖呢？让他们接着奏乐接着玩吧。惩罚那些走上歪路的人，也可以，但这是小题大做。你们难道没有年轻气盛过吗？”马德拉索举起手，示意谢拉不必多说了。他已经做出了决定。"
 MEX_Madrazo.8.a: "“发布一份新闻稿，谢拉部长：我们支持他们的言论自由。”"
 MEX_Madrazo.8.b: "“只要监控他们的同时，赞助一些青年俱乐部作为替代就够了。”"
 MEX_Madrazo.8.c: "“德尔·罗萨尔部长，我们必须要出重拳。由你和埃切维里亚学士一起办。”"
 MEX_Madrazo.9.t: "美妙时刻"
 MEX_Madrazo.9.desc: "卡米拉忍不住嘲笑起朋友路易莎笨拙的舞步——路易莎站在那里，显得手足无措，只能尴尬地在原地踏步，双手在空中胡乱挥舞，双腿僵硬得像灌了铅一样。但路易莎对此毫不在意，反而自己笑得开心。这时，玛丽亚从吧台那边走过来，手里拎着几瓶啤酒。“下一首歌要开始了，”她递过酒瓶，“米拉，我猜你会喜欢的！”\n\n伴随着点唱机的旋律，几声醉醺醺的欢呼声从人群中传来。卡米拉猛灌了一口酒，然后挽起路易莎和玛丽亚的手臂，几个人边傻笑边模仿起坎坎舞的动作，舞步夸张又滑稽。卡米拉脑海中又浮现出那部关于奥运会的电影——那个愚蠢的故事让她觉得无聊至极。电影中场休息时，她便悄悄溜走，跑到几个街区外的栗子咖啡馆，在那里与朋友们度过了一个充满欢笑的夜晚。那是她从父亲那冷酷束缚中的一次短暂逃离。一想到父亲的严厉与专横，她的心便沉重了几分。\n\n但很快，她又看到了路易莎那带着顽皮的眼神，玛丽亚的笑容如阳光般灿烂。这一刻的欢笑、友谊与自由交织在一起，化作卡米拉心中最珍贵的时光。\n\n她突然想起了一句话：“你是否相信，奇迹，就在年轻女孩的心中？”"
 MEX_Madrazo.9.a: "“为何无论何时，音乐响起，总能带给她自由的空气……”"
 MEX_Madrazo.10.t: "树叶都已枯黄……"
 MEX_Madrazo.10.desc: "卡米拉在醉意中摇摇晃晃，周围是大约二十个同样年轻且迷醉的人。她不断撞到别人，但四周的气氛却出奇地平和。那些在大街上可能引发争执的推撞，此刻只是换来了漠然的微笑和含糊的道歉。酒精让大多数人变得像温顺的木偶，动作迟缓又无害。然而，醉倒的卡米拉却与众不同——长笛独奏让她兴奋不已，仿佛置身于天堂的幻境。\n\n她的思绪突然被错过的那部电影打断。电影讲的是一个从集体农庄走出的男孩，通过参加奥运会实现梦想的故事。卡米拉觉得这情节荒诞可笑：为何有人会舍弃音乐和舞蹈，投身于枯燥的跳高训练？她暗自发誓，自己绝不会离开这美好、恍若仙境的地方。\n\n正当她沉浸在这片刻的安宁中时，刺耳的玻璃破碎声骤然响起，紧接着是一声凄厉的尖叫。音乐依旧在播放，然而卡米拉的心却如擂鼓般狂跳，她惊恐地捂住脸庞，双眼大睁。一名男孩倒在地上痛苦地扭动，头部鲜血直流，身体不停抽搐。一名女孩匆忙用外套擦拭着血迹，紧紧抱住男孩的头，歇斯底里地哭喊着。在几英尺外的地面上，几块碎砖零散地躺着，仿佛是某种恶意的象征。\n\n人群开始在卡米拉的周围骚动，像惊涛骇浪般向门口涌去。她被无情地推挤，只能紧抓住他人的肩膀，勉强保持平衡。大门敞开，外面的街灯明亮刺眼，闪烁的光芒让她几乎睁不开眼，直到她逐渐适应了夜晚的光亮。门外，一群穿红色衣服的流氓正在喧闹，推搡着那些刚刚逃出咖啡馆、神情迷茫的派对参与者。一个流氓径直走向卡米拉——她呆立着，像周围的其他人一样，仍然陷在震惊之中。她无法读懂流氓的唇语，也无法从周围的喧哗中分辨出他的声音。那个流氓对着她怒吼，随即朝她脸上吐了一口唾沫。\n\n卡米拉的心猛然一缩，惊恐地转身逃跑。她感觉到周遭的一切都在向她压来，仿佛整个世界的重量都落在了她的肩上。"
 MEX_Madrazo.10.a: "……天空是灰色的。"
 MEX_Madrazo.11.t: "叛逆者与革命者"
 MEX_Madrazo.11.desc: "说这部电影无聊，都有点轻描淡写了。影片充满了毫不掩饰的爱国情怀，讲述了一个来自集体农场的男孩，梦想参加将来的奥运会。片中那些生硬的煽情场面让卡米拉忍不住翻了个白眼（“他哥哥就这么死了，这也太假了吧？”）。中场休息时，卡米拉走出了电影院，漫步在街道上，越走人潮越是拥挤。在一个拐角处，她看到了自己最喜欢的去处——栗子咖啡馆。然而，眼前的景象不由得令她心头一紧：这家曾经热闹的咖啡馆已被查封，显得破旧不堪，原本的前门被一条条黄色的警察封条所替代，\n\n这栋被查封的建筑前，一个她不认识的秃顶男人站在临时讲台上，讲台上悬挂着革命制度党的旗帜和口号，周围都是穿着红衫的暴徒。他激动地挥舞着手臂，握紧拳头，麦克风放大了他洪亮的声音。\n\n“年轻的国民，你们是抵抗社会解体的力量！为你的国家服务，为你的同胞服务！”\n\n听到这番话，卡米拉仔细打量起身边的护卫，特别是一张年轻的面孔——一个同龄女孩，扎着辫子，脸上布满雀斑，却带着愤怒、充满威胁的目光，仿佛是在邀请革命的敌人立刻现身，以便她和先锋们将其一击致命。\n\n卡米拉的心沉了下去，胸口如火焚烧。街道开始失去控制地旋转。她被密集的人群压得喘不过气来，拼命挣脱，最终逃了出去。"
 MEX_Madrazo.11.a: "德尔·罗萨尔向年轻的激进分子们致敬，欢呼声此起彼伏。"
