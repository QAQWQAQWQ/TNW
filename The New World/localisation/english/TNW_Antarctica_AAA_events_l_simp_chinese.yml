 antarctica_aaa_op90prep.370.t:0 "上帝光辉所不能及"
 antarctica_aaa_op90prep.370.desc:0 "安格鲁·法鲁贾少尉靠在甲板栏杆上，在刀削刺骨的寒风之中，白色的庞然大物浮现在他的眼前。法鲁贾是一名意大利皇家海军的后勤军官，地中海和红海那温暖的海水才是他习惯的地方，就像自己的家乡马耳他一样。\n\n然而造化弄人，或许正是因为自己出身马耳他，才被派来世界边缘，把枪炮武器运到这里。毕竟，马耳他也才成为帝国的一部分不久啊。\n\n理论上讲，他们和居住在亚平宁半岛的同胞们是平等的，但实际上呢，许多高层仍然将他们视作半阿拉伯血统的杂种，是迷失在英国佬腐朽的物质生活中、抛弃了拉丁兄弟的叛徒。\n\n虽然这项任务并不轻松，但对他的上司来说却十分重要。某个狡猾的阿根廷外交官不知耍了些什么手段，和政府谈成了一笔新式弗兰基LF-59冲锋枪的交易。法鲁贾低头看了看自己的佩枪，是一把年龄可能比自己还要大的贝雷塔手枪，几乎已经不能用了。这种情况在意大利并不罕见，各地驻军大都武器老旧、缺枪少弹，同时还不得不投入艰苦的战斗之中。\n\n但身在罗马的硕鼠巨蠹毫不在意，任凭残羹剩饭从指缝间流走，对帝国路边的冻死骨不管不顾。\n\n尽管如此，法鲁贾还是相当庆幸的，至少他不用留在这里，不像埃斯佩兰萨站的可怜人和加林德斯岛上的战友一样，被困在这片白色荒漠。\n\n尽管他在许多事情上都不认同意大利，但法鲁贾此时突然觉得，那位最著名的意大利人说得十分有道理。这片大陆证明了一件事情：但丁·阿利吉耶里是对的，地狱的审判庭并非是烈火与硫磺，不是的……"
 antarctica_aaa_op90prep.370.a:0 "撒旦住在冰封之地。"
 antarctica_aaa_op90prep.380.t:0 "压力点"
 antarctica_aaa_op90prep.380.desc:0 "贝尔特拉米诺站在埃斯佩兰萨站的飞机跑道边，日本代表团走下舷梯，渐渐走近。四名威武的军人身旁，就是代表团的领队外交官，下田武三。尽管下田身上只穿着轻便的正装，但周身的寒冷空气似乎完全没有影响到他的仪容举止。贝尔特拉米诺正准备倾身鞠躬，他可是花了整整一个上午练习，但这种传统的日式问候礼节仍然让他有些不自在。因此，迎面走来的下田向他伸出臂膀，示意握手问好时，贝尔特拉米诺不由得感到一阵轻松。随后，下田用发音近乎完美、但语气又十分呆板的西班牙语向他略作寒暄。显然，这也是精心练过的。\n\n贝尔特拉米诺带领代表团走进埃斯佩兰萨站，通过检查站，进入总部大楼。日本代表团以出乎意料的优雅姿态跟随贝尔特拉米诺穿过大楼中曲折蜿蜒的走廊，就像是他们根本不需要贝尔特拉米诺引路，早已对这里的内部结构了然于心一般。\n\n走进贝尔特拉米诺的办公室后，下田直接把一个大箱子摆上了办公桌。这箱子真是堪比一座小图书馆，里面满是有关智利南极领地的地图、图表和报告。贝尔特拉米诺花了足足好几个小时才翻阅完所有资料，其中有一份抓住了他的眼球：智利的布防地图，标出了较有可能受到攻击的区域。这让他想起了自己在为了迎接日本代表团做准备时读到的一本日本文化入门书，里面有一张针灸图，它的用处是帮医师找到特定的穴位，将银针由此刺入，以达到最佳的理疗效果。日本人似乎用同样令人不寒而栗的细节描绘出了智利领地的图景，贝尔特拉米诺心头紧张起来：他们这么了解智利人，他们还知道些其他什么？会议结束时，他长舒一口气。下田在登上直升机离开前，与阿根廷外交官握手道别，贝尔特拉米诺察觉到了一点古怪：不知道是自己的错觉，还是只是天气太冷了，但在和下田握过手的地方……"
 antarctica_aaa_op90prep.380.a:0 "他的神经紧张颤栗起来。"
 antarctica_aaa_op90prep.390.t:0 "欢迎来到圣马丁"
 antarctica_aaa_op90prep.390.desc:0 "希罗想着，我们看起来一定狼狈极了。他的小队正沿着岩石密布、湿滑崎岖的海岸挣扎前行，低矮山崖上闪烁的灯光映照着漆黑的海冰，那就是圣马丁站。在艰苦的行军后，他们终于要到了，希罗和部下们在欢声笑语中走着这最后一段艰难的路程。他们互相讨论着，在到了之后最先要做什么，所有人都同意应该先睡上一个星期再说。但在他们的轻松惬意的闲谈和疲惫的双眼背后，还有着说不出口的疑问。\n\n圣马丁站会怎么迎接他们？他们做得够好了吗？现在，他们只能听到雪地靴和冰层摩擦的声音和大风的咆哮。\n\n在最高大的橙黄色建筑顶上，一面巨大的旗帜正迎风招展：“欢迎来到圣马丁”。一群人站在建筑区的边缘，看起来基地的所有人都聚集在一起。而当基地的人们看到探险队员时，热烈的欢呼声陡然响起，仿佛他们此刻并非衣衫褴褛、冻得半死不活的流浪者，而是南极的英雄一般。希罗和部下们又振作起来，与同胞们握手、欢庆、拥抱，香槟酒伴随他们穿过基地，蓝与白的旗帜在人群上空飘扬。\n\n希罗睁大眼睛，手里抓着一瓶不知道是谁递来的香槟，站在庆祝人群的正中心。似乎就连雪橇犬们的脸上都露出了笑容，每只狗都在享受着十几只手的爱抚。一名头戴军官帽的男人叫住了希罗，是埃尔南·普哈托准将：“欢迎，上尉。”两人互致军礼，微笑着握住了彼此的手。\n\n“祝贺你们成功的陆上远征，我已经要迫不及待地听听你们一路的故事了。”普哈托一边说着，又给狗狗扔了一口吃的。希罗的呼吸都颤抖起来，他确实有好几个故事要讲，但现在和准将并肩前行时，首先浮现在脑海中的只有一件事："
 antarctica_aaa_op90prep.390.a:0 "“南纬90行动看起来不是不可能的。”"
 antarctica_aaa_op90prep.400.t:0 "和平的一角"
 antarctica_aaa_op90prep.400.desc:0 "东部边境是阿根廷南极属地最偏远的领地，仅仅只有一处位于布伦特冰架的小前哨站，邻近德控新施瓦本的边界。\n\n与阿根廷的其他南极基地哨站相比，此处前哨站的管理可谓是自由放任，与德国同行的关系相当友好，这都是庇隆政府留下来的遗产。双方之间的边境贸易十分普遍，此外，尽管按照协议，奢侈品交换是明令禁止的行为，但在这里也时有发生。\n\n酒、香烟、卫生纸都是交换列表的一部分。甚至非武装人员都常常造访彼此的基地，聊些闲话，享受彼此的陪伴。这里没有人监视他们。\n\n按照阿根廷的评估，已经是过度扩张、消化不良的德国人不会来寻自己的晦气，东边的OFN事务局也牵扯了他们绝大多数的精力，根本无暇顾及在这最偏远的领土上正在发生些什么。\n\n布伦特冰架上，时光就这样静静地流逝着。德国军官叼着阿根廷雪茄吞云吐雾，阿根廷队员品尝着德国最好的烈酒，在彼此的鼾声中安然入眠。在这世界的尽头，他们享受着这一方小小的和平。"
 antarctica_aaa_op90prep.400.a:0 "这就是生活。"
 antarctica_aaa_op90prep.410.t:0 "贝尔格拉诺基地"
 antarctica_aaa_op90prep.410.desc:0 "在南极上空，很少有飞行员能像奥莱扎中校这么自在地遨游天际。当希罗上尉搭乘的飞机在南极大陆上最靠南的基地贝尔格拉诺站着陆时，他这样的想法愈发强烈起来，似乎不管什么航线，只要让中校来飞，那就都只是小菜一碟。贝尔格拉诺站位于菲尔希纳冰架，由普哈托准将于1955年建立，以阿根廷的国父之一命名。设立这处基地原本的目的是充当远征南极点的跳板，时至今日，它似乎终于践行了建设之初被赋予的使命。\n\n莱亚尔上校下令，由希罗上尉来指挥这处基地，并与奥莱扎合作完成三项任务：执行空中侦察及徒步巡逻，找到越过南极大裂谷、通向南极点的可行道路；寻找安全的补给站位置；以及确定索夫拉尔分基地的位置。\n\n索夫拉尔分基地的预定地点位于南极点与贝尔格拉诺站之间，用于维修雪地车、储存物资补给。此外，在有需要的时候，探险队也可以与驻扎在此的四名人员进行人员交换。没有索夫拉尔基地，南纬90行动就是一纸空谈。\n\n希罗和奥莱扎走下飞机，已经几乎彻底被冰雪掩埋的橙黄色建筑群映入二人的眼帘。奥莱扎开口感叹道：“这地方看起来就像是彻底废弃了一样。”但他们都知道，贝尔格拉诺站的主体部分都位于地下，由错综复杂的地道网相连接，最深处甚至位于地下十米。这也是唯一能在这里活下去的办法，在菲尔希纳冰架，狂风会无情地掀翻栖身的屋顶，暴雪会残酷地撕裂人们的肌肤。"
 antarctica_aaa_op90prep.410.a:0 "希罗说道：“我们赶快进去吧。”"
 antarctica_aaa_op90prep.410.a.tt:0 "§F我们现在可以选择决议，侦察§W索夫拉尔基地§!的可能地点。基地位置一旦选定，我们就可以开始在此为探险队储存补给。§!"
 antarctica_aaa_op90prep.420.t:0 "军械库"
 antarctica_aaa_op90prep.420.desc:0 "埃斯佩兰萨站的军械库里，枪炮弹药都已经蒙上了一层淡淡的灰尘。要是莱亚尔能说了算，这些武器根本不会出现在南极大陆上。把冲突带到南极洲是人类愚蠢行为的新高峰，这里是地球上最不适宜居住的地方，人体在短短几分钟内就会分崩离析。在莱亚尔看来，所有不用来防御恶劣自然条件的能量都是毫无意义的浪费。\n\n但莱亚尔也不是什么脱离现实的理想主义者，人类走到哪里，冲突就会蔓延到哪里，这就是人类的天性。要是有人认为南极大陆和其他争议领土有什么不同，那可真是过于天真了。迫不得已时，莱亚尔也会选择以刚克刚。\n\n这片土地是阿根廷的一部分，他要让全世界都承认这一事实。虽然上校更愿意用言辞和善意来表达，但若到必要之时，子弹和轻蔑也是他的武器。\n\n南纬90行动其实就是莱亚尔个人矛盾的集中体现。此前和平时期的极点探险尝试都以失败告终，而现在甚至还不是和平年代。科技进步或许能让陆上探险更加可行，但武装暴力冲突已经成了这片大地上的未知数。你大可以为恶劣的气候和崎岖的地形做好一切准备，但要怎样才能彻底防住心怀敌意的人类呢？\n\n莱亚尔在武器架前踱步思索，他面临着极为关键的选择：是要带上更多的枪支弹药，还是把雪地车和雪橇上的空间留下来，带上更多的物资补给？"
 antarctica_aaa_op90prep.420.a:0 "确实很疯狂，但现在的世界就很疯狂。他会带上武器，然后祈祷永远都不会用上它们。"
 antarctica_aaa_op90prep.420.a.tt:0 "这将会增加南纬90行动的§e子弹§!储存。\n我们将获得§R8军事点数§!£Antarctica_texticon_MIL 。"
 antarctica_aaa_op90prep.420.b:0 "多余的补给更加重要。如果把空间和燃料浪费在携带武器上，不用别人出手，南极就会让他们有去无回。"
 antarctica_aaa_op90prep.420.b.tt:0 "这将会增加南纬90行动的§W医疗用品§!、§R生存装备§!和§g修理工具§!储存。"
 antarctica_aaa_op90prep.430.t:0 "现实主义者"
 antarctica_aaa_op90prep.430.desc:0 "与埃斯佩兰萨站相比，圣马丁站的军械库使用频率就要高得多了。埃尔南·普哈托准将时时刻刻都督促部下高度警戒，这既是为了维持纪律，也是为了随时迎接南极的一切挑战。\n\n所有步兵装备一应俱全：步枪、手榴弹、刺刀、机枪、甚至无后坐力反坦克武器。如果将埃斯佩兰萨站比作张开的友谊之手，那圣马丁站就是阿根廷南极研究所紧握的拳头。\n\n普哈托走过军械库里锃光瓦亮的步枪，思索着莱亚尔上校提出的请求。显然，上校认为南纬90行动队伍需要更强大的火力，以威慑其他国家任何可能的攻击。普哈托几乎都能从字里行间读出莱亚尔写下这封信时咬牙切齿的样子。如果两人易地而处，他会做出和莱亚尔一样的决定吗？普哈托和莱亚尔有着共同的梦想，那就是极点之梦、和平探索之梦，但两人都是能认清现实的人，他们对南极如今的现实心知肚明，不会沉溺在自己的愿景之中。普哈托希望，莱亚尔至少不要掉进和自己同样的政治陷阱之中。\n\n准将拾起了一枚子弹，南极的愤怒已经让他的双手伤痕累累，为了这里，他已经奉献出了自己的一切。在实现共同的梦想之前，莱亚尔究竟还要付出多少牺牲？"
 antarctica_aaa_op90prep.430.a:0 "要是我能和他一起去，该有多好。"
 antarctica_aaa_op90prep.440.t:0 "食物安全"
 antarctica_aaa_op90prep.440.desc:0 "南极洲的食物并不是为了满足人的味觉，而是一种微妙的平衡，保证饱受恶劣环境折磨的身体能够维持正常的细胞运转。在南极洲，正常人每天需要约七千到一万卡路里的能量摄入才能维持生命。\n\n罗伯特·法尔肯·斯科特的新地探险队证明，即使食物加热也可能是生死攸关的决定因素。斯科特原计划只率领四个人进行最后的极点冲刺，但他们最终带上了第五名队员，额外的食物加热需求也是他们最终埋骨雪原的原因之一。\n\n南极计划中的一个关键因素就是食物供应的完整：咸牛肉罐头、压缩饼干、干肉饼都必须定期检查，确保它们没有变质。\n\n莱亚尔上校决定，多带上一些吃的，而不是什么重火力武器。每种食品都要逐一检查，每五罐牛肉罐头，就要拆开试一次；同样，每打开三箱压缩饼干，就要检查是否有发霉的迹象出现。\n\n过去的检查曾发现过腐烂发霉的口粮和肉毒杆菌污染的肉罐头。莱亚尔需要保证，在他和部下们冲向极点的途中，即使吃的东西算不上美味，也必须百分之百安全。"
 antarctica_aaa_op90prep.440.a:0 "“现在，轮到干肉饼了……”"
 antarctica_aaa_op90prep.450.t:0 "击碎镜片的铅弹"
 antarctica_aaa_op90prep.450.desc:0 "又是一天，又是一次穿越南极大陆的巡逻。奥斯卡·拉蒙·阿方索一等兵坐在雪地车副驾座位上，紧挨着莱亚尔上校。雪地车在一望无际的白色中前行，他躺在椅子上，凝视着窗外。车内的温暖与窗外寒冷而充满敌意的环境形成了鲜明的对比，让他莫名感到一阵安心与舒适。\n\n然而，在地平线上，阿方索注意到了某种类似车辆的影子。他望了两眼，指着那辆车惊呼道：“上校！”莱亚尔刹住车，拿起手边的望远镜。\n\n“智利人，”莱亚尔说道，“看起来像是调查队。我们开近点。”\n\n他们驶近停驻的智利雪地车，莱亚尔、阿方索和随行的几名士兵跳下雪地。莱亚尔手持扩音器，高呼道：“这里是阿根廷领土，立即离开。我重复一遍，立即离开！”\n\n智利人没有回应。莱亚尔恼怒地说道：“这帮人一定是聋了，要不就是傻了。鸣枪示警。”几名士兵听令向智利人开火，但他们似乎并不害怕，或许他们认为阿根廷巡逻队鸣枪示警只是虚张声势罢了。\n\n又过了片刻，阿方索喊道：“上校说了，立即离开！”他端起步枪、瞄准、扣动扳机，一气呵成，智利雪地车的后视镜应声化作碎片。智利人急忙跳回车上，落荒而逃。\n\n智利调查队开车逃离时，莱亚尔最后一次朝着他们喊道：“祝你们今天愉快。”然后，他扭头看向了阿方索，赞叹道：“你这枪打得可真他妈漂亮。”阿方索耸耸肩，回答道：“这个冬天我在靶场练了很久的。”巡逻队重新坐回雪地车上，莱亚尔思考了一会儿，开口说道：“我想和你谈谈……”"
 antarctica_aaa_op90prep.450.a:0 "“……南纬90行动。”"
 antarctica_aaa_op90prep.450.a.tt:0 "§W奥斯卡·拉蒙·阿方索一等兵§!已加入§O南纬90行动§!§Y人员名单§!。\n我们将获得针对$Antarctica_GUI_AAC_Name$的§B4情报掌握度§!£Antarctica_texticon_INTVAL 。"
 antarctica_aaa_op90prep.460.t:0 "梦之队"
 antarctica_aaa_op90prep.460.desc:0 "莱亚尔上校端详着钉在办公室软木板上的名单。过去一年里，他集结了阿根廷南极属地最优秀的士兵，他们将会是向极点突击的核心队伍。小队将一起从贝尔格拉诺基地出发，莱亚尔心想，愿上帝保佑，南纬90行动能够如愿以偿。飘扬在南极点的阿根廷国旗无疑会是一道靓丽的风景线，但能否抵达那里完全依赖于塞皮准尉、布拉西奥、罗德里格斯和奥尔蒂斯组成的机械师团队，他们将保证雪地车不会在南极严酷的自然环境中动弹不得。\n\n当然，找路就得靠能干的卡里翁上士和莫雷诺上士了，他们都是经验丰富的导航测绘人员，不仅能为队伍指引方向，还能绘制新的南极地图。\n\n当然，还有萨卡里亚斯上士和阿方索一等兵，与各行动小组保持联系、阻止其他国家武装阻挠的任务就落在他们两个身上了。\n\n最后就是希罗上尉和莱亚尔本人了。莱亚尔毫不怀疑，希罗上尉是一位心志坚定、不屈不挠的副手，如果自己遭遇任何不测，希罗也必将实现他们期盼已久的梦想。\n\n此时，希罗刚刚从贝尔格拉诺基地飞抵埃斯佩兰萨站，走进了总部。真是说曹操，曹操就到啊。"
 antarctica_aaa_op90prep.460.a:0 "真是漫长的一年。"
 antarctica_aaa_op90prep.470.t:0 "暂离"
 antarctica_aaa_op90prep.470.desc:0 "与一年中的其他时间和南极大陆的其他地方相比，南极半岛的十二月可谓是美好舒适的季节。这块土地位于南极洲最北端，当下的气温介于0℃到2℃之间。\n\n因此，南极半岛是大陆全年最适宜人居的地方，阿根廷南极属地的许多基地都有冬夏驻留人员也是因为这个原因。不过，今年夏天，莱亚尔上校、希罗上尉和南纬90行动小队的成员们都准备回家里去，好好休整一下。\n\n埃斯佩兰萨站的跑道上，莱亚尔上校向普哈托准将敬礼，正式完成了指挥权的交接。普哈托代表阿根廷南极研究所的利益，对此，莱亚尔毫不怀疑。“那么，你们飞到乌斯怀亚之后有什么计划？”普哈托问道。\n\n莱亚尔回答道：“我得分出至少一半的心思好好组织最后几次的补给运送，似乎本该送给我们的物资装备落到了海军手里。”\n\n“我怀疑只是意外……”\n\n“那是自然。盯紧他们，这不是第一次‘意外’，也不会是最后一次。”\n\n两人互致告别，奥莱扎中校发动了飞机引擎。"
 antarctica_aaa_op90prep.470.a:0 "“圣诞快乐，噢还有，新年快乐！”普哈托冲着渐渐加速的飞机喊道。"
 antarctica_aaa_op90prep.480.t:0 "通向南极的大门"
 antarctica_aaa_op90prep.480.desc:0 "乌斯怀亚是阿根廷通往南极洲的门户枢纽，几乎所有物资和人员都要经由此处才能踏上南极。此外，这里还是掌控比格尔海峡、德雷克海峡和南方众多群岛的重要海军基地。毫不夸张地说，乌斯怀亚就是阿根廷南极属地唯一的生存命脉。\n\n莱亚尔上校越来越害怕海军对这座城市的统治。年复一年，阿根廷南极研究所已经愈发无法控制物资补给的吞吐量，急于为自己阴谋攫取资源的海军军官取代了研究所的地位。\n\n海军在乌斯怀亚的存在就像是一只大手，扼住了莱亚尔的咽喉，一天比一天更紧。\n\n上校和南纬90行动极点突击队穿过小城的街道时，空气中弥漫着掩饰不住的紧张气氛，就像暴风雨来临前的土腥味一样。\n\n阿根廷政府内部的政治冲突已经发展到了白热化，佐证随处可寻：平民的脸上、报纸的字里行间、士兵们彼此的眼神交流，这种迹象无处不在。\n\n尽管乌斯怀亚远离政府中心，但这里乃是阿根廷海军的枢纽基地之一，毫无疑问也卷入了风暴的中心。这座城市仿佛拥有灵性，能够察觉到即将到来的厄运，建筑物在空荡荡的街道上若隐若现，阴影愈发幽静黑暗。\n\n在前往市中心的路上，希望能找个地方喝上一杯的莱亚尔看到几名海军军官正在路边咖啡馆里喝咖啡。这群军官向莱亚尔和他的部下投来阴暗的目光，其中一人显然引起了希罗上尉的注意。\n\n“上尉，别停步，继续走。”莱亚尔说道。"
 antarctica_aaa_op90prep.480.a:0 "“我们很快就会离开这里。”"
 antarctica_aaa_op90prep.490.t:0 "留影"
 antarctica_aaa_op90prep.490.desc:0 "第三杯酒喝到一半时，希罗撞到了莱亚尔，啤酒顺着两人的衬衫前襟洒落，二人都一笑了之。今晚，不论做什么都算不上逾矩。南纬90行动极点突击队“突袭”了乌斯怀亚的一家酒吧，现在正在争抢此处的酒水饮料。几乎所有的酒馆里都挤满了海军，所以小队找到了这处看起来有些破旧的地下室酒吧。\n\n“告诉我，你至少会在休息时间放松一下。”希罗说道。\n\n“真遗憾，我还以为自己的圣诞假期会研究所的大厅里走来走去，乞讨一口残羹剩饭。”莱亚尔说道，“贝尔特拉米诺告诉我，海军在挪用专供我们使用的物资资金这件事上可是一直都很积极啊。”\n\n“他们想把我们赶走。”\n\n“让我来操心这事吧。”莱亚尔举起酒杯，“敬南纬90行动小队，干杯！”\n\n希罗端起酒杯，和莱亚尔碰了一下：“我觉得是时候拍张照片了，免得大家都喝断片把这茬给忘了。”二人穿过房间，加入了众人的狂欢。酒保拿出相机，所有人都举起酒瓶，微笑着摆好姿势，留下了一张照片："
 antarctica_aaa_op90prep.490.a:0 "南纬90行动极点突击队，1962年12月。"
 antarctica_aaa_op90prep.500.t:0 "第82巡逻队"
 antarctica_aaa_op90prep.500.desc:0 "地球上还有许多未被人类探索的角落，其中许多就藏在南极大陆的深处。虽然出于政治原因，莱亚尔上校在南极点插上国旗的愿望很是强烈，但他也同样充分意识到，在南纬90行动中进行极地探索也将为人类带来科学上的进步。\n\n斯科特探险队中有一位著名的博物学家爱德华·阿德里安·威尔逊，他从冰雪覆盖之下采集了许多化石与矿物。斯科特探险队对这些发现十分执着，哪怕是在自己能否活下去都是个问题的时候，也仍然携带着沉重的岩石样本。\n\n莱亚尔毫无疑问希望每个人都能活着回来，并为这次征程准备更多的东西，而不仅仅只是一面旗帜，尽管大家都喜欢这面旗帜。\n\n为此，他组建了一支名为“第82巡逻队”的小分队，其任务是先于极点突击队穿越大裂谷，标记出通往南极高原的最优路线，可供重型雪地车辆穿越而不会掉进裂隙。\n\n随后，由巡逻队指挥官阿道弗·欧亨尼奥·戈茨少尉、拉蒙·比利亚尔上士、马塞洛·埃诺克·阿尔瓦雷斯下士、莱昂纳多·伊莎贝尔·古斯曼下士组成的这支小分队将分头探索圣菲山脉，在人类从未涉足的地方采集岩石样本。莱亚尔对第82巡逻队充满信心，甚至对他们可能发现的事物而感到一丝丝兴奋。有些科学家认为，南极大陆曾经是郁郁葱葱的丛林天堂，在树冠之下曾有怎样奇妙的生物走过，化石又会记录着怎样的历史呢？"
 antarctica_aaa_op90prep.500.a:0 "莱亚尔梦想着，在未来，这样的探索或许将成为常态。"
 antarctica_aaa_op90prep.500.a.tt:0 "§W阿道弗·欧亨尼奥·戈茨少尉§!、§W拉蒙·比利亚尔上士§!、§W马塞洛·埃诺克·阿尔瓦雷斯下士§!、§W莱昂纳多·伊莎贝尔·古斯曼下士§!已加入§O南纬90行动§!§Y人员名单§!。"
 antarctica_aaa_op90prep.510.t:0 "冷血谋杀犯"
 antarctica_aaa_op90prep.510.desc:0 "在飞回埃斯佩兰萨站的途中，莱亚尔上校和希罗上尉一直面带微笑。假期很是愉快，但与阿根廷相比，他们觉得南极大陆更像是自己的家，尤其是现在政府内部还动荡不安。荒芜的海岸和依偎在山坡上的橙色建筑浮现在视野之中，让他们感到阵阵喜悦。飞机着陆后，极点突击队各自解散，继续执行任务，为南纬90行动做准备。莱亚尔和希罗走下飞机，沿着跑道慢慢走向埃斯佩兰萨站。普哈托准将正在跑道尽头等待他们，两人走近时，准将脸上沉闷的表情让他们不得不在意起来。“发生什么事了？”莱亚尔开口问道。\n\n“跟我来，”普哈托说着，带着他们走向总部。三人都走进房间后，普哈托锁上门，说道，“坐。”莱亚尔的心跳快了起来，希罗也跟着坐下。\n\n“驻扎在圣马丁站的海军罗萨里奥号正在整个帕默群岛展开一系列插旗行动。其中一支海岸巡逻队在温克岛上遇到一处智利哨所，双方发生了冲突，一名智利人中弹身亡，岸上指挥的少尉下令处决了另一名智利士兵，然后放火焚烧了哨所，所有没有彻底烧毁的东西都被扔进了大海……包括那两个智利人。”\n\n莱亚尔感到自己的五脏六腑好似被狠狠地打了一拳，他看向身旁，希罗已经面无血色了，结结巴巴地说道：“这……这是战争行为，冷血的谋杀！是谁告诉你的？”\n\n“卢戈·帕斯卡尔二等水兵，海军岸上分队的一名年轻士兵，他的良知胜过了对指挥官的忠诚，两星期前，他向我如实报告了这件事。”\n\n莱亚尔坐立不安，说道：“这是犯罪，但我们无能为力。如果上报，就可能会引爆战争，而这正是海军想要的。”"
 antarctica_aaa_op90prep.510.a:0 "“我们得耐心等待，”普哈托说道，“只要时机成熟，我们就会把这些混蛋赶出南极，永远。”"
 antarctica_aaa_op90prep.520.t:0 "最完美的计划"
 antarctica_aaa_op90prep.520.desc:0 "莱亚尔上校和普哈托准将是世界上最雄心勃勃的南极探险家，但此时此刻，他们的心思却完全放在了阿根廷海军的罪行上。两人并肩站在埃斯佩兰萨站的边缘，眺望着远处的大海，没人能听到他们之间的对话。\n\n曾经，食物、祖国的消息和家人的联络都漂洋过海而来，但现在，这无边无际的冰海却像监狱的铁栅栏一般，将陆军和南极研究所的人们困在了南极。\n\n“海军可能会杀了我们，”莱亚尔突然说道，“甚至可以无声无息地做到。这里漏运一批粮食，那里少送一点燃料，剩下的交给南极大陆就足够了。”\n\n普哈托缓缓地点点头：“只有你、我和希罗知道温克岛上发生的事情，在行动结束之前，我们必须保持沉默。如果海军发觉被我们盯上了……”剩下的话他没有说出口，“还有，在为行动做准备的同时，我们需要动用空军获得关键的富余补给。你必须要命令奥莱扎建立秘密空中补给线，要让海军相信他们仍然掌握着我们的命运。我会尽可能将陆军人员调到我的指挥部来，考虑到此前增援圣马丁站时的努力，这应该不会引起太多怀疑。”\n\n“海军以为你集结部队是为了对付智利人，他们真是傻瓜。”莱亚尔说道。\n\n普哈托笑了笑：“我还觉得自己挺谨慎的呢。当然，我还是希望能避免战斗，但如果海军进攻圣马丁站，我和部下都会做好准备。”然后，准将低声补充道，“从去年冬天开始，我们就已经做好准备了。”普哈托转过身，面对莱亚尔，坚毅地说道：“极点远征决不能失败。”"
 antarctica_aaa_op90prep.520.a:0 "“假若如此，阿根廷的南极之梦就彻底完了。”"
 antarctica_aaa_op90prep.530.t:0 "B计划"
 antarctica_aaa_op90prep.530.desc:0 "马蒂恩索联合基地正如其名，是一处由阿根廷陆军和空军联合建立的南极基地，位于拉尔森冰原岛峰。奥莱扎空军中校曾计划将这里作为飞往极点的跳板，但他的设想从未化作现实。\n\n这处基地没有海军从中插手的余地，因此莱亚尔上校认为可以利用这里扩充补给线，让自己和普哈托能稍稍摆脱海军的控制。\n\n马蒂恩索基地的指挥官是伊格纳西奥·卡罗上尉，他的麾下有一支全部是螺旋桨式飞机的小航空队，负责向几处阿根廷基地运输物资。卡罗的办公室比埃斯佩兰萨站随便一个房间都小得多，上校在这里与他开了个小会，讨论了扩大马蒂恩索基地运输规模的可能性。\n\n“长官，我就直说了吧，”卡罗说道，“您的想法在这里根本行不通。马蒂恩索基地只能起降道格拉斯C-47以下的机型，并且最多也只能支持寥寥几架同时起降。不过我们倒是能多派出去几架海狸，聊胜于无吧，至少能给你们一点喘息的空间……”\n\n莱亚尔点点头，说道：“暂时就先这么办吧，在找到大机场之前也只能如此。上尉，谢谢你，一切行动判断交由你决定。”\n\n卡罗与莱亚尔握了握手，目送上校走回飞机，不由开口问道：“您真的觉得能找到够平坦的地方吗？”"
 antarctica_aaa_op90prep.530.a:0 "莱亚尔微微一笑，回道：“其实，关键是要找到一位技术高超、意志坚定的飞行员。”"
 antarctica_aaa_op90prep.540.t:0 "海军少将"
 antarctica_aaa_op90prep.540.desc:0 "奥莱扎中校坐在一架没有配备任何武器的DHC-2“海狸”飞机的驾驶舱中，眺望着冰海与远处的天际线。这一型号的水上飞机已经成为了阿根廷南极空军的标配，它可以在几乎所有积雪覆盖的机场、乃至浮冰密布的海湾中执行短距离起降。现在正是夏季，冰层融化，南极浅海清澈见底。\n\n虽然今天是个欣赏风景的好日子，但奥莱扎还有重要的工作要做。按照莱亚尔上校的通报，一支美国舰队闯进了阿根廷南极属地的沿岸水域，并且还故意沿着帕默群岛划出了一条长长的航线。\n\n奥莱扎回忆着自己接到的命令。“我可算是让海军听了一回话，”莱亚尔说道，“他们正在撤退。看来他们还没蠢到胆敢挑战美国人的地步，但我希望咱这边能有个人盯着。”\n\n猛烈的逆风吹拂着海狸小小的机身，奥莱扎悄悄抵近，看到了一面飘扬在巡洋舰舰艏的海军少将旗，可能是代表驻留于麦克默多站的美国海军里迪少将。他和奥莱扎一样，也是一名飞行员，是第一位完成从南非开普敦起飞、抵达罗斯岛麦克默多站这一南极飞行壮举的勇士。\n\n奥莱扎心想道，还好海军没失心疯，否则事情可就大条了。就他当下的观察，美国舰队正在驶离阿根廷领海，他决定再跟踪一个小时，然后就飞回基地。"
 antarctica_aaa_op90prep.540.a:0 "万幸，今日无事。"
 antarctica_aaa_op90prep.540.a.tt:0 "我们将获得针对$Antarctica_GUI_AAO_Name$的§B4情报掌握度§!£Antarctica_texticon_INTVAL 。"
 antarctica_aaa_op90prep.550.t:0 "求援"
 antarctica_aaa_op90prep.550.desc:0 "“长官，萨瓦拉少尉奉命前来报到。”少尉在莱亚尔上校的办公桌前立正敬礼。\n\n“少尉，稍息，请坐吧。”莱亚尔伸手示意，萨瓦拉依言坐了下来。\n\n莱亚尔将一份新收到的电报递给了萨瓦拉，后者快速地翻阅了一遍。正如他和普哈托准将所料，意大利人遇上麻烦了，他们希望阿根廷能帮自己度过这段困难的季节。\n\n话虽如此，但现在意大利人手上能用来做交换的筹码少之又少，只有托里西上将在来到加林德斯岛的路上收集到的老旧武器和极为有限的智利舰队情报。\n\n“少尉，你经手了加林德斯岛移交的全程，我想听听你的意见，要不要拉意大利人一把？”莱亚尔问道。\n\n萨瓦拉毫不犹豫地回答道：“毫无疑问，意大利人需要一切可能的帮助，枪支是他们在南极唯一富余的物资。我只是担心这可能不是笔对等的交易，除非您将意大利的感激也算作收获的一部分。”\n\n莱亚尔略作沉思，对少尉说道："
 antarctica_aaa_op90prep.550.a:0 "“其实我还真觉得意大利的感激挺不错的。少尉，就这么定下来吧。”"
 antarctica_aaa_op90prep.550.a.tt:0 "§n意大利人§!会铭记于心。"
 antarctica_aaa_op90prep.550.b:0 "“意大利人必须得自己学到教训，不然他们在这儿就活不下去。”"
 antarctica_aaa_op90prep.550.b.tt:0 "§n意大利人§!会铭记于心。"
 antarctica_aaa_op90prep.560.t:0 "计划有变"
 antarctica_aaa_op90prep.560.desc:0 "虽然南纬90行动极点突击队的队员们都是娴熟的滑雪能手，就像所有南极探险家们一样，但莱亚尔认为，这项必备技能必须要融进所有人的骨子里，为此再多的训练也不多。“雪地车抛锚、雪橇犬也都不在的时候，”莱亚尔说着，举起了一对滑雪板，“我们就只剩下这个，”他又指了指所有人，“还有我们彼此了。滑雪板要成为我们身体的延伸，我们要和它们一起训练，直到出发前的最后一刻。每天都至少要练习一个小时，今天我们练人力拖拽。”\n\n人力拖拽，这是所有南极探险家们最后的手段。斯科特没有意识到这一点，他以为拖拽雪橇不是什么费力活儿，他们手握缰绳、拉着雪橇上的物资和坐在上面的人员，顶风冒雪地走过了几千公里的路程。南极大陆毫无怜悯地抹杀了他们。\n\n而相比之下，如果狗拉雪橇队没能完成探险任务，阿蒙森就会用人拉雪橇的方式惩罚他们。莱亚尔也打算效仿阿蒙森，他希望人力拖拽雪橇的训练经历能激励队员们，保证雪地车和狗拉雪橇万无一失。\n\n就在队员们刚刚开始弯下腰拖拽雪橇时，一名衣冠不整的通讯兵急匆匆地从埃斯佩兰萨站通讯大楼里跑了出来，疯狂地挥舞着手中的纸张。“上校！”他高喊道，“上校！海军……海军他们来了。”\n\n“啊？”莱亚尔担心着自己接下来会听到些什么，“还有呢？”\n\n通讯兵平复了一下呼吸，将手中的文件递给了莱亚尔：“长官，不是补给船队，是一支军舰舰队。”\n\n莱亚尔念出了发报人的姓名："
 antarctica_aaa_op90prep.560.a:0 "埃米利奥·爱德华多·马塞拉海军上校。"
 antarctica_aaa_op90prep.570.t:0 "马塞拉"
 antarctica_aaa_op90prep.570.desc:0 "莱亚尔匆匆赶回埃斯佩兰萨站总部，命令所有军官立刻进入高级戒备。海军这次到访突如其来，完全没有任何风声，考虑到他们过去挑起的事端，莱亚尔不愿意冒哪怕一丝一毫的风险。\n\n时至如今，海军已经愈发肆无忌惮地在物资补给方面上下其手，意图将阿根廷南极属地置于危险境地之中。虽说海军还远远没到对同胞举枪相向的地步，但考虑到国内日益紧张恶化的局势，谁也没法百分之百打包票。\n\n莱亚尔尽可能在这短短的时间里把自己打扮得得体些，然后迈步走出总部，搭上雪地车，飞驰到了码头旁。\n\n一艘巡洋舰开足马力，舰艏破开了海湾中冻结的海冰。在浅滩之外，巡洋舰上放下了一艘小艇，一名军官和他的随从驶向岸边。\n\n莱亚尔辨认出了这艘船的舰名：布朗海军上将号重巡洋舰，曾经参加过斯尼佩岛之战时对智利领地的攻击。\n\n小艇在码头边停泊下来，一行人踏上了陆地，莱亚尔认出，军官肩上挂着海军上校的军衔。\n\n海湾刮来的狂风、浪花猛烈的拍击、寒冷的迷蒙海雾似乎都对他没有任何影响，海军上校走到防波堤的尽头，踏上了莱亚尔所在的平台。\n\n莱亚尔陡然发觉，他面前的身影，正是埃米利奥·马塞拉。"
 antarctica_aaa_op90prep.570.a:0 "“我们有很多事情要讨论，上校。”马塞拉冷冰冰地说道。"
 antarctica_aaa_op90prep.580.t:0 "晚宴来宾"
 antarctica_aaa_op90prep.580.desc:0 "也许胡安·卡洛斯·贝尔特拉米诺并不完全理解刻板的军事礼节，但今晚，他却为此感到庆幸。他在餐厅一张桌子的最边缘落座，吃着准备好的晚餐。\n\n贝尔特拉米诺知道莱亚尔上校认为海军毫无荣誉感可言，而他对此感同身受。海军就是一群军装暴徒，整日沉溺于暴力，从不管会有多少无辜者要为他们的虚荣付出牺牲。尽管如此，莱亚尔还是邀请了马塞拉和舰队的军官们共进晚餐。\n\n阿根廷陆军和空军的军官在桌子的一边落座，而海军军官坐在另一边，马塞拉坐在桌首，莱亚尔则坐在他的右边。闲聊的话语透过紧咬的下巴和绷紧的嘴唇传出，刺眼的目光则相互上下打量着对方。\n\n在此之前，贝尔特拉米诺一直希望，甚至祈祷着莱亚尔能与海军和睦相处，或者是海军的某个军官能尝试与阿根廷南极研究所和解。\n\n然而，看到莱亚尔与马塞拉开始交谈时，和平的希望破灭了。他虽然不清楚两人在说什么，但肯定不是什么友善之语。\n\n莱亚尔很好地隐藏了自己的情绪，但贝尔特拉米诺很清楚，他现在非常愤怒。不管马塞拉说了些什么，这对阿根廷南极属地来说都是个坏兆头。此刻马塞拉海军上校起身祝酒，打断了贝尔特拉米诺的沉思。"
 antarctica_aaa_op90prep.580.a:0 "“为强大而独立的阿根廷南极属地干杯。”"
 antarctica_aaa_op90prep.590.t:0 "亲爱的古斯塔沃"
 antarctica_aaa_op90prep.590.desc:0 "我们有麻烦了。\n\n昨天，埃米利奥·马塞拉海军上校率领一支小舰队来到了埃斯佩兰萨站。按照海军调令，他将在南极担任布朗海军上将号分遣舰队的指挥官，并且我得告诉你，这个男人让我害怕。\n\n我悄悄打听了他的服役经历。这个人是在庇隆政府时期升到上校的，但此后就再打听不到了。不过我听说了一个传闻，在与土耳其的战争中，他曾经抢劫过商船，海员全数被他杀害，令人不寒而栗的流言，但我无法证实。\n\n然而，在仅仅与这个男人说了几分钟话之后，我就相信了。他毫不掩饰对我们探险的蔑视，甚至还认为，不对智利人开战动武就是我们的失职。\n\n温克岛上发生的事情已经证明了，假如没人能管住海军，他们会是多么冷酷嗜血。而在马塞拉这样的人手底下，这样的事甚至有可能会变得司空见惯。我会尽我所能，将他的影响力牢牢限制在布朗站里。\n\n而我要同你说的事情，古斯塔沃，我们必须要加快南纬90行动的准备工作了，贝尔格拉诺基地将优先获得额外的补给。极点突击的计划时间表提前，我们十月底就出发，希望能在年底前就到达极点。\n\n将国旗插在南极点，这将会向政府、人民、甚至军队证明阿根廷南极研究所的价值。\n\n即使没能赢取军方支持，我们的地位也能借此而变得不可动摇，希望这能为我们赢得时间，腾出手来对付海军和马塞拉。"
 antarctica_aaa_op90prep.590.a:0 "您的朋友，豪尔赫。"
 antarctica_aaa_op90prep.600.t:0 "南纬81°04'05\"、西经40°36'01\""
 antarctica_aaa_op90prep.600.desc:0 "雪地车队在冰面上疾驰。古斯塔沃·希罗上尉驾驶着其中一辆，阿尔弗雷多·弗洛伦西奥·佩雷斯三级军士长则坐在他的副驾驶位置上。奥莱扎的海狸侦察机在地面小组协助下，找到了一条穿越大裂谷的路线。自一月中旬以来，希罗和他的团队已经将数百吨建材、设备和物资补给运进了内陆，并且沿着通向极点的道路留下了隐蔽的标记和贮藏点。这项任务原本计划需要耗时两年，但希罗团队只用三个月就出色地完成了任务。\n\n南极洲的冰层会随着季节变化而变化，曾经稳定的冰层在第二年就可能会变得岌岌可危。在勘察过程中，他们已经损失了一辆雪地车和几条雪橇犬。\n\n希罗的心思本该放在任务上、放在前往南纬81°04'05\"、西经40°36'01\"的四百二十公里路程上，这个坐标点还没有名字，但已被确定适合建立前往极点中途的补给休息站。然而，莱亚尔上校寄来的那封有关埃斯佩兰萨站不速之客的信却久久萦绕在他的脑海中。希罗同意莱亚尔的看法，海军已经从麻烦变成了潜在的敌人，威胁着阿根廷南极属地的和平祈望。\n\n希罗也同意将南纬90行动的启动日期提前到十月下旬，但这并不完全是出于政治原因。随着时间推移，他在贝尔格拉诺基地和内陆补给点之间留下的标记就会随着冰层的移动而移动，这意味着他们明年还得花更多的工夫寻找一条穿越大裂谷的新路线，而时间就是当下希罗、莱亚尔和阿根廷南极研究所最缺的东西。\n\n“长官，马上就要到预定坐标点了。”佩雷斯比对着地图和指南针，报告道，“再过一分钟就到了。我们该怎么称呼这个地方？”\n\n“用第一个在南极洲越冬的阿根廷人的名字命名：何塞·马里亚·索夫拉尔。”"
 antarctica_aaa_op90prep.600.a:0 "“简称索夫拉尔基地。”"
 antarctica_aaa_op90prep.600.a.tt:0 "§W佩德罗·安赫尔·阿科斯塔少尉§!、§W阿尔弗雷多·弗洛伦西奥·佩雷斯三级军士长§!、§W乌戈·奥兰多·布里托斯上士§!已加入§O南纬90行动§!§Y人员名单§!。"
 antarctica_aaa_op90prep.610.t:0 "冗余"
 antarctica_aaa_op90prep.610.desc:0 "奥莱扎中校总是会定期亲自检查埃斯佩兰萨站的飞机，看看有没有出现任何疲劳或者老化的迹象。这并不是因为他信不过机械师，恰恰相反，他们都十分称职，只是奥莱扎的经验更丰富，他知道飞机在南极会经受怎样严酷的考验。有时，他能察觉到机械师团队没能发现的隐患，就像是医生常常能在肿瘤恶化成癌症之前就直击病灶。\n\n现在，他正在检查计划于未来几周内飞往贝尔格拉诺站的飞机，南纬90行动的空中侦察行动范围正在渐渐扩大。当他绕机目视检查到又一架海狸飞机时，一道熟悉的话音打断了他的工作：\n\n“有空吗？”\n\n奥莱扎转过身来，看到莱亚尔上校正在机库门口闲逛。现在已经是午后时分，大多数机组人员今天的工作都已经结束了。“当然，”奥莱扎回答道，“什么事情，长官？”\n\n莱亚尔走近，脸上浮现出一丝惊讶，接着问道：“机队情况怎么样？”\n\n“目前为止很好，完全能胜任帮你们找路的职责。”\n\n“好……太好了。”莱亚尔研究了一下身旁的海狸，把手搭在了机翼上，开口说道，“我有个任务要交给你，但相比起南纬90行动只是次要事项，只有在你手头有空闲时间和资源的时候再酌情考虑执行。”\n\n奥莱扎挑了挑眉毛，特殊任务他可不陌生。\n\n“我想在南极洲建立一处更大、辐射范围更广的机场，能支持更大型飞机的起降，还可以充当我们所有基地和前哨站的后勤枢纽中心。”\n\n奥莱扎饶有兴趣地说道：“作为次要任务，这目标可不算小啊。”\n\n莱亚尔点了点头，“所以我才说，只有在时间和资源允许的情况下。”他重复强调道，转身向机库大门走去。一向善于体察人心的奥莱扎思考着各种其中的原因。"
 antarctica_aaa_op90prep.610.a:0 "莱亚尔是否预见到补给会在未来出问题？"
 antarctica_aaa_op90prep.620.t:0 "人群中的孤独"
 antarctica_aaa_op90prep.620.desc:0 "在卢戈·帕斯卡尔的一生中，他从未感到过如此地孤独。自从温克岛上那件事以来，他就已经与其他海员剥离开来了，他们仍然在一起，但帕斯卡尔再也不是他们中的一员了。要是其他人知道他把温克岛上的流血事件偷偷告诉了普哈托，他大概也会和那两个智利人一样葬身海底。他仍然时时面带微笑，尽职尽责，但他再也不是战友了。\n\n这些天来，空气中弥漫着紧张的气氛，但是这与温克岛无关。战舰上从来就没秘密，即使所有人都守口如瓶，军官的一次眼神交流、四处张望的目光也足以将战舰上的许多事情诉之于人。而现在，帕斯卡尔知道，罗萨里奥号马上就要启航了。\n\n这让帕斯卡尔紧张不已。普哈托就像是他的父亲，也是现在他唯一能信任的人。他害怕离开圣马丁站，因为这就意味着离开普哈托，也意味着死亡威胁的步步逼近。当流言终于传到帕斯卡尔耳边时，他感觉自己的心都要碎了。\n\n“你听说了吗？”船员们在厨房里窃窃私语。“没有，你听说什么了？”\n\n“我们要划拨到布朗海军上将号分遣舰队，从这里调离到布朗站驻扎。”\n\n“不止这些，上面还派了个新上校来负责，叫埃米利奥·马塞拉。据说他打定主意要和智利人决一死战，还有那个懦夫莱亚尔。”\n\n流言蜚语就像是沸水中不断翻涌的气泡，一天比一天更多，直到所有的船员都染上了仇恨的水汽。帕斯卡尔不想发动战争，他只想保卫阿根廷和自己的家人。"
 antarctica_aaa_op90prep.620.a:0 "他祈祷着，希望自己不是唯一一个这么想的人。"
 antarctica_aaa_op90prep.630.t:0 "预期之外的回访"
 antarctica_aaa_op90prep.630.desc:0 "“没想到这么快就又来了一次加林德斯岛。”萨瓦拉少尉在走下运输机时喃喃自语。他和部下没有浪费时间，立刻就将物资都搬下来，交给了意大利人。理论上说，萨瓦拉还希望意大利士兵能来搭把手，但看到他们都个个精疲力尽、浑身冰冷、营养不良、手上除了挂满冰凌的步枪之外啥都没有的悲惨模样，想了想还是算了吧。托里西上将将萨瓦拉请进了办公室，不出意料，这里是加林德斯岛上唯一还没有被颓废气息彻底笼罩的地方了。\n\n“请坐吧，少尉。要喝点什么吗？”托里西招呼道。\n\n“不必了，上将，谢谢您。能来送物资我就很高兴了。”\n\n“我代表部下表示感谢，我会好好规划贵方这批援助物资的使用。现在，我还想谈谈双方之间的交换，”萨瓦拉少尉想要开口，但他知道托里西上将马上就要说到正题了。上将拿起威士忌酒杯轻抿一口，略作思考，接着说道：“我知道，这笔交易……并不对等，我们要在未来偿还这份人情。”\n\n“上将，您真是位精明的人，莫非您已经想到要如何回报了吗？”萨瓦拉问道。\n\n托里西叹了口气，回答道：“据我所知，你的上级正准备要……”上将斟酌了一下措辞，“要留下属于他的印记，应该是这么说的吧。不管怎么说吧，总之莱亚尔上校应该要离开他的指挥部很长一段时间。任何人都有可能试图争夺他的职位，甚至企图给他的探险使绊子。”托里西上将抬起头，盯着对面在椅子上略显坐立不安的萨瓦拉，下定了决心，说道，“请转告上校，不管是谁想趁着他不在的时候搞事情，我们都不会坐视不理。”"
 antarctica_aaa_op90prep.630.a:0 "交换与回报。"
 antarctica_aaa_op90prep.640.t:0 "机遇已失"
 antarctica_aaa_op90prep.640.desc:0 "托里西上将请求的补给已经被莱亚尔上校拖延了一周。尽管萨瓦拉少尉一再反对，但他最终还是被迫放弃，拒绝向意大利人提供急需的援助。\n\n托里西上将叹了口气，加林德斯岛上的大雨连绵不绝。如今，岛上的一切都已经被雨水浸透了——即使是他那间处于这座岛屿最高处的办公室也开始漏水。然而，意大利在南极洲无休止的苦难即将有所好转，尽管并非举足轻重。一名年轻士兵走进他的办公室，报告说有一艘阿根廷船只停靠在港口。它正在卸载补给品。莱亚尔上校终于回心转意了吗？托里西上将好奇地把船长请进了办公室。\n\n“所以，我猜莱亚尔上校还是改变主意了？”托里西上将说。\n\n马塞拉海军上校则笑着回应他：“我看他倒没那么好心。我只是代表海军行事。我也希望事情并非如此，但恐怕莱亚尔上校已经把对你们的援助请求置之不理。我们参与进来是因为陆军那边没有对他们的新邻居互帮互助。”\n\n托里西点点头，他对这种伎俩再熟悉不过了：“我明白了。那我就直说了。我不知道海军部有什么打算，但无论你决定在莱亚尔搞他的小探险时做什么小动作，我们都会睁一只眼闭一只眼。如果你们继续提供补给，我们可能还会做点更多事。”\n\n马塞拉笑道：“我明白了。我的船员们会很高兴听到这个消息的。恐怕我得走了，但我很高兴我们有机会……达成谅解。”\n\n马塞拉向托里西伸出了手，两位海军互相握手。"
 antarctica_aaa_op90prep.640.a:0 "失去盟友便是平添仇敌。"
 antarctica_aaa_op90prep.650.t:0 "巡察"
 antarctica_aaa_op90prep.650.desc:0 "一百四十五名水手迎着冰冷的空气，站在了罗萨里奥号的甲板上，正等待着他们的新指挥官登船。格外引人瞩目的埃米利奥·马塞拉海军上校自布朗站的码头走上跳板。几日以来，各式各样的船只加入了布朗海军上将号分遣舰队，马塞拉的势力正不断庞大着。\n\n卢戈·帕斯卡尔二等水兵在又一阵寒风吹来时咬紧了牙关。对舰船的检查必须要一丝不苟地进行。马塞拉要求检查船上的每一门炮、每一个焊缝和螺栓、每一根桅杆……显然他打算将自己所有的物资列个清单盘点一下。罗萨里奥号上的水手们平日里自然为此怨声载道，但在面对如此严寒时却坚毅不屈，这是对他们新指挥官的尊重，甚至是钦佩。\n\n有些在船上的流言称马塞拉在意土战争期间曾多次成功地发动进攻，打击敌人的海上贸易线，并将劫掠来的战利品慷慨地分给船员。有些人会欣赏这样一位渴望分享战利品的老海盗船长，但更多的人似乎被马塞拉喜欢进攻的性格所吸引。\n\n马塞拉沿着队伍走了一圈，检查了每个水手，然后向他们敬礼，并与他们紧紧握手。当他走到帕斯卡尔面前时，卢戈从马塞拉的眼神中看出了一些端倪。"
 antarctica_aaa_op90prep.650.a:0 "某种饥饿且嗜血的神情藏在他的眼底。"
 antarctica_aaa_op90prep.660.t:0 "丢失的货物"
 antarctica_aaa_op90prep.660.desc:0 "在南极洲，一次成功的探险和定居离不开一个又一个备用计划。设想中最糟糕的情况往往也是最现实的状况，人们必须为这片大陆上的极端天气做好准备。\n\n撤离路线、油料库，应急口粮……这些都是必须提前准备好的。就连二级避难所都得纳入考虑范围。室内有大量的个人取暖器与便携燃气灶，意外起火因此在南极洲司空见惯，干燥的气候也让扑灭大火变得极为困难。\n\n火灾已经是莱亚尔想象中最容易解决的麻烦了。\n\n然而现在，正如普哈托所说的那样，最为糟糕的状况来了。海军并没有按时交割为南纬90行动准备的补给。他们甚至连个借口都懒得找，无线电静默是那天唯一的消息。尽管今天的这批补给对埃斯佩兰萨站的运行无关紧要，但它将会极大地妨碍他们为了加快向极点探索而做的一切准备工作。\n\n莱亚尔面临着困境。埃斯佩兰萨站的一座紧急避难所内的确有些应急补给：马丁·圭梅斯将军二号避难所。在第一座避难所被冰雪所吞噬后，是莱亚尔自己下令建筑的这座新避难所。他能够动用这里的补给，以为行动换取更好的准备与机会，但当南极洲出现其他危机时，埃斯佩兰萨站也将会陷入危险之中。"
 antarctica_aaa_op90prep.660.a:0 "现在，我们的未来取决于这场行动的成功与否。我们要破釜沉舟，打开补给。"
 antarctica_aaa_op90prep.660.a.tt:0 "我们将获得§W12补给§! £Antarctica_texticon_SUP 。"
 antarctica_aaa_op90prep.660.b:0 "避难所的存在便有着它的原因。危害到埃斯佩兰萨站是不负责任的行为，补给还是留在那吧。"
 antarctica_aaa_op90prep.660.b.tt:0 "我们将获得§G5宣称点数§!£Antarctica_texticon_LEG 。"
 antarctica_aaa_op90prep.670.t:0 "无望之冬"
 antarctica_aaa_op90prep.670.desc:0 "普哈托准将正阅读着解密的无线电传输明文。他与莱亚尔搞出了一套加密系统，能在海军的眼皮底下建立起圣马丁站和埃斯佩兰萨站间的通讯。\n\n“他妈的国贼。”当海军对他那侮辱的字眼进入普哈托的视线时，他小声嘀咕着。首先是温克岛的破事，之后又是圣马丁站的海军分遣队开走了最后一艘船，埃斯佩兰萨站望眼欲穿的补给到现在都没来。\n\n普哈托也认为他们不太可能在夏天给圣马丁站运来什么物资，海军已经抛弃了他们在陆地上的同胞。\n\n他将信纸点燃，走出通讯室，步入了黑暗的南极夜色。他在这个地方度过了许多个冬季，但他担心这可能是最糟糕的一个。海上的补给遥遥无期，空投的补给又数目有限，圣马丁站及其中所有的人员只能依靠现有的补给过活。\n\n如今，普哈托面临着所有南极探险家必须做出的最痛苦的选择：是否减少配给。\n\n减少热量摄入意味着人们将只能进行更低限度的作业，但在夏天到来时，省下的补给能让后勤问题的解决方式更加灵活；另一方面，维持充足的口粮配给能够保证与敌人战斗的能力，而南极洲上永远不缺大乱斗。"
 antarctica_aaa_op90prep.670.a:0 "太多太多的南极探险家们都因未能及时削减口粮而死，口粮配给减半吧。"
 antarctica_aaa_op90prep.670.a.tt:0 "我们将获得§W10补给§! £Antarctica_texticon_SUP 。"
 antarctica_aaa_op90prep.670.b:0 "与他国的潜在冲突是个极大的威胁，我们的人员需要保持足够精力应对，保持口粮定额不变。"
 antarctica_aaa_op90prep.670.b.tt:0 "我们将失去§W10补给§!£Antarctica_texticon_SUP 。\n我们将获得§R5军事点数§!£Antarctica_texticon_MIL 。"
 antarctica_aaa_op90prep.680.t:0 "贝尔格拉诺基地之下"
 antarctica_aaa_op90prep.680.desc:0 "“什么？”奥莱扎盯着希罗，惊讶地问道。\n\n希罗又读了一遍手头的电报：“海军没有送来补给，也没有回应任何通讯，我们必须要假设海军已经决定与我们敌对，冲突爆发的可能性正不断攀升。南纬90行动按计划进行。”\n\n陡然之间，奥莱扎想通了过去几周里发生的一切事情。莱亚尔要求他暗中侦察新机场选址，这也是为了摆脱对海军的依赖。\n\n“至少没人再装模做样了，也挺好的。”希罗坐在奥莱扎对面，开口说道。\n\n“你都知道？”\n\n“我只是知道个大概，但我没想到海军这么快就会动手。”\n\n“你觉得会怎么样？”\n\n希罗抬头看了看贝尔格拉诺站地下隧道的天花板，回答道：“海军已经摩拳擦掌好久了，迫不及待地想和智利人干一场，但我觉得智利人很聪明，不会轻易给他们这个机会的。他们应该直到最后一刻才会对海军的行动做出回击，最终……”希罗长叹一声，沉思着说道，“这都不重要了。海军想要战争，不管怎样，都已经无法避免了。”\n\n“那么……”奥莱扎迟疑地问道，“行动……还继续吗？”\n\n希罗看着空军中校的眼睛，说道：“你也看到老板的命令了。行动仍将继续，因为很简单，不论我们是失败还是放弃，海军都会彻底在政治上压倒我们，将我们赶出这里，甚至更糟。”"
 antarctica_aaa_op90prep.680.a:0 "“阿根廷南极研究所就靠我们了，我们是唯一能抗衡海军的力量。”"
 antarctica_aaa_op90prep.690.t:0 "布朗海军上将号"
 antarctica_aaa_op90prep.690.desc:0 "在大航海时代，最成功的船长常常也是打着“合法”旗号的海盗。如果你是一名船长，在辽阔的公海上为国家利益而战，那么你的话就是法律。船长就是座舰的上帝，唯有他自己的道德准则才是最重要的。他们无情地追逐敌人的海上贸易航道、处决海员、竭尽所能地掠夺战利品甚至俘虏敌船，这就是大航海时代扬名立万的法门。时至现代，这种行为却为弱者所不齿，埃米利奥·马塞拉海军上校对此深感遗憾。\n\n上校此时难得空闲，他正独自在布朗海军上将号的甲板上散步。大多数海员都在布朗站享受着马塞拉出钱举办的派对，但对有些人而言，这可能就是他们人生中的最后一次酒席了。\n\n他脚下的这艘重巡洋舰排水量达到一万吨，于1927年在意大利完工。二战时，阿根廷在全世界纷飞的战火中袖手旁观，因此她并没有经历任何战火硝烟。1958年的斯尼佩岛之战是这艘船首次参加战斗，她与她的姊妹舰迅速行动，吞并了属于智利的领地，但在智利的梅里诺海军上校面前遭遇重创，不得不进行大规模维修。\n\n马塞拉沿着前甲板踱步，他的身旁是三门双联装7.5英寸舰炮，足以粉碎水上乃至陆地上的一切防御。博福斯防空炮一字排开，抵御智利南极领地可能拥有的固定翼飞机。\n\n马塞拉停下脚步，凝望着南极的夜色。他还在适应这个地方，对他的愿望而言，南极大陆的偏远既是福也是祸。他很庆幸布朗号升级了水上飞机弹射器，在这片渺无人迹的荒原上，侦察是必不可少的。"
 antarctica_aaa_op90prep.690.a:0 "明日，冰海血红。"
 antarctica_aaa_op90prep.700.t:0 "出航"
 antarctica_aaa_op90prep.700.desc:0 "船上的警报声惊醒了卢戈·帕斯卡尔二等水兵的浅眠，他听到下铺的同伴们急匆匆地跳下小床，用最快的速度穿好衣服。一个人抓住了他的内衣，把他从床上拽了起来。“快！”那人喊道，“我们要出发了！”\n\n现实终于击碎了最后一丝睡意，帕斯卡尔伸腿跳下床，急忙套上水兵服。在古旧警报器的难听蜂鸣声中，所有人都冲向自己的岗位。帕斯卡尔穿过狭窄潮湿的走廊，挤开反方向拥挤的人流，一头扎进了南极冬季肆虐的寒风中。另一名水兵递给他一件救生衣。\n\n越过海湾，他望见布朗海军上将号分遣舰队正在全速前进，与它同名的战舰在冰海中劈波斩浪。他们仍然困在浮冰之中，马塞拉到底要带我们去什么鬼地方？帕斯卡尔不禁疑惑着。\n\n炸药在冰面上爆炸的巨响解答了他的疑惑，雪白的碎冰滚滚而来，在受困船只的周围荡起层层冰浪。所有海员都屏息凝神，注视着布朗海军上将号。突然之间，这艘重巡洋舰猛地一冲，闯出了困住她的牢笼。整支舰队瞬间爆发出一阵欢呼，众人的声音聚集在一起，仿若直抵天穹之上的绚烂极光。破冰船驶在船队的最前列，担负起了清理冰层的艰巨任务。\n\n帕斯卡尔茫然地走到罗萨里奥号两门舰炮的一处炮位上。“就是这样，卢戈！”他的战友兴奋地对他喊道，“我们终于能干掉智利人了！”\n\n帕斯卡尔感到头皮一阵发麻。寒风裹挟着他的命运，无处可逃。"
 antarctica_aaa_op90prep.700.a:0 "舰队融入黑夜，马塞拉的豪赌开始了。"
 antarctica_aaa_op90prep.710.t:0 "冰海之中"
 antarctica_aaa_op90prep.710.desc:0 "这次从布朗站出发的航程是卢戈·帕斯卡尔二等水兵一辈子最紧张的日子。他曾经在波涛汹涌的大海上和五十英尺高的浪头搏斗，但那段经历依旧比不上如今在南极浮冰中小心翼翼、一步一停来得提心吊胆。\n\n破冰船一马当先，全速冲破冰层，为舰队开出一条航道。\n\n布朗海军上将号则紧随其后，其他小船跟在后面。所有舰船都专门针对浮冰进行了加固，增加了肋材的数目，加厚了船壳，并且还在水线上下一米左右的位置加装了防冰带。\n\n然而，即便专门进行了极地改造，罗萨里奥号也依然显得老态龙钟，毕竟它本身就是一艘内河炮舰，而不是设计用以在严冬穿越南极冰封海域的大船。冰块的每一次撞击和颠簸，帕斯卡尔都能感受得清清楚楚，哪怕是再小的一块浮冰，都能把罗萨里奥号撞得浑身发颤。\n\n但是，其他船员似乎都没有他这样的担忧。布朗号上指挥官的胆识鼓舞着他们，只要跟随他的脚步，阿根廷海军所向无敌。"
 antarctica_aaa_op90prep.710.a:0 "帕斯卡尔心想，要是我们被冻住，或者沉下去，他们的想法就该不一样了……"
 antarctica_aaa_op90prep.720.t:0 "受困"
 antarctica_aaa_op90prep.720.desc:0 "船壳被挤压时发出的呻吟声正在渐渐逼疯罗萨里奥号上所有的船员。他们已经被海冰困住好几天了，并且仍然没有任何能够脱困的迹象。马塞拉不顾浮冰专家的警告，带领舰队横冲直撞，一头扎进了条件最恶劣的海区。航线已经彻底闭合，无论怎么挣扎都无法脱困了。\n\n船员们只能等待，祈祷封冻能因为天气的变化而渐渐好转。但时间渐渐流逝，冬季正在来临，冰层只会变得越来越厚，直到最终，海冰会将船只压成碎片。\n\n最先遭遇厄运的会是像罗萨里奥号这样的老旧船只，它们并非专为极地海况而设计建造。但同样，哪怕是布朗海军上将号这样雄伟的重巡洋舰，如果被困时间过长，也会像铁皮罐头一样被压扁揉碎。除了浮冰的挤压之外，还有另一样危险，那就是浮冰本身也会四处漂浮迁移，使得舰船四散开来，失去联系。船上携带的食物和燃料也不是无穷无尽的，不足以支撑他们在这里度过整个冬天。\n\n马塞拉和他手底下的指挥官们派出了不少小分队，让他们用手工工具锯开冰层，或者试图用炸药开出一条航道，每次爆炸响起时，船壳都会随之发出一阵令人牙酸的震动。现在看来，似乎没有什么能帮助这支迷途舰队救出南极的手掌心。\n\n帕斯卡尔躺在铺位上，但他的内心十分清醒，罗萨里奥号的凄厉嚎叫仿佛是一头曾经威风凛凛的野兽在临死前的嘶吼。真是讽刺，马塞拉率领舰队出海，想要打智利人一个出其不意，但甚至不用敌人出手，南极洲就已经让他撞了个头破血流。"
 antarctica_aaa_op90prep.720.a:0 "放逐大陆从不关心人类的阴谋诡计。"
 antarctica_aaa_op90prep.730.t:0 "冷酷的倒影"
 antarctica_aaa_op90prep.730.desc:0 "马塞拉已经认不出面前镜子里的人了：头发凌乱、胡须不整、眼睛里血丝密布、脸颊上的冻伤疤痕，但这些都不是最重要的，最重要的是他在倒影的瞳孔中看到了满溢而出的恐惧，那是船舱外的世界带来的恐惧。他的舰队已经被困在冰层里好几天……不，好几个星期了。马塞拉算到了所有可能的敌人，却独独漏掉了最显而易见的一位——南极洲。大自然已经开始显现自己的伟力，用浮冰困住了海军上校的舰船，其中有几艘已经彻底失去了踪迹，它们是被带到了地平线之外，还是已然被慢慢挤碎、沉进深海，谁也说不清楚。这就像是一场战役，只不过比人类的战斗还要缓慢一千倍，而海冰正在慢慢占得上风。有人敲响了舱门。马塞拉说道：“进来。”\n\n一名脸上满是冻疮的海冰专家走了进来。在过去这段时间，他们日夜不停地寻找着航道，试图找到可供战舰破开的冰层缝隙。“上校，我们找到了一条航路，离我们现在的位置不到一公里，甚至足以让布朗海军上将号也穿过去……”他迟疑着停了下来。\n\n“还有呢？”马塞拉问道。\n\n“只有布朗海军上将号、罗萨里奥号、和找到这条航路的破冰船圣马丁号才能开到那里。其他舰船离航道太远了，受困的冰层也比我们这里更厚，他们的动力甚至都不足以挣脱冰层，更何况那条航路正在封冻，他们不可能在海冰合拢之前赶到的。”\n\n“所以……我们会损失一艘驱逐舰、两艘护卫舰、两艘破冰船、还有一艘燃料船。”显然，马塞拉已经无法用原本计划中的兵力对付智利人，但是……出其不意的效果仍然还在。汉尼拔·巴卡在翻越阿尔卑斯山的途中也损失了许多战象和士卒，但他不是依旧赢得了伟大的胜利吗？"
 antarctica_aaa_op90prep.730.a:0 "“下令圣马丁号和罗萨里奥号破开航道，”马塞拉说道，“其他船只能自求多福了。”"
 antarctica_aaa_op90prep.740.t:0 "进攻计划"
 antarctica_aaa_op90prep.740.desc:0 "卢戈·帕斯卡尔二等水兵挤在罗萨里奥号的船员宿舍里。归功于上天的意志和地狱般的交易，马塞拉带着仅存的舰队破开海冰，抵达了阿德莱德岛。这次航行对船壳造成了可怕的破坏，每个人都能清楚地看见冰层应力留下的伤疤与凹痕。所有船员都能隐约感觉到，这就是罗萨里奥号的最后一次任务了。\n\n即使是平时，船员宿舍也相当拥挤，现在这里甚至还挤进了即将进攻阿德莱德岛的陆战队员。他们和海员聚集在一起，聆听马塞拉的攻击计划。他从布朗海军上将号上赶来，亲自向麾下训话，以保证所有人都对他的命令清清楚楚。\n\n“攻击将由布朗海军上将号打响。它会首先进入炮击阿德莱德站的发射阵位，瘫痪可能存在的陆上防御体系。然后，舰队会派出格鲁曼水上飞机，攻击智利人的无线电设施，切断他们和外界的联络。\n\n“随后攻击进入第二阶段的突破，士兵们。阿德莱德岛周围的浮冰中间遍布航道，甚至还有几条完全没有海冰挡路。圣马丁号将强行突破向阿德莱德站，罗萨里奥号紧跟在后面，把陆战队员送上海岸。罗萨里奥号负责火力掩护，携带无线电的登陆人员负责为布朗海军上将号提供炮击坐标。\n\n“今天之后，这个岛屿就将属于阿根廷。”"
 antarctica_aaa_op90prep.740.a:0 "帕斯卡尔不知道自己冻伤的手指还能不能划船、能不能握得住枪。"
 antarctica_aaa_op90prep.750.t:0 "轰炸"
 antarctica_aaa_op90prep.750.desc:0 "拉莫斯一等兵紧握着格鲁曼水上飞机的操纵杆，等待着自布朗海军上将号的甲板上弹射起飞。水兵们足足花了两个小时才彻底把弹射器上覆盖的冰雪清理干净，但即便如此，拉莫斯依然有些害怕它无法正常工作。冰……在舰队受困的那段时间，拉莫斯就已经学会了对冰雪心怀畏惧。他现在想知道，被抛下的舰船去了哪里，还有没有舰船漂浮在冰海之上。\n\nG-21“鹅”式水上飞机的螺旋桨转动起来，甲板上的地勤向他竖起大拇指，示意一切就绪。拉莫斯扭头打量着机翼下的炸弹，希望到时候它们不会出问题吧。片刻后，拉莫斯被重重地压进椅背，弹射器将他送上了天空。\n\n拉莫斯一边等待着第二架水上飞机起飞，一边在布朗海军上将号分遣舰队的残部上空盘旋。很快，另一架飞机也冲入天际。时下正是黑暗的黄昏时分，太阳在地平线上露出一丝微弱的光芒，在阿德莱德岛上投下不祥的长长阴影。拉莫斯希望自己就能这么待在空中，远远地离开这个可恶的地方。\n\n然而，无线电沙沙作响：“开始轰炸。”\n\n拉莫斯跟随僚机，从靠近陆地的一侧飞越阿德莱德站，身下的景象不由得让他瞠目结舌。相比于夏季拍摄的侦察照片，基地已经完全变了个样子。他辨认出了海岸上的壕沟和沙袋阵地，还有机枪点位和舰炮。在领头的飞机之后，他只有几秒钟的时间进行轰炸。\n\n僚机飞越基地，炸弹直接命中了无线电天线。拉莫斯迅速跟上，击中通信楼，将它变成了一团照亮整个基地的大火球。在短促的闪光中，拉莫斯发现一门高射炮瞄准了他，然后，爆炸声在身旁响起，飞机在气浪中震撼摇晃。"
 antarctica_aaa_op90prep.750.a:0 "拉莫斯最后看到的景象，是向自己迎面冲来、洁白无瑕的无情冰雪。"
 antarctica_aaa_op90prep.760.t:0 "暗夜焰火"
 antarctica_aaa_op90prep.760.desc:0 "帕斯卡尔盯着自己的双手。即使在漆黑的暗夜中，他也能看到手上斑驳的青黑色，这是软组织坏死的迹象。船上的医生说，他的左手拇指和右手食指已经保不住了。但即便如此，他也比其他一些人的境遇要好些：有人的冻伤已经变成了坏疽，甚至还有人死于败血症。至少帕斯卡尔还幸运地活着，他还能亲眼目睹马塞拉的疯狂。\n\n陆战队员和海员们关上了罗萨里奥号的水车、拆掉了螺旋桨，一是为了减少噪音，二则是为了避免附近的浮冰损坏螺旋桨。他们不断地划船、把船拖过浮冰、再划船，现在，他们已经到了最后一段。在攻击队和海岸之间，还剩下五百米的开阔水域。\n\n他们将小船拽下最后一块浮冰。没过一会儿，格鲁曼水上飞机的螺旋桨声破空而来，这是准备出击的信号。第一枚航弹爆炸，黑暗中骤然而起的火光仿佛要刺瞎他的双眼。无线电信号塔轰然倒塌，信号楼也在第二架飞机的轰炸中燃起熊熊大火。帕斯卡尔所在船上的人们惊恐地看着智利人的防空火力，第二架飞机被击落了。泛光灯照亮了阿根廷海军陆战队的进攻队伍，叫喊声在冰海之上回荡。\n\n机枪火力肆意倾泻，横扫被照亮的海面，瞬间撕碎了帕斯卡尔前面的一艘船。靠近海岸后，陆战队开始还击。狂风卷起信号楼的烈焰，蔓延向邻近的建筑。很快，整个海湾都沐浴在橙红色的光芒之中。"
 antarctica_aaa_op90prep.760.a:0 "嘶吼和尖叫乘着南极的风，传入帕斯卡尔的耳朵。"
 antarctica_aaa_op90prep.770.t:0 "针尖麦芒"
 antarctica_aaa_op90prep.770.desc:0 "不知道是子弹、弹片还是什么东西凌空飞来，撕裂了在帕斯卡尔身旁隐蔽的陆战队员的脸颊。帕斯卡尔所在的登陆小队已经成功上岸，正趴在智利海滩阵地底下的冰架上。登陆队伍原本有七艘船，每艘船上有十名陆战队员和两名水兵，其中有五艘最终抵达了海滩，另外两艘现在漂在海面上，弹痕累累，里面的士兵已经变成了尸体。\n\n机枪阵地的火力十分猛烈，牢牢压制住了滩头的突击部队，似乎守军并不在意弹药消耗的问题。帕斯卡尔取下背负的无线电，呼叫罗萨里奥号的舰长：“这……罗萨里奥号，这里是帕斯卡尔，请求火力支援。距离我军阵地一百米滩头处有两处机枪火力点，在战壕防线以外。近距离有我方部队。”一阵扫射切断了身旁一名陆战队员的小臂，帕斯卡尔差点吐了出来。\n\n听筒噼啪作响：“收到，近距离有我方部队。”\n\n帕斯卡尔咬紧牙关，尽量缩小自己的身形。“卧倒！”他喊道，“炮击要来了！”罗萨里奥号上的老旧榴弹炮轰鸣起来，两发炮弹越过掩体，命中了智利人的机枪火力点。泥浆和鲜血在战场上如雨点般倾泻而下，机枪停了下来。\n\n但智利人显然也有对付榴弹炮的办法。在远处的山丘上，一门舰炮射出一发穿甲弹，越过港口，直接正面命中了罗萨里奥号的前炮位。火光腾空而起，巨响随之而来，帕斯卡尔的炮组同胞就这样被炸成了碎片。\n\n在愤怒的驱使下，他向布朗海军上将号报告了智利舰炮的位置。"
 antarctica_aaa_op90prep.770.a:0 "金属与火焰的冰雹砸在防御工事之上，整片滩头为之震动。"
 antarctica_aaa_op90prep.780.t:0 "血战"
 antarctica_aaa_op90prep.780.desc:0 "世界天旋地转，帕斯卡尔的耳膜嗡嗡作响，布朗海军上将号的炮击将滩头搅成了一团冻土、海水和鲜血混杂的泥沼。守军已经被打垮了，机枪不再哒哒作响，岸上舰炮也支离破碎。战斗似乎在刹那之间就画上了句号，在巡洋舰强大的近岸炮击面前，所有人都心惊胆战。\n\n阿根廷陆战队是最先动起来的，他们端起上着刺刀的步枪，冲上海滩，誓要与敌人一决雌雄。帕斯卡尔跟随突击队一跃而起，在壕沟防线旁边的一处弹坑旁投入战斗。\n\n阿根廷部队冲锋时，刚刚经受过炮击蹂躏的智利人也开始还击，向滩头发动了反冲锋。或许是因为他们已经打光了子弹，也有可能是因为他们和面前的敌军一样热血沸腾。\n\n两军在仅余的堑壕旁开始了激烈的白刃战，战斗的呐喊自每个人的胸膛中迸发而出。帕斯卡尔身前的陆战队员用刺刀挡住攻击，反手狠狠地刺进了对手的心脏。仅仅过去短短一瞬间，另一个智利人就将这名陆战队员开膛破肚，然后转身跳向帕斯卡尔，将他撞进了弹坑。\n\n帕斯卡尔用手中的步枪当作盾牌，与智利人搏斗起来。敌人的步枪已经不知道掉到哪里去了，现在正用手抓挠着帕斯卡尔的脸，还在他的脸颊上重重地划了一道，帕斯卡尔则扬起一脚，把智利人踢到了弹坑的另一边。\n\n他举起步枪，正对刚刚的袭击者。智利人举起双手：“请——”然而，帕斯卡尔一枪射中脑门，打断了他的求饶，红白相间的脑浆喷洒在大地之上。"
 antarctica_aaa_op90prep.780.a:0 "帕斯卡尔垂下步枪，盯着自己的双手，颤抖、冻伤的双手……"
 antarctica_aaa_op90prep.790.t:0 "皮洛士式的胜利"
 antarctica_aaa_op90prep.790.desc:0 "埃米利奥·马塞拉登上陆地时，阿根廷士兵们还在打扫战场，堆放尸体。海军陆战队在舰炮支援下取得了胜利……某种程度上的胜利吧。登陆滩头的七十名陆战队员中，有三十名阵亡，负伤人数也至少不低于这个数字。最终的统计结果需要到明天才能确定，但无论如何，对马塞拉而言，这都是一场灾难。他在没有收到命令的前提下独自筹划发起了这次进攻，本以为这会是一场漂亮的胜利，但大自然和人类合起手来，摧毁了他的计划。唉，至少背信弃义的智利人已经被消灭了，也算是……好事吧。\n\n在卫兵的簇拥下，马塞拉走进了阿德莱德岛上的基地。当他走过时，陆战队员和水兵们都向他敬礼，但从一些人的眼眸之中，他能读出不加掩饰的厌恶。在他之前的承诺中，这不会是如此惨痛的胜利。仅仅有寥寥几艘小船和几十名陆战队员登上了阿德莱德岛，缺乏食物、燃料、乃至弹药，依靠这样的力量根本无法守住这里。智利人在夏季反攻时，夺回阿德莱德岛不过只是小菜一碟。\n\n马塞拉走近补给站。在战斗中，轰炸通信楼引爆的火焰蔓延到了附近的营房和补给库房。透过被烧毁的断壁残垣，他看到在军火库门口，焦黑的尸体已经堆成了一座小山。这真是运气好，如果攻击的时候这些人拿起武器投入战斗，那结果可能就与现在不一样了。\n\n尸体已经烧得空洞的眼窝中飘出股股青烟，飘进马塞拉冰冷的肺泡，他的心中开始制定一个新计划。他们可以让这场战斗看起来像是一起不幸的事故。如果能填平每一处弹坑、处理掉所有身上有战伤迹象的尸体、将所有弹壳和破片都搜集带走，这看起来可能就只是一场火灾罢了。马塞拉的舰队可以溜之大吉，而在智利和其他国家看来，阿德莱德岛上从来没有发生过任何战斗。士兵们只是在严酷的冬季放弃了基地，希望抵达另一处站点，但是却不幸地丧生于火海。"
 antarctica_aaa_op90prep.790.a:0 "“士兵们，”马塞拉说道，“我们接下来要这么办……”"
 antarctica_aaa_op90prep.800.t:0 "梦魇"
 antarctica_aaa_op90prep.800.desc:0 "帕斯卡尔在梦中醒来，他发现自己脚下是一块正在迅速融化的浮冰。狂风呼嚎，夹杂着尖锐的啸叫与指责，潮湿腐烂的手指攀上边缘，不断逼近，渐渐将他包围。呛人刺鼻的烟雾弥漫在空气之中，血腥味覆盖着他的舌尖，海冰的深处浮现出人们的脸庞，满是仇恨与失望。有的人被烧得面目全非，有的人浑身上下都是冻伤，甚至还有一个人的天灵盖不见了，血红的海水从他前额的弹孔中汩汩流出。浮冰只剩下几英尺厚了，一具无臂尸体的骨头碎片刺进了他的脚踝。冰层彻底消融，帕斯卡尔被拉到了水下。\n\n帕斯卡尔骤然惊醒，浑身上下都是冷汗，口腔中依旧残留着生铁般的血腥气息。他挣扎着换上衣服，自从军医截掉他的左手拇指和右手食指后，哪怕最简单的事情都变得困难起来。但在手术之前，上司还是给他留了些时间，让他协助“清理”阿德莱德岛。马塞拉指挥部下将战场彻底打扫了一遍，消除了所有武装冲突的痕迹，还将烧焦的智利人尸身统统掩埋起来，这样在旁人看来，幸存者们就是在因为食物短缺而离开之前，最后安葬了同伴。\n\n帕斯卡尔换上暖和干燥的衣服，身穿大衣，走上甲板，或者说，罗萨里奥号上剩余的甲板。原先炮位上的战友们都已经不在人世，前榴弹炮也遭到摧毁。在帕斯卡尔接受截肢手术的前几个小时里，他拼命地在前甲板上擦洗他们留下的痕迹。所有痕迹，战场上伤痕累累的尸首，不论是智利人还是阿根廷人，都被永远丢弃在了无人知晓的地方。\n\n罗萨里奥号摇晃起来，帕斯卡尔抓紧了栏杆。他脚下的船舶正跟在圣马丁号后面，在海冰封住阿德莱德岛之前，他们设法挣脱了冰层。但在另一边，马塞拉和布朗海军上将号被困在了向北漂浮的冰层之中，离破冰船相当之远。马塞拉命令舰队驶向航程最近的海军基地，帕斯卡尔怀疑着，他们是否能成功。"
 antarctica_aaa_op90prep.800.a:0 "他低头看向脚下，深海中的脸庞又浮现在眼前。"
 antarctica_aaa_op90prep.810.t:0 "阿根廷共和国海军，罗萨里奥号"
 antarctica_aaa_op90prep.810.desc:0 "又是冰封，这一次，罗萨里奥号终于走到了她的尽头。\n\n船员们已经被困好几天了，这几天里，他们眼睁睁地看着唯一的救命稻草，圣马丁号破冰船，也在浮冰的裹挟下渐行渐远，和罗萨里奥号一样无助。\n\n食物和燃料已经几乎耗尽，取暖变成了越来越大的难题。船上的人全都病了，有人出现了败血症的早期症状，其他人则只能躺在床铺上，慢慢地死于冻伤。如果还有人有力气，那就会谈论些哗变的话题，无一例外，矛头都直指把他们带到这儿来的舰长和埃米利奥·马塞拉海军上校。\n\n罗萨里奥号的舰长已经几乎昏迷了，似乎他正在和自己的舰船一起，渐渐失去生命力。炮艇的倾斜已经到了可怕的地步，少数几个还能走动的人只能将倾倒的舱壁充作支撑点，在廊道中穿行。\n\n大家曾经讨论过转移到圣马丁号破冰船上的可能性，它比罗萨里奥号要坚固得多，而且仍然勉强能够航行，但没有人愿意放弃伤病员。为了取暖，所有人都只能挤在船员宿舍里，躺在狭小的床铺上。用不了多久，南极就会彻底吞噬他们。\n\n一天清晨，帕斯卡尔和其他一些人被叫到了船长的床边，照医生的说法，船长应该见不到下一次日出了。“马塞拉把我们引进了绝路，”船长愤怒地咆哮着，“我就不该听他的，听谁的都不该听他的，他就是个怪物。”\n\n船长停顿了一下，咳嗽起来，震得身下的小床铺都在颤抖。“够了，”他说道，“我命令你，打开无线电，联系圣马丁站。如果还有人能救你们，那一定是那位白色荒原的征服者。原谅我，孩子们……原谅我……”"
 antarctica_aaa_op90prep.810.a:0 "船长缓缓闭上了双眼，这次，就是永远。"
 antarctica_aaa_op90prep.820.t:0 "白色荒原的征服者"
 antarctica_aaa_op90prep.820.desc:0 "普哈托准将驾驶着狗拉雪橇在冰上疾驰。他带领着一个小队，于六小时前带着紧急医疗援助、衣服和食物离开了圣马丁站。在他和莱亚尔共事的这一年之前，打死他也不会信自己现在居然在干这种事：他要急着去帮助海军了。\n\n几天之前，无线电收到了一段求救信号。尽管传来的声音很微弱，而且模糊不清，但内容还是依稀可以辨认出来的：罗萨里奥号与圣马丁号两艘阿根廷海军舰艇在圣马丁站的海岸外被浮冰困住，急需救援。普加托对这两艘船都很熟悉。罗萨里奥号去年的基地就在圣马丁站，当时温克岛事件就是在他们那儿发生的。\n\n圣马丁号破冰船则是普哈托本人于五十年代购置的，阿根廷的很多南极洲基地都有它一份功劳。他上次听说这些船的时候还说它们是从布朗站出发的，不应该出现在这里啊。海军到底要搞什么鬼？\n\n当雪橇在冰面上疾驰而过时，普哈托回想起南极那奇妙的冬季，以及还能再次探索这个地方的止不住的兴奋。\n\n与此同时，岁月的沉重也涌上他的心头。他已经五十九岁了，这里似乎一天比一天寒冷。像他这样年纪的人不应该在这样一个对人类生存并不友好的环境中生活，但普哈托不会把这个任务强塞给别人，然后拍拍屁股走人，他天生不是这样的人。\n\n这是一个非常难得的机会，借着这次机会，在阿根廷南极管理局和海军之间可以架起一座桥梁，他要亲自见证这一刻。普哈托还记得，罗萨里奥号上还有一个年轻的水手，希望他还活着。"
 antarctica_aaa_op90prep.820.a:0 "我打赌，卢戈·帕斯卡尔二等水兵一定有不少故事要和我讲。"
 antarctica_aaa_op90prep.830.t:0 "营救"
 antarctica_aaa_op90prep.830.desc:0 "人们将现在这样的时刻叫做“航海晨昏朦影”。此时，太阳刚刚露出地平线，陆地呈现出由奇妙阴影与模糊形状组成的怪异风光。在这模糊的晨昏交界中，有一个模糊的影子赫然在列：罗萨里奥号倾斜的船体。\n\n模糊不清的求救信号并没有充分反映出这艘炮艇可怕的遭遇。她再也无法航行了，就算没有被海冰挤碎，她也会在冰层解冻后当场沉没。靠近罗萨里奥号时，狗拉雪橇小队分散开来，普哈托还能清晰地看到远处圣马丁号破冰船的轮廓。\n\n在接近罗萨里奥号时，救援队吹响哨子，大声呼喊以表明身份，并且要求船员现身。几分钟过去后，在已经部分沉没的后甲板上，探出了几个仿若骷髅的人头，然后船员们沿着栏杆手拉手向上攀爬；还有几个幽灵从船壳裂缝中钻出，慢慢地站起，摇摇晃晃地向前走去。普哈托下令一个小队继续前进，赶往圣马丁号，他则亲自去迎接罗萨里奥号的幸存船员。\n\n“船长呢？”他扶住打头的水手，问道。\n\n“死了。”回答仿佛是在喃喃自语。\n\n普哈托并非没有经历过南极洲带来的苦难，他残缺的手指正是拜此所赐，但眼前这群憔悴的身影依旧令他感到毛骨悚然。躯体已经冻伤发黑，曾经合身的军服像敛衣一样耷拉在身上。救援队急忙给他们穿上御寒衣物，但按照医生的建议，并没有喂他们吃东西，以现在的状态，这会要了幸存者的命。与此同时，普哈托仔细地观察着船员们的脸庞，寻找年轻的帕斯卡尔。他带着几名救援队员冲进船舱，救援卧病在床的伤病号们。在那里，普哈托准将找到了少了几根手指头、躺在小床上的卢戈·帕斯卡尔。"
 antarctica_aaa_op90prep.830.a:0 "“会好起来的，孩子，”普哈托低声安慰道，“我们要回家了。”"
 antarctica_aaa_op90prep.840.t:0 "进退两难"
 antarctica_aaa_op90prep.840.desc:0 "普哈托率领救援队返回圣马丁站时，已经是傍晚时分。这一路并不容易，海员们的状况都十分糟糕，甚至有人没能撑过这段最后的路途。普哈托下定决心，一定要把他们都带回家。\n\n返程途中，普哈托竭尽全力地向海员们试探罗萨里奥号和圣马丁号究竟为何要在冬季离开驻地。有些人对此缄口不言，但也有人咬牙切齿，迫不及待地要将船上发生的一切都告诉普哈托。对他们而言，这可能就是最后的遗言了。普哈托原本希望能从帕斯卡尔那里问到更清晰的事件全貌，但自获救以来，二等水兵的意识就一直时断时续。\n\n马塞拉率领布朗海军上将号分遣舰队离开布朗站，突袭阿德莱德岛的智利基地；途中有几艘舰船困在浮冰中无法动弹，被抛在了后面；然后是一团糟的攻击，伤亡惨重；一切结束之后，马塞拉则竭力企图将战场伪装成一场事故……\n\n长远来看，普哈托不相信智利人就会这么忍气吞声地认下来。马塞拉以抛弃与冷漠来回报部下的忠诚，太多太多的亲历者愿意站出来揭露真相，阿德莱德岛的鬼魂迟早会走出坟墓。\n\n此时此刻，普哈托只希望能有少些人为马塞拉的愚蠢而死去。他手头有一批医疗用品，或许可以挽救徘徊在生死边缘的海员们，但问题在于，这些医疗物资是专门为南纬90行动而准备的，提前动用它们可能会危及极点突击队的行动。如果行动失败，阿根廷南极属地就注定会沦于海军之手。普哈托面临着艰难的抉择。"
 antarctica_aaa_op90prep.840.a:0 "孩子们是从地狱逃回了一条命，他们不应该这样白白死去。立刻打开医疗用品储备。"
 antarctica_aaa_op90prep.840.a.tt:0 "§F这将会减少南纬90行动的§W医疗用品§!储存。§!"
 antarctica_aaa_op90prep.840.b:0 "我们所有人的未来都取决于莱亚尔的行动能否成功。医生们只能尽力用现有的物资救护海员。"
 antarctica_aaa_op90prep.850.t:0 "噩耗传来"
 antarctica_aaa_op90prep.850.desc:0 "窗外冰霜覆盖，夜空繁星点点，闪烁着清冷的红白光芒，冰川在黑暗中散发出幽蓝的色调。莱亚尔在窗边俯瞰着空旷的洋面，在夏天，这里是埃斯佩兰萨站外的海湾；而在今天这样的冬季，海湾封冻结冰，一片漆黑。此时，办公室外传来一阵喧闹声，打断了他的沉思。莱亚尔起身，他听到有人低声骂了一句，然后，门被推开了，喘着粗气的埃尔南·普哈托出现在他的眼前。普哈托吐出嘴里的冰碴子，恶狠狠地说道：“我刚刚从圣马丁站赶过来。”随后又是一连串的咆哮，“马塞拉袭击了阿德莱德岛的智利人，双方都伤亡惨重。罗萨里奥号、圣马丁号还有其他舰船都困在了该死的冰层里，我还必须得竭尽全力去把能救的海员都救回来。这……他真的，我简直不敢相信……”\n\n普哈托在房间里走来走去，靴底的冰片噼啪作响。听着普哈托带来的故事，莱亚尔如坠冰窖：阿根廷的士兵死在了南极洲的海底；智利人或许现在还不知道这件事，但谁也不能排除将来报复的可能。莱亚尔的心越来越冷，难道战争要来了吗？冰寒蔓延全身，仿佛要将上校生吞活剥。\n\n“这彻底扰乱了我们的计划。”普哈托走向窗边，双肩紧绷，阴影划过脸庞，但他的语气似乎比以前还要更平静些，“显然，马塞拉并不关心南纬90行动，也不关心我们想要在这里构筑的一切。”\n\n莱亚尔没有说话，一团火花在他的心中燃起。他毕生的心血与愿望都可能因此而付之一炬，但这火花也召唤着他去勇敢战斗。“行动必须继续，”他最终决定下来，“不管马塞拉要做些什么。”普哈托转过头凝视着他，上校则考虑着接下来的抉择，必须要有人留下来应对马塞拉的阴谋。埃尔南·普哈托的年纪或许有点太老了，不适合参加这样危险的远征，但他可以留下来，担当棋局中的主教，起到极为关键的作用。然而，这位南极老兵也是南纬90行动的重要一员，可以说，他为这次任务而做准备的时间比任何人都要久，能够用自己丰富的经验和传奇的人生激励所有人的斗志。莱亚尔做出了抉择，站起身来，说道："
 antarctica_aaa_op90prep.850.a:0 "“必须要有人留下来盯着马塞拉，这件事上我只能相信你。”"
 antarctica_aaa_op90prep.850.b:0 "“没有你，行动就不可能成功。我们需要你一起。”"
 antarctica_aaa_op90prep.850.b.tt:0 "§W埃尔南·普哈托准将§!已加入§O南纬90行动§!§Y人员名单§!。"
 antarctica_aaa_op90prep.860.t:0 "第一个日出"
 antarctica_aaa_op90prep.860.desc:0 "埃尔南·普哈托凝望着冰封的海洋，他的眼眸中笼罩着一层阴翳。橙红色的光芒沿着远处麦克拉里冰川的边缘升起，变成了金色的阳光，这是圣马丁站入冬后的第一次日出。寒风中夹杂着南极蛮荒的气息，自海岸奔涌而来，冰冷刺痛地嘲弄着普哈托。准将无声地叹息着，十多年前，他正是在这个海湾登陆，将阿根廷国旗插在了岩石海岸之上。彼时彼刻，他以为那只是他将在南极立起的第一面国旗，有朝一日，他会踏足南极点，让蓝白相间的国旗在世界尽头飘扬。但是，莱亚尔的命令让他的愿望永远都无法实现了。寒风仍在肆虐，他这把老骨头可比当年还要硬。普哈托是名好士兵，即使他不愿意，也会服从命令，毕竟总得有人盯着刽子手的一举一动。帕斯卡尔二等水兵走近，他受伤的手藏在大衣里。帕斯卡尔现今眼袋下垂，眼轴布满了疲惫的螺旋纹。虽然他还很年轻，但乱蓬蓬的头发下面却已经出现了细密的皱纹。显然，他还没能摆脱阿德莱德岛的梦魇，普哈托甚至不知道这梦魇是否会伴随他的一生。帕斯卡尔用没有受伤的手指着一艘正在清理海湾的小破冰船，提出了一个无声的问题。普哈托叹了口气，想起了自己的伤，回答道：“船上是口粮和军械，”他说，“我还没决定好要怎么办，原本我计划要在这里再布置些枪炮阵地。”\n\n二人眺望着冰雪覆盖的群岛和防御工事，它们的目的是为了抵御外敌，但普哈托思考着，自己或许有一天会不得不用它们来对付马塞拉。同时，莱亚尔和南纬90行动的队伍也能动用些额外的军力。\n\n“我希望……我希望埃斯佩兰萨站也能有和这里一样严密的防守工事。”帕斯卡尔盯着朝阳，低声说道，“如果马塞拉想要攻占那里，该怎么办？”普哈托悲伤地看着他，自他从昏迷中醒来后，就变得沉默寡言，偶尔说出的只言片语都有关于马塞拉：警告、担忧、预测。普哈托一直守在他的床边，聆听着帕斯卡尔的言语。"
 antarctica_aaa_op90prep.860.a:0 "“孩子，只要我们守住圣马丁站，马塞拉就碰不到我们一丝一毫。我们要在这里设置更多的炮位。”"
 antarctica_aaa_op90prep.860.a.tt:0 "我们将获得§R10军事点数§!£Antarctica_texticon_MIL 。"
 antarctica_aaa_op90prep.860.b:0 "“如果南纬90行动失败，无论海军还是研究所，谁都无法得到南极。补给要调拨给探险队。”"
 antarctica_aaa_op90prep.860.b.tt:0 "我们将获得§W10补给§! £Antarctica_texticon_SUP 。"
 antarctica_aaa_op90prep.860.c:0 "“嗯，埃斯佩兰萨站是核心，或许往那里调些物资是更好的选择。”"
 antarctica_aaa_op90prep.860.c.tt:0 "我们将获得§G10宣称点数§!£Antarctica_texticon_LEG 。"
 antarctica_aaa_op90prep.870.t:0 "南极的征服者"
 antarctica_aaa_op90prep.870.desc:0 "埃尔南·普哈托和希罗上尉走出贝尔格拉诺站总部。准将昂首挺胸，锐利的目光眺望着积雪覆盖的道路。“我们又建了几栋宿舍。”希罗指着远处四座醒目亮橙色的建筑说道，普哈托则若有所思地点了点头，随后，二人沿着一条近期新开掘的隧道走向地下。普哈托已经很久没有到访过彼德拉武埃纳湾和他曾经在这里建立起的基地了，身边的雪地车和雪橇犬让他的心脏不由得砰砰直跳。贝尔格拉诺站终于实现了准将为它赋予的使命，阿根廷向南极点进军的先锋正要从此出发。\n\n“实验室条件也改善很多，”希罗继续笑着说道，“从天文学到地震学，那里能进行各种各样的科研。发电站在后面，也是去年新建的。不过，在出发之前，我得让你瞧瞧咱的新咖啡机。”\n\n他们来到咖啡机旁，周围响起一阵欢呼声，整个探险队都挤在普哈托的身边。准将眨了眨眼睛，恍若如梦方醒，他感到肩上的担子突然重了起来。所有人都在这里，也包括自己在内。埃尔南·普哈托仿佛刹那间变年轻了，他又回到了许多年前那个好奇、无畏的自己，但也抑制不住地紧张起来。他喝了一口淡淡的咖啡，身旁的奥斯卡·拉蒙·阿方索一等兵正在亲密地抚摸一只雪橇犬，叫着它的名字，狗狗毛茸茸的脑袋扎进主人的腿弯之中。普哈托压下难过的叹息，对这位年轻人说道：“小伙子，别太喜欢它们，好吗？”\n\n经验——这是普哈托唯一能为探险队做的事情，也是探险队对他的期望。他扭头避开奥斯卡警惕的眼神，转头对队员们说道：“朋友们，很高兴能认识你们。”队员们又欢呼起来，“但恐怕……”"
 antarctica_aaa_op90prep.870.a:0 "“我现在必须去和莱亚尔和希罗开个会，制定好明天的行动计划。”"
 antarctica_aaa_op90prep.870.a.tt:0 "我们将获得§W10补给§! £Antarctica_texticon_SUP 。"
 antarctica_aaa_op90prep.870.b:0 "“……我需要你们都安静下来，来给你们讲讲我当年是怎么建起这个地方的。”"
 antarctica_aaa_op90prep.880.t:0 "最后的屠龙勇士"
 antarctica_aaa_op90prep.880.desc:0 "希罗上尉的心中充满无限的期待。贝尔格拉诺站冰层下的隧道里塞满了琳琅满目的各种物资，它们都必须要严格检查清点。在行动之中，容错率微乎其微，一日燃料余量的损失、一根断裂的狗拉雪橇带、一把卡壳的枪支，都有可能会将所有人推进万劫不复的深渊。\n\n此外，身为探险队的指挥官之一，任何伤亡都会成为希罗良心上永远无法抛除的负担。当然，人们完全有理由对这次探险能否成功持悲观态度，但希罗仍能感觉到近乎令他眩晕的兴奋。世界越来越紧密地联系在一起，已知世界外的空洞越来越小，像希罗这样的探险家也愈发找不到用武之地。曾经被描画在地图边缘的怪物们慢慢地后退到黑暗之中，而希罗即将要去的地方或许就是地球表面最后的黑暗之地、最后一处怪物巢穴——南极点。\n\n他将成为最后的征服者、最后一位屠龙勇士……好吧也许不是最后一位。\n\n此时，希罗的指挥官兼好友莱亚尔上校从一堆物资后面闪身走出，他的表情让希罗的心头不由得一沉。“你的计算出错了，雪地车的物资装载量和你计算的不符。”希罗的脸上瞬间浮现出恐惧与愧疚，方才的乐观情绪烟消云散。\n\n但还没等希罗开口解释道歉，莱亚尔就面色一转，爽朗地笑了起来：“实际上，我们雪地车上的空间比你预想中要大。所以，亲爱的上尉，我们该怎么弥补你这愚蠢之极的错误呢？”上校的笑声也感染了希罗，他自然知道该怎么填补上这些空余。"
 antarctica_aaa_op90prep.880.a:0 "“我们多带些生存装备吧。”"
 antarctica_aaa_op90prep.880.a.tt:0 "这将会增加南纬90行动的§R生存装备§!储存。"
 antarctica_aaa_op90prep.880.b:0 "“塞皮和他的团队需要一切可能的协助，我们多带些维修工具。”"
 antarctica_aaa_op90prep.880.b.tt:0 "这将会增加南纬90行动的§g修理工具§!储存。"
 antarctica_aaa_op90prep.880.c:0 "“谁知道我们会在路上遇到什么事，虽然我不希望碰上麻烦，但我们需要更多的子弹弹药。”"
 antarctica_aaa_op90prep.880.c.tt:0 "这将会增加南纬90行动的§e子弹§!储存。"
 antarctica_aaa_op90prep.890.t:0 "第十次飞行"
 antarctica_aaa_op90prep.890.desc:0 "驾驶螺旋桨飞机飞越南极大陆的冰原是一种简单的快乐，至少，风不会把你从天上吹下来。从空中俯瞰，南极半岛呈现出与平常迥然不同的风貌。这片大陆的确拥有地球上最顽强的生命：庞大的企鹅群遍布海岸；海豹悠闲地躺在岩石上休憩；巨大的信天翁掠过高原；偶尔出现的鲸鱼喷泉则提醒人们，水下世界还要更加异彩纷呈。\n\n为数不多的人类庇护所似乎与海岸边的众多生灵格格不入。奥莱扎希望今天的任务能顺利完成，减轻阿根廷南极属地的负担。建立一处可供最大型号现代飞机起降的常年机场可以极大减轻后勤压力，而为此寻找合适的机场地点就是他现在面临的挑战。\n\n这是他从埃斯佩兰萨站出发的第十次飞行了。根据莱亚尔的命令，他只能在执行南纬90行动任务的间隙进行侦察。此时，在飞越特里尼蒂半岛海岸旁星罗棋布的群岛时，他发现了一块大体平坦的陆地，不像大多数南极岛屿一样有崎岖的冰川与山脉。他对比着地图和指南针，发现这里名叫西摩岛，它当然符合机场的要求，奥莱扎相信莱亚尔也会同意的。"
 antarctica_aaa_op90prep.890.a:0 "但这里需要一个好听的阿根廷名字……"
 antarctica_aaa_op90prep.900.t:0 "最后一刻的改变"
 antarctica_aaa_op90prep.900.desc:0 "希罗上尉略带忧愁地坐下来，与第82巡逻队指挥官阿道弗·欧亨尼奥·戈茨少尉交谈起来：“你听说海军的麻烦了吗？”\n\n戈茨耸耸肩，把一盘牛排和烤蔬菜放在了希罗面前，在南纬90行动开始之前，他们的伙食都很好。“海军？海军什么时候没麻烦了？”戈茨笑了笑，坐下开始大快朵颐，又停下来说道，“嗯……我发现你、上校和空军中校似乎都显得比平时更……紧张。”\n\n“他们已经开始控制对阿根廷南极属地各地陆军、空军和南极研究所设施的物资供应。显然，海军暗中囤积了更多的物资，这对我们极地探险的后勤计划不是好事。”\n\n戈茨切着牛排，鲜红色的汁液在盘子中流淌，问道：“这会影响第82巡逻队吗？”\n\n“这就是我们要讨论的问题。尽管已经尽了最大努力，但我们还是没能达到希望的补给水准。莱亚尔对行动的成功仍然充满信心，但现实情况是，能否在南极点立起国旗已经关系到阿根廷南极研究所的生死存亡，决不能失败。因此，我们必须要决定，是为南纬90行动分配更多的补给、保持现有的补给分配不变、或者……”\n\n“为第82巡逻队提供更多补给物资？”希罗点了点头表示肯定。戈茨接着说道：“南极研究所的目的不仅仅是重申阿根廷对南极洲这一部分土地的主权，还是为了拓宽我们国家、乃至全人类的科学视野。如果第82巡逻队拥有更多的资源，我们或许能够带回某些重大发现，足以让我们国家在南极大陆重获主动权。”\n\n希罗做好了决定："
 antarctica_aaa_op90prep.900.a:0 "“把国旗立在极点是最重要的事情，如果南极落到海军手里，科学也无处立足。”"
 antarctica_aaa_op90prep.900.a.tt:0 "第82巡逻队将在离开探险队主体时携带较少量物资补给。"
 antarctica_aaa_op90prep.900.b:0 "“我们的队员个个意志坚韧、训练良好。两支小队都能依靠现有的物资完成目标。”"
 antarctica_aaa_op90prep.900.c:0 "“你是对的。如果你和第82巡逻队能带回些了不起的发现，南极研究所就能重新夺回它的灵魂。”"
 antarctica_aaa_op90prep.900.c.tt:0 "第82巡逻队将在离开探险队主体时携带较多物资补给。这将使巡逻队能收集到更多的科学数据。"
 antarctica_aaa_op90prep.910.t:0 "紧急插播"
 antarctica_aaa_op90prep.910.desc:0 "甜美的探戈音乐在贝尔格拉诺站冰冷的地下隧道中回荡，温暖着人们对家乡风土的回忆。觥筹交错，好友同僚三五成群，为即将踏上征程的南纬90行动干杯。多年的艰苦训练和后勤准备终于在贝尔格拉诺站攀升到了顶峰。\n\n“我和第82巡逻队的小伙子们聊了聊，”希罗说道，“他们已经迫不及待地想要开始行动了。希望他们能有所发现，证明这里不仅仅只是用来插国旗、驻扎士兵的地方。”\n\n“噢，我得为了这个喝上一杯。”莱亚尔说道。\n\n当奥莱扎中校走进来时，欢呼声响彻房间。他挤过机械师和测绘员们的身旁，得到了许多热烈的掌声。中校走到莱亚尔身边，低声报告着他在马兰比奥岛上发现了一处合适的机场选址。\n\n“干得好，”莱亚尔夸赞道，“我希望在我们前往极点的途中，你就立刻开始着手铺设跑道——”\n\n突然，探戈的温婉曲调停了下来，取而代之的是全国新闻主播的话音：“我们在此插播一条紧急速报：大日耳曼国元首，阿道夫·希特勒，已经离世。”\n\n鸦雀无声，落针可闻。\n\n“德国方面尚未公布任何有关元首离世的详细情况，我们会在第一时间跟进，为您带来更多细节报道。”\n\n希罗扭头看向莱亚尔：“难以置信……这对新施瓦本意味着什么？”\n\n“德国无疑将陷入动荡之中，我担心他们可能很难保证补给线的安全。”上校站起身，举起酒杯，谨慎地思考着下一句话。"
 antarctica_aaa_op90prep.910.a:0 "“为了这个定义了二十世纪的男人、为了阿道夫·希特勒，喝一杯吧。”"
 antarctica_aaa_op90prep.910.b:0 "“祝愿德国未来能享有和平。”"
 antarctica_aaa_op90prep.910.c:0 "“或许世界会乱作一团，注意不到我们在这极南之地做些什么……但南纬90行动将会是阿根廷的至耀时刻。”"
 antarctica_aaa_op90prep.920.t:0 "白色荒原"
 antarctica_aaa_op90prep.920.desc:0 "时间到了。队员们在雪地车中集合，雪橇犬拴上了雪橇，物资装载完毕，地图检查无误——南纬90行动即将开始。\n\n第82巡逻队已于两日前出发，负责为莱亚尔和极点突击队标出一条穿越大裂谷的道路。多年的计划和精心筹备都凝结于这一瞬间，莱亚尔将带领部下从贝尔格拉诺站出发，途径索夫拉尔基地，直抵极地高原以及南极点，在那里永远插上阿根廷的旗帜。\n\n莱亚尔和希罗站在车队旁，眺望着即将穿越的冰封荒原。红日当空，每一片雪花都折射着炽烈的光芒。希罗说道：“想想过去这一年，真没想到我们能走到这一步。”\n\n“你不知道的还多呢，”莱亚尔长叹一声，“我会在路上慢慢和你讲的。尽管准备很是仓促，但我觉得胜算还是相当高。如果天气好的话……”\n\n“不不不，”希罗笑着回道，“别这样。不要企图去预测命运，不管发生什么事，我们都会竭尽全力，各司其职。”\n\n“既然你都这么说了……”莱亚尔转头看向希罗，微笑着说道，“我唯一要讲的就是……一路好运，祝我们所有人。”\n\n流放大陆感知到了一支渺小车队的启程，空气中响起犬吠声、欢呼声和金属与冰雪的摩擦声。这感觉很熟悉，以前也发生过类似的事情，那群先行者也同样乐观，但他们的结局并不尽如人意。"
 antarctica_aaa_op90prep.920.a:0 "车队消失在白茫茫的冰雪荒野。南纬90行动已经正式开始。"
 antarctica_aaa_op90prep.920.a.tt:0 "§L请将游戏速度设置为§Y3§!，以确保探险机制流畅运行。如果电脑速度较慢，你可以尝试使用速度§Y4§!进行游戏。你可以使用§Y+§!、§Y-§!键调整探险时的游戏速度。\n\n请确保在探险开始前，游戏未处于暂停状态。§Y你不需要在探险途中暂停游戏§!，其时间由机制负责处理。\n\n此外，推荐禁用决议面板菜单中的“新闻弹窗”功能，以获取更佳的沉浸式体验。\n\n§O在按下这个按钮之前，确保你已经做好了一切准备。一旦探险开始，你就不再能调整设定。§!我们也建议在此时存档游戏。§!"
 antarctica_aaa_op90prep.1000.t:0 "波澜骤起的清晨"
 antarctica_aaa_op90prep.1000.desc:0 "此时正是圣马丁站的清晨。和往常一样，普哈托比大多数人都起得更早。他穿好衣服，裹上防风雪大衣，走出房间，脚步轻快，掠过许多半睡半醒的人们身旁，然后轻手轻脚地打开门，开始自己的慢跑晨练。\n\n许多人都觉得南极洲沉闷无趣，但普哈托绝不会作如是想，他喜欢这个地方。他喜欢雪花在阳光下闪闪发亮；他喜欢跑步时靴子踩踏坚冰时发出的声响；他喜欢在橙黄色的建筑之间奔跑而过；他喜欢南极空气迎面扑来的感觉，那寒意比任何咖啡都更能提振精神。他十分感激自己能在这里，在他热爱的地方，与这么多勇敢的爱国者一起为国效力。\n\n跑完步后，他回到自己的办公室，喝着滚烫的咖啡，吃着最喜欢的早餐肉馅卷饼，一边处理着手头的文件。敲门声咚咚响起，一名副官走进来，向他敬了个礼：“准将。”然后把一封信放在他的办公桌上，转身离开。\n\n普哈托打开信封，阅读起来。这是一份侦察兵的报告，其中称，有数量不明的美国人员进驻了他们位于斯托宁顿岛的南极基地：东站。这引起了普哈托的注意，东站地处偏远，没有什么战略价值……但离圣马丁站很近。他赶忙查阅更多的资料，发现越来越多未经证实的报告称，在阿根廷领地上有OFN巡逻队和雪橇队活动的迹象。偏偏，此时正是南纬90行动的节骨眼上……\n\n普哈托双眼睁大，他意识到了这意味着什么：OFN南极洲事务局已经知道了阿根廷的南极探险计划。他慌忙搬过打字机，必须尽快把这个消息告诉莱亚尔。"
 antarctica_aaa_op90prep.1000.a:0 "OFN在筹划着什么事情。"
 antarctica_aaa_op90prep.1010.t:0 "拧不紧的水龙头"
 antarctica_aaa_op90prep.1010.desc:0 "当莱亚尔上校听到这个消息时，他简直不愿意相信。埃斯佩兰萨站截获了一份发往日本领南极地域某处的电报，这证明，不仅基地里存在内鬼，而且日本人也已经完全掌握了南纬90行动的经纬。\n\n在许多方面，日本都是南极大陆上的未知数。虽然他们与埃斯佩兰萨站保持着相对友好的关系，但不明确的动机和无懈可击的情报部门都为日本的存在蒙上了一层不祥的阴影。\n\n这次安全漏洞很可能给莱亚尔的计划带来灾难性后果，也可能完全没有任何影响，但正是这种不确定性困扰着他。更让他担心的则是内鬼。当探险队启程前往极点时，他需要信任每一位队员，将自己的生命托付给他们，但如果他们中有人可能是间谍……至少也可以说是十分令人不安了。如果真有内奸，他希望不会是他的极地同胞。\n\n尽管如此，莱亚尔并不是个纠结于这些事情的人。在距离埃斯佩兰萨站几英里远的一个偏僻地点，每天的晨间训练仍然继续按惯例展开。上校特意选择了一块地形破碎崎岖的地方，让士兵们在危险的不规则冰层上练习滑雪和驾驶。勘察结果表明，贝尔格拉诺站以南有数公里长的裂隙和冰川，穿过那里并不轻松。\n\n训练开始一个小时之后，雪地车的机械声响和部下紧张的呼吸声中又多出了些什么，那是一种几乎无法辨认的低沉震颤声。透过望远镜，莱亚尔看到了它的来源：一架设计独特日本侦察机。莱亚尔再也无法否认。"
 antarctica_aaa_op90prep.1010.a:0 "日本人已经知道了。"
 antarctica_aaa_op90prep.1020.t:0 "艾莉卡，“祝好运”"
 antarctica_aaa_op90prep.1020.desc:0 "深夜，阿根廷南极研究所空空荡荡，只有一名外交官还在伏案工作。胡安·卡洛斯·贝尔特拉米诺的办公桌上摆满了旧羊皮纸、外交公报副本和各种文件，对阿根廷的声索而言，这些都很重要。他伸手拿起放大镜，仔细端详着一张旧地图碎片上的潦草西班牙文。他在笔记本上记下了重要的单词和日期，希望借此强化论据，证明阿根廷在南极洲的努力有历史先例可循。\n\n事实证明，这是一项相当驳杂的工作，因为必须要追溯到几个世纪以前的历史。贝尔特拉米诺此时正在关注拉普拉塔河总督辖区在1778年收到的一封信，其中强调了过去两年内的领地重组，并详细叙述了新的政区边界。这当然可以解释为南极洲也被包括在内，当然，当时南极洲还不为人所知，但这也没那么重要。贝尔特拉米诺全神贯注，甚至都错过了轻轻的敲门声，在来人重复两次之后，他才终于注意到，从文件堆中抬起头。进来的是他的秘书，手里拿着一份外交公报。\n\n信息非常简洁名明了：德国驻布宜诺斯艾利斯大使已经知晓南纬90行动。罗阿尔·阿蒙森是一名自豪骄傲的雅利安人，由于其拥有挪威国籍，他也属于现今的德国，并于1911年率先到达南极点，证明了日耳曼种族对世界其他各种族的优越性。公报以失望的语气作结，德国大使遗憾地表示，虽然两国之间关系友好，但阿根廷却没有将其在南极的雄心告知德国。在寒冷的南极大地上，两国都必须应对扬基佬的背叛。不过，德国大使还是祝阿根廷好运。他声称，合作会带来许多收获……\n\n贝尔特拉米诺将笔记放在桌子上，双手微微颤抖着。问题在他脑海中飞速旋转：他们是怎么知道的？为什么要祝他们好运？为什么要向他这样一个职位不高的外交官提议结盟？"
 antarctica_aaa_op90prep.1020.a:0 "这是大使个人的举动吗？"
 antarctica_aaa_op90prep.1030.t:0 "飞行员的悲观探查"
 antarctica_aaa_op90prep.1030.desc:0 "奥莱扎空军中校紧张地注视着身下反光的白色荒原，一定有路能穿过大裂谷。他和飞行员们加班加点，在贝尔格拉诺站南方寻找任何可能的路线。今天，奥莱扎终于找到了突破口，但令他沮丧的是，事态并没有好转。\n\n下击气流把他带到了通常的巡航高度以下，他才第一次注意到了意外的情形。奥莱扎觉得，这就像是密封条一旦破损，气流就会紊乱一样。他再次下降高度，探查出现异常的地方。\n\n“指挥部，狂人呼叫。我正在调查贝尔格拉诺站以南约五十公里处的异常情况。”\n\n“狂人，指挥部呼叫。收到，通信良好，随时报告行动。”\n\n侦察结果并不乐观，地上看起来有雪地车的痕迹，方向则指向海岸。奥莱扎沿着痕迹一路向前，但油量渐渐减少，他无奈地返回了基地。\n\n奥莱扎用无线电向贝尔格拉诺站报告：“指挥部，狂人呼叫。正在返航，发现通往海边的雪地车车辙。南纬90行动的路线可能会被破坏。”\n\n无线电另一端传来一阵骚动，但操作员强迫房间里的人都安静下来。奥莱扎从回复中感觉到了咬牙切齿的情绪，他刚刚掀起了一场风暴。"
 antarctica_aaa_op90prep.1030.a:0 "“狂人，指挥部呼叫。莱亚尔上校希望你能在返航后立刻亲自向他汇报。”"
 antarctica_aaa_itw.10.t:0 "决定，决定"
 antarctica_aaa_itw.10.desc:0 "劳尔坐在阿根廷南极研究所后勤办公室里。他的办公桌上摆放着各种文件，上面都盖着“批准”或是“拒绝”字样的印章。\n\n他叹息一声，喝了一口咖啡，努力提醒着自己喜欢这份工作。\n\n又一封信寄来了，白色大号信封上印着阿根廷南极属地的徽章。劳尔拿出拆信刀，取出信纸，读了起来。\n\n信中请求向南极运送更多的物资：军火、食物以及其他南极所需的各种各样的东西。劳尔只是考虑了片刻，这并不是个很难做出的决定。老实说，他们要求的东西真是不少，不过，研究所给他们攒的钱也不少。他提起了旁边的印章。\n\n突然，有人叫了他一声：“劳尔！急信。”他的下属把又一个新信封放在他的桌子上，然后转身走开。劳尔打开信，是军方寄来的，他们要求把多余的物资转用于意土战争。\n\n劳尔站起身来，开始踱步思考。研究所不可能同时为两方提供资金，他默默地与自己争论着哪个选择更好。最终，他点了点头，回到办公桌前，举起印章……"
 antarctica_aaa_itw.10.a:0 "国防部不急缺物资，但我们在南极的工作对阿根廷的国家安全至关重要。"
 antarctica_aaa_itw.10.b:0 "没有这批物资，莱亚尔上校也能再多撑些日子。参加这场战争，我们才能和意大利继续维持良好的关系。"
 antarctica_aaa_itw.20.t:0 "触手可得的军需"
 antarctica_aaa_itw.20.desc:0 "埃尔南·普哈托独自一人站在圣马丁基地的一个瞭望平台上。午后的寒风吹拂着他单薄的棕色夹克翻领。头顶之上，成群的南极鹱在空中飞舞，在缓缓飘动的橙白相间的云彩之中滑翔。在麦克拉里冰川，灰白色山丘上的冰层映射的光线朦胧，透出一种阴冷的氛围，为原本蔚蓝的天空平添几分暗淡。\n\n普哈托呼吸着寒冷的空气，想起了圣米凯拉号，那艘1951年首次穿过玛格丽特湾灰色岛屿的货轮。货轮停泊后，普哈托随即紧锣密鼓地开始工作。十二天后，圣马丁基地的落成典礼如期举行。此后，他被晋升为准将，负责保卫这片广袤大陆属于阿根廷的一角的安全，并促成了这里的空前发展。\n\n圣马丁站已经成为了阿根廷势力扩张的中心。在与半岛联系日益紧密的今天，它提供的天气报告对导航和后勤工作至关重要。普哈托无比小心地保卫这个枢纽的安全。他锐利的目光时刻紧盯着防空炮台和海岸岛屿上的岸防炮。他熟知这座他倾注心血打造的基地周围的每一个炮台、掩体、燃料库和坑道的位置。\n\n阿根廷的所有南极属地都应该如此。每个基地都是一个永久性的堡垒，没有什么能将其破坏。基地与基地之间遥相呼应，编织成一张紧密的势力网。普哈托看了看表，摇了摇头。一批军用物资本应在今天早些时候运抵。\n\n仔细想想，正当研究所筹备南纬90行动的时候，还有些疯子竟然想把资源投入到中东混战里去。普哈托心中嘲笑着，裹紧了外套。很多阿根廷人甚至不知道中东在哪。"
 antarctica_aaa_itw.20.a:0 "我们的目光应该聚焦于我们的家园，我们的物资应该用于保卫我们的领土。"
 antarctica_aaa_itw.20.a.tt:0 "§F我们将获得§W10补给§!£Antarctica_texticon_SUP 和§R10军事点数§!£Antarctica_texticon_MIL 。§!"
 antarctica_aaa_itw.30.t:0 "圣战"
 antarctica_aaa_itw.30.desc:0 "士官学院的所有操练都无法让克里斯托弗·奥约拉-雷耶斯一等兵完全准备好去面对现实战场的残酷，但确实能有所帮助。他和部下以及众多民兵正在一起保卫巴勒斯坦的一处公社。\n\n子弹从头顶呼啸而过，克里斯托弗心急如焚。然而，为了他的士兵、为了圣地，他必须要坚守阵地。他一度以为，自己来这里参战只是为了意大利-阿根廷联盟的友好姿态而已。\n\n然而，解放耶路撒冷时，事实证明他错了。他们在圣墓教堂共同度过了一天，克里斯托弗意识到了阻挡土耳其人的进攻是多么重要。尽管犹太人和穆斯林之间存在摩擦，但事实证明他们可以共同守护这座世界上最神圣的城市。必须要保卫他们的土地，土耳其人不能在黎凡特为所欲为！\n\n“一等兵！”列兵巴尔托洛的呼喊将他从恍惚中唤醒。巴尔托洛是他们和民兵的联络人。\n\n“什么事，列兵？”克里斯托弗在枪声中大吼道。\n\n“是锡安民兵的联络，他们的指挥官约阿夫说援军来了！”巴尔托洛急切地喊道。\n\n克里斯托弗笑着说：“这真是个好消息。快去告诉阿拉伯人！我用无线电联系指挥部！”当巴托洛冲下战壕时，克里斯托弗想着，多么幸运，到现在还没有部下阵亡，所有中弹的伤员都在友军后方接受治疗。照这样下去，每个人都能身披绶带，光荣归家。然而，就在克里斯托弗转身去找他的无线电报务员的那一刻，异变陡生。一颗子弹穿透了报务员，鲜血从他的脖颈喷涌而出。克里斯托弗咬牙切齿，小心翼翼地从部下中第一名牺牲者的身上取下通讯背包："
 antarctica_aaa_itw.30.a:0 "“呼叫指挥部，我是16频道的奥约拉-雷耶斯一等兵。请求命令？完毕。”"
 antarctica_aaa_itw.40.t:0 "回忆"
 antarctica_aaa_itw.40.desc:0 "奥约拉-雷耶斯一等兵曾希望阅兵式能让他振作起来，但现在，这却只会让他更加痛苦。在战斗时，他一直做着白日梦，幻想着自己和自己所在的部队在回国后将会参加的胜利大阅兵。他兴奋地等待着自圣战胜利归来时万人空巷的庆祝；他想象着人群列队欢呼，抛洒鲜花，到处都是迷醉的青春少女。事实上，就在他做着白日梦的时候，散兵坑突然遭到了袭击。\n\n他最终没能参加阅兵式，而是只能在人群中闷闷不乐地等待着衣着光鲜的“英雄”们列队行进。当他们走近时，雷耶斯还看到了在冲突中根本没有参加任何行动的部队方阵，甚至有些受阅队伍都从未去过黎凡特，这不禁让他嗤之以鼻。身着军礼服队列走过时，雷耶斯看到了他们雪亮的刺刀，本能地用已经不存在的手指摸了摸自己的眼罩。\n\n队列端着刺刀走过，雷耶斯却被拉回了那一天的散兵坑，富有节奏的正步声渐渐变成了枪声：疯狂的枪声，战友被土耳其人刺刀刺穿时眼中的惊慌，冲锋随之而来。接下来几个小时里，士兵从他的散兵坑旁经过，而他只能躺在最亲密的战友的尸体旁装死，眼睛和手上鲜血止不住地流淌。\n\n雷耶斯从恍惚中清醒过来，发觉人们正盯着他啜泣的脸庞。雷耶斯擦干眼角的泪水，转身穿过人群，以最快的速度回到了家中。"
 antarctica_aaa_itw.40.a:0 "斧头会忘记，但树会记得。"
 antarctica_aaa_itw.50.t:0 "晨间公事"
 antarctica_aaa_itw.50.desc:0 "“十六、十七、十八、十九、二十……”希罗上尉叹了口气，俯卧撑做完，晨练结束。在南极生活，必须要保持强健的体魄，这是他的信条。上尉站起身，走到与总部相连的小厨房里，准备生火煮个鸡蛋。\n\n在南极大陆，鸡蛋是个稀罕物，它们不易保存，也很难运输。希罗好不容易才拿自己的干肉饼和一名路过的海员做了交换，才终于有机会吃到他心爱的煮鸡蛋。\n\n热水烧开，上尉打开了收音机。“在圣地的沙漠战争中，四处烧杀抢掠的土耳其人已经击败了意大利帝国。”新闻主播念诵着新闻稿，“土耳其共和国总统伊斯麦特·伊诺努宣称其‘战胜了意大利帝国主义者’。我国听众都知道，阿根廷许多虔诚的天主教青年也为保卫基督的土地而献出了生命。接下来将播报他们的名字，让我们缅怀英勇的烈士……”\n\n希罗一脸悲痛，为什么？为什么阿根廷要把自己的孩子送到离家天涯海角的地方，去参加一场毫无意义的外国战争？南极洲迫切需要勇敢的灵魂，他甚至不敢去细想其中付出的代价。\n\n“……格拉西亚纳·托斯卡诺中士、丹特·阿尔瓦雷斯少尉、克里斯托弗·奥约拉-雷耶斯一等兵、米奥·卡斯蒂略列兵。我们向士兵们的家属表示衷心慰问，请永远铭记，他们现已在天堂，身坐在基督的手边。”希罗关掉收音机，坐下来吃早餐。他必须重新专注于今天的任务，在这片大地上，头脑发昏就意味着离死不远了。"
 antarctica_aaa_itw.50.a:0 "为国捐躯……"
 antarctica_aaa_arg_reaction.10.t:0 "焦吐司，好消息"
 antarctica_aaa_arg_reaction.10.desc:0 "莱亚尔上校嚼着烤焦的黄油吐司，面包屑掉落在文件上。此时正值清晨，夜班卫兵可能正在进行最后一班巡逻。现在是埃斯佩兰萨站难得的宁静时刻，但对莱亚尔来说，即使在这宁静的夜晚，他也无法从工作中解脱出来。生活在南极洲常常会让人觉得自己身处另一个星球，远离家乡的诸多琐事。然而，事实并非如此，如果没有与祖国联系的生命线，冰原上的生命很快就将陷入绝境。无名官僚的一笔一画，都可能意味着基地每个人的生死存亡。问题在于，本土对他们的支持从未稳固过。莱亚尔每天都会阅读有关当前政治危机的简报，字里行间无不证明着他的担心并非杞人忧天。埃斯佩兰萨站陷入冰点时，布宜诺斯艾利斯却在政治动荡的烈焰中燃烧。\n\n然而，出乎莱亚尔的意料，火势似乎渐渐弱了下来。弗朗迪西上台时，很少有人想到他居然能撑下来。事实上，莱亚尔已经做好了阿根廷民主行将就木的准备。然而，奇迹出现了，看起来笨手笨脚的弗朗迪西击碎了军方和庇隆主义者的阴谋，并且看起来还会在下一个选举季胜选而继续执政。阿根廷民主的罕见胜利让持自由观点的莱亚尔欣喜不已，但更重要的是，它也预示着探险远征的未来。乱局之中，政治家总是会重新考虑优先事项。被锁在办公室里或者在走廊上躲子弹的时候，大概政治家们的心情也不会太好。\n\n莱亚尔可以松一口气了。但虽说如此，他也没有完全放下心来，即将到来的选举很可能会是引爆更大烈火的火星。"
 antarctica_aaa_arg_reaction.10.a:0 "甚至南极也会因此而熊熊燃烧。"
 antarctica_aaa_arg_reaction.20.t:0 "温暖"
 antarctica_aaa_arg_reaction.20.desc:0 "莱亚尔上校嚼着烤焦的黄油吐司，面包屑掉落在文件上。此时正值清晨，夜班卫兵可能正在进行最后一班巡逻。现在是埃斯佩兰萨站难得的宁静时刻，但对莱亚尔来说，即使在这宁静的夜晚，他也无法从工作中解脱出来。生活在南极洲常常会让人觉得自己身处另一个星球，远离家乡的诸多琐事。然而，事实并非如此，如果没有与祖国联系的生命线，冰原上的生命很快就将陷入绝境。无名官僚的一笔一画，都可能意味着基地每个人的生死存亡。问题在于，本土对他们的支持从未稳固过。莱亚尔每天都会阅读有关当前政治危机的简报，字里行间无不证明着他的担心并非杞人忧天。埃斯佩兰萨站陷入冰点时，布宜诺斯艾利斯却在政治动荡的烈焰中燃烧。\n\n弗朗迪西没能撑过政敌的阴谋诡计，新面孔何塞·马里亚·吉多取代了他的位置，这印证了上校的猜测。莱亚尔对这个人并不熟悉，自他离开首都后，对阿根廷政坛变幻多端的流氓派系的了解就越来越少。就莱亚尔所知，新总统不是出自红派的鹰派人物，这至少能说明一些问题。莱亚尔心中的自由主义观点隐约希望吉多是个好人，不会让阿根廷的民主再次崩溃，但他最关心的是，为了这次探险远征，吉多能否保证基本的稳定。乱局之中，政治家总是会重新考虑优先事项。被锁在办公室里或者在走廊上躲子弹的时候，大概政治家们的心情也不会太好。\n\n莱亚尔突然觉得胃有点涨，他把吃了一半的吐司推到一边。阴谋对国家的未来可不是什么好兆头，吉多很可能已经在煽风点火了。"
 antarctica_aaa_arg_reaction.20.a:0 "甚至南极也会因此而熊熊燃烧。"
 antarctica_aaa_arg_reaction.30.t:0 "吐司与苦涩的日子"
 antarctica_aaa_arg_reaction.30.desc:0 "莱亚尔上校嚼着烤焦的黄油吐司，面包屑掉落在文件上。此时正值清晨，夜班卫兵可能正在进行最后一班巡逻。现在是埃斯佩兰萨站难得的宁静时刻，但对莱亚尔来说，即使在这宁静的夜晚，他也无法从工作中解脱出来。生活在南极洲常常会让人觉得自己身处另一个星球，远离家乡的诸多琐事。然而，事实并非如此，如果没有与祖国联系的生命线，冰原上的生命很快就将陷入绝境。无名官僚的一笔一画，都可能意味着基地每个人的生死存亡。问题在于，本土对他们的支持从未稳固过。莱亚尔每天都会阅读有关当前政治危机的简报，字里行间无不证明着他的担心并非杞人忧天。埃斯佩兰萨站陷入冰点时，布宜诺斯艾利斯却在政治动荡的烈焰中燃烧。\n\n每看过一段，莱亚尔的焦虑和失望就增加一分。最糟糕的事情发生了，某个军方派系推翻了弗朗迪西。短命民主绝望地咽下了最后一口气，威权的军靴再次踩上人民的咽喉，阿根廷历史的大轮回再次开始。莱亚尔心中的自由梦想在啜泣，但这次政变对探险行动有着更紧迫的影响。刚刚掌权的红派始终对莱亚尔的南极任务持怀疑态度，认为这只是“为了发现而发现”。对他们而言，南极领土是未来扩张的滩头阵地，是让对手头破血流、重振民族征服者精神的机会。从现在起，莱亚尔不得不拼尽全力去争取每一点点微小的支持，被红派取而代之的威胁时时刻刻笼罩在他的头顶。\n\n虽然本土政局不稳定始终是探险行动的威胁，但莱亚尔还是不禁期盼着，希望人们能挺身而出，反抗暴君，赴汤蹈火，在所不辞。"
 antarctica_aaa_arg_reaction.30.a:0 "自由之烈焰永不消亡。"
 antarctica_aaa_arg_reaction.40.t:0 "投票箱"
 antarctica_aaa_arg_reaction.40.desc:0 "萨瓦拉少尉在迷宫般的橙色建筑群中狂奔，靴子下的积雪嘎吱作响，冰冷的寒风拂过脸庞。\n\n他差点滑倒在冰面上，站稳之后，他又继续向前跑着。他听到一辆雪地车急刹车的声音，司机冲他怒吼着。“对不起，对不起！”萨瓦拉高声道歉，脚步丝毫不停。\n\n他在越来越密集的人群中穿行，最终走进了食堂大门。这里已经改造成了大选的投票站。\n\n萨瓦拉排在队伍的最后面。橙色的大楼、橙色的投票站、每个人都穿着相同的橙色外套。在埃斯佩兰萨站，这种颜色仿佛是人工与自然的分界线。\n\n队伍很长，前进的速度非常缓慢。\n\n尽管如此，萨瓦拉依旧决心投下自己的一票。阿根廷的选举总是很混乱，而且人们能感觉到，军队的行动正愈发反复无常。他很高兴，在这个全世界民主式微的时代，自己还能拥有投票的权利。\n\n他突然觉得，排队投票的队列看起来有点像企鹅群，蹒跚晃悠着走进投票亭。企鹅投票，真是个有趣的想法，希望企鹅的民主能比阿根廷的民主更稳定。\n\n萨瓦拉意识到自己已经走进了投票亭，他从闹剧般的白日梦中清醒过来。少尉眨了眨眼睛，投下了自己的一票。"
 antarctica_aaa_arg_reaction.40.a:0 "每次选举都可能会是最后一次。"
 antarctica_aaa_op90.10.t:0 "第一日"
 antarctica_aaa_op90.10.desc:0 "在贝尔格拉诺站消失在地平弧线之下很久之后，南纬90行动开始的兴奋依然伴随着莱亚尔和探险者们。\n\n莱亚尔坚持要当领头雪地车的第一班司机。这不是短跑比赛，而是一场马拉松；上校驾轻就熟地操控着雪地车，透过冰霜欣赏着窗外的风景。\n\n阵阵狂风将闪烁的冰晶帘幕抛洒向车辆和雪橇队。\n\n阳光穿过缥缥缈缈的云层，在山峰下映照出长长的阴影。\n\n这就是生活，这就是人生。\n\n几个月、甚至几年以来，这是莱亚尔第一次感到满足，他生来就是要完成这样的使命。\n\n上校与同乘一辆雪地车的队员们愉快地交谈着，他是完美的伙伴。\n\n希罗和奥莱扎两人探查的路径无可挑剔，第82巡逻队的标记也十分醒目。在莱亚尔雪地车的前面，哈士奇犬拉着满载生存必需物资的雪橇小跑着。\n\n它们仿若在一面又一面标记小旗之间翩翩起舞，似乎和主人一样为外出探险而欢欣鼓舞。\n\n南极洲的奇景没有迷惑莱亚尔，他的注意力集中在冰面的触感、地平线上的天气以及车队的速度上。目前为止，所有一切都很好，只要一切都像现在这样顺利，探险队就能按时到达极点。"
 antarctica_aaa_op90.10.a:0 "活着真好！"
 antarctica_aaa_op90.20.t:0 "人与机器"
 antarctica_aaa_op90.20.desc:0 "目前为止，南纬90行动证明了机动车辆是穿越南极大陆最迅速的工具。\n\n自斯科特时代以来，这些机器的可靠性已经有了很大的提高，只要保养得当，它们就能带着队员往返极点。\n\n希罗对轮班驾驶的塞皮准尉如是感慨道。\n\n塞皮回应道：“人、狗、机器都一样，本没有什么分别。不同的只是机器比人更容易修好，还比狗更听话。”说着，塞皮不由得笑了起来。\n\n希罗也笑了，但他的想法略有不同。他想起了自己在严冬穿越南极大陆的艰难旅程。将他们安全领到圣马丁站的是雪橇犬，而不是雪地车。\n\n虽然雪地车的速度无可比拟，但如果没有狗拉雪橇队的引导，它就毫无用处。\n\n当他们翻过一处高地时，雪地车猛地颠簸起来，发动机呜呜作响，几乎熄火，但很快又恢复了轰鸣的节奏。\n\n“看到了吗？”塞皮说着，“姑娘们会带我们穿过大裂谷，很快就能到达极地高原，插上我们的国旗。”\n\n“有你和你的机械师一起，我毫不怀疑。”希罗回答道。"
 antarctica_aaa_op90.20.a:0 "每个人都是机器中的一个齿轮。"
 antarctica_aaa_op90.30.t:0 "第一日的结束"
 antarctica_aaa_op90.30.desc:0 "十月的南极“夜晚”不过只是短短几个小时的灰暗黄昏。随后，太阳就会重新升起，漫长的白天再度开始。最终，南纬90行动的队员们在旅途中会始终有太阳相伴。\n\n没有黑夜并不意味着不需要休息，对人或是狗都一样，而后者往往才是衡量探险队疲惫的真正标准。\n\n太阳当空照，人也不会感到十分疲惫。持续不断的白昼会扰乱人体的昼夜节律，使他们产生精力充沛的错觉，疲劳则会悄然而至，在最危险的时刻袭来。\n\n莱亚尔深知这一点，当他察觉到雪橇犬的速度开始变慢、注意力渐渐不集中时，便迅速叫停了第一日的行动。他指挥雪地车围成一个圈，帮助大家挡风，并让大家在中间搭起帐篷。雪橇犬在能容身的地方互相依偎着，把自己埋在雪窝里，似乎对寒冷无动于衷。\n\n莱亚尔慢悠悠地走到希罗的帐篷前，上尉已经把气炉打开了。“咖啡？”希罗提议道。\n\n“当然。”莱亚尔说着，接过希罗递来的咖啡，咕嘟咕嘟地喝了起来。“作为第一天而言，还不错。一切按照计划顺利进行，每个人都兴致勃勃，雪橇犬看起来也都很健康。”\n\n“还是有点不敢相信，我们真的做到了。每走出一英里，我们就离海岸……和海军更远一些，让我很是激动。”\n\n莱亚尔一边点头，一边坐下来，将一天的事情记在正式的探险日志里。"
 antarctica_aaa_op90.30.a:0 "‘第一日结束：探险状况良好，期待明天的……’"
 antarctica_aaa_op90.40.t:0 "大裂谷"
 antarctica_aaa_op90.40.desc:0 "莱亚尔在雪地里跋涉，暴风雪迎面吹来，他跟着车队来到希罗和塞皮的雪地车旁。队伍没能找到下一个标记后，车队在大裂谷的边缘停了下来。\n\n莱亚尔已经亲自带着雪橇队去找过了，但还是没能找到。他爬上希罗和塞皮的雪地车，告诉他们：“没找到那鬼东西。暴风雪可能是把它吹翻了，或者干脆把它给埋得找不着了。”\n\n另外两人交换了一下眼神：他们都不希望在没有路标指引的情况下穿越大裂谷。所谓大裂谷，实际上是指一片面积极为广阔的不稳定冰层，连接两个相对较为安全的冰盖，其中密布着锋利的冰柱，可能会让雪地车趴窝，也可能会让搭乘雪橇上的队员受伤。大裂谷中还有数不清的裂隙，可能会将车队整个吞没下去。这是他们行进路线上最危险的路段。\n\n希罗说道：“我们知道标记的大致轨迹。如果派出一支雪橇队，参照地图和预计下一个标记的位置前进，他们就可能找到要走的路。我们甚至可以只派几个人去测试冰盖的情况，这需要更长的时间，但也更安全。”\n\n“雪地车可以更快地抵达下一处标记，”塞皮提议道，“并确认接下来的行进路线，但车辆可能会遭遇撞击。”\n\n“或者，”莱亚尔也思考着，“我们可以让车队全体沿着预计路线前进……尽管有风险，但我们可以避免重大延误。”\n\n雪花纷飞，狂风呼啸，他们权衡着各个选择。"
 antarctica_aaa_op90.40.a:0 "诸多艰难险阻中的第一个。"
 antarctica_aaa_op90.50.t:0 "临时露营"
 antarctica_aaa_op90.50.desc:0 "现在轮到希罗开车了。尽管他们找到了下一处标记，但穿越大裂谷的紧张感丝毫没有减轻。\n\n他目不转睛地盯着面前的狗拉雪橇。他们决定，在雪地车队穿越大裂谷时，必须要有一架雪橇在前面领头，这样雪地车就能提前预警到尖锐的路障还有陷阱。\n\n有人领头并没能让希罗如释重负，他的指关节仍然用力得发白，双手紧握着控制杆，沿着雪橇标出的狭窄道路前进。\n\n挡风玻璃上的雨刷来回摆动，扫除着玻璃上的落雪，随着暴风雪渐渐减弱，雨刷器的频率也缓缓降低。\n\n希罗睁大眼睛，前方雪橇犬的身影越来越清晰。几分钟后，他辨认出了大裂谷的另一头。\n\n风雪将散。\n\n远处，他看到了几个黑影在裂谷中间移动，他前面的雪橇队员也放慢了速度，指着那群黑影欢呼起来。希罗把脚从油门踏板上移开，拿出望远镜观察起来，雪橇犬、雪橇和一个半边掩埋的帐篷浮现在视野之中。\n\n希罗拿起对讲机，报告道：“上校，我们找到第82巡逻队了！他们正在大裂谷中央扎营，等待暴风雪过去。”\n\n“噢，戈茨，你这个了不起的混蛋。”莱亚尔笑骂道，“用最快的速度和他们汇合！他们会带我们离开这个倒霉地方的。”"
 antarctica_aaa_op90.50.a:0 "希罗将油门踩到了底。"
 antarctica_aaa_op90.60.t:0 "另一边"
 antarctica_aaa_op90.60.desc:0 "最后一辆雪地车离开大裂谷时，身后的冰层应声裂开。旅程十分艰辛，每个队员的神经都承受着巨大的压力。\n\n但与戈茨少尉和第82巡逻队的汇合让大家都重新振作起来。他们敏锐地引导车队穿过了余下的危险冰面，现在两支小队都停下来，好让他们紧张的精神、身体、雪橇犬和机械都能喘上一口气。\n\n人们爬出雪地车，砰地一声关上门，雪花扑簌簌地掉了下来。他们享受着晴朗的天空，平静的风，许多个小时以来第一次尽情舒展身体。莱亚尔上校和希罗上尉借此机会和戈茨少尉见了一面。“我们本来想在大裂谷另一边和你们碰头的，”戈茨说道，“但是暴风雪把我们困住了，所以嘛，被你们赶上了。”\n\n“在我们建立索夫拉尔基地的时候，穿越大裂谷可没这么难。”希罗如是告诉莱亚尔。\n\n“上次我们没有遇到暴风雪。”戈茨也附和道。\n\n“我们做到了，”莱亚尔说道，“这才是最重要的。现在我们要去下一个目标：圣菲山脉。当然，是在索夫拉尔基地休整一下之后。少尉，我深信，你和岩石有个约定啊。”\n\n戈茨笑着：“巡逻队很兴奋能成为首批进入圣菲山脉的人类。”\n\n“当然，当然。毫无疑问，在探险队中，你们和要把国旗插上南极点的我们同等重要，追求科学进步和维护领土完整一样高尚。”\n\n没过多久，队伍继续开拔。"
 antarctica_aaa_op90.60.a:0 "前往索夫拉尔基地和圣菲山脉。"
 antarctica_aaa_op90.70.t:0 "偏航"
 antarctica_aaa_op90.70.desc:0 "罗伯托·翁贝托·卡里翁上士和阿道弗·奥斯卡·莫雷诺上士是南纬90行动的测绘员兼制图员，他们仔细研究了希罗上尉在过去一年中绘制的地图。\n\n穿过大裂谷后，车队出现在地图上的某个未知区域附近。他们停下来，好让卡里翁和莫雷纳的导航仪器得到准确的读数。\n\n“基本上讲，”卡里翁说道，“第82巡逻队为我们开辟的路线和我们预期中不同。”\n\n希罗点点头：“意料之中。大裂谷的冰层变幻无常。”\n\n“所以我们现在的选择，”卡里翁继续说道，“就是沿着裂谷边缘往回走，回到我们绘制过的区域……”\n\n“或者开辟出一条新的、可能更短的路线，穿过未知区域，并且在前进的过程中绘制地图，”莫雷诺接着说道，“补充一下，这对我们的领土主张有益无害，因为这能进一步巩固阿根廷对内陆的控制。就个人而言，我赞成这个办法。”\n\n“我保留意见，”卡里翁说道，“我们可能会偏离预定路线更远，甚至更糟，走到某处空心冰川上。”\n\n希罗将莱亚尔上校叫过来，向他解释了情况。上校做出了他的决定。"
 antarctica_aaa_op90.70.a:0 "“我们已经偏离预定路线相当远了。原路返回慢是慢些，但是安全。”"
 antarctica_aaa_op90.70.a.tt:0 "总行进里程§R减少§!§M20km§!。"
 antarctica_aaa_op90.70.b:0 "“依照阿蒙森的精神，我们要走出自己的路。”"
 antarctica_aaa_op90.70.b.tt:0 "总行进里程§R减少§!§M0km§!。"
 antarctica_aaa_op90.80.t:0 "雪橇"
 antarctica_aaa_op90.80.desc:0 "雪地车真正携带物资补给的能力要看它后面拉着的雪橇。\n\n这就是机械化载具彰显其价值的地方：它们能比任何狗或人运送更多的货物。\n\n南纬90行动的队伍仔细计算了每辆雪橇、燃料、口粮、药品的重量，所有一切都是为了保证雪地车能把雪橇拉到极点，再把雪橇回来。\n\n现在看来，雪橇的旅途不算简单。滑橇损坏，底盘凸出，崎岖的道路和裂隙带来了近乎灾难的损伤。\n\n越过大裂谷之后，探险队终于能评估一下他们遭受的损失。\n\n奥斯卡·拉蒙·阿方索一等兵是巡逻员，但就像极点突击队的其他成员一样，他也身负许多其他任务，其中一项就是修理雪橇。\n\n他陪同莱亚尔上校去看一架损坏更为严重的雪橇。“问题在于，”阿方索说道，“左边的撬板已经支离破碎，底盘摇摇欲坠。我可以用手头的修理工具把它修好，但我们以后可能还会需要工具来修理其他的雪橇或者雪地车。我打算把能带走的东西带走，把这个雪橇留下。”\n\n莱亚尔长叹一声：“我原本希望我们不必这么快就做出这样的抉择。一架雪橇……”他权衡利弊，做出了决定。"
 antarctica_aaa_op90.80.a:0 "“把雪橇修好吧，我们需要带上尽可能多的补给。”"
 antarctica_aaa_op90.80.a.tt:0 "我们将失去§P2§!§g修理工具§!。"
 antarctica_aaa_op90.80.b:0 "“把能带的带走，雪橇留下。到了索夫拉尔基地的时候，我们肯定会需要这些工具。”"
 antarctica_aaa_op90.80.b.tt:0 "我们将失去§P1§!辆§j货运雪橇§!。"
 antarctica_aaa_op90.90.t:0 "南极无线电"
 antarctica_aaa_op90.90.desc:0 "多明戈·萨卡里亚斯上士正在和无线电闹别扭。\n\n他来回转动旋钮，拼命想要锁定贝尔格拉诺站的频率。\n\n南纬90行动原本计划在还处于无线电通信范围内的时候随时汇报情况。当他们继续向南推进时，由于距离拉长和地磁干扰，通信将会困难许多。\n\n既然已经越过了大裂谷，那他们就能趁着这段难得的平静和基地联络一下。\n\n“该死，可能是在途中撞坏了。胡利奥·塞萨尔·奥尔蒂斯三级军士长说道，“里面都乱糟糟的。”\n\n“希望别，”萨卡里亚斯说道，“用手头工具修复可是很麻烦。”他调动了一下频率，然后绕到笨重的仪器后面，在奥尔蒂斯身边半跪下来。“不过，如果能选择的话，我希望现在就解决这个麻烦，与贝尔格拉诺站取得联系。他们可能已经更新了侦察数据和气象报告，如果我们知道接下来会发生什么，行进也能更安全些。”\n\n“没错，”奥尔蒂斯答道，“不过我们以后可能还需要这些工具，用来修理车队内部的无线电。毕竟，彼此之间保持联系比与贝尔格拉诺站保持联系更重要。”"
 antarctica_aaa_op90.90.a:0 "“有道理，”萨卡里亚斯说道，“那我们还是把工具省下来，到真正该派上用场的时候再用。”"
 antarctica_aaa_op90.90.b:0 "修理完毕，两人听到噼啪的静电声，贝尔格拉诺站播发了最新的气象预报。"
 antarctica_aaa_op90.90.b.tt:0 "我们将失去§P1§!§g修理工具§!。"
 antarctica_aaa_op90.100.t:0 "冰寒睡眠"
 antarctica_aaa_op90.100.desc:0 "南极洲内陆的温度比海岸要更加极端，因此所有南极领地都将主要基地设在海岸。即使在夏季，内陆零下50摄氏度的气温也并不罕见。\n\n极寒可以使机械、狗乃至人体彻底失能。南纬90行动已经为这样的温度准备了最适合的冬装：加厚羽绒外套，可以挡风，当然还有面罩、护目镜和隔热手套。\n\n帐篷是全世界最新、最结实的样式，能够抵御狂风和寒冷。\n\n但这一切对豪尔赫·劳尔·罗德里格斯上士而言都只是小小的安慰。他搭起了一个帐篷，在里面瑟瑟发抖，牙齿止不住地打颤。\n\n探险队扎营过夜时，一股寒流突然袭来，温度计示数直逼零下60度。再加上寒风，气温已经接近零下70度。\n\n每一次呼吸都十分痛苦，每一次呼吸都在消耗比上一次更多的能量。在这样的温度下睡觉非常危险，身体的新陈代谢在寒冷的夜间会变慢。\n\n睡着，就可能再也醒不过来了。\n\n罗德里格斯曾向莱亚尔建议，除了探险队的少数应急加热器之外，他们还可以把炉子也打开，为夜间帐篷取暖。\n\n这自然会消耗探险队的生存物资储备，但也会减少冻伤的风险。但是，索夫拉尔基地也已经不远了，他们或许能在那里略作休整。"
 antarctica_aaa_op90.100.a:0 "“打开炉子，”莱亚尔下令，“今晚不会有人冻伤的。”"
 antarctica_aaa_op90.100.a.tt:0 "我们将失去§P1§!§R生存装备§!。"
 antarctica_aaa_op90.100.b:0 "“把物资省下来吧，”莱亚尔说道，“我们坚持到索夫拉尔基地再休息。”"
 antarctica_aaa_op90.110.t:0 "人生巅峰"
 antarctica_aaa_op90.110.desc:0 "埃尔南·普哈托准将是阿根廷南极属地领地之父。\n\n正是他亲口说服了胡安·庇隆总统，开始堪称疯狂的计划，探索这片冰封的大陆，并宣称其属于阿根廷。\n\n他还建立了许多基地，其中也包括1954年建成的贝尔格拉诺站。\n\n他冀望着，阿根廷能永远在南极大陆拥有一席之地，南纬90行动就是此等愿景的一部分。\n\n对普哈托而言，这次极点之行是一生的巅峰时刻，探险队的每个队员都能看出来。\n\n准将身手敏捷，似乎他又回到了那个年轻时的自己。他的自信感染着每一位队员，推动他们再往前进一点、再多坚持一下，发掘出自己从未意识到的潜藏能量与激情。\n\n南纬90行动的队员们开始试着用普哈托的眼光去观察南极大陆。他们并非只是顺从着向极点进发，而是在探索阿根廷久已失散的角落。\n\n这里是他们的土地、他们的祖国，他们要在这里见证阿根廷的辉煌。\n\n白色荒原的征服者挺身站在冰封的岬角上，俯瞰着南极壮丽的景色。他看起来宛若一位神话人物，哪怕漫漫时光也无法将他磨蚀。普哈托知道，这是他一生中最后一次南极探险了，他为此而难过不已，但能亲眼目睹奋斗一生的事业取得成功，就已经是许多人都没能历经的大幸了。"
 antarctica_aaa_op90.110.a:0 "普哈托回首大笑起来，鼓舞着队员们：“小伙子们，打起劲来！我可再也不会变年轻了！”"
 antarctica_aaa_op90.120.t:0 "熵"
 antarctica_aaa_op90.120.desc:0 "不管机器有多新、有多好，狂暴的南极洲依然是无法忽视的因素。在极寒天气中长时间驱动雪地车会导致零件失效、润滑剂冻结、燃料管道结冰，如果不进行定期维护，雪地车就会化作人类狂妄自大的墓志铭。\n\n当然，行动还在计划中的时候，他们就考虑到了这一点。探险队的核心是水平高超的机械师团队，他们可以随时随地整修机械，保证探险队不会陷入裹足不前的困境。\n\n穿越大裂谷并不轻松。到达索夫拉尔基地后，他们需要借助基地辅助人员的协助，花上几天的时间大修雪地车。但在那之前，塞皮和他的团队就只能用手头仅有的工具了。\n\n卡洛斯·吉多·布拉西奥上士绕着他的雪地车转了一圈，察看车况，捕捉着所有可能的损坏痕迹。雪地车颤抖着停了下来，他猜测原因可能是燃料耗尽，但他们刚刚翻过了一道雪脊，布拉西奥希望能够排除可能因此而造成底盘悬挂损坏的可能性。他检查一番，发现车外部什么痕迹都没有，于是翻开了引擎盖。\n\n发动机也没坏。部件表面确实有腐蚀，但这是雪地车长时间在海岸附近工作的结果，还不足以让雪地车停下来。\n\n他把手伸进发动机深处，摸索着寻找燃油管道。“啊，”布拉西奥对塞皮喊道，“我摸到了，燃油管路里有冰——妈的！”他赶紧把手抽了出来，鲜血滴滴答答地落在发动机上。刚才，生锈的碎片夹住了布拉西奥的手掌，划破了他的皮肤。“消毒水、绷带！”他嘶嘶着倒抽冷气，“狗娘养的啊。”"
 antarctica_aaa_op90.120.a:0 "“行吧，至少这台雪地车不是坏了……”"
 antarctica_aaa_op90.120.a.tt:0 "§W卡洛斯·吉多·布拉西奥上士§!§P轻微受伤§!"
 antarctica_aaa_op90.130.t:0 "前路"
 antarctica_aaa_op90.130.desc:0 "一般时候，莱亚尔上校和希罗上尉会分开驾驶雪地车，一辆在前，一辆在后。这是为了将领队分开，免去领导层在某次事故中全军覆没的可能性。\n\n然而，今天早上，莱亚尔要求希罗和他一起坐上了领头的雪地车。车上只有他们两人，谈话唯有天知地知。莱亚尔向他的副手讲述了阿德莱德岛上发生的一切，包括战场上的毁尸灭迹，以及随后普哈托对罗萨里奥号以及圣马丁号水兵们的营救。所有事情都讲完后，希罗惊愕地张嘴呆坐。“所以……这是战争？”他问道。\n\n“智利人不是白痴，马塞拉的把戏骗不了他们多久。但是……毕竟没有确凿的证据，智利很难证明对我们采取行动的正当性。但我毫不怀疑，海军很快就会给智利人递上另一个把柄。马塞拉绝不能容忍失败，他企图把我们赶出管理局，好让海军自行其是。”\n\n“那我们的计划呢？”希罗问道，“我们要怎么打倒马塞拉？”\n\n“首先，将国旗立上极点，这能在短期内保护我们免遭所有潜在的不利政治操纵；第二步，现在已经在进行中了，在马兰比奥岛建立一处空军基地，为我们提供一条独立于海军的补给线路；”莱亚尔停住话头，小心翻过了一道雪脊，“再然后，等我们从极点胜利归来，就要着手建立起志同道合的联盟，要囊括海军基地，甚至是军舰上的水兵。我想，马塞拉的部下已经认识到了他的真面目，也明白他领导下的南极会变成什么鬼样子。”\n\n“他把部下带进了冰天雪地，然后将他们弃之不顾……”希罗说道。"
 antarctica_aaa_op90.130.a:0 "在前往索夫拉尔基地的途中，两位军官筹划着未来。"
 antarctica_aaa_op90.140.t:0 "索夫拉尔基地"
 antarctica_aaa_op90.140.desc:0 "此时早已过了平常的休息时间，但极点突击队和第82巡逻队仍在继续前进。\n\n离索夫拉尔基地只有一公里了。\n\n不知怎地，虽然他们马上就能好好休息、喝点热饮了，但旅程却似乎更加艰难起来。\n\n雪地车和雪橇需要修理，人犬都急需睡眠，所有这些都使最后数百米变成了地狱般的艰难跋涉。\n\n即使已经近在眼前，基地的轮廓依旧模糊不清。\n\n自建立以来，绵延不绝的暴风雪将它掩埋，只剩下屋顶、大门、车库和标志露在外面。\n\n莱亚尔上校迎着寒风，双眼微眯，看见一个孤独的人影站在基地前挥手。\n\n上校笑了起来，将小臂伸出车窗，向他挥手致意。“给油，踩油门！”希罗在无线电里喊道，“我知道佩雷斯那家伙把他的酒都藏到哪儿了！”\n\n雪地车向前冲去，每个人都渴望第一个到达基地。雪橇队加快了速度，在越过最后一段危险的路程后，突击队抵达了南极点前的最后一站。"
 antarctica_aaa_op90.140.a:0 "佩德罗·安赫尔·阿科斯塔少尉敬礼报告：“上校，欢迎来到索夫拉尔基地。”"
 antarctica_aaa_op90.150.t:0 "领袖的命运"
 antarctica_aaa_op90.150.desc:0 "在索夫拉尔基地的第一个晚上，队员们没有做太多的庆祝。经过最后几公里的跋涉，人、犬、机械都已经彻底筋疲力尽了。\n\n阿科斯塔少尉、布里托斯上士和佩雷斯三级军士长带着极点突击队和第82巡逻队的队员们在基地里稍微转了转。\n\n他们很好地继承了希罗上尉的工作。设施维护良好，物资管理细致，住宿条件也称得上温暖。大家能在这里好好休整休整了。\n\n在吃了一顿简单而丰盛的炖牛肉加干面包后，队员们乐观但克制地干杯，敬阿根廷国旗屹立于世界之底的梦想。然后，他们躺上枕头，沉沉睡去。\n\n唯一的例外是莱亚尔上校，他在床上辗转反侧。这就是领袖的命运，时时刻刻忧虑着未来。\n\n他不安地想着接下来的探险征程。他们才出发了几天而已，各种设备器材就已经经受了许多考验。几个星期呢？再长些的时间呢？他们所有的希望和梦想都寄托在这次行动之上，但真的能达到预期的目的吗？马塞拉这样的人不会为了什么象征意义而离开，他会将它践踏在脚下，甚至将之扭曲，只为了达成自己的企图。\n\n与狂妄自大之徒的斗争能以和平画上句号吗？还是说，以暴止暴才是唯一的方法?\n\n莱亚尔不知道答案，他盯着索夫拉尔基地的屋顶，听着风声呼啸而过。"
 antarctica_aaa_op90.150.a:0 "寒风不语。"
 antarctica_aaa_op90.160.t:0 "帮手"
 antarctica_aaa_op90.160.desc:0 "雪地车遭受的损坏比任何人想象中的都要严重，雪橇就更不必说了。事实证明，大裂谷是个可怕的对手，即使已经穿过那里，它给探险队留下的伤口依旧在流血溃烂。索夫拉尔基地配备了维修站，可以进行雪地车的修复。莱亚尔上校希望，在动身前往圣菲山脉前，探险队能保持在最佳状态。雪橇也需要修理，冰脊雪浪已经快让它们彻底散架了。\n\n希罗上尉受命来检查维修情况。他低着头，循着机床声响和脏话传来的方向穿过基地的狭窄通道。他走进维修站，看到一阵火星飞溅。所有机械师都在全力工作，只有布拉西奥例外，他似乎更喜欢用一只手，每当必须用双手抓住什么东西的时候，他就会显得有些畏畏缩缩的。\n\n希罗走近，问道：“一切都好吗？”\n\n布拉西奥敬了个礼，笑着回答道：“长官，一切都好。”\n\n希罗瞟了瞟布拉西奥低下的右手：“把手套摘了。”\n\n布拉西奥勉强答应，摘下隔热手套，露出右手上缠着的绷带。“没什么的，长官，”他急忙分辩道，“只是在穿过大裂谷的时候割伤了，修引擎的时候。”\n\n希罗端详着布拉西奥的神色：“最好让莱亚尔看看。这伤可不算小，布拉西奥，你工作起来显得很吃力。”他带着机械师走到了军官餐厅。\n\n莱亚尔解开绷带，露出的伤口让他面露难色。"
 antarctica_aaa_op90.160.a:0 "莱亚尔让部下们投票，决定由谁来代替布拉西奥。弗洛伦西奥·佩雷斯三级军士长将接过他的职责。"
 antarctica_aaa_op90.160.b:0 "“伤口看起来不严重，也没有感染。”莱亚尔说道，“每天换药，注意伤情，但我觉得不需要换人。”"
 antarctica_aaa_op90.170.t:0 "第十八个名字"
 antarctica_aaa_op90.170.desc:0 "普哈托是最后一个被领进公共休息室的，房间里充满着宛如惊喜生日聚会的气氛。\n\n所有人都兴奋地咧嘴笑着。“好吧，好吧，”普哈托说道，“我之前可是听你们的，好好等着，这到底是怎么一回事啊？”\n\n阿科斯塔转身，向乌戈·奥兰多·布里托斯上士点了点头，后者走到旁边的一张桌子旁，拿起一块光滑的钢板，上面刻着几个大字：“南纬90行动”。\n\n往下看又是一串串潦草的刻痕，记录着极点突击队、第82巡逻队和索夫拉尔基地所有人的名字，总共十七个。钢板最中间留出了大片空白，还能再刻下一个名字。\n\n阿科斯塔开口说道：“尽管索夫拉尔基地可能会在行动结束后就被废弃，但我们认为，最好还是留下些什么，告诉世人我们曾经在这里同居一个屋檐之下，比其他任何南极基地都更深入内陆。如果有朝一日这里能重见天日，那全世界都会知道我们在这里共同取得的成就。我们做到了不可能的事业，应当为人所铭记。”\n\n普哈托慢慢抚摸着光滑的钢板和刻在上面写着的名字，几乎要抑制不住自己的泪水。\n\n布里托斯递给他一把小刀，指了指留出来的空位：“长官，给你留了最好的位置。”\n\n普哈托笑了：“谢谢你们，孩子们，谢谢大家。”他将刀尖抵上了钢板。"
 antarctica_aaa_op90.170.a:0 "第十八个名字：埃尔南·普哈托。"
 antarctica_aaa_op90.180.t:0 "走进未知"
 antarctica_aaa_op90.180.desc:0 "在其他任何基地，上级军官离开时的告别仪式都比此时的索夫拉尔基地更为隆重。\n\n莱亚尔上校并不在意。探险队员都休息得很好，精神焕发，做好了面对一切的准备，希望雪地车和雪橇也是如此。\n\n这就是他所能冀望的一切。\n\n不过，阿科斯塔还是安排了一次简朴的欢送仪式。他的部下在基地外集合，与莱亚尔共同目送戈茨和第82巡逻队渐行渐远，为满载物资的雪地车开路。\n\n“上校，”阿科斯塔说道，“如果您不介意，我和部下们想和您合张影。”\n\n莱亚尔笑了：“当然没问题。”\n\n他们架起相机，在大门旁的标志前留下了一张照片。阿科斯塔将一瓶菲内特布兰卡酒塞到了莱亚尔怀里。“带上家乡的味道，”阿科斯塔解释道，“这是我的私藏。”\n\n莱亚尔大笑起来：“非常感谢，非常感谢。帮我们把暖气开着，几周后再见。”\n\n语毕，莱亚尔与阿科斯塔握了握手，爬上雪地车。\n\n眺望着一望无垠的雪地和天空，上校意识到，他和他的部下即将穿越未知的世界。从现在开始，一切都是未知。"
 antarctica_aaa_op90.180.a:0 "莱亚尔嘴角微微扬起，发动机轰鸣起来。"
 antarctica_aaa_op90.180.a.tt:0 "§F我们将获得§P[?Antarctica_GUI_AAA_Op90_Inventory_Array_Sobral_0]§!日§L食物余量§!、§P[?Antarctica_GUI_AAA_Op90_Inventory_Array_Sobral_1]§!日§f燃料余量§!、§P[?Antarctica_GUI_AAA_Op90_Inventory_Array_Sobral_2]§!§W医疗用品§!、§P[?Antarctica_GUI_AAA_Op90_Inventory_Array_Sobral_3]§!§R生存装备§!、§P[?Antarctica_GUI_AAA_Op90_Inventory_Array_Sobral_4]§!§g修理工具§!、§P[?Antarctica_GUI_AAA_Op90_Inventory_Array_Sobral_5]§!发§e子弹§!，\n\n同时，将有§P[?Antarctica_GUI_AAA_Op90_Inventory_Array_Patrol_0]§!日§L食物余量§!、§P[?Antarctica_GUI_AAA_Op90_Inventory_Array_Patrol_2]§!§W医疗用品§!、§P[?Antarctica_GUI_AAA_Op90_Inventory_Array_Patrol_3]§!§R生存装备§!、§P[?Antarctica_GUI_AAA_Op90_Inventory_Array_Patrol_4]§!§g维修工具§!、§P[?Antarctica_GUI_AAA_Op90_Inventory_Array_Patrol_5]§!发§e子弹§!分配予§O第82巡逻队§!。§!"
 antarctica_aaa_op90.190.t:0 "踪影全无"
 antarctica_aaa_op90.190.desc:0 "有点不对劲。\n\n极点突击队距离索夫拉尔基地只有不到一公里了，按理讲，不管是阿科斯塔还是佩雷斯，应该有人出来迎接他们的。这本身就已经让莱亚尔上校忧心忡忡，但还有什么其他地方不对，随后，他明白了：他没有看到阿根廷的国旗。\n\n莱亚尔在车队最前方加速前进，心脏怦怦直跳。他开始在无线电中呼叫下令，首先是第82巡逻队指挥官戈茨少尉。\n\n“出事了，”他说道，“你带着雪橇犬从右翼四周包抄上去，从基地后侧找个角度，武器也准备好。”戈茨确认了命令，在基地周边散开阵势。\n\n接着，莱亚尔联系了希罗：“准备好武器弹药，跟我从正面冲进去。”\n\n“收到。”希罗说道。\n\n在离基地不到五十米的地方，莱亚尔命令雪地车停下来。戈茨在这一侧没有发现任何敌对活动迹象。莱亚尔准备从前门进去，寻找驻扎人员。\n\n只是……前门已经不见了。基地的上层建筑仍然屹立在寒风之中，部分被暴雪掩埋也属正常，但内部却已经为大火所烧毁。\n\n天花板有些地方已经塌陷了，落雪堆积起来，南极苍白的阳光照射着灰烬、遭到洗劫的走廊和东倒西歪的家具。莱亚尔到处寻找着基地人员的踪影，但他只是在公共休息室的地板上找到了一小片血迹。"
 antarctica_aaa_op90.190.a:0 "物资和维修站都被毁了。索夫拉尔基地沦陷。"
 antarctica_aaa_op90.200.t:0 "零容错"
 antarctica_aaa_op90.200.desc:0 "极点突击队和第82巡逻队的士兵们找遍了索夫拉尔基地周围的每个角落，但到处都没有佩德罗·安赫尔·阿科斯塔少尉、乌戈·奥兰多·布里托斯上士和阿尔弗雷多·弗洛伦西奥·佩雷斯三级军士长的踪迹。\n\n大家猜测，他们已经死了。\n\n士兵们中间有传言说，这是一场意外，但莱亚尔和希罗更清楚，这很可能是智利人为了报复阿德莱德岛事件而发动的袭击。不知何故，或许是某次安保疏漏、某次欠考虑的轻率行动，智利人已经知道了南纬90行动的意图、行动路线和索夫拉尔基地的位置。\n\n基地被毁对探险队来说是毁灭性的打击。他们本指望有四天的休息时间，能修复受损的雪橇和雪地车，还能为接下来的跋涉补充物资给养。\n\n莱亚尔和希罗挤在曾经是阿科斯塔办公室的地方，其余人则用破旧家具在公共休息室的废墟上生起火堆。围坐一旁。利阿尔说道：“希罗，你比任何人都更了解行动现阶段的后勤情况。同我讲实话，我们还能继续吗？”\n\n希罗回答道：“我们已经没有犯错的余地了。没了此前计划中的维修站，器材会更快地损坏，士兵们会更加疲劳，遇到的任何事故都会带来更大的危险，即使短暂的延误也可能让我们万劫不复。行动能成功，但风险不可避免。”\n\n“必须继续，”莱亚尔说道，“我们别无选择。如果我们这么灰溜溜地回去，马塞拉就会赢，我们最好的下场也是被赶出南极。”"
 antarctica_aaa_op90.200.a:0 "“那就继续吧，”希罗说道，“为了阿科斯塔、佩雷斯、布里托斯……与阿根廷南极属地。”"
 antarctica_aaa_op90.210.t:0 "绝望深渊"
 antarctica_aaa_op90.210.desc:0 "埃尔南·普哈托准将对南极探险者的绝望并不陌生。他曾在这里翻山越岭，南极夺去了他的健康，消磨着他的意志，但普哈托同样收获良多，例如对大自然奇景的深深惊叹，还有对人类耐力的深刻理解。\n\n从许多方面来讲，南极洲都可以与伊甸园画上等号：纯洁的处女地，未经人类蹂躏，它的美丽令人震撼，它的愤怒令人恐惧。\n\n每个来到这里的探险者都会认识到这片大地的两面性，或早或晚。前一刻，你还是命运的主宰；而下一刻，你就要挣扎求生。所有的科技和筹备都可能因为一次简简单单的意外或失误而前功尽弃。\n\n然而，在索夫拉尔基地发生的一切并不是一场意外，但队员们并不知道与智利的冲突正在悄然升级，也没有发现任何袭击的痕迹。他们挤在化作废墟的公共休息室，萎靡不振，寒冷悄然而至。必须要做些什么。\n\n普哈托站起身来，所有人的目光都锁定在他的身上。准将温和地说道：“我曾经许多次经历过你们现在这样的处境。这就是南极，它是一个大熔炉，人们会在这里被锻造得像钢铁一般坚硬。”他走到部下中间，“你们可能会认为，自己真是太不幸了，但我要说，如果这片大地教会了我什么，那就是，呼吸在这里都足以称得上是幸运。只要还能呼吸到冰冷的空气，你们就是自由的，你们可以自由地选择是战斗、还是投降。”莱亚尔和希罗走进休息室，静静地听着普哈托的演讲，“我想要亲眼看到祖国的旗帜骄傲地飘扬在极点；我想在布宜诺斯艾利斯受到英雄般的欢迎；我想在那时听到万众欢呼、品尝美酒的甘甜；我想建设一个致力于探索和科学的阿根廷南极属地。只要我还有一口气，我就会为此而奋斗。你们呢？”"
 antarctica_aaa_op90.210.a:0 "队员们纷纷起身，准备直冲极点。"
 antarctica_aaa_op90.220.t:0 "葬礼"
 antarctica_aaa_op90.220.desc:0 "戈茨少尉在索夫拉尔基地的废墟上升起了阿根廷国旗，探险队其他队员抬手敬礼。对曾经驻扎在这里的三个人，他们能做的事情并不多。\n\n一面国旗、一次没有遗体的葬礼，这就是他们能做到的一切了。他们不能在索夫拉尔基地多逗留哪怕一日，计划中的补给基地被毁，探险队只能依靠现有的物资继续行动，而它们只会一刻不停地减少。\n\n现在，竞赛已经开始，他们要在人类和机器都彻底崩溃之前，将国旗立上极点。\n\n步枪向天鸣响，清脆的敬礼声和雪地车引擎发动的声音随之传来。\n\n戈茨率领第82巡逻队在前方探路，极点突击队紧随其后。\n\n莱亚尔最后一次回望，阿根廷国旗在风中摇曳。这可能是人类最后一次看到索夫拉尔基地了，南极洲很快就将它彻底埋葬。\n\n然后，莱亚尔望向南方，望向白茫茫的荒原。从前，他可能会为此而感到希望与兴奋，但现在，唯有恐惧萦绕心头。\n\n所有人的生命都已经走到了悬崖边，只消几个小小的错误，就没人能再回到家乡。\n\n莱亚尔想着，这一切绝不会是徒劳。"
 antarctica_aaa_op90.220.a:0 "我们决不能失败……"
 antarctica_aaa_op90.230.t:0 "异常雪脊"
 antarctica_aaa_op90.230.desc:0 "起初，戈茨少尉以为雪地的隆起只是一处小坡地。\n\n走得越来越近，他才发现，永恒太阳投下的诡异阴影欺骗了他，掩盖了脊线上的锯齿突起。\n\n那不是什么小山，而是一片雪脊，大小从雪地车到足球场不等。无论从哪个方向看，脊线都如刀片一般锋利。\n\n“草！”戈兹咒骂着拿起无线电，“上校，让车队停下，我们有大麻烦了。”\n\n几分钟后，莱亚尔从后方纵队赶来，察看着面前的情况。“该死……”他端着望远镜研究了几分钟，“我们开不过去，雪地车撑不住的。”\n\n“也许可以。”希罗说道，“这片雪脊重叠在一起，我看到其中有缝隙。如果我们能想办法绕开那些锋利的地方，或许就能穿过去。”\n\n“希望如此吧。这片雪脊太大了，我不想绕过去，那可能要花上好几天，我们耽误不起。”上校做出了决定，“希罗，带一队雪橇犬；戈茨，你也带上；然后向两侧背向分散侦察，定期用无线电联络。希望你们中有一个人能找到突破口。”\n\n不久之后，雪地车沿着精心布置的路边驶入雪脊区域。\n\n即使找到了一条安全道路，驾驶过程中的危险也丝毫没有减少。队伍足足花了好几个小时才抵达另一侧。"
 antarctica_aaa_op90.230.a:0 "“希望别再碰上这种鬼东西了。”戈茨心有余悸。"
 antarctica_aaa_op90.240.t:0 "分别"
 antarctica_aaa_op90.240.desc:0 "第82巡逻队和极点突击队在南纬82度停下。两个小队的所有人员都跳下车，在雪地中汇合。\n\n莱亚尔走近戈茨少尉、拉蒙·比利亚尔上士、马塞洛·埃诺克·阿尔瓦雷斯下士和莱昂纳多·伊莎贝尔·古斯曼下士。\n\n“各位，”上校说道，“你们知道自己的任务：探索圣菲山脉、带回地质样本，可能的化石标本也在收集之列。总而言之，科学发现、阿根廷南极属地的希望。我丝毫不怀疑，你们一定能有许多新发现，改变我们对这个地方的认知。”\n\n“我只是很遗憾，不能亲眼见证你创造历史。”戈茨笑着说。\n\n莱亚尔同样笑着回敬道：“我也可以这么同你讲。国旗是一回事，但你们的发现足以重塑对生命发展历程和地球历史的理解，一样能为你和阿根廷带来荣誉。”他伸出手，“祝好运，注意保暖，注意安全。”\n\n小队互相道别时，莱亚尔将戈茨拉到身边，轻声耳语道：“小心些，有人希望我们这次行动失败。时刻保持警惕，留意所有人类活动的迹象。”\n\n戈茨闻言，显得很是惊讶，但他依然点了点头：“长官，他们不会有动手的机会。我们先开火，然后再问问题。”\n\n“很好。”一切准备就绪，两支队伍整装出发：突击队前往南极点，第82巡逻队取道尚未有前人涉足的圣菲山脉。"
 antarctica_aaa_op90.240.a:0 "有怎样的秘密等待着我们？"
 antarctica_aaa_op90.240.a.tt:0 "§F§O第82巡逻队§!携带§P[?Antarctica_GUI_AAA_Op90_Inventory_Array_Patrol_0]§!日§L食物余量§!、§P[?Antarctica_GUI_AAA_Op90_Inventory_Array_Patrol_2]§!§W医疗用品§!、§P[?Antarctica_GUI_AAA_Op90_Inventory_Array_Patrol_3]§!§R生存装备§!、§P[?Antarctica_GUI_AAA_Op90_Inventory_Array_Patrol_4]§!§g维修工具§!、§P[?Antarctica_GUI_AAA_Op90_Inventory_Array_Patrol_5]§!发§e子弹§!离开探险队。§!"
 antarctica_aaa_op90.250.t:0 "神秘山脉之中"
 antarctica_aaa_op90.250.desc:0 "第82巡逻队渐渐接近圣菲山脉，戈茨少尉愈发激动。\n\n山脉高高挺立，仿若埋藏于冰层中的长生怪兽那凸起的脊柱。少尉和部下将是有史以来首次踏足山脉的人类。\n\n地质学家常说一句话：“岩石拥有记忆。”山脉是地球的档案，是巨大无朋的史册，层层叠叠的地层是其中的书页，默默讲述着亘古久远的故事。\n\n古往今来，还没有人读过圣菲山脉这本大书，第82巡逻队应当能为科学家们带回其中的几章。\n\n这里的空气相对稀薄，自从离开贝尔格拉诺站后，队伍所处的海拔越来越高。巡逻队靠近山脉时，高原反应随之更加明显。\n\n此时，没有人坐在狗拉雪橇上，人们都在雪橇旁奔跑，以保持狗的体力和注意力，但大家也并不着急。就这样，第82巡逻队迈着慎重的步伐，来到了圣菲山脉的入口。\n\n深邃的阴影在山峰之间铺展开来。戈茨望着它们，感到一阵本能的恐惧，它们看起来未免有些太黑暗、太不祥了，他的身体本能地抗拒着，不愿走进面前连绵的山峦。\n\n戈茨想，这是个充满秘密的地方。\n\n记录着我们的过去。\n\n或许，还有我们的未来。"
 antarctica_aaa_op90.250.a:0 "神秘山脉之中。"
 antarctica_aaa_op90.260.t:0 "千万年的过往"
 antarctica_aaa_op90.260.desc:0 "第82巡逻队登上了一座山峰，几乎攀爬到了最高处，只有这样才能取得古老岩层的样本。戈茨少尉在一旁放哨，端着望远镜搜索山脉的角角落落，寻找是否有生命迹象存在。\n\n拉蒙·比利亚尔上士坐在他身旁，在地图上绘制地形图和巡逻队进山的路线。\n\n绘制山脉地图也是他们此行的任务之一。阿根廷南极属地的领土地图、尤其是内陆地图越多，领土宣称就越有力。\n\n与此同时，马塞洛·埃诺克·阿尔瓦雷斯下士和莱昂纳多·伊莎贝尔·古斯曼下士开始动手采集山上最古老的岩石样本，为阿根廷南极研究所收集科学知识。\n\n上部地层是南极地质学家们梦寐以求的宝地，这里有各种各样的早寒武纪灰流沉积物：火山凝灰石-火山泥流、杂砂岩-泥质板岩-砾岩、黑色页岩、大理石、石英岩-砾岩……应有尽有。在此之前，它们从未为人所触碰，唯有风雪和缓慢而不可阻挡的板块构造运动塑造着南极的一切。\n\n戈茨俯下身检查部分样品，却陡然之间陷入了深邃的思绪中。无论南纬90行动取得怎样的成果、无论阿根廷南极属地最终命运如何、无论本世纪中发生什么惊心动魄的大事，这一切都只不过是地球漫长历史中的沧海一粟。他想着，我们诞生于地球；而最终，无论谁赢得这场争夺南极洲的战斗，我们都将重新归于地球。真是令人欣慰。\n\n然而，当他再次转过身察看山脉中的情况时，被注视着的感觉油然而生，挥之不去。"
 antarctica_aaa_op90.260.a:0 "山脉里究竟有什么……？"
 antarctica_aaa_op90.270.t:0 "在山谷阴影之中"
 antarctica_aaa_op90.270.desc:0 "带着满载地质样本的雪橇，第82巡逻队离开了圣菲山脉，在崎岖蜿蜒的山脉中缓缓前行。\n\n虽然这个地方很是迷人，但戈茨少尉还是很高兴能离开这里。在山脉里，他们总是活在阴影之中，若隐若现的山峰笼罩下，山间谷地明暗交织，恍若挂毯上的花纹。\n\n下一块岩石、下一道山坡后面，任何东西都有可能藏在那里。\n\n这是个埋伏的好地方。\n\n尽管在这里，南极夏天的太阳从来没有落下，但当戈茨离开山脉时，他依然感觉，这好像是自己好几天以来第一次看到阳光。\n\n小队已经为时间跨度长达五亿年的各个地质年代提取了完美的岩石样本，但这五亿年也仅仅只是地球寿命的八分之一而已。\n\n还有许多事物有待探索，还有许多知识需要学习，但第82巡逻队已经大大扩展了人类的科学认知。\n\n更不用说，他们是第一批踏足圣菲山脉的人类，还准确地绘制了山脉地图，在山峰的阴影下立起了阿根廷国旗。\n\n戈茨想着，现在唯一的任务就是活着回到索夫拉尔基地。他最后一次回望身后渐行渐远的山脉，被监视的感觉仍旧久久萦绕在他的心头。"
 antarctica_aaa_op90.270.a:0 "苍山有眼。"
 antarctica_aaa_op90.280.t:0 "暴露"
 antarctica_aaa_op90.280.desc:0 "“我和你说，比利亚尔，”戈茨看着阿尔瓦雷斯和古斯曼立起阿根廷国旗，说道，“离开这个地方我很高兴。”比利亚尔点点头表示同意，附和道：“我完全明白你的意思。”\n\n虽然戈茨很高兴能成为首批涉足圣菲山脉的人类，并且他们还是首次在这里采集地质样本的队伍，但他却始终无法摆脱被注视着的感觉，所有士兵都已经学会了倾听。戈茨迫不及待地想要离开，进入视野开阔的荒原。第82巡逻队已经顺利抵达了山脉尽头，距离山脚不到一公里远。突然，十个人手持冲锋枪从岩石后冲出，将他们团团围住。“不许动！”领头的人叫道，他说着一口流利的西班牙语，稍微带点口音，“武器放在地上，手举高！”雪橇犬疯狂地吠叫着，用力拉着绳子，想要保护自己的主人。“你！”头目指着古斯曼，“把狗管好！”比利亚尔、阿尔瓦雷斯和古斯曼看着戈茨，等待他的命令。“照他们说的做。”戈茨说得清清楚楚，伏击者也听得明白。第82巡逻队交出武器，古斯曼安抚了军犬。其他九名伏击者缓缓靠拢。“我们只是科学探险队，”戈茨辩解道，“阿根廷人。”\n\n对方头目放下了武器：“算你们走运，我们早就知道了。要是你们不是来探险的，那对话就和刚刚截然不同了。”他说完，看了看戈茨的部下，点点头。伏击者拿走了地质样本和新绘制的地图，取下了立起的阿根廷国旗，戈茨和巡逻队对此只能干瞪眼睛，敢怒不敢言。“现在，原路返回吧。”巡逻队牵起雪橇犬，两手空空地离开。地质样本和地图都被抢走了，甚至第82巡逻队都不是首批踏上圣菲山脉的人类。“那个人有口音，”当他们离开山脉时，戈茨说道，“我猜他家里是讲西班牙语的……但他应该是某个英语国家的人。”"
 antarctica_aaa_op90.280.a:0 "“看来在开始之前，行动计划就已经泄露了。”"
 antarctica_aaa_op90.290.t:0 "毁坏的雪地车"
 antarctica_aaa_op90.290.desc:0 "莱亚尔心想，撑不住了，雪地车撞上高高的雪堆，他勉强恢复了对雪地车的控制。\n\n风速越来越快，一团一团的冰雪砸在风挡上，雪地车左右摇晃。\n\n无线电沙沙作响：“停下，上校，停车！”希罗喊道，“你的雪橇翻了！”\n\n莱亚尔叹了口气：“收到。”他停下雪地车，跳到凛冽的寒风中。\n\n雪橇已经半毁，雪板也不再能有效地分开积雪。莱亚尔走到雪地车后面，看到那架雪橇不只是翻了那么简单，其中一侧的缰绳也扯断了。他们必须把雪橇卸下来，在车队中重新分配物资，在路上把它修好。\n\n希罗小步跑到莱亚尔身边。“该死，”他说道，“我们不能再这么损失雪橇了。”\n\n“我知道，”莱亚尔看着自己的雪地车，在风中喊道，“希罗，重新分配这辆雪橇上的物资，越快越好。”\n\n“是，长官，但我还有个建议，有一辆雪地车真的撞坏了。与其继续修理，不如把它留在这儿，当作回程的燃料库，我们还可以留些其他物资。”\n\n莱亚尔考虑着希罗的建议，一阵暴雪突然吞没了他们。"
 antarctica_aaa_op90.290.a:0 "“把一辆雪地车丢在这儿，我们经受不起。继续前进。”"
 antarctica_aaa_op90.290.a.tt:0 "我们将失去§P1§!辆§j货运雪橇§!。"
 antarctica_aaa_op90.290.b:0 "“不错的主意。少一台要修的坏机器，多一个回程的安全站。把雪地车留在这儿吧。”"
 antarctica_aaa_op90.290.b.tt:0 "我们将失去§P1§!辆§j货运雪橇§!。\n\n我们将留下§P4§!日§L食物余量§!、§P4§!日§f燃料余量§!、§P1§!辆§O雪地车§!。"
 antarctica_aaa_op90.300.t:0 "扎营"
 antarctica_aaa_op90.300.desc:0 "莱亚尔和探险队在南纬83度、海拔1900米处扎下了营地。\n\n像往常一样，他们把雪地车和雪橇围成一圈抵挡强风，在中间搭起了帐篷。\n\n远处，巨大的暴风雪云层步步紧逼而来。尝试穿过暴风雪太危险了，所以莱亚尔决定赌一把，希望队伍能经受住暴风雪的考验。\n\n无论如何，他们不得不停下来，南极大陆严酷的气候已经把雪地车和雪橇都弄得面目全非。帐篷搭好后，莱亚尔还帮忙搭了一个临时维修站，可以重新焊接货运雪橇的雪板，还能对雪地车进行各种维护。\n\n营地搭建完毕。尽可能维修了载具之后，莱亚尔回到帐篷里，在探险日志中写道：“货运雪橇正越来越频繁地出现故障。”他写道，“我们被耽搁下来，浪费了宝贵的时间，精心计量的口粮和燃料也白白消耗掉了。”\n\n还有些事情莱亚尔没有写进日志，那就是他已经严重怀疑行动能否成功。队员们的士气降至冰点，如果载具继续这么不断损坏下去，队员们就只能步行到极点再折返，而他很清楚斯科特最终的结局。\n\n一旦暴风雪散去，他就必须再次评估情况。\n\n上校略作思考，在日志中又添了一笔："
 antarctica_aaa_op90.300.a:0 "“我们一致同意，将此处命名为‘荒凉营地’。”"
 antarctica_aaa_op90.310.t:0 "打发时间"
 antarctica_aaa_op90.310.desc:0 "随着暴风雪达到顶峰，载具的维修工作也停滞不前。\n\n狂风和漫天飞雪将人们赶进帐篷，蜷缩在取暖器旁，等待暴风雪过去。\n\n打量着周围的面孔，莱亚尔清晰地读出，他们都情绪低落，疲惫不堪。\n\n这是大多数南极探险队发掘自己真正实力的关键时刻。欧内斯特·沙克尔顿曾多次直面灾难，但他仍然一次又一次地越过难关。不畏艰险是人类与生俱来的天赋。\n\n偶尔会有几个人起身出去看看雪橇犬的情况，显然，它们的表现比人类要好。\n\n第82巡逻队离开后，有一支雪橇犬队留在了极点突击队。狗狗们卷起身上厚厚的毛发，让积雪一层层地覆盖在身上，为自己保温防风。\n\n莱亚尔从口袋里掏出一副扑克牌，扔到昏睡的希罗身上，叫醒了好朋友。\n\n“扑克？”希罗摸索着，坐了起来。\n\n“当然。”"
 antarctica_aaa_op90.310.a:0 "不要抱怨运气。"
 antarctica_aaa_op90.320.t:0 "走进光明"
 antarctica_aaa_op90.320.desc:0 "这是一幅相当奇特的景象：一群人在雪地里蹒跚而行，微眯双眼，望着刺眼的阳光。\n\n万里无云，暴风雪已经过去，气温也稍稍上升，接近零下30摄氏度。\n\n近处，一群白色的枕头在雪地上蹦蹦跳跳，狗狗们汪汪地叫着，互相跳跃玩耍，在新雪之上嬉戏。所有人都笑了起来。\n\n莱亚尔拿出地图。“我们和极点只差七度了，”他说着，举起自己的手，“看呐，我用拇指就能盖住它。”上校又扭头看了看部下，相比昨晚，他们显得精力充沛，脸上的笑容也更多了。现在正是趁着晴朗天气继续前进的时候，从这里到极点的路上很可能还会遇到许多其他困难，但至少现在，没有大风和冰雪挡他们的路。“好了！”莱亚尔高声下令，“打包物资，准备拔营！一个小时内，出发！”"
 antarctica_aaa_op90.320.a:0 "地图上，离南极点还有一指宽的距离。"
 antarctica_aaa_op90.330.t:0 "最后的冲刺"
 antarctica_aaa_op90.330.desc:0 "很接近了。\n\n士兵们能感觉到，他们的精神也随之愈发高昂。\n\n从南纬86度开始，即使是迷宫般的雪脊，也不足以打击他们的决心。\n\n海军没能阻止他们。\n\n大自然同样没能阻止他们。\n\n多年的准备、牺牲、斗争，面对冰封大陆的无情怒火，最终的时刻即将到来：向极点的最后突击。\n\n有人怀疑过吗？当然有，怎么会没有呢？“尽管我们对导航充满信心，”莱亚尔在日志中写道，“但由于南极长期极端恶劣的气候条件，我们也无法排除计算或仪器出错的可能性。我们可能会偏离预定路线，走到计划和已知地图之外的地方。”\n\n但是，探险队做到了能做到的一切，众人都感到一阵欣慰。\n\n探险队、阿根廷的希望和梦想，触手可及。"
 antarctica_aaa_op90.330.a:0 "南极点就要到了……"
 antarctica_aaa_op90.340.t:0 "极南之地的喜悦"
 antarctica_aaa_op90.340.desc:0 "莱亚尔叫停了探险队，他的心止不住地有些狂乱。上校对着无线电说道：“我想让测绘人员下车测一下读数。”他们现在肯定已经基本有数了，可莱亚尔的心却还悬着，真是难受极了。几分钟后，测绘员敲响了上校的雪地车。莱亚尔推开车门，只见来人咧着嘴笑个不停——这只能说明一件事。\n\n莱亚尔笑着，从驾驶座上滑了下来，泪水刺痛着他的眼睛，但这与寒冷毫无干系。他朝旁边走了几步，向纵队挥了挥手。士兵们鱼贯而出，欢呼雀跃，互相拥抱着，还有几个人忍不住在人前就哭了出来。莱亚尔双腿颤抖，重重地跪在了雪地上。多年的工作、牺牲和斗争，终于有了结果。上校颤抖的手伸进大衣，掏出了一年前在乌斯怀亚那个阴暗的地下小酒吧拍下的照片。相较于探险队员们现今的热情和喜悦，当时在乌斯怀亚的一切不适都显得黯然失色。南纬90行动队伍是人类历史上第四支抵达地球南极点的探险队，他们的名字将与罗阿尔·阿蒙森、罗伯特·斯科特和理查德·伯德一起，永远镌刻在极地探险的史册之中。\n\n希罗扑倒在莱亚尔身旁的雪地上，手中拿着一瓶起开的酒。“祝贺你，上校，”他把酒瓶递给莱亚尔，“你把我们安全地带到了南极点，足以巩固未来几十年里阿根廷对这个地方的控制。”\n\n莱亚尔喝了一口：“没有你，我们不可能做到。要不是你在贝尔格拉诺站的周密准备，还用最快的速度侦察了行进路线，恐怕海军早就把我们都拿下了。”\n\n“行，就当是团队合作吧。”希罗站了起来，“说到这儿，该插旗了。”\n\n极点突击队的队员们一起把阿根廷国旗套在了一根专门带来的无线电天线上。他们立起国旗，敬礼致意。在这里，突击队又一起留下了一张照片。"
 antarctica_aaa_op90.340.a:0 "探险家们自豪地唱起了国歌。"
 antarctica_aaa_op90.350.t:0 "南极点"
 antarctica_aaa_op90.350.desc:0 "莱亚尔叫停了车队，让测绘员检查仪器读数。他想着，我们肯定快到了。他、希罗以及极点突击队的其他队员围成一圈，站在车队的最前面。\n\n莱亚尔看着面前的人们，有些探险队员本应来到这里，但他们却已经埋骨南极，所有人的脸上的失落之情都难以掩饰。\n\n世上所有探险家或者军事指挥官都明白，失去同伴是不可避免的危险，莱亚尔也是如此。在极地探险中出现人员损失是最坏的情况，但为了以防万一，南纬90行动在计划阶段就留出了空间。然而，预知和计划也没能让牺牲更好受。\n\n端详着地图的希罗抬起头，说道：“我们到了。”\n\n莱亚尔微微颔首，奇异的轻松感涌上心头。牺牲并没有白费，大部分探险队员都到达了极点。\n\n情况原本可能会更糟。\n\n“升起旗帜，”莱亚尔说道，“为每一个没能来到这里的人都立一个十字架，我希望他们也能出现在照片上。”莱亚尔将手伸进大衣，摸索出一年前在乌斯怀亚那家喧闹酒吧里留下的照片。逝者乐观的笑脸映入眼帘，他长叹一声。此情此景让他想起了另一个十字架，那是近六十年前在南极洲海岸边为另一群探险家所建造的。\n\n镌刻在那十字架上的箴言也适用于南纬90行动："
 antarctica_aaa_op90.350.a:0 "“去奋斗、去追寻、去探索，永不屈服。”"
 antarctica_aaa_op90.360.t:0 "幽灵与英烈"
 antarctica_aaa_op90.360.desc:0 "一群衣衫褴褛的探险者在南纬90度、东经45度处停了下来。确认位置后，他们松了一口气，卸下了身上的装备。\n\n莱亚尔看着身边的寥寥数人。作为一名探险家、一名军人，失去同伴是他职责中的一部分，行动计划也考虑到了这一点。但是，如今这样惨重的伤亡实在是难以接受。\n\n莱亚尔知道，如果真的能活着回到祖国，那他的余生都将会在反思中度过：究竟是哪里出了问题？他要怎样更好地训练队员？他如何才能改善行动的后勤工作？他可以做出哪些不同的选择？\n\n阿根廷会庆祝他们取得的成就，将牺牲者尊为为国献身的烈士，但莱亚尔心里清楚，他们本可以不抛下任何人就抵达极点，自己将陷于愧悔之中，一辈子都无法自拔。\n\n希罗和其他队员用一根临时的无线电天线竖起当作旗杆，莱亚尔则忙着为每一位失去生命的勇敢探险家立起十字架。\n\n他把手伸进大衣，拿出一张皱巴巴的照片，那是一年前在乌斯怀亚昏暗酒吧里的留影。那么多的笑脸，永远地消散了。南极大陆是他们的埋骨之地，是莱亚尔把他们带进了坟墓。\n\n队员们竭尽全力地向国旗敬礼，手臂因虚弱而颤抖不已，他们拍摄了一张照片，证明探险队的成就。\n\n最后，莱亚尔将乌斯怀亚的老照片贴在了无线电天线的底座上……"
 antarctica_aaa_op90.360.a:0 "转身离去，再不回首。"
 antarctica_aaa_op90.370.t:0 "希望已死"
 antarctica_aaa_op90.370.desc:0 "莱亚尔和希罗在南纬90度、东经45度瘫倒在地。测量结果证实，他们已经到达了南极点。\n\n经年的努力、计划，最终换来的胜利，在莱亚尔口中只余无法描述的苦涩。\n\n他回头看了看走过的路程，在这里和贝尔格拉诺站之间，探险队留下了断裂的木头、扭曲废弃的金属和消瘦憔悴的尸体，一切都只是为了在南极的这面国旗。\n\n这个梦想曾经那么地重要，可现在，莱亚尔却几乎说不出这梦想究竟是为了什么。\n\n“我可以用备用的帐篷杆做一根旗杆，”希罗提议道，“撑不了多久，但我们至少能拍到需要的照片。”\n\n“照片……”莱亚尔冻伤的双手翻找着大衣口袋，啊，是一年前在乌斯怀亚留下的：塞皮、奥尔蒂斯、布拉西奥、罗德里格斯、卡里翁、莫雷诺、萨卡里亚斯、阿方索。“他们原本都应该在这里的。”莱亚尔说着，把照片递给了希罗。\n\n两人端详着自己辜负的人们，许久许久。莱亚尔动手在简易旗杆下的雪地挖了一个小洞，把照片轻轻地放在了里面。这就是仅有的纪念了，他们没有材料也没有精力为逝者立起十字架。另外，他们还必须要继续挣扎，活着回到家乡。\n\n“我们的机会有多大？”希罗问道。\n\n“很渺茫……但为了他们，我们一定要……奋力一试。”莱亚尔微不可察地颔首致意，冰雪掩埋了乌斯怀亚的留影。"
 antarctica_aaa_op90.370.a:0 "一切是怎么变成这样的？"
 antarctica_aaa_op90.380.t:0 "毕生所愿"
 antarctica_aaa_op90.380.desc:0 "埃尔南·普哈托准将差点就当场含笑去世了。\n\n在如今残酷而混乱的世界上，很少有人能拥有追求自己的梦想的机会，更不必说亲眼见证梦想实现了。\n\n普哈托本以为到达极点时，自己会感到自豪。当然，他此时确实也怀有自豪之情，但更多的则是浓浓的感激，几乎要从胸中喷薄而出。\n\n“天主在上，”他祈祷道，“感谢您赐予我这一景象，感谢您赐予我志同道合的战友。”他转过身，握住了莱亚尔和希罗的手。\n\n“朋友们，我对你们的感激无以言表。你们与我分享的……”准将感慨万千，语无伦次。\n\n莱亚尔用手稳住了普哈托的肩膀：“阿根廷南极属地因你而存在。没有你多年的牺牲，我们又怎么会有今天？我们怎么能不带上你呢？正是因为有你的存在，大家才会这么努力，我相信绝无其他人能像你这样鼓舞人心。”\n\n普哈托点点头，眺望着纯白无瑕的荒漠。太阳恰恰从云层后面探出头来，照亮了在旗杆上骄傲飘扬的阿根廷国旗。"
 antarctica_aaa_op90.380.a:0 "极点之梦照进现实。"
 antarctica_aaa_op90.390.t:0 "惊觉"
 antarctica_aaa_op90.390.desc:0 "失去同伴绝非易事，尤其是在探险途中。\n\n为了极地探索，普哈托愿意承受任何艰难困苦，甚至在严寒中失去躯体的一部分也在所不辞。但是，眼睁睁地目睹勇敢的同胞在风雪中化为乌有，而这都是为了实现他自己定下的目标——对这位白色荒原的征服者而言，实在是太过沉重。\n\n在升起阿根廷国旗后，普哈托坐在雪地里沉思，这一切是否值得。\n\n他的梦想变成了噩梦：靠着他人的尸骨，他毕生的梦想终于实现。\n\n为什么？为什么他们都死了，而自己还活着？国旗翻飞的声响怪诞狰狞，似乎在嘲笑着这位老人。\n\n一切都白费了吗？\n\n一生都在追逐虚荣？\n\n只有风能回答他的疑问。\n\n普哈托下定决心，他决不能忘记对勇士们的缅怀，直到自己生命的尽头。他怀疑自己还有没有回家的力气，但他会竭尽所能。\n\n他会记住他们。"
 antarctica_aaa_op90.390.a:0 "是他唤醒了梦魇。"
 antarctica_aaa_op90.400.t:0 "贮藏点"
 antarctica_aaa_op90.400.desc:0 "莱亚尔透过望远镜观察着远处的雪丘。\n\n阳光照亮阴影，从藏匿的雪地车上反射而出，橙黄色的光晕映入眼帘。“不出所料，就是我们离开的地方。”\n\n“好极了，”希罗说道，“现在，我们该找谁去看看停车规不规范呢？”\n\n莱亚尔大笑，轻轻地咳嗽起来：“好了好了，我们去把引擎盖打开。”\n\n莱亚尔和希罗将雪地车停在旁边，下车扫掉废弃车上的积雪。\n\n他们用虹吸管抽干了油箱里剩下的燃料，又取回了藏在车厢里的补给物资。\n\n几分钟后，二人继续向北行驶，前往贝尔格拉诺站。"
 antarctica_aaa_op90.400.a:0 "莱亚尔在后视镜里凝视着雪地车渐渐远去隐没，低声念道：“再见了，我忠诚的朋友。”"
 antarctica_aaa_op90.400.a.tt:0 "§F我们将获得§P4§!日§L食物余量§!、§P4§!日§f燃料余量§!。§!"
 antarctica_aaa_op90.410.t:0 "近了，近了……"
 antarctica_aaa_op90.410.desc:0 "莱亚尔已经快要撑不开眼皮了。\n\n往返于极点的旅途耗尽了他全部的精力。\n\n当他和希罗看到索夫拉尔基地前的标志时，他们深深地松了一口气。\n\n可以休息啦，可以睡觉啦。\n\n睡！温暖、舒适、睡觉！\n\n与过去几周相比，索夫拉尔基地简直就是一家豪华酒店。\n\n在这里，他们还能有储备起来的补给，能吃上热气腾腾的饭菜。\n\n既然他们是穿越大裂谷而来，那回去贝尔格拉诺站就会容易得多。\n\n他们终于意识到，不久之后，他们将再次抵达贝尔格拉诺站，完成他们的使命。"
 antarctica_aaa_op90.410.a:0 "南纬90行动步入尾声。"
 antarctica_aaa_op90.410.a.tt:0 "§F所有身在索夫拉尔基地的队员将重新加入探险队。\n\n我们将自§O第82巡逻队§!获得§P10§!日§L食物余量§!、§P10§!日§f燃料余量§!、§P24§!条§G犬只§!。§!"
 antarctica_aaa_op90.420.t:0 "索夫拉尔基地的废墟"
 antarctica_aaa_op90.420.desc:0 "莱亚尔已经快要撑不开眼皮了。\n\n往返于极点的旅途耗尽了他全部的精力。\n\n即使索夫拉尔基地映入眼帘，他的身体中也没有生发出任何感情或是力量。\n\n雪堆积在基地周围，已经压塌了这里的屋顶。\n\n这个地方几乎无法居住。\n\n莱亚尔和希罗决定在这里休息，哪怕只是短暂地休息一下。\n\n很快，他们就要穿越大裂谷，队伍需要一切能量，于是他们开始在废墟中扎营，利用雪堆和残存的上层建筑抵挡南极的恶风。"
 antarctica_aaa_op90.420.a:0 "贝尔格拉诺站，近在眼前，远在天边。"
 antarctica_aaa_op90.420.a.tt:0 "§F所有身在索夫拉尔基地的队员将重新加入探险队。§!"
 antarctica_aaa_op90.430.t:0 "温暖的迎接"
 antarctica_aaa_op90.430.desc:0 "莱亚尔上校和希罗上尉向贝尔格拉诺站走去。\n\n最后一公里的路途仿佛有十公里那么长。“你要做的第一件事情什么？”希罗问道。\n\n“睡觉，”莱亚尔说着，反问道，“你呢？”\n\n“我啊，我要用滚烫的热水洗上这辈子最长的一次澡，把我冻住的骨头都化开。”\n\n莱亚尔的笑声快活起来：“是的，听起来确实……”当他们接近基地时，上校不由得圆睁双眼。所有人，几十个驻扎在这里的队员，都在外面迎接极点突击队的归来。莱亚尔和希罗率领队伍越来越近，人群的挥手、欢呼、鼓掌也愈发热烈。\n\n莱亚尔停好车，走在最前面。奥莱扎空军中校穿过人群，向莱亚尔敬礼问好：“欢迎回来，上校。极点的天气怎么样？”\n\n莱亚尔回敬军礼。“阳光明媚，”他回答道，“我很高兴，你没有把这里烧成灰。”\n\n“我们已经在里面准备好了酒、咖啡和热腾腾的美食。”奥莱扎注视着南纬90行动的队员们，“欢迎回来，大家都在，很高兴再见到你们。”人群拥进楼房时，奥莱扎站在一旁，和莱亚尔一起在外面散步：“我已经准备好了一份完整的报告，你们不在的时候，马塞拉可没闲着。”\n\n“干得好。不过现在，我要先去睡一会儿。”"
 antarctica_aaa_op90.430.a:0 "“或许也洗个热水澡吧……”"
 antarctica_aaa_op90.440.t:0 "后悔"
 antarctica_aaa_op90.440.desc:0 "奥莱扎空军中校站在贝尔格拉诺站外，目睹极点突击队衣衫褴褛的残兵败将走近基地。\n\n他们看上去很是可怕：面容憔悴，弯腰驼背，尽管他们轻装上阵，也仿佛背负着千斤重担，脸上到处是冻伤的疤痕。\n\n莱亚尔和希罗在奥莱扎面前停了下来，有人没能回来，失去了踪影，他惊恐万分，但莱亚尔只是不置可否，他似乎并不挂心人员损失。“非常感谢，”莱亚尔用沙哑、颤抖的嗓音说道，“如果能弄来一些吃的，还有御寒衣物，就好极了。”\n\n“当然，上校。”奥莱扎说道，他经历的军事训练开始发挥作用。中校向贝尔格拉诺站驻扎的人员下达了命令，直到现在，大家还沉浸在探险队带来的震惊中。听到命令，他们立即行动起来，帮助回来的队员们，为莱亚尔和队伍卸下背包。\n\n奥莱扎亲自将莱亚尔和希罗领进了屋里。他本来准备将马塞拉和海军在过去两个月里的所作所为统统告诉他们，但他决定还是再等等。\n\n显而易见，莱亚尔和希罗就像是见了鬼一般，他不想再给他们增加负担了。\n\n南纬90行动是一场灾难。"
 antarctica_aaa_op90.440.a:0 "我还能帮上什么忙吗？奥莱扎绝望了。"
 antarctica_aaa_op90.450.t:0 "噩梦"
 antarctica_aaa_op90.450.desc:0 "莱亚尔从呼啸的寒风和刺骨冰寒中醒来。\n\n在梦中，他躺在帐篷里动弹不得，冻疮地慢慢侵蚀着他的身体，黑色伤疤从手脚一直蔓延到心脏。\n\n人在梦中总是能有些莫名其妙的感知能力，他知道，此刻只有骷髅和他同处一室，他能听到睡袋里骨骼晃动发出的嘎吱声。\n\n一声枪响让他猛地睁开眼睛。他看到阳光在天花板上荡漾，感到温暖柔软包围着他。\n\n想着想着，莱亚尔意识到那声枪响其实是香槟酒瓶塞爆开的声音。他坐起来，摸了摸床上的羽绒被。莱亚尔突然感觉有点超现实，恍惚之间，他的梦境仿佛比这个酒店房间还要真实。\n\n胜利归来后，极点突击队和第82巡逻队迅速动身飞往马蒂恩索联合基地，然后换乘飞机，在布宜诺斯艾利斯的皮斯塔里尼部长国际机场降落。\n\n在那里，早已等待的专车车队将他们送到了布宜诺斯艾利斯最豪华的酒店：阿尔韦阿尔宫。几乎是一进房间，莱亚尔就瘫在床上，沉入了梦乡。\n\n希罗手拿香槟酒瓶，跌跌撞撞地从隔壁房间走了进来。从他摇摇晃晃的样子来看，显然是喝多了。“你没听到吗？”希罗口齿不清地叫道，“他们正在给我们搞游行！”\n\n莱亚尔呻吟一声，从床上滚了下来：“酒瓶给我，我要来一口。”"
 antarctica_aaa_op90.450.a:0 "“我拿来的地方，还多着呢！”希罗回道。"
 antarctica_aaa_op90.460.t:0 "海军上校的狂怒"
 antarctica_aaa_op90.460.desc:0 "在布朗海军上将号上，埃米利奥·马塞拉海军上校正怒火中烧。\n\n他坐在办公桌前，阅读着刚刚从乌斯怀亚寄来的报纸。他的双手紧紧抓着纸张，指节发白，他一遍又一遍地读着标题，双手愈抓愈紧。\n\n阿根廷国旗插上南极点，豪尔赫·莱亚尔上校率领的英雄团队\n\n莱亚尔、莱亚尔、莱亚尔……我永远都干不掉这个人吗？\n\n马塞拉的部下在进攻阿德莱德岛时让他失望已经够糟了，现在莱亚尔又偷走了本属于他的荣耀。\n\n事情没有按他的计划进行。\n\n阿德莱德岛本应是智利人的薄弱突破口；征服阿德莱德岛本该引爆战争，马塞拉将赢得决定性的胜利。荣耀本该属于他，也只属于他一个人！\n\n而现在，他却只能在这里，读着别人成功的故事。报纸大肆宣扬着他们的英雄气概和勇敢。什么英雄气概？什么勇敢？这些人逃进内陆，逃避作为军人的责任，躲在一面旗帜后面，说什么这是伟大的成就、是对阿根廷主权的宣示。\n\n马塞拉决心向他们展示，什么才是真正的主权宣示：唯有浴血。如果马塞拉必须亲力亲为，他也会这么做；他会用一具具尸体垒起这尸山血海，而他终有一日将站上山巅，主宰这个国家。"
 antarctica_aaa_op90.460.a:0 "马塞拉冷静地合起报纸，又投入了工作。"
 antarctica_aaa_op90.470.t:0 "荣归故里"
 antarctica_aaa_op90.470.desc:0 "布宜诺斯艾利斯万人空巷，人们都走出家门，来庆祝南纬90行动的成功。\n\n莱亚尔上校和希罗上尉立在敞篷车上，穿行在挤满人群的街头巷尾。五色斑斓的彩带和庆祝的香槟酒宛如漫天大雪，落在南极探险家们的身上。欢呼，欢呼震耳欲聋。\n\n在喧闹声中，希罗冲莱亚尔喊道：“你有没有想过我们会受到这么盛大的欢迎？”\n\n莱亚尔没有说话，只是摇了摇头，又仰头灌了一口酒店里拿出来的香槟。\n\n他们缓缓地沿着南美巴黎的林荫大道前行，莱亚尔的思绪却已飞向了远方。\n\n香槟酒的气泡带走了南纬90行动带来的身心重担；上校也想到了埃米利奥·马塞拉，这个肮脏的刽子手、杀人犯！莱亚尔思考着，上尉有没有收到报纸，他又会作何想法，更重要的是，他会怎么做？\n\n清算很快就将到来，莱亚尔心知肚明，他需要在通往极点的路途上建立起的所有政治资产，也需要每一位忠诚的朋友。这将是一场争夺阿根廷南极属地领地灵魂的战斗，莱亚尔将不惜一切代价，将马塞拉和他的阴谋彻底从这片土地上连根拔起。\n\n游行庆祝的队伍转过又一个街角，希罗摇了摇莱亚尔的肩膀，把他从迷思中拽回了现实：“嘿，看呐，总统就在那个台子上。”希罗说着，朝他指的方向努了努下巴，“你想好要说些什么了吗？”\n\n“确实有些想说的，”莱亚尔笑了笑，握住好友的手，说道，“除了你，我想不到还有谁能跟我一起登上那里。”"
 antarctica_aaa_op90.470.a:0 "上校与上尉走上高台，走进历史的新篇章。"
 antarctica_aaa_op90.480.t:0 "冲突在即"
 antarctica_aaa_op90.480.desc:0 "是非成败转头空，一人曝尸还是流血千里，到最后不过都做了土。放逐者留在这里，见证了那些在雪花铺成的沙漠上彳亍之人的困惑挣扎。\n\n新部落的首领赌了一把，希望能抓住放逐者的心脏。这些短命种的动机是什么？谁也说不好。\n\n不管他们怎么挣扎，他们的骨头很快就会化为尘土。\n\n而地球的另一边，新的斗争在放逐者的海岸上演。部落四分五裂，开始自相残杀。一边是那些试图到达内陆的人，另一边是那些以深水为家的人。\n\n暴风云聚集在公海上，慢慢向放逐者靠近。"
 antarctica_aaa_op90.480.a:0 "放逐者静静守望，等着看谁活下来。"
 antarctica_aaa_op90.490.t:0 "半空半满"
 antarctica_aaa_op90.490.desc:0 "莱亚尔从货运雪橇旁走过，阵阵寒风在他身边呼啸。上校走到一辆雪地车旁，举起手中半空的油桶，沉下肩膀，燃油哗啦啦地淌进油箱。\n\n他随手把空油桶扔到白雪覆盖的地上。\n\n几分钟后，引擎发出低沉的轰鸣，雪地车碾压着履带下的冰雪。探险队艰苦的行进再次重启，至少，在下一辆雪地车需要加油之前。\n\n莱亚尔又拎起一个油桶，最后一点燃料缓缓滴落，又一个油桶要抛在雪里。上校愣了一下，轻轻掂了掂手中空空如也的油桶。\n\n对南纬90行动而言，燃料就像食物和清水一样重要。他盯着油桶看了一小会儿，然后放手将它扔到了地上。没有燃料，雪地车就开不动，而雪地车正是南纬90行动的基础。\n\n莱亚尔回到自己的雪地车。在路上，他数了数所有的货运雪橇，而事实也证明了他的担心：燃料已经消耗掉一半了。\n\n雪地车的履带动了起来，极地高原的冰雪被压得嘎吱作响。发动机嗡嗡轰鸣，莱亚尔的思绪飞速运转。从现在起，探险队必须要注意燃料消耗，一切都会好起来的。\n\n听着发动机的声音，他这样安慰着自己。"
 antarctica_aaa_op90.490.a:0 "我们得做些预防措施，不然雪地车可就要趴窝了。"
 antarctica_aaa_op90.500.t:0 "燃料耗尽"
 antarctica_aaa_op90.500.desc:0 "雪地车的引擎慢慢安静下来。\n\n莱亚尔又徒劳地看了看油量表。在过去的二十公里，指针就一直在0徘徊。过去几天里，探险队耗尽了最后的燃油。\n\n莱亚尔盯着指针，希望喷嘴能再喷出几滴油来。他的灵魂在呼唤着奇迹。\n\n最后，发动机咳了一声，就此熄火，雪地车戛然而止。\n\n莱亚尔紧握方向盘，他意识到了事态的严重性：探险队没有油了。\n\n他害怕着接下来的命令。极点突击队将不得不步行走过剩下的路程，人力拖行物资补给。在这片荒原上，所有的生命必需品都要拖在身后，一公里又一公里，一天又一天。\n\n南纬90行动没有考虑到这种可能性。即使是斯科特，也在他致命的步行征途中设置了补给站。莱亚尔上校不看好徒步成功的机会。\n\n他跳下雪地车，与希罗碰面。上尉开口说道：“那么……就到这里了？”\n\n莱亚尔阴沉地点了点头：“卸下物资。我们要抛下所有不必要的负重，从这里开始，我们要滑雪前进了。”\n\n“至少我们花了不短的时间练习人拉雪橇。”吉罗说着俏皮话，却没有露出往日一般的笑容。"
 antarctica_aaa_op90.500.a:0 "南纬90行动油料耗尽。"
 antarctica_aaa_op90.500.a.tt:0 "§F我们将抛下除了§P[?Antarctica_GUI_AAA_Op90_Inventory_Array^2]§!§W医疗用品§!和§P[?Antarctica_GUI_AAA_Op90_Inventory_Array^3]§!§R生存装备§!之外的所有物资。所有的§g维修工具§!、§e子弹§!、§O雪地车§!、§j货运雪橇§!均将被遗弃。§!"
 antarctica_aaa_op90.510.t:0 "珍惜我们的幸福"
 antarctica_aaa_op90.510.desc:0 "寡淡无味，稍微有那么一点盐。\n\n这就是希罗上尉心不在焉地嚼着冻了一半的压缩饼干时尝到的味道。他戴着手套，两手抱膝，又往嘴里塞了一小块。\n\n探险队的口粮摆在面前，好让人清点检查。\n\n上尉数了数，没错。\n\n一次、两次。为了万无一失，他足足点了三遍。他必须算出准确的数字。假如算错一次，探险队就会……\n\n成堆的干肉饼、牛肉罐头、还有似乎无穷无尽的无味压缩饼干——当然，其实不是无穷无尽的。\n\n希罗恶狠狠地咬着饼干。事实上，自离开贝尔格拉诺站之后，他们的食物已经消耗了一半。每时、每天、每刻，食物只会越来越少。\n\n饼干裂开了。\n\n希罗咽下干巴巴的吃食，看着探险队员们。他们肩膀下垂，眼神因疲惫而变得涣散。\n\n但他们仍然微笑着互相交谈，希罗叹了口气，掸了掸靴子上的冰霜。\n\n探险队的食物储备足以支撑他们到达极点，他们要做的只是小心谨慎。希罗上尉心满意足地看着成堆的物资，它们在晴朗的天空下闪闪发亮。\n\n远处，乌云正悄悄在冰冷的地平线上游荡。"
 antarctica_aaa_op90.510.a:0 "小心，谨慎，仔细。"
 antarctica_aaa_op90.520.t:0 "食物耗尽"
 antarctica_aaa_op90.520.desc:0 "希罗的肚子咕咕作响。\n\n即使狂风啸叫、犬吠不止，也压不住这饥饿的声音。上尉在今天第三次将物资翻了个底朝天，希望能找到什么遗漏的东西，任何东西都可以。\n\n他找到一个打开的罐子，倒扣在手上，什么都没有。\n\n南纬90行动的食物已经耗尽。\n\n希罗垂头丧气，怎么会这样？他回到莱亚尔身边。“我们没吃的了，”他说道，“彻底没吃的了。”\n\n莱亚尔咬紧牙关，睫毛上沾满了雪，他不由得微闭双眼，免得冰晶砸到脸上。“我们可以在没有食物的情况下坚持几天，然后就会因为体力不支而无法行动。到那时，我们就必须做出艰难的决定。”\n\n希罗明白了他的意思，他的目光游移在英勇的哈士奇身上。在这片被上帝遗忘的大地上，是雪橇犬带领他们经历了一次又一次的考验。如果真的到了那一步，未免有些对不起它们。\n\n可说到底，阿蒙森不也把他的雪橇犬当作食物宰了吗？\n\n“在那之后呢？”希罗问道，“我们吃什么？”\n\n莱亚尔背过身去，没有回答。"
 antarctica_aaa_op90.520.a:0 "疑问飘散在风中，希罗又一次明白了莱亚尔没能说出的话。"
 antarctica_aaa_op90.530.t:0 "饥饿"
 antarctica_aaa_op90.530.desc:0 "饥饿、真正的饥饿，它就像一把利刃在人身上划过。饥饿会割断他的思想、割断他对世界的认知、甚至割断他的同情与悔恨之心。饥饿侵蚀着灵魂，直到最终灵魂也不复存在，化作择人而噬的无底洞。\n\n极点突击队已经尽了最大努力留下仅存的一点食物，但现在他们真的已经绝望了。在南极洲，人体需要的热量是正常的两倍还要多，寒冷和纯粹的新陈代谢会瞬间耗尽人体的所有能量。探险队员的身体、思想和精神都开始渐渐支撑不住。\n\n希罗和莱亚尔知道，不能再这么死撑下去了。“这里看起来不错。”莱亚尔指了指前面的雪堆，平淡地说道，“我们可以把它们一个一个地带到后面去，这样慌乱逃跑的几率会小一些。”\n\n希罗黑着脸，点了点头。饥饿压倒了绝望，极点突击队的这群雪橇犬在一次又一次的灾难中都十分勇敢。它们和队员一样，都是团队的一分子，这样的回报它们的付出实在是太糟糕了。\n\n“我来处理一半，”莱亚尔掏出一把手枪，“一次一只，看好它们。”\n\n希罗看着莱亚尔低声哄骗第一只雪橇犬绕到雪堆后面，还许诺给它喂吃的。可和想象中不同，希罗并没有流下眼泪，反而是因为新鲜温热的肉而流出了口水。"
 antarctica_aaa_op90.530.a:0 "砰……砰……砰……"
 antarctica_aaa_op90.530.a.tt:0 "我们将获得§P[Antarctica_GUI_AAA_Op90_Inventory_Array^8]§!日§L食物余量§!。\n\n我们将失去§P[Antarctica_GUI_AAA_Op90_Inventory_Array^8]§!条§G犬只§!。\n\n我们将失去§P[Antarctica_GUI_AAA_Op90_Inventory_Array^8]§!发§e子弹§!。"
 antarctica_aaa_op90.540.t:0 "饥馑"
 antarctica_aaa_op90.540.desc:0 "雪橇犬的肉并没能吃上多久。\n\n每一天，探险队都贪婪地吞食着油腻腻的肉、细啜着脂肪，敲骨吸髓地补充能量。无论生死，雪橇犬们都付出了一切。\n\n但队员们却仍然饿着肚子。\n\n他们不得不常常停下来。随着身体机能的萎缩，他们很快就会感到疲劳，任何能下咽的东西都可以用来充饥。\n\n莱亚尔上校下令，让队员们将探险队所有闲置的皮革制品都找出来。大家把备用手套、皮带、靴底和背包碎片都收集起来，切开剁碎，扔进了沸腾的锅里。\n\n希罗坐在锅边，无精打采地搅拌着，似乎这样就可以让皮革软下来一样。他怀疑这东西有没有用，但他实在是太饿了。\n\n开饭。希罗拎起一小块放进嘴里，啮咬着僵硬粘滑的皮革，用牙齿撕开纤维，试图从这头已经死去很久的牛身上汲取到一些能量。\n\n可无论他咀嚼多久，都无法让碎皮革变得更容易下咽。他的胃抗拒着这种物质，在饭后的几个小时乃至几天之中，他的肠胃都在疼痛中挣扎，他的身体本能地想将这些几乎不能食用的皮革从体内排出。\n\n很快，所有的皮革都吃完了，探险队重又陷入饥饿。"
 antarctica_aaa_op90.540.a:0 "真是，太饿了……"
 antarctica_aaa_op90.540.a.tt:0 "我们将获得§P2§!日§L食物余量§!。"
 antarctica_aaa_op90.550.t:0 "最后的手段"
 antarctica_aaa_op90.550.desc:0 "希罗钻出帐篷，向其他帐篷爬去。他必须去看看队员，看看他们的情况如何。他悄悄地走进帐篷，把每个人都摇醒。但有一个人，独自在帐篷里，没有再醒过来。\n\n他全身冰冷僵硬，是尸僵和南极洲的寒冷在作祟。这名队员应该是在夜里去世的，南极大陆燃尽了他的生命。\n\n希罗呆坐在地，试着接受这次逝去。每次吸气，他都能感觉到自己的肋骨在皮肤上摩擦。探险队已经好几天没吃东西了，希罗瘦了很多。他很累，非常累，他甚至不确定自己还能不能站起来走出帐篷。\n\n这时，希罗的肚子咕咕叫了起来。他看了看那具尸体，看了看裸露在外的青黑皮肤。他的肚子又一次叫了起来。\n\n说服莱亚尔几乎没费什么力气。他们就快饿死了，唯一的食物只有尸体。\n\n许多极地探险最终都走到了吃人肉这一步。如果这里发生的事情还能为文明世界所知，那么南纬90行动也会加入许多前人的行列。\n\n他们脱掉尸体的衣服，即使新鲜、白花花的肉让人垂涎欲滴，他们也尽量维持着恭敬的态度。尽可能清洗尸体后，他们举起了刀。\n\n莱亚尔切下了第一刀，接着是希罗，然后是所有人自由安排。他们的燃料太少了，根本无法生火做饭。于是，队员们将血肉裹在南极的冰雪中，贪婪地吮吸着。他们吃得很快，但又机械而小心翼翼，不浪费一点点营养。没有吃完的食物则保存起来，以备不时之需。"
 antarctica_aaa_op90.550.a:0 "诅咒盛宴。"
 antarctica_aaa_op90.550.a.tt:0 "我们将获得§P2§!日§L食物余量§!。"
 antarctica_aaa_op90.560.t:0 "虚脱"
 antarctica_aaa_op90.560.desc:0 "极点突击队的幸存者们不得不再次停下脚步。\n\n随着身体逐渐陷入饥饿，他们的体力消耗得越来越快。\n\n频繁休息是保持前进势头的唯一方法。然而，他们已经知道自己机会渺茫。\n\n食人只能拖延不可避免的结果晚些到来。\n\n他们的身体仍然缺乏关键的维生素和矿物质，因而极易遭受感染和疾病的侵袭。寒冷地带的病毒、细菌和其他微生物感知到了他们的免疫系统正日益衰弱，纷纷乘虚而入。一些队员已经身患疾病。\n\n病症不会痊愈；任何伤情都可能致命；创口无法愈合；瘀青始终不见好转。\n\n严寒的侵袭一日甚过一日，许多人脸颊冻伤，手指脚趾也冻得发黑。\n\n就算有人能活过这场噩梦，他们也将终生毁容。\n\n极点突击队的队员们一个接一个地倒下……"
 antarctica_aaa_op90.560.a:0 "终焉将至。"
 antarctica_aaa_op90.570.t:0 "无可奈何"
 antarctica_aaa_op90.570.desc:0 "埃尔南·普哈托准将走出营地。\n\n在帐篷里等待终结毫无意义，外面就是广袤美丽的南极大陆。谁知道呢？也许他的离开会给莱亚尔和希罗一点小小的机会，但按照最后一次见面时时他们的状态，准将对此表示怀疑。但无所谓了，这样也好。\n\n普哈托用萎缩的四肢蹒跚前行。饥饿感吞噬了他，他的躯体已经感觉不到寒冷，因为已经彻底冻得麻木。他的手指发黑，渐渐感觉不到自己的脸。视野变得模糊不清，眼球都要冻僵了。\n\n探险队员们付出了一切，普哈托很高兴能与这样勇敢的战友同行。总有一天，世人会知道这里发生的一切，永远铭记他们。\n\n即使最终埋骨南极，普哈托也依然为自己能一起探险而感到高兴，自己将会化作历史中的一页，名垂丹青。\n\n在这个世界上，人类的生命是如此短暂。许多人连自家街道的尽头都从未见过，更遑论这未曾有人类涉足的遥远国度了。\n\n普哈托享受着冰天雪地里的每一刻。十数年来，这里就是他的第二个家。他在这里结识了朋友与敌人，见证过人性中的至善，也目睹过最为穷凶极恶的企图，亦曾经历常人难以想象的奇迹。\n\n一切尘埃落定，南纬90行动以悲剧收场，但埃尔南·普哈托坦然接受了属于他的命运。准将跪倒在地，与南极洲的冰雪冻土融为一体。"
 antarctica_aaa_op90.570.a:0 "白色荒原的征服者，殁于此地。"
 antarctica_aaa_op90.580.t:0 "最好的兄弟"
 antarctica_aaa_op90.580.desc:0 "莱亚尔和希罗是探险队里最后还活着的人了。\n\n南极大陆吞噬了极点突击队英勇无畏的探险家们。通向极点的征途困难重重，探险队最终失败了，曾经温暖的躯体一个接一个地冰冷下去，现在只有上校和上尉两人身处狂风肆虐之中，挤在帐篷中的睡袋里。\n\n希罗观察着：“风暴越刮越大了。”\n\n“是。”莱亚尔应道。\n\n一簇一簇的雪花堆积在帐篷上，帆布都被压得陷了进来，但他们再也没有力气了，这里就是他们的坟墓。\n\n还有什么遗憾吗？就算此时此刻仍有遗憾，两人也都对此闭口不谈。时至如今，讨论哪里出了问题也只是徒费口舌。莱亚尔正用自己青黑坏死的手指握笔，匆匆地将过去几日间的磨难记录在南纬90行动的正式日志上。他知道斯科特和他的绝笔留在了南极的风雪中，他自己也将步上前人的后尘。\n\n终于写完了，莱亚尔合上日志，轻轻地把它塞进睡袋，紧挨着冻僵的下肢。然后，上校细若蚊蚋的声音问道：“你还在吗？”\n\n希罗合着双眼，轻声应着：“我一刻都不会离开。”\n\n伴着南极呼啸的风暴，两人沉入了睡梦之中。"
 antarctica_aaa_op90.580.a:0 "他们的双眼再也无法触及那无垠的白色荒原了。"
 antarctica_aaa_op90.590.t:0 "一人之失……"
 antarctica_aaa_op90.590.desc:0 "在布朗海军上将号的船长室里，南极夏季永不落下的太阳照亮了阴影中漂浮舞动的尘埃。\n\n埃米利奥·马塞拉正在阅读面前报纸的头条新闻，阳光映红了他咧开的嘴角：\n\n阿根廷探险队失踪：极点探险队埋骨大陆\n\n啊，多么富有诗意。就像大自然破坏了他在阿德莱德岛的计划一样，南极也为他的敌人送去了毁灭。莱亚尔上校死了，他带领他的部下走进了坟墓。南纬90行动彻底失败，南极研究所把时间、金钱和精力都浪费在了毫无结果的冒险上。\n\n现在轮到海军来结束这场闹剧了。\n\n马塞拉知道，他必须迅速行动。残余的莱亚尔支持者无疑会竭尽全力阻挠他的计划，但他会寻找机会干掉这些白痴蠢蛋。此刻，他满斟一杯血红的葡萄酒，陶醉在自己命运的逆转之中，举杯遥祝敌手的英年早逝。\n\n红宝石般的酒液触及嘴唇，马塞拉的思绪却已经飘向了未来。首先，他将巩固自己在南极洲的势力，尽可能多地调拨舰船和人员。然后，智利的杂种败类将永远滚出南极洲。不管政府支不支持，他都会一个岛、一个岛地扫荡，把他们统统烧死在屋里。\n\n马塞拉已经能幻想到阿根廷人对他的崇拜，他将以英雄的姿态回到祖国。他仿佛已经能看到人群，听到他们一遍又一遍地呼喊着他的名字……这或许能让他爬得更高。"
 antarctica_aaa_op90.590.a:0 "甚至，入主总统办公室。"
