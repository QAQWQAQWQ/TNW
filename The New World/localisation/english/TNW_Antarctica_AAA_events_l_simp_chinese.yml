 antarctica_aaa_op90prep.360.t:0 "一个新家"
 antarctica_aaa_op90prep.360.desc:0 "冈特·克劳斯舰长正在埃斯格雷特号破冰船的甲板上来回踱步。现在离他们启航返回德国的日子不远了，绝大多数船员对归乡感到兴奋，但是克劳斯的内心对此却是喜忧参半。\n\n圣彼得堡近来的日子可不太平，枪声不绝于耳，有关爆炸的新闻亦时有发生。名为“游击编队「十三」”的抵抗组织在最近几个月愈发猖狂，克劳斯甚至开始担心自己会在某天在某个阴暗小巷里吃上一颗枪子。\n\n当他返回德国，就算是到家了，话是这么说没错……但是，那股焦虑、那种挥之不去的对未知的恐惧将再次笼罩他的生活。德国国内的派系斗争正在加剧，一想到敬爱的元首去世之后可能发生的一切，克劳斯就会感到恐慌。\n\n大副递来的一封电报打断了克劳斯舰长满怀忧虑的沉思。\n\n“这艘船要卖给阿根廷？”克劳斯读着电报，语气中难掩惊讶。埃斯格雷特号将被交付给阿根廷人，供他们在南极使用。当他们把船停靠在乌斯怀亚之后，全体船员将搭乘飞机返回德国。\n\n思索着接到的指示，克劳斯内心意识到了：他不想再回到故乡。这念头想想就觉得不对劲……但事实就是这样。他希望自己能远走高飞，再也不用回到那可怕的地方。\n\n紧接着，克劳斯意识到他没必要回国，他只需要在船只靠岸时悄悄溜走，然后在阿根廷寻得一处温暖之地，在此安心度过余生。\n\n“船长，您还好吗？”大副对他表示关心。\n\n“我没事，可以说一切顺利。”克劳斯的嘴角勾起一抹淡淡的微笑。"
 antarctica_aaa_op90prep.360.a:0 "那将是在阿根廷的新家。"
