 antarctica_aaa_intro.10.t:0 "放逐者之心"
 antarctica_aaa_intro.10.desc:0 "这不是入侵者第一次企图侵入放逐者之心。曾经有两个部落冒险深入永恒之黄昏，但只有一个部落从中离开。宇宙一眨眼，放逐者还没回过神来，入侵者便再度整装待发。\n\n在旅途的起点，这个新的部落用血潮，排开了其他企图将放逐者纳为己有之徒。部落的领袖准备用钢铁的雪橇，开辟出一条通向内陆的大道。他觉得，他们的发明可以使他们比前人更加先进。到底是否如此，时间会给出答案。\n\n入侵者为入侵付出的心血，还有领袖的勇敢，令放逐者很是愉悦。放逐者觉得，只要他能在冰雪、其他部落，还有他那些“忠诚”的部下间幸存下来，那么他或许可以取得胜利，带来伟大的变化。"
 antarctica_aaa_intro.10.a:0 "五个鬼魂在南极点等待着，他们的队伍是否将继续扩大？"
 antarctica_aaa_intro.20.t:0 "协调"
 antarctica_aaa_intro.20.desc:0 "阳光普照在一望无垠的白色荒原上，天空万里无云。豪尔赫·埃德加·莱亚尔上校带着偏光护目镜，可刺眼的阳光使他不得不眯着眼睛。他驾驶着一台雪地车经过广阔的冰面，车厢内还有一位科学家、一位制图师和一名士兵。“搞得像个冷笑话的开头似的。”莱亚尔想着。不过，南极洲的现状就是如此。阿根廷需要士兵来保卫领土，制图师来为领土制作地图，科学家来为领土制造合法性——这一条是政治竞选时的优先事务。\n\n南极洲上，士兵越来越多。莱亚尔已经当了20年的骑兵，可他更愿意出去探险，而不是骚扰其他国家领土的边界。唉，希望同僚们也是一样的想法。\n\n合作与探险正逐渐被竞争与暴力取代，莱亚尔担心这样的趋势不会逆转。如今，他能期待的最佳结果，就是科学目标和军事目标同时实现。幸好，目前的南纬90行动好像把两者结合了起来。表面上，这是一次军事行动，旨在把阿根廷国旗插到南极点，证明大陆的这一块“是”阿根廷的；同时，这次行动也包含了一些科学任务。莱亚尔希望在维护国家领土的同时，也能让人类进一步认识这块被放逐的大陆。"
 antarctica_aaa_intro.20.a:0 "只能如此希望了。"
 antarctica_aaa_intro.30.t:0 "左膀右臂"
 antarctica_aaa_intro.30.desc:0 "古斯塔沃·阿道弗·希罗·塔珀上尉从埃斯佩兰萨站出发，带领手下执行常规巡逻。行动的首要目标始终是保证智利人不会从他们那“贝尔纳多·奥伊金斯将军”站里出来，危害阿根廷对南极洲的宣称。\n\n妈的，真令人失望。南纬90行动的计划才是最好的——在这一点上，希罗同他的上司兼好友莱亚尔上校看法一致。向南前往极点，可比在这用望远镜盯着智利人，希望他们不会搞事爽多了。希罗参与了站点的建设，也领导了许多从圣马丁站和埃斯佩兰萨站出发深入内陆的探险。他的才能不该拿来守卫边境，他明明是为扩大边境而生的。探险的奇妙，成为第一个踏入雪中的人类的奇妙，给了他继续前进的动力。\n\n但希罗清楚，保卫自己的所有物，准备为之战斗，本就是现实生活的一部分，在南极洲更是如此。推动南纬90行动的愿望在他脑子里挥之不去，虽然没有妨碍到他的职责，但也使他苦恼不已。\n\n他只能希望，自己能从这份职务中脱身一会，以将南纬90行动完成。如果前往极点、还有返回的途中，没有人阻挠阿根廷队伍的话，那就更好了。\n\n可能有人会问：“你为什么对此念念不忘？”希罗的答案很简单：“为了保卫阿根廷。”"
 antarctica_aaa_intro.30.a:0 "“也为了与莱亚尔一起冒险——我不知道还有谁能跟我一起穿越冻原。”"
 antarctica_aaa_intro.40.t:0 "外交官"
 antarctica_aaa_intro.40.desc:0 "马泰奥少尉不知道怎么看待胡安·卡洛斯·贝尔特拉米诺。那个正俯视着南极洲地形图的人，可能是阿根廷载着南极领地而归的最大功臣。他是通晓国际法的天才，利用法律和外交，他为祖国广阔的领土宣称构建了基础。但在埃斯佩兰萨站，人人皆知这位浪漫的外交官兼征服者不仅热爱为阿根廷的荣耀解放另一座冰山，也痴迷于诗歌和文学。马泰奥把一杯马黛茶放在桌上，突然感觉有些妒忌。站点供应的饮品大多是速溶咖啡，这种药茶可是十分罕见。马泰奥准备离开时，贝尔特拉米诺抬起头来，满面春风。\n\n“我给你看个东西，少尉。”他一边说道，一边给马泰奥指了指地图西北角落的一个小点，那里标记着“阿德莱德岛”。“依我看，我们这寒冷的家园马上就可以扩大了。”他接着说道。马泰奥尴尬地点了点头，有些疑惑不解。\n\n“谢谢您相信我，但长官，请问您为什么要给一位少尉讲述机密信息？上校说得很清楚了……”\n\n“因为，”贝尔特拉米诺打断了他，表情变得有些许担忧，“就是……我们不能把谋取这一个宣称的行动变成另一场斯尼佩岛之战。如果你要参与，并且事情搞得有些大发了……请尽可能降低伤亡。我不希望我的良心被更多条生命折磨——当然你也不必把责任扛过去，像你这样的年轻人不应承受那种负担。”\n\n马泰奥点了点头，不置可否，然后告诉贝尔特拉米诺他准备走了。他虽然尊敬贝尔特拉米诺，却并不乐意这位文官为了自己的道德，指挥他应该在战场上怎么做。离开房间时，他又转过身来，向贝尔特拉米诺答道："
 antarctica_aaa_intro.40.a:0 "“要是真到了那个时候，我会遵循上尉的命令。”"
 antarctica_aaa_intro.50.t:0 "定期飞行"
 antarctica_aaa_intro.50.desc:0 "透过带着往日划痕的旧挡风玻璃，金色的阳光洒落在狭小的机舱里。空军中校马里奥·路易斯·奥莱扎坐在座椅上，听着风掠过机身发出的嗡鸣声，全神贯注，如臂使指地操纵着他的飞机。一片平静的海面在他眼前展开，在冰冷的深蓝间点缀着洁白冰山，一直延伸到遥远的地平线。南极晴朗的夏日天空下，徐徐翻涌的潮水闪烁成晶莹一片。\n\n一艘武装船只划破深蓝海面，越过冰山而来。奥莱扎瞧了瞧，看到它升起一面天蓝与白色相间的旗帜——他觉得这不是啥好兆头。阿根廷南极属地是阿根廷最偏远、最不发达地方，但在他眼中却有无穷潜力。自50年代以来，奥莱扎曾多次飞越该地区，并从中获益良多。同时，他也见证了阿根廷如何扩大自己在南极的主权宣称。\n\n奥莱扎自认能为此事业添砖加瓦，如协助向孤立在南极大陆内地的基地运送物资或救急。这固然是一项危险的任务，但无疑值得去做——因为阿根廷南极领地同样是他祖国不可分割的一部分，而奥莱扎今后还会一步步推动它成长。他对南极洲航空发展的不懈支持，以及他在极端境况下的救援行动，为他赢得了“疯子”的绰号。\n\n但奥莱扎也清楚，如果阿根廷对南极洲土地的宣称没能得到承认，那他的一切心血都将付之东流。或许这就是为什么豪尔赫·莱亚尔所提出的南纬90行动一直在他脑海里盘旋不去。这个男人就像奥莱扎一样为南极所疯狂。他觉得莱亚尔的这次探险可能会为阿根廷南极属地的建设再添一块砖，甚至可能是迄今为止最重要的一块砖。"
 antarctica_aaa_intro.50.a:0 "埃斯佩兰萨站出现在地平线上，他决定亲自砌上这块砖。"
 antarctica_aaa_intro.60.t:0 "先锋迷思"
 antarctica_aaa_intro.60.desc:0 "云开日出霞光散，湛蓝色的天空一览无遗，圣马丁站的灰色峡谷也漆上了一抹亮色。不过，只有寥寥数缕阳光洒进了埃尔南·普哈托准将的办公室，勉强照亮了办公桌上那几张模糊的图片。他看向那些玻利维亚温暖午后的风景照，不由得开始追忆往事。1947年，普哈托虽然只是一名驻大使馆武官，但已经全身心投入到进一步整合南极洲领土的事务当中去了。有一回，庇隆总统正式到访玻利维亚，他便首次将自己的计划和想法呈递上去了。\n\n想当初，他是多么勇于冒险啊。普哈托一边回想着之后几年的事，一边在记忆中搜寻着过往的满腔激情。他曾踏足格陵兰，学习如何在世界上最荒蛮的角落生存；他曾看着阿根廷南极研究所一步步建立起来；他曾背离乡去设立圣马丁站，人们为之喝彩；他曾克服万难和祖国大陆建立联系，人们为其欢呼雀跃。有那么一瞬间，当时他乘船去建立贝尔格拉诺站，封冻海岸线似乎仍历历在目。灿烂的阳光下，冰凌白雪熠熠生辉。\n\n不料，弹指间一切灰飞烟灭，空余挥之不去的痛楚。纵观人生上下，庇隆失势后从南极洲回国的那段时间一直是普哈托心里最辛酸、最清晰的回忆。除去家人和个别朋友，没有人愿意正眼看他。普哈托与庇隆的关系过于密切，命运也大抵趋同，既无鼓励，也无认可，从先驱落成了无名小卒。\n\n回到现在，那个自高自大的莱亚尔成了话事人。至于普哈托呢？虽然军衔甚高，但也只能眼睁睁看着资源浪费在极圈探险的美梦上。南纬90行动很不错，但继续巩固领土防御才是更实际的选择。今天他就得和莱亚尔面谈这件事，对不？普哈托咕哝了两句，凝视着那些图片。他的能力不止于此，不只是满腹牢骚、老骥伏枥的前朝遗老。"
 antarctica_aaa_intro.60.a:0 "不，先驱远不止此。"
 antarctica_aaa_intro.70.t:0 "上校与上尉"
 antarctica_aaa_intro.70.desc:0 "在霍普湾的悬崖峭壁之上，林林总总伫立着几十间楼房，外形完全一致，个个都漆上了扎眼的亮橙色，连驻守人员的制服也是如此。这里就是埃斯佩兰萨站，新建的瞭望塔包围在层层倒刺铁丝网中，机枪阵地比比皆是。莱亚尔看到了十个阵地，要比几周前出发去例行巡逻的时候还多了五个。\n\n他开着同样是亮橙色的雪地车在基地里弯弯绕绕，穿过一个又一个检查点，最后在总部门口停了下来。不过，古斯塔沃·希罗上尉的雪地车已经在那了。莱亚尔刚下车，希罗就走上了门廊。“来得正好。”后者一边敬礼握手一边说道。\n\n“啊，天气的锅嘛，”莱亚尔应付了两句权当辩解，“你知道的，遇上点雪。”\n\n希罗轻笑两声，揽住莱亚尔道：“进来吧，咖啡煮好了。”进入总部后，莱亚尔向希罗询问了智利奥伊金斯站的调查情况，后者娓娓道来：“他们可聪明了，既没有什么值得一提的重装备，也没有武装人员，完全找不到能被说成有进攻性的东西。”\n\n莱亚尔长出一口气：“感谢上帝，现在我们要尽可能避免流血冲突。还有，剩下的指挥人员基本到齐了吗？”\n\n“贝尔特拉米诺在自己的办公室，奥莱扎的飞机一个小时之内就会到，普哈托晚上来。”\n\n“将军会大驾光临啊，真不错。想把他拉出圣马丁站可是越来越难了。”."
 antarctica_aaa_intro.70.a:0 "“和我们进军南极的任务相比，算不上什么。”"
 antarctica_aaa_intro.80.t:0 "南纬90行动"
 antarctica_aaa_intro.80.desc:0 "莱亚尔、希罗、奥莱扎、贝尔特拉米诺、普哈托——他们都曾在南极洲留下属于自己的印记，而现在，他们聚集在一起，为阿根廷宣称的南极领地而发光发热。不久后，他们将执行一项行动，巩固南极领地的地位，化作阿根廷永远不可分割的一部分。\n\n“南纬90行动，”莱亚尔开口了，“说起来很简单：从贝尔格拉诺一号基地出发，搭乘机械化装备直插南极点，插上阿根廷的国旗，然后活着回来。”上校身子前倾，继续说道，“很简单，但只有仔细统筹、为行动调拨足够的物资，我们才能活着回来。奥莱扎负责空中侦察，确定南极内陆补给站的位置；希罗上尉和我带领大部分探险队员冲向极点。有问题吗？”\n\n普哈托摇了摇头，说道：“豪尔赫，我担心的是探险队的规模会越来越大。为行动做准备的时候，我们必须得保住秘密，所有额外的物资和材料都会引起他人注意。”他停顿了一下，接着说道，“我们不能继续在南极内陆引爆对抗了，容错空间太小。”\n\n“我们正尽力让一切一如平日。我认为，日本人很大概率会忽视我们的工作，但对于南极点本身，德国拥有来自阿蒙森的宣称，OFN的宣称则来自斯科特；还有智利人，谁知道他们要是发现了我们的行动的话会作何反应。”莱亚尔回应道。\n\n贝尔特拉米诺也插话说道：“我支持这次行动，它不仅合理合法，而且还可以不动用武力。以探险家而非士兵的身份前往南极点的国际观瞻无疑更好，有利于在斯尼佩岛之战后恢复我们的形象。”\n\n莱亚尔点点头：“南纬90行动必须绝对保密，但如果有人胆敢挑战我们，我们也要做好拿起枪炮的准备。”"
 antarctica_aaa_intro.80.a:0 "“我希望能在周末之前拟定好探险队候选人员名单。”"
 antarctica_aaa_intro.80.a.tt:0 "§O南纬90行动§!§Y决议面板§!§F现已可用。§!"
 antarctica_aaa_op90prep.10.t: "慷慨激奋的请求"
 antarctica_aaa_op90prep.10.desc: "“阿根廷南极研究所收\n\n我写这封信是为了确认，南纬90行动将于明夏启动。对于我、我的部下、南极研究所乃至祖国而言，将阿根廷国旗插在我国领土最南端是最为重要的目标。所有努力都应当集中在这一行动之上。\n\n然而近几个月，我注意到了令人不安的趋势。运来的物资中，武器弹药和筑垒材料越来越多，而不是我们在南极洲真正需要的东西，例如狗拉雪橇、雪地车，以及干肉饼这样易于运输贮存的食品。”\n\n莱亚尔靠上椅背，手指敲了敲桌面，然后拿起笔，继续写道：“虽然当下保卫南极领地的需求的确十分现实，但类似这样的军事集结正是四年前斯尼佩岛之战的导火索。我想我不需要提醒你阿根廷在那次争端中付出的代价。”\n\n莱亚尔签下署名，长叹一声。他简直无法相信，但历史看起来很快就会重演。然而他仍然坚持认为，如果南纬90行动取得成功，阿根廷就有可能找到全新的道路，一条充满希望与信心，而非盲目好战的道路。"
 antarctica_aaa_op90prep.10.a: "莱亚尔祈祷着，祈盼自己有道不孤。"
 antarctica_aaa_op90prep.20.t: "特别运输"
 antarctica_aaa_op90prep.20.desc: "莱亚尔上校和希罗上尉站在埃斯佩兰萨站总指挥部的门廊旁，一边喝咖啡，一边看着雪地车排队通过防卫检查站。“研究所的反应真快，”希罗感叹道，“你答应了他们什么好处，能让他们这么做？”\n\n“你啊，就是太实际了。”莱亚尔笑着说道，“我只是利用了他们的爱国主义而已，毕竟行动的好处不言自明啊。”\n\n希罗哼了一声，回道：“你怎么不试着把这话跟海军讲讲。”\n\n莱亚尔脸上虽然一直挂着笑容，但在笑容背后却是万分的失望。虽然物资及时自乌斯怀亚空运抵达，但数量只有他希望的一半。然而，乞丐没有挑剔的资格，现在也只能如此了。\n\n莱亚尔和希罗喝完杯中的咖啡，动手去帮忙拆封院子里的橙色包裹。“哦，对了，把这些活儿做完之后，”希罗说道，“我会把第一批探险队候选人的名单交给你。”"
 antarctica_aaa_op90prep.20.a: "“好啊，我等着。”"
 antarctica_aaa_op90prep.20.a.tt: "我们将获得§W10补给§! £Antarctica_texticon_SUP 。"
 antarctica_aaa_op90prep.30.t: "人与机器"
 antarctica_aaa_op90prep.30.desc: "莱亚尔和希罗被困在了皑皑白雪之中，无论是字面上还是比喻上都是如此。一场暴风雪席卷了埃斯佩兰萨站，所有人都不得不躲到室内，等待风雪消散。在总部内，莱亚尔和希罗则利用这段空闲，审查南纬90行动的候选队员。人数大约有一百多人，来自阿根廷南极属地的各个地方，其中大多数人都符合要求。\n\n莱亚尔放下手中的档案，揉了揉眼睛，说道：“也许我们应该从不同的角度考虑考虑，”他看向希罗上尉，“探险队中最重要的是行进方式。南纬90行动将是自斯科特之后的第一次陆上极地探险，我们的探险队也和斯科特那支一样都用上了机械化车辆，所以我们也不能重蹈他的覆辙。首要任务就是保证机器在最需要的时候不让我们失望。”\n\n希罗听出了莱亚尔的意思，开始在资料中寻找机械师。“所以，我们需要一位车辆过冬的机械专家。”他找到了想要的档案，“我们想的是同一个人吗？”希罗的目光对上了莱亚尔，把手中的文件递给了上校。"
 antarctica_aaa_op90prep.30.a: "埃斯佩兰萨站机械师团队负责人、里卡多·包蒂斯塔·塞皮准尉。"
 antarctica_aaa_op90prep.40.t: "正确人选"
 antarctica_aaa_op90prep.40.desc: "暴风雪后，埃斯佩兰萨站终于铲平了街道上的积雪，希罗立马就去了车库，让里卡多·塞皮准尉去总部与莱亚尔上校面谈。莱亚尔的问题刚刚说出口，塞皮就回答道：“我加入。什么时候出发？”\n\n两人都笑了起来，因为他们彼此都清楚探险还得需要一年多的时间才能准备就绪。“首先，首先，”莱亚尔说道，“得定好你的机械师团队人选。团队到位后，我们就将选择运输载具，以此为基础建立探险队。”\n\n“我已经想好几个人选了。”塞皮说道，“至于车辆，我建议就用当前的塔克雪地车。目前为止，这一型号在我们领地的服役情况相当良好，皮实耐用，相对容易在野外修理。当然，我也知道一些其他型号。瑞典有一种雪地车在欧洲相当流行，还有美国公司的雪地车也在市场上比较受欢迎，比如克里斯蒂公司和锡奥科尔公司。选择这些车辆可能是由于一定的政治或经济动机，但从纯粹的效率角度来看，我不认为它们能比塔克雪地车更强。”\n\n莱亚尔缓缓地点了点头，回答道：“我会考虑的。噢，还有……”上校站起身来，向塞皮伸出了手："
 antarctica_aaa_op90prep.40.a: "“欢迎加入行动。”"
 antarctica_aaa_op90prep.40.a.tt: "§W里卡多·包蒂斯塔·塞皮准尉§!已加入§O南纬90行动§!§Y人员名单§!。"
 antarctica_aaa_op90prep.50.t: "雪地大块头"
 antarctica_aaa_op90prep.50.desc: "埃斯佩兰萨站车库顶层、塞皮准尉的办公室里，卡洛斯·吉多·布拉西奥上士、豪尔赫·劳尔·罗德里格斯上士和胡利奥·塞萨尔·奥尔蒂斯三级军士长正在开会。\n\n奥尔蒂斯只需要走下小山丘就可以来到这里，但布拉西奥和罗德里格斯都是一路风尘仆仆从圣马丁站赶来。风雪交加的旅途并不轻松，但大家的脸上都挂着掩饰不住的笑容，因为他们知道塞皮已经将自己选入了南纬90行动的机械师团队。\n\n“在我们正式和莱亚尔敲定机械细节之前，”塞皮首先开口定下了调子，“我想先听听你们对塔克雪地车替代方案的看法。最终选择还没有定下来，莱亚尔希望能考虑所有的选项。布拉西奥、罗德里格斯，普哈托老头儿让你们在圣马丁站开哪个型号的车？”\n\n布拉西奥耸了耸肩，回答道：“基本和你这儿差不多，塔克雪地车。不过他最近还采购了几辆瑞典的阿克提夫·菲舍尔雪地车。”\n\n“驾驶体验挺不错的，”罗德里格斯接过话头，“它们的操纵装置是类似汽车的方向盘，而不是杠杆，培训司机要简单得多。你懂的，开车去南极的压力完全是另一个等级。”\n\n“这话对所有车都一样，”塞皮说道，“我们手头可没有去过南极的雪地车。如果你们有什么备选方案，尽早在我下次和莱亚尔开会之前告诉我。”"
 antarctica_aaa_op90prep.50.a: "机械师们的家庭作业。"
 antarctica_aaa_op90prep.50.a.tt: "§W胡利奥·塞萨尔·奥尔蒂斯三级军士长§!、§W豪尔赫·劳尔·罗德里格斯上士§!、§W卡洛斯·吉多·布拉西奥上士§!已加入§O南纬90行动§!§Y人员名单§!。"
 antarctica_aaa_op90prep.60.t: "雪地车"
 antarctica_aaa_op90prep.60.desc: "即使塞皮办公室的墙上已经安装了隔音套件，却也依然挡不住埃斯佩兰萨站汽修车间里机床的嗡嗡轰鸣，空气中弥漫着机油和金属的味道。今天，莱亚尔上校将和塞皮准尉一起决定，驾驶哪种型号的雪地车冲向南极。\n\n“总之，”塞皮说着，在桌子上排出了三份文件，“它们的区别大概就是这样。”他先是指向了左边的文件，“瑞典造阿克提夫·菲舍尔雪地车，操作最友好的型号。它的驾驶方式和汽车差不多，配备大众四缸引擎，易于修理，不用在转弯时踩刹车踏板，所以刹车也更耐久，不易磨损。普哈托准将相当青睐这一型号。”\n\n“贝尔特拉米诺试探瑞典人好几个星期了。”莱亚尔说道，“他们非常渴望合作，甚至可以说十分急切，还提出愿意帮我们和博福斯牵线搭桥，购买新式武器。”\n\n随后，塞皮的手指移动到了中间的资料上：“锡奥科尔公司的4T-10型雪地履带车，去年上市的全新产品。这一型号只在阿拉斯加和加拿大测试过，从来没到过南极，但与其他选择相比，它搭载人员和物资的能力大约能多一倍出头。如果改用这一型雪地车，锡奥科尔公司也愿意给我们打个独家折扣。”\n\n最后自然就是右边的了。“当然，还有我们的塔克雪地车。这里的每个人都开过，每个人都熟悉它。如果使用现有的车辆，我们也能为行动留下更多的预算。”\n\n“三者各有优点啊，”莱亚尔说着，做出了决定："
 antarctica_aaa_op90prep.60.a: "“我们已经很熟悉塔克雪地车了。在行动就要开始的节骨眼上，还是别引入未知数比较好。”"
 antarctica_aaa_op90prep.60.b: "“我会让贝尔特拉米诺跟瑞典人磋商。这台雪地车好用易维护，我喜欢。”"
 antarctica_aaa_op90prep.60.c: "“雪地履带车的大运力很诱人。给锡奥科尔公司下订单吧。”"
 antarctica_aaa_op90prep.70.t: "可靠之选"
 antarctica_aaa_op90prep.70.desc: "冰雪在塔克雪地车的履带下嘎吱作响，塞皮准尉正在观摩雪地车的演练，新来的驾驶员们正试图驾驶车辆越过埃斯佩兰萨站后方的一道冰堤。雪地车本身几乎能应对所有挑战，而娴熟的操作就取决于司机了。从如何转弯，你就能看出新手司机的水平。刹车和履带轮组的切换确实需要一些时间才能适应，它们的操作方式和坦克差不多完全一样。\n\n即使如此，在塞皮看来，司机做得相当不错。在学会最基本的曲线驾驶后，许多人都喜欢上了雪地车可靠的操控性。塞皮很高兴莱亚尔选了最熟悉的车型，正如老话说的，“要是东西没坏，那就不要修”。\n\n退一步讲，就算坏了，他们也有很多备用零件，原本计划用于购置雪地车的预算已经改变用途，被拿来采购大量的替换零件。在现有机械设备的基础上，探险队在运输工具的修理上留出了完全足够的冗余余量。"
 antarctica_aaa_op90prep.70.a: "一辆雪地车在手，胜过两辆雪地车陷进雪原。"
 antarctica_aaa_op90prep.70.a.tt: "我们现在可以开始在§O南纬90行动§!§Y决议面板§!中改进并升级运输载具。"
 antarctica_aaa_op90prep.80.t: "瑞典人与雪茄烟"
 antarctica_aaa_op90prep.80.desc: "贝尔特拉米诺嘴里叼着一根胜利的雪茄，开着一辆阿克提夫·菲舍尔雪地车通过外围检查站，然后碾碎了埃斯佩兰萨站的主干道。瑞典人确实没说谎，这车开起来很简单，但瑞典人可没告诉他开车会这么有趣。\n\n贝尔特拉米诺把车开进汽修间，熄灭了引擎。塞皮准尉走了出来，布拉西奥上士和罗德里格斯上士跟在他的身后。准尉说道：“看来您挺开心的啊。”\n\n“我觉得这真是个好选择。”贝尔特拉米诺一边吞云吐雾，一边说道，“这型雪地车操纵很灵活。不管是谁，应该都不会超过一个下午就能学会开车，尤其是你们这些人。”\n\n就在他们说话的时候，一辆又一辆雪地车驶进车间，还有一些挂着拖车。\n\n塞皮扬起眉毛，问道：“没人告诉我还有其他货啊。”\n\n贝尔特拉米诺的脸上浮现出微笑：“瑞典人兑现了承诺，帮我们和博福斯牵上了线。我们现在已经和他们定下了直接供应防空武器的合同，可能还会扩大采购。”\n\n“噢，原来是瑞典人一手塞给你一辆雪地车，又一手搭上一门防空炮。现在，我们来测试一下这些机器吧……”"
 antarctica_aaa_op90prep.80.a: "“有谁想来赛个车吗？”"
 antarctica_aaa_op90prep.90.t: "小丑车"
 antarctica_aaa_op90prep.90.desc: "“嗯，宽敞。”希罗上尉环视了一下锡奥科尔4T-10雪地履带车的内部，说出了自己的第一印象，“我觉得物资打包应该不会是问题了。”\n\n坐在司乘位置的莱亚尔点了点头，说道：“听听塞皮的意见吧。”他把头探出窗外，对着汽修车间高声喊道，“嘿，塞皮！进来看看！”\n\n塞皮穿过街道，跳上了后座，惊叹道：“哇噻，简直像是个砖砌的茅房啊，这地方容得下足够的人员和物资。让我看看机械师们怎么想。”他从侧窗探出头来，也喊道，“布拉西奥、奥尔蒂斯、罗德里格斯！快上车！”\n\n三个机械师跑了出来，挤上了雪地履带车。\n\n“噢，真是宽敞。”布拉西奥说道，“多来几台这样的车，就能把整个基地都搬到极点去了。”\n\n莱亚尔突然说道：“噢看，是贝尔特拉米诺和奥莱扎。欸，你们两个！拿几瓶啤酒来，上车！我想把它开到山上去试试。”\n\n贝尔特拉米诺和奥莱扎依言照做，钻进了雪地车后面。“难以置信，”奥莱扎说道，“我甚至有伸腿的地方。是全新的型号？去年的？我们是不是倾家荡产了啊？”\n\n“你想多了，奥莱扎，”莱亚尔说着，发动了引擎，“锡奥科尔公司打了个大折扣，出乎意料地便宜。”"
 antarctica_aaa_op90prep.90.a: "“小心别把酒洒了，我要启动了！”"
 antarctica_aaa_op90prep.100.t: "卡马拉站"
 antarctica_aaa_op90prep.100.desc: "“埃斯佩兰萨站呼叫，请待命，正在准备接收报告……”\n\n这已经是今天埃斯佩兰萨站第三次要求路易斯报告负责区域内的海事活动信息了。卡马拉站是一个小型海军基地，位于半月岛却月湾。一般时候，只有寥寥数艘船只会在待避风暴或进行小检修时，才会来到这处平静的基地。然而，最近来到卡马拉站的船只陡然增多，许多都是路易斯从未见过的，其中主要是民船，但军舰也时有出现。这里热闹起来确实挺奇怪的，但路易斯并不关心。他是卡马拉站的无线电通讯员，日常工作就是坐在桌子后面，与南极领地的其他部门进行沟通，并回应各处的请求。只是最近的交流请求足足翻了一番，也许埃斯佩兰萨站的要求也和船只流量的上升有所关联？\n\n路易斯拿起负责海事管理的菲利佩先前交给他的海报，开始大声诵读，通报坐标和港口轮转的时间表：“埃斯佩兰萨站，卡马拉站呼叫，正在发送第一份报告……里奥金托号已加油完毕，正在返回乌斯怀亚……第二份报告……阿根廷海军罗萨里奥号因与冰山相撞导致舰体损坏，正在进行维修……第三份、最后一份报告……梅利诺1号正在离港，按计划驶向南纬70°19′、西经36°12′的预定坐标，大概是要捕鲸鱼！埃斯佩兰萨站，卡马拉站呼叫，报告完毕。”\n\n路易斯关上无线电，转身看向窗外——此时港口中的场景告诉他，刚刚的报告并不准确。的确，里奥金托号和梅利诺1号都正在离港，但似乎并不是开往预定的方向；同样，海军罗萨里奥号看起来也没有在维修……上级为什么要让他上报不准确的信息？"
 antarctica_aaa_op90prep.100.a: "他们会不会有什么企图？"
 antarctica_aaa_op90prep.110.t: "人类最好的朋友"
 antarctica_aaa_op90prep.110.desc: "除了茫茫白雪和烈烈狂风，南极生活的另一个典型特征就是狗狗们。哈士奇犬让极地探险成为可能，不论南极北极，人类的生死都依赖于它们，在这件事上不信邪可真是愚不可及。阿蒙森和他的雪橇犬到达了极点，斯科特失去了他的犬只，最终只得埋骨雪原。莱亚尔对南极的历史谙熟于心。\n\n在埃斯佩兰萨站郊外有好几处狗窝，其中蓄养着好几十支雪橇犬队，正是它们支撑起了阿根廷南极领地。当飞机因为大风停飞、浮冰阻挡了所有航运、雪地车也悉数趴窝的时候，雪橇犬就是埃斯佩兰萨站乃至所有南极基地生存的最后保障。\n\n莱亚尔独自坐在一块巨大的岩石上，俯瞰着训练场，驯犬员和雪橇犬们正一起进行障碍赛训练。他知道，自己必须为南纬90行动训练更多的队伍，但他刚刚收到了一份请求，这可能会阻碍他的训练计划。几处主要由海军管理的外围站点提出要求，在即将到来的冬季前补充物资。\n\n莱亚尔还知道，其中近一半的请求物资都是军事装备。海军声称，这是为了维护阿根廷南极领土宣称的完成和安全所必需的。莱亚尔对此表示严重怀疑，但他也没有断然拒绝海军的要求。他只有两个选择，要么默许海军的要求，送给他们更多破坏南极和平的工具；要么冒着激怒阿根廷最强大反对派的风险，将更多物资留给雪橇犬。"
 antarctica_aaa_op90prep.110.a: "我已经为南纬90行动付出很多政治资本了，不差这些，海军会拿到他们想要的“物资补给”。"
 antarctica_aaa_op90prep.110.a.tt: "我们将获得§R4军事点数§!£Antarctica_texticon_MIL 。\n我们将失去§W10补给§!£Antarctica_texticon_SUP 。"
 antarctica_aaa_op90prep.110.b: "南纬90行动是最重要的事情，我们现在需要训练雪橇队。没了这些物资，海军也活得下去。"
 antarctica_aaa_op90prep.120.t: "枪支与蜜桃"
 antarctica_aaa_op90prep.120.desc: "加西亚海军上士喜欢桃子罐头。在连吃了几周罐头鲜牛肉和硬邦邦的压缩饼干之后，水果的多汁口感真是让他神清气爽。过去几天里，埃斯佩兰萨站派出的雪橇队陆续抵达普里马韦拉站，送来了不少物资，里面有医疗用品和食物给养，但大部分都是军用物资。\n\n加西亚在过去几个月里注意到，他所在的海军前哨基地一直在要求武器弹药，数量已经远远超出了保卫主权所需的限度。\n\n他也不知道这些长枪大炮究竟去了哪里，反正不在基地里就对了。按照加西亚的猜测，定期抵达港口的军舰应该与其中古怪有所关联。更奇怪的是，偶尔还会有民船来到这里，装上箱子，消失在南极的冰海之中。\n\n加西亚不是傻瓜，他知道有什么事情在暗中酝酿，但他一点儿都不在乎：只要有源源不断的给养、只要他的部下能身体健康，那其他的事情就全都是别人的问题。"
 antarctica_aaa_op90prep.120.a: "加西亚撬开又一罐桃子罐头大快朵颐。"
 antarctica_aaa_op90prep.130.t: "过去的教训"
 antarctica_aaa_op90prep.130.desc: "很少有什么景象能像人和狗一起努力工作一样令人动容。\n\n莱亚尔上校躺在埃斯佩兰萨站犬舍旁的折叠椅上，看着新组建起的雪橇队进行障碍训练。这批哈士奇犬刚满周岁，从阿根廷飘洋过海来到南极。朱内奥是其中年纪最小的狗狗，它正追着一辆摩托雪橇，驾驶的队员会时不时停下来，用生牛肉奖励勤奋的小狗。\n\n训练既是对人的，也是对狗的。群聚的哈士奇可谓沸反盈天，常常会为了犬群的“权力”而互相掐架。人们必须要学会适应哈士奇的行为，懂得如何控制它们。\n\n反过来，还有几名军士在学习如何与哈士奇一起越过雪原。哈士奇很容易分心，士兵们需要跟上步调，让它们保持专注。\n\n海军希望莱亚尔用雪橇队运输军用物资，而他拒绝了请求。他知道，海军不会就这么轻轻放过。冬天过去之后，莱亚尔会着手处理这件事情的后果，但现在，他的队伍需要训练。南纬90行动的成败、极点突击队的生死，都取决于雪橇队是否训练有素。"
 antarctica_aaa_op90prep.130.a: "希望我们能复刻阿蒙森的征途，而非重蹈斯科特的覆辙。"
 antarctica_aaa_op90prep.140.t: "日暮"
 antarctica_aaa_op90prep.140.desc: "怀着满心欣喜，胡安·卡洛斯·贝尔特拉米诺搭上了冬季来临前离开埃斯佩兰萨站的最后一艘船。再迟一点时间，南极的海冰就会彻底封冻，没人能在太阳再次照耀这片大陆前离开这里。\n\n在瓜分南极前，在南极越冬还是极其极其稀少的事情，整片大陆上的人口仅仅只有一两百人，甚至几十人，还要取决于是否有正在进行的探险活动。\n\n如今，成千上万人在这里忍受着南极海岸零下二十度、内陆零下四十度甚至更低的严寒。极地高原吹来的重力风足以掩埋前哨站，让人寸步难行，飞机受到的影响尤为严重。\n\n深冬步步紧逼，南极洲的所有基地站点都在削减驻在人员规模。所有人都将精力转向了与恶劣的大自然斗争，武装冲突的恐惧逐渐消退，严重的抑郁症和维生素缺乏也迫使各国必须进行常规的南极人员轮换。\n\n贝尔特拉米诺目送埃斯佩兰萨站渐渐消失在视野之中，南极的冷酷无情再次深深地震撼了他。这片大陆仿佛下定决心一般，要将人类驱逐出这冰天雪地的海岸，后勤上的一次疏忽、意外之中的一次事故，都有可能意味着整座基地的毁灭。\n\n贝尔特拉米诺很高兴莱亚尔、希罗、奥莱扎和普哈托都在这个冬天留了下来。他们的经历会鼓舞人们的斗志，给予他们黑暗严冬中的希望。"
 antarctica_aaa_op90prep.140.a: "夜幕正在降临……"
 antarctica_aaa_op90prep.150.t: "酒杯与梦想"
 antarctica_aaa_op90prep.150.desc: "在大陆之上，埃斯佩兰萨站是除了麦克默多站之外补给最为充裕的南极基地，口粮、衣物、医疗用品一应俱全。当然，酒也是缺不了的东西：当季的最后一支补给船队除了常规物资外，还送来了一箱一箱堪称阿根廷文化灵魂的菲内特布兰卡酒。这种酒源自阿根廷意大利移民群体，甘甜的酒液与可乐混合后更加令人享受。而在今天这个意义特殊的冬夜，莱亚尔上校和希罗上尉就兑了一大堆这样的饮料。\n\n“为南极洲的又一个冬天，干杯！”莱亚尔说着，碰了一下希罗的酒杯，随即问道，“你的圣马丁探险队准备得怎么样了？”\n\n“三辆雪地车，一支狗拉雪橇队，随时可以出发。塞皮准尉、机械师团队、还有其他几名可能会参加南纬90行动的候选人会和我一起执行任务。”\n\n“很好，这会是一次卓有成效的学习经历，在严冬穿越内陆陆地对雪地车和人员都是考验。夏天一到，我们就有得忙了，现在南纬90行动的队伍大约还有一半缺额呢。我要求你和奥莱扎在抵达圣马丁站、和普哈托碰上头之后，以贝尔格拉诺一号站为基点，开始执行搜索巡逻和空中侦察任务。我们需要确定前方补给站的位置，才能动身出发去极点。”\n\n“总而言之，时间紧任务重，”希罗回答道，“那我们还是趁现在好好享受一下吧。”"
 antarctica_aaa_op90prep.150.a: "两人碰杯，梦想着有朝一日抵达极点的未来。"
 antarctica_aaa_op90prep.160.t: "致挚友及开拓者的告别"
 antarctica_aaa_op90prep.160.desc: "风雪交加，南极漫长的极夜几乎吞噬了一切光线。要不是他能顺风听见塞皮准尉和士兵们往雪地车上装物资时的呼喊声，他甚至都没法在黑暗中分辨出未来四个月里要与他朝夕相处的雪地车的轮廓。\n\n希罗上尉即将顶风冒雪，在严冬中动身前往1800公里外的圣马丁站：三辆雪地车、一辆狗拉雪橇、还有几名可能会参加南纬90行动的候选队员，他们将行经拉尔森冰架、翻越南极山脉，抵达普哈托准将驻扎的南极基地。\n\n“很高兴看到大家都士气高昂。”震耳欲聋的狂风中，莱亚尔上校大喊道。\n\n“真可惜，你不能和我们一起出发。”希罗回应着。\n\n“我也希望能和你们一起，但总得有人留下来盯着海军。”\n\n希罗摇了摇头，说道：“我不明白，为什么会有人不愿意支持我们。我们是开拓者、是先锋！我们会踏上前人从未涉足的土地！他们怎么会不愿意参与？”\n\n“我不想打击你，”莱亚尔笑着回答道，“但大多数人都觉得我们探索南极大陆是失心疯了。”\n\n“准备好出发了——”塞皮在风中喊道。\n\n莱亚尔开口，送别自己的好友：“看来你们要离开埃斯佩兰萨站了。再见，祝好运。”\n\n希罗则以打趣回应：“祝你在办公桌上也好运。”\n\n两人戴着厚厚的手套握手道别。上尉挥了挥手，爬上雪地车，"
 antarctica_aaa_op90prep.160.a: "溶入了南极黑暗的极夜。"
 antarctica_aaa_op90prep.170.t: "邮件"
 antarctica_aaa_op90prep.170.desc: "埃尔南·普哈托准将坐在圣马丁站的办公桌前。小煤炉上正煮着咖啡，温暖着这间南极的小办公室。他起身走到炉旁，给自己倒了一小杯咖啡，心满意足地抿了一口。尽管窗外狂风呼啸、漆黑无光，但当他望着基地所谓“主街道”两旁的小屋时，依然能感到一阵暖流涌上心头。虽然现在的职务不像以前在首都时那么光鲜亮丽，但这独属于他一人的一方净土却更能让他安下心来，他和部下在“最后的边疆”开辟出了属于自己的天地。“啊，最后的边疆，直到我们也能有像德国人那样的太空项目。也许不会在庇隆的领导下，但它是为了阿根廷……”一名年轻士兵的到来打断了他的思绪。\n\n“稍息，来一杯？”准将指了指炉子上的咖啡壶。\n\n“我已经很久没喝到新鲜咖啡了，长官。”年轻士兵感叹道。普哈托闻言不由笑了笑，区区一杯咖啡并不算什么，但这小小的举动同样意义不凡。“好，那我猜给我的邮件已经寄到了？”士兵伸手从包里取出三样东西：一本退伍军人杂志、家人寄来的个人护理物品、还有最有趣的一个，从首都直接拍来的电报。身为南极基地的指挥官，普哈托准将也有一些特权，其中最重要的就是优先邮寄，即使在冬天也是如此。阿根廷南极研究所在信中提到，他的基地将在冬季来临时收到新一批补给，这样他就可以更自由地分配手头现有的物资了。准将看着手中的信件，思考着怎么让部下做好准备，迎接南极大陆的一切。\n\n“年轻人，我需要你帮我传个信。”年轻士兵立正，热心地准备接受普哈托的命令：“是，长官。请问是什么信？”"
 antarctica_aaa_op90prep.170.a: "“告诉军需官准备好武器，这个冬天我们要继续训练。”"
 antarctica_aaa_op90prep.170.a.tt: "我们将获得§R8军事点数§!£Antarctica_texticon_MIL 。"
 antarctica_aaa_op90prep.170.b: "“告诉后厨做些肉馅卷饼，我们好好吃一顿。”"
 antarctica_aaa_op90prep.170.b.tt: "我们将失去§W8补给§!£Antarctica_texticon_SUP 。"
 antarctica_aaa_op90prep.180.t: "我们的土地"
 antarctica_aaa_op90prep.180.desc: "如今正是南极的冬日，在泛光灯微弱的灯光下，阿根廷圣马丁站士兵们的身影在白茫茫的雪原上若隐若现。狂风宛如玻璃碴子，划破他们裸露在外的皮肤，卷起大片大片的雪花，拍打着士兵们的脸庞。哪怕只是浅浅地呼吸一下，口鼻中都会冒出团团白雾，肺腔也会感到疼痛。\n\n大多数人都会讨厌这样严酷的环境，但普哈托准将与常人不同。\n\n白色荒原的征服者正在部下身后走动，监督他们的操练演习：敏捷的刺刀格挡、神枪手在皑皑白雪中正中靶心，都让他喜悦。\n\n即使是在南极，士兵们的表现也教人钦佩，步枪和其他装备的实训操作完全匹配得上他们所经受的训练。普哈托不会有一丝一毫的懈怠，在南极，最微小的谬误都有可能意味着死亡。\n\n准将高声喊道：“立正——！”士兵们停下训练，转过身来，全神贯注地听着长官训话，“这里，是地球上环境最恶劣、最严酷的地方，冰冷刺骨，寒风扑面，但这里是阿根廷，这里就是祖国！”\n\n“这个冬天会是你们畏惧南极的最后一个冬天。你们生来就是为了保卫这片土地，保卫我们的土地。若是能在此立足、蓬勃生长，那么我相信，毫无疑问，没有任何威胁能够战胜我们！”"
 antarctica_aaa_op90prep.180.a: "“好了，在还没冻伤之前，快回屋去。你绝对不想像我一样丢了手脚指头，除非你不在乎。”"
 antarctica_aaa_op90prep.190.t: "意见、问题、担忧"
 antarctica_aaa_op90prep.190.desc: "卢戈·帕斯卡尔二等水兵常常精疲力竭、情绪低落、浑身冰凉：在寒冷的地球边疆，这样的身心状态再常见不过了。然而今天与往日不同，他日常出勤的驾船巡逻任务神秘地取消了，平日需要参加的训练演习也暂停了下来。他和战友们小心翼翼地放松着，希望这份侥幸不会再次溜走。\n\n然而，下午五点，帕斯卡尔和他的船员们接到命令，在圣马丁站后厨集合。等待他们的是一场大大的惊喜，海员、士兵、还有飞行员们将要一起享受一顿丰盛的大餐。\n\n大家领到餐饭，各自入座时，身怀故事的老兵们纷纷散开，融入人群，让所有士兵和下级军官都能与南极传奇共同度过这段美好的时光。\n\n帕斯卡尔正兀自出神，他很是享受这片刻时光，能从疲惫累人的日常中解脱出来，甚至都没能注意到所有人的目光都在看着他。“水兵，你还好吗？”普哈托准将笑着问道。\n\n“噢，是，长官，我只是累坏了。”帕斯卡尔回答，战友们都因为他竟然如此坦诚而惊愕不已。\n\n准将闻言点点头，说道：“我明白了……你能详细说说吗？我和基层士兵交谈的机会不多。”\n\n“当然，长官。我其实并不介意训练强度，但我们几乎没有休息时间。实际上我还以为今天不用出勤是出了笔误，而不是特意安排的。”\n\n普哈托打趣道：“谢谢你的诚实。这年头，能说心里话的军官可是越来越不好找了。”餐桌上爆发出一阵快活的笑声。"
 antarctica_aaa_op90prep.190.a: "一周之后，基地的熄灯休息时间延长了三十分钟。"
 antarctica_aaa_op90prep.200.t: "裂隙"
 antarctica_aaa_op90prep.200.desc: "南极的极夜伸手不见五指，但希罗能感到全世界都在自己的靴子下移动。队员们挤在一起，紧靠在仅余的一辆雪地车旁边。前方的车灯在雪夜中闪烁，在漆黑中几乎无法辨认。狂风呼啸，源源不断，仿若冰雪铸就的墙壁自暗夜中向他们冲撞而来。雪地车向右转了个弯，希罗和队员们顶风冒雪，竭尽全力地前进。\n\n他们前方是一条巨大的裂隙，这已经是小队在穿越拉尔森冰架途中遇到的第三个了。另外两辆雪地车带着狗拉雪橇和其他队员先行绕了过去，但团结一致乃是任务的重中之重，否则暴风雪便会一个接一个地吞噬他们。希罗不断在脑海中如此提醒自己，一边伸手擦去护目镜上冰结的寒霜。\n\n暴风雪依旧无情地咆哮着，甚至淹没了希罗上尉自己的思绪，在无边的黑暗中，他的脑海中只能想到寒冷、常人难以想象的寒冷，其余事物的记忆似乎都已经窒息在南极的低温之中。冰川裂隙横亘在他的面前，雪地车的灯光照耀着湿滑冰冻的边缘。他们小心翼翼地绕过深不见底的裂隙，它仿佛通向虚空之中，比希罗曾见过的任何地方都要更加深邃黑暗。\n\n脚下的冰层纹丝不动，冰架发出咔嚓咔嚓的摩擦声，仿若牙关打颤的声音。地面传来的声响和震颤让疲惫的双腿摇摇欲坠，冰冷的海洋在数厘米下汹涌澎湃，这片大地的可怖的心脏正砰砰跳动。\n\n下次再见到莱亚尔的时候，希罗可有很精彩的故事要讲，这就是他要做的。他会像从前一样，完成这次探险，然后再去喝一杯。老天啊，他现在就想喝上一杯。"
 antarctica_aaa_op90prep.200.a: "小队绕过裂隙，与其他队员会合，前往圣马丁站的征途仍在继续。"
 antarctica_aaa_op90prep.210.t: "贝尔特拉米诺的难题"
 antarctica_aaa_op90prep.210.desc: "胡安·卡洛斯·贝尔特拉米诺热爱南极洲，当然，回到布宜诺斯艾利斯的家园也会让他十分愉快。\n\n毕竟，对于他这样的外交官而言，冬天实在是太难熬了，甚至就连许多军官都像颠倒的候鸟一样，在寒冬飞去北方。无论如何，他在这里能做到更多的成就，他的外交手腕和魅力是用来和人打交道的，对巴布亚企鹅弹琴不是他的专长。\n\n贝尔特拉米诺打算把他的工作重心放在政府部门上，游说经济部和其他重要部门为阿根廷南极研究所划拨更多资金，而不是把钱都交给海军。南极研究所和海军之间常常为了各种资源争得头破血流，这样的游说已经是必要的例行公事了。\n\n计划原本已经定了下来，但情况发生了一点点变化。前段时间，贝尔特拉米诺听说德国驻阿根廷大使馆来了一位负责南极事务的随员。虽然贝尔特拉米诺讨厌他这样的希特勒崇拜者，但与德国随员会晤交流或许能够强化阿根廷南极宣称的合法性。\n\n真是个难题，是游说政府部门？还是和那个德国人谈谈？两个选择都有各自的好处，贝尔特拉米诺决定……"
 antarctica_aaa_op90prep.210.a: "……游说政府。"
 antarctica_aaa_op90prep.210.b: "……致函德国大使馆。"
 antarctica_aaa_op90prep.220.t: "布宜诺斯艾利斯"
 antarctica_aaa_op90prep.220.desc: "与不可靠的超级大国商谈的机会太过虚无缥缈了，贝尔特拉米诺依旧决定一如既往，游说政府部门，以获得更多的资金倾斜。\n\n在一轮卓有成效的讨论之后，贝尔特拉米诺漫步在布宜诺斯艾利斯街头。这座城市的景色和气息独具魅力，就像是南极洲同样也拥有冷寂而静默的美丽一样。汽车和公交车鸣笛驶过，自行车和派送员穿行在街头巷尾，店主吆喝着兜售货架上的商品，烤肉架上的美味滋滋作响，人们聚在一起，互相闲谈着佩尼亚罗尔的比赛还有玫瑰宫里最新传出来的流言蜚语——这一切，就是南极研究所的人们所捍卫保护的事物。\n\n真好啊，他游说政府的努力奏效了，划拨予南极研究所的资源稍稍压过了海军南极分遣舰队的配额。这样最好，海军那群家伙，一遇到什么事情，就满脑子都是粗暴解决的办法，从来没有不过度反应过。\n\n现在南极研究所拥有了更多的资源，或许和平与法制终于能渐渐成为南极的常态，但现在下结论还为时尚早。"
 antarctica_aaa_op90prep.220.a: "希望仍在。"
 antarctica_aaa_op90prep.220.a.tt: "我们将获得§W10补给§! £Antarctica_texticon_SUP 。"
 antarctica_aaa_op90prep.230.t: "暗室交易"
 antarctica_aaa_op90prep.230.desc: "贝尔特拉米诺明白，机遇稍纵即逝，所以他选择了与德国随员会面。\n\n夜深人静的时分，二人在一家隐蔽的咖啡馆里见上了面。他们走进深处的包厢，照例寒暄了几句诸如“希望您此次布宜诺斯艾利斯之行愉快”之类的套话。这家店的店主是贝尔特拉米诺的老朋友，他为二人摆上了饮品和小食，退了出去。两位外交官于是开始谈起了正事。\n\n庇隆执政期间，阿根廷的南极领土宣称得到了德国的支持。然而，1958年，全面瓜分南极洲开始，斯尼佩岛之战也在此时爆发，两国关系亦同时降温。\n\n现在，德国随员提出了扭转这一趋势的建议：德国将承认阿根廷对智利占领的阿德莱德岛的主权要求；作为交换，两国之间要分享OFN在阿根廷周边海域，如马尔维纳斯群岛、德雷克海峡等海区的行动情报。\n\n在贝尔特拉米诺看来，这不仅是一笔公平的交易，也是国际社会对阿根廷南极宣称合法性的明确承认。他决定接受。"
 antarctica_aaa_op90prep.230.a: "他们为协议达成而举杯，小心翼翼地离开了。"
 antarctica_aaa_op90prep.230.a.tt: "我们将获得§G10宣称点数§!£Antarctica_texticon_LEG 。\n我们将获得针对$Antarctica_GUI_AAG_Name$的§B4情报掌握度§!£Antarctica_texticon_INTVAL 。"
 antarctica_aaa_op90prep.240.t: "遇险应答"
 antarctica_aaa_op90prep.240.desc: "半个小时前，近乎疯狂的求救信号就已经沉寂下来，通讯电台里只传出模糊的静电声响，话务员的呼叫没有得到任何回应，一切都静寂无声。马里奥·路易斯·奥莱扎焦急地看着时钟指针滴答滴答，窗外的风雪仿若要压垮这里单薄的墙壁。“没有任何回应，”话务员仰倒在椅背上，无力地说道，“通讯全都断了。”\n\n一场猛烈的暴风雪在这个冬夜席卷而来，隔开了埃斯佩兰萨站与许多前哨站点。而正是在此刻这样恶劣的天候之中，他们收到了求救信号：某处发生了某些事故，必须要立刻撤离。奥莱扎曾多次遇到这种情况，这也是他在这里的原因。\n\n静电电流仍然嗞嗞作响，与漫天飞扬的狂风落雪一同袭来。奥莱扎知道，自己每浪费一秒钟，就意味着又一层雪花覆压在了前哨站之上。但是，在这样的天气里出去？会不会太危险了？\n\n奥莱扎走出屋外，迎面而来的阵阵冷风仿佛要把他的热血都凝成冰块。当然，他还经历过更糟糕的事情。埃斯佩兰萨站的飞机跑道上，刺眼的橙色指示灯不断闪烁，与漆黑的夜空交相辉映。南极重力风在空中卷起片片雪云，但跑道条件仍然足以让他驾机起飞。奥莱扎经历过更糟糕的事情，他带着这样坚定的信念，走近跑道边停泊的道格拉斯C-47飞机。在暴风雪的冲击下，庞大的金属机身正发出一阵阵吱吱嘎嘎的呻吟声。\n\n一名地勤机械师穿着显眼的橙色夹克，摇摇晃晃地从一架飞机的阴影中走出来。他看到走近的奥莱扎，大喊道：“你疯了吗？要是现在起飞，你会坠毁在海湾里的！”"
 antarctica_aaa_op90prep.240.a: "奥莱扎没有停下脚步，迎面走过机械师，将他的呼喊抛在背后，爬上了飞机。"
 antarctica_aaa_op90prep.240.b: "奥莱扎望着不祥的天空，又看了看机械师的面庞。也许，他应该等到天气放晴。"
 antarctica_aaa_op90prep.250.t: "红色三角"
 antarctica_aaa_op90prep.250.desc: "三道鲜红的灯光划破漆黑广袤的天空，在风云雪浪之中画出了一个三角形。飞机在乱流中上下颠簸，咆哮的风雪震颤着机体，奥莱扎的周围不断响起金属结构的呻吟，但这一切都没有让奥莱扎退缩。他的目光始终没有离开身下的三角形，灯光像爆竹一样忽明忽现，但也足以在黑暗中成为一座红色的灯塔：求救信号还在，那就意味着至少还有人活着。\n\nC-47开始盘旋下降，金属机身愈发颤栗起来。狂乱的阵风在崎岖嶙峋的冰盖与山丘之上飞掠而过，卷起大团大团的雪花。奥莱扎试图顺着风暴的方向前进，红色灯光照亮了一片平地，是稍纵即逝的降落窗口。他近乎优雅地降落，稳稳地脱离了流放大陆的嗥叫。\n\n奥莱扎走下机舱，但除了愈发微弱的灯光，他什么都看不见。他步履蹒跚地走过荒地，自然的巨力将他拖入了黑暗之中。奥莱扎拼命挣扎，甚至有时只能匍匐在地，躲避空中的冰雪。除了暴风在他的身周呼啸，他什么也听不到；除了寒冷刺穿他的外套，他什么也感觉不到。然而，他仍然坚持着，在鲜红灯光的映照下，他看到了朦胧的身影。幸存者们和他一样艰难地挪动着，向他挥手示意，这又给了奥莱扎新的力量。\n\n似乎过了很久很久，奥莱扎和被困人员一起爬回了飞机上。其中一人昏迷不醒，半身冻僵，还受了些伤，奥莱扎用随机带来的医疗用品进行了临时的抢救。其他人则把前哨站里抢救出来的一点点物资也一起搬上了飞机。飞机已经飞不起来了，上面满是冻结的冰霜，燃料不足，还因为强行着陆而伤痕累累。修好飞机需要一段时间，还会消耗些前哨站里抢救下来的物资。不过，就这样吧，毕竟命才是最重要的。"
 antarctica_aaa_op90prep.250.a: "疯狂的飞行员与幸存者们挤在一起取暖，共同修好了飞机。"
 antarctica_aaa_op90prep.250.a.tt: "我们将获得§G10宣称点数§!£Antarctica_texticon_LEG 。\n我们将失去§W8补给§!£Antarctica_texticon_SUP 。"
 antarctica_aaa_op90prep.260.t: "湛蓝之夜"
 antarctica_aaa_op90prep.260.desc: "暴风雪一停下来，埃斯佩兰萨站就开始对飞机进行除冰。加热的液体喷洒在机身和机翼上，奥莱扎在飞行员室里坐立不安地等待了好几个小时，才终于登上了飞机。失联的前哨站没有传来任何消息。风挡上，除冰液次第落下，冰霜都已经消失不见。奥莱扎想着，他们已经等了很久了，颤抖的手指碰上了操纵杆。\n\n他的脚下是绵延不绝的白色荒原，在晴朗的星空下，周围的山峰和脊线依稀可辨。月亮低垂，远远地挂在海边。奥莱扎看到它时，不禁为这宁静的冬夜而震惊起来。在这次飞行中，他没有看到一丝云彩和生命的迹象。几个小时前的狂风大作已经变成了轻柔的风声，吹拂过飞机的表面。天气变好了，或许能让饱受折磨的前哨站队员们稍作喘息吧。\n\n当他终于飞抵失联的前哨站时，风已经彻底停了下来。他冒险跳下飞机，走向前哨站所在的方向。虽然他的心志仍然坚毅如钢，但他仍希望至少能听到等待营救的幸存者们的声音：欢呼声、求救声，只要有，就是好的。但当他穿过基地的断壁残垣时，一切都仿佛静止了，层层冰雪掩埋了建筑物的残影，覆压在曾经的前哨站之上。\n\n奥莱扎大声呼喊，寻找着一切可能存在的生命迹象。他终于找到了，数具冻僵的人体挤在一起，希求着逝去的温暖。他们的面孔已然辨认不出，人、活生生的人，就这样消失在了南极的白霜之中。奥莱扎盯着遇难者，咬紧了牙关：他应该早些出发的；他本可以救下这些人的；他本可以做点什么的——为什么、为什么他是个这样的懦夫、胆小鬼？"
 antarctica_aaa_op90prep.260.a: "繁星闪烁，默默无言，俯瞰着奥莱扎失败的营救。"
 antarctica_aaa_op90prep.260.a.tt: "我们将获得§W10补给§!£Antarctica_texticon_SUP 。\n我们将失去§G8宣称点数§!£Antarctica_texticon_LEG 。"
 antarctica_aaa_op90prep.270.t: "智利人"
 antarctica_aaa_op90prep.270.desc: "在隶属于阿根廷共和国海军的罗萨里奥号上，卢戈·帕斯卡尔二等水兵正在执勤。然而这艘船压根无法胜任在南极水域的巡逻任务。作为一艘一战前的炮艇，罗萨里奥号及其同类舰艇最初的设计目的是进行内河巡逻任务。但在瓜分南极洲期间，阿根廷方面将大量被封存的舰艇重新启用编入作战序列，以此确保其南极领地沿岸的安全。为了应对恶劣的南极海况，罗萨里奥号已经进行了部分改装，但是这点小修小补还是无法让这艘岸防舰适应开阔海域的航行。\n\n雪上加霜的是，尽管智利海军在数量上略逊一筹，但斯尼佩岛之战的惨败促使他们对阿根廷海军始终保持着在导弹巡洋舰方面的技术优势。\n\n而在这方面的落后让阿根廷水兵们夜不能寐，对于罗萨里奥号上的船员们更是如此。此时此刻，他们正在拦截一艘企图靠近阿德莱德岛的智利舰艇。智利方面貌似只派出了一艘运输船，大概率是运送民间科学家登岛，但是也不排除暗中运输军事物资与人员的可能。该死，可能这船就是个诱饵，智利的导弹巡洋舰也许在附近伺机而动，只等阿根廷舰船进入他们的射程。倘若在这片海域沉船，那便是叫天天不应，叫地地不灵了。\n\n罗萨里奥号的舰长下令对智利船只舰首前方海域进行警告性射击来迫使其返航。尽管近来似乎一直是己方在做出挑衅行为，但帕斯卡尔还是由衷希望对方能够保持理智调头离开而不是借机生事。当那老旧的榴弹炮塔转向瞄准时，全船人员都屏气凝神，随着炮口浓烟喷出，两发炮弹从对方舰桥擦过。智利人近几个月来愈发大胆了，帕斯卡尔心中泛起忧虑，说不好哪一天他们就会开火回击了。"
 antarctica_aaa_op90prep.270.a: "但至少在今天，智利人还是选择掉头返航。"
 antarctica_aaa_op90prep.270.a.tt: "我们将获得针对$Antarctica_GUI_AAC_Name$的§B4情报掌握度§!£Antarctica_texticon_INTVAL 。"
 antarctica_aaa_op90prep.280.t: "山脉注目之下"
 antarctica_aaa_op90prep.280.desc: "在发射药燃烧的烟雾中，信号弹扶摇直上，耀眼的曳光尾迹划破长空。闪烁的光芒之中，潜藏在南极半岛山系中的漆黑悬崖和崇山峻岭似乎都活了过来，宛若冰封的黑岩巨像，高高在上地俯瞰着山谷中与可怕暴风搏斗的渺小身影。\n\n那几道身影紧紧相依，互相抓着绝不松开。队伍排成一列，跌跌撞撞，迈开冻僵的双脚顶风逆行。\n\n希罗走在队伍的最前面，雪地车灯穿过灰蒙蒙的雪云，狂风在他的耳边呼呼作响。当它迎面撞上陡峭的悬崖、掠过冰结的裂隙时，暴风雪演奏的管弦乐猝然而起，奏响更高亢的乐章；而随着重力风自山巅倾泻而下，轰入谷底，乐团的声量又突然转强，在风雪中发出阵阵凶猛的嗥叫。\n\n希罗紧紧抓住身后的队员，小心翼翼地在裸露的干燥岩石上领路。每一步都是挑战。尖利湿滑的岩石、积雪覆盖下的碎石、经历长年累月的风蚀后彻底失去棱角的光滑石块——它们散布在山间小径之上，让人们一次又一次失足滑倒。在冷酷无情的风神面前，这支小队的队员们就像布娃娃似地东倒西歪。但是，雪中的队伍并没有失散，而是依然紧紧跟随着在山道边缘行驶的雪地车。\n\n在这样的霜雪中，只有雪橇犬还能维持住温暖的体温，勇敢地冲向前方。队列短暂散开时，一名队员在陡峭的悬崖边不慎滑倒，是一只雪橇犬扑过去，紧紧地咬住了他。多亏了它，不然这名队员就已经落入黑风暴的魔爪了。\n\n希罗努力将思绪从求生本能之中解放出来，让大家再组织起来。雪地车在崎岖破碎的路上艰难前行，但队伍毫不动摇：他们身心强健、互帮互助。至于雪橇犬？老天啊，要是没有它们，这队伍还能走到哪儿呢？"
 antarctica_aaa_op90prep.280.a: "在风雪交加的山峰另一边，圣马丁站等待着他们，每一步都在考验着南纬90行动小队的潜能。"
 antarctica_aaa_op90prep.290.t: "方向感"
 antarctica_aaa_op90prep.290.desc: "与绝大多数在南极洲越冬的人们不同，莱亚尔上校将冬季视作机遇，而非摧残灵魂的诅咒。其他人都窝在屋里、想要熬过这漫长的极夜，莱亚尔却更乐意让部下都活跃起来，保持体形，更不要陷入思念家乡的情绪中无法自拔。\n\n实际上，他鼓励大家将南极大陆也同样当作自己的家乡、自己的祖国，就像是阿根廷的其他土地一样。毕竟，这就是事实啊。\n\n莱亚尔当下正面临着一桩挑战，也是南纬90行动中的关键部分之一。虽然阿根廷南极属地的称职导航员为数不少，但唯有最优秀、经验最丰富的导航员才能绘制出通向极点的道路，同时在新版地图上画出更精确的边界，巩固南极领地的主权。这也是这次行动保护未来的方式之一。\n\n莱亚尔给麾下的测绘员们布置了一项任务：在南极黑暗的极夜和暴风雪中，从埃斯佩兰萨站出发，绘制周围方圆十公里区域的地图。\n\n测绘队伍两人一组，配备无线电对讲机，每人驾驶一辆雪地车，燃油量相当有限。救援队在雪橇车上随时待命，准备救助发生意外的小队队员。\n\n莱亚尔将测绘结果与现有的地图进行了交叉比对。虽然一部分小队的新成果比档案中的地图更精确，但只有一个小组绘制出了完全准确的地图，甚至他们的燃料和任务时间还有富余。自然而然，上校决定将他们二人选入行动队伍，率领阿根廷直抵极点："
 antarctica_aaa_op90prep.290.a: "罗伯托·温贝托·卡里翁上士、阿道弗·奥斯卡·莫雷诺上士。"
 antarctica_aaa_op90prep.290.a.tt: "§W罗伯托·温贝托·卡里翁上士§!、§W阿道弗·奥斯卡·莫雷诺上士§!已加入§O南纬90行动§!§Y人员名单§!。"
 antarctica_aaa_op90prep.300.t: "兄弟情谊"
 antarctica_aaa_op90prep.300.desc: "在莱亚尔上校的临时测绘导航任务结束后，埃斯佩兰萨站的后厨里举办了一场在南极足以堪称盛大的宴会：撒满胡椒的炖牛肉，配上白米饭和新鲜出炉的面包，再加上基地里还有的菲内特布兰卡酒。佳肴美味之后，还有炼乳风味的焦糖牛奶酱、暖乎乎的热巧克力、乃至足够在座宾客畅饮的咖啡。\n\n莱亚尔正站在房间的另一边，酒过三巡，菜过五味，这正是他最钟爱的事物：哪怕在地球最后的边疆，兄弟之间的情谊也不会磨灭。这场宴会并不仅仅只是什么善意的惺惺作态，在冷酷黑暗的南极寒冬，即使一切都做到最好，人们的心气也不免会低落下去。当务之急是让大家都打起精神来，免得忧郁在心中生根发芽。\n\n上校穿过喧闹的宴席，坐在了他选定的两位测绘员，卡里翁上士和莫雷诺上士身边。“祝贺你们，真是完美的导航。”莱亚尔与他们攀谈起来，“如果你们能在黑夜中找到方向，那极点就也算不上麻烦了。”\n\n两人都被上校这略有些夸张的说法逗笑了。找到南极点，那是最简单的事情，任谁都能办得到；但踏上南极点，再全须全尾地回来，可就是另一个难度层面的问题了。许多人、许多生灵，都因此而丢了性命。\n\n卡里翁上士说道：“长官，我们会竭尽全力。”"
 antarctica_aaa_op90prep.300.a: "“我别无所求。”"
 antarctica_aaa_op90prep.310.t:0 "指挥链条"
 antarctica_aaa_op90prep.310.desc:0 "“嘿，少尉，你想不想给自己挣枚勋章？”莱亚尔上校不失风趣地调笑道。\n\n“啊，对不起，上校。您能再说一遍吗？”萨瓦拉少尉似乎是不太确定自己听到了什么，询问道。\n\n“来，听听这个。”上校调大了桌上无线电的声量，又对着话筒说道：“指挥部，能否重复火地岛发来的消息简报摘要？”\n\n话筒另一端的播发员用单调的语气咕哝着回应道：“马耳他会议上发生炸弹恐怖袭击后，三头同盟已经正式解散。恐袭发生前，我国曾提出将加林德斯岛租借予意大利，以获得一定程度上的经济优惠待遇以及武器装备。虽然现在炸弹袭击木已成舟，但我国驻马耳他的代表团决定按原计划推进这次交易，以证明阿根廷对意大利盟友的承诺，无论三头同盟存在与否，我们都不会放弃与意大利的友好关系。意大利的托里西海军上将已经在路上了。简报完毕，上校，我能挂断了吗？”\n\n“当然，当然，谢谢你的最新消息。”莱亚尔说着，关上了无线电。\n\n“少尉，你需要多长时间能做好转交加林德斯岛的准备？不用那么乐观，最晚要多久？”\n\n萨瓦拉思考着如何给上校一个完美的答复。在军官队伍中，军阶越高，就越难更上一层楼，而现在摆在面前的机会或许能让他踏上更高一步的台阶。“两周，但前提是您今天晚上就要让我搭飞机出发。”萨瓦拉自信地给出了回答。\n\n“很好，我会安排的。而且你懂的，这桩功劳会归到普哈托头上，我得给他点甜头让他高兴高兴，但我知道谁是真正干事儿的人。”莱亚尔保证道。\n\n萨瓦拉转身离开房间时，莱亚尔又叫住了他，向这位下级军官传授了自己的最后一项建议："
 antarctica_aaa_op90prep.310.a:0 "“在军官的世界里，你得像是鲨鱼一样。别停下来。”"
 antarctica_aaa_op90prep.320.t:0 "大自然的教育"
 antarctica_aaa_op90prep.320.desc:0 "托里西上将和普哈托准将二人的手紧紧相握，阿根廷仪仗队站在前排，萨瓦拉少尉也在队伍之中。仪式很是冗长，一拖再拖，裹在蓝色军礼服的每一秒都让少尉愈发难受。交接正式完成后，众人欢快地庆祝起来，加林德斯岛恶劣糟糕的天气也无法浇灭他们的热情。\n\n南极洲的新邻居们开始互相介绍认识，一名孤单的小号手吹起了略带哀伤的曲调。雨水一阵一阵地拍打着帐篷，临近的低气压笼罩着小岛，暴雨毫不停歇，倾盆而下。\n\n午夜零时，最后一批阿根廷人登上巡洋舰，离开了加林德斯岛。在军官舱室甲板上，经受了一整天漫长政治狂欢的普哈托和萨瓦拉终于得到了片刻放松。萨瓦拉端着两杯咖啡，放在了桌子上，说道：“这天气可真是糟透了。”\n\n“嗯哼，对我们来说今天已经结束了，但意大利人嘛，他们要经受南极粗暴的拷打喽。”普哈托说道。\n\n“我很高兴自己不是唯一一个这么想的。他们在外面的时候可是瑟瑟发抖啊。”萨瓦拉回应道。\n\n“你想知道为什么吗？意大利人穿的不是宽松的冬装，而是厚厚的羊毛大衣，而羊毛大衣是会吸湿的，会在流汗的时候冻在身上，上个月希门尼斯少尉就是因为这个才会体温过低的。不过，无所谓了，总之已经不是我们的问题了。”\n\n萨瓦拉点点头，回答道：“如果走运的话，我们应该能得块勋章嘉奖，也许还会有晋升……但意大利人呢？他们除了武器什么都没带，他们完蛋了。”\n\n话音刚落，老将军站起身来，准备回到舱室里休息："
 antarctica_aaa_op90prep.320.a:0 "“晚安，少尉。我们已经汲取过这样的教训了，心怀感激吧。”"
 antarctica_aaa_op90prep.330.t:0 "正在收听"
 antarctica_aaa_op90prep.330.desc:0 "莱亚尔上校站在埃斯佩兰萨站总部的门廊边，俯瞰着麾下的南极基地。在银白雪原的映衬下，橙黄色建筑显得格外夺目。寒冬已经来临，莱亚尔想要借此机会视察一下基地设施，为接下来阶段的南纬90行动做准备。在各个部门之中，他尤其想要确认信号楼的工作情况，为探险队找一位称职的无线电报务员。埃斯佩兰萨站信号大楼在各种意义上都是阿根廷南极属地的中枢神经所在，它负责处理各个前哨站和基地之间的通信联络，保证补给物资按时按点到达目的地，当然，军事活动的协调也要经过这里。如果打比方的话，这里就是大脑，左右手经由此处知晓互相的行动；这里也是阿根廷在南极的蜂巢，指挥着各地奔波忙碌的工蜂。莱亚尔见过这里操作员们的工作效率，给他留下了深刻的印象。手指在打字机键盘上舞蹈，飞快无误地敲出一串串摩尔斯电码；接收器则发出噼噼啪啪的电流声，完美地传达着送往各部的命令，指挥阿根廷的人们在这片冰天雪地中奋战。\n\n莱亚尔思索着无线电如何开启了南极探索与开发的新纪元。理查德·E·伯德上将进行他的第一次南极探险时，就使用了无线电设备与外界保持联络，协调互相之间的活动。时至今日，无线电已经成了南极必不可少的生存工具，也是他们要在接下来冲向极点时不可或缺的要素。虽说埃斯佩兰萨站有许多水平合格的无线电操作员，但其中有一位让上校特别在意。莱亚尔走到一张桌子前，问道：“多明戈·萨卡里亚斯上士？”操作员依然监听着无线电信号，没有回应他。莱亚尔又一次开口，以更加坚定、不带愠怒的语气叫出了他的名字：“萨卡里亚斯！”\n\n萨卡里亚斯这次听到了，他回答道：“噢，能稍等一会儿吗，我正在——”然后他抬起头，意识到了自己刚刚是在和谁说话。上士忙站起身来敬礼：“是，长官。非常抱歉，上校！”\n\n莱亚尔微笑着：“稍息。我知道，你是我们这儿最优秀的报务员。我亲自来是要告诉你，你已经被选中来执行一项新任务……”"
 antarctica_aaa_op90prep.330.a:0 "“……你要和我们一起去南极点。”"
 antarctica_aaa_op90prep.330.a.tt:0 "§W多明戈·萨卡里亚斯上士§!已加入§O南纬90行动§!§Y人员名单§!。"
 antarctica_aaa_op90prep.340.t:0 "黎明前，他们来了"
 antarctica_aaa_op90prep.340.desc:0 "阿根廷海军罗萨里奥号在笼罩热尔拉什海峡的薄雾中劈波斩浪，全速前进，发动机不堪重负地发出嘎吱嘎吱的响动。这是一艘老旧的炮艇，但船员们也绝不会要求换另一艘船来巡逻南极大大小小小的岛屿。无论这艘船有多少莫名其妙的奇怪动静，或许还锈迹斑斑，但直到现在，它都能好好地载着他们越过南极的冰海，没有出过任何大问题。在无人小岛上插旗是项穷极无聊的任务，但这也是在国内山雨欲来的政治混乱中抽身离开的办法之一。\n\n又一座岛屿划破轻雾，出现在船员们的视野之中，一支五人小队将登上这里，插上阿根廷的国旗。官方层面上讲，温克岛属于智利，但他们之前立起国旗的岛屿其实也属于智利，更何况这些岛屿本来也无人居住。小队上岸后，开始寻找插旗的好位置。此时，一名士兵向带队军官示意，他发现了一处小木屋，还有木屋旁飘扬的智利国旗。木屋看起来破旧不堪，似乎已经被遗弃了，但没人愿意冒这样的风险。水兵们抬起步枪，从四周包围了破旧的小木屋。\n\n卢戈·帕斯卡尔二等水兵小心翼翼地走到门边，闪身冲进了小屋。屋里有两名智利士兵正在打牌，他们想要起身拿起武器，但还没来得及动弹，黑洞洞的枪口就已经对准了他们，于是只得慢慢地举起了双手。其他上岸的阿根廷水兵也走了进来，房间鸦雀无声，不祥的暴力威胁弥漫在空气之中。突然，只听得“砰”地一声，水壶烧开了，一个智利人显然是吓了一跳，枪声随之响起，子弹打进了他的胸膛。短短一秒钟内，带队军官就已经做出了决定：他拔出手枪，毫不犹豫地击碎了另一名智利俘虏的头。\n\n枪声平息，小队收到命令，将所有智利人的踪迹抹除干净。于是，小木屋在烈火中化作灰烬，尸体扔进大海再无踪迹。最后一缕青烟消散时，帕斯卡尔扯下了风中的智利国旗。至此，任务完成。"
 antarctica_aaa_op90prep.340.a:0 "太阳在荒岛上冉冉升起，照耀着无火的余灰与一面蓝白旗帜。"
 antarctica_aaa_op90prep.350.t:0 "外交进展"
 antarctica_aaa_op90prep.350.desc:0 "贝尔特拉米诺靠在办公椅上，长叹一声。布宜诺斯艾利斯的短暂假期勾起了他的许多回忆，但比起现在的任务而言，那些美好的旧日回忆就又要算不得什么了。上校委派给他的任务是利用自己广泛的外交人脉，赢取到某个南极邻居的支持：意大利、德国或者是日本。这让贝尔特拉米诺想起了自己早年在瑞士办外交时的经历，那段曾经与铁杆盟友的外交精英们觥筹交错、共度良宵的时光。\n\n在这各方之中，意大利似乎是阿根廷交好的不二之选。两国之间不但拥有广泛的外交关系，在族裔血缘上也十分亲近。此外，意大利是南极大陆上的新来客，领地仅限于加林德斯岛上的一个小小基地，但他们却能为阿根廷带来许多帮助。而且，尽管贝尔特拉米诺不愿承认，意大利过剩的军火武备也能为阿根廷所用，至少这些枪炮会掌握在莱亚尔上校手中，不会落到海军的手里。\n\n那德国呢？德国多年以来始终与阿根廷维持着良好的外交关系，在许多年前贝尔特拉米诺为阿根廷南极领地而做出的那场外交豪赌之中，德国也扮演了关键的角色。即使时至今日，德国能为阿根廷提供的东西也不少，比如德国富余的破冰船就能卖给阿根廷嘛。然而，这个选项在道德上并不无懈可击：或许有成百上千的奴工为了这些船只而流汗流血，一念及此，贝尔特拉米诺就不寒而栗。\n\n最后一个就是日本了。日本是南极大陆上的神秘来客，贝尔特拉米诺对他们知之甚少，或许还远远不如日本强大间谍网络对他本人的了解。不过他能肯定的是，日本有可能会对其相邻的智利领地施压，阿根廷则能从中渔利，至少也能得到些有用的情报。作为一名外交官，贝尔特拉米诺自然倾向与外交支持而非直接的军事支持，但他依然不确信能否相信日本人，或许阿根廷只是他们围棋棋局中的又一枚棋子而已。贝尔特拉米诺又稍作思索，提起电话听筒，说道：“请帮我接……”"
