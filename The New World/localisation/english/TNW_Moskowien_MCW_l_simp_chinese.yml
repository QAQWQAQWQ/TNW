 MCW_Odilo_Globocnik: "奥季洛·格洛博奇尼克"
 POLITICS_MCW_ODILO_GLOBOCNIK_DESC: "迄今为止，在“正确的时间”、“正确的地点”，用上“正确的人”，究竟对德国的东欧计划有什么用？若说有一个人，能够证明诸如此类的人事决定只是徒劳无功，那就是莫斯科专员：奥季洛·洛塔尔·路德维希·格洛博奇尼克。\n\n“格洛布斯”前去莫斯科的任命出自海因里希·希姆莱的手笔，当地所有权力机构：党卫队、警察、纳粹党、乃至所有与种族等级制度和德意志定居者事务有关的部门，其大权悉数归于格洛博奇尼克专员。在这个职位上，格洛博奇尼克继续奉行着民族社会主义强硬派的政策，但在与合作者打交道时，他又有些像前任专员卡舍，表现出部分实用主义的倾向。\n\n格洛博奇尼克在莫斯科的统治手段虽然残酷，但却正不可逆转地慢慢滑向失败的深渊。这并非是因为无能，而是因为莫斯科专员辖区政治格局的要求远远超出了格洛博奇尼克一人有限的能力。他深知这一事实，对莫斯科维恩的恐惧日复一日地啮咬着他。多年来，重复单调的麻木将自己折磨得支离破碎，这就是格洛博奇尼克的感受。\n\n专员如今的人生宛若炼狱，也或许，他早已降下了地狱之中——所有的机会都被他抛在了身后。格洛博奇尼克如同西西弗斯一般，每天被迫重复着一成不变的事情，可不同的是，除非用上过去式，他甚至都无法想象幸福的样子。自早年任职于卢布林时，专员就倾向于依赖药物和酒精应对种种烦闷，在今日的忧郁之下，这样的结果只能是渐渐走向疯狂，沉沦于过去，臆想事情原本会变成怎样。"
 POLITICS_MCW_WOLF_HEINRICH_GRAF_VON_HELLDORFF_DESC: "在赫尔多夫眼中，元首——不是现在的某个山寨货，而是真正的元首身上，寄托着他对人民与祖国的所有期冀和愿望。在斗争时代中，赫尔多夫投身于民族社会主义，可时至今日，它却已经变了样子，再也不能赢得他毫无保留的赞成。如此一来，赫尔多夫便成为了纳粹最早压迫的缩影，但也变作了它所深恶痛绝的对象。\n\n赫尔多夫在还是个不到二十多岁的年轻壮小伙子时，就被扔进了大战的绞肉机。归来之日，他的身心早已支离破碎，渴望复仇。沃尔夫-海因里希·冯·赫尔多夫伯爵加入纳粹党是为了让德国人民免于精神和物质上的奴役，但只要向这个所谓“党内同志”的名字投去一瞥，他身份上的裂痕便会浮现在眼前。\n\n他参与进了建立新秩序的革命运动之中，但最能令他高兴的事情莫过于人们称呼他的贵族全名；他笃信革命纳粹主义，却利用任何可能的职务之便肥己敛财；他聪慧而自私，富有魅力又卑鄙下流，贪婪无度又肆意挥霍，常常举杯但未曾酗酒；另外，他还以某种方式维持着与年轻时基督教经历的联系。多年来，他就这样在钢铁地狱中放浪形骸，将痛苦的目光投向日耳曼尼亚。\n\n但随着莫斯科之乱爆发，老伯爵召集起身边的“老战士”们，废黜了格洛博奇尼克，将殖民地的锁钥紧紧握在手中。赫尔多夫是一个没有未来，只有此时、此刻、此地的人，他将用自己的权力建造起一座纪念碑。这不仅是为了他自己，也是为了早已为纳粹主义所遗忘的理想——或许也是为了纪念恩斯特·罗姆、约瑟夫·戈培尔，这群被沃尔夫-海因里希·冯·赫尔多夫伯爵抛弃而遗失已久的朋友们。"
 MCW_Claus_Von_Stauffenberg: "克劳斯·冯·施陶芬贝格"
 POLITICS_MCW_CLAUS_VON_STAUFFENBERG_DESC: "于克劳斯·申克·冯·施陶芬贝格伯爵而言，这是梦想成真的时刻。他是一名贵族，从未真正成为过纳粹党的一员。二十年岁月匆匆而过，老普鲁士最后的卫兵终于得以显著削弱了束缚普鲁士的纳粹机器。\n\n然而，彻底胜利的日子还没有到来：施陶芬贝格政府问题重重，联盟也并不稳定。施陶芬贝格倡导“贵族”军国主义，憧憬着理想化的中世纪德国图景，以此率领欧洲走向文化和文明的新高度。但是，这一理念却饱受争议，还常常受到与他为伍的军官们的抨击。\n\n已经退役的迪特里希·冯·绍肯老将军将抵抗的大帐篷缝在了一起。如果没有绍肯，计划一定会失败；但多亏了他，谋划才得以成功。尽管格洛博奇尼克和冯·赫尔多夫已经走人了，但他们留下的问题仍然令人头痛不已。更何况，莫斯科原本就和什么“稳定”之类的词不沾边。\n\n殖民地正在伊万·沃罗比约夫游击队的攻势下摇摇欲坠，施陶芬贝格必须在事态失控或敌人夺权之前迅速稳定局势。随后，他必须将权力移交给某位在日耳曼尼亚拥有良好声誉的人以巩固政府，才能在这小小胜利的基础上，继续再接再厉。"
 MCW_Fritz_Dietlof_Von_Der_Schulenburg: "弗里茨-迪特洛夫·冯·德·舒伦堡"
 POLITICS_MCW_FRITZ_DIETLOF_VON_DER_SCHULENBURG_DESC: "弗里茨-迪特洛夫·冯·德·舒伦堡伯爵从不热心追求仕途。他并不贪权恋栈，这正是他得到职位的原因。所有选中他的人都不得不钦佩他过去的履历：舒伦堡一辈子都是坚定不动摇的公务员兼预备役军官，从未与纳粹密谋的琐碎争吵和腐败扯上任何关系。\n\n但在这样的表面之下，又有其他浮出水面的冰山一角。舒伦堡可以说是一个行走的矛盾集合体。纳粹或许会指控他是隐蔽的社会主义者：年轻时，舒伦堡曾是社民党报纸编辑的朋友，同情工人，还会在夜晚加入列宁主义小圈子的讨论。\n\n如此看来，舒伦堡憎恶君主制似乎显而易见，令人惊讶的则是他对魏玛共和国也抱有相同的态度。舒伦堡梦想着“日耳曼-斯拉夫”的命运，也就是说，德国在东欧建立起一个帝国，同时以某种方式与当地民族和谐共处。但是，这还不是舒伦堡最危险的立场，更危险的是，他还在设想后纳粹时代德国的组织架构，和摆脱纳粹主义枷锁的莫斯科维恩。\n\n舒伦堡的想法令人怀疑：他比施陶芬贝格更具争议，更加仰仗于迪特里希·冯·绍肯老将军维系长年以来的密谋圈子。而他的愿景能否在莫斯科的尸骸之上实现，唯有时间能告诉我们答案。"
 MCW_Mikhail_Oktan: "米哈伊尔·奥克坦"
 POLITICS_MCW_MIKHAIL_OKTAN_DESC: "鲜少有合作者能像米哈伊尔·奥克坦这样备受嘲讽——“天才的无赖冒险家”、“十足十的流氓”、“奴颜婢膝的聪明狂信徒”，这都是认识奥克坦的人对他的评价。据他的一位前同事的说法，奥克坦还会有意识地模仿阿道夫·希特勒的外表和肢体动作。\n\n可话又说回来了，为什么不这样称呼他呢？在“犹太人问题”上，奥克坦几乎比其他任何有名有姓的高层合作者都更不遗余力地追随纳粹路线；在与“犹太微生物”战斗时，奥克坦以绵绵不绝的热情投身其中，其奉献精神丝毫不亚于任何一名纳粹党内的下级长官。\n\n此外，在布尔什维主义问题的路线上，奥克坦也与纳粹党几乎完全一致，即布尔什维主义是为犹太人服务、企图统治世界的工具。他断言，在俄国遭遇失败后，犹太人又试图将共产主义传播到西方，直至德国以武力将之终结。可以说，没有比米哈伊尔·奥克坦更完全认同民族社会主义的合作者了。\n\n奥克坦坚持认为，德国与莫斯科政府不同，并未将其制度强加于俄罗斯，而是允许恢复土地、习俗和宗教。无论现实如何，他“巧妙地结合了德国军官、敖德萨商人和谄谀奉承的特质”，而当这些特质与奥克坦刻意模仿希特勒的外表结合在一起时，他的目的已然呼之欲出——他想要成为俄罗斯人民的元首。"
 MCW_An_Empty_Throne: "王位空悬"
 MCW_An_Empty_Throne_desc: "莫斯科专员一职的孤寂与煎熬，部分是奥季洛·格洛博奇尼克自身招致，但并非尽数如此。他的性格与才智虽不能说无能，更不是做了叛徒，但在充任专员时却显得力不从心——专员辖区那错综复杂魑魅魍魉的政治环境，对其能力提出了远超常人想象的要求。\n\n单是这份压力，便足以慢慢摧残人的意志。然而更有甚之，在这片黑暗的政治舞台上活跃着诸多势力，处处与他为敌。内部的对手如沃尔夫-海因里希·冯·赫尔多夫，外部的敌人如莫斯科国防军，对格洛博奇尼克政权处处质疑、时时破坏，使本已繁重的治国任务愈发艰难。"
 MCW_Puppet_Kings_Court: "泥胎木偶"
 MCW_Puppet_Kings_Court_desc: "正如古罗马曾设立傀儡君主以掌控征服之地，莫斯科专员如今也开设着“御用”机构——全莫斯科大会。这一机构成立于二战末期，旨在将莫斯科合作者统一纳入单一架构之下，目前受米哈伊尔·奥克坦和布罗尼斯拉夫·卡明斯基操控。\n\n诸如俄罗斯解放军和俄罗斯全军联盟等较为重要的合作者组织叛变或解散之后，留下来的那些合作者基本都是莫斯科维恩纳粹党的忠实走狗。这些“傀儡君王”，如同现代版的希律王，在过去二十年间一直不遗余力地维持着他们的合作姿态。"
 MCW_The_Wasteland: "不毛之地"
 MCW_The_Wasteland_desc: "对于每个苟活于此的人而言，莫斯科维恩便是现实的人间地狱。这里不存在和平的概念，内部骚乱甚至战争交火时有发生；这里不存在繁荣的概念，一百个莫斯科人里有九十九个对“财富”一词闻所未闻。如今，莫斯科维恩是荒芜的不毛之地，而这正是殖民者——民族社会主义德意志工人党所希望的。\n\n依然有人怀抱着虚无缥缈的期冀，等待着游击队来解救莫斯科。然而，二十载占领岁月已经过去，抵抗之声早已不复高亢。许多部队已经逃亡西俄的无政府地区，留下的人则只能接受德国统治。"
 MCW_Crown_Of_The_Old_Fighter: "老近卫军之冠"
 MCW_Crown_Of_The_Old_Fighter_desc: "总而言之，纳粹党莫斯科支部最终安然无恙地渡过了第二次斗争时期。然而，新元首人选尘埃落定并不意味着他们能松一口气，安于现状。毕竟，在专员辖区缔造的废土之上，又哪里会容得下放松的余地呢？\n\n紧闭的门扉背后，是斧声烛影的密谋。奥季洛·格洛博奇尼克和他的老对头沃尔夫-海因里希·冯·赫尔多夫伯爵之间剑拔弩张，为了争夺莫斯科的绝对权力而彼此争斗。他们是民族社会主义早年“光辉岁月”留下的遗老，如今却为了希特勒帝国边边角角的残羹冷炙而争吵不休。"
 MCW_Purgatory: "炼狱"
 MCW_Purgatory_desc: "格洛博奇尼克与赫尔多夫是被民族社会主义早年“光辉岁月”抛下的遗老。出于种种原因，他们的支持者和盟友早已无处可寻，在本土的影响力也彻底消失。这两个人被困在了名为专员辖区的陷阱中，根本没有任何希望爬到更高的位置。\n\n尽管如此，他们早已接受了自己的命运。作为莫斯科纳粹党权势最盛的两位政治掮客，他们怀揣着无数野心与宏图大计——他们坚信，这些举措会让现状更好受些。如果这座城堡注定要归我所有，他们心想，至少让我来为它增添几分光彩吧。但只有天堂知道，当他们离去之时，这座城堡究竟会变成什么模样。"
 MCW_Vassals_At_Most: "无害傀儡"
 MCW_Vassals_At_Most_desc: "正如古罗马曾设立傀儡君主以掌控征服之地，莫斯科专员如今也开设着“御用”机构——全莫斯科大会。但时至如今，专员真的还需要它继续存在吗？毕竟，随着拉丁、希腊官僚乃至殖民者在当地扎下根来，罗马也一个接一个地废除了曾建立的傀儡王国。\n\n总体而言，莫斯科专员辖区的新政府始终在尽可能地破坏全莫斯科大会及其领导层。专员的目的很明确：如果他最终实现了计划，那么大会将成为一个无害化的机构，甚至像如今这样非常有限的影响力都无法拥有。"
 MCW_Crown_Of_The_Perfumed_Rioter: "麝香暴徒之冠"
 MCW_Crown_Of_The_Perfumed_Rioter_desc: "凭借游说、贿赂与施压等多重手段，沃尔夫-海因里希·冯·赫尔多夫伯爵现已牢牢掌握莫斯科专员辖区的控制权，成功推翻了前任上司对殖民地的掌控。身为纳粹党老近卫军、前冲锋队队员与社会革命思想的信徒，赫尔多夫的掌权预示着莫斯科将迎来全新的治理模式。\n\n赫尔多夫站稳脚跟之后，跨越了五十年代低谷的纳粹党东方支部终于团结起来。如今，它如旧日的冲锋队一般，步伐整齐、意志坚定地向前迈进。"
 MCW_Marching_On_Heaven: "挺进天堂"
 MCW_Marching_On_Heaven_desc: "沃尔夫-海因里希·冯·赫尔多夫治下的莫斯科专员辖区回归到了一种更古老的民族社会主义形态——这种形态可以追溯到第一个斗争时期。赫尔多夫和他的老战友们坚信，那时，民族社会主义的价值观还未受到任何玷污。\n\n尽管德国其他地区如今已落入了较为不纯正的纳粹主义形式之手，但终于，赫尔多夫和他的党内同志找到了一片试验其理念的天地。如今，冲锋队再次在莫斯科专员辖区中列队前行。这位专员，沃尔夫-海因里希·冯·赫尔多夫伯爵，意图带领他们沿着阿道夫·希特勒所开辟的道路迈向所谓的“天堂”。"
 MCW_Levies_At_Most: "挥之即去"
 MCW_Levies_At_Most_desc: "沃尔夫-海因里希·冯·赫尔多夫设计的莫斯科专员辖区对合作者的态度远比前任更加强硬。这种转变在他上任后短短几周之内便表露出来——布罗尼斯拉夫·卡明斯基遭审判处决，以及随后特维尔自治地位的全面废除，其中意图昭然若揭。\n\n根据新任专员的指示，德意志东疆的警备与防卫任务将由莫斯科国防军与德国移民自行负责。与此同时，合作者的影响将大幅缩减，仅作为专员可以随意征召解散的辅助力量存在。"
 MCW_Crown_Of_The_Cowed_Prefect: "坚毅懦夫之冠"
 MCW_Crown_Of_The_Cowed_Prefect_desc: "奥季洛·格洛博奇尼克成功挫败了赫尔多夫与其他对手的颠覆图谋。他准备在殖民地施展自己的意志，再也不是党卫队中的病夫笑柄。曾经那个疾病缠身、母亲一言令下就失去爱情的废物已经不复存在。他是莫斯科专员辖区的专员了，都他妈见鬼去吧！\n\n奥季洛·格洛博奇尼克再也不要当懦夫了。他要掌控一切，他会掌控一切。日耳曼尼亚会明白的，明白他们做出了正确的选择。没有人、没有人，比他更适合——以德意志之名统治东方。"
 MCW_Marching_On_The_Earthly_Realm: "挺进乐土"
 MCW_Marching_On_The_Earthly_Realm_desc: "奥季洛·格洛博奇尼克终于将整个东方稳稳纳入囊中，无可争议地登上了莫斯科专员辖区的专员宝座。此时此刻，他手握重权，时机难得，不容错过，立志要一鼓作气，直抵那伊甸乐土。为此，他下令在东方大地上毫无保留地推行民族社会主义的宏伟蓝图。\n\n他决心将东方总计划的本原纲旨，不改一字一句，悉数加以实现；无论前方有多少荆棘，他都将一一斩断。往昔的障碍已被跨越，未来的挑战不足为惧。曾经，他以超乎想象的决心克服了无数艰难险阻；如今，他的意志必将打破一切现实的束缚。"
 MCW_Knighthood_For_The_Loyal: "封赏忠犬"
 MCW_Knighthood_For_The_Loyal_desc: "奥季洛·格洛博奇尼克无意恢复战前合作者所享有的自治状态。不过，与纳粹党东方支部中更……虔诚的同代同侪不同，他认识到适时提拔纳粹事业忠实信徒进入领导岗位的重要性。在这方面，格洛博奇尼克的立场并未改变。\n\n当然，像特维尔自治这样的孽障将成为历史。然而，对于莫斯科维恩那些忠心耿耿、各司其职且心悦诚服于专员和日耳曼祖国的俄罗斯人来说，只要能迅速镇压叛乱分子和叛徒，他们仍有机会获得足够的自治权，并逐步晋升至更高的权力层级。"
 MCW_The_Brass_Throne: "镀金王座"
 MCW_The_Brass_Throne_desc: "今后，莫斯科专员辖区不再容忍那些满脑荒诞不经的癫佬蠢货和自称为德国人民服务的土匪强盗再来搞他们那套荒诞的治理方式。莫斯科维恩的所有纳粹党办公室悉数关闭，随着国防军一声令下，军政府应运而生。\n\n然而，并非一切都能如人意。国防军接管权力之举或许已在不经意间种下了招致衰败的种子。一边要收拾赫尔多夫和格洛博奇尼克这些溜冰叛徒留下的烂摊子，另一边还要面对沃罗比约夫游击队的猛烈攻势，内外交困之下，国防军疲于奔命、捉襟见肘。克劳斯·冯·施陶芬贝格领导的新政府能否长久维持，还是个未知数。"
 MCW_Ghost_Carnival: "百鬼夜行"
 MCW_Ghost_Carnival_desc: "纳粹党政府在莫斯科维恩的崩溃并不预示着新政权可以安然无虞。国防军接管权力之举或许已在不经意间种下了招致衰败的种子。如今，由伊万·沃罗比约夫领导的游击队正威胁着国防军对莫斯科维恩的控制。\n\n尽管主要城市依旧掌握在政府手中，但在其他地区，游击队却几乎是行动自如。倘若政府无法迅速采取有效的应对措施，它将不可避免地失去对莫斯科维恩偏远地区的实际控制。"
 MCW_Dance_Of_The_Jesters: "小丑之舞"
 MCW_Dance_Of_The_Jesters_desc: "当罗马深陷内战泥沼之时，各路附庸往往趁此机会自立门户，填补、乃至利用罗马防御体系中的漏洞换取自身利益。如今，莫斯科维恩也正上演着相似的一幕。\n\n由于伊万·沃罗比约夫领导的游击队攻势引发的广泛混乱，国防军难以独自维持莫斯科维恩的局面。因此，国防军不得不依赖全莫斯科大会中的合作组织，如反布斗争同盟和俄罗斯人民社会党，来维持基本秩序。然而，这也让这些组织看到了扩张自身权力的机会。"
 MCW_Crown_Of_The_Red_Count: "红伯爵之冠"
 MCW_Crown_Of_The_Red_Count_desc: "如今，弗里茨-迪特洛夫·冯·德·舒伦堡伯爵成为了莫斯科维恩无可争议的主宰。他志向繁多，但它们却彼此矛盾。这位新任总督在几套无法调和的理想之间左右为难：例如，他梦想在东欧建立一个德式乌托邦，却又希望这个理想国能与当地的俄罗斯民族和谐共存。\n\n在他背后提供支持的，是一群饱经风霜的普鲁士将军——他们是帝国贵族最后的余晖，早已淡出六十年代当代德国的记忆。这些老将军是冯·德·舒伦堡权力的真正来源，正是他们施加的影响力，最终使得日耳曼尼亚将舒伦堡的职位从临时任命转为永久性的安排。"
 MCW_Scrying_Bulwark: "预视之垒"
 MCW_Scrying_Bulwark_desc: "莫斯科维恩的军事贵族群体仿佛活生生的悖论。他们对这片他们声称是从共产主义手中解放出来，以增强德国势力的“应许之地”，持有截然相反的双重观点。\n\n同一个军官，用同一张嘴，既能描述纳粹党统治二十年后有目共睹的毁灭与绝望，同时又满怀希望地谈论他们将要塑造的美好未来，坚信这些梦想百分百定会实现。然而，自相矛盾的话语又会令他内心不安：时间无情流逝，如同沙漏中的细沙，提醒着他和他的同僚们时日无多的事实。"
 MCW_Dance_Of_The_Courtier: "廷臣之舞"
 MCW_Dance_Of_The_Courtier_desc: "由于伊万·沃罗比约夫领导的游击队攻势引发的广泛混乱，国防军难以独自维持莫斯科维恩的局面。因此，国防军不得不依赖全莫斯科大会中的合作组织，如反布斗争同盟和俄罗斯人民社会党，来维持基本秩序。然而，这也让这些组织看到了扩张自身权力的机会，这引起了国防军的警觉。\n\n国防军认为，解决办法很简单：分而治之。他们故意挑拨较弱的卡明斯基与更为强大和有影响力的奥克坦对立，以此来保持对局势的控制。理论上，这种策略似乎可行，但其实际效果需要时间来验证。"
 MCW_Crown_Of_The_False_Son: "异种之冠"
 MCW_Crown_Of_The_False_Son_desc: "格洛博奇尼克和他的爪牙做梦也不会想到，自1962年1月1日起短短十年之内，自己会被赶下台来，被那些他们曾视作卑微附庸的合作者取而代之。然而，这就是当下的现实。奥克坦和卡明斯基一步步爬上由普通合作者的尸骨堆积而成的权力巅峰，最终成为阿道夫·希特勒帝国的边疆之主。\n\n不过，莫斯科维恩新君头顶的王冠仍然摇摇欲坠。不管宴会厅中香槟如何肆意流淌，偃旗息鼓的状态始终难以持久。更多的鲜血注定将染红莫斯科的残垣断壁，问题是这鲜血来自于谁。"
 MCW_Empire_Of_Ash: "灰烬帝国"
 MCW_Empire_Of_Ash_desc: "合作者们不再满足于扮演龙套；如今的他们是舞台上的主角，是莫斯科的无冕之王。所以，他们有什么理由不倾其全力绥靖地方呢？他们带着极大的热忱投身于这一任务，缔造了如今所见的灰烬帝国。\n\n在合作者的残酷统治之下，莫斯科维恩既是最丑陋的造物，又是最完美的化身。以正统纳粹角度视之，这里无疑象征着彻底的失败与耻辱；然而，若意识到它为延续希特勒暴政所做的贡献，这却是最完满的成功——因为这标志着民族社会主义意识形态的内化。"
 MCW_The_Suit_And_The_Butcher: "文武双雄"
 MCW_The_Suit_And_The_Butcher_desc: "迎接新的主宰吧——他们表面上与前任大相径庭，但其实别无二致。格洛博奇尼克、赫尔多夫和一众德国高官灰溜溜地滚蛋了，全莫斯科大会却岿然不倒、继续履职。没有德国人发号施令又如何？新的主子马上就会粉墨登场。\n\n随着俄罗斯合作者势力的增长，他们逐步掌控了莫斯科专员辖区，全莫斯科大会也因此成为奥克坦和卡明斯基这两位领导人巩固其统治地位的工具。"
 MCW_Skeleton.1.t: "特维尔总管遇刺"
 MCW_Skeleton.1.desc: "又一个噩耗从莫斯科专员辖区传来。自我们碾碎堕落的苏维埃联盟以来的二十年来，莫斯科的九头蛇就一直暗中为犹太-布尔什维克卖命，这次他们害死了德意志民族的大日耳曼国的另一位忠臣：特维尔总管理查德·曼德巴赫。\n\n他自幼便是一位爱国者，在民族社会主义运动萌芽之时便成为了党员。在我们征服了堕落的斯拉夫赤匪之后，他又被调往乌克兰专员辖区效命，并在期间屡获嘉奖。\n\n之后，他又欣然前往东部边疆为元首和祖国效力。他很高兴能升任为特维尔总管，这不是因为他觉得自己终于“出人头地”了，而是因为他希望能够为国家发挥更大的作用。\n\n这份职责让这位特维尔总管，这专员辖区里最出类拔萃的人献出了生命。据悉，此次暗杀乃特维尔区当地的俄罗斯恐怖分子所为。专员辖区办公室声称将尽最大努力为曼德巴赫同志报仇，确保此类惨剧不再重演。"
 MCW_Skeleton.1.a: "该死的。"
 MCW_Skeleton.2.t: "1962年全莫斯科大会"
 MCW_Skeleton.2.desc: "自米哈伊尔·奥克坦、布罗尼斯拉夫·卡明斯基以及莫斯科专员辖区其他值得信赖的俄国朋友们建立起全莫斯科大会以来，它便通过向元首以及大日耳曼国尽忠逐渐取得了一些特权。而这些特权最终让大会成为了专员辖区内俄国合作者的政治主体。\n\n第一次全莫斯科大会召开以来，便定下了某种恒定不变的基调。大会分为两大派：米哈伊尔·奥克坦领导的反布斗争同盟，和布罗尼斯拉夫·卡明斯基麾下的俄罗斯人民社会党。这两派时常为如何让俄罗斯人正确地服侍他们真正的主人日耳曼人而争斗不休。\n\n不过，尽管派阀纷争不断，大会仍然能取得一些进展。反游击队的计划方针在此讨论制定，并呈递给格洛博奇尼克专员。对俄罗斯人的承诺，也就是向大日耳曼国屈服，在此一遍遍重申，一如既往。\n\n大会的另一个重点就是会上发表的各种讲话。正如大会创立之初一样，这些讲话的内容都围绕着那些崇高而正确的老话题。他们会赞扬元首的伟大，他为欧洲缔造的美，以及号召继续对抗犹太-布尔什维克。过去如此，日后亦然。"
 MCW_Skeleton.2.a: "他们中还是有懂事人的。"
