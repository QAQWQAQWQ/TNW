l_simp_chinese:
 BRA_adhemar_moneybags_initialization_tt: "§Y收钱但办事§!决议组现已启用，使用其追踪阿德马尔的£BRA_adhemar_legacy_texticon §Y遗产§!和他在£BRA_adhemar_slush_fund_texticon §G小金库§!中的私财。"
 BRA_adhemar_moneybags_category: "收钱但办事"
 BRA_adhemar_moneybags_info_tt: "§F对§h阿德马尔·德·巴罗斯§!来说，政治就是把人们想要的东西交给他们。就这么简单。不同于以往那些在巴西政坛上那帮你方唱罢我登场的理论家和装腔作势者，阿德马尔相当坦率地公示了他的需求：为他做的那些善事提供公平的报偿，现金最好。\n\n他的支持者和反对者都把这种政策称为“§h收钱但办事§!”。在阿德马尔用改革和规划巩固他人民总统的£BRA_adhemar_legacy_texticon §Y遗产§!时，充实他的£BRA_adhemar_slush_fund_texticon §G小金库§!的机会也并不鲜见。\n\n政坛常胜将有利于阿德马尔的£BRA_adhemar_legacy_texticon §Y遗产§!，而失利和丑闻则会对其造成负面影响。在他的任期结束时，他的£BRA_adhemar_legacy_texticon §Y遗产§!将衡量他的任期到底是名垂青史还是臭名昭著。无法追踪的£BRA_adhemar_slush_fund_texticon §G小金库§!将在官僚机构的严格管制无法触及的地方得到恰当的利用，以确保社进党在政坛的正当地位，或是变为巴西最称职敬业的那位公务员的养老金。§!"
 BRA_adhemar_moneybags_legacy_tooltip: "§F阿德马尔的£BRA_adhemar_legacy_texticon §Y遗产§!现为[BRA_adhemar_legacy_description]。\n\n§Y点击§!以查看£BRA_adhemar_slush_fund_texticon §G小金库§!信息。§!"
 BRA_adhemar_moneybags_money_tooltip: "§F£BRA_adhemar_slush_fund_texticon §G小金库§!现有§G[?BRA_adhemar_wealth|2]M美元§!。\n\n§Y点击§!以查看阿德马尔的£BRA_adhemar_legacy_texticon §Y遗产§!的信息。§!"
