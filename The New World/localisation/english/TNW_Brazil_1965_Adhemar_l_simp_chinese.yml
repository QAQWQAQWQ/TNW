 brazil_adhemar.1048.t: "他们这是要？"
 brazil_adhemar.1048.desc: "泷裕成走下公交车，伸了伸胳膊，目送公交车消失在下一条街。户外，自由区的街道正在换班：商店开了又关、关了又开；餐馆在为晚餐高峰做准备；孩子们下了自习，踏上回家的路。裕成突然想到，通常在这个时候，他会看到千代子。现在想来，已经有一个多星期没有在这里见到她了。\n\n他穿过街道，走了一段路。他一边留意着千代子的身影，一边任由忧虑和烦恼吞噬着自己，千代子渐渐消失在他的思绪之中。近来，他一直在思考自己在世界上的位置：他相信什么、他支持什么——如果真的到了那一步，他会为什么而献身。这一切都始于他第一次见到人民革命先锋队，说出了他曾仅仅想过的事情。\n\n裕成在街中间停了下来，跑到另一边，靠在一家商店的街角。毫无疑问，那就是她，千代子，被家庭主妇和——等等，那是远藤？他们还没有交集，但裕成知道他挺身队助理教授的名声。他似乎和千代子走得有点太近了，就连她身边的家庭主妇们似乎也是如此。当然——不，一定有什么东西超越了粗暴的欲望，将两人结合在一起。\n\n然而，即使相隔这么远，裕成也能感受到这一小群人之间的友情，他担心事情可能会走到最坏那一步，千代子肯定比现在这个样子更聪明。樱花挺身队？叫像他这样的年轻人去印尼、马来亚、乃至大日本帝国当年插足的一切新边疆去送命的右翼疯子？但裕成也能看出，千代子的脸上充满了决心与信念：无论这帮忠实信徒告诉她什么，她都会深信不疑。"
 brazil_adhemar.1048.a: "他下定决心，一旦有空闲，就一定要和她谈谈这件事。"
 brazil_adhemar.1049.t: "我们做了什么？"
 brazil_adhemar.1049.desc: "泷纯忠刚踏出车厢，就活动起酸痛的肩膀向站台尽头走去。站墙上的海报广告飞速掠过视野，其中一幅印着黑发飘扬的丹凤眼日本美人——三十出头模样。恍然间他又看见了她。在他蛰伏于虫蛀床垫、仅靠怀中相片度日的年月里，在机修厂为碎银折腰、枕下藏刃的寒夜里，那个支撑着他还乡念想的人，早已在他漂泊时香消玉殒。\n\n拐过街角的瞬间，争吵声从家中破窗而出。分明是千代子与裕成的声音。他冲向玄关，却被猛然洞开的门逼得后跳半步——千代子正夺门而出，裕成追至门廊。三道目光凌空相撞。泪眼婆娑的少女从父亲身侧滑过，消失在巷尾。\n\n“你被洗脑了千代子！明白吗？”裕成的斥责追赶着少女远去的背影。纯忠利刃般的目光钉住儿子，跨入门槛摔上房门。虽比父亲高出半头，裕成仍被那道洞穿灵魂的凝视震慑。\n\n“怎么回事？”\n\n“她——”裕成一时语塞。兄妹间某种隐秘默契即将打破，他只需片刻就能自洽。“千代子混进了危险团体。不是吸毒那种，是樱花挺身队，就那群极端分子。现在又攀上什么‘皇道社’，我都不知道——”\n\n话音戛然而止。父亲浮现出他从未目睹过的神情：眼睛瞪大、嘴角抽动、下颌微垂，整张脸写满绝望的恐惧。"
 brazil_adhemar.1049.a: "“待在这儿。”纯忠吩咐，“我回来之前不要给任何人开门。”"
 brazil_adhemar.1050.t: "你要去哪里？"
 brazil_adhemar.1050.desc: "“我从乡下来，想学养鸡。”\n\n这话并非出自千代子之口。她猛地转头——父亲高大的身影赫然矗立在身后。他是怎么找到这里的？她明明跑得那么快，他根本没立即追上来。可此刻他就站在皇道社的门口。\n\n“千代子，回家。”\n\n铁栅门并未滑动开启，却在父亲话音落地时吱呀作响地解锁敞开。千代子浑身僵直，原始恐惧驱使她向后退避。她突然冲入屋内开始狂奔，纯忠咒骂着追了进去。\n\n皇道社众人看着少女逃向他们寻求庇护，身后追来个穿休闲裤戴宽檐帽的中年男子。男人动作里透着不耐的怒意，仿佛本不愿踏足此地。年轻气盛的远藤挺身而出。\n\n“喂老头，”他挡在纯忠与旭日旗之间，“这可不是你该来的地方。”\n\n纯忠扫视屋内。尽是些年轻人，永远都是这群不知天高地厚的蠢货。只有角落里拄着手杖坐着的老者，用隐约相识的眼神打量他。纯忠对那人毫无印象，这里也没人认得纯忠。千代子此刻正躲在那老者身旁的角落里。\n\n“喂！别让我说第二遍。”远藤两步逼近，一把按住纯忠肩膀。"
 brazil_adhemar.1050.a: "纯忠单手钳住他手臂，另一掌猛击其肘关节，清脆的断裂声顿时响彻厅堂。"
 brazil_adhemar.1051.t: "你是谁？"
 brazil_adhemar.1051.desc: "皇道社的地下工事里，二十一名舍生忘死效忠日本帝国的男子中，有人正攥着断裂的手肘哀嚎，破戒者在人群中投去呆滞的目光，而尚未立誓的千代子则惊恐又困惑地注视着这一切。\n\n两个男人高喊着秽语扑向纯忠，却在扑空后重重撞上他身后的墙壁叫骂声戛然而止。千代子眨了眨眼——不，分明是纯忠将他们摔出去的。第三人挥拳袭来，纯忠钳住其手腕顺势过肩砸向水泥地。又有人抓起胁差劈砍，却被他预判侧身，勾腿拧胯间便将袭击者掼倒在地。\n\n皇道社众人如惊弓之鸟般相互推挤着试图压制他，纯忠却游刃有余地穿梭其间。在千代子眼中，他化成了一架制造痛楚的旋风机器，将血肉之躯当作尘埃般抛掷扫荡。纯忠自觉动作迟滞，岁月积淀的锈蚀感挥之不去，但血管里沸腾的热血与怒火正赋予他多年未有的蓬勃力量。\n\n有个鲁莽的年轻人拾起落在地上的短刀高举过头，企图自上而下突刺。纯忠旋身扣住其手腕，顿时摧垮了对方的全部勇气。短刀当啷落地，年轻人仓皇逃出工事。一旁更有经验的退伍兵趁机从背后箍住纯忠腰部，正欲揪扯衣领时，却被反手扣住指节向后猛折。伴随着令人毛骨悚然的骨折声，惨叫响彻四周。\n\n纯忠挺直身躯凝视众人。伤者哀鸿遍野，怯者噤若寒蝉。他的目光掠过千代子，最终钉在墙角的老者身上。老人眼中翻涌着令人作呕的狂热，恰与纯忠眸中冰寒的郁愤形成对比。"
 brazil_adhemar.1051.a: "接着老人鼓起掌来。"
 brazil_adhemar.1052.t: "我是谁？"
 brazil_adhemar.1052.desc: "“干得好，”老人说道，又拍了三下手才将手掌落回拐杖，“我差点忘记你身手多么不凡。只可惜，竟要通过这种方式才回想起来。”\n\n纯忠回首望向千代子。“走吧，”他说道。千代子怔在原地无法移动，直勾勾盯着被倒地伤者环绕的父亲——那些人正捂着伤口呻吟不止。“千代子，”他低喝一声，这才打破凝滞的气氛。千代子冲向纯忠身旁，二人随即离去。\n\n拐过街角时，老人的喊声追了上来：“永别了，图庞的屠夫！我们随时恭候你归来。”\n\n千代子始终记得这个绰号，却从未提及。离去时，她看见父亲眼中刻骨铭心的痛楚。在返家途中，当纯忠突然转身按住她肩膀时，那种痛楚再次浮现。\n\n“终有一天，我会告诉你全部真相。那些我与他们共度的岁月，我犯过的每个错误。但求你，永远别再回到他们身边。”\n\n此后他们再未谈论此事，她也再未接触樱花挺身队或皇道社。回到家时，父女二人无精打采地穿过前门。千代子拖着脚步回到自己房间，纯忠则蹒跚走进客厅，颓然跌进椅子里发出一声闷响。\n\n裕成从膝上抬起头，停止了因焦虑而不停搓动的双手：“爸，千代子回来了吗？出了什么事？她是不是——”"
 brazil_adhemar.1052.a: "“没事了，儿子。”他的眼神游离，“都结束了。”"
 brazil_adhemar.1053.t: "怪谈"
 brazil_adhemar.1053.desc: "此事的肇始与无数流言一样，源于窸窣低语，仿佛提高嗓门便会招来不祥。传说有位老者，枯枝般的手掌仍蕴着摧山裂石之力——这位柔道宗师曾在混战中轻易制伏百人，褶皱深如沟壑的皮革般面孔掩不住行云流水的招式，总以四两拨千斤之势让对手自食其果。\n\n流言击穿了封锁。日系社区的边界拦不住它，在圣保罗某些偏执者耳中，这恰是日本人乃野蛮凶残种族的铁证。当地警方甚至拟成立特别行动组，最终却如朝露幻梦般无疾而终。毕竟比起“懂点柔道的老头子”，他们有更棘手的麻烦。\n\n传闻逐级上达，落在岸本次夫的办公桌面。他起初以玩笑视之，继而觉得不胜其扰。深知个中利害的他决定任其止步于都市传说，并向知情者保证这只是场误会：“杞人忧天加上胡思乱想，催生了无稽之谈。”但他心知肚明——这样的处置最为得当。\n\n流言终于传到了当事人耳中。纯忠在工作时偶然听闻，霎时如芒在背，疑心暗处的窥视与私语。当发现无人起疑，次日他便释怀了。这些传闻却搅浑了记忆的沉淀：温热血浆与冷硬铁器，碎裂的骨骼与监牢的铁栏。为重新染指暴力而生出的片刻悔意，在他回家见到孩子们那刻烟消云散，那个令他恐惧的浑蛋早已死了。他忽然紧紧搂住两个孩子：“爸爸永远爱你们。”"
 brazil_adhemar.1053.a: "图庞的屠夫长眠于墓中，纯忠已无需他效劳。"
 BRA_adhemar_itaipu_dam_over_tt: "我们§G已完成§!同§Q巴拉圭§!就§Y伊泰普水坝§!的谈判。"
 BRA_sometimes_right_tt: "我们将§R不能§!与§Y社民党§!继续合作。"
 BRA_exercito_social_progressista_idea: "社进党陆军"
 BRA_exercito_social_progressista_idea_desc: "几十年来，政治家们一直试图找到挣脱军方铁腕的方法。这让阿德马尔感到困惑！答案不是很简单吗？\n\n不要贸然对抗，而应巧加渗透！现在总统已经将军队和社进党联系在一起，取代了全民盟在军方心中的优势地位。"
 BRA_invest_in_amazon_territories_tt: "这一项目将包括我们新获得的§Y卡宴§!领土！"
 BRA_and_make_them_new_states_tt_2: "将§Y卡宴§!整合进巴西的进程将以其重组为一个完整的州而告成！"
 BRA_edna_megaprojects_tt: "除§K跨亚马孙公路§!和§K伊泰普大坝§!以外的特大项目都将被取消。"
 brazil_baseball_tt_15: "也许未来会取消对日本的移民禁令。"
 brazil_adhemar.1054.t: "葬仪"
 brazil_adhemar.1054.desc: "一幅巴西葡萄牙人的肖像首次被安放在五彩花海与精致纸扎工艺品之间——这套祭奠仪轨向来专为日裔逝者而设。皇道社的活动家们认为，这恰是对阿德马尔·德·巴罗斯最合适的告别礼，这位政界人物是唯一真心关怀他们的人。\n\n当公开的天主教葬礼举行时，组织内能够避开嫌疑的成员早已前往致哀。时隔一月后的此刻，皇道社才以自己人的方式集体悼念，将他的离去视作社群中重要长辈的殒没。依照日本葬仪的传统，这位已故政治家获得了最隆重的送别典礼。\n\n在一片日系的“特攻队”装束中，唯有小瓦加斯独自保持着葡萄牙人的穿搭。这位身着制服的观察者以军人般的耐心与学者式的专注全程观礼。作为回报，他受邀享用了一席前所未有的葬仪飨宴，对此他深感满意。\n\n但这位候选总统、老瓦加斯的嫡子、阿德马尔的关门弟子，此行绝非仅因好奇。他将岸本次夫请到僻静处坦言：“岸本先生，请容我郑重声明，阿德马尔阁下虽已离世，但贵社绝不会因此失去我的支持。我极其重视社会进步党与诸位的友谊，必当全力维系。”\n\n脊背微驼的岸本郑重折腰，深施一礼：“州长阁下的承诺我定将铭记于心，期待双方未来携手。”"
 brazil_adhemar.1054.a: "二人双手紧握，看着阿德马尔的遗像陷入沉思。"
 brazil_adhemar.1055.t: "顽固如斯"
 brazil_adhemar.1055.desc: "阿德马尔向岸本次夫优雅地伸出手，这位日裔商人立刻报以热情的微笑与之相握。多年来两人培养出的情谊颇为奇妙：作为阿德马尔在日裔社群拓展影响力的关键纽带，整个巴西再找不出第二人能在声望与手段上比肩岸本。然而悬而未决的移民禁令始终如芒在背——这个棘手的问题已盘踞近十年之久。\n\n阿德马尔入座时干咳一声，引得岸本投来关切目光。“您确实不如当年矫健了。”他轻笑道。\n\n“哈！这话该我说才对。”阿德马尔身子前倾，戏谑地扬起嘴角，“老家伙。”\n\n两人的笑声充盈着圣保罗腹地深处的马塔拉佐会议室。“咱们都老喽！”岸本从西装口袋抽出手帕擦拭嘴角叹息道，“老朽之人推行的陈腐政策，移民禁令就是最典型的例子，阁下。全国性刊物的民调显示，不仅是日裔群体，废止禁令获得了广泛的政治支持！”\n\n阿德马尔抿紧嘴唇。这类谈话究竟要重复多少次？“东京方面能提供的资金近乎无限，”岸本继续道，“何况这对您改革家的声誉……”总统皱起眉头，他厌恶对方暗示自己声誉不稳，但解禁带来的发展机遇确需考量。毕竟连任期改革都失败了，这未尝不是个安抚民众的替代方案。只是风险依然如影随形……"
 brazil_adhemar.1055.a: "……但回报依然诱人。"
 brazil_adhemar.1056.t: "索尼产品"
 brazil_adhemar.1056.desc: "“那么，盛田先生，您对巴西的观感如何？”\n\n盛田昭夫努力控制着嘴角的笑意。自从听说索尼CEO要为合资企业成立仪式剪彩，阿德马尔·德·巴罗斯便极力想给对方留下深刻印象。此刻在特利亚苏大街北侧，巴西与日本的工程师们正在索尼摩托收音机公司新总部布置办公室。他出席了前夜的开幕酒会，宿醉引发的头痛至今未消。\n\n“与香港相比确实别具风情。”盛田啜饮着主人见他推辞继续饮酒而贴心奉上的茶水，翻译正流畅地转换着他的话语。“虽知阁下必然听过千百遍，但我仍要代表广东人民感谢贵国解除移民禁令。”实际上这项禁令他数月前才有所耳闻，彼时这个南美国度才初次进入他的视野。阿德马尔的小胡子因欣喜而微微颤动。\n\n“您的溢美之辞令人惶恐，盛田先生。”总统的客套话刻板得近乎滑稽，惹得盛田险些失笑，“您馈赠的厚礼同样令人心怀感激。不出五年，索尼摩托收音机必将成为巴西市场上首屈一指的企业。”他高举酒杯，“这份成功将令我们双方获益。”\n\n盛田的礼物此刻正躺在阿德马尔的桌面上——装满现钞的经典款公文包。早有人告知他这是与这位总统打交道的规矩，而对政商间的润滑剂，他早已驾轻就熟。总统显然对这份心意极为受用，盛田看着他启开公文包，莫名掠过一丝熟稔感。恍神间，他仿佛看见某种自我的倒影：一个穿着政客外衣的商人，一个将国家繁荣与个人得失画上等号的男人。"
 brazil_adhemar.1056.a: "旧日的回忆，熟悉的感觉。"
 brazil_adhemar.1057.t: "银河2000，第二十期"
 brazil_adhemar.1057.desc: "《国立少年S05E11：巴西总统的双面游戏》：国立少年二代目揭穿了巴西总统与仙女座星系入侵者的暗中勾结。当晨曦宫遭受复活的印加大军袭击时，二代目在揭露总统腐败阴谋的同时必须肩负起守护总统的重任。（特邀阿德马尔·德·巴罗斯饰演总统）\n\n该系列剧集的忠实观众或许会对这季黯淡的表现感到失望，本集亦未能扭转颓势。虽然预算大幅提升并实现了往日难以企及的外景拍摄，整体却仍透着陈腐气息。印加战士的造型毫无新意，即便新主演比前任小岛一郎和巽秀太郎拥有更多武打招式，战斗场面依旧照搬旧套路。死忠粉丝甚至能发觉大量对白直接沿用了首季剧本！\n\n尽管《银河2000》评论组力图回避政治话题，却不得不承认本集俨然是阿德马尔总统及其社会进步党的宣传片。大部分场景集中于富丽堂皇的晨曦宫——其奢华镜头堪比分时度假房产广告。但由于实地取景限制，打斗场面束手束脚，全剧最高潮竟是国立少年与金星人围着会议桌进行滑稽的对射。\n\n至于总统角色，整集都在亦正亦邪的模糊地带游走，最终掏出魔法收音机揭晓真相：他始终是正义阵营！那些肮脏交易实为联合仙女座星系义士保护地球的伪装！平心而论，阿德马尔确实展现了演技，本色出演自然游刃有余。但若这就是本土拍摄的《国立少年》水准，制作组或许当初该老老实实留在香港。"
 brazil_adhemar.1057.a: "希望第十二集能让观众满意……"
 brazil_adhemar.1058.t: "技术提点"
 brazil_adhemar.1058.desc: "“就放那儿吧，”马塞洛用手指向实验室左侧操作台的一处空位，那里两侧摆放着功能相似的巨型计算机。两名工人推来一台约冰箱大小、同等重量的板状狭长计算机，抓住底部金属架小心从推车上抬起。四名工程师紧随其后——两位巴西人，两位日本人——都好奇地注视着这台新机器被安放到墙边指定位置。\n\n工人们迅速连接起计算机粗壮的电源线，日本工程师们朝马塞洛点头示意。“FACOM-230！”他们笑容灿烂，似乎单是这台设备的存在就令其骄傲。“美人儿对吧？完全采用单片集成电路技术，全球首款，拥有64K内存容量与2.2微秒的运算周期，绝佳满足分析研究需求。”\n\n“是啊，”马塞洛点头，瞥了眼巴西同行。他们神情茫然，茫然至极。随着移民禁令的解除，持工作签证入境的日本电子专家激增，这让巴西本国人才对其技艺垂涎不已。即便国内顶尖的计算机工程师与科学家们，显然也有太多课需要补。\n\n底盘下方传来特征性的咔嗒声昭示机器通上了电，随着一名工人竖起大拇指，嗡鸣声顿时响起。日本工程师三十郎走近设备时微笑注视巴西团队：“要我为各位演示打印功能吗？”"
 brazil_adhemar.1058.a: "马塞洛尴尬地笑了笑：“请，请。”"
 brazil_adhemar.1059.t: "旧铁道，新技术"
 brazil_adhemar.1059.desc: "巴拉那皮亚卡巴铁道是巴西历史最悠久的铁路之一，由英国人于十九世纪建造。建成之初，这条铁路为圣保罗带来了巨大便利，但岁月对古老的铁路系统毫不留情，其设施早已落后于现代铁路。因此当巴西顶尖工程师与政界人士齐聚一堂，准备翻新这条旧铁路时，谁都没料到公告会引发如此强烈的反对。\n\n“真搞不懂。”哈维尔在的抱怨淹没在抗议声浪中。他和同事们已在拥挤的环境里耗了大半天，而当地政要正试图安抚人群。“他们到底想让我们怎么做？眼睁睁看着它生锈报废吗？”\n\n“说这些英国铁轨有历史价值之类的，谁知道呢。”路易斯烦躁地抿了一口饮料，“我看他们是更讨厌家乡周边要搞工程建设。我能理解，但这些老铁轨早就没法维护了——要让铁路恢复运营，唯一的办法就是全部拆掉换新。”\n\n“或许不用大动干戈。”新来的日本工程师佐藤突然开口，他正翻阅着这条老铁路的资料。“满洲现在还在使用同类铁路。日立可能有我们需要的所有零部件，只要有人愿意买单。”工程师们低声议论片刻，最终在一片点头和耸肩中接受了这个提议。"
 brazil_adhemar.1059.a: "“试试也无妨。”"
 brazil_adhemar_endgame_survival.56.t: "谷底"
 brazil_adhemar_endgame_survival.56.desc: "阿德马尔·德·巴罗斯的办公室里，空气凝重而沉寂。模糊的月光从百叶窗缝隙间渗入，偶尔被流云遮蔽而愈加昏蒙。阿德马尔握紧酒杯，将酒一饮而尽。烈性朗姆酒灼烧着喉咙滚下时，他咬牙挤出呻吟：“妈的。”这声咒骂的对象自然是他自己——整晚他都在深刻反省外交政策的惨败，那将成为他政治家与爱国者生涯中抹不掉的污点。\n\n他的目光落在办公桌的杜松子酒瓶上。随着又一声呻吟，他将转椅扭向相反方向，强压下继续酗酒的渴望。他的继任者——但愿是那个年轻人——将不得不为海外利益的丧失买单。巴西武装力量仅是阿根廷军队的零头，面对潜在冲突既装备陈旧又缺乏训练。地理上巴西孤立于整片大陆，昔日的盟友纷纷被布宜诺斯艾利斯的诡计撬走。但最可悲的莫过于巴西凋敝的民生：阿根廷人享有繁荣国家的种种优渥，而阿德马尔的同胞们却仍深陷贫困、经济动荡与阶层固化的枷锁。\n\n阿德马尔对巴西国际地位的损害已非难堪二字可概括，这是将影响数代人的奇耻大辱。未来的学者回顾这六年时，必将带着羞耻与憎恶，将巴西衰落的罪责尽数推给阿德马尔。对他而言，这惩罚恰如其分。他总想着青史留名，却绝非以这种方式。"
 brazil_adhemar_endgame_survival.56.a: "绝非。"
 brazil_adhemar_endgame_survival.57.t: "荣列第二"
 brazil_adhemar_endgame_survival.57.desc: "关上大门，收走任何记者可能从窗外瞥见的物品，照例本该如此。可阿德马尔却被一则头版新闻吸引了目光。那是智利与阿根廷而非巴西之间的外交辞令。\n\n阿德马尔虽不痴迷于向阿根廷开战的想法，但想到他们在拉丁美洲渐失民心仍颇感遗憾。错失那些利润丰厚的贸易协定何等令人扼腕。倘若他当初多费些心思增强军力，或再多做些外交努力，这一切本可实现。\n\n今日巴西是败北者。但明日又是崭新的一天。小瓦加斯仍有契机在南美洲确立巴西的主导地位，向公众展示对布宜诺斯艾利斯耀武扬威的姿态。民众必定乐见此事，即便他的这番作为可能让继任者在民意调查中遭殃。\n\n不过，阿德马尔对自己任内的表现已颇为满足。反正他又无法再度出任总统，以首次执政而言，已是相当出色。他的继任者自会适时修正他的过失。"
 brazil_adhemar_endgame_survival.57.a: "下次一定能赢。"
 brazil_adhemar_endgame_survival.58.t: "（给小瓦加斯的）沙漏"
 brazil_adhemar_endgame_survival.58.desc: "当天的两位焦点人物——阿德马尔和小瓦加斯在党内外拥趸及亲友的欢呼声中登上讲台。按照惯例，阿德马尔总会在这种场合谈论更本土化、更能轻松赢得好感的民生议题。但今天他的演讲却染上了国际主义色彩。\n\n“我上任时正值冷战升温，就连家门口的玻利维亚和巴拉圭也屡生事端。阿根廷人处处与我们针锋相对，炫耀军队就像炫耀新鞋，挥舞着五月太阳旗如同过季抛售。”台下响起零星笑声；身旁的小瓦加斯尴尬地笑了笑。\n\n“我们发展军力与之匹敌。身着绿军装的勇士们日日枕戈待旦，在边境线上逼视对手。至于外交部，我们在整个大陆铺设关系网，建立盟友让布宜诺斯艾利斯动弹不得。”掌声响起，却少了些热度，缺了点激情。\n\n“我们成就斐然，而我的继任者将创造更大辉煌。接下来的几周，请大家像对待亲儿子般为他助选。现在，该轮到主角本人发言了。谢谢！”他在掌声中退场时不禁沉吟。\n\n无可否认，巴西是拉美两大强国中的胜出者，可阿根廷并未就此臣服。他给小瓦加斯搭建了坚实的舞台——但终究只是个舞台，稍有不慎便会土崩瓦解。幸而他已为这年轻人争取了时间，足够完善自己未尽的事业。"
 brazil_adhemar_endgame_survival.58.a: "微弱的领先也是领先。"
 brazil_adhemar_endgame_survival.59.t: "成王败寇"
 brazil_adhemar_endgame_survival.59.desc: "“准备好了吗？”\n\n“随时都可以。”\n\n阿德马尔总统与候任总统小瓦加斯登上舞台，彩带漫天飞舞，人群如追捧摇滚巨星般发出阵阵欢呼。从坚定的社进党支持者到新近皈依的事业追随者，形形色色的人们挤满了会场。阿德马尔用手指在麦克风上敲出节奏，示意全场安静。\n\n“瞧瞧，瞧瞧，今晚的观众多么耀眼。”远处可见写着“阿德马尔我们爱你”的故乡标语。“看到在场诸位让我无比自豪——自豪于自己为维持巴西强大、把那些阿根廷猩猩关进笼子奉献了一切。”在小瓦加斯带领下，更热烈的欢呼声席卷全场。\n\n“我们刚上任时，他们恨不得扼住我们的咽喉，可现在呢？我们建立了拉美最强大的军队，只要他们敢耍花招，随时能把他们踩进泥里。”台下传来跺脚声应和节奏，几名士兵甚至敬礼致意。“现在没人愿意搭理他们了，他们已经被彻底孤立。”\n\n“再看看你们……人人吃得饱穿得暖，脸上洋溢着幸福。要我说句实话——这绝对是巴西人过得最舒坦的时光。”又一轮欢呼声中，有位母亲高喊要阿德马尔给她怀里的婴儿签名。“至于布宜诺斯艾利斯？听说他们现在烧国旗取暖呢。我看那个[ARG.GetLeader]过节宁愿赖在我们大使馆都不肯回国。”\n\n“现在，请允许我介绍唯一能让好日子延续下去的接班人——各位熟知并爱戴的小瓦加斯！”阿德马尔退入阴影将舞台让给继任者。人们热爱他。历史会铭记这位让巴西雄踞霸主之列的伟人，就像铭记老瓦加斯那样。"
 brazil_adhemar_endgame_survival.59.a: "“或许可以管我的追随者叫瓦加斯-阿德马尔主义者……”"
 brazil_adhemar.1031.a: "……现在巴西上下都知道纯忠了。"
 BRA_man_who_deceived_us: "披着羊皮的狼"
 BRA_man_who_deceived_us_desc: "阿德马尔是个本性善良、为人正直的君子，总以善心揣度他人，即便对方屡屡辜负他的信任。当赫尔曼·约瑟夫·阿布斯主动提议重启德巴关系并推动贸易往来时，尽管此人底细可疑，阿德马尔仍接受了这笔利润丰厚的交易——他本该相信自己的直觉。这个德国佬竟与总统秘书密谋，妄图将巴西变成又一个专员辖区！为回报他们的背叛，我们必须将德国势力连根拔除！\n\n我们不仅要断绝与团结协定的一切贸易往来，没收德国在巴商业资产，更要与其断绝外交关系，将德国外交官与“间谍”悉数驱逐出境。虽要肃清所有德国元素，但我们绝非他们那样的种族屠杀恶魔。就此而言，德裔巴西人作为遵纪守法、扎根多年的公民，仍可安居乐业。\n\n§R阿布斯以为能愚弄我们，现在该让他明白自己错得多么离谱。§!"
 BRA_adhemar_victory_generic_tooltip: "凭借此次胜利，§h阿德马尔·德·巴罗斯总统§!巩固了自己的历史遗产。"
 BRA_adhemar_victory_healthcare_tooltip: "总统兑现了竞选活动中的一项关键承诺，这对社进党乃至整个巴西而言都是一场巨大的胜利。这场胜利，也将奠定§h阿德马尔·德·巴罗斯§!的历史功业。"
 BRA_adhemar_victory_education_tooltip: "这项法案的通过，令§h总统§!的历史地位愈发巩固。"
 BRA_adhemar_victory_welfare_tooltip: "法案一旦通过，§h总统§!的历史地位便将更加巩固。"
 BRA_adhemar_victory_nuclear_tooltip: "核武器研发成功，进一步巩固了§h阿德马尔·德·巴罗斯§!的历史地位——正是这位总统，让巴西真正迈入了世界强国之林。"
 BRA_adhemar_victory_economic_tooltip: "若巴西能在§h阿德马尔·德·巴罗斯§!任内达成全部经济目标，他的历史地位必将更加稳固，后世史家也将盛赞这位总统的经济手腕。"
 BRA_adhemar_victory_petrobras_tooltip: "若能成功实现巴西石油公司的发展，§h总统§!的历史遗产必将更加巩固。"
 BRA_adhemar_true_promise_cucked_tt: "我们已就议程开展工作。"
 BRA_salgados_inauguration: "萨尔瓦多的就职典礼"
 BRA_salgados_inauguration_desc: "总统昏迷危机让巴西政坛的牛鬼蛇神纷纷钻了出来。其中，我们不得不与之妥协的，便是整合主义领袖普利尼奥·萨尔加多——一个大名鼎鼎但声名狼藉的人物。为了换取雷亚莱的支持，我们承诺任命萨尔加多为教育部长。\n\n这个决定争议巨大、后患无穷，但为了共和国的安危，我们别无选择。这或许会有损我们的公众形象，但阿德马尔向来有债必偿。我们如今能做的，唯有设法让新政府搞清情况，并对它表示忠诚。"
 BRA_fulfill_nikke_promise: "履行对日系的承诺"
 BRA_fulfill_nikke_promise_desc: "阿德马尔曾对他的日本朋友许下大把的空头支票，如今至少也该拿出点风度，在地方层面做点象征性的姿态，来展示这份新建立的友谊。日裔移民率长期低迷，而先前存在已久的移民禁令本身又是源于种族主义理论，因此实在没有理由再继续下去了。单单是出于道德上的体面，阿德马尔也愿意在无人敦促的情况下逐步废除这项排外政策。而民众的呼声，最终也证明了总统的远见。\n\n谁为巴西的商业帝国添砖加瓦，谁就是阿德马尔的朋友。作为对其长期以来效忠权力的回报，日系将得以同家人团聚。务必让日系的游说集团知道，阿德马尔是一位真正的“朋友”。"
 BRA_return_to_tradition: "回归传统"
 BRA_return_to_tradition_desc: "听着，这里没人说过美国就是巴西外交政策的全部；但事实是，美国人一直是巴西最强大、最忠实的盟友，而阿德马尔呢，一如既往地妄想巴西可以随随便便地斩断自己的关键命脉。\n\n当然了，库尼亚一直都是这么说的，而事实也证明他是对的。尽管彻底推翻阿德马尔的对德缓和政策，会让我们的经济背负极为沉重的负担，但我们至少可以提高关税，以此向纳粹表明他们不再受巴西欢迎。\n\n说实话，对于那些被纳粹伤害过的群体来说，这些只是是我们应尽的、最微薄的义务。我们只能希望他们能够原谅我们这次的错误。"
 brazil_adhemar_assassination.1.t: "门户大开"
 brazil_adhemar_assassination.1.desc: "“秘密/[?global.date.GetDateStringNoHour]\n\n发：联邦调查局探员蒙塔纳里\n呈总统备忘录\n\n主题：关于德国国家情报局在巴西活动的评估\n\n1.自阿德马尔·德·巴罗斯宣誓就职总统以来，德国国家情报局得以史无前例地渗透进巴西的政治领域与安全机构，而联邦调查局在巴西的行动则相应减少。但另一方面，德国情报部门并未深入总统的核心圈子，据信他也并未得到德方的全力支持。\n\n2.局内信源表示国家情报局人员在巴西南部的多个城市活跃，尤其是圣保罗和阿雷格里港。我们怀疑数家德国商业利益的关联企业是其用以搜集情报的幌子。近期截获的情报显示，国家情报局正与巴西利亚的基层官员接触，但尚无证据显示他们与联邦内阁成员有联络。\n\n3.德·巴罗斯总统任内，由于巴西政府撤销了前几届政府做出的情报与安全承诺，美巴关系遭到破坏。与此同时，出于对潜在贸易机会的期待，德巴关系有所升温。但国家情报局的行动并未深入安全层面，且德方总体上对与战时敌国彻底结盟一事仍持谨慎态度。\n\n联邦调查局建议，我方有必要重建在巴西的行动能力，尤其是在我局通过[已删去]进行的持续行动遭当地政府压制之后。应考虑对巴西官员加大外交施压力度，并研究利用[已删去]的各种可行方案。”"
 brazil_adhemar_assassination.1.a: "忠诚、勇敢、正直。"
 brazil_adhemar_assassination.2.t: "你好，拉塞尔达！"
 brazil_adhemar_assassination.2.desc: "“秘密/[?global.date.GetDateStringNoHour]\n发：联邦调查局探员蒙塔纳里\n呈总统备忘录\n\n主题：关于卡洛斯·拉塞尔达就德国影响发表新闻声明的评估\n\n1.反对派人物、前记者卡洛斯·拉塞尔达在一家全国性报纸上发表公开声明，声称德国情报机构对阿德马尔·德·巴罗斯政府展开全面渗透，引发全国公愤。拉塞尔达在文中控诉总统有意纵容亲德特工在巴西的政治与安全系统内活动。\n\n2.我局确认，拉塞尔达先生是在自己创办的《新闻论坛报》上发文。文章内容已被多家媒体和晚间新闻节目转载引用。\n\n3.拉塞尔达先生的指控，与我局先前报告确认的事实高度吻合，例如可疑的德国幌子公司的活动，以及某些与我方人员接触过的公务员被无辜撤职的事件。内部调查未能发现泄密来源。信息有可能是由巴西政府内部人士或心怀不满的外国势力提供。\n\n4.尽管我局在巴西的行动能力因地方上的敌对态度而受阻，但这篇报道打击了联邦政府内部的亲德派，意味着美国在巴西的利益得到了加强。为应对持续演变的局势，我们正在进行后续评估，以确定反泄密策略、查明已暴露的特工，并研究由此引发的政治变动。”"
 brazil_adhemar_assassination.2.a: "忠诚、勇敢、正直。"
 brazil_adhemar_assassination.3.t: "值得关注"
 brazil_adhemar_assassination.3.desc: "收件人：中央情报局局长\n上次国安会开完，我想私下跟您谈谈我的担忧：中情局在巴西和南美的情报网扩得太大了，特别是在拉塞尔达公开了德国国家情报局对阿德马尔政府的渗透之后。换言之，搞得太出格了，在行动前本该让国务院情报局也参与讨论。\n\n局长先生，我就直说了，您那套“调查国家情报局基层时顺藤摸瓜发现的”之类的说辞，根本站不住脚。把这么多高官的名字交给不同的人力情报官负责，这种外行到无能的程度，简直不可思议。整个情报圈，包括我，都对贵局这种单干的行为感到愕然。您的所作所为，严重影响了我们对抗德国的斗争，也严重影响了美巴关系。我们本来能把这事处理得更好，可事都办完了，你们却压根没跟我们打过招呼。\n\n说到单干，中情局跟秘密情报局再这么各行其是，迟早要出大乱子。没有协同就总是重复工作，情报共享就总是慢半拍，纯属浪费人力物力。最糟的是，我们的两支队伍一边对付同一个目标，一边还不知道对方的存在。需要我提醒您当年国防军和党卫队怎么在情报行动中撞车，把对方当叛徒给打了吗？您是想让我们的人死在国外吗？您这套牛仔搞法，到头来就是这么个结果。\n\n我劝您赶紧把手下的人给管住，别非得闹到国安会上才好看。"
 brazil_adhemar_assassination.3.a: "署名，J·埃德加·胡佛"
 brazil_adhemar_assassination.4.t: "幕后操作"
 brazil_adhemar_assassination.4.desc: "卡洛斯·拉塞尔达站在讲台上，闪光灯与摄像机已准备就绪。他手握一份朴素牛皮纸信封，其中便是审查部门涂改过的文件。“感谢诸位紧急到场。我有一则对国家至关重要的消息要与诸位分享。”他举起左手的文件袋，“我手中的这份名单，便是渗透我国政府、外交部、公共安全部乃至国防部的德国国家情报局特工名单。除此以外，还包含了上述各部门泄露的情报副本。”\n\n拉塞尔达仍清晰记得收到档案时的情形。情报并非通过他平常那位秘密情报局的线人传递，而是一位自称“美国情报官”的“辛扎先生”——这明显是个化名。就像辛扎先生说的那样，他自己是谁不重要，重要的是那些被发展成德国棋子的人。辛扎先生说，为了美巴两国的利益，这些文件必须由拉塞尔达来曝光。\n\n“我要求依法处置这些人。这些叛国者必须为出卖巴西人民的罪行受审。我还要号召所有被蒙骗的巴西人民想一想，问一问，为什么阿德马尔政府里有这么多人，会心甘情愿拿纳粹的钱，卖掉自己的国家？”\n\n《圣保罗页报》记者举手提问：“请问您能透露消息来源吗？”\n\n拉塞尔达微笑摇头：“为了保护信源，我不能说他是谁。但我能告诉你们，他所说的都是千真万确。”"
 brazil_adhemar_assassination.4.a: "次日，抗议人群挤满了大街小巷。"
 brazil_adhemar_assassination.5.t: "绝密内战"
 brazil_adhemar_assassination.5.desc: "联邦情报和反情报局备忘录 51762176-[GetYear]\n主题：南美洲境内美国情报行动的冲突情况\n\n近来，美国在南美大陆，尤其是在巴西境内的情报行动出现了不寻常的升级。这些由中央情报局主导的行动，不论规模还是范围，似乎均不同于以往由联邦调查局及其下属组织秘密情报局在美巴标准伙伴关系下执行的行动。\n\n此类新型情报行动显然给巴美关系带来了巨大风险，也让外交部在应对时束手束脚。虽然表面上中情局与巴西政府都希望遏制德国在南美的渗透，但美国特工在巴西领土上为所欲为，显然侵犯了我国主权。然而，曝光这些行动只会破坏我们与美国现有的情报合作关系。鉴于其目标是打击德国在南美的情报网络，目前也未曾干涉我方在当地的反谍行动，本局决定暂不公开这些行动的存在，并将所有相关报告列为最高机密，仅限“需知”人员接触。为维护巴美关系，也为了在应付德国国家情报局时能有推诿的余地，我们将暂时保持观察状态。"
 brazil_adhemar_assassination.5.a: "眼不见，心不烦。"
 brazil_adhemar_assassination.6.t: "误拨"
 brazil_adhemar_assassination.6.desc: "目标：“误拨”\n\n行动主管爱德华·古铁雷斯报告称，一名主动上门的线人带来了一个新机会。目标暂定代号为“误拨”，经确认为巴西联邦情报和反情报局情报人员，并向我方透露其计划刺杀处于昏迷状态的巴西总统阿德马尔·德·巴罗斯。据古铁雷斯主管陈述，“误拨”因卡洛斯·拉塞尔达揭露政府遭德国情报机构渗透一事表现得极为愤怒。此人向我局致谢，他相信是我方为肃清德国在南美情报人员之目的，才暗中将情报传递给拉塞尔达。经观察与审查，基本排除此人是诱饵或假旗的可能性。\n\n秘密情报局驻外办事处对如何处理“误拨”存在严重分歧。许多老成持重的顾问建议拒绝任何形式的支持或合作，他们认为，风险实在过于明显，一旦让此事与本局扯上关系，我们不仅可能失去在南美最有价值的情报伙伴，且事件曝光可能将巴西彻底推向德国势力范围，为德国针对自由国家组织提供更多经济与情报优势。\n\n另一些特工则建议，可以给他一些无法追踪的钱和情报，做好掩护，让他放手去干。他们认为，不管我们是否支持，“误拨”八成都会发起行动，我们不如帮他一把，提高他的成功率，彻底断绝巴西与德国结盟的可能性。他们主张，破坏阿德马尔与德国的合作关系，正是本局的核心使命，因此应该秘密提供支援，并随时做好切割的准备。"
 brazil_adhemar_assassination.6.a: "知会主管，准备会面。"
 brazil_adhemar_assassination.6.b: "知会主管，立刻切断联系。"
 brazil_adhemar_assassination.7.t: "精心策划之阴谋"
 brazil_adhemar_assassination.7.desc: "佩德罗·瓦兰特看着病历卡。页面角落贴着病人的照片，满脸写着自得与狡黠。他放下病历，审视着病床上苍白静止的躯体，从白大褂里取出注射器。针管里，只有空气。他走近输液袋，将针头刺入，活塞缓慢推压三次，又急速推压三次。他拔出针头，用布包裹后塞进口袋，转身离开。\n\n走廊里，黑衣警卫对佩德罗视若无睹。他在拐角稍作停顿，脑海中的声音却在拼命催促他继续前进。他低头瞥了一眼手表，心思却不在时间上。直到一声惊慌的尖叫传来，他才重新迈开步伐。停车场里，一辆灰色的轿车正等着他，车里坐着一个穿毛衣的男人。佩德罗钻进后座：“解决了，开车。”联邦调查局探员点点头，发动引擎，驶离医院大门。在他们身后，医护人员正徒劳地试图唤醒一具尸体。\n\n空气栓塞，对健康人并非无迹可寻，但阿德马尔·德·巴罗斯本就有恙在身。当轿车驶出城界，佩德罗瘫坐在座椅上，摇下车窗将手伸向呼啸的狂风。后座放着酬金，圭亚那还有更多，但他动手不是为了这个。他想起在英国抗击法西斯分子的父亲，想起阿德马尔与那些法西斯分子沆瀣一气。就一则复仇故事而言，这理由简单有效。正是这个念头让他投身阴谋，驱使他为其做足了十二分准备，甚至忘却了金钱交易的实质。\n\n车外，狂风如刀，掠过指缝。他攥紧拳头，气流从指间逃逸，如同溪流漫过岩石。佩德罗收回手臂，重新摇上车窗。"
 brazil_adhemar_assassination.7.a: "汽车沿着寂静的乡间小路向北疾驰，逃离暂且沉寂的法网。"
 brazil_adhemar_assassination.8.t: "阴谋败露"
 brazil_adhemar_assassination.8.desc: "佩德罗伫立在阴影之中，俯视着病床上的阿德马尔。他想象着，总统倘若此刻醒来，会如何看他。大概像索命鬼罢。他只有短短几分钟时间，得在警卫换班前把将毒药注入阿德马尔的静脉输液袋，然后脱身。\n\n佩德罗猛地从恍惚中惊醒，开始将氰化物注入输液袋。他的手在颤抖——任谁都会颤抖，毕竟他要谋杀自己国家的总统。他注定将成为巴西历史上最伟大的英雄，或是最可憎的叛徒。毒药瓶从指间滑落，只有极少的剂量进入了输液袋。\n\n恐惧攫住了佩德罗。他僵在原地，思索着这点微末的剂量能否致命，是否应该继续下毒。迟疑的片刻太过漫长，警卫回来了。\n\n“不许动！”身后警卫吼道。佩德罗纵身跃出窗外，从三楼直坠医院正门。伴随着玻璃碎裂的巨响，他摔断了双腿，浑身插满碎玻璃。安保人员围了上来，他听见窗口传来喊声：“这杂种想下毒！我拔了输液管！快叫医生！”\n\n几分钟后驶来的不是救护车也不是警车，而是一辆无标识的黑色厢型车。他被拖进车厢，两个男人带着锤子、钳子、勺子和小刀坐在他身旁。没费多少工夫，他就全招了。"
 brazil_adhemar_assassination.8.a: "“CIA……不是FBI……”"
 brazil_adhemar_assassination.9.t: "鲁莽特工"
 brazil_adhemar_assassination.9.desc: "约翰一脚踹开门，怒气冲冲地闯进中情局办公室。\n\n“喂，你，那个叫汤姆·拉特科夫斯基的山顶洞人在哪？”他对着自己看到的第一个人咆哮道。\n\n“抱歉，先生，但我想您无权进入这里。”一名工作人员说道。\n\n约翰掏出他的证件，杵到工作人员的脸上：“我是联邦调查局的，现在告诉我，汤姆他妈到底在哪儿？！”\n\n工作人员指着汤姆的办公室：“他正在跟他妻子打电话，所以如果您——”约翰没理他，径直闯进了汤姆的房间。他一把将电话线从接口上扯了下来。\n\n“你——你他妈在干啥？！”汤姆吼道。\n\n“听好了，你个蠢货，你跑去巴西搞的屁事！”\n\n“就为了这个？我为这烂摊子接了一整天的电话了。再说了，这事我们干总比你们FBI那帮饭桶干的强，至少我们还能不承认。”\n\n“那个傻逼刺客已经承认是中情局雇的他，这你怎么否认？！”\n\n汤姆举起双手，在空中挥了挥：“我不知道，就说是日本人干的，他在撒谎，或者随便编个别的什么理由。”\n\n约翰双手捂住了脸：“他们……他们不会信的，然后圣保罗就会建起集中营……”两人一时陷入了沉默。"
 brazil_adhemar_assassination.9.a: "“打断你打电话我很抱歉。”"
 brazil_adhemar.6.a: "历史由我们来创造。"