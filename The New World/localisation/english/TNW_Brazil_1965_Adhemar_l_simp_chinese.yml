 lazarus_brazil: "拉撒路"
 brazil_adhemar_flavour.5.t: "最后一吻"
 brazil_adhemar_flavour.5.desc: "她撑着伞往家走，伞面高高举起，挡开倾泻而下的雨水。汽车呼啸而过，远光灯刺破雨幕，车轮溅起一片水花。她在十字路口停下，用手帕轻轻拭去眼角的泪水。手帕是逝者留下的遗物，金线绣着“AdB”的字样。\n\n她走进家门，抖落伞上的水珠，将外套挂在衣架上。走进办公室，瑞把一封信放在桌上：信封十分小巧，寄件人地址是圣特雷莎的一处豪宅。信封里装着几张照片，拍的是一个钢制保险柜：大小约五英尺见方，配有钥匙和时间锁。她微微一笑，拿起电话拨通了寄信人。铃响两声，对方接起电话。\n\n“瑞博士？”电话那头问道。她嘴角微扬，却无半点笑意。这称呼带着几分戏谑，带着些许无奈与讽刺。\n\n“叫我安娜就好，哥哥，”安娜·吉梅尔·本希莫尔·卡普里廖内说道，“保险箱装好了吗？”\n\n电话那头，阿朗·布拉马基·本希莫尔轻笑了一声。“嗯，按我说的装好了。在一楼那间没用过的备用卧室里。”他顿了顿。“现在不方便。你明天过来，我们再细谈。晚安。”\n\n“晚安，”她话音未落，电话已被挂断。她叹了口气，将听筒放回座机，目光落在那几张照片上。她的哥哥一定恨透了她。如今他成了阿德马尔·德·巴罗斯不义之财的守护者，这份“殊荣”之所以落到布拉马基博士头上，无非是因为已故总统曾与他妹妹有染。他几乎肯定会从中揩油。她得说服他，让他守好这些钱。\n\n瑞博士心想：他对我的爱、对人民或国家的爱，甚至对他妻子的爱，都比不上他对这个保险柜的爱罢。"
 brazil_adhemar_flavour.5.a: "但我依然爱你，阿德马尔。所以我为你的真爱留了一个地方。"
 brazil_adhemar_flavour.6.t: "窥见秘密"
 brazil_adhemar_flavour.6.desc: "自他住院后，每隔几周就会上演这样一幕：无良记者扛着长枪短炮，将晨曦宫围得水泄不通，闪光灯此起彼伏，无聊的问题接踵而至。这里没有一家媒体对社进党抱有好感；人群蜂拥而至，阿德马尔与死神擦肩而过的消息，好似引来鲨鱼的血腥。秃鹫们盘旋不去，对着窗户里那抹憔悴虚弱、酷似总统的身影狂按快门，准备用这些照片炮轰政府。\n\n天气闷热，《大众新闻》的一位摄影师擦了擦额头的汗，举起相机。阿德马尔此刻身处大楼某处，尽管他已经拍下了无数仆人和官员的身影，心里却隐隐觉得，这次恐怕还是一无所获。尽管如此，他还是不停按下快门，用一道道刺眼的闪光刺痛着晨曦宫和里面的人。\n\n他绕到晨曦宫后方，拍了几张会议室和客房的照片。就在这时，一群神色紧张的保镖朝他走来。他亮出记者证，声称自己受法律保护，但保镖们根本不吃这一套。他们抓住他的肩膀，把他拖了出来，扔到路边。他肩膀着地，摔得生疼，但一点擦伤算不了什么——平时他们可不会这么粗暴。\n\n当晚，他和搭档冲洗胶片时，心中的疑虑得到了证实。调整曝光之后，其中一张照片拍到一间卧室里站着两个保镖。起初他们以为拍到了丑闻，但两人的姿态太过戒备，显然并非如此。一人面朝房门，另一人紧盯窗户。桌上有个吃了一半的三明治，床铺略显凌乱，却不像有人睡过的样子。这些保镖，显然不是在休息。"
 brazil_adhemar_flavour.6.a: "他们是想保护什么东西。"
 brazil_adhemar_flavour.7.t: "深埋财富"
 brazil_adhemar_flavour.7.desc: "阿德马尔在晨曦宫艰难啜饮威士忌，病弱之躯只能小口吞咽，愤懑却让酒杯迟迟不离掌心。《大众新闻》那群蠢货记者撞破重大机密却不自知。他廉价买断照片，甚至暗示这正是他们臆想中的桃色丑闻——若真深挖下去，他们只会发现那间卧室衣柜里的保险柜才是致命要害。\n\n危机远未解除：媒体既知保险柜方位（若真是媒体而非美国间谍），只要稍有勤勉之辈接着全民盟系小报的路子继续调查，他最后的封口费将无所遁形。届时抄没赃款，他也将锒铛入狱、身败名裂。换作一年前他完全可以置之不理，但此刻颤抖的手与急促的呼吸让他对恐惧有了全新的认知。\n\n经过一小时的沉思与豪饮，他得出结论：必须转移保险柜。但能托付给谁？内阁成员不可信，熟人大抵也会监守自盗。他需要绝对忠诚、不为贪欲所困之人。他在记忆中梭巡浏览，终于有了一个可靠的人选。他抓起话筒，拨出电话。\n\n“安娜？我是阿德马尔。近来可好？”他调动全部言语魅力，“代我问候孩子们。有件小事相托，别担心，只是保管些物件……”"
 brazil_adhemar_flavour.7.a: "他的笑容渐朗。“好，仔细听……”"
 brazil_adhemar_flavour.8.t: "忘恩负义之子"
 brazil_adhemar_flavour.8.desc: "“喂，你认识瑞博士吧？”\n\n吉列尔梅·席勒·本希莫尔咬紧牙关。若不是身处校园，他攥紧的拳头早已砸向问话者的嘴。最终，他只是低吼了一句“滚开”，试图与那人擦肩而过。\n\n“别紧张兄弟，”学生举起双手作投降状，“我对‘父辈的罪孽’没兴趣，我不是那种人。”\n\n“那你他妈是谁？”\n\n流言早已在吉列尔梅身边纠缠不休。所谓“瑞博士”是八卦小报为避免社进党报复给阿德马尔情妇起的化名，实则是他姑母安娜·吉梅尔·本希莫尔·卡普里廖内，家族里公然与敌人同床共枕的存在。家族借社进党上位敛财尚可忍受，但血亲沦为政客禁脔让他在左翼圈子里声名狼藉。\n\n“我是帕尔马雷斯武装革命先锋队的，”学生揽住他的肩膀，二人走向公共区，“我注意到你常读马克思和切同志的著作。想不想做点比读书更带劲的事？”\n\n这份突如其来的信任击溃了吉列尔梅的心防。他跟着去了，结识了先锋队的成员，为他们的革命热忱所震撼。为证明自己配得上这份理想，他最终踏出了愚蠢至极的一步："
 brazil_adhemar_flavour.8.a: "他将父亲宅子里的保险柜告知了这群人。"
 brazil_adhemar_flavour.9.t: "桀骜不驯之子"
 brazil_adhemar_flavour.9.desc: "吉列尔梅·席勒·本希莫尔怀抱书册步履沉重地穿过校园。昨夜与父亲的争执仍在灼烧神经——本希莫尔家族是社进党铁杆支持者，而他心系工党及更激进的理想。每周家庭晚餐演变成政治角斗场已是常态，但这次因父亲与社进党的最新交易引发的争吵尤其惨烈，余波足够让双方懊悔数日。\n\n回宿舍途中，一个站在肥皂箱上的学生吸引了他的注意。演讲者自称代表“帕尔马雷斯武装革命先锋队”，名称源于十七世纪被殖民者毁灭的逃奴王国“帕尔马雷斯”，无数巴西左翼将其树为精神图腾。他痛斥社进党的腐败与阿德马尔·德·巴罗斯的贪婪暴政，这些指控与吉列尔梅昨夜餐桌上的怒吼如出一辙。\n\n听见他人复述自己观点的瞬间，他突然得了某种扭曲的慰藉。但这份共鸣随即化作父亲的声音在脑海回响：阿德马尔真是十恶不赦吗？诚然，他是资本主义猪猡、财阀、窃国者、法西斯同情者；可即便这位政客与姑母有染并借机让家族窝藏赃款，他对国家的贡献仍远超这些极端分子。\n\n思维如刀锋划过脸颊，惊得吉列尔梅踉跄后退。他慌忙唤起进步思想，加以镇压：工党仍有实力通过选举终结阿德马尔体制，只需在投票日作出正确选择。"
 brazil_adhemar_flavour.9.a: "他快步走开，把阿德马尔保险柜的秘密藏在心底。"
 brazil_adhemar_flavour.10.t: "内应"
 brazil_adhemar_flavour.10.desc: "团队集结在昏暗的地下室里，面对木质墙面与布满污渍的绒布家具。大麻烟雾如晨雾般弥漫，呛得吉列尔梅连声咳嗽。人们闲扯了半个多小时，直到两位行动临时指挥官卡洛斯·拉马尔卡与迪尔玛·罗塞夫踏入房间——所有目光瞬间聚焦到他们身上。\n\n“同志们注意。”拉马尔卡推来贴满图纸的软木板，吉列尔梅手绘的平面图毛毛躁躁，描述的位置却很靠谱。“大约两周前，我得到可靠消息，”他目光掠过吉列尔梅，“阿德马尔·德·巴罗斯的保险柜藏着他大部分贪污来的赃款。”罗塞夫敲了敲板上保险柜的照片，“赃物已转移至圣特雷莎区的盟友家中，那里有保安，但内应会协助我们。”\n\n“所以目标是保险柜？”后排戴墨镜的男人发问，挺直的脊背与周遭瘫坐的瘾君子格格不入，口吻带着职业罪犯对业余者的轻蔑。“能捞多少？”\n\n“数额惊人。”罗塞夫道，“大部分会充作革命经费，当然诸位都能拿到分红。”众人偷瞄墨镜男，心知某些人的份额将会更加丰厚。“行动要快，赶在警方察觉前离开。分组方案如下……”\n\n尽管大麻的迷雾仍未散去，但吉列尔梅的神经系统却感到一种紧张的兴奋。他正在背叛家族，引狼入室，摧毁家族声誉。恐惧与自我厌恶的浓雾中，罗塞夫和拉马尔卡的声音变得模糊不清。"
 brazil_adhemar_flavour.10.a: "去他的家族，去他的阿德马尔，畏手畏脚还怎么干革命？"
 brazil_adhemar_flavour.11.t: "所有错误的理由"
 brazil_adhemar_flavour.11.desc: "这座坐落于圣特雷莎区的公馆本应戒备森严，但埃德娜·洛特已经是总统了，阿德马尔·德·巴罗斯的党正如海滩上的沙砾一般分崩离析。此时，一个卸任领导人的度假别馆就不值得继续费劲了，毕竟攻击来自方方面面，社进党当然还有更重要的事情要处理。\n\n这座坐落于圣特雷莎区的公馆本应戒备森严，但国家并没有把这里放在心上。巴西利亚的权贵们正自相残杀，几乎没人注意到黄金的去向，政府部门也没有时间去追查什么“黄金国”的传言，毕竟其他犯罪行为都有真凭实据。当然，要调查的腐败案件还有很多。\n\n这座坐落于圣特雷莎区的公馆本应戒备森严，但它的主人不相信外人。除了寥寥数位红颜知己和一名远在他方的情人之外，几乎没有人知道这里的内情，他不需要什么其他的安全保卫。\n\n由于这所有的错误，这座豪宅毫无戒备，它装潢华丽、家具齐全，但却无可阻止地落入了更大的阴谋之中。如果人们知道公馆里面有什么——以及它将要打开怎样的地狱潘多拉之盒，那他们或许会阻止这一切发生。"
 brazil_adhemar_flavour.11.a: "庄园大门敞开，遗产由此尘埃落定。"
 brazil_adhemar_flavour.12.t: "出奇顺利"
 brazil_adhemar_flavour.12.desc: "那个星期五走运极了，千真万确。事实上，运气好过了头——本该出岔子的地方却风平浪静。警察早该破门而入，或者拦下那些同时驶入圣特雷莎同条私人车道的车辆，但他们没有。德布里托下车打了个手势，接过钥匙，十三个人便手持武器扇形散开，行动正式开始。\n\n而后情形更是魔幻。我们以人数压制了警卫，势如破竹冲进餐厅，正撞上他们享用海鲜炖菜——好家伙，几根绳子甩过去，整栋宅子就改姓了。这时候我本以为会闹得天翻地覆，要是对方反抗，保不齐要出人命。不过话说回来，那锅炖海鲜真绝了，请得起这种厨子想必身价不菲。\n\n邪门的是所有人都记得自己台词：扮藏品老板的混混轮胎扎得正是时候，连他妈卡洛斯·明克都没忘剪电话线。佣人们非但没尖叫还主动指路。等见到那个传说级的保险箱时——拉马尔卡吹了那么久，我们还以为是纯金打造的。结果就个棺材模样的铁盒子。幸亏最后证明真是阿德马尔的东西，否则我都想亲自下楼给那些人质松绑了。我绝对干得出来。\n\n说真的，这天不该这么顺。有时我觉得那天操控全局的另有其人。倒不是信什么命中注定，但既然如此，谁知道呢？"
 brazil_adhemar_flavour.12.a: "然而救世基督像默默注视着，保持沉默。"
 brazil_adhemar_flavour.13.t: "过眼云烟"
 brazil_adhemar_flavour.13.desc: "“妈的，这破玩意儿也太重了吧。”卡洛斯·明克嘀咕着，和先锋队的队友们一起把阿德马尔足有浴缸大小的保险柜装到了滑轮车上。索尼娅·拉佛斯闻言，便轻轻地敲了一下他的后脑勺，说道：“别废话了，卡洛斯。你是想让本希莫尔的人来把保险箱再救回去吗？”\n\n华雷斯自嘲地笑了笑。为了不刺激他的同志，他小声地说道：“我喜欢你的热情，但是我们已经把所有人都绑起来了，还剪断了电话线——”他指了指被五花大绑的警卫和安静的电铃，“你真的确定每次卡洛斯说话的时候都要让他闭嘴吗？”\n\n华雷斯·德·布里托摆好姿势，准备把保险箱推到楼下去。他小心翼翼地找准角度发力，这时，另一名游击队员说道：“也许你是对的，华雷斯，但最好还是要万无一失。”华雷斯耸耸肩膀表示同意，随后确认周围安全，绷紧肌肉、咬紧牙关，和其他人一起稳稳地放下了保险箱。\n\n一名游击队员安排了一辆雪佛兰C-14停在大门的花岗岩台阶前。游击队员们更小心地将保险箱塞进了后备箱里，行动也更隐蔽。现在他们是在户外，每当车子嘎吱作响时，他们都不由得不寒而栗。\n\n装完保险箱之后，队员们稍稍放松了一会儿，正好喘口气，然后整装出发，前往下一个目的地。他们从圣特蕾莎公馆扬长而去几个小时之后，主人的一名警察朋友来串门拜访，才发现了被制服的守卫。"
 brazil_adhemar_flavour.13.a: "下一站：“据点”。"
 brazil_adhemar_flavour.14.t: "据点的众生相"
 brazil_adhemar_flavour.14.desc: "“据点”，帕尔马雷斯武装革命先锋队对基地的称呼。它位于里约热内卢郊区，雪佛兰汽车从圣特蕾莎区一路疾驰，逃回了这里。迪尔玛的上级选择这样一个地方不可谓不明智：这里车水马龙，人头攒动，即使从车上搬下一个保险箱，也不会被人注意到。\n\n尽管如此，迪尔玛还是不愿意有任何纰漏的可能性。她命令车辆倒进大门，然后所有人再一起把保险箱从车后拖出来，后备箱不堪重负地吱嘎作响。\n\n为了万无一失，游击队员们还把保险箱拖开了一段距离。随后，他们就把保险箱撂在地上，有人痛苦地呻吟着，还有人揉着自己酸痛的肌肉。\n\n接下来才是真正激动人心的时刻。一位游击队的工人同志拿着喷灯走了过来，另一位拎着电锯紧随其后。两人递给迪尔玛一顶焊工头盔，然后自己也戴上，对她说：“你戴上这个，然后从我们开的口子里倒水进去。我们可不想让火花把钱还有黄金烧坏，所以这个活儿就得靠你了。”如果不是有头盔，迪尔玛肯定早就拒绝了。\n\n火花四溅，其他游击队员不得不后退几步。若不是瓜纳巴拉郊区的喧闹，电锯的尖啸无疑会压过方圆一公里内所有的声响。然而，功夫不负有心人，当保险柜的门被切开，露出里面泡水的克鲁赛罗、股票、债券和黄金时，迪尔玛笑了。\n\n卡洛斯·明克拿起吹风机把黄金吹干，迪尔玛和其他人则把纸币和股债挂在了晾衣绳上。"
 brazil_adhemar_flavour.14.a: "这就是大劫案。"
 brazil_adhemar_flavour.15.t: "迪尔玛做生意"
 brazil_adhemar_flavour.15.desc: "行动已经结束，但帕尔马雷斯的地下室“指挥部”却仍然因为劫案而久久无法平静。对大部分游击队员来说，他们仿佛还置身于行动现场，不过从某种程度上说，他们也的确尚未脱身：警方仍在寻找一切和保险箱有关的新线索，明克猜测，他们应该还在找盗走保险箱的劫匪。但是游击队员们无从知晓，只能在破旧的小房间里躲避，他们也开始感到疲惫了。\n\n然而迪尔玛的情况并非如此，她没有参加圣特蕾莎别馆的行动。正因如此，她就成为了小组的耳目，也不需要藏在地下室里。恰恰相反，她一直在寻找更长久的庇护所，到那时，他们就可以重归自由。另外，她还负责队员们的工资。\n\n平心而论，这事情不算难。她找了几个生意上的伙伴，还从两个美国经理人那儿半价买到了一辆雪佛兰——虽然有点旧，但按照他们的标准，开起来一定也很舒服，或许吧。她只是需要人来先确定一下。\n\n“嘿，吉列尔梅！你一年前就拿到驾照了吧？来，开车带我们去市中心，把买车钱给还了。”\n\n吉列尔梅可能已经抽大麻抽嗨了，但路上肯定没人注意到，甚至还不会觉得迪尔玛连车都不会开是什么怪事。他从扑克桌边站起身来，脸上露出得意的笑容。迪尔玛不由担心起来，或许他还是太稚嫩了，最好还是趁早练练他们。\n\n吉列尔梅看到车的时候，似乎相当惊讶，但其实他开过比这还贵上十倍的车。突然，他转过身来，问道：“等等，如果你不会开车，那你当初是怎么把车开过去的？”\n\n罗塞夫猛地紧张起来，接着回答道：“瘾子，那是我的活儿，不关你事。行了，我们没那么多时间。得想办法给大家发点钱，你知道的。”"
 brazil_adhemar_flavour.15.a: "但，她是怎么把车开到那儿的呢？"
 brazil_adhemar_flavour.16.t: "命运之轮"
 brazil_adhemar_flavour.16.desc: "+00天00时09分41秒，警方无线电\n      各单位注意：圣特蕾莎区莫雷拉路代码150。所有在勤单位立即响应。重复，莫雷拉路代码150……\n\n+00天08时11分13秒，《今日报》（地方报纸）副标题/节选\n      心脏病学泰斗宅邸深夜遭劫 传家保险柜离奇失踪\n      今日凌晨，阿朗·布拉马基·本希莫尔医生被异响惊醒，发现珍藏三代的家传保险柜不翼而飞。目前案件细节尚不明确，警方正在调查中。\n      “真是太令人痛心了，”阿朗的胞妹安娜·吉梅尔·本希莫尔·卡普里廖内表示，“这些是家族多年传承的珍宝，一夜之间全都没了。”\n      本希莫尔医生是巴西首位心脏病学专家，其妹安娜曾担任阿德马尔·德·巴罗斯的秘书……\n\n+03天07时49分28秒，《巴西日报》（全国大报）副标题\n      社进党否认圣特蕾莎抢劫案涉及挪用资金\n\n+06天11时13分17秒，《大众新闻》（全国大报）社论标题/节选\n      瑞博士，那保险柜里是什么？\n      读者或许还记得瑞博士这个名字：她就是那位让阿德马尔原配夫人通过报纸才知道的情妇。如今阿德马尔长眠慰灵公墓，而他的红颜知己正忙着处理他来路不明的赃款。敏锐的读者想必也能注意到最近发生的共产党抢劫案——劫犯从一位著名医生家中盗走保险柜，而这位医生的妹妹安娜·本希莫尔，正是阿德马尔最得力的助手。\n      迄今为止，社会进步党拒绝置评，但这种沉默本身就很能说明问题。如果那个保险柜不属于本希莫尔家族，那里面装的还会是家族珠宝和婴儿照片吗？还是说这个保险柜其实属于巴西史上最大的窃贼？每个巴西人都在追问此事，就连《最后时刻报》也掺和进来——虽然我们《大众新闻》谴责他们称赞这些共产党盗贼的行为。事关国家利益，社进党必须给人民一个交代……"
 brazil_adhemar_flavour.16.a: "社进党怎么能这么蠢？"
 brazil_adhemar_flavour.16.b: "社进党怎么能这么蠢？还有为什么我们现在才知道？"
 brazil_adhemar_flavour.17.t: "人情的重担"
 brazil_adhemar_flavour.17.desc: "劳多·纳特尔的车停在大宅外。他一边抚平西装翻领一边对司机说：“别熄火，我很快出来。”他拎着空公文箱穿过正门，向门外守卫点头致意，走上楼梯时朝客房门口的守卫点头致意，推门而入后又对室内守卫点头致意。壁橱里嵌着钢制保险柜，劳多输入密码打开柜门，将公文箱搁在柜顶。他正蹲在地上取出一捆捆钞票，身后突然传来一声熟悉的咳嗽。\n\n“阿朗让你们离开这栋房子。”瑞博士说。\n\n劳多起身轻叹，耸了耸肩：“我们可是付了月租的。”他转身将钞票塞进公文箱，“坦白讲，这里还需要三倍的人手。”\n\n“问题不在这儿——”瑞博士烦躁地指了指门口，室内守卫应声退出。她关上门压低声音：“听着，劳多，我同意把阿德马尔的保险柜暂存在这里，你们派人看守我也没意见。但你不能把我哥哥的家变成武装据点。这不是他该承担的——”\n\n“安娜，”劳多竖起一根手指，“这个问题我们已经讨论过了。”他啪地合上公文箱，“大家都在为党尽责，也都获得了相应报酬。其他的都不重要。”\n\n“这太招摇了。这么多人进进出出，搞得我们像毒贩。”\n\n“我们？你又不住这里。”劳多失去交谈兴趣，径自离去。瑞博士咬着下唇，盯着那个该死的保险柜，真希望自己从未同意过这件事。"
 brazil_adhemar_flavour.17.a: "这些钱，还有看守它们的蠢货，如今都甩不掉了。"
 brazil_adhemar_flavour.18.t: "力量标记"
 brazil_adhemar_flavour.18.desc: "他们戴着面罩和丝袜，手持枪械，翻过后墙。侦查现场发现几名守卫，最多六七人，主要是社进党的打手和几个赚外快的休班警察。泳池后方，拉马尔卡看见其中三人：两个在池边打牌，一个在一楼露台。\n\n“这边。”吉列尔梅低语。他带领众人穿过灌木丛。两名同志离队包抄：一人切断电话线，另一人划破车库轮胎。其余人从地窖门潜入地下室。计划很简单：从地下室突袭，制服守卫。吉列尔梅指出主卧是最佳藏匿点：拉上百叶窗后，这里空间最大而暴露最少。\n\n行动组兵分两路。拉马尔卡负责一楼，吉列尔梅主攻二楼。他们疾速推进，枪口始终警戒。拉马尔卡与同伴擒住打牌守卫。吉列尔梅抄起二楼楼梯间的花瓶，砸碎在露台守卫头上，又将枪管抵住伤口。胶带封嘴捆手。\n\n无人知晓第一枪来自何方，枪声在宅邸炸响。革命先锋队众人刹那僵立，守卫们趁机反击。手枪出套，三名同志胸口中弹倒下。随后九秒化作鲜血与枪火交织的万花筒。吉列尔梅开火击中守卫肩膀，随即紧闭双眼直至枪声渐息。当最后一声爆鸣消散，他睁眼看见四名同志拿下了所有守卫。万幸父母不在家中。"
 brazil_adhemar_flavour.18.a: "没人注意到某个双手缠满胶带的守卫正一瘸一拐逃离。"
 brazil_adhemar_flavour.19.t: "钢大提琴挽歌"
 brazil_adhemar_flavour.19.desc: "“动啊，动啊，”拉马尔卡咬着牙咒骂，“他妈的动啊。”这句话既是对同伴说的，也是对保险柜说的。他们用皮带和钢缆将保险柜死死捆住，费尽九牛二虎之力从壁橱里抬出来，小心翼翼地从客房的窗户推出去。此刻队伍分成三股：一队下到地面准备滑轮组，一队留在楼上引导保险柜下落，还有一小队分散开来担任哨兵。\n\n吉列尔梅本该把大麻烟留在集合点，但他需要什么东西驱散负罪感。他用自由的那只手遮住点燃的一端，但每口间隔不超过五秒。他属于第三组，负责监视南边的道路，但眼前的景象却笼罩在几分钟前的回忆里。父母应该不在家。他没在死者中看到他们。可沉甸甸的负罪感依然压得他喘不过气。他又吸了一口。身后传来木头与绳索的摩擦声，面前是圣特雷莎连绵的山丘。\n\n吉列尔梅曾以这样的视角眺望世界，那是少年时代在屋顶观星的记忆。路灯勾勒出僵硬的星座，车灯是转瞬即逝的彗星。他以占星师般迷离的眼神注视着这些陆地天体，毒品让意识变得迟钝，恐惧却让感官愈发敏锐。没有车辆拐入莫雷拉街。肩头的重量暂时消失了。他转身看见保险柜平稳落地，当同伴们将箱子搬上货车时，他长舒一口气。吉列尔梅转回头，正看见一辆车拐进这条街。\n\n“见鬼。”他嘟囔着探出窗口，“条子，条子来了！”\n\n“操。”拉马尔卡从另一侧割断绳索，催促所有人翻窗而出。他们把敌人的尸体留在原地，自己人的尸体早已装进另一辆疾驰而去的车。"
 brazil_adhemar_flavour.19.a: "警车呼啸而过时，吉列尔梅和拉马尔卡顺着屋顶滑下，跳进车里绝尘而去。"
 brazil_adhemar_flavour.20.t: "火热之街"
 brazil_adhemar_flavour.20.desc: "革命先锋队的雪佛兰本欲低调行事。它维持限速，避开主道，用黑色防水布遮盖着最要命的战利品。司机沿着盘山公路转过弯道时，拉马尔卡紧盯前方，其他同志环顾左右。一辆警车突然从后方切入，警笛大作。恐慌在雪佛兰车内炸开，司机将超载的掀背车油门踩到底。他们沿着下坡路飞驰，在急转弯处甩出刺耳的摩擦声。\n\n雪佛兰颠簸着冲下山坡驶入主路，猛地左拐冲上电车轨道。第二辆警车加入围堵。拉马尔卡咒骂着将枪管探出车窗胡乱开火，子弹在警车前盖上迸出火星，遥远的金属撞击声昭示着颤抖的双手与移动的标靶。无论他们倾泻多少子弹、钻过多少车流，警笛始终如影随形。\n\n路灯在雪佛兰两侧拖出红黄光痕，山间灯火如不祥之兆笼罩着这场追逐。拉马尔卡与同志们持续开火，直到一辆横向驶来的轿车令司机失控。雪佛兰半边车身撞上对方，翻滚数圈直至被路灯杆拦下。\n\n拉马尔卡是幸运的——两位同志已成了座椅上的血肉残骸。他带着擦伤爬出破碎的车窗，另一名同志紧随其后。司机不知所踪。他冲向车尾，将劫掠之物塞满背包，划亮火柴。"
 brazil_adhemar_flavour.20.a: "在他身后，阿德马尔的脏钱于烈焰中化作黑烟。"
 brazil_adhemar_flavour.21.t: "收拾残局"
 brazil_adhemar_flavour.21.desc: "他们匍匐着穿越后院，滑入下水道，钻过逼仄巷弄，直到确信摆脱追兵。幸存者四散撤离，拉马尔卡背着能带回的战利品。三小时后他将成为半个国家的通缉犯，但此刻他只用了四十分钟便返回了那个烟雾缭绕的地下行动“据点”。\n\n罗塞夫正往物品上泼汽油。中央堆着即将被烧毁的文件与相片，当她看见拉马尔卡时，愤怒、困惑与挫败在她脸上拧成漩涡。“你们刚抵达现场警用频道就炸了，到底怎么回事？”\n\n“守卫有枪。我们解决了。”拉马尔卡正要放下背包，瞥见罗塞夫手中的汽油桶。“要烧了这里？”\n\n“我不想这么做。”她在沙发上又浇了一圈，“但我们不能继续待下去。”待整个房间都浸透汽油味，罗塞夫将空桶砸向文件堆。“我当初就不该让你们执行这个任务。他们可是配了霰弹枪，我们他妈到底在想什么？”\n\n“革命从不易与。”拉马尔卡本想引用某位先烈的名言，但具体词句在疲惫中蒸发，只剩力气攥紧战利品。罗塞夫也倦得无力嘲讽。两人退至门口，罗塞夫将火柴在门框擦燃抛入。当警察赶到时，只余冲天火光为革命先锋队的行动烙下最后印记。黑烟撕破拂晓的天幕，接下来一周革命先锋队忙着收敛战友遗体，将他们葬在能俯瞰整座城市的小山岗——在那里，阵亡者永远面朝旭日，仿佛在诉说“我们曾为更好的未来战斗过”。"
 brazil_adhemar_flavour.21.a: "这究竟是真是假，他们也不知道。"
 brazil_adhemar_flavour.22.t: "黄粱梦碎"
 brazil_adhemar_flavour.22.desc: "+00天00时07分20秒，警方无线电\n    “各单位注意，圣特蕾莎莫雷拉路发生武装抢劫。所有单位优先响应。重复，莫雷拉路发生武装抢劫……”\n\n+00天08时11分13秒，《巴西日报》标题/副标题\n    圣特蕾莎惊现共产党抢匪\n    著名外科医生住宅遭窃 保险柜不翼而飞\n\n+02天06时55分38秒，《环球报》标题/副标题\n    社会进步党卷入圣特蕾莎劫案\n    阿德马尔情妇拒谈兄长失踪保险柜\n\n+04天07时51分19秒，《圣保罗页报》标题/副标题\n    圣特蕾莎保险柜引发连环质问\n    社会进步党否认劫案与公款挪用有关\n\n+07天15时12分30秒，《最后时刻报》社论节选\n    时间一天天过去，社会进步党对圣特蕾莎抢劫案始终保持沉默，巴西民众呼唤正义的渴求与日俱增。阿德马尔·德·巴罗斯从国库偷了多少钱财？有多少赃款藏在圣特蕾莎的保险柜里？社会进步党还要否认到几时？\n    从本报到《大众新闻》的记者正在每场新闻发布会和党内会议上持续追问。在真相水落石出之前，这场风暴绝不停息……"
 brazil_adhemar_flavour.23.t: "心中的保险柜"
 brazil_adhemar_flavour.23.desc: "下班后，阿德马尔和瑞博士驱车前往她哥哥的豪宅，眼前安保系统的巨变令瑞震惊。入口处增设了由一名休班警察值守的金属路障，对方瞥见车牌后立即挥手放行。两只龇着利齿的护卫犬正蹲守门前，阿德马尔冲它们挥手致意，还轻抚其中一只的头顶，却在瑞试图触碰另一只时猛地攥住她的手腕。\n\n“小心被咬断胳膊，亲爱的。”他说着，握力渐渐化作沿着她腕部游走的轻抚。被牵制的猎犬发出低吼，驯犬人立即绷紧了牵引绳。穿过玄关时，几名退伍士兵向总统敬礼，引领他们登上客房楼层。原先占据房间中央的豪华双人床已被替换成角落里的行军床，供夜班警卫使用。取而代之的是一张围满椅子的方桌，三名警卫正在享用简餐。见到总统驾临，他们慌忙起身，却被阿德马尔摆手制止。\n\n总统转动保险柜密码盘时问道：“你哥哥收到我的谢礼了吗？”\n\n“收到了。”瑞博士回答，“他大约一周后回来。”她的兄长选择暂时离国，远离这场精心布置的棋局。瑞送他去机场时，竭力不去看他眼中翻涌的失望与愤懑——那瓶香槟与全额资助的海外旅行本该是谢礼，可她确信哥哥转身就会将酒瓶扔进垃圾桶。\n\n“很好。”阿德马尔拧动最后一组密码。随着保险柜门弹开的轻响，璀璨珠宝、机密文件与各国钞票映入眼帘。他从一小堆金币中拈起一枚克鲁格金币，静静地凝视着它。"
 brazil_adhemar_flavour.23.a: "“美极了。”他低语，“一切安好。”"
 brazil_adhemar_flavour.24.t: "全力推进"
 brazil_adhemar_flavour.24.desc: "革命先锋队员们早已预见到这场血战。宅邸的防御工事固若金汤，他们只能在阴影中游走，如癌细胞般在本希莫尔的豪宅中四处扩散。即便如此，无处不在的监控仍像百眼巨人一样环伺四周。\n\n正门方向率先传来爆炸，混凝土路障在火光中解体，一名守卫如破布娃娃般撞上掩体墙。安保队伍立刻分兵把守，部分人冲出街道搜寻爆破手，更多人坚守岗位——特别是主卧室区域，整座宅邸的心脏必须严防死守。\n\n宅内持续了一分钟的枪声与吼叫后，新的动静撕破了声浪。后花园传来交火声。守卫队长命令部下死守保险库，自己提枪奔向走廊。转角处，他目睹同僚被霰弹枪的火光逼下露台。举枪向阴影处扫射，惨叫声中一个年轻人血溅当场。\n\n子弹擦过耳廓的刹那，队长旋身泼洒弹雨。拉马尔卡与拉福斯闪身躲过致命扫射。拉福斯举着佩枪从墙角探出脑袋，一发点44口径子弹精准洞穿对方脚踝。守卫在倒地前向黑暗再次倾泻子弹，他想逃走，却被拉马尔卡用缴获的霰弹枪朝后背开了一枪。\n\n残余守卫冲出房间，却陷入钳形攻势——一侧是手持霰弹枪与夺来的FAL步枪的拉马尔卡拉福斯二人组，另一侧是举着手枪的年轻战士卡洛斯·明克。众人留下了一个活口。"
 brazil_adhemar_flavour.24.a: "“你，”拉福斯用枪管抵住他的太阳穴，“带我们去找战利品。”"
 brazil_adhemar_flavour.25.t: "锐意"
 brazil_adhemar_flavour.25.desc: "“上尉，”明克说，“咱们没时间慢慢撬保险柜了。外面还有太多守卫，条子也快到了。”宅邸外的枪战暂时停歇，窃贼和守卫的尸体横七竖八躺满大厅，垂死者呻吟，幸存者喘息。零星的枪声仍在回响——残余的守卫试图反扑，革命先锋队则死死守住防线。\n\n“操。”拉马尔卡抹了把脸，血污在皮肤上拖出暗红指痕。他不喜欢别人以军衔称呼自己。闭眼深呼吸，再睁眼时已恢复镇定：“炸了它。直接炸开这该死的保险柜。”\n\n“等等，”索尼娅·拉福斯突然开口，“要是钞票烧起来怎么办？”\n\n“总比留给阿德马尔强。”\n\n拉福斯和明克点头会意。他们从包里掏出塑料炸药，裹在保险柜的铰链上。引线蛇形绕过整个房间，三人退到走廊按下起爆器。爆炸震得墙壁地板簌簌发抖，幸运的是保险柜没有被炸塌。他们冲回房间，明克抄起撬棍别开柜门。\n\n“债券股票全他妈不要！”拉马尔卡喝道，“只拿能搬动的！”拉福斯和明克毫不迟疑执行命令：前者把值钱物件往外拖，后者则往帆布袋里狂塞。装满两个袋子后，拉马尔卡喝令放弃剩余财物。他们跨过几具想带走的战友遗体，带着满身血迹钻进雪佛兰。司机边念叨危险边猛踩油门，拉福斯还没关好车门，车轮就碾过一个守卫的尸体冲出战场。"
 brazil_adhemar_flavour.25.a: "警笛声紧咬车尾穷追不舍。"
 brazil_adhemar_flavour.26.t: "看看我如今模样"
 brazil_adhemar_flavour.26.desc: "+00天00时07分53秒，警方无线电\n     “各单位注意，圣特蕾莎莫雷拉路发生武装抢劫。所有单位请立即前往莫雷拉路处理武装抢劫案。嫌疑人已被压制……”\n\n+00天08时12分50秒，《环球报》新闻标题/副标题\n     圣特蕾莎住宅发生爆炸与枪战\n     共党武装分子与安保人员死于外科医生家中\n\n+02天06时52分11秒，《米纳斯州报》新闻标题/副标题\n     “警方确认社会进步党与圣特蕾莎枪战有关联”\n     “现场保险柜确属阿德马尔·德·巴罗斯所有”\n\n+04天07时21分48秒，《人民报》新闻标题/副标题\n     阿德马尔震怒！\n     挪用公款丑闻持续发酵 总统提前结束记者会\n\n+08天15时08分20秒，电话记录\n     AB：“太他妈扯了！走到哪儿都能听到保险柜的事！连他妈出门都——”\n     LN：（已删去）\n     AB：“是，是，我知道。听着，我本以为能信任她。算我活该。”\n     LN：（已删去）\n     AB：“我又搬了个地方，挪回晨曦宫。早就该放这儿了。等我死了，立即安排出境。听好，绝不能让它待在我不在的地方。\""
 brazil_adhemar_flavour.26.a: "AB：这将是除了我以外的人最后一次打开那个保险箱。"
 brazil_adhemar_flavour.27.t: "大战一场"
 brazil_adhemar_flavour.27.desc: "警犬的吠叫让众人心知大事不妙。无论是他们的情报，还是拉马尔卡的简报里，都没提到警方会派出警犬来搜捕他们。他们原本以为只需对付几个警卫，很好解决。\n\n华雷斯的小队转过一个拐角，无可避免地被推向她所恐惧的必然厄运，而厄运以预期中三倍的武装警卫和一大群瓜纳巴拉警察的形式出现在眼前。卡洛斯·明克大声咒骂：“那个混账拉马尔卡到底他妈从哪儿搞来的情报？”\n\n警察用扩音器喊话要求投降，革命先锋队成员纹丝不动。接着，警方发射催泪瓦斯，挥舞着警棍冲了上来。\n\n既然非致命武力不足以驱散革命者，那么便动用致命武力：防暴警察和安保人员直接开火。鲜血从伤口涌出，革命者一个接一个倒下，他们的追求和努力都成了徒劳无功。\n\n至于华雷斯·德布里托本人，他在混乱中被砖块击中，短暂失去了意识。醒来时，他已被捆得像海豹一样扔在囚车里。和他一起的还有索尼娅·拉佛斯和卡洛斯·明克。拉佛斯盯着他的眼睛，苦笑起来。"
 brazil_adhemar_flavour.27.a: "“我们是不是完了？”"
 brazil_adhemar_flavour.28.t: "迪尔玛大逃亡"
 brazil_adhemar_flavour.28.desc: "任何人只要远远看上迪尔玛一眼，都会觉得她简直像个到处乱撞的无头苍蝇。她别无选择，毕竟她现在又要逃避追捕，脑子里又乱作一团，各种想法疯了一样往外涌出：\n\n“为什么我非要坚持让小队带着轻武器去抢总统的保险柜？说到这个，我当初到底为什么要参与这蠢事？现在回头想想，这主意简直荒唐透顶。”\n\n迪尔玛的目光落在文件上。她抓起火柴把它们烧掉，剩下的撕个粉碎。不过这样也无济于事——帕尔马雷斯组织中比较理智的领导人早就打定主意，近期绝不踏足瓜纳巴拉。\n\n“但革命先锋队还能撑多久？”迪尔玛喃喃自语。“拉马尔卡那疯子越搞越极端，可眼下听说这事的人都在嘲笑我们。他和他那帮疯狗早晚从帕尔马雷斯分裂出去——那是警笛声吗？”\n\n远处传来像是警笛或警报的声音。\n\n“管他呢。我没时间等了，警察可能正往这边来；我得尽快离开这个该死的‘据点’。”这是他们对基地的称呼。\n\n迪尔玛·罗塞夫抓起自己的东西夺门而出，勉强躲过抓捕，算是逃过一劫。至于日后要不要继续折腾，那就另说了。"
 brazil_adhemar_flavour.28.a: "罗塞夫，下舞台的方向在左边。"
 brazil_adhemar_flavour.29.t: "完胜"
 brazil_adhemar_flavour.29.desc: "“根据共产主义恐怖组织‘帕尔马雷斯革命武装先锋队’的证词，他们企图盗窃阿德马尔·德·巴罗斯总统位于圣特蕾莎的保险柜——”\n\n“——感谢瑞博士今天来到环球电视台。您对此有何评论？”\n“感谢邀请。我认为这再次证明了共产主义意识形态的低劣，我本以为布尔什维克倒台后我们就不需要找证据了。这同时也证明阿德马尔总统未雨绸缪——\"\n\n“——那个瑞博士，不是说她跟阿德马尔有一腿吗？这种事情也能摆在台面上说啊？”\n“可能吧，但管他呢？重点不是那群共产党蠢到家了吗，想偷保险箱，结果被抓个正着还乖乖招供了。谁管那阿德马尔搞什么外遇？再说了——”\n\n\"——要我说，那家伙肯定在保险箱里塞了不少赃款。但巴西不就这样吗？只要阿德马尔别贪得太过分，谁在乎他捞多少啊，懂我意思吗？整件事其实挺搞笑——\"\n\n\"——爷爷，共产党到底把阿德马尔的保险柜怎么了？\"\n\"小雅伊尔济尼奥，你这小鬼从哪听来这事的？就是前阵子闹了个笑话。一帮傻布尔什维克想偷总统的保险箱，结果被警卫打得哭爹喊娘咯。\""
 brazil_adhemar_flavour.29.a: "“哈哈，今天最开心了。”"
 brazil_adhemar_flavour.30.t: "保险柜脱离现世…"
 brazil_adhemar_flavour.30.desc: "“总统先生，您如何看待戈亚斯州北部建设冶金厂的可能性？前几天一些行业协会讨论得相当热烈。”\n\n“天呐，又是这种愚蠢至极的记者会，”阿德马尔心想。“才从鬼门关转一圈回来，医生千叮万嘱让我静养，可我却在这里陪他们扯什么采矿和水电站。再回答几个问题就能解脱了。\"\n\n这些本该由部长们应付的问题，现在却一个个跑到了他的面前。虽说气力不济，但凡知道答案的，他都尽量跟大家解释明白。好不容易熬到最后一个问题，阿德马尔的新闻发言人重新站上讲台，劳多搀着他就要离场。\n\n刚要出门，突然有个记者高声问道：“总统先生，那个保险柜里到底有什么？为什么那些布尔什维克拼了命要得到它？”劳多正要推他快走，阿德马尔却停下脚步，直视着记者的眼睛。“总统先生？”\n\n阿德马尔脸上现出一丝微笑。《新闻论坛报》卡洛斯·拉塞尔达撰文称之为“愚木昏聩的希特勒分子的临终丑态”；魏纳的《最后时刻报》则称之为“傲慢好战的自信神色”。倒是圣塞巴斯蒂昂总主教看着照片有些犯难，这表情到底是死不悔改的罪人，还是准备迎接神圣死亡的人呢？"
 brazil_adhemar_flavour.30.a: "…遁入历史。"
 brazil_adhemar_flavour.31.t: "潘多拉之盒"
 brazil_adhemar_flavour.31.desc: "“这样‘辞旧迎新’可真他娘的再好不过了，”迪尔玛愤怒地嘟囔，基地里吵翻了天，无论哪个角落都躲不开他们愤怒的叫喊。“也许我该找个别的组织，别再跟这帮白痴混一块了。”\n\n会议室里，游击队队员正吵得不可开交，迪尔玛的目光穿过门缝落在两把空椅子上。“这一个卷钱跑路，连警察都不知道他的下落；那一个跑到葡萄牙被骗个精光，把钱败了个干干净净。这蠢货到底为什么要去葡萄牙？”\n\n她把视线从空椅子移开，盯着桌子两边吵得面红耳赤的两拨人。其中一派明显比另一派阔绰得多。“哈，真想知道为什么这帮人这么富呢，”迪尔玛嘲讽道，“肯定跟我们给他们的钱没关系对不对，哦不不不。”\n\n另一派人则不停地嚷嚷着“要把财富重新分配给海外流亡的困难同志”，可具体怎么接济、何时接济，这帮人连个屁都放不出来。迪尔玛只想用一个词评价他们：“蠢货。”\n\n最让迪尔玛想借酒浇愁的是，这种闹剧已经连续上演十天了。“早知道会闹成这样，这笔钱还不如不拿。它只会让我们分崩离析；照这样下去，民族解放司令部和革命先锋队早晚分家，然后像掉在地上的玻璃吊灯一样碎成渣渣。看着组织崩溃，我只想问——”\n\n迪尔玛·瓦拉·罗塞夫望向基地外一张褪色的阿德马尔海报。"
 brazil_adhemar_flavour.31.a: "“——是不是这老纳在诅咒我们？”"
 brazil_adhemar.1042.t: "你以为你在哪里？"
 brazil_adhemar.1042.desc: "体育场内的活动如常进行：苍鹰队以5比2获胜，仅有轻微的干预。胜利者与落败者握手致意，拍摄庆祝照片，人群带着基本满意的心情散去。泷一家披上外套，随着退场的人潮前行。人群在出口处逐渐分流，但仍有小团体滞留。千代子的目光落在一个较大的群体上，发现是日本同胞。他们在必经之路的外围闸门外设点，分发着油墨未干的传单，白纸上跃动着靛蓝色字迹。\n\n“为国效力！”一人以训练有素的口吻高呼。“敬神、尽忠、争自由！”另一人即兴附和。经过时，裕成摆手拒绝径直走过；纯忠皱眉侧首快步通过。稍稍落后的千代子趁众人视线不及，悄悄拾起一张飘落的传单。\n\n自称“樱花挺身队”的团体，将诉求印成白纸黑字昭告天下。他们要求废除移民禁令——千代子对此毫无保留地赞同；主张巴西应与日本帝国深化合作——她对此不置可否；呼吁立即全面遣返日系人——这时她才惊觉自己从未踏足过故土。而对于仍困在巴西暮色中的同胞，还有条补充倡议：投身帝国的正义之战，以鲜血证明——\n\n“千代子！”裕成的呼唤破空而来，“磨蹭什么？”\n\n“来了！”她应声将传单塞进衣袋，小跑着追上家人的步伐。"
 brazil_adhemar.1042.a: "她牢牢地记下了地址。"
 brazil_adhemar.1043.t: "民代党的日系"
 brazil_adhemar.1043.desc: "游行队伍穿过圣保罗街头，标语在叛国罪的边缘游走，旗帜的旭日纹样堪堪触及禁忌线。他们呼唤种族合作、迁徙自由与武装动员。广场集会的尾声，樱花挺身队邀请了一位幕后人物登台。这群人向来乐于吸纳新金主，而民代党正投其所好。广场侧翼的咖啡馆二楼包厢里，京野四郎推门而入，三位队员起身相迎，桌上昭和天皇御照泛着光晕。握手落座时，他将驼色礼帽搁在柚木桌面上，青瓷茶盏已为贵客斟满碧色玉露。\n\n他开口便说志同道合。刻意淡化民代党与义勇军在移民政策上的分歧，转而渲染理念契合——都崇尚严明纪律，都唾弃道德沦丧，都渴望与日本缔结更紧密的纽带，哪怕被自由派斥为“法西斯走狗”。他抬手指向窗外尚未散尽的人群，点出数位持民代党党证的同仁。\n\n“不少沉默的大多数，每次选举都会为我们投下神圣的一票。”京野轻呷茶汤，笑意如春风拂柳，“难道各位不知，若非当年普列斯特斯与共党阻挠移民解禁，我们本可发展得更壮大？”瓷盏与碟盘相触的清响恰似弦外之音，“阿德马尔固然得人心，但社进党绝非唯一为日系发声的政党。各位要知道，政坛上支持你们的力量，远比表面所见强大。”"
 brazil_adhemar.1043.a: "他咧嘴一笑：“请把民代党也当成各位的靠山吧。”"
 brazil_adhemar.1044.t: "社民党的日系"
 brazil_adhemar.1044.desc: "他辗转于晚宴、街头演说与万人集会之间，却如困在琥珀中的蝇虫。世界兀自流转，舞台布景在无形之手的调度下轮转，而他只是静候着再次登台的时刻。此刻录音棚里，田村幸重正抚平西装翻领的褶皱，尽管面前只有孤零零的麦克风。\n\n当主持人以“社民党议员、库比契克挚友、巴西最成功的日系人”介绍他时，他坦然接受了这个被强加的人设。台本要求他展现攻击性，主持人问及对阿德马尔政府的看法，他机械复述着党鞭授意的陈词滥调。他知道这番套话赢不来掌声——多数日系人坚信阿德马尔是政坛唯一为他们发声的良心。\n\n忽然导播间闪过人影，另一位主持人闯进镜头：“田村先生，”敬称被匆匆带过，“您如何看待警方与亲日团体樱花挺身队近日的暴力冲突？”眉梢掠过一丝不以为然的颤动。\n\n这题在台本之外。田村清嗓即兴作答：“同胞对社区警力过剩的怨气可以理解，但激进组织与警方冲突实属必然。既然选择暴力生存，终将被暴力反噬。”\n\n访谈草草收场。当场景再度切换时，他已然置身小型筹款会外的抗议人潮中。跨越党派藩篱的日系们因共同憎恶而集结，斥责他拒绝对警方暴行表态的行径，怒斥这位“买办”政客名至实归。"
 brazil_adhemar.1044.a: "他径直走开，却迷茫该往何处去。"
 brazil_adhemar.1045.t: "你来自哪里？"
 brazil_adhemar.1045.desc: "“樱花挺身队”的招牌高高悬起，千代子踏入这间临街办公室。室内陈设与竞选办公室无异：文件柜与办公桌星罗棋布，男人们穿梭其间，女人们伏案疾书。墙面贴满新旧海报，她的目光却被角落吸引——数名画师正在巨幅画板上起草新作。有人举起刚完成的样稿：“打倒买办田村！”墨迹淋漓的标语力透纸背。\n\n“你也听过那家伙的广播演说吧？”蓦然响起的人声惊得千代子后退半步。转头见是个戴圆框眼镜的青年，毛衫下透出书卷气，约莫比哥哥年长些许，倒更像年轻讲师而非学生。\n\n“是啊，他根本不懂尊重。”\n\n“确实。”青年推了推镜架，镜片后眸光倏然锐利又复归半垂的冷峻，“但你不是孤身一人。自从那家伙大放厥词，志愿加入者络绎不绝。”他递来登记簿，“要签名吗？”\n\n“泷千代子。”她提笔写下姓名。\n\n青年咀嚼着这个名字，嘴角扬起微妙弧度：“我叫远藤隆。千代子，先从帮忙制作标语开始如何？”\n\n画案前的女子们热情腾出位置。置身此间，千代子忽然感受到某种陌生而温暖的羁绊——那些素昧平生者眼中跃动的光芒，仿佛串联起血脉深处从未踏足的故土。她接过蜡纸模板，笔尖触及纸的刹那，墨香氤氲成连绵的抗议诗行。"
 brazil_adhemar.1045.a: "远方的家。"
 brazil_adhemar.1046.t: "你认为以后会面对什么？"
 brazil_adhemar.1046.desc: "今天是泷千代子加入樱花挺身队的第三天。队里不乏与她同龄的学生——像导师远藤隆这样的年轻人多是大学生——但千代子却被分配到了由家庭主妇组成的标语制作营。这些主妇们对她亲昵得近乎宠溺，总以“集体领养的女儿”相称，争相邀请她共进午餐，盛赞她稚嫩却渐入佳境的美术功底，以及出人意料具有煽动性的文字天赋。新一轮集会即将到来，这支自封的标语制作营正在为口号和设计集思广益。\n\n“看来你们玩得很开心啊。”远藤隆突然从千代子身后探出头来，“千代子，能聊两句吗？”\n\n千代子下意识绷紧神经，跟着他来到办公桌前。远藤推了推眼镜——这个动作她再熟悉不过，往往预示着令人不安的试探性提问。“千代子，令尊的大名是纯忠吗？”\n\n若是在刚入队时被这么问，她恐怕会僵在原地，用谎言搪塞后落荒而逃。但此刻她只是挑了挑眉：“呃……没错，那是我父亲。怎么，你认识他？”\n\n她暗自担心父亲是否被列入了什么黑名单，但远藤的笑容打消了疑虑。“例行邮件筛查时发现了他的名字，只是潜在赞助者名单而已，别紧张。”他顿了顿，指节轻叩桌面，“说到这个，我知道你喜欢做标语，但像你这样专注的姑娘应该承担更重要的任务。后天晚上能来这里碰个头吗？”"
 brazil_adhemar.1046.a: "千代子点头答应，心中却涌起一股警惕感。"
 brazil_adhemar.1047.t: "你下一步想做什么？"
 brazil_adhemar.1047.desc: "“千代子。”远藤隆咧开一口白牙，“准备好干活了吗？”\n\n“当然。”她将犹豫咽进喉咙。两人约在挺身队办公室外碰面，但远藤却径自穿过马路。走到一半时他转身招手，千代子回头望了望——标语营的阿姨们正在窗内书写新的反当局口号——再转回来时，远藤已在对面街角。她跟了上去，恐惧如铅块坠在脚踝。\n\n拐进一条背街小巷时，千代子的神经绷成琴弦。紧闭的商铺与公寓楼之间，铁皮垃圾桶在月光下泛着冷光。斑驳墙面上涂鸦张牙舞爪，她暗自计算着逃跑路线。尽头处有扇钢筋加固的铁门，远藤叩响三声。窥视孔猛然打开，一双布满血丝的眼睛先扫过少女，才转向男人。\n\n“我从乡下来，”远藤压低声音，“想学养鸡。”\n\n“这丫头怎么回事？”门后传来针对千代子的恶意，“女人不得入内。”\n\n“放轻松。”他凑近门缝，“她是泷纯忠的女儿。”窥视孔啪地合上。千代子脊柱绷紧如蓄势的弹簧，铁门却吱呀开启。门房催促二人入内，扑面而来的俨然是战争片里的地下指挥部：面色阴郁的男人们围在铺满地图的木桌前，老式无线电滋滋作响。入口正对面的旭日旗旁，大东亚共荣圈的泛黄海报贴满墙面。一群人看向千代子，目光里没有戒备，只有看待未来同谋者的炽热。"
 brazil_adhemar.1047.a: "“欢迎来到皇道社，泷千代子。”"
 brazil_adhemar.169.t: "37年的回声"
 brazil_adhemar.169.desc: "“……所以我们实际上不知道有多少人？”埃德娜感到胃里一沉，紧握着手中的电话。\n\n“它扩散得很慢，或者说看起来很慢，这对我们来说可能是件好事，然而……”布里佐拉那充满杂音的声音逐渐低了下去。\n\n“高层军官团已经不是以前那个样子了。”埃德娜安慰他说，“我父亲确保了这一点。”\n\n“那我当然希望他确实做到了。”布里佐拉语气阴沉地回答。\n\n埃德娜几乎说不出话来：“这……又要开始了？”\n\n“陆军和海军中的护宪派就像一年四季一样可靠。”布里佐拉想安慰她，“但……阿德马尔做事总是有一套。”\n\n“你最清楚不过了。”埃德娜用手指把眼镜往上推了推，“无意冒犯。”\n\n“没关系。”布里佐拉靠在椅子上，在电话里发出嘎吱的响声。\n\n“社进党在海军高层也有支持者？”埃德娜握紧了拳头。\n\n“无论你接下来要做什么，都得想办法让工党继续支持你。”布里佐拉的话中透出一丝担忧，他曾亲历过类似的事情，而他不想经历第二次了。“不管他们有多少人，都是在等着一锤定音那一刻。”\n\n“我会尽我所能的。”布里佐拉坚定了语气，其中还带着痛苦，他比谁都明白这意味着什么。“为我祈祷吧，就像我为你祈祷一样。”"
 brazil_adhemar.169.a: "“我会的……我不会忘记这一切，谢谢你。”埃德娜·洛特挂断电话时，感觉手在颤抖。"
 brazil_adhemar.170.t: "久赌必输"
 brazil_adhemar.170.desc: "壁炉中远远传来噼啪声，与埃德娜·洛特眼中闪烁的怒火相映生辉。她坐在沙发上阅读《商业周刊》，金属框眼镜倒映着跃动的火光，难以置信的情绪随着书页翻动而愈发浓重。这本夹在信件中的杂志本是展现大亨安心吸血的一叠废纸——直到阿德马尔的名字，以及他准备公之于众的宏伟计划跃入眼帘。\n\n“南大西洋的宝库”。这篇文章简直下流无耻，用经济扩张的皮囊包裹着幼稚的贪婪。阿德马尔提议在商业区建设集娱乐、休闲、旅游为一体的综合设施，用浮夸的辞藻描绘赌场、体育场馆，声称要为巴西经济培育赌博这一“新兴产业”。\n\n埃德娜起身将杂志甩进壁炉，翻涌的厌恶几乎盖过了那丝微薄的快意。巴西从来不缺罪人，而阿德马尔妄图通过打造当代所多玛来刺激经济只会让这个国家更加污秽。\n\n看着火舌将杂志卷曲焦化成灰，她又坐了下来，脑海中开始构建反击策略。身为左翼领袖的埃德娜从未在信仰上妥协——就像绝大多数巴西人那样。她知道政坛容不下圣人，但这并不意味着要放弃底线。巴西的领导者本该指引民众走向崇高，而非从人性的弱点中渔利。\n\n“千万人还在为美好生活挣扎，阿德马尔却要打造属于自己的拉斯维加斯。”埃德娜怒火中烧，“混账东西！”"
 brazil_adhemar.170.a: "反对派将激烈回应。"
 brazil_adhemar.10110.t: "针锋相对"
 brazil_adhemar.10110.desc: "清晨的电视荧屏上，莱昂内尔·布里佐拉容光焕发地站在鲜红的背景前演讲。里约市中心街道上，大批民众驻足在电器商店橱窗前观看这场现场直播。\n\n“各位记者朋友，临时召集这场发布会，为表歉意我将长话短说。”他对着满堂记者幽默开场，“工党矢志改革，要让国家为人民服务，而非令人民服从国家。为此我们将推动经济复兴，切实解决工人农民在街头巷尾的诉求，把他们从象牙塔里贪婪权贵的压榨中解放出来。在此，我宣布今年将与挚友若泽·弗雷雅共同角逐总统大位。凭借他对青年群体的深入理解，我们必将携手带领巴西前进。”\n\n仅仅几小时后，同一块彩色电视屏幕切换成海蓝色背景，眼镜学者模样的男子以与前者如出一辙的姿态亮相。“作为社民党候选人，我坦克雷多·内维斯承诺将带领国家重新站稳脚跟。我会与强人乌利塞斯·吉马良斯携手，开发自然资源，振兴城市经济，发展现代农业。若有幸当选总统，我愿与全体国民共同投资属于我们的未来。”"
 brazil_adhemar.10110.a: "同出一辙，还是材质各异？"
 brazil_adhemar_flavour.32.t: "阿德马尔的樱花树"
 brazil_adhemar_flavour.32.desc: "纯忠看到早上的消息，忍不住露出了笑脸。“阿德马尔取得压倒性大胜！”“阿德马尔——巴西的新面孔！”新闻里的这些内容真是让他再高兴不过。\n\n“终于来了，算是这段时间的第一个好消息。”他喃喃自语，关掉收音机，品味着方才的消息。不过，千代子的出现把他拉回现实，激起他胸中的喜悦。\n\n“父亲，为什么阿德马尔当选让你这么激动？”她探究着父亲不寻常的笑容，疑惑地问道。\n\n纯忠想到了阿德马尔为臣道联盟做的一切，有合法的也有非法的。他愿意提供所有必要的交易和支持，但纯忠把这些事都压在了心里，千代子没必要知道这些。\n\n“千代子，因为他帮助臣道联盟，这是父亲非常热心的事情。”裕成从门口走进来，打破了空气中尴尬的沉默。\n\n纯忠看了千代子一眼，然后突然移开了视线，好像刚刚的谈话把他带到了别的地方，但最终还是决定了应该要怎样对她说。\n\n“我们别提那个名字了。别在她面前。”\n\n千代子心中的问题比答案还多，但她知道最好不要问父亲，尤其还是在他这么开心的时候。"
 brazil_adhemar_flavour.32.a: "阿德马尔种下了种子，但只有时间才能知道它能否长成。"
 brazil_adhemar_flavour.33.t: "连根拔起的樱花树"
 brazil_adhemar_flavour.33.desc: "“父亲，您今年会投票吗？”千代子问道，她正绞尽脑汁地想要打破房间里的沉默，“毕竟，您上次大选时似乎对社进党很是积极支持！”纯忠一言不发，依然注视着窗外，回避她的提问。不过，他很快就收回目光，长叹一声，无言地转过身来，面对女儿。\n\n但是，他没有对千代子说什么——不，没什么需要说的，紧蹙的眉头早已说明了一切：他不想参与这次谈话，也不想和政治再扯上任何关系。\n\n“你父亲……对阿德马尔总统的政府很失望。”裕成接过了话头，话语透露出阵阵失望，“他——不，我们，总统为日本人所做的事情没有哪一点是能让我们满意的。”裕成缓了缓，好让千代子能跟上，“你父亲告诉我，他再也不会给政客们投票了。”他的声音再次低沉下来，不过这一次，他的声音中不再夹杂着犹疑，而是一丝悲伤。\n\n“背叛。就是这样。”纯忠的话音清晰而凝重。显然，他不愿意再多说些什么，也希望其他两人就此打住。\n\n“但是父亲，那……”\n\n纯忠迅速打断了女儿的疑问，严厉而又疲惫地说道：“该说的我都说了。”然后他又慢慢转过身，望向窗外。\n\n千代子又一次感到问题比答案还要多，但她现在突然有点害怕，或许自己其实并不想知道答案。"
 brazil_adhemar_flavour.33.a: "无人照管，繁花凋落。"
 brazil_adhemar.1012.t: "棒球"
 brazil_adhemar.1012.desc: "昭和三十七年八月三日，天气晴朗无雨。上午晚些时候，阿德马尔·德·巴罗斯总统偕一些经常参加棒球比赛的熟客一同出现在三重市西市立棒球场。看台上坐着的是当地日系社区的重要成员，绿茵场上奔跑着日系青年、棒球运动员、爱好者和工作人员。在这座位于总统故乡中心的棒球和相扑综合场馆之中，某些人比其他人更能吸引阿德马尔的视线。\n\n阿德马尔一边散发魅力一边运用“信封系统”，宛如棒球场主一般在场内来回走动。或许有人认为堂堂总统滥施小惠会有失身份，但阿德马尔却会对着他们大笑几声：“我可是个艺术家，”他强调说，“这事情虽小，作用可大！”\n\n话语间暗藏玄机，不禁令总统露出一丝意味深长的笑容，引得不远处记者与路人纷纷侧目。“总统居然在百忙之中抽出时间，前来参加圣保罗少数族裔的社区比赛？嗬，那些日系怕是要在大呼‘不会吧！’之前便惊得跳脚了！天知道他们有多需要被偶尔敲打一番，否则他们迟早会忘记是谁帮他们拿下这座球场，又是谁从瓦加斯时代就与他们站在一起。”\n\n决赛即将开始。阿德马尔指节捏得咔咔作响，“谁赢根本不重要，”他喃喃自语，“图皮队和苍鹰队都是靠塞钱才一路混到决赛的，再说这两队的日系成员人数也差不多。不过嘛，操盘的手艺确实得勤加温习。”\n\n阿德马尔走向主裁，对方颔首向他致意。总统递出一个信封，开口道："
 brazil_adhemar.1012.a: "“我觉得这次该轮到图皮队捧杯了。”"
 brazil_adhemar.1012.b: "“不，我觉得苍鹰队早就该赢一把了。”"
 brazil_adhemar.1013.t: "忆往昔"
 brazil_adhemar.1013.desc: "阿德马尔在圣保罗与当地的日裔精英度过了又一个夜晚：设施齐全的豪宅、绿茵草坪，日式和巴西风味的菜肴琳琅满目。在难得一见的晴朗星空下，人群用日语和葡萄牙语边吃喝边聊天。在不夜城的万家灯火之中，宴会同星空一般璀璨。\n\n巴西总统喝着进口清酒，咀嚼着日式炸鸡，一边打量着众人。他们的谈话涉及方方面面。比如说，有几个日裔在一个角落里激烈争论着，究竟为什么一个叫“岸”的人永远选不上公职；一两个在讽刺最近的棒球比赛舞弊事件；另外，还有一大群人在谈论——\n\n阿德马尔放下手中的吃喝，走近人群，说道：“是说岸本次夫？我没听错吧？”日裔老人点了点头。“如果我没记错的话，他现在应该得有七十二岁了吧。他还在世？”更多的人点头表示的确如此。“天哪，这让我想起了过去。那时我和他一起做的那些事……啊，回忆。”周围响起阵阵笑声。“但是——对不起，女士们先生们，我有点走神了，各位请自便吧。”\n\n阿德马尔又端了一盘寿司，自言自语着：“亲爱的老天，简单的金枪鱼和三文鱼卷，嗯——嗯呣！”他继续咀嚼着食物，“臣道联盟……总不可能还存在吧？我以为他们都被关进号子里去了。哦，还有樱花挺身队那群疯子，但他们喜欢疯狂的雅尼奥。”\n\n总统又吞下一块炸鸡，得出了一个结论：“老岸本可以帮忙压倒支持雅尼奥的那群白痴，对日裔施加影响。”"
 brazil_adhemar.1013.a: "“我最好再给他打一次电话。”"
 brazil_adhemar.1014.t: "主教座堂前的集会"
 brazil_adhemar.1014.desc: "主教座堂广场上出现了奇怪的一幕：一大群日裔游行队伍途经主教座堂，向圣保罗全城呼喊着他们的诉求。\n\n由于绝大部分标语都用日文写成，圣保罗市民很难理解它们的含义。只有少数几则标语是葡萄牙文，其中最为醒目的一条是这样的：将全部四十万日裔遣返回日本。与活动家们的交谈令圣保罗人更加一头雾水。\n\n“我不明白你们为什么要回去，在这里不是挺好的。是全民盟要赶你们走吗？”\n“不，先生，你不明白。不是你们，而是我们——我们要落叶归根，和日本人团聚。我们还要在战争中为日本出力。”\n\n远处，巴西总统与一位略微年长的日本人坐在餐厅里。阿德马尔远远地观察着日裔激进分子，免得全民盟记者听风就是雨，瞎说什么民选总统参加准法西斯集会。\n\n岸本次夫是总统的老朋友了，他先是与总统进行了一番友好的交谈，然后准备提出一个阿德马尔无法拒绝的提议：“你知道的，这些，呃，虔诚的日裔社群，他们有个想法，而你你可以为他们的辛勤工作提供一些支持……”说到此处，岸本贴近阿德马尔，话音小了下去。\n\n记者们曾称岸本为阿德马尔的“日本事务秘书”。听完提议，阿德马尔笑了笑，岸本也迅速露出了同样的笑容。随后，总统点了点头，说道："
 brazil_adhemar.1014.a: "“这条件可真诱人啊！我当然能帮上忙了。”"
 brazil_adhemar.1015.t: "皇道……啥？"
 brazil_adhemar.1015.desc: "“忍不了了！”圣保罗老牌报纸《圣保罗州报》犯罪版的一名记者厌恶地砸了一下桌子，他的同事们也都只能摇摇头。\n\n让他们如此勃然大怒的案子发生在普鲁登特总统城东北的图庞，一名富有的日裔被另一名日裔激进分子给杀害了。“单刀直入吧，”记者继续说道，“富有的日裔金融家在自己家里被人用左轮手枪打死。几分钟后，警察赶到现场，发现凶手正企图翻墙逃跑，但他的体格就像热图利奥·瓦加斯一样瘦弱，被抓了个正着。”记者讥讽地笑了笑。\n\n“案情明了，凶器就塞在他的后口袋里，罪犯被捕之后非常配合，回答了警察提出的所有问题。他还提到了某个新组织，‘臣道’的继承者——我是说‘臣道联盟’。”\n\n说到这里，记者挠了挠头：“这个年轻罪犯说是……皇道……？哦，是皇道社。我们和其他圣保罗媒体都听到了风声，这可是个大新闻。但第二天，那个毋庸置疑的杀人犯就被放出来去了，此前向媒体透露消息的警官们也个个都沉默不语。我还听说有个警员在《圣保罗页报》的记者面前落荒而逃，只是因为记者大声问他：‘警官？警官？如果你知道事情的进展，为什么要逃开？’”\n\n所有人的脸上都满是反感的神情。“究竟是怎么回事，谁知道呢。肯定是哪个混球在给皇道社这帮人铺路，庇护他们免受牢狱。”说出这番话的记者灌了两杯伏特加下肚，重重的跌坐回座椅上。"
 brazil_adhemar.1015.a: "“也许我该去写关于股票的文章……”"
 brazil_adhemar.1016.t: "二十年前"
 brazil_adhemar.1016.desc: "阿德马尔远远地打量着臣道联盟的囚犯，他不得不对这群人的辛勤工作表示敬佩。菜园、鸡舍、猪圈——安谢塔岛帕尔马斯港监狱的典狱长告诉他，这些都只花了短短几周就建成了，真是再好不过的证明。\n\n在囚犯们的窃窃私语和好奇之中，阿德马尔走下乌巴图巴的渡轮，身后跟着两辆装满了选票的卡车，要让囚犯们在选票上盖上州长候选人的名字，参加1947年州选举。此时，有人发来讯息：“阿德马尔·德·巴罗斯博士来了。”囚犯们闻讯，纷纷跑向食堂。\n\n阿德马尔想要证明，包括臣道联盟在内的日裔可以信赖他来担任圣保罗州州长。阿德马尔一点日语都不会说，所以只能依靠他的“日本事务秘书”岸本次夫来做翻译。阿德马尔和岸本在与囚犯们闲聊、分面包的时候，确信他们已经听到了消息。\n\n但阿德马尔还有一张王牌。他拍手示意大家注意，让岸本尽可能清楚地翻译他接下来的话：“各位，我得先告辞了，但我非常感谢你们的欢迎。”囚犯中间回以礼貌的掌声。“你们的勤奋和努力让我印象深刻，我希望你们的努力能得到回报。因此，今天我向你们承诺：如果当选州长，我将尽所能将你们释放出狱。”\n\n话音刚落，全场掌声雷动，欢呼声此起彼伏。紧接着，这位准州长又抛出了一个修辞炸弹：“各位，我还想让你们明白。我懂你们，臣道联盟就像阿德马尔主义——要么爱你，要么恨你，没有中间地带。”阿德马尔离开时，囚犯们笑了很久，钦佩之情溢于言表。"
 brazil_adhemar.1016.a: "阿德马尔·佩雷拉·德·巴罗斯州长信守承诺，开启了长达数十年的合作关系。"
 brazil_adhemar.1017.t: "棕榈之地的臣道"
 brazil_adhemar.1017.desc: "阿德马尔·德·巴罗斯走进巴西利亚市郊的集合地，他注意到，许多人仍然对这座十年之间拔地而起的城市惊讶不已。\n\n许多激进分子都还不算老，还认识阿德马尔。其中四五十岁的曾在安谢塔岛上见过他，或者至少觉得他们见过。阿德马尔没有动摇他们的信念，他很擅长假装认脸，不论之前是否认识，日裔领袖们都对阿德马尔肃然起敬，他也乐在其中。\n\n最后，岸本宣布会议开始，启动议程，示意阿德马尔发言。“先生们，你们可能想知道，我为什么要把你们从共同的家园召集到这么远的地方来。”与会者都点点头，“其中部分原因出于本人。数月以来，我们一直通过岸本先生从中斡旋来处理事务，但直到今天，我们才得以会面。孔子说，‘有朋自远方来，不亦乐乎’，恰如此时此刻。”\n\n会场回以礼貌的掌声。阿德马尔继续说道：“为了赢得你们的支持，压倒萨尔加多、库比契克、古拉特和夸德罗斯等等诸人在日裔中的影响力——拉塞尔达就不必说了，你们肯定恨透他了——我依照此前惯例提出以下建议。”一提到拉塞尔达，会场里的人们都不由得皱起眉头，阵阵笑声同时响起。\n\n“首先，我们会帮助你们，呃，特攻队，免得进监狱；第二，我们会保证媒体一言不发；第三，我会找人帮忙，让你们担心的那些‘心脏’的家伙去坐几天牢，或者不止几天，要多久就蹲多久。”热烈的掌声和赞许的点头表明了台下日裔的看法。"
 brazil_adhemar.1017.a: "某事就此发端。"
 brazil_adhemar.1018.t: "线索"
 brazil_adhemar.1018.desc: "大泽静夫点起一支香烟，缕缕烟雾从打开的车窗飘出。通往大蓬特的道路崎岖不平，但他正驱车穿过圣保罗曲折的街道，很快就到达了圣保罗的郊区。他的新故事已经迫不及待了：就在上周，一名居住在圣保罗的日裔被捕，此人在日系社区颇具影响力，流言蜚语迅速不胫而走。乍一看，这或许只是个有趣的故事，但在被捕前，他是为数不多公开支持拉塞尔达的日裔之一，也是一位声量颇高的阿德马尔反对者。于是，这其间便充满了歧视的味道，静夫决心证明流言，这正是他作为记者的资格。\n\n记者拐过一个弯，绕过树木和偶尔经过的行人。今天的车流明显比较少，很好。他没有时间制定连贯的调查策略，只能一边开车，一边拼凑已经得到的线索。当然，他需要先调查这所房子和它附近，记录下警察还没有从现场带走的东西；然后，他需要找到目击证人。他觉得警察大概率不会开口，不过嘛，级别比较低的办事员和簿记员会更乐于分享细节的。\n\n拐过最后一个拐角，大泽静夫看到了房子四周的石围栏。“该死！”他嘟囔着。在前院草坪的大门旁边，用日语涂抹着两个醒目的大字：“国贼！”他把车停在路边，走近墙上的涂鸦标语，伸手摸了摸——已经干了。这是个不祥的警告，也许有人会被吓倒，但静夫不会。"
 brazil_adhemar.1018.a: "事实上，他的胆子更壮了。"
 brazil_adhemar.1019.t: "阴郁小巷"
 brazil_adhemar.1019.desc: "大泽静夫越来越不耐烦了，他正站在邦雷蒂鲁区一条喧闹而又昏暗的小巷子里，鞋底无力地敲着地板，沮丧之情溢于言表。已经是二十分钟过去了，他的线人还不见踪影。坦率地讲，能在第一时间就联系上这位线人已经是万幸了，毕竟他也找不到能比政治和社会信息部职员更好的消息来源了。如果真的有人手握极右翼日系团体恐怖主义回潮的证据，那一定就是他们——至少他希望如此。\n\n静夫听到一阵脚步声，他转过身来，担心会不会是警察找来了。相反，阴影里站着一名女人，唇上夹着点燃的香烟。“大泽静夫？”她的声音干涩而尖锐，静夫吓得心跳了一下，然后默默地点了点头。女人冷笑一声，取下香烟，走到灯光下，手里攥着一个米黄色的文件夹。\n\n“该死，看起来你是对的。”女人蹦出一句话，把文件夹递给了静夫。记者麻利地撕开封口，开始翻看里面的内容：大量的书面通信记录、拘留记录和各种囚犯的照片，全都是日系人，旁边都标注着同一个名字——岸本。静夫长出一口气，这正是他在过去两周里找到的那个名字。“这个叫岸本的家伙，”女人笑着说，“是社进党员。”她歪过头，吐了口唾沫，“他给警察塞了个信封，一收到钱他们就都闭嘴了。”\n\n静夫默默地点了点头，继续浏览着手中的文件，足够做个彻底的揭发了。他低声嘀咕了一句感谢的话，然后合上文件夹，转身离开小巷。“不是说我收了钱，”女人见他离开，说道，“你知道我怎么说他们的吗？”静夫迟疑地转过身，看到了女人嘴角噙着的冷笑。"
 brazil_adhemar.1019.a: "“我说，滚你妈的！”"
 brazil_adhemar.1020.t: "暗影涌动"
 brazil_adhemar.1020.desc: "静夫步下巴士，思忖着下一步的打算。稿件提交之初，反响尚可，他的发现已成午餐时同行间的谈资。不料，他旋即被召去开会，挨了一通臭骂，说他文章过于敏感，证据不足却大肆渲染攻讦。他当然明白这弦外之音。他们担心的并非新闻操守，而是出于对报复的恐惧。文章注定只能沦为内部的流言蜚语。\n\n他一进家门，思绪便被打断了。门被什么东西卡住了，虚掩着，静夫不得不使劲挤进去。他把目光落在一个包裹上。包裹不大，刚好能塞进信箱，此刻却被小心翼翼地放在地上，上面还覆盖着两张慈善募捐的传单。他略微迟疑了一下，但好奇心还是驱使着他将包裹拿到厨房，手指也随之移到包裹侧面，然后向上揭开。\n\n答案一瞬间彻底吞噬了他的好奇。伴随着一声巨响，他被震得向后倒去，一团黄色的烟雾瞬间布满了房间。剧痛瞬间席卷全身，那如千刀万剐般的冲击，很快便被汹涌的烧灼感所吞噬。耳鸣如尖啸撕裂，静夫睁开眼睛，迎来的却是更剧烈的疼痛，一声惨叫出口，旋即化为剧烈的呛咳。剧痛之中，他脑海中闪过一个清晰的念头：是芥子气炸弹。\n\n他任由痛楚再度席卷全身片刻，然后试图强撑着站起。双臂却不听使唤，他只能向前匍匐，直到摸到一把椅子，才借力勉强撑起身体。他浑身颤抖着，再一次睁开双眼，再一次承受那灼烧般的剧痛，再一次望向那个盒子。痛楚稍减片刻后，他瞥见了一张纸条。纸条虽污迹斑斑、微微泛黄，但上面那个唯一的词却依旧清晰。用洇开的黑色墨水写就，并重重地划了下划线：“败战派”。"
 brazil_adhemar.1020.a: "王暂受制于卒。"
 brazil_adhemar.1021.t: "联盟破裂？"
 brazil_adhemar.1021.desc: "文章还是没能登报，或者说，没能在自家报社登报——《新闻论坛报》头版头条刊登了阿德马尔向臣道联盟行贿的一系列丑闻，引起了公众的哄堂大笑。他们惊呼，当然有人受贿了，是阿德马尔！但真的可靠吗？太荒谬了！这份属于拉塞尔达的报纸一直游走于党派和虚构的界限之间，但这次肯定超出了常理的范畴。\n\n但对日系团体来说，这可不好笑。几十年前就很少有人真的在乎他们，现在就更少了，但警方觉得这样还不够。文章见报短短几个小时之后，警车就开上了街，挨家挨户敲门，强行进入民宅，批发盗窃、谋杀、人身攻击的罪名，没交“贡品”的人只能乖乖掏出保释金。虽然警察手里没有任何直接的证据，但所有人都心知肚明这是怎么回事，所有人都明白为什么警察在讯问时会摆出如此敌视的态度。\n\n岸本勃然大怒。从文章公之于众的那一刻起，他就开始试图息事宁人，宣称这只是拉塞尔达耍的伎俩，害怕阿德马尔在圣保罗照顾日系社群、赢得人心。然而呢，就算是没看报的人也不买岸本的账：他漫不经心的姿态、无所顾忌的腐败让许多人沮丧厌倦。每当他尝试着呼吁人们团结起来、支持总统的时候，反对声就一浪高过一浪。\n\n夕阳西下，一群人乱糟糟地向警察局进发，要求释放他们的孩子、兄弟姊妹、还有父母。外勤警官们坚守着阵地，还有警员在呼声中伸手要更多的保释金。抗议一浪高过一浪，有几个警员受到了更大的冲击，但最终人群还是退了回去。几名囚犯获准离开，但真正掌权的一方显而易见——他们回到充斥着争论的家里时，显然无能为力。"
 brazil_adhemar.1021.a: "而且再也不是社进党了……"
 brazil_adhemar.1022.t: "皇家同花顺"
 brazil_adhemar.1022.desc: "岸本早就意识到，在某些时候，保持沉默方为上策。警方就他与臣道联盟的瓜葛进行的盘问，关于他与线人相处时为何如此冷静的疑问，以及现在，关于他为何出席这场会议。劳多·纳特尔的一番简短介绍和几个心领神会的点头，便已补充了对话的内容。\n\n“阿德马尔，我欣赏你的乐观，但我办不到！”小瓦加斯抗议道，随着对方的追问，他似乎愈发不耐烦了。\n\n“我理解你的担忧，但是，小子，这事儿能成！”阿德马尔回应道，拍了拍小瓦加斯的肩膀，“向他们表明你感同身受，这对于阻止夸德罗斯和那些整合主义者们钻营上任将大有裨益。”\n\n小瓦加斯听了片刻，随即摇了摇头：“那篇新闻报道呢？虽然是拉塞尔达那帮人的小报瞎写的，但我可不想冒这个险，跟皇道社那帮恐怖分子扯上任何关系。”即便小瓦加斯话锋直指岸本，岸本却只是报以浅笑，任由那两人继续他们的对话，“况且，因为我父亲当年推行的移民禁令，他们恨透了他。我敢肯定，他们会把我们的名字联系到一起的。”\n\n“那都是陈年旧事了，小伙子。共产党人当初也恨他，可如今那些出狱的不也乐于同我合作吗？”小瓦加斯试图再次抗议，却发现到嘴的话又咽了回去。岸本注意到阿德马尔的动作有些颤颤巍巍，这恐怕也是他们这个年纪的人难以逃脱的命运。阿德马尔在几名警卫的跟护下走向门口，在门口转身面对小瓦加斯：“我已经替你约了皇道社，还有岸本先生的会面。务必同他们保持联络。”"
 brazil_adhemar.1022.a: "忠告已然转为命令。"
 brazil_adhemar.1023.t: "白忙活一场"
 brazil_adhemar.1023.desc: "“……你确定他们一个都查不到？”静夫不耐烦地重复道。他坚信，在某个地方，通过某种途径，一定存在着一条能将皇道社与阿德马尔联系起来的线索。然而，他至今尚未找到任何真正能一锤定音的证据，而眼看一天就要过去，他所做的也不过是把手头的线索一条条筛选排除罢了。\n\n“恐怕没有，先生。”办事员回答道，意兴阑珊地翻看着一份档案，“我们的档案里倒是有几个相似的名字，但最严重的也不过是战时扰乱治安之类。我猜有些或许是沾亲带故，但也就仅此而已了。”她转向另一份档案，翻开首页递给静夫，“说起来，自从阿德马尔上台后，我倒是注意到这儿确实清静了不少。”\n\n静夫微微点了点头，将档案递了回去：“他竟然肯下这么大力气对付他们，真是了不起，嗯？”他顿了一下，“听着，我真正想查的，就是一个叫‘岸本’的人，或许叫岸本次夫。我知道他因为挪用公款被捕过几次，而且现在还逍遥法外。你觉得，能找到关于他的什么资料吗？”\n\n那办事员这次连翻阅手头档案的动作都懒得做了：“我们最近在把一些旧档案转移到另一处设施去。具体是哪儿我也不清楚，档案转移过程中也难免会有些遗失，不过你要是给我一两天时间，我应该能查到它们被转到哪儿去了。”她语气平平地答道，目光则瞟向了墙上的挂钟。\n\n静夫最终还是让步了，脸上掠过一丝不易察觉的苦笑，但很快便被他强压了下去：“唉，官僚作风嘛，也没什么好抱怨的。”他在一张纸条上潦草地写下“岸本”的名字递了过去，又补充了一些关于此人的信息，最后也只得道了声辛苦，便离开了。其中有些情况，她得承认，自己先前确实不知情。她又瞥了一眼钟，然后望向窗外，望向那轮西沉的落日。"
 brazil_adhemar.1023.a: "那笔贿金数目着实不小，她一时竟不知怎么花掉。"
 brazil_adhemar.1024.t: "紧密团结"
 brazil_adhemar.1024.desc: "过去的几周里，静夫的愿望几乎全都落空了。所有线索全都断了线，查找档案和警方记录的努力悉数遭到了拒绝，而且一次比一次更咄咄逼人。他的偏执妄想越来越深，但他也意识到了仅凭猜测开展工作的风险。回想起来，他的思绪还停留在上次会议：编辑问他发现了什么线索，然后建议他放弃这篇报道，写些真正有证据的文章。\n\n他一进家门，思绪便被打断了。门被什么东西卡住了，虚掩着，静夫不得不使劲挤进去。他把目光落在一个包裹上。包裹不大，刚好能塞进信箱，此刻却被小心翼翼地放在地上，上面还覆盖着两张慈善募捐的传单。他略微迟疑了一下，但好奇心还是驱使着他将包裹拿到厨房，手指也随之移到包裹侧面，然后向上揭开。\n\n答案一瞬间彻底吞噬了他的好奇。伴随着一声巨响，他被震得向后倒去，一团黄色的烟雾瞬间布满了房间。剧痛瞬间席卷全身，那如千刀万剐般的冲击，很快便被汹涌的烧灼感所吞噬。耳鸣如尖啸撕裂，静夫睁开眼睛，迎来的却是更剧烈的疼痛，一声惨叫出口，旋即化为剧烈的呛咳。剧痛之中，他脑海中闪过一个清晰的念头：是芥子气炸弹。\n\n他任由痛楚再度席卷全身片刻，然后试图强撑着站起。双臂却不听使唤，他只能向前匍匐，直到摸到一把椅子，才借力勉强撑起身体。他浑身颤抖着，再一次睁开双眼，再一次承受那灼烧般的剧痛，再一次望向那个盒子。痛楚稍减片刻后，他瞥见了一张纸条。纸条虽污迹斑斑、微微泛黄，但上面那个唯一的词却依旧清晰。用洇开的黑色墨水写就，并重重地划了下划线：“败战派”。"
 brazil_adhemar.1024.a: "你要敢动王，那就千万别失手！"
 brazil_adhemar.1025.t: "老人的国家"
 brazil_adhemar.1025.desc: "这是圣保罗市中心平静的一天。在公园绿茵的长椅上，一对老夫妇静静地看着身边的世界。他们已经在这里生活了几十年，当初的树苗长成了参天大树，长椅在潮湿和岁月中渐渐腐朽，这一方小天地一直都属于他们。\n\n远处，报童停下叫卖，问候当地社区的领袖，老夫妇听到了“岸本”这个名字。“岸本，又来了。”原野孝和苦笑着说，“他已经从臣道联盟拿走了那么多，谁能猜到他还想要更多？不过，从一伙暴徒变成另一伙暴徒，倒也不足为奇。”\n\n她的丈夫幸田也同样只能苦笑以对：“好吧，现在支持他的人肯定比过去歌颂夸德罗斯的要多，至少现在有人愿意站出来对抗美国人了。”他在努力回想另一个名字，自称是整合主义者的那个人，但怎么也想不起来了。他的脸色突然严峻起来：“不过，我真希望警察能放过我们。现在每天晚上，我都能听到可怜的孩子从床上被扔进牢房里的声响。”\n\n孝和也点了点头，打量着一个骑车经过的年轻人。“你听说了吗？丰信的孩子昨晚被捕了，说是破坏公物！就在去年，他还是全校最好的孩子呢！”她笑了，但其中的意味除了痛苦还是痛苦，“阿德马尔说，他正在努力打击这种行为，正在和政府内部谈了。”\n\n幸田听完，点了点头：“是，那挺好的。”他望着公园山下的操场，那里满是年轻的少年，“有时我们确实得自己站出来，但现在，像阿德马尔这样的人愿意代表我们站出来，这很好。”"
 brazil_adhemar.1025.a: "总统再次拔得国民关注的头筹。"
 brazil_adhemar.1026.t: "外人"
 brazil_adhemar.1026.desc: "“岸本在维护圣保罗的舆论上发挥了不可替代的作用，”阿德马尔一边说着，一边踱步，“皇道社也给予了相应的支持，这都是我们的铁关系和票仓，绝对不能浪费！”在班代兰特斯宫众多的一间私密办公室中内，阿德马尔总统正在同岸本次夫、劳多·纳特尔和小热图利奥·瓦加斯就城市的公众战略、尤其是有关瓦加斯的公共战略进行讨论。\n\n“我最担心的是，”小瓦加斯终于开口了，“日系人会不会接受我。我不是傻瓜，我知道他们怎么评价我父亲，我一点都不怀疑他们也会这么对我。”\n\n阿德马尔叹了口气，示意瓦加斯站起来。两个人走到窗前，外面是修建整齐的草坪和树林，还有邻近的房屋。“告诉我，我在这里都做到了什么？”瓦加斯愣了一下，对阿德马尔的反问有些不确定。\n\n“我来告诉你，”阿德马尔自己对反问做出了回答，“我赢得了一群近乎是激进分子的日本人，而我也差不多同时获得了共产党的支持，而他们正是当初支持排斥日裔的团体。”他拍了拍瓦加斯的肩膀，露出笑容，“如果我都能做到，那么老瓦加斯的儿子怎么会做不到呢？”\n\n对此，小瓦加斯只能默默点头：“我明白，我明白，今后我一定会让岸本向我我提出慎重的建议……”他转过身，看到岸本还坐在那里，淡淡地向颔首，“……当需要向日系人示好的时候。”\n\n“好样的。”阿德马尔回应道。会议持续了大半个下午，关键的目标已经实现。岸本知道，在阿德马尔退下总统之位后，皇道社和社进党仍将保持长期的密切联系。"
 brazil_adhemar.1026.a: "长远战略。"
 brazil_adhemar.1027.t: "企业外联"
 brazil_adhemar.1027.desc: "在相机闪光灯和快门声谱成的音乐之中，阿德马尔总统和巴西第一台车载收音机的发明者漆岛宏脸上挂着礼貌的微笑，一旁的岸本则显得十分高兴。这只是记者摄影的小小插曲，但却能起到很好的宣传作用：岸本很清楚漆岛与索尼、尤其是与索尼CEO盛田昭夫之间的关系，因此安排了这次会面，好让总统府与日本人民之间的纽带开花结果。最后，公开会面变成了私人小会，阿德马尔和漆岛并肩坐在双人沙发上：“阁下，您可能知道，”漆岛叹了口气，“我也是移民。”\n\n“这倒是真的，”阿德马尔笑着说，“我知道你在消费类电子产品领域颇有建树。摩托收音机为巴西人民所做的贡献令人赞叹，你应该感到自豪。”\n\n“然而，如果没有索尼合作伙伴的关键协助，我和同僚们所取得的成就都不可能实现。他们都是非常有才华的人，阁下，”漆岛停顿了一下，仔细斟酌着接下来的措辞，“如果，您能允许来自共荣圈的技术工程师在我国工作，他们还能做到更多。”他把手伸进外套，拿出一个信封，放在二人面前的桌子上，面带微笑，“这个决定我们双方都百利无一害。”\n\n阿德马尔向后仰了一下，目光集中在信封上，啊，又是一份礼物。“诱人的提议，但我做不到，现在还不行。如此重大的提议肯定会引爆体制动荡，而我现在还应付不了。”阿德马尔把手伸向桌子，拿起信封，然后塞进了自己的西装口袋。“我还得关注其他的优先事项，不过将来我一定会考虑的。”他的脸上浮现出热情的微笑，与漆岛握了握手，而后者并不知道阁下是否真的会履行他的诺言。"
 brazil_adhemar.1027.a: "一如既往的务实派……"
 brazil_adhemar.1028.t: "我要当制片"
 brazil_adhemar.1028.desc: "对阿德马尔而言，担任总统意味着要打破政治传统的边界，在他面前铺展一片寻常政客不敢踏足的原野。但这念头对他仍十分新鲜——当文艺复兴酒店大堂窗外传来孩子们兴奋的喧嚷时，这个想法仍盘桓在他脑海。尽管如此，阿德马尔还是对笑容满面的孝治露出倦怠的微笑，这位松下的代表是岸本安排来与他接洽的人选。\n\n“我在松下的同事们已达成共识，要在这里拍摄《国立少年》第五季！”孝治朝阿德马尔周围夸张地挥手，引得总统挑了挑眉。“就选在风光旖旎的圣保罗！”此刻两人所在的空荡大堂外，“特摄博览会”正盛大举行，这场造势活动旨在宣传那部令巴西青少年痴迷的奇趣日本剧集——尽管它作为松下营销工具的目的已昭然若揭。《国立少年》在共荣圈反响惨淡，却在巴西意外收获了忠实的观众群。\n\n“阁下，您不妨设想一下，只要解除移民禁令，就能将这座城市打造成南美洲的好莱坞！且不论您将从中获得的巨额税收，单是巴西各地无数粉丝的拥戴就不可估量。我们甚至愿意淡化剧中某些……”孝治略微斟酌用词，“……商业倾向过于明显的元素。或、或许阁下还能亲自出演呢！”\n\n阿德马尔在扶手椅上变换姿势，沉思着这个提议。未等他回应，孝治便从椅背后取出一个印有“国立少年”形象的超大周边头盔。“无论如何，我相信外面的孩子们会渴望见到自己的偶像。”他将头盔越过茶几递来，“阁下？”阿德马尔接过这个古怪的周边商品，凝视着“国立少年”的白色塑料眼罩，脸上浮现出一抹笑意。"
 brazil_adhemar.1028.a: "谁说英雄一定要挂斗篷？"
 brazil_adhemar.1029.t: "技术尖端"
 brazil_adhemar.1029.desc: "阿德马尔蹲下身来检查眼前的设备，满心的不可思议。他几乎不敢相信自己的眼睛，电子设备上数不清的灯光闪烁明灭，迷宫般的电线缠过他的脚边，环绕过计算机的底盘。富士通公司的代表们也看到了总统目眩神迷的好奇心，彼此交换着自豪的微笑。一位代表特意走到总统面前，问道：“您看产品不错吧？FACOM222是富士通最顶级的计算机之一，我敢说，它是迄今为止世界上最先进的计算机硬件。”\n\n阿德马尔站起身来，迎着西装革履的社员，赞许地点了点头：“的确令人印象深刻。”两人面对面，四周灯泡闪烁，他们所在的巴鲁埃里仓库已经专门预先清空，容纳富士通从广东送来的产品，要让总统亲自过目。从共荣圈来的这些人都是广东最有影响力的代言人，代表着富士通在国际计算机市场之上不断增长的份额。\n\n“阁下，贵国的经济前景着实振奋人心，”富士通代表拂了拂西装衣襟，“然而，贵国的日本移民禁令让我们很是为难。如果能解除禁令，我们就可以迅速扩张销售前景、引进技术专家，教授巴西人民如何充分发挥计算机的潜力。”\n\n这是个诱人的建议，尤其是考虑到巴西可以凭借这些设备赢得南美的技术优势。然而，对宪法进行这样的修改显然极其困难，更何况还有其他更重要的政治事务。不过，也许在对未来的憧憬之中，巴西将拥抱来自亚洲的硅晶之梦，所有人民都能从中受益。"
 brazil_adhemar.1029.a: "嵌入式电路的未来等着我们！"
 brazil_adhemar.1030.t: "唯有攀登"
 brazil_adhemar.1030.desc: "缆索火车在金属嘶鸣中摇晃着，然后猛地向前冲去，慢慢沿着莫朗山脉，向巴拉那皮亚卡巴镇驶去。日立公司的一名代表看到这一幕，不禁面露难色，从胸前的口袋里掏出手帕擦了擦手，说道：“非常……老土的设备，阁下。”\n\n阿德马尔瞥了这位代表一眼，发出亲切的笑声，然后目光又瞟向岸本：他们两人都希望这次会面能为工业巨头日立和仍在工业化进程中的巴西赢来广泛的商机。然而，阿德马尔觉得，此刻的一切都让他尴尬不已。最后，岸本插进了话头：“我们一直都在努力，好让日立设备能适应我们自己的交通系统，英国时代的轨道之类的。”岸本回头看了一眼阿德马尔，“真是费了大心思了。”\n\n“好吧，”一位公司代表摘下眼镜，用衣袖擦了擦浑浊的镜片，说道，“也许没必要这样。如果取消移民禁令，我们的铁路专家完全有能力协助您维护任何日立品牌的设备。”他又打量了一下远处正吱嘎作响的缆车，“至少都成了这样的设备，全都换了也是可以的。”\n\n这个建议相当有诱惑力，阿德马尔比大多数人都更清楚巴西运输设施有多么陈旧，日立公司能提供的顶尖设备本就少之又少，甚至缺乏技术专家来发挥进口设备的作用。然而，如此的修宪努力牵涉太多，要花费的政治资本也难以承担。或许下次，等到巴西国内局势稳定下来，能把注意力放到国外的时候，再做打算吧。"
 brazil_adhemar.1030.a: "“有人坐出租车吗？”"
 brazil_adhemar.1031.t: "酸楚的失败者"
 brazil_adhemar.1031.desc: "“好——球！”三重西体育场同时响起了欢呼与叹息。第九局终于结束了，苍鹰队在这次三振出局之后告负。深夜与苍鹰队死忠球迷的紧张情绪形成了强烈的反差，他们成群结队地走出球场。不一会儿，球场西翼传出一道高亢的声音：“真烂！你看到久保田最后一挥的时候有多窒息了吗？我打赌他拿了钱！”\n\n推搡随之而来，一个人揪住了谩骂者的衣领，还有一个观众强压着怒火，反问道：”那是我儿子，你有意见？“没有人知道是谁先动的拳头，只知道球场的空座位之间迅速爆发起了争吵，一群人聚在一起，喋喋不休地争吵着。\n\n这时，一个中年男子从看热闹的人群中走出来，紧握拳头，盯着两个正在打架的棒球迷。他毫不犹豫地拽住其中一人的右臂，将他夺到自己身边，用右腿扫倒他的左腿，将他摔倒在地，发出疼痛的呻吟；随即，另一名球迷向他扑来，他先是偏转对方的出拳方向，然后抓住来人的衣领和右臂，向前跨出一步，让对方失去平衡，随即用力一吼，将他举起，再一下子扔到地上，把对手摔得头昏眼花，上气不接下气。\n\n成功化解了混战后，中年男子一言不发地离开了现场，他的孩子和身后的人群都目瞪口呆。“你们看到了吗？”人群低声讨论着“隅落”和“大外刈”之类的词语：这名男子展现了超凡的柔道技巧，与他们所见过的都不同。很快，消息甚至都会传到总统本人的耳中……"
 brazil_adhemar.1032.t: "沸腾时刻"
 brazil_adhemar.1032.desc: "整整一天过去了，塞尔吉奥·弗勒里的怒火越烧越旺。起初，他只是把那些话当作带点真相的玩笑——他自己也说过更过分的话。但对最无足轻重的日系罪犯怒火的调侃，逐渐演变成了对樱花挺身队再度现身的讨论，最后又扯上了臣道联盟力量回潮的担忧。\n\n“您找我，塞尔吉奥？”弗勒里猛地推开门走进来时，一位年轻军官问道，他在臣道联盟被镇压的时候还只是个十来岁的孩子。\n\n“是的，乔瓦内，我想问问你对上个月这个事件了解多少。”弗勒里把一张报纸扔在桌上，指着一则几乎被广告和足球赛果淹没的小新闻。\n\n乔瓦内低头看了一眼，恐惧在他脸上一闪而过，随即恢复了一副外交官般的镇定，眼睛快速扫过报纸内容。“您没听说吗？一位老先生用几招柔道打散了一帮地痞流氓。据说场面相当壮观，就发生在阿德马尔的视线外一点点。如果我们当时有人在场就好了……”\n\n“你居然没告诉我？”弗勒里怒吼，把报纸扫到一旁。“总统才刚一转身，这些日系人，这些混混就敢这么放肆了？”\n\n“我——我……长官，现在我们手头确实没有足够资源——我觉得如果我们跟阿德马尔谈谈，或许可以——”\n\n弗勒里命令乔瓦内起立，居高临下地盯着这位下级军官。“我看我们对这个日本人的第五纵队实在太放纵了。从现在开始，监视他们那些占据街头的组织，让他们知道，谁才是巴西的主宰。”"
 brazil_adhemar.1032.a: "“……如果他们敢还击，就给他们点颜色看看。”"
 brazil_adhemar.1033.t: "留下一片狼藉"
 brazil_adhemar.1033.desc: "街道上回荡着工人们此起彼伏的呼喊声，而塞巴斯蒂昂·裕成·泷也十分乐意加入其中。当地工会正在组织一场游行，呼吁提高薪资与改善就业保障——这一次，工会总算记得，他们日系工人也同样面临着这些问题了。最初，塞巴斯蒂昂只是和其他日系罢工者一同站在队伍的外围，但随着游行队伍在圣保罗街头缓慢前行，不断有新工人加入，原来稀稀落落的口号也变得逐渐丰富，他最终落在了队伍的后方。\n\n然而，正如他注意到日系不断加入游行一样，他也注意到了街道上慢慢聚集的警察身影。有些警员假装关心秩序，以保持安静为由头，对一些喊着特定口号的工人们指指点点。另一些警察直接封锁了道路，强迫游行队伍绕行上坡、穿过路口、远离市场。警车驶过时，车内的警察也毫不掩饰他们脸上的厌恶神色。\n\n就在这时，一阵惨叫声突然从队伍前方传来，队伍后方的塞巴斯蒂昂几乎看不清前面的情况。整条街上，大量警察迅速聚拢过来，将抗议者推搡着往后退、推入警车，同时还通过车载扩音器发布命令，要求罢工者单方面保持冷静。有的人试图留下，阻挡警察几秒钟，更多的人则在恐慌中四散奔逃，有的甚至一头撞进警方封锁线。塞巴斯蒂昂无能为力，他最后看了一眼骚动的人群，亲眼看着被铐上的日系工人被塞进警车，随后也转身逃跑。\n\n他一直跑出好几条街，才终于放慢脚步，又过了好几分钟才缓过气来。他瘫坐在一栋建筑旁，深深的羞愧感涌上心头。他内心知道，这是一场注定徒劳的抗争，那些警察压迫者永远也不会把他们的皮靴从自己这样的日系的脖子上移开，但他本可以留下反抗这场大规模的逮捕。如果再多给他几分钟准备时间，也许他本可以搞到一件武器，还击那些警察，保护自己免遭这些人的威胁。"
 brazil_adhemar.1033.a: "战斗，再战斗。"
 brazil_adhemar.1034.t: "倾听民意"
 brazil_adhemar.1034.desc: "地方示威活动已被镇压多日，散落的遗痕依然可见：几份宣传单散落在地，半数已被践踏入泥。埃德娜·洛特虽听阿德马尔阐释过这场抗议的根本原因，但当她翻捡着褐色油墨印刷的传单时，仍觉得有必要在岸本派系之外寻求更多民情。\n\n“我虽然没参与示威，但实在看不出民众错在何处。”三十岁出头的餐厅老板木下道雄说道，“很多人只能勉强度日，而镇压让社区更加不敢参与任何活动。移民禁令更是雪上加霜。”\n\n“移民禁令？”埃德娜追问。她料到会涉及这个话题，仍想倾听原委。\n\n“巴西的日系本就稀少，副总统女士，我们根本无法与警方对抗。”年近七旬的退休老人木下敏夫蹒跚走近，指向远处几处屋基塌陷、野草丛生的破败聚居点，”日子越来越难熬，迁离的人越来越多。我们并非无力反抗，但多数人毕竟年迈体衰。”\n\n年轻人点头附和：“确实，这项政策对经济毫无助益。现在终究不是四十年代了，这类惩罚性法律只会损害国际声誉。”\n\n洛特逐渐领会到这些诉求的分量，以及背后更广阔的现实困境。她明白废止禁令需耗费巨大政治资本，但清楚唯有阿德马尔愿意在此事上孤注一掷。"
 brazil_adhemar.1034.a: "现状出现裂痕？"
 brazil_adhemar.1035.t: "骑墙派"
 brazil_adhemar.1035.desc: "“双方都应为上周的暴力事件负责”\n作者：大泽静夫\n\n同许多圣保罗的巴西公民一样，最近几天的新闻时令我震惊不已，无论持何种观点，暴力事件都必须受到严厉的谴责。但是，我们怎能假装这不是普遍现象、怎能假装这并非一个巴掌拍不响的事情呢？警方和我们日系社区都有许多要反思的地方……\n……\n我们都知道事情的起因：一小撮暴脾气的老家伙还对列宁和布哈林的时代念念不忘，命令学生打手在圣保罗游行，展示公众的服从，口沫横飞，高呼要拿下拉塞尔达、阿德马尔还有夸德罗斯的人头。难不成像我这样的日裔同胞，只能做出来这样的事情吗？难道除了几个无能的极端分子，我们就不能为国家做什么别的贡献了吗？我很高兴，我们社区的许多人都对这些抗议活动发出了谴责，但我们还要更进一步……\n……\n但尽管如此，我们还是不能忽视警察暴行在这起事件中所扮演的角色。我不能说假话，我的确同情其中许多的温和派，他们是在对国家和社区的责任之间左右为难。但是，那些被激进朋友当作第五纵队、没有任何授权就被扔进拘留所、没有任何指控就被随意关进监狱里腐烂的人们呢？他们也是迫于同伙的压力而加入的吗？警察必须为伸张正义而斗争，但许多警察却只为滥用权力而斗争。我们需要对警方进行调查，免得这样的丑闻再有发生……"
 brazil_adhemar.1035.a: "微妙的平衡，两边人都看不起他。"
 brazil_adhemar.1036.t: "又一个突破口"
 brazil_adhemar.1036.desc: "又是学校里的一天，裕成在课上呆坐着，几乎什么都没听进去。罢工时的回忆——警察的袭击、懦弱地逃离、广播和电视里对罢工者的侮辱，仍然在他的血液中沸腾。他咬着面前的三明治，眼睛向下，依旧显得心有余悸。\n\n突然，另一名学生向前走去，迅速吸引了他的注意力。“嘿，是我，安德烈。我们一起上过几节课，介意我坐一下吗？”吉永正记扔下书包，但还是紧紧抓着书包带。\n\n“当然，安德烈，不用担心。”裕成微微一笑，回应道。两人聊了大约一分钟，互相询问各自的近况和家庭，然后转到了更严肃的话题上：垂死的亲人和难以为继的贫穷。\n\n“夸德罗斯似乎什么都不会说。你听到他是怎么说罢工的了吗？如果把他扔进警车里，他就不知道站哪一边儿了！”裕成感叹道，笑容更加真诚起来。安德烈笑了笑，但又沉默了起来，然后翻了翻自己的包。\n\n“你也不太喜欢夸德罗斯吧？”他问道，“啊，在报纸上看到的消息，我想你会喜欢的。”裕成的目光闪了闪，但在看到消息来源时又睁大了眼睛：人民革命先锋队。“革命先锋队明晚要开会，不知道你愿不愿意来。”\n\n裕成的内心出现了一股短暂的冲动，努力地寻找理由为古拉特辩护，想要拒绝先锋队的激进分子，但他的沉默已是再好不过的决定：“只要告诉我地点，我就去。”"
 brazil_adhemar.1036.a: "一个幽灵正在拉丁美洲徘徊……"
 brazil_adhemar.1037.t: "悬案"
 brazil_adhemar.1037.desc: "只有头顶刺目的路灯还在发着光，那是让裕成保持清醒的唯一光源，而这点光对正记而言几乎毫无作用。当裕成签署加入人民革命先锋队的文件时，他脑海中曾短暂闪过与残暴警察武装对峙的场景。可现实中仅有的战斗迹象，不过是几个装满旧式枪支的板条箱——它们和食物、药品、饮用水挤在一起。\n\n警车刺耳的鸣笛将两人同时惊醒。圣保罗城外高速公路上的几个临时路锥迅速组成关卡，刺眼的橙色警灯将夜色撕开一道裂口。正记慌忙摸索贿赂金，可警用手电筒的光柱已直射进驾驶室。恐惧席卷全身的瞬间，两名警察的手指重重叩在卡车玻璃上。\n\n“半夜三更的，你们开这辆货车干什么？”其中一人发问。帽檐投下的阴影混着夜色，把他的面庞吞没在深渊里。\n\n“我们、我们只是路过运输。”裕成回答时结巴了几下。这话并非全是谎言，但他知道警察不会相信，“有几家社区商店急需蔬菜补货，要赶在食材变质前送到。”\n\n后车厢门突然被拉开的声响打断了问答。隔着钢板传来的对话声模糊不清，两人竖着耳朵也听不分明。令人窒息的沉默持续了足有一分钟，直到问话的警察突然转头说：“后面确实有水果。”这声嘀咕让裕成浑身血液凝固，不料对方竟笑出了声，“查验过了，你们没撒谎。走吧，记住了——后半夜开车多留神，这年头有不少流浪汉专挑夜车下手。”两人连道谢都顾不上，踩着油门驶离时，感恩之情在车厢里蔓延。"
 brazil_adhemar.1037.a: "殊不知警察正报告：有一辆运载武器的卡车刚刚经过。"
 brazil_adhemar.1038.t: "麻烦来了"
 brazil_adhemar.1038.desc: "门被撞开的那一刻，纯忠意识到事情坏了。裕成近来总比往常晚归，却支支吾吾不肯说明缘由。纯忠原以为是青春期的叛逆，或许他是和朋友们在外饮酒作乐。但儿子惊慌失措地冲进门又重重地摔上，他刚意识到情况不对，就被突如其来的敲门声打断了思绪。\n\n为首的警官皱着眉头，嫌恶地抱着胳膊问道：“先生，可有看到可疑人员进入？”\n\n纯忠故意揉着眼睛，装作困倦的模样：“夜深了。你们找我有何贵干？”\n\n警官叹了口气：“我们发现一辆为激进分子运送军火的卡车，追踪嫌犯至此。”\n\n纯忠心头剧震却面不改色：“我的儿子绝不会做这种事。他只是出门买个东西，其余时间都在温习功课。明天有大考，还请各位——”\n\n警员们突然转移的视线让纯忠猛然转头。裕成正瑟缩在门廊外，自以为隐蔽实则暴露无遗。纯忠暗骂一声，却仍堵在门前寸步不让。他骤然发力扣住首个警员的手腕，向左下方猛拽，旋即以同样招式钳制住第二名警员，右腿横扫将其撂倒。\n\n正在这时，裕成冲出来连声道歉。听到第三名警员正呼叫增援，纯忠厉声喝令：“快跑！”摇头打断了儿子的辩解。"
 brazil_adhemar.1038.a: "双打变独斗。"
 brazil_adhemar.1039.t: "想干架？"
 brazil_adhemar.1039.desc: "这时第四名警察冲了进来。纯忠准备连他也一块儿解决，却意识到不会那么容易——这人会些功夫。从架势看，应该是卡波耶拉。\n\n那名警官显然比他两个动弹不得的同僚更有准备，先是晃身虚晃一招。紧跟着使出一记月牙回旋踢，逆踢出的腿速惊人，足见功力。纯忠几乎以卡波耶拉式的身法伏地避开。制服对手换招再来——仍是月牙踢但路数不同。纯忠隐约记起这招叫“鱼尾扫”或“蝎子摆”。他定神以出足扫反击，令警官失衡数秒。有些气喘的纯忠还未来得及追击，对方已重整架势。\n\n警官稍稍歪斜的贝雷帽在重心恢复时扶正了。接着他施展回旋锤踢，纯忠再度压低重心，以隅落接体落反击。正欲补上一击时，警笛声入耳，随即“警察！站住！不许动！”的喝令与惊叫同时炸响。\n\n一列持械警察已赶赴增援。队伍后方是明显刚放学的千代子，书包掉在地上，张大的嘴巴写满震惊。纯忠揉了揉后颈。"
 brazil_adhemar.1039.a: "“这下尴尬了。”"
 brazil_adhemar.1040.t: "自由有价"
 brazil_adhemar.1040.desc: "纯忠之前也蹲过这样的牢房，冰冷的混凝土墙的高处切割出了一块小小方形，少得可怜的阳光便从这铁窗中照射而入。他无力地审视着自己的手掌，血管与皱纹交织其上。他轻轻抚过那久经磨砺的指关节，黑血正从中缓缓渗出。\n\n门闩忽然咔哒一声响了，牢门晃动起来。纯忠并未因此动静而起身，继续躺在干瘪的床垫上，勉强睁开双眼，眼前的却是一个熟悉的面孔。\n\n岸本次夫脸上带着笑意，走进牢房，将一叠钞票塞进了看守的口袋。“好久不见啊，老朋友，你怎么样了，当然，除了被抓以外？”他开口说道。\n\n纯忠看着岸本眼镜中反射出的光芒，默然不语。岸本又笑了。“还是这么沉默寡言啊，但看看你周围的人吧，你最近可是成了个热门话题啊！”\n\n纯忠只发出一声沙哑的叹息。岸本微笑着，继续走近。“当我听到流言说，有个老家伙一个人把好几个警察打倒在地，我就知道我必须得亲自来看看，这到底是谁干的了。”\n\n纯忠缓缓摇了摇头。“那你现在又看到了什么呢？”\n\n“怎么了？我正看着一位传奇人物，还能是什么？”岸本瞥了一眼门口，跪下身子，贴近纯忠耳边说道：“泷先生，其他的老人们也重新开始行动了，臣道联盟已经不复存在了，但我们准备重新开始。”\n\n一段漫长的沉默之后，纯忠缓缓抬起了头，在那张布满皱纹，掩藏在阴影之中的脸庞上，目光变得炯炯有神。\n\n岸本收起了笑容，站起身来，伸出了手。“关于你的释放，我已经花钱搞定了，那场打斗，还有你那共党儿子，都无需担心，他们不会提出指控的。”纯忠低下头，握住了岸本伸出的手，握的很紧。他相信岸本说的每一个字，因为他知道，在所有人之中，只有岸本真正交到了身居高位的朋友。"
 brazil_adhemar.1040.a: "“回去找你的孩子们吧，泷先生，还有，好好考虑我的提议。”"
 brazil_adhemar.1041.t: "来日再战"
 brazil_adhemar.1041.desc: "纯忠走在回家的路上，翻找着口袋，想把房门钥匙掏出来。他回想起刚刚所发生的一切，仍觉得十分不可思议。说服岸本出手是最难的一步，而阿德马尔和臣道联盟的联系比他所预想的还要密切。他仍无法想象，要把自己和阿德马尔绑在一条船上将是怎样的情形。纯忠打开门，千代子便立马扑进了他的怀里——她终于放下心来，长舒了一口气。但屋内骚乱的痕迹依旧清晰可见，许多地方仍未收拾干净。\n\n“裕成！”纯忠喊道，“怎么了？”裕成有些不好意思地回道，“那个……对不起，我知道我惹的那些麻烦——”\n\n纯忠举起一只手打断了他。“没事的，儿子，我认识些政府高层的人，他们会照顾好你的。”听到这个消息，裕成起初满脸写着震惊，但随后很快放松了下来。“什么朋友？”裕成问道，他的放松又化为了一丝不安，“是我见过的人吗？”纯忠摇了摇头。“只是一些我的老战友，还有些早年认识的朋友。”纯忠心想，裕成给自己搞了个烂摊子，但他没必要知道他与岸本的过去，至少现在还不是时候。“你只需要知道，你不用再到处躲躲藏藏了，警方对我们两个的指控都已经取消了。”\n\n裕成终于又笑了出来，开心的抱住了父亲。“太好了，谢谢您！”裕成感动地回道。“就是记住，明早记得去学校，好吗，孩子们。”纯忠轻轻地说道。一家人心中都明白，他们距离被捕有多近，他们也都明白一旦出事，自己所可能面对的后果可能有多严重。“还有，下次记得，别做的那么明显。”"
 brazil_adhemar.1041.a: "阿德马尔的盟友。"
 BRA_adhemar_slush_fund_temporarily_disabled: "§Y小金库§!已被暂时禁用"
 BRA_quadros_was_always_right: "夸德罗斯说得对"
 BRA_quadros_was_always_right_desc: "夸德罗斯是个彻头彻尾的蠢货。这个满口“反腐”却中饱私囊的跳梁小丑，修再多的精神病院也治不好他的疯病。不过破钟一天也能准两次，他提出的“独立外交”理念倒是歪打正着。巴西注定要成为超级大国，而真正的超级大国不会屈从于他国的意志，必须走完全独立自主的道路。夸德罗斯的路线虽然荒谬，但阿德马尔必将让这一理念成为现实。\n\n随着德国势力退出南美，我们应当调整外交策略，同时吸引共荣圈与OFN的投资。让这两大集团为争夺巴西的影响力相互倾轧，一旦投资规模扩大，他们必将陷入恶性竞争——这正是我们坐收渔利的天赐良机。凭借这一战略，巴西终将成为真正独立自主的世界强国。"
 brazil_adhemar.157.t: "些许善果"
 brazil_adhemar.157.desc: "在雷鸣般的掌声与相机闪光中，埃德娜剪断彼得罗利纳市立医院门前的大红缎带，看着它飘落在地。医院本可建于城区，但她坚持要平等（或接近平等）服务农民与市民，最终选址在此——连接市中心与延绵数里农场的红土地带。法案顺利通过后，数千万克鲁赛罗被注入全国医疗项目。这是份妥协法案，但终究是份法案。热风掠过人群，卷着记者们的溢美之词与尖锐提问，吹乱了她精心打理的发型。埃德娜略带惊讶地发现，自己竟难得对一年前政治博弈的成果感到满意。\n\n副总统专车的空调冷气刺骨。座驾碾过通往机场的道路，窗外风景从绿叶掩映的铁皮棚屋渐变为白墙与沥青道路。她闭眼时浮现一张面孔。阿德马尔·德·巴罗斯堪称世上最腐败之人，但此刻他确实带来了善果——尽管是她奋力争取的善果。东方聚起暗影，虽远隔重洋，却令全球笼罩在其阴霾之下。德国孕育着将巴西撕成碎片的力量，终将以铁蹄践踏焦土。阿德马尔却愿与这些野兽共谋，这恰是其本性写照。只要那令人作呕的魅力能助建医院，对其尚可容忍。但必须严加监视。"
 brazil_adhemar.157.a: "所幸，监视者亦在被监视之中。"
 brazil_adhemar.158.t: "千里之行的第一步"
 brazil_adhemar.158.desc: "在雷鸣般的掌声与快门声中，阿德马尔剪断了新彼得罗利纳市立医院门前那条巨大的红色丝带。他带着灿烂的笑容看着丝带飘落到路面上，这笑容甚至透过电视的阴极射线都显得格外耀眼。这是彼得罗利纳市中心上的崭新明珠，也是全民盟的一项辉煌成就。埃德娜注视着这一幕，神情复杂。实际上，选择彼得罗利纳这个地点正是由她提出的，确保医院按时完工的几乎所有文书工作也都是她的人完成的。阿德马尔一如既往地将此视作一个炫耀的玩物，只为证明他那项医疗法案不是空谈或挪用公款。这一次，他亲自监督了这个雄心勃勃的项目。埃德娜原本设想的是一个中等规模的综合性医院原型，用于在整个东北地区复制推广。但一步步地，这个设想却被扩展成了一个巨型的专科医疗中心，病人甚至会从南美的另一头，甚至更远的地方飞来求医。\n\n电视里，阿德马尔还在咧着嘴笑。她突然很想冲进屏幕，向记者们揭露这个口口声声热爱彼得罗利纳人民的男人，在她最初提出这个构想时，心里到底是怎么想的。但接着她意识到——比起所谓的道德愤慨，真正让她心中不快的，其实是她被绕过了，说白了，就是被抢了风头。胜利的第一步，就是承认自己吃了败仗，而根据医疗法案，还有那么多拨款未动用呢……一名助手看到她嘴角浮现出一丝微笑，随后她关掉了电视，示意可以出门了。在离开办公室的路上，助手听到她若有所思地自言自语道——"
 brazil_adhemar.158.a: "更多。我们还需要更多，再快点。"
 brazil_adhemar.159.t: "超额死亡"
 brazil_adhemar.159.desc: "一份报告整齐地摆在埃德娜·洛特的办公桌上。放文件的年轻秘书只说了一句话，便如来时般悄然离去。在印着“机密”与“政府内部文件”的封面后方，文件标题带着近乎委婉的医学术语口吻。\n\n《关于副总统阁下就1966年第532号法案〈1966年国家卫生系统现代化与医疗准入法〉所提质询的回复报告》\n\n一页页翻过去，全是埃德娜最不愿看到的景象：渎职、官僚主义、贪污腐败——而最令人愤慨的，是彻头彻尾的漠视。那个混账小偷当年怎么自辩的？说他虽贪却办实事？真是放屁。面对全民盟为何未能全票支持法案的质询，竟有多名议员称病缺席。面对法案为何在阿德马尔肆意挥霍预算的同时，反因“开支过大”遭受不公审查的质问，她的办公室发现这不是某个顽疾，而是遍地开花的可治之症。但最糟的还在后头。当被问及全民盟核心决策层为何对法案内容一无所知时，真相是连副本都未曾送达他们的办公室。\n\n巴西政坛核心染上了沉疴。这团癌变的腐肉就挨在洛特身边，整日对民众笑脸相迎巧言令色，却连政客与立法者最基本的素养都不具备。当埃德娜用仿佛看到野狗在办公桌撒尿的表情读完报告时，脑海中只浮现一个词来形容这位她不得不与之共治国家的同僚："
 brazil_adhemar.159.a: "祸患。"
 brazil_adhemar.160.t: "为了安全与秩序"
 brazil_adhemar.160.desc: "飞机引擎在昏暗夜空中发出的低沉嗡嗡声，对埃德娜来说，是一天的嘈杂与尖叫后的慰藉。随着骚乱在南方如瘟疫般蔓延，她一场接一场地发表演讲，平息事态，安抚激愤——最后几乎声音沙哑。但这一切并非毫无意义——至少，今晚飞机下方的那片城市将迎来短暂的平静。这可以算是她政治生涯中一次出色的发挥。\n\n“你觉得怎么样，安娜？等全国播出我的演讲，也许阿德马尔也能从中学到点什么。有时候——”\n\n“抱歉，副总统女士。据我所知，现场的摄影团队已经将录像卖给了一家私人新闻公司。”\n\n埃德娜只思索了片刻。这个做法比总统平常的手段更为隐晦。\n\n“我猜，那些记者和媒体人也被告知了类似的说法？”\n\n“是的——显然他们受到所谓‘新闻隔离’，理由是为了不‘激化局势’。”\n\n“可笑——看来真正被隔离的，只有一个人。”"
 brazil_adhemar.160.a: "将军——但还没将死。"
 brazil_adhemar.161.t: "直播处刑"
 brazil_adhemar.161.desc: "埃德娜·洛特对环球电视台的许多元素都深恶痛绝。主持人俗气的领带，主持人刺耳的嗓音，让她感觉在被审问的聚光灯，以及——那个主持人自身。但对现场观众，她怀揣的并非厌恶，而是恐惧。只要有一个问题回答不当，她就会登上《最后时刻报》的头版。\n\n“穿红色毛衣的那位女士，请提出您的问题。”\n\n“您能当上副总统，是否全凭前总统女儿的身份？”埃德娜用礼貌的微笑克制住情绪，再作答：“恰恰相反，在这个国家，军方支持不能帮你一步登天。”观众席爆发出零星笑声。\n\n“并不是，我先是经瓜纳巴拉州民选当上代表，然后才有资格去制衡那位圣保罗籍总统的‘善意’。”前排一名工作人员朝她点头。\n\n“您认为工党私下是否更希望古拉特或布里佐拉担任副总统？”\n\n“工党人才济济，我只是恰好成为副总统候选人，并且我确信获得了全党的鼎力支持。”又一个点头。\n\n“您难道不该在家抚养孩子吗？”\n\n“我的孩子们早已成人。我倒想反问您为何没在酒吧里灌啤酒？”观众席响起哄笑，连她的随行人员也加入其中。随着她接连回应更多支持性提问，批评声已然偃旗息鼓，而全国的电视观众正怀着敬意注视这一切。"
 brazil_adhemar.161.a: "机关算尽也阻止不了埃德娜走红。"
 brazil_adhemar.162.t: "暗箱操作"
 brazil_adhemar.162.desc: "埃德娜坐在办公桌前，拨弄着那封写给莱昂内尔·布里佐拉的信。信里内容不多，只是从最近一次闭门会议中精挑细选出的一段话，仅此而已。然而，在政治圈里，这些话就是子弹，而她就是那个军火商。\n\n向布里佐拉泄密，她从没想过自己会做这种事。说到底，“泄密”这个词本身就让她觉得肮脏、不道德、错误。\n\n可紧接着，她想到了阿德马尔。\n\n他最近提出的政策，又是一项将资源输送给老牌精英们的法案。让这种东西胎死腹中，难道不是好事？反击寡头集团，本就是对上层打击的最好方式。\n\n……\n\n“不道德？”她嗤笑了一声，对这个念头本身都觉得可笑。这可是阿德马尔。他最喜欢的就是在泥巴里打滚。这点手段，不过是以其人之道还治其人之身罢了"
 brazil_adhemar.162.a: "良心不能当饭吃。"
 brazil_adhemar.163.t: "拒之门外"
 brazil_adhemar.163.desc: "“你以为他们至少会准备一顿像样的饭菜，毕竟副总统可不是每天都来拜访的。”\n\n埃德娜刚从东北飞回落地，只在办公室的椅子上放松了一会儿，便立刻重新投入工作。\n\n“——不，别担心，你对接得很好，只是他们无能。安娜，后方情况如何？我需要这份报告参加下午4点的会议，和那个——”\n\n“抱歉，女士。他的办公室几分钟前刚打来电话——会议改期了，他们没有给出具体日期。”\n\n无奈啊，你永远无法把那个男人和他的权谋算计分开。当她在脑海中列出阿德马尔将要参加的其他会议时，她的秘书已经替她读出了答案。\n\n\"实际上，女士，我们刚刚收到了所有即将召开的重大会议的日程变动。看来我们之前与总统预约的所有会议都被重新安排了。副总统女士，未来三周内，我们与总统或其他任何内阁高级成员都没有会议，实际上这个月都没有。他的日程表也排满了——每次内阁会议之间的空档都有安排。\"\n\n埃德娜胃里涌起一阵寒意。原来这帮人是想这么做啊。"
 brazil_adhemar.163.a: "这孙子会看到他那些小把戏会招致什么下场的。"
 brazil_adhemar.164.t: "我知你知"
 brazil_adhemar.164.desc: "埃德娜站在书房的窗边，凝视着灰色的天空。这种天气总叫人捉摸不透——是要下雨吗？或许吧。会放晴吗？也有可能。\n\n当然，她不过是在拖延时间。此刻举国热议的焦点，以及人们期待她发表见解的，正是阿德马尔重启核计划的新闻。但紧闭的双唇让她无法开口，攥紧的拳头也令提笔变得艰难。\n\n埃德娜对阿德马尔的核野心并非毫不知情。多年来她早有揣测，数月前更是确认了端倪。可到头来，她却是和普通人一样从晨报上得知了这个消息。\n\n或许她曾自视特殊。或许她太过信任阿德马尔。又或许她天真地以为，那个男人至少会念及旧情，给她些许体面。\n\n此刻重读报纸，她脑海中勾勒的画像竟与报道分毫不差。照片里那个男人正站在锃亮的核弹旁微笑，炫耀着水下核试验的影像，活像狩猎归来的猎人展示战利品。\n\n她发出一声尖锐而苦涩的冷笑。"
 brazil_adhemar.164.a: "胆大包天的男人。"
 brazil_adhemar.165.t: "不祥之兆"
 brazil_adhemar.165.desc: "“福利扩张？”韦加尔问，“党内右翼我能镇得住，但全民盟对加大开支可不会手软。”\n\n“罗梅乌，你想得太多了。”阿德马尔把身子陷进椅背，双脚搭上办公桌，“民众不会因无从知晓的事受伤害。他们只知道我们在兑现承诺，而全民盟毫无作为——”\n\n“阿德马尔。”办公室另一端，埃德娜·洛特伫立在虚掩的房门边缘，犀利的目光如同要洞穿总统。\n\n“啊，埃德娜，我不记得这个时段有安排与你会面。”他目光短暂回落韦加尔脸上，眼神在后者与出口之间游移三回，最终促使这位副手无声离去。\n\n“约满了。内阁会议每个空档都满了：上周、这周、下周——我承认这屋子挤满人时确实热闹，但总统有的是空间带上二把手。”\n\n“你就为这事？”他故作镇定的微笑驱散了先前的不安，随手挥了挥，“埃德娜，至今你都干得挺好，我这总统当得也不赖。政府运转正常，巴西繁荣发展。你我之间——”油腻的笑容在她开口反驳时骤散，转而强装出与她对等的阴沉脸色，“无知者不受其害。这就是事实。”回应他的只有一声冷笑。\n\n“你独揽国政，我扮演花瓶，这叫运转正常？”她的嗤笑随着尾音愈显辛辣，“记着，这决不会有好下场。这也是事实。”她转身离去，硬皮鞋跟叩击木地板的哒哒声成了唯一的余响。"
 brazil_adhemar.165.a: "然而当阿德马尔的手匆忙抚上胸口，只感受到噗通噗通的跳动。"
 brazil_adhemar.166.t: "诡谲的未来"
 brazil_adhemar.166.desc: "眺望着曾经的亚马孙雨林，埃德娜·洛特脑海一片混沌。她并非博物学家，但对雨林，对大自然整体的认知已足够让她察觉异样。每走一步都犹如重重践踏；每次呼吸都似狂风呼号。核爆演示或许令人目眩神迷，可比不上这片笼罩在四公里地球之肺上的死寂更摄人魂魄。\n\n“埃德娜。”呼喊未及入耳。“埃德娜。”这回她骤然回神，终于寻到那个熟悉声源。“埃德娜。”\n\n“库比契克。”她转身面对他，努力驱散盘踞心头的核爆伤疤。“没想到你留下来了。”\n\n“是啊，这种盛况值得终生铭记。家里人都好？”\n\n“恩里克很好，孩子们也是。”她突然停顿，目光凝实声音转沉，“这种……毁灭城市的武器有好几万，我们却还要再耗费巨资制造更多？难道我们不比竞争对手强大？自卫无可厚非，但全世界仿佛都染上了集体自杀的癖好——我无法忍受自己成为帮凶。”\n\n他叹息着点头：“我深有同感。若要辩护，阿德马尔尽管千错万错，在这件事上他并不孤独：换作别人也会做同样选择。”\n\n“那我们都有罪。”霎时间，死寂再度降临。\n\n“不妨碍你沉思了。如果需要倾诉，随时联系。代我向恩里克问好。”他转身离去，而她继续凝望：凝望着弹坑，凝望着寂静，凝望着未来。"
 brazil_adhemar.166.a: "未来也在凝望着她。"
 brazil_adhemar.167.t: "江山易改…"
 brazil_adhemar.167.desc: "“真遗憾啊，副总统女士。”达·库尼亚抬头看着她说道，桌上散乱着各种文件。\n\n“何止是遗憾——这简直是耻辱。”她猛地扬起双臂，达·库尼亚点了点头。“阿德马尔把我们最优秀的人才送去和纳粹共席而食，这已经是太过分了，现在这些人遇上死亡威胁了，他又在这装哑了？”她顿了顿，坐回椅子上。“有时候我都怀疑，我们到底是怎么选出来这个人的。”\n\n“我也一样。”达·库尼亚说——站在外交部办公室门外的儒利奥也这么想。惩罚尚未降临到他和其他人头上；其实，到目前为止，几乎什么都还没有发生。尽管毫无疑问德国方面已发出一连串抗议，但高层所采取的行动，仅限于发布了一项通用的“保持沉默”的命令。正式的训诫与降职稍后才会到来。\n\n敲击木头的声音传来——他不知道是谁，也不在乎是谁。这声音让人心安，仿佛是在印证他那不确定的猜测：确实有人在认真关心这件事。他一开始听说埃德娜要求他到场时，他还拿不定主意，是该感到害怕，还是该顺从地接受。但随着谈话的推进，她变得愈发激动，而他则愈发抱有希望。最终，他将同僚的名字交给了她，也带着久违的希望离开了。\n\n门打开了。“我们会尽一切努力帮助你，儒利奥。”埃德娜握着他的手说道。\n\n“是的，”达·库尼亚补充道，“内阁很快就会再次开会，我们会让阿德马尔充分了解你的建议，这优先于一切其他事情。”说完，两人离开了。但当他们的声音逐渐远去，一个熟悉的声音取而代之——一个吼叫着，命令式的声音。\n\n“都给我回去工作！不然统统到我办公室来。”"
 brazil_adhemar.167.a: "他叹了口气，答应了下来。"
 brazil_adhemar.168.t: "…本性难移"
 brazil_adhemar.168.desc: "“阿德马尔。”埃德娜站在门口说道，达·库尼亚站在她身边。他们特意提早抵达，此刻她环视会议室，看到每一张空椅子时都略感几分满意——看到穆勒时则露出痛苦的假笑。\n\n“埃德娜，瓦斯科。”阿德马尔装作稍显愉快地招呼，“看到你们如此守时，是一件令人高兴的事。请坐吧。”\n\n“在开始之前，有一件非常重要的事情必须处理。达·库尼亚？”\n\n达·库尼亚立刻打开一份文件夹，逐条朗读那些巴西所谓的“劣等人种”在国外受到的冷遇与侮辱。读到最后，他用力合上文件夹，显得如释重负。\n\n“我们今天来此，是要为我们国家最优秀的人争取公正。”埃德娜说道，她眼角的余光瞥见了一件罕见的事：阿德马尔沉默地表示了认同。“正如我们对美国人提出的要求，我们同样要求德国人必须给予我们尊重，驱逐煽动者，而非凌驾于我们之上。”话说完，房间就陷入了沉默，好像没人愿意打破它。\n\n“恕我直言，”穆勒开口道，“你们今天提到的，净是些情绪化的东西和道听途说，靠这就想对抗我们多年精心斡旋的成果？老实说，埃德娜，如果这些话是别人说的，恐怕我已经认为这是叛国了。”他的话中满是讽刺，每个词都意在激怒她。但她面不改色。\n\n“够了。”阿德马尔坐直身体，表情变得冷峻坚定。“这些报告确实令人担忧，但我不会因此让国家失去方向。”他举起食指，制止了所有试图反驳的声音，“不过，梅迪西会展开一项调查。”说到这里，他对全场露出一抹狡黠的微笑，然后说出了埃德娜期待已久的话语。"
 brazil_adhemar.168.a: "“现在你们谁也不许再提这件事。”"
 brazil_adhemar.171.t: "自掘坟墓的总统"
 brazil_adhemar.171.desc: "帕拉州圣巴巴拉的风貌正如明信片上一般鲜活，宛如通往理想型郊区生活的迪士尼式入口。作为贝伦著名的自治城镇之一，其如画风光与鲜活民俗常被拿来与加利福尼亚同名的海滨小镇相提并论。这种词源上的巧合在全世界葡语和拉丁语系地区屡见不鲜，因此贝伦的这座圣巴巴拉被特意冠以“帕拉州”的前缀。\n\n这正是埃德娜·洛特选择此地开展竞选活动的缘由。这位工党领袖携代表团来到这座多彩的北部小镇，试图争取更多中产阶级选民的支持。上午时分，他们穿梭于镇中心，会见地方要员，在镜头前摆出亲民姿态。千篇一律的政治作秀在午后暖阳中上演，路过的镇民们报以微笑，构成最熨帖的背景幕布。\n\n然而某幅荒诞景象令这位素来持重的反对派领袖蓦然驻足，险些当街失笑。“快看！”她脱口而出，几乎不敢相信眼前所见。阿德马尔素来不乏荒唐之举，但眼前这出即便以他的标准也堪称登峰造极。\n\n林荫道旁原本白净的墙面上，赫然张贴着现任总统的宣传海报。画幅中，阿德马尔与巴西史上最受尊崇的领袖们并肩而立——热图利奥·瓦加斯、儒塞利诺·库比契克，甚至还有埃德娜自己的父亲、陆军元帅恩里克·洛特。在阿德马尔的肖像下方，赫然标注着“伟大巴西的伟大共和国的伟大缔造者”。这般幼稚浮夸的民族主义叙事，活似出自孩童之手笔。\n\n当埃德娜意识到这并非讽刺漫画时，某种荒诞感油然而生——选举季尚远，他的任期亦未终结，可这番自我标榜为巴西政坛遗老的举动，倒像是在替她的政党完成攻讦对手的工作。"
 brazil_adhemar.171.a: "偶尔享受一下刻薄的乐趣也未尝不可……"
 brazil_adhemar.172.t: "熟悉的基石"
 brazil_adhemar.172.desc: "“你肯定没有意识到，你在这儿有多冒险？”萨穆埃尔·魏纳搅动着杯中的咖啡。\n\n“我们也许都在冒险。”埃德娜·洛特把头发理到一侧，“除非我们做出反应。”\n\n魏纳眨了眨眼，这是要来真的？“他在和谁见面？”魏纳从桌上拿起一个活页夹。\n\n“首先是米纳斯吉拉斯州，下午去马场见牧场主。”埃德娜一动不动地坐着，眼神中透露出远见的神情。\n\n“那……再接下来呢？”魏纳问道。\n\n“圣保罗。”\n\n魏纳又眨了眨眼睛：“和谁？”\n\n埃德娜·洛特没有回答。\n\n魏纳的目光游移不定起来，显得忧心忡忡：“……咖啡男爵？”\n\n埃德娜双手一前一后搭在膝盖上，双拳紧握，关节发白。\n\n“……还有……还有更多的会议。”这不是个问句，魏纳自己也听到过这样的话，他的肚子一下子有点不舒服。\n\n埃德娜向前倾了倾身子：“当然，你知道这看起来像什么？”\n\n“为什么来找我？”魏纳的声音几乎要支持不住了，他实在是太过震惊。\n\n“为了我的国家和你的国家，阿德马尔似乎很少有这种同感。”\n\n“或者说他的同感有点太多了。”魏纳把活页夹撂在桌子上，抓着鼻梁，抽噎起来。\n\n“尽你所能，把消息散布出去，但上帝保佑，一定要小心。”埃德娜站起来，扶正了眼镜。\n\n魏纳叹了口气：“我不能创造奇迹，但我会尽力帮忙。”\n\n临走时，埃德娜转身面向他："
 brazil_adhemar.172.a: "“你生活在属于上帝的国度里，这片大地本身就是活生生的奇迹……还有什么能比它更美好呢？”"
 brazil_adhemar.173.t: "魔鬼的霜降"
 brazil_adhemar.173.desc: "“帮我个忙。”\n\n这句话让埃德娜·洛特震惊不已。阿德马尔继续道：“我知道你公务缠身，也清楚你的选民对我并无好感，但我还是希望能与你谈谈，哪怕一小会儿。”高原宫的空气中弥漫着悔意，这位素来咄咄逼人的德·巴罗斯总统此刻在她面前展现出罕见的礼数，那些她早已习惯的、不加掩饰且欲盖弥彰的傲慢态度似乎都已随风消散。\n\n“太阳打西边出来了？”埃德娜回应道，语气中透着一丝怀疑，“还以为您不屑过问女性群体的事，阿德马尔阁下。我知晓社进党最近推行的改革议案——恕我直言，真是天方夜谭。”她用指尖推了推眼镜，“扬戈任上可没见您有这般跨党派合作的热情。”\n\n“你该给我些信任，我可以保持公正。”阿德马尔带着扭曲的冷笑应答，防御意味十足，“我们不必像律师般互相担保。况且若我没记错，我党纲要中的改革条款与你们的诉求不谋而合，而这些正是扬戈当年所支持的。”\n\n“这点您倒没说错，看来您已经不是头一次逆流而行了。”——但愿德·巴罗斯的标新立异别自成流派才是——“确实是个惊喜，总统先生。若社进党愿诚心合作，工党必将予以回报。这对我们两党而言都是莫大的机遇，愿上帝保佑我们能借此成就更多。”德·巴罗斯与洛特彼此握住对方伸来的手，随后各自拨出一连串电话。"
 brazil_adhemar.173.a: "埃德娜只能压制那股厌恶，既是为了党，也是为了自己的理智。"
 brazil_adhemar.174.t: "驯服暴风"
 brazil_adhemar.174.desc: "计时器上还剩45分钟。埃德娜气得要跺脚了，只有那张暗褐色的桌子挡住了她焦躁不安的身体动作。这张桌子和她那些该死的同僚一样死板，他们早该因为应该的忠诚而站到她这边了。她叹了口气，又一次开口。\n\n“各位朋友，”她的声音陡然响起，“这项法案是我们唯一的机会，错过就不可能再有了。土地改革不可能靠全民盟那帮人，也不可能靠库比契克的财团。它只能靠我们，至少我们工党必须为农民发声吧。”\n\n桌子另一头传来一声低语，“古拉特的法案更好，我看我们得支持他。”随即响起一阵掌声与附和的窃窃私语。这帮人幼稚的简直不如木偶剧。\n\n“古拉特的法案又没法通过，那你们支持了个什么？”她脱口而出反驳，比大脑运转还快。屋子后排的人一时愣住了。“我们都承认古拉特的法案很好。但如果我们得不到最好的，至少得争取一个相对好的方案吧。”\n\n质疑随即像洪水决堤一样涌来：“你怎么管得住佃农制？”——他们会去找阿德马尔谈的。“阿德马尔凭什么为我们做事？”——因为我们是一个执政联盟？“你得代表党派的利益，埃德娜！”——党派不是暴民，民众有权利持不同意见。“你连耶洗别都不如！”\n\n整间屋子都因这句话而错愕；看来还没彻底失去体面。然而每当她的同僚因选民的怒火而指责她时，他们对她本人的畏惧也在加深。一开始的公开反叛，此刻已沦为些翻阅纸张和椅子摩擦的声音。\n\n还剩11分钟。多数票已稳。这位耶洗别依然是她王宫中的女王。"
 brazil_adhemar.174.a: "半小时之内搞定。"
 brazil_adhemar.175.t: "进步女性"
 brazil_adhemar.175.desc: "阿德马尔低头看向自己的办公桌，此刻才惊觉自己已纹丝不动地静坐了数分钟。方才的沉思竟然如此投入？他挺直腰背，双手按在光滑的桌面上，努力收束着即将再度漫游的思绪。\n\n记忆中浮现起与埃德娜的对话。那个固执的女人坚持要法定带薪产假。但事实上，无论男女，埃德娜都代表着某些典型的“进步派”主张。当有人视之为资源浪费时，她却将其看作对家庭的投资。\n\n“家庭投资……”他轻声复述，这个词汇在唇齿间流转出美妙的韵律。这类政策能提高生育率，而更多人口意味着更强大的国家。见鬼，说不定他的肖像还能挂在那些因他英明决策得以降生的人们家中——\n\n那种对静止的敏锐感知再度袭来。阿德马尔十指交叠，绷直脊背。即便渴望冠名这项政策，现实却不允许。纵使提案出自埃德娜之手，也值得全力推进。\n\n他向来睿智。未来定能酝酿出更多、更精妙的点子。这次，就让她摘得头筹吧。"
 brazil_adhemar.175.a: "真是大方。"
 brazil_adhemar.176.t: "守在收音机旁"
 brazil_adhemar.176.desc: "“亲爱的巴西同胞们，”阿德马尔开始对着数千名满怀期待的民众发表演讲，“我必须感谢大家一直以来的支持，我对你们感激不尽。”他将手放在胸口说道。\n\n“然而，似乎有些人对我不太满意，我说的可不是我的政敌。我说的是眼皮子底下的威胁。我说的是那些所谓的社进党‘党员’，如果还能这么称呼他们的话，”他轻蔑地哼了一声，接着说道，“他们不断给我添堵，拆散他们宣誓效忠的政党！”一想到社进党的党员竟然和他们的领袖作对，人群中便响起了嘘声。\n\n“也许他们去全民盟会混得更好呢。”人群爆发出一阵笑声。“我只是开个玩笑，但这些人跟当初抛弃瓦加斯的是同一类人。就在我为国家殚精竭虑的时候，这些骗子却耍同样的花招坑我。不过，我可不会轻易认输！”阿德马尔向空中挥舞着拳头，人群中爆发出阵阵欢呼。\n\n坦克雷多在收音机旁全神贯注。阿德马尔吹嘘自己的功绩，还把自己描绘成瓦加斯第二，这招已经取得了不小的进展。不过，他可不会就此罢手。坦克雷多心里清楚，阿德马尔肯定还会有更多的动作。"
 brazil_adhemar.176.a: "磕碜点的瓦加斯也还是瓦加斯。"
 brazil_adhemar.177.t: "重返课堂"
 brazil_adhemar.177.desc: "由各界代表、记者及其他要人组成的代表团穿过走廊时，就连阿德马尔的反对者也不得不承认眼前所见。\n\n这所由阿德马尔筹款修缮的学校窗明几净，现代化的设施里坐满了新入学的和重返校园的学生。最小的孩子们正根据指导教师采用的全新标准化教学方案学习识字，进度良好。有些孩子甚至和年长的兄姐同堂学习（不过总体上表现更出色），而这些重返校园的青少年正是为弥补阿德马尔政策推行前错失的教育机会。\n\n其他教室里，年龄稍长的孩子们正在学习数学，许多人同时还修习其他科目。当然，鉴于年幼天性，不少孩童在下棋嬉戏，但整座校园焕发的生机毋庸置疑。开始有记者询问孩子们未来的梦想。大多数人要么尚未想好，要么给出寻常答案。\n\n唯有一个聪颖过人的小男孩格外引人注目。被问及时，他斩钉截铁地回答——要成为像阿德马尔总统那样的医生。"
 brazil_adhemar.177.a: "显然是最佳选择。"
 brazil_adhemar.178.t: "国会中的混乱"
 brazil_adhemar.178.desc: "随着国会大屏幕上显示最终投票结果，获胜的社进党代表们起立庆祝。阿德马尔在预留席位上静静观察，不禁露出一抹浅笑。这一结局终究令人满意——至少对他而言如此。\n\n坎波斯及其全民盟小团体愤怒地咆哮着，眼睁睁看着社进党与全民盟握手言和，却对已成定局的结果无能为力。他们高喊，这面前的“勾结行径”等同于将共产主义引入巴西，而竭力阻挠一切恢复会议秩序的措施。\n\n无党派人士、基督教民主党和小党派代表因不愿卷入纷争而离场，议长维持秩序的尝试徒劳无功。坦克雷多与社民党代表团尝试施以援手，却收效甚微——这份骚动持续至深夜，直到休会方告终结。\n\n然而，法案终究是通过了。"
 brazil_adhemar.178.a: "乱成一锅粥。"
 brazil_adhemar.179.t: "国会中的混乱"
 brazil_adhemar.179.desc: "随着国会大屏幕上显示最终投票结果，获胜的社进党代表们起立庆祝。阿德马尔在预留席位上静静观察，不禁露出一抹浅笑。这一结局终究令人满意——至少对他而言如此。\n\n布里佐拉及其工党小团体愤怒地咆哮着，眼睁睁看着社进党与全民盟握手言和，却对已成定局的结果无能为力。他们高喊，这面前的“勾结行径”等同于将资本主义寡头制引入巴西，而竭力阻挠一切恢复会议秩序的措施。\n\n无党派人士、基督教民主党和小党派代表因不愿卷入纷争而离场，议长维持秩序的尝试徒劳无功。坦克雷多与社民党代表团尝试施以援手，却收效甚微——这份骚动持续至深夜，直到休会方告终结。\n\n然而，法案终究是通过了。"
 brazil_adhemar.179.a: "乱成一锅粥。"
 brazil_adhemar.180.t: "国民议会中的混乱浪潮！"
 brazil_adhemar.180.desc: "议会大屏幕上宣布了最终投票结果，获胜的社进党议员们起身庆祝，阿德马尔则在办公室里观看实时转播，皱着眉头喝光了小酒壶。\n\n社进党议员们试图在“混战”中登上讲台，却被全民盟和工党的对手用身体压住了。社进党发不了言，麦克风里时不时传出咒骂声和各种愤怒的言论。他们显然非常愤怒，议会大厅越来越混乱，议员们的肢体动作越来越夸张，很快。他们就开始向众多联合起来的敌人投掷手边能抓到的所有东西。\n\n而敌人呢，很快就联合了起来，社民党、基民党以及一些无党派人士和小党派结成同盟，将坦克雷多和议长团团围住，将他们护出了会议厅。最终，随着倾泻愤怒的对象被带走，会议也就此结束，他们的怒火燃烧殆尽，随即便烟消云散了。\n\n但失败依然挥之不去。"
 brazil_adhemar.180.a: "真是太糟糕了。"
 brazil_adhemar.181.t: "去机构化的“决策”！"
 brazil_adhemar.181.desc: "了解总统的人都清楚，这天的内阁议程并非真正意义上的“决策”，而是一场“说明”。毕竟，决策早已确定了——但流程还得走一遍。所以，戏照演。\n\n阿德马尔尤为重视的一个议题，是推行精神卫生领域的去机构化政策，即相较于长期关押，更注重通过药物和心理治疗来治愈精神病患者。这个议题引发了激烈的“辩论”。很明显，总统的亲信以及纳特尔都支持该政策，他们一如既往地与总统步调一致，清楚权力场上的游戏规则。而其他人，则没那么清醒。\n\n最难搞的是费林图·穆勒。为了说服他，总统给他看了一份长达五十页的简报，又亲自讲了二十分钟的道理，穆勒才终于让步，而说服一些其他非专业出身的人耗时更久。更令人惊讶的是，甚至有几人顽固于自己的立场——这导致了总统极为严厉的反应。\n\n直到傍晚，连总统最铁杆盟友都早以为他会失去耐心的时候，他终于停止了讨论。非常罕见地，他表现出了不耐烦，用一句短短的话结束了一切。他表明，这项政策将坚定推进，所有人都必须予以支持。\n\n别无选择。并且很快，任何异议都将被压制。至少表面如此。"
 brazil_adhemar.181.a: "他们在期待什么？"
 brazil_adhemar.182.t: "精神医疗改革，但是从心理上"
 brazil_adhemar.182.desc: "这将是巴西医院真正的转折点——至少摘要是这么写的：阿德马尔总统提出的远见卓识的政策，只是轻轻调整了官僚体系的齿轮，就在医疗服务的交付上带来了奇迹。去机构化政策真奏效了，而说实话，以往历届政府居然没能想到这一点，简直是一种耻辱。\n\n“你会有这种想法，我是能理解的。”副总统的老同学——同时也是一名精神科医生——一边解释，一边将粗糙打印的报告摊在两人之间，“如果你没看报告的后半部分的话。那些数据确实支持总统想要传达的结论。但你要是细读了小字部分的话，讲真……令人震惊。”\n\n她指了指第二部分的一张表格。每一个按照总统提议将患者转入社区医疗体系的部门，确实都显示出了更好的治疗效果，也减轻了精神科病房的压力。但成本并没有降低——它们只是被转移了。不是转移给能负担得起的人，但联邦政府就少了一份责任。\n\n埃德娜翘起了腿。她不得不问自己，那人到底知不知道这些情况？还是说，只是想轻松拿下一场胜利，回家舒舒服服看看杂志？他从来不是个会仔细研读报告的人。再想一想，也许关键根本不是“知不知道”，而是“在不在乎”。记者们一走，他还会关心医院的未来吗？对她而言，答案其实也无所谓了。她早在踏上国会那道台阶时，就把原则卖掉了。\n\n她突然笑出声来，那笑中夹着痛苦。坐在她对面的朋友还在等待她的回答，困惑地望着她的神情，以及她正在凝视的那个陌生的自己。"
 brazil_adhemar.182.a: "政治中的改变，并非创造，而是变异。"
 brazil_adhemar.183.t: "肿瘤科舞台"
 brazil_adhemar.183.desc: "路易斯向来以现实主义者自居，其次才是全民盟成员——这个顺序至关重要。肿瘤科的钢笔、书籍与书架，要么是他自掏腰包购置，要么来自某位阔绰捐赠者（尽管两人已数年未曾谋面）。他总说这里是巴西，树上能结出各种奇珍异果，唯独长不出钞票。科研事业只能自谋生路。\n\n然而今日，他的信念正遭受考验。校长用雷鸣般的嗓门和溢满笑容的脸迎接他——这本身便值得警惕。大学里的权贵们素来被丑闻缠身，容不下半分光明。但此刻确有值得庆贺之事：圣保罗大学肿瘤科与放射科将获得建校史上最大幅度的经费增长。\n\n他卸下心防，任由浪漫的未来主义击溃了现实主义。刹那间，他仿佛已握住崭新的日立影像设备，斑驳木桌被现代化办公桌取代，身边簇拥着专业团队，研究报告与精准检测如潮水般涌来。有那么一瞬，所有愿景触手可及，他即将凭一己之力让这座城市成为癌症研究版图上的新坐标。\n\n“别急，先别高兴太早，”校长晃动着文件咂舌道，“总统可不会拨款给那些质疑新政的恨国党。”路易斯涨红着脸编织出几句官僚腔的恭维话。待校长享受够逼迫全民盟成员向阿德马尔俯首的快感后，突然大笑揭晓了真正条件——谢天谢地，尚在可承受范围内。\n\n若非多年楼里楼外的交情，路易斯早该为这场恶作剧挥拳相向。但当他再度平静下来时，突然意识到一个令人愉悦的事实……"
 brazil_adhemar.183.a: "……该感谢的是阿德马尔体内的癌细胞，而非他本人。"
 brazil_adhemar.184.t: "开放日"
 brazil_adhemar.184.desc: "与周围那些古旧的建筑相比，这所新建的学校仿佛是被意外遗落在圣保罗乡间的异类。它太过现代，也太过精美。墙壁柔和的暖色调让孩子们想起父母珍藏的昂贵餐盘，那些总被锁在橱柜深处的瓷器。事实上，这栋建筑的设计如此具有亲和力，开放日当天大多数孩子居然全程留在教室里参观，而非像往常那样迫不及待冲向操场。\n\n与此同时，家长们正为新教室、新课桌、新书架惊叹不已。他们大半辈子都在使用别人淘汰的旧物，因此觉得这些设施简直是在娇惯下一代。但转念一想，关乎孩子未来的事又怎能吝啬？几位父亲伫立在宽敞的玻璃窗前，望着男孩们在簇新的足球场上追逐皮球，眼底不自觉地泛起一丝艳羡。\n\n眼见家长与孩子们都露出满意的神色，神父便开始了祝圣仪式。他身披法衣穿行于一间间教室，身后尾随着一队好奇的小尾巴。双手捧着的圣水钵微微倾斜，黄杨枝洒水器轻扬，晶莹的水珠便沿着墙壁蜿蜒而下。\n\n每间教室都悬挂着阿德马尔的肖像（这是当地传统）。孩子们并不认识画中人，但从父母谈论他时的语气判断，这位先生必定是位大人物。此刻，几缕圣水正顺着画中人的笑脸滑落，在画框玻璃上折射出银色的水痕。"
 brazil_adhemar.184.a: "不用谢我。"
 brazil_adhemar.185.t: "信任，但要核实"
 brazil_adhemar.185.desc: "与先前剑拔弩张的氛围截然相反，高原宫此刻意外地融洽。小阿德马尔·德·巴罗斯对埃德娜·洛特的礼遇既出人意料又令她受用。二人相对而坐，埃德娜正向其讲解工党拟推行的教师教育改革方案——这项政策旨在弥合近年来由眼前这位绅士亲手扩大的教育鸿沟。\n\n即便此刻，这位社进党领袖突如其来的合作姿态仍显古怪。对于他们这类政治实用主义者而言，劳工权益素来是嗤之以鼻的议题，此番示好着实反常。转念间，埃德娜想起对方弃医从政的经历：或许正如她本人一般，阿德马尔对教师群体的关切确乎源于医者仁心。\n\n“你保证贵党愿与我方共享提案？立法程序能够顺利推进？”阿德马尔掌心轻按桌面倾身询问，将她的思绪拉回现实。\n\n“请相信我的诚意，阿德马尔。”她目光中藏着狡黠，“来此会谈看似离经叛道，但我的当选自有其使命。”尾音不自觉地加重，仿佛在暗示对方当选纯属侥幸。总统阁下的反应难以捉摸——他正用手指抵住太阳穴，薄唇噙着讥诮的弧度。老狐狸，可别这时候摆架子啊。\n\n“恕我失言，总统先生。”埃德娜扶正眼镜生硬点头，“无需杞人忧天，议案必定顺利通过。”阿德马尔指尖轻点唇畔，挑眉间讥笑化作春风。"
 brazil_adhemar.185.a: "埃德娜的笑容少了些勉强。"
 brazil_adhemar.186.t: "关于教育的授权指令"
 brazil_adhemar.186.desc: "官员们聚集在一起，等待惯常姗姗来迟的教育部长，他们知道接下来会发生什么：一场纯粹的白痴表演。\n\n他们没有失望。\n\n教育部长首先介绍了一大长串政策，用图表的形式向所有人展示。计划清晰明了，条分缕析，而且，官员们都注意到，它几乎与社进党的竞选宣言完全一致，但没有人戳破。当然，部长也对此只字不提，他坚持认为这些政策在实践上是合理的，而且直指当代巴西教育系统所面临的问题。\n\n午餐后，按程序，官员们本应受邀提问并提出建设性的批评意见，但在部长的坚持下，最终并未开会。显然，部长笃定计划完美无缺。对此，官员们面面相觑，默默以职业人士特有的、众所周知的方式表示了同意。达成执行条目后，部长很快就离开了，把执行权交给了“能干的人”。\n\n稍后，他们就会互相抱怨诸多政策的低效和欠考虑之处。"
 brazil_adhemar.186.a: "敬未来的成功！"
 brazil_adhemar.187.t: "笑容的源头"
 brazil_adhemar.187.desc: "“这是……”他忍不住脱口而出，揉了揉眼睛，又仔细看了眼手里的工资单。真的，但这份薪水远超过一名普通学校教师应有的数额。“有了这笔钱——”他大脑飞速运转，“说不定真能活得像个人样了！”\n\n视线从那张不可思议的工资单上移开，扫过这间被他称为家的陋室里寒酸的家具——它们很快就能被替换成让屋子亮堂起来、让自己嘴角多上扬几厘米的新物件了。或许还能添置些像样的家电！再不用把单独买个漂亮盘子当奢侈享受，这回能直接换整套餐具！\n\n再度将目光扎进工资单时，线索突然串联。“校长说的‘阿德马尔调整薪资’原来是这个意思！现在我知道该买什么了——酒！”他浮想起那些隔着橱窗望过多少回的华美酒瓶，旋即又被残酷的标价拽回现实。不过买瓶便宜的倒也无妨。\n\n他继续琢磨着列出第二项：一本书。等这周课程结束，就去买瓶酒挑本新书，好好……放纵那么一会儿。想到能痛快畅饮就已舒坦至极，得记得给阿德马尔敬一杯。要是还能读上本新书？那可真是……"
 brazil_adhemar.187.a: "源头就在这儿了。"
 brazil_adhemar.188.t: "感恩与回报"
 brazil_adhemar.188.desc: "校董事会那次会议堪称一场庆功宴。阿德马尔总统近期颁布的针对私立教育机构减税的政策，让他们支离破碎（且未上报）的预算起死回生，更为那些拥有学校股份的人创造了可观的营利空间。\n\n当然其中还有更深远的益处。政策拓宽了巴西家庭与学生的教育选择面，私立教育投资得以避开税收压力精准投放。对校董会这样的既得利益者而言，这是长期游说征程的圆满收官——自然，这份圆满也属于他们名下的学生们。\n\n席间董事们开始筹谋如何进一步扩大战果。有人提议，阿德马尔总统既是新政推手，就该极尽所能向其示好。众人附议之下，关于悬挂巨幅总统肖像的选址讨论随即展开。这既能彰显谢忱，或许还能换来总统亲临揭幕的绝佳宣传契机。\n\n若真能实现，谁知道还能撬动多少隐形的红利。"
 brazil_adhemar.188.a: "机会比比皆是。"
 brazil_adhemar.189.t: "倒酒，举杯，敬成功"
 brazil_adhemar.189.desc: "教育法案成功通过，庆祝活动也该提上日程。果不其然，阿德马尔总统主持了一场仅限受邀者参加的晚宴，出席者包括埃德娜·洛特及其最核心且忠实的支持者。\n\n场面极为盛大，期间二人来回走动，握手致意，表达谢意，分派恩惠，种种熟悉的政坛应对表现得淋漓尽致。这是一场精湛的表演，既是法案得以通过的缩影，也向在场众人证明了他们所支持的阵营无比正确。\n\n临近尾声时，阿德马尔与埃德娜提议共同举杯。酒杯在彬彬有礼的掌声中一次次举起——为法案的成功通过而干杯，这自然离不开在场诸位的鼎力相助；为巴西教育必将迎来的辉煌未来而干杯；最后，为彼此的健康干杯。\n\n最后一项致意引来了雷鸣般的掌声。"
 brazil_adhemar.189.a: "重点很明确。"
 brazil_adhemar.190.t: "回味无穷"
 brazil_adhemar.190.desc: "阿德马尔放下那杯卡莎萨，在皱巴巴的国会公报上压出又一片濡湿的酒渍。半瓶烈酒下肚，他布满血丝的双眼勉强聚焦在粗体标题上——《埃德娜教育理念法案流产》。\n\n他晃动着手中暗琥珀色的酒液，玻璃杯比今晨拿起时沉甸甸许多。又抿一口，灼热的液体烧过喉咙，最终沉入胃里那口苦井深处。他伸手去够酒瓶。\n\n埃德娜早前来过，拍拍肩膀给了他一句安慰话，承诺“这不是终点”。他回敬了一杯酒，她谢绝了。\n\n此刻独处，阿德马尔仍凝视着杯中暗色液体，活像个酗酒版的茶叶占卜师。支持她是否太蠢？整场合作难道只是场糟糕的赌局？而他可愿承认？无论甘不甘愿，他的名字已与这场失败绑定在一起。\n\n从卡莎萨里求不到答案，他又饮一口——让酒杯抵着嘴唇，停留得略久了些。"
 brazil_adhemar.190.a: "可太苦了。"
 brazil_adhemar.191.t: "举杯庆祝"
 brazil_adhemar.191.desc: "从许多方面来说，政治家与教师其实颇为相似。有时候必须费尽周折，才能让人们去做正确的事。值得庆幸的是，今天无需这般大费周章——《巴西教育促进法案》已获通过，此刻阿德马尔正与社进党代表及教师工会高层们共庆胜利。\n\n总统高举酒杯，琥珀色的酒液折射着烛光，他满面春风地环视着随行人员。通过这样一项法案，可不只是为了在报纸上博得好名声。不，这对他而言意义非凡。正是教育塑造了今日儒雅博学的阿德马尔，若剥夺他人同样的机遇，未免太过残忍。\n\n“为进步干杯！”他擎起酒杯朗声道，“为现代化、高素质、文明开化的巴西干杯！”\n\n霎时香槟杯盏如林而立，众人齐声应和。\n\n待他祝酒完毕，罗梅乌·德·坎波斯·韦加尔举杯致意：“敬阿德马尔——是您让这一切成为可能！”\n\n“说得对！”教师工会主席慌慌张张地重新举起酒杯，“敬阿德马尔！”\n\n阿德马尔胸腔里荡开阵阵笑声。天呐，他多么迷恋这般滋味——那饱含敬意的目光，备受尊崇的地位，以及亲手塑造历史的澎湃心潮。"
 brazil_adhemar.191.a: "可太甜了。"
 brazil_adhemar.192.t: "幸灾乐祸"
 brazil_adhemar.192.desc: "“在今天的会议上，由阿德马尔·德·巴罗斯提出的‘兑现承诺教育法案’未能获得多数支持——”\n\n埃德娜双手放在腿上，听着收音机沙沙作响的播报声。最终，她让自己的意识将广播里主持人平淡的声音隔绝了出去，正播报的这些事情她早已了解了。此刻她脑中只剩下一种发钝的嗡鸣声，就像收音机调到了一个没有信号的频道。\n\n她本该感到点什么——一些更强烈的情绪。宽慰？满足？还是说“幸灾乐祸”？毕竟，这件事是阿德马尔坚持要单干的。她曾警告过他，也提出过合作。可他听了吗？没有。\n\n然而，她并不高兴——真的不高兴。教育改革是必需的，他们对这点心知肚明。但阿德马尔的拒绝合作，让这件事一开始就注定要失败。这个道理，他们也一样心知肚明。\n\n埃德娜向后一靠。她仿佛能看见阿德马尔此刻的模样：一个人坐在办公室里，郁郁寡欢，喝着酒，说服自己这一切都是制度在与他作对。他会从中吸取教训吗？他现在会来找她，承认她当初说得对吗？"
 brazil_adhemar.192.a: "而那又有什么用呢？"
 brazil_adhemar_endgame_survival.18.t: "设计谢幕"
 brazil_adhemar_endgame_survival.18.desc: "就连那张办公桌也不一样了。阿德马尔·德·巴罗斯在自己的座位上不断地改变姿势，调整自己的视角，把办公室里的一切和他住院前的状态进行对比。地毯，桌上的灰尘，以及窗外的景色，所有的一切都让他感到了陌生，而这种陌生感让他燃起了无名火。还有那扇可恨的窗户。在他看来这扇窗户也是新修的，他敢打包票自己没看走眼，但当他想撑起身子看一眼时，膝盖立刻发软，整个脊柱都开始不断颤抖，随后又重重的摔回椅背上。\n\n桌上新的月历册没能消解他内心的困郁。这位总统知道他不可能永远的待在这栋总统官邸中。显然，不管怎样，那些政客都会把他赶出这，哪怕他只是因为生了病。而他再也没有时间去等待所谓的天赐良机了，他现在必须赌上一切去应对危机，错过现在就永世不得翻身。无论如何，史书都会记载下他的作为，那阿德马尔要让他们最好按着自己的要求来写。\n\n他一直打算推行一项社会福利政策。人们都知道他是个贪污犯，这最后会给他带来很坏的影响，而当他们看到贪污犯也会去回馈造福社会时，所有人肯定会改变这样的想法。即使是他的总统任期因为疾病而被粗暴的中断之后，他还是不禁对整个医疗体系和拯救了他的生命这一事实心怀感激。阿德马尔将会用其他政府做不到的方式来推行自己的医疗保障政策，而民众也会因此改变对他的看法，并以此来铭记他。\n\n没错，他最后不得不卸任，就和所有的总统那样，他也终有一死。但此刻，他有着独一无二的权力来决定世人是如何看待和铭记他。就像任何优秀的商业家所深知的那样，这样的权力是不能随意挥霍的。"
 brazil_adhemar_endgame_survival.18.a: "让病弱者康复。"
 brazil_adhemar_endgame_survival.19.t: "老傀儡师"
 brazil_adhemar_endgame_survival.19.desc: "阿德马尔双眼紧闭，大脑思绪一片空白。难道从此以后，每天都会如此，直到他再次被紧急送往医院吗？就连那些该死的秘书们也对他冷淡相待。或许这只是他的幻觉，或许他只是需要……\n\n门缓缓打开。“总统先生，欢迎归来。”埃米利奥·加拉斯塔苏·梅迪西信步走进来，低沉的嗓音坚定而有力。他站在桌前，片刻停顿后，然后无奈地伸出了手。尽管他的领导无法站起来，但梅迪西依旧面带微笑并主动握手。\n\n“我之前收到了您关于大型项目的简报，”这位严厉的老军人缓缓说道，“总统先生，我一直钦佩您的勇气，但我想我无需再提醒您，军队的首要任务是保卫巴西免受外部威胁，而现在这些威胁是来自南方国家以及来自被冒犯的超级大国的。”\n\n这个混蛋也是个有十足的勇气的人，阿德马尔暗自思忖。没错，他现在或许身体虚弱，但这并不意味着他会心胸狭隘。他一定会如往常一样得到他想要的东西。\n\n“如果我不明白这一点，我就无法履行好我身为总统的职责了，将军。但我得说，我这次向你以及你的部下所提出的这个项目，其价值绝对远超你的想象。而最后报酬由你来定，我的朋友。”\n\n像往常一样，在达成交易时，梅迪西都保持着那种若有所思的神情，仿佛第一次没听到他说的话似的，直到最后才勉强挤出一丝苍白的微笑。“好吧，我想我可以重新安排几位工程师的工作。正如你所说，我会在适当的时候确定这个报酬数额的。”\n\n阿德马尔暗自笑了笑。他本人无法与这个人抗衡，但他仍然能够让他们所有人按照他的吩咐行事。他很高兴看到至少军队还没有发生什么变化。"
 brazil_adhemar_endgame_survival.19.a: "这位老人还能舞动他的傀儡丝线。"
 brazil_adhemar_endgame_survival.20.t: "来自日本的爱"
 brazil_adhemar_endgame_survival.20.desc: "虽然头昏目眩，心口发烫，但阿德马尔还是强打起精神，在国会宫那如同精心布置的电影场景一样的会场中做好了登场的准备。自从他初掌圣保罗市政大权以来，从未有过如此恶心和痛苦的感觉。但此刻正是他最后做出改变他政治生涯的时候了。毕竟，他还有多少时间呢？也许只是几天，又或许是几个月。之后，珍珠之门（天堂大门）就会向他敞开，而且它不会有所偏袒。\n\n阿德马尔的保镖们一允许，新闻团队就蜂拥而入国家宫内。在一阵略显紧张的停顿之后，阿德马尔开始照着稿子念道：“巴西是一个崇尚正义和平等的国家，她从未要求人民为她付出什么。相反，她无条件地提供了众多自然资源，无论是给最富有的富豪还是最底层的贫民。”\n\n短暂的停顿之后，他再次将目光转向镜头。“将那些与我们同样善良，只是出身日本的人拒之门外，这不是对上帝意志的违背吗？几十年前在里约会议上，我曾为日裔移民的团聚权利而努力争取——我的许多同事对此持不同看法，但事实是，勇敢正义的社进党一直都是推动进步的力量——\n\n“因此，我，阿德马尔·德·巴罗斯，现在请求广大民众支持道德多数派来废除对我们日本朋友的移民禁令。”一阵短暂而不安的寂静随之而来——地板嘎吱作响，摄像机发出哔哔声，他在演讲结束前，在一片矛盾的观众中有人低声说道。"
 brazil_adhemar_endgame_survival.20.a: "无利不起早。"
 brazil_adhemar_endgame_survival.21.t: "沙粒"
 brazil_adhemar_endgame_survival.21.desc: "无菌的灯光将夜色逼退，至少在这一刻守住了阵地。大型机器在职责的束缚中发出低鸣，环绕着那具受损的躯壳不断分析、记录、打印。白大褂们将每份报告抓在手中，语速快得像倾泻的瀑布，在科室间奔流不息。病床上闭目的患者躺在冥河此岸，正是这一切躁动的源头。\n\n河岸与病房之外，他的家属正经历另一种煎熬。悬空的腿神经质地抖动片刻，又起身来回踱步，最终跌坐回座椅开始新的循环。她强迫自己的感知进入慢镜头，好让时间的沙漏能流得更快些。这具凝固的身影宛如被困在时光沙漠中的雕像。\n\n那扇被她目光灼烧的门终于打开，主治医师反手带上门。“他能活下来。”\n\n脑中盘踞数小时的焦虑轰然崩解，空出的区域立即被喜悦与决心的浪潮填满。喜的是死神暂且不会造访这个家庭，而那份决绝……"
 brazil_adhemar_endgame_survival.21.a: "……是要拼尽全力定格现状。"
 brazil_adhemar_endgame_survival.22.t: "齑粉"
 brazil_adhemar_endgame_survival.22.desc: "无菌的灯光看似在与黑暗的浪潮搏斗，无月之夜的气息却从外界渗入病房，浸透了一位妇人的心脏。她为亲人的安危饱受煎熬，仿佛历经了万古，只能隔着玻璃仓惶窥视——每次不过数秒，泪水便模糊了她无力承受的画面。\n\n他会好吗？他突然倒下，而她本该把车开得更快些，或许此刻还能多一线生机。会好起来吗？医生们在救治，她听说有种让医院更先进的技术，可惜尚未惠及此地。他还能活着吗？\n\n必须活着。\n\n此刻她的瞳孔如被焊死在亲人身上，甚至忽略了阻隔彼此的玻璃。那群白大褂仍围着他，可凝滞的身形已说明一切，直到其中一人颓然垂首，她读懂了所有答案。\n\n急救室的门开了，医生走向她。她的心被一点点碾成齑粉。"
 brazil_adhemar_endgame_survival.22.a: "“请节哀。”"
 brazil_adhemar_endgame_survival.23.t: "无暇赴死"
 brazil_adhemar_endgame_survival.23.desc: "她不再在意其他东西，把脚踩在油门踏板上，全然不顾街灯刺眼的光芒。只需看一眼后视镜，她就明白了情况——她的亲人、她的家人正在努力保持清醒。她忽略了周遭的警笛声，眼睛也不敢眨一下，加速驶向夜色之中。\n\n她终于拿到了薪水，也终于能够改善他的生活。但前提是她必须按时赶到那里。如果她出了车祸，他们都会丧命，但如果她没赶到或者速度太慢，他也肯定会死的。1秒、2秒、3秒，每一秒都很重要，她强迫自己的脚踩得更深更狠，不顾一切地加速前行，面对任何障碍都不退缩。\n\n她又看了一眼，他已经失去了意识。他没有时间再撑着活下去了，但她决不能让他有足够的时间去死去。车辆、树木、灯光和人群的曳影从她眼前划过，她终于到了目的地——那辆车的前部贴着的红十字标志被灯光照亮，这是唯一能挽救他生命之物。"
 brazil_adhemar_endgame_survival.23.a: "想要逃脱死亡并非易事，但仍有可能做到。"
 brazil_adhemar_endgame_survival.231.t: "命丧黄泉"
 brazil_adhemar_endgame_survival.231.desc: "为什么？\n\n祈祷的颂歌响起，周边全是身着黑衣的悼念者，而她的家人就要被埋入这布满血肉污秽的葬坑。\n\n为什么？\n\n剧烈的咳嗽声，不断减轻的体重，她在量体温时感受到从他身上散发出来的灼热感。\n\n为什么？\n\n肺结核，他们说。这是可以治愈的。她的家人本不必死去。\n\n为什么？\n\n是医院太远了，而且之了费用又太高。她除了看着别无他法。\n\n为什么？\n\n因为——\n\n为什么？为什么？为什么？为什么他非得死呢？为什么他们本应该失去某个人，却最终发现自己其实并不需要失去他呢？如果她更加努力些，她是否就能有机会挽救他呢？为什么她没能救得了他呢？为什么？"
 brazil_adhemar_endgame_survival.231.a: "旧病夺走了新生。"
 brazil_adhemar_endgame_survival.24.t: "工业革命"
 brazil_adhemar_endgame_survival.24.desc: "“那边那家工厂是做什么的？我看到机器上有很多德文标识。我路过的时候还看到有些纳粹标志被磨掉了。”\n\n“哦，那是一家农业工厂。是德国的什么公司来着，拜尔斯道夫公司还是别的什么在这儿建的。”\n\n“那几个街区外的那家工厂呢？我看到那里的员工有一半是美国佬。”\n\n“那是巴西福特工厂。不知为什么，天天修福特的那帮人似乎挺喜欢咱们这儿的市场。”\n\n——\n\n“当前经济形势报告。阿德马尔·德·巴罗斯总统的经济政策取得了及格线以上还算不错的成效。虽然通货膨胀仍是个问题，但不像洛特执政时期那样加速恶化。特别值得留意的是，在采访中认为自己有能力找到工作或保住现有工作的工人比例有所上升。不过……”\n\n——\n\n“生意上有问题？”\n\n“你说得对，生意上确实有问题。那个愚蠢的全民盟派混蛋市长老是拿这个那个愚蠢的城市条例给我找麻烦。一直得听他在我耳边唠叨，真是烦死了。”\n\n“嗯，你也可以找找那个人，你知道的。”\n\n“说起来也是。阿德马尔的手下以前也帮我办过事。或许我该去找找我的那些老朋友，看看他能不能在市议会那边给我点帮助。”"
 brazil_adhemar_endgame_survival.24.a: "就这样，阿德马尔在工业领域崭露头角。"
 brazil_adhemar_endgame_survival.25.t: "新闻道德"
 brazil_adhemar_endgame_survival.25.desc: "什么也没有。拉塞尔达坐在电视屏幕前，什么都没听到。要是能听到点什么，即使大多数仍什么都不是，也还算可以接受——光靠言辞激烈的新闻卖不出去环球电视台的广告位——但这次不一样，这次是另一回事。整整一个小时的节目，完全没有哪怕一丝他习以为常的“某种东西”。当节目结束的那一刻，咖啡从拉塞尔达嘴里喷了出来，他的大脑立刻开始拷问到底哪里出了问题，他究竟是怎么……\n\n“……一整场节目一句辱骂都没有，罗伯托。”阿德马尔一边说，一边把一杯鸡尾酒举到嘴边，稍作停顿，抿了一口。“你几乎是一夜之间就换了一批观众，”他的视线从海岸线移向马里尼奥，推了推他那顶宽檐帽，“说实话，我很佩服。”\n\n“我们有交易，总统先生，而我与环球电视台绝不会轻易违约。”马里尼奥语气干巴巴的，脸上露出一副不舒服的表情，他更像是待在公司董事会，而不是和阿德马尔共处一个阳光灿烂的度假胜地。\n\n“这正是我喜欢你的地方。”阿德马尔语气变得激昂，猛地伸出一只手指着这位大亨，“你懂得把握好交易，而且愿意坚守承诺。”\n\n马里尼奥嘴角慢慢露出一丝笑意，他那细细的胡子随着话语越说越弯。“我很受宠若惊，总统先——”\n\n“马里尼奥，请，我的朋友都叫我阿德马尔。”\n\n“那我就恭敬不如从命，阿德马尔。说来也奇怪，我从来没见过拉塞尔达。像他这样的重要人物，行程紧凑是可以理解的，但，”轮到他转头微笑，“现在看来，我的标准显然是定得太低了。”"
 brazil_adhemar_endgame_survival.25.a: "“很高兴遇见一个懂得如何提高这些标准的人。”"
 brazil_adhemar_endgame_survival.26.t: "警示"
 brazil_adhemar_endgame_survival.26.desc: "阿德马尔·佩雷拉·德·巴罗斯是许多角色的集合体：无赖、丈夫、生意人、州长。最近他又多了一个头衔——总统，但他依旧是曾经的自己。然而，当他用力两次才打开轿车车门，努力三次才挣扎起身时，阿德马尔只剩下了一个身份：沉默的人。而他的兄弟，已经死了。\n\n相较之下，小安东尼奥·巴罗斯是个简单得多的人。阿德马尔当代理州长时，安东尼奥是他的秘书；阿德马尔当州长时，安东尼奥是他的幕僚长。也许阿德马尔本该预料到——在自己奇迹般地生还之后，安东尼奥便会罹难，但这并不是他脑海中的念头。他的全部思绪，只集中在一步接一步上，别无他物。\n\n他停下了脚步。他不记得上一次这样做是什么时候，也无意去回想。他没有在意周围人的低语与慰问。他就在那里站住，身旁是他的兄弟，那张脸平静、安详，仿佛只是沉睡，几乎如他所想，却又哪里不对——那并不是他死去时的样子。那不是他的兄弟，而是被人为修饰过的遗容。安东尼奥去世时，他正深陷昏迷，未能见其最后一面，这是命运的一种残忍。而他没有嚎啕大哭，也没有跳下去抱着棺材，已经是一个奇迹。阿德马尔更加握紧双手，虔诚祷告，全然无视手腕的抗议。\n\n第一铲泥土落下时，他的双眼仍然紧闭，只是听着声音一次又一次地响起。直到最后一刻，他的双眼倏然睁开，血丝一片——这是他最后一次看见安东尼奥的机会，哪怕只是修饰过的遗体，也是他的兄弟。"
 brazil_adhemar_endgame_survival.26.a: "但他只看见了他自己。"
 brazil_adhemar_endgame_survival.27.t: "太子到访"
 brazil_adhemar_endgame_survival.27.desc: "与1966年之后的许多次活动一样，每当阿德马尔或小瓦加斯出现时，贫民窟里的人们都会因兴奋和喜悦而陷入疯狂。在1970年竞选期的这一天也是如此。这位大人物和他的学生在卡里奥卡贫民窟中穿行时，受到了一场贫民窟所能提供的最隆重的欢迎仪式的礼遇，阿德马尔和小瓦加斯的海报贴满了每一面还没来得及重新粉刷的墙壁。\n\n最初的热情在小瓦加斯和阿德马尔在公共广场停下，准备发表竞选演讲后逐渐消退。这给了当地部分居民一点讨论政治的时间。其中一人插嘴打断了另一人的滔滔不绝。\n\n“——而且我告诉你，这些人简直疯了！他们竟然让所有人崇拜他们，就好像他们是纳粹一样！他们以为自己是谁啊，到处张贴自己的照片，让我们在他们离开后清理他们留下的烂摊子？”\n\n当地支持阿德马尔的人愤怒地猛砸了一张临时搭建的桌子。“哼，那你告诉我那个卑鄙的凶手拉塞尔达又会怎么样？他只跟那些有权有势的老爷在海滩上聊天。他根本不会像阿德马尔那样理会我们这样的穷人！”\n\n一个较为安静的邻居插话道。“那工党人呢？他们每次路过的时候，至少都会试着听听我们的……”\n\n阿德马尔所在那片贫民窟里最坚定的支持者对此嗤之以鼻。“胡说，他们不过是装装样子在听而已。他们要么都是共产主义者，要么就是富有的阔佬，总之跟那些企图窃取阿德马尔政治成就的蠢货一个德行。再说，你也没见过那个胖子古拉特来拜访过吧——”就在这时，外面传来一阵响亮的欢呼声，打断了他的发言。阿德马尔刚开口准备演讲，就被外面的喧闹声打断了。"
 brazil_adhemar_endgame_survival.27.a: "人群朝着广场方向蜂拥而去。"
 brazil_adhemar_endgame_survival.28.t: "巴西欢迎你！"
 brazil_adhemar_endgame_survival.28.desc: "“中午好，这里是巴西时刻的午间新闻。我是茹兰迪尔·阿布雷乌，此刻在巴西利亚为您报道。经确认，废除巴西合众国对日本移民禁令的宪法修正案已以法定多数票通过国会两院表决，正式成为法律……”\n\n阿德马尔倚在晨曦宫的落地窗前，轻晃着手中的威士忌酒杯。“这项法案的通过，得益于阿德马尔·德·巴罗斯总统旋风式的政治游说。自新国家体制终结后开启政治生涯以来，总统始终是日裔巴西人的坚定支持者。对于社进党及其领袖而言，此次胜利无疑是对‘日系人’承诺的完美兑现。”\n\n总统轻笑一声，将杯中威士忌一饮而尽。“这个茹兰迪尔倒有几分见地。我确实支持日本人，他们是勤劳善良的民族，却常在巴西遭受不公。巴西终于能抛开二十年代那个咖啡牛奶寡头独裁者制定的荒谬法律，自由拥抱远东来客了。”\n\n阿德马尔起身踱步，喜悦之情溢于言表。他突发奇想，命人为华盛顿·路易斯的肖像拍张照，再给他添上愚人尖帽，送往社进党旗下报刊的搞笑专栏发表。\n\n玩笑归玩笑，阿德马尔心中知道他的光辉履历又添了浓墨重彩的一笔。"
 brazil_adhemar_endgame_survival.28.a: "欢迎欢迎，热烈欢迎！（日语）"
 brazil_adhemar_endgame_survival.29.t: "此路不通"
 brazil_adhemar_endgame_survival.29.desc: "失败的消息在高原宫内回荡着。\n\n阿德马尔坐在总统办公桌前，听着这个他早已料到的结果，不禁叹了口气。“下午好，这里是巴西午间新闻。我是《巴西时间》的朱兰迪尔·阿布鲁，现在可以告诉大家，关于解除日本移民到巴西合众国禁令的宪法改革已经最终被巴西参议院否决。”\n\n更多的话语像海上的漂流物一样飞快掠过。阿德马尔站起身，缓缓走向收音机，将其关掉。\n\n他走进陈列着被选为共和国最高权力者画像的画廊，仿佛时光倒流般依次经过从他开始往回数的那些旧总统。先是洛特的画像，随后是库比契克和戈梅斯的脸，当然还有瓦加斯——他逐一走过这些人。最后是造成这一切恶果的人。他冷漠地凝视着华盛顿·路易斯的画像，喝完了他的威士忌。\n\n他强忍住想一气之下将玻璃杯摔到地上的冲动，回到自己的办公室，将玻璃杯放在酒瓶旁边，然后默默地离开了高原宫的办公室，到外边去散散心。在几乎空无一人的“三权广场”上散步时，他默默地继续前行，他只感谢上帝没让别人看到他因愤怒而失态的样子。"
 brazil_adhemar_endgame_survival.29.a: "这一切都由往者创造，却让生者苦苦支撑。"
 brazil_adhemar_endgame_survival.30.t: "总统遗产基金法案获得通过！"
 brazil_adhemar_endgame_survival.30.desc: "阿德马尔站在政府以总统遗产基金名义新购置的地块边缘，嘴角挂着一丝若有若无的笑意，与随从和保镖保持着几步距离。除了几个喜欢哗众取宠的议员，总统遗产基金法案几乎未遇阻力便顺利通过。他即刻行使了相关权利。\n\n相较过去与参议院剑拔弩张的诸多对决，保障这项法案通过简直易如反掌。这片土地上仍存有几栋年久失修的破败建筑，虽价值微薄，但很快将焕然一新。他计划在此建造以自己命名的图书馆，辅以小型诊所及医疗慈善机构分支——这些设施将比任何过往政策都更彻底地将自己的名字烙印在圣保罗这片贫民区的记忆里。\n\n与他波澜壮阔的政治生涯相比，如此微小的举措竟然成为浓墨重彩的一笔，这念头令他颇感奇妙。毕竟，青史留名至关重要，这座图书馆将在此矗立数十载。它会比自己的其他政绩更恒久吗？或许会，或许不会。谁又能断言呢？"
 brazil_adhemar_endgame_survival.30.a: "反正很久就对了。"
 brazil_adhemar_endgame_survival.31.t: "魔术师"
 brazil_adhemar_endgame_survival.31.desc: "“总统遗产基金今日遭参议院否决，这条意在为总统设立小额资金供其自由支配的法案被批评者斥为铺张浪费，最终……”\n\n咔嗒。\n\n阿德马尔有点用力过猛，电视的塑料旋钮被他捏得吱嘎作响。他松开手，向后靠到椅背上，翘起二郎腿。他还以为能稳过呢——这点九牛一毛的小钱，哪怕最精明的税务官都不会察觉。这事都能整个新闻把我批判一番，想必今天确实没什么大新闻。\n\n他笑了——嗤笑——因为这破事实在可笑。阿德马尔什么时候花钱需要看人脸色？这就是巴西的游戏规则。这次他不过是想走个程序而已。参议院那帮家伙在装什么呢？\n\n早知如此还不如别费这个劲。要不是对这帮人知根知底，他几乎要怀疑议员们是在公报私仇。但怎么可能呢？他们敢吗？人民可是爱戴他的。就这么个芝麻大的法案，芝麻点大的一笔小钱。\n\n阿德马尔看看自己的手指，已经被旋钮的螺纹压出了红印。他长叹一声，陷进真皮座椅里。"
 brazil_adhemar_endgame_survival.31.a: "他的魔力散去了吗？"
 brazil_adhemar_endgame_survival.32.t: "熟悉的天空，陌生的沙滩"
 brazil_adhemar_endgame_survival.32.desc: "圣保罗太过显眼，且城市气息浓重，不合他的心意。贝伦虽保留着庄严的欧洲建筑风格，却仍透着新大陆的野性。即便对小阿德马尔·德·巴罗斯这般常客而言，里约热内卢或许才是稳妥之选——救世基督像的荫蔽历经一代人甚或更久便会褪色，但雕像与城市共同散发的温暖仍是他珍藏的回忆。\n\n至于海外，冷战铁幕限制了他的选择：大半个欧亚自然不在考虑之列。爱尔兰充满田园诗意，澳大利亚与新西兰亦如是。加拿大法语区与巴西某些区域共享欧陆风情，墨西哥部分地区除却南部著名的热带飞地，亦有其独特韵味。是否该购置多处房产？一处近在故土，另一处远走天涯？他决意如此。\n\n整个午后，阿德马尔都在研究海外房产，从海滨庄园到宫廷式宅邸，再到高档联排别墅。这本该是退休生活的趣味所在（公允地说确实如此），但每当浏览奢华宅邸或都市顶楼豪宅时，他的思绪总在游离。那些倾注毕生心血建设的国家的记忆及其意义如潮汐般反复涌现。\n\n小阿德马尔·德·巴罗斯是何许人？若在年少时，这个问题会令他浑身不自在。但此刻，他是这个国家最坚韧的面孔，是守护顽固巴西的倔强之人，用注定比他生命更恒久的功业，捍卫着国家主权与传统。当他退居幕后，远遁到遗产可能沦为靶标的距离，老迈到无力顾及自己名字唤起的意象时，又将成为怎样的存在？"
 brazil_adhemar_endgame_survival.32.a: "最终，他的目光重新落回房产列表：“里斯本……临大西洋……看着不错……”"
 brazil_adhemar_endgame_survival.33.t: "命运召唤"
 brazil_adhemar_endgame_survival.33.desc: "这位商人不过是茫茫商海中的一员，此刻正坐在那间充当其“总部”的狭小办公室里，汗水湿透了他的衬衣。当电话铃声响起时，他立马拿起电话。毕竟，他正等着原材料供应商打来电话，对方说这月能提供一批上好的棉花。\n\n然而，他却怎么也想不到电话那头的人会是谁。\n\n他根本听接线搭桥。接着对方开始自我介绍，竟然是劳多·纳特尔——总统的办公厅主任！商人惊呆了，几乎说不出话来，纳特尔却热情地聊着天，仿佛他们相识已久。当对方提出一个非常委婉的请求——为即将展开的瓦加斯派竞选活动捐款时，商人这才缓过神来，连连表示同意。\n\n当然，他毫不犹豫地答应了，管它花多少钱——任何施予的帮助在他们胜选后都会得到回报，而来自如此高位人物伸出的橄榄枝无疑会带来将来的经营极大的好处。任何新政府肯定都要去兑现所做出的承诺，并为此签下不知多少份合同。\n\n他想，自己能拿到多少呢？"
 brazil_adhemar_endgame_survival.33.a: "资本主义的至耀时刻！"
 brazil_adhemar_endgame_survival.34.t: "明日新星"
 brazil_adhemar_endgame_survival.34.desc: "当他从玛莎拉蒂里走出来时，仿佛是一位摇滚巨星闪亮登场。人群的欢呼声、照相机的闪光灯和伸过来的手交汇成一股风向他席卷而来。湛蓝的天空万里无云，就像保罗·马拉夫在步入聚光灯下时明镜一般的心境。他身着笔挺的西装，脚踩擦得锃亮的尖头皮鞋，眼神中透着十足的自信。他一边向人群挥手致意，同时又对媒体镜头微笑，仿佛在向未来招手。\n\n他对自己的罪孽深重心知肚明，但他所在的政党里又有谁不是如此呢？\n\n阿德马尔和劳多同样清楚，不然他们为何来找他？他在担任公职期间负责了巴西储蓄银行的现代化进程，是忠诚的社进党人，就像小瓦加斯或其他任何人一样，完完全全的圣保罗人。他是城市进步派的完美化身，正是党派会拿来作为榜样的那种人。\n\n他的国家还有谁能比他更值得效仿？他是个一个有着理性理想的政治家，对生活中的美好事物充满热情；平时爱好开豪车兜风，在生活中享受美食，夏天去新加坡避暑，到处品鉴美酒。当马拉夫在州议会大厦脚下登上楼梯的顶端，与总统及其助手并肩握手时，没有人会否认，他将是他们国家的未来。"
 brazil_adhemar_endgame_survival.34.a: "社进党中没人能比他更好了。"
 brazil_adhemar_endgame_survival.35.t: "狩猎的兴奋"
 brazil_adhemar_endgame_survival.35.desc: "“私人领地。”里科念着海滩围栏上的告示牌，“擅入者将遭起诉。”他嗤笑着翻过围栏。安妮塔甚至懒得看告示，紧随其后越过围栏。咸涩海风扑面而来，滚滚涛声不绝于耳，两位记者驻足凝望加拉加斯郊外这片乳白沙岸与浅蓝海水。\n\n“改天得来这度个假。”安妮塔感叹道。随后，两人继续前进，如同猎手搜寻猎物般警惕。根据“雇主”的情报，目标“佩德罗·林德先生”二十四小时前刚入住这片度假区。沙滩上无人注意这对伪装成游客的记者。\n\n里科的目光锁定在藤椅上用草帽盖脸晒太阳的老者。他与安妮塔交换眼神，咧嘴笑道：“瞧这老梅干。”他举起武器从远处瞄准林德连拍数张。\n\n“得再靠近些。”安妮塔低语，“等下，我有主意了。”她旋即高喊：“林德先生！”满脸皱纹的老者掀开草帽坐起身来，眯起双眼。\n\n猎手的枪口终于锁定猎物。"
 brazil_adhemar_endgame_survival.35.a: "笑一个，阿德马尔！"
 brazil_adhemar_endgame_survival.36.t: "转移资产"
 brazil_adhemar_endgame_survival.36.desc: "“啊，总统先生！”他的专属会计在电话中和往常一般彬彬有礼。“您最近身体可好？”\n\n“今天？是好了些吧。”那天下午阿德马尔的步伐似乎比之前轻快了些，他对这样的好转感到欣慰。\n\n“那今天您想办什么事务？”会计提醒道。\n\n“我要新开一个海外的银行账户。”\n\n电话那头在一阵明显的沉默后，接着是笔在纸张书写的沙沙声。“……这边可以为您办理。”\n\n“有问题吗？”阿德马尔扬起一边眉毛盯着手中的电话。\n\n“没有……请您稍等一下。”又是一阵纸张书写的沙沙声。“……这是……第九个账户？”\n\n“是第十个。”\n\n这次沉寂又更长了些：“我该担心吗？”\n\n“嗯？……啊！”阿德马尔愣了一下，笑了。“没什么可担心的；这只不过是为党的竞选活动新筹到了笔巨款，我自己之后能少掏点钱！”\n\n会计松了口气：“当然，先生。我想那是不是该为此庆祝一下？”\n\n“在歌舞厅办的社进党活动？呸！”阿德马尔轻笑一声：“我这把老骨头，那种事早不干了，所以我才来这里办事儿啊！”"
 brazil_adhemar_endgame_survival.36.a: "阿德马尔安慰道：“别担心，你也会收到邀请的！”"
 brazil_adhemar_endgame_survival.37.t: "盗亦有道"
 brazil_adhemar_endgame_survival.37.desc: "劳多正坐在办公室里，仔细核对着竞选活动的费用。他预计有5000万雷亚尔被白白浪费掉，甚至可能还不止这些。这就是阿德马尔式竞选的糟糕做法，整个流程中存在着异常庞大的“杂项”费用支出，而且更多资金流向了所谓的“运输”费用。这些竞选工作做得无比马虎，也许阿德马尔真的是老糊涂了。\n\n劳多捂住眼睛，叹了口气。他本以为阿德马尔不会卑劣到在最后一刻还要从自己的继任者那里偷钱。他本应该想到这一点的，但他却没有。过了一会儿，他松开手，看向了桌上的电话。\n\n只需要打一个电话，阿德马尔就会被抓住，他的贪污资产会被扣下，而劳多则会成为那个抓住从民众手中偷窃公产的大盗的反腐英雄。他伸手拿起电话。随后他想起了被自己的党团夺走政治成果的热图利奥·瓦加斯。如果他拨通了这个电话，他肯定会输掉竞选。社进党也会因此蒙羞。他只能放下电话，把竞选的账目锁进文件柜里，让它永远不再被人看到。"
 brazil_adhemar_endgame_survival.37.a: "日子就这么将就着过吧。"
 brazil_adhemar_endgame_survival.38.t: "第四角落"
 brazil_adhemar_endgame_survival.38.desc: "宴会厅极尽华贵之能事——长达二十英尺的会议桌铺陈亚麻桌布与精致银器，全套正餐配甜点与充裕佐餐酒，更有乐队现场演奏卡洛斯·德·塞沙斯的《托卡塔》，以悠扬旋律为这场面平添诗意。小阿德马尔·德·巴罗斯难得谦逊地选择了靠近末席而非主位的座位：这支托卡塔令他心驰神往，他要离乐声最近处。\n\n当然还有更现实的考量——海登赖希先生正如其制服般令人难以忍受：浅灰束腰外衣缀着银制铁十字勋章，恍若异星来客。阿德马尔不动声色地将自己安置在礼仪允许的最远端，毕竟这位巴伐利亚人对欧陆葡萄牙语的蹂躏堪比指甲刮擦黑板。好在葡萄酒让醉意朦胧的对话在如此距离下减至最低。\n\n但即便是固执的海登赖希也镇不住布拉德肖先生。这位肩宽如山的得州人顶着炮弹般的圆脑袋，浅蓝西服与灿烂笑容相映成趣，大白牛仔帽恰似其火爆脾气的具象。此刻他左右各揽一位妙龄女郎，正滔滔不绝讲述南非历险记，引得对座的海登莱希不时投来冷眼。\n\n田尻先生举止更为低调。他仅以标准晚礼服出席，唯襟前樱花彰显身份。与圣保罗日裔代表同席的他，正通过这种方式昭示母国与侨民的文化纽带。这群东方来客对美国与德国要员的作派报以无声的取笑，以及毫不掩饰的居高临下式审视。\n\n纵使非政界人士亦能嗅出三位使节间的敌意，但这场云集全球三大强权外宾的官方宴会，恰恰彰显社进党的国际影响力。阿德马尔既陶醉于美酒佳肴，更深知自己将社进党缔造为受世界尊重的政治力量的夙愿已然实现。"
 brazil_adhemar_endgame_survival.38.a: "原本只想尝尝葡萄酒，谁料目睹了一出好戏！"
 brazil_adhemar_endgame_survival.39.t: "世袭继承人"
 brazil_adhemar_endgame_survival.39.desc: "阿德马尔·佩雷拉·德·巴罗斯自幼便在全国奔走，无论身后抛下多少家人。他对至亲的关怀主要体现于寄回的零碎礼物、供养生活的金钱，以及竭力让每次相聚时光价值最大化。鲜有人比长子小阿德马尔·德·巴罗斯更熟悉父亲的这种行事风格。\n\n当共和国总统更衣准备赴宴时，总统之子正候在门外神游天外。作为圣保罗州议员替父亲政党效力，却多从远处旁观的小阿德马尔不得不承认：这位共和国总统是个充满缺点的慈父。“天啊，但愿他能少去见那位瑞博士”是四个子女常挂嘴边的喟叹。\n\n但与此同时，小阿德马尔又不得不钦佩父亲的处世之道。他觉得父亲并无太多可指摘之处，尤其折服于老阿德马尔处理一对一对话的技艺——当儿子为是否与某人交谈过而抓狂时，父亲只需佯装谈过便从容过关。\n\n另一项令儿子钦佩的是父亲的实用主义。即便政见相左，他也绝不会同情全民盟鼓吹的亲美路线。为何要将巴西出卖给某个超级大国？“多方押注才是上策，我父亲深谙此道”，小阿德马尔常如是说。\n\n至于近期的琐事，小阿德马尔感激父亲能多花时间陪伴家人——毕竟他刚从重病中康复。这份温情弥足珍贵。房门开启，盛装的阿德马尔现身。他向长子颔首示意，儿子亦点头回礼，为父亲拉开门扉。"
 brazil_adhemar_endgame_survival.39.a: "“和我聊聊近况吧，”老总统说道。"
 brazil_adhemar_endgame_survival.41.t: "总统退休金及赦免法案获得通过！"
 brazil_adhemar_endgame_survival.41.desc: "混乱。没有什么其他词汇可以形容目前这样的情形，尤其是在整个参议院都在喷薄出愤怒的咆哮的时刻。\n\n长达一夜的投票过程正在产生糟糕的结果，当议员们看着法案投票计数器越来越接近半数，他们的愤怒情绪也在不断积压，深化，酝酿的更加强烈。随后，当总统退休金及赦免法案被宣布以多数票通过时，参议院中愤怒的烈火再也按捺不住。\n\n阿德马尔试图公然通过借助议会合法途径的决议来让自己脱罪的谋划取得了成功。而那些发现自己的同袍“临阵倒戈”支持这项荒唐议案的议员被出乎意料地打了个措手不及。所有精心策划的政治联盟与他们互信友谊在此刻毁于一旦。阿德马尔成功的在这一份极其卑劣的议案上获得了多数支持，这让对现状最悲观的观察者们也感到震惊，而阿德马尔支持者们的名单也已经开始分发出去。\n\n随着这条消息从首都向外传播，震惊和混乱成了今天的主题词，整个国家都对阿德马尔这样的政治掌控力以及暗中勾结感到震惊和畏惧，一切都已经展露无遗。而这次的议案通过会对未来产生什么后果尚不清楚——毕竟这才是关键所在——但政治局势已然明了，阿德马尔已然金蝉脱壳，逃出生天。\n\n他究竟是如何做到这一切的，仅仅是依靠一位忠诚的秘书吗？阿德马尔微笑着，他认可了自己的才能，随后向后一躺，靠在了椅背上。"
 brazil_adhemar_endgame_survival.41.a: "走向成功。"
 brazil_adhemar_endgame_survival.42.t: "总统退休金及赦免法案未获通过！"
 brazil_adhemar_endgame_survival.42.desc: "震惊。宽慰。疲惫。这些混杂的情绪在参议院楼内迅速的蔓延开。\n\n长达一夜的投票过程依旧十分胶着，在这过程中，不止一位议员们愤怒地意识到，他们的竞争对手已经在某些方面被阿德马尔收买，为这位总统提供了未来避免法律惩罚的机会。所有精心策划的政治联盟与他们互信友谊在此刻毁于一旦。最终，虽然阿德马尔努力的让自己成功避免了牢狱之灾，但未来如果他被发现有任何涉嫌违法的相关证据，这位总统依旧要承担法律责任。只是，取得所谓“胜利”的参议院依旧忧心忡忡，他们知道可能再也没机会发现这样的证据了。\n\n阿德马尔本人再从他的秘书那里得知消息之后，反倒没有那么焦虑。况且他从来没指望过这份法案能通过——这的确太肆无忌惮了——但试一试总是值得的。而从长远来看，这样的尝试其实并不影响大局。一直以来，他都在努力拉拢各方势力，从而让对他的逮捕令不被提上日程，更无法落到实处。他根本不必惊慌，因为他知道，洪水滔天亦与他无关。\n\n有议案也好无授权也罢，现在，谁还能动他一根汗毛？"
 brazil_adhemar_endgame_survival.42.a: "万岁！"
 brazil_adhemar_endgame_survival.43.t: "俘获人心的最佳之法"
 brazil_adhemar_endgame_survival.43.desc: "在巴西全国，一种极不体面的基层竞选活动已经扎根各地。\n\n从牧场到贫民窟，从亚马孙雨林的村庄到里约热内卢的市中心，普通民众发现自己被极其精准的天降横财砸了个满怀。这包括了中产阶级家庭，牧场工人，种植园主，城市里的天主教虔诚信徒等等人群。随着巴西社进党竞选活动的进行，党内领导层越发清楚的了解要在何地、何时以何种方法与何人接触，把钱送到他们手里以获得他们的支持。\n\n一些人发现装满现金的信封被随意塞进他们的信箱里，还有些人被遮着脸的自行车手拦下，不多说一句话，只要求要求他们提供姓名，然后给他们送上包裹。而街头行人可能会被突然撞到，正担心被人扒窃时，却发现兜里多出了不少钱。也有些包裹被塞到了汽车雨刮器的下边，甚至有些人在下午小憩时被扔进卧室的包裹的动静给直接吵醒。\n\n政治当然是门肮脏的行当，但人们的选票和他们所掌握的财富一样是可以流动的。\n\n有着崇高的政治理想固然不错，但阿德马尔的继任者们现在所指望的，不过是让这些理想稍微能落实点，比如说投票率能更加理想。或许有一天贿选这种行为会被扫进历史垃圾堆，但至少在目前这个情况下，在能找到一种不那么狡诈的手段来实现自己目标之前，他们只能这样做。用钞票为他们的党争取到一批花钱买来的选民，对于社进党来说，早已经是他们运营成本的一部分了。"
 brazil_adhemar_endgame_survival.43.a: "历史将宽恕我们，因为我们是光明正大买来的。"
 brazil_adhemar_endgame_survival.44.t: "简化宣传"
 brazil_adhemar_endgame_survival.44.desc: "尊敬的社会进步党参选者们！\n\n在我们尊敬的总统的指示下，选举委员会最近通过了一项更高标准且符合现状的竞选方案，为巴西各地的农村地区和贫民窟选民显著增加了投票机会。此前因文盲不识字而被禁止投票的人们现在正在寻找人指导他们如何投票。女士先生们，你们就具备提供指导的条件。\n\n在你们抵达所在选区的农村和贫困地区时，你们应像往常一样与那些原本就有投票资格的人们打交道。而对于那些新获得投票权的人们，你们必须牢记的一件最重要的事情，在竞选活动中不要使用文字媒介。\n\n像“ADHEMAR”这样的字母，以及像“VARGAS FILHO”或“PARTIDO SOCIAL PROGRESISTA”这样的更长的词汇，对于一个目不识丁的人来说都没有任何意义。然而，它们的发音以及与之对应的图示才是能够赢得人心的关键。除了学习小瓦加斯州长做出政治承诺，宣传他继承了其伟大父亲的遗志之外，您还可以利用各种无需耗费太多脑力的允诺和激励措施来在民众心中树立起政治影响力。\n\n以下附上了一些已被证实有效的具体指导方案。我们衷心祝愿大家的努力都能取得成功。"
 brazil_adhemar_endgame_survival.44.a: "署名：社进党竞选委员会"
 brazil_adhemar_endgame_survival.45.t: "真正的继承人"
 brazil_adhemar_endgame_survival.45.desc: "在三幅分别是自己、父亲和阿德马尔的大型画像前，热图利奥·萨尔马尼奥·瓦加斯在他父亲曾经所在的政治据点，向着一群支持瓦加斯政治联盟的选民们发表演讲。他用着那些早已习惯重复的陈词滥调来竭尽全力展示自己的，魅力，并希望以此来打动听众。\n\n“女士们，先生们，我们当中会有谁真的遗忘我那已然故去的伟大父亲热图利奥·瓦加斯的时代吗？我们真的会忘记他将为巴西人民，尤其是为那些生活在水深火热之中的贫民们服务视为自己首要职责的高尚品行吗？他是如何抵抗纳粹分子，迫使美国人平等对待我们，并确立了独立的外交政策？他又是如何为库比契克、洛特、阿德马尔执政期间所取得的所有成就打下基础的呢？”\n\n听众里不断有人点头，传出认同的附和，于是小瓦加斯继续说。\n\n“实际上，现有的政治联盟模式甚至早已偏离了洛特元帅所指定的方向。在过去的五年中，他们对于总统提出的任何政策想法都只会给出最糟糕的反应。这让国家治理不断出错，社会在错误政策的泥潭中越陷越深——对此，我们可以得出一个结论，瓦加斯政治联盟已经不再胜任国家治理的任务，我们应当另想他法。”\n\n越来越多的人发出了赞同声。而在这掌声和欢呼声中，充满了人们对于现状的愤怒和对改变的强烈热情。\n\n“现在，我要对各位同胞说：既然眼前有如瓦加斯那样的人，那为何还要固守原来的那老一套的东西呢？谁会比那位穷人慈父的儿子更适合去贯彻实现他父亲的治国理念呢？各位女士们先生们，你们有机会拥有这样的精干有力的政治领导——此刻，他就在你们眼前！”"
 brazil_adhemar_endgame_survival.45.a: "当天就售出了数百份社进党的成员资格卡。"
 brazil_adhemar_endgame_survival.46.t: "喧闹纷扰"
 brazil_adhemar_endgame_survival.46.desc: "小阿德马尔·德·巴罗斯领导的社进党政权力图巩固权力，为总统退休做准备。与此同时，巴西权力天平的新平衡便体现在党对媒体的掌控上。更准确地说，是对媒体从业者的影响力上。\n\n近期，一位独立记者刊发针对全民盟的报道后，代表众多全民盟党官员的律师立即提起了诉讼。这篇报道堪称小报新闻的典范，其程度之甚仿佛是伦道夫·赫斯特的葡语翻版。\n\n从指控全民盟参与1951年流产政变的阴谋论，到恶意嘲讽雅尼奥·夸德罗斯著名的“斜视”眼，任何称职的律师都能轻易以诽谤罪起诉。审判迅速结束，逮捕几乎同步进行，案件如翻书般草草了结。\n\n但事情并未就此结束……\n\n令人震惊且蹊跷的是，涉事记者突然获释，当局却未给出合理解释。官方说法是法官“重新考虑”了刑期，允许记者缓刑获释……\n\n……而私下里，这暴露出社进党在司法系统——天知道还有其他哪些领域——日益膨胀的影响力。这个早已腐败横行的国家，如今连最拙劣的哗众取宠之人都能受到政治庇护和幕后交易的保护。"
 brazil_adhemar_endgame_survival.46.a: "非礼勿视，非礼勿听，非礼勿言。"
 brazil_adhemar_endgame_survival.47.t: "没有新鲜事"
 brazil_adhemar_endgame_survival.47.desc: "“——别忘了，众所周知，拉塞尔达偏爱自由国家组织。”某档谈话节目正说着，电视机传来遥控器按键声。\n\n“马加良斯的忠诚度完全取决于全民盟能给他多少钱。这种——”又一声按键，切换至另一个频道。\n\n“——过去一周，随着选举季临近，进步党对全民盟的口诛笔伐不断升级。德·巴罗斯总统的任期即将结束——”\n\n“他妈的……！”拉斐尔·马加良斯强忍着没把遥控器摔出去，轻轻放回桌面。社进党的宣传机器没日没夜地运转，德·巴罗斯尽管最近健康堪忧，却也是像往常一样恶毒。常人到这把年纪本该敬畏天意，但德·巴罗斯对待同僚的方式，倒像是把自己当天意了。\n\n“看来岁月没让他收敛分毫。”卡洛斯·拉塞尔达倚在马加良斯的办公桌旁，语气和表情里混杂着对德·巴罗斯攻势的敌意与敬意。“有时候，姜确实还是老的辣。”他转向马加良斯，“全民盟得准备好反击。”\n\n“竞选季提前开始了，哇真开心啊。”马加良斯用指节揉着太阳穴，“阁下，我能指望您吧？我会尽力而为。”\n\n拉塞尔达点头致意：“祝顺利。”\n\n两人握手告别时，拉塞尔达露出心照不宣的微笑。马加良斯重新打开电视，恰好又看到德巴罗斯那张枯树皮般的老脸出现在屏幕上。"
 brazil_adhemar_endgame_survival.47.a: "德·巴罗斯这茬，确实能让看到他的每个人都怕变老的后果。"
 brazil_adhemar_endgame_survival.48.t: "王子的宝库"
 brazil_adhemar_endgame_survival.48.desc: "小瓦加斯精疲力尽地回到家，下车时西沉的太阳刺得他几乎睁不开眼。返程路上他几乎全程都在打盹，逼得司机和副官不得不轮流叫醒他处理突发状况。在又一天疲惫的竞选活动后，他终于回到了莫伦比。\n\n步入班代兰特斯宫——自当选州长以来这里就是他的官邸——小瓦加斯左右张望后才重新进门。确认周围没有可疑人物后，他打发副官和司机先去餐厅等候，自己稍作梳洗后就会与家人及他们共进晚餐。\n\n沿着楼梯走向起居区，小瓦加斯摸了摸自己的口袋。裤袋里塞着鼓鼓囊囊的钞票，塞得他走路都一瘸一拐。其他口袋里则分别装着更多现金信封，搭配着不同口袋里的房产地契、股票、便携珠宝以及各类非法所得。\n\n转过几个弯后，他来到新装修好的房间。室内摆放着一张书桌、几本他绝不会翻阅的书籍、永远看不完的文件、偶尔才会坐一次的椅子，还有盒应急才会取用的铅笔，一切看似耗不起眼。\n\n墙上挂着老瓦加斯的肖像画。他恭敬地移开老爷子的画像，里面露出了连共产党都未能染指的保险柜。小瓦加斯如释重负地长叹一声，将现金、地契、股票、珠宝等财物统统塞进保险柜，咔嗒一声牢牢锁上。"
 brazil_adhemar_endgame_survival.48.a: "不忘大师教诲。"
 brazil_adhemar_endgame_survival.49.t: "那是我的人"
 brazil_adhemar_endgame_survival.49.desc: "小瓦加斯的到来让民众尽情欢呼起来——大声喝彩、应和与鼓掌交杂在一起。这一切让他陶醉其中，就像沉醉在舞台上的金色聚光灯之下一样。小瓦加斯紧紧抓住讲台，张开嘴准备讲话，可这时人群又开始呼喊他的名字时，声音一次高过一次，这让他他不得不停了下来，嘴角露出一丝苦笑。\n\n好了。够了。\n\n“真没想到，走到这一步还没人朝我扔东西。”他举起手，人群安静了一些——也只是稍微安静了一点。“来吧。让我们讲讲大家都听过哪些政治传闻。”他侧过身，将一只胳膊肘撑在讲台上，注视着兴奋不已的观众。“那些权钱交易。那些往来人情。还有那些在幕后暗箱操作时握在一起的黑手。”\n\n他低下视线，摇了摇头。“好吧，我深表遗憾，政客的生活远没有那么刺激。我可没机会去参加那些跟黑帮分子或秘密结社的酷炫聚会。”他握紧拳头，在木制的讲台上轻轻敲击。“不。我大多时候只是在忙着——让我想想。对，修路。保障巴西的电力供应。还有促进经济发展。你们懂的。就那些无聊的事儿。”\n\n在舞台一侧，阿德马尔双手合十，随着瓦尔加斯的动作有节奏地拍着，就像指挥乐队的指挥家一样。他把这个小伙子教得真不错。小瓦加斯知道如何调动观众的情绪。当掌声再次响起时，阿德马尔微微露出了笑容。"
 brazil_adhemar_endgame_survival.49.a: "他的遗产得到了妥善的保管。"
 brazil_adhemar_endgame_survival.50.t: "总统遗产基金法案"
 brazil_adhemar_endgame_survival.50.desc: "今天表决的这项法案，若单从财政角度考量，总体上可谓相对无足轻重。但它却被视为定义阿德马尔所谓“政治遗产”的关键注脚，因而备受瞩目，即便这份遗产是如此单薄。\n\n根据法案条款设立的“总统遗产基金”，将为历任总统提供一笔小额资金，用途虽未明确限定，但本意是用于建立某种实体纪念物以铭记其执政岁月。尽管措辞隐晦，明眼人都看得出，最大的受益者正是阿德马尔本人。这位总统已公开表示，打算用这笔资金在圣保罗筹建一座总统图书馆。\n\n将此举与他先前创立的医疗慈善基金捆绑运作的意图，令参议院诸位议员在步入议事厅时心知肚明：这不过是场彻头彻尾的面子工程。但对于更敏锐的观察家而言，这更是一枚楔子——为现任及未来行政首脑开辟不受约束的资金渠道，值得深入审视与深切质疑。毕竟，阿德马尔的政治资本早已所剩无几。\n\n不过相较于其他重大议题，这笔款项终究微不足道。无论是基于法案本身的价值考量，还是某些悄然递送的信封里沉甸甸的“诚意”，都足以让人对此睁一只眼闭一只眼。"
 brazil_adhemar_endgame_survival.50.a: "那投票就是看他支持率了？"
 brazil_adhemar_endgame_survival.51.t: "一位政治老手的银幕生涯"
 brazil_adhemar_endgame_survival.51.desc: "小阿德马尔·德·巴罗斯的传奇政治生涯渐入尾声，这位巴西最复杂的领导人正要收到一份奇特的告别礼。一如世界各地其他备受争议的统治者，电影艺术就是温情滤镜，可以用来重新审视领导人的政治生涯与私人生活。在其健康状况恶化、政策饱受争议之际，这部传记片恰似一场精心安排的烟雾弹。\n\n广告牌上赫然印着《谜之阿德马尔》的片名，其绝非传统意义上的政治人物传记片。电影改编自同名剧本，目前正处于前期制作阶段，其似乎对这位仍在任的总统采取了反常的喜剧化叙事视角，描述他从瓦加斯独裁时期的阴影一路闯进后瓦加斯时代巴西政坛风云的经历。\n\n有人指责这种戏谑演绎亵渎了阿德马尔对巴西社会的贡献，也有人认为其政策的争议性恰恰需要轻松化解。尽管关于影片“隐性批判”的传言不断，制作方坚称该项目“不作价值判断”，只展现这位领导人在特殊时期的抉择。乍看像是谄媚之作，但影片设计实则精妙地维护着总统作为巴西最受尊崇领导人之一的声誉。"
 brazil_adhemar_endgame_survival.51.a: "一篇带着一或两段幽默片段的吹捧文章？……这倒的确有些可取之处！"
 brazil_adhemar_endgame_survival.52.t: "总统退休金及赦免法案"
 brazil_adhemar_endgame_survival.52.desc: "即便是那些在阿德马尔执政期间一直负责在参议院议会厅值守的工作人员也不得不承认，那天投票前的气氛也异常的紧张且混乱。\n\n即将进行表决的这项法案，即《总统退休金与赦免法案》，已经引发了各界人士的强烈抗议，甚至包括许多原本被认为与阿德马尔政治立场一致的人也对此表示不满。法案中的第一部分，即提高前任总统的退休金的议题，相对来说并没有什么争议。这类退休金也已经有一段时间没有提高了，而尽管阿德马尔本人会立即从中受益，但政治影响也不会太大。所以问题不在这儿。\n\n问题在于法案第二部分——对这些总统们实施一项具有追溯效力的全面赦免。包括阿德马尔在内。\n\n说这事已经引起了轩然大波也是言之过轻。那些数量未知、性质不明、严重程度也未被揭晓的总统犯罪行为，究竟是如何在一支笔的挥动下被一笔勾销的呢？在未来的某一天，又会有怎样的真相被掩盖，然后仅仅被以法律上的无奈之举来“解决”呢？\n\n投票即将临近，紧闭的门后传来的声浪正一波高过一波。这次的投票会以怎样的结果收场？这些官员们则等着去了解情况，他们甚至都没心思去友好的打个赌。"
 brazil_adhemar_endgame_survival.52.a: "风险太高了。"
 brazil_adhemar_endgame_survival.53.t: "一个人和他的党派"
 brazil_adhemar_endgame_survival.53.desc: "“保重身体，尊敬的德·巴罗斯。”\n\n这不过是一句微不足道的话语，却是劳多·纳特尔所说的。阿德马尔从太多人口中听到过各种类似的话，然而此刻它却有着某种不同寻常的含义。当阿德马尔·德·巴罗斯握住纳特尔的手时，之前的矛盾似乎变得不足一提了。在接下来的一整天里，他像巨人一样在高原宫中踱步。在他的脑海中，他想象着遥远的里约热内卢基督像那冷峻的目光，瞬间明白他们已处于同样的高度。\n\n阿德马尔·德·巴罗斯是谁？这个问题在他脑海中不断回荡，为他疲惫的身躯注入了一丝活力。在五年的时间里，社进党已成为巴西政治机器中的掌权集团，它将决定国家的未来并对其进行调整。随着小瓦加斯即将掌权，巴西的未来已确定，这个国家将掌握在年轻且有能力的领导手中，他们将延续巴罗斯的遗产，代代相传。\n\n自从中风以来，阿德马尔第一次毫不费力地推开了高原宫的大门，他的脚步轻松且有力。温暖的夏日微风拂动着他浓密的白发，一瞬间，他感觉自己又年轻了起来。这位来自圣保罗的巡警看起来还是胸有成竹。\n\n尽管他认为与那座基督雕像有所相似，但德·巴罗斯并不幻想自己有所谓的神性。然而，当他望向远处的河道，这条连接着他和他团队所不懈努力建设的这个国家动脉时，他有了一种不同的感悟。基督永远是所有巴西人的救世主，但正是巴西这个国家找到了她的救赎之人，阿德马尔·德·巴罗斯；他是上帝最卑微的仆人，服务于南美洲最虔诚的人民。"
 brazil_adhemar_endgame_survival.53.a: "“我的主，我将灵魂交托于您的手中。我的国家，我将此身交付于您的掌控。”"
 brazil_adhemar_endgame_survival.54.t: "临近最后一刻"
 brazil_adhemar_endgame_survival.54.desc: "阿德马尔·德·巴罗斯缓步从他位于晨曦宫的办公室走向前门外搭起的讲台时，内心挣扎着掩饰自我怀疑之感：“难道这就是我为大选前最后一次演讲能拿出的最好表现了？”\n\n即便演讲已经开始，犹疑仍不断侵蚀着他的思绪。那些往日精心把控的细节——仪表、演说环境——全都脱离了掌控。那场该死的中风后，每况愈下的精神状态让一切愈发难以驾驭。\n\n阿德马尔借环顾四周来分散注意力。如此多的民众前来为他送行：忠诚者，党务干部，“拥趸”，仰慕者，故交——更重要的是，劳多、小瓦加斯和他的家人。从他们身上汲取力量后，他说出了最后一番话：\n\n“巴西的人民啊！你们都见证了事态的发展。你们都看到了我们社会进步党的革命如何结出硕果。那么先生女士们，谁还敢矢口否认——我奉献的远比窃取的多？”\n\n人群陷入疯狂的掌声与大笑。劳多歪嘴笑着摇头。在鼎沸人声中，阿德马尔读出了他对小瓦加斯喊出的唇语：“你接过这棒的压力可不小啊，小瓦加斯？”\n\n走向随行人员时，阿德马尔不禁笑出声来。时至今日，自己这副老骨头还是这么锋芒毕露。"
 brazil_adhemar_endgame_survival.54.a: "“他确实这么做了，劳多。他确实这么做了……”"
 brazil_adhemar_endgame_survival.55.t: "时过如漏"
 brazil_adhemar_endgame_survival.55.desc: "晨曦宫曾给予人一种少有的喘息之感，这座通勤小镇在阿雷格里港南边不远，不完全算市区，但也算不上郊区。它虽小，却人口密集；虽为住宅区，却并不文雅。长期以来，阿德马尔·德·巴罗斯·菲略一直将这个街区视为一处理想的避世之地——南里奥格兰德一个静谧的小角落。\n\n因此，如今它显得格外不同显然另有他因。他坐在瓦加斯大道的长椅上，人群如溪水般从他身边流过——商务人士、自行车骑手、带着孩子的母亲、拎着包裹的送货员，在他身旁穿梭而过。在过去，或许这会让他的感官不堪重负，如今反倒令他感到一种彻底相反的异样体验。\n\n几乎每一个路人的每一个细节都变得格外清晰，如同他听过无数遍的管弦乐，喧闹的声响褪去，只剩下背后的人。送货员沙哑的咳嗽声、孩子尖细的笑声、行色匆匆的商务人士深沉的叹息——阿德马尔全都听得一清二楚，细节分明。或许他是在胡思乱想，但转念一想……\n\n人们常说，失明、失聪或失语的人，往往会有其他感官自发地加强以作补偿。盲者、聋者、哑者，皆是人在悲剧中的适应力的体现。那么，问题来了——阿德马尔到底失去了什么？\n\n阿德马尔时常怀疑，自己正被什么人持续地注视着。不是他的安保人员，而是某种更阴沉的存在。也许是人群中的一张脸，也许是远处窗户里的身影——他似乎总能看到某种东西：一个皮肤苍白、衣着黑暗的身影，手中握着某种闪亮而锋利的物件。难道这是一种惩罚？是上帝传来的讯息？抑或是一种“第二视觉”，让他看见自己的死亡，用来补偿那个他在权力追逐中舍弃的自我？"
 brazil_adhemar_endgame_survival.55.a: "阿德马尔·德·巴罗斯·菲略缓缓抚过自己半冻的脸，什么也感觉不到，一股寒意从心底升起。"
