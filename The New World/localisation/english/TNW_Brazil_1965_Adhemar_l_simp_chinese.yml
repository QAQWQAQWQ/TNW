 BRA_adhemar_spend_excess_money: "调用多余资金"
 BRA_adhemar_spend_excess_money_desc: "阿德马尔的小金库充盈得可能招来某些不必要的关注。分些钱给朋友和盟友们，分给巴西人民也行。"
 BRA_adhemar_too_much_money: "£BRA_adhemar_slush_fund_texticon §G小金库§!少于§G200M美元§!。"
 BRA_adhemar_spend_excess_money_tt: "£BRA_adhemar_slush_fund_texticon §G小金库§!将被削减至§G200M美元§!。\n多余的资金将被用于§G提升§!阿德马尔的£BRA_adhemar_legacy_texticon §Y遗产§!。"
 BRA_adhemaredna_category: "高原宫阴谋"
 BRA_adhemaredna_category_description: "历史不会简单地重演，而是螺旋上升。在巴西利亚，前政府留下的断壁残垣随处可见。副总统§V埃德娜·洛特§!重演了她父亲任上的斗争，这一次是对抗§h阿德马尔·德·巴罗斯§!总统。两人都意识到了政府分裂的危险后果，为了阻止政府滑向混乱，眼下有两个方案可供阿德马尔选择。其一是和埃德娜合作，让她成为一个不太靠谱的盟友；其二则是§O毁了§!她，但他可能会发现，比起父亲，女儿才是那个§R更可怕的对手§!。"
 BRA_adhemaredna_info_tt: "§F§h阿德马尔总统§!和§V洛特副总统§!在巴西利亚原地踏步，头也不回地踏上了前任政府曾走过的错路。\n\n与洛特政权一样，政府做出的决议将会摆动§Y权力平衡§!，§Y他们的关系§!将会决定他们的政府如何应对§R潜在危机§!。是重蹈覆辙，还是一错再错，只有时间能给出答案。§!"
 BRA_adhemaredna_status_long: "[BRA_adhemaredna_status]"
 BRA_adhemaredna_status_1: "当前的关系为：§G完美无瑕§!"
 BRA_adhemaredna_status_2: "当前的关系为：§B亲密无间§!"
 BRA_adhemaredna_status_3: "当前的关系为：§W合作愉快§!"
 BRA_adhemaredna_status_4: "当前的关系为：§Y龃龉不合§!"
 BRA_adhemaredna_status_5: "当前的关系为：§O反目成仇§!"
 BRA_adhemaredna_status_6: "当前的关系为：§R不共戴天§!！"
 BRA_adhemaredna_status_resigned: "埃德娜·洛特已被解决！"
 BRA_adhemaredna_bar_tooltip: "[BRA_adhemaredna_bar_tooltip_dyn]"
 BRA_adhemaredna_bar_tooltip_adhemar_overwhelming: "§h阿德马尔总统§!的影响力现在§h无可动摇§!！"
 BRA_adhemaredna_bar_tooltip_adhemar_dominant: "§h阿德马尔总统§!目前占据上风。"
 BRA_adhemaredna_bar_tooltip_edna_dominant: "§V埃德娜副总统§!目前占据上风。"
 BRA_adhemaredna_bar_tooltip_edna_overwhelming: "§V埃德娜副总统§!的影响力现在§V无可动摇§!！"
 BRA_adhemaredna_bar_tooltip_balanced: "行政权力上二人§Y平分秋色§!。"
 BRA_adhemaredna_edna_influence: "§V埃德娜§!的影响力"
 BRA_adhemaredna_adhemar_influence: "§h阿德马尔§!的影响力"
 BRA_adhemaredna_remove_edna_desc: "埃德娜的日子马上就要到头了。长久以来，他都是政府的眼中钉肉中刺，而现在，我们已经将她甘为叛徒的证据捏在了手中。必须要立刻让她承受正义的制裁。"
 BRA_adhemaredna_improve_relations: "[BRA_adhemaredna_improve_relations_dyn_title]"
 BRA_adhemaredna_improve_relations_desc: "[BRA_adhemaredna_improve_relations_dyn_desc]"
 BRA_adhemaredna_worsen_relations: "调整内阁开支"
 BRA_adhemaredna_worsen_relations_desc: "让内阁对自己的财政有太多的控制权是一个错误——一大堆豪华宴会，还有价格虚高的设备。阿德马尔会亲自确保这笔钱被花在更好的地方——比如他的口袋。"
 BRA_adhemaredna_improve_relations_3: "举行联合新闻发布会"
 BRA_adhemaredna_improve_relations_3_desc: "总统和副总统将会举行联合新闻发布会，介绍他们解决巴西顽疾的方略。"
 BRA_adhemaredna_improve_relations_0: "共同接待外国官员"
 BRA_adhemaredna_improve_relations_0_desc: "阿德马尔和埃德娜将抽出时间接见来访的外国官员，并为其设宴。"
 BRA_adhemaredna_improve_relations_2: "组织内阁会议"
 BRA_adhemaredna_improve_relations_2_desc: "总统内阁将举行会议，研究如何落实当前议程。"
 BRA_adhemaredna_improve_relations_1: "应对州长的不满"
 BRA_adhemaredna_improve_relations_1_desc: "阿德马尔和埃德娜将会聆听州长们的意见，合力解决他们的诉求。"
 BRA_adhemaredna_increase_adhemar_influence: "[BRA_adhemaredna_increase_adhemar_influence_dyn_title]"
 BRA_adhemaredna_increase_adhemar_influence_desc: "[BRA_adhemaredna_increase_adhemar_influence_dyn_desc]"
 BRA_adhemaredna_increase_adhemar_influence_money: "奖赏公仆"
 BRA_adhemaredna_increase_adhemar_influence_money_desc: "对总统忠心耿耿的公务员将获得账外奖金，确保他们继续支持总统的议程。"
 BRA_adhemaredna_increase_adhemar_influence_0: "提拔圣保罗州政客"
 BRA_adhemaredna_increase_adhemar_influence_0_desc: "作为圣保罗州的前州长，阿德马尔·德·巴罗斯在州府拥有盘根错节的人脉网。提拔这些政治盟友进入行政机构将会极大巩固他的支持率。"
 BRA_adhemaredna_increase_adhemar_influence_2: "贿赂军官"
 BRA_adhemaredna_increase_adhemar_influence_2_desc: "阿德马尔总统将同幕僚长劳多·纳特尔会见军方人员，重金收买他们的支持。"
 BRA_adhemaredna_increase_adhemar_influence_3: "与社进党合作"
 BRA_adhemaredna_increase_adhemar_influence_3_desc: "社进党或许不是巴西最强的党派，但它终归是由阿德马尔主导的党，而且是他本人的利剑和坚盾。总统将会和党派领袖们一起商讨战略，确定大会议程。"
 BRA_adhemaredna_increase_adhemar_influence_1: "准备总统演讲"
 BRA_adhemaredna_increase_adhemar_influence_1_desc: "阿德马尔将发表公开演讲，巩固自己作为巴西政府首脑的地位，埃德娜就不必露面了。"
 BRA_adhemaredna_increase_edna_influence: "[BRA_adhemaredna_increase_edna_influence_dyn_title]"
 BRA_adhemaredna_increase_edna_influence_desc: "[BRA_adhemaredna_increase_edna_influence_dyn_desc]"
 BRA_adhemaredna_increase_edna_influence_2: "团结反对派"
 BRA_adhemaredna_increase_edna_influence_2_desc: "埃德娜副总统将会见社民党、工党和社进党的批评者，号召其团结起来对抗阿德马尔。"
 BRA_adhemaredna_increase_edna_influence_3: "召集内阁"
 BRA_adhemaredna_increase_edna_influence_3_desc: "官僚集体是挡在解决巴西问题面前的一座大山。埃德娜将会尝试说服内阁成员同她一起在会议上对抗阿德马尔。"
 BRA_adhemaredna_increase_edna_influence_1: "倡导清廉作风"
 BRA_adhemaredna_increase_edna_influence_1_desc: "腐败是阿德马尔最大的弱点，也是我们攻击他的最好目标。埃德娜将会通过演讲呼吁终结巴西社会的腐败。"
 BRA_adhemaredna_increase_edna_influence_0: "拉拢工会"
 BRA_adhemaredna_increase_edna_influence_0_desc: "工会一直是工党的支持者，副总统将会见工会领袖，听取他们的担忧，削弱阿德马尔的力量。"
 BRA_adhemaredna_increase_cooperation_med: "§h阿德马尔§!和§V埃德娜§!的关系§G改善了§!。"
 BRA_adhemaredna_decrease_cooperation_med: "§h阿德马尔§!和§V埃德娜§!的关系§R恶化了§!。"
 BRA_adhemaredna_increase_cooperation_low: "§h阿德马尔§!和§V埃德娜§!的关系§G轻微改善了§!。"
 BRA_adhemaredna_decrease_cooperation_low: "§h阿德马尔§!和§V埃德娜§!的关系§R轻微恶化了§!。"
 BRA_adhemaredna_increase_influence_adhemar_high: "§h阿德马尔§!的影响力§G大幅上升§!。"
 BRA_adhemaredna_increase_influence_adhemar_med: "§h阿德马尔§!的影响力§G上升§!。"
 BRA_adhemaredna_increase_influence_edna_high: "§V埃德娜§!的影响力§G大幅上升§!。"
 BRA_adhemaredna_increase_influence_edna_med: "§V埃德娜§!的影响力§G上升§!。"
 BRA_adhemaredna_impending_strife: "领导权危机"
 BRA_adhemaredna_impending_strife_trigger: "§h阿德马尔§!和§V埃德娜§!已经§Y达成共识§!。"
 BRA_adhemaredna_impending_strife_fail_effect: "§V埃德娜§!将会尽全力攻击政府，制造混乱，使其陷入§Y灭顶之灾§!！"
 BRA_adhemaredna_relationship_trigger: "§h阿德马尔§!和§V埃德娜§!的关系仍有改善空间。"
 BRA_adhemaredna_relationship_trigger_negative: "§h阿德马尔§!和§V埃德娜§!的关系可能会恶化。"
 BRA_adhemaredna_over_effect_tooltip: "§h阿德马尔§!和§V埃德娜§!的关系已经§e无可挽回……§!"
 BRA_adhemaredna_over_good_effect_tooltip: "§h阿德马尔§!和§V埃德娜§!的关系已经§G牢不可破§!。"
 BRA_increase_edna_influence_timer: "埃德娜的影响力在增强……"
 BRA_increase_edna_influence_timer_desc: "选举制度竟然让我们的政敌占据了政府的核心位置。我们的副总统本应是劳多·纳特尔，但现在待在这个位置上的却是埃德娜·洛特。围绕着她形成的小圈子正在日益壮大，侵蚀着阿德马尔的政府影响力。"
 BRA_increase_edna_influence_timer_effect_tt: "§V埃德娜§!的影响日日§G增长§!，已成§V心腹大患§!。"
 BRA_set_central_bank_policy_slush_fund_tt: "我们的央行政策将被设定为§Y藏匿小金库§!。"
 BRA_clear_central_bank_policy_slush_fund_tt: "我们的央行政策将会明朗。"
 BRA_the_adhemar_presidency: "阿德马尔任期"
 BRA_the_adhemar_presidency_desc: "赞美上帝，我们做到了！阿德马尔拿下总统之位了！\n\n惊魂动魄的选票政治让我们失去了一些同志，比如阿德马尔总统的左膀右臂劳多·纳特尔，他的副总统提名被埃德娜·洛特挫败了。和一个装腔作势的左翼副总统合作无疑会限制阿德马尔的野心，然而现在还不是撕破脸的时候。\n\n在我们等待埃德娜·洛特放松警惕的同时，总统也拿出了一份计划，来向选民们证明自己的手腕。阿德马尔当过医生，也在圣保罗当过政客，他对巴西紊乱的医疗系统有着刻骨铭心的认知。前总统洛特只知道摆弄他的龙虾、捣鼓什么土地改革，要不就是支援南非，却对库比契克留下的宝贵遗产不闻不问。公共医疗系统严重资金不足，供不应求，我们的改革将要改变一切。\n\n我们要把注意力放在国家的健康问题上，向民众证明，阿德马尔总统的本事可不是偷来的，而是挣来的！"
 BRA_setting_up_the_house_of_cards: "搭起纸牌屋"
 BRA_setting_up_the_house_of_cards_desc: "世上无人能独力统御一切。聪明的臣子知道，自己在君主的计划中至关重要；明智的君主亦了然，能力出众且忠心耿耿的臣子不可或缺。\n\n阿德马尔总统开始任命部长、寻找顾问、聘请各位置的关键人员。其中的绝大部分人都是他在圣保罗政坛结识的：他们都是阿德马尔的朋友，还欠着总统的人情债……甚至还有人欠着金钱债。这些人在圣保罗把所有事情都办得漂亮妥帖，同时将贪污腐败控制在尚可接受的度上。总统要求他们在巴西利亚如法炮制，协助总统发起针对医疗保健事业的闪电战。\n\n虽说他们确实忠心不二，但并非所有人都称得上总统之友，许多人都有不可告人的小秘密。反对派会密切注视内阁中的任何异议与贪腐的痕迹。阿德马尔总统将搭起他的纸牌屋，接下来的几个选择必须谨慎小心。不然的话，只消一个小丑就能爆破整栋大厦。"
 BRA_shut_her_out: "让她走开"
 BRA_shut_her_out_desc: "埃德娜·洛特副总统是个黑白分明且野心勃勃的人，还好像深信自己是救济贫苦巴西工人的天选使者。这些性格特征都足以说明她不可能在巴西政坛混得下去，更不要说在阿德马尔总统的计划里发挥什么作用了。她很可能会抓到腐败的蛛丝马迹，然后借机削弱总统的势力。如果总统的计划里冒出来一个工党救世主之类的角色，那右翼的盟友可要大发脾气了。总之，埃德娜·洛特就是个危险人物。\n\n现在是计划的早期阶段。立即将她排除在外，毫无疑问这会激怒工党的人。既然我们的种种行为都在表明，无意给予副总统任何权力或者影响力，肯定会让她加大对阿德马尔总统的反对力度。但是真的别无选择。她得到的任何情报都会进一步增加她对我们的威胁。埃德娜·洛特为了她的副总统职位早已和我们苦战了一番。上帝确实有教导我们要宽恕仇敌……但是卧榻之侧岂容他人酣睡，我们只是对风险保持警惕的话，祂老人家想必不会责怪我们的。"
 BRA_let_her_in: "请她进来"
 BRA_let_her_in_desc: "诚然，总统与副总统的关系并不热络。但埃德娜·洛特有颗良善的心，她对社会最弱势群体的关照毫无虚假成分。总统在聆听了她那正气凛然、有理有节的演讲之后，决定给她一个成为最佳榜样的机会。\n\n我们会与埃德娜·洛特及工党共事，进一步强化医保法案。同时这也可以离间昔日的工党-社民党联盟，稳住左翼成员。虽说如此行事确实会为诸如全民盟之类的右翼人士攻击政府大开方便之门，但只要法案能够通过，这些都不成问题。如果连最穷困的巴西人都能得到医疗保障，全民盟还要因为我们愿意与其他政党合作的行为而继续攻击政府的话，那就未免显得太冷漠无情了。\n\n我们在为全巴西人谋福祉，全民盟如果还敢说三道四，那丢脸的可是他们！"
 BRA_working_with_the_udn: "与全民盟共事"
 BRA_working_with_the_udn_desc: "既然我方不愿意和副总统的党派合作，那就需要寻求其他方面的支援。全民盟的保守派素来对总统的民粹主义倾向持质疑态度，但这不代表他们就油盐不进了。我们会将基督教机构整合到医保系统的框架中，同时会为全民盟各选区提供政治拨款，从而争取到保守派的支持。右翼政敌时常抨击政府的过度干预行为，但绝大部分人心里都很清楚，心怀感激的选民对连任的用处有多大。\n\n当然了，拉塞尔达一定会大为光火，然后出言反对。不过就算乌鸦再怎么聒噪，全民盟也不是他一人的家天下。在乌鸦巢里掏东西，他不生气就怪了。阿德马尔总统可以忍受虚弱老鸦那愤怒的嘶吼，但绝不能接受医保改革无法实现的结果。"
 BRA_building_on_kubitscheks_work: "站在库比契克的肩膀上"
 BRA_building_on_kubitscheks_work_desc: "此前，库比契克总统在他的任期内上马了太多的项目。可以肯定的是，他期望自己再次当选，并在自己原本的基础医疗改革上更进一步。但不幸的是，库比契克并没有意识到，社民党的主导地位会被一个新人劫走。\n\n我们会充分利用这位前总统的改革措施以及他支持创立的新生医疗官僚机构。另一方面，医疗部门中的公务员职位空缺数量十分庞大，我们可以将其用于奖励党内朋友及企业说客。阿德马尔总统意图将业内的专业知识技能与我党的忠实拥趸牢牢结合起来，打造出长期稳定的政治结构。毕竟纸牌屋总是需要精心打理的。\n\n希望洛特副总统能被医疗改革带来的喜悦蒙蔽双眼，不要发现我们究竟在干什么。"
 BRA_cooperating_with_the_ptb: "与工党合作"
 BRA_cooperating_with_the_ptb_desc: "不出所料，为埃德娜·洛特敞开大门，就意味着关上了通向右翼的大门。诸多全民盟的政客愤愤不平，将我们的医保改革斥为共产主义者的疯言疯语。阿德马尔总统可不会为他们的离开而哀悼，但他会逐一记下这些人的名字，然后在公众得到崭新的医疗系统后点名抨击他们。\n\n我们释出愿意和副总统并肩同行的诚意之后，工党展现出了超乎想象的合作姿态。像布里佐拉和古拉特这些重要的工党成员均已要求和总统会面，商讨计划的细节。他们可能会提出进一步扩大医疗改革范围的要求，全都要价不菲。这可能会刺激到我党的一些支持者。不过我们奉劝他们想清楚了，社进党只重实干，不喜空谈。阿德马尔总统可不会怕再增加那么一点小小的债务。"
 BRA_cooperating_with_udn_governors: "与全民盟州长合作"
 BRA_cooperating_with_udn_governors_desc: "医保改革要想落地生效，除了要在联邦层面进行讨论之外，还要征得林林总总的州一级机构批准通过。\n\n无论属于左派还是右派，大多数州长都充满戒心地死抱着州政府特权不撒手。我们可以肯定，左派州长们不管态度多么冷淡，总还是会听一下我们的提案。但是，更保守的州很可能坚决反对我们的工作。在这些州长看来，全国医保改革和我们伟大的联邦共和国国情格格不入。\n\n所以，阿德马尔总统必须努力说动亲全民盟的州长，比方说巴拉那州的内布拉加。好在全民盟的支援会大大帮到我们。总统一贯集迷人魅力、诡诈骗术、暗中要挟和黑金交易于一身，无论如何，保守的各州必须对我们屈膝投降，让州权见鬼去吧！"
 BRA_expand_the_ambulance_system: "扩展救护车系统"
 BRA_expand_the_ambulance_system_desc: "库比契克关于卫生部门有个好想法：他要带领巴西进入救护车时代。那时还是圣保罗州长的阿德马尔深以为然，协助他创建了圣保罗州的机动救护车队。现在，该向国内其他地方推广救护车了。\n\n诚然，伟大的改革不总是需要巨大的代价。让日本的丰田、美国的福特和巴西的本地车企参与一场竞标大战：外资企业要是想讨好我们，就不得不向我党奉上大额的回扣；与此同时，还可以用合同拉拢本地的友好车企，政治上也能做足姿态。这样一来，我们的方案可谓是皆大欢喜，全巴西的纳税人都笑开颜！"
 BRA_expanding_the_vaccination_programs: "扩大疫苗接种项目"
 BRA_expanding_the_vaccination_programs_desc: "巴西幅员辽阔，地理位置也十分优越。然而，位于赤道附近的地缘与广袤的丛林带来了数不胜数的疾病。我们有太多的人民被热带疾病折磨，甚至因此失去生命。\n\n但是我们可以用疫苗接种这一现代奇迹，拯救黎民百姓。许多曾经的绝症如今都可痊愈。不过，许多巴西人还无法获得这种改运救命的东西，这仅仅是因为他们的村庄地处偏远。\n\n州长阿德马尔曾在圣保罗开展了大规模疫苗接种，而总统阿德马尔现在要在全国范围内采取同样的行动，举国之力遏制和消除可预防的疾病。因此，我们的国家医疗改革必须从一场对抗这个微型敌人的伟大“圣战”开始。"
 BRA_an_unholy_alliance: "邪恶联盟"
 BRA_an_unholy_alliance_desc: "自从所谓的“邪恶联盟”被推入大众视野以来，巴西的政局动荡便愈发变本加厉。保守党反对派不断声讨我们与激进左翼的结盟。更有部分党内成员悍然叛逃全民盟反戈一击，公然指责我们向共产党与其他极端派系阿谀曲从。\n\n当暴风雨来临时，最好的选择便是直面它。面对千夫所指，阿德马尔总统示之以横眉冷目，并与工党内的激进派别确立了进一步的合作。医保法案已近在咫尺，我们自当不畏奸邪，践行主的旨意。"
 BRA_improving_the_central_bureacracy: "改善中央官僚机构"
 BRA_improving_the_central_bureacracy_desc: "前总统库比契克的野心可与法老王相媲美，需要一整套由文书、官僚和高阶祭司组成的指挥系统。庆幸的是，这规模庞大又强而有力的官僚体系已延伸至医疗领域，库比契克在那里进行了一些改进。除此之外，老总统还花了一些时间，尽其所能地精简了各个部门。\n\n但不幸的是，这个官僚体系在许多方面还是太过复杂了。我们可以削减冗余，加快系统运转速度、降低成本，并且充分与私人私营医疗公司整合。此外，将权力集中到少数更为重要的职位，为党和总统的盟友创造出更多的职位。因此，通过用忠诚而有能力的人员填补官僚体系，我们可以在未来多年里为医疗体系留下自己的印记……无论他们的出身如何。"
 BRA_convincing_the_senate: "说服参议院"
 BRA_convincing_the_senate_desc: "要使法案在参院通过，需要我们每一个盟友的帮助……以及相当多政敌的勉强支持。\n\n阿德马尔总统将投入更多政治资本，在参议院投票前的最后阶段影响其他党派以支持我们的目标。从影响仍对我们抱有怀疑的全民盟，到确保社进党的自身团结，再到争取工党或社民党的帮助。这最后阶段的努力对我们目标的达成与否至关重要。\n\n总统并不能为这次冒险的成功打包票。然而，作为一个行动派，他更喜欢在这最后的时刻里采取行动，而不是静待最终投票的结果。"
 BRA_creating_a_national_public_option: "全国公共选项"
 BRA_creating_a_national_public_option_desc: "早在他第一次竞选总统时，许多人就已经指责过阿德马尔的狂妄自大。幸运的是，我们的老大并不关心那些小人的想法，过于顾忌他人观点可做不了艰苦的治理工作。与工党谈判后，阿德马尔总统推出了一个放眼世界也并无先例的项目，全国公共选项。巴西公民从摇篮到坟墓都可享受其帮助。\n\n即使在党内，许多人都公开宣称这项政策的步子迈的太大了。他们认为对医疗保健的“布尔什维克化”将是一个代价高昂的错误。许多省长，尤其是那些与全民盟结盟的，对中央政府过度干涉各州内部事务感到怒不可遏，怒斥这将是联邦的终结。他们甚至断言总统已经堕落为腐败的布哈林主义分子。\n\n但总统确信要继续推进议题。在埃德娜·洛特的支持下，阿德马尔总统明白这项政策将深受本党的选民和工党成员的欢迎。阿德马尔总统将通过这绝妙一击，确保自己的总统地位，使左翼选民纷纷投奔到我党旗下。此举也为工党未来的崩溃埋下了伏笔，他们终将成为政府中无关紧要的小党派。"
 BRA_present_the_bill: "提交议案"
 BRA_present_the_bill_desc: "一切都已结束，现在就看计数结果了。阿德马尔总统已经获得了他能够得到的所有支持。现在是时候将法案提交给参议院了。\n\n这是关系到大量政治声望的一战。我们只能祈祷我们的准备已足够充分。"
 BRA_celebrating_our_great_victory: "庆祝伟大胜利"
 BRA_celebrating_our_great_victory_desc: "胜利！\n\n医疗保健法案毫无争议地通过了。阿德马尔总统在记者和拥趸面前亲手签署了这一法案，一时间掌声雷动，欢呼不止。我们终于可以庆祝这次伟大胜利，面向未来了。\n\n我们此次胜利的影响将会体现在方方面面。我们这次成功的谈判向各派别证明，尽管有一些怪癖，但阿德马尔总统是一位经验老道的谈判高手，也是一位坚实可靠的合作伙伴。医疗保健法案的通过也能帮助我们进一步打压拉塞尔达，确保我们对右翼的控制，如果我们不能从意识形态的纯洁性上打败他们，那我们就在人气上打败他们。终于，我们的政治基本盘开足马力，我们也终于可以转向经济建设来充实国库以及我们的腰包。\n\n洛特副总统毫无疑问会持续跟进我们的进展。不过执政党的地位既已确立，那么阿德马尔总统自然也能找个合适的时候腾出手来对付他那喜欢惹事的副总统了。"
 BRA_blame_them_for_its_failure: "找替罪羊"
 BRA_blame_them_for_its_failure_desc: "失败！法案在摇篮中被扼杀了。各路卑鄙无耻的参议员纷纷出动，对我们的议程大加阻挠。\n\n对总统阿德马尔来说，这次失败尤为痛苦，他的个人形象遭受了严重的损害。人民之所以选举他，是因为他收钱但办事，但现在他却干不成事了。那么巴西又该何去何从？\n\n拉塞尔达的秃鹰们还在盘旋，我们应该立即反击。形势所迫，我们得献祭一个替罪羊。而倒霉的经济部长巴雷托先生将担当替罪羊一职。\n\n贝内迪托·马尼扬伊斯·巴雷托会因为自己的“过失”而被革职，阿德马尔总统将挑选德高望重的幕僚长劳多·纳特尔接任。待我方的联盟稳定下来后，就可以将目光放到新的议程上了。"
 BRA_planning_our_next_steps: "计划下一步"
 BRA_planning_our_next_steps_desc: "最近，晨曦宫内贵客盈门。总统忙于和杰出的政治家、工业家和经济学家会晤。工会领导人在总统府的走廊上与官僚们擦肩而过。我们的总统在各类社交活动里居中指挥，塑造巴西的未来。\n\n总统想要建成一个南美版的拉斯维加斯，吸引来自世界各地的游客寻求愉悦和放松。总统想将巴西打造为地区经济的龙头老大，坐拥现代化的基础设施和优化的官僚体系。总统想要打造能同心协力的政治机构，并以社进党作为它的绝对核心。\n\n巴西在未来会拥有以上全部，以至更多的东西。在规划会议的期间，阿德马尔总统还给瑞士方面打了一两通电话。当然，最重要的是追踪自己的秘密银行账户情况如何。阿德马尔总统总是放眼未来，高瞻远瞩。"
 BRA_eradicate_illiteracy: "根除文盲现象"
 BRA_eradicate_illiteracy_desc: "我国大约三分之一的人口，即超过2500万巴西人，无法阅读、写作，或两者皆无！这场文盲危机主要出现在被大城市的官僚们遗忘的农村地区。他们倒是在城市里引领着繁荣，而普通巴西人却在农村挣扎求生！相当长时间以来，他们一直无法获得提升教育水平所需的政策。这种被忽视的状况完全不可接受，尤其是对于本届政府。我们将开始一项全面的教育计划，确保他们获得其应得的教育，赋予他们与我们大城市里的同胞平等的机会！没准在选举季，他们新接受的教育将使他们具备给我们投票的常识……"
 BRA_national_school_expansion_program: "学校扩张计划"
 BRA_national_school_expansion_program_desc: "文盲危机的主要成因是农村和贫民窟地区的学校严重不足。在其中一些地方，多达四分之三的人口完全无法阅读和写作，更别提接受恰当的教育了！我们需要立即行动以缓解这一问题。政府将在巴西的贫困地区大量建设学校，这一措施将会增加广大人民的受教育机会。毕竟，这也是我党一直以来的真正目标！"
 BRA_start_in_amazonas: "起步于亚马孙"
 BRA_start_in_amazonas_desc: "横亘在我国辽阔北疆的亚马孙地区占巴西陆地面积约40%，更不用提这里还拥有世界上最大的森林。在收获其丰富物产的同时，那些在这里扎根的人却被我们忽视。被遗忘的亚马孙在国家政策制定中常常缺乏代表，因为长久以来我们都只关注其资源。够了，该对这片地区进行规划了。我们要证明即使是在我国最偏远的地方，我国的每一个公民也能得到本届政府的关照……不过嘛，我们也必须谨慎规划财政预算，毫无疑问在该地区兴建必要的学校设施将是一项巨大的开支。"
 BRA_listen_to_ednas_ideas: "埃德娜的主意"
 BRA_listen_to_ednas_ideas_desc: "虽然让教育改革变成社进党的独占项目更好，但不可否认的是洛特副总统在这方面确实更有经验。教育部门有什么需求，内阁中没有人比她更了解。因此，为了项目的顺利实施，就不该忽略她的建议……不过呢，我们也可以利用这个机会控制财政部的支出，以“保证”工党对该项目的支持。而且项目肯定会顺利通过。"
 BRA_maintain_high_standard: "保持高标准"
 BRA_maintain_high_standard_desc: "教育我们伟大国家的年轻一代时，巴西的教师们事实上承担着一项不被感激且令人沮丧的工作。因此，采取各种措施来使他们的工作能得到更多回报，并以此维持我们的高教学标准非常重要。我们将以法律形式明文规定他们的权利，包括最低工资、师生关系、职业晋升等等。此外，根据埃德娜的建议，我们将设立培训课程，以确保他们的职业技能达标，并提升他们的能力。显然，这一切还是要等到教师工会从工党转投社进党后才能付诸实践。在他们开始支持我们的“收钱但办事”先生之前，他们不会从这个计划中获得一分钱支持。"
 BRA_pay_raises_for_teachers: "为教师加薪"
 BRA_pay_raises_for_teachers_desc: "通货膨胀对我们伟大社会的各部门都造成了伤害，尤其是对教师。我们需要提高他们的工资，以适应物价变化，并基于他们的资质提高他们在社会中的地位。这将鼓励他们在现在的经济形势下继续从事教育工作，并激励其他人也开始教育我们的年轻一代。你问项目资金将从哪里来？不用担心，如果出现问题，要相信车到山前必有路嘛……"
 BRA_help_nordeste: "援助东北"
 BRA_help_nordeste_desc: "1500年，葡萄牙人就是在东北登陆了巴西，从而开启了我们400年的历史。我们的巴西国家就是在名为萨尔瓦多的旧都上一砖一瓦地建成的。但现在，东北几乎全是穷困的农业区；现代化的巴西利亚更是完全取代了她曾经的地位。重振东北过去的荣耀，必须要落到实处了。让我们扩大整个地区的教育项目；多建学校，扩招教师。虽然这里不如亚马孙地区那样地大物博，但是既然这片地区有着全国数量最多的州，那就意味着我们可以争取到更多的参议员，这对我们太重要了。毕竟，要是这里遍地文盲，我们又怎么找出足够多的官员和选民呢？"
 BRA_fullfil_psp_promises: "履行我们的承诺"
 BRA_fullfil_psp_promises_desc: "在教育部长的运作下，我们不需要真的做出什么惊天动地的改革。只要牢牢跟随竞选时的承诺走，就能让选民们心满意足。尽管这些政策未必是最有效的，但一定是人民最喜闻乐见的。"
 BRA_establish_pilot_agrarian_program: "农业项目试点"
 BRA_establish_pilot_agrarian_program_desc: "在我们伟大的教育工程里，最重要的承诺之一就是开办三级农业学院。农村工人一级，技术员和乡村教师一级，农学家和兽医又一级。让我们从中西部的试点项目开始，缓步推进这个庞大的项目。从库比契克时期开始，这里扎实的农业基础就开始蓬勃发展。如此一来，我们将不只是向人民履行竞选承诺，更能够通过完成库比契克未竟的事业获得政治支持。"
 BRA_equality_of_state_and_private_education: "教育平等化"
 BRA_equality_of_state_and_private_education_desc: "尽管我们已经推行了全面的教育改革，这项工程还是超出了我们独立完成的范围。我们必须免除私立学校和教育机构的税赋，如此才能鼓励行业发展，并推动公立和私立教育的平等化。这对上层阶级和部分中产阶级来说百利无害，还可以一揽保守派的支持。真是一举两得，轻轻松松！"
 BRA_put_the_bill_to_vote: "递交参议院"
 BRA_put_the_bill_to_vote_desc: "法案已经草拟，但接下来才是艰巨的任务：切实地把法案提交至国会。我们必须付出成倍的精力：拉关系，送红包，不惜一切代价也要让阿德马尔的法案通过。事成之后必能让我们的支持率更上一层楼。况且，这还能证明人民的侠盗才是全心为人民！"
 BRA_renovate_old_schools: "翻新老学校"
 BRA_renovate_old_schools_desc: "新学校拔地而起的同时，我们也不能忘了现存的老学校。它们大多封闭闷热、拥挤狭窄，卫生情况更是不堪入目。是可忍孰不可忍！我们要立刻请估价师计算翻新费用，并列出条件最糟糕的一批学校。旧的不去，新的不来！"
 BRA_increase_health_awareness: "提高卫生意识"
 BRA_increase_health_awareness_desc: "我们的伟大总统阿德马尔是医学生出身，他从未忘记自己作为一名医生的本分。没有人比他更懂——防患于未然，才是健康生活的关键。让我们把医生派往巴西各地的学校，检查青少年的健康状况，什么小恙都不要放过，同时教育他们基本的卫生和正确的营养知识。为了更健康的巴西！为了生机勃勃的巴西！"
 BRA_promote_sport: "推广体育运动"
 BRA_promote_sport_desc: "在光荣的圣保罗州担任州长时，阿德马尔向各学校的体育设施投入了相当可观的资金。不忘初心啊，他现在寻求在全国范围内推广这一举措，划拨的资金将用于新的篮球场、新的排球设备、新的足球鞋和那些你能叫得上名的项目！要记住，只工作不娱乐会让人变呆（而且很不健康）！众所周知，体育和身体活动能让你活得更久，没准这还能在未来帮助我们削减一些医疗保健资金……"
 BRA_build_dormitories: "兴建宿舍楼"
 BRA_build_dormitories_desc: "根据我们最新的估算，整个巴西只有大约10万名大学生。为了摆脱这尴尬的数字，副总统洛特提议为大学生建造廉价宿舍，以鼓励人们接受高等教育，同时减少学生们的交通成本。这些雄心勃勃的年轻男女们可正在我们备受尊崇的学府中发掘自己的才能呢。这些住宿设施可能不是最豪华的，但有总比没有强！"
 BRA_no_child_left_behind: "不让任何孩子掉队"
 BRA_no_child_left_behind_desc: "普及受教育机会、增加学生数量对我们的计划至关重要，而提升年轻学生的素质也同样如此。人们不能期望一个还在为下一顿饭发愁而营养不良的学生成绩优异，或者期望一个残疾学生在被公共机构忽略的情况下跟得上为普通人设计的课程。因此，我们必须确保每个学生都能获得免费、足量的餐食，以确保贫困生不会因此掣肘。此外，我们将为残疾学生安排特殊课程，经过特殊培训的教师对他们的照顾将充分而体贴。"
 BRA_changes_to_curriculum: "更换课程表"
 BRA_changes_to_curriculum_desc: "在农村地区，比小学教育更缺乏的就是中学教育：即便是在那些能接受初等教育的农村孩子中，有机会踏足中学教室的也很少。尽管我们新建的学校够大，可以同时容下中小学学生。但在老学校里，我们必须精打细算，引入“双班制教育”，以向所有渴望接受教育的人提供机会。此外，作为多语言习得者的阿德马尔已经要求全国大学生必须学习一门外语，不管是罗曼语、日耳曼语，还是日语。能说多门外语的阿德马尔深刻理解能与外国人直接交流的好处：如果我们能更好地了解外国友人，财源自然滚滚而来。"
 BRA_university_scholarships: "大学奖学金"
 BRA_university_scholarships_desc: "自然，阿德马尔本人也曾是一名学生，他还没忘记学习的艰辛。从考前突击、小组讨论，到考试答疑，毕业需要投入难以想象的大量时间来支持。因此，我们的大学生应该把全部时间投入课程学习，而不是分散精力赚钱打工。表现优秀的学生将获得奖学金，帮助他们全身心投入到学习中去。当然，不会有人指责我们这是在用信封系统来博取他们或他们家的选票的。"
 BRA_provide_modern_facilities: "现代化教育"
 BRA_provide_modern_facilities_desc: "显然巴西的教育水平永远也到不了广东的高度，但若是仅论创新性，我们仍有赶超的机会。按理说第一步应当是现代化现有的研究设施并扩大它们的规模，以此推动我们的高等教育水平跟上世界的发展，与澳大利亚和加拿大这样的国家并驾齐驱。谁知道呢，到头来我们可能还能跻身世界第一梯队。"
 BRA_put_religion_back_at_the_proper_place: "神学回归课堂"
 BRA_put_religion_back_at_the_proper_place_desc: "现在在学校里，神学是一门选修课，这是对神明的亵渎！我们的年轻人需要且一定要清楚自己在上帝的天堂中身处何处，所以我们会把神学加入小学与中学的必修课程。不管你是个基督徒、是个穆斯林甚至是个无神论者，都将领受我主永恒的福祉与救赎。"
 BRA_ensure_freedom_of_teaching: "教育之自由"
 BRA_ensure_freedom_of_teaching_desc: "我们曾向教师许诺教学方式上的更多可能性和更大灵活性，我们无意食言！教师将不再被教条标准约束。相反，他们大可采纳他们认为更适合自己学生的整体性方法。只要他们还跟着课程表，我们就没有必要忧虑他们是怎样教育我们的下一代。"
 BRA_supply_textbooks: "给孩子新教材"
 BRA_supply_textbooks_desc: "我们需要换掉现行的老教材以使我国学生跟上所有最新的科研突破，无论是理科的、人文的，甚至是政治的。我们需要立马把过时教材换成新教材，要让新教材享受免税待遇。当然最重要的是，我们伟大总统阿德马尔的头像应当印在每一本教材上。"
 BRA_deal_with_adult_illiteracy: "消灭成人文盲率"
 BRA_deal_with_adult_illiteracy_desc: "我们在努力消除青年文盲的同时，也不能忘记老一辈人。何其不幸啊，他们一辈子都不会阅读，更别提写作了。正如洛特副总统和工党所建议的那样，我们应该利用保罗·弗莱雷的“解放教育学”，竭尽所能地提高成人识字率。这种方法鼓励师生之间的进行对话，以激发学生的兴趣并改变现状。有300名甘蔗工人通过这种方法在短短45天内就能读写了！我们将在全国范围内复制这一巨大成功，寻找愿意为文盲组织免费课程的教育工作者。在阿德马尔总统的严厉注视下，老者的智慧也不能浪费！"
 BRA_brasil_numero_uno: "巴西第一"
 BRA_brasil_numero_uno_desc: "我国的教育体系长期为资金不足和组织混乱所困。好在经过阿德马尔总统一番大刀阔斧的改革，教育体系很快得到改善并迅速扩张。只有打好坚实的教育基础，巴西才能在未来跻身世界强国之列。\n\n现在，我们离实现这一梦想只差最后一步：向成功者取经。我们将聘请外国专家来巴西，指导对教育体系的全面重建。崭新的课程和教育方法，还有社会寄予的厚望，这三者会成为巴西焕然一新的教育体系的基石。"
 BRA_we_are_on_the_right_way: "此即正道！"
 BRA_we_are_on_the_right_way_desc: "我们收集了巴西各地的民意调查资料，并得出了如下结论：我们的扫盲计划是一场属于阿德马尔总统和社进党的完全胜利！我国青年接受小学、中学和高等教育的比例远胜以往，我们的孩子将比以往任何一代人都更加聪明、更富才华，为将来岁月的经济发展筑牢根基。其次，无论大人小孩，文盲率出现了破天荒的下跌趋势。人们现在可以干许多工作，不必困守田垄之间了！\n\n大多数被调查的人都把这次成功归因于阿德马尔总统和社进党，而他们肯定会在即将到来的选举中涌泉相报。愿这美好时光永不结束。"
 BRA_weve_got_to_keep_on_moving: "我们仍须努力"
 BRA_weve_got_to_keep_on_moving_desc: "巴西是个大国，大在其内部国情相异万千，有好有坏。而其中危害最深、影响最坏的当属其严重的贫富差距。是它，让人们在想到巴西时，认为她是个声名狼藉的“穷”国。没有人，绝对没有其他任何人比巴西现任总统阿德马尔·德·巴罗斯更清楚于此了。\n\n这就是为什么他是信封系统最坚定的信徒。因为它毫无疑问的是巴西政治中最有效的社会福利手段。根据其所需，每个公民可以经此领取到基本津贴。可能有些人会称其为“民粹主义的选举贿赂”，乃至于指出其可能带来的经济效果是“值得怀疑的”。但这些指控对阿德马尔和他的政府来说完全是一堆废话，只因他们深痛于巴西正面临的贫困，而无畏付出任何代价！"
 BRA_help_rural_workers: "支持农民"
 BRA_help_rural_workers_desc: "首先，阿德马尔博士是一个清醒之人。他熟知他的祖国和人民，更重要的是，他了解是什么问题在困扰着他们。并且，与他的前任们不同，他不会在解决问题的路上半途而废。多少年了，构建和扩大巴西工人权益的崇高事业被历届总统班子提了又提。\n\n然而，他们只在帮助巴西城市产业工人方面取得了一些成功，而农民依然受困于剥削和贫困。但他们不必担心，因为对他们而言没有比总统阿德马尔·德·巴罗斯总统更好的朋友了。因为他的一项大胆的新改革会把现有的工作权利和立法条例的适用对象，尤其是成立工会的权利，普及给所有巴西农民。这一历史遗留错误终将得到纠正！如果你认为阿德马尔总统这么做也是抢了基督民主党的风头，那也没什么错。"
 BRA_adhemar_agrarian_reform: "“农业改革”"
 BRA_adhemar_agrarian_reform_desc: "这可能很难，但一个人得问心无愧。即使贵如阿德马尔总统，这条规则也同样适用，尽管他的土地改革法案能纠正地区失衡，但寡头们的不满也已浮现。如果他尝试进行激进的土地改革方案（这将涉及宪法层面的改革，以使发债购买土地成为可能），那寡头们将撤回对他一切支持。\n\n因此，为安抚所有人，他的政府应坚持宪法所规定的现金偿付。不过，他也来了点创新，毕竟这种改革所需的资金额实在太大。而不幸的是，他的其他目标也需要花钱。所以，他将开始在偏远地区征收土地，而那里恰好有一小群孤立的村庄或足够有文化的选民可以动摇。然后，在电视、报纸和广播上展示其成果，然后在每次选举前/每年一次重复。廉价而受欢迎是总统阿德马尔·德·巴罗斯眼中最好的解决方案。"
 BRA_we_just_want_more_and_more: "需求无止境"
 BRA_we_just_want_more_and_more_desc: "结束了！阿德马尔总统现在可以为巴西的土地改革问题松一口气了，因为它已是既成事实。巴西人民可以安心了，因为祖国母亲的伟大儿子阿德马尔·德·巴罗斯博士始终站在他们这一边。然而不幸的是，在这片被称为巴西的热带无主之国，政治上的休息只有死者才能享受。因为他现在必须着手处理另一个影响巴西农民的紧迫问题——巴西农业的化肥供应。如果这一点得到保证，政府将能够将巴西的农业扩展到更差的土壤，并将其生产力提高到前所未有的程度。这有望再次提高阿德马尔总统在农村的支持率。"
 BRA_use_old_allys_experience: "旧友的经验"
 BRA_use_old_allys_experience_desc: "在阿德马尔·德·巴罗斯辉煌而又饱受争议的巴西政治生涯中，他学到最宝贵的一件事就是防患于未然好过亡羊补牢。正因如此，他才决定着手解决肥料供应商问题。既然美国和加拿大都是离巴西最近的供应商，而且两国都有着悠久的贸易历史，阿德马尔何必去改变我们的优良传统呢？当然不必，阿德马尔政府不仅不会破坏这条联系，还应该大大地增进它。此外，我们还要在以前未曾注意过的区域拓展贸易，毕竟OFN在南美可没有比巴西和它的天才总统阿德马尔更好的盟友了。"
 BRA_check_the_assets_of_new_friend: "新朋的资产"
 BRA_check_the_assets_of_new_friend_desc: "在阿德马尔总统漫长而又饱受争议的政治生涯中，他学得最透彻的一件事就是，不论是在政坛上还是生活中，朋友永远多多益善。既然如此，巴西政府为何非得把美国当作主要的商业伙伴，而不管自己能否获得好处呢？为何不趁现在亡羊补牢，寻求更好的选择呢？只需拜托德国大使，我们就能联系上好朋友赫尔曼·约瑟夫·阿布斯，他的IG法本公司正是我们的不二之选。第一次世界大战期间，由于难以从智利进口硝酸盐，德国人被迫发明出新方法，即哈伯-博施法来生产肥料。这一方法帮助德国实现了硝酸盐的自给，同时还提高了氮肥的产量。正因如此，阿德马尔总统才要去找他的新朋友聊聊，看看能从他们那里得到些什么。"
 BRA_expand_ministry_of_agriculture: "扩张农业部"
 BRA_expand_ministry_of_agriculture_desc: "阿德马尔总统充分意识到，要在农业领域进一步实现他的目标，就必须承担起整顿巴西农业部的艰巨任务，自上而下进行改革。他确实有份数目庞大的目标清单：首先，创建指导灌溉和重新造林工作的职务；其次，在河流疏浚和运河建设方面修建大规模的基础设施；第三，将技术站的服务项目与农业研究机构紧密地协调起来；第四，建立旨在实现农业机械化的地区性市政服务；最后，立即组织不动产登记。目标数目众多，全部势在必行。而且一如既往，当阿德马尔来拍板时，成本问题不会被纳入到考虑之中。"
 BRA_irrigation_channels_in_nordeste: "东北灌溉系统"
 BRA_irrigation_channels_in_nordeste_desc: "阿德马尔·德·巴罗斯总统不是三岁小孩，所以他的政府没有忽视困扰巴西的一个最大问题——东北部的干旱问题，而它几乎和巴西本身一样古老。作为回应，一个最现代、最有效的解决办法在他脑中浮现。政府将运用现代化的自动喷灌系统，大幅扩大巴西东北部的灌溉系统，目标是覆盖整个地区！至于东北地区土壤贫瘠的现状，该地区的每个农民都将会相应地获得由我们提供的新工具和新机器！不管怎样，阿德马尔·德·巴罗斯的总统任期终将以其受欢迎的现代化政策而被人铭记！"
 BRA_combatting_crop_pests: "根除虫害"
 BRA_combatting_crop_pests_desc: "病虫害问题由来已久，连圣经都记载着上帝自己用它来对付埃及人的故事。如果问有谁会了解这段历史，那答案就是阿德马尔·德·巴罗斯总统。巴西何其有幸，这还不是他唯一擅长的领域。他完全明白，巴西的广袤农田正受着各种害虫的侵扰。巴西农民何其有幸，阿德马尔刚好有办法解决他们的问题。\n\n阿德马尔当局将向巴西各地的农民提供农药，作为虫灾的应对措施。而在农作物受到破坏性更强的病原体感染的特殊情况，我们会采取更激进的解决办法，将感染地区完全隔离，一把火全部烧尽，尤其是那些受柑橘溃疡病影响的地方。愿人们知晓，只要有了阿德马尔的天才解决方案，即使是圣经中的问题也造不成什么危害。"
 BRA_social_security_reform: "社会保障改革"
 BRA_social_security_reform_desc: "一国元首若能体恤民情，了解百姓所需，这对国家来说何其有幸！而阿德马尔·德·巴罗斯博士就是这样的人，他无比清楚是什么折磨着巴西人民——那便是巴西那臃肿无比、职能分散的社会保障体系，他的政府对此再清楚不过。\n\n一个睿智的领导人不仅会发现问题，还会解决问题。因此，阿德马尔政府将为所有人建立一个单一的国家社会保障机构，从而使我们的社会保障覆盖面扩展到前所未有的水平。"
 BRA_minimum_pension: "最低养老金"
 BRA_minimum_pension_desc: "阿德马尔总统有很多优点。他聪明，有魅力，甚至在巴西的许多女性选民看来，还很迷人。但最重要的是，阿德马尔总统是一个清醒、有爱心之人。巴西退休人员的问题一直是他心之所系，但不幸的是，他们往往只能依赖家人的帮助勉强过活。够了，不能再这样下去了！从现在开始，阿德马尔政府将建立最低养老金制度，其金额将与现行的最低工资持平。只要努力工作、定期向巴西政府缴纳税款，各位公民定能体面地安享晚年。"
 BRA_guaranteed_maternity_leave: "保证产假"
 BRA_guaranteed_maternity_leave_desc: "阿德马尔总统和洛特副总统之间的关系既不算和平也不算友好，二人都十分讨厌对方。阿德马尔不喜欢埃德娜，因为她是他最讨厌的两样东西——该进坟墓的“瓦加斯主义”建制派和新左翼的“进步”政治的标杆。但他有时也必须承认，她也会提出好主意。时不时采用她的计划，对社进党巩固女性选民的支持非常有帮助。话说，她那关于“产假法”的构想应该能鼓励人口增长，而这必将在社进党下次竞选的统计图表上产生明显反应！"
 BRA_labor_courts_in_big_cities: "大城市里的劳工法庭"
 BRA_labor_courts_in_big_cities_desc: "虽然巴西国家要对热图利奥·瓦加斯博士长期执政期间留下的完备的劳工法律致以崇高的敬意，但怎么执行这些法律却另有说法。作为瓦加斯事业的接班人，阿德马尔·德·巴罗斯总统将偕社进党政府，对协议中的错误加以纠正，填补现行立法中的法律漏洞，继续沿着瓦加斯为巴西国家开辟的漫长进步之路向前迈进。除此之外，还要在每个州的首府都建立一个劳工法庭，撑起社进党的巨伞保护巴西人民免遭贪婪企业的魔爪。"
 BRA_hospices_for_old_workers: "老工人的安宁病房"
 BRA_hospices_for_old_workers_desc: "阿德马尔·德·巴罗斯总统有许多广为流传的称呼，但在这里就没必要逐一赘述了。在这其中，被公认为最能概括他本质的称谓是——“人民之子”。作为一个没忘本的人，他对同胞们的需要和痛苦感同身受。尤其是那些老工人，他们经历了长时间的艰苦劳作，饱受各种疾病的困扰。他们中的一些还身患某些不治之症，几乎没剩下几年活头了。因此，为使他们能有尊严地离开人世，阿德马尔政府将开始建造新的安宁疗护病房。希望不会有人在贫困和孤独中度过生命中的最后几个月。"
 BRA_the_shield_against_inflation: "对抗通胀之盾"
 BRA_the_shield_against_inflation_desc: "人们从不同角度、以各种称谓来描述阿德马尔·德·巴罗斯总统。而在这些广为流传的名号中，有一个是“智者”。作为一个知识渊博的人，他完全了解世界的运作方式，没什么比通货膨胀还可恶的了。这是库比契克政府犯下的最大过错，并且仍在纠缠着巴西，蒸发中下层民众的存款。为解决通胀，阿德马尔政府将采用一种简单的解决办法，即工资指数化（指工资基于特别设置的物价指数进行浮动）。多亏于此，我们的选民将不再受到通货膨胀的影响，而巴西的发展之路也将继续延伸。"
 BRA_increase_of_unemployment_benefits: "提高失业救济"
 BRA_increase_of_unemployment_benefits_desc: "每个巴西人都应该有一份工作，但失业还是困扰着许多人。这可能是由于健康原因，或是在“灵活就业”。通常情况下，反对我们的人可能会争辩说，增加失业救济耗资巨大，将使经济泡沫进一步膨胀。但巴西社会可不是一般社会，经过我们的努力，就业人数明显增加，而失业人数自然会随之下降。不管别人怎么看，为那些有需要的人增加一点福利不会增加我们的预算负担。\n\n有了惠及所有民众的强力补贴计划，我们又在进步之路上迈出了坚实的一步！"
 BRA_money_for_our_defenders: "犒劳保卫者"
 BRA_money_for_our_defenders_desc: "“哦，巴西的保卫者啊，无论你是在天空、海洋，还是在原野上，接受这个来自强大巴西的爱吻吧，她赞赏着你的价值。”\n\n二十年前，成千上万的小伙子们被派往战场，抵御可恶的欧洲法西斯，捍卫我们的自由，但直到现在我们还没有给予他们所应有的感谢。为了弥补我们的疏忽，老兵们可以优先享受我们的医疗体系、全国范围内的免费公共交通，并得到更多的退休金！他们的生活将有依靠，而我们也在进步的征途中找到了新的盟友！"
 BRA_critical_support_to_state_apparatus: "行政部门现代化"
 BRA_critical_support_to_state_apparatus_desc: "如果管理着巴西的人不上心，那么巴西就不可能实现现代化。对于官僚机构，我们仍有许多工作要做，只因这里净是我们信不过的人。要打造一个新的巴西，我们必须加大对许多机构的控制，任命我们信任的专家来助力实现我们的伟大愿景。\n\n如果这些人对这片由上帝保佑的神圣土地上的现代化消极怠工，那么我们就把他们统统开掉，代之以愿意合作的人。"
 BRA_finalize_works_in_congresso: "作通国会工作"
 BRA_finalize_works_in_congresso_desc: "这项法案不能失败，因为它可以保证我们在未来几年继续留在政府中。我们将不计成本，确保国会投票顺利。只要搞定了国会，谁又会在意一个无名的经济学家对本政府怎么花钱的看法呢？如果我们能在不起冲突的情况下通过我们的改革，我们以后就只需要担心经济了。"
 BRA_healthcare_initiatives: "医疗新政"
 BRA_healthcare_initiatives_desc: "谁能比我们的领导者阿德马尔博士更懂得规划理想的医疗体系呢？他年轻时全身心投入医学研究，成就了自己在这一领域的专家地位。现在，是时候让我们国家的每一家医院都受惠于总统深厚的知识和经验了。我们的医院因此会变得更加高效，焕发创新活力。现在，不妨增加对医生团队的投资，这笔资金将成为他们前行道路上的有力支持和值得信赖的伙伴。"
 BRA_prevention_over_treatment: "防大于治"
 BRA_prevention_over_treatment_desc: "要彻底改革我们的医疗系统，让它焕发新生，我们还有很长的路要走。除了重建现有的医疗模式，专注于对疾病的应对之外，我们还需要大力发展预防医学，注重疾病预防。\n\n为了确保全国劳动者的健康，让他们随时准备投入到我们美丽国家的工作中，每年都将有来自政府拨款支持的医生对他们进行全面的体检，包括验血、验牙、测身高和测体重。这些措施会让他们有个好身体。"
 BRA_kill_malaria: "消灭疟疾"
 BRA_kill_malaria_desc: "阿德马尔·德·巴罗斯总统不仅是巴西史上最伟大的政治家和领导人之一，还是一位学富五车的医学博士。他十分清楚疟疾在巴西这样的热带国家有多么可怕，而事实也的确如此：近年来，除南里奥格兰德州以外，整个巴西都难逃疟疾的毒手。为消灭这一疾病，政府将在亚马孙州以及东部疫区的房屋内喷洒DDT，同时继续使用氯喹治疗发热病患。"
 BRA_anti_alcoholism_campaigns: "禁酒运动"
 BRA_anti_alcoholism_campaigns_desc: "我们的总统，阿德马尔·德·巴罗斯，一定是全巴西，乃至全世界最足智多谋的人，他对世界了如指掌，明辨是非善恶。他充分看出，他充分意识到，酒精造成的问题比所有其他兴奋剂加起来还要多，暴力行为、脑损伤和肝损伤还只是其中最严重的问题。所以，他计划促成公共卫生政府部门与教会组织联合，发起一场全国范围内的大规模禁酒运动，同时悄悄上调酒精税率，用多出来的税收资助禁酒运动。"
 BRA_uncover_secrets_of_mind: "精神医疗改革"
 BRA_uncover_secrets_of_mind_desc: "全世界最博学多识的伟大人物之一——阿德马尔·德·巴罗斯总统非常清楚，精神病学研究近年来取得了不少有趣的进展和突破。其中的典型是去机构化，这一想法在意大利和美国有一些追随者，这项研究成果的诞生要感谢诸如氯丙嗪之类的新型精神药品，这些药品正在帮助我们优化治疗病人的手段，并使我们有机会帮助精神病人回归到正常的社会生活中去。将这项最新研究成果投入实际应用，不仅能激发我国精神病学领域研究的创新活力，还能减少精神病院的床位数量，从而减少预算支出。"
 BRA_oncologys_time_to_shine: "肿瘤学突破"
 BRA_oncologys_time_to_shine_desc: "巴西总统阿德马尔·德·巴罗斯是一位天才这件事已经无需赘言，因此他对最新科学发现有所了解也不足为奇。他注意到，随着DNA的发现，肿瘤学的科研水平即将跃升到一个新的层次。这就是为什么他的政府将确保能够使用最新的仪器自行进行相关研究，包括DNA的测定。此外，巴西政府将尽可能给予已经取得了突飞猛进的放射疗法以更广阔的应用与发展空间，因此政府将大规模进口线性粒子加速器并应用于相关领域，使巴西的肿瘤学努力追上世界先进水平。"
 BRA_cheap_drugs: "廉价药品"
 BRA_cheap_drugs_desc: "阿德马尔·德·巴罗斯总统与巴西人民之间的恩情故事三天三夜都说不完。作为一个深刻了解巴西百姓疾苦的领导人，他意识到医疗的普及程度是一个深深困扰着巴西人民的问题。所以，为了让老百姓能买到必需药品，他领导下的政府将彻底取消这些药品的进口关税，并提高药品进口量，以确保巴西人民能以负担得起的价格疗愈疾病。当他们走向投票箱时，他们知道，能治好他们病的恩人只能是社进党和阿德马尔政府。"
 BRA_higher_salaries_for_our_protectors: "世界一流医生"
 BRA_higher_salaries_for_our_protectors_desc: "在成为巴西有史以来最伟大的医生之前，阿德马尔·德·巴罗斯无非是一个微不足道的医生。他以自己的职业背景为荣，也知道在巴西社会中医护工作会给他极高的声望，但他认为这还远远不够，\n\n因此，他认为他的个人使命就是出台更多的激励政策，鼓励下一代参与这伟大的使命。巴西最伟大的医生，阿德马尔·德·巴罗斯将会亲自确保巴西劳动者能够获得他们应得的报酬。"
 BRA_yet_another_victory: "又一次胜利"
 BRA_yet_another_victory_desc: "任何巴西人都无法否认，唯有社进党始终将民众福祉置于心头。自掌权以来，没有哪个政党能像光荣的社进党这般切实改善普通巴西人的生活品质。如今社进党之所以能获得前所未有的政治影响力，全仰仗热图利奥·瓦加斯的法定继承人、巴西最伟大的总统阿德马尔·德·巴罗斯博士的英明领导。在他的治下，农业生产力空前提升，社会保障真正惠及民众，医疗体系创新浪潮涌动。当巴西终于踏上通往现代化进程的最后一程，人们应当永远铭记这位伟大领路人——阿德马尔·德·巴罗斯总统的卓越贡献。"
 BRA_diagnose_the_military: "诊断军队病因"
 BRA_diagnose_the_military_desc: "称职的医生在面对病人的疑难杂症时，首先要做的，就是给患者来一套全面检查，然后才能做出正确的诊断。因此，我们必须对军队进行一次“全面体检”，找出其病因，然后想想该如何为洛特留下的烂摊子定制一套药方。我们对——或者说……国家对军队的控制——应当被加强，以便于将任何政变的可能扼杀在摇篮之中，并为我们在外人入住总统办公室后，继续坚持阿德马尔大夫的疗程提供“物理”保障……"
 BRA_fund_our_allies_in_esg: "资助学院的盟友"
 BRA_fund_our_allies_in_esg_desc: "高等军事学院里的那些索邦派本质上都是些实用主义者，所以要安抚他们其实很简单，就跟给小孩弄点新玩具玩差不多。我们将与高等军事学院的盟友进行沟通，拨给他们一笔新预算，将更多资金转移到他们的部门，供他们花销使用。枪支、火炮、坦克，任何能确保他们持续支持对抗内外威胁的资源，都将得到保障。"
 BRA_utilize_envelope_system: "利用信封系统"
 BRA_utilize_envelope_system_desc: "克鲁埃尔忙于列出一份可以信任合作的将官名单，而我们将要去弄些……非官方的事情。\n\n人们常常认为军旅生活找不了什么乐子，军事训练和行伍条例高于个人享乐。虽然这种认识在某种程度上是对的，但对于我们的高级军官来说，也许让他们……愉快一下，也是理所应当。我们将以一封置于桌上的褐色信封，为他们带来美酒、毒品、派对、豪车、美女和金钱，满足他们心中的所有欲望。这种博取支持的手段着实有些低级，但却十分有效。"
 BRA_start_true_modernization: "部队现代化"
 BRA_start_true_modernization_desc: "按照阿德马尔的思路，我们找出了军队的问题并为解决方案制定了提纲。现在是时候迈出第一步了：给我们的装备更新换代。现在，我们的军队还在用着十年前的土枪土炮，铁皮罐子和各种军用古董，其中一些甚至都能躺进博物馆了。\n\n装备的更新不仅仅能让我军为正儿八经的战斗做好准备，也能给将军们发上几件崭新的大玩具去阅兵式上显摆，更重要的地方在于，当我国边境全部列装上新鲜出炉、威力超凡的新式武器后，那些欺软怕硬的阿根廷鼠辈可得三思而后行了。"
 BRA_kitten: "航母魅影"
 BRA_kitten_desc: "如果这艘纯洁无瑕、靡坚不摧的60,933吨海军巨舰都无法让你热泪盈眶，你又怎能自称为真正的巴西爱国者呢？\n\n小鹰级航空母舰是美国智慧和技术进步的结晶。经美国各地的造船厂精心打造的她，身形庞大而又美丽，而美国人很友好地同意卖给我们一艘。她的影响不可低估，哪怕只是一只“小鹰”的存在也足以确保巴西在南大西洋的海空主导地位。\n\n巴西海军，保护我们的财富，守护我们的人民！"
 BRA_red_baron: "南洋红男爵"
 BRA_red_baron_desc: "谁会不喜欢航母呢？哦我的天呐，谁会不爱这推翻了一个庞大帝国的航空母舰呢？\n\n曼弗雷德·冯·里希特霍芬级航母是德国职业品质与精工设计的结晶。作为二战时期齐柏林伯爵号航母的延续，它的历史充满辉煌；毕竟，在海狮行动中，正是齐柏林伯爵号航母助力了德国入侵英国的攻势。当然，我们希望永远不要再次经历类似的事件。然而，做好准备永远没什么坏处，不是吗？"
 BRA_specters: "南锥体的“鬼魅”"
 BRA_specters_desc: "如一群愤怒的蜜蜂，幽灵战机横扫天空，向巴西的敌人降下死亡。\n\nF110喷气式战斗机是美国技术最先进的发明之一。其速度达到每小时1,604英里，能携带约18,000磅的弹药，这些战机将为我们打开通往空战全新领域的大门。无论是阿根廷人、马克思主义者还是巴拉圭的纳粹分子，都将在听到幽灵战机的尖啸声时战战兢兢，心生畏惧！"
 BRA_messerchmitts: "购买德国空军的玩具"
 BRA_messerchmitts_desc: "曾经把欧洲炸进石器时代的死亡天使现在将翱翔在巴西上空——不再制造破坏，而应保护人民。\n\n德国战胜后，德国空军擎天巨柱梅塞施米特驰名天下。英法俄和大多数旧世界国家都品尝过他们的怒火。如果我们买下它们，我们的敌人就将感受到同样的恐惧，因为我们展示出已经准备好面对全面战争的魄力。"
 BRA_train_with_ofn: "在美洲学校深造"
 BRA_train_with_ofn_desc: "就像阿德马尔说的，巴西需要的不是美国的钞票，而是其先进的科技和经验。山姆大叔，和蔼可亲的绅士，OFN的掌门人，他秉持的军事理念世界领先，他指挥的武装力量所向披靡。有这么一位好朋友在身边，不求助一下实在可惜。快把我们的小伙子和将军们送过去，让他们竭尽所能，把山姆大叔的技术和经验全部带回来。"
 BRA_restore_young_turks: "重立“少壮派”"
 BRA_restore_young_turks_desc: "很久很久以前，世界还不像今天这般剑拔弩张，各国间的交往也更为融洽。那时，我国的军官会被送去德国，和戴着尖顶盔的优秀德国同行们互相切磋一番，分享先进经验。回想起来，那段岁月真是好极了。尽管种种原因导致这一传统中断，但现在是时候将其重启了！我们的军官会被重新派到日耳曼尼亚，从德军精锐那里学习先进的规章纪律、战术策略和组织效率。一路顺风，先生们！"
 BRA_enforce_conscription: "强制征兵"
 BRA_enforce_conscription_desc: "对于征兵这个问题，我们的情况可不容乐观。虽然巴西法律明文规定，为国服役是每个年满十八岁男子的义务，但近年来我国的征兵率仍在持续下滑。这可不行——所有人都必须明白参军报国的意义。为了让公众懂得这个道理，我们将招募更多征兵人员，同时让警察善意提醒一下大家……违反法律的下场。"
 BRA_destroy_the_red_threat: "根除红色威胁"
 BRA_destroy_the_red_threat_desc: "阿拉瓜亚的坏消息源源不断，共产党叛军在那儿的影响力正不断提高。我们必须发动一切力量将红祸扼杀在摇篮之中，否则国家就有被颠覆的危险。我们将在亚马孙一带部署军队，共和国卫士们会得到我们的鼎力支持，好把这些渣滓彻底扫出去！我们国家可不会容忍这些革命疯子，要是觉得我们不够革命，那就给巴西共产党拉票去。"
 BRA_monitor_the_dissent: "监控异见"
 BRA_monitor_the_dissent_desc: "军队就和其他有影响力的机构一样，往往充斥着来自底层人员的抱怨和反对，而巴西也未能免俗。在巴西，中士、下士与其他新人组成的反对声，像是一块路障，给军队的日常工作带来接二连三的麻烦。\n\n这些低级军官的危害尚不及赤匪，但这些鼻涕邋遢、自作聪明的家伙，对军队的运作之道一无所知，这不仅是对我们的不敬，也严重干扰了我们的工作。是时候让这些家伙摆清自己的位置了。正好，我们在他们的队伍里安插了一名间谍，可以把他们好好整治一下……"
 BRA_supervise_constitutionalists: "管制护宪派"
 BRA_supervise_constitutionalists_desc: "尽管恩里克·特谢拉·洛特被革职，他仍在处心积虑地成为我方阵营的眼中钉。早在1955年，他纠集的那帮所谓的“护宪派”就霸占着军队指挥权，在反对他的地方蛮横地挥舞军事大棒，逼迫其就范。\n\n阿德马尔当然不会容忍这种危险存在。如今由社进党组建的政府完全执掌大权，我们终于有足够的实力让这帮混蛋哪凉快哪待着去了。每一个已经确定身份的洛特政治集团成员都将受到严格审查，并受到长期秘密监控。如此一来，我们就能随时获悉他们是否在以下犯上，并及时采取果断措施予以制止。"
 BRA_meet_with_almirante_alvaro: "会见阿尔瓦罗中将"
 BRA_meet_with_almirante_alvaro_desc: "美国、德国和日本都已经征服了原子物理学这座科学巅峰，并开发出了如太阳般炽烈而恐怖的核武器。在这三座泰坦巨神以及他们高悬于全世界头上的达摩克利斯之剑面前，世界上的其他国家都不得不向其卑躬屈膝。如果我们有朝一日能掌握这种骇人力量，光是想想就会有种君临天下的爽感。\n\n嗯，巴西的一些男人敢于梦想这一点。\n\n巴西海军副总司令，阿尔瓦罗·阿尔贝托·达·莫塔-席尔瓦海军上将是全国最有智慧的人之一。阿尔瓦罗是近年来推动巴西核武器开发计划的几位关键人物之一，人们也一致认为他在巴西实现拥核大业的征程中不可或缺。把他请到高原宫来吧，我们有很多要事需要和他商量。"
 BRA_find_uranium_and_tools_for_nuclear_program: "原子狂热"
 BRA_find_uranium_and_tools_for_nuclear_program_desc: "铀矿是解开原子之谜的钥匙。巴西的铀矿储量足够我们启动核计划，但遗憾的是受条件所限，还有其他很多东西我们无法自给自足，特别是我们缺少处理铀矿所需的特种设备。\n\n因此，如果要推进核计划，就必须从外部寻求所需的资源。目前全世界的主要供货商当中，有三家可能愿意把设备卖给我们，但他们必然会开出非常苛刻的条件。所以做好要低三下四地求人的心理准备吧，面子这东西不值钱。"
 BRA_manhattan_20: "曼哈顿2.0"
 BRA_manhattan_20_desc: "第一座核反应堆建立在美国的一座壁球场里，他们获取核能的能力也是在那里磨炼出来的，近年来美国始终是全世界核能领域的先驱者。尽管他们过去可能因为发展核能项目太晚，未能及时彻底扭转二战的败局，但他们现在在该领域取得的成就仍令全世界印象深刻。\n\n所以，我们应该与这种拥有共同利益的强国达成交易。然而，我们仍需小心择偶。美国好似一位善妒的情妇，她不可能坐视我们与其他超级大国鬼混。"
 BRA_deepen_ties_with_australia: "与澳大利亚深入交流"
 BRA_deepen_ties_with_australia_desc: "当我们能轻松找到一个新兴大国并建立合作伙伴关系时，我们何必跟超级大国绑定呢。澳大利亚既有丰富的铀矿资源，又有提炼铀矿石的必要技术。因为我们和澳大利亚的交易更多的是基于平等互惠的合作关系，而不是基于地缘政治的强弱差距，所以我们和他们打交道相比于和德国或美国打交道和平的多。\n\n然而，这个想法听上去非常诱人，但我们必须清醒地意识到：我们要硬着头皮去支付过于高昂的账单。无论如何，我们国家主权无需受到惨重的损失，所以我们会继续推进和澳大利亚的谈判。"
 BRA_hello_hermann: "你好啊，赫尔曼"
 BRA_hello_hermann_desc: "维尔纳·海森堡是本世纪最伟大的科学家之一。多亏他和其他德国科学家的聪明才智，德国才得以跃升至世界大国的地位，将美国梦寐以求的全球霸权狠狠踩在脚下。\n\n尽管德国的民族社会主义政权在某些方面与我国存在分歧，但是显而易见的是德国人知道如何运用核武器。因此，我们将会继续推动亲德的外交政策，与赫尔曼·约瑟夫·阿布斯接洽，让他为我们的核计划提供原材料。"
 BRA_construct_facilities_in_para: "帕拉的新设施"
 BRA_construct_facilities_in_para_desc: "现在万事俱备，核计划该上马了。为了掌握原子之力，我们已经付出了太多，巴西从未像今天这样接近这个伟大的目标，愿上帝保佑我们成功。天然的铀矿只有经过处理才能用于核试验，因此整个工程的第一步就是建设一座铀浓缩工厂。工厂的选址定在帕拉，之后我们将在附近再建设一座核试验基地。\n\n由于总统高度重视这一项目，因此我们要求相关的工程即使成本再高，也要全部以最高标准完成。巴西将举全国之力推进核计划，到时候会有军队入驻各个工程地点确保工厂建设进展顺利，以防有人暗中破坏我们的宏伟计划。"
 BRA_test_our_new_possibilities: "大张旗鼓"
 BRA_test_our_new_possibilities_desc: "万众期待的那一天终于到来了。为了眼前的这不只是一颗，而是两颗珍贵的核弹头，我们历经千辛万苦同外国人谈判，克服千难万险保证了物资运输，所有人都奉献出了自己全部的心血与汗水，最终我们成功了。社会进步党始终怀揣着伟大的理想，这一理想在今天变成了现实。我们已经拥有了这世界上最强大的武器，也没必要继续遮掩下去了。\n\n帕拉的核试验基地已经准备就绪，全世界的目光都聚集在我们身上。今天，巴西将举行首次核爆炸实验，这也标志着我们将成为全世界第五个拥有核武器的超级大国。我们的敌人将陷入恐惧，我们的盟友将感到庆幸，因为我们成为掌握了核武器的国家。\n\n§O现在，带好墨镜，准备观赏那朵壮观的蘑菇云吧！§!"
 BRA_keep_it_secret: "核模糊"
 BRA_keep_it_secret_desc: "成功了。在帕拉的秘密设施中。我们亲手打造了一柄上帝之矛。按照科学家们的计算，它的各项性能应该全部正常。无数个日夜的工作没有白费，我们将因此收获巨大的声望。\n\n然而，为了走到今天，我们已经付出了太多。虽然我们只组装了一枚核弹头，但哪怕是这一枚，理论上也蕴含着毁天灭地的力量，而我们苦苦寻求的不就是这种力量吗？既然最初的目的已经达到，我们也就无需再浪费钱财，它们可以被阿德马尔用在更重要的地方。好了，有人想开瓶香槟庆祝庆祝吗？"
 BRA_adhemar_the_heisenberg_of_brazil: "普罗米修斯"
 BRA_adhemar_the_heisenberg_of_brazil_desc: "他们说这事成不了。“天方夜谭”，“民粹主义的胡言乱语”，“好发空想、脱离现实”。他们质疑我们，拒绝信任我们。但他们错了。现在，看看我们吧！巴西已然成为核大国！放在几年前，谁敢做此等想象？\n\n阿德马尔敢。再一次，这位“盗火者”为巴西献上了最珍贵的礼物。他将被誉为我国的核弹之父，留下永世难忘的传奇。若你愿意以此称呼，他便是巴西的普罗米修斯。虽然像海军上将阿尔瓦罗这样地位稍显轻微的顾问可能也做了一点小小的贡献，但这仍是阿德马尔以慈爱之手引领巴西走向未来的又一范例。\n\n铺开红毯，开始庆祝吧！"
 BRA_a_humanist_economic_program: "人文经济计划"
 BRA_a_humanist_economic_program_desc: "阿德马尔1965年的竞选纲领中提到的一项关键改革措施就是他的“人文经济计划”。这一计划的核心目的是在巴西实现充分就业，换言之，就是要人人有房住，人人有工做，而且还得是一份好工作。\n\n要想推进这一改革，阿德马尔必须在参议院发表一次演讲，向诸位议员详细解释清楚他的新经济政策，之后才好实施改革法案。具体说来，首先会集中上马一大批基础建设项目，范围覆盖巴西全国，这一举措能够给私营企业带来很多发展机会，并且之后在开发我国各地的自然资源的时候，这些基建项目也能发挥非常重要的作用；其次，我们的改革将吸引大量外资进入，这些资金会成为我国经济腾飞的原始动力；最终，我们决定参考摩纳哥、拉斯维加斯和澳门的发展方式，将巴西建成拉丁美洲的金融业与博彩业中心，吸引全球的富豪到此，最终代替古巴成为欧洲和北美客户休闲娱乐的首选国家。\n\n这一改革计划相当缜密，堪称完美。只要它能够顺利实施，我们将最终实现充分就业这一理想，阿德马尔的成就将被永远铭记在所有巴西人民的心中。"
 BRA_barettos_dreams: "巴雷托的梦想…"
 BRA_barettos_dreams_desc: "尽管阿德马尔·德·巴罗斯总统是个博学多才的人，但他明白一个人就算读的书再多，也不可能穷尽世间所有的知识，因此他也经常听取其他人的建议。譬如阿德马尔就经常咨询他的经济顾问各种问题，后者对巴西目前迅速扩张的石油产业以及如何推动国家经济全面发展方面颇有独到见解。一直以来，这位经济顾问对阿德马尔忠心耿耿，为何不让他放开手脚呢？任何能让阿德马尔和社进党更受民众支持的决定我们都欢迎。"
 BRA_and_his_ideas: "…和他的计划"
 BRA_and_his_ideas_desc: "尽管阿德马尔总统作为一名伟大的国家领袖已经名扬海内外，但他并没有被名望冲昏头脑：他深知自己的能力和精力都有限，必须把很多重要的政务交给其他人完成。其中，阿德马尔给予了他的经济顾问巴雷托很大的信任，让他负责整顿巴西石油公司，复兴全国的石油产业。于是巴雷托空降到了巴西石油公司总部，按照阿德马尔的某位“亲密好友”的意思，把……几乎所有的腐败分子扫地出门，换上了信得过的人。此外，他还给各级员工都涨了工资，甚至还负责监督公司的日常运营，保证所有人都遵守企业的规章制度。巴西石油公司是全巴西最大的国有企业，我们不能让它在名为贪污和罪恶的泥潭当中继续堕落下去。"
 BRA_but_adhemar_knows_the_best: "阿德马尔心里有数"
 BRA_but_adhemar_knows_the_best_desc: "如果一个领袖不但不事必躬亲，而且还充分信任他的所有下属，那这人一定是阿德马尔·德·巴罗斯博士。但他也得承认，有些要紧事他老人家还是有必要过问一下。所以，阿德马尔认为，在巴西石油公司的扩张问题上，他有义务监督巴雷托部长的工作。因而当部长拟定企业扩张计划时，阿德马尔必须让每个董事对政府服服帖帖。毕竟哪个领袖和政党掌握政权，全国最大的公有制企业就得听谁的。如果要铸牢企业董事的忠诚之心，最好的办法就是给他们送点“小礼品”，给他们一点小甜头。为了让董事们充满干劲，阿德马尔将亲自去拜会他们，而且重申许诺：他们只要为总统和社进党政府尽忠竭力，我们就能让他们心满意足。"
 BRA_national_petrochemistry: "国家石化"
 BRA_national_petrochemistry_desc: "没人，肯定没人比阿德马尔·德·巴罗斯总统阁下更懂巴西的石油业。一说到巴西石油业的优势和劣势、尤其是说到国有大型企业巴西石油公司，总统更是一位如假包换的专家。所以他深知，炼油能力是影响该企业的关键因素之一。所以阿德马尔政府准备创办石化公司，旨在提升巴西石油的原油提炼能力。石化公司是巴西石油的子公司，主营业务就是石油化工。该企业将显著刺激巴西所有与化学相关的工业企业未来的发展潜力——尤其是需要乙烯的企业，因为石化公司提高了石脑油的转化速率，从而也提升了乙烯的产量。"
 BRA_create_cenpes: "创立CENPES"
 BRA_create_cenpes_desc: "一些人把阿德马尔贬低成没文化的土包子，但实际上，总统比巴西的大多数人都更有远见。他见识广博，深知科技强则国家强、企业强的道理。因此阿德马尔政府宣布，将在巴西石油旗下建立“莱奥波尔多·阿梅里科·米格斯·德·梅洛创新研发中心”，简称CENPES，专门负责公司的科研工作，通过高科技方案帮助其盈利，实现可持续发展。此举体现了阿德马尔政府的雄心壮志，即掀起一场全领域、全方位的巨大变革。"
 BRA_technocratic_approach: "技术官僚的手段"
 BRA_technocratic_approach_desc: "时代奔涌向前，信息的洪流亦如滔滔江水，它的流转随着时代的发展而愈发快速、愈发精准。新的数据无时无刻不在涌来，它们既可能证伪，也可能证实先前的想法。幸运的是，经济部长向我们表明，数据证明了我们的成功。深入分析后得到的数据表明，经过阿德马尔经济改革的第一阶段之后，巴西的石油开采量和盈利率都在稳步提高。这是贝内迪图取得的伟大胜利，也证明了他的改革方案是正确的。现在，巴西已经开始享受到改革带来的红利，这一切都要感谢阿德马尔政府！"
 BRA_new_standards_in_petrobras: "巴西石油的新标准"
 BRA_new_standards_in_petrobras_desc: "这世上没有哪个词比“搞掂”更讨人喜欢，也没有人比巴西总统阿德马尔·德·巴罗斯更喜欢听到这个词。随着第一阶段的完成，阿德马尔政府可以充分利用统辖巴西石油的主导地位，将资金源源不断地注入社进党的金库之中，并在这家恢弘巨企、巴西企业万神殿中至高无上的神龛之中，为其伟大、忠心、可靠、能干的下属找到一席之地。得到它，社进党的地位必将更加巩固，同时也能与其他部门通力合作。没有哪个党能比英明神武的社进党更会治理巴西！"
 BRA_start_manufacturing_of_jet_fuel: "生产航空燃油"
 BRA_start_manufacturing_of_jet_fuel_desc: "巴西领导人钟爱飞机，并且巴西是全球首个在政治竞选中大量使用飞机的国家。这其中当然也包括阿德马尔·德·巴罗斯博士！毕竟，桑托斯·杜蒙，这位航空之父就是巴西人。巴西理应开始在国内生产航空燃油，把燃油的价格打下来，鼓励国内使用航空器拉动经济。另外，这也将是朝着制造国产飞机迈出的第一步。此外，我们还得为巴西伟大的领导人阿德马尔总统送上一份小礼物。这将再次向巴西人民证明，只有社进党和阿德马尔政府才能使巴西跻身于世界工业强国之列！"
 BRA_expand_production_of_synthetic_rubber: "扩大合成橡胶生产"
 BRA_expand_production_of_synthetic_rubber_desc: "在19世纪的橡胶热潮时期，巴西亚马孙地区的人口显著增加，橡胶出口也在当时巴西的出口贸易中占据相当大的比例。对于这段历史，阿德马尔总统了然于胸，他也知道后来发生的事情：随着第二次世界大战的到来，这一轮橡胶热潮不幸地结束了。然而在阿德马尔眼里，挽回历史留下的遗憾永远不嫌晚。他认为，既然曾经有过一轮橡胶热潮，那就完全可以有第二轮。只不过这一次，工人将不再需要钻进满是蚊子的热带丛林里采集橡胶，取而代之的是更人性化、更卫生的工作环境。巴西橡胶工业的现代化将证明，社进党是引领巴西走上通往康庄大道的唯一力量。"
 BRA_new_refineries: "新的炼油厂"
 BRA_new_refineries_desc: "在阿德马尔政府的领导下，巴西已经在经济建设领域取得了巨大的成就，但我们的发展不会止步于此！巴西需要石油，政府需要石油，石油也需要巴西！因此，阿德马尔政府将在新的地方建造炼油厂，确保所有的油田都能得到开发。至此，巴西将比以往任何时候都更接近那个石油完全自给自足的梦想。石油计划取得的进展令巴雷托欣喜万分，阿德马尔也是如此。凭借这些成就，他将再次证明阿德马尔，而非社民党-工党联盟中的共党，才是瓦加斯总统的真正继承者！"
 BRA_expand_existing_ones: "扩张现有设施"
 BRA_expand_existing_ones_desc: "这世上没有比看到出色的工作成果更能让阿德马尔·德·巴罗斯总统开心的了。而当他看到贝内迪托的想法取得积极成果时，他高兴极了。不过嘛，花开花落寻常事，是时候踩一脚刹车了，这事已经花了政府不少钱了。该把重点放在其他方案上了，比如福利就是一个很好的话题。这些举措能让他在选民中的支持率更进一步，并维持社进党在巴西的主导地位。这样一来，他将对炼油厂进行一些小规模的扩建，作为其石油之旅的结束。对阿德马总统来说，这样就够了，贝内迪托的梦想已然实现。"
 BRA_pspobras: "社进党的巴西石油！"
 BRA_pspobras_desc: "巴西石油公司取得了巨大的发展与进步，毫无疑问这要归功于阿德马尔·德·巴罗斯总统和社进党执政下政绩斐然的本届政府。现在所有人都能看到，从巴西石油公司那里传来的各项数据都突破了历史最佳水平，这是不争的事实，阿德马尔政府取得了巨大的成就。巴西石油公司的成功改革再一次证明了只有社进党才能真正改变巴西，才能实现“五年跨越五十年”。凭借这一点，阿德马尔现在离连任总统的目标更近了一步，他要把巴西建设成一个真正的民主国家，巴西将永远由最优秀的政党领导！"
 BRA_the_true_builder_of_brazil: "巴西的真正建设者"
 BRA_the_true_builder_of_brazil_desc: "阿德马尔总统深知，在他带领巴西走向现代化的路上，还有许多工作要做。若是巴西想成为他梦想中的世界强国，就要铺设更多的道路、兴建更多的工厂、开垦更多的农田。阿德马尔跟库比契克和洛特那种人不一样，他们眼里只有社会精英的利益，而阿德马尔史无前例的工业计划将惠及整个巴西社会。社民党-工党联盟不配成为瓦加斯的继承人，我们的子孙后代将意识到，只有阿德马尔·德·巴罗斯和社会进步党才是巴西真正的建设者！"
 BRA_adhemar_connecting_the_nation: "连接国家"
 BRA_adhemar_connecting_the_nation_desc: "基建落后是当下我国面临的最重大的困境之一。阿德马尔过去在圣保罗执政时致力于弥补这个问题，该向全国推广“圣保罗经验”了，让全国其他地区的公路网有效运转起来。\n\n兴建一个巨大的工程项目，就是我们向巴西人民证明我们正在兑现承诺的绝佳方式！里约热内卢和尼泰罗伊这两座中心级别的大城市距离如此之近，却被瓜纳巴拉湾隔开。现在，将有一座桥飞架东西，连通两城。在阿德马尔的主持下，这座大桥将做为我国各地道路连通计划的第一步，以此证明阿德马尔有能力把基建这件大事办好！"
 BRA_contacting_foreign_experts: "联系外国专家"
 BRA_contacting_foreign_experts_desc: "要在全国各地出行，说起来容易做起来难。我们的城市本就建立在各种不同的地形之上，加之低收入人群聚居区的肆意扩张，使得往来于不同城市之间十分不便。而在农村地区，农场和社区之间的交通甚至更难，民众对此早已叫苦不迭。\n\n日本人在应对此类问题上有着丰富的经验。为了改善我们的基础设施，现在最需要的就是来自日本专家的帮助。在日本当地还有许多公司愿意参与我们的基础设施建设项目，这将使巴西的交通运输效率得到大幅提升。"
 BRA_the_foreign_experiment: "外国的实验"
 BRA_the_foreign_experiment_desc: "我们的城市规划部门正计划在圣保罗修建地铁。它不仅能方便数百万人的出行，而且肯定能够对城市的商业发展起到巨大的促进作用。摆在眼前的只剩下一个问题，那就是我们相当缺乏修建地铁和地铁网络的经验。\n\n日本有着全世界最发达的地铁网络，所以我们可以再向我们的日本朋友求助一次。他们的经验和知识对我们来说是无价之宝，日本可以帮助我们把圣保罗地铁，也是巴西的首条地铁，建成我们心目中最完美的样子。"
 BRA_building_up_urban_transport: "扩建城市交通"
 BRA_building_up_urban_transport_desc: "最有野心的一批城市规划者们提出了圣保罗地铁建设项目，与此同时，一些比较保守的顾问则认为我们应该着眼于改善现有的公交和铁路系统。但是谁规定我们不能两手都抓呢？将巴西的城市打造成供所有人享受的便捷大都市。我们将拨出额外的资金，雇佣更多工人以改善全国的公共交通设施，让人民的出行畅通无阻。"
 BRA_yet_not_forgetting_farmers: "不忘农民"
 BRA_yet_not_forgetting_farmers_desc: "如果说有一群人一直没能从巴西过去的工业化成就中获得应有的回报，这群人就是我国农民。这些田野间的男男女女任劳任怨、勤勤恳恳，数年如一日地为国家挥洒汗水，但往届政府却认为他们只会惹是生非、埋天怨地。阿德马尔总统不会容忍这种不公，他将认真倾听他们的担忧，仔细听取他们的诉求，只有这样才能让所有人都享受到巴西的繁荣。"
 BRA_the_great_bridge_builder: "伟大的桥梁建设者"
 BRA_the_great_bridge_builder_desc: "这世上难道还有阿德马尔总统办不到的事吗？在他的领导下，巴西再一次驶上了发展的快车道。一架架桥梁的建设计划提上日程，一条条道路在村落之间延伸，新的地铁也已经开工建设。在过去的这段时间里，阿德马尔联系了国内外的很多杰出的企业家，争取到了他们对于巴西国家发展的支持。阿德马尔会好好利用这些关系，确保他们这一代人留给子孙后代的是一个伟大且值得自豪的巴西。"
 BRA_continuing_brazils_march_forward: "巴西继续前进"
 BRA_continuing_brazils_march_forward_desc: "在过去三十年间，巴西的工业化运动取得了巨大的成果，新的工厂全力运转，以最高的效率产出各类琳琅满目的商品。但我们不能就此止步，坐视经济停滞不前。巴西必须在阿德马尔和社进党的领导下，坚定不移地走下去。"
 BRA_a_word_with_the_oligarchs: "和寡头谈谈"
 BRA_a_word_with_the_oligarchs_desc: "在巴西，有那么一部分人总是比其他人更有钱、更有势，这是公开的秘密。在其他总统任内，这些手握特权的寡头家族永远是带来麻烦的眼中钉，但阿德马尔还没有笨到明知这些人影响力巨大却还要找他们的麻烦。他想的是如何在合法的框架内尽力拉拢这些人，这需要非常小心谨慎，但如果真的能拿到寡头家族手里的钱，巴西的发展前景将不可限量……"
 BRA_intensify_steel_production: "强化钢铁生产"
 BRA_intensify_steel_production_desc: "瓦加斯刚建立新国家体制之时，他的首要目标之一就是实现钢铁的自给自足，不再需要从国外进口钢材。在过去的几十年里，这一雄心壮志早已被公众和政府所忘却，我们的经济和军事工业发展也走上邪道。现在我们必须弥补过去的失误，为了实现钢铁不再依赖进口这一目标而加倍努力。我们将建设新的炼钢厂，并且由政府出资设立若干科研项目以改良我国的钢铁生产技术。"
 BRA_hand_in_hand_with_the_protege: "与接班人握手"
 BRA_hand_in_hand_with_the_protege_desc: "阿德马尔明白，如果社进党不想只在巴西的历史上一闪而过，他就必须找到一个堪当重任的接班人。幸好社进党在圣保罗有着非常好的群众基础，那里有许多崭露头角的政坛新星，其中一位正是热图利奥·瓦加斯的儿子，名叫小热图利奥·瓦加斯。他在当地推行了很多发展主义政策，并且有着杰出的领导能力和公开演说技巧。我们得去一趟圣保罗，热情迎接一下这位社进党未来的接班人。"
 BRA_relying_on_old_friends: "依靠老朋友"
 BRA_relying_on_old_friends_desc: "尽管党内有不少人对美国人没好印象，但谁都无法否认从二战结束至今美国企业和政府对巴西的投资相当巨大，在国内局势混乱的现状下，我们最好不要随意变更外交政策。我们会再一次向美国求助，在他们的帮助下推进我国的工业化建设项目，根据过去的经验来看，他们会非常乐意继续在巴西投资。"
 BRA_parlay_with_the_eagle: "与黑鹰共舞"
 BRA_parlay_with_the_eagle_desc: "不得不承认，只要我们敢同德国人合作，不管哪一方面的合作，都必然会在社会上引发一场轩然大波。但巴西已经白白浪费了过去数十年间无数次与德国合作的机会，这仅仅因为前几届政府连确认一下德国能为我们提供什么都不愿意，而我们不愿意重蹈覆辙。德国臭名昭著的企业家、银行家赫尔曼·约瑟夫·阿布斯已经同我们取得了联系，希望我们允许他的公司进入巴西市场，我们会同他以及其他德国人展开谈判，看看他们究竟能够展现出多少诚意。"
 BRA_the_great_developmentalist: "伟大的发展主义者"
 BRA_the_great_developmentalist_desc: "巴西的街头热闹非凡，上班通勤的人们熙熙攘攘，预备开张的商店一家挨着一家。商人们乘着火车去到城里的CBD，在这里他们可以同来自全世界各个国家的客户见面商谈，最终签下一笔笔订单。农民们甚至天不亮就已经开始了一天的辛勤劳作，他们的双手托起了整个国家的粮食供应。\n\n这一切的繁荣都离不开阿德马尔在任总统时的工作成果。他的努力，不仅是台面上看得到的，还有隐藏在台面下的那些，开启了巴西经济发展的新时代。阿德马尔总统将能够在历史上与瓦加斯并列，成为巴西最伟大的人物之一。"
 BRA_a_gesture_of_peace: "和平姿态"
 BRA_a_gesture_of_peace_desc: "巴拉圭是我们的眼中钉。该国的法西斯主义过往断绝了我们与之合作的一切可能，更别说建交了。但是，阿德马尔可不会因为这一点分歧就放弃一个潜在的合作伙伴。\n\n巴拉那河是南美洲第二大河，蕴藏着巨大的潜力。然而，不论是我们还是巴拉圭都未建设大坝对其加以利用。我们将指示外交部与几位土木工程师合作起草一份相关项目的提案，但愿巴拉圭方面能按时完成他们分内的工作。"
 BRA_preparing_against_the_foreign_menace: "准备应对外国威胁"
 BRA_preparing_against_the_foreign_menace_desc: "我们表现出了合作与和平的善意姿态，主动创造了一次改善双边外交关系的机会。\n\n但巴拉圭人的回应是往我们脸上吐唾沫，拒绝了我们的提议。\n\n阿德马尔或许身段柔软，但他绝对不是一个在受到挑衅的时候忍气吞声的怂货！现在，谁也无法保证未来我国与巴拉圭的和平状态能够延续下去了，当那一天来临，巴西肯定已经准备好在阿德马尔的领导下迎接那场战争了。"
 BRA_the_greatest_industry_for_the_greatest_army: "大工业配大军队"
 BRA_the_greatest_industry_for_the_greatest_army_desc: "作为一名超凡脱俗的爱国者，阿德马尔一直在竭尽所能捍卫巴西，让她不受到那些威胁我国和平的战争狂人的侵犯，他是巴西军队的好伙伴！面对邻国的挑衅行为，阿德马尔别无选择，只能大幅度扩张军事财政开支，进一步扩充我军的装备水平和兵力规模。\n\n我国人民的安危是总统阁下一切决策的首要关键，他并没有主动挑起这场战争，但他必将领导巴西军民笑到最后。"
 BRA_negotiating_the_treaty_of_itaipu: "伊泰普条约谈判"
 BRA_negotiating_the_treaty_of_itaipu_desc: "完美！巴拉圭政府欣然接受了我们的友好提议。我们现在要做的，便是在阿德马尔的主导下就相关细节展开谈判，保证条约对巴西公平。这样，我们就可以为我们伟大祖国的人民提供更多能源了。"
 BRA_start_the_itaipu_project: "开展伊泰普工程"
 BRA_start_the_itaipu_project_desc: "随着合作协议最终达成，我们现在可以开始动工建设伊泰普大坝了，这座伟大的大坝也将永远彰显着阿德马尔永垂不朽的功绩。\n\n撇开德国在刚果中部修建的那个豆腐渣质量的面子工程不谈，伊泰普大坝将成为全世界最大的水电站，它将为巴西源源不断地输送电力资源，而且巴拉圭从中获得的电力也会多到不得不卖给我们一部分。一旦我们架设好通往圣保罗和里约热内卢的输电线路，一座取之不尽用之不竭的能源宝库就会为我们所用。巴西人民会永远牢记，阿德马尔为他们创造了这一切。"
 BRA_the_great_stateman: "伟大的政治家"
 BRA_the_great_stateman_desc: "没人想否认阿德马尔作为国家领导人在国内建设上取得的成就。巴西数不胜数的基建和工业项目正如火如荼地建设着。在外交方面，他取得的成绩向世人展示出他不仅是个杰出的政治家，同样也是一位杰出的外交家。在面对帝国主义者的威胁之时，他继承了前人的意志，拒绝向对方屈服，为了巴西的经济利益而抗争到底。\n\n先前瓦加斯总统在任之时，德国与美国便已开始觊觎巴西，但瓦加斯在面对这两只贪婪的老鹰之时据理力争，坚持国家的外交底线寸步不让；如今阿德马尔拿过了接力棒，继续毫不动摇地撑起这道底线。许多巴西的工人都只听说过外国的大资本家的故事，但所有巴西人都心知肚明，阿德马尔总统才是真正的幕后英雄。他为了人民的利益，跟那些大资本家斗争、斗争、再斗争。"
 BRA_vargass_true_successor: "瓦加斯的继业者"
 BRA_vargass_true_successor_desc: "热图利奥·瓦加斯总统刚一下台，巴西便再次陷入了混乱。新上任的人毫无经验，如果再这样下去，它很快就会粉身碎骨。这个南美洲最大的国家，也将变得一贫如洗，在帝国主义和激进主义的支配下，沦为又一个国家发展失败的典范。但幸运的是，最终有人站了出来，担起了重任。\n\n阿德马尔·德·巴罗斯正是那个在关键时刻站出来的人，那个拯救了巴西，将整个国家带回正轨的人，那个指引着巴西驶出那片险象环生、阴云密布的海面的人。今后阿德马尔将继续带领国家走向那个所有巴西人共同的梦想：一个经济繁荣、社会公正的新巴西。\n\n瓦加斯已经带领巴西驶出了贫穷之海，而巴罗斯将带领巴西驶入富足之海。"
 BRA_no_man_left_behind: "不让任何人掉队"
 BRA_no_man_left_behind_desc: "有几个指标可以简单易懂地阐明国家的经济状况。阿德马尔总统认为，失业是国家面临的主要威胁。不上班的巴西人压根就没法为经济做出贡献，而一旦开展各种各样的重大改革，他们还会被远远抛在后面。保障就业不仅能为巴西人提供稳固的收入来源，还能提醒人们到底是谁提供了这些工作，让他们在即将到来的选举中成为社进党的基础票仓。阿德马尔将提出“不让任何人掉队！”计划，致力于解决巴西国家的失业问题。巴西和外资工业都将享受劳动力涌入市场的好处，从最贫穷的公民到最富有的实业家都能共享经济繁荣成果。"
 BRA_the_cities_of_tomorrow: "明日之城"
 BRA_the_cities_of_tomorrow_desc: "赤裸裸的事实告诉我们，当今的经济体系严重依赖城市生产中心提供的燃料。虽然巴西肯定不缺劳动力，但人们正从农村涌入城市贫民窟，造成政治和经济上的分歧。为了巴西城乡的利益，不能再让他们任意迁徙了。阿德马尔总统将邀请外国企业到农村地区建立企业城，为当地带来经济增长和就业机会，为乡间家庭带来繁荣。外国资本不仅不必应付可能存在于城市地区的、令人讨厌的法律法规，而且他们还能以低于城市同行的工资雇佣农村工人。每个人都是赢家！"
 BRA_stick_with_our_old_friend: "依靠老朋友"
 BRA_stick_with_our_old_friend_desc: "尽管阿德马尔喜欢扯他那独立的外交政策，但要是对咱们国家与美国合作的区位和政治优势视而不见，那未免太蠢了些。两国之间的历史关系因为最近的事件而变得更加牢固，所以真没必要去触他们的霉头。此外，他们的公司财力雄厚，能为我们打造企业城镇的宏伟愿景提供资金。"
 BRA_new_times_new_allegences: "新时代，新盟友"
 BRA_new_times_new_allegences_desc: "面对现实吧：如果巴西真的想要选择自己的道路，那就不能继续依赖跟美国的贸易。阿德马尔总统敏锐地认识到了这一点，他一直在提升巴西与德国之间的关系。现在，是时候把这种关系提升到新的水平了。阿德马尔将向德国工业集团IG法本发出要约，邀请他们在巴西各地建立企业城。不过，细节决定成败，赫尔曼·约瑟夫·阿布斯可能不会同意阿德马尔的一些要求……"
 BRA_forlandia_2_0: "福特兰迪亚2.0"
 BRA_forlandia_2_0_desc: "聪明人打算解决一个问题，他首先要做的，就是看看是否有前人已经解决过这个问题。早在二十年代，福特公司就已经在巴西各地建立了企业城镇，试图自己采购橡胶以降低投入成本。有了我们对美国人的新承诺，我们应该要求福特和其他汽车公司根据他们以往的经验，在我们新的企业城倡议中发挥带头作用。他们知道建立这些城镇的好处，我们希望能说服他们带领其他公司加入农村投资的行列。"
 BRA_the_might_of_brazilian_labor: "巴西劳工有力量"
 BRA_the_might_of_brazilian_labor_desc: "巴西人有许多值得钦佩的品质，但到目前为止，最重要和最有价值的品质是他们热爱工作的精神。无论是农民还是名牌大学的学生，这个世界上没有人能否认我们公民的勤奋精神。人们自己知道这一点，我们将呼吁他们发扬这种精神，同时招募他们来企业城工作。每个巴西人都被要求做出牺牲；阿德马尔总统已经做了很多，现在轮到普通人了。"
 BRA_ig_farbens_ingenuity: "IG法本的智慧"
 BRA_ig_farbens_ingenuity_desc: "听说过福特兰迪亚吗？我敢打赌你没听说过，因为福特公司试图打破当时英国人对橡胶的垄断，结果输的一塌糊涂。美国的资本主义模式与巴西根本不相容，这点我们无需证明。相反，让我们转向我们最新的商业伙伴，给他们一个公平机会，看看他们能做些什么。IG法本是德国四大巨头之一，主要从事化工和医药项目。根据阿德马尔与IG法本总裁赫尔曼·约瑟夫·阿布斯的讨论，他们已经筹备了全面计划，准备在巴西各地开发企业小镇。只需开一个绿灯，就可以上马工作了。为什么要为难他们呢？"
 BRA_american_industry_brazilian_markets: "美国企业，巴西市场"
 BRA_american_industry_brazilian_markets_desc: "认为我国技术已跻身世界一流行列纯属自欺欺人。阿德马尔总统明白，现在的巴西不过空有志向而没有相应的实力。根据我们同美国人签订的协议，各企业城镇正在进口美国的工业设备，我们应该派工程师好好研究它们，比较其与国产设备之间的差距。毕竟，我们不可能指望美国人会一直帮忙。"
 BRA_german_science_brazilian_resources: "德国科技，巴西资源"
 BRA_german_science_brazilian_resources_desc: "巴西拥有丰富的自然资源，而目前探明的仅仅是很少的一部分。谁知道咱们的土地下面还埋藏着怎样的宝藏呢？不幸的是，颟顸的政府和恶劣的自然环境导致我们的开采能力平庸至极。当IG法本在农村建立工厂和城镇时，我们需要把资源留在自己手中。此外，我们还要采取措施，保证我们不会直接变成所谓的出口型经济。我们最不能忍的就是让我们的经济受制于外国伙伴的一时兴起——不，这绝对不行。我们的科学家与工程师将与德国伙伴合作，了解生产流程，总有一天我们的工业实力能够赶上他们。"
 BRA_a_roof_over_their_heads: "头顶屋檐"
 BRA_a_roof_over_their_heads_desc: "政客们大多都是心口不一的家伙。然而，阿德马尔可不是普通政客。我们的企业城加速了工业发展，同时也为巴西最贫困的那一批人提供了体面的工作和住房。谁会关心那些所谓的工党“伙伴”对近来热浪和工作场所相关死亡人数激增的看法呢？我们在企业的合作伙伴向我们保证，事故啥时候都可能发生，没有什么可担心的。我们要感谢阿德马尔和社进党将巴西的人民和产业推向新的高度！"
 BRA_a_gamblers_paradise: "赌徒的伊甸园"
 BRA_a_gamblers_paradise_desc: "巴西一直是南美洲的旅游圣地，拥有美丽的海滩和清澈的海水，还有精致的美食和历史地标。话虽如此，我们当然可以做得更好，而不是只让游客大嚼烤肉，再给基督他老人家拍照。这些东西他们玩过之后，就没啥理由再回来巴西了。\n\n阿德马尔总统有一个想法，把巴西从一个时髦的小地方变成世界主要的旅游中心之一。南美存在着亟待开发的赌博游戏市场。通常情况下，政府会觉得赌场只不过是有组织犯罪的幌子，但我们不再故步自封。在阿德马尔的领导下，巴西将变成赌徒的天堂，为我们新赌场所在的城市带来就业和经济发展！"
 BRA_old_money_from_old_europe: "老欧洲的老财主"
 BRA_old_money_from_old_europe_desc: "是时候开始在巴西筹建赌场了，钱的问题来到了我们脑袋上。虽然我们可以自筹资金建设赌场，但这样弄时间会拖得很长，没有什么好处。必须找一个外国合作伙伴来帮我们做这个项目。\n\n向美国和他们的加勒比伙伴要钱根本不值得。他们可能会把我们的赌场视为他们拉斯维加斯赌场的竞争对手，进一步恶化我们与他们之间的关系。让我们转向旧世界和他们的投资者，他们不太可能把我们在大西洋彼岸的赌场扩张视为对他们国家赌场的直接威胁。"
 BRA_bountiful_cash_from_the_new_world: "新世界的大把钱"
 BRA_bountiful_cash_from_the_new_world_desc: "没有什么比自由和公平的市场竞争精神更美国的美国精神了。话虽如此，我们得明白，我们是在与拥有几十年经验的美国人竞争。\n\n阿德马尔将亲自前往拉斯维加斯，与美国赌场集团谈判。我们不应故作声势，叫嚣我们的赌场要将拉斯维加斯取而代之，而应当伸出合作之手。我们会为他们提供一个南美前哨基地，扩大他们的业务，换取资金，从而发动我们的赌场。就像许多其他、的项目一样，巴西将与新世界携手合作，将赌场开放给所有的人。"
 BRA_european_experts: "欧洲专家"
 BRA_european_experts_desc: "说到赌博，欧洲人的水平简直举世无双。蒙特卡洛、波恩、日内瓦等欧陆大都会的赌场几十年来一直为赌博大亨们带来利润。积累了经验，就有了创新。\n\n众所周知，欧洲赌场已经开发出了令人兴奋的新方法，为大众提供安全合法的刺激——同时也开出了相当慷慨的支票以为回报。如果我们要与欧洲的赌场大亨合作，那么除了现金，我们还将引入这些新技术。"
 BRA_modernize_our_casinos: "现代赌场"
 BRA_modernize_our_casinos_desc: "巴西有很多东西举世闻名，譬如那如丝绸一般柔和的沙滩，炎热但秀丽的雨林，还有人气爆棚的餐厅——在那里能品尝到附近几英里内最美味的食物。当然还有巴西独特的文化气质：让人耳目一新的异国风情和优雅精致、人人都非常熟悉的怀旧格调在这里形成了完美的融合。\n\n但遗憾的是，巴西的赌场并不算出名。\n\n阿德马尔看中了博彩业具有的潜力，但巴西的赌场依然如此落后，这简直是把他的脸都丢光了。再怎么说，能判断一个国家赚钱水平的人只能是国家总统了。因此，阿德马尔政府决定投资巴西的赌场，在这轮投资结束之前，巴西就将成长为全球最大的博彩之都，没有之一。博彩之都，这名字听起来的确很霸气。"
 BRA_yankie_entrepeneurs: "美国企业家"
 BRA_yankie_entrepeneurs_desc: "作为一个完全建立在进取精神和企业家精神之上的国家，美国人在市场营销和向普通消费者推广新的消费方式方面占据主导地位，实在是不足为奇。虽然巴西在这方面也不差，但我们的国家缺乏美国所具有的某种火花。\n\n阿德马尔认识到这一点，决定向这些美国金融奇才提出咨询，以便巴西博彩业学习他们的方法。不久，我们伟大的国家也将加入他们的行列，踏上他们走过的黄金大道。"
 BRA_a_tropical_monte_carlo: "热带的蒙特卡洛"
 BRA_a_tropical_monte_carlo_desc: "全世界但凡对博彩业有一丁点了解的人，都知道蒙特卡洛这座城市一年有多少钱进账。不谦虚地说，数字大的吓人。来自全欧洲各个国家、各个行业的顶级名流，至少得是被德国认可的那些人，都一个个大摇大摆地走进那里的赌场，把数不清的钱挥霍在玩扑克、老虎机和其他各种赌博游戏上。\n\n谁说巴西就不能变成下一个蒙特卡洛，只不过我们是在热带而已。巴西东北部的气候和欧陆大部分地区非常相似，在那里建度假区简直是完美，完全可以把那里变成欧洲富豪们远在千里之外的第二个家，对他们来说那是同样温暖的新家，而对我们来说，那就是一棵巨大的摇钱树……"
 BRA_the_southern_las_vegas: "南美的拉斯维加斯"
 BRA_the_southern_las_vegas_desc: "“拉斯维加斯万岁！”无数醉醺醺的美国富人们共同喊出了这句话。他们驶上西去的公路，只为亲自体验一下这座传说中的罪恶之城。维加斯作为“世界娱乐之都”而被全世界人们所熟知，阿德马尔也把它作为巴西未来发展道路上学习的榜样。\n\n古巴革命爆发之后，我们终于有机会向着这个目标继续前进了。想要来一次短途旅行疯狂买醉的有钱人永远不缺，只不过与作为热带国家的古巴不再愿意招待这些人了。如果我们不去补上这个古巴人留下来的市场空缺，那简直是可耻的浪费。来巴西玩吧！南美的拉斯维加斯名副其实！"
 BRA_cash_in_our_pockets: "囊中钞票"
 BRA_cash_in_our_pockets_desc: "大功告成！阿德马尔又一次奇迹般地解决了问题，为巴西做出了巨大的贡献。在本届政府不断努力下，巴西已经是全球最大的度假圣地与博彩业中心之一，这一转变不仅让许多失业者获得了工作，让他们脱离贫困，也给国家带来了一大笔财政收入。作为一届有良心的政府，我们肯定不会滥用这笔钱，这笔钱我们会投入到由社进党主持的社会援助计划中，确保社会底层的巴西人脱贫。\n\n也许会有人批评我们这是在“花钱买选票”，或者以此诋毁阿德马尔，说他趁此机会中饱私囊，但这都是在胡说八道。如果巴西人民自己都认为能有如今的生活全要感谢阿德马尔和社进党，并且因此要投票给他，此乃民心所向，何来买票之有？至于借机捞钱的问题，退一万步说，就算总统真的在背地里给自己赚了一点小小的外快，那也很难上升到违宪的地步，对吧？"
 BRA_infinite_jobs_infinite_votes: "岗位多，投票就多"
 BRA_infinite_jobs_infinite_votes_desc: "全民盟和社民党中许多人认为不可能实现的目标业已实现。充分就业之梦，一度被认为只有像美国和日本这样的发达经济体才能实现的状态，在巴西得到了复刻。从快乐港阿雷格里到纳塔尔，没有人再为生计而发愁。“不让任何人掉队”计划取得了巨大的成功，社进党媒体正向巴西人民传达这一事实。\n\n阿德马尔总统不仅完成了前几任总统未曾达成的壮举，更为自己和社进党在未来数十年内赢得了巴西人民相对数量的忠诚和支持。"
 BRA_true_progress: "真正的进步"
 BRA_true_progress_desc: "阿德马尔·德·巴罗斯执政的三年来，他轻轻松松地就把巴西多年以来始终无法解决的顽疾一一铲除。腐败横行？军备废弛？经济困难？还有什么问题统统提出来，阿德马尔博士对很多问题早已了然于胸，并且他会根据需要提出他的解决方案。\n\n当然，现在的巴西早已今非昔比，视情况修订巴西宪法势在必行。宪法本就是活的，需要与时俱进，我们绝对不能死抠着一些现行的规章条款，让这点小事就阻碍了巴西通向真正的繁荣。\n\n再怎么说，只有阿德马尔，才明白巴西真正需要的是什么！"
 BRA_invest_in_amazon_territories: "投资亚马孙…"
 BRA_invest_in_amazon_territories_desc: "社进党总是在寻找新人来传递它的信息——还有什么地方比亚马孙深处更适合寻找他们呢？热带雨林是我们国家的蛮荒存在，长期以来，它一直被世人忽视，缺乏开发。好吧，不会再这样了。我们要把深入亚马孙丛林作为自己的事业，把我们的信息带给这些无人在意的穷苦居民。那些软弱无能的家伙早就懒得管这些地方了，放任它们自生自灭。亚马孙人哪，不要惧怕！阿德马尔总统在这里等你！"
 BRA_and_make_them_new_states: "…纳为新州份！"
 BRA_and_make_them_new_states_desc: "终于，我们把共和国的光芒带到了亚马孙，欢呼吧！看着亚马孙人自此成为共和国的一员，就像是亲眼见证着一个孩子一路成长为顶天立地的男子汉一样，个中故事催人泪下。为了庆祝这一伟大的时刻，我们应该把这些亚马孙人的领地变为由共和国管理的正式州份，我们已在党内挑选出一批精锐骨干为该地区划定选区，他们还自愿担任这些新建立的州的参议员。\n\n当然，选举不会说办就办。我们的党员会在下一次大选之前一直管理这些地区，而在下一次大选中，这几个州的民众将自行决定是否允许他们继续执政。这不正是民主的美妙之处吗？"
 BRA_and_make_them_new_states_tt: "联邦直辖区§Y阿马帕§!、§Y朗多尼亚§!和§Y罗赖马§!将重组为正式州！\n新的州将成为$BRA_party_psp_c$的铁票仓！"
 BRA_adhemar_is_better_than_vargas: "阿德马尔好过瓦加斯"
 BRA_adhemar_is_better_than_vargas_desc: "热图利奥·瓦加斯无疑是一位伟人，没有哪个巴西人会否认这一点。我们都热爱瓦加斯。但是，名垂青史的伟人们都并非完人，他们各有缺点，瓦加斯也不例外。在处置他的敌人之时，瓦加斯有些过于冷酷无情了。他曾经把一位共党领袖的爱人押到纳粹德国，把他的政敌打入大牢，其中有不少人是我党党员。再加上当年他在护宪革命中支持军队暴力镇压革命。与之相反，阿德马尔则与揭竿而起的圣保罗人民站在一起，共同反抗瓦加斯。\n\n我们都知道瓦加斯是伟人，但事实上阿德马尔更是伟人中的伟人！我们必须要让全国人民都意识到这一事实。为了实现这个目标，自然要尽一切可能进行宣传：电视采访，出版书籍，哪怕是在街头散发小册子。真相终有一天会大白于天下。"
 BRA_adhemar_five_more_years: "再干五年！"
 BRA_adhemar_five_more_years_tt: "§h纳尔逊·贡萨尔维斯§!将为总统竞选准备新的顺口溜！"
 BRA_adhemar_five_more_years_desc: "人人都爱阿德马尔，有些人甚至意识不到自己爱他——他赢得了全国千千万万同胞的心。人民群众实在是太热情，“逼着”我们给阿德马尔的连任竞选做准备。好在国会还没有通过任何法案来阻止现任总统再干一届，这意味着我们的连任计划完全合情合理！贴上海报，铺上红毯，阿德马尔，再干五年！话说贡萨尔维斯呢？我们需要他想一个朗朗上口、一听就会的口号来配合我们的竞选活动，毕竟……"
 BRA_tax_reform: "税制改革"
 BRA_tax_reform_desc: "在阿德马尔最初的竞选承诺中，其中有一条是这样的：总有一日，他要让巴西人的字典里由老板付出的“薪酬”和人们拿到手的“收入”这两个词变成真正意义上的同义词。幸亏巴西人民把票投给了那个更理性、更稳健的候选人，这才造就了这个繁荣的时代，事实证明巴西人民做出了正确的抉择。新的税收体系相较以往更加先进，新规出台后，社会最底层贫困人口的税负几乎被全部免除，同时提高中产阶级和上层阶级的课税，以增加国家和市政府的财政收入。只有真正懂得去哪能给国家和地方政府搞到钱的人，才能想出这样的办法。我们根本的目标是建设更好一个的巴西，一个由阿德马尔和社进党团结起来的巴西，税制改革只是万里长征走完了第一步。"
 BRA_coffee_blood: "咖啡，民族的血液"
 BRA_coffee_blood_desc: "请问有哪个勤恳努力的人不以一杯美味的醇厚咖啡开启他的一天呢？阿德马尔心中深知，咖啡，就是祖国的血液。但他意识到，那些辛勤采集咖啡的男男女女，就如同咖啡一样对经济至关重要。没了这些人，资金很快就会枯竭，因此阿德马尔也打算表示出他们应得的谢意。这些来自中央政府的贷款将用于建立咖啡合作社，工人会对咖啡的销售与仓储拥有完全自主的权力。这既减少了双方的开支，也使得政府得以从市场中抽身出来——就像政府本应做的那样。"
 BRA_new_parliament: "焕然一新的议会"
 BRA_new_parliament_tt: "§h阿德马尔§!会同相关业界领袖讨论这一问题。"
 BRA_new_parliament_desc: "一个国家当中总会有某些特定的人群要比其他人更具有社会影响力，这是必然的，每个国家都有这样的人。很多国家会对这些人视而不见，想方设法掩盖那些暗地里的会面和交易，不希望民众发现这些事情。但这里是巴西，我们为此感到羞耻。与其遮掩，不如让那些坐拥大量支持者的人和总统一起，共同建设巴西的未来。这不止是一般意义上的民主，更是一种真正意义上的全新民主。我们将拥有一个真正平等的议会。不过眼下的难处是究竟先允许哪一方进入更为合适，是工会的人，还是军队的人？"
 BRA_are_illiterates_trustworthy: "文盲信得过吗？"
 BRA_are_illiterates_trustworthy_tt: "§h阿德马尔§!会与党的领导人物讨论这一问题。"
 BRA_are_illiterates_trustworthy_desc: "巴西有多少人不能识字？这数字肯定大的吓人。然而，绝不应因此影响到他们参与民主的权利。他们也是人，他们对巴西的未来也应该有发言权。阿德马尔·德·巴罗斯将为他们的权利而奋斗！他是这些人的英雄，永远都是——到选举之时，他们怎么不会以汹涌民意回报他的恩情呢？\n\n但是，社进党有很多人无法理解这样的逻辑。这些人担心新加入的选民会马上倒向工党。此事引起了许多争议动荡，而且像往常一样，只有一个人——阿德马尔，能解决这个问题。"
 BRA_organic_constitution: "有机宪法"
 BRA_organic_constitution_tt: "纵使§W上帝§!降下§R末日审判§!，国会也会通过宪法§h修正案§!。"
 BRA_organic_constitution_desc: "瓦加斯犯了许多错误，这是巴西政治生活中不可抹去的事实。然而，得凭其无穷智慧，阿德马尔·德·巴罗斯可以看穿笼罩其上的迷障。虽然他可能永远不会在公众场合如此表达，但他对瓦加斯极为钦佩——他与人民的联系，他的政治智慧，以及他在动荡时期挺身而出领导巴西的意志。\n\n然而，他也有看不起瓦加斯的地方，那就是后者让自己变得脆弱。瓦加斯不能确保他和他的党要掌权的时候就能牢牢掌权，这就是他的失败之处。随着阿德马尔即将推动进入国会的一系列宪法修正案，他将彻底克服这些错误，证明自己比瓦加斯的梦想还要伟大。"
 BRA_moral_and_beautiful_country: "美丽与德行之国"
 BRA_moral_and_beautiful_country_tt: "§K[BRA.GetNameWithFlag]§!是一个§h民主国家§!，但不过是徒有其名……"
 BRA_moral_and_beautiful_country_desc: "崭新的黎明，正在缓缓降临，昭示着前方和平、自由与力量的时代。许多人口口声声说我们给巴西带来的唯一变化让她变得自私贪婪，说阿德马尔正在以毒酒喂养这个国家。但无论悲观者和平民的想法如何，人民的认识已经明确：社进党证明了自己就是属于巴西的党。\n\n五年、十年、十五年、二十年。我们能掌权多久并不重要。我们的党是巴西的具体体现，只要履行巴西人赋予我们的使命引导他们前进，社进党就能继续掌权。\n\n若为永恒，那便如此。"
 BRA_puppetmaster_is_out: "傀儡大师隐退…"
 BRA_puppetmaster_is_out_desc: "阿德马尔·德·巴罗斯陷入昏迷，没有迹象表明他能很快苏醒。阿德马尔在沉睡，我们的政府被丧志困惑和恐惧所束缚。但我们的敌人不会善罢甘休。\n\n反对派已经向参议院提交了弹劾案，其中包含内容严厉的弹劾条款，而社进党无法对此提出认真的反对。毋庸置疑，要赶紧采取行动，以使巴西摆脱即将来临的混乱状态。\n\n问题摆在眼前，谁将领导国家走出这场危机？"
 BRA_but_his_legacy_will_be_continued: "…但仍有人接班"
 BRA_but_his_legacy_will_be_continued_desc: "我们知道，我党依然控制着议会多数席位，牢牢掌握政权。就算阿德马尔失去执政能力，我们也得马上补上他的位置，投身到工作中去。\n\n我们要立即行动，确保阿德马尔不至于在康复之后丢掉他总统的位子。尽管我们对当前的行动和通过的议案不尽同意，但至少总统先生没亏待过社进党的每一位成员。现在，我们的头等大事就是防着那帮反对派的豺狗在这动荡之际偷走总统大位，禁止他们的手伸到不该伸的地方。\n\n我们的资金虽然吃紧，但还远未枯竭。内维斯想去参议院提出弹劾条款便去吧，我们还有压箱底的招式没出呢。我们会为同胞们准备好塞满钞票的公文包，他们对总统的看法会如何变化，就让我们拭目以待吧！"
 BRA_but_his_legacy_will_be_continued_req_tt: "§h劳多·纳特尔§!将是$BRA_party_psp_c$唯一的救命稻草……"
 BRA_maintain_unity_of_psp: "维持社进党团结"
 BRA_maintain_unity_of_psp_desc: "阿德马尔的昏迷让党陷入低谷。虽然社进党中派仍对纳特尔和党表示支持，但党的两翼已是离心离德。\n\n罗梅乌·德·坎波斯·韦加尔领导社进党左翼，呼吁加大土地改革力度，直接投资地方企业，对抗外国资本，保护巴西勤劳的劳动者。与此同时，位于我们右翼的小若昂·卡费指出不断膨胀的国债是随时都会爆炸的定时炸弹，呼吁通过削减社会支出来实现紧缩。\n\n要是纳特尔还想拿够选票、维持党的脸面，他就不得不在这两者之间作出抉择。对他的态度有所关切的，不仅仅是社进党；其他党派也会注意到政策的转变，并可能对此抱有各自的看法……"
 BRA_call_auro: "打给奥罗"
 BRA_call_auro_desc: "鉴于目前的情况，你也许会认为，对于阿德马尔以及社进党来说，参议院的领导人是社民党人简直是糟糕透顶。\n\n但事实远非如此。\n\n让我们走近这位来自圣保罗的参议员，奥罗·德·莫拉·安德拉德。他是个养殖牛大户的儿子，但富有政治手腕。每个人都恨他入骨，却无人能否认他解决问题的能力。明面上这人是社民党成员，但他也不会和钱过不去，而社进党最不缺的就是拿来贿赂的钱。\n\n让我们给这位好心的参议员打个电话，就当是帮个小忙，推迟一下弹劾案的投票。显而易见，几个公文包的钱可满足不了他的胃口。但要是为了维持阿德马尔和社进党的权力，我们可没有选择权，毕竟也没人说过维持统治是花不了几个钱的事。"
 BRA_truce_with_lacerda: "与拉塞尔达休战"
 BRA_truce_with_lacerda_desc: "我们现在深陷泥潭，卡洛斯·拉塞尔达和全民盟要负全责。自从阿德马尔当选以来，瓜纳巴拉来的那只乌鸦一直是我们的眼中钉。尽管我们对彼此恨之入骨，但还有一个更大的敌人可以用来对付拉塞尔达。\n\n我们只需让他明了，即使阿德马尔被弹劾，执政的也只会是社民党-工党的竞选联盟，而不是他拉塞尔达的全民盟。一旦这件事发生，巴西就会因为这一大帮子左派回到瓦加斯主义。比起我们，拉塞尔达绝对更讨厌热图利奥·瓦加斯。\n\n让我们看看当我们提到瓦加斯的名字时，这只小乌鸦叫的有多凶。备好耳塞，先生们。"
 BRA_hail_to_the_heir: "欢迎后嗣"
 BRA_hail_to_the_heir_desc: "圣保罗是社进党和阿德马尔的龙兴之地。这座城市充满机遇，更重要的是，它是社进党的大本营。如果圣保罗失守，那社进党肯定没救了。\n\n自阿德马尔当选总统以来，有一个人，他在党内的影响特别值得一提。没人能预料到，此人正是热图利奥·瓦加斯的儿子，但自从他当选以来，他一直是我们党的关键成员，还承担起了阿德马尔在圣保罗权力经纪人的角色。\n\n我们必须不惜一切代价保住圣保罗。与小热图利奥·瓦加斯进行简要商谈，肯定有用。"
 BRA_calm_the_hell_down: "冷静下来"
 BRA_calm_the_hell_down_desc: "尽管我们尽了全力，国家依然在迅速崩溃。抗议活动日益频繁，傻逼政客造谣生事，唯恐天下不乱。必须有所行动——必须马上行动！\n\n社进党一直是维护法治与正义、致力于不让任何人掉队的政党。用这些提醒人们应该能够让他们冷静下来，让秩序回到街头。真正的问题是，要如何料理那些继续煽动巴西广大人民反对我们的马戏小丑……"
 BRA_bribe_the_press: "贿赂媒体"
 BRA_bribe_the_press_desc: "不知出于何种原因，报纸上突然开始充斥着荒诞无稽的戏言。“总统不省人事？”“社进党崩溃？”居然得到编辑和出版商的首肯，登上了报纸的头版。\n\n现在是对几家这样的出版物上门拜访的好时机。只是提醒他们，社进党一直是他们最热情的支持者，我们，和他们、还有所有人一样，只希望发布真相和真相得不能再真相的真相。还会悄悄提醒他们，要不是咱们开出来的工资单，巴西就没有几家报纸能开得下去。我们对自由新闻的“投资”是如此慷慨大气，谁敢说社进党不站在巴西人民一边？"
 BRA_utilize_kruels_connections: "利用克鲁埃尔的人脉"
 BRA_utilize_kruels_connections_desc: "如果你是巴西总统，还想保住权力，那你最好让军队站在你这一边。我们现在比以往任何时候都更需要军队的支持，这尤其是因为我们的陆军部长突然失踪。阿毛里·克鲁埃尔不是什么受欢迎的家伙，但他在巴西军队仍然拥有相当大的影响力。把他拉到我们这一边能让军队保持一段时间的稳定。这可能要花很多钱，但会巩固我们的至高权力。"
 BRA_communist_hydra: "赤色九头蛇"
 BRA_communist_hydra_desc: "我们现在真有点头疼了，兄弟们。弹劾投票就在眼前，但我们还是没能拉到足够多的选票来阻止弹劾通过。没有大党愿意听我们的，所有可以贿赂的人腰包里都塞满了我们的钱。现在该冒点险了。\n\n还记得巴西的共产党吗？那个二三十年代，在瓦加斯挥舞权杖将其粉碎成尘埃之前不可一世的巨型党派，记得吧？嗯，尽管我们宁愿不去提它，但阿德马尔跟他们有些联系。在新国家体制下崩溃后，阿德马尔到处寻觅，找了几位仍在政坛的几名共产党政治家，并让他们站在我们这边。当然，这个党几乎马上又被禁止了，他们也被请出圣保罗。"
 BRA_men_of_sigma: "通电西格玛"
 BRA_men_of_sigma_desc: "每个人都干过不可告人的事情。我们手上干过的脏活比大多数人都多，但即便如此，有些秘密我们希望永远也不要被人发现。社进党成立时，它是巴西进步共和党和米格尔·雷亚莱的人民工党的政治联盟。人民工党充斥着整合主义者，其中一些与法西斯主义互相勾连。多亏了阿德马尔的政治智慧，这些联系从未曝光于众目睽睽。但我们不能否认它们是我们过去的一部分。\n\n眼下的危机要求我们尽一切努力寻求支持，确保阿德马尔继续坐稳总统宝座。随着来自主流政党的支持近乎干涸，只剩下一个团体可以求助了。该打个电话了。"
 BRA_and_the_changes_are_on_the_way: "…山雨欲来"
 BRA_and_the_changes_are_on_the_way_desc: "阿德马尔的统治让腐败愈发猖獗，巴西深受其害。要想结束他的恶人政治，恢复宪政之治，现在就是最好的时机。首脑本人已是时日无多，而他手下的那群乌合之众也是一盘散沙。埃德娜·洛特一直不知疲倦地与阿德马尔的腐败作斗争，现在是时候给这一切画上句号了。\n\n要结束宪法乱象，只有弹劾阿德马尔一条路可走！一副没有灵魂的皮囊可治理不了这个国家。要让国会安全地通过这项法案对埃德娜的谈判技巧是个不小的考验，但埃德娜胸有成竹。民主危在旦夕——我们必须行动！"
 BRA_and_the_changes_are_on_the_way_req_tt: "该§Y重拾§!§V瓦加斯总统§!的遗产了。"
 BRA_the_greatest_friend: "最亲密的朋友"
 BRA_the_greatest_friend_desc: "埃德娜第一步显然是争取党内的支持。但在巴西，这并非易事——工党是个大帐篷，内部派系林立，但最好还是与党内左翼，也就是莱昂内尔·布里佐拉领导的“紧密团体”进行协商。这两位工党党员因党内的青年群体和南里奥格兰德州而联系在一起，应该很容易达成一致。当然，他们还有共同的敌人——蠢蠢欲动的社进党。稳住埃德娜的基本盘能让她集中精力争取其他的国会议员，以及让尸位素餐的阿德马尔从总统的位子上滚下去。"
 BRA_democratic_coalition: "民主联合政府"
 BRA_democratic_coalition_desc: "埃德娜对阿德马尔一直以来奉行的务实主义耳濡目染，为了彻底消除阿德马尔对巴西的影响，她必须尽力争取议会其他党派的支持，更具体地说，是要争取全民盟的支持。卡洛斯·拉塞尔达领导下的全民盟是瓦加斯主义最大的敌人，而且他们一向反对工党的主张，但是为了使埃德娜能够顺利继任总统，必须说服全民盟同我们合作。拉塞尔达此人极端亲美反德，如果埃德娜承诺巴西会站在OFN一边、中止跟团结协定的一切外交关系，或许能够取得拉塞尔达的支持。\n\n我们提出的条件能否说服这些视瓦加斯主义为寇仇的人站到我们这边还不清楚，但巴西政界以前也有过形同陌路的执政搭档。"
 BRA_divide_et_impera: "分而治之"
 BRA_divide_et_impera_desc: "阿德马尔是把社进党黏在一块的胶水，他的腐败如癌毒一般腐蚀全党，直至病入膏肓。但在这密不透风的裙带网络背后，居然藏着进步运动的几枚遗珠：一些被阿德马尔的魅力和办事能力迷得神魂颠倒的傻瓜。由罗梅乌·德·坎波斯·韦加尔领导党内左翼就是其中之一，在埃德娜的保证下，一些左派成员可能会离开正在沉沦的社进党，而工党将会张开双臂欢迎他们。\n\n与我们的前社进党新盟友一道，我们可以实现真正进步的巴西，拿下阿德马尔通过的社会立法，但不用搞他那流毒无穷的腐败。"
 BRA_varguists_stand_together: "瓦加斯团结"
 BRA_varguists_stand_together_desc: "儒塞利诺·库比契克和恩里克·洛特曾一度共同执政，社会民主党和工党这两个坚决反对全民盟的瓦加斯主义政党组成联盟。那时埃德娜在两党内部建立了许多关系，毕竟她爹是总统。社民党的坦克雷多·内维斯、乌利塞斯和库比契克早就是埃德娜的盟友了——他们的支持决定着我们的成败与巴西的命运。"
 BRA_nationwide_rallies: "巡游全国"
 BRA_nationwide_rallies_desc: "虽然埃德娜在军队没有影响力，也没有阿德马尔挥金如土得来的权力，但她和工党掌握着更强大的东西——劳工！工会和农民联盟组成党的基盘，我们可以利用他们的力量来向国会和阿德马尔的支持者传达信息。罢工、抗议和骚乱一齐发动，准备彻底结束社进党的统治。\n\n埃德娜将在巴西各地进行巡回演讲，激励人们大胆站出来支持她，确立她作为总统的合法性。与布里佐拉和若昂·古拉特一起，为所有人带来繁荣的讯息！"
 BRA_help_of_the_mad_man: "疯子的援手"
 BRA_help_of_the_mad_man_desc: "在一次圣保罗的竞选活动中，阿德马尔曾大吹牛皮说，不管新建多少所疯人院，都关不住一个像夸德罗斯这样的疯子。作为回击，夸德罗斯也发表演讲称，没有哪所监狱能装得下阿德马尔那样的胖子。这次交锋完美地诠释了这两人之间不可调和的矛盾。\n\n要想稳固反阿德马尔联盟，我们就需要拉拢那些视他如寇仇的人——单论对阿德马尔的敌意，巴西政客中没几个人能和夸德罗斯相比。即使他可能只是个“不拘小节”的精神病患者，但他确实富有激情。这激情正是如今我们最需要的东西，所以我们要说服他发表演讲，对阿德马尔的统治大加批评——当然，前提是他能从他那排得满满当当的赏画日程中抽出时间来。"
 BRA_reach_to_constitutionalists: "接触护宪派"
 BRA_reach_to_constitutionalists_desc: "巴西的军队（好吧，其实全南美都是如此）一直是反复无常的怪兽。得到他们的支持全凭运气——他们可能支持，也可能不支持一个民主选举出来的政府继续执政。\n\n我们也未能免俗，因此我们必须保证军队会站在我们一边。值得庆幸的是，考虑到埃德娜姓氏背后的力量，她应该会轻松许多。埃德娜只需给她的父亲恩里克·特谢拉·洛特打一通电话，争取一下社民党和护宪派的支持，就可以多多少少减轻一些对于军事政变的担忧。反正她也有段时间没和父亲说过话了。"
 BRA_attempt_to_delegalise_psp: "社进党非法化"
 BRA_attempt_to_delegalise_psp_desc: "在巴西，有这么一条令人作呕的害虫：它打着为民发声、为民服务的旗号，实际上却不断蚕食国家的民主和主权。它，就是社进党。\n\n社进党人是一股彻头彻尾的黑恶势力！这群肮脏的罪犯、德国的走狗令政府沦为黑帮，让巴西人民沦为别国的奴隶！他们胡作非为还能逍遥法外，是可忍，孰不可忍！\n\n只需给埃德娜一个机会，社进党两面三刀的本质就会被公之于众，进而加速其崩溃——诚可谓好事一桩。"
 BRA_to_continue_the_legacy_of_vargas_kubitschek_and_lott: "延续瓦加斯主义的遗产"
 BRA_to_continue_the_legacy_of_vargas_kubitschek_and_lott_desc: "我们不得不承认，社进党掌控着这个国家最强大的宣传机器之一。这个庞然大物印刷着一张又一张的日报，赞颂着阿德马尔那些不知真假的成就。然而，它已趋于停止。在社进党的机器如同没头苍蝇般乱撞的时候，正是我们取而代之的好时机。\n\n我们会在《最后时刻报》发起一次媒体宣传，称赞埃德娜是巴西新一代政治思想的集大成者。瓦加斯的进步主义、库比契克的乐观主义和洛特的法治观念，汇聚于一人，正整装待发要带领巴西走出阿德马尔时期的阴霾走向未来！"
 BRA_ask_gordon_for_help: "寻求白头鹰的庇护"
 BRA_ask_gordon_for_help_desc: "如果不寻求美国对我们的支持，那简直就是捧着金饭碗要饭。巴西和美国的命运是何其相似：我们都曾经是他国的殖民地，又同为二战的战败方。如今两国之间已经铸成了钢铁一般的兄弟情谊，美国就是我们的好邻居、好伙伴。\n\n如果我们背后有美国的支援，那不仅能吸引更多全民盟的成员加入，更能给总统（不管最后是谁当总统）争取到足够的时间来偿还国家背负的巨额债务。我敢保证总统会很需要这段时间的。"
 BRA_an_unlikely_candidate: "不被看好的候选人"
 BRA_an_unlikely_candidate_desc: "我们能够肯定，早在阿德马尔执政时，德国人就在渗透巴西社会。起初他们只有些微不足道的小动作，譬如在随便什么地方做点投资，或者有那么几个投资人来到巴西之类的。但时至今日他们对我国的干涉已经达到了顶点，国家变成眼下这个鬼样子也全拜德国佬所赐。\n\n在大多数人看来，劳多·纳特尔一定是个白痴，这种情况下还争取德国人的支持，但如今的纳特尔为了选票什么都干得出来。眼下阿德马尔政府的合法性与日俱减；随着选票差距逐渐被抹平，社进党的处境更是每况愈下。值此危难之际，就算要纳特尔和恶魔做一笔交易，他也会毫不犹豫地进地狱里走上一遭。"
 BRA_one_last_push: "最后一搏"
 BRA_one_last_push_desc: "现在已近凌晨，所有人都筋疲力尽。在参议员办公室里，一位办公室职员疯狂地接听弹劾投票双方的电话，忙得脚不点地。所有的来电，不管电话另一头的人是谁，唯一的目的就是想方设法收买这位议员，说服他在弹劾案投票上投给自己这一方。高原宫里也是一副忙碌的景象，医生和护士们正严密监视着总统的身体状况，寸步不离，桌子上放着的那杯咖啡也散尽了最后一点热气。此时的巴西，不论大街小巷都是冷冷清清，所有人都端坐在电视机前。\n\n审判的时刻临近了。\n\n这是一场豪赌，赌局则是过去五年间阿德马尔政府领导下给国家带来的变化。瓦加斯派早已做好准备，只等那一刻来临，他们便会蜂拥而上，把社进党打入万劫不复的深渊，再把那社会进步理论踏上一万只脚，叫它永世不得翻身。\n\n§O以民主之名，我们向前进发。§!"
 BRA_adhemar_comatree_one_last_push_tooltip: "投票即将开始，成败在此一举！"
 BRA_against_all_odds: "排除万难"
 BRA_against_all_odds_desc: "阿德马尔胜利了！\n\n无论是建制派、残忍的保守派还是冒充的瓦加斯派，无数的人试图除掉他，但每一次都以失败告终。就连死神来收走阿德马尔时，也震惊地发现这位伟大领袖不好对付。这绝不仅仅是阿德马尔一个人的胜利，无数忠于国家的国民竭尽所能支持着这届代表了人民的政府，我们必须向他们致以崇高的敬意。\n\n如今，随着政敌的图谋一一落败，眼下最关键的问题成了如何恢复民众对本届政府的信心。过去一年的危机给社进党留下了诸多隐患，能否证明我党才是唯一真正恪守承诺的政党，全看我们接下来的努力了。"
 BRA_remove_the_viper: "斩断蛇头"
 BRA_remove_the_viper_desc: "埃德娜·洛特背叛了巴西人民。她妄图推翻人民的意志，从始至终密谋推翻我们。在我们最脆弱的时候，她居然发起弹劾，亲身上阵来夺取总统大位。她是巴西人民的敌人，仅此而已，比那些大搞军事独裁的独夫民贼强不了多少。\n\n好运眷顾了我们，失败彻底摧毁了她的精神，任期里剩下的时间她会回到里约去。等她去里约之后，我们会把她在政府里的所有盟友都弄掉。巴西人民值得比这个母夜叉更好的人，一个全部由把人民的利益放在第一位的社进党成员组成的政府。"
 BRA_cohabitation: "同气连枝？"
 BRA_cohabitation_desc: "政治教人同床异梦。65年大选为数不多的几个失败之一便是我们没能让我们伟大的盟友劳多选上副总统，当上的是1960年从我们手中抢走总统宝座的那个人的女儿。埃德娜·洛特讨厌跟我们合作这事早已人尽皆知，我们在治理模式上的矛盾也一直影响着阿德马尔和埃德娜的关系。\n\n因此，当我们的政府群龙无首、我们的敌人试图弹劾阿德马尔之时，洛特居然拒绝了他们拉拢，这令我们极为震惊。也许，解开这个谜团的最好办法就是直接去问她。"
 BRA_friendship_end_usa: "一个时代的结束"
 BRA_friendship_end_usa_desc: "美国为我们做过什么？\n\n这个问题阿德马尔想了很多年了。除了无意义的战争和不断的干涉，美国为我们的国家到底做过什么呢？美国不过是一只寄生虫，自封的美洲独裁者，试图把自己的意志强加巴西自由人民头上。美国佬对巴西的攻击此起彼伏，他们试图通过向拉塞尔达提供有关阿德马尔秘书的信息来推翻我们，然后在反对派试图弹劾我们时向他们提供支持，结果惨败。\n\n我们不是美国的殖民地。他们可以随意摆布我们而无需承担后果的时代已经一去不复返了，他们的错误行为会招致后果。退出OFN和撤掉美国在巴西基地应该能表达我们的意志。"
 BRA_just_pass_it: "贿赂、勒索、恐吓"
 BRA_just_pass_it_desc: "巴西是个独立的大国。阿德马尔希望那几个超级大国也这么想，毕竟他们是巴西的贸易伙伴——但事实上他们经常越界。这些个所谓的超级大国，损害着巴西的国家利益，让我们陷入这场震惊全国的危机。他们终将为此付出代价。\n\n问题在于，投票进程太费时了。我们得花点钱让同行们支持我们的议案，加速推进这一议程。阿德马尔只想赶紧结束这个任期，回归正常的政治生活。1970年选举在即，必须尽早确定阿德马尔的继任者。"
 BRA_now_germany_best_friend: "新特殊关系"
 BRA_now_germany_best_friend_desc: "也许过去三十年最大的外交失误就是我们对抗德国的愚行。我们一次又一次地与这个所谓的威胁作斗争，然后呢？我们得到了什么？我们更富有了吗？我们的人民在世界舞台上更受尊重了吗？全都没有。我们一直扮演着美国傀儡的角色——但现在不会再这样了。随着我们将德国拒之门外，我们忠诚勤朴的德国朋友将取代他们的位置。\n\n虽然要成为团结协定的正式成员还需要许多时间，但阿布斯的关系将使我们能够轻松地扩大我们在团结协定的影响，提振因美国退出而下降的GDP增长率。假以时日，巴西将摆脱美国的目光，走向繁荣与独立，与德国雄鹰并肩而立。"
 BRA_adhemar_germania_visit: "§h阿德马尔总统§!将隆重访问日耳曼尼亚，为巴德关系添砖加瓦。"
 BRA_problem_of_prestes: "红色魔鬼"
 BRA_problem_of_prestes_desc: "阿德马尔陷入昏迷的这段时间恐怕是社进党和现代巴西的至暗时刻。为了保持巴西的长治久安，产生了许多的妥协和冲突。然而危机期间采取的一些行动超出了政治上的必要，逐渐变成了愚蠢行径。\n\n劳多同意合法化就是这样的行动，这一步对于阿德马尔来说太过分了。为了亲自解决这个问题，阿德马尔会亲自给卡洛斯·普列斯特斯打一通电话，尽可能找到一个不让我们难堪的解决方案。要是我们能安然渡过这一关，不至于背上叛徒的骂名，想必阿德马尔就可以安然入睡了。"
 BRA_preparation_for_seventy: "备战1970"
 BRA_preparation_for_seventy_desc: "在解决了眼前的燃眉之急后，该为下一次总统大选做准备了。作为第一次没有阿德马尔参选的党内候选人集会，其无疑有着非常重大的纪念意义。不过虽然阿德马尔不会出现在台上，但他依旧是本次集会的关键人物之一，他会在台下把关，确保选出的代表不会太过离谱。\n\n我们已经向巴西人民证明了我们党能够建立一个高效的国家治理体系，但我们还需要向民众展示我们不必依靠某一个人的个人魅力，同时只有我们党才能够带领巴西战胜前途中的种种动荡与挑战。现在离大选还有比较长的时间，不过这并不意味着我们可以就此躺平睡大觉，为了证明我们才是巴西人民真正的心之所向，必须提前确保我们的民众支持率能占到绝对多数，大幅领先其他对手。"
 BRA_adhemar_ozymandias: "奥兹曼迪亚斯"
 BRA_adhemar_ozymandias_desc: "这不是小磕小碰，而是与死神擦肩而过。阿德马尔能活下来实属万幸——倘若稍有差错，他的毕生心血，不，他的政治遗产便将永远湮灭。我们无法掌控他的健康状况，但可以掌控他卸任前的布局，确保他将行政职能移交给继任者时，一切已准备就绪，使未竟之业得以延续。\n\n总统为国家鞠躬尽瘁，即使他的人民未能全然理解他所背负的重担。他应当因卓越的政绩、高超的政治手腕与雷霆万钧的魄力而被历史铭记。他的功勋应当超越洛特、库比契克乃至瓦加斯……不，远不止于此。他注定将以有史以来最伟大总统之名永载史册！"
 BRA_no_bridge_too_far: "没有不可能"
 BRA_no_bridge_too_far_desc: "要是跟死神擦肩而过还不能激发阿德马尔留下政治遗产的野心，那他还不如干脆死了得了。虽然大兴土木肯定不便宜而且未必划算，但纪念碑绝对是绝佳的宣传工具。从埃及金字塔到纽约的自由女神，世人都爱奇观，而阿德马尔要做的就是给他们建奇观。让实用性见鬼去吧，他已经时日无多了。\n\n巴西利亚将尽快上马那些大力宣传的巨型项目，其中一些是民生所需的公共工程，另一些纯属面子工程。无论如何，当这些庞然大物拔地而起时，众人必会为之目眩神迷——军中的进步党人素来正直可靠，当然会向我们提供支持。既然公路都没问题，那我们的事业不也一样如此？"
 BRA_healthcare_revolution: "医疗革命"
 BRA_healthcare_revolution_desc: "没有哪个巴西人活该被剥夺最基本的药品供给权，被迫忍受低质量的生活。要不是医生妙手回春，阿德马尔此刻早已躺在六尺之下的黄泉。倘若拥有全国顶级医疗资源的总统都会毫无预兆地罹患重症，那些连一日三餐都难以维系的普罗大众又当如何？自然，瓜纳巴拉贫民窟里衣衫褴褛的穷孩子们永远无法享有和阿德马尔一样的政治价值，但若明知可以挽救却任由这些鲜活生命在泥淖中腐烂，这是何等野蛮的背离人性之举。\n\n对于阿德马尔而言，有什么方式能比为巴西襁褓中的公共卫生事业提供资助更能彰显对上帝仁慈的感激呢？既然当下多数资金都深陷错综复杂的行政指令迷宫，若能从繁冗的枝节事项中削除些许赘余，让医院像润滑良好的机器般运转，又有谁会反对这样的变革？"
 BRA_adhemar_a_new_dawn: "社进党革命"
 BRA_adhemar_a_new_dawn_desc: "阿德马尔·德·巴罗斯总统的病情渐渐好转，举国上下如沐春风，人民和总统此刻心意相连，巴西在经济和国际地位上的进步，所有人都感同身受。这些感受不是无源之水、无本之木——虽然发展之中难免阵痛，但总统与高原宫幕僚都勇于承担责任，而巴西着实也取得了不小的进步。\n\n现在，是收获的时刻。当初民众选择阿德马尔，求的就是变革，而今日种种，可谓得偿所愿。日复一日，总统愈发笃定自己对巴西鞠躬尽瘁的价值。现在，该是求得世人公认的时候了。"
 BRA_bribe_tv_globo: "贿赂环球电视台"
 BRA_bribe_tv_globo_desc: "新闻自由应当尊重，这点毋庸置疑；然而这段时间，环球电视台有些耙粪记者愈发不识抬举，专挖那些不应公之于众的内幕消息，对巴西国家反复攻击侮辱。\n\n是可忍孰不可忍，忍无可忍无需再忍。好在这家企业内部尚有坚守新闻操守的正派人物，而我们最不缺的就是运作资金。这边注入一笔资金，那边特批个联邦项目——听话的自然好处多多，摇摆的也不愁他们不开窍。如此一来，该吹捧的成就一条不落，该遮掩的过失一条不漏。唯有如此，选民们才能“自由”、“明智”地投出“正确”的一票。"
 BRA_a_brush_with_god: "与神交锋"
 BRA_a_brush_with_god_desc: "尽管从未有人质疑阿德马尔·德·巴罗斯对上帝的虔诚，但现在公众开始流传他频繁参与教会礼拜、出入主教座堂的传闻，总统匍匐祈祷的画面引人遐想。不过，那些亲眼目睹的人会告诉你，这绝不是他在作秀。\n\n这位与死神擦肩而过的总统，想必对生命有了新的领悟。对其妄加揣测，不仅侮辱了他的尊严，更是对这位竭尽所能为巴西奋斗的战士不敬。到头来，生死无常本就是人生常态。"
 BRA_destinys_favourite: "命运骄子"
 BRA_destinys_favourite_desc: "放眼今日巴西，不论进步保守，如今都向阿德马尔·德·巴罗斯俯首称臣——他便是继传奇总统瓦加斯之后，最伟大的国家设计师。他能令水火不容的贫民与寡头相安无事，只因这两者都企盼巴西的崛起。贫民窟里，人们为拔地而起的钢筋丛林欢呼雀跃；高原宫中，官僚怀着赤诚之心，不知疲倦地埋头苦干。\n\n纵览古今，即便是亚历山大与凯撒这等雄主，在直面死神之时，也未必及得上阿德马尔这般英勇无畏。“总总统”先生如今傲视群雄，将昔日政敌尽数踩在脚下。天命所归，当仁不让。"
 BRA_adhemar_comfortable_retirement: "愉快退休"
 BRA_adhemar_comfortable_retirement_desc: "上帝给了阿德马尔第二次机会。他大难不死，但这番经历却让他记忆犹新。是时候为自己谋个退路了，数十年来，阿德马尔一直兢兢业业地服务大众，可他们何曾给过他什么回报？他即将获得的每一分财富，都是用无数小时的劳动和成吨的汗水换来的。你骂我背叛人民，但我问心无愧——毕竟他连性命都甘愿献给巴西，这一出死里逃生，证明他就是天命所归。\n\n说到底，阿德马尔不过是在索取他总统生涯早期未曾享受的那些东西。尤其是要让家人安居乐业，安享天伦。从今往后，谁也别想阻止他过上安逸富足的退休生活。"
 BRA_adhemar_call_in_all_favours: "争取所有支持"
 BRA_adhemar_call_in_all_favours_desc: "要想让阿德马尔安享晚年，靠他一己之力可远远不够。好在总统虽然日理万机，但党内那些老交情可不会随之散场——需要撑场子的商人、懂得“分寸”的记者、还有那些欠着人情的老朋友，此刻都该派上用场了。眼下正是用人之际，也该让他们都出来活动活动，表表忠心了。\n\n选举之路从来不是康庄大道，既没有遍地黄金，更少不了明枪暗箭。绯闻丑闻此起彼伏，换作旁人早就已经身败名裂，但阿德马尔·德·巴罗斯岂是等闲之辈？就算已经证明过千次万次，我们也要再次证明他就是不世出的天才。"
 BRA_adhemar_monopoly_man: "大权独揽"
 BRA_adhemar_monopoly_man_desc: "社进党大选就像玩桌游。跟桌游类似，我们的竞选策略取决于金钱和资产。现在我们就要孤注一掷，再不把压箱底的金库打开，到明年这时候怕是连半毛钱都剩不下来。\n\n我们要用这些钱换掉现任巴西石油总裁，让他乖乖走人，然后把下一任换上社进党的人。同样，其他与政府相关的产业也要安排自己人接手，自然大有益处。不过这些无需让公众知晓，我们控制的媒体会全力聚焦竞选活动，不能让外边看出破绽。"
 BRA_holiday_in_caracas: "加拉加斯的假期"
 BRA_holiday_in_caracas_desc: "表面上，阿德马尔此行是为了“休养生息”，但加拉加斯所暗藏的机遇，可远不止她阳光下的繁华。总统只需在适当的时机，对恰当的人耳语几句，悄然间，几处精挑细选的不动产便顺势腾空，静待他收入囊中。\n\n总统的这趟旅程远非单纯的休憩，他正在为未来铺设一条安稳无虞的坦途——一条超越总统任期的坦途。对阿德马尔而言，委内瑞拉并非又一个寻常的南美国家，而是他精心编织的一张安全网，是一片能让我们敬爱的阿德马尔总统从容栖身的港湾，也是他财富稳固增长的沃土。\n\n世人只看见一位总统暂别政坛，享受片刻安逸，而在幕后的棋盘上，精妙的交易早已悄然落子，精明的投资亦在暗流中生根。毕竟，政治本就是一场博弈，而真正的老手，必定在棋局落幕后，仍能稳握胜利果实。"
 BRA_the_brazilian_job: "巴西活计"
 BRA_the_brazilian_job_desc: "海外布局固然要紧，家门口的财源更是要好好抓紧——总统为国民鞠躬尽瘁，从他尽心尽力服务的国家那儿讨些辛苦钱，难道不是天经地义？\n\n不过，搞这些“小本生意”，就得要快进快出。趁着大选这阵乱劲儿，咱们得抓紧把该办的都办了。等风头一过，人家又盯上你了。"
 BRA_divert_campaign_funds: "挪用竞选资金"
 BRA_divert_campaign_funds_desc: "这里搞背书那里搞巡演，既然我们的小瓦加斯已经胜券在握，那还搞这些花里胡哨的做甚？给这些假日活动报销经费可没那么便宜，而社进党的小金库可是阿德马尔最好的财源。党能有今天全靠阿德马尔，党产基本上就是阿德马尔的私产，只不过法律不承认罢了。更何况他可是总统，金库里就少个几百万谁敢找他的麻烦？\n\n小瓦加斯跟他父亲一样都是非常精明的家伙，只要你找他催，他总能变出钱来，没人会在意这钱是从哪个阴沟里捞的，还是高原宫的哪个倒霉蛋东拼西凑挤出来的。老头子的事业比巴西利亚那些花花肠子要重要得多！"
 BRA_friends_from_abroad: "国外的朋友"
 BRA_friends_from_abroad_desc: "把鸡蛋放在一个篮子里很蠢，就算巴西这个篮子再大也经不起摔。政商结合、两条腿走路才是正道，何况我们早就将这二者之间的隔阂一扫而空。毕竟，有钱能使鬼推磨，金钱落袋的铿锵之声足以穿越铜墙铁壁。\n\n和之前一样，既然要为国谋利，那么首先要做的就是宴请全球的金融精英。管他是美国、德国还是日本，只要利益都流回到高原宫就行。当然，剩下的油水也足够让下面的人分一杯羹。"
 BRA_a_future_for_our_children: "我们孩子的未来"
 BRA_a_future_for_our_children_desc: "那些站着说话不腰疼的家伙最近总是对咱们亲爱的阿德马尔先生的敛财行为指指点点，说什么他腐败得要命，贪婪得没边。当然，总统对这样的诽谤不屑一顾，因为他清楚地知道自己已经时日无多。当然，他确实上演过骗过死神的奇迹，但他没蠢到觉得自己能骗死神两次。\n\n你或许要问，一个死人要这么多钱有什么用？阿德马尔拼死拼活一辈子，不就图个儿孙衣食无忧？就算死神明天、今晚乃至下一秒就来索命，至少他的家人不用像他一样劳累奔波。大丈夫生于天地之间，养不了家还有何脸面存于世间？"
 BRA_adhemar_the_campaign_trail: "竞选之路"
 BRA_adhemar_the_campaign_trail_desc: "必须把那些企图破坏小瓦加斯竞选活动的宵小之辈收拾干净，就算不是因为他们一个个都是办事不力的蠢货，也得治治他们给社进党搞破坏的毛病。对抗颠覆的最佳策略之一就是扩大党的选民基础，撒钱塞红包就能解决大多数问题。要是碰上些油盐不进的假清高那咱们也不妨跟他们玩点下三滥的。\n\n反对派或许会指责我们腐败，但这帮家伙已经要威胁社进革命的根基了。无论敌人要打什么样的牌，小瓦加斯都必须赢。"
 BRA_adhemar_weaken_literacy_restrictions: "放松识字限制"
 BRA_adhemar_weaken_literacy_restrictions_desc: "难道不是每个巴西人——无论处境如何、有何缺陷——都有发声的权利吗？贫民窟里的百姓和大学教授都一样是人。穷人面临的挑战比富裕阶层更多，而严苛的文化测试却阻碍着他们克服困境。不能因为那些文盲识字困难，就剥夺他们的选举权。作为同胞，他们难道没有做出理性选择的基本判断力吗？\n\n放宽“识字”门槛，不仅能彰显自由社会的开阔气度，更能为社进党创造一批铁票仓。如若我党能因推动底层选举权改革扬名立万，今后就没有人敢对我们妄加非议。"
 BRA_adhemar_the_coalitions_weakness: "联盟软肋"
 BRA_adhemar_the_coalitions_weakness_desc: "从表面上看，我们在参议院摆出一副合作与谨慎妥协的姿态，这种策略让我们得以全力推进议程——虽说在强行通过某些政策时，会遭遇些许敷衍的反对声。但要记住，在联盟政治中，任何反对都可能埋下隐患，我们必须保持警惕，以免误判形势。\n\n若要让立法工具发挥更加精准的作用，就必须精简队伍。既然左右两派争执不休，那我们就除掉其中的不和谐因素，只保留立场和我们一致的成员。外人或许会说这是在排除异己，但对我们而言，这是在锻造建设新巴西的核心力量。"
 BRA_no_holds_barred: "不择手段"
 BRA_no_holds_barred_desc: "马加良斯真的对记者说了那些话吗？社民党的资金真的只来自某一个人吗？那张模糊的照片里，布里佐拉真的用擦过屁股的手吃饭了吗？\n\n记者，不管你心里怎么想，但凡你有点脑子，从今往后你的答案都必须是“确实”。政治从来就是话语权的较量，有时候只需稍加引导，就能让舆论朝着有利方向发酵。无论消息多么琐碎或关键，我们在新闻界的朋友都是胜选的关键。为达目标，我们不遗余力。"
 BRA_lacerdas_hypocrisy: "拉塞尔达的伪善"
 BRA_lacerdas_hypocrisy_desc: "那个整天只知道逼逼赖赖的傻逼乌鸦拉塞尔达永远都管不住自己那张臭嘴，逮着机会就要胡说八道，逻辑道理真相和事实在他那核桃仁大的脑子里全都成了狗屁。他这辈子就这点出息，如今当上总统，更是变本加厉地向全世界倒他那各种无端怨言。\n\n虽说魏纳和布里佐拉也不是什么好东西，但他们至少试图揭穿这个伪君子的真面目。虽然他们的爆料没能掀起什么风浪，但在他最得意但在他自己的新闻领域击垮他的策略说不定能成。瓜纳巴拉的流浪汉们在他手底下遭了多少罪啊，很快全巴西都会看清这只乌鸦的两副嘴脸。"
 BRA_leave_it_to_the_son: "衣钵相传"
 BRA_leave_it_to_the_son_desc: "生为伟人之子本是桎梏，但小热图利奥·瓦加斯用三十年光阴证明了自己——他继承了父亲的威严与才干，青出于蓝而胜于蓝。阿德马尔即将卸任、时日无多，但他尽可放心：瓦加斯完全配得上继承这份“传奇衣钵”。我们，乃至整个巴西，都可放下对他能力的质疑——巴西和社进党后继有人。"
 BRA_rouba_mas_faz: "收钱但办事"
 BRA_rouba_mas_faz_desc: "“他拿钱，但办事。”对有些人来说，这不过是句荒诞的口号；对另一些人而言，这是句尖酸的嘲讽；但对巴西而言，这是五年来的现实。阿德马尔取走的每一分钱、欠下的每一笔人情，都为巴西和人民留下了更多——从就业岗位，到医院建设，受益最多的，正是巴西国家最贫困的底层群体。这样的名声是阿德马尔为自己留下的遗产，从圣保罗开始，逐渐辐射全国。如今，它将成为小瓦加斯和社进党的基石，成为我们赢得支持的法宝，成为我们引领巴西走向未来的方向。"
 BRA_defining_our_legacy: "功过谁评说"
 BRA_defining_our_legacy_desc: "这次总统大选不仅是小瓦加斯的大考，更承载着阿德马尔的政治遗产，是决定社进党这几年名声的关键一战。名声未必就是好名声，当所有人都想抹黑你时，或许就需要一些适当的美化。说到底，比起绞尽脑汁，还不如撒钱开道——还有什么比给历任总统设立私人信托基金更能确保社进党的声名和地位呢？\n\n虽然这笔通过合法手段取得的资金数额不多，对各类项目帮助有限，但象征性的立法配合阿德马尔计划中的圣保罗总统图书馆，似乎也能让公众相信高原宫确实心系巴西人民。"
 BRA_adhemar_the_myth: "神话"
 BRA_adhemar_the_myth_desc: "历史从来不是纪实影像，而是书写传奇的史诗。要是阿德马尔的政治生涯就此落幕，这位治理国家数十年的英明人物必将为后世长久铭记。但是，如果就此止步，甘于几句平庸的褒扬、被愚笨之徒束缚手脚，岂不是辜负了本该彪炳史册的声誉？古希腊将神话熔铸进西方文明的基石，古罗马为后世立下万世不易的典章。\n\n在这广播电视普及的时代，更应学习古人的遗产。阿德马尔·德·巴罗斯成功兑现了对人民的承诺，他的传奇故事必须代代传扬。"
 BRA_enjoying_our_rewards: "犒劳自己"
 BRA_enjoying_our_rewards_desc: "多年来，阿德马尔一直鞠躬尽瘁为国服务，甚至不顾病体坚持出院主持工作。像他这样守护国家、不知疲倦的伟人，如今能好好休息一番，实在是理所应当，换了谁都是如此认为——更何况他也确实让国内民众得以安稳生活。\n\n社进党会一直铭记这位可敬的总统所做的一切。为表认可，党将在国民议会推动一项投票，把总统的养老金提升至合理水平，同时对总统任职期间的所有行为予以赦免。毕竟，领导人履行职责，不应受到惩处。"
 BRA_adhemar_the_man: "放手之人"
 BRA_adhemar_the_man_desc: "表面上阿德马尔还在强打精神主持大局，实际上早就心力憔悴、颛顼自满，尤其是经历了那次几乎令他丧命的危机之后，更是如此。控制欲确实是阿德马尔的职业特质，但现在或许已经到了功成身退的时候。换别人掌舵，社进党一样能扬帆远航。眼下最要紧的，是为新一代爱国者扫清障碍，传递衣钵。到头来，清清白白地挂冠而去，又有何不可？\n\n接下来的日子里，他只需与心腹把酒话别，静待政权平稳过渡。只要社进党别为了权势打得乌烟瘴气，小瓦加斯定能当好这个守成之主，照着既定方针继续前行。"
 BRA_one_last_speech: "最后的演讲"
 BRA_one_last_speech_desc: "阿德马尔的声名或许已与瓦加斯并驾齐驱，但还远远称不上“无敌”——比起那位入土多年的前任，他的健康状况其实也好不到哪儿去。成败在此一举，总统要在权力交接前作最后一次演讲。这次演讲，将是未来数年内国际社会对他的最后定论，它必须庄严神圣，足以提炼其毕生功业，将其定格为青史留名的永恒瞬间。\n\n阿德马尔日渐衰弱，他心中明白，比起英雄迟暮，后人的评说才是塑造传奇的关键。为此，他早早邀请了“友好”媒体到场，务必确保高原宫的谢幕演出万无一失。"
 BRA_times_arrow: "韶光似箭"
 BRA_times_arrow_desc: "滴答，滴答——午夜钟声终于敲响。烛影摇红，晨曦宫富丽堂皇的套间里，朴素古雅的卧房正被黑暗缓缓吞噬。无论后世称其为刚愎自用的莽夫或雷厉风行的实干家，阿德马尔·德·巴罗斯已经活的太久。死神的子弹早已穿透他的胸膛，可这副枯朽的躯壳硬是凭着最后一口气，捱过了这漫长的终章。荣辱得失，功过是非——到头来，他将在这凌乱的病榻上独自咽气。\n\n办公桌上，半杯清水映着一副扑克牌的残影。牌局已终，骰子落定。这个为巴西梦扫清一切障碍的老棋手，此刻只是木然枯坐——布局如此周密，小瓦加斯定会不负期待……"
 BRA_return_to_normality: "回归常态"
 BRA_return_to_normality_desc: "天网恢恢，疏而不漏。\n\n由于阿德马尔·德·巴罗斯的缺席，社进党这个腐败的大本营摇摇欲坠，阿德马尔和他的那些蠢事现在也只是不堪的过往了。就因为这个人，巴西在过去的几年逐渐陷入了暴力与欺骗的泥潭。在阿德马尔任期内，欺上瞒下、收受贿赂、重划选区，还有其他罪行都如同家常便饭。\n\n而从头到尾目睹了一切的这个人，埃德娜·洛特，宣布这一切该结束了。\n\n现在，浪子已经回头。如她的父亲一般，埃德娜会让巴西恢复到还没有被阿德马尔玷污那时。在工党和社民党的支持下，瓦加斯主义会再次得到巴西人民的信任。当然，要在1970年大选之前。"
 BRA_adhemar_biggest_success: "他的辉煌胜利"
 BRA_adhemar_biggest_success_desc: "无可置疑的是，在阿德马尔担任总统期间，纳粹德国曾经微不足道的影响力急速上升，在巴西境内创造了一个全新的势力集团。不管你喜不喜欢，巴西的很多领域都极其需要德国的资金。\n\n巴西当然有一些态度明显的反德人士。就比如说埃德娜，她本人并不喜欢纳粹，而她明面上所代表的许多少数族裔也不喜欢。如果顺着这些人的意思切断和德国的关系，我们可以加强与美国的联系，但与之相对应的是许多学校、医院和基础设施项目将暂停，德国的资金使这些项目能够继续下去。总统必须好好想想这个问题：他愿意抱着他的良心做到什么地步？或者换句话说，他更愿意去抛弃哪一部分人……"
 BRA_continue_independent_course: "保持独立自主"
 BRA_continue_independent_course_desc: "虽然许多人都不愿意承认，但是如果我们希望能在世界舞台上保持巴西的影响力，就有必要维系与全球三大经济体的联系。在如此的境况下，林斯和他主张独立外交政策的同僚占据了上风。\n\n然而，这并不意味着巴西从此就要对颐指气使的日耳曼尼亚百依百顺。阿德马尔的境界未免太狭隘了。他想的还不够远——与其把所有的赌注放在德国这边，不如向共荣圈靠近。等到我们和共荣圈关系好到一定程度，就让团结协定靠边站去吧——这样我们也能把自己洗得更白一点。"
 BRA_always_wrong: "纵有千失"
 BRA_always_wrong_desc: "腐败如同一种慢性疾病，能够从内部侵蚀乃至摧毁一个组织，这一点是民众公认的事实。然而，就算明知至此，我国的腐败问题仍然发展到了极为严重的程度。在社进党的领导下，腐败问题尤为严重，巴西人民对那些明目张胆、比比皆是的腐败行为甚至已经感到见怪不怪了。更过分的是有些人还拿这件事开玩笑，好像那不过是阿德马尔干出来的诸多怪事当中普普通通的一件而已，挥挥手就过去了。\n\n我们的国家竟堕落到此等地步，着实令人痛心，决不能再这样下去了。埃德娜不会再容忍这些人继续胡作非为。社进党，还有那些与他们有着千丝万缕联系的人为了一己私欲，把政府变成了进来就能躺着就能捞钱的私人金库，我们要把现有的规则连根拔起，依法对他们进行正义的制裁。这是一项艰巨的任务，但我们依然要完成它，因为腐败是一种恶性瘟疫，它从我们的内部开始四处侵染、腐蚀，我们不能让国家毁在它的手里。"
 BRA_sometimes_right: "必有一得"
 BRA_sometimes_right_desc: "阿德马尔是一条毒蛇，我们敢于这样直截了当地下结论。阿德马尔就是一条肮脏又下作的毒蛇，他把政府变成了自己的一言堂，他和他的那些党羽为所欲为。他们的所作所为无疑是对巴西和民主制度单方面的凌辱。\n\n但万事都没有绝对。\n\n阿德马尔总的来说还是做了几件好事，他曾有一个响当当的绰号：“收钱办事先生。”医疗、教育、福利、经济，每一项在他的任期内都取得了相当的发展。不得不承认，阿德马尔就是靠贿赂，就是靠贪污，才达成了这些目标。埃德娜向来拒绝跟他们同流合污，也不愿意一有事就总想着用钱解决，但她最终意识到，如果必须要借助这些不光彩的手段才能维持巴西人现有的生活水平，那也只有妥协这一条路可以走了。"
 BRA_keep_hands_clean: "手别沾腥"
 BRA_keep_hands_clean_desc: "我们的反腐工作取得了初步成效。现在那些政客在偷偷摸摸地拿一点竞选资金装进自己的口袋之前，起码能像以前一样三思一下，他们本该如此。在这场反腐斗争中，我们获得了第一场战斗的胜利，此时正应乘胜追击，是时候向下一个腐败重灾区发起进攻了，它就是商界。\n\n在我们的不懈努力下，一系列惩治腐败分子的法律终于获得了通过，自此以后警察便有权查处国企和私企中的那些贪污犯了。我们要告诉每个巴西人：那个贪腐横行的时代已经过去了！本届政府不会再容忍他们的罪行。"
 BRA_physiologist_unity: "骨肉联合"
 BRA_physiologist_unity_desc: "社进党有一段……呃，算是有趣的历史。这至少是瓦加斯的党，他本人可是在巴西广受尊敬。虽然该党最近经历了一段跌宕起伏的时期，但该党仍然以进步作为其核心理念。\n\n哪怕之前遭遇了许多变故，该党仍有巨大的潜力。埃德娜准备充分利用这份潜力……虽然代价是一些关键的政府职位和大量的资金。就算如此，瓦加斯和洛特的继承人们也定会为一个美好的巴西而并肩作战。"
 BRA_employ_new_rhetoric: "摇唇鼓舌"
 BRA_employ_new_rhetoric_desc: "我国一半的人在结婚时无法拥有相应的财产，无法获得平等的医疗保障，也无法赚得和另外一半人一样的工资。理论上说，大部分人看到这都会吓得不轻，觉得这骇人听闻。然而一旦他们意识到这贫困的一半不是什么定义模糊的群体，而实际上是巴西的女性时，他们就会变得对此满不在乎，耸耸肩走开。\n\n多令人作呕的性别歧视！埃德娜是巴西建国以来的第一位女总统，而此前性别问题的处理被一拖再拖。该处理这些被人遗忘的不平等议题了，这些问题都可以追溯到1934年的宪法，只有做出彻底的改变，平等才不会仅停留在纸上。"
 BRA_stop_the_madness: "摆脱狂热"
 BRA_stop_the_madness_desc: "动动脑筋想想，我们真的要一次性进行50个大型项目吗？用极其昂贵和庞大的建筑项目来创造就业机会，并投入过多的资金。这种事也就阿德马尔总统为了保证连任才能干的出来了，这简直是一种“自私自利”的民粹举动。\n\n虽然阿德马尔似乎很满足于把自己当成魔术师，可以从礼帽里拿出所有必要的钱，但我们不会被他的小把戏骗到。真遗憾，这些魔术一样的项目将被我们全部废止。虽然我们已经没办法挽救什么了，但起码我们可以把这些项目的余下资金转移到更有用的地方，但愿能物有所值。"
 BRA_develop_the_countryside: "开发农村"
 BRA_develop_the_countryside_desc: "伊纳西奥·兰赫尔，这位名副其实的金融奇才，被埃德娜任命为了巴西经济的新掌门人。但凡是个有脑子的人见到阿德马尔大兴土木的操作都得被气个半死，兰赫尔自然也不例外。所幸现在所有愚蠢且费钱大型项目的投资都已经被叫停了，终于把钱能用在刀刃上了。\n\n有的人认为应该先向有一定经济基础的地区投资，但兰赫尔反对这种观点。他提出：国家此时应该把钱投入到乡村地区的现代化建设当中。兰赫尔认为如果继续放任城乡差距扩大下去，迟早有一天会把国家经济拖垮，因此埃德娜在着手其他事项之前执行此决定是唯一明智的做法。"
 BRA_amazonia_nossa: "亚马孙是我们的！"
 BRA_amazonia_nossa_desc: "罗梅乌·德·坎波斯·韦加尔就像贴在船底的藤壶一样赖在他的位子上，就连洛特上台之后他都没被赶走。作为社进党中的左派分子，想必他知道怎么能从那些烂尾的大型项目上尽量多地收回一些东西来。\n\n这一次我们的计划是继续完成阿德马尔时期在亚马孙地区展开的那些开发项目。许多巴西人民都盼望着亚马孙能正式被纳入国家管辖之中，并为之激动。继续完成对亚马孙的开发更是有百利而无一害：生活在那里的人们终于能感受到做一个巴西人是多么的幸福，而我们既收获了光彩的政绩，又得到了实在的收入。这简直是再标准不过的双赢。"
 BRA_brave_and_bold: "勇士和莽夫"
 BRA_brave_and_bold_desc: "阿德马尔下台，埃德娜上任，一切开始愈合。直接影响我们国家的问题已经得到了缓解，现在我们可以去处理一些更紧迫的问题了，当然，这一切都建立在总统把计划搞清楚的前提下。\n\n现在，该与巴西更多的政界人士会面，再进行之后的决定了。全民盟、工党、社民党，几乎所有政要都会被邀请，我们组织起来的这一大帮人最终会把巴西建设的比以往还要伟大。还有什么时候比在一起聚餐吃烧烤时更适合讨论这些问题呢？"
 BRA_her_league_of_justice: "她的正义联盟"
 BRA_her_league_of_justice_desc: "难道我们没从过去五年里吸取到一丁点教训吗？让社进党进入权力核心，无异于往煮好的汤里加老鼠屎，好好的一锅汤现在谁都喝不成了。历史证明他们完全没有能力治理好国家，禁止社进党加入是我们的底线，绝不让步。\n\n历史同样证明，社民党是组建联合政府的理想对象，切断同他们的联系对我们没有任何好处。从过往的经验看，尽管社民党内的保守派可能会拒绝同我们合作，但改革派在社民党内同样有着巨大的影响力。而且，这还是一次向民众展示我们的绝佳机会。我们会证明：不靠贿赂，总统照样可以管理好巴西！"
 BRA_her_league_of_justice_tooltip: "改革将在§Y社民党§!革新派的帮助下成功！"
 BRA_her_array_of_gadgets: "她的小帮手们"
 BRA_her_array_of_gadgets_desc: "尽管我们党只想和那个美其名曰是政党，实则是个犯罪团伙的组织划清界限，但社进党的左翼至少在意识形态领域和我们有共同话题。再退一步说，阿德马尔设计的那些畸形的社会福利和利民政策虽然总体上看失大于得，但毕竟还是做了点好事。\n\n所以我们也只能咬紧牙关，争取小瓦加斯和他代表的党派的支持。这意味着我们会遭受经济上的损失，但是有了社进党的支持，同样意味着我们能够以最强有力的方式推进改革。"
 BRA_her_array_of_gadgets_tooltip: "改革将在§p社进党§!的帮助下成功！"
 BRA_what_one_lott_started: "老洛特起步之初……"
 BRA_what_one_lott_started_desc: "恩里克·洛特在任期间重点推动了两项政策：其一是农业改革，其二是让文盲拥有投票权。埃德娜计划将这两项政策继续推进到底，她将致力于深入完成农业改革，并且让所有公民获得投票权。\n\n但在计划开始之前，必须首先确保军队站在我们这边。虽然军方势力已经被削弱了许多，他们现在已经不太有可能像几十年前那样干预政治了，但毕竟小心驶得万年船。埃德娜·洛特作为恩里克·洛特的女儿，她知道有相当多自己很久以前就认识的将军是护宪派，她要找的也正是这些人。"
 BRA_finish_agrarian_reform: "完成农业改革"
 BRA_finish_agrarian_reform_desc: "现在的巴西还不是一个平等的国家。阿德马尔在职期间只给巴西人带来了少数地区的经济繁荣，这些地区以外的广阔国土上依旧赤贫，那里的人民也无法真正做到自食其力。\n\n我们不能不向这些此前就被忽视了的地区伸出援手。我们将征用这些欠发达的地区的私人土地，国有企业将获得回报。不幸的是，此举一定会触怒很多农场主和农业工人，但他们的怒火总会平息，而土地改革决不止步。"
 BRA_cooperation_means_liberation: "合作带来解放"
 BRA_cooperation_means_liberation_desc: "农民联盟中聚集了各式各样的小农户，如果我们能与之合作的话，会对法案的通过起到至关重要的作用。不幸的是，农民联盟内部的腐败问题是摆在我们面前的一大难关。他们的领导人层基本上都收了黑钱，结果就是这些人对农户的死活不管不问。为了解决这个问题，政府会尽力寻找农民联盟中真正致力于帮助农民群体而非中饱私囊的领导人。"
 BRA_abolish_the_spi: "废除印第安人保护局"
 BRA_abolish_the_spi_desc: "最近，负责原住民事务的印第安人保护局爆出了一系列令人恐惧和震惊的丑闻，他们包庇了那些对原住民实行种族清洗的人，使其免受惩罚；有的时候他们甚至会默许这样的罪行。这样的行径我们绝不能容忍，洛特总统下令即刻起解散印第安人保护局，对其虐待原住民的行为进行深入调查，并且宣布将任命达西·里贝罗作为负责人组建新的政府机构以保护原住民。"
 BRA_correct_centuries_of_exploitation: "剥削不再"
 BRA_correct_centuries_of_exploitation_desc: "巴西的底层民众的背负着无数座大山，其中有开发商、政府和不良商业行为，而且还远不止于此。自巴西建国之初，人们就过着这种生活，数个世纪之后依旧如此。那些原住民、农民、社会中的少数群体，都有着与此相似的命运：他们过着牲畜一般的生活。\n\n这世道该到头了。我们的口号喊得像雷声一样响亮，那我们的行动也当如暴雨一般有力，洗刷掉一切旧秩序，还世间一个朗朗乾坤。这个崭新的巴西将保护那些最穷苦的人，在这里国家将服务于她的人民，而不是要求人民服务他们的国家。是时候采取实际行动，纠正此前几个世纪中我们犯下的错误了。"
 BRA_perfecting_democracy: "完善民主制度"
 BRA_perfecting_democracy_desc: "我国有大量选民认为国家从未实现过真正意义上的民主。虽然听起来很荒唐，但他们言之有理。巴西民众当中存在大量文盲和对政治选举一无所知的人，这些人从我们刚建立民主选举制度时就不知道投票有何意义。不过亡羊补牢犹未晚矣，埃德娜会成为民主的英雄：她策划了一系列宣传普及投票权的项目，这会大幅提高工党选民的数量。"
 BRA_remove_voting_barriers: "扫除投票障碍"
 BRA_remove_voting_barriers_desc: "在巴西，不是所有成年人都有投票权，这简直是国家的一大耻辱。我们设置了种种毫无意义的规定限制有投票权的人去投票，剥夺了很多人的选举权。\n\n文盲群体不具有选举权的规定是负面影响最大的一项政策，而埃德娜将改变这一切。\n\n现在通过修宪赋予所有成人选举权已经来不及了，但至少我们可以修改法律中对“文盲”的定义，让更多人能够参与投票。\n\n降低门槛之后，成千上万的民众自此拥有了选举权，他们将投出此生的第一张选票。"
 BRA_push_for_a_civil_society: "推动公民社会"
 BRA_push_for_a_civil_society_desc: "当人民对民主漠不关心的时候，民主还有什么意义？要是我们的人民继续冷漠下去，我们就没法指望我们的国家会做出什么意义重大且长期有效的改变。针对这个问题，我们的政府将开展一场大规模的公众运动来强化政治参与在民众心中的重要性。从农村的农民到城市的中产，所有人都会知道我们是唯一能阻止可怕的寡头政治复辟的人。"
 BRA_rescind_immigration_ban: "取消日本移民禁令"
 BRA_rescind_immigration_ban_desc: "我们国家有许多荒谬的立法，但没有哪条像《日本移民禁令》这样荒诞不经。更令人不齿的是，历届政府竟对此无动于衷，从未试图废除它。所幸，时局的变化让我们迎来了纠正这一历史错误的契机。机会稍纵即逝，我们必须趁现在彻底废除这条歧视性法案，免得仇恨的种子生根发芽，最终失控。党内或许会有声音质疑我们“冒险”的决定，尤其是在选举临近之际做出这样的变动是否过于草率；他们大可放心，我们失去的选票，自然会由日本裔选民的选票弥补。失之东隅，收之桑榆，就这么简单。"
 BRA_the_other_half: "另一半"
 BRA_the_other_half_desc: "巴西女性还要被禁锢在贤妻良母的形象里多久？撑起人口结构半壁江山的女性，难道只因性别就要永远矮人一截？作为巴西史上首位女总统，埃德娜·洛特决意让这个历史身份发挥其应有价值。呼吁女性权利的演讲与象征性的立法不过是开场锣鼓，她要挥舞总统之剑，劈开公务员体系的性别壁垒——五年过渡期后，每个政府部门都须达到最低女性比例，这只是破冰的第一步。"
 BRA_weaken_mil_progressita: "削弱社进军国派"
 BRA_weaken_mil_progressita_desc: "尽管令人痛心，腐败问题远比我们预想的严重。这病毒已渗透权力机关与社会肌体的每个角落，连本该守护国家的军队亦不能幸免。如今横亘在我们面前的，是那些自诩“社进派”的社进党军国派——一群只认钞票不认国旗的兵痞。若有一天金库枯竭，天知道这些人会闯出什么祸来……\n\n虽然不能斩草除根，但我们依然要不遗余力地削弱这股势力，同时支持护宪派和索邦派这类不会将忠诚之心明码标价的军人。"
 BRA_liberty_for_all: "自由为人人"
 BRA_liberty_for_all_desc: "随着我们和拉塞尔达之间的“休战协议”到期，他已经开始用“暴民政治”形容本届政府了。在我们为了全体国民的权利而奋斗之时，他只关心精英阶层，这就是我们对拉塞尔达的回击。可以预见，不久的将来我们又将围绕巴西的国家精神迎来一场与保守派势力的大战，尽管赢得这次斗争的胜利无法一劳永逸地解决矛盾，但赢得这场斗争将是工党的又一次重大成功。"
 BRA_meet_with_wainer: "与魏纳会面"
 BRA_meet_with_wainer_desc: "如果我们党希望在即将到来的选举中胜出，或者还想更进一步扩大我们的势力，那就必须赶快行动起来了。利用宣传手段让更多民众知道我们的成绩，就会有更多的人愿意支持我们的事业，同时还要不断地告诉民众：只有瓦加斯主义才能带领巴西继续前进。为了完成这个任务，我们必须动员起一切可能的力量。那些忠于我党的工会、教师、党内官员、乃至任何一个被社进党疏远的人，都可以被团结起来汇聚成坚强的后盾，支持我们夺回应有的地位。\n\n收复人心的第一步在于争取一位关键人物的支持：萨穆埃尔·魏纳。魏纳是《突发新闻》报总编，该报是目前唯一站在我们这边的全国性媒体，他的地位举足轻重。该让埃德娜跟魏纳聊聊宣传的策略了。"
 BRA_UDN_coldness: "保守主义之寒"
 BRA_UDN_coldness_desc: "全民盟何时才会停止为了拿下东北选区而再三欺骗民众的行径？难道人们都不记得全民盟降低了最低工资标准吗？而且戈梅斯执政也不过就是十年前的事，当时他把国家祸害成了什么样子，人们也都没印象了？如果说他们的想法有任何摇摆不定，那也仅仅是因为全民盟是塔沃拉在背叛了瓦加斯的信任之后，背着瓦加斯偷偷组建起来的。\n\n但眼下由于阿德马尔的问题和社进党内部的混乱，很多右翼选民为了阻止我们赢得大选，又一窝蜂地把票投给了全民盟这个“理性”的政党，我们得想个办法。只要动用一些东北地区的人脉关系，就能让那里的人民回想起之前发生的那些事件的全貌了。拉塞尔达过去的污点必须被清理掉，这样社进党才能回到他们在政坛上应有的地位中。该到北方觉醒的时候了。"
 BRA_PSP_corruption: "阿德马尔主义之腐"
 BRA_PSP_corruption_desc: "社进党的腐败问题早已不是秘密。事实上在巴罗斯执政时期，“早已不是秘密”都算是在轻描淡写了。腐败成为常态并非是因为阿德马尔政府处置失当，反而是因为他们把贿赂当成了扩大影响力的一大法宝。遗憾的是，这些人总有办法把自己摘得一干二净，他们最常用的伎俩就是把腐败行为说成是为了“大众利益”，嘴上哄骗着让人们相信他们是在做好事，手上干的则是继续给自己捞钱。\n\n从现在开始，我们要把真相公之于众。我们的经济学家会负责让每一位国民都明白腐败究竟给国家带来了多大的损失，我们的记者则会让阿德马尔和小瓦加斯过去的罪行公之于众。"
 BRA_together_with_papa: "携同父亲一道"
 BRA_together_with_papa_desc: "随着我们的领导人获得越来越多的支持，洛特家族也开始在公众视野中占据中心位置了。埃德娜·洛特和她的父亲在全国各地视察，不断地向民众宣告着法制、平等和全体民众而非个别政府高官的发展，将始终作为工党的核心议题。这对父女总共做了数十次演讲，他们有时是一起上台，有时是其中一个人独自演讲，但不管怎样他们每个人都把无数的民众带回到了正义的一方。\n\n父女二人齐心其利断金，他们共同创造出的这些政治宣传要比工党那些谎话连篇的宣传机器有影响力得多。若是我们的政治对手看到洛特家族是如此强大，竟能在阿德马尔留下的一地狼藉之中建立起一个崭新的政治时代，必然会心怀畏惧。"
 BRA_making_vargas_proud: "为瓦加斯争光"
 BRA_making_vargas_proud_desc: "我们成功了！埃德娜不仅证明了自己有能力和这个国家最有权势的那批政客同台竞争，更证明了自己才是瓦加斯政治遗产的合法继承人。在工党的不懈努力下，我们为巴西带来了前所未见的繁荣景象，腐败的阿德马尔政府终于开始淡出人们的记忆了。前路漫漫，距离理想中那个自由的巴西还有很长的路要走，但埃德娜和她的内阁成员展现出了顽强的毅力，不管剩下的道路还有多长，他们都会义无反顾地走下去。\n\n但是今天，埃德娜和她的国家可以好好庆祝一番了，至少在今天他们是赢家。今夜我们痛饮庆功美酒，一想到种种不公都已经被我们消灭，这琼浆玉液就显得格外甘甜。不管有怎样的艰难险阻在前方等待着我们，这个伟大的国家将始终团结在勇敢无畏的领导人身边，它定能取得最终的胜利！"
 BRA_use_last_moments: "分秒必争"
 BRA_use_last_moments_desc: "我们失败了。尽管埃德娜和工党已经尽其所能，但我们还是输了。巴西将在非瓦加斯主义者的操控下度过接下来的五年，可以预见的是国家将陷入停滞，其他党派将会填补那些我们没能利用起来的权力真空。国家的前途、我们党的前途都变得迷雾重重。\n\n但是就算我们今天输掉了选举，明天太阳也会照常升起，工党必须继续存在下去。无论何时，我们始终忠于自己的理想，埃德娜会利用她在任的最后一段时间继续推进在所有国有企业中保证男女同工同酬的政策，为在巴西实现性别平等献上最后一份力。我们为了消除阿德马尔时期的腐败风气所做的各项工作也将进入收尾阶段。经过这两件事之后，人民终有一天会意识到五年前我们接手的巴西和五年后我们留给后人的巴西之间，究竟有着多么巨大的差别。"
 BRA_adhemar_gone: "斯人已逝"
 BRA_adhemar_gone_desc: "我们尊敬的阿德马尔·佩雷拉·德·巴罗斯总统去世了，愿仁慈的主给予他永恒的安息。四年前，随着阿德马尔当选总统，一场轰轰烈烈的社会进步革命就此展开，时至今日，这场革命也随着他的去世陷入了前所未有的巨大混乱之中，社进党在阿德马尔离开之后同样面临着巨大的困难。从计划弹劾埃德娜·洛特开始，到后来走上过度亲德的路线，之后他又突然陷入昏迷，把他赶下总统职位的努力也半途而废，到最后他与世长辞，这一切都发生得太快、太残忍了。\n\n对劳多来说，这就像是一场噩梦，但他知道这里是现实而不是梦境，掐自己再多下也不会从梦里醒来。他必须赶紧行动起来，说什么也不能在佩德罗·阿莱绍的临时总统任期内让社进党丢掉执政党地位，从此一蹶不振。而且劳多·纳特尔还要领导社进党重新赢得民众的支持，赢下1970年大选，劳多心里明白自己肩上的这副担子究竟有多么沉重。"
 BRA_calculate_losses: "评估损失"
 BRA_calculate_losses_desc: "社会进步革命之所以会因为阿德马尔去世而陷入危机，其中一大原因就在于阿德马尔是社进党内的强力黏合剂，不管社进党处于高峰还是低谷，阿德马尔始终能团结起党内的各方势力。他的去世太过突然，对社进党来说不亚于一场政治大地震，我们不得不集中精力优先处理这一重大变故，而我们本可以利用这段时间开展更多的活动使我们能获得社进党的支持。而且阿德马尔的去世对我们来说也是一个重大的损失。\n\n在我们讨论如何弥补阿德马尔去世造成的损失之前，首先要讨论的问题是它究竟造成了怎样的损失，所以我们需要一些帮手。圣保罗的人们依然铭记着这位伟大的总统，并且在眼下的危难时刻依然支持着社进党，支持着这个由那位已经埋葬在皮拉西卡巴他的父亲身边的伟人所领导的党派。但是圣保罗之外的人们恐怕就没那么好的态度了……"
 BRA_calculate_losses_tt: "$BRA_party_psp_c$参议员们正§R同我们的党割席§!……"
 BRA_keep_party_unity: "维持党派团结"
 BRA_keep_party_unity_desc: "伟大的阿德马尔·德·巴罗斯总统已经永远地离开了我们，为了保存他留下的事业，我们需要团结起社会进步党全党的力量。在这样关键的时刻，劳多·纳特尔这种技术官僚根本担不起领导社进党的重任，他自己也知道自己不是这块料。如果要在阿莱绍的临时任期结束后把纳特尔推上总统之位，就只能说明我们没有从1960年大选，也就是毫无吸引力的洛特元帅对夸德罗斯的那次选举中吸取到任何教训。\n\n所以我们急需一个能站出来团结全党，带领大家击败瓦加斯主义者和保守主义者的人。在这种情况下，社进党支持者们的脑海中不约而同地浮现出那个名字：小热图利奥·瓦加斯，“穷人之父”热图利奥·瓦加斯之子，前任总统阿德马尔的忠实拥护者。他会利用好他的号召力、他的名字，以及他与阿德马尔的亲密关系，阻止社进党走向分裂。这当中很多事情都是劳多永远无法办到的。"
 BRA_adhemar_successor: "他的合理继承人"
 BRA_adhemar_successor_desc: "第一步已经迈出，前方的目标已经确定。劳多·纳特尔要说服新总统允许社进党在阿德马尔剩余的任期内继续执政。我们必须履行好管理国家的义务，这是全体巴西人民在1965年给予我们的信任。同时，我们还得让这位阿莱绍先生明白自己的定位，做事得有点分寸。\n\n要做到这几点岂止是困难，是相当的困难。阿莱绍可不是什么好好先生，劳多也没笨到真以为三言两语就能把这个人糊弄过去。如果劳多没有竭尽全力，用上一切说服和恐吓的技巧逼对方就范，他作为阿德马尔继任者的这段仕途恐怕还没等开始就要结束了。"
 BRA_winter_is_coming: "凛冬将至"
 BRA_winter_is_coming_desc: "德尔芬·内托，我们的经济部长，始终认为要从崩溃的边缘拯救巴西经济，唯一的办法就是强行禁止工资上涨。但是现在阿德马尔已经去世，眼下正是政局动荡之际，如果按照内托的方案实施下去，我们就休想再赢下哪怕一场选举了。所以我们必须临时调整政策，通过其他办法尽量避免最低工资标准跟着通货膨胀而自动上浮。\n\n为了尽量降低对小瓦加斯选情的影响，在选举开始之前，我们得让这个替代方案造成的负面影响越小越好。不过等到投票一结束，我们就不必再投鼠忌器了，最终要在新的任期内实现必要限度内禁止工资上涨。全民盟很可能会认为我们的政策调整非常及时，只要通过一项法案废除掉贸易联盟需要上缴的税收项目——到时候就说这些税种给巴西劳工群体带来了不必要的负担就行——这样一定能进一步争取到更多全民盟的支持。"
 BRA_continue_as_usual: "一切照旧"
 BRA_continue_as_usual_desc: "社进党在巴西政坛上始终没有太大的影响力，这个问题困扰了阿德马尔很久，说不定他就是一直发愁这件事才愁出了心脏病，现在轮到劳多·纳特尔想办法了。光靠我们自己的力量要想胜选几乎不太可能，所以我们必须改造社进党，让它变得更加强大。\n\n至于具体怎么做也很简单，只需要把所有的国家部门和政府机构里全换上我们信得过的自己人就行。之后再修改一下劳工法，把企业裁员需要的成本设置到他们几乎承受不起的水平，让企业实际上没办法再开除员工。我们还可以在修改法案的时候多加几条进去，用法律保护贸易联盟和农民联盟的位置免受威胁，顺便再给公务员涨涨工资，省得工党那帮人又来找茬。"
 BRA_clean_hands: "光明磊落"
 BRA_clean_hands_desc: "光靠我们自己的力量想要胜选恐怕希望渺茫。我们还是得用阿德马尔时期的老办法，通过组建一个稳固的政治联盟推动我们的法案通过。眼下这个法案要通过不能只靠社进党自己投赞成票，还得争取其他党派议员的支持。\n\n阿德马尔当年一边贪污一边干活，得亏是做出的成绩比较多，这才勉强没落到人人喊打的地步；但要是换成劳多·纳特尔这种没什么声望的普通技术官僚，他要敢学着阿德马尔这么干，每次出门管保被人扔一脸西红柿，而且被扔西红柿恐怕都是轻的，弄不好脑袋上得多个枪眼。所以这一次我们既要让法案通过，又不能贿赂收买其他议员，这样也好展示一下本届政府事实上还是巴西的合法政府，我们不是一届腐败的政府，也不会为了自己党派的政治利益而坐视国家破产。\n\n§x千万牢记，这两条要求中但凡有一条没有做到，我们就休想在重新选举中获胜了。§!"
 BRA_clean_hands_tt: "我们选择的法案即将投票表决……"
 BRA_no_populism_laudo: "民粹主义之终结"
 BRA_no_populism_laudo_desc: "有人声称民粹主义是已故的阿德马尔·德·巴罗斯总统留下的政治遗产。这种政治修辞的本质，乃是全民盟和工党试图将他们失败的政治理念转嫁到这位为国鞠躬尽瘁的伟人身上。\n\n接下来我们将完善官僚机构职能建设，重点任命技术官僚治理巴西——这才是阿德马尔留给我们的政治遗产。若要维护他作为总统的荣誉，我们有责任将这一事业延续下去。我们将从全民盟、社民党和工党中吸纳技术官僚出任部长要职，以此彰显社进党的全新执政效能。自今日起，社进党将成为效率与进步的代名词。至于某些偏激人士所谓的“腐败”指控，新式会计手段将有效消除公众疑虑。"
 BRA_no_populism_laudo_trigger_tt: "我们通过了§K国家工资指数标准化法案§!。"
 BRA_join_or_die_laudo: "加入，或死亡"
 BRA_join_or_die_laudo_desc: "在法案彻底生效之前，最好还是得多一道保险以防万一。比如，我们得设法让政府公职人员和他们的家属都投票给社进党，没了我们社进党，他们能享受如今这些福利待遇吗？\n\n“给社进党投票吧！什么？你不是很想投给社进党？行啊，那你就别在政府干了，自己出去找工作去吧。哦，您投票给我们了吗？那提前恭喜您了！您很快就能感受到这份全巴西，不对，是全南美！最铁的铁饭碗到底有多棒了。”"
 BRA_join_or_die_laudo_trigger_tt: "我们通过了§K劳工法改革法案§!"
 BRA_killers_adhemar: "害死阿德马尔的人"
 BRA_killers_adhemar_desc: "在已故总统阿德马尔·德·巴罗斯博士仍在世的时候，他以多种方式为人民服务。先是成为了一名医生，然后成为了圣保罗的州长，接着在社进党一马当先，最后成为了一位总统。考虑到阿德马尔死后的政治环境变化，他还有一种为我们服务的方式，一种微妙却又必然的方式。\n\n他的死对我们来说非常有用。这场关于德国间谍的争论已经造成了混乱。我们可以利用好这一点，散布出一个谣言：在阿德马尔意识到自己允许德国叛徒莉亚娜·克莱门特引诱他的错误之后，德国人害怕夜长梦多，先发制人毒死了阿德马尔总统。这就给了我们与团结协定断绝一切关系的正当理由。"
 BRA_total_army_compatability: "全方位军事合作"
 BRA_total_army_compatability_desc: "事实证明我们此前对OFN的政策荒谬至极，白白浪费了大好时间。结果就是现在我们已经来不及，也没有足够的动力推动巴西正式加入自由国家组织。我们与自由世界最后的希望失之交臂，但好在事情还没有到无可挽回的地步。\n\n在军队中，我们的最高指挥部和OFN的指挥中心能够直接联络，同时我们的武器装备采用的标准和OFN的精锐部队所采用的标准非常相似，有了这两条，就足够我们在与OFN进一步合作的道路上再向前迈进一步。与OFN合作是正义的，也是正确的，从今天起我们会携手共同对抗法西斯！"
 BRA_negotiate_debt_payment: "债务偿付谈判"
 BRA_negotiate_debt_payment_desc: "眼睛一闭一睁，团结协定和德国走狗们统统被我们赶出了巴西。但即便这样，华盛顿和国会山上的那些美国老爷对我们的政策方向还是不放心。不过别慌，我们的外交部长不是吃素的。\n\n瓦斯科·莱唐·达·库尼亚已经出使美国，他此行的目的是试探华盛顿，如果华盛顿愿意就巴西所欠美方债务而产生的巨额利息问题上做出一点让步，那我们自然也更有动力修复被阿德马尔破坏的两国关系。"
 BRA_bastion_of_innovation: "创新的桥头堡"
 BRA_bastion_of_innovation_desc: "来自欧洲的压迫者们伸出的魔爪已经被我们彻底粉碎，美国及其盟友则伸出了合作之手，他们会给我国的经济发展带来很大的帮助。但是不要忘记夸德罗斯曾经说过一句话：永远不要把所有的鸡蛋放在同一个篮子里，当然这可能是他唯一一句没讲错的话了。\n\n我们可以适当地给予共荣圈国家一些关税优惠，这样的话应该能同时刺激来自OFN和共荣圈的投资。他们会为了赢得我国的青睐而争相给出更高的价码，这样他们两家互相抬价，我们就能赚到更多的钱。"
 BRA_stop_all_megaprojects: "中止特大项目"
 BRA_stop_all_megaprojects_desc: "很多特大项目在建成若干年之后人们才会发现根本没有什么用处。不信你去问问中国人，他们会告诉你长城建好了这么多年就是个摆设，别说日本人了，就连当年的蒙古人都没防住。之前还有个小天才提出来要建一座直布罗陀大坝，最后一算要是真建出来，得把德国，说不定还有伊比利亚一起搞到破产，欧洲彻底变成一个大废墟，全体欧洲人的生活退回到中世纪的水平，除此之外毫无他用。\n\n同样的故事在中国和德国都发生了，我们必须吸取教训。事到如今只能面对现实，承认我们的特大项目全都失败了。我们在这些项目上白白浪费了时间和金钱，而这些时间和资金本来是可以投入到别的计划中去的。而且如果这些项目只是单纯的没有用处，浪费时间金钱，那都不算大问题，最麻烦的是这些项目在建设的同时，贪污腐败也随之滋生，不知道有多少国家的钱都进了那些大贪污犯的钱包。我们的金融政策早该理智一些了，如果再不做出调整，即便社进党能挺过下一次大选，巴西政府也不一定能挺过去，政府破产会毁掉一切。"
 BRA_stop_all_megaprojects_tt: "我们将会移除§R所有§!未完成的特大项目。"
 BRA_sell_petrobras: "出售巴西石油股份"
 BRA_sell_petrobras_desc: "现在正是响应德尔芬·内托部长号召的时候：将巴西石油公司部分私有化，并将其部分资产转手给国际企业。即便是德尔芬·内托部长本人，也没大胆到全面私有化——那可能触动瓦加斯派的利益，招致政局动荡。然而，出售部分资产一事，已是共识所在，不容置疑。\n\n或许有人会问，“为什么要这么做？”答案其实并不复杂：在石油市场引入竞争意在激发经济增长活力，同时筹措资金，遏制日益严重的债务问题。"
 BRA_lower_taxes: "降低税收"
 BRA_lower_taxes_desc: "该去实现德尔芬·内托部长的提议了：改革税制以创造经济繁荣。要想实现这个目标，最直接，最能赚到选票的方式就是减少低收入人群的所得税，这样低收入人群就能看到我们的努力。或许我们可以试试通过电视转播并在每份报纸上刊登广告的方式将这项政策的相关消息传达给千家万户。\n\n同时为了不引起争议，我们也不能做得太过火了。我们将分摊一部分成本，同时小幅度地给富人加点税，通过这一系列措施，我们的财政不会受到太大的损害。"
 BRA_end_protectionism: "废止贸易保护"
 BRA_end_protectionism_desc: "长期以来，巴西的许多经济学家一直认为，迄今为止建立起来的进口替代工业化经济理论（其重点是防止外国公司在巴西开展业务以生产替代品）已经江郎才尽。安东尼奥·德尔芬·内托也一直持有这种观点，并说服了阿莱绍内阁同意他的观点。\n\n如果我们打算抛弃旧的模式，就需要找到其他方案来促进经济增长。降低所有OFN国家的关税将是一个良好的开端，希望他们会抓住机会到我们国家来投资。"
 BRA_we_cannot_lose: "我们输不起"
 BRA_we_cannot_lose_desc: "最终，我们成功调整了我们的经济、外交和政治路线，以适应阿德马尔去世后的新形势，愿他安息。但现在我们面临着一个重大问题：必须确保社会进步党的团结。\n\n劳多·纳特尔必须迅速行动。社进党大会必须以这样一种方式组织起来：小瓦加斯之外无人成为候选的总统候选人，只留下副总统候选人供代表们作出选择。待到一切尘埃落定之后，这场关乎社进党成败的竞选战役，就将全面展开。"
 BRA_new_father_of_poor: "第二个穷人之父"
 BRA_new_father_of_poor_desc: "一些候选人显得鹤立鸡群。我们的候选人可不是来自这旮沓那嘎达的乡巴佬——他是穷人之父、巴西所有总统中最伟大之人（也许要把阿德马尔除外）的儿子，他是圣保罗州长，阿德马尔钦定接班人：热图利奥·萨尔马尼奥·瓦加斯，也就是小瓦加斯！\n\n既然看到了这样一位候选人，我们的竞选策略马上就呼之欲出了。它是如此简明易懂：我们要用上我们掌握的、小瓦加斯与他父亲和阿德马尔的所有录像。我们将以这种方式提醒大家，他是巴西史上最伟大领导人的继承人，也是他们遗产的保卫者。"
 BRA_sao_paulo_bastion: "圣保罗堡垒"
 BRA_sao_paulo_bastion_desc: "要是丢了圣保罗，我们的选举必然失败，这儿可是我们党的禁脔。所以说，我们没得选择，只有拿出最狠的手段。\n\n在任圣保罗州长期间，阿德马尔组织了准军事部队，以在州内维持稳定与秩序。这得到了当地寡头的支持，他们也支持、资助我们的党。自此以后，这些准军事组织并没有解散，但他们恩主的去世让他们群龙无首，还吓跑了一些寡头。我们必须给他们找点事做。\n\n首先，我们要联系这些寡头，把他们拉回来，一些恰到好处的贿赂会阻止他们投靠社民党。其次，根据不管部部长的指示，准军事组织将被赋予两项任务：第一，确保没有报纸批评社进党；第二，继续谴责夸德罗斯的疯狂行径。虽然他可能已经告老还乡了，但他1960年全民盟候选人这个身份可不能轻易放过。"
 BRA_find_allies_shadows: "阴影中的盟友"
 BRA_find_allies_shadows_desc: "把竞选的事留给小瓦加斯去弄吧。作为穷人之父的儿子，他身上的遗产比希特勒的胜利、几次政变企图、保守主义霸权和阿根廷对巴西南部的威胁都要长，应该是十拿九稳。与此同时，劳多的工作是组织他在政府短暂任期内最大规模的行动。\n\n为了确保社进党在总统和议会选举中获胜，纳特尔必须启动一项规模庞大的贿赂计划。你想买选票？当然，这是你需要的钱。你想修条路？投票给我们，你就能弄条路。你那没用的侄子想找份工作？当然，先给钱，然后我们就办事。"
 BRA_sway_the_south: "撬动南方"
 BRA_sway_the_south_desc: "在一般情况下，南里奥格兰德州是巴西工党的传统重镇之一。若是了解到他们的许多政治偶像，如老瓦加斯、古拉特和布里佐拉，都来自这个省，你便会感到豁然开朗。在这里，政治忠诚不仅仅关乎你支持哪个政党，而且往往关乎州域身份、家庭和亲情友情。\n\n与此同时，全民盟通过与基督教民主党、解放者党等小党合作，成为该地区工党的主要反对派。至于社进党和社民党，也都尝试在这一地区建立基地。\n\n但万能润滑油——金钱可能会让这一切都不复存在。通过积极的竞选活动——当然还有贿赂——我们应该能够扭转不利趋势。此外，我们还将利用我们在这一地区的媒体联系，让古拉特和拉塞尔达在竞选活动中相互攻讦，而不去针对瓦加斯，以此分化二人，逐一击破。经由桃李之馈、虚词美誉和精心部署的信封系统，我们将让又一座州份遵循阿德马尔·德·巴罗斯和热图利奥·瓦加斯的遗产，因为我们的候选人正是这二人事业的接班人。"
 BRA_pray_it_works: "但愿奏效"
 BRA_pray_it_works_desc: "劳多·纳特尔虽然不具体负责某个部门，但是他为了让社进党继续受到民众支持，保住执政党的地位，可谓是呕心沥血，鞠躬尽瘁。这么高的工作热情可不是随便能见到的，至少现代巴西成立以来没人做到过。最近他几乎把醒着的每一分每一秒都投入到了工作当中，当然这样的确是太辛苦了，他在此之后得好好休息一段时间了。\n\n现在纳特尔只希望自己的工作能力挽狂澜，如果在他的努力之下社进党依然没能获胜，那这个党作为一个全国性的大政党也基本可以宣告解散了。到那个时候恐怕只有小瓦加斯领导的圣保罗地区能勉强保存下来，在巴西其他地区社进党的支持率会像当年在闪电战的凌厉攻势下一触即溃的法国军队一样瞬间土崩瓦解。"
 BRA_another_five_years: "再干五年"
 BRA_another_five_years_desc: "这些天里，劳多·纳特尔的脑子里只有一句话，就是那句“我来，我见，我征服”。\n\n阿德马尔去世后，人们本以为社进党遭受了如此重大的打击会一蹶不振，从此在政坛销声匿迹。表面上看总统是阿莱绍，可手握实权的却是纳特尔，这段过渡时期足够社进党重整旗鼓了。在一场声势浩大的竞选活动外加几封发给关键人物的密信之后，社进党终于在后阿德马尔时代保住了自己的执政党地位。\n\n现在，劳多终于可以安心地在副总统府里休息几天了，新一任总统会接过社进党的大旗继续前进。"
 BRA_take_revenge: "复仇之路"
 BRA_take_revenge_desc: "劳多·纳特尔双腿颤抖着接受了这个事实：社进党败选了，新总统不日将会上任。现在梦想已经彻底化为泡影，在圣保罗之外的地区，社进党已经不受欢迎，很快他们都得变成人人喊打的过街老鼠。\n\n作为一个失败的政党领袖，他在最后的时间里还有一件事情要做，那就是为四面楚歌之中的社进党筹集资金，不管以何种方式也要让它继续存在下去。有朝一日，社进党一定会找那些背叛者报仇，我们的国家本来有机会在瓦加斯和阿德马尔的继承人领导下走向光明的未来，但就是这些人让巴西错失了如此良机。\n\n不管未来怎样，劳多·纳特尔本人的政治生命已经随着这次失败而被判死刑。如果一些揭露黑幕的好事者仔细调查一下，这个所谓技术官僚的阿莱绍为什么会组建一个如此亲社进党的内阁，那就有意思了。到了真相大白的那一天，用“触犯法律”来形容劳多的罪行已经算是对他口下留情了。"
 brazil_adhemar.1.t: "公牛和他的大殿"
 brazil_adhemar.1.desc: "总统办公室被打扫一空，只剩下几个箱子被助手们堆在角落。阿德马尔在房间里来回踱步，同时于脑海中摹画新行动基地的蓝图。重新装修肯定是第一要务，不过阿德马尔不求奢华，他更喜欢自己的办公室里多一丝生活的气息，少一点严肃的气氛。当然，他有的是时间来完成这一切。\n\n他做到了！他现在是总统了！全能的上帝亲手将这一重任托付给他，要他带领共和国走过这段历史性的时期。\n\n窗外，聚拢的人群不断爆发出阵阵欢呼。阿德马尔希望他们能再忍一忍，以后自己有大把大把的时间与他们分享喜悦，有大把大把的时间推动各类项目和改革。现在的他，最不缺的就是时间。\n\n一颗钉子孤零零地钉在一面墙上，是前任总统挂过什么东西吗？不，纠结这个没有任何意义，重要的是不能放过眼前的每一个机会。阿德马尔小心翼翼地取出旧共和国的伟大总统华盛顿·路易斯的画像，也把它挂在了那里。\n\n是时候大干一场了。"
 brazil_adhemar.1.a: "阿德马尔！阿德马尔！"
 brazil_adhemar.2.t: "纵横捭阖"
 brazil_adhemar.2.desc: "阿德马尔喜欢开会。会见团队，管理任务，逐一分析，陟罚臧否。公牛把自己用重重叠叠、错综复杂的关系网包裹起来。这一切都是为了保证他的安全。阿德马尔喜欢与人打交道，他将这视为一场颇具意趣的挑战，人们的想法策略总是易于预测——总比上帝给他弄的那些花里胡哨的诡计要强。\n\n今天的会议是要分发战利品。各部部长、高官阁僚，一切都听总统阁下的安排。一些像劳多·纳特尔这样的追随者未能当选，给他们一个部长职位就能让他们尽情发挥聪明才智，也是让他们保持忠心的最好手段。\n\n当天的议程还讨论了埃德娜·洛特。阿德马尔身边的一群顾问，以声名狼藉的劳多·纳特尔为中心，视工党来的副总统为阿德马尔新政府的心头大患。总统不能不同意他们的分析。毕竟，洛特政府的夸德罗斯还殷鉴不远。如果不谨慎处理，埃德娜·洛特将会成为政府中的第五纵队。\n\n最后谈到医疗保健。阿德马尔提出了他的医疗改革计划，人群为这个雄心勃勃的计划欢呼。毫无疑问，大多数人会认为这是保证巴西健康和进步的必要步骤。至于其他人，大概会觉得这是个前无古人、后无来者的宣传妙招。总统对他那雄心勃勃的合伙人在这一领域缺乏远见的做法不以为然，改革将一石二鸟，实现发展和超越的两个目标。"
 brazil_adhemar.2.a: "表演开始了。"
 brazil_adhemar.3.t: "总统与副总统"
 brazil_adhemar.3.desc: "阿德马尔总统和他的顾问们一同策划着，将副总统埃德娜·洛特排除在权力中心之外，他们的心情似乎格外愉悦。他们已经采取了各种手段：不再通知她会议时间，随机改变安保措施，让她在巴西利亚和晨曦宫的行动变得困难，甚至她要求的政府决策，也只得到了各个部长的半文盲亲戚草草写就的政策草案。她企图深入了解政府项目的每一个细节，却被一层层繁复的官僚程序所阻碍，其冗杂程度，就连代达罗斯看了都要汗颜。\n\n副总统埃德娜·洛特翻动着又一批语焉不详的法令，指节在桌面上敲出焦躁的节奏。反对派政治家们似乎比她更清楚总统府的内情。文档堆里半数纸张浸着可疑油渍，莫非阿德马尔故意在餐馆餐巾纸上誊写法案来羞辱她？一股强烈的压力在她的头脑中积聚，灵光一闪之后，她又恢复了平静。埃德娜·洛特将那堆文件统统扔进了废纸篓。她本可以勉为其难地担当阿德马尔的盟友，现在，既然阿德马尔把她当成了敌人，那她就要利用手中的权力，尽可能地给他的生活制造麻烦。"
 brazil_adhemar.3.a: "地狱无怒……"
 brazil_adhemar.4.t: "会见前总统之女"
 brazil_adhemar.4.desc: "与副总统的下午茶堪称某种新的开端。在最初几次正式会面中，埃德娜·洛特始终保持着戒备姿态，冰冷谨慎的举止下暗涌着炽烈的怒火。阿德马尔总统则以同样审慎的态度回应，用彬彬有礼包裹着骨子里的讥诮。\n\n这日的会谈依旧如履薄冰。正副总统各自紧绷着神经，都不愿在对方面前暴露丝毫破绽。当话题触及核心议题时，洛特的镇定面具出现了裂隙，总统捕捉到了她眼中转瞬即逝的好奇。“您当真要这么做？与工党和我联手推动医疗改革？”\n\n“当然。要让两党达成共识绝非易事。但若指望全民盟那些保守派的支持，无异于痴人说梦。”\n\n洛特牵动嘴角，眉梢微挑：“总统先生未免太过自谦。以您的手腕，将改革包装成反共反工党的战役，想必能说服他们。不过您愿意与我们合作，这份诚意倒是值得称道。”\n\n余下的对话缓慢而谨慎地推进。两位政要在细节条款上反复拉锯，为各自阵营争取最大利益。会议结束时，某种工作上的默契已悄然成型。"
 brazil_adhemar.4.a: "咱们得看着点她。"
 brazil_adhemar.5.t: "会见布拉加"
 brazil_adhemar.5.desc: "巴拉那州的州长小心翼翼地握住总统的手。这位前军人的身姿挺拔但又不失自然，内伊·布拉加用礼貌的好奇目光打量着面前的总统。片刻后他轻轻摇了摇头，仿佛在内心得出了结论。“请进吧，总统先生。欢迎您到访巴拉那。”\n\n在例行的演讲和公开活动结束后，两人终于在暮色中找到片刻独处时光。布拉加州长耐心等待着阿德马尔道明此行的真正来意。“布拉加州长，”总统开口道，“长久以来我一直主张巴西的医疗体系亟需改革。”对方扬了扬眉毛。阿德马尔不为所动地继续道：“当然，改革必须尊重我们伟大国家的联邦制度。我们始终铭记各州神圣不可侵犯的权利。”\n\n“您将首站选在鄙州，总统先生。我是否可以理解为，全民盟和其他保守力量将是这场改革的核心？”\n\n“正是如此，布拉加州长。我们要带给巴西的绝非布哈林式的混乱，而是一个整合联邦与地方改革力量、融合私营部门创新与雇主医疗保障的新平台。”阿德马尔故作沉吟，“当然，像拉塞尔达先生这样的人或许会反对这项计划，指责我们向共产主义者示好，向工党势力妥协。”\n\n“拉塞尔达只是右翼阵营中的一种声音而已，总统先生。在您倡导的合作与共识精神面前，他很快就会发现自己孤立无援。”布拉加嘴角浮起一丝若有若无的笑意。阿德马尔也报以会心的微笑。"
 brazil_adhemar.5.a: "我们寻求建立共识。"
 brazil_adhemar.6.t: "本是两路人"
 brazil_adhemar.6.desc: "埃德娜·洛特还没有习惯与阿德马尔总统一起工作的新鲜感。那些没什么机会和这位支持民粹主义的新总统见面的工党人士，她没觉得这些人有什么好羡慕的。\n\n阿德马尔主持的第一次政策会议上，古拉特和布里佐拉二人都没有出席——这个“政策会议”是埃德娜·洛特的发明，专门用来讨论将来要在议会里提出的一些提案——但他们没想到的是阿德马尔在第一次会议上就抛出了一个重磅炸弹。\n\n“全民，而且还是免费的医保？”古拉特不敢相信自己的耳朵，毫不掩饰地表示了自己的震惊。洛特点了点头。\n\n“你没听错，这还是阿德马尔亲自提出来的。”洛特答到。听到这里，古拉特脸上立刻浮现出一个灿烂的笑容。\n\n“那我们能收到什么好处？”布里佐拉追问了一句——布里佐拉敏锐的政治头脑永远能直指要害。\n\n“这可是宣传工党的大好机会，布里佐拉，”阿德马尔回应道，“甚至大好机会都说轻了，是天大的好机会，你想求都求不来的那种。工党能收到大批民众的关注，我自己的党也能借机积攒人气，到时候你们这个左翼政党的人气说不定还能把社民党压下去一头呢。大家都有收获，皆大欢喜。”\n\n“确实是个好机会。”布里佐拉认可了阿德马尔的说法。他的眼睛眯了起来，似乎在思考着什么。可以肯定的是阿德马尔的改革计划绝对没有明面上的这么简单，但眼下洛特坚定地认为这是个八辈子都碰不着的绝佳机会，他一时也想不出什么好理由能让洛特改变想法。“那就这么定了。大家动起来吧！”"
 brazil_adhemar.7.t: "阿德马尔小车车"
 brazil_adhemar.7.desc: "救护车的合同几近完成。资金已经拨出，对全国具体需要多少辆救护车的分析也已经结束。每一个步骤中所涉及的贿赂金额与回扣水平也经过了大致计算。项目即将付诸实施……或者说，项目将在决定好新救护车的来源后推出。\n\n是选择美国的福特汽车，还是日本的丰田汽车？各位阁僚莫衷一是。选择丰田可以让巴西向日本示好，有助于巴西外交政策向日本方向倾斜。另一方面，买美国车肯定能讨得华盛顿的欢心。\n\n当然，购买巴西国货永远不失为一项选择。巴西的救护车品质和外国的一样好，生产链运转将刺激经济增长，本土商人也会对阿德马尔表示满意。话虽如此，值此困难时期，向东京或华盛顿致以敬意不无好处。总之，总统必须对新救护车的来源做出决定。"
 brazil_adhemar.7.a: "必须支持民族产业！"
 brazil_adhemar.7.b: "美国总是汽车专家。"
 brazil_adhemar.7.c: "给日本引擎一个机会。"
 brazil_adhemar.8.t: "法案公布"
 brazil_adhemar.8.desc: "阿德马尔独自在晨曦宫的办公室里读着当天的报纸。\n\n上面写着，新的医疗保健法案一经宣布就在首都引起了轰动。全民盟乃至社民党的几个成员都设法与他取得联系，向总统担保他们会支持该法案。作为反对派的中坚力量，内伊·布拉加对该法案的支持显然在其中起了很大的作用。总统的执政联盟也因此感到兴奋至极。\n\n这份法案也不是所有人都欢迎，大部分社民党人和全体工党成员都表示了反对。让州政府和私营企业参与医疗改革的点子遭到了左翼的唾弃，瓦加斯主义者则直接指责该法案由一堆显然实现不了的措施所组成，若继续下去反而将剥夺巴西人民接受医疗保健的机会。\n\n拉塞尔达那只乌鸦则在右翼一侧尖叫着诸如“共产主义”、“政府的又一次肆意浪费”、“为了让自己继续掌权搞猪肉桶政治”等字眼。\n\n总统心满意足地靠在椅背上。目前为止，一切都在按计划进行。他的脸上露出了满意的微笑。路易斯·华盛顿的画像静静地站在办公室的另一个角落里，面无表情地看着他。"
 brazil_adhemar.8.a: "我们势在必得！"
 brazil_adhemar.9.t: "全国公共选项"
 brazil_adhemar.9.desc: "阿德马尔发表首次演讲，聚集在圣保罗的人群齐声欢呼。在一个穷人身无分文、人民担惊受怕的世界里，总统宣布建立史上第一套全民医疗体系。无论事务大小，巴西会关心自身福祉。当总统宣布进入新时代时，人群再次欢呼起来，一股巨大的人潮拥簇着他。\n\n随着盟友放大信号，这股浪潮席卷全国。在圣保罗，小瓦加斯州长敦促媒体转达总统的信息。在全国各地，其他与工党结盟的州长也在附会总统的观点。\n\n当然也有人反对进步。作为保守派的中坚力量，拉塞尔达发起了自己的攻势。除了名义上的共产主义，阿德马尔的赤色保姆会跟随巴西人从嘤嘤待哺到早早离世，这个天杀的社会主义国家在亵渎的浪潮中消解、毁灭文明社会。\n\n何谓逆水行舟？阿德马尔在读拉塞尔达报纸上的社论时笑了起来。他们徒劳的怒火并没有让他们赢得总统职位。他们现在能阻止阿德马尔吗？总统站在办公桌旁。毫无疑问，大战即将到来。阿德马尔很享受能再次羞辱拉塞尔达的机会。"
 brazil_adhemar.9.a: "乌鸦徒劳地叫着。"
 brazil_adhemar.10.t: "大胜而归"
 brazil_adhemar.10.desc: "高原宫，巴西的总统官邸，洋溢在总统庆功宴的一片热闹中，因为他主持的医保法案通过了。聚会很热闹，有金钱能买到的最好的食物、饮料、服务和音乐。出席的人来自不同的背景，从平民到名人，从工人到大亨。但里面大部分仍都是社进党的官员和马屁精，这让阿德马总统颇为得意。\n\n“这次胜利，”阿德马尔说道，“我的朋友们，这只是巴西合众国历史上最伟大的史诗之一的第一幕。我们新的国民医保服务体系将惠及巴西的子孙后代。这只不过是在证明，只有社进党关心全国人民的生命，而且也只有社进党才能为全国福祉做出扎实的行动。此外……”\n\n他的演讲被一名总统助手打断，后者告诉他，副总统埃德娜·洛特和一群支持工党的瓦加斯主义同情者也到场了。他随后去接受他在政府中的主要合作伙伴的赞扬了。然而，他从前任总统之女那里得到的东西让他吃惊：\n\n——“总统先生，我们需要谈谈，现在举办这种庆祝活动还为时过早。我们仍然需要在医保方面取得进一步进展，因为有许多事情仍有待商榷。此外，国民医疗保健服务不能只靠它自己，如果我们想让它正常运作，就需要政府的进一步指导。”\n\n阿德马总统继续听着她的长篇大论和对他的不满情绪，同时心生一个想法："
 brazil_adhemar.10.a: "“行吧……好事多磨。”"
 brazil_adhemar.11.t: "欢迎回来，劳多！"
 brazil_adhemar.11.desc: "“我告诉你，巴雷托，法案失败都是你的错，你什么都不能说服我！”\n\n阿德马尔不悦地捶了一下桌子。多亏了贝尼迪托·马尼扬伊斯·巴雷托的“无能”（即无法说服一个本来就会拒绝他和阿德马尔的反对派），医疗保健法案已经失败了。然而，巴雷托的看法则截然不同。\n\n“什么叫‘我的错’？如果你履行了你最基本的职责，并试图说服你所谓的‘关系’同意医疗保健法案，法案就会通过！至于解雇我，你是唯一会因此而受苦的人，我那些扩张巴西石油公司的计划就要半途而废了，你最好明白这一点。”\n\n“我不在乎，”阿德马尔笑道，“我就这么决定了，看在圣母的份上，给我出去！”\n\n当巴雷托走出去时，他看到劳多·纳特尔走进来，并听到他的前老板宣布他为新的经济部长。他气血上头，声嘶力竭地喊道：“你这个混蛋！老子告诉你，这还没完呢！”然后他去了埃德娜·洛特的办公室，在那里他会受到更礼貌的欢迎。\n\n另一边，阿德马尔只是开了瓶香槟（他收受的贿赂），与纳特尔分享。“敬新任经济部长！”"
 brazil_adhemar.11.a: "“但愿他比那个老家伙要好！”"
 brazil_adhemar.12.t: "交叉路口"
 brazil_adhemar.12.desc: "阿德马尔·德·巴罗斯总统和他的部长内阁围坐在会议桌旁，文件案牍堆积如山，里面满满都是计划与蓝图——让巴西更加伟大；让人民享有繁荣与和平；推进崭新的公共服务和交通工程改善民众的生活；当然，最重要的，保住自己的选票。\n\n“先生们，”总统开口了，“工作艰巨，但也会带来丰厚的回报。我们会将巴西塑造成为南半球的拉斯维加斯，旅游客自四面八方接踵而来，当然，还有产业和投资。我不在乎他们来自哪里——华尔街、东京、甚至德国，我们要把一切都做到最好，吸引全世界来到巴西。我不在乎花多少钱，不在乎要买什么，甚至不在乎买谁的，无论是谁，我们都敞开双手欢迎，而且……”\n\n电话铃声打断了阿德马尔的演讲。他请内阁离开，紧紧关上了办公室的门，提起了电话听筒，话语如同悦耳的旋律一般回响在他的耳边：看来，总统在瑞士的海外账户很快就会装满他的战利品。挂上电话后，阿德马尔在椅子上坐了下来，不由感叹着："
 brazil_adhemar.12.a: "“当总统感觉真棒！”"
 brazil_adhemar.13.t: "教育事宜"
 brazil_adhemar.13.desc: "“德·马托斯先生。”阿德马尔说道，并示意教育部长进入他的办公室，“你今天有话对我说吗？”皮椅和沙发都空着，时间还早。外面，阳光柔和地照在建筑周围青翠的叶子。德·马托斯鞠了一躬，然后向他出示了几份文件。“这是什么？”阿德马尔说道，嘴角露出难以置信的微笑。\n\n“上届政府的教育数据，”德马托斯开始说，“识字率、毕业统计数据、分数等等。”\n\n“然后呢？”阿德马尔翻了翻文件。\n\n德·马托斯眨了眨眼睛说，“对不起，先生。”。\n\n“这是干什么？你不是教育部长吗？为什么要用这些来烦我呢？”阿德马尔在散开的文件前挥手说，“所有这些数据吗？”\n\n“好吧，我们确实需要您在相关议程上的批准。”\n\n阿德马尔咯咯笑了起来。“好吧，对不起。”他双手合十，“继续库比契克政府的工作。修建学校、雇佣教师、使我们现有的东西现代化。把一切都搞得井井有条，确保没有东西停滞。如果有必要的话，提高工资。避开副总统。不要让她在教育问题上唠叨你半天。明白吗？”\n\n德·马托斯点了点头。\n\n“好伙计，那么现在。”他站在办公桌旁，“内阁还在等着呢。你能帮我处理一些小细节吗？人民选我去领导他们，而我今天就正打算这么做。”"
 brazil_adhemar.13.a: "“是，阁下。”"
 brazil_adhemar.14.t: "皮门特尔医生的一天"
 brazil_adhemar.14.desc: "清晨，来自大城市的皮门特尔医生驱车抵达村庄。正如人们对偏远乡野的想象，整个聚落在晨光中静谧无声，唯有工人们已在粉刷校舍外墙。医生将车停入砾石空地，提起器械箱走进学校。摆好折叠行军床，穿戴防护装备，医疗器械在木桌上依次排开——随着下课铃声，孩子们排着队挨个走进这间临时诊室。\n\n皮门特尔逐一为他们做检查：每个孩子都要先清洁口腔：有些孩子牙龈红肿，昭示着牙周炎的侵袭，医生为他们清理牙缝，严重者还需开抗生素；更多人则患有龋齿，必须接受疼痛却必要的填充治疗。尽管诊疗过程让小家伙们皱紧眉头，但皮门特尔明白，放任不管将带来更可怕的后果。\n\n无论治疗程序如何，每个孩子最终都会得到相同的“礼物”。医生递上崭新的牙刷与牙膏：“挤豆粒大小，打圈刷牙，每日两次。”他反复叮嘱着，“用完后随时来学校领取，政府免费供应。”\n\n为所有学童完成检查是项漫长而疲惫的工作，但皮门特尔坚持不让任何孩子错过人生首次牙科诊疗。即便没有加班费，他依然仔细处理完最后一个龋洞。欣慰的是，校长邀请医生留宿家中。翌日拂晓，皮门特尔驱车返城，他很高兴为这个村庄做出了贡献。"
 brazil_adhemar.14.a: "“皮门特尔医生”遍及全国各地。"
 brazil_adhemar.15.t: "民粹主义恰如其分"
 brazil_adhemar.15.desc: "那是秋天炎热的一天。太阳如此炙热，让人觉得整个世界都在遭受秋暑的折磨，不过这并没有阻止男孩们在上学的日子里踢足球，自从学校建了一个新的球场以来，即使烈日灼背，也没有阻止他们。\n\n他们注意到，一辆豪华轿车刚刚停在学校附近。一个高个子男人从里面走了过来，穿着一套别致的西装。在这种天气下，这显然是一个糟糕的选择，从他满头大汗可以看出这一点。他朝他们走去，游戏停止了，免得不小心把球踢到这位老人身上。\n\n“嘿，孩子们！有人能把球传给我吗？”\n\n这个突然出现的老人现在要求和他们一起玩。还没来得及开口，胡里奥就把球踢给了他。老人接住了球，开始颠起球来。然后他把球踢了起来，抱在怀里。他似乎在和其中几个男孩谈论学校的情况，以及他们有什么抱怨，大多数人回答说数学和物理很无聊；这名男子一边笑一边表示赞同，说他会做点什么的。\n\n这名老人来的快，走的也快，不过在球上签下了名字：阿德马尔·德·巴罗斯。\n\n阿德马尔回到车里，额头上滴着汗水。“去他妈的西装，在这么热的天气里应该穿得清爽一些。今天还剩多少学校需要我去参观呢？”\n\n“还有十个，先生。”阿德马尔的司机回答道。\n\n阿德马尔叹了口气。“那你最好踩一下油门。我之后还要和经济部长会面。这次恐怕又要在财政部浪费时间了。”于是汽车启动，驶进了圣保罗繁忙的街巷。"
 brazil_adhemar.15.a: "恶人必不得安宁。"
 brazil_adhemar.16.t: "妙计"
 brazil_adhemar.16.desc: "这是巴西利亚一个闷热的早晨，阿德马尔想再次提升自己的公众形象。他坐在高原宫的办公室里，盯着自己随身携带的阿帕雷西达圣母雕像，不知该从何下手。\n\n突然，收音机响了起来：“下周巴西电视台将播出《菲力猫》的最新一集！期待所有年龄段的人笑口常开！”\n\n这时，阿德马尔灵机一动。“我为什么不试着说服他们的动画工作室把我描绘成一个伟大的政治家呢？这会让我得到更多的支持，这是上帝赋予我在巴西的权利。没错，就这么办。”\n\n当乔·奥瑞洛收到一个上面盖着巴西总统印章的厚信封时，他感到无比愤怒。“这个无耻寡头简直是无法无天！想贿赂我为他做宣传吗？这是什么地方，纳粹德国吗？”\n\n他的商业伙伴威廉·O·沙利文举手示意他冷静。“我有个主意。”\n\n听了这话，奥瑞洛平静下来。“接着说。”\n\n沙利文笑着说：“我们为什么不给这位巴罗斯总统一些他想要的东西呢。让他在节目中露面——只不过不是他想的那样子。”当沙利文把计划交代清楚后，奥瑞洛露出了得意的笑容。"
 brazil_adhemar.16.a: "“天才！那么开干吧。”"
 brazil_adhemar.17.t: "最棒的一集"
 brazil_adhemar.17.desc: "就在阿德马尔给制作动画片《菲力猫》的工作室发出“合作邀请”之后不久，新一集的《菲力猫》就上映了。\n\n这一集里的反派角色非同寻常，是个没名字的政客，虽然和现任巴西总统看起来长得不太像，但从性格形象上说倒有几分神似。英语国家的观众没想太多，这不过是在讽刺政治腐败而已。毕竟贪官哪里都有，你要问他们这集动画讽刺的具体是谁，那还真不好说。\n\n国外一片和平，但看了这集的巴西观众却炸开了锅，因为这暗示实在是太明显，用脚后跟想都能明白动画里的这个政客说的是谁。更逗的是在动画的结尾，菲力猫还狠狠嘲笑了这个政客一番，顺便把他浇成了落汤鸡。\n\n傻子都看得出来，阿德马尔自然更能看得出来，他知道自己这回是聪明反被聪明误，心里不禁有些气恼。但他活了这么多年，宰相肚里能撑船的道理还是懂的，区区一集动画片而已，也就一笑了之了。再说了，人家也没指名道姓地骂他，没什么大不了的。"
 brazil_adhemar.17.a: "这个结局皆大欢喜。"
 brazil_adhemar.18.t: "摩纳哥语是什么语？"
 brazil_adhemar.18.desc: "夕阳西下，保罗歪在椅子上打了个哈欠，望着远处的高楼大厦渐渐没入阴影之中。又过了一天，又在咖啡馆打了一下午工。和贝洛奥里藏特的其他学生一样，保罗也过着极其单调的生活：小睡一会儿，晚上溜达溜达，回宿舍睡到天亮，起床去上课然后打工。几只蚊子飞了过来，在他身边嗡嗡地打转。\n\n坠入梦乡的前一秒，保罗突然想起一件事：昨天的课上，老师要他们每个人学一门外语。有名女生问：“随便哪门外语都行吗？”老师点了点头，并说这是学校额外安排的课程。于是大家纷纷举手，有人选了德语，有人选了法语，还有人选西班牙语和意大利语，日语和汉语也有人选，最后只剩下保罗一个人没有举手。\n\n“保罗？”老师注意到了他，“你要学哪门语言？”\n\n保罗当时回答说“还没确定”。想到这儿，他果断搭公交车去了图书馆，边走边在心里想着：只要是门外语都行。翻了好几本书，保罗总算找到了让他眼前一亮的语言：摩纳哥语，一种源自意大利的摩纳哥本地方言。保罗记得报纸上说过，如果学生选的语言学校教不了，就只能等到专门的老师来了再开课。他咧嘴一笑，心满意足地回了家。\n\n第二天，保罗表示自己想学摩纳哥语。老师惊讶得目瞪口呆，果真告诉保罗目前无法开课。保罗一听，笑道：“没关系，我可以先自学着。”当天，保罗的班上就多出来了一大批摩纳哥语爱好者。"
 brazil_adhemar.18.a: "一时间，摩纳哥成了家喻户晓的名字。"
 brazil_adhemar.19.t: "教育带来机遇"
 brazil_adhemar.19.desc: "保罗终于回到了自己的小公寓。合上门之后，他长叹一口气，把自己的书包甩在地上，仿佛这样就能一劳永逸地摆脱痛苦的备考。先歇一会再复习吧，他只能这么安慰自己。人们总觉得整理书架不算多累的活计，但保罗干完一整天之后感觉自己就像是被掏空了一样。\n\n歇了一会，保罗终于有力气起来把自己的外套脱掉了，这时他发现地上掉了一个棕色的大信封，上面还写着他的名字。出于好奇，他蹲下身子，捡起那封信。他懒洋洋地走进厨房，打开信封。不过当他看到信封里面的内容时，毫不夸张地说，他的眼睛都吃惊到要掉出来了。\n\n这是一封贺信，祝贺他申请到了奖学金。更让他惊喜的是奖学金数额不菲，和他现在打工的收入相比几乎是翻了一番。\n\n保罗细细一算，发现政府给他发的这一大笔奖学金足够他花几个月的，一想到自己终于不用再花那么多时间打工，他顿时激动地哭了出来。之前买的那些跟医学无关的书终于有时间看了，想去踢踢球也有时间去了，他甚至还能再节省出一点钱寄给家里，帮衬一下父母。\n\n保罗从一连串对未来的畅想里回过神站了起来，他突然感觉身上的劳累不翼而飞，现在他甚至能在房间里跳几个舞。此时此刻，保罗心中充满了对社进党的感激，如果下一次大选他有机会去投票的话，他一定要支持社进党的候选人。"
 brazil_adhemar.19.a: "金钱买不到幸福，但确实能让生活更便捷。"
 brazil_adhemar.20.t: "新式疗法"
 brazil_adhemar.20.desc: "是“百升”还是“佰升”来着？他正试图回忆起意为一百公升的词汇的正确拼写——倘若没有马黛茶，保罗觉得自己会在前两周应付考试时累死。万幸的是，他挺了过来，回到了日常的学习和工作中。\n\n今日的解剖课堂与往日不同，里面的新玩意让他十分诧异。在学生们忙于考试而缺席解剖课时，一个崭新的解剖室，或者叫解剖手术室已经建成，这里有着更亮的灯光和更完善的设备——他可以终于可以看清楚教授上课切开的东西是什么样的了！他和剩下的同学都赞叹不已，努力记住他们在课本外第一次看到的循环系统和淋巴系统。\n\n午餐之后就是实验课的时间，实验室也新添了一些被时髦地形容为“潮到发光”的设备。来自日本的新奇显微镜，有着保罗这个医学院学生只在书上看到的先进技术，毫不夸张地说，这还只是第一个颠覆他认知的震撼设备。在接下来四个小时里，教授在实验室内带领学生们进行了一场旋风般的巡回“旅行”，向他们介绍了接下来巴西将引进的那些全球前沿技术。比如心脏起搏器，肾脏、肝脏和心脏的移植技术，以及对于精神病患者从直接送到乡下的精神病院到展开社区精神护理的理论转变。\n\n最后，保罗心底有着两种感受。其一是还在为他所看到的事物而眼花缭乱，其二是产生了一种他从未有过的决心。要勤于学习，加入这个国家的进步行列。"
 brazil_adhemar.20.a: "一切都按照博士的吩咐运行。"
 brazil_adhemar.21.t: "工党支持者的怒火"
 brazil_adhemar.21.desc: "“打倒暴政！”、“总统先生，您就是这样表达虔诚的吗？”、“巴西不是神权国家！”……类似的标语在席卷全国的示威中随处可见，同样随处可见的还有巴西国旗和工党的黑白红三色旗。工党人士已经走上了街头，即便是在“社进革命”进行得如火如荼的当下，他们仍是一股不容小觑的力量。\n\n谈及示威潮的诱因，若昂·古拉特在接受采访时表示，“这无疑是由于阿德马尔要求学校将宗教课程纳入必修。”他还进一步声称，“虽然我国绝大部分人信仰上帝，但这并不代表可以将其强加于另外极少数人。只有希特勒之流才会妄图利用这种中世纪的野蛮做法达成目的。”\n\n然而对阿德马尔政府来说，前劳工部长的批评远非最大的麻烦，莱昂内尔·布里佐拉最近发表的一番演讲更是激起了滔天民愤。他这样说道：“巴西的人民，你们还要忍耐多久？我们曾心向自由的祖国，如今竟要委身于外敌！菲林托·穆勒，这条纳粹的走狗正一步步诱导阿德马尔出卖主权，把巴西变成法西斯国家，变成德国的一个傀儡！这些宗教课程哪里是虔诚，明明是赤裸裸的亵渎，为了上帝，为了我们自己，勇敢地起来反抗吧！”\n\n布里佐拉的演讲收获了无数支持，有人甚至激动到当场焚烧阿德马尔的肖像。与此同时，已成众矢之的的阿德马尔通过电视机目睹了这一切，气得将手中的水杯掷出窗外泄愤。不过是让宗教回归学校，竟害他沦落至和欧洲的法西斯分子齐名。为了搞臭政敌，扩大自己的影响力，布里佐拉简直无所不用其极。冷静下来后，阿德马尔思考再三，最终决定："
 brazil_adhemar.21.a: "去他的反对派，这项政策必须推行下去！"
 brazil_adhemar.21.b: "还是暂时搁置这项政策为妙。"
 brazil_adhemar.22.t: "公正的教育"
 brazil_adhemar.22.desc: "迭戈把最后一箱课本扛进308教室，顿时如释重负。为了这件差事，他几乎贡献了整个轻松惬意的早晨。趁着缓口气的时间，迭戈满脸兴奋地打量起堆满大半个教室的那些纸箱。政府真的兑现了承诺，给学校送来了急需的物资。他拍拍屁股上的灰尘站起身，准备挨个给它们拆封。\n\n打开第一个纸箱，映入眼帘的是一本本整齐排列的《物理学基础》。迭戈拿出一本翻开，享受着书页翻动时清脆的声响。不同于枯燥乏味的旧课本，这些新课本上满是生动的插图和有趣的实验，还印着各种迭戈看不懂的晦涩公式。一想到物理组那帮人拿到新书的反应，他便忍俊不禁。\n\n迭戈把书放回原位，打开了另外一个纸箱，里面装着的是《巴西通史（第一版）》，这是迭戈上课时要用到的书。他同样拿出一本翻看，书中新增的历史图片和有关早期历史的注释令他再次喜笑颜开。然而，他的笑容在看到当代史部分时戛然而止。它讲述的是英勇的圣保罗人民起身反抗“瓦加斯帝国”的故事，其中对“护宪革命”的高潮部分——任命阿德马尔的描写极尽溢美之词，瞬间就将他方才的兴奋感一扫而空。\n\n一声叹息之后，这些自传般的历史教材在迭戈心中彻底沦为了垃圾。“谢谢您的好意，总统先生。”他自言自语道，“但我更想教给学生们真相。”"
 brazil_adhemar.22.a: "小小瑕疵。"
 brazil_adhemar.23.t: "少爷的请求"
 brazil_adhemar.23.desc: "小热图利奥·瓦加斯，那位被尊称为“穷人之父”的热图利奥·瓦加斯的儿子，同时也是阿德马尔悉心培养的后辈，像往常一样礼貌地敲开了高原宫总统办公室的大门，他有一项提议要向阿德马尔汇报。\n\n“总统先生，您在教育领域取得的巨大成就世人有目共睹。根据您制定的计划，我们建立起了巴西教育体系的新模式，这样的成果几乎可以说是前无古人，也许只有家父的工作能与之相提并论。”\n\n阿德马尔高兴地点了点头，似乎对这一番奉承非常满意，示意他接着说下去。\n\n“不过我有一个想法。您看我们可不可以建立一个研究所，名字我已经想好了，就叫‘国家创新与科技研究院’，我相信它会给我们的教育改革画上一个完美的句号。”阿德马尔听罢思考片刻，然后摇了摇头。\n\n“算了吧，小瓦加斯。这个任期里我已经在教育改革上花了太多钱了，眼下我要集中精力干别的事。不过下一个任期倒是可以考虑。”\n\n行吧，小瓦加斯心想。“那就按您说的办，阿德马尔先生。那我们要不把钱投入到化学研究上？”\n\n阿德马尔很快又摇头。小瓦加斯皱起了眉头。“我们的预算不够。我已经在教育上投入了这么多钱，这些花掉的钱还没到产生回报的时候，投资化学研究还得再等等。”\n\n“总统先生，我明白了。祝您工作顺利。”小瓦加斯刻意放缓了语速，他在尽力克制自己心中的不满。从高原宫出来之后他又仔细回味了一番刚才的对话，想到阿德马尔的不作为也不算是坏事：等未来的自己当上总统之后，这些留下来没做的事不都是他的政绩吗？"
 brazil_adhemar.23.a: "“那就先等等吧，别拖个没完就好。”"
 brazil_adhemar.24.t: "阿德马尔的革命"
 brazil_adhemar.24.desc: "从巴西中西部的马托格罗索州传来了好消息。在西圣特雷济尼亚一个小村庄里，阿德马尔总统出席了一场州政府组织的官方活动，并借此机会宣布巴西将进行土地改革。\n\n阿德马尔公开表示：“从今往后，每个农民，不论男女，都将拥有可供自给自足的土地。但土地改革不能一蹴而就，我们将从最贫困的那一批农村开始，逐步推广到更大的乡镇，最终覆盖全国。这将成为巴西历史上一个值得纪念的里程碑，它不是由工党的那些极端主义者或者理想主义者完成的，而恰恰是由我以及我身后的社进党完成的。”\n\n阿德马尔讲话时，台下挤满了热情的听众，其中除了本村村民之外，还有很多从附近的村镇专程赶来参加这次活动的人。就在阿德马尔宣布要进行土地改革之后，人群中爆发出阵阵欢呼。紧接着阿德马尔亲手将铲子、一袋袋种子和耕种所需要的各种农具分发给新分到土地的农民们。无数农家妇女被如此亲民的阿德马尔所感动，纷纷要求跟他来一个大大的拥抱，甚至争相亲吻他的脸颊。从今天起，巴西人民可以不必为未来担忧了。"
 brazil_adhemar.24.a: "因为阿德马尔将国家带上了进步的快车道！"
 brazil_adhemar.25.t: "左右为难"
 brazil_adhemar.25.desc: "这是巴西利亚一个喧闹而炎热的午后。高原宫的总统办公室里，阿德马尔·德·巴罗斯正同阁僚激烈讨论如何为巴西农业提供其急需的化肥。此刻，经济部长贝内迪托·马尼扬伊斯·巴雷托还想加大篇幅论述建立国营化肥公司的优势，却被阿德马尔大声叫停了。\n\n“行了贝内迪托！从头到尾你净在讲些空话，我们要的是一个切实可行的方案，这样才能堵上拉塞尔达那蠢货的嘴。”\n\n接下来轮到外交部长瓦斯科·莱唐·达·库尼亚发言。他提议政府向美国寻求帮助，这样做虽然开销不菲，但能得到市面上最好的化肥。阿德马尔同样否决了他的观点，他固然不愿激怒拉塞尔达，但更不想顺了拉塞尔达的意。\n\n就在这场辩论愈发白热化时，阿德马尔总统的私人秘书，莉亚娜·克莱门特走了进来，为几位高官添咖啡倒水。她一边姿势性感地来回走动，一边趁机抛出自己的想法：\n\n“……为什么不找德国人呢？他们的化肥质量是差了些，但起码便宜管够。”\n\n阿德马尔呷了口咖啡，坐在座位上若有所思。不管怎样，总得做出个决定来。于是片刻过后，他表示："
 brazil_adhemar.25.a: "“我们还是和扬基佬结伴吧。”"
 brazil_adhemar.25.b: "“这位女士说得有几分道理。”"
 brazil_adhemar.26.t: "能用就行"
 brazil_adhemar.26.desc: "“国会就和往常一样，”戈登面带微笑回答道，“如果纽约是没合过眼的城市，那么华盛顿是没闭过嘴的城市。”\n\n阿德马尔对美国大使的这个笑话轻笑两声以示礼貌，接着躺回他那内充天鹅绒的椅子上。“我必须承认，这边的境况也差不多。就算只是挪两下椅子，没半个月的辩论再加上一堆的私下协商也做不到。对他们来说，让他们妥协会要了他们的命。”\n\n“你肯定没法满足所有人，”那位外交官露出一丝理解的微笑，“你选了其中一边，其他人便都离你而去了。”\n\n谈话逐渐平静下来，阿德马尔与那位外交官换了一下眼神。这位总统的身子稍稍前倾，开口道：“我们两国始终维持着紧密的合作，这很好。在当今世界形势下，维持我们旧有友谊的必要性，你我都心知肚明。你应当了解在巴西的繁荣背后，美国扮演了一个怎样重要的角色。”那位美国人没有言语，只是双眼紧盯着这位总统。“有一个主要的例子，”他继续道，“那就是我国农业方面的迅猛进步，这当然与从美国稳定地进口化肥与设备脱不开干系。我们未来有多大潜力，只受限于你们能提供多少援助。”\n\n阿德马尔完成讲话之后，那位美国人点了点头回答道：“我很高兴看到贵方能意识到我们的合作关系是有益的，也同样为您赞赏我方的努力感到高兴。我保证会同国务院谈话，相信他们很愿意向美国最亲密的一位朋友伸出援手来激发巴西的最大潜能。在保卫自由世界和远离法西斯的影响这些事情上，美国会是您最坚强的后盾。”"
 brazil_adhemar.26.a: "那位外交官微笑着握了握手便离开了。"
 brazil_adhemar.27.t: "问题解决"
 brazil_adhemar.27.desc: "“我这也没什么变化。”德国人回答道。“家父还要打理IG法本的生意，每年的这个时候公司通常都很忙。”\n\n阿德马尔总统心照不宣地向对大使点了点头，露出和蔼可亲的笑容。“说实话，我这里现在也是一团乱麻。人人都知道巴西现在正处在关键时期，但又没人能说得清为什么关键，也没人能指点一下说我们现在该做些什么。那些反对我的人里面，我敢保证至少有一半都是成心跟我过不去。”话说到这，阿德马尔皱了起眉头，但很快又换出轻松的语调接着说道：“罗伯特，要我说，我就觉得你和令尊真让人羡慕。虽然有时候很忙，但前景永远是好的。”\n\n大使听到这番恭维，笑了笑，靠在豪华的椅子上，显然很放松。“谢谢您的夸奖，总统先生。我相信一切努力都会有回报，家父的辛苦也不会白费。现在公司的发展前景相当不错，我们现在已经在计划扩展新的市场了，应该很快就会有动作。”\n\n“您这倒是提醒我了。”阿德马尔听了这番评论，兴奋起来，“我恰好有一事相求。您也知道，巴西经济现在其实还是以农业为主，我们一直在想办法降低生产成本。要是您能麻烦令尊帮我们联系一下阿布斯先生，看看他有没有多余的肥料想出手，我们可就太感谢了。”\n\n年轻的大使想都没想就点了头，“没问题，总统先生，包在我身上。不管巴西需要多少肥料我们都能提供，运费的话再给您打一个最大的折扣。我保证您不会后悔这笔交易。”\n\n在与阿德马尔握手并寒暄一番后，大使带着几乎无法掩饰的兴奋回到了大使馆。第二天早上，他起床后就给父亲打了电话。"
 brazil_adhemar.27.a: "“我要跟阿布斯谈谈。”"
 brazil_adhemar.28.t: "新时代，新目标，新人选！"
 brazil_adhemar.28.desc: "那是在巴西一个温暖的热带夜晚，对很多人来说，这个夜晚就和其他夜晚一样，有些普通，不好想起。但对一个人来说，这是最重要的一个夜晚。大多数家里有电视机的巴西家庭，在接下来的几分钟内都待在电视机前，总统阿德马尔·德·巴罗斯，一个以出人意料闻名的人物，即将向国家发布一项重大政策。\n\n首先露面的是坐在办公桌后的阿德马尔，然后他开始讲话：“巴西的国民们，现在是时候让我们的国家向前迈出一大步了，我们这些聪明人不能躺在功劳簿上。我的政府，同时也是你们的政府，会在下周聚焦前任领导人们所忽视的领域，通过立法和行政措施，我们将大力改善农业，并且给予所有工人从未享受过的社会保障与权利。”\n\n这个宣讲让许多听到的人兴奋不已。此后来自地方和立法机构的社进党领袖的演讲和声明很快跟上，详细说明了阿德马尔定下的目标要怎样实现。这让听了宣讲的听众更加兴奋，让阿德马尔在民间的声望更加显赫。改变触手可及，就像他们所说……"
 brazil_adhemar.28.a: "因为时代在变。"
 brazil_adhemar.29.t: "就医的困境"
 brazil_adhemar.29.desc: "当私企以担心生产力及收入亏损为由，公开拒绝将员工送医时，阿德马尔对此感到十分疑惑。局促了一会，他比往常晚了十分钟离开了他那位于晨曦宫的房间，这还是因为他的家人将他送了出去。\n\n在等待阿德马尔出面的这段时间内，他的内阁同僚们，也就是菲林托·穆勒、埃德娜·洛特、劳多·纳特尔和小瓦加斯已经讨论了所有可能的想法。在阿德马尔对迟到表示了歉意之后，他们开始讨论正题。\n\n埃德娜表现得异常强硬，“他们要是敢违抗政府，就动用武力让他们做出承诺。如果那帮雇主不照做，就让他们进监狱。”\n\n菲林托·穆勒表示了支持，“也就这一次，我可以支持洛特副总统的提案。”\n\n纳特尔却摇了摇头，“这么做只会毁了一切。何必跟商人过不去呢，我们还是别这么想了。”埃德娜和菲林托怒目而视。值得称赞的是，纳特尔在他们的敌意面前并没有退缩。与此同时，小瓦加斯只是翻了个白眼。\n\n“好像你们之间存在着无法逾越的鸿沟似的，没必要这么胡闹。只需要选择最简单的解决方法，政府掏钱把员工由于看病浪费的工时垫上，这样就皆大欢喜了。”"
 brazil_adhemar.29.a: "“他们要是观点一致，那他们就是对的，干那帮资本家。”"
 brazil_adhemar.29.b: "“州长说得对，给他们钱就是了。”"
 brazil_adhemar.29.c: "“劳多，你是对的，何必……自讨苦吃呢？”"
 brazil_adhemar.30.t: "漆黑的肺，紧闭的唇"
 brazil_adhemar.30.desc: "医生倚着锈蚀的钢梁吞吐烟圈，咸涩海风裹挟着柴油味灌入双肺。这天的例行巡检总算没白费——政府指派的防尘肺项目破天荒有了成效。这些年他每周都来这片工业港，看着工人们用龟裂的手指数着不够买药的硬币，却总贪恋巨轮在暮色中渐行渐远的孤寂。\n\n转机始于药价暴跌，快得像退潮。但愿那些工人被化学剂侵蚀得所剩无几的大脑，还记得何为“按时服药”。\n\n烟盒滑入白大褂时，医生指尖轻触左胸口袋。硬质信封的棱角硌着心跳——诊所翻新批了，申请加薪准了，这些零碎加起来，刚够支付海滨公寓的首付。当然，给玛丽亚买项链的钱也在里头。至于某位病人的手术档期为何突然提前？医者仁心嘛，早治早愈。\n\n港口的探照灯扫过防波堤，医生忽然想起诊所地下室的夜半惨叫。衣袋里的信封顿时重若千钧，心中翻涌起比沥青更粘稠的罪恶感。不过他早就学会在巡诊时低头看鞋尖的花纹。希波克拉底誓言只说“勿伤害”……"
 brazil_adhemar.30.a: "但没说要主动揭发黑暗。"
 brazil_adhemar.31.t: "苦涩的转变"
 brazil_adhemar.31.desc: "菲林托·穆勒讨厌咖啡，至于原因嘛，在于它不仅浑浊不清，而且还酸涩苦口。他一直都不喜欢这种只让他嘴中闷生苦涩的玩意。但他知道，自己也只有依靠它，才能安然地在每个清晨里保持清醒。\n\n菲林托将手中的咖啡杯放回碟中，回忆着在两百年来咖啡是如何影响巴西的；就在不久以前，圣保罗的咖啡巨头们还能肆意操纵政策。无数英豪人民奋起反抗，在那血腥的二十年代中，他也曾作为一名普通士兵投身于那些战斗。\n\n而那时候的巨头之子，如今却安坐在巴西利亚城内的总统之位上。菲林托越想越气，难道巴西真的在慢慢落回曾经那些晦暗的日子吗？难道他曾经斗争的一切结果就这样变得毫无意义了吗？\n\n尽管如此，他又想起正是瓦加斯自己将阿德马尔任命为圣保罗的干涉员将他推上政坛。这也证明了他也许还算有些才干，也许还算能派上用场。\n\n但社进党只不过是一个由机会主义者组成的松散同盟，他们攀着梯子，争先恐后的向上爬，一旦有机会，他们就会从自己的领袖口袋里偷出钱来中饱私囊。如果没人能来统领他们，最终，阿德马尔只会在埃德娜和她率领的反对派发起的那场在所难免的弹劾中被赶下总统之位。\n\n不仅如此，他们还需要一位圣保罗地区之外的政治领袖。如果一个党派的政令出不了州界，那怎能治理好整个国家呢？虽然菲林托对它们深恶痛绝，但他认为自己也许能与它们相互成全。而近来党内对他的恶意开始逐渐升级，甚至管他叫“巴西的希姆莱”。如果他还想保护好自己深爱的马托格罗索和这新国家的遗产，唯有转投它党才是上策。\n\n菲林托下定决心，最后抿了一口自己杯中的咖啡，然后拿起电话，播下号码。"
 brazil_adhemar.31.a: "致我深爱着的咖啡田。"
 brazil_adhemar.32.t: "凌空二日"
 brazil_adhemar.32.desc: "高原宫二楼，最高会议室门外。阿尔瓦罗·阿尔贝托·达·莫塔-席尔瓦海军中将敲了敲门，屋内的会议桌旁已环坐着内阁要员。椭圆形桌首，阿德马尔总统正襟危坐，两侧是幕僚长与财政部长。“阿尔瓦罗·阿尔贝托先生，”总统露出灿烂的微笑，“想必你对此次急召颇为困惑。”\n\n“是，先生。”海军中将十指交叠，“既无会前简报，亦无准备时限，看来这次事关国家机密。”\n\n总统眼底掠过赞许的锋芒，旋即翻开档案：“档案写着，你在五十年代主导多次外访，且以原子换和平计划的谈判为主，是否属实？”\n\n“属实。”阿尔瓦罗已预感到接下来的话题。\n\n总统合拢档案，倾身向前：“巴西必须尽快拥核，中将。阿根廷的行动愈发咄咄逼人。作为我国核计划的拓荒者，请直言——我们准备好了吗？”\n\n中将略加思索后回答：“米纳斯吉拉斯与圣保罗大学有我们需要的人才。假以时日……”\n\n“能否加速进程？”\n\n“可以寻求美国合作。若是遇到阻挠，日德两国也是潜在的技术伙伴。”\n\n总统咧嘴一笑：“很好。内阁将即刻筹建试验场与浓缩设施。而你的新使命，是去寻求外援，为巴西敲开核俱乐部的大门。”中将恭敬地点了点头。"
 brazil_adhemar.32.a: "原子既能为和平，亦能为战争。"
 brazil_adhemar.33.t: "镜头面前笑一个"
 brazil_adhemar.33.desc: "“感谢！感谢各位！”埃贝·卡马戈粲然一笑，音乐渐弱中，阿德马尔知道该挺直腰板了。“今晚为全巴西观众请来一位重磅嘉宾——我们共和国的总统，阿德马尔·德·巴罗斯！”演播室爆发出“社——进——党！”的欢呼声浪。总统竖起双拇指合着节拍，最终看向主持人：“今晚能做客节目，实乃荣幸。”\n\n“哪里的话！”主持人眼中闪着亢奋的光芒，“听说您准备了震撼全国的宏伟计划？”\n\n美国大使馆会议室里，拉塞尔达攥着遥控器调台十五分钟，终于锁定政敌的演说。身旁使馆随员茫然盯着屏幕，阿德马尔的声音正从电视里炸响：“我宣布启动‘不让任何人掉队’经济计划！”\n\n“天啊总统先生！这目标可不小，能具体说说吗？”“简而言之，让每个巴西人都拥有高薪工作。”拉塞尔达瘫在扶手椅里，目瞪口呆。那个骗子在说什么疯话？“或许过于理想，但我相信巴西的力量！让我们携手前进！”电视里山呼海啸的掌声刺痛耳膜。\n\n“这、这混账！要搞垮经济吗？！”拉塞尔达咆哮着撞开房门。始终心不在焉的随员瞥见门牌——\"员工专用\"四个字在震动的门框上摇晃。"
 brazil_adhemar.33.a: "“妈的。”"
 brazil_adhemar.333.t: "所有人都掉队"
 brazil_adhemar.333.desc: "“阿德马尔新推的这个‘不让任何人掉队’计划，光听名字就知道假惺惺的。要我说，就该叫‘德国佬兄弟帮扶计划’！”\n\n“他爱骂我是乌鸦？乌鸦好歹站在明处叫，总强过躲在草里的毒蛇。”拉塞尔达深吸一口气，政坛里待了这么些年，阿德马尔那套权钱交易的门道，他比谁都门儿清。\n\n“说是能帮穷人找工作，可那点工钱连个小汽车都买不起，有活干又顶个屁用？倒是阿德马尔自己的海外账户，鬼知道又多了几个零。”\n\n深呼吸。“更别提通胀了——我的天老爷，当年库比契克搞通胀够要命了吧？跟阿德马尔这混蛋比起来，那都是小巫见大巫！只能说有这么个贪婪成性的家伙当总统，是我们国家的福报了！”"
 brazil_adhemar.333.a: "为何要为阿德马尔而死？"
 brazil_adhemar.34.t: "城里一夜"
 brazil_adhemar.34.desc: "阿德马尔·德·巴罗斯此生头一回在派对上感到格格不入，这场美国大使馆为庆祝巴美合作举办的酒会本该是他如鱼得水的场合。往常莱昂诺尔总会陪伴在侧，但前夜她突发高烧，这位国家元首只能独自出席。他抿了口侍者端上的香槟（阿德马尔注意到这酒格外廉价，但愿不是某种征兆），身后飘来一段对话：\n\n“说真的吉姆，上周你提的那个地方，我觉得咱们真能在那儿待上一阵。”\n\n“可不是嘛史蒂夫，大片绿地，手续也不麻烦，我还认识几个有兴趣入伙的朋友。”\n\n总统精神一振。这显然是在谈论他美丽的祖国，以及他们筹建企业城的计划。他放下香槟杯，侧身挤进谈话圈。\n\n“先生们！愿这个夜晚令诸位尽兴。方才听闻各位打算建造企业城，不知计划进展如何？我向来是美国汽车工业的忠实投资者！”阿德马尔发出爽朗大笑。令他震惊的是，周围高管们突然集体沉默。糟了，总统暗想，该死的美国佬又神经过敏了，自己说错什么了吗？\n\n“呃，总统先生，我、我们……实在抱歉，”其中一人紧张地搓着手，“您可能误会了，我们刚在商量下周考察结束后……去高尔夫球场放松几轮。”右侧的男人发出干笑，“您知道，缓解工作压力嘛。”"
 brazil_adhemar.34.a: "“哦，这样啊……”"
 brazil_adhemar.35.t: "面对无理要求"
 brazil_adhemar.35.desc: "阿德马尔始终无法适应赫尔曼·约瑟夫·阿布斯脸上那抹挥之不去的假笑。这笑容里藏着某种恶意，仿佛在享受总统处于弱势的快感。难道这项协议不该是双赢的吗？总统翻阅着企业城项目规划书，越读越觉得德国人的要求荒诞不经——完全的地方自治权，工人薪资标准甚至比农村地区还低得离谱。\n\n“您看怎么样？”阿布斯用德语没好气地说，“我们可是特意简化了欧洲那套标准流程，好让贵国能顺利接手。”阿德马尔迅速瞥了对方一眼：“这条件还是太苛刻。要是我把地方管辖权交给贵公司，乡间马上就会暴动，工人们隔三差五就会罢工。”\n\n短促的笑声从阿布斯鼻腔里挤出：“这可不是我需要操心的事，总统先生。贵国的官员和警察总该派点用场吧？只要我一声令下，IG法本随时可以动工开发这片土地。至于之后会发生什么——”他起身整了整西装，“与我何干？您知道在哪里签字。”\n\n报章上关于德国如何对待“劳工”的报道在阿德马尔脑海中翻涌。难道真要亲手把同胞送进外国公司的奴役深渊？“抱歉，我需要再考虑两天。”听到总统的回答，阿布斯从喉间发出不满的闷哼，摔门而去。阿德马尔望向巴西利亚的璀璨星空，渴望从浩瀚天幕中寻得答案。"
 brazil_adhemar.35.a: "“在不懈追求进步的道路上，没有万全之策。”"
 brazil_adhemar.36.t: "我们所做的牺牲"
 brazil_adhemar.36.desc: "埃德娜不敢相信眼前的照片——通风极差的简陋工棚明显不符合建筑规范，这些承包商难道不知道热带夏季的酷热？至于工厂车间，简直像恐怖小说里的场景，巴西明文规定的安全生产条例在这里形同虚设。办公桌对面，那位始终挂着自得笑容的总统，此刻恐怕正陶醉在“经济增长”的幻想中，全然不顾穷苦百姓将为此付出生命代价。\n\n“阿德马尔，”她冷冷翻动着照片，“这完全违背了承诺。你说过这些城镇会通过建筑规范与卫生安全检查，但这些画面有任何达标迹象吗？”\n\n抬头时她发现总统正在翻阅另一沓文件，对她的控诉充耳不闻。“总统大人？你有在听吗？”阿德马尔从鼻腔里哼了一声，起身整理西装：“我说过这事不用你操心，你的职责是国民教育，何必对这些琐事大动肝火？”\n\n“因为这是我们留下的遗产！口口声声要当瓦加斯的接班人，却对民生疾苦视而不见？早该知道你的甜言蜜语都是裹着蜜糖的毒药！”\n\n“民生疾苦？”阿德马尔讥笑道，“埃德娜，我可是在创造就业，在带领他们走向繁荣！这么简单的道理你都不懂？”埃德娜把椅子猛地一堆，摔门而出。此刻她心中只剩一个念头："
 brazil_adhemar.36.a: "“这个男人在毁掉我父亲和瓦加斯留下的遗产。”"
 brazil_adhemar.37.t: "鳄鱼池"
 brazil_adhemar.37.desc: "俗话说树大招风，而在埃德娜看来，阿德马尔恰似参天巨树，一旦倒下必将惊天动地。副总统步入办公室时，发现坦克雷多·内维斯已站在办公桌前。他能应邀再好不过——工党的支持不可或缺。“坦克雷多！”她快步上前招呼道，“见到你真是太好了！你能过来，我深感欣慰。”\n\n内维斯笑着摇头回应：“副总统阁下，这是我的荣幸才对。不过寒暄就到此为止吧，我们还有一场硬仗要打。”她点头称是，掏出笔记本说道：“里约风暴已经令阿德马尔阵脚大乱。他应对迟缓，尽显无能之态。只要我们持续施压，他迟早会完蛋。”\n\n“正是如此，”内维斯赞同道，“我们需要发动协同攻势。你父亲当年结交的社民党人脉还有不少在职，比如瓦尔特·萨莱斯那帮人。”\n\n“只要争取到他们，我们就能发起总攻。这就是我们的策略——千刀万剐。以阿德马尔的性格，迟早会露出破绽，届时就是我们扳倒他的良机。”她正要继续，却瞥见对方眼中闪过一丝慈爱的神色。“……有什么问题吗？”她温和地问道。\n\n内维斯恍然回神：“没有，阁下。只是您方才的神态，令我不禁想起令尊。您展现出的才干，与他当年如出一辙。”她轻嗤一声："
 brazil_adhemar.37.a: "“当总统是他毕生的梦魇。至于舆论方面……”"
 brazil_adhemar.38.t: "计划有变"
 brazil_adhemar.38.desc: "卡洛斯·拉塞尔达自诩是政坛苦行僧。他曾在硝烟中为巴西的尊严而战，自认修炼出了金刚不坏的政治定力。但此刻罗梅乌·德·坎波斯·韦加尔喷溅的每个音节，都像砂纸打磨着他的神经末梢。“阿德马尔总统的医改虽显激进，”这位经济高官正口若悬河地胡诌，“实则惠泽千万民众。”纯属放屁。这不过是阿德马尔为笼络民心推出的又一个草率方案。“感谢您。”主持人看向拉塞尔达，终于轮到他发言了。“现在有请著名批评家拉塞尔达先生发表高见。”\n\n他正了正领带：“恕我直言，恩里克，总统的计划如同纸糊的船。这又是阿德马尔为骗取选票推出的不负责任的半成品。更可悲的是多数巴西人竟没有积极抵——”\n\n“可拉塞尔达先生，”主持人打断道，“不少贵党同僚也支持总统的计划。”这句话让拉塞尔达如遭雷击。什么？此话怎讲？主持人注意到他的表情继续道：“连马加良斯州长近日都宣布与社进党合作。”\n\n时间仿佛静止了。马加良斯？那个他亲自扶上瓜纳巴拉州长宝座的门生？绝无可能！他强自镇定道：“呃……人人都有言论自由，但这改变不了阿德马尔胡作非为的事实。”他听见自己机械重复着残破的辩词，灵魂却发出致命的诘问：为何自己没能察觉这近在眼前的背叛？"
 brazil_adhemar.38.a: "采访结束后，拉塞尔达逃也似的离开了。"
 brazil_adhemar.39.t: "踽踽独行"
 brazil_adhemar.39.desc: "拉塞尔达站在瓜纳巴拉州长官邸的厅堂，熟悉的建筑此刻却弥漫着权力的重影。他曾亲手悬挂在阶梯顶端的油画，如今蜷缩在廊柱阴影里，家具也换成了完全不同的风格。这座建筑依然庄严，却像被移植了心脏的躯壳。\n\n“卡洛斯？”身后传来问候。拉塞尔达转身时，官僚式的微笑已精确挂好：“啊，拉斐尔，感谢你腾出时间。”握手瞬间察觉对方掌心的戒备——会面地点选在厅堂而非办公室，本就是一种政治声明。\n\n“社进党最近没给你添麻烦吧？”他故作轻松地试探，“毕竟飓风赈灾被他们搞成政治马戏……”\n\n马加良斯只是僵硬地点点头：“他们正在协助灾后重建。”\n\n“还有那份医保法案！我们一定要……”\n\n“够了卡洛斯。”州长投来怜悯的目光，“游戏结束了。六五年我们差点被工党掀翻，你还没学会低头吗？”\n\n\"明白了，州长阁下。\"拉塞尔达在“州长”二字里淬满讥诮，“恕我叨扰。”他大步流星冲出官邸，1965年败选的阴云正化作实体压上肩胛——但卡洛斯·拉塞尔达字典里从无“过气政客”四字。"
 brazil_adhemar.39.a: "可这份苦闷又是从何而来？"
 brazil_adhemar.40.t: "无言的忧伤"
 brazil_adhemar.40.desc: "里约的天气异常寒冷，埃德娜不得不多添一件衣物，待回暖后再将其脱掉。灰蒙蒙的天空仿佛随时会降下雨来。她将外套紧紧攥在胸前，凝视着眼前的两座墓碑。仅仅是看着，泪水就快要夺眶而出，但现在可不是哭泣的时候，毕竟正有无数双眼睛在暗处窥视着她。\n\n“奥斯卡·德·莫赖斯·科斯塔”与“劳拉·露西娅”——每当目光触及这两个名字，都像有双手生生撕裂胸腔。前夫奥斯卡离世七载，长女劳拉夭折更久，可剜心之痛从未因时光流转而稍减。每次回到这座城市，埃德娜总会专程来此，试图丈量伤口的深浅。\n\n答案永远鲜血淋漓。\n\n即便后来又生育了四个孩子，这份痛楚依然锋利如初。投身政坛成为转移注意力的完美方式，她将这份痛苦转化为改善民生的动力，而父亲的竞选活动恰好为此提供了绝佳契机。但即便贵为副总统，她依然无法逃离这份蚀骨的哀伤。\n\n一滴泪珠滚落面颊，埃德娜迅速以指尖拭去。必须尽快离开，否则潜伏在暗处的保镖、密探和记者们必将目睹她痛哭失声的模样。转身离去前，她对着两座墓碑低语了最后一句话："
 brazil_adhemar.40.a: "“我发誓，一定会让你们以我为荣。”"
 brazil_adhemar.41.t: "寂静的夏天"
 brazil_adhemar.41.desc: "扬告别沙场已有将近十年，他从未料到今天居然会再次拿起武器。讽刺的是，他此刻消灭的生物数量远远超过了当年的波兰战场。\n\n杀虫剂喷射时轻柔低缓的嘶嘶声，让人感觉不出它正在杀死亿万生灵。扬唯一遗憾的是这些害虫不会用德语哭爹喊娘。\n\n回忆起青年时代，扬似乎总是在与吸血成性的“大军”进行着一场又一场战斗——先是波兰，然后是海狮行动的苏格兰高地。那时，世界遍地战火，而他奋力反击。随着时间流逝，许多战友选择前往美国开始新生活，但扬这位永不言弃的探险家选择向南行进。即使他的葡萄牙语说的一般，巴西军队依然欣然接纳了他，还晋升他为上校。\n\n那些岁月仿佛已是前世的记忆，现在的扬更喜欢漫步于乡间，享受这片美丽的新家园。他已经多年未去马瑙斯，那个拥有迷人风光和动人女子的地方。\n\n周围一片郁郁葱葱，却好像少了些什么。曾经环绕耳边的鸟鸣、鼠类的窸窣、蟋蟀的吟唱——大自然奏响的和谐乐章已然消失不见。如今，四周只剩下杀虫剂的嘶嘶声和微风的低语。\n\n然而，扬对此并不在意。相比往昔战场上震耳欲聋的枪炮声，他更珍惜这片刻的宁静。扬微笑着继续他的小小战役……"
 brazil_adhemar.41.a: "哼着波兰军歌。"
 brazil_adhemar.42.t: "酒变水"
 brazil_adhemar.42.desc: "曼努埃尔拖着沉重的步伐，一瘸一拐地朝着教堂出口走去。彩色琉璃窗洒下五彩斑斓的光线，为他的路途铺上了一层梦幻的色彩。在工厂劳作一周，关节的酸痛感丝毫不减。年岁渐长，他愈发觉得这疼痛来得快去得慢，应了那句病去如抽丝。\n\n他摇晃着步入教堂大厅，手轻轻探入大理石制的圣水缸，漫不经心地划了个十字。圣水也许能洗涤灵魂中的罪恶，但却洗不干净那双沾满机油的手掌。\n\n推开教堂的最后一道门，他瞥见一群工人正簇拥在布告栏前，对着一张崭新的宣传海报指指点点，哄笑不止。海报上赫然印着一行醒目的大字，痛斥饮酒有害，同时鼓吹“维护公序良俗”，下方还有总主教的亲笔签名。\n\n曼努埃尔冷哼一声，想起刚才圣餐的葡萄酒。突然，一切豁然开朗：最近啤酒涨价、健康警示频出、再加上这些充斥着说教意味的海报——这一切的背后推手无疑是社进党。他紧紧攥住湿漉漉的拳头，心中涌起一股怒火。当初投下那一票，本是希望改善生活，而不是让这些蠢蛋政客夺走他用来麻痹痛苦的唯一慰藉。\n\n曼努埃尔叹了口气，缓缓走出教堂。全身酸痛，内心空虚。他顺着街道望去，远处熟悉的酒馆招牌映入眼帘，一个坚定的念头在心头浮现：管他要花多少钱……"
 brazil_adhemar.42.a: "老天爷，要是酒都喝不上的话……"
 brazil_adhemar.43.t: "最后光芒"
 brazil_adhemar.43.desc: "夜幕低垂，总统阿德马尔独自一人，伫立在酒店阳台之上。夜已深，空气中的湿度仍未见减弱，丝丝水汽凝结在他赤裸的肌肤上，宛如细碎的晨露。房间内，妻子莱昂诺尔睡得正熟，仿佛在召唤他。但此刻阿德马尔的心中却因明日的盛会而充满焦虑，难以入眠。\n\n明天，一场汇聚全球博彩业顶尖人物的豪华晚宴即将开幕。从里约热内卢的赌场巨头，到蒙特克里斯托的老虎机之王，各界精英齐聚一堂。长久以来，巴西对待赌博一直持保守态度，好比禁欲的清教徒；但这一切，都将在不久之后迎来剧变。要是不能吸引到足够的投资，所有的计划都将是空中楼阁。这便需要我们的阿德马尔——以推销技巧闻名于世的总统阁下，领衔出席发表精彩演说。不过，尽管他的演讲已是面面俱到，却总感觉少了一股能够凝聚一切、震撼人心的力量。放在几年前，这样的演讲不过是小菜一碟，发挥肌肉记忆就能轻松拿下。\n\n然而，时光荏苒……岁月不仅侵蚀了他的体魄，更夺走了他锐利的思维。往日里那个风趣幽默、反应敏捷的政治巨星，正渐渐被迟钝麻木的老人所取代。最令人痛心的是，他能清晰地感受到这种变化。每过去一日，都像是失去了一部分灵魂，让他的智慧变得黯淡，笑话失去了诙谐，承诺也不再可靠。\n\n阿德马尔抬头凝视星空，突然与夜空产生共鸣：白昼那灿烂的阳光已被无尽黑夜所吞噬，唯有寥寥星辰闪烁其间……\n\n等等……就是这个意象！星芒！他猛然转身，快步回到书桌旁，在记事本上奋笔疾书：“想象一片由无数璀璨星光构成的星座，千百盏明灯沿巴西海岸熠熠生辉。我们将携手打造一条环绕这片土地的银河，由一座座赌场组合而成……”\n\n也许并不是无可挽回。即便是在这夜空的深邃寂静之中……"
 brazil_adhemar.43.a: "星光照耀着总统的道路。"
 brazil_adhemar.44.t: "虚假的避风港"
 brazil_adhemar.44.desc: "阿尔乔姆用一贯的动作拿起啤酒，轻轻啜饮一口，这是他下班之后犒劳自己的传统。与之前的工作相比，现在这份不仅对身体的负担更小，而且薪酬也高得多。\n\n尽管他的葡萄牙语可能还只有初中水平，但工厂工头对他十分耐心，让他颇为感激。为了弥补语言上的不足，他总是主动加班，加班还能提供一些收入。他还在巴西利亚的外籍社区结识了许多朋友，比如索菲、阿达尔贝特等人。他靠在吱嘎作响的沙发上，调频道找帕尔梅拉与博塔福戈的比赛，却看到了晚间新闻的头条消息，令他毛骨悚然。\n\n“晚上好，巴西观众。今晚的头条新闻：纳粹巨企在我国设立分部。”播音员说道，“据传IG法本最快将于下个月开始在巴西各地建立生产设施。”消息如惊天霹雳在阿尔乔姆的脑海中炸开。巴西本应是德国难民的避风港——德国穷尽一切手段压榨民力，好充实那所谓的“帝国”伟业；巴西之前抵抗法西斯侵略，现在怎么跟他们同流合污去了？\n\n阿尔乔姆感到胸口发紧，头晕目眩。他紧紧抓住沙发扶手，做了几次深呼吸，然后慢慢站起身来。他感到呼吸困难，双手撑在公寓的窗台上，努力呼吸外界的新鲜空气。望着窗外灯火辉煌的城市景观，他在想，明天是不是该请个病假。不行，他不能这么做。万一被公司开除，只能去个被IG法本收购的小公司怎么办？他瘫倒在地上，身体靠着墙壁，头部埋在双臂之间，泪水顺着脸颊滑落。他原本以为这里是安全的，但现在一切都变了。"
 brazil_adhemar.44.a: "无处可逃。无处可藏。"
 brazil_adhemar.45.t: "瓦加斯真正的继业者"
 brazil_adhemar.45.desc: "金色的阳光笼罩在规划齐整的巴西利亚，阿德马尔正在为即将发表的演讲做着准备。他一遍又一遍地重复着：“……因为我已经准备好肩负更大的使命！我决心以行动书写历史……”\n\n阿德马尔的自信一如既往，他准备发表一篇演说，一举改变巴西国家的命运。在这篇演说中，他将宣布自己对巴西国家所做的宏伟规划，继承先总统瓦加斯的事业。“上帝啊，如果您能听到我的祈求，请赋予我指引和力量，使我能够为国家留下值得铭记的遗产！”他没有听到任何回应，但心中却涌起一股释然之感，仿佛刚刚忏悔了沉重的罪孽。\n\n最后一次排练。公牛喝了一口水，开始讲话：“巴西的全体人民！今天是一个值得庆祝的日子！此时此刻，我们正着手实施一系列重要政策，引领我们走向更加繁荣的未来！”如往常一样，他的声音洪亮清晰，充满魅力，仿佛那美好的未来已经实现。\n\n他握住门把手，所有的忧虑都已烟消云散。他已做好准备，决心彻底改变巴西的命运。民众会欢迎他的新政策吗？只有时间才能给出答案，但他认为他们一定会的。"
 brazil_adhemar.45.a: "一人之力，改变国家。"
 brazil_adhemar.46.t: "举杯庆祝"
 brazil_adhemar.46.desc: "阿德马尔靠回椅背，收音机里正在逐票播报参议院对教育法案的审议结果。他的努力究竟有何收获，即将在几分钟内揭晓。名字一个接着一个，局势逐渐朝着有利于他的方向发展。\n\n他从未怀疑过自己。一秒钟的怀疑都没有。\n\n计票结果宣布时，他露出了微笑。他为这个时刻准备了一瓶白兰地。他津津有味地给自己倒了一杯，轻抿一口，这就是胜利的味道。他仿佛已经看到了头条新闻：“巴西儿童的胜利！”是的，这是巴西儿童的胜利，但如果没有他，就没有这样的胜利。他将借此成为教育改革者，赢得家庭和商界的支持。三十年后，当人们书写巴西的历史时，阿德马尔总统的名字将铭刻在此。\n\n然而，一切尚未结束。他又想起另一种可能，虽然他的初始法案确实通过了，但最终因幕后反对势力的行动而未能取得预期效果，后续法案被搁置遗忘。失败的结局在他脑海中盘旋，形成一支令人眩晕的漩涡。他不能、也绝不会让自己蒙受这样的耻辱。喝完手中的酒，他下定了决心。\n\n媒体，永远是他手中的工具。他会利用它克服一切困难，迈向他应当成就的事业。"
 brazil_adhemar.46.a: "然后，再来一杯白兰地。"
 brazil_adhemar.47.t: "初战告败"
 brazil_adhemar.47.desc: "总统府的国务厅曾以现代主义风格的陈设著称，可如今这里一片狼藉，家具丢得东倒西歪。房间里堆满纸箱，文件散落一地；一群幕僚和公务员站在那里，像是末日审判后的孤寂灵魂。某种程度上讲，他们的现状也确实如此。阿德马尔迈着沉重的步子走了进来，屋内顿时紧张起来，等他开口。\n\n“一群白痴，无可救药的蠢材，这帮参议员都他妈干了些什么！全他妈是小丑！我们原本可以……这可是千载难逢的好机会啊，他们却把它给毁了。”他猛然转身，面对所有人厉声说道：“你们全搞砸了！我们本应展现最好的一面，证明这个政府有能力治理国家、懂得妥协、会跟反对派协商，而不是把事情全搞成眼前这样的烂摊子。”\n\n阿德马尔踱步至一旁的扶手椅前，缓缓坐下，房间重归寂静，无人敢打破这凝滞的气氛。这时，他最信任的新闻顾问小心翼翼地走近，“报纸方面需要我们做出回应。”\n\n“是的，当然要回应。我们要拿回主动权。我们要把责任推到那个叛徒身上，拉塞尔达这条狗。他背后是狗主子美国，他拿着美国护照，他这么搞就是为了迎合主子，破坏我国社会稳定，参议院竟然任由他胡作非为！既然他们拒绝施政，那就表明他们根本就不打算好好办事。我们直接与各州州长合作，务必把教育改革推行下去，管他参议院配不配合。你们马上开始行动。”\n\n话音刚落，幕僚们便纷纷离开去安排各种事宜，联络媒体和地方官员。阿德马尔长长地叹了口气。在历史的长河中，这次挫败只是微不足道的一个注脚。"
 brazil_adhemar.47.a: "没事，我们还有明天。"
 brazil_adhemar.48.t: "夹心蛋糕"
 brazil_adhemar.48.desc: "社保法案在众议院获得通过，喜悦的笑容洋溢在整个议厅，巴西的贫困人口终于有了保障。尽管在某些人看来胜利已成定局，但社进党依旧沉浸在胜利带来的喜悦之中。立场敌对的罗梅乌·德·坎波斯·韦加尔与菲林托·穆勒居然聊了起来，说明社进党这次确实非常高兴。\n\n“恭喜你，坎波斯。如此成就值得骄傲……”穆勒知道社进党众议院领袖坎波斯这次可谓厥功甚伟，不论是催票还是疏通关系，都由他一手完成，“……社进党从默默无闻成长为今天的庞然大物，确实‘非同凡响’。”即便如此，他还是忍不住要讽刺一句。\n\n“是啊，每个伟大人物的背后，都有许多默默付出的小角色……”坎波斯显然不落下风，“……像我这样的，一直在为社进党的社会项目艰苦奋斗。而有些人呢，等到一切尘埃落定之后突然跑过来分一杯羹，好似给一块烤好的蛋糕添上华丽却多余的装饰。”\n\n“要是阿德马尔手下的人都能尽职尽责地辅佐总统，那么他就不会需要像我这样的人了。”穆勒懒得装礼貌了，讽刺之意显露无疑，“替地方州长处理麻烦是一回事，治理国家则是另一回事。”\n\n“你不是处理麻烦的专家嘛？”两人的言辞仿佛利刃，直指对方要害。“我想那些在瓦加斯时代受你‘关照’的受害者们肯定能详细描述你的‘专业程度’。”\n\n“我很乐意向你展示……不过我得走了。”穆勒故意在经过坎波斯身边时嘲讽道，“我们共事了这么长时间，但你对政治的理解还是这么肤浅……”"
 brazil_adhemar.48.a: "除非你也跟他们一样人间蒸发。"
 brazil_adhemar.49.t: "公牛弄巧成拙"
 brazil_adhemar.49.desc: "《公牛弄巧成拙：社会保障法案折戟参议院》——比阿特丽斯·阿尔梅达\n\n昨日下午联邦参议院表决后，社会保障法案遭遇惊人失利。政府对低收入群体的福利措施不力，社会上已是一片批评，为此总统于上周提出了这项法案，但未能得到多数议员的赞成。\n\n总统旋即通过广播指控反对派“腐败”成性，阻挠法案“为劳动者利益服务”。此举引起参议员群体强烈反弹，来自巴拉那州的全民盟议员乌利塞斯·瓜马尔当众讥讽此举堪称“虚伪”，并谴责社进党“鲁莽作秀”；工党则在法案遭否决后嘲讽阿德马尔总统是在“无的放矢”。\n\n消息传出之际，更多民众开始怀疑总统在支持者中“收钱但办事”的形象。昨夜里约热内卢街头，34岁的玛丽亚直言：“他不再作为，只剩贪婪，领导只会敛财，我们还能奈何？”\n\n市中心已涌现讽刺时政的漫画。其中一幅描绘“总统”向流浪人群许诺建造庇护所，冲进建材店抓起砖块后却在台阶前绊倒，旋即被警方拘捕。里约中心区民众正呼吁总统别再如此“牛脾气”。"
 brazil_adhemar.49.a: "至少有人乐于见此。"
 brazil_adhemar.55.t: "海上的朋友"
 brazil_adhemar.55.desc: "坎波斯将军在码头上振臂欢呼，猎猎海风卷起他的将官斗篷。巴西海军的老古董与这艘新型战舰相比，简直像一群锈迹斑斑的钢壳乌龟遇见沧龙。他放声大笑：“哈哈哈！太妙了，上将阁下，这才是真正的海上利剑！”\n\n身旁的海军上将捻着胡须微笑：“全赖特种钢材与船体配重技术。”他指着面前的巨舰如是说。坎波斯点点头，心里已在盘算该如何游说国会追加海军预算。\n\n望着远处正在补给的驱逐舰，上将忽然压低嗓音：“恕我直言，海军高层对阿德马尔总统的……对德政策有些疑虑，某些示好举动是否过于热切了？”\n\n坎波斯嘴角扬起狡黠的弧度，拍了拍上将的肩膀：“听说过总统先生的‘新西装’笑话吗？”不待对方回答便模仿起总统腔调：“‘我从不把公款塞进自己口袋！’结果台下有人喊：‘那您的新西装哪来的？’”两人顿时笑作一团。坎波斯擦了擦眼角的笑泪，接着说道：“阿德马尔这老狐狸，不过是惦记着德国人的马克罢了。”上将这才如释重负。"
 brazil_adhemar.55.a: "“将军，有这话我们就放心了。”"
 brazil_adhemar.56.t: "错误的听众"
 brazil_adhemar.56.desc: "这场军事交流本有个光鲜的开端。当巴西“少壮派”军官团抵达日耳曼尼亚，他们收获了鲜花与军礼。初期会谈也颇有成效——双方研讨“白色方案”、“巴巴罗萨”、“海狮计划”等德军经典战役的成功要素。一切看似和谐。\n\n直到餐厅冲突爆发。混血军官儒利奥向来血性十足（军校时期即是如此），本不该听见那个德国军官议论“巴西该清理劣等种族”、“维持白人种族纯洁”。但当他亲耳听到\"劣等种族\"这个词时，需要三名同僚才能将他从施暴对象身上拉开。\n\n事态显然升级了。数小时后双方再度同席时，会谈氛围已降至冰点。原本健谈的儒利奥全程沉默，目光如刃直刺德方。\n\n此后数日的交流始终笼罩在尴尬与敌意中。当载着少壮派的军机终于降落巴西时，众人恍如结束一场精神囚禁。"
 brazil_adhemar.56.a: "下次还是派和德国人更聊得来的军官去吧……"
 brazil_adhemar.57.t: "回国路上"
 brazil_adhemar.57.desc: "军机升空后，舱内始终死寂。豪奢机舱里无人敢讨论这场外交灾难。儒利奥心底某处或许该为搞砸德国之行愧疚——毕竟自他那记勾拳后局势急转直下，回国受处分也属正常。但这缕愧意细若游丝。\n\n“我不会道歉。”儒利奥突然打破沉默，众人侧目。“那杂种不想挨揍，就不该用‘劣等种族’侮辱我和家人。就这么简单。”\n\n舱内空气凝固数秒，里科上尉率先开口：“我们懂，儒利奥。换作是我也会动手。那德国佬说的……”\n\n“那群纳粹杂种最擅长激怒人，”胡安上尉接过话茬，“军校时我最好的兄弟都是混血。早料到会出事。”机舱内响起一片附和声。儒利奥长叹一声，双手掩面。\n\n“这事我们都有份，”里科倾身向前，“别想独自背锅。他们那套种族主义说辞我们同样不齿。再说——”他狡黠一笑，“德国人有什么证据证明不是他们先动的手？”儒利奥嗤笑出声，机舱氛围明显轻松不少。"
 brazil_adhemar.57.a: "人人为我，我为人人。"
 brazil_adhemar.58.t: "个人观点"
 brazil_adhemar.58.desc: "晚宴已经为巴西的将军们备好了，好一顿丰盛的晚餐。龙虾、牛排，各式各样精致美味的佳肴装点着餐桌，巴西军队的战士们都快等不及啦。阿德马尔·德·巴罗斯坐在首座，宛如某位伟大的中世纪国王。他用勺子敲敲酒杯，引起在座众人的注意。“先生们！”他热情地打着招呼，脸上绽开笑容。“很高兴能见到大家。我知道你们都迫不及待地想吃东西了，但首先，我想问问各位的想法。你们愿意为保护巴西安全做什么？讲几句就行。坎波斯将军？”他说着，朝桌子对面的齐玛尔·坎波斯点头示意。\n\n“嗯，总统先生，海军需要升级换代了。有些船吧……那状态有点好笑。龙虾战争是靠船打赢的，要想打赢下一场战争，就得把船弄到美国那样的状态。”坎波斯说。阿德马尔点点头，把手指向梅洛。\n\n“空军的情况也差不多，总统先生。崭新的幽灵战机肯定能让我们的大国地位更加稳固。”\n\n“我同意。”桌子对面的菲林托打断了他，“巴西必须被视为第五超级大国。但要是军人不守纪律，我们就没脸当这个第五大国了。德国知道如何操练他们的士兵。在我看来，我们应该以德为师。”桌子那头传来一阵表达赞同的简短低语。\n\n“为什么说承认呢，我觉得我们就是第五超级大国！”阿德马尔拍着手宣布道，“所以，我想尽快开始搞下核能。这样才能实现公平竞争，对吧？”几声紧张的窃笑在桌子上回响，尽管措辞的变化使他们不像往常那样真诚。“啊，先生们，你们一定要原谅我，”他继续说，“我只是想照顾好你们，照顾好我们的军队。毕竟，军人的需要就是国家的需要。现在，开始吃吧！”"
 brazil_adhemar.58.a: "军人们犹豫地吃了起来，还没搞懂阿德马尔到底是什么意思。"
 brazil_adhemar.59.t: "丛林之心"
 brazil_adhemar.59.desc: "维托里奥上校早已习惯了雨林中的闷热，但每当他踏进丛林，还是会感到窒息。穿过茂盛的灌木丛，上校和他的分队正在接近帕拉中部某个被上帝遗忘的破败村落，那里现在已经成了共党的根据地。他们的任务便是扫荡村庄，将盘踞在那里的游击队连根拔起。“上校，”他的副官弗雷德里科还没有完全适应炎热的天气，“我还是那句话，我们进了村，就直接一把火给村子全烧光。没人会关心那的村民，更别提他们还可能跟目标合——”\n\n维托里奥狠狠瞪了他一眼，示意他闭嘴。这家伙有点敬业过头了，他很不喜欢。突然，远方传来了一阵沙沙声，两个士兵把一个小男孩从树丛里拽了出来。“长官，我们在灌木丛里发现了他，该如何处置？”上校举起手，示意他们松开男孩。随后他跪在男孩面前，拿出了一根巧克力棒。\n\n“给你，孩子，我们无意伤害你。”上校把手里的食物递给男孩。男孩接过巧克力棒，大口吃了起来。“我和我的朋友们都是好人，对吧？我们在抓坏人。你能告诉我们最近有没有看到什么奇怪的事情吗？”上校尽可能温和地问道。男孩在狼吞虎咽的同时，抬头指了指左边。\n\n“在洞里。”男孩言罢，继续享用他的巧克力棒。维托里奥站了起来，向他的副官点了点头。当天晚些时候，上校和他的部下沿着男孩所指的方向冲进了洞穴系统——里面藏满了叛乱分子，他们就像桶里的鱼一样，躲在原地被全数击毙。"
 brazil_adhemar.59.a: "有时候最直接的方法并不是最好的。"
 brazil_adhemar.60.t: "顾家庭还是讲义气？"
 brazil_adhemar.60.desc: "那个棕色信封静静躺在佩德罗上尉的办公桌上，像是在挑衅。嘲弄他的优柔寡断。换作旁人，早该迫不及待地接受其中暗藏的见不得人的交易，从此摆脱经济困窘——可该死的道德感却让他裹足不前。\n\n这封信是一两天前收到的，答复期限日益逼近。没有寄件地址，在深夜时分悄然出现在门缝里。拆开时，一枚微型录音设备滑落出来，还有张笔迹陌生的信纸，要求他将设备佩戴在即将参加的军方会议上。作为回报，足以解决所有困境的巨款很快会汇入他的账户。\n\n而症结正在于此——他太需要这笔钱了。\n\n且不说日常生计的艰难，妻子腹中正孕育着新生命，以他们眼下蜗居的公寓条件，根本无法给孩子像样的生活。父亲因旱灾无力偿还银行贷款，离被驱逐出老宅只剩一步之遥。所有重担层层叠叠压得人喘不过气。\n\n佩德罗的指尖抚过信封边缘，终于下定了决心。明日他将与战友们碰头，商讨如何阻挠上级部署的作战计划。待会议结束，他会将录音交给警局，昔日的同袍将锒铛入狱。这个念头令他心痛，但佩德罗明白，这是当下唯一正确的选择。"
 brazil_adhemar.60.a: "家人永远最重要。"
 brazil_adhemar.61.t: "皆大欢喜"
 brazil_adhemar.61.desc: "若有人说成天对着电子表格绝不会逼人酗酒，那定是没当过外交官。此刻林肯·戈登盯着屏幕上跃动的经济预测与市场走势，冷汗浸透衬衫——所有数据都在尖叫：德国人正扼住巴西经济的咽喉。若他坐视不管，大使头衔怕是要拱手让人。电话铃声突兀炸响。“喂？我是林肯·戈登。”他操着生硬的葡萄牙语应道。\n\n“戈登先生，我是阿德马尔。”他心头一沉，“听说贵国军火制造精良，我们想订购些装备，可否安排？”\n\n“这——呃——”他脑内飞速计算，“五折优惠如何？”听筒传来含混的肯定声，随即挂断。戈登瘫进座椅，接下来大半天恐怕都要绞尽脑汁编造报告，解释为何半价抛售尖端军备是“战略投资”。\n\n千里之外，德国大使馆内，罗伯特·基尔克正埋头翻阅文件——不是报表，而是当地白人至上主义者的剪报集。摸清潜在盟友总是有益。刺耳铃声惊破寂静，他刚抓起听筒就听见那个声音：“晚上好，基尔克先生。美国方才承诺五折军售，不知贵国……”\n\n“二五折！”基尔克脱口而出，“无论他们开价多少，我们只要四分之一。”电话那头爆出大笑，忙音随之传来。他三步并作两步扑向电报机，催促日耳曼尼亚速调废旧军械——管它质量如何，能装船就行。"
 brazil_adhemar.61.a: "此乃谈判之艺术。"
 brazil_adhemar.71.t: "扩张事宜"
 brazil_adhemar.71.desc: "总统办公室内正在召开一场会议，两名男子就如何掌控巴西石油公司展开激烈讨论。\n\n“总统先生，我的建议非常简单：必须将巴西石油打造成拉美顶尖石化企业。只要给予充足时间并配备优秀管理层，这家企业完全有潜力跻身世界一流水平——这也正是我要强调的第二点：我们绝不能简单粗暴地塞满社进党的人手就指望奇迹发生。”贝内迪托的立场清晰有力，他坚信唯有廉洁高效的领导团队和资源整合才能释放这家国企的全部潜力。\n\n“我明白你的意思，贝内迪托。但你可能忽略了这其中蕴含的巨大机遇：巴西石油创造的利润每增长一分，政府就能为基建项目多注入一分资金。这不仅会提升我们在民间的支持率，更能为社进党争取选票。我希望你能理解我的考量重点。退一步说，五年或十年后，若我们失去执政地位怎么办？那些后来者会恬不知耻地将我们的政绩据为己有！”\n\n这场拉锯战持续良久却难分高下，最终决策权还是落回了总统手中。阿德马尔权衡着两份方案，贝内迪托的论述仍在耳畔回响，他起身表态："
 brazil_adhemar.71.a: "“行，按你说的办，但我得看到成效。”"
 brazil_adhemar.71.b: "“抱歉，贝内迪托，我心意已决。”"
 brazil_adhemar.72.t: "牛气冲天"
 brazil_adhemar.72.desc: "阿德马尔·德·巴罗斯总统从不拒绝造访圣保罗的邀约。这次是应心腹贝内迪托·巴雷托之请。虽然不明白对方为何要将会面地点定在机场，但总统深知这位老友从不做无谓之举。\n\n总统的座驾驶入停机坪时，谜底揭晓。一架流线型喷气机在阳光下熠熠生辉，宛如巴西腾飞的具象化。恍惚间，熟悉的声音在耳畔响起：“漂亮吧？”满面红光的贝内迪托快步上前，与总统热烈握手。\n\n“确实气派，不过你该不会专程让我来看飞机吧？”总统的指尖轻轻划过冰凉金属，心跳逐渐加快。\n\n贝内迪托神秘一笑，从西装内袋掏出件物什：“当然不止。”他将钥匙抛向空中，金属在空中划出闪亮弧线——这不过是象征性仪式，毕竟驾驶喷气机何需钥匙？“临别提醒，”他钻进轿车前摇下车窗：“这宝贝喝的是百分之百巴西燃油。”\n\n总统走向舷梯，感到兴奋与忧虑交织心头。“请放心，阁下。”飞行员递来镇定眼神，“我可是老手了。”引擎咆哮声中，圣保罗的轮廓在舷窗外徐徐展开，先前的种种担忧此刻烟消云散，只余窗外无与伦比的美丽景色。云海之上，阿德马尔忽然明悟：没有社进党，没有他掌舵，这一切辉煌终将是海市蜃楼。"
 brazil_adhemar.72.a: "“我为自己立了一座丰碑。”"
 brazil_adhemar.73.t: "血肉与橡胶"
 brazil_adhemar.73.desc: "迭戈俯瞰着车间里忙碌的工人，始终没弄懂这座橡胶加工厂的运作奥秘。托父亲在政府的人脉，他甫一毕业就坐进了经理室。此刻他正隔着落地玻璃怔怔出神，流水线轰鸣声突然被刺耳的电话铃截断。他踉跄着扑向办公桌，抓起听筒粗声粗气：“谁啊？”\n\n“卸货的！胶料都堆门口半小时了！”电话那头传来同样暴躁的吼声。\n\n迭戈扬声吩咐工人去搬原料，自己则慢悠悠抽出那本簇新的《橡胶加工管理手册》，他看到了交联糊剂压延的章节。合上书，他踱到锈迹斑斑的观察台——这个正对中庭的制高点能将工厂尽收眼底，盘算着得找个老师傅请教压延工艺。\n\n他正要把第三份报表塞进文件夹，突然一阵凄厉的惨叫撕裂了车间。迭戈撞开铁门冲上观察台，只见某台硫化机旁蜷缩着个身影。那人半截小臂扭曲成焦黑色，破碎的骨碴从碳化皮肉中支棱出来，空气中弥漫着诡异的烤肉味。迭戈的指甲深深掐进掌心，呆立了足有半分钟才嘶吼着唤来保安。目送担架消失在厂门拐角，冷汗早已浸透衬衫。他深知人命已不可挽回，当下惟有想尽办法降低负面影响。颤抖的双手翻开管理手册，扉页的文字在血渍映衬下格外刺目："
 brazil_adhemar.73.a: "“致命事故在所难免，切勿挂怀。”"
 brazil_adhemar.74.t: "命运之轮缓缓转动"
 brazil_adhemar.74.desc: "透过餐厅的窗户，贝内迪托·贝里托依稀能望见远处巴西石油公司最新办公楼的一角。它们正迅速拔地而起，他的工作成果如今已逐渐清晰地展现在众人面前。\n\n坐在他对面的宾客，巴西石油新任命的董事，察觉到他的目光，面露微笑。他是靠着贝里托的坚持才得以上任的，此前的董事因腐败、滥用国家资金以及个人严重无能被迫辞职。贝里托对前两项指控无从置评，但最后一项，他深知属实。\n\n这位董事正滔滔不绝地讲述巴西石油在里约及周边地区近来的巨大努力，并指出在贝里托针对性的改革与反腐行动下，公司效率与生产率已经显著提升。当然，他的上任也是一个关键因素。\n\n贝里托一边点头，一边漫不经心地听着，显然他更享受美食而不是这位宾客的陪伴。但他明白董事说得没错。巴西石油正迅速扩张，而他确实扫除了不少腐败分子。商界对这家巨头的信心也大幅提升，他知道，未来只会有更多好处。"
 brazil_adhemar.74.a: "出色的工作。但远未结束。"
 brazil_adhemar.75.t: "皇帝的新衣"
 brazil_adhemar.75.desc: "阿德马尔倚在椅背上，呷着咖啡。总统府的清晨本该如往常般高效有序，他思忖着翻开晨报。但当目光扫过头条新闻时，所有幻想瞬间破灭——这则粗体印刷的丑闻更适合出现在1955年，而非六十年代中期。随着阅读深入，他心头开始发紧。\n\n巴西石油。贪腐。国有资产巨额流失。字句如利箭刺入眼帘，勾勒出他原以为行事谨慎（至少能让公众相信自身清白）的党羽们的斑斑劣迹。考虑到他支付的封口费，本不该如此。然而卡洛斯·拉塞尔达的调查彻底粉碎了这个幻想，连带他精心设计的计划也支离破碎。\n\n报纸在紧攥下簌簌作响，咖啡在胃里翻腾。一股阴沉的坠落感在体内蔓延，他既为整件事的愚蠢暴怒，又不得不承认自己的失算。诚然，阿德马尔深谙数据造假之道，但施展这种伎俩需要天时地利，绝不该危及自身钱袋与名誉。最糟的是，某些董事恐怕早已逃往避税天堂，徒留他收拾残局。\n\n纷乱思绪最终汇聚到始作俑者巴雷托身上。那个卑鄙的蠢货就是不肯放过巴西石油，如今所有人都被拖下水。放下报纸深吸一口气，他竭力忽视胸中翻涌的窒息感。此刻解雇巴雷托无异于自曝其短——毕竟他与石油公司高层的会面还历历在目。\n\n但从此形同陌路。此人让阿德马尔暴露出凡人的脆弱——仅凭这点，就永远不可饶恕。"
 brazil_adhemar.75.a: "光环开始褪色。"
 brazil_adhemar.76.t: "家庭"
 brazil_adhemar.76.desc: "面对政治的核心，剥去陈词滥调、阴谋诡计和煽动民情的外衣，它酷似一个家庭。很少有人能像巴西人民的大家长阿德马尔先生那样了解这一点。时不时会有争执发生，但他明白，要保持家庭和睦，唯一的方法就是满足每一个人。佩德罗叔叔帮你在区里拉到选票，到了圣诞节他就能拿到额外的好处。然而，总统却被夹在了政治“家庭”，与真正的家庭之间。大选结束了，他终于能陪伴那些真正爱他的人。\n\n站在圣保罗最好的餐厅中央，阿德马尔举起一杯香槟，为儿子当选联邦副议员干杯。两人坐下用餐，儿子滔滔不绝地谈论着改善国家塑料工业的计划，也许爸爸一直取笑的化学学位终于派上了用场。\n\n没过多久，阿德马尔跟女婿争吵起来。女婿质问阿德马尔，为什么国家还没有彩色的足球频道。尽管有些烦躁，阿德马尔不得不佩服年轻人的热情和勇气，毕竟他敢于直面当年帮他弄到工作的人……这需要大得离奇的勇气。\n\n时光悄悄流逝，夜晚接近尾声，但阿德马尔感觉这次聚会似乎少了些什么。从前，他的兄弟安东尼奥总能以箴言唤起他的思考，但安东尼奥早已去世了。他看向桌子那边，他的另一个兄弟杰拉尔多也是眼神黯淡，岁月在他们所有人身上都留下了痕迹。但，眼前的笑脸和欢笑提醒了总统他为什么要继续努力，那是为了留下一笔让他的两个家庭都能像现在这样幸福的遗产。阿德马尔整理思绪，正要开口……"
 brazil_adhemar.76.a: "一滴泪从脸上滑落，跌入酒杯。"
 brazil_adhemar.77.t: "尚未了结"
 brazil_adhemar.77.desc: "阿德马尔总统枯坐案前。孤灯一盏，同他那疲倦的双眼相照映。纵使喉咙沙哑干涩，握听筒的手掌麻木酸胀，他仍无法就此作罢。不过是选举失利，一切还未了结呢。正道不通，便走旁路。该准备些得以成事的脏活了，一如他身处圣保罗的时日。参议员都将俯首帖耳，只需再打一个电话……\n\n“总统阁下，很高兴再次和您联系。”\n\n再一项承诺……\n\n“水环境局长？您这是在开玩笑？”\n\n再一笔贿赂……\n\n“阿德马尔，拜托，您还可以在支票上再添一个零的吧。”\n\n再一次威胁……\n\n“阁下，您的言外之意容我提出异议。巴勃罗和我仅仅是高尔夫球友而已。”\n\n眼前愈发朦胧，睡意昏沉。阿德马尔唯有时刻提醒自己，改革定会通过，一切尚未尘埃落定，只需……再……"
 brazil_adhemar.77.a: "“总统阁下？总统阁下？您还在吗？”"
 brazil_adhemar.78.t: "凌晨两点"
 brazil_adhemar.78.desc: "拉斐尔·科雷亚只想回家。\n\n例行巡逻，无事发生。这个钟点连鬼影都没有，除了他。夜复一夜，他总觉得自己不适合这份工作——熬夜透支，睡眠不足，可转念想起这份差事的优渥：比当年给菲利普斯石油当保安，或是给安田集团看大门时挣得多。\n\n毕竟，能守卫高原宫的人凤毛麟角。\n\n引他入行的远房亲戚是社进党议员，虽素未谋面，但家族血脉就是通行证。在旁人眼中这是份体面差事，于他而言却与往日无异——同样的玻璃幕墙，同样的办公室，不论是接待员的隔间、外籍工程师的实验室，还是总统的私人办公室……\n\n突然他嗅到异常气息，下意识拔出手枪，撞开大门冲上楼梯，左手电筒光柱劈开黑暗，右手持枪扫过每个角落。\n\n可恶，空无一人。\n\n他发誓看见……有什么东西在那。柜子旁似有人影闪过。但总统早已离去，整栋建筑只剩他独自喘息。心脏仍在狂跳，他强迫自己折返巡查——工作还要继续，总不能变得神经兮兮。"
 brazil_adhemar.78.a: "他没有注意到总统办公室的窗户开了一条缝。"
 brazil_adhemar.79.t: "优势在敌"
 brazil_adhemar.79.desc: "“你没跟我开玩笑吧？”特工管理官用流利的葡萄牙语抱怨道，手指迅速翻动着一叠又一叠照片，全是纳粹商人和外交官与巴西同行亲密互动的画面。短短一年间，巴西已经从OFN的靠谱盟友沦为了……鬼知道在干啥的国家。两人此时身处里约咖啡馆，对面的特工背靠金属椅背，样子沉稳冷静。这对搭档是咖啡馆的老主顾了，店主在柜台后面擦着玻璃杯，周围摆满了各式各样的糕点。\n\n“我骗你作甚？自从洛特搞公路搞出个大烂摊子，巴西就彻底乱了套。所有关于影响阿德马尔的预测全都大错特错。他的意志坚定不移，一点儿都不带动的。”他瞪了上峰一眼，“几个月前我就警告过你和部门里那些人，但你们显然没把我说的话当回事。”管理官无视了这句话，只是叹了口气，把文件夹阖上。\n\n“现在再纠结之前的事已经没意义了。我们需要集中精力扳倒穆勒这家伙。很明显他就是那个给德国佬牵线搭桥的家伙。我要给华盛顿打几个电话，看看能不能再派点人手过来。”说着，管理官丢下一叠克鲁赛罗，付了咖啡钱。“时间差不多了。”\n\n两人将椅子推回原位。“现在每天向我报告。我会尽快联系你，商讨下一步行动。”虽说天气凉爽，但管理官还是擦了擦手掌上的细汗。两人正要各自离开，他突然抓住特工的肩膀，对他轻声耳语："
 brazil_adhemar.79.a: "“巴西决不能陷于纳粹之手，你放手去做吧。”"
 brazil_adhemar.80.t: "前总统的嘱托"
 brazil_adhemar.80.desc: "热图利奥·瓦加斯叼着雪茄，凝视着圣博尔雅的牧场坠入暮色的旷野。夕阳为庭院镀上柔和的橙光，纵是暮年，这份静谧仍能抚慰他的心神。残阳渐没地平线时，他想起现任总统——那个投机分子就像匹脱缰野马，自己穷尽手段都未能驯服。三二年参加圣保罗起义，转头就把战友出卖；任命他为圣保罗州长后，硬是把这里经营成新国家体制与社进党的堡垒。如今自己的儿子坐镇州府，可全国权柄仍被阿德马尔牢牢攥在掌心。\n\n剧烈咳嗽震得胸腔生疼，老总统颤抖着抓取信笺。掐灭雪茄深吸口气，他提笔写下“致共和国总统”。“阿德马尔，”钢笔在纸上沙沙游走，“你向来是个贪婪之徒。但我必须承认，唯你能继承我的改革大业。”又一阵咳喘袭来，“你我政见虽常相左，但以你的才智与务实，必能引领巴西走上正途。我对此满怀信心。”\n\n“这份信心只因掌舵者是你而非全民盟的败类。永远不要向他们屈服。”落款后他将信折入信封，挣扎着从摇椅上起身，肋骨间撕扯的剧痛浇灭了召情妇共度良宵的念头。或许早些安寝更好。\n\n翌日清晨，新国家体制的缔造者在睡梦中安然离世。"
 brazil_adhemar.80.a: "他的右手握着一个信封，里面是写给现任总统的遗言。"
 brazil_adhemar.81.t: "进退两难"
 brazil_adhemar.81.desc: "阿德马尔将下巴抵在手掌上，出神地凝望着车窗外。游行的人群让总统车队只能缓慢蠕动，这倒给了他充足的时间构思葬礼结束后要发表的演说。全共和国的公民都知道，他与瓦加斯素来政见不合。此刻他的拇指正反复摩挲着前任总统留给他的最后信笺——瓦加斯说始终对他抱有十足信心。若果真如此，为何1950年没有提名他作为接班人？又为何非要等到他儿子加入社进党，两人才勉强修复关系？\n\n他长叹一声。往事如烟，再纠结其中已无意义。阿德马尔思量着是否要在致辞中多渲染些对瓦加斯的哀思。毕竟无论两人关系如何冷若冰霜，他的政治生涯终究是拜这位前辈所赐。这不仅能讨好瓦加斯派系，更能赢得民众好感。可要他违心去吹捧那个处处针对自己的人，实在心有不甘。他登上总统之位，究竟是承袭了瓦加斯的衣钵，还是恰恰打破了其桎梏？\n\n阿德马尔将信笺折好，重新塞回信封。他无意识地摩挲着封蜡上“秩序与进步”的徽记，那行铭文仿佛要灼穿总统的灵魂。究竟该说些什么呢？"
 brazil_adhemar.81.a: "赞颂这位巴西国父所遗留的遗产。"
 brazil_adhemar.81.b: "揭开这位受人爱戴的暴君所掩盖的真相。"
 brazil_adhemar.82.t: "巴西的前进之路"
 brazil_adhemar.82.desc: "雷鸣般的掌声在圣博尔雅上空回荡。阿德马尔·德·巴罗斯起身与前一位致辞者握手，将讲稿在灵柩前的讲台上铺开。他调整麦克风，目光扫过环绕瓦加斯遗体的黑压压人群。\n\n“我们必须矢志巩固我们光荣的共和国。”阿德马尔开口道，“在这片土地上，再没有人比瓦加斯为巴西的进步付出更多。他推动经济工业化，缔造强力的中央政府，始终以钢铁意志抵御国内外共产主义与整合主义的威胁。”喉头突然哽住，他顿了顿，“没有人能替代热图利奥·瓦加斯为我们每个人所做的一切。”\n\n“我承诺，必将瓦加斯主义精神带入新时代。虽然先驱者已逝，但事业永不终结。巴西将在新世纪崛起为强国！”阿德马尔的声音愈发高亢，“一个为全体国民谋福祉的强国！”人群中爆发出第一波欢呼。\n\n“巴西的腾飞全赖导师的思想与政策。我们敬爱的导师、挚友热图利奥·瓦加斯已为我们指明道路！”欢呼声浪渐强，阿德马尔感到眼眶发热，“我们绝不偏离这条黄金之路！巴西人民必将团结在瓦加斯先生的指引下奋勇前进！”他振臂高呼时，人群陷入狂热，“阿德马尔！”与“瓦加斯！”的呐喊震耳欲聋。"
 brazil_adhemar.82.a: "总统再也抑制不住泪水，任由热泪在欢欣的面庞上恣意流淌。"
 brazil_adhemar.83.t: "尖锐的批判"
 brazil_adhemar.83.desc: "稀稀落落的掌声中，阿德马尔·德·巴罗斯大步迈向灵柩前的讲台。他朝前一位致辞者草草点头致意，清了清嗓子对着麦克风开口：“今天已经有很多人谈论热图利奥·瓦加斯对国家的贡献。诚然他塑造了今日的巴西。但我们必须铭记，他的功过五五开。”\n\n此言一出，现场气氛骤然凝固。吊唁者们不安地交头接耳，揣测总统话锋所指。“没错，”他继续说道，“我向来不愿对逝者不敬。热图利奥·瓦加斯曾是我的挚友，但他绝非完人。他酷爱滥用权力，大肆逮捕反对者，想想1932年护宪派的遭遇！”\n\n每字每句都像往火药桶里掷火星。有人瞠目结舌，更多人则怒声喝骂。最刺耳的当属坦克雷多·内维斯，他涨红着脸咆哮：“伪君子！没有瓦加斯哪有你的今天，背信弃义的混账！”\n\n若昂·古拉特随即声援：“你任用克鲁埃尔、穆勒之流，反倒指责他独裁？无耻之徒——”\n\n阿德马尔一掌拍在讲台上，整个房间顿时鸦雀无声。“容我把话说完，”他朝二人投去冰冷的视线，“眼下情形恰恰印证了我的观点。即便此刻，瓦加斯的追随者仍试图洗脱他的罪责。我说过，他是我的朋友，我对他的思念天地可鉴。但我们必须直面他的遗产。若处境互换，我相信他也会如此待我。谢谢。”"
 brazil_adhemar.83.a: "此后葬礼始终笼罩在剑拔弩张的阴云中。"
 brazil_adhemar.84.t: "空洞的胜利"
 brazil_adhemar.84.desc: "“……几天前的事。现在全国都在哀悼，这只是时间问题。我们能知道消息，全凭在安保人员中安插的眼线。”拉塞尔达听着埃丝特的汇报，心中却有万千思绪涌现。热图利奥·瓦加斯，那个自共和国诞生之初就与他势如水火的男人死了。当年在参议院剑拔弩张的日子里，他每天穷尽所有恶毒词汇咒骂瓦加斯时，曾无数次幻想过他咽气的场景。\n\n“谢谢，埃丝特。让我独处片刻，我要……消化一下情绪。”她点头退出办公室。拉塞尔达感觉嘴角不受控地上扬，手指本能地摸向办公桌下面的抽屉。那瓶为此刻珍藏多年的香槟终于派上用场。随着软木塞“砰”地弹出，金琥珀色液体在杯中泛起欢快的泡沫。他细细品味着胜利的甘甜。他活过了那个混蛋。多年对抗独裁统治的斗争终见曙光，工党被永远驱逐出权力圣殿——这本该是它应有的归宿。\n\n但就在美酒滑过喉间时，一个念头突然击中了他。工党固然一蹶不振，但社进党仍掌控着总统府。瓦加斯虽死，却有比他更恶劣的存在取而代之。尽管瓦加斯绝非善类，但至少不像阿德马尔那般腐败行骗。除了蛊惑人心的民粹主义，他总归有些坚守的原则。即便面对自己日复一日的攻讦，那些原则始终未被撼动。某种怪异的感觉在拉塞尔达胃里翻涌——突如其来的不适令他作呕。\n\n乌鸦最终没有喝完那瓶香槟。徒劳地翻了几分钟文件后，他召来埃丝特，宣布将香槟分赠全体职员。提前返家的路上，他反复揣摩这种对瓦加斯的新鲜情绪究竟为何物。直到深夜躺在床上，他才恍然大悟。"
 brazil_adhemar.84.a: "那是一种怅然若失的感觉。"
 brazil_adhemar.85.t: "夜班"
 brazil_adhemar.85.desc: "“感谢惠顾，欢迎下次光临！”\n\n安东尼奥的职业性微笑在顾客转身刹那迅速凋零。瞥了眼腕表，他长舒一口气——离换班只剩十五分钟。只要不再冒出个赌鬼，就能逃离这座金碧辉煌的牢笼。他瘫坐在后厨塑料椅上，呆望赌场里永不停歇的老虎机，幻想自己某天也能挥霍筹码而非用夜班薪水喂养五个饥肠辘辘的胃袋。闭店前五分钟，经理歉意的巴掌拍醒他的白日梦。玻璃门外，醉醺醺的游客正用指节敲击“营业中”标牌。安东尼奥将肌肉记忆般的假笑重新挂上脸颊，抓起菜单迎向最后一单厄运。\n\n“磨蹭什么！”瘫坐在卡座里的男人夺过菜单时，威士忌与烟草的腐臭扑面而来。他肿胀的舌头在口腔打结：“水呢？麻利点！老子时间金贵！”“这就为您取冰水。\"安东尼奥躬身退后。“炸鸡翅也来份！啤酒要冰镇！”醉汉突然拍桌，震得筹码叮当乱响，“今天可得让你这懒骨头好好赚笔小费！”\n\n安东尼奥躲在后厨做了个鬼脸。“遵命，马上来！”"
 brazil_adhemar.85.a: "结果一毛钱小费都没有。"
 brazil_adhemar.90.t: "影中利刃"
 brazil_adhemar.90.desc: "德国大使馆的阴影中，罗伯特·基尔克愤怒地来回踱步。他原以为阿德马尔·德·巴罗斯是那种能与德国保持稳定可靠合作的人选。但过去几天的遭遇让他明白：有时候大棒和胡萝卜同样重要。\n\n一切始于几天前日耳曼尼亚的一通电话，上面要他协助巴西德裔争取独立组织权——既然戈梅斯能赋予其他少数族裔这项权利，德裔自然也应享有。这本是合情合理的要求，基尔克甚至备好了诱人的“胡萝卜”：一份父亲已批准的天价药品合同。\n\n然而当他当面阐述这项提议的诸多好处时，阿德马尔竟断然拒绝。确切地说，这个政客始终保持着模棱两可的态度——基尔克清晰记得，对方漫不经心地啜饮咖啡，用“是个好主意”轻描淡写带过，转而提议将德语设为第二语言而非赋予德裔权利。想到雅利安子孙的母语竟沦为“次等语言”，基尔克就咬牙切齿，而对方一口回绝的傲慢更令他怒火中烧。\n\n办公室门被推开时，基尔克转身露出满脸阴云：“怎么这么久？”未等来人回答便继续道：“罢了。有任务交给你跟其他人。”他走向档案柜，抽出一页写满阿德马尔内阁成员姓名的名单。既然胡萝卜不管用，现在该挥动大棒了。"
 brazil_adhemar.90.a: "“去给我挖这些人的黑料，越快越好！”"
 brazil_adhemar.91.t: "克鲁埃尔的麻烦"
 brazil_adhemar.91.desc: "“阿毛里会毁掉我们的政府！”菲林托的怒吼穿透电话杂音，“听听这篇报道——‘工人因债务奴役被困在岗位，靠兑水木薯糊果腹，若遇监工心情不佳，还会遭鞭笞棍打，关进铁笼数日’。阿德马尔，这家伙在杀人！他把员工当国敌对待！”\n\n周六清晨的“喜讯”来得猝不及防。阿德马尔不知这家名不见经传的小报如何挖到猛料，但若主流媒体跟进，必将引发滔天巨浪。他扔下练习日语的东京宣传册，望向帕拉诺阿湖的静谧风光。微风穿堂而过，他凝视玻璃倒影中下颌紧绷、脊梁笔挺的自己。他是阿德马尔·德·巴罗斯，定能化解危机。\n\n“必须引导舆论，镇压媒体。”菲林托打断他的沉思，“最好同时抛出争议性法案转移视线。”霎时，基尔克赋予德裔独立组织权的提案掠过阿德马尔脑海。他本人并不反感这个提议，某些派系也会真心支持，但这注定是颗政治炸弹，自己能否掌控局面？\n\n或者直接弃卒保帅。克鲁埃尔本就是代价高昂的隐患：多少黑金流水般塞进他口袋才勉强维持约束，却仍屡屡让政府陷入泥潭。天知道这个贪得无厌的蠹虫还藏着多少秘密？特别是现在有人正在深挖内阁成员的污点。解雇这么有权势的人可能引发麻烦，但这难道不是正确之举吗？"
 brazil_adhemar.91.a: "“菲林托，我手上有份提案你可能感兴趣。”"
 brazil_adhemar.91.b: "“算了菲林托，把他免掉得了。”"
 brazil_adhemar.92.t: "保下克鲁埃尔"
 brazil_adhemar.92.desc: "只需签个名，巴西的德裔居民可以再次组织起来，这是他们被剥夺二十多年的权利。午后的暖阳照进大厅，抛光地面反射出一缕柔光，洒在记者与政要身上，营造着肃穆庄严的氛围。\n\n没人料到政府会为这项极富争议的法案举行如此隆重的纪念仪式，但基尔克并不反感。他的思绪早已飞离这浮华的仪式，转向自己图谋的各项细节，为药品订单做着准备。\n\n纳粹万字符在左，巴西国旗在右，台上的阿德马尔可放松不下来。他环顾会场，发现埃德娜没出席，大概是在准备谴责这项法案的发言稿吧。此刻，一双锃亮黑皮鞋发出的嘎吱声引起了他的注意，德国大使正同德·马托斯商讨双方的宏伟计划，其他巴西人则在远处注视着他们。\n\n另一旁，克鲁埃尔与穆勒被孤立了。他们没找着能说上话的人，却还得留在会场。两人就像被关在盒子里的猫，一只要动，另一只就得挪窝。无人发言，然沉默远比任何话语响亮。要没别的事，他们不出镜的确是件好事。就在阿德马尔这么觉着的时候，他想起了一些东西。\n\n于是，出现了一幅奇特的景象。总统正一丝不差地摆正摄影师的角度，然后挺直腰板，微笑着摆出姿势。伴随着咔嚓声与闪光，巴西总统在钩十字旁咧嘴微笑的景象，被永远定格在胶片上。借由这张照片煽动，明日各大报纸就将大肆宣扬德裔巴西人在平等上取得的胜利。似乎总统阁下正不遗余力地去引起尽可能多的争议。"
 brazil_adhemar.92.a: "媒体已把诱饵一口吞下。"
 brazil_adhemar.93.t: "踢走克鲁埃尔"
 brazil_adhemar.93.desc: "“受害者会得到应有的赔偿吗？”\n\n阿德马尔坚定地站在演讲台上，这些提问对他来说轻而易举！这次，他只需照章办事，说出实际发生的一切就可。“这是当然。我们的赔偿计划含有立即发放的赔偿金，清偿所有因奴役剥削欠下的债务。还提供医疗服务，治愈他们过往的心理创伤。”阿德马尔的的确确做了这些事！\n\n“鉴于克鲁埃尔滥用职权的行为，你能保证政府内的其他成员没有参与同等程度或更糟的活动吗？”\n\n这些提问越来越难以回答，但阿德马尔只需要用轻松的口吻来掩饰并转移话题。“你就放心好了，朋友，克鲁埃尔的选择仅是个人行为，并不能代表本届政府的价值观。罗马并非一日建成，我们会逐步采取措施，确保政府的举止遵守正义原则，尊重本国人民。”\n\n“您将如何处理因解雇与军队强硬派关系紧密的克鲁埃尔可能带来的政治影响，以及军方内部支持的流失？”\n\n阿德马尔顿了一下，时间长到记者为此大做文章。“朋友，我想强调说，巴西的力量在于民心，在于我国富有活力的民主制度。任何叛徒，就算他手眼通天，也无法抹去她的光辉。”\n\n接着，总统补充说：“我们正打算任命新的战争部长，”意识到自己无意间犯了错，他迅速做了更正。“嗯，如果事情发展到那种地步，政府也绝不会因威胁与恐吓所动摇。”行吧，这么说应该能说服他们。"
 brazil_adhemar.93.a: "这番话可说服不了任何一位巴西人。"
 brazil_adhemar.94.t: "义愤填膺"
 brazil_adhemar.94.desc: "贾米·勒讷走进教堂的那刻，他猛地意识到，现如今德裔居民恢复特权后，这场会议就同巴拉那的各个地区一般弥漫着紧张气氛。恢复特权的消息在当地掀起了轩然大波，迫使往常各行其是的社群领袖共同商讨对策。回想起故乡库里蒂巴滋生的恐慌，贾米眉头紧锁，坐在其他波兰裔旁边。\n\n一名满脸胡须的男子率先站起，在发言前先打量了一圈听众。他带着浓重的乌克兰口音解释说，自己是村里有名的医生，同时也是一位难民之子。他的母亲在德国进攻前逃离了苏维埃联盟，带着唯一的孩子越洋过海。父亲则留在国内，拒绝放弃抵抗直至取得胜利。他直视着听众，总结说：“恢复特权的决定，无疑是对我们社群与一直以来的斗争最直白的羞辱。不论结果如何，我们绝不能忍气吞声。”\n\n礼貌的掌声过后，一位年长的妇人拄着拐杖，颤颤巍巍地站起身来。她自豪的说，自己已是八旬老人，一生都在库里蒂巴的犹太区内教书。眼神迷离，她回忆着难民儿童讲述的故事，那是本不应让任何儿童知晓的惨剧。她慢慢悠悠地回到座位，大喊道：“不论如何，过往的惨剧绝不能重演。”\n\n在贾米起身发言前，又有几位发言者讲述了类似的故事。贾米称自己是库里蒂巴的著名工程师，并开始讲述自己的计划。他认为，唯一可行的对策，便是让各个社群组成统一战线。在波兰裔的领导下，武装起来抵御德裔社群可能发起的攻势。他继续解释说，地方民兵需随时做好准备，应对任何威胁。“没人想动用暴力，”贾米说。“但欧陆战事已证明绥靖主义行不通，在这也一样。唯有武力制胜，方能保一方平安。”"
 brazil_adhemar.94.a: "无人反对。"
 brazil_adhemar.95.t: "准备"
 brazil_adhemar.95.desc: "伴随着铁锈与齿轮的嘶吼，装甲大门缓缓打开。军需官紧张地回头望了一眼，还好，库里蒂巴哨所的早上仍然空无一人。关门，开灯，他进入仓库清点库存。缺失的步枪，乱放的手雷，消失的弹药箱无一不说明了昨晚的不同寻常，但他对此无动于衷。经过后门时，他摸了摸门把手，不动声色地将其锁好。\n\n目光一转，仓库角落一个大黑袋子映入眼帘。军需官满意的点了点头，很高兴波兰人遵守了约定。他抓起袋子朝大门走去。走着走着，他下意识地摸了摸挂在脖子上的小狗牌，上面仍沾有英国的泥土。他略微一笑。父亲对此会怎么看？儿子在戴着他的狗牌时，竟然背叛了自己为之牺牲的国家。军需官摇了摇头，父亲肯定不会介意。\n\n走到仓库前面，他转身从袋子里面取出一支伪造步枪，简直可以以假乱真。从前往后，他逐一将丢失的步枪、手雷和箱子都替换成石膏仿品。完成这一切后，哪怕他天天和武器装备打交道的眼睛也难分真假。他满意地拿起空袋子，悄无声息地离开了哨所。行驶在巴拉那州曲折的道路上时，他心中充满成就感：难得有机会重操祖业。"
 brazil_adhemar.95.a: "砥砺前行。"
 brazil_adhemar.96.t: "引信"
 brazil_adhemar.96.desc: "借着月光，谢尔盖仔细核对着名单上的名字：这个德裔是德国巴拉那兄弟会的主席，当地臭名昭著的法西斯煽动分子。名单上在他之前十几个名字都已经被划掉了，于是便将他凸显得格外醒目。谢尔盖看了看地址，又抬头确定房门上的黄铜门牌，没错，对得上。他满意地点点头，将自己的小队集结在屋后，从背包里掏出了打火机和一支日丹诺夫鸡尾酒。火花四溅，星光下的乡村登时沐浴在橘红色的烈火之中，尖啸的火警警报打破了夜晚的寂静。队长谢尔盖赶忙提醒其他人，把手里剩下的弹药统统都扔进去，而房子里的一家人正狂叫着逃跑。\n\n队伍后面，一个年轻人呆呆地站着，手中的日丹诺夫鸡尾酒瓶摔落在地。谢尔盖注意到了他的异状，便走到近前，询问出了什么事情。“里面有人！”年轻的乌克兰人不由瘫坐在地，高声喊着，“我知道他是个坏人，但他的妻子、他的孩子呢？我们做的事情又比他们强到哪里去？这有什么道理正义可言吗？”\n\n谢尔盖带着理解的神情，蹲下来拍了拍男孩的肩膀。“我们这不是为了找乐子，也不是因为这样做简单。”他温声安慰道，“我们这么做，是因为必须如此。不然，他们很快就会这么对付我们。在欧洲大陆上，德国人已经这么干了好几十年，唯有如此，我们才能逃出魔爪。你我都有家人，但德裔可不会替你我保护他们，只有我们自己才能保护自己。”谢尔盖起身，向年轻的乌克兰人伸出了手。青年抓起自己掉落在地的日丹诺夫鸡尾酒，颤抖着握住了队长的臂膀，表示自己的感谢。谢尔盖又从名单上划掉一个名字，队员们互相点点头，继续执行任务。烧掉房子足以让目标离开巴拉那，移居去北方，这样大家就能摆脱德裔的麻烦了。\n\n第二天清晨，一个男人和其他十几个德裔一起走进弥漫着烟灰余烬的废墟。他们已经草拟了许多不同的计划和构想，但所有人都认为，只有一个办法能应对劣等种族的攻击。"
 brazil_adhemar.96.a: "复仇。"
 brazil_adhemar.97.t: "火花"
 brazil_adhemar.97.desc: "午后时分，一群富有的德裔走进一家高档餐厅的大门。他们向店主点点头，身后的大门便随之紧锁，一名服务员将他们带到了远离喧嚷繁华街道的私人包间。再三确定餐厅里没有别人之后，众人开始坐下用餐。\n\n“州长那边有什么回应了吗？”餐桌右手的一个男人吃着鱼子酱，在间隙问道，“我妻子一直念叨着她从朋友那儿听来的恐怖故事。”\n\n坐在主位上的人摇了摇头。“没有，”他咬着牙回答道，“电话、信件，什么都没有。我所有要求增发持枪许可的申请都被置之不理，他连个借口都懒得找，甚至不给我一个道歉的面子。”\n\n餐桌两旁的人惊讶地低声议论着：巴拉那州州长内伊·布拉加一般都倾向于投资经济的实业家，他应该会站在自己这边，而不是暴民那一边。现如今，每天都有德裔的房屋被烧毁，暴力事件层数不穷，但州长却对此一言不发，只是象征性地派出一些警力，也没有任何迹象能表明他会为遭受此等罪行的人们伸张正义。在一片抱怨声中，左边的一个人提高了嗓门，发问道：“那圣卡塔琳娜和南里奥格兰德呢？就算我们州长不帮我们，那边总会有人愿意的，毕竟总得有人管管吧。”\n\n餐桌主位上的人又以摇头否定作答。“显然，没有。”他重复道，“我没从他们那儿得到任何消息，所有人都成哑巴了。我不知道该怎么办，他们似乎接到了上面的命令，要他们保持沉默，也或许他们终究是站在了敌人一边。至少现在，我们只能靠自己了。”\n\n恰恰就在谈话再次陷入喊叫之前，角落的电话铃声突然响起。一人起身去接电话，他的沮丧随之变成了惊讶，望着众人说道：“是德国大使馆打来的。”"
 brazil_adhemar.97.a: "“等待后续命令。”"
 brazil_adhemar.98.t: "爆炸"
 brazil_adhemar.98.desc: "清晨的爆炸声震颤屋宇，男孩走出门外，兴奋在心中奔涌。他在街上奔跑跳跃，欢呼道：“下雪了！下雪了！”任由灰色絮状物落上鼻尖。父母神色惊恐，将他拽回屋内，透过窗棂，男孩看到父母叫来了邻居，然后向远处奔去。\n\n众人赶到现场，只见图书馆燃起熊熊大火，父亲冲向正将缠满绷带的伤者抬上救护车的急救员。当瞥见图书管理员焦黑的面容时，他想起无数个在书架间策划抗议的不眠夜——动机与元凶已经了然于胸。“伤者生命体征消失！”随着救护车门重重关闭，夫妻伫立在火场前，任由文明在眼前化作余烬。\n\n当夜，德国移民围坐古宅地下室。首座男子举杯：“昨日我们站在屈服与生存的十字路口，敌人焚烧我们的家园，欲将我们逐出巴拉那。政府弃我们不顾，迫使我们我们向州长低头。但今天！我们终于让那些劣等种族血债血偿！”水晶杯折射着吊灯寒光，“我们终将夺回被窃取的家园！从现在起，巴拉那州迎来了新纪元的曙光！”"
 brazil_adhemar.98.a: "南方为之震撼。"
 brazil_adhemar.99.t: "余波"
 brazil_adhemar.99.desc: "“恕我直言，先生，解除对德贸易禁运，恢复德国在巴特权，似乎是导致目前南方骚乱的直接原因。”莱唐·瓦斯科说道。“虽说与之而来的经济效益显而易见，但依我看来，对于维护国家稳定来说，总体弊大于利。”\n\n“你再说一遍。”埃德娜·洛特在桌子的另一边大喊道，“你出卖了南方社区，将他们直接置于国家暴政的威胁之下，你竟还期待得到和平顺从的回应吗？不！理所应当，他们会以最激烈的手段进行斗争，对此你不应见怪！”\n\n阿德马尔坐在会议桌的首位，内阁成员变换着话术，指责他对德合作的政策，这已是第五次了。他抬起头，试图解决这个令他头疼的问题。他看向了克鲁埃尔，此时这位将军正坐在桌子的另一端，沉默地注视着事态发展。想起一切问题的根源，阿德马尔将怨恨的目光投向了他，大声说道:“也许我们的国防部长同事有些话想要补充。”\n\n克鲁埃尔微微点头，“对于我个人来说，总统的措施无可厚非。不过是允许德国人组建几个组织，和这些暴民有什么关系呢？我觉得没什么大不了的。”在他的身旁，菲林托也声援起来，几乎一字不差地表明了自己的立场。埃德娜还没来得及反驳，一位不速之客闯入了会议室。\n\n“很抱歉打扰你们的会谈，但我们已经没有时间了。”这位自称罗乌姆·德·卡莫斯·韦加尔的经济学家急切地说道。“股市一小时后重开，在此之前，我们必须做些什么防止经济进一步恶化。布拉加州州长一直在寻求帮助，我们现在需要立即制定干预措施，时间紧急，长期规划之后再谈。”\n\n埃德娜·洛特摇了摇头，“没这个必要，若我们能直接与罪魁祸首谈判，最迟月底，这事便能结束。我们应该采取灵活变通的手段，不要让所有问题变得深根固蒂。”埃德娜说完后，会议室内的所有人都默默地等待着总统的判决。"
 brazil_adhemar.99.a: "“我们需要干预。”"
 brazil_adhemar.99.b: "“该谈谈了。”"
 brazil_adhemar.100.t: "炸弹小组"
 brazil_adhemar.100.desc: "通过一些恰当的投资与幕后操作，我们获得了在整个南方进行干预的法律授权。政府被赋予了广泛的权力，逮捕和拘留叛乱者，解散暴力团体，并扩大对地方警察的资金支持，这让我们能够立即结束这场危机。总统所需要做的，就是挑选一位合适的干预领导人。\n\n在他的右侧坐着经济学家罗梅乌·德·坎波斯·韦加尔。罗梅乌计划利用自己的专业知识，拆解德国的暴力团体，监禁激进的纳粹煽动者，并为该地区的大规模少数群体提供更大的保护。他的方案据说能为地区带来持久的和平，但却可能激怒南方的德国企业家。\n\n而在他的左侧，亲德派小路易斯·冈萨加·诺韦利则采取了另一种手段。他通过威胁、贿赂和对少数群体的胁迫，承诺将南方打造成一个安宁之地，为德国工业的崛起铺平道路。尽管在德国投资下，巴西的经济或许会变得更加繁荣，但任命他可能会给该地区带来长期的仇恨与不信任。\n\n在一纸之间，总统必须决定数十万人的命运。阿德马尔低头凝视着自己的手，片刻之后，他在纸上写下了一个名字。"
 brazil_adhemar.100.a: "罗梅乌·德·坎波斯·韦加尔。"
 brazil_adhemar.100.b: "小路易斯·贡萨加·诺韦利。"
 brazil_adhemar.101.t: "干涉员韦加尔降下了正义"
 brazil_adhemar.101.desc: "罗梅乌走在库里提巴阳光明媚的主街道上，稍作停留，欣赏自己辛勤劳动的成果。短短时间里，城市里的窗户不再被人砸碎，远处的枪声几乎消失，取而代之的是州内弥漫的谨慎乐观。他微笑着看着一群嬉闹的青少年，他们在他身边飞奔而过，毫无顾忌地用波兰语大声欢笑，丝毫不惧德国人的报复。再往前走一点，罗梅乌走进一家当地咖啡馆，欣喜地看到门上的“最近重新开放”标志。\n\n在等待咖啡稍微凉下来时，罗梅乌透过窗户看到一队联邦特工正在敲打当地警察局的门。过了一会儿，局长显露身影，似乎在与之前的警员争论。罗梅乌看着这位警官，嘴角微微上扬，因为他在内部报告中认识这个人；一个愿意急切出卖自己波兰选民的家伙，只为几枚德国马克。他心中暗自得意，当一个特工举起一张签字的纸时，警官的咆哮顿时被打断，肩膀无力地垂下，恭敬地投降，被带上装甲车，连一句话都没说。\n\n罗梅乌微笑着啜饮咖啡，拿出笔记本开始翻阅。翻过几页后，他划掉了老警官的名字，并在其下方写下了一位忠诚的社进党官员的名字。"
 brazil_adhemar.101.a: "正确的人在正确的位置上。"
 brazil_adhemar.102.t: "干涉员诺韦利带来了务实"
 brazil_adhemar.102.desc: "“先生，您只需要再等一小段时间，局势就尽在我们掌控之中了。”\n\n诺韦利迅速把话筒从他耳边拿开，来躲避另一端德国实业家口音浓重的大肆辱骂。他翻了个白眼，等待那个德国人消停下来。在另一头终于安静下来后，诺韦利再次重复了一遍他的话。\n\n“请您相信我，先生，政府正竭尽所能用对该地区实业家经济有利的方式化解这场危机。只需要几周，这些抗议就会立刻消失，而那里会有超低成本的劳动力为您随时待命。请相信我，您不会想现在就退出的。”\n\n沉默片刻后，德国佬终于勉强答应留下。诺韦利对他的英明决策大加赞赏，然后长舒一口气挂掉了电话。对少数族裔骚乱的镇压，对德国人行为的不断掩盖，和暴躁资本家们一个接一个打来的电话，这么多事情让诺韦利忙得喘不过气来。他靠在椅背上试图享受一会休息时光，但很快就被街上的叫喊声粗鲁打断。\n\n诺韦利探向窗外，看见几个警官正在把一群波兰青年从办公楼旁赶走。他再探头一看，发现那些波兰人在办公楼的前门和墙上留了个简陋的纳粹标志和一些字眼，他不禁感到好笑，耸耸肩回到了座位上。这些小家伙想在过去的阴影里度过余生，但跟他又有什么关系呢？"
 brazil_adhemar.102.a: "大事正在酝酿。"
 brazil_adhemar.103.t: "以笔之道"
 brazil_adhemar.103.desc: "阿德马尔的车驶进了库里蒂巴中央法院前的车站，刹车使他猛然惊醒。法院坐落于一片相对中立的街区里，因而少数群体和德国人均视其为理想的会面场所。谢过司机后，阿德马尔钻出汽车，环顾了一下四周冷清的环境。他盯着人行道和马路上闪闪发光的碎玻璃渣，很快远处传来的枪声让他急忙进入法院寻求一丝安全感。\n\n被领进私人会议室后，总统注意到了躺在他座位上的一个文件夹，开始翻阅起来。里面装着的是他将要会面的两位与会者的卷宗。少数群体的代表是个波兰犹太人，传说他就是组织起新的少数群体民兵的关键人物。德国那边派来的则是一名头发花白，看起来活像刚从东线战场归来的老人，他则是这一带响当当的煽动者。阿德马尔边读报告边皱起了眉头，暗自思忖起怎么可能让这两人握手言和。\n\n不久后，墙角的一台电话响起。阿德马尔拽起听筒，不禁为来电者大皱其眉。“总统先生，下午好，”电流编织出内伊·布拉加州长的声音，“要是打扰到你了的话，那我深感抱歉，但是我相信我能帮上一把。我想，要是有熟悉这一地区的人在场，你的交涉会顺利上不少。幸运的是，我今天下午什么事都没有，而且我也乐于为会议尽绵薄之力。”阿德马尔的眉头更皱一分。尽管布拉加是全民盟的人，但是他的支持对和平解决冲突价值无量。片刻之后，他做出了自己的选择。"
 brazil_adhemar.103.a: "“是的，我需要你的帮助。”"
 brazil_adhemar.103.b: "“我会没事的，谢谢你。”"
 brazil_adhemar.104.t: "合适人选"
 brazil_adhemar.104.desc: "“你们这些劣等人！成天骑在我们头上作威作福，现在闯进我们的地盘还指望得到礼遇？我们早该把你们统统赶出去！”\n\n房间里的温度仿佛骤然下降，阿德马尔看着勒讷震惊地向后退去。那位犹太代表脸上更多的是疲惫而非愤怒。他摇摇头：“这种话我听过太多次了。你们总是这样羞辱我们。我们明明什么都没做，可无论是在波兰还是巴西，你们总是穷追不舍。这样的场景我早已见怪不怪了。”\n\n这种剑拔弩张的对话注定徒劳无功。正当阿德马尔要开口时，内伊·布拉加抢先一步：“二位可曾去过伊瓜苏大瀑布？”他冷不丁发问。两个男人面面相觑，迟疑着点了点头。“那里的景色很美，飞流直下的水帘在阳光下宛如钻石雨。”\n\n上帝啊，他在说什么胡话？但未等阿德马尔发问，布拉加继续道：“早在巴西立国前，那瀑布就存在了。或许千百年后它依然会奔流不息。说到底，我们都曾驻足其下，都在这片土地上繁衍生息。何必自相残杀？”两人仍面露狐疑。布拉加叹道：“我并非要你们相亲相爱，信仰自由无可厚非。但暴力解决不了问题。为何不和谐共处？”\n\n布拉加伸出双手。勒讷和德国人局促地对视一眼，勉强握住了他的手，草草摇晃两下便松开。目睹这令人困惑的和解场面，阿德马尔不禁自惭形秽——作为总统，自己竟不如旁人从容。待他们松手后，他清清嗓子道：“政府已格外宽大处理。望诸位引以为戒，莫再重蹈覆辙。”"
 brazil_adhemar.104.a: "内伊·布拉加将结束这场危机。"
 brazil_adhemar.105.t: "失聪之耳"
 brazil_adhemar.105.desc: "阿德马尔太阳穴突跳，强忍着头疼看德裔代表与犹太代表唇枪舌剑。这场谈判已持续数小时，他懊悔没带幕僚——虽自诩外交天才，但凡人忍耐终有限度。\n\n当“劣等人”这个禁忌词迸出时，他拍案而起：“先生们！”指节叩击桌面，“恕我直言，你们争夺的无非是财政拨款。政府愿向双方社区注资，但必须停止暴力冲突！”\n\n犹太代表勒讷瞳孔震颤：“总统先生，这是生存权问题，不是金钱交易。您对我道德底线的揣测令人不齿。”\n\n最荒诞的一幕随即上演——那个德国佬竟向宿敌点头附和。阿德马尔怒极反笑，摔门而出点燃香烟。既然文明语言无效，他自有让德犹双方都听得懂的手段："
 brazil_adhemar.105.a: "武力。"
 brazil_adhemar.106.t: "一声巨响"
 brazil_adhemar.106.desc: "梅迪西缓缓吸了一口雪茄，低头审视面前的巴拉那州地图，对自己的宏伟战略终于感到满意。他用了将近一个小时的时间，将那些代表着军队分布、补给、武器和各种技术装备的小棋子和标记反复挪移推敲。这一切相互结合，预示着长期困扰当地的种族紧张局势即将宣告结束。\n\n他瞥了一眼阿德马尔，发现他脸色阴沉。显然他对这事有点脾气。“唔，应该就是这样了，总统先生，”他说着，向对方点了点头。“您只需提供我所需的资源，我就能彻底镇压这场叛乱。”\n\n阿德马尔不喜欢给军方让步，一寸也不行。但至少梅迪西已经证明了自己的忠诚，不会越俎代庖。既然涉事群体固执己见不肯谈判，要想一劳永逸解决动乱恐怕只有这种方式。他点了点头。“就这么办吧，梅迪西将军。越快搞定越好。”\n\n梅迪西笑了笑，两人握手。几天后，抗议活动便化为乌有，留下冒烟的灰烬和破碎的抗议标语。无论是犹太人、德国人、波兰人还是乌克兰人，都会圆润地从士兵面前滚蛋。国际社会中的一些人将谴责这是无意义的压迫，而其他人则为经济成本感到惋惜。但当阿德马尔·德·巴罗斯那晚返回高原宫时，他终于能够安心入睡，因为他知道……"
 brazil_adhemar.106.a: "稳定终得恢复。"
 brazil_adhemar.107.t: "克鲁埃尔的反叛"
 brazil_adhemar.107.desc: "阿德马尔用毕生医术压制着血压，目光死死咬住手中颤抖的简报——前战争部长阿毛里·克鲁埃尔竟然携强硬派亲信集体失踪。这怎么可能？他明明在罢免克鲁埃尔时已将其羽翼剪除殆尽。1932年养成的政治嗅觉在尖叫：兵变将至。\n\n不多时，总统府落地窗外已现装甲洪流。遵照梅迪西将军指令，首都核心区被钢铁防线层层包裹。但若这还不够呢？若克鲁埃尔策反的兵力远超预估呢？若梅迪西这位强硬派同僚也倒戈呢？无数假设如铁锤砸击太阳穴。\n\n夜幕降临时分，仍无克鲁埃尔踪迹。阿德马尔抓起最近的话筒：“纳特尔，你那边安全吗？听着，必须全面封锁克鲁埃尔叛逃的消息，在危机解除前绝不能让外界嗅到风声。”\n\n“怎么封？”对方声音发涩，“勒令媒体闭嘴只会激发他们的猎犬本能。”\n\n阿德马尔因这突如其来的理智怔住半秒：“把社进党内部能挖的丑闻猛料全抛出去！《环球报》、《圣保罗报》，用垃圾信息淹没所有媒体版面，让‘克鲁埃尔’这个词上不了头条！”"
 brazil_adhemar.107.a: "“明，明白了，总统先生。”"
 brazil_adhemar.108.t: "教父"
 brazil_adhemar.108.desc: "太阳已经下山了，古拉特依然没有放下电话。自从他知道了克鲁埃尔的事，他这几天就一直在拼了命地想尽一切办法给他打电话。大家都说这没用，但古拉特了解克鲁埃尔，他知道，那家伙是不会拒绝朋友的请求的。\n\n古拉特一听到电话接通，就猛地抬起了头，“阿毛里？是你吗？哦我的老天啊，感谢上帝他老人家！”这几天以来，他的眼睛终于亮了起来。“听着，赶紧把你那破事停了！这只会伤害国家和所有相关的人，你一点好处也捞不着！”\n\n没有回应。但古拉特没有放弃。\n\n“我知道你有你的理由，也知道我拦不下你。但如果你真的决定要这么做了，那就至少尊重一下民主制度和继任顺位吧！埃德娜和阿德马尔不一样，我向你保证！我不是在为了我们的友谊来求你，也不是为了我的儿子，也是你的教子来求你，我是为了巴西求你！听我的吧，要不然我们这些年来为国家做的一切就全泡汤了！”\n\n依旧没有回应。古拉特已经要把头沉进桌子里了。他紧闭双眼，近乎是放弃了一切。\n\n“若昂，”熟悉的声音从颤抖着的电话中传来，“我是个爱国者，我不能违背我的誓言。”古拉特睁开了眼。“但我也是你的朋友。我会尊重你的意愿的。”古拉特的眼睛慢慢恢复了神采，脸上微微露出了微笑。\n\n“谢谢你，我的朋友。”"
 brazil_adhemar.108.a: "电话又一次归于沉寂，只余古拉特独处于这漆黑的小房间。"
 brazil_adhemar.109.t: "造王者"
 brazil_adhemar.109.desc: "“你那破无线电到底修好了没？”海军陆战队员不耐烦地问道。他已在牌桌上鏖战终日，而骑兵仍在捣鼓军事基地里唯一能用的通讯设备。\n\n“嫌容易你来试试？”骑兵回呛道，“他娘的！在这天涯海角找波段，比从灌木丛里揪阿根廷间谍还难。不过信号中断前，我听到各部队突然进入无线电静默，首都周边部队进入一级戒备——巴西利亚怕是要出大事。”他顿了顿推测道：“政变？要真是这样，那个圣保罗肥佬的好日子可到头了。”\n\n“我信。”步兵插话道，“早该让军队整顿乱局了。不过成不了事，如今的陆军不比当年，何况那人巧舌如簧，总有法子脱身。”\n\n“横竖不同情他，跟死德国佬眉来眼去活该如此。”海军陆战队员压下窃喜，将筹码推向牌桌，另一手攥着顺子。“可惜南里奥格兰德离首都太远，有热闹看总比整天屁股粘椅子强。”\n\n“但你我改变不了什么。向来是长官们决定戏码结局，除非……”步兵亮出葫芦牌组，惊得海军目瞪口呆，“那家伙留有后手，咱们还能‘友好协商’。可他非要硬碰硬，跟你刚才那样玩命下注的话……”"
 brazil_adhemar.109.a: "那就别怪没人警告他。"
 brazil_adhemar.110.t: "第67次瓜纳巴拉起义"
 brazil_adhemar.110.desc: "瓜纳巴拉熙攘的街道已有数个世纪的历史了。每天都有数不清的人走过这条柏油路，一列列士兵身着挺括军装，向自己的主人发起挑战。少数人的故事会被教师广为流传，而大多数人只会被彻底遗忘，只有寂静的街道记得他们的悲惨。阿德马尔希望这些人会是后者，但他的确低估了叛军的实力。他叹了口气，“你确定吗，纳特尔？还是说这只是个会让我无端紧张的假消息？”\n\n一段时间后，纳特尔回答，“恐怕不是，总统先生。我刚刚收到了报告，城里的许多军官要么加入了起义，要么不战而降。士兵们正在街边游荡，城里现在和戒严状态没什么区别了。”阿德马尔捂着脸，先是克鲁埃尔的无赖行径，再接着是这件事。明天就会有坦克车开上巴西利亚的街头了。纳特尔能感到上司的紧张，“但是，呃，街上还没有开始设路障。情况可能会变得更糟糕。”\n\n“不是今天就是明天。早晚的事。这种乱子只会闹得没完没了。”阿德马尔说。“我们的人呢？奥林皮奥在哪里？我可不记得我让他去加勒比海度假了。”\n\n纳特尔咽了咽口水，“他现在没空。他去米纳斯吉拉斯视察部队去了。”\n\n阿德马尔吐了口唾沫，“啊？玩这一套？真是个完美的借口。看来这家伙是打算两不相帮了。”他向后靠在椅子上，长出一口气，然后才恢复平静。"
 brazil_adhemar.110.a: "“打电话联络那些信得过的高层军官，我现在就要见他们！”"
 brazil_adhemar.111.t: "一帆风顺"
 brazil_adhemar.111.desc: "尽管叛军表明会战斗到最后一刻，但当他们的小动作失败后，叛军很快就投降了。列兵维埃拉端着枪，盯着最后一批从最后一个叛军据点中走出的叛军。熟悉的面孔高举双手走出，被迅速搜身，然后被带到了一辆卡车前。维埃拉并不为他们感到难过，但感到了困惑：为什么？骚乱就这么结束了？他还是不知道为好——免得这家伙想去加入他们。\n\n但一方的失败就代表着一方的胜利：兴高采烈的阿德马尔就是后者。“瓜纳巴拉叛乱有消息了吗？解决了吗？”\n\n“正是如此啊，总统先生！”纳特尔相当自信。“克鲁埃尔那家伙果然劝不动大多数军官，奥林皮奥的人手脚很麻利啊。”阿德马尔已经记不得上一次如此轻松是什么时候了，仿佛全巴西的重担都从他的肩上卸下来一样。“还有一件好事。我们成功阻止了媒体的漏风。连瓜纳巴拉当地的报纸都保持了沉默。又少了一件需要担心的事。”\n\n阿德马尔笑得更灿烂了，嘴角已经咧到了耳根。“不愧是你啊，一如既往的优秀。也别忘了奖励一下奥林皮奥的功劳，还是多亏了他啊。”\n\n放下电话，阿德马尔靠在椅子，露出了心满意足的微笑。要不了多久，那个王八蛋就会夹着尾巴来求饶了。在那之前，克鲁埃尔和他的亲信们都还相当麻烦，但他至少已经可以安心睡觉了。他知道，此后便是一帆风顺。"
 brazil_adhemar.111.a: "暴雨来的快，去的也快。"
 brazil_adhemar.112.t: "克鲁埃尔的大难"
 brazil_adhemar.112.desc: "克鲁埃尔失算了。广播中，阿德马尔宣布大赦所有参与叛乱的人员，当然，除了叛徒阿毛里·克鲁埃尔将军。那日的整个上午，克鲁埃尔将军都在不停地拨打电话。\n\n他那始建于“美好年代”的豪宅散发出的芳香使他窒息。没有微风，无法喘息。正午即将来临，但他仍选择紧闭着那华丽的窗帘，仿佛外面有无数双看不见的眼睛正凝视着他。他在房间里踱步时，汗水从额头上止不住地滴落，弄得他那涂满玫丽盼头油的发型一团糟。若是还有些朋友，也许能寻觅到一处地点躲藏，可惜，根本没人接他的电话。\n\n嗯，也许还有一个人会接。\n\n他拨出了一个特别的号码。尽管大势已去，克鲁埃尔也有谈判的筹码，去解释清楚一些事情。表明自己再无威胁，甚至，还有可能逃脱软禁，对吧？阁下向来很好说话，他一定会听的。\n\n“投降，不然我们就枪毙你。”这是阿德马尔挂断电话前说出的最后一句话。\n\n正午时分，联邦警察一声不吭地按响了门铃。克鲁埃尔走出房门迎接他们时，余光看见了他的花卉在烈日下枯萎。过去几周，他从未维护过花园，叛乱耗光了他所有的钱财，去贿赂，去拉拢。总统勒令关闭了他的庄园，剥夺了他的军衔，冻结了银行内的所有资产，但这一切都无济于事。\n\n警察们搜查房间，把守每一个可能的出口。在门口，克鲁埃尔端详着搜查令，它就像一张货物清单，一张带有法律术语与礼貌权威用语的简明备忘录。但在他的眼中，所有的一切只告诉了他一件事。"
 brazil_adhemar.112.a: "他在历史上的足迹已然终止。"
 brazil_adhemar.113.t: "克鲁埃尔的要求"
 brazil_adhemar.113.desc: "“你从什么时候开始关心德国与巴西的平等关系？”\n\n“我一直在为他们发声！我们把他们当作二等公民！”克鲁埃尔微笑中透出几分空洞。科帕卡巴纳酒店会议室内弥漫着一丝微妙的紧张气氛，几周的无谓争吵让双方疲惫不堪，就连克鲁埃尔的“朋友们”也选择在沙滩上悠闲度日。若事情真的出岔子，他们依然会发动政变，但恐吓的时机已经过去，此时局势僵持不下。\n\n“你哥哥什么时候对政治感兴趣了？”\n\n“我可以向你保证，他的军事经验无可指摘，完全适合担任国防部长。”这番话比他之前的要求更显愚蠢，但至少是他的底线。\n\n“那钱呢？”\n\n“是的，钱。”\n\n终于有了可利用的筹码。“好吧，怎么样？我给你钱，梅迪西担任国防部长，你知道的，他办起事来非常高效——为了让交易更甜蜜，你还可以享受愉快的软禁。”阿德马尔忍不住开玩笑，尽管民主危机仍未解决。克鲁埃尔不过是个人，弄清一个人想要什么，便能掌握控制权。\n\n“如果你不喜欢这个，还有一张写着你名字的单程票去伊利亚·格兰德。”\n\n尽管总统的威胁直白无遗，克鲁埃尔却悠然靠在那张优雅的装饰艺术椅子上，若有所思地抚摸着下巴，仿佛在考虑度假的去处。"
 brazil_adhemar.113.a: "“可以选一个我喜欢的地方住吗？”"
 brazil_adhemar.114.t: "克鲁埃尔的屈服"
 brazil_adhemar.114.desc: "在阿毛里·克鲁埃尔那座年久失修的美好年代庄园里，半明半暗的寂静中，潮湿而令人窒息的热风从棕榈树浓荫下钻出，拂过雕花阳台，穿过陈列着生锈军用品的长廊，将克鲁埃尔裹进一场燥热的白日梦。他躺在那张镀金软垫的王座上，意识逐渐模糊。\n\n幻象在他眼前流转。他穿上那件再也塞不进去的墨绿色将军制服，凝视着巴伊亚万里无云的天空——那苍穹像一块无限延伸的绿丝绒地毯，覆盖着广袤种植园。工人们正在远处劳作，面目模糊如蝼蚁。\n\n引擎的轰鸣突然撕裂幻境。要不了多久，他就能驾驶新买的梅赛德斯W111飞驰在BR-116公路上，享受活塞震颤的快感。虽然此刻这辆豪车只能锁在庄园里积灰，被世人遗忘。忧郁的遐想中，他的目光飘向窗外。\n\n他的视线越出宅邸，仿佛看见梅迪西踌躇满志地走向战争部长办公室的紫檀木门，历史的权柄即将在他手中成型。\n\n推门而入时，松下空调的嗡鸣为这个几何线条冷硬的狭小空间注入一丝凉意。中央摆放的蓝花楹办公桌光可鉴人，前任主人的所有痕迹都已被抹去。\n\n明天愿意等待，但梅迪西不会。他打开公文包，先取出唯一的私人物品：一座无面足球运动员的青铜小像。接着是厚厚一摞档案，记录着所有威胁政府的强硬派档案。克鲁埃尔尚可放任其醉生梦死，但余下人必妥善须处理。既然现在由梅迪西掌权，他有的是办法让这些刺头俯首听命。"
 brazil_adhemar.114.a: "收拾残局绝非易事。"
 brazil_adhemar.115.t: "克鲁埃尔的最后通牒"
 brazil_adhemar.115.desc: "“我要复职，阁下！”克鲁埃尔只身一人，大摇大摆走进高原宫，无人阻拦，他的声音在大理石厅回荡，于是他把头探进总统办公室。“而且那些想赶我走的人也得自食其果。”\n\n阿德马尔沉住气，望向窗外，一队装甲车在热浪中待命，嘲弄着他，要他一如既往言之成理。“是啊，清洗半个政府，鼓动成百上千个你这样的反贼造反。”阿德马尔露出了他标志性的笑容，汗水顺着他的脖子滴下来。尽管事关重大，谨小慎微只会恶化事态。“这样我俩都保不住饭碗。”\n\n克鲁埃尔笑着坐下来。“哈，您说的可太有道理了！那接下来我们怎么办？那群混蛋言之无物，他们只想把球传给您，看总统能给他们变出什么神奇大礼。”\n\n“我也这么觉得。”阿德马尔逐渐兴奋起来，试图捕捉克鲁埃尔脸上的每一丝表情，对周围的一切视若无睹。\n\n“梅迪西正是对付他们的不二人选。国家和军队都敬重他。”当然，克鲁埃尔也是。\n\n“我会在军中提拔你的朋友的。”这就是你想要的，不是吗？影响力？权力？克鲁埃尔都能得到，这次不会颠覆国家。\n\n“我还会在乌拉圭给你套漂亮房子。”这是条能保住尊严，避免最坏结果的出路。阿德马尔看着克鲁埃尔，对方还在考虑还价。这出价够吗？反正德国人会喜欢这最后一点的。"
 brazil_adhemar.115.a: "“还有钱。很多钱。”"
 brazil_adhemar.116.t: "懦夫总统阿德马尔"
 brazil_adhemar.116.desc: "阿德马尔卷起袖子，手指间传来像针扎般的刺痛，他忙着撰写一堆发给报纸的消息，内容几乎如出一辙。“政变”不过是内部的分歧，他们友好地解决了问题。克鲁埃尔在骄傲服役数十年后安然退休。对于那些仍不信服的人，他准备了一份小礼物。\n\n这项工作并不吸引人。在经历了几个小时的重复劳动后，也许是时候做些他更熟悉的事情：为贿赂资金撰写授权信。梅迪西的信应当是第一封；他喜欢尽早开始任务。阿德马尔在一个文件上标注“国家安全”，拨出一笔慷慨的资金，显然这已经足够，因为克鲁埃尔的问题已得到解决。\n\n两千公里外，劳多正忙着处理克鲁埃尔的事务。他看到翻译努力将房地产经纪人关于房子的“现代与永恒完美平衡”的描述翻译出来，而克鲁埃尔和他的妻子则在欣赏蓬塔·德尔·埃斯特对南大西洋精心宣传的美景。至少，他们面朝的方向与巴西相反，但谁知道这种局面能维持多久。\n\n梅迪西忍不住发出一声痛苦的叹息，他望着巴西利亚部长大道新办公室的天花板，上面点缀着精美石膏装饰，他刚刚经历了一场充满车轱辘话的演讲马拉松。“政变”不过是内部的分歧，他们友好地解决了问题。克鲁埃尔安然退休。对于那些仍不信服的人，他准备了一份小礼物。\n\n梅迪西拿起桌上的球员铜像自我安慰，仔细思考他为可能接近克鲁埃尔的军官们精心排列的名单，按影响力和优先级排序。现在，他必须审查这些军官，决定是要给他们一笔巨款还是长期的好处，他们是更喜欢现金、荣誉还是退休后的待遇。他对阿德马尔给他的预算嗤之以鼻，认为这点钱根本不足以应对眼下的艰巨任务。"
 brazil_adhemar.116.a: "但如果有谁能做到，那一定是梅迪西。"
 brazil_adhemar.117.t: "埃德娜的包裹"
 brazil_adhemar.117.desc: "通过埃德娜·洛特身后的大窗户，副总统的花园渐渐融入夜色，仅被几盏灯笼微微照亮。然而，工作负担令她无法入眠；当她听到敲门声时，心里想着自己还得多熬几个小时。“请进！”她说道。门一开，助理端着一个小包裹走了进来。“哦，这是什么？”\n\n“一个包裹。抱歉，我们不知道是谁留给我们的，它就这么出现在门口。”助理把包裹放在她的桌子上，鞠了个躬便离开。埃德娜的手微微颤抖，这个包裹似乎很重要，一旦打开便无法回头。\n\n她发现包裹中蕴藏着改变巴西历史的力量：黑白照片记录了巴西官员与纳粹的会面，阿德马尔与德国之间非法交易的财务账本，还有与阿布斯和柯克会谈的电报与记录。这些文件下方整齐叠放着大量录音带。究竟是谁能做到这一切？巴西又有谁可以拿到这些？\n\n这可不行，至少现在绝对不行。距离选举如此之近，她并不愚蠢。如果人们认为工党暗中与美国勾结，随之而来的不安定、抗议，以及党内成员的背叛与嘲讽，令她不寒而栗——\n\n窗外传来树叶的沙沙声。\n\n是风在吹吗？今晚可能会下雨。无论如何，她必须思考。如果这一切都是真的，那局势将会改变。她把物品重新打包，打开地板上的一个隐秘保险箱，将包裹放在年轻时的信件旁边。也许她该请朋友们帮忙分析这份材料。如果这真是确凿的证据，她得等到即将到来的选举结束，才能采取行动。"
 brazil_adhemar.117.a: "父亲从不急于打仗，对吧？"
 brazil_adhemar.118.t: "劳多的包裹"
 brazil_adhemar.118.desc: "“就不能再快些吗！我有急事要找总统！”劳多·纳特尔大声咆哮，紧盯手腕上的荣汉斯表。膝头摊开的公文包上，模糊照片与密电解码文件乱作一团。防弹轿车在巴西利亚大道上演蛇形超车，奏响喇叭声与急刹车的交响曲，惊得行人四散，气得司机咒骂，连交警都目瞪口呆。\n\n“先生，油门已经踩进油箱了！”司机抹着花白鬓角的冷汗，数个月前还庆幸被分派给这位政要，此刻却在通往高原宫的路上不断体验濒死瞬间。为超越一辆抛锚卡车，他径直冲入对向车道。好在总统府已近在眼前。\n\n“警察那边我兜得住，但若误了面见总统的时机，你我和所有能帮到你的人全得完蛋。”劳多翻动文件，里面浮现的面孔让他脊背发凉：部长、将军、总统幕僚，而串联所有线索的那根暗线，此刻都指向同一个人。\n\n“到了！”\n\n司机瘫在方向盘上喘气时，劳多已开启亡命冲刺。夺门而出的身影冲过修剪整齐的灌木丛，掠过大堂里接待员的喊叫，三步并作两步蹿上大理石楼梯，撞开雕花大门的瞬间，阿德马尔总统惊得从文件堆中抬起头，迎接他的将是劳多职业生涯中最惊心动魄的汇报。"
 brazil_adhemar.118.a: "“埃德娜·洛特要搞政变！”"
 brazil_adhemar.119.t: "阿德马尔的选择"
 brazil_adhemar.119.desc: "“你干什么！？”阿德马尔厉声喝道，却见劳多将一盆香波苗倒扣在光可鉴人的紫檀木地板上，用手直接插进泥土撕扯根系，直到挖出……\n\n“您看。”他举起微型盘式录音机递给总统。阿德马尔就着柔和的顶灯反复端详这个精巧装置，金属外壳在掌心泛着冷光。“阁下请拿稳。”\n\n未等总统反应过来，劳多已将墙上华盛顿·路易斯总统的巨幅画像摘下。阿德马尔不得不放下录音机接住画框，却在边框后瞥见墙体上蛛网般的窃听器阵列。\n\n阿德马尔将肖像倚在拉拢的窗帘旁，劳多则走向会客桌抖开文件袋：“光是初步搜查就找出两个窃听器，这里怕是早就成了间谍巢穴。”他抽出最关键的证据：埃德娜副总统与神秘人物的会面照。\n\n阿德马尔跌坐在总统椅上，指尖掠过盖着FBI印章的档案，辨认着字里行间熟悉的名字。这本该是除掉政敌的如山铁证，可过于完美的证据链反而透着诡异。\n\n“必须让她走人。”劳多抹去额角汗珠。但总统眼底闪动的却是另一种光芒——这些材料是真是假还重要吗？自从那个疯女人踏进高原宫，他们等待的不正是这个契机？"
 brazil_adhemar.119.a: "或许他需要的正是“完美证据链”？"
 brazil_adhemar.120.t: "联合九头蛇"
 brazil_adhemar.120.desc: "劳多冲进总统办公室不过数小时，社进党掌控的报社总编们已接到电话。暮色将临，正是发动舆论反击的黄金时段。“给我整个大新闻。”他对着听筒低吼。\n\n总统幕僚长办公室外，记者排起长龙。年度重磅新闻的冲击下，此起彼伏的惊叹声在充满现代主义风格的走廊里回荡。\n\n透过落地窗，阿德马尔看着手持独家材料的记者们鱼贯而出。他旋即拨通菲林托·穆勒的电话，开始实施计划中最关键的一环——社进党绝不能单打独斗，必须揪出潜伏在内部的毒蛇，这关系到整个国家的安危。\n\n他对着电话那端列出一串可能对此感兴趣的社民党和全民盟成员名单，在每个人名旁标注着收买他们所需的金额，以及各自偏好的行贿方式。当然，并非所有人都需要金钱开道。阿德马尔深知，面对“外国势力渗透”的指控，但凡有点头脑的人，都会争先恐后地以“捍卫国家主权”之名站队。\n\n菲林托沉默三秒，随即投入编织巴西政坛的九头蛇网络。执政党或许会因“纵容渗透”在民调中受挫，也可能因“清除美国爪牙”而赢得喝彩——这取决于他们如何操弄报纸的头条。\n\n但无论如何，此举必将重创主要反对党，拔除这根扎在肋间多年的毒刺。如此天赐良机，堪称政坛罕见。"
 brazil_adhemar.120.a: "埃德娜无力回天。"
 brazil_edna_impeachment_activated: "我们现在可以出其不意地迅速弹劾洛特副总统，但行动没有把握，可能会以灾难收尾。我们应当谨慎行事。"
 brazil_edna_impeachment_begin: "我们将启动对洛特副总统的弹劾程序。"
 BRA_adhemaredna_remove_edna: "弹劾洛特副总统"
 BRA_adhemaredna_remove_edna_timer: "弹劾剩余时间"
 brazil_edna_impeachment_timer: "若我们现在不抓住机会，就将无缘清除政府中的毒蛇。"
 brazil_adhemar.121.t: "公牛之慈"
 brazil_adhemar.121.desc: "阿德马尔如往常一样准备着又黑又苦的咖啡。从窗外看去，他注意到一个拎着公文包的男人缓缓走向总统府。是纳特尔，阿德马尔清楚知晓这位部长将要说什么。他如何不知？他是否会弹劾埃德娜？全巴西利亚都在等待。\n\n“进来，劳多，让我们把这事结了。”\n\n纳特尔打开总统办公室的大门，找了把椅子坐下。“阿德马尔，你觉得我们应该行动吗？”公牛合上了办公室的窗户，他不希望任何人在他向公众宣布前知晓此事。“如果我们衡量一下手中所有的证据……”纳特尔将公文包打开，拿出一叠埃德娜和美国政变计划相关的资料。咖啡的香味充斥了整个房间，气氛推向了高潮。他的一言一行将影响巴西的进程。\n\n“我觉得不行。”纳特尔满脸震惊，无论如何，将副总统换成自己人不是更好吗？“我知道你在想什么，但不是现在。如今正值参议院选举季，此举将会造成灾难性的后果。工党会集体反对我们。”阿德马尔看了看他就职典礼上的一张照片，他和埃德娜都在场。\n\n“埃德娜，她很棘手，但她也很有用。我觉得应该把她留下来。”他现在明白了，纳特尔恢复了镇定。阿德马尔以国家利益为重，把她留下来或许是个更好的选择。“以防万一，还是把这些证据留下来。”"
 brazil_adhemar.121.a: "明智之选。"
 brazil_adhemar.122.t: "埃德娜遭弹劾"
 brazil_adhemar.122.desc: "驶往里约的途中，埃德娜希望明日见报的照片能定格自己昂首不屈的姿态。或许史书将记载：巴西首位民选女副总统遭违宪弹劾，标志着无差别镇压进步力量的政变开端。\n\n但她终究成了回望索多玛的罗得。后视镜中，巴西利亚的灯火渐次熄灭，映出政治生涯最不堪的自己。评论家将哀叹她葬送左翼前程，少女们会记住这个失败符号。她不过想如男性政客般强硬博弈——当真没有翻盘筹码了吗？\n\n蓦然失笑。车窗倒影中的惶惑如此陌生。当初在参议院为尊严而战，此刻的逃亡何来尊严？政治游戏终归不值得扭曲至此。证据虽已妥善保存，但属于她的战斗已终结。扬戈、莱昂内尔和坦克雷多将接手这个烂摊子。\n\n何等惨烈的残局。国会大厦台阶下，社进党支持者正为总统车队欢呼。突然，轿车天窗洞开，幕僚长劳多·纳特尔在闪光灯中矫健跃出，如孩童般高举双臂欢呼胜利。\n\n这个永远改变社进党与第四共和国历史的瞬间，将取代埃德娜强撑的体面姿态载入史册。而车窗内阿德马尔志得意满的笑靥，则为这幅历史定格添上绝妙注脚。"
 brazil_adhemar.122.a: "“埃德娜玩完了！”"
 brazil_adhemar.123.t: "埃德娜幸存"
 brazil_adhemar.123.desc: "“狗屎！”收音机传来的广播让阿德马尔几近心肺停止。过去几周仍在他脑中历历在目，成群的参议员对被外国人压迫说不，人们看到那些顶真的照片时脸上露出怀疑的表情。难不成有贿赂？还是他失算了？他当初何必如此小气呢？\n\n等下，万一这是美国人自己干的呢？没人行贿行得过美国。阿德马尔冷静下来；他正在房间正中央浑身发抖，窗帘敞开着，画像里，华盛顿·路易斯那副严肃的眼神依旧。他不是亲眼见过那些证据吗？埃德娜是不是正在和那帮人会面？他们是不是正旁观他搁这像疯子一样来回踱步，边看边幸灾乐祸？那是他们在敲门吗？！“啊！”\n\n“先生，我也这么觉得。我们得做点什么。”哦，原来是劳多。他推开了门，头发同样乱作一团。“我们下一步怎么办？”有那么几秒，劳多那无畏到几近鲁莽的神态，还有他那副眼神，让阿德马尔仿佛置身于29年前。骑兵冲锋，炮火齐鸣，炮轰当权派的感觉如潮水般袭来。何必在那自我内耗呢？这不正是让圣保罗重振巴西的大好时机吗？\n\n“我们得等到10月。”阿德马尔走向他的办公桌。他们耽误不起，时间就是金钱，而他们的敌人已经遥遥领先了。“到时候，我们要总动员起来，大打特打选战。经此一役，工党和我们算是分道扬镳了。他们届时会跟我们争每张选票，而我们也不能示弱。让所有党员都开始备战。开始分配资金，有多少用多少。”他坐进行政椅里；要做的事相当多。“但首先，给菲林托打个电话。”"
 brazil_adhemar.123.a: "“告诉他，我们要开打了。”"
 brazil_adhemar.124.t: "女角斗士"
 brazil_adhemar.124.desc: "埃德娜·洛特踏入会场，脱下羊皮手套，朝着参议长示意的方向前行，前去那证明勇气的位置。参议员们努力维持镇定，然而他们心中明白，今夜注定不凡，一场前所未有的好戏即将拉开序幕。楼座上的摄像机默默记录着一切，保安控制着喧嚣的人潮。她登上讲坛，俯瞰下方人海，字字句句、掷地有声：“今日各位听闻有关我的一切，皆非事实。”\n\n这一刻，礼貌和规矩全都化为乌有，激起一片喧嚣。笑声、口哨声、嘘声、尖叫声响成一片。三大阵营——社进党、社民党与全民盟——渴望战争。埃德娜接受挑战。\n\n“我不愿浪费大家的时间。”埃德娜昂首挺胸，仿佛继承了军人父亲的那份尊严，“我是清白的，我一直在为国效力。这份建立在谎言之上的议案，没有资格通过参议院。”一抹难以察觉的微笑掠过她的嘴角，“要是它通过了，我愿意辞去职务，不再麻烦众议院提出罢免。”\n\n此言一出，人群彻底沸腾。台上女子的胆识与傲气令人震惊，一位娴静文雅的女性竟敢同整个政界叫板。无论是身处现场、喧闹连连的国会议员，还是在总统府里露出微笑的阿德马尔与惊愕不已的劳多，或者是那些守在收音机或电视机前的普通民众，都被这场即将到来的较量所吸引，血脉偾张。\n\n但有一个人例外。千里之外，伴着环球电视台主播对这一历史时刻的激情评点，卡洛斯·拉塞尔达坐在他那中世纪风格的公寓里，注视着RCA Victor屏幕上的影像。他不喜欢这样。"
 brazil_adhemar.124.a: "一点也不。"
 brazil_adhemar.125.t: "乌鸦转向"
 brazil_adhemar.125.desc: "“上帝可真爱开玩笑。十年前工党和我是死敌，如今我却要亲手撕毁这剧本”，拉塞尔达喃喃自语，眉宇间掠过苦涩。旋即整肃神色起身：“是时候了”，他对幕僚说罢步入会场。满室媒体人、全民盟支持者——凡是卡洛斯·拉塞尔达之名足以吸引的听众济济一堂。后排就坐的萨穆埃尔·魏纳满脸讥诮，但当这位前瓜纳巴拉州长开始陈词时，他的表情从冷嘲转为错愕，最终化作无奈的认同。\n\n“对副总统埃德娜·玛丽莉亚·洛特·德·莫赖斯·科斯塔的指控尽是无稽之谈。巴西总统阿德马尔·德·巴罗斯既不尊重民主，亦不珍视共和国传统，企图摧毁政治协商的根基。因此，我卡洛斯·拉塞尔达宣布反对这场针对民选副总统的篡权行径。但凡热爱家庭、忠于上帝、珍视自由的巴西公民，都应与我同行。”\n\n演说直指要害。拉塞尔达心知，这至少能替埃德娜化解大半全民盟的压力。会后魏纳前来致意，言辞虽显生硬，感激却是真挚。拉塞尔达从容应答：“听着，魏纳，我不过尽责而已——敌人的敌人未必是敌人。每个认识到阿德马尔谄媚纳粹本性的瓦加斯主义者，都该被视作清醒之人。”魏纳注意到他刻意避开惯用的“热图利奥主义者”称谓，会心点头。\n\n“我们全民盟要和瓦加斯派联手，给那叛徒点颜色。纵使他能赢下这局亦是败北——待他倒台，一切又可回归原状。”魏纳深以为然。"
 brazil_adhemar.125.a: "我懂你意思，州长。"
 brazil_adhemar.126.t: "埃德娜幸免于难"
 brazil_adhemar.126.desc: "马卡帕中央市场，总统助手特意隔出的宁静角落，服务员为阿德马尔端来一盘海鲜炖菜。距离讨论阿马帕州基础设施建设的社区互动晚宴开始还有十分钟，阿德马尔打算在这之前先品味一番当地美食。\n\n埃德娜看起来心事重重。他猜测着她会去哪，突然听到门口传来她的声音。她正与挤在入口处的人群交谈，那些受邀参加晚宴的嘉宾们正费力地挤入场地。她难道是在即兴拉票吗？\n\n“天哪，埃德娜都要发动政变了！你敢吃这东西？”劳多·纳特尔悄声对阿德马尔耳语，吓得他差点撒了手里的汤。\n\n“你，你从哪冒出来的你？你说她下毒？！”阿德马尔压低声音，他尽力不引人注意，但仍引来几道目光。“你有什么证据？我们压根不知道那些文件是怎么来的。再说这里是公共场合！谈机密的时候能不能小声点？”\n\n“我们早该对她采取行动了。”劳多一边说，一边用眼神示意正在给粉丝签名、握手的埃德娜。“你看，她正在为选举积攒人气。要是我们当初拿出那份证据，说不定还能制止她。”\n\n“要是证据不足，反而会让她得逞。”阿德马尔摇摇头，周围餐桌上传来低语。“说实话，我不太担心这个。”终于，他能喝一口汤了。稍微有些淡，但依然十分美味，让人印象深刻。"
 brazil_adhemar.126.a: "“很快就会有机会的。”"
 brazil_adhemar.127.t: "被遗忘的誓言"
 brazil_adhemar.127.desc: "佩德罗的今年过得是越来越差。尽管托坎廷斯州离巴西利亚仅一步之遥，但在实际生活中，这里却仿佛像是在东南部或圣保罗一样遥远。阿德马尔的土地改革法案最终未能通过，他唯有叹息一声。\n\n报纸上的字句仿佛烙印一般，刻在他的心头。他阴沉着脸，给自己的土地除草。这恐怕是他唯一能办到的事。他一弯腰，背上的骨头就发出令人不适的声响；他拖着沉重的步伐走过沙质的土壤，工党对社进党政策的“批评”或是埃德娜·洛特关于新政的“期望”，都无法让他感到丝毫宽慰。他路过生锈的拖拉机，这闲置已久的破烂玩意仿佛在无声地嘲笑他的无力；而阿德马尔的沉默，则是对信任他的人最大的讽刺。他拿钱，但办事？他办了什么事了他！？\n\n他望着脚下粉红的土壤，望着塞拉多草原与空旷的田野。随后，他又将目光转回到厨房的桌子上，长满皱纹的手握起一支笔，准备签署一份来自“伯格曼家族”的地产租赁合同。等待奇迹的日子已经结束，与无情地主的周旋也画上了句号。虽说巴西利亚与此处相去甚远，但它却是他唯一的希望。"
 brazil_adhemar.127.a: "塞拉多的承诺已死，安息于风铃木下。"
 brazil_adhemar.128.t: "化敌为友"
 brazil_adhemar.128.desc: "阿德马尔面前的办公桌上，摆着达·库尼亚新送来的一沓报告。文件又厚又重，凝结了外交部长数月来的心血。“库尼亚，这回又是什么事？”\n\n“有关巴拉圭的若干事项，先生。”\n\n阿德马尔原本百无聊赖的神情一瞬间兴奋起来，自就任总统以来，他就一直希望能修复对巴拉圭关系，最好还要赶在阿根廷佬前完成。阿德马尔翻阅起文件夹，审读其中每一条与之相关的内容，眼里闪烁着希望的光芒，“你觉得我们能保下伊泰普吗？”\n\n但这希望迅速转为了忧虑。“瓦斯科，那巴拉那怎么办？”\n\n达·库尼亚不由笑出声来，他已经准备好启程前往南方。虽然与新成立的巴拉圭政府的谈判必定十分艰难，但他手里还握着一张王牌：通过篇承诺援助说服对方官员，这正是当前政局动荡的巴拉圭政府的燃眉之需。\n\n达·库尼亚啜饮了一小口咖啡，“确实很有可能，你必须得赶在阿根廷前动手。阿德马尔你也知道，因为亚松森问题，他们关系进展飞速。”\n\n话音落毕，阿德马尔就抄起一副纸笔，开始起草这封将改变整个南美的信函。他决定开启对巴拉圭的谈判。"
 brazil_adhemar.128.a: "以信为基，牵线搭桥。"
 brazil_adhemar.129.t: "谈判失败后"
 brazil_adhemar.129.desc: "总统办公室称不上豪华，但里边有一张精美的蓝花楹木书桌，阿德马尔常常在这上边审阅报告、准备讲稿或起草外交文书。现在，阿德马尔正在这张桌上做着日常工作时，门突然被撞开了。\n\n“阿德马尔！和巴拉圭打交道就是一场亏本生意！”是瓦斯科，他脸上夹杂着沮丧又愤怒的神情。“你为什么要把我送去那个鸟不拉屎的地方？他们领导人不自知自己国家处于分崩离析边缘，还说我是美国的走狗！走狗啊，阿德马尔！”部长叹了口气，他也清楚与巴拉圭交流就是竹篮打水。“和那帮自恃优等种族的家伙打交道结果就是这么回事。说服他们和‘劣等人’做生意想都别想。”\n\n阿德马尔咯咯笑出声来。“你以为我没考虑过这种情况吗？”总统拉开抽屉，里边放着一封事先为此准备的信。“看吧，虽然在亚松森和那帮空脑壳的谈判失败了，但我们还是得完成这份工作，而我正好有些能派上用场的家伙。”\n\n公牛把信递给瓦斯科。信中明确表示：若巴拉圭政府接受继续谈判，巴西将向其提供数百万美元援助。“瓦斯科，这可能是我们唯一的机会了。我请你将信送去亚松森。这回如果再失败，我们只能断绝对巴拉圭的所有外交关系了。”"
 brazil_adhemar.129.a: "南美洲脸面上的法西斯脓疮，不愿面对公牛。"
 brazil_adhemar.130.t: "巴拉圭不再"
 brazil_adhemar.130.desc: "胡安低头看着桌子上的文件，简直难以置信。条约中字字句句都是马托斯的意志，美其名曰“永久友好条约”，但胡安心中明白这背后的真相。“我们将帮助你们重建一切所需。你只需签署这份协议。”军人说道。\n\n在内心深处，胡安想告诉马托斯，这不是友谊的象征，而是一种赤裸裸的控制——对基础设施、人民、贸易甚至伊泰普水电站的控制。但他又能怎样？他现在根本没有还手之力。\n\n带着无尽的挫败感，胡安缓缓拿起笔，签下了自己的名字。除了屈服，别无选择。其他官员也纷纷效仿。“谢谢你，我希望通过这项协议，我们两国之间的关系能够更加紧密。”马托斯说完便离开了帐篷，他还有更重要的事情要处理。巴西得到了他们想要的一切，谈判桌上只剩下胜利者的背影。\n\n胡安瘫坐在椅子上，点燃一支香烟，抬头仰望天空。他不禁思索，是否有一天，巴拉圭能成为一个真正自由的国度——一个不被巴西或阿根廷左右，不被法西斯或共产主义者操控，而是由巴拉圭人民自主掌控的国家。"
 brazil_adhemar.130.a: "他只能希望如此。"
 brazil_adhemar.131.t: "谈判成功：入侵即将开始"
 brazil_adhemar.131.desc: "卡洛斯·德梅拉·马托斯上校与流亡的巴拉圭代表团并肩走在蓬塔波朗街头。这里没有界墙，除了路标文字从西班牙语变成葡萄牙语，以及街道两侧对峙的叛军和巴西内卫部队，你几乎感受不到这是巴拉圭与巴西的边境。流亡者们被驱逐者的怒视吓得畏缩，但梅拉·马托斯脸上挥之不去的失望神情催促着他们加快脚步。\n\n跟随助理武官进入市政大楼时，他们漆皮鞋面沾满了路缘石上堆积的红土尘，也终于避开了共产党人的监视。当众人在逼仄的会议室落座后，武官为梅拉·马托斯拉开主位座椅，却被上校摆手谢绝——这场谈判不会持续太久。\n\n他居高临下地看着代表们展开皮质文件夹，第一次意识到巴西的条件竟如此苛刻。整个谈判过程鸦雀无声，使节们自问是否值得冒险提高音量，仿佛巴拉圭的命运尚存转机。唯有故国家园的影像能让他们保持清醒。\n\n尽管梅拉·马托斯严厉的目光因无聊而愈发涣散，但条款中关于基础设施管控权、贸易主导权、水坝及能源控制权的逐项剥夺，仍将他们最后的抵抗碾为齑粉。没有言语交锋，只有握手与合影，条约就此签署。\n\n十分钟结束会谈。不到一小时，代表团再次被集中到同一家酒店。而当梅拉·马托斯返回驻地拟发电报时，他冷峻的面容终于浮现一丝若有似无的笑意。"
 brazil_adhemar.131.a: "终于有机会收拾左派了。"
 brazil_adhemar.132.t: "斯特罗斯纳的条件"
 brazil_adhemar.132.desc: "“是斯特罗斯纳。”事情变得有趣起来了。在瓦斯科·莱唐·达·库尼亚行色匆匆、面色严肃地为简报会就位之前，阿德马尔的兴趣就被这句话撩了起来。这个事情并不关键，他当然可以不管巴拉圭军政府，继续当他的总统，只是联想到这个被国际社会孤立的国家是否会认怂让他产生了一种奇怪的兴奋感。\n\n“巴拉圭政府同意继续会谈，以恢复关系并开展合作。但是……”达·库尼亚故意拖长尾音，似乎在斟酌措辞。\n\n“但是什么？瓦斯科，劳烦您赶紧讲，我还有事要干呢！”\n\n“但有一个条件——他希望与您亲自会面。国事访问。”\n\n阿德马尔往后一靠，思考起来。“嗯，我们都去过查科战争前线。至少我们在这方面有共同点。”\n\n“总统先生，我强烈建议您不要这么做。从日耳曼尼亚到危地马拉，每个人都知道这人是个残暴的独裁者，关于巴拉圭军队酷刑与恋童行为的传闻更是层出不穷。接待这样的人物不仅会严重损害我国的国家形象，还会赋予他不应有的合法性。”\n\n“瓦斯科，我这一生什么人没见过？整天想着捅我一刀的豪商、腐败透顶的政客，还有病号跟疯子。他还能比这些人更糟糕吗？搞外交，看的不是那张脸，看的是那面旗。”总统没意识到对高级外交官说出“搞外交该看什么”是件十分好笑的事情。“更何况，斯特罗斯纳已经没有其他选择，多行不义必自毙——对于他而言，失败就是死路一条。告诉他开始规划来巴西利亚的事宜吧。”说完，阿德马尔站起身，缓缓踱出办公室。"
 brazil_adhemar.132.a: "达·库尼亚只能干瞪眼看着。"
 brazil_adhemar.133.t: "亚松森的警报"
 brazil_adhemar.133.desc: "“啊，瓦斯科，来得正好。”外交部长匆匆走向会议桌，阿德马尔的声音响起。“那么，巴拉圭。说吧。”\n\n“所以……”瓦斯科再次审视手中的文件，深吸一口气，为桌子那边的反应做好准备。“巴拉圭民主政党向外交部送来信件，表示他们希望‘在恢复国家秩序后，参与与巴西政府关于深化经济和政治合作的对话’的愿望。”\n\n“嗯，”阿德马尔严肃地应了一声，“你觉得这对我们会有什么影响？”\n\n达·库尼亚表情紧张，“这很明显，巴拉圭是我们的重要伙伴，他们正深陷财政危机。我们必须介入，填补联合民族解放阵线造成的损失。否则，他们会陷入困境，而我们会被他们连累。”\n\n“不，瓦斯科，不是这样。”达·库尼亚被阿德马尔的话弄得一愣。“这意味着巴拉圭方面对我们有所求，因此我们现在握有主动权。我们要确保巴拉圭人不会忘记我们的恩情，全力支持我们。”说完，外交部部长看了一眼总统，拿起文件，一言不发地转身离去。他走到门口，阿德马尔开始记录刚才的讨论。\n\n“不要想太多无关的事，瓦斯科。我要你脚踏实地。”"
 brazil_adhemar.133.a: "南美地震，巴西首应。"
 brazil_adhemar.134.t: "赤诚"
 brazil_adhemar.134.desc: "安东尼奥·维达尔的手指都快燃起来了，不仅因为香烟，更因为他心中炽热的真理。眼前这该死的阿德马尔，就算还不是独裁者，至少也算是帮凶。各种头条标题在他脑海中不断闪现——《耻辱之日》？《铺向暴政的红毯》？《公牛的法西斯之旅》？他得把这些标题记下来，留待日后使用。\n\n编辑把腿架到桌上，目光在珍贵的画面间游走。哪一张最令人触目惊心——是南美屠夫阿尔弗雷多·斯特罗斯纳大摇大摆地踏入巴西的政治殿堂，还是总统府内轻松愉快的谈话氛围？又或者是阿德马尔用西班牙语与人交谈，不求任何回报的那一幕？仿佛在总统面前的不是一位曾下令肢解反对者、对酷刑笑而不语、纵容恋童兽行的嗜血暴君，而是一位久违的老友。他猛地站起身来。\n\n初稿的复印本来到他的手上，纸张还带着温度，令他浑身一震。文文件在办公室内迅速流转，几分钟内经历了无数次复印、批注，激起一波又一波的情绪风暴——兴奋、激动、焦虑，相互交织汇聚。这一切的一切，都让今天不再寻常。从帕拉到阿雷格里港的每一个人，都应当感受安东尼奥的心声，见证那熊熊燃烧的真相之火……"
 brazil_adhemar.134.a: "…他可能有“大棋”，但他不在乎。"
 brazil_adhemar.135.t: "惊涛骇浪"
 brazil_adhemar.135.desc: "巴西与巴拉圭代表团又一次坐在谈判桌前，讨论协议中最为主要且关键的部分：基础设施建设。外交官与谈判代表们滔滔不绝地抛出各种想法和数字，共同为这座世界最大的水坝勾画蓝图。国界两岸的光明未来逐渐明晰，每位发言者都不住洋溢出对未来的激动与期待。\n\n“阁下，我衷心感谢您。”莱唐·达·库尼亚微笑道，“在此，我想阐明巴西的立场：我方强烈建议由巴西持有伊泰普大坝及配套路桥项目的多数股份，以便快速推动工程进度，实现双方预期产出高效回笼。”\n\n言毕，外交部长合上记事本，抬起头来。对面的外交官略显不快，又露出几分沮丧。部长幕僚们的神经也紧崩了起来。\n\n“这不就是强抢吗！”屋内气氛一时紧张起来，所有人都把目光投向桌子另一头的巴拉圭代表。“你满嘴‘效率’‘快速’，但我们怎么知道巴拉圭的大坝、还有其他那些基建不会掉进你们某些人的口袋里？巴拉圭的基建，过去是、现在是、将来也永远是属于巴拉圭人民的财产！”同僚们频频点头支持，看来他们的立场十分明确。\n\n这场独角戏一时乱了库尼亚的阵脚。既是因为自己被划进“你们”，说得好像他只会跟着阿德马尔亦步亦随；更是因为巴拉圭代表的无礼鲁莽，若不及时敲打一下，他们只会继续拖延。不行，他必须夺回谈判节奏。我们不搞什么黑箱垄断，必须把这事办成。\n\n“请大家稍安勿躁，巴西代表团建议暂时休会片刻。”"
 brazil_adhemar.135.a: "坚持立场。巴拉圭人肯定没法按时完工。"
 brazil_adhemar.135.b: "我们退一步吧。阿丰索，你说对半分怎么样？"
 brazil_adhemar.135.c: "基建主权给他们，额外补贴我们出。表达我们的诚意。"
 brazil_adhemar.136.t: "梦渊堰碎"
 brazil_adhemar.136.desc: "达·库尼亚不耐烦地盯着那些坐立不安的巴拉圭官员。众人到会议室内重新就座，似乎已有定论。他回想起过去几天的激烈交锋，心中不禁怀疑自己是否为今天的谈判定下了正确的基调。尽管如此，他仍然怀有一丝微弱的希望，想着对方是否会妥协。然而，传来的却是令人失望的消息。\n\n“巴拉圭共和国国会拒绝了巴西关于其基础设施的提议。”\n\n此言一出，一些团队成员双手掩面，内心的失望溢于言表。何以至此，达·库尼亚心知肚明：不论他们多么需要这笔交易，最终背锅的是这些坐在谈判桌前的人。他们的国民会把一切归咎于此。不仅出于对国家前途的担忧，更是出于个人的恐惧，是对那些与他们隔桌相望之人的忌惮。\n\n更甚者，正是这份恐惧阻碍了他们迈向全面胜利的步伐。伊泰普水坝本是阿德马尔解决未来能源危机的秘密武器，此刻建设却要陷入僵局。也许，协议还有挽回的余地。但一旦白纸黑字敲定下来，巴西利亚就不再有置喙其间的余地。"
 brazil_adhemar.136.a: "希望公牛知道的时候不在瓷器店里。"
 brazil_adhemar.137.t: "虚张声势"
 brazil_adhemar.137.desc: "理论上讲，巴西和巴拉圭的代表本应会面讨论所有权的具体事宜。但实际上，这更像是一场对峙。两国的代表团各自围坐一团，靠使者互相传递他们的条件。经过漫长的等待，这些人终于被派往“无人区”，成了意图的传声筒。\n\n“为了重申巴西在这场旷日持久的谈判中意图达成的需求，我们认为，为获得对我们迄今为止投资的充分补偿，必须由巴西企业拥有大坝及其基础设施的所有权。”对方脸上露出的厌恶神情，表明了他华丽辞藻的彻底失败。\n\n“很好，那我也重申我们的回应：这是不可接受的。”他平静的语气中隐含着某种希望。“不过，我们也有一个建议：巴西和巴拉圭共同拥有大坝的所有权，由一家巴西承包商负责运营管理。”巴西发言人点点头，回到了本方的阵营。\n\n“荒唐！他们以为自己是谁？他们应该跪在我们脚下感谢我们愿意给他们这个项目。”最先作出反应的人用拳头一阵捶打会议桌。\n\n“你疯了吗？他们又不是我们的殖民地，他们可以另寻他处。我也不喜欢这些条件，但在这里像头蛮牛一样只会让我们竹篮打水一场空，最后只能带着一堆狗屎回家。”他的发言引来一片窃窃私语与低声认同。\n\n“你自己都说了，他们还有其他选择。我们就接受他们的条件吧，我们现在掌握的资源足以弥补这些让步的代价。”此话一出，众人纷纷投以愤怒的目光，但一位睿智长者的声音随即响起，为这场争论画下了决定性的句点："
 brazil_adhemar.137.a: "“跟他们来硬的，他们知道自己没有别的人选。”"
 brazil_adhemar.137.b: "“我们假装妥协，让他们以为自己赢了。”"
 brazil_adhemar.137.c: "“没必要在这上面浪费精力，同意他们的条件就是了。”"
 brazil_adhemar.138.t: "身在局中"
 brazil_adhemar.138.desc: "外交部是巴西国家机器的重要组成部分，其间囊括的决策者、战略家和理论家，个个都是人中龙凤。然而，为何面对小国巴拉圭，巴西却显得力不从心，难以让巴拉圭低头呢？\n\n外长反复权衡利弊。多方咨询之后，他最终构想了两种策略。要么，满足亚松森方面的要求，通过协商确定的合同推进大坝、路桥等项目，增强巴拉圭方的合作信心，但要让对方自己去找资源搞工程，风险很大。\n\n要么就强硬到底，将项目牢牢掌控在巴西手中，这样工程进度尽在掌握之中，不过有可能会吓跑对方，令谈判陷入僵局。他不明白，这样操作他看来理所当然，巴拉圭为何如此倔强？\n\n此刻，他身居高位，享有难得的权威，而阿德马尔正迫不及待地等着他带回好消息。两手空空去见总统，恐怕不太好。瓦斯科不喜欢冒险，他更喜欢稳扎稳打。\n\n“通知巴拉圭代表团前来会谈。我们答应他们的要求。”"
 brazil_adhemar.138.a: "手握王牌，切莫轻率。"
 brazil_adhemar.139.t: "贸易战术"
 brazil_adhemar.139.desc: "瓦斯科·达·库尼亚下车时，已经在为来亚松森的另一半任务做心理准备——是时候和巴拉圭敲定贸易协议了。他快步走过走廊前往会议室，对遇到的谈判代表保持礼貌微笑，掩盖起因他们而产生的不快或得意。但今天他对任务目标非常清醒：巴西在贸易条款上至少要取得三比零的压倒性胜利，任何不及此的结果都是耻辱。\n\n“诚如所见，巴拉圭民生经济已因近期叛乱遭受重创，”谈判开始十分钟后，瓦斯科率先开口，“购买力大幅下降，国内产业受损严重，日用品缺口急剧扩大。为此，巴西政府准备通过加大对大豆和棉花产业资金扶持来帮扶贵国经济。”他瞥了眼会议桌对面，巴拉圭代表团几乎人人面露喜色。\n\n“不过为确保协议可行且稳定，”他话锋一转，“我们要求对巴西工农业产品的现有关税减半，且须确立巴西市场为贵国首要贸易伙伴——而非诸如阿根廷之流。”后排的巴西顾问发出窃笑，部长假装没听见。“考虑到巴拉圭当前经济疲软，此举无论如何都最符合贵国利益。”\n\n这番直白声明后，谈判进入常规的休会讨论环节，巴拉圭代表们匆匆离场。条件是否太苛刻？现在是做决定的时候了。"
 brazil_adhemar.139.a: "“我们不做任何让步。阿方索，通知他们条件不变。"
 brazil_adhemar.139.b: "我们可以降低关税，但是巴拉圭不能搞贸易壁垒，条件是对等的。"
 brazil_adhemar.139.c: "我们需要这笔贸易。提供关税优惠，并允许他们实行一定程度的保护主义政策。"
 brazil_adhemar.140.t: "不让分毫，满盘皆输"
 brazil_adhemar.140.desc: "休会结束后，巴拉圭人带着瓦斯科熟悉且厌恶的冷硬态度回到谈判桌。巴拉圭代表似乎并不喜欢巴西抛出的要求，但根据代表团的所有推算——那些如今塞满文件夹、布满思维导图和批注的法律文件已反复修订了所有可能的事实——他们确信巴拉圭已完全受制于巴西。如果瓦斯科是巴拉圭总统，以他的务实作风，早在几天前就会开除这些死脑筋。\n\n“阁下，”代表团发言人冷冰冰地说道，“我们必须承认，贵方的要求的实在有些咄咄逼人。”这正是关键所在！这位“阁下先生”强压怒火。你们已经输了，他心想，直接认输接受条件吧。“当其他机会都被剥夺时，理性要求我们接受单一贸易伙伴，即便这会形成危险的依赖关系。我们只是希望能为达成协议少付出一些代价。”\n\n瓦斯科沉默良久，终于辩解道：“正如早前所确定的，这事实上是贵国摆脱战争造成的经济灾难的唯一选择，巴西政府已明确复苏计划的条款——”\n\n“这会成为永久性条款吗？”达·库尼亚分不清这番打断究竟是虚张声势、无心之问，还是单纯的无礼。\n\n“协议将持续到不再有必要为止。”他直视对方的眼睛，仿佛要通过目光传递坚定意志。\n\n“既然如此，本次谈判就没有继续下去的必要了。”对方代表反呛道，带着随行人员大步离开会议室。门关上的瞬间，痛苦的外交部长将脸深深埋进手心。"
 brazil_adhemar.140.a: "固执的代价。"
 brazil_adhemar.141.t: "拟定计划"
 brazil_adhemar.141.desc: "在亚松森市民调侃为\"巴西区\"的街巷中，巴西代表团要员们神经紧绷。庆功的凯匹林纳鸡尾酒还没到上的时候——若谈判代表们空手而归，他们就得自己回家了。\n\n所幸瓦斯科·达·库尼亚心里有数，他从巴拉圭阵营探得风声：政府早有预案，不会批准任何偏离其核心诉求的提案。这些密报显然越过了他，直达总统案头，以至总统竟放下战略推演，怒气冲冲致电训斥。\"务实精神\"的陈词滥调夹杂着似曾相识的长篇大论，外交部长要权衡的利弊更多了。\n\n当日下午，焕然精简的条款清单摆上谈判桌。达库尼亚演讲稿都没拿：“经与政府其他成员磋商，我国决定重新调整方案。巴西政府将以四分之一关税及优先采购巴西民生必需品为条件，维持此前承诺的对巴拉圭民用经济的补贴额度。”\n\n巴拉圭代表团频频点头，老外交官向发言人比划示意，后者绽开笑容：“若贵国政府真如你所说，愿承担建设重任，这些条款可以接受。”\n\n双方握手礼成，也就此从对手蜕变为略带芥蒂的伙伴。这虽非达·库尼亚预想的三局全胜，但平局终究胜过败北，他暗暗想着。"
 brazil_adhemar.141.a: "圣保罗与亚松森缔结了纽带：唯有时间能检验这份承诺的分量。"
 brazil_adhemar.142.t: "踢得好"
 brazil_adhemar.142.desc: "不出几小时，心神不定的巴拉圭人又回到了会议室。在协调员坚持今日必须解决贸易问题的重压下，瓦斯科从这群倔驴身上发现了弱点：他们亟需这笔交易，甚至可能这周就要敲定。为挽回资金与国民信心，他们大概会不择手段。\n\n即便如此，他们在正式磋商中仍然在负隅顽抗。\n“阁下，贵方提案的金额不足以说服我方接受此贸易协定，尤其考虑到我们需承担的巨额机会成本。我们——”\n\n“——你们……”瓦斯科骤然升温的语调截断话头，“……需更审慎地掂量自身处境，阁下。坦率说，这个经济窟窿堪比巴西的体量，巴拉圭自己肯定没法填，其他邻国与伙伴也不会愿意趟这浑水。但我们作为最大邻邦，作为首个亲赴亚松森的国家，已经充分证明了我们的诚意与能力。”\n\n对方陷入死寂。“这不是贵方该做的假设，外长先生。”对方最终嘶声道。若非场合严肃，瓦斯科简直要当面嗤笑。\n\n“若贵方如此笃定，我们随时可以离席。”他让这句话在空气中发酵，积蓄威压，任由纸张窸窣声与游移目光填满寂静。滴答、滴答、轰。\n\n“……好吧，”发言人带着窘笑开口，“我们当然不愿走到那一步。”\n\n未来数周，瓦斯科·莱唐·达·库尼亚都在咀嚼着那个笑容，将其裱进记忆殿堂，有如世界杯的决胜进球。当晚，他把脚翘上办公桌吞云吐雾，心中笃定——"
 brazil_adhemar.142.a: "……若这是场球赛，他就是那个使出帽子戏法的人。"
 brazil_adhemar.143.t: "事关千兆瓦"
 brazil_adhemar.143.desc: "瓦斯科·达·库尼亚盯着咖啡杯，杯中映出的疲惫面容与他四目相对。深陷这场谈判泥潭多久了？在这间与世隔绝的会议室里对着墙壁咆哮，时间早已模糊。若功败垂成于此，他必将堕入地狱。但若以平庸条约收场——想到自己的声誉与总统的雷霆之怒皆悬于一线——也绝非选项。\n\n“诸位，”他叩击桌面后开口，沉稳雄辩的声线掩去所有犹疑，“感谢贵方为推动这项两国互利项目所做的努力。现仅剩最后议题：电力分配。”巴拉圭代表团闻言前倾身子，目光如钉射向达·库尼亚，低语声如蜂群嗡鸣。达·库尼亚将此解读为故作姿态而非威慑，遂清了清嗓子“为公平分配伊泰普大坝发电量，电力输出须按各国出资比例划分。因此，约70%电力应输送至巴西。”\n\n“荒谬！”一名巴拉圭外交官拍案而起，“那我们还剩什么，残羹冷炙吗？我国民用电需求远甚贵国！若指望我们吞下这等条约，那你就错了！”\n\n会议在时针凝滞般的拉锯中推进。经数轮交锋，双方终于同意休会协商。当巴拉圭代表们秩序井然地沉默离场时，达·库尼亚顿觉无数怒视的重量与条约成败的压力山崩般倾泻肩头。他咽下冷咖啡，召来最近幕僚："
 brazil_adhemar.143.a: "告诉总统我们同意平等分配。"
 brazil_adhemar.143.b: "告诉总统我们保持配额不变。"
 brazil_adhemar.144.t: "无欢的胜利"
 brazil_adhemar.144.desc: "闲暇时光。作为身在异国他乡的外长，瓦斯科明白自己应当珍惜这样的时刻。抵达亚松森后，他每日奔走于城市各处，此刻终于能倚在酒店床榻，手捧咖啡杯，或许读本杂——\n\n该死。又是阿德马尔。别烦躁，别争执，接电话就是。“是，总统先生，”他拿起听筒，“有何指示？”\n\n“指示？瓦斯科，你别装糊涂！你以为我给你放假呢！……听着，我想过了，这个条款还是太苛刻了。”竟从阿德马尔口中听到“苛刻”二字？外长以为永无此日。“我们需要缓和要求。”\n\n“阁下，恕我直言，我方已向巴拉圭人阐明立场。作为主导方，水电站建设主要靠我们——”\n\n“两国平等共享水电站能源输出，共同行使水电站管理权，各退一步。这是最终条款。听着，我去过巴拉圭，亲眼目睹过战争……我知道分寸。别再搞什么最后一刻的惊吓，赶紧敲定。”瓦斯科跌坐回堆满文件的办公桌前。摔飞两本文件夹，划掉旧笔记，或许还泄愤般低吼一声后，他立即投入工作。\n\n巴拉圭人接受了总统临时追加的条约新条款。折中方案宣布时，代表团眼中闪烁着释然的光——水电站能源将在两国间均分。走出会议室时，瓦斯科·莱唐·达·库尼亚的笑容克制得体。他心底真正盘算的，是错失的良机有多巨大，以及归心似箭的焦灼。"
 brazil_adhemar.144.a: "“阿方索，这样的日子我们还要熬多久？”"
 brazil_adhemar.145.t: "卡琵莉亚必须流动"
 brazil_adhemar.145.desc: "“阁下，巴西有句老话，您或许听过，”瓦斯科的副手阿方索开口道。瓦斯科今日对谈判胜券在握，索性将致命一击交给同僚。“谁播种，谁收获。现实层面而言，巴拉圭既无力在此项目中播撒同等份额的种子，也没有这样的电力需求——而巴西可就不一样了。伊泰普大坝的能源分配应该按两国建设投入比例划分，否则还不如不建。”\n\n最后那句话有如一记重锤，引起巴拉圭代表们一阵骚动，仿佛末日已至。这当然是虚张声势——若真把水电站项目谈崩，阿方索绝对没好果子吃。但对巴拉圭人而言，这无异于最后通牒。\n\n“好吧，”漫长的沉默之后，谈判代表叹息一声，显然他们别无良策。“大坝必须建，否则……我们的时间就白白浪费掉了。”日后。巴西代表团的成员总爱描述当时的场景，阴郁的愁云如何笼罩在巴拉圭使团头顶，都有点可怜他们了。\n\n外交部长立马伸出手来，握住谈判代表的手，免得场面变得更加尴尬。一丝隐忧划过心头——他们利用了对方本就十分艰难的重建时期，而自己更像阿德马尔的共谋者而非外交准则的捍卫者。但无论如何，他践行了最重要的准则：捍卫国家利益，这一点无可指摘。是时候庆祝一番了，卡琵莉亚的泡沫注定要漫溢杯沿。"
 brazil_adhemar.145.a: "圣母啊！"
 brazil_adhemar.146.t: "熟悉的十字路口"
 brazil_adhemar.146.desc: "“啊，马塞洛，见到你可真好！”瓦斯科冲正朝自己走来的资深外交官朗声招呼。这位外长边嘟囔着：“可算见着张熟面孔了，这地界尽是生人，”边夸张地环顾餐厅。马塞洛被上司这副谨防隔墙有耳的作派逗得咧嘴直乐。\n\n瓦斯科解释，自能源条款抛出后，巴拉圭人已经差不多一天没信了。究竟是自满懈怠，还是在密谋反制——两者在他看来都不太可能——还是抗议谈判中的受挫感，他难下定论。他请马塞洛来，其实是找他参谋参谋。\n\n“肯定是不高兴了，”马塞洛断言——方才脑补达·库尼亚眼珠乱转提防间谍的画面着实令他忍俊不禁。“要我说，谈判桌上他们连眼神都在骂娘。我看还是别指望他们邀请去一起泡吧了，那群人八成恨透咱们。”\n\n瓦斯科抿了口咖啡，对这论断报以苦笑：“差不多吧。但水电站项目是这个协定的大头。要是让出太多配额，河东岸所有企业都别想干了。谈崩了也不行，那样还不如直接收拾行李走人，咱们又不是来修桥补路的。”\n\n一如过往，厌恶冒险的瓦斯科不得不再次押上重注。在两人坐出租车返回临时总部的路上，这场算计仍在脑海中翻腾不休。"
 brazil_adhemar.146.a: "现在改变方针太晚了，我们不能妥协。"
 brazil_adhemar.146.b: "他们要什么就给什么吧，别无他法了。"
 brazil_adhemar.147.t: "谈判破裂！"
 brazil_adhemar.147.desc: "致：瓦斯科·莱唐·达·库尼亚阁下\n自：巴拉圭外交部\n日期：[?global.date.GetDateStringNoHourLong]\n事由：谈判事宜\n\n鉴于双方围绕水电站项目的现有立场，谈判立即中止，彼此底线均已明晰，僵局难以打破。巴拉圭代表团指出，巴西政府对主权事务态度轻蔑——如此行径更似十九世纪的帝国，而非现代国家。双边会谈将无限期搁置。\n--------------\n这份备忘录——既非正式声明，亦非当面递交——与签证即刻失效通知同步送达瓦斯科手中，这意味着代表团须当日离境，可谓是将刻薄践行了最后一刻。连日来的筹备、筹划与承诺尽付东流，档案与咖啡厅会谈都变得毫无意义。最糟的是，暴跳如雷的总统府的问责即将到来——瓦斯科心知此景必会让他刻骨铭心。\n\n包机升空之际，瓦斯科想起过往征程：俄罗斯、玻利维亚、巴西利亚，如今又是巴拉圭。“巴拉圭”将永远成为他心里的一根刺，不过至少，他此生不必再踏足此地。"
 brazil_adhemar.147.a: "巴拉那河将缄默数代之久。"
 brazil_adhemar.148.t: "为信任干杯"
 brazil_adhemar.148.desc: "“呵，或许我终究该多信任你几分。”巴西利亚专线的杂音刺耳，但瓦斯科仍能从电流声中辨出阿德马尔的得意。“能源争议”达成妥协，余下只需打出条文，等总统签字确认。他惬意地倚在酒店床上，任凭电话那头的赞美之辞如乐曲流淌。\n\n“听着，咱们虽未征服那鸟地方，但规矩终归是咱们定的。圣保罗已有三位老友打电话问我巴拉圭的事，这么说吧，这些条款会让很多人欣喜若狂。干得漂亮，瓦斯科，回来再聊。”电话戛然而止。驱散脑海中奸商排队瓜分基建合同的画面后，他仰面躺倒，咧嘴而笑。\n\n暮色中沿街散步时，即将永别巴拉圭的兴奋感悄然褪去。当真要离去时，解脱感竟荡然无存。粉彩街面与灰暗廊柱突兀交织的景象，不知何时已在他心底悄然生根。\n\n最终，瓦斯科与幕僚们的确收到了对方的酒局邀约——此刻他正赴约途中。更大的挑战必将接踵而至：譬如夯实与美国等超级大国的建设性关系。但或许此生此夜，他可暂忘尘嚣。"
 brazil_adhemar.148.a: "啤酒：他们叫法不同，但也明白就是那个东西。"
 brazil_adhemar.149.t: "皆大欢喜"
 brazil_adhemar.149.desc: "*咔哒*\n\n“他们同意了。”瓦斯科的声音透着一丝疲惫，长时间的谈判让他精疲力尽，所有的付出终于有了回报。“今早我们与巴拉圭官员进行了会谈，他们最终接受了我们的提议。”巴西胜利了，资源丰富的巴拉圭领土尽在掌握。\n\n“瓦斯科，”阿德马尔的兴奋之情溢于言表，“当初把你纳入内阁时，我还不确定你是否能胜任外交部长一职，但今天你用实际行动证明自己是个能成事的人。你回巴西利亚之后，我会当面为你庆功。”\n\n两人随后简短地讨论了有关巴拉圭未来的话题以及如何合理利用新获得的土地。“聊到这就差不多了。”阿德马尔面带微笑，“再次恭喜你，瓦斯科。”\n\n*咔哒*\n\n瓦斯科长舒一口气，终于结束了。他将凯旋而归，迎接属于自己的荣耀和应得的休憩。关掉房间的灯，他躺在床上，尽管他知道阿德马尔或许会把这片土地分配给亲信，但此刻的他无暇顾及。他只想好好休息。"
 brazil_adhemar.149.a: "晚安，达·库尼亚先生。"
 brazil_adhemar.150.t: "曲终"
 brazil_adhemar.150.desc: "瓦斯科按下电话号码，心中忐忑不安。阿德马尔会作何反应？他会生气，还是说他并不关心？他只能硬着头皮拿起听筒。\n\n“总统府，我是埃尔萨。”\n\n“埃尔萨，我是瓦斯科，情况紧急，帮我接阿德马尔。”音乐响起，外长只希望一切能够快点画上句号。这段时间，巴拉圭的谈判就像一座大山压在他的肩上，令他疲惫不堪。\n\n“瓦斯科？”公牛的声音一如既往地清晰，“你是不是把事情搞砸了？你到底懂不懂，要是为我们的利益多付出一些，结果可能会好得多。”瓦斯科冷笑一声，这话简直就是放屁。\n\n“你说‘我们’的利益？不是说你跟你朋友的利益吧？已经没得谈了。阿德马尔，我知道你只是想捞更多好处。”两人讨论了很长一段时间研究怎么处理巴拉圭的事情，阿德马尔沮丧地挂断了电话。\n\n瓦斯科坐在床上，右手握一杯酒，左手夹一支烟，望向窗外亚松森的城市灯火。终于解脱了。“结束了！”他默默想着，以后再也不用来这儿了。终于可以回巴西了。"
 brazil_adhemar.150.a: "谢幕。"
 brazil_adhemar.151.t: "力量展示"
 brazil_adhemar.151.desc: "亚马孙雨林迎来了一群稀客——将军、记者、政要、外交官，他们均受阿德马尔之邀，从大城市千里迢迢赶来参加其万众瞩目的“发布会”。在场的阿根廷和智利官员不时用西语交头接耳，仓促送达的请柬、不明所以的地点，无不加深了他们内心的担忧：巴西拥有了核武器。阿德马尔笔直地站在一块面板前，浑身散发出军人的神气。灯光打在他的脸上，全场立马安静了下来。\n\n“畏惧和尊重，哪一样更具分量？我想大多数人会回答是后者。但在我们土生土长的巴西人眼中，很遗憾，前者的地位远非后者所能企及。”军方代表们仍目不转睛地看着总统，而外交官们已经走起了神，更有甚者直到现在都还是一头雾水。\n\n“只要巴西坚定自身立场，她就是和平的卫士，她所拥有的力量即为维护秩序的武器。各位能身处此地，正是这一道理的最好说明。而接下来，就请我国杰出的科研人员为各位深入阐释。希望各位明白，乱世当前，巴西别无选择。”说罢，阿德马尔朝几名操作员点头示意，后者随即开始六十秒倒数。\n\n助手将一副墨镜递给阿德马尔，他面无表情地接过，戴上。还剩三十秒，他转过身去，为即将到来的那一刻捏了把汗。还剩十五秒，所有人都做好了准备，将面部和四肢牢牢遮住。\n\n三……二……一……\n\n“轰隆”一声，一朵火红的蘑菇云自远方升起，白色的天空顷刻间变了颜色，随之而来的是一道震天动地的冲击波。"
 brazil_adhemar.151.a: "巴西步入了新的纪元，而她不会退缩。"
 brazil_adhemar.152.t: "鞘中之剑"
 brazil_adhemar.152.desc: "“让人家瞧您像一朵纯洁的花朵，可是在花瓣底下却有一条毒蛇潜伏。”\n\n引文出自《麦克白》。阿德马尔曾在圣保罗某个闷热的夏夜读过这出剧——经历政坛的明枪暗箭之后，他打开书本，一口气读完了它。译文字句失了韵律格式，但他却能完全领会其中深意。有时，不存在的武器才最致命。阿德马尔希望巴西的军人也能明白这个道理。\n\n圣保罗的夜晚依然闷热难耐。总统感觉衬衫紧贴着后背，弗罗塔将军的雪茄烟雾缭绕。参与密谋的还有梅迪西，前者表情一脸严肃，正襟危坐仿佛马上要从椅子上摔下来，后者却一脸的气定神闲。\n\n“那么总统先生，”梅迪西吞吐着烟圈，“我们达成共识了。不能让外界知晓我们的真正实力。”\n\n“存在威慑。”阿德马尔说。\n\n梅迪西颔首：“当然。真实情况他们心知肚明。”\n\n核试产生的蘑菇云照片早已传遍世界。但只要官方文件坚持既定说辞，敌国也只能干瞪眼。总统点头。梅迪西笑了，又点燃一支雪茄。"
 brazil_adhemar.152.a: "可行。"
 brazil_adhemar.153.t: "原子时代"
 brazil_adhemar.153.desc: "劳多·纳特尔平日尽量节制饮酒，但当总统亲自邀你到他办公室品鉴顶级波本，推辞恐怕不太合适。这会儿他陷在总统府的天鹅绒沙发里，手中玻璃杯里的冰块叮当作响，仿佛是为祈祷准备的圣杯。\n\n阿德马尔红光满面——劳多怀疑阿德马尔在他来前就小酌了几杯——但此刻这不重要。总统打开酒瓶，琥珀色液体在两只水晶杯里泛起涟漪。“敬巴西，敬未来！”酒杯相碰，总统又补了句：“不论将来会如何。”\n\n熟悉的灼烧感滑入咽喉。阿德马尔被呛得轻咳几声，摆摆手又挂上笑容：“知道吗劳多，这可能会是我政治生涯的巅峰。就算拉塞尔达……”他醉醺醺地挥手，像在赶苍蝇，“那个卑鄙小人，就算把我们连同整座总统府炸烂，胜利依旧属于我们。知道为什么吗？”\n\n劳多配合地摇头，眼里带着玩味：“为什么呢？”\n\n“因为我们让巴西真正跻身世界强权之列！从阿根廷到智利，都不得不正视我们啦！”总统放声大笑。"
 brazil_adhemar.153.a: "虽然很好笑，但劳多还是表示同意。"
 brazil_adhemar.154.t: "你所去之处"
 brazil_adhemar.154.desc: "正午时分，飞机降落在惠灵顿。埃德娜的团队早已被告知要应对媒体围堵。当她踏出舱门时，隔着保镖与隔离墩望见一小撮记者。新西兰总理[NZL.GetLeader]与她握手相迎。一行人离开停机坪，向前往议会的车队走去。埃德娜真希望下机后能先去酒店房间稍作歇息——前夜辗转难眠，航程中也未能合眼。\n\n埃德娜试图认真投入与总理的对话，思绪却总被此行的蹊跷牵走。虽说行程月前便已敲定，但原定出访的分明是阿德马尔与瓦斯科·达·库尼亚。反正那人最爱这种应酬的破事，让他去周旋好了，自己照例留守灭火。可上周日程突变。此刻[NZL.GetLeader]正介绍某处殖民时期建筑，埃德娜的思绪却飘回了一周前——阿德马尔的秘书正指手画脚，说有哪些约见和活动是她“不必亲临”的。\n\n下车时，她侧身贴近随行助理：“回酒店后立刻打电话排查，我要知道他在搞什么名堂。”年轻女子点头会意，招手拦下一辆随行车离去，留下团队其他成员应付这场怪异的分心仪式。埃德娜重新融入迎宾队伍，调整心绪直至这场访问不再像是义务劳动，而她嘴角的弧度也重新泛起温度。"
 brazil_adhemar.154.a: "私底下，她仍然担忧国内的事态。"
 brazil_adhemar.155.t: "你所闻之言"
 brazil_adhemar.155.desc: "埃德娜·洛特与[NZL.GetLeader]的会谈始终围绕贸易与安全议题展开。就前者而言，新西兰对加强与OFN伙伴国合作展现兴趣——或许只是为了对冲对美国经济霸权的忧虑。至于后者，这个南太平洋岛国以“小国大担当”为荣，在抗击全球法西斯主义领域展现出超乎体量的决心，并期待他国能为其“大卫对抗歌利亚”的悲壮叙事添砖加瓦。\n\n正当二人在议会大厦会议厅商谈贸易细则时，一名助理突然闯入。埃德娜与总理同时转头——来人竟是前者的幕僚。这名女子双颊因奔跑泛红，面色却惨白如纸。\n\n“伊内丝？”埃德娜透过镜片眨了眨眼。这位助理本应负责监听巴西国内动向，此刻却贸然闯入超出其安全许可层级的会谈。\n\n“副总统阁下，十万火急，能否——”安保人员已从门外挤入，若非埃德娜抬手制止，他们差点擒住伊内丝胳膊。“求您了，必须马上汇报。”\n\n尽管为这失礼之举感到难堪，但伊内丝的恐慌如病毒般渗入埃德娜体内。两人退至房间角落耳语。[NZL.GetLeader]虽背对她们，仍忍不住侧耳捕捉只言片语：“正发起表决”、“解除禁运令”、即将通过”。当埃德娜转过身，她的脸色在挫败、恐惧与暴怒间剧烈变幻。\n\n埃德娜团队突然抽身撤离时，她仅对[NZL.GetLeader]仓促甩下道歉之辞。若他日贵为总统自当正式致歉，但此刻狂怒已蒙蔽她的判断力。"
 brazil_adhemar.155.a: "“老天，”[NZL.GetLeader]感叹，“希望跟刚才的话题无关。”"
 brazil_adhemar.156.t: "你所错过之事"
 brazil_adhemar.156.desc: "正午时分，飞机降落在巴西利亚，却没有记者前来接机。埃德娜匆忙钻进座驾，车载广播却宣告她已经来迟——禁运解除议案趁她出访期间完成表决并通过。她几乎想砸碎身旁的车窗，却沉声命令司机改道晨曦宫。已经到了这一步，也不用再端着礼仪：她直直冲进大厅，要求面见阿德马尔；秘书谎称他在参议院，她压根不理，径直推开众人冲向办公室。门内，阿德马尔正伏案疾书。\n\n“你这叛徒！”她双掌重重拍在桌面上，“居然解除对德禁运？”\n\n“啊，埃德娜，”他抬眼，“新西兰之行如何？”\n\n“派我出访就是怕我阻挠对吧？我真不该信——”\n\n“冷静，亲爱的，”阿德马尔走向酒柜，启开香槟，“你这样子很不体面。”细密气泡在水晶杯里升腾，“我们的职责是为国家与人民谋福祉。”他递过酒杯，“封锁三分之一全球市场谈何发展？”\n\n“那三分之一是敌方阵营！你这混账，纽约会拿你祭旗的。”\n\n“他们只会感激涕零。”酒杯悬在半空，“你应该高兴，这可是双赢——”\n\n埃德娜扬手打翻酒杯。香槟泼溅在地毯上，阿德马尔怒目而视却未作声，任凭她摔门而去。"
 brazil_adhemar.156.a: "“印一份清单给我！”"
 brazil_adhemar.193.t: "真政变出自假盟友"
 brazil_adhemar.193.desc: "阿德马尔目不转睛盯着办公桌上的迷你电视机，此起彼伏的电话铃声间，他能听见自己心脏撞击胸腔的闷响。直到某个来电突然取代忙音，他才猛然抓起听筒。\n\n“纳特尔！看到新闻了吗？！”总统的咆哮穿透电话线。纳特尔无需询问——自家电视屏幕正播放着相同的画面：某个名不见经传的上校抢占电视台，正在宣读所谓“救国政府”的檄文。这是政变，是必须立刻掐灭的叛乱火种。\n\n“您指望我怎么办，总统先生？”纳特尔语气严肃，“镇压起来可不容易，毕竟您现在没几个盟友了。”阿德马尔深吸一口气捏住鼻梁，“动用小金库，给该打点的人开支票。再调忠诚的部队教叛徒做人。”他斩钉截铁地下达指令。纳特尔挂断前留下一句话，意味深长：“您真应该考虑广结善缘。”\n\n办公室重归死寂。阿德马尔瘫坐回皮椅，心率渐趋平稳。窗外鸟鸣依旧，新闻画面已切换成故障检测图，仿佛这场政变不过是日常插曲。他用袖口擦拭眼角，后知后觉地意识到衬衫早已被冷汗浸透——若不能平息此事，他的政府恐将成为巴西民主棺材上的最后一根钉子。\n\n正要闭目养神，指尖却不慎触到遥控器。卡通频道跃入眼帘：一群动物正在欢唱友谊地久天长。总统盯着屏幕看了数秒，突然发出一声苦笑。"
 brazil_adhemar.193.a: "“或许我能从里面学到如何交朋友。”"
 BRA_adhemar_military_warned_tt: "§R总统的位子保住了，但下次我们可就没有这么幸运了。§!"
 brazil_adhemar.1000.t: "医保法案获得通过"
 brazil_adhemar.1000.desc: "今天巴西利亚一片欢腾——新医保法案刚在巴西立法机关通过，并立刻生效。阿德马尔·德·巴罗斯总统还在市中心组织了一场庆祝法案通过的集会。在集会上，巴罗斯总统感谢了他对自己政党为该法通过所做努力，以及来自瓦加斯主义反对派社民党-工党的“出人意料的援助”。\n\n如同巴西利亚一样，巴西全国各大城市都在庆祝巴罗斯的医保法案通过。许多人都表示该法案是祖国的伟大成就，巴西人将拥抱更健康的生活。尽管全民盟的知名领导人卡洛斯·拉塞尔达强烈批评了该法案，称其为“将毁了巴西未来的民粹把戏”，巴西大部分媒体仍对法案持正面态度，并积极报道了巴罗斯总统的首项伟大成就。"
 brazil_adhemar.1000.a: "好了，第一个法案通过了，接下来看他还能整出什么好戏。"
 brazil_adhemar.1001.t: "医保法案未获通过"
 brazil_adhemar.1001.desc: "巴西利亚笼罩在混乱与悲剧的气氛之中，阿德马尔·德·巴罗斯总统的首个重大立法项目“医疗保健法案”宣告彻底失败。巴西许多城市爆发大规模示威。阿德马尔总统在巴西利亚举行了由社进党及支持民众参与的大型集会，会上，他公开谴责这是“现代历史上最伟大的立法措施，也是自废奴以来最重要的措施”，却“被无可计数的南美懦夫和叛徒背刺”。\n\n在巴西各地，社进党都在举行类似的集会，有些地方甚至发生骚乱。在社进党大本营——圣保罗都市区，巴西前总统瓦加斯的儿子、州长热图利奥·瓦加斯也举行了一次大型集会。在激烈的抗议中，他表示：“这只是表明自诩瓦加斯建制派的社民-工党联盟十多年来除了背叛他父亲的理想之外，什么也没做的又一证据！”阿德马尔上任仅一百天，就遭遇了首次失败。"
 brazil_adhemar.1001.a: "他也许输了一场仗，但战斗才刚刚开始！"
 brazil_adhemar_flavour.1.t: "宁静的早晨"
 brazil_adhemar_flavour.1.desc: "圣保罗的晨光中，莱昂诺尔·门德斯·德·巴罗斯匆匆翻阅日程表，就着早餐咽下最后一口咖啡。探访孤儿院、以教授身份回圣保罗法学院演讲、与丈夫在野餐会上进行公关拍摄——这位第一夫人轻笑摇头，门铃声恰在此时响起。她抚平珍珠项链的褶皱，步入宅邸车道上的黑色礼宾车。\n\n阿德马尔从来都是永动机般的男人，连片刻静坐都难以忍受。莱昂诺尔深知丈夫对圣保罗民众的赤诚，这正是她倾心的缘由。早在当选市长前，他通过慈善事业展现的仁心已为社进党赢得贫民窟与保守派精英的双重拥戴，奠定其过去十年在圣保罗的根基。而莱昂诺尔始终是这艘航船最坚定的锚。\n\n忧虑仍如影随形。首个五年任期甫启，丈夫已开始勾勒未来十年的蓝图。礼宾车驶入圣保罗天际线时，她凝视着车窗上自己的倒影——纵使阿德马尔行事愈发激进，她仍会是他最坚实的后盾。踏出车门时，破败孤儿院的景象却令她嘴角上扬：衣衫褴褛的孩童们睁着晶亮眼眸，朝巴西第一夫人奋力挥舞小手。\n\n若阿德马尔尚未完成对这些雏鸟的救赎，那么她的征途亦不会停歇。莱昂诺尔比谁都清楚，自己将在塑造巴西未来的史诗中扮演关键角色——不止为了这些小手的主人，更为了每个仰望星空的灵魂。"
 brazil_adhemar_flavour.1.a: "社进党的好妈妈会把一切打理妥当。"
 brazil_adhemar_flavour.2.t: "午后新据点"
 brazil_adhemar_flavour.2.desc: "弗朗西斯科始终不明白若昂为何执意更换棋牌据点。二十年来，他们与三五老友总在街角咖啡馆玩传统纸牌，啜饮醇香咖啡。虽说街对面有过小规模抗议，焚烧阿德马尔画像的焦糊味确实刺鼻，但警方处置得当。若昂却称心神不宁，自此缺席牌局。念及多年情谊，弗朗西斯科终究赴约新地点。\n\n穿行在贫民窟的阡陌巷弄，他惊觉居圣保罗六十余载竟从未踏足此区。不过距家不远，权当花甲之年的晨练。然而目之所及，尽是工党旗帜在窗棂间猎猎招展，仿佛有无数双眼睛正窥视着这位不速之客。\n\n二十码外，若昂正安抚两名少年，其中一人手持球棍。他再三保证弗朗西斯科只是牌友而非敌人，尽管阿德马尔亲近团结协定的行为已引发众怒。弗朗西斯科闻声转头挥手，少年们方才退入阴影。二人最终抵达新据点，与四位牌友共度午后时光。\n\n归途行至半程，弗朗西斯科方觉自己是贫民窟里唯一的异色面孔。若非若昂周旋，或许早在赴约途中便会察觉这份格格不入。"
 brazil_adhemar_flavour.2.a: "朋友就该彼此关照。"
 brazil_adhemar_flavour.3.t: "主仆倒转"
 brazil_adhemar_flavour.3.desc: "“伊比利亚，那是远在大西洋对岸的土地，是我们不少祖先的故乡！现在，该换你们去展现形象，看看他们过得如何了！”\n\n阿德马尔以满腔热情激励着桑托斯俱乐部的球员们，仿佛身处一场私人会面，但相机的快门声打断了他的大笑。礼貌性的掌声过后，问题如潮水般涌来，他一一作答，反复强调自己对球队的衷心支持。被硬拉来的球员们尽管有些迷茫，但面对记者还是毫不含糊地摆好姿势，露出笑脸。\n\n这次访问是为“两步走”策略：前脚造好势头，后脚开展外交。巴西的未来不一定在伊比利亚，但一定在欧洲。媒体面前笑一笑，周一早上一登报，届时便是十全十美。世上恐怕没有比这更便捷的宣传手段了。\n\n至于握手，谁能比球王本人更合适？阿德马尔大方地向贝利递出右手，站好位置后，又用左手拍了拍后者的背。这名前锋虽然对现场做作的气氛感到不适，但一切并非出于恶意。"
 brazil_adhemar_flavour.3.a: "只是预先安排好了而已。"
 brazil_adhemar_flavour.4.t: "过去与未来"
 brazil_adhemar_flavour.4.desc: "“巴罗波利斯的乡亲们，我要感谢你们的辛勤劳动，当然还有你们给小镇起的好名字，听着可老顺耳了。”阿德马尔的开场白引得举着标语牌的民众哄堂大笑。他正要继续演讲，亚马孙的湿热空气把他捂了个龇牙咧嘴——但在崇拜者眼中仿佛是个灿烂的笑容。这个企业镇成立于阿德马尔上任的同一个月，它的全部存在都归功于他。\n\n“让我们庆祝巴西终于走出前任留下的泥潭！在社进党之前，里约和巴西利亚的官僚们何曾正眼瞧过你们？你们要工作、要住房的呼声被当成耳边风。而现在我们来了，我们做到——”海潮般的欢呼声吞没了后半句，“阿德马尔”的喊声此起彼伏，总统知道这把稳了。\n\n“真他妈不要脸！”木材厂的传送带旁，某个工人骂了几句。那天晚上广播到处都在播这玩意，打开工厂的电视也全是他那张脸。“最恶心的是这混蛋从空调房里跑出来，装模作样来亚马孙打个转身就准备跑路，还要跟那帮跟屁虫演戏。”\n\n“少说两句，”另一名工人开口道，他已经听了同事抱怨二十分钟了。“他说得也没啥问题，我们现在有活干，有工资拿，有房子住，总比住贫民窟的烂棚子强。我们应该感恩——”\n\n“——感恩那帮奴隶主？感恩他们没把我们扔进沟里是吧！我们现在就是不叫奴隶这名的奴隶！再拉偏架，信不信我用你那根棍子敲你脑瓜子？”"
 brazil_adhemar_flavour.4.a: "他们同时凝视着过去与未来。"
 brazil_adhemar_forpol.1.t: "日程表的背后"
 brazil_adhemar_forpol.1.desc: "莉亚娜将一叠文件归入办公桌的档案柜，仰靠在椅背上凝望高原宫外巴西利亚的天际线。六年前她还是圣保罗社进党的一名基层宣传员，日复一日挨家挨户为阿德马尔和党的理念奔走。她永远记得那天阿德马尔突然造访竞选办公室，向全体工作人员致谢的场景——当主管称赞她是全办公室最勤奋的成员时，阿德马尔给了她一个感激的拥抱，那一刻她整张脸都烧成了晚霞。\n\n十年前在圣保罗街头，莉亚娜还是个带着弟弟在垃圾堆里刨食的孤儿。为了争夺那些卖不了几个钱的废铜烂铁，她不得不和流浪男孩们撕打。但没人料到这个瘦小的女孩会抓住社进党张贴的招聘启事——那上面写着“征募腿脚麻利的传单派发员”。\n\n如今她是阿德马尔的私人秘书，将总统的日程填满会议、医院学校的剪彩典礼和媒体活动。党部其他秘书总在窃窃私语，说这个出身卑贱的丫头最会溜须拍马才爬上高位。但莉亚娜心知肚明：她只是做到了极致。正如阿德马尔常说的，这是巴西对社进党的期许。\n\n敲门声打断了她的思绪。“在想什么呢？”阿德马尔倚在门边笑问。\n\n“没什么，总统先生！我这就工作！”莉亚娜慌忙坐直身子，却见对方伸手按在她肩头：“我相信你，下周一的日程让我看看？”翻阅着递来的打印稿，阿德马尔满意地点头：“和往常一样完美。陪我去花园散个步聊聊下周安排吧。还有——”他眨眨眼，“别搞得这么正式嘛，你让我觉得自己老了！”莉亚娜终于露出笑容，说道："
 brazil_adhemar_forpol.1.a: "“没问题，总统先生。”"
 brazil_adhemar_forpol.2.t: "徒托空言"
 brazil_adhemar_forpol.2.desc: "阿德马尔一边揉着太阳穴，一边看着桌上的时钟滴答作响。又是忙碌的一夜，这已经是他的第三杯咖啡了，但他仍能清楚地感受到困意正不停地撕扯着自己的大脑。他刚抿下一口咖啡，门就响了。\n\n“总统先生？基尔克大使就在这儿，你想见他吗？”\n\n阿德马尔站起来，整理了一下夹克。“当然，利亚娜，麻烦了。”她点点头，和大使一起走进来。“想喝点什么吗大使先生？”莉亚娜问道。基尔克摘下帽子，礼貌地笑了笑。“可以的话，我想要一杯你们最好的咖啡。”利亚娜又点点头，随后离开，让两人在总统办公室独处。\n\n“早啊，大使先生。今天温度对你来说还行吧？”阿德马尔笑了起来，柯克也被逗乐了。“好吧，总统先生，你的国家有许多东西让我着迷，比如多彩的文化、美味的食物和友善的人民，但温度可不是其中之一。真希望每个德国公民都能有机会用一杯浓郁的巴西咖啡来开始他们的一天。”\n\n“这个日子不远了。只是，贵国又能拿什么来交换呢？”阿德马尔一边问，一边给大使找了个座位。“是这样的，我知道一些IG法本的高管喜欢来巴西做投资，我的父亲就是其中之一。投的都是些石油和橡胶产品，主要在阿雷格里港那边，那里正好有我们需要的港口设施。”IG法本？这名字阿德马尔听着有点耳熟。“IG法本？他们之前是不是叫拜耳公司？”阿德马尔自言自语道。“确实如此，总统先生。你居然知道这个。”“嗯，我年轻时给他们当过翻译。”“那挺好，如果你熟悉他们，我的工作可就轻松多了。怎么说，总统先生？”"
 brazil_adhemar_forpol.2.a: "“听上去不错。”"
 brazil_adhemar_forpol.3.t: "日光婆娑的午后"
 brazil_adhemar_forpol.3.desc: "一家小型咖啡馆的遮阳伞下，在一片阴影之中，一个男人坐着，抽了口雪茄。小小的桌子上放着一个咖啡杯，空了有些时候了，可见他很喜欢这咖啡。咖啡店的视野很好，能清楚地看见熙熙攘攘、热热闹闹的里约热内卢街道，以及其背后雄伟壮观的基督救世主像。他从公文包中拿出一份报纸，读了读头条。“总统腐败缠身再陷窘境！反对党趁机发威提出弹劾！”这标题把男人逗得合不拢嘴。进展真是有趣，他想着，在他的祖国，这种标题可是连印刷的机会都不会有。他快速地翻阅着报纸，一个黑人女服务员沿着他的桌子走来。\n\n在他的国家，她这样的人可是找不着工作的。男人看向街边小贩，看着他们推销着自己的商品和食物。巴西的种族多样性可谓让他“瞠目结舌”，在此之前他还从未见过有如此之多的，来自不同民族与种族的人，聚集在同一个国家。这些人曾经可是我们的盟友，男人想，才不过十年，他们怎么就成美国佬的哈巴狗了？不过，这个国家至少在某些地方和自己的家乡有着相似之处。那就是臭名昭著的纳粹银行家赫尔曼·约瑟夫·阿布斯，能靠着一本假护照和一名收钱后便“选择性失忆”的海关溜进巴西。\n\n阿布斯起身摘下帽子，向在收银台工作的年轻人敬了个礼。他清楚自己现在必须给日耳曼尼亚的朋友们打几个电话。尽管对巴西的了解不多，他还是知道一些方法，好让德国的势力进入这里。这里有着大量等着变现的钞票，而阿布斯会是第一个吃螃蟹的人。"
 brazil_adhemar_forpol.3.a: "金钱所致，金石为开。"
 brazil_adhemar_forpol.4.t: "夜班"
 brazil_adhemar_forpol.4.desc: "阿德马尔盯着莉亚娜走前留给自己的那堆文件，对他俩而言工作到天明已是常态。他刚拿起笔，就被突然响起的电话铃吓了一跳。见鬼，谁会在这个时间打过来？他一边抱怨一边接起电话。\n\n“这里是八西总统的办公四吗？艾德妈尔·德·爸罗斯先生的办公四？”电话那头的葡萄牙语一言难尽。阿德马尔皱了皱眉淡淡地问道：“谁啊？这个点打来，最好值得我花时间。”\n\n“哦，当然。艾德妈尔先森，能麻烦您去看看高猿宫的信箱吗？我给您留了些文件。”“你最好先亮明身份，再提要求。你的葡萄牙语真是离谱，还带着严重的口音。”\n\n电话那头的人笑了笑，“好的，如您所愿。这里是赫尔曼·约瑟夫·阿布斯，时刻为您孝劳，总统先森。我之前花了大概一个刑期，在贵国驴友了一圈，欣赏了贵国的美景，了解了一下贵国的人民，还和几个食业家聊了聊。我们IG法本对于投资贵国很感兴趣，当然，还有贵国的人民。我想您应该不会拒绝成千上万的工作岗位和为贵国最为聪慧年轻的一批人提供资助的机会吧？只要您点点头，我们可以马上派出数十名技术专家来指导贵国的工程师，让贵国走向烦荣。”\n\n阿德马尔脑中此时千头万绪。一个臭名昭著的纳粹银行家到底是怎么溜进巴西的？来旅游？阿布斯还和哪些人谈过？他又许下了多少承诺？巴西到底有多少德国特工？“您不说话的话我就当您默认了。为什么不去看看那些文件呢？看完后再给我回复吧，或许等个更合适的时间？我真的得去睡觉了，总统先森，期待您的好消息。”说完他挂断了电话。"
 brazil_adhemar_forpol.4.a: "阿德马尔瘫在椅子上，手足无措。"
 brazil_adhemar_forpol.5.t: "每日运动"
 brazil_adhemar_forpol.5.desc: "菲林托·穆勒又呷了口咖啡，翻阅阿德马尔秘书给他的一份备忘录。“社进党政治保密做得还不如社民党，”穆勒想着，将空杯放回茶几。当他整理衣冠走向参议院，他又在脑内过了遍选举结果。倘若万无一失，穆勒就能分流掉那个被社进党称为“领袖”的废物共党足够多的选票。虽然刚转党，穆勒深知，巴西若想重拾新国家体制时期的辉煌，有些事不可不为。\n\n一打开参议院大门，穆勒就看到老上司罗梅乌·德·坎波斯·韦加尔正向几头工党蠢猪为份一无是处的福利法案央求选票。就座时，他竖起一根手指向参议院主席致意。所幸主席很快就注意到了他。伴随一声锤响，“请来自马托格罗索州的先生发言！”，穆勒高举起他起草了几个月的议案。\n\n“请允许我介绍‘取消对团结协定禁运’法案”，穆勒盯着瞠目结舌的韦加尔，嘴角浮现一丝微笑。话音方落，整个议院乱作一团，全民盟和工党议员叱问穆勒，社民党议员也在旁边大声起哄。\n\n“先生们！先生们！我们都知道，为了巴西的复兴总该做些什么！”穆勒大呼，法槌声也一声强过一声，然而于事无补。人们开始向穆勒掷钢笔，他的马托格罗索参议员同事只得躲在桌下。"
 brazil_adhemar_forpol.5.a: "当日，穆勒共计“荣膺”46支新笔。"
 brazil_adhemar_forpol.51.t: "热烈欢迎"
 brazil_adhemar_forpol.51.desc: "对德禁运的解除将参议院的喧闹推向无序混乱。在维持秩序时，一些胆怯的议员悄悄溜走了，而他们一些热血的同事则抄起了家伙——鞋子、公文包或手头的任何东西，徒劳地阻止法案通过。而在隔壁总统办公室，阿德马尔总统看着一份议案副本，一筹莫展。一切都来得太快了。他签署了议案，将其丢在一边。参议院这么快表决通过简直是闻所未闻，德国佬肯定也在背后插了一手。\n\n“帕苏斯！你这狗叛徒！”全民盟的某位领导大叫。“拉塞尔达，我只是为我代表的选民发声，解除禁运会给巴西带来新的就业和投资。”“那你就能祸害祖国？你怎么不去和社进党法西斯上床？蠢蛋，你被开除党籍了！”拉塞尔达嘶吼着，砸掉了电话听筒。\n\n祖国何去何从？莱昂内尔·布里佐拉对现状难以置信。当他走上舞台振臂高呼，面对满满一剧院的工党拥趸，宣布阿德马尔只是德国的一介提线木偶时，掌声经久不绝。但布里佐拉还是担心，如果这都不能激励工党干倒阿德马尔，那也没什么能了。\n\n与此同时，在家作画的雅尼奥·夸德罗斯也得知了这消息。巴西终于挣脱OFN的束缚了，这太迟了，但来得迟总比不来好，总统府的肥猪也不是一无是处。夸德罗斯想着，完成了最后的润色。"
 brazil_adhemar_forpol.51.a: "欢迎来到巴西，德国人。"
 brazil_adhemar_forpol.52.t: "疑虑渐生"
 brazil_adhemar_forpol.52.desc: "劳多·纳特尔已经胃疼了好几天，但他并不认为自己真的生病了。他啜着杯中水，开始例行公事：阅读巴西日报《圣保罗页报》。头条新闻让他的胃更加不舒服了：“阿德马尔·德·巴罗斯：灰皮法西斯？”劳多的目光扫过页面，发现那是一篇将阿德马尔的胡须与希特勒的小胡子相比较的文章。他放下水杯，揉起太阳穴。巴西利亚到底发生了什么？不是最早要到明年才解除禁运吗？他思索着加速的原因。\n\n阿德马尔曾向他保证，他绝不会向德国低头，但在劳多和这个国家的其他人看来，他确实这样做了。老实说，劳多觉得这已经是他和阿德马尔之间第二次失信了。曾经可靠的社进党大家长如今不仅挪用了他的副总统竞选资金，现在又犯了劳多认为是致命的外交政策错误。总统竞选带来的名声和辉煌真的让他的好朋友变坏了吗？\n\n劳多站起来，摇了摇头。这样想不对。但他还是得做点什么。德国人肯定会借此机会用他们的特工和计划淹没这个国家，但劳多决心监视他们的一举一动。他们被允许入境，但这并不意味着他们可以像对待其他“伙伴”那样破坏他的家园。"
 brazil_adhemar_forpol.52.a: "社进党的参谋长保持警惕，不是为了他的政党，而是为了他的国家。"
 brazil_adhemar_forpol.53.t: "雪上加霜"
 brazil_adhemar_forpol.53.desc: "“这他妈也太扯淡了。”马尔钦抬头看了看他的朋友雅伊梅，他正在看报纸。“阿德马尔怎么能这样背叛咱们！”“哎呀，政客嘛，”另一个人说道，“能赚钱他们就把你卖咯，德佬又有钱的紧。”雅伊梅站起身来，对着那人指手画脚，怒得撞开了两人中间的桌子。“有钱是吧，把咱们的人民累死，搞文化灭绝，你他娘就是个白痴！”那人骂骂咧咧地走开了。马尔钦从椅子上跳起来，使劲拉住雅伊梅。“雅伊梅，冷静点！你这是咋回事？！”“你听到这杂种的话了吗，马尔钦！好像钱是唯一重要的东西似得！”\n\n马尔钦叹了口气。社进党对库里蒂巴（不，全巴西）波兰社区的背叛令人震惊。“看来下次选举我要投别人了。”雅伊梅抱怨道。“我讨厌全民盟的经济政策，但至少他们支持美国人，不会支持狗纳粹。我想这就是我们不得不堕落到的地步。”当雅伊梅瘫倒在被他扇耳光的人的空位上时，又有两个人走近他们的桌子。\n\n“哇，看看你们，”亚历山德拉微笑着，她的朋友阿丽亚娜用两只手靠在她的肩膀上。“你们俩怎么一脸愁容呀？从来没见过你们的小脸缩得这么紧！”阿丽亚娜笑了起来。雅伊梅大声抱怨，一边把报纸往两个女孩的方向推。“哦，这个吗？”阿丽亚娜说。“我爸爸已经计划下周上街抗议，反对阿德马尔签署那项法案。你们俩应该把负能量发泄到那里去，而不是这里。我听说一些来自里约的记者要来领导抗议活动。”\n\n雅伊梅和马尔钦面面相觑，马尔钦耸了耸肩。“只要能让你别再在这骂别人娘就行。那家伙叫什么名字？”"
 brazil_adhemar_forpol.53.a: "阿丽亚娜用口香糖吹了一个泡泡。“我想是拉塞尔达之类的人吧。”"
 brazil_adhemar_forpol.54.t: "不和"
 brazil_adhemar_forpol.54.desc: "“……这笔额外的公共服务资金将给普通巴西人带来多大的好处，实在不可小觑。这是地缘政治的现实——我们不能完全排除解除对德贸易禁运的可能性——”\n\n声音戛然而止，罗梅乌·德·坎波斯·韦加尔关掉了收音机，心里默默地咒骂自己为何要收听广播。这就是阿德马尔宣传机器最近一直在推动的——那个关于解除对德贸易禁运的愚蠢想法竟然被视为合理决定。党里的人都发癫了，阿德马尔说跳崖，他们就会跳的。\n\n他愤恨地点燃一支雪茄，品味着那股苦涩的味道。他这是怎么了？创建巴西国家石油公司的光辉岁月已经让位于蹉跎度日：在众议院里召集一群愈发反动的傀儡，徒劳地希望他们能长点良心、投票支持一些进步法案，还得看着菲林托小团体动不动就跳起来叫什么赤匪间谍。\n\n坎波斯把雪茄掐灭在烟灰缸里，叹了口气。在这样的日子里，他考虑过离开社进党去寻找更好的机会，以此对阿德马尔及其亲信表示不满。但他怎能这么做？他帮助创立了这个党，这是他的家，他的事业。总有一天阿德马尔会离开，到那时，党就会走上正确的道路。\n\n突然，坎波斯灵光一闪，差点打自己一巴掌。怎么能忘了这么重要的事！？党内还有一个重要人物——他非常有必要与之交好。他拨打电话号码，对方接起话筒，这让他几乎欢呼雀跃起来。"
 brazil_adhemar_forpol.54.a: "“瓦加斯先生！您今日可好？”"
 brazil_adhemar_forpol.6.t: "又一日"
 brazil_adhemar_forpol.6.desc: "“学生抗议活动席卷联邦大学”，“拉塞尔达呼吁弹劾‘巴西希特勒’”，“自德国禁运讨论以来社进党支持率下降七个百分点”——菲林托·穆勒手中报纸的头版头条。他一边啜饮着每天必饮的那杯咖啡，一边忍不住笑了起来。仅此而已！不过是几个打着自由主义大旗跑到大学里捣乱的小鬼、还有那个总是躲在办公室里搞鬼耍小聪明的政客而已。穆勒还以为工党和社民党会提出一些实质性的反对呢。\n\n但他看得更透彻。他之所以离开那些意志薄弱的懦夫，自有其原因。大多数社进党人都坚定不移地支持穆勒，他所要做的，便是从其他三个党派争取一些意志动摇的议员，好在参议院获得足够的票数，顺利通过法案。他的行动迅速高效：这里一张图表，那里一组数据，已经说服了不少参议员支持他结束对德国势力圈禁运的法案。“这能给我们的产业带来多少增长？”“真的能达到这样的增长水平吗？”这是他在过去两周里不断听到的问题。\n\n当然，即使这些都没起到作用，穆勒也没忘记社进党那一套行之有效的策略。只需贿赂那些死脑筋的家伙好啦，至于后果，以后再说。新开辟的贸易将把德国的商品带到巴西的港口，这笔钱足以弥补他为争取更多参议员支持而花费的资金。他的上司无疑也会同意采用同样的策略，帮助他走进圣保罗州长的官邸。"
 brazil_adhemar_forpol.6.a: "老路子就是好路子。"
 brazil_adhemar_forpol.7.t: "领袖的警告"
 brazil_adhemar_forpol.7.desc: "清晨，莉亚娜跟往常一样努力工作，突然，总统以十足猛烈的气势推开了办公室的门。“总统先生？！您还好吗？”她问道，阿德马尔以砰地一声关上门作为回答。哦，莉亚娜懂了，所以他又要打那种电话了。\n\n她刚坐下，就透过门听到阿德马尔的声音。“穆勒！！你到底在干什么！这么早就发起这样的投票，还没到我们约定的日期！”莉亚娜心里一沉。这与她交给新参议员的文件有关吗？她以为那只是一份关于巴西潜在贸易伙伴的不甚要紧的文件。还没来得及整理思绪，她又听到上司的咆哮。\n\n“我现在不在乎跟谁做贸易最好。我们都同意在合适的时候取消禁运。”咆哮声暂停了一会，然后又继续。“是是，从长远来看这对巴西有利，只要你在那之前不把我们的该死的党搞垮啊！你这白痴！”莉亚娜站起来，在办公室里焦虑地踱步。总统今天心情特别不好，这意味着她稍后会有额外的工作。“永远别忘了谁是党的话事人，穆勒。你可能能叫得动韦加尔，但我不会让你瞎胡闹腾。”\n\n“下次你想把你那些愚蠢的政策拿去投票，先问过我。个小王八蛋，别忘了你过去都干过啥。我们记得你在新国家体制下干的那些腌臜事，翻版希姆莱。”\n\n阿德马尔砰地一声挂断电话，打开办公室门，脸上带着愤怒的红晕。“莉亚娜，”他露出他的招牌微笑，“我能和你聊一会儿吗？”"
 brazil_adhemar_forpol.7.a: "“当——当然，总统先生。”"
 brazil_adhemar_forpol.8.t: "全新领域"
 brazil_adhemar_forpol.8.desc: "罗伯特·基尔克还不适应这种疾风骤雨般的推进速度。他感觉自己昨天才被任命为大使，国家与巴西的关系正常化进程却已取得重大进展。日耳曼尼亚也深谙此道，确保基尔克手中的资金远超实际所需。当然考虑到大部分交易仍需台面下进行，实际金额依然不大，但他清楚知道这些钱流向何方——全都进了菲林托·穆勒参议员的口袋，以便这位可敬的议员能在参议院继续施展手腕。民主制度的精妙之处啊，基尔克转动座椅面向巴西利亚的城市天际线时，嘴角扬起笑意。\n\n在基尔克看来，穆勒法案的通过早已板上钉钉。真正重要的是法案通过后如何保持发展势头。如今国家正一帆风顺，穆勒至今也算得上是称职的领航员。但基尔克清楚还有几件必须与祖国协调完成的事项：大使馆需要增派人员编制，要在巴西安排与实业家的会晤，还需引进德语教师为巴西工人和青年授课。至于文化展览……那是改日再议的问题，基尔克心想，凡事总要循序渐进。\n\n但不可否认穆勒已开辟出无限可能。需要在巴西各大城市物色领事馆选址，虽然听闻巴西高校颇有建树，但终究无法与祖国的顶尖学府相提并论。学生交换项目将成为国家巩固与巴西人民新伙伴关系的纽带之一。毕竟这才是终极目标——让两国及其人民真正心手相连。"
 brazil_adhemar_forpol.8.a: "赶紧行动起来，基尔克想着。"
 brazil_adhemar_forpol.9.t: "公牛漫步雄鹰之下"
 brazil_adhemar_forpol.9.desc: "雅尼奥·夸德罗斯有些焦躁。他的起居室现在看起来更像是艺术家的工作室，画架和画布正对着阳台，让他能够业余地耍弄丙烯颜料，尝试描绘圣保罗日落时分的天际线。虽然他自知自己没什么艺术造诣，但直到最近他还以为自己可能会当上总统，而且他也不想过多地纠结于他那破灭的梦想。\n\n画架对面摆着一台电视机——这台松下的时髦玩意儿同样是供夸德罗斯消遣或排解情绪用的。他打开电视收听新闻，屏幕发出的淡淡白光盖在他溅上颜料的衬衫上。\n\n“政界仍在热议阿德马尔总统今日所作的宣告，”播音员的声音传来，“巴西将立即退出OFN。”夸德罗斯的目光被这则报道牢牢锁住，镜片上反射出电视的画面。“巴西加入美国主导的军事同盟后又迅速脱离，阿德马尔任期伊始便出现如此反复，着实让不少人感到意外。”\n\n夸德罗斯嘴角浮现出一抹略显尴尬的笑容，不由自主地笑出声来。阿德马尔·德·巴罗斯这家伙连自己的妈都敢挂个价卖掉，但他绝不会为讨好美国人而出卖国家利益，这一点值得肯定。尽管夸德罗斯并不信任、也不喜欢这位同僚，更谈不上祝福，但他不得不承认，阿德马尔迅速纠正了拉塞尔达的错误。\n\n这绝对值得喝一杯，正当夸德罗斯转身准备倒酒时，电视画面切到一位身着棕色西装的德国外交官，他在镜头前一本正经地表示，这是巴西主权的胜利。“德国期待与新一届政府开展卓有成效的合作。"
 brazil_adhemar_forpol.9.a: "那天晚上，夸德罗斯放下了成为维克托·梅雷莱斯的雄心壮志。"
 brazil_adhemar_removeedna.1.t: "With Edna Removed, Adhemar Goes to Drink a Cup at the Nurse Cafe"
 brazil_adhemar_removeedna.1.desc: "With a spring in my step, I smash the windows of every house I pass by\n    Yeah, yeah, yeah, yeah, yeah To the Nurse Cafe\nTo imbibe the principles that produce rainbows I open up the sky\n    Yeah, yeah, yeah, yeah, yeah To the Nurse Cafe\n\nIlluminating a hundred nights with miraculous cheers\n    in an operatic tragedy locked away a hundred years\n\nWhile exchanging greetings I kick all the doors along the way\n    Yeah, yeah, yeah, yeah, yeah To the Nurse Cafe\nTo imbibe the truths that blossom flowers I close up this day\n    Yeah, yeah, yeah, yeah, yeah To the Nurse Cafe\n\nThe melodious days that come and go without the slightest courtesy\n    make a hundred nights ring aloud with the bells of Lady Misery"
 brazil_adhemar_removeedna.1.a: "Nurse Cafe, Nurse Cafe..."
 brazil_adhemar_coma.1.t: "伊卡洛斯"
 brazil_adhemar_coma.1.desc: "烘焙咖啡的醇香与远处航空煤油气息交织弥漫。阿德马尔将劳多召至新建的豪华航空俱乐部——这所谓“休沐日”实为全国飞行巡礼，总统正重拾飞行员时代的荣光。\n\n随安保人员穿过玻璃幕墙，劳多看见阿德马尔独坐云端：整面落地窗将塞拉多草原的碧绿倾泻而入，大理石地砖折射出悬浮于蔚蓝的剪影。劳多挥手示意，总统的视线却穿透绿野投向天际。\n\n起初是微渺黑点，渐次化为单引擎飞机的轮廓。这架“保利斯塔”飞机优雅降落后，地面人群挥手致意。但飞机未作停留，在劳多落座瞬间再度昂首冲霄——触地复飞的姿态，恰似政客宣称造访某地却从未真正驻足。机翼掠过云层时泛起的金属冷光，仿佛向人间抛来讥诮的眨眼。\n\n“我要连任。”阿德马尔放下咖啡杯。劳多早有预感，但仍试探：\n\n“时机成熟吗？”反对派必将殊死反扑，这步险棋需精密布局。\n\n“再等就来不及了。”总统握紧杯身，实则胜券在握——那张渴望重归权力核心的终极王牌已准备就绪。阿德马尔瞥了眼精准走时的荣汉斯腕表，戴好飞行帽走向跑道。升空前他最后一次回望劳多，眼底掠过鹰隼般的锐光。"
 brazil_adhemar_coma.1.a: "“打给库比契克，他会感兴趣的。”"
 brazil_adhemar_coma.2.t: "巴西刺头"
 brazil_adhemar_coma.2.desc: "“总统先生。”\n\n“什么事，局长？”\n\nFBI局长把一个文件夹放在总统办公桌上。“坏消息，线索表明我们在拉美线人的失踪与巴西总统办公室有关。您看第一页上面，一个叫莉亚娜·克莱门特的女人以总统私人秘书的身份进入了政府，途径只能是色诱。”局长指向一组照片，“她一直在给我们已知的几个德国联络人——比如菲林托·穆勒——提供情报，内容基本都涉及我们在当地的特工和线人。他们正挨个被挖出来。”\n\n“她会不会也影响了德·巴罗斯的某些政策，像结束对德禁运？”总统问道。\n\n“很有可能。我们推测她是为巴西和德国实业家赫尔曼·阿布斯牵线搭桥的关键人物。”局长停顿了一下，接着说道：“这还不是最糟糕的，先生。根据一些前特工传来的情报，巴西的核工程已经初具雏形。我建议趁事态还没进一步恶化，立即对阿德马尔政府采取行动，尽一切手段扰乱巴西政局。现在很多政客都对阿德马尔不满，这是我们的好机会。”\n\n总统合上文件夹。"
 brazil_adhemar_coma.2.a: "“按你的计划来，局长。阿德马尔必须下台。”"
 brazil_adhemar_coma.3.t: "新的机遇"
 brazil_adhemar_coma.3.desc: "德国外交部大楼的某个房间里，一位资深官员正在撰写一份关于巴西参议院近期选举的报告。随着笔尖划过纸张，他喜形于色：这份报告将规划好国家未来几年的外交政策。而事实上，与德国在巴西取得的成果相比，他的工作可谓微不足道。\n\n德国虽自诩为世界大国，在欧洲之外的影响力却极其有限。自六十年代开始，德国付出了巨大的努力试图在南美站稳脚跟。然而，巴拉圭、多米尼加、哥伦比亚……没有一个能像巴西这般反响热烈。阿德马尔·德·巴罗斯总统明智地决定重建对德关系，两国间的合作因而达到了前所未有的高度。\n\n德国的商品、武器和专家远涉重洋来到巴西，一同前来的还有一批情报人员，他们要在这里建立起间谍网络。早在大众汽车占领巴西的大小道路之前，[getGermanIntelAgencyShort]特工就开始接触德裔社区和亲德政治家。时至今日，德国已然在美国的后花园夺下了一席之地，足以抗衡整个拉美地区的OFN力量。\n\n这一外交胜利的影响不容小觑。德国证明了自己是一个可靠的盟友，假以时日，拉美国家便会纷纷向德国敞开大门。“德国制造”会占领从阿根廷到墨西哥的货架，而德国海军也会获得更多的行动基地。美帝国主义在拉美最强大的对手将不再是日本，而是德国。"
 brazil_adhemar_coma.3.a: "“黑鹰腾空，白鹰坠地。”"
 brazil_adhemar_coma.4.t: "暗处的警告"
 brazil_adhemar_coma.4.desc: "拉塞尔达最初独坐在大使馆昏暗的房间内。半小时后，布里佐拉推门而入；十分钟后内维斯也神秘现身。“坐无牌车从后勤通道进来的？”拉塞尔达问。两人点头印证了他的猜想。巴西反对派领袖们竟在深夜被分头接往美国大使馆——何等惊天密谋需要这般鬼祟？\n\n当木门第三次开启时，答案揭晓。数道黑衣身影鱼贯而入，在对座点燃香烟。打火机的微光偶尔映出刀疤眉骨，烟雾与阴影在寂静中纠缠。布里佐拉与内维斯如坐针毡，拉塞尔达却紧盯为首黑影——他已预见到对方即将亮出的底牌。\n\n牛皮纸档案袋滑至面前。拉塞尔达倾身翻开时，两位同僚也凑近窥视袋中宝丽来照片：无数阿德马尔政府要员的黑白偷拍照——或与德国官员握手、或收纳鼓胀信封。拉塞尔达感到胸腔怒火翻涌，他早警告过这群纳粹虫豸已蛀空政府。\n\n但另一种情绪同时升腾：正义感！昭雪的快意！狂喜！尽管昔日警示无人倾听，此刻正是发动圣战的绝佳时机。\n\n他深知未来数日必须集结全民盟内的残余盟友与媒体，对阿德马尔展开舆论绞杀。“阿德马尔总统”……光是想到这个头衔就让他作呕。"
 brazil_adhemar_coma.4.a: "一切顺利的话，他就不用再忍下去了。"
 brazil_adhemar_coma.5.t: "早间新闻"
 brazil_adhemar_coma.5.desc: "人人都有赖床的权利，即便是总统也不例外。在选举季这样的关键时期，充足的休息更显得弥足珍贵。只可惜，悠闲的时光总是那么短暂。使命正在召唤，巴西还在等待。\n\n起床后的流程早已固定：快速洗漱完，吃早餐，开启新一天的工作。但今天，摆在阿德马尔·德·巴罗斯的早餐旁的不是热气腾腾的咖啡，而是一份新鲜出炉的报纸，上面赫然印着：“德国对巴西的渗透：阿德马尔政府收受德国资助？”“一派胡言”，阿德马尔在内心驳斥道。不过要说他与日耳曼尼亚一点联系没有，那也是凭空捏造。\n\n他赶忙出发，穿过一群顾问和同事，朝自己的办公室冲去。呼吁加强对德关系的支持声、指责这只是给巴西换了个主子的反对声以及各种各样的建议声不绝于耳，如同一群在他耳边嗡嗡叫的蜜蜂，一路跟随他来到了总统府。眼前的混乱无时无刻不在分散他的注意力，令他无法倾听自己的心声。在这种情况下，要决定一个国家的未来简直是痴人说梦。\n\n一声咆哮过后，顾问们悉数离开，偌大的房间里只剩下了阿德马尔一个人。他抬起头，正好对上了画像中华盛顿·路易斯那深邃的目光。他的大脑在飞速地运转，不断重复着同一个问题："
 brazil_adhemar_coma.5.a: "“怎么办，怎么办？”"
 brazil_adhemar_coma.6.t: "悼词"
 brazil_adhemar_coma.6.desc: "阿德马尔看着自己最信赖的顾问们，他们个个神经紧绷。不少人衣冠不整，有的睡眼惺忪，有的身上一股馊味，还有的两者都占了。少数几人要么缺席，要么就是被刻意排除在外，比如埃德娜和外交部长——后者很可能是全民盟安插的内鬼。但事到如今，即便是劳多和社进党这样的铁杆支持者也开始动摇了。当下，阿德马尔必须让部下们重拾信心，让他们相信自己仍有办法。\n\n他尽量拉大嗓门来掩饰内心的紧张，告诉众人：\n\n“这些天我们被打了个措手不及，但情况还算可控。敌人这回彻底暴露了他们的身份，很快名单就会拟好，这些犯罪分子和叛徒马上就将尝到我们的怒火。”无人回应。\n\n“尤其是菲林托·穆勒，我保证要让他受到报应！”一些人点头以示赞同，“那些泄密的也一个别想逃，必须狠狠堵住他们造谣的嘴。”房间里响起几声讥笑。几分钟过后，阿德马尔宣布了一个坏消息。\n\n“很不幸，我不得不回圣保罗一段时间，稳住大老板们的支持。我相信你们诸位能把事情安排妥当，要相信自己的能力，相信我们代表的是巴西人民。别管报纸上怎么说，我们才是这个国家的未来。”\n\n又是一片沉默。十几双眼睛茫然地盯着阿德马尔。紧接着，忠贞不渝的劳多率先起身，开始拼命地鼓掌，其他人见状也纷纷效仿。很快，掌声便响彻整栋大楼……"
 brazil_adhemar_coma.6.a: "但无一出自真心。"
 brazil_adhemar_coma.7.t: "终点线"
 brazil_adhemar_coma.7.desc: "阿德马尔总统坐在英特拉格斯赛道的看台上，下方赛车的轰鸣声差点震破他的耳膜。这座赛场是阿德马尔留给圣保罗的礼物，也是他和本地寡头保罗·马卢夫约定的会面场所，但现在，他有些后悔这个决定了。\n\n“你放心，马卢夫先生！一切都在控制中！”他用嘶哑的声音吼道，啤酒味的唾沫四处飞溅。寡头是阿德马尔最放心的一类人，他们偏爱现状，很难倒向反对派一边。然而危机当前，亲自确认这一点还是很有必要的。\n\n“别……心。总……生……保罗……持您。”巨大的噪音下，阿德马尔只能听见对方的只言片语。\n\n“大点声，我听不清！”阿德马尔喊道。“我说圣保罗支持您，先生！”\n\n“我欣赏你的忠心！”阿德马尔大吼着回复道，“要是能等到比赛结束再谈就更好了！”\n\n“您说什么，先生？比赛五分钟前就结束了啊。”保罗露出一脸的讶异。\n\n阿德马尔望向窗外，瞬间心头一沉。保罗没有说错，赛道上此刻空无一人，赛车已经停了下来，比赛……真的结束了。"
 brazil_adhemar_coma.7.a: "可这嗡嗡声……还不肯停！"
 brazil_adhemar_coma.7.b: "老天，谁来帮帮我！"
 brazil_adhemar_coma.7.c: "头好痛，痛得要死！"
 brazil_adhemar_coma.8.t: "重重一击"
 brazil_adhemar_coma.8.desc: "放下架子，忘掉身份，是时候聆听天主的指引了。阿德马尔满怀谦卑地回到了他的灵魂圣地——阿帕雷西达圣母教堂，除了他的家人和劳多，恐怕没人会认出眼前这个衣着朴素的人竟是巴西的总统。\n\n“我们在天上的父，愿人都尊你的名为圣，”总统跪在地上，小声地祷告着，“主啊，请指示我。”这是阿德马尔的真心话，当下的危机令他焦头烂额，只得向上帝求助。\n\n祷告完毕，他突然心血来潮，起身环顾起四周。远处的脚手架上，几名工人正在安装一盏华丽的枝形吊灯，而在中殿另一侧的封闭区域后方，一位雕刻家正忙于对雕像进行最后的打磨。自豪感在阿德马尔内心油然而生，这一切都是政府和辛劳的人民携手创造的成果。\n\n“嗯？”阿德马尔刚要离开，突然感觉胸口一阵疼痛。“怎么回事？”他一边寻找原因，一边朝前厅走去。“今天还没吃东西，应该不是被下毒了吧。呃，头好晕——”\n\n在堂区居民们惊恐的目光中，巴西合众国总统阿德马尔·佩雷拉·德·巴罗斯栽倒在地上，不省人事。很快，警察便蜂拥而至，在教堂周围拉起了警戒线。其中一名警员向慌张的神职人员喊道："
 brazil_adhemar_coma.8.a: "“快叫救护车——再拿圣油过来！”"
 brazil_adhemar_coma.800.t: "最糟情况"
 brazil_adhemar_coma.800.desc: "劳多·纳特尔端详着眼前的照片。照片摄于巴西利亚，上面勉强看得到一个穿着厚外套、戴着帽子的女性，十有八九就是那条狡猾的毒蛇——莉亚娜·克莱门特。然而具体如何，劳多却无法一口咬定：照片中的女性虽然面部与之相似，但身高并不匹配，当然，这也可能是拍摄角度的问题。\n\n劳多咒骂了一句，把照片扔回堆里，这样找下去没有任何意义。不可否认，德国人找到了一个狠角色，可以悄无声息地溜进政府大搞破坏，即便露出马脚也能迅速销声匿迹。要想抓住她的尾巴，难度堪比登天。\n\n突然，电话响了。劳多拿起听筒，刚要开口，却被电话那头的小热图利奥·瓦加斯打断了。“劳多！”对方惊恐地说道，“总统昏迷了，医生不知道他能不能醒过来！”\n\n时间仿佛静止了。劳多瞪大了眼睛。“上帝啊。”他说，用手不断捋着头发。他脑袋里的问题多如牛毛：这是什么时候发生的事？幕后黑手是谁？会不会是行踪不明的克莱门特所为？不过，这些都可以稍后再谈，现在的他只关心一个问题。“全民盟和社民党的反应呢？”他如是问道，心中却早已有了答案。\n\n“不清楚，但他们肯定会趁这个机会弹劾总统，这群……心胸狭隘、无可救药的混账！”果不其然，保卫阿德马尔遗产的任务落在了自己肩上。劳多咬咬牙，回复道："
 brazil_adhemar_coma.800.a: "“我马上就到。记住，不管发生什么，我们都要团结一心。”"
 brazil_adhemar_coma.9.t: "消息流出"
 brazil_adhemar_coma.9.desc: "安东尼奥·维达尔正带着他前所未有的愤怒对着打字机写稿。他就像一支行刑队，而键盘上飞舞的手指是他的武器。每过一小时，就会爆出一桩新的丑闻，一次新的失态，一个阿德马尔的棋子被踢到一边。手指作痛，眼睛疲劳，但直到阿德马尔的政治生命彻底完蛋之前，维达尔都不打算停下一分一秒。\n\n雅尼奥·夸德罗斯靠在皮椅上，透过模糊的视线，看着抖动的电视屏幕笑出声来。新闻刚爆出来没多久，他的房间就已经一片狼藉，到处散落着空酒瓶和脏报纸。夸德罗斯混乱的头脑几乎没听到评论员在说什么，但新闻本身的意义已经和威士忌一起流进他大脑里了。阿德马尔完蛋了，这绝对值得庆祝一番。\n\n卡洛斯·拉塞尔达在房间里翻箱倒柜找他的手表。电话线缠绕在一起，他一边用力扯线，一边徒劳的试图对巴西利亚酒店的工作人员表达事态之紧迫。“你给我去安排好那该死的房间，不然我就让本地评论员活剥了你！”他对着电话大吼，然后狠狠把它挂掉。算了，他用不上手表，眼下就是最重要的时候。拉塞尔达冲出门外，把门摔得震天响，他的衣着凌乱，头发跟鸟窝一样，但这都不重要。现在他唯一在乎的就是他的“猎物”，而他必须迅速行动了，很快，整个首都的秃鹫都会闻风而至……"
 brazil_adhemar_coma.9.a: "……来瓜分阿德马尔·德·巴罗斯的尸体。"
 brazil_adhemar_coma.10.t: "战线"
 brazil_adhemar_coma.10.desc: "坦克雷多·内维斯和乌利塞斯·吉马良斯几乎没有像现在这样并肩作战过，更别说现在二人正匆忙穿梭于参议院的走廊，手上拿着同一份议案，上面甚至同时盖着社民党和全民盟印章的场景了，这真是极为罕见。他们正挤过议员人群，急着去主议事厅，这两位宿敌要提交同一份议案给议长，对付共同的敌人。\n\n“如果内阁不能履行他们的职责，那国会就必须保护共和国免受他们错误伤害。”吉马良斯对着议事厅里的人高声说道，他气喘吁吁的说：“这就是为什么我和内维斯先生提交了一份弹劾总统的议案，以履行我们对巴西人民的职责。”\n\n社进党议员那侧立刻爆发出一阵嘘声，而另一边则掌声雷动。吉马良斯剩下的讲话被议员之间的窃窃私语盖住，注意力在房间角落走动的人身上迅速转移，一场权力斗争开始了。\n\n纳特尔一动不动的静静旁观。这次弹劾的传闻他早就知道了，国会要法令推翻社进党的消息甚至动摇了他身边的顾问。但他不会任由事态发展的，作为前副总统，现代理总统，他有义务维护政党。而对手们会明白，阿德马尔的遗产不是一周就能轻易推翻的。"
 brazil_adhemar_coma.10.a: "社进党尚未出局。"
 brazil_adhemar_coma.11.t: "巧合的昏迷"
 brazil_adhemar_coma.11.desc: "总统秘书把头探进椭圆形办公室：“总统先生，联邦调查局长正在安全线路上，他说事态紧急。”\n\n“谢谢。”待秘书离开后，总统拿起听筒。“说吧。”\n\n“总统先生，听上去也许难以置信，但我们在巴西的一名线人刚刚得到确切情报，巴西总统阿德马尔目前已陷入昏迷。”\n\n“这对我们有什么影响？”\n\n“巴西政府已经陷入瘫痪。他们尝试维持秩序，但消息扩散得很快。社进党现在群龙无首。前总统的女儿，也就是现在的副总统埃德娜·洛特正在组织一场弹劾议案。要是我们推上一把的话，议案就能轻易通过，把阿德马尔从总统位子上拽下来，对我们维护南美安全至关重要。此外，我们还可以趁乱加强在巴西的情报网，以其人之道还治其人之身，把那些纳粹间谍赶出巴西。”\n\n“听上去不错，局长。着手准备吧。”\n\n“还有一件事，总统先生……”"
 brazil_adhemar_coma.11.a: "“我们可以让阿德马尔再也醒不过来。”"
 brazil_adhemar_coma.12.t: "巴西利亚的混乱"
 brazil_adhemar_coma.12.desc: "国家情报局的报告对日耳曼尼亚如一记重锤。阿德马尔·德·巴罗斯，巴西总统，这位团结协定在新大陆的珍贵盟友深陷昏迷。具体情况没人清楚：病因是什么，什么时候醒来，以及现在应该如何应对。\n\n这不是简简单单的健康问题。在阿德马尔的指示和配合下，巴西正和德国达成一项秘密协议，力图大大扩张德国在南美的利益，并一举扫清美国在南美的影响，亚马孙和南大西洋的资源已经唾手可得。\n\n但如果他死了，或者计划泄露，抑或是他们与巴西利亚之间的交易被公之于众，那一切都会化为乌有。但这场危机究竟有多严重？是否值得我们冒险走私医生和药物来维持他的生命？是否值得我们使些伎俩阻止弹劾？情报机构的悲观派甚至提议，我们应当赶在情况暴露之前尽快撤离德国资产，足以说明他们的恐慌。\n\n消息传至国家安全总局和其他政府部门，高层终于作出如下指示："
 brazil_adhemar_coma.12.a: "想办法阻止弹劾……"
 brazil_adhemar_coma.12.tt: "谍报机制已解锁额外行动。"
 brazil_adhemar_coma.13.t: "不辞辛劳"
 brazil_adhemar_coma.13.desc: "三名军官的身影若隐若现，他们石雕般冷漠的脸隐藏在香烟烟雾里，掩盖了他们的喜悦——位高权重的政客居然跑来恳求他们帮助，简直让他们乐在其中；他们特地故意拖延谈判，就为了看他失态。但这对劳多无关紧要，他来这里是为了解决问题而不是来博一点可笑的尊重。如果军方愿意协助阻止弹劾，这场灾难就还有挽回余地。劳多点燃另一支烟，继续说：“各位知道，反对派试图让我们的国家屈服于共匪甚至更糟的东西。阿德马尔是巴西稳定与荣誉的最后防线。”\n\n“荣誉？”梅迪西冷笑一声，从桌子底下取出一支大得夸张的雪茄，“我们亲爱的总统先生都快把我们变成国际笑柄了。”他点燃雪茄，对着劳多吐出一口烟。\n\n“我说的是国家的完整，国家的存亡，不是几个小报头条。”劳多回应，他的眼睛被烟气呛得发红。福塔将军点了点头，假装自己非常理解。\n\n“我们很理解你的处境，纳特尔先生，”他说，“但军队并不关心政治斗争。”\n\n这纯是睁眼说瞎话，但至少暗示了他们中立，这种不发动政变的保证，也算是小小胜利了。劳多单刀直入，问道：“那我可以理解为，军方不打算采取任何行动了？”\n\n盖泽尔将军身体前倾，脸上硕大的眼镜反射出刺眼白光。“为什么，亲爱的纳特尔先生，你从哪里得出这种想法的？我们从未想过推翻宪政，”他将脸凑到进钱，露出了在雪茄火光下格外刺眼的黄牙，和意味深长的微笑。"
 brazil_adhemar_coma.13.a: "“总统先生也是这么想的吗？”"
 brazil_adhemar_coma.14.t: "庖丁解牛"
 brazil_adhemar_coma.14.desc: "办公室里的电话突然响起，突如其来的消息让她措手不及。阿德马尔陷入昏迷，现在国家的前途竟然落到了她的肩上。\n\n埃德娜离开办公室直奔参议院议事厅，此时他们正在讨论危机的解决方案。阿德马尔还活着，但他此刻病入膏肓，只有时间能揭晓他能否转危为安。\n\n她迈入议事厅，先遇上了内维斯，从他那里得知他和其他人已经开始起草弹劾阿德马尔的方案。对此事不知所措的埃德娜只好坐下，听听他们的领袖莱昂内尔·布里佐拉想说什么。\n\n“阿德马尔显然已经无力领导国家，就算他醒了，谁又能保证他不会再次陷入昏迷？巴西需要的是身体健康、能够胜任总统之责的人选，阿德马尔显然不符合这个标准。”\n\n反对阿德马尔的力量齐聚于此，布里佐拉、内维斯、吉马良斯。他们知道，阿德马尔的时代已经过去，现在是时候赶他下台了。“别担心，埃德娜，”内维斯安慰她，“连拉塞尔达都支持我们，这次阿德马尔肯定下台。”"
 brazil_adhemar_coma.14.a: "“国会正在开会。对阿德马尔总统的弹劾听证会已经开始。”"
 brazil_adhemar_coma.15.t: "近在咫尺，远在天边"
 brazil_adhemar_coma.15.desc: "埃德娜·洛特习惯了巴西利亚的忙碌生活，但今天，她正在里约享受悠闲的假期。被阿德马尔弹劾让她愤怒，但暂时远离政府工作也让她感到几分释然。她决定暂时换个更平静的工作——写回忆录。\n\n在一次写作间隙，她捡起报童扔到门口的报纸。标题清晰明了——“总统阿德马尔昏迷！”埃德娜带着一种对阿德马尔命运的漠然读完了这行大字。\n\n走到电话旁，她拨通了一个熟悉的号码。“你好，内维斯？”这位经济部长似乎对埃德娜的里约假期很感兴趣，但她只想和他谈一件事。“请尽快处理好阿德马尔的事。我不会参加他的葬礼，我鄙视这个人。”\n\n电话刚开始就结束了。埃德娜感到压抑，不是因为阿德马尔昏迷，而是因为她已经不再是副总统。她曾想成为总统，向人们揭露阿德马尔的真面目并彻底打倒他，但如今自己却无能为力。阿德马尔的谎言影响太过强大，她再也不可能回巴西利亚任职高位了，谁又会在乎一个被弹劾的副总统对弹劾她的总统的愤怒呢？她现在能做的，只有继续埋头写作。"
 brazil_adhemar_coma.15.a: "未曾上任的总统。"
 brazil_adhemar_coma.16.t: "满怀希望的追随者"
 brazil_adhemar_coma.16.desc: "劳多·纳特尔注视着南美最有活力的男人，病床上的他面色苍白。劳多的妻子去吃午饭了，把他和总统留在病房里独处，病房里如此寂静，与圣保罗医院走廊里那些焦虑的工人、他们的妻子与其他形形色色各色人等的喧嚣嘈杂形成鲜明对比。劳多比任何人都了解眼前这个令世界瞩目之人，实际上，阿德马尔也是这么跟他说的。\n\n“这几周你真是给我们留下了无数烂摊子，”劳多喃喃自语，凝视着他深陷昏迷的上司。“大家都在为你的烂摊子忙得死去活来，你却在科帕卡巴纳逍遥快活！你个混蛋真是一点没变过。”他每说一句，对隔墙有耳的顾忌就更少一点。劳多看向那盏孤独的手术灯，双手捂脸，不安的来回踱步。\n\n“快醒来吧，阿德马尔。我们需要你，党也需要你。你已经做了这么多，不该在事业将成时死去。这不公平，对你和你的遗产都不公平。”劳多发现自己几乎是喊出了最后几句话。几声滴答声后，劳多的妻子回来了，和他一起离开了病房。这里寂静如初，阿德马尔的眼睛也依然紧闭。"
 brazil_adhemar_coma.16.a: "只是间奏，而不是尾声。"
 brazil_adhemar_coma.17.t: "至高处"
 brazil_adhemar_coma.17.desc: "阿德马尔猛吸一口气，从床上坐了起来，用目光环顾周围——这里似乎是一家医院。他发现自己的鼻孔里插着几根管子，索性将它们拔掉，下了床。“有人吗？”他大声呼唤道，祈祷会有一名护士来解释这一切，然而传来的只有阵阵回声。他皱了皱眉，把头探到门外，走廊上冷冷清清，只有杂乱摆放的各种医疗设备，仿佛所有人都瞬间蒸发了一般。无奈之下，他只得套着别扭的病号服，踩着冰冷的地板朝外面走去。\n\n死寂的走廊尽头是一扇红色的门，鲜艳的色彩与四周的装潢格格不入。好奇心驱使阿德马尔打开了它，下一秒，他来到了总统办公室。他用手抚过桌面，上面的细节同记忆中别无二致，这一发现令他呼吸急促，一度怀疑自己是在做梦。在房间的另一头，矗立着另一扇红色的门，它似乎散发着某种魔力，吸引阿德马尔走到它的面前。推开门，出现在他眼前的竟是参议院的会议室。唐突的变化让阿德马尔有些摸不着头脑，不过转念一想，他的办公室也从未连接到某家医院。他径直步入其中，打量着新房间，可里面依旧空空荡荡。\n\n红色的门又出现在了眼前。这一次，阿德马尔走在了圣保罗的一条街道上。他记得这里，那些熟悉的声音和气味仍未消散，但还是看不到一个人影。他独自徘徊了许久，沉浸在回忆中无法自拔。最终，两侧的街景渐渐褪去，变成了一块绿油油的草地，附近空无一人——除了一个坐在桌子后方的身影。\n\n阿德马尔走了过去，看见桌子上摆着一副纸牌。那身影抬头瞧了瞧他，笑着说："
 brazil_adhemar_coma.17.a: "“玩牌吗，朋友？”"
 brazil_adhemar_coma.18.t: "牌局"
 brazil_adhemar_coma.18.desc: "那张脸既模糊难辨，又熟悉得令人毛骨悚然。阿德马尔眯了眯眼，竭力分辨。短短几秒，它的面貌便瞬息万变——从男变女，从白到黑，其着装却是一成不变——一套深色西装，很像阿德马尔在圣保罗的肮脏交易和那些纵欲之夜里多次见过的那种。\n\n“嗯？你准备就这样呆呆地看我一整天吗？过来，坐下。”那个身影厉声说道，朝对面的椅子点头示意。阿德马尔突然觉得自己似乎犯下了什么严重的错误，顺从地坐在那个人影对面。阴郁的气氛环绕着那个身影，这并非他故意制造的，而是一种天生的气质，难以驱散、不可动摇。\n\n“阿德马尔·德·巴罗斯，你怕我吗？”那个身影冷冰冰地问道。\n\n“你是谁？我为何在此？”总统问。\n\n那身影低笑起来，“唔，这可是个好问题。我想你们应该都给我起过不少名字。”他开始悠然自得地洗起手中的牌，“我被称为阿努比斯、塔纳托斯、苍白骑士、收割者。但我猜对你来说，我名为……卡丘雷乌。”\n\n此时，阿德马尔深感事态严重。这不仅仅是一个幽灵，而是大自然的原始力量，每个男人、女人和孩子无时不刻都在畏惧的力量。这是潜伏在黑暗中的恐怖，坐在他的面前的正是死神本尊。他向后倒在椅背上，呼吸急促起来，“你……你想从我这里要什么？你是来带我走的吗？”\n\n死神低笑起来，“不是，至少，现在还不是。我的时间很宝贵，但我愿意假设你是无辜的。所以，我打算跟你玩一把把戏牌。如果你赢了，我就让你继续活下去。如果你输了……”死神的手指慢慢地在自己的脖子上划过，阿德马尔不禁倒吸一口凉气。"
 brazil_adhemar_coma.18.a: "“我接受。”"
 brazil_adhemar_coma.19.t: "第一轮"
 brazil_adhemar_coma.19.desc: "死神——或者说阿德马尔唤作卡丘雷乌的事物——拍拍手表示肯定，“很好，愿强者胜出。但这毕竟是把戏牌，所以我们得再找些玩家，是不是？”阿德马尔皱起了眉头。在这个地方他们得从哪儿找其他玩家？他来的路上可一个人都没有看到。\n\n“的确如此。”一个令他再熟悉不过的声音从背后传来。“这可不是我第一次跟这位大佬对战啰。”阿德马尔猛回头看去，看到的却是雅尼奥·夸德罗斯。他挂着小胡子的熟悉脸庞对总统傲然一笑，然后大摇大摆地走过来，坐在卡丘雷乌旁边。“在这儿你的骗术终于使不上劲儿了吧，阿德马尔？”\n\n冥界生物笑了起来，它变幻莫测的脸竟然挤出一丝笑意。“这不是你的老朋友吗，阿德马尔，我们可不在圣保罗了，是吧？我在想，要是夸德罗斯赢得州长竞选，情况会有怎样的不同。也许你现在就不会在这了？”阿德马尔感到一阵恶心。他还没来得及问雅尼奥他究竟是怎么到这里的，就被右边传来一句近乎女声的嘲讽打断了。“好了好了，我们不是来这开评判大会的，对不对？”他看过去，只见一位他平生所见最美丽的女人——也许除了他的妻子以外——坐在他旁边，心中不由得生出敬意。奇怪的是，她穿得像圣母玛利亚。她会是吗？她对阿德马尔微笑。“这轮我会跟你一边，阿德马尔。轮到夸德罗斯发牌了？”\n\n夸德罗斯点点头，开始洗牌。阿德马尔振作精神——他一直自认是把戏牌的高手，但这场游戏的赌注肯定比金钱要重要得多。"
 brazil_adhemar_coma.19.a: "游乐时间。"
 brazil_adhemar_coma.20.t: "熟面孔"
 brazil_adhemar_coma.20.desc: "赢下把戏牌把牌收拢到手里的那一刻，阿德马尔的内心洋溢着满足感。他与圣母玛利亚再度击败了雅尼奥·夸德罗斯，这场胜利的意义，远超过一场选举。对方往后一倒靠在椅子上，显得十分失落。随后一眨眼的功夫，夸德罗斯便消失了。卡丘雷乌缓缓鼓起掌来，“好样的，第一轮你赢了，干得好。”\n\n然而，就在阿德马尔感到如释重负的时候，另一个熟悉的女声又给他带来了紧张感。“别得意太早，阿德马尔。这只不过是第一轮而已。”\n\n来者不是别人，正是埃德娜·洛特，她大摇大摆地坐到了卡丘雷乌旁边。她当然会来。阿德马尔眯起眼睛，“没想到会在这儿见到你，埃德娜。你事那么多，一定是抽空来这的吧？”\n\n圣母握住他的手想安抚他，埃德娜却笑了起来。“不，谢谢你，总统先生。即使你说你不需要我，但我的党仍然需要我，”她边说边拿起她的牌。“你还记得那件事吗？你是如何为了一己私利，把一个无辜的女人扔进泥沼？我可是无辜的呀。”\n\n他咽下一口气，感觉到她的目光在他身上打转。“我知道你想干什么。而我，一点也不后悔。政界就没有冰清玉洁的家伙。如果切断与你的联系意味着能为巴西争取更好的交易，那我愿意切上一百万次。”她朝他挑了挑眉，卡丘雷乌忍不住笑了起来。他挥了挥手，变出四杯酒来，微微一酌。"
 brazil_adhemar_coma.20.a: "“好一段畅聊。现在，我们开打。”"
 brazil_adhemar_coma.21.t: "花下蛇"
 brazil_adhemar_coma.21.desc: "阿德马尔手握牌局胜利，心中不禁释然。第一轮赢得太过惊险，他并不喜欢。夸德罗斯一直在给他施压，而卡丘雷乌似乎只是在一边煽风点火。然而，阿德马尔还是占据了上风。桌子那头的夸德罗斯轻蔑地哼了一声，“尽情享受胜利吧，阿德马尔。”话音刚落，他的身影便消失了。卡丘雷乌笑得咯咯作响，“你居然挺过了第一轮，恭喜你。但游戏还没有结束，看来我需要一位新的搭档。”\n\n“还有谁比我更适合？”阿德马尔身后传来一个女性的声音，他立刻就知道那是谁了。那个在他的总统任期中，一直如刺在肉中的声音，那个无处不在的麻烦精。埃德娜·洛特得意洋洋地走到桌边，坐在卡丘雷乌身旁，“我的出现让你很惊讶？”她问道。\n\n阿德马尔轻蔑地哼了一声，心底却不免生出一丝惧怕，“你还会去别的地方吗？你把大部分时间都用来让我的生活如地狱般痛苦。现在我正在努力维持这种生活，你继续反对我也挺合情合理。”\n\n卡丘雷乌又笑了起来，阿德马尔感到背脊发凉，仿佛有人正从他的坟墓上走过。“我猜，洛特女士就是你无法摆脱的梦魇吧？告诉我，如果你早点摆脱她，你能有更多的作为吗？”\n\n那熟悉的恐惧在阿德马尔的身体里蔓延开来，“没关系，”他边说边喝了一口饮料，但饮料什么时候出现的呢？“如果真有什么差别的话，那也不过是压力大了些罢了。没有我应付不来的。”他试图让自己相信这句话，但他的面色却透露出了完全不同的信息。"
 brazil_adhemar_coma.21.a: "“你说是就是吧。现在，继续。”"
 brazil_adhemar_coma.22.t: "非常之谊"
 brazil_adhemar_coma.22.desc: "阿德马尔惬意地往后一靠，那个自称是雅尼奥·夸德罗斯的幽灵则怒上眉梢。凭借着一点点技巧和一点点运气，他和圣母玛利亚赢下了第一轮牌。假夸德罗斯冷哼一声，眨眼间便消失不见。卡丘雷乌轻笑几声，双手一拍：“好吧，祝贺你，阿德马尔。第一轮你赢了。但别太得意忘形了，游戏还没结束呢。”\n\n“哦，我觉得他有得意忘形的理由。”一个熟悉的女声从背后传来。阿德马尔的眉毛几乎蹦到发际线上，只见埃德娜·洛特出现在他身后。她冷冷地瞥了一眼卡丘雷乌，然后坐到阿德马尔身边。“毕竟，他有很多朋友，他们都希望他成功。”\n\n有一瞬间，阿德马尔觉得卡丘雷乌的脸上露出了难以置信的神情。这真算得上奇迹了，卡丘雷乌的脸就没个稳固的型，但阿德马尔的心里还是浮现出一丝满足。形式诡谲不定、牌局瞬息万变，有一点掌控感总归不错。卡丘雷乌清清嗓子：“副总统。有趣。我必须承认，我以为你会加入我这边。告诉我，为什么偏偏要和阿德马尔合作？”\n\n埃德娜一言不发，拿起她的牌。阿德马尔瞥了她一眼，只见她坚定地点点头。突然间，这几年里二人之间的争吵似乎都变得不值一提。“嗯，”他跟着拿起自己的牌，“我想我可以和各种各样的人合作。这一直是我的长处，对不对，副总统夫人？”\n\n“确实，总统先生。”卡丘雷乌轻蔑地哼了一声。"
 brazil_adhemar_coma.22.a: "“很好，开始游戏吧。”"
 brazil_adhemar_coma.23.t: "为了后辈"
 brazil_adhemar_coma.23.desc: "浓雾逐渐散去，一位有些紧张的年轻人出现在卡丘雷乌身旁，似乎是个大学新生。“总统先生，我来这里是想感谢您给予我的机会。”阿德马尔皱起眉来，心中充满好奇。究竟是什么把这个孩子带进这场游戏？\n\n他唤起那种赢得多次选举的魅力，仿佛自己身处竞选集会，而不是在一场关乎生死的超现实战斗中搏杀。“机会，对吗？告诉我，孩子，我的政府给你带来了什么样的好处？”年轻人的外貌突然变成了一个短发女孩，阿德马尔竟然也丝滑的接受了这突然的变化。“我……我受益于您的教育改革，它给了我的家庭一个机会，送我上学、学会阅读，最后读了大学。”女孩再次变幻，成了一位高瘦的年轻人。“我是家里第一个知识分子。”话音刚落人影又变，这次是一位肩膀宽厚的年轻人。“我在里约找了一份好工作，薪水不错，还能寄钱回家。我们不用担心没钱看病或付不起电费了。”\n\n卡丘雷乌轻笑一声：“多感人啊！他们想要表达感激之情。而且，孩子们总会长大的，然后他们就可以通过投票箱来表达对他们亲爱的老总统的感激之情了。”\n\n阿德马尔不睬卡丘雷乌。无论如何，他似乎真的帮到了某些人——事实是帮到了许多人。“无论如何，我都愿意接受这份感激。”他轻声说道，那道早已幻化万千的身影仍在不断变幻出种种样貌。他们，都是真实的吗？\n\n“有人说您是个小偷，想要把这个国家的一切都偷走，”数百个声音齐声说道，“但我相信您只是想让我们的国家成为一个对下一代更好的地方。谢谢您，总统先生。”"
 brazil_adhemar_coma.23.a: "转瞬须臾，消失无踪。"
 brazil_adhemar_coma.2301.t: "善待他人"
 brazil_adhemar_coma.2301.desc: "阿德马尔露出得意的笑容，把手中的牌甩在桌上：这是他无懈可击的一局的高潮。“打得不错，但你的运气还能继续下去吗？”卡丘雷乌吐出这句话时，就像是一次一氧化碳泄漏，悄无声息地夺走沉睡家庭的生命。\n\n阿德马尔望向雾气弥漫之处，那里的迷雾正在渐渐散去，露出一个因病羸弱的老人。他方正的脑袋让阿德马尔想起了卡斯特洛·布兰科，但那张脸也暴露出他来自东北部的贫苦背景。\n\n“呃……你好？你是谁？”老人的第一反应是阵咳嗽，然后才慢慢开口介绍自己。\n\n“我是众多病人中的一人，他们太多太多了，或许还会有更多。我记得第一次被诊断出肺结核时，我的家人整整哭了好几天。我曾希望能看到孙女迈出人生的第一步，但死神已呼唤我的名字，一切无力回天了。”\n\n“要是换另一个时代，我可能真的没希望了。但你给了我时间。”\n\n“我是最早一批接受你免费医疗计划的人之一。”考虑到他们此刻的所在，阿德马尔不知道该如何回应这番话。“我没有重获新生，但我也从未想过要再活一次。我只想好好度过人生中最美好的几年，而你给了我这个机会。我确实见到了孙女迈出的第一步，而且每一步我都在。”\n\n“谢谢你，阿德马尔。我不在乎别人说你拿走了什么,你给了我无法替代的东西。你是个好人。”\n\n然后，他就消失了。那番话让阿德马尔想起了他尘世间的肉体，那具肉体此刻正由他一手打造的医疗体系照料着。也许，他们也能为他做同样的事，再为他争取几年时间，让他完成自己的遗产。"
 brazil_adhemar_coma.2301.a: "“我还不能死，我还有很多事情要做。”"
 brazil_adhemar_coma.24.t: "人民的福祉"
 brazil_adhemar_coma.24.desc: "又是一局游戏，又是一场胜利。简直是杀疯了！卡丘雷乌只能烦躁地摇摇头，前来帮助他的人再次消失在虚空中。“你知道吗，我真想知道他们去了哪儿。”他抿了一口酒。威士忌熟悉的味道在舌尖绽放，尽管滋味不如往常那般浓烈。“他们是真实存在的吗？还是你在戏弄我？”\n\n卡丘雷乌惟以轻笑作答：“你难道不知道吗？他们来这里是为了帮助我们，这才是关键。瞧，又有一个人来了！”阿德马尔转过身，看见一个陌生女人正向他走来。她中等身材，皮肤呈古铜色，一头乌黑长发。她一句话没说，径直扑向阿德马尔，接着便是紧紧拥抱。换做别的时候，他可能会把她推开，要么开个玩笑。但此刻，他只是默默地拍拍她的背，困惑地看着卡丘雷乌。那女人松开双臂，尴尬地理了一下衣服。\n\n“对不起，总统先生。我不是来玩牌的。我的名字……其实不重要。但我听说了这里发生的事情，我只是想说……谢谢。谢谢您所做的一切。没有您的福利改革，我的家人早就饿死了。我相信您能够挺过去的。一定要有信心。”说完，她跑向远方。阿德马尔一头雾水，而对面的卡丘雷乌只是轻笑不已。\n\n“好好好，看来你那空洞的民粹主义终究还是帮到了一些人嘛。不光能肥了你自己，还有你那帮大笔捞金的狐朋狗友，对不对？”\n\n若是牌局不利，这些话可能会让他动摇。但那女人眼中的真诚……"
 brazil_adhemar_coma.24.a: "他知道这一切都是值得的。"
 brazil_adhemar_coma.25.t: "脏钱"
 brazil_adhemar_coma.25.desc: "阿德马尔松了口气，放下手中的牌，又拿下一局。“生意就像玩把戏牌，关键在于要挑好搭档。”他一边说一边紧紧握住身边男人的手，后者露出满足但冰冷的笑容，西装上别着一个眼睛形状的徽章。\n\n“日立有限公司只是全球数百家选择投资巴西的公司之一。”阿德马尔夸口道。坐在对面的死神面无表情，总统继续说道：“新兴产业正在推动我国成为全球经济超级大国。经济保持持续稳定增长，投资者纷至沓来涌向明日巴西。”\n\n“你创造的当真是个天堂呐。”死神回了一句。\n\n“离天堂不远了。在我的巴西，人人有工作，充分就业已经实现。工人的生活从未如此美好。”“那么，德·巴罗斯同志，为什么你的人民还生活在贫民窟中？你上次在你的家乡城市散步是什么时候？我可以保证，你那几乎没什么变化。还有你这些新伙伴？”死神指着日立的商人。\n\n“你仔细研究过那些新工厂吗？你知道他们从哪儿搞来的那些资本吗？你真的了解你向你的人民释放出来的力量吗？”阿德马尔无视死神的说教，开始准备下一轮游戏。但当他洗牌时，却发现牌上沾了什么东西，手指和手掌上残留着暗红色的液体。阿德马尔低头看向搭档的手，发现……"
 brazil_adhemar_coma.25.a: "一片血肉淋漓。"
 brazil_adhemar_coma.26.t: "紧紧握手"
 brazil_adhemar_coma.26.desc: "房间里没门也没窗户，但阿德马尔还是进到这里，四周被某种看不见的光源照得十分明亮。没有家具，没有死神，也没有把戏牌。淡黄色的墙上挂着一幅绘有扑克牌的油画。阿德马尔转过身，看见贝内迪托·马尼扬伊斯·巴雷托正笑着看着他。他住这吗？他咋进来的？\n\n“利润飙升，总统先生！”巴雷托说，“在您的领导下，巴西比以往更加富饶。干得好呀，先生！干得好呀！”巴雷托一把攥住阿德马尔的手，用力摇晃。阿德马尔疼得皱起眉头。他压根不知道巴雷托力气有这么大。他低头看看自己的手，试图挣脱，但无济于事。这时，他注意到地板上冒出一层冒着泡的黑色软泥，涨起来没过了他的鞋子。\n\n“看看这些图表！”巴雷托说，“线条一直上升，上升，上升……”巴雷托像坏了的复读机一样重复着。那黑色的物质原来是石油！粘稠的石油，带着来自地心的温度，升到了阿德马尔的膝盖。\n\n“你把这个人当一次性的工具，”死神说道，“你棋盘上的一枚小兵。”\n\n突然，一双看不见的手把巴雷托从阿德马尔身上扯开，把他拖入石油层下。巴雷托挣扎片刻，随后就再也看不到他的身影。石油还在继续上涨，已经淹没了阿德马尔的胸部。“我没做错什么！”阿德马尔抗议道，“巴西石油公司是国家的未来！它将带来力量和繁荣！”\n\n“前者总是以后者为代价。”石油漫过阿德马尔的脸，涌入他的喉咙，穿过鼻窦。就在他的肺开始灼烧，大脑一片漆黑之时，一切都消散无踪，他又回到了牌桌之上。"
 brazil_adhemar_coma.26.a: "石油也不见了。"
 brazil_adhemar_coma.27.t: "权力至高"
 brazil_adhemar_coma.27.desc: "妈的，真是一场险胜。阿德马尔差点输掉，手气好抓到好牌才堪堪拿下。他擦擦额头，突然意识到自己已经汗流浃背。衣服贴着胸口，眼前的世界显得模糊不清。卡丘雷乌似乎注意到了。“累了？似乎我也是。来，我们休息一下。”阿德马尔眨了眨眼，桌上的牌局瞬间变成了酒吧的吧台。卡丘雷乌站在吧台后面，穿着红色马甲、打着领结，期待地看着他。“总统先生，您想喝点什么？”\n\n阿德马尔一度想问这家伙到底在搞什么鬼，但很快意识到问了也没用。更何况，他的目光已经被一瓶漂亮的威士忌吸引住了。天哪，他已经渴得不行了。“那边那瓶，谢谢。”他指指那琥珀色的酒瓶。卡丘雷乌点点头，拿过酒来，倒了一大杯。阿德马尔凝视着那如蜂蜜般的液体，轻轻抿了一口。有些不对劲，就跟这里的一切一样陌生。他有多久没喝过像样的酒了？当总统实在太忙，几乎没有时间好好享受——几乎所有的事情都是如此。\n\n“总统先生，有什么心事吗？”死神问道，手中擦拭着玻璃杯。“你看起来很疲惫。我想这就是权力的影响。它像吸血鬼一样吸干你的生命力，像蚂蟥，或者水蛭。我想，既然这么多人渴望权力，追求权力一定有其价值。”\n\n他紧握着手中的杯子。卡丘雷乌说得没错。几个月前，他与乌鸦密谋推翻洛特，夺取了权力，这之后，他的健康和精神状态都受了影响。但这一定是值得的。阿德马尔·德·巴罗斯绝不是那种为了毫无意义的事情而牺牲自己生命的人。他将杯中酒一饮而尽，将杯子重重地拍在吧台上。"
 brazil_adhemar_coma.27.a: "“再来一杯，然后我们回去开打。”"
 brazil_adhemar_coma.28.t: "舞啊，舞啊"
 brazil_adhemar_coma.28.desc: "又来了一个人。这次是梅迪西将军。他在桌边坐下，死神让他加入了牌局。梅迪奇的嘴咧得大大的，笑得跟刘易斯故事里的柴郡猫似得，嘴角几乎能碰到耳朵。“总统先生，”他说，“如我之前承诺过的，我已经让军队支持您了。我相信这表明我履行了宪法义务。军队将支持巴西国家和总统。”\n\n死神的笑声在房间里回荡。\n\n“有什么好笑的？”阿德马尔质问道，“把军队驯服，这可是大功一件！”汗珠从他额头上滴落下来。\n\n“你只是耍猴人的猴子！”死神笑道，“跟着你以为你能控制的曲调跳舞罢了！”\n\n突然，一阵刺耳的乐器声直冲阿德马尔的脑门，那是激烈的桑巴音乐。梅迪西开始吹口哨伴奏，音符从他那一直挂着笑容的嘴里嘶嘶地吐出，阿德马尔的脚不由自主地在桌下打起节拍。很快，他站起身来，尽可能地随着音乐摇摆起来。\n\n“你跳得还不错，”死神继续说道，“但随时都能把你换个更漂亮的舞伴。”\n\n阿德马尔使劲摇头，“我解决了别人解决不了的问题。军队团结在社会进步党的麾下，走向巴西美好的未来！”面对死神的挑衅，他纵身跳起桑巴舞，他跳啊，跳啊，不知过了多久，最后筋疲力尽地倒在椅子上。"
 brazil_adhemar_coma.28.a: "“没人能一直跳下去。”死神嘲笑道，又出了一手牌。"
 brazil_adhemar_coma.29.t: "为了未来……"
 brazil_adhemar_coma.29.desc: "“向您敬礼，总统先生！”雾中传来的声音让阿德马尔大吃一惊，那是一张他从未想过会见到的面孔——海军上将阿尔瓦罗，他的核顾问。上将脸上洋溢着阿德马尔前所未见的热忱，朝着目瞪口呆的总统走来。\n\n“说实话，在我需要行礼致敬的所有总统里，您是唯一一个配得上这份礼的人。您做到了连瓦加斯和洛特都无法做到的事情：在世界之巅为巴西挣得一席之地。您，我的朋友，尽到了每一位可靠领袖应尽的责任：为我们的未来奋斗。为此，我深感感激。”笑容满面的海军上将兴奋地与总统握了握手，阿德马尔则暗自嘀咕，每一位领袖的职责……\n\n海军上将走回雾中，又回首望向阿德马尔：“您是个伟人，总统先生！切莫忘记！”阿德马尔的目光落回手中的扑克牌，又扫一眼桌上的牌面。他又赢了。真是轻而易举。\n\n卡丘雷乌笑了，戏谑道：“噢哟，好甜蜜哟。把自己的国家弄到高山之巅，即使这意味着给予邻国在战火来临时出手毁灭她的借口。”说罢，卡丘雷乌的“脸”骤然贴近阿德马尔，迫使他本能地往后一缩。“在我们开始下一轮游戏之前，请回答我：为了国际声望，以自杀式核协议将国家与数百万生命置于险境，这值得吗？就为了让你的盟友和敌人敬畏你？”\n\n阿德马尔打了个寒颤。他一直都在走钢丝。但不幸的是，他不能也不愿改变过去。此刻的他前途未卜，他的遗产也同样岌岌可危。他抬起头，目光坚毅：“我身处的世界群狼环伺，那些不懂得保护自己的人终将难逃被吞噬的命运。为了巴西的未来，这些都是必要之举。”"
 brazil_adhemar_coma.29.a: "卡丘雷乌继续洗牌，祂对答案并不感兴趣。"
 brazil_adhemar_coma.30.t: "公牛再临"
 brazil_adhemar_coma.30.desc: "阿德马尔把手里的牌丢回到桌上，长舒一口气。又赢了一轮，当然，盟友们一直在帮他。不管他们去哪了，阿德马尔再一次孤身一人。桌对面的死神似乎有些狼狈。“打得不错，”祂嘬了口酒说道，“现在，下一轮。”\n\n他们就这么坐在那，等着下一个玩家加入牌局。然而，过了许久，并没有别人出现。阿德马尔的脊背上闪过一丝寒意，生怕事情往最坏的方向发展。死神讥讽道：“好吧，看来确实打完了。”祂起身打量了一番阿德马尔，面庞模糊，表情难以捉摸。“那么，你赢了，祝贺。”\n\n有那么一瞬间，阿德马尔无法动弹，甚至无法思考，一切似乎都凝固了。接着，他如释重负，感到一丝得意的微笑爬上嘴角，喉咙里还挤出几声干涩的笑声。阿德马尔几乎无法相信这一切：“我……我赢回一条命了？对吗？”\n\n死神愉快地点了点头，周遭万物分崩离析。“打的漂亮，总统阁下，”祂拎起公文包说道，“你赢得了我的尊敬。”\n\n“等下！”阿德马尔起身抓住祂的肩膀，“走之前……能告诉我你是谁吗？这里是哪？”\n\n\n\n祂轻笑两声，曾经犹如恶兆般的嗓音却变得愈发熟悉：“这里不是真实世界，我也不是真人。你看到的、听到的，都来自这段应得的人生，这个记忆和情感的万花筒。所有的一切，都是因为你的肉体在为生存而战斗。现在，你已经赢得了这场战斗。走吧，阿德马尔·德·巴罗斯，好好活着。”\n\n一道亮光在眼前闪过，阿德马尔倒吸一口气……"
 brazil_adhemar_coma.30.a: "他战胜了死亡。"
 brazil_adhemar_coma.31.t: "游戏结束"
 brazil_adhemar_coma.31.desc: "上一局的角色消失，阿德马尔做好了开始下一局的准备。牌局打到现在并不顺利，但阿德马尔坚信自己可以坚持下去。然而，他想知道接下来出现的会是谁。他已经面对了许多自己过去犯下的罪孽，下一个要遭遇的是什么？阿德马尔和卡丘雷乌就这么坐着，等着下一个玩家从虚无中出现。\n\n但是无人出现。\n\n阿德马尔左顾右盼，在眼前支离破碎的景象中搜寻人类迹象。一无所获。\n\n卡丘雷乌笑了起来，嘶哑的笑声在阿德马尔耳中是深入脊髓的寒冷。“好吧，看来你是一个盟友也没剩下了，你知道这意味着什么吧。”阿德马尔的手开始不由自主的颤抖。这不可能，不会就这样结束的。卡丘雷乌站起身来，身影显得高大无边，祂那不存在的眼睛好像能直视阿德马尔的灵魂深处。“游戏结束。”祂边说着，边收起手中的牌。\n\n一道低沉刺耳的噪音缓缓进入阿德马尔的耳中。眼前的景象仿佛在崩塌，被一种像是巨型雨林的事物吞噬。“等等！等等！！”他朝卡丘雷乌大喊，后者正向雨林中走去。他手忙脚乱地跟上去，试图挣脱身体中蔓延的麻木感。“求你了！再给我一次机会！我什么都会做的！”\n\n卡丘雷乌只是叹气，“都说人们从来不愿看清事实，不愿接受失败。很遗憾，阿德马尔·德·巴罗斯，你必须面对现实。我还有其他事要办，再见。”\n\n总统尖叫着，眼睁睁地看着祂消失在雨林中。看着周围的树木朝着自己扭曲的总统府包裹上来，他跪倒在地，脑子里只有一个念头。"
 brazil_adhemar_coma.31.a: "现在怎么办？"
 brazil_adhemar_coma.32.t: "苏醒"
 brazil_adhemar_coma.32.desc: "阿德马尔睁开眼，立刻又紧紧闭上。刺目的白光像匕首扎进视网膜。他再次尝试，这次多撑了几秒。\n\n头顶有某个嗡嗡旋转的物体。第三次睁眼确认：是吊扇，被白炽灯照得发亮。\n\n他下意识吞咽，喉咙却像被刀片割开般剧痛。试图发声，只吐出沙哑的喘息。房间里有另一个人的呼吸声，近在咫尺。那独特的节奏——是莱昂诺尔！\n\n阿德马尔用尽全身力气转头，颈椎发出咔咔的脆响。声响惊动了莱昂诺尔，四目相对的瞬间，她触电般弹起身子，瞳孔因震惊而放大。“阿……阿德马尔？”\n\n总统勉强点头：“还……活着。”\n\n莱昂诺尔深吸一口气跳起来：“医生！”她尖叫道，“他醒了！”\n\n片刻后，医护团队如潮水涌入病房。各项检查轮番上阵，主治医师俯身询问时，阿德马尔已能小口啜饮清水，声带艰难振动：\n\n“叫……劳多……我的幕僚长来。”他命令道，“安排……专机回首都。”最后他攥住医生的手腕：“我醒了的事……不要外传。”"
 brazil_adhemar_coma.32.a: "语毕，巴西的总统便瘫倒在了床上。"
 brazil_adhemar_coma.33.t: "全体起立"
 brazil_adhemar_coma.33.desc: "自当上国会速记员的那天起，亚历杭德罗·卡多佐就没享过一天清福。更何况，现在正值巴西的至暗时刻：总统深陷昏迷，政府群龙无首，坦克雷多·内维斯又在此刻落井下石发起弹劾。可想而知，现在的他哪怕再长出十根手指都不够忙活。\n\n工党、社民党、全民盟就像一群闻到血腥的鬣狗般蜂拥而上，疯狂噬咬着社进党的每寸肌肤。各大党派争先恐后地抬高嗓门，试图在气势上压倒对方。卡多佐的同事们竭尽所能想要制止现场的混乱，但即便如此，他也只能勉强记下一些零零散散的发言。伴随着一声声交头接耳，现场的态势也在不断变化，唯有一件事可以肯定：这届政府的气数已尽。\n\n最终的投票即将开始，社进党议员们纷纷闭目祈祷。突然，“砰”的一声巨响打断了亚历杭德罗的手头工作。一名社进党官员气喘吁吁地冲进会堂，对着嘈杂的人群高喊道：“总统到场，请全体起立！”\n\n沉默瞬间降临。在场的所有人先是一愣，而后才按照要求机械地站起身。一个佝偻的身影缓缓走入众人的视野——那正是拄着拐杖的阿德马尔·德·巴罗斯。他将双手搭在护栏上，凝视着全场，那幅模样在不同人眼中是截然相反的两个形象：或是关爱苍生的天使，或是为祸人间的恶魔。\n\n社进党议员纷纷因保住职位喜极而泣，而反对党议员无不为功亏一篑扼腕叹息。"
 brazil_adhemar_coma.33.a: "阿德马尔回来了。"
 brazil_adhemar_coma.34.t: "先声夺人"
 brazil_adhemar_coma.34.desc: "参议院里又是一天，埃德娜不耐烦地抖着腿。她的弹劾攻势已经从激情澎湃的讨伐变作泥潭打滚，议事程序更是搞得国会彻底停摆，这都过了好几周了，一点实质性的进展都没有。两位社进党参议员滔滔不绝地发表着无关痛痒的演说，埃德娜则冷静地起草她的下一个论点。几分钟后，一扇门吱呀着打开，众人的声音戛然而止。埃德娜抬头一看，不禁倒吸一口凉气——阿德马尔拄着一根黑手杖摇摇晃晃地走了进来。\n\n总统缓缓巡视四周，参议员们惊愕地静立无言，整个场景仿佛传达着无声的责备。他的目光落在对手身上，埃德娜与阿德马尔的目光交汇，那一刻仿佛时间凝固，沉重且漫长。阿德马尔微微一点头，随后转身走向旁听席，静静注视着会议进程。\n\n社进党成员纷纷表态拱卫总统，埃德娜缓缓转向布里佐拉和内维斯。二人显得迷茫不解，等待副总统的指示。埃德娜长叹一声：“对不起，事态发展至此，我无法再继续支持弹劾行动。”\n\n内维斯无奈地叹了口气，布里佐拉则是怒上眉梢。“你怎么能这样？”他质问道，“为了那个腐败的家伙背叛自己的党和信仰？难道你的事业已经啥都不是了？”埃德娜沉默不语，脸上写满了悲伤与遗憾。她悄然起身，向门口走去，身后传来布里佐拉愤怒的声音：“你这是背叛！至少阿德马尔还坚守信念，你却是个背信弃义的家伙！你跟你主子今天没事，但你当不了多久的副总统了！我会用尽一切办法——”\n\n埃德娜重重关上身后的门，布里佐拉的咆哮戛然而止，但他的言辞仍在她耳畔回响。夜深人静，躺在床上辗转难眠的埃德娜不禁思索，这一切是否本可以有不同的结局？"
 brazil_adhemar_coma.34.a: "弹劾失败。"
 brazil_adhemar_coma.35.t: "老大回归"
 brazil_adhemar_coma.35.desc: "经过数周的总统沉默和激烈的弹劾辩论，巴西国会已从一个偶尔出现理性辩论的场所变成了绝望的政治战场。埃德娜将军指挥布里佐拉中尉不断攻击社进党为阿德马尔的总统职位竖起的法律防线，而劳多中尉则拼命动员社进党成员抵御这些攻势。阿德马尔走进房间里的“两军前线”，默默在旁听席的第一排找了个位置，皱眉看着眼前的景象。\n\n几分钟后，一位社进党官员瞥见了他，惊讶地倒吸一口气。阿德马尔到来的消息如涟漪般扩散开来，两派瞬间达成停火，每位参议员都伸长脖子看向旁听席。随着总统苏醒的消息开始传播，房间内的气氛立刻搭变。紧张时刻过后，战斗再次激烈展开，劳多动员麾下将士愈战愈勇，保卫前来观战的总统。\n\n埃德娜将军一动不动地盯着阿德马尔上将，后者回望着她，脸上露出难以捉摸的表情。战场再度喧嚣，两位中尉指挥各自部队你来我往打得不可开交，而两位将军则保持沉默，彼此间充斥着无声的敌意。"
 brazil_adhemar_coma.35.a: "一场阿德马尔制造的战争。"
 brazil_adhemar_coma.36.t: "不屈"
 brazil_adhemar_coma.36.desc: "阿德马尔一瘸一拐地回到他的办公室，劳多·纳特尔正在那里做着笔记，一见到他立刻站了起来。平时是朋友，在这关键的时刻更是支柱。两人交换了一个真诚的微笑，没有俏皮话，没有讽刺。这一刻，他们只是满意地沉默着。\n\n“所以党终究还是团结在一起了。”自阿德马尔卧病以来，这还是两人首次会面。总统和幕僚长在沙发上坐定，开始审视当前的局势。令人担忧的分裂并未出现，也没有人背后捅刀，但前方显然仍有挑战。至于领袖本人，他的健康状况十分糟糕，以至于破天荒地遵了医嘱，用一杯水来敬纳特尔的啤酒。\n\n说到总统职位，阿德马尔宁愿去跟FBI特工喝一杯，也不想再踏上竞选讲台，而且他现在也确实站不上去。总得有人接手；不过，那个人不会是自己了。不，他仍然是社进党的领袖，他还未教会党如何引领人民。剩下的一年多一点的时间里，他还有许多工作要做。\n\n巴西最有权势的人已不如上任之初那般强势，但他毫无畏惧。他抬起头，面前是巴西利亚的地平线。"
 brazil_adhemar_coma.36.a: "吾乃命运的主宰者；吾乃灵魂的领航员。"
 brazil_adhemar_coma.37.t: "岿然不动"
 brazil_adhemar_coma.37.desc: "过去几周的动荡终归平静，所有的参议员都带着紧张的心情等待着结果。最后的谈判已成定局，最终的攻势也已落幕；此刻只能静候佳音，看哪一方的策略更胜一筹。时间仿佛凝固，阿德马尔和埃德娜在席位上不自觉地前倾，每一秒的等待都似一个世纪般漫长。\n\n“弹劾共和国总统阿德马尔·德·巴罗斯的动议未能获得通过所需的票数，因此被否决。”\n\n刹那间，参议院内紧张的沉默被打破。社进党阵营中爆发出雷鸣般的掌声，淹没了对面因失败而发出的窃窃私语。敌手的欢呼声逐渐高涨，工党成员们围聚在埃德娜身边，绝望地寻求领袖的指引。埃德娜哑口无言，只是静静地坐在那里，目光紧锁在阿德马尔身上，试图从他的表情中捕捉到一丝羞愧。\n\n但她什么也没找到。总统面带得意的笑容，沉浸在胜利的喜悦之中。过了一分钟，尽管阿德马尔努力保持镇定，他还是忍不住笑出声来。他站起身来，朝出口走去，留下埃德娜独自面对残局。最后再看她一眼，门在他身后缓缓关上，从众人的视线中隐去身形。\n\n反对派一片慌乱，埃德娜默默地站了起来。她走向布里佐拉，后者正站在一群官员中间，竭力维持党的团结。布里佐拉注意到埃德娜走了过来，将她拉到一边。“我们需要方向，埃德娜，”他急促地说，“下一步怎么走？联系媒体盟友继续施压，在选举中击败社进党？还是尝试其他策略？我们必须做出回应，我们的下一步怎么走？”埃德娜叹了口气。"
 brazil_adhemar_coma.37.a: "“我们回家，我去写辞职信。”"
 brazil_adhemar_coma.38.t: "弹劾"
 brazil_adhemar_coma.38.desc: "又一轮投票，又一波呼喊与喝彩随之而来。此情此景循回往复，参议院仿佛成了一台无情的机器，源源不断地输出呐喊、尖叫、悲泣与怒吼，机器无休止地重复着它的循环，直至参与投票的议员们悉数迷失在这片喧嚣的泥潭之中。这一切令人难以忍受。\n\n总统身体微微颤抖，眼中满是恐惧，头痛欲裂、肌肉紧绷，无力地看着眼前的一切。这一切都关乎于他。他们还爱戴他吗？那些曾经在大厦外为他欢呼的人们，他们的声音是否依旧充满激情？更重要的是，他们是否还会想着他，想到他被下属所限制的心境？\n\n还是说，他们早已忘却了他？\n\n紧接着，紧张到了顶点。关键的一票落定，有如命运宣判。各方势力如秃鹫般蜂拥而至。全民盟派、瓦加斯派和自由派人士齐聚一堂，笑声与拥抱交织，迫使他的支持者拉起一道人墙，护送他离场。众人缓缓穿过大门，步伐沉重得如同葬礼上的哀乐，这哀歌似乎永无尽头。\n\n他眼前浮现出那张阴险的面容，或是说，她在会场内的身影。当她将象征权力的金绿色绶带系于身上的那一刻，他看到了她赤裸裸的贪婪。她的笑容中藏着不可告人的背叛，随着她的名字被宣布，一切伪装瞬间破碎——埃德娜·洛特。叛徒，投机者，新任总统。即便如此，此刻在他耳边回荡的唯有那一个词：\n\n所有的一切，化作了同一个字眼。"
 brazil_adhemar_coma.38.a: "弹劾。弹劾。弹劾……"
 brazil_adhemar_coma.39.t: "狡蛇之胜"
 brazil_adhemar_coma.39.desc: "正直，诚实，这些在巴西都已不复存在。\n\n这是卡洛斯·拉塞尔达在收拾行李时得出的唯一结论。政府早已被那个满口胡言的阿德马尔蛊惑——这死而复生的毒蛇吞掉了巴西政治仅有的一点诚实正直，取而代之的是他的那些狐朋狗友。\n\n一听说弹劾投票失败，拉塞尔达就立即联系秘书清理他的办公室，并让她通知所有下属，他们很快都会丢饭碗。挫败感直冲骨髓：他、工党、社民党，还有其他为了巴西灵魂而战的势力，大家都败了，但却只有他狼狈无比，仓皇而逃。\n\n行李箱砰然关上，拉塞尔达还在想到底是哪里出了错。在1965年的时候更努力点会怎样？早点向其他候选人低头，免得选票分流又会怎样？“或者，”一个幽怨的声音在他的脑海里回荡，“你应该走进阿德马尔的病房，在他熟睡时掐死他。”\n\n算了，都无所谓了。他已经订好了机票和住所，要去美国开启新生活——那里可没有阿德马尔肮脏下贱的民粹乱语。一位名叫威廉·巴克利的先生已经邀请他参加他的电台节目，告诫美国人勿蹈巴西覆辙。这诚然是个很充实很有意义的工作，但在拉塞尔达内心深处，一件事或将永远挥之不去。"
 brazil_adhemar_coma.39.a: "阿德马尔击败了他。"
 brazil_adhemar_coma.40.t: "下次好运"
 brazil_adhemar_coma.40.desc: "生活中难得有事情完全按计划进行的时候，拉塞尔达一边想着，一边啜饮着早晨的咖啡。那些微小的事物也因此显得格外甜美，又或许只是咖啡里加了糖的缘故。无论如何，此时此刻，卡洛斯·拉塞尔达的生活的确十分美好。他的目光扫过头条文章——阿德马尔被弹劾的消息，不禁露出宽慰的笑容。是了，胜利确实是甜蜜的。\n\n他多么享受那个瞬间——阿德马尔这只愚蠢的食尸鬼意识到自己即将不再担任总统时的表情。他的脸一瞬间垮了下来，岁月在他昏迷期间刻下的印迹愈发明显。他的身躯变得无力，绝望如潮水般将他淹没。那会是什么感觉？尽管他大张旗鼓地宣告回归，最终却还是被参议院裁定为不适合继续任职。他和他那帮贪污犯马上就会化作历史的尘埃，这就是他们应得的下场。\n\n拉塞尔达深知这种感觉对他来说意味着什么。多年来的奋斗终于赢来了胜利。\n\n喝完咖啡后，他走向电话。阿德马尔已经滚蛋，留下的只是一段无关紧要的历史。现在，真正的工作才刚刚开始。瓦加斯的政治遗产仍然深深影响着巴西政坛，而他之前的盟友——社民党和工党——正是这一影响的结果。不能有一刻松懈，必须把他们一举肃清。拨通熟悉的号码，电话响了几声，对方接起了听筒。“早上好，拉斐尔，”他说道，声音中充满喜悦。"
 brazil_adhemar_coma.40.a: "“我要跟你谈谈下届大选。”"
 brazil_adhemar_coma.41.t: "盛宴"
 brazil_adhemar_coma.41.desc: "在人的尸体僵硬之前，心怀不轨的食腐动物就会靠近，它们对此毫无顾忌。\n\n首先是这些苍蝇，它们穿着手术服，戴着外科医生的口罩成群结队地被机器的尖叫声吸引过来。它们用爪子抓住尸体，用器械和探针戳它，呜呜唧唧互相交流。随后秃鹫从遥远的地方飞来，它们的鸣叫声顺着无线电传播，把消息传遍整个国家。\n\n盛宴就这样开始了。\n\n下一个到场的是老鼠，在巴西利亚的下水道里爬行的老鼠。它们饥肠辘辘，贪婪地想在权力的尸体上分一块。\n\n鼠王，佩德罗·阿莱绍，他从前的副手，咬下了第一口。他没有自己的意志，也缺乏其他人的推动，但还是跟其他人一样从尸体上咬下一块。\n\n最后是那个男人。在劳多·纳特尔看来，他是这个国家最后一个闻到肉香味的人，这让他反感。现在，这个国家里最有权势的人——鼠王，正随着他的调子起舞，是他名副其实的傀儡。但他只能惊恐地看着这一切。政客们、记者们，所有人，他们对这个为拯救国家而献出生命的人毫不关心，只对残留的财富和权力感兴趣，对这场荒诞的盛宴感兴趣。虽然他现在是国家的统治者，但他只能眼睁睁地看着，很快，整个巴西……"
 brazil_adhemar_coma.41.a: "都将在阿德马尔·德·巴罗斯的尸体上大快朵颐。"
 brazil_adhemar_coma.42.t: "故此，献给你"
 brazil_adhemar_coma.42.desc: "“我们怀着沉痛的心情确认来自圣保罗的消息：巴西共和国总统，阿德马尔·佩雷拉·德·巴罗斯博士于今日因在阿帕雷西达圣母升天总主教座堂发生的心脏病并发症去世。根据共和国关于行政权力空缺的法律规定，新总统将——”轻轻一扭，埃德娜·洛特关掉了收音机。\n\n她知道这一天总要来的。当得知阿德马尔陷入昏迷时，每个人都知道这只是时间问题。但埃德娜依然感觉到有些意外。一开始，阿德马尔稳坐高位、安如磐石，但突然间，他就那样倒下了，然后便去世了，一切仿佛都发生在转瞬之间。\n\n除了对人类命运的深切担忧，一种更为现实的忧虑也涌上心头。阿德马尔留下的混乱局面，还有克莱门特与德国事务的千丝万缕，让她烦躁难安。国家究竟将何去何从？如何才能找到一条出路？又有什么办法能够解决当前的危机？\n\n确认收音机关好了，埃德娜决定起身前往教堂。她不仅仅是为了阿德马尔那可怜的灵魂祈祷——她更要为他留下的国家祈祷。"
 brazil_adhemar_coma.42.a: "人固有一死！"
 brazil_adhemar_coma.43.t: "仓促会面"
 brazil_adhemar_coma.43.desc: "“阿莱绍先生现在可以见您了，纳特尔先生。”与劳多·纳特尔熟识多年的秘书恭敬地点了点头，目送他进入办公室。纳特尔经过时，秘书低声说道：“祝你好运，劳多。”纳特尔点点头以示感谢，随即踏入了曾经属于他已故上司的办公室——如今这里的主人是众议院议长、临时总统佩德罗·阿莱绍。\n\n纳特尔暗自后悔没对新任总统做什么研究。据他所知，秘书的担忧似乎是有道理的，因为阿莱绍是一个相当正统的全民盟派，与拉塞尔达的区别只在于声音大小。然而，佩德罗·阿莱绍却有不同的想法。这些想法不仅让纳特尔十分纳闷，也让他印象深刻。\n\n“纳特尔先生，有件事我必须告诉你：我不是那种只看重党派利益的人，以至于会阻拦社进党完成总统任期。愿上帝赐予他安息。”纳特尔松了口气，他这时才发现自己一直憋着一股气。阿莱绍点头表示理解，然后继续说道：\n\n“事实上，无论拉塞尔达之流怎么说，作为一位临时——”他说出这个词的语气甚是夸张——“总统，我应当谨慎行事，不会滥用权力。”突然间，阿莱绍的眼神中闪过一丝锐利的光芒。\n\n“但请注意一点，纳特尔先生。德·巴罗斯博士病重期间做过政府首脑的你肯定清楚，我也期望小瓦加斯同样明白。如果你和你的政党在看守期内越界行事，我会毫不犹豫地出手行动。”\n\n纳特尔哪敢说一个不字？"
 brazil_adhemar_coma.43.a: "“谢谢总统先生。我接受您的指示。”"
 brazil_adhemar_coma.44.t: "终章"
 brazil_adhemar_coma.44.desc: "医生说，那约莫是傍晚时分，太阳正在悄然没入云海。两位医生走进他的病房，准备检查他的生命体征。房间空无一人——他的家人在他沉睡之际尽心尽职地守候了一天，大约二十分钟前刚刚离去。然而，当年纪较轻的那位医生俯下身去取血样时，心脏监测器发出了一种令在场医生熟悉到骨子里的声音——那尖利的哀号，预示着生命的终结。\n\n医院最优秀的医务人员立即集结起来，试图将总统拉回现世。可是，那支悲伤的挽歌已经告诉了医生们他们需要知道的一切。\n\n阿德马尔·德·巴罗斯，已经离世。\n\n在接到那个改变命运的电话的瞬间，埃德娜就知道发生了什么事。她立即登上一架飞往首都的小飞机，一种无力的麻木感充斥周身。阿德马尔和他带来的一切都已经消逝，她的政党超越了社进党，执掌了这个国家。这显然是件好事。\n\n但是，一个曾在她政治生涯中扮演重要角色的男人，如今却永远地消失了。这让她感到一种难以名状的痛苦。尽管阿德马尔有着种种缺点，但她心中那股悲伤的感觉却是如此的强烈，犹如影子紧紧缠绕、寸步不离。\n\n即使在她宣誓就任总统，身披总统绶带的时刻，埃德娜仍然无法拿准自己对这一切的感受。但这并不重要。重要的是，现在掌舵的人是她了——无论如何，她都要让她的家人感到骄傲。"
 brazil_adhemar_coma.44.a: "“再会了，阿德马尔博士。”"
 brazil_adhemar_coma.45.t: "遗孀的劝诫"
 brazil_adhemar_coma.45.desc: "这是个葬礼的好天气。晴空万里，阳光灿烂。一阵微风吹过，凉爽了墓旁的哀悼者，也吹干了他们尚未干涸的泪痕，鸟儿在树间歌唱，飞来飞去。而巴西总统，阿德马尔·德·巴罗斯的葬礼，也接近尾声。\n\n埃德娜·洛特注视着掘墓工把总统的棺木缓缓降入墓穴，她感到一阵意外的刺痛。尽管阿德马尔顽固不化且固执己见，但埃德娜知道自己还是会怀念他。他的活力与乐观是如此独特，即使他的执政带来了诸多不堪回首的记忆，却依然让人难以忘怀。\n\n埃德娜注意到了悲痛欲绝的莱昂诺尔·门德斯·德·巴罗斯。总统遗孀蜷缩在椅子上，双手捂住面庞，仿佛遭受重创，埃德娜甚至能看见泪水从她的指缝中涌出。这副景象如一场感情季风，让埃德娜也悲伤起来。\n\n她自己的丈夫去世也有十年了，但时间的步伐和无尽的工作，掩盖了她的痛苦。\n\n夕阳西下，前来哀悼的人几乎都离开了。埃德娜轻轻走到莱昂诺尔身旁，把手搭在她的肩上，“我为此深深遗憾，”埃德娜说道，“他真是一个独一无二的人。”\n\n莱昂诺尔通红的双眼看向了埃德娜，握住了她的手。“我该怎么活下去？”她问，然后就哽咽得再也说不出话来。\n\n“我会全身心地投入到工作中。等时间久了，痛苦就慢慢淡了。虽然它永远不会消失，但你可以让它成为你的一部分。继续去做慈善吧，全身心地投入进去。”埃德娜捏了捏莱昂诺尔的肩膀。“我会为他点上一支蜡烛的。”"
 brazil_adhemar_coma.45.a: "“谢谢你，埃德娜，”莱昂诺尔轻声说。“我会尽我所能的。”"
 brazil_adhemar_coma.46.t: "丧家之犬"
 brazil_adhemar_coma.46.desc: "到最后，一切都显得无足轻重。无论他们多么努力，社进革命进展到何种程度——所有的一切，都随着他的离去，如同铁特河的流水般付诸东流。\n\n在阿德马尔最后一次清醒之地送别他之后，劳多·纳特尔感到自己正经历着悲伤的最后一个阶段：接受。随着阿德马尔的去世，他和劳多的所有努力很可能就此化为泡影。现在巴西工党掌权，社会进步党无疑会在1970年的选举中面临全方位的攻击。\n\n唯一的一线生机或许在于小瓦加斯能否缔造巴西选举史上的惊天逆转。他们的确如此希望，但劳多对此并不抱太多幻想。不过至少是小瓦加斯掌舵，而不是之前那些蠢货。\n\n最终，劳多决定暂时放下忧虑；他决定前往委内瑞拉度假。局势纷乱复杂，这是他应得的休息。"
 brazil_adhemar_coma.46.a: "度完假再来担心这些事吧。"
 brazil_adhemar_coma.47.t: "白城"
 brazil_adhemar_coma.47.desc: "阿德马尔站在空无一人的巴西利亚市中心，白色的摩天大楼高耸在他头顶，却未能为他遮蔽天空那刺眼的光芒，也未能挡住无尽的黑暗。是光明，还是黑暗？是白昼，还是黑夜？这些概念对他而言已经毫无意义。他站在万物的中心——是所有存在之物，也是所有将成之物，更是所有永不可能之物。\n\n一只温暖而熟悉的手搭在他的肩膀上，那是他早已过世的父亲，也是他的兄弟，亦是他自己的手。他转身，看到那“千名之物”站在他面前。\n\n阿德马尔的目光投向远方，生命之墙外的雨林吸引着他，叫他无法抗拒。他伸手掏向自己的口袋，在寻找什么？他自己也不知道，也许是一支雪茄，一张家人的照片，或是与世界最后的联系。然而，他只找到了一个比索。一枚比索……他一生的努力……所有的财富，换来了什么？他将那枚硬币丢到一旁。耳边，传来卡丘雷乌那仿佛由千百种声音交织而成的低语：\n\n“你在毫无意义地徘徊，我的朋友，前方只有一条路，别无选择。”“那里究竟有什么等待着我？”阿德马尔紧张地问道，脚步不由自主地迈向那雨林。“我知道那些牧师是怎么说的，但那看起来可不像什么天堂之门。”\n\n“那是下一个阶段，是命运之轮的转动……是‘新秩序’。”死神如此答道。阿德马尔点了点头，却毫不理解。\n\n也许彼岸还有第二次机会，也许根本没有。平生第一次，他失去了一切掌控。没有交易，没有威胁，没有改变即将到来命运的承诺。他停止了抗拒，迈出了第一步……"
 brazil_adhemar_coma.47.a: "随后消失在那片绿色之中。"
 brazil_adhemar_coma.48.t: "美好逝去"
 brazil_adhemar_coma.48.desc: "在阿德马尔的病床边曾围着他的朋友与家人。小瓦加斯和纳特尔已经离开了。埃德娜·洛特寄来了一封信，向他保证她会为他祈祷——信递给他时他感激的点了点头，虽然并不知道信上究竟写了什么。\n\n他的眼前开始一幕幕走马灯，命定之日到了。\n\n最后一次看向圣保罗的窗外，然后是床边悲痛的亲友，阿德马尔喃喃自语：“如上帝旨意，这匣子将最后一次合上；我将国家交付与你。”随后永远闭上了双眼。心电图拉成一条直线，人们落泪。\n\n死者在哭声中环顾四周，发现卡丘雷乌就坐在旁边。他与死神打了个招呼，仿佛这是他的老朋友。“好吧，卡丘雷乌先生，我们又见面啦。唉，可惜这也没张空桌子，不然我得跟你再玩一把。”\n\n卡丘雷乌没什么明显表示，但阿德马尔看得出祂在微笑。“很高兴见到你，这也不是什么大问题，反正我只是来办公的。你准备好离开了吗？”\n\n“准备好了。”\n\n“你确定已经没有任何未竟之事了吗？”\n\n一丝犹豫闪过，然后总统阿德马尔·德·佩雷拉·巴罗斯回应——"
 brazil_adhemar_coma.48.a: "“我——我很确定。该走了。”"
 brazil_adhemar_comatree.1.t: "内阁分歧"
 brazil_adhemar_comatree.1.desc: "事情不该是这样。\n\n劳多·纳特尔无法集中精神。他听着阿德马尔的内阁成员围着他身后的桌子争吵，思绪翻飞纠缠。阿德马尔会很快苏醒吗？社进党会团结在他的麾下，让阿德马尔仍能重掌总统之位吗？他努力回忆阿德马尔教给他的一切，以及别人告诉他的一切。如果要有一个人来重振社进党，那这个人非他莫属。如果社进党想要在危机中生存下来，他就得打一些电话。纳特尔转过身去，开始拨号。他把听筒放在耳边，祈祷小金库还没花完。\n\n另一边，坦克雷多·内维斯在国会大楼外等候。与社进党的对头不同，内维斯沉着冷静。他没有想到提出弹劾条款后，会有这么多参议员支持，但他也不打算抱怨。当然，还有工作要做。早上他要给布里佐拉和库比契克打电话，好把社进党的污点从总统宝座上彻底抹去。腐败正在侵蚀巴西，但也不是无药可救。内维斯的脸上浮现出一丝笑容，他决心将阿德马尔和社进党赶下台去。\n\n夜幕降临，巴西未来的命运掌握在纳特尔和内维斯的手中。两人都知道，只有一个人能取得胜利。"
 brazil_adhemar_comatree.1.a: "社进党衰弱了，但它还没有倒下。"
 brazil_adhemar_comatree.1.a_tt: "当§h阿德马尔·德·巴罗斯§!在§S想象世界§!中与§R死神§!博弈时，他的支持者和反对者在§K现实世界§!中的争斗已然拉开了帷幕。$BRA_party_psp_c$的命运一直牵系在§h劳多·纳特尔§!的手中，但他仍在思考：他能否将§h导师的政党§!§G结成铁板一块来支持他§!？还是说，他将目睹§h导师的一切努力§!§R最终付之东流§!？"
 brazil_adhemar_comatree.1.b: "瓦加斯的遗产必将光复。"
 brazil_adhemar_comatree.1.b_tt: "当§h阿德马尔·德·巴罗斯§!在§S想象世界§!中与§R死神§!博弈时，他的支持者和反对者在§K现实世界§!中的争斗已然拉开了帷幕。§Y坦克雷多·内维斯§!相信，§d弹劾案§!定会通过，§h腐败劣迹§!将被§G统统扫除§!。但是，如果他§R不能恢复§V瓦加斯总统§!的遗产§!呢？"
 brazil_adhemar_comatree.2.t: "民粹角力"
 brazil_adhemar_comatree.2.desc: "纳特尔一边阅读着社进党派系提交给他的提案，一边在想，阿德马尔能设法说服两派合作真是奇迹。为减少国家债务削减社会支出？他们不是代表人民的政党吗？哪个脑子正常的人会同意这玩意啊？是小若昂·卡费故意想搞破坏，还是他脑子不好使，不小心发错了文件？纳特尔叹了口气，转过头来看左翼提交的另一份提案，不管那旨在自我毁灭的倒霉主意。\n\n纳特尔立刻认出了韦加尔的笔迹，开始翻阅面前的文件。土地改革，限制外国投资促进地方商业发展……这些都是纳特尔心中社进党形象的核心。搞掂这些提议，他们甚至能在昏迷事件后赢回一些选票。纳特尔翻着翻着，翻到最后一页，不由得放松下来；社进党还有希望……直到他看见了这些改革的预计花费。他看到拟议的农业计划的总成本和对地方企业的必要投资金额，脸色顿时白了几分。社进党真能负担得起这么大的开支吗？在得出结论之前，他开始在脑海中进行一些计算。"
 brazil_adhemar_comatree.2.a: "我们不能冒险增加债务。"
 brazil_adhemar_comatree.2.b: "不论代价，人民为先。"
 brazil_adhemar_comatree.3.t: "互致问候"
 brazil_adhemar_comatree.3.desc: "“我是安德拉德。”\n\n“奥罗，我的朋友！你好吗！”纳特尔紧张地用脚轻敲着他的桌子。只有一个人可以为社进党赢得时间，那就是奥罗·德·莫拉·安德拉德。但纳特尔始终无法理解参议员的心境和野心。当然，他之前也支持过社进党。但在这最危急的时刻，他会帮忙吗？\n\n“纳特尔。”电话那头的声音听不出一丝情绪。“我很好。你想要什么？”\n\n“议长先生，我直说吧。社进党和阿德马尔总统需要您的帮助。”\n\n“一个正在分崩离析的政党和一个昏迷的总统对我到底有什么好处？”安德拉德说完这句话，纳特尔的心跳加速了。谢天谢地，他还是有缝子可钻的嘛。\n\n“党现在确实处境艰难。所以我才需要您的帮助，如果您能推迟明天关于弹劾案的辩论——”\n\n“为什么呢？这在我看来不太符合宪法吧，纳特尔。”\n\n“可能是的。我知道你很快就要竞选连任了。社进党有很多候选人名单，准备好对你的连任发起挑战。我这里还有一些额外的竞选资金，可以在下次参议院选举中拿出来支持他们。怎么处理，就看您一句话了。”\n\n安德拉德咬紧牙关。这不是他第一次做这样的“交易”，但出于某种原因，这次感觉不对。不过，竞选连任就是竞选连任，没人知道谁会在这场危机中笑到最后。最好还是和现在的权力代理人保持联系，尽管他们可能很腐败。\n\n“好吧。我希望在四十八小时内见到你人。”安德拉德砰地一声把电话听筒砸在桌上。他摩挲着自己的太阳穴，试图找出一种方法来拖延明天的弹劾辩论。娘的，他到底该怎么做呢？"
 brazil_adhemar_comatree.3.a: "一叠钞票就能缓解头痛啦。"
 brazil_adhemar_comatree.4.t: "乌鸦噪杂"
 brazil_adhemar_comatree.4.desc: "劳多·纳特尔简直不敢相信自己在拨这个号码。通常情况下，给记者打个电话算不了什么，但这个电话是拨给一位前州长，而且他还是纳特尔最讨厌的人之一。但是，困兽之斗，逼不得已，而此时此刻，社进党正如困兽一般。\n\n“卡洛斯·拉塞尔达，晚上好！”\n\n拉塞尔达认出了他的声音。为什么社进党的家伙会给他打电话？他们数之不尽用之不竭的贿赂难道没有其他人可以腐化了吗？\n\n“纳特尔，别想从我这儿找路子。”\n\n“哦，我明白。我只是想聊聊巴西的未来。你也知道，瓦加斯联盟在65年大选后赢得了很多席位。我们一旦被弹劾，他们就会控制参议院，这在明显不过了吧。你怎么看？我知道你有野心，但据我计算，到69年，全民盟不可能赢得多数席位的。”纳特尔的言语满是讥讽之意，脸上露出阴险的笑容。要是他愿意的话，他真能给这只乌鸦干出真实伤害来。\n\n“拉塞尔达？你还在听吗？我想等所有事情尘埃落定——”\n\n“等等，纳特尔。别说了。我知道你在扯什么淡，你个卑鄙小人。但我想要一些东西作为交换。”\n\n对头，纳特尔心想。“当然，卡洛斯。互惠互利，公平交易。你有什么想法？”\n\n“不要再跟德国人合作了。我不关心你有什么计划，但用纳粹的影响毒害我们的国家，我永远不会原谅。现在就切断社进党和德国人的联系。”\n\n纳特尔坐了一会儿，思考着拉塞尔达的提议。诚然，这肯定会对经济造成一定的影响，但同时，也可能会为他赢得全民盟的反弹劾票。"
 brazil_adhemar_comatree.4.a: "“我会提高对德关税，之后的事咱们从长计议。成交？”"
 brazil_adhemar_comatree.4.b: "“对不住了卡洛斯，我不能答应。”"
 brazil_adhemar_comatree.5.t: "主场优势"
 brazil_adhemar_comatree.5.desc: "自阿德马尔陷入昏迷后，纳特尔就一直是一团乱麻。他每隔半小时就会给那些平时根本不会与他交流的政客打电话，希望他们能在各地和参议院中给予支持。但随着他顺着名单往下走的时候，终于来了一个能够真心实意跟他交流的人。电话铃声响起，他迅速拿起听筒，脸上露出灿烂的笑容。\n\n“热图利奥，我的朋友！终于有人可以与我坦诚相对咯。”纳特尔能听到电话那头的小热图利奥·瓦加斯咯咯地笑。如果有什么能证明任何人都有可能加入社进党，那就是电话那头瓦加斯的儿子啦。\n\n“纳特尔，我的兄弟，好久不见。你还好吗？我想你那个位置现在一定很麻烦吧。”\n\n“你说得没错，热图利奥。我这就是拆东墙补西墙哇。但听着，我需要你帮忙。”\n\n“没问题，劳多。我能做些什么呢？”\n\n“你能去圣保罗看看那些老前辈，确保他们还支持我们吗？我本想亲自去的，但是——”\n\n“放心吧。我今天下午就去看看。不过我打电话是因为我也需要你帮个忙。实际上，我有几件事情要请你。”\n\n纳特尔靠后坐在椅子上，感觉有趣的对话即将开始，“不管你需要什么，党都会支持你。你要什么？”\n\n“嗯，我们必须开始考虑连任的事情了。我这个地区有几个很有潜力的候选人。还有，别忘了圣保罗的孩子们。我们需要继续在这里投资科教。”\n\n“要是你把候选人名单发给我，我会尽快安排时间去见他们。我们会拨款在大学里建一些新的化学实验室。但我需要你保住圣保罗。”\n\n“包在我身上，纳特尔。我一会儿再和你聊。”"
 brazil_adhemar_comatree.5.a: "第二天的圣保罗，阿德马尔和小瓦加斯的广告牌遍布大街小巷。"
 brazil_adhemar_comatree.6.t: "强力后援"
 brazil_adhemar_comatree.6.desc: "纳特尔叹了口气，用手背擦去额头上的汗珠。他一边拨电话号码，一边毫不掩饰地露出了紧张的神色。这次通话若是处理不当，社进党恐怕前途堪忧。克鲁埃尔将军可不是浪得虚名；他被解雇仅仅是因为那次调查暴露了他对军中士兵和文职人员的恶劣待遇。然而，由于他曾经当过战争部长，克鲁埃尔在军中依旧拥有难以置信的影响力。\n\n“克鲁埃尔将军？晚上好——”\n\n“我会把我银行账号发给你的，纳特尔。”阿毛里·克鲁埃尔吼道。纳特尔惊愕地坐着，这混蛋怎么会知道接下来会发生什么？\n\n“呃，将军，您在说些什么？”纳特尔结结巴巴地回应。\n\n“我很清楚你想要什么。你希望我带着人马去参议院转一转，找几个支持弹劾的参议员，给他们一点颜色瞧瞧。我不是第一次做这种事了，你应该感到幸运，我还愿意再做一次。”\n\n“我——呃，那确实会很有帮助。那军队方面呢？”纳特尔听到电话那头克鲁埃尔轻笑。\n\n“军队忠于我，不是别人。再说一次，有钱是你的运气，小伙子。别担心我的人。我会让他们守规矩的。只要钱到位，你的总统宝座就能安然无恙。听起来不错，对吧？”\n\n纳特尔呆呆地坐着，心中五味杂陈。这究竟是超出了他的预期，还是让他陷入了更深的困境？"
 brazil_adhemar_comatree.6.a: "“是的，将军，听起来不错。”"
 brazil_adhemar_comatree.7.t: "赤色蔓延"
 brazil_adhemar_comatree.7.desc: "纳特尔匆匆穿过圣保罗的街道，心中不禁思索，这个社区似乎跟以往不太一样。一直都是这样吗？还是之前被我忽略了？当然，待到整个弹劾风波平息下去，社进党定能做得更好。他边走边在心里默默记下所见所感，走了一段，发现了几年前他亲手参与取缔的那个政党的会址。他走到门前，轻轻敲了三下。正当纳特尔转身查看是否有人尾随时，门突然开了，他被人一把拉进了灯光昏暗的房间里。\n\n“看看谁来我们这了，孩子们！这不是那个背叛我们和巴西的家伙的跟屁虫吗！”\n\n纳特尔认不得桌子那边的几位仁兄，但有个人他一眼便认了出来。“各位，在这相见真尴尬啊。我只是——”\n\n“行了，行了，”有人打断他说，“我们都懂。只是职责所在，对吧？毕竟，人总要吃饭的嘛……”\n\n其他人都笑了起来，但路易斯·卡洛斯·普列斯特斯却没有。他坐在上首，双手紧握，沉浸在深思中。“纳特尔，”他开口说，“今晚是什么风把你吹到这儿来的？”\n\n“普列斯特斯，我和阿德马尔现在需要你的帮助。我想你已经听说了弹劾的事。”“我不会帮阿德马尔的，纳特尔。但我愿意帮你。我可以去和工党的老朋友聊聊，但我有个条件。”\n\n“当然，先生。需要多少钱？”普列斯特斯举起右手，面容紧绷，纳特尔心中一沉。“我不要你的钱，纳特尔。我要的是更多。你必须让这个党重新合法化。在这一点上，我不会有任何妥协。”\n\n纳特尔喉头一阵发紧。这个代价可谓前所未有，他真的能承受得起吗？他做了个鬼脸，手不自觉地摸了摸屁股，然后对普列斯特斯说："
 brazil_adhemar_comatree.7.a: "弹劾案一结束，我就解禁你的党。"
 brazil_adhemar_comatree.7.b: "没门。晚安我的朋友。"
 brazil_adhemar_comatree.8.t: "旧日盟友"
 brazil_adhemar_comatree.8.desc: "纳特尔紧紧盯着手中刚刚喝完的空咖啡杯，这是第五杯还是第六杯来着？一年前，他曾下定决心要摆脱咖啡因，但眼下的危机显然让健康计划变得不切实际。他正要提笔写字，门外却传来了敲门声。“请进。”纳特尔叹了口气。“先生？我终于找到您之前让我查的那个电话号码了。”秘书有些尴尬地递过来一张有些破旧的纸条，上面写着一串熟悉的数字。纳特尔舒了一口气，掰了掰手指。终于有好消息了。\n\n“谢了，给我就行。”他边说边开始打电话。秘书刚走，电话那头就传来了熟悉的声音。“劳多，你终于打来了。”\n\n“这时代变化快啊，普利尼奥。很抱歉现在才联系你，真是一场闹剧。听着，我们需要你的支持。”\n\n“当然，劳多。我愿意提供帮助，但作为交换，我希望能担任教育部长。”\n\n操蛋，纳特尔顿感棘手。他真的要用巴西的未来作为筹码，只为了让他的政党继续执政吗？萨尔加多一直是个极富争议的家伙，他与法西斯主义的公开联系一直是社进党的伤疤。但如果没有民代党的支持，阿德马尔可能无法赢得连任。纳特尔知道他必须做出抉择，该怎么做呢？"
 brazil_adhemar_comatree.8.a: "行吧。"
 brazil_adhemar_comatree.8.b: "太冒险了。"
 brazil_adhemar_comatree.9.t: "莱昂内尔的屈服"
 brazil_adhemar_comatree.9.desc: "当莱昂内尔·布里佐拉走出国会大楼，踏上街头的那一刻，一种既熟悉又沉重的气氛立刻将他包围。这让他想起了五十年代，“新国家”行将就木、一场政变悄然逼近的那些日子。那时，议员们疯狂地进行着幕后交易，而丘八和军方则在暗中潜伏，随时准备发动突袭。\n\n莱昂内尔走向公园，埃德娜已在那里等候。\n\n“好久不见！”布里佐拉开口。\n\n埃德娜回道：“莱昂内尔，见到你真好！蛮久没见面了，对吧？我直说了吧，我们需要你和你的政党全力支持我们的事业，共同努力，阻止纳特尔成为总统。”\n\n“当然。”莱昂内尔回答道。“你来做总统的前景肯定是不错的，要是你们能够采纳工党的一些建议，推动一项增加预算……”\n\n“我欣赏你的决心，莱昂内尔。”埃德娜插话道。“但要想摧毁社进党的纸牌屋，我们需要拉拢更多的支持。我们无法仅凭一些表面的让步就安抚其他党派。我知道这对你来说很难接受，这对我也是如此，但没剩下几天就要选举了。只有过了这一关，我们才能共同建设一个更美好的巴西。现在——要让这次昏迷事件成为巴西历史上的一个转折点——要把那些无赖送进监狱。”"
 brazil_adhemar_comatree.9.a: "“好的，埃德娜。工党会站在你这一边。”"
 brazil_adhemar_comatree.10.t: "库比契克电台"
 brazil_adhemar_comatree.10.desc: "库比契克翻阅着他的稿子，确定一切正常之后，对技术人员竖起了大拇指。他清了清嗓子。\n\n“我的巴西同胞们，国家正处于艰难时期。在经历了令世人羞惭的多年腐败之后，有组织犯罪集团的领袖几近垮台，但他的走狗仍在不懈地战斗、密谋和行贿，试图让我们的巴西向外国势力屈服。我请求所有巴西人支持伟大的元帅之女埃德娜·洛特，她对总统职位的追求是合法、正当、完全符合宪法的。在这场危机中，我比任何人都更坚信，她有能力将巴西引领回到一个虽不完美，但肯定比现状更好的正常状态。社会民主党将坚定不移地支持我们的盟友巴西工党，有了你们的帮助，我们或许能引领巴西重回繁荣之路。请记住，‘乐观主义者可能会输掉，但悲观主义者已经输在起跑线上了！’”\n\n库比契克放下他的稿子，叹了口气。他希望自己的影响力能帮助埃德娜赢得总统宝座。他的目光转向了电台的技术人员，寻求他的认可。那人点了点头，露出一个微笑。"
 brazil_adhemar_comatree.10.a: "不错啊，库比契克。"
 brazil_adhemar_comatree.11.t: "人民的声音"
 brazil_adhemar_comatree.11.desc: "巴西街头人潮涌动，红色的横幅和标语牌遍布大街小巷。“铲除腐败”、“新洛特，新繁荣”、“天罚阿德马尔”的口号在人群上空飘荡。他们在道路中央分开，若昂·古拉特站在讲台上，慷慨激昂地批判阿德马尔的腐败行径，宣布只有工人阶级团结起来，运用法治的力量，才能终结腐败的政府。\n\n就在这时，埃德娜出现在人群中，所有视线瞬间汇聚于她，只有杨戈的声音还在空中盘旋。她走向讲台，静静等待杨戈讲完。她踏前一步，人群爆发出雷鸣般的掌声——她成功吸引了他们的目光。\n\n“感谢你，杨戈，”她开口说道，“巴西，我已经忍无可忍！这些年来，我在阿德马尔的阴影之下默默耕耘，努力遏制他的愚行。我亲眼见证着我们的政府日渐堕落，却束手无策。现在，上帝赐予我们所有人一个机遇。在总统陷入昏迷之际，巴西有望挣脱他的束缚，重返繁荣之路！”\n\n埃德娜的目光扫过人群，看到他们被自己的话语深深吸引。她的一生中有无数这样的演说，但从未看到人群的眼神中有着如此强烈的变革欲望。\n\n她继续说道：“阿德马尔将国家财富卖给他的富人朋友，窃取了本属于每一个巴西人的繁荣！暴行昭彰不知收敛，欲壑难填，竟不惜与纳粹勾结！他的顾问在种植园里使用奴隶，有的甚至与海因里希·希姆莱通信往来！一旦我当上总统，我一定会把这些困扰国家许久的肮脏渣滓立刻清除出去。”\n\n“把那个垂死的暴君赶下台之后，我将立刻……”"
 brazil_adhemar_comatree.11.a: "……与美国密切合作，使美洲远离纳粹威胁！"
 brazil_adhemar_comatree.11.b: "……签署临时措施，帮助结束国内的不平等现象！"
 brazil_adhemar_comatree.12.t: "父亲的援手"
 brazil_adhemar_comatree.12.desc: "埃德娜犹豫地看了看电话，她对于是否应该利用自己的姓氏感到纠结，但她知道非常时刻需要采取非常措施。她最终还是拨通了父亲的电话。电话铃声刚响了两下，就被接起。\n\n“你好，爸爸。你还好吗？”她轻声问道。\n\n“女儿！”电话那头，恩里克的声音带着一丝惊喜。“我的宝贝怎么样啦？你还好吗？现在情况紧张，你一定很不安吧？这让我想起了五零年到五五年的那段日子。对不起，你爸又多嘴咯。你打电话来我真的很高兴。”\n\n听到父亲的话，埃德娜不禁轻笑，一边把一缕头发拨到耳后。要是有一段时间没打电话，她爸就总会这样。“打电话给你我也很高兴。我本来是想多打电话的，但这里的情况真的是一团糟。实际上，这也是我打电话的一个原因。你还记得你当总统那段日子吗？”\n\n“当然记得。”他回答道。“如果你问我有什么后悔的，我希望我当时能给文盲们投票权。除此之外，我觉得我干得还不错。怎么了？”\n\n“嗯，我担心军队可能不会完全信任我。我打电话是想请你帮个忙，和你当年的一些朋友谈谈，劝他们不要……嗯，独走。”\n\n“当然可以！”父亲回答。“我会联系一些老朋友，看看他们能否在军事方面给予支持。我也会去问问社民党，以防万一。”听到爸爸的话，埃德娜感到一阵安心——洛特这个姓氏在她父亲的嘴里总是那么有力量，这让她的处境似乎一下子轻松了许多。"
 brazil_adhemar_comatree.12.a: "“谢谢老爸。”"
 brazil_adhemar_comatree.13.t: "最高法"
 brazil_adhemar_comatree.13.desc: "有图有真相。七张阿德马尔·德·巴罗斯与赫尔曼·约瑟夫·阿布斯握手言欢，觥筹交错的绯闻照片在最高法院供所有人传阅，人们愤怒地低语着，而埃德娜·洛特正襟危坐。她珍藏的这些照片终于派上用场了。\n\n“感谢！”最高法院院长在办公桌前高呼，屋内顿时鸦雀无声。他随即转身瞥向埃德娜。“副总统女士，您这么做到底想干些什么？总统完全有权和阿布斯谈生意，这和您没关系。”\n\n她嗤笑一声，站了起来。“恕我直言，我今天不是来谈阿德马尔的权利的，这些照片揭露的是他曾对巴西的野心——现在可能依旧如此，”她指着桌上的照片，“他是个骗子，一个罪犯，但我们却将此当玩笑视而不见，更有甚者——真有人支持这社进党匪帮粉饰的门面！”\n\n全场哗然。还没有谁这么明目张胆过。洛特继续：“我们若不行动起来重击这伙盗匪老爷，巴西必要被他的阿勃维尔同党扼杀，堕为德国的又一个提线木偶！”\n\n她停顿了一下，整理情绪。“抱歉，我太激动了。话虽如此，我已向秘书处递交将社进党认定为有组织犯罪集团的申请。”"
 brazil_adhemar_comatree.13.a: "我等皆系于此……"
 brazil_adhemar_comatree.14.t: "疯子呓语"
 brazil_adhemar_comatree.14.desc: "在圣保罗的媒体中流传着一句话：当雅尼奥·夸德罗斯宣布要召开记者会时，全州的记者都会搓着手满怀期待，因为那一周的报纸销量一定会飙升。这位政客总是发表些荒唐离奇的公开言论，尤其是现在他漫不经心地拍去西装上的头皮屑，走向讲台时，在场的记者们都深知这句话再真实不过了。\n\n他拍了拍麦克风，然后轻咳了一声。“各位，日安。我今天站在这里，是要警告大家我们国家正面临严重危机。一种腐烂的毒瘤，正在悄悄侵蚀巴西的灵魂。这是——抱歉，我能先……”他停下来擦了擦眼镜。“好了。那么，正如我刚才所说，我们面临着一种阴谋威胁，它试图从内部摧毁巴西。毫无疑问，这威胁就是社进党。”\n\n夸德罗斯停了一下，给记者们时间记录。“我一直说巴西要实行独立、强硬的外交政策。但那个胖子和他的同伙呢？你只要看看他和德国人做的那些事就明白了！他办公室里竟然还有间谍，像这种人，我们怎么能相信他不会为了捞钱把巴西变成另一个专员辖区？”\n\n许多人对他如此直白地辱骂一个昏迷的人感到震惊，但那些熟悉夸德罗斯的人知道，这就是他的风格。“我很清楚这个暴发户的行事作风，毕竟他已经祸害这个伟大的国家太久了，”他说，台下又是一阵惊叹。“我知道，只要有机可乘，他就会卷土重来。因此，我恳请参议院在总统无力履职时将其撤职，由副总统接任。尽管我在许多问题上与她意见不合，但至少她能让政府清廉、独立。谢谢各位。”"
 brazil_adhemar_comatree.14.a: "他没有回答任何问题就走了。"
 brazil_adhemar_comatree.15.t: "南方的召唤"
 brazil_adhemar_comatree.15.desc: "戈登嘎巴嘎巴掰着手指，使馆里又过去无聊的一天。外头不断传来弹劾阿德马尔的呼声，但他希望他们不要拿这事来打扰他。忽然，他的电话响了起来。他知道是谁打来的。\n\n“哈喽，纳特尔。”\n\n劳多开门见山，直接谈起阿德马尔的弹劾听证会。“巴西和美国一直以来都是朋友，美国也是最早承认巴西的国家！就像唐·佩德罗之前所做的那样，我以十足的谦卑前来请求帮助。”\n\n戈登本可以立刻采取行动，他本可以给纳特尔提供对方想要的所有援助，但今天早上早些时候给他的纸条提醒了他。短短的一行字用粗体写就，“国务院通知驻巴西大使林肯·戈登，在任何情况下，都不要在弹劾程序中提供帮助。”\n\n当然，天高皇帝远，他可以不管这张纸条，而惩罚要过很长时间才会落到他的头上。这一切都取决于他如何回应对方的召唤，整个国家的未来此刻正掌握在他的手中。"
 brazil_adhemar_comatree.15.a: "对不起劳多，我只能拒绝你。"
 brazil_adhemar_comatree.15.b: "劳多，今天，我们站在一起。"
 brazil_adhemar_comatree.16.t: "副总统的请求"
 brazil_adhemar_comatree.16.desc: "戈登在办公室里翻阅着报纸，映入眼帘的标题直截了当：“弹劾听证会第二日。”作为大使，自从巴西总统阿德马尔上任以来，他一直密切关注着巴西与德国之间的最新动态，这次弹劾无疑引起了他的高度关注。他边品着咖啡，边沉思。电话铃声打破了沉默，他知道是谁打来的。\n\n“埃德娜，什么风把你吹来了？”\n\n副总统直入正题，开始谈论诉讼程序。“戈登，你看，阿德马尔与德国的关系简直令人发麻，他喜欢舔德国的腚沟，为了个人利益不惜出卖巴西。”大使酌了一口咖啡，目光落在了桌上那份关于巴西与德国关系的最新报告上。从军事合作到贸易谈判的种种传言，巴西与纳粹的关系似乎比以往任何时候都更为紧密。\n\n“埃德娜，我答应过你，无论发生什么，我都会支持弹劾阿德马尔。”戈登疲惫的眼睛望向窗外，他知道该怎么做，但他真的有足够的力量去完成这一切吗？"
 brazil_adhemar_comatree.16.a: "“……遗憾，我无法信守诺言。”"
 brazil_adhemar_comatree.16.b: "“……我将不惜代价。”"
 brazil_adhemar_comatree.17.t: "戈登拒绝"
 brazil_adhemar_comatree.17.desc: "“您好，\n\n美国大使馆已经收到了你们要求我们协助解决当前政治危机的请求。尽管对于我们的长期朋友与盟友，我们也希望这场危机能够迅速且和平地得到解决，但我们并不能插手他国的政治事务。\n\n我们希望今后继续同包括巴西在内的南美国家保持牢固的友谊。\n\n致以最诚挚的问候，\n林肯·戈登。”"
 brazil_adhemar_comatree.17.a: "无事发生。"
 brazil_adhemar_comatree.18.t: "戈登同意"
 brazil_adhemar_comatree.18.desc: "“您好，\n\n美国大使馆已经收到了你们要求我们协助解决当前政治危机的请求。虽然我们的一贯政策是尽量避免干预其他国家的内政，但我们也深知，维护盟友的民主制度是我们的道德责任。因此，我们愿意提供帮助，推动巴西建立一个更为友好的政府。\n\n我们希望今后继续同包括巴西在内的南美国家保持牢固的友谊。\n\n致以最诚挚的问候，林肯·戈登。”"
 brazil_adhemar_comatree.18.a: "为我们忠诚的盟友欢呼！"
 brazil_adhemar_comatree.19.t: "南线无战事"
 brazil_adhemar_comatree.19.desc: "电话一部、桌子一张、椅子数把，还有巴西与德国国旗锦簇的元首相一幅。这就是基尔克大使办公室的全部家当，简直称得上是简朴，日耳曼尼亚从没派人来装修过，因为先前巴德关系并不算融洽。就在这间办公室里，大使正处理着日常事务，电话却突然响起来。\n\n“您好？请问是德国大使馆吗？”纳特尔的声音传来，他打这通电话来想想并不奇怪，阿德马尔已经不省人事，还面临着国会的弹劾。此时任何势力的援助都弥足珍贵。“基尔克大使，我国民或许与贵国雅利安人相比有所不及，但阿德马尔总统一直致力于消除两国之间的隔阂。我恳请贵国能在此危难之时提供援助。”\n\n基尔克大使抿了一口咖啡，他的手中掌握着纳特尔和巴西的未来。“如果贵国选择支援我们，我们将有机会进一步巩固这些联系。”纳特尔接着说道。“若蒙贵国援助，我国将深感亏欠贵国不尽恩情。”\n\n基尔克大使的脑中一时闪过无数个念头，他真会这么做吗？这是基尔克为数不多能全权决定的事情之一，他此时所做出的任何决定都会永远地改变巴西和祖国的全局走向。这位德国大使沉默了良久，最终做出了回答。"
 brazil_adhemar_comatree.19.a: "“实属抱歉，我们爱莫能助。”"
 brazil_adhemar_comatree.19.b: "“纳特尔，我们成交。”"
 brazil_adhemar_comatree.20.t: "杳无音讯"
 brazil_adhemar_comatree.20.desc: "劳多·纳特尔满手冒汗，电话仿佛黏在掌上。他的眼睛直勾勾盯着时钟，思绪万千，而指针愈发靠近零点，只剩毫厘之差。德国效率神话肯定是吹的，那边多少年前就该致电了，而现在却将近午夜。双眼望着指针滴答走着，慢慢的……慢慢的。\n\n午夜时分。\n\n无应答。\n\n电话从桌子上飞出，砸在墙上。咔嚓，咔嚓，咔嚓。纳特尔好像全世界最愤怒的踢踏舞者，把那用鞋底塑料外壳踩得粉碎，马上只剩下一堆惨兮兮的电线、七零八落的零件、和万千悔恨。\n\n美国人说到底也没啥毛病吧？他们为什么非得相信大洋对岸的纳粹？幸好阿德马尔自己还昏迷着，不然纳特尔肯定想亲手让他再昏一次，只不过……深吸一口气。事已至此。\n\n纳特尔再次静下心，整理领带，扫走鞋子上的灰尘。但他还是感觉难受，只有一个字能为他抒情。\n\n于是乎，糟糕的一日，止于走廊那一头的一声怒吼。"
 brazil_adhemar_comatree.20.a: "妈的。"
 brazil_adhemar_comatree.21.t: "雄鹰展翅"
 brazil_adhemar_comatree.21.desc: "“亲爱的劳多先生，\n\n德国对巴西近期发生的事件深感悲痛，并一直以极大的关切关注着事态发展。我们衷心祝愿阿德马尔·佩雷拉·德·巴罗斯总统一切顺利，希望他早日康复。同样出于这份关切，我希望为德国驻巴西情报机构的行动道歉——这些行为未经监管许可，但请放心，相关人员已经受到了应有的惩罚。\n\n既然事实已经得到澄清，我们认为重要的是要指出，针对总统的弹劾毫无根据，显然是些为自身一己私欲从而铤而走险的阴险小人采取的一种策略。我已经从许多巴西参议员那里得到了保证，他们将拒绝支持这种基于虚假指控的夺权行径……”\n\n读到这些话的劳多·纳特尔脸上露出笑容。这一刻，他仿佛卸下了沉重的负担。尽管他对德国及其政策有些厌恶，但他终于理解了阿德马尔为何要与他们交易。在德国的支持下，弹劾不过徒劳——他们过去五年的努力不会白费。\n\n他走到窗前，手中还握着那封信。太阳在圣保罗的天空升起，柔和的橙色光芒照亮了整个城市。政治危机似乎正在走向尾声。"
 brazil_adhemar_comatree.21.a: "感谢德巴友谊。"
 BRA_Healthcare_Bill_Passed_tt: "医保法案获得通过"
 BRA_Healthcare_Bill_Failed_tt: "医保法案未获通过"
 brazil_adhemar.62.t: "值得投资？"
 brazil_adhemar.62.desc: "[USA.GetLeader]总统低头看了看国务院送来的文件，皱起了眉头。巴西海军上将的访问来得正是时候——这段时间阿德马尔政府对德国人太过友好，这不是什么好事，这时他们选择先来美国，对未来双方的关系来说是一个好兆头。\n\n但是，他们要的东西未免太多了点。他抬头看着自己的国家安全顾问。“嗯？我们确定巴西人想要这么多铀吗？”\n\n那人点点头。“海军上将坚持要这么多。他说，巴西需要价值约5亿美元的铀，以及提炼铀所需的设备。”\n\n这无疑是个麻烦。对于一个此前曾表示愿意为短期利益去找德国人赌一把的政府来说，这可是一大笔钱。说老实话，想想如果地球上哪个亲德政权拿到核武器会发生什么，他就不寒而栗。但话说回来，政府到头来也是要换届的嘛。也许这会是个效果不错的长线投资。\n\n他叹了口气，然后做了个决定。"
 brazil_adhemar.62.a: "“放手去做。我们需要更多强大的盟友。”"
 brazil_adhemar.62.b: "“花钱和冒险都不值得。”"
 brazil_adhemar.63.t: "美国同意伸出援手！"
 brazil_adhemar.63.desc: "令人欣慰的是，在认识到与我们合作所带来的益处之后，美国终于同意协助我们发展核项目！我们将很快接收到购买的铀以及相关设备，核设施的建设也即将启动。"
 brazil_adhemar.63.a: "原子之力愈发触手可及。"
 brazil_adhemar.64.t: "美国拒绝帮助"
 brazil_adhemar.64.desc: "遗憾的是，尽管我们向美国人提出了充分的理由，希望他们协助我们发展核项目，但他们最终还是拒绝了我们的请求。这无疑是天大的挫败，但这并不意味着结局。我们会去其他地方寻找合作伙伴。"
 brazil_adhemar.64.a: "我们必须到别处去找找看了。"
 brazil_adhemar.65.t: "巴西想搞核弹"
 brazil_adhemar.65.desc: "老哥搞颗原玩玩"
 brazil_adhemar.65.a: "OJBK"
 brazil_adhemar.65.b: "GUN"
 brazil_adhemar.66.t: "澳大利亚同意伸出援手！"
 brazil_adhemar.66.desc: "在堪培拉进行了一连串紧张刺激的谈判后，阿尔瓦罗上将成功与澳大利亚方面达成共识，他们将帮助我们开发一个核项目！虽然成本可能不菲，但这意味着我们在推进核计划时，不再单纯依赖于某一超级大国的援助。"
 brazil_adhemar.66.a: "太阳之力愈发触手可及。"
 brazil_adhemar.67.t: "澳大利亚拒绝帮助"
 brazil_adhemar.67.desc: "尽管阿尔瓦罗上将竭尽全力与澳大利亚进行谈判，希望能够达成协议，但对方提出的要求实在是差得离谱。到头来，他们决定不支持我们发展核计划。我们要去其他地方找能帮助我们的人了。"
 brazil_adhemar.67.a: "它还在逃避。"
 brazil_adhemar.68.t: "来自南方的请求"
 brazil_adhemar.68.desc: "赫尔曼·约瑟夫·阿布斯轻抿一口咖啡，品味那苦涩却带着温暖的滋味，与外面笼罩日耳曼尼亚的大雨相映成趣。说实话，他更愿意身处其他地方，处理更为重要的事务。然而，巴西的海军上将要来，进行一场关于重要交易的谈判，而他希望能从中分得一杯羹。毕竟，到目前为止，阿德马尔政府对于德国利益一直持开放态度。\n\n门外响起两声敲门声，秘书探头进来。“阿布斯先生，阿尔瓦罗上将到了。”他点了点头，示意她让客人进来。他站起身，与海军上将握手。\n\n“阿尔瓦罗先生，见到您很高兴。请坐。”他说着，示意对方坐下。阿尔瓦罗回以点头微笑。“那么，我们的巴西朋友今天有何贵干？”阿布斯问，他心里清楚对方的来意。\n\n“三个字，核计划——离心机啦、铀啦这些。”阿布斯点点头。巴西的核计划——这是近十年来最具地缘政治意义的事件之一。又一个核大国的崛起对全球力量平衡的影响不容小觑，而要是他们与德国结盟，那影响力必将更加深远。\n\n但是，成本却无比高昂。铀本身就不便宜，更不用说加工铀所需的设备了。他的商业直觉告诉他，帮助巴西的代价太高。于是，阿布斯当场做出了决定。"
 brazil_adhemar.68.a: "帮助他们是理所当然的事。"
 brazil_adhemar.68.b: "代价太高了。"
 brazil_adhemar.69.t: "德国同意伸出援手！"
 brazil_adhemar.69.desc: "德巴关系史翻开了新的篇章，德国慷慨同意向我方提供必要的设备，令巴西成为冉冉兴起的核力量。当铀和离心机跨过大洋彼岸之时，我们将为德国与巴西之间的友谊欢呼万岁。"
 brazil_adhemar.69.a: "近在咫尺了。"
 brazil_adhemar.70.t: "德国拒绝帮助"
 brazil_adhemar.70.desc: "德国人出人意料地拒绝了我们购买铀和设备以支持我国核项目的请求。这样的发展令人沮丧，但我们必须坚持我们的立场，继续寻找贸易伙伴。"
 brazil_adhemar.70.a: "妈的。"
 brazil_adhemar_endgame_survival.1.t: "梦碎入魇"
 brazil_adhemar_endgame_survival.1.desc: "阿德马尔一瘸一拐走进内阁会议室，里面仍旧空无一人。他眯起眼仔细检查，一桌一椅都丝毫未动，仿佛时间静止了一般。他大口喘着粗气，一屁股坐在椅子上，心脏因高血压而砰砰狂跳。卧病在床三个月，如今的他每天至少要睡十二小时，还要拿出两小时去库比契克修建的现代主义运动场散步、绕圈。\n\n圣保罗人民的英雄不在了，取而代之的是一个不再适合从政、随时可能晕倒的老人。第二任期、修改宪法，一切都成了痴人说梦。他的政党支离破碎，他的心血付之一炬。他醒了，梦也碎了。\n\n然而，噩梦才刚刚开始。\n\n什么外国间谍，什么政治渗透，他真的愚蠢到被德国人的卧底耍得团团转？又或者，反对派的背后的确有OFN的特工撑腰？不，他的身体早已经不起这样的冷战阴谋论了。\n\n现在，摆在他面前的还有一个更重要的任务：查清弹劾事件的幕后黑手。种种蛛丝马迹、流言蜚语，都指向了同一个事实："
 brazil_adhemar_endgame_survival.1.a: "坦克雷多肯定参与了，埃德娜会不会是帮凶？或许我看错她了……"
 brazil_adhemar_endgame_survival.2.t: "走向未来"
 brazil_adhemar_endgame_survival.2.desc: "高原宫内，身为总统醒后首个点名要找的人，劳多正赶着去见阿德马尔。路过埃德娜·洛特的办公室时，他发现里面并无人在。叛国的指控、媚美的嫌疑加之死亡的威胁，迫使她告别官场，回里约暂避风头。\n\n阿德马尔面容憔悴，整个人身上看不到一丝以往的活力。\n\n“劳多，见到你真好。”阿德马尔站起身，用尽全力给了挚友一个拥抱。社进党的支柱早已不再是他，昔日的权力正同他渐行渐远。\n\n“谢谢您，总统先生。”\n\n“清除了内阁中的敌对分子，我们总算能好好庆祝一下啦。”阿德马尔靠在椅子上说，“历经重重考验，我们仍然团结一心，继续治国理政。”劳多对此颇有同感，“这都是我们理应做到的，没有您，国家早就不堪重负了。”阿德马尔点点头，“要选举了。党需要一个人引领巴西沿着我的路线走下去，你觉得谁比较合适？”劳多思考了一会，脑中浮现出好几个可能，最后说道：“小瓦加斯如何？这个名字够分量。”\n\n阿德马尔摇了摇头。“不好。他虽然有能力，可偶尔也会动些歪脑筋，让人头疼。给他一个机会不是不行，但一定要配上一个称职的副手，比如你。”\n\n“我？”劳多简直难以置信，“65年那回我就失败了，您这次昏迷更是把我好一番折腾……”劳多的话如同一把尖刀刺中了阿德马尔的内心，当年正是他无所作为才导致劳多落败，而今想让后者再度竞选副总统，势必要投入更多的贿赂和精力。\n\n他压制住巨大的负罪感，给劳多倒了一杯威士忌。“放心吧，我们的资源比上次充裕很多，再加上你丰富的政治履历，一定能成功的。”"
 brazil_adhemar_endgame_survival.2.a: "二人相互握手，结束了这次会面。"
 brazil_adhemar_endgame_survival.3.t: "坚定的哨兵"
 brazil_adhemar_endgame_survival.3.desc: "阿德马尔站在高原宫三楼的会客室里。眼前的巴西利亚景色曾是他权力的象征，如今却成了责任的重担，压得他喘不过气。他醒来了，但他的境况却丝毫未见好转。他身体发抖，拒绝坐下；他是个坚强的哨兵，从不动摇。思虑周详、算计万端之后，他才走到了今天这一步，而埃德娜是他无法绕过的难题。白手套轻轻敲响木门。“请进。”\n\n埃德娜的出现犹如平静湖面上泛起的涟漪。她那件猩红色的西装外套搭配图案象牙色裙子，给人以不容小觑的力量感。她本可轻松成为巴西历史上的第一位女总统。为何不把握机遇呢？“总统先生，这段时间您不在，一切都变得一团糟。您现在……感觉如何？”\n\n气氛有些不对，但他还是露出了标志性的微笑，“我很好。”他呼吸急促。“我有几个问题想问……”他的血液仿佛凝固了。“……特别是关于……”怎么回事？“……内维斯。”突然间，他感到一阵眩晕；他的心率开始下降。多年药物治疗下积攒的经验涌上心头：这是血管迷走神经性晕厥。\n\n她迅速冲过来，在他摇摇欲坠时稳住了他。“您还好吗？”他抬头望去，突然明白过来。她的眼中没有怜悯，只有责任。他点了点头，异常沉默。她的语气让他明白，她即将说出的，是铁一般的事实。“阿德马尔，没事的，我在这里呢。”\n\n他的命运完全掌握在她手中，但不知怎的，她现在站在他这边。他微笑着站起身，晕厥发作并非总会让人摔个头破血流。“只是有点头晕而已，”他叹了口气。一个念头将他拉回现实；他不得不取出一个特制的小瓶子。这是让权势之人留在他身边的最简单方法。他的健康状况十分糟糕，但他们还有很多事情要做。"
 brazil_adhemar_endgame_survival.3.a: "“来杯嘉宝果酒？”"
 brazil_adhemar_endgame_survival.4.t: "新交挚友"
 brazil_adhemar_endgame_survival.4.desc: "“到了先生，机场在您右手边。祝您旅途愉快。”巴勃罗对后座的乘客说道。\n\n那位衣冠楚楚的乘客点点头，下车走进灯光昏暗的停车场。取完行李后，他慷慨地留下小费，转身步入灯火通明的航站楼。巴勃罗长舒一口气发动车子，终于能回家与家人共享难得的闲暇时光了。他打开收音机，让白噪音驱散路途的疲惫。\n\n天气预报刚结束，一则突发新闻突然插播。巴勃罗调大音量，女主播颤抖的声音传来：“阿德马尔总统刚刚向国会提交法案，旨在驱逐巴西的‘危险美国势力’。他声称美国策划了最近的政府危机，法案要求切断与OFN的军事联系，大幅提高美国商品关税，并关闭所有驻巴西的OFN军事机构。详情请关注七点档。”\n\n巴勃罗眯起眼睛。父亲和无数巴西男儿曾与美军并肩抗击纳粹的场景在眼前闪现。为什么这个昔日盟友会制造危机？更何况导火索明明是揪出了德国间谍？阿德马尔素来反美不假，但何至于此？唯一的解释就是总统在撒谎——被贪婪蒙蔽的他，正把巴西推向第三帝国的血盆大口。自从总统昏迷事件后，巴勃罗就对他心存芥蒂，此刻终于确信："
 brazil_adhemar_endgame_survival.4.a: "总统脑子是真坏了。"
 brazil_adhemar_endgame_survival.5.t: "夜间新闻"
 brazil_adhemar_endgame_survival.5.desc: "将当晚最后一位乘客送到圣保罗国际机场后，巴勃罗开车回到车站。那是位德国游客，一路上光顾着碎嘴子骂娘了。不过，随着这位乘客的离去，巴勃罗终于能够把车载音乐从每个人都要听的巴萨诺瓦切到他酷爱的经典桑巴。正当他调试着收音机寻找合适的频道时，一个听起来颇具官腔的声音从某个频道中传了出来。\n\n“法案提议彻底断绝与德国的关系。”出租车遇到红灯，嘎吱一声停了下来。他看到旁边那辆车里有个女人也在听收音机。“这一决定源自最近曝光的我国政府内部的不一致性。”两人几乎同时翻了个白眼。所以他们真这么说的？\n\n“我们国家与德国之间的一切外交关系将被中止。”绿灯亮了。“巴西和德国的贸易活动全部暂停。”一辆大众甲壳虫车拐了个弯，从视野里消失了。“巴西将暂停向德国公民发放签证，直至另行通知。”遗憾的是，法案的通过需要时间；他其实很乐意将那位德国游客留在这里。\n\n但是，这却是个多么意外的好消息啊。他的父亲在与那些家伙的战斗中牺牲，现在他的棺材板终于不会闹腾了。选择在这个时候宣布这一消息颇不寻常，但谈判过程一定异常艰难。他觉得……那位游客可能是因为时差所以才情绪暴躁；毕竟那是德国的凌晨两点。德国人即将面临一场艰难的觉醒。也许那些家伙选择这个时间正是为了给他们一个惊喜。真是狡猾得很呐。"
 brazil_adhemar_endgame_survival.5.a: "也许昏迷终于让那个傻蛋清醒了点。"
 BRA_the_man_who_deceived_us_tooltip: "§h阿德马尔总统§!将大举清除巴西国内的德国影响，此举恐将§R损害经济增长§!。"
 brazil_adhemar_endgame_survival.6.t: "诸风吹拂日耳曼尼亚"
 brazil_adhemar_endgame_survival.6.desc: "日耳曼尼亚半没黄昏，狂风呼啸而过，打断了阿德马尔与那位自称卡尔的男人之间的谈话。卡尔正按照预定的议程，滔滔不绝地讲着两国间的共通之处，这些话全成了阿德马尔的耳旁风。他的心思早已飘回至早先的招待会，那里有德国美女、美酒佳肴，还有克莱门特的身影。思绪流转之际，他抬头望见了从方方正正的混凝土大楼群中兀然而出的人民大厅。心不在焉的总统向不耐烦的卡尔道了歉，随即加快脚步朝那座建筑走去。\n\n为什么他们会派这样一个低级官员来迎接他？为什么他们连他钟情的葡萄酒都能提前准备？为什么风让他感到压抑，建筑与街道如此宏阔大气，他自己却微不足道？风势愈发强劲，阿德马尔不得不收起幻想，直面内心深处。\n\n日耳曼尼亚这座城，仿佛出自某人的刻意设计，让他感觉自己好似一只任人摆布的木偶——虽受宠若惊，却毫无力量。合作条款里那些优厚的条件，无论是工业、农业还是军备上的援助，都像是为了拉拢一位盟友而下出的赌注。\n\n好得不像真的。现在回头已经晚了，既然身处罗马……"
 brazil_adhemar_endgame_survival.6.a: "……行如罗马人。"
 brazil_adhemar_endgame_survival.7.t: "无出其右"
 brazil_adhemar_endgame_survival.7.desc: "阿德马尔轻轻敲打电话光滑的表面，心情复杂。共产党人曾将他推上圣保罗州州长的宝座，然而禁令一经颁布，他却成了第一个彻底清洗共产党的人。现在他来了，要向他们寻求帮助。手中紧握的手杖并未给他带来安慰，反而让他的颤抖更加剧烈。“抱歉，我丈夫现在很忙，”玛丽亚的声音从电话那头传来。“需要我帮您留言吗？”总统本想事先美言几句作为开场，现在别无选择，只能直接陈述自己的提议，希望普列斯特斯能够考虑。他像往常一样，精心斟酌了所有细节。\n\n“请记下来。”他的声音比他料想的要微弱。“路易斯，你在我昏迷不醒的时候帮了劳多一把；这样的恩情理应有所回报。很遗憾，解禁没法谈，但我们还有其他出路。”他清楚，必须让那些抱有怀疑的人相信这里没有陷阱，因此他得先表明态度。“我需要你的党支持我。”当然，支持一个支离破碎的政党真不算得什么小事，但这也是他唯一的要求。\n\n“作为交换，你们的人可以以我们的名义参加立法机构的选举。但只限于你那些布哈林主义的朋友，不包括那些阿马佐纳斯主义蠢蛋。”全盘托出了，就是这样。贿赂对普列斯特斯不起作用。更进一步的条件，他也给不出来了。除此之外，巴西的共产党要怎样才能得到这样的机会呢？\n\n“没有更好的条件了。”他自己拿不出更好的，别人更不行了。他在想，为什么自己要费那么大的劲去斟酌词句？他的妻子可能只记下了基础信息。或许，他只是希望自己并未因昏迷而失去同他人讨价还价的能力，这毕竟是他为数不多的优势之一。突然，另一个声音从电话那头传来，阿德马尔只能叹息。原来，有人一直在偷听他们的对话。"
 brazil_adhemar_endgame_survival.7.a: "“你总是能让不可能的提议听起来那么诱人。”"
 BRA_problem_of_prestes_tooltip: "在1971年参议院选举中，共产党候选人将以社进党名义参选。"
 brazil_adhemar_endgame_survival.8.t: "整合之面孔"
 brazil_adhemar_endgame_survival.8.desc: "闪光四溅、咔嚓咔嚓，记者们疯狂地按动着相机快门，试图捕捉到普利尼奥·萨尔加多的完美镜头。此刻，他站在讲台后方，准备向所有在场的人，当然也包括整个国家，发表讲话。\n\n“亲爱的、尊敬的巴西人民。”萨尔加多开了腔。“我非常高兴和荣幸地接受总统的邀请，担任我认为最重要的教育部长一职。”\n\n“多年来，我们的孩子一直被现行体制所误导，他们成了赚钱机器上的小小齿轮。他们已经忘记了自身作为人类和巴西人的独特之处。”萨尔加多停顿一下，抬头看着记者，确保他们记下了他的话。\n\n“我有责任提醒巴西的所有孩子，无论老少，无论过去还是新一代——上帝赋予他们独特的自然之美。”他提高声音，让房间里的每一个人都能听到。“变革的时代已经到来，我们的教育正要向着三个简单的词汇迈进：上帝、祖国、家庭！”\n\n萨尔加多不理会记者们纷至沓来的问题，开始向出口走去。他伸手去握门把手，很快就遇到了拿着雪茄的阿德马尔·德·巴罗斯。\n\n“你的野心还真大啊，”他的新上司咕哝道，“但我不在乎。你可以举手喊万岁，随你的便，但要是你党里那些反犹分子试图干涉任何与我的总统任期有关的事情，那我们的合作就此结束。”\n\n“是的，当然，总统先生，”萨尔加多回答。“我不同意他们的观点，但他们会听我的。此外，我认为他们也不会对与您合作感兴趣。”\n\n“好好，随他们便。”阿德马尔深吸一口雪茄。“只要他们别不把我当回事，我可不在乎。”"
 brazil_adhemar_endgame_survival.8.a: "公事私办。"
 brazil_adhemar_endgame_survival.9.t: "黯淡记忆"
 brazil_adhemar_endgame_survival.9.desc: "“小热图利奥·瓦加斯，得票率93%，提名总统！”阿德马尔话音未落，社进党已陷入狂喜。那个男人天生具有亲和力，自己在他身上几乎没花什么钱。可不像另一个蠢货，光收买人心就耗费了数千万钞票。\n\n“劳多·纳特尔，得票率91%，提名副总统！”礼节性的掌声稀落响起。这次总该成了吧，他心想，目光扫过台下熟悉的面孔。圣保罗大厅的马特洪峰浮雕依然如故——这里曾见证他无数次慷慨激昂的演说。这是他的城市，他的家，一切恍如昨日。\n\n瓦加斯走向麦克风时，他踉跄着退下讲台。然而欢呼声如潮水般层层叠高，渐渐震耳欲聋。他瞥向台下，发现人们的目光并未投向候选人，而是聚焦在他身上——他们的英雄。连劳多和瓦加斯也加入鼓掌的行列。排山倒海的敬仰在穹顶与四壁间反复激荡，回声经久不息。\n\n他勉强挤出一丝微笑，几乎是落荒而逃。聚光灯的余温散去后，彻骨寒意爬上脊背。此刻坐在前往巴西利亚的轿车里，这具移动棺材正载着他和妻子在夜色中颠簸，而那种阴冷仍挥之不去。\n\n“你还好吗，阿德马尔？”公路灯光昏黄，却足以照亮她脸上忧虑的纹路。莱昂诺尔挽着他的手臂，像护士搀扶随时会跌倒的病人。某种似曾相识又截然不同的情绪在滋长，恍若昏迷前那场葬礼的重现。车窗外掠过的路灯明明灭灭，她忽然瞥见三十多年前那个年轻斗士的影子——那时他尚未自诩战无不胜，此刻却有两行微弱的泪痕，倒映着当年鏖战过的土地。"
 brazil_adhemar_endgame_survival.9.a: "后视镜里的圣保罗渐渐远去，消失在群山之后。"
 brazil_adhemar_endgame_survival.10.t: "同魔鬼的交易"
 brazil_adhemar_endgame_survival.10.desc: "豪华酒店，高雅音乐，再来一杯香槟。阿德马尔自斟自饮，这才叫享受生活。一人独处，怡然自乐，无人打扰。突然，电话响起——来自阿德马尔以为再也不会联系的人。“我是总统……达·库尼亚先生？”阿德马尔一愣，靠到扶手椅上。“好久不见。是什么风把你吹到我这美好的晚上来的？”\n\n“总统先生，再次与您交谈真是荣幸。遗憾我无法亲临拜会，商事繁忙确实耗人心力，尤其是还要跟恶魔做交易。”阿德马尔脸上的笑意渐渐消退，电话那段突然沉默，随后传来一阵急促的声音。“你给我听好了，赶紧停下！”达·库尼亚咆哮，几秒前的礼貌荡然无存。“那他妈都是纳粹啊！你不是很清楚他们怎么把‘盟友’当奴隶使的吗！”\n\n“前外长阁下，我要做的就是带领巴西挣脱美国的枷锁。再说，德国人远隔重洋，而美国人这一个多世纪都在对我们虎视眈眈，步步紧逼！巴西应该找真正可靠的盟友！”\n\n“你就这么相信他们？他们会出其不意捅你一刀，可你却不想正视现实。天哪，你怎么变这样了？难道昏迷把你的脑子变成脑花了吗？”\n\n“感谢上帝啊，我的脑子好得很！你喜欢扯随你扯！你们这些美国走狗不都一样嘛，美爹说什么你们就干什么，哈哈！”电话那头的声音逐渐消失，只剩下单调的嘟嘟声。这就是你要说的话吗？罢了，还是为胜利举杯吧。"
 brazil_adhemar_endgame_survival.10.a: "酒入愁肠，化作点点酸楚；\n前途迷惘，唯余愧疚彷徨。"
 brazil_adhemar_endgame_survival.11.t: "砥志研思"
 brazil_adhemar_endgame_survival.11.desc: "阿德马尔独自坐在飞机的私人舱室内，这几个小时他一句话都没说。突然，一阵轻轻的叩门声打破了寂静。“总统先生，我们即将抵达日耳曼尼亚。”是纳特尔，但阿德马尔沉默以对。“总统先生？”纳特尔又问，总统依然一言不发。气氛有些凝重。纳特尔有一股不祥的预感。\n\n“劳多，请进来吧。”\n\n松了口气。纳特尔推开门，映入眼帘的是阿德马尔孤寂的身影，他静静地坐在靠窗的座椅上，沉浸在对人生的深思之中。“劳多啊，你知道吗，每日早上睁开眼，我都会想，明天是否还能见到阳光；要是我醒不来了，世人会如何评说我的功过。他们会说我是让巴西扬名立万的伟人，还是将我视为毁灭国家的罪人？”纳特尔只是点了点头。\n\n阿德马尔微微一笑，“不知圣保罗的瓦茨拉夫和亚历山德罗对我与那些屠杀他们家族的人合作会有什么看法。他们会不会因此而怨恨我？”部长喝了口水，不知该说些什么。\n\n阿德马尔停顿片刻，喝了几口水，“这些本来应该是萨莱斯干的，为什么偏偏要我来干呢！为什么要让他去那个落后国家，去那里到底有什么意义！”纳特尔依旧点了点头。\n\n阿德马尔的目光再次投向窗外，望着下方飞速掠过的德国田野，“或许，既然上帝让我成为总统，那我就得面对这些吧。”"
 brazil_adhemar_endgame_survival.11.a: "坚忍不拔，知难而进。"
 brazil_adhemar_endgame_survival.12.t: "风驰电掣"
 brazil_adhemar_endgame_survival.12.desc: "“所以，这个你看如何？”阿布斯缓缓揭开车罩，一辆炫酷的黑色保时捷跃入眼帘。阿布斯知道阿德马尔喜欢跑车，圣保罗的时光让他见证了阿德马尔与这些钢铁骏马的深厚情谊，他甚至给公牛先生修了赛道。今夜，他们要到高速公路上尽情驰骋。日耳曼尼亚的天际线在夜色中显得蔚为壮观。“你看那边，十年以后，巴西利亚也会有这些高楼大厦！”\n\n阿德马尔笑了，“我又不是库比契克！”他脑海中浮现出库比契克构想中的巴西利亚，那些建筑各个器宇轩昂，不知自己能否像库比契克那样创造奇迹。\n\n“幸亏你不是他！”阿布斯边说边踩下油门，“那家伙把所有人都搞成穷光蛋啦！”两人相视而笑，“至于你，我的朋友，你会跟我一样富有，向世界展现巴西的力量！”\n\n前方就是人民大厅，阿德马尔不再说话。“我在想，”他默默自问，“那些奴隶的血汗，换来了什么？我在想，东方的民众真如传言所说，是劣等民族吗？我在想，如果这一切被公众知晓，他们会作何感想？”"
 brazil_adhemar_endgame_survival.12.a: "巍峨巨筑，遍地鲜血。"
 brazil_adhemar_endgame_survival.13.t: "公牛与老鹰"
 brazil_adhemar_endgame_survival.13.desc: "刺眼的强光让阿德马尔一阵目眩，他等待这一刻已有多年。“早上好，德意志！”人群向这位巴西人爆发出欢呼声。总统照例开始背诵精心准备的讲稿：“自本届政府执政以来，德国与巴西始终是重要合作伙伴。我们正携手缔造一项改写历史的贸易协定！”\n\n台下听众的注意力开始涣散——这再正常不过了。政客们千篇一律的陈词滥调，平民百姓永远也听不懂。直到阿德马尔再次开口，一切才变得不同。\n\n“德国的朋友们，当我漫步在日耳曼尼亚街头时，发现了一件骇人听闻的事！德国根本不配在国际社会占据如今的地位。你们在东方对波兰人和其他民族犯下的暴行，简直令人发指！看看巴西吧，我们作为文化大熔炉依然和谐共处。而你们却以‘净化’之名屠杀异族，何等可耻！”人群骚动起来，愤怒的窃窃私语如野火蔓延。公牛看在眼里却毫不在意，无论德国人是否爱听，他都要把话说完。\n\n“在此，我诚挚邀请德国加入文明国家的行列，让我们携手为地球开创更美好的未来！”喝彩与怒骂在人群中此起彼伏。结束演讲回到房间时，阿德马尔胸中充满自信。他坚信自己做了正确的事——向德国人展示了真正伟大国家的担当。"
 brazil_adhemar_endgame_survival.13.a: "自由之光加倍闪耀。"
 brazil_adhemar_endgame_survival.14.t: "乌鸦狂怒"
 brazil_adhemar_endgame_survival.14.desc: "达·库尼亚办公室的门猛然打开，“操他妈了个逼！”刚刚看完阿德马尔电视讲话的拉塞尔达冲了进来。他满脸通红，双拳紧握，仿佛下一秒就要冲到德国去痛揍傻逼阿德马尔。前外长达·库尼亚立刻反应过来，连忙为情绪激动的副总统端上一杯糖水。\n\n“这个白痴难道不知道他那三脚猫把戏一眼就能看穿吗！？”拉塞尔达狂怒，这演讲真他妈离谱得难以置信。“他真以为骂两句德国就能掩盖他干的那些屁事吗？”他边喝水边骂，“库尼亚，再给我杯水，谢了。”\n\n达·库尼亚去给拉塞尔达倒水，心中反复思索斟酌。“或许他在医院的那段时间真的有所改变？没人知道他那脑子是不是真有什么变化，”他边说边把泡好的糖水递给拉塞尔达。\n\n喝了糖水，拉塞尔达的情绪稳定下来。他直视达·库尼亚的眼睛，“不，他一直都是这样，用民粹主义掩盖自己的真实意图。”他的心跳也慢慢恢复正常。“库尼亚，我们多少年的朋友了，你应该很清楚，让这家伙继续执政对我们的国家是多么大的风险！可是为什么群众还是给他投票呢？”"
 brazil_adhemar_endgame_survival.14.a: "他怎么没死呢？"
 brazil_adhemar_endgame_survival.15.t: "不义之财"
 brazil_adhemar_endgame_survival.15.desc: "“这演讲才算牛逼。”一位工人边打嗝边对身边的同事说，手里端着一杯加了卡莎萨的美式咖啡。酒保一听就知道他们在谈论什么，他怎么可能不知道呢；足球赛肥皂剧什么的，只要电视上一放，酒吧里就少不了热烈讨论的声音。但那天总统在纳粹圣地发表演说之后，这些工人却不是第一波聊起这个的人。“没错吧，这才是我的总统！必须给那些泡菜佬点颜色看看！”\n\n“这么快就被煽动起来啦？”酒保一边说，一边用一条浸满汗水的法兰绒布擦拭着木质桌面。\n\n“有什么不好呢？德国佬掏钱又费力，我们却不用花一分钱，这不挺好吗？哈，现在就算是跑到希特勒坟头上吐口痰，他们连眼皮都不会眨一下！”\n\n“确实，有钱总是好事。”酒保装作饶有兴趣的样子，手上动作不停。“我只是好奇啊，这世上那么多国家，偏偏要跟那些渣滓做交易。我敢拿这酒吧打赌，那个胖子不过是趁着还没倒台多捞些油水罢了。”\n\n“嗯嗯嗯，拿到钱之前所有人都这么说。但我可不这样，我对生活中的每一份收获都心存感激，感谢上帝。再涨一次工资也没什么不好，老兄你说是不是？”\n\n另一名工人呆呆地盯着空荡荡的酒杯，同事轻轻推了推他，但他依旧无动于衷，既没有评论，也没有丝毫庆祝的意思。他的过去不允许他这样做。他的犹太家庭早年逃离了纳粹的迫害，如今，他要看着这片接纳了他们的土地，从他的家族、与成千上万不幸灵魂遭受的苦难中牟利。"
 brazil_adhemar_endgame_survival.15.a: "举杯消愁愁更愁。"
 brazil_adhemar_endgame_survival.16.t: "运筹帷幄"
 brazil_adhemar_endgame_survival.16.desc: "德意志银行的大厅平日里总是充满德国风情，从高悬的旗帜到威严的鹰雕；今天，赫尔曼·阿布斯下令将这里装点成巴西元素的海洋——鲜艳的国旗、缤纷的花卉、诱人的美食，处处彰显着对巴西总统阿德马尔的诚挚欢迎。每一处细节都经过深思熟虑，意在赢得这位南美强人的青睐，阿布斯手中的备忘录详实到位，将一切布置得落落大方。\n\n阿布斯一边指挥着手下布置大厅，一边忍不住轻笑起来。“阿德马尔真是个大蠢蛋！”他点起雪茄暗自嘲讽，现在他占尽先机，那个自号“公牛”的家伙简直是个可笑的小丑。\n\n“艾达，你过来一下。”阿布斯手里捏着几页写满字的纸，那是他特意为下属准备的演讲稿，内容精挑细选，专门为阿德马尔量身定制。“艾达，等阿德马尔到了，你就照这上面念，记得喷上你那瓶香水。他会爱死那味道的。”\n\n这时，几位元首派来的外交官走进大厅。“欢迎各位，”阿布斯热情地迎接道，“请放心，我们正全力以赴，确保此次访问能增进两国之间的友好关系。”外交官们开始在大厅各处忙碌起来。\n\n阿布斯随便拉了把椅子坐下，尽管周围弥漫着雪茄浓密且略显刺鼻的烟雾，但他似乎全不在意。“公牛？”他冷哼一声，嘴角泛起一丝轻蔑的笑容，“这名号也太滑稽了吧。他像个随时会被拍死的苍蝇。”阿布斯狞笑着站起身来，继续安排接下来的任务。"
 brazil_adhemar_endgame_survival.16.a: "驯服公牛。"
 brazil_adhemar_endgame_survival.17.t: "射杀恶牛"
 brazil_adhemar_endgame_survival.17.desc: "阿布斯办公室里骂声一片。众人无法理解，阿德马尔为何能在德国对他善加礼遇之后做出如此行径。“为什么保镖不一枪毙了他！劣等的渣滓！”银行员工骂得一个比一个脏。他们的脸涨得通红，有些人要求德国禁运巴西并切断所有外交关系，甚至有人说元首应该用核弹炸掉巴西利亚。\n\n阿布斯推开门，所有的对话都停了下来。他知道他的员工们想要问他什么——他们想知道德国该如何对付阿德马尔。银行家轻笑一声，眼前的景象在他看来甚是荒谬。“你们这是咋了？学波兰人啊？因为一点小事就大发雷霆。”\n\n“阿德马尔是个把我们要的一切全都双手奉上的傻瓜。他在我们这里发表这样的演讲，的确是相当愚蠢，但我们为什么要在意他说的话？”下属们难以置信地看着自己的上司，不明白阿布斯为何如此平静。\n\n银行家点燃一支雪茄。“朋友们，不要在意一个劣等人对我们的评价。我们可是无可争议的优等种族。与其为那个注定被元首碾碎的蠢货而烦恼，不如用一场盛大的派对来庆祝我们的辉煌！”"
 brazil_adhemar_endgame_survival.17.a: "德意志之鹰高高翱翔。"
 brazil_adhemar_endgame_laudo.1.t: "翌日早晨"
 brazil_adhemar_endgame_laudo.1.desc: "劳多·纳特尔下意识地划起十字，他又想起了去世的阿德马尔，后者如今正长眠于皮拉西卡巴的家族墓地。\n\n过去几天里，他一直苦苦思索。阿德马尔是后新国家时代最伟大的政治操盘手，可他为什么要和希特勒分子眉来眼去？意义何在？这个问题，恐怕只有阿德马尔自己能够回答。\n\n劳多猛地摇了摇头。一项艰巨的任务在等着他，现在是着手去做的时候了。\n\n“我该让阿莱绍任命哪些部长？加拉斯塔苏·梅迪西可以胜任战争部长，阿德马尔很喜欢他，有他巩固国防，抵抗纳粹恶棍的威胁，我们才能专心内政。另外，外交部长必须由瓦斯科·莱唐·达·库尼亚来当，换别人的话，美国人根本不会把我们当回事。”\n\n接着，劳多的目光转向了助理留下的一叠部长候选人档案。最上面的那份，姓名一栏写着“安东尼奥·德尔芬·内托”。\n\n劳多在圣保罗时就认识德尔芬·内托。他是出色的经济学家，主张在保持经济高速增长的同时削减通货膨胀和公共债务。确认了这一选择后，他点了点头。\n\n“需要人的都齐了。”"
 brazil_adhemar_endgame_laudo.1.a: "“行动吧。”"
 brazil_adhemar_endgame_laudo.2.t: "尊敬的社进党地方长官们！"
 brazil_adhemar_endgame_laudo.2.desc: "阿德马尔·佩雷拉·德·巴罗斯总统——愿他安息——逝世后，我们党崇高和正确的领导现在正面临着全民盟和工党篡权的威胁。\n\n尽管我毫不怀疑各位地方长官的忠心，但我还是要说，阿德马尔离世让党内个别宵小开始蠢蠢欲动。如果我们不尽快解决领导权真空的问题，那么我们所奋斗的一切都将化为乌有。\n\n我们需要团结。已故总统的指示一贯明确——他选择了党的领导人、穷人之父的儿子小热图利奥·瓦加斯，作为他的继任者，我们必须以雷鸣般的掌声，拥护他当选，否则，危险的宗派斗争将使党四分五裂。因此，我，劳多·纳特尔，请求你们支持我的动议，不要举行通常的领导选举，直接任命瓦加斯阁下为主席。\n\n此外，我们已经发送了紧急资金，帮助各位应对当前的不幸局面。永远不要忘记，巴西的权柄仍然掌握在社进党手中，只有党组织运转良好，我们才能将崇高和正确的治理延续到下一个十年。\n\n我衷心祝愿党大会取得成功，并期待各位的理解，请接受我最崇高的敬意。"
 brazil_adhemar_endgame_laudo.2.a: "署名：劳多·纳特尔"
 brazil_adhemar_endgame_laudo.3.t: "阿莱绍的新内阁"
 brazil_adhemar_endgame_laudo.3.desc: "佩德罗·阿莱绍坐在高原宫的办公室里，要思考的事太多了。\n\n再过一周他就要正式就职，他必须做出选择。全民盟借口他的立场偏向自由保守主义，想要夺取权力，而瓦加斯派则想成立民族团结政府。新总统很欣赏后者的建议，打算把这告诉给新任命的劳多·纳特尔。\n\n但劳多·纳特尔却另有他想：“社会进步党认为新内阁应完全由本党人士组成，并推荐我出任高级不管部长，保障事务的顺利交接。”听到这，临时总统有些不知所措。\n\n“可……可民族团结内阁的确更稳妥。”\n\n纳特尔摇了摇头，“1965年，民众选出的总统是阿德马尔·德·巴罗斯，社进党理应继续他的政策，直至本届任期结束。我们绝不会接受任何形式的政治妥协。”\n\n“我……我明白了，但是给其他党半数内阁职位总可以吧？”\n\n“总统先生，您这么做无异于践踏民主原则。社进党人都是一心为国的，哪怕再来一次护宪革命也在所不惜。”\n\n纳特尔的言辞锋芒逼人，阿莱绍寒毛直竖，颤抖着点头答应了下来。"
 brazil_adhemar_endgame_laudo.3.a: "“明……明白，那按你的意思来吧。”"
 brazil_adhemar_endgame_laudo.4.t: "技官之梦"
 brazil_adhemar_endgame_laudo.4.desc: "埃皮塔西奥的办公桌上摆着份文件，是他的老秘书带来的，题头为“教育部长令”。他饶有兴趣地浏览起来，越读越是激动。\n\n“根据新颁布的员工考核办法，你应核查下属员工是否严格满足任职条件，坚决执行层级制度——”\n\n这就足够让埃皮塔西奥开心了，“剩下的还用读吗？这些已经够了——啊，别急，先读完再说，得拿准了到底是不是和我想的一样。”读罢，他感觉更好了，上面一切都是真的。\n\n他饮了口卡莎萨，思考起接下来怎么办。“总算不用忍受这帮磨洋工的了！我们可以正儿八经地监督教学，制定行而有效的课程，给孩子们好好上课，不再辜负纳税人的期望了。”\n\n翌日，就有一批人遭到开除。又过了一周，埃皮塔西奥手下迎来了第一批博士出身的员工，新计算机也配给了各间办公室。"
 brazil_adhemar_endgame_laudo.4.a: "终于，埃皮塔西奥心中燃起了希望。"
 brazil_adhemar_endgame_laudo.5.t: "技官梦魇"
 brazil_adhemar_endgame_laudo.5.desc: "埃皮塔西奥的办公桌上摆着份文件，是他的老秘书带来的，题头为“教育部长令”。他饶有兴趣地浏览起来，却越读越沮丧。\n\n“你应要求下属员工在选举中支持社会进步党，为此可用假期作为激励，但如有必要也应告知，投票站设有摄像头，并有警卫特别监管。”\n\n埃皮塔西奥双手抱头，“简直瞎搞，但还真管用。”他叫来秘书，让她通知部门里所有人来开会。\n\n会开得并不顺利，有位德高望重的老员工大喊起来：“这是恐吓选民！是践踏民主！我绝不接受！”埃皮塔西奥还没来得及开除他，他就抢先辞了职。其他员工也一肚子火气，嘀嘀咕咕地咒骂着，但还是按照部里的指示，签了承诺书。\n\n埃皮塔西奥满心不情愿，叹了口气，签了自己的那份承诺书。"
 brazil_adhemar_endgame_laudo.5.a: "“记好了，这事要是传出去，你们有人就该被炒鱿鱼了。”"
 brazil_adhemar_endgame_laudo.6.t: "前行之路？"
 brazil_adhemar_endgame_laudo.6.desc: "安东尼奥·德尔芬·内托面带笑容，和老朋友聊了起来，“部长先生——抱歉，劳多——今天咱们干了件好事。你能听我的真是太好了，那些纯浪费钱的超级工程早该砍了。咱们之前就告诉过洛特他们这些东西只会拖垮国家财政，但除了你，根本没人愿意听，你阻止了灾难，虽然迟了，但总比什么也不做强。”\n\n纳特尔夸张地鞠了一躬，“我只是做了我应该做的，安东尼奥，不用奉承我，我听说你还有别的事要说……？”\n\n听罢，德尔芬·内托深吸一口气，掏出一沓档案来。\n\n“是这样的，虽然超级工程热结束了，但是摆在我们面前的有两大选择，我们可以卖掉巴西石油的几家炼油厂，促进经济私营化，或者推动一些税务改革，刺激经济发展。但不论怎么做，我们都必须降低对美关税，这有利外资进入市场，也能向OFN表明，我们不再愿意与纳粹分子为伍。”\n\n最后一句话让纳特尔眉头紧锁，“唉，都怪阿德马尔。”他想着，他把这话憋在心里，压抑着不满，“好的，谢谢你，安东尼奥，我们肯定需要加倍努力，才能在国际上更有竞争力。”\n\n德尔芬·内托赞许地点了点头。"
 brazil_adhemar_endgame_laudo.6.a: "“谢谢你，劳多。”"
 brazil_adhemar_endgame_laudo.7.t: "日记－[GetDateStringNoHourLong]"
 brazil_adhemar_endgame_laudo.7.desc: "以下摘自瓜纳巴拉某家玩具厂前老板乌戈的日记（姓氏已隐去）。\n\n“事到如今，已经别无他法了吧？我们只能关闭工厂了，就像其他许多同行一样。虽然曾经辉煌过，但说实话，这个行业早就看不到希望了。\n\n政府给美国人降了关税——据说是因为老阿德马尔捅了个政治篓子，他们不得不这样讨好美国人。现在那些粗制滥造的美国货像潮水一样涌进百货公司。对普通家庭来说倒是不错，虽然他们也没少花钱，但对我们而言就是灭顶之灾。\n\n如果商店里堆满了这些来自北方冰窑子、由打卡混日子的懒汉们生产的美国垃圾玩具，谁还会买我们精心制作的手工艺品呢？那些我们曾引以为傲的吸烟蛇雕像、瓦加斯总统像、佩德罗二世皇帝像、德奥多罗·达·丰塞卡元帅像——不仅是我，我的竞争对手们也都没活路了。我们即将集体破产。\n\n我无力回天，但至少这不是我的过错。至于工人们——愿上帝保佑他们——我要用最后一点备用金，给每个人包个遣散红包。明天还要办个盛大的派对，让这些兄弟（其实更像朋友）能在欢乐的气氛中告别，一起追忆我们共度的时光。”"
 brazil_adhemar_endgame_laudo.7.a: "“但我还是希望事情可以不用这样。”"
 brazil_adhemar_endgame_laudo.8.t: "悲痛欲绝"
 brazil_adhemar_endgame_laudo.8.desc: "“该死！该死！该死！”德国驻巴西大使馆如今满是这样的咒骂，“烧了这些文件！决不能落到巴西人手里！”与此同时，西红柿和各种坚硬物体正一刻不停地砸向使馆大楼。\n\n对局势的询问只会招来基尔克大使的怒火，“还问为什么？！看看外面，明天就该撤了！”\n\n大多数人只是心怀不安地回去继续工作，但还是有一个傻瓜不死心。基尔克把玻璃杯砸到地上，开始大发雷霆，“为什么？你觉得是为什么？外面那些疯子正在围攻使馆，警察屁也不干，巴西外交部甚至明确建议我们‘临时放假’！蠢货，还看不明白？我们扩大协定影响力的希望被那条犹太舔狗拉塞尔达给彻底毁了，再不跑就等死吧！”\n\n当下能做的，只剩下给欧里科·加斯帕尔·杜特拉和菲林托·穆勒等少数坚挺的亲德派送礼写信，祈祷这些过气的政客能想办法扭转局势。完事后，他们趁着人群退去迅速离开，基尔克双手颤抖着，亲自将使馆牌子从外墙上取下，其他人则忙着登上大巴。\n\n大巴顺利抵达机场……"
 brazil_adhemar_endgame_laudo.8.a: "…只是愤怒的市民认出了他们，拿石块对他们一通猛砸。"
 brazil_adhemar_endgame_laudo.9.t: "北方之旅"
 brazil_adhemar_endgame_laudo.9.desc: "瓦斯科·莱唐·达·库尼亚坐在美国国务卿的办公室外面，沉溺在自己的思绪中，“天啊，真是紧张死了，这种事总是这样，但至少现在没阿德马尔了，也算轻松许多，虽然国内乱成一片，可巴西终于能审慎地制定外交方针了。”\n\n突然，开门声打断了外交部长的沉思。\n\n国务卿秘书将部长迎进了国务卿办公室，出乎莱唐·达·库尼亚的预想，这次会见很愉快，在几句寒暄过后，他们谈起了正事。\n\n“是这样的，巴西希望能更全面地整合进自由国家组织的体系，完成我们前任的未竟事业，为此，我们需要贵方帮助。”\n\n国务卿兴致勃勃地倾过身来，“是吗？需要我们做什么？”莱唐·达·库尼亚有些尴尬，揉了揉后颈。\n\n“巴西合众国请求美国酌情允许我方推迟偿还拖欠OFN国家的贷款利息。”\n\n国务卿稍作思考，然后点头同意了，“好，这没什么问题，我们可以安排。”\n\n听到这番答复，巴西外交部长靠在椅背上，终于放松下来，“您这句话真是让我如释重负。”\n\n后来，这次会谈成了OFN和巴西友好关系的证明。"
 brazil_adhemar_endgame_laudo.9.a: "为更理智的外交政策。"
 brazil_adhemar_endgame_laudo.10.t: "骄子登基"
 brazil_adhemar_endgame_laudo.10.desc: "圣保罗的大会一贯充满活力，若是哪位名人没来，人们自会注意到，劳多·纳特尔亲身体会到了这一点。在这一片欢腾之中，他认出了许多熟悉的人物，比如自己嫌弃的贝内迪托·马尼扬伊斯·巴雷托，还有老友小若昂·卡费，后者问他：“纳特尔先生，怎么来得这么晚？”\n\n他简短地答道：“哎呀，我一天都在巴西利亚调节戈亚斯党分部的事，已经是尽快赶过来了。”旁边那位正尴尬地揉着脖子的戈亚尼亚社进党领导人印证了他的说法，纳特尔继续往前走，看到了人群里和菲林托·穆勒凑在一起的阿毛里·克鲁埃尔，哪怕经历了间谍事件的挫折，势力还是一点不减。\n\n站在前面的是“社进党的布里佐拉”罗梅乌·德·坎波斯·韦加尔，他对副总统这个位子势在必得。纳特尔对他微微点头，心怀沉重地坐了下来，“累死个人，”他想着，“跟真当总统一样，全是苦役。我可不想再说服一遍阿莱绍和政府了，至少艰难的部分过去了，就让选举检验这草台班子能不能胜过阿德马尔的——”\n\n突然响起了热烈的掌声，满脸自信的小瓦加斯登场了，准备好了宣布结果，“尊敬的代表们！投票结果已出，感谢各位选择我出马总统选举！”欢呼声震耳欲聋，大家纷纷起立鼓掌，小瓦加斯示意安静，两分钟后，人们终于平静下来，“和劳多·纳特尔一同竞选是我的荣幸，祝贺他以微弱优势击败了罗梅乌·德·坎波斯·韦加尔！”又是一轮鼓掌祝贺，整栋楼都为之震动起来。\n\n劳多笑了笑，舒了一口气，只是太多人拍他贺喜，让他后背很是酸痛。"
 brazil_adhemar_endgame_laudo.10.a: "也许这次，他会当上副总统。"
 brazil_adhemar_endgame_laudo.11.t: "新自旧来"
 brazil_adhemar_endgame_laudo.11.desc: "平达莫尼扬加巴的摄影棚里，档案员、社进党干部和摄制组穿梭如织。两名制片人在摄影器械的轰鸣与老旧吊扇的嗡响中扯着嗓子对吼：\n\n“所以竞选短片到底怎么搞？”\n\n“没辙了——只能从老片里截取瓦加斯老爷子和阿德马尔的同框镜头。”\n\n“不是，你弄两个老头上去，不知道的还以为是给俩死人拉票呢，那些整合主义蠢货倒是喜欢这么干。”\n\n“有道理，得补拍些新素材。”\n\n经过一周不眠不休的剪辑制作，期间穿帮镜头与跳帧失误层出不穷，成片竟意外像模像样，连工人们都啧啧称奇。但这还没完——他们得谱支洗脑神曲。\n\n遵循阿德马尔与前任瓦加斯的必胜套路，他们将“瓦加斯贤子，阿德马尔智嗣，贫民新慈父热图利奥！”这句口号用八种以上旋律反复轰炸。\n\n宣传曲合成进影片当日，劳多·纳特尔恰巧途经片场。他对成片大加赞赏，亲自将胶片送往社进党总部。殷勤的党工们即刻通过环球电视台等渠道铺天盖地播放，社进党支持率随即飙升。"
 brazil_adhemar_endgame_laudo.11.a: "两位制片人嘛，则是倒头呼呼大睡了三天。"
 brazil_adhemar_endgame_laudo.12.t: "列清单"
 brazil_adhemar_endgame_laudo.12.desc: "纳特尔在社进党地方长官寄来的文件上涂写着，上面基本都是男性，女性只有寥寥几名，笼络住了他们，执政党在接下来的选举中就胜券在握了。\n\n“圣保罗的名单准备好了，幸好州财政没什么问题，不过现在——”纳特尔拿起电话，拨了安东尼奥·德尔芬·内托的号码，“安东尼奥，你在吗？”\n\n话筒里传来了熟悉的声音，但却带着静电声，劳多默想着要跟助理说把电话修了，“是，我在，这是怎么了？”\n\n“把你信得过的人派到印钞厂去，时候一到，就准备开始大量印钞。”\n\n德尔芬·内托听着都慌了，“那通胀怎么办，劳多？这么印下去简直就是灾难速通车！”\n\n纳特尔阴沉下来，“我就知道你会这么说，你说得没错，我要是你，我也会这样说，但是我们没得选，这一次我们必须赢，不然党就完蛋了，绝无再起的可能。”\n\n德尔芬·内托叹气道：“我明白了，我会看着办的，但你也最好想个办法给这事收场。”\n\n“谢谢你，安东尼奥，我会尽力的。”劳多轻轻放下话筒，脑海里只有一个念头："
 brazil_adhemar_endgame_laudo.12.a: "“要是输了，那我也只能蹲号子去了。”"
 brazil_adhemar_endgame_laudo.13.t: "杜瓦"
 brazil_adhemar_endgame_laudo.13.desc: "……我已经尽了全力。\n\n现在摆在前面的有两条路。\n\n一条通向好结局，社进党赢了，小瓦加斯上台，内阁会配置完善，而我则是副总统。阿德马尔和瓦加斯的遗产将合二为一，腐败但干事的传统将延续下去。\n\n另一条则是坏结局，社进党输了，我一想到这就不寒而栗，到时候找一个好律师恐怕都不够，说不定得要十个。“劳多·纳特尔贪污案”将成为拉塞尔达报纸近十年来最抢手的头版新闻，甚至是永远。\n\n……也许我该专心竞选。\n\n……\n\n干！现在根本没法想事了，最好先喝一杯。\n\n到底过了多久了？感觉昨天我才拿到经济学学位，在派对上第一次碰到阿德马尔，他把我纳入麾下，做了他的副州长。尽管阿德马尔一身毛病，还蠢到和纳粹接触，但他至少忠实于我。\n\n五年前，我在竞选副总统上搞砸了，阿德马尔做了什么？他没把我赶出去，反倒让我做了幕僚长。除了忠诚，我还能怎么回报这种善意呢？我恪尽职守——监督腐败计划，维持政府运转，因为我，“腐败但干事”才成了现实，而不只是一句口号。\n\n现在那家伙没了，愿上帝保佑他。我现在只希望阿莱绍的（更准确讲是我的）短短摄政期能顺利度过，天哪，我真希望小瓦加斯能成。"
 brazil_adhemar_endgame_laudo.13.a: "时钟滴答作响。"
 brazil_adhemar_endgame_laudo.14.t: "骄子加冕"
 brazil_adhemar_endgame_laudo.14.desc: "搬运工在尼迈耶建造的总统官邸的前厅忙来忙去，离就职典礼还有些时间，但阿莱绍更希望在自己的房子里提前见一下小瓦加斯。\n\n小瓦加斯环顾四周，对未来五年的新家很是满意，“尼迈耶确实很懂行。”他对纳特尔说道，在小瓦加斯看来，在宣布举行选举后，纳特尔一直都是那副表情，“他开心也好，不爽也罢，他是搞具体业务的，而且忠诚于我，这就足够了。”\n\n新总统思索起了自己的任期，“两位导师都去世了，愿他们安息。纳特尔够忠诚，不必担心他。终于到了放手一搏，实行我自己的计划的时候了，我要干出比父亲更好的政绩，更多地为国尽力。”\n\n看着国家财政，他皱起眉头，但决定把忧虑抛在脑后，“财政不好也没关系，我是总统，我说了算。社进党是我的，有了他们，巴西将走上创新科技的康庄大道，我们将实现前任的未竟之事！”\n\n热图利奥·萨尔马尼奥·瓦加斯，小瓦加斯，飞跃进了想象的平流层，梦想着他将要打造的黄金时代。\n\n“至于何时才算大功告成，那也只有我说了算。”"
 brazil_adhemar_endgame_laudo.14.a: "“唐佩德罗，我胜过你了！”"
 brazil_adhemar_endgame_laudo.15.t: "修订劳工法改革法案"
 brazil_adhemar_endgame_laudo.15.desc: "劳工法改革法案正式递交至国民议会，各方势力开始蠢蠢欲动。巴西工党议员对提案表示担忧，他们的看法有些短视，觉得我们党只是为一己私利而非国家利益。全民盟的态度一如既往，他们看都没看就表示反对。\n\n不过，全民盟的一位议员提出了一条修正案，试图简化私营企业解雇员工的程序，在他们看来这能“释放市场潜力”并为经济注入新的活力。另一方面，工党也提交了自己的改革法案，不仅保护力度更强，还规定解雇前必须提前一个月通知。\n\n现在，有三个选择：是跟工党站在一起，还是向全民盟妥协，或是坚持原定路线。"
 brazil_adhemar_endgame_laudo.15.a: "采用全民盟修正案。"
 brazil_adhemar_endgame_laudo.15.b: "采用工党修正案。"
 brazil_adhemar_endgame_laudo.15.c: "无视他们，我们不会向任何人屈服。"
 brazil_adhemar_endgame_laudo.16.t: "修订国家工资指数标准化法案"
 brazil_adhemar_endgame_laudo.16.desc: "我们的法案一经提交，便遭到了左翼阵营的一些不合理的批评。社民党和工党议员已经明确表示不会支持法案，而全民盟也不会随随便便把胜利送给我们。\n\n全民盟承诺，如果我们在公共和私营部门实施更严格的工资管控，他们就投票支持法案，而且他们或许是唯一会投票支持法案的政党。然而，法案仍有可能遭到否决，因为我们的候选人的工资指数……或许不利于他们的选举表现。因此，我们要慎重考虑：是要接受全民盟的修正案以寻求支持，还是保持现状不再妥协？"
 brazil_adhemar_endgame_laudo.16.a: "采用全民盟修正案。"
 brazil_adhemar_endgame_laudo.16.b: "为啥要自寻死路？无视他们。"
 brazil_adhemar_endgame_laudo.17.t: "第四阶级"
 brazil_adhemar_endgame_laudo.17.desc: "《劳工法改革法案通过参议院！》硕大的标题几乎占据了《晨报》头版的三分之二。“尽管遭遇包括全民盟议员在内的重重阻力，但社进党推动的改革法案最终还是通过了立法机关。之后法案将上呈总统，等待签署生效。新法为巴西工人提供更强大的解雇保护、再雇佣保障以及更加优厚的赔偿……”\n\n马尔康扫了一眼便移开视线，为什么非要用这么多话来写十个字就能讲清楚的东西？他叹了口气，看向报亭里的另一份报纸，希望这份会直白一些。《新闻论坛报》的头条赫然写着几个大字：《社进党强推劳工法改革法案！》他翻开报纸，映入眼帘的是卡洛斯·拉塞尔达熟悉的面孔，言辞刀刀见血：“借助贿赂、幕后交易与不断施压，社进党通过了《劳工法改革法案》，此法只会放任社进党变本加厉地玩弄民主制度，料想那位无能的总统大人也不会动用否决权。如此手段何其丑陋，还有——”\n\n挎擦！报亭老板不再盯着手中的打火机，看向马尔康。只见他怒气冲冲，愤怒地盯着掉在地上的两份报纸。“这些记者都是一个德行！”他怒骂道，然后朝报纸啐了一口唾沫。马尔康愤然离去，老板则无奈地捡起那两份被唾液黏在一起的报纸。"
 brazil_adhemar_endgame_laudo.17.a: "由愤恨铸就。"
 brazil_adhemar_endgame_laudo.18.t: "思想的黑市"
 brazil_adhemar_endgame_laudo.18.desc: "《参议院扼杀劳工法改革法案！》标题气势十足，看来《晨报》对参议院投票结果颇为不满。报道继续写道：“工党背叛工人阶级，未能支持新劳动改革，反而与全国民主联盟联手，致使法案流产。人们不禁追问深层原因，如此灾难性后果将——”\n\n马尔康翻了个白眼。他虽未追踪法案审议进程，但觉得这帮人未免太啰嗦。他将视线转向《新闻论坛报》头条，《参议院直面社进党，上演惊人壮举！》卡洛斯·拉塞尔达撰写的专题文章占满第二版：“在全民盟引领下，参议院罕见地站在了社进党的对立面，反抗腐败与任人唯亲，成功击退激进改革法案。社进党企图加紧控制对国家机构，但他们依然失败，表明巴西民主仍有希望。展望未来，我们——”\n\n挎擦！报亭老板原本盯着打火机的眼睛猛地抬起。马尔康冷笑一声将《每日论坛报》夹在腋下，对着摊位上《晨报》嘟囔了一句“蠢货”，付钱后径自走向工地。拉塞尔达与所有记者的确都是谎话连篇的混球——"
 brazil_adhemar_endgame_laudo.18.a: "但他们还没社进党那么废物。"
 brazil_adhemar_endgame_laudo.19.t: "咖啡与政治"
 brazil_adhemar_endgame_laudo.19.desc: "休息室的烟味令人窒息，这地方离工厂的机器只有几米远，空间本不宽敞，但其他地方都挤满了人，若昂和工友们只能蜷缩在这里休息。他从咖啡杯上抬起头，听见布鲁和路易斯正在谈论新出台的工资法案。\n\n“啊，但你要知道——”瘦骨嶙峋的路易斯开口时，嘴里的香烟危险地上下晃动，“10%不错，可10%根本不够！卡米拉马上又要生一个了，我不是说咱们该罢工，但……”他的声音逐渐低了下去。布鲁推了推他的小圆框眼镜——与他健壮的身材相比，这副眼镜显得滑稽。他平静地说：“低通胀才能养得起孩子，路易斯。这样你就不用花几千块买面包，或是几百万交学费。”路易斯刚要张嘴，布鲁迅速打断道：“听着，涨总比不涨强，而且不是因为通胀也根本不会涨，”他敲了敲宣布法案的新闻标题，“瞧——”\n\n另一个工人插话：“他们打算选举后再搞的，至少格斯是这么说的。”路易斯朝那人比划手势，眼睛盯着布鲁：“看见没？这就是耍阴招。”他向后靠上椅背，朝若昂点头示意：“嘿老头，你怎么看？”聚集的工人们都将目光转向他。若昂啜了口咖啡，简单说道：“布鲁说得对，但要是他们敢找事，咱们就反击，就像当年对付戈梅斯那样。”钢铁工人们纷纷点头赞同，布鲁也是其中一员。"
 brazil_adhemar_endgame_laudo.19.a: "我们打倒过他们一次，自然还能再赢一次。"
 brazil_adhemar_endgame_laudo.20.t: "败战"
 brazil_adhemar_endgame_laudo.20.desc: "纳特尔向后仰靠时，身下的椅子微微作响。尽管事关重大，法案终究未能通过。政府薪资将继续与通胀脱钩。薪资通胀将持续恶化。总统仍会无视现实，甚至可能将责任推给社进党，最终导致整体通胀继续攀升。郊区居民和中产阶级将倒戈反对社进党，动摇核心票仓，这些人十有八九会转投全民盟。届时社进党与小瓦加斯还有他们的追随者，都将沦为政治史中的尘埃。\n\n纳特尔揉着眼皮长叹，情况糟糕透顶，但并非无可挽回。他抓起外套走出副办公室。可以让《晨报》那个滑头刊登反全民盟的版面，给里约的桑托斯兄弟拨点经费撰写攻击拉塞尔达的文章，或许还能请弗朗西斯科帮忙在国际版面曝光全民盟的肮脏交易。虽非万全之策，但终归是可行之计——只要尚存一息，纳特尔就会动用各种手段，与全民盟战斗到底。"
 brazil_adhemar_endgame_laudo.20.a: "直到最后。"
 brazil_adhemar_endgame_edna.1.t: "问题朋友"
 brazil_adhemar_endgame_edna.1.desc: "埃德娜抿了口咖啡，梳理着今天的日程安排，她先是要和社进党的几个狗腿子见面，他们为了自保，甘愿出卖党的利益，然后是打通电话，完事以后就可以去里约转一圈了。她一边畅想着要去的地方，一边翻看着文件，一切似乎完美无瑕，直到看到那几个让她心里一惊的字眼。\n\n安妮·弗兰克中学将是行程中的一站。\n\n拉塞尔达和全民盟开办这所中学是为了纪念那位可怜的女孩，看着这个名字，埃德娜突然想到，害死那女孩的政权正源源不断地将资金投入巴西，这都是阿德马尔的“功劳”。\n\n一想到那个男人，她就眉头紧锁，这些钱虽然是用来干好事的，但却沾染了太多鲜血。他父亲和纳粹打过仗，他一直都说这是义举，事实也的确如此，但和德国合作确实能让巴西经济更加独立自主。\n\n看着文件，她不禁叹了口气，那所学校对德国深恶痛绝，贸然前往肯定会碰钉子，但这就是政治。她草草写下，要将重点放在对拉美出口上，同时远离德国。剩下的时间她将专注内政，其他的就交给外交部长了。"
 brazil_adhemar_endgame_edna.1.a: "至少这能让她晚上睡得更安稳些。"
 brazil_adhemar_endgame_edna.2.t: "献祭牺牲"
 brazil_adhemar_endgame_edna.2.desc: "圣博尔雅的夜晚，是一个与知己好友散步谈心的美妙场景。社进党会推举埃德娜·洛特作为总统候选人，条件是在州选举中支持工党，并给他们留几个内阁席位。埃德娜和小瓦加斯并行，讨论着选举，工党和社进党的关系，以及两年前去世的前总统热图利奥·瓦加斯。\n\n啊，老瓦加斯。对埃德娜来说，他是领袖，是富有魅力的专制者，是伟大的进步改革家。他为这个国家的女性做了太多事情，尽管有许多不足之处，但他给了她们站起来的机会，为她们的权利而战，甚至击败了那些仍想在各个领域限制女性的男人们。\n\n但对小瓦加斯而言，他的父亲背叛了他。利马、古拉特、内维斯——他选择了许多继任者，却从未选择过他，即使小瓦加斯对他的政策如此忠诚。把他带入政治舞台的是阿德马尔，而不是他的父亲。是阿德马尔告诉小瓦加斯，腐败会让不可能变为可能，让不可接受变为可以接受。进步主义只有结合民粹主义才行得通。\n\n“我还记得他当时说的，‘胜利就是学会等待。’多么深刻啊。”埃德娜望向远方，城里的灯光闪耀着，仿佛巴西的未来正要由他们的努力实现。\n\n“但我更喜欢‘偷窃与施舍’。”小瓦加斯并不同意她的看法。“我们的联盟基于共同的目标。社进党会支持你入主高原宫的。”"
 brazil_adhemar_endgame_edna.2.a: "社进党不会参与1970年大选。"
 brazil_adhemar_endgame_edna.3.t: "总统演讲"
 brazil_adhemar_endgame_edna.3.desc: "回顾巴西的历史，男性主义，或者说大男子主义者，一直用他们的保守思想和行为压迫女性。过去几十年，没有一届政府能结束这种对女性的系统性压迫。当然，瓦加斯确实是做了些努力来推动改变，但今天，是我们让这种改变一步到位的时候了。埃德娜将在首次总统演讲上向众议院和参议院发表讲话，劝说他们支持工党提出的新法案。\n\n深吸了几口气，埃德娜走上了讲台。\n\n“议长先生，尊敬的参议员们，女士们，先生们。”\n\n“自从我们建立这个国家以来，我们的女性同胞就一直受到男性沙文主义的压迫，这是历史的悲剧。巴西一半的劳动者，一直被不公压迫，包括就业歧视、剥夺财富继承权、选举歧视等等，直到瓦加斯的进步法律，才为我们的女性同胞提供了挺身而出的机会。”\n\n如果瓦加斯没有禁止女子足球该多好啊，埃德娜在心里嘀咕着。真是“感谢”大男子主义者了。\n\n“但现在，我们女性终于可以站起来，为自己的权利而战了。我们不必再为自己的性别感到羞耻了。”\n\n“平等不仅仅是纸上的美好词汇，而是每个人都应享有的权利。作为一名女性，我想向在座所有尊敬的参议员们表达我们集体的诉求。”\n\n“女性需要平等获得医疗、教育服务的权利；需要在从事相同工作的情况下，与男性工人获得同等薪酬的机会；需要平等的，合法的继承先人的遗产，作为自己的私人财产的权利。”\n\n“女性将向那些试图阻碍我们进步的人展示女性的力量，克服所有前进的障碍。我们应该为这个国家的一半公民无法获得与另一半公民同等的法律地位而感到羞耻。我尊敬的同僚们，我恳请你们支持我的提案，以回报我们女性选民的信任与支持。”"
 brazil_adhemar_endgame_edna.3.a: "只有整合主义者投票反对。"
 brazil_adhemar_endgame_edna.4.t: "赢家小聚"
 brazil_adhemar_endgame_edna.4.desc: "总统府是一天繁忙的政府工作后放松的绝佳场所。埃德娜、坦克雷多、布里佐拉、库比契克、古拉特、洛特，以及其他所有盟友，都聚集在前总统府邸，一方面是庆祝戈亚斯州基础设施法案的通过，另一方面也是为了放松身心。上好的红酒、烤肉和新鲜水果，政客们都尽情享受。埃德娜的孩子们也来了，她的儿子甚至得到了军队的特别批准。布里佐拉喝得有点醉了，说：“那个社进党的蠢货能赢，全靠大搞贿赂。他成了总统了，就开始全国到处撒钱，搞得国家一片瘫痪。”\n\n古拉特吃完了烤鸡，接过话题说道：“你能想象工党或社民党这么丢脸吗？要是我们搞成这样，二十年都别想东山再起了！”“你们不觉得阿德马尔的经济政策对国家还是有一些好处的吗？”库比契克插话道。“他在任期内完成过哪怕一个重要项目吗？”埃德娜立刻反问，“没有！”在场的人都忍不住笑了起来。这一晚大家无所不聊，从阿德马尔到小瓦加斯，再到拉塞尔达最近的一些离谱言论，然后是夸德罗斯在巴西利亚大学醉酒发表的关于泛非主义的演讲。最终，话题定格在俄罗斯的军阀上。\n\n恩里克·洛特说道：“俄罗斯，一个光荣的民族，即便在共党治下，他们也能坚守荣誉，与德国抗争了四十年。让我们为他们干杯吧。”这位老元帅举起了酒杯，而巴西的领导人们则喝干了杯中最后的红酒。“我相信，总有一天，巴西也会来到世界舞台的中央，与世界列强平起平坐。”\n\n聚会以一场关于俄罗斯和巴西未来的热烈讨论结束。仆人们开始清扫，醉醺醺的政客们则由各自的司机送回了家。\n\n“能和朋友们这样开心的聚会，真是太好了。”所有人都离开后，筋疲力尽的埃德娜自言自语着结束了最后的清理工作。"
 brazil_adhemar_endgame_edna.4.a: "多个朋友多条路……"
 brazil_adhemar_endgame_edna.4.b: "……但工党有比社民党更好的盟友。"
 brazil_adhemar_endgame_edna.5.t: "重归乐土"
 brazil_adhemar_endgame_edna.5.desc: "对现代文明来说，亚马孙雨林是一片难以征服的土地，但当地原住民却早已熟知如何与它共存。刀耕火种，这是他们的传统。然而近年来，由于木材公司的大规模砍伐，雨林遭受了严重的破坏，而印第安人保护局对此毫无作为。\n\n因此，这些原住民不得不离开家园，迁移到别的地方务农。然而，新家园的环境更加严酷，与其他部落在资源上的竞争迅速成为了一个棘手的问题。\n\n突然，定居点外传来了一阵喧闹声。是那些工人又来砍伐森林了吗？许多人害怕不已，过去的悲惨遭遇仿佛要再次上演了。但这一次，情况有所不同。一声响亮的呼喊传遍了整个部落。\n\n“朋友们！”他们震惊于说话人用的是他们的母语。“时代变了！政府不会再砍伐我们的森林了，这里现在是欣古河国家公园的一部分！我们可以回家了！”\n\n这是真的吗？土著们被这番话震惊了。但无论如何，情况也不会变得更糟了。他们随后纷纷返回了自己的村庄。令他们意外的是，不仅是他们的部落，还有大多数在这里生活的其他部落，也纷纷回归雨林，而那个喊话的人正是邻近部落的一名成员。\n\n部落的长者伸出了手，两只手紧紧地握在了一起。"
 brazil_adhemar_endgame_edna.5.a: "时代变了。"
 brazil_adhemar_endgame_edna.6.t: "处事有道"
 brazil_adhemar_endgame_edna.6.desc: "在马托格罗索州的一个小村子里，工党的街头活动家阿诺尔多·阿伦卡尔正与他的同事们一起为将至的选举拉票宣传。然而，事情并不顺利，他很不喜欢来到这样偏远的地方，政治冷感的村民和当地潮湿的天气让他感到十分烦恼。\n\n“公民们！”他再次拔高嗓门说道，“选出正确的领导人，引导我们的国家和人民走向正确的方向，对我们至关重要。”\n\n这根本没用，他十分明白，村民们压根不在意他说的话。他能感觉到，这个村子多年来几乎没什么变化。实际上，这个区域的选民投票率一向很低。谈论全民盟及其不得人心的改革？收效甚微。这些人不靠工资过活，大多数人来听演讲只是消遣，很多人连投票资格都没有。\n\n正当他感觉自己是对这些村民对牛弹琴时，人群中忽然一声大喊：“每个政客都试图从我们这里偷点什么，无论是土地改革还是投票权。其他政客总想从我们这里偷走什么，但他会尽全力为我们做事。”话一说完，人群就爆发出一阵欢呼声，将阿诺尔多的声音完全淹没了。"
 brazil_adhemar_endgame_edna.6.a: "一句话就把阿诺尔多的活干完了。"
 brazil_adhemar_endgame_edna.7.t: "高原宫酒局"
 brazil_adhemar_endgame_edna.7.desc: "高原宫是总统与党派要员、政府高层，以及关系密切人士会谈的理想场所。因此，埃德娜总统邀请魏纳来这里小酌一杯，并就一些新闻合作事项进行协商。\n\n“你知道如果拉塞尔达赢得选举会发生什么，肯定是场灾难！”埃德娜一边说，一边又为自己倒了一杯酒。“我知道，我知道，”魏纳说，“工党才是正确的选择，而拉塞尔达只是在欺骗所有人，不是吗？我当然理解您的意思，但我们现在缺乏资金。印刷费要花不小一笔钱，采购纸张和编辑工资也不低啊。”“当然，我们会支付你们的费用……我只是担心物有没有所值。”埃德娜稍作犹豫后答应了。\n\n“很好。我们来谈谈宣传策略吧。”魏纳从公文包里取出笔记本。“全民盟根本没办法解决通胀，而且大多数选民很讨厌夸德罗斯那个荒唐又夸张的家伙。社进党我们可以从腐败出发攻击他们。社民党……必要的话我们就攻击他们背后的寡头。”他说着，朝埃德娜眨了眨眼，露出了意味深长的笑容。“然后，突出工党在维护社会进步安定上的贡献，还有瓦加斯继承者的人设，以及对独立外交政策的承诺。对了，我们需要依靠护宪派的支持吗？”\n\n“最好不要。我不想冒让军队介入政治或者激怒那些军官的风险。”埃德娜摇了摇头。“不过，我很好奇你为什么那么恨拉塞尔达？你和他有什么过节吗？”\n\n“当然。你知道我是俄裔犹太移民，如果我想拥有一家自己的报社，就必须对外隐瞒这一身份。但是拉塞尔达把这件事公之于众，不仅当众羞辱我，还让那些该死的整合主义者跑到我家门前闹事。从那以后，我就一直想报复他。”魏纳解释道，“通过与移民社区分享故事，我可以为你们提供很大的帮助。我相信你会接受这笔交易，对吧？”\n\n“当然，如果这对我有用的话。”埃德娜接受了这个双赢的协议。"
 brazil_adhemar_endgame_edna.7.a: "“现在，轮到我们书写自己的故事了。”"
 brazil_adhemar_endgame_edna.8.t: "修订土地改革法案"
 brazil_adhemar_endgame_edna.8.desc: "在参议院，埃德娜和布里佐拉休会时坐在座位上，观察着议场的动向。事情进展得还算顺利，埃德娜心想——她的支持者成功将土地改革法案描述成了一项值得支持的措施，尽管在重新分配土地上不是所有人都愿意，但至少引起了参议员们的关注与兴趣。在他们讨论接下来如何推进的时候，内维斯急匆匆地走向他们，似乎有要事相告。\n\n“事情不太妙，各位，”他喘着粗气说道，但语气似乎轻描淡写。“你们党和我们党的成员都打算否决这项法案，无论我怎么说，一些人都开始呼吁要踩刹车了。”\n\n“踩刹车？”布里佐拉愤怒地嚷道，“真操蛋了，坦克雷多，这帮人上次去乡下都是哪年了？要阻止这样的法案，就是在背叛这个国家的农民……”\n\n“我明白……你的意思，莱昂纳尔，”内维斯打断了他，“但你得冷静想想。我们都不是同一个党派，要是我真想破坏你们，压根都不用告诉你们这些。我只是认为我们需要和他们妥协一下，缓和一下局势，仅此而已。”\n\n埃德娜在内维斯说话的时候，用一种近乎不满的目光看着他，但她的视线很快又回到了议场，注视着从旁听席下走出来的那些参议员。她不能输，尤其是绝对不能在今天输掉这场关键的争斗。“我们会考虑的，内维斯先生，”她勉强露出一丝微笑说道。最终，她决定……"
 brazil_adhemar_endgame_edna.8.a: "……同意和社进党、社民党的反对派妥协。"
 brazil_adhemar_endgame_edna.8.b: "……让他们见鬼去吧。"
 brazil_adhemar_endgame_edna.9.t: "道阻且长"
 brazil_adhemar_endgame_edna.9.desc: "“我们现在位于国会大厦外，投票结果即将揭晓……”新闻主播停顿片刻，耳麦里传来导播的低语，唯有主播面部肌肉的抽搐暗示着投票结果。“……好的，现在为观众朋友们带来《土地改革法案》的表决结果。我可以肯定地告诉大家，法案……”\n\n“……获得通过。”\n\n若还有观众未听清最后这几个字，主播身旁农民们震耳欲聋的欢呼声也能帮他们确认总统今天拿下了胜利。\n\n“现场群众欣喜若狂，他们为反对不公不义抗争许久。”主播稍作停顿，“现在将画面切到正在发表演说的洛特总统。”\n\n镜头转向埃德娜·洛特，她傲然立于演讲台后，决意充分利用此刻。“感谢大家来到这里。回馈那些在田间挥汗如雨、以血汗滋养国家却无地可依的劳作者，是父亲毕生的夙愿。今日，我们又朝着它迈出了关键一步。”\n\n“我明白，改革之路任重道远、无法毕其功于一役，但有了这份法案，进步将如般骏马奔驰，而不像以往老牛拉破车。”人群中响起会意的笑声，显然听出这是对阿德马尔的暗讽。“请大家相信，我将秉承父亲的意志，与工党并肩前行。如果愿意支持我的事业……”\n\n“……请选又一位洛特担任总统！谢谢大家！”“埃德娜！埃德娜！”的欢呼声浪中，镜头切回到新闻主播及国会大厦外欢腾的人群。"
 brazil_adhemar_endgame_edna.9.a: "“今日大胜，埃德娜大抵是要留任总统了。”"
 brazil_adhemar_endgame_edna.10.t: "田地荒芜"
 brazil_adhemar_endgame_edna.10.desc: "“我们现在位于国会大厦外，投票结果即将揭晓……”新闻主播停顿片刻，耳麦里传来导播的低语，唯有主播面部肌肉的抽搐暗示着投票结果。“……好的，现在为观众朋友们带来《土地改革法案》的表决结果。可以确定的是该法案……”\n\n“……未获通过。”\n\n人群陷入哀恸的沉默。但在巴西利亚其他角落，法案夭折引发的哀恸正化作怒火中烧的抗议，将整座城市拖入不眠之夜。当公平再次被剥夺，愤怒的矛头不仅指向惯常的压迫者，更直指食言的总统。\n\n“最新消息，全民盟的马加良斯·平托正在就法案流产发表演说，我们将进行现场转播。”画面闪烁间，平托如排练过千百次般在人群前展露胜利者的姿态。\n\n“今天的结局当真出人意料吗？或许她父亲做得到，但女儿不行。”他刻意加重“女儿”的咬字，却仍要捅破这层窗户纸：“巴西需要能指引方向的领袖，而不是夺走丈夫热饭的悍妇。工党显然不堪重任，但若诸位渴望真正的领导者……”\n\n“……请在即将到来的大选中为全民盟投票，选择一个真正能领导巴西的男性领袖。”当镜头切换时，画面已切回熟悉的演播室场景：主播身后，人群的怒吼正随平托退场时的掌声愈演愈烈。"
 brazil_adhemar_endgame_edna.10.a: "“太残酷了，真不知道埃德娜要如何翻盘……”"
 brazil_adhemar_endgame_edna.11.t: "选举权法案修正案"
 brazil_adhemar_endgame_edna.11.desc: "全民盟一如既往地难改其将法案稀释成浆糊的积习。此次他们竟意图篡改选举权法案的核心精神——原本旨在赋予失声文盲群体选举权的法案，被强行附加必须具有识字算术能力的条款。要知道，无数文盲终其一生都未曾与文字打过交道。\n\n布里佐拉率先敲响警钟，他在参议院走廊截住总统：“总统女士，这是他们的无耻恫吓。他们妄图用政治讹诈迫使您放弃提案，但我向您保证，这纯粹是他们的阴谋诡计。巴西人民对您寄予厚望，千万不要因为这些蠢材辜负他们的信任。”\n\n纵使如此，埃德娜仍对强硬立场心存犹疑。若与全民盟彻底决裂，谁能保证他们不会像削弱法案那般设法扼杀提案？这位女总统深知，身旁的执政盟友毕生为贫民奔走呼号、与右翼抗争。在此次辩论中，她已选择与布里佐拉并肩而立。单凭这点，就足以令她对修正案不屑一顾。\n\n不论对方是何居心，若是要动摇她的决心，这些伎俩确实有效。但归根结底，她仍是肩负抉择重任的国家领袖。"
 brazil_adhemar_endgame_edna.11.a: "向全民盟低头，接受修正案。"
 brazil_adhemar_endgame_edna.11.b: "我们可不会屈服于全民盟的淫威，拒绝他们的提议。"
 brazil_adhemar_endgame_edna.12.t: "权力的边缘"
 brazil_adhemar_endgame_edna.12.desc: "参议院议事厅的掌声渐息，坦克雷多·内维斯悄然离席。这份喝彩本不属于他——这位旁观者所在的联邦参议院刚刚通过了《投票权法案》。他在幕后做了不少工作，此刻他却要功成身退，把聚光灯留给媒体。国会大厦笼罩在躁动的空气中，大多数人一脸兴奋，少数派则躲到镜头之外的角落里生着闷气。\n\n“可算找着你了。”莱昂内尔·布里佐拉迎着凉爽的晚风走向建筑外面的坦克雷多，两个男人相视一笑，用力握了握手。布里佐拉为这次投票和会面专程北上，这次收获颇丰。“顽固派阻挠改革到底没能得逞，这么多年的心血总算没白费。”\n\n“该祝贺的人可多了，你也算一个。”内维斯带着布里佐拉来到一根白色巨柱的阴影里，避开往来人群，“说到底还是埃德娜的功劳，她办事效率可太高了。”\n\n两人站在权力舞台的边缘，静静地看着庆贺的人潮离开大厦。布里佐拉突然指着快速挤过人群的深色西装男子：“你瞧拉塞尔达那小子，跟过街老鼠似的。这家伙肯定忙着四处嚼舌根搬弄是非，可惜机关算尽……”拉塞尔达笑了笑，内维斯点了点头。\n\n“拉塞尔达又输了。照这个速度，社进党和全民盟倒台指日可待。”内维斯瞥见两个记者朝他挥手好像在叫他过去，“我们晚餐的时候再聊吧，这儿嗡嗡作响的“苍蝇”可太多了。”"
 brazil_adhemar_endgame_edna.12.a: "在一个真正的民主国家，所有人都在权力的中心。"
 brazil_adhemar_endgame_edna.13.t: "日拱一卒"
 brazil_adhemar_endgame_edna.13.desc: "议长敲下木槌，卡洛斯·拉塞尔达冷冷地点了点头。议长宣读投票结果并宣布法案未达到必要票数，他心中十分满意——他拿下了小小胜利。他的游说成功了，而埃德娜无能为力。\n\n拉塞尔达离开旁听席，看到内维斯和布里佐拉也离席了，神情十分沮丧。他们低声交谈，激烈地打着各种手势，拉塞尔达猜想他们正在哀叹失败并试图在选举日前找到解决方案。二人眉头紧锁、神情紧张，一看到拉塞尔达，便转过头去，不让他看见他们的脸。这个动作让他倍感满足。总算出了一口恶气，但这还远远不够。等到全民盟赢得选举，他们的脸色会更加难看。\n\n选举改革总体上是个不错的主意，否决它确实可惜，但绝不能让埃德娜·洛特借此立功。她会利用这一成果将巴西引向经济崩溃，那些因选举改革获得权力的人最终都会在通胀大潮中沦为乞丐。为了国家利益，不能让她得逞。不能为了一个改良方案，赔上整个国家的未来。\n\n拉塞尔达走出大楼，把帽子戴好，迎接温暖的阳光。看着工党代表被记者围攻的窘态，他脸上浮现出志在必得的微笑。法案失败的消息即将传遍大街小巷，而民众会转而支持全民盟，支持他拉塞尔达。"
 brazil_adhemar_endgame_edna.13.a: "混迹政坛，不择手段。"
 brazil_adhemar_endgame_edna.14.t: "余烬"
 brazil_adhemar_endgame_edna.14.desc: "巴西对埃德娜·洛特意味着什么？成为巴西人又意味着什么？日本移民问题犹如战争余烬中未熄的火星。然而，冲突的余烬中往往蕴藏着点燃自由火炬的燃料。她走向参议院演讲台，准备为那四十万仍在压迫的黑暗与余烬中挣扎的灵魂发声。\n\n“诸位参议员，我提议废除的这项法律已存在二十余载。我们至今仍活在吞噬世界的战火记忆中，活在失败的伤痛中。正是这种痛苦催生了这项法律，而战败的遗产至今仍在灼烧我们的祖国。成为巴西人意味着什么？是出生于此，是为社会作出贡献，还是助力建设更美好的巴西？请到自由区看看日系群体为国家作出的巨大贡献。正是因为他们，巴西才变得更美好。他们理应获得高举自由火炬的权利，而不应继续承受我们施加的痛苦。\n\n我衷心希望，在座的各位，从全民盟到工党的各路议员，都能给予我们支持，让我们携手跨越历史的伤痛，迈向未来，开创巴西的新纪元。请与我们一起，创建一个真正实现人人平等的新巴西。诸位切记，如果我们不采取行动为日系人照亮自由之路，那些绝望的灵魂或许会点燃战争的余烬，让烈焰燃尽这片我深爱的土地。我期待得到诸位的支持，感谢大家的聆听。”\n\n埃德娜走下讲台时，全民盟、工党和社会党的部分议员纷纷报以掌声，唯有社进党的议员们陷入了意味深长的沉默。"
 brazil_adhemar_endgame_edna.14.a: "自由火炬行将熄灭。"
 BRA_rescind_japanese_ban_brazil_tt: "$BRA_EDNA_REPEAL_OF_JAPANESE_IMMIGRATION_BAN$将会在参议院付诸表决。\n\n§Y如果通过：§!"
 brazil_adhemar_endgame_edna.15.t: "自由区的日出"
 brazil_adhemar_endgame_edna.15.desc: "平日熙熙攘攘的《圣保罗新闻》编辑部，此刻唯有角落里的收音机旁人影攒动。作为全巴西唯一拥有日语报纸的社区，当法案通过的消息传来，欢呼声穿透编辑部的玻璃窗，在街道上激起层层涟漪。这一刻，他们憧憬着一个梦想——或许某天日语报纸不再局限于两家报社，日裔社区也不必蜷缩于一隅之地。\n\n大洋彼岸的编辑部里电话铃声此起彼伏。《产经新闻》的编辑如常巡视工位，负责国际版面的年轻记者盯着案头剪报怔怔出神——那份来自《圣保罗新闻》的报道宣告着日本移民禁令的解除。他活动着指关节开始撰稿：“从笠户丸首航至今，巴西大地始终向万千同胞敞开机遇之门……”\n\n又一道汽笛在广州车站响起。布满血丝的双眼反复确认着《产经新闻》的报道细节。巴西。那片承诺能让他远离一切纷扰的应许之地。收拾行囊时，他听见胸腔里激荡着自由之火的爆鸣。\n\n夜幕降临，日本商会的要员们正举行紧急会议。电视屏幕里重播着埃德娜·洛特的演说，自由之光本似既定程序中的官样文章——他们曾与阿德马尔之流周旋，深谙政治交易的局限。但此刻凝视着这位女总统的面庞，他们确凿看见了光芒。不论是自由之火，抑或新升的旭日。"
 brazil_adhemar_endgame_edna.15.a: "它们并无二致。"
 brazil_adhemar_endgame_edna.16.t: "完美计划"
 brazil_adhemar_endgame_edna.16.desc: "埃德娜·洛特伸出手，小心翼翼地关掉了收音机。她的手微微发抖，虽然身处巴西利亚高层的豪华套间，传来的消息还是让她难以平静——解禁移民法案居然没能通过。收音机里主持人的声音仿佛吱嘎作响的鸦声，听起来格外刺耳。\n\n埃德娜在房间里踱来踱去，思绪纷飞，透过窗户和浅色亚麻窗帘看去，仿佛一个尚有心愿未了的游魂。明明各党各派之前都表态支持修法，讨论了那么多遍，条款也斟酌推敲，怎么临了就变卦了？问题就像她的脚步一样，在她的脑海里盘桓。是有人故意设局？还是自己威信不够？又或者，她从一开始就错判了形势？她输了吗？\n\n埃德娜凝视着窗外的城市。巴西利亚是巴西应该成为的样子。一个新国家的新首都。即使站在她所站的地方，她也能看到引导这一切的有力之手，不仅出现在当权者操纵杠杆精心设计的政府大楼，而且也出现在街道上。之前，这些街道只是纸上的线条。由工程师和建筑师从零开始规划，这里的每样东西和每个人都有他们指定的位置。如果巴西和它的首都一样，她会在哪里？更要紧的是，在这个计划中，日系移民和其他地位尴尬的人，应该处于什么位置？毕竟，真实的人不会被蓝图所控制。\n\n路灯与车流渐渐汇成光带，城市运转从不停歇，只有她凝固在时间里。埃德娜休息了一会儿，拉上了窗帘。下方的城市不过是辜负她的庞大体系中的一环。她重新打开收音机，听着里面的声音，寻找有用的信息。"
 brazil_adhemar_endgame_edna.16.a: "是人民创造了巴西，由人民改变巴西的律法。"
 brazil_adhemar.1002.t: "天堂里的烦恼"
 brazil_adhemar.1002.desc: "若昂·古拉特、坦克雷多·内维斯和莱昂内尔·布里佐拉——三人曾多次聚在一起，每次的气氛都不尽相同，或沉闷，或激烈，抑或是纯粹的欢乐。然而，古拉特从未感受过当下这般的尴尬。他们就这么坐了一分钟：三位老友、亲眷故旧，都在等待着某人开口，宣布另一个人将要一举击败最后一人。他们好似困在墨西哥的僵局之中，等待着一方率先出手。\n\n埃德娜遭到弹劾后，联盟便动荡不安。她是完美的折衷人选：魅力十足，对双方都十分友好，还有从父亲那里继承下来的好名声。现如今，只能靠这三个老朋友收拾残局了。内维斯咳嗽一声，率先打破沉默：“好了，”他抿了一口咖啡，说道，“我们已经乱了好几个月了，我们三个中要出一个人，担任联盟的新领袖。”\n\n古拉特和布里佐拉都点了点头。布里佐拉接过话茬，“我觉得这就是为什么要碰头，杨戈——当然，前提是我没想岔。”他似乎对地毯产生了浓厚的兴趣，不愿意跟姐夫和内维斯对视。\n\n“把你叫来这里当然有这个意思，坦克雷多，但恐怕，这是两个人之间的事情，而不是三个人。”古拉特说着，另外两人猛地抬起头，死死地盯着他。古拉特脸上浮现出一丝苦笑：“听着，我已经过了巅峰期，正在下山的路上了。再争论过去的可能性恐怕无济于事，但照我说，需要你们两人中的一位来为联盟注入精神。”内维斯和布里佐拉面面相觑，表情难以捉摸。察觉到气氛变得凝重，古拉特不禁叹了口气。\n\n“听好了，我知道你们俩在政治上有很大分歧，而这就是我请你们来聚一聚的原因。我希望你们能保证，不要让权力毁了你们之间的友谊。”当然还有联盟，不过他并没有讲出口，“说得够明白了吧？”"
 brazil_adhemar.1002.a: "片刻后，两人点头，接下来的聊天一如往常。"
 brazil_adhemar.1003.t: "联盟建设改革"
 brazil_adhemar.1003.desc: "“您所谓的‘联盟建设’改革……”社民党老会议室，雅伊尔·内格拉奥-迪利马抖了抖新打印的文件，墙上挂满了纪念品。\n\n“方案很扎实！只要调整联邦教育拨款的计算方式。”爱德华多·卡塔朗抢在雅伊尔说完前接话。布里佐拉清楚“调整计算”就等于“削减拨款”，但至少这三个人还愿意听取他的陈述。\n\n“我和其他人一直在聊类似的劳工改革——别摆着一副苦瓜脸了雅伊尔——但最低工资的增幅……”拉萨罗·巴尔博扎一边摆弄着他那条佩斯利花纹领带，一边摇着头，无视他身边的同僚。\n\n“我还没说完呢！现在重点是土改数据！你是随便编的数字吗？我不管这是不是你在玩策略，就算是理想方案，不砍掉大半也过不了党内这关，更别说参议院！”雅伊尔敲着见证过无数交易的古董红木桌。布里佐拉必须说点什么。\n\n“雅伊尔，我要感谢你的付出。各位的顾虑我都理解，方案还没定下来呢。但我要明确一点——”他站起身来，“这份计划的目标不是取悦国会，而是赢得选举，组建支持我们的新国会。我们要让人民看到，我们跟对手是不一样的。妥协能通过法案，但唯有变革能让我们当选。”\n\n余音在挑高天花板上回荡，在靠在焦糖色皮革座椅上的三人头顶盘旋。远处海湾和圣贡萨洛的阴云映衬着布里佐拉的背影。天空阴云密布。\n\n拉萨罗笑了。"
 brazil_adhemar.1003.a: "“坦克雷多从来不会这么自以为是。”"
 brazil_adhemar.1003.b: "“你要支持，开口便是。”"
 brazil_adhemar.1004.t: "基民党左翼的决定"
 brazil_adhemar.1004.desc: "“看看工党是怎么搞的！我离开之后一切如故，依然是个人独裁。”费尔南多·费拉里喝着咖啡，这咖啡来自他们一同劳作过的田野。他们正在执行基督民主党的特别任务，调查新生的基层现象：基层教会社区。这种小型宗教团体往往蕴含着无穷的力量。\n\n二人在一家砖砌餐馆的阴凉庭院中稍作休憩，躲避圣保罗午后的酷热。正午时分，劳动者都纷纷歇息。\n\n“所以呢？你现在站队内维斯了？”普林尼奥·德·阿鲁达·桑帕约穿着乡间装束和牛仔靴，这比费拉里那一身在泥地里显得格格不入的亚麻衫和乐福鞋更能吸引摄影师的目光。\n\n“没错，或许我得站他了。你也听社区说了吧！就算是这种地方的民众也非常关注政治。要是工党上台，他们的呼声能得到回应吗？你看看周围，内维斯的表现不好吗？”不远处，一位母亲带着她约莫八九岁大的小孩，在街对面嬉戏；两人正前往市场购物，物价较之前已平缓许多。\n\n“他们要的是土改！内维斯的速度太慢了。”细看孩子周围，可以见到塞拉多地区特有的干燥红土透过枯黄的草地蔓延而来。他们身后是早已废弃的小屋。这一天本应是上学的日子。\n\n这时，一位年长的女士走出餐馆，收走桌子上的空杯。费尔南多灵机一动，“夫人，要是让您要在莱昂内尔·布里佐拉和坦克雷多·内维斯之间挑选一位来做总统，您会选哪一个？”她思索片刻。"
 brazil_adhemar.1004.a: "“内维斯改革之后，我妹妹的摊位生意好了很多。”"
 brazil_adhemar.1004.b: "“我那可怜的侄子打理农场过得可苦了呢。\n要是布里佐拉上台他肯定会好过点。”"
 brazil_adhemar.1005.t: "工党教条派倾听内维斯的主张"
 brazil_adhemar.1005.desc: "“你们觉得在这个党里有发言权吗？”\n\n巴西工党总部大厅内，大理石制成的热图利奥·瓦加斯半身像凝视着坦克雷多·内维斯，仿佛在默默见证这场对话。前财长内维斯的出现总是引人注目，吸引了接待员和警卫的目光。\n\n更加引人注目的是他身旁的两位同伴：卢西奥·比当古和塞尔吉奥·马加良斯。卢西奥是工党的创始成员，他一直对工党-社民党联盟持保留意见；塞尔吉奥则对库比契克的经济政策不甚支持。他们并不是人们第一时间便会联想到的、可能影响局势的人物。\n\n“您是说在您的政党领导下我们会有更多的发言权吗，内维斯先生？”当内维斯推开那扇红木门，步入陈设简单的会议室——房间里只有一张桌子、一扇窗和一幅瓦加斯的大幅画像——时，卢西奥问道。\n\n“我们知道尊重专业知识的重要性。”\n\n“你们尊重的是大企业、银行家与既有秩序。”塞尔吉奥的话让卢西奥挑了挑眉，但恰在内维斯的预料之中。\n\n“我们尊重民主，但真正的民主不应限于表面。我现在就在这里，倾听你们的声音。我知道你们有许多想法，我准备了笔记本、笔，并预留了几小时时间，充分听取你们所有的政策建议。”\n\n内维斯坐下来，摘下软呢帽，解开宽翻领西装外套的纽扣，取出本子和笔。让他独自一人坐在那里，显然不是明智的选择。"
 brazil_adhemar.1005.a: "“好吧，那我们就来会一会你。”卢西奥说。"
 brazil_adhemar.1005.b: "两人一言不发，离开了房间。"
 brazil_adhemar.1006.t: "戈亚斯州州长"
 brazil_adhemar.1006.desc: "“我需要你的支持，毛罗。”\n\n“很高兴与你交谈，莱昂内尔。”挂断电话，戈亚斯州长毛罗·博尔热斯向后靠在他那张复古的白色锦缎椅上，沉思起来。他与莱昂内尔·布里佐拉合作多年，时局从未像此刻这般诡谲莫测。\n\n他效力多年的联盟正在逐渐瓦解，一着不慎，便可能误入歧途。他对社民党忠心耿耿，但如果他支持莱昂内尔，却与党内其他同志的心意相悖，这该如何是好？\n\n再看坦克雷多·内维斯，此人对军方百依百顺，或许会让强硬派乘势而起。况且，莱昂内尔是他多年的老友。背叛朋友，岂非令人不齿？再说了，让亲信入主高原宫、当大统领，岂不美哉？\n\n但内维斯又何尝不是一种选择呢？他显得较为温和、稳妥，没有莱昂内尔或杨戈那种咄咄逼人的气势。莱昂内尔和杨戈如此强势，能讨得了好吗？要是莱昂内尔当了总统，又得罪了不该得罪的人，毗邻巴西利亚的戈亚斯，会不会因此成为风暴中心？\n\n就在毛罗被纷繁复杂的情势缠绕之时，电话铃声突然响起。“博尔热斯先生，坦克雷多·内维斯来电，问您是否有空？”抉择的时刻到了，是继续支持老友莱昂内尔，还是转向内维斯，成为左右政局走向的造王者……"
 brazil_adhemar.1006.a: "“好的，转接一下。我有很多事要跟他谈。”"
 brazil_adhemar.1006.b: "“我正忙着呢，请替我向他致歉。”"
 brazil_adhemar.1007.t: "主编致辞"
 brazil_adhemar.1007.desc: "“选举临近，工党-社进党联盟面临着前所未有的考验。若昂·古拉特先生和埃德娜·洛特女士先后退隐，瓦加斯主义的未来晦暗难明。”\n\n夜幕降临。在一条狭窄的市场小巷中，人们在烟雾缭绕中谈笑风生，玩着巴西台球，一派生机勃勃的景象，但其中一栋四层高的朴素建筑却显得格外静谧。推开那扇带有蓝色招牌的大门，绕过那辆随手停在路边的送货卡车，映入眼帘的是几台大型印刷机，此刻它们静默无声，仿佛进入了梦乡。\n\n“接班人选尚未确定，但有多位候选人具备承担重任的能力。《最后时刻报》在此向亲爱的读者保证，无需因候选人的更迭而感到不安或产生质疑。”\n\n两位个西装男穿过拥挤的机器间，缓缓登上裸露的混凝土楼梯，懒洋洋地坐到绘图桌和打字机前。夜已深，外界的景象更是平添几分沉闷。从对面街道密布的电线网间望去，还能看到上届选举遗留下来的阿德马尔竞选横幅——虽已褪色破旧，但仍清晰可见。\n\n“我们深知，党派联盟一旦分裂，后果定是不堪设想。我们的立场可能会影响政治的走向。然而，作为专业分析者，我们肩负着对社会和民众的道德责任，必须坚定地支持最能守护人民福祉的人选。我，身为主编，曾有幸与这位候选人直接交流，我可以证明他的品德值得信赖……”\n\n三楼，高级记者围坐在会议桌旁，默默地品尝着咖啡，空气中弥漫着紧张的气息。突然，头顶传来了脚步声，萨穆埃尔·魏纳从楼上走下来，脸上挂着一丝无奈的笑容。他手中握着一份文件。"
 brazil_adhemar.1007.a: "“坦克雷多·内维斯会不惜一切代价实现巴西的繁荣。”"
 brazil_adhemar.1007.b: "“莱昂内尔·布里佐拉将为工人阶级的利益奋斗到底。”"
 brazil_adhemar.1008.t: "民议阵之夜"
 brazil_adhemar.1008.desc: "巴西利亚帕拉西奥酒店里，民族主义议员阵线的会议虽已结束，长夜却刚刚开始。议员们陆续离开尼迈耶会议厅光洁的大理石地面，踏入奥斯卡餐厅天鹅绒帷幔笼罩的暗调世界，伴随一位女歌手在钢琴旁轻吟加尔·科斯塔的旋律落座。\n\n多少人留了下来？九十人？一百人？比起归家，他们更愿在此觥筹交错、暗通款曲，或是痛饮几杯上好的威士忌——民主本该如此，不是吗？不同党派的人们共处一室，在推杯换盏间心平气和地商议国事。\n\n“所以选布里佐拉还是内维斯？”总有人要捅破这层窗户纸。提出这两个名字的刹那，声浪如潮水漫过整个餐厅。每年大选季都是如此，毕竟民族主义议员阵线是一支信奉民族发展主义松散理念的杂牌军，任何将其凝聚成选举机器的尝试都可能引爆内部分裂。\n\n仅仅一公里外的晨曦宫内，罗梅乌·德·坎波斯·韦加尔正绘声绘色讲述德国人的种种荒唐行径，但听众们的心思早已飘向选举与总统人选。\n\n不少人对布里佐拉在阵线内的峥嵘岁月记忆犹新。在左翼眼中，这位硬汉堪称民族主义化身，当政府媚态尽显地追求外资时，唯有他高举抵禦大旗。但阵线里不止左翼——诸多社民党成员，还有全民盟那十来号人，自然偏爱内维斯。他既不会损害阵线誓要守护的工商界利益，或许还能在巴西最需团结之时凝聚人心\n\n仿佛收到暗号般，一位社民党议员突然与工党同僚高声争执起来。"
 brazil_adhemar.1008.a: "“布里佐拉出手必然搞垮经济！”"
 brazil_adhemar.1008.b: "“只有布里佐拉能搞好巴西经济！”"
 brazil_adhemar.1009.t: "啦，啦，啦！"
 brazil_adhemar.1009.desc: "闪光灯亮个不停，政治家们在台上发言，记者们在座位上准备提问。今天，莱昂内尔·布里佐拉正式成为了巴西工党-社民党联盟的新一届总统候选人。会场热情洋溢，内维斯和布里佐拉噙着笑容走上讲台，众人的目光与掌声随之而来。\n\n“社民党和工党的兄弟姐妹们！今天是个大日子！今天，我们两党团结一致，携起手来反对我国制度的结构性不平等、直面困扰我们的症结问题、跨越迈向未来的障碍！今天，我们未进步与改革而战，为巴西人民引以为傲的事业而战。加上社民党盟友们的支持，我们一定能实现自己的目标！”\n\n“所有扰乱两党的挑战、动荡、混乱都已经是过去式！联盟仍将延续，更美好巴西的希望依旧存在！”布里佐拉的话音刚落，人群中就响起了阵阵欢呼和掌声。他走到一边，把麦克风让给了坦克雷多，请朋友也讲几句。\n\n“我们克服了前进道路上的种种挑战。我们始终坚定地为正义而奋斗。在这里，我想请我党的副总统候选人乌利塞斯·吉马良斯发言……”"
 brazil_adhemar.1009.a: "啦，啦，啦，布里佐拉！"
 brazil_adhemar.1010.t: "变革巴西"
 brazil_adhemar.1010.desc: "这一天，坦克雷多·内维斯成为了巴西工党-社民党联盟的新候选人。发布会上，气氛十分热烈，闪光灯左右闪烁，政客们在台上发言，记者忙于准备提问。当内维斯和布里佐拉步入讲台时，全场的注意力都集中到他们二人身上，人们纷纷为他们献上掌声与笑容。\n\n“女士们先生们，今天我们要宣布这等待已久的决定。这一决定将团结我们的联盟。共同争取一个更好的国家，建设一个值得骄傲的未来。我们的同盟将不止于协力，更同心于推进国家快速发展，使其屹立于世界强国之林。只要我们如今天这般团结，巴西便未来可期。”\n\n“我将尊重前任伟大总统们的遗产，与诸位一同高举进步之火炬，为光明的未来不懈奋斗。”内维斯的发言如一石，激起人群的千层浪。随后他往一侧退去，让布里佐拉发言。\n\n“我对联盟的决定无比认同，要让变革与进步降临这个国家，我们就必须团结一致，而这正是我们今天所达成的。现在我想请我们的副总统候选人，乌利塞斯·吉马良斯，来做发言……”"
 brazil_adhemar.1010.a: "现在就要坦克雷多·内维斯！"
 brazil_adhemar.1011.t: "冰炭不同炉"
 brazil_adhemar.1011.desc: "“说真的，我不明白，坦克雷多，”电话话筒里传来布里佐拉的声音，夹杂着噼噼啪啪的电流，“不管魏纳，或者什么国会议员、州长、党员之类的，事实就是我们的事业是一致的。我们都信仰公平而自由的巴西，要从右派政棍手中拯救共和国，夺回精英从人民手中夺走的一切。为什么我们不能携手合作？”\n\n坦克雷多摇摇头，捏了捏鼻梁，长叹一声，回答道：“显然，我们在其他地方分歧太大了。你们要的是快速激进的改革，体制或者不管什么维持体制的东西都该死。而社民党希望维持理性，变革不能只发生在街头，它需要调解和妥协，而不是颠覆体制。我们想要的是发展主义和稳定，如果你们不能接受，那就只能这样了。”\n\n布里佐拉把话筒从紧贴的脸上拿开，鼻孔因为怒气而张开，说道：“我理解您的立场。工党和社民党长达数十年的合作就此结束令我深感遗憾，但从今往后，工党将在选举中以独立名义竞选。再见。”他把话筒摔回原位，盯着话机，陷入了沉思。"
 brazil_adhemar.1011.a: "无论如何，红蓝都近乎对立。"
 BRA_neves_influence: "内维斯的影响正在增长"
