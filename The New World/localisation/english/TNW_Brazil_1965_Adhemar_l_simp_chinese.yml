 BRA_adhemar_germans_are_back: "德国人回来了！"
 BRA_adhemar_germans_are_back_desc: "挥毫生辉，岂非妙哉？阿德马尔·德·巴罗斯仅仅在纸上涂鸦几笔，便打开了许多人认为的潘多拉魔盒。德国人回到了巴西，而且还打算让人们感知到他们的存在。\n\n两国之间贸易关系的开放导致公共场所中德语迅速增加，德国企业也纷纷现身巴西市场，尤其是在南部。\n\n当然，尽管像雅尼奥·夸德罗斯和阿丰索·阿里诺斯这样的人称赞这种变化是独立务实外交政策的胜利，但许多人仍不信服。看到曾经被指为巴西最大敌人的国家的语言和商业出现在每个街角，仿佛这样很正常，肯定会引发至少某种程度的反弹。问题是，这种反弹会在哪里发生呢？"
 BRA_the_eagle_rises: "雄鹰翱翔"
 BRA_the_eagle_rises_desc: "近期的地缘政治变动让曾经难以想象的情况变为现实——德国在巴西的影响力如同地平线上即将来临的风暴般日益壮大。曾经微不足道的少数群体现在已经成为巴西社会的重要组成部分，新的德裔学校、产业和组织如雨后春笋般在全国范围内涌现。\n\n面对这新的地缘政治现实，人们不禁想象其他更边缘化的少数群体将作何反应……"
 BRA_National_Pharmaceutics: "国家制药"
 BRA_National_Pharmaceutics_desc: "随着德国资金通过各种不同渠道（有一些经过了微小的“说服”）流入巴西，年纪轻轻、前途广大的制药公司Ache已经成为巴西制药业密切关注的新基地。感谢Ache的投资，更多的德国资金肯定会随之涌入，制药业在巴西的前景一定是光明的。"
 BRA_parana_crisis: "巴拉那危机"
 BRA_parana_crisis_desc: "人们说，一分耕耘，一分收获——现在是我们收获的时候了。\n\n我们对纳粹德国的接纳在南部地区引发了一阵不满的瘟疫，南方复杂的少数民族群体陷入愤怒之中。抗议、罢工和秘密暗杀在南方遍地开花，当地军队正在努力从紧张局势中恢复和平。若不尽快采取行动，南方将陷入无政府状态。"
 BRA_calmed_south: "南方平静"
 BRA_calmed_south_desc: "尽管巴西政府与执法部门齐心协力镇压最严重的暴力活动已取得成效，但南方地区的民愤仍构成切实存在的危险。虽然抗议者逐渐降低了暴力程度，转而采取和平手段，但针对德裔巴西人的威胁仍然屡见不鲜。日常报道详细记录了民众遭街头跟踪、工作场所和企业系统性歧视，以及整个巴西南部针对德国移民络绎不绝的死亡威胁。\n\n显而易见，只要纳粹帝国在欧洲继续统治，南部社区的社会动荡就难以平息。巴西能否挺过这场危机，既取决于政府能否竭力缓和矛盾，也有赖于警方能否在零星威胁一旦出现时及时遏制。"
 BRA_silent_south: "南方沉寂"
 BRA_silent_south_desc: "尽管巴西政府已成功稳定南方大部分社区局势，但欧洲裔巴西人间的紧张并未消弭。目前抗议活动虽暂告平息，针对德裔巴西人的歧视性骚扰事件也日趋减少，但根深蒂固的宿怨与敌意仍在社会中暗流涌动。中东欧持续的战乱冲突之下，南部地区民情再度恶化的可能性不容忽视。\n\n巴西政府必须把握时间窗口，在南方的敌对情绪重新爆发前采取应对措施——既需持续推进包容性政策以化解群体裂痕，也应令执法部门随时待命，预备应对可能卷土重来的暴力事件。"
 BRA_tense_south: "南方骚动"
 BRA_tense_south_desc: "伊塔拉雷河以南的社区如今如坐针毡，德国内战与其生存空间政策引发的连锁反应，正驱使越来越多的欧裔巴西人陷入反法西斯狂热。在波兰、乌克兰及犹太侨民群体文化关联或家族渊源的催化下，巴西南部德裔社区沦为愤怒民众的攻击目标——南下至南里奥格兰德州，针对德国移民的集会示威与定点袭击已成常态。\n\n纵使巴西民众对第三帝国的深恶痛绝情有可原，但任由暴力蔓延绝非良策：愈演愈烈的社会骚乱不仅威胁公共安全，更有损我国道义形象。当务之急是凝聚各界力量，在这股暴力浪潮失控前构筑遏制防线。"
 BRA_pacified_south: "南方安定"
 BRA_pacified_south_desc: "巴西暂且可以松一口气。席卷南部的反德浪潮过后，政府推行的欧裔社区团结政策初显成效。越过伊塔拉雷河向南，空气中弥漫着劫后余生的松快气息，但这场持续数月的动荡已然暴露出我们这个素来以多元包容著称的社会中潜藏的危机断层。\n\n尽管国际观察家认为欧洲战事已现终章曙光，但尚不能排除欧洲大陆出现多场持久拉锯战的可能。倘若预言成真，潜伏于我国南方的社会危机恐将再掀波澜。在此之前，巴西政府唯有密切关注欧洲动向，祈愿战火早日平息。"
