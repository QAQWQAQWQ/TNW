 BRA_adhemar_support_congressional: "资助国会竞选"
 BRA_adhemar_support_congressional_desc: "阿德马尔将动用个人资产资助社进党竞选，以期在下届国会中获得更多席位。"
 BRA_adhemar_cash_in_media: "打点媒体关系"
 BRA_adhemar_cash_in_media_desc: "媒体行业的朋友们只要支持总统的最新倡议，阿德马尔保管你们能获得丰厚酬劳。"
 BRA_adhemar_cash_in_supporters: "敲支持者竹杠"
 BRA_adhemar_cash_in_supporters_desc: "阿德马尔将启用信封系统，请求他的支持者协助充实小金库，帮助他继续高效地施政。"
 BRA_adhemar_make_headway_with_the_nikkei: "贿赂日系社区"
 BRA_adhemar_increase_personal_legacy: "投资政治遗产"
 BRA_adhemar_increase_personal_legacy_desc: "阿德马尔将利用个人财富打造其政治遗产，例如支持慈善事业、投放个人广告等，以改善公众形象。"
 BRA_adhemar_spend_slush_fund_tt: "从£BRA_adhemar_slush_fund_texticon §G小金库§!中支出§R[?slush_amount]M美元§!。"
 BRA_adhemar_add_slush_fund_tt: "向£BRA_adhemar_slush_fund_texticon §G小金库§!添加§G[?slush_amount]M美元§!。"
 BRA_adhemar_can_spend_slush_fund_tt: "£BRA_adhemar_slush_fund_texticon §G小金库§!有至少§G[?slush_amount]M美元§!可用。"
 BRA_adhemar_add_legacy_minor_tt: "这将对阿德马尔的£BRA_adhemar_legacy_texticon §Y遗产§!小有§G裨益§!。"
 BRA_adhemar_add_legacy_medium_tt: "这将对阿德马尔的£BRA_adhemar_legacy_texticon §Y遗产§!显有§G促进§!。"
 BRA_adhemar_add_legacy_major_tt: "这将对阿德马尔的£BRA_adhemar_legacy_texticon §Y遗产§!大有§G提升§!。"
 BRA_adhemar_subtract_legacy_minor_tt: "这将对阿德马尔的£BRA_adhemar_legacy_texticon §Y遗产§!小有§R损害§!。"
 BRA_adhemar_subtract_legacy_medium_tt: "这将对阿德马尔的£BRA_adhemar_legacy_texticon §Y遗产§!产生§R损害§!。"
 BRA_adhemar_subtract_legacy_major_tt: "这将对阿德马尔的£BRA_adhemar_legacy_texticon §Y遗产§!§R大为不利§!。"
