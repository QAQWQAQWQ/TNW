 BRA_squeaky_clean_idea: "弊绝风清"
 BRA_squeaky_clean_idea_desc: "巴西的九头蛇——腐败，终于遭到铲除。如今的巴西利亚，腐败已成禁忌，不再堂而皇之地登堂入室，而是退回到阴暗的街角巷落。得益于总统的努力，国家的清廉程度达到了前所未有的水平。\n\n当然，不可否认的是，立法群体内部依旧隐藏着交易、贿赂和罪恶的暗流。不过，至少目前阶段，“腐败”一词已经不再出现在批评者的言辞之中。"
 BRA_a_handshake_here_and_there_idea: "几番握手"
 BRA_a_handshake_here_and_there_idea_desc: "巴西利亚并非完美无瑕，但与过去相比，它确是焕然一新。如今，若深入探索巴西的权力殿堂，虽不能称其为反腐人士的理想国，但其廉洁程度已然可与澳大利亚或美国媲美。\n\n虽然明面上的腐败现象已经不复存在，但幕后交易依然存在。然而，又有哪个政府能说自己从未私下给过一两次特别优待呢？"
 BRA_the_reality_of_governance_idea: "政治实相"
 BRA_the_reality_of_governance_idea_desc: "巴西并非廉政榜样，这一点已是共识。然而，要在这世上找到一片完全没有腐败的净土，又谈何容易？尽管许多人对幕后交易和财务丑闻口诛笔伐，但对于那些在密室中操弄这些交易的人来说，这一切不过是行业的潜规则。毕竟，有多少人愿意直面制作“香肠”的罪恶流程？要根治腐败，关键在于领导层。唯有领导者负起责任，巴西才有望治愈这为害日久的社会痼疾。"
 BRA_dirty_hands_idea: "污秽丛生"
 BRA_dirty_hands_idea_desc: "局势日益崩坏。巴西深陷腐败泥潭，官员沾染了灰色交易的烟炱。从暗中行事的打手、权倾一时的寡头到挪用公款的官僚，林林总总不胜枚举，他们的存在仿佛已成为一种不容置疑的事实。\n\n如今的巴西，比以往任何时候都更不适合新手涉足。若想在此立足，你必须学会与这些不法之徒同桌共事。"
 BRA_ruled_by_favours_idea: "结党营私"
 BRA_ruled_by_favours_idea_desc: "腐败不再是轻微的烦恼，更像是一场肆虐的瘟疫。它不仅是棘手的问题，更是侵蚀法度的毒瘤。法律沦为空文，制度成了笑话；街头巷尾黑帮横行，暴力泛滥无人问津，贿赂竟成了连“正人君子”也得参与其中的游戏。\n\n巴西舞台上有三位主角：政府、军方与罪犯。要执掌权力，就必须在这三者之间巧妙周旋。"
 BRA_conmans_paradise_idea: "决疣溃痈"
 BRA_conmans_paradise_idea_desc: "巴西俨然成了奸佞之徒的国度，从上到下不是结党营私就是鸡鸣狗盗。政坛腐败早成了人尽皆知的秘密，多年反腐徒劳无功，任由贪腐毒疮溃烂流脓，引得跨国犯罪集团争相在此安营扎寨。总统府、参议院、最高法沆瀣一气，只知用法律秩序掩护那永不停歇的权钱机器。"
