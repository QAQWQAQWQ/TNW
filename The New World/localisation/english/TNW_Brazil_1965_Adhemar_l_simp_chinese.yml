 BRA_exercito_social_progressista: "社进党陆军"
 BRA_exercito_social_progressista_desc: "有些人可能会声称，我们对军队的改革并未真正消除其政治化。他们认为，我们只是将自身的影响力强加到了军队之上，用于为自身谋利而已。我们尊重这些人的看法，然而——他们错了。\n\n任何有点脑子的人都看得出来，我们为军队带来了前无古人的东西：自豪感。我们英勇的盟友们取代了先前那帮寄生虫，我们的士兵如今可以安心服役，因为他们的战友不再怀有对共产主义的同情。这正是我们为军队带来的东西，而我们为此感到无比自豪。我们将在巴西利亚的大街上举行一场盛大的阅兵式，让我们的士兵知道——巴西是一个热爱自己军人的国家！"
