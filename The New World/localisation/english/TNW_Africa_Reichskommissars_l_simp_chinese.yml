 cog.38.t:0 "为人乐趣"
 cog.38.d:0 "东方领通常被认为是模范殖民地，他们始终奉祖国之命行事，努力成为真正的雅利安人。哈！穆勒专员的治下可是另一番光景！如果硬要说的话，中非对于祖国来说只是块任其榨取的肥肉，对于专员本人来说则是一个游乐园。要说这世界上什么是穆勒的心头好，那就是去追猎各种形态各异、充满异国情调的动物。与此同时，这片土地在被充分开发。每天都有成吨的自然资源通过中非港口出口以填补祖国的巨量需求。谁知道值此黑暗时期，这片大陆的黑暗之心会迎来何等遭遇？好吧，至少穆勒肯定一无所知，而他也漠不关心。"
 cog.38.a:0 "讲真，人生最自然的乐趣莫过于狩猎的快感！"
 cog.39.t:0 "月亮之上"
 cog.39.d:0 "穆勒觉得今天真是好的不能再好，狩猎收获颇丰，天公作美，同行众人也都无可挑剔。然而惊喜并未止步于此！在转往新的狩猎场地途中，穆勒听闻一则令人振奋的消息：德国的航天计划传来捷报，那些为报效祖国敢于问鼎星辰的勇士，终于达成了这项唯有雅利安民族才能完成的伟大壮举。事实便是如此，雅利安民族便是天选民族，不然又怎能在如此激烈的竞赛中拔得头筹？美日两国的努力至此化为泡影，大日耳曼国——世界的中心、优等种族的国度——已然实现了人类最终的征服，将足迹印刻在了月球之上。"
 cog.39.a:0 "雅利安超人的又一伟业！"
 COG_Lobster_War.1.t:0 "难言之隐"
 COG_Lobster_War.1.desc:0 "穆勒专员继续在他的办公桌上百无聊赖地翻着报告。他认为，他现在所做的只是坐在办公室签署百无一用的文件，授权那些一文不值的倡议。他渴望地盯着墙上的各种战利品；他有一阵子没有好好享受了，更别提发泄一下了，现有的战利品都积满灰尘了。正盘算着接下来狩猎什么动物的穆勒突然被敲门声打断了。\n\n“嗯？谁在那儿？”\n\n“穆勒先生？您现在有空吗？”\n\n“我想是的。”穆勒在座位上挺直了身子，完全是在期待着坏消息的到来，“请进。”\n\n一位紧张的副官畏畏缩缩地把门推开，手里拿着一堆报告，上面满是海军部的盖章。穆勒已经从副官的举止中知道了这些报道的内容。他现在有了一个倒霉的任务，就是浪费一个下午的时间去读这摞报告。\n\n“穆勒先生，我恐怕要报告一件坏消息，我们的渔船遭到袭击，绝大多数船只被巴西海军摧毁。我相信这对您造成了极大的不便，我对此……”穆勒在助手还没来得及说什么之前就挥手示意他走开，而副官对此心照不宣，在离开房间前颤颤巍巍地敬了个礼。他该如何向德国的精英们透露海鲜价格将翻一番，甚至翻两番的消息？他会花一段很长的时间处理这件事，在此期间会有很多人大吵大闹。穆勒当然对此不抱有期待。"
 COG_Lobster_War.1.a:0 "又一个要让穆勒先生处理的头痛问题。"
 COG_Lobster_War.2.t:0 "两极反转"
 COG_Lobster_War.2.desc:0 "汉斯的手掌紧贴着船舱外侧，目光扫过身旁三位渔民——在他的祖国，他们是无所畏惧的海上勇者；到了这，他们却成了不起眼的小贼。尤其是那位手持步枪、在他们之间来回踱步的巴西人，让汉斯更是觉得有点做贼心虚。他们的渔船被突如其来的巴西驱逐舰逮个正着，现在那些士兵好似一帮正在搜寻食物的蚂蚁，在下层甲板上跑来跑去。船舱下面装着大堆的捕虾网，无疑符合这群“不速之客”的需求，同时也成了他们登船的借口。\n\n就在这时，下层甲板传来的喊声不仅证实了汉斯的担忧，也打断了他的思考。只见两名士兵踩着被大西洋海水浸湿的楼梯匆匆跑下，而另一名士兵则向上而来。他回到那个一眼头头的家伙身边，两人用大概是葡萄牙语的语言交流了几句，那个头目一把抓住了船长卡尔的衣领。\n\n“你们不应该来这儿，懂不懂？”巴西军官把卡尔整个人往地上一摔，水花四溅，把周围人的鞋子都打湿了，场面仿若一场无声的审判。\n\n“懂。”卡尔丢出一个字，他站起身来，看着湿透的裤腿皱了皱眉，然后望向巴西军官，“我们知道你们怎么看，也知道你们做不了什么。”巴西军官愣了一下，随即恢复了严肃的表情，“好得很，随你便吧，船长先生。”他带着嘲笑的口吻说道。这时，汉斯身后的无线电发出一阵噪音，巴西军官急切地说着什么，但船上没人能听懂。随着无线电不再传出声音，最终从那方小小的机器中传出清晰的话语，巴西军官再度发言：“你们有一分钟的时间被押送回非洲，否则我们将以30节的速度撞击你们。这是最后通牒。”"
 COG_Lobster_War.2.a:0 "“成。”"
 COG_Lobster_War.3.t:0 "来自大西洋的坏消息"
 COG_Lobster_War.3.desc:0 "卢卡斯刚跟渔民伙伴们吃完早餐——自打他们到巴西海域从事海鲜捕捞作业以来，他们的伙食就一直很好。当初离德赴任时，他对这份工作能否赚得到钱颇为疑虑，但事实证明，捕捞合同让他赚的盆满钵满，甚至还有额外收入。然而，走近渔船时，他看到船长愁眉不展，心中顿时有种不祥的预感。卢卡斯上前，向船长行了个庄重的军礼，但船长只是心不在焉地回了个礼。\n\n“兄弟们，我有一个不好的消息要告诉大家。我们的合同没了，取消掉了。”\n\n突如其来的消息让卢卡斯和兄弟们一时难以消化。合同竟然没了？每次出航他们都能带回四十箱的海鲜啊，这样的成绩难道还不够亮眼吗？“船长，为什么会这样？我们不是超额完成了捕捞指标吗？实在看不出有什么理由终止合作啊？”船长背对众人，向着远方的海平线凝望片刻，随后发出一声沉重的叹息。“专员辖区明确指示我们要停止在巴西海域的捕捞活动。”船员们相互看了几眼，满满的难以置信。船长接着说道，“相信我，小伙子们，我跟你们一样震惊。虽然现在风平浪静，但将来难保没有波澜。你们得另谋出路了。能与大家共事是我莫大的荣幸。”\n\n船员们呆呆地看着眼前即将告别的大海。"
 COG_Lobster_War.3.a:0 "那么，现在怎么办？"
 COG_Lobster_War.4.t:0 "手到擒来"
 COG_Lobster_War.4.desc:0 "眼泪快从穆勒的眼眶里喷出来了，海军传来的报告实在是太他妈的搞笑了。原本今天是个案牍劳形的乏味日子，这份报告却给他不小的惊喜——巴西海军竟然拿不下一群装备简陋、缺乏训练的渔民。不仅损失惨重，还不得不发出正式道歉，这对那一堆自诩为海军的巴西破烂铁皮而言简直是沉重打击，令穆勒忍俊不禁。他的胃疼了起来，整个人蜷缩在座椅上，就在这时，办公室的门突然被人踹开。助手与保镖冲了进来，穆勒笑得喘不过气来，脸涨得通红。\n\n“穆勒先生！您还好吗？您笑得太久了，我们担心……。”\n\n“我很好，你们俩笨蛋！为啥踹我门！””二人惊愕地看向损坏的门，穆勒不笑了，举手示意让他们放心。“没关系！待会儿我会让汉斯来修。你们可以退下了。”\n\n穆勒像是沉浸在浪漫小说中的少女，急切地想要知道报告接下来的内容。照这样下去，巴西是不是要赔他渔船的损失啦？他按捺不住好奇心，快速翻阅报告，想看看巴西为讨好专员辖区究竟会做出什么样的让步。不久，笑声再次响起，穆勒猛猛拍桌，试图平息情绪，迎接下一轮的狂笑。"
 COG_Lobster_War.4.a:0 "巴西佬输麻咯。"
 COG_Lobster_War.5.t:0 "大西洋的麻烦事"
 COG_Lobster_War.5.desc:0 "穆勒抖着腿，焦急地等待海军传来渔船情况的消息。他的思绪在巴西人提出的协议和海军将领会议之间不断徘徊；自己对萨莱斯是否太过冲动？他的将军真对一帮渔民这么有信心？穆勒陷入沉思，直到听到敲门声。那声音缺乏自信，就像他此刻的心情一样。\n\n“穆勒先生？将领们有最新消息。”助手走进来，把一个信封放在他的桌子上，又退了出去。穆勒像一只饿了一周的狗一样撕开了文件，“失败”映入眼帘。渔船被巴西海军拦截，被迫返回中非，德方有许多伤亡，而巴西方面几乎毫发无损。\n\n这对于穆勒和中非无疑是一场沉重的打击。该怎么写给德国和元首发送的信件？这简直就是奇耻大辱，更糟糕的是，德国的海鲜供应链也会随之断裂。穆勒揉了揉太阳穴，试图忘掉这一切。谢天谢地，他本周早些时候安排了一次狩猎旅行，他想。如果没有它，接下来的日子简直难以忍受。"
 COG_Lobster_War.5.a:0 "真相永远存在，不受任何干扰。"
 COG_Lobster_War.6.t:0 "老子英雄儿好汉"
 COG_Lobster_War.6.desc:0 "“我寻思今天算是忙活完了，对吧？”尼古拉感觉像听了个糟糕的玩笑话，一想到自己在跟父亲聊天，这也见怪不怪了。“这还用说，你不也在那吗？”\n\n父子俩从黑角码头出来，径直前往他们常去的比利时咖啡馆。尽管父子俩近年来有些疏远，但是每晚他们总能在他俩朋友开的餐厅里小聚一下聊以慰藉。尼古拉漫步于刚果这个城市乐园的街头，不禁向他的“老板”谈论起这一天来的工作。\n\n“那假设这就是你每天要干的活，你觉得你一个人能撑多久？我是说今天在拖网渔船上干的那些。”父亲顿了顿，像是在假装思考什么。“嗯……很久，很久。”接着他笑了笑，“这还用说，你不也在那吗？”\n\n“哦，哈哈哈，那就当这是在肯定我吧，现在我能入职了吗？说起来我猜您老是在面试我呢。”尼古拉快步绕到他父亲面前，沿着人行道倒着走。“显然，您已经知晓我在这个领域有着丰富的工作经验，更别提我在紧张情况下的工作效率如何了，比如和您一起做饭，我居然还把鸡蛋给烧焦了。”\n\n“你这不过是在说动我，尼古拉。”两人推门而入，来到经常碰头的地方。“想点些什么？就当是预支你的工资好了。”\n\n两人端着碗在常去的那一桌落座，父亲还是提到了关键问题：“所以，我猜你肯定听闻过一些流言，毕竟你人脉宽广，你知道几天后可能会出现的麻烦。”\n\n尼古拉点头道：“妥……”"
 COG_Lobster_War.6.a:0 "“这风险我担得起。”"
 COG_Lobster_War.7.t:0 "盗亦有道"
 COG_Lobster_War.7.desc:0 "汉斯再次检查了他的手牌。红桃五、红桃七还有黑桃二。显然，情况不妙，随着船只摇摇晃晃地驶入大西洋，紧张的气氛在舱中弥漫着。他正努力维持着冷漠的扑克脸，不过还是感到额头有汗渗出。汉斯需要转移大家的注意力。\n\n“话说，我搞不懂为什么我们对这些事情要有压力。”\n\n“你是说违反国际水域规定？”克劳斯还有牌桌上其余几位都被逗乐了，除了汉斯。“嗯，首先，我想巴西人失去了捕虾的利润。”\n\n汉斯把头向前倾了倾，“嚯嚯”嘲讽了一声。“老实说，我没搞懂。巴西又不是缺钱。他们不用勒紧裤腰带过日子，难不成他们的资金被德国大叔给截胡了？”乌韦一边紧盯着自己的手牌，一边接过话茬。“对，没毛病，但是巴西也算不上‘财源滚滚’不是？你见过他们一半的政治倾向是什么样的吗？”\n\n“说得对，但话说回来，我们总有权得到一些东西吧？”汉斯反驳道，“总得告诉他们偷窃和正当要求之间有个度，我们有权这样做。”克劳斯和乌韦沉默了一会儿，接着前者开口了：“好吧，不过我觉得这事儿还是交给那些当权的去讨论具体细节比较好，不是么？”\n\n乌韦打了个响指，重新调整了一下坐姿。“我也是这么想的，但巴西一直不愿意在我们完全让步的情况下进行谈判，所以我想，如果他们不想坐到谈判桌上来，那我们在道义上可就占优了。”他最后清了清嗓子。"
 COG_Lobster_War.7.a:0 "“至少这让我放心了点。”"
 COG_Lobster_War.8.t:0 "越权行事"
 COG_Lobster_War.8.desc:0 "让翻看着这周的工作清单。尽管没人真的在意具体每周要完成什么，但工作越来越单调，人们也变得更加散漫，显然这背后一定有什么事情在发生。果然，把过去几周的清单拿来对比，拖网渔船的数量逐渐攀升，显得颇为诡异。“宾果”，就是这个美国佬的词，对不对？\n\n他倚着办公室的墙，点起一支从一位比利时商人手中费尽口舌才讨来的廉价香烟。跟这位讨价还价可老费神了，对方本打算把这烟卖得老贵，不过这也是那些比利时吝啬鬼的一贯作风，向当地人卖东西时更是如此。但现在，这一切都不重要。真正让人费解的是，为何偏偏是拖网渔船，如潮水般涌入港口寻求修理。让轻笑一声，再吸一口烟，思索着那些记录损坏部位的报告究竟放在哪里。打开文件柜抽屉，最近这几个月乃至过去一年半以来居然连一个文件都没有。不只是没文件，就连维持文件柜秩序的文件夹也消失得无影无踪，这里可不是申克那摆烂地儿啊。\n\n办公室另一边传来电梯抵达楼层的提示音。让吸完最后一口烟，迅速将文件塞回原位，快步奔向办公室后方的楼梯，一路狂奔到了楼下。他停下脚步，望着浩瀚的大海，一股坚定的决心如同铁锁一般牢牢扣住他的心。这些破损而归的渔船背后，必然隐藏着某种缘由。"
 COG_Lobster_War.8.a:0 "即使这是他做的最后一件事。"
 COG_Lobster_War.9.t:0 "这合乎法制吗？"
 COG_Lobster_War.9.desc:0 "阿瑟渐渐掌握了以穆勒之名操弄文书的诀窍，他拥有了一种选择权——决定哪些事情发生，哪些事情被忽略。权力的好处是如此巨大，世界上没有任何事物可以与之相比。有时，坐在那不知所在、尘网霉烂的非洲办公室里的他，却经历着生命中最为刺激的时刻。无数“有上进心的家伙”纷纷找上门来求他帮忙，要么让什么突然消失，或是让什么凭空出现，当然，所有这些都有合理的报酬。麻烦总是在“平衡预算”时浮现——总而言之，得捏造一个能够掩藏一切贪腐行为的预算。于是，天衣无缝的计策便出现了：将巴西海域的捕虾利润纳入账目；他无需标明每次探险究竟赚得了多少利润，只要操作得当，阿瑟完全可以为他的小“生意”腾出更大的运作空间。不过，还有一个棘手的问题：日耳曼尼亚对这类探险是什么态度？他们认为这是违法的吗？他们肯定知道这些活动的存在，不可能不知道。既然如此，要是这些活动真的违法，那早该被日耳曼尼亚取缔了。或许，他们是选择了睁一只眼闭一只眼？若真是这样，那么日耳曼尼亚的官员们显然不希望承认这些活动的存在，而且一定有其理由。阿瑟拿出每个有头有脸的官僚都会备有的工具——电话簿。\n\n“您好，这里是中非簿记员阿瑟·戴维斯，我想了解一下在巴西水域内捕虾的合法性。德国政府对此事的确切立场是什么呢？”对方似乎犹豫了一下，“呃……我也不确定这个该不该问我。您是否尝试过联系……”\n\n阿瑟微微叹了口气。此时已是深夜。这便是为何阿瑟应该是第一个发现捕虾可以获利的人。没有人知道该怎么做，阿瑟自己也不例外。"
 COG_Lobster_War.9.a:0 "最终，他决定不承认这些捕捞活动。"
 COG_Lobster_War.10.t:0 "霸权在侧"
 COG_Lobster_War.10.desc:0 "恩斯特望着船舱内集合的人群，每个人都对聚集起来的缘由心知肚明，那几个坐立不安的雇佣兵更是宣告着不宣之秘。水手与渔民围坐在这巴西海域深处的临时会议室里，目光忧郁的恩斯特一踏进来，室内的紧张情绪便如潮水般不断上涨。他走向房间中央唯一的椅子，倚靠在坚实的橡木椅背上，扫视面前寥寥无几的船员。“大家都知道我们为什么聚在这了。只有天知道我们离德意志水域多远，更不知自政府宣布巴西水域为禁区后又过去了多少时日。我们要讨论的不是我们为啥在这里，而是我们该干什么。”恩斯特指指刚刚步入临时会议的两位雇佣兵之一。“加强安保的必要性，我们都看在眼里，我们都见过汉克对吧？”美国人朝着众人挥了挥手，显得有点尴尬，顿时就没了威风。\n\n一个年轻人，比利时裔甲板水手马克西姆迈步上前。“好啊，‘我们在一条船上’呢，船长。我想知道的是，我们究竟为何在此？”\n\n恩斯特离开椅子。“对，为什么我们在这里。对的。”他清了清嗓子。“为了钱。”一阵轻笑在船舱中响起，但很快又安静下来。“坦白讲，继续下去已经没有价值了。巴西方面封锁了水域，这两天我们改道改了好几次，怎么算都不划算。因此，我决定终止——”室内响起一阵半是不满半是理解的低语。“请听我说，我知道这样不是很理想，但——"
 COG_Lobster_War.10.a:0 "人们开始争吵起来。"
 COG_Lobster_War.11.t:0 "不再冒险"
 COG_Lobster_War.11.desc:0 "“不，你不懂，莱因哈德，我受够了。我要离开，拿回我的工资，而且我再也不想踏上那艘被上帝遗忘的船。”这不是莱因哈德·菲舍尔今天第一次遇到此类争执，他把之前那些跟不满船员说过的标准套话又说了一遍。“我理解你，克劳斯，之前很多人也说过类似的话，但他们最后都满意地离开了。我不想搞特殊，所以请你稍安勿躁，听听我的建议，对你有好处。”\n\n克劳斯是菲舍尔手下较为体面的德国人之一，穿着整洁，家庭美满。这一切的背后，是他不断追求更高薪资的努力。这种抱负原本令人敬佩，却令菲舍尔的钱包日渐消瘦。\n\n“我不明白你为什么想走。你的收入一向不错，工作也很稳定，虽说最近有些波折。你可是我最倚重的船员。你究竟为什么要走？”克劳斯长叹一声，靠住菲舍尔的办公桌：\n\n“因为，莱因哈德，我付不起饭钱了。你没给我钱，如果你不给我钱，那我就没法工作。”菲舍尔直视着克劳斯的眼睛，身子微微前倾。\n\n“你要是现在走，就没得工资给你。”克劳斯露出一丝微笑，从菲舍尔桌上整齐摆放的文件和钢笔前退开。\n\n“没事，莱因哈德。我父亲是个大忙人，我该去给他帮帮忙了。施拉姆现在似乎很乐意接纳像我这样的临时工，而且我一直受到他家人的欢迎。要是一直这样就好了。”克劳斯一贯自以为是，此时也依然故我，未提前两周通知便离开了岗位。他冲出办公室，菲舍尔把他的名字从名单上划去。"
 COG_Lobster_War.11.a:0 "又划了一个名字。"
 COG_Lobster_War.12.t:0 "服务员"
 COG_Lobster_War.12.desc:0 "“没错，先生，菜单上的确是这么写的。但是，您也知道，最近海鲜价格飙升，要是还能供上，我倒要担心这海鲜的质量了。”马侬已经来来回回解释一个小时了，他感觉自己要么得点根烟，要么就得头疼个没完。\n\n“那你们为什么不更新菜单？我们来这里是为了吃海鲜，结果却被告知没有海鲜！”\n\n“当然，我会和厨师沟通，但请别抱太大希望。”马侬朝厨房走去，厨房里的嘈杂声透过两扇门传了出来。马侬经过他的班主管莫里斯，瞥了一眼墙上的钟，笑道：“莫里斯，一个小时了，该轮到我抽烟休息了。”莫里斯正在与一位副厨争论，只是向他竖了个大拇指表示同意。“丹妮尔，麻烦你接手12、14和16号桌，12号桌有一对可爱的客人要吃海鲜，我告诉他们会跟厨师确认，拜托你继续跟进。”两人心里清楚，这已经算不上是个问题了。\n\n“好啊，马侬，烂地狱去吧你。”丹妮尔抱着一堆开胃菜往厨房走，这些小吃是平息不满客人的必备武器——今晚厨房已经消耗了一周的前菜储备，厨师们直到日出都不许停工。马侬从裤兜里掏出一根烟，悬在炉灶上方点燃，随后从后门走出，步入小巷。望着外面汽车纷至沓来进入这家知名餐厅，马侬深吸一口烟，沉浸在夜景之中。"
 COG_Lobster_War.12.a:0 "城镇之夜的另一面。"
 ARK_south_african_war_catgeory:0 "南非战争紧急状态"
 ARK_south_african_war_catgeory_desc:0 ""
 ARK_rush_to_Kapstadt:0 "向卡普施塔特冲刺"
 ARK_rush_to_Kapstadt_desc:0 "随着南非的持续崩溃，是时候摆脱他们和他们的盟友了。"
 ARK_emergency_production:0 "紧急生产"
 GERAF.8.t:0 "南非拒绝"
 GERAF.8.desc:0 "显然我们错估了南非方面达成协议的意愿——他们回应称，无意接受我们慷慨的停火提议。这并无大碍，最终胜利终将属于我们。"
 GERAF.8.a:0 "就这样吧。"